name: Build Android APK (Maitetsu Viet Hoa)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        type: choice
        options: [debug, release]
        default: debug

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Maitetsu Project
        uses: actions/checkout@v4

      - name: Checkout KrKr2-Next Engine Repo (Our Fork with MaitetsuCx Decryption)
        uses: actions/checkout@v4
        with:
          repository: 'shimakazevn/KrKr2-Next'
          ref: 'main'
          path: 'krkr2_next'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build pkg-config bison flex

      - name: Build Android APK via build.sh
        run: |
          cd krkr2_next
          chmod +x build.sh build/*.sh
          ./build.sh android ${{ github.event.inputs.build_type || 'debug' }}

      - name: Locate APK Output
        id: locate_apk
        run: |
          APK=$(find krkr2_next/apps/flutter_app/build/app/outputs -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"
          ls -lh "$APK"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Maitetsu_VietHoa_Android.apk
          path: ${{ steps.locate_apk.outputs.apk_path }}
          retention-days: 14
