name: Build iOS IPA (Maitetsu Viet Hoa Launcher)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      include_patch:
        description: 'Nhúng sẵn patch3.xp3 Việt Hóa vào .ipa (Phương án B: All-in-One)'
        type: boolean
        required: true
        default: false

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Maitetsu Project
        uses: actions/checkout@v4

      - name: Checkout KrKr2-Next Engine Repo (Our Fork with iOS Patches)
        uses: actions/checkout@v4
        with:
          repository: 'shimakazevn/KrKr2-Next'
          ref: 'main'
          path: 'krkr2_next'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache vcpkg & iOS Dependencies
        uses: actions/cache@v4
        with:
          path: |
            krkr2_next/out/ios/release/vcpkg_installed
            krkr2_next/.devtools/vcpkg
            ~/.cache/vcpkg/archives
            ~/Library/Caches/vcpkg/archives
          key: vcpkg-ios-${{ runner.os }}-${{ hashFiles('krkr2_next/vcpkg.json') }}
          restore-keys: |
            vcpkg-ios-${{ runner.os }}-

      - name: Setup Xcode Environment
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Install Build Dependencies 
        run: |
          brew install cmake ninja autoconf automake autoconf-archive libtool bison
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH

      - name: Ensure Live2D Cubism Framework is Present
        run: |
          if [ ! -d "krkr2_next/cpp/plugins/cubism/Framework/src" ] && [ ! -f "krkr2_next/cpp/plugins/cubism/Framework/CubismFramework.cpp" ]; then
            echo "Cloning Live2D Cubism Framework..."
            git clone --depth 1 https://github.com/Live2D/CubismNativeFramework.git krkr2_next/cpp/plugins/cubism/Framework
          fi

      - name: Copy Vietnamese Patch3.xp3 to Asset Folder (Phương án B)
        if: ${{ inputs.include_patch == true }}
        run: |
          mkdir -p krkr2_next/apps/flutter_app/assets/game/
          if [ -f "patch3.xp3" ]; then
            cp patch3.xp3 krkr2_next/apps/flutter_app/assets/game/
            echo "Copied patch3.xp3 to assets!"
          fi

      - name: Build C++ Native Engine & Flutter iOS App (.ipa unsigned)
        run: |
          cd krkr2_next
          chmod +x build.sh build/*.sh
          ./build.sh ios release

      - name: Package Payload into .ipa Archive
        run: |
          mkdir -p build_output/Payload
          cp -R krkr2_next/apps/flutter_app/build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build_output/Payload/ || \
          cp -R krkr2_next/apps/flutter_app/build/ios/iphoneos/Runner.app build_output/Payload/
          cd build_output
          zip -r Maitetsu_VietHoa_iOS.ipa Payload
          echo "IPA created at build_output/Maitetsu_VietHoa_iOS.ipa"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Maitetsu_VietHoa_iOS.ipa
          path: build_output/Maitetsu_VietHoa_iOS.ipa
          retention-days: 14
