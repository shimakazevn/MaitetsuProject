# 【ポーレット】
# display as 波萊特
# JP: 「出します。絶対。\x%l乗り鉄;#00ffc040;乗り鉄%l;#;的には、全線一気に乗車。\nそれ以外、意味はないって感じますから」
2709 = "「絕對會有。對於\\x%l乗り鉄;#00ffc040;鐵行家%l;#;來說，不是一口氣坐完全程的話就沒意義了」" 

# 【ハチロク】
# display as 八六
