# 【稀咲】
# display as 稀咲
# JP: 「そこに、豪華なおみやげや記念品なんかもくわえて、\n通しチケットは、九十九万九千九百九十九円で」
2146 = "「再加上豪華特產禮品與紀念品，貴賓票以九十九萬九千九百九十九日元的價格出售」" 

# 【真闇】
