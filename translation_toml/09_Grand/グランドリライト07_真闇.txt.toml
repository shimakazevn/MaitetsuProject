# monologue
# JP: 歴史ある地域全体が、その文化遺産をフルに活用しての、\n『壮大なごっこ遊び』には、確かな魅力と楽しさがある。
3293 = "整片歷史悠久的地區最大限度地利用其文化遺產，這種“宏大的扮演遊戲”確實有其獨特的魅力與樂趣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「8620もキハ07sも、ずばりとハマる車両だからな。\n観光客は順調に増加し、クマ川くだりも復調してきた」
2869 = "「８６２０和Ｋｉｈａ０７Ｓ都是特別吸引人的車輛。旅客也在穩步增加，隈河漂流也恢復了生機」" 

# 【路子】
# display as 路子
# JP: 「うん」
2310 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「人員も増え、ふかみも自分の時間を持てるようになり。\n今は、\x%l車掌;#00ffc040;車掌%l;#;資格を取るために、駅員からの勉強中だ」
2084 = "「人手也增多了，深美也有了自己的時間。她現在正在從站務員開始學習，目標是考到\\x%l車掌;#00ffc040;列車長%l;#;的執照」" 

# 【路子】
# display as 路子
# JP: 「そうなんだぁ。\n成長するって、すごいねぇ」
2605 = "「是這樣啊。真厲害，她也長大了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……だな」
1603 = "「……是啊」" 

# monologue
# JP: 路子は、ずっと成長できない。\nこの列車に閉じ込められている、今のままでは。
3098 = "只要還被封閉在這輛列車裡，路子就永遠無法成長。" 

# monologue
# JP: だから。なんとか。\nずっと、そう願って動きつづけているのだが――
3278 = "所以我想讓她解脫。雖然我一直都是懷著這個願望努力到了今天——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2258 = "「啊」" 

# 【路子】
# display as 路子
# JP: 「どうしたの？　そうちゃん」
2464 = "「小雙，怎麼了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、ふと思いついたのだ。\nまた父さんと母さんの墓参りに行くのも、悪くないかと」
2052 = "「不，我突然間想到。或許應該再給爸爸媽媽掃一次墓」" 

# 【路子】
# display as 路子
# JP: 「わ！」
2231 = "「哇！」" 

# monologue
# JP: 路子の顔が、ぱあっと輝く。
3512 = "路子的表情豁然開朗。" 

# 【路子】
# display as 路子
# JP: 「いいね！　それ、とってもいい！\nみち、大さんせい！！」
2385 = "「好主意！這個想法真好！小路雙手贊成！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば、直近のバタバタが落ち着き次第に、\nお参りしてこよう」
2589 = "「是嗎？那等我忙完最近的工作之後就去」" 

# 【路子】
# display as 路子
# JP: 「うん！　みちね？　ひびきちゃんとハチロクちゃんと、\nまくらおねーさんとそうちゃんでいくといいと思うの」
2311 = "「嗯！小路啊，希望你和日日姬、八六、真闇姐姐一起去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉たちと一緒にか――」
2220 = "「和真闇姐她們啊——」" 

# monologue
# JP: 確かに日々姫と、\n次のときにはきっと一緒にと約束をした。が……
3407 = "確實我跟日日姬說好了，下次絕對要一起去。但是……" 

# 【路子】
# display as 路子
# JP: 「どうしたの？　そうちゃん、ふしぎそうな顔～」
2461 = "「小雙，你怎麼一臉奇怪的表情？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「不思議……ああ、うん。少しだけ意外に感じたのだ。\n路子が、そのように勧めてくれたことが」
2374 = "「奇怪……啊，嗯，只是有些意外。沒想到你會這麼勸說我」" 

# monologue
# JP: 新しい家族を、亡くなった家族の墓前に紹介する。
3146 = "在去世的家人的墳墓前介紹新的家人。" 

# monologue
# JP: そこには少し、僕としては、申し訳無さのような……\n心理的な抵抗に近いなにかを覚えるのだが――
3186 = "對此我有種很過意不去的……近似於心理上的牴觸的感覺——" 

# 【路子】
# display as 路子
# JP: 「どうして、それがいがいなの？」
2113 = "「你怎麼會覺得意外？」" 

# monologue
# JP: 僕の言葉に、\n今度は路子が、きょとん、ふしぎそうな顔になる。
3439 = "聽到我的話，這次輪到路子露出一臉奇怪的表情了。" 

# 【路子】
# display as 路子
# JP: 「ぱぱもままも。ぜったいにお礼、いいたいよ。\nだって、そーちゃんのこと、助けてくれた人たちだもん」
2660 = "「爸爸媽媽也肯定想跟她們道謝的。因為她們是拯救了小雙的人啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2250 = "「啊——」" 

# monologue
# JP: ……何か、とても大事なことが、朝の光に溶けていく。\nきっと、僕はこの夢のことを忘れてしまう。
1518 = "……某些特別重要的事物溶入了朝陽中。我一定會忘記這個夢吧。" 

# monologue
# JP: そうわかるから、必死に願う。\n溶けてしまった何かが、たとえほんの一欠片でも――
3352 = "深知這一點的我拚命祈禱。期盼這些融於無形的事物能夠有所保留，哪怕只是些許碎片——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん……む――」
2293 = "「嗯……唔——」" 

# monologue
# JP: 目覚めれば、一人。\nああ――そうか。今日は、しばらくぶりの休みか。
3537 = "醒來後發現只有自己一人。啊——對了，今天是難得的休假啊。" 

# monologue
# JP: ……ハチロクは、既に乗務に向かったようだ。\n部屋の空気が、どこか寂しい。
1496 = "……八六似乎已經上車執行乘務任務去了。房間裡顯得冷冷清清的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「休みと思えば、熟睡してしまうものだなぁ」
2617 = "「本來只打算休息一會的，結果睡得特別熟啊」" 

# monologue
# JP: 体が軽い。それに、心も。\nいつもの眠りとの違いなら、アラームの有無だけなのに。
3515 = "身心都舒暢了許多。明明與我往常的睡眠的區別只在於有沒有鬧鐘響而已。" 

# 【双鉄】
# display as 雙鐵
# JP: 「熟睡すれば、こうも違うか」
2657 = "「熟睡的效果這麼不一樣啊」" 

# monologue
# JP: ポーレットが休め休めと何度も勧めてくれたことへの、\n感謝の念が湧いてくる。
3349 = "波萊特總是苦口婆心地勸我要多休息，看來我是得感謝她才行。" 

# monologue
# JP: そして同時に、普段の自分自身に対する、反省も。
3031 = "並對平時自己不注重休息而反省。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひと月――は厳しいにしても、ふた月に一度くらいは、\n意識して全休をとるべきかもしれんな」
2022 = "「一個月一次的話……或許不太現實，但至少應該有意識地每兩個月給自己放一天假才行啊」" 

# monologue
# JP: その方が、長期的にみた仕事効率も向上しそうだ。
3199 = "從長遠眼光來看，這樣也能提高工作效率。" 

# monologue
# JP: 布団をあげて着替えを済ませ、\n居間へと向かう――と。
3253 = "我爬起身來換好衣服，走向起居室——這時。" 

# 【日々姫】
# display as 日日姬
# JP: 「案～、案～、案～」
2059 = "「主意～主意～主意～」" 

# monologue
# JP: 居間の机に突っ伏して、日々姫が案案、呻いている。
3319 = "日日姬趴在起居室的桌子上，“主意，主意”地呻吟個不停。" 

# monologue
# JP: 見捨てて置くのも気の毒ゆえに、\n唸る日々姫の前を素通りし、台所へと赴いて――
3291 = "放著她不管又有點太可憐了，所以我從呻吟個不停的日日姬面前路過，走向廚房——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほれ、日々姫。\nお目当てのものだぞ」
2123 = "「來，日日姬，你想要的東西在這呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「ぴゃうっ！？　にぃにっ！？　え？　なにっ！？\nいつからおったと！！？」
2218 = "「呀嗚！？阿哥！？哎？怎麼！？你什麼時候在這的！！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ついさっきだ。\nほら、遠慮なく食べていいぞ」
2515 = "「我剛剛才來的。不用客氣，儘管吃吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「遠慮なくって――あ！　これ、にわみさんの長饅頭。\nにぃに、お茶淹れてくれたんだ」
2087 = "「什麼不用客氣——啊！阿哥，你給我泡了茶啊，還有庭美小姐店裡賣的長米糕」" 

# 【双鉄】
# display as 雙鐵
# JP: 「餡を欲しがっているようだったからな」
2105 = "「你不是一直念叨著“煮一煮一”嘛，我不知道你要煮什麼就煮了壺茶」" 

# monologue
# JP: 言えば日々姫は再びベタっと、\n机にその身を伏せてしまう。
3441 = "聽我說完，日日姬再次無力地趴在桌子上。" 

# 【日々姫】
# display as 日日姬
# JP: 「やめて～　よして～　にぃにがオヤジギャグだとか！」
2159 = "「別這樣啦～少來啦～阿哥根本不是開大叔玩笑的料！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「オヤジ――\nいや、気の利いた言葉遊びのつもりだったが」
2370 = "「大叔——不，我只是想玩個巧妙的語言遊戲啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「いまのはアウト！　100％のオヤジギャグ！\nそこらのおっさんが言いそうな――あむっ！？」
2161 = "「剛才的完全不行！徹頭徹尾的大叔玩笑！就跟一般大叔說的——啊唔！？」" 

# monologue
# JP: 言われてみればそうかとどんどん思えてくるゆえ、\nひとまずは、長饅頭で日々姫を黙らす。
3266 = "我覺得我都快被日日姬說服了，所以先用長米糕堵住了她的嘴。" 

# monologue
# JP: もむもむと、日々姫もおとなしく咀嚼をはじめ。\nやがてごくんと飲み込んで、安心したような息を吐く。
3320 = "日日姬開始默默地咀嚼。不久後她咕嚕一聲將嘴裡的東西嚥下肚，然後安心地吐了一口氣。" 

# 【日々姫】
# display as 日日姬
# JP: 「なんか気がぬけた。ってか、力んでたとね、私。\n考えっぱなし、こもりっぱなしはいけんね！　やっぱり」
2497 = "「感覺整個人放鬆下來了。不，是我剛才太緊張了。果然不能一直窩在家裡鑽牛角尖啊！」" 

# monologue
# JP: 言葉と同時、立ち上がる。\nすっくと、凛と、美しく。
3175 = "她邊說邊站起身來。她的身影凜然而美麗。" 

# monologue
# JP: いつの間に、日々姫も成長していたのだなと、\nなんだか眩しいように感じる。
3311 = "日日姬在不知不覺之間也長大了啊。現在的她顯得光彩奪目。" 

# 【双鉄】
# display as 雙鐵
# JP: 「出かけるのか？」
2118 = "「你要出門？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん。術仙いって、修理で入ってるこ、描いてくる。\nそしたら何か、アイディア浮かんでくるかもしれないし」
2322 = "「嗯，我要去術仙把正在修理的列車畫下來。或許能從中找到靈感」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2585 = "「是嗎」" 

# monologue
# JP: 僕の同行を求めることなく、\n"描いてくる"ときっぱり言い切って。
3160 = "她沒有叫我同行，直接斬釘截鐵地說要去畫畫。" 

# monologue
# JP: 恐らくは、僕を休ませるため――\n日々姫はひとり、さっさと身支度を整える。
3273 = "或許是為了讓我休息吧。日日姬迅速地做好了出發的準備。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕の方でもアイディアを出すべく努めよう。\n過去から未来―その先のコンセプトを纏められるよう」
2842 = "「那我也來努力想出個好主意吧。為了把從過去到未來——以及更加長遠的概念統一起來」" 

# 【日々姫】
# display as 日日姬
# JP: 「そいば、いっつもしてるでしょお。休むときには\n休んだほうが、きっとよかアイディア出るとよ？」
2115 = "「你有不努力的時候嗎？該休息的時候好好休息，這樣才能想到好點子哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな」
2532 = "「或許是吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「もちろんにぃにの休みやけんね！\nにぃにの好きにしたら良かけど！」
2674 = "「當然了，今天可是阿哥的休假！你想做什麼事都可以！」" 

# monologue
# JP: 言って笑って、日々姫が出て行く。
3489 = "說完，日日姬笑著出門了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……本当に、大人になったな」
1585 = "「……她真的是長大了啊」" 

# monologue
# JP: ほんの少しだけ寂しく感じ、その何倍も嬉しく思う。
3543 = "雖然覺得有些寂寞，但更多的還是喜悅。" 

# 【双鉄】
# display as 雙鐵
# JP: 「成長、か」
2500 = "「成長啊……」" 

# monologue
# JP: その素晴らしさを実感すれば、\n改めて、心が定まり、強くなる。
3241 = "我在感受到成長的美妙之處的同時，再一次下定決心。" 

# monologue
# JP: 路子を、閉じた時間から――\nなにをしたって、解放してやらねばならないと。
3354 = "無論如何都得將路子從封閉的時間裡解放出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……過去から、未来へ。\nその流れの中、九洲全てを繋ぐ列車」
1598 = "「……從過去到未來，在這一過程中串聯起九州全境的列車」" 

# monologue
# JP: 理念であるなら、揺らぐこと無く一貫している。
3357 = "理念是始終如一，堅若磐石毫不動搖的。" 

# monologue
# JP: けれど形が、その理想形が、\nどうしても僕らには描き出せない。
3044 = "但是，我們怎麼都無法描繪出其理想的形態。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ただ単に線路を繋ぐだけでは、繋がらん。\nその上に、なにか――なにかが必要なのだ」
2182 = "「只是把線路串聯起來，是無法到達目標的。應該是……還缺少了某種不可或缺的要素」" 

# monologue
# JP: わかっているのに、みつけられない。\n理想の答えは必ずあると、感じるからこそもどかしい。
3328 = "明明我們都清楚，但就是找不到。正因為知道理想的答案是必定存在的，才覺得焦躁不堪。" 

# 【双鉄】
# display as 雙鐵
# JP: 「列車自体を、繋がりの象徴にしていくこと。\n人と人とを繋げること。それが何より、大切なことだ」
2431 = "「將列車自身塑造為聯繫的象徵。把人與人聯繫起來。這些才是最重要的目標」" 

# monologue
# JP: そうできなければ、鉄道は真には復活できない。
3115 = "否則，鐵路就不會真正復活。" 

# monologue
# JP: こころとこころを繋げなければ、交通手段に留まるのなら、\nいずれ再び、より進化したエアクラに駆逐されよう。
3448 = "若是不能聯繫起彼此的內心，只停留在交通手段的層面，遲早會再次被繼續進化的空凝機淘汰的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………ううむ」
1559 = "「…………唔」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん。いま、ちょこっとよかと？」
2466 = "「小雙，現在有空沒？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2310 = "「嗯」" 

# monologue
# JP: 声をかけられ、ほっとする。
3440 = "聽到這個聲音後我鬆了口氣。" 

# monologue
# JP: いつもと変わらぬ堂々巡りに、\nこのままいたら、僕は陥っていただろうから。
3450 = "若是再和往常一樣鑽牛角尖的話，我恐怕又會無法自拔的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉――もちろん、"よか"だ」
2684 = "「真闇姐……我當然有空」" 

# 【真闇】
# display as 真闇
# JP: 「ほんならよかった」
2837 = "「那就好」" 

# monologue
# JP: （む）
3575 = "（唔）" 

# monologue
# JP: なにか、いいことがあったのだろう。\n真闇姉の頬の一番高いところと鼻とが、ピンクだ。
3100 = "可能是發生了什麼好事吧。真闇姐顴骨上和鼻尖看起來粉撲撲的。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、今日はおやすみってゆーとったよね？」
2460 = "「小雙，你今天休息是吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。やすみだ。\nなにかあるなら、丸一日でも手伝えるぞ？」
2324 = "「嗯，是休息。如果需要我幫忙，我今天一整天都可以」" 

# 【真闇】
# display as 真闇
# JP: 「うふふ。そぎゃん言われたらおねーちゃん、\n双ちゃんのこと、ほんとに丸一日こき使ぉてしまうよ？」
2340 = "「嘿嘿，你都這麼說了，那姐姐可就要使喚你一整天兒咯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「望むところだ。\n――あ」
2641 = "「求之不得——啊」" 

# monologue
# JP: 答えて、すぐにそうかと気付く。\n真闇姉は、いつでも僕を守り続けてくれているのに――
3134 = "回答過後我馬上發現。真闇姐明明一直在守護著我——" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は……御一夜に戻ってきてからこちら、ただの一度も、\nろくに手伝いらしい手伝いもしてなかったのだな」
2503 = "「我……回到御一夜之後，還從來沒有幫過什麼像樣的忙啊」" 

# 【真闇】
# display as 真闇
# JP: 「そんなん！　エアクラ工場誘致ば撤回させてくれた、\nそんことが、なにより一番の助けになったけん」
2117 = "「你瞅你這話說的！讓空凝機工廠引進計劃都撤銷了，這忙幫得還不夠大是怎麼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうであるなら嬉しいが――\n本当にそうだとしても、違うのだ」
2521 = "「我很高興有幫到忙——但哪怕真是如此，我也不是這個意思」" 

# 【真闇】
# display as 真闇
# JP: 「違うって。なにが？」
2821 = "「那什麼意思啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「結果ではなく、過程で、僕は手伝いたい。\nもっと直接的に、具体的に。僕のこの手で、真闇姉を」
2504 = "「我不是想在結果上幫忙，而是想在過程中幫忙。我想用我的雙手，更直接、更具體地幫助你」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんの手で？」
2668 = "「用你的雙手？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。つまり、僕は単純に――」
2296 = "「嗯。也就是說，我只是——」" 

# monologue
# JP: 言葉がいきなり、喉にひっかかり重くなる。\n疑いの交じる余地もなく、本当の気持ちに違いないのに。
3485 = "話到嘴邊忽然說不出口了。明明這是我的真實想法，沒有絲毫需要質疑的餘地。" 

# 【真闇】
# display as 真闇
# JP: 「単純に？」
2180 = "「只是什麼呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2249 = "「唔！」" 

# monologue
# JP: 問い返されたそれだけで、胸がドキリと跳ね上がる。\n頬が――遅れて、顔全体が熱くなる。
3172 = "她這麼一問，就讓我心臟猛跳了一下。過了一會，整張臉就開始發燙起來。" 

# monologue
# JP: ああ――なんだ。\nつまりこれは……僕は、要するに照れているのか。
3129 = "啊……也就是說……我是在害羞啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまり僕は、単純に」
2073 = "「也就是說，我只是……」" 

# monologue
# JP: 感情を自覚できれば、制御できる。\nずうっと僕は、そうして来たから。
3300 = "既然明白自己的感情，那就能夠控制。我一直以來都是這麼過來的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――真闇姉に、恩返しをしたいのだ」
1538 = "「——想向你報恩」" 

# 【真闇】
# display as 真闇
# JP: 「おんがえし」
2363 = "「報恩」" 

# monologue
# JP: 真闇姉の表情が変わる。\n嬉しげな、なのに少しだけ困ったようにも見える笑顔に。
3399 = "真闇姐表情一變。變成了欣喜的，但又混雜著一些為難的笑容。" 

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんからしたら、\nむしろ双ちゃんに恩返しせんといけんって思うとけど」
2404 = "「姐姐才是要跟你報恩呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさか」
2493 = "「怎麼會呢」" 

# 【真闇】
# display as 真闇
# JP: 「そ？　ほんなら、\nおねーちゃんからの恩返しは、また今度にして」
2588 = "「是嗎？這樣的話，姐姐的報恩就先留到下次吧」" 

# monologue
# JP: 真闇姉の顔のピンクが、少し濃くなる。
3397 = "真闇姐臉上的粉色又艷麗了些許。" 

# monologue
# JP: かわいらしいと――ほとんど反射で思ってしまい、\nなぜだか再び慌ててしまう。
3265 = "我腦中幾乎是反射性地冒出了“可愛”二字，然後不知為何又慌亂了起來。" 

# 【真闇】
# display as 真闇
# JP: 「今日は、おねーちゃん。双ちゃんにたーっぷり恩返し、\nしてもらっても、よかと？」
2823 = "「那今天，姐姐能敞開了讓你報恩嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2310 = "「嗯」" 

# monologue
# JP: 手伝いという言葉であっても、\n恩返しという言葉であっても、僕の答えは変わらない。
3026 = "不管是用幫忙還是報恩的說法，我的回答都並不會改變。" 

# monologue
# JP: なにせ真闇姉が、僕に頼んでくれているのだ。
3359 = "畢竟拜託我的人是真闇姐。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さっきも言ったが――\nそれこそまさしく、望むところだ」
2514 = "「我剛剛也說過，我求之不得」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さすが――としか言いようがないな」
2516 = "「我只能說……不愧是你啊」" 

# monologue
# JP: 真闇姉への恩返しが、まさか朝酒とは思わなかった。\nが、今日は休みだ。いくら酔っても構わない。
3250 = "我沒想到真闇姐說的報恩，居然是在早上陪她喝酒。不過今天休息，喝得再醉都沒問題。" 

# monologue
# JP: （くいっ）
3573 = "（咕嚕）" 

# 【双鉄】
# display as 雙鐵
# JP: 「……なんと澄みきった味だ。\n"右田一"と同じ酒造で生まれた焼酎とは思えない」
1605 = "「……真是清爽的味道。不敢想像和“右田一”是出自同一間釀酒廠」" 

# monologue
# JP: ――そのうえ重なる旨さ故、コップを空にしてしまう。\n大して呑める体質ではないと自覚して、なお。
1463 = "——雖然我自知自己酒量並不好，但這酒的芳醇美味還是讓我一飲而盡了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「右田一の複雑な深みとはまるで違った味わいの、\n都会的な――けれども、実に旨い酒だ」
2728 = "「與右田一複雜深奧的滋味完全不同，很有都市氣息，但又很美味」" 

# 【真闇】
# display as 真闇
# JP: 「そ？」
2586 = "「是嗎？」" 

# monologue
# JP: 真闇姉が嬉しげに笑う。\n目と目があって――言葉が、急に出てこなくなる。
3401 = "真闇姐開心地笑了。我們四目相對……然後我又忽然說不出話來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁあ――うむ」
2251 = "「啊——嗯」" 

# 【真闇】
# display as 真闇
# JP: 「そっか……そっかぁ」
2591 = "「是嘛……這樣啊」" 

# monologue
# JP: 実に嬉しげに微笑んで、真闇姉は瞳を閉じてしまう。\nとても優しい沈黙が、酒造の中に満ちていく。
3400 = "真闇姐開心地微笑著，併合上雙眼。釀酒廠裡充滿了溫馨的沉默。" 

# monologue
# JP: ……ふつ、ふつと。\n\x%l麹;#00ffc040;麹%l;#;たちの歌う音だけが、かすかに聞こえる。
1520 = "……耳中只有間或傳入的輕微冒泡聲，就像是\\x%l麹;#00ffc040;酒麴%l;#;們在歌唱。" 

# 【真闇】
# display as 真闇
# JP: 「あ！」
2262 = "「啊！」" 

# monologue
# JP: その声に何かを感じたのだろう。\nゆる、ゆると、真闇姉は、優しく優しく[かいい,1]櫂入れをする。
3274 = "或許是這個聲音讓真闇姐感覺到了什麼。只見她拿著櫂棒開始輕柔地拌麴。" 

# monologue
# JP: ……時間さえもが、\n真闇姉の手にあわせてゆっくり流れていくようだ。
1505 = "……好像連時間都在隨著真闇姐的手緩慢地流逝。" 

# 【真闇】
# display as 真闇
# JP: 「これね？　実は、あん焼酎なんよ」
2790 = "「這個啊，其實就是“那個”燒酒」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
# 2262 = "「啊！」" 

# monologue
# JP: 言われて、慌ててもう一口。\n……であるのならば、この味わいも納得行くが――。
3174 = "她這麼一說，我急忙又喝了一口。……那樣的話，這個味道也可以理解了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当にこれが、真闇姉の言っていた――\n『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のみによって醸造管理した酒』なのか？」
2799 = "「這真的是你說過的——“完全由\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;釀造管理的酒”嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「そ。\x%l杜氏;#00ffc040;杜氏%l;#;の勘やら何やらを完全に排除した、\n完全データ管理主義の、結晶」
2434 = "「對。沒有憑藉\\x%l杜氏;#00ffc040;掌窖%l;#;的經驗和直覺進行任何干涉，完全數據管理主義的結晶」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
2248 = "「唔」" 

# monologue
# JP: コップを渡し、もう一杯を満たしてもらう。
3246 = "我將杯子交給她，讓她再幫我倒上一杯。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これほどの酒が、これほどあっけなく誕生するのか」
2804 = "「這麼美味的酒，居然這麼輕易地就誕生了啊」" 

# monologue
# JP: ――澄み切っていて、けれども無論、無味ではない。\nクマの水の、クマの米の、甘さがひっそり、舌に残る。
1464 = "——雖然清爽，但絕對不是沒有味道。隈元的水、隈元的米的甘甜還隱隱殘留在舌尖上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「言われてもにわかに信じられんな。\n優しさ……あるいは暖かささえ感じる味だ」
2247 = "「哪怕聽到了真相也很難讓人信服啊。這是一種很溫柔……或者說有溫度的味道」" 

# 【真闇】
# display as 真闇
# JP: 「あらまぁ」
2239 = "「哎喲喂」" 

# monologue
# JP: 思わずこぼした一言は、真闇姉の呆れた顔を呼んでしまう。
3252 = "我無心的一句話讓真闇姐露出了無奈的表情。" 

# 【真闇】
# display as 真闇
# JP: 「『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にはこころがある』――\nそぎゃんと教えてくれたのは、双ちゃんでしょおに」
1546 = "「“\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;是有心的”——明明是你這麼跟咱說的啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ。まさしく、そのとおりだ」
2325 = "「嗯，是啊，完全沒錯」" 

# monologue
# JP: 引退をした\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のほとんどは、\n再活用を検討されることもないまま、廃用される。
3521 = "退役的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;基本上不會有人考慮再利用，而是直接廢棄。" 

# monologue
# JP: そう知って『それならうちで』と言い出した真闇姉に、\n一番最初に伝えたことは、それだった。
3393 = "真闇姐知道此事後就表示要收留那些鐵路人偶，而我對她說的第一句話就是那句話。" 

# monologue
# JP: （\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にはこころがある。\nプライドも、意地も――悲しみも）
3558 = "（\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;是有心的。而且也有自尊、志氣——以及悲傷）" 

# monologue
# JP: そうと改めて噛み締め直し、もう一口。
3230 = "我再一次細細品味這句話，然後又喝了一口。" 

# monologue
# JP: ……やはり、旨い。\n透明感は、ほんのわずかも、濁らない。
1517 = "……果然很好喝。味道通透，不帶有一絲濁氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――完全データ管理主義での醸造をして。\nそれでもやはり、こころは宿るか」
1541 = "「——雖然是在完全數據管理主義下釀造出來的，但這酒還是有靈魂的啊」" 

# 【真闇】
# display as 真闇
# JP: 「かもしれんねぇ。\nみーちゃん、優しかこやけんねぇ」
2531 = "「或許如此吧。因為小宮很溫柔的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「みーちゃん、か」
2453 = "「小宮啊……」" 

# monologue
# JP: 旧帝鉄\x%l9600;#00ffc040;9600%l;#;形\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、39685号機\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、\n"みやこ"。
3082 = "前帝國鐵路\\x%l9600;#00ffc040;９６００%l;#;型\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;，３９６８５號機\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;“宮子”。" 

# monologue
# JP: 鉄道の町、旺宮の役所敷地で保存され――\nけれどもそれが災いとなった、悲運の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。
3458 = "被保存於鐵路之城大宮的市政府用地——但卻因此而遭遇不幸的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。" 

# monologue
# JP: （鉄道歴史館に近いゆえ、保存機自体が珍しくなく。\nさりとて収蔵されるほどの特徴の無かった、39685――）
3579 = "（因為距離鐵路歷史館很近，因此封存車本就不少見。但３９６８５身上卻沒多少值得收藏的特徵——）" 

# monologue
# JP: ゆえに解体の話が出たとき、地元では、\n反対運動に賛同してくれる人が極めて少なかったと聞く。
3142 = "因此，我聽說在提出拆解它的時候，贊成抵制運動的本地人少之又少。" 

# monologue
# JP: 遥か九洲の僕らにさえも、解体反対を必死で叫ぶ\nみやこの声が、届いてきたにも関わらず。
3124 = "哪怕宮子拚命反對拆解的呼聲甚至傳到了遠在九州的我們耳中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「自分の機関車を解体されてなお……\n優しいこで、いつづけていてくれるのか」
2164 = "「即便自己的機車被拆解了……她還能保持自己溫柔的性格嗎」" 

# 【真闇】
# display as 真闇
# JP: 「ん。優しすぎるほど、優しかこ」
2303 = "「嗯。她實在是溫柔得有點過頭了」" 

# monologue
# JP: 『もう鉄道には関わりたくない』――\n面接を受けに来たときの、第一声がそれだと聞いた。
3442 = "聽說她來面試時，開口的第一句話就是“我不想再和鐵路扯上關係了”。" 

# monologue
# JP: ゆえに僕もハチロクも日々姫も、\nみやことは、ほとんど接触したことがない。
3138 = "因此，我、八六、日日姬都與宮子沒有什麼接觸。" 

# monologue
# JP: （実際、今日も姿を隠してしまっている――\nいや、真闇姉が、あるいはどこかに逃したのかもな）
3571 = "（事實上今天也沒有見到她的身影——不，或許是真闇姐特地讓她迴避了吧）" 

# monologue
# JP: 真闇姉なら、そのくらいのことは当然しよう。\nみやこの傷は、であるなら。未だにそれほど、深いのだ。
3389 = "真闇姐會這麼做很正常。因為宮子實在是被傷得太重，到現在都未見痊癒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕の感想であると知れれば、\nみやこはそれだけで、頑なになってしまうかもしれん」
1592 = "「……如果知道這是我的感想，那宮子肯定會鑽牛角尖的」" 

# 【真闇】
# display as 真闇
# JP: 「ありゃま。みーちゃんと喧嘩でもした？」
2236 = "「哎呀，你和小宮吵架了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　いや、喧嘩などはせぬが――」
2332 = "「嗯？不，我們倒是沒吵架——」" 

# 【真闇】
# display as 真闇
# JP: 「よねぇ」
2078 = "「也是啊」" 

# monologue
# JP: 第一、それほどの接点もない。
3555 = "首先我們接觸得並不多。" 

# monologue
# JP: ゆえにあるいは……\n僕の心配しすぎであるのかもしれないが。
3281 = "所以或者……可能是我太擔心了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の感想ということで、受け取り方が変わりそうなら。\n『酒問屋の営業さん』の、感想として伝えて欲しい」
2400 = "「如果說是我的感想，她可能會往不好的方向理解。你就說是“酒行營業員”的感想吧」" 

# monologue
# JP: ……まったく、嘘をついてはいない。\n僕の身分の一部は未だ、右田一酒店の平営業ゆえ。
1506 = "……我可沒有撒謊。因為我還有一個身份是右田一酒行的普通營業員。" 

# 【真闇】
# display as 真闇
# JP: 「どぎゃんと、伝えてあげればよかと？」
2526 = "「我該怎麼向她傳達？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは、紛れもなく旨い酒だ。と。\nこの酒は、きっと広くで呑まれる酒だと」
2803 = "「這酒毫無疑問是美酒。而且肯定是能被大眾所接受的酒」" 

# 【真闇】
# display as 真闇
# JP: 「ああ」
# 2310 = "「嗯」" 

# monologue
# JP: 真闇姉に目で促され、コップを渡す。\n真闇姉もまた、同じ焼酎を一息に呑む。
3243 = "我在真闇姐的眼神的催促下把酒杯交給她。真闇姐也一口氣乾了一杯同樣的燒酒。" 

# 【真闇】
# display as 真闇
# JP: 「まっこと。言われてみたらこんクセの無さと切れの良さ。\n御一夜よりも、よそでの方が、うけるかもしれんねぇ」
2815 = "「還真是。聽你這麼一說吧，這乾淨而犀利的口味，說不定更受外地人歡迎呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、僕は思う」
2507 = "「我也是這麼想的」" 

# monologue
# JP: にいいっ――と、真闇姉が目で笑う。
3391 = "真闇姐的眼神中充滿了笑意。" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら双ちゃん。どぎゃんしたら、こん焼酎ば、\nたくさんの人に飲んでもらえるようになるかねぇ」
2832 = "「那小雙你說，該怎麼辦才能讓更多人喝到這個燒酒呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうだな」
1610 = "「……這個嘛」" 

# monologue
# JP: 広告宣伝のことは専門ではないが、\n日々姫の営業を兼務するうち、多くを学んだ。
3542 = "雖然廣告宣傳不是我的專長，但在幫日日姬做推廣的時候，我也學到了不少的知識。" 

# monologue
# JP: 基本に添うなら、強調すべきは他との差異。\nその差異を、最大限に活かせる形で売り出せばいい。
3149 = "基本上來說，就是強調它與其他酒的差異。在推銷過程中最大限度活用這個差異就行了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この新しい焼酎の最大のセールスポイントは無論、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;による完全データ管理醸造ということだ」
2801 = "「這種新燒酒的最大賣點自然是“在\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的完全數據管理下釀造”」" 

# 【真闇】
# display as 真闇
# JP: 「うん」
# 2310 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、そこを最大限に強調するため……。\n例えばそうだな。まずは観光列車の車販で――いや」
2358 = "「因此，為了最大限度地強調這點……比方說呢，首先在觀光列車進行車內售貨——不對」" 

# 【真闇】
# display as 真闇
# JP: 「……双ちゃん？」
1596 = "「……小雙？」" 

# monologue
# JP: 顔に、出てしまったのだろう。
3272 = "或許是我將想法表露在臉上了。" 

# monologue
# JP: 真闇姉に心配させてしまった気がして、\nあわてて理由を説明する。
3181 = "察覺到真闇姐的擔心，我慌忙說明了理由。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは難しい。あるいは無神経かと思ったのだ。\nみやこの気持ちを考えると」
2792 = "「這個或許不太行。顧及到宮子的感受的話，這樣有點太不體諒她了」" 

# 【真闇】
# display as 真闇
# JP: 「みーちゃんの気持ち？」
2454 = "「小宮的感受？」" 

# monologue
# JP: きょとん、と真闇姉の目が丸くなる。\n驚かせてしまったらしいということに、僕が驚く。
3402 = "真闇姐驚訝地瞪大了眼睛。我也跟著嚇了一跳。" 

# monologue
# JP: ……いや、そういえばさっきから……\nそこのところが、微妙に噛み合っていなかったような――
1491 = "……不，這麼說來，從剛才起……我們似乎就在這點上有點談不到一塊——" 

# 【双鉄】
# display as 雙鐵
# JP: 「聞かせてくれたではないか。面接のとき、みやこが、\n『二度と鉄道にはかかわりたくない』と、話していたと」
2106 = "「你不是說過，在面試的時候宮子說“我不想再和鐵路扯上關係了”嗎」" 

# 【真闇】
# display as 真闇
# JP: 「ああ！　そんなん」
2263 = "「啊！你說這個啊」" 

# monologue
# JP: 何を今更――言わんばかりに、真闇姉が笑い出す。\n笑ったその目が次の瞬間、いたずらっぽいアーチを描く。
3394 = "真闇姐笑了起來，彷彿在說“怎麼現在還說這個”。然後，她的眼神在下一瞬間就帶上了惡作劇的色彩。" 

# 【真闇】
# display as 真闇
# JP: 「そんなん。ゆーたら。\n双ちゃんだって、長いこと思うとったことでしょお」
2738 = "「要這麼說，你自個兒在很長一段時間裡，不也有過這樣的想法嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 2258 = "「啊」" 

# monologue
# JP: 頷くしかない。
3235 = "我只能點頭贊同。" 

# monologue
# JP: 僕は確かに、鉄道を憎み、\n遠ざけたいと――心の底から、願っていた。
3262 = "我確實曾經憎恨過鐵路，並發自內心地想遠離鐵路。" 

# 【真闇】
# display as 真闇
# JP: 「こころばあるけん、変われるんよ。\nあ。みーちゃんの場合は――“戻れる”？」
2635 = "「正因為有內心，人才能產生改變。啊，換作小宮的情況應該是——“恢復原樣”吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……だろうな。なにせ、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ」
1601 = "「……是啊。畢竟是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# monologue
# JP: 最初から鉄道を嫌う\x%lレイルロオド;#00ffc040;レイルロオド%l;#;など、\nこの世界のどこを探しても、きっと存在しないだろう。
3125 = "哪怕找遍世界，也絕對找不到從一開始就討厭鐵路的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。" 

# 【真闇】
# display as 真闇
# JP: 「元から大好きだったもんに裏切られて、\n傷つけられて、嫌ったような気持ちになって」
2732 = "「被原本最熱愛的事物背叛、傷害，並產生厭惡的心理」" 

# monologue
# JP: ……みやこのことを言われているとわかっていても、\nかつての自分を語られるような、わずかな面映さを感じる。
1528 = "……雖然我知道她是在說宮子，但又感覺她好像是在說曾經的我，不由得感覺有些羞愧。" 

# monologue
# JP: そうして、小さかった日々姫を思う。\nなるほど僕らは、その点で共感しあえていたのかもしれん。
3233 = "我又聯想到了小時候的日日姬。原來如此，我們或許是在這一點上產生了共鳴。" 

# 【真闇】
# display as 真闇
# JP: 「それでも、やっぱり好きなんよねぇ。\n『日ノ本鉄路』のニュース。みーちゃん、大喜びして」
2100 = "「但小宮打心裡還是喜歡鐵路的。就看見“日本鐵路”新聞的時候，那把她給高興的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうなのか」
2342 = "「噢……這樣啊」" 

# monologue
# JP: ならば、嬉しい。
3176 = "如果是真的，那就太好了。" 

# monologue
# JP: 僕らが積み上げてきた成果が、みやこのこころを、\nなぐさめ、喜ばせたというのなら。
3528 = "這說明我們厚積薄發的成果成功撫慰、取悅了宮子的心。" 

# 【真闇】
# display as 真闇
# JP: 「ほんでね？　貨物列車のことやらなんやら、\nたくさんたくさん、みーちゃん、うちに聞かせてくれて」
2418 = "「實話跟你說，小宮還跟我說了不少關於貨運列車的事吶」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。どんなことをだ？」
2343 = "「嚯，講了些什麼？」" 

# 【真闇】
# display as 真闇
# JP: 「冷蔵車？　やらいう最新の、電気冷蔵庫がついとお\n\x%l貨車;#00ffc040;貨車%l;#;ば、ひいたことあるとか、そぎゃんおはなし」
2380 = "「她說她拉過一種好像叫保溫車還是什麼來著？總之是裝了電冰箱的最新式\\x%l貨車;#00ffc040;貨運車廂%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「冷蔵車――大廃線前に、そんな車両があったのか」
2128 = "「保溫車——大廢線前還有這樣的車輛啊」" 

# 【真闇】
# display as 真闇
# JP: 「そ。そん車両なら、どぎゃん遠くにも鮮度ばっちりで\n貨物ば運んでいけるって。うふふ。」
2437 = "「對。那種車輛不管開多遠，都能一直保持貨物的新鮮度」" 

# monologue
# JP: 言ってくすくす、笑い声。
3488 = "說完，她輕聲笑了。" 

# 【真闇】
# display as 真闇
# JP: 「焼酎ば、常温保存で十分なのに、みーちゃんね？\n冷蔵車で日ノ本に運ばれる焼酎をいつか作りたい、って」
2561 = "「明明燒酒可以在常溫保存，但小宮說她將來想要釀出能用保溫車運往全日本的燒酒」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや。日ノ本中に運ぶというなら、\n冷蔵車の方が確かにいいな」
2029 = "「不。如果真要送往全日本的話，用保溫車確實比較好」" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃんと？」
2794 = "「這怎麼說的呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。れいなに聞いたことがある。夏場の\x%l貨車;#00ffc040;貨車%l;#;の車内は、\n50度を遥かに超える、蒸し風呂状態になることもあると」
2319 = "「嗯，我聽玲奈說過。夏季時\\x%l貨車;#00ffc040;貨運車廂%l;#;內有時候會遠遠超過五十度，變成三溫暖房一樣的狀態」" 

# 【真闇】
# display as 真闇
# JP: 「ありゃま。蒸し風呂。\nそぎゃん中では、さすがに変質が怖かとねぇ――あ！」
2234 = "「哎呀，三溫暖房啊。那還真保不齊有變質的危險——啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2330 = "「嗯？」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら逆に、\x%l客車;#00ffc040;客車%l;#;に冷蔵庫をつけるのとかは？\nその方が、観光列車らしいでしょお」
2797 = "「這樣的話，反過來在\\x%l客車;#00ffc040;客運車廂%l;#;裡裝冰箱呢？這麼整更有觀光列車的味道吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありかもしれんな。\n電力は、電源車をつけ供給してもらうこととして」
2791 = "「這個想法或許可行。電力的話就透過掛接發電車來保證」" 

# 【真闇】
# display as 真闇
# JP: 「電源車。そぎゃんものもあると？」
2677 = "「發電車……還有這東西啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「やはり帝鉄最末期に登場したものだそうだ。\n残念ながら活躍の前に帝鉄が倒れてしまったが」
2407 = "「它好像也是在帝國鐵路的最末期出現的。很遺憾，在它大展身手之前，帝國鐵路就倒閉了」" 

# 【真闇】
# display as 真闇
# JP: 「もったいなかとねー！　そぎゃんとがあって空調やら\nなんやらできたら、列車の旅も全然違ぉたろーにねぇ」
2368 = "「多可惜呀！要真有那東西，再加上空調什麼的，列車旅行也就完全不一樣了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。いっそ豪華に、\n電源車と冷蔵車をともに\x%l編成;#00ffc040;編成%l;#;し――っ！！」
2579 = "「是啊，乾脆奢侈點，在\\x%l編成;#00ffc040;編組%l;#;裡同時掛發電車和保溫車——！！」" 

# monologue
# JP: パチンと、ハマる。\n繋がり始める。全てが、すごい勢いで。
3433 = "終於對上了。一切終於開始以迅猛的速度連接在一起了。" 

# monologue
# JP: 頭が加熱してると感じる。\n興奮ではなく――脳が、全力で回転している。
3153 = "大腦開始加熱。原因不是興奮——而是大腦在全力運作。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん？」
2467 = "「小雙？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか……酒だ。焼酎だ――\nいや、そこに留まる必要はない」
2438 = "「對了……酒啊。燒酒啊——不，沒必要局限於這裡」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、なにが留まらんと？」
2459 = "「小雙，什麼局限啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「繋がりがだ。九洲を繋げる手段がだ。\nなにかが足りぬと――ずうっと僕は悩んでいたが」
2057 = "「串聯九州的手段。我一直在煩惱其中到底有什麼不足」" 

# monologue
# JP: 案は百出――いや、千さえ優に超えただろう。\nその中には、素晴らしい輝きを放つ物も、少なくなかった。
3296 = "方案起碼想過上百種——不，甚至上千種了。其中有很多方案也不乏亮點。" 

# monologue
# JP: けれどもそれでも頷けなかった――\nもう少しだけ待って欲しいと粘った理由を、いま理解した。
3041 = "但是我都沒有點頭。我現在終於能理解，我如此堅持“再觀望一會”的理由了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『オール御一夜体制』では、それでもまだまだ――\n全然、足りていなかったのだ」
2469 = "「就算靠“全御一夜體制”，也還完全不夠」" 

# 【真闇】
# display as 真闇
# JP: 「ああ！！」
2269 = "「啊！！」" 

# monologue
# JP: 言った瞬間、真闇姉は頷いてくれる。
3487 = "話音剛落，真闇姐就點了點頭。" 

# monologue
# JP: もう全力で頷いて、\nそうして少し慌てたように、スマホを取り出す。
3165 = "她用力地點頭，然後有些慌張地掏出手機。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、ひーちゃん、どこにおると？」
2463 = "「小雙，小日在哪呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は確か――そうだ、術仙に向かうといっていた」
2559 = "「日日姬好像——對，她去術仙了」" 

# 【真闇】
# display as 真闇
# JP: 「やったら」
2816 = "「那——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「レールショップで合流するよう話してみてくれ。\n僕も、みんなに連絡してみる」
2757 = "「跟她說在鐵路商店與我們會合。我也來聯繫大家」" 

# 【真闇】
# display as 真闇
# JP: 「ん」
# 2310 = "「嗯」" 

# monologue
# JP: 真闇姉が電話をかけはじめる。\n僕もすぐさま、家電で。
3388 = "真闇姐打起了電話。我也急忙打起了座機。" 

# monologue
# JP: （Trrrrr……Trrrrr――）
3577 = "（嘟……）" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい。こちら、御一夜鉄道レールショップですよぉ」
2287 = "「喂，這裡是御一夜鐵路商店哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな、すまん。ポーレットはいるか。\n緊急会議の開催をおねがいしたいのだ」
2663 = "「玲奈，打擾一下，波萊特在嗎？我想召開緊急會議」" 

# 【れいな】
# display as 玲奈
# JP: 「わわわ！　きんきゅうですかぁ！\nすぐポーレットをよびますねぇ！　ポーレットぉ」
2224 = "「哇哇哇！緊急是嗎！我立刻去叫波萊特！　波萊特——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はいはい、れいな。お電話誰から？」
2122 = "「來了來了，玲奈。誰打來的電話？」" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんからですよぉ？\nきんきゅうのお話でぇす」
2606 = "「是雙鐵先生，說有緊急的事情」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　双鉄くんっ！！？\n――って、えええ！　緊急！！？」
2241 = "「哎？雙鐵君！！？——呃，哎哎哎！緊急！！？」" 

# monologue
# JP: バタバタ、足音。
3263 = "我聽見了啪嗒啪嗒的腳步聲。" 

# 【ポーレット】
# display as 波萊特
# JP: 「もしもし、双鉄くん？　わたし、ポーレットです」
2285 = "「喂喂，雙鐵君？是我，波萊特」" 

# 【双鉄】
# display as 雙鐵
# JP: 「何時でもいい。レールショップを使わせて欲しい」
2522 = "「我要借用一下鐵路商店，不管什麼時候都可以」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。それはもちろん――\nけど、どうしたんです？　いったいなにが？」
2329 = "「嗯，這個自然是可以——不過，這是怎麼了？發生什麼事了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「見出したように思うのだ。\n未来へのレールを繋げるための、その[すべ]術を」
2519 = "「我好像找到串聯起通向未來的鐵軌的方法了」" 

# monologue
# JP: ――ハチロク、日々姫。ポーレット、れいな。凪。ふかみ。\n真闇姉、稀咲、そして、上空にはもちろんナビ。
1460 = "——八六、日日姬、波萊特、玲奈、凪、深美、真闇姐、稀咲都到了，Ｎａｖｉ自然也在上空。" 

# monologue
# JP: 嬉しく思う。緊急極まる会議招集であったにも関わらず、\n最初期からのメンバーは、残らず、顔を揃えてくれた。
3248 = "我很開心。明明是靈光一現緊急召開的會議，但元老成員全部都出席露面了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オール九洲をつくるのだ」
2511 = "「我們要創造全九州」" 

# monologue
# JP: ゆえに、前置き無く結論を。\nだが反応は、思ったほどには芳しくない。
3140 = "因此，我直接說出了結論。但反應沒我想像中好。" 

# monologue
# JP: 誰もがぽかんとした顔をして、互いに視線を交わし始める。\n――その沈黙を、ハチロクの声が静かに壊す。
3285 = "所有人都一臉愣愣的表情你看我，我看你。此時，八六的聲音平靜地打破了沉默。" 

# 【ハチロク】
# display as 八六
# JP: 「……オール九洲、とは、\nどのようなものでございましょうか？」
1557 = "「……“全九州”具體是指什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今、僕達がその力強さを実感している、オール御一夜、\nオール湯医線の連帯感。これを、九洲全土に広げる」
2664 = "「現在我們都能感受到全御一夜、全湯醫線的團結有多強烈。我們要把它擴大至九州全境」" 

# 【稀咲】
# display as 稀咲
# JP: 「理想論。馬鹿げた話。それができれば苦労はない。\n――双鉄を知る前だったら、そう一笑に付していたけど」
2706 = "「紙上談兵，荒謬至極。如果能辦到就用不著這麼辛苦了。——如果我還沒認識雙鐵，我肯定會如此一笑置之的」" 

# monologue
# JP: それがおそらく、みなの第一印象であったのだろう。\n稀咲の率直な指摘は、ほっとしたような空気を生む。
3526 = "這或許就是大家的第一印象吧。稀咲直截了當的“批評”反倒讓氣氛放鬆了下來。" 

# 【稀咲】
# display as 稀咲
# JP: 「今ならわかる。その夢物語を叶えるための――\n双鉄、キミは、具体的な方法を思いついたんだね？」
2102 = "「但現在我心裡很清楚。雙鐵，你想到了具體如何實現這種天馬行空的想法吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、列車だ。観光列車。僕らの未来行き列車を、\n九洲全ての人達に、『自分の列車』と思ってもらう」
2676 = "「當然，就是觀光列車。讓我們的“發往未來列車”成為全九州人民心中“屬於自己的列車”」" 

# 【凪】
# display as 凪
# JP: 「わおわお！　そりゃ良かとねー！！」
2230 = "「哇哦哇哦！這個想法好！！」" 

# 【ふかみ】
# display as 深美
# JP: 「いいけど、凪ちゃん。まだこれ、\n全然具体的な方法じゃないよ？」
2795 = "「這想法確實不錯。可是小凪，這還完全不算具體的辦法哦」" 

# 【凪】
# display as 凪
# JP: 「ああ、言われりゃそうばい」
2279 = "「啊，這麼一說還真是咧」" 

# monologue
# JP: ……ふたりでいれば、凪とふかみは変わらない。
1499 = "……凪和深美在一塊時，她們依舊是老樣子。" 

# monologue
# JP: いつものコンビネーションで、\n会議を心地よくかき混ぜてくれる。
3069 = "兩人一如既往的配合讓會議的氣氛活躍了起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「どうやって、『自分の列車』って、\n九洲全ての人達に、思ってもらえるようにするんです？」
2492 = "「怎麼做才能讓全九州的人都認為它是“屬於自己的列車”呢？」" 

# 【れいな】
# display as 玲奈
# JP: 「九洲は、ひろおいですよぉ！　れいな、それって、\nとってもむつかしいと思いますぅ」
2060 = "「九州是很大的！玲奈覺得這個想法很難」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。れいなの言うとおりだ。九洲は広く、多様だ。\n地域同士のライバル心も、決して弱いものとはいえない」
2439 = "「對，玲奈說得沒錯。九州地大物博，各個地區之間的爭鬥心也不容忽視」" 

# 【稀咲】
# display as 稀咲
# JP: 「だよね。そこには、隈銀も大いに苦労させられている」
2570 = "「是啊。隈元銀行也因此大傷腦筋來著」" 

# 【双鉄】
# display as 雙鐵
# JP: 「問題が大きく複雑にすぎるとき、\nまず最初に試みるべきは――」
2672 = "「當問題變得很複雜的時候，首先要嘗試的是——」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ？　分解？　小分けにすると？」
2281 = "「啊？分解？把九州分散開來？」" 

# monologue
# JP: さすが日々姫は、僕のやり方を熟知している。\n頷きを返すまでもなく、自ら考えはじめてくれる。
3021 = "不愧是日日姬，她很熟悉我的作風。沒等我點頭，她就開始思考了起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「九洲を分解すると――まずは、県とね。隈元、福丘、\n左賀、永崎、大板、宮嵜、鹿兒島」
2733 = "「要分解九州的話——首先是縣級。隈元、福岡、佐賀、長崎、大分、宮崎、鹿兒島」" 

# 【凪】
# display as 凪
# JP: 「ん？　七つしかなかとよ？　隠岐縄を数えても八つばい！\n一つ、どこに置き忘れたと？」
2187 = "「只有七塊地方啊。算上沖繩也只有八塊！是不是還忘了一塊什麼地方啊？」" 

# 【ふかみ】
# display as 深美
# JP: 「違うよ凪ちゃん。九洲が九つなのは、旧国名でのこと。\n聞いたことあるでしょ？　肥御とか、颯馬とか」
2040 = "「不是的，小凪。九州中的“九”是指舊國名。你應該有聽說過肥後、薩摩之類的名字吧？」" 

# 【凪】
# display as 凪
# JP: 「ああ！　あれなら九つあると？」
2268 = "「啊！用舊國名算的話就有九個了？」" 

# 【真闇】
# display as 真闇
# JP: 「[ひぜん,1]肥善、[ひご,1]肥御。[ぶぜん,1]豊善、[ぶんご,1]豊御。[ちくぜん,1]筑善、[ちくご,1]筑御。\n[ひゅうが,1]日牙、[おおすみ,1]大角――それから[さつま,1]颯馬で、はい、九つ」
2724 = "「肥前、肥後，豐前、豐後。筑前、筑後，日向、大隅——還有就是薩摩。嗯，正好九個」" 

# 【凪】
# display as 凪
# JP: 「わおわお！　九洲そろったばーい！」
2225 = "「哇哦哇哦！九州齊工作了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その九洲を、九つの客室にする。\n寝台\x%l客車;#00ffc040;客車%l;#;三輌に、三室ずつで」
2429 = "「將九州分為九間客房。三節臥鋪\\x%l客車;#00ffc040;客運車廂%l;#;，每節分三間房」" 

# monologue
# JP: （がたっ！）
3576 = "（喀啦！）" 

# monologue
# JP: 日々姫が、そしてポーレットが、\n思わずだろう、立ち上がる。
3322 = "日日姬，還有波萊特都忍不住站了起來。" 

# monologue
# JP: ふたりともすぐに座り直して――\n日々姫は猛然、スケッチブックに鉛筆を走らせ始める。
3070 = "兩人又很快坐下，日日姬迅速地在素描簿上畫了起來。" 

# 【稀咲】
# display as 稀咲
# JP: 「例えば、隈元――[ひご,1]肥御なら肥御のものだけで統一した。\nひとつひとつを、そうした客室に作り上げる？」
2636 = "「比如說隈元——如果是肥後的話，就統一為肥後風格。像這樣依次打造客房？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ[ひご,1]肥御なら、御一夜の木工家具。八ツ城のい草の畳。\n[あまくさ,1]雨草の焼物。[やまが,1]山家の灯籠――そうした物で調度を揃える」
2314 = "「嗯，如果是肥後的話，就用御一夜的木工家具、八代的草蓆、天草的陶器、山鹿的燈籠——像這樣來備齊家具」" 

# 【ふかみ】
# display as 深美
# JP: 「それ……絶対、嬉しいです。自分の土地で作られた物が、\nどんなに小さいひとつでも、観光列車の中にあったら」
2785 = "「這……不管是多小的東西，知道觀光列車中有在自己的土地上誕生的東西，那絕對會很高興的」" 

# monologue
# JP: 強く頷く。\n――誰からも異論はでてこない。
3164 = "她用力地點了點頭。大家對此都全無異議。" 

# monologue
# JP: ならば、ここを共通認識として、深めていこう。
3535 = "那麼將這一點作為共識繼續深入吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「客室に置きたいものや、客室を統一するコンセプトは、\nそれぞれの地域で、公募したいと考えている」
2859 = "「關於在客房放置的物品，還有客房的統一主題，我打算在各個地區進行徵集」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それ！　すごくいいと思います！！　広報にもなるし、\n参加することで『自分の列車』って思ってもらえる」
2524 = "「我覺得這個主意很好！！不僅能起到宣傳效果，還能透過親身參與的方式讓大家產生認同感」" 

# 【稀咲】
# display as 稀咲
# JP: 「その上、政治的な圧力も回避できるね。\n選考も投票にして、その過程を完全に可視化するなら」
2717 = "「而且，如果以投票模式進行選拔，將過程完全公開化的話，還能迴避政治上的壓力」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか、そうした懸念も発生するか」
2243 = "「哦——是啊，還有這個擔憂啊」" 

# 【真闇】
# display as 真闇
# JP: 「……圧力ばかけてくるような団体は、\n組織票、かならず動員してくるとよ？」
1589 = "「……如果有組織要對我們施加壓力，他們絕對會動員投組織票的」" 

# 【稀咲】
# display as 稀咲
# JP: 「あ」
# 2258 = "「啊」" 

# 【ふかみ】
# display as 深美
# JP: 「そこは投票の仕組みづくりでなんとかできると思います。\n日ノ本観光業組合さんが、その辺のこと、お詳しいです」
2860 = "「關於這點，我覺得可以用投票的機制來應對。日本觀光業行會對這方面的事很了解」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、そこでお話教えてもらえると？」
2455 = "「小深，你覺得他們會幫助我們？」" 

# 【ふかみ】
# display as 深美
# JP: 「うん。できると思う。\nっていうか、うん！　聞いてくる！」
2316 = "「嗯，應該會的。不，嗯！我會去問的！」" 

# monologue
# JP: なんと嬉しいことだろう。なんとこころ強いことだろう。\nこれならば、ああ――僕は、レールでいるだけでいい。
3167 = "她的態度令人分外地高興和安心。啊，這樣一來——我只要化身為鐵軌就行了。" 

# monologue
# JP: 僕がレールを示すなら、\x%l保線;#00ffc040;保線%l;#;を、信号を、運転を、司令を。\nみながそれぞれ、見事に務めてくれるのだから。
3236 = "我只要鋪下鐵軌，大家就會各自分工完成\\x%l保線;#00ffc040;巡線%l;#;、信號、駕駛、指揮的工作。" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、客室だけではまったく足りない。ゆえ、物販や、車内サービスの品でも、同様に各地特産品を揃える」
2675 = "「當然，光靠客房還完全不夠。因此在車內銷售和贈品方面也同樣要用上各地的特產」" 

# 【れいな】
# display as 玲奈
# JP: 「それってでもでも、\nものすごい量になっちゃいますよぉ？」
2203 = "「可是，這樣的話種類可就很多了呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。故に、各地の金看板、例えば福丘の明太子や、\n隈元の馬刺し等だけを、常設のものと位置づける」
2568 = "「是啊。因此，我建議只將各地的金字招牌作為常設商品，比如福岡的醃鱈魚子，隈元的馬肉刺身等」" 

# 【凪】
# display as 凪
# JP: 「寝台なら長丁場になるでしょお。\n馬刺しやら、痛んじゃうんじゃなかと？」
2552 = "「既然是臥鋪，那路程肯定會很長吧。馬肉刺身不會腐爛嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこは、冷蔵車を復元新造して対応する。\n冷蔵車とは、走る冷蔵・冷凍庫のようなものだ」
2510 = "「我們要修復並新造保溫車來解決這個問題。所謂保溫車，就類似於能在鐵軌上跑的冰箱、冰櫃」" 

# 【凪】
# display as 凪
# JP: 「わおわお！　すごかと！！　そしたらそしたら、\n九洲各地のアイスクリームも食べれちゃうばい！！」
2228 = "「哇哦哇哦！好棒！！這麼一整就能吃到九州各地的冰淇淋了！！」" 

# 【ふかみ】
# display as 深美
# JP: 「それだけじゃなくて、ジュースとか！\nあ！！　そうか、お酒、焼酎とかも」
2032 = "「不光是這些，還有果汁之類的！啊！！對了，酒類比如燒酒或許也可以」" 

# 【真闇】
# display as 真闇
# JP: 「焼酎・お酒なら、おねえちゃんも役にたてると。\n九洲各地の酒造さんに、話ばできるけん」
2658 = "「燒酒等酒類的話，姐姐我也能幫上忙。我可以跟九州各地的釀酒廠商量」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大歓迎だ。九洲各地、それぞれ自慢の焼酎や酒を客室で。――か、可能であればビュッフェ等で」
2830 = "「那太好了。將九州各地引以為傲的燒酒和清酒等擺放在客房——說不定也可以放在飲食櫃臺等地方」" 

# 【日々姫】
# display as 日日姬
# JP: 「ビュッフェじゃだめ。食堂車じゃないと。\nだってこれ、時間を楽しみにして売る列車でしょ？」
2184 = "「只是飲食櫃臺的話不行，必須有餐車才行。因為這列車的賣點不就是享受旅途的時光嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにそうだ。\nなら、食堂車を\x%l編成;#00ffc040;編成%l;#;に加えるべきか」
2696 = "「確實沒錯。那就要在\\x%l編成;#00ffc040;編組%l;#;裡再加掛一輛餐車才行」" 

# 【ポーレット】
# display as 波萊特
# JP: 「けどこれ――九洲全土を周遊しますよね？　将来的に。\nそうできなくっちゃ、意味が無い」
2194 = "「可是……列車將來的遠大目標是周遊九州全境吧？辦不到這點就沒有意義了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2572 = "「是啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だとすると\x%l編成;#00ffc040;編成%l;#;。長く大きくなりすぎると、\n列車交換、できない路線がでてきちゃうかもです」
2192 = "「可是\\x%l編成;#00ffc040;編組%l;#;過長的話，或許在某些線路就沒辦法和其他列車交會了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2330 = "「嗯？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だって、今いってるだけでも、機関車、\x%l客車;#00ffc040;客車%l;#;三輌、\n冷蔵車、食堂車。で、電源車も必要になりますよね？」
2359 = "「因為，光是我們現在討論的就有機車、三節\\x%l客車;#00ffc040;客運車廂%l;#;、保溫車、餐車了。而且還需要發電車吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。そう考えると、今の時点で七輌か」
2584 = "「是啊，這麼一想，現階段就已經是七節編組了啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「本務機が8620になるなら、\x%l炭水車;#00ffc040;炭水車%l;#;の分もあわせて、\n実質的には八輌長」
2622 = "「本務機車是８６２０的話，就還要再加上\\x%l炭水車;#00ffc040;煤水車%l;#;，實際上是八節」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――」
2288 = "「嗯——」" 

# monologue
# JP: ハチロクが沈んだ声を出す。\nつまりは僕は……何かを見落としてしまっているのか。
3073 = "八六的聲音有些低沉。也就是說我……遺漏了什麼嗎？" 

# 【双鉄】
# display as 雙鐵
# JP: 「その長さだと、問題があるのか？」
2793 = "「這個長度有什麼問題嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。九洲の線路は、\x%l単線;#00ffc040;単線%l;#;で、普段の運用が１、２輌。\n長くても四輌とかそういうところ、珍しくないですから」
2592 = "「是的。九州的線路是\\x%l単線;#00ffc040;單線%l;#;的，平時的列車編組短則一、兩節。長到四節的編組也還算常見」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2330 = "「嗯？」" 

# 【ハチロク】
# display as 八六
# JP: 「長くて四輌を想定して作られている\x%l待避線;#00ffc040;待避線%l;#;に、\n八輌編成の列車を無理やり押し込もうとしても」
2398 = "「如果試圖將八節編組的列車，強行塞進原為四節編組設計的\\x%l待避線;#00ffc040;待避線%l;#;內……」" 

# 【れいな】
# display as 玲奈
# JP: 「わわわ！　はみだしちゃいますよぉ！\nそうしたら、列車、すれちがいできないですぅ」
2221 = "「哇哇哇！列車長度就會超出了！這樣列車就無法交會了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あっ！」
# 2262 = "「啊！」" 

# monologue
# JP: そこは、まさしく盲点だった。
3525 = "這完全是盲點。" 

# monologue
# JP: 線路の強度――耐えられる重さについては、\n考慮せねばと思っていたが――
3227 = "我之前只擔心過線路的強度——能承受的重量，沒想到——" 

# 【稀咲】
# display as 稀咲
# JP: 「そこは、ボクに。\nというか、日ノ本鉄路に任せて欲しい」
2786 = "「這件事請交給我，不，交給日本鐵路來辦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲」
2701 = "「稀咲」" 

# 【稀咲】
# display as 稀咲
# JP: 「無いものだったら、作ればいいのさ」
2396 = "「如果沒有的話，建起來就好了」" 

# monologue
# JP: 稀咲の軽い一言に、\nポーレットが眉根を[ひそ]顰めてしまう。
3422 = "稀咲輕描淡寫的一句話讓波萊特皺起了眉頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう簡単にいうけど、稀咲。身の丈にあまる設備は、\n固定負担をいたずらに増やすだけだから」
2337 = "「嘴上說很簡單，可是稀咲。不匹配的設備只會徒增固定負擔的」" 

# 【稀咲】
# display as 稀咲
# JP: 「『行き違いのためだけの\x%l待避線;#00ffc040;待避線%l;#;』で考えるなら、\n確かに、ポーレットの指摘通りになるだろうね」
2392 = "「如果從“用來交會的\\x%l待避線;#00ffc040;待避線%l;#;”的角度來考慮，波萊特的批評確實沒錯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……行き違いのためだけの\x%l待避線;#00ffc040;待避線%l;#;じゃない――\nなら？」
1574 = "「……不是用來交會的\\x%l待避線;#00ffc040;待避線%l;#;——那是什麼？」" 

# 【稀咲】
# display as 稀咲
# JP: 「鉄道駅を、今度は観光の拠点として、再び、都市計画の\n中心に据える。復線や既存設備の改良を、そうして行う」
2432 = "「將鐵路車站作為觀光的據點，讓它重新成為都市計劃的主角。就在這個框架下推進恢復廢線及改良現存設備的工作」" 

# 【双鉄】
# display as 雙鐵
# JP: 「都市計画……」
2852 = "「都市計劃……」" 

# 【稀咲】
# display as 稀咲
# JP: 「『レイル・ロマネスク湯医線』――\nあれを、全ての路線でやればいいっていうお話さ」
1548 = "「“幻想鐵路·湯醫線”——把那個推行到所有線路就可以了」" 

# monologue
# JP: ごくあっさりと言い切って、\n稀咲はニヤリと笑ってみせる。
3421 = "稀咲輕描淡寫地說完後，臉上微微一笑。" 

# 【稀咲】
# display as 稀咲
# JP: 「"鉄道路線を、それぞれの街の、駅の、カタログに"。\nそれは、双鉄の基本アイディアだったじゃないか」
1552 = "「“讓鐵路路線成為各個城鎮、車站的商品目錄”。這不是雙鐵的基本方針嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど！　鉄道会社はそれぞれだから。\n全部が全部、そこに賛成してくれるとは思えないし」
2208 = "「可是，鐵路公司的想法各異。我不認為所有公司都會贊成」" 

# 【稀咲】
# display as 稀咲
# JP: 「そこは、泥臭い説得しかない。それでももしも、\nどうしても同意を得られないのなら」
2789 = "「這個只能厚著臉皮說服他們了。如果對方堅決反對的話……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「得られないなら？」
2494 = "「怎麼辦？」" 

# 【稀咲】
# display as 稀咲
# JP: 「外せばいいさ。そうして、別途、新路線を作る。\nなにせこれは、観光インフラの創出っていう話だから」
2539 = "「把他們排除在外就行了。然後另行開闢新路線。畢竟這是牽涉到觀光基礎設施建設的重大問題」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 2258 = "「啊」" 

# monologue
# JP: こっくり、どこかあどけないような仕草で、\nポーレットが頷く。
3348 = "波萊特用有些純真可愛的動作點了點頭。。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……三セクだったら、自治体を説得すればいいし。\n完全独立経営だったら、逆に、自治体の協力を得て――」
1587 = "「……如果是第三部門鐵路，去說服自治體就行了。如果是完全獨立經營，那就反過來跟自治體合作——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、外すのはまずい」
2047 = "「不，不可以排除」" 

# monologue
# JP: 稀咲が出来るといっている。\n難色を示したポーレットも、実現可能性を検討し始めた。
3419 = "稀咲說辦得到。波萊特雖面露難色，但也開始探討實現的可能性。" 

# monologue
# JP: ならば実際できようし、\n恐らくは、成功率も低くなかろう。が――
3533 = "那說明這個辦法確實是可行的，而且成功率應該不會低。但是——" 

# 【稀咲】
# display as 稀咲
# JP: 「どうしてさ？\nボクとしては、これこそが、最適解だって思うけど？」
2644 = "「為什麼？我認為這是最適合的方法了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲の計算に異論はない。ないのだが――\nこの解は、最適であるにせよ、最善ではない」
2705 = "「稀咲，我不懷疑你的計算。不過——這個方法就算是最適合的，也不是最好的」" 

# 【稀咲】
# display as 稀咲
# JP: 「最善？　――善、か。\nなるほどね、つまり、双鉄は」
