2362 = "「在這種情況下，靠８６２０單機牽引包括保溫車、發電車在內的六節沉重車廂行駛，這恐怕——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、極めて厳しいな。\nとなると、\x%l補機;#00ffc040;補機%l;#;が必要か」
2166 = "「原來如此，確實很困難啊。這樣一來就需要\\x%l補機;#00ffc040;補機%l;#;了」" 

# 【ハチロク】
# display as 八六
