2596 = "「是的。可以的話，選擇貨運機車——\\x%l動輪;#00ffc040;動輪%l;#;四軸的機車是最合適的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 2310 = "「嗯」" 

