3258 = "我看向波萊特。她露出了一臉為難的表情。" 

# 【ポーレット】
# display as 波萊特
# JP: 「実は、みかん鉄道さんで、\x%l入換機;#00ffc040;入換機%l;#;に使ってた機関車と、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が余剰しそう、って話はあるんです」
2143 = "「其實，我聽說在橙鐵路有空閒的，暫時只用作\\x%l入換機;#00ffc040;調車機車%l;#;的機車和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2245 = "「哦哦！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど、そのこはほんとにちいちゃくて非力だから。\n寝台列車の\x%l補機;#00ffc040;補機%l;#;とかは、とても無理だと思います」
2204 = "「可是，那輛車不僅小，功率也不高。實在不可能用來作為臥鋪列車的\\x%l補機;#00ffc040;補機%l;#;」" 

# 【双鉄】
# display as 雙鐵
