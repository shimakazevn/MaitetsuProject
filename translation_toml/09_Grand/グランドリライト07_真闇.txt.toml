2836 = "「那就以這個方針為前提進行完善吧。現階段還有什麼明顯問題的話，希望你們提出來」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。ひとつだけよろしいでしょうか」
2861 = "「雙鐵少爺，我能說一句話嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
2673 = "「當然」" 

# 【ハチロク】
# display as 八六
