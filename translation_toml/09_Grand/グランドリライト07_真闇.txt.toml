2042 = "「不是膽小的小女孩，是深美」" 

# 【路子】
# display as 路子
# JP: 「あ！　そう。ふかみちゃん。ふかみちゃんだね。\n最近はもう、そんなにおどおどもしてないもんね」
2266 = "「啊！對哦，小深，是小深啊。她最近已經不那麼膽小了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
2572 = "「是啊」" 

