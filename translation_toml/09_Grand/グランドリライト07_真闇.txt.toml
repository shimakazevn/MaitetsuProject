2387 = "「如果九星發車的話，８６２０就要開進肥薩線——越過矢岳駛向隼人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
# 2572 = "「是啊」" 

# 【ハチロク】
# display as 八六
