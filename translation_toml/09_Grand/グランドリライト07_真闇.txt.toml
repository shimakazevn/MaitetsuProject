# JP: 「――ああ」
1537 = "「——啊」" 

# monologue
# JP: ……ゆっくり、目覚める。\n目覚めた先が、夢の中だとわかった上で。
1529 = "……雖然明白醒來之後依舊是夢，但我還是慢慢地睜開眼睛。" 

# monologue
# JP: この音だけは、いつでも確かだ。\n路子の夢に、僕はまた、帰ってこれたと教えてくれる。
3096 = "只有這個聲音一直都是明確的。它告訴了我，我又回到了路子的夢之中。" 

# 【路子】
# display as 路子
# JP: 「そーちゃん、起きた？」
2462 = "「小雙，你醒了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。おはよう、路子。\nなんだか、とても久しぶりなような気がするな」
2307 = "「嗯。早安，路子。感覺我們好久沒見了」" 

# 【路子】
# display as 路子
# JP: 「そうかな？　そうかも。みち、わかんない。\nこのれっ車、だって、いっつも同じだから」
2587 = "「是嗎？可能是吧。小路不太清楚。因為這輛列車一直都是一個樣子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう……なのか」
2604 = "「是這樣……嗎」" 

# monologue
# JP: ならば、父さんと母さんはまだ、\nこの列車を見つけ出すことができずに、探している。
3536 = "那麼，父親母親應該到現在還沒有發現這輛列車。" 

# monologue
# JP: ――後東氏の経営参加により、『日ノ本鉄路』は、\nこの上ない滑り出しを見せ、盛んに報道されたというのに。
3326 = "明明在後東先生參與經營後，“日本鐵路”就發展得特別順利，新聞上也大幅報導了。" 

# monologue
# JP: （いや……幽霊なり亡霊なり、は――\n報道などを、確かめることができないものか？）
3569 = "（不……幽靈和亡靈之類的看不到新聞之類的東西嗎？）" 

# monologue
# JP: あるいは全てが、僕の深層心理の単なる働きであるのなら。\n『まだ足りない』と、どこかで思ってしまっているか――
3032 = "也許一切都只是我的深層心理使然呢？是我心裡還隱隱地認為“還不夠”嗎——" 

# 【路子】
# display as 路子
# JP: 「平気だよ？　そうちゃん」
2465 = "「小雙，沒事的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　なにがだ？」
2334 = "「嗯？你指什麼？」" 

# 【路子】
# display as 路子
# JP: 「そんなに、しんぱいそうな顔しなくても。\nれっ車の中は同じでも、まどから外を見てたら――」
2109 = "「你不用這麼擔心。就算列車裡是一個樣，只要從窗戶往外看的話——」" 

# monologue
# JP: 言って路子は、その目を車窓へと向ける。
3490 = "說完，路子看向車窗。" 

# monologue
# JP: 僕の瞳には何も映らぬ――\nただ灰色が、塗り重ねられているような車窓へと。
3229 = "我什麼都看不見——在我看來車窗上只有一片灰色。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……この車窓から見える景色に、\nなにか、変化があったりするのか？」
1597 = "「……從車窗看見的景色會發生什麼變化嗎？」" 

# 【路子】
# display as 路子
# JP: 「うん。おじさんとあたらしいお人形さんが見えたよ。\nすごいよね！　[はちろくにーまる,3]8620も、キハ[れーなな,1]07？　も運転してて」
2305 = "「嗯。我看見了叔叔和嶄新的人偶。好厲害啊！他不但能駕駛８６２０，還有另一輛車是Ｋｉｈａ０７嗎？他也能開呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、赤井宮司――赤井\x%l運転士;#00ffc040;運転士%l;#;とニイロクか。\n確かに、あのコンビから学ぶことは、とても多いな」
2276 = "「啊，是赤井宮司——赤井\\x%l運転士;#00ffc040;駕駛員%l;#;和二六啊。確實，我從這對搭檔身上學到了很多東西」" 

# monologue
# JP: 帝鉄再興の希望を一身に託された、\n最新鋭特急形\x%l電車;#00ffc040;電車%l;#;――\x%lクハ26;#00ffc040;クハ26%l;#;形試作、\x%lクハ26;#00ffc040;クハ26%l;#;-000\x%l編成;#00ffc040;編成%l;#;。
3443 = "肩負著帝國鐵路復興希望的最先進特快\\x%l電車;#00ffc040;電車%l;#;——\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;型測試車，\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;－０００\\x%l編成;#00ffc040;編組%l;#;。" 

# monologue
# JP: その試験運転を委ねられるという凄まじさの意味を、\n僕はまったく――まるきり理解していなかった。
3454 = "被任命負責這輛車的試運營是多麼了不起的一件事，我之前一點都不明白。" 

# 【双鉄】
# display as 雙鐵
# JP: 「蒸機でも\x%l気動車;#00ffc040;気動車%l;#;でも、運転技術は超一流。\nその上、乗務後の報告が――内容の質が圧倒的だ」
2094 = "「他駕駛蒸汽機車和\\x%l気動車;#00ffc040;動車%l;#;的技術都是超一流的。而且乘務工作結束後提交的報告品質也很高」" 

# monologue
# JP: 僕らがまったく気付き得なかった問題点を見つけ出し、\n同時に極めて適切な改善案をも示してくれる。
3037 = "他能發現我們完全注意不到的問題，同時給出最恰當的改善方案。" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤井さんたちの加入で、全般、大きな余裕が生じた。\nとはいえ――まだまだ人手も金も、何もかも足りんが」
2756 = "「赤井先生他們的加入極大地減輕了我們的負擔。雖說如此——我們的人手，資金等，一切都還遠遠不夠」" 

# 【路子】
# display as 路子
# JP: 「人手っていうんなら、あのこたちが――」
2735 = "「要說人手的話，那些孩子——」" 

# monologue
# JP: いった途端に、\n路子がくすくす笑い出す。
3486 = "話說到一半，路子就呵呵呵地笑了出來。" 

# 【路子】
# display as 路子
# JP: 「えへへ、みちってばうっかり！　だよね、時間、たってるよね。\nあのこたちだって、おねーさんになってるんだし」
2458 = "「小路一時糊塗了！都過了這麼久的時間了。她們都已經變成大姐姐了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あのこたち――」
2377 = "「她們——」" 

# monologue
# JP: 路子が車窓に見るものならば、\nそれは鉄道風景だ。
3514 = "路子透過車窗看見的是鐵路的景象。" 

# monologue
# JP: 路子が認識できるほど、その光景に現れて、\nかつ、外見的成長を果たした者となるならば――
3337 = "會在鐵路的景象中出現，還是路子所認識的人，而且外表上有所成長的話——" 

# 【路子】
# display as 路子
# JP: 「凪ちゃんと、おともだちのおどおどちゃん」
2441 = "「小凪和她的朋友，也就是那個膽小的小女孩」" 

# monologue
# JP: 僕が推理を披瀝するよりわずかに早く、\n路子が答えを口にする。
3510 = "路子搶在我說出自己的推理之前說出了答案。" 

# 【双鉄】
# display as 雙鐵
