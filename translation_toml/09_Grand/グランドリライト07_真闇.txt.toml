2813 = "「還有這種事！那再好不過了啊。那個\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;就是那輛Ｄ５１的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ううん、全然違う。[おおむた,2]雄武田のこで――自分の車両は、\n部品取りに備えて、もう走らせないって決めてるこ」
