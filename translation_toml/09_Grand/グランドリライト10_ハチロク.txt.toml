# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
# 1693 = "「啊！」" 

# monologue
# JP: 驚き、あきれたような声。\nそうしてくすくす、ハチロクは笑う。
2511 = "八六的聲音好像很驚訝，又好像有些無語。接著她發出了銀鈴般的笑聲。" 

# 【ハチロク】
# display as 八六
# JP: 「それは一体、どのような列車でございましょう？」
2119 = "「那到底是什麼樣的列車呢？」" 

# 【双鉄】
# display as 雙鐵
