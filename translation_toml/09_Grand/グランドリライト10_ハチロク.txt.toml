[script]
# lines: 501 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2970 = "（哐啷，哐啷，哐啷，哐啷……）" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうか」
1226 = "「……這樣啊」" 

# monologue
# JP: 誰もいない。\nいつもの座席に、路子はいない。
2902 = "車內空無一人。路子不在平時坐的位子上。" 

# monologue
# JP: かわりに一枚、\nぽつんと、小さな――
2463 = "位子上倒是落下了一張小小的——" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは……ああ」
2105 = "「這是……啊」" 

# monologue
# JP: 今どきはあまり見かけない、\nコートの類が一切かからぬ、厚紙の。
2376 = "一張現在已經很少見的完全沒有塑封的厚紙片。" 

# 【双鉄】
# display as 雙鐵
# JP: 「父さんの――名刺だ」
2106 = "「這是……父親的名片」" 

# monologue
# JP: その裏に、グキグキとしたつたない文字が記されている。\n普段の路子は、丸くこどもらしい字を書くのだけれど。
2565 = "名片的背面寫了一行歪歪扭扭的字。平時路子寫的字應該是圓溜溜的，充滿了稚氣才對。" 

# monologue
# JP: だから、わかる。\n路子が何で――何を使って、書いたのか。
2723 = "所以我知道。路子為什麼——她是用什麼寫下這些字的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「母さんの、オレンジ色の万年筆を借りたのか」
1926 = "「是借用了母親的橘色鋼筆啊」" 

# monologue
# JP: とても小さく、おしゃれでかわいく、\n路子が――僕も――大人っぽいと憧れていた。
2931 = "那是一支小小的鋼筆，外表時髦而可愛，路子和我都把它視為成熟的象徵。" 

# monologue
# JP: 『誰かに貸すと、それだけで書き味が変わっちゃうから』
1088 = "“借給別人用的話，寫起來的感覺就會改變的”" 

# monologue
# JP: ――路子にも僕にもとことん甘い母さんが、\n万年筆を借りるのだけは、決して許してくれなかった。
1076 = "——母親極其寵愛路子和我，但只有在借鋼筆這件事上是堅決不會答應的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そう、か」
# 1226 = "「……這樣啊」" 

# monologue
# JP: そうした全てが、消えるのだなと。\n――旅立つのだなと、さみしく思う。
2689 = "我感到了一絲寂寞。一切就這樣消失了——就這樣啟程而去了啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も借りてみたかったなぁ、母さんの万年筆を」
1823 = "「我也想借用一次母親的鋼筆啊」" 

# monologue
# JP: けれども、それは果たせぬことだ。\nどうしようもなく、さみしいけれど。
2461 = "但是這已經不可能實現了。這樣的孤獨感真是令人難以釋懷。" 

# monologue
# JP: 路子とももう、きっと会えない。\nさよならくらい、言えればよかった気もするけれど。
2708 = "我肯定再也見不到路子了。但我希望至少能跟她道個別。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや……\nさよならだけは、できるのか」
1522 = "「不……至少還是能夠道別的」" 

# monologue
# JP: だって路子は、予約をいれてくれたから。\n父さんにもらった名刺の裏に、母さんに借りた万年筆で。
2582 = "因為路子已經跟我預約好了。她用從母親那借來的鋼筆，在父親的名片背面寫下了一句話——" 

# monologue
# JP: 『そーちゃんのれっ車に乗りにいくね！』\n――そう、書き残してくれたから。
1095 = "“我會去坐小雙的列車的！”" 

# 【双鉄】
# display as 雙鐵
# JP: 「今度こそ。\nもうすぐ、なんだな」
2109 = "「這次一定會成功。用不了多久了」" 

# monologue
# JP: 次の春。ナインスターズは走り始める。\nそれはとても嬉しいことで、僕らが目指し続けたことだ。
2380 = "下一個春天，九星就會開始運行。這是非常值得高興的事，也是我們長久以來的目標。" 

# monologue
# JP: それでもやはり……早すぎるように感じてしまう。\n『やっとその日が』とは、まだ、思えない。
2549 = "可總覺得還是……來得太快了些。沒有那種期盼已久的日子終於到來的感覺。" 

# 【双鉄】
# display as 雙鐵
# JP: 「予約、忘れないようにしないとな。\nこの名刺を持ち帰れれば、それが一番いいのだけれど」
2167 = "「預約的事可不能忘了。這張名片要是能帶回去就好了」" 

# monologue
# JP: もちろん、それもまた果たせぬことだ。\n何故って、これは夢だから。
2914 = "這當然也是不可能的，畢竟這裡是夢境。" 

# monologue
# JP: 父さんの名刺、母さんの思い出、路子の筆跡。\nそれがどれほど懐かしくとも――
2802 = "父親的名片，母親的回憶，路子的筆跡。不管這一切多麼令人懷念——" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、違うな。覚えてさえいれば……\n僕は、何も持ち帰れずとも、かまわないのか」
1551 = "「不，不對。只要記在心裡……就算什麼都帶不回去也沒關係」" 

# monologue
# JP: 大事なものならもう既に、\nたくさんたくさん受け取っている。
2679 = "我已經得到太多太多的寶物了。" 

# monologue
# JP: 父さんが、母さんが、路子が、\n共に過ごせた時間の全てで、僕に多くを与えてくれた。
2799 = "父親、母親、路子，和他們一同度過的所有時光，讓我受益良多。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから――路子に。父さんに、母さんに。\n持ち帰ってもらえるように、しなくては」
1882 = "「所以……我必須創造出能讓路子、讓父親母親他們帶得走的東西」" 

# monologue
# JP: 遠い世界へおもむく前の、最高の旅の思い出を。\nそうして、僕を遺しても、大丈夫だという安心を。
2585 = "在他們啟程前往遙遠世界之前，我要創造出一段完美之旅的回憶。這樣他們才能放心地留下我離去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……やるんだ。必ず。それが、僕にできるただひとつの\n――最後の、恩返しになるんだから」
1197 = "「……一定要辦到。這是我唯一能做到的——也是最後的報恩」" 

# monologue
# JP: （ふわっ）
2971 = "（柔軟）" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
1687 = "「啊——」" 

# monologue
# JP: 手だ。僕をなでてくれる手。\nとても優しく、あたたかな手。
2771 = "有一隻手在撫摸著我。那是一隻非常溫柔、非常溫暖的手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ……僕は、大丈夫」
2006 = "「沒事的……我沒事」" 

# monologue
# JP: とても、とても、やさしい手ではあるけれど、\n家族の手ではあるけれど――
2954 = "雖然是非常溫柔的手，雖然是家人的手——" 

# 【ハチロク】
# display as ？？？
# JP: 「あっ――」
# 1687 = "「啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――いいんだ」
1519 = "「不——沒關係」" 

# monologue
# JP: 喉が勝手に、か細い声を零してしまったせいだろう。\n僕の髪から離れてしまった手に触れたくて、手を伸ばす。
2551 = "可能是聽到了我不由自主發出的細微聲音。那隻手從我的頭髮上移開，而我下意識地伸手想去握住。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄、様」
2157 = "「雙鐵……少爺」" 

# monologue
# JP: その手を、ハチロクが包んでくれる。\nただそれだけで、さみしい気持ちが溶けていく。
2496 = "八六抱住了我的手。這麼一個簡單的動作就讓我的孤獨感消弭於無形。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おはよう、ハチロク」
1919 = "「早安，八六」" 

# monologue
# JP: ハチロクはもう制服姿――\nああ、そうだ。今日は大事な約束のある日であったか。
2487 = "八六已經穿好了制服——啊，對了。今天有個重要的約定啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。おかげで、寝坊せずにすんだ」
2075 = "「謝謝。多虧了你，我才沒睡過頭」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ、双鉄様。\nまだお時間は大丈夫です」
1685 = "「哪裡，雙鐵少爺。時間還不算太晚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1730 = "「嗯？」" 

# monologue
# JP: ハチロクは、なぜだか少し、\n申し訳なさそうな顔をしている。
2413 = "不知為何，八六的表情好像有些過意不去。" 

# 【ハチロク】
# display as 八六
# JP: 「おやすみのお邪魔をするつもりはなかったのです。\nただ――双鉄様が……」
1863 = "「我本沒有打算打擾您休息。但是……我只是擔心您……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が、どうした？」
1858 = "「我怎麼了？」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様が――泣いてしまわれるのではないかと、\nそう、感じてしまって」
1841 = "「我只是擔心您是不是哭了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……確かに、泣いていたかもしれんな。\n嬉しい夢を、見ていたから」
1216 = "「……我可能確實哭了吧。因為我做了一個好夢」" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
1691 = "「啊」" 

# monologue
# JP: ほっとした顔。\nほっとした声。
2607 = "她的表情和聲音似乎都放鬆了下來。" 

# 【ハチロク】
# display as 八六
# JP: 「左様でしたか。悲しい夢では、なかったのですね」
1977 = "「是這樣啊。沒有做惡夢就好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「悲しくはなかったな。嬉しくて、少しさみしくて。\nけれどもやっぱり――うん。とても、嬉しい夢だった」
1821 = "「我並沒有傷心。就是高興之餘也有些寂寞罷了。不過這個夢……嗯，還是非常令人開心的」" 

# monologue
# JP: ……今なら言えると、不意に感じる。\n凪に学んで、ハチロクと向き合おうとして――
1112 = "……我忽然覺得，現在的我應該能夠跟她開口了。我要像凪那樣，放下顧慮坦誠面對八六……" 

# monologue
# JP: けれどもずっと、意識をすればするほどに、\n喉から先に、どうしても送り出せなかったひとことを。
2454 = "但一直以來，有句話我越是想說，就越是堵在喉嚨裡出不來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今な、ハチロク。僕は、失くしてしまった家族の――\n両親と、妹の夢を、見ていたのだ」
1608 = "「八六，我剛才做的是關於我父母和妹妹的夢——也就是我失去的家人們」" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1691 = "「啊」" 

# monologue
# JP: 反射でだろう。\nほんの一瞬、ハチロクはすくんで固くなる。
2518 = "八六聽到這句話忽然僵在原地，這就是她最自然的反應吧。" 

# monologue
# JP: けれど、逃げない。\nハチロクもまた――僕と向き合おうとしてくれている。
2423 = "不過八六並沒有逃避。她立刻恢復過來，勇敢地嘗試著面對我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「幼いころの鉄道事故で、\n僕が、失くしてしまった家族の」
1867 = "「我的家人，是在我很小的時候，在一場鐵路事故中去世的」" 

# 【ハチロク】
# display as 八六
# JP: 「は……い」
1702 = "「嗯……」" 

# monologue
# JP: 声が震える。\n瞳がゆれる。
2605 = "她的聲音顫抖著，眼神飄忽不定。" 

# monologue
# JP: ハチロクもまた、ずっと苦しんでいたのだろう。\n話したくって、謝りたくて。けれど恐れて、出来なくて。
2657 = "想必八六一直以來也備受煎熬吧。想開口、想道歉。但是害怕得不敢付諸行動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはハチロク」
2137 = "「那是你」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様。\nそれは――わたくしの起こした事故です」
1974 = "「是的，雙鐵少爺。那是……我引發的事故」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1715 = "「嗯」" 

# monologue
# JP: ナインスターズを走らせるため、鉄路の安全を守るため。\nハチロクは、僕は。日々姫たちとともに多くを学んだ。
2786 = "為了讓九星運行起來，為了保護鐵路的安全。八六和我跟日日姬她們一起學到了很多。" 

# monologue
# JP: 『冨士川橋梁流失に伴う8620脱線事故』\n――その記録にも、記憶にも、何度も触れた。
1091 = "“富士河橋樑垮塌所導致的８６２０脫軌事故”——這段記錄和記憶，我已經接觸過多次。" 

# 【双鉄】
# display as 雙鐵
# JP: 「やはり、だよな」
1990 = "「果然啊」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしも！　わたくしもずっと――\nお伝えしたくて、謝りたくて。ですが、けれどもっ」
1828 = "「我也！我也一直……想開口，想道歉。可是，可是……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかるよ。ハチロク。\n僕も、同じ恐れを、きっと、抱え続けていたから」
1862 = "「我明白的，八六。因為我跟你擁有同樣的恐懼」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1687 = "「啊——」" 

# monologue
# JP: 手を繋いだまま、体を起こす。\nハチロクは僕を助けてくれる。
2674 = "我在八六的幫助下，拉著她的手坐起身來。" 

# monologue
# JP: だからそのまま、そうっと優しく抱きしめる。\n気持ちを伝えられるよう。けれど決して閉じ込めぬよう。
2754 = "於是為了表達我的心境，我直接將她輕柔地抱在懷裡，但我不敢使太大的勁，生怕她感到拘束。" 

# 【双鉄】
# display as 雙鐵
# JP: 「話すことで、蒸し返すことで、傷つけることが怖かった。\nお前自身を。そして同時に、お前と築いてきたものを」
1843 = "「我害怕舊事重提會傷害到你，同時傷害到我們長久以來培養的感情」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1715 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お互いに、もうわかっていると理解していた。\nならばこのまま――それでもいいと、感じてもいた」
1870 = "「我認為我們在這件事上已經達成了共識。所以就算避之不談也沒什麼問題」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしも……まるきり同じ思いでいました。\n双鉄様の優しさに――甘えて、しまっておりました」
1826 = "「我也是……完全相同的想法。一直都在利用您的善良」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。僕もお前に甘えきってた。\nけれど――やはり、きちんと向き合うべきだと思った」
1950 = "「是啊，我也是一樣的。但是……我現在覺得，我們還是應該坦誠相待」" 

# monologue
# JP: 抱きしめている体を離す。\nハチロクの目をじっと見る。
2715 = "我輕輕放開八六，好讓自己能注視到她的眼睛。" 

# monologue
# JP: その目は濡れて、震えてる。\n僕と同様――今も、恐れにとらわれている。
2937 = "那雙濕潤的眼睛正在不停顫抖。這表現就跟我一樣——直到現在還無法擺脫恐懼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前は、『わたくしの起こした事故』といったが」
1591 = "「你說是“你引發的事故”」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
1694 = "「啊！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――それは、事実誤認であるように思う」
2052 = "「而我認為那不是對事實的正確表述」" 

# monologue
# JP: ハチロクの目が大きくゆれる。
2508 = "八六的目光再次劇烈地顫抖起來。" 

# monologue
# JP: わなわな震える唇が、何かをいいかけ、\nけれどもそのまま、閉じてしまう。
2601 = "她的嘴唇哆嗦著想要說些什麼，但最終還是緊緊地閉了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「事故を起こしたのは台風だ。ハチロク、おまえは――\n事故が連鎖してしまうことを、防いでくれた」
1802 = "「引發事故的是颱風。八六——你防止了事故產生進一步連鎖效應的可能性」" 

# monologue
# JP: 全ての記録がそう告げている。\n僕の記憶も、記録の正しさを裏付けている。
2726 = "所有的紀錄都是這麼寫的。我的記憶也印證了記錄的正確性。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あの雨の中の加速を僕は、記憶している。\n運転をするようになり、加速の意味も、理解した」
2123 = "「那場雨中的加速，我至今記憶猶新。而當上司機之後，我也明白了加速的含義」" 

# 【ハチロク】
# display as 八六
# JP: 「は、い――。\nですから、わたくし、は――」
1960 = "「是的……所以，我——」" 

# monologue
# JP: ガタガタ、ハチロクが震え始める。
2521 = "八六開始渾身顫抖起來。" 

# monologue
# JP: そっと、その肩に手を添える。
2714 = "我輕輕地把手放在她的肩上。" 

# monologue
# JP: 決して捕まえることなしに、\nけれども熱を、そして信頼を伝えたいから。
2703 = "我絕對沒有要把她緊緊抓住的意思，只想把我的溫度和信任傳遞給她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「橋梁が直近で崩壊したのだ。ならば転落を防ぐには、\nそこに至るまでにレールを外れる――脱線する他にない」
1545 = "「不遠的前方發生了橋樑垮塌。而為了防止墜入河中，只能在那之前離開鐵軌——也就是脫軌」" 

# 【ハチロク】
# display as 八六
# JP: 「っ――」
1188 = "「……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その選択は、正しかったのだ。死者三名も――\n本当であれば、出ずに済んだかもしれなかった」
2117 = "「那個選擇是正確的。有三人不幸死亡——但其實可能根本不用死人的」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！？」
1676 = "「哎！！？」" 

# monologue
# JP: 言えた。ようやく。\nハチロクが傷ついているから。怯えているから。
2702 = "我終於說出口了。因為八六正遭受著煎熬，無法擺脫恐懼。" 

# monologue
# JP: それを解いてやりたくて――\n自分の鎖を、ようやく、僕は断ち切れた。
2787 = "為了讓她得到解脫——我終於斬斷了禁錮自己的枷鎖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「台風で、\x%l客車;#00ffc040;客車%l;#;が大きく揺れて、妹がひどく怯えていて。\n僕も怯えて――ゆえに、パニックを起こしてしまった」
1151 = "「\\x%l客車;#00ffc040;客運車廂%l;#;因颱風而劇烈搖晃，妹妹當時非常害怕。我也很害怕——所以陷入了恐慌的狀態」" 

# monologue
# JP: 思い出せる。\nあの日の全てを、まるで手触りまで感じられるほどに。
2713 = "我要回憶起來。回想起那天的所有細節。" 

# monologue
# JP: ああ――本当に。\n“向きあうこと”とは、“自分自身と向きあう”ことだ。
2767 = "是啊，真的一點沒錯。所謂的“面對”，指的就是“面對自己”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「妹を連れ、僕は列車前方を目指した――\n機関車がもしも見えたら、安心できると考えて」
1849 = "「我帶著妹妹朝列車前部走——我以為如果看到了機車，說不定就能安心了」" 

# 【ハチロク】
# display as 八六
# JP: 「……」
# 1188 = "「……」" 

# monologue
# JP: ハチロクが、ひどく沈鬱な顔をする。\n――今なら、僕も理解している。
2522 = "八六露出非常低落的表情。而事到如今我也早已知道了。" 

# monologue
# JP: あの\x%l客車;#00ffc040;客車%l;#;には恐らくは、前方を見渡せる窓はなかったし、\nあったとしても、そこから見えるのは\x%l炭水車;#00ffc040;炭水車%l;#;だけだ。
2935 = "那種\\x%l客車;#00ffc040;客運車廂%l;#;應該沒有可以向前看的車窗，即便有，透過車窗也只能看到\\x%l炭水車;#00ffc040;煤水車%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、はじめから間違えていた。\n間違えていた、その上に――」
1854 = "「我從一開始就搞錯了。不但犯了錯……」" 

# monologue
# JP: ……記憶を、ずっと、塗り込めていた。\n都合のいいよう、自分の過去さえ、歪めてた。
1126 = "……真實的記憶一直處於塵封的狀態。我甚至把過去的記憶歪曲成了自己想要的模樣。" 

# monologue
# JP: ――あのとき僕らを止めたのは、\n父さんと母さんだけじゃなかった。
1078 = "——那時阻止我們的不光是父親母親。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l車販;#00ffc040;車販%l;#;のおねえさんも、\x%l車掌;#00ffc040;車掌%l;#;さんも、僕らを止めた。\n席に戻って、そのまま座っているように、と」
1610 = "「列車售貨員大姐姐和\\x%l車掌;#00ffc040;列車長%l;#;都阻止過我們。他們勸我們回到座位上坐好」" 

# monologue
# JP: ――その声を、その手を僕はすりぬけた。\n『大丈夫です、すみません』と。『おまかせします』と。
2853 = "而我卻回答“我沒事的，對不起”“交給你們了”敷衍了他們的勸阻和阻攔。" 

# monologue
# JP: 父さんと\x%l車掌;#00ffc040;車掌%l;#;さんとのやりとりも、\n僕には、はっきり聞こえていた。
2800 = "父親和\\x%l車掌;#00ffc040;列車長%l;#;的交談，其實我聽得清清楚楚。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう言われたから、困らせていると自覚して。\n僕は――戻ったらきっと怒られると、さらに恐れた」
2056 = "「聽到這裡，我意識到自己給大家添麻煩了。於是我更害怕了——我覺得回去一定會被大人罵」" 

# monologue
# JP: だから、逃げた。\n路子の恐怖を言い訳にして。
2725 = "所以我逃跑了。用路子害怕了當作藉口。" 

# monologue
# JP: 僕はこどもで、怯えているのに背伸びして――\nその結果、どうしようもなく愚かな行動をとってしまった。
2719 = "我還是個小孩，明明害怕卻硬是要逞強——結果就做出了無比愚蠢的行為。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l車掌;#00ffc040;車掌%l;#;の指示に従わなかった。逆らった。\n父さんと母さんと路子を巻き込んだのは、だから」
1952 = "「是我沒有聽從\\x%l車掌;#00ffc040;列車長%l;#;的指示，一意孤行。才把父親母親和路子捲了進來，所以」" 

# 【ハチロク】
# display as 八六
# JP: 「――いいえ、違います。双鉄様」
1155 = "「——不，不是這樣的。雙鐵少爺」" 

# monologue
# JP: ハチロクの声は泣いている。\nけれども、涙はこぼさずにいる。
2512 = "八六的聲音帶著哭腔。但她強忍住了眼淚。" 

# monologue
# JP: 泣いてしまえば、僕を苦しめてしまうだろうと――\nきっと、そう思ってこらえてくれている。
2613 = "如果哭了就一定會讓我更加痛苦——她一定是這麼覺得的。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様の行動がどのようなものであったとしても。\nあれはやはり、わたくしが原因となった事故なのです」
1540 = "「不管雙鐵少爺採取了什麼樣的行動。這場事故的原因終歸出自於我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは違」
2121 = "「那可不對」" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ！　双鉄様。わたくしは――わたくしだけは、\nあの事故を、回避することができたのです」
1547 = "「不！雙鐵少爺。我——只有我，有能力阻止那場事故的發生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1676 = "「哎！！？」" 

# 【ハチロク】
# display as 八六
# JP: 「9642\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、必死で送ってくれたあの報告を。\n判断に必要な全てがきちんとこめられていた\x%l共感;#00ffc040;共感%l;#;を――」
2176 = "「９６４２的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;拚命傳過來的那份報告。她傳來的\\x%l共感;#00ffc040;共鳴%l;#;其實已經完全足以讓我做出判斷」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――」
2175 = "「（沉默）」" 

# 【ハチロク】
# display as 八六
# JP: 「もしも、わたくしが瞬時に諒解していたのなら！\n復唱など求めず、非常制動を即座にかけていたのなら！」
1762 = "「如果我能立刻理解接受她的報告！如果我能立刻進行緊急煞車，而不是要求她復誦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクっ！」
1604 = "「八六！」" 

# monologue
# JP: 抱きしめる。\nハチロクの悲鳴を聞きたくなくて。
2704 = "我緊緊抱住八六。我不想聽到她慘痛的哀嚎。" 

# monologue
# JP: ハチロクは僕に抵抗もせず――\n力を一気に失くした声で……それでも、続ける。
2497 = "八六沒有做出任何抵抗——她的聲音一下子軟了下去……但並沒有停下來。" 

# 【ハチロク】
# display as 八六
# JP: 「何度も、何度も、何度も、何度も、何度も、何度も、\n何度も、何度も――再計算を、行いました」
1820 = "「我一次又一次，一次又一次，一次又一次地進行了重新計算」" 

# monologue
# JP: ならば、最後まできちんと聞こう。見守ろう。\nハチロクが、自分自身と向き合う様を。
2927 = "那就認真地聽她講完吧。默默見證八六面對自己的全過程吧。" 

# 【ハチロク】
# display as 八六
# JP: 「復唱を求め、混乱し、わたくしが空費した十四秒。\nそれだけの貴重な時間が、もし……あったなら」
1872 = "「我請求復誦，陷入了混亂，在這裡空耗了整整十四秒。那麼寶貴的時間……如果我能把握住的話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1701 = "「嗯——」" 

# monologue
# JP: その一言から、見えてくる。\nあの日、あの時。運転台で、なにがあったか。
2608 = "她的話讓一切都鮮明了起來。那天，那個時候，駕駛台上都發生了些什麼事。" 

# 【ハチロク】
# display as 八六
# JP: 「……[わたくしたち,1]列車は、止まれていたのです。\nあの十四秒があれば。\x%l脱線転覆;#00ffc040;脱線転覆%l;#;などさせずとも」
1181 = "「……[我們,1]列車就能停下來的。有了那十四秒，就能避免發生\\x%l脱線転覆;#00ffc040;脫軌傾覆%l;#;事故了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だからお前は、あの事故を。\nお前自身が起こしたものと、思っているのか」
1886 = "「所以你認為那場事故是你自己引發的嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
2174 = "「！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だがな？　ハチロク」
1544 = "「不過呢，八六」" 

# monologue
# JP: 抱きしめたまま髪を撫ぜる。\nハチロクの傷を癒やしたいから。
2693 = "我抱著八六，用手輕撫著她的頭髮。因為我想讓八六的傷痛痊癒如初。" 

# monologue
# JP: そうすることで、きっと同時に、\n僕自身の傷も癒やされるから。
2579 = "因為在治癒她的同時，我自身的傷痛一定也能夠痊癒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、はっきり背負いすぎてる」
2051 = "「老實說你過於自責了」" 

# 【ハチロク】
# display as 八六
# JP: 「いいえっ、いいえ双鉄様っ」
1524 = "「不、不是的，雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば問おう。\n復唱を求めたことは、規則通りの行いだろう？」
2130 = "「那我來問你。請求復誦是不是規則所規定的行為？」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！」
1693 = "「啊！」" 

# monologue
# JP: 答えなど、聞かずともわかる。\n緊急事態になれば勝手に、体が訓練どおりに動く。
2721 = "我都不需要聽她回答。遇到緊急情況時，身體會自動按照所受的訓練來行動。" 

# monologue
# JP: そうでなければ鉄道員でも、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でもありえない。\n――そうあるために、僕らは訓練を重ねているのだ。
2778 = "沒有這種素質怎麼當得了鐵路工人和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。我們反覆訓練的目的就是為了做到這一點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「旧帝鉄の訓練が想定していない事態が起きた。\n……それほどのありえぬ事故を、起こしてしまった」
2030 = "「當時發生了幾乎不可能發生的狀況，就連前帝國鐵路的訓練都沒有預案」" 

# monologue
# JP: ああ、そうだ。台風ではなく大廃線が、\nそもそもの原因ともいえるだろう。
2568 = "嗯，沒錯。大廢線才是根本的原因，而不是區區颱風。" 

# monologue
# JP: 台風一つを耐えきれずに起きた、鉄橋崩落――\nそれは、人が鉄道を不要と断じて、招いた結果だ。
2944 = "鐵橋連一場颱風都承受不，就此崩塌——那是人類輕視鐵路所招致的結果。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どの視点で見ても、旧帝鉄には不備があった。\nお前と8620も他の職員も、不備に巻き込まれた被害者だ」
2014 = "「無論從哪個角度來看，前帝國鐵路都有疏失。你和８６２０以及其他職員，都是被這個疏失牽連的受害者」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1687 = "「啊——」" 

# monologue
# JP: 小さく、呻く。\nそしてそのままハチロクは、しばし、黙り込んでしまう。
2499 = "八六發出了一聲輕叫。隨後她沉默了一會才再度開口。" 

# 【ハチロク】
# display as 八六
# JP: 「…………仮に、左様であったとしても――\nそれでも、可能性があった以上は」
1206 = "「……哪怕是這個道理，但只要有一點避免事故的可能性……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク――」
2136 = "「那我這麼說吧，八六」" 

# monologue
# JP: ハチロクの抱える愚かさは、\n僕の愚かさとまったく同じだ。
2668 = "我們倆都擁有一樣的愚鈍之處。" 

# monologue
# JP: わかってもらうそのためならば――\n僕は自分の、愚かささえさらけだそう。
2788 = "為了讓她明白這一點——我不惜把自己的愚鈍暴露出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「最善の可能性を選べなかったことが罪ならば\n――僕の家族を殺した者は、やはり…………僕だ」
1769 = "「如果說沒選擇最優解是一種罪過的話——那麼害死我家人的人……其實還是我自己」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ！！？」
1695 = "「啊！！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、ハチロクっ！！！」
1894 = "「所以說，八六！！！」" 

# monologue
# JP: 抱きしめる手に力をこめる。\n小さな体にすがりつく。
2691 = "我把她抱得更緊了。整個人都倚在她身上。" 

# monologue
# JP: それしか出来ない。\nガタガタガタガタ、こんなに震えてしまっているから。
2580 = "因為我只能用這個辦法，來安撫全身上下劇烈顫抖的她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はお前に、お前自身を許して欲しい。\nそうして、僕を――僕も、お前に、許して欲しい」
1847 = "「我希望你能夠原諒自己。然後，我也希望你能原諒我」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ……」
# 1702 = "「嗯……」" 

# monologue
# JP: ハチロクが僕を抱きしめ返す。\nハチロクの熱が伝わってくる。
2481 = "八六也緊緊回手抱住了我。她的體溫隨之傳遞了過來。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄……さま」
# 2157 = "「雙鐵……少爺」" 

# monologue
# JP: 何百回、何千回、何万回と耳にしている\n『双鉄様』が、こんなにも優しくあたたかく染み透る。
2644 = "已經聽過成千上萬遍的“雙鐵少爺”，都沒有像這一聲這樣充滿溫情和熱忱。" 

# monologue
# JP: 自分自身の体がそれほど冷え切っていたと、だから知る。\nそして同時に、ハチロクがわかってくれたのだとも。
2581 = "因為自己的身體太過冰冷，所以才能感受如此強烈。與此同時，我也明白八六已經理解了我的話。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまが、それを求めてくださるのなら、\nわたくしはわたくしを許せます。ですから、どうか」
2161 = "「雙鐵少爺，如果您是這麼希望的話，那我就原諒自己。所以請您務必……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。僕も、僕を許そう。\nそして、お前の全てを許そう」
1719 = "「嗯，我也會原諒自己。並且原諒你的一切」" 

# 【ハチロク】
# display as 八六
# JP: 「――双鉄さま。ありがとうございます。\nわたくしも、あなたの全てを、許します」
1159 = "「——雙鐵少爺，非常感謝。我也原諒您的一切」" 

# monologue
# JP: 言って、くすりと、ハチロクが笑う。\n安心しきった、脱力しきった声で、笑う。
2885 = "說完後，八六噗嗤一笑。那是一種無力的，徹底放下心來的笑聲。" 

# monologue
# JP: 笑顔をみたくて、手をほどく。\nハチロクは――ああ、なんと満ち足りた笑顔だろうか。
2697 = "我放開手，想看看她的笑容。八六她——啊，她的笑容顯得多麼滿足。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ハチロク」
1811 = "「怎麼了？八六」" 

# 【ハチロク】
# display as 八六
# JP: 「不意に、思い出したのです。わたくしたちがお互いを、\n許し合うのは――これが、二度目のこととなるのを」
1856 = "「我忽然想起一件事。這好像是我們第二次互相原諒對方了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「二度目？」
2047 = "「第二次？」" 

# 【ハチロク】
# display as 八六
# JP: 「ええ。一度目は――\n初めて会って、それから二時間もたたないうちに」
1710 = "「嗯。第一次的時候……距離我們初次見面還不到兩小時」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだったな」
1723 = "「嗯，是有這麼回事啊」" 

# monologue
# JP: 初対面から、僕らはお互い誤解しあった。\nあのときは素直に話し合い、本当にすぐ、解決できた。
2670 = "我們第一次碰面就對彼此產生過誤會。那時，我們通過誠懇的溝通，事情很快就得到了解決。" 

# monologue
# JP: 素直に話し合えていたなら――\nこの問題さえ、すぐに解決できてたのかもしれないが。
2811 = "當初如果也能誠懇地溝通……說不定連這個問題都能夠很快解決掉的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク」
2146 = "「那麼，八六」" 

# monologue
# JP: が、長い時間を過ごす間に、似たようなことを繰り返し。\n繰り返しを繰り返しつつ、僕らは螺旋階段を登るのだろう。
2588 = "在漫長的共處時光中，不斷地重複跟過去相似的經歷，在這段周而復始的過程中，我們便會沿著螺旋台階拾級而上。" 

# monologue
# JP: そしてゆっくり、人も\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も変わりなく。\nきっと、大人に。大人のこころになっていくのだ。
2639 = "就這樣，人也是，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;也是，雙方都會漸漸地變得成熟。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これで、おあいこということにならんか？」
2131 = "「那我們現在就算扯平了吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふふふっ！」
1667 = "「呵呵呵呵！」" 

# monologue
# JP: ハチロクが笑う。\n笑って軽やかに、抱きしめる僕の腕を抜け――
2516 = "八六笑了起來。她一邊笑，一邊輕巧地從我的懷抱中鑽了出來——" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄様。\n手打ちで、おあいこで、とんとんです」
1860 = "「我明白了，雙鐵少爺。我們倆互不相欠，扯平了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1715 = "「嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「その上で、どうか。[マイマスター,3]双鉄さま」
1879 = "「我還有個請求。[我的主人,3]雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1693 = "「啊！」" 

# monologue
# JP: ハチロクがそっと、時計を取り出す。
2491 = "八六悄悄地拿出了一隻表。" 

# monologue
# JP: 鈍い銀色――姿かたちはそっくりだけれど、\n刻まれた無数の細かな傷が、歴史を物語っている。
2926 = "那塊暗銀色的表雖然外觀千篇一律，但表面無數的細小刻痕無聲地述說著它的歷史。" 

# 【ハチロク】
# display as 八六
# JP: 「この先のわたくしの全ての時間――\n機能停止するまでの、わたくしの全てを」
1807 = "「從今以後我所有的時間——直到機能停止的那一天到來前，我要把我的一切獻給您」" 

# monologue
# JP: ……旧帝鉄、日ノ本帝有鉄道の懐中時計。
1134 = "……這是一隻前帝國鐵路，帝家日本國鐵路的懷表。" 

# monologue
# JP: ハチロクが製造されてこの方ずっと、\nハチロクとともにあった時計が、差し出される。
2494 = "八六把從自己被造出來的那天起就一直陪伴她到今天的懷表遞給了我。" 

# 【ハチロク】
# display as 八六
# JP: 「どうぞ、擦り切れるまでお使いください。\n[マイマスター,4]右田機関士。わたくしは、貴方の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です」
2071 = "「請差遣我直到磨損殆盡為止。[我的主人,3]右田司機。我是您的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク」
# 2146 = "「那麼，八六」" 

# monologue
# JP: 寝起きだからこそ叶った大事な話だが、\nそうわかっても、自分自身の寝間着姿が情けない。
2953 = "雖然我知道能夠談成這番話，多虧了自己剛從那場夢中醒來，但這身睡衣打扮還真是不合時宜。" 

# monologue
# JP: が、やむなしだ。机から急ぎ自分の鉄道時計を取り出して、\nできる範囲の精一杯で、身なりを整え姿勢を正す。
2422 = "不過也沒辦法了。我急忙從桌子裡拿出自己的鐵路表，儘可能整理好儀容，端正自己的姿勢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の時間も、お前に預ける。そうしたい」
1825 = "「我也想把我的時間託付給你」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま」
2158 = "「雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、喜んで、お前の時計を預かろう」
1889 = "「所以呢，我很樂意收下你的懷表」" 

# monologue
# JP: ハチロクの差し出す時計を受け取れば、\nずっしりとした重みを感じる。
2695 = "我接過八六遞來的表，用手掂量了一下那沉甸甸的重量。" 

# monologue
# JP: 時計本体の重さではない、\nハチロクが刻んだ時間の重さを。
2921 = "那不是懷表本身的重量，而是八六所經歷的時光的重量。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうして、ほら」
2019 = "「然後這個給你」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。謹んで。\n双鉄様のお時間を、わたくし、お預かりいたします」
1755 = "「好的，我心懷感激地收下了。雙鐵少爺的時間就交由我保管了」" 

# monologue
# JP: ハチロクの小さな手の上に、\n僕の、御一夜鉄道の鉄道時計。
2506 = "八六的小手拿著我那塊御一夜鐵路的鐵路表。" 

# monologue
# JP: 僕の時計からハチロクは、どんな重みを感じるのだろう？\nその表情は、なんともいえず、しあわせそうだ。
2415 = "不知道她能從我的懷表上感受到什麼樣的重量。從表情上來看，似乎只有難以言喻的幸福。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしたちは――同じ時間を重ねていくのですね。\nこれからずっと」
1806 = "「從今以後——我們將一起度過同樣的時間，直到永遠」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ずっと。共に鉄路にあるかぎり」
1725 = "「嗯，直到永遠。只要沒有離開鐵路」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまと、わたくしと――\n共に、鉄路にあるかぎり」
2159 = "「雙鐵少爺和我直到永遠——只要沒有離開鐵路」" 

# monologue
# JP: 僕の言葉を、\n噛み締めるように繰り返し――
2520 = "八六重複著我的話，彷彿在細細品味——" 

# 【ハチロク】
# display as 八六
# JP: 「あ！？」
1696 = "「啊！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1730 = "「嗯？」" 

# monologue
# JP: けれども何故か、急にハチロクが沈んでしまう。
2421 = "不過不知為何，八六忽然消沉了下去。" 

# 【ハチロク】
# display as 八六
# JP: 「ともに、鉄路に、ある――『かぎり』」
1171 = "「“只要”，沒有離開鐵路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうしたハチロク。なにかあったか？」
1606 = "「八六，你怎麼了？出什麼事了嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「ああいえ！　なにほどのこともございません！\nただ、その――あの……そのっ」
1525 = "「不不！沒什麼大不了的事！只是那個——這個……那個」" 

# monologue
# JP: 再び、頬が赤くなる。\nさっきより激しい勢いで。
2515 = "八六的臉頰再度飄起了緋紅。速度更甚於剛才。" 

# monologue
# JP: 今日のハチロクは、日々姫顔負けの百面相だ。\nあ、いや――ひょっとするとオリヴィ同様に――
2449 = "今天的八六的表情真是豐富得不輸給日日姬。啊，不對，難道她是跟奧莉薇一樣……" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしが、その――自覚しておりましたよりずっと。\n欲張りで、欲しがりと。知ってしまっただけのことです」
1837 = "「我只不過剛剛意識到，我好像……比自己想像中要貪心得多，貪婪得多」" 

# monologue
# JP: ……不調、というわけではなさそうだ。\nもうハチロクは、すっかり落ち着き直してみえる。
1123 = "……看來並不是身體不舒服。這會兒的她好像已經完全恢復了平靜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　お前は無欲であるかと思うが――\nいったい、何が欲しいというのだ？」
1732 = "「嗯？我一直以為你很無欲無求呢，那你到底想要什麼？」" 

# 【ハチロク】
# display as 八六
# JP: 「あぁ」
1692 = "「啊啊」" 

# monologue
# JP: ハチロクが、ちらと僕をみる。
2482 = "八六偷偷瞄了我一眼。" 

# monologue
# JP: けれどもすぐに瞳を伏せて――そうしてなんとも儚げな、\n何かを悟ったようにもみえる微笑を、口元にたたえる。
2459 = "但是她隨即閉上眼睛，嘴邊露出了一副恍然大悟似的神秘微笑。" 

# 【ハチロク】
# display as 八六
# JP: 「おわかりになられないのでしたら。\n申し訳ないのですけれど、双鉄さまには、内緒です」
1760 = "「如果您不明白的話，那只能恕我無可奉告了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
1951 = "「是嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。お伝えはできません。\nわたくしは、双鉄さま。貴方の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですので」
1970 = "「是的，我不能告訴您。因為我是您的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 1715 = "「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　ハチロク！　もうおきとー？」
2155 = "「阿哥！八六！你們醒了——？」" 

# 【ハチロク】
# display as 八六
# JP: 「あら」
1673 = "「哎呀」" 

# monologue
# JP: タイミングのよすぎる日々姫の声。\nそうか――どうやら気を使わせてしまたらしい。
2760 = "日日姬的聲音出現得也太巧了。是嗎，看來她是特地沒打擾我們啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、起きているぞ。\n今日はなにせ旺宮に行く日だからな」
1729 = "「嗯，起床了。畢竟今天是去大宮的日子啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「ナビでひとっとびだからって、油断しちゃいけんよ？\n遅刻して話聞けんとかになったら[おおごと,1]大事だし」
1681 = "「哪怕坐Ｎａｖｉ飛過去花不了多少時間，也不能太大意哦。要是因為遲到而沒談成的話就麻煩了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかっている。なにせ、電車姫さまのご紹介だ。\n決して遅刻などせんさ」
1869 = "「我知道。畢竟是經由電車公主殿下介紹的，我是絕對不會遲到的」" 

# monologue
# JP: ……宗方さんから相談を受けた、\nオリヴィのごくごく微細な、けれど継続的な不調。
1109 = "……宗方先生找我商量的，是關於奧莉薇身上非常細微，但持續不斷的故障問題。" 

# monologue
# JP: 登呂流湯さんでは対処できないという事態について、\n電車姫様は、旺宮いきをおすすめくださった。
2634 = "對於這種登呂流浴場無法處理的事態，電車公主殿下建議我們去一趟大宮。" 

# 【双鉄】
# display as 雙鐵
# JP: 「長い年月を経た\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のメンテナンスの問題は、\n僕にとっても、まさしくもって、“我がこと”だしな」
2028 = "「畢竟長年服役的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的維護問題，對我來說也絕對算是“分內之事”」" 

# monologue
# JP: いってスックと立ち上がる。
2886 = "說著我便一口氣站了起來。" 

# monologue
# JP: ハチロク・日々姫は何故かはしらん、\n変わらず僕を見つめたままだ。
2412 = "不知為何，八六和日日姬還是一動不動地盯著我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――着替えるのだが、見学するのか？」
1158 = "「——我要更衣了，想參觀嗎？」" 

# 【日々姫】
# display as 日日姬＆八六
# JP: 「っ！！？」
# 1676 = "「哎！！？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「第ゼロ世代の飛行型エアクラにも、\n大いに驚かされましたが――」
2156 = "「雖然第零代的飛行型空凝機著實讓我吃驚不小——」" 

# monologue
# JP: ……案内された、旺宮鉄道歴史館の地下。\n僕ら以外に誰一人いない、保存機のボロボロの運転台の中。
1111 = "……我一路跟隨，來到了大宮鐵路歷史館的地下。我們正身處於一台封存車的破舊駕駛台裡，四下再無他人。" 

# monologue
# JP: 不死鳥博士を自称する\x%lレイルロオド;#00ffc040;レイルロオド%l;#;はそう言って、\nメガネの縁を光らせる。
2861 = "自稱不死鳥博士的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;如此說道，她的眼鏡框泛著亮光。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「この日報にも驚きました。これほど簡潔に、\nかつ詳細に変調を観察できる\x%l機関士;#00ffc040;機関士%l;#;は珍しい」
1582 = "「但這份日報也同樣令人吃驚。很少有\\x%l機関士;#00ffc040;司機%l;#;能對異常狀況觀察得如此簡潔卻又詳盡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「宗方\x%l機関士;#00ffc040;機関士%l;#;も、また、尊敬し、\n見習うべき方の一人であると思っています」
1776 = "「宗方\\x%l機関士;#00ffc040;司機%l;#;也是個值得我們尊敬和學習的人啊」" 

# monologue
# JP: 一番最初は、彼の流儀に――\nオリヴィとの接しかたに正直、戸惑わせられた。
2844 = "老實說他的風格——他對待奧莉薇的方式，一開始真的讓我有些困惑。" 

# monologue
# JP: 『徹頭徹尾の物扱い』。\nそれは僕らのやり方と、全く異なるものだったゆえ。
1093 = "“徹頭徹尾地視為一件物品”。他的做法跟我們完全不同。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ほう？\nどのような点で、ですかな？」
1678 = "「哦？你是指什麼方面？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「宗方\x%l機関士;#00ffc040;機関士%l;#;は、オリヴィを物として扱います。\n一線を引き、踏み込まさせず――けれど、とても大切に」
1777 = "「宗方\\x%l機関士;#00ffc040;司機%l;#;把奧莉薇當成了一件物品。他絕不會做出任何越界之事——但依然非常關心她」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ほほう」
1734 = "「噢噢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「甘えてきても、なついてきても、私生活では関わらない。\nけれど、職務上必要な手当は全て行い、知識も与える」
1684 = "「哪怕對方撒嬌示好，他也不會在私生活上跟她產生聯繫。但在工作上，他會為她做必要的處理，教她所需的知識」" 

# monologue
# JP: 自分の言葉に、気付かされる。
2711 = "我被自己的這番話提醒了。" 

# monologue
# JP: 宗方さんとオリヴィは、日ノ本における学園での、\n教師と生徒の――理想とされる姿に近い物と感じる。
2621 = "宗方先生和奧莉薇，應該與日本學校中理想的師生關係非常相似。" 

# 【双鉄】
# display as 雙鐵
# JP: 「物と人として接し。身内に決してならないからこそ、\n彼は恐らく、誰より冷静にオリヴィを評価できるのです」
1901 = "「把對方當成一件物品看待。因為絕對不會產生親近之情，所以他恐怕是最能夠冷靜地評價奧莉薇的人」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「なるほどなるほど。この報告書と右田氏との評から、\n宗方氏の仕事ぶりが浮かんでくるものとも思えますな」
1620 = "「原來如此原來如此。根據這份報告書和右田先生的評價，我漸漸能想像到宗方先生平時是如何工作的了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「仕事ぶり、ですか」
1759 = "「如何進行工作嗎」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「『物としての\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を、自分の仕事道具として、\n完璧に手入れし、最善に使いこなす』」
1173 = "「“把\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;這件物品，看做自己工作的工具，因此能用最佳的方式來使用與保養”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1701 = "「嗯——」" 

# monologue
# JP: 驚かされる。\nなんと端的、かつ正確な評価であろうか。
2685 = "我很驚訝。這是多麼明了而準確的評價啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさしく、そのとおりだと感じます。\n今日だけを見ても、宗方\x%l機関士;#00ffc040;機関士%l;#;は、そう徹底している」
1993 = "「正如您所說。只看今天宗方\\x%l機関士;#00ffc040;司機%l;#;的決定，就知道他依然在貫徹自己的作風」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ですな。確かにオリヴィ氏は、\n[ぜんけん,1]全検を明けたばかりではありますし、不調も微細」
1944 = "「是啊。畢竟奧莉薇女士剛做完全檢不久，而且出的故障也都非常輕微」" 

# monologue
# JP: ――ゆえ、宗方さんはオリヴィを僕らに同行させなかった。
1073 = "——因此，宗方先生沒讓奧莉薇跟我們同行。" 

# monologue
# JP: 今もオリヴィは、微細な不調と付き合いながら、\nそれでも明るく、Ⅸ号を駆っているはずだ。
2447 = "今天奧莉薇應該也在一邊跟應付著輕微的故障，一邊開朗地驅使著九號吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい。その判断こそ、宗方氏ならではの――\n少なくとも、御一夜鉄道では彼のみが下せるものかと」
1963 = "「是的。我想至少在御一夜鐵路之中，只有宗方先生能夠做出這個決定」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「つまり、右田氏の判断は異なるわけですな？」
1553 = "「也就是說你持有不同的意見？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ですね。\n僕ならオリヴィを、引っ張ってでも連れてきています」
1936 = "「是啊。換做是我的話，就算用拖的我也會把奧莉薇拖過來」" 

# monologue
# JP: なぜならば、たとえ稼働に問題なくとも、\n確かに不調は存在するゆえ。
2578 = "因為即便不影響行動，但異常狀況確實是存在的。" 

# monologue
# JP: 乗務をたとえ休ませたとて、今の御一夜鉄道なら、\nダイヤに穴を開けずに余裕で、回していけるのだし。
2810 = "畢竟以現在的御一夜鐵路來說，就算讓她休假也可以運轉得游刃有餘。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「なるほどなるほど。『最後まで使い切ってやろう』と\n――右田氏には、そうは思えませんか」
1617 = "「原來如此原來如此。“榨乾最後一絲價值”——右田先生沒有這種想法啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1676 = "「哎！！？」" 

# 【ハチロク】
# display as 八六
# JP: 「不死鳥博士！　最後とは！？」
1536 = "「不死鳥博士！“榨乾”是什麼意思！？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ああ。\n落ち着いてください。右田氏もハチロク氏も」
1704 = "「嗯。右田先生，八六女士，你們都先別著急」" 

# monologue
# JP: 不死鳥博士の肩が竦められる。
2611 = "她聳了聳肩。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「宗方氏が、そう判断しているであろうということですよ。\n実際の最後は、十年先とも、明日であるともしれません」
1840 = "「我只是揣測了宗方先生的判斷而已。實際上，所謂“榨乾”有可能遠在十年之後，也有可能明天就會發生啊」" 

# 【ハチロク】
# display as 八六
# JP: 「あ……」
1690 = "「啊……」" 

# monologue
# JP: なるほど。つまりは、オリヴィはそういう状態――\n人間でいう、老衰に近い状態なのか。
2533 = "原來如此。也就是說奧莉薇的那種狀態，就類似於人類年老體衰的狀態啊。" 

# monologue
# JP: 健康であり、気をつけていても、不調は出る。\nぽっくりと、明日止まってもおかしくはない。
2901 = "身體很健康，很注意保養，但還是會出各種毛病。就算生命在明天戛然而止也並不奇怪。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから……使い切る」
1884 = "「所以……要榨乾她的利用價值」" 

# monologue
# JP: オリヴィにとっての最大の喜びは、\n間違いなく、宗方さんと共に走ることだから――いや。
2632 = "對奧莉薇來說，最開心的事毫無疑問是跟宗方先生一起駕駛列車——不。" 

# monologue
# JP: （それは違う。付き合いがそう長くなくとも、\n見ていれば、誰にだってオリヴィの気持ちはわかる）
2974 = "（這可不對。哪怕跟奧莉薇相處不久，她的想法也是一看便知的）" 

# monologue
# JP: 理解が、ようやく及んだ気がする。\n宗方さんは、やはりオリヴィの最高の理解者なのだと。
2675 = "我好像終於能夠理解了。宗方先生果然是最理解奧莉薇的人。" 

# monologue
# JP: “最後まで使い切る”ことこそが、\nオリヴィに対する、最高最良の対応なのだと。
2873 = "被“榨乾最後一絲價值”對奧莉薇來說，才是她最想得到的對待吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィは、宗方さんの役に立ちたい。\n決して足手まといにはなりたくない。だから」
1749 = "「奧莉薇想幫上宗方先生的忙。她絕對不想成為一個拖油瓶。所以……」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ほほう」
1733 = "「噢」" 

# monologue
# JP: 関心と驚きとが等しく混じったような声。
2633 = "對方半是好奇半是驚訝地嘆道。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「意外ですな。右田氏は――[もみじ,1]紅葉から聞く話では、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を物と扱い得ぬ方であるかと感じましたが」
2033 = "「真令人意外啊。依從紅葉那聽來的話，右田先生，你應該是那種不願意把\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;看成物品的人才對」" 

# monologue
# JP: 電車姫様を“紅葉”と呼んで、\n不死鳥博士こと、ひよこ――
2735 = "把電車公主殿下稱為“紅葉”的不死鳥博士，雛——" 

# monologue
# JP: 旺宮鉄道歴史館の実質的な館長である、\nC57 145号機\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、労るようにハチロクを見る。
2911 = "這位大宮鐵路歷史館實質上的館長，Ｃ５７　１４５號車\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;溫柔地看著八六。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「紅葉の話の限りにおいて、右田氏と宗方氏との\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;観には大きな差があるものか、と」
2057 = "「聽紅葉說，右田先生和宗方先生對\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的看法可謂天差地別」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、左様です」
1727 = "「嗯，確實如此」" 

# monologue
# JP: 誇らしげ、としかいいようの無いハチロクの声。
2513 = "八六的聲音裡充滿了自豪。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまは、もったいなくも、\nわたくしを家族と呼んで、そのように接して下さいます」
1897 = "「承蒙雙鐵少爺垂憐，他向來把我當成家人看待」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「なるほどなるほど。やはり右田氏にとっては、\nハチロク氏は、単なる物ではないのですな」
1618 = "「原來如此原來如此。右田先生不會把八六女士視為一件單純的物品是吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ですね――というか、他の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;もやはり、\n僕には、物とは思えません」
1933 = "「是啊。應該說對於所有的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，我都不認為她們只是物品」" 

# monologue
# JP: ……オリヴィなど、宗方さんからの物扱いを、\n喜びにし、誇りとしていることが、はっきりわかる。
1115 = "……我非常清楚，奧莉薇本人樂於被宗方先生看成物品，甚至引以為豪。" 

# monologue
# JP: そうであっても僕はどうしてもオリヴィを、\n“物”とは思えぬし、扱い得ない。
2457 = "但即便如此我也實在無法把她看成“物品”，把她當“物品”來對待。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ほほう、それは、何ゆえですかな？」
1738 = "「噢，那是為什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「何ゆえ――と問われますと」
2035 = "「真要問我為什麼的話……」" 

# monologue
# JP: 考えようと思った瞬間、すぐに答えが浮き上がってくる。
2813 = "當我準備考慮怎麼回答時，答案忽然一下子冒了出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、魂を有しているからです」
1744 = "「因為\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;是有靈魂的」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「魂、ですか」
2164 = "「靈魂？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい。他に適切な言葉を思い浮かび得ぬほど――\nはっきりとした……彼女たち自身に根付く、自由意志を」
1965 = "「是的。我找不到其他更貼切的詞彙來形容——那種非常明確的……扎根於她們自己內心的自由意志」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ほほう。そこまで理解しておられますか。\nその上で、“物扱い”もまた正しいとも、理解できる？」
1736 = "「噢，理解得很透徹啊。然而你還是可以認同“把她們視為物品”的正確性？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうですね。僕には真似出来ぬことでしょうが――\nそれでも、宗方さんもまた、正しくあるとは感じます」
1947 = "「是啊。雖然我肯定無法效仿——但即便如此，我還是覺得宗方先生的做法也有可取之處」" 

# monologue
# JP: 不死鳥博士が、僕へとまっすぐ体を向け直す。
2399 = "不死鳥博士轉過身來正對著我。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「なるほど。紅葉が評価するだけのことはありますな。\n右田氏は、鉄路の未来。その可能性を示し得る存在だと」
1621 = "「原來如此，難怪紅葉對你評價這麼高。她說右田先生是可以揭示鐵路未來可能性的人」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　さすがは電車姫様です！」
1671 = "「哇！不愧是電車公主殿下！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――あまりにも過分なご評価かと存じますが」
1834 = "「我倒是認為——這個評價太言過其實了」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「いやいや。ご謙遜。実際に動かれ、結果を出されている。\nそれだけで、右田氏の価値は示されていましょうとも」
1527 = "「不不，你太謙虛了。你已經用實際行動拿出了成果，光憑這個就能體現你的價值了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……お言葉ですが、僕の価値ではなく、御一夜の\n――御一夜鉄道の、もっと広くの、みんなの価値です」
2103 = "「這個嘛……恕我直言，這不是我個人的價值，而應該代表更廣泛的對象。是御一夜——御一夜鐵路所有人的價值」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ほほう？　みんな、とは？　どのような意味でしょう」
1741 = "「噢？所有人？這話怎麼說？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「文字通り、僕に力を貸してくれた、\n僕とともに歩んでくれてる――みんなです」
1791 = "「就是字面意思，那些幫助我，跟我一起走到這一步的——所有人」" 

# monologue
# JP: ハチロクを見れば、ハチロクもじっと僕を見ている。\nただそれだけのことからも、僕は力を受け取れる。
2672 = "我向八六看去，發現她也在盯著我看。僅僅是她的這個舉動，就能讓我獲得無窮動力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクにせよ、他の誰にせよ。\n一人でも欠けていたなら、僕はここには立てていません」
2015 = "「無論是八六還是別人。只要缺了一個人，我今天都不會站在這裡」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「なるほどなるほど。やはり右田氏は、紅葉の評価通り。\nあるいは、それをうわまわる方であるようですな」
1619 = "「原來如此原來如此。右田先生果然如紅葉所說，甚至比她說得還要優秀」" 

# monologue
# JP: 不死鳥博士は、大きく頷き。
2397 = "不死鳥博士用力點了點頭。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ならば、全てをお伝えしましょう」
2132 = "「那我就全告訴你吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「全て、とは？」
1663 = "「告訴我什麼？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「確認できた限りの、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に関する歴史の全て。\nそれをお伝えすることは、きっと、お役に立ちましょう」
2061 = "「能夠確認的所有有關\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的歷史。聽了這些事，想必會對你有所幫助」" 

# monologue
# JP: 不死鳥博士が、微笑する。\nが――眼鏡の奥に覗く瞳は、怖いくらいに、真剣だ。
2401 = "不死鳥博士露出了微笑。不過……從鏡片後透出的眼神卻認真得有些可怕。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「貴方がたが知りたがっている、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の延命。\nないし――魂の継承に関する考察を深める、そのお役に」
2002 = "「比如你們想知道的，有關延長\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;壽命的內容。乃至——對靈魂繼承的深入探究，想知道這些就不能錯過我的話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そのような理由で――\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、レールの上に縛られていた……とは」
1219 = "「……沒想到，居然以這樣的理由把\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;困在鐵軌上……」" 

# monologue
# JP: いつの間に流れた汗を拭き取るために、\nハンカチを取り出そうとして気付かされる。
2812 = "當我正打算拿出手帕，擦拭不知不覺流下來的汗水時才發現……" 

# monologue
# JP: 握りこんでしまっていた手の中もまた、\nにちゃりと、汗にまみれていると。
2705 = "我緊緊握住的手心裡也全是汗水。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――種族説」
1146 = "「\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;——物種說」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしたちが……そのような歴史で産み出され、\nそうして、解放派の方々が、迫害を受けてらしたとは」
2007 = "「沒想到……我們是在這樣的歷史背景下誕生的，而那些解放派還遭受了迫害」" 

# monologue
# JP: 重い空気を少しでもかき乱そうとするかのように、\n大げさに、不死鳥博士は肩をすくめる。
2398 = "不死鳥博士誇張地聳了聳肩，似乎是想儘可能緩和一下沉重的氣氛。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ま、\n『そういう説もある』というお話にすぎませんがな」
2066 = "「行啦，我不過是說“也有這樣的說法”」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。そのようにお伺いした上でなお、わたくし――\nその説には、大変強い説得力があるように感じます」
1962 = "「是的。即便如此，我還是覺得……那個說法很有說服力」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1948 = "「是啊」" 

# monologue
# JP: ……造物主たるトゥーレシビック博士が、\n新しい種族とすべく、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を開発した。
1131 = "……身為造物主的特里維西克博士開發\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，是為了讓她們成為新的物種。" 

# monologue
# JP: 新しい種族の誕生を恐れた一部の者たちは、\n博士とその一族、そして解放派の人々を――排除した。
2626 = "害怕新物種誕生的一部分人把博士和他的家族以及解放派人士——統統除掉了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕も、その説には強い説得力を感じます。\nですがそれゆえ、ひとつ、疑念も浮き上がってきます」
1211 = "「……我也覺得那個說法很有說服力。但這樣的話又會產生一個疑點」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「その疑念とは？」
1563 = "「什麼疑點？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「昨今の、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の、鉄道以外への社会進出です。\n例えばみくろは動物園で働いていたし、うちの酒造でも」
1794 = "「就是最近出現的，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;邁進鐵路之外的工作崗位的現象。比如美玖路在動物園工作，還有我們家酒廠也一樣」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「その点については、同じく疑念を抱いていました。\nですので、慎重の上に慎重を重ね、調査いたしましてな」
1845 = "「我對此也同樣抱有疑問，所以就對此進行了一番極為謹慎的調查」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにか、調査でわかりましたか？」
1986 = "「有調查出什麼結果嗎？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「確証を得られたわけではありません。\nですのでこれも、あくまで仮説となりますが――」
2027 = "「由於沒有確鑿的證據，所以我接下來要說的也僅僅是一種假說」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
1924 = "「是」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「第一世代以降のエアクラ・ナビ。単なる人工知能の中に、\n“魂”が発生した例が、相当数出てきたのではないかと」
2153 = "「關於第一代之後的空凝機導航系統。純粹的人工智慧之中產生了“靈魂”的案例，很可能不在少數」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
# 1693 = "「啊！」" 

# monologue
# JP: なるほど、それなら理由たりえる。\nその直感を、慌てずに、順序よく言葉に整理していく。
2534 = "原來如此，這樣就說得通了。我按照直覺，不慌不忙地理順自己的話語。" 

# 【双鉄】
# display as 雙鐵
# JP: 「魂が――“発生”ですか。\n製造されるのではなくて」
2163 = "「靈魂——是“產生”的嗎？而不是製造出來的」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ですな。製造時には、単なる人工知能。\nですので、それを省き、殺すことはできません」
1946 = "「是啊。製造出來時只是單純的人工智慧。所以你無法精簡，或者扼殺掉它」" 

# 【双鉄】
# display as 雙鐵
# JP: 「魂が、人工知能の学習と経験とによって。\n後発的に、もしも発生するのであれば、決して――」
1771 = "「如果靈魂是人工智慧在學習歷練後獲得的後天產物，那肯定——」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ご明察です。それを防ぐこともまたできない。\nしかし今更、エアクラナビを全廃にもできない」
1589 = "「你想得沒錯。人類無法避免靈魂的產生。但事到如今，人類也已經不可能完全放棄空凝機導航系統」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ですね。そのようなことになったら、\n文字通り社会が麻痺してしまう」
1930 = "「是啊。如果完全放棄的話，社會會陷入名副其實的癱瘓狀態」" 

# monologue
# JP: それに、エアクラナビのテクノロジーは、\n既にして、各方面にも広く応用されている。
2849 = "而且空凝機導航系統技術已經廣泛運用於各個領域。" 

# monologue
# JP: ああ――ならば、\nそうした未来が、不可避かつ、予見可能であるのなら。
2765 = "是啊——所以如果那樣的未來是可預見的，不可避免的話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……“魂”を有した人工知能は、今後ますます、\n爆発的に増加していくことさえ、予想される」
1218 = "「……擁有“靈魂”的人工智慧，今後甚至有可能越來越多，甚至出現爆發式的增長」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「その未来図は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を弾圧していた層には、\n紛れもない悪夢そのもの、と、なりましょうなぁ」
2142 = "「那樣的未來，對於壓迫\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的那些人來說，無疑是一場真正的惡夢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「でしょうね。後発的なものであるなら、\n予防も排除も、対応すらも、極めて困難と思われますし」
1938 = "「是啊。既然是後天的產物，那就很難找到針對措施，更別說預防和排除了」" 

# monologue
# JP: というか、それこそまさしく“未知の種族”だ。\n未知で、しかも、制御も対処もできない種族。
2930 = "那應該完全就是一種“未知的物種”了。不但未知，而且無法控制和應對的物種。" 

# 【双鉄】
# display as 雙鐵
# JP: 「知性と、自由意志とを有した――\n人が制御し得なくなる危険性を持ってしまった、機械」
1909 = "「擁有智慧和自由意志的——有脫離人類控制的風險的，機器」" 

# monologue
# JP: 感覚的には、生命体とは呼びづらい。\nけれどもそれは増殖し得る――やはり、生命体だろう。
2654 = "從情感上來說，很難稱之為生命體。但她們是可以增殖的——所以應該也算是生命體吧。" 

# monologue
# JP: その上、人にとっての害悪を為すものさえも発生し得る。\n……あまりにも古典的で、けれど深刻な状況だ。
2851 = "而且還有可能會對人類造成危害。這種狀況雖然說起來老套，但也確實很嚴峻。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を危険視していた層はエアクラナビ\n――仮称・エアクラ新種への対策に、その目を向けた」
1890 = "「所以視\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;為禍害的人們開始著眼於如何應對空凝機導航系統——暫稱之為空凝機新物種好了」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「当歴史館としても、同じ結論を、\nひとつの可能性として認識しておりますな」
1989 = "「本歷史館也承認他們的結論，有可能是未來的趨勢之一」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひとつであるなら、それ以外の可能性も――\nいや、ああ、そうか」
1915 = "「既然是之一，那就代表還有其他可能性——不對，我懂了」" 

# monologue
# JP: ハチロクを見る。\nすぐにその目が、僕をまっすぐ見つめ返す。
2698 = "我看向八六，她也馬上回應了我，眼神沒有絲毫閃躲。" 

# monologue
# JP: 人と、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とは理解しあえる。\nお互いを、確かに支え合うことができる。
2440 = "人類和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;是能夠互相理解的，也是能夠互相扶持的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、人と、エアクラ新種との、\nなかだちを果たしてくれる存在になるかもしれない」
1147 = "「\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;說不定能夠成為人類和空凝機新物種之間的橋樑」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ですな。エアクラナビも最古の世代は、\x%lタブレット;#00ffc040;タブレット%l;#;内包。\nそれこそ、純粋な\x%lレイルロオド;#00ffc040;レイルロオド%l;#;後継とも申せますし」
1941 = "「是啊。最早一代空凝機導航系統也內建了\\x%lタブレット;#00ffc040;操作板%l;#;。所以它們完全可以算作\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的接班人啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
# 1693 = "「啊！」" 

# monologue
# JP: 言われた瞬間、見えた気がする。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;規制派も、エアクラ新種も。
2590 = "在聽到這句話的那一刻，我好像看到了什麼。無論是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;抵制派，還是空凝機新物種。" 

# monologue
# JP: そうした全てをくるんで繋ぐ――\nそんな未来図の断片が。
2734 = "把這所有一切聯繫在一起的——未來藍圖的一角。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま。いかがなされました？」
2162 = "「雙鐵少爺，您怎麼了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今は仮説であるにせよ――\nそれを、真説としてしまえばよいかと考えた」
1680 = "「哪怕剛才的說法只是假說——我認為也可以當成真的來考慮」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ほほう？」
1739 = "「噢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、繋ぎ手に。\n人と人工知能との、文字通りレールとなることができる」
1832 = "「我們能夠把\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;變成紐帶。能夠讓她們真正成為聯繫人類與人工智慧的鐵軌」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1693 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その方向で広報告知をし、資金を集め、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;研究を、\x%lタブレット;#00ffc040;タブレット%l;#;再開発を進める」
1907 = "「按照這個方向去廣而告之，去籌集資金，繼續推進\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的研究，以及重新開發\\x%lタブレット;#00ffc040;操作板%l;#;」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね！\nそれが叶えば！　そうできるのなら！」
1998 = "「正是如此！如果能實現這個目標的話！能夠做到的話！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。かつての\x%lレイルロオド;#00ffc040;レイルロオド%l;#;規制派さえもが、\n恐らくは、僕らの味方になってくれよう」
1713 = "「嗯。連曾經的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;抵制派，可能都會成為我們的同伴」" 

# monologue
# JP: ……トゥーレシビック博士こそは、真なる天才だったのだ。\n\x%lタブレット;#00ffc040;タブレット%l;#;とは、安全装置に他ならぬがゆえ。
1119 = "……特里維西克博士才是真正的天才啊。因為\\x%lタブレット;#00ffc040;操作板%l;#;正是最關鍵的保險裝置啊。" 

# monologue
# JP: それを滅ぼしてしまったがために、規制派は、\n制御不可能な新種族へと、恐怖することになってしまった。
2744 = "抵制派毀滅了這項技術，這個做法反而讓他們對無法控制的新物種產生了恐懼。" 

# 【ハチロク】
# display as 八六
# JP: 「それだけではなく、魂を持つ人工知能たちにも、きっと、\n人の素晴らしさを、教えてあげることができます」
1530 = "「不光如此。我們也一定可以讓擁有了靈魂的人工智慧們明白人類的優點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1948 = "「是啊」" 

# monologue
# JP: 僕ははっきり知ってる。
2684 = "我很清楚。" 

# monologue
# JP: 人のこころにも、人工知能のこころにも、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、寄り添える存在であるということを。
89 = "\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;不但可以走進入的內心，同樣也可以走進入工智慧的內心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、人とも、機械とも共存できる』――\nその認識を、鉄路の外にも、広くに知らせるだけでいい」
1169 = "「“\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;既可以與人類共存，也可以與機械共存”——只要把這個概念推廣到鐵路之外的領域就行了」" 

# monologue
# JP: あるいはかつての規制派も、\nすでに、その方針に方向転換したのかもしれん。
2884 = "說不定曾經的抵制派，已經往這個方針做出轉變了。" 

# monologue
# JP: 草の根のように、地道に、地道に。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の社会進出は、既に広まりつつあるゆえに。
2577 = "因為\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;已經開始像毫不起眼的草根一樣，慢慢走進人類的社會之中了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが叶えば、人は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と共に歩める。\n人工知能とも共存し、より安心できる未来を築ける」
1767 = "「如果能夠實現這個目標，人類就能跟\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;共同邁進。同時也能跟人工智慧和諧共存，構築出跟令人安心的未來」" 

# monologue
# JP: それは確定的な事実だ。\nエアクラナビ形人工知能が、万一人類に危険なものなら。
2913 = "這是無可撼動的事實。萬一空凝機導航系統型人工智慧對人類造成了危害。" 

# monologue
# JP: それを廃して、\x%lタブレット;#00ffc040;タブレット%l;#;形人工知能に置き換え戻せば、\n社会が被る悪影響も、最小限ですむだろう。
2938 = "那麼將其廢棄，重新用回\\x%lタブレット;#00ffc040;操作板%l;#;型人工智慧的話，就能把對社會的負面影響控制在最低限度。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「それも確かに、めざすべきひとつの理想かと思います。\nが、叶えるためには、残念ながら、研究費も時間も全く」
1871 = "「我認為這確實是比較理想的努力方向之一。不過很遺憾，我們完全沒有實現這個目標的研究費用和時間」" 

# 【双鉄】
# display as 雙鐵
# JP: 「足りていないなら、募ればいいのです。\n投資への呼びかけ自体が、なにより強い広報となる」
1533 = "「不夠的話，向社會募集就行了。招商引資這個行為本身就是最強有力的廣告」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「募るといっても、どのようにして――」
1653 = "「可是要如何去募集資金——」" 

# monologue
# JP: 答えならもう持っている。\n稀咲が、ポーレットとマイアさんが僕に教えてくれたから。
2680 = "我已經有答案了。稀咲、波萊特和邁雅阿姨已經教會了我。" 

# monologue
# JP: それを成功へ導くための人材も、\nすでに僕らに、数多く味方してくれている。
2846 = "而且我已經擁有了數量眾多的同伴，他們都是能夠引導這個方案走向成功的最佳人選。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;新造と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;新造とを、事業化する。\n鉄道分野にとどまらぬ、人類の新しいパートナーとして」
1898 = "「把\\x%lタブレット;#00ffc040;操作板%l;#;和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的生產事業進行產業化。不要局限於鐵路領域，而是作為人類的新伙伴」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「事業化！」
2025 = "「產業化！」" 

# monologue
# JP: 絶句して。硬直して。\nやがてゆるゆる、不死鳥博士はメガネを拭いて、かけ直す。
2395 = "不死鳥博士僵在原地，一時間說不出話來。她好一會才緩過神來，把眼鏡摘下來擦了擦再重新戴上。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「――そんな危険なことが――いやいや、しかし、\n事実上、旧規制派の運動が見られなくなった[こんにち,1]今日ならば」
2145 = "「那麼危險的事——不不，事實上如今舊抵制派的運動已經偃旗息鼓，搞不好……」" 

# monologue
# JP: ぶつぶつ、うろうろ。
2596 = "她來回踱步，嘴上嘟嘟囔囔。" 

# monologue
# JP: 不死鳥博士はまるで人格が変わったように、\nうつろな瞳で呟き歩きその髪の毛をかきむしり。
2396 = "不死鳥博士就像是換了個人一樣，雙眼無神的她邊走邊念叨，還把自己的頭髮抓得一團亂。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「…………事業化のための具体的な方策を、\nもしも右田氏がご存知でしたら」
1208 = "「……如果右田先生知道產業化的具體方案的話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もちろんお教えします。といっても僕は素人ですので、\n専門家。まずは宝生稀咲と、雛衣マイア女史のご紹介を」
1865 = "「我當然會告訴你。不過在這方面我也是外行，我會先把寶生稀咲，雛衣邁雅女士這些專家介紹給你」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「いや！　ありがたい！　助かります！！\nなにせ、当歴史館には専門バカしかおりませんので」
1675 = "「哎呀！太感激了！這可太好了！！畢竟本歷史館只有專攻鐵路的笨蛋」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご謙遜を。ともあれ――\nうまく運ぶとも限りませんが、少しでもお役にたてれば」
1812 = "「您太謙虛了。不過……雖然無法保證事情能夠成功，我也希望盡我的一份力」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「いや、うまく運ぶでしょう。このドクターフェニックス、不死鳥博士が保証しましょうっ！！」
1549 = "「不，一定會成功的。我·Ｄｏｃｔｏｒ　Ｐｈｏｅｎｉｘ，不死鳥博士可以保證！！」" 

# monologue
# JP: 決めポーズ。
2598 = "她擺出一個帥氣的姿勢。" 

# monologue
# JP: どういう反応を返していいのか、全く正解がわからんが、\n自然と笑みがこみあげてくる。
2677 = "我完全不知該做何反應，索性就用最自然的笑容應對了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「でしたら、なによりです。\n長い時間、貴重なおはなしをありがとうございました」
2124 = "「那就太好了。感謝您花了這麼長時間給我們講述了諸多秘辛」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ああ、ちょっと待った！　これだけ世話になっておいて、\nなに一つお返ししないというわけにもいきませんので」
1698 = "「啊，等等！收了這麼一份大禮，我怎麼能讓你們空手而歸呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お返し、ですか？」
2128 = "「那您的意思是？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「右田氏たちは、それを聞きにきたのでしょう？\nつまり、当歴史館研究所の、今までの研究成果について」
1603 = "「兩位來這裡不就是因為想知道這個嗎？就是本歷史館研究所至今為止的研究成果」" 

# monologue
# JP: ニヤリと、不死鳥博士は笑ってみせる。\n今日一番の、絵に描いたような、研究者らしい顔をして。
2400 = "不死鳥博士露出一抹笑容。這是她今天露出的最具研究者風範的完美表情。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「即効性が認められる可能性がある\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の延命法。\nならびに、今ある\x%lタブレット;#00ffc040;タブレット%l;#;の複製についてを」
1982 = "「有可能立刻奏效的延長\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;壽命的方法，以及現存關於\\x%lタブレット;#00ffc040;操作板%l;#;複製的研究成果」" 

# 【ハチロク】
# display as 八六
# JP: 「はふぅ」
1672 = "「哈唔」" 

# monologue
# JP: いつものごとくに、僕の布団の隅へともぐるハチロクが、\n満ちたりきった声を出す。
2484 = "八六像往常一樣窩進我的被褥一角，發出了極其滿足的呻吟聲。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おつかれ、ハチロク」
2092 = "「辛苦了，八六」" 

# 【ハチロク】
# display as 八六
# JP: 「おつかれさまです、双鉄さま」
2094 = "「辛苦您了，雙鐵少爺」" 

