1707 = "「嗯。我終於能夠到達終點站——終於能夠為路子和父親母親送行了」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
1967 = "「是的」" 

# 【双鉄】
# display as 雙鐵
