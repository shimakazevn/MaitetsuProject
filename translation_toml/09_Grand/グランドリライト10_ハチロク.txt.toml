1228 = "「……那是小時候的我……我和路子夢想中的列車」" 

# monologue
# JP: 路子が、そうっと返してくれた――\nだから思い出せた、忘れていた夢。
2809 = "由於路子的肯定——我才想起了一度忘記的夢想。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あまりに単純明快で。\nけれども本当に叶えがたい夢――超特急列車」
2104 = "「這個夢想非常簡單明瞭。但是我真的很想實現它——超特快列車」" 

# 【ハチロク】
# display as 八六
# JP: 「超特急、列車」
2083 = "「超特快，列車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、時速200キロで駆け抜ける列車だ。\n風より速く、ひかりの如く、帝央と逢阪を結ぶ列車だ」
