2008 = "「沒錯。父親他也有幾乎一模一樣的夢想——他曾經有過這樣的構思，就叫做子彈頭列車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと！」
2110 = "「還有這種事！」" 

# monologue
# JP: 芝技官といえば、旧帝鉄の技師長にまで上り詰めた方だ。\nその方が現実的な目標として、それを目指していたならば。
2642 = "島高級技工可是位居前帝國鐵路的技工長一職的大人物。如果這是他認真考慮，並嘗試努力實現的目標……" 

# 【双鉄】
# display as 雙鐵
# JP: 「聞かせてくれ。ハチロク。\nお前の知っている限りのことを」
1664 = "「告訴我吧，八六。說出你知道的一切」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。喜んで双鉄さま。わたくしの知識もなにもかも、\n全てが貴方のものなのですから」
1756 = "「好的，樂意之至。我的知識、我的一切，全都屬於您」" 

# monologue
# JP: ――そうして、ハチロクは聞かせてくれる。\n僕の質問に答えてくれる。
2752 = "於是八六就在我的提問之下娓娓道來。" 

# monologue
# JP: 知識とアイディアが重なりあって\n全く新しい姿をつくる。
2820 = "知識和創意重合在一起，會創造出嶄新的產物。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――これならばひょっとして」
1700 = "「啊，這樣的話說不定……」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄さま。道行きは、本当に遠く厳しく、\n果て無いものではございましょうが」
1975 = "「是的，雙鐵少爺。雖然這條路必定困難重重，終點遙遙無期」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでも」
1579 = "「但是」" 

# 【ハチロク】
# display as 八六
# JP: 「それでも」
# 1579 = "「但是」" 

# monologue
# JP: ふたりの声が、願いが重なる。\nふたつの夢が、ひとつになる。
2669 = "我們的聲音，我們的願望重合在一起。兩人的夢想合而為一。" 

# 【双鉄】
# display as 雙鐵
# JP: 「きっとできるし、必ず叶う。\n僕とお前とみんなの力を、未来へ繋いでいけるのならば」
1518 = "「一定能夠做到，一定能夠實現的。如果能把我和你、以及大家的力量延續到未來的話」" 

# 【ハチロク】
# display as 八六
# JP: 「お手伝いいたします、双鉄さま。\nわたくしの全てをもって、共に、走り続けます」
2074 = "「請讓我來幫助您，雙鐵少爺。我會獻出我的一切，跟您一同走下去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。この上なく頼もしい」
2165 = "「非常感謝。你真的太可靠了」" 

# monologue
# JP: こころが満ちる。
2662 = "我一時間躊躇滿志。" 

# monologue
# JP: 安心すれば、興奮が遠ざけていた眠気が再びじわじわと、\n僕の真ん中へと這い寄ってくる。
2748 = "放下心來之後，因為興奮而驅散的睡意又再度向我襲來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、今はこのまま休もう。\nおやすみハチロク。良い夢を」
2144 = "「那麼今天就直接睡吧。晚安八六，祝你有個好夢」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄さま。おやすみなさい。\nどうぞ、素敵な未来の夢を――」
1757 = "「好的，雙鐵少爺，您也晚安。願您做一個美妙的未來之夢——」" 

# monologue
# JP: そうして僕らは、眠りに落ちる。\n一番最初のあの日から、ずっと変わらぬ距離のまま。
2753 = "於是我們便進入了夢鄉。彼此間的距離，從最開始的那天到現在從未改變。" 

# monologue
# JP: 布団の隅と中心で、\nそれでもこころは、寄り添いながら。
2951 = "雖然一人躺在被褥中間，一人躺在角落，但我們的內心永遠緊密無間。" 
