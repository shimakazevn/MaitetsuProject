# 【ハチロク】
# display as 八六
# JP: 「ああ」
# 1691 = "「啊」" 

# monologue
# JP: ハッと、ハチロクが息を呑む。
2523 = "八六驚訝得屏住了呼吸。" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――双鉄さま」
1689 = "「啊——雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1730 = "「嗯？」" 

# monologue
# JP: ハチロクの声が震えている。\nけれど理由が……僕にはまるでわからない。
