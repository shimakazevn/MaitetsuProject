[script]
# lines: 520 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
3089 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch——）"

# monologue
# JP: 列車の音だ。\nほっとする。
2793 = "Là tiếng tàu chạy.\nThật nhẹ nhõm."

# monologue
# JP: ここのところは忙しすぎて、疲れすぎて。\n路子に会えていなかったから。
2616 = "Dạo gần đây tôi quá bận rộn, quá mệt mỏi. Nên đã không thể đến gặp Michiko."

# 【双鉄】
# display as 雙鐵
# JP: 「路子？」
2245 = "「Michiko?」"

# 【路子】
# display as 路子
# JP: 「ここだよ、そーちゃん」
2047 = "「Em ở đây nè, anh Sou.」"

# monologue
# JP: いつもと同じく、路子は座席に座っている。\nどこの景色にも見える車窓を、傍らに。
2995 = "Michiko vẫn ngồi trên ghế như mọi khi. Bên cạnh ô cửa sổ nhìn ra một khung cảnh trông như có thể là bất cứ đâu."

# 【路子】
# display as 路子
# JP: 「そーちゃん、新聞ありがとう」
2001 = "「Anh Sou, cảm ơn anh vì tờ báo nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「新聞？　――ああ」
1968 = "「Báo? ——À.」"

# monologue
# JP: 路子の膝に、きれいに折られた、『8620運転台通信』。\nその上には、『クマ川流域イラストマップ』も乗っている。
3003 = "Trên đùi Michiko là tờ 『Bản tin buồng lái 8620』 được gấp gọn gàng. Bên trên còn có cả 『Bản đồ minh họa lưu vực sông Kuma』 nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「駅で手にとってくれたのか？\nこの列車を、おりることが出来たのか？」
1967 = "「Em lấy ở nhà ga sao? Em đã có thể xuống khỏi chuyến tàu này rồi à?」"

# 【路子】
# display as 路子
# JP: 「ううん、おりない。ひっぱられるから。\nそれに、れっ車。駅にもとまらないもん」
1699 = "「Không, em không xuống đâu. Vì sẽ bị kéo lại mà. Hơn nữa, chuyến tàu này, cũng không dừng lại ở ga.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう、なのか。\nなら――どうやって？」
2136 = "「Vậy, sao.\nThế thì——bằng cách nào?」"

# 【路子】
# display as 路子
# JP: 「うふふ、やっぱりおぼえてないんだぁ」
1929 = "「Ufufu, quả nhiên là anh không nhớ rồi.」"

# monologue
# JP: 路子が笑う。\nくすくすといたずらっぽく――なのに、どこかさみしげに。
3004 = "Michiko cười. Cười khúc khích đầy tinh nghịch——nhưng lại có chút gì đó cô đơn."

# 【路子】
# display as 路子
# JP: 「そーちゃんがもってきてくれたんだよ？」
2266 = "「Là anh Sou mang đến cho em đó?」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕がか」
2069 = "「Anh sao?」"

# 【路子】
# display as 路子
# JP: 「うん。なんにもいわないで、すぐいなくなって。\nだけど、そーちゃん、ちゃあんともってきてくれたの」
1892 = "「Vâng. Dù chẳng nói gì cả, và rời đi ngay. Nhưng anh Sou đã thực sự mang đến cho em đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1852 = "「À——」"

# monologue
# JP: 記憶は無いが、納得できる。\n運転台通信の一号の、御一夜流域イラストマップの――
3063 = "Dù không nhớ, nhưng tôi có thể hiểu được. Khi cầm trên tay Bản tin buồng lái số đầu tiên, hay Bản đồ minh họa lưu vực Ohimitera——"

# monologue
# JP: 完成品を手に取った時、『路子にも見せてやりたい』と、\n僕は確かに、思っていたから。
2770 = "Khi cầm những thành phẩm đó trên tay, tôi thực sự đã nghĩ: 『Mình cũng muốn cho Michiko xem』."

# 【双鉄】
# display as 雙鐵
# JP: 「何も言わずに、すぐにいなくなって――か」
1711 = "「Chẳng nói gì cả, và rời đi ngay——sao.」"

# 【路子】
# display as 路子
# JP: 「うん。だからね、みち。\nそーちゃん、クタクタなんだろうなぁって思ったの」
1889 = "「Vâng. Thế nên Michi nghĩ là, chắc anh Sou đang mệt lử rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、な」
2128 = "「Ừm, đúng vậy.」"

# monologue
# JP: “夢も見ぬほどの深い眠り――”\nその最中にも、僕は路子に届けたいものを届けていた。
1265 = "\"Một giấc ngủ sâu không mộng mị——\" Ngay cả trong lúc đó, tôi vẫn mang những thứ muốn đưa cho Michiko đến cho em ấy."

# monologue
# JP: 教えてもらえて、ホっとする。\n僕と路子は、深いところで、今も繋がっていると思えて。
2938 = "Nghe em ấy nói vậy, tôi cảm thấy nhẹ nhõm. Bởi tôi tin rằng, tôi và Michiko vẫn đang kết nối với nhau từ tận sâu thẳm tâm hồn."

# 【路子】
# display as 路子
# JP: 「そーちゃん、がんばってるもんね。\n新聞、とっても面白いもん」
2000 = "「Anh Sou đang rất cố gắng mà.\nTờ báo thú vị lắm đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういってもらえるとなによりだ。\n実際、かなり評判もいい」
2279 = "「Nghe em nói vậy anh vui lắm. Thực tế thì nó cũng được đánh giá khá cao đấy.」"

# 【路子】
# display as 路子
# JP: 「そーなの？」
2138 = "「Vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。廣島に電車姫様という方がいらっしゃるのだが、\nこの方が運転台通信をいたく気に入ってくれてな」
2117 = "「Ừ. Ở Hiroshima có một người tên là Denshahime, cô ấy rất thích Bản tin buồng lái này.」"

# monologue
# JP: \\x%l客車;#00ffc040;客車%l;#;の譲渡を賜ったことが、8620の営業運転開始に繋がり。\n結果、御一夜鉄道への一般からの注目も大いに強まった。
2662 = "Việc cô ấy nhượng lại \\x%l客車;#00ffc040;toa hành khách%l;#; đã mở đường cho 8620 bắt đầu vận hành thương mại. Kết quả là sự chú ý của công chúng dành cho Đường sắt Ohito cũng tăng lên đáng kể."

# 【双鉄】
# display as 雙鐵
# JP: 「クマ川流域イラストマップも、おかげで予想を上回る\nご協力を頂け、多くの拠点に置いて貰い好評を得ている」
1958 = "「Nhờ đó mà Bản đồ minh họa lưu vực sông Kuma cũng nhận được sự hợp tác vượt ngoài mong đợi, được đặt ở nhiều nơi và nhận được nhiều phản hồi tích cực.」"

# 【路子】
# display as 路子
# JP: 「いいことづくめだねぇ」
1974 = "「Toàn là chuyện tốt nhỉ.」"

# monologue
# JP: にぱっと、路子の笑顔が咲く。
2999 = "Michiko nở một nụ cười rạng rỡ."

# 【路子】
# display as 路子
# JP: 「パパとママにも、みてもらえてるかなぁ」
1692 = "「Không biết ba và mẹ có thấy được không nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「見てもらえていたら――\n路子を迎えにきてくれているさ」
1978 = "「Nếu họ thấy được——\nthì đã đến đón Michiko rồi.」"

# 【路子】
# display as 路子
# JP: 「あー。そっかぁ」
1878 = "「A. Ra vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だからまだ、単純に届いていないんだと思う。\n届けるために、足りない部分もまだ数多ある」
2071 = "「Thế nên anh nghĩ đơn giản là nó vẫn chưa đến được tay họ thôi. Để truyền tải được, vẫn còn vô vàn thiếu sót cần bù đắp.」"

# 【路子】
# display as 路子
# JP: 「あまたって」
2013 = "「Vô vàn là...」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1857 = "「A.」"

# monologue
# JP: 路子の声が遠ざかる。\n全てが光に溶けていく。
3001 = "Giọng nói của Michiko xa dần. Tất cả tan biến vào trong ánh sáng."

# monologue
# JP: 目覚めは、いつでも唐突で――
2902 = "Sự thức giấc, lúc nào cũng thật đột ngột——"

# 【双鉄】
# display as 雙鐵
# JP: 「またな。路子、\n話の続きは、この次に」
1770 = "「Hẹn gặp lại nhé. Michiko, chuyện lúc nãy, lần sau anh sẽ kể tiếp.」"

# monologue
# JP: ――けれども目覚めて動かなければ。\n終着駅に。僕も、路子も、たどり着けない。
1254 = "——Nhưng nếu không thức dậy và hành động. Thì cả tôi và Michiko, đều không thể đến được ga cuối."

# 【双鉄】
# display as 雙鐵
# JP: 「おはよう、ポーレット。おはよう、れいな」
2102 = "「Chào buổi sáng, Paulette. Chào buổi sáng, Reina.」"

# 【ポーレット】
# display as 波萊特
# JP: 「おはようございます！　双鉄くん。\n今日は、よろしくお願いします」
2103 = "「Chào buổi sáng! Anh Soutetsu. Hôm nay, mong anh giúp đỡ nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「こちらこそ、よろしく頼む」
2012 = "「Tôi cũng mong cô giúp đỡ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「お天気もよくて、嬉しいです！\n天気予報、朝から雨の予報だったのに」
1714 = "「Thời tiết đẹp thế này, vui quá đi mất! Dự báo thời tiết rõ ràng bảo sáng nay có mưa mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1851 = "「Hửm?」"

# monologue
# JP: ポーレットは見るからにご機嫌だ。\n僕まで嬉しくなってくる。
2874 = "Trông Paulette rất vui vẻ. Làm tôi cũng cảm thấy vui lây."

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　今日の僕は、\n塗り替えでも手伝わされるのか？」
2021 = "「Sao thế? Hôm nay tôi\nphải giúp cô sơn lại tàu à?」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　別にそんな予定はないですけど」
1841 = "「Hả? Đâu có dự định đó đâu.」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。それはですねぇ、そうてつさぁん」
1932 = "「Ufufu~. Chuyện là vầy nè, anh Soutetsu~.」"

# monologue
# JP: れいなも、にこにこ――いつも以上のにっこにこだ。
2895 = "Reina cũng đang cười tủm tỉm——cười tươi hơn cả mọi ngày."

# monologue
# JP: ポーレットのご機嫌と、増幅しあっているかのように、\nレールショップの中をひたすら、幸せ笑顔で満たしている。
2702 = "Như thể đang cộng hưởng với tâm trạng vui vẻ của Paulette, nụ cười hạnh phúc của em ấy lan tỏa khắp Cửa hàng đường sắt."

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんが、今日一日、\nポーレットのお手伝いをしてくれるからなんですよぉ」
2300 = "「Là vì hôm nay, anh Soutetsu sẽ giúp đỡ chị Paulette cả ngày đó nha~.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　確かに今日は、その約束だが」
1928 = "「Hửm? Đúng là hôm nay tôi đã hứa vậy.」"

# 【れいな】
# display as 玲奈
# JP: 「ポーレット、そのおはなしをきいてから、\nずうっとニコニコそわそわしてて、昨日なんてですねぇ」
2181 = "「Chị Paulette, từ lúc nghe chuyện đó, cứ cười tủm tỉm rồi bồn chồn suốt, hôm qua á nha~...」"

# 【ポーレット】
# display as 波萊特
# JP: 「れいな！　おくち\\x%l閉塞;#00ffc040;閉塞%l;#;！！　\nそれはナイショ！！ ナイショなのっ」
2188 = "「Reina! \\x%l閉塞;#00ffc040;Đóng đường%l;#; miệng lại ngay!! Chuyện đó là bí mật!! Bí mật đó!」"

# 【れいな】
# display as 玲奈
# JP: 「わわわぁ、れいな、おくち\\x%l閉塞;#00ffc040;閉塞%l;#;ですよぉ！」
1823 = "「Oa oa oa, Reina \\x%l閉塞;#00ffc040;đóng đường%l;#; miệng lại đây nha~!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと」
1712 = "「Trời ạ.」"

# monologue
# JP: 僕とても、鉄道運輸に関わるものだ。\n\\x%l閉塞;#00ffc040;閉塞%l;#;されては、進入できん。が――
2737 = "Tôi cũng là người làm trong ngành vận tải đường sắt. Đã \\x%l閉塞;#00ffc040;đóng đường%l;#; rồi thì làm sao mà tiến vào được. Nhưng mà——"

# monologue
# JP: （少し、心配になってしまうな）
3098 = "（Có chút lo lắng rồi đây.）"

# monologue
# JP: 僕が手伝うという程度で、そこまで浮かれるのであれば、\nポーレットの普段の激務は、見た目以上なのかもしれん。
2582 = "Nếu chỉ việc tôi giúp đỡ mà cô ấy đã phấn khích đến vậy, thì có lẽ khối lượng công việc hàng ngày của Paulette còn khủng khiếp hơn vẻ bề ngoài nhiều."

# 【ポーレット】
# display as 波萊特
# JP: 「こほんっ！」
1822 = "「E hèm!」"

# monologue
# JP: 誤魔化すような咳払い。
2650 = "Một tiếng hắng giọng như để lấp liếm."

# monologue
# JP: ポーレットは姿勢をただし、改めて、\nまっすぐな目を僕へと向ける。
2862 = "Paulette chỉnh lại tư thế, một lần nữa, hướng ánh mắt thẳng thắn về phía tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「でも、本当にいいんですか？　せっかくのお休みなのに。\nゆっくり休めるのなんて、何ヶ月かぶりでしょう？」
1697 = "「Nhưng mà, anh thực sự thấy ổn chứ? Hôm nay là ngày nghỉ hiếm hoi của anh mà. Đã mấy tháng rồi anh mới có một ngày nghỉ ngơi đúng nghĩa phải không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、まるまるの休みとなるとな」
1686 = "「À ừ, nếu tính là một ngày nghỉ trọn vẹn thì đúng là vậy.」"

# monologue
# JP: 運転・\\x%l保線部長;#00ffc040;保線部長%l;#;を任され、乗務と実務と管理とだけでなく、\nポーレットの名代的な会議・出張なども増加してきた。
2746 = "Kể từ khi được giao chức vụ Trưởng bộ phận Vận hành và \\x%l保線部長;#00ffc040;Bảo trì đường ray%l;#;, không chỉ công việc trên tàu, thực tế và quản lý, mà các cuộc họp, chuyến công tác thay mặt Paulette cũng ngày càng tăng."

# monologue
# JP: その上無論、日々姫の営業も継続している。\n丸一日を完全に休めるなどは、実際のところ数カ月ぶりだ。
2932 = "Thêm vào đó, tất nhiên là công việc quảng bá của Hibiki vẫn đang tiếp tục. Nghỉ ngơi trọn vẹn một ngày, thực tế đúng là chuyện của mấy tháng trước rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「だからこそ、普段には出来ないことに\n取り組みたいという気持ちは強い」
2078 = "「Chính vì vậy, tôi càng muốn làm những việc mà bình thường không có cơ hội làm.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
1893 = "「Vâng.」"

# monologue
# JP: 誰かと向き合いたいのであれば、より自然な相手の姿を\nみたいのであれば、“向き合う”とは伝えない方がいい。
2677 = "Nếu muốn đối diện với một ai đó, nếu muốn nhìn thấy dáng vẻ tự nhiên nhất của họ, thì tốt nhất không nên nói thẳng là muốn \"đối diện\"."

# monologue
# JP: 日々姫と向き合ったあの日の経験は、\nその単純な事実を僕に、気づかせてくれた。
3038 = "Trải nghiệm trong cái ngày đối diện với Hibiki, đã giúp tôi nhận ra một sự thật giản đơn như thế."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、今日はポーレットの仕事を見て学びたいのだ。\nその上で、僕でも手伝えることがあれば手伝いたい」
1956 = "「Thế nên, hôm nay tôi muốn quan sát và học hỏi công việc của Paulette. Sau đó, nếu có việc gì tôi giúp được, tôi muốn giúp một tay.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1857 = "「啊」" 

# 【れいな】
# display as 玲奈
# JP: 「むむむぅ。むーむむむぅむむむむむー」
