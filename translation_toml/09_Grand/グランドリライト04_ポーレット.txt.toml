2042 = "「我們——也曾在那個夏天一起沿著這條線路走過嗎」" 

# monologue
# JP: 言った瞬間、ポーレットがほっと笑み崩れる。
2971 = "話音剛落，波萊特就露出了燦爛的笑容。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。やっぱり」
2119 = "「是啊。果然有走過」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1882 = "「嗯——」" 

# monologue
# JP: 笑ってくれる。\nポーレットが。
2853 = "波萊特在笑。" 

# monologue
# JP: あの日の少女が、笑ってくれる。\nとても、嬉しい。少しは、恩を返せた気がする。
3036 = "那一天的少女露出了笑容。我特別開心。有種稍微回報了恩情的感覺。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとう」
1283 = "「——謝謝你」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　ええっ！？　なに、どうして、\n急に、ありがとうって」
1836 = "「哎！？哎哎！？什麼，為什麼突然跟我道謝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ポーレットに救われたんだ。\n無限に続くものかと思っていた――いや」
2105 = "「是你拯救了我。我本來以為會永遠持續下去——不」" 

# monologue
# JP: 違う。\nそれは違うと、今ならわかる。
2514 = "不。現在我終於明白，其實並非如此。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が望んで繰り返し続けていた、苦しみと憎しみに。\nポーレット。君が、区切りをくれたんだ」
1768 = "「其實我是主動投入那痛苦和憎恨的循環之中的。波萊特，是你帶我走到了終點」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　あの――そんなこと、わたし、全然。\nただ――ええと、自分で思ったこと、いっただけで」
1840 = "「哎！？那個，我沒做什麼大不了的事。我只是……呃，只是說了自己的感受而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが、僕には救いだった」
2166 = "「正是你的話拯救了我」" 

# monologue
# JP: 初対面の、僕のことなどまったく知らぬ少女のくれた、\nまっすぐな言葉。
2809 = "正因為那是對我一無所知的陌生少女所說的真心話。" 

# monologue
# JP: だからこそ少しも捻じれることなく、\n心の奥の一番暗いところまで、届いたのだろう。
2778 = "才能夠不偏不倚地直達我內心深處最黑暗的部分吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、思う。望みでも気持ちでも足りない部分を、\nまず補ってくれるものは――優しさだ」
2073 = "「所以我在想，希望和決心都不足以克服傷痛的話，最佳的補充就是——溫情」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄、くん」
# 2299 = "「雙鐵……君」" 

# monologue
# JP: 青い瞳が、わずかに潤む。\n一歩を、大きく近づいて――っ！？
2949 = "藍色雙眸有些濕潤的她。居然朝著我邁出一大步——！？" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1857 = "「啊」" 

# monologue
# JP: 頭上を、さりげなくよぎった機影。
3074 = "飛行器的影子漫不經心地從頭頂上掠過。" 

# monologue
# JP: ポーレットはほんの一瞬、ひどく悔しそうな顔をして、\nぐっと目を閉じ、深呼吸する。
2850 = "波萊特一時間露出非常不甘心的表情，但她馬上緊閉雙眼，深吸了一口氣。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……昔の、大事な話のつづき。\nわたし、いつか――」
1341 = "「……關於以前那件還沒說完的重要之事。在不久的將來——」" 

# monologue
# JP: それがいつかを、決めようとしているのだろうか？
2647 = "她想要確定那個日期嗎？" 

# monologue
# JP: ポーレットの柔らかそうな唇が、\nもごもご幾度か、小さく動く。
2857 = "波萊特張開柔軟的嘴唇，囁嚅著說道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが、走らせたい列車が走ったら。\nそのときにまた、話したいです」
2052 = "「我想等你理想中的列車開起來的時候，再跟你說這件事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。じっくり話したい」
2035 = "「我也是。那時候再好好聊聊吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、ありがとうございます！」
1941 = "「嘿嘿，謝謝你！」" 

# monologue
# JP: 花がこぼれるような笑み。
2683 = "如花兒綻放般的笑容。" 

# monologue
# JP: ポーレットはこれほどにあどけなく、\nこれほどに愛らしかったかと、少し驚く。
2762 = "我有點驚訝，原來波萊特是如此的天真爛漫，如此的可愛嗎？" 

# 【ポーレット】
# display as 波萊特
# JP: 「それなら、“そのとき”を早めるためにも、\nお話、前に進めましょう」
2288 = "「那麼為了讓“那個時候”早日到來，我們繼續談下去吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1893 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「優しさだとか、思いやり。\nそれは余裕が無いと、なかなか表に出てきませんよね？」
1743 = "「像溫情以及關懷之類，這些必須在自己能夠保持從容的時候才能表現出來吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1860 = "「啊！」" 

# monologue
# JP: 切り替わる。\n話の内容も、ポーレット自身も。
2972 = "話題的內容，還有波萊特自身的狀態，都迅速地進行了切換。" 

# monologue
# JP: いま僕の目の前に戻ってきたのは、気弱で控えめだが、\n極めて有能な市長で社長の、雛衣ポーレットだ。
2673 = "如今回到我面前的，是那個雖然軟弱而保守，但又才華橫溢的市長兼社長，雛衣波萊特。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。そして……\n余裕を支える物――普段のくらしでは……ああ、お金か」
2134 = "「是啊，還有……在日常生活中能讓人維持從容的東西……啊，是錢嗎」" 

# monologue
# JP: 僕がここまで立ち直れたのも、\n右田の家の手厚い保護があってこそだとしみじみ思う。
2733 = "我也深刻認識到，我能振作起來，都是多虧了右田家的精心保護。" 

# monologue
# JP: ポーレットにもらったきっかけとても、\nくらしが荒んでいたならば、朽ちてしまっていただろう。
2611 = "哪怕波萊特給了我希望，但在生活上窮困不堪的話，我還是會沉淪下去吧" 

# 【ポーレット】
# display as 波萊特
# JP: 「お金、凄く大事です。お金が無いと、時間が無いと、\n人は、優しく出来なくなっちゃう」
2291 = "「錢是很重要的。沒有錢，沒有時間的話，人就拿不出溫情來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1893 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だから、双鉄くんが、お金のことを専門家――\n銀行さんに任せようとしたこと、大正解と思ってます」
2079 = "「所以，我認為你將金錢方面的事交給專家——銀行，這是正確的選擇」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、銀行は動いてくれない。\n足掛かりなしには、あまりに困難な事業だと断じられた」
1731 = "「但是，銀行不會幫忙。他們認為我們缺乏立足點，要做成這件事太困難了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。そうして、共感だけでは、\n足掛かりとしては十分じゃない」
2112 = "「是啊。光靠共鳴不足以成為可靠的立足點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。共感だけでは、くらしを支えることは出来ない」
2114 = "「是啊。只有共鳴是維持不了生活的」" 

# monologue
# JP: 僕の言葉に、ポーレットは大きくうなずき返す。
2939 = "聽到我的話，波萊特用力點了點頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ここまでを共通理解として――\nいったん、現状を整理しますね？」
1759 = "「先以我們剛才談到的共識——來整理一下現狀吧」" 

# monologue
# JP: ＜大目標＞御一夜－八ツ城間の復線
3103 = "＜大目標＞讓御一夜到八代之間的廢線恢復" 

# monologue
# JP: ＜期待効果＞　・復線自体のビジネス化\n・車両検査需要の発生　・沿線観光需要の刺激
3106 = "＜預期成果＞・恢復廢線本身的商業效益・製造車輛檢查的需求・刺激沿線觀光的需求" 

# 【ポーレット】
# display as 波萊特
# JP: 「あとは――」
2275 = "「還有——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「貨物輸送が出来るようになり、\nエアクラ工場の移転候補先も広がる」
1991 = "「實現貨運功能，擴大空凝機工廠遷移地的選擇空間」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうでした」
1879 = "「啊，沒錯」" 

# monologue
# JP: さすが、細かいことには自信があるというだけはある。
2517 = "不愧是在處理細節方面極有自信的人。" 

# monologue
# JP: ポーレットのメモは要点を、\n綺麗に見やすくまとめあげていく。
2856 = "波萊特將要點整齊而有序地歸納在了筆記本上。" 

# 【ポーレット】
# display as 波萊特
# JP: 「観光列車を日々姫さんがデザインする――\nっていうのは、\x%l種車;#00ffc040;種車%l;#;の改装、ってことですよね？」
2232 = "「觀光列車由日日姬小姐進行設計——就是指改裝\\x%l種車;#00ffc040;原車%l;#;的意思吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。8620に関しては、\n譲ってもらった\x%l客車;#00ffc040;客車%l;#;の改装で走らせるのが一番よかろう」
1887 = "「嗯。就８６２０的情況來說，改裝轉讓給我們的\\x%l客車;#00ffc040;客運車廂%l;#;是最好的辦法」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。これも、うまくいったら\nデザインと改装とで、ビジネスにできると思います」
2058 = "「我明白了。如果順利的話，商業化的設計與改裝應該是可行的」" 

# monologue
# JP: 言って、メモして。\nとん、とそのメモをポーレットのペン先は軽く叩く。
2878 = "波萊特邊說邊做記錄，然後用筆尖輕輕地敲了敲筆記本。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし的に、次に一番必要になってくるのは、\n『湯医方面の観光資源』じゃないかって思います」
2067 = "「我認為，第二重要的應該是“湯醫方面的旅遊資源”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。その観光資源のイメージを、\n観光列車への\x%l客車;#00ffc040;客車%l;#;改装イメージと共通させるのか」
1779 = "「原來如此。把\\x%l客車;#00ffc040;客運車廂%l;#;的改裝方向往湯醫旅遊資源的形象上靠嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です。湯医線全線もそのイメージにして、双鉄くんの、\n『路線の観光カタログ化』の成功例にしていきます」
2145 = "「是的。讓這個形象覆蓋湯醫線全線，作為你的“鐵路觀光商品目錄化”的成功案例」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1893 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「路線の観光カタログ化と、沿線全体の経済復興。\nこれが叶えば、復線買収の大きな足掛かりになります」
2293 = "「鐵路觀光商品目錄化與沿線整體的經濟復興。如果能實現，就能極大促進收購廢線土地的實施」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。であれば――温泉と\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の町――\n御一夜のイメージで、湯医線全線を統一すれば」
1919 = "「嗯，那麼……用御一夜的“溫泉與\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;之城”的形象，來統一整條湯醫線就行了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それじゃダメです、双鉄くん。\nそれだと、湯医線は栄えない」
2264 = "「這可不行，雙鐵君。這樣是不可能讓湯醫線繁榮起來的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1922 = "「嗯？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だって――今回の復線が成功したら、\n間違いなく、次は御一夜－早戸の復線になりますよね？」
1959 = "「因為……如果這次廢線恢復成功的話，接下來肯定就輪到恢復御一夜到隼人之間的廢線了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、僕も考えていた。そうできれば、\n鹿兒島方面と線路が環状に繋がる――――あ」
2037 = "「我也是這麼想的。如果能成功，與鹿兒島方面就能串起一條環形的線路————啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です。そうなったら、湯医線は環状の外――\n『わざわざ乗り換えて行く場所』になっちゃうんです」
2172 = "「沒錯。這樣一來，湯醫線就會被排除在環形線路之外——變成“需要特地換乘才能去的地方”了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。ゆえ、湯医線沿線の湯医側に――\n『乗り換えてもわざわざ行く価値』が必要なのか」
2205 = "「確實。因此需要讓湯醫線沿線的湯醫擁有“特地換乘去觀光的價值”是嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうです」
2147 = "「是的」" 

# monologue
# JP: うかつであった。\nその準備なく、もしも復線を進めていれば――
2796 = "是我疏忽了。如果不做好這個準備就推進廢線恢復的話——" 

# monologue
# JP: ただでさえ減少止まらぬ観光客を、\n更に吸い取られる結果をも招きかねなかった。
2799 = "本來就在不斷減少的遊客可能會被進一步分流掉的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ、なるほど。宝生元忠が『乗れない』と\n断じたのも、無理からぬことであったか」
1949 = "「噢，原來如此。看來寶生元忠斷言“沒人會坐”也不是信口開河啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの人が、御一夜の経済復興を真剣に考えている\nことは間違いないと思います」
2055 = "「我想，他是真心想要復興御一夜的經濟的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「八ツ城－御一夜間より先に、まず湯医線だな。\n……夢を見すぎて、自分の足元をおろそかにするとは」
1962 = "「在解決八代到御一夜的問題之前，先要解決湯醫線的問題啊。……沒想到我太著迷於夢想，居然疏忽了腳下」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは、いいことだって思います」
2065 = "「我覺得這是一件好事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1851 = "「唔？」" 

# monologue
# JP: 微笑んでいる。優しく、優しく。\nまるでポーレットの方が、甘やかな夢を見ているように。
2865 = "波萊特的微笑很溫柔，就彷彿在做美夢的人反倒是她。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんと日々姫ちゃん。それから、れいなと、\n凪ちゃんとふかみちゃんには、夢、見て欲しいです」
2049 = "「我希望你、日日姬、還有玲奈、小凪和小深都擁有夢想」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
1843 = "「哦？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしと、ハチロクちゃん。稀咲さん、真闇さんに\nナビちゃんもですよね。こっちが、足元を固める担当」
2029 = "「我、八六、稀咲小姐、真闇小姐、Ｎａｖｉ也一樣，都是為你們鋪路的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……足元を固める担当のメンツが、凄まじいな。\nそちらだけで、なんでも出来てしまいそうだが」
1339 = "「……鋪路的陣容還真豪華啊。感覺只靠你們，就已經是無所不能的了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いいえ？　大事なのは夢の方です。\n大きな、大きな夢」
1702 = "「不，重要的是夢想。巨大的夢想」" 

# monologue
# JP: （ぴとっ）
3100 = "（觸碰）" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ」
# 1848 = "「唔」" 

# monologue
# JP: ポーレットの手がふんわりうごく。\n僕の心臓、その上に、てのひらが柔らかく当てられる。
2868 = "波萊特的手輕輕一動。她的手心溫柔地貼在我的心臟上方。" 

# 【ポーレット】
# display as 波萊特
# JP: 「大きな夢を、双鉄くんが描いてくれなければ、\n結束も出来なくて、ここまでだってこれてなかった」
1983 = "「如果沒有你去描繪巨大的夢想，大家就不會團結，我們也不會有今天」" 

# monologue
# JP: ――僕の立場で肯定は出来ぬが、確かにだ。
1259 = "——雖然我不能自賣自誇，但這是事實。" 

# monologue
# JP: 結束でき、上手く動いていたのなら、\nそもそも僕は、帝都から戻ってきてもいなかった。
2675 = "如果大家能團結，一切都順利的話，我從一開始就不會從帝都回來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「だから、わたしも。わたしの役割を果たしたい。\n一つでも、双鉄くんの夢の足跡、固めたいんです」
2076 = "「所以，我也想盡到我的職責。我想儘可能為你的夢想鋪好路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとう、ポーレット」
1284 = "「——謝謝你，波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえいえですよ。わたしたちの仲じゃないですか！」
1688 = "「不不不，你跟我客氣什麼啊！」" 

# monologue
# JP: 言って、笑って。\n弾むようにして一歩を離れて。
2879 = "波萊特邊說邊笑，往旁邊跳開了一步。" 

# monologue
# JP: ポーレットはどこか、おどけたように小首をかしげる。
2785 = "接著她淘氣地歪了歪小腦袋。" 

# 【ポーレット】
# display as 波萊特
# JP: 「なんでも言ってくださいね？\nわたし、がんばってお手伝いしちゃいますから！」
1982 = "「如果有什麼要求的話要跟我說哦。我會努力幫助你的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ああ――これは、美しいな」
1315 = "「……嗯……這裡真是漂亮啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんもそう思いますか？　わたしもなんです。\nこういうの好きな人、結構いそうって思うんです」
1735 = "「你也這麼想嗎？我也是。喜歡這種景象的人應該不少」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1893 = "「嗯」" 

# monologue
# JP: 夕方の乗務を終えて、もう一度、\n回送扱いで折り返しての、術仙炭鉱廃駅。
2923 = "結束傍晚的乘務工作後，我們又一次空車返回了術仙煤礦廢車站。" 

# monologue
# JP: 少し歩けば見えてくるのは、\n朽ちゆく物の悲しみと美が、夕陽の中に沈む景色だ。
2584 = "只要走幾步，就能看見逐漸腐朽之物在夕陽中沉沒的悽美景色。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……確かにここは、\n上手く活かせば観光資源となりそうだ」
1333 = "「……確實。這裡如果能善加利用，應該能成為旅遊資源」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わぁ！」
1827 = "「哇！」" 

# monologue
# JP: 嬉しげな声。\n夕日の赤に溶けていきそうな頬と微笑み。
2885 = "波萊特高興地叫了一聲，她露出的微笑似與晚霞融為一體。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう思ってもらえて嬉しいです。わたし、前から、\n双鉄くんに相談したいって思ってましたから」
2210 = "「聽到你的想法我很高興。我一直都很想找你談談這裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「相談？」
2236 = "「談談這裡？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、ここのこと。術仙廃炭鉱のことを、です」
2174 = "「沒錯，就是這裡。術仙廢煤礦」" 

# monologue
# JP: ポーレットが大きく手を広げる。
2858 = "波萊特張開雙臂。" 

# monologue
# JP: 生き生きとしている動きがかえって、\n“廃”という言葉を強く、残響させる。
2619 = "在她生動的動作反襯下，“廢”這個字眼顯得格外突出。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ここって、市が完全に所有している物件なんです。\nだけど――再開発には、障害、いろいろ多くて」
2273 = "「這裡的產業完全歸市裡所有。但是……要二次開發的話，障礙可就多了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どのような障害だ？」
1710 = "「什麼樣的障礙？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええと――なら、\n廃坑に至った経緯から、簡単に説明しますね？」
1814 = "「呃……那我就簡單說明一下它被廢棄的經過吧」" 

# monologue
# JP: ……ポーレットの説明はわかりやすい。\n歴史的経緯、そして現状、関係者の思い――
1279 = "……波萊特的說明很簡單易懂。歷史的經過，以及現狀，有關人員的想法。" 

# monologue
# JP: そうしたものがぼんやりとだが、\n僕の中でも、ひとつの像を結ぶに至る。
3062 = "雖然很模糊，但還是在我的心中結合成了一個整體。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまり、この炭鉱町と炭鉱とは――\n御一夜市そのものの、乗り越えるべき、過去なわけか」
1705 = "「也就是說，這個礦山鎮和煤礦，是御一夜市必須要克服的過去是嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1860 = "「啊！」" 

# monologue
# JP: ポーレットが僕の目を見る。\n見つめ返して頷けば、強い頷きが返される。
2873 = "波萊特看著我的雙眼。我回應她的目光並點了點頭，她也用力點了點頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。乗り越えなければ、進めない――\nきっと、そういう、過去の傷です」
2124 = "「是啊。這就是過去的傷痕，不跨過去的話就無法前進」" 

# monologue
# JP: 過去の、傷。
3029 = "過去的傷痕。" 

# monologue
# JP: 僕が抱えているものと――そうして恐らく、\nポーレットが抱え込んでいるものとも、同じ類の。
2773 = "或許和我內心的傷痕——恐怕連波萊特內心的傷痕都屬於同一類。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、今のこの町を活かしたいんだよな？\n壊して、作り変えるのではなく」
1737 = "「你想要保持這個鎮子當今的風貌對吧？不是破壞，也不是改變」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうです。もちろんそれが、\n観光資源として価値を持つならっていう前提ですけど」
2144 = "「是的。當然前提是它確實具備作為旅遊資源的價值」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、まったく同じ思いだ」
2039 = "「我也跟你想得一樣」" 

# monologue
# JP: 過去の傷がどれほどしつこく痛むのか、\n僕らは身をもってしっている。
3030 = "過去的傷痕有多頑固多痛苦，我是深有體會的。" 

# monologue
# JP: 傷を隠してそっぽを向いて、綺麗な服をたとえ着せても、\nいつか傷から溢れ出す血に染められてしまうことだろう。
2613 = "哪怕穿上華麗的衣著，隱藏傷痕故作不見，從傷痕中溢出的血也遲早會滲出來的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「であれば、歩こう、この町を。\nそうして、良いところをたくさん探そう」
2286 = "「那我們就在這座鎮子裡走走吧，去尋找更多的美好吧」" 

# monologue
# JP: 向かい合うこと。\n深く知ること。
2576 = "去面對，去深刻了解。" 

# monologue
# JP: そうしたところで、傷を癒やすことはできないけれど、\nどう付き合えばいいのかは、多少は見えてくるかもしれん。
3064 = "雖然這麼做無法讓傷痕痊癒，但或許可以發現與傷痕共存的方法。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、喜んでおともします！」
1914 = "「嗯，樂意至極！」" 

# monologue
# JP: ……夕暮れが、僕の気持ちも\nノスタルジーの底へと沈める。
1275 = "……夕陽讓我的心也沉入了深深的鄉愁。" 

# monologue
# JP: アパートの中に置き去りになった家具やおもちゃが、\nかけがえのない、貴重なものとさえも思える。
2704 = "就連被扔在公寓裡的家具和玩具，似乎都成了無價的寶物。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……綺麗、ですね。置き忘れられた宝石みたい。\n綺麗だからこそ、とてもさみしい」
1319 = "「……好漂亮，就像是被遺忘的寶石一樣。因為漂亮，更突顯了寂寥的氛圍」" 

# monologue
# JP: 夕陽が揺らめく。\n雲はまだ、まばらに空に残っている。
2631 = "夕陽在搖曳。天空上還遍布著稀稀拉拉的雲彩。" 

# monologue
# JP: 結局雨は降らなかったと――\nふとした思いが、疑問につながる。
2533 = "今天到頭來還是沒下雨啊。腦中忽然冒出的念頭帶來了一個疑問。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この美しさは――夕焼けでなければどうだろう。\n時間は調整できるにしても、例えば、雨降りだったら」
2272 = "「這片美景，在其他的天候下又會如何呈現呢？調整得了時間也改變不了天候，比如下雨的話」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――」
# 1852 = "「啊——」" 

# monologue
# JP: 少し目を閉じ、考え込んで、\nポーレットはゆるゆると、困りきったような声を出す。
2881 = "波萊特閉上眼睛思考了一會，然後緩緩地用非常為難的聲音說道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「だめ、ですね。マジックアワーの魔法が解けたら、\n景色だけで観光するのは、全然無理です」
1695 = "「不行啊。如果魔術時刻的魔法被解除的話，想光靠這些景色來觀光是行不通的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「マジックアワー？」
2310 = "「魔術時刻？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですよ？　ちょうど今の時間。\nね？　わたしのことを見てください。双鉄くん」
2131 = "「是啊，正好就是現在這個時段。你好好看看我，雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1848 = "「唔」" 

# monologue
# JP: ポーレットが僕へと向いて、\n可愛らしく両手を広げてみせる。
2884 = "波萊特面對著我，可愛地展開雙手。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、いつもより綺麗でしょう？」
2061 = "「我看起來是不是比平常更漂亮？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2111 = "「是啊——」" 

# monologue
# JP: 金の光に、金の髪。\n残照の赤と、頬の赤。
3054 = "金色的光芒映襯著她金色的秀髮。殘陽的餘暉照耀著紅通通的臉頰。" 

# monologue
# JP: ポーレットの柔らかそうな印象が、\n消えようとする光に溶け込み更に際立つ。
2880 = "波萊特那柔弱的印象溶入在即將消逝的光芒中，顯得越來越醒目。" 

# 【双鉄】
# display as 雙鐵
# JP: 「とても、綺麗だ」
2186 = "「特別美」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それ、普段にいってもらえたら、わたしきっと、\n嬉しさで倒れちゃうくらいなんですけど」
1980 = "「如果你在平常會這麼誇獎我的話，我一定會高興得暈過去吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1922 = "「嗯？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だけど残念。\nこの綺麗さは、マジックアワーの魔法なんです」
1728 = "「但是很遺憾。我顯得漂亮，全是多虧了魔術時刻的魔法」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
# 2138 = "「是嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。日が沈みかけて、だけど光は残ってて。\nそのせいで、影が一番小さくなって、温かみが残る」
2142 = "「是的。太陽逐漸西下，但是還殘留著光芒。因為這個原因，影子變得最小，留住了溫暖」" 

# monologue
# JP: 言われてみれば確かにだ。\n魔法は、どんどん薄れていってる。
2667 = "她這麼一說好像確實如此。魔法變得越來越淡薄。" 

# monologue
# JP: 夜の闇が、光の名残りを、\nあまりにも性急に追い出している。
2635 = "夜晚急不可耐地將殘留的光芒驅逐一空。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ライトを持ってきてよかったな」
2198 = "「真慶幸帶了手電筒」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。月明かりのお散歩も素敵ですけど、\nここだと、ちょっと危なすぎます」
2125 = "「是啊。雖然在月光下散步也很棒，但這裡有點太危險了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2128 = "「是啊」" 

# monologue
# JP: ライトをつければ、その光の中、\nポーレットが少しまぶし気な顔をする。
2756 = "我打開手電筒，光芒中的波萊特似乎覺得有些刺眼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……十分、綺麗だ。\nマジックアワーの魔法が解けても」
1313 = "「……哪怕解開了魔術時刻的魔法，也一樣很漂亮」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　あのっ――ええと！？\nあ！　この町が、ですか！！？」
1839 = "「哎！？那個……哎！？啊！你是指這個鎮子嗎！！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1881 = "「啊？」" 

# monologue
# JP: 言われて、周囲をぐるりと照らす。\n……なるほど、こちらは魔法が解けてる。
2937 = "聽到她的話，我照了一圈周圍。……原來如此，這邊的魔法解除了。" 

# monologue
# JP: さきほどまでの切ないほどの美しさは消え、\nどちらかというと今は、薄気味悪ささえ感じられる。
2526 = "之前的那種攝人心魂的悽美已經蕩然無存，現在的感覺甚至有些毛骨悚然。" 

# 【双鉄】
# display as 雙鐵
# JP: 「探検を――してみたくはなる風情だが」
2267 = "「這景致……讓人不由得想進行一番探險」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふえっ！？　えと、たんけん――って」
1821 = "「呃！？呃，探險是指……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「探検だの、冒険だのの、探検だ。ああ――いや。\nあるいはその方向で、観光資源化はどうだろう」
2004 = "「就是冒險的那個探險啊。啊——不，或者將這作為旅遊資源化的一種方案怎麼樣？」" 

# monologue
# JP: いえば、ポーレットがスっと落ち着く。\nというか――？　どこかガックリしているようにも見える。
2976 = "說完，波萊特一下子冷靜了下來——不，更應該說是有些沮喪。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あああ……なんで、『この町がですか？』なんて――\nううう……わたしのバカっ、いくじなしっ」
1859 = "「啊啊啊……為什麼我會說“你是指這個鎮子嗎？”。嗚嗚嗚……我真傻，太沒用了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　なんだ？」
1926 = "「嗯？怎麼了？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ああいえ！　なんでも！　なんでもないです！！\nありません！！」
1870 = "「啊，不！沒有！沒有沒有！！什麼都沒有！！」" 

# monologue
# JP: 大きな声で、大きく手を振り――
2643 = "她一邊大聲否定，一邊用力擺手。" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん！」
# 1894 = "「嗯！」" 

# monologue
# JP: 持ち上げ直した顔は、きりりと引き締まっている。
2669 = "她重新抬起頭，表情嚴肅起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「探検の方向で観光資源化って――\n例えば、どんな感じですか？」
1994 = "「將探險作為觀光資源化的一種方案——比如說呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば――そうだな。家族でここに来たとして。\nちいさなポーレットは、何をして遊びたい？」
2168 = "「比如說……對了。假設你們一家人來這裡旅遊，小時候的你會想玩什麼？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、ですか？　わたしなら――ええと――」
2045 = "「我嗎？我的話……嗯……」" 

# monologue
# JP: ポーレットが目を閉じ考え始める。\n僕の思考も、勝手に走る。
2882 = "波萊特閉上眼睛思考起來。我不由自主地開動了腦筋。" 

# monologue
