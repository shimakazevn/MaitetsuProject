2658 = "她的胸口配合著呼吸緩慢起伏著。看得我都心臟猛然一跳。" 

# monologue
# JP: 今までまったく気にならなかった甘い匂い――\nポーレットの香りを強く感じる。
2523 = "之前完全沒在意過的香甜氣息——波萊特的香氣強烈地刺激著我的神經。" 

# 【ポーレット】
# display as 波萊特
# JP: 「えと……その……おねがい、します」
1812 = "「呃……那個……拜託你了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うむ」
1853 = "「啊——嗯」" 

# monologue
# JP: 指先が妙にこわばってしまう。\nゆえ慎重に、あくまで慎重に、慎重に――
2783 = "指尖不知怎麼的有點僵硬。因此我小心、小心、再小心——" 

# monologue
# JP: （かちっ）
3090 = "（喀吱）" 

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ。無事に装着できた。\nきっと、ポーレットによく似合おう――っ！？」
1317 = "「……嗯，戴好了。你戴著這個肯定很好看——唔！？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ」
# 1857 = "「啊」" 

# monologue
# JP: 様子を見ようと顔をあげれば、目と目が合う。
2758 = "我抬起頭想看看效果，結果又和她對上視線了" 

# monologue
# JP: 近い。近い。近い。近い。\nポーレットの甘い香りがさらに濃くなる。
2641 = "太近了，太近了，太近了，太近了。波萊特甜蜜的香氣更加濃郁了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄……くん」
2299 = "「雙鐵……君」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様」
2302 = "「雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵＆波萊特
# JP: 「っ！？」\n「ひゃうっ！！？」
1817 = "「呃！？」\\n「呀嗚！！？」" 

# monologue
# JP: ナビの声。
2798 = "是Ｎａｖｉ的聲音。" 

# monologue
# JP: なぜだかひどくほっとして、\nそうであるのに、どこか残念なような気もする。
2519 = "不知為何，我感覺鬆了口氣，但同時又覺得特別可惜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、ナビ」
2020 = "「怎麼了，Ｎａｖｉ」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「雨雲が近づいて来そうです。屋外での仕事があるなら、\n早めにお済ませになることを進言します」
2306 = "「雨雲似乎靠近了。如果要進行室外工作的話，建議您儘快完成」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか。\nと、いうことなのだが、ポーレット」
2135 = "「是嗎。你也聽到了吧，波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　はい！　はい、です」
1865 = "「啊！好！好的」" 

# monologue
# JP: ナビの声に、よっぽど慌てさせられたのだろうか。
2905 = "看來Ｎａｖｉ的聲音讓她特別慌張。" 

# monologue
# JP: ポーレットは頬を真っ赤にしたまま、\nすうはあ、すうはあ、何度か深呼吸してみせる。
2877 = "波萊特通紅著臉，做了好幾次深呼吸。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今日は、外に出る予定はあるか？\nもしもあるなら、雨にならぬうちに」
1715 = "「今天有計劃外出嗎？如果有的話，趁著沒下雨的時候趕緊出門吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あります！　もちろん、双鉄くんが、\nイヤだったり迷惑だったりじゃなければですけど」
2158 = "「有的！當然你得願意，不會給你添麻煩」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それがポーレットの助けになるなら、\nイヤだの迷惑だの、思うわけもない」
1801 = "「只要能幫上你，我肯定不會有絲毫不情願」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はぅう！」
1833 = "「哈嗚！」" 

# monologue
# JP: 妙に弱った声をだし、\nポーレットは一瞬、くずれかける。
2854 = "波萊特嬌弱地叫了一聲，差點跌倒在地。" 

# monologue
# JP: 慌て支えようとした手の先で、けれど自力で立ち直り、\nうんうん、何度も強く頷く。
2754 = "我慌忙想要扶住她，但是她又自己站穩了，然後不停地用力點頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それなら、お願いします。線路を歩いて――\n一緒に、みつけて欲しいものがあるんです」
2283 = "「那就拜託你了。我希望你陪我一起在線路上走走，我想尋找一樣東西」" 

# monologue
# JP: レールショップをれいなに任せて、\nただ線路沿いをのんびり歩く。
2740 = "我們將鐵路商店交給玲奈看顧，悠閒地沿著線路走著。" 

# monologue
# JP: 雲の流れが、確かに早い。\nが、雨の匂いは、まだ感じない。
3069 = "雲確實飄得很快。但還感覺不到雨的氣息。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレットと線路沿いを歩くのは初めてだったか」
1311 = "「……和你一起沿著線路走還是第一次啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「さぁ、どうでしたっけ？」
2031 = "「我也不知道，是這樣嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「初めてのような気がするが……\nあるいは、僕の記憶違いか？」
2024 = "「感覺是第一次……或者是我記錯了？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うーん。どうでしたでしょう？\nわたしには、ちょっと思い出せない感じです」
1884 = "「嗯……我也不知道。我是有點想不起來了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1922 = "「嗯？」" 

# monologue
# JP: さきほどあれほど近づいてしまった反動か、\nポーレットは少し、僕から離れて歩いてる。
2586 = "可能是由於剛才彼此靠得太近，波萊特現在反而跟我保持了一點距離。" 

# monologue
# JP: そのせいなのか、言葉もいささか遠い気がする。\n何故なのか、もどかしいようにも感じてしまう。
2656 = "她的口氣好像也因此變得有些疏遠。而我不知怎麼的，居然為此感到有些煩躁。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで、さっきの話ですけど」
2081 = "「所以，關於剛才的話題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1893 = "「嗯」" 

# monologue
# JP: 一緒に見つけて欲しいもの。\nそれは僕にも、どうしても見つけ出したいものだ。
2649 = "她想跟我一起找到的東西，是我自己也非常想找到的東西。" 

# 【双鉄】
# display as 雙鐵
# JP: 「観光列車のアイディアか」
2150 = "「是觀光列車的點子嗎？」" 

# 【ポーレット】
# display as 波萊特
