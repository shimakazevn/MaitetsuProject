# display as 波萊特
# JP: 「そう思ってもらえば、後押しのひとつになると思います。\n『おうちを手放す』っていう、とても悲しい決断への」
1985 = "「Nếu khiến mọi người nghĩ được như vậy, thì đó sẽ là một động lực. Cho cái quyết định đau lòng là 『từ bỏ ngôi nhà của mình』.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1860 = "「!」"

# monologue
# JP: 真に迫ったものを感じる。\n悲しく尖った何かを感じる。
2751 = "Tôi cảm nhận được sự chân thực đến nhói lòng. Cảm nhận được một nỗi buồn sắc lẹm."

# monologue
# JP: ふわふわしていた部分がごっそり、\nその一言に削ぎ落とされる。
3018 = "Những suy nghĩ mơ hồ viển vông hoàn toàn bị tước đi bởi một câu nói đó."

# 【双鉄】
# display as 雙鐵
# JP: 「――だな」
1282 = "「——Đúng vậy.」"

# monologue
# JP: そうして悲しく尖ったものは、僕自身にも刺さって溶ける。\n家を失う苦しみを……僕も、確かに知っているから。
3047 = "Nỗi buồn sắc lẹm ấy cũng đâm vào tôi và tan ra. Bởi vì...... chính tôi cũng thấu hiểu nỗi đau mất nhà."

# 【双鉄】
# display as 雙鐵
# JP: 「それは辛く。とても、とても悲しいことだ」
2263 = "「Đó là một chuyện rất đau khổ. Rất, rất buồn.」"

# monologue
# JP: 路子が、僕を手放した――\n自分の生を手放して、僕へと渡してくれた、瞬間。
2997 = "Khoảnh khắc Michiko buông tay tôi—— Từ bỏ mạng sống của chính mình, trao nó lại cho tôi."

# monologue
# JP: あの真っ黒な絶望が、こころの一番奥底から、\nじわじわ這い登ろうとしてくる。
3048 = "Nỗi tuyệt vọng đen đặc ấy, từ tận cùng đáy lòng, đang từ từ bò lên."

# 【双鉄】
# display as 雙鐵
# JP: 「悲しいことだが――\nしかし、乗り越えられることでもある」
2297 = "「Dù là chuyện buồn—— Nhưng, cũng là chuyện có thể vượt qua được.」"

# monologue
# JP: 故に、言い切る。言い聞かせる。\n自分自身に。
2775 = "Thế nên, tôi phải nói quả quyết. Phải tự nhủ. Với chính bản thân mình."

# monologue
# JP: あるいは、それを、もしも必要としているのなら、\nポーレットにも届いて欲しいと、願いつつ。
2680 = "Đồng thời cũng hy vọng rằng, nếu Paulette cần, lời nói này sẽ chạm được đến cô ấy."

# 【ポーレット】
# display as 波萊特
# JP: 「……ですね。乗り越えられますし。\n乗り越えなくっちゃいけないことです」
1325 = "「......Đúng vậy. Có thể vượt qua được. Và đó là chuyện bắt buộc phải vượt qua.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1893 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、乗り越えるのは大変――ですよね？\n気持ちひとつで、乗り越えるには足りますか？」
1730 = "「Nhưng, vượt qua nó rất khó khăn——đúng không anh? Chỉ dựa vào quyết tâm thôi, liệu có đủ để vượt qua không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「足りんな」
1693 = "「Không đủ.」"

# monologue
# JP: 断言できる。
2743 = "Tôi có thể khẳng định điều đó."

# 【双鉄】
# display as 雙鐵
# JP: 「気持ちは確かに、後押しの一つにはなるだろう。\nが、それだけでは乗り越えらない」
2298 = "「Quyết tâm đúng là một nguồn động lực. Nhưng chỉ vậy thôi thì không thể vượt qua được.」"

# monologue
# JP: 実際、僕がそうだったから。\n『言われたことを必ずこなし、役に立つ』――
2528 = "Thực tế, tôi đã từng như vậy. 『Nhất định phải hoàn thành những gì được giao, phải trở thành người có ích』——"

# monologue
# JP: そうしつづけて、気持ちを満たし続けても、\n傷は、少しも塞がらなかった。
3061 = "Dù cứ tiếp tục làm như vậy, tiếp tục lấp đầy tâm trí, nhưng vết thương vẫn chẳng hề khép miệng."

# 【ポーレット】
# display as 波萊特
# JP: 「乗り越えるためには、他に、何が必要ですか？」
2221 = "「Để vượt qua được, còn cần thêm điều gì nữa?」"

# 【双鉄】
# display as 雙鐵
# JP: 「他に……必要な全てはわからん。\n僕とて、未だ、乗り越えられているわけではない」
1765 = "「Còn cần gì nữa...... Tôi cũng không biết tất cả. Cả tôi, đến giờ vẫn chưa hoàn toàn vượt qua được.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わかります。わたしにも」
2057 = "「Em hiểu. Cả em cũng vậy.」"

# monologue
# JP: ポーレットが、一歩近づいてくる。\n金色の髪を、夏風が揺らす。
2883 = "Paulette bước lại gần một bước. Mái tóc vàng óng đung đưa trong gió mùa hè."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしだって――乗り越えられて、いないから」
1960 = "「Bởi vì em——cũng chưa vượt qua được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1815 = "「!!!」"

# monologue
# JP: ポーレットの目を、まっすぐに見る。\nその青に映る、僕を見る。
2872 = "Tôi nhìn thẳng vào mắt Paulette. Nhìn chính mình phản chiếu trong sắc xanh ấy."

# monologue
# JP: そこに見えるのは、幼い僕だ。\n僕の瞳が映しているのは――幼い少女だ。
2660 = "Hình ảnh hiện lên ở đó, là tôi của thuở ấu thơ. Còn hình ảnh phản chiếu trong mắt tôi——là một cô bé."

# 【双鉄】
# display as 雙鐵
# JP: 「……やはり、なのか」
1327 = "「......Quả nhiên, là vậy sao.」"

# monologue
# JP: ポーレットが小さく頷く。\nとても小さく。
2859 = "Paulette khẽ gật đầu.\nRất khẽ."

# monologue
# JP: 僕の言葉は、伝わっている。\nあの夏の、あの瞬間とおんなじように。
2651 = "Lời nói của tôi đã truyền đạt được đến cô ấy. Giống hệt như khoảnh khắc đó của mùa hè năm ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。君が、あのときの少女なのか」
2183 = "「Paulette. Cô, chính là cô bé lúc đó sao?」"

# monologue
# JP: 一番苦しい所から、僅かでも僕を引き上げてくれた、\nこの線路沿いにいた少女――
3042 = "Cô bé đứng dọc theo đường ray này, người đã kéo tôi lên một chút từ tận cùng của sự đau khổ——"

# monologue
# JP: あの夏と今がひとつに重なる。\n記憶が、温度と匂いとを持つ。
3041 = "Mùa hè năm ấy và hiện tại hòa làm một. Ký ức bỗng mang theo nhiệt độ và mùi hương."

# 【双鉄】
# display as 雙鐵
# JP: 「僕たちは――この線路沿いを、\nあの夏、ともに歩いていたのか」
2042 = "「Chúng ta——đã cùng nhau bước đi dọc theo đường ray này vào mùa hè năm ấy sao?」"

# monologue
# JP: 言った瞬間、ポーレットがほっと笑み崩れる。
2971 = "Vừa dứt lời, Paulette nở một nụ cười rạng rỡ như trút được gánh nặng."

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。やっぱり」
2119 = "「Đúng vậy nhỉ. Quả nhiên là vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1882 = "「Ừ——」"

# monologue
# JP: 笑ってくれる。\nポーレットが。
2853 = "Cô ấy đang cười.\nPaulette đang cười."

# monologue
# JP: あの日の少女が、笑ってくれる。\nとても、嬉しい。少しは、恩を返せた気がする。
3036 = "Cô bé của ngày hôm đó đang cười với tôi. Thật sự rất vui. Cảm giác như tôi đã phần nào đền đáp được ân tình."

# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとう」
1283 = "「——Cảm ơn cô.」"

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　ええっ！？　なに、どうして、\n急に、ありがとうって」
1836 = "「Hả!? Hả hả!? Gì chứ, sao tự dưng\nanh lại cảm ơn em?」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ポーレットに救われたんだ。\n無限に続くものかと思っていた――いや」
2105 = "「Tôi đã được Paulette cứu rỗi. Tôi từng nghĩ nó sẽ kéo dài vô tận——không.」"

# monologue
# JP: 違う。\nそれは違うと、今ならわかる。
2514 = "Không phải.\nBây giờ tôi mới hiểu, không phải như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「僕が望んで繰り返し続けていた、苦しみと憎しみに。\nポーレット。君が、区切りをくれたんだ」
1768 = "「Chính tôi đã tự nguyện lặp đi lặp lại những đau khổ và thù hận đó. Paulette. Chính cô đã giúp tôi đặt dấu chấm hết cho chúng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　あの――そんなこと、わたし、全然。\nただ――ええと、自分で思ったこと、いっただけで」
1840 = "「Hả!? Dạ——em đâu có làm chuyện gì to tát đâu. Chỉ là——ừm, em chỉ nói ra những gì mình nghĩ thôi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それが、僕には救いだった」
2166 = "「Chính điều đó đã cứu rỗi tôi.」"

# monologue
# JP: 初対面の、僕のことなどまったく知らぬ少女のくれた、\nまっすぐな言葉。
2809 = "Những lời nói thẳng thắn từ một cô bé mới gặp lần đầu, hoàn toàn không biết gì về tôi."

# monologue
# JP: だからこそ少しも捻じれることなく、\n心の奥の一番暗いところまで、届いたのだろう。
2778 = "Chính vì thế mà nó không hề bị bóp méo, và có thể chạm đến nơi tăm tối nhất tận sâu trong trái tim tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「だから、思う。望みでも気持ちでも足りない部分を、\nまず補ってくれるものは――優しさだ」
2073 = "「Vì vậy, tôi nghĩ. Thứ đầu tiên có thể bù đắp cho những thiếu sót dù là hy vọng hay quyết tâm——chính là sự dịu dàng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄、くん」
# 2299 = "「雙鐵……君」" 

# monologue
# JP: 青い瞳が、わずかに潤む。\n一歩を、大きく近づいて――っ！？
2949 = "Đôi mắt xanh biếc hơi ngấn lệ. Cô ấy bước một bước lớn lại gần tôi——!?"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1857 = "「啊」" 

# monologue
# JP: 頭上を、さりげなくよぎった機影。
3074 = "Bóng dáng một chiếc máy bay vô tình xẹt qua trên đầu."

# monologue
# JP: ポーレットはほんの一瞬、ひどく悔しそうな顔をして、\nぐっと目を閉じ、深呼吸する。
2850 = "Trong một khoảnh khắc ngắn ngủi, Paulette lộ vẻ mặt vô cùng nuối tiếc, cô nhắm chặt mắt lại và hít một hơi thật sâu."

# 【ポーレット】
# display as 波萊特
# JP: 「……昔の、大事な話のつづき。\nわたし、いつか――」
1341 = "「......Câu chuyện quan trọng ngày xưa, em vẫn chưa kể xong. Em, một ngày nào đó——」"

# monologue
# JP: それがいつかを、決めようとしているのだろうか？
2647 = "Cô ấy đang định ấn định ngày đó là khi nào sao?"

# monologue
# JP: ポーレットの柔らかそうな唇が、\nもごもご幾度か、小さく動く。
2857 = "Đôi môi mềm mại của Paulette\nmấp máy vài lần."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが、走らせたい列車が走ったら。\nそのときにまた、話したいです」
2052 = "「Khi nào chuyến tàu mà anh Soutetsu muốn chạy được khởi hành. Lúc đó, em muốn kể tiếp.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。じっくり話したい」
2035 = "「Tôi cũng vậy. Tôi muốn nói chuyện thật kỹ với cô.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、ありがとうございます！」
1941 = "「Ufufu, cảm ơn anh!」"

# monologue
# JP: 花がこぼれるような笑み。
2683 = "Một nụ cười rạng rỡ như hoa nở."

# monologue
# JP: ポーレットはこれほどにあどけなく、\nこれほどに愛らしかったかと、少し驚く。
2762 = "Tôi hơi ngạc nhiên khi nhận ra Paulette lại ngây thơ và đáng yêu đến thế."

# 【ポーレット】
# display as 波萊特
# JP: 「それなら、“そのとき”を早めるためにも、\nお話、前に進めましょう」
2288 = "「Nếu vậy, để \"lúc đó\" đến sớm hơn, chúng ta hãy tiếp tục câu chuyện nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1893 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「優しさだとか、思いやり。\nそれは余裕が無いと、なかなか表に出てきませんよね？」
1743 = "「Sự dịu dàng hay sự quan tâm. Nếu không có sự dư dả, thì rất khó để thể hiện ra ngoài đúng không anh?」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1860 = "「啊！」" 

# monologue
# JP: 切り替わる。\n話の内容も、ポーレット自身も。
2972 = "Mọi thứ đã chuyển đổi. Cả nội dung câu chuyện, lẫn bản thân Paulette."

# monologue
# JP: いま僕の目の前に戻ってきたのは、気弱で控えめだが、\n極めて有能な市長で社長の、雛衣ポーレットだ。
2673 = "Trở lại trước mắt tôi lúc này, là một Hinai Paulette nhút nhát và dè dặt, nhưng lại là một Thị trưởng kiêm Giám đốc vô cùng tài năng."

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。そして……\n余裕を支える物――普段のくらしでは……ああ、お金か」
2134 = "「Chắc là vậy. Và...... thứ duy trì sự dư dả đó——trong cuộc sống hàng ngày...... à, là tiền sao.」"

# monologue
# JP: 僕がここまで立ち直れたのも、\n右田の家の手厚い保護があってこそだとしみじみ思う。
2733 = "Tôi thầm nghĩ, mình có thể vực dậy được đến mức này, cũng là nhờ có sự đùm bọc chu đáo của nhà Migita."

# monologue
# JP: ポーレットにもらったきっかけとても、\nくらしが荒んでいたならば、朽ちてしまっていただろう。
2611 = "Dù Paulette đã tạo cơ hội cho tôi, nhưng nếu cuộc sống của tôi bấp bênh, có lẽ cơ hội ấy cũng đã lụi tàn."

# 【ポーレット】
# display as 波萊特
# JP: 「お金、凄く大事です。お金が無いと、時間が無いと、\n人は、優しく出来なくなっちゃう」
2291 = "「Tiền bạc rất quan trọng. Nếu không có tiền, không có thời gian, con người sẽ không thể dịu dàng được nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1893 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だから、双鉄くんが、お金のことを専門家――\n銀行さんに任せようとしたこと、大正解と思ってます」
2079 = "「Vì vậy, việc anh Soutetsu định giao chuyện tiền bạc cho chuyên gia—— phía ngân hàng, em nghĩ là một quyết định vô cùng chính xác.」"

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、銀行は動いてくれない。\n足掛かりなしには、あまりに困難な事業だと断じられた」
1731 = "「Nhưng ngân hàng không chịu hành động. Họ khẳng định rằng đây là một dự án quá khó khăn nếu không có chỗ đứng vững chắc.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。そうして、共感だけでは、\n足掛かりとしては十分じゃない」
2112 = "「Đúng vậy nhỉ. Và chỉ có sự đồng cảm thôi, thì chưa đủ để làm chỗ đứng vững chắc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。共感だけでは、くらしを支えることは出来ない」
2114 = "「Đúng vậy. Chỉ có sự đồng cảm thì không thể nuôi sống bản thân được.」"

# monologue
# JP: 僕の言葉に、ポーレットは大きくうなずき返す。
2939 = "Nghe tôi nói vậy, Paulette gật đầu mạnh đáp lại."

# 【ポーレット】
# display as 波萊特
# JP: 「ここまでを共通理解として――\nいったん、現状を整理しますね？」
