2883 = "波萊特靠近了一步。她的金髮隨著夏風而飄蕩。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしだって――乗り越えられて、いないから」
1960 = "「因為我也……同樣沒能克服」" 

# 【双鉄】
# display as 雙鐵
