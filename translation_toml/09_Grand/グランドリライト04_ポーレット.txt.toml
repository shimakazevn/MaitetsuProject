3047 = "那種悲傷也深深地扎在我的心上。因為我……很了解失去家的痛苦。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは辛く。とても、とても悲しいことだ」
2263 = "「這個過程很難受，也很痛苦」" 

# monologue
# JP: 路子が、僕を手放した――\n自分の生を手放して、僕へと渡してくれた、瞬間。
