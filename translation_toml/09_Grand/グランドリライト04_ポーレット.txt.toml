2148 = "「是的，我也是知道的。只是讓８６２０運行起來並不能招來客流」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1893 = "「嗯」" 

# monologue
# JP: 大きな進歩だ。
3021 = "這是一個巨大的進步。" 

# monologue
# JP: ポーレットの目も、鉄道愛に一点集中するだけではなく、\nもっと広く、もっと多くを映し出そうとしはじめている。
2870 = "波萊特的視野也不僅僅只是集中在對於鐵路的愛上，而是能拓展到更大的世界中去了。" 

# 【双鉄】
# display as 雙鐵
