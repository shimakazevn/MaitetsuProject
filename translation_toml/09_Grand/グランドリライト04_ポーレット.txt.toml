2660 = "她眼中映出的是年幼的我。而我眼中映出的則是——年幼的少女。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……やはり、なのか」
1327 = "「……果然是這樣嗎」" 

# monologue
# JP: ポーレットが小さく頷く。\nとても小さく。
2859 = "波萊特微微地點了點頭。" 

# monologue
# JP: 僕の言葉は、伝わっている。\nあの夏の、あの瞬間とおんなじように。
2651 = "她理解了我的話。就如同那個夏天的那個瞬間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。君が、あのときの少女なのか」
2183 = "「波萊特，你就是那個時候的少女嗎」" 

# monologue
# JP: 一番苦しい所から、僅かでも僕を引き上げてくれた、\nこの線路沿いにいた少女――
3042 = "那個站在線路旁，在我最痛苦時輕輕拉了我一把的少女——" 

# monologue
