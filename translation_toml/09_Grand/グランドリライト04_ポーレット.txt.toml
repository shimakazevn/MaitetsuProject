3061 = "雖然一直以來我都滿懷這樣的決心並付諸行動，但傷口卻絲毫沒有癒合。" 

# 【ポーレット】
# display as 波萊特
# JP: 「乗り越えるためには、他に、何が必要ですか？」
2221 = "「要克服的話，還需要什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「他に……必要な全てはわからん。\n僕とて、未だ、乗り越えられているわけではない」
1765 = "「其他需要些什麼……我並不知道完整的答案。畢竟連我自己都還沒克服難關」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかります。わたしにも」
2057 = "「我明白。我也一樣」" 

# monologue
