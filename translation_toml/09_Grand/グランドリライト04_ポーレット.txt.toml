1705 = "「Nói cách khác, thị trấn mỏ than và mỏ than này—— chính là quá khứ mà thành phố Ohimitera cần phải vượt qua sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1860 = "「啊！」" 

# monologue
# JP: ポーレットが僕の目を見る。\n見つめ返して頷けば、強い頷きが返される。
2873 = "Paulette nhìn vào mắt tôi. Tôi nhìn lại và gật đầu, cô ấy cũng gật đầu đáp lại thật mạnh."

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。乗り越えなければ、進めない――\nきっと、そういう、過去の傷です」
2124 = "「Đúng vậy ạ. Nếu không vượt qua thì không thể tiến bước—— Chắc chắn, đó là một vết thương của quá khứ.」"

# monologue
# JP: 過去の、傷。
3029 = "Vết thương, của quá khứ."

# monologue
# JP: 僕が抱えているものと――そうして恐らく、\nポーレットが抱え込んでいるものとも、同じ類の。
2773 = "Có lẽ nó cũng cùng một loại—— với những gì tôi đang mang, và cả những gì Paulette đang mang."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、今のこの町を活かしたいんだよな？\n壊して、作り変えるのではなく」
1737 = "「Paulette muốn tận dụng thị trấn này như hiện tại đúng không? Chứ không phải phá đi để xây lại.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうです。もちろんそれが、\n観光資源として価値を持つならっていう前提ですけど」
2144 = "「Vâng, đúng vậy ạ. Tất nhiên đó là với điều kiện nó có giá trị như một tài nguyên du lịch.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、まったく同じ思いだ」
2039 = "「Tôi cũng có suy nghĩ giống hệt vậy.」"

# monologue
# JP: 過去の傷がどれほどしつこく痛むのか、\n僕らは身をもってしっている。
3030 = "Vết thương quá khứ đau đớn dai dẳng đến mức nào, chúng tôi là người hiểu rõ hơn ai hết."

# monologue
# JP: 傷を隠してそっぽを向いて、綺麗な服をたとえ着せても、\nいつか傷から溢れ出す血に染められてしまうことだろう。
2613 = "Dù có che giấu vết thương, ngoảnh mặt đi, khoác lên mình bộ quần áo đẹp đẽ, thì rồi cũng có ngày nó sẽ bị nhuốm màu bởi dòng máu rỉ ra từ vết thương đó."

# 【双鉄】
# display as 雙鐵
# JP: 「であれば、歩こう、この町を。\nそうして、良いところをたくさん探そう」
2286 = "「Nếu vậy, hãy cùng đi dạo quanh thị trấn này nào. Và cùng tìm ra thật nhiều điểm tốt của nó nhé.」"

# monologue
# JP: 向かい合うこと。\n深く知ること。
2576 = "Đối diện với nó.\nHiểu sâu về nó."

# monologue
# JP: そうしたところで、傷を癒やすことはできないけれど、\nどう付き合えばいいのかは、多少は見えてくるかもしれん。
3064 = "Làm vậy tuy không thể chữa lành vết thương, nhưng ít nhiều cũng có thể thấy được cách để sống chung với nó."

# 【ポーレット】
# display as 波萊特
# JP: 「はい、喜んでおともします！」
1914 = "「Vâng, em rất sẵn lòng đi cùng anh!」"

# monologue
# JP: ……夕暮れが、僕の気持ちも\nノスタルジーの底へと沈める。
1275 = "......Hoàng hôn buông xuống, làm tâm trạng tôi cũng chìm vào tận cùng của sự hoài niệm."

# monologue
# JP: アパートの中に置き去りになった家具やおもちゃが、\nかけがえのない、貴重なものとさえも思える。
2704 = "Những món đồ nội thất và đồ chơi bị bỏ lại trong khu chung cư, trông như thể là những món đồ vô giá, không thể thay thế."

# 【ポーレット】
# display as 波萊特
# JP: 「……綺麗、ですね。置き忘れられた宝石みたい。\n綺麗だからこそ、とてもさみしい」
1319 = "「......Đẹp thật anh nhỉ. Giống như những viên đá quý bị bỏ quên vậy. Chính vì đẹp, nên mới thấy thật cô đơn.」"

# monologue
# JP: 夕陽が揺らめく。\n雲はまだ、まばらに空に残っている。
2631 = "Ánh hoàng hôn lay động. Những đám mây vẫn còn vương lại rải rác trên bầu trời."

# monologue
# JP: 結局雨は降らなかったと――\nふとした思いが、疑問につながる。
2533 = "Rốt cuộc thì trời cũng không mưa—— Một suy nghĩ chợt lóe lên, dẫn đến một câu hỏi."

# 【双鉄】
# display as 雙鐵
# JP: 「この美しさは――夕焼けでなければどうだろう。\n時間は調整できるにしても、例えば、雨降りだったら」
2272 = "「Vẻ đẹp này——nếu không phải là hoàng hôn thì sẽ ra sao nhỉ. Dù có thể điều chỉnh được thời gian, nhưng giả sử trời mưa thì sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ――」
# 1852 = "「啊——」" 

# monologue
# JP: 少し目を閉じ、考え込んで、\nポーレットはゆるゆると、困りきったような声を出す。
2881 = "Khẽ nhắm mắt lại, trầm ngâm suy nghĩ, Paulette chậm rãi cất giọng đầy vẻ bối rối."

# 【ポーレット】
# display as 波萊特
# JP: 「だめ、ですね。マジックアワーの魔法が解けたら、\n景色だけで観光するのは、全然無理です」
1695 = "「Không được đâu ạ. Nếu phép thuật của Giờ Vàng bị phá vỡ, thì chỉ dựa vào cảnh quan để làm du lịch là hoàn toàn bất khả thi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「マジックアワー？」
2310 = "「Giờ Vàng?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですよ？　ちょうど今の時間。\nね？　わたしのことを見てください。双鉄くん」
2131 = "「Đúng vậy ạ? Chính là khoảng thời gian này. Này? Anh nhìn em đi. Anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1848 = "「唔」" 

# monologue
# JP: ポーレットが僕へと向いて、\n可愛らしく両手を広げてみせる。
2884 = "Paulette quay về phía tôi, dang hai tay ra một cách đáng yêu."

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、いつもより綺麗でしょう？」
2061 = "「Trông em đẹp hơn bình thường đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2111 = "「À——」"

# monologue
# JP: 金の光に、金の髪。\n残照の赤と、頬の赤。
3054 = "Ánh sáng vàng, mái tóc vàng. Sắc đỏ của ráng chiều, và sắc đỏ trên đôi má."

# monologue
# JP: ポーレットの柔らかそうな印象が、\n消えようとする光に溶け込み更に際立つ。
2880 = "Ấn tượng về một Paulette mềm mại như hòa quyện vào ánh sáng đang dần tàn, càng trở nên nổi bật hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「とても、綺麗だ」
2186 = "「Rất đẹp.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それ、普段にいってもらえたら、わたしきっと、\n嬉しさで倒れちゃうくらいなんですけど」
1980 = "「Câu đó, nếu bình thường anh nói với em, chắc chắn em sẽ vui đến mức ngất xỉu luôn mất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1922 = "「嗯？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だけど残念。\nこの綺麗さは、マジックアワーの魔法なんです」
1728 = "「Nhưng thật đáng tiếc. Vẻ đẹp này, là nhờ phép thuật của Giờ Vàng đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
# 2138 = "「是嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。日が沈みかけて、だけど光は残ってて。\nそのせいで、影が一番小さくなって、温かみが残る」
2142 = "「Vâng. Mặt trời sắp lặn, nhưng ánh sáng vẫn còn sót lại. Chính vì thế, bóng đổ sẽ nhỏ nhất, và sự ấm áp vẫn còn lưu giữ.」"

# monologue
# JP: 言われてみれば確かにだ。\n魔法は、どんどん薄れていってる。
2667 = "Nghe cô ấy nói vậy, quả đúng là thế. Phép thuật đang dần phai nhạt."

# monologue
# JP: 夜の闇が、光の名残りを、\nあまりにも性急に追い出している。
2635 = "Bóng tối của màn đêm đang xua đuổi tàn dư của ánh sáng một cách quá đỗi vội vàng."

# 【双鉄】
# display as 雙鐵
# JP: 「ライトを持ってきてよかったな」
2198 = "「May mà chúng ta mang theo đèn pin nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。月明かりのお散歩も素敵ですけど、\nここだと、ちょっと危なすぎます」
2125 = "「Đúng vậy ạ. Dạo bước dưới ánh trăng cũng tuyệt lắm, nhưng ở đây thì hơi nguy hiểm quá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2128 = "「是啊」" 

# monologue
# JP: ライトをつければ、その光の中、\nポーレットが少しまぶし気な顔をする。
2756 = "Bật đèn pin lên, trong luồng ánh sáng ấy, Paulette hơi nheo mắt lại vì chói."

# 【双鉄】
# display as 雙鐵
# JP: 「……十分、綺麗だ。\nマジックアワーの魔法が解けても」
1313 = "「......Vẫn rất đẹp. Dù phép thuật của Giờ Vàng đã bị phá vỡ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　あのっ――ええと！？\nあ！　この町が、ですか！！？」
1839 = "「Hả!? Cái đó——ừm!?\nA! Là thị trấn này sao!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1881 = "「Hửm?」"

# monologue
# JP: 言われて、周囲をぐるりと照らす。\n……なるほど、こちらは魔法が解けてる。
2937 = "Nghe cô ấy nói vậy, tôi chiếu đèn pin một vòng xung quanh. ......Ra là vậy, ở đây phép thuật đã bị phá vỡ rồi."

# monologue
# JP: さきほどまでの切ないほどの美しさは消え、\nどちらかというと今は、薄気味悪ささえ感じられる。
2526 = "Vẻ đẹp buồn man mác lúc nãy đã tan biến, thay vào đó, hiện tại lại mang đến cảm giác hơi rờn rợn."

# 【双鉄】
# display as 雙鐵
# JP: 「探検を――してみたくはなる風情だが」
2267 = "「Phong cảnh này——khiến người ta muốn đi thám hiểm đấy chứ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ふえっ！？　えと、たんけん――って」
1821 = "「Hể!? Ờ thì, thám hiểm——là sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「探検だの、冒険だのの、探検だ。ああ――いや。\nあるいはその方向で、観光資源化はどうだろう」
2004 = "「Là thám hiểm trong phiêu lưu thám hiểm ấy. A——không. Hay là chúng ta biến nó thành tài nguyên du lịch theo hướng đó nhỉ?」"

# monologue
# JP: いえば、ポーレットがスっと落ち着く。\nというか――？　どこかガックリしているようにも見える。
2976 = "Nghe tôi nói vậy, Paulette lập tức bình tĩnh lại. Hay nói đúng hơn——? Trông cô ấy có vẻ hơi thất vọng."

# 【ポーレット】
# display as 波萊特
# JP: 「あああ……なんで、『この町がですか？』なんて――\nううう……わたしのバカっ、いくじなしっ」
1859 = "「Aaa...... Sao mình lại đi hỏi 『Là thị trấn này sao?』 cơ chứ—— Ư ư ư...... Mình ngốc quá, nhát gan quá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　なんだ？」
1926 = "「Hửm? Sao vậy?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ああいえ！　なんでも！　なんでもないです！！\nありません！！」
1870 = "「A, không có gì! Không có gì đâu ạ!\nKhông có gì hết!!」"

# monologue
# JP: 大きな声で、大きく手を振り――
2643 = "Cô ấy nói lớn và xua tay liên tục——"

# 【ポーレット】
# display as 波萊特
# JP: 「うん！」
# 1894 = "「嗯！」" 

# monologue
# JP: 持ち上げ直した顔は、きりりと引き締まっている。
2669 = "Khi ngẩng mặt lên, biểu cảm của cô ấy đã trở nên nghiêm túc."

# 【ポーレット】
# display as 波萊特
# JP: 「探検の方向で観光資源化って――\n例えば、どんな感じですか？」
1994 = "「Khai thác tài nguyên du lịch theo hướng thám hiểm—— Ví dụ như thế nào ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「例えば――そうだな。家族でここに来たとして。\nちいさなポーレットは、何をして遊びたい？」
2168 = "「Ví dụ như——để xem nào. Giả sử gia đình cô đến đây. Cô bé Paulette sẽ muốn chơi trò gì?」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、ですか？　わたしなら――ええと――」
2045 = "「Em, sao ạ? Nếu là em thì——ừm——」"

# monologue
# JP: ポーレットが目を閉じ考え始める。\n僕の思考も、勝手に走る。
2882 = "Paulette nhắm mắt lại và bắt đầu suy nghĩ. Dòng suy nghĩ của tôi cũng tự động tuôn trào."

# monologue
# JP: 路子と、父さんと母さんと――\nもしも、ここに来ていたのなら……
2679 = "Cùng với Michiko, ba và mẹ—— Nếu như, gia đình tôi đến đây thì......"

# 【ポーレット】
# display as 波萊特
# JP: 「トロッコ！　トロッコに乗りたいです。\nできたら、運転もしてみたい」
2207 = "「Xe goòng! Em muốn đi xe goòng. Nếu được, em cũng muốn thử lái nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「トロッコか。なるほど、炭鉱にならありそうだな」
2206 = "「Xe goòng à. Ra vậy, ở mỏ than thì chắc chắn là có rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あります。確実に。\nもともと、鉄道は鉱山で生まれたものですし」
2213 = "「Có chứ ạ. Chắc chắn là có. Vốn dĩ, đường sắt được sinh ra từ hầm mỏ mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
2137 = "「Vậy sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「っていうか、双鉄くんはどうですか？\nちっちゃい双鉄くんは、何して遊びたいですか？」
2278 = "「Mà này, còn anh Soutetsu thì sao? Cậu bé Soutetsu sẽ muốn chơi trò gì?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはもちろん、[さいくつ,1]採掘だ。\nそれから……それから、宝探し」
2214 = "「Tất nhiên là đào mỏ rồi. Sau đó...... sau đó là tìm kho báu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「宝探し？」
1995 = "「Tìm kho báu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うちでは定番の遊びだった。クリスマスや\n誕生日には、隠されているプレゼントを探した」
1905 = "「Ừ, đó là trò chơi quen thuộc ở nhà tôi. Vào lễ Giáng sinh hay sinh nhật, chúng tôi thường đi tìm những món quà được giấu đi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「……素敵ですね。とっても楽しそう」
1329 = "「......Tuyệt quá nhỉ. Nghe có vẻ rất vui.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、楽しかった。自分で探して見つけたものは、\nもらったのではなく、手に入れたという気になった」
1908 = "「Ừ, vui lắm. Những thứ tự mình tìm thấy, mang lại cảm giác tự mình giành được chứ không phải là được cho.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1860 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1893 = "「嗯」" 

# monologue
# JP: 言葉が、思いが呼応する。
2970 = "Lời nói và suy nghĩ cộng hưởng với nhau."

# monologue
# JP: ふたりで重ねた思い出が、\n新たな未来へのレールを示す。
2558 = "Những kỷ niệm chất chồng của hai chúng tôi, đang chỉ ra con đường hướng tới một tương lai mới."

# 【双鉄】
# display as 雙鐵
# JP: 「その線で、廃炭鉱とこの町とを、\nアトラクション化するのはどうだろうか？」
1741 = "「Theo hướng đó, chúng ta biến mỏ than bỏ hoang và thị trấn này thành một khu vui chơi thì sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「いけると思う――ううん、実現させます。\n双鉄くんと、わたしと、きっと、みんなの思い出を」
2027 = "「Em nghĩ là được——không, chúng ta sẽ biến nó thành hiện thực. Kỷ niệm của anh Soutetsu, của em, và chắc chắn là của tất cả mọi người.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、思い出を掘り返す炭鉱だ。\nそうしてそれを、未来へと走り出す動力にする」
1915 = "「Đúng vậy, một mỏ than để đào lại những kỷ niệm. Và biến nó thành động lực để chạy về phía tương lai.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ここで掘り出した石炭が――\n[ハチロクニイマル,3]8620を、未来行きの列車として走らせるんですね」
1964 = "「Than được đào lên từ đây—— sẽ là nhiên liệu để chuyến tàu 8620 chạy về phía tương lai nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それだ！！！」
2173 = "「Chính là nó!!!」"

# 【ポーレット】
# display as 波萊特
# JP: 「きゃ！？」
1804 = "「Á!?」"

# monologue
# JP: ほとんど反射で、ポーレットの手をつかんでる。\n驚かせてしまったようだが、解きたいとは思えない。
2750 = "Gần như theo phản xạ, tôi nắm lấy tay Paulette. Có vẻ tôi đã làm cô ấy giật mình, nhưng tôi không muốn buông ra."

# 【双鉄】
# display as 雙鐵
# JP: 「時を止めた町から、工業の町、今を示す八ツ城へ\n――そして、叶うのならば更に未来へ」
2016 = "「Từ một thị trấn thời gian ngừng trôi, đến thành phố công nghiệp Yatsushiro đại diện cho hiện tại ——và nếu có thể, là hướng tới tương lai xa hơn nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「！　八ツ城－隈元間は電化されてました。\nもしもそこを、完全復線できるなら」
1762 = "「! Đoạn Yatsushiro - Kumamoto đã được điện khí hóa. Nếu chúng ta có thể khôi phục hoàn toàn tuyến đường đó...」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、観光資源の活用を、\n観光列車のコンセプトとも一体化できる」
1906 = "「Ừ, chúng ta có thể kết hợp việc khai thác tài nguyên du lịch với ý tưởng về một đoàn tàu du lịch.」"

# monologue
# JP: レールが先へ進む度、\n列車も、未来のものへと変わる。
3058 = "Mỗi khi đường ray tiến xa hơn, đoàn tàu cũng sẽ thay đổi thành một thứ thuộc về tương lai."

# monologue
# JP: \\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;から\\x%lディーゼル機関車;#00ffc040;ディーゼル機関車%l;#;、\\x%l電気機関車;#00ffc040;電気機関車%l;#;――\nそうして電化区間に入り、\\x%l電車;#00ffc040;電車%l;#;へと。
2709 = "Từ \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; đến \\x%lディーゼル機関車;#00ffc040;đầu máy diesel%l;#;, rồi \\x%l電気機関車;#00ffc040;đầu máy điện%l;#;—— sau đó đi vào đoạn đường điện khí hóa, và chuyển thành \\x%l電車;#00ffc040;tàu điện%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「未来行き列車と、ノスタルジアトレイン。\n過去から未来へ――未来から過去へ、走る列車だ」
2193 = "「Chuyến tàu hướng đến tương lai, và chuyến tàu hoài niệm. Một chuyến tàu chạy từ quá khứ đến tương lai——và từ tương lai về quá khứ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「これ、いけますよ！　絶対いける！！\n細かいことは、これからたくさん詰めなきゃですけど」
2262 = "「Ý tưởng này khả thi đấy ạ! Tuyệt đối khả thi!! Dù từ giờ còn phải bổ sung thêm rất nhiều chi tiết nữa.」"

# monologue
# JP: ポーレットの手に力がこもる。
2867 = "Bàn tay Paulette siết chặt lại."

# 【ポーレット】
# display as 波萊特
# JP: 「改修。\\x%l石造機関庫;#00ffc040;石造機関庫%l;#;と\\x%l検修庫;#00ffc040;検修庫%l;#;じゃ足りなくなるから。\nだから、車両工場もここにつくって、一体化して」
2097 = "「Cải tạo. Vì \\x%l石造機関庫;#00ffc040;Xưởng đầu máy bằng đá%l;#; và \\x%l検修庫;#00ffc040;Xưởng bảo dưỡng%l;#; sẽ không đủ. Nên chúng ta sẽ xây dựng Nhà máy chế tạo toa xe ở đây, và hợp nhất chúng lại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
# 1894 = "「嗯！」" 

# monologue
# JP: 例えば、体験採掘で掘り出してもらう石炭を\n燃料の一部としての、石炭火力発電を行う。
2810 = "Ví dụ như, dùng lượng than mà du khách đào được trong trải nghiệm đào mỏ làm một phần nhiên liệu để phát điện bằng nhiệt điện than."

# monologue
# JP: その電気で動かす工作機械が車両工場を働かせ、\nこれから未来へ走る列車を、生み出していく――
2935 = "Máy móc hoạt động bằng nguồn điện đó sẽ vận hành nhà máy chế tạo toa xe, và tạo ra những chuyến tàu chạy về phía tương lai——"

# 【双鉄】
# display as 雙鐵
# JP: 「探検の楽しみだけでなく、工場見学の楽しみも加える。\n採炭、発電、活用と――術仙を、工業博物館の町とする」
1690 = "「Không chỉ có niềm vui thám hiểm, mà còn thêm cả niềm vui tham quan nhà máy. Khai thác than, phát điện, tận dụng——biến Jussen thành một thị trấn bảo tàng công nghiệp.」"

# 【ポーレット】
# display as 波萊特
# JP: 「学んだこと、体験したことを、すぐに実感できるんです。\n過去から未来へ走っていく列車に乗ることで」
2261 = "「Du khách có thể cảm nhận ngay những gì mình đã học và trải nghiệm. Bằng cách bước lên chuyến tàu chạy từ quá khứ đến tương lai.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ゆえ、“過去そのもの”も、体験させよう。\n廃宿舎群を活用し、正和初期の町とくらしを再現しよう」
1910 = "「Ừ. Vì vậy, hãy để họ trải nghiệm cả \"chính quá khứ\" nữa. Tận dụng khu nhà tập thể bỏ hoang để tái hiện lại thị trấn và cuộc sống đầu thời kỳ Showa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それなら、御一夜の町並みだとか、\n湯医の古い駅舎も生きます！！」
2268 = "「Nếu vậy, cảnh quan của Ohimitera, hay nhà ga cũ của Yui cũng sẽ được hồi sinh!!」"

# monologue
# JP: 路線の観光カタログ化――\nそのイメージが、急速にひとつの形にまとまる。
3057 = "Danh mục hóa du lịch tuyến đường sắt—— Hình ảnh đó nhanh chóng hội tụ thành một hình hài cụ thể."

# 【双鉄】
# display as 雙鐵
# JP: 「レイル・ロマネスク――\n湯医線沿線を、そのイメージで育てていこう」
2006 = "「Đường sắt kỳ ảo—— Hãy phát triển dọc tuyến Yui theo hình ảnh đó.」"

# 【ポーレット】
# display as 波萊特
# JP: 「レイル・ロマネスク――\n『物語に彩られる、路線』でしょうか？」
2007 = "「Đường sắt kỳ ảo—— Là 『tuyến đường được điểm tô bởi những câu chuyện』 phải không anh?」"

# 【双鉄】
# display as 雙鐵
# JP: 「時を止めた幻想の路線――あの日にもう一度帰れる路線。\nそのように、湯医線を育てていくことができるなら――」
2156 = "「Một tuyến đường kỳ ảo nơi thời gian ngừng trôi——nơi ta có thể trở về ngày hôm ấy một lần nữa. Nếu có thể phát triển tuyến Yui theo hướng như vậy——」"

# monologue
# JP: （ぷぁんっ！）
3088 = "（Poooon!）"

# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？\nあ――え？　やだ、もうこんな時間！！」
1806 = "「Á!?\nA——hả? Chết rồi, đã đến giờ này rồi sao!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「……シンデレラが帰る時間か」
1306 = "「......Đến giờ Lọ Lem phải về rồi à.」"

# monologue
# JP: 自分の口から飛び出した、\nらしくもない言葉に自分で驚く。
2940 = "Tôi tự giật mình với những lời nói chẳng giống mình chút nào vừa thốt ra."

# monologue
# JP: マジックアワーの魔法とやらは、\nどうやら解けきってはいないらしい。
2904 = "Phép thuật của Giờ Vàng, có vẻ như vẫn chưa hoàn toàn bị phá vỡ."

# 【ポーレット】
# display as 波萊特
# JP: 「みたいです。れいな、たくさん待たせちゃいましたね。\n悪いことしちゃった」
2195 = "「Có vẻ là vậy. Reina chắc đã phải chờ lâu lắm rồi. Thấy có lỗi quá đi mất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「その分もお土産を届けてやれるのではないか？\n今日の気づきを、きっとれいなもよろこんでくれる」
1726 = "「Bù lại, chúng ta có thể mang quà về cho em ấy mà? Reina chắc chắn sẽ rất vui với những phát hiện ngày hôm nay.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですね。\nまだ全然ふわふわしてますけど――」
1913 = "「A, đúng vậy nhỉ.\nDù mọi thứ vẫn còn rất mơ hồ——」"

# monologue
# JP: れいなの知識と経験は、その肉付けに、\n必ず大いに役立ってくれることだろう。
2896 = "Kiến thức và kinh nghiệm của Reina chắc chắn sẽ giúp ích rất nhiều trong việc đắp nặn cho ý tưởng đó."

# monologue
# JP: 鉱山鉄道――それはかつてのれいなが、\nれいなのくらしを、大事に過ごしていた場所なのだから。
2617 = "Đường sắt mỏ than——bởi vì đó là nơi Reina ngày xưa đã sống và trân trọng từng ngày."

# 【双鉄】
# display as 雙鐵
# JP: 「れいなに、たくさん聞かせよう。\nそうしてれいなの話をたくさん、聞かせてもらおう」
2043 = "「Chúng ta hãy kể cho Reina nghe thật nhiều. Và hãy để em ấy kể cho chúng ta nghe thật nhiều.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい！　そうですね」
1896 = "「Vâng! Đúng vậy ạ.」"

# monologue
# JP: ポーレットが笑う。\nあどけなさと、母性とを、両方宿した微笑みで。
2875 = "Paulette cười. Một nụ cười mang theo cả sự ngây thơ lẫn tình mẫu tử."

# monologue
# JP: そしてくるりと振り返り、ゆっくり大きくあたりを見渡す。
2892 = "Rồi cô ấy quay lại, từ từ đưa mắt nhìn quanh một vòng rộng lớn."

# 【ポーレット】
# display as 波萊特
# JP: 「術仙の町。傷と思われ、閉じ込められてたこの町が。\nきっと、わたしたちに未来をくれる」
2220 = "「Thị trấn Jussen. Thị trấn từng bị coi là vết thương và bị phong kín này. Chắc chắn sẽ mang đến tương lai cho chúng ta.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1893 = "「嗯」" 

# monologue
# JP: 遠い夏の日に僕を救った小さな背中と、金色の髪。\nあれから何年たっただろうか――
2625 = "Bóng lưng nhỏ bé và mái tóc vàng óng đã cứu tôi vào một ngày hè xa xăm. Đã bao nhiêu năm trôi qua rồi nhỉ——"

# monologue
# JP: おぼろに陰る月の下、ライトの白い光の中であってさえ、\nその鮮やかさは、ほんの少しも色あせない。
2622 = "Dù dưới ánh trăng mờ ảo, hay trong ánh sáng trắng của đèn pin, sự rực rỡ ấy vẫn không hề phai nhạt đi chút nào."

# 【双鉄】
# display as 雙鐵
# JP: 「美しいな。\nマジックアワーの魔法が解けても」
1847 = "「Đẹp thật đấy. Dù phép thuật của Giờ Vàng đã bị phá vỡ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね――月明かりに照らされて……」
2129 = "「Đúng vậy nhỉ——Dưới ánh trăng chiếu rọi......」"

# monologue
# JP: ポーレットの目は、町を見続け。\nけれども僕は、ポーレットから目を離せない。
2871 = "Ánh mắt Paulette vẫn hướng về phía thị trấn. Còn tôi thì không thể rời mắt khỏi cô ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「とても、綺麗だ」
2199 = "「Rất đẹp.」"
