2279 = "「Tài liệu liên quan đến Aircra thì không\ncó nhiều lắm.\nChị sẽ cho mượn cả đồ cá\nnhân của chị nữa nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「すまない、みんな。ありがとう」
3085 = "「Xin lỗi vì đã làm phiền mọi người. Cảm ơn\nnhé.」"

# monologue
# JP: 小山になった資料群を見れば、\nあらためて僕にも理解できる。
3720 = "Nhìn vào đống tài liệu chất thành núi nhỏ,\ntôi mới có thể hiểu được một lần nữa."

# monologue
# JP: 真闇姉が、日々姫が、ハチロクがいったとおりに、\n一人でなら、資料探しで夜が終わってしまったことを。
3740 = "Đúng như lời chị Mayami, Hibiki, và\nHachiroku đã nói,\nnếu chỉ có một mình, thì\ncả đêm nay sẽ chỉ dành cho việc tìm kiếm\ntài liệu mất."

# 【双鉄】
# display as 雙鐵
# JP: 「だが、もう大丈夫だ。ここからは、この資料群を」
2459 = "「Nhưng mà, không sao rồi. Từ đây, đống tài\nliệu này sẽ」"

# 【真闇】
# display as 真闇
# JP: 「一人でぜぇんぶ読みこなせると？\nそぎゃんことしとったら、一日じゃまるで足りんとよ？」
2110 = "「Một mình em có thể đọc hết toàn bộ sao?\nLàm thế thì một ngày làm sao mà đủ được?」"

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんが――\n読むことまでは、さすがに手伝ってもらえんだろう」
2250 = "「Có thể là vậy——\nnhưng việc đọc thì, quả\nthực không thể nhờ mọi người giúp được\nrồi.」"

# monologue
# JP: 言った瞬間、日々姫がはい！　と手を挙げる。
3528 = "Ngay khoảnh khắc tôi vừa dứt lời, Hibiki\ngiơ tay lên và nói “Dạ!”."

# 【日々姫】
# display as 日日姬
# JP: 「レジュメ！　まとめ書きなら作れるけん！\nにぃにが指示してくれたら、その視点で」
2236 = "「Tóm tắt! Nếu là viết tóm tắt thì em làm\nđược!\nNếu anh hai chỉ đạo, em sẽ làm theo\ngóc nhìn đó.」"

# 【ハチロク】
# display as 八六
# JP: 「その方法がよろしいかと、わたくしも思います。\n情報整理は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の得意とするところです」
2559 = "「Tôi cũng nghĩ phương pháp đó rất tốt.\nSắp\nxếp thông tin là sở trường của \\x%lレイルロオド;#00ffc040;Railord%l;#;\nmà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……好意は、とてもありがたい。\nが――」
1602 = "「……Lòng tốt của mọi người, tôi rất biết\nơn.\nNhưng mà——」"

# 【真闇】
# display as 真闇
# JP: 「が？」
2249 = "「Nhưng mà?」"

# monologue
# JP: わがままだとはわかっている。
3564 = "Tôi biết là mình đang ích kỷ."

# monologue
# JP: それゆえに、喉にこもった僕の思いを、\n真闇姉のまなざしと声とが、引き出してくれる。
3804 = "Chính vì thế, suy nghĩ đang mắc nghẹn\ntrong cổ họng tôi,\nđã được ánh mắt và\ngiọng nói của chị Mayami kéo ra."

# 【双鉄】
# display as 雙鐵
# JP: 「……まとめとなると、まとめた者の視点が混じろう。\nしかし僕は。今回ばかりは、一人で考えてみたいのだ」
1583 = "「……Khi tóm tắt, góc nhìn của người tóm tắt\nsẽ bị trộn lẫn vào.\nNhưng tôi thì. Chỉ\nriêng lần này, tôi muốn tự mình suy nghĩ.」"

# 【ハチロク】
# display as 八六
# JP: 「一人で――で、ございますか？」
2519 = "「Một mình——sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。僕が作りたいのは、各々の利害を超えた、\nいわば、オール御一夜の体制だ」
2349 = "「Ừm. Thứ tôi muốn tạo ra là một thể chế\nvượt qua lợi ích của từng cá nhân,\ncó thể\ngọi là thể chế All Ohimitera.」"

# 【真闇】
# display as 真闇
# JP: 「いま、ものすごぉく小規模だけど、\nここに出来とぉのみたいな？」
2115 = "「Giống như cái đang có ở đây,\ndù quy mô\nhiện tại cực kỳ nhỏ bé sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2702 = "「Đúng vậy——」"

# monologue
# JP: 言われて、そうだなと気付かされる。
3752 = "Nghe nói vậy, tôi mới nhận ra đúng là thế\nthật."

# monologue
# JP: エアクラ工場誘致賛成の日々姫。反対の真闇姉。\n究極的には、鉄道復権だけが望みのハチロク――
3699 = "Hibiki tán thành việc thu hút nhà máy\nAircra. Chị Mayami thì phản đối.\nCuối\ncùng, Hachiroku chỉ mong muốn sự phục hưng\ncủa đường sắt——"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、だ。が、この協力体制とて、\nいざ工場誘致という話題となれば、壊れてしまう」
2845 = "「Quả thực là vậy. Nhưng mà, ngay cả thể\nchế hợp tác này,\nmột khi nhắc đến chủ đề\nthu hút nhà máy, cũng sẽ sụp đổ mất.」"

# 【日々姫】
# display as 日日姬
# JP: 「そいば嫌やけん、にぃにになんとかして欲しかとよ。\nにぃになら、そぎゃんとしてくれるって、思うけん」
2547 = "「Vì không thích như vậy, nên em mới muốn\nanh hai làm gì đó.\nVì em nghĩ, nếu là anh\nhai thì sẽ làm được như thế.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2305 = "「唔」" 

# monologue
# JP: 日々姫の素直な信頼が、僕にも素直に染み通ってくる。\nそこから広がるイメージが、僕の言葉を助けてくれる。
3523 = "Sự tin tưởng chân thành của Hibiki, cũng\nnhẹ nhàng thấm vào tôi.\nHình ảnh mở rộng\ntừ đó, đã giúp tôi tìm được lời để nói."

# 【双鉄】
# display as 雙鐵
# JP: 「そうするためには、\n色を混じえぬことが必要かと思うのだ」
2751 = "「Để làm được điều đó,\ntôi nghĩ cần phải\nkhông để lẫn lộn màu sắc.」"

# 【日々姫】
# display as 日日姬
# JP: 「色？」
3071 = "「Màu sắc?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。オール御一夜体制を築くための、土台。\nその素案は、誰の色を交えてもきっと、成り立たぬ」
2366 = "「Ừm. Nền tảng để xây dựng thể chế All\nOhimitera.\nBản nháp đó, nếu pha trộn màu\nsắc của bất kỳ ai thì chắc chắn, sẽ không\nthành lập được.」"

# monologue
# JP: あ、と小さなハチロクの声。
3356 = "“A”, tiếng kêu khe khẽ của Hachiroku."

# 【ハチロク】
# display as 八六
# JP: 「色――とは。つまり、立場、意見。あるいは、\n目的といったもののことでございましょうか？」
3070 = "「Màu sắc——nghĩa là. Lập trường, ý kiến.\nHoặc là,\nnhững thứ như mục đích sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。土台が色づいていては、それぞれの色を、\n濁らせず乗せてもらうことは、難しくなってしまおう」
2345 = "「Ừm. Nếu nền tảng đã có màu, thì việc đặt\ntừng màu sắc lên,\nmà không làm chúng vẩn\nđục, sẽ trở nên rất khó khăn.」"

# 【日々姫】
# display as 日日姬
# JP: 「あー。\n黄色か紙に青ばぬったら、緑がかっちゃうみたいな？」
2316 = "「A.\nGiống như bôi màu xanh dương lên giấy\nmàu vàng thì sẽ ngả sang màu xanh lá ấy\nhả?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。ゆえ、オール御一夜を描くためには、\n土台が真っ白であることが必須となるかと思うのだ」
2762 = "「Đúng là vậy. Do đó, để vẽ nên bức tranh\nAll Ohimitera,\ntôi nghĩ việc nền tảng phải\nhoàn toàn trắng tinh là điều bắt buộc.」"

# 【真闇】
# display as 真闇
# JP: 「そいやけん、みんなで作るまとめには、\nそれぞれの色が混じりそうで――怖かと？」
2448 = "「Vậy nên, em sợ rằng bản tóm tắt do mọi\nngười cùng làm,\nsẽ bị trộn lẫn màu sắc của\nmỗi người——phải không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「怖いというのは、少し――」
2895 = "「Sợ thì, có hơi——」"

# monologue
# JP: 違う、といいかけ、\nけれども続きを、喉から出せなくなってしまう。
3530 = "Định nói là không phải,\nnhưng phần tiếp\ntheo, lại không thể thốt ra khỏi cổ họng."

# 【双鉄】
# display as 雙鐵
# JP: 「いや……。なるほど、僕は怖いのか」
2047 = "「Không……. Ra là vậy, tôi đang sợ sao.」"

# monologue
# JP: 誰かの望みを、使命を果たす。\nそうして誰かの役に立つ――それが、僕の贖罪だった。
3637 = "Thực hiện mong muốn, sứ mệnh của ai đó.\nVà\nnhư vậy trở nên có ích cho ai đó——đó là,\nsự chuộc tội của tôi."

# monologue
# JP: けれど今、僕が為そうと欲しているのは、\n誰の望みも混じえない――正反対のことなのだから。
3411 = "Nhưng bây giờ, điều tôi muốn làm là,\nkhông\nđể lẫn lộn mong muốn của bất kỳ ai——một\nđiều hoàn toàn trái ngược."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。怖い。決してしくじれないことで、\nその上に慣れぬ挑戦であるが故、神経質になっている」
2441 = "「Đúng vậy. Tôi sợ. Vì đây là việc tuyệt\nđối không được thất bại,\nhơn nữa lại là\nmột thử thách không quen thuộc, nên tôi\nđang trở nên lo lắng.」"

# 【真闇】
# display as ３人
# JP: 「ほんなん」「そんなの」\n「そのようなこと」
2759 = "「Làm gì có」「Chuyện đó thì」\n「Những chuyện\nnhư vậy」"

# monologue
# JP: 真闇姉、日々姫、ハチロク――\n三者の間で、視線が行き交う。
3738 = "Chị Mayami, Hibiki, Hachiroku——\nGiữa ba\nngười, ánh mắt giao nhau."

# 【真闇】
# display as 真闇
# JP: 「……ほんなん、少しも気にせんでも、\n双ちゃん、ふだんからできとーよ？」
1576 = "「……Chuyện đó, không cần bận tâm chút nào\nđâu,\nSou-chan, bình thường em vẫn làm được\nmà?」"

# monologue
# JP: 真闇姉がそう切り出せば、\n穏やかな声が折り重ねられる。
3747 = "Khi chị Mayami mở lời như vậy,\nnhững giọng\nnói ôn hòa cũng lần lượt vang lên."

# 【日々姫】
# display as 日日姬
# JP: 「私もそう思います。\n兄さんは、普段からみんなの意見を綺麗に混ぜてます」
2566 = "「Em cũng nghĩ vậy.\nAnh trai, bình thường\nvẫn luôn kết hợp ý kiến của mọi người rất\ntuyệt mà.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様の公平は、誰の意見も容れぬ公平ではなく、\n全ての意見を容れての公平と、わたくしも感じます」
2563 = "「Sự công bằng của ngài Soutetsu, không\nphải là sự công bằng không chấp nhận ý\nkiến của ai,\nmà là sự công bằng chấp nhận\nmọi ý kiến, tôi cũng cảm thấy như vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「公平……ああ。言われてみれば――\n確かに、そうであるのかもしれん」
2165 = "「Công bằng……A. Nghe mọi người nói vậy\nthì——\nQuả thực, có lẽ là như vậy.」"

# monologue
# JP: なぜならそこには、僕の望みがなかったからだ。
3425 = "Bởi vì ở đó, không có mong muốn của tôi."

# monologue
# JP: 僕自身の色が無いゆえに、\nどんな色でも、きっと濁らせず混色できた。
3426 = "Bởi vì bản thân tôi không có màu sắc,\nnên\nbất kỳ màu sắc nào, chắc chắn cũng có thể\npha trộn mà không bị vẩn đục."

# 【双鉄】
# display as 雙鐵
# JP: 「いや……そうか。今回の案件は、僕自身が望み――\nゆえに、すでに僕の色が滲んでいるのか」
2339 = "「Không……ra là vậy. Vụ việc lần này, là do\nchính bản thân tôi mong muốn——\nDo đó, màu\nsắc của tôi đã thấm vào rồi sao.」"

# monologue
# JP: 理解に困惑させられる。\nならば一体どうすれば――
3568 = "Tôi cảm thấy bối rối trong việc thấu hiểu.\nNếu vậy thì rốt cuộc phải làm sao——"

# 【ハチロク】
# display as 八六
# JP: 「それで、よろしいのではないかと思います」
2634 = "「Như vậy, chẳng phải là rất tốt sao ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それでよい――とは」
2975 = "「Như vậy là tốt——nghĩa là sao?」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、レールなのですから。\n方向が定まっていて、当然なのです」
3058 = "「Bởi vì ngài Soutetsu, là đường ray mà.\nViệc phương hướng đã được định sẵn, là\nđiều đương nhiên.」"

# monologue
# JP: 言葉の意味が、よくわからない。\n確かに、名こそは双鉄だけれど――
3518 = "Tôi không hiểu rõ ý nghĩa của câu nói đó.\nĐúng là, tên tôi có chữ Soutetsu (đường\nray đôi) thật, nhưng mà——"

# 【双鉄】
# display as 雙鐵
# JP: 「僕が……レール？」
2622 = "「Tôi là……đường ray?」"

# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄様は、路を示される方なのです。\nその上をどう走るかは、わたくしたち、機関車の仕事」
2765 = "「Vâng. Ngài Soutetsu, là người chỉ ra con\nđường.\nViệc chạy trên đó như thế nào, là\ncông việc của chúng tôi, những đầu máy xe\nlửa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「[みち]路――」
2938 = "「Con đường——」"

# monologue
# JP: 瞬間、こころがズキリと痛む。\nかつての傷が、まだ生々しい熱を発する。
3794 = "Trong khoảnh khắc, trái tim tôi nhói đau.\nVết thương thuở xưa, vẫn còn tỏa ra hơi\nnóng sống động."

# monologue
# JP: 僕は路子を救えなかった。その路を守ってやれなかった。\nけれども、きっと――だからこそ――
3918 = "Tôi đã không thể cứu được Michiko. Đã\nkhông thể bảo vệ con đường đó.\nNhưng mà,\nchắc chắn——chính vì thế——"

# 【日々姫】
# display as 日日姬
# JP: 「よね！　にぃにが帰ってきてくれんかったら、\nねぇねから、わたしずーっと逃げ回っとったと思うし」
2767 = "「Đúng vậy! Nếu anh hai không trở về,\nthì\nem nghĩ mình vẫn sẽ mãi trốn tránh chị hai\nmất.」"

# 【真闇】
# display as 真闇
# JP: 「あー、ゆーたらピリピリしとったもんねぇ。\n双ちゃんがおらんかった時分の、ひーちゃん」
2321 = "「A, nhắc mới nhớ lúc đó căng thẳng lắm\nnhỉ.\nBé Hi, vào cái thời điểm mà Sou-chan\nkhông có ở đây ấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！　ねぇねぇ～っ」
2912 = "「Khoan đã! Chị hai~」"

# monologue
# JP: 優しい声が、思い出させてくれる。僕が重ねてきたことを。\n日々姫に、ハチロクに、ポーレットに、ふかみに。
3447 = "Những giọng nói dịu dàng, đã gợi nhớ lại\ncho tôi. Những điều mà tôi đã tích lũy.\nCho Hibiki, cho Hachiroku, cho Paulette,\ncho Fukami."

# monologue
# JP: 望みがあり、けれどもどう果たせばいいかが判らない――\nそうしたことのいくつかに、なるほど、確かに路は示せた。
3448 = "Có mong muốn, nhưng lại không biết phải\nlàm thế nào để thực hiện——\nTrong một vài\ntrường hợp như vậy, quả thực, tôi đã chỉ\nra được con đường."

# 【双鉄】
# display as 雙鐵
# JP: 「……あるいはそれが、僕の色。僕の本質なのかもしれん。\nだとしても、正しい路を示せぬのであれば――」
1601 = "「……Hoặc có lẽ đó là, màu sắc của tôi. Là\nbản chất của tôi.\nDù vậy, nếu không thể\nchỉ ra con đường đúng đắn thì——」"

# 【真闇】
# display as 真闇
# JP: 「誰もにとっての“正しい”なんて、\nこの世にあるわけなかとよ？　双ちゃん」
2447 = "「Làm gì có cái gọi là “đúng đắn” đối với\ntất cả mọi người,\ntrên cõi đời này chứ?\nSou-chan.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2328 = "「Mà phong khí đó, bây giờ có lẽ cũng chỉ\nlà chuyện xưa cũ rồi.\nNhưng mà……ra là vậy,\nkết nối với Đường sắt Mikan sao.」"

# monologue
# JP: 困惑の先、定め直そうとした目標を、\n真闇姉は、ただ一言で粉々に砕いてしまう。
3537 = "Cái gật đầu của đền chủ Akai trong khi vẫn\nđang nói đỡ cho Kagoshima,\nkhông lọt qua\nkhỏi mắt Houshou Kisaki."

# 【真闇】
# display as 真闇
# JP: 「利害に関する“正しい”は、\n自分の利益を、望むだけ確保することやけん」
2385 = "「Việc kết nối đường ray với Đường sắt\nMikan,\ncó lợi ích lớn đến mức đền chủ Akai\ncũng phải đồng tình sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ……」
2322 = "「Tôi nghĩ là có——nhưng đó là kiến thức của\nmột kẻ làm đường sắt già cỗi.\nNhững thứ\nmới nhất, chẳng phải sẽ có cậu Soutetsu bổ\nsung sao?」"

# monologue
# JP: そこまで言ってもらえて、落ち着く。\n真闇姉のいっていることは、ごくごく当然の理屈だ。
3749 = "Ra là vậy. Đền chủ quả nhiên là người mà\nKisaki cũng phải kiêng nể.\nÔng ấy đã khéo\nléo kết nối câu chuyện, và đưa nó trở lại\nvới tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、確かにだ。\n全員の欲求を同時に、完全に満たすことなど不可能だ」
2123 = "「Đúng như đền chủ Akai đã nói,\nviệc \\x%l接続;#00ffc040;kết nối chuyển tàu%l;#; với\nĐường sắt Mikan, mang một ý nghĩa vô cùng\nto lớn.」"

# 【真闇】
# display as 真闇
# JP: 「そいでも、調和は生めるけん」
2064 = "Tôi chỉ vào Yatsushiro trên bản đồ trên\ntấm bảng của Hibiki."

# monologue
# JP: 真闇姉は一升瓶を取り出そうとし――\nけれどもすぐに、蒸気ラムネの瓶へと持ち変える。
3742 = "Tôi chỉ vào Yatsushiro trên bản đồ trên\ntấm bảng của Hibiki."

# 【真闇】
# display as 真闇
# JP: 「こんラムネが、御一夜市の環境保持。\nで、こっちの――そうね、醤油が、商業振興」
2973 = "「Yatsushiro là một thành phố cảng lớn.\nViệc sở hữu tuyến đường ray kết nối với\ncảng,\nsẽ bổ sung cho điểm yếu của Aircra.」"

# 【双鉄】
# display as 雙鐵
# JP: 「醤油とラムネか――\n全くもって相容れんな」
3033 = "「Là vấn đề vận chuyển các vật thể siêu\nnặng nhỉ? Điều đó, quả thực,\nnếu có nhu\ncầu thì sẽ là một lợi ích rất lớn.」"

# 【真闇】
# display as 真闇
# JP: 「そのまま混ぜたらあたりばキツかね。\nばってん――」
2821 = "「Về phía Đường sắt Mikan, việc phục hồi\ntuyến đường này cũng sẽ mang lại\nlợi ích\nto lớn. Đầu tiên, đơn giản là kích thích\nnhu cầu du lịch.」"

# monologue
# JP: いって、真闇姉は台所へと。\nそしてすぐ、二つの瓶と計量スプーンを持ってくる。
3592 = "「Là chuyện lúc nãy chị Paulette đã nói,\nđúng không ạ?」"

# 【真闇】
# display as 真闇
# JP: 「まずラムネ。濃縮レモン、ジンジャーシロップ。\n軽くステアして、それからお醤油」
2146 = "「Ừm. Dọc theo tuyến Đường sắt Mikan——phong\ncảnh nhìn từ cửa sổ tàu\nlúc hoàng hôn trên\nbiển Yatsushiro, nghe nói được mệnh danh\nlà đẹp nhất Hinomoto đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
2372 = "「Đẹp nhất Hinomoto! Tuyệt quá đi!\nNagi đại\nnhân, nếu vậy thì muốn đi xem thử quá\nđi!!」"

# monologue
# JP: 醤油が、底に沈んでいく。
3922 = "「Tuyến đường đi từ Ohimitera xuyên sang\nphía Hayato.\nTuyến này cũng đã bị bãi bỏ\nrồi, nhưng phong cảnh nhìn từ cửa sổ tàu\ngần ga Okoba của tuyến Hisatsu cũng」"

# monologue
# JP: “むらさき”という別名をなるほどと思わせられる、\n濃い紫のグラデーションが、思いもかけず美しい。
3506 = "「Vâng, nghe nói nó được mệnh danh là một\ntrong ba cảnh sắc nhìn từ cửa sổ tàu đẹp\nnhất Hinomoto.\nTrong tương lai, nếu tuyến\nHisatsu cũng được phục hồi, thì các nguồn\ntài nguyên sẽ càng được liên kết chặt chẽ\nhơn.」"

# 【真闇】
# display as 真闇
# JP: 「飲んでみて？」
2124 = "「Cảnh đẹp nhất Hinomoto, và một trong ba\ncảnh sắc nhìn từ cửa sổ tàu đẹp nhất\nHinomoto.\n——Nếu cả hai thứ đó được kết nối\nbằng một chuyến tàu, thì tuyệt quá. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2353 = "「嗯」" 

# monologue
# JP: 真闇姉が差し出すグラスだ。\nいささかのためらいも感じず飲める。
3905 = "「Nhưng mà, đó là chuyện của 『trong tương\nlai』, 『nếu liên kết được』 đúng không?\nỞ\ngiai đoạn chưa thực hiện được điều đó thì\nlàm sao có thể kỳ vọng vào lượng người sử\ndụng được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「これは――旨いな。\n和風ジンジャーエールといった趣だ」
2972 = "「Không, hoàn toàn có thể kỳ vọng. Bởi vì\ngiữa Sendai - Yatsushiro,\nkhông có cái gọi\nlà địa điểm du lịch suối nước nóng giống\nnhư Ohimitera.」"

# 【日々姫】
# display as 日日姬
# JP: 「まっこと！？　にぃに、わたしもよかと？」
2824 = "「Ngược lại, Ohimitera thì tất nhiên là\nkhông có biển rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2353 = "「嗯」" 

# monologue
# JP: グラスを渡せば、日々姫もこくりと一口飲んで。\nそうしてほおっと、幸せそうに頬を赤らめる。
3552 = "「Nếu vậy thì dùng Aircra là được chứ gì.\nDù là biển hay suối nước nóng,\ncũng không\nbị ràng buộc bởi đường ray, đi đâu mà\nchẳng được.」"

# 【日々姫】
# display as 日日姬
# JP: 「甘か――ばってん、ちょっぴり大人の味ばする。\nただのラムネより、わたしの口には美味しかと」
2412 = "「『Đi đâu cũng được』, rốt cuộc,\ncũng làm\nnổi bật lên cả lựa chọn 『không đi đâu\ncả』.」"

# 【真闇】
# display as 真闇
# JP: 「濁りば恐れず、さらに、足す。\nそぎゃんとして生まれる調和も、確かにあるけん」
2403 = "「Hừm?」"

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんと！　まっことそぎゃんとよ！」
2766 = "「Quả thực, sự mệt mỏi khi phải lựa chọn do\nquá tải thông tin\nđang dần trở nên rõ rệt\nnhư một xu hướng của xã hội.」"

# monologue
# JP: なにかのスイッチが入ったかのように、\n日々姫は、スケッチブックを大きく広げる。
3620 = "Những điều nằm trong các tài liệu mà chúng\ntôi có thể tra cứu được trong một đêm.\nĐúng như dự đoán——đương nhiên, Kisaki đã\nnắm bắt được."

# 【日々姫】
# display as 日日姬
# JP: 「意見も、きっとおんなじで。\nだから――色じゃなくって、光」
2533 = "「Chính vì vậy mới dẫn đến sự cực đoan hóa\ncủa các trào lưu. Hễ ai đó cho là tốt,\nthì\nngười người nhà nhà đổ xô vào——A.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ひかり？」
2147 = "「Mục tiêu là biến bản thân đường sắt thành\nmột trào lưu, và làm cho nó bén rễ vững\nchắc.\nKhông phải là 『phương tiện giao\nthông bất tiện』 mà là 『phương tiện mang\nlại niềm vui cho chuyến đi』.」"

# 【日々姫】
# display as 日日姬
# JP: 「色は、絵の具は、たくさんたくさん重ねると、\nどんどんどんどん、黒に近づいていっちゃうけど」
3069 = "「Đường sắt, với tư cách là một công cụ làm\ntăng thêm niềm vui cho chuyến du lịch.」"

# monologue
# JP: 日々姫はアクリル絵具を溶いて、\n僕の理解を助けてくれる。
3623 = "「Đường sắt, với tư cách là một công cụ làm\ntăng thêm niềm vui cho chuyến du lịch.」"

# monologue
# JP: 赤、青、黄――単色ではそれぞれに鮮やかな色が、\nけれど重なりを増すごとに、確かに黒に近づいていく。
3798 = "「Định vị tuyến đường sắt như một cuốn\ncatalogue, và tên ga là những sản phẩm\nđược đăng trên đó.\nLàm rõ hệ giá trị đó,\nvà mang lại ý nghĩa đặc trưng chỉ có ở\nđường sắt.」"

# 【日々姫】
# display as 日日姬
# JP: 「ばってん、光は――光線は、\n混ぜれば、白に近づいてくけん！！」
2246 = "「……Tuyến đường sắt là catalogue. Ga là sản\nphẩm du lịch sao.\nCái đó——ừm, về mặt cá\nnhân thì, cũng có chút thú vị đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2311 = "「啊——」" 

# monologue
# JP: まばゆい、白の、ひかりのイメージ。\n日々姫が与えてくれたイメージ。
3635 = "「Cho chạy chuyến tàu du lịch mới làm nổi\nbật hình ảnh catalogue đó,\nvà khẳng định\nrõ ràng rằng bản thân việc đi tàu chính là\nniềm vui của chuyến đi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「意見は、ひかりか」
2534 = "「Nghĩ ra chuyện hay rồi này!!!」"

# monologue
# JP: それが、迷いを切り裂いていく。
3455 = "Nagi giơ tay lên. Chiếc ghế phát ra tiếng\nlạch cạch."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――僕が間違っていた」
2186 = "「Chuyện hay là, chuyện gì vậy? Nagi.」"

# monologue
# JP: 全員の意見を尊重しようと望みすぎ、\n全ての意見を、排除しようとしてしまっていた。
3540 = "「Tên của tuyến đường sắt đó! Tuyến đường\nnối Ohimitera và Yatsushiro,\nsẽ đặt tên là\n『Ohimitera Onsen (Ôn Tuyến)』!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「全ての意見を尊重しようと望むばかりに、\n全ての意見を、排除しようとしていたのだな」
2606 = "「Tuyến chính Ohimitera?」"

# monologue
# JP: 意見がひかりであるのなら、\n閉ざしてしまえば、暗闇から動けなくなるというのに。
3306 = "「Không phải là Honsen (Bản Tuyến) mà là\nOnsen (Ôn Tuyến)!\nLà chơi chữ giữa chữ\n'sen' trong suối nước nóng (onsen) và chữ\n'sen' trong đường sắt (senro) đấy!!」"

# monologue
# JP: だから僕の目の前の、\nそれぞれ輝く、まばゆいひかりに目を向ける。
3583 = "「Waaa, nếu vậy thì cái tên suối nước nóng\nOhimitera,\nchắc chắn, mọi người sẽ biết\nđến nhiều hơn đó nha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の、真闇姉の、ハチロクの――\nそれぞれの意見・要望を、まずは調和させたい」
2618 = "「Thú vị đấy nhưng……quả thực, cũng phải xem\nxét ý định của các chính quyền địa phương\ndọc tuyến đường nữa.\nMột cái tên mang đậm\ntính lôi kéo lợi ích địa phương như vậy\nthì e là hơi khó.」"

# monologue
# JP: 今この部屋にみちている、\nこれほどまぶしく、僕を照らしてくれるひかりに。
3576 = "「Nhưng mà, em nghĩ là có thể đi theo hướng\nđó đấy.\nVí dụ như, đặt một biệt danh kiểu\nnhư “Tuyến Hoàng hôn - Hơi nước nóng”\nchẳng hạn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕ら全員が是とする素案を作れなければ、論外だ。\n宝生親子に、おそらく見向きもされんだろう」
2504 = "「Nếu làm được như vậy, trong các lựa chọn\nvề điểm đến du lịch,\nOhimitera, và biển\nYatsushiro, sẽ luôn được đưa vào.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら、どうぞ双鉄様。\nわたくしに、なんなりとお命じ下さい」
2668 = "「Nhưng mà nhé? Giả sử các anh làm được như\nvậy đi chăng nữa.」"

# monologue
# JP: しず、とハチロクが頭を下げる。
3372 = "Nói rồi, cô ấy im lặng.\nĐến mức khiến\nngười ta phải sốt ruột."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様のレールの上に、無数のひかりを走らせる。\nそうするために、わたくしでお役に立てますことを」
2231 = "「Giả sử tất cả những người được chuyên chở\nbằng chuyến tàu du lịch mới đó đều nghỉ\nlại qua đêm.\nThì mất bao nhiêu trăm năm\nmới thu hồi lại được chi phí đã đầu tư\nđây?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。そうするためには、お前の力が必要だ。\nそうして、日々姫、真闇姉」
2707 = "「Ở thời điểm hiện tại thì tôi chưa tính\nđến chuyện đó. Việc tăng lượng khách lưu\ntrú,\ncũng chỉ là một phần rất nhỏ trong\nhiệu quả kinh tế có thể kỳ vọng thôi.」"

# monologue
# JP: 頭を下げる。\nハチロクが、僕にそうしてくれたように。
3543 = "「Ở thời điểm hiện tại thì tôi chưa tính\nđến chuyện đó. Việc tăng lượng khách lưu\ntrú,\ncũng chỉ là một phần rất nhỏ trong\nhiệu quả kinh tế có thể kỳ vọng thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「更に力を貸して欲しい。オール御一夜の礎を、\nいま、この場所で固めるために」
2793 = "「Toa xe đường sắt, là phương tiện giao\nthông công cộng chuyên chở số lượng lớn\nhành khách.\nDo đó, kiểm tra theo luật định\nlà vô cùng nghiêm ngặt.」"

# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　いらんていわれても、\n力の押し売り、するつもりだったけん！！」
2979 = "「Chà, đó là chuyện đương nhiên rồi nhỉ.\nA,\nra là vậy——」"

# 【真闇】
# display as 真闇
# JP: 「ほんなら、おねーちゃんに聞かせて？\n双ちゃん、全体会議での目標は？」
3022 = "「Đó cũng là, yếu tố thúc đẩy cuộc Đại bãi\nbỏ các tuyến đường sắt nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜の経済復興を果たすための、\nオール御一夜体制を築くことだ」
2461 = "「Vâng, đúng là như vậy. Các nhà máy chế\ntạo toa xe có thể thông qua kiểm tra toàn\ndiện\nlần lượt sụp đổ, nhưng gánh nặng kiểm\ntra thì lại không hề giảm bớt.」"

# 【真闇】
# display as 真闇
# JP: 「そのために、会議までの準備で必要なことは？」
3000 = "「Đường sắt Ohimitera thì sao? Làm thế nào\nđể thực hiện kiểm tra đó?」"

# 【双鉄】
# display as 雙鐵
# JP: 「素案の立案。エアクラ誘致反対派も賛成派も\n参加を検討するに値する、経済復興のアイディアの」
2790 = "「Cụm nhà kho đầu máy của ga Suối nước nóng\nOhimitera,\nđã nhận được giấy phép, với tư\ncách là cơ sở có thể tiếp nhận kiểm tra\ntheo luật định.」"

# 【真闇】
# display as 真闇
# JP: 「ほんなら……基礎資料を分担で作成。\n作成者からのブリーフィングを全体で共有。で、どう？」
2989 = "「Giấy phép nhận được từ thuở xa xưa, đến\nbây giờ vẫn còn hiệu lực đó nha~」"

# monologue
# JP: ただそれだけのやりとりで、\nイメージを現実に落としてもらえる。
3744 = "「Giấy phép nhận được từ thuở xa xưa, đến\nbây giờ vẫn còn hiệu lực đó nha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、全員が資料作成し、その説明を行って、\n情報を共有、それを案出しに繋げるのか。よいと思う」
2190 = "「Vì vậy, ngay cả trong thời kỳ \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;\nbị phong\ntỏa.\nChúng tôi vẫn có thể tự kiểm tra, tại\n\\x%l検修庫;#00ffc040;xưởng bảo dưỡng%l;#; nhỏ hơn ở phía trong.」"

# 【真闇】
# display as 真闇
# JP: 「睡眠と休息。\nしっかりとらんと、危なかね？」
2174 = "「Dù vậy, chẳng phải là không có kỹ sư\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。頭が鈍っていては良い案も出ん」
2710 = "「Vâng, vì vậy, cứ bốn năm một lần, chúng\ntôi lại nhờ họ phái người đến.\nCông chúa\nXe điện——nhờ mối quan hệ của Đường sắt\nđiện Hiroshima Mouri, để mời kỹ sư đến.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですので、深夜作業でも\n問題ありません。連続稼動の休止時間を確保できれば」
2620 = "「Nhờ họ phái người đến, và tiếp nhận kiểm\ntra sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「ブリーフィングのあとにも、二時間くらいは欲しかと。\n全体会議用の、見やすか資料とか作りたいけん」
2383 = "「Vừa nhận sự chỉ đạo từ thanh tra viên đến\ntừ Teito,\nvừa cùng với kỹ sư, dành thời\ngian để vượt qua đợt kiểm tra.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2337 = "「Được chỉ đạo như vậy cơ à.」"

# monologue
# JP: 最小規模の、オール御一夜。\nそれがいきなり走り始める。
3832 = "Liếc nhẹ, ánh mắt của Paulette di chuyển."

# monologue
# JP: なるほど、であらば――僕はレールであればいい。
3594 = "Nơi ánh mắt cô ấy hướng đến, ông Uragami\nvà ông Mototada,\nđang nói nhỏ to bàn luận\nđiều gì đó rất sôi nổi."

# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロクには、目次のリスト化を頼みたい。\nそれがあれば、参照の時間を大いに節約できる」
2997 = "「Ra là vậy. Rồi sao? Chuyện đó thì liên\nquan như thế nào\nđến việc thu hồi chi phí\nđã đầu tư đây?」"

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。単純作業となりますので、\nわたくしが知識を持たない分野のものでもこなせます」
2691 = "「Chuyện đơn giản thôi. Bây giờ khi Nhà máy\nKokura của Teitetsu cũ đã bị giải thể,\ntất\ncả các công ty đường sắt ở Kyushu, đều\nđang gặp khó khăn trong việc kiểm tra.」"

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉にも、すまんが、眠る前にひと仕事頼みたい。\n全体の段取りを組んでみてほしいのだが」
2656 = "「Thực tế, Đường sắt Mikan mà chúng ta vừa\nnhắc đến lúc nãy,\ncũng đang phải chịu một\nkhoản chi phí rất lớn cho việc kiểm tra.」"

# 【真闇】
# display as 真闇
# JP: 「うん。得意分野。仕事ば、段取り八分やけんね。\nおねーちゃんに任せてよかよ」
2365 = "「Đến mức đó sao? Toa xe đường sắt, có thể\ndùng ô tô chạy xăng\nđể vận chuyển bằng\nrơ-moóc đường bộ mà? Nếu vậy thì」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は、今は早めに休んでおいてくれ。\n再終盤、日々姫にしか出来ない作業がいくことになる」
2682 = "「Việc kiểm tra ở Ohimitera là,\n『vừa nhận\nsự chỉ đạo từ thanh tra viên đến từ Teito』\nmà.」"

# 【日々姫】
# display as 日日姬
# JP: 「わかった。大丈夫。自分の出番に寝過ごさんよう、\nしっかり休んで、備えるけん」
2694 = "「A——câu chuyện lúc nãy——về đặc tính vùng\nmiền của Satsuma sao.\nĐường sắt Mikan,\nkhông muốn nhận sự chỉ đạo của Teito.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。そうしてくれ。\n起きたあとには、頼らせてもらうぞ」
2356 = "「Có lẽ là vậy.\nChuyện đó thì tôi cũng\nkhông rõ lắm.」"

# 【日々姫】
# display as 日日姬
# JP: 「今よりもーっとたよってよかとよ？\n私、にぃにの妹やけん！」
2603 = "「Thực tế là, Đường sắt Mikan đang tốn một\nkhoản chi phí khổng lồ,\nđể ủy thác việc\nkiểm tra cho nhà máy chế tạo toa xe ở\nHonshu——Nagoya.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――っ！！！」
2338 = "「Là Hinosha sao. Nếu vậy thì kỹ thuật,\nkinh nghiệm và kỹ sư đều quá đủ.\nĐúng là\nmột cơ sở có thể thông qua kiểm tra mà\nkhông cần nhận sự chỉ đạo nhỉ.」"

# monologue
# JP: （ドクンっ）
3981 = "「Là Hinosha sao. Nếu vậy thì kỹ thuật,\nkinh nghiệm và kỹ sư đều quá đủ.\nĐúng là\nmột cơ sở có thể thông qua kiểm tra mà\nkhông cần nhận sự chỉ đạo nhỉ.」"

# 【路子】
# display as 路子
# JP: 「っ！！？　これダメっ！\nにげてっ！　にげてそーちゃんっ！！」
3088 = "「Tóm lại, nếu chúng ta có thể xây dựng một\ncơ sở có trình độ tương đương hoặc cao hơn\ndọc theo tuyến Yunoi,\nthì nơi đó, có thể\ntrở thành một đơn vị nhận ủy thác với chi\nphí vận chuyển thấp hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
1519 = "「Tóm lại, nếu chúng ta có thể xây dựng một\ncơ sở có trình độ tương đương hoặc cao hơn\ndọc theo tuyến Yunoi,\nthì nơi đó, có thể\ntrở thành một đơn vị nhận ủy thác với chi\nphí vận chuyển thấp hơn.」"

# monologue
# JP: ……心強さと嬉しさに、軽く頷いたその瞬間。
1511 = "Đúng lúc đó, tôi lật một tấm bảng lên."

# monologue
# JP: 死の感触も――路子が僕から離れてく、\nあのどうしようも無い絶望感も、ぶり返してくる。
3566 = "Trên bản đồ đường sắt giống hệt lúc nãy,\nđã được vẽ thêm một vài tuyến đường sắt\nkhác."

# 【日々姫】
# display as ３人
# JP: 「にぃに？」「双鉄様？」\n「双ちゃん？」
3051 = "「Bởi vì có chừng này công ty đường sắt có\nthể trở thành đơn vị đặt hàng——\nnhững công\nty đang phải chịu chi phí vận chuyển đến\nHonshu để tiếp nhận kiểm tra.」"

# monologue
# JP: ――ほんの一瞬のフラッシュバック。\nこわばったのも、ただひとときであった筈。
1488 = "Cảm nghĩ mang theo chút ngây thơ đó, chợt\ndừng lại giữa chừng."

# monologue
# JP: けれど、それでも気づいてくれる。\n僕の異変に皆が気づいて、不安げな顔をしてくれる。
3301 = "Giọng của Kisaki,\ntrầm xuống thành tông\ngiọng của công việc."

# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとう、本当に心強い」
1531 = "「Thật sao? Tất cả các công ty đường sắt\nnày, đều đang gặp khó khăn trong việc kiểm\ntra định kỳ,\nvà phải tốn một khoản chi phí\nkhổng lồ?」"

# monologue
# JP: だから、笑う。\n不器用な作り笑いに見えてしまうかもしれんが。
3584 = "「Đúng vậy. Và, Đường sắt Ohimitera——\nchúng\ntôi, thông qua cuộc đại tu 8620 vừa qua——」"

# monologue
# JP: 言葉にとてもできぬ感謝を――\n精一杯の言葉に、笑いに、こめたくて。
3549 = "「Đã có được mối quan hệ với nhiều kỹ sư\nxuất sắc.\nTóm lại……có thể thiết lập một hệ\nthống kiểm tra thường trực sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2919 = "「Ừm. Thực tế, ngay tại thời điểm này, đã\ncó nhiều kỹ sư\nmong muốn chuyển đến\nOhimitera sinh sống.」"

# monologue
# JP: その言葉だけを繰り返す。
3532 = "「Ra là vậy……nhưng mà, dù không phục hồi\ntuyến đường,\nthì vẫn có thể đáp ứng được\nnhu cầu đó mà?」"

# monologue
# JP: 真闇姉に、日々姫に、そしてハチロクに。\n心底からの感謝をこめて――繰り返す。
3545 = "「Từ Bắc Kyushu đến Ohimitera bị núi non\nhiểm trở cản trở nên việc vận chuyển đường\nbộ rất khó khăn.\nBắt buộc phải đi đường\nvòng lớn, dù là hướng Đông hay hướng Tây.」"

# 【元忠】
# display as 元忠
# JP: 「復線？」
2514 = "「Việc vận chuyển toa xe đường sắt trên đất\nliền bằng \\x%lディーゼルトレーラー;#00ffc040;xe rơ-moóc diesel%l;#;,\nsẽ phát sinh một khoản chi phí\nkhổng lồ, tính theo đơn vị thời gian.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい。復線です。それがなれば、\n御一夜の環境保全と経済復興とは、両立します」
2769 = "「Ra là vậy. Chỉ cần có tuyến đường sắt\ngiữa Yatsushiro - Ohimitera,\nlà có thể cắt\ngiảm đáng kể chi phí vận chuyển đó sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「復線って――\nそんなニーズは今時どこにも無いだろう？」
2120 = "「Muốn kết nối lại đường ray——tâm nguyện đó\nchắc chắn,\nbất kỳ nhà điều hành đường sắt\nnào, cũng đều có một cách mãnh liệt.」"

# monologue
# JP: 率直極まる稀咲の言葉に、\n元忠氏も、浦上さんも頷いている。
3332 = "「Muốn kết nối lại đường ray——tâm nguyện đó\nchắc chắn,\nbất kỳ nhà điều hành đường sắt\nnào, cũng đều có một cách mãnh liệt.」"

# monologue
# JP: 御一夜銀行サイドの三人は、\n全員が全員、この会議に出席してくれた。
3298 = "「……Chắc là vậy nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ニーズは作り出せます。最初に復線させるのが、\n“御一夜－[やつしろ,2]八ツ城”間だからです」
3065 = "「……Chắc là vậy nhỉ.」"

# monologue
# JP: 言葉と同時、日々姫が用意してくれていた\nパネルを示す。
3516 = "Có lẽ là từ ý thức “hành xử cho ra dáng\nmột \\x%lレイルロオド;#00ffc040;Railord%l;#;”."

# 【凪】
# display as 凪
# JP: 「八ツ城からも、鉄道の線路走っとるばい！」
2156 = "「Kế hoạch này, tôi nghĩ sẽ trở thành một\nsự hậu thuẫn vững chắc——\nmang lại một danh\nnghĩa chính đáng cho tâm nguyện đó.」"

# 【ふかみ】
# display as 深美
# JP: 「あ――本当。ええと……みかん鉄道？\nって、どうしてこれ――」
2319 = "「Nếu có danh nghĩa chính đáng, thì việc\nkêu gọi sự hợp tác từ các bên liên quan\ncủa mỗi nhà điều hành đường sắt——\ncác\nchính quyền địa phương và người dân dọc\ntuyến đường cũng sẽ dễ dàng hơn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「貨物需要と、観光需要があるからです。\nだから、鹿兒島県が主体となって廃線を阻止した」
2381 = "「Do đó, chi phí phục hồi tuyến đường có\nthể được phân tán và giảm bớt sao?」"

# monologue
# JP: ああ、と小さな声を出すのは、蓑笠老人だ。
3820 = "「Có khả năng đó. Trước tiên, nếu có thể\nbiến đoạn Ohimitera - Yatsushiro thành một\nví dụ thành công của việc phục hồi tuyến\nđường,\nthì khả năng đó sẽ tăng lên gấp\nhàng chục lần.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「鹿兒島が主体となったとですか。\nなら、[さつま,1]颯馬の地域性もあるかもしれんですのぉ」
3083 = "「Hừm? Ra là vậy, nhỉ……」"

# 【れいな】
# display as 玲奈
# JP: 「さつまのちいきせい、ですかぁ？」
2903 = "Lại là sự im lặng.\nMỗi khi tôi định dồn\nép, Kisaki chắc chắn sẽ điều chỉnh lại\nnhịp độ."

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「大昔から、[さつま,1]颯馬は帝都と仲の悪かと。\n中央の方針には、ともかく素直に従わん」
2904 = "「——Lúc nãy, cô Hachiroku có nói nhỉ?\nRằng\n『Bất kỳ nhà điều hành đường sắt nào, cũng\nđều khao khát phục hồi tuyến đường』.」"

# 【赤井】
# display as 赤井
# JP: 「まぁその[きふう,1]気風も、今は昔ともなっていましょうが。\nしかし……なるほど、みかん鉄道と繋げますか」
2096 = "「他們以前就是那種脾氣。話說回來……原來如此，要和橙鐵路連在一起嗎」" 

# monologue
# JP: 鹿兒島のフォローをしつつの赤井宮司の頷きを、\n宝生稀咲は見逃さない。
3885 = "赤井宮司在一旁幫鹿兒島說了兩句好話，而寶生稀咲注意到了他最後半句。" 

# 【稀咲】
# display as 稀咲
# JP: 「みかん鉄道と線路が繋がることには、\n赤井宮司も納得されるほどのメリットが？」
2935 = "「赤井宮司認為和橙鐵路連上對我們也有好處？」" 

# 【赤井】
# display as 赤井
# JP: 「と、思いますが――古い鉄道屋の知識です。\n最新のものは、双鉄君からの補足があるのでは？」
2768 = "「沒錯，不過我只是個老鐵路人，知識可能過時了。最新的就請雙鐵先生補充吧」" 

# monologue
# JP: なるほど。宮司もまた、稀咲が一目置いているだけはある。\n話をきちんと、繋げて僕へと戻してくれた。
3266 = "不愧是宮司，一點就透。怪不得就連稀咲都認為他是個大人物。他接下話之後，又把話重新遞到了我這裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司がおっしゃってくださったとおり、\nみかん鉄道との\x%l接続;#00ffc040;接続%l;#;は、非常に大きな意味を持ちます」
2754 = "「正如赤井宮司所說，和橙鐵路\\x%l接続;#00ffc040;會車%l;#;對我們而言有著非比尋常的意義」" 

# monologue
# JP: 日々姫のパネルの地図の、八ツ城を示す。
3554 = "我指著日日姬的展板地圖中八代的位置。" 

# 【双鉄】
# display as 雙鐵
# JP: 「八ツ城は大きな港町です。港と繋がる線路を持つことは、\nエアクラの弱点を補完します」
2154 = "「八代是個海港城市。如果能擁有和海港連接的線路，我們就可以彌補空凝機的弱點」" 

# 【稀咲】
# display as 稀咲
# JP: 「超重量物移送の問題だね？　それは、確かに、\nニーズがあれば大きなメリットになるだろうけれど」
2116 = "「你是說空凝機不能運送大重量貨物的問題吧？的確，如果客戶有這種需求，確實會給我們帶來巨大利益」" 

# monologue
# JP: ニーズは、作れる。いいや、自然と発生してくる。\nその確信があるからこそ、敢えて答えず話をすすめる。
3940 = "需求是可以創造的，不，是會自然產生的。正因為我如此確信，所以才特地沒有直接回答，而是繼續說。" 

# 【双鉄】
# display as 雙鐵
# JP: 「みかん鉄道側にも、この復線は大きなメリットを\n生みます。まずは単純に、観光需要の刺激」
2587 = "「我們恢復廢線對橙鐵路來說也是一件好事。首先最簡單的，就是會刺激旅遊需求」" 

# 【ふかみ】
# display as 深美
# JP: 「さっき、ポーレットさんが言ってたお話、です？」
2697 = "「是剛才波萊特小姐說過的那個嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。みかん鉄道沿線――八ツ城海の夕暮れの\n車窓風景は、日ノ本一とも呼ばれるほどだそうだ」
2350 = "「嗯。聽說橙鐵路沿線——八代海的夕陽從車窗看過去是日本最美麗的」" 

# 【凪】
# display as 凪
# JP: 「日ノ本一！　すごかとばい！\n凪さま、それだったら見てみたかとばい！！」
2685 = "「日本最美？這可太強咧！本小姐好想去瞧瞧！」" 

# 【赤井】
# display as 赤井
# JP: 「御一夜から、[はやと,1]早戸側に抜ける路線。\nこれも廃線となりましたが、[ひさつせん,2]肥颯線[おこばえき,2]小畑駅近くの車窓も」
3054 = "「雖然也廢線了，不過從御一夜到隼人的線路，還有肥薩線大畑站附近的車窗也能欣賞到同樣水準的景色」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ええ、日ノ本三大車窓の一つと称されたそうですね。\n将来、肥颯線も復線させれば、資源は更に連携します」
2351 = "「嗯。那裡的景色可是被稱為日本三大車窗絕景之一呢。將來等肥薩線恢復以後，旅遊資源就可以加強共享了」" 

# 【ふかみ】
# display as 深美
# JP: 「日ノ本一と、日ノ本三大車窓のひとつ。\n――その両方が一つの列車で結ばれたら、すごい。です」
2687 = "「日本第一的夕陽和日本三大車窗風景之一——能坐一輛車同時享受兩種美景實在太棒了。嗯」" 

# 【稀咲】
# display as 稀咲
# JP: 「だが、『将来的に』、『連携させれば』の話だろう？\nそれが果たせぬ段階では利用者が見込めないのだから」
2103 = "「但是這些都是對未來的假設吧？現在還不能確定恢復廢線後就一定會有很多旅客吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、見込める。なぜなら[せんだい,1]千内－八ツ城間には、\n御一夜のような、いわゆる温泉観光地が無いゆえに」
2071 = "「不，可以確定。因為從川內到八代的線路沒有像御一夜一樣的溫泉旅遊景點」" 

# 【ポーレット】
# display as 波萊特
# JP: 「逆に、御一夜にはもちろん海がありません」
2222 = "「反過來說，御一夜也沒有海」" 

# 【稀咲】
# display as 稀咲
# JP: 「それこそエアクラを使えばいい話だ。海でも温泉でも、\n線路に縛られないで、どこへだっていける」
3019 = "「那用空凝機不就行了嘛。用空凝機就可以不受線路束縛，不管海還是溫泉，想去哪裡都成」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『どこへだっていける』は、結局、\n『どこへもいかない』という選択肢をも浮き上がらせる」
1548 = "「“哪裡都能去”反而會凸顯“哪裡都不去”的選擇」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？」
2367 = "「嗯？」" 

# monologue
# JP: 稀咲が頷く。\nほんのわずかに、慎重そうに。
3806 = "聽到我這麼說，稀咲慎重地輕輕點了點頭。" 

# 【稀咲】
# display as 稀咲
# JP: 「たしかに、情報過多による選択疲れは\n社会傾向として、顕著になってきつつはあるよね」
2819 = "「的確，現代社會確實出現了訊息過多反而造成難以選擇的問題」" 

# monologue
# JP: 僕らが一晩で調べられるような資料内のこと。\n予想通りに――当然ながら、稀咲は把握してくれている。
3910 = "這是我們查了一晚上資料就知道的東西。稀咲當然也明白，這完全沒有出乎我的預料。" 

# 【稀咲】
# display as 稀咲
# JP: 「だからこそのブームの極端化。誰かがよしとしたものに、\nわれもわれもと飛びついて――ああ」
2649 = "「所以才要推動觀光熱潮極端化。只要有人去就會不停有跟風的——啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道自体をブーム化させて、定着させることを目指す。\n『不便な交通』ではなく『旅の楽しみの手段』として」
2590 = "「我們的目標就是讓鐵路本身變成一股流行熱潮，給別人的印象從“不便的交通方式”變成“享受旅遊樂趣的一種手段”」" 

# 【稀咲】
# display as 稀咲
# JP: 「旅行の楽しみを増大させるツールとしての、鉄道」
2654 = "「把鐵路從交通方式變成增加旅遊樂趣的工具」" 

# 【双鉄】
# display as 雙鐵
# JP: 「線路をカタログ、駅名はそこに載る商品と位置づける。\nその価値観を明示し、線路にならではの意味を持たせる」
2940 = "「路線就是商品目錄，每個站就是目錄上的商品。我們要把這樣的價值觀傳達給客戶，讓鐵路擁有獨特的意義」" 

# 【稀咲】
# display as 稀咲
# JP: 「……線路はカタログ。駅は観光商品か。\nそれは――うん、個人的には、ほんの少しだけ面白い」
1605 = "「……路線就是商品目錄，每個站就是目錄上的商品。這個——就我個人來說，我覺得有點意思」" 

# 【双鉄】
