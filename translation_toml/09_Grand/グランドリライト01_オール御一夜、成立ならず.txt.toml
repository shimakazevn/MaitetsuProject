[script]
# lines: 673 
# 【日々姫】
# display as 日日姬
# JP: 「あの、にぃ――んんっ、兄さん？\n\x%l機関助士;#00ffc040;機関助士%l;#;って、兄さんがいつも練習している――」
2913 = "「À này, anh hai——ưm, anh trai?\n\\x%l機関助士;#00ffc040;Phụ lái tàu%l;#; là, cái mà anh luôn luyện tập đó hả——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、\x%l投炭;#00ffc040;投炭%l;#;だな。\nそう。あれをメインに、機関車の走行を助ける仕事だ」
2439 = "「À, \\x%l投炭;#00ffc040;thêm than%l;#; nhỉ.\nĐúng vậy. Đó là công việc chủ yếu hỗ trợ việc chạy đầu máy xe lửa.」"
# 【日々姫】
# display as 日日姬
# JP: 「……練習すれば、どうでしょう？\nあれは、私にも出来ますか？」
1588 = "「……Nếu em luyện tập, thì sao nhỉ?\nCái đó, em cũng có thể làm được chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「できるな」
2894 = "「Được chứ.」"
# monologue
# JP: そこは考えるまでもない。\n日々姫は文武両道なうえ、努力を惜しまぬ性格だから。
3902 = "Chuyện đó thì không cần phải nghĩ.\nBởi vì Hibiki văn võ song toàn, lại còn có tính cách không ngại nỗ lực mà."
# monologue
# JP: いや――これこそ本当の盲点か？\n体格的にも、日々姫なら十分に小柄なのだし――
3797 = "Không——đây mới chính là điểm mù thực sự sao?\nVề mặt thể cách, nếu là Hibiki thì cũng đủ nhỏ nhắn——"
# 【日々姫】
# display as 日日姬
# JP: 「なら、私。練習してみて、できそうだったら、\nにぃに――んんっ――兄さんの、\x%l機関助士;#00ffc040;機関助士%l;#;になります」
3011 = "「Vậy thì, em. Sẽ thử luyện tập xem sao, nếu có vẻ làm được,\nthì em sẽ trở thành \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; của anh hai——ưm——anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、それは助かる」
2713 = "「Vậy sao, thế thì giúp được nhiều lắm đấy.」"
# monologue
# JP: 僕のではなく、8620のという方がより正しいが、\nそこまで細かなことを気にしても仕方がない。
3935 = "Đúng hơn là của 8620 chứ không phải của tôi,\nnhưng có bận tâm đến những chi tiết nhỏ nhặt như vậy cũng chẳng ích gì."
# monologue
# JP: 重要なのは、これで8620の安全な営業運転へ、\n更に一歩、大きく近づけたということだ。
3926 = "Điều quan trọng là, với việc này, chúng ta đã tiến thêm một bước lớn nữa,\nđến việc vận hành kinh doanh an toàn cho 8620."
# 【日々姫】
# display as 日日姬
# JP: 「ただ……ええと。\n条件づけとか、そういうのじゃ全然ないんだけど」
2226 = "「Chỉ là……ờm.\nKhông phải là ra điều kiện hay gì đâu nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん？　何だ。\n希望があるなら、遠慮したりせず言ってくれ」
2310 = "「Hửm? Gì vậy.\nNếu có mong muốn gì, cứ nói ra đừng ngại.」"
# 【日々姫】
# display as 日日姬
# JP: 「えと、手段と目的が少し混ざっちゃってるみたいに、\n今の兄さん、見えるかもって」
2269 = "「Ờm, anh trai bây giờ, có vẻ như\nđang hơi nhầm lẫn giữa phương tiện và mục đích ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2305 = "「Hừm.」"
# monologue
# JP: 言われてみれば、その傾向はあるかもしれぬ。
3290 = "Nghe em ấy nói vậy, có lẽ tôi cũng có xu hướng đó thật."
# monologue
# JP: 鉄道は観光振興の、エアクラ工場誘致撤回のための\n手段のひとつにすぎぬはず。だが――
3501 = "Đường sắt đáng lẽ chỉ là một trong những phương tiện,\nđể chấn hưng du lịch, và thu hồi việc thu hút nhà máy Aircra. Nhưng mà——"
# 【日々姫】
# display as 日日姬
# JP: 「御一夜のことをもっと知ったほうがいいと思うの。\n兄さんが、この町を本当に復興させたいんなら」
2418 = "「Em nghĩ anh nên tìm hiểu thêm về Ohimitera.\nNếu anh thực sự muốn phục hưng thị trấn này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「具体的には、どうすればいい？」
2170 = "「Cụ thể thì, nên làm thế nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「酒蔵のことも、私の看板描きやなにかも、\n御一夜の人と密着するお仕事でしょ？　だから――」
3034 = "「Chuyện xưởng rượu, hay việc vẽ biển hiệu của em cũng vậy,\nđều là những công việc gắn bó mật thiết với người dân Ohimitera đúng không? Vì vậy——」"
# 【双鉄】
# display as 雙鐵
# JP: 「家事やお前の手伝いに、もう少し目を向ければ、\nよりバランスがとれるかもしれぬというわけか」
2421 = "「Nếu anh để mắt thêm một chút đến việc nhà và việc phụ giúp em,\nthì có lẽ sẽ cân bằng hơn, ý em là vậy sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
2353 = "「Vâng.」"
# monologue
# JP: ほっとしたような日々姫の笑顔。
3636 = "Nụ cười như trút được gánh nặng của Hibiki."
# monologue
# JP: 言い出したくて言い出せない、\nいつもの日々姫が出ていたのかと、今さら気付く。
3281 = "Đến giờ tôi mới nhận ra, Hibiki của mọi khi,\nmuốn nói mà không thể nói ra, lại xuất hiện rồi."
# 【ポーレット】
# display as 波萊特
# JP: 「あのっ！　わたしも、それだったら希望っていうか、\n意見っていうか――」
3021 = "「À này! Nếu vậy thì tôi cũng có mong muốn,\nhay đúng hơn là ý kiến——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。言ってみてくれ」
2361 = "「Ừm. Cứ nói thử xem.」"
# monologue
# JP: 走行試験の成功で、テンションがみなあがっている。\n恐らくは、酒を飲んでいるのと似たような状態だろう。
3823 = "Sự thành công của cuộc chạy thử, khiến tinh thần của mọi người đều đang dâng cao.\nCó lẽ, trạng thái này cũng giống như lúc uống rượu vậy."
# monologue
# JP: こういうときこそ、忌憚の無い意見が飛び出してくる。\n聞き逃さぬよう集中する。
3434 = "Chính những lúc thế này, những ý kiến thẳng thắn mới bật ra.\nTôi tập trung để không bỏ sót lời nào."
# 【ポーレット】
# display as 波萊特
# JP: 「基本線は日々姫ちゃんと同じなんですけど、\nアプローチ、別のやりかたの方がもっといいかもって」
2387 = "「Đường lối cơ bản thì giống với em Hibiki,\nnhưng cách tiếp cận, có lẽ làm theo cách khác sẽ tốt hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「別のやり方？」
2175 = "「Cách khác sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「例えば、双鉄くんに政策秘書に入ってもらって、\n市政のレベルで観光振興に力を注いでもらう、とか」
2756 = "「Ví dụ như, nhờ cậu Soutetsu làm thư ký chính sách,\nvà tập trung sức lực vào việc chấn hưng du lịch ở cấp độ chính quyền thành phố, chẳng hạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2373 = "「Hô.」"
# monologue
# JP: 日々姫は地道なボトムアップ。\nポーレットは一気のトップダウン。
3626 = "Hibiki là kiểu đi từ dưới lên một cách vững chắc.\nPaulette là kiểu đi từ trên xuống một mạch."
# monologue
# JP: 同じく観光振興、御一夜再生を目的として、\nしかし手段は百八十度異なっている。
3936 = "Cùng với mục đích chấn hưng du lịch, tái thiết Ohimitera,\nnhưng phương tiện lại khác nhau 180 độ."
# 【ポーレット】
# display as 波萊特
# JP: 「今回の試験走行までで、御一夜のキーマンが何人も、\n双鉄くんを信頼してくれたと思いますし、その人脈も」
2181 = "「Đến cuộc chạy thử lần này, tôi nghĩ đã có nhiều nhân vật chủ chốt của Ohimitera,\ntin tưởng cậu Soutetsu, và cả những mối quan hệ đó nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、市政という長いテコを使えば、作用も大きい。\nポーレットのいうこともまた、理解はできるな」
2360 = "「Hừm, nếu sử dụng đòn bẩy dài là chính quyền thành phố, thì tác dụng cũng sẽ lớn.\nNhững gì Paulette nói, cũng có thể hiểu được.」"
# monologue
# JP: ぷっと、ポーレットの頬が膨れる。
3672 = "Paulette phồng má lên cái phựt."
# monologue
# JP: こんなに飾らぬ表情は、初めて見る気がして何故か、\n少しドキリとさせられる。
3580 = "Có cảm giác như đây là lần đầu tiên tôi nhìn thấy một biểu cảm không che đậy như vậy, không hiểu sao,\nlại khiến tôi hơi giật mình."
# 【ポーレット】
# display as 波萊特
# JP: 「理解“は”、ですか？」
2224 = "「“Có thể” hiểu được, sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\n日々姫の意見も、同様に理解できるからな」
2343 = "「Ừm.\nVì ý kiến của Hibiki, cũng có thể hiểu được tương tự mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「……にぃにぃ」
1609 = "「……Anh hai.」"
# monologue
# JP: 安心したような日々姫の声。\nそこにぽちゃん、と、密やかな水音が重なってくる。
3618 = "Giọng nói như yên tâm của Hibiki.\nHòa cùng với đó là tiếng nước tĩnh lặng, róc rách."
# 【ハチロク】
# display as 八六
# JP: 「確かに、お二方のご意見はともに、\n一理も二理もあるものですね」
2846 = "「Quả thực, ý kiến của cả hai người,\nđều có cái lý của nó nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
2159 = "「Hachiroku.」"
# monologue
# JP: れいなを洗ってやり終えたらしい。
3451 = "Có vẻ như cô ấy đã tắm rửa xong cho Reina."
# monologue
# JP: ハチロクは、達成感を顔に出し、\n風呂にしずしず入ると同時、僕の膝の上へと座る。
3366 = "Hachiroku, với vẻ mặt đầy cảm giác thành tựu,\ntừ từ bước vào bồn tắm, đồng thời ngồi lên đùi tôi."
# 【ハチロク】
# display as 八六
# JP: 「けれど、地道なご縁づくりは日々姫の、\n市政はそれこそ、ポーレット様の得意分野かと」
2098 = "「Nhưng mà, việc tạo dựng các mối quan hệ một cách vững chắc là lĩnh vực sở trường của Hibiki,\ncòn chính quyền thành phố thì lại là của cô Paulette.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな」
2844 = "「Quả thực là vậy.」"
# monologue
# JP: 地道に縁を築くこと。\n市政という道具を振り回すこと。
3647 = "Tạo dựng các mối quan hệ một cách vững chắc.\nSử dụng công cụ mang tên chính quyền thành phố."
# monologue
# JP: それは日々姫とポーレット、それぞれが積み重ねた技。\n僕にいきなり学べるほどに、容易いものとも思えない。
3904 = "Đó là những kỹ năng mà Hibiki và Paulette, mỗi người đã tích lũy được.\nTôi không nghĩ nó dễ dàng đến mức tôi có thể học được ngay lập tức."
# 【ハチロク】
# display as 八六
# JP: 「餅は餅屋、汽車は汽車屋です、双鉄様。\n双鉄様の\x%l機関士;#00ffc040;機関士%l;#;としての適正の高さは、明白です」
2908 = "「Việc nào ra việc nấy, tàu hỏa thì để cho người làm tàu hỏa, thưa ngài Soutetsu.\nSự phù hợp cao của ngài Soutetsu với tư cách là một \\x%l機関士;#00ffc040;lái tàu%l;#;, là điều hiển nhiên.」"
# monologue
# JP: まったく迷いのない言葉。\n率直すぎる賞賛を、単純に嬉しく感じてしまう。
3363 = "Những lời nói hoàn toàn không chút do dự.\nTôi chỉ đơn thuần cảm thấy vui mừng trước lời khen ngợi quá đỗi thẳng thắn đó."
# 【ハチロク】
# display as 八六
# JP: 「ほんの半年。それだけあれば双鉄様も、清美\x%l機関士;#00ffc040;機関士%l;\n#;同様、\x%l機関助士;#00ffc040;機関助士%l;#;なしでの機関車運用も可能となります」
3059 = "「Chỉ nửa năm thôi. Có chừng đó thời gian thì ngài Soutetsu cũng,\ngiống như \\x%l機関士;#00ffc040;lái tàu%l;#; Kiyomi, có thể vận hành đầu máy xe lửa mà không cần \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;.」"
# monologue
# JP: きっぱりとそう言い切ってハチロクは、\n僕、日々姫、ポーレットとじゅんじゅん見渡す。
3352 = "Hachiroku khẳng định một cách dứt khoát như vậy,\nrồi lần lượt nhìn sang tôi, Hibiki, và Paulette."
# 【ハチロク】
# display as 八六
# JP: 「故に、双鉄様は今のレールをご[まいしん,1]邁進ください。\n双鉄様が[みち]路を開けば、必ず皆がその正しさに続きます」
2378 = "「Do đó, xin ngài Soutetsu hãy dũng cảm tiến bước trên đường ray hiện tại.\nNếu ngài Soutetsu mở đường, chắc chắn mọi người sẽ đi theo sự đúng đắn đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「極端な意見ではあるが、しかし、理もある」
3056 = "「Tuy là một ý kiến cực đoan, nhưng cũng có lý.」"
# monologue
# JP: ハチロクの言は、一点突破で高いところ――\n誰もが目にするところに、旗を掲げろということだ。
3359 = "Lời của Hachiroku là, đột phá tại một điểm và tiến lên vị trí cao——\nhãy giương cao ngọn cờ ở nơi mà mọi người đều có thể nhìn thấy."
# monologue
# JP: その旗が正しき道筋を示すなら、\n目にした者は、必ず後に続いてくれるはずだ、と。
3814 = "Nếu ngọn cờ đó chỉ ra con đường đúng đắn,\nnhững người nhìn thấy nó, chắc chắn sẽ theo sau."
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 2305 = "「唔」" 
# monologue
# JP: 日々姫、ポーレット、ハチロク。
3616 = "Hibiki, Paulette, Hachiroku."
# monologue
# JP: それぞれの意見を、そのまま汲むことはせぬにせよ、\nこれからの方針の参考とすることは大いに有用だろう。
3420 = "Dù không hoàn toàn tiếp thu ý kiến của từng người,\nnhưng việc dùng làm tài liệu tham khảo cho phương hướng sắp tới sẽ rất hữu ích."
# monologue
# JP: （だが――）
3964 = "（Nhưng mà——）"
# monologue
# JP: 日々姫の言った、『手段と目的』。\n――その一言が、鼓膜の奥にこびりつく。
3621 = "『Phương tiện và mục đích』 mà Hibiki đã nói.\n——Câu nói đó, cứ bám chặt vào sâu trong màng nhĩ tôi."
# monologue
# JP: もう一段階高いレベルに目線を置けば、僕はやはり、\n『手段と目的』を取り違えているのではなかろうか？
3462 = "Nếu đặt tầm nhìn ở một mức độ cao hơn nữa, có lẽ tôi thực sự,\nđã nhầm lẫn giữa 『phương tiện và mục đích』 chăng?"
# monologue
# JP: （エアクラ工場誘致撤回と、水資源の保護――\nそれを目的――ゴールと定めて良いのだろうか？）
3985 = "（Thu hồi việc thu hút nhà máy Aircra, và bảo vệ nguồn tài nguyên nước——\nLấy đó làm mục đích——đích đến, liệu có được không?）"
# monologue
# JP: いや、違う。それさえもやはり一つの過程――\n御一夜を立て直すためのステップであるにすぎない。
3278 = "Không, không phải. Ngay cả điều đó cũng chỉ là một quá trình——\nchỉ là một bước đệm để vực dậy Ohimitera mà thôi."
# monologue
# JP: エアクラ工場が建設されず、水を守って――\n産業も鉄道も復活せずに、人が飢えては意味が無い。
3270 = "Dù không xây dựng nhà máy Aircra, và bảo vệ được nguồn nước——\nnhưng nếu công nghiệp và đường sắt không phục sinh, con người phải chịu đói thì cũng vô nghĩa."
# monologue
# JP: （地域の協力、政治の活用、旗印の掲示――\nそれら全てを活用しても、まだまだ足りない）
3966 = "（Sự hợp tác của khu vực, việc tận dụng chính trị, giương cao ngọn cờ——\nDù có tận dụng tất cả những thứ đó, vẫn là chưa đủ.）"
# monologue
# JP: 宝生元忠、宝生稀咲親子がなにゆえ、\nエアクラ工場誘致を良しとしているのか。
3475 = "Hai cha con Houshou Mototada, Houshou Kisaki vì lý do gì,\nmà lại cho rằng việc thu hút nhà máy Aircra là tốt."
# monologue
# JP: 僕らの地域振興に無く、工場誘致が持つ物は何か――\nそこをまだ、僕は考え尽くしていない。
3482 = "Thứ mà việc thu hút nhà máy có, nhưng việc chấn hưng khu vực của chúng tôi lại không có là gì——\nĐiều đó, tôi vẫn chưa suy nghĩ thấu đáo."
# monologue
# JP: （ざばっ）
3975 = "（Rào）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ！」
2371 = "「Phù!」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
3063 = "「Ngài Soutetsu?」"
# monologue
# JP: 両手に掬った湯を叩きつけるようにして顔を洗う。
3558 = "Tôi vốc nước bằng cả hai tay rồi hất mạnh lên mặt để rửa."
# monologue
# JP: そうだ、ここで焦らず洗い直そう。\n8620が再び走り出した今こそ、地に足をつけ。
3658 = "Đúng vậy, đừng vội vàng mà hãy xem xét lại từ đầu.\nNgay lúc 8620 đã bắt đầu chạy lại này, phải thật vững bước."
# 【双鉄】
# display as 雙鐵
# JP: 「時間が欲しい。丸一日で構わない。\n出来れば明後日――この全員で会議を持てるだろうか」
2637 = "「Tôi cần thời gian. Trọn một ngày cũng được.\nNếu có thể thì ngày mốt——chúng ta có thể tổ chức một cuộc họp với tất cả mọi người ở đây được không.」"
# 【ポーレット】
# display as 波萊特
# JP: 「夕方の乗務が終わった……\nそうですね、[じゅうはちじ,4]１８：００からでどうでしょう？」
2132 = "「Sau khi kết thúc ca trực buổi chiều……\nĐúng rồi nhỉ, bắt đầu từ 18:00 thì sao?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、ポーレットと一緒に参加しますよぉ」
2800 = "「Reina, sẽ tham gia cùng với chị Paulette đó nha~」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしも当然ながら、双鉄様にご一緒します」
2558 = "「Tôi cũng đương nhiên, sẽ đi cùng với ngài Soutetsu.」"
# 【凪】
# display as 凪
# JP: 「おもしろそうばい！　参加するばい！」
2406 = "「Có vẻ thú vị đấy! Nagi cũng tham gia!」"
# 【ふかみ】
# display as 深美
# JP: 「え、ええと――\nおじゃまじゃないなら、参加したい。です」
2324 = "「A, ờm——\nNếu không phiền, thì em cũng muốn tham gia. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫はどうだ？」
2683 = "「Hibiki thì sao?」"
# monologue
# JP: 声をかければ、日々姫は少し驚いたような顔をする。
3632 = "Nghe tôi hỏi, Hibiki lộ vẻ mặt hơi ngạc nhiên."
# 【日々姫】
# display as 日日姬
# JP: 「え？　別に、普通に参加するつもりだけど」
2271 = "「Hả? Không có gì, đương nhiên là em định tham gia rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば良かった。で、だ。出来ればで構わんのだが\n――稀咲達も誘ってみてはくれんか？」
3003 = "「Vậy thì tốt. Và này, nếu được thì cũng không sao\n——em thử rủ cả nhóm Kisaki được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩？　っていうか……達、って？」
2863 = "「Đàn chị Kisaki? Mà khoan……nhóm, là sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲に声をかけるとき――元忠氏と浦上さんにも\n会議参加を願えないかを稀咲から聞いて貰えないかと」
2354 = "「Khi rủ Kisaki——em nhờ Kisaki hỏi thử xem ông Mototada và ông Uragami\ncó thể tham gia cuộc họp được không.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
2311 = "「A——」"
# monologue
# JP: ぽかんと、大きく開いた口。
3630 = "Cái miệng há hốc ra vì ngạc nhiên."
# monologue
# JP: それを日々姫はきゅっと閉じ、\n力強い目で僕を見、頷く。
3689 = "Hibiki mím chặt miệng lại,\nnhìn tôi bằng ánh mắt mạnh mẽ, và gật đầu."
# 【日々姫】
# display as 日日姬
# JP: 「――わかった。\nにぃにがそうしたいなら、誘ってみるけん」
1528 = "「——Em hiểu rồi.\nNếu anh hai muốn vậy, em sẽ thử rủ xem sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2918 = "「Cảm ơn em.」"
# monologue
# JP: ならば僕からは真闇姉と蓑笠老人、赤井宮司に――\nそれにもちろん、登呂流湯のご主人も誘ってみよう。
3919 = "Vậy thì từ phía tôi, tôi sẽ rủ chị Mayami, ông Minokasa, đền chủ Akai——\nvà tất nhiên, cả chủ nhân nhà tắm Tororyu-yu nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
2417 = "「Tốt!」"
# monologue
# JP: （ざばあっ！）
3974 = "（Rào!）"
# monologue
# JP: 動き出しの、いや、再始動の今。\n――恐らく今しか、チャンスはない。
3459 = "Lúc bắt đầu chuyển động, không, lúc khởi động lại như bây giờ.\n——Có lẽ chỉ có bây giờ mới là cơ hội."
# monologue
# JP: エアクラ誘致、その一点で白と黒とを分け合うことない、\nオール御一夜で協力し合える、その体制を作るには。
3481 = "Để tạo ra một thể chế mà tất cả Ohimitera có thể hợp tác với nhau,\nchứ không phân biệt trắng đen chỉ vì vấn đề thu hút nhà máy Aircra."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は先にあがらせてもらう。\nみなはゆっくり、今日の疲れを流していってくれ」
2601 = "「Tôi xin phép lên trước đây.\nMọi người cứ thong thả ngâm mình, xua tan đi sự mệt mỏi của ngày hôm nay nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、にぃに！？　私もあがるとっ！」
2336 = "「A, anh hai!? Em cũng lên đây!」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。\nわたくしもこれ以上は湯あたりしてしまいそうです」
3062 = "「Ngài Soutetsu.\nTôi mà ngâm thêm nữa chắc sẽ bị say nước nóng mất.」"
# 【ポーレット】
# display as 波萊特
# JP: 「疲れ、もともとそれほどじゃないですし」
2630 = "「Sự mệt mỏi, vốn dĩ cũng không đến mức đó mà.」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレット、もうあがるですかぁ？\nそれなら、れいなもあがりますよぉ」
2787 = "「Chị Paulette, chị lên rồi sao?\nVậy thì, Reina cũng lên nha~」"
# 【ふかみ】
# display as 深美
# JP: 「わたし！　わたしもあがります。\nあの……えと――宿題、とか。あるです。し」
2986 = "「Em! Em cũng lên đây.\nÀ……ờm——bài tập về nhà, các thứ. Vẫn còn. Ạ.」"
# 【凪】
# display as 凪
# JP: 「みんなあがると？　それなら凪さま！\nこのひろーか湯船をひとりじめばーい！」
2395 = "「Mọi người lên hết à? Vậy thì Nagi đại nhân!\nSẽ độc chiếm cái bồn tắm rộng rãiiii này đây!」"
# monologue
# JP: 凪を除いた全員が、ぞろぞろ風呂から――
3931 = "Tất cả mọi người ngoại trừ Nagi, lần lượt ra khỏi bồn tắm——"
# 【凪】
# display as 凪
# JP: 「やっぱり一人はさみしかとばーい！！」
2983 = "「Quả nhiên một mình thì buồn tẻ quá đi mất!!」"
# monologue
# JP: 訂正、凪もだ。\n全員が風呂から上がろうとする。
3264 = "Đính chính, cả Nagi nữa.\nTất cả mọi người đều chuẩn bị ra khỏi bồn tắm."
# monologue
# JP: （だが――ひとまずは一人で考えねばな。\nそうせねば、皆のフラットな意見を聞き損ねてしまう）
3963 = "（Nhưng mà——trước mắt phải tự mình suy nghĩ đã.\nNếu không làm vậy, sẽ bỏ lỡ mất những ý kiến khách quan của mọi người.）"
# monologue
# JP: 幸いにして、資料は文字通り、山のようにある。
3485 = "May mắn thay, tài liệu đúng nghĩa đen là chất cao như núi."
# monologue
# JP: （不出来でも、不十分でも構わない。\nとにかく、たたき台を作り、提案するんだ）
3979 = "（Dù không hoàn hảo, dù không đầy đủ cũng không sao.\nDù sao thì, cũng phải tạo ra một bản nháp, và đưa ra đề xuất.）"
# monologue
# JP: 御一夜が積み重ねてきた歴史を、失敗を整頓し、\n僕が見てきた、教えてもらった現状を加味して――
3577 = "Sắp xếp lại lịch sử mà Ohimitera đã tích lũy, những thất bại đã trải qua,\nthêm vào đó là hiện trạng mà tôi đã nhìn thấy, đã được chỉ dạy——"
# monologue
# JP: （そうして、小さくとも築くのだ）
3983 = "（Và rồi, dù nhỏ bé nhưng vẫn sẽ xây dựng nên.）"
# monologue
# JP: 御一夜復興のために一丸となる。\nオール御一夜――その体制の、[いしづえ]礎を。
3648 = "Đoàn kết thành một khối vì sự phục hưng của Ohimitera.\nAll Ohimitera——nền tảng của thể chế đó."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。旧帝鉄[ゆのい,1]湯医線関係の書籍と資料とは、\nこの程度かと存じます」
3061 = "「Ngài Soutetsu. Sách và tài liệu liên quan đến tuyến Yunoi của Teitetsu cũ,\ntôi nghĩ chỉ có chừng này thôi ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「御一夜の郷土史関係の本とか、\nここに置いておくんでよかと？」
2277 = "「Sách liên quan đến lịch sử địa phương của Ohimitera,\nđể ở đây là được đúng không?」"
# 【真闇】
# display as 真闇
# JP: 「エアクラ関係の資料ば、あんまり多くなかったけん。\nおねえちゃんの私物も、貸したげるねぇ」
2279 = "「Tài liệu liên quan đến Aircra thì không có nhiều lắm.\nChị sẽ cho mượn cả đồ cá nhân của chị nữa nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまない、みんな。ありがとう」
3085 = "「Xin lỗi vì đã làm phiền mọi người. Cảm ơn nhé.」"
# monologue
# JP: 小山になった資料群を見れば、\nあらためて僕にも理解できる。
3720 = "Nhìn vào đống tài liệu chất thành núi nhỏ,\ntôi mới có thể hiểu được một lần nữa."
# monologue
# JP: 真闇姉が、日々姫が、ハチロクがいったとおりに、\n一人でなら、資料探しで夜が終わってしまったことを。
3740 = "Đúng như lời chị Mayami, Hibiki, và Hachiroku đã nói,\nnếu chỉ có một mình, thì cả đêm nay sẽ chỉ dành cho việc tìm kiếm tài liệu mất."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、もう大丈夫だ。ここからは、この資料群を」
2459 = "「Nhưng mà, không sao rồi. Từ đây, đống tài liệu này sẽ」"
# 【真闇】
# display as 真闇
# JP: 「一人でぜぇんぶ読みこなせると？\nそぎゃんことしとったら、一日じゃまるで足りんとよ？」
2110 = "「Một mình em có thể đọc hết toàn bộ sao?\nLàm thế thì một ngày làm sao mà đủ được?」"
# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんが――\n読むことまでは、さすがに手伝ってもらえんだろう」
2250 = "「Có thể là vậy——\nnhưng việc đọc thì, quả thực không thể nhờ mọi người giúp được rồi.」"
# monologue
# JP: 言った瞬間、日々姫がはい！　と手を挙げる。
3528 = "Ngay khoảnh khắc tôi vừa dứt lời, Hibiki giơ tay lên và nói “Dạ!”."
# 【日々姫】
# display as 日日姬
# JP: 「レジュメ！　まとめ書きなら作れるけん！\nにぃにが指示してくれたら、その視点で」
2236 = "「Tóm tắt! Nếu là viết tóm tắt thì em làm được!\nNếu anh hai chỉ đạo, em sẽ làm theo góc nhìn đó.」"
# 【ハチロク】
# display as 八六
# JP: 「その方法がよろしいかと、わたくしも思います。\n情報整理は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の得意とするところです」
2559 = "「Tôi cũng nghĩ phương pháp đó rất tốt.\nSắp xếp thông tin là sở trường của \\x%lレイルロオド;#00ffc040;Railord%l;#; mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……好意は、とてもありがたい。\nが――」
1602 = "「……Lòng tốt của mọi người, tôi rất biết ơn.\nNhưng mà——」"
# 【真闇】
# display as 真闇
# JP: 「が？」
2249 = "「Nhưng mà?」"
# monologue
# JP: わがままだとはわかっている。
3564 = "Tôi biết là mình đang ích kỷ."
# monologue
# JP: それゆえに、喉にこもった僕の思いを、\n真闇姉のまなざしと声とが、引き出してくれる。
3804 = "Chính vì thế, suy nghĩ đang mắc nghẹn trong cổ họng tôi,\nđã được ánh mắt và giọng nói của chị Mayami kéo ra."
# 【双鉄】
# display as 雙鐵
# JP: 「……まとめとなると、まとめた者の視点が混じろう。\nしかし僕は。今回ばかりは、一人で考えてみたいのだ」
1583 = "「……Khi tóm tắt, góc nhìn của người tóm tắt sẽ bị trộn lẫn vào.\nNhưng tôi thì. Chỉ riêng lần này, tôi muốn tự mình suy nghĩ.」"
# 【ハチロク】
# display as 八六
# JP: 「一人で――で、ございますか？」
2519 = "「Một mình——sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。僕が作りたいのは、各々の利害を超えた、\nいわば、オール御一夜の体制だ」
2349 = "「Ừm. Thứ tôi muốn tạo ra là một thể chế vượt qua lợi ích của từng cá nhân,\ncó thể gọi là thể chế All Ohimitera.」"
# 【真闇】
# display as 真闇
# JP: 「いま、ものすごぉく小規模だけど、\nここに出来とぉのみたいな？」
2115 = "「Giống như cái đang có ở đây,\ndù quy mô hiện tại cực kỳ nhỏ bé sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2702 = "「Đúng vậy——」"
# monologue
# JP: 言われて、そうだなと気付かされる。
3752 = "Nghe nói vậy, tôi mới nhận ra đúng là thế thật."
# monologue
# JP: エアクラ工場誘致賛成の日々姫。反対の真闇姉。\n究極的には、鉄道復権だけが望みのハチロク――
3699 = "Hibiki tán thành việc thu hút nhà máy Aircra. Chị Mayami thì phản đối.\nCuối cùng, Hachiroku chỉ mong muốn sự phục hưng của đường sắt——"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、だ。が、この協力体制とて、\nいざ工場誘致という話題となれば、壊れてしまう」
2845 = "「Quả thực là vậy. Nhưng mà, ngay cả thể chế hợp tác này,\nmột khi nhắc đến chủ đề thu hút nhà máy, cũng sẽ sụp đổ mất.」"
# 【日々姫】
# display as 日日姬
# JP: 「そいば嫌やけん、にぃにになんとかして欲しかとよ。\nにぃになら、そぎゃんとしてくれるって、思うけん」
2547 = "「Vì không thích như vậy, nên em mới muốn anh hai làm gì đó.\nVì em nghĩ, nếu là anh hai thì sẽ làm được như thế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2305 = "「唔」" 
# monologue
# JP: 日々姫の素直な信頼が、僕にも素直に染み通ってくる。\nそこから広がるイメージが、僕の言葉を助けてくれる。
3523 = "Sự tin tưởng chân thành của Hibiki, cũng nhẹ nhàng thấm vào tôi.\nHình ảnh mở rộng từ đó, đã giúp tôi tìm được lời để nói."
# 【双鉄】
# display as 雙鐵
# JP: 「そうするためには、\n色を混じえぬことが必要かと思うのだ」
2751 = "「Để làm được điều đó,\ntôi nghĩ cần phải không để lẫn lộn màu sắc.」"
# 【日々姫】
# display as 日日姬
# JP: 「色？」
3071 = "「Màu sắc?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。オール御一夜体制を築くための、土台。\nその素案は、誰の色を交えてもきっと、成り立たぬ」
2366 = "「Ừm. Nền tảng để xây dựng thể chế All Ohimitera.\nBản nháp đó, nếu pha trộn màu sắc của bất kỳ ai thì chắc chắn, sẽ không thành lập được.」"
# monologue
# JP: あ、と小さなハチロクの声。
3356 = "“A”, tiếng kêu khe khẽ của Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「色――とは。つまり、立場、意見。あるいは、\n目的といったもののことでございましょうか？」
3070 = "「Màu sắc——nghĩa là. Lập trường, ý kiến. Hoặc là,\nnhững thứ như mục đích sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。土台が色づいていては、それぞれの色を、\n濁らせず乗せてもらうことは、難しくなってしまおう」
2345 = "「Ừm. Nếu nền tảng đã có màu, thì việc đặt từng màu sắc lên,\nmà không làm chúng vẩn đục, sẽ trở nên rất khó khăn.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー。\n黄色か紙に青ばぬったら、緑がかっちゃうみたいな？」
2316 = "「A.\nGiống như bôi màu xanh dương lên giấy màu vàng thì sẽ ngả sang màu xanh lá ấy hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。ゆえ、オール御一夜を描くためには、\n土台が真っ白であることが必須となるかと思うのだ」
2762 = "「Đúng là vậy. Do đó, để vẽ nên bức tranh All Ohimitera,\ntôi nghĩ việc nền tảng phải hoàn toàn trắng tinh là điều bắt buộc.」"
# 【真闇】
# display as 真闇
# JP: 「そいやけん、みんなで作るまとめには、\nそれぞれの色が混じりそうで――怖かと？」
2448 = "「Vậy nên, em sợ rằng bản tóm tắt do mọi người cùng làm,\nsẽ bị trộn lẫn màu sắc của mỗi người——phải không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「怖いというのは、少し――」
2895 = "「Sợ thì, có hơi——」"
# monologue
# JP: 違う、といいかけ、\nけれども続きを、喉から出せなくなってしまう。
3530 = "Định nói là không phải,\nnhưng phần tiếp theo, lại không thể thốt ra khỏi cổ họng."
# 【双鉄】
# display as 雙鐵
# JP: 「いや……。なるほど、僕は怖いのか」
2047 = "「Không……. Ra là vậy, tôi đang sợ sao.」"
# monologue
# JP: 誰かの望みを、使命を果たす。\nそうして誰かの役に立つ――それが、僕の贖罪だった。
3637 = "Thực hiện mong muốn, sứ mệnh của ai đó.\nVà như vậy trở nên có ích cho ai đó——đó là, sự chuộc tội của tôi."
# monologue
# JP: けれど今、僕が為そうと欲しているのは、\n誰の望みも混じえない――正反対のことなのだから。
3411 = "Nhưng bây giờ, điều tôi muốn làm là,\nkhông để lẫn lộn mong muốn của bất kỳ ai——một điều hoàn toàn trái ngược."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。怖い。決してしくじれないことで、\nその上に慣れぬ挑戦であるが故、神経質になっている」
2441 = "「Đúng vậy. Tôi sợ. Vì đây là việc tuyệt đối không được thất bại,\nhơn nữa lại là một thử thách không quen thuộc, nên tôi đang trở nên lo lắng.」"
# 【真闇】
# display as ３人
# JP: 「ほんなん」「そんなの」\n「そのようなこと」
2759 = "「Làm gì có」「Chuyện đó thì」\n「Những chuyện như vậy」"
# monologue
# JP: 真闇姉、日々姫、ハチロク――\n三者の間で、視線が行き交う。
3738 = "Chị Mayami, Hibiki, Hachiroku——\nGiữa ba người, ánh mắt giao nhau."
# 【真闇】
# display as 真闇
# JP: 「……ほんなん、少しも気にせんでも、\n双ちゃん、ふだんからできとーよ？」
1576 = "「……Chuyện đó, không cần bận tâm chút nào đâu,\nSou-chan, bình thường em vẫn làm được mà?」"
# monologue
# JP: 真闇姉がそう切り出せば、\n穏やかな声が折り重ねられる。
3747 = "Khi chị Mayami mở lời như vậy,\nnhững giọng nói ôn hòa cũng lần lượt vang lên."
# 【日々姫】
# display as 日日姬
# JP: 「私もそう思います。\n兄さんは、普段からみんなの意見を綺麗に混ぜてます」
2566 = "「Em cũng nghĩ vậy.\nAnh trai, bình thường vẫn luôn kết hợp ý kiến của mọi người rất tuyệt mà.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様の公平は、誰の意見も容れぬ公平ではなく、\n全ての意見を容れての公平と、わたくしも感じます」
2563 = "「Sự công bằng của ngài Soutetsu, không phải là sự công bằng không chấp nhận ý kiến của ai,\nmà là sự công bằng chấp nhận mọi ý kiến, tôi cũng cảm thấy như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「公平……ああ。言われてみれば――\n確かに、そうであるのかもしれん」
2165 = "「Công bằng……A. Nghe mọi người nói vậy thì——\nQuả thực, có lẽ là như vậy.」"
# monologue
# JP: なぜならそこには、僕の望みがなかったからだ。
3425 = "Bởi vì ở đó, không có mong muốn của tôi."
# monologue
# JP: 僕自身の色が無いゆえに、\nどんな色でも、きっと濁らせず混色できた。
3426 = "Bởi vì bản thân tôi không có màu sắc,\nnên bất kỳ màu sắc nào, chắc chắn cũng có thể pha trộn mà không bị vẩn đục."
# 【双鉄】
# display as 雙鐵
# JP: 「いや……そうか。今回の案件は、僕自身が望み――\nゆえに、すでに僕の色が滲んでいるのか」
2339 = "「Không……ra là vậy. Vụ việc lần này, là do chính bản thân tôi mong muốn——\nDo đó, màu sắc của tôi đã thấm vào rồi sao.」"
# monologue
# JP: 理解に困惑させられる。\nならば一体どうすれば――
3568 = "Tôi cảm thấy bối rối trong việc thấu hiểu.\nNếu vậy thì rốt cuộc phải làm sao——"
# 【ハチロク】
# display as 八六
# JP: 「それで、よろしいのではないかと思います」
2634 = "「Như vậy, chẳng phải là rất tốt sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それでよい――とは」
2975 = "「Như vậy là tốt——nghĩa là sao?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、レールなのですから。\n方向が定まっていて、当然なのです」
3058 = "「Bởi vì ngài Soutetsu, là đường ray mà.\nViệc phương hướng đã được định sẵn, là điều đương nhiên.」"
# monologue
# JP: 言葉の意味が、よくわからない。\n確かに、名こそは双鉄だけれど――
3518 = "Tôi không hiểu rõ ý nghĩa của câu nói đó.\nĐúng là, tên tôi có chữ Soutetsu (đường ray đôi) thật, nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が……レール？」
2622 = "「Tôi là……đường ray?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄様は、路を示される方なのです。\nその上をどう走るかは、わたくしたち、機関車の仕事」
2765 = "「Vâng. Ngài Soutetsu, là người chỉ ra con đường.\nViệc chạy trên đó như thế nào, là công việc của chúng tôi, những đầu máy xe lửa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[みち]路――」
2938 = "「Con đường——」"
# monologue
# JP: 瞬間、こころがズキリと痛む。\nかつての傷が、まだ生々しい熱を発する。
3794 = "Trong khoảnh khắc, trái tim tôi nhói đau.\nVết thương thuở xưa, vẫn còn tỏa ra hơi nóng sống động."
# monologue
# JP: 僕は路子を救えなかった。その路を守ってやれなかった。\nけれども、きっと――だからこそ――
3918 = "Tôi đã không thể cứu được Michiko. Đã không thể bảo vệ con đường đó.\nNhưng mà, chắc chắn——chính vì thế——"
# 【日々姫】
# display as 日日姬
# JP: 「よね！　にぃにが帰ってきてくれんかったら、\nねぇねから、わたしずーっと逃げ回っとったと思うし」
2767 = "「Đúng vậy! Nếu anh hai không trở về,\nthì em nghĩ mình vẫn sẽ mãi trốn tránh chị hai mất.」"
# 【真闇】
# display as 真闇
# JP: 「あー、ゆーたらピリピリしとったもんねぇ。\n双ちゃんがおらんかった時分の、ひーちゃん」
2321 = "「A, nhắc mới nhớ lúc đó căng thẳng lắm nhỉ.\nBé Hi, vào cái thời điểm mà Sou-chan không có ở đây ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！　ねぇねぇ～っ」
2912 = "「Khoan đã! Chị hai~」"
# monologue
# JP: 優しい声が、思い出させてくれる。僕が重ねてきたことを。\n日々姫に、ハチロクに、ポーレットに、ふかみに。
3447 = "Những giọng nói dịu dàng, đã gợi nhớ lại cho tôi. Những điều mà tôi đã tích lũy.\nCho Hibiki, cho Hachiroku, cho Paulette, cho Fukami."
# monologue
# JP: 望みがあり、けれどもどう果たせばいいかが判らない――\nそうしたことのいくつかに、なるほど、確かに路は示せた。
3448 = "Có mong muốn, nhưng lại không biết phải làm thế nào để thực hiện——\nTrong một vài trường hợp như vậy, quả thực, tôi đã chỉ ra được con đường."
# 【双鉄】
# display as 雙鐵
# JP: 「……あるいはそれが、僕の色。僕の本質なのかもしれん。\nだとしても、正しい路を示せぬのであれば――」
1601 = "「……Hoặc có lẽ đó là, màu sắc của tôi. Là bản chất của tôi.\nDù vậy, nếu không thể chỉ ra con đường đúng đắn thì——」"
# 【真闇】
# display as 真闇
# JP: 「誰もにとっての“正しい”なんて、\nこの世にあるわけなかとよ？　双ちゃん」
2447 = "「Làm gì có cái gọi là “đúng đắn” đối với tất cả mọi người,\ntrên cõi đời này chứ? Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2328 = "「Mà phong khí đó, bây giờ có lẽ cũng chỉ là chuyện xưa cũ rồi.\nNhưng mà……ra là vậy, kết nối với Đường sắt Mikan sao.」"
# monologue
# JP: 困惑の先、定め直そうとした目標を、\n真闇姉は、ただ一言で粉々に砕いてしまう。
3537 = "Cái gật đầu của đền chủ Akai trong khi vẫn đang nói đỡ cho Kagoshima,\nkhông lọt qua khỏi mắt Houshou Kisaki."
# 【真闇】
# display as 真闇
# JP: 「利害に関する“正しい”は、\n自分の利益を、望むだけ確保することやけん」
2385 = "「Việc kết nối đường ray với Đường sắt Mikan,\ncó lợi ích lớn đến mức đền chủ Akai cũng phải đồng tình sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ……」
2322 = "「Tôi nghĩ là có——nhưng đó là kiến thức của một kẻ làm đường sắt già cỗi.\nNhững thứ mới nhất, chẳng phải sẽ có cậu Soutetsu bổ sung sao?」"
# monologue
# JP: そこまで言ってもらえて、落ち着く。\n真闇姉のいっていることは、ごくごく当然の理屈だ。
3749 = "Ra là vậy. Đền chủ quả nhiên là người mà Kisaki cũng phải kiêng nể.\nÔng ấy đã khéo léo kết nối câu chuyện, và đưa nó trở lại với tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、確かにだ。\n全員の欲求を同時に、完全に満たすことなど不可能だ」
2123 = "「Đúng như đền chủ Akai đã nói,\nviệc \\x%l接続;#00ffc040;kết nối chuyển tàu%l;#; với Đường sắt Mikan, mang một ý nghĩa vô cùng to lớn.」"
# 【真闇】
# display as 真闇
# JP: 「そいでも、調和は生めるけん」
2064 = "Tôi chỉ vào Yatsushiro trên bản đồ trên tấm bảng của Hibiki."
# monologue
# JP: 真闇姉は一升瓶を取り出そうとし――\nけれどもすぐに、蒸気ラムネの瓶へと持ち変える。
3742 = "「Yatsushiro là một thành phố cảng lớn. Việc sở hữu tuyến đường ray kết nối với cảng,\nsẽ bổ sung cho điểm yếu của Aircra.」"
# 【真闇】
# display as 真闇
# JP: 「こんラムネが、御一夜市の環境保持。\nで、こっちの――そうね、醤油が、商業振興」
2973 = "「Là vấn đề vận chuyển các vật thể siêu nặng nhỉ? Điều đó, quả thực,\nnếu có nhu cầu thì sẽ là một lợi ích rất lớn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「醤油とラムネか――\n全くもって相容れんな」
3033 = "Nhu cầu, có thể tạo ra được. Không, nó sẽ tự nhiên phát sinh.\nChính vì có niềm tin đó, nên tôi mới cố tình không trả lời mà tiếp tục câu chuyện."
# 【真闇】
# display as 真闇
# JP: 「そのまま混ぜたらあたりばキツかね。\nばってん――」
2821 = "「Về phía Đường sắt Mikan, việc phục hồi tuyến đường này cũng sẽ mang lại\nlợi ích to lớn. Đầu tiên, đơn giản là kích thích nhu cầu du lịch.」"
# monologue
# JP: いって、真闇姉は台所へと。\nそしてすぐ、二つの瓶と計量スプーンを持ってくる。
3592 = "「Là chuyện lúc nãy chị Paulette đã nói, đúng không ạ?」"
# 【真闇】
# display as 真闇
# JP: 「まずラムネ。濃縮レモン、ジンジャーシロップ。\n軽くステアして、それからお醤油」
2146 = "「Ừm. Dọc theo tuyến Đường sắt Mikan——phong cảnh nhìn từ cửa sổ tàu\nlúc hoàng hôn trên biển Yatsushiro, nghe nói được mệnh danh là đẹp nhất Hinomoto đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
2372 = "「Đẹp nhất Hinomoto! Tuyệt quá đi!\nNagi đại nhân, nếu vậy thì muốn đi xem thử quá đi!!」"
# monologue
# JP: 醤油が、底に沈んでいく。
3922 = "「Tuyến đường đi từ Ohimitera xuyên sang phía Hayato.\nTuyến này cũng đã bị bãi bỏ rồi, nhưng phong cảnh nhìn từ cửa sổ tàu gần ga Okoba của tuyến Hisatsu cũng」"
# monologue
# JP: “むらさき”という別名をなるほどと思わせられる、\n濃い紫のグラデーションが、思いもかけず美しい。
3506 = "「Vâng, nghe nói nó được mệnh danh là một trong ba cảnh sắc nhìn từ cửa sổ tàu đẹp nhất Hinomoto.\nTrong tương lai, nếu tuyến Hisatsu cũng được phục hồi, thì các nguồn tài nguyên sẽ càng được liên kết chặt chẽ hơn.」"
# 【真闇】
# display as 真闇
# JP: 「飲んでみて？」
2124 = "「Cảnh đẹp nhất Hinomoto, và một trong ba cảnh sắc nhìn từ cửa sổ tàu đẹp nhất Hinomoto.\n——Nếu cả hai thứ đó được kết nối bằng một chuyến tàu, thì tuyệt quá. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2353 = "「嗯」" 
# monologue
# JP: 真闇姉が差し出すグラスだ。\nいささかのためらいも感じず飲める。
3905 = "「Nhưng mà, đó là chuyện của 『trong tương lai』, 『nếu liên kết được』 đúng không?\nỞ giai đoạn chưa thực hiện được điều đó thì làm sao có thể kỳ vọng vào lượng người sử dụng được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これは――旨いな。\n和風ジンジャーエールといった趣だ」
2972 = "「Không, hoàn toàn có thể kỳ vọng. Bởi vì giữa Sendai - Yatsushiro,\nkhông có cái gọi là địa điểm du lịch suối nước nóng giống như Ohimitera.」"
# 【日々姫】
# display as 日日姬
# JP: 「まっこと！？　にぃに、わたしもよかと？」
2824 = "「Ngược lại, Ohimitera thì tất nhiên là không có biển rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2353 = "「嗯」" 
# monologue
# JP: グラスを渡せば、日々姫もこくりと一口飲んで。\nそうしてほおっと、幸せそうに頬を赤らめる。
3552 = "「Nếu vậy thì dùng Aircra là được chứ gì. Dù là biển hay suối nước nóng,\ncũng không bị ràng buộc bởi đường ray, đi đâu mà chẳng được.」"
# 【日々姫】
# display as 日日姬
# JP: 「甘か――ばってん、ちょっぴり大人の味ばする。\nただのラムネより、わたしの口には美味しかと」
2412 = "「『Đi đâu cũng được』, rốt cuộc,\ncũng làm nổi bật lên cả lựa chọn 『không đi đâu cả』.」"
# 【真闇】
# display as 真闇
# JP: 「濁りば恐れず、さらに、足す。\nそぎゃんとして生まれる調和も、確かにあるけん」
2403 = "「Hừm?」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんと！　まっことそぎゃんとよ！」
2766 = "Kisaki gật đầu.\nChỉ một chút thôi, có vẻ thận trọng."
# monologue
# JP: なにかのスイッチが入ったかのように、\n日々姫は、スケッチブックを大きく広げる。
3620 = "「Quả thực, sự mệt mỏi khi phải lựa chọn do quá tải thông tin\nđang dần trở nên rõ rệt như một xu hướng của xã hội.」"
# 【日々姫】
# display as 日日姬
# JP: 「意見も、きっとおんなじで。\nだから――色じゃなくって、光」
2533 = "Những điều nằm trong các tài liệu mà chúng tôi có thể tra cứu được trong một đêm.\nĐúng như dự đoán——đương nhiên, Kisaki đã nắm bắt được."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかり？」
2147 = "「Chính vì vậy mới dẫn đến sự cực đoan hóa của các trào lưu. Hễ ai đó cho là tốt,\nthì người người nhà nhà đổ xô vào——A.」"
# 【日々姫】
# display as 日日姬
# JP: 「色は、絵の具は、たくさんたくさん重ねると、\nどんどんどんどん、黒に近づいていっちゃうけど」
3069 = "「Mục tiêu là biến bản thân đường sắt thành một trào lưu, và làm cho nó bén rễ vững chắc.\nKhông phải là 『phương tiện giao thông bất tiện』 mà là 『phương tiện mang lại niềm vui cho chuyến đi』.」"
# monologue
# JP: 日々姫はアクリル絵具を溶いて、\n僕の理解を助けてくれる。
3623 = "「Đường sắt, với tư cách là một công cụ làm tăng thêm niềm vui cho chuyến du lịch.」"
# monologue
# JP: 赤、青、黄――単色ではそれぞれに鮮やかな色が、\nけれど重なりを増すごとに、確かに黒に近づいていく。
3798 = "「Định vị tuyến đường sắt như một cuốn catalogue, và tên ga là những sản phẩm được đăng trên đó.\nLàm rõ hệ giá trị đó, và mang lại ý nghĩa đặc trưng chỉ có ở đường sắt.」"
# 【日々姫】
# display as 日日姬
# JP: 「ばってん、光は――光線は、\n混ぜれば、白に近づいてくけん！！」
2246 = "「……Tuyến đường sắt là catalogue. Ga là sản phẩm du lịch sao.\nCái đó——ừm, về mặt cá nhân thì, cũng có chút thú vị đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2311 = "「啊——」" 
# monologue
# JP: まばゆい、白の、ひかりのイメージ。\n日々姫が与えてくれたイメージ。
3635 = "「Cho chạy chuyến tàu du lịch mới làm nổi bật hình ảnh catalogue đó,\nvà khẳng định rõ ràng rằng bản thân việc đi tàu chính là niềm vui của chuyến đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「意見は、ひかりか」
2534 = "「Nghĩ ra chuyện hay rồi này!!!」"
# monologue
# JP: それが、迷いを切り裂いていく。
3455 = "Nagi giơ tay lên. Chiếc ghế phát ra tiếng lạch cạch."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――僕が間違っていた」
2186 = "「Chuyện hay là, chuyện gì vậy? Nagi.」"
# monologue
# JP: 全員の意見を尊重しようと望みすぎ、\n全ての意見を、排除しようとしてしまっていた。
3540 = "「Tên của tuyến đường sắt đó! Tuyến đường nối Ohimitera và Yatsushiro,\nsẽ đặt tên là 『Ohimitera Onsen (Ôn Tuyến)』!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「全ての意見を尊重しようと望むばかりに、\n全ての意見を、排除しようとしていたのだな」
2606 = "「Tuyến chính Ohimitera?」"
# monologue
# JP: 意見がひかりであるのなら、\n閉ざしてしまえば、暗闇から動けなくなるというのに。
3306 = "「Không phải là Honsen (Bản Tuyến) mà là Onsen (Ôn Tuyến)!\nLà chơi chữ giữa chữ 'sen' trong suối nước nóng (onsen) và chữ 'sen' trong đường sắt (senro) đấy!!」"
# monologue
# JP: だから僕の目の前の、\nそれぞれ輝く、まばゆいひかりに目を向ける。
3583 = "「Waaa, nếu vậy thì cái tên suối nước nóng Ohimitera,\nchắc chắn, mọi người sẽ biết đến nhiều hơn đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の、真闇姉の、ハチロクの――\nそれぞれの意見・要望を、まずは調和させたい」
2618 = "「Thú vị đấy nhưng……quả thực, cũng phải xem xét ý định của các chính quyền địa phương dọc tuyến đường nữa.\nMột cái tên mang đậm tính lôi kéo lợi ích địa phương như vậy thì e là hơi khó.」"
# monologue
# JP: 今この部屋にみちている、\nこれほどまぶしく、僕を照らしてくれるひかりに。
3576 = "「Nhưng mà, em nghĩ là có thể đi theo hướng đó đấy.\nVí dụ như, đặt một biệt danh kiểu như “Tuyến Hoàng hôn - Hơi nước nóng” chẳng hạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕ら全員が是とする素案を作れなければ、論外だ。\n宝生親子に、おそらく見向きもされんだろう」
2504 = "「Nếu làm được như vậy, trong các lựa chọn về điểm đến du lịch,\nOhimitera, và biển Yatsushiro, sẽ luôn được đưa vào.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、どうぞ双鉄様。\nわたくしに、なんなりとお命じ下さい」
2668 = "「Nhưng mà nhé? Giả sử các anh làm được như vậy đi chăng nữa.」"
# monologue
# JP: しず、とハチロクが頭を下げる。
3372 = "Nói rồi, cô ấy im lặng.\nĐến mức khiến người ta phải sốt ruột."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様のレールの上に、無数のひかりを走らせる。\nそうするために、わたくしでお役に立てますことを」
2231 = "Bầu không khí vừa mới ấm lên, có lẽ Kisaki,\nđang cố tình làm cho chìm xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「だな。そうするためには、お前の力が必要だ。\nそうして、日々姫、真闇姉」
2707 = "「Giả sử tất cả những người được chuyên chở bằng chuyến tàu du lịch mới đó đều nghỉ lại qua đêm.\nThì mất bao nhiêu trăm năm mới thu hồi lại được chi phí đã đầu tư đây?」"
# monologue
# JP: 頭を下げる。\nハチロクが、僕にそうしてくれたように。
3543 = "「Ở thời điểm hiện tại thì tôi chưa tính đến chuyện đó. Việc tăng lượng khách lưu trú,\ncũng chỉ là một phần rất nhỏ trong hiệu quả kinh tế có thể kỳ vọng thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「更に力を貸して欲しい。オール御一夜の礎を、\nいま、この場所で固めるために」
2793 = "「Toa xe đường sắt, là phương tiện giao thông công cộng chuyên chở số lượng lớn hành khách.\nDo đó, kiểm tra theo luật định là vô cùng nghiêm ngặt.」"
# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　いらんていわれても、\n力の押し売り、するつもりだったけん！！」
2979 = "「Chà, đó là chuyện đương nhiên rồi nhỉ.\nA, ra là vậy——」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら、おねーちゃんに聞かせて？\n双ちゃん、全体会議での目標は？」
3022 = "Nói rồi, ánh mắt của Kisaki hướng về phía Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜の経済復興を果たすための、\nオール御一夜体制を築くことだ」
2461 = "「Đó cũng là, yếu tố thúc đẩy cuộc Đại bãi bỏ các tuyến đường sắt nhỉ?」"
# 【真闇】
# display as 真闇
# JP: 「そのために、会議までの準備で必要なことは？」
3000 = "「Vâng, đúng là như vậy. Các nhà máy chế tạo toa xe có thể thông qua kiểm tra toàn diện\nlần lượt sụp đổ, nhưng gánh nặng kiểm tra thì lại không hề giảm bớt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「素案の立案。エアクラ誘致反対派も賛成派も\n参加を検討するに値する、経済復興のアイディアの」
2790 = "「Đường sắt Ohimitera thì sao? Làm thế nào để thực hiện kiểm tra đó?」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら……基礎資料を分担で作成。\n作成者からのブリーフィングを全体で共有。で、どう？」
2989 = "「Cụm nhà kho đầu máy của ga Suối nước nóng Ohimitera,\nđã nhận được giấy phép, với tư cách là cơ sở có thể tiếp nhận kiểm tra theo luật định.」"
# monologue
# JP: ただそれだけのやりとりで、\nイメージを現実に落としてもらえる。
3744 = "「Giấy phép nhận được từ thuở xa xưa, đến bây giờ vẫn còn hiệu lực đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、全員が資料作成し、その説明を行って、\n情報を共有、それを案出しに繋げるのか。よいと思う」
2190 = "「Vì vậy, ngay cả trong thời kỳ \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#; bị phong tỏa.\nChúng tôi vẫn có thể tự kiểm tra, tại \\x%l検修庫;#00ffc040;xưởng bảo dưỡng%l;#; nhỏ hơn ở phía trong.」"
# 【真闇】
# display as 真闇
# JP: 「睡眠と休息。\nしっかりとらんと、危なかね？」
2174 = "「Dù vậy, chẳng phải là không có kỹ sư sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。頭が鈍っていては良い案も出ん」
2710 = "「Vâng, vì vậy, cứ bốn năm một lần, chúng tôi lại nhờ họ phái người đến.\nCông chúa Xe điện——nhờ mối quan hệ của Đường sắt điện Hiroshima Mouri, để mời kỹ sư đến.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですので、深夜作業でも\n問題ありません。連続稼動の休止時間を確保できれば」
2620 = "「Nhờ họ phái người đến, và tiếp nhận kiểm tra sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「ブリーフィングのあとにも、二時間くらいは欲しかと。\n全体会議用の、見やすか資料とか作りたいけん」
2383 = "「Vừa nhận sự chỉ đạo từ thanh tra viên đến từ Teito,\nvừa cùng với kỹ sư, dành thời gian để vượt qua đợt kiểm tra.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2337 = "「Được chỉ đạo như vậy cơ à.」"
# monologue
# JP: 最小規模の、オール御一夜。\nそれがいきなり走り始める。
3832 = "「Vâng. Có lẽ……là vậy,\nbởi vì Aircra đã, phổ biến một cách quá sức rộng rãi rồi.」"
# monologue
# JP: なるほど、であらば――僕はレールであればいい。
3594 = "Liếc nhẹ, ánh mắt của Paulette di chuyển."
# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロクには、目次のリスト化を頼みたい。\nそれがあれば、参照の時間を大いに節約できる」
2997 = "Nơi ánh mắt cô ấy hướng đến, ông Uragami và ông Mototada,\nđang nói nhỏ to bàn luận điều gì đó rất sôi nổi."
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。単純作業となりますので、\nわたくしが知識を持たない分野のものでもこなせます」
2691 = "「Ra là vậy. Rồi sao? Chuyện đó thì liên quan như thế nào\nđến việc thu hồi chi phí đã đầu tư đây?」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉にも、すまんが、眠る前にひと仕事頼みたい。\n全体の段取りを組んでみてほしいのだが」
2656 = "「Chuyện đơn giản thôi. Bây giờ khi Nhà máy Kokura của Teitetsu cũ đã bị giải thể,\ntất cả các công ty đường sắt ở Kyushu, đều đang gặp khó khăn trong việc kiểm tra.」"
# 【真闇】
# display as 真闇
# JP: 「うん。得意分野。仕事ば、段取り八分やけんね。\nおねーちゃんに任せてよかよ」
2365 = "「Thực tế, Đường sắt Mikan mà chúng ta vừa nhắc đến lúc nãy,\ncũng đang phải chịu một khoản chi phí rất lớn cho việc kiểm tra.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は、今は早めに休んでおいてくれ。\n再終盤、日々姫にしか出来ない作業がいくことになる」
2682 = "「Đến mức đó sao? Toa xe đường sắt, có thể dùng ô tô chạy xăng\nđể vận chuyển bằng rơ-moóc đường bộ mà? Nếu vậy thì」"
# 【日々姫】
# display as 日日姬
# JP: 「わかった。大丈夫。自分の出番に寝過ごさんよう、\nしっかり休んで、備えるけん」
2694 = "「Việc kiểm tra ở Ohimitera là,\n『vừa nhận sự chỉ đạo từ thanh tra viên đến từ Teito』 mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。そうしてくれ。\n起きたあとには、頼らせてもらうぞ」
2356 = "「A——câu chuyện lúc nãy——về đặc tính vùng miền của Satsuma sao.\nĐường sắt Mikan, không muốn nhận sự chỉ đạo của Teito.」"
# 【日々姫】
# display as 日日姬
# JP: 「今よりもーっとたよってよかとよ？\n私、にぃにの妹やけん！」
2603 = "「Có lẽ là vậy.\nChuyện đó thì tôi cũng không rõ lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――っ！！！」
2338 = "「Thực tế là, Đường sắt Mikan đang tốn một khoản chi phí khổng lồ,\nđể ủy thác việc kiểm tra cho nhà máy chế tạo toa xe ở Honshu——Nagoya.」"
# monologue
# JP: （ドクンっ）
3981 = "「Là Hinosha sao. Nếu vậy thì kỹ thuật, kinh nghiệm và kỹ sư đều quá đủ.\nĐúng là một cơ sở có thể thông qua kiểm tra mà không cần nhận sự chỉ đạo nhỉ.」"
# 【路子】
# display as 路子
# JP: 「っ！！？　これダメっ！\nにげてっ！　にげてそーちゃんっ！！」
3088 = "「Tóm lại, nếu chúng ta có thể xây dựng một cơ sở có trình độ tương đương hoặc cao hơn dọc theo tuyến Yunoi,\nthì nơi đó, có thể trở thành một đơn vị nhận ủy thác với chi phí vận chuyển thấp hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
1519 = "Đúng lúc đó, tôi lật một tấm bảng lên."
# monologue
# JP: ……心強さと嬉しさに、軽く頷いたその瞬間。
1511 = "Trên bản đồ đường sắt giống hệt lúc nãy,\nđã được vẽ thêm một vài tuyến đường sắt khác."
# monologue
# JP: 死の感触も――路子が僕から離れてく、\nあのどうしようも無い絶望感も、ぶり返してくる。
3566 = "「Bởi vì có chừng này công ty đường sắt có thể trở thành đơn vị đặt hàng——\nnhững công ty đang phải chịu chi phí vận chuyển đến Honshu để tiếp nhận kiểm tra.」"
# 【日々姫】
# display as ３人
# JP: 「にぃに？」「双鉄様？」\n「双ちゃん？」
3051 = "「Hê……nhìn thế này mới thấy, bất ngờ là có rất nhiều,\ntuyến đường sắt vẫn còn sót lại ở Kyushu——」"
# monologue
# JP: ――ほんの一瞬のフラッシュバック。\nこわばったのも、ただひとときであった筈。
1488 = "Cảm nghĩ mang theo chút ngây thơ đó, chợt dừng lại giữa chừng."
# monologue
# JP: けれど、それでも気づいてくれる。\n僕の異変に皆が気づいて、不安げな顔をしてくれる。
3301 = "Giọng của Kisaki,\ntrầm xuống thành tông giọng của công việc."
# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとう、本当に心強い」
1531 = "「Thật sao? Tất cả các công ty đường sắt này, đều đang gặp khó khăn trong việc kiểm tra định kỳ,\nvà phải tốn một khoản chi phí khổng lồ?」"
# monologue
# JP: だから、笑う。\n不器用な作り笑いに見えてしまうかもしれんが。
3584 = "「Đúng vậy. Và, Đường sắt Ohimitera——\nchúng tôi, thông qua cuộc đại tu 8620 vừa qua——」"
# monologue
# JP: 言葉にとてもできぬ感謝を――\n精一杯の言葉に、笑いに、こめたくて。
3549 = "「Đã có được mối quan hệ với nhiều kỹ sư xuất sắc.\nTóm lại……có thể thiết lập một hệ thống kiểm tra thường trực sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2919 = "「Ừm. Thực tế, ngay tại thời điểm này, đã có nhiều kỹ sư\nmong muốn chuyển đến Ohimitera sinh sống.」"
# monologue
# JP: その言葉だけを繰り返す。
3532 = "「Ra là vậy……nhưng mà, dù không phục hồi tuyến đường,\nthì vẫn có thể đáp ứng được nhu cầu đó mà?」"
# monologue
# JP: 真闇姉に、日々姫に、そしてハチロクに。\n心底からの感謝をこめて――繰り返す。
3545 = "「Từ Bắc Kyushu đến Ohimitera bị núi non hiểm trở cản trở nên việc vận chuyển đường bộ rất khó khăn.\nBắt buộc phải đi đường vòng lớn, dù là hướng Đông hay hướng Tây.」"
# 【元忠】
# display as 元忠
# JP: 「復線？」
2514 = "「Việc vận chuyển toa xe đường sắt trên đất liền bằng \\x%lディーゼルトレーラー;#00ffc040;xe rơ-moóc diesel%l;#;,\nsẽ phát sinh một khoản chi phí khổng lồ, tính theo đơn vị thời gian.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。復線です。それがなれば、\n御一夜の環境保全と経済復興とは、両立します」
2769 = "Để không gây cản trở giao thông, việc vận chuyển phải tránh những giờ cao điểm,\nhơn nữa tùy từng địa điểm, còn cần phải nhờ đến sự điều tiết giao thông."
# 【稀咲】
# display as 稀咲
# JP: 「復線って――\nそんなニーズは今時どこにも無いだろう？」
2120 = "「Ra là vậy. Chỉ cần có tuyến đường sắt giữa Yatsushiro - Ohimitera,\nlà có thể cắt giảm đáng kể chi phí vận chuyển đó sao.」"
# monologue
# JP: 率直極まる稀咲の言葉に、\n元忠氏も、浦上さんも頷いている。
3332 = "「Muốn kết nối lại đường ray——tâm nguyện đó chắc chắn,\nbất kỳ nhà điều hành đường sắt nào, cũng đều có một cách mãnh liệt.」"
# monologue
# JP: 御一夜銀行サイドの三人は、\n全員が全員、この会議に出席してくれた。
3298 = "「……Chắc là vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ニーズは作り出せます。最初に復線させるのが、\n“御一夜－[やつしろ,2]八ツ城”間だからです」
3065 = "Có lẽ là từ ý thức “hành xử cho ra dáng một \\x%lレイルロオド;#00ffc040;Railord%l;#;”."
# monologue
# JP: 言葉と同時、日々姫が用意してくれていた\nパネルを示す。
3516 = "Từ miệng Hachiroku, người nãy giờ vẫn giữ im lặng và lắng nghe câu chuyện,\nnhững lời nói như bị dồn ép tuôn trào ra."
# 【凪】
# display as 凪
# JP: 「八ツ城からも、鉄道の線路走っとるばい！」
2156 = "「Kế hoạch này, tôi nghĩ sẽ trở thành một sự hậu thuẫn vững chắc——\nmang lại một danh nghĩa chính đáng cho tâm nguyện đó.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――本当。ええと……みかん鉄道？\nって、どうしてこれ――」
2319 = "「Nếu có danh nghĩa chính đáng, thì việc kêu gọi sự hợp tác từ các bên liên quan của mỗi nhà điều hành đường sắt——\ncác chính quyền địa phương và người dân dọc tuyến đường cũng sẽ dễ dàng hơn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「貨物需要と、観光需要があるからです。\nだから、鹿兒島県が主体となって廃線を阻止した」
2381 = "「Do đó, chi phí phục hồi tuyến đường có thể được phân tán và giảm bớt sao?」"
# monologue
# JP: ああ、と小さな声を出すのは、蓑笠老人だ。
3820 = "「Có khả năng đó. Trước tiên, nếu có thể biến đoạn Ohimitera - Yatsushiro thành một ví dụ thành công của việc phục hồi tuyến đường,\nthì khả năng đó sẽ tăng lên gấp hàng chục lần.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「鹿兒島が主体となったとですか。\nなら、[さつま,1]颯馬の地域性もあるかもしれんですのぉ」
3083 = "「Hừm? Ra là vậy, nhỉ……」"
# 【れいな】
# display as 玲奈
# JP: 「さつまのちいきせい、ですかぁ？」
2903 = "Lại là sự im lặng.\nMỗi khi tôi định dồn ép, Kisaki chắc chắn sẽ điều chỉnh lại nhịp độ."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「大昔から、[さつま,1]颯馬は帝都と仲の悪かと。\n中央の方針には、ともかく素直に従わん」
2904 = "「——Lúc nãy, cô Hachiroku có nói nhỉ?\nRằng 『Bất kỳ nhà điều hành đường sắt nào, cũng đều khao khát phục hồi tuyến đường』.」"
# 【赤井】
# display as 赤井
# JP: 「まぁその[きふう,1]気風も、今は昔ともなっていましょうが。\nしかし……なるほど、みかん鉄道と繋げますか」
2096 = "「他們以前就是那種脾氣。話說回來……原來如此，要和橙鐵路連在一起嗎」" 
# monologue
# JP: 鹿兒島のフォローをしつつの赤井宮司の頷きを、\n宝生稀咲は見逃さない。
3885 = "赤井宮司在一旁幫鹿兒島說了兩句好話，而寶生稀咲注意到了他最後半句。" 
# 【稀咲】
# display as 稀咲
# JP: 「みかん鉄道と線路が繋がることには、\n赤井宮司も納得されるほどのメリットが？」
2935 = "「赤井宮司認為和橙鐵路連上對我們也有好處？」" 
# 【赤井】
# display as 赤井
# JP: 「と、思いますが――古い鉄道屋の知識です。\n最新のものは、双鉄君からの補足があるのでは？」
2768 = "「沒錯，不過我只是個老鐵路人，知識可能過時了。最新的就請雙鐵先生補充吧」" 
# monologue
# JP: なるほど。宮司もまた、稀咲が一目置いているだけはある。\n話をきちんと、繋げて僕へと戻してくれた。
3266 = "不愧是宮司，一點就透。怪不得就連稀咲都認為他是個大人物。他接下話之後，又把話重新遞到了我這裡。" 
# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司がおっしゃってくださったとおり、\nみかん鉄道との\x%l接続;#00ffc040;接続%l;#;は、非常に大きな意味を持ちます」
2754 = "「正如赤井宮司所說，和橙鐵路\\x%l接続;#00ffc040;會車%l;#;對我們而言有著非比尋常的意義」" 
# monologue
# JP: 日々姫のパネルの地図の、八ツ城を示す。
3554 = "我指著日日姬的展板地圖中八代的位置。" 
# 【双鉄】
# display as 雙鐵
# JP: 「八ツ城は大きな港町です。港と繋がる線路を持つことは、\nエアクラの弱点を補完します」
2154 = "「八代是個海港城市。如果能擁有和海港連接的線路，我們就可以彌補空凝機的弱點」" 
# 【稀咲】
# display as 稀咲
# JP: 「超重量物移送の問題だね？　それは、確かに、\nニーズがあれば大きなメリットになるだろうけれど」
2116 = "「你是說空凝機不能運送大重量貨物的問題吧？的確，如果客戶有這種需求，確實會給我們帶來巨大利益」" 
# monologue
# JP: ニーズは、作れる。いいや、自然と発生してくる。\nその確信があるからこそ、敢えて答えず話をすすめる。
3940 = "需求是可以創造的，不，是會自然產生的。正因為我如此確信，所以才特地沒有直接回答，而是繼續說。" 
# 【双鉄】
# display as 雙鐵
# JP: 「みかん鉄道側にも、この復線は大きなメリットを\n生みます。まずは単純に、観光需要の刺激」
2587 = "「我們恢復廢線對橙鐵路來說也是一件好事。首先最簡單的，就是會刺激旅遊需求」" 
# 【ふかみ】
# display as 深美
# JP: 「さっき、ポーレットさんが言ってたお話、です？」
2697 = "「是剛才波萊特小姐說過的那個嗎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。みかん鉄道沿線――八ツ城海の夕暮れの\n車窓風景は、日ノ本一とも呼ばれるほどだそうだ」
2350 = "「嗯。聽說橙鐵路沿線——八代海的夕陽從車窗看過去是日本最美麗的」" 
# 【凪】
# display as 凪
# JP: 「日ノ本一！　すごかとばい！\n凪さま、それだったら見てみたかとばい！！」
2685 = "「日本最美？這可太強咧！本小姐好想去瞧瞧！」" 
# 【赤井】
# display as 赤井
# JP: 「御一夜から、[はやと,1]早戸側に抜ける路線。\nこれも廃線となりましたが、[ひさつせん,2]肥颯線[おこばえき,2]小畑駅近くの車窓も」
3054 = "「雖然也廢線了，不過從御一夜到隼人的線路，還有肥薩線大畑站附近的車窗也能欣賞到同樣水準的景色」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ええ、日ノ本三大車窓の一つと称されたそうですね。\n将来、肥颯線も復線させれば、資源は更に連携します」
2351 = "「嗯。那裡的景色可是被稱為日本三大車窗絕景之一呢。將來等肥薩線恢復以後，旅遊資源就可以加強共享了」" 
# 【ふかみ】
# display as 深美
# JP: 「日ノ本一と、日ノ本三大車窓のひとつ。\n――その両方が一つの列車で結ばれたら、すごい。です」
2687 = "「日本第一的夕陽和日本三大車窗風景之一——能坐一輛車同時享受兩種美景實在太棒了。嗯」" 
# 【稀咲】
# display as 稀咲
# JP: 「だが、『将来的に』、『連携させれば』の話だろう？\nそれが果たせぬ段階では利用者が見込めないのだから」
2103 = "「但是這些都是對未來的假設吧？現在還不能確定恢復廢線後就一定會有很多旅客吧」" 
# 【双鉄】
# display as 雙鐵
# JP: 「いや、見込める。なぜなら[せんだい,1]千内－八ツ城間には、\n御一夜のような、いわゆる温泉観光地が無いゆえに」
2071 = "「不，可以確定。因為從川內到八代的線路沒有像御一夜一樣的溫泉旅遊景點」" 
# 【ポーレット】
# display as 波萊特
# JP: 「逆に、御一夜にはもちろん海がありません」
2222 = "「反過來說，御一夜也沒有海」" 
# 【稀咲】
# display as 稀咲
# JP: 「それこそエアクラを使えばいい話だ。海でも温泉でも、\n線路に縛られないで、どこへだっていける」
3019 = "「那用空凝機不就行了嘛。用空凝機就可以不受線路束縛，不管海還是溫泉，想去哪裡都成」" 
# 【双鉄】
# display as 雙鐵
# JP: 「『どこへだっていける』は、結局、\n『どこへもいかない』という選択肢をも浮き上がらせる」
1548 = "「“哪裡都能去”反而會凸顯“哪裡都不去”的選擇」" 
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？」
2367 = "「嗯？」" 
# monologue
# JP: 稀咲が頷く。\nほんのわずかに、慎重そうに。
3806 = "聽到我這麼說，稀咲慎重地輕輕點了點頭。" 
# 【稀咲】
# display as 稀咲
# JP: 「たしかに、情報過多による選択疲れは\n社会傾向として、顕著になってきつつはあるよね」
2819 = "「的確，現代社會確實出現了訊息過多反而造成難以選擇的問題」" 
# monologue
# JP: 僕らが一晩で調べられるような資料内のこと。\n予想通りに――当然ながら、稀咲は把握してくれている。
3910 = "這是我們查了一晚上資料就知道的東西。稀咲當然也明白，這完全沒有出乎我的預料。" 
# 【稀咲】
# display as 稀咲
# JP: 「だからこそのブームの極端化。誰かがよしとしたものに、\nわれもわれもと飛びついて――ああ」
2649 = "「所以才要推動觀光熱潮極端化。只要有人去就會不停有跟風的——啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道自体をブーム化させて、定着させることを目指す。\n『不便な交通』ではなく『旅の楽しみの手段』として」
2590 = "「我們的目標就是讓鐵路本身變成一股流行熱潮，給別人的印象從“不便的交通方式”變成“享受旅遊樂趣的一種手段”」" 
# 【稀咲】
# display as 稀咲
# JP: 「旅行の楽しみを増大させるツールとしての、鉄道」
2654 = "「把鐵路從交通方式變成增加旅遊樂趣的工具」" 
# 【双鉄】
# display as 雙鐵
# JP: 「線路をカタログ、駅名はそこに載る商品と位置づける。\nその価値観を明示し、線路にならではの意味を持たせる」
2940 = "「路線就是商品目錄，每個站就是目錄上的商品。我們要把這樣的價值觀傳達給客戶，讓鐵路擁有獨特的意義」" 
# 【稀咲】
# display as 稀咲
# JP: 「……線路はカタログ。駅は観光商品か。\nそれは――うん、個人的には、ほんの少しだけ面白い」
1605 = "「……路線就是商品目錄，每個站就是目錄上的商品。這個——就我個人來說，我覺得有點意思」" 
# 【双鉄】
# display as 雙鐵
# JP: 「そのカタログイメージを際立たせる新観光列車を\n走らせて、乗車自体が旅の楽しみなのだと明示する」
2593 = "「我們要讓能展示我們價值觀的新旅遊列車跑起來，告訴大家鐵路本身就是旅遊樂趣的一環」" 
# 【凪】
# display as 凪
# JP: 「よかこと思いついたばい！！！」
2281 = "「咱有個好主意！！！」" 
# monologue
# JP: 凪の挙手。椅子がガタリと音を立てる。
3390 = "凪突然舉手，她的動作大到椅子都發出了啪嗒一聲。" 
# 【ふかみ】
# display as 深美
# JP: 「いいことって、なぁに？　凪ちゃん」
2443 = "「小凪想到什麼好主意啦？」" 
# 【凪】
# display as 凪
# JP: 「線路の名前ばい！　御一夜と八ツ城つなぐ線路ば、\n『御一夜温線』っていう名前にするばい！！」
2698 = "「是名字！御一夜到八代的線路就叫“御一夜溫線”得了！！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜本線？」
2485 = "「御一夜本線？」" 
# 【凪】
# display as 凪
# JP: 「本線じゃなくて温線ばい！\n温泉のせんと、線路のせんをかけるばい！！」
2052 = "「不是本線是溫線！把溫泉和線路合在一起！！」" 
# 【れいな】
# display as 玲奈
# JP: 「わぁぁ、それなら御一夜温泉の名前、\nみぃんながもっと、きっと、しってくれますですねぇ」
2282 = "「哇，那就能讓更多人知道御一夜溫泉的名字啦」" 
# 【双鉄】
# display as 雙鐵
# JP: 「面白いが……さすがに、他の沿線自治体の意向もある。\nそこまで地元利益誘導べったりの名前は難しかろうな」
3055 = "「雖然是不錯……可是名字也得徵求一下沿線其他自治團體的意向。這麼偏向一個地方利益的名字可能很難通過」" 
# 【日々姫】
# display as 日日姬
# JP: 「でも、そぎゃん方向はありと思うとっ――思います。\n例えば、“夕陽・湯煙線”みたいな愛称つけるとか」
2067 = "「不過，我覺得這個可以有——可以這麼辦。比如說起個像“夕陽·湯煙線”一樣的愛稱」" 
# 【ポーレット】
# display as 波萊特
# JP: 「そう出来たら、旅の目的地の選択肢に、\n御一夜と、八ツ城海とが、いっつも入るようになる」
2976 = "「這樣，旅遊目的地的選擇裡就可以隨時加入御一夜和八代海了」" 
# 【稀咲】
# display as 稀咲
# JP: 「けどね？　仮にそう出来たとしても」
2065 = "「不過，就算你們成功恢復廢線——」" 
# monologue
# JP: 言って、沈黙。\n焦れるほど。
3781 = "稀咲話說到一半停了下來，沉默長得令人心急。" 
# monologue
# JP: 温まりかけた空気を稀咲は恐らく、\n意図的に沈めようとする。
3453 = "她恐怕是故意讓快要升溫的現場氣氛降溫。" 
# 【稀咲】
# display as 稀咲
# JP: 「その新観光列車で運べる全員が宿泊したとして。\n投下したコストの回収には何百年かかるのかな？」
2453 = "「就算乘坐新旅遊列車的所有遊客都要在這裡住宿。那我們投入的投資要幾百年才能全部回收？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「現時点ではそこは計算していない。宿泊客増は、\n見込める経済効果のごく一部に過ぎんからな」
2595 = "「我們還沒計算到那麼詳細。畢竟住宿帶來的經濟效果只是一部分」" 
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？」
# 2367 = "「嗯？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道車両は、多数の旅客を運ぶ公共の交通機関だ。\n故に、法定検査は極めて厳重なものとなっている」
3045 = "「鐵路車輛是運送大量旅客的公共交通設施。所以法律規定的檢查極為嚴格」" 
# 【稀咲】
# display as 稀咲
# JP: 「まぁ、当然のことだろうね。\nああ、そうか――」
2966 = "「這也是當然的。啊，原來如此——」" 
# monologue
# JP: 言って、稀咲の瞳はポーレットを向く。
3866 = "說完，稀咲看向波萊特。" 
# 【稀咲】
# display as 稀咲
# JP: 「それも、大廃線を加速させた要因なんだね？」
2965 = "「這也是大廢線加速的重要原因吧？」" 
# 【ポーレット】
# display as 波萊特
# JP: 「はい、その通りです。全般検査を通せる車両工場が\n次々に倒れ、けれども検査負担の軽減はなかったから」
2763 = "「沒錯。能完成全套檢查的車輛工廠一個接一個倒閉，可檢查需要的花費卻一點沒少」" 
# 【稀咲】
# display as 稀咲
# JP: 「御一夜鉄道は？　どうやってその検査を？」
2496 = "「御一夜鐵路呢？是怎麼檢查的？」" 
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜温泉駅の機関庫群は、法定検査を\n受けられる設備としての、認可を得てるんです」
2490 = "「御一夜溫泉站的機車庫拿到了許可，可以進行法定檢查」" 
# 【れいな】
# display as 玲奈
# JP: 「大昔に受けた認可が、いまも生きてるんですよぉ」
2714 = "「是很久很久以前拿到的許可，現在還可以用」" 
# 【ポーレット】
# display as 波萊特
# JP: 「だから、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;が封鎖されてた時期も。\n奥のちっちゃい方の\x%l検修庫;#00ffc040;検修庫%l;#;で、自主検査できたんです」
2643 = "「所以就算\\x%l石造機関庫;#00ffc040;石製機車庫%l;#;封閉的那段時間，我們也可以用裡面小一點的\\x%l検修庫;#00ffc040;檢修庫%l;#;自行檢查」" 
# 【稀咲】
# display as 稀咲
# JP: 「だとしても、技師がいないのでは？」
2240 = "「可就算這樣，也沒有技工吧？」" 
# 【ポーレット】
# display as 波萊特
# JP: 「はい、だから、四年に一度、派遣してもらうんです。\n電車姫様――[ひろしま,1]廣島毛利電鉄さんのコネで、技師さんを」
2724 = "「是的，所以我們會每四年一次利用人脈，由廣島毛利電鐵電車公主殿下牽頭請技工來這邊」" 
# 【稀咲】
# display as 稀咲
# JP: 「派遣してもらって、検査を受ける？」
2917 = "「請技工來檢查？」" 
# 【ポーレット】
# display as 波萊特
# JP: 「帝都から来る検査官さんの指導を受けながら、\n技師さんと、時間をかけて検査をクリアしていきます」
2588 = "「我們會在帝都來的檢查官員的指導下，和技工師傅一起仔細完成檢查項目」" 
# 【稀咲】
# display as 稀咲
# JP: 「そんな指導をしてもらえるんだ」
2984 = "「還有人能進行這種指導啊」" 
# 【ポーレット】
# display as 波萊特
# JP: 「はい。多分……ですけど、\nエアクラがもう、十二分に普及を果たしているから」
2722 = "「是的，大概吧……畢竟現在空凝機已經普及得不能再普及了」" 
# monologue
# JP: ちら、とポーレットの視線が動く。
3673 = "波萊特朝旁邊瞟了一眼。" 
# monologue
# JP: 視線の先では、浦上さんと元忠氏とが、\nなにやら小声で、熱心に話し合っている。
3431 = "在她的視線前方，浦上經理和元忠先生正在熱心地小聲討論著。" 
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。で？　それが投下したコストの回収と\nどのように絡んでくるんだい？」
2189 = "「原來如此。那這和回收投資又有什麼關係？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「簡単な話だ。旧帝鉄[こくら,1]粉蔵工場が解体された今、\n九洲の全ての鉄道会社は、検査に苦労している」
2467 = "「很簡單。前帝國鐵路小倉工廠已經廢棄。現在九州所有的鐵路公司都在頭痛如何進行車輛檢查」" 
# 【赤井】
# display as 赤井
# JP: 「実際、さきほど話にでたみかん鉄道さんも、\n検査には非常に大きなコストを強いられています」
2435 = "「實際上，我們剛才說的橙鐵路那邊也因為檢查開銷巨大而頭痛」" 
# 【稀咲】
# display as 稀咲
# JP: 「それほどに？　鉄道車両は、ガソリン自動車で\nトレーラー陸送できるだろう？　なら」
2980 = "「這麼嚴重？鐵路車輛不是能用汽油引擎汽車——卡車來進行陸上運輸嗎？那怎麼還會——」" 
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜での検査は、\n『帝都の検査官さんの指導を受けながら』ですから」
2492 = "「御一夜的檢查是在“接受從帝都來的檢查官員指導下”進行的」" 
# 【稀咲】
# display as 稀咲
# JP: 「ああ――さっきの――[さつま,1]颯馬の地域性の話か。\n帝都の指導を、みかん鉄道は受けたくない」
2313 = "「啊——剛才說過薩摩那邊的人脾氣大，不願意接受帝都的指導啊」" 
# 【ポーレット】
# display as 波萊特
# JP: 「なのかもしれません。\nそこまではわたしにはわかりませんけど」
2255 = "「可能是吧。具體的我也不太清楚」" 
# 【双鉄】
# display as 雙鐵
# JP: 「事実として、みかん鉄道は莫大なコストをかけて、\n本州――名児耶の車両工場に検査を委託している」
2889 = "「而且事實上，橙鐵路的檢查都是委託本州名古屋的車輛工廠進行的，開銷巨大」" 
# 【赤井】
# display as 赤井
# JP: 「[ひのしゃ,2]日ノ車ですか。でしたら技術も経験も技師も十二分。\n指導を受けずとも、検査を通せる施設ですね、確かに」
2716 = "「是日本車輛製造嗎？那裡有足夠的技術經驗和人才，就算不用接受帝都的指導也能通過檢查」" 
# 【双鉄】
# display as 雙鐵
# JP: 「つまり湯医線沿線に、同等レベル以上の施設を作れれば、\nそこは、より移送コストの低い受託先となり得ます」
2078 = "「也就是說，如果我們在湯醫線沿線建好同水平的工廠，就能成為價格更低的承包商」" 
# monologue
# JP: いいざま、パネルを一枚めくる。
3547 = "我得意地翻過一張展板。" 
# monologue
# JP: さきほどと同じ鉄道地図には、\nいくつかの鉄道路線が、描き足されている。
3418 = "和剛才一樣的鐵路地圖上新畫了幾條鐵路路線。" 
# 【双鉄】
# display as 雙鐵
# JP: 「発注元となりうる――本州への移送コストをかけて\n検査を受けている鉄道会社が、これだけありますから」
2967 = "「這些鐵路公司都需要花費大量成本把車輛運往本州進行檢查，所以有可能成為我們招標商的鐵路公司就有這麼多」" 
# 【稀咲】
# display as 稀咲
# JP: 「へぇ……こうしてみると、案外たくさん、\n九洲内に鉄道路線は残ってる――」
2290 = "「哎……這麼一看，九州留下來的線路還不少嘛――」" 
# monologue
# JP: 無邪気ささえ感じるような感想が、途中で止まる。
3774 = "稀咲發出了一句單純的感想。" 
# monologue
# JP: 稀咲の声が、\n仕事のトーンまで低くなる。
3302 = "但她馬上就轉換到了工作模式，連聲音都低沉下來。" 
# 【稀咲】
# display as 稀咲
# JP: 「本当に？　この全ての鉄道会社が、定期検査に苦労して、\n莫大なコストをかけている？」
2827 = "「真的嗎？這些鐵路公司都為定期檢查需要巨大的開銷所苦？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そして、御一夜鉄道――\n僕らは、先般の8620の大改修を通じて――」
2718 = "「是的。而御一夜鐵路——我們之前對８６２０進行了複雜的修復工程」" 
# 【稀咲】
# display as 稀咲
# JP: 「優秀な多数の技師との人脈を得た。\nつまり……常設の検査体制を整えられる？」
2982 = "「通過這個工程，你們得到了很多優秀的技工人脈。也就是說……準備好了足以應對常規檢查的體制？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。実際、複数の技師さんが御一夜への移住を\n現時点でも希望してくださっている」
2347 = "「嗯。實際上，現在也有很多技工希望能移居到御一夜來」" 
# 【稀咲】
# display as 稀咲
# JP: 「なるほど……けれど、復線が無くとも、\nそちらの需要は満たせるのでは？」
2187 = "「原來如此……不過就算不恢復廢線，不也能滿足搬運車輛的需求嗎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「北九洲から御一夜までは山に阻まれ陸送困難だ。\n東か西か、大回りを余儀なくされる」
2469 = "「從北九州到御一夜中間有山阻隔，公路運輸很困難。選擇繞行東邊或者西邊就太繞遠了」" 
# 【ポーレット】
# display as 波萊特
# JP: 「\x%lディーゼルトレーラー;#00ffc040;ディーゼルトレーラー%l;#;による鉄道車両の陸送は、\n時間単位での、莫大なコストが発生するんです」
2890 = "「而用\\x%lディーゼルトレーラー;#00ffc040;柴油拖車%l;#;搬運鐵路車輛是根據搬運需要的時間計費的」" 
# monologue
# JP: 交通障害にならぬため、混雑時を避けての移送となる上、\n場所によっては、交通規制をお願いすることも必要になる。
3802 = "而搬運的時候還需要避開高峰時段以免阻礙交通，有的路段還需要拜託政府進行交通管制。" 
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。八ツ城－御一夜間に線路があるだけで、\nその移送コストを大幅に圧縮できるのか」
2188 = "「原來如此。只要八代和御一夜之間有鐵路就能大幅壓縮運輸成本啊」" 
# 【ハチロク】
# display as 八六
# JP: 「線路を再びつなげたい――その想いはきっと、\nどの鉄道事業者も、同じく、強く有しております」
2229 = "「只要是從事鐵路工作的人，肯定都想讓線路再次連接起來」" 
# 【稀咲】
# display as 稀咲
# JP: 「……だろうね」
1594 = "「……看得出來」" 
# monologue
# JP: “\x%lレイルロオド;#00ffc040;レイルロオド%l;#;らしく”という意識からだろう。
3369 = "八六這句話是出於“\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的本能”吧。" 
# monologue
# JP: 沈黙を守り、話を聞き続けていたハチロクの口から、\n押し出されてきたような言葉が、あふれる。
3396 = "原本她一直保持沉默聽著我們的對話，聽到這裡她終於忍不住插嘴了。" 
# 【ハチロク】
# display as 八六
# JP: 「この計画は、その想いに、強い裏付け――\n大義名分を与えてくれるものとなるように思います」
2977 = "「這次的計劃會獲得這些人的強烈支持——讓我們師出有名」" 
# 【ポーレット】
# display as 波萊特
# JP: 「大義名分があれば、各鉄道事業者の関係先――\n地元自治体や沿線住民の協力も仰ぎやすくなります」
2731 = "「有了這個大義名分，我們就更容易獲得各個鐵路事業有關的團體——比如當地自治團體和沿線居民的幫助」" 
# 【稀咲】
# display as 稀咲
# JP: 「だから、復線にかかるコストは分散・軽減できる？」
2113 = "「你是想說，這樣能分攤、減少恢復廢線需要的成本？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「可能性はある。まず御一夜-八ツ城間を復線の成功例と\nできたなら、その可能性は何十倍にも膨れあがろう」
2733 = "「有這個可能。首先我們讓御一夜到八代的線路恢復，有成功的例子在前，讓他們幫忙分攤成本的可能性就會提高幾十倍」" 
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？　なるほど、ね……」
2369 = "「嗯？是嗎……」" 
# monologue
# JP: また、沈黙。\n畳み掛けようとすれば必ず、稀咲はペースを整え直す。
3450 = "她又沉默了。可還沒等我趁熱打鐵繼續說下去，就又被她掌握了節奏。" 
# 【稀咲】
# display as 稀咲
# JP: 「――さきほど、ハチロク君が言ったよね？\n『どの鉄道事業者も、強く復線を望んでいる』って」
1521 = "「——剛才八六說過“只要是從事鐵路工作的人，肯定都想讓線路再次連接起來”」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2353 = "「嗯」" 
# 【稀咲】
# display as 稀咲
# JP: 「にも関わらず、誰も復線に着手しなかった。\nその理由は？」
2248 = "「Mặc dù vậy, nhưng lại không có ai bắt tay vào việc phục hồi tuyến đường.\nLý do là gì?」"
# 【双鉄】
# display as 雙鐵
# JP: 「復線があまりに困難であり、\nかつ、利権関係での対立を呼びやすいものだからだ」
2513 = "「Bởi vì việc phục hồi tuyến đường quá đỗi khó khăn,\nvà hơn nữa, lại dễ gây ra xung đột về mặt lợi ích.」"
# monologue
# JP: いった瞬間、クっと稀咲が小さく笑う。
3529 = "Khoảnh khắc tôi vừa dứt lời, Kisaki bật cười khúc khích."
# 【稀咲】
# display as 稀咲
# JP: 「まぁ、確かにね。\nボクたちとキミたちも、現状では対立している」
2302 = "「Chà, quả thực là vậy nhỉ.\nChúng tôi và các anh, trong tình hình hiện tại cũng đang đối lập nhau mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だが、調和できる。今回の復線が成れば、\nエアクラ工場立地の候補地も大きく広がる」
2101 = "「Nhưng mà, có thể dung hòa được. Nếu việc phục hồi tuyến đường lần này thành công,\ncác địa điểm ứng cử cho việc đặt nhà máy Aircra cũng sẽ được mở rộng đáng kể.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ――うん。そうか。\n貨物列車が走っているなら――」
2315 = "「A——ừm. Ra là vậy.\nNếu có tàu chở hàng chạy thì——」"
# 【浦上】
# display as 浦上
# JP: 「はい、例えば[せんだい,1]千内も、現実的な候補地に入ってきます」
2764 = "「Vâng, ví dụ như Sendai, cũng sẽ được đưa vào làm địa điểm ứng cử thực tế.」"
# 【稀咲】
# display as 稀咲
# JP: 「浦上」
2789 = "「Uragami.」"
# 【浦上】
# display as 浦上
# JP: 「失礼いたしました。\nあまりに興味深いお話だったもので、つい」
2510 = "「Thất lễ rồi.\nVì câu chuyện quá đỗi thú vị nên, tôi lỡ lời.」"
# monologue
# JP: 浦上さんが下げた頭を、\nけれども稀咲は、笑ってすぐに戻させる。
3679 = "Tuy nhiên, Kisaki cười và ngay lập tức bảo ông Uragami,\nngười vừa cúi đầu, ngẩng lên."
# 【稀咲】
# display as 稀咲
# JP: 「構わない――というか、むしろ続けて欲しい。\n“興味深い”のは、エアクラ社としての見解？」
2057 = "「Không sao đâu——hay đúng hơn là, tôi muốn ông cứ tiếp tục.\n“Thú vị” là, kiến giải với tư cách của công ty Aircra sao?」"
# 【浦上】
# display as 浦上
# JP: 「今の段階では、個人としてのものです。\nですが――」
2807 = "「Ở giai đoạn hiện tại, thì đó là với tư cách cá nhân.\nNhưng mà——」"
# 【元忠】
# display as 元忠
# JP: 「エアクラ社としても興味を持つ話だろう。\nもしも実現可能性があるのなら――だが」
2508 = "「Chắc hẳn công ty Aircra cũng sẽ hứng thú với câu chuyện này thôi.\nNếu như có khả năng thực hiện được——thì mới nói.」"
# monologue
# JP: 宝生元忠。\n大立者の割り込みに、一瞬、言葉を呑まされる。
3474 = "Houshou Mototada.\nSự xen ngang của một nhân vật lớn, khiến tôi trong phút chốc phải nuốt lời."
# 【稀咲】
# display as 稀咲
# JP: 「頭取としては、実現可能性に乏しいと？」
2523 = "「Với tư cách là Giám đốc ngân hàng, ngài cho rằng khả năng thực hiện được là rất thấp sao?」"
# monologue
# JP: その一瞬に、稀咲が話を主導する。
3869 = "Chỉ trong khoảnh khắc đó, Kisaki đã nắm thế chủ đạo câu chuyện."
# 【稀咲】
# display as 稀咲
# JP: 「相当に規模の大きなビジネスに繋がりそうにも\n思うのですが」
2598 = "「Cháu nghĩ là nó có vẻ\nsẽ dẫn đến một vụ làm ăn có quy mô khá lớn đấy chứ.」"
# monologue
# JP: （おや）
3969 = "（Ô.）"
# monologue
# JP: 稀咲が一転、\n僕らサイドに近い意見を元忠氏へとぶつけていく。
3780 = "Kisaki đột ngột thay đổi thái độ,\nvà đưa ra những ý kiến nghiêng về phía chúng tôi để phản bác lại ông Mototada."
# 【元忠】
# display as 元忠
# JP: 「繋げるための初めの一歩。\n御一夜－八ツ城間復線のハードルが、あまりに高い」
2244 = "「Bước đầu tiên để kết nối lại.\nRào cản cho việc phục hồi tuyến đường giữa Ohimitera - Yatsushiro, là quá cao.」"
# 【稀咲】
# display as 稀咲
# JP: 「というと？」
2517 = "「Nghĩa là sao ạ?」"
# 【元忠】
# display as 元忠
# JP: 「買収困難だということだ。売却された土地の多くは\n転売され、宅地分譲されてしまっているからな」
2528 = "「Nghĩa là rất khó để mua lại. Phần lớn những mảnh đất đã bán\nđều bị bán lại, và phân lô bán nền làm đất ở mất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2267 = "「!」"
# monologue
# JP: 僕らも、そこを調べてはいた。\n調べはついたが、広く知られた事実とはとても思えない。
3908 = "Chúng tôi, cũng đã điều tra về chuyện đó.\nTuy đã tra ra, nhưng tôi không nghĩ đó là một sự thật được nhiều người biết đến."
# 【双鉄】
# display as 雙鐵
# JP: 「……御一夜銀行も、\nこの復線買収をすでに検討していたのですか？」
1612 = "「……Ngân hàng Ohimitera cũng,\nđã xem xét việc mua lại để phục hồi tuyến đường này rồi sao?」"
# 【元忠】
# display as 元忠
# JP: 「銀行としてではなく、個人としてだ。\n行として検討するに足る案とは考えていない」
2054 = "「Không phải với tư cách ngân hàng, mà là với tư cách cá nhân.\nTôi không cho rằng đây là một phương án đáng để ngân hàng phải xem xét.」"
# 【稀咲】
# display as 稀咲
# JP: 「ですが――だからこそのチャンスであるのでは？\nその復線買収を成功させることが出来れば――」
2242 = "「Nhưng mà——chính vì thế nên mới là cơ hội không phải sao?\nNếu có thể mua lại thành công để phục hồi tuyến đường đó——」"
# 【元忠】
# display as 元忠
# JP: 「新しいビジネスモデルともなるだろうな。\n確かに、潜在的なニーズはある」
2455 = "「Thì cũng sẽ trở thành một mô hình kinh doanh mới nhỉ.\nQuả thực, nhu cầu tiềm năng là có.」"
# monologue
# JP: 稀咲が発した質問は、\n僕らを援護する方向へと更に踏み込んできた。
3775 = "Câu hỏi mà Kisaki đưa ra,\ncàng lấn sâu hơn vào hướng hỗ trợ chúng tôi."
# monologue
# JP: ならば少なくとも稀咲は、\nこの案を評価にたるものとして捉えてくれているのだろう。
3907 = "Nếu vậy thì ít nhất Kisaki,\ncũng đang nhìn nhận phương án này như một thứ đáng để đánh giá."
# 【元忠】
# display as 元忠
# JP: 「が、成功するものとは思えない。\n“宅地”の買収は、それほどに困難なものだ」
2066 = "「Nhưng, ta không nghĩ là sẽ thành công.\nViệc mua lại “đất ở”, là một việc khó khăn đến mức đó đấy.」"
# monologue
# JP: 言ってゆっくり、元忠氏の目が僕を見る。
3864 = "Nói rồi, ánh mắt của ông Mototada từ từ nhìn về phía tôi."
# 【元忠】
# display as 元忠
# JP: 「成算を示せるのかね？　右田双鉄君」
2262 = "「Cậu có thể chỉ ra kế hoạch thành công không? Cậu Migita Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕にも、僕らにもそれは無理です。\nですので、お力をお借りしたく思っております」
2133 = "「Đối với tôi, hay đối với chúng tôi thì điều đó là không thể.\nVì vậy, tôi muốn mượn sức mạnh của các vị.」"
# 【元忠】
# display as 元忠
# JP: 「隈銀の力をか」
2130 = "「Sức mạnh của Kumagin sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いえ。宝生元忠氏、宝生稀咲氏。それに浦上氏。\nそれぞれ、個々人のお力をです」
2050 = "「Không. Là ông Houshou Mototada, cô Houshou Kisaki. Và cả ông Uragami.\nLà sức mạnh của từng cá nhân mỗi người.」"
# monologue
# JP: 言って、敢えての一拍を置く。
3863 = "Nói rồi, tôi cố tình ngừng lại một nhịp."
# 【双鉄】
# display as 雙鐵
# JP: 「……“銀行”の力だけを望むのであれば、\n他にも、選択肢は出てきますので」
1577 = "「……Nếu chỉ mong muốn sức mạnh của “ngân hàng”,\nthì vẫn còn những lựa chọn khác nữa.」"
# 【元忠】
# display as 元忠
# JP: 「ほう？　面白い。\nみかん鉄道とのコネクションはすでにあるというわけか」
2374 = "「Hô? Thú vị đấy.\nNghĩa là cậu đã có sẵn mối liên hệ với Đường sắt Mikan rồi sao.」"
# monologue
# JP: 言外の意味が通じている。買収に僕らが着手するなら、\nその代行者が、隈銀と限られるものではないと。
3293 = "Ý tứ ngoài lời nói đã được truyền đạt. Nếu chúng tôi bắt tay vào việc mua lại,\nthì người đại diện, không nhất thiết chỉ giới hạn ở Kumagin."
# monologue
# JP: みかん鉄道の線を通じて、鹿兒銀に――\nそれももちろん、選択肢としてはあるのだと。
3652 = "Thông qua mối quan hệ của Đường sắt Mikan, để đến với Kagoshima Bank——\nTất nhiên, đó cũng là một lựa chọn."
# 【元忠】
# display as 元忠
# JP: 「銀行が、銀行としての協力を検討するためには、\n大きなものだけでも三つの要素が不足している」
2105 = "「Để ngân hàng, xem xét việc hợp tác với tư cách là một ngân hàng,\nthì chỉ tính những cái lớn thôi cũng đã thiếu mất ba yếu tố rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2308 = "「っ!」"
# monologue
# JP: “隈銀”――ではなく、“銀行”と。
3294 = "Không phải là “Kumagin”——mà là “ngân hàng”."
# monologue
# JP: 僕のほのめかしを理解した上で、\n元忠氏が切り返してきた意味もまた、明白だ。
3328 = "Sau khi hiểu được lời ám chỉ của tôi,\ný nghĩa của việc ông Mototada phản pháo lại, cũng rất rõ ràng."
# 【双鉄】
# display as 雙鐵
# JP: 「その不足とは、何でしょう？」
2591 = "「Những yếu tố còn thiếu đó, là gì vậy?」"
# 【元忠】
# display as 元忠
# JP: 「一点目は宅地買収への足掛かり。一切の足掛かりなしに\n宅地買収という困難な事業へは踏み出せない」
2866 = "「Điểm thứ nhất là chỗ đứng để mua lại đất ở. Nếu không có bất kỳ chỗ đứng nào\nthì không thể bước vào công việc khó khăn mang tên mua lại đất ở được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2720 = "「Vâng.」"
# 【元忠】
# display as 元忠
# JP: 「二点目は、『新観光列車』なるもののビジョン。\nどのような物にするかが、一切具体的に示されていない」
2871 = "「Điểm thứ hai là, tầm nhìn về cái gọi là 『chuyến tàu du lịch mới』.\nSẽ làm ra một thứ như thế nào, hoàn toàn không được chỉ ra một cách cụ thể.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこも、ご指摘の通りと感じます」
2525 = "「Điểm đó, tôi cũng cảm thấy đúng như ngài đã chỉ ra.」"
# 【元忠】
# display as 元忠
# JP: 「三点目。“御一夜市民”に与えるメリット。\n君の案では、御一夜市民の生活不安は解消されない」
2869 = "「Điểm thứ ba. Lợi ích mang lại cho “người dân Ohimitera”.\nPhương án của cậu, không giải quyết được nỗi bất an trong cuộc sống của người dân Ohimitera.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
2325 = "「A.」"
# monologue
# JP: 思わず漏らしてしまった声に、\n元忠氏の口元が――笑みにも見える形に歪む。
3831 = "Trước âm thanh mà tôi bất giác thốt ra,\nkhóe miệng của ông Mototada——méo xệch đi thành một hình thù trông giống như một nụ cười."
# monologue
# JP: そのまま、言葉を発さない。\nであらば僕が言う他にない。
3300 = "Ông ấy cứ giữ nguyên như vậy, không nói thêm lời nào.\nNếu thế thì tôi đành phải nói thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに現行案で事業創出のメリットを受けるのは、\n移住者を多く含む鉄道技術者が中心となります」
2847 = "「Quả thực với phương án hiện tại, những người nhận được lợi ích từ việc tạo ra công ăn việc làm,\nchủ yếu sẽ là các kỹ sư đường sắt, bao gồm cả rất nhiều người nhập cư.」"
# 【元忠】
# display as 元忠
# JP: 「わかっているなら話が早い。\n双鉄くん。それは新たな火種にしかならんぞ」
2112 = "「Nếu cậu đã hiểu thì dễ nói chuyện rồi.\nCậu Soutetsu. Điều đó sẽ chỉ trở thành một mồi lửa mới mà thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――はい」
1526 = "「——Vâng.」"
# monologue
# JP: エアクラ工場の大規模な雇用創出には、\n“誰もができる単純作業”が極めて多く含まれる。
3787 = "Việc tạo ra việc làm quy mô lớn của nhà máy Aircra,\nbao gồm rất nhiều “công việc đơn giản mà ai cũng có thể làm được”."
# monologue
# JP: 元忠氏がエアクラ誘致を強く推し、\nそれが広範に支持される理由を、今まで僕は軽視していた。
3571 = "Ông Mototada thúc đẩy mạnh mẽ việc thu hút nhà máy Aircra,\nvà lý do nó được ủng hộ rộng rãi, từ trước đến nay tôi đã xem nhẹ."
# 【元忠】
# display as 元忠
# JP: 「“銀行側”としての意見は、\nまぁこのようなところだが」
2581 = "「Ý kiến với tư cách là “phía ngân hàng”,\nchà, đại khái là như vậy.」"
# monologue
# JP: 大きく、極めてわざとらしく、\n元忠氏は肩をすくめてみせる。
3338 = "Ông Mototada nhún vai,\nmột cách mạnh mẽ, và cực kỳ có chủ ý."
# monologue
# JP: ……ご指摘通り、確かに“銀行側”の意見だ。\n鹿兒銀も他の銀行も、同じ不足を指摘してくるだろうから。
1508 = "……Đúng như ông ấy đã chỉ ra, quả thực đó là ý kiến của “phía ngân hàng”.\nBởi vì Kagoshima Bank hay các ngân hàng khác, chắc chắn cũng sẽ chỉ ra những thiếu sót tương tự."
# 【元忠】
# display as 元忠
# JP: 「――稀咲はどうだ？」
1530 = "「——Kisaki thì sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクは――正直、双鉄の案にかなりの興味を覚えている。\n現状での評価は中立か、エアクラ工場誘致案に劣るけど」
2605 = "「Cháu thì——thành thật mà nói, cháu cảm thấy khá hứng thú với phương án của Soutetsu.\nĐánh giá ở hiện tại là trung lập, hoặc kém hơn so với phương án thu hút nhà máy Aircra, nhưng mà」"
# 【元忠】
# display as 元忠
# JP: 「けど？」
2069 = "「Nhưng mà?」"
# 【稀咲】
# display as 稀咲
# JP: 「御一夜支店長としても、計画に噛んでおきたくは思う。\n放置するには、惜しい――と同時に、危険な案だから」
2582 = "「Ngay cả với tư cách là Giám đốc chi nhánh Ohimitera, cháu cũng muốn tham gia vào kế hoạch này.\nVì nếu bỏ mặc thì thật đáng tiếc——đồng thời, đây cũng là một phương án nguy hiểm.」"
# 【元忠】
# display as 元忠
# JP: 「ほう。支店長として“も”か？」
2304 = "「Hô. Ngay cả với tư cách Giám đốc chi nhánh “cũng” sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「っ！」
# 2308 = "「唔！」" 
# monologue
# JP: 微かに稀咲が赤くなる。
3778 = "Kisaki hơi đỏ mặt."
# monologue
# JP: それと同時に、何故だろう――\n空気が、どこか緊張をはらむ。
3274 = "Đồng thời, không hiểu sao——\nBầu không khí, bỗng mang theo chút gì đó căng thẳng."
# 【元忠】
# display as 元忠
# JP: 「ははっ。その判断を否定できる材料となると――\n確かに、私も持ってはおらんな」
2286 = "「Haha. Nếu nói về tài liệu để phủ định phán đoán đó thì——\nQuả thực, ta cũng không có.」"
# monologue
# JP: 元忠氏は鷹揚に――\nと表現するには、芝居気が混じりすぎる頷きを見せる。
3331 = "Ông Mototada gật đầu một cách hào phóng——\nhay nói đúng hơn là, pha lẫn quá nhiều sự kịch tính."
# 【元忠】
# display as 元忠
# JP: 「よかろう、御一夜支店長。業務命令だ。\n右田双鉄氏をサポートし、本件提案の可否を見極めろ」
2408 = "「Được thôi, Giám đốc chi nhánh Ohimitera. Đây là mệnh lệnh công việc.\nHãy hỗ trợ cậu Migita Soutetsu, và xem xét tính khả thi của đề xuất này.」"
# 【稀咲】
# display as 稀咲
# JP: 「――拝命します。喜んで」
1524 = "「——Cháu xin nhận lệnh. Rất sẵn lòng.」"
# 【元忠】
# display as 元忠
# JP: 「ならばこの件、ひとまずは宝生稀咲支店長に預ける。\nいや、思ったより有意義な時間だった」
3025 = "「Vậy thì vụ này, trước mắt ta sẽ giao cho Giám đốc chi nhánh Houshou Kisaki.\nChà, một khoảng thời gian ý nghĩa hơn ta tưởng đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2328 = "「啊！」" 
# monologue
# JP: 元忠氏の分厚い手のひらが、僕の肩へと乗せられる。
3336 = "Bàn tay dày cộp của ông Mototada, đặt lên vai tôi."
# 【元忠】
# display as 元忠
# JP: 「法定試験どうのの話は、視野に入ってもいなかった。\n双鉄君。君の提案。興味深い部分も少なくはなかった」
2610 = "「Câu chuyện về kiểm tra theo luật định gì đó, ta còn chưa từng nghĩ tới.\nCậu Soutetsu. Đề xuất của cậu. Có không ít điểm thú vị đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとうございます」
1532 = "「——Xin cảm ơn ngài.」"
# 【元忠】
# display as 元忠
# JP: 「稀咲を存分に使ってくれて構わない。\n次に会うときは、より興味深い話を聞かせてくれ」
2107 = "「Cứ thoải mái sử dụng Kisaki đi.\nLần tới gặp mặt, hãy cho ta nghe một câu chuyện thú vị hơn nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。必ず、そう運びます」
2413 = "「Vâng. Chắc chắn, sẽ là như vậy.」"
# 【元忠】
# display as 元忠
# JP: 「楽しみにしている。では、お先に失礼する」
2616 = "「Ta rất mong chờ đấy. Vậy, ta xin phép đi trước.」"
# 【浦上】
# display as 浦上
# JP: 「私も、これで。失礼いたします」
2553 = "「Tôi cũng, xin phép. Thất lễ rồi.」"
# monologue
# JP: 元忠氏と浦上さんとが去っていく。
3333 = "Ông Mototada và ông Uragami rời đi."
# monologue
# JP: 話に大きく区切りがついた。\nそう感じてか、蓑笠さんも、赤井宮司も――
3819 = "Câu chuyện đã đi đến một dấu mốc lớn.\nCó lẽ cảm nhận được điều đó, nên cả ông Minokasa và đền chủ Akai cũng——"
# 【蓑笠】
# display as 蓑笠
# JP: 「なら、ワシもこの辺で。\nああ、双鉄くん――大変じゃろうが、頑張って」
3008 = "「Vậy thì, lão cũng xin phép tại đây.\nA, cậu Soutetsu——chắc là vất vả lắm, nhưng hãy cố gắng lên nhé.」"
# 【赤井】
# display as 赤井
# JP: 「僕も、ここまでで退散しましょう。\n双鉄君、幸運を祈ってますよ」
2552 = "「Tôi cũng, xin phép cáo lui tại đây.\nCậu Soutetsu, chúc cậu may mắn nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。ご参席、本当にありがとうございました」
2415 = "「Vâng. Thực sự cảm ơn mọi người đã đến tham dự.」"
# monologue
# JP: ――みながみな、微妙な笑顔で去っていく。\n僕への応援の言葉を添えて。
1484 = "——Tất cả mọi người, đều rời đi với những nụ cười gượng gạo.\nKèm theo những lời động viên dành cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……うーむ、それほど厳しい状況に見えるのか？\n会議の成果としては、上々の線だったかと思うが」
1581 = "「……Hừm, tình hình trông có vẻ nghiêm trọng đến vậy sao?\nTôi nghĩ kết quả của cuộc họp, cũng nằm ở mức khá tốt rồi mà.」"
# 【凪】
# display as 凪
# JP: 「凪さまもそぎゃんと思うばい！」
2737 = "「Nagi đại nhân cũng nghĩ vậy đấy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな。――うむっ！？」
2701 = "「Đúng không. ——Hửm!?」"
# monologue
# JP: なにか、おかしい。\n残ったみなが、ハチロクに注ぐ視線が、硬い。
3262 = "Có gì đó, không ổn.\nÁnh mắt của những người còn lại, đổ dồn vào Hachiroku, thật cứng nhắc."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ズレとるねぇ。\nやけん、厳しか状況に置かれよるとよ」
2971 = "「Lệch pha rồi đấy.\nVì thế nên, mới bị đặt vào tình thế nghiêm trọng đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 2325 = "「啊」" 
# monologue
# JP: 登呂流湯のご主人が残ってくれていた。\nなんとなく救われたような気がして、息が出る。
3706 = "Chủ nhân nhà tắm Tororyu-yu vẫn còn ở lại.\nKhông hiểu sao tôi cảm thấy như được cứu rỗi, khẽ thở hắt ra."
# 【双鉄】
# display as 雙鐵
# JP: 「実際、僕らは、\nそして御一夜は、厳しい状況に置かれていますが」
2434 = "「Thực tế thì, chúng tôi,\nvà cả Ohimitera, đang bị đặt vào một tình thế nghiêm trọng mà.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「やのーて」
2051 = "「Không phải thế.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。復線に関する会議内容とは別に、\nいくつかの点で、状況確認が必要であるかと存じます」
3057 = "「Ngài Soutetsu. Bỏ qua nội dung cuộc họp về việc phục hồi tuyến đường,\ntôi nghĩ cần phải xác nhận tình hình ở một vài điểm.」"
# monologue
# JP: 登呂流湯のご主人の言葉を断ち切って、\nハチロクもまた、どこか緊張した声を出す。
3358 = "Cắt ngang lời của chủ nhân nhà tắm Tororyu-yu,\nHachiroku cũng cất lên giọng nói có phần căng thẳng."
# 【ハチロク】
# display as 八六
# JP: 「ともないまして、稀咲様。\nひとつ、ご質問をお許しいただけますでしょうか？」
2650 = "「Kèm theo đó, thưa cô Kisaki.\nCô có thể cho phép tôi hỏi một câu được không ạ?」"
# 【稀咲】
# display as 稀咲
# JP: 「構わないよ。何かな？」
2233 = "「Không sao đâu. Chuyện gì vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「御一夜支店長として“も”の、他に――\nいったい、どのようなお立場で」
2524 = "「Ngoài việc “cũng” với tư cách là Giám đốc chi nhánh Ohimitera ra——\nrốt cuộc, cô đứng ở lập trường nào」"
# monologue
# JP: ぞくり、と背筋が震えてしまう。
3792 = "「Mà cô lại suy nghĩ rằng,\n“muốn tham gia” vào kế hoạch này ạ?」"
# monologue
# JP: いつもながらのハチロクの声、\n落ち着いた、穏やかな声に何故か凄みを感じてしまう。
3362 = "「Chẳng phải là không cần trả lời sao?\nKhi không phải là Giám đốc chi nhánh, tôi chỉ là Houshou Kisaki mà thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「この計画に、“噛んでおきたい”と、\nお考えなのでしょうか？」
2516 = "「Vậy thì, với lý do gì mà một Houshou Kisaki bình thường,\nlại mong muốn tham gia vào kế hoạch này?」"
# 【稀咲】
# display as 稀咲
# JP: 「答えるまでも無いんじゃないかな？\n支店長ではないボクは、ただの宝生稀咲だよ」
2978 = "「Đó là——Hachiroku.\nCó lẽ, cùng một lý do với cô đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「では、ただの宝生稀咲様が、どのような理由で、\nこの計画への参加をご希望されるのですか？」
3015 = "Trước lời nói của Kisaki, lần này đến lượt Hachiroku đỏ mặt.\nPhản ứng đó, nhìn qua cũng thấy là đã tạo cho Kisaki sự thong dong."
# 【稀咲】
# display as 稀咲
# JP: 「それは――ハチロク。\n恐らく、キミと同じ理由だ」
2970 = "「Tôi có hứng thú với Soutetsu.\nSự hứng thú đó, sau khi nghe đề xuất lần này lại càng trở nên mạnh mẽ hơn.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 2308 = "「唔！」" 
# monologue
# JP: 稀咲の言葉に、今度はハチロクが赤くなる。\nその反応は、見るからに稀咲に余裕を与える。
3913 = "Kisaki tiến một bước lớn về phía tôi."
# 【稀咲】
# display as 稀咲
# JP: 「ボクは双鉄に興味を抱いている。\nその興味は、今回の提案を受けてさらに強まった」
2613 = "「Vì vậy, tôi muốn tìm hiểu về Soutetsu ở một khoảng cách gần hơn.\nGiống như, Hachiroku vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぬ」
# 2305 = "「唔」" 
# monologue
# JP: 稀咲が僕へと、大きく一歩を踏み出してくる。
3773 = "Hachiroku đã hoàn toàn bị áp đảo——không?"
# 【稀咲】
# display as 稀咲
# JP: 「だから、双鉄のことをもっと近くで知りたく思った。\nちょうど、ハチロク？」
2647 = "Không hiểu sao Hachiroku,\ntrông có vẻ như đang bị làm cho bối rối."
# 【ハチロク】
# display as 八六
# JP: 「――っ」
# 1519 = "「——」" 
# monologue
# JP: 完全に、ハチロクが気圧されて――いや？
3354 = "「Cô luôn ở bên cạnh Soutetsu với vẻ mặt như thể đó là điều hiển nhiên.\nÍt nhất thì tôi cũng muốn tìm hiểu ở một khoảng cách gần như vậy.」"
# monologue
# JP: なぜなのだろうかハチロクは、\n困惑させられているようにも見える。
3272 = "「Việc tôi hầu hạ bên cạnh ngài Soutetsu là điều đương nhiên.\nBởi vì chúng tôi có mối quan hệ giữa \\x%l機関士;#00ffc040;lái tàu%l;#; và \\x%lレイルロオド;#00ffc040;Railord%l;#; mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「当然のような顔をして、キミが、双鉄の側にいる。\n少なくともそのくらいの近さで、知りたいと」
2119 = "「Nhưng mà, Soutetsu không chỉ dừng lại ở việc là một \\x%l機関士;#00ffc040;lái tàu%l;#;.\nĐúng không? Bởi vì cậu ấy đã đưa ra một đề xuất như thế này cơ mà.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしが双鉄様のお側に仕えるのは当然のこと。\n\x%l機関士;#00ffc040;機関士%l;#;と、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;との間柄なのですから」
2585 = "「っ」"
# 【稀咲】
# display as 稀咲
# JP: 「けど、双鉄は\x%l機関士;#00ffc040;機関士%l;#;だけにはとどまっていない。\nだろ？　こんな提案が出て来るんだから」
2259 = "「Ờm——Cô Kisaki?」"
# 【ハチロク】
# display as 八六
# JP: 「っ」
1556 = "「Ô kìa Thị trưởng. Cô lên tiếng gọi tôi thì đúng là hiếm thấy đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええと――稀咲さん？」
2995 = "Thực tế thì, khá là hiếm thấy.\nÁnh mắt của Paulette, đang mang theo một tia sáng sắc bén."
# 【稀咲】
# display as 稀咲
# JP: 「おや市長。ボクにお声かけとは珍しい」
2293 = "「Trong số những người đồng hành cùng tiến hành kế hoạch, sẽ đặt ai ở vị trí gần nhất.\nĐó tất nhiên, là quyền tự do của cậu Soutetsu đúng không?」"
# monologue
# JP: 実際、かなり珍しい。\nポーレットの目が、鋭い光を帯びている。
3674 = "「Đương nhiên rồi? Dù là chọn ai, hay không chọn ai.」"
# 【ポーレット】
# display as 波萊特
# JP: 「共に計画を進める仲間から、誰を一番近くに置くか。\nそれはもちろん、双鉄くんの自由ですよね？」
2468 = "“Sự tự do của tôi”, đang được Kisaki, và Paulette định nghĩa.\nNhưng mà, tình hình này hoàn toàn không thể xen mồm vào được."
# 【稀咲】
# display as 稀咲
# JP: 「当然だろう？　誰を選ぶも、選ばないも」
2813 = "「Hachiroku thì——cả Navi nữa.\nTuyệt đối sẽ không làm khó anh hai——anh trai đâu.」"
# monologue
# JP: “僕の自由”を、稀咲が、ポーレットが定義していく。\nが、とても口を挟める状況には無い。
3560 = "「っ!」\n「A」"
# 【日々姫】
# display as 日日姬
# JP: 「ハチロクは――ナビも。\n絶対に、にぃに――兄さんのこと、困らせません」
2158 = "Ngay lúc đó Hibiki xen vào."
# 【稀咲】
# display as 稀咲＆波萊特
# JP: 「っ！」\n「あ」
2306 = "Một Hibiki vốn rụt rè như vậy,\nlại dứt khoát làm cho Kisaki và Paulette phải im lặng."
# monologue
# JP: そこへ日々姫が口を挟む。
3631 = "「Em——không muốn làm phiền anh trai.\nEm chỉ muốn, được hỗ trợ anh ấy mà thôi.」"
# monologue
# JP: 引っ込み思案なあの日々姫が、\nきっぱりと、稀咲とポーレットを黙らせる。
3657 = "「Tôi cũng, có cùng cảm nhận như vậy. Huống hồ,\nchặng đường phía trước của ngài Soutetsu, được cho là sẽ vô cùng khắc nghiệt.」"
# 【日々姫】
# display as 日日姬
# JP: 「私――兄さんを邪魔したくありません。\n兄さんのことを、ただ、支えたい」
2545 = "「Đúng vậy nha~」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしも、同じ気持ちでございます。まして、\n双鉄様のこの先の[みちゆき,1]行路は、極めて厳しく思われますから」
2556 = "「Quả thực từ bây giờ mới là trận chiến lớn đấy!!」"
# 【れいな】
# display as 玲奈
# JP: 「そぉですねぇ」
2450 = "Reina và Nagi, một người thì nhẹ nhàng, một người thì mạnh mẽ.\nTừ hai hướng hoàn toàn trái ngược nhau, nhưng đều cất lên giọng điệu có phần vô tư lự."
# 【凪】
# display as 凪
# JP: 「確かにここからが大勝負ばい！！」
2806 = "「Ufufu.」"
# monologue
# JP: れいなと凪とが、ほんわりと、勢いよく。\n正反対の方向から、けれど同じくどこか能天気な声を出す。
3695 = "Có lẽ thấy điều đó thú vị,\nnên Fukami đã bật cười bằng một giọng kìm nén, nhưng tươi sáng."
# 【ふかみ】
# display as 深美
# JP: 「うふふっ」
2370 = "Bầu không khí bỗng chốc——dịu đi hẳn."
# monologue
# JP: それが面白かったのか、\nふかみが抑えた、けれども明るい声で笑う。
3429 = "「……Đúng là vậy. Quả nhiên ánh mắt của Hibiki thật tuyệt vời.\nNó cho tôi thấy được hình thái đẹp đẽ nhất của hiện thực.」"
# monologue
# JP: 空気がふっと――一気に緩む。
3654 = "「Làm gì có……」"
# 【稀咲】
# display as 稀咲
# JP: 「……そのとおりだ。やっぱり日々姫の目は素敵だね。\n現実の一番綺麗なあり方を、ボクに見せてくれる」
1592 = "「Tôi cảm thấy xấu hổ về bản thân mình. Cậu Soutetsu, vì Ohimitera,\nvì Đường sắt Ohimitera, đã cố gắng đến nhường này cơ mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「そんな……」
2761 = "「Chị Paulette, không có gì phải xấu hổ đâu nha~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたし自分が恥ずかしいです。双鉄くん、御一夜のため、\n御一夜鉄道のために、こんなに頑張ってくれてるのに」
2609 = "「Cảm ơn em, Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレットは、はずかしくなんてないですよぉ？」
2786 = "「Kya.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがと、れいな」
2920 = "Paulette ôm chầm lấy Reina.\nVừa ôm, vừa từ từ vuốt ve——"
# 【れいな】
# display as 玲奈
# JP: 「きゃあ」
2266 = "Có lẽ bằng cách làm như vậy,\ncô ấy đang tự xốc lại tinh thần đang có phần suy sụp của bản thân."
# monologue
# JP: ポーレットがれいなを抱きしめる。\n抱きしめながら、ゆっくりと撫ぜ――
3671 = "「Tôi cũng, tất nhiên sẽ hỗ trợ. Cậu Soutetsu, người đang hỗ trợ Ohimitera——\ntôi sẽ dốc toàn lực, không màng đến tư lợi cá nhân.」"
# monologue
# JP: 恐らくはそうすることで、\n落ち込みかけた自分自身を立て直していく。
3510 = "「Reina cũng sẽ, cùng với chị Paulette,\nhỗ trợ anh Soutetsu đó nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、もちろん支えます。御一夜を支えてくれる、\n双鉄くんのこと――私利私欲抜きで、全力で」
2557 = "“Trông vậy thôi chứ em khỏe lắm đó nha~”, cô bé gập cánh tay lại.\nNhìn thấy bộ dạng đó, Kisaki khẽ cười khúc khích."
# 【れいな】
# display as 玲奈
# JP: 「れいなも、ポーレットといっしょに、\nそうてつさんのこと、ささえちゃいますよぉ」
2797 = "「Tôi cũng sẽ làm vậy. Tôi hứa đấy.\nNếu là Soutetsu, thì một lúc nào đó chắc chắn, sẽ tìm ra giải pháp tối ưu thôi.」"
# monologue
# JP: “こうみえても力持ちなんですからぁ”と、腕をまげる。\nその様子をみて、稀咲がクク、と緩やかに笑う。
3698 = "「Chị thì, ngay từ đầu vẫn luôn làm vậy mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクもそうする。約束するよ。\n双鉄なら、いずれきっと、最適解を見出すだろうし」
3017 = "「Em cũng vậy! Từ nay về sau vẫn sẽ như vậy!」"
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんは、最初からずーっとそぎゃんしとるし」
2423 = "「Tôi là, \\x%lレイルロオド;#00ffc040;Railord%l;#; của ngài Soutetsu.\nLuôn luôn, chỉ thực hiện nghĩa vụ đó dưới hình thái tốt nhất mà thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「わたしも！　これからもそうするし」
2617 = "「E-Em cũng sẽ, giúp đỡ anh Soutetsu,\nạ! ……Vì làm vậy, có vẻ như cơ hội sẽ được mở rộng hơn.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、双鉄様の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。\n常に、その勤めを最善の形で果たすのみでございます」
2628 = "「Vậy là quyết định rồi nhé!!!」"
# 【ふかみ】
# display as 深美
# JP: 「わ、わたしも、双鉄おにいさんのこと、お手伝いします、\nです！　……その方が、チャンス広がりそうですし」
2539 = "Có lẽ do đã quá sốt ruột,\nnên Nagi cắt ngang câu chuyện một cách dứt khoát."
# 【凪】
# display as 凪
# JP: 「それで話は決まりばい！！！」
3005 = "「Vậy thì vậy thì! Bắt đầu hành động thôi!\nTrước tiên, chúng ta sẽ làm gì đây!!?」"
# monologue
# JP: よっぽど焦れていたのだろうか、\n凪がスパンと話を断ち切る。
3386 = "「Cái này……có vẻ sẽ gây tiếng vang đây.」"
# 【凪】
# display as 凪
# JP: 「したらしたら！　動き出すばい！\nまず初めには、何ばしよると！！？」
2992 = "Đầu tiên là mục tiêu.\nMột cách rõ ràng, dưới hình thức mà ai cũng có thể nhìn thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「これは……話題を呼びそうだな」
2968 = "Tất nhiên, tôi đã suy nghĩ như vậy và đề xuất,\nviệc tạo áp phích, nhưng mà——"
# monologue
# JP: まず目標を。\n明快に、誰の目にも見える形で。
3945 = "「Sao rồi? Anh hai.」"
# monologue
# JP: 無論、そう考えて提案した、\nポスター作成ではあったのだが――
3702 = "「À, tuyệt vời lắm.」"
# 【日々姫】
# display as 日日姬
# JP: 「どぎゃんと？　にぃに」
3048 = "『Bởi vì đằng nào thì cũng sẽ cho chạy mà』——"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、見事だ」
2357 = "Khẳng định như vậy, Paulette đã cho may mới kiêm luôn làm hàng mẫu,\nđồng phục dành cho tiếp viên khoang hành khách, của chuyến tàu du lịch mới thuộc Đường sắt Ohimitera."
# monologue
# JP: 『いずれ走らせるものですから』――
1504 = "Tôi đã nghĩ là nó sẽ được hoàn thiện tốt,\nnhưng khi nhìn thực tế, nó còn tuyệt vời hơn cả tưởng tượng."
# monologue
# JP: そう断言して、ポーレットが試作を兼ねて新調させた、\n御一夜鉄道、新観光列車の、客室乗務員用の制服。
3670 = "「Kisaki, Fukami, Nagi. Cá tính của ba người hoàn toàn khác nhau,\nnhưng nó lại làm nổi bật và tỏa sáng một cách sống động cho từng người.」"
# monologue
# JP: よい出来に仕上がるだろうとは思っていたが、\n実際見ると、想像以上に素晴らしい。
3581 = "「Hau!」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲、ふかみ、凪。まったく違った三人の個性を、\nしかし、それぞれ鮮やかに際立て、光らせている」
2856 = "「Anh hai, cũng khá là hiểu biết đấy!」"
# 【ふかみ】
# display as 深美
# JP: 「はうっ！」
2287 = "「Không ngờ Soutetsu lại khen đến mức đó đấy.\nNhưng mà——ừm. Thành phẩm này khiến tôi không cảm thấy là cậu đang khen quá lời chút nào.」"
# 【凪】
# display as 凪
# JP: 「にーさん、なかなかわかっとるばい！」
2393 = "「Ehehe~! Em đã nghiên cứu rất nhiều mà lị!」"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄がそこまで褒めてくれるとは思わなかったよ。\nけど――うん。少しも褒めすぎだとは感じ無い出来だ」
2758 = "Nhà thiết kế tất nhiên là Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「えっへへ～！　いっぱい研究したけんね！」
2299 = "Nhìn nụ cười rạng rỡ vì được khen ngợi ở khoảng cách gần,\nchợt một thắc mắc nảy sinh trong tôi."
# monologue
# JP: デザイナーはもちろん日々姫。
3860 = "「Nhưng mà, tại sao Hibiki lại mặc \\x%lナッパ服;#00ffc040;đồng phục trang màu%l;#;?\nTất nhiên là, nó vô cùng hợp với em nhưng mà——」"
# monologue
# JP: 賞賛に輝く笑顔を間近にみれば、\nふっと疑問が湧いてくる。
3562 = "「Chuyện đó là vì, cậu Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、何故日々姫はナッパ服なのだ？\nもちろん、この上なく似合ってはいるのだが――」
2068 = "Người trả lời thay cho Hibiki là Paulette——\nngười đặt hàng, tấm áp phích này."
# 【ポーレット】
# display as 波萊特
# JP: 「それはですね、双鉄くん」
2974 = "「Bởi vì đây là áp phích của 『chuyến tàu du lịch sắp chạy từ nay về sau』.\nTrên đường ray của Đường sắt Ohimitera, hướng đến Ohimitera, và từ Ohimitera đi.」"
# monologue
# JP: 日々姫に代わり答えてきたのはポーレット――\nこのポスターの、発注者だ。
3297 = "Nghe cô ấy nói vậy,\ntôi cảm thấy xấu hổ vì sự chậm tiêu của mình."
# 【ポーレット】
# display as 波萊特
# JP: 「『これから走る観光列車』のポスターだからです。\n御一夜鉄道のレールの上を、御一夜へと、御一夜から」
2592 = "「\\x%l機関士;#00ffc040;Lái tàu%l;#; của Đường sắt Ohimitera, \\x%lレイルロオド;#00ffc040;Railord%l;#;, tiếp viên khoang hành khách.\n\\x%l気動車;#00ffc040;Lái tàu tự hành%l;#;——còn chị Mayami là 『người dân địa phương Ohimitera』 nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
# 2328 = "「啊！」" 
# monologue
# JP: 言われてみれば、\nなんと自分が鈍かったのかが恥ずかしくなる。
3458 = "「Chị thì,\nnghĩ là không có mặt trên áp phích cũng được mà……」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道\x%l機関士;#00ffc040;機関士%l;#;に、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に、客室乗務員。\n\x%l気動車;#00ffc040;気動車%l;#;運転士に――真闇姉は『地元、御一夜の方』だな」
2640 = "「Không, rất cần thiết. Tuyệt đối cần thiết.」\n「Không, rất cần thiết ạ, tuyệt đối cần thiết.」"
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんは、\nポスターに映らんでもよかと、って思うんやけど……」
2424 = "Giọng của Paulette và tôi hòa vào nhau."
# 【双鉄】
# display as 雙鐵＆波萊特
# JP: 「いや、必要だ。絶対に」\n「いいえ、必要です、絶対に」
2072 = "Có lẽ mọi người, cũng định nói điều tương tự.\nTừ những cái miệng đang hé mở của mỗi người, tiếng cười bật ra."
# monologue
# JP: ポーレットと僕の声が重なる。
3669 = "「Vì đây là 『áp phích để mời mọi người đến Ohimitera』 mà.\nSự chào đón của người dân địa phương, là điều tuyệt đối cần thiết.」"
# monologue
# JP: みな、同じことを言おうとしていたのであろう。\nそれぞれの開きかけた口から、笑いがこぼれる。
3376 = "「Đúng vậy. Một tồn tại có thể thể hiện một cách sâu sắc 『bầu không khí của thị trấn Ohimitera』\nnhư chị Mayami, sẽ không có ai khác đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「『御一夜へ来てもらうためのポスター』なんですから。\n地元の方のお迎えは、絶対に必要なんです」
2380 = "「Trời đất. Từ khi nào mà?\nSou-chan cũng trở nên khéo miệng rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。真闇姉ほど、『御一夜の町の空気感』を、\nしっとりと示してくれる存在は、他になかろう」
2708 = "「Khéo miệng? ——À không, em không nói nịnh đâu, cũng không biết nói nịnh.\nChỉ là, em thực sự nghĩ như vậy từ tận đáy lòng thôi.」"
# 【真闇】
# display as 真闇
# JP: 「あらまぁ。いつの間に？\n双ちゃんも上手になったとね」
2292 = "「……Trời đất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「上手？　――ああいや、世辞などいわんし、言えん。\nただ、心底からそう思っただけのことだ」
2729 = "Tuy nhiên, ừm.\nKhông hề phóng đại, có vẻ như nó sẽ trở thành một tấm áp phích “đường sắt” thực sự xuất sắc."
# 【真闇】
# display as 真闇
# JP: 「……あらまぁ」
1579 = "「——『Chuyến tàu đi đến tương lai』 sao.」"
# monologue
# JP: しかし、うむ。\n掛け値なく、実に優れた“鉄道”のポスターとなりそうだ。
3276 = "「Ehehe.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――『未来行き列車』か」
1518 = "Sau muôn vàn tranh luận mới quyết định được,\nmột câu slogan cực kỳ đơn giản."
# 【ふかみ】
# display as 深美
# JP: 「えへへっ」
2297 = "Ngay khoảnh khắc tôi thốt ra câu đó,\nngười khởi xướng——Fukami, bẽn lẽn cười đầy hạnh phúc."
# monologue
# JP: 議論百出の末に決まった、\nシンプル極まるキャッチコピー。
3911 = "「Khi nghe nói sẽ làm áp phích bằng ảnh chụp tập thể của mọi người,\nnhững từ đó, đã tự nhiên hiện lên trong đầu em.」"
# monologue
# JP: 口の端に乗せた瞬間に、\n発案者――ふかみが、しあわせそうにはにかむ。
3527 = "「Chuyến tàu đi đến tương lai.」"
# 【ふかみ】
# display as 深美
# JP: 「みんなでの集合写真でポスターをって聞いたとき、\n言葉、自然に浮かんできたんです」
2543 = "Từ hiện tại, đi đến tương lai. Từ nơi này, đi đến một nơi nào đó.\nĐể thực hiện mục đích của mỗi người, để thực hiện chuyến đi của mỗi người."
# 【双鉄】
# display as 雙鐵
# JP: 「未来行き列車」
2817 = "Nghĩ như vậy, tôi có thể hiểu được.\nÝ nghĩa của bản phác thảo mà Hibiki đã vẽ, một cách đặc biệt rõ ràng."
# monologue
# JP: 今から、未来へ。ここから、どこかへ。\nそれぞれの目的を果たすため、それぞれの旅をするために。
3489 = "「Chụp ngay thôi. Không cần thêm bất cứ thứ gì khác nữa.\n『Chuyến tàu đi đến tương lai』 『Đường sắt Ohimitera』. Chỉ bấy nhiêu thôi là đủ rồi.」"
# monologue
# JP: そう考えれば、納得できる。\n日々姫が描いたラフ画の意味を、ひときわに。
3912 = "「Vậy thì, đi thôi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「早速撮ろう。それ以上の何もいらん。\n『未来行き列車』『御一夜鉄道』。それだけで十分だ」
2594 = "Hibiki vừa động đậy, mọi người cũng động đậy theo.\nCó lẽ bản phác thảo, đã in sâu vào tâm trí của mọi người rồi."
# 【日々姫】
# display as 日日姬
# JP: 「なら、いこ！」
3009 = "Bên cạnh quầy bán vé trên sân ga.\nTrong không gian đó, mọi người lần lượt đứng vào vị trí, đúng như bố cục."
# monologue
# JP: 日々姫が動けば、みんなも動く。\nラフ画が、すっかり頭に焼き付いているのだろう。
3628 = "「Ồ——」"
# monologue
# JP: ホーム上切符売り場横。\nその空間に、みながぴたり、構図どおりに収まっていく。
3521 = "Tôi ngồi trên thang gấp và cầm máy ảnh lên.\nTrong khoảnh khắc, tất cả mọi thứ thu gọn lại thành một tổng thể tuyệt đẹp."
# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
2303 = "Đây là một, bức tranh.\nRa là vậy, chị Mayami là cần thiết. Tất cả những người ở đây, đều không thể thiếu."
# monologue
# JP: 脚立に座ってカメラを構える。\n瞬間に、全てが綺麗なひとつに収まる。
3539 = "「Sân ga cũng vậy, đường ray cũng vậy——」"
# monologue
# JP: 一枚の、絵だ。\nなるほど真闇姉は必要だ。この全員が、不可欠だ。
3906 = "Đây là một bức tranh.\nRa là vậy, chị Mayami là cần thiết. Tất cả những người ở đây, đều không thể thiếu."
# 【双鉄】
# display as 雙鐵
# JP: 「ホームも、レールも――」
2864 = "「Sân ga cũng vậy, đường ray cũng vậy——」"
# monologue
# JP: 光が注ぐ。\n祝福されているように、全てがきらめく。ただ美しい。
3932 = "Ánh sáng chiếu rọi.\nTất cả đều lấp lánh như đang được chúc phúc. Đẹp đến nao lòng."
# monologue
# JP: みながわくわく、僕の言葉を待ってか\nこちらを見上げてくれている――っ！！
3588 = "Mọi người đều háo hức, như đang chờ đợi lời tôi nói\nngước nhìn lên tôi——っ!!"
# monologue
# JP: （パシャっ）
3973 = "（Tách）"
# 【ハチロク】
# display as 八六
# JP: 「あら、もう撮られてしまったのですか？」
2296 = "「Ô kìa, ngài đã chụp rồi sao ạ?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、『ちーず』っていってませんよぉ」
2805 = "「Reina còn chưa kịp nói 'Cheese' mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「もう撮った」
2660 = "「Tôi chụp xong rồi.」"
# monologue
# JP: 背面モニタですぐ確認する。\nイメージ通り――いや、それ以上だ。
3582 = "Tôi liền xem lại trên màn hình phía sau máy ảnh.\nĐúng như hình dung——không, còn tuyệt vời hơn thế."
# 【双鉄】
# display as 雙鐵
# JP: 「さぁこれからと意識して表情をつくってもらうより、\nずっと素敵なわくわくを、カメラに収められたと思う」
2632 = "「Thay vì để mọi người cố ý tạo biểu cảm chuẩn bị chụp,\ntôi nghĩ mình đã ghi lại được khoảnh khắc háo hức tự nhiên và tuyệt vời hơn nhiều.」"
# 【ハチロク】
# display as 八六
# JP: 「わくわく、でございますか」
2518 = "「Háo hức, sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2353 = "「嗯」" 
# monologue
# JP: オウム返しされ、気付かされる。ああ、そうだ。\n列車の旅は、レールの先は、「わくわく」なのだ。
3805 = "Nghe Hachiroku lặp lại lời mình, tôi mới nhận ra. À, đúng vậy.\nChuyến đi bằng tàu hỏa, điểm đến phía trước đường ray, chính là sự \"háo hức\"."
# monologue
# JP: 僕らがこれから走らせる、その列車だけにとどまらず、\n全ての列車は――未来へ、僕らを運ぶのだ。
3260 = "Không chỉ riêng chuyến tàu mà chúng tôi sắp cho chạy,\nmà tất cả các chuyến tàu——đều chở chúng ta hướng về tương lai."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが納得できる一枚が撮れたなら、\nわたしは、それでオッケーだって思います」
2670 = "「Nếu anh Soutetsu đã chụp được một bức ưng ý,\nthì tôi thấy vậy là quá ổn rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「同感だね。どんな写真か、楽しみだ」
2264 = "「Đồng cảm. Thật mong chờ không biết bức ảnh trông thế nào.」"
# 【ふかみ】
# display as 深美
# JP: 「わ、わたしも、緊張しちゃったら、\nきっと、ヘンな顔しちゃってたって思うです。から」
2540 = "「E-Em cũng nghĩ, nếu mà căng thẳng,\nchắc chắn em sẽ làm ra biểu cảm kỳ quặc mất. Ạ......」"
# 【日々姫】
# display as 日日姬
# JP: 「あははっ！　なら、そのヘンな顔も撮っちゃお？\nね、にぃに。『チーズ』って言ってで、もう一枚！」
2327 = "「A haha! Vậy thì chụp luôn cả biểu cảm kỳ quặc đó đi?\nNè anh hai. Nói 'Cheese' rồi chụp thêm tấm nữa nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。『チーズ』」
2692 = "「Được thôi. 'Cheese'.」"
# 【ふかみ】
# display as 深美
# JP: 「えっ！？　えええっ！！？」
2300 = "「Hả!? Hảảả!!?」"
# monologue
# JP: （パシャっ！！）
3972 = "（Tách!!）"
# 【ふかみ】
# display as 深美
# JP: 「ああ！　ほんとに撮った！？\nやだやだ、いまの、消してくださぁい」
2330 = "「A! Anh chụp thật luôn á!?\nKhông chịu đâu, xóa tấm vừa rồi đi ạ.」"
# 【真闇】
# display as 真闇
# JP: 「うふふっ。よかポスターのできそうね」
2273 = "「Ufufu. Chắc sẽ thành một tấm áp phích đẹp lắm đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2353 = "「嗯」" 
# 【凪】
# display as 凪
# JP: 「ばってん、これじゃにーさんが写らんばい！」
2258 = "「Nhưng mà, như vậy thì anh hai không có trong ảnh đâu nè!」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 2328 = "「啊！」" 
# 【ふかみ】
# display as 深美
# JP: 「ちょっ！？　凪ちゃん」
2872 = "「Khoan đã!? Nagi.」"
# monologue
# JP: 凪の無邪気な一言が、みなの笑顔を一瞬で消す。\n困惑と、沈鬱と――両者が混じった顔になる。
3388 = "Câu nói ngây thơ của Nagi khiến nụ cười của mọi người tắt ngấm trong chớp mắt.\nKhuôn mặt họ lộ rõ vẻ bối rối xen lẫn u buồn."
# 【れいな】
# display as 玲奈
# JP: 「はぅぅ～」
2288 = "「Hauu~」"
# monologue
# JP: ――れいなさえもだ。それが、嬉しい。\nひときわ無邪気な凪以外、みながわかってくれている。
1486 = "——Ngay cả Reina cũng vậy. Điều đó làm tôi thấy vui.\nNgoài Nagi ngây thơ ra, mọi người đều hiểu rõ lý do."
# 【双鉄】
# display as 雙鐵
# JP: 「……今の僕が入っては、絵にならんのだ」
1587 = "「……Nếu tôi vào chụp lúc này, sẽ phá hỏng bức ảnh mất.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんこつなかとよー！\nにーさん、顔はいわゆるイケメンばい！」
2653 = "「Đâu có chuyện đó đâu nè!\nKhuôn mặt của anh hai cũng được coi là soái ca đó nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「顔の造作のことではなく、な」
2964 = "「Không phải vấn đề về ngoại hình đâu.」"
# monologue
# JP: みなが抱いているわくわくを、それぞれの未来への希望を。\n恐らく僕は、同じレベルで持ててはいない。
3909 = "Sự háo hức mà mọi người đang ôm ấp, niềm hy vọng về tương lai của mỗi người.\nCó lẽ tôi không có được ở cùng một mức độ như vậy."
# monologue
# JP: 未来を望むひかりで瞳を、同じようには輝かせ得ない。\nそうは出来ない曇りを抱え、晴らせずいるから。
3556 = "Tôi không thể để ánh sáng hy vọng vào tương lai lấp lánh trong đôi mắt mình như mọi người.\nBởi tôi mang trong mình đám mây mù không thể xua tan, khiến tôi không thể làm được điều đó."
# 【凪】
# display as 凪
# JP: 「服だって、別におかしくなかとよ？」
2256 = "「Quần áo cũng đâu có gì kỳ lạ đâu nè?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そうなのだが、な」
1611 = "「……Đúng là vậy, nhưng mà.」"
# monologue
# JP: なんと説明したものか。
3574 = "Nên giải thích thế nào đây."
# monologue
# JP: 余計なことをふきこんで、凪特有の無邪気さを、\nかけがえない長所を曇らせたくはないし――
3828 = "Tôi không muốn nói những lời dư thừa, làm vẩn đục sự ngây thơ đặc trưng của Nagi,\nưu điểm không thể thay thế của em ấy――"
# 【真闇】
# display as 真闇
# JP: 「『今は』入れんだけよね？　双ちゃん」
2449 = "「'Bây giờ' mới không thể vào chụp thôi đúng không? Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。うん。\nそうだな、今は、だ」
2335 = "「À. Ừm.\nĐúng vậy, chỉ là bây giờ thôi.」"
# monologue
# JP: 真闇姉だ。\n僕が心底困ったときには、必ずするりと助けてくれる。
3748 = "Là chị Mayami.\nMỗi khi tôi thực sự bối rối, chị ấy luôn nhẹ nhàng giúp đỡ."
# 【凪】
# display as 凪
# JP: 「なら、いつになったら入れると？」
2993 = "「Vậy, chừng nào anh mới vào chụp được á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――そうだな。\n僕らの列車が走ったときだ」
2969 = "「Chuyện đó――ừm.\nLà khi chuyến tàu của chúng ta khởi hành.」"
# 【ハチロク】
# display as 全員
# JP: 「ああ」
# 2325 = "「啊」" 
# monologue
# JP: 問われて答えたその声に、\nみなが、安堵の息を吐く。
3444 = "Nghe câu trả lời của tôi,\nmọi người đều thở phào nhẹ nhõm."
# monologue
# JP: それも、嬉しい。\n必ずできると、だから、思える。
3903 = "Điều đó cũng khiến tôi thấy vui.\nBởi vì, tôi cảm thấy chắc chắn chúng tôi sẽ làm được."
# 【凪】
# display as 凪
# JP: 「ならにーさん！\n凪さまとそいば約束するばい！！」
3001 = "「Vậy anh hai!\nMóc ngoéo hứa với Nagi-sama đi nè!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「よかろう」
2234 = "「Được thôi.」"
# monologue
# JP: 脚立を降りれば、\n凪がゆびきりげんまんと、僕に小指を差し出してくる。
3548 = "Vừa bước xuống thang,\nNagi đã chìa ngón út ra đòi móc ngoéo hứa hẹn với tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ずるか！　にぃに、わたしとも」
2410 = "「Ăn gian quá! Anh hai, em nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　わたしも！\n双鉄くんと、大事な約束、したいです」
2332 = "「A! Tôi nữa!\nTôi cũng muốn lập lời hứa quan trọng này với anh Soutetsu.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなも、ポーレットといっしょにしますぅ」
2801 = "「Reina cũng muốn hứa cùng với chị Paulette nữa~」"
# 【ふかみ】
# display as 深美
# JP: 「わたし、わたしも混ぜてほしい、です！」
2985 = "「Cho, cho em tham gia với, ạ!」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふ、ボクも。\nこの約束は、本当に大事な約束だろうし」
2275 = "「Fufu, tôi nữa.\nVì đây hẳn là một lời hứa thực sự quan trọng mà.」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら、おねーちゃんもまざっちゃお」
2081 = "「Vậy thì, chị cũng tham gia luôn nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば」
2987 = "「Nếu vậy thì.」"
# monologue
# JP: 手を差し出す。\nみんなが描く、輪の中心に。
3535 = "Tôi đưa tay ra.\nVào chính giữa vòng tròn mà mọi người tạo nên."
# monologue
# JP: その手の上に次々と、小さな手たちが重なってくる。
3442 = "Lần lượt, những bàn tay nhỏ bé xếp chồng lên tay tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクもどうだ？　イヤでなければ」
2161 = "「Hachiroku cũng tham gia chứ? Nếu cô không phiền.」"
# 【ハチロク】
# display as 八六
# JP: 「イヤなどと、そのようなことは決して！\nけれど、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、\x%l機関士;#00ffc040;機関士%l;#;に約束を強いるなど」
2548 = "「Không phiền chút nào, tuyệt đối không ạ!\nThế nhưng, một \\x%lレイルロオド;#00ffc040;Railord%l;#; sao có thể ép buộc \\x%l機関士;#00ffc040;người lái tàu%l;#; hứa hẹn được...」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と[マスター,2]機関士でもあるが、それと同時に、\n僕らは仕事の相棒で、共に暮らす家族でもあるだろう？」
2596 = "「Đúng là \\x%lレイルロオド;#00ffc040;Railord%l;#; và Master, nhưng đồng thời,\nchúng ta cũng là đối tác công việc, là gia đình sống cùng nhau mà?」"
# 【ハチロク】
# display as 八六
# JP: 「――はいっ！　左様でございますね！\nそれでは、双鉄様の、家族として、相棒として」
1522 = "「——Vâng! Ngài nói đúng ạ!\nVậy thì, với tư cách là gia đình, là đối tác của ngài Soutetsu...」"
# monologue
# JP: ハチロクはいそいそと手袋を外し、\nその手を重なる手の上へ。
3374 = "Hachiroku hăm hở tháo găng tay ra,\nđặt tay mình lên trên những bàn tay đang xếp chồng."
# 【双鉄】
# display as 雙鐵
# JP: 「では、僕。右田双鉄は、ここにいる皆に約束しよう。\n僕は必ず、僕らの列車、未来行き列車を走らせて――」
3026 = "「Vậy, tôi. Migita Soutetsu, xin hứa với tất cả mọi người ở đây.\nTôi nhất định sẽ làm cho chuyến tàu của chúng ta, chuyến tàu hướng tới tương lai, lăn bánh——」"
# monologue
# JP: ふっと、胸の中でなにかがざわめく。\nそれは傷の痛みでもあり、それだけではない熱も帯びてる。
3790 = "Chợt, có thứ gì đó xao động trong lồng ngực.\nĐó vừa là nỗi đau của vết thương, vừa mang theo một sức nóng vượt xa hơn thế."
# 【双鉄】
# display as 雙鐵
# JP: 「その暁には、笑顔で――笑顔で！\n皆とともに、きっと写真におさめてもらおう」
2183 = "「Vào khoảnh khắc ấy, tôi sẽ mỉm cười——chắc chắn sẽ mỉm cười!\nVà chụp một bức ảnh cùng với mọi người.」"
# 【凪】
# display as 凪
# JP: 「なら、指切りばい！！\nあれ？　指？？」
2658 = "「Vậy thì, ngoéo tay nào!!\nỦa? Ngón tay??」"
# 【ふかみ】
# display as 深美
# JP: 「重ねてるの手だから、『手ぇきった』って――\nやだ！　そんなの縁起でもないっ」
2589 = "「Vì đang xếp tay lên nhau, nên nói là 'chặt tay'——\nKhông chịu đâu! Nghe xui xẻo quá đi.」"
# 【稀咲】
# display as 稀咲
# JP: 「『手形を切る』なら通常の商行為だけれど……\n不渡りの可能性も内包してしまうし、語呂もよくない」
2127 = "「Nếu là 'Ký phát kỳ phiếu' thì là hành vi thương mại bình thường, nhưng mà...\nNó cũng bao hàm khả năng không thanh toán được, mà nghe cũng không xuôi tai lắm.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、切りたいのってケーキくらいですぅ」
2802 = "「Reina chỉ muốn cắt bánh kem thôi à~」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうねれいな。確かにあんまり、切って縁起がいいもの\n……って、わ。考えるとこれ、結構むつかしいかも」
2712 = "「Đúng vậy nhỉ Reina. Quả thật, cắt thứ gì mà mang lại điềm lành thì...\n...Á. Suy nghĩ kỹ thì có vẻ khá khó đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「……このようなときには、\n『[エイエイオウ,4]曳・叡・王がふさわしいかと存じます』」
1608 = "「……Trong những lúc thế này,\ntôi nghĩ hô 'Ei ei ou' là thích hợp nhất ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、さっすがハチロク！」
2333 = "「A, đúng là Hachiroku có khác!」"
# 【真闇】
# display as 真闇
# JP: 「そーね。双ちゃんに、なにかハッパばかけてもらって」
2705 = "「Đúng thế. Sou-chan, hô hào khích lệ mọi người đi nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2695 = "「Đã rõ.」"
# monologue
# JP: 言えばグっと、再び手に手に力がこもる。
3865 = "Vừa dứt lời, lực lại truyền vào những bàn tay đang nắm chặt."
# monologue
# JP: 悪くない――\n罰則ではなく信頼で、僕は約束を縛ってもらう。
3268 = "Không tệ――\nTôi được ràng buộc bởi lời hứa bằng niềm tin, chứ không phải hình phạt."
# 【双鉄】
# display as 雙鐵
# JP: 「『御一夜鉄道未来行き列車を、必ずこの手で。\n僕らの重ねたこの手できっと！　走らせよう！』」
1550 = "「'Chuyến tàu hướng tới tương lai của Đường sắt Ohito, nhất định bằng đôi tay này.\nBằng những đôi tay đang đan vào nhau này, chắc chắn! Sẽ lăn bánh!'」"
# monologue
# JP: そうして大きく息を吸い！
3690 = "Rồi tôi hít một hơi thật sâu!"
# 【双鉄】
# display as 雙鐵
# JP: 「えい！　えい！」
2036 = "「Ei! Ei!」"
# 【ハチロク】
# display as 全員
# JP: 「おー！」
2042 = "「Ou!」"
