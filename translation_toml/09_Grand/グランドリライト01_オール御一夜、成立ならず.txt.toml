[script]
# lines: 673 
# 【日々姫】
# display as 日日姬
# JP: 「あの、にぃ――んんっ、兄さん？\n\x%l機関助士;#00ffc040;機関助士%l;#;って、兄さんがいつも練習している――」
2913 = "「À này, anh hai——ưm, anh trai?\n\\x%l機関助士;#00ffc040;Phụ lái tàu%l;#; là, cái mà\nanh luôn luyện tập đó hả——」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、\x%l投炭;#00ffc040;投炭%l;#;だな。\nそう。あれをメインに、機関車の走行を助ける仕事だ」
2439 = "「À, \\x%l投炭;#00ffc040;thêm than%l;#; nhỉ.\nĐúng vậy. Đó là công việc chủ\nyếu hỗ trợ việc chạy đầu máy xe lửa.」"

# 【日々姫】
# display as 日日姬
# JP: 「……練習すれば、どうでしょう？\nあれは、私にも出来ますか？」
1588 = "「……Nếu em luyện tập, thì sao nhỉ?\nCái đó,\nem cũng có thể làm được chứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「できるな」
2894 = "「Được chứ.」"

# monologue
# JP: そこは考えるまでもない。\n日々姫は文武両道なうえ、努力を惜しまぬ性格だから。
3902 = "Chuyện đó thì không cần phải nghĩ.\nBởi vì\nHibiki văn võ song toàn, lại còn có tính\ncách không ngại nỗ lực mà."

# monologue
# JP: いや――これこそ本当の盲点か？\n体格的にも、日々姫なら十分に小柄なのだし――
3797 = "Không——đây mới chính là điểm mù thực sự\nsao?\nVề mặt thể cách, nếu là Hibiki thì\ncũng đủ nhỏ nhắn——"

# 【日々姫】
# display as 日日姬
# JP: 「なら、私。練習してみて、できそうだったら、\nにぃに――んんっ――兄さんの、\x%l機関助士;#00ffc040;機関助士%l;#;になります」
3011 = "「Vậy thì, em. Sẽ thử luyện tập xem sao,\nnếu có vẻ làm được,\nthì em sẽ trở thành \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;\ncủa anh hai——ưm——anh trai.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、それは助かる」
2713 = "「Vậy sao, thế thì giúp được nhiều lắm\nđấy.」"

# monologue
# JP: 僕のではなく、8620のという方がより正しいが、\nそこまで細かなことを気にしても仕方がない。
3935 = "Đúng hơn là của 8620 chứ không phải của\ntôi,\nnhưng có bận tâm đến những chi tiết\nnhỏ nhặt như vậy cũng chẳng ích gì."

# monologue
# JP: 重要なのは、これで8620の安全な営業運転へ、\n更に一歩、大きく近づけたということだ。
3926 = "Điều quan trọng là, với việc này, chúng ta\nđã tiến thêm một bước lớn nữa,\nđến việc\nvận hành kinh doanh an toàn cho 8620."

# 【日々姫】
# display as 日日姬
# JP: 「ただ……ええと。\n条件づけとか、そういうのじゃ全然ないんだけど」
2226 = "「Chỉ là……ờm.\nKhông phải là ra điều kiện\nhay gì đâu nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん？　何だ。\n希望があるなら、遠慮したりせず言ってくれ」
2310 = "「Hửm? Gì vậy.\nNếu có mong muốn gì, cứ nói\nra đừng ngại.」"

# 【日々姫】
# display as 日日姬
# JP: 「えと、手段と目的が少し混ざっちゃってるみたいに、\n今の兄さん、見えるかもって」
2269 = "「Ờm, anh trai bây giờ, có vẻ như\nđang hơi\nnhầm lẫn giữa phương tiện và mục đích ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2305 = "「Hừm.」"

# monologue
# JP: 言われてみれば、その傾向はあるかもしれぬ。
3290 = "Nghe em ấy nói vậy, có lẽ tôi cũng có xu\nhướng đó thật."

# monologue
# JP: 鉄道は観光振興の、エアクラ工場誘致撤回のための\n手段のひとつにすぎぬはず。だが――
3501 = "Đường sắt đáng lẽ chỉ là một trong những\nphương tiện,\nđể chấn hưng du lịch, và thu\nhồi việc thu hút nhà máy Aircra. Nhưng\nmà——"

# 【日々姫】
# display as 日日姬
# JP: 「御一夜のことをもっと知ったほうがいいと思うの。\n兄さんが、この町を本当に復興させたいんなら」
2418 = "「Em nghĩ anh nên tìm hiểu thêm về\nOhimitera.\nNếu anh thực sự muốn phục hưng\nthị trấn này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「具体的には、どうすればいい？」
2170 = "「Cụ thể thì, nên làm thế nào?」"

# 【日々姫】
# display as 日日姬
# JP: 「酒蔵のことも、私の看板描きやなにかも、\n御一夜の人と密着するお仕事でしょ？　だから――」
3034 = "「Chuyện xưởng rượu, hay việc vẽ biển hiệu\ncủa em cũng vậy,\nđều là những công việc\ngắn bó mật thiết với người dân Ohimitera\nđúng không? Vì vậy——」"

# 【双鉄】
# display as 雙鐵
# JP: 「家事やお前の手伝いに、もう少し目を向ければ、\nよりバランスがとれるかもしれぬというわけか」
2421 = "「Nếu anh để mắt thêm một chút đến việc nhà\nvà việc phụ giúp em,\nthì có lẽ sẽ cân bằng\nhơn, ý em là vậy sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「うん」
2353 = "「Vâng.」"

# monologue
# JP: ほっとしたような日々姫の笑顔。
3636 = "Nụ cười như trút được gánh nặng của\nHibiki."

# monologue
# JP: 言い出したくて言い出せない、\nいつもの日々姫が出ていたのかと、今さら気付く。
3281 = "Đến giờ tôi mới nhận ra, Hibiki của mọi\nkhi,\nmuốn nói mà không thể nói ra, lại\nxuất hiện rồi."

# 【ポーレット】
# display as 波萊特
# JP: 「あのっ！　わたしも、それだったら希望っていうか、\n意見っていうか――」
3021 = "「À này! Nếu vậy thì tôi cũng có mong muốn,\nhay đúng hơn là ý kiến——」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。言ってみてくれ」
2361 = "「Ừm. Cứ nói thử xem.」"

# monologue
# JP: 走行試験の成功で、テンションがみなあがっている。\n恐らくは、酒を飲んでいるのと似たような状態だろう。
3823 = "Sự thành công của cuộc chạy thử, khiến\ntinh thần của mọi người đều đang dâng cao.\nCó lẽ, trạng thái này cũng giống như lúc\nuống rượu vậy."

# monologue
# JP: こういうときこそ、忌憚の無い意見が飛び出してくる。\n聞き逃さぬよう集中する。
3434 = "Chính những lúc thế này, những ý kiến\nthẳng thắn mới bật ra.\nTôi tập trung để\nkhông bỏ sót lời nào."

# 【ポーレット】
# display as 波萊特
# JP: 「基本線は日々姫ちゃんと同じなんですけど、\nアプローチ、別のやりかたの方がもっといいかもって」
2387 = "「Đường lối cơ bản thì giống với em Hibiki,\nnhưng cách tiếp cận, có lẽ làm theo cách\nkhác sẽ tốt hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「別のやり方？」
2175 = "「Cách khác sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「例えば、双鉄くんに政策秘書に入ってもらって、\n市政のレベルで観光振興に力を注いでもらう、とか」
2756 = "「Ví dụ như, nhờ cậu Soutetsu làm thư ký\nchính sách,\nvà tập trung sức lực vào việc\nchấn hưng du lịch ở cấp độ chính quyền\nthành phố, chẳng hạn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2373 = "「Hô.」"

# monologue
# JP: 日々姫は地道なボトムアップ。\nポーレットは一気のトップダウン。
3626 = "Hibiki là kiểu đi từ dưới lên một cách\nvững chắc.\nPaulette là kiểu đi từ trên\nxuống một mạch."

# monologue
# JP: 同じく観光振興、御一夜再生を目的として、\nしかし手段は百八十度異なっている。
3936 = "Cùng với mục đích chấn hưng du lịch, tái\nthiết Ohimitera,\nnhưng phương tiện lại\nkhác nhau 180 độ."

# 【ポーレット】
# display as 波萊特
# JP: 「今回の試験走行までで、御一夜のキーマンが何人も、\n双鉄くんを信頼してくれたと思いますし、その人脈も」
2181 = "「Đến cuộc chạy thử lần này, tôi nghĩ đã có\nnhiều nhân vật chủ chốt của Ohimitera,\ntin\ntưởng cậu Soutetsu, và cả những mối quan\nhệ đó nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、市政という長いテコを使えば、作用も大きい。\nポーレットのいうこともまた、理解はできるな」
2360 = "「Hừm, nếu sử dụng đòn bẩy dài là chính\nquyền thành phố, thì tác dụng cũng sẽ lớn.\nNhững gì Paulette nói, cũng có thể hiểu\nđược.」"

# monologue
# JP: ぷっと、ポーレットの頬が膨れる。
3672 = "Paulette phồng má lên cái phựt."

# monologue
# JP: こんなに飾らぬ表情は、初めて見る気がして何故か、\n少しドキリとさせられる。
3580 = "Có cảm giác như đây là lần đầu tiên tôi\nnhìn thấy một biểu cảm không che đậy như\nvậy, không hiểu sao,\nlại khiến tôi hơi\ngiật mình."

# 【ポーレット】
# display as 波萊特
# JP: 「理解“は”、ですか？」
2224 = "「“Có thể” hiểu được, sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\n日々姫の意見も、同様に理解できるからな」
2343 = "「Ừm.\nVì ý kiến của Hibiki, cũng có thể\nhiểu được tương tự mà.」"

# 【日々姫】
# display as 日日姬
# JP: 「……にぃにぃ」
1609 = "「……Anh hai.」"

# monologue
# JP: 安心したような日々姫の声。\nそこにぽちゃん、と、密やかな水音が重なってくる。
3618 = "Giọng nói như yên tâm của Hibiki.\nHòa cùng\nvới đó là tiếng nước tĩnh lặng, róc rách."

# 【ハチロク】
# display as 八六
# JP: 「確かに、お二方のご意見はともに、\n一理も二理もあるものですね」
2846 = "「Quả thực, ý kiến của cả hai người,\nđều có\ncái lý của nó nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
2159 = "「Hachiroku.」"

# monologue
# JP: れいなを洗ってやり終えたらしい。
3451 = "Có vẻ như cô ấy đã tắm rửa xong cho Reina."

# monologue
# JP: ハチロクは、達成感を顔に出し、\n風呂にしずしず入ると同時、僕の膝の上へと座る。
3366 = "Hachiroku, với vẻ mặt đầy cảm giác thành\ntựu,\ntừ từ bước vào bồn tắm, đồng thời\nngồi lên đùi tôi."

# 【ハチロク】
# display as 八六
# JP: 「けれど、地道なご縁づくりは日々姫の、\n市政はそれこそ、ポーレット様の得意分野かと」
2098 = "「Nhưng mà, việc tạo dựng các mối quan hệ\nmột cách vững chắc là lĩnh vực sở trường\ncủa Hibiki,\ncòn chính quyền thành phố thì\nlại là của cô Paulette.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにな」
2844 = "「Quả thực là vậy.」"

# monologue
# JP: 地道に縁を築くこと。\n市政という道具を振り回すこと。
3647 = "Tạo dựng các mối quan hệ một cách vững\nchắc.\nSử dụng công cụ mang tên chính quyền\nthành phố."

# monologue
# JP: それは日々姫とポーレット、それぞれが積み重ねた技。\n僕にいきなり学べるほどに、容易いものとも思えない。
3904 = "Đó là những kỹ năng mà Hibiki và Paulette,\nmỗi người đã tích lũy được.\nTôi không nghĩ\nnó dễ dàng đến mức tôi có thể học được\nngay lập tức."

# 【ハチロク】
# display as 八六
# JP: 「餅は餅屋、汽車は汽車屋です、双鉄様。\n双鉄様の\x%l機関士;#00ffc040;機関士%l;#;としての適正の高さは、明白です」
2908 = "「Việc nào ra việc nấy, tàu hỏa thì để cho\nngười làm tàu hỏa, thưa ngài Soutetsu.\nSự\nphù hợp cao của ngài Soutetsu với tư cách\nlà một \\x%l機関士;#00ffc040;lái tàu%l;#;, là điều hiển nhiên.」"

# monologue
# JP: まったく迷いのない言葉。\n率直すぎる賞賛を、単純に嬉しく感じてしまう。
3363 = "Những lời nói hoàn toàn không chút do dự.\nTôi chỉ đơn thuần cảm thấy vui mừng trước\nlời khen ngợi quá đỗi thẳng thắn đó."

# 【ハチロク】
# display as 八六
# JP: 「ほんの半年。それだけあれば双鉄様も、清美\x%l機関士;#00ffc040;機関士%l;\n#;同様、\x%l機関助士;#00ffc040;機関助士%l;#;なしでの機関車運用も可能となります」
3059 = "「Chỉ nửa năm thôi. Có chừng đó thời gian\nthì ngài Soutetsu cũng,\ngiống như \\x%l機関士;#00ffc040;lái tàu%l;#; Kiyomi,\ncó thể vận hành đầu máy xe lửa mà không\ncần \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;.」"

# monologue
# JP: きっぱりとそう言い切ってハチロクは、\n僕、日々姫、ポーレットとじゅんじゅん見渡す。
3352 = "Hachiroku khẳng định một cách dứt khoát\nnhư vậy,\nrồi lần lượt nhìn sang tôi,\nHibiki, và Paulette."

# 【ハチロク】
# display as 八六
# JP: 「故に、双鉄様は今のレールをご[まいしん,1]邁進ください。\n双鉄様が[みち]路を開けば、必ず皆がその正しさに続きます」
2378 = "「Do đó, xin ngài Soutetsu hãy dũng cảm\ntiến bước trên đường ray hiện tại.\nNếu\nngài Soutetsu mở đường, chắc chắn mọi\nngười sẽ đi theo sự đúng đắn đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「極端な意見ではあるが、しかし、理もある」
3056 = "「Tuy là một ý kiến cực đoan, nhưng cũng có\nlý.」"

# monologue
# JP: ハチロクの言は、一点突破で高いところ――\n誰もが目にするところに、旗を掲げろということだ。
3359 = "Lời của Hachiroku là, đột phá tại một điểm\nvà tiến lên vị trí cao——\nhãy giương cao\nngọn cờ ở nơi mà mọi người đều có thể nhìn\nthấy."

# monologue
# JP: その旗が正しき道筋を示すなら、\n目にした者は、必ず後に続いてくれるはずだ、と。
3814 = "Nếu ngọn cờ đó chỉ ra con đường đúng đắn,\nnhững người nhìn thấy nó, chắc chắn sẽ\ntheo sau."

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 2305 = "「唔」" 

# monologue
# JP: 日々姫、ポーレット、ハチロク。
3616 = "Hibiki, Paulette, Hachiroku."

# monologue
# JP: それぞれの意見を、そのまま汲むことはせぬにせよ、\nこれからの方針の参考とすることは大いに有用だろう。
3420 = "Dù không hoàn toàn tiếp thu ý kiến của\ntừng người,\nnhưng việc dùng làm tài liệu\ntham khảo cho phương hướng sắp tới sẽ rất\nhữu ích."

# monologue
# JP: （だが――）
3964 = "（Nhưng mà——）"

# monologue
# JP: 日々姫の言った、『手段と目的』。\n――その一言が、鼓膜の奥にこびりつく。
3621 = "Nếu đặt tầm nhìn ở một mức độ cao hơn nữa,\ncó lẽ tôi thực sự,\nđã nhầm lẫn giữa\n『phương tiện và mục đích』 chăng?"

# monologue
# JP: もう一段階高いレベルに目線を置けば、僕はやはり、\n『手段と目的』を取り違えているのではなかろうか？
3462 = "（Thu hồi việc thu hút nhà máy Aircra, và\nbảo vệ nguồn tài nguyên nước——\nLấy đó làm\nmục đích——đích đến, liệu có được không?）"

# monologue
# JP: （エアクラ工場誘致撤回と、水資源の保護――\nそれを目的――ゴールと定めて良いのだろうか？）
3985 = "Không, không phải. Ngay cả điều đó cũng\nchỉ là một quá trình——\nchỉ là một bước đệm\nđể vực dậy Ohimitera mà thôi."

# monologue
# JP: いや、違う。それさえもやはり一つの過程――\n御一夜を立て直すためのステップであるにすぎない。
3278 = "Dù không xây dựng nhà máy Aircra, và bảo\nvệ được nguồn nước——\nnhưng nếu công nghiệp\nvà đường sắt không phục sinh, con người\nphải chịu đói thì cũng vô nghĩa."

# monologue
# JP: エアクラ工場が建設されず、水を守って――\n産業も鉄道も復活せずに、人が飢えては意味が無い。
3270 = "（Sự hợp tác của khu vực, việc tận dụng\nchính trị, giương cao ngọn cờ——\nDù có tận\ndụng tất cả những thứ đó, vẫn là chưa đủ.）"

# monologue
# JP: （地域の協力、政治の活用、旗印の掲示――\nそれら全てを活用しても、まだまだ足りない）
3966 = "Hai cha con Houshou Mototada, Houshou\nKisaki vì lý do gì,\nmà lại cho rằng việc\nthu hút nhà máy Aircra là tốt."

# monologue
# JP: 宝生元忠、宝生稀咲親子がなにゆえ、\nエアクラ工場誘致を良しとしているのか。
3475 = "Thứ mà việc thu hút nhà máy có, nhưng việc\nchấn hưng khu vực của chúng tôi lại không\ncó là gì——\nĐiều đó, tôi vẫn chưa suy nghĩ\nthấu đáo."

# monologue
# JP: 僕らの地域振興に無く、工場誘致が持つ物は何か――\nそこをまだ、僕は考え尽くしていない。
3482 = "（Rào）"

# monologue
# JP: （ざばっ）
3975 = "（Rào）"

# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ！」
2371 = "「Phù!」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
3063 = "「Ngài Soutetsu?」"

# monologue
# JP: 両手に掬った湯を叩きつけるようにして顔を洗う。
3558 = "Tôi vốc nước bằng cả hai tay rồi hất mạnh\nlên mặt để rửa."

# monologue
# JP: そうだ、ここで焦らず洗い直そう。\n8620が再び走り出した今こそ、地に足をつけ。
3658 = "Đúng vậy, đừng vội vàng mà hãy xem xét lại\ntừ đầu.\nNgay lúc 8620 đã bắt đầu chạy lại\nnày, phải thật vững bước."

# 【双鉄】
# display as 雙鐵
# JP: 「時間が欲しい。丸一日で構わない。\n出来れば明後日――この全員で会議を持てるだろうか」
2637 = "「Tôi cần thời gian. Trọn một ngày cũng\nđược.\nNếu có thể thì ngày mốt——chúng ta có\nthể tổ chức một cuộc họp với tất cả mọi\nngười ở đây được không.」"

# 【ポーレット】
# display as 波萊特
# JP: 「夕方の乗務が終わった……\nそうですね、[じゅうはちじ,4]１８：００からでどうでしょう？」
2132 = "「Sau khi kết thúc ca trực buổi chiều……\nĐúng rồi nhỉ, bắt đầu từ 18:00 thì sao?」"

# 【れいな】
# display as 玲奈
# JP: 「れいな、ポーレットと一緒に参加しますよぉ」
2800 = "「Reina, sẽ tham gia cùng với chị Paulette\nđó nha~」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしも当然ながら、双鉄様にご一緒します」
2558 = "「Tôi cũng đương nhiên, sẽ đi cùng với ngài\nSoutetsu.」"

# 【凪】
# display as 凪
# JP: 「おもしろそうばい！　参加するばい！」
2406 = "「Có vẻ thú vị đấy! Nagi cũng tham gia!」"

# 【ふかみ】
# display as 深美
# JP: 「え、ええと――\nおじゃまじゃないなら、参加したい。です」
2324 = "「A, ờm——\nNếu không phiền, thì em cũng muốn\ntham gia. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫はどうだ？」
2683 = "「Hibiki thì sao?」"

# monologue
# JP: 声をかければ、日々姫は少し驚いたような顔をする。
3632 = "Nghe tôi hỏi, Hibiki lộ vẻ mặt hơi ngạc\nnhiên."

# 【日々姫】
# display as 日日姬
# JP: 「え？　別に、普通に参加するつもりだけど」
2271 = "「Hả? Không có gì, đương nhiên là em định\ntham gia rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば良かった。で、だ。出来ればで構わんのだが\n――稀咲達も誘ってみてはくれんか？」
3003 = "「Vậy thì tốt. Và này, nếu được thì cũng\nkhông sao\n——em thử rủ cả nhóm Kisaki được\nkhông?」"

# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩？　っていうか……達、って？」
2863 = "「Đàn chị Kisaki? Mà khoan……nhóm, là sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲に声をかけるとき――元忠氏と浦上さんにも\n会議参加を願えないかを稀咲から聞いて貰えないかと」
2354 = "「Khi rủ Kisaki——em nhờ Kisaki hỏi thử xem\nông Mototada và ông Uragami\ncó thể tham\ngia cuộc họp được không.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
2311 = "「A——」"

# monologue
# JP: ぽかんと、大きく開いた口。
3630 = "Cái miệng há hốc ra vì ngạc nhiên."

# monologue
# JP: それを日々姫はきゅっと閉じ、\n力強い目で僕を見、頷く。
3689 = "Hibiki mím chặt miệng lại,\nnhìn tôi bằng\nánh mắt mạnh mẽ, và gật đầu."

# 【日々姫】
# display as 日日姬
# JP: 「――わかった。\nにぃにがそうしたいなら、誘ってみるけん」
1528 = "「——Em hiểu rồi.\nNếu anh hai muốn vậy, em\nsẽ thử rủ xem sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2918 = "「Cảm ơn em.」"

# monologue
# JP: ならば僕からは真闇姉と蓑笠老人、赤井宮司に――\nそれにもちろん、登呂流湯のご主人も誘ってみよう。
3919 = "Vậy thì từ phía tôi, tôi sẽ rủ chị Mayami,\nông Minokasa, đền chủ Akai——\nvà tất nhiên,\ncả chủ nhân nhà tắm Tororyu-yu nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
2417 = "「Tốt!」"

# monologue
# JP: （ざばあっ！）
3974 = "（Rào!）"

# monologue
# JP: 動き出しの、いや、再始動の今。\n――恐らく今しか、チャンスはない。
3459 = "Lúc bắt đầu chuyển động, không, lúc khởi\nđộng lại như bây giờ.\n——Có lẽ chỉ có bây\ngiờ mới là cơ hội."

# monologue
# JP: エアクラ誘致、その一点で白と黒とを分け合うことない、\nオール御一夜で協力し合える、その体制を作るには。
3481 = "Để tạo ra một thể chế mà tất cả Ohimitera\ncó thể hợp tác với nhau,\nchứ không phân\nbiệt trắng đen chỉ vì vấn đề thu hút nhà\nmáy Aircra."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は先にあがらせてもらう。\nみなはゆっくり、今日の疲れを流していってくれ」
2601 = "「Tôi xin phép lên trước đây.\nMọi người cứ\nthong thả ngâm mình, xua tan đi sự mệt mỏi\ncủa ngày hôm nay nhé.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、にぃに！？　私もあがるとっ！」
2336 = "「A, anh hai!? Em cũng lên đây!」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。\nわたくしもこれ以上は湯あたりしてしまいそうです」
3062 = "「Ngài Soutetsu.\nTôi mà ngâm thêm nữa chắc\nsẽ bị say nước nóng mất.」"

# 【ポーレット】
# display as 波萊特
# JP: 「疲れ、もともとそれほどじゃないですし」
2630 = "「Sự mệt mỏi, vốn dĩ cũng không đến mức đó\nmà.」"

# 【れいな】
# display as 玲奈
# JP: 「ポーレット、もうあがるですかぁ？\nそれなら、れいなもあがりますよぉ」
2787 = "「Chị Paulette, chị lên rồi sao?\nVậy thì,\nReina cũng lên nha~」"

# 【ふかみ】
# display as 深美
# JP: 「わたし！　わたしもあがります。\nあの……えと――宿題、とか。あるです。し」
2986 = "「Em! Em cũng lên đây.\nÀ……ờm——bài tập về\nnhà, các thứ. Vẫn còn. Ạ.」"

# 【凪】
# display as 凪
# JP: 「みんなあがると？　それなら凪さま！\nこのひろーか湯船をひとりじめばーい！」
2395 = "「Mọi người lên hết à? Vậy thì Nagi đại\nnhân!\nSẽ độc chiếm cái bồn tắm rộng rãiiii\nnày đây!」"

# monologue
# JP: 凪を除いた全員が、ぞろぞろ風呂から――
3931 = "Tất cả mọi người ngoại trừ Nagi, lần lượt\nra khỏi bồn tắm——"

# 【凪】
# display as 凪
# JP: 「やっぱり一人はさみしかとばーい！！」
2983 = "「Quả nhiên một mình thì buồn tẻ quá đi\nmất!!」"

# monologue
# JP: 訂正、凪もだ。\n全員が風呂から上がろうとする。
3264 = "Đính chính, cả Nagi nữa.\nTất cả mọi người\nđều chuẩn bị ra khỏi bồn tắm."

# monologue
# JP: （だが――ひとまずは一人で考えねばな。\nそうせねば、皆のフラットな意見を聞き損ねてしまう）
3963 = "（Nhưng mà——trước mắt phải tự mình suy nghĩ\nđã.\nNếu không làm vậy, sẽ bỏ lỡ mất những\ný kiến khách quan của mọi người.）"

# monologue
# JP: 幸いにして、資料は文字通り、山のようにある。
3485 = "May mắn thay, tài liệu đúng nghĩa đen là\nchất cao như núi."

# monologue
# JP: （不出来でも、不十分でも構わない。\nとにかく、たたき台を作り、提案するんだ）
3979 = "（Dù không hoàn hảo, dù không đầy đủ cũng\nkhông sao.\nDù sao thì, cũng phải tạo ra\nmột bản nháp, và đưa ra đề xuất.）"

# monologue
# JP: 御一夜が積み重ねてきた歴史を、失敗を整頓し、\n僕が見てきた、教えてもらった現状を加味して――
3577 = "Sắp xếp lại lịch sử mà Ohimitera đã tích\nlũy, những thất bại đã trải qua,\nthêm vào\nđó là hiện trạng mà tôi đã nhìn thấy, đã\nđược chỉ dạy——"

# monologue
# JP: （そうして、小さくとも築くのだ）
3983 = "（Và rồi, dù nhỏ bé nhưng vẫn sẽ xây dựng\nnên.）"

# monologue
# JP: 御一夜復興のために一丸となる。\nオール御一夜――その体制の、[いしづえ]礎を。
3648 = "Đoàn kết thành một khối vì sự phục hưng\ncủa Ohimitera.\nAll Ohimitera——nền tảng của\nthể chế đó."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。旧帝鉄[ゆのい,1]湯医線関係の書籍と資料とは、\nこの程度かと存じます」
3061 = "「Ngài Soutetsu. Sách và tài liệu liên quan\nđến tuyến Yunoi của Teitetsu cũ,\ntôi nghĩ\nchỉ có chừng này thôi ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「御一夜の郷土史関係の本とか、\nここに置いておくんでよかと？」
2277 = "「Sách liên quan đến lịch sử địa phương của\nOhimitera,\nđể ở đây là được đúng không?」"

# 【真闇】
# display as 真闇
