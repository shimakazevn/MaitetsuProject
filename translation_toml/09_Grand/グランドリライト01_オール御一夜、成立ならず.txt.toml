# 2353 = "「嗯」" 

# 【稀咲】
# display as 稀咲
# JP: 「にも関わらず、誰も復線に着手しなかった。\nその理由は？」
2248 = "「Mặc dù vậy, nhưng lại không có ai bắt tay\nvào việc phục hồi tuyến đường.\nLý do là\ngì?」"

# 【双鉄】
# display as 雙鐵
# JP: 「復線があまりに困難であり、\nかつ、利権関係での対立を呼びやすいものだからだ」
2513 = "「Bởi vì việc phục hồi tuyến đường quá đỗi\nkhó khăn,\nvà hơn nữa, lại dễ gây ra xung\nđột về mặt lợi ích.」"

# monologue
# JP: いった瞬間、クっと稀咲が小さく笑う。
3529 = "Khoảnh khắc tôi vừa dứt lời, Kisaki bật\ncười khúc khích."

# 【稀咲】
# display as 稀咲
# JP: 「まぁ、確かにね。\nボクたちとキミたちも、現状では対立している」
2302 = "「Chà, quả thực là vậy nhỉ.\nChúng tôi và\ncác anh, trong tình hình hiện tại cũng\nđang đối lập nhau mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だが、調和できる。今回の復線が成れば、\nエアクラ工場立地の候補地も大きく広がる」
2101 = "「Nhưng mà, có thể dung hòa được. Nếu việc\nphục hồi tuyến đường lần này thành công,\ncác địa điểm ứng cử cho việc đặt nhà máy\nAircra cũng sẽ được mở rộng đáng kể.」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ――うん。そうか。\n貨物列車が走っているなら――」
2315 = "「A——ừm. Ra là vậy.\nNếu có tàu chở hàng\nchạy thì——」"

# 【浦上】
# display as 浦上
# JP: 「はい、例えば[せんだい,1]千内も、現実的な候補地に入ってきます」
2764 = "「Vâng, ví dụ như Sendai, cũng sẽ được đưa\nvào làm địa điểm ứng cử thực tế.」"

# 【稀咲】
# display as 稀咲
# JP: 「浦上」
2789 = "「Uragami.」"

# 【浦上】
# display as 浦上
# JP: 「失礼いたしました。\nあまりに興味深いお話だったもので、つい」
2510 = "「Thất lễ rồi.\nVì câu chuyện quá đỗi thú vị\nnên, tôi lỡ lời.」"

# monologue
# JP: 浦上さんが下げた頭を、\nけれども稀咲は、笑ってすぐに戻させる。
3679 = "Tuy nhiên, Kisaki cười và ngay lập tức bảo\nông Uragami,\nngười vừa cúi đầu, ngẩng lên."

# 【稀咲】
# display as 稀咲
# JP: 「構わない――というか、むしろ続けて欲しい。\n“興味深い”のは、エアクラ社としての見解？」
2057 = "「Không sao đâu——hay đúng hơn là, tôi muốn\nông cứ tiếp tục.\n“Thú vị” là, kiến giải\nvới tư cách của công ty Aircra sao?」"

# 【浦上】
# display as 浦上
# JP: 「今の段階では、個人としてのものです。\nですが――」
2807 = "「Ở giai đoạn hiện tại, thì đó là với tư\ncách cá nhân.\nNhưng mà——」"

# 【元忠】
# display as 元忠
# JP: 「エアクラ社としても興味を持つ話だろう。\nもしも実現可能性があるのなら――だが」
2508 = "「Chắc hẳn công ty Aircra cũng sẽ hứng thú\nvới câu chuyện này thôi.\nNếu như có khả\nnăng thực hiện được——thì mới nói.」"

# monologue
# JP: 宝生元忠。\n大立者の割り込みに、一瞬、言葉を呑まされる。
3474 = "Houshou Mototada.\nSự xen ngang của một\nnhân vật lớn, khiến tôi trong phút chốc\nphải nuốt lời."

# 【稀咲】
# display as 稀咲
# JP: 「頭取としては、実現可能性に乏しいと？」
2523 = "「Với tư cách là Giám đốc ngân hàng, ngài\ncho rằng khả năng thực hiện được là rất\nthấp sao?」"

# monologue
# JP: その一瞬に、稀咲が話を主導する。
3869 = "Chỉ trong khoảnh khắc đó, Kisaki đã nắm\nthế chủ đạo câu chuyện."

# 【稀咲】
# display as 稀咲
# JP: 「相当に規模の大きなビジネスに繋がりそうにも\n思うのですが」
2598 = "「Cháu nghĩ là nó có vẻ\nsẽ dẫn đến một vụ\nlàm ăn có quy mô khá lớn đấy chứ.」"

# monologue
# JP: （おや）
3969 = "（Ô.）"

# monologue
# JP: 稀咲が一転、\n僕らサイドに近い意見を元忠氏へとぶつけていく。
3780 = "Kisaki đột ngột thay đổi thái độ,\nvà đưa\nra những ý kiến nghiêng về phía chúng tôi\nđể phản bác lại ông Mototada."

# 【元忠】
# display as 元忠
# JP: 「繋げるための初めの一歩。\n御一夜－八ツ城間復線のハードルが、あまりに高い」
2244 = "「Bước đầu tiên để kết nối lại.\nRào cản cho\nviệc phục hồi tuyến đường giữa Ohimitera -\nYatsushiro, là quá cao.」"

# 【稀咲】
# display as 稀咲
# JP: 「というと？」
2517 = "「Nghĩa là sao ạ?」"

# 【元忠】
# display as 元忠
# JP: 「買収困難だということだ。売却された土地の多くは\n転売され、宅地分譲されてしまっているからな」
2528 = "「Nghĩa là rất khó để mua lại. Phần lớn\nnhững mảnh đất đã bán\nđều bị bán lại, và\nphân lô bán nền làm đất ở mất rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2267 = "「!」"

# monologue
# JP: 僕らも、そこを調べてはいた。\n調べはついたが、広く知られた事実とはとても思えない。
3908 = "Chúng tôi, cũng đã điều tra về chuyện đó.\nTuy đã tra ra, nhưng tôi không nghĩ đó là\nmột sự thật được nhiều người biết đến."

# 【双鉄】
# display as 雙鐵
# JP: 「……御一夜銀行も、\nこの復線買収をすでに検討していたのですか？」
1612 = "「……Ngân hàng Ohimitera cũng,\nđã xem xét\nviệc mua lại để phục hồi tuyến đường này\nrồi sao?」"

# 【元忠】
# display as 元忠
# JP: 「銀行としてではなく、個人としてだ。\n行として検討するに足る案とは考えていない」
2054 = "「Không phải với tư cách ngân hàng, mà là\nvới tư cách cá nhân.\nTôi không cho rằng\nđây là một phương án đáng để ngân hàng\nphải xem xét.」"

# 【稀咲】
# display as 稀咲
# JP: 「ですが――だからこそのチャンスであるのでは？\nその復線買収を成功させることが出来れば――」
2242 = "「Nhưng mà——chính vì thế nên mới là cơ hội\nkhông phải sao?\nNếu có thể mua lại thành\ncông để phục hồi tuyến đường đó——」"

# 【元忠】
# display as 元忠
# JP: 「新しいビジネスモデルともなるだろうな。\n確かに、潜在的なニーズはある」
2455 = "「Thì cũng sẽ trở thành một mô hình kinh\ndoanh mới nhỉ.\nQuả thực, nhu cầu tiềm năng\nlà có.」"

# monologue
# JP: 稀咲が発した質問は、\n僕らを援護する方向へと更に踏み込んできた。
3775 = "Câu hỏi mà Kisaki đưa ra,\ncàng lấn sâu hơn\nvào hướng hỗ trợ chúng tôi."

# monologue
# JP: ならば少なくとも稀咲は、\nこの案を評価にたるものとして捉えてくれているのだろう。
3907 = "Nếu vậy thì ít nhất Kisaki,\ncũng đang nhìn\nnhận phương án này như một thứ đáng để\nđánh giá."

# 【元忠】
# display as 元忠
# JP: 「が、成功するものとは思えない。\n“宅地”の買収は、それほどに困難なものだ」
2066 = "「Nhưng, ta không nghĩ là sẽ thành công.\nViệc mua lại “đất ở”, là một việc khó khăn\nđến mức đó đấy.」"

# monologue
# JP: 言ってゆっくり、元忠氏の目が僕を見る。
3864 = "Nói rồi, ánh mắt của ông Mototada từ từ\nnhìn về phía tôi."

# 【元忠】
# display as 元忠
# JP: 「成算を示せるのかね？　右田双鉄君」
2262 = "「Cậu có thể chỉ ra kế hoạch thành công\nkhông? Cậu Migita Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕にも、僕らにもそれは無理です。\nですので、お力をお借りしたく思っております」
2133 = "「Đối với tôi, hay đối với chúng tôi thì\nđiều đó là không thể.\nVì vậy, tôi muốn\nmượn sức mạnh của các vị.」"

# 【元忠】
# display as 元忠
# JP: 「隈銀の力をか」
2130 = "「Sức mạnh của Kumagin sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いえ。宝生元忠氏、宝生稀咲氏。それに浦上氏。\nそれぞれ、個々人のお力をです」
2050 = "「Không. Là ông Houshou Mototada, cô\nHoushou Kisaki. Và cả ông Uragami.\nLà sức\nmạnh của từng cá nhân mỗi người.」"

# monologue
# JP: 言って、敢えての一拍を置く。
3863 = "Nói rồi, tôi cố tình ngừng lại một nhịp."

# 【双鉄】
# display as 雙鐵
# JP: 「……“銀行”の力だけを望むのであれば、\n他にも、選択肢は出てきますので」
1577 = "「……Nếu chỉ mong muốn sức mạnh của “ngân\nhàng”,\nthì vẫn còn những lựa chọn khác\nnữa.」"

# 【元忠】
# display as 元忠
# JP: 「ほう？　面白い。\nみかん鉄道とのコネクションはすでにあるというわけか」
2374 = "「Hô? Thú vị đấy.\nNghĩa là cậu đã có sẵn\nmối liên hệ với Đường sắt Mikan rồi sao.」"

# monologue
# JP: 言外の意味が通じている。買収に僕らが着手するなら、\nその代行者が、隈銀と限られるものではないと。
3293 = "Ý tứ ngoài lời nói đã được truyền đạt. Nếu\nchúng tôi bắt tay vào việc mua lại,\nthì\nngười đại diện, không nhất thiết chỉ giới\nhạn ở Kumagin."

# monologue
# JP: みかん鉄道の線を通じて、鹿兒銀に――\nそれももちろん、選択肢としてはあるのだと。
3652 = "Thông qua mối quan hệ của Đường sắt Mikan,\nđể đến với Kagoshima Bank——\nTất nhiên, đó\ncũng là một lựa chọn."

# 【元忠】
# display as 元忠
# JP: 「銀行が、銀行としての協力を検討するためには、\n大きなものだけでも三つの要素が不足している」
2105 = "「Để ngân hàng, xem xét việc hợp tác với tư\ncách là một ngân hàng,\nthì chỉ tính những\ncái lớn thôi cũng đã thiếu mất ba yếu tố\nrồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2308 = "「っ!」"

# monologue
# JP: “隈銀”――ではなく、“銀行”と。
3294 = "「っ!」"

# monologue
# JP: 僕のほのめかしを理解した上で、\n元忠氏が切り返してきた意味もまた、明白だ。
3328 = "Không phải là “Kumagin”——mà là “ngân\nhàng”."

# 【双鉄】
# display as 雙鐵
# JP: 「その不足とは、何でしょう？」
2591 = "「Những yếu tố còn thiếu đó, là gì vậy?」"

# 【元忠】
# display as 元忠
# JP: 「一点目は宅地買収への足掛かり。一切の足掛かりなしに\n宅地買収という困難な事業へは踏み出せない」
2866 = "「Điểm thứ nhất là chỗ đứng để mua lại đất\nở. Nếu không có bất kỳ chỗ đứng nào\nthì\nkhông thể bước vào công việc khó khăn mang\ntên mua lại đất ở được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2720 = "「Vâng.」"

# 【元忠】
# display as 元忠
# JP: 「二点目は、『新観光列車』なるもののビジョン。\nどのような物にするかが、一切具体的に示されていない」
2871 = "「Điểm thứ hai là, tầm nhìn về cái gọi là\n『chuyến tàu du lịch mới』.\nSẽ làm ra một\nthứ như thế nào, hoàn toàn không được chỉ\nra một cách cụ thể.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そこも、ご指摘の通りと感じます」
2525 = "「Điểm đó, tôi cũng cảm thấy đúng như ngài\nđã chỉ ra.」"

# 【元忠】
# display as 元忠
# JP: 「三点目。“御一夜市民”に与えるメリット。\n君の案では、御一夜市民の生活不安は解消されない」
2869 = "「Điểm thứ ba. Lợi ích mang lại cho “người\ndân Ohimitera”.\nPhương án của cậu, không\ngiải quyết được nỗi bất an trong cuộc sống\ncủa người dân Ohimitera.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
2325 = "「A.」"

# monologue
# JP: 思わず漏らしてしまった声に、\n元忠氏の口元が――笑みにも見える形に歪む。
3831 = "Trước âm thanh mà tôi bất giác thốt ra,\nkhóe miệng của ông Mototada——méo xệch đi\nthành một hình thù trông giống như một nụ\ncười."

# monologue
# JP: そのまま、言葉を発さない。\nであらば僕が言う他にない。
3300 = "Ông ấy cứ giữ nguyên như vậy, không nói\nthêm lời nào.\nNếu thế thì tôi đành phải\nnói thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「確かに現行案で事業創出のメリットを受けるのは、\n移住者を多く含む鉄道技術者が中心となります」
2847 = "「Quả thực với phương án hiện tại, những\nngười nhận được lợi ích từ việc tạo ra\ncông ăn việc làm,\nchủ yếu sẽ là các kỹ sư\nđường sắt, bao gồm cả rất nhiều người nhập\ncư.」"

# 【元忠】
# display as 元忠
# JP: 「わかっているなら話が早い。\n双鉄くん。それは新たな火種にしかならんぞ」
2112 = "「Nếu cậu đã hiểu thì dễ nói chuyện rồi.\nCậu Soutetsu. Điều đó sẽ chỉ trở thành một\nmồi lửa mới mà thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――はい」
1526 = "「——Vâng.」"

# monologue
# JP: エアクラ工場の大規模な雇用創出には、\n“誰もができる単純作業”が極めて多く含まれる。
3787 = "Việc tạo ra việc làm quy mô lớn của nhà\nmáy Aircra,\nbao gồm rất nhiều “công việc\nđơn giản mà ai cũng có thể làm được”."

# monologue
# JP: 元忠氏がエアクラ誘致を強く推し、\nそれが広範に支持される理由を、今まで僕は軽視していた。
3571 = "Ông Mototada thúc đẩy mạnh mẽ việc thu hút\nnhà máy Aircra,\nvà lý do nó được ủng hộ\nrộng rãi, từ trước đến nay tôi đã xem nhẹ."

# 【元忠】
# display as 元忠
# JP: 「“銀行側”としての意見は、\nまぁこのようなところだが」
2581 = "「Ý kiến với tư cách là “phía ngân hàng”,\nchà, đại khái là như vậy.」"

# monologue
# JP: 大きく、極めてわざとらしく、\n元忠氏は肩をすくめてみせる。
3338 = "Ông Mototada nhún vai,\nmột cách mạnh mẽ,\nvà cực kỳ có chủ ý."

# monologue
# JP: ……ご指摘通り、確かに“銀行側”の意見だ。\n鹿兒銀も他の銀行も、同じ不足を指摘してくるだろうから。
1508 = "……Đúng như ông ấy đã chỉ ra, quả thực đó\nlà ý kiến của “phía ngân hàng”.\nBởi vì\nKagoshima Bank hay các ngân hàng khác,\nchắc chắn cũng sẽ chỉ ra những thiếu sót\ntương tự."

# 【元忠】
# display as 元忠
# JP: 「――稀咲はどうだ？」
1530 = "「——Kisaki thì sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「ボクは――正直、双鉄の案にかなりの興味を覚えている。\n現状での評価は中立か、エアクラ工場誘致案に劣るけど」
2605 = "「Cháu thì——thành thật mà nói, cháu cảm\nthấy khá hứng thú với phương án của\nSoutetsu.\nĐánh giá ở hiện tại là trung\nlập, hoặc kém hơn so với phương án thu hút\nnhà máy Aircra, nhưng mà」"

# 【元忠】
# display as 元忠
# JP: 「けど？」
2069 = "「Nhưng mà?」"

# 【稀咲】
# display as 稀咲
# JP: 「御一夜支店長としても、計画に噛んでおきたくは思う。\n放置するには、惜しい――と同時に、危険な案だから」
2582 = "「Ngay cả với tư cách là Giám đốc chi nhánh\nOhimitera, cháu cũng muốn tham gia vào kế\nhoạch này.\nVì nếu bỏ mặc thì thật đáng\ntiếc——đồng thời, đây cũng là một phương án\nnguy hiểm.」"

# 【元忠】
# display as 元忠
# JP: 「ほう。支店長として“も”か？」
2304 = "「Hô. Ngay cả với tư cách Giám đốc chi\nnhánh “cũng” sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「っ！」
# 2308 = "「唔！」" 

# monologue
