# monologue
# JP: 言われてみれば、\nなんと自分が鈍かったのかが恥ずかしくなる。
3458 = "她這麼一說我才反應過來，真為自己的遲鈍感到羞愧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道\x%l機関士;#00ffc040;機関士%l;#;に、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に、客室乗務員。\n\x%l気動車;#00ffc040;気動車%l;#;運転士に――真闇姉は『地元、御一夜の方』だな」
2640 = "「所以你們分別是御一夜鐵路\\x%l機関士;#00ffc040;司機%l;#;、\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;、乘務員、\\x%l気動車;#00ffc040;動車%l;#;駕駛員——真闇姐就是“御一夜當地人”吧」" 

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんは、\nポスターに映らんでもよかと、って思うんやけど……」
2424 = "「姐姐覺得海報上沒有咱也沒關係的咧……」" 

# 【双鉄】
# display as 雙鐵＆波萊特
# JP: 「いや、必要だ。絶対に」\n「いいえ、必要です、絶対に」
2072 = "「不，絕對需要你」\\n「不，絕對需要你」" 

# monologue
# JP: ポーレットと僕の声が重なる。
3669 = "波萊特和我異口同聲。" 

# monologue
# JP: みな、同じことを言おうとしていたのであろう。\nそれぞれの開きかけた口から、笑いがこぼれる。
3376 = "其他幾個人似乎也想這麼說來著，她們沒來得及出聲，便笑了起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「『御一夜へ来てもらうためのポスター』なんですから。\n地元の方のお迎えは、絶対に必要なんです」
2380 = "「因為這個海報的主題是“希望大家到御一夜來”。所以絕對需要當地人在上面」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。真闇姉ほど、『御一夜の町の空気感』を、\nしっとりと示してくれる存在は、他になかろう」
2708 = "「是啊。沒有人比真闇姐更有“御一夜當地人”的感覺了」" 

# 【真闇】
# display as 真闇
# JP: 「あらまぁ。いつの間に？\n双ちゃんも上手になったとね」
2292 = "「哎呀。小雙什麼時候這麼會說話咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「上手？　――ああいや、世辞などいわんし、言えん。\nただ、心底からそう思っただけのことだ」
2729 = "「會說話？——啊，不是，我可不會說客套話，也說不出來。我是真的這麼想的」" 

# 【真闇】
# display as 真闇
# JP: 「……あらまぁ」
1579 = "「……哎呀」" 

# monologue
# JP: しかし、うむ。\n掛け値なく、実に優れた“鉄道”のポスターとなりそうだ。
3276 = "不過，嗯。不說虛的，這樣肯定能拍出非常優秀的“鐵路”海報。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――『未来行き列車』か」
1518 = "「——“發往未來列車”啊」" 

# 【ふかみ】
# display as 深美
# JP: 「えへへっ」
2297 = "「哎嘿嘿」" 

# monologue
# JP: 議論百出の末に決まった、\nシンプル極まるキャッチコピー。
3911 = "這是我們討論了很久才決定的標語，非常簡短。" 

# monologue
# JP: 口の端に乗せた瞬間に、\n発案者――ふかみが、しあわせそうにはにかむ。
3527 = "我剛說出這句話，深美就又幸福又害羞地笑了。這句話是她想出來的。" 

# 【ふかみ】
# display as 深美
# JP: 「みんなでの集合写真でポスターをって聞いたとき、\n言葉、自然に浮かんできたんです」
2543 = "「我一聽說大家要用合照做海報，腦海裡自然而然就浮現出了這句話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「未来行き列車」
2817 = "「發往未來列車」" 

# monologue
# JP: 今から、未来へ。ここから、どこかへ。\nそれぞれの目的を果たすため、それぞれの旅をするために。
3489 = "從現在發往未來，從這裡發往遠方。只為載著乘客前往終點，完成每個人的旅行。" 

# monologue
# JP: そう考えれば、納得できる。\n日々姫が描いたラフ画の意味を、ひときわに。
3912 = "這樣一想，我就更明白日日姬草稿的用意了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「早速撮ろう。それ以上の何もいらん。\n『未来行き列車』『御一夜鉄道』。それだけで十分だ」
2594 = "「我們趕緊拍吧。我們只要有“發往未來列車”和“御一夜鐵路”就夠了」" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、いこ！」
3009 = "「那我們準備好！」" 

# monologue
# JP: 日々姫が動けば、みんなも動く。\nラフ画が、すっかり頭に焼き付いているのだろう。
3628 = "日日姬率先行動，大家也動了起來。想必大家都牢牢記住了日日姬的草稿。" 

# monologue
# JP: ホーム上切符売り場横。\nその空間に、みながぴたり、構図どおりに収まっていく。
3521 = "我們在站台賣票的地方旁邊占據了一塊空間。大家在那裡按照草稿構圖排好。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
2303 = "「哦——」" 

# monologue
# JP: 脚立に座ってカメラを構える。\n瞬間に、全てが綺麗なひとつに収まる。
3539 = "我坐在梯子上擺好相機，一瞬間就把這副場景收進了取景器裡。" 

# monologue
# JP: 一枚の、絵だ。\nなるほど真闇姉は必要だ。この全員が、不可欠だ。
3906 = "這就是一幅畫。怪不得需要真闇姐，需要在場所有人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ホームも、レールも――」
2864 = "「站台和鐵軌也是——」" 

# monologue
# JP: 光が注ぐ。\n祝福されているように、全てがきらめく。ただ美しい。
3932 = "陽光就像祝福著我們一樣打在站台上，讓所有的一切都熠熠生輝，無比美麗。" 

# monologue
# JP: みながわくわく、僕の言葉を待ってか\nこちらを見上げてくれている――っ！！
3588 = "所有人都興奮地看著我，等待著我的號令——！！" 

# monologue
# JP: （パシャっ）
3973 = "（喀嚓）" 

# 【ハチロク】
# display as 八六
# JP: 「あら、もう撮られてしまったのですか？」
2296 = "「哎呀，您這就拍了？」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、『ちーず』っていってませんよぉ」
2805 = "「玲奈還沒說“茄子”呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もう撮った」
2660 = "「拍完了」" 

# monologue
# JP: 背面モニタですぐ確認する。\nイメージ通り――いや、それ以上だ。
3582 = "我馬上用相機背面的螢幕確認，和我想的一樣——不，比我想像的還要完美。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さぁこれからと意識して表情をつくってもらうより、\nずっと素敵なわくわくを、カメラに収められたと思う」
2632 = "「我覺得與其讓大家故意做出期待未來的表情，還是剛才那樣充滿期待的表情比較好」" 

# 【ハチロク】
# display as 八六
# JP: 「わくわく、でございますか」
2518 = "「您是說充滿期待嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2353 = "「嗯」" 

# monologue
# JP: オウム返しされ、気付かされる。ああ、そうだ。\n列車の旅は、レールの先は、「わくわく」なのだ。
3805 = "聽八六重複了一遍，我才注意到。對啊。列車之旅不就是對鐵軌前方“充滿期待”的嗎。" 

# monologue
# JP: 僕らがこれから走らせる、その列車だけにとどまらず、\n全ての列車は――未来へ、僕らを運ぶのだ。
3260 = "不光是這輛我們準備發往的新列車，所有的列車都是將我們運往未來的存在。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが納得できる一枚が撮れたなら、\nわたしは、それでオッケーだって思います」
2670 = "「既然雙鐵君覺得拍到了滿意的照片，那我也沒意見」" 

# 【稀咲】
# display as 稀咲
# JP: 「同感だね。どんな写真か、楽しみだ」
2264 = "「同感。是怎樣的照片呢，真期待啊」" 

# 【ふかみ】
# display as 深美
# JP: 「わ、わたしも、緊張しちゃったら、\nきっと、ヘンな顔しちゃってたって思うです。から」
2540 = "「我、我也覺得一緊張表情肯定會怪怪的。嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「あははっ！　なら、そのヘンな顔も撮っちゃお？\nね、にぃに。『チーズ』って言ってで、もう一枚！」
2327 = "「啊哈哈！那我們也來拍張怪怪的吧！阿哥，這次你說“茄子”再拍一張好不好！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。『チーズ』」
2692 = "「明白了。“茄子”" 

# 【ふかみ】
# display as 深美
# JP: 「えっ！？　えええっ！！？」
2300 = "「哎！？哎！！？」" 

# monologue
# JP: （パシャっ！！）
3972 = "（喀嚓！！）" 

# 【ふかみ】
# display as 深美
# JP: 「ああ！　ほんとに撮った！？\nやだやだ、いまの、消してくださぁい」
2330 = "「啊！真的拍了！？不要啊，刪了剛才那張吧」" 

# 【真闇】
# display as 真闇
# JP: 「うふふっ。よかポスターのできそうね」
2273 = "「呵呵，這海報一定很好看咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2353 = "「嗯」" 

# 【凪】
# display as 凪
# JP: 「ばってん、これじゃにーさんが写らんばい！」
2258 = "「可這麼整，大哥哥就不在照片裡咧！」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 2328 = "「啊！」" 

# 【ふかみ】
# display as 深美
# JP: 「ちょっ！？　凪ちゃん」
2872 = "「等等！？小凪」" 

# monologue
# JP: 凪の無邪気な一言が、みなの笑顔を一瞬で消す。\n困惑と、沈鬱と――両者が混じった顔になる。
3388 = "凪天真無邪的一句話馬上讓大家的笑容蒙上陰霾。所有人都露出了困惑和擔憂的表情。" 

# 【れいな】
# display as 玲奈
# JP: 「はぅぅ～」
2288 = "「哈嗚～」" 

# monologue
# JP: ――れいなさえもだ。それが、嬉しい。\nひときわ無邪気な凪以外、みながわかってくれている。
1486 = "——就連玲奈也是。這真讓我高興。看來除了特別天真的凪以外，大家都明白為什麼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……今の僕が入っては、絵にならんのだ」
1587 = "「……如果現在我也來拍，就會破壞整個畫面的」" 

# 【凪】
# display as 凪
# JP: 「そぎゃんこつなかとよー！\nにーさん、顔はいわゆるイケメンばい！」
2653 = "「才不會咧！大哥哥也算是帥哥咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「顔の造作のことではなく、な」
2964 = "「這不是長相的問題」" 

# monologue
# JP: みなが抱いているわくわくを、それぞれの未来への希望を。\n恐らく僕は、同じレベルで持ててはいない。
3909 = "這是因為，我對未來的希望沒有其他人那樣熱切。" 

# monologue
# JP: 未来を望むひかりで瞳を、同じようには輝かせ得ない。\nそうは出来ない曇りを抱え、晴らせずいるから。
3556 = "我無法讓我的眼睛和大家一樣充滿對未來的期冀之光。我始終無法掃除眼神中的陰霾。" 

# 【凪】
# display as 凪
# JP: 「服だって、別におかしくなかとよ？」
2256 = "「可衣服也不奇怪啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうなのだが、な」
1611 = "「……雖然是這樣」" 

# monologue
# JP: なんと説明したものか。
3574 = "我要怎麼跟她說明才好呢。" 

# monologue
# JP: 余計なことをふきこんで、凪特有の無邪気さを、\nかけがえない長所を曇らせたくはないし――
3828 = "要是說了什麼無心之語，讓凪特有的天真純潔罩上陰霾可不好――" 

# 【真闇】
# display as 真闇
# JP: 「『今は』入れんだけよね？　双ちゃん」
2449 = "「小雙，你剛才說“現在”不行，對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。うん。\nそうだな、今は、だ」
2335 = "「啊，嗯。是啊，現在不行」" 

# monologue
# JP: 真闇姉だ。\n僕が心底困ったときには、必ずするりと助けてくれる。
3748 = "真闇姐總會在我遇到無法解決的困難的時候幫我。" 

# 【凪】
# display as 凪
# JP: 「なら、いつになったら入れると？」
2993 = "「那你什麼時候能拍？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――そうだな。\n僕らの列車が走ったときだ」
2969 = "「這個嘛——嗯。就等我們的列車真的行駛起來了吧」" 

# 【ハチロク】
# display as 全員
# JP: 「ああ」
# 2325 = "「啊」" 

# monologue
# JP: 問われて答えたその声に、\nみなが、安堵の息を吐く。
3444 = "大家聽到我這麼回答，都放心地嘆了一口氣。" 

# monologue
# JP: それも、嬉しい。\n必ずできると、だから、思える。
3903 = "這也很讓我高興。因為大家都相信我們一定會讓列車行駛起來。" 

# 【凪】
# display as 凪
# JP: 「ならにーさん！\n凪さまとそいば約束するばい！！」
3001 = "「那大哥哥，和本小姐拉勾！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よかろう」
2234 = "「可以」" 

# monologue
# JP: 脚立を降りれば、\n凪がゆびきりげんまんと、僕に小指を差し出してくる。
3548 = "我從梯子上爬下來，然後跟凪拉勾約定。" 

# 【日々姫】
# display as 日日姬
# JP: 「ずるか！　にぃに、わたしとも」
2410 = "「好狡猾！我也要！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　わたしも！\n双鉄くんと、大事な約束、したいです」
2332 = "「啊！還有我！我也想跟你做這個重要的約定」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなも、ポーレットといっしょにしますぅ」
2801 = "「玲奈也要和波萊特一起和雙鐵先生約好」" 

# 【ふかみ】
# display as 深美
# JP: 「わたし、わたしも混ぜてほしい、です！」
2985 = "「還有我，還有我呢。嗯！」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふ、ボクも。\nこの約束は、本当に大事な約束だろうし」
2275 = "「呵呵，那也算我一個。因為這個約定真的很重要嘛」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら、おねーちゃんもまざっちゃお」
2081 = "「也算姐姐一個」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば」
2987 = "「那——」" 

# monologue
# JP: 手を差し出す。\nみんなが描く、輪の中心に。
3535 = "我和所有人圍成一圈，把手伸進圓圈中央。" 

# monologue
# JP: その手の上に次々と、小さな手たちが重なってくる。
3442 = "大家紛紛把手放在我的手上，疊在一起。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクもどうだ？　イヤでなければ」
2161 = "「八六如果不嫌棄，也來跟我約好吧」" 

# 【ハチロク】
# display as 八六
# JP: 「イヤなどと、そのようなことは決して！\nけれど、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、\x%l機関士;#00ffc040;機関士%l;#;に約束を強いるなど」
2548 = "「我並不是嫌棄您！只是，我身為一介\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，實在無法強迫\\x%l機関士;#00ffc040;司機%l;#;做出約定」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と[マスター,2]機関士でもあるが、それと同時に、\n僕らは仕事の相棒で、共に暮らす家族でもあるだろう？」
2596 = "「我們雖然是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;和司機的關係，不過同時也是一起工作，一起生活的家人吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「――はいっ！　左様でございますね！\nそれでは、双鉄様の、家族として、相棒として」
1522 = "「——嗯！您說的沒錯！那就請讓我作為您的家人和搭檔，來和您做出這個約定」" 

# monologue
# JP: ハチロクはいそいそと手袋を外し、\nその手を重なる手の上へ。
3374 = "八六高興地脫下手套，把手疊在我們的手上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、僕。右田双鉄は、ここにいる皆に約束しよう。\n僕は必ず、僕らの列車、未来行き列車を走らせて――」
3026 = "「那麼，我右田雙鐵和在場的所有人約好。我一定會讓我們的列車——發往未來列車成功開行——」" 

# monologue
# JP: ふっと、胸の中でなにかがざわめく。\nそれは傷の痛みでもあり、それだけではない熱も帯びてる。
3790 = "突然我感到胸口一陣不安。這種感覺類似曾經的疼痛，但又帶著一股疼痛不會有的熱量。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その暁には、笑顔で――笑顔で！\n皆とともに、きっと写真におさめてもらおう」
2183 = "「到那時，我一定會笑著——和大家一起合影」" 

# 【凪】
# display as 凪
# JP: 「なら、指切りばい！！\nあれ？　指？？」
2658 = "「拉勾上吊！！咦，沒有拉勾？？」" 

# 【ふかみ】
# display as 深美
# JP: 「重ねてるの手だから、『手ぇきった』って――\nやだ！　そんなの縁起でもないっ」
2589 = "「我們現在手疊在一起，一起上吊也太不吉利了」" 

# 【稀咲】
# display as 稀咲
# JP: 「『手形を切る』なら通常の商行為だけれど……\n不渡りの可能性も内包してしまうし、語呂もよくない」
2127 = "「俗話還說“撕票”呢。原本票據是用於通常商業交易行為的……不過這也太不吉利了」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、切りたいのってケーキくらいですぅ」
2802 = "「玲奈覺得吊起來的只有臘肉就夠了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうねれいな。確かにあんまり、切って縁起がいいもの\n……って、わ。考えるとこれ、結構むつかしいかも」
2712 = "「是啊，玲奈。我們還是想想有什麼吊起來吉利的東西好了……嗯，想不到啊」" 

# 【ハチロク】
# display as 八六
# JP: 「……このようなときには、\n『[エイエイオウ,4]曳・叡・王がふさわしいかと存じます』」
1608 = "「……這種時候，就應該說“一、二、三”」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、さっすがハチロク！」
2333 = "「啊，不愧是八六！」" 

# 【真闇】
# display as 真闇
# JP: 「そーね。双ちゃんに、なにかハッパばかけてもらって」
2705 = "「是啊。小雙，趕緊跟大家說幾句」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2695 = "「明白了」" 

# monologue
# JP: 言えばグっと、再び手に手に力がこもる。
3865 = "說完，我再次用力把手和大家壘在一起。" 

# monologue
# JP: 悪くない――\n罰則ではなく信頼で、僕は約束を縛ってもらう。
3268 = "不是靠懲罰而是靠信賴來許下約定，這種感覺還不錯。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『御一夜鉄道未来行き列車を、必ずこの手で。\n僕らの重ねたこの手できっと！　走らせよう！』」
1550 = "「“讓我們靠我們的力量來讓御一夜鐵路發往未來列車飛馳起來！”」" 

# monologue
# JP: そうして大きく息を吸い！
3690 = "然後，我深深吸了一口氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「えい！　えい！」
2036 = "「一、二！」" 

# 【ハチロク】
# display as 全員
# JP: 「おー！」
2042 = "「三——！」" 
