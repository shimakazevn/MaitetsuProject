[script]
# lines: 673 
# 【日々姫】
# display as 日日姬
# JP: 「あの、にぃ――んんっ、兄さん？\n\x%l機関助士;#00ffc040;機関助士%l;#;って、兄さんがいつも練習している――」
2913 = "「話說，啊——不，哥哥，\\x%l機関助士;#00ffc040;司爐%l;#;是不是你總是在練的那個——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、\x%l投炭;#00ffc040;投炭%l;#;だな。\nそう。あれをメインに、機関車の走行を助ける仕事だ」
2439 = "「對，你是說\\x%l投炭;#00ffc040;加煤%l;#;吧。沒錯，司爐的主要工作就是加煤，輔助司機駕駛」" 

# 【日々姫】
# display as 日日姬
# JP: 「……練習すれば、どうでしょう？\nあれは、私にも出来ますか？」
1588 = "「……如果肯練的話呢？我也能做到嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「できるな」
2894 = "「能啊」" 

# monologue
# JP: そこは考えるまでもない。\n日々姫は文武両道なうえ、努力を惜しまぬ性格だから。
3902 = "這不用說。畢竟日日姬不光文武雙全，性格又努力踏實。" 

# monologue
# JP: いや――これこそ本当の盲点か？\n体格的にも、日々姫なら十分に小柄なのだし――
3797 = "等等——好像還有一點不得不說。從體格上來說，日日姬也足夠嬌小——" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、私。練習してみて、できそうだったら、\nにぃに――んんっ――兄さんの、\x%l機関助士;#00ffc040;機関助士%l;#;になります」
3011 = "「那我就練練看，要是能做到的話，我就當阿哥——不——哥哥的\\x%l機関助士;#00ffc040;司爐%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、それは助かる」
2713 = "「是嗎，那真是幫大忙了」" 

# monologue
# JP: 僕のではなく、8620のという方がより正しいが、\nそこまで細かなことを気にしても仕方がない。
3935 = "雖然比起“我的司爐”，“８６２０的司爐”這樣的說法更準確，但目前也沒有糾結這些細節的必要。" 

# monologue
# JP: 重要なのは、これで8620の安全な営業運転へ、\n更に一歩、大きく近づけたということだ。
3926 = "重要的是，我們向著８６２０更加安全地進行商業運營又邁出了很大的一步。" 

# 【日々姫】
# display as 日日姬
# JP: 「ただ……ええと。\n条件づけとか、そういうのじゃ全然ないんだけど」
2226 = "「只是……呃，我並不是打算提條件啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん？　何だ。\n希望があるなら、遠慮したりせず言ってくれ」
2310 = "「唔？怎麼了。有什麼要求的話儘管說」" 

# 【日々姫】
# display as 日日姬
# JP: 「えと、手段と目的が少し混ざっちゃってるみたいに、\n今の兄さん、見えるかもって」
2269 = "「呃，現在的哥哥總感覺好像有些混淆了手段和目的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2305 = "「唔」" 

# monologue
# JP: 言われてみれば、その傾向はあるかもしれぬ。
3290 = "仔細想想，或許我確實有這種傾向。" 

# monologue
# JP: 鉄道は観光振興の、エアクラ工場誘致撤回のための\n手段のひとつにすぎぬはず。だが――
3501 = "復興鐵路本應只是振興旅遊業、阻撓空凝機工廠落戶的手段之一而已，但是——" 

# 【日々姫】
# display as 日日姬
# JP: 「御一夜のことをもっと知ったほうがいいと思うの。\n兄さんが、この町を本当に復興させたいんなら」
2418 = "「如果哥哥真的想讓御一夜復興，我覺得需要更加了解這座城鎮」" 

# 【双鉄】
# display as 雙鐵
# JP: 「具体的には、どうすればいい？」
2170 = "「具體來說該怎麼辦呢？」" 

# 【日々姫】
# display as 日日姬
# JP: 「酒蔵のことも、私の看板描きやなにかも、\n御一夜の人と密着するお仕事でしょ？　だから――」
3034 = "「釀酒廠那邊，還有我畫招牌都是與御一夜的人密切相關的工作吧？所以——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「家事やお前の手伝いに、もう少し目を向ければ、\nよりバランスがとれるかもしれぬというわけか」
2421 = "「如果在家務事和輔助你的工作上多投入一點，或許能取得一個更好的平衡，是這樣嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
2353 = "「嗯」" 

# monologue
# JP: ほっとしたような日々姫の笑顔。
3636 = "日日姬露出安心的笑容。" 

# monologue
# JP: 言い出したくて言い出せない、\nいつもの日々姫が出ていたのかと、今さら気付く。
3281 = "事到如今我才注意到，日日姬又回到往常那種欲言又止的樣子。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あのっ！　わたしも、それだったら希望っていうか、\n意見っていうか――」
3021 = "「那要是這樣的話，我也有要求，或許應該說是意見更合適吧——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。言ってみてくれ」
2361 = "「嗯，說說看吧」" 

# monologue
# JP: 走行試験の成功で、テンションがみなあがっている。\n恐らくは、酒を飲んでいるのと似たような状態だろう。
3823 = "行駛測試的成功，令所有人都大為振奮。我感覺這種狀態大概和喝了酒之後有點類似。" 

# monologue
# JP: こういうときこそ、忌憚の無い意見が飛び出してくる。\n聞き逃さぬよう集中する。
3434 = "在這種時候，人才會敢於發表意見。機會難得，先專心聽聽別人怎麼說吧。" 

# 【ポーレット】
# display as 波萊特
# JP: 「基本線は日々姫ちゃんと同じなんですけど、\nアプローチ、別のやりかたの方がもっといいかもって」
2387 = "「基本思路是和日日姬一樣的，但是在行動上是不是該換個別的方式比較好呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「別のやり方？」
2175 = "「別的方式？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「例えば、双鉄くんに政策秘書に入ってもらって、\n市政のレベルで観光振興に力を注いでもらう、とか」
2756 = "「比如讓雙鐵君擔任政策秘書，在市政的層面上為振興旅遊業努力之類的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2373 = "「嚯」" 

# monologue
# JP: 日々姫は地道なボトムアップ。\nポーレットは一気のトップダウン。
3626 = "日日姬是腳踏實地自下向上。波萊特則是勢如懸河自上而下。" 

# monologue
# JP: 同じく観光振興、御一夜再生を目的として、\nしかし手段は百八十度異なっている。
3936 = "雖然目的同樣是振興旅遊業、讓御一夜復興，但手段卻截然不同。" 

# 【ポーレット】
# display as 波萊特
# JP: 「今回の試験走行までで、御一夜のキーマンが何人も、\n双鉄くんを信頼してくれたと思いますし、その人脈も」
2181 = "「到這次的行駛測試為止，雙鐵君已經獲得了好幾位御一夜大人物相當的信任了，可以利用這些人脈」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、市政という長いテコを使えば、作用も大きい。\nポーレットのいうこともまた、理解はできるな」
2360 = "「嗯，若是能加以利用，市政這個背景會有相當大的用途。波萊特的意見也相當有說服力啊」" 

# monologue
# JP: ぷっと、ポーレットの頬が膨れる。
3672 = "波萊特有些生氣地鼓起臉頰。" 

# monologue
# JP: こんなに飾らぬ表情は、初めて見る気がして何故か、\n少しドキリとさせられる。
3580 = "我還是第一次看到她這麼不加掩飾地表達感情，不知為何讓我心跳有些加速。" 

# 【ポーレット】
# display as 波萊特
# JP: 「理解“は”、ですか？」
2224 = "「只是“有說服力”？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\n日々姫の意見も、同様に理解できるからな」
2343 = "「嗯。因為日日姬的意見也同樣有說服力」" 

# 【日々姫】
# display as 日日姬
# JP: 「……にぃにぃ」
1609 = "「……阿哥」" 

# monologue
# JP: 安心したような日々姫の声。\nそこにぽちゃん、と、密やかな水音が重なってくる。
3618 = "日日姬似乎放下了心一般說道。此時一聲輕微的水聲響起。" 

# 【ハチロク】
# display as 八六
# JP: 「確かに、お二方のご意見はともに、\n一理も二理もあるものですね」
2846 = "「確實，二位的意見都各有一番道理」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
2159 = "「八六」" 

# monologue
# JP: れいなを洗ってやり終えたらしい。
3451 = "她好像已經給玲奈洗好了。" 

# monologue
# JP: ハチロクは、達成感を顔に出し、\n風呂にしずしず入ると同時、僕の膝の上へと座る。
3366 = "八六臉上充滿了成就感，在安靜地進入浴池後便立即坐在了我的腿上。" 

# 【ハチロク】
# display as 八六
# JP: 「けれど、地道なご縁づくりは日々姫の、\n市政はそれこそ、ポーレット様の得意分野かと」
2098 = "「但是我認為，踏實地廣交人緣與市政是日日姬與波萊特大人各自擅長的領域」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにな」
2844 = "「確實」" 

# monologue
# JP: 地道に縁を築くこと。\n市政という道具を振り回すこと。
3647 = "構建人際關係，以及活用市政力量。" 

# monologue
# JP: それは日々姫とポーレット、それぞれが積み重ねた技。\n僕にいきなり学べるほどに、容易いものとも思えない。
3904 = "這些分別是日日姬和波萊特日積月累而掌握的技能。斷然不是我能夠一下子輕鬆學到的。" 

# 【ハチロク】
# display as 八六
# JP: 「餅は餅屋、汽車は汽車屋です、双鉄様。\n双鉄様の\x%l機関士;#00ffc040;機関士%l;#;としての適正の高さは、明白です」
2908 = "「術業有專攻，雙鐵少爺。雙鐵少爺身為\\x%l機関士;#00ffc040;司機%l;#;的優秀同樣也是不容置疑的」" 

# monologue
# JP: まったく迷いのない言葉。\n率直すぎる賞賛を、単純に嬉しく感じてしまう。
3363 = "八六的話語中沒有半點猶豫。她直接的讚賞讓我感到很開心。" 

# 【ハチロク】
# display as 八六
# JP: 「ほんの半年。それだけあれば双鉄様も、清美\x%l機関士;#00ffc040;機関士%l;\n#;同様、\x%l機関助士;#00ffc040;機関助士%l;#;なしでの機関車運用も可能となります」
3059 = "「雙鐵少爺的話，只消半年，便能與清美\\x%l機関士;#00ffc040;司機%l;#;一樣無需\\x%l機関助士;#00ffc040;司爐%l;#;輔助，也能將機車運用自如」" 

# monologue
# JP: きっぱりとそう言い切ってハチロクは、\n僕、日々姫、ポーレットとじゅんじゅん見渡す。
3352 = "八六如此斬釘截鐵地斷言後，依次來回看著我、日日姬和波萊特。" 

# 【ハチロク】
# display as 八六
# JP: 「故に、双鉄様は今のレールをご[まいしん,1]邁進ください。\n双鉄様が[みち]路を開けば、必ず皆がその正しさに続きます」
2378 = "「因此，請雙鐵少爺沿著現在的軌跡昂首邁進。只要雙鐵少爺開拓出一條路，大家肯定也會跟著走上正確的道路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「極端な意見ではあるが、しかし、理もある」
3056 = "「雖然是很極端的意見，不過也同樣有道理」" 

# monologue
# JP: ハチロクの言は、一点突破で高いところ――\n誰もが目にするところに、旗を掲げろということだ。
3359 = "八六是說讓我向著高處集中突破，在每個人都能看到的地方高舉旗幟。" 

# monologue
# JP: その旗が正しき道筋を示すなら、\n目にした者は、必ず後に続いてくれるはずだ、と。
3814 = "若那是指示了正確道路的旗幟的話，每一個看到的人都肯定會以其為目標緊跟其後的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 2305 = "「唔」" 

# monologue
# JP: 日々姫、ポーレット、ハチロク。
3616 = "日日姬、波萊特、八六。" 

# monologue
# JP: それぞれの意見を、そのまま汲むことはせぬにせよ、\nこれからの方針の参考とすることは大いに有用だろう。
3420 = "哪怕不能全盤接受她們的意見，她們的想法對今後的方向依然有著極大的參考價值。" 

# monologue
# JP: （だが――）
3964 = "（但是——）" 

# monologue
# JP: 日々姫の言った、『手段と目的』。\n――その一言が、鼓膜の奥にこびりつく。
3621 = "日日姬所說的“手段和目的”，這句話深深地扎在我的腦海裡。" 

# monologue
# JP: もう一段階高いレベルに目線を置けば、僕はやはり、\n『手段と目的』を取り違えているのではなかろうか？
3462 = "如果以更加高瞻遠矚的視角加以審視，我確實是混淆了“手段和目的”吧。" 

# monologue
# JP: （エアクラ工場誘致撤回と、水資源の保護――\nそれを目的――ゴールと定めて良いのだろうか？）
3985 = "（阻止空凝機工廠落戶和保護水資源——將這些定為最終的目標真的好嗎？）" 

# monologue
# JP: いや、違う。それさえもやはり一つの過程――\n御一夜を立て直すためのステップであるにすぎない。
3278 = "不，不對。這不過也是過程之一是令御一夜復興過程中的一個步驟。" 

# monologue
# JP: エアクラ工場が建設されず、水を守って――\n産業も鉄道も復活せずに、人が飢えては意味が無い。
3270 = "不然就算我們阻止了工廠建設、保護了水資源——不復興產業和鐵路也只會讓民眾吃不上飯。" 

# monologue
# JP: （地域の協力、政治の活用、旗印の掲示――\nそれら全てを活用しても、まだまだ足りない）
3966 = "（動員本地人的協助、有效利用政治、高舉旗號——就算把這些全部利用起來或許都不夠）" 

# monologue
# JP: 宝生元忠、宝生稀咲親子がなにゆえ、\nエアクラ工場誘致を良しとしているのか。
3475 = "寶生元忠和寶生稀咲父女是為何要支持空凝機工廠落戶呢？" 

# monologue
# JP: 僕らの地域振興に無く、工場誘致が持つ物は何か――\nそこをまだ、僕は考え尽くしていない。
3482 = "工廠落戶有著我們的御一夜振興計劃中所欠缺的東西——而我還沒有想清楚欠缺的這一點是什麼。" 

# monologue
# JP: （ざばっ）
3975 = "（嘩啦）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ！」
2371 = "「噗啊！」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
3063 = "「雙鐵少爺？」" 

# monologue
# JP: 両手に掬った湯を叩きつけるようにして顔を洗う。
3558 = "我用雙手捧起熱水拍在自己的臉上。" 

# monologue
# JP: そうだ、ここで焦らず洗い直そう。\n8620が再び走り出した今こそ、地に足をつけ。
3658 = "沒錯，不要著急，從頭開始認真想。８６２０已經又一次馳騁起來了，所以現在我更應該腳踏實地。" 

# 【双鉄】
# display as 雙鐵
# JP: 「時間が欲しい。丸一日で構わない。\n出来れば明後日――この全員で会議を持てるだろうか」
2637 = "「我需要時間，一整天就好。可以的話在後天——我們所有人再來開個會吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「夕方の乗務が終わった……\nそうですね、[じゅうはちじ,4]１８：００からでどうでしょう？」
2132 = "「傍晚的乘務工作結束後的話……嗯，傍晚六點怎麼樣？」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、ポーレットと一緒に参加しますよぉ」
2800 = "「玲奈也要和波萊特一起參加哦」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしも当然ながら、双鉄様にご一緒します」
2558 = "「我也當然要和雙鐵少爺一起」" 

# 【凪】
# display as 凪
# JP: 「おもしろそうばい！　参加するばい！」
2406 = "「好像賊好玩！咱要參加！」" 

# 【ふかみ】
# display as 深美
# JP: 「え、ええと――\nおじゃまじゃないなら、参加したい。です」
2324 = "「啊、呃——如果不嫌我礙事的話，我想參加。嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫はどうだ？」
2683 = "「日日姬呢？」" 

# monologue
# JP: 声をかければ、日々姫は少し驚いたような顔をする。
3632 = "日日姬見我詢問，露出了些許驚訝的表情。" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　別に、普通に参加するつもりだけど」
2271 = "「呃？我自然是跟著參加了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば良かった。で、だ。出来ればで構わんのだが\n――稀咲達も誘ってみてはくれんか？」
3003 = "「那就好。還有就是，如果能請得動的話——邀請稀咲他們來可以嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩？　っていうか……達、って？」
2863 = "「稀咲學姐？還有——什麼人？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲に声をかけるとき――元忠氏と浦上さんにも\n会議参加を願えないかを稀咲から聞いて貰えないかと」
2354 = "「嗯，在跟稀咲說的時候，能不能透過她邀請元忠先生和浦上經理也來參加」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
2311 = "「啊——」" 

# monologue
# JP: ぽかんと、大きく開いた口。
3630 = "日日姬的嘴張得老大。" 

# monologue
# JP: それを日々姫はきゅっと閉じ、\n力強い目で僕を見、頷く。
3689 = "然後日日姬抿起嘴，以堅定的眼神看著我點了點頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「――わかった。\nにぃにがそうしたいなら、誘ってみるけん」
1528 = "「——知道了。既然阿哥想這麼辦，我會試試的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2918 = "「謝謝」" 

# monologue
# JP: ならば僕からは真闇姉と蓑笠老人、赤井宮司に――\nそれにもちろん、登呂流湯のご主人も誘ってみよう。
3919 = "那麼我去邀請一下真闇姐、蓑笠爺爺、赤井宮司——可以的話也叫上登呂流浴場老闆吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
2417 = "「好！」" 

# monologue
# JP: （ざばあっ！）
3974 = "（嘩啦！）" 

# monologue
# JP: 動き出しの、いや、再始動の今。\n――恐らく今しか、チャンスはない。
3459 = "如今既然已經啟程——不，是再次啟程，那就真的是機不可失時不再來了。" 

# monologue
# JP: エアクラ誘致、その一点で白と黒とを分け合うことない、\nオール御一夜で協力し合える、その体制を作るには。
3481 = "工廠落戶也只是復興御一夜的方法之一。我們如今要創造的是復興御一夜的體制，無論黑貓白貓，能捉到耗子就是好貓。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は先にあがらせてもらう。\nみなはゆっくり、今日の疲れを流していってくれ」
2601 = "「我先出去了。各位就在這裡慢慢地洗去一身的疲勞吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、にぃに！？　私もあがるとっ！」
2336 = "「啊，阿哥！？我也要出去！」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。\nわたくしもこれ以上は湯あたりしてしまいそうです」
3062 = "「雙鐵少爺，我再泡可能會泡暈了，那我也出去吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「疲れ、もともとそれほどじゃないですし」
2630 = "「我本來就不怎麼累」" 

# 【れいな】
# display as 玲奈
# JP: 「ポーレット、もうあがるですかぁ？\nそれなら、れいなもあがりますよぉ」
2787 = "「波萊特要出去？那玲奈也出去吧」" 

# 【ふかみ】
# display as 深美
# JP: 「わたし！　わたしもあがります。\nあの……えと――宿題、とか。あるです。し」
2986 = "「還有！還有我。那個……我還得回去做作業」" 

# 【凪】
# display as 凪
# JP: 「みんなあがると？　それなら凪さま！\nこのひろーか湯船をひとりじめばーい！」
2395 = "「大家都走？那本小姐獨占大浴池咧！」" 

# monologue
# JP: 凪を除いた全員が、ぞろぞろ風呂から――
3931 = "除了凪以外所有人都準備離開浴池——" 

# 【凪】
# display as 凪
# JP: 「やっぱり一人はさみしかとばーい！！」
2983 = "「還是算了，一個人太冷清咧！！」" 

# monologue
# JP: 訂正、凪もだ。\n全員が風呂から上がろうとする。
3264 = "不對，凪也不泡了。於是我們所有人都決定離開澡堂。" 

# monologue
# JP: （だが――ひとまずは一人で考えねばな。\nそうせねば、皆のフラットな意見を聞き損ねてしまう）
3963 = "（不過——我要先一個人思考一下。不然就浪費了大家大膽提出的意見）" 

# monologue
# JP: 幸いにして、資料は文字通り、山のようにある。
3485 = "幸虧資料真的是多得能堆成山。" 

# monologue
# JP: （不出来でも、不十分でも構わない。\nとにかく、たたき台を作り、提案するんだ）
3979 = "（就算很粗糙很不完善，我也要先想個可以拿出來討論的草案）" 

# monologue
# JP: 御一夜が積み重ねてきた歴史を、失敗を整頓し、\n僕が見てきた、教えてもらった現状を加味して――
3577 = "我要重新回顧參考御一夜悠久的歷史和經歷的挫折，以及我回到這裡的所見所學。" 

# monologue
# JP: （そうして、小さくとも築くのだ）
3983 = "（然後，從小處一點一點做起）" 

# monologue
# JP: 御一夜復興のために一丸となる。\nオール御一夜――その体制の、[いしづえ]礎を。
3648 = "構建能夠團結起整個御一夜，朝著產業復興前進的體制基礎。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。旧帝鉄[ゆのい,1]湯医線関係の書籍と資料とは、\nこの程度かと存じます」
3061 = "「雙鐵少爺，和前帝國鐵路湯醫線有關的書籍和資料大概就是這些」" 

# 【日々姫】
# display as 日日姬
# JP: 「御一夜の郷土史関係の本とか、\nここに置いておくんでよかと？」
2277 = "「和御一夜當地歷史有關的書就都擱這裡了」" 

# 【真闇】
# display as 真闇
# JP: 「エアクラ関係の資料ば、あんまり多くなかったけん。\nおねえちゃんの私物も、貸したげるねぇ」
2279 = "「和空凝機有關的資料沒多少，就把姐姐的私人物品也借給小雙吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまない、みんな。ありがとう」
3085 = "「麻煩大家了。謝謝」" 

# monologue
# JP: 小山になった資料群を見れば、\nあらためて僕にも理解できる。
3720 = "看到堆積如山的資料，我這才重新意識到——" 

# monologue
# JP: 真闇姉が、日々姫が、ハチロクがいったとおりに、\n一人でなら、資料探しで夜が終わってしまったことを。
3740 = "真闇姐、日日姬、八六是對的，如果讓我一個人幹，光找資料就要找一晚上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、もう大丈夫だ。ここからは、この資料群を」
2459 = "「幫我幫到這裡就夠了。接下來我就靠這些資料——」" 

# 【真闇】
# display as 真闇
# JP: 「一人でぜぇんぶ読みこなせると？\nそぎゃんことしとったら、一日じゃまるで足りんとよ？」
2110 = "「你想一個人全看完？這麼多花一整天也讀不完吶」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんが――\n読むことまでは、さすがに手伝ってもらえんだろう」
2250 = "「可能吧——但你們也不能代替我讀吧」" 

# monologue
# JP: 言った瞬間、日々姫がはい！　と手を挙げる。
3528 = "我剛說完，日日姬就舉手表示有話要說。" 

# 【日々姫】
# display as 日日姬
# JP: 「レジュメ！　まとめ書きなら作れるけん！\nにぃにが指示してくれたら、その視点で」
2236 = "「可以寫摘要啊！阿哥告訴我需要從什麼視角整理就行」" 

# 【ハチロク】
# display as 八六
# JP: 「その方法がよろしいかと、わたくしも思います。\n情報整理は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の得意とするところです」
2559 = "「我也覺得這個方法不錯。\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;擅長的就是整理訊息這類工作」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……好意は、とてもありがたい。\nが――」
1602 = "「……謝謝大家的好意。可是——」" 

# 【真闇】
# display as 真闇
# JP: 「が？」
2249 = "「可是？」" 

# monologue
# JP: わがままだとはわかっている。
3564 = "我知道這麼做很任性。" 

# monologue
# JP: それゆえに、喉にこもった僕の思いを、\n真闇姉のまなざしと声とが、引き出してくれる。
3804 = "而真闇姐用她真摯的目光和聲音引導我說出了堵在嗓子裡的任性想法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……まとめとなると、まとめた者の視点が混じろう。\nしかし僕は。今回ばかりは、一人で考えてみたいのだ」
1583 = "「……大家幫我總結的話，摘要總會帶上每個人特有的視角。可唯有這次，我想一個人思考」" 

# 【ハチロク】
# display as 八六
# JP: 「一人で――で、ございますか？」
2519 = "「您是說，不想被別的觀點擾亂嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。僕が作りたいのは、各々の利害を超えた、\nいわば、オール御一夜の体制だ」
2349 = "「嗯。我想創造的是能超越各方利害關係、讓御一夜團結一致的體制」" 

# 【真闇】
# display as 真闇
# JP: 「いま、ものすごぉく小規模だけど、\nここに出来とぉのみたいな？」
2115 = "「你是說像咱們現在這樣，雖然只有幾個人，但達成一致的唄？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2702 = "「是啊——」" 

# monologue
# JP: 言われて、そうだなと気付かされる。
3752 = "真闇姐這麼一說，我才反應過來。" 

# monologue
# JP: エアクラ工場誘致賛成の日々姫。反対の真闇姉。\n究極的には、鉄道復権だけが望みのハチロク――
3699 = "現在在場的有贊成空凝機工廠落戶的日日姬和反對的真闇姐。還有眼裡只有復興鐵路的八六——" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、だ。が、この協力体制とて、\nいざ工場誘致という話題となれば、壊れてしまう」
2845 = "「確實是這樣。可就算我們這個小團體目前達成了一致，一談到工廠落戶的問題還是會分道揚鑣」" 

# 【日々姫】
# display as 日日姬
# JP: 「そいば嫌やけん、にぃにになんとかして欲しかとよ。\nにぃになら、そぎゃんとしてくれるって、思うけん」
2547 = "「我不要這樣。阿哥想個法子唄。我相信阿哥一定能想個好法子整好的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2305 = "「唔」" 

# monologue
# JP: 日々姫の素直な信頼が、僕にも素直に染み通ってくる。\nそこから広がるイメージが、僕の言葉を助けてくれる。
3523 = "我切身感受到了日日姬對我真摯的信賴。她的話給了我靈感，讓我想到該怎麼組織自己的語言。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうするためには、\n色を混じえぬことが必要かと思うのだ」
2751 = "「正因為如此，我才不能讓顏色都混在一起」" 

# 【日々姫】
# display as 日日姬
# JP: 「色？」
3071 = "「顏色？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。オール御一夜体制を築くための、土台。\nその素案は、誰の色を交えてもきっと、成り立たぬ」
2366 = "「嗯，這是構建全御一夜體制的基石。我認為，這基石一定得是純色的，不能混進其他人的顏色」" 

# monologue
# JP: あ、と小さなハチロクの声。
3356 = "八六小小地“啊”了一聲。" 

# 【ハチロク】
# display as 八六
# JP: 「色――とは。つまり、立場、意見。あるいは、\n目的といったもののことでございましょうか？」
3070 = "「顏色——您是指立場或者意見嗎？還是說，是指某種目標？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。土台が色づいていては、それぞれの色を、\n濁らせず乗せてもらうことは、難しくなってしまおう」
2345 = "「嗯。基石一旦混進了不同的色彩，各種顏色攪在一起想再保持純粹就很難了」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー。\n黄色か紙に青ばぬったら、緑がかっちゃうみたいな？」
2316 = "「啊——就像紙上沾了黃色再塗上藍色就會攪和出綠色一樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。ゆえ、オール御一夜を描くためには、\n土台が真っ白であることが必須となるかと思うのだ」
2762 = "「沒錯。所以我認為全御一夜體制的基石必須是純白的」" 

# 【真闇】
# display as 真闇
# JP: 「そいやけん、みんなで作るまとめには、\nそれぞれの色が混じりそうで――怖かと？」
2448 = "「小雙是害怕混了大家的意見會讓顏色模糊不清唄？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「怖いというのは、少し――」
2895 = "「與其說是害怕——」" 

# monologue
# JP: 違う、といいかけ、\nけれども続きを、喉から出せなくなってしまう。
3530 = "我原本想否認，可是說到一半又把話咽了下去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや……。なるほど、僕は怖いのか」
2047 = "「不……你說得對，我就是害怕這個」" 

# monologue
# JP: 誰かの望みを、使命を果たす。\nそうして誰かの役に立つ――それが、僕の贖罪だった。
3637 = "替別人實現願望、完成使命、幫上別人的忙就是我的贖罪。" 

# monologue
# JP: けれど今、僕が為そうと欲しているのは、\n誰の望みも混じえない――正反対のことなのだから。
3411 = "可現在我的目標卻正好相反，是創造一個不被其他任何人的願望沾染的基石。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。怖い。決してしくじれないことで、\nその上に慣れぬ挑戦であるが故、神経質になっている」
2441 = "「對，我害怕這個。畢竟這件事決不允許失敗，而我又不習慣做這種事，所以變得有點神經質」" 

# 【真闇】
# display as ３人
# JP: 「ほんなん」「そんなの」\n「そのようなこと」
2759 = "「沒有」「沒有啊」\\n「並沒有——」" 

# monologue
# JP: 真闇姉、日々姫、ハチロク――\n三者の間で、視線が行き交う。
3738 = "真闇姐、日日姬、八六三個人交換了視線。" 

# 【真闇】
# display as 真闇
# JP: 「……ほんなん、少しも気にせんでも、\n双ちゃん、ふだんからできとーよ？」
1576 = "「……介意這個幹嘛，你平時做的事不也差不離？」" 

# monologue
# JP: 真闇姉がそう切り出せば、\n穏やかな声が折り重ねられる。
3747 = "真闇姐最先發言，然後緊跟著是日日姬穩重的聲音。" 

# 【日々姫】
# display as 日日姬
# JP: 「私もそう思います。\n兄さんは、普段からみんなの意見を綺麗に混ぜてます」
2566 = "「我也這麼想。哥哥平時不就總是把大家的意見總結到一塊嘛」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様の公平は、誰の意見も容れぬ公平ではなく、\n全ての意見を容れての公平と、わたくしも感じます」
2563 = "「我也認為，雙鐵少爺的公平不是容不下其他人的公平，而是容下了所有意見的公平」" 

# 【双鉄】
# display as 雙鐵
# JP: 「公平……ああ。言われてみれば――\n確かに、そうであるのかもしれん」
2165 = "「公平……啊，你們這麼一說——可能確實是這樣吧」" 

# monologue
# JP: なぜならそこには、僕の望みがなかったからだ。
3425 = "因為平時的我在做決定的時候，不會摻雜自己的願望。" 

# monologue
# JP: 僕自身の色が無いゆえに、\nどんな色でも、きっと濁らせず混色できた。
3426 = "因為我本身是無色的，所以反而能混進任何顏色不讓其變色。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや……そうか。今回の案件は、僕自身が望み――\nゆえに、すでに僕の色が滲んでいるのか」
2339 = "「嗯……原來是這樣。這次的提案是我本身的願望——所以已經染上了我的顏色」" 

# monologue
# JP: 理解に困惑させられる。\nならば一体どうすれば――
3568 = "我糊塗了。那這樣到底該如何是好——" 

# 【ハチロク】
# display as 八六
# JP: 「それで、よろしいのではないかと思います」
2634 = "「我認為這樣就好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでよい――とは」
2975 = "「這樣就好？怎麼說？」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、レールなのですから。\n方向が定まっていて、当然なのです」
3058 = "「雙鐵少爺就是鐵軌，決定方向的自然也得是您」" 

# monologue
# JP: 言葉の意味が、よくわからない。\n確かに、名こそは双鉄だけれど――
3518 = "我不懂八六這話的意思。雖然我這名字的確有鐵軌的意思——" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が……レール？」
2622 = "「我是……鐵軌？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄様は、路を示される方なのです。\nその上をどう走るかは、わたくしたち、機関車の仕事」
2765 = "「沒錯。雙鐵少爺是給我們指路的鐵軌。而我們這些機車的職責就是行駛在上面」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[みち]路――」
2938 = "「路——」" 

# monologue
# JP: 瞬間、こころがズキリと痛む。\nかつての傷が、まだ生々しい熱を発する。
3794 = "突然，我的心疼了一下。那份疼痛的灼熱感觸還讓我記憶猶新。" 

# monologue
# JP: 僕は路子を救えなかった。その路を守ってやれなかった。\nけれども、きっと――だからこそ――
3918 = "那時候，我沒能拯救路子。沒能守住她的前路。可一定也正因為如此——" 

# 【日々姫】
# display as 日日姬
# JP: 「よね！　にぃにが帰ってきてくれんかったら、\nねぇねから、わたしずーっと逃げ回っとったと思うし」
2767 = "「沒錯！要不是阿哥回來了，我肯定還在一直逃避阿姐咧」" 

# 【真闇】
# display as 真闇
# JP: 「あー、ゆーたらピリピリしとったもんねぇ。\n双ちゃんがおらんかった時分の、ひーちゃん」
2321 = "「啊——這說咱才想起來，小雙沒回來的時候，小日這丫頭可倔咧」" 

# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！　ねぇねぇ～っ」
2912 = "「討厭啦！阿姐～」" 

# monologue
# JP: 優しい声が、思い出させてくれる。僕が重ねてきたことを。\n日々姫に、ハチロクに、ポーレットに、ふかみに。
3447 = "她們溫柔的聲音讓我想起，我曾經為日日姬、八六、波萊特還有深美做了些什麼。" 

# monologue
# JP: 望みがあり、けれどもどう果たせばいいかが判らない――\nそうしたことのいくつかに、なるほど、確かに路は示せた。
3448 = "她們都心懷願望但不知如何實現——而我的確為她們指明了前進的方向。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……あるいはそれが、僕の色。僕の本質なのかもしれん。\nだとしても、正しい路を示せぬのであれば――」
1601 = "「……說不定這就是我的顏色、我的本質。可就算如此，假如我的指示是錯誤的——」" 

# 【真闇】
# display as 真闇
# JP: 「誰もにとっての“正しい”なんて、\nこの世にあるわけなかとよ？　双ちゃん」
2447 = "「小雙啊，這世上可沒有絕對的正確這一說哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2328 = "「啊！」" 

# monologue
# JP: 困惑の先、定め直そうとした目標を、\n真闇姉は、ただ一言で粉々に砕いてしまう。
3537 = "我在茫然之後剛要重新找到的目標又被真闇姐一句話粉碎了。" 

# 【真闇】
# display as 真闇
# JP: 「利害に関する“正しい”は、\n自分の利益を、望むだけ確保することやけん」
2385 = "「在利害關係上的“正確”，就是儘量保住自己個兒的利益」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ……」
2322 = "「啊……」" 

# monologue
# JP: そこまで言ってもらえて、落ち着く。\n真闇姉のいっていることは、ごくごく当然の理屈だ。
3749 = "真闇姐說到這個份上我反倒冷靜下來了。她說的都是最基本的道理。" 

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、確かにだ。\n全員の欲求を同時に、完全に満たすことなど不可能だ」
2123 = "「你這麼一說的確是這樣。怎麼可能同時完全滿足所有人的需求呢」" 

# 【真闇】
# display as 真闇
# JP: 「そいでも、調和は生めるけん」
2064 = "「不過啊，和諧也是可以製造的」" 

# monologue
# JP: 真闇姉は一升瓶を取り出そうとし――\nけれどもすぐに、蒸気ラムネの瓶へと持ち変える。
3742 = "真闇姐先是拿起一升裝的瓶子又馬上放下，然後又拿起裝著蒸汽彈珠汽水的瓶子。" 

# 【真闇】
# display as 真闇
# JP: 「こんラムネが、御一夜市の環境保持。\nで、こっちの――そうね、醤油が、商業振興」
2973 = "「這彈珠汽水代表保護御一夜市的環境，這醬油代表振興御一夜的商業」" 

# 【双鉄】
# display as 雙鐵
# JP: 「醤油とラムネか――\n全くもって相容れんな」
3033 = "「醬油和彈珠汽水啊——這兩個的口味肯定合不來」" 

# 【真闇】
# display as 真闇
# JP: 「そのまま混ぜたらあたりばキツかね。\nばってん――」
2821 = "「直接混一塊喝肯定夠嗆。不過咧——」" 

# monologue
# JP: いって、真闇姉は台所へと。\nそしてすぐ、二つの瓶と計量スプーンを持ってくる。
3592 = "接著真闇姐朝廚房走去，不一會又拿了兩個瓶子和量勺來。" 

# 【真闇】
# display as 真闇
# JP: 「まずラムネ。濃縮レモン、ジンジャーシロップ。\n軽くステアして、それからお醤油」
2146 = "「先加彈珠汽水、濃縮檸檬汁、薑汁糖漿。輕輕攪拌一下，再加上醬油」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
2372 = "「噢噢——」" 

# monologue
# JP: 醤油が、底に沈んでいく。
3922 = "醬油漸漸沉到杯子底了。" 

# monologue
# JP: “むらさき”という別名をなるほどと思わせられる、\n濃い紫のグラデーションが、思いもかけず美しい。
3506 = "怪不得醬油的別名叫“紫”，我沒想到醬油勾勒出的從深到淺的紫色漸層如此美麗。" 

# 【真闇】
# display as 真闇
# JP: 「飲んでみて？」
2124 = "「來嚐嚐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2353 = "「嗯」" 

# monologue
# JP: 真闇姉が差し出すグラスだ。\nいささかのためらいも感じず飲める。
3905 = "這可是真闇姐做的雞尾酒，我毫不猶豫地喝了一口。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは――旨いな。\n和風ジンジャーエールといった趣だ」
2972 = "「這味道——真不錯。有種日式薑汁汽水的感覺」" 

# 【日々姫】
# display as 日日姬
# JP: 「まっこと！？　にぃに、わたしもよかと？」
2824 = "「真的假的！？阿哥，給我嚐嚐！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2353 = "「嗯」" 

# monologue
# JP: グラスを渡せば、日々姫もこくりと一口飲んで。\nそうしてほおっと、幸せそうに頬を赤らめる。
3552 = "我把杯子遞給日日姬，她也喝了一口，然後臉頰瞬間染上了幸福的紅暈。" 

# 【日々姫】
# display as 日日姬
# JP: 「甘か――ばってん、ちょっぴり大人の味ばする。\nただのラムネより、わたしの口には美味しかと」
2412 = "「好甜——但又有種大人才會懂的味道。我覺得比普通的彈珠汽水更合我的口味咧」" 

# 【真闇】
# display as 真闇
# JP: 「濁りば恐れず、さらに、足す。\nそぎゃんとして生まれる調和も、確かにあるけん」
2403 = "「大膽混在一起再加上額外的元素，有時候這樣才能創造出來新的美味喲」" 

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんと！　まっことそぎゃんとよ！」
2766 = "「沒錯！就是這樣！」" 

# monologue
# JP: なにかのスイッチが入ったかのように、\n日々姫は、スケッチブックを大きく広げる。
3620 = "日日姬彷彿靈光一閃，展開了她的素描簿。" 

# 【日々姫】
# display as 日日姬
# JP: 「意見も、きっとおんなじで。\nだから――色じゃなくって、光」
2533 = "「意見肯定也一樣咧。所以不是顏色而是光」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひかり？」
2147 = "「光？」" 

# 【日々姫】
# display as 日日姬
# JP: 「色は、絵の具は、たくさんたくさん重ねると、\nどんどんどんどん、黒に近づいていっちゃうけど」
3069 = "「顏料混進各種不同的顏色，最終總會變得接近黑色」" 

# monologue
# JP: 日々姫はアクリル絵具を溶いて、\n僕の理解を助けてくれる。
3623 = "日日姬把丙烯顏料混在一起幫助我理解。" 

# monologue
# JP: 赤、青、黄――単色ではそれぞれに鮮やかな色が、\nけれど重なりを増すごとに、確かに黒に近づいていく。
3798 = "紅色、藍色、黃色——這些顏色單拿出來看都很鮮艷，但隨著混進越來越多的顏色，顏料反而越來越黑。" 

# 【日々姫】
# display as 日日姬
# JP: 「ばってん、光は――光線は、\n混ぜれば、白に近づいてくけん！！」
2246 = "「可是，光——光線混進的顏色越多反而會接近白色！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2311 = "「啊——」" 

# monologue
# JP: まばゆい、白の、ひかりのイメージ。\n日々姫が与えてくれたイメージ。
3635 = "日日姬這麼一說，我眼前就出現了炫目的白色光線的印象。" 

# 【双鉄】
# display as 雙鐵
# JP: 「意見は、ひかりか」
2534 = "「意見，就是光啊」" 

# monologue
# JP: それが、迷いを切り裂いていく。
3455 = "她的話驅散了我思維中的迷霧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――僕が間違っていた」
2186 = "「原來如此——是我之前想錯了」" 

# monologue
# JP: 全員の意見を尊重しようと望みすぎ、\n全ての意見を、排除しようとしてしまっていた。
3540 = "我太想尊重所有人的意見，結果反倒想排除別人的意見。" 

# 【双鉄】
# display as 雙鐵
# JP: 「全ての意見を尊重しようと望むばかりに、\n全ての意見を、排除しようとしていたのだな」
2606 = "「我太想尊重所有人的意見，結果反倒排除了其他人的意見」" 

# monologue
# JP: 意見がひかりであるのなら、\n閉ざしてしまえば、暗闇から動けなくなるというのに。
3306 = "假如說意見是光，那把意見都封住反而會造成黑暗。" 

# monologue
# JP: だから僕の目の前の、\nそれぞれ輝く、まばゆいひかりに目を向ける。
3583 = "所以，我必須直視眼前這些散發著不同耀眼光輝的眼睛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の、真闇姉の、ハチロクの――\nそれぞれの意見・要望を、まずは調和させたい」
2618 = "「我必須正視日日姬、真闇姐、八六——協調好所有人的意見和願望」" 

# monologue
# JP: 今この部屋にみちている、\nこれほどまぶしく、僕を照らしてくれるひかりに。
3576 = "我要混合好這間屋子裡照亮我的所有耀眼光芒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕ら全員が是とする素案を作れなければ、論外だ。\n宝生親子に、おそらく見向きもされんだろう」
2504 = "「必須要想出一個讓我們所有人都能同意的提案。不然寶生父女恐怕連看的興趣也沒有」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、どうぞ双鉄様。\nわたくしに、なんなりとお命じ下さい」
2668 = "「既然如此，就請雙鐵少爺隨意使喚我」" 

# monologue
# JP: しず、とハチロクが頭を下げる。
3372 = "八六靜靜低頭行禮。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様のレールの上に、無数のひかりを走らせる。\nそうするために、わたくしでお役に立てますことを」
2231 = "「只要能看到無數光芒行駛於雙鐵少爺的鐵軌上，我願鞠躬盡瘁」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。そうするためには、お前の力が必要だ。\nそうして、日々姫、真闇姉」
2707 = "「是啊。我也需要你。還有日日姬、真闇姐」" 

# monologue
# JP: 頭を下げる。\nハチロクが、僕にそうしてくれたように。
3543 = "我學著八六的樣子也低下頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「更に力を貸して欲しい。オール御一夜の礎を、\nいま、この場所で固めるために」
2793 = "「為了能在這裡打下全御一夜體制的基礎，希望你們繼續協助我」" 

# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　いらんていわれても、\n力の押し売り、するつもりだったけん！！」
2979 = "「這還用說！就算阿哥不願意，我也要幫忙咧！！」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら、おねーちゃんに聞かせて？\n双ちゃん、全体会議での目標は？」
3022 = "「那讓姐姐聽聽，你在全體會議上想達成什麼目標呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜の経済復興を果たすための、\nオール御一夜体制を築くことだ」
2461 = "「建立能夠讓御一夜團結一心復興經濟的體制」" 

# 【真闇】
# display as 真闇
# JP: 「そのために、会議までの準備で必要なことは？」
3000 = "「那在會議之前需要準備什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「素案の立案。エアクラ誘致反対派も賛成派も\n参加を検討するに値する、経済復興のアイディアの」
2790 = "「準備好經濟復興的草案。要能讓反對和贊成引進空凝機工廠的人都認為值得考慮」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら……基礎資料を分担で作成。\n作成者からのブリーフィングを全体で共有。で、どう？」
2989 = "「那……咱們就分別準備基本的資料。然後在全體會議前做個簡介共享？」" 

# monologue
# JP: ただそれだけのやりとりで、\nイメージを現実に落としてもらえる。
3744 = "真闇姐小小的一個提案就讓我的靈感漸漸現實起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、全員が資料作成し、その説明を行って、\n情報を共有、それを案出しに繋げるのか。よいと思う」
2190 = "「原來如此，我們所有人都準備一份資料，然後進行簡介，共享訊息之後又可以想出更好的主意。我覺得很好」" 

# 【真闇】
# display as 真闇
# JP: 「睡眠と休息。\nしっかりとらんと、危なかね？」
2174 = "「別忘了好好睡覺和休息。不然身體可要吃不消咯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。頭が鈍っていては良い案も出ん」
2710 = "「是啊。頭腦遲鈍了也想不出好點子」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですので、深夜作業でも\n問題ありません。連続稼動の休止時間を確保できれば」
2620 = "「我是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，深夜工作也不會有任何問題。只要能保證連續工作一段時間後休息就行」" 

# 【日々姫】
# display as 日日姬
# JP: 「ブリーフィングのあとにも、二時間くらいは欲しかと。\n全体会議用の、見やすか資料とか作りたいけん」
2383 = "「在事前會議後再空個兩小時比較好。我想做個全體會議上可以用的資料」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2337 = "「嗯——」" 

# monologue
# JP: 最小規模の、オール御一夜。\nそれがいきなり走り始める。
3832 = "規模最小的全御一夜體制突然在這個房間裡運轉起來。" 

# monologue
# JP: なるほど、であらば――僕はレールであればいい。
3594 = "既然這樣，那就讓我來當鐵軌吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロクには、目次のリスト化を頼みたい。\nそれがあれば、参照の時間を大いに節約できる」
2997 = "「那八六，就拜託你製作目錄了。有這個可以大大縮短翻頁的時間」" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。単純作業となりますので、\nわたくしが知識を持たない分野のものでもこなせます」
2691 = "「明白。既然是不需要專業知識的簡單工作，那我也能做」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉にも、すまんが、眠る前にひと仕事頼みたい。\n全体の段取りを組んでみてほしいのだが」
2656 = "「抱歉，真闇姐，在你睡覺之前還有一項任務要交給你。希望你能幫忙做好整體的安排」" 

# 【真闇】
# display as 真闇
# JP: 「うん。得意分野。仕事ば、段取り八分やけんね。\nおねーちゃんに任せてよかよ」
2365 = "「嗯，這個咱擅長。工欲善其事，必先利其器嘛。放心交給姐姐吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は、今は早めに休んでおいてくれ。\n再終盤、日々姫にしか出来ない作業がいくことになる」
2682 = "「日日姬今天就早點休息吧。有個只有你能做的工作在最後會交給你」" 

# 【日々姫】
# display as 日日姬
# JP: 「わかった。大丈夫。自分の出番に寝過ごさんよう、\nしっかり休んで、備えるけん」
2694 = "「明白了。阿哥你放心吧，我會好好休息到該出力的時候」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。そうしてくれ。\n起きたあとには、頼らせてもらうぞ」
2356 = "「嗯，好。等你醒了就要靠你了」" 

# 【日々姫】
# display as 日日姬
# JP: 「今よりもーっとたよってよかとよ？\n私、にぃにの妹やけん！」
2603 = "「我可是阿哥的妹妹，阿哥可以再多依靠我點咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――っ！！！」
2338 = "「嗯——！！！」" 

# monologue
# JP: （ドクンっ）
3981 = "（撲通）" 

# 【路子】
# display as 路子
# JP: 「っ！！？　これダメっ！\nにげてっ！　にげてそーちゃんっ！！」
3088 = "「！！？這個要出事！快逃！快逃啊，小雙！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
1519 = "「——」" 

# monologue
# JP: ……心強さと嬉しさに、軽く頷いたその瞬間。
1511 = "……就在我因為欣慰和感動輕輕點頭那一剎那——" 

# monologue
# JP: 死の感触も――路子が僕から離れてく、\nあのどうしようも無い絶望感も、ぶり返してくる。
3566 = "我突然又體會到了當年路子離我越來越遠時我心裡的絕望。" 

# 【日々姫】
# display as ３人
# JP: 「にぃに？」「双鉄様？」\n「双ちゃん？」
3051 = "「阿哥？」「雙鐵少爺？」\\n「小雙？」" 

# monologue
# JP: ――ほんの一瞬のフラッシュバック。\nこわばったのも、ただひとときであった筈。
1488 = "——過去的記憶只閃現了幾秒，我應該也就僵住了幾秒。" 

# monologue
# JP: けれど、それでも気づいてくれる。\n僕の異変に皆が気づいて、不安げな顔をしてくれる。
3301 = "但大家還是注意到了我有些不對勁，她們紛紛露出有些不安的表情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとう、本当に心強い」
1531 = "「——謝謝大家，有你們在我就放心了」" 

# monologue
# JP: だから、笑う。\n不器用な作り笑いに見えてしまうかもしれんが。
3584 = "所以，我必須露出笑容。就算這個笑容有些僵硬，像是硬擠出來的。" 

# monologue
# JP: 言葉にとてもできぬ感謝を――\n精一杯の言葉に、笑いに、こめたくて。
3549 = "我想把語言都表達不出的感謝之情用笑容和語言傳達給大家。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2919 = "「謝謝你們」" 

# monologue
# JP: その言葉だけを繰り返す。
3532 = "我又說了一遍這句話。" 

# monologue
# JP: 真闇姉に、日々姫に、そしてハチロクに。\n心底からの感謝をこめて――繰り返す。
3545 = "我對真闇姐、日日姬還有八六再度衷心致謝。" 

# 【元忠】
# display as 元忠
# JP: 「復線？」
2514 = "「恢復廢線？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい。復線です。それがなれば、\n御一夜の環境保全と経済復興とは、両立します」
2769 = "「沒錯，我們要恢復廢線。這樣就能同時保證御一夜的環境和復興經濟了」" 

# 【稀咲】
# display as 稀咲
# JP: 「復線って――\nそんなニーズは今時どこにも無いだろう？」
2120 = "「你說恢復廢線——現在根本不需要鐵路了吧？」" 

# monologue
# JP: 率直極まる稀咲の言葉に、\n元忠氏も、浦上さんも頷いている。
3332 = "元忠先生和浦上經理都點頭同意稀咲直接的意見。" 

# monologue
# JP: 御一夜銀行サイドの三人は、\n全員が全員、この会議に出席してくれた。
3298 = "代表御一夜銀行的三個人全部出席了這場會議。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ニーズは作り出せます。最初に復線させるのが、\n“御一夜－[やつしろ,2]八ツ城”間だからです」
3065 = "「需求是可以創造的。因為我們最開始要恢復的線路是“御一夜至八代”區間」" 

# monologue
# JP: 言葉と同時、日々姫が用意してくれていた\nパネルを示す。
3516 = "我一邊說，一邊用日日姬幫我準備的展板示意給他們看。" 

# 【凪】
# display as 凪
# JP: 「八ツ城からも、鉄道の線路走っとるばい！」
2156 = "「八代那邊也有可以跑的鐵路咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――本当。ええと……みかん鉄道？\nって、どうしてこれ――」
2319 = "「啊——真的。那個……是叫橙鐵路來著？話說，為什麼還留著鐵路啊？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「貨物需要と、観光需要があるからです。\nだから、鹿兒島県が主体となって廃線を阻止した」
2381 = "「因為那裡還有運輸貨物和鐵路觀光的需要。所以鹿兒島縣牽頭阻止了廢線」" 

# monologue
# JP: ああ、と小さな声を出すのは、蓑笠老人だ。
3820 = "蓑笠爺爺在一旁小聲同意。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「鹿兒島が主体となったとですか。\nなら、[さつま,1]颯馬の地域性もあるかもしれんですのぉ」
3083 = "「鹿兒島能這樣可能和那裡是薩摩人的地兒也有關係咧」" 

# 【れいな】
# display as 玲奈
# JP: 「さつまのちいきせい、ですかぁ？」
2903 = "「薩摩人的地盤？」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「大昔から、[さつま,1]颯馬は帝都と仲の悪かと。\n中央の方針には、ともかく素直に従わん」
2904 = "「薩摩和帝都自古關係就不怎樣。他們才不會老實兒地聽從中央命令」" 

# 【赤井】
# display as 赤井
# JP: 「まぁその[きふう,1]気風も、今は昔ともなっていましょうが。\nしかし……なるほど、みかん鉄道と繋げますか」
2096 = "「他們以前就是那種脾氣。話說回來……原來如此，要和橙鐵路連在一起嗎」" 

# monologue
# JP: 鹿兒島のフォローをしつつの赤井宮司の頷きを、\n宝生稀咲は見逃さない。
3885 = "赤井宮司在一旁幫鹿兒島說了兩句好話，而寶生稀咲注意到了他最後半句。" 

# 【稀咲】
# display as 稀咲
# JP: 「みかん鉄道と線路が繋がることには、\n赤井宮司も納得されるほどのメリットが？」
2935 = "「赤井宮司認為和橙鐵路連上對我們也有好處？」" 

# 【赤井】
# display as 赤井
# JP: 「と、思いますが――古い鉄道屋の知識です。\n最新のものは、双鉄君からの補足があるのでは？」
2768 = "「沒錯，不過我只是個老鐵路人，知識可能過時了。最新的就請雙鐵先生補充吧」" 

# monologue
# JP: なるほど。宮司もまた、稀咲が一目置いているだけはある。\n話をきちんと、繋げて僕へと戻してくれた。
3266 = "不愧是宮司，一點就透。怪不得就連稀咲都認為他是個大人物。他接下話之後，又把話重新遞到了我這裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司がおっしゃってくださったとおり、\nみかん鉄道との\x%l接続;#00ffc040;接続%l;#;は、非常に大きな意味を持ちます」
2754 = "「正如赤井宮司所說，和橙鐵路\\x%l接続;#00ffc040;會車%l;#;對我們而言有著非比尋常的意義」" 

# monologue
# JP: 日々姫のパネルの地図の、八ツ城を示す。
3554 = "我指著日日姬的展板地圖中八代的位置。" 

# 【双鉄】
# display as 雙鐵
# JP: 「八ツ城は大きな港町です。港と繋がる線路を持つことは、\nエアクラの弱点を補完します」
2154 = "「八代是個海港城市。如果能擁有和海港連接的線路，我們就可以彌補空凝機的弱點」" 

# 【稀咲】
# display as 稀咲
# JP: 「超重量物移送の問題だね？　それは、確かに、\nニーズがあれば大きなメリットになるだろうけれど」
2116 = "「你是說空凝機不能運送大重量貨物的問題吧？的確，如果客戶有這種需求，確實會給我們帶來巨大利益」" 

# monologue
# JP: ニーズは、作れる。いいや、自然と発生してくる。\nその確信があるからこそ、敢えて答えず話をすすめる。
3940 = "需求是可以創造的，不，是會自然產生的。正因為我如此確信，所以才特地沒有直接回答，而是繼續說。" 

# 【双鉄】
# display as 雙鐵
# JP: 「みかん鉄道側にも、この復線は大きなメリットを\n生みます。まずは単純に、観光需要の刺激」
2587 = "「我們恢復廢線對橙鐵路來說也是一件好事。首先最簡單的，就是會刺激旅遊需求」" 

# 【ふかみ】
# display as 深美
# JP: 「さっき、ポーレットさんが言ってたお話、です？」
2697 = "「是剛才波萊特小姐說過的那個嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。みかん鉄道沿線――八ツ城海の夕暮れの\n車窓風景は、日ノ本一とも呼ばれるほどだそうだ」
2350 = "「嗯。聽說橙鐵路沿線——八代海的夕陽從車窗看過去是日本最美麗的」" 

# 【凪】
# display as 凪
# JP: 「日ノ本一！　すごかとばい！\n凪さま、それだったら見てみたかとばい！！」
2685 = "「日本最美？這可太強咧！本小姐好想去瞧瞧！」" 

# 【赤井】
# display as 赤井
# JP: 「御一夜から、[はやと,1]早戸側に抜ける路線。\nこれも廃線となりましたが、[ひさつせん,2]肥颯線[おこばえき,2]小畑駅近くの車窓も」
3054 = "「雖然也廢線了，不過從御一夜到隼人的線路，還有肥薩線大畑站附近的車窗也能欣賞到同樣水準的景色」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ええ、日ノ本三大車窓の一つと称されたそうですね。\n将来、肥颯線も復線させれば、資源は更に連携します」
2351 = "「嗯。那裡的景色可是被稱為日本三大車窗絕景之一呢。將來等肥薩線恢復以後，旅遊資源就可以加強共享了」" 

# 【ふかみ】
# display as 深美
# JP: 「日ノ本一と、日ノ本三大車窓のひとつ。\n――その両方が一つの列車で結ばれたら、すごい。です」
2687 = "「日本第一的夕陽和日本三大車窗風景之一——能坐一輛車同時享受兩種美景實在太棒了。嗯」" 

# 【稀咲】
# display as 稀咲
# JP: 「だが、『将来的に』、『連携させれば』の話だろう？\nそれが果たせぬ段階では利用者が見込めないのだから」
2103 = "「但是這些都是對未來的假設吧？現在還不能確定恢復廢線後就一定會有很多旅客吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、見込める。なぜなら[せんだい,1]千内－八ツ城間には、\n御一夜のような、いわゆる温泉観光地が無いゆえに」
2071 = "「不，可以確定。因為從川內到八代的線路沒有像御一夜一樣的溫泉旅遊景點」" 

# 【ポーレット】
# display as 波萊特
# JP: 「逆に、御一夜にはもちろん海がありません」
2222 = "「反過來說，御一夜也沒有海」" 

# 【稀咲】
# display as 稀咲
# JP: 「それこそエアクラを使えばいい話だ。海でも温泉でも、\n線路に縛られないで、どこへだっていける」
3019 = "「那用空凝機不就行了嘛。用空凝機就可以不受線路束縛，不管海還是溫泉，想去哪裡都成」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『どこへだっていける』は、結局、\n『どこへもいかない』という選択肢をも浮き上がらせる」
1548 = "「“哪裡都能去”反而會凸顯“哪裡都不去”的選擇」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？」
2367 = "「嗯？」" 

# monologue
# JP: 稀咲が頷く。\nほんのわずかに、慎重そうに。
3806 = "聽到我這麼說，稀咲慎重地輕輕點了點頭。" 

# 【稀咲】
# display as 稀咲
# JP: 「たしかに、情報過多による選択疲れは\n社会傾向として、顕著になってきつつはあるよね」
2819 = "「的確，現代社會確實出現了訊息過多反而造成難以選擇的問題」" 

# monologue
# JP: 僕らが一晩で調べられるような資料内のこと。\n予想通りに――当然ながら、稀咲は把握してくれている。
3910 = "這是我們查了一晚上資料就知道的東西。稀咲當然也明白，這完全沒有出乎我的預料。" 

# 【稀咲】
# display as 稀咲
# JP: 「だからこそのブームの極端化。誰かがよしとしたものに、\nわれもわれもと飛びついて――ああ」
2649 = "「所以才要推動觀光熱潮極端化。只要有人去就會不停有跟風的——啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道自体をブーム化させて、定着させることを目指す。\n『不便な交通』ではなく『旅の楽しみの手段』として」
2590 = "「我們的目標就是讓鐵路本身變成一股流行熱潮，給別人的印象從“不便的交通方式”變成“享受旅遊樂趣的一種手段”」" 

# 【稀咲】
# display as 稀咲
# JP: 「旅行の楽しみを増大させるツールとしての、鉄道」
2654 = "「把鐵路從交通方式變成增加旅遊樂趣的工具」" 

# 【双鉄】
# display as 雙鐵
# JP: 「線路をカタログ、駅名はそこに載る商品と位置づける。\nその価値観を明示し、線路にならではの意味を持たせる」
2940 = "「路線就是商品目錄，每個站就是目錄上的商品。我們要把這樣的價值觀傳達給客戶，讓鐵路擁有獨特的意義」" 

# 【稀咲】
# display as 稀咲
# JP: 「……線路はカタログ。駅は観光商品か。\nそれは――うん、個人的には、ほんの少しだけ面白い」
1605 = "「……路線就是商品目錄，每個站就是目錄上的商品。這個——就我個人來說，我覺得有點意思」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのカタログイメージを際立たせる新観光列車を\n走らせて、乗車自体が旅の楽しみなのだと明示する」
2593 = "「我們要讓能展示我們價值觀的新旅遊列車跑起來，告訴大家鐵路本身就是旅遊樂趣的一環」" 

# 【凪】
# display as 凪
# JP: 「よかこと思いついたばい！！！」
2281 = "「咱有個好主意！！！」" 

# monologue
# JP: 凪の挙手。椅子がガタリと音を立てる。
3390 = "凪突然舉手，她的動作大到椅子都發出了啪嗒一聲。" 

# 【ふかみ】
# display as 深美
# JP: 「いいことって、なぁに？　凪ちゃん」
2443 = "「小凪想到什麼好主意啦？」" 

# 【凪】
# display as 凪
# JP: 「線路の名前ばい！　御一夜と八ツ城つなぐ線路ば、\n『御一夜温線』っていう名前にするばい！！」
2698 = "「是名字！御一夜到八代的線路就叫“御一夜溫線”得了！！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜本線？」
2485 = "「御一夜本線？」" 

# 【凪】
# display as 凪
# JP: 「本線じゃなくて温線ばい！\n温泉のせんと、線路のせんをかけるばい！！」
2052 = "「不是本線是溫線！把溫泉和線路合在一起！！」" 

# 【れいな】
# display as 玲奈
