1849 = "「哇，要背玲奈是吧」" 

# monologue
# JP: 繋いでる手を離してしゃがめば、\nれいなは嬉しげな声を出す。
2765 = "我鬆開牽著的手，彎下身子，玲奈就開心地這樣說道。" 

# monologue
# JP: しかし体重が乗ってこない。\nれいなは逡巡しているようだ。
2594 = "但是她沒爬上我後背，看來是在猶豫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　遠慮なぞ不用だぞ？\nこう見えて、僕はまだまだ十分体力を残している」
2009 = "「怎麼了？沒什麼好客氣的啊。別看我這樣，我還留有足夠的體力呢」" 

# 【れいな】
# display as 玲奈
# JP: 「うれしいですけど、おんぶしてほしいですけど……\nでもれいな、おんぶしてもらったら、ねちゃうから」
2198 = "「玲奈很高興，也很希望你背玲奈……可是被背起來之後，玲奈肯定會睡著的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、寝ていいと言って」
2027 = "「我就是讓你睡嘛」" 

# 【れいな】
# display as 玲奈
# JP: 「でもでも！　ねちゃったら、そうてつさんと――\nれいな、おしゃべりできなくなっちゃうから」
1807 = "「可是可是，睡著以後，玲奈就沒辦法和雙鐵先生聊天了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1923 = "「噢……」" 

# 【れいな】
# display as 玲奈
# JP: 「せっかく、そうてつさんといっしょで――\nだからたくさん……たくさん……そうてつ、さん、と」
2375 = "「難得能和雙鐵先生一起……所以玲奈想跟雙鐵先生多聊聊……多聊聊……」" 

# monologue
# JP: この瞬間も、必死で睡魔と闘ってくれている。
2627 = "即使是現在，她也在拚命與睡意作鬥爭。" 

# monologue
# JP: れいなの健気さに答えたい。\n思った瞬間、言葉が喉から飛び出している。
2734 = "我想回應她的堅持。想到這裡，話語就從喉嚨裡飛了出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、御一夜に戻ってからもおしゃべりしよう」
2336 = "「那我們回御一夜再聊吧」" 

# 【れいな】
# display as 玲奈
# JP: 「わ！　そうしちゃってもいいんですかぁ」
1837 = "「哇！可以的嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かまわんさ。僕の話につきあわせてばかりだったゆえ、\nれいなが本当に眠るまで、僕は、れいなの話を聞こう」
1803 = "「可以啊。你陪我聊了這麼久，那我也陪你聊到你徹底睡著為止吧」" 

# 【れいな】
# display as 玲奈
# JP: 「本当に眠るまで。おうちにかえってねんねするまで、\nおはなし、聞いててくれるんですかぁ？」
2000 = "「徹底睡著為止？在上床睡覺之前，你都可以陪我聊嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ポーレットがＯＫをしてくれるのならばだが」
1892 = "「嗯，只要波萊特沒意見」" 

# 【れいな】
# display as 玲奈
# JP: 「それなら、ポーレットとさんにんで、\nれいな、おはなししたいですぅ」
2343 = "「那玲奈想帶上波萊特一起聊天」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、喜んで」
1901 = "「嗯，沒問題」" 

# monologue
# JP: 微笑ましくなる。\n僕とふたりのおしゃべりの、珍しさにもう飽いたのだろう。
2727 = "我微笑起來。看來兩個人單獨聊天的新鮮期已經過了。" 

# monologue
# JP: そうなってしまえばれいなはやはり、\nポーレットと一緒にいるのが、一番うれしく幸せなのだ。
2880 = "看來到了這種時候，對玲奈來說最幸福的還是跟波萊特一起啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、それで話は決まりだな。\nそら」
2332 = "「那就這樣定了，上來吧」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい」
# 1943 = "「好的」" 

# monologue
# JP: れいなが背中にのってくる。\nずっしりしている。あたたかだ。
2862 = "玲奈趴到了我的背上。很重，很暖。" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ――おんぶ、しあわせですよぉ」
1911 = "「嘻嘻嘻，被背著好幸福呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もし眠っても、れいなが起きるまで待っているから、\n寝るも起きるも、れいなの好きにするといい」
1979 = "「就算你睡著了，我也會等你醒來的，你想睡想醒都隨意」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへー……それなら……安心……あん……しん」
1913 = "「嘿嘿嘿……那玲奈就放心……放心……」" 

# monologue
# JP: 背中の重みがさらに増す。\nすやすやと、れいなは一瞬で寝入ってしまう。
2679 = "後背的重量又重了幾分。很快，身後就傳來玲奈的鼻息。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……よほど無理をさせてしまっていたのだな」
1301 = "「……看來我真是勉強她了」" 

# monologue
# JP: 申し訳ない気持ちを感じる。\n同時に、強い喜びも。
2759 = "我覺得很對不起她。同時我也感受到了強烈的喜悅。" 

# monologue
# JP: 僕との時間を過ごすため、れいなはここまで懸命に、\n頑張り続けてくれていたのだ。
2810 = "為了與我共度這段時光，玲奈竟然如此努力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「というか……僕も、かなり疲れているな」
2275 = "「話說回來……我也很累了啊」" 

# monologue
# JP: れいなが眠って、ずっしりと来て初めて感じたが――\n腰がどうにも鈍い感じだ。歩きすぎたかもしれん。
2852 = "玲奈睡著之後，我才感覺腰沉甸甸的。可能是我走太久了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなに合わせ、普段よりゆっくり歩いたしな――\nそういうものも、疲労には影響するのだろうな」
2254 = "「而且為了配合玲奈的腳步，我走得比平時更慢……這可能也是讓我分外疲勞的原因吧」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ……そうてつさぁん……ありがとう……\nですよぉ」
1914 = "「嘿嘿嘿……雙鐵先生……謝謝你」" 

# monologue
# JP: れいなの声にぎくりとするが、\n背中の重みは……変わらない。
2854 = "玲奈突然出聲，嚇了我一跳。但是身後的重量並沒有發生變化。" 

# 【双鉄】
# display as 雙鐵
# JP: 「寝言か。れいなは律儀だな」
1778 = "「原來是夢話啊，真是講禮貌」" 

# 【れいな】
# display as 玲奈
# JP: 「むにゃむにゃ……」
1875 = "「啊嗚啊嗚……」" 

# monologue
# JP: このまま歩き続けては、疲労を溜めてしまいかねない。\nどこか、小休止できそうな――
2917 = "繼續這樣走下去，我會越來越累。得找個地方休息一下……" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1903 = "「嗯？」" 

# monologue
# JP: なにか、ある。\n木々の向こうに、なにか黒いものが見えている。
2792 = "有東西。樹林的另一邊，有什麼黑色的東西。" 

# 【双鉄】
# display as 雙鐵
# JP: 「む！？　これは――レール跡か？」
1907 = "「嗯？這是……鐵軌的路基？」" 

# monologue
# JP: 意識をすれば、下草の長さの違いは歴然だ。
2590 = "仔細觀察一下，就能發現雜草的高度完全不同。" 

# monologue
# JP: 辿って歩けば、レールの跡は\n黒いものの方へと続き――
2972 = "跟著路基走，就能發現前方通向那個黑色的傢伙……" 

# 【双鉄】
# display as 雙鐵
# JP: 「おおお！」
1925 = "「噢！」" 

# 【れいな】
# display as 玲奈
# JP: 「わぁ！！？」
1850 = "「哇？！」" 

# monologue
# JP: 声と同時に背中が動く。\n負荷がはっきり軽くなる。
2723 = "我大叫一聲，同時身後的負擔一下就輕了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん、起こしてしまったか」
2052 = "「抱歉，我吵醒你了？」" 

# 【れいな】
# display as 玲奈
# JP: 「いいええ――それより――\nこのこ、かわいい\x%l車掌車;#00ffc040;車掌車%l;#;さんですねぇ」
2137 = "「沒事……不過，這個\\x%l緩急車;#00ffc040;守車%l;#;真是可愛呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l車掌車;#00ffc040;車掌車%l;#;？」
1273 = "「\\x%l緩急車;#00ffc040;守車%l;#;？」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい。\x%l貨車;#00ffc040;貨車%l;#;とかの一番うしろにくっついて、\n\x%l車掌;#00ffc040;車掌%l;#;さんが非常\x%lブレーキ;#00ffc040;ブレーキ%l;#;をかけるための車ですよぉ」
2094 = "「是的。是掛在\\x%l貨車;#00ffc040;貨運車廂%l;#;之類的編組最後面，允許\\x%l車掌;#00ffc040;列車長%l;#;拉緊急\\x%lブレーキ;#00ffc040;剎車%l;#;的車廂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なるほど。\x%l炭水車;#00ffc040;炭水車%l;#;の後ろに\x%l貨車;#00ffc040;貨車%l;#;だなんだを\n引いては、後方など、まるで見えなくなるだろうしな」
1930 = "「噢，確實。在\\x%l炭水車;#00ffc040;煤水車%l;#;後面掛一堆\\x%l貨車;#00ffc040;貨運車廂%l;#;，後面就都看不見了」" 

# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ。それに、\x%l車掌車;#00ffc040;車掌車%l;#;さんは、\nお客さんにも、人気者さんなんですよぉ」
2073 = "「是呀。而且，客人們也都很喜歡\\x%l緩急車;#00ffc040;守車%l;#;的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう？　どういった感じでだ？」
2086 = "「是嗎？他們都是怎麼喜歡的？」" 

# 【れいな】
# display as 玲奈
# JP: 「\x%l車掌車;#00ffc040;車掌車%l;#;さんにお客さんを乗せてもらえることがあって、\nそういうとき、すっごい喜んでもらえたんですよぉ」
2119 = "「有時候我們會允許乘客登上\\x%l緩急車;#00ffc040;守車%l;#;，這種時候他們會特別開心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……ならばこれの活用を目指すべきだな。\n8620に引かせるか、あるいは――」
2083 = "「是嗎……那可以考慮用上這個。可以讓８６２０拉，或者是……」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなが引いてもいいですし、\x%l客車;#00ffc040;客車%l;#;との交換材料に\nできちゃうかもしれないですねぇ」
2183 = "「玲奈也可以拉，或者也可以拿去換\\x%l客車;#00ffc040;客運車廂%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「交換――」
2056 = "「換……」" 

# monologue
# JP: 思わぬ言葉に考えて、考えればすぐ納得がいく。
2747 = "我沒想到還有這種用法，不過想了想就理解了。" 

# monologue
# JP: まったく僕には無かった視点――\nさすがは、ポーレットの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
2913 = "總是能找到我看不見的盲點，波萊特的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;就是厲害。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。こちらの方が\x%l客車;#00ffc040;客車%l;#;よりも更に珍しい――\nつまりは、マニア好みの車両であるわけか」
2235 = "「確實，這個比\\x%l客車;#00ffc040;客運車廂%l;#;更罕見，鐵路迷們肯定更喜歡」" 

# 【れいな】
# display as 玲奈
# JP: 「そうかもってれいな思いますぅ。今は\x%l長大編成;#00ffc040;長大編成%l;#;も\n減ってますし、\x%l車掌車;#00ffc040;車掌車%l;#;さん、生き残り少ないかなって」
2185 = "「玲奈也覺得是這樣。現在\\x%l長大編成;#00ffc040;大編組%l;#;越來越少了，剩下的\\x%l緩急車;#00ffc040;守車%l;#;肯定也少了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1888 = "「嗯」" 

# monologue
# JP: 『まいてつ』なる人種は、僕のような特殊例を除き、\nまず間違いなくポーレットの同類。マニアだろう。
3010 = "除了我這樣的特殊個例，“掌車人”肯定都是波萊特的同類，也就是鐵路迷。" 

# monologue
# JP: マニアとなれば、希少なものほど欲しがろうし、\n実需の有無など関係なしに――――うむ？
2875 = "痴迷，就意味著追求罕見的東西，即使這種東西不符合實際需求……嗯？" 

# 【双鉄】
# display as 雙鐵
# JP: 「ちょっと待ってくれ。『\x%l長大編成;#00ffc040;長大編成%l;#;も減っている』\nといったが、まだ、\x%l長大編成;#00ffc040;長大編成%l;#;が走っている路線も？」
2242 = "「等一下，你說越來越少，難道現在還有線路在跑\\x%l長大編成;#00ffc040;大編組%l;#;？」" 

# 【れいな】
# display as 玲奈
# JP: 「もちろんですよぉ。工場の専用線とかでは、\nふつーにまだまだ走ってますねぇ」
2221 = "「當然有了。比如工廠的專用線，那些地方都還在跑長編組呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「工場の専用線？」
1982 = "「工廠的專用線？」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、文字通り、製鉄所とかの工場が、\n自分のとこだけのために走らせている鉄道ですよぉ」
2105 = "「是的，就是字面意思，是煉鐵廠之類的地方專門建來自己跑的鐵路」" 

# monologue
# JP: ……原初の鉄道から変わらぬ姿。\n原料の搬入や製品の搬出――そのためだけの鉄道路線。
1263 = "……就和最原本的鐵路一樣，是僅為搬入原料與搬出產品而存在的鐵路路線。" 

# monologue
# JP: エアクラで代替できぬ重量物輸送のために、\n恐らく今後も、廃業等が無い限り、残り続ける路線。
2900 = "空凝機難以運送重貨，只要他們的行業還在，這些線路就會運行下去。" 

# 【れいな】
# display as 玲奈
# JP: 「そういうとこは機関車も\x%l貨車;#00ffc040;貨車%l;#;も手放さないですから。\n一\x%l編成;#00ffc040;編成%l;#;、できるだけ長くした方がお得ですしぃ」
2304 = "「這些地方不會轉讓機車或者\\x%l貨車;#00ffc040;貨運車廂%l;#;的。畢竟一個\\x%l編成;#00ffc040;編組%l;#;多掛一節就賺一節嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。それで――その、『工場の専用線』\nというのは、どの程度残っている物なのだ？」
2234 = "「確實。那麼，你說的工廠專用線，現在還留有多少？」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、あんまりくわしくないけど、\n北九洲にはまだのこってるって、聞いたことありますぅ」
2180 = "「玲奈不是很懂，但是聽說過北九州還有」" 

# 【双鉄】
# display as 雙鐵
# JP: 「北九洲――そうか、旧[ちくほう,1]築豊炭田か。ならば、\nあのあたりに残る線路と線路をつなぐことができれば」
1772 = "「北九州……噢，是舊築豐煤礦啊。那麼，只要能把那裡留下的線路連上」" 

# 【れいな】
# display as 玲奈
# JP: 「わ！　そうですねぇ！　線路あとも、レールはないかも\nですけど、きっと、土地はそのまま残ってますよぉ」
1839 = "「哇！是啊！雖然可能沒有線路或者鐵軌了，但是那塊地肯定還留在那裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　そんなことを、れいなはどうして」
2087 = "「是嗎？你怎麼知道的」" 

# 【れいな】
# display as 玲奈
# JP: 「聞いたことあるからですよぉ。あそこらへんは、\n炭田ぜぇんぶ、何もかも売り払っちゃって」
2212 = "「玲奈聽說過的。那一帶的煤礦整個被賣掉了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1924 = "「噢」" 

# monologue
# JP: 地域まるごと、設備も装置もなにもかも剥がして売却する。\n残される土地は、ならば無価値だ。
2774 = "整塊地方的設備都被拆走賣掉了。剩下的土地並沒有價值。" 

# monologue
# JP: 線路跡だろうがなんであろうが、\n誰も見向きはしないだろう。
2629 = "即使有什麼線路的痕跡留下，也不會有人搭理。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕らにとっては助けになるかもしれんことだが、\nしかし、残酷なことでもあるな」
1310 = "「……這對我們來說或許是好消息，不過這件事本身也挺殘酷的」" 

# 【れいな】
# display as 玲奈
# JP: 「ざんこくっていうか、普通ですよぉ？　ここみたいに、\nぜぇんぶとってあるのが普通じゃないんですよぉ」
2134 = "「殘酷？很正常呀。像這裡一樣什麼都留著的才不正常呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか――いや」
2082 = "「是嗎……不」" 

# 【れいな】
# display as 玲奈
# JP: 「どうかしましたかぁ？　そうてつさぁん」
2008 = "「怎麼了，雙鐵先生？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――そうか」
2143 = "「沒什麼……原來是這樣啊」" 

# monologue
# JP: \x%l車掌車;#00ffc040;車掌車%l;#;も炭鉱跡も変わらない。\n希少なものには価値がある。
2571 = "不改變\\x%l緩急車;#00ffc040;守車%l;#;和煤礦遺跡。罕見的東西很有價值。" 

# monologue
# JP: もしも術仙廃炭鉱が、唯一無二なり、それに近い、\n『採炭を復活できる炭鉱』という存在であるのなら――
2667 = "如果術仙廢煤礦成為獨一無二或者近乎獨一無二的“可以恢復採煤的煤礦”……" 

# 【双鉄】
# display as 雙鐵
# JP: 「人は、集まる。採炭を生きがいにしていた人たちが。\nその技術を、絶やすまいとする人たちが」
2114 = "「會有人來的。那些依賴採煤生存的人。那些不希望斷絕了採煤技術的人」" 

# monologue
# JP: 採炭という技術の継承――それは明確な売りになる。\n“レイル・ロマネスク湯医線"には、炭鉱が生きていると。\n2634 = "只要“幻想鐵路·湯醫線”擁有還在運轉的煤礦，那麼繼承採煤技術，就能成為一大賣點。" \n\n# monologue\n# JP: その炭鉱で採掘された石炭で、\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;を走らせて、火力発電していると。\n2923 = "而煤礦裡開採出來的煤，可以驅動\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;，或者用於火力發電。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「作り物ではない、正和初期の街。\nそこから生まれる蒸気で、熱で、息づき彩られる湯医線」\n1770 = "「創造一個真正的正和早年的小鎮，用那裡面的蒸汽、那裡面的熱量，去點綴湯醫線」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わわわ！　なんだかかっこいいですぅ」\n1818 = "「哇哇哇！感覺好帥」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そこから続くレールは未来へと伸びていく。\n八ツ城を経て、隈元を越え、北九洲の路線群へと」\n2345 = "「那裡的鐵軌將通向未來。它會通過八代，越過隈元，加入北九州的線路群」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「はぁい！　北九洲の工場専用線と、その廃線跡と。\nたくさんたくさん、きっと繋がれるって思いまぁす」\n2101 = "「是的！北九州工廠專用線和廢線遺跡，肯定全都可以連在一起的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ！！」\n1890 = "「嗯！！」" \n\n# monologue\n# JP: ああ、本当に大きく繋がる。遥かに広がる。\n復線の事業化の構想も、未来行き列車の行き先も。\n2775 = "是啊，不論是恢復廢線的產業化構想，還是發往未來列車，全都要連在一起，一直連到遠方。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「すばらしい発見で、すばらしい気づきだ。\nすごいぞ！　れいなの居眠りのおかげだな」\n2263 = "「能注意到這一點真是太好了。太棒了！都是多虧你打了個瞌睡」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「えっへへ～　どういたしましてですよぉ」\n1917 = "「嘿嘿嘿，不客氣」" \n\n# monologue\n# JP: 背中の上からご機嫌な声。\n眠気はもう、まったく残っていないように聞こえる。\n2979 = "身後傳來愉快的笑聲。聽起來她已經一點也不睏了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「というか、もう眠くないのか？　大丈夫なのか？」\n2038 = "「我說，你這就不睏了？沒問題嗎？」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「はいですぅ。れいなの眠いのは、改造の過負荷の、\n処理できない部分のせいですからぁ」\n2139 = "「沒事。玲奈會睡覺，是因為改造後負荷過大，有部分訊息無法處理」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうなのか」\n# 2084 = "「是嗎」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「だから、スリープに入って外部情報を遮断して、\n処理を全部しきれちゃえば、眠くなくなるんですよぉ」\n2043 = "「所以要進入睡眠狀態，切斷外部訊息，等訊息全部處理完畢就不會睏了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なるほど。そういう構造だったか。\nというか――そこまでわかっているのであれば――」\n1779 = "「原來是這種原理啊。而且，既然連這些都知道了……」" \n\n# monologue\n# JP: 確かれいなは、ガソリン駆動からディーゼル駆動へ\n改造を受けているという話であった。\n2761 = "我記得玲奈是從汽油驅動改造成柴油驅動的。" \n\n# monologue\n# JP: 今の御一夜鉄道で、れいなにそこまで性能を求める\n運用を求めることはありえんだろうし――\n2653 = "在現在的御一夜鐵路，玲奈並不需要那麼強的性能……" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「例えば、キハ07の仕様を一番最初の状態に戻して、\n改造の過負荷を減少させるなどのことは」\n1959 = "「如果將Ｋｉｈａ０７改回最原本的狀態，是否能減輕改造帶來的負荷？」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「できますよぉ。れいな綺麗にロールバック\nできるようにしてもらってますぅ」\n1801 = "「可以呀。玲奈接受的改造是隨時都可以回滾的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なんと」\n1714 = "「什麼」" \n\n# monologue\n# JP: あまりにあっさり言い切られる。\n多少意外にも感じるが、朗報であるには違いない。\n2903 = "竟然立刻就肯定了。雖說這讓我多少有些意外，但無疑是個好消息。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「鉱山の技師さんたち、\n無理な改造って、最初からわかってましたからぁ」\n2239 = "「礦山的技工們一開始就知道這樣的改造太勉強」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ならば、ロールバックをするべきではないのか？」\n2320 = "「那你豈不是應該回滾？」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「そうてつさんはぁ」\n2370 = "「雙鐵先生」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！？」\n# 1881 = "「啊？！」" \n\n# monologue\n# JP: れいなの瞳が僕を見ている。\nそれはいつものことではあるが――\n2848 = "玲奈盯著我，就像平時一樣。可是……" \n\n# monologue\n# JP: なにか、気圧されるような。\nいつものれいなの無垢な一途と、まるで違った熱を感じる。\n2735 = "我感覺到了一股氣場。那是和她平時的那份天真與專一完全不同的熱情。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「他のひとたちは関係なくて、そうてつさんは――\nれいながロールバックした方が、いいですかぁ？」\n1759 = "「先不說其他的人，雙鐵先生，你覺得玲奈應該回滾嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕、ひとりだけの考えでか。\n他のひとも、他のこともか？　考え合わせず」\n1975 = "「就我個人而言的想法嗎？不討論其他人，不考慮其他事？」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「はい。れいな、そうてつさんの気持ち、\n知りたいなぁって思います」\n2097 = "「是的。玲奈想知道雙鐵先生的想法」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕の気持ちか」\n2035 = "「我的想法啊」" \n\n# monologue\n# JP: ならば、考えるまでもない。\nれいながいつもにこにこ笑って元気でいられる――\n2714 = "我不需要猶豫。只要能讓玲奈活潑地微笑著……" \n\n# monologue\n# JP: 異常な負荷など無い状態が、\n僕にとっての、より望ましい状況だ。\n2743 = "我更希望她能消除異常負荷。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕はれいなに、\nロールバックを受けて欲しいと思う」\n2030 = "「我希望你能回滾」" \n\n# monologue\n# JP: だから、答える。\n自分の思うがままを、素直に。\n2770 = "所以我將自己內心的想法真誠地說了出來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それでれいなが楽になるなら、\nもっと笑顔になれるなら。何をおいてもやるべきだ」\n1799 = "「只要這樣你能更輕鬆，你能笑得更開心，不論怎樣你都應該回滾」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わかりましたぁ。えっへへー。それじゃあれいな\n帰ったら、ポーレットに相談してみますねぇ」\n1940 = "「好的。嘿嘿嘿，那玲奈回去以後找波萊特談談」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうするといい。僕も、ポーレットに相談したい」\n1942 = "「好的。我也想和波萊特談談」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「それならやっぱり、ポーレットとそうてつさんと、\nれいなと三人でおはなしですねぇ」\n2314 = "「這樣的話就還是波萊特、雙鐵先生和玲奈三個人一起談了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ、そうなるな」\n1898 = "「嗯，是啊」" \n\n# monologue\n# JP: そのままれいなをおぶって歩く。\nてくてく、てくてく。\n2755 = "我繼續背著玲奈走在路上，一步又一步往前走。" \n\n# monologue\n# JP: れいなはずっしり重くならない。\nゆえに起きているのであろうが、いやに無口だ。\n2819 = "玲奈並沒有趴下。她應該是醒著的，可就是不說話。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「……あのですねぇ、そうてつさぁん」\n1307 = "「……說起來哦，雙鐵先生」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ？」\n# 1903 = "「嗯？」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「れいな、きょう。そうてつさんとおはなししてて、\nいっしょにいて、とってもとっても、楽しかったですぅ」\n2190 = "「玲奈今天和雙鐵先生聊了這麼多，和雙鐵先生待在一起，感覺特別特別開心」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ、僕もだ」\n1895 = "「嗯，我也是」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「えっへへー」\n# 1915 = "「嘿嘿嘿」" \n\n# monologue\n# JP: ご機嫌極まる笑い声。\nけれどもすぐに、また沈黙。\n3000 = "這笑聲聽起來特別開心。但是很快她又沉默了。" \n\n# monologue\n# JP: ややあって――\n極めてれいならしからぬ、おそるおそるな声が聴こえる。\n3014 = "隔了一段時間後，身後傳來一道非常不像玲奈的、戰戰兢兢的聲音。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ええと――あの――そのっ――\nぐう。ぐう。ぐう」\n1814 = "「呃……那個……怎麼說呢……呼，呼，呼」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむっ？」\n# 1903 = "「嗯？」" \n\n# monologue\n# JP: 一瞬意図がつかめぬが、\nれいなはぐうぐう言い続ける。\n2705 = "我一下沒懂玲奈的意思，她一直在呼呼。" \n\n# monologue\n# JP: つまりは――あれだ、\nたぬき寝入りを、れいなはしたがっているのだろう。\n2889 = "知道了。玲奈肯定是想假裝在睡覺。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「れいな……あー、その。寝た？　のか？」\n2171 = "「玲奈……啊，我說，你睡了嗎？」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「はぁい。れいな、ねちゃって。それで……ええと……\nねむってて……ねぼけちゃってるですからぁ――」\n2099 = "「是的。玲奈睡了。所以……呃……睡著了，睡糊塗了……」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ」\n# 1888 = "「嗯」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「（ちゅっ！）」\n2379 = "「（啾！）」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「む！」\n1869 = "「唔！」" \n\n# monologue\n# JP: 首筋、かわいく濡れた感触。\nほんの一瞬。小鳥が餌をついばむような。\n2933 = "脖子上傳來又輕又濕的觸感，就那麼一下下，像小鳥啄蟲一樣。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふふっ――知らなかった。\nれいなは、寝相が悪いのだな」\n1851 = "「哈哈，我都不知道，原來玲奈睡相這麼差啊」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「はうう～っ！　そおです。\nれいな、ねぞうが悪いんですよぉ。ぐうぐうぐう」\n1885 = "「嗚嗚！是呀，玲奈睡相可差啦。呼呼呼」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ならば、もっとぐっすり眠れ。\nれいなの眠りを、今は、僕が守るから」\n2328 = "「那就睡得再香一點。現在有我保護著你安睡呢」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「はうっ」\n1874 = "「啊嗚」" \n\n# monologue\n# JP: かえって緊張させたのか、\nれいなの体が固くなる。\n2994 = "這句話似乎反而讓玲奈感到了緊張，她的身體變得僵硬。" \n\n# monologue\n# JP: それをほぐしてあげたくて、\nできるかぎりに、優しく、穏やかな声を出す。\n2809 = "為了紓解她的緊張，我用儘量溫柔儘量平和的聲音向她搭話。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「目覚めてもまだ、必ずいよう。\n今日の終わりまで、れいなと一緒だ」\n1743 = "「你醒來之後我肯定還會在的。我會陪著你，直到今天結束」" \n