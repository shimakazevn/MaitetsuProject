# lines: 609 
# 【双鉄】
# display as 雙鐵
# JP: 「…………ぅ……ぁ」
1409 = "「............Ư......a.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　おめざめになられたのですか」
2733 = "「Ngài Soutetsu? Ngài đã tỉnh rồi sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「う、む」
2111 = "「Ừ, m.」"

# monologue
# JP: 夢を、見ていたような気がする。\n路子の夢を。列車の夢を。
3140 = "Tôi có cảm giác như mình vừa mơ một giấc mơ. Giấc mơ về Michiko. Giấc mơ về những chuyến tàu."

# monologue
# JP: 弱音を路子にこぼしてしまい\n困った顔をさせてしまった……そんな気がする。
3155 = "Hình như tôi đã than vãn với Michiko làm con bé phải bối rối......Tôi có cảm giác như vậy."

# 【ハチロク】
# display as 八六
# JP: 「お顔、少し曇ってらっしゃるようですが」
2275 = "「Sắc mặt ngài có vẻ hơi u ám.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2369 = "「Ừm——」"

# monologue
# JP: けれども夢の――見たともつかぬ夢の名残は、\nあっという間に消えていく。
2956 = "Thế nhưng, tàn dư của giấc mơ——một giấc mơ không rõ ràng, đã tan biến trong chớp mắt."

# monologue
# JP: 残るのはただ、焦燥感。\n夢を見たなら、その要因となったであろう、鈍い焦りだ。
3243 = "Thứ còn sót lại chỉ là sự nôn nóng. Nếu tôi đã mơ, thì nguyên nhân có lẽ là sự nôn nóng âm ỉ này."

# 【双鉄】
# display as 雙鐵
# JP: 「やはり、不安はあるのだろうな。\n[ごとう,1]後東[かいた,1]槐多氏……赤井宮司の言葉以上の人物ゆえに」
2571 = "「Quả nhiên là tôi vẫn cảm thấy bất an. Goto Kaita... Ông ta là một nhân vật vượt xa những gì Akai-guji đã mô tả.」"

# 【ハチロク】
# display as 八六
# JP: 「ポーレット様はお名前を知ってらっしゃいましたね。\nいずれ、鉄道立志伝に名を残すであろう人物だと」
2466 = "「Thị trưởng Paulette cũng biết tên ông ấy nhỉ. Cô ấy nói ông ấy là người sớm muộn gì cũng sẽ lưu danh vào sử sách ngành đường sắt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「強盗槐多――あるいは、買い叩きの槐多か」
2221 = "「Kaita Cướp Bóc——hay là Kaita Ép Giá nhỉ.」"

# monologue
# JP: なんとも物騒な異名であるが、\n電話越し、ほんのわずかに話すだけでも、伝わってきた。
2977 = "Quả là một biệt danh nguy hiểm, nhưng chỉ qua vài lời trao đổi ngắn ngủi trên điện thoại, tôi cũng đã cảm nhận được."

# 【双鉄】
# display as 雙鐵
# JP: 「――僅かな隙も見逃してくれぬと感じた。\n買い叩きの槐多の異名も、事実の指摘にすぎんのかもな」
1352 = "「——Tôi cảm giác ông ta sẽ không bỏ qua bất kỳ kẽ hở nào. Biệt danh Kaita Ép Giá có lẽ cũng chỉ là sự thật mà thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「強盗だの買い叩きだの――悪名の多い方なのですね」
2032 = "「Nào là cướp bóc, nào là ép giá——ông ấy mang nhiều tiếng xấu quá nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「悪名……確かに、悪意を感じる異名ではあるな」
2283 = "「Tiếng xấu... Quả thực, đó là những biệt danh mang đầy ác ý.」"

# monologue
# JP: しかし、それが人の口の端に登るとき、\n込められる感情が、嫌悪のみだとは思えない。
2950 = "Tuy nhiên, khi những cái tên đó được thốt ra từ miệng người khác, tôi không nghĩ cảm xúc trong đó chỉ đơn thuần là sự chán ghét."

# monologue
# JP: 事実、ポーレットが後東氏の名を語った時には、\nはっきりとした畏敬の念が伝わってきた。
3080 = "Thực tế, khi Paulette nhắc đến tên ông Goto, tôi đã cảm nhận rõ ràng sự kính sợ trong đó."

# 【双鉄】
# display as 雙鐵
# JP: 「悪名は、彼の足を引っ張ろうとする者の多さゆえ。\n裏から見れば、それ程の成功を収めているということだ」
2150 = "「Tiếng xấu là do có quá nhiều kẻ muốn cản bước ông ta. Nhìn từ góc độ khác, điều đó chứng tỏ ông ta đã đạt được thành công to lớn.」"

# monologue
# JP: 一\\x%l庫内手;#00ffc040;庫内手%l;#;から成り上がり、廃線寸前の鉄道会社を\n買い叩いては、優良資産だけを吸い上げ売払うまでに至る。
3120 = "Vươn lên từ một \\x%l庫内手;#00ffc040;thợ rửa lò%l;#;, ép giá mua lại các công ty đường sắt sắp phá sản, sau đó bòn rút những tài sản có giá trị rồi bán tống bán tháo."

# monologue
# JP: 彼に捕まり再起不能と追いやられた事業者も少なくない。\nが――優良資産を集積し再活用する。それもまた彼の才だ。
3433 = "Không ít doanh nghiệp đã rơi vào tay ông ta và bị dồn đến bước đường cùng. Nhưng——việc thu gom tài sản có giá trị và tái sử dụng chúng, đó cũng là tài năng của ông ta."

# 【双鉄】
# display as 雙鐵
# JP: 「[しぶや,1]澁谷－[よこはま,1]横濱間に再びの、しかも電気鉄道を走らせる。\nその途方もない偉業を、成し遂げようというのだから」
1910 = "「Ông ta định cho tuyến đường sắt điện chạy lại giữa Shibuya và Yokohama. Chính vì muốn hoàn thành một công trình vĩ đại như vậy nên mới bị nhắm tới.」"

# 【ハチロク】
# display as 八六
# JP: 「仮称、後東急行電鉄――\n本当に、運用開始できるのでしょうか？」
2417 = "「Tên tạm gọi là Đường sắt Điện tốc hành Goto—— Liệu nó có thực sự đi vào hoạt động được không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「あと数年で開業できるとご本人はおっしゃっていた。\n用地はすでに、ほぼほぼ取得済みだとも」
1912 = "「Chính ông ta nói rằng vài năm nữa sẽ khai trương. Ông ta cũng bảo đất đai gần như đã thu mua xong rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！ 素晴らしいことですね」
2080 = "「Ôi! Thật là tuyệt vời.」"

# 【双鉄】
# display as 雙鐵
# JP: 「まさしくだ。叶うのならば鉄道復権への、\n大きな楔の一つとなろうな」
2378 = "「Đúng vậy. Nếu thành hiện thực, đây sẽ là một trong những bước đệm lớn cho sự phục hưng của ngành đường sắt.」"

# monologue
# JP: とはいえ、その道のりは厳しいものであるだろう。
2902 = "Mặc dù vậy, con đường đó chắc chắn sẽ rất gian nan."

# monologue
# JP: 大勝するが、油断をすれば全てが一気に崩れ去る――\n後東氏の戦い方は、そうした性質のものと思える。
3528 = "Thắng lớn, nhưng chỉ cần lơ là, mọi thứ sẽ sụp đổ trong chớp mắt—— Cách chiến đấu của ông Goto mang lại cho tôi cảm giác như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、九洲の鉄道の復線になど関わってはいれん筈だ。\nにもかかわらず、時間を取ってくれるのは――」
2323 = "「Vì vậy, lẽ ra ông ta không rảnh để bận tâm đến việc khôi phục đường sắt ở Kyushu. Thế nhưng, ông ta vẫn dành thời gian cho chúng ta là vì——」"

# 【ハチロク】
# display as 八六
# JP: 「赤井宮司とのご縁のおかげ、でございましょうか？」
2415 = "「Là nhờ mối quan hệ với Akai-guji phải không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはもちろんだろう。赤井宮司を、\n恐らく後東氏は、相当に高く評価している」
2446 = "「Tất nhiên rồi. Có lẽ ông Goto đánh giá Akai-guji rất cao.」"

# monologue
# JP: （ぴぴぴっ、ぴぴぴっ）
3563 = "（Bíp bíp bíp, bíp bíp bíp）"

# 【ハチロク】
# display as 八六
# JP: 「あら」
2079 = "「A.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、タイマーをかけっぱなしだったか。\nすまん。そろそろ着替えてでかける支度をしなくては」
2097 = "「A, tôi vẫn để hẹn giờ à. Xin lỗi. Tôi phải thay quần áo và chuẩn bị ra ngoài thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「いえ、わたくしの方こそ。\n朝方の貴重な時間、おしゃべりにおつきあいいただいて」
1878 = "「Không, là lỗi của em mới đúng. Đã làm phiền ngài vào khoảng thời gian quý báu buổi sáng để trò chuyện.」"

# 【双鉄】
# display as 雙鐵
# JP: 「つきあってもらったのは、僕の方だ」
2363 = "「Người được trò chuyện cùng là tôi mới đúng.」"

# monologue
# JP: ハチロクの髪にぽんと手を置き、軽く撫でる。\nいつもながらの、手の中に雨が降るような心地よさ。
3171 = "Tôi đặt tay lên tóc Hachiroku và nhẹ nhàng xoa đầu em ấy. Cảm giác dễ chịu như có mưa rơi trong lòng bàn tay, vẫn như mọi khi."

# monologue
# JP: （――現実とは、とても強いものだな）
3543 = "（——Hiện thực quả là một thứ rất mạnh mẽ.）"

# monologue
# JP: ほんのわずかな会話であっても。\nただこれだけの手触りでも。
3009 = "Dù chỉ là một cuộc trò chuyện ngắn ngủi. Dù chỉ là một cái chạm tay thế này."

# monologue
# JP: おぼろな夢の、その影にざわついていてしまったこころを、\n波立たぬまでに鎮めてもらえた。
3049 = "Trái tim xao động bởi cái bóng của giấc mơ mờ ảo, đã được xoa dịu cho đến khi không còn gợn sóng."

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう、ハチロク。いつも助けられている。\n乗務のときも、その外にあっても」
2606 = "「Cảm ơn em, Hachiroku. Em luôn giúp đỡ tôi. Cả lúc làm nhiệm vụ trên tàu lẫn những lúc khác.」"

# 【ハチロク】
# display as 八六
# JP: 「当然のことです。双鉄様はわたくしの\\x%l機関士;#00ffc040;機関士%l;#;。\nマスターになられたのですから」
2508 = "「Đó là điều hiển nhiên ạ. Ngài Soutetsu là \\x%l機関士;#00ffc040;người lái tàu%l;#; của em. Vì ngài đã trở thành Master của em mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2114 = "「Ừm.」"

# 【ハチロク】
# display as 八六
# JP: 「それだけに――稀咲様に頼るしか無いこの状況を、\nこころ苦しくも思います」
2319 = "「Chính vì thế——tình cảnh chỉ có thể dựa dẫm vào cô Kisaki hiện tại, khiến em cảm thấy thật đau lòng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お前が言ったことだろう。餅は餅屋。汽車は汽車屋。\n――それぞれが、それぞれの役割を最善に果たせばいい」
1945 = "「Chính em đã nói mà. Việc của thợ làm bánh thì để thợ làm bánh lo. Việc của thợ làm tàu thì để thợ làm tàu lo. ——Mỗi người chỉ cần hoàn thành tốt nhất vai trò của mình là được.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ――本当に。\n左様でしたね。かしこまりました、双鉄様」
2132 = "「A——đúng vậy. Đúng là thế nhỉ. Em hiểu rồi, ngài Soutetsu.」"

# monologue
# JP: 背筋を伸ばして、ピっと敬礼。\nそしてハチロクは、髪を翻し部屋を出て行く。
2991 = "Hachiroku đứng thẳng lưng, nghiêm trang giơ tay chào. Sau đó, em ấy hất tóc và bước ra khỏi phòng."

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、本日の乗務に向かいます。\n明日からはまた、よろしくお願いいたします」
2302 = "「Em sẽ đi làm nhiệm vụ hôm nay. Từ ngày mai, mong ngài lại giúp đỡ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。今日のところはよろしく頼む」
2116 = "「Ừm. Hôm nay trông cậy vào em đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。双鉄様。\nどうぞ、一日ご安全に」
2310 = "「Em rõ rồi, ngài Soutetsu. Chúc ngài một ngày an toàn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ご安全に。よい乗務を」
2467 = "「Chú ý an toàn. Chúc em một chuyến đi tốt đẹp.」"

# 【双鉄】
# display as 雙鐵
# JP: 「さて、と」
2165 = "「Nào, giờ thì.」"

# monologue
# JP: 今日は稀咲と、後東氏との面談に備えての対策会議だ。\n銀行に向かう以上は、やはり背広の方がいい。
2925 = "Hôm nay là cuộc họp với Kisaki để chuẩn bị cho buổi gặp mặt ông Goto. Đã đến ngân hàng thì mặc vest vẫn tốt hơn."

# monologue
# JP: （きゅっ）
3556 = "（Thắt lại）"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2089 = "「Ừm.」"

# monologue
# JP: 大剣と小剣のバランスも、ノットの大きさも申し分ない。\nこれほど上手くネクタイを締められたことに、少し驚く。
3081 = "Sự cân bằng giữa vạt to và vạt nhỏ, cũng như kích thước của nút thắt đều hoàn hảo. Tôi hơi ngạc nhiên khi mình thắt cà vạt đẹp đến thế."

# 【双鉄】
# display as 雙鐵
# JP: 「幸先のいいことだ」
2364 = "「Một khởi đầu tốt đẹp đây.」"

# monologue
# JP: そろそろ出よう。遅刻を決してせぬように。\n僕にとってのそれ以上に、稀咲の時間は、貴重なのだから。
3448 = "Đến lúc phải đi rồi. Tuyệt đối không được đến trễ. Bởi vì đối với tôi, thời gian của Kisaki còn quý giá hơn cả thời gian của bản thân."

# 【双鉄】
# display as 雙鐵
# JP: 「……っと、早くつきすぎてしまったか」
1405 = "「......Ây da, đến sớm quá rồi.」"

# monologue
# JP: 約束の時間まではまだ五分ある。
3476 = "Vẫn còn năm phút nữa mới đến giờ hẹn."

# monologue
# JP: 銀行前でうろうろするのも\nいかにも体裁が良くないが、さて――
3051 = "Đi tới đi lui trước cửa ngân hàng trông cũng không hay cho lắm, vậy thì——"

# 【稀咲】
# display as 稀咲
# JP: 「何をしてるんだい？　こんなところで」
1959 = "「Anh đang làm gì ở đây vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2106 = "「!?」"

# monologue
# JP: 予想外の声に驚かされて振り向けば、\n予想通りの稀咲の姿。
3138 = "Giật mình bởi giọng nói bất ngờ, tôi quay lại và thấy bóng dáng quen thuộc của Kisaki."

# monologue
# JP: 少し汗ばみ、赤らんだ顔をしている。\nまるで走ってきたばかりのようにも見えるほどだ。
3064 = "Khuôn mặt cô ấy hơi ửng đỏ và lấm tấm mồ hôi. Trông cứ như vừa mới chạy tới vậy."

# 【稀咲】
# display as 稀咲
# JP: 「まぁ、聞かなくてもわかるけど。\nボクとの時間を待ちわびてくれてた――だろう？」
2553 = "「Mà thôi, không cần hỏi em cũng biết. Anh đang nóng lòng chờ đợi khoảng thời gian bên em——đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういう言い方が好みであるなら、そうとも言える」
1957 = "「Nếu em thích cách nói đó, thì có thể coi là vậy.」"

# monologue
# JP: 稀咲らしい涼やかな軽口に、\n軽い驚きはすぐさま鎮まる。
3297 = "Lời nói đùa nhẹ nhàng, đúng chất Kisaki, đã nhanh chóng xua tan sự ngạc nhiên thoáng qua của tôi."

# monologue
# JP: 呼応するわけもないことだけれど、\n稀咲の顔の赤らみも、みるみるうちに引いていく。
3527 = "Dù không phải vì hùa theo tôi, nhưng vết ửng đỏ trên mặt Kisaki cũng nhanh chóng biến mất."

# 【双鉄】
# display as 雙鐵
# JP: 「が、より厳密にはこうなる。\n『稀咲との待ち合わせ時刻の到来を待っていた』だ」
1932 = "「Nhưng nói chính xác hơn thì thế này. 『Anh đang đợi đến giờ hẹn với Kisaki』.」"

# 【稀咲】
# display as 稀咲
# JP: 「確かに少し早いね。ここであえて良かった。\n五分、お互いの時間を有意義に使える」
2537 = "「Đúng là hơi sớm thật. Thật tốt khi gặp anh ở đây. Chúng ta có thể tận dụng năm phút này một cách có ý nghĩa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それならば何よりだ」
2536 = "「Nếu được vậy thì còn gì bằng.」"

# 【稀咲】
# display as 稀咲
# JP: 「ちょうど、ボクの方もお迎えの準備が整ったところさ」
2300 = "「Vừa hay, em cũng chuẩn bị xong để đón tiếp anh rồi.」"

# monologue
# JP: いって、稀咲は手の中にある小さな紙袋をカサカサ鳴らす。
3368 = "Nói rồi, Kisaki lắc lắc chiếc túi giấy nhỏ trong tay tạo ra tiếng sột soạt."

# 【双鉄】
# display as 雙鐵
# JP: 「それは？」
2713 = "「Đó là gì vậy?」"

# 【稀咲】
# display as 稀咲
# JP: 「何かはあとでのお楽しみ。さ、行こう。\n話す時間は、いくらあってもきっと足りない」
2551 = "「Bí mật sẽ được bật mí sau. Nào, đi thôi. Thời gian để nói chuyện, có bao nhiêu chắc cũng không đủ đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2114 = "「嗯」" 

# monologue
# JP: 慣れた手つきでカードキーを通す稀咲に続き、\n支店長室へと案内される。
3334 = "Theo chân Kisaki với động tác quẹt thẻ điêu luyện, tôi được dẫn vào phòng Giám đốc chi nhánh."

# 【稀咲】
# display as 稀咲
# JP: 「先に入ってくつろいでいて？\nボクは、少しだけすることがある」
1951 = "「Anh vào trước nghỉ ngơi đi nhé? Em có chút việc cần làm.」"

# monologue
# JP: （がちゃっ）
3559 = "（Cạch）"

# 【双鉄】
# display as 雙鐵
# JP: 「失礼します」
2336 = "「Xin phép.」"

# monologue
# JP: 無人の部屋とはわかっていても、\n挨拶の声が出てしまう――ん？
3196 = "Dù biết trong phòng không có ai, nhưng tôi vẫn buột miệng chào——hửm?"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ……落ち着く匂いがするな」
2286 = "「Gì thế này......một mùi hương thật thư giãn.」"

# monologue
# JP: 香水というほど強くない、お香のような……\nああ、いや？　実際にお香を炊いているのか？
2894 = "Không nồng như nước hoa, giống như mùi nhang trầm...... À, không? Có khi nào là đang đốt nhang thật không?"

# 【稀咲】
# display as 稀咲
# JP: 「おまたせ、双鉄」
1885 = "「Để anh đợi lâu rồi, Soutetsu.」"

# monologue
# JP: 稀咲自ら、\nトレーに載せたカップとティーポットとを運んでくる。
3352 = "Đích thân Kisaki bưng khay đựng tách và ấm trà đến."

# monologue
# JP: その傍らにはお皿に乗った――
3193 = "Bên cạnh đó là một chiếc đĩa đựng——"

# 【双鉄】
# display as 雙鐵
# JP: 「にわみさんの長饅頭か」
2216 = "「Bánh gạo dài của nhà Niwami à.」"

# monologue
# JP: 言った瞬間、そうかと気づく。\n稀咲がさっき鳴らしてみせたのは、この紙袋だ。
3453 = "Vừa nói xong, tôi chợt nhận ra. Chiếc túi giấy Kisaki lắc lúc nãy chính là nó."

# 【双鉄】
# display as 雙鐵
# JP: 「行列が出来るほどのお菓子だよな。\nすぐ売り切れるし、その日のうちに食べねば固くなる」
2661 = "「Món bánh này nổi tiếng đến mức phải xếp hàng mới mua được mà. Nó bán hết rất nhanh, và nếu không ăn ngay trong ngày thì sẽ bị cứng lại.」"

# monologue
# JP: ゆえに稀咲は恐らく並んで開店を待ち――
3300 = "Vậy nên, có lẽ Kisaki đã xếp hàng đợi cửa hàng mở cửa——"

# monologue
# JP: 待ち合わせ時刻に間に合うように、\n大急ぎで、走って戻ってきてくれたのだろう。
3235 = "Rồi hối hả chạy về để kịp giờ hẹn với tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「わざわざそこまでしてくれたのか」
1973 = "「Em cất công làm đến mức đó sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、幸せそうな笑顔だ。\nやっぱり、日々姫の情報は確かだね」
2069 = "「Fufu, nụ cười hạnh phúc quá. Quả nhiên thông tin của Hibiki rất chính xác.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、僕は幸せそうな顔をしているか」
2408 = "「Vậy sao, trông anh hạnh phúc lắm à.」"

# 【稀咲】
# display as 稀咲
# JP: 「としか見えない。ちょっと意外だけど、嬉しいよ。\n双鉄も、この長饅頭が好きなこと」
2736 = "「Chỉ có thể nhìn ra như vậy thôi. Hơi bất ngờ, nhưng em rất vui. Vì Soutetsu cũng thích món bánh gạo dài này.」"

# monologue
# JP: 実のところ、そこまでの好物というほどではない。\n右田で出てくるお菓子ではこれが一番大きいから――
2994 = "Thực ra, tôi cũng không đến mức gọi nó là món yêu thích. Chỉ là trong số các loại bánh kẹo nhà Migita, món này là to nhất——"

# monologue
# JP: 一つ食べれば、おなかいっぱいということにして\n他の薦めを断れるから、遠慮で選んでいただけ――ん？
3031 = "Ăn một cái là có thể lấy cớ no bụng để từ chối những lời mời khác, tôi chỉ chọn vì lịch sự thôi——hửm?"

# 【双鉄】
# display as 雙鐵
# JP: 「“も”、ということは、稀咲もこれを？」
1966 = "「“Cũng”, nghĩa là Kisaki cũng thích món này sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「和菓子の中でのベストファイブには確実に入る。\nでね？　双鉄」
2152 = "「Chắc chắn lọt top 5 món bánh ngọt Nhật Bản yêu thích của em. Nhưng mà này, Soutetsu.」"

# monologue
# JP: 稀咲がティーポットを傾ける。\nカップへと注がれるのは――
3326 = "Kisaki nghiêng ấm trà. Thứ được rót vào tách là——"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、お香ではなく、この香りだったか」
2107 = "「À, ra không phải nhang trầm, mà là mùi hương này.」"

# 【稀咲】
# display as 稀咲
# JP: 「[ユキメキラン,3]雪芽奇蘭。ジャスミンティーの一種だよ。\n大陸の知人が、毎年義理堅く送ってくれる物なんだ」
2650 = "「Tuyết Nha Kỳ Lan. Một loại trà nhài. Người quen bên đại lục năm nào cũng giữ chữ tín gửi tặng em.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2656 = "「Ồ.」"

# 【稀咲】
# display as 稀咲
# JP: 「で、これが奇跡のようにあんこに合う。\nミルクでも、ストレートでもいけるけど？」
2660 = "「Và nó hợp với nhân đậu đỏ đến mức kỳ diệu. Uống cùng sữa hay uống không đều ngon, anh chọn gì?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕はストレートを頼もう」
2709 = "「Vậy cho anh uống không đi.」"

# 【稀咲】
# display as 稀咲
# JP: 「ボクはミルクティー」
2312 = "「Em thì uống trà sữa.」"

# monologue
# JP: ピッチャーからミルクを注いで、かき混ぜる。
3324 = "Cô ấy rót sữa từ bình đựng sữa nhỏ rồi khuấy đều."

# monologue
# JP: ジャスミンティーとあんこはそこそこ合いそうだが、\nそこにミルクも入るとなると……想像もつかん。
3422 = "Trà nhài và nhân đậu đỏ nghe có vẻ hợp nhau, nhưng nếu thêm cả sữa vào thì......tôi không tưởng tượng nổi."

# 【稀咲】
# display as 稀咲
# JP: 「遠慮しないで、食べて？　双鉄。\nキミのために用意したんだから」
2006 = "「Đừng ngại, ăn đi Soutetsu. Em chuẩn bị riêng cho anh đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「では、いただこう」
2704 = "「Vậy, anh không khách sáo nhé.」"

# monologue
# JP: 長饅頭を一口いって、ジャスミンティーを――
3165 = "Tôi cắn một miếng bánh gạo dài, rồi nhấp một ngụm trà nhài——"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2141 = "「!」"

# monologue
# JP: これは、合う。奇跡のように――とは、\n随分おおげさなことを言うなと思ってしまっていたが。
3259 = "Đúng là hợp thật. Hợp đến mức kỳ diệu——tôi đã từng nghĩ cô ấy nói quá lời, nhưng quả thực là vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。――うむ」
2115 = "「Ừm. ——Ừm.」"

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ」
2068 = "「Fufu.」"

# monologue
# JP: これは――いや、にわみさんの長饅頭は、\nここまで旨いお菓子だったか。
3019 = "Món này——không, bánh gạo dài của nhà Niwami, lại ngon đến mức này sao."

# monologue
# JP: ジャスミンティーに洗われる口が、\nあんこの風味を、そして旨さを、真に引き出す。
3424 = "Vị trà nhài gột rửa khoang miệng, thực sự đã làm nổi bật hương vị và sự thơm ngon của nhân đậu đỏ."

# 【双鉄】
# display as 雙鐵
# JP: 「ごくっ。んっ――んぐっ――んぐっ。ぷぁっ。\nああ――旨かった」
2073 = "「Ực. Ưm——ực——ực. Phù. A——ngon quá.」"

# 【稀咲】
# display as 稀咲
# JP: 「そこまで気に入ってもらえたなら。\nすすめた甲斐があったよ。嬉しいな」
1972 = "「Anh thích đến vậy thì công em giới thiệu cũng bõ. Vui quá đi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、実に気に入った。\nジャスミンティーとあんこがここまで合うとはな」
2129 = "「Không, anh thực sự rất thích. Không ngờ trà nhài và nhân đậu đỏ lại hợp nhau đến thế.」"

# monologue
# JP: となると、少し気になってくる。\nミルクがここに加わったなら、果たして――
3452 = "Nghĩ vậy, tôi đâm ra hơi tò mò. Nếu thêm sữa vào thì rốt cuộc sẽ——"

# 【稀咲】
# display as 稀咲
# JP: 「あはっ、気になるんだ」
2078 = "「Aha, anh tò mò rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「む――。ああ、いや。うむ。\nまいったな、そんなにわかりやすい顔をしていたか？」
2066 = "「Ừm——. À, không. Ừm. Chết thật, mặt anh dễ đoán thế sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「世間一般からみたら、そうでもないかも。けどね？\nボクはわかる。双鉄は、ぐっとわかりやすくなった」
1852 = "「Với người bình thường thì có lẽ không đâu. Nhưng anh biết không? Em thì biết. Soutetsu đã trở nên dễ đoán hơn rất nhiều rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかりやすくなった」
2313 = "「Dễ đoán hơn sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。多分、\nここしばらくの、行動の変化の影響だろうね」
2376 = "「Đúng vậy. Có lẽ là do ảnh hưởng từ sự thay đổi hành động dạo gần đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「行動の変化――僕のか？」
2581 = "「Sự thay đổi hành động——của anh á?」"

# 【稀咲】
# display as 稀咲
# JP: 「もちろん。双鉄、キミ、ここしばらく、相手を問わず、\n二人きりで会う時間を意識して増やしているよね」
2507 = "「Tất nhiên rồi. Soutetsu, dạo gần đây, bất kể đối phương là ai, anh đều có ý thức tăng cường thời gian gặp gỡ riêng tư với họ đúng không.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2091 = "「!」"

# monologue
# JP: 確かにだ。ナビのアドバイスを受け入れて以来、\n"向き合う"ことを、僕は意識して行っている。
3258 = "Đúng là vậy. Kể từ khi nghe theo lời khuyên của Navi, tôi đã cố ý thực hiện việc \"đối mặt\" với mọi người."

# monologue
# JP: その影響が行動の変化に繋がっているという指摘自体にも\n無論、興味は覚えるのだが――
3526 = "Bản thân lời chỉ ra rằng điều đó dẫn đến sự thay đổi hành động tất nhiên cũng khiến tôi tò mò——"

# 【双鉄】
# display as 雙鐵
# JP: 「何故、気づいたのだ？」
1961 = "「Sao em lại nhận ra?」"

# monologue
# JP: ――稀咲の情報収集能力の高さならば、承知している。
1311 = "——Khả năng thu thập thông tin siêu việt của Kisaki thì tôi biết rõ."

# monologue
# JP: が、僕という個人、しかも仲間に対し、\nその情報網を使うなどという無駄を行うとも思えない。
2943 = "Nhưng tôi không nghĩ cô ấy lại lãng phí mạng lưới thông tin đó cho một cá nhân như tôi, hơn nữa lại còn là đồng đội."

# 【稀咲】
# display as 稀咲
# JP: 「それはね、双鉄？　ボクが、キミに興味をもって、\nよく見てるから」
2149 = "「Đó là vì, Soutetsu à? Em có hứng thú với anh, nên mới thường xuyên quan sát anh đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「で、あるのならば光栄だが――。しかし、\n稀咲と会える時間など、極めて限られているではないか」
2685 = "「Nếu được vậy thì vinh hạnh quá——. Thế nhưng, thời gian gặp được Kisaki chẳng phải là cực kỳ hạn chế sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「会える時間、か――うふふ、いいね。\nそう言ってもらえて、嬉しいよ」
1378 = "「Thời gian gặp được, sao——ufufu, hay đấy. Nghe anh nói vậy, em vui lắm.」"

# monologue
# JP: 稀咲の、とても柔らかな笑み。
3373 = "Nụ cười của Kisaki, thật dịu dàng."

# monologue
# JP: 普段見せている、完璧に整ったものとは違った、\n緩んでいるとも思える笑みに、なぜだか少し胸がざわめく。
3417 = "Khác với nụ cười hoàn hảo thường thấy, nụ cười có phần buông lỏng này, không hiểu sao lại khiến lòng tôi hơi xao xuyến."

# 【稀咲】
# display as 稀咲
# JP: 「確かに会える時間は限られている。残念なことに。\nけど、ボクはね？　優秀なスパイを抱えているんだ」
2296 = "「Đúng là thời gian gặp nhau rất hạn chế. Thật đáng tiếc. Nhưng mà nhé? Em có một điệp viên xuất sắc đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「スパイ？」
2725 = "「Điệp viên?」"

# 【稀咲】
# display as 稀咲
# JP: 「そう。ボクと同じか、それ以上によく双鉄を見ていて。\nその上、双鉄のことを尋ねないでも聞かせてくれる――」
2450 = "「Đúng vậy. Người đó quan sát Soutetsu kỹ không kém, thậm chí còn hơn cả em. Hơn nữa, dù không hỏi thì người đó vẫn kể cho em nghe về Soutetsu——」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……なんだ、日々姫か」
2087 = "「À......ra là Hibiki.」"

# monologue
# JP: 謎とはそういうものであろうが、\n答えがわかればあっけない。
3456 = "Bí ẩn thì luôn là vậy, nhưng khi biết đáp án rồi thì lại thấy thật nhạt nhẽo."

# monologue
# JP: しかし、そうか――日々姫も認めているのなら、\n確かに僕は、わかりやすくなってきているのだろう。
2901 = "Nhưng, vậy sao——nếu cả Hibiki cũng công nhận, thì chắc chắn tôi đang dần trở nên dễ đoán hơn rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「……『わかりやすくなった』か。[よ]良いことのようにも、\n危なっかしいことのようにも思えるな」
1430 = "「......『Dễ đoán hơn』 sao. Nghe có vẻ là chuyện tốt, nhưng cũng có vẻ hơi nguy hiểm nhỉ.」"

# 【稀咲】
# display as 稀咲
# JP: 「ボクとしては、素晴らしく良い変化だと思うけど？\n――具体的には、こんな恩恵があったりするから」
2297 = "「Theo em thì đó là một sự thay đổi tuyệt vời đấy chứ? ——Cụ thể thì, nó mang lại lợi ích thế này đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お」
2140 = "「Ồ.」"

# monologue
# JP: 稀咲は[くろもじ,2]黒文字を見事に操り、\n食べかけの長饅頭をふたつに割る。
3337 = "Kisaki điêu luyện sử dụng tăm tre, chia chiếc bánh gạo dài đang ăn dở thành hai nửa."

# 【稀咲】
# display as 稀咲
# JP: 「どうぞ？　双鉄。\n少食のボクには、もとからこれは、少し重いんだ」
2057 = "「Xin mời? Soutetsu. Với đứa ăn ít như em thì cái này vốn dĩ hơi quá sức.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういうことなら遠慮なく」
2708 = "「Nếu vậy thì anh không khách sáo nhé.」"

# monologue
# JP: 切り分けられた半分を、\nそのまま一口で持っていき――
3172 = "Tôi cầm lấy một nửa chiếc bánh đã được chia, và bỏ tọt vào miệng——"

# 【稀咲】
# display as 稀咲
# JP: 「それから、これも。遠慮なくどうぞ？」
2678 = "「Cả cái này nữa. Anh cứ tự nhiên nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2604 = "「Cảm ơn em.」"

# monologue
# JP: ミルクティー。\nなるほど確かに、"わかりやすい"　も、悪くない。
3322 = "Trà sữa. Quả thực, \"dễ đoán\" cũng không tệ chút nào."

# monologue
# JP: 稀咲が差し出してくれたカップをそのまま、\n口へと運んで――
3175 = "Tôi nâng tách trà Kisaki đưa, đưa lên miệng——"

# 【稀咲】
# display as 稀咲
# JP: 「！」
# 2091 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む――」
# 2111 = "「嗯……」" 

# monologue
# JP: これは――旨い。まろやかさが増す。\nなのに甘みが、しつこさを残さず洗われて――ああ。
3253 = "Ngon——thật. Vị êm dịu tăng lên. Vậy mà vị ngọt lại được gột sạch, không để lại chút cảm giác ngấy nào——aa."

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。全部飲んでしまった」
2341 = "「Xin lỗi. Anh uống cạn mất rồi.」"

# 【稀咲】
# display as 稀咲
# JP: 「え！？　あ。――ああ」
2075 = "「Hả!? A. ——À.」"

# monologue
# JP: 何故か稀咲はビクリと身を引き、\n芝居がかった咳払いをする。
2898 = "Không hiểu sao Kisaki lại giật mình lùi lại, rồi hắng giọng một cách đầy kịch tính."

# 【稀咲】
# display as 稀咲
# JP: 「構わないよ。茶葉はまだまだたくさんあるし。\nよかったら、新しく淹れなおそうか？」
2453 = "「Không sao đâu. Trà vẫn còn nhiều mà. Nếu anh thích, em pha ấm mới nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、ご馳走様だ。大変にいいお茶だった」
1867 = "「Không, anh đủ rồi. Trà ngon lắm.」"

# 【稀咲】
# display as 稀咲
# JP: 「よかった。じゃ、ボクも――もぐっ」
1956 = "「Vậy thì tốt rồi. Vậy, em cũng――ngoạm.」"

# monologue
# JP: 最後に残った長饅頭を、稀咲も一口で綺麗に食べきる。\nそうしてふっ――と息を吐き。
3308 = "Kisaki cũng ăn gọn nửa chiếc bánh gạo dài còn lại trong một miếng. Sau đó, cô ấy khẽ thở hắt ra――phù."

# 【稀咲】
# display as 稀咲
# JP: 「さてさて、たっぷり糖分も補充できたし、\n軽い頭の体操もした」
2167 = "「Rồi rồi, đã bổ sung đủ lượng đường, cũng đã khởi động trí não một chút.」"

# monologue
# JP: 目つきが変わる。\n僕の背筋も、自然と伸びる。
3345 = "Ánh mắt cô ấy thay đổi. Lưng tôi cũng tự nhiên thẳng lên."

# 【双鉄】
# display as 雙鐵
# JP: 「やるか」
2724 = "「Bắt đầu chứ.」"

# 【稀咲】
# display as 稀咲
# JP: 「やろう」
# 2724 = "「開始吧」" 

# monologue
# JP: 稀咲の表情が引き締まる。\nテーブルの上を片付けて、ノートＰＣと資料を広げる。
3347 = "Vẻ mặt Kisaki trở nên nghiêm túc. Cô ấy dọn dẹp mặt bàn, rồi mở laptop và tài liệu ra."

# 【稀咲】
# display as 稀咲
# JP: 「『未来行き列車計画』を、線路に乗せられるか否か。\n次の後東氏との交渉が、まさしく、正念場になるからね」
1379 = "「Kế hoạch Tàu Hướng Tới Tương Lai có thể đưa lên đường ray được hay không. Cuộc đàm phán tiếp theo với ông Goto sẽ chính là thời khắc quyết định.」"

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。\nんっ――」
2654 = "「Ra là vậy. Ưm――」"

# monologue
# JP: ……まったく出ない結論ゆえに、支店長室から外に出て。\nしばらく歩いたその場所で、稀咲は大きく伸びをする。
1332 = "......Vì hoàn toàn không đi đến kết luận nào, chúng tôi đã rời khỏi phòng Giám đốc chi nhánh. Sau một hồi đi dạo, Kisaki vươn vai một cái thật dài tại nơi chúng tôi dừng bước."

# 【稀咲】
# display as 稀咲
# JP: 「これは確かに、気分転換になりそうだ。\nそれに、勉強になりそうな気もする」
2662 = "「Đúng là thay đổi không khí thật. Hơn nữa, em có cảm giác sẽ học hỏi được nhiều điều.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう思ってもらえたのなら、何よりだ」
1947 = "「Nếu em nghĩ vậy thì tốt quá.」"

# monologue
# JP: ポーレットから\n立ち入り許可をもらった上での線路沿い。
3160 = "Dọc theo đường ray, sau khi đã xin phép Paulette để được vào."

# monologue
# JP: 交差点を横断しようとでもするかのように、\n稀咲は大きく左右を見渡し、僕を見る。
3307 = "Như thể chuẩn bị băng qua ngã tư, Kisaki nhìn quanh hai bên rồi nhìn tôi."

# 【稀咲】
# display as 稀咲
# JP: 「これ、もっと線路に近づいて大丈夫？」
2050 = "「Thế này, em có thể đến gần đường ray hơn được không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。レールとレールの間に立っても大丈夫だ。\nとはいえ、レールはあまり踏まんようにしてくれ」
2134 = "「Được chứ. Em đứng giữa hai thanh ray cũng không sao. Tuy nhiên, cố gắng đừng giẫm lên thanh ray nhé.」"

# 【稀咲】
# display as 稀咲
# JP: 「それは、どうして？」
2484 = "「Sao lại thế?」"

# 【双鉄】
# display as 雙鐵
# JP: 「理由はふたつ。ひとつは、単純に危ないから」
2423 = "「Có hai lý do. Một là, đơn giản vì nó nguy hiểm.」"

# monologue
# JP: 言えばまじまじ、稀咲はレールを見つめ直す。
3360 = "Nghe vậy, Kisaki chăm chú nhìn lại thanh ray."

# 【稀咲】
# display as 稀咲
# JP: 「確かに……少し高さがあるね。それに、幅も狭い」
2535 = "「Đúng thật......hơi cao nhỉ. Hơn nữa, chiều rộng cũng hẹp.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。\\x%l踏面;#00ffc040;踏面%l;#;の幅は10センチ未満だし、\nレールそのものの高さは逆に10センチを超える」
2391 = "「Đúng vậy. Chiều rộng của \\x%l踏面;#00ffc040;mặt lăn bánh xe%l;#; chưa đến 10 cm, trong khi chiều cao của bản thân thanh ray lại hơn 10 cm.」"

# 【稀咲】
# display as 稀咲
# JP: 「トウメン？」
2627 = "「Mặt lăn bánh xe?」"

# 【双鉄】
# display as 雙鐵
# JP: 「踏む面、と書いて\\x%l踏面;#00ffc040;踏面%l;#;。レールと車輪とが接する\n――つまりは列車と乗客とを支えてくれる面だ」
2629 = "「Mặt bị giẫm lên, viết là \\x%l踏面;#00ffc040;mặt lăn bánh xe%l;#;. Là bề mặt tiếp xúc giữa đường ray và bánh xe ――nói cách khác là bề mặt nâng đỡ đoàn tàu và hành khách.」"

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね」
# 2656 = "「這樣啊」" 

# monologue
# JP: 膝を揃えて、稀咲がしゃがむ。\nその指先が丁寧に、\\x%l踏面;#00ffc040;踏面%l;#;の上に近づいて――
3371 = "Kisaki khép đầu gối lại và ngồi xổm xuống. Đầu ngón tay cô ấy cẩn thận tiến lại gần \\x%l踏面;#00ffc040;mặt lăn bánh xe%l;#;――"

# 【稀咲】
# display as 稀咲
# JP: 「あ、これ、触っても大丈夫？\n手の脂とか、ついちゃったら――」
2101 = "「A, em chạm vào được không? Lỡ dính mồ hôi tay lên thì――」"

# 【双鉄】
# display as 雙鐵
# JP: 「さすがにその程度なら問題無い――が、\n安全に関わることゆえ、慎重になってくれるのは助かる」
2548 = "「Nếu chỉ ở mức độ đó thì không sao cả――nhưng, vì liên quan đến an toàn nên em cẩn thận như vậy cũng tốt.」"

# monologue
# JP: 稀咲のとなりの僕もしゃがんで、\n用意していた軍手を渡す。
3179 = "Tôi cũng ngồi xổm xuống cạnh Kisaki, và đưa cho cô ấy đôi găng tay lao động đã chuẩn bị sẵn."

# 【双鉄】
# display as 雙鐵
# JP: 「手が汚れてももったいないしな。\nよければ、これを」
2339 = "「Bẩn tay em thì tiếc lắm. Nếu không phiền, em dùng cái này đi.」"

# 【稀咲】
# display as 稀咲
# JP: 「もったいない。ふふっ――\nなかなか嬉しい言葉だね」
1858 = "「Tiếc lắm sao. Fufu―― Nghe mát tai thật đấy.」"

# monologue
# JP: 笑いながら、はめる。\n稀咲のか細く白い手に、軍手はいかにも不似合いだ。
3357 = "Cô ấy vừa cười vừa đeo găng tay vào. Đôi găng tay lao động trông thật không hợp với bàn tay trắng trẻo, thon thả của Kisaki."

# monologue
# JP: そうして、軍手に包まれた指は、いいこいいこと、\nいたわるように、そうっと\\x%l踏面;#00ffc040;踏面%l;#;を撫で擦る。
3236 = "Sau đó, những ngón tay bọc trong găng nhẹ nhàng, như đang vỗ về, cẩn thận vuốt ve \\x%l踏面;#00ffc040;mặt lăn bánh xe%l;#;."

# 【稀咲】
# display as 稀咲
# JP: 「なめらかだね。けど、傷もある」
2236 = "「Nhẵn nhụi thật. Nhưng cũng có vết xước.」"

# 【双鉄】
# display as 雙鐵
# JP: 「その程度の傷は、記録しておくに留めざるを得ない。\nより深刻化したら、削って直すことになろうな」
2663 = "「Vết xước cỡ đó thì chỉ có thể ghi chép lại thôi. Nếu nghiêm trọng hơn thì phải mài để sửa lại.」"

# 【稀咲】
# display as 稀咲
# JP: 「削って直すんだ。\nそれは、専門の機械かなにかがあるの？」
2342 = "「Mài để sửa lại sao. Có máy móc chuyên dụng hay gì đó à?」"

# 【双鉄】
# display as 雙鐵
# JP: 「あるのかもしれんが、僕は知らん。\n御一夜鉄道では、ボランティアによる手作業だ」
2054 = "「Có lẽ là có, nhưng anh không biết. Ở Đường sắt Ohito, công việc này do các tình nguyện viên làm thủ công.」"

# 【稀咲】
# display as 稀咲
# JP: 「手作業！」
2334 = "「Làm thủ công!」"

# monologue
# JP: 稀咲は、体全部で驚く。\nそうしてゆっくり首を振り、僕に視線を向け直す。
3349 = "Kisaki giật nảy mình vì ngạc nhiên. Sau đó, cô ấy từ từ lắc đầu, hướng ánh mắt về phía tôi."

# 【稀咲】
# display as 稀咲
# JP: 「なら、よほど大事にしないとね。\nそもそも、どうして傷がついてしまうんだい？」
2684 = "「Vậy thì phải giữ gìn cẩn thận lắm nhỉ. Mà tại sao lại bị xước vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「列車は幾度となくレールを通過し、\nゆえにレールは金属疲労をしてしまうから、と聞いた」
2311 = "「Anh nghe nói là do tàu hỏa chạy qua lại vô số lần, dẫn đến hiện tượng mỏi kim loại trên đường ray.」"

# 【稀咲】
# display as 稀咲
# JP: 「幾度となく、って……御一夜鉄道の列車なんて、\n増便した今だって、そんなには走っていないだろう？」
2485 = "「Vô số lần sao......Tàu của Đường sắt Ohito, cho dù bây giờ đã tăng chuyến, cũng đâu có chạy nhiều đến thế?」"

# 【双鉄】
# display as 雙鐵
# JP: 「今はな。\nしかし、帝鉄時代はまったく事情が違うだろう」
2499 = "「Bây giờ thì vậy thôi. Nhưng thời Teitetsu thì tình hình hoàn toàn khác.」"

# 【稀咲】
# display as 稀咲
# JP: 「帝鉄時代って、そんな昔のこと――」
2206 = "「Thời Teitetsu á, từ thuở xa xưa như thế――」"

# monologue
# JP: ハっと、稀咲は息を呑む。
3305 = "Kisaki chợt nín thở."

# 【稀咲】
# display as 稀咲
# JP: 「『そんな昔』から――\nずっと、このレールを使っているの？」
2717 = "「Từ 『thuở xa xưa』 đó―― Vẫn luôn dùng thanh ray này sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「残念ながら、そのとおりだな。\n交換用のレールも、もう入手困難だと聞いている」
2238 = "「Rất tiếc, đúng là vậy. Anh nghe nói đường ray để thay thế giờ cũng rất khó kiếm.」"

# 【稀咲】
# display as 稀咲
# JP: 「作られてない？　完全に？」
2444 = "「Không sản xuất nữa sao? Hoàn toàn luôn á?」"

# 【双鉄】
# display as 雙鐵
# JP: 「他の地方のことまでは聞いていないが――\n少なくとも九洲では、全滅らしい」
2443 = "「Anh không rõ tình hình ở các địa phương khác―― Nhưng ít nhất ở Kyushu thì có vẻ là không còn nơi nào sản xuất nữa.」"

# 【稀咲】
# display as 稀咲
# JP: 「まぁ、当然か。需要そのものが急減した――\nそれこそ絶滅寸前と思われている産業だものね」
2649 = "「À, cũng phải. Nhu cầu đã giảm mạnh―― Đó vốn là một ngành công nghiệp được coi là đang trên bờ vực tuyệt chủng mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、それを変えようとする動きをしているのは、\n僕たちだけではない」
1926 = "「Nhưng, không chỉ có chúng ta đang hành động để thay đổi điều đó.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。同時多発的に、各地で動きは出始めている」
2397 = "「Đúng vậy. Các phong trào đang bắt đầu xuất hiện đồng loạt ở nhiều nơi.」"

# monologue
# JP: 支店長室で稀咲に教えてもらった情報。
3491 = "Đó là thông tin mà Kisaki đã chia sẻ với tôi trong phòng Giám đốc chi nhánh."

# monologue
# JP: こうして線路に立ちつつ思い返してみれば、\nあえかな繋がりが伸びていくようにさえ感じられる。
3386 = "Đứng trên đường ray và ngẫm nghĩ lại, tôi thậm chí còn cảm nhận được một mối liên kết mong manh đang dần vươn xa."

# 【双鉄】
# display as 雙鐵
# JP: 「小石川さん――だったか？」
2413 = "「Cô Koishikawa――phải không?」"

# 【稀咲】
# display as 稀咲
# JP: 「うん。小石川滋美。31歳。女性。\n後東急行電鉄株式会社の、建設課長」
2186 = "「Ừ. Koishikawa Shigemi. 31 tuổi. Nữ. Trưởng phòng Xây dựng của Công ty Cổ phần Đường sắt Điện tốc hành Goto.」"

# monologue
# JP: 稀咲の声の温度が変わる。
3341 = "Tông giọng của Kisaki thay đổi."

# monologue
# JP: 冷静に、感情を交えず――\n銀行員の声ではなくて、銀行家らしい声になる。
2999 = "Bình tĩnh, không xen lẫn cảm xúc―― Không phải giọng của một nhân viên ngân hàng, mà là giọng của một nhà băng thực thụ."

# 【稀咲】
# display as 稀咲
# JP: 「後東氏は確かに企業買収の天才だろうけれど――\n用地買収に関しては、そのほとんどが小石川氏の仕事だ」
2245 = "「Ông Goto có thể là một thiên tài thâu tóm doanh nghiệp―― Nhưng về mảng thu mua đất đai, phần lớn là công sức của cô Koishikawa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「澁谷―横濱間の復線買収か」
2193 = "「Thu mua để khôi phục tuyến đường giữa Shibuya và Yokohama sao.」"

# monologue
# JP: 言葉にするだけで気が遠くなる。
2985 = "Chỉ nói ra thôi cũng đủ thấy choáng váng."

# monologue
# JP: 道路化されず、\n民間に払い下げられた、かつての鉄道用地群。
3500 = "Những khu đất từng thuộc về đường sắt, không bị quy hoạch thành đường bộ mà được bán lại cho tư nhân."

# 【稀咲】
# display as 稀咲
# JP: 「およそ叶うとは思えない仕事だよね。けれど――\n後東氏の厳しい予算感の下で、彼女はそれを成し遂げた」
2652 = "「Một công việc tưởng chừng như bất khả thi nhỉ. Thế nhưng―― Dưới áp lực ngân sách khắt khe của ông Goto, cô ấy đã làm được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「一言で言えば、天才なのか？」
2555 = "「Nói ngắn gọn thì, cô ấy là thiên tài à?」"

# 【稀咲】
# display as 稀咲
# JP: 「どうかな、その辺の評価のためにも、\nあらためて、ボクの手持ちの情報の詳細を伝えるね？」
2239 = "「Ai biết được, để đánh giá chính xác hơn, em sẽ chia sẻ lại chi tiết những thông tin em đang nắm giữ nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「よろしく頼む」
2740 = "「Trông cậy vào em.」"

# monologue
# JP: 頭を下げれば、稀咲はわずかに微笑んで。\nけれどもすぐに、その表情を引き締め直す。
3158 = "Khi tôi cúi đầu, Kisaki khẽ mỉm cười. Nhưng ngay sau đó, cô ấy lại lấy lại vẻ nghiêm túc."

# 【稀咲】
# display as 稀咲
# JP: 「ごく当然のことだけれども、払い下げの時点で、\n後東氏は水面下で動き出している」
2515 = "「Đương nhiên là, ngay tại thời điểm chính phủ thanh lý tài sản, ông Goto đã bắt đầu hành động ngầm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「どのようにだ？」
2270 = "「Bằng cách nào?」"

# 【稀咲】
# display as 稀咲
# JP: 「一括買受を申し出て、拒否され。公売となった時点で、\n要所要所を、資金に糸目をつけない形で落札したんだ」
1996 = "「Ông ta đề nghị mua trọn gói nhưng bị từ chối. Khi chuyển sang bán đấu giá công khai, ông ta đã vung tiền không tiếc tay để trúng thầu những vị trí trọng yếu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\nでは完全にゼロからの復線買収ではなかったのだな」
2023 = "「Ra là vậy. Vậy không hoàn toàn là thu mua để khôi phục tuyến đường từ con số không.」"

# 【稀咲】
# display as 稀咲
# JP: 「後東氏は、その動きを世間が殆どつかめないレベルで\n上手に行った。世間にもしも知られてしまえば――」
2244 = "「Ông Goto đã thực hiện việc đó một cách khéo léo đến mức dư luận hầu như không hề hay biết. Nếu bị phát giác――」"

# 【双鉄】
# display as 雙鐵
# JP: 「……後東氏のすることだ。対抗のため、あるいは\n単に嫌がらせのため、値を吊り上げる動きも出ような」
1417 = "「......Với những gì ông Goto làm. Chắc chắn sẽ có những kẻ muốn đối đầu, hoặc đơn giản là muốn quấy rối bằng cách đẩy giá lên cao.」"

# 【稀咲】
# display as 稀咲
# JP: 「そうだね。極めて残念なことだけれども、\n足をひっぱるためだけの行動に出る輩は、必ず出てくる」
2380 = "「Đúng vậy. Rất đáng tiếc, nhưng kiểu gì cũng sẽ có những kẻ chỉ trực chờ ngáng chân người khác xuất hiện.」"

# monologue
# JP: 思い当たるところがあるのか、稀咲の整った顔が歪む。
3303 = "Có lẽ vì nhớ lại chuyện gì đó, khuôn mặt xinh đẹp của Kisaki nhăn lại."

# monologue
# JP: 歪んだ顔さえ、やはり美しさを残していて――\n稀咲は美人なのだなぁ、と、逆説的に思わされる。
3011 = "Ngay cả khi nhăn mặt, cô ấy vẫn toát lên vẻ đẹp―― Điều đó lại càng khẳng định Kisaki là một mỹ nhân."

# 【稀咲】
# display as 稀咲
# JP: 「そうした事態を、後東氏は上手に回避したけれど。\n買収が進むほど、意図が見えてくることは避けられない」
2246 = "「Dù ông Goto đã khéo léo tránh được tình huống đó. Nhưng quá trình thu mua càng tiến triển, ý đồ của ông ta càng dễ bị lộ, đó là điều không thể tránh khỏi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうとわかって、売り惜しむ者が出て来るのか」
2523 = "「Khi biết được điều đó, sẽ có những kẻ găm hàng không chịu bán sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。その状況になって輝き始めたのが、\n当時は一平社員に過ぎなかった、小石川氏だ」
2374 = "「Đúng vậy. Trong hoàn cảnh đó, người bắt đầu tỏa sáng, chính là cô Koishikawa, lúc bấy giờ chỉ là một nhân viên quèn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そこからの――最も難易度があがってしまった交渉を、\n予算内で、きっちりと収めたのか？」
2489 = "「Từ đó――cô ấy đã hoàn thành xuất sắc cuộc đàm phán có độ khó cao nhất, mà vẫn giữ được trong mức ngân sách sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「だ、そうだよ？　具体的な手法まではわからないけれど、\n交渉に何百度と臨む姿は、"小石川参り"と呼ばれたって」
2128 = "「Hình như là vậy? Em không rõ phương pháp cụ thể, nhưng hình ảnh cô ấy tham gia đàm phán hàng trăm lần được người ta gọi là \"Cuộc hành hương của Koishikawa\" đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……その話を聞くと、才というよりは――努力。\n泥臭ささえ感じるような気がするな」
1429 = "「......Nghe câu chuyện đó, cảm giác không giống tài năng cho lắm――mà là nỗ lực. Thậm chí còn mang lại cảm giác có phần mộc mạc, chất phác nữa.」"

# 【稀咲】
# display as 稀咲
# JP: 「同感」
2389 = "「Đồng tình.」"

# monologue
# JP: 稀咲が頷く。\nそうして僕を、じっと見つめる。
3379 = "Kisaki gật đầu. Sau đó, cô ấy nhìn tôi chằm chằm."

# 【稀咲】
# display as 稀咲
# JP: 「……多分だけれども。その泥臭さこそが、\n用地買収に、もっとも必要とされる才なんじゃないかな」
1436 = "「......Có lẽ vậy. Sự mộc mạc, chất phác đó, chính là tài năng cần thiết nhất trong việc thu mua đất đai.」"

# 【双鉄】
# display as 雙鐵
# JP: 「つまりは、今の僕達が最も必要としている才か」
2187 = "「Nói cách khác, đó là tài năng mà chúng ta đang cần nhất hiện nay.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね」
# 2389 = "「是啊」" 

# monologue
# JP: 稀咲の舌が小さく動き、その唇を湿らせる。
3364 = "Kisaki khẽ đưa lưỡi, liếm nhẹ đôi môi."

# 【稀咲】
# display as 稀咲
# JP: 「澁谷－横濱間の用地買収はほぼ完了していると聞く。\nつまり小石川氏の才は、現状の後東急行では活きない」
2569 = "「Nghe nói việc thu mua đất đai giữa Shibuya và Yokohama đã gần như hoàn tất. Nói cách khác, tài năng của cô Koishikawa không còn đất dụng võ tại Đường sắt Điện tốc hành Goto hiện tại nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。さすがにそれほど大規模な買収が、\n立て続けに実施されることはなかろうからな」
2538 = "「Đúng vậy. Dù sao thì một vụ thu mua quy mô lớn như thế, cũng khó mà diễn ra liên tục được.」"

# 【稀咲】
# display as 稀咲
# JP: 「だから、ボク達に力を貸してもらえる可能性がある。\n出向か、転職か、どのような形になるにせよ、可能性は」
2330 = "「Thế nên, có khả năng cô ấy sẽ giúp đỡ chúng ta. Dù là phái cử, chuyển việc hay dưới bất kỳ hình thức nào, khả năng đó vẫn tồn tại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「しかし……帝都の大会社から、御一夜鉄道にというのは、\n僕の立場でいうのも何だが」
1923 = "「Nhưng......chuyển từ một công ty lớn ở Teito sang Đường sắt Ohito, dù nói ra từ lập trường của anh thì cũng hơi...」"

# 【稀咲】
# display as 稀咲
# JP: 「うん。定年後とかならともかく、働き盛りでは\nいかにも厳しい。だから、そこをなんとかしたい」
2407 = "「Ừ. Sau khi nghỉ hưu thì không nói làm gì, chứ đang độ tuổi sung sức thì quả thật rất khó. Thế nên, em muốn tìm cách giải quyết vấn đề đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんとかしよう。支店長室で見えぬ答えも、\n環境を変えれば、見いだせるかもしれん」
2285 = "「Cùng tìm cách nào. Biết đâu câu trả lời không tìm thấy trong phòng Giám đốc chi nhánh, lại có thể tìm ra khi thay đổi môi trường.」"

# 【稀咲】
# display as 稀咲
# JP: 「うん。そうだよね。そのためにここを――\n線路を、実地で見せてもらってるんだし」
2124 = "「Ừ. Đúng vậy. Chính vì thế mà anh mới dẫn em đến đây―― để tận mắt xem xét đường ray thực tế mà.」"

# monologue
# JP: 気を取り直したようにまたしゃがみ、\n稀咲は、手のひらでレールを撫でる。
3369 = "Như đã lấy lại tinh thần, Kisaki lại ngồi xổm xuống, dùng lòng bàn tay vuốt ve đường ray."

# monologue
# JP: 何度も優しく――\nいたわるように、慈しむように。
3067 = "Cô ấy vuốt ve nhiều lần, thật dịu dàng―― như đang nâng niu, như đang trân trọng."

# 【稀咲】
# display as 稀咲
# JP: 「……\\x%l踏面;#00ffc040;踏面%l;#;を踏まない、もうひとつの理由が分かった。\n単純に、レールは鉄道にとって、大切なものだからだ」
1424 = "「......Em đã hiểu lý do thứ hai không được giẫm lên \\x%l踏面;#00ffc040;mặt lăn bánh xe%l;#; rồi. Đơn giản vì đường ray là thứ vô cùng quan trọng đối với ngành đường sắt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。たったこれだけの幅しかもたぬものが、\n車輪を、その上に乗る列車を、乗客の命を支えている」
2385 = "「Đúng vậy. Dù chỉ có chiều rộng chừng này, nhưng nó lại nâng đỡ bánh xe, đoàn tàu chạy trên đó, và cả sinh mạng của hành khách.」"

# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 2114 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、理由なく土足で踏みつけたいとは思わない。\n僕や稀咲の体重で、影響や変化が無いものであろうと」
2327 = "「Vì vậy, anh không muốn giẫm lên nó bằng giày bẩn mà không có lý do chính đáng. Cho dù trọng lượng của anh hay Kisaki có không gây ra ảnh hưởng hay thay đổi gì đi chăng nữa.」"

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。それほど大事にするものだから、\nほとんど交換しなくて済んでいることになるのかな？」
2025 = "「Ra là vậy. Vì được trân trọng đến thế, nên hầu như không cần phải thay thế nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや。ハチロクに聞いた限り、帝鉄の主要な路線では、\n定期的にレール交換が行われていたそうだ。が――」
1872 = "「Không đâu. Theo như Hachiroku kể, ở các tuyến đường chính của Teitetsu, việc thay đường ray được tiến hành định kỳ. Nhưng――」"

# monologue
# JP: あたりを思わず見渡してしまう。\n列車は、こない。あと数時間は、確実に。
3147 = "Bất giác, tôi đảo mắt nhìn quanh. Sẽ không có chuyến tàu nào đến. Ít nhất là trong vài giờ tới."

# 【双鉄】
# display as 雙鐵
# JP: 「さっきもいったが、今や交換用のレールは希少だ。\nゆえ御一夜鉄道では、余程のことが無いと交換できない」
2014 = "「Như anh đã nói, hiện nay đường ray thay thế rất hiếm. Vì vậy ở Đường sắt Ohito, trừ khi có chuyện bất đắc dĩ, nếu không thì không thể thay được.」"

# 【稀咲】
# display as 稀咲
# JP: 「それは、危険なことではないの？」
2671 = "「Như vậy không nguy hiểm sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「今の御一夜鉄道は、列車密度が極めて薄い。ので、\n\\x%l保線;#00ffc040;保線%l;#;を丁寧に行うことで、レールを延命できている」
2497 = "「Hiện tại, mật độ tàu của Đường sắt Ohito cực kỳ thưa thớt. Do đó, bằng cách \\x%l保線;#00ffc040;bảo trì đường ray%l;#; cẩn thận, chúng ta có thể kéo dài tuổi thọ của đường ray.」"

# 【稀咲】
# display as 稀咲
# JP: 「ホセン」
2203 = "「Bảo trì đường ray?」"

# 【双鉄】
# display as 雙鐵
# JP: 「線路を保つ、と書いて\\x%l保線;#00ffc040;保線%l;#;だ。さきほどのような\nレールの傷を削って整えたり、あるいは――」
2195 = "「Giữ gìn tuyến đường sắt, viết là \\x%l保線;#00ffc040;bảo trì đường ray%l;#;. Ví dụ như mài và làm phẳng các vết xước trên đường ray như lúc nãy, hoặc là――」"

# monologue
# JP: 指差して、稀咲の視線を誘導する。
3154 = "Tôi chỉ tay, hướng ánh nhìn của Kisaki theo."

# 【双鉄】
# display as 雙鐵
# JP: 「あそこ、レールが沈んで見えるのがわかるか？」
2714 = "「Đằng kia, em có thấy đường ray trông như bị lún xuống không?」"

# 【稀咲】
# display as 稀咲
# JP: 「ん？　ああ――言われてみれば、\n他の部分と違っては見える、かな？」
1898 = "「Hửm? À――anh nói em mới để ý, trông có vẻ khác với những chỗ còn lại nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「目線を下げよう。頬をレールにつけるようにして、\nそこからレールを広く見るんだ」
1962 = "「Hạ tầm mắt xuống nào. Hãy thử áp má gần đường ray, và từ đó nhìn bao quát cả đường ray xem.」"

# monologue
# JP: 実例を示せば、稀咲も素直に真似してくれる。
3359 = "Tôi làm mẫu, Kisaki cũng ngoan ngoãn làm theo."

# 【稀咲】
# display as 稀咲
# JP: 「ああ、こうすればボクにもわかるね。\n確かに、レールが沈んでる」
2105 = "「A, nhìn thế này thì em cũng thấy rồi. Đúng là đường ray bị lún thật.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああしたものを修正するのも、\\x%l保線;#00ffc040;保線%l;#;の仕事だ」
1983 = "「Sửa chữa những chỗ như vậy cũng là công việc của \\x%l保線;#00ffc040;bảo trì đường ray%l;#;.」"

# monologue
# JP: もちろん、位置をメモしておく。\nこうした地道な報告も、安全を支える礎となる。
3246 = "Tất nhiên, tôi ghi lại vị trí đó. Những báo cáo thiết thực như thế này cũng là nền tảng để đảm bảo an toàn."

# 【稀咲】
# display as 稀咲
# JP: 「修正って、どうやるんだい？\n交換のレールは希少なんだろう？」
1986 = "「Sửa chữa thì làm thế nào? Đường ray thay thế hiếm lắm mà?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。希少だ。\nだから、[ろばん,1]路盤[がわ]側――レールを支える地面の方で修正する」
2118 = "「Ừ. Rất hiếm. Vì vậy, chúng ta sẽ sửa từ phía nền đường――tức là phần mặt đất nâng đỡ đường ray.」"

# 【稀咲】
# display as 稀咲
# JP: 「地面で修正って――どうやって？」
1980 = "「Sửa từ mặt đất――bằng cách nào?」"

# 【双鉄】
# display as 雙鐵
# JP: 「[どうしょう,1]道床――\\x%lバラスト;#00ffc040;バラスト%l;#;。\nこの小石を沈んでいる\\x%l枕木;#00ffc040;枕木%l;#;の下に入れ、[つ]搗き固める」
2504 = "「Lớp đá dăm――\\x%lバラスト;#00ffc040;đá ba-lát%l;#;. Chúng ta sẽ nhét những viên đá nhỏ này xuống dưới \\x%l枕木;#00ffc040;tà vẹt%l;#; bị lún, rồi đầm cho chặt lại.」"

# 【稀咲】
# display as 稀咲
# JP: 「つきかためるって？」
2344 = "「Đầm cho chặt lại?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ビーターというツルハシのような道具を使って、\n四人一組になり、息を合わせて、叩いて固める」
2502 = "「Dùng một dụng cụ giống như cuốc chim gọi là beater, bốn người một nhóm, phối hợp nhịp nhàng, gõ để nén chặt.」"

# monologue
# JP: 稀咲の目が、鮮やかなまでに見開かれる。
3361 = "Kisaki mở to đôi mắt, sáng long lanh."

# 【稀咲】
# display as 稀咲
# JP: 「四人がかり！　それを――いちいちやるのかい？\n線路って、だって、御一夜－[ゆのい,1]湯医の間だけでも」
2146 = "「Cần tới bốn người cơ á! Phải làm thế――từng chỗ một sao? Đường ray dài lắm mà, chỉ tính riêng đoạn giữa Ohito và Yui thôi cũng đã...」"

# 【双鉄】
# display as 雙鐵
# JP: 「約25kmだ。ゆえに、毎日全てを見るわけではない。\n駅・廃駅の間一区間ずつを、順番にみてまわる」
2161 = "「Khoảng 25km. Vì vậy, không phải ngày nào cũng kiểm tra toàn bộ. Chúng ta sẽ đi tuần tra lần lượt từng đoạn giữa các nhà ga, kể cả ga bỏ hoang.」"

# 【稀咲】
# display as 稀咲
# JP: 「誰が？」
2601 = "「Ai làm?」"

# 【双鉄】
# display as 雙鐵
# JP: 「[せき]堰さん――ふかみの祖父たち、\\x%l保線;#00ffc040;保線%l;#;ボランティアの\n方々や、僕ら、御一夜鉄道に関わる者が、だ」
2159 = "「Ông Seki――ông nội của Fukami, các tình nguyện viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, và cả chúng ta, những người liên quan đến Đường sắt Ohito.」"

# monologue
# JP: 言った瞬間、\nすっと、稀咲の瞳が細まる。
3163 = "Vừa dứt lời, ánh mắt Kisaki nheo lại."

# 【稀咲】
# display as 稀咲
# JP: 「……仮に、そのボランティアがいなくなったら？」
1397 = "「......Giả sử, không còn tình nguyện viên nữa thì sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「厳しいな。極めて厳しい」
2700 = "「Sẽ rất khó khăn. Cực kỳ khó khăn.」"

# monologue
# JP: 想像もしたくないことではあるが、\n故に、想像しておかねばならない。
3524 = "Dù không muốn tưởng tượng đến, nhưng chúng tôi buộc phải nghĩ tới điều đó."

# monologue
# JP: ボランティアを増やし、技術継承をしつつ\\x%l保線;#00ffc040;保線%l;#;していく。\nその流れがもしも、完全に途絶えるのなら――
2963 = "Tăng cường tình nguyện viên, vừa kế thừa kỹ thuật vừa \\x%l保線;#00ffc040;bảo trì đường ray%l;#;. Nếu dòng chảy đó hoàn toàn bị đứt đoạn――"

# 【双鉄】
# display as 雙鐵
# JP: 「経験者を、有償で雇用する他なくなる。\nそのごく当然のことが、今の御一夜鉄道では厳しい」
2690 = "「Không còn cách nào khác ngoài việc thuê người có kinh nghiệm và trả lương cho họ. Một điều tưởng chừng như hiển nhiên đó, lại rất khó khăn đối với Đường sắt Ohito hiện tại.」"

# 【稀咲】
# display as 稀咲
# JP: 「お金さえだせば、経験者は確保できる？」
2424 = "「Chỉ cần có tiền là có thể tìm được người có kinh nghiệm sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「とは思う、帝鉄時代、\n\\x%l保線;#00ffc040;保線%l;#;の業務にかかわっていらした方は数多かろうから」
2288 = "「Anh nghĩ là được. Vì thời Teitetsu, những người tham gia vào công việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#; rất nhiều.」"

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。なら、そうした人たちは、\n今は専門技術を活かせていない――という話になるかな」
2655 = "「Ra là vậy. Thế thì, những người đó hiện tại đang không có cơ hội phát huy chuyên môn của mình――có thể hiểu như vậy nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。活かすための環境が\n激減してしまっているのだから」
2290 = "「Có lẽ vậy. Môi trường để họ phát huy đã giảm đi đáng kể mà.」"

# 【稀咲】
# display as 稀咲
# JP: 「なら」
2669 = "「Vậy thì.」"

# monologue
# JP: 細まった瞳のままに、稀咲が僕をじっと見る。\nその目がどこか挑戦的に、にやりと笑う。
3351 = "Với đôi mắt nheo lại, Kisaki nhìn tôi chằm chằm. Ánh mắt ấy ánh lên vẻ thách thức, cô ấy nhếch mép cười."

# 【稀咲】
# display as 稀咲
# JP: 「『条件が多少厳しくても、雇用を求める』層は、\nある程度以上見込めるわけだね？」
2688 = "「Nghĩa là nhóm người 『mong muốn được làm việc dù điều kiện có hơi khắt khe』, cũng có thể kỳ vọng được ở một mức độ nào đó nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2139 = "「Ừ――」"

# monologue
# JP: なるほど、そういう解釈も――と、\n考え始める僕を置き、稀咲はさらなる言葉を繋ぐ。
3014 = "Ra là vậy, cũng có thể hiểu theo cách đó―― Bỏ lại tôi đang chìm trong suy nghĩ, Kisaki tiếp tục nói."

# 【稀咲】
# display as 稀咲
# JP: 「だったらこれは、大規模な事業計画になり得る。\nその上、行政を味方につけられる案件ともなる」
2651 = "「Nếu vậy, đây có thể trở thành một kế hoạch kinh doanh quy mô lớn. Hơn nữa, đây cũng là một dự án có thể lôi kéo chính quyền về phe mình.」"

# 【双鉄】
# display as 雙鐵
# JP: 「行政を？」
2586 = "「Chính quyền sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「復線は、線路製造需要をも復活させられるから。\n北九洲には、巨大な製鉄所があるよね？」
2272 = "「Vì việc khôi phục tuyến đường cũng sẽ làm sống lại nhu cầu sản xuất đường ray. Ở Bắc Kyushu có một nhà máy thép khổng lồ đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、[やはた,1]矢幡だな」
2084 = "「À, Yahata nhỉ.」"

# 【稀咲】
# display as 稀咲
# JP: 「あそこにレールを作ってもらう。\nレールの運搬は――エアクラでできる？」
2189 = "「Chúng ta sẽ nhờ họ sản xuất đường ray. Còn việc vận chuyển đường ray――Aircra có làm được không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「湯医線で使っているような、短く軽いレールでも、\nメートルあたり30キログラム、一本で300キロになる」
2202 = "「Ngay cả loại đường ray ngắn và nhẹ như đang dùng ở tuyến Yui, mỗi mét cũng nặng 30kg, một thanh dài 10 mét là 300kg rồi.」"

# 【稀咲】
# display as 稀咲
# JP: 「一本あたりの長さが10メートルにもなるのか。\nそれで、短い？」
1849 = "「Một thanh dài đến 10 mét cơ á. Thế mà gọi là ngắn sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「という話だ。[ハチロク,3]8620が走っていた[とうかいどう,2]東峡道の線路など、\n50kgレールで、一本の長さは25メートルだったと」
2388 = "「Là vậy đấy. Đường ray ở tuyến Tokaido mà 8620 từng chạy, loại 50kg, một thanh dài tới 25 mét cơ.」"

# 【稀咲】
# display as 稀咲
# JP: 「とてもエアクラで運べるものではないね。\nそうすると最適なのは――多分、鉄道輸送になるよね？」
2181 = "「Thế thì Aircra hoàn toàn không thể vận chuyển được rồi. Vậy phương án tối ưu nhất――chắc là vận chuyển bằng đường sắt nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2389 = "「是啊」" 

# monologue
# JP: 自信をもって頷ける。\nそこはれいなが、誇りとともに伝えてくれた。
3183 = "Tôi tự tin gật đầu. Điều đó đã được Reina truyền đạt lại với đầy niềm tự hào."

# 【双鉄】
# display as 雙鐵
# JP: 「間違いなかろう。線路さえつなげられるのなら。\n重量物大量輸送こそが、鉄道の原点で本領だと聞く」
2445 = "「Chắc chắn là vậy. Miễn là đường ray được kết nối. Anh nghe nói vận chuyển hàng hóa nặng với số lượng lớn chính là khởi điểm và thế mạnh của đường sắt.」"

# 【稀咲】
# display as 稀咲
# JP: 「その際、問題となるのが\\x%l保線;#00ffc040;保線%l;#;コストだよね？\n重い物がたくさん通れば、レールの劣化も当然早い」
2718 = "「Khi đó, vấn đề sẽ là chi phí \\x%l保線;#00ffc040;bảo trì đường ray%l;#; nhỉ? Nếu có nhiều vật nặng đi qua, đường ray đương nhiên sẽ nhanh xuống cấp hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなるな」
# 2389 = "「是啊」" 

# monologue
# JP: まいてつシステムによって車両コストが分散されても、\nなお鉄道会社の経営は、どこも変わらず極めて厳しい。
3087 = "Dù chi phí toa xe đã được phân tán nhờ hệ thống chủ tàu, nhưng tình hình kinh doanh của các công ty đường sắt ở đâu cũng vô cùng khó khăn."

# monologue
# JP: 御一夜鉄道は、\\x%l保線;#00ffc040;保線%l;#;ボランティアに支えられているが、\nこれが有償雇用であれば、経営は恐らく立ち行かない。
3129 = "Đường sắt Ohito hiện đang được hỗ trợ bởi các tình nguyện viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, nhưng nếu phải trả lương để thuê người, e rằng sẽ không trụ nổi."

# 【稀咲】
# display as 稀咲
# JP: 「コストは、スケールメリットによって削減できる」
2291 = "「Chi phí có thể được cắt giảm nhờ lợi thế kinh tế theo quy mô.」"

# 【双鉄】
# display as 雙鐵
# JP: 「スケールメリット？」
2591 = "「Lợi thế kinh tế theo quy mô?」"

# 【稀咲】
# display as 稀咲
# JP: 「“規模の経済性”というやつさ。簡単にいえば、\n事業規模が大きくなるほどコストを下げられること」
2192 = "「Là “tính kinh tế của quy mô” đó. Nói đơn giản, quy mô kinh doanh càng lớn thì chi phí càng giảm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――大量に仕入れる方が、\n仕入れ価格が安くなる……的なことか？」
2082 = "「À――kiểu như nhập hàng số lượng lớn thì giá mua sẽ rẻ hơn......đại loại vậy sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「まさにそれ。代表的な一側面だね。\nけど、スケールメリットはもっと大きく働くものだ」
2451 = "「Chính xác. Đó là một khía cạnh tiêu biểu. Nhưng lợi thế kinh tế theo quy mô còn có tác dụng lớn hơn thế nhiều.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　……すまんが、具体例をあげてもらえるか？」
2136 = "「Hừm? ......Xin lỗi, em có thể cho một ví dụ cụ thể được không?」"

# 【稀咲】
# display as 稀咲
# JP: 「例えば、人材。社員ひとりと、社員100人。\n優秀な人材が入ってくる可能性はどちらが高い？」
2440 = "「Ví dụ như nhân lực. Một nhân viên và 100 nhân viên. Bên nào có khả năng thu hút nhân tài cao hơn?」"

# 【双鉄】
# display as 雙鐵
# JP: 「むろん、100人の方だろう」
2512 = "「Tất nhiên là bên 100 người rồi.」"

# 【稀咲】
# display as 稀咲
# JP: 「優秀な一人のアイディアや技術を100人は共有\nできるよね？　これだけでも大きなメリットだけれど」
1844 = "「Ý tưởng và kỹ thuật của một người xuất sắc có thể được chia sẻ cho 100 người đúng không? Chỉ riêng điều này đã là một lợi thế lớn rồi.」"

# monologue
# JP: 手が動く。\n稀咲は再びレールの傷を指し示す。
3311 = "Tay cô ấy cử động. Kisaki lại chỉ vào vết xước trên đường ray."

# 【稀咲】
# display as 稀咲
# JP: 「この傷を削って直す機械を、\n例えば誰かが発明したとする」
2441 = "「Ví dụ như có ai đó phát minh ra chiếc máy mài và sửa chữa vết xước này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは、すでにあるのかもしれん。\n僕が知らず、御一夜鉄道にも無いだけで」
2599 = "「Có khi thứ đó đã tồn tại rồi cũng nên. Chỉ là anh không biết, và Đường sắt Ohito cũng không có thôi.」"

# 【稀咲】
# display as 稀咲
# JP: 「では何故、御一夜鉄道には無いんだい？\n導入できれば、作業負担を劇的に減らせるだろうに」
2720 = "「Vậy tại sao Đường sắt Ohito lại không có? Nếu áp dụng được, gánh nặng công việc sẽ giảm đi đáng kể mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだとしても、見合わんからだろう。\n使用頻度が少なく、機械が高いなどの理由で」
2200 = "「Dù vậy, chắc là do không tương xứng. Vì tần suất sử dụng ít, máy móc lại đắt tiền chẳng hạn.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。けど、スケールメリットは、\nその問題も解消してくれるんだ」
2394 = "「Đúng vậy. Nhưng lợi thế kinh tế theo quy mô cũng sẽ giải quyết được vấn đề đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2083 = "「!」"

# monologue
# JP: 理解る。わかった。
3169 = "Tôi hiểu rồi. Tôi đã hiểu."

# monologue
# JP: 一億円の機械で、年に一度しかレールを削らないなら\nもったいないにも程がある、が――
2976 = "Nếu mua một chiếc máy trị giá một trăm triệu yên mà mỗi năm chỉ mài đường ray một lần thì quả là quá lãng phí, nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「機械の稼働――つまり、\n機械が利益を生む回数を増やせるのなら」
2047 = "「Vận hành máy móc――nói cách khác, nếu có thể tăng số lần máy móc tạo ra lợi nhuận.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね、導入コストの回収はその分早まる。\n回収できれば、あとは使えば使っただけ利益があがる」
2401 = "「Đúng vậy, thời gian thu hồi vốn đầu tư sẽ nhanh hơn tương ứng. Khi đã thu hồi được vốn, thì càng dùng nhiều sẽ càng sinh lời.」"

# 【双鉄】
# display as 雙鐵
# JP: 「つまり――稀咲が考えているのは」
2326 = "「Tóm lại――điều Kisaki đang nghĩ là.」"

# 【稀咲】
# display as 稀咲
# JP: 「そう」
2449 = "「Đúng vậy.」"

# monologue
# JP: 稀咲が頷く。\n柑橘系の、涼やかで甘い匂いが一瞬、広がる。
3378 = "Kisaki gật đầu. Mùi hương cam chanh thanh mát, ngọt ngào thoảng qua trong chốc lát."

# 【稀咲】
# display as 稀咲
# JP: 「\\x%l保線;#00ffc040;保線%l;#;と線路買収・敷設の専門会社を作り、外注を受ける。\n巨大なスケールメリットを発生させて、コストを下げる」
2597 = "「Thành lập một công ty chuyên về \\x%l保線;#00ffc040;bảo trì đường ray%l;#; và thu mua, lắp đặt đường ray, rồi nhận các hợp đồng thầu phụ. Tạo ra lợi thế kinh tế theo quy mô khổng lồ để giảm chi phí.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなれば、鉄道会社の経営負担は軽減される。\n結果、復線をためらう理由の一つを消しされる」
2653 = "「Nếu vậy, gánh nặng kinh doanh của các công ty đường sắt sẽ được giảm bớt. Kết quả là xóa bỏ được một trong những lý do khiến họ chần chừ trong việc khôi phục tuyến đường.」"

# 【稀咲】
# display as 稀咲
# JP: 「だけじゃなく、大規模な雇用も発生するよね。\nしかも、技術を持ち腐れさせてしまう者への求人だ」
1859 = "「Không chỉ vậy, còn tạo ra lượng lớn việc làm nữa. Hơn nữa, đó là cơ hội việc làm cho những người đang để phí hoài kỹ năng của mình.」"

# 【双鉄】
# display as 雙鐵
# JP: 「くわえて、未経験者の求人もだな。\\x%l保線;#00ffc040;保線%l;#;は高度に\n専門的な仕事ではあるが、単純労働の部分も多いゆえ」
2566 = "「Thêm vào đó là tuyển dụng cả những người chưa có kinh nghiệm nữa. Dù \\x%l保線;#00ffc040;bảo trì đường ray%l;#; là công việc mang tính chuyên môn cao, nhưng cũng có nhiều phần là lao động phổ thông.」"

# 【稀咲】
# display as 稀咲
# JP: 「復線が活性化して、事業化されれば、\n同時に、線路製造の需要も復活するよね」
2049 = "「Nếu việc khôi phục tuyến đường được đẩy mạnh và thương mại hóa, đồng thời nhu cầu sản xuất đường ray cũng sẽ hồi sinh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。そして、この計画が形になり\n\\x%l保線;#00ffc040;保線%l;#;、及び線路用地買収の専門会社が立ち上がるのなら」
2447 = "「Chính xác. Và nếu kế hoạch này thành hình, một công ty chuyên về \\x%l保線;#00ffc040;bảo trì đường ray%l;#; và thu mua đất đường sắt được thành lập thì...」"

# 【稀咲】
# display as 稀咲
# JP: 「ボクたちにとって最重要なピース。小石川氏。か、\n類似の能力を有する誰かの、適切な受け皿を用意できる」
2419 = "「Mảnh ghép quan trọng nhất đối với chúng ta. Cô Koishikawa. Hoặc, chúng ta có thể chuẩn bị một nơi tiếp nhận phù hợp cho một người có năng lực tương tự.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば。ここに後東氏を巻き込めばいい。\n例えば出資をしてもらうなどの形で――」
2711 = "「Nếu vậy. Kéo cả ông Goto vào chuyện này là được. Ví dụ như dưới hình thức yêu cầu ông ta đầu tư――」"

# 【稀咲】
# display as 稀咲
# JP: 「そのとおりだね、双鉄」
2452 = "「Đúng vậy đó, Soutetsu.」"

# monologue
# JP: 合格点だ、と言わんばかりの、満足そうな、深い頷き。
3380 = "Một cái gật đầu sâu, đầy mãn nguyện, như muốn nói \"Đạt điểm tuyệt đối rồi đấy\"."

# 【稀咲】
# display as 稀咲
# JP: 「キミとの会話は、歯車が噛み合う感じで心地いい」
2623 = "「Nói chuyện với anh, cảm giác như các bánh răng khớp vào nhau vậy, rất dễ chịu.」"

# monologue
# JP: 夏風に吹かれたように、稀咲が笑う。\n一瞬、瞳を奪われる。
3310 = "Kisaki mỉm cười, tựa như làn gió mùa hạ thoảng qua. Trong khoảnh khắc, ánh mắt tôi hoàn toàn bị thu hút."

# 【稀咲】
# display as 稀咲
# JP: 「――そう運ぶのなら、経済の好循環が発生する。\n行政も、これなら味方についてくれる可能性が高い」
2657 = "「――Nếu tiến hành như vậy, sẽ tạo ra một vòng tuần hoàn kinh tế tốt. Khả năng cao là chính quyền cũng sẽ đứng về phía chúng ta.」"

# 【双鉄】
# display as 雙鐵
# JP: 「行政が味方につくなら、復線買収の難易度も、\nぐっと下げられそうな気がするな」
2178 = "「Nếu có chính quyền hậu thuẫn, độ khó của việc thu mua khôi phục tuyến đường cũng sẽ giảm đi đáng kể.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。それはそれで心情的な抵抗もでそうだけれど、\nそこをケアする案も既に出て、動き出してる」
2386 = "「Đúng vậy. Dù việc đó có thể vấp phải sự phản đối về mặt tâm lý, nhưng chúng ta đã có phương án giải quyết và đang bắt đầu triển khai rồi.」"

# monologue
# JP: ああ、そうか。
3015 = "À, ra là vậy."

# monologue
# JP: 僕らが蒔く種が花開くなら、\nそうした見方をしてくれる人も出てくるのか。
3161 = "Nếu hạt giống chúng ta gieo xuống nở hoa, thì sẽ có những người nhìn nhận vấn đề theo hướng đó sao."

# 【双鉄】
# display as 雙鐵
# JP: 「クマ川流域イラストマップと、8620運転台通信か」
1967 = "「Bản đồ minh họa lưu vực sông Kuma và Giao tiếp buồng lái 8620 à.」"

# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 2114 = "「嗯」" 

# monologue
# JP: 稀咲が静かに立ち上がる。\n右手の軍手を、ゆっくり外す。
3376 = "Kisaki lặng lẽ đứng lên. Cô ấy từ từ tháo chiếc găng tay bên phải ra."

# 【稀咲】
# display as 稀咲
# JP: 「この方向で精査して。いけそうであれば、\n事業計画をたて、先方に送る形で構わないかな？」
2427 = "「Hãy xem xét kỹ lưỡng theo hướng này. Nếu thấy khả thi, chúng ta sẽ lập kế hoạch kinh doanh và gửi cho đối tác, được chứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「構わないもなにも――\nそれほどに心強い支援は他にない」
2511 = "「Được chứ sao không―― Không có sự hỗ trợ nào đáng tin cậy hơn thế này đâu.」"

# 【稀咲】
# display as 稀咲
# JP: 「支援してくれたのは、むしろキミだよ？　双鉄」
2361 = "「Người hỗ trợ em, lại chính là anh đấy? Soutetsu.」"

# monologue
# JP: 涼やかに笑い、\n右手を僕に差し出してくる。
3374 = "Nở nụ cười thanh mát, cô ấy đưa tay phải về phía tôi."

# 【稀咲】
# display as 稀咲
# JP: 「連れてきてくれて、現実を見せてくれて、良かった。\nそれがなければ、フラッシュアイディアも出なかった」
2605 = "「Thật tốt khi anh đã dẫn em đến đây và cho em thấy thực tế. Nếu không có điều đó, em đã không thể nảy ra ý tưởng này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういってもらえるのなら、光栄だ」
1965 = "「Được em nói vậy, anh rất vinh hạnh.」"

# monologue
# JP: ……"向き合うこと"の大きさを、今更ながらに実感する。\n日々姫が、ポーレットが、れいなが僕に教えてくれた。
1334 = "......Đến tận bây giờ tôi mới thực sự cảm nhận được tầm quan trọng của việc \"đối mặt\". Hibiki, Paulette và Reina đã dạy cho tôi điều đó."

# monologue
# JP: 会議でしか飛び出してこないアイディアがあるのと同様に、\n向き合ってみて初めて生まれる気づきも確かにある、と。
3203 = "Giống như có những ý tưởng chỉ nảy ra trong các cuộc họp, chắc chắn cũng có những nhận thức chỉ sinh ra khi ta thực sự đối mặt với nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「役にたてたことを、嬉しく思う」
2573 = "「Anh rất vui vì đã giúp được em.」"

# 【稀咲】
# display as 稀咲
# JP: 「これからもっと役にたってもらうよ？\nその分もちろん、ボクも、キミの役にたつけど」
1907 = "「Từ giờ anh sẽ còn phải giúp em nhiều hơn nữa đấy nhé? Đổi lại, tất nhiên em cũng sẽ giúp đỡ anh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それこそまさに、望むところだ」
2436 = "「Đó chính xác là điều anh mong muốn.」"

# monologue
# JP: 握手する。
3159 = "Chúng tôi bắt tay nhau."

# monologue
# JP: 稀咲の肌はさらさらしている。けれども熱い。\n稀咲の外面と内面を、そのまま表していると感じる。
3343 = "Làn da của Kisaki rất mịn màng. Nhưng lại nóng hổi. Tôi cảm giác điều đó thể hiện đúng như con người bên ngoài và bên trong của Kisaki vậy."

# 【稀咲】
# display as 稀咲
# JP: 「なら、夜まで。もう少しだけ付き合ってもらえる？\n事業計画の概要を、このまま一気にまとめたいんだ」
2681 = "「Vậy, cho đến tối nay. Anh có thể ở lại với em thêm chút nữa được không? Em muốn hoàn thành luôn bản tóm tắt kế hoạch kinh doanh này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論、構わん。が――その方面で、\n僕が稀咲を助けられるようなことが、なにかあるのか？」
2510 = "「Tất nhiên là được. Nhưng――trong lĩnh vực đó, anh có thể giúp gì được cho Kisaki sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「あるよ？　もちろん」
2513 = "「Có chứ? Tất nhiên rồi.」"

# monologue
# JP: 照れてはにかむ幼子のような笑みを浮かべて――\n稀咲は声まで、少し甘えたようになる。
3355 = "Nở nụ cười bẽn lẽn như một đứa trẻ đang xấu hổ―― Giọng nói của Kisaki cũng trở nên có chút nũng nịu."

# 【稀咲】
# display as 稀咲
# JP: 「双鉄が側にいてくれるだけで。\nボクはね？　普段よりもう少しだけ、頑張れるのさ」
2045 = "「Chỉ cần Soutetsu ở bên cạnh thôi. Anh biết không? Em sẽ có thể cố gắng hơn bình thường một chút đấy.」"

# 【稀咲】
# display as 稀咲
# JP: 「――その条件では、\n残念ながら調印できません」
1355 = "「――Với điều kiện đó, rất tiếc chúng tôi không thể ký kết được.」"

# monologue
# JP: きっぱりと稀咲が言い切る。\n途端、バンっ！　と物凄い音が響き渡る。
3328 = "Kisaki dứt khoát nói. Ngay lập tức, Rầm! Một tiếng động lớn vang lên."

# 【後東】
# display as 後東
# JP: 「なら決裂だ！」
2697 = "「Vậy thì đàm phán thất bại!」"

# monologue
# JP: 両手で乱暴に机を叩き、\n後東氏が書類を鞄に詰めはじめる。
3110 = "Ông Goto đập mạnh hai tay xuống bàn, rồi bắt đầu nhét tài liệu vào cặp."

# 【後東】
# display as 後東
# JP: 「惜しいとこまでいったんだがな。\nお互いに譲れねぇなら、仕方ねぇ」
1988 = "「Đã đến nước này rồi mà thật đáng tiếc. Nhưng nếu cả hai bên đều không thể nhượng bộ thì cũng hết cách.」"

# monologue
# JP: これで終わりかと、慌ててしまう。\n本当に、あと一息まで来ていたように思うのに。
3028 = "Tôi bắt đầu hoảng hốt, tự hỏi liệu mọi chuyện đã kết thúc ở đây sao. Thực sự, tôi cảm giác như chỉ còn một bước nữa thôi."

# monologue
# JP: ……出資比率、33.4％と、33.3％。\nその0.1％の差異が、どうしても埋められぬものらしい。
1327 = "......Tỷ lệ góp vốn, 33.4% và 33.3%. Khoảng cách 0.1% đó, dường như không thể nào san lấp được."

# 【稀咲】
# display as 稀咲
# JP: 「――お運びいただいたにもかかわらず、\nこのような結論となり、とても残念に感じています」
1356 = "「――Dù ông đã cất công đến đây, nhưng lại đi đến kết luận thế này, tôi thực sự cảm thấy rất đáng tiếc.」"

# 【浦上】
# display as 浦上
# JP: 「…………」
1386 = "「............」"

# monologue
# JP: けれど、稀咲は後東氏を止めない。\n壁際に静かに佇む、浦上さんも。
2953 = "Thế nhưng, Kisaki không hề cản ông Goto lại. Cả anh Uragami đang đứng lặng lẽ bên bức tường cũng vậy."

# monologue
# JP: 後東氏もまた止まらない。\n書類を詰め込み終わるや否や、憤然と椅子から立ち上がる。
3109 = "Ông Goto cũng không dừng lại. Vừa nhét xong tài liệu, ông ta tức giận đứng bật dậy khỏi ghế."

# 【後東】
# display as 後東
# JP: 「――だがまぁ、あんたらの話は面白い。\n成功したら、また別の席で会うこともあるだろうさ」
1351 = "「――Nhưng mà, câu chuyện của các người cũng thú vị đấy. Nếu thành công, có lẽ chúng ta sẽ còn gặp lại nhau ở một nơi khác.」"

# 【赤井】
# display as ？？？
# JP: 「だったら、後東」
2247 = "「Nếu vậy thì, Goto.」"

# 【後東】
# display as 後東
# JP: 「っ！」
# 2091 = "「啊！」" 

# monologue
# JP: 部屋すみのソファに静かに座る赤井宮司が、\n今日、初めての声を出す。
3470 = "Akai-guji đang ngồi lặng lẽ trên ghế sofa ở góc phòng, hôm nay, lần đầu tiên cất tiếng."

# monologue
# JP: 傍らに置いた運転鞄を優しく撫ぜて、\nまるで鞄に、言い聞かせてでもいるかのように。
2937 = "Ông dịu dàng vuốt ve chiếc túi phi hành đoàn đặt bên cạnh, như thể đang thì thầm với nó vậy."

# 【赤井】
# display as 赤井
# JP: 「またと言わず今。一度だけ、席に戻ってくれないか。\n私とニイロクとに免じて――ただ一度だけでいい」
2007 = "「Đừng nói là lúc khác, mà là bây giờ. Xin cậu hãy quay lại chỗ ngồi một lần thôi. Nể mặt tôi và Niiroku――chỉ một lần thôi là đủ.」"

# 【後東】
# display as 後東
# JP: 「………………チっッ！」
1411 = "「..................Chậc!」"

# monologue
# JP: これみよがしに舌打ちし、\nそれでも後東氏は席へと戻り、また書類を広げ始める。
3108 = "Ông Goto chép miệng một cách đầy bực dọc, nhưng vẫn quay lại chỗ ngồi và bắt đầu mở tài liệu ra lần nữa."

# 【後東】
# display as 後東
# JP: 「…………」
# 1386 = "「……」" 

# 【稀咲】
# display as 稀咲
# JP: 「…………」
# 1386 = "「……」" 

# monologue
# JP: 後東氏は、ちびた鉛筆で机を何度もかつかつ叩く。\n稀咲はまったく反応しない。
3107 = "Ông Goto liên tục dùng mẩu bút chì gõ lạch cạch xuống bàn. Kisaki hoàn toàn không phản ứng gì."

# monologue
# JP: ただ後東氏の次の言葉を、あるいは動きを、\nひたすらに待つ。
3063 = "Cô ấy chỉ kiên nhẫn chờ đợi lời nói hoặc hành động tiếp theo của ông Goto."

# monologue
# JP: （チ――チ――チ――チ――）
3560 = "（Tích――tích――tích――tích――）"

# monologue
# JP: 空気が、重い。\n緊張感が、肌を刺してくるかのようだ。
3215 = "Bầu không khí thật nặng nề. Cảm giác căng thẳng như đang đâm vào da thịt."

# monologue
# JP: けれども僕も、動けない。\n不用意に何かを言って――稀咲の思惑を崩したくない。
2946 = "Nhưng tôi cũng không thể nhúc nhích. Tôi không muốn lỡ lời nói điều gì đó bất cẩn――làm hỏng kế hoạch của Kisaki."

# monologue
# JP: （今は、ただ信じて待つんだ。稀咲がもしも、\n助けを必要とするならば、必ずサインを送ってくれる）
3565 = "（Bây giờ, chỉ còn cách tin tưởng và chờ đợi. Nếu Kisaki cần giúp đỡ, cô ấy nhất định sẽ ra hiệu.）"

# monologue
# JP: だから、待つ。
3186 = "Vì vậy, tôi chờ đợi."

# monologue
# JP: 喉がカラカラに乾いているが、\nコーヒーカップに手も伸ばさずに。
3085 = "Dù cổ họng đã khô khốc, nhưng tôi vẫn không với tay lấy tách cà phê."

# 【後東】
# display as 後東
# JP: 「……出資比率はそっちの提案通りでいい。\n代わりに、社長はウチから出す」
1399 = "「......Tỷ lệ góp vốn cứ theo như đề xuất của các người cũng được. Đổi lại, phía chúng tôi sẽ chỉ định Giám đốc.」"

# 【稀咲】
# display as 稀咲
# JP: 「でしたら、喜んで調印させていただきます」
2241 = "「Nếu vậy, chúng tôi rất sẵn lòng ký kết.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！！？」
2138 = "「!!?」"

# monologue
# JP: 急転直下の即決だ。\n送り込まれてくる社長が誰か、尋ね直しさえせぬままに。
3098 = "Một quyết định chớp nhoáng, xoay chuyển tình thế. Thậm chí còn không thèm hỏi lại xem người được cử đến làm Giám đốc là ai."

# monologue
# JP: が――それが稀咲の決断ならば、\n僕はもちろん、従うのみだ。
2952 = "Nhưng――nếu đó là quyết định của Kisaki, thì tất nhiên tôi chỉ việc nghe theo."

# 【後東】
# display as 後東
# JP: 「なら、この条件で手打ちだな。\n正式には、法務を通してからまた連絡するが――」
2696 = "「Vậy thì, chốt điều kiện này nhé. Chính thức thì tôi sẽ liên lạc lại sau khi thông qua bộ phận pháp chế――」"

# 【稀咲】
# display as 稀咲
# JP: 「これから、ビジネスパートナーとして、\nどうぞよろしくお願いします」
1906 = "「Từ giờ trở đi, với tư cách là đối tác kinh doanh, mong được ông giúp đỡ.」"

# 【後東】
# display as 後東
# JP: 「こっちこそだ」
2603 = "「Tôi cũng vậy.」"

# monologue
# JP: 稀咲と、後東氏。二人が同時に右手を差し出す。\n握手は強く、極めて短い。
3318 = "Kisaki và ông Goto. Cả hai cùng lúc đưa tay phải ra. Cái bắt tay thật mạnh và cực kỳ ngắn gọn."

# 【後東】
# display as 後東
# JP: 「あんちゃんも、大したタマだ」
1949 = "「Cậu em cũng khá lắm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕、ですか？」
2276 = "「Tôi, sao?」"

# monologue
# JP: 差し出された手を受取り、握手。
3177 = "Tôi nhận lấy bàn tay đang đưa ra và bắt tay ông ấy."

# monologue
# JP: ……かなり緩んでしまっている手だ。\n元\\x%l運転士;#00ffc040;運転士%l;#;の手であるものとは思えない。
1323 = "......Một bàn tay khá lỏng lẻo. Không thể tin được đây lại là bàn tay của một cựu \\x%l運転士;#00ffc040;nhân viên cơ vụ%l;#;."

# 【後東】
# display as 後東
# JP: 「あんちゃんが余計な口出ししてくれりゃあ、\nもーちょっとは儲けられたかもしれんかったんだがよ」
1953 = "「Nếu cậu em mà xen mồm vào những chuyện thừa thãi, thì có lẽ tôi đã kiếm chác được thêm chút đỉnh rồi đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
2648 = "「Chuyện đó thì――」"

# monologue
# JP: 冷や汗が背筋を流れていく。
3181 = "Mồ hôi lạnh chảy ròng ròng trên sống lưng tôi."

# monologue
# JP: やはり、これはそうした――\n例えるのなら、詰将棋のごときやりとりであったのかと。
3205 = "Quả nhiên, đây là một cuộc trao đổi như vậy―― Nếu phải so sánh, thì nó giống như một ván cờ tàn vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「――とても、口出しを出来るとは思いませんでした。\n企業間のやりとりなどでは、僕は完全に素人ですから」
1435 = "「――Tôi không nghĩ mình có thể xen vào đâu. Trong những việc như giao dịch giữa các doanh nghiệp, tôi hoàn toàn là kẻ nghiệp dư.」"

# 【後東】
# display as 後東
# JP: 「――ああ。ふん。そうか。\nま、赤井が見込むだけのこたぁあんだろうなぁ」
1408 = "「――À. Hừm. Vậy sao. Thôi thì, chắc cũng có lý do để Akai coi trọng cậu.」"

# monologue
# JP: 興味をいきなり失くしたように、僕との握手もさっと終え。\n――けれども後東氏は、赤井宮司には手を差し出さない。
3106 = "Như đột nhiên mất hứng, ông ta nhanh chóng kết thúc cái bắt tay với tôi. ――Thế nhưng ông Goto lại không đưa tay ra với Akai-guji."

# monologue
# JP: どころか視線も宮司ではなく、\nその傍らの、運転鞄に向いている。
3242 = "Thậm chí ánh mắt ông ta cũng không hướng về Akai-guji, mà lại nhìn chằm chằm vào chiếc túi phi hành đoàn bên cạnh."

# 【後東】
# display as 後東
# JP: 「……まだ、あのままなのか？」
1437 = "「......Vẫn y như cũ sao?」"

# 【赤井】
# display as 赤井
# JP: 「ですね。けれど、また笑ってくれる日は来ます」
2372 = "「Vâng. Nhưng rồi sẽ có ngày cô ấy mỉm cười trở lại.」"

# 【後東】
# display as 後東
# JP: 「――あんたが言うなら、そうなんだろうな」
1396 = "「――Ông đã nói vậy thì chắc là thế rồi.」"

# monologue
# JP: 言って、後東氏は赤井宮司に背中を向ける。
3113 = "Nói xong, ông Goto quay lưng lại với Akai-guji."

# 【後東】
# display as 後東
# JP: 「そんときが来たら呑もうや。俺らとアレで」
2011 = "「Khi nào đến lúc đó thì đi nhậu một bữa nhé. Bọn mình và cô ấy.」"

# 【赤井】
# display as 赤井
# JP: 「君のおごりでしたら、喜んで」
2589 = "「Nếu cậu bao thì tôi rất sẵn lòng.」"

# 【後東】
# display as 後東
# JP: 「はっ！」
2077 = "「Hả!」"

# monologue
# JP: 後東氏が笑う。\nただ一息で――けれども、とても晴れ晴れと。
3112 = "Ông Goto bật cười. Chỉ một tiếng thôi――nhưng lại vô cùng sảng khoái."

# 【後東】
# display as 後東
# JP: 「ああ、そんときには祝い酒だ。\nもう勘弁って泣きつくくらいに呑ませてやんよ！」
2171 = "「Ờ, lúc đó sẽ là rượu mừng. Tôi sẽ chuốc cho ông say đến mức phải khóc lóc van xin tha mạng mới thôi!」"

# monologue
# JP: そう言い残し、見送りの申し出を断って、\n後東氏は影のような秘書を引き連れ、部屋を出て行く。
3111 = "Để lại những lời đó, ông Goto từ chối lời đề nghị tiễn chân, và rời khỏi phòng cùng người thư ký lặng lẽ như một cái bóng."

# monologue
# JP: 乱暴な足音が聞こえなくなり――\n途端に稀咲は、ぐったり椅子に崩れてしまう。
3523 = "Tiếng bước chân thô bạo khuất dần―― Ngay lập tức, Kisaki rũ người xuống ghế."

# 【稀咲】
# display as 稀咲
# JP: 「ああ、よかった。ボクが間違えない限り、\n九割九分、ここに落ち着くとは思っていたけど」
2095 = "「A, may quá. Chỉ cần em không phạm sai lầm, thì em đã nghĩ đến chín mươi chín phần trăm là mọi chuyện sẽ ổn thỏa ở mức này rồi.」"

# monologue
# JP: 稀咲の反応を見る限り、\n予想通りの着地点にたどり着けたのだろう。
3251 = "Nhìn phản ứng của Kisaki, có lẽ chúng tôi đã đạt được thỏa thuận đúng như dự tính."

# monologue
# JP: それは喜ばしいことではあるが、\n確認すべきを確認したい。
3490 = "Đó là một điều đáng mừng, nhưng tôi muốn xác nhận lại những gì cần xác nhận."

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲。社長人事についてなのだが」
2545 = "「Kisaki. Về chuyện nhân sự vị trí Giám đốc.」"

# 【稀咲】
# display as 稀咲
# JP: 「出資する以上、後東氏は失敗を許さない。だから、\n小石川女史か、同種のスキルを持った人材になるよね」
2348 = "「Đã bỏ vốn đầu tư thì ông Goto sẽ không chấp nhận thất bại. Thế nên, chắc chắn sẽ là cô Koishikawa hoặc một nhân tài có kỹ năng tương tự.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2139 = "「噢……」" 

# monologue
# JP: 目からウロコが落ちた気がする。
3168 = "Tôi có cảm giác như mình vừa được khai sáng."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。言われてみればそのとおりだな。\nそういう風に無言のうちに――無数の了解があったのか」
2024 = "「Ra là vậy. Nghe em nói mới thấy đúng thật. Hóa ra trong sự im lặng đó――đã có vô số những thỏa thuận ngầm sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。けど、席を立たれたときには正直焦った。\nあのとき、赤井宮司が引き止めてくれていなければ――」
2371 = "「Đúng vậy. Nhưng thú thật là lúc ông ta đứng dậy em đã rất hoảng. Lúc đó, nếu Akai-guji không cản lại thì――」"

# monologue
# JP: 稀咲が動かす視線を追えばその先で、\n赤井宮司は立ち上がっている。
3184 = "Nhìn theo hướng mắt của Kisaki, Akai-guji đang đứng dậy."

# monologue
# JP: 大切そうに、愛おしそうに、運転鞄を抱きしめて。
2935 = "Ông đang ôm chặt chiếc túi phi hành đoàn một cách trân trọng và đầy yêu thương."

# 【赤井】
# display as 赤井
# JP: 「でしたら、よかった。余計な口出しをしてしまったかと、かなり気がかりだったのですが」
2692 = "「Nếu vậy thì tốt quá. Tôi đã rất lo lắng không biết mình có xen vào chuyện bao đồng hay không.」"

# 【稀咲】
# display as 稀咲
# JP: 「余計だなんて。助かりました、ありがとうございます。\n宮司のお声がなかったら、また後日に仕切り直しでした」
2269 = "「Sao lại là bao đồng chứ. Ông đã giúp chúng cháu một việc lớn đấy ạ, cháu cảm ơn ông rất nhiều. Nếu không có lời của ông, thì chúng cháu đã phải hẹn lại ngày khác để bàn bạc lại từ đầu rồi.」"

# 【赤井】
# display as 赤井
# JP: 「そういうものですか。\nお役にたてたのでしたら、とてもよかった」
2409 = "「Là vậy sao. Nếu tôi giúp được gì thì tốt quá rồi.」"

# monologue
# JP: ほっとしたような笑みを浮かべて、\n宮司は静かに頭を下げる。
3078 = "Nở nụ cười nhẹ nhõm, Akai-guji khẽ cúi đầu."

# 【赤井】
# display as 赤井
# JP: 「でしたら、私達も帰ります。\nお話、こみいりますでしょうし」
2706 = "「Nếu vậy, chúng tôi cũng xin phép về đây. Chắc hai cháu còn nhiều chuyện cần bàn bạc.」"

# 【ニイロク】
# display as ？？？
# JP: 「その前に。清春」
2549 = "「Khoan đã. Kiyoharu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
# 2106 = "「啊？！」" 

# 【赤井】
# display as 赤井
# JP: 「どうしました？　ニイロク」
2268 = "「Sao vậy? Niiroku.」"

# monologue
# JP: 運転鞄からの突然の声にも、赤井宮司は動じない。\nニイロクと――鞄に向けて呼びかけて。
3540 = "Dù giọng nói bất ngờ phát ra từ chiếc túi phi hành đoàn, Akai-guji vẫn không hề nao núng. Ông gọi Niiroku――hướng về phía chiếc túi."

# monologue
# JP: まるで待ちわびてでもいたかのように、\n幸せそうに――ああ、本当に幸せそうに微笑んでいる。
3471 = "Trông ông như thể đã mong đợi điều này từ lâu, một nụ cười ngập tràn hạnh phúc――ôi, thực sự là một nụ cười vô cùng hạnh phúc."

# 【ニイロク】
# display as 二六
# JP: 「後東が関わるなら、復線はなる。きっと八ツ城－隈元間。\nかつての、先行電化区間も。その先までも」
2422 = "「Nếu có Goto tham gia, việc khôi phục tuyến đường sẽ thành công. Chắc chắn là đoạn Yatsushiro - Kumamoto. Cả đoạn đường điện khí hóa tiên phong trước đây nữa. Và cả xa hơn thế nữa.」"

# 【赤井】
# display as 赤井
# JP: 「ええ。きっとそうなるでしょう。\n彼は、なにせ商売上手だ」
2393 = "「Ừ. Chắc chắn sẽ là vậy. Dù sao thì cậu ta cũng rất giỏi làm ăn mà.」"

# 【ニイロク】
# display as 二六
# JP: 「だから――。清春。自分を、出して」
2320 = "「Vì vậy――. Kiyoharu. Hãy để tôi ra ngoài.」"

# 【赤井】
# display as 赤井
# JP: 「ええ」
# 2114 = "「嗯」" 

# monologue
# JP: 包帯で顔をぐるぐるにした運転体の\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を、\n赤井宮司が運転鞄からそっと取り出す。
3472 = "Akai-guji nhẹ nhàng lấy từ trong chiếc túi phi hành đoàn ra một \\x%lレイルロオド;#00ffc040;Railord%l;#; kíp lái với khuôn mặt bị quấn băng kín mít."

# monologue
# JP: ニイロクと呼ばれる\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は自立して、\nすぐさましゅるしゅる、顔の包帯を解き始める。
3502 = "\\x%lレイルロオド;#00ffc040;Railord%l;#; có tên là Niiroku tự đứng vững, và ngay lập tức bắt đầu tháo những lớp băng trên mặt mình."

# 【ニイロク】
# display as 二六
# JP: 「自分は、欠陥品の故障品だ。\n\\x%l整備体;#00ffc040;整備体%l;#;をなくし、顔の表情もなくしてしまった」
2316 = "「Tôi là một món hàng lỗi, một kẻ hỏng hóc. Đã đánh mất \\x%l整備体;#00ffc040;thân chính%l;#;, và cũng mất luôn cả biểu cảm trên khuôn mặt.」"

# monologue
# JP: ……確かに、その顔で動いているのは唇だけだ。\n表情は、まるきり凍りついている。
1338 = "......Quả thực, trên khuôn mặt đó chỉ có đôi môi là đang chuyển động. Biểu cảm thì hoàn toàn đông cứng."

# 【ニイロク】
# display as 二六
# JP: 「だけれど、いつか、再び\\x%l電車;#00ffc040;電車%l;#;が走るなら。\n自分はそのとき。走りたい。だから――」
1929 = "「Thế nhưng, nếu một ngày nào đó, \\x%l電車;#00ffc040;tàu điện%l;#; lại chạy. Lúc đó, tôi muốn được chạy. Vì vậy――」"

# monologue
# JP: 不器用に。\nニイロクの頭が下がる。
2919 = "Một cách vụng về. Niiroku cúi đầu xuống."

# monologue
# JP: ほとんど同時に、その何倍も深く、深く、\n赤井宮司が――
3469 = "Gần như cùng lúc đó, Akai-guji cũng cúi gập người xuống sâu, sâu hơn gấp nhiều lần――"

# 【双鉄】
# display as 雙鐵
# JP: 「やめてください、そんな」
1888 = "「Xin hai người đừng làm vậy.」"

# 【赤井】
# display as 赤井
# JP: 「双鉄君。私からもお願いします。というか、私も\n同じく、お願いします。どうか、私とニイロクを」
2732 = "「Soutetsu. Tôi cũng xin nhờ cậu. Hay đúng hơn là, tôi cũng xin nhờ cậu. Xin hãy nhận tôi và Niiroku.」"

# 【双鉄】
# display as 雙鐵
# JP: 「もちろんです。条件面などはポーレットと話して\n頂きますが、運転部長として、お二人を大歓迎します」
2514 = "「Tất nhiên rồi ạ. Về các điều kiện thì ông cứ bàn bạc với Paulette nhé, nhưng với tư cách là Trưởng bộ phận Vận hành, cháu rất hoan nghênh hai người.」"

# 【ニイロク】
# display as 二六
# JP: 「あ」
2090 = "「A.」"

# monologue
# JP: すぐさま顔が持ち上がる。よっぽど不安だったのだろう。\n動かぬ顔から溢れる声に、安堵の気持ちが満ち満ちている。
2918 = "Niiroku lập tức ngẩng mặt lên. Chắc hẳn cô ấy đã rất lo lắng. Giọng nói phát ra từ khuôn mặt bất động tràn ngập sự nhẹ nhõm."

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道はただでさえ人手不足です。優秀な\\x%l運転士;#00ffc040;運転士%l;#;と\n最新鋭の\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の参加を拒むなど、ありませんよ」
2254 = "「Đường sắt Ohito vốn đã thiếu nhân lực rồi. Chúng cháu không có lý do gì để từ chối sự gia nhập của một \\x%l運転士;#00ffc040;nhân viên cơ vụ%l;#; xuất sắc và một \\x%lレイルロオド;#00ffc040;Railord%l;#; tối tân đâu ạ.」"

# 【赤井】
# display as 赤井
# JP: 「でしたら、よかった。では、ポーレットさんに――\nああ、私達が直接言った方がよろしいでしょうか？」
2694 = "「Nếu vậy thì tốt quá. Vậy thì, để chúng tôi đến gặp Paulette―― À, chúng tôi có nên trực tiếp nói chuyện với cô ấy không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いえ。ポーレットは突発事項に強くはありませんので。\n問題なければ、まずは僕から経緯を説明したいかと」
1874 = "「Dạ không. Paulette không giỏi xử lý những việc đột xuất lắm. Nếu không phiền, cháu muốn là người giải thích sự tình trước ạ.」"

# 【赤井】
# display as 赤井
# JP: 「そうですか。でしたらそのように。\nどうか、よろしくお願いします」
2411 = "「Vậy sao. Nếu thế thì làm theo cách đó đi. Trăm sự nhờ cậu nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「承りました」
1892 = "「Cháu nhận lời ạ.」"

# 【ニイロク】
# display as 二六
# JP: 「ありがとう。右田双鉄。\nこれから。どうか。よろしく頼む」
2607 = "「Cảm ơn anh. Migita Soutetsu. Từ giờ trở đi. Xin hãy. Chiếu cố.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ニイロク。こちらこそ。\nハチロクとれいなとも、仲良くしてやってくれ」
2173 = "「Ừ, Niiroku. Tôi cũng mong cô chiếu cố. Hãy hòa đồng với cả Hachiroku và Reina nữa nhé.」"

# 【ニイロク】
# display as 二六
# JP: 「ハチロクは。まだ。わからない。けど」
2730 = "「Hachiroku thì. Tôi chưa. Biết. Nhưng.」"

# monologue
# JP: ああ――なんだ。\n伝わってくるではないか。
3048 = "À――gì chứ. Tôi vẫn cảm nhận được đấy thôi."

# monologue
# JP: 表情がまるで動かなくとも――\nニイロクが、確かに笑っているのだと。
3525 = "Dù cho biểu cảm hoàn toàn bất động―― nhưng chắc chắn là Niiroku đang mỉm cười."

# 【ニイロク】
# display as 二六
# JP: 「れいなとは。もう。仲良くなってる。\n――と、思う」
2305 = "「Với Reina thì. Bọn tôi đã. Thân nhau rồi. ――Tôi. Nghĩ vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。それならなによりだ」
2410 = "「Vậy sao. Thế thì tốt quá rồi.」"

# monologue
# JP: そして、ニイロクと赤井宮司も部屋を出て行く。
2916 = "Sau đó, Niiroku và Akai-guji cũng rời khỏi phòng."

# 【稀咲】
# display as 稀咲
# JP: 「どうぞ？　双鉄」
2110 = "「Xin mời? Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、淹れ直してくれたのか」
2093 = "「À, em pha ấm mới cho anh sao.」"

# monologue
# JP: 舌を焼く程に熱いコーヒーを、\nちびちび、ブラックのままで呑む。
3167 = "Tôi nhâm nhi tách cà phê đen nóng đến mức như muốn bỏng lưỡi."

# monologue
# JP: 人心地が着く。\n途端に、あっ！　と、ようやく気付く。
3207 = "Cảm giác thư thái lan tỏa. Ngay lúc đó, A! Tôi chợt nhận ra."

# 【双鉄】
# display as 雙鐵
# JP: 「浦上さんも、どうぞ座ってください」
2474 = "「Anh Uragami, mời anh ngồi.」"

# 【稀咲】
# display as 稀咲
# JP: 「あああ、ごめん浦上。\n座って、すぐにコーヒーもいれるから」
2102 = "「A, xin lỗi anh Uragami. Anh ngồi đi, em sẽ pha cà phê cho anh ngay đây.」"

# 【浦上】
# display as 浦上
# JP: 「いえ、余計な関与をしないよう、\nひたすらに控えていましたから」
1862 = "「Không sao đâu, tôi chỉ cố gắng giữ im lặng để không can thiệp vào những chuyện thừa thãi thôi.」"

# monologue
# JP: 浦上さんも席につき、稀咲の淹れたコーヒーに、\nミルクと砂糖をたっぷり足して、旨そうに飲む。
3222 = "Anh Uragami cũng ngồi xuống, thêm thật nhiều sữa và đường vào tách cà phê Kisaki vừa pha, rồi uống một cách ngon lành."

# 【浦上】
# display as 浦上
# JP: 「実に鮮やかな交渉でしたね。着地点として、\nあそこ以外にはなかったでしょう」
2521 = "「Quả là một cuộc đàm phán ngoạn mục. Ngoài kết quả đó ra, chắc chắn không còn điểm dừng nào khác nữa.」"

# 【稀咲】
# display as 稀咲
# JP: 「浦上にそう言ってもらえるなら、よかった。\n後東氏が、博打にでることだけが怖かったのだけれど」
2568 = "「Được anh Uragami nói vậy thì em yên tâm rồi. Em chỉ sợ ông Goto sẽ đánh liều một phen thôi.」"

# 【浦上】
# display as 浦上
# JP: 「ありえないかと。帝都ではこの事業案が成立する余地が、\n限りなく小さくなりますから」
2702 = "「Chuyện đó là không thể nào. Khả năng dự án này thành công ở Teito là vô cùng nhỏ bé.」"

# 【稀咲】
# display as 稀咲
# JP: 「うん。そうは思っていたけど、それでも」
2120 = "「Vâng. Em cũng nghĩ vậy, nhưng mà.」"

# monologue
# JP: ……稀咲と浦上さんとの間にはどうやら、\n完全な共通認識があるようだ。
1341 = "......Có vẻ như giữa Kisaki và anh Uragami đã có một sự thấu hiểu hoàn toàn."

# monologue
# JP: が、恥ずかしながら僕にはさっぱり、\n会話の中身が把握できない。
3451 = "Nhưng thật xấu hổ là tôi chẳng hiểu nội dung cuộc trò chuyện của họ chút nào."

# 【双鉄】
# display as 雙鐵
# JP: 「その――『後東氏が出るかもしれない博打』とは、\nいったいどのような内容のものだ？」
2682 = "「Cái――『việc ông Goto có thể đánh liều một phen』, rốt cuộc là chuyện gì vậy?」"

# 【稀咲】
# display as 稀咲
# JP: 「交渉を蹴り、僕達の事業案を丸呑みして、\n彼の地盤で展開する」
2602 = "「Đó là việc ông ta từ chối đàm phán, nuốt trọn dự án của chúng ta, và triển khai nó trên địa bàn của ông ta.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！？　いや――しかし、この事業案も概要は、\n稀咲の手配で、すでにメディアに流れているではないか」
1899 = "「!? Không――nhưng mà, bản tóm tắt dự án này chẳng phải đã được Kisaki sắp xếp để tuồn cho giới truyền thông rồi sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「だからって、現実的に裁判で争うものでもないよね。\nアイディアを丸呑みされても、実際何の文句もいえない」
2020 = "「Dù vậy thì trên thực tế, chúng ta cũng không thể lôi nhau ra tòa được. Kể cả khi bị nẫng tay trên ý tưởng, chúng ta cũng chẳng thể phàn nàn gì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、世評が」
1927 = "「Dù vậy, dư luận sẽ...」"

# 【稀咲】
# display as 稀咲
# JP: 「世評を気にするような人物が、\n強盗だの買い叩きだのの悪名をはせるものかな？」
1915 = "「Một người để tâm đến dư luận thì liệu có mang những tiếng xấu như cướp bóc hay ép giá không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2139 = "「噢……」" 

# monologue
# JP: 僕にはまるで見えてなかったそうしたリスクを、\n稀咲は、最初から織り込んでいた。
3487 = "Những rủi ro mà tôi hoàn toàn không nhìn thấy, Kisaki đã lường trước ngay từ đầu."

# monologue
# JP: 織り込んでいて、席を立たれて――\nそれでもまったく、動じず譲らなかったのか。
3068 = "Lường trước được điều đó, bị đối phương đứng dậy bỏ đi―― Vậy mà em ấy vẫn không hề nao núng hay nhượng bộ sao."

# 【双鉄】
# display as 雙鐵
# JP: 「……席をたたれたあのときに、\n赤井宮司が止めてくれると――」
1415 = "「......Lúc ông ta đứng dậy rời khỏi chỗ ngồi, việc Akai-guji sẽ ngăn lại――」"

# 【稀咲】
# display as 稀咲
# JP: 「可能性はあるかと思ってたけど、\n『それで止まる』とは思ってなかった。正直ね」
2308 = "「Em nghĩ là có khả năng đó, nhưng thú thật, em không nghĩ là 『ông ta sẽ dừng lại vì điều đó』 đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、あのとき、\nあのまま行かれてしまっていたら？」
2715 = "「Vậy nếu lúc đó, ông ta cứ thế mà đi luôn thì sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「十中八九は、浦上がいったとおりの理由で、\n後日に再交渉で、今日の結論に落ち着くと思った」
2018 = "「Mười phần thì tám chín phần, vì lý do mà anh Uragami vừa nói, ông ta sẽ đàm phán lại vào ngày khác, và cuối cùng cũng sẽ đi đến kết luận như hôm nay thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それほどに、この着地点は妥当であるのか」
2658 = "「Điểm dừng này lại hợp lý đến vậy sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「うん。後東氏が帝都で類似事業を成功させたいなら、\nこの着地点が、一番安全確実だから」
2113 = "「Vâng. Nếu ông Goto muốn thực hiện thành công một dự án tương tự ở Teito, thì điểm dừng này là an toàn và chắc chắn nhất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――帝都でいきなりでは、失敗するか」
2519 = "「――Đột ngột triển khai ở Teito thì sẽ thất bại sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「[ねづう,1]禰通氏。[つづみ]鼓氏。\n――後東氏以上がごろごろいるのが、帝都だからね」
2208 = "「Ông Nezu. Ông Tsutsumi. ――Bởi vì ở Teito nhan nhản những kẻ máu mặt hơn cả ông Goto mà.」"

# monologue
# JP: それらの名なら僕も知っている。大廃線にも、\n国策にさえも逆らって、自分の路線を生き延びさせた――
3488 = "Những cái tên đó thì tôi cũng biết. Dù trong thời kỳ đại bãi bỏ các tuyến đường sắt, họ vẫn đi ngược lại quốc sách để duy trì tuyến đường của riêng mình――"

# monologue
# JP: 頭部と臍部の、両会長だ。
2933 = "Hai vị chủ tịch của Tobu và Seibu."

# 【稀咲】
# display as 稀咲
# JP: 「さすがにいきなり帝都は無理さ。比較して\n遥かに条件のいい九洲で、ようやくどうかな案だから」
1841 = "「Đột ngột nhảy vào Teito thì chắc chắn là không thể rồi. Ngay cả ở Kyushu với điều kiện tốt hơn hẳn, phương án này cũng chỉ mới ở mức có thể xem xét thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2114 = "「嗯」" 

# 【稀咲】
# display as 稀咲
# JP: 「つまり後東氏は、九洲をテストケースにできるわけだ。\n九洲での案件を進める間に、電鉄も走り始めるだろうし」
1886 = "「Nói cách khác, ông Goto có thể dùng Kyushu làm phép thử. Trong thời gian tiến hành dự án ở Kyushu, tàu điện cũng sẽ bắt đầu chạy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「成程。そうなれば回復した企業体力と高まった信用に、\n成功、あるいは失敗のノウハウまでもが加わるわけか」
2022 = "「Ra là vậy. Khi đó, không chỉ sức mạnh doanh nghiệp được phục hồi và uy tín được nâng cao, mà còn tích lũy được cả những bí quyết từ thành công hoặc thất bại nữa sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。後東氏としても、当然成功の方がいい。\n成功させて、その情報を、残さず全部手に入れる方が」
2399 = "「Đúng vậy. Đối với ông Goto, tất nhiên thành công vẫn tốt hơn. Thành công rồi thâu tóm toàn bộ thông tin đó mà không bỏ sót bất cứ thứ gì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、情報を全て手に入れられるポジション――\n社長に、事業を成功させ得る人物を送り込むのか」
2325 = "「Vì vậy, vị trí có thể nắm bắt mọi thông tin―― Giám đốc, sẽ được giao cho người có khả năng mang lại thành công cho dự án sao.」"

# monologue
# JP: 全てが、理詰めだ。\n落ち着くように落ち着いたのだと、つくづく感じる。
2889 = "Mọi thứ đều được tính toán logic. Tôi thực sự cảm thấy mọi chuyện đã diễn ra đúng như những gì nó phải diễn ra."

# monologue
# JP: が、一点、\n大きな不安も感じてしまう。
2948 = "Nhưng có một điểm, tôi vẫn cảm thấy vô cùng bất an."

# 【双鉄】
# display as 雙鐵
# JP: 「送り込まれた社長が、後東氏を利するためだけに\n動くようなケースが発生した場合」
2469 = "「Trong trường hợp vị Giám đốc được cử đến đó chỉ hành động vì lợi ích của ông Goto thì sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「解任すればいいだけの話だ。66.7％。2/3以上の株式を\nこちら側で保有するのだからね」
2595 = "「Thì cứ bãi nhiệm là xong. 66.7%. Chúng ta nắm giữ hơn 2/3 cổ phần mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1897 = "「Hừm?」"

# 【浦上】
# display as 浦上
# JP: 「重要な議案に対する拒否権を発動するためには、\n株式の1/3――33.4％以上が必用になるんですよ」
2588 = "「Để phủ quyết một nghị án quan trọng, cần phải có 1/3――tức là hơn 33.4% cổ phần đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あああ」
# 2140 = "「噢」" 

# monologue
# JP: つまり、33.3％の株式しか取得できない後東氏は、\n経営の重大決定に関与できない。
2906 = "Nói cách khác, ông Goto chỉ nắm giữ 33.3% cổ phần, sẽ không thể can thiệp vào các quyết định quan trọng của ban quản trị."

# monologue
# JP: いざ社長解任となったときにも覆せず――\nならば社長は、解任リスクを犯せない。
2892 = "Ngay cả khi Giám đốc bị bãi nhiệm cũng không thể lật ngược tình thế―― Vậy thì vị Giám đốc đó sẽ không dám mạo hiểm để bị bãi nhiệm."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか――その0.1％の争いは、\n経営権を争うような意味をもっていたのか」
2021 = "「Ra là vậy――cuộc tranh giành 0.1% đó, mang ý nghĩa như một cuộc chiến giành quyền quản lý sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。だから――誰もが利益を得るためには、\nここに落ち着くしかなかった、それはわかりきっていた」
2382 = "「Đúng vậy. Thế nên――để tất cả cùng có lợi, thì chỉ còn cách dừng lại ở mức này, điều đó đã quá rõ ràng rồi.」"

# monologue
# JP: 言って、今度は稀咲が、\nゆっくり、ゆっくり、コーヒーを飲む。
3492 = "Nói xong, lần này đến lượt Kisaki, chậm rãi, từ từ thưởng thức tách cà phê."

# monologue
# JP: 実に旨そうに、ゆっくりと。
3070 = "Cô ấy uống thật chậm rãi, trông vô cùng ngon miệng."

# 【稀咲】
# display as 稀咲
# JP: 「わかりきっていても、壊れることもあるのが交渉ごとだ。\nだから、双鉄がボクを信じて、任せてくれて、助かった」
1934 = "「Đàm phán là vậy, dù biết rõ mười mươi nhưng vẫn có thể đổ vỡ. Thế nên, thật may vì Soutetsu đã tin tưởng và giao phó cho em.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、今回は僕というより――\n赤井宮司だろう」
1877 = "「Không, lần này người có công lớn nhất không phải là anh―― mà là Akai-guji mới đúng.」"

# monologue
# JP: 謙遜ではなくつくづく思う。
3486 = "Không phải là khiêm tốn, mà tôi thực sự nghĩ vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司が止めてくれずに、あのまま退出していたら。\n赤井宮司の手前もあって、意固地になられたかもしれん」
2174 = "「Nếu Akai-guji không cản lại mà để ông ta đi luôn. Có khi vì thể diện với Akai-guji, ông ta sẽ trở nên cố chấp cũng nên.」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ、そうか！　見落としてたな。友人？　ライバル？\nそういう関係のようだったものね、ふたりは」
2099 = "「A, đúng rồi! Em quên mất điểm này. Bạn bè? Đối thủ? Quan hệ giữa hai người họ có vẻ là như vậy nhỉ.」"

# 【浦上】
# display as 浦上
# JP: 「そうなってしまった場合、稀咲様のおっしゃる博打に、\n後東氏が打って出られた可能性は、あがったでしょうね」
2659 = "「Nếu chuyện đó xảy ra, thì khả năng ông Goto đánh liều như cô Kisaki nói, chắc chắn sẽ tăng lên đấy.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。そこは危なかった。\n――けどまぁ、本当にいざとなったら」
2403 = "「Đúng vậy. Chỗ đó thật sự rất nguy hiểm. ――Nhưng mà, nếu thực sự đến bước đường cùng.」"

# monologue
# JP: 稀咲が、そこで言葉を止める。\n……しばし、沈黙。
3365 = "Kisaki ngập ngừng. ......Một khoảng lặng ngắn ngủi."

# monologue
# JP: やがてクスクス、浦上さんが、\nこらえきれぬかのような笑いを零す。
3223 = "Lát sau, anh Uragami cười khúc khích, như thể không nhịn được nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2137 = "「Hửm?」"

# 【稀咲】
# display as 稀咲
# JP: 「父さん。もういいよ。\nいいかげん入ってきたらどう？」
2492 = "「Bố. Được rồi đấy. Bố vào đi được chưa?」"

# 【元忠】
# display as ？？？
# JP: 「ああ、うむっ」
2086 = "「À, ừm.」"

# monologue
# JP: 頭取ではなく、父さんと――\n呼ばわる声に応じたように、一番奥の扉が開く。
3319 = "Không phải là Chủ tịch, mà là Bố―― Như để đáp lại tiếng gọi, cánh cửa trong cùng mở ra."

# 【双鉄】
# display as 雙鐵
# JP: 「元忠さん――」
1993 = "「Bác Mototada――」"

# monologue
# JP: いつから、いったいそこにいたのか。\n誰も出入りをしていない――ならばずっとそこにいたのか。
2931 = "Rốt cuộc bác ấy đã ở đó từ lúc nào. Không có ai ra vào cả――vậy là bác ấy đã ở đó từ đầu sao."

# monologue
# JP: あまりのことに驚かされる。\nが、稀咲どころか、浦上さんもまるで驚く顔をみせない。
3001 = "Tôi vô cùng kinh ngạc. Nhưng không chỉ Kisaki, mà cả anh Uragami cũng chẳng tỏ vẻ ngạc nhiên chút nào."

# monologue
# JP: （予想していた……わかっていたのか）
3561 = "（Họ đã lường trước......đã biết trước rồi sao.）"

# 【稀咲】
# display as 稀咲
# JP: 「……父さんはさ。ほら、親バカだから」
1426 = "「......Bố em ấy mà. Anh thấy đấy, ông ấy cưng chiều con gái quá mức mà.」"

# monologue
# JP: 視線での僕の問いに応えて、稀咲が耳打ちしてくれる。\n頭取ではなく、父さんと。
3338 = "Đáp lại ánh mắt dò hỏi của tôi, Kisaki thì thầm vào tai. Không phải Chủ tịch, mà là Bố."

# monologue
# JP: なるほど、ならば――交渉がいざ危うくなれば、\n赤井宮司のおっしゃった、怪獣大戦争を見れていたのか。
3013 = "Ra là vậy, thế thì――nếu cuộc đàm phán rơi vào nguy hiểm, chúng ta đã có thể chứng kiến cuộc đại chiến quái thú như lời Akai-guji nói sao."

# 【元忠】
# display as 元忠
# JP: 「うおっほん！！！」
2076 = "「Khụ khụ!!!」"

# monologue
# JP: 誤魔化すような咳払い。\n元忠さんは、朗々たる声を張り上げる。
2983 = "Một tiếng ho hắng như để lấp liếm. Bác Mototada cất giọng dõng dạc."

# 【元忠】
# display as 元忠
# JP: 「双鉄君の仕事ぶり。\n稀咲を通じて、私も存分に見させてもらった」
2731 = "「Cách làm việc của cháu, Soutetsu. Thông qua Kisaki, ta đã được chứng kiến tường tận rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2091 = "「啊！」" 

# monologue
# JP: いきなり僕か。\n驚かされるが、実に元忠さんらしい。
3383 = "Tự nhiên lại nhắm vào tôi sao. Dù hơi bất ngờ, nhưng đúng là phong cách của bác Mototada."

# 【元忠】
# display as 元忠
# JP: 「『宅地買収の足掛かり』これは、本事業案、\nならびに後東氏の出資で、十分すぎると言えるだろう」
2728 = "「『Bước đệm để thu mua đất ở』, với dự án này, cùng với sự đầu tư của ông Goto, có thể nói là quá đủ rồi.」"

# monologue
# JP: （ああ――）
3558 = "（À――）"

# monologue
# JP: エアクラ工場誘致撤回を決断するには足りていないと、\nそう指摘された要素に再評価が下される。
3245 = "Yếu tố từng bị chỉ trích là chưa đủ để quyết định rút lại việc mời gọi nhà máy Aircra, nay đã được đánh giá lại."

# monologue
# JP: ならば、あるいは、\n"いきなり"ではなく、元忠さんは――
3504 = "Nếu vậy, có lẽ, không phải là \"đột ngột\", mà bác Mototada――"

# 【元忠】
# display as 元忠
# JP: 「湯医線を郷愁の象徴とし、未来への観光列車を走らせる。\n列車詳細は未定のようだが、コンセプトは評価に値する」
2608 = "「Biến tuyến Yui thành biểu tượng của sự hoài niệm, và cho chạy chuyến tàu du lịch hướng tới tương lai. Dù chi tiết về chuyến tàu vẫn chưa được quyết định, nhưng ý tưởng này rất đáng được đánh giá cao.」"

# monologue
# JP: 浦上さんも大きく頷く。\n――じわじわと、全身の血が熱くなる。
3221 = "Anh Uragami cũng gật đầu mạnh. ――Máu trong người tôi đang dần nóng lên."

# 【元忠】
# display as 元忠
# JP: 「上記ふたつにともなって発生する、市民一般の雇用。\nこれは明快にすぎる、"御一夜市民"へのメリットだ」
2154 = "「Đi kèm với hai điều trên là việc làm cho người dân. Đây là một lợi ích quá rõ ràng đối với \"người dân Ohito\".」"

# 【双鉄】
# display as 雙鐵
# JP: 「でしたら――でしたら、元忠さんにも」
2721 = "「Nếu vậy――nếu vậy, bác Mototada cũng...」"

# 【元忠】
# display as 元忠
# JP: 「ああ。約束通りに支援しよう。『未来行き列車計画』を、\nエアクラ工場誘致に代わる、御一夜復興案として」
2121 = "「Ừ. Ta sẽ hỗ trợ như đã hứa. Đưa 『Kế hoạch Tàu Hướng Tới Tương Lai』, trở thành phương án phục hưng Ohito thay thế cho việc mời gọi nhà máy Aircra.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとうございます」
2737 = "「――Cháu cảm ơn bác.」"

# 【元忠】
# display as 元忠
# JP: 「礼には及ばん。そのほうが大きな利益につながると、\n銀行家として、当然の判断をしたまでだ」
1865 = "「Không cần phải cảm ơn. Ta chỉ đưa ra một quyết định hiển nhiên với tư cách là một nhà băng, rằng cách này sẽ mang lại lợi ích lớn hơn thôi.」"

# 【浦上】
# display as 浦上
# JP: 「復線が成るのであれば、[せんだい,1]千内の方がより優れた\n工場立地候補となります。本社にもその報告をあげます」
2177 = "「Nếu tuyến đường được khôi phục, Sendai sẽ trở thành ứng cử viên xuất sắc hơn cho vị trí đặt nhà máy. Tôi cũng sẽ báo cáo như vậy với tổng công ty.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2164 = "「Vâng――」"

# monologue
# JP: 工場誘致を撤回させた――\nそれは確かに喜ばしい成果であるのだけれど。
3144 = "Đã khiến họ rút lại việc mời gọi nhà máy―― Đó chắc chắn là một thành quả đáng mừng, thế nhưng."

# monologue
# JP: （不思議なものだ――目標を達成したそのことよりも、\n何倍も、何十倍も、僕は嬉しく感じている）
3566 = "（Thật kỳ lạ――so với việc đạt được mục tiêu, tôi lại cảm thấy vui sướng gấp nhiều lần, gấp chục lần.）"

# monologue
# JP: ……オール御一夜体制が、ここに、ようやく成立した。
1326 = "......Thể chế Toàn Ohito, cuối cùng cũng đã được thành lập tại đây."

# monologue
# JP: 御一夜を、そして鉄道を、\nならばここから、きっと復興させていけよう。
3124 = "Vậy thì từ đây, chắc chắn chúng ta sẽ có thể phục hưng Ohito, và cả ngành đường sắt nữa."

# 【元忠】
# display as 元忠
# JP: 「ただな、稀咲。会社名だけは、早期に確定するべきだ。\nなにせ出資相手は、『後東急行』と名付ける男だぞ」
1870 = "「Tuy nhiên, Kisaki. Ít nhất tên công ty cũng nên được chốt sớm đi. Dù sao thì đối tác đầu tư cũng là một kẻ đặt tên công ty là 『Tốc hành Goto』 đấy.」"

# 【稀咲】
# display as 稀咲
# JP: 「うん、そうだね。\nそれは――うん。ボクも、重々承知している」
2127 = "「Vâng, đúng vậy ạ. Việc đó――vâng. Con cũng biết rõ mà.」"

# monologue
# JP: 元忠さんに指摘され、稀咲が曖昧な笑みを浮かべる。\n苦笑――というには、どこか、照れも混じったような。
3531 = "Bị bác Mototada nhắc nhở, Kisaki nở một nụ cười gượng gạo. Gọi là cười khổ――nhưng có vẻ pha lẫn chút ngượng ngùng."

# 【稀咲】
# display as 稀咲
# JP: 「案は、あるんだ。ついさっき、ね？\n交渉がまとまって安心したら、ぽんって出てきた」
2000 = "「Em có ý tưởng rồi. Vừa mới nãy thôi. Khi cuộc đàm phán kết thúc và em cảm thấy nhẹ nhõm, nó liền nảy ra trong đầu em.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
# 2656 = "「這樣啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「でも、ボク――その、ネーミングとか、自信ないから。\nだから日々姫に、一度、相談してからと思ってて」
1921 = "「Nhưng mà, em――ờm, em không tự tin lắm về khoản đặt tên. Nên em định bàn bạc với Hibiki một chút trước đã.」"

# 【双鉄】
# display as 雙鐵
# JP: 「もしも良ければ聞かせて欲しい。\n稀咲の案なら、無論、真剣に検討するゆえ」
1943 = "「Nếu được thì cho anh nghe thử đi. Nếu là ý tưởng của Kisaki, thì tất nhiên anh sẽ cân nhắc nghiêm túc.」"

# 【稀咲】
# display as 稀咲
# JP: 「そ、そう？　まぁ、双鉄がそこまで言うなら」
2358 = "「V-vậy sao? Thôi được, nếu Soutetsu đã nói vậy.」"

# monologue
# JP: こほん、と小さく咳払い。\nそして稀咲は、そうっと、つぶやく。
3330 = "Cô ấy khẽ hắng giọng. Sau đó, Kisaki nhẹ nhàng lẩm bẩm."

# 【稀咲】
# display as 稀咲
# JP: 「[ひのもとてつろ,4]日ノ本鉄路」
2354 = "「Hinomoto Tetsuro.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本――鉄路」
2351 = "「Hinomoto――Tetsuro.」"

# monologue
# JP: 聞いた瞬間、理解している。\nこの名前以外、ありえないと。
3410 = "Ngay khi nghe thấy, tôi đã hiểu. Ngoài cái tên này ra, không thể là cái tên nào khác."

# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしい名前だと思う。――素晴らしい名前だ。\n稀咲、本当にありがとう」
2169 = "「Anh nghĩ đó là một cái tên tuyệt vời. ――Một cái tên thật tuyệt vời. Kisaki, thực sự cảm ơn em.」"

# 【稀咲】
# display as 稀咲
# JP: 「そんな――\n別に、お礼をいわれるようなことじゃないよ」
1863 = "「Đâu có―― Đâu phải chuyện đáng để anh phải cảm ơn đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲にとってはそうだとしても――\nありがとう」
2198 = "「Dù với Kisaki là vậy―― Nhưng cảm ơn em.」"

# monologue
# JP: 偶然だとは思えない。
3148 = "Tôi không nghĩ đây là sự trùng hợp ngẫu nhiên."

# monologue
# JP: 仮に偶然――\n稀咲の無意識の働きであるなら、それも嬉しい。
2968 = "Giả sử là trùng hợp―― Nếu đó là do tiềm thức của Kisaki hoạt động, thì tôi cũng rất vui."

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本――鉄路」
2353 = "「Hinomoto――Tetsuro.」"

# monologue
# JP: 線路を守り、安全を守り、線路を伸ばすその会社名に、\n僕と、路子の名前が並ぶ。
3394 = "Trong tên của công ty bảo vệ đường ray, bảo vệ sự an toàn, và mở rộng đường ray đó, có tên của tôi và Michiko kề cạnh nhau."

# monologue
# JP: 繋いでもらった命の、それは、\nひとつの証と、思うから。
3489 = "Tôi nghĩ đó là, một minh chứng cho sinh mệnh mà tôi đã được kết nối."
