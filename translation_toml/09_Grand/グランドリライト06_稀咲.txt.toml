# monologue
# JP: 喉がカラカラに乾いているが、\nコーヒーカップに手も伸ばさずに。
3085 = "就算嗓子都做了，我還是忍住沒有伸手去拿咖啡杯。" 

# 【後東】
# display as 後東
# JP: 「……出資比率はそっちの提案通りでいい。\n代わりに、社長はウチから出す」
1399 = "「……出資比例就照你們的提案辦。作為交換，社長要由我們這邊來選」" 

# 【稀咲】
# display as 稀咲
# JP: 「でしたら、喜んで調印させていただきます」
2241 = "「很高興與您達成共識，合作愉快」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！！？」
2138 = "「嗯？！」" 

# monologue
# JP: 急転直下の即決だ。\n送り込まれてくる社長が誰か、尋ね直しさえせぬままに。
3098 = "形勢急轉直下，當場就敲定了合作。甚至都沒有詢問社長的人選到底是誰。" 

# monologue
# JP: が――それが稀咲の決断ならば、\n僕はもちろん、従うのみだ。
2952 = "但稀咲做了決定，那我當然要尊重她的選擇。" 

# 【後東】
# display as 後東
# JP: 「なら、この条件で手打ちだな。\n正式には、法務を通してからまた連絡するが――」
2696 = "「那就成交了。正式簽約要等法務部準備，到時候再聯繫」" 

# 【稀咲】
# display as 稀咲
# JP: 「これから、ビジネスパートナーとして、\nどうぞよろしくお願いします」
1906 = "「今後我們就是合作伙伴了，請您多指教」" 

# 【後東】
# display as 後東
# JP: 「こっちこそだ」
2603 = "「請多指教」" 

# monologue
# JP: 稀咲と、後東氏。二人が同時に右手を差し出す。\n握手は強く、極めて短い。
3318 = "稀咲和後東先生同時伸出右手，來了一次簡短而有力的握手。" 

# 【後東】
# display as 後東
# JP: 「あんちゃんも、大したタマだ」
1949 = "「你也挺有種啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕、ですか？」
2276 = "「您說我嗎？」" 

# monologue
# JP: 差し出された手を受取り、握手。
3177 = "我握住了後東先生伸過來的手。" 

# monologue
# JP: ……かなり緩んでしまっている手だ。\n元\x%l運転士;#00ffc040;運転士%l;#;の手であるものとは思えない。
1323 = "……他的手掌肌肉都鬆弛了。完全感覺不出他曾經是\\x%l運転士;#00ffc040;駕駛員%l;#;。" 

# 【後東】
# display as 後東
# JP: 「あんちゃんが余計な口出ししてくれりゃあ、\nもーちょっとは儲けられたかもしれんかったんだがよ」
1953 = "「你剛才要是多嘴的話，我也許就能多爭取一點好處了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
2648 = "「這……」" 

# monologue
# JP: 冷や汗が背筋を流れていく。
3181 = "我的後背直冒冷汗。" 

# monologue
# JP: やはり、これはそうした――\n例えるのなら、詰将棋のごときやりとりであったのかと。
3205 = "果然是這樣……他們的對話就像棋局一樣環環相扣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――とても、口出しを出来るとは思いませんでした。\n企業間のやりとりなどでは、僕は完全に素人ですから」
1435 = "「……這不是我能插嘴的事情。對於企業之間的交涉，我完完全全只是個門外漢」" 

# 【後東】
# display as 後東
# JP: 「――ああ。ふん。そうか。\nま、赤井が見込むだけのこたぁあんだろうなぁ」
1408 = "「……哼，這樣啊。不愧是赤井看中了的人」" 

# monologue
# JP: 興味をいきなり失くしたように、僕との握手もさっと終え。\n――けれども後東氏は、赤井宮司には手を差し出さない。
3106 = "後東先生一下子鬆開了我的手，彷彿瞬間對我失去了興趣。但他也沒有對赤井宮司伸出手。" 

# monologue
# JP: どころか視線も宮司ではなく、\nその傍らの、運転鞄に向いている。
3242 = "甚至連視線都沒有朝著赤井宮司，而是看向旁邊的駕駛包。" 

# 【後東】
# display as 後東
# JP: 「……まだ、あのままなのか？」
1437 = "「……還是老樣子嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「ですね。けれど、また笑ってくれる日は来ます」
2372 = "「是啊。但是她一定能再次露出笑容」" 

# 【後東】
# display as 後東
# JP: 「――あんたが言うなら、そうなんだろうな」
1396 = "「……你都這麼說了，那就是這麼回事吧」" 

# monologue
# JP: 言って、後東氏は赤井宮司に背中を向ける。
3113 = "後東先生說完以後就轉過身子，背對赤井宮司。" 

# 【後東】
# display as 後東
# JP: 「そんときが来たら呑もうや。俺らとアレで」
2011 = "「到時候我們倆再帶上這傢伙一起喝幾杯」" 

# 【赤井】
# display as 赤井
# JP: 「君のおごりでしたら、喜んで」
2589 = "「要是你請客的話，那就沒問題」" 

# 【後東】
# display as 後東
# JP: 「はっ！」
2077 = "「哈哈！」" 

# monologue
# JP: 後東氏が笑う。\nただ一息で――けれども、とても晴れ晴れと。
3112 = "後東先生笑了。儘管只是一瞬間，但卻笑得十分爽朗。" 

# 【後東】
# display as 後東
# JP: 「ああ、そんときには祝い酒だ。\nもう勘弁って泣きつくくらいに呑ませてやんよ！」
2171 = "「好啊，到時候慶祝。我可要讓你喝到哭著求饒！」" 

# monologue
# JP: そう言い残し、見送りの申し出を断って、\n後東氏は影のような秘書を引き連れ、部屋を出て行く。
3111 = "後東先生拒絕了我們的送行，留下這句話後，就帶著他如影隨形的秘書離開了。" 

# monologue
# JP: 乱暴な足音が聞こえなくなり――\n途端に稀咲は、ぐったり椅子に崩れてしまう。
3523 = "隨著不修邊幅的腳步聲漸漸消失，稀咲突然癱坐在了椅子上。" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、よかった。ボクが間違えない限り、\n九割九分、ここに落ち着くとは思っていたけど」
2095 = "「啊，太好了。雖然在我預想中９９％會在這一步收尾」" 

# monologue
# JP: 稀咲の反応を見る限り、\n予想通りの着地点にたどり着けたのだろう。
3251 = "看這反應，談判結果應該控制在預想範圍內了。" 

# monologue
# JP: それは喜ばしいことではあるが、\n確認すべきを確認したい。
3490 = "這是件值得慶祝的好事，但我還有一個問題想弄明白。" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲。社長人事についてなのだが」
2545 = "「稀咲，社長的人選怎麼辦」" 

# 【稀咲】
# display as 稀咲
# JP: 「出資する以上、後東氏は失敗を許さない。だから、\n小石川女史か、同種のスキルを持った人材になるよね」
2348 = "「既然後東先生出資了，他就不會允許失敗。所以會派小石川女士，或者擁有相同技能的人才來當社長吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2139 = "「噢……」" 

# monologue
# JP: 目からウロコが落ちた気がする。
3168 = "我恍然大悟。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。言われてみればそのとおりだな。\nそういう風に無言のうちに――無数の了解があったのか」
2024 = "「原來如此，這麼一說確實是這個道理。看來一切盡在不言中啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。けど、席を立たれたときには正直焦った。\nあのとき、赤井宮司が引き止めてくれていなければ――」
2371 = "「是啊。不過他起身要走的時候，我其實很著急。如果赤井宮司那時候沒有攔住他……」" 

# monologue
# JP: 稀咲が動かす視線を追えばその先で、\n赤井宮司は立ち上がっている。
3184 = "我順著稀咲的視線看過去，赤井宮司已經站起了身。" 

# monologue
# JP: 大切そうに、愛おしそうに、運転鞄を抱きしめて。
2935 = "他抱緊了旁邊的駕駛包，那神情就如懷抱著至寶一般。" 

# 【赤井】
# display as 赤井
# JP: 「でしたら、よかった。余計な口出しをしてしまったかと、かなり気がかりだったのですが」
2692 = "「那就好。我還怕自己是不是多管閒事了」" 

# 【稀咲】
# display as 稀咲
# JP: 「余計だなんて。助かりました、ありがとうございます。\n宮司のお声がなかったら、また後日に仕切り直しでした」
2269 = "「怎麼會呢，幫我們大忙了，真是非常感謝。如果不是您出聲幫忙，談判又要留到之後再決勝負了」" 

# 【赤井】
# display as 赤井
# JP: 「そういうものですか。\nお役にたてたのでしたら、とてもよかった」
2409 = "「是嗎，能幫上你們就好」" 

# monologue
# JP: ほっとしたような笑みを浮かべて、\n宮司は静かに頭を下げる。
3078 = "宮司露出放心的笑容，靜靜地鞠了一躬" 

# 【赤井】
# display as 赤井
# JP: 「でしたら、私達も帰ります。\nお話、こみいりますでしょうし」
2706 = "「那我們就回去了。你們還有很複雜的事情要談吧」" 

# 【ニイロク】
# display as ？？？
# JP: 「その前に。清春」
2549 = "「等等，清春」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
# 2106 = "「啊？！」" 

# 【赤井】
# display as 赤井
# JP: 「どうしました？　ニイロク」
2268 = "「怎麼了？二六」" 

# monologue
# JP: 運転鞄からの突然の声にも、赤井宮司は動じない。\nニイロクと――鞄に向けて呼びかけて。
3540 = "駕駛包突然發出聲音，赤井宮司卻完全不感到驚訝。而且……他把駕駛包稱作“二六”。" 

# monologue
# JP: まるで待ちわびてでもいたかのように、\n幸せそうに――ああ、本当に幸せそうに微笑んでいる。
3471 = "赤井宮司彷彿等待這一刻已經很久了，露出了極為幸福的微笑。" 

# 【ニイロク】
# display as 二六
# JP: 「後東が関わるなら、復線はなる。きっと八ツ城－隈元間。\nかつての、先行電化区間も。その先までも」
2422 = "「有了後東參與，就能恢復廢線。無論是八代到隈元段，還是曾經先行電氣化的路段，以及其他線路，都一定能恢復」" 

# 【赤井】
# display as 赤井
# JP: 「ええ。きっとそうなるでしょう。\n彼は、なにせ商売上手だ」
2393 = "「是啊，一定會成功的。他很會做生意嘛」" 

# 【ニイロク】
# display as 二六
# JP: 「だから――。清春。自分を、出して」
2320 = "「所以……清春，把我，放出來」" 

# 【赤井】
# display as 赤井
# JP: 「ええ」
# 2114 = "「嗯」" 

# monologue
# JP: 包帯で顔をぐるぐるにした運転体の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を、\n赤井宮司が運転鞄からそっと取り出す。
3472 = "赤井宮司從駕駛包裡小心翼翼地拿出一個駕駛體\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，她的臉上還纏著一圈圈的繃帶。" 

# monologue
# JP: ニイロクと呼ばれる\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は自立して、\nすぐさましゅるしゅる、顔の包帯を解き始める。
3502 = "那個叫二六的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;自己站了起來，然後開始解開自己臉上的繃帶。" 

# 【ニイロク】
# display as 二六
# JP: 「自分は、欠陥品の故障品だ。\n\x%l整備体;#00ffc040;整備体%l;#;をなくし、顔の表情もなくしてしまった」
2316 = "「我，是個出了故障的瑕疵品。失去了\\x%l整備体;#00ffc040;整備體%l;#;，也失去了控制表情的能力」" 

# monologue
# JP: ……確かに、その顔で動いているのは唇だけだ。\n表情は、まるきり凍りついている。
1338 = "……確實，她的臉上只有嘴唇在動。表情如被凍結一般不帶絲毫感情。" 

# 【ニイロク】
# display as 二六
# JP: 「だけれど、いつか、再び\x%l電車;#00ffc040;電車%l;#;が走るなら。\n自分はそのとき。走りたい。だから――」
1929 = "「但是，如果\\x%l電車;#00ffc040;電車%l;#;能恢復，我也想要……再次奔跑在鐵路上，所以……」" 

# monologue
# JP: 不器用に。\nニイロクの頭が下がる。
2919 = "二六笨拙地鞠了一躬。" 

# monologue
# JP: ほとんど同時に、その何倍も深く、深く、\n赤井宮司が――
3469 = "赤井宮司也同時深深鞠躬，顯得無比誠懇。" 

# 【双鉄】
# display as 雙鐵
# JP: 「やめてください、そんな」
1888 = "「二位別這樣」" 

# 【赤井】
# display as 赤井
# JP: 「双鉄君。私からもお願いします。というか、私も\n同じく、お願いします。どうか、私とニイロクを」
2732 = "「雙鐵先生，我也要拜託你。應該說我也一樣，請僱傭我和二六吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もちろんです。条件面などはポーレットと話して\n頂きますが、運転部長として、お二人を大歓迎します」
2514 = "「當然沒問題。待遇方面還要跟波萊特商量一下，但我作為運營部長，非常歡迎二位的加入」" 

# 【ニイロク】
# display as 二六
# JP: 「あ」
2090 = "「啊」" 

# monologue
# JP: すぐさま顔が持ち上がる。よっぽど不安だったのだろう。\n動かぬ顔から溢れる声に、安堵の気持ちが満ち満ちている。
2918 = "二六立刻抬起了頭，看來她很擔心我會拒絕吧。她的表情沒有任何變化，但聲音中能感覺到她放下了心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道はただでさえ人手不足です。優秀な\x%l運転士;#00ffc040;運転士%l;#;と\n最新鋭の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の参加を拒むなど、ありませんよ」
2254 = "「御一夜鐵路本來就很缺人手。像你們這麼優秀的\\x%l運転士;#00ffc040;駕駛員%l;#;和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，於我們而言自然是求之不得，又豈有拒絕的理由」" 

# 【赤井】
# display as 赤井
# JP: 「でしたら、よかった。では、ポーレットさんに――\nああ、私達が直接言った方がよろしいでしょうか？」
2694 = "「那就好。那我們就去找波萊特小姐——對了，我們直接去找她可以嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いえ。ポーレットは突発事項に強くはありませんので。\n問題なければ、まずは僕から経緯を説明したいかと」
1874 = "「不，波萊特不太擅長應對突發事件。你們不介意的話，就讓我先去說明事情經過吧」" 

# 【赤井】
# display as 赤井
# JP: 「そうですか。でしたらそのように。\nどうか、よろしくお願いします」
2411 = "「是嗎，那就這麼辦吧。請你多關照」" 

# 【双鉄】
# display as 雙鐵
# JP: 「承りました」
1892 = "「交給我吧」" 

# 【ニイロク】
# display as 二六
# JP: 「ありがとう。右田双鉄。\nこれから。どうか。よろしく頼む」
2607 = "「謝謝你，右田雙鐵。今後，請多指教」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ニイロク。こちらこそ。\nハチロクとれいなとも、仲良くしてやってくれ」
2173 = "「好的，二六。我才應該請你指教。請和八六、玲奈好好相處吧」" 

# 【ニイロク】
# display as 二六
# JP: 「ハチロクは。まだ。わからない。けど」
2730 = "「雖然，我和，八六，還不認識」" 

# monologue
# JP: ああ――なんだ。\n伝わってくるではないか。
3048 = "喔，這不是能傳達過來嗎。" 

# monologue
# JP: 表情がまるで動かなくとも――\nニイロクが、確かに笑っているのだと。
3525 = "雖然她的表情沒有絲毫變化——但我毫無疑問地感受到了她的笑意。" 

# 【ニイロク】
# display as 二六
# JP: 「れいなとは。もう。仲良くなってる。\n――と、思う」
2305 = "「我和玲奈，已經，相處很融洽了。——我是，這麼認為的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。それならなによりだ」
2410 = "「是嗎，那可太好了」" 

# monologue
# JP: そして、ニイロクと赤井宮司も部屋を出て行く。
2916 = "二六和赤井宮司隨後一起離開了房間。" 

# 【稀咲】
# display as 稀咲
# JP: 「どうぞ？　双鉄」
2110 = "「喝吧，雙鐵」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、淹れ直してくれたのか」
2093 = "「啊，你還重新泡了一壺啊」" 

# monologue
# JP: 舌を焼く程に熱いコーヒーを、\nちびちび、ブラックのままで呑む。
3167 = "我小口嘬著滾燙的黑咖啡，舌尖傳來了咖啡純粹的風味。" 

# monologue
# JP: 人心地が着く。\n途端に、あっ！　と、ようやく気付く。
3207 = "正當我身心都徹底放鬆下來時，突然又意識到一件事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「浦上さんも、どうぞ座ってください」
2474 = "「浦上經理，你也請坐吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「あああ、ごめん浦上。\n座って、すぐにコーヒーもいれるから」
2102 = "「啊，抱歉，浦上。坐吧，我馬上給你倒杯咖啡」" 

# 【浦上】
# display as 浦上
# JP: 「いえ、余計な関与をしないよう、\nひたすらに控えていましたから」
1862 = "「不用在意，是我在控制自己不打擾到你們」" 

# monologue
# JP: 浦上さんも席につき、稀咲の淹れたコーヒーに、\nミルクと砂糖をたっぷり足して、旨そうに飲む。
3222 = "浦上經理坐了下來，往稀咲倒的咖啡裡加了很多牛奶和方糖，一臉享受地喝了起來。" 

# 【浦上】
# display as 浦上
# JP: 「実に鮮やかな交渉でしたね。着地点として、\nあそこ以外にはなかったでしょう」
2521 = "「真是場精彩的談判，最後的收尾沒有給對方選擇的餘地啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「浦上にそう言ってもらえるなら、よかった。\n後東氏が、博打にでることだけが怖かったのだけれど」
2568 = "「聽你這麼說我就放心了。我就怕後東先生決定賭一把」" 

# 【浦上】
# display as 浦上
# JP: 「ありえないかと。帝都ではこの事業案が成立する余地が、\n限りなく小さくなりますから」
2702 = "「那怎麼可能。要在帝都實施這個企劃案，成功率微乎其微」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん。そうは思っていたけど、それでも」
2120 = "「嗯，我也明白，但還是擔心」" 

# monologue
# JP: ……稀咲と浦上さんとの間にはどうやら、\n完全な共通認識があるようだ。
1341 = "……稀咲和浦上經理似乎完全達成了共識。" 

# monologue
# JP: が、恥ずかしながら僕にはさっぱり、\n会話の中身が把握できない。
3451 = "說來慚愧，我完全聽不懂她們在說什麼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その――『後東氏が出るかもしれない博打』とは、\nいったいどのような内容のものだ？」
2682 = "「那個……你們說後東先生可能會賭一把，具體是什麼意思？」" 

# 【稀咲】
# display as 稀咲
# JP: 「交渉を蹴り、僕達の事業案を丸呑みして、\n彼の地盤で展開する」
2602 = "「談判破裂，然後照抄我們的企劃案，在他的地盤上實施」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！？　いや――しかし、この事業案も概要は、\n稀咲の手配で、すでにメディアに流れているではないか」
1899 = "「什麼？！不對……我們的企劃案概要，已經在稀咲的安排下放出來了不是嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「だからって、現実的に裁判で争うものでもないよね。\nアイディアを丸呑みされても、実際何の文句もいえない」
2020 = "「即使這樣，在法庭上也沒有任何幫助。就算創意被抄襲了，我們也無計可施」" 

# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、世評が」
1927 = "「但是會有輿論壓力啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「世評を気にするような人物が、\n強盗だの買い叩きだのの悪名をはせるものかな？」
1915 = "「他要是在意輿論，還會讓自己背上強盜、壓價之類的惡名嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2139 = "「噢……」" 

# monologue
# JP: 僕にはまるで見えてなかったそうしたリスクを、\n稀咲は、最初から織り込んでいた。
3487 = "這些我完全沒有發現的風險，卻從一開始就都在稀咲的計算之內了。" 

# monologue
# JP: 織り込んでいて、席を立たれて――\nそれでもまったく、動じず譲らなかったのか。
3068 = "她知道其中的風險，哪怕後東先生起身離開，她還是依然不為所動，毫不退讓。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……席をたたれたあのときに、\n赤井宮司が止めてくれると――」
1415 = "「……如果在他起身要走的時候，沒有赤井宮司出聲阻止的話——」" 

# 【稀咲】
# display as 稀咲
# JP: 「可能性はあるかと思ってたけど、\n『それで止まる』とは思ってなかった。正直ね」
2308 = "「我想過這種可能性，但是說實話，我沒想到後東先生真的會聽話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、あのとき、\nあのまま行かれてしまっていたら？」
2715 = "「那要是他真的走了呢？」" 

# 【稀咲】
# display as 稀咲
# JP: 「十中八九は、浦上がいったとおりの理由で、\n後日に再交渉で、今日の結論に落ち着くと思った」
2018 = "「十有八九會像浦上剛才說的那樣，日後再次談判，然後達成和今天一樣的結果」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それほどに、この着地点は妥当であるのか」
2658 = "「這次的結果就這麼穩妥嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん。後東氏が帝都で類似事業を成功させたいなら、\nこの着地点が、一番安全確実だから」
2113 = "「嗯。如果後東先生想在帝都辦成類似的企劃，這樣收尾是最安全可靠的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――帝都でいきなりでは、失敗するか」
2519 = "「直接在帝都辦就會失敗嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「[ねづう,1]禰通氏。[つづみ]鼓氏。\n――後東氏以上がごろごろいるのが、帝都だからね」
2208 = "「帝都還有祢通先生、鼓先生。那裡比後東先生勢力更大的人物數不勝數」" 

# monologue
# JP: それらの名なら僕も知っている。大廃線にも、\n国策にさえも逆らって、自分の路線を生き延びさせた――
3488 = "這兩個名號連我都知道。他們甚至不惜違逆大廢線的國策，也要讓自己的線路延續下來。" 

# monologue
# JP: 頭部と臍部の、両会長だ。
2933 = "他們就是東武和西武的兩位會長。" 

# 【稀咲】
# display as 稀咲
# JP: 「さすがにいきなり帝都は無理さ。比較して\n遥かに条件のいい九洲で、ようやくどうかな案だから」
1841 = "「一上來就在帝都實施肯定行不通。而相較之下條件遠遠好得多的九州，終於提出了一個不錯的方案」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2114 = "「嗯」" 

# 【稀咲】
# display as 稀咲
# JP: 「つまり後東氏は、九洲をテストケースにできるわけだ。\n九洲での案件を進める間に、電鉄も走り始めるだろうし」
1886 = "「也就是說，後東先生可以把九州作為測試用例。九州的計劃推進期間，電鐵也能開始運營了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「成程。そうなれば回復した企業体力と高まった信用に、\n成功、あるいは失敗のノウハウまでもが加わるわけか」
2022 = "「原來如此。這樣一來企業就恢復了元氣，信譽節節攀升，還從我們的成功，又或著是失敗中獲得了經驗教訓」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。後東氏としても、当然成功の方がいい。\n成功させて、その情報を、残さず全部手に入れる方が」
2399 = "「是啊，對他而言，當然也是讓企劃成功更有好處。成功之後，再將情報全部納入自己手中」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、情報を全て手に入れられるポジション――\n社長に、事業を成功させ得る人物を送り込むのか」
2325 = "「所以他需要能夠獲取所有情報的職位——社長，得派來一個能讓事業成功的人物」" 

# monologue
# JP: 全てが、理詰めだ。\n落ち着くように落ち着いたのだと、つくづく感じる。
2889 = "一切都符合邏輯。我深切感受到事情的結果其實都已經注定。" 

# monologue
# JP: が、一点、\n大きな不安も感じてしまう。
2948 = "但我還是有一件很擔心的事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「送り込まれた社長が、後東氏を利するためだけに\n動くようなケースが発生した場合」
2469 = "「派來的社長要是只顧後東先生的利益，那怎麼辦呢？」" 

# 【稀咲】
# display as 稀咲
# JP: 「解任すればいいだけの話だ。66.7％。2/3以上の株式を\nこちら側で保有するのだからね」
2595 = "「解僱就行了。畢竟我們這邊有６６．７％的股份，占了三分之二以上」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1897 = "「什麼？」" 

# 【浦上】
# display as 浦上
# JP: 「重要な議案に対する拒否権を発動するためには、\n株式の1/3――33.4％以上が必用になるんですよ」
2588 = "「要想對重要議案行使否定權，需要持有三分之一以上，也就是超過３３．４％的股份」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あああ」
# 2140 = "「噢」" 

# monologue
# JP: つまり、33.3％の株式しか取得できない後東氏は、\n経営の重大決定に関与できない。
2906 = "也就是說，只能取得３３．３％股份的後東先生，無法對經營上的重要決定插手。" 

# monologue
# JP: いざ社長解任となったときにも覆せず――\nならば社長は、解任リスクを犯せない。
2892 = "一旦演變成解僱社長的情況，就無法挽回了。所以社長不會冒著被解僱的風險胡作非為。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか――その0.1％の争いは、\n経営権を争うような意味をもっていたのか」
2021 = "「原來如此……爭奪那０．１％的股份，就是爭奪經營權啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。だから――誰もが利益を得るためには、\nここに落ち着くしかなかった、それはわかりきっていた」
2382 = "「是啊。所以為了雙方都能獲得利益，最後只能這樣收尾。我就是想明白了這一點」" 

# monologue
# JP: 言って、今度は稀咲が、\nゆっくり、ゆっくり、コーヒーを飲む。
3492 = "這次稀咲說完之後，氣定神閒地品嘗起了咖啡。" 

# monologue
# JP: 実に旨そうに、ゆっくりと。
3070 = "她細細品味著咖啡的風味，彷彿十分享受。" 

# 【稀咲】
# display as 稀咲
# JP: 「わかりきっていても、壊れることもあるのが交渉ごとだ。\nだから、双鉄がボクを信じて、任せてくれて、助かった」
1934 = "「但談判就是這樣，就算想明白了，依然有可能會失敗。所以還是要感謝你，願意相信我，把事情交給我辦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、今回は僕というより――\n赤井宮司だろう」
1877 = "「不，這次的功勞不在我，而在赤井宮司身上吧」" 

# monologue
# JP: 謙遜ではなくつくづく思う。
3486 = "這不是謙虛，是我的真心話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司が止めてくれずに、あのまま退出していたら。\n赤井宮司の手前もあって、意固地になられたかもしれん」
2174 = "「如果他沒有阻止，讓後東先生離開了。後東先生可能會顧及面子，變得意氣用事」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、そうか！　見落としてたな。友人？　ライバル？\nそういう関係のようだったものね、ふたりは」
2099 = "「啊，對了！　這我倒是沒有算到。他們是朋友？還是對手？他們的關係很複雜吧」" 

# 【浦上】
# display as 浦上
# JP: 「そうなってしまった場合、稀咲様のおっしゃる博打に、\n後東氏が打って出られた可能性は、あがったでしょうね」
2659 = "「這種情況下，後東先生孤注一擲的可能性就上升了」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。そこは危なかった。\n――けどまぁ、本当にいざとなったら」
2403 = "「是啊，真是好險……不過，如果真有了這個萬一的話」" 

# monologue
# JP: 稀咲が、そこで言葉を止める。\n……しばし、沈黙。
3365 = "稀咲話說到一半就停住了，陷入短暫的沉默。" 

# monologue
# JP: やがてクスクス、浦上さんが、\nこらえきれぬかのような笑いを零す。
3223 = "浦上經理彷彿憋不住了，輕聲笑了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2137 = "「嗯？」" 

# 【稀咲】
# display as 稀咲
# JP: 「父さん。もういいよ。\nいいかげん入ってきたらどう？」
2492 = "「爸爸，可以了，你也該進來了吧？」" 

# 【元忠】
# display as ？？？
# JP: 「ああ、うむっ」
2086 = "「哦，好」" 

# monologue
# JP: 頭取ではなく、父さんと――\n呼ばわる声に応じたように、一番奥の扉が開く。
3319 = "稀咲喊的不是行長，而是爸爸——最裡面的門隨著話語聲打開了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「元忠さん――」
1993 = "「元忠先生」" 

# monologue
# JP: いつから、いったいそこにいたのか。\n誰も出入りをしていない――ならばずっとそこにいたのか。
2931 = "他什麼時候進來的？房間內根本沒有人進出，那麼他一開始就在房間裡嗎？" 

# monologue
# JP: あまりのことに驚かされる。\nが、稀咲どころか、浦上さんもまるで驚く顔をみせない。
3001 = "出乎意料的狀況讓我大為吃驚。但稀咲和浦上經理卻一點也不驚訝。" 

# monologue
# JP: （予想していた……わかっていたのか）
3561 = "（是早就預料到了……還是說打一開始就知道了嗎）" 

# 【稀咲】
# display as 稀咲
# JP: 「……父さんはさ。ほら、親バカだから」
1426 = "「……我爸爸呀，很愛操心嘛」" 

# monologue
# JP: 視線での僕の問いに応えて、稀咲が耳打ちしてくれる。\n頭取ではなく、父さんと。
3338 = "稀咲用目光回答我的疑問，在我耳邊輕聲說道。用的稱呼不是行長，而是爸爸。" 

# monologue
# JP: なるほど、ならば――交渉がいざ危うくなれば、\n赤井宮司のおっしゃった、怪獣大戦争を見れていたのか。
3013 = "原來如此……如果談判真的瀕臨破裂，就能看到赤井宮司所說的怪獸大戰了啊。" 

# 【元忠】
# display as 元忠
# JP: 「うおっほん！！！」
2076 = "「咳咳！！！」" 

# monologue
# JP: 誤魔化すような咳払い。\n元忠さんは、朗々たる声を張り上げる。
2983 = "元忠先生咳嗽了兩聲想要糊弄過去，接著用渾厚的嗓音說道。" 

# 【元忠】
# display as 元忠
# JP: 「双鉄君の仕事ぶり。\n稀咲を通じて、私も存分に見させてもらった」
2731 = "「雙鐵你工作時的狀態，我通過稀咲仔細觀察過了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2091 = "「啊！」" 

# monologue
# JP: いきなり僕か。\n驚かされるが、実に元忠さんらしい。
3383 = "突然就談到我了，雖然很吃驚，但確實很符合元忠先生的個性。" 

# 【元忠】
# display as 元忠
# JP: 「『宅地買収の足掛かり』これは、本事業案、\nならびに後東氏の出資で、十分すぎると言えるだろう」
2728 = "「關於“住宅用地收購的立足點”，有了這次項目的方案，再加上後東先生的出資，可以說是綽綽有餘了吧」" 

# monologue
# JP: （ああ――）
3558 = "（啊……）" 

# monologue
# JP: エアクラ工場誘致撤回を決断するには足りていないと、\nそう指摘された要素に再評価が下される。
3245 = "當初元忠先生認為我們的方案不足以決定撤回引進空凝機工廠，現在他對之前的欠缺再次給予了評價。" 

# monologue
# JP: ならば、あるいは、\n"いきなり"ではなく、元忠さんは――
3504 = "那麼元忠先生提到這件事其實一點也不突然。" 

# 【元忠】
# display as 元忠
# JP: 「湯医線を郷愁の象徴とし、未来への観光列車を走らせる。\n列車詳細は未定のようだが、コンセプトは評価に値する」
2608 = "「讓湯醫線成為鄉愁的象徵，讓觀光列車駛向未來。就算具體內容還沒決定，概念也值得一個很高的評價」" 

# monologue
# JP: 浦上さんも大きく頷く。\n――じわじわと、全身の血が熱くなる。
3221 = "浦上經理也用力點了點頭。我全身漸漸變得熱血沸騰。" 

# 【元忠】
# display as 元忠
# JP: 「上記ふたつにともなって発生する、市民一般の雇用。\nこれは明快にすぎる、"御一夜市民"へのメリットだ」
2154 = "「在這兩件事的實施中，也會僱傭普通市民。這就是對御一夜市民顯而易見的好處」" 

# 【双鉄】
# display as 雙鐵
# JP: 「でしたら――でしたら、元忠さんにも」
2721 = "「那麼，元忠先生您也……」" 

# 【元忠】
# display as 元忠
# JP: 「ああ。約束通りに支援しよう。『未来行き列車計画』を、\nエアクラ工場誘致に代わる、御一夜復興案として」
2121 = "「嗯，按照約定，我會幫助你們。讓“發往未來列車計劃”替代空凝機工廠的引進，成為新的御一夜復興計劃」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとうございます」
2737 = "「非常感謝」" 

# 【元忠】
# display as 元忠
# JP: 「礼には及ばん。そのほうが大きな利益につながると、\n銀行家として、当然の判断をしたまでだ」
1865 = "「不用道謝。這樣做能獲得更大的利益，我只是作為銀行家做了合理的判斷」" 

# 【浦上】
# display as 浦上
# JP: 「復線が成るのであれば、[せんだい,1]千内の方がより優れた\n工場立地候補となります。本社にもその報告をあげます」
2177 = "「如果廢線真的能恢復，川內就會成為更加優秀的工廠選址。我會這樣匯報給總公司的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2164 = "「好」" 

# monologue
# JP: 工場誘致を撤回させた――\nそれは確かに喜ばしい成果であるのだけれど。
3144 = "成功讓他們撤回了引進工廠的決定……這的確是件值得高興的喜事。" 

# monologue
# JP: （不思議なものだ――目標を達成したそのことよりも、\n何倍も、何十倍も、僕は嬉しく感じている）
3566 = "（真是不可思議……我感受到的喜悅，比單純的達成目標還要強烈數十倍）" 

# monologue
# JP: ……オール御一夜体制が、ここに、ようやく成立した。
1326 = "……全御一夜體制在此刻終於成型了。" 

# monologue
# JP: 御一夜を、そして鉄道を、\nならばここから、きっと復興させていけよう。
3124 = "御一夜和鐵路，今後也一定會走向復興。" 

# 【元忠】
# display as 元忠
# JP: 「ただな、稀咲。会社名だけは、早期に確定するべきだ。\nなにせ出資相手は、『後東急行』と名付ける男だぞ」
1870 = "「不過啊，稀咲。公司名稱還是應該在早期決定。畢竟對方可是個會給公司起名為“後東急”的人」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん、そうだね。\nそれは――うん。ボクも、重々承知している」
2127 = "「嗯，是啊。這個問題我很明白」" 

# monologue
# JP: 元忠さんに指摘され、稀咲が曖昧な笑みを浮かべる。\n苦笑――というには、どこか、照れも混じったような。
3531 = "面對元忠先生指出的問題，稀咲露出了五味雜陳的笑容。苦笑中似乎還夾雜著幾分羞澀。" 

# 【稀咲】
# display as 稀咲
# JP: 「案は、あるんだ。ついさっき、ね？\n交渉がまとまって安心したら、ぽんって出てきた」
2000 = "「其實我有個主意。剛才談判結束的時候，我一放心下來，腦子裡就閃過一個靈感」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
# 2656 = "「這樣啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「でも、ボク――その、ネーミングとか、自信ないから。\nだから日々姫に、一度、相談してからと思ってて」
1921 = "「但是……我對自己的起名品味沒有自信。所以想找日日姬商量一下」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もしも良ければ聞かせて欲しい。\n稀咲の案なら、無論、真剣に検討するゆえ」
1943 = "「你不介意的話，就說給我聽聽吧。既然是你想的方案，肯定是經過深思熟慮的」" 

# 【稀咲】
# display as 稀咲
# JP: 「そ、そう？　まぁ、双鉄がそこまで言うなら」
2358 = "「是、是嗎？好吧，既然你都說到這份上了」" 

# monologue
# JP: こほん、と小さく咳払い。\nそして稀咲は、そうっと、つぶやく。
3330 = "稀咲清了清嗓子，然後輕聲說道。" 

# 【稀咲】
# display as 稀咲
# JP: 「[ひのもとてつろ,4]日ノ本鉄路」
2354 = "「日本鐵路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本――鉄路」
2351 = "「日本……鐵路」" 

# monologue
# JP: 聞いた瞬間、理解している。\nこの名前以外、ありえないと。
3410 = "聽到之後我馬上就明白了，這個名字就是唯一的選擇。" 

# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしい名前だと思う。――素晴らしい名前だ。\n稀咲、本当にありがとう」
2169 = "「好名字……真是個好名字。稀咲，太感謝你了」" 

# 【稀咲】
# display as 稀咲
# JP: 「そんな――\n別に、お礼をいわれるようなことじゃないよ」
1863 = "「不用謝，舉手之勞而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲にとってはそうだとしても――\nありがとう」
2198 = "「就算對你來說只是舉手之勞，我還是要感謝你」" 

# monologue
# JP: 偶然だとは思えない。
3148 = "我不覺得這是個偶然。" 

# monologue
# JP: 仮に偶然――\n稀咲の無意識の働きであるなら、それも嬉しい。
2968 = "假如真的是偶然……只是稀咲在無意中想出的名字，我一樣感到很高興。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本――鉄路」
2353 = "「日本鐵路……」" 

# monologue
# JP: 線路を守り、安全を守り、線路を伸ばすその会社名に、\n僕と、路子の名前が並ぶ。
3394 = "給守護線路與安全，延伸線路的公司，冠上我與路子的名字。" 

# monologue
# JP: 繋いでもらった命の、それは、\nひとつの証と、思うから。
3489 = "這應當會為由她救下的這條命，留下不可磨滅的印記。" 
