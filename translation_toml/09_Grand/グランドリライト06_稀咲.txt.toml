# lines: 609 
# 【双鉄】
# display as 雙鐵
# JP: 「…………ぅ……ぁ」
1409 = "「……唔……啊」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　おめざめになられたのですか」
2733 = "「雙鐵少爺，您醒了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「う、む」
2111 = "「嗯……」" 

# monologue
# JP: 夢を、見ていたような気がする。\n路子の夢を。列車の夢を。
3140 = "感覺自己好像做了個夢。一個有關路子，有關列車的夢。" 

# monologue
# JP: 弱音を路子にこぼしてしまい\n困った顔をさせてしまった……そんな気がする。
3155 = "我似乎在夢中對路子吐露了一番喪氣話，讓她感到為難了。" 

# 【ハチロク】
# display as 八六
# JP: 「お顔、少し曇ってらっしゃるようですが」
2275 = "「您的臉色有點難看」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2369 = "「是啊……」" 

# monologue
# JP: けれども夢の――見たともつかぬ夢の名残は、\nあっという間に消えていく。
2956 = "但這捉摸不透的夢境餘韻很快就消散了。" 

# monologue
# JP: 残るのはただ、焦燥感。\n夢を見たなら、その要因となったであろう、鈍い焦りだ。
3243 = "留下的只有焦躁，恐怕就是夢境殘留的吧。總之就是有種揮之不去的焦躁感。" 

# 【双鉄】
# display as 雙鐵
# JP: 「やはり、不安はあるのだろうな。\n[ごとう,1]後東[かいた,1]槐多氏……赤井宮司の言葉以上の人物ゆえに」
2571 = "「肯定是因為我還是感覺不放心。因為後東慶太……是個比赤井宮司描述中更厲害的人物」" 

# 【ハチロク】
# display as 八六
# JP: 「ポーレット様はお名前を知ってらっしゃいましたね。\nいずれ、鉄道立志伝に名を残すであろう人物だと」
2466 = "「波萊特大人也知道這個名字。她說後東慶太未來一定會名留鐵路史冊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「強盗槐多――あるいは、買い叩きの槐多か」
2221 = "「強盜慶太——又叫壓價慶太啊」" 

# monologue
# JP: なんとも物騒な異名であるが、\n電話越し、ほんのわずかに話すだけでも、伝わってきた。
2977 = "儘管只是在電話中說了幾句，我還是能感受到這綽號中隱含著多少凶險。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――僅かな隙も見逃してくれぬと感じた。\n買い叩きの槐多の異名も、事実の指摘にすぎんのかもな」
1352 = "「——他給人一種不會放過任何破綻的感覺。壓價慶太這個綽號，或許只是闡述事實吧」" 

# 【ハチロク】
# display as 八六
# JP: 「強盗だの買い叩きだの――悪名の多い方なのですね」
2032 = "「又是強盜又是壓價……看來是個惡名昭彰的人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「悪名……確かに、悪意を感じる異名ではあるな」
2283 = "「惡名啊……確實，都是些讓人感覺到惡意的綽號」" 

# monologue
# JP: しかし、それが人の口の端に登るとき、\n込められる感情が、嫌悪のみだとは思えない。
2950 = "但是人們稱呼他的名號時，其中夾雜的感情應該不只是厭惡。" 

# monologue
# JP: 事実、ポーレットが後東氏の名を語った時には、\nはっきりとした畏敬の念が伝わってきた。
3080 = "實際上波萊特提到後東先生的名字時，語氣裡明顯帶著敬畏。" 

# 【双鉄】
# display as 雙鐵
# JP: 「悪名は、彼の足を引っ張ろうとする者の多さゆえ。\n裏から見れば、それ程の成功を収めているということだ」
2150 = "「因為有很多人想給他使絆子。從另一種角度看，這也說明他取得了多麼巨大的成功」" 

# monologue
# JP: 一\x%l庫内手;#00ffc040;庫内手%l;#;から成り上がり、廃線寸前の鉄道会社を\n買い叩いては、優良資産だけを吸い上げ売払うまでに至る。
3120 = "從一介\\x%l庫内手;#00ffc040;洗爐工%l;#;鹹魚翻身，對瀕臨廢線的鐵路公司大肆壓價，抽出其中的優良資產再轉手出售。" 

# monologue
# JP: 彼に捕まり再起不能と追いやられた事業者も少なくない。\nが――優良資産を集積し再活用する。それもまた彼の才だ。
3433 = "被他逼到絕境的企業家也不在少數。但是……能夠聚集優良資產，再次有效利用，這也是他的才能。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[しぶや,1]澁谷－[よこはま,1]横濱間に再びの、しかも電気鉄道を走らせる。\nその途方もない偉業を、成し遂げようというのだから」
1910 = "「他想讓澀谷到橫濱之間恢復廢線，而且還是電力鐵路。就因為他想達成驚人的偉業，才會被人視為眼中釘」" 

# 【ハチロク】
# display as 八六
# JP: 「仮称、後東急行電鉄――\n本当に、運用開始できるのでしょうか？」
2417 = "「暫定名，後東急電鐵——真的能成功開始運營嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あと数年で開業できるとご本人はおっしゃっていた。\n用地はすでに、ほぼほぼ取得済みだとも」
1912 = "「他本人說再過幾年就能開業了。土地也基本收購完畢了」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！ 素晴らしいことですね」
2080 = "「哎呀！那真是太棒了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさしくだ。叶うのならば鉄道復権への、\n大きな楔の一つとなろうな」
2378 = "「是啊。如果能夠成功，這一定能成為鐵路復興的一大助力」" 

# monologue
# JP: とはいえ、その道のりは厳しいものであるだろう。
2902 = "不過要想辦成這件事一定非常艱難。" 

# monologue
# JP: 大勝するが、油断をすれば全てが一気に崩れ去る――\n後東氏の戦い方は、そうした性質のものと思える。
3528 = "雖說大獲全勝，但稍有大意就會徹底前功盡棄——後東先生的風格給了我這種感覺。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、九洲の鉄道の復線になど関わってはいれん筈だ。\nにもかかわらず、時間を取ってくれるのは――」
2323 = "「所以他應該沒空來管恢復九州鐵路的事情。但他卻願意抽出時間和我們商談」" 

# 【ハチロク】
# display as 八六
# JP: 「赤井宮司とのご縁のおかげ、でございましょうか？」
2415 = "「是看在赤井宮司的面子上，對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはもちろんだろう。赤井宮司を、\n恐らく後東氏は、相当に高く評価している」
2446 = "「沒錯。後東先生應該對赤井宮司有著相當高的評價」" 

# monologue
# JP: （ぴぴぴっ、ぴぴぴっ）
3563 = "（滴滴滴，滴滴滴）" 

# 【ハチロク】
# display as 八六
# JP: 「あら」
2079 = "「哎呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、タイマーをかけっぱなしだったか。\nすまん。そろそろ着替えてでかける支度をしなくては」
2097 = "「啊，定時器還開著啊。抱歉，我該準備換衣服出門了」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ、わたくしの方こそ。\n朝方の貴重な時間、おしゃべりにおつきあいいただいて」
1878 = "「不，這話該我說。早晨這麼寶貴的時間，還讓您陪我聊了這麼久」" 

# 【双鉄】
# display as 雙鐵
# JP: 「つきあってもらったのは、僕の方だ」
2363 = "「是你陪我才對」" 

# monologue
# JP: ハチロクの髪にぽんと手を置き、軽く撫でる。\nいつもながらの、手の中に雨が降るような心地よさ。
3171 = "我把手放在八六的頭髮上，輕輕摸了摸。手中傳來天降雨露般的舒適感。" 

# monologue
# JP: （――現実とは、とても強いものだな）
3543 = "（——現實真是強大啊）" 

# monologue
# JP: ほんのわずかな会話であっても。\nただこれだけの手触りでも。
3009 = "即便只是短短幾句話。即便只是這點身體接觸……" 

# monologue
# JP: おぼろな夢の、その影にざわついていてしまったこころを、\n波立たぬまでに鎮めてもらえた。
3049 = "因朦朧夢境躁動不安的心靈就漸漸平息了下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう、ハチロク。いつも助けられている。\n乗務のときも、その外にあっても」
2606 = "「謝謝你，八六。我總是受到你的幫助啊。不管是執行乘務任務的時候，還是其他時候」" 

# 【ハチロク】
# display as 八六
# JP: 「当然のことです。双鉄様はわたくしの\x%l機関士;#00ffc040;機関士%l;#;。\nマスターになられたのですから」
2508 = "「當然了。因為雙鐵少爺您成了我的\\x%l機関士;#00ffc040;司機%l;#;，成了我的主人啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2114 = "「嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「それだけに――稀咲様に頼るしか無いこの状況を、\nこころ苦しくも思います」
2319 = "「所以……我很難過，目前只能依靠稀咲小姐，我卻幫不上忙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前が言ったことだろう。餅は餅屋。汽車は汽車屋。\n――それぞれが、それぞれの役割を最善に果たせばいい」
1945 = "「你不是說過嗎，術業有專攻。每個人盡力做好自己分內的事就夠了」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――本当に。\n左様でしたね。かしこまりました、双鉄様」
2132 = "「嗯，確實是這樣。我明白了，雙鐵少爺」" 

# monologue
# JP: 背筋を伸ばして、ピっと敬礼。\nそしてハチロクは、髪を翻し部屋を出て行く。
2991 = "八六挺直腰板敬了個禮，然後就轉身離開了房間。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、本日の乗務に向かいます。\n明日からはまた、よろしくお願いいたします」
2302 = "「我去做今天的乘務工作了。明天開始還要再請您指教」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。今日のところはよろしく頼む」
2116 = "「嗯，今天就靠你了」" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。双鉄様。\nどうぞ、一日ご安全に」
2310 = "「我明白了，雙鐵少爺。祝您今天順利」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご安全に。よい乗務を」
2467 = "「注意安全，祝工作順利」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて、と」
2165 = "「好了」" 

# monologue
# JP: 今日は稀咲と、後東氏との面談に備えての対策会議だ。\n銀行に向かう以上は、やはり背広の方がいい。
2925 = "今天要和稀咲開會籌備與後東先生的會面。既然要去銀行，還是穿西裝比較好。" 

# monologue
# JP: （きゅっ）
3556 = "（勒緊）" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2089 = "「唔」" 

# monologue
# JP: 大剣と小剣のバランスも、ノットの大きさも申し分ない。\nこれほど上手くネクタイを締められたことに、少し驚く。
3081 = "寬窄兩頭平衡適中，打結的大小也無可挑剔。居然能把領帶繫這麼漂亮，我自己都有些吃驚。" 

# 【双鉄】
# display as 雙鐵
# JP: 「幸先のいいことだ」
2364 = "「是個好兆頭啊」" 

# monologue
# JP: そろそろ出よう。遅刻を決してせぬように。\n僕にとってのそれ以上に、稀咲の時間は、貴重なのだから。
3448 = "該出門了，絕對不能遲到。因為稀咲的時間比我的更加寶貴。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……っと、早くつきすぎてしまったか」
1405 = "「……哎呀，來早了」" 

# monologue
# JP: 約束の時間まではまだ五分ある。
3476 = "距離約定時間還有五分鐘。" 

# monologue
# JP: 銀行前でうろうろするのも\nいかにも体裁が良くないが、さて――
3051 = "在銀行門前閒晃太不合適了，我還是找個地方等著——" 

# 【稀咲】
# display as 稀咲
# JP: 「何をしてるんだい？　こんなところで」
1959 = "「你在這裡幹什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2106 = "「啊？！」" 

# monologue
# JP: 予想外の声に驚かされて振り向けば、\n予想通りの稀咲の姿。
3138 = "意料之外的搭話聲嚇了我一跳，回頭一看果然是稀咲。" 

# monologue
# JP: 少し汗ばみ、赤らんだ顔をしている。\nまるで走ってきたばかりのようにも見えるほどだ。
3064 = "她泛紅的臉頰上浮著一層汗珠，像是一路跑過來的。" 

# 【稀咲】
# display as 稀咲
# JP: 「まぁ、聞かなくてもわかるけど。\nボクとの時間を待ちわびてくれてた――だろう？」
2553 = "「算啦，不用問我也明白。你是等不及想要見我了，對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういう言い方が好みであるなら、そうとも言える」
1957 = "「你喜歡這種說法的話，確實可以這麼說」" 

# monologue
# JP: 稀咲らしい涼やかな軽口に、\n軽い驚きはすぐさま鎮まる。
3297 = "稀咲一如既往的輕佻玩笑，讓我馬上冷靜了下來。" 

# monologue
# JP: 呼応するわけもないことだけれど、\n稀咲の顔の赤らみも、みるみるうちに引いていく。
3527 = "雖說不是在配合我，不過稀咲臉上的紅暈也逐漸消退了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、より厳密にはこうなる。\n『稀咲との待ち合わせ時刻の到来を待っていた』だ」
1932 = "「但是，說得更嚴謹一些應該是這樣。我在等待和你約定碰頭的時間」" 

# 【稀咲】
# display as 稀咲
# JP: 「確かに少し早いね。ここであえて良かった。\n五分、お互いの時間を有意義に使える」
2537 = "「確實稍微早了一點啊。在這遇到你真是太好了，我們都可以讓這五分鐘變得更有意義」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それならば何よりだ」
2536 = "「確實是件好事」" 

# 【稀咲】
# display as 稀咲
# JP: 「ちょうど、ボクの方もお迎えの準備が整ったところさ」
2300 = "「我剛準備好招待你呢」" 

# monologue
# JP: いって、稀咲は手の中にある小さな紙袋をカサカサ鳴らす。
3368 = "稀咲邊說邊晃了晃手中的小紙袋。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは？」
2713 = "「那是什麼？」" 

# 【稀咲】
# display as 稀咲
# JP: 「何かはあとでのお楽しみ。さ、行こう。\n話す時間は、いくらあってもきっと足りない」
2551 = "「答案就等會再揭曉吧。好了，我們走吧。談話的時間肯定是再長也不嫌多」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2114 = "「嗯」" 

# monologue
# JP: 慣れた手つきでカードキーを通す稀咲に続き、\n支店長室へと案内される。
3334 = "稀咲熟練地刷了一下卡片鑰匙，把我帶到了支行長室。" 

# 【稀咲】
# display as 稀咲
# JP: 「先に入ってくつろいでいて？\nボクは、少しだけすることがある」
1951 = "「你先進去休息會吧，我還有點事情要做」" 

# monologue
# JP: （がちゃっ）
3559 = "（喀嚓）" 

# 【双鉄】
# display as 雙鐵
# JP: 「失礼します」
2336 = "「打擾了」" 

# monologue
# JP: 無人の部屋とはわかっていても、\n挨拶の声が出てしまう――ん？
3196 = "明知道屋裡沒人，我還是打了個招呼……嗯？" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ……落ち着く匂いがするな」
2286 = "「感覺……有股讓人放鬆的味道」" 

# monologue
# JP: 香水というほど強くない、お香のような……\nああ、いや？　実際にお香を炊いているのか？
2894 = "不像香水那麼濃烈，就像薰香一樣……不對，這就是薰香吧？" 

# 【稀咲】
# display as 稀咲
# JP: 「おまたせ、双鉄」
1885 = "「久等了，雙鐵」" 

# monologue
# JP: 稀咲自ら、\nトレーに載せたカップとティーポットとを運んでくる。
3352 = "稀咲端來一個托盤，上面放著茶杯和茶壺。" 

# monologue
# JP: その傍らにはお皿に乗った――
3193 = "旁邊的盤子上放著的是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「にわみさんの長饅頭か」
2216 = "「庭美家的長米糕啊」" 

# monologue
# JP: 言った瞬間、そうかと気づく。\n稀咲がさっき鳴らしてみせたのは、この紙袋だ。
3453 = "說完以後我突然想起，稀咲剛才搖晃的紙袋裡裝的一定就是這個。" 

# 【双鉄】
# display as 雙鐵
# JP: 「行列が出来るほどのお菓子だよな。\nすぐ売り切れるし、その日のうちに食べねば固くなる」
2661 = "「這種點心很受歡迎吧，甚至有顧客特地排隊去買。總是很快就會賣光，而且不當天吃完就會變硬」" 

# monologue
# JP: ゆえに稀咲は恐らく並んで開店を待ち――
3300 = "稀咲估計就是去排隊等著點心店開門——" 

# monologue
# JP: 待ち合わせ時刻に間に合うように、\n大急ぎで、走って戻ってきてくれたのだろう。
3235 = "然後為了趕上我們約定的碰頭時間，急急忙忙跑了回來吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「わざわざそこまでしてくれたのか」
1973 = "「你還特地去給我買了點心啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、幸せそうな笑顔だ。\nやっぱり、日々姫の情報は確かだね」
2069 = "「呵呵，你笑得好幸福啊。看來日日姬的情報確實沒錯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、僕は幸せそうな顔をしているか」
2408 = "「是嗎，我表現得很幸福嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「としか見えない。ちょっと意外だけど、嬉しいよ。\n双鉄も、この長饅頭が好きなこと」
2736 = "「非常幸福啊。有點出乎我的意料，但我也很開心。原來你也喜歡這種點心」" 

# monologue
# JP: 実のところ、そこまでの好物というほどではない。\n右田で出てくるお菓子ではこれが一番大きいから――
2994 = "其實算不上特別喜歡。只是因為右田家擺出的點心之中，這是最大的一種——" 

# monologue
# JP: 一つ食べれば、おなかいっぱいということにして\n他の薦めを断れるから、遠慮で選んでいただけ――ん？
3031 = "吃完一個就能說自己吃飽了，然後以此為藉口推辭掉其它種類……嗯？" 

# 【双鉄】
# display as 雙鐵
# JP: 「“も”、ということは、稀咲もこれを？」
1966 = "「你說“也”？那你也愛吃嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「和菓子の中でのベストファイブには確実に入る。\nでね？　双鉄」
2152 = "「在日式點心裡排得上前五了。然後呢，雙鐵」" 

# monologue
# JP: 稀咲がティーポットを傾ける。\nカップへと注がれるのは――
3326 = "稀咲提起茶壺，往杯子裡倒入了——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、お香ではなく、この香りだったか」
2107 = "「喔，原來不是薰香，而是茶葉的香氣啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「[ユキメキラン,3]雪芽奇蘭。ジャスミンティーの一種だよ。\n大陸の知人が、毎年義理堅く送ってくれる物なんだ」
2650 = "「這叫雪芽奇蘭，是一種茉莉花茶。我在大陸的朋友很重人情，每年都送這個過來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2656 = "「這樣啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「で、これが奇跡のようにあんこに合う。\nミルクでも、ストレートでもいけるけど？」
2660 = "「這種茶葉和豆沙的味道很搭，簡直就是味覺上的奇蹟。可以加牛奶，也可以直接喝，你選哪種？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕はストレートを頼もう」
2709 = "「那我就直接喝吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクはミルクティー」
2312 = "「我要加牛奶」" 

# monologue
# JP: ピッチャーからミルクを注いで、かき混ぜる。
3324 = "稀咲提起壺加了些牛奶，然後攪拌幾下。" 

# monologue
# JP: ジャスミンティーとあんこはそこそこ合いそうだが、\nそこにミルクも入るとなると……想像もつかん。
3422 = "茉莉花茶和豆沙的風味感覺是挺搭的，但是再加上牛奶的話……無法想像是什麼味道。" 

# 【稀咲】
# display as 稀咲
# JP: 「遠慮しないで、食べて？　双鉄。\nキミのために用意したんだから」
2006 = "「別客氣，快吃吧，雙鐵。這就是給你準備的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、いただこう」
2704 = "「那我不客氣了」" 

# monologue
# JP: 長饅頭を一口いって、ジャスミンティーを――
3165 = "我吃了一口點心，再喝一口茉莉花茶——" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2141 = "「噢！」" 

# monologue
# JP: これは、合う。奇跡のように――とは、\n随分おおげさなことを言うなと思ってしまっていたが。
3259 = "確實很搭，簡直是味覺上的奇蹟。剛才我還覺得是她說得太誇張了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。――うむ」
2115 = "「嗯嗯——嗯嗯」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふっ」
2068 = "「呵呵」" 

# monologue
# JP: これは――いや、にわみさんの長饅頭は、\nここまで旨いお菓子だったか。
3019 = "厲害……庭美家的長米糕居然這麼好吃啊。" 

# monologue
# JP: ジャスミンティーに洗われる口が、\nあんこの風味を、そして旨さを、真に引き出す。
3424 = "茉莉花茶讓口腔內變得清爽，越來越凸顯出了豆沙真正的風味。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ごくっ。んっ――んぐっ――んぐっ。ぷぁっ。\nああ――旨かった」
2073 = "「咕嘟咕嘟……噗哈。哎呀，真是太好吃了」" 

# 【稀咲】
# display as 稀咲
# JP: 「そこまで気に入ってもらえたなら。\nすすめた甲斐があったよ。嬉しいな」
1972 = "「你這麼喜歡啊，那我推薦你這個也算是值了，真開心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、実に気に入った。\nジャスミンティーとあんこがここまで合うとはな」
2129 = "「嗯，真的很好吃。沒想到茉莉花茶和豆沙會這麼搭」" 

# monologue
# JP: となると、少し気になってくる。\nミルクがここに加わったなら、果たして――
3452 = "說到這裡，我又有些好奇。如果再加上牛奶，究竟會是什麼味道呢？" 

# 【稀咲】
# display as 稀咲
# JP: 「あはっ、気になるんだ」
2078 = "「哈哈，你很好奇吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む――。ああ、いや。うむ。\nまいったな、そんなにわかりやすい顔をしていたか？」
2066 = "「呃，沒有……是的。真不好意思，我表現得那麼明顯嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「世間一般からみたら、そうでもないかも。けどね？\nボクはわかる。双鉄は、ぐっとわかりやすくなった」
1852 = "「一般人可能不這麼覺得。但是呢，我就能看出來。雙鐵，你一下子變得很好懂了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかりやすくなった」
2313 = "「我變得好懂了？」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。多分、\nここしばらくの、行動の変化の影響だろうね」
2376 = "「是啊。大概是因為你最近在行動上的變化吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「行動の変化――僕のか？」
2581 = "「行動上的變化……你說我嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「もちろん。双鉄、キミ、ここしばらく、相手を問わず、\n二人きりで会う時間を意識して増やしているよね」
2507 = "「當然。雙鐵，你最近不管對方是誰，都會特地增加二人獨處的時間吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2091 = "「啊！」" 

# monologue
# JP: 確かにだ。ナビのアドバイスを受け入れて以来、\n"向き合う"ことを、僕は意識して行っている。
3258 = "確實如此，自從接受了Ｎａｖｉ的建議之後，我就會有意尋找機會與他人“交流”。" 

# monologue
# JP: その影響が行動の変化に繋がっているという指摘自体にも\n無論、興味は覚えるのだが――
3526 = "雖然我也很好奇這跟行動上的變化有什麼關係，但現在我最想問的是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「何故、気づいたのだ？」
1961 = "「你怎麼發現的？」" 

# monologue
# JP: ――稀咲の情報収集能力の高さならば、承知している。
1311 = "——我知道稀咲的情報收集能力很強。" 

# monologue
# JP: が、僕という個人、しかも仲間に対し、\nその情報網を使うなどという無駄を行うとも思えない。
2943 = "但我不認為她會無聊到對我動用情報網，更何況我還是她的同伴。" 

# 【稀咲】
# display as 稀咲
# JP: 「それはね、双鉄？　ボクが、キミに興味をもって、\nよく見てるから」
2149 = "「因為我對你很有興趣，一直在關注你」" 

# 【双鉄】
# display as 雙鐵
# JP: 「で、あるのならば光栄だが――。しかし、\n稀咲と会える時間など、極めて限られているではないか」
2685 = "「那可真是榮幸。但是我們能見面的時間非常有限吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「会える時間、か――うふふ、いいね。\nそう言ってもらえて、嬉しいよ」
1378 = "「“我們能見面的時間”……呵呵，真不錯。聽到你這麼說，我很開心」" 

# monologue
# JP: 稀咲の、とても柔らかな笑み。
3373 = "稀咲露出了柔和的笑容。" 

# monologue
# JP: 普段見せている、完璧に整ったものとは違った、\n緩んでいるとも思える笑みに、なぜだか少し胸がざわめく。
3417 = "與她平時展現出的完美又端莊的笑容不同，她隨意的一笑讓我心中一陣悸動。" 

# 【稀咲】
# display as 稀咲
# JP: 「確かに会える時間は限られている。残念なことに。\nけど、ボクはね？　優秀なスパイを抱えているんだ」
2296 = "「我們能見面的時間確實很有限，真遺憾。但是呢，我有一位優秀的間諜」" 

# 【双鉄】
# display as 雙鐵
# JP: 「スパイ？」
2725 = "「間諜？」" 

# 【稀咲】
# display as 稀咲
# JP: 「そう。ボクと同じか、それ以上によく双鉄を見ていて。\nその上、双鉄のことを尋ねないでも聞かせてくれる――」
2450 = "「沒錯，她和我一樣，甚至比我更關注你。而且就算我不問，她也會主動把你的事情告訴我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……なんだ、日々姫か」
2087 = "「哦，我懂了，你說日日姬啊」" 

# monologue
# JP: 謎とはそういうものであろうが、\n答えがわかればあっけない。
3456 = "謎語就是這樣，知道答案之後就變得很無趣。" 

# monologue
# JP: しかし、そうか――日々姫も認めているのなら、\n確かに僕は、わかりやすくなってきているのだろう。
2901 = "不過既然連日日姬都這麼認為，那我確實是變了吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……『わかりやすくなった』か。[よ]良いことのようにも、\n危なっかしいことのようにも思えるな」
1430 = "「……變得“好懂”啊。這既是件好事，也是件壞事吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクとしては、素晴らしく良い変化だと思うけど？\n――具体的には、こんな恩恵があったりするから」
2297 = "「我倒覺得這是個很好的改變啊。舉個例子，你變了以後就能享受到這種好處」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お」
2140 = "「噢」" 

# monologue
# JP: 稀咲は[くろもじ,2]黒文字を見事に操り、\n食べかけの長饅頭をふたつに割る。
3337 = "稀咲用牙籤俐落地把吃剩的點心分成兩份。" 

# 【稀咲】
# display as 稀咲
# JP: 「どうぞ？　双鉄。\n少食のボクには、もとからこれは、少し重いんだ」
2057 = "「吃吧，雙鐵。我飯量小，這對我來說有些太多了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういうことなら遠慮なく」
2708 = "「那我就不客氣了」" 

# monologue
# JP: 切り分けられた半分を、\nそのまま一口で持っていき――
3172 = "我把稀咲分給我的點心放進嘴裡——" 

# 【稀咲】
# display as 稀咲
# JP: 「それから、これも。遠慮なくどうぞ？」
2678 = "「那也嚐嚐這個吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2604 = "「謝謝」" 

# monologue
# JP: ミルクティー。\nなるほど確かに、"わかりやすい"　も、悪くない。
3322 = "稀咲把奶茶遞給了我，看來有所改變確實還不錯。" 

# monologue
# JP: 稀咲が差し出してくれたカップをそのまま、\n口へと運んで――
3175 = "我接過她的杯子，湊到嘴邊——" 

# 【稀咲】
# display as 稀咲
# JP: 「！」
# 2091 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む――」
# 2111 = "「嗯……」" 

# monologue
# JP: これは――旨い。まろやかさが増す。\nなのに甘みが、しつこさを残さず洗われて――ああ。
3253 = "真美味，加了牛奶後增添了醇厚的口感，而口內的甜膩感都被清潔一空。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。全部飲んでしまった」
2341 = "「抱歉，我都喝光了」" 

# 【稀咲】
# display as 稀咲
# JP: 「え！？　あ。――ああ」
2075 = "「咦？！哦……這個啊」" 

# monologue
# JP: 何故か稀咲はビクリと身を引き、\n芝居がかった咳払いをする。
2898 = "不知道怎麼了，稀咲嚇得身子一顫，故意咳了兩聲。" 

# 【稀咲】
# display as 稀咲
# JP: 「構わないよ。茶葉はまだまだたくさんあるし。\nよかったら、新しく淹れなおそうか？」
2453 = "「沒關係，茶葉還有很多。你喜歡的話，我再泡一壺給你？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、ご馳走様だ。大変にいいお茶だった」
1867 = "「不用，已經足夠了，真是好茶啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「よかった。じゃ、ボクも――もぐっ」
1956 = "「你喜歡就好。那我也繼續吃了……（咀嚼）」" 

# monologue
# JP: 最後に残った長饅頭を、稀咲も一口で綺麗に食べきる。\nそうしてふっ――と息を吐き。
3308 = "稀咲優雅地吃下最後一塊，然後長長呼了一口氣。" 

# 【稀咲】
# display as 稀咲
# JP: 「さてさて、たっぷり糖分も補充できたし、\n軽い頭の体操もした」
2167 = "「好了，糖分補充完畢，大腦也做好熱身運動了」" 

# monologue
# JP: 目つきが変わる。\n僕の背筋も、自然と伸びる。
3345 = "稀咲的眼神變了。我的身板也自然挺直。" 

# 【双鉄】
# display as 雙鐵
# JP: 「やるか」
2724 = "「開始吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「やろう」
# 2724 = "「開始吧」" 

# monologue
# JP: 稀咲の表情が引き締まる。\nテーブルの上を片付けて、ノートＰＣと資料を広げる。
3347 = "稀咲的表情嚴肅起來，然後收拾好桌面，把筆記型電腦和資料放到桌上。" 

# 【稀咲】
# display as 稀咲
# JP: 「『未来行き列車計画』を、線路に乗せられるか否か。\n次の後東氏との交渉が、まさしく、正念場になるからね」
1379 = "「“發往未來列車計劃”能否真正在線路上落地，關鍵就在下次與後東先生的談判」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。\nんっ――」
2654 = "「這樣啊。嗯……」" 

# monologue
# JP: ……まったく出ない結論ゆえに、支店長室から外に出て。\nしばらく歩いたその場所で、稀咲は大きく伸びをする。
1332 = "……因為完全得不出結論，我們就離開了支行長室。走了一陣之後我們來到這裡，稀咲伸了個大大的懶腰。" 

# 【稀咲】
# display as 稀咲
# JP: 「これは確かに、気分転換になりそうだ。\nそれに、勉強になりそうな気もする」
