[script]
# lines: 629 
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「お乗りください、双鉄様」
2765 = "「Mời ngài lên, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[おしろばし,2]御城橋まで戻ってか？　バカな、走った方が早い」
2855 = "「Quay lại cầu Oshiro sao? Ngốc thật, chạy bộ còn nhanh hơn.」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「汗をかきます、せっかくの晴れの日だというのに」
2147 = "「Ngài sẽ đổ mồ hôi đấy, mặc dù hiếm khi có một ngày nắng đẹp thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「汗を、僕が？　\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の\x%l機関士;#00ffc040;機関士%l;#;が？\nたかだか駅までを走ったくらいで？」
2646 = "「Đổ mồ hôi, tôi á? \\x%l機関士;#00ffc040;Người lái tàu%l;#; của \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; cơ mà?\nChỉ chạy đến ga thôi mà đổ mồ hôi sao?」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「目に見えずとも、かいた汗は体表面で乾きます。\nそれはかすかな体臭となり、周りに不快感を与えます」
2462 = "「Ngài Soutetsu. Dù không nhìn thấy, nhưng mồ hôi đổ ra sẽ khô lại trên bề mặt cơ thể.\nNó sẽ tạo ra mùi cơ thể thoang thoảng, gây khó chịu cho những người xung quanh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どのみち乗務で滝のようにかくし、\nセレモニーの前にはシャワーを浴びる――っと」
2251 = "「Đằng nào thì lúc làm nhiệm vụ cũng đổ mồ hôi như tắm,\ntrước buổi lễ tôi sẽ đi tắm vòi sen——vậy đi.」"
# monologue
# JP: 言い争っている間についた。
3364 = "Trong lúc cãi nhau thì đã đến nơi."
# monologue
# JP: 全速力で構内へ入り、安全確認。\n駆け足でホームを渡り、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;内へと飛び込む。
3594 = "Tôi lao hết tốc lực vào trong nhà ga, xác nhận an toàn.\nChạy vội qua sân ga, rồi phóng thẳng vào bên trong \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、おっそーーーーいっ！」
2869 = "「Anh hai, trễ quá đi mấtttt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。ネクタイを忘れてしまってな」
2545 = "「Xin lỗi. Anh quên mang cà vạt.」"
# 【日々姫】
# display as 日日姬
# JP: 「ネクタイ？」
2891 = "「Cà vạt á?」"
# monologue
# JP: 目を丸くして、日々姫が僕の服装を見る。\n乗務前――僕は当然、ナッパ服だ。
3661 = "Hibiki tròn mắt nhìn trang phục của tôi.\nTrước khi làm nhiệm vụ——tất nhiên là tôi đang mặc đồ bảo hộ rồi."
# monologue
# JP: ナッパ服の上のネクタイなど、乗務のあとには、\n手ぬぐい同然、まっ黒くススけてしまうだろう。
3918 = "Thắt cà vạt bên ngoài đồ bảo hộ, sau khi làm nhiệm vụ xong,\nchắc chắn nó sẽ đen thui như cái giẻ lau tay cho xem."
# 【日々姫】
# display as 日日姬
# JP: 「ネクタイなんて、何のため――\nあ！　そっか、[やつしろ,2]八ツ城駅でのリレーのときの」
2709 = "「Thắt cà vạt làm gì chứ——\nA! Ra vậy, là cho lúc chuyển tiếp ở ga Yatsushiro.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、セレモニーがあるという話だからな。\n“礼装で”と、日々姫も言われているだろう？」
2369 = "「Ừ, nghe nói có tổ chức lễ kỷ niệm mà.\nHibiki cũng được dặn là phải mặc 'lễ phục' đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「言われとーよ？」
2763 = "「Có dặn mà?」"
# monologue
# JP: 日々姫はふふん、と鼻を鳴らして、\n助士席の下に置かれたカバンを足先でつついて見せる。
3649 = "Hibiki hừ mũi \"hừm\" một tiếng kiêu hãnh,\nrồi dùng mũi chân huých nhẹ vào chiếc túi đặt dưới ghế phụ lái cho tôi xem."
# 【日々姫】
# display as 日日姬
# JP: 「御一夜鉄道の制服ば、あんまり着慣れんけん。\nちょっと前から、着こなしとか考えとったし」
2385 = "「Đồng phục của Đường sắt Ohito, em mặc chưa quen lắm.\nNên từ trước em đã phải nghĩ xem mặc thế nào cho đẹp rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。準備万端だな。\n僕などは、何ヶ月ぶりに袖を通すかというレベルだよ」
2383 = "「Chà. Chuẩn bị chu đáo quá nhỉ.\nAnh thì không biết đã mấy tháng rồi mới mặc lại bộ đó đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「へーきよ。にぃにぃは何着ても似合うけん」
2851 = "「Không sao đâu. Anh hai mặc gì cũng hợp mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それを言うなら日々姫の方こそだろう。\nそのナッパ服も、実に見事に着こなしている」
2748 = "「Nói vậy thì phải là Hibiki mới đúng chứ.\nBộ đồ bảo hộ đó, em mặc cũng cực kỳ đẹp đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「って、あんま褒められとるよーにも思えんけど～」
2811 = "「Nói vậy, nhưng em chẳng thấy giống như đang được khen chút nào đâu~」"
# 【双鉄】
# display as 雙鐵
# JP: 「褒めているさ。大いに」
2455 = "「Đang khen đấy chứ. Khen rất nhiều là đằng khác.」"
# monologue
# JP: 少し離れて、日々姫を見る。\nまじまじ見られ、日々姫は「ん？」と首を傾げる。
3581 = "Tôi lùi lại một chút, nhìn Hibiki.\nBị nhìn chằm chằm, Hibiki nghiêng đầu \"Hửm?\"."
# 【日々姫】
# display as 日日姬
# JP: 「どぎゃんしたと？　カマなら、準備できとーよ？\nいつでん、入線できるけん」
2494 = "「Sao vậy anh? Lò hơi thì em chuẩn bị xong rồi đó?\nLúc nào cũng có thể tiến vào đường ray được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、その点は信頼している。\nそうではなくて――」
2335 = "「Ừ, chuyện đó thì anh tin tưởng em.\nKhông phải chuyện đó——」"
# monologue
# JP: 一人前だ、としみじみ思う。\n外見にも態度にも、落ち着きと余裕を感じる。
3535 = "Đã trưởng thành rồi, tôi thấm thía nghĩ.\nCả ngoại hình lẫn thái độ, đều toát lên vẻ điềm tĩnh và thong dong."
# monologue
# JP: デザイナーとして\x%l機関助士;#00ffc040;機関助士%l;#;として、十分な技量を有しても\nなお、少し前までどこかきょときょとしていたのだが。
3378 = "Với tư cách là một nhà thiết kế và một \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;, dù đã có đủ kỹ năng\nnhưng mới cách đây không lâu, con bé vẫn còn vẻ gì đó ngơ ngác."
# 【双鉄】
# display as 雙鐵
# JP: 「――楽しみだな、と思っただけだ。\n晴れの舞台で、僕と日々姫と、礼装で並ぶ瞬間が」
2513 = "「——Anh chỉ nghĩ là, thật đáng mong đợi thôi.\nKhoảnh khắc anh và Hibiki cùng mặc lễ phục sát cánh bên nhau trên sân khấu rực rỡ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー……うん。ううんっ！　『はい』」
2309 = "「Aー……vâng. Không phải! 『Vâng ạ』」"
# monologue
# JP: 何故か、日々姫が赤くなる。
3209 = "Không hiểu sao, mặt Hibiki lại đỏ bừng lên."
# monologue
# JP: 照れさせるようなことなど何一つ、\n言っても聞いてもない気がするが。
3497 = "Tôi cảm thấy mình chẳng nói hay hỏi điều gì\nkhiến con bé phải xấu hổ cả."
# 【日々姫】
# display as 日日姬
# JP: 「……ありませんでしたものね、今まで、全然。\n晴れの舞台を、兄さんとご一緒する機会」
1680 = "「……Từ trước đến nay, hoàn toàn không có mà nhỉ.\nCơ hội được đứng cùng anh trai trên sân khấu rực rỡ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――\n言われてみれば、今までまるでなかったか」
2569 = "「Ừ——\nNghe em nói mới nhớ, từ trước đến nay hoàn toàn không có nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ありませんでした。だから、兄さんが楽しみって\n言ってくださって、私、すごく嬉しいんです」
2453 = "「Không có ạ. Thế nên, khi nghe anh nói là mong đợi,\nem vui lắm.」"
# monologue
# JP: はにかんで、日々姫は視線を床へと落とす。\n子供じみた仕草がかえって、女性らしさを引き立てる。
3658 = "Hibiki thẹn thùng, cụp mắt nhìn xuống sàn.\nCử chỉ trẻ con ấy ngược lại càng làm tôn lên vẻ nữ tính của con bé."
# 【日々姫】
# display as 日日姬
# JP: 「あ"」
2310 = "「A\"」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
2373 = "「Hửm?」"
# monologue
# JP: ――ように一瞬思えたのだが、錯覚だった。\n日々姫の顔はあわあわと、見るからにもう動揺してる。
1599 = "——Trong thoáng chốc tôi đã nghĩ vậy, nhưng chỉ là ảo giác.\nKhuôn mặt Hibiki luống cuống, nhìn là biết đang bối rối."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした――日々姫」
2492 = "「Sao thế——Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「ありえん。私、お靴わすれたと」
2495 = "「Không thể tin được. Em quên mang giày rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、日々姫も忘れ物か。気が合うな」
2688 = "「Gì chứ, Hibiki cũng để quên đồ à. Ăn ý thật đấy.」"
# monologue
# JP: その足元は、乗務のときにはいつもはいてる、\n一見はスニーカーなタイプの安全靴。
3419 = "Dưới chân con bé là đôi giày bảo hộ kiểu dáng như giày thể thao\nmà con bé vẫn thường đi khi làm nhiệm vụ."
# monologue
# JP: 火花が散っても燃えず、\n尖った石炭を踏んでも抜けない、実用的な代物だ。
3832 = "Một đôi giày rất thiết thực, dù có bị tia lửa bắn vào cũng không cháy,\ndẫm lên than đá sắc nhọn cũng không bị xuyên thủng."
# 【日々姫】
# display as 日日姬
# JP: 「そんなとこで気ばあっても嬉しくなかとよ。\nっていうか、どぎゃんしよ。今から戻るとか」
2764 = "「Ăn ý ở mấy chuyện thế này thì em cũng chẳng vui đâu.\nMà, làm sao bây giờ. Hay là giờ chạy về lấy.」"
# monologue
# JP: （ゴン、ゴン）
3968 = "（Cốc, cốc）"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――っと、真闇姉か」
2374 = "「Hửm? ——A, là chị Mayami à.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　ねぇね！？　助かった！」
2299 = "「Hả? Chị Mayami!? May quá!」"
# 【真闇】
# display as 真闇
# JP: 「ひーちゃん、パンプス忘れたでしょお」
2448 = "「Hi-chan, em quên giày cao gót phải không~」"
# 【日々姫】
# display as 日日姬
# JP: 「やっぱり持ってきてくれたと！ ありがとー」
2875 = "「Quả nhiên chị đã mang đến cho em! Cảm ơn chị nha~」"
# 【真闇】
# display as 真闇
# JP: 「ついでよ、ついで。\n『[ここの]九つ[ぼし]星』、納品ば来たついで」
2890 = "「Tiện đường thôi, tiện đường thôi.\nChị đến giao 『Ngôi sao thứ chín』 tiện thể mang qua luôn.」"
# monologue
# JP: 九つ星――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;による完全データ管理酒の、\n一つの輝かしい到達点となった、新酒。
3391 = "Ngôi sao thứ chín——Loại rượu mới, một cột mốc huy hoàng\ncủa dòng rượu được quản lý dữ liệu hoàn toàn bởi \\x%lレイルロオド;#00ffc040;Railord%l;#;."
# monologue
# JP: [インターナショナルスピリッツコンペティション,6]　Ｉ　Ｓ　Ｃ　最優秀賞受賞酒の車内試飲販売は、今日\n走りだすナインスターズ一号列車の大きな目玉のひとつだ。
3242 = "Việc nếm thử và bán loại rượu đoạt giải cao nhất tại ISC (International Spirits Challenge) ngay trên tàu\nlà một trong những điểm nhấn lớn của chuyến tàu Nine Stars số 1 khởi hành hôm nay."
# 【真闇】
# display as 真闇
# JP: 「\x%l貨車;#00ffc040;貨車%l;#;……冷蔵車で良かと？　あれ、もうキンキンに\n冷えとーのね。おねえちゃん、驚いちゃった」
2822 = "「Để ở \\x%l貨車;#00ffc040;toa chở hàng%l;#;……toa đông lạnh là được đúng không? Cái toa đó lạnh buốt\nluôn rồi nhỉ. Chị bất ngờ lắm đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「レム[キュウイチマルマル,3]9100だな。\n単なる冷蔵\x%l貨車;#00ffc040;貨車%l;#;ではなく、冷蔵車兼電源車だ」
2590 = "「Là toa Remu 9100 nhỉ.\nKhông chỉ đơn thuần là \\x%l貨車;#00ffc040;toa chở hàng%l;#; đông lạnh, mà là toa đông lạnh kiêm toa phát điện.」"
# monologue
# JP: 大廃線後の九洲で初となった、\n完全新規設計の、新造車両。
3935 = "Toa xe mới được thiết kế hoàn toàn mới,\nđầu tiên ở Kyushu sau đợt Đại bãi bỏ các tuyến đường sắt."
# monologue
# JP: 電源車と冷蔵車とをひとまとめにという日々姫の案は、\n旧帝鉄の技術を引き継ぐ技師たちによって実現された。
3393 = "Ý tưởng gộp chung toa phát điện và toa đông lạnh làm một của Hibiki,\nđã được các kỹ sư kế thừa kỹ thuật của Đường sắt Hoàng gia cũ hiện thực hóa."
# 【双鉄】
# display as 雙鐵
# JP: 「あれはディーゼル発電機を自前で持っているからな。\n走行状態になくても、常時発電、および冷蔵が出来る」
2777 = "「Toa đó có sẵn máy phát điện diesel mà.\nDù không chạy, nó vẫn có thể liên tục phát điện và làm lạnh.」"
# monologue
# JP: 全行程なら99万9千円の豪華リレー・クルーズトレイン。\n乗客数は、最大でも54名/9家族にすぎない。
3289 = "Chuyến tàu du lịch chuyển tiếp sang trọng với giá 999.000 yên cho toàn bộ hành trình.\nSố lượng hành khách tối đa cũng chỉ là 54 người/9 gia đình."
# monologue
# JP: ゆえ、貨物・冷蔵スペースにある程度の余裕をもたせつつ、\n電源車も兼務させ得たのだ。
3624 = "Vì vậy, nó có thể vừa kiêm nhiệm vai trò toa phát điện,\nvừa đảm bảo không gian chở hàng và làm lạnh ở một mức độ nhất định."
# 【真闇】
# display as 真闇
# JP: 「走る物産館で、走るレストランにもなるんやもんね、\nナインスターズ。冷蔵・冷凍庫ば、大事よねぇ」
2129 = "「Nine Stars vừa là hội chợ vật sản di động, vừa là nhà hàng di động mà nhỉ.\nTủ lạnh, tủ đông quan trọng lắm đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だけでなく、レムのおかげで、冷暖房も行える。\n客車三両、客室九室、それぞれが個別に空調できる」
2102 = "「Không chỉ vậy, nhờ có Remu mà hệ thống sưởi và làm mát cũng hoạt động được.\nBa toa hành khách, chín phòng khách, mỗi phòng đều có thể điều hòa không khí riêng biệt.」"
# monologue
# JP: 九洲九国をそれぞれの客室に当てはめた、\nその名も九洲な、[きゅうじゅう,1]90系客車群。
3231 = "Nhóm toa hành khách dòng 90 mang đậm chất Kyushu,\nvới mỗi phòng khách tượng trưng cho chín tỉnh của Kyushu."
# monologue
# JP: それに比しまったく目立たぬレム9100も、しかし同じく、\nナインスターズの屋台骨にして、オール九洲の象徴だ。
3820 = "So với nó, toa Remu 9100 hoàn toàn mờ nhạt, nhưng cũng giống như vậy,\nnó là trụ cột của Nine Stars và là biểu tượng của toàn Kyushu."
# 【真闇】
# display as 真闇
# JP: 「いっとう後ろの、展望デッキも美しかとねぇ。\nひーちゃん、よー頑張ってデザインしたね」
2594 = "「Đài quan sát ở tận cùng phía sau cũng đẹp lắm nhỉ.\nHi-chan đã rất cố gắng thiết kế đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん――その土地々々の風ば、\nやっぱり、感じてほしかったけん」
2360 = "「Vâng——Bởi vì em vẫn muốn mọi người\ncảm nhận được ngọn gió của từng vùng đất mà.」"
# monologue
# JP: 90系客車群は、大窓を選択した結果の、ハメ殺し。\n走行中は、そのままでは、風を感じることはできない。
3990 = "Nhóm toa hành khách dòng 90 sử dụng cửa sổ lớn cố định.\nKhi tàu đang chạy, hành khách không thể cảm nhận được gió nếu cứ ở trong phòng."
# monologue
# JP: ゆえに日々姫は、車両最後尾に展望デッキを設け、\n走行中も、そこに出られるようにした。
3370 = "Vì vậy, Hibiki đã thiết kế đài quan sát ở đuôi tàu,\nđể hành khách có thể ra ngoài ngay cả khi tàu đang chạy."
# 【双鉄】
# display as 雙鐵
# JP: 「試験走行は、苦労の連続だったものな」
2740 = "「Quá trình chạy thử nghiệm đúng là một chuỗi ngày vất vả mà.」"
# monologue
# JP: 言えばとたんに、日々姫は苦笑を浮かべてしまう。
3816 = "Vừa nhắc đến, Hibiki liền nở nụ cười gượng gạo."
# 【日々姫】
# display as 日日姬
# JP: 「あはは……よねぇ。\nこんデッキに、ひょっとしたら一番苦労させられたかも」
2314 = "「Ahaha……đúng vậy nhỉ.\nCó lẽ đài quan sát này là thứ khiến em vất vả nhất cũng nên.」"
# monologue
# JP: 試乗したふかみのスカートがまくれたり、\n凪が危うくおっこちかけたり。
3854 = "Nào là váy của Fukami bị tốc lên khi đi thử,\nnào là Nagi suýt nữa thì ngã nhào."
# monologue
# JP: そうした課題をひとつひとつ、工夫と知恵とを結晶させて\n潰して潰して――ようやく整った完成形だ。
3441 = "Từng vấn đề một, chúng tôi đã kết tinh công sức và trí tuệ\nđể giải quyết triệt để——và cuối cùng cũng hoàn thiện được hình hài này."
# 【日々姫】
# display as 日日姬
# JP: 「ばってん、苦労の甲斐ばあったと。九洲の風、\nこんデッキなら、気持ちよー味わってもらえるけん！」
2164 = "「Nhưng mà, công sức bỏ ra cũng đáng. Với đài quan sát này,\nmọi người sẽ có thể thoải mái tận hưởng ngọn gió của Kyushu!」"
# 【真闇】
# display as 真闇
# JP: 「そっか！　ひーちゃん、よーがんばったとね」
2564 = "「Vậy sao! Hi-chan, em đã cố gắng lắm rồi nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！」
2352 = "「Vâng!」"
# monologue
# JP: 日々姫が努力をまっすぐに真闇姉へと示している。\n真闇姉は、それを満面の笑顔で賞賛している。
3652 = "Hibiki đang bộc bạch những nỗ lực của mình với chị Mayami.\nChị Mayami thì nở nụ cười rạng rỡ khen ngợi con bé."
# monologue
# JP: その光景に、何故だか胸が熱くなる。\nごく当然の、姉妹の日常の、光景に。
3917 = "Nhìn cảnh tượng đó, không hiểu sao tôi lại thấy ấm lòng.\nMột cảnh tượng rất đỗi bình thường, thường ngày của hai chị em."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま、おまたせしました」
2887 = "「Ngài Soutetsu, để ngài phải đợi rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おかえりハチロク。\n打ち合わせは終わったのか？」
2195 = "「Mừng em trở lại, Hachiroku.\nHọp xong rồi sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、最後の微調整でしたので。\nこれでいつでも、完全な[きょうちょう,1]協調運転を行えます」
2588 = "「Vâng, vì chỉ là tinh chỉnh cuối cùng thôi ạ.\nBây giờ chúng ta đã có thể thực hiện điều khiển phối hợp hoàn hảo bất cứ lúc nào.」"
# 【真闇】
# display as 真闇
# JP: 「[きょうちょう,1]協調運転？」
2403 = "「Điều khiển phối hợp?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。御一夜－八ツ城間、今日の一号列車のみは、\n記念編成で走らせるからな」
2570 = "「Ừ. Giữa Ohimitera và Yatsushiro, chỉ riêng chuyến tàu số 1 hôm nay,\nsẽ chạy bằng đội hình kỷ niệm mà.」"
# monologue
# JP: 本務機8620。後補機D51 1031――これが基本となる\x%l編成;#00ffc040;編成%l;#;。
3673 = "Đầu máy chính 8620. Đầu máy phụ phía sau D51 1031——đây là \\x%l編成;#00ffc040;đội hình%l;#; cơ bản."
# monologue
# JP: そこに今日一日は、一日のみは――\n前補機として、キハ07sが8620の直後につくのだ。
3800 = "Và trong ngày hôm nay, chỉ duy nhất một ngày hôm nay——\nKiHa 07S sẽ được gắn ngay sau 8620 với vai trò đầu máy phụ phía trước."
# 【双鉄】
# display as 雙鐵
# JP: 「ぴったり出力をあわせねば、ロスと負荷とが発生する。\nそれを防止するために、ギリギリまで調整を詰めたのだ」
2427 = "「Nếu không khớp công suất chuẩn xác, sẽ xảy ra tổn hao và quá tải.\nĐể ngăn chặn điều đó, chúng tôi đã phải điều chỉnh sát sao đến phút cuối cùng.」"
# 【真闇】
# display as 真闇
# JP: 「そっか。みんながんばっとるのねぇ」
2808 = "「Vậy sao. Mọi người đều đang cố gắng nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。みんな。真闇姉ももちろん含むみんなのおかげで、\nようやく、今日を迎えられた」
2580 = "「Đúng vậy. Nhờ có mọi người. Tất nhiên là bao gồm cả chị Mayami nữa,\ncuối cùng chúng ta cũng đón được ngày hôm nay.」"
# monologue
# JP: 本当であればⅨ号にも記念編成に加わってほしかった。
3312 = "Thực ra tôi cũng muốn đầu máy số 9 tham gia vào đội hình kỷ niệm này."
# monologue
# JP: が、宗方\x%l機関士;#00ffc040;機関士%l;#;とオリヴィは、\nそうした僕らの申し出を、胸を張り堂々と断った。
3352 = "Nhưng, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata và Olivy\nđã hiên ngang, dõng dạc từ chối lời đề nghị đó của chúng tôi."
# 【真闇】
# display as 真闇
# JP: 「御一夜の……御一夜鉄道を支えてくれたみんなは。\n嬉しかとよね。こん晴れの舞台での、そん並び」
2485 = "「Mọi người... những người đã ủng hộ Đường sắt Ohimitera.\nChắc hẳn sẽ rất vui nhỉ. Khi thấy đội hình đó trên sân khấu rực rỡ này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
2351 = "「——Vâng.」"
# monologue
# JP: 宗方\x%l機関士;#00ffc040;機関士%l;#;とオリヴィは、\n真闇姉とまったく同じことを言った。
3426 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata và Olivy\ncũng nói y hệt như chị Mayami vậy."
# monologue
# JP: 『湯医線に残るべきは、自分たちとⅨ号』\n『キハ07sを、8620と並べて走らせてやって欲しい』と。
1619 = "『Những người nên ở lại tuyến Yui là chúng tôi và đầu máy số 9』\n『Mong cậu hãy để KiHa 07S chạy song hành cùng 8620』."
# 【双鉄】
# display as 雙鐵
# JP: 「まさしく、これこそ――\nナインスターズ一号列車にふさわしい記念編成だ」
2113 = "「Chính xác, đây mới là——\nđội hình kỷ niệm xứng đáng nhất với chuyến tàu Nine Stars số 1.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま」
2886 = "「Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2351 = "「嗯」" 
# monologue
# JP: 説明の間に手早く\x%l運転体;#00ffc040;運転体%l;#;への換装を終えたハチロクを、\nいつものように、膝の上へと抱き上げる。
3300 = "Tôi bế Hachiroku, người đã nhanh chóng thay sang \\x%l運転体;#00ffc040;thân chính%l;#; trong lúc tôi giải thích,\nlên đùi như mọi khi."
# monologue
# JP: 定位置へ落ち着けばすぐ、ハチロクはえへんと胸を張り、\n教師口調で、僕の不足を継ぎ足し始める。
3387 = "Vừa yên vị vào chỗ, Hachiroku liền ưỡn ngực tự hào,\nvà bắt đầu bổ sung những chỗ tôi nói thiếu bằng giọng điệu của một giáo viên."
# 【ハチロク】
# display as 八六
# JP: 「協調を機能させるためには、両方の[どうりょくしゃ,2]動力車の出力が\n一定していなければなりません」
2499 = "「Để điều khiển phối hợp hoạt động hiệu quả, công suất của cả hai toa xe động lực\nphải được giữ ổn định ạ.」"
# 【真闇】
# display as 真闇
# JP: 「あー、前のが遅くて後ろのが速かったら、\n後ろのにとって、前のは抵抗にしかならんゆーこと？」
2340 = "「À, nếu cái đi trước chậm mà cái đi sau nhanh,\nthì cái đi trước chỉ là lực cản đối với cái đi sau thôi phải không?」"
# 【ハチロク】
# display as 八六
# JP: 「その通りです。ですので、前――今回は[ハチロクニイマル,3]8620の\n運転操作に、[レ　イ　ナ　ナ,3]キハ07は連動しなければなりません」
2619 = "「Đúng vậy ạ. Do đó, hoạt động của xe đi trước——lần này là 8620\nphải đồng bộ với hoạt động điều khiển của KiHa 07 ạ.」"
# 【真闇】
# display as 真闇
# JP: 「どぎゃんして、連動されると？」
2493 = "「Làm thế nào để đồng bộ được vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「\x%l共感;#00ffc040;共感%l;#;です。双鉄さまの運転操作をわたくしが\x%l共感;#00ffc040;共感%l;#;で\nれいなに送り、れいながそれをキハ07に適用します」
2815 = "「Bằng \\x%l共感;#00ffc040;cộng cảm%l;#; ạ. Em sẽ truyền thao tác điều khiển của ngài Soutetsu\ncho Reina thông qua \\x%l共感;#00ffc040;cộng cảm%l;#;, rồi Reina sẽ áp dụng nó lên KiHa 07 ạ.」"
# 【真闇】
# display as 真闇
# JP: 「あー、ゆーたら」
2336 = "「À, nói cách khác là.」"
# monologue
# JP: 真闇姉の指が顎へとあてられる。
3761 = "Chị Mayami đưa ngón tay lên xoa cằm."
# 【真闇】
# display as 真闇
# JP: 「双ちゃんの[じょうききかんしゃ,3]8620運転が。リモコン操作で\n一緒に[まるっこいの,3]キハ07も動かす――みたいな感じとや？」
2449 = "「Hoạt động lái 8620 của Sou-chan. Giống như dùng điều khiển từ xa\nđể điều khiển luôn cả KiHa 07——kiểu vậy hả?」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。そのような協調を行うことにより、\nパワーロスを最小限に、重連を機能させられるのです」
2621 = "「Vâng, đúng vậy ạ. Bằng cách thực hiện phối hợp như thế,\nchúng ta có thể giảm thiểu tối đa tổn hao công suất và giúp hệ thống chạy ghép đôi hoạt động hiệu quả ạ.」"
# 【真闇】
# display as 真闇
# JP: 「ほーたら、双ちゃんは責任重大やねぇ」
2837 = "「Vậy thì, Sou-chan gánh trách nhiệm nặng nề lắm đấy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。責任は重大だ。\n僕はいつでも、お客様の命をお預かりしているのだから」
2636 = "「Vâng. Trách nhiệm rất nặng nề.\nBởi vì lúc nào em cũng đang nắm giữ sinh mạng của hành khách mà.」"
# monologue
# JP: 宗方さんの代理で、マッチ箱客車に学園生さんたちを乗せ、\nⅨ号でことこと、湯医行きの列車を引っ張るときも。
3212 = "Kể cả khi tôi thay mặt anh Munakata, chở các học sinh trên toa hành khách hộp diêm,\nvà kéo chuyến tàu hướng đến Yui bằng đầu máy số 9."
# monologue
# JP: ナインスターズ一号列車を記念編成で引く今日も。\n責任の重さは常に一定――極大だ。
3922 = "Và cả hôm nay, khi kéo chuyến tàu Nine Stars số 1 bằng đội hình kỷ niệm.\nTrách nhiệm vẫn luôn như vậy——cực kỳ to lớn."
# 【双鉄】
# display as 雙鐵
# JP: 「だから変わらず、きっちりと責任を果たしてみせる。\n僕一人で運転をするわけでもないし、大丈夫さ」
2535 = "「Thế nên em sẽ không thay đổi, nhất định sẽ hoàn thành tốt trách nhiệm của mình.\nEm cũng đâu có lái tàu một mình, nên không sao đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\nわたくしたちは、いつでも双鉄さまをお支えします」
2635 = "「Đúng vậy ạ.\nChúng em sẽ luôn hỗ trợ ngài Soutetsu bất cứ lúc nào.」"
# 【日々姫】
# display as 日日姬
# JP: 「チームやけんね。特別なことじゃなかけん」
2674 = "「Chúng ta là một đội mà. Đâu có gì đặc biệt đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2351 = "「嗯」" 
# monologue
# JP: 二人の言葉に頷けば、\n真闇姉もまた、嬉しげな笑顔で頷いてくれる。
3598 = "Tôi gật đầu trước lời nói của hai người,\nchị Mayami cũng nở nụ cười rạng rỡ gật đầu theo."
# 【真闇】
# display as 真闇
# JP: 「ほんなら、おねーちゃんは安心して、\n双ちゃんたちを見送れるとね」
2835 = "「Vậy thì, chị có thể yên tâm\ntiễn Sou-chan và mọi người rồi nhỉ.」"
# monologue
# JP: （ああ……）
3969 = "（A……）"
# monologue
# JP: 瞬間、ふっと思い出す。御一夜に戻ってきて、\nハチロクを目覚めさせた――あの日も丁度こうだった。
3915 = "Trong khoảnh khắc, tôi chợt nhớ lại. Ngày tôi trở về Ohimitera,\nvà đánh thức Hachiroku——ngày hôm đó cũng giống hệt thế này."
# monologue
# JP: 僕の頭上にナビがいて。日々姫がいて、真闇姉がいて。\nそしてハチロクと出会ったことで全てが動き出したのだ。
3995 = "Trên đầu tôi là Navi. Có Hibiki, có chị Mayami.\nVà cuộc gặp gỡ với Hachiroku đã khiến mọi thứ bắt đầu chuyển động."
# 【真闇】
# display as 真闇
# JP: 「ほんなら、頑張って！」
2830 = "「Vậy thì, cố lên nhé!」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、ねぇね、靴、ありがと」
2341 = "「A, chị Mayami, cảm ơn chị vì đôi giày nha.」"
# 【真闇】
# display as 真闇
# JP: 「どーいたしまして。楽しか旅をね？\nお客さんたちにも、双ちゃんたちも」
2439 = "「Không có gì đâu. Chúc mọi người có một chuyến đi vui vẻ nhé?\nCả hành khách và nhóm Sou-chan nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。かしこまりました」
2418 = "「Vâng. Đã rõ ạ.」"
# monologue
# JP: 真闇姉に、日々姫に、ハチロクに、ナビに。\n伝えたい気持ちはあるが、旨く言葉にまとまらない。
3569 = "Với chị Mayami, với Hibiki, với Hachiroku, với Navi.\nTôi có nhiều điều muốn nói, nhưng lại không thể sắp xếp thành lời."
# monologue
# JP: なんとかしようとあがいてみても、\n結局それは、ごく平凡にしか収まらない。
3211 = "Dù có cố gắng thế nào đi chăng nữa,\ncuối cùng nó cũng chỉ đọng lại bằng một câu nói rất đỗi bình thường."
# 【双鉄】
# display as 雙鐵
# JP: 「――ありがとう。気をつけて行ってくる」
1642 = "「——Cảm ơn chị. Bọn em đi đây.」"
# 【真闇】
# display as 真闇
# JP: 「ん。あ、そうだ」
2350 = "「Ừ. A, đúng rồi.」"
# monologue
# JP: 運転台から下りかけて、\n真闇姉がふとその足を止め、振り返る。
3327 = "Đang bước xuống từ buồng lái,\nchị Mayami chợt dừng bước, quay lại."
# 【真闇】
# display as 真闇
# JP: 「あんね、双ちゃん。\n父さんから、双ちゃんに伝言預かっとーよ」
2827 = "「Này, Sou-chan.\nBố có gửi lời nhắn cho em đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[とう,1]義父さんから？」
1630 = "「Từ bố nuôi ạ?」"
# 【真闇】
# display as 真闇
# JP: 「『ナインスターズ一号列車の運行開始おめでとう。\n御一夜に戻ったら、九つ星で一杯やろう』って」
2157 = "「『Chúc mừng chuyến tàu Nine Stars số 1 bắt đầu vận hành.\nKhi nào về Ohimitera, hai bố con mình cùng cạn ly Ngôi sao thứ chín nhé』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。『喜んで』と伝えておいて――\nああ、いや。戻ったら、僕から直接電話する」
2519 = "「Em hiểu rồi. Chị nhắn lại là 『Con rất sẵn lòng』 giúp em nhé——\nÀ, không. Khi nào về, em sẽ trực tiếp gọi điện cho bố.」"
# 【真闇】
# display as 真闇
# JP: 「うん。その方が良かね」
2363 = "「Ừ. Như thế tốt hơn đấy.」"
# monologue
# JP: 笑顔を残し、真闇姉がキャブから去れば、\n空気が一気に引き締まる。
3760 = "Để lại một nụ cười, chị Mayami rời khỏi buồng lái,\nbầu không khí lập tức trở nên căng thẳng."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2556 = "「Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「任せて！」
2434 = "「Giao cho em!」"
# monologue
# JP: \x%lポーカー;#00ffc040;ポーカー%l;#;を手に日々姫が焚き口戸を開けて、\n勢いもよく\x%l保火;#00ffc040;保火%l;#;状態の石炭の山を突き崩す。
3654 = "Hibiki cầm \\x%lポーカー;#00ffc040;cây cời than%l;#; mở cửa buồng đốt,\nmạnh mẽ đâm nát đống than đang ở trạng thái \\x%l保火;#00ffc040;giữ lửa%l;#;."
# monologue
# JP: （ボウっ！）
3974 = "（Phừng!）"
# monologue
# JP: 見ずとも熱気が、炎のあがりを伝えてくれる。\nすかさずザッと、石炭を投げ入れる小気味良い音。
3452 = "Dù không nhìn, hơi nóng vẫn truyền đến cho tôi biết ngọn lửa đang bùng lên.\nNgay sau đó là tiếng rào rào vui tai của than được ném vào."
# monologue
# JP: 蒸気圧計の針がじわじわ上がっていくにつれ、\n室温と僕の体温も上昇してくる。
3938 = "Khi kim đồng hồ đo áp suất hơi nước nhích dần lên,\nnhiệt độ phòng và nhiệt độ cơ thể tôi cũng tăng theo."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。今日の手順の最終確認を」
2198 = "「Hachiroku. Kiểm tra lần cuối quy trình hôm nay đi.」"
# 【ハチロク】
# display as 八六
# JP: 「試験時と変わりません。機関庫を出て入換線を進み、\n後進で本線に入り、待ち受けている車輌群と連結」
2734 = "「Không có gì thay đổi so với lúc thử nghiệm ạ. Rời khỏi xưởng đầu máy, tiến vào đường dồn toa,\nlùi vào đường chính và nối với nhóm toa xe đang chờ sẵn.」"
# 【日々姫】
# display as 日日姬
# JP: 「その先頭が、\n今日だけはキハ07ｓなことが、試験のときとの違い」
2257 = "「Điểm khác biệt duy nhất so với lúc thử nghiệm là,\nhôm nay toa dẫn đầu sẽ là KiHa 07S.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。連結後はすみやかに協調を結びますので、\nいつでも進行可能な状態となります」
2634 = "「Đúng vậy ạ. Sau khi nối xong, chúng ta sẽ lập tức thiết lập điều khiển phối hợp,\nnên có thể tiến lên bất cứ lúc nào ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「記念セレモニーなどは？\n御一夜駅でもあるのだろう？」
2700 = "「Còn lễ kỷ niệm thì sao?\nỞ ga Ohimitera cũng có đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「ございますが、わたくしたちは直後に運転ですので、\n参加はしないことになっております」
2735 = "「Có ạ, nhưng vì chúng ta phải lái tàu ngay sau đó,\nnên đã được quyết định là sẽ không tham gia ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「となれば、やって記念撮影くらいか」
2826 = "「Vậy thì, cùng lắm chỉ chụp ảnh lưu niệm thôi à.」"
# 【ハチロク】
# display as 八六
# JP: 「その辺は式典の流れもございましょうし……\nポーレット様のご指示に従えばよろしいかと――あっ」
2226 = "「Việc đó còn tùy thuộc vào diễn biến của buổi lễ nữa……\nEm nghĩ chúng ta cứ làm theo chỉ thị của thị trưởng Paulette là được ạ——A.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　信号」
2868 = "「Anh hai! Tín hiệu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2693 = "「Ừ.」"
# monologue
# JP: 表示が変わった。\n警戒速度で、まずはゆるゆる、入換線から２番線へ――
3257 = "Biển báo đã thay đổi.\nVới tốc độ cảnh giác, trước tiên cứ từ từ di chuyển từ đường dồn toa sang đường số 2——"
# monologue
# JP: そうするために、\x%lブレーキ;#00ffc040;ブレーキ%l;#;位置を“運転”に。\n\x%l逆転機;#00ffc040;逆転機%l;#;を\x%l前進フルギア;#00ffc040;前進フルギア%l;#;に入れ、\x%l加減弁;#00ffc040;加減弁%l;#;テコに手をかける。
3720 = "Để làm vậy, tôi gạt \\x%lブレーキ;#00ffc040;phanh%l;#; sang \"vị trí lái\".\nĐưa \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; vào \\x%l前進フルギア;#00ffc040;cài hết số tiến%l;#;, và đặt tay lên cần \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「[じょうない,1]場内、[けいかい,1]警戒！」
2397 = "「Trong ga, cảnh giác!」"
# monologue
# JP: 信号を再確認して、\x%l喚呼;#00ffc040;喚呼%l;#;して。
3532 = "Tôi kiểm tra lại tín hiệu và \\x%l喚呼;#00ffc040;hô xác nhận%l;#;."
# monologue
# JP: そして僕らはのろのろと、いつもと全く変わらぬペースで、\n晴れ舞台へと這い出していく。
3627 = "Rồi chúng tôi chậm rãi bò ra sân khấu rực rỡ,\nvới tốc độ không có gì khác biệt so với thường ngày."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに。まだだよー。\nまだ、まだ、そのまま――」
2873 = "「Anh hai. Vẫn chưa đâu.\nVẫn chưa, vẫn chưa, cứ tiếp tục——」"
# monologue
# JP: 助士側窓から思いっきり身を乗り出して、\n日々姫が連結誘導してくれる。
3650 = "Hibiki rướn hẳn người ra khỏi cửa sổ ghế phụ lái,\nhướng dẫn tôi thực hiện việc nối toa."
# 【ハチロク】
# display as 八六
# JP: 「…………」
1653 = "「…………」"
# monologue
# JP: ハチロクは、何も言わない。\nリラックスしきった表情で、日々姫に全てを任せてる。
3298 = "Hachiroku không nói gì cả.\nVới vẻ mặt vô cùng thư giãn, em ấy giao phó mọi thứ cho Hibiki."
# monologue
# JP: 僕も、同じだ。自分の目で確認は入れつつも、\n日々姫の声を優先し、細かなタイミングを取っている。
3511 = "Tôi cũng vậy. Dù vẫn tự mình xác nhận bằng mắt,\nnhưng tôi ưu tiên nghe theo giọng nói của Hibiki để canh thời gian chuẩn xác."
# 【日々姫】
# display as 日日姬
# JP: 「なーんもせんでね。そのまま～、そのまま～、\nやわやわ～、やわやわ～」
2144 = "「Đừng làm gì hết nha. Cứ thế~, cứ thế~\nchầm chậm thôi~, chầm chậm thôi~」"
# monologue
# JP: とうに\x%l絶気;#00ffc040;絶気%l;#;し、ただのろのろと\x%l惰行;#00ffc040;惰行%l;#;している。\n最後の行程――そのタイミングだけを待っている。
3320 = "Đã \\x%l絶気;#00ffc040;cắt hơi%l;#; từ lâu, giờ chỉ đang chậm rãi \\x%l惰行;#00ffc040;chạy quán tính%l;#;.\nChỉ chờ đợi thời điểm——cho công đoạn cuối cùng."
# 【日々姫】
# display as 日日姬
# JP: 「\x%lブレーキ;#00ffc040;ブレーキ%l;#;、運転～～～っ――今っ！」
2738 = "「\\x%lブレーキ;#00ffc040;Phanh%l;#;, vị trí lái~~~——Ngay bây giờ!」"
# monologue
# JP: （がちっ！）
3973 = "（Cạch!）"
# 【ハチロク】
# display as 八六
# JP: 「お見事です」
2653 = "「Tuyệt vời lắm ạ.」"
# monologue
# JP: ごくごく軽い連結ショックを感じてすぐに、\nぴたりと止まる。
3560 = "Ngay sau khi cảm nhận được một cú xóc cực kỳ nhẹ khi nối toa,\ncon tàu dừng lại ngay lập tức."
# 【ポーレット】
# display as 波萊特
# JP: 「連結良し！　すごく上手です」
2547 = "「Nối toa thành công! Giỏi lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2348 = "「Ừ——」"
# monologue
# JP: キャブから出ればすぐさまに、\nポーレットが、旗を揺らして駆け寄ってくる。
3539 = "Vừa bước ra khỏi buồng lái,\nPaulette đã vẫy cờ chạy đến chỗ chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。凄いにぎわいだな」
2381 = "「Paulette. Nhộn nhịp thật đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですよねー」
2571 = "「Đúng vậy nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「セレモニーはもう終わったのか？」
2201 = "「Lễ kỷ niệm kết thúc rồi à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「緊張しました～。[きゅうしゅうきゅうこく,3]九洲九国、[ゆかり]縁の殿様の末裔たちに、\n九洲[ななけん,1]七県の知事がずらりと勢揃いですから」
2265 = "「Em hồi hộp lắm~. Con cháu của các vị lãnh chúa có liên quan đến chín tỉnh Kyushu,\ncùng thống đốc của bảy tỉnh Kyushu đều tề tựu đông đủ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは壮観だっただろうな」
2843 = "「Chắc là hoành tráng lắm nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、それほどでもないですよ？」
2115 = "「Không, cũng không đến mức đó đâu ạ?」"
# monologue
# JP: 言って、青い瞳が僕から外れる。
3856 = "Nói rồi, đôi mắt xanh ấy dời khỏi tôi."
# monologue
# JP: 御一夜駅の――彼女のホームを、\nいとおしそうに、そっと眺める。
3414 = "Cô ấy âu yếm, lặng lẽ ngắm nhìn sân ga Ohimitera——\nsân ga của cô ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「この景色の方が、ずっと、ずーーーっと壮観です」
2805 = "「Cảnh tượng này mới hoành tráng hơn, hoành tráng hơn rất nhiều.」"
# monologue
# JP: ホームに綺麗な列を描くのは、\n乗車位置に並んでいる、幸せそうな家族連れたち。
3349 = "Xếp thành hàng ngay ngắn trên sân ga\nlà những gia đình trông thật hạnh phúc đang chờ lên tàu."
# monologue
# JP: その何十倍もの密度で隙間を埋めているのは、\nカメラを手にした、老若男女入り乱れている人たちだ。
3802 = "Và lấp đầy những khoảng trống với mật độ gấp hàng chục lần\nlà những người già trẻ lớn bé đang cầm máy ảnh trên tay."
# monologue
# JP: （ああ）
3978 = "（A）"
# monologue
# JP: １番線。湯医線側のホームにはⅨ号機関車が停車している。\nその傍らには、宗方\x%l機関士;#00ffc040;機関士%l;#;とオリヴィと。
3374 = "Đường số 1. Đầu máy số 9 đang đỗ ở sân ga phía tuyến Yui.\nBên cạnh là \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata và Olivy."
# 【宗方】
# display as 宗方
# JP: 「――」
# 1653 = "「……」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「イェイ！」
2725 = "「Yeah!」"
# monologue
# JP: 短い敬礼。\n僕らも、短く答礼する。
3245 = "Một cái chào cờ ngắn gọn.\nChúng tôi cũng đáp lại bằng một cái chào cờ ngắn gọn."
# monologue
# JP: ただそれだけで、十分だから。
3333 = "Chỉ cần như vậy là đủ rồi."
# 【ポーレット】
# display as 波萊特
# JP: 「見学にも、ご乗車の方にも外国人さん多いです。\n『[ここの]九つ[ぼし]星』のグランプリ効果、さまさまですね」
2110 = "「Có rất nhiều người nước ngoài đến tham quan và đi tàu.\nĐúng là nhờ hiệu ứng từ giải Grand Prix của 『Ngôi sao thứ chín』 nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だけではない。ヒノモトボンドや\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ボンドで\nナインスターズを知ってくれた人も多かろうし――」
2134 = "「Không chỉ vậy, chắc cũng có nhiều người biết đến Nine Stars\nqua trái phiếu Hinomoto hay trái phiếu \\x%lレイルロオド;#00ffc040;Railord%l;#; nữa——」"
# 【コン】
# display as 空
# JP: 「ケンっ！」
2268 = "「Ken!」"
# monologue
# JP: 僕の視線に答えるように甲高く鳴いたコン駅長が動くたび、\n見学客の一部も揃って、ぞろぞろその後をついていく。
3446 = "Mỗi khi ga trưởng Kon kêu lên lanh lảnh như để đáp lại ánh nhìn của tôi và di chuyển,\nmột phần khách tham quan cũng đồng loạt lũ lượt đi theo sau."
# monologue
# JP: ガイドをしているように見え――\nというか実際、ガイドをしてくれているのかもしれん。
3752 = "Trông cứ như đang làm hướng dẫn viên vậy——\nhay nói đúng hơn, có lẽ nhóc ấy đang làm hướng dẫn viên thật."
# 【双鉄】
# display as 雙鐵
# JP: 「ビラや新聞、ポスターに、ネットなどの広報告知。\n学園生や関係者の口コミや、駅長の力も大きかろう」
2816 = "「Tờ rơi, báo chí, áp phích, và các thông báo quảng cáo trên mạng.\nSự truyền miệng của học sinh và những người liên quan, cũng như sức mạnh của ga trưởng cũng đóng vai trò lớn nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですよね。もちろんです。そういう全部が、\nひとつにまとまってくれたからこそ、ですよね」
2356 = "「A, đúng vậy nhỉ. Tất nhiên rồi. Chính vì tất cả những điều đó\nđã hòa làm một, nên mới được như thế này nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2677 = "「Đúng vậy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ」
2375 = "「Ufufu」"
# monologue
# JP: なんと柔らかな笑顔だろう。\n改めて見れば、なんとか細く小さいのだろう。
3411 = "Một nụ cười thật dịu dàng.\nNhìn lại mới thấy, cô ấy thật mỏng manh và nhỏ bé biết bao."
# monologue
# JP: この細腕で、ずっと御一夜鉄道を――\n思いは、そのまま言葉に変わる。
3806 = "Với cánh tay nhỏ bé này, cô ấy đã luôn bảo vệ Đường sắt Ohimitera——\nSuy nghĩ ấy cứ thế biến thành lời nói."
# 【双鉄】
# display as 雙鐵
# JP: 「本当にみんなの力だが。\nその中で誰よりも、ポーレット。君の力が、一番大きい」
2810 = "「Thật sự là nhờ sức mạnh của tất cả mọi người.\nNhưng trong số đó, Paulette. Sức mạnh của em là lớn nhất.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？！　そんな、わたしなんて、なんにもっ」
2279 = "「Hả?! Không đâu, em chẳng làm gì cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「線路も、駅も、なにもかも。君が守ってくれていた。\nそれがなければ、何ひとつさえ始まらなかった」
2708 = "「Đường ray, nhà ga, mọi thứ. Em đã luôn bảo vệ chúng.\nNếu không có điều đó, thì đã chẳng có chuyện gì bắt đầu cả.」"
# 【ポーレット】
# display as 波萊特
# JP: 「……双鉄くん」
1685 = "「……Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕らに――ハチロクにさえ。鉄道の素晴らしさを\n思い出させてくれたのは、他ならぬ君だ、ポーレット」
2767 = "「Với bọn anh——thậm chí với cả Hachiroku. Người đã nhắc nhở bọn anh\nvề sự tuyệt vời của đường sắt, không ai khác chính là em, Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
2884 = "「Anh Soutetsu.」"
# monologue
# JP: ポーレットの顔が下を向く。\nぐっと、大きく肩が動く。
3706 = "Paulette cúi gầm mặt xuống.\nBờ vai cô ấy run lên bần bật."
# 【ポーレット】
# display as 波萊特
# JP: 「ダメ、ですよ。そんなこと言われたら、\nわたし、舞い上がっちゃうし――泣いちゃいます」
2802 = "「Không được đâu. Anh nói vậy,\nem sẽ sung sướng đến phát khóc mất——」"
# monologue
# JP: けれど、ポーレットがあげなおす顔は、\n見事な笑顔だ。
3356 = "Nhưng, khi Paulette ngẩng mặt lên,\nđó là một nụ cười rạng rỡ tuyệt đẹp."
# monologue
# JP: その笑顔のまま、うん、と力強く頷いて、\nポーレットは姿勢を改める。
3407 = "Giữ nguyên nụ cười đó, cô ấy gật đầu mạnh mẽ \"Vâng\",\nvà chấn chỉnh lại tư thế."
# 【ポーレット】
# display as 波萊特
# JP: 「全て順調、予定通りに進んでいます。\n双鉄くんも、定時の進行を前提に準備してください」
2092 = "「Mọi thứ đều suôn sẻ, đang tiến hành theo đúng kế hoạch.\nAnh Soutetsu cũng hãy chuẩn bị với tinh thần là sẽ xuất phát đúng giờ nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
# 2693 = "「知道了」" 
# 【ポーレット】
# display as 波萊特
# JP: 「それと、ギリギリになっちゃいましたけど――\nこれ、出ました、キャンセル。一室」
2821 = "「Với lại, hơi sát giờ một chút nhưng——\nĐây, có người hủy rồi ạ. Một phòng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「出たのか！」
2598 = "「Có người hủy rồi sao!」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。御一夜-[やつしろ,2]八ツ城の一区間。その区間だけの\nキャンセル待ちをいれてたのは、双鉄くん一人です」
2578 = "「Vâng. Một chặng từ Ohimitera đến Yatsushiro. Người đăng ký chờ hủy\ncho riêng chặng đó, chỉ có mỗi anh Soutetsu thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1652 = "「…………」"
# monologue
# JP: これだけの人気とにぎわいだ。\nあり得んことだ、と思っていた。
3903 = "Với sự nổi tiếng và nhộn nhịp thế này.\nTôi đã nghĩ chuyện đó là không thể nào."
# monologue
# JP: だから、ダメ元――言い訳をするような気持ちで、\nキャンセル待ちをお願いしてはいたのだが……
3602 = "Thế nên, tôi mới nhờ cô ấy cho vào danh sách chờ hủy\nvới tâm thế không còn gì để mất——như một lời bao biện, nhưng mà……"
# 【双鉄】
# display as 雙鐵
# JP: 「いいのか？　僕が買ってしまって」
2522 = "「Anh mua lại có ổn không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「なんで買っちゃいけないんですか？　\n代金も先払いでお預かりしてますし」
2654 = "「Tại sao lại không được mua chứ ạ?\nEm cũng đã nhận tiền ứng trước rồi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、この混雑でこの人気だ。\n実際に乗れない僕が、たとえ一区間だけといっても」
2167 = "「Nhưng mà, đông đúc và được yêu thích thế này.\nAnh thì lại không thể đi thực tế được, dù chỉ là một chặng đi chăng nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「乗るじゃないですか。ご家族と一緒に。\n子供のころの、双鉄くんが」
2560 = "「Chẳng phải anh sẽ đi sao. Cùng với gia đình.\nAnh Soutetsu của ngày bé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
2317 = "「!!」"
# monologue
# JP: 何も、ポーレットには言ってない。
3509 = "Tôi chưa hề nói gì với Paulette cả."
# monologue
# JP: ただ、万が一にキャンセルが出て埋まらなかったら、\n席を取らせて欲しいとそれだけ……頼んだだけだ。
3540 = "Chỉ là, ngộ nhỡ có người hủy mà phòng trống,\nthì hãy cho anh lấy phòng đó……tôi chỉ nhờ cô ấy như vậy thôi."
# 【ポーレット】
# display as 波萊特
# JP: 「だから、どうか旅してください。家族の旅を。\n鉄道網が、本当の意味で再び繋がり始める――この日に」
2537 = "「Thế nên, xin anh hãy đi chuyến đi này. Chuyến đi của gia đình.\nVào ngày mà mạng lưới đường sắt——thực sự bắt đầu kết nối lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……\nそれは僕の、個人的で感傷的なわがままで」
2162 = "「Nhưng……\nĐó chỉ là sự ích kỷ, cá nhân và ủy mị của anh thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんの個人的で感傷的なわがままが、\nみんなに、この日を。この列車をくれたんですよ？」
2169 = "「Sự ích kỷ cá nhân và ủy mị của anh Soutetsu,\nđã mang đến cho mọi người ngày hôm nay, mang đến chuyến tàu này mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2899 = "「!」"
# monologue
# JP: 本当に、わかってくれている。\n……だから、ようやく確信できる。
3529 = "Cô ấy thực sự, thực sự thấu hiểu tôi.\n……Vì thế, cuối cùng tôi cũng có thể chắc chắn."
# monologue
# JP: あの日に僕を助けてくれた、この澄み切った青い瞳は。\n再び僕をまっすぐ見つめて――見抜いてくれる。
3931 = "Đôi mắt xanh trong veo đã cứu tôi ngày hôm đó.\nMột lần nữa lại nhìn thẳng vào tôi——và nhìn thấu tâm can tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「個人的で……感傷的な、わがままで――」
2864 = "「Chỉ vì sự ích kỷ……cá nhân và ủy mị——」"
# monologue
# JP: どうしても、僕は列車を走らせたかった。
3723 = "Dù thế nào đi nữa, tôi cũng muốn cho tàu chạy."
# monologue
# JP: 途切れてしまったレールを繋ぎ、\n見知らぬ場所へ、新しい駅へ。辿り着かせてやりたかった。
3440 = "Muốn nối lại những đoạn đường ray đứt đoạn,\nvà đưa nó đến những vùng đất xa lạ, những nhà ga mới."
# 【ポーレット】
# display as 波萊特
# JP: 「だから、このキャンセルは。みんなから双鉄くんへの\nプレゼントだって、思ってもらえたら嬉しいです」
2529 = "「Thế nên, việc có người hủy phòng này. Em sẽ rất vui nếu anh xem nó\nnhư một món quà mà mọi người dành tặng anh Soutetsu.」"
# monologue
# JP: ……全てわかって、見守り続けていてくれた。
1622 = "……Cô ấy đã thấu hiểu tất cả, và luôn dõi theo tôi."
# monologue
# JP: 僕の願いが、公共の利益ともつながるように、\nただ黙々と、\x%lポイント;#00ffc040;ポイント%l;#;を切り替え続けてくれていた。
3449 = "Để mong ước của tôi cũng gắn liền với lợi ích chung,\ncô ấy chỉ âm thầm, liên tục chuyển \\x%lポイント;#00ffc040;ghi đường sắt%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「……知ってはいたが、知らなかった。\nポーレットは、とても強い女性なのだな」
1667 = "「……Anh đã biết, nhưng lại không hề biết.\nPaulette, em quả là một người phụ nữ rất mạnh mẽ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そんなの！　双鉄くんの百分の一も強くないです！\nでも、だからこそ、嬉しかったんですよ？」
2542 = "「Đâu có! Em còn chẳng mạnh mẽ bằng một phần trăm của anh Soutetsu nữa!\nNhưng, chính vì thế, em mới thấy vui mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「嬉しかった？」
2658 = "「Thấy vui?」"
# 【ポーレット】
# display as 波萊特
# JP: 「これです」
2702 = "「Là cái này ạ.」"
# monologue
# JP: ポーレットの指が伸びてくる。
3712 = "Paulette vươn ngón tay ra."
# monologue
# JP: 受け取ったまま、\nまだポケットにもしまえぬ切符を、そうっとなぞる。
3568 = "Nhẹ nhàng miết dọc theo tấm vé mà tôi vừa nhận,\nvẫn chưa kịp cất vào túi."
# 【ポーレット】
# display as 波萊特
# JP: 「頼まれたとき、わたし、はじめて感じたんです。\n大人になった双鉄くんが、弱い所を見せてくれた、って」
2390 = "「Khi được anh nhờ, lần đầu tiên em cảm thấy.\nAnh Soutetsu khi trưởng thành, đã cho em thấy sự yếu đuối của mình.」"
# 【双鉄】
# display as 雙鐵
# JP: 「大人になった僕が、か」
2865 = "「Anh khi trưởng thành, sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！？」
2319 = "「A!?」"
# monologue
# JP: 言ったとたんに、ポーレットの声が慌ててしまう。
3817 = "Vừa nói xong, giọng Paulette liền trở nên cuống quýt."
# 【ポーレット】
# display as 波萊特
# JP: 「あのっ、深い意味はないんです！　そのっ」
2801 = "「Dạ, không có ý nghĩa sâu xa gì đâu ạ! Cái đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。大丈夫だ。\n多分、僕にもわかっているし……同じ気持ちだと思う」
2331 = "「Ừ. Không sao đâu.\nChắc là, anh cũng hiểu……anh nghĩ mình cũng có chung cảm giác đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 2310 = "「啊」" 
# monologue
# JP: ポーレットの顔が安堵にゆるむ。\nならば、やっぱりそうなのだろう。
3705 = "Khuôn mặt Paulette giãn ra vì nhẹ nhõm.\nVậy thì, quả nhiên là như thế rồi."
# monologue
# JP: 幼少期の僕とポーレットとの思い出ならば――\n大事だからこそ、後日に、もっとゆっくり語り合いたい。
3455 = "Nếu là những kỷ niệm thời thơ ấu giữa tôi và Paulette——\nVì nó rất quan trọng, nên tôi muốn sau này sẽ cùng nhau tâm sự chậm rãi hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「今はお互い、それぞれの仕事に集中しよう」
2673 = "「Bây giờ, cả hai chúng ta hãy tập trung vào công việc của mình đã.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい！　了解です、双鉄くん！」
2425 = "「Vâng! Đã rõ thưa anh Soutetsu!」"
# monologue
# JP: 笑顔で言って、くるりと僕に背中を向けて、\nポーレットは、早足でホームの人並みに溶けこんでいく。
3711 = "Nói với nụ cười rạng rỡ, Paulette quay lưng lại với tôi,\nrồi rảo bước hòa vào dòng người trên sân ga."
# monologue
# JP: 入れ替わりこちらへやってくるのは――
3808 = "Và người tiến về phía này thay thế cô ấy là——"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、\n今日は[りょそう,1]旅装の稀咲をみられるかと思ったのだが」
2347 = "「Gì chứ,\nanh cứ tưởng hôm nay sẽ được thấy Kisaki mặc đồ du lịch cơ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクは単なるお供だからね。\nというか……まぁぶっちゃけ、商談相手？」
2514 = "「Em chỉ là người đi cùng thôi mà.\nHay nói đúng hơn……nói thẳng ra là đối tác làm ăn?」"
# 【双鉄】
# display as 雙鐵
# JP: 「商談相手」
2752 = "「Đối tác làm ăn.」"
# monologue
# JP: 稀咲の言葉が意外にすぎて、オウム返しをしてしまった。
3773 = "Lời nói của Kisaki quá đỗi bất ngờ, khiến tôi vô thức lặp lại như một con vẹt."
# 【双鉄】
# display as 雙鐵
# JP: 「大陸の――\n[ちゅうごく,1]仲国のご友人の招待なのだろう？」
2173 = "「Chẳng phải em được mời bởi một người bạn ở Đại lục——\nTrung Quốc sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクの友人じゃない。父の旧友の娘さん」
2142 = "「Không phải bạn em. Là con gái của bạn cũ bố em.」"
# monologue
# JP: その方が、純粋に抽選に打ち勝って、\nナインスターズにご乗車をされることとなった。
3810 = "Người đó đã hoàn toàn chiến thắng trong cuộc bốc thăm,\nvà trở thành hành khách trên chuyến tàu Nine Stars."
# monologue
# JP: 『一人旅も味気ないから』と、稀咲が同乗を誘われたのは、\nそうした理由と聞いた気がしたのだが――
3586 = "Tôi nhớ mình từng nghe lý do Kisaki được rủ đi cùng là\n『Đi du lịch một mình cũng tẻ nhạt』——"
# 【稀咲】
# display as 稀咲
# JP: 「残念ながら、ボクには今回は乗車を楽しむ余裕は無い。\nけど彼女は仕事だから。全力で乗車を楽しむだろうね」
2531 = "「Tiếc là lần này em không có thời gian để tận hưởng chuyến đi.\nNhưng cô ấy đi vì công việc. Chắc chắn cô ấy sẽ dốc toàn lực để tận hưởng chuyến đi này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「仕事だから、全力で、乗車を、楽しむ」
2469 = "「Vì công việc, nên dốc toàn lực, tận hưởng, chuyến đi.」"
# monologue
# JP: 即座には意味が繋がらない。\n仕事で乗車……乗務、ではなく――
3502 = "Tôi không thể lập tức xâu chuỗi ý nghĩa của câu nói đó.\nĐi tàu vì công việc……không phải làm nhiệm vụ, mà là——"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ！　もしかして」
2316 = "「A! Không lẽ nào.」"
# 【稀咲】
# display as 稀咲
# JP: 「可能性はあると思う。というか、彼女の性格からして、\n少なくともボクは――『その可能性しか感じない』」
2599 = "「Em nghĩ là có khả năng đó. Mà với tính cách của cô ấy,\nít nhất thì em——『Chỉ cảm thấy có khả năng đó thôi』.」"
# monologue
# JP: 性格がどうかは詳しく知らんが、\n立場のことなら知っている。
3493 = "Tính cách thế nào thì tôi không rõ,\nnhưng vị thế của cô ấy thì tôi biết."
# monologue
# JP: “元忠さんの旧友”が、\n仲国政府の、交通系の、かなりの要職にあることならば。
3797 = "\"Bạn cũ của ngài Mototada\" là một nhân vật giữ chức vụ\nkhá quan trọng trong hệ thống giao thông của chính phủ Trung Quốc."
# 【双鉄】
# display as 雙鐵
# JP: 「……ナインスターズのような豪華リレートレインを、\nもしも、仲国で走らせられるなら――」
2432 = "「……Một chuyến tàu du lịch chuyển tiếp sang trọng như Nine Stars,\nnếu có thể cho chạy ở Trung Quốc thì——」"
# monologue
# JP: それは、計り知れないほど大きな規模のビジネスになる。
3927 = "Đó sẽ là một phi vụ kinh doanh với quy mô lớn không thể đong đếm được."
# monologue
# JP: 日ノ本鉄路・術仙車両工場で、\n果たして対応しきれるものか、些か不安になる程の――
3313 = "Đến mức khiến tôi hơi lo lắng, không biết\nNhà máy chế tạo toa xe Jussen - Đường sắt Hinomoto có thể kham nổi không——"
# 【稀咲】
# display as 稀咲
# JP: 「そういう意味でも、今日は良い運転を頼むよ？　双鉄」
2459 = "「Với ý nghĩa đó, hôm nay anh phải lái cho thật tốt đấy nhé? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。安心して欲しい」
2853 = "「Tất nhiên rồi. Cứ yên tâm.」"
# 【ふかみ】
# display as 深美
# JP: 「ですね。双鉄さんは、“今日も”、どんなときでも、\n必ず、最高の運転をこころがけてくれてますから」
2695 = "「Đúng vậy ạ. Anh Soutetsu 'hôm nay cũng vậy', dù là lúc nào,\ncũng luôn cố gắng mang đến những chuyến đi tuyệt vời nhất mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「おっと！　そうだった。これは失礼」
2303 = "「Ái chà! Đúng rồi nhỉ. Thật là thất lễ.」"
# monologue
# JP: ずっと黙って聞いてたふかみに、\n釘を刺されて稀咲が笑う。
3830 = "Bị Fukami nãy giờ vẫn im lặng lắng nghe\nnói trúng tim đen, Kisaki bật cười."
# monologue
# JP: ふかみが、稀咲に、釘を刺した――\nああ、本当に成長したなと、しみじみ感じる。
3814 = "Fukami, đã nói trúng tim đen của Kisaki——\nChà, tôi thấm thía cảm nhận được con bé thực sự đã trưởng thành rồi."
# 【稀咲】
# display as 稀咲
# JP: 「なら、キミたちを最大限に信頼しつつ、\nボクは、ボクの仕事を頑張ってくるよ」
2846 = "「Vậy thì, trong khi đặt niềm tin tối đa vào mọi người,\nem sẽ đi cố gắng hoàn thành công việc của mình đây.」"
# monologue
# JP: ひらりと、稀咲が手を振る。\nそのままあっさり、\x%l客車;#00ffc040;客車%l;#;の方へと消えていく。
3775 = "Kisaki vẫy tay nhẹ nhàng.\nRồi cứ thế dứt khoát khuất bóng về phía \\x%l客車;#00ffc040;toa hành khách%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「よい旅を」
2696 = "「Chuyến đi vui vẻ nhé.」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクのお供も八ツ城までだけだけどね。\nともあれ、キミたちもよい旅を！」
2508 = "「Em cũng chỉ đi cùng đến Yatsushiro thôi.\nDù sao thì, mọi người cũng có một chuyến đi vui vẻ nhé!」"
# 【ふかみ】
# display as 深美
# JP: 「あはは。旅、じゃないですけどね、わたしたちは」
2294 = "「Ahaha. Dù chúng ta không phải đi du lịch đâu nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、乗務だ」
2637 = "「Đúng vậy, là làm nhiệm vụ.」"
# monologue
# JP: ――車掌姿が、よく似合っている。\nナインスターズ専務車掌。その第一号。早瀬ふかみ。
3226 = "——Bộ đồng phục trưởng tàu rất hợp với con bé.\nTrưởng tàu chuyên trách Nine Stars. Người đầu tiên đảm nhận vị trí này. Hayase Fukami."
# monologue
# JP: 研修に出て、本当に多くを持ち帰ってきてくれて――\nふかみなくして、今のナインスターズはなかっただろう。
3403 = "Con bé đã đi tu nghiệp và mang về rất nhiều điều quý giá——\nNếu không có Fukami, có lẽ đã không có Nine Stars của ngày hôm nay."
# 【双鉄】
# display as 雙鐵
# JP: 「だが旅が、日常から非日常に出掛けることであるのなら。\n今日一日のみは、僕らの乗務も、旅であろうさ」
2538 = "「Nhưng nếu du lịch là việc thoát khỏi sự bình thường để đến với những điều khác thường.\nThì chỉ riêng ngày hôm nay, nhiệm vụ của chúng ta cũng là một chuyến du lịch.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
2308 = "「A——」"
# monologue
# JP: 一号列車を無事届けたなら、\n次の乗務からその先は、すぐに日常に変わるのだろうが。
3422 = "Nếu đưa chuyến tàu số 1 đến đích an toàn,\nthì từ nhiệm vụ tiếp theo trở đi, nó sẽ sớm trở thành một công việc thường ngày thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「気負いすぎるな、ふかみ。ふかみももはや鉄道員だ。\n大丈夫。必要な全ては、既に体に染み付いている」
2651 = "「Đừng quá áp lực, Fukami. Giờ em cũng đã là nhân viên đường sắt rồi.\nKhông sao đâu. Mọi thứ cần thiết đều đã thấm nhuần vào cơ thể em rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「はい」
2419 = "「Vâng ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、乗務をきっちりこなしたその上で――\n乗車も、旅も。僕は、ふかみにも楽しんで欲しい」
2534 = "「Thế nên, ngoài việc hoàn thành tốt nhiệm vụ——\nCả việc đi tàu, cả chuyến đi này. Anh cũng muốn Fukami tận hưởng nó.」"
# monologue
# JP: ふかみ一人だけにではなく。ハチロクと日々姫にも。\nポーレットとれいなにも。凪と中村さんとみくろにも。
3331 = "Không chỉ riêng Fukami. Cả Hachiroku và Hibiki nữa.\nCả Paulette và Reina. Cả Nagi, anh Nakamura và Mikuro."
# 【双鉄】
# display as 雙鐵
# JP: 「楽しめるだけの余裕を持とう。そうすることが、\nより高度な安全にも、お客さまの楽しみにも繋がるさ」
2467 = "「Hãy giữ cho mình sự thong dong đủ để tận hưởng. Làm như vậy,\ncũng sẽ dẫn đến sự an toàn cao hơn và mang lại niềm vui cho hành khách.」"
# 【ふかみ】
# display as 深美
# JP: 「ですね！　わかりました、双鉄おにいさん」
2604 = "「Đúng vậy nhỉ! Em hiểu rồi, anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2304 = "「!」"
# monologue
# JP: 久々に、\n出会ったころと同様に、僕を双鉄『おにいさん』と呼び。
3400 = "Đã lâu lắm rồi,\ncon bé mới gọi tôi là \"anh\" Soutetsu giống như hồi mới quen."
# monologue
# JP: けれどふかみは、出会ったころには見られなかった、\n力強くて軽やかで、明るい笑顔を浮かべてみせる。
3731 = "Thế nhưng Fukami lại nở một nụ cười rạng rỡ, mạnh mẽ và nhẹ nhõm\nmà hồi mới quen tôi chưa từng thấy."
# 【ふかみ】
# display as 深美
# JP: 「楽しむ余裕を作るためにも、\n早瀬ふかみ、笑顔で乗務、がんばってきます！」
2141 = "「Để tạo ra sự thong dong tận hưởng chuyến đi,\nHayase Fukami sẽ cố gắng làm nhiệm vụ với nụ cười trên môi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。よろしく頼む。よい乗務を」
2338 = "「Ừ. Trông cậy vào em đấy. Chúc em làm nhiệm vụ suôn sẻ.」"
# 【ふかみ】
# display as 深美
# JP: 「はいです！　右田\x%l機関士;#00ffc040;機関士%l;#;もご安全に。よい乗務を！」
2421 = "「Vâng ạ! \\x%l機関士;#00ffc040;Lái tàu%l;#; Migita cũng giữ an toàn nhé. Chúc anh làm nhiệm vụ suôn sẻ!」"
# monologue
# JP: （ぽっ！）
3972 = "（Bíp!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っと」
2346 = "「Ây da.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、お帰り。\nカマばもう、待ちきれないって騒いどるばい」
2871 = "「Anh hai, mừng anh trở lại.\nLò hơi đang ồn ào vì không thể chờ thêm được nữa rồi kìa.」"
# 【ハチロク】
# display as 八六
# JP: 「協調運転、準備良しです。\n信号次第で、いつでも出発可能です」
2402 = "「Điều khiển phối hợp, chuẩn bị tốt ạ.\nTùy thuộc vào tín hiệu, chúng ta có thể xuất phát bất cứ lúc nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2351 = "「嗯」" 
# monologue
# JP: 息を吸い、吐く。\n力みは無い。恐怖も無い。
3572 = "Tôi hít vào, thở ra.\nKhông hề căng thẳng. Cũng không hề sợ hãi."
# monologue
# JP: だけれど不安は、少しある。\n少しあるから、わくわくしながら前へ進める。
3249 = "Nhưng vẫn có chút bất an.\nChính vì có chút bất an, nên tôi mới có thể háo hức tiến về phía trước."
# 【双鉄】
# display as 雙鐵
# JP: 「僕たち自身が、誰より楽しい旅をしよう。\n安全で快適な――鉄道旅行の時間を、過ごそう」
2511 = "「Bản thân chúng ta hãy tận hưởng chuyến đi này hơn bất kỳ ai.\nHãy cùng trải qua khoảng thời gian du lịch bằng đường sắt——thật an toàn và thoải mái nào.」"
# 【ハチロク】
# display as 八六
# JP: 「はい！　双鉄さまっ！」
2586 = "「Vâng! Ngài Soutetsu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、行こう！」
2833 = "「Vậy thì, đi thôi!」"
# monologue
# JP: ハチロクを発車ベルごと抱きかかえたなら、\n大きく高く、澄んだ鐘の音が響き渡る。
3305 = "Khi tôi ôm lấy Hachiroku cùng với chiếc chuông xuất phát,\nâm thanh trong trẻo của tiếng chuông vang lên thật to và vang xa."
# monologue
# JP: （ガランガラ～ン！　ガランガラ～ン！）
3975 = "（Keng keng keng~! Keng keng keng~!）"
# monologue
# JP: そして、信号が青になる。
3616 = "Và rồi, tín hiệu chuyển sang màu xanh."
# monologue
# JP: 僕たちだけが、\nこの先の線路へと踏み込むことを許される。
3744 = "Chỉ có chúng tôi,\nmới được phép bước vào đoạn đường ray phía trước."
# monologue
# JP: （ボっ、ボっ、ボっ、ボっ）
3971 = "（Bịch, bịch, bịch, bịch）"
# monologue
# JP: \x%lブラスト;#00ffc040;ブラスト%l;#;音が、鼓動と重なる。
109 = "Tiếng \\x%lブラスト;#00ffc040;khí thải xi lanh%l;#; hòa nhịp cùng nhịp đập trái tim."
# monologue
# JP: \x%lブレーキ;#00ffc040;ブレーキ%l;#;を運転位置にし、\x%l前進フルギア;#00ffc040;前進フルギア%l;#;。\n\x%l加減弁;#00ffc040;加減弁%l;#;テコに手をかける。
3552 = "Tôi gạt \\x%lブレーキ;#00ffc040;phanh%l;#; sang vị trí lái, \\x%l前進フルギア;#00ffc040;cài hết số tiến%l;#;.\nĐặt tay lên cần \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「出発、進行」
2208 = "「Xuất phát, tiến lên.」"
# monologue
# JP: いつもどおりの決まった動作をいつもどおりに行えば、\n8620も、いつもどおりに答えてくれる。
3579 = "Thực hiện những động tác quen thuộc như thường lệ,\n8620 cũng đáp lại tôi như thường lệ."
# monologue
# JP: （ポーーーーーーーーっ！）
3970 = "（Tuúúúúúúúúúúú!）"
# monologue
# JP: \x%l汽笛;#00ffc040;汽笛%l;#;一声。\n喧騒にまみれるキャブ内にまで響くホームの客の歓声。
116 = "Một tiếng \\x%l汽笛;#00ffc040;còi hơi nước%l;#; vang lên.\nTiếng reo hò của hành khách trên sân ga vang vọng vào tận trong buồng lái ồn ào."
# monologue
# JP: そして、ゆっくり、8620の\x%l動輪;#00ffc040;動輪%l;#;が廻り始める。\nレールを掴み、力強く、僕らを彼方へ運び始める。
3728 = "Và rồi, \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; của 8620 chậm rãi bắt đầu quay.\nBám chặt lấy đường ray, mạnh mẽ đưa chúng tôi về phía chân trời."
# 【日々姫】
# display as 日日姬
# JP: 「わぁっ！」
2289 = "「Oa!」"
# monologue
# JP: 日々姫の声。\n感動の声。
3659 = "Giọng của Hibiki.\nGiọng nói đầy xúc động."
# monologue
# JP: 僕もだ――体が、震えてる。
3513 = "Tôi cũng vậy——cơ thể đang run lên."
# 【ハチロク】
# display as 八六
# JP: 「嬉しく楽しいことですね。\n新しい線路を走るのは」
2730 = "「Thật là một điều vui vẻ và hạnh phúc nhỉ.\nKhi được chạy trên một đoạn đường ray mới.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2571 = "「是啊」" 
# monologue
# JP: 臨時ダイアで、発車時刻を揃えてある。
3523 = "Theo biểu đồ chạy tàu tạm thời, giờ xuất phát đã được sắp xếp trùng nhau."
# monologue
# JP: 御一夜を出てしばらくは、\n湯医線、湯医に向かうⅨ号機関車と併走だ。
3916 = "Sau khi rời Ohimitera một đoạn,\nchúng tôi sẽ chạy song song với đầu máy số 9 hướng về Yui trên tuyến Yui."
# 【双鉄】
# display as 雙鐵
# JP: 「――嬉しいな。そして、楽しい」
1639 = "「——Vui thật đấy. Và cũng thật hạnh phúc.」"
# monologue
# JP: 踏切がある。人がみっちり、8620を見守っている。
3326 = "Có một điểm giao cắt đường sắt. Rất đông người đang dõi theo 8620."
# monologue
# JP: 踏切番のボランティアさん達も一緒になって、\nみんなが大きく、大きく大きく手を振っている。
3608 = "Cùng với các tình nguyện viên gác chắn,\nmọi người đang vẫy tay thật mạnh, thật mạnh."
# monologue
# JP: （ポーーーーーーーーっ！）
# 3970 = "（啵——！）" 
# monologue
# JP: \x%l汽笛;#00ffc040;汽笛%l;#;で応える。
3565 = "Tôi đáp lại bằng tiếng \\x%l汽笛;#00ffc040;còi hơi nước%l;#;."
# monologue
# JP: 弾ける笑顔が、\n一瞬にして煙とともに、僕らの後ろに流れて溶ける。
3844 = "Những nụ cười rạng rỡ,\ntrong chớp mắt đã trôi về phía sau và hòa vào làn khói."
# monologue
# JP: （ぽっ！）
# 3972 = "（啵！）" 
# monologue
# JP: 僕らのレールが大きく曲がる寸前に、\nⅨ号が\x%l汽笛;#00ffc040;汽笛%l;#;を鳴らしてくれる。
3382 = "Ngay trước khi đường ray của chúng tôi bẻ một khúc cua lớn,\nđầu máy số 9 đã kéo \\x%l汽笛;#00ffc040;còi hơi nước%l;#; chào chúng tôi."
# monologue
# JP: よい旅を――\n願いをこめて、鳴らしてくれる。
3246 = "Chúc chuyến đi tốt lành——\nTiếng còi mang theo lời chúc ấy vang lên."
# monologue
# JP: （ぽっ！）
# 3972 = "（啵！）" 
# monologue
# JP: \x%l汽笛;#00ffc040;汽笛%l;#;で答え、直進していくⅨ号列車に別れを告げる。
3521 = "Tôi đáp lại bằng \\x%l汽笛;#00ffc040;còi hơi nước%l;#;, gửi lời chào tạm biệt đến chuyến tàu số 9 đang đi thẳng."
# monologue
# JP: 僕らの走る肥颯線は、\n小畑へと、屋岳越えへと向かっていくから。
3526 = "Bởi vì tuyến Hisatsu mà chúng tôi đang chạy,\nsẽ hướng đến Kobata, vượt qua núi Yadake."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l制限;#00ffc040;制限%l;#;、解除――よしっ！」
1635 = "「\\x%l制限;#00ffc040;Giới hạn tốc độ%l;#;, hủy bỏ——Tốt!」"
# monologue
# JP: だから、僕らは加速する。\n新しい笑顔の待つ場所へ。
3600 = "Thế nên, chúng tôi tăng tốc.\nĐến nơi có những nụ cười mới đang chờ đợi."
# monologue
# JP: 見たことの無い未来へ向けて、\n次々石炭を投げ込んで、一直線に加速していく――
3527 = "Hướng tới một tương lai chưa từng thấy,\nchúng tôi liên tục ném than vào lò, tăng tốc chạy thẳng một mạch——"
# 【双鉄】
# display as 雙鐵
# JP: 「それでは。よろしくお願いします」
2862 = "「Vậy thì. Trăm sự nhờ anh.」"
# monologue
# JP: 90系客車群、客車３両に食堂車一両、\nそしてレム9100とを、引き渡す。
3991 = "Tôi bàn giao nhóm toa hành khách dòng 90, ba toa hành khách và một toa ăn,\ncùng với toa Remu 9100."
# monologue
# JP: 復元された特急系\x%l電車;#00ffc040;電車%l;#;、\x%lクハ26;#00ffc040;クハ26%l;#;-000と、その\x%l編成;#00ffc040;編成%l;#;に。
3613 = "Cho \\x%l電車;#00ffc040;tàu điện%l;#; tốc hành đã được phục chế, \\x%lクハ26;#00ffc040;Kuha 26%l;#;-000 và \\x%l編成;#00ffc040;đội hình%l;#; của nó."
# 【赤井】
# display as 赤井
# JP: 「リレートレイン・ナインスターズ。\n[やつしろ,2]八ツ城－[くまもと,1]隈元間、引き継ぎました」
2548 = "「Chuyến tàu du lịch chuyển tiếp Nine Stars.\nĐoạn từ Yatsushiro đến Kumamoto, tôi xin nhận bàn giao.」"
# monologue
# JP: そして\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の物を模した\x%lタブレット;#00ffc040;タブレット%l;#;――\nリレートレインの象徴は、僕から赤井\x%l運転士;#00ffc040;運転士%l;#;へと。
3554 = "Và \\x%lタブレット;#00ffc040;thẻ bảng%l;#; mô phỏng đồ của \\x%lレイルロオド;#00ffc040;Railord%l;#;——\nbiểu tượng của chuyến tàu chuyển tiếp, được tôi trao lại cho \\x%l運転士;#00ffc040;lái tàu%l;#; Akai."
# 【双鉄】
# display as 雙鐵
# JP: 「この先、よろしくおねがいします」
2123 = "「Đoạn đường phía trước, nhờ cả vào anh.」"
# 【赤井】
# display as 赤井
# JP: 「お任せください。\nお預かりした笑顔を必ず、隈元駅へと届けます」
2766 = "「Cứ giao cho tôi.\nTôi nhất định sẽ đưa những nụ cười được gửi gắm này đến ga Kumamoto an toàn.」"
# monologue
# JP: 握手する。\n天才と称されたベテランの、線が細いのに力強い手と。
3525 = "Chúng tôi bắt tay.\nMột cái bắt tay với người cựu binh được mệnh danh là thiên tài, bàn tay tuy mảnh khảnh nhưng lại vô cùng mạnh mẽ."
# 【ニイロク】
# display as 二六
# JP: 「ふふっ」
2270 = "「Fufu」"
# monologue
# JP: ニイロクが笑う、とても自然に。\nそれを合図に、眩いフラッシュの花々が咲く。
3237 = "Niiroku cười, một nụ cười rất tự nhiên.\nNhư một tín hiệu, những bông hoa flash chói lóa đồng loạt nở rộ."
# 【ポーレット】
# display as 波萊特
# JP: 「お疲れ様です、双鉄くん。\nあとはわたしが」
2780 = "「Anh vất vả rồi, anh Soutetsu.\nPhần còn lại cứ để em lo.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いつも本当にすまんが――頼む」
2722 = "「Lúc nào cũng làm phiền em thật ngại quá——nhờ em nhé.」"
# monologue
# JP: キハ07sから下りてくれたポーレットへと、\nマスコミ対応を任せてしまう。
3591 = "Tôi giao lại việc đối phó với giới truyền thông\ncho Paulette, người vừa bước xuống từ KiHa 07S."
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅ」
2271 = "「Phù……」"
# monologue
# JP: 慣れ親しんだキャブへ戻って、タイを緩める。
3546 = "Trở lại buồng lái quen thuộc, tôi nới lỏng cà vạt."
# 【双鉄】
# display as 雙鐵
# JP: 「慣れぬことゆえ、妙に緊張してしまった。\nすまんが、水をもらえるか――あれ？」
2804 = "「Vì chưa quen nên anh thấy căng thẳng lạ thường.\nXin lỗi, cho anh xin ngụm nước được không——ủa?」"
# monologue
# JP: いない。ハチロクも日々姫も。\n二人とも下りているらしく、運転台には僕だけだ。
3207 = "Không có ai cả. Cả Hachiroku và Hibiki.\nCó vẻ hai người họ đã xuống tàu, trên buồng lái chỉ còn mỗi mình tôi."
# monologue
# JP: 一人になるのはなんだか久しぶりな気がして、\nホっとしつつも、少し寂しいようにも感じる。
3496 = "Cảm giác lâu lắm rồi mới lại ở một mình,\ntôi vừa thấy nhẹ nhõm, lại vừa thấy có chút cô đơn."
# monologue
# JP: （ゴンゴン）
3967 = "（Cốc cốc）"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2373 = "「嗯？」" 
# monologue
# JP: 思う間も無く、来客だ。\nキャブの鉄戸を開けば笑顔が飛び込んでくる！
3923 = "Chưa kịp suy nghĩ gì thì đã có khách đến.\nVừa mở cánh cửa sắt của buồng lái ra, một nụ cười đã lao thẳng vào tôi!"
# 【れいな】
# display as 玲奈
# JP: 「えっへへ～！　れいな、がんばったですよぉ！\nそうてつさん、たくさんたくさんほめてくださぁい」
2379 = "「Ê hê hê~! Reina đã cố gắng lắm đó nha!\nAnh Soutetsu, hãy khen Reina thật nhiều thật nhiều đi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。れいなはえらいな！」
2368 = "「Ừ. Reina ngoan lắm!」"
# monologue
# JP: 言われるままに抱きとめる。
3593 = "Tôi ôm lấy con bé theo lời vòi vĩnh."
# monologue
# JP: 心の底からの感謝を込めて、\n柔らかな髪をおもいっきりに撫でまくる。
3727 = "Với lòng biết ơn từ tận đáy lòng,\ntôi vuốt ve mái tóc mềm mại của con bé thỏa thích."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなのおかげで、普段とまるで変わらなかった。\n協調運転ということを、全く意識せずすんだ」
2404 = "「Nhờ có Reina mà mọi thứ chẳng khác gì thường ngày cả.\nAnh hoàn toàn không phải bận tâm đến việc điều khiển phối hợp luôn.」"
# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、がんばりましたからぁ！\nもーっとれいなをほめたりしても、いいですよ？」
2377 = "「Ê hê hê, vì em đã cố gắng mà!\nAnh khen Reina nhiều hơn nữa cũng được đó nha?」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいなはすごい！　まさに\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の[かがみ]鑑だ。\nやるときはやる。こう見えていぶし銀の実力派だ」
2665 = "「Reina tuyệt lắm! Quả đúng là tấm gương sáng của \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nKhi cần là làm được ngay. Trông thế này thôi chứ thực lực đáng gờm lắm đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「わわわわ、れいな、\nものすごおくほめられちゃってますぅ～」
2282 = "「Oa oa oa oa, Reina,\nđang được khen ngợi hết lời luôn này~」"
# monologue
# JP: ぽわぽわと、れいなのほっぺがピンクに染まる。
3743 = "Đôi má của Reina ửng hồng phúng phính."
# monologue
# JP: それを両手でつつむようにしてイヤイヤ身悶え――\nそうしてあれれ？　とあどけなく小首を傾げてみせる。
3415 = "Con bé đưa hai tay ôm lấy má, vặn vẹo người như thể xấu hổ——\nRồi lại ngây thơ nghiêng đầu \"Ủa?\"."
# 【れいな】
# display as 玲奈
# JP: 「ハチロクさんどこですかぁ？　れいなとおんなじだけ、\nハチロクさんとみくろさんも、ほめてもらわないとぉ」
2192 = "「Chị Hachiroku đâu rồi ạ? Chị Hachiroku và chị Mikuro\ncũng phải được khen nhiều bằng Reina mới được nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさしく道理だ。というか、なかなか戻らんな。\n――ひょっとすると、改札でも手伝っているのかな？」
2174 = "「Nói rất có lý. Mà sao hai người họ mãi chưa quay lại nhỉ.\n——Không chừng đang giúp đỡ soát vé ở cổng cũng nên?」"
# 【れいな】
# display as 玲奈
# JP: 「あるかもですねぇ、ハチロクさん、\nいがいと改札、好きですからねぇ」
2602 = "「Cũng có thể lắm nha, chị Hachiroku,\nnhìn vậy chứ chị ấy thích soát vé lắm đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「きっぷを切るのが楽しいのだろう。\n[かいさつきょう,2]改札鋏をカチカチやっているときは、まるで――」
2416 = "「Chắc là em ấy thấy vui khi bấm vé.\nMỗi lần cầm \\x%l改札鋏;#00ffc040;kìm soát vé%l;#; bấm lách cách, trông em ấy cứ như——」"
# monologue
# JP: 窓からホームへ向けた目を、\nその瞬間に、動かせなくなる。
3573 = "Ánh mắt tôi đang hướng ra sân ga qua cửa sổ,\ntrong khoảnh khắc ấy, chợt đông cứng lại."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさぁん？」
2883 = "「Anh Soutetsu~?」"
# monologue
# JP: 家族連れ。\n他人の空似――というやつだろうか。
3203 = "Một gia đình.\nLà người giống người——sao."
# monologue
# JP: いや、しかし……\nしかし、それにしてはあまりにも――
3215 = "Không, nhưng mà……\nNhưng mà, nếu vậy thì lại quá đỗi——"
# monologue
# JP: （父さん、母さん。[みちこ,1]路子――）
3983 = "（Bố, mẹ. Michiko——）"
# monologue
# JP: 全てがあまりに、\nあまりに夢のような光景で――
3914 = "Tất cả quá đỗi,\nquá đỗi giống như một giấc mơ——"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
2318 = "「!!!」"
# 【れいな】
# display as 玲奈
# JP: 「そうてつさぁん！？」
2881 = "「Anh Soutetsu!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「待ってくれ！　父さん、母さん、路子！！」
2698 = "「Đợi đã! Bố, mẹ, Michiko!!」"
# 【路子】
# display as 路子
# JP: 「あ。そーちゃん！」
2326 = "「A. Sou-chan!」"
# monologue
# JP: 路子が足を止めてくれる。\nけれど父さんと母さんは、そのまま改札を抜けてしまう。
3886 = "Michiko dừng bước.\nNhưng bố và mẹ thì cứ thế đi qua cổng soát vé."
# monologue
# JP: ――光の中に、\nま白く眩い光の中に、進んでしまう。
3872 = "——Tiến vào trong ánh sáng,\ntrong thứ ánh sáng trắng xóa chói lóa ấy."
# 【路子】
# display as 路子
# JP: 「れっ車、ナインスターズ！　さいこーだったよ！\nおへやとーってもきれいでね！　すごくおちついたの！」
2209 = "「Chuyến tàu Nine Stars! Tuyệt vời lắm luôn!\nPhòng đẹp ơi là đẹp! Rất là thoải mái luôn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「……だろうと思った」
1673 = "「……Anh cũng nghĩ vậy.」"
# monologue
# JP: キャンセルが出た客室は、偶然にも“肥御”だったから。\n公募の中に地元の意見――僕らの意見も混じっていたから。
3950 = "Bởi vì phòng bị hủy tình cờ lại là phòng \"Higo\".\nVì trong những ý kiến được thu thập, có cả ý kiến của người dân địa phương——ý kiến của chúng tôi."
# monologue
# JP: みんなの希望を、日々姫が見事に結晶させてくれたそこは、\n僕にもやはり、僕の客室とさえ思えていたから。
3803 = "Nơi mà Hibiki đã kết tinh xuất sắc những hy vọng của mọi người,\nđối với tôi, tôi cũng coi đó như là phòng khách của chính mình."
# 【路子】
# display as 路子
# JP: 「あとね、いちばん前！\nみちね、やーっと見れたんだよ！」
2820 = "「Với lại nha, ở tuốt phía trước!\nMichi nha, cuối cùng cũng được xem rồi đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2315 = "「!」"
# monologue
# JP: スイ90 1。90系、ナインスターズ１号客車。\nその先頭には強化ガラスの展望窓が設けられている。
3997 = "Sui 90 1. Dòng 90, toa hành khách số 1 của Nine Stars.\nỞ phía đầu toa có thiết kế cửa sổ quan sát bằng kính cường lực."
# monologue
# JP: が、今日は記念編成だ。\nあの窓から見えた景色といっても――
3251 = "Nhưng, hôm nay là đội hình kỷ niệm.\nCảnh sắc nhìn từ ô cửa sổ đó——"
# 【路子】
# display as 路子
# JP: 「かわいいまるいお顔のれっ車ね！\nみちのこと見て、ずーっとにこにこしてくれたの」
2561 = "「Là một chuyến tàu có khuôn mặt tròn xoe dễ thương lắm!\nNhìn Michi mà cứ cười tủm tỉm suốt thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
# 2308 = "「啊——」" 
# 【路子】
# display as 路子
# JP: 「そーちゃん、これ見せてくれたかったんだぁって。\nみちね、だから、うれしくなったの！」
2450 = "「Ra là Sou-chan muốn cho Michi xem cái này.\nNên Michi nha, thấy vui lắm luôn!」"
# monologue
# JP: ――そうだ。路子は、こういうこだった。
3666 = "——Đúng rồi. Michiko, là một đứa trẻ như vậy."
# monologue
# JP: どんなときでも、どんな場所でも、\n楽しさを見つけ笑うこだった。
3722 = "Dù ở đâu, dù lúc nào,\ncon bé cũng luôn tìm thấy niềm vui và mỉm cười."
# 【双鉄】
# display as 雙鐵
# JP: 「……うん」
1671 = "「……Ừ.」"
# monologue
# JP: だから、僕は、路子に見せてやろうとした。\n見えたものが\x%l炭水車;#00ffc040;炭水車%l;#;でも、たとえ、何も見えなくたって。
3605 = "Thế nên, tôi mới định cho Michiko xem.\nDù thứ nhìn thấy chỉ là \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#;, hay thậm chí là chẳng thấy gì cả."
# monologue
# JP: 路子はやっぱり、僕には見えない楽しみをみつけ、\nきっと、笑って――笑ってくれると、わかっていたから。
3884 = "Vì tôi biết, Michiko nhất định sẽ tìm thấy những niềm vui mà tôi không thấy được,\nvà chắc chắn, con bé sẽ cười——sẽ cười với tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……ああ、やっぱり僕は、愚かだったんだなぁ」
1670 = "「……A, quả nhiên anh, thật là ngốc mà.」"
# monologue
# JP: 一番単純で、一番当然で、日常すぎて。\nだから一番大事なことを、最後まで思い出せなくて。
3668 = "Đơn giản nhất, hiển nhiên nhất, quá đỗi bình thường.\nThế nên đến tận cùng, tôi vẫn không thể nhớ ra điều quan trọng nhất."
# 【路子】
# display as 路子
# JP: 「ええっ！？　そーちゃん、おろかなんかじゃないよぉ」
2276 = "「Hả!? Sou-chan, đâu có ngốc đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2690 = "「Vậy sao.」"
# monologue
# JP: 本当にあれは事故だったのだと、\nただ単純に――こころの底から、ようやく感じる。
3583 = "Tôi cuối cùng cũng cảm nhận được từ tận đáy lòng,\nrằng đó thực sự chỉ là một tai nạn."
# monologue
# JP: 僕は、路子を笑わせたかった。\nただそれだけのことだった。
3543 = "Tôi, chỉ muốn làm cho Michiko cười.\nChỉ đơn giản là như vậy thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだよな。\n僕が愚かだったら、路子も愚かになっちゃうもんな」
2140 = "「Đúng vậy nhỉ.\nNếu anh ngốc, thì Michiko cũng sẽ ngốc theo mất.」"
# 【路子】
# display as 路子
# JP: 「ちがうよー！　そういういみじゃなくってー！」
2108 = "「Không phải đâu! Không phải ý đó mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかってる。ちょっとからかってみただけだ」
2521 = "「Anh biết rồi. Anh chỉ trêu em chút thôi.」"
# 【路子】
# display as 路子
# JP: 「～っ、からかわないでよー！\nそーちゃん、いじわるー！」
2306 = "「~Đừng có trêu em mà!\nSou-chan xấu tính!」"
# monologue
# JP: ぷっと膨れてくすくす笑って。\nそうして路子は、優しい目をして僕を見つめる。
3897 = "Michiko phồng má lên rồi lại cười khúc khích.\nSau đó, con bé nhìn tôi bằng đôi mắt dịu dàng."
# 【路子】
# display as 路子
# JP: 「いじわるだなんて、うそだからね？\nみち、ちゃあんと知ってるから」
2132 = "「Nói xấu tính là nói dối thôi nha?\nMichi biết rõ lắm đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2351 = "「嗯」" 
# 【路子】
# display as 路子
# JP: 「そーちゃん、ほんとにありがとね？　\nれっ車の旅。鉄道旅行。みちに楽しいって教えてくれて」
2691 = "「Sou-chan, thật sự cảm ơn anh nha?\nChuyến đi bằng tàu. Du lịch bằng đường sắt. Đã cho Michi biết nó vui thế nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
1637 = "「——Ừ.」"
# 【路子】
# display as 路子
# JP: 「みんなにも、ありがとーっていっておいてね？\nそーちゃんを助けてくれて、ありがとうって」
2138 = "「Anh cũng nói cảm ơn với mọi người giúp em nha?\nCảm ơn vì đã giúp đỡ Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
2518 = "「Anh biết rồi.」"
