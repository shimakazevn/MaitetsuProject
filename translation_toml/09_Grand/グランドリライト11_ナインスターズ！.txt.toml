# 【凪】
# display as 凪
# JP: 「さびしくなかばい！\n凪さまたちもおるけんねー」
2541 = "「Không có cô đơn đâu nha!\nCòn có Nagi-sama và mọi người nữa mà.」"
# 【中村】
# display as 中村
# JP: 「お疲れ様です。右田\x%l機関士;#00ffc040;機関士%l;#;。素晴らしい運転でした」
2098 = "「Cậu vất vả rồi. \\x%l機関士;#00ffc040;Lái tàu%l;#; Migita. Cậu lái tuyệt vời lắm.」"
# 【みくろ】
# display as 美玖路
# JP: 「みくろたち、足ひっぱっちゃいませんでしたか？」
2717 = "「Bọn em có cản trở gì không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや。そんなことは全くなかった。\n早期発見と、迅速な対応のおかげだ、ありがとう」
2632 = "「Không đâu. Hoàn toàn không có chuyện đó.\nNhờ mọi người phát hiện sớm và xử lý nhanh chóng đấy, cảm ơn mọi người.」"
# monologue
# JP: 早戸をすぎて数分の地点で、凪と中村さんとが\n後補機、D51 1031の水ポンプの動作に違和感を覚えた。
3384 = "Sau khi qua Hayato vài phút, Nagi và anh Nakamura\nđã nhận thấy sự bất thường trong hoạt động của máy bơm nước trên đầu máy phụ D51 1031."
# monologue
# JP: ゆえ、八ツ城駅での引き継ぎセレモニーにも出ず、\n凪－中村－みくろは着後すぐ、その対処にあたってくれた。
3622 = "Do đó, nhóm Nagi - Nakamura - Mikuro đã không tham gia lễ bàn giao tại ga Yatsushiro,\nmà ngay lập tức bắt tay vào xử lý sự cố ngay khi vừa đến nơi."
# 【ハチロク】
# display as 八六
# JP: 「単純な詰まりの兆候とはいえ、もしも対処が遅れれば、\n帰りの峠越えにおいて、致命傷となりかねませんでした」
2880 = "「Dù chỉ là dấu hiệu tắc nghẽn đơn giản, nhưng nếu xử lý chậm trễ,\nnó có thể trở thành một sự cố chí mạng khi vượt đèo lúc về đấy ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　八ツ城ですぐに見たのは大正解だと思う！\nありがとね！　凪ちゃんも[ちかげ,1]千景ちゃんもみくろちゃんも」
2353 = "「Đúng vậy! Em nghĩ việc kiểm tra ngay tại Yatsushiro là một quyết định vô cùng chính xác!\nCảm ơn mọi người nha! Cả Nagi, chị Chikage và Mikuro nữa.」"
# 【凪】
# display as 凪
# JP: 「当然ばい！　そいもまた、凪さま達のお仕事ばい！」
2861 = "「Tất nhiên rồi! Đó cũng là công việc của Nagi-sama mà!」"
# 【中村】
# display as 中村
# JP: 「なにもなければ念のため、機関庫でもう一度、\n技師さんにも見てもらいたいんですけれど」
2460 = "「Nếu không có gì thì để chắc chắn, tôi muốn nhờ kỹ sư\nkiểm tra lại một lần nữa ở xưởng đầu máy.」"
# 【みくろ】
# display as 美玖路
# JP: 「[でごいち,2]Ｄ５１、先に機関庫いれちゃって大丈夫ですか？」
2259 = "「Đưa D51 vào xưởng đầu máy trước có sao không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、少しだけ待ってくれ」
2211 = "「Khoan đã, đợi anh một chút.」"
# monologue
# JP: せっかくこれだけ集まっていて、\nこれほど意気があがっているのだ。
3946 = "Hiếm khi mọi người tụ tập đông đủ,\nvà khí thế lại đang lên cao thế này."
# 【双鉄】
# display as 雙鐵
# JP: 「もしよければ、みんなに相談したいことがある」
2428 = "「Nếu được, anh có chuyện muốn bàn với mọi người.」"
# 【ポーレット】
# display as 波萊特
# JP: 「相談ですか？　もちろんわたしは大歓迎ですけど」
2597 = "「Bàn bạc ạ? Tất nhiên là em rất hoan nghênh rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「ちょうどいい。ボクからも相談したいことが発生した。\nといっても、まずは双鉄とポーレットとを希望するけど」
2617 = "「Vừa hay. Em cũng có chuyện muốn bàn bạc.\nNói vậy chứ, trước tiên em muốn nói chuyện với anh Soutetsu và Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　さっきの話、具体的に検討するとか？」
2278 = "「Hả? Xem xét cụ thể chuyện lúc nãy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまんが稀咲の方は後回しにしてくれ。\n僕の方は、全員に聞きたい相談なのだ」
2104 = "「Xin lỗi nhưng chuyện của Kisaki để sau đi.\nChuyện của anh là chuyện muốn hỏi ý kiến của tất cả mọi người.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい！」
2322 = "「A, vâng!」"
# 【ふかみ】
# display as 深美
# JP: 「全員って……わたしとかも、です？」
2190 = "「Tất cả mọi người……cả em nữa ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「もちろんだ。真闇姉にも、れいなにも」
2675 = "「Tất nhiên rồi. Cả chị Mayami, cả Reina nữa.」"
# 【真闇】
# display as 真闇
# JP: 「あらまぁ、おねーちゃんでも役にたてると？」
2312 = "「Ây chà, chị cũng giúp được gì sao?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、そうだんごともがんばりますよぉ」
2670 = "「Reina, cũng sẽ cố gắng bàn bạc nha~」"
# monologue
# JP: 頭上を見れば、無論、ナビ。\n僕の隣には、無論、ハチロク。
3610 = "Nhìn lên đỉnh đầu, tất nhiên là có Navi.\nBên cạnh tôi, tất nhiên là có Hachiroku."
# monologue
# JP: 赤井・ニイロク組と宗方・オリヴィ組にも聞きたいが、\nまずは、この面子にたずねてみよう。
3943 = "Tôi cũng muốn hỏi ý kiến của nhóm Akai - Niiroku và nhóm Munakata - Olivy,\nnhưng trước tiên, cứ hỏi những người ở đây đã."
# 【双鉄】
# display as 雙鐵
# JP: 「ナインスターズは、みなのおかげで走り出した。\nけれどもこれは、鉄道復権の端緒にすぎない」
2388 = "「Nine Stars đã lăn bánh nhờ công của tất cả mọi người.\nNhưng đây mới chỉ là bước khởi đầu cho sự phục hưng của đường sắt thôi.」"
# monologue
# JP: みなが頷く、一斉に。
3394 = "Mọi người đồng loạt gật đầu."
# monologue
# JP: 観光は、究極的には水物だと――　一度は窮地に陥った\n観光都市の人間ゆえ、それは誰もがよく知っている。
3629 = "Du lịch, suy cho cùng cũng chỉ là thứ không bền vững——Là những con người của một thành phố du lịch\ntừng rơi vào cảnh khốn cùng, ai nấy đều hiểu rõ điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「ナインスターズは、あこがれであり、非日常だ。が、\n鉄道が真に復権するには、日常の足となる必要がある」
2127 = "「Nine Stars là niềm ao ước, là sự phi thường. Nhưng,\nđể đường sắt thực sự phục hưng, nó cần phải trở thành phương tiện đi lại thường ngày.」"
# monologue
# JP: いきおい続けた言葉には、\nけれどもほとんど、強い頷きは返らない。
3596 = "Thế nhưng, những lời nói đầy khí thế ấy\nlại không nhận được nhiều cái gật đầu mạnh mẽ."
# 【稀咲】
# display as 稀咲
# JP: 「……日常の足としては、エアクラに勝てないよね。\n湯医線のような特殊事情でもないのなら」
1683 = "「……Là phương tiện đi lại thường ngày thì không thể thắng nổi Aircra đâu.\nTrừ phi có hoàn cảnh đặc biệt như tuyến Yui.」"
# 【ポーレット】
# display as 波萊特
# JP: 「――けど、双鉄くんなら」
2163 = "「——Nhưng, nếu là anh Soutetsu.」"
# monologue
# JP: ポーレットが僕を見つめてくれる。\n青い瞳に、いっぱいの信頼をたたえてくれる。
3710 = "Paulette nhìn tôi.\nĐôi mắt xanh ấy tràn ngập sự tin tưởng."
# 【ポーレット】
# display as 波萊特
# JP: 「考えてますよね？\nもう、きっと、その辺のことも」
2799 = "「Anh đã nghĩ đến rồi đúng không?\nChắc chắn là anh đã nghĩ đến chuyện đó rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「構想がある。実現できれば、エアクラとも、\n飛行機とも船とも違った強みを出せる、構想が」
2477 = "「Anh có một ý tưởng. Nếu thực hiện được, nó sẽ mang lại thế mạnh khác biệt\nso với cả Aircra, máy bay hay tàu thủy.」"
# 【凪】
# display as 凪
# JP: 「わおわお！　そいば、どぎゃんと構想ばい！？」
2283 = "「Oa oa! Vậy đó là ý tưởng gì thế!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「高架標準軌専用線による、旅客超特急電車」
2739 = "「Tàu điện siêu tốc chở khách chạy trên tuyến đường ray khổ tiêu chuẩn trên cao.」"
# 【れいな】
# display as 玲奈
# JP: 「高架で、専用線で、標準軌の線路を走る」
2395 = "「Chạy trên cao, trên tuyến đường chuyên dụng, với đường ray khổ tiêu chuẩn.」"
# 【みくろ】
# display as 美玖路
# JP: 「お客さんだけを運ぶ、超特急の、\x%l電車;#00ffc040;電車%l;#;」
2254 = "「\\x%l電車;#00ffc040;Tàu điện%l;#; siêu tốc, chỉ chở hành khách.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。\nそれは大都市間を、時速200キロで結ぶ列車だ」
2633 = "「Đúng vậy.\nĐó là chuyến tàu kết nối các thành phố lớn với vận tốc 200 km/h.」"
# 【れいな】
# display as 玲奈
# JP: 「おっきな町と町の間を」
2818 = "「Giữa các thành phố lớn.」"
# 【みくろ】
# display as 美玖路
# JP: 「時速――200キロで」
2591 = "「Với vận tốc——200 km/h.」"
# monologue
# JP: れいなとみくろが戸惑ったように呟いて、\n次の瞬間、わあっとその顔を見合わせる。
3739 = "Reina và Mikuro lẩm bẩm như thể bối rối,\nnhưng ngay khoảnh khắc tiếp theo, cả hai liền quay sang nhìn nhau với vẻ kinh ngạc."
# 【みくろ】
# display as 美玖路
# JP: 「凄い！　凄いです！  それがもしも実現したら」
2684 = "「Tuyệt quá! Tuyệt quá! Nếu điều đó trở thành hiện thực.」"
# 【れいな】
# display as 玲奈
# JP: 「お客さん、みんな乗るですよぉ！\nだって、エアクラよりもずっとずうっと速いですぅ！」
2595 = "「Hành khách, mọi người sẽ đi tàu hết đó nha!\nVì nó nhanh hơn Aircra rất rất nhiều luôn mà!」"
# 【真闇】
# display as 真闇
# JP: 「ばってん、列車に時速200キロなんて、出せると？」
2762 = "「Nhưng mà, tàu hỏa có thể đạt được vận tốc 200 km/h sao?」"
# 【れいな】
# display as 玲奈
# JP: 「きっとだせちゃいますぅ！　だって、れいなの妹、\nガスタービンに改造されて時速150キロ出しましたから」
2727 = "「Chắc chắn là được đó nha! Vì em gái của Reina,\nsau khi được cải tạo thành tuabin khí đã đạt vận tốc 150 km/h rồi mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「標準軌で、専用線なら、もっと出せる。\n200キロだって――きっと、それ以上のスピードだって」
2431 = "「Nếu là khổ tiêu chuẩn và tuyến chuyên dụng thì còn nhanh hơn nữa.\n200 km/h——thậm chí là tốc độ cao hơn thế.」"
# 【ふかみ】
# display as 深美
# JP: 「けど……それって、ものすごいお金とか、時間とかが」
2261 = "「Nhưng……như thế sẽ tốn rất nhiều tiền bạc, thời gian.」"
# 【双鉄】
# display as 雙鐵
# JP: 「かかるだろう。が――たとえどれほどかかろうと、\nそれを埋められる人脈と地歩を、僕らは築いている筈だ」
2729 = "「Chắc chắn là sẽ tốn. Nhưng——dù có tốn bao nhiêu đi chăng nữa,\nchúng ta hẳn đã xây dựng được những mối quan hệ và vị thế đủ để bù đắp lại.」"
# monologue
# JP: しばし、沈黙。\nやがて、一人、また一人と頷き始める。
3763 = "Một lúc im lặng.\nRồi dần dần, từng người, từng người một bắt đầu gật đầu."
# 【稀咲】
# display as 稀咲
# JP: 「……つまり、双鉄の構想は」
1664 = "「……Tóm lại, ý tưởng của anh Soutetsu là.」"
# monologue
# JP: ただ一人だけ頷かぬままの稀咲が静かに、\nじいっと――僕を見つめてくる。
3348 = "Chỉ có duy nhất Kisaki là không gật đầu, cô ấy lặng lẽ,\nnhìn chằm chằm——vào tôi."
# 【稀咲】
# display as 稀咲
# JP: 「まったく新しい……日ノ本の大動脈となるような、\n鉄道路線を作るということ？」
2576 = "「Tạo ra một tuyến đường sắt hoàn toàn mới……\ntrở thành huyết mạch của Hinomoto sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。\n言うなれば、新・幹線鉄道だ」
2582 = "「Đúng vậy.\nNói cách khác, đó là đường sắt Tân Cán Tuyến (Shinkansen).」"
# 【ハチロク】
# display as 八六
# JP: 「新・幹線鉄道」
2551 = "「Đường sắt Tân Cán Tuyến.」"
# 【れいな】
# display as 玲奈
# JP: 「しんかんせん――しんかんせん！\nすごくいいです、すてきですよぉ！！」
2554 = "「Tân Cán Tuyến——Shinkansen!\nTuyệt quá, tuyệt vời quá đi nha!!」"
# monologue
# JP: れいなの言葉に、みなが笑顔を輝かせる。\nだから感じる。描き出せる。
3815 = "Trước câu nói của Reina, mọi người đều nở nụ cười rạng rỡ.\nThế nên tôi có thể cảm nhận được. Có thể phác họa ra được."
# monologue
# JP: 僕が伸ばして行くレールの、\n未来へ走らせる列車の姿を。
3928 = "Hình ảnh chuyến tàu chạy tới tương lai,\ntrên tuyến đường ray mà tôi sẽ trải dài."
# 【双鉄】
# display as 雙鐵
# JP: 「それは、ひかりだ。無数の希望を集めて走る。\nまばゆい、真っ白な高速列車だ」
2839 = "「Đó là Hikari (Ánh sáng). Chuyến tàu mang theo vô vàn hy vọng.\nMột chuyến tàu cao tốc trắng muốt, chói lóa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ひかり――。うん！　最高の名前だって思います。\nなにより速く、どこまでだって、旅していける」
2183 = "「Hikari——. Vâng! Em nghĩ đó là một cái tên tuyệt vời nhất.\nNhanh hơn bất cứ thứ gì, và có thể đi đến bất cứ đâu.」"
# 【真闇】
# display as 真闇
# JP: 「ほんなら、\n新・幹線鉄道の特急列車は、ひかり号？」
2860 = "「Vậy thì,\ntàu tốc hành của đường sắt Tân Cán Tuyến sẽ là tàu Hikari?」"
# 【凪】
# display as 凪
# JP: 「わおわお！　凪さま決めたばい！！！\nひかり号の一号列車の！　\x%l運転士;#00ffc040;運転士%l;#;さん目指すばい！」
2287 = "「Oa oa! Nagi-sama quyết định rồi!!!\nSẽ nhắm đến vị trí \\x%l運転士;#00ffc040;lái tàu%l;#;! Của chuyến tàu Hikari số 1!」"
# 【ふかみ】
# display as 深美
# JP: 「なら、わたしは車掌一号！\n凪ちゃん、一緒に乗務しようね！」
2849 = "「Vậy thì em sẽ là trưởng tàu số 1!\nNagi, chúng ta cùng nhau làm nhiệm vụ nhé!」"
# 【凪】
# display as 凪
# JP: 「望むとこばい！！」
2627 = "「Đúng ý tớ luôn!!」"
# monologue
# JP: （ああ――）
# 3978 = "（感嘆）" 
# monologue
# JP: 僕と路子の幼い夢が、みるみるうちに伝播していく。\nこれなら叶うと確信できる。
3545 = "Giấc mơ thuở ấu thơ của tôi và Michiko đang lan truyền nhanh chóng.\nTôi tin chắc rằng nó sẽ thành hiện thực."
# 【日々姫】
# display as 日日姬
# JP: 「れいなちゃんの妹の、ガスタービンちゃんの記録って、\nまだどこかに残っとぉ？」
2662 = "「Kỷ lục của em gái Reina, tuabin khí ấy,\nliệu có còn được lưu giữ ở đâu không?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　さがしたらすぐ出せますよぉ」
2733 = "「Vâng! Nếu tìm thì sẽ ra ngay đó nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「海外にも！　超高速列車の車両とか資料とか、\nまだまだたくさん残ってるはずです！」
2387 = "「Ở nước ngoài nữa! Toa xe hay tài liệu về tàu siêu tốc,\nchắc chắn vẫn còn lưu lại rất nhiều!」"
# 【ハチロク】
# display as 八六
# JP: 「その他にも、きっと活かせる先人の知恵は、\n無数に残っておりますとも」
2877 = "「Ngoài ra, chắc chắn vẫn còn vô số những kiến thức của người đi trước\nmà chúng ta có thể tận dụng được.」"
# 【みくろ】
# display as 美玖路
# JP: 「みくろも、知ってること全部――\nお友達にもきいて、お伝えしますね」
2715 = "「Mikuro cũng sẽ hỏi bạn bè——\nrồi nói lại tất cả những gì mình biết cho mọi người nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。ありがと！」
2370 = "「Ừ. Cảm ơn em!」"
# 【稀咲】
# display as 稀咲
# JP: 「さて、忙しくなりそうだ。後東氏にアポを――\nいや、その前に仲国の件の整理が先か」
2798 = "「Chà, có vẻ sẽ bận rộn đây. Phải đặt lịch hẹn với ông Goto——\nÀ không, trước đó phải giải quyết vụ Trung Quốc đã.」"
# 【凪】
# display as 凪
# JP: 「それよりまえに！\n大事な約束、のこっとるばーい！」
2393 = "「Trước lúc đó!\nChúng ta vẫn còn một cuộc hẹn quan trọng mà!」"
# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2315 = "「啊！」" 
# 【ハチロク】
# display as 八六
# JP: 「ああ、そうでしたね」
2328 = "「A, đúng rồi nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「これは――ボクとしたことが焦り過ぎたね」
2681 = "「Cái này thì——em đã quá nóng vội rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2373 = "「嗯？」" 
# 【日々姫】
# display as 日日姬
# JP: 「あああ、わたしナッパ服！　けど、まぁいっか！」
2330 = "「Aaa, em đang mặc đồ bảo hộ! Nhưng mà, thôi cũng được!」"
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんもおしゃれしてくればよかったと」
2557 = "「Biết thế chị cũng ăn diện một chút.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなは、ポーレットのとなりでうつりますねぇ」
2668 = "「Reina sẽ đứng cạnh Paulette nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんは真ん中！　真ん中にはいってください」
2885 = "「Anh Soutetsu đứng ở giữa! Hãy đứng ở giữa đi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
# 2315 = "「啊！」" 
# monologue
# JP: なるほど、確かに約束していた。
3338 = "Ra là vậy, đúng là chúng tôi đã hứa."
# monologue
# JP: ぽかんとしているみくろと中村さんとにだから、\n大きな声で説明する。
3841 = "Tôi lớn tiếng giải thích cho Mikuro và anh Nakamura\nđang ngơ ngác không hiểu chuyện gì."
# 【双鉄】
# display as 雙鐵
# JP: 「記念写真だ！\nナインスターズ一号列車が無事に走った、その記念の！」
2701 = "「Chụp ảnh lưu niệm!\nKỷ niệm chuyến tàu Nine Stars số 1 đã chạy thành công tốt đẹp!」"
# 【ポーレット】
# display as 波萊特
# JP: 「カメラと三脚！　わたし、すぐにとってきます！！」
2524 = "「Máy ảnh và chân máy! Em đi lấy ngay đây!!」"
# monologue
# JP: ポーレットがレールショップへ駆けていく。
3709 = "Paulette chạy về phía cửa hàng đường sắt."
# monologue
# JP: 正式な記念写真は、赤井・ニイロク組に、\n宗方・オリヴィ組も交えてということなろうが――
3944 = "Bức ảnh lưu niệm chính thức có lẽ sẽ được chụp cùng nhóm Akai - Niiroku\nvà nhóm Munakata - Olivy——"
# 【双鉄】
# display as 雙鐵
# JP: 「ふたりも、よかったら入ってくれ！」
2171 = "「Hai người nếu được thì cũng vào chụp chung đi!」"
# monologue
# JP: あの日に誘ってもらえた理由が、ようやくわかった。
3582 = "Cuối cùng tôi cũng hiểu lý do vì sao ngày hôm đó mình lại được rủ."
# monologue
# JP: 僕の感じている後悔を、\nみくろに、中村さんに、感じて欲しいとは思わない。
3368 = "Tôi không muốn Mikuro và anh Nakamura\nphải cảm nhận sự hối hận mà tôi đang trải qua."
# 【双鉄】
# display as 雙鐵
# JP: 「せっかくの一号列車走行記念だ！　入って欲しい」
2095 = "「Hiếm khi có dịp kỷ niệm chuyến tàu số 1 chạy! Anh muốn hai người vào chụp chung.」"
# monologue
# JP: これから僕らは恐らくは、\nたくさんのたくさんの記念写真を残すだろう。
3240 = "Từ giờ trở đi, có lẽ chúng tôi sẽ còn\nchụp rất nhiều, rất nhiều bức ảnh lưu niệm nữa."
# monologue
# JP: 新・幹線鉄道一号列車を走らせるまで。\n叶うのならば、もっと先まで。が――
3750 = "Cho đến khi chuyến tàu Tân Cán Tuyến số 1 khởi hành.\nNếu có thể, thì còn xa hơn thế nữa. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「今日このときの記念写真は、\n今日このときにしか撮れんのだから！」
2149 = "「Bức ảnh lưu niệm của khoảnh khắc ngày hôm nay,\nchỉ có thể chụp được vào khoảnh khắc ngày hôm nay mà thôi!」"
# 【ハチロク】
# display as 八六
# JP: 「みくろ。わたくしと並びましょう」
2718 = "「Mikuro. Hãy đứng cạnh chị nào.」"
# 【みくろ】
# display as 美玖路
# JP: 「わぁっ！　みくろ、光栄ですおねえさま」
2291 = "「Oa! Mikuro vinh hạnh lắm ạ, chị hai.」"
# 【凪】
# display as 凪
# JP: 「千景ちゃん、ここ入ると良かばい！」
2215 = "「Chị Chikage, đứng đây là đẹp nè!」"
# 【中村】
# display as 中村
# JP: 「写真は苦手なんですけれど――記念でしたら」
2506 = "「Tôi không giỏi chụp ảnh lắm——nhưng nếu là để kỷ niệm.」"
# monologue
# JP: みくろが笑顔で入ってくれば、\n戸惑い顔だった中村さんも、ふかみと凪と並んでくれる。
3796 = "Khi Mikuro bước vào với nụ cười trên môi,\nanh Nakamura dù còn bối rối cũng đã đứng cạnh Fukami và Nagi."
# 【ポーレット】
# display as 波萊特
# JP: 「おまたせしました！」
2407 = "「Để mọi người phải đợi rồi!」"
# monologue
# JP: ポーレットが手早く三脚をたて、カメラをセット。
3707 = "Paulette nhanh nhẹn dựng chân máy và chỉnh máy ảnh."
# 【ポーレット】
# display as 波萊特
# JP: 「全体、もーちょっと双鉄くんによってください！\nあー、もーちょい。うん！　それ！　オッケーです！」
2409 = "「Mọi người nhích lại gần anh Soutetsu thêm một chút nữa đi ạ!\nÀ, thêm chút nữa. Vâng! Thế đó! Ok rồi ạ!」"
# 【れいな】
# display as 玲奈
# JP: 「でもでも、これだとポーレットのはいるとこが」
2263 = "「Nhưng mà, như vậy thì chỗ của Paulette đâu rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫よ、れいな」
2631 = "「Không sao đâu, Reina.」"
# monologue
# JP: セルフタイマーをセットして、\nポーレットがこちらに駆けてくる。
3859 = "Sau khi cài đặt hẹn giờ,\nPaulette chạy về phía chúng tôi."
# 【れいな】
# display as 玲奈
# JP: 「きゃぁっ！」
2269 = "「Kya!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2225 = "「Ra là vậy.」"
# monologue
# JP: ポーレットがれいなを抱っこし、そのまま収まる。\nみんなが、自然と笑顔になる。
3708 = "Paulette bế Reina lên, và cứ thế đứng vào khung hình.\nMọi người đều mỉm cười thật tự nhiên."
# monologue
# JP: ――そうだ。アルバムを作るとしよう。\n右田双鉄。僕が自分自身で作る、初めての写真アルバムを。
1596 = "——Đúng rồi. Mình sẽ làm một cuốn album.\nCuốn album ảnh đầu tiên do chính tay tôi, Migita Soutetsu, tạo ra."
# 【ポーレット】
# display as 波萊特
# JP: 「４、３、チーィズ！」
2901 = "「4, 3, Cheese!」"
# monologue
# JP: ――その一枚目を、この写真を。
1602 = "——Tấm ảnh đầu tiên, sẽ là tấm ảnh này."
# monologue
# JP: いつの日か、僕は、懐かしく振り返るのだ。
3345 = "Một ngày nào đó, tôi sẽ hoài niệm nhìn lại."
