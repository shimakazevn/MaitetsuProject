2807 = "「Đúng vậy. Cái sự rất thích giống hệt như Michiko,\nanh cũng đã luôn, luôn ôm ấp dành cho em.」"
# 【路子】
# display as 路子
# JP: 「あー」
# 2308 = "「啊——」" 
# monologue
