2809 = "「Vậy sao, tiếc quá! Michi cứ tưởng lần đầu tiên trong đời\nđược tỏ tình, ai ngờ lại bị đá ngay lập tức!」"
# monologue
# JP: いたずらっぽく言って、笑って。
3416 = "Con bé tinh nghịch nói rồi bật cười."
# monologue
