3933 = "Đó có lẽ chỉ là sự ái kỷ trẻ con mà thôi.\nNhưng cũng chính vì thế, tình cảm ấy lại rất thuần khiết và mãnh liệt."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、路子を、ずっと大好きだったんだ」
2504 = "「Anh, đã luôn rất thích Michiko.」"
# 【路子】
# display as 路子
# JP: 「うん」
# 2351 = "「嗯」" 
# monologue
# JP: 路子は僕の、かけがえのない半身で――
3889 = "Michiko là một nửa không thể thay thế của tôi——"
