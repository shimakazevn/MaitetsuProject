2324 = "「A, đúng rồi. Nhắc đến mọi người thì——\nNày Sou-chan. Đưa tai đây em bảo?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2373 = "「嗯？」" 
# monologue
# JP: しゃがめばすぐさま、\n路子が僕に耳打ちしてくる。
3538 = "Vừa ngồi xổm xuống,\nMichiko liền thì thầm vào tai tôi."
# monologue
# JP: とてもあどけない、けれどもおしゃまな問いかけで、\n僕の鼓膜とこころとを、ゆすり動かす。
3402 = "Một câu hỏi rất ngây thơ, nhưng cũng rất lanh lợi,\nlàm rung động cả màng nhĩ và trái tim tôi."
