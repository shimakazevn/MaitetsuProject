[script]
# lines: 629 
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「お乗りください、双鉄様」
2765 = "「請上來吧，雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[おしろばし,2]御城橋まで戻ってか？　バカな、走った方が早い」
2855 = "「那要我先回御城橋？有這工夫，直接跑過去還快一些」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「汗をかきます、せっかくの晴れの日だというのに」
2147 = "「今天這麼重大的日子，那樣您會流汗的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「汗を、僕が？　\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の\x%l機関士;#00ffc040;機関士%l;#;が？\nたかだか駅までを走ったくらいで？」
2646 = "「流汗？我可是\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;的\\x%l機関士;#00ffc040;司機%l;#;，跑兩步路到車站而已，哪會流汗呢」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「目に見えずとも、かいた汗は体表面で乾きます。\nそれはかすかな体臭となり、周りに不快感を与えます」
2462 = "「就算眼睛看不見，那也只是因為體表的汗乾了而已。這樣會產生輕微的體味，讓周圍人感到不悅」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どのみち乗務で滝のようにかくし、\nセレモニーの前にはシャワーを浴びる――っと」
2251 = "「反正工作的時候也會滿身大汗，我就在典禮前沖個澡——喲」" 

# monologue
# JP: 言い争っている間についた。
3364 = "和Ｎａｖｉ的爭論還沒有結論，我就已經到了車站。" 

# monologue
# JP: 全速力で構内へ入り、安全確認。\n駆け足でホームを渡り、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;内へと飛び込む。
3594 = "我開足馬力衝進車站，在確認了安全之後，順勢跑過站台，直接奔進了\\x%l石造機関庫;#00ffc040;石製機車庫%l;#;。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、おっそーーーーいっ！」
2869 = "「阿哥，你好慢哦——！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。ネクタイを忘れてしまってな」
2545 = "「抱歉，我剛才忘了領帶」" 

# 【日々姫】
# display as 日日姬
# JP: 「ネクタイ？」
2891 = "「領帶？」" 

# monologue
# JP: 目を丸くして、日々姫が僕の服装を見る。\n乗務前――僕は当然、ナッパ服だ。
3661 = "日日姬瞪大眼睛，打量了一下我的著裝。因為是在工作前，我穿的當然是彩頁服。" 

# monologue
# JP: ナッパ服の上のネクタイなど、乗務のあとには、\n手ぬぐい同然、まっ黒くススけてしまうだろう。
3918 = "這身衣服就算打好了領帶，結束一天的工作後也會變得和一塊擦煤灰的手帕一樣。" 

# 【日々姫】
# display as 日日姬
# JP: 「ネクタイなんて、何のため――\nあ！　そっか、[やつしろ,2]八ツ城駅でのリレーのときの」
2709 = "「繫領帶幹嘛——啊！對哦，在八代站接力的時候要用」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、セレモニーがあるという話だからな。\n“礼装で”と、日々姫も言われているだろう？」
2369 = "「嗯，說是有典禮。她們也跟你說要穿禮服了吧？」" 

# 【日々姫】
# display as 日日姬
# JP: 「言われとーよ？」
2763 = "「說了啊」" 

# monologue
# JP: 日々姫はふふん、と鼻を鳴らして、\n助士席の下に置かれたカバンを足先でつついて見せる。
3649 = "日日姬得意地用鼻子哼了一聲，然後用腳指了指她放在司爐坐席下的包。" 

# 【日々姫】
# display as 日日姬
# JP: 「御一夜鉄道の制服ば、あんまり着慣れんけん。\nちょっと前から、着こなしとか考えとったし」
2385 = "「因為我穿不太慣御一夜鐵路的制服。所以已經提早開始穿著適應了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。準備万端だな。\n僕などは、何ヶ月ぶりに袖を通すかというレベルだよ」
2383 = "「嚯，你準備得還挺周全。我幾個月都不一定穿一次這衣服」" 

# 【日々姫】
# display as 日日姬
# JP: 「へーきよ。にぃにぃは何着ても似合うけん」
2851 = "「那有什麼。阿哥那還不是穿什麼都合適唄」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それを言うなら日々姫の方こそだろう。\nそのナッパ服も、実に見事に着こなしている」
2748 = "「要這麼說你才是吧。你看這彩頁服穿得多精神」" 

# 【日々姫】
# display as 日日姬
# JP: 「って、あんま褒められとるよーにも思えんけど～」
2811 = "「這話怎麼聽著不像是誇我呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「褒めているさ。大いに」
2455 = "「就是誇你啊，發自真心的」" 

# monologue
# JP: 少し離れて、日々姫を見る。\nまじまじ見られ、日々姫は「ん？」と首を傾げる。
3581 = "我稍微後退幾步打量著日日姬全身。日日姬被我這麼盯著看，有些疑惑地歪著腦袋。" 

# 【日々姫】
# display as 日日姬
# JP: 「どぎゃんしたと？　カマなら、準備できとーよ？\nいつでん、入線できるけん」
2494 = "「怎麼咧？窯已經準備妥嘞。隨時都可以進站啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、その点は信頼している。\nそうではなくて――」
2335 = "「啊，這個我相信你。我倒不是在意這個——」" 

# monologue
# JP: 一人前だ、としみじみ思う。\n外見にも態度にも、落ち着きと余裕を感じる。
3535 = "我切身體會到日日姬已經成長為合格的司爐了。不光是指外表，也包括那種從容不迫的態度。" 

# monologue
# JP: デザイナーとして\x%l機関助士;#00ffc040;機関助士%l;#;として、十分な技量を有しても\nなお、少し前までどこかきょときょとしていたのだが。
3378 = "在不久前，無論是作為設計師還是\\x%l機関助士;#00ffc040;司爐%l;#;，日日姬雖已掌握了足夠的技術，卻並沒有這樣的從容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――楽しみだな、と思っただけだ。\n晴れの舞台で、僕と日々姫と、礼装で並ぶ瞬間が」
2513 = "「我只是很期待。期待能在盛大的舞台上和你身著禮服並肩而立」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー……うん。ううんっ！　『はい』」
2309 = "「啊……嗯……不，好的」" 

# monologue
# JP: 何故か、日々姫が赤くなる。
3209 = "不知為何，日日姬的臉頰變得通紅。" 

# monologue
# JP: 照れさせるようなことなど何一つ、\n言っても聞いてもない気がするが。
3497 = "感覺雙方都沒說過什麼會造成臉紅的話。" 

# 【日々姫】
# display as 日日姬
# JP: 「……ありませんでしたものね、今まで、全然。\n晴れの舞台を、兄さんとご一緒する機会」
1680 = "「……畢竟迄今為止，我還從來沒有過能和哥哥一起站上盛大舞台的機會」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――\n言われてみれば、今までまるでなかったか」
2569 = "「是啊。你這麼一說，確實是沒有過」" 

# 【日々姫】
# display as 日日姬
# JP: 「ありませんでした。だから、兄さんが楽しみって\n言ってくださって、私、すごく嬉しいんです」
2453 = "「就是。所以聽到哥哥說很期待，讓我非常高興」" 

# monologue
# JP: はにかんで、日々姫は視線を床へと落とす。\n子供じみた仕草がかえって、女性らしさを引き立てる。
3658 = "日日姬有些害羞地盯著地板。這樣充滿孩子氣的動作反而顯得她很有女人味——" 

# 【日々姫】
# display as 日日姬
# JP: 「あ"」\n2310 = "「啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ん？」\n2373 = "「嗯？」" \n\n# monologue\n# JP: ――ように一瞬思えたのだが、錯覚だった。\n日々姫の顔はあわあわと、見るからにもう動揺してる。\n1599 = "——看來我一瞬間的念頭只是錯覺。日日姬的臉色突然一沉，慌張了起來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「どうした――日々姫」\n2492 = "「怎麼了，日日姬」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ありえん。私、お靴わすれたと」\n2495 = "「怎麼辦的，我鞋忘記帶咧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なんだ、日々姫も忘れ物か。気が合うな」\n2688 = "「真是的，你不也忘東西啦。咱們還真是一家人」" \n\n# monologue\n# JP: その足元は、乗務のときにはいつもはいてる、\n一見はスニーカーなタイプの安全靴。\n3419 = "她腳邊放著平時執行乘務任務時穿的，外觀類似平底鞋的安全靴。" \n\n# monologue\n# JP: 火花が散っても燃えず、\n尖った石炭を踏んでも抜けない、実用的な代物だ。\n3832 = "被火花濺到也不會燒起來，踩到尖銳的煤炭也不會劃傷底部——是十分實用的靴子。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そんなとこで気ばあっても嬉しくなかとよ。\nっていうか、どぎゃんしよ。今から戻るとか」\n2764 = "「誰要在這事上跟你一家人呢。可現在怎麼搞啊，回去拿嗎」" \n\n# monologue\n# JP: （ゴン、ゴン）\n3968 = "（咣，咣）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ？　――っと、真闇姉か」\n2374 = "「嗯？啊，是真闇姐」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「え？　ねぇね！？　助かった！」\n2299 = "「哎？阿姐！？可有救了！」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひーちゃん、パンプス忘れたでしょお」\n2448 = "「小日，你忘記帶皮鞋了吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「やっぱり持ってきてくれたと！ ありがとー」\n2875 = "「阿姐特地幫我拿來咧！？謝謝」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ついでよ、ついで。\n『[ここの]九つ[ぼし]星』、納品ば来たついで」\n2890 = "「順便啦，順便。咱是來送“九星”的」" \n\n# monologue\n# JP: 九つ星――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;による完全データ管理酒の、\n一つの輝かしい到達点となった、新酒。\n3391 = "基於完全數據管理主義，由\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;製造出來的九星，是具有里程碑意義的一款新酒。" \n\n# monologue\n# JP: [インターナショナルスピリッツコンペティション,6]　Ｉ　Ｓ　Ｃ　最優秀賞受賞酒の車内試飲販売は、今日\n走りだすナインスターズ一号列車の大きな目玉のひとつだ。\n3242 = "今日啟程的九星一號列車的重頭戲之一，就是車內提供的這款斬獲ＩＳＣ大獎的酒的試飲與銷售。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「\x%l貨車;#00ffc040;貨車%l;#;……冷蔵車で良かと？　あれ、もうキンキンに\n冷えとーのね。おねえちゃん、驚いちゃった」\n2822 = "「那\\x%l貨車;#00ffc040;貨運車廂%l;#;……是叫保溫車嗎？那個冰勁十足喲。可真嚇了姐姐一跳咧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「レム[キュウイチマルマル,3]9100だな。\n単なる冷蔵\x%l貨車;#00ffc040;貨車%l;#;ではなく、冷蔵車兼電源車だ」\n2590 = "「是Ｒｅｍｕ９１００吧。那不只是保溫車，而是保溫車與發電車合二為一」" \n\n# monologue\n# JP: 大廃線後の九洲で初となった、\n完全新規設計の、新造車両。\n3935 = "那是大廢線後，在九州全新設計、製造的第一輛新車。" \n\n# monologue\n# JP: 電源車と冷蔵車とをひとまとめにという日々姫の案は、\n旧帝鉄の技術を引き継ぐ技師たちによって実現された。\n3393 = "基於日日姬將發電車與保溫車合二為一的方案，由繼承了前帝國鐵路技術的技工們親手實現的新車。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あれはディーゼル発電機を自前で持っているからな。\n走行状態になくても、常時発電、および冷蔵が出来る」\n2777 = "「車上裝有柴油發電機，就算在不行駛的時候也會持續發電，保證保溫不斷電」" \n\n# monologue\n# JP: 全行程なら99万9千円の豪華リレー・クルーズトレイン。\n乗客数は、最大でも54名/9家族にすぎない。\n3289 = "全程票價９９萬９千日元的豪華長途接力旅行列車，最大接待能力不過５４名乘客或９組家庭而已。" \n\n# monologue\n# JP: ゆえ、貨物・冷蔵スペースにある程度の余裕をもたせつつ、\n電源車も兼務させ得たのだ。\n3624 = "故而在確保貨物空間及保溫空間充裕的基礎上，也能有充足的空間容納發電機，令其兼具發電車功能。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「走る物産館で、走るレストランにもなるんやもんね、\nナインスターズ。冷蔵・冷凍庫ば、大事よねぇ」\n2129 = "「九星某種程度上說也算是會動的物產博物館與餐廳啦。為了最大限度展現特產的魅力，保溫車必不可少」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だけでなく、レムのおかげで、冷暖房も行える。\n客車三両、客室九室、それぞれが個別に空調できる」\n2102 = "「不僅如此，Ｒｅｍｕ還能提供驅動冷暖空調的電力。三節客運車廂，九間客房，都可以各自進行調節」" \n\n# monologue\n# JP: 九洲九国をそれぞれの客室に当てはめた、\nその名も九洲な、[きゅうじゅう,1]90系客車群。\n3231 = "九間客房與九州九國一一對應並以其命名，客運車廂的型號“９０系”亦與此呼應。" \n\n# monologue\n# JP: それに比しまったく目立たぬレム9100も、しかし同じく、\nナインスターズの屋台骨にして、オール九洲の象徴だ。\n3820 = "與它們相比，Ｒｅｍｕ９１００就頗為低調。但所有這些車廂都是九星的重要組成部分，是全九州的象徵。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「いっとう後ろの、展望デッキも美しかとねぇ。\nひーちゃん、よー頑張ってデザインしたね」\n2594 = "「最後頭的展望台也挺漂亮的。小日真是努力做了個好設計啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん――その土地々々の風ば、\nやっぱり、感じてほしかったけん」\n2360 = "「嗯，就是想讓乘客們，能夠更切實地感受旅途各地原汁原味的感覺唄」" \n\n# monologue\n# JP: 90系客車群は、大窓を選択した結果の、ハメ殺し。\n走行中は、そのままでは、風を感じることはできない。\n3990 = "９０系客運車廂編組為增大車窗面積，而採用了固定式的車窗，所以在行駛時便無緣車窗外輕風的吹拂。" \n\n# monologue\n# JP: ゆえに日々姫は、車両最後尾に展望デッキを設け、\n走行中も、そこに出られるようにした。\n3370 = "因而日日姬在編組的最後設置了展望台，讓乘客們可以在行駛中前去感受。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「試験走行は、苦労の連続だったものな」\n2740 = "「行駛測試的時候真是要命啊」" \n\n# monologue\n# JP: 言えばとたんに、日々姫は苦笑を浮かべてしまう。\n3816 = "聽我一說，日日姬臉上馬上露出了苦笑。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あはは……よねぇ。\nこんデッキに、ひょっとしたら一番苦労させられたかも」\n2314 = "「啊哈哈……可不是。這展望台可真是最折騰人的地兒了」" \n\n# monologue\n# JP: 試乗したふかみのスカートがまくれたり、\n凪が危うくおっこちかけたり。\n3854 = "試乘的時候，深美的裙子被吹得捲起來，凪還險些掉下去，出了好多狀況。" \n\n# monologue\n# JP: そうした課題をひとつひとつ、工夫と知恵とを結晶させて\n潰して潰して――ようやく整った完成形だ。\n3441 = "將這些出現的問題一一加以考量、處理，其最終成果可謂是御一夜鐵路全體成員的智慧結晶。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ばってん、苦労の甲斐ばあったと。九洲の風、\nこんデッキなら、気持ちよー味わってもらえるけん！」\n2164 = "「但是，所有的辛苦也都算值了呀。在那展望台上，能舒暢地感受九州的清風啊！」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「そっか！　ひーちゃん、よーがんばったとね」\n2564 = "「是吧！小日真是沒少努力呀」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん！」\n2352 = "「嗯！」" \n\n# monologue\n# JP: 日々姫が努力をまっすぐに真闇姉へと示している。\n真闇姉は、それを満面の笑顔で賞賛している。\n3652 = "日日姬把自己的努力直率地表現給真闇姐，真闇姐則滿面笑容地回以誠摯的褒獎。" \n\n# monologue\n# JP: その光景に、何故だか胸が熱くなる。\nごく当然の、姉妹の日常の、光景に。\n3917 = "這般光景看在眼中，我的心頭不禁為之一熱。雖然細細想來，這光景或許在她們姊妹之間再尋常不過。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「双鉄さま、おまたせしました」\n2887 = "「雙鐵少爺，您久等了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おかえりハチロク。\n打ち合わせは終わったのか？」\n2195 = "「八六，你回來啦。準備會已經結束了嗎？」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「はい、最後の微調整でしたので。\nこれでいつでも、完全な[きょうちょう,1]協調運転を行えます」\n2588 = "「是的，因為只剩最後的微調所以很快。這樣我們就隨時可以進行完美的多機牽引了」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「[きょうちょう,1]協調運転？」\n2403 = "「多機牽引？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ。御一夜－八ツ城間、今日の一号列車のみは、\n記念編成で走らせるからな」\n2570 = "「是啊。從御一夜至八代段，今天的一號列車將以紀念編組前往」" \n\n# monologue\n# JP: 本務機8620。後補機D51 1031――これが基本となる\x%l編成;#00ffc040;編成%l;#;。\n3673 = "本務機車８６２０搭配後補機Ｄ５１　１０３１——這是九星的常規\\x%l編成;#00ffc040;編組%l;#;。" \n\n# monologue\n# JP: そこに今日一日は、一日のみは――\n前補機として、キハ07sが8620の直後につくのだ。\n3800 = "而在今天，僅限今天——Ｋｉｈａ０７Ｓ會作為前補機直接掛接在８６２０後面。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぴったり出力をあわせねば、ロスと負荷とが発生する。\nそれを防止するために、ギリギリまで調整を詰めたのだ」\n2427 = "「如果動力不能完美匹配的話，就會產生動力損失和額外的負荷。所以為防止這樣的情況，我們盡力做了調整」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「そっか。みんながんばっとるのねぇ」\n2808 = "「這樣啊，大家都在努力呀」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だな。みんな。真闇姉ももちろん含むみんなのおかげで、\nようやく、今日を迎えられた」\n2580 = "「是的。大家——當然這其中也包括真闇姐——拜大家所賜，我們才走到了今天」" \n\n# monologue\n# JP: 本当であればⅨ号にも記念編成に加わってほしかった。\n3312 = "其實本來是希望把九號也加入到紀念編組裡來的。" \n\n# monologue\n# JP: が、宗方\x%l機関士;#00ffc040;機関士%l;#;とオリヴィは、\nそうした僕らの申し出を、胸を張り堂々と断った。\n3352 = "可宗方\\x%l機関士;#00ffc040;司機%l;#;和奧莉薇義正辭嚴地拒絕了我們的邀請。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「御一夜の……御一夜鉄道を支えてくれたみんなは。\n嬉しかとよね。こん晴れの舞台での、そん並び」\n2485 = "「御一夜的……支撐著御一夜鐵路的各位，要是能並肩站在這盛大的舞台上的話，肯定都老高興了吧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「――うん」\n2351 = "「嗯」" \n\n# monologue\n# JP: 宗方\x%l機関士;#00ffc040;機関士%l;#;とオリヴィは、\n真闇姉とまったく同じことを言った。\n3426 = "宗方\\x%l機関士;#00ffc040;司機%l;#;和奧莉薇說的話和真闇姐簡直一模一樣。" \n\n# monologue\n# JP: 『湯医線に残るべきは、自分たちとⅨ号』\n『キハ07sを、8620と並べて走らせてやって欲しい』と。\n1619 = "“我們的九號應該留在湯醫線上”，還有“希望能讓Ｋｉｈａ０７Ｓ和８６２０一同馳騁”。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「まさしく、これこそ――\nナインスターズ一号列車にふさわしい記念編成だ」\n2113 = "「不過也確實——這真是和九星一號列車最相稱的紀念編組」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「双鉄さま」\n2886 = "「雙鐵少爺」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ」\n# 2351 = "「嗯」" \n\n# monologue\n# JP: 説明の間に手早く\x%l運転体;#00ffc040;運転体%l;#;への換装を終えたハチロクを、\nいつものように、膝の上へと抱き上げる。\n3300 = "八六已經迅速換裝為\\x%l運転体;#00ffc040;駕駛體%l;#;，我邊說邊像往常一樣把她抱到腿上坐下。" \n\n# monologue\n# JP: 定位置へ落ち着けばすぐ、ハチロクはえへんと胸を張り、\n教師口調で、僕の不足を継ぎ足し始める。\n3387 = "坐到專屬位置上的八六馬上驕傲地挺起胸口，用教師般的語氣開始補充我說明裡不足的部分。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「協調を機能させるためには、両方の[どうりょくしゃ,2]動力車の出力が\n一定していなければなりません」\n2499 = "「想要進行有效的多機牽引，就必須要讓雙方的動力車都穩定保持同樣的動力」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あー、前のが遅くて後ろのが速かったら、\n後ろのにとって、前のは抵抗にしかならんゆーこと？」\n2340 = "「啊，那要是前頭慢後頭快，對後頭的車來說，前頭那個就只是前進的障礙唄？」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「その通りです。ですので、前――今回は[ハチロクニイマル,3]8620の\n運転操作に、[レ　イ　ナ　ナ,3]キハ07は連動しなければなりません」\n2619 = "「正是如此。所以這次Ｋｉｈａ０７必須時刻與前車——也就是８６２０的駕駛操作同步」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「どぎゃんして、連動されると？」\n2493 = "「怎麼個同步法呢？」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「\x%l共感;#00ffc040;共感%l;#;です。双鉄さまの運転操作をわたくしが\x%l共感;#00ffc040;共感%l;#;で\nれいなに送り、れいながそれをキハ07に適用します」\n2815 = "「通過\\x%l共感;#00ffc040;共鳴%l;#;。我把雙鐵少爺的駕駛操作，全部通過\\x%l共感;#00ffc040;共鳴%l;#;發給玲奈，玲奈再同步操作Ｋｉｈａ０７」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あー、ゆーたら」\n2336 = "「啊，這麼說的話」" \n\n# monologue\n# JP: 真闇姉の指が顎へとあてられる。\n3761 = "真闇姐用手指抵住了下巴。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「双ちゃんの[じょうききかんしゃ,3]8620運転が。リモコン操作で\n一緒に[まるっこいの,3]キハ07も動かす――みたいな感じとや？」\n2449 = "「小雙雖然在操作８６２０，但也在通過遙控同步操作Ｋｉｈａ０７——差不多就是這樣的感覺唄？」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「左様ですね。そのような協調を行うことにより、\nパワーロスを最小限に、重連を機能させられるのです」\n2621 = "「正是如此。通過這樣的配合，可以將動力的損失控制到最小，也使得重聯行駛得以成立」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ほーたら、双ちゃんは責任重大やねぇ」\n2837 = "「那小雙還真是責任重大咧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うん。責任は重大だ。\n僕はいつでも、お客様の命をお預かりしているのだから」\n2636 = "「沒錯，我身負重任。畢竟無論何時，我身上都肩負著客人的性命」" \n\n# monologue\n# JP: 宗方さんの代理で、マッチ箱客車に学園生さんたちを乗せ、\nⅨ号でことこと、湯医行きの列車を引っ張るときも。\n3212 = "不管是在代替宗方先生駕駛九號，牽引著火柴盒客車滿載著學生去湯醫上學時。" \n\n# monologue\n# JP: ナインスターズ一号列車を記念編成で引く今日も。\n責任の重さは常に一定――極大だ。\n3922 = "還是負責牽引九星一號列車紀念編組的今天，我肩頭的責任總是最沉重的。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だから変わらず、きっちりと責任を果たしてみせる。\n僕一人で運転をするわけでもないし、大丈夫さ」\n2535 = "「所以我會和往常一樣盡到自己的責任。而且也不是我一個人在駕駛，沒問題的」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「左様ですね。\nわたくしたちは、いつでも双鉄さまをお支えします」\n2635 = "「沒錯。雙鐵少爺的身後還有我們呢」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「チームやけんね。特別なことじゃなかけん」\n2674 = "「畢竟咱們是團隊嘛。那還不是必須的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うん」\n# 2351 = "「嗯」" \n\n# monologue\n# JP: 二人の言葉に頷けば、\n真闇姉もまた、嬉しげな笑顔で頷いてくれる。\n3598 = "我點頭附和著她們兩人的話，真闇姐也笑著點了點頭。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ほんなら、おねーちゃんは安心して、\n双ちゃんたちを見送れるとね」\n2835 = "「那姐姐也放心了，可以安心把小雙交給你們了」" \n\n# monologue\n# JP: （ああ……）\n3969 = "（啊……）" \n\n# monologue\n# JP: 瞬間、ふっと思い出す。御一夜に戻ってきて、\nハチロクを目覚めさせた――あの日も丁度こうだった。\n3915 = "這一瞬間，我突然想起剛回到御一夜、喚醒八六的時候——那天也是這樣的。" \n\n# monologue\n# JP: 僕の頭上にナビがいて。日々姫がいて、真闇姉がいて。\nそしてハチロクと出会ったことで全てが動き出したのだ。\n3995 = "Ｎａｖｉ在我頭頂上空盤旋，日日姬和真闇姐在身邊。然後正是因為和八六相遇，才有了之後的這一切。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ほんなら、頑張って！」\n2830 = "「那你們就加油吧！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ、ねぇね、靴、ありがと」\n2341 = "「啊，阿姐，謝謝你把鞋拿來」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「どーいたしまして。楽しか旅をね？\nお客さんたちにも、双ちゃんたちも」\n2439 = "「客氣什麼，玩得開心點。不光是說客人，小雙你們也是」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「はい。かしこまりました」\n2418 = "「好的。您放心吧」" \n\n# monologue\n# JP: 真闇姉に、日々姫に、ハチロクに、ナビに。\n伝えたい気持ちはあるが、旨く言葉にまとまらない。\n3569 = "我明明有好多話要和真闇姐、日日姬、八六、Ｎａｖｉ說，可話到嘴邊卻又說不出口。" \n\n# monologue\n# JP: なんとかしようとあがいてみても、\n結局それは、ごく平凡にしか収まらない。\n3211 = "不管我怎麼絞盡腦汁，最後還是只剩一句簡單平凡的句子。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「――ありがとう。気をつけて行ってくる」\n1642 = "「——謝謝，我們會小心的」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ん。あ、そうだ」\n2350 = "「嗯。啊，對了」" \n\n# monologue\n# JP: 運転台から下りかけて、\n真闇姉がふとその足を止め、振り返る。\n3327 = "剛走下駕駛台，真闇姐突然像又想起了什麼一樣，回過頭來。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あんね、双ちゃん。\n父さんから、双ちゃんに伝言預かっとーよ」\n2827 = "「那什麼，小雙。爸爸叫咱給你帶句話來著」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「[とう,1]義父さんから？」\n1630 = "「[父親,1]養父說什麼？」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「『ナインスターズ一号列車の運行開始おめでとう。\n御一夜に戻ったら、九つ星で一杯やろう』って」\n2157 = "「他說“恭喜九星一號列車開始運營。等回御一夜一起乾上一杯九星吧”」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「わかった。『喜んで』と伝えておいて――\nああ、いや。戻ったら、僕から直接電話する」\n2519 = "「我知道了。你回去跟他說“我很樂意”——啊，算了。等回來我直接打電話給他吧」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「うん。その方が良かね」\n2363 = "「嗯，就這樣」" \n\n# monologue\n# JP: 笑顔を残し、真闇姉がキャブから去れば、\n空気が一気に引き締まる。\n3760 = "真闇姐帶著滿面笑容離開後，駕駛室裡的氣氛一下子緊張了起來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫」\n2556 = "「日日姬」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「任せて！」\n2434 = "「妥妥的！」" \n\n# monologue\n# JP: \x%lポーカー;#00ffc040;ポーカー%l;#;を手に日々姫が焚き口戸を開けて、\n勢いもよく\x%l保火;#00ffc040;保火%l;#;状態の石炭の山を突き崩す。\n3654 = "日日姬拎起\\x%lポーカー;#00ffc040;爐鉤%l;#;，打開爐口，一口氣將處於\\x%l保火;#00ffc040;留火%l;#;狀態時堆得小山一樣的煤炭推平。" \n\n# monologue\n# JP: （ボウっ！）\n3974 = "（嘭！）" \n\n# monologue\n# JP: 見ずとも熱気が、炎のあがりを伝えてくれる。\nすかさずザッと、石炭を投げ入れる小気味良い音。\n3452 = "就算不搭眼看也能感受到熱氣噴湧而出。緊接著便傳來了“唰啦”一聲清脆的加煤聲。" \n\n# monologue\n# JP: 蒸気圧計の針がじわじわ上がっていくにつれ、\n室温と僕の体温も上昇してくる。\n3938 = "隨著蒸汽壓力表的指針抬升，室溫和我的體溫也不斷上升。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ハチロク。今日の手順の最終確認を」\n2198 = "「八六，出發前最後確認一下今天的發車步驟」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「試験時と変わりません。機関庫を出て入換線を進み、\n後進で本線に入り、待ち受けている車輌群と連結」\n2734 = "「與行駛測試時並無變化。先由機車庫駛入調車線，而後倒車進入幹線，掛接等候在那裡的編組」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「その先頭が、\n今日だけはキハ07ｓなことが、試験のときとの違い」\n2257 = "「只是今天和測試時不同，Ｋｉｈａ０７Ｓ會預先掛接在編組的前方」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「左様ですね。連結後はすみやかに協調を結びますので、\nいつでも進行可能な状態となります」\n2634 = "「沒錯。掛接完成後我們會迅速開始進行多機牽引的準備，調整至隨時可以出發的狀態」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「記念セレモニーなどは？\n御一夜駅でもあるのだろう？」\n2700 = "「紀念典禮呢？御一夜站也要舉行的吧？」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「ございますが、わたくしたちは直後に運転ですので、\n参加はしないことになっております」\n2735 = "「舉行倒是會舉行，但我們之後馬上要發車，就不參加了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「となれば、やって記念撮影くらいか」\n2826 = "「那也就只能拍一張紀念照了」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「その辺は式典の流れもございましょうし……\nポーレット様のご指示に従えばよろしいかと――あっ」\n2226 = "「原本計劃的活動流程就是這樣……雙鐵少爺只要聽從波萊特大人的指示就好了……啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃに！　信号」\n2868 = "「阿哥！信號燈」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n2693 = "「知道了」" \n\n# monologue\n# JP: 表示が変わった。\n警戒速度で、まずはゆるゆる、入換線から２番線へ――\n3257 = "信號變了。我需要以警戒速度先慢慢開進調車線，而後是二號線——" \n\n# monologue\n# JP: そうするために、\x%lブレーキ;#00ffc040;ブレーキ%l;#;位置を“運転”に。\n\x%l逆転機;#00ffc040;逆転機%l;#;を\x%l前進フルギア;#00ffc040;前進フルギア%l;#;に入れ、\x%l加減弁;#00ffc040;加減弁%l;#;テコに手をかける。\n3720 = "為此，我先把\\x%lブレーキ;#00ffc040;剎車%l;#;掛在“行駛位置”，然後把\\x%l逆転機;#00ffc040;回動機%l;#;擰到\\x%l前進フルギア;#00ffc040;滿檔前進%l;#;，手放在\\x%l加減弁;#00ffc040;汽門%l;#;操作杆上。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「[じょうない,1]場内、[けいかい,1]警戒！」\n2397 = "「場內警戒！」" \n\n# monologue\n# JP: 信号を再確認して、\x%l喚呼;#00ffc040;喚呼%l;#;して。\n3532 = "我再次確認信號並\\x%l喚呼;#00ffc040;復誦%l;#;道。" \n\n# monologue\n# JP: そして僕らはのろのろと、いつもと全く変わらぬペースで、\n晴れ舞台へと這い出していく。\n3627 = "於是我們照著與平常無二的節奏，緩緩地向著那盛大的舞台駛去。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃに。まだだよー。\nまだ、まだ、そのまま――」\n2873 = "「阿哥，還遠著呢。繼續，繼續，保持速度——」" \n\n# monologue\n# JP: 助士側窓から思いっきり身を乗り出して、\n日々姫が連結誘導してくれる。\n3650 = "日日姬從司爐那邊的窗戶探出身，靠目測指揮著我掛接。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「…………」\n1653 = "「……」" \n\n# monologue\n# JP: ハチロクは、何も言わない。\nリラックスしきった表情で、日々姫に全てを任せてる。\n3298 = "八六什麼都沒說，而是以放鬆的表情將一切都交給日日姬。" \n\n# monologue\n# JP: 僕も、同じだ。自分の目で確認は入れつつも、\n日々姫の声を優先し、細かなタイミングを取っている。\n3511 = "我也一樣。我雖然也在用自己的眼睛確認，但還是以日日姬的指令為準，時刻準備著抓住每個操作的時間點。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「なーんもせんでね。そのまま～、そのまま～、\nやわやわ～、やわやわ～」\n2144 = "「什麼也別動。繼續倒，繼續倒，慢慢兒地，慢慢兒地」" \n\n# monologue\n# JP: とうに\x%l絶気;#00ffc040;絶気%l;#;し、ただのろのろと\x%l惰行;#00ffc040;惰行%l;#;している。\n最後の行程――そのタイミングだけを待っている。\n3320 = "列車早就進入了\\x%l絶気;#00ffc040;無汽%l;#;行駛狀態，緩緩\\x%l惰行;#00ffc040;慣行%l;#;。只剩臨門一腳——我現在就在等待那個瞬間。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「\x%lブレーキ;#00ffc040;ブレーキ%l;#;、運転～～～っ――今っ！」\n2738 = "「行駛位置先別動——好！」" \n\n# monologue\n# JP: （がちっ！）\n3973 = "（喀嚓！）" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「お見事です」\n2653 = "「漂亮」" \n\n# monologue\n# JP: ごくごく軽い連結ショックを感じてすぐに、\nぴたりと止まる。\n3560 = "我感到掛接的輕微振動，車身隨之整個停了下來。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「連結良し！　すごく上手です」\n2547 = "「掛接正常！做得真不錯」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ――」\n2348 = "「嗯——」" \n\n# monologue\n# JP: キャブから出ればすぐさまに、\nポーレットが、旗を揺らして駆け寄ってくる。\n3539 = "我剛走出駕駛室，就見波萊特搖著旗子跑了過來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ポーレット。凄いにぎわいだな」\n2381 = "「噢，波萊特，真熱鬧啊」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ですよねー」\n2571 = "「是啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「セレモニーはもう終わったのか？」\n2201 = "「典禮已經結束了嗎？」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「緊張しました～。[きゅうしゅうきゅうこく,3]九洲九国、[ゆかり]縁の殿様の末裔たちに、\n九洲[ななけん,1]七県の知事がずらりと勢揃いですから」\n2265 = "「可緊張死我了。畢竟九州九國各位領主的後裔、九州七縣的知事都齊聚一堂」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それは壮観だっただろうな」\n2843 = "「那想必是很壯觀了」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「いえ、それほどでもないですよ？」\n2115 = "「不，倒也說不上吧？」" \n\n# monologue\n# JP: 言って、青い瞳が僕から外れる。\n3856 = "說著，波萊特的碧眼看向了一旁。" \n\n# monologue\n# JP: 御一夜駅の――彼女のホームを、\nいとおしそうに、そっと眺める。\n3414 = "她用充滿憐愛的眼神眺望的，正是御一夜站的站台——屬於她的站台。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「この景色の方が、ずっと、ずーーーっと壮観です」\n2805 = "「這景色，可比典禮壯觀多了」" \n\n# monologue\n# JP: ホームに綺麗な列を描くのは、\n乗車位置に並んでいる、幸せそうな家族連れたち。\n3349 = "只見站台上的候車線後，一組組幸福的家庭，正在整齊地排隊上車。" \n\n# monologue\n# JP: その何十倍もの密度で隙間を埋めているのは、\nカメラを手にした、老若男女入り乱れている人たちだ。\n3802 = "而在隊列之間，則是數十倍於乘客的人群，幾位手持相機的男女老幼正在其中穿梭。" \n\n# monologue\n# JP: （ああ）\n3978 = "（感嘆）" \n\n# monologue\n# JP: １番線。湯医線側のホームにはⅨ号機関車が停車している。\nその傍らには、宗方\x%l機関士;#00ffc040;機関士%l;#;とオリヴィと。\n3374 = "在一號線上，九號機車正停在湯醫線的站台邊。而宗方\\x%l機関士;#00ffc040;司機%l;#;和奧莉薇，正站在九號旁。" \n\n# 【宗方】\n# display as 宗方\n# JP: 「――」\n# 1653 = "「……」" \n\n# 【オリヴィ】\n# display as 奥莉薇\n# JP: 「イェイ！」\n2725 = "「耶！」" \n\n# monologue\n# JP: 短い敬礼。\n僕らも、短く答礼する。\n3245 = "他們向我們短短地敬了一禮。我們也同樣向他們回禮。" \n\n# monologue\n# JP: ただそれだけで、十分だから。\n3333 = "千言萬語都在這無言的動作之中。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「見学にも、ご乗車の方にも外国人さん多いです。\n『[ここの]九つ[ぼし]星』のグランプリ効果、さまさまですね」\n2110 = "「不管是乘客還是來參觀的客人裡，都有不少外國人。這都是多虧了右田一的九星贏得了大獎」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だけではない。ヒノモトボンドや\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ボンドで\nナインスターズを知ってくれた人も多かろうし――」\n2134 = "「也不盡然。通過日本債券和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;債券得知九星的人應該也不在少數——」" \n\n# 【コン】\n# display as 空\n# JP: 「ケンっ！」\n2268 = "「吭！」" \n\n# monologue\n# JP: 僕の視線に答えるように甲高く鳴いたコン駅長が動くたび、\n見学客の一部も揃って、ぞろぞろその後をついていく。\n3446 = "就好像回應我一樣，空站長大吼了一聲，它每叫一聲，參觀的客人就跟著它往前走。" \n\n# monologue\n# JP: ガイドをしているように見え――\nというか実際、ガイドをしてくれているのかもしれん。\n3752 = "看起來它似乎是在給觀眾帶路，說不定實際上還真是這樣。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ビラや新聞、ポスターに、ネットなどの広報告知。\n学園生や関係者の口コミや、駅長の力も大きかろう」\n2816 = "「通過傳單、報紙、海報還有網路的宣傳，學生和鐵路相關人員的口耳相傳，還有站長的功勞也不可小覷」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あ、そうですよね。もちろんです。そういう全部が、\nひとつにまとまってくれたからこそ、ですよね」\n2356 = "「嗯，你說得對。這是當然的。正是這些點滴的積累，才令今天的盛況得以實現啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だな」\n2677 = "「的確」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「うふふっ」\n2375 = "「嘻嘻」" \n\n# monologue\n# JP: なんと柔らかな笑顔だろう。\n改めて見れば、なんとか細く小さいのだろう。\n3411 = "她此刻的笑容真是柔情萬種。而回頭想來，我突然意識到她的體格竟是如此嬌小。" \n\n# monologue\n# JP: この細腕で、ずっと御一夜鉄道を――\n思いは、そのまま言葉に変わる。\n3806 = "而她以這纖弱的身軀，一直以來肩負著御一夜鐵路——想到這裡，我心中的想法不禁脫口而出。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「本当にみんなの力だが。\nその中で誰よりも、ポーレット。君の力が、一番大きい」\n2810 = "「這確實是大家的功勞。但在這中間，波萊特，你的貢獻是最大的」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「え？！　そんな、わたしなんて、なんにもっ」\n2279 = "「咦？！哪有，我並沒有做出什麼貢獻呀」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「線路も、駅も、なにもかも。君が守ってくれていた。\nそれがなければ、何ひとつさえ始まらなかった」\n2708 = "「線路，車站，這大大小小的一切，都是由你守護至今。若非如此，如今的一切都根本無從談起」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「……双鉄くん」\n1685 = "「……雙鐵君」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕らに――ハチロクにさえ。鉄道の素晴らしさを\n思い出させてくれたのは、他ならぬ君だ、ポーレット」\n2767 = "「讓我們——就連八六也不例外——再次回想起鐵路的美好的，不是別人，正是你啊，波萊特」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「双鉄くん」\n2884 = "「雙鐵君」" \n\n# monologue\n# JP: ポーレットの顔が下を向く。\nぐっと、大きく肩が動く。\n3706 = "波萊特低下了頭。她的雙肩很明顯地顫抖著。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ダメ、ですよ。そんなこと言われたら、\nわたし、舞い上がっちゃうし――泣いちゃいます」\n2802 = "「這可……不行啊。現在說這種話，我怕控制不住自己——怕自己會哭出來」" \n\n# monologue\n# JP: けれど、ポーレットがあげなおす顔は、\n見事な笑顔だ。\n3356 = "可當波萊特再次抬起頭時，卻是滿面如花的笑容。" \n\n# monologue\n# JP: その笑顔のまま、うん、と力強く頷いて、\nポーレットは姿勢を改める。\n3407 = "她就這樣笑著用力點了點頭，而後整理了一下站姿。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「全て順調、予定通りに進んでいます。\n双鉄くんも、定時の進行を前提に準備してください」\n2092 = "「一切都按計劃順利進行。雙鐵君也請依照計劃，準備準點發車」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「心得た」\n# 2693 = "「知道了」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「それと、ギリギリになっちゃいましたけど――\nこれ、出ました、キャンセル。一室」\n2821 = "「還有，雖然申請得相當匆忙，但好巧還真趕上有人退票了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「出たのか！」\n2598 = "「有人退票了啊！」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「はい。御一夜-[やつしろ,2]八ツ城の一区間。その区間だけの\nキャンセル待ちをいれてたのは、双鉄くん一人です」\n2578 = "「是的。只有從御一夜到八代之間的這一站。申請這一站退票候補的，也只有你一個人而已」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「…………」\n1652 = "「…………」" \n\n# monologue\n# JP: これだけの人気とにぎわいだ。\nあり得んことだ、と思っていた。\n3903 = "車票賣得那麼火爆，我本來還以為大概沒機會了。" \n\n# monologue\n# JP: だから、ダメ元――言い訳をするような気持ちで、\nキャンセル待ちをお願いしてはいたのだが……\n3602 = "所以雖然心裡其實沒抱希望，但還是抱著給自己一個交代的心態，提交了退票候補申請……" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いいのか？　僕が買ってしまって」\n2522 = "「我空訂一間真的可以嗎？」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「なんで買っちゃいけないんですか？　\n代金も先払いでお預かりしてますし」\n2654 = "「為什麼不可以呢？你都已經全額付款了呀」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「しかし、この混雑でこの人気だ。\n実際に乗れない僕が、たとえ一区間だけといっても」\n2167 = "「但是，現在這列車一票難求。我又不可能過去坐，就算只是一站……」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「乗るじゃないですか。ご家族と一緒に。\n子供のころの、双鉄くんが」\n2560 = "「明明是會去坐的嘛。小時候的雙鐵君，和家人一起」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！」\n2317 = "「啊！！」" \n\n# monologue\n# JP: 何も、ポーレットには言ってない。\n3509 = "我並沒有告訴波萊特原因。" \n\n# monologue\n# JP: ただ、万が一にキャンセルが出て埋まらなかったら、\n席を取らせて欲しいとそれだけ……頼んだだけだ。\n3540 = "我只是告訴她如果有人退票又沒有候補的話，希望能給我留一個位置。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「だから、どうか旅してください。家族の旅を。\n鉄道網が、本当の意味で再び繋がり始める――この日に」\n2537 = "「所以，就在今天再與家人一同踏上旅途吧，在鐵路網真正重新開始聯結於一處的這個日子裡」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「しかし……\nそれは僕の、個人的で感傷的なわがままで」\n2162 = "「但是——這只是出於我個人情感，我個人的理由」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「双鉄くんの個人的で感傷的なわがままが、\nみんなに、この日を。この列車をくれたんですよ？」\n2169 = "「但正是你的個人情感和那麼一點任性，帶領著大家一路走到今天，造就了這輛列車啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「！」\n2899 = "「！」" \n\n# monologue\n# JP: 本当に、わかってくれている。\n……だから、ようやく確信できる。\n3529 = "我其實心裡早已察覺，而如今，終於得以確信。" \n\n# monologue\n# JP: あの日に僕を助けてくれた、この澄み切った青い瞳は。\n再び僕をまっすぐ見つめて――見抜いてくれる。\n3931 = "那天曾幫助過我的人，那雙清澄的碧眼，如今再次注視著我——直視著我的內心。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「個人的で……感傷的な、わがままで――」\n2864 = "「都是因為我的……個人情感，才走到了今天——」" \n\n# monologue\n# JP: どうしても、僕は列車を走らせたかった。\n3723 = "無論如何，我都想讓列車馳騁起來。" \n\n# monologue\n# JP: 途切れてしまったレールを繋ぎ、\n見知らぬ場所へ、新しい駅へ。辿り着かせてやりたかった。\n3440 = "將四下散落的鐵軌再次匯聚相連，向著未知的地方、全新的車站，出發前進、平安到達。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「だから、このキャンセルは。みんなから双鉄くんへの\nプレゼントだって、思ってもらえたら嬉しいです」\n2529 = "「所以就把這次的退票，當成是大家給雙鐵君的一點心意吧」" \n\n# monologue\n# JP: ……全てわかって、見守り続けていてくれた。\n1622 = "……她將我心中種種都看在眼中，並默默給予著支持。" \n\n# monologue\n# JP: 僕の願いが、公共の利益ともつながるように、\nただ黙々と、\x%lポイント;#00ffc040;ポイント%l;#;を切り替え続けてくれていた。\n3449 = "就如我的心願與公共利益關聯在一起一樣，她只是默默地為我操作著\\x%lポイント;#00ffc040;轉轍器%l;#;。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……知ってはいたが、知らなかった。\nポーレットは、とても強い女性なのだな」\n1667 = "「……你真是一位堅強的女性。這一點我不是不知道，但現在才徹徹底底地明白」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「そんなの！　双鉄くんの百分の一も強くないです！\nでも、だからこそ、嬉しかったんですよ？」\n2542 = "「才沒有！連你的百分之一都抵不過呢。不過正因為如此，我才特別高興」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「嬉しかった？」\n2658 = "「特別高興？」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「これです」\n2702 = "「給」" \n\n# monologue\n# JP: ポーレットの指が伸びてくる。\n3712 = "波萊特遞出了指間夾著的車票。" \n\n# monologue\n# JP: 受け取ったまま、\nまだポケットにもしまえぬ切符を、そうっとなぞる。\n3568 = "我接過還沒有裝進過口袋的車票，放在手上輕輕撫摸。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「頼まれたとき、わたし、はじめて感じたんです。\n大人になった双鉄くんが、弱い所を見せてくれた、って」\n2390 = "「在收到申請的時候，我第一次感受到，即便是長大成人的雙鐵君，也會展露出柔弱的一面呀」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「大人になった僕が、か」\n2865 = "「長大成人的我啊……」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あ！？」\n2319 = "「啊！？」" \n\n# monologue\n# JP: 言ったとたんに、ポーレットの声が慌ててしまう。\n3817 = "聽我這麼一問，波萊特的聲音變得慌亂了起來。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あのっ、深い意味はないんです！　そのっ」\n2801 = "「這個，沒什麼特別的意思啦！就是說」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ。大丈夫だ。\n多分、僕にもわかっているし……同じ気持ちだと思う」\n2331 = "「啊，沒事的。大概我也明白的……而且心裡也是這麼覺得的」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あ」\n# 2310 = "「啊」" \n\n# monologue\n# JP: ポーレットの顔が安堵にゆるむ。\nならば、やっぱりそうなのだろう。\n3705 = "波萊特也隨之現出安心的神色。那看來我所想的也八九不離十了。" \n\n# monologue\n# JP: 幼少期の僕とポーレットとの思い出ならば――\n大事だからこそ、後日に、もっとゆっくり語り合いたい。\n3455 = "年幼時我與波萊特的過往——我很重視這個話題，所以還是日後再找機會跟她慢慢談吧。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「今はお互い、それぞれの仕事に集中しよう」\n2673 = "「現在還是先專心做好各自的工作吧」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「はい！　了解です、双鉄くん！」\n2425 = "「好的！先這樣吧，雙鐵君！」" \n\n# monologue\n# JP: 笑顔で言って、くるりと僕に背中を向けて、\nポーレットは、早足でホームの人並みに溶けこんでいく。\n3711 = "波萊特笑著說完，便轉身向快速向站台走去，消失在了人群之中。" \n\n# monologue\n# JP: 入れ替わりこちらへやってくるのは――\n3808 = "而她前腳剛走，後腳就有人朝我們這邊走了過來——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なんだ、\n今日は[りょそう,1]旅装の稀咲をみられるかと思ったのだが」\n2347 = "「喲，還想著今天能見到稀咲出遠門的樣子呢」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「ボクは単なるお供だからね。\nというか……まぁぶっちゃけ、商談相手？」\n2514 = "「我只是陪同而已。或者說，叫解說顧問更合適？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「商談相手」\n2752 = "「解說顧問」" \n\n# monologue\n# JP: 稀咲の言葉が意外にすぎて、オウム返しをしてしまった。\n3773 = "稀咲的話實在過於讓我意外，我不禁下意識地重複了一遍。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「大陸の――\n[ちゅうごく,1]仲国のご友人の招待なのだろう？」\n2173 = "「你是指接待大陸的——仲國的朋友嗎？」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「ボクの友人じゃない。父の旧友の娘さん」\n2142 = "「也說不上是我的朋友，她是家父舊交的女兒」" \n\n# monologue\n# JP: その方が、純粋に抽選に打ち勝って、\nナインスターズにご乗車をされることとなった。\n3810 = "而她只是單純地從抽選中脫穎而出，獲得了乘坐九星的資格而已。" \n\n# monologue\n# JP: 『一人旅も味気ないから』と、稀咲が同乗を誘われたのは、\nそうした理由と聞いた気がしたのだが――\n3586 = "我記得好像是說因為“一個人旅行太煞風景”，便邀請了稀咲同行——" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「残念ながら、ボクには今回は乗車を楽しむ余裕は無い。\nけど彼女は仕事だから。全力で乗車を楽しむだろうね」\n2531 = "「所以很遺憾，這次搭車我怕是無暇享受了。不過她因為工作的關係，大概會好好享受一番吧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「仕事だから、全力で、乗車を、楽しむ」\n2469 = "「工作關係，好好享受，搭車」" \n\n# monologue\n# JP: 即座には意味が繋がらない。\n仕事で乗車……乗務、ではなく――\n3502 = "我一時無法將這些字眼聯繫起來。因為工作關係搭車，卻又顯然不是乘務任務——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あっ！　もしかして」\n2316 = "「啊！莫非……」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「可能性はあると思う。というか、彼女の性格からして、\n少なくともボクは――『その可能性しか感じない』」\n2599 = "「有可能。倒不如說，以她的性格，至少我是感覺不到任何其他可能性」" \n\n# monologue\n# JP: 性格がどうかは詳しく知らんが、\n立場のことなら知っている。\n3493 = "性格如何我就無從知曉了，但此人的立場我卻多少有所了解。" \n\n# monologue\n# JP: “元忠さんの旧友”が、\n仲国政府の、交通系の、かなりの要職にあることならば。\n3797 = "考慮到這位“元忠先生的舊交”，在仲國政府交通相關部門身居要職的話。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……ナインスターズのような豪華リレートレインを、\nもしも、仲国で走らせられるなら――」\n2432 = "「如果考慮在仲國開行像九星這樣的豪華接力列車——」" \n\n# monologue\n# JP: それは、計り知れないほど大きな規模のビジネスになる。\n3927 = "那其中蘊含的商機簡直難以想像。" \n\n# monologue\n# JP: 日ノ本鉄路・術仙車両工場で、\n果たして対応しきれるものか、些か不安になる程の――\n3313 = "其規模恐怕窮盡日本鐵路、術仙車輛工廠之力，都未必能完全應對。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「そういう意味でも、今日は良い運転を頼むよ？　双鉄」\n2459 = "「就算是從這個角度，今天也要好好駕駛哦，雙鐵」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「無論だ。安心して欲しい」\n2853 = "「那當然，放心吧」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ですね。双鉄さんは、“今日も”、どんなときでも、\n必ず、最高の運転をこころがけてくれてますから」\n2695 = "「確實。雙鐵先生不只是“今天”，而是每天都會全心全意展現出最棒的駕駛技術的」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「おっと！　そうだった。これは失礼」\n2303 = "「哦喲！確實如此，是我失言了」" \n\n# monologue\n# JP: ずっと黙って聞いてたふかみに、\n釘を刺されて稀咲が笑う。\n3830 = "被一直在旁默不作聲的深美擺了一道，稀咲臉上露出了自嘲的笑容。" \n\n# monologue\n# JP: ふかみが、稀咲に、釘を刺した――\nああ、本当に成長したなと、しみじみ感じる。\n3814 = "而敢於對稀咲這樣開口，我也切實感到了深美的成長。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「なら、キミたちを最大限に信頼しつつ、\nボクは、ボクの仕事を頑張ってくるよ」\n2846 = "「那我就給予你們最大的信任，專心努力做好我自己的工作啦」" \n\n# monologue\n# JP: ひらりと、稀咲が手を振る。\nそのままあっさり、\x%l客車;#00ffc040;客車%l;#;の方へと消えていく。\n3775 = "稀咲輕輕揮手，隨後邁著輕盈的步伐向\\x%l客車;#00ffc040;客運車廂%l;#;那邊走去。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「よい旅を」\n2696 = "「祝旅途愉快」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「ボクのお供も八ツ城までだけだけどね。\nともあれ、キミたちもよい旅を！」\n2508 = "「我也只是陪同到八代而已。不過嘛，也祝你們旅途愉快吧！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「あはは。旅、じゃないですけどね、わたしたちは」\n2294 = "「哈哈，對我們而言，這可不是旅途呀」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうだな、乗務だ」\n2637 = "「沒錯，是乘務任務」" \n\n# monologue\n# JP: ――車掌姿が、よく似合っている。\nナインスターズ専務車掌。その第一号。早瀬ふかみ。\n3226 = "九星首席專職列車長，早瀨深美，列車長制服在她的身上分外得體。" \n\n# monologue\n# JP: 研修に出て、本当に多くを持ち帰ってきてくれて――\nふかみなくして、今のナインスターズはなかっただろう。\n3403 = "她在結束培訓後帶回的諸多知識、見解也對我們裨益良多。甚至可以說，沒有深美，就沒有如今的九星。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だが旅が、日常から非日常に出掛けることであるのなら。\n今日一日のみは、僕らの乗務も、旅であろうさ」\n2538 = "「所謂旅途，如果是指體驗日常生活中所沒有的經歷，那今天的乘務任務對我們而言，也可算是旅途了」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「あ――」\n2308 = "「啊——」" \n\n# monologue\n# JP: 一号列車を無事届けたなら、\n次の乗務からその先は、すぐに日常に変わるのだろうが。\n3422 = "如果一號列車順利抵達其終點，那從下次乘務任務開始，這一切就都會成為新的日常。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「気負いすぎるな、ふかみ。ふかみももはや鉄道員だ。\n大丈夫。必要な全ては、既に体に染み付いている」\n2651 = "「深美也別繃得太緊了。你已經是獨當一面的鐵路工人了，所需的知識與能力都早已掌握，沒問題的」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「はい」\n2419 = "「好的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だから、乗務をきっちりこなしたその上で――\n乗車も、旅も。僕は、ふかみにも楽しんで欲しい」\n2534 = "「所以我希望你在圓滿完成乘務任務的同時，也能盡情享受我們這次的搭車之旅」" \n\n# monologue\n# JP: ふかみ一人だけにではなく。ハチロクと日々姫にも。\nポーレットとれいなにも。凪と中村さんとみくろにも。\n3331 = "包括深美、八六、日日姬，還有波萊特、玲奈、凪還有中村小姐和美玖路在內。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「楽しめるだけの余裕を持とう。そうすることが、\nより高度な安全にも、お客さまの楽しみにも繋がるさ」\n2467 = "「工作做到萬全，自然會有享受旅途的閒暇。而這也和行車安全與乘客們的體驗息息相關」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ですね！　わかりました、双鉄おにいさん」\n2604 = "「有道理！我明白啦，雙鐵哥哥」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「！」\n2304 = "「唔！」" \n\n# monologue\n# JP: 久々に、\n出会ったころと同様に、僕を双鉄『おにいさん』と呼び。\n3400 = "她久違地稱我為雙鐵“哥哥”，就像與我初遇時一樣。" \n\n# monologue\n# JP: けれどふかみは、出会ったころには見られなかった、\n力強くて軽やかで、明るい笑顔を浮かべてみせる。\n3731 = "然而如今的深美臉上，掛著當初在她臉上鮮得一見的堅強、輕鬆而明快的笑容。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「楽しむ余裕を作るためにも、\n早瀬ふかみ、笑顔で乗務、がんばってきます！」\n2141 = "「也為了能給自己創造享受旅途的閒暇，早瀨深美會努力面帶笑容完成乘務任務的！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ。よろしく頼む。よい乗務を」\n2338 = "「啊，那就麻煩了。祝乘務工作順利」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「はいです！　右田\x%l機関士;#00ffc040;機関士%l;#;もご安全に。よい乗務を！」\n2421 = "「好的！也祝右田\\x%l機関士;#00ffc040;司機%l;#;乘務工作安全順利！」" \n\n# monologue\n# JP: （ぽっ！）\n3972 = "（啵！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っと」\n2346 = "「喲」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃに、お帰り。\nカマばもう、待ちきれないって騒いどるばい」\n2871 = "「阿哥，歡迎回來。窯已經熱得等不及要開動咧」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「協調運転、準備良しです。\n信号次第で、いつでも出発可能です」\n2402 = "「多機牽引已經準備周全。只要信號燈亮就隨時可以出發」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うん」\n# 2351 = "「嗯」" \n\n# monologue\n# JP: 息を吸い、吐く。\n力みは無い。恐怖も無い。\n3572 = "我深吸一口氣，徐徐吐出。沒有緊張，沒有恐懼。" \n\n# monologue\n# JP: だけれど不安は、少しある。\n少しあるから、わくわくしながら前へ進める。\n3249 = "但卻稍有一絲不安。不過正因為有這份不安，才能有所期待地前行。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕たち自身が、誰より楽しい旅をしよう。\n安全で快適な――鉄道旅行の時間を、過ごそう」\n2511 = "「我們更要享受這段旅途，享受這段安全舒適的鐵路旅行」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「はい！　双鉄さまっ！」\n2586 = "「是的！雙鐵少爺！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ならば、行こう！」\n2833 = "「那好，出發吧！」" \n\n# monologue\n# JP: ハチロクを発車ベルごと抱きかかえたなら、\n大きく高く、澄んだ鐘の音が響き渡る。\n3305 = "八六把發車用的鈴鐺直接抱在懷裡，然後用力搖響了它。" \n\n# monologue\n# JP: （ガランガラ～ン！　ガランガラ～ン！）\n3975 = "（噹啷啷！噹啷啷！）" \n\n# monologue\n# JP: そして、信号が青になる。\n3616 = "接著，信號燈亮起了綠燈。" \n\n# monologue\n# JP: 僕たちだけが、\nこの先の線路へと踏み込むことを許される。\n3744 = "現在，只有我們這輛列車可以在眼前這段線路上馳騁。" \n\n# monologue\n# JP: （ボっ、ボっ、ボっ、ボっ）\n3971 = "（啵、啵、啵、啵）" \n\n# monologue\n# JP: \x%lブラスト;#00ffc040;ブラスト%l;#;音が、鼓動と重なる。\n109 = "\\x%lブラスト;#00ffc040;汽缸排汽%l;#;音和心跳聲重疊在一起。" \n\n# monologue\n# JP: \x%lブレーキ;#00ffc040;ブレーキ%l;#;を運転位置にし、\x%l前進フルギア;#00ffc040;前進フルギア%l;#;。\n\x%l加減弁;#00ffc040;加減弁%l;#;テコに手をかける。\n3552 = "我將\\x%lブレーキ;#00ffc040;剎車%l;#;放到行駛位置，回動機擰到\\x%l前進フルギア;#00ffc040;滿檔前進%l;#;，然後將手放在\\x%l加減弁;#00ffc040;汽門%l;#;操作杆上。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「出発、進行」\n2208 = "「出發，前進」" \n\n# monologue\n# JP: いつもどおりの決まった動作をいつもどおりに行えば、\n8620も、いつもどおりに答えてくれる。\n3579 = "我用和往常一樣的動作，進行和往常一樣的操作，８６２０也像往常一樣回應著我。" \n\n# monologue\n# JP: （ポーーーーーーーーっ！）\n3970 = "（啵——！）" \n\n# monologue\n# JP: \x%l汽笛;#00ffc040;汽笛%l;#;一声。\n喧騒にまみれるキャブ内にまで響くホームの客の歓声。\n116 = "\\x%l汽笛;#00ffc040;汽笛%l;#;高聲鳴響。就連喧鬧的駕駛室內都傳來了站台上客人歡呼的聲音。" \n\n# monologue\n# JP: そして、ゆっくり、8620の\x%l動輪;#00ffc040;動輪%l;#;が廻り始める。\nレールを掴み、力強く、僕らを彼方へ運び始める。\n3728 = "然後，８６２０的\\x%l動輪;#00ffc040;動輪%l;#;開始慢慢旋轉。牢牢抓住鐵軌，用強大的力量帶動我們前進。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わぁっ！」\n2289 = "「哇！」" \n\n# monologue\n# JP: 日々姫の声。\n感動の声。\n3659 = "日日姬發出一聲感動的驚嘆。" \n\n# monologue\n# JP: 僕もだ――体が、震えてる。\n3513 = "我也和她一樣感動，感動到身體不由自主地微微顫抖。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「嬉しく楽しいことですね。\n新しい線路を走るのは」\n2730 = "「能在新的線路上馳騁真開心」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n# 2571 = "「是啊」" \n\n# monologue\n# JP: 臨時ダイアで、発車時刻を揃えてある。\n3523 = "我們以臨時時刻表的方式統一了發車時間。" \n\n# monologue\n# JP: 御一夜を出てしばらくは、\n湯医線、湯医に向かうⅨ号機関車と併走だ。\n3916 = "這使得我們在剛剛駛出御一夜站的一小段路上，可以和在湯醫線上駛向湯醫的九號齊頭並進。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「――嬉しいな。そして、楽しい」\n1639 = "「——我很高興，也很享受這情景」" \n\n# monologue\n# JP: 踏切がある。人がみっちり、8620を見守っている。\n3326 = "前方有一處道口。人們把兩側圍了個水洩不通，只為親眼看看８６２０。" \n\n# monologue\n# JP: 踏切番のボランティアさん達も一緒になって、\nみんなが大きく、大きく大きく手を振っている。\n3608 = "把守道口的志願者們也和觀眾們一起對我們揮手致意。" \n\n# monologue\n# JP: （ポーーーーーーーーっ！）\n# 3970 = "（啵——！）" \n\n# monologue\n# JP: \x%l汽笛;#00ffc040;汽笛%l;#;で応える。\n3565 = "我拉響\\x%l汽笛;#00ffc040;汽笛%l;#;回應他們。" \n\n# monologue\n# JP: 弾ける笑顔が、\n一瞬にして煙とともに、僕らの後ろに流れて溶ける。\n3844 = "觀眾的笑容瞬間和噴出的煙一起被我們拋在身後。" \n\n# monologue\n# JP: （ぽっ！）\n# 3972 = "（啵！）" \n\n# monologue\n# JP: 僕らのレールが大きく曲がる寸前に、\nⅨ号が\x%l汽笛;#00ffc040;汽笛%l;#;を鳴らしてくれる。\n3382 = "在我們腳下的鐵軌即將大幅度轉向之前，九號鳴響了\\x%l汽笛;#00ffc040;汽笛%l;#;。" \n\n# monologue\n# JP: よい旅を――\n願いをこめて、鳴らしてくれる。\n3246 = "他們用汽笛聲祝福著我們——“一路順風”。" \n\n# monologue\n# JP: （ぽっ！）\n# 3972 = "（啵！）" \n\n# monologue\n# JP: \x%l汽笛;#00ffc040;汽笛%l;#;で答え、直進していくⅨ号列車に別れを告げる。\n3521 = "我們以\\x%l汽笛;#00ffc040;汽笛%l;#;回應，並就此與繼續筆直前行的九號列車告別。" \n\n# monologue\n# JP: 僕らの走る肥颯線は、\n小畑へと、屋岳越えへと向かっていくから。\n3526 = "我們正在行駛的這條肥薩線，是通往大畑、翻山前往矢岳方向的。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「\x%l制限;#00ffc040;制限%l;#;、解除――よしっ！」\n1635 = "「\\x%l制限;#00ffc040;限速%l;#;解除——正常！」" \n\n# monologue\n# JP: だから、僕らは加速する。\n新しい笑顔の待つ場所へ。\n3600 = "所以我們還要繼續加速，向著遠方那些翹首以盼的笑容。" \n\n# monologue\n# JP: 見たことの無い未来へ向けて、\n次々石炭を投げ込んで、一直線に加速していく――\n3527 = "我們連續不斷地將煤炭投入鍋爐，向著尚未目睹的未來，一口氣加速——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それでは。よろしくお願いします」\n2862 = "「那麼，就拜託您了」" \n\n# monologue\n# JP: 90系客車群、客車３両に食堂車一両、\nそしてレム9100とを、引き渡す。\n3991 = "９０系客運車廂編組，客運車廂三節、餐車一節，以及Ｒｅｍｕ９１００，已經完成換掛。" \n\n# monologue\n# JP: 復元された特急系\x%l電車;#00ffc040;電車%l;#;、\x%lクハ26;#00ffc040;クハ26%l;#;-000と、その\x%l編成;#00ffc040;編成%l;#;に。\n3613 = "接手牽引它們的，是完成修理的特快\\x%l電車;#00ffc040;電車%l;#;——\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;－０００。" \n\n# 【赤井】\n# display as 赤井\n# JP: 「リレートレイン・ナインスターズ。\n[やつしろ,2]八ツ城－[くまもと,1]隈元間、引き継ぎました」\n2548 = "「接力列車·九星。八代至隈元段，列車已接管」" \n\n# monologue\n# JP: そして\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の物を模した\x%lタブレット;#00ffc040;タブレット%l;#;――\nリレートレインの象徴は、僕から赤井\x%l運転士;#00ffc040;運転士%l;#;へと。\n3554 = "我將模仿\\x%lレイルロオド;#00ffc040;鐵路人偶%l;\\x%lタブレット;#;#00ffc040;操作板%l;#;的圓盤——也就是接力列車的象徵交給了赤井\\x%l運転士;#00ffc040;駕駛員%l;#;。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「この先、よろしくおねがいします」\n2123 = "「之後就拜託您了」" \n\n# 【赤井】\n# display as 赤井\n# JP: 「お任せください。\nお預かりした笑顔を必ず、隈元駅へと届けます」\n2766 = "「請放心。我一定將雙鐵先生交給我的笑容，平安送到隈元站」" \n\n# monologue\n# JP: 握手する。\n天才と称されたベテランの、線が細いのに力強い手と。\n3525 = "我們握了握手。被稱作天才的資深駕駛員，手雖纖細卻充滿力量。" \n\n# 【ニイロク】\n# display as 二六\n# JP: 「ふふっ」\n2270 = "「呵呵」" \n\n# monologue\n# JP: ニイロクが笑う、とても自然に。\nそれを合図に、眩いフラッシュの花々が咲く。\n3237 = "二六非常自然地笑了。而周圍也在此刻亮起了一片閃光燈。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「お疲れ様です、双鉄くん。\nあとはわたしが」\n2780 = "「辛苦了，雙鐵君。之後就交給我吧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いつも本当にすまんが――頼む」\n2722 = "「老是這樣真不好意思——麻煩了」" \n\n# monologue\n# JP: キハ07sから下りてくれたポーレットへと、\nマスコミ対応を任せてしまう。\n3591 = "我走向從Ｋｉｈａ０７Ｓ上下來的波萊特，將應對媒體的任務交給了她。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふぅ」\n2271 = "「呼」" \n\n# monologue\n# JP: 慣れ親しんだキャブへ戻って、タイを緩める。\n3546 = "我回到了熟悉的駕駛室裡，鬆了鬆領帶。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「慣れぬことゆえ、妙に緊張してしまった。\nすまんが、水をもらえるか――あれ？」\n2804 = "「這場面還是令人莫名地緊張啊。不好意思，能讓我喝口水嗎——咦？」" \n\n# monologue\n# JP: いない。ハチロクも日々姫も。\n二人とも下りているらしく、運転台には僕だけだ。\n3207 = "不在，八六和日日姬都不在。她們二人似乎也都下了車，如今駕駛台只有我一個人。" \n\n# monologue\n# JP: 一人になるのはなんだか久しぶりな気がして、\nホっとしつつも、少し寂しいようにも感じる。\n3496 = "感覺這樣一個人待著好像是很久以前的事了。在感到放鬆的同時，我卻又感到了些許落寞。" \n\n# monologue\n# JP: （ゴンゴン）\n3967 = "（咣咣）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ？」\n# 2373 = "「嗯？」" \n\n# monologue\n# JP: 思う間も無く、来客だ。\nキャブの鉄戸を開けば笑顔が飛び込んでくる！\n3923 = "還沒來得及胡思亂想，就有客人來訪。我打開駕駛室鐵門，一個燦爛的笑容便朝我撲來！" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「えっへへ～！　れいな、がんばったですよぉ！\nそうてつさん、たくさんたくさんほめてくださぁい」\n2379 = "「嘿嘿，玲奈今天很努力哦！雙鐵先生可要好好誇誇玲奈才行～」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うん。れいなはえらいな！」\n2368 = "「嗯，玲奈真了不起！」" \n\n# monologue\n# JP: 言われるままに抱きとめる。\n3593 = "我邊說邊抱住了玲奈。" \n\n# monologue\n# JP: 心の底からの感謝を込めて、\n柔らかな髪をおもいっきりに撫でまくる。\n3727 = "然後帶著真摯的感謝，用力來回撫摸她柔順的頭髮。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「れいなのおかげで、普段とまるで変わらなかった。\n協調運転ということを、全く意識せずすんだ」\n2404 = "「多虧了玲奈的努力，我感覺和平時駕駛一點區別都沒有，完全意識不到這是在多機牽引」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「えへへぇ、がんばりましたからぁ！\nもーっとれいなをほめたりしても、いいですよ？」\n2377 = "「嘿嘿嘿，玲奈可努力了哦！再多誇獎誇獎玲奈吧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「れいなはすごい！　まさに\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の[かがみ]鑑だ。\nやるときはやる。こう見えていぶし銀の実力派だ」\n2665 = "「玲奈真厲害！簡直是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的楷模。不會出差錯的實力派，是金子總會發光」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わわわわ、れいな、\nものすごおくほめられちゃってますぅ～」\n2282 = "「哇哇，玲奈被好一番稱讚了哦～」" \n\n# monologue\n# JP: ぽわぽわと、れいなのほっぺがピンクに染まる。\n3743 = "玲奈高興到臉頰都染上了絲絲紅暈。" \n\n# monologue\n# JP: それを両手でつつむようにしてイヤイヤ身悶え――\nそうしてあれれ？　とあどけなく小首を傾げてみせる。\n3415 = "她用兩隻手捂住自己的臉，像是有些害羞了。然後她有些不解地歪著腦袋問道。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ハチロクさんどこですかぁ？　れいなとおんなじだけ、\nハチロクさんとみくろさんも、ほめてもらわないとぉ」\n2192 = "「八六小姐不在嗎？得不到和玲奈一樣的誇獎，對八六小姐和美玖路小姐太不公平了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「まさしく道理だ。というか、なかなか戻らんな。\n――ひょっとすると、改札でも手伝っているのかな？」\n2174 = "「你說得對。不過她怎麼這麼久了還不回來？莫非是在幫忙檢票嗎？」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「あるかもですねぇ、ハチロクさん、\nいがいと改札、好きですからねぇ」\n2602 = "「有可能哦。八六小姐意外地很喜歡檢票呢」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「きっぷを切るのが楽しいのだろう。\n[かいさつきょう,2]改札鋏をカチカチやっているときは、まるで――」\n2416 = "「她只是喜歡檢票鉗剪在車票上時那喀嚓喀嚓的感覺吧——」" \n\n# monologue\n# JP: 窓からホームへ向けた目を、\nその瞬間に、動かせなくなる。\n3573 = "我漫不經心地掃視窗外，卻瞬間僵住動彈不得。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「そうてつさぁん？」\n2883 = "「雙鐵先生？」" \n\n# monologue\n# JP: 家族連れ。\n他人の空似――というやつだろうか。\n3203 = "一家人。這一家人只是長得像他們吧。" \n\n# monologue\n# JP: いや、しかし……\nしかし、それにしてはあまりにも――\n3215 = "不，但是……就算這樣，也太像了——" \n\n# monologue\n# JP: （父さん、母さん。[みちこ,1]路子――）\n3983 = "（爸爸、媽媽、路子——）" \n\n# monologue\n# JP: 全てがあまりに、\nあまりに夢のような光景で――\n3914 = "這一切都太過如夢似幻——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！」\n2318 = "「啊！！！」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「そうてつさぁん！？」\n2881 = "「雙鐵先生！？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「待ってくれ！　父さん、母さん、路子！！」\n2698 = "「等等我！爸爸，媽媽，路子！！」" \n\n# 【路子】\n# display as 路子\n# JP: 「あ。そーちゃん！」\n2326 = "「啊，小雙！」" \n\n# monologue\n# JP: 路子が足を止めてくれる。\nけれど父さんと母さんは、そのまま改札を抜けてしまう。\n3886 = "路子停下了腳步。但父親與母親卻徑直走出了檢票口。" \n\n# monologue\n# JP: ――光の中に、\nま白く眩い光の中に、進んでしまう。\n3872 = "走向了潔白耀眼的光芒並融入其中。" \n\n# 【路子】\n# display as 路子\n# JP: 「れっ車、ナインスターズ！　さいこーだったよ！\nおへやとーってもきれいでね！　すごくおちついたの！」\n2209 = "「列車，九星！實在是太棒了！房間非常漂亮！裡面超級舒服！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……だろうと思った」\n1673 = "「……我也這麼覺得」" \n\n# monologue\n# JP: キャンセルが出た客室は、偶然にも“肥御”だったから。\n公募の中に地元の意見――僕らの意見も混じっていたから。\n3950 = "非常湊巧，退票的包廂正是“肥後”。在其設計過程中，我們的意見與當地公開募集的意見相互結合。" \n\n# monologue\n# JP: みんなの希望を、日々姫が見事に結晶させてくれたそこは、\n僕にもやはり、僕の客室とさえ思えていたから。\n3803 = "而大家的希望，都經日日姬之手完美加以展現。讓我都不禁覺得，那就應該是我的包廂。" \n\n# 【路子】\n# display as 路子\n# JP: 「あとね、いちばん前！\nみちね、やーっと見れたんだよ！」\n2820 = "「還有哦，在最前面那裡！小路終於看到啦！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n2315 = "「啊！」" \n\n# monologue\n# JP: スイ90 1。90系、ナインスターズ１号客車。\nその先頭には強化ガラスの展望窓が設けられている。\n3997 = "Ｓｕｉ９０　１，九星的一號客運車廂，其前方設置有鋼化玻璃的展望窗。" \n\n# monologue\n# JP: が、今日は記念編成だ。\nあの窓から見えた景色といっても――\n3251 = "但因為今天是紀念編組，透過那展望窗看出去的話——" \n\n# 【路子】\n# display as 路子\n# JP: 「かわいいまるいお顔のれっ車ね！\nみちのこと見て、ずーっとにこにこしてくれたの」\n2561 = "「是一輛有著圓圓可愛面孔的列車！它一直笑嘻嘻地看著小路呢」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あ――」\n# 2308 = "「啊——」" \n\n# 【路子】\n# display as 路子\n# JP: 「そーちゃん、これ見せてくれたかったんだぁって。\nみちね、だから、うれしくなったの！」\n2450 = "「小雙，你當初就是想叫我看這個吧。所以說，小路真的很開心！」" \n\n# monologue\n# JP: ――そうだ。路子は、こういうこだった。\n3666 = "是啊，路子就是這樣的孩子。" \n\n# monologue\n# JP: どんなときでも、どんな場所でも、\n楽しさを見つけ笑うこだった。\n3722 = "無論何時，無論何地，都能自得其樂，笑逐顏開。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……うん」\n1671 = "「……嗯」" \n\n# monologue\n# JP: だから、僕は、路子に見せてやろうとした。\n見えたものが\x%l炭水車;#00ffc040;炭水車%l;#;でも、たとえ、何も見えなくたって。\n3605 = "所以，哪怕當年我想叫她看的不過是\\x%l炭水車;#00ffc040;煤水車%l;#;而已，即便除此以外什麼都看不到——" \n\n# monologue\n# JP: 路子はやっぱり、僕には見えない楽しみをみつけ、\nきっと、笑って――笑ってくれると、わかっていたから。\n3884 = "路子也一定會找到我所看不到的有趣之處，笑逐顏開——將她最開心的笑容展現給我吧。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……ああ、やっぱり僕は、愚かだったんだなぁ」\n1670 = "「……啊，果然我是如此愚不可及」" \n\n# monologue\n# JP: 一番単純で、一番当然で、日常すぎて。\nだから一番大事なことを、最後まで思い出せなくて。\n3668 = "最單純，最理所當然，過於深植日常，因而也是最最重要的事，卻在最後才回想起來。" \n\n# 【路子】\n# display as 路子\n# JP: 「ええっ！？　そーちゃん、おろかなんかじゃないよぉ」\n2276 = "「咦！？小雙才不蠢呢」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうか」\n2690 = "「真的嗎」" \n\n# monologue\n# JP: 本当にあれは事故だったのだと、\nただ単純に――こころの底から、ようやく感じる。\n3583 = "我終於能夠發自內心地覺得那真的只是一場事故而已。" \n\n# monologue\n# JP: 僕は、路子を笑わせたかった。\nただそれだけのことだった。\n3543 = "我只是想博路子一笑，僅此而已。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうだよな。\n僕が愚かだったら、路子も愚かになっちゃうもんな」\n2140 = "「也對。如果我說自己愚蠢的話，那等於在說路子也愚蠢了吧」" \n\n# 【路子】\n# display as 路子\n# JP: 「ちがうよー！　そういういみじゃなくってー！」\n2108 = "「不是的！不是那個意思啦！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「わかってる。ちょっとからかってみただけだ」\n2521 = "「我知道的。就是逗你玩嘛」" \n\n# 【路子】\n# display as 路子\n# JP: 「～っ、からかわないでよー！\nそーちゃん、いじわるー！」\n2306 = "「唔，才不要你逗呢，小雙好壞！」" \n\n# monologue\n# JP: ぷっと膨れてくすくす笑って。\nそうして路子は、優しい目をして僕を見つめる。\n3897 = "路子鼓起了臉頰，卻又旋即笑了起來。而後便目不轉睛地溫柔地看向我。" \n\n# 【路子】\n# display as 路子\n# JP: 「いじわるだなんて、うそだからね？\nみち、ちゃあんと知ってるから」\n2132 = "「也不是真的說你壞哦。小路其實心裡都清楚的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うん」\n# 2351 = "「嗯」" \n\n# 【路子】\n# display as 路子\n# JP: 「そーちゃん、ほんとにありがとね？　\nれっ車の旅。鉄道旅行。みちに楽しいって教えてくれて」\n2691 = "「真的謝謝你哦，小雙。讓小路知道了鐵路旅行，乘坐列車旅行的快樂」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「――うん」\n1637 = "「——嗯」" \n\n# 【路子】\n# display as 路子\n# JP: 「みんなにも、ありがとーっていっておいてね？\nそーちゃんを助けてくれて、ありがとうって」\n2138 = "「也代小路向大家道個謝吧？就說謝謝他們幫助了小雙」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「わかった」\n2518 = "「我會的」" \n\n# 【路子】\n# display as 路子\n# JP: 「あ、そうだ。みんなっていったら――\nあのねそーちゃん。みみかして？」\n2324 = "「啊，對了。說到大家哦——小雙，把耳朵湊過來一下好嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ？」\n# 2373 = "「嗯？」" \n\n# monologue\n# JP: しゃがめばすぐさま、\n路子が僕に耳打ちしてくる。\n3538 = "我剛彎腰把耳朵湊過去，路子就在我的耳邊輕聲細語了起來。" \n\n# monologue\n# JP: とてもあどけない、けれどもおしゃまな問いかけで、\n僕の鼓膜とこころとを、ゆすり動かす。\n3402 = "她以無比天真無邪的語氣，問出與年齡不甚相符的問題，卻打動了我的鼓膜和內心。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「さぁ――どうだろうな」\n2800 = "「這個——很難說啊」" \n\n# monologue\n# JP: 『みんなのなかで、だれが好きなの？』\n実に少女らしい問いかけに、けれども僕は本気で困る。\n1616 = "“在大家裡面選的話，你最喜歡誰呀？”這問題著實頗為少女心，可我是真的難以回答。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「好き――といえば、みんな好きだが」\n2345 = "「喜歡——要說的話，大家我都喜歡啊」" \n\n# 【路子】\n# display as 路子\n# JP: 「ちがうよそーちゃん！\nそういうふうな好きじゃなくって」\n2106 = "「不是的啦小雙！不是你說的那種喜歡」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うん。わかっている。\n愛だ恋だの意味での、好きだよな」\n2364 = "「嗯，我明白。你說的是愛情、戀情那種喜歡吧」" \n\n# 【路子】\n# display as 路子\n# JP: 「そーそー」\n2443 = "「對對」" \n\n# monologue\n# JP: 一人前の顔をして、路子が頷く。\nそうして僕は、理解する。\n3888 = "路子滿臉嚴肅地點了點頭。而我也在此刻理解了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「わかっているから、わからんのだよ。\nなにせ僕は、ずっと路子に、幼い恋をしていたからな」\n2517 = "「我明白，但卻又不明白。畢竟我一直對你抱有青澀初戀般的感情」" \n\n# 【路子】\n# display as 路子\n# JP: 「ふえっ！？　みちに？」\n2296 = "「哎！？對小路？」" \n\n# monologue\n# JP: 路子が驚き、とても困った声を出す。\n3894 = "路子頗為詫異，聲音中透著不解。" \n\n# 【路子】\n# display as 路子\n# JP: 「だめだよそーちゃん。\nみちも、そーちゃんのこと大好きだけど」\n2803 = "「這可不行呀小雙。雖然說小路也很喜歡你」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうなんだ。路子と同じ大好きを、\n僕も路子に、ずっと、ずうっと抱いていた」\n2807 = "「這樣啊。我也一樣，一直很喜歡很喜歡你」" \n\n# 【路子】\n# display as 路子\n# JP: 「あー」\n# 2308 = "「啊——」" \n\n# monologue\n# JP: それは恐らく、幼い自己愛にすぎんのだろう。\nけれどもそれゆえ、想いは純粋で強かった。\n3933 = "那恐怕只是青澀的自戀而已吧。但正因如此，那份感情純粹而誠摯。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕は、路子を、ずっと大好きだったんだ」\n2504 = "「我一直都很喜歡路子呀」" \n\n# 【路子】\n# display as 路子\n# JP: 「うん」\n# 2351 = "「嗯」" \n\n# monologue\n# JP: 路子は僕の、かけがえのない半身で――\n3889 = "路子與我，你中有我我中有你，無可替代——" \n\n# monologue\n# JP: 僕を救ってくれたから、路子を救ってやれぬことには、\n僕はどこまでも、自分しか、路子しか、見られなかった。\n3369 = "因為當初她拯救了我，如果我不能反過來拯救路子的話，那無論到何時，我的人生中，都無法容下自己與路子以外的一切。" \n\n# 【路子】\n# display as 路子\n# JP: 「ならいまからは、これからさきは、\nほかのこのこと、好きになれるの？」\n2841 = "「那從現在開始，以後的日子裡，你會開始喜歡別人了嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だろうと思う。\n……たぶん、だけれど」\n2502 = "「應該會吧……不過我也不能斷言就是了」" \n\n# 【路子】\n# display as 路子\n# JP: 「そっかー、ざんねん！　みち、うまれてはじめて\nこくはくされたと思ったのに、すぐふられちゃったー！」\n2809 = "「這樣啊，好可惜哦！小路有生以來第一次被告白，結果馬上就又被甩啦！」" \n\n# monologue\n# JP: いたずらっぽく言って、笑って。\n3416 = "她的說笑中透著一絲調皮。" \n\n# monologue\n# JP: （とんっ――）\n3985 = "（腳步聲）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あ」\n# 2310 = "「啊」" \n\n# monologue\n# JP: 路子は軽く、ほんの一歩を。\nけれども僕に追えぬ一歩を――改札口へと踏み出していく。\n3890 = "路子輕輕地向檢票口邁出了腳步。雖然只是小小的一步，我卻無法追上她的步伐。" \n\n# 【路子】\n# display as 路子\n# JP: 「でも、しょうがないよねー。\nみち、もうしんじゃってるんだもんね」\n2114 = "「不過這也沒辦法呀。小路畢竟已經死了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……そう、だな」\n1678 = "「……是啊」" \n\n# 【路子】\n# display as 路子\n# JP: 「だからそーちゃん。\nみち、もういくね！」\n2527 = "「所以小雙啊，小路該走啦！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n# 2351 = "「嗯」" \n\n# monologue\n# JP: 引き止めはすまい。泣きはすまい。\n僕は、\x%l機関士;#00ffc040;機関士%l;#;なのだから。\n3505 = "我不會挽留，也不會落淚。因為我還肩負著身為\\x%l機関士;#00ffc040;司機%l;#;的使命。" \n\n# monologue\n# JP: これから旅立っていく人を、\n見送ることこそ――僕の誇りで、仕事なのだから。\n3748 = "目送今後踏上旅途的人們，便是我引以為傲的工作。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いってらっしゃい。よい旅を」\n2096 = "「一路走好。旅途愉快」" \n\n# 【路子】\n# display as 路子\n# JP: 「うん。またねそーちゃん」\n2358 = "「嗯，再見啦，小雙」" \n\n# monologue\n# JP: 明るく笑って手を振って、\n3409 = "她帶著燦爛的笑容向我揮手道別。" \n\n# 【路子】\n# display as 路子\n# JP: 「いってきまーす！」\n2850 = "「那我走啦！」" \n\n# monologue\n# JP: そして路子は、改札口へと駆けていく。\n3893 = "路子隨即向著檢票口走去。" \n\n# monologue\n# JP: 改札の向こうの光の中に、\nただの一度も振り返らずに――\n3420 = "她頭也不回地，走進了檢票口外的光芒之中——" \n\n# 【ハチロク】\n# display as ？？？\n# JP: 「双鉄さま、双鉄さま？」\n2888 = "「雙鐵少爺，雙鐵少爺？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あ――」\n# 2308 = "「啊——」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「双鉄さま？　いかがされたのですか？」\n2889 = "「雙鐵少爺？您怎麼了？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「え？　いかが、とは？」\n2298 = "「哎？什麼怎麼了？」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「このようなところにぼーっとお立ちになられて――\nえ！？」\n2497 = "「您怎麼呆站在這地方呀——咦！？」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わ！？　そうてつさん、\n笑ってるのに、泣いてますよぉ？」\n2882 = "「雙鐵先生，你明明在笑，可怎麼滿臉都是淚水呀？」" \n\n# monologue\n# JP: 運転台から、僕を追いかけてくれたのだろう。\n3741 = "玲奈這是從駕駛台一路追著我跑過來的吧。" \n\n# monologue\n# JP: れいなのびっくりした声に、\n自分が泣いていると知る。\n3812 = "而她那驚訝的聲音，也讓我意識到自己正在哭泣。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ、うん。ちょっとな……\nあー……うん。目に、ススが入ってしまっただけだ」\n2321 = "「啊，嗯。這個……啊，沒事，只是煤灰進到眼睛裡了而已」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「わ、めずらしいですねぇ」\n2292 = "「哇，好稀奇哦」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうだな。少し珍しい」\n2573 = "「是啊，的確不太常有」" \n\n# monologue\n# JP: 喉から勝手に、ほうっと、長い息が出る。\n3507 = "我不由得長吁了一口氣。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「珍しくはあるが――\nたまには、こういうこともあるさ」\n2879 = "「雖然不太常有——但偶爾還是會有這樣的時候啦」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「そおなんですねぇ」\n2806 = "「這樣哦」" \n\n# monologue\n# JP: れいなは……ごくごく普段通りだ。\n3737 = "玲奈……倒是表現得一如往常。" \n\n# monologue\n# JP: となるとハチロクが言っていた、\n僕がぼーっと立っていたのも、ほんの束の間のことだろう。\n3924 = "那八六說我呆站在這裡，應該不過轉眼之間而已吧。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ハチロクは、改札を手伝っていたのか？」\n2194 = "「八六，你剛才是在幫忙檢票嗎？」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「はい。とは申せ、わたくしが改札をいたしましたのは、\nただ一家族様だけ」\n2583 = "「是的。話雖如此，剛剛經我手檢票的，也只有一家人而已」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！？」\n2355 = "「嗯！！？」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「ご夫妻が先に改札をお済ませになられて。\n娘様をお待ちになると、ほんの少しだけお話しました」\n2414 = "「夫婦二人先檢好票出站，而後在他們等女兒出來的工夫，就攀談了幾句」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……お話……とは」\n1674 = "「……攀談……幾句」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のわたくしに、お礼をいって下さいました。\n『楽しかった。ありがとう』と、素敵な笑顔で」\n2155 = "「他們還特地向身為\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的我道謝。滿面笑容地對我說“我們都很開心。謝謝你”」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「――そうか」\n1641 = "「——是嗎」" \n\n# monologue\n# JP: 胸が詰まって、それだけ何とか絞りだす。\n3562 = "我感到胸口像被堵住了一樣，不過還是盡力擠出話語。" \n\n# monologue\n# JP: 絞り出したらボロボロと、\n涙のように、言葉が勝手にこぼれだしてく。\n3855 = "話語從我口中斷斷續續地、像滑落的眼淚一樣流出。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうか――よかった。楽しかった、か。\n僕は、ならば……僕は、ようやく――」\n2574 = "「是嗎——太好了。他們很開心啊。我，那就……我，終於——」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「いいえ？　まだですよ双鉄さま」\n2118 = "「不，還不行呢，雙鐵少爺」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！？」\n# 2319 = "「啊！？」" \n\n# monologue\n# JP: ハチロクが、腰に手をあて僕をじいっと見つめてる。\n3306 = "八六雙手叉著腰緊緊盯著我。" \n\n# monologue\n# JP: 怒った顔だが、本気ではなかろう、\n頬は幸せそうなピンクだ。\n3941 = "雖好像略有幾分慍意，不過應該是故意做出來的吧，她臉頰上還飄著兩朵幸福的紅暈。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「リレートレインを引き渡しても、\nそこで終わりではありません」\n2456 = "「就算交出了接力列車，我們的乘務工作可還沒結束呢」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ――そうだな。\nまさしくそうだ。そうだった」\n2367 = "「嗯，是啊。確實，你說得沒錯」" \n\n# monologue\n# JP: 終着駅は、ゴールではない。\nそこを起点に、また新しい旅が必ず、始まるのだから。\n3789 = "終點站並不是我們的終點。以其為起點還有新的旅途在等待著我們。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「まずは、折り返して御一夜に」\n2845 = "「那我們就先調頭回御一夜吧」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「左様ですね、まずは、そこから」\n2566 = "「是呀，先回御一夜吧」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「あのですねぇ！\nれいな、帰りも[きょうちょう,1]協調したいですぅ」\n2745 = "「要說回去的話！返程的時候玲奈也想重聯著開回去」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ」\n# 2351 = "「嗯」" \n\n# monologue\n# JP: うなずいている。全力で。\n3577 = "我用力點了點頭。" \n\n# monologue\n# JP: 車両運用の面をみたなら、\nどういう評価かわからんが――\n3942 = "雖然不知從車輛的使用方面來看這麼做合不合適——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうしよう。僕もそうしたい」\n2465 = "「就這麼辦吧。我也想這樣」" \n\n# monologue\n# JP: ――みんなで揃って、御一夜に。\n1598 = "——大家一同回到了御一夜。" \n\n# monologue\n# JP: それこそ僕らに必要な、\n大きな区切りと、思うから。\n3587 = "我認為，有必要將我們的這段旅程告一段落。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「双ちゃん、みんな、おかえりなさい」\n2451 = "「小雙，還有各位，歡迎回來」" \n\n# 【コン】\n# display as 空\n# JP: 「ケンっ！」\n# 2268 = "「吭！」" \n\n# monologue\n# JP: 御一夜駅のホームに戻れば、\n真闇姉とコンとが僕らを迎えてくれる。\n3524 = "我們剛停靠在御一夜站的站台，就受到了真闇姐和空的熱烈歡迎。" \n\n# monologue\n# JP: 出発したときの大賑わいとは打って変わって、\n迎えは、たったそれだけしかない。\n3362 = "和出發時的熙熙攘攘不同，回來時，站台上只剩她們倆迎接了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「寂しいものだな。\n祭りの後、とはこういったものか」\n2686 = "「真是令人倍感寂寞啊。慶典之後總是這樣」" \n\n# 【凪】\n# display as 凪\n# JP: 「さびしくなかばい！\n凪さまたちもおるけんねー」\n2541 = "「才不寂寞呢！這不還有本小姐呢嘛」" \n\n# 【中村】\n# display as 中村\n# JP: 「お疲れ様です。右田\x%l機関士;#00ffc040;機関士%l;#;。素晴らしい運転でした」\n2098 = "「一路辛苦了，右田\\x%l機関士;#00ffc040;司機%l;#;。駕駛手法著實嫻熟」" \n\n# 【みくろ】\n# display as 美玖路\n# JP: 「みくろたち、足ひっぱっちゃいませんでしたか？」\n2717 = "「美玖路這邊沒有扯大家後腿吧？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いいや。そんなことは全くなかった。\n早期発見と、迅速な対応のおかげだ、ありがとう」\n2632 = "「沒有沒有，完全沒有。倒不如說，要謝謝你們早早發現情況並加以應對才是」" \n\n# monologue\n# JP: 早戸をすぎて数分の地点で、凪と中村さんとが\n後補機、D51 1031の水ポンプの動作に違和感を覚えた。\n3384 = "在駛過隼人幾分鐘後，凪和中村發現後補機Ｄ５１　１０３１的水泵的工況有些不自然。" \n\n# monologue\n# JP: ゆえ、八ツ城駅での引き継ぎセレモニーにも出ず、\n凪－中村－みくろは着後すぐ、その対処にあたってくれた。\n3622 = "故而在抵達八代站後，她們沒有出席典禮，而是和美玖路一起立即進行了處理。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「単純な詰まりの兆候とはいえ、もしも対処が遅れれば、\n帰りの峠越えにおいて、致命傷となりかねませんでした」\n2880 = "「雖說只是些許堵塞的跡象，但若不能及時處理，返程翻山的時候也還是會有造成嚴重損傷的風險」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん！　八ツ城ですぐに見たのは大正解だと思う！\nありがとね！　凪ちゃんも[ちかげ,1]千景ちゃんもみくろちゃんも」\n2353 = "「嗯！在八代馬上檢查真是太正確了！小凪、千景、美玖路，謝謝你們！」" \n\n# 【凪】\n# display as 凪\n# JP: 「当然ばい！　そいもまた、凪さま達のお仕事ばい！」\n2861 = "「那還用說！還不是本小姐車組分內的事！」" \n\n# 【中村】\n# display as 中村\n# JP: 「なにもなければ念のため、機関庫でもう一度、\n技師さんにも見てもらいたいんですけれど」\n2460 = "「就算目前沒有問題，回到機車庫後，還是請技工們再檢查一下為好」" \n\n# 【みくろ】\n# display as 美玖路\n# JP: 「[でごいち,2]Ｄ５１、先に機関庫いれちゃって大丈夫ですか？」\n2259 = "「可以先把Ｄ５１停回機車庫嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いや、少しだけ待ってくれ」\n2211 = "「別急，稍等一下吧」" \n\n# monologue\n# JP: せっかくこれだけ集まっていて、\nこれほど意気があがっているのだ。\n3946 = "難得有這麼多人在場，大家的情緒還如此高漲。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「もしよければ、みんなに相談したいことがある」\n2428 = "「如果大家不介意的話，我有事想和你們商量」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「相談ですか？　もちろんわたしは大歓迎ですけど」\n2597 = "「有事商量嗎？我當然是非常樂得參與啦」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「ちょうどいい。ボクからも相談したいことが発生した。\nといっても、まずは双鉄とポーレットとを希望するけど」\n2617 = "「正好，我也有事想要找你們商量。不過我本來是想先和雙鐵還有波萊特單獨商量就是了」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「え？　さっきの話、具体的に検討するとか？」\n2278 = "「咦？是剛才那件事的具體細節嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「すまんが稀咲の方は後回しにしてくれ。\n僕の方は、全員に聞きたい相談なのだ」\n2104 = "「不好意思，稀咲的事情先放一放好嗎。我想說的，是關於我們全體的事情」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あ、はい！」\n2322 = "「啊，好的！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「全員って……わたしとかも、です？」\n2190 = "「全體……也包括我嗎？嗯」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「もちろんだ。真闇姉にも、れいなにも」\n2675 = "「當然。真闇姐和玲奈也是」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あらまぁ、おねーちゃんでも役にたてると？」\n2312 = "「啊呀，姐姐也有出得上力的地兒嗎？」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「れいな、そうだんごともがんばりますよぉ」\n2670 = "「玲奈，會努力參與的」" \n\n# monologue\n# JP: 頭上を見れば、無論、ナビ。\n僕の隣には、無論、ハチロク。\n3610 = "抬頭仰望，Ｎａｖｉ就在上空。而我的身旁自然也有八六。" \n\n# monologue\n# JP: 赤井・ニイロク組と宗方・オリヴィ組にも聞きたいが、\nまずは、この面子にたずねてみよう。\n3943 = "雖然也想聽聽赤井·二六車組和宗方·奧莉薇車組的意見，不過先和在場的人商量一下吧。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ナインスターズは、みなのおかげで走り出した。\nけれどもこれは、鉄道復権の端緒にすぎない」\n2388 = "「在大家的齊心努力下，九星終於馳騁在九州的鐵路線上了。但這不過是揭開了鐵路復興的序幕而已」" \n\n# monologue\n# JP: みなが頷く、一斉に。\n3394 = "大家一齊點頭同意。" \n\n# monologue\n# JP: 観光は、究極的には水物だと――　一度は窮地に陥った\n観光都市の人間ゆえ、それは誰もがよく知っている。\n3629 = "旅遊業終究是望天吃飯，難以自行掌控——身為曾陷入困境的旅遊城市居民，大家對此也都心知肚明。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ナインスターズは、あこがれであり、非日常だ。が、\n鉄道が真に復権するには、日常の足となる必要がある」\n2127 = "「九星是一種跳脫出日常生活的憧憬。但鐵路要實現真正的復興，就必須成為承載日常生活的載體」" \n\n# monologue\n# JP: いきおい続けた言葉には、\nけれどもほとんど、強い頷きは返らない。\n3596 = "我順勢開始展開話題，大家基本都還是在點頭表示同意。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「……日常の足としては、エアクラに勝てないよね。\n湯医線のような特殊事情でもないのなら」\n1683 = "「……要說承載日常生活的載體，若不是有像湯醫線這樣的特殊情況，怕是很難勝過空凝機吧」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「――けど、双鉄くんなら」\n2163 = "「但是你……」" \n\n# monologue\n# JP: ポーレットが僕を見つめてくれる。\n青い瞳に、いっぱいの信頼をたたえてくれる。\n3710 = "波萊特的視線毫不動搖地望向我，一雙碧眼中顯出的是滿滿的信賴。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「考えてますよね？\nもう、きっと、その辺のことも」\n2799 = "「這些方面的情況，你肯定已經都考慮過了吧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「構想がある。実現できれば、エアクラとも、\n飛行機とも船とも違った強みを出せる、構想が」\n2477 = "「已經有了一些設想。這設想如果能夠實現，將會體現出有別於空凝機、飛機與輪船的獨特優勢」" \n\n# 【凪】\n# display as 凪\n# JP: 「わおわお！　そいば、どぎゃんと構想ばい！？」\n2283 = "「哇哦！什麼設想那麼厲害呢！？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「高架標準軌専用線による、旅客超特急電車」\n2739 = "「行駛在高架標準軌專用線上的客運超特快電車」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「高架で、専用線で、標準軌の線路を走る」\n2395 = "「在高架橋，專用線，標準軌的線路上行駛」" \n\n# 【みくろ】\n# display as 美玖路\n# JP: 「お客さんだけを運ぶ、超特急の、\x%l電車;#00ffc040;電車%l;#;」\n2254 = "「只承運乘客的，超特快，\\x%l電車;#00ffc040;電車%l;#;」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうだ。\nそれは大都市間を、時速200キロで結ぶ列車だ」\n2633 = "「沒錯。以時速２００公里的列車連接各大城市」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「おっきな町と町の間を」\n2818 = "「連接各大城市」" \n\n# 【みくろ】\n# display as 美玖路\n# JP: 「時速――200キロで」\n2591 = "「時速——２００公里」" \n\n# monologue\n# JP: れいなとみくろが戸惑ったように呟いて、\n次の瞬間、わあっとその顔を見合わせる。\n3739 = "玲奈與美玖路不解地低語著，而後恍然大悟般互相交換了一下眼神。" \n\n# 【みくろ】\n# display as 美玖路\n# JP: 「凄い！　凄いです！  それがもしも実現したら」\n2684 = "「真厲害！太厲害了！如果真能實現的話」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「お客さん、みんな乗るですよぉ！\nだって、エアクラよりもずっとずうっと速いですぅ！」\n2595 = "「會有很多很多乘客的！這可比空凝機快太多啦！」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ばってん、列車に時速200キロなんて、出せると？」\n2762 = "「話說回來，列車真能開到時速２００公里嗎？」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「きっとだせちゃいますぅ！　だって、れいなの妹、\nガスタービンに改造されて時速150キロ出しましたから」\n2727 = "「肯定能開到的！因為玲奈有改裝了燃氣輪機的姐妹開到過時速１５０公里呢」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「標準軌で、専用線なら、もっと出せる。\n200キロだって――きっと、それ以上のスピードだって」\n2431 = "「如果是標準軌，還是專用線的話，還能更快些。別說２００公里——更高的速度都不無可能」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「けど……それって、ものすごいお金とか、時間とかが」\n2261 = "「可是……那會需要極其龐大的資金和時間吧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「かかるだろう。が――たとえどれほどかかろうと、\nそれを埋められる人脈と地歩を、僕らは築いている筈だ」\n2729 = "「肯定要的吧。不過，不管需要多少，我們都應該能夠以相應的人脈和地位來解決吧」" \n\n# monologue\n# JP: しばし、沈黙。\nやがて、一人、また一人と頷き始める。\n3763 = "眾人陷入了沉默。而後，一個又一個地開始點頭。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「……つまり、双鉄の構想は」\n1664 = "「……也就是說，雙鐵這個設想」" \n\n# monologue\n# JP: ただ一人だけ頷かぬままの稀咲が静かに、\nじいっと――僕を見つめてくる。\n3348 = "只有一個人沒有點頭，而是靜靜地盯著我——那就是稀咲。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「まったく新しい……日ノ本の大動脈となるような、\n鉄道路線を作るということ？」\n2576 = "「是想要建造全新的，會在將來成為整個日本大動脈的鐵路線路嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だな。\n言うなれば、新・幹線鉄道だ」\n2582 = "「是的。簡單說就是，新·幹線鐵路」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「新・幹線鉄道」\n2551 = "「新·幹線鐵路」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「しんかんせん――しんかんせん！\nすごくいいです、すてきですよぉ！！」\n2554 = "「新幹線——新幹線！好厲害，超棒的哦！！」" \n\n# monologue\n# JP: れいなの言葉に、みなが笑顔を輝かせる。\nだから感じる。描き出せる。\n3815 = "聽到玲奈的話，大家臉上也都綻放出了笑容。而這也讓我腦海中的設想越來越清晰。" \n\n# monologue\n# JP: 僕が伸ばして行くレールの、\n未来へ走らせる列車の姿を。\n3928 = "那在我向前鋪設的鐵軌上，向著未來疾馳的列車的樣貌。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それは、ひかりだ。無数の希望を集めて走る。\nまばゆい、真っ白な高速列車だ」\n2839 = "「那就是光。滿載匯聚的無數希望疾馳的，耀眼純白高速列車」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひかり――。うん！　最高の名前だって思います。\nなにより速く、どこまでだって、旅していける」\n2183 = "「光——嗯！這名字真是太棒了！無比迅速地奔向無處不達的旅途」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ほんなら、\n新・幹線鉄道の特急列車は、ひかり号？」\n2860 = "「那這麼說，就是新·幹線鐵路的特快列車，光號？」" \n\n# 【凪】\n# display as 凪\n# JP: 「わおわお！　凪さま決めたばい！！！\nひかり号の一号列車の！　\x%l運転士;#00ffc040;運転士%l;#;さん目指すばい！」\n2287 = "「哇哦！本小姐決定啦！！！要奔著成為光號一號列車的\\x%l運転士;#00ffc040;駕駛員%l;#;努力！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「なら、わたしは車掌一号！\n凪ちゃん、一緒に乗務しようね！」\n2849 = "「那我要成為一號列車長！和小凪一起執行乘務任務！」" \n\n# 【凪】\n# display as 凪\n# JP: 「望むとこばい！！」\n2627 = "「求之不得咧！！」" \n\n# monologue\n# JP: （ああ――）\n# 3978 = "（感嘆）" \n\n# monologue\n# JP: 僕と路子の幼い夢が、みるみるうちに伝播していく。\nこれなら叶うと確信できる。\n3545 = "我和路子兒時的夢，不知不覺已經深植於越來越多人的心中。而這，也讓我確信其終將實現。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「れいなちゃんの妹の、ガスタービンちゃんの記録って、\nまだどこかに残っとぉ？」\n2662 = "「玲奈的姐妹改造燃氣輪機時的紀錄，在哪裡還能找到嗎？」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「はぁい！　さがしたらすぐ出せますよぉ」\n2733 = "「能的！這個很快就能找到」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「海外にも！　超高速列車の車両とか資料とか、\nまだまだたくさん残ってるはずです！」\n2387 = "「國外也有！超高速列車的車輛及其資料，保留下來的應該有很多！」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「その他にも、きっと活かせる先人の知恵は、\n無数に残っておりますとも」\n2877 = "「除此以外，想必亦有大量先行者的知識流傳於世」" \n\n# 【みくろ】\n# display as 美玖路\n# JP: 「みくろも、知ってること全部――\nお友達にもきいて、お伝えしますね」\n2715 = "「美玖路也會向朋友們去打聽，一定知無不言，言無不盡」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん。ありがと！」\n2370 = "「嗯，謝謝！」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「さて、忙しくなりそうだ。後東氏にアポを――\nいや、その前に仲国の件の整理が先か」\n2798 = "「這下可要忙起來了啊。得去約後東先生——不，應該先把仲國那邊的東西理好嗎」" \n\n# 【凪】\n# display as 凪\n# JP: 「それよりまえに！\n大事な約束、のこっとるばーい！」\n2393 = "「在那之前！還有個重要的慣例沒搞咧！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「あ！」\n# 2315 = "「啊！」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「ああ、そうでしたね」\n2328 = "「啊，差點忘記了」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「これは――ボクとしたことが焦り過ぎたね」\n2681 = "「看來我確實是有點太心急了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ？」\n# 2373 = "「嗯？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あああ、わたしナッパ服！　けど、まぁいっか！」\n2330 = "「啊，我還穿著彩頁服呢！算了，就這樣吧！」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「おねーちゃんもおしゃれしてくればよかったと」\n2557 = "「早知道姐姐就好好打扮打扮了」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「れいなは、ポーレットのとなりでうつりますねぇ」\n2668 = "「玲奈要在波萊特的旁邊」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「双鉄くんは真ん中！　真ん中にはいってください」\n2885 = "「雙鐵君在正中！請站在正中間吧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ！」\n# 2315 = "「啊！」" \n\n# monologue\n# JP: なるほど、確かに約束していた。\n3338 = "原來如此，這的確是慣例沒錯。" \n\n# monologue\n# JP: ぽかんとしているみくろと中村さんとにだから、\n大きな声で説明する。\n3841 = "見美玖路和中村小姐愣在了一邊，我便大聲向她們解釋道。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「記念写真だ！\nナインスターズ一号列車が無事に走った、その記念の！」\n2701 = "「紀念照！一起拍一張九星一號列車順利發車的紀念照吧！」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「カメラと三脚！　わたし、すぐにとってきます！！」\n2524 = "「我馬上去拿照相機和三腳架！！」" \n\n# monologue\n# JP: ポーレットがレールショップへ駆けていく。\n3709 = "波萊特朝鐵路商店跑去。" \n\n# monologue\n# JP: 正式な記念写真は、赤井・ニイロク組に、\n宗方・オリヴィ組も交えてということなろうが――\n3944 = "雖說正式的紀念照應該等到赤井·二六車組和宗方·奧莉薇車組在場的時候——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふたりも、よかったら入ってくれ！」\n2171 = "「你們兩個也一起來拍吧！」" \n\n# monologue\n# JP: あの日に誘ってもらえた理由が、ようやくわかった。\n3582 = "我終於明白了那天邀請我的緣由。" \n\n# monologue\n# JP: 僕の感じている後悔を、\nみくろに、中村さんに、感じて欲しいとは思わない。\n3368 = "因為不想讓美玖路和中村小姐，再體會我當初的那些追悔莫及。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「せっかくの一号列車走行記念だ！　入って欲しい」\n2095 = "「一號列車發車紀念這難得的機會，就一起來拍吧！」" \n\n# monologue\n# JP: これから僕らは恐らくは、\nたくさんのたくさんの記念写真を残すだろう。\n3240 = "今後我們恐怕還會拍很多很多的紀念照吧。" \n\n# monologue\n# JP: 新・幹線鉄道一号列車を走らせるまで。\n叶うのならば、もっと先まで。が――\n3750 = "直到新·幹線鐵路一號列車發車，若能成真的話，我們自然也不會就此駐足。不過——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「今日このときの記念写真は、\n今日このときにしか撮れんのだから！」\n2149 = "「今天，現在的這張紀念照，可是過了這村就沒這店了哦！」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「みくろ。わたくしと並びましょう」\n2718 = "「美玖路，來站在我身邊吧」" \n\n# 【みくろ】\n# display as 美玖路\n# JP: 「わぁっ！　みくろ、光栄ですおねえさま」\n2291 = "「哇！能站在姐姐大人身邊不勝榮幸」" \n\n# 【凪】\n# display as 凪\n# JP: 「千景ちゃん、ここ入ると良かばい！」\n2215 = "「千景，來站這塊兒吧！」" \n\n# 【中村】\n# display as 中村\n# JP: 「写真は苦手なんですけれど――記念でしたら」\n2506 = "「我不太喜歡拍照——不過紀念照的話還是一起拍吧」" \n\n# monologue\n# JP: みくろが笑顔で入ってくれば、\n戸惑い顔だった中村さんも、ふかみと凪と並んでくれる。\n3796 = "美玖路笑著站了過來，而中村小姐雖然面露一絲難色，但還是站在了深美和凪身旁。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「おまたせしました！」\n2407 = "「大家久等啦！」" \n\n# monologue\n# JP: ポーレットが手早く三脚をたて、カメラをセット。\n3707 = "波萊特俐落地架起三腳架，把相機裝在上面。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「全体、もーちょっと双鉄くんによってください！\nあー、もーちょい。うん！　それ！　オッケーです！」\n2409 = "「大家再向雙鐵君靠緊一點！啊，再靠一點。嗯，好！ＯＫ了！」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「でもでも、これだとポーレットのはいるとこが」\n2263 = "「可是可是，這樣波萊特就沒有地方站啦」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「大丈夫よ、れいな」\n2631 = "「沒問題的，玲奈」" \n\n# monologue\n# JP: セルフタイマーをセットして、\nポーレットがこちらに駆けてくる。\n3859 = "調好了自拍定時，波萊特就朝我們跑了過來。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「きゃぁっ！」\n2269 = "「呀！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なるほどな」\n2225 = "「原來如此」" \n\n# monologue\n# JP: ポーレットがれいなを抱っこし、そのまま収まる。\nみんなが、自然と笑顔になる。\n3708 = "波萊特抱起了玲奈，順勢站在了玲奈剛剛的位置。大家的臉上都洋溢著自然的笑容。" \n\n# monologue\n# JP: ――そうだ。アルバムを作るとしよう。\n右田双鉄。僕が自分自身で作る、初めての写真アルバムを。\n1596 = "——啊，索性做一本相冊吧。這也將是我，右田雙鐵親手製作的第一本相冊。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「４、３、チーィズ！」\n2901 = "「４，３，茄～子！」" \n\n# monologue\n# JP: ――その一枚目を、この写真を。\n1602 = "——而這張照片，就是相冊的主角。" \n\n# monologue\n# JP: いつの日か、僕は、懐かしく振り返るのだ。\n3345 = "只待來日，我滿心懷念地翻閱緬懷之時。" \n