# JP: 『みんなのなかで、だれが好きなの？』\n実に少女らしい問いかけに、けれども僕は本気で困る。
1616 = "『Trong số mọi người, anh thích ai nhất?』\nMột câu hỏi đúng chất thiếu nữ, nhưng lại khiến tôi thực sự bối rối."
# 【双鉄】
# display as 雙鐵
# JP: 「好き――といえば、みんな好きだが」
2345 = "「Thích——thì anh thích tất cả mọi người.」"
# 【路子】
# display as 路子
# JP: 「ちがうよそーちゃん！\nそういうふうな好きじゃなくって」
2106 = "「Không phải thế đâu Sou-chan!\nKhông phải kiểu thích như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。わかっている。\n愛だ恋だの意味での、好きだよな」
2364 = "「Ừ. Anh biết rồi.\nLà thích theo kiểu tình yêu nam nữ chứ gì.」"
# 【路子】
# display as 路子
# JP: 「そーそー」
2443 = "「Đúng đúng.」"
# monologue
# JP: 一人前の顔をして、路子が頷く。\nそうして僕は、理解する。
3888 = "Michiko gật đầu với vẻ mặt như một người lớn.\nVà rồi tôi đã hiểu ra."
# 【双鉄】
# display as 雙鐵
# JP: 「わかっているから、わからんのだよ。\nなにせ僕は、ずっと路子に、幼い恋をしていたからな」
2517 = "「Anh biết, nên anh mới không biết đấy.\nDù sao thì, anh vẫn luôn ôm ấp một mối tình trẻ con với Michiko mà.」"
# 【路子】
# display as 路子
# JP: 「ふえっ！？　みちに？」
2296 = "「Hả!? Với Michi á?」"
# monologue
# JP: 路子が驚き、とても困った声を出す。
3894 = "Michiko kinh ngạc, thốt lên một giọng điệu vô cùng bối rối."
# 【路子】
# display as 路子
