3369 = "Vì con bé đã cứu tôi, nên chừng nào chưa cứu được con bé,\ntôi sẽ mãi mãi chỉ nhìn thấy bản thân mình, chỉ nhìn thấy Michiko."
# 【路子】
# display as 路子
# JP: 「ならいまからは、これからさきは、\nほかのこのこと、好きになれるの？」
2841 = "「Vậy từ giờ trở đi, sau này,\nanh có thể thích người khác được không?」"
