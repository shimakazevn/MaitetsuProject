# display as 日日姬
# JP: 「\\x%l機関助士;#00ffc040;機関助士%l;#;って――\n私、本当にできるんでしょうか」
1468 = "「\\x%l機関助士;#00ffc040;Phụ lái tàu%l;#;―― Liệu em có thực sự làm được không.」"

# 【双鉄】
# display as 雙鐵
# JP: 「できる。簡単ではないが、日々姫ならばできる。\n不安なら、少し、[キャブ,2]運転台へとあがってみるか？」
1879 = "「Được chứ. Không hề đơn giản, nhưng nếu là Hibiki thì chắc chắn làm được. Nếu thấy bất an, em có muốn thử lên \\x%lキャブ;#00ffc040;buồng lái%l;#; một chút không?」"

# 【日々姫】
# display as 日日姬
# JP: 「いいんですか！？　あ――でもっ」
1986 = "「Được sao ạ!? A―― nhưng mà.」"

# monologue
# JP: 浮き立ちかけた踵が床へ戻される。
2759 = "Gót chân vừa định nhón lên lại đặt xuống sàn."

# 【日々姫】
# display as 日日姬
# JP: 「それは、ちゃんと教わるときの楽しみにします。\n今は――今見るべきものを、見つけたいから」
2224 = "「Chuyện đó, em sẽ để dành làm niềm vui khi được dạy bảo đàng hoàng. Bây giờ―― em muốn tìm ra những thứ cần phải nhìn thấy ngay lúc này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな」
# 2311 = "「是啊」" 

# monologue
# JP: なにが一体、僕をこうまで変えたのか。\nなにが一体、\\x%l機関助士;#00ffc040;機関助士%l;#;へと日々姫を志願させたのか。
2698 = "Rốt cuộc điều gì đã khiến tôi thay đổi đến nhường này. Rốt cuộc điều gì đã khiến Hibiki tình nguyện trở thành \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;."

# monologue
# JP: それを理解し、伝えることができたのならば、\n流れを作る、きっかけのひとつになるかもしれん。
2785 = "Nếu có thể thấu hiểu và truyền đạt được điều đó, thì có lẽ nó sẽ trở thành một trong những chất xúc tác tạo nên một làn sóng mới."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫はどうして、\n\\x%l機関助士;#00ffc040;機関助士%l;#;に立候補してくれたんだ？」
2285 = "「Tại sao Hibiki lại ứng cử làm \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; vậy?」"

# 【日々姫】
# display as 日日姬
# JP: 「え！？　そいば――んんっ――それは――\nもちろん、兄さんがすごく困ってみえたから、です」
2013 = "「Hả!? Chuyện đó―― ưm―― chuyện đó là―― Tất nhiên là vì em thấy anh trai đang rất khó khăn rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕のためならありがたい。が――助けるのなら、\n他にもいくらも手段はあったはずだろう？」
2440 = "「Nếu là vì anh thì anh rất biết ơn. Nhưng―― nếu chỉ để giúp đỡ, thì chắc chắn còn rất nhiều cách khác mà đúng không?」"

# 【日々姫】
# display as 日日姬
# JP: 「あ――……うん。\nそう、ですね。言われてみたら」
2025 = "「A――...... vâng.\nAnh nói mới nhớ.」"

# monologue
# JP: 日々姫であれば、仕事を通じての知人も多い。
2946 = "Nếu là Hibiki thì em ấy cũng có rất nhiều người quen biết thông qua công việc."

# monologue
# JP: あるいは直接の紹介だけでなく、\n\\x%l機関助士;#00ffc040;機関助士%l;#;の候補を募るポスターを作ることも出来ただろう。
3035 = "Hoặc không chỉ giới thiệu trực tiếp, em ấy cũng có thể thiết kế poster để tuyển dụng ứng viên cho vị trí \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「他にもいくらも手段があるのに、\nなぜ、自分自身で乗務しようと考えたのだ？」
2293 = "「Rõ ràng là còn rất nhiều cách khác, tại sao em lại nghĩ đến việc tự mình lên tàu làm việc?」"

# 【日々姫】
# display as 日日姬
# JP: 「乗務しようと――」
2264 = "「Định lên tàu làm việc――」"

# monologue
# JP: 言葉を、あるいは気持ちをさぐっているかのように。\n日々姫の唇がモゴモゴ動く。
2944 = "Như đang dò dẫm tìm từ ngữ, hoặc tìm kiếm cảm xúc của chính mình. Đôi môi Hibiki mấp máy."

# 【日々姫】
# display as 日日姬
# JP: 「しようと――じゃなくて、したいって。\nあのとき私、自分で乗りたいって、思いました」
1886 = "「Không phải là định―― mà là muốn. Lúc đó, em đã nghĩ rằng mình tự mình muốn lên tàu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「何故？」
2361 = "「Tại sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにと一緒にいたかったから。\nにぃにと一緒に――きっと、走ってみたかったから」
2104 = "「Vì em muốn ở bên cạnh anh hai. Cùng với anh hai―― chắc chắn, em đã muốn thử cùng anh lăn bánh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2035 = "「啊！」" 

# monologue
# JP: ドクン、と強く。\n痛いくらいに強く心臓が鳴る。
2817 = "Thình thịch, một nhịp đập mạnh mẽ. Trái tim tôi đập mạnh đến nhức nhối."

# monologue
# JP: 僕を見つめる日々姫の瞳が心をどこかざわつかせ――\nけれどもざわめき動く心は、傷口をもまた、開かせるから。
2747 = "Ánh mắt Hibiki nhìn tôi khiến lòng tôi dấy lên một sự xáo động khó tả―― Nhưng trái tim xáo động ấy, cũng lại khiến vết thương lòng hé miệng."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな――僕も、望んでいる」
2303 = "「Vậy sao―― anh cũng, đang mong chờ điều đó.」"

# monologue
# JP: だから、簡単な言葉を選ぶ。
2878 = "Vì thế, tôi chọn những từ ngữ đơn giản."

# monologue
# JP: 混乱している気持ちをそのまま言葉に変えて、\n心の負荷を、軽減していく。
2844 = "Biến những cảm xúc hỗn loạn ấy thành lời nói một cách trực tiếp, để giảm bớt gánh nặng trong lòng."

# 【双鉄】
# display as 雙鐵
# JP: 「終着駅までたどり着きたい。\nそれは僕の――鉄道に関する一番強い望みだ」
2219 = "「Anh muốn đi đến tận ga cuối cùng. Đó là―― mong muốn mãnh liệt nhất của anh về đường sắt.」"

# 【日々姫】
# display as 日日姬
# JP: 「終着駅まで――兄さんの、旅を」
2017 = "「Đến tận ga cuối cùng―― chuyến hành trình của, anh trai.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2321 = "「Ừ.」"

# monologue
# JP: 僕の言葉が、日々姫のイメージを喚起したのか、\nその逆なのかは、わからない。
2856 = "Những lời nói của tôi đã khơi gợi hình ảnh trong tâm trí Hibiki, hay ngược lại, tôi cũng không rõ nữa."

# monologue
# JP: けれども、実感できている。\n日々姫と僕は、同じイメージを抱けていると。
2646 = "Nhưng tôi có thể cảm nhận được điều đó một cách chân thực. Rằng Hibiki và tôi, đang cùng ôm ấp một hình ảnh giống nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「僕が夢見て望むのは、ただ幸せな家族の旅だ。\n家族を包む、安全で、暖かな観光列車だ」
2238 = "「Điều anh mơ ước và khao khát, chỉ là một chuyến du lịch hạnh phúc của gia đình. Một chuyến tàu du lịch an toàn, ấm áp, ôm trọn lấy cả gia đình.」"

# 【日々姫】
# display as 日日姬
# JP: 「お父さんと、お母さんと、こどもたち。\nおじいちゃん、おばあちゃんも、きっと一緒で」
2373 = "「Có bố, có mẹ, và những đứa trẻ. Chắc chắn là có cả ông, cả bà đi cùng nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「その誰もが、一緒に、\nそしてそれぞれに、鉄道の旅を楽しめる」
2345 = "「Tất cả mọi người, cùng nhau, và mỗi người, đều có thể tận hưởng niềm vui của chuyến du lịch bằng đường sắt.」"

# 【日々姫】
# display as 日日姬
# JP: 「……」
# 1493 = "「……」" 

# monologue
# JP: 日々姫の指が静かに伸びる。\n僕の頬の横をすりぬけて、8620の体を撫でる。
2996 = "Ngón tay của Hibiki lặng lẽ vươn ra. Lướt qua má tôi, chạm vào thân tàu 8620."

# 【日々姫】
# display as 日日姬
# JP: 「この子が――8620が引っぱる列車で。\n兄さんと私とハチロクが、動かす列車で」
2441 = "「Trên chuyến tàu do đứa trẻ này―― 8620 kéo. Chuyến tàu do anh trai, em và Hachiroku cùng nhau vận hành.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2072 = "「嗯」" 

# monologue
# JP: 欠けている穴はまだまだ大きい。\nけれどもひとつ、埋めるパーツを見つけた気がする。
3136 = "Lỗ hổng khuyết thiếu vẫn còn rất lớn. Nhưng tôi có cảm giác mình đã tìm thấy một mảnh ghép để lấp đầy nó."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は日々姫に、その列車のデザインを頼みたい」
2226 = "「Anh muốn nhờ Hibiki thiết kế chuyến tàu đó.」"

# 【日々姫】
# display as 日日姬
# JP: 「一人じゃ無理。列車のこと、まだ知らんけん。\nでも――やりたい。みんなに教えてもらいながら」
2191 = "「Một mình em thì không làm được đâu. Em vẫn chưa biết gì về tàu hỏa cả. Nhưng―― em muốn làm. Vừa làm vừa học hỏi từ mọi người.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。どんな列車がいいのか。\nそれをこれから探していこう」
2307 = "「Đúng vậy nhỉ. Một chuyến tàu như thế nào thì mới tốt đây. Từ giờ chúng ta hãy cùng nhau tìm kiếm điều đó nhé.」"

# 【日々姫】
# display as 日日姬
# JP: 「意見、たくさんだといいと思う。御一夜鉄道――\nううん、御一夜の人たちだけじゃなくって」
2419 = "「Em nghĩ càng có nhiều ý kiến càng tốt. Đường sắt Ohitera―― À không, không chỉ những người ở Ohitera đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか！　みかん鉄道の方々――だけでなく、\n八ツ城－御一夜間、沿線の人たちの声も集められれば」
2047 = "「À, đúng rồi! Những người ở Đường sắt Mikan―― không chỉ vậy, nếu chúng ta có thể thu thập được cả tiếng nói của những người dân sống dọc tuyến đường từ Yatsushiro đến Ohitera nữa thì.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 2073 = "「嗯！」" 

# monologue
# JP: 『自分たちで作った列車』
1441 = "『Chuyến tàu do chính tay chúng ta tạo ra』"

# monologue
# JP: その思いをもしも持ってもらえるのならば、\n立ち退きへの抵抗感は、きっと大きく減るだろう。
2786 = "Nếu có thể khiến họ mang trong mình suy nghĩ đó, thì chắc chắn sự phản đối việc giải tỏa đất sẽ giảm đi đáng kể."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――あの地図はどうだろう。\n御一夜市のイラストマップ。あれを、もっと広い範囲で」
2504 = "「Nếu vậy thì―― tấm bản đồ đó thì sao. Bản đồ minh họa thành phố Ohitera ấy. Chúng ta làm nó ở một phạm vi rộng hơn.」"

# 【日々姫】
# display as 日日姬
# JP: 「広い範囲って……御一夜市から八ツ城市までって、\nいくらなんでも広すぎるけど」
2168 = "「Phạm vi rộng hơn là...... từ thành phố Ohitera đến tận thành phố Yatsushiro á, dù nói thế nào thì cũng rộng quá mức rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うむ」
2301 = "「À―― ừm.」"

# monologue
# JP: 観光しようと思う時、\n日ノ本全域の地図を持ち出す者はない。
2748 = "Khi có ý định đi du lịch, chẳng ai lại mang theo bản đồ của toàn bộ khu vực Hinomoto cả."

# monologue
# JP: きちんと対象を絞り込めていない地図など、\n誰の役にもたてないし、誰に見てさえ貰えぬだろう。
2799 = "Một tấm bản đồ không khoanh vùng đối tượng rõ ràng, thì chẳng giúp ích được cho ai, và cũng chẳng ai thèm xem."

# 【双鉄】
# display as 雙鐵
# JP: 「……旧御一夜－八ツ城間・廃線めぐりイラストマップ\n――では、あまりに露骨か」
1525 = "「......Bản đồ minh họa tham quan tuyến đường sắt phế tích cũ Ohitera - Yatsushiro ――Nghe thế này thì có vẻ hơi quá lộ liễu nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「っていうか、その地図もって巡りたいって思う人なら、\n最初から復線ば支持してくれるでしょー」
2327 = "「Đúng hơn là, những người muốn cầm tấm bản đồ đó đi tham quan, thì ngay từ đầu họ đã ủng hộ việc khôi phục tuyến đường rồi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、道理だな。テーマがマニア向けになりすぎ、\nとても一般に手にとってもらえぬものとなってしまうか」
2086 = "「À, có lý thật. Chủ đề này hướng đến những người đam mê đường sắt quá, sẽ trở thành một thứ mà người dân bình thường chẳng buồn cầm lên xem sao.」"

# monologue
# JP: ……どうしたものかと考えるうち、\n日々姫がタブレットを引っ張り出す。
1450 = "......Trong lúc tôi đang suy nghĩ xem nên làm thế nào, Hibiki lấy máy tính bảng ra."

# monologue
# JP: 画面の中に地図を広げて、\n御一夜と八ツ城との間を絞込み――
2761 = "Em ấy mở bản đồ trên màn hình, khoanh vùng khu vực giữa Ohitera và Yatsushiro――"

# 【日々姫】
# display as 日日姬
# JP: 「クマ川！」
2524 = "「Sông Kuma!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうだ！　クマ川だ！！！」
2079 = "「A! Đúng rồi! Sông Kuma!!!」"

# monologue
# JP: 復線について調べたときに、僕も学んだ。
2752 = "Khi tìm hiểu về việc khôi phục tuyến đường, tôi cũng đã học được điều này."

# monologue
# JP: かつての肥颯線、八ツ城－御一夜間は、\nクマ川に沿って走っていたと。
2755 = "Tuyến Hisatsu ngày xưa, đoạn giữa Yatsushiro và Ohitera, chạy dọc theo dòng sông Kuma."

# 【双鉄】
# display as 雙鐵
# JP: 「『クマ川流域イラストマップ』を作ることとしよう。\nふかみにも相談して、実際に発船所にも置いてもらおう」
1950 = "「Chúng ta hãy quyết định làm 『Bản đồ minh họa lưu vực sông Kuma』 nhé. Anh sẽ bàn bạc với Fukami, và nhờ đặt nó ở bến thuyền luôn.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 2073 = "「嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「同じような、川下り業者やラフティング業者や――\nのみならず、クマ川に纏わる業者は、数多くある」
2108 = "「Tương tự như vậy, các doanh nghiệp kinh doanh thuyền xuôi dòng hay chèo thuyền vượt thác―― Không chỉ vậy, còn có rất nhiều doanh nghiệp khác gắn liền với sông Kuma.」"

# 【日々姫】
# display as 日日姬
# JP: 「そういう全部に、もしも協力してもらえたら――\nイラストマップを、置いてもらえたら！」
2124 = "「Nếu tất cả những nơi đó đều đồng ý hợp tác―― Nếu họ đồng ý đặt bản đồ minh họa của chúng ta!」"

# 【双鉄】
# display as 雙鐵
# JP: 「『一緒に一つのことを為す』は、強力な連帯感を生む。\nそれは復線への、足掛かりのひとつになるかもしれん」
1488 = "「『Cùng nhau hoàn thành một việc』 sẽ tạo ra một tinh thần đoàn kết mạnh mẽ. Điều đó có thể trở thành một trong những bước đệm cho việc khôi phục tuyến đường.」"

# 【日々姫】
# display as 日日姬
# JP: 「面白そう！　やってみたい！！　――けど」
2119 = "「Có vẻ thú vị đấy! Em muốn thử làm!! ――Nhưng mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「けど？　なんだ？」
1902 = "「Nhưng mà? Sao thế?」"

# monologue
# JP: 急に、日々姫がしおれてしまう。
2981 = "Đột nhiên, Hibiki ỉu xìu hẳn đi."

# monologue
# JP: スケッチブックを盾にしていた、\nちいさな日々姫が覗いてしまう。
2957 = "Hibiki bé nhỏ núp sau cuốn phác thảo đang lén lút nhìn tôi."

# 【日々姫】
# display as 日日姬
# JP: 「わたし……まだ、\n御一夜市内からしか、仕事うけたことないけん」
2189 = "「Em...... vẫn chưa, nhận được công việc nào từ bên ngoài thành phố Ohitera cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみの紹介は人脈を広げる力になろう。\nそれで足りねば――そうだな、僕でよければ営業しよう」
2358 = "「Sự giới thiệu của Fukami sẽ là sức mạnh để mở rộng mạng lưới quan hệ đấy. Nếu thế vẫn chưa đủ―― thì, để anh đi chào hàng cho, nếu em thấy ổn.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにが、わたしの営業をっ！？」
2515 = "「Anh hai, đi chào hàng cho em á!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。こうみえても、僕は酒問屋見習い」
2061 = "「Ừ. Trông anh thế này thôi chứ anh đang là thực tập sinh của một đại lý phân phối rượu đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「知っとお！　父さんがどーやったって手放したくない、\nそぎゃん評価ばうけてるってことも！」
2240 = "「Em biết chứ! Rằng anh được đánh giá cao đến mức bố dù có làm cách nào cũng không muốn buông tay!」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2035 = "「啊！」" 

# monologue
# JP: それは……まさしく盲点だった。\n二年縛りの理由を深く、僕は考えてもいなかったが――
3127 = "Đó là...... quả thực là một điểm mù. Tôi chưa bao giờ suy nghĩ sâu xa về lý do của bản hợp đồng ràng buộc hai năm đó, nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか……僕を無用と評価しているのであれば、\n工場誘致撤回未達時に、酒店へという約束にはならんか」
2477 = "「Vậy sao...... Nếu ông ấy đánh giá anh là kẻ vô dụng, thì đã chẳng có cái giao kèo bắt anh về làm ở tiệm rượu khi không ngăn chặn được việc mời gọi nhà máy rồi.」"

# monologue
# JP: ……じわりと、嬉しい。
1453 = "......Một niềm vui âm ỉ dâng lên trong lòng."

# monologue
# JP: 僕は縛られているのではなく――\n求めて、もらえていたのかと。
2853 = "Tôi không phải bị trói buộc―― Mà là đang được mong muốn, được cần đến sao."

# 【日々姫】
# display as 日日姬
# JP: 「やけん！　もちろん大歓迎！！　にぃににわたしの\n営業ばしてもらえるなら、もっともおっと頑張れる！」
2260 = "「Vì thế! Tất nhiên là em cực kỳ hoan nghênh!! Nếu được anh hai đi chào hàng giúp, em sẽ càng, càààng cố gắng hơn nữa!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう言ってもらえれば、僕も嬉しい。\n喜んで、営業を引き受けさせてもらおう」
2195 = "「Được em nói vậy, anh cũng rất vui. Anh rất sẵn lòng nhận công việc chào hàng này.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！！」
2082 = "「Vâng!!」"

# monologue
# JP: 日々姫を売り出す。日々姫のセンスを、デザインを。\n――動き出す以上、他と絡めねばもったいない。
2882 = "Quảng bá Hibiki. Gu thẩm mỹ của Hibiki, những thiết kế của Hibiki. ――Một khi đã bắt tay vào làm, nếu không liên kết với những thứ khác thì thật lãng phí."

# monologue
# JP: 鉄道方面、公共方面。今後僕らがレールを伸ばす、\nそうしたところと、仕事で繋がれるようにしたい。
3133 = "Lĩnh vực đường sắt, lĩnh vực công cộng. Những nơi mà sau này chúng ta sẽ mở rộng tuyến đường, anh muốn kết nối với họ thông qua công việc."

# 【双鉄】
# display as 雙鐵
# JP: 「まずは、イラストマップの前段階を踏むべきだろうな。\nいきなり有償、仕事の話は門前払いされるだけだ」
2402 = "「Trước tiên, chúng ta nên thực hiện một bước đệm trước bản đồ minh họa nhỉ. Đột nhiên nhảy vào nói chuyện công việc có thù lao thì chỉ tổ bị đuổi khéo thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「あー、うん」
2028 = "「A, vâng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、無償の何かで日々姫の実力を示したい。\n鉄道、公共、クマ川流域に訴えかけるような何かで」
2252 = "「Vì vậy, anh muốn thể hiện thực lực của Hibiki bằng một thứ gì đó miễn phí. Một thứ gì đó có sức hút với lĩnh vực đường sắt, công cộng và lưu vực sông Kuma.」"

# 【日々姫】
# display as 日日姬
# JP: 「それなら新聞！　新聞がいいと思う。フリーペーパー。\n紙ででも、ネットででも、無料で配布するの」
2494 = "「Nếu vậy thì là báo! Em nghĩ làm báo là hợp lý nhất. Một tờ báo miễn phí. Dù là báo giấy hay báo mạng, chúng ta sẽ phát miễn phí.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
2312 = "「A!」"

# 【日々姫】
# display as 日日姬
# JP: 「学園新聞、私も手伝っとったことあるけん――\n新聞なら、自信ばあるし、やれると思う」
2337 = "「Báo của học viện, em cũng từng tham gia giúp đỡ rồi―― Nếu là làm báo, em có tự tin, em nghĩ mình làm được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはいいな。日々姫の絵をふんだんに使って。\nレイアウトやロゴでも、日々姫のセンスを表す紙面で」
2496 = "「Ý kiến hay đấy. Sử dụng thật nhiều tranh vẽ của Hibiki. Một trang báo thể hiện gu thẩm mỹ của Hibiki qua cả bố cục và logo.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにの写真とか――ハチロクとかれいなちゃんの\nコラムもあると、絶対にうけると思う」
2132 = "「Những bức ảnh của anh hai nữa―― nếu có thêm chuyên mục của Hachiroku hay bé Reina, em cá là chắc chắn sẽ được đón nhận nồng nhiệt luôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕らのか？」
2201 = "「Của bọn anh sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！　ポーレットさんだとマニアぽくなりそうだけど、\nにぃにの視点は――さっきにぃにが言ってた通り」
2077 = "「Vâng! Nếu là chị Paulette thì có vẻ sẽ mang hơi hướm của người đam mê đường sắt, nhưng góc nhìn của anh hai thì―― đúng như anh hai vừa nói lúc nãy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2023 = "「啊——」" 

# monologue
# JP: 鉄道に興味がなかった――むしろ憎んでいた僕だからこそ、\n同じような人たちに、魅力を伝えられるかもしれんのか。
3100 = "Chính vì là một kẻ không có hứng thú với đường sắt―― thậm chí từng căm ghét nó, nên biết đâu anh lại có thể truyền tải được sức hấp dẫn của nó đến những người giống mình chăng."

# 【双鉄】
# display as 雙鐵
# JP: 「であらば、なにより8620のことを紹介しよう。\n僕らがひきつけられた魅力を、そのまま伝える」
2268 = "「Nếu vậy, trước hết chúng ta hãy giới thiệu về 8620. Truyền tải nguyên vẹn sức hấp dẫn đã thu hút chúng ta.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！　とってもいいと思う」
2081 = "「Vâng! Em nghĩ ý tưởng đó rất tuyệt vời.」"

# 【双鉄】
# display as 雙鐵
# JP: 「8620は、僕に新しい世界を見せてくれた。\n日々姫に僕は、それを知り、きっと描いてもらいたい」
2535 = "「8620 đã cho anh thấy một thế giới mới. Anh muốn Hibiki hiểu được điều đó, và chắc chắn sẽ nhờ em vẽ lại nó.」"

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 2073 = "「嗯！」" 

# monologue
# JP: ああ、“向き合う”とはこういうことか。\n日々姫の瞳が何を見るのか、それを考えるということか。
2743 = "A, \"đối diện\" chính là như thế này sao. Là suy nghĩ xem đôi mắt của Hibiki đang nhìn thấy điều gì."

# monologue
# JP: ――思いがそのまま、\n一つの言葉に固まっていく。
1431 = "――Những suy nghĩ cứ thế\nđọng lại thành một câu nói."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。ペンと紙を借りられるか？」
2290 = "「Hibiki. Cho anh mượn bút và giấy được không?」"

# 【日々姫】
# display as 日日姬
# JP: 「もちろん！」
2382 = "「Tất nhiên rồi ạ!」"

# monologue
# JP: 日々姫が開く。
2986 = "Hibiki mở ra."

# monologue
# JP: 僕らの全てのきっかけとなったスケッチブックの、\nまだなにひとつ描かれていない――白いページを。
2861 = "Cuốn phác thảo đã trở thành khởi nguồn cho mọi chuyện của chúng tôi, trang giấy trắng tinh―― vẫn chưa được vẽ lên bất cứ thứ gì."

# 【双鉄】
# display as 雙鐵
# JP: 「名を、思いついたのだ」
2223 = "「Anh đã nghĩ ra một cái tên.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 2023 = "「啊——」" 

# monologue
# JP: だから、描く。\n僕らの歴史を、ここから更に重ねるために。
2874 = "Vì thế, tôi viết. Để tiếp tục dệt nên lịch sử của chúng tôi từ nơi đây."

# 【日々姫】
# display as 日日姬
# JP: 「――『[ハチロクニイマル,3]8620運転台通信』」
1470 = "「――『Bản tin Buồng lái [ハチロクニイマル,3]8620』」"

# monologue
# JP: つぶやいて。\nそして大きく、日々姫が頷く。
2989 = "Tôi lẩm bẩm.\nVà Hibiki gật đầu thật mạnh."

# 【日々姫】
# display as 日日姬
# JP: 「『[ハチロク,3]8620運転台通信！』\nよかね！　よか！　まっこと良かとよ！！」
1491 = "「『Bản tin Buồng lái [ハチロク,3]8620!』 Tuyệt quá! Tuyệt lắm! Thật sự rất tuyệt luôn đó!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、作ろう」
2498 = "「Vậy thì, cùng làm thôi.」"

# monologue
# JP: 8620運転台通信を。\nまったく新しい観光列車を。
2883 = "Bản tin Buồng lái 8620. Một chuyến tàu du lịch hoàn toàn mới."

# monologue
# JP: 僕と、日々姫と、僕らみんなと。\n僕らが未だ出会っていない――未来で繋がる人たちで。
3025 = "Anh, Hibiki, và tất cả chúng ta. Cùng với những người mà chúng ta chưa từng gặp gỡ―― những người sẽ kết nối với chúng ta trong tương lai."
