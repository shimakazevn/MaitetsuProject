[script]
# lines: 493 
# 【双鉄】
# display as 雙鐵
# JP: 「ただいま。\n――っと？　日々姫はまだ学園か」
2209 = "「我回來了。嗯？日日姬還在學校嗎」" 

# monologue
# JP: 帰宅を急ぎすぎたかと、恥ずかしいような気もするし、\n日々姫がいなくて、ホっとしたような気分にもなる。
2820 = "急於回家的心情讓我自己都有些害臊，日日姬不在也讓我鬆了口氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……しかし、日々姫も忙しい」
1504 = "「……不過日日姬還真忙啊」" 

# monologue
# JP: 学園生で、デザイナー。\nその上に、\x%l機関助士;#00ffc040;機関助士%l;#;になることを志願までしてくれた。
2767 = "她既是學生又是設計師。而且她還提交了成為\\x%l機関助士;#00ffc040;司爐%l;#;的申請。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――僕の方でも、少しでも日々姫を手伝わねばな。\nそうすることも、より深く“向き合う”ことと繋がろう」
1477 = "「——我也必須儘量幫助日日姬才行。這樣做也能讓我們更深入地“進行交流”」" 

# monologue
# JP: 誰かと向き合う。相手をあるいは、自分自身を知るために。\nナビの勧めだ。無論、精一杯に行うけれど――
3068 = "與他人交流，這樣做能夠了解對方，也能夠進一步了解自己。這是Ｎａｖｉ給我的建議。我當然會盡力去做——" 

# monologue
# JP: なにをどうすればよいのかが、僕にはまるでわからない。\nが、日々姫とならば手探りでも、多くを学べそうにも思う。
2714 = "可是具體該怎麼去做，我完全是一頭霧水，但是和日日姬在一起，哪怕是暗中摸索，應該也能學到很多東西。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……しかし、遅いな。日々姫の仕事先との約束もある。\nまさか遅刻はするまいが」
1506 = "「……可是日日姬還真慢啊。她跟客戶還有約。不會遲到吧」" 

# monologue
# JP: 今日は特別な約束など無い登園日だと聞いている。\nゆえ、アクシデントが起きたのではないかと、心配になる。
3062 = "聽說今天是沒什麼特別安排的正常上學日，所以我開始擔心是不是出了什麼意外。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、日々姫のことだ。学園でも何か頼まれたか――\nあるいは単に、稀咲と話でもしているだけかもしれん」
1904 = "「不，以日日姬的性格，一定是學校那邊有什麼事要她做——或者只是在跟稀咲聊天」" 

# monologue
# JP: ……答えの出ぬことを考えて、気を揉んでいても仕方ない。\nちょうど、持ち帰った資料もある。
1452 = "……在這替她著急也無濟於事。正好我帶了些資料回來。" 

# monologue
# JP: 復線買収に関して、僕が実務面で動くことも無かろうが、\n意見を出すにも、最低限の知識は当然、必要になる。
3137 = "雖然我應該不會實際參與廢線收購的事宜，不過為了出謀劃策，我還是必須掌握最低限度的知識。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――宅地買収の実例、ノウハウ集か」
1475 = "「——土地收購的實際案例技術手冊啊」" 

# monologue
# JP: ページをめくればすぐさまに、大いに興味を抱かされる。\n――“実例”という二文字の強さを思い知る。
2700 = "剛翻了幾頁就引起了我的濃厚興趣。——這就是“實際案例”的魅力所在。" 

# monologue
# JP: （ふむ……やはり宅地買収となると困難が多いのだな。\nと、いうか……重いな。罪悪感さえ覚えてしまいかねん）
3163 = "（嗯……土地收購上果然會碰到很多難題啊。更準確地說……是沉重的感覺。甚至有種罪惡感）" 

# monologue
# JP: 公共と、個と、その両立がならぬとき、\n果たしていかに振る舞うべきか……正解の無い問いだろう。
2687 = "公共與個人無法兩全之時，到底該如何處置……這個問題其實並不存在正確答案。" 

# monologue
# JP: より大きな、大勢の幸福追求のためであるのなら、\n今そこにある幸せを、果たして潰してよいものか――
3018 = "為了追求更大的、多數人的幸福，到底該不該犧牲掉少數人現有的幸福——" 

# 【双鉄】
# display as 雙鐵
# JP: 「補償は無論、適切に行われることが最低限であろうが、\nであったとしても……」
2431 = "「補償到位當然是最低條件，可即便如此……」" 

# monologue
# JP: 補償は止血にすぎないと、経験が僕に教えてくれた。
3076 = "補償僅僅是止血，我已經從經驗中學到了這一點。" 

# monologue
# JP: 止血の後に快復し、幸せを再びつかめるか――\n補償は決して、未来まで保証してくれはしないと。
3135 = "關鍵是止血後能不能痊癒並重獲幸福——補償絕對無法為未來做出保證。" 

# monologue
# JP: （……しかし――ううむ。\n内容のせいか、あるいはいささか集中しすぎか――）
3149 = "（……不過——唔。可能是內容太耗神，或者是我太全神貫注了——）" 

# monologue
# JP: 目が重い。\nまばたきを何度か繰り返しても、殆ど改善してくれない。
3045 = "眼皮好重。我眨了好幾次眼，可情況基本沒有改善。" 

# monologue
# JP: やむなく、まぶたを閉じてみる。ただそれだけで心地よい。\nああ、ならば僕は……自覚以上に、疲れているのか………
2833 = "我只好閉上眼睛。結果一閉上眼就舒服了。原來如此，看來……我比自己想像得還要疲憊啊……" 

# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
3160 = "（哐當、哐當、哐當、哐當——）" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ん……む」
1507 = "「……嗯……呃」" 

# 【路子】
# display as 路子
# JP: 「そーちゃん？」
2148 = "「小雙？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2034 = "「啊啊——」" 

# monologue
# JP: ……うたた寝をしてしまったらしい。\nあきれたように、少し笑って路子が見ている。
1456 = "……我好像打了一會瞌睡。露出些許無奈笑容的路子正看著我。" 

# 【路子】
# display as 路子
# JP: 「そーちゃん、なにかいいことあったの？\nホっとしたみたいな顔してる」
2147 = "「小雙，你是不是遇到了什麼好事？表情看起來這麼輕鬆自在」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいこと……か、どうかはわからないけれど」
2404 = "「算得上好事嗎……我還不太明白」" 

# monologue
# JP: 伝えるべきか、一瞬悩み、\n悩んでも仕方ないことなのだと、すぐ理解する。
2822 = "我一下子有些猶豫該不該告訴她。不過我很快就意識到，再怎麼煩惱也沒有用。" 

# monologue
# JP: 路子が仮に、僕の深層心理の表出でしかないのだとしても、\nあるいは本当に、亡霊・幽霊であるのだとしても――
2704 = "即便路子是我深層心理的表露，或者就算她真的是亡靈、幽靈——" 

# 【双鉄】
# display as 雙鐵
# JP: 「お墓参りにいってきたんだ。\nお父さんと、お母さんの」
2205 = "「我去掃墓了。爸爸媽媽的墓」" 

# 【路子】
# display as 路子
# JP: 「そーなんだ」
2479 = "「這樣啊」" 

# monologue
# JP: ――路子と僕は、つながっている。\nこれほど離れてしまっていても、それでも、確かに。
1433 = "——路子和我是心靈相通的。即便彼此天人永隔，這一點也毋庸置疑。" 

# monologue
# JP: だから、隠し事などできようもない。\nそうと思えば、素直な言葉だけが出ていく。
2876 = "所以隱瞞根本沒用。這麼一想，我自然便如實相告。" 

# 【双鉄】
# display as 雙鐵
# JP: 「父さんと母さんと、話ができたかわからない。\nでも――　一方的にでも、いろいろ伝えてはこれたと思う」
2193 = "「我不知道爸爸媽媽他們能不能聽見。不過——我還是跟他們講了很多事」" 

# 【路子】
# display as 路子
# JP: 「なにを、そーちゃんは伝えたの？」
2506 = "「都講了些什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まずまっさきに路子のことだ。\n路子が、この列車で父さんと母さんを待ってると」
2400 = "「第一件就是關於你的事。我告訴爸媽，說你在這輛列車上等他們」" 

# 【路子】
# display as 路子
# JP: 「あー」
2023 = "「啊——」" 

# monologue
# JP: なんとも、複雑な声に聞こえる。
2775 = "她的聲音聽起來沉澱著複雜的情感。" 

# monologue
# JP: 嬉しさと、寂しさとが、\nぐちゃぐちゃに入り混じっているような。
3005 = "欣喜和寂寞之情好像全都夾雜在其中。" 

# 【路子】
# display as 路子
# JP: 「だけどね？　そーちゃん。\nママもパパも、みちをむかえに来てくれないよ？」
1899 = "「不過啊，小雙。爸爸媽媽是不會來接小路的哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\n――まだか」
2313 = "「是嗎——還是不行嗎」" 

# 【路子】
# display as 路子
# JP: 「うん、まだ。来てくれるのは、そーちゃんだけ。\nそのそーちゃんも、今日は、すぐにかえっちゃうし」
2092 = "「嗯，還是不行。能來看我的只有小雙。而你呢，今天也很快就會回去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……」
1493 = "「……」" 

# monologue
# JP: 否定、できない。\nこれはひとときのうたたねと、僕にも理解できているから。
2854 = "我無法否認。因為我也明白，我很快就會醒過來。" 

# 【路子】
# display as 路子
# JP: 「ママとパパ。みちのこと――」
2372 = "「爸爸媽媽對小路——」" 

# monologue
# JP: 言ってすぐ、まるで大人がそうするように、\nちいさな路子は言葉を呑み込む。
3099 = "話才講到一半，幼小的路子就像大人一樣，把剩下的話堵了回去。" 

# 【路子】
# display as 路子
# JP: 「――みちのこと、みつけられないのかなぁ」
1473 = "「——不知道他們能不能找到小路呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……大丈夫だ。探し続けてくれているから。\nただ、僕が――上手に伝えられてないだけで」
1519 = "「……沒問題的。因為他們一直都在找你。只怪我——沒有跟他們講清楚」" 

# 【路子】
# display as 路子
# JP: 「みちのいばしょを？」
2348 = "「沒有告訴他們小路在哪嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。というか――」
2304 = "「是啊。另外——」" 

# monologue
# JP: 問いかけられて初めて気付く。\n僕とて、把握していないではないか。
3073 = "被問到之後我才猛然發覺。其實我自己也不清楚吧。" 

# monologue
# JP: 路子を乗せて――閉じ込めているこの列車は、\n果たして、『どこ』を走っているのか。
3114 = "路子乘坐的——把路子困在其中的這輛列車到底在“哪裡”行駛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ路子、\nこの列車は、窓を開けることは」
2243 = "「我說路子，這輛列車的窗可不可以打開」" 

# 【路子】
# display as 路子
# JP: 「だめだよ！　そーちゃん！　おっこちちゃうよ！！」
1890 = "「不行！小雙！會掉下去的！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさか。それほどの間抜けではない」
2176 = "「怎麼可能。我才沒有那麼笨手笨腳」" 

# 【路子】
# display as 路子
# JP: 「ちがうの！　ダメなの！　ひっぱられちゃう」
1884 = "「不是啦！不可以！會被拉下去的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「引っ張られる？　――っ！？」
2428 = "「被拉下去？——啊！？」" 

# monologue
# JP: （ゆさっ！）
3167 = "（晃動！）" 

# monologue
# JP: 背筋が凍る。\nいきなり体を揺すられて。
2864 = "我背後一涼。身體突然被人搖了一通。" 

# monologue
# JP: この手は、路子の小さな手じゃない。\nもっと大きく、あたたかく――
3128 = "那雙手不是路子的小手。而是更大，更溫暖的——" 

# 【日々姫】
# display as ？？？
# JP: 「にぃに！　にぃにぃっ！」
2520 = "「阿哥！阿哥！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ――あ――」
2054 = "「嗯——啊——」" 

# monologue
# JP: 目を開き、\n夢を見ていたと理解する。
2859 = "我睜開眼睛，明白自己是做了夢。" 

# monologue
# JP: 僕の眼前、日々姫の顔が広がって――\nその鮮やかさに、夢の残滓が急速に散り、消えていく。
2977 = "日日姬的臉龐出現在我眼前——這副鮮明的景象讓夢的餘韻迅速飄散，消失不見。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ただいま！　おかえりなさい」
2521 = "「阿哥，我回來了！你也到家了啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、おかえり。そして、ただいま」
2289 = "「日日姬，歡迎回家。嗯，我也到了」" 

# monologue
# JP: 言葉をかわせば、ホッとする。\n日々姫は実に、いつもどおりだ。
3049 = "短短幾句對話讓我鬆了一口氣。日日姬還是老樣子。" 

# 【日々姫】
# display as 日日姬
# JP: 「珍しかと！\nにぃにがうたたねしとるなんて」
2386 = "「真少見啊！阿哥居然會打瞌睡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。まぁな」
2067 = "「嗯。是啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんとわたし、待たせちゃったと？\n大急ぎで帰ってきたんだけど――」
1944 = "「你等我等了這麼久嗎？我可是用最快速度趕回來的——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1882 = "「不——」" 

# monologue
# JP: “大した時間を待たされてない”\nそういいかけたところで気付く。
2831 = "我剛想說“我沒等多久”，可我忽然想到。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、そのまま僕が駅で待っていれば、\nより多くの時間を、向き合えたのだな」
2126 = "「如果我剛才直接在車站等你的話，我們能在一起的時間會更多啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
2035 = "「啊！」" 

# monologue
# JP: 言った瞬間、日々姫が頭を抱えてしまう。
2823 = "我一說，日日姬就抱著腦袋懊惱起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「よね！　駅から帰ってくる間だって、\nふたりでお話できたのに～」
2151 = "「就是說啊！從車站一起回家的過程中還能聊天～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、その分もここから先に話せばいい。\n今日はまるまる一日、僕は日々姫と向き合うのだからな」
2121 = "「好啦，接下來再補回來就行了。畢竟我會拿今天一整天的時間，與你好好交流」" 

# 【日々姫】
# display as 日日姬
# JP: 「はうっ！」
2004 = "「哈唔！」" 

# monologue
# JP: 今度は一転、真っ赤になる。\nああ、本当にいつもどおりだ。
3123 = "這會兒她忽然又變得滿臉通紅。啊，真的跟平時完全沒有兩樣。" 

# monologue
# JP: 日々姫はいつでもさまざまな顔を、\n僕には隠さず見せてくれる。
2984 = "日日姬總會大大方方地在我面前展露出各種不同的表情。" 

# 【日々姫】
# display as 日日姬
# JP: 「私のお仕事、にぃにに見てもらえるだなんて――\nちょびっとだけ照れくさいけど、その何倍も嬉しかと！」
2421 = "「能讓阿哥看看我的工作——雖然有些難為情，不過跟心裡的高興勁比起來根本不算什麼！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\nそう思ってもらえるのなら、光栄だ」
2314 = "「是嗎。能讓你這麼想是我的榮幸」" 

# monologue
# JP: こころの底からこぼれた言葉は、\n日々姫の百面相を、ごく穏やかな笑顔に固める。
2855 = "我發自內心的話語，讓日日姬百變的表情固定在溫和的笑容上。" 

# 【日々姫】
# display as 日日姬
# JP: 「“向き合う”っていうなら、学園での私のことだって、\nにぃにぃに見てもらいたいくらいだし」
2270 = "「既然要“好好交流”，我還想讓阿哥看看在學校裡的我呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうできれば理想なのだろうがな。\nさすがに、そればかりは難しかろう」
2236 = "「我當然希望去看看啊。不過這個目標還是比較難實現的吧」" 

# 【日々姫】
# display as 日日姬
