2752 = "在調查恢復廢線的事情時，我也注意到了。" 

# monologue
# JP: かつての肥颯線、八ツ城－御一夜間は、\nクマ川に沿って走っていたと。
2755 = "在過去的肥薩線，八代到御一夜段是沿著隈河走的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『クマ川流域イラストマップ』を作ることとしよう。\nふかみにも相談して、実際に発船所にも置いてもらおう」
1950 = "「做一張“隈河流域彩繪地圖”吧。聯繫一下深美，在發船點也放些地圖做宣傳吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 2073 = "「嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「同じような、川下り業者やラフティング業者や――\nのみならず、クマ川に纏わる業者は、数多くある」
2108 = "「在這件事上也一樣，跟隈河有關的商家很多，不僅限於漂流和皮划艇的商家」" 

# 【日々姫】
# display as 日日姬
# JP: 「そういう全部に、もしも協力してもらえたら――\nイラストマップを、置いてもらえたら！」
2124 = "「如果他們全都肯幫忙的話——如果所有商家都擺放上彩繪地圖的話！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『一緒に一つのことを為す』は、強力な連帯感を生む。\nそれは復線への、足掛かりのひとつになるかもしれん」
1488 = "「“一起做同一件事”會產生強烈的連帶感。那說不定能夠成為通往恢復廢線之路的一個立足點」" 

# 【日々姫】
# display as 日日姬
# JP: 「面白そう！　やってみたい！！　――けど」
2119 = "「好像很有意思！我想試試看！！不過——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「けど？　なんだ？」
1902 = "「不過？怎麼了？」" 

# monologue
# JP: 急に、日々姫がしおれてしまう。
2981 = "日日姬突然整個人都蔫了。" 

# monologue
# JP: スケッチブックを盾にしていた、\nちいさな日々姫が覗いてしまう。
2957 = "日日姬把素描簿擋在前面，身子縮了起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「わたし……まだ、\n御一夜市内からしか、仕事うけたことないけん」
2189 = "「我……還只接到過御一夜市內的工作」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみの紹介は人脈を広げる力になろう。\nそれで足りねば――そうだな、僕でよければ営業しよう」
2358 = "「深美的介紹能夠幫你拓展人脈。如果那還不夠的話——對了，不嫌棄的話就由我來做推廣吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにが、わたしの営業をっ！？」
2515 = "「阿哥幫我做推廣！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。こうみえても、僕は酒問屋見習い」
2061 = "「嗯。別看我這樣，我可是酒行的實習生」" 

# 【日々姫】
# display as 日日姬
# JP: 「知っとお！　父さんがどーやったって手放したくない、\nそぎゃん評価ばうけてるってことも！」
2240 = "「我知道！我還知道爸爸對你評價極高，無論如何都不想放你走呢！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2035 = "「啊！」" 

# monologue
# JP: それは……まさしく盲点だった。\n二年縛りの理由を深く、僕は考えてもいなかったが――
3127 = "那還真是……一大盲點啊。被他拴了整整兩年的理由，我之前也沒多想——" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか……僕を無用と評価しているのであれば、\n工場誘致撤回未達時に、酒店へという約束にはならんか」
2477 = "「這樣啊……如果對我評價很差的話，就不會讓我在抵制工廠落戶失敗後回酒行了吧」" 

# monologue
# JP: ……じわりと、嬉しい。
1453 = "……心裡還是有些暗暗自喜。" 

# monologue
# JP: 僕は縛られているのではなく――\n求めて、もらえていたのかと。
2853 = "我是被人需要才會留在那裡——而不僅僅只是被拴在那裡的。" 

# 【日々姫】
# display as 日日姬
# JP: 「やけん！　もちろん大歓迎！！　にぃににわたしの\n営業ばしてもらえるなら、もっともおっと頑張れる！」
2260 = "「所以！我當然特別歡迎！！如果阿哥能幫我做推廣的話，我就能夠更加更加努力的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう言ってもらえれば、僕も嬉しい。\n喜んで、営業を引き受けさせてもらおう」
2195 = "「我也很高興聽到你這麼說。那推廣的工作我就欣然接受了」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！！」
2082 = "「嗯！！」" 

# monologue
# JP: 日々姫を売り出す。日々姫のセンスを、デザインを。\n――動き出す以上、他と絡めねばもったいない。
2882 = "打響日日姬的招牌。讓世人見識到她的靈感和設計。——既然要做的話，不在強項上做文章就太浪費了。" 

# monologue
# JP: 鉄道方面、公共方面。今後僕らがレールを伸ばす、\nそうしたところと、仕事で繋がれるようにしたい。
3133 = "鐵路方面，公共方面。我想拓展我們的涉獵面，爭取今後在工作上跟這兩個方面接軌。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まずは、イラストマップの前段階を踏むべきだろうな。\nいきなり有償、仕事の話は門前払いされるだけだ」
2402 = "「第一步應該為彩繪地圖做個投石問路。一上來就提有償委託的話，只會被人家掃地出門」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー、うん」
2028 = "「啊——嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、無償の何かで日々姫の実力を示したい。\n鉄道、公共、クマ川流域に訴えかけるような何かで」
2252 = "「所以我想找些無償的項目來顯示一下你的實力。能夠在鐵路、公共、隈河流域產生影響力的項目」" 

# 【日々姫】
# display as 日日姬
# JP: 「それなら新聞！　新聞がいいと思う。フリーペーパー。\n紙ででも、ネットででも、無料で配布するの」
2494 = "「那就做報紙！我覺得報紙不錯。免費報紙。透過紙媒或者網路免費發布的那種」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
2312 = "「是啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「学園新聞、私も手伝っとったことあるけん――\n新聞なら、自信ばあるし、やれると思う」
2337 = "「校報的事情我也幫過忙——做報紙的話，我有信心能夠做好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはいいな。日々姫の絵をふんだんに使って。\nレイアウトやロゴでも、日々姫のセンスを表す紙面で」
2496 = "「那就好。報紙要充分利用日日姬的畫。版面和標誌的設計都要突出你的設計感」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにの写真とか――ハチロクとかれいなちゃんの\nコラムもあると、絶対にうけると思う」
2132 = "「如果能加上哥哥拍的照片——或者八六和玲奈的欄目的話，絕對會受歡迎的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らのか？」
2201 = "「我們的嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　ポーレットさんだとマニアぽくなりそうだけど、\nにぃにの視点は――さっきにぃにが言ってた通り」
2077 = "「嗯！如果由波萊特小姐來拍的話可能就太小眾化了，不過以阿哥的視角——就如你剛才所說」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2023 = "「啊——」" 

# monologue
# JP: 鉄道に興味がなかった――むしろ憎んでいた僕だからこそ、\n同じような人たちに、魅力を伝えられるかもしれんのか。
3100 = "說不定只有過去對鐵路沒有興趣——甚至曾經憎恨鐵路的我，才能向跟我們一樣的人傳達鐵路的魅力吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「であらば、なにより8620のことを紹介しよう。\n僕らがひきつけられた魅力を、そのまま伝える」
2268 = "「既然如此，那對８６２０的介紹就是重中之重了。就把它那深深吸引了我們的魅力直接傳達給大家吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　とってもいいと思う」
2081 = "「嗯！這主意很棒」" 

# 【双鉄】
# display as 雙鐵
# JP: 「8620は、僕に新しい世界を見せてくれた。\n日々姫に僕は、それを知り、きっと描いてもらいたい」
2535 = "「８６２０向我展現了全新的世界。如今我想向你展現這個世界，更想由你來執筆」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 2073 = "「嗯！」" 

# monologue
# JP: ああ、“向き合う”とはこういうことか。\n日々姫の瞳が何を見るのか、それを考えるということか。
2743 = "啊，溝通就是這個意思嗎。就是思考日日姬的眼中看到的是什麼嗎。" 

# monologue
# JP: ――思いがそのまま、\n一つの言葉に固まっていく。
1431 = "——我的想法直接化為了一句話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。ペンと紙を借りられるか？」
2290 = "「日日姬，能借用一下紙筆嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「もちろん！」
2382 = "「當然可以！」" 

# monologue
# JP: 日々姫が開く。
2986 = "日日姬翻開了素描本。" 

# monologue
# JP: 僕らの全てのきっかけとなったスケッチブックの、\nまだなにひとつ描かれていない――白いページを。
2861 = "我翻開那本成就了我們的一切的素描本，翻到還沒寫上任何內容的空白頁。" 

# 【双鉄】
# display as 雙鐵
# JP: 「名を、思いついたのだ」
2223 = "「我想到了一個名字」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 2023 = "「啊——」" 

# monologue
# JP: だから、描く。\n僕らの歴史を、ここから更に重ねるために。
2874 = "所以我要在這裡下筆。為了讓我們的歷史繼續並行下去。" 

# 【日々姫】
# display as 日日姬
# JP: 「――『[ハチロクニイマル,3]8620運転台通信』」
1470 = "「——“８６２０駕駛台通信”」" 

# monologue
# JP: つぶやいて。\nそして大きく、日々姫が頷く。
2989 = "日日姬輕輕念了一遍。然後用力點了點頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「『[ハチロク,3]8620運転台通信！』\nよかね！　よか！　まっこと良かとよ！！」
1491 = "「“８６２０駕駛台通信！”好啊！好極了！真的太好了！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、作ろう」
2498 = "「那就放手去做吧」" 

# monologue
# JP: 8620運転台通信を。\nまったく新しい観光列車を。
2883 = "把８６２０駕駛台通信辦起來，把全新的觀光列車創造出來。" 

# monologue
# JP: 僕と、日々姫と、僕らみんなと。\n僕らが未だ出会っていない――未来で繋がる人たちで。
3025 = "由我和日日姬一起，由大家一起。跟那些我們還未遇見的——將在未來邂逅的人們一起幹出一番天地。" 
