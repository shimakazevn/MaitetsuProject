# lines: 493 
# 【双鉄】
# display as 雙鐵
# JP: 「ただいま。\n――っと？　日々姫はまだ学園か」
2209 = "「Anh về rồi đây. ――Hửm? Hibiki vẫn còn ở học viện sao.」"

# monologue
# JP: 帰宅を急ぎすぎたかと、恥ずかしいような気もするし、\n日々姫がいなくて、ホっとしたような気分にもなる。
2820 = "Tôi cảm thấy hơi xấu hổ vì có lẽ mình đã vội vàng về nhà quá, nhưng đồng thời cũng cảm thấy nhẹ nhõm vì không có Hibiki ở nhà."

# 【双鉄】
# display as 雙鐵
# JP: 「……しかし、日々姫も忙しい」
1504 = "「......Nhưng mà, Hibiki cũng bận rộn thật.」"

# monologue
# JP: 学園生で、デザイナー。\nその上に、\\x%l機関助士;#00ffc040;機関助士%l;#;になることを志願までしてくれた。
2767 = "Vừa là học sinh, vừa là nhà thiết kế. Hơn thế nữa, em ấy còn tình nguyện trở thành \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「――僕の方でも、少しでも日々姫を手伝わねばな。\nそうすることも、より深く“向き合う”ことと繋がろう」
1477 = "「――Anh cũng phải giúp đỡ Hibiki một chút mới được. Làm như vậy cũng sẽ giúp chúng ta \"đối diện\" với nhau sâu sắc hơn.」"

# monologue
# JP: 誰かと向き合う。相手をあるいは、自分自身を知るために。\nナビの勧めだ。無論、精一杯に行うけれど――
3068 = "Đối diện với ai đó. Để thấu hiểu đối phương, hoặc hiểu rõ chính mình. Đó là lời khuyên của Navi. Đương nhiên, tôi sẽ cố gắng hết sức, nhưng――"

# monologue
# JP: なにをどうすればよいのかが、僕にはまるでわからない。\nが、日々姫とならば手探りでも、多くを学べそうにも思う。
2714 = "Tôi hoàn toàn không biết mình phải làm gì và làm như thế nào. Nhưng nếu là với Hibiki, dù có phải dò dẫm, tôi nghĩ mình vẫn có thể học được nhiều điều."

# 【双鉄】
# display as 雙鐵
# JP: 「……しかし、遅いな。日々姫の仕事先との約束もある。\nまさか遅刻はするまいが」
1506 = "「......Nhưng mà, trễ quá rồi. Hibiki còn có hẹn với đối tác nữa. Không lẽ em ấy định đi trễ sao.」"

# monologue
# JP: 今日は特別な約束など無い登園日だと聞いている。\nゆえ、アクシデントが起きたのではないかと、心配になる。
3062 = "Tôi nghe nói hôm nay chỉ là một ngày đến trường bình thường không có lịch trình gì đặc biệt. Vì vậy, tôi bắt đầu lo lắng không biết có chuyện gì xảy ra không."

# 【双鉄】
# display as 雙鐵
# JP: 「いや、日々姫のことだ。学園でも何か頼まれたか――\nあるいは単に、稀咲と話でもしているだけかもしれん」
1904 = "「Không, với tính cách của Hibiki thì. Chắc lại được nhờ vả gì đó ở học viện―― Hoặc đơn giản là đang nói chuyện với Kisaki thôi.」"

# monologue
# JP: ……答えの出ぬことを考えて、気を揉んでいても仕方ない。\nちょうど、持ち帰った資料もある。
1452 = "......Có lo lắng về những chuyện không có câu trả lời thì cũng chẳng ích gì. Vừa hay, tôi cũng có mang theo tài liệu về nhà."

# monologue
# JP: 復線買収に関して、僕が実務面で動くことも無かろうが、\n意見を出すにも、最低限の知識は当然、必要になる。
3137 = "Về việc đền bù giải tỏa đất để khôi phục tuyến đường, có lẽ tôi sẽ không tham gia vào công việc thực tế, nhưng để đưa ra ý kiến, đương nhiên tôi cũng cần có những kiến thức cơ bản."

# 【双鉄】
# display as 雙鐵
# JP: 「――宅地買収の実例、ノウハウ集か」
1475 = "「――Ví dụ thực tế về giải tỏa đất ở, cẩm nang bí quyết sao.」"

# monologue
# JP: ページをめくればすぐさまに、大いに興味を抱かされる。\n――“実例”という二文字の強さを思い知る。
2700 = "Vừa lật trang đầu tiên, tôi đã cảm thấy vô cùng hứng thú. ――Tôi nhận ra sức nặng của hai chữ \"thực tế\"."

# monologue
# JP: （ふむ……やはり宅地買収となると困難が多いのだな。\nと、いうか……重いな。罪悪感さえ覚えてしまいかねん）
3163 = "（Hừm...... Quả nhiên việc đền bù giải tỏa đất ở có rất nhiều khó khăn. Đúng hơn là...... nặng nề thật. Thậm chí có thể khiến người ta cảm thấy tội lỗi.）"

# monologue
# JP: 公共と、個と、その両立がならぬとき、\n果たしていかに振る舞うべきか……正解の無い問いだろう。
2687 = "Khi lợi ích công cộng và cá nhân không thể song hành, rốt cuộc chúng ta nên hành xử như thế nào...... Có lẽ đó là một câu hỏi không có đáp án chính xác."

# monologue
# JP: より大きな、大勢の幸福追求のためであるのなら、\n今そこにある幸せを、果たして潰してよいものか――
3018 = "Nếu là vì theo đuổi hạnh phúc lớn lao hơn, cho nhiều người hơn, thì liệu chúng ta có được phép chà đạp lên hạnh phúc đang hiện hữu ở đó không――"

# 【双鉄】
# display as 雙鐵
# JP: 「補償は無論、適切に行われることが最低限であろうが、\nであったとしても……」
2431 = "「Đương nhiên, việc bồi thường thỏa đáng là điều kiện tối thiểu, nhưng dù có như vậy đi chăng nữa......」"

# monologue
# JP: 補償は止血にすぎないと、経験が僕に教えてくれた。
3076 = "Kinh nghiệm đã dạy tôi rằng bồi thường chỉ là biện pháp cầm máu tạm thời."

# monologue
# JP: 止血の後に快復し、幸せを再びつかめるか――\n補償は決して、未来まで保証してくれはしないと。
3135 = "Sau khi cầm máu, liệu có thể hồi phục và tìm lại được hạnh phúc hay không―― Bồi thường tuyệt đối không đảm bảo cho tương lai."

# monologue
# JP: （……しかし――ううむ。\n内容のせいか、あるいはいささか集中しすぎか――）
3149 = "（......Nhưng mà―― ừm. Là do nội dung, hay do mình tập trung quá mức――）"

# monologue
# JP: 目が重い。\nまばたきを何度か繰り返しても、殆ど改善してくれない。
3045 = "Mắt tôi trĩu nặng. Dù chớp mắt mấy lần cũng chẳng khá hơn là bao."

# monologue
# JP: やむなく、まぶたを閉じてみる。ただそれだけで心地よい。\nああ、ならば僕は……自覚以上に、疲れているのか………
2833 = "Hết cách, tôi đành nhắm mắt lại. Chỉ vậy thôi cũng đủ thấy dễ chịu. A, vậy ra tôi...... mệt mỏi hơn mình tưởng sao........."

# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
3160 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch――）"

# 【双鉄】
# display as 雙鐵
# JP: 「……ん……む」
1507 = "「......Ưm...... ưm.」"

# 【路子】
# display as 路子
# JP: 「そーちゃん？」
2148 = "「Anh Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2034 = "「À――」"

# monologue
# JP: ……うたた寝をしてしまったらしい。\nあきれたように、少し笑って路子が見ている。
1456 = "......Có vẻ tôi đã ngủ gật mất rồi. Michiko đang nhìn tôi với vẻ hơi buồn cười, như thể cạn lời."

# 【路子】
# display as 路子
# JP: 「そーちゃん、なにかいいことあったの？\nホっとしたみたいな顔してる」
2147 = "「Anh Soutetsu, có chuyện gì vui à? Trông mặt anh nhẹ nhõm lắm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいこと……か、どうかはわからないけれど」
2404 = "「Chuyện vui...... thì anh cũng không chắc nữa, nhưng mà.」"

# monologue
# JP: 伝えるべきか、一瞬悩み、\n悩んでも仕方ないことなのだと、すぐ理解する。
2822 = "Tôi do dự một thoáng xem có nên kể cho em ấy nghe không, nhưng ngay lập tức nhận ra có do dự cũng chẳng ích gì."

# monologue
# JP: 路子が仮に、僕の深層心理の表出でしかないのだとしても、\nあるいは本当に、亡霊・幽霊であるのだとしても――
2704 = "Giả sử Michiko chỉ là biểu hiện từ sâu thẳm tâm lý của tôi, hay thậm chí em ấy thực sự là một linh hồn, một bóng ma đi chăng nữa――"

# 【双鉄】
# display as 雙鐵
# JP: 「お墓参りにいってきたんだ。\nお父さんと、お母さんの」
2205 = "「Anh vừa đi viếng mộ về.\nMộ của bố, và mẹ.」"

# 【路子】
# display as 路子
# JP: 「そーなんだ」
2479 = "「Vậy ạ.」"

# monologue
# JP: ――路子と僕は、つながっている。\nこれほど離れてしまっていても、それでも、確かに。
1433 = "――Michiko và tôi, vẫn luôn kết nối với nhau. Dù đã xa cách đến nhường này, nhưng chắc chắn là vậy."

# monologue
# JP: だから、隠し事などできようもない。\nそうと思えば、素直な言葉だけが出ていく。
2876 = "Vì thế, tôi không thể giấu giếm điều gì. Nghĩ vậy, những lời nói chân thật cứ thế tuôn trào."

# 【双鉄】
# display as 雙鐵
# JP: 「父さんと母さんと、話ができたかわからない。\nでも――　一方的にでも、いろいろ伝えてはこれたと思う」
2193 = "「Anh không biết mình có nói chuyện được với bố mẹ hay không. Nhưng―― anh nghĩ dù chỉ là từ một phía, anh cũng đã truyền đạt được nhiều điều.」"

# 【路子】
# display as 路子
# JP: 「なにを、そーちゃんは伝えたの？」
2506 = "「Anh Soutetsu đã truyền đạt điều gì vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まずまっさきに路子のことだ。\n路子が、この列車で父さんと母さんを待ってると」
2400 = "「Trước tiên là chuyện của Michiko. Rằng Michiko đang đợi bố mẹ trên chuyến tàu này.」"

# 【路子】
# display as 路子
# JP: 「あー」
2023 = "「A.」"

# monologue
# JP: なんとも、複雑な声に聞こえる。
2775 = "Nghe như một âm thanh thật phức tạp."

# monologue
# JP: 嬉しさと、寂しさとが、\nぐちゃぐちゃに入り混じっているような。
3005 = "Giống như niềm vui và nỗi buồn, đang hòa quyện vào nhau một cách hỗn độn."

# 【路子】
# display as 路子
# JP: 「だけどね？　そーちゃん。\nママもパパも、みちをむかえに来てくれないよ？」
1899 = "「Nhưng mà nhé? Anh Soutetsu. Cả mẹ và bố, đều không đến đón Michi đâu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\n――まだか」
2313 = "「Vậy sao.\n――Vẫn chưa à.」"

# 【路子】
# display as 路子
# JP: 「うん、まだ。来てくれるのは、そーちゃんだけ。\nそのそーちゃんも、今日は、すぐにかえっちゃうし」
2092 = "「Vâng, vẫn chưa. Người đến thăm em, chỉ có mỗi anh Soutetsu thôi. Mà hôm nay, anh Soutetsu cũng sẽ về ngay nữa chứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……」
1493 = "「......」"

# monologue
# JP: 否定、できない。\nこれはひとときのうたたねと、僕にも理解できているから。
2854 = "Tôi không thể phủ nhận. Bởi vì tôi cũng hiểu rõ đây chỉ là một giấc ngủ gật chốc lát."

# 【路子】
# display as 路子
# JP: 「ママとパパ。みちのこと――」
2372 = "「Mẹ và bố. Về chuyện của Michi――」"

# monologue
# JP: 言ってすぐ、まるで大人がそうするように、\nちいさな路子は言葉を呑み込む。
3099 = "Vừa dứt lời, Michiko nhỏ bé liền nuốt ngược những lời định nói vào trong, y như cách một người lớn thường làm."

# 【路子】
# display as 路子
# JP: 「――みちのこと、みつけられないのかなぁ」
1473 = "「――Có lẽ nào, họ không tìm thấy Michi không nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……大丈夫だ。探し続けてくれているから。\nただ、僕が――上手に伝えられてないだけで」
1519 = "「......Không sao đâu. Bố mẹ vẫn đang tiếp tục tìm kiếm mà. Chỉ là, anh―― chưa truyền đạt được rõ ràng thôi.」"

# 【路子】
# display as 路子
# JP: 「みちのいばしょを？」
2348 = "「Chỗ ở của Michi á?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。というか――」
2304 = "「Đúng vậy. Đúng hơn là――」"

# monologue
# JP: 問いかけられて初めて気付く。\n僕とて、把握していないではないか。
3073 = "Bị hỏi tôi mới chợt nhận ra. Chính tôi cũng đâu có nắm rõ cơ chứ."

# monologue
# JP: 路子を乗せて――閉じ込めているこの列車は、\n果たして、『どこ』を走っているのか。
3114 = "Chuyến tàu đang chở―― đang giam giữ Michiko này, rốt cuộc đang chạy ở \"đâu\"."

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ路子、\nこの列車は、窓を開けることは」
2243 = "「Này Michiko, cửa sổ của chuyến tàu này, có thể mở ra không.」"

# 【路子】
# display as 路子
# JP: 「だめだよ！　そーちゃん！　おっこちちゃうよ！！」
1890 = "「Không được đâu! Anh Soutetsu! Sẽ bị rơi xuống đấy!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「まさか。それほどの間抜けではない」
2176 = "「Làm gì có chuyện đó. Anh đâu có ngốc đến mức ấy.」"

# 【路子】
# display as 路子
# JP: 「ちがうの！　ダメなの！　ひっぱられちゃう」
1884 = "「Không phải! Không được đâu! Sẽ bị kéo đi mất đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「引っ張られる？　――っ！？」
2428 = "「Bị kéo đi? ――っ!?」"

# monologue
# JP: （ゆさっ！）
3167 = "（Lay mạnh!）"

# monologue
# JP: 背筋が凍る。\nいきなり体を揺すられて。
2864 = "Sống lưng tôi lạnh toát.\nĐột nhiên cơ thể bị lay mạnh."

# monologue
# JP: この手は、路子の小さな手じゃない。\nもっと大きく、あたたかく――
3128 = "Bàn tay này, không phải bàn tay nhỏ bé của Michiko. Nó lớn hơn, ấm áp hơn――"

# 【日々姫】
# display as ？？？
# JP: 「にぃに！　にぃにぃっ！」
2520 = "「Anh hai! Anh hai!」"

# 【双鉄】
# display as 雙鐵
# JP: 「んっ――あ――」
2054 = "「Ưm―― a――」"

# monologue
# JP: 目を開き、\n夢を見ていたと理解する。
2859 = "Tôi mở mắt,\nvà nhận ra mình vừa nằm mơ."

# monologue
# JP: 僕の眼前、日々姫の顔が広がって――\nその鮮やかさに、夢の残滓が急速に散り、消えていく。
2977 = "Ngay trước mắt tôi là khuôn mặt của Hibiki―― Sự rạng rỡ ấy khiến những tàn dư của giấc mơ nhanh chóng tan biến."

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ただいま！　おかえりなさい」
2521 = "「Anh hai, em về rồi đây! Chào mừng anh về nhà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、おかえり。そして、ただいま」
2289 = "「Chào mừng em về nhà, Hibiki. Và, anh về rồi đây.」"

# monologue
# JP: 言葉をかわせば、ホッとする。\n日々姫は実に、いつもどおりだ。
3049 = "Trao đổi vài câu, tôi cảm thấy nhẹ nhõm hẳn. Hibiki quả thực vẫn luôn như mọi khi."

# 【日々姫】
# display as 日日姬
# JP: 「珍しかと！\nにぃにがうたたねしとるなんて」
2386 = "「Hiếm thấy thật đấy!\nAnh hai mà lại ngủ gật cơ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。まぁな」
2067 = "「Ừm. Thì cũng.」"

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんとわたし、待たせちゃったと？\n大急ぎで帰ってきたんだけど――」
1944 = "「Anh đã phải chờ em lâu lắm sao? Em đã vội vàng chạy về ngay rồi mà――」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1882 = "「Không――」"

# monologue
# JP: “大した時間を待たされてない”\nそういいかけたところで気付く。
2831 = "\"Anh cũng không phải đợi lâu lắm đâu.\" Tôi định nói vậy thì chợt nhận ra."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、そのまま僕が駅で待っていれば、\nより多くの時間を、向き合えたのだな」
2126 = "「Ra vậy, nếu anh cứ đợi em ở nhà ga, thì chúng ta đã có nhiều thời gian hơn để đối diện với nhau rồi.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
2035 = "「A!」"

# monologue
# JP: 言った瞬間、日々姫が頭を抱えてしまう。
2823 = "Vừa dứt lời, Hibiki liền ôm đầu."

# 【日々姫】
# display as 日日姬
# JP: 「よね！　駅から帰ってくる間だって、\nふたりでお話できたのに～」
2151 = "「Đúng rồi nhỉ! Trong lúc từ ga về nhà, hai đứa mình cũng có thể nói chuyện với nhau mà~」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、その分もここから先に話せばいい。\n今日はまるまる一日、僕は日々姫と向き合うのだからな」
2121 = "「Thôi, phần thời gian đó để bù vào lúc sau cũng được. Hôm nay anh sẽ dành trọn vẹn cả ngày để đối diện với Hibiki mà.」"

# 【日々姫】
# display as 日日姬
# JP: 「はうっ！」
2004 = "「Hau!」"

# monologue
# JP: 今度は一転、真っ赤になる。\nああ、本当にいつもどおりだ。
3123 = "Lần này đổi thái độ, mặt em ấy đỏ bừng lên. A, đúng là vẫn như mọi khi."

# monologue
# JP: 日々姫はいつでもさまざまな顔を、\n僕には隠さず見せてくれる。
2984 = "Hibiki lúc nào cũng phô bày vô vàn biểu cảm khác nhau trước mặt tôi mà không hề che giấu."

# 【日々姫】
# display as 日日姬
# JP: 「私のお仕事、にぃにに見てもらえるだなんて――\nちょびっとだけ照れくさいけど、その何倍も嬉しかと！」
2421 = "「Công việc của em, lại được anh hai nhìn thấy―― Tuy có hơi xấu hổ một chút, nhưng em vui gấp mấy lần luôn đó!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。\nそう思ってもらえるのなら、光栄だ」
2314 = "「Vậy sao.\nĐược em nghĩ như vậy, anh rất vinh hạnh.」"

# monologue
# JP: こころの底からこぼれた言葉は、\n日々姫の百面相を、ごく穏やかな笑顔に固める。
2855 = "Những lời nói thốt ra từ tận đáy lòng, đã khiến vô vàn biểu cảm của Hibiki đọng lại thành một nụ cười vô cùng dịu dàng."

# 【日々姫】
# display as 日日姬
# JP: 「“向き合う”っていうなら、学園での私のことだって、\nにぃにぃに見てもらいたいくらいだし」
2270 = "「Nếu nói là \"đối diện\" thì, ngay cả những chuyện của em ở học viện, em cũng muốn được anh hai nhìn thấy nữa cơ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうできれば理想なのだろうがな。\nさすがに、そればかりは難しかろう」
2236 = "「Nếu làm được như vậy thì đúng là lý tưởng thật. Nhưng quả thực, chuyện đó thì hơi khó.」"

# 【日々姫】
# display as 日日姬
# JP: 「難しいかな？　にぃに、学園の制服きて紛れ込んだら、\n学園生で、ぜーんぜん通用しそうだけど？」
2530 = "「Khó sao ạ? Anh hai mà mặc đồng phục học viện trà trộn vào, thì hoàn toàn có thể qua mặt được mọi người với tư cách học sinh đấy?」"

# monologue
# JP: まんざら冗談でも無い口調。\nならば僕も、真面目に答えねばならんだろう。
2773 = "Giọng điệu không hẳn là nói đùa. Vậy thì tôi cũng phải trả lời một cách nghiêm túc thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「そうしてしまえば、僕が自身を誤魔化すこととなる。\n誤魔化した身では、日々姫とまっすぐに向き合えまいよ」
2476 = "「Nếu làm thế, anh sẽ tự lừa dối chính mình. Với một thân phận giả mạo, anh sẽ không thể thẳng thắn đối diện với Hibiki được.」"

# 【日々姫】
# display as 日日姬
# JP: 「あー」
# 2023 = "「啊——」" 

# monologue
# JP: 納得した声。
3063 = "Giọng nói đầy vẻ thuyết phục."

# 【日々姫】
# display as 日日姬
# JP: 「……やけん、私の登園の間にも、乗務訓練？」
1515 = "「......Thế nên, trong lúc em đi học, anh vẫn tham gia huấn luyện nghiệp vụ sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。それも同じ意味だ。普段の僕で、\n普段の日々姫と向き合わねば――ああ、いや」
2310 = "「Đúng vậy. Cũng cùng một ý nghĩa cả thôi. Với con người thường ngày của anh, anh phải đối diện với một Hibiki thường ngày―― à, không.」"

# 【日々姫】
# display as 日日姬
# JP: 「なにかあったと？」
1967 = "「Có chuyện gì sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「一点だけは普段と違う。『遅れてはなりませんから』と、\nハチロクは、僕を早上がりさせてくれたのだ」
2330 = "「Chỉ có một điểm khác với thường ngày. Hachiroku đã bảo, 『Không được trễ hẹn đâu ạ』, và cho anh về sớm đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「ハチロクが……」
1965 = "「Hachiroku đã......」"

# monologue
# JP: 訓練のあと、\\x%l保火;#00ffc040;保火%l;#;状態にし、整備清掃。
3097 = "Sau khi huấn luyện, chuyển sang trạng thái \\x%l保火;#00ffc040;giữ lửa%l;#;, rồi bảo dưỡng dọn dẹp."

# monologue
# JP: そうした全てをハチロクが引き受けてくれなかったなら、\nこんな時間に帰宅など、できようもない。
2644 = "Nếu Hachiroku không gánh vác tất cả những việc đó, thì tôi chẳng thể nào về nhà vào giờ này được."

# 【日々姫】
# display as 日日姬
# JP: 「それでにぃにの方が早かったとね。\nシャワー浴びる時間くらいはあると思うとったのに」
2258 = "「Vì thế nên anh hai mới về sớm hơn nhỉ. Em cứ nghĩ ít nhất cũng có thời gian đi tắm cơ đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2300 = "「À――」"

# monologue
# JP: 言われて、あらためて見てみれば、\n眩しいほどに思えてしまう。
3061 = "Nghe em ấy nói vậy, tôi mới nhìn kỹ lại, và cảm thấy chói lóa đến mức lóa cả mắt."

# 【双鉄】
# display as 雙鐵
# JP: 「意識してみると、制服姿は良いものだな。\nなんというか、学園生らしさが際立つようだ」
1920 = "「Khi để ý kỹ, anh thấy em mặc đồng phục đẹp lắm. Nói sao nhỉ, nó làm nổi bật vẻ nữ sinh của em.」"

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんと？　うふふ、\n褒めてもらえて、嬉しかと！」
2485 = "「Thật sao ạ? Ufufu,\nĐược anh khen, em vui lắm!」"

# monologue
# JP: 日々姫がスカートを翻す。\n居間にもふわり、青春の香りが広がる気がする。
2969 = "Hibiki tung bay vạt váy. Tôi có cảm giác hương vị thanh xuân đang nhẹ nhàng lan tỏa khắp phòng khách."

# 【双鉄】
# display as 雙鐵
# JP: 「が、着替えるのだろう？\n学園生の正装は、制服という気もするが――」
1897 = "「Nhưng mà, em sẽ thay đồ đúng không? Tuy anh nghĩ đồng phục cũng được coi là lễ phục của học sinh, nhưng――」"

# 【日々姫】
# display as 日日姬
# JP: 「ばってん、それだとお仕事にならんけん。\nなんかこう、甘やかされる雰囲気になっちゃって」
1988 = "「Nhưng mà, mặc thế thì không làm việc được đâu. Nó cứ tạo ra cái không khí kiểu như được nuông chiều ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1976 = "「Ra là vậy.」"

# monologue
# JP: その一言から、伝わってくる。
2836 = "Từ câu nói đó, tôi có thể cảm nhận được."

# monologue
# JP: [サイン・デザイン,3]看板描き――\nその仕事に、日々姫はプロとして向き合っていると。
2959 = "\\x%lサイン・デザイン;#00ffc040;Vẽ biển hiệu%l;#;―― Hibiki đang đối diện với công việc đó bằng thái độ của một chuyên gia."

# 【日々姫】
# display as 日日姬
# JP: 「やけん。着替える！\nシャワー、すぐに浴びてくるけん」
2249 = "「Vì thế. Em sẽ thay đồ!\nEm đi tắm nhanh rồi ra ngay.」"

# 【双鉄】
# display as 雙鐵
# JP: 「焦らんでも構わんぞ。僕も着替える\n日々姫の足を引っ張らんよう、身だしなみも整えるさ」
1888 = "「Không cần vội đâu. Anh cũng sẽ thay đồ. Anh sẽ chải chuốt gọn gàng để không làm vướng chân Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「普通でよかよ！？」
2380 = "「Bình thường thôi là được rồi ạ!?」"

# monologue
# JP: 僕の声に、よほどの力みでもあったのか、\n日々姫が少し、慌てたような声を出す。
2718 = "Chắc là trong giọng nói của tôi có chút gì đó quá gắng sức chăng, Hibiki cất giọng có vẻ hơi hốt hoảng."

# 【日々姫】
# display as 日日姬
# JP: 「にぃにがあんまり決めすぎると、\n私がかえって、子供っぽくみられちゃうけん」
2434 = "「Nếu anh hai ăn mặc quá chải chuốt, thì ngược lại, em sẽ bị nhìn nhận như một đứa trẻ con mất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
2317 = "「Vậy sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「やけん、ふつーに！\nそれこそジャスト、普段のにぃにでお願いすると！」
2256 = "「Thế nên, cứ bình thườờờng thôi! Chính xác là một anh hai như thường ngày, xin anh đấy!」"

# monologue
# JP: ……僕に宿題をひとつ残して、\n日々姫は、シャワーを浴びにいってしまう。
1457 = "......Để lại cho tôi một bài toán khó,\nHibiki liền đi tắm."

# 【双鉄】
# display as 雙鐵
# JP: 「普段の僕……と言われると――\nタイも締めずにビジネスの場というのも、どうか」
2118 = "「Bình thường của mình...... nói thế thì―― Đến nơi làm việc mà không thắt cà vạt thì có ổn không nhỉ.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「お困りのようですね。双鉄様」
2527 = "「Ngài đang gặp khó khăn sao. Ngài Soutetsu.」"

# monologue
# JP: 冷静な声。\n耳にしただけで、かなり救われた気になれる。
2683 = "Giọng nói điềm tĩnh. Chỉ nghe thôi cũng khiến tôi cảm thấy được cứu rỗi phần nào."

# 【双鉄】
# display as 雙鐵
# JP: 「ナビにひとつ相談したい。\n日々姫の仕事に同行する際の服装についてだ」
2331 = "「Tôi muốn hỏi ý kiến Navi một chút. Về trang phục khi đi cùng Hibiki đến nơi làm việc.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「服装の、何についてをお悩みですか？」
2178 = "「Ngài đang phân vân về điều gì của trang phục ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「普段の僕で、と日々姫には言われたのだが……\nノータイで日々姫の仕事場に行くのは礼を失するかと」
2282 = "「Hibiki bảo tôi cứ mặc như bình thường là được...... Nhưng tôi e là đến nơi làm việc của Hibiki mà không thắt cà vạt thì hơi thất lễ.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「そのようなことでしたら、双鉄様」
2129 = "「Nếu là chuyện đó thì, ngài Soutetsu.」"

# monologue
# JP: まさに、即答。\nナビの言葉にはほんの一瞬のためらいも無い。
3175 = "Quả thực là đáp ngay tắp lự. Trong lời nói của Navi không hề có lấy một chút do dự nào."

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「大切なのは、双鉄様ご自身の服装ではなく、\n日々姫様との服装の調和ではないでしょうか」
2510 = "「Điều quan trọng không phải là trang phục của bản thân ngài Soutetsu, mà là sự hài hòa với trang phục của Hibiki, chẳng phải vậy sao ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――言われればそのとおりだな」
1975 = "「Ra là vậy―― Nghe cô nói mới thấy đúng thật.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ですから、まずは日々姫様の服を確認。\n次に、日々姫様とご一緒に双鉄様の服を選ばれては？」
2248 = "「Vì vậy, trước tiên hãy xác nhận trang phục của Hibiki. Sau đó, ngài và Hibiki cùng nhau chọn trang phục cho ngài thì sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしい案だと思う。\nお前はよほど、僕より世慣れているな」
2241 = "「Một ý kiến tuyệt vời. Cô có vẻ còn sành sỏi sự đời hơn cả tôi đấy.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様が疎いだけかと」
1984 = "「Chỉ là do ngài Soutetsu quá mù mờ thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「手厳しい。その辺も実に、人間くさい」
2385 = "「Khắt khe thật. Điểm đó cũng rất giống con người đấy.」"

# monologue
# JP: （ととととっ）
3158 = "（Lạch cạch lạch cạch）"

# monologue
# JP: 軽やかな足音。\n思ったときには、日々姫は居間へと舞い戻っている。
3059 = "Tiếng bước chân nhẹ nhàng. Vừa nghĩ vậy, Hibiki đã quay trở lại phòng khách."

# 【日々姫】
# display as 日日姬
# JP: 「おまたせーっ、って、あれ？　にぃに、\n着替えるんじゃなかったと？」
1914 = "「Để anh đợi lâu rồi, ủa? Anh hai, anh không định thay đồ sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお、手早いな。\nというか、うむ。実に良く似合っている」
2021 = "「Ồ, nhanh thật đấy. Đúng hơn là, ừm. Thực sự rất hợp với em.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに――んんっ――兄さんが、きっとスーツかと\n思ったから、合わせてみたんですけど」
2513 = "「Anh hai―― ưm―― Em nghĩ chắc chắn anh trai sẽ mặc vest, nên em đã thử phối đồ cho hợp với anh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、奇遇だな。\n僕も日々姫に合わせたいと思っていた」
2481 = "「Vậy sao, trùng hợp thật. Anh cũng định mặc sao cho hợp với Hibiki đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「わ！」
2001 = "「Oa!」"

# monologue
# JP: 言った途端に、\n決めこんでいた日々姫の表情が崩れてしまう。
2866 = "Vừa dứt lời,\nvẻ mặt kiên quyết của Hibiki liền sụp đổ."

# 【日々姫】
# display as 日日姬
# JP: 「それじゃにぃに、着替えば待っとって――んんっ、\n着替え、待っててくれたんですか？」
2505 = "「Vậy thì anh hai, đang đợi em thay đồ―― ưm, Anh đã đợi em thay đồ xong sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、結果としてそういう形になっただけだが」
2083 = "「À thì, kết quả là thành ra như vậy thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「うれしい！　私、ずーっとにぃにのコーディネート\nしてみたかったけん！」
2215 = "「Vui quá! Em đã luôôôn muốn thử phối đồ cho anh hai từ lâu rồi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なのか。であらば、頼めるか？」
2315 = "「Vậy sao. Nếu vậy, anh nhờ em được không?」"

# 【日々姫】
# display as 日日姬
# JP: 「任せてっ！」
1972 = "「Cứ giao cho em!」"

# monologue
# JP: 日々姫の手が伸びてくる。\n受取り、つなげば、満面の笑顔で僕を引っ張る。
2954 = "Hibiki vươn tay ra. Tôi nắm lấy, em ấy nở nụ cười rạng rỡ kéo tôi đi."

# 【日々姫】
# display as 日日姬
# JP: 「行こ？　にぃにのお部屋。クローゼットの中身\n見なくちゃ、コーディネートもできんけん！」
2450 = "「Đi thôi? Đến phòng anh hai. Phải xem trong tủ quần áo có gì thì mới phối đồ được chứ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2072 = "「Ừm.」"

# monologue
# JP: 驚くほどのはしゃぎっぷりだ。\nつないでる手も、ぽかぽかしてる。
2776 = "Sự phấn khích đến kinh ngạc. Bàn tay đang nắm lấy tay tôi cũng ấm áp lạ thường."

# monologue
# JP: これほど喜んでくれるものなら、\nもっと早くに頼んでおけばよかったか。
2778 = "Nếu biết em ấy vui đến vậy, thì tôi đã nhờ em ấy sớm hơn rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「クローゼットという雰囲気でも無いが」
2246 = "「Cũng không hẳn là tủ quần áo đâu.」"

# monologue
# JP: なにせ、ふすま紙も純和風だ。\n中を開いて、吊るしてある背広を取り出し、見せる。
3028 = "Bởi vì, giấy dán cửa lùa mang đậm phong cách Nhật Bản truyền thống. Tôi mở ra, lấy những bộ vest đang treo bên trong cho em ấy xem."

# 【日々姫】
# display as 日日姬
# JP: 「あれ？\nにぃにって、これしかスーツ持ってなかと？」
2000 = "「Ủa?\nAnh hai, chỉ có chừng này vest thôi sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。グレー、紺、濃紺のシャドウストライプ――\nそれぞれのシングルに、礼装用の黒のダブルが一着」
2306 = "「Đúng vậy. Màu xám, màu xanh dương, màu xanh đen kẻ sọc mờ―― Mỗi màu một bộ một hàng khuy, và một bộ màu đen hai hàng khuy dùng làm lễ phục.」"

# monologue
# JP: それだけあればまず困らぬと、\n義父が教えてくれたものだ。
3141 = "Chỉ cần có chừng đó là sẽ không bao giờ gặp khó khăn gì, đó là điều bố nuôi đã dạy tôi."

# monologue
# JP: 実際、これだけで困らぬゆえに、\n買い足すこともまるでなかった。
2795 = "Thực tế thì, chỉ với chừng đó cũng đủ dùng rồi, nên tôi hoàn toàn không có ý định mua thêm."

# 【日々姫】
# display as 日日姬
# JP: 「なんか、もっと色々着てる気がしてたけど」
2218 = "「Em cứ có cảm giác anh mặc nhiều loại đa dạng hơn cơ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「全てスリーピースだからな。\n組み合わせを変えるだけで、かなり印象も違おう」
2503 = "「Vì tất cả đều là vest ba mảnh mà. Chỉ cần thay đổi cách phối hợp, ấn tượng cũng sẽ khác đi khá nhiều.」"

# 【日々姫】
# display as 日日姬
# JP: 「そっか。シャツとかとのも組み合わせもあるし」
2478 = "「Ra vậy. Còn kết hợp với áo sơ mi các kiểu nữa chứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「シャツは、こちらだ」
2432 = "「Áo sơ mi thì ở bên này.」"

# monologue
# JP: 押し入れのふすまを開ければ、背の低い押し入れ箪笥。\n初夏用と秋冬用、[ふたさお,1]二竿それぞれに収納してある。
2848 = "Mở cửa lùa tủ âm tường ra, bên trong là một chiếc tủ ngăn kéo thấp. Áo sơ mi được cất riêng biệt trong hai ngăn, một cho đầu hè và một cho thu đông."

# 【日々姫】
# display as 日日姬
# JP: 「わ、シャツはすごく多かとね。\nネクタイも――めったにしめてないけど結構あるんだ」
2003 = "「Oa, áo sơ mi nhiều thật đấy. Cà vạt cũng vậy―― tuy hiếm khi thấy anh thắt nhưng cũng có khá nhiều nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「OHITOYOのシャツは帝都の百貨店でも売られている。\n応援したい気持ちもあって、ついついな」
2539 = "「Áo sơ mi của OHITOYO cũng được bán ở các trung tâm thương mại trên Đế đô. Vì cũng muốn ủng hộ quê nhà nên anh cứ vô tình mua mãi thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「御一夜のシャツ？」
2320 = "「Áo sơ mi của Ohitera sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか。僕も義父さんもでていっていれば、\n右田の家で紳士服の話題など出ぬものな」
2019 = "「À―― phải rồi. Nếu cả anh và bố nuôi đều đi vắng, thì trong nhà Migita làm gì có ai bàn về chủ đề trang phục nam giới cơ chứ.」"

# monologue
# JP: 御一夜市のシャツ・メイカーの\nシャツ・ブランドが、OHITOYOで。
3177 = "OHITOYO là thương hiệu áo sơ mi của một nhà sản xuất áo sơ mi tại thành phố Ohitera."

# monologue
# JP: OHITOYOは、帝都でも売られる高品質シャツなのだと\n――説明すれば、日々姫はその目を丸くする。
2750 = "OHITOYO là loại áo sơ mi chất lượng cao được bán cả ở Đế đô ――Nghe tôi giải thích vậy, Hibiki tròn xoe mắt ngạc nhiên."

# 【日々姫】
# display as 日日姬
# JP: 「えええ、そぎゃんこつ、\nわたし全っ然知らんかったけん」
2008 = "「Ể, chuyện đó,\nem hoàn toàààn không biết luôn đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、僕も帝都に出てから気づいたか。\n案外と、そういうものであるのかもしれんな」
2484 = "「Nghe em nói vậy, anh cũng mới nhận ra điều đó sau khi lên Đế đô. Không chừng, những chuyện như vậy lại thường xuyên xảy ra cũng nên.」"

# 【日々姫】
# display as 日日姬
# JP: 「っていうか、こんシャツもその、OHITOYO？」
2491 = "「Mà này, chiếc áo sơ mi này cũng là của OHITOYO sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。昔は他のメーカーのシャツも買ったが、\nすぐに傷んでしまったゆえ、今は全てがOHITOYOだ」
2060 = "「Ừm. Ngày xưa anh cũng mua áo sơ mi của các hãng khác, nhưng chúng rất mau hỏng, nên bây giờ tất cả đều là của OHITOYO.」"

# 【日々姫】
# display as 日日姬
# JP: 「ふぅん？　そぎゃんと質ば違うと？」
2094 = "「Hừm? Chất lượng khác biệt đến thế sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2072 = "「嗯」" 

# monologue
# JP: 日々姫の指が、シャツを撫でる。\nその感触が、シャツ越し、僕の肌をくすぐる。
2971 = "Ngón tay của Hibiki vuốt ve chiếc áo sơ mi. Cảm giác đó, xuyên qua lớp áo, nhột nhạt trên làn da tôi."

# 【日々姫】
# display as 日日姬
# JP: 「あー、シャリってしてる感じするかも。\n私のブラウスとかより上等？」
2029 = "「A, có vẻ hơi nhám nhám nhỉ. Cao cấp hơn cả áo blouse của em sao?」"

# monologue
# JP: そうして、同じ指先で、\nツツ――と自らの胸もとを。
2892 = "Và rồi, với cùng một đầu ngón tay đó, em ấy khẽ chạm―― vào ngực mình."

# 【日々姫】
# display as 日日姬
# JP: 「あ」
2033 = "「A.」"

# monologue
# JP: 驚いたような声を出し、\nじわじわ、じわじわ赤くなる。
2781 = "Em ấy thốt lên một tiếng ngạc nhiên, và dần dần, dần dần đỏ bừng mặt."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした日々姫？」
1940 = "「Sao thế Hibiki?」"

# 【日々姫】
# display as 日日姬
# JP: 「う、ううんっ！？\nなんでも、なんでも無かとよ！？」
1907 = "「Ư, ưm!?\nKhông có, không có gì đâu!?」"

# monologue
# JP: 右手の指をわきわき動かし、\nぎゅっと、ぎゅうっと握り込む。
2770 = "Em ấy ngọ nguậy các ngón tay phải, rồi nắm chặt, siết thật chặt lại."

# monologue
# JP: そうして、少し、ほんの少しだけ不満げに。\n上目遣いで僕を見る。
3021 = "Sau đó, với vẻ hơi, chỉ một chút xíu thôi, bất mãn. Em ấy ngước mắt lên nhìn tôi."

# 【日々姫】
# display as 日日姬
# JP: 「っていうか、にぃには――\n全然、なんにも無かったと？」
2438 = "「Mà này, anh hai――\nHoàn toàn, không cảm thấy gì sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんにも、とは？」
1917 = "「Không cảm thấy gì, là sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「やけん――やけんね？」
2230 = "「Thì là―― thì là nhé?」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様」
2526 = "「Ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！？」
2022 = "「Uo!?」"

# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ！？」
1996 = "「Hya!?」"

# monologue
# JP: 冷静極まるナビの声。\n驚かされて飛び出た声が日々姫の声まで驚かす。
3060 = "Giọng nói cực kỳ điềm tĩnh của Navi. Tiếng hét giật mình của tôi khiến cả Hibiki cũng giật mình theo."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ナビ」
2175 = "「Có chuyện gì vậy? Navi.」"

# 【日々姫】
# display as 日日姬
# JP: 「ナビ？　ナビ！　あ――あ――ああっ！\n今の、聞こえた――聞こえてた！？」
2537 = "「Navi? Navi! A―― a―― aa! Lúc nãy, cô ấy nghe thấy―― đã nghe thấy sao!?」"

# monologue
# JP: 日々姫の顔がみるみるうちにゆでダコになる。\nけれどもナビは、日々姫の問いに答えない。
2976 = "Khuôn mặt Hibiki nhanh chóng đỏ bừng như con bạch tuộc luộc. Nhưng Navi không trả lời câu hỏi của Hibiki."

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「お約束のお時間の方、大丈夫でしょうか？」
2263 = "「Thời gian cuộc hẹn, liệu có ổn không ạ?」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！　そぎゃんとね！　うん！　時間！！」
2039 = "「A! Đúng rồi! Ừ! Thời gian!!」"

# monologue
# JP: 途端に日々姫が動き出す。\n慌てたように、ポカポカの手で僕の手を引く。
2993 = "Ngay lập tức, Hibiki bắt đầu hành động. Em ấy hốt hoảng nắm lấy tay tôi bằng bàn tay ấm áp của mình."

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　急ごっ！！」
2519 = "「Anh hai! Nhanh lên!!」"

# 【日々姫】
# display as 日日姬
# JP: 「ただいまー！」
2208 = "「Em về rồi đây!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おかえり、日々姫、そして、ただいま」
2342 = "「Chào mừng em về nhà, Hibiki, và, anh về rồi đây.」"

# 【日々姫】
# display as 日日姬
# JP: 「おかえりなさい、にーぃにっ！」
2343 = "「Chào mừng anh về nhà, anh hai!」"

# monologue
# JP: 手洗いうがいをきっちり済ませて居間へ落ち着く。\nとたんにじわりとこみ上げてくるのは、達成感と感心だ。
3012 = "Sau khi rửa tay súc miệng cẩn thận, chúng tôi ngồi nghỉ trong phòng khách. Ngay lập tức, một cảm giác thành tựu và khâm phục dâng trào trong tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「大したものだな、日々姫は。なにかあれば、\n少しはフォローしようかとも思っていたのだが」
1937 = "「Giỏi thật đấy, Hibiki. Anh cứ nghĩ nếu có chuyện gì, thì anh sẽ giúp đỡ em một chút cơ.」"

# monologue
# JP: クリーニング屋さんの、新しい看板作りの打ち合わせ。
3124 = "Cuộc họp bàn về việc làm biển hiệu mới cho tiệm giặt ủi."

# monologue
# JP: 『鏡の看板』という突拍子も無いオーダーを、\nけれど日々姫は鮮やかに、極めて現実的な案にまとめた。
2798 = "Một yêu cầu kỳ quặc là 『Biển hiệu bằng gương』, nhưng Hibiki đã khéo léo biến nó thành một phương án cực kỳ thực tế."

# 【双鉄】
# display as 雙鐵
# JP: 「僕などは、ほとんど何もできなかった」
2213 = "「Anh thì, hầu như chẳng làm được gì cả.」"

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんこつなか！　\nフォローば、たーくさんしてもらったと！」
2349 = "「Làm gì có chuyện đó! Anh đã giúp đỡ em rấttt nhiều mà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「何か、フォローをできていたか？」
2235 = "「Anh đã giúp được gì cơ?」"

# 【日々姫】
# display as 日日姬
# JP: 「もちろん！！　いっとう単純なこと言うと、\nにぃにがそばに居てくれるだけで、私、落ち着けるし」
2383 = "「Tất nhiên rồi!! Nói một cách đơn giản nhất thì, chỉ cần anh hai ở bên cạnh là em đã thấy yên tâm rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのなら、なによりっ――（けほっ）」
2130 = "「Nếu được vậy thì, còn gì bằng―― (Khụ)」"

# 【日々姫】
# display as 日日姬
# JP: 「喉いためたと！？　私お茶淹れてくる！」
2050 = "「Anh bị đau họng sao!? Em đi pha trà đây!」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、軽くむせただけだ。\nが、茶は淹れよう」
1906 = "「Không, anh chỉ hơi sặc thôi.\nNhưng mà, pha trà đi.」"

# monologue
# JP: 立ち上がろうとした日々姫を座らせ、立ち上がる。
2867 = "Tôi ấn Hibiki đang định đứng dậy ngồi xuống, rồi tự mình đứng lên."

# 【日々姫】
# display as 日日姬
# JP: 「にぃに？」
2523 = "「Anh hai?」"

# 【双鉄】
# display as 雙鐵
# JP: 「さっきの案、日々姫はまとめたいのだろう？\n集中できるよう、僕が茶を淹れてくる」
1946 = "「Hibiki muốn tổng hợp lại phương án lúc nãy đúng không? Để em tập trung, anh sẽ đi pha trà.」"

# 【日々姫】
# display as 日日姬
# JP: 「わ――ありがと。\nばってん、お茶くらい私が」
2031 = "「Oa―― cảm ơn anh. Nhưng mà, chỉ pha trà thôi thì để em」"

# 【双鉄】
# display as 雙鐵
# JP: 「お茶くらいだから、僕が淹れてやりたいのだ。\n今日の日々姫を称えるためにも」
1900 = "「Chính vì chỉ là pha trà nên anh mới muốn pha cho em. Cũng là để tán thưởng Hibiki của ngày hôm nay nữa.」"

# 【日々姫】
# display as 日日姬
# JP: 「え……へっ」
2006 = "「E...... he.」"

# monologue
# JP: 照れくさそうに、じんわりと。\n日々姫は頬をピンクにそめて、ゆっくり頷く。
2992 = "Một cách ngượng ngùng, chầm chậm. Hibiki ửng hồng đôi má, khẽ gật đầu."

# 【日々姫】
# display as 日日姬
# JP: 「ありがと……にぃに。\nそしたら、お言葉にあまえちゃいます」
2439 = "「Cảm ơn anh...... anh hai. Vậy thì, em xin nhận lòng tốt của anh ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「甘えてくれ。いくらでも」
2472 = "「Cứ nhận đi. Bao nhiêu cũng được.」"

# 【日々姫】
# display as 日日姬
# JP: 「うふふっ」
2096 = "「Ufufu.」"

# monologue
# JP: 幸せそうな声を背中に、湯を沸かす。\n鉛筆が滑り出す音が、コンロの音に重なってくる。
2862 = "Để lại phía sau giọng nói đầy hạnh phúc, tôi đun nước. Tiếng bút chì sột soạt hòa quyện cùng tiếng bếp lò."

# 【双鉄】
# display as 雙鐵
# JP: 「茶菓子はあるのか？」
2334 = "「Có bánh kẹo ăn kèm không?」"

# 【日々姫】
# display as 日日姬
# JP: 「ん……おせんべば……カンカンの中……」
2055 = "「Ưm...... bánh gạo...... trong hộp thiếc......」"

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2392 = "「Anh biết rồi.」"

# monologue
# JP: もう受け答えは上の空だ。\nならばと鉛筆の音が止むのを待って、居間へと戻る。
2762 = "Em ấy trả lời một cách lơ đãng. Biết vậy nên tôi đợi tiếng bút chì dừng lại rồi mới quay lại phòng khách."

# 【双鉄】
# display as 雙鐵
# JP: 「本当に良く頑張るな、日々姫は」
2287 = "「Hibiki thực sự rất cố gắng nhỉ.」"

# 【日々姫】
