[script]
# lines: 452 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2616 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch——）"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1539 = "「A——」"

# monologue
# JP: レールが刻む列車の音に、安堵を覚える。\n戻ってこれたという感覚。
2146 = "Tiếng tàu hỏa chạy trên đường ray khiến\ntôi cảm thấy nhẹ nhõm.\nCảm giác như đã trở về."

# monologue
# JP: そして同時に、罪悪感。\n路子の背中が、あまりにちいさく、か弱く見えて。
2483 = "Và đồng thời, là cảm giác tội lỗi.\nBóng lưng của Michiko trông quá đỗi nhỏ bé\nvà yếu ớt."

# 【路子】
# display as 路子
# JP: 「そーちゃん？」
1612 = "「Sou-chan?」"

# monologue
# JP: 気づいたときには、向かい合わせに座っている。\nそうしたという感覚も無く。
2437 = "Khi nhận ra, tôi đã ngồi đối diện con bé.\nMà chẳng hề có cảm giác mình đã làm vậy."

# monologue
# JP: 路子は、僕をじっと見ている。\nあどけない目で、じいっと見ている。
2549 = "Michiko đang nhìn chằm chằm vào tôi.\nBằng đôi mắt ngây thơ, con bé cứ nhìn chằm\nchằm."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、路子。なにかあったか？」
1638 = "「Sao vậy, Michiko. Có chuyện gì à?」"

# 【路子】
# display as 路子
# JP: 「みち、ね？　見たの。\nれっ車の中から、みちにも見えたの」
1610 = "「Michi, anh biết không? Đã thấy đó.\nTừ trong tàu, Michi cũng nhìn thấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「見えた……何がだ？」
1787 = "「Nhìn thấy……Cái gì cơ?」"

# 【路子】
# display as 路子
# JP: 「きれいなポスター。『みらいいき列車』」
1761 = "「Tấm áp phích đẹp lắm. 'Chuyến tàu hướng\ntới tương lai'.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
# 1539 = "「啊——」" 

# monologue
# JP: 言葉が、喉に詰まってしまう。\nあのポスターは、『みんな』をうつしたポスターだから。
2509 = "Lời nói nghẹn lại nơi cổ họng.\nBởi vì tấm áp phích đó, là tấm áp phích có\nhình ảnh của 'mọi người'."

# monologue
# JP: みんなで作った輪の中に、\n路子の姿を――僕は、交えてやれなかったから。
2223 = "Trong vòng tròn mà mọi người cùng nhau tạo\nnên,\ntôi đã không thể――đưa hình bóng của\nMichiko vào."

# 【路子】
# display as 路子
# JP: 「そーちゃんは、さ。\nあのれっ車」
1611 = "「Sou-chan, này.\nChuyến tàu đó ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん？」
1571 = "「Ừ?」"

# monologue
# JP: だけれど、無理やり声を出す。\n沈黙も動揺も、路子をきっと、怯えさせる。
2112 = "Nhưng tôi vẫn cố gắng cất tiếng.\nSự im lặng hay bối rối của tôi, chắc chắn\nsẽ khiến Michiko sợ hãi."

# monologue
# JP: あのとき、離れてしまったとはいえ――\n僕らはやっぱり、いまでも、ふたごなのだから。
2589 = "Dù lúc đó đã phải chia lìa――\nNhưng chúng tôi, ngay cả bây giờ, vẫn là\nanh em sinh đôi mà."

# 【路子】
# display as 路子
# JP: 「まだ無い列車。みらいいき列車。\nあのおにんぎょうと、はしらせたいんだよね？」
1872 = "「Chuyến tàu vẫn chưa xuất hiện. Chuyến tàu\nhướng tới tương lai.\nAnh muốn chạy nó cùng với con búp bê đó\nđúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロク、だ。お人形ではなくて。\n名を持つ、ひとりの――あれは、意思を持つものだ」
1159 = "「……Là Hachiroku. Không phải búp bê.\nCô ấy có tên, là một cá thể――có ý chí\nriêng.」"

# 【路子】
# display as 路子
# JP: 「ハチロク？　ハチロク」
1481 = "「Hachiroku? Hachiroku.」"

# monologue
# JP: 噛みしめるように。自分を納得させるかのように。\n路子はゆっくり、ハチロクの名を繰り返す。
2545 = "Như đang nghiền ngẫm. Như đang cố thuyết\nphục bản thân.\nMichiko chậm rãi lặp lại cái tên\nHachiroku."

# 【路子】
# display as 路子
# JP: 「ハチロク――ちゃん。\nそーちゃん、あのこと、なかよしだよね？」
1480 = "「Chị Hachiroku.\nSou-chan, anh và chị ấy, thân thiết lắm\nđúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「……仲良しというようなベタついた感じでも無いが――\n確かに――うむ。言われてみれば、仲良くはある」
1194 = "「……Cũng không hẳn là dính lấy nhau như\nkiểu thân thiết lắm, nhưng――\nĐúng là――ừm. Nói mới để ý, cũng coi là\nthân thiết.」"

# monologue
# JP: “家族で相棒”。\n遠慮をしていたハチロクに、かけた言葉を思い出す。
1033 = "\"Là gia đình, là đối tác\".\nTôi nhớ lại lời mình đã nói với Hachiroku\nkhi cô ấy còn e dè."

# monologue
# JP: 考えなしに言ったことだが――\nいや、考えなしなら、それは僕の、本心に近いものだろう。
2587 = "Dù lúc đó nói ra mà không suy nghĩ――\nKhông, nếu không suy nghĩ, thì đó hẳn là\nnhững lời gần với tiếng lòng của tôi nhất."

# 【双鉄】
# display as 雙鐵
# JP: 「……あれに対しては、ナビに対するときと同じく、\n何を身構えなくてすむ。そういう意味で、気楽な相手だ」
1185 = "「……Đối với cô ấy, cũng giống như với Navi,\ntôi không cần phải đề phòng gì cả. Theo\nnghĩa đó, cô ấy là một người khiến tôi\nthoải mái.」"

# 【路子】
# display as 路子
# JP: 「そーなんだ」
1742 = "「Ra là vậy.」"

# monologue
# JP: 小さな頷き。\nそうして路子は、まっすぐ僕を見つめてくる。
2556 = "Một cái gật đầu nhẹ.\nRồi Michiko nhìn thẳng vào tôi."

# 【路子】
# display as 路子
# JP: 「わかる。そーちゃん、あのおにんぎょう――\nハチロクちゃんと、楽しそうにおはなししてるから」
1673 = "「Michi hiểu mà. Vì Sou-chan, nói chuyện\nvới con búp bê đó――\nchị Hachiroku, trông rất vui vẻ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
1747 = "「Vậy sao?」"

# 【路子】
# display as 路子
# JP: 「うん！　それからね、ひびきちゃんとも、\nきんぱつのおねーさんとおちびちゃんとも」
1749 = "「Vâng! Hơn nữa nhé, với chị Hibiki,\nvới chị tóc vàng và cả cô bé nhỏ nhắn\nnữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとれいなだな」
1738 = "「Là Paulette và Reina nhỉ.」"

# 【路子】
# display as 路子
# JP: 「ぽーれっとちゃんとれいなちゃんとも――そーちゃん、\nだんだん楽しそうにはなすようになってるよ！」
1835 = "「Với chị Paulette và Reina cũng\nvậy――Sou-chan,\nanh đang dần nói chuyện vui vẻ hơn rồi\nđấy!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1734 = "「Vậy sao.」"

# monologue
# JP: れいなの名が出て、真闇姉の名が出なかった。\nだから、容易に推測できる。
2584 = "Tên của Reina được nhắc đến, nhưng tên chị\nMayami thì không.\nVì thế, tôi có thể dễ dàng suy đoán."

# monologue
# JP: 路子が見ている僕はおそらく、駅での僕だ。\n車窓から見える景色だけが、路子に見える全てであるのだ。
2553 = "Hình ảnh tôi mà Michiko nhìn thấy có lẽ là\ntôi ở nhà ga.\nNhững cảnh vật nhìn từ cửa sổ tàu là tất\ncả những gì con bé có thể thấy."

# 【双鉄】
# display as 雙鐵
# JP: 「……ならば、僕は。仕事を楽しめているのだな」
1867 = "「……Nếu vậy, tôi. Chắc hẳn đang rất tận\nhưởng công việc.」"

# monologue
# JP: であるのならば、幸いだ。\n路子の瞳に映る姿が、路子を少しでも喜ばせるなら。
2249 = "Nếu được vậy thì tốt quá.\nNếu hình ảnh phản chiếu trong đôi mắt\nMichiko có thể khiến con bé vui vẻ dù chỉ\nmột chút."

# monologue
# JP: 路子が繰り返し繰り返す、\nいまだ終わらせられない旅の、慰めとなるのなら。
2244 = "Nếu điều đó có thể trở thành niềm an ủi,\ncho chuyến đi lặp đi lặp lại mãi chưa kết\nthúc của Michiko."

# 【路子】
# display as 路子
# JP: 「きっとそうだよ！\nだっていまも！　そーちゃん、なんだか楽しそう！」
1405 = "「Chắc chắn là vậy rồi!\nBởi vì ngay cả bây giờ! Trông Sou-chan\ncũng rất vui vẻ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1098 = "「――Ừ.」"

# monologue
# JP: 路子は、笑ってくれている。\n『楽しそうにしている』僕を、素直に喜んでくれている。
2543 = "Michiko đang mỉm cười với tôi.\nCon bé hồn nhiên vui mừng khi thấy tôi\n\"trông có vẻ vui vẻ\"."

# monologue
# JP: それが、嬉しい。\n――路子がいまも、変わらず路子でいてくれることが。
2574 = "Điều đó khiến tôi thấy vui.\n――Vì Michiko bây giờ, vẫn luôn là Michiko\nkhông hề thay đổi."

# 【路子】
# display as 路子
# JP: 「だから、きっとそーちゃんは」
1689 = "「Thế nên, chắc chắn Sou-chan sẽ」"

# monologue
# JP: けれどもふっと、路子が下を向いてしまう。
2116 = "Thế nhưng đột nhiên, Michiko cúi gằm mặt\nxuống."

# 【路子】
# display as 路子
# JP: 「……そーちゃんは、みらいいき列車がはしったら、\nきっと、みんなとのるんだよね？」
1804 = "「……Sou-chan, khi chuyến tàu hướng tới\ntương lai khởi hành,\nchắc chắn anh sẽ đi cùng mọi người đúng\nkhông?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。恐らく乗務にあたるだろうし、\nみなも、乗車をしてくれるだろう」
1729 = "「Ừ. Có lẽ anh sẽ đảm nhận công việc trên\ntàu,\nvà mọi người cũng sẽ lên tàu đi cùng.」"

# 【路子】
# display as 路子
# JP: 「そうしたら、みち」
1862 = "「Nếu vậy, Michi」"

# monologue
# JP: 路子が足をぶらぶらさせる。\nぶらぶら、ぶらぶら。
2547 = "Michiko đung đưa chân.\nĐung đưa, đung đưa."

# monologue
# JP: かなり激しく。\n靴をいっそ、脱ぎ落としてでもしまいたいかのように。
2230 = "Khá là mạnh.\nNhư thể muốn văng cả giày ra ngoài vậy."

# 【路子】
# display as 路子
# JP: 「そしたら、みち……そーちゃんにおいてかれちゃう。\nひとりぼっちに、またなっちゃうねぇ」
1492 = "「Khi đó, Michi……sẽ bị Sou-chan bỏ lại mất.\nLại trở nên cô đơn một mình rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことはない！」
1419 = "「Không có chuyện đó đâu!」"

# 【路子】
# display as 路子
# JP: 「ひゃっ！？」
1527 = "「Hya!?」"

# monologue
# JP: ――あの事故のあと、二年かかった。\n路子の夢を、見ることができるようになるまで。
1015 = "――Sau tai nạn đó, phải mất hai năm.\nTôi mới có thể nhìn thấy Michiko trong\ngiấc mơ."

# monologue
# JP: 右田の家に引き取られ――\n罪悪感を抱えたままに、それでも、確かな落ち着きを得て。
2344 = "Được nhà Migita nhận nuôi――\nMang trong mình cảm giác tội lỗi, nhưng\ndẫu vậy, tôi đã tìm được sự bình yên thực\nsự."

# 【双鉄】
# display as 雙鐵
# JP: 「――あんな思いは、二度とさせない」
1095 = "「――Anh sẽ không bao giờ để em phải trải\nqua cảm giác đó nữa.」"

# monologue
# JP: そうしてやっと夢で再会できたとき、\n路子は一人、泣いていた。
2473 = "Và rồi khi cuối cùng cũng gặp lại nhau\ntrong mơ,\nMichiko đang khóc một mình."

# monologue
# JP: 元気なころの姿のままで、事故にあう前の路子のままで。\nだけれど一人、泣いていた。
2559 = "Vẫn giữ nguyên dáng vẻ khỏe mạnh, vẫn là\nMichiko trước khi gặp tai nạn.\nThế nhưng con bé lại khóc một mình."

# 【双鉄】
# display as 雙鐵
# JP: 「約束する。\n路子を決して、置き去りにしたりはしない」
1661 = "「Anh hứa.\nSẽ tuyệt đối không bao giờ bỏ rơi\nMichiko.」"

# monologue
# JP: だから、言葉が止まらなくなる。\nだから思いが止まらなくなる。
2366 = "Thế nên, những lời nói không ngừng tuôn\nra.\nThế nên, những suy nghĩ không ngừng cuộn\ntrào."

# monologue
# JP: もう決して、路子と共に大人になることはできないが――\nそうであっても、僕は路子を、ひとりにしない。
2588 = "Dù không bao giờ có thể cùng Michiko\ntrưởng thành được nữa――\nNhưng dẫu vậy, tôi cũng sẽ không để\nMichiko phải cô đơn."

# 【路子】
# display as 路子
# JP: 「どうやって？　そーちゃん、だって――この列車に、\nそーちゃんがずっとのってちゃ、ダメなんだよ？」
1456 = "「Bằng cách nào? Sou-chan, vì――trên chuyến\ntàu này,\nSou-chan không thể đi mãi được đâu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
1091 = "「――Ừ.」"

# monologue
# JP: ああ、本当に路子は同じだ。
2193 = "A, Michiko thực sự vẫn vậy."

# monologue
# JP: あの日あの時と変わらずに、\n今でも僕を少しでも、死から遠ざけようとしてくれる。
2235 = "Không hề thay đổi so với ngày đó, khoảnh\nkhắc đó,\nNgay cả bây giờ con bé vẫn cố gắng đẩy tôi\nra xa cái chết dù chỉ một chút."

# 【双鉄】
# display as 雙鐵
# JP: 「……それなら路子も。\nこの列車に、ずっと乗ってちゃだめなんだ」
1193 = "「……Nếu vậy thì Michiko cũng thế.\nEm không thể cứ đi mãi trên chuyến tàu này\nđược.」"

# monologue
# JP: 答えが見える。
2338 = "Tôi đã nhìn thấy câu trả lời."

# monologue
# JP: “終着駅に”――抱え続けていた思いと今とが、\nカチャン、と音を立て連結される。
2582 = "\"Tới ga cuối\"――Tâm tư tôi luôn mang theo\nvà hiện tại,\nKeng một tiếng, đã kết nối lại với nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「僕が必ず送り届ける。\n路子のことを、父さんと母さんが待ってる場所に」
1651 = "「Anh nhất định sẽ đưa em đến.\nĐến nơi mà bố và mẹ đang đợi Michiko.」"

# 【路子】
# display as 路子
# JP: 「パパとママ！　まっててくれるの？\nみちのこと」
1775 = "「Bố và mẹ! Đang đợi Michi sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――絶対に、待っていてくれる」
1556 = "「Ừ――Chắc chắn, họ đang đợi em.」"

# 【路子】
# display as 路子
# JP: 「――そーだったんだぁ」
1102 = "「――Thì ra là vậy.」"

# monologue
# JP: 路子が笑う。\n安心しきった――懐かしい、あまえっこの路子の顔で。
2554 = "Michiko mỉm cười.\nVô cùng an tâm――Với khuôn mặt hay làm nũng\nđầy hoài niệm của Michiko."

# monologue
# JP: 路子の笑顔が、定めてくれる。\n終着駅を――ずっと探してたその場所を。
2550 = "Nụ cười của Michiko đã quyết định giúp\ntôi.\nGa cuối――Nơi mà tôi vẫn luôn tìm kiếm."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――\nだから、列車を走らせたいんだ」
1687 = "「Anh――\nVì vậy, anh muốn chuyến tàu lăn bánh.」"

# 【路子】
# display as 路子
# JP: 「そっかー。そうだったんだねー。\nみらいいき列車は、みちをおいてく列車じゃなくて」
1733 = "「Ra vậy. Thì ra là thế.\nChuyến tàu hướng tới tương lai không phải\nlà chuyến tàu bỏ lại Michi, mà là...」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1563 = "「Ừ.」"

# monologue
# JP: 安心してしまったせいなのか、世界が揺らめく。\n――ああ、目覚めるな――
2169 = "Có lẽ vì đã an tâm nên thế giới bắt đầu\nrung rinh.\n――A, sắp tỉnh dậy rồi――"

# monologue
# JP: 自覚するから、\n少し早口に言葉をつむぐ。
2207 = "Vì nhận thức được điều đó,\ntôi nói nhanh hơn một chút."

# 【双鉄】
# display as 雙鐵
# JP: 「路子の未来を――\n僕らの未来を、つなげる列車だ」
1871 = "「Là chuyến tàu kết nối――\nTương lai của Michiko và tương lai của\nchúng ta.」"

# 【日々姫】
# display as 日日姬
# JP: 「おみやげとかはいらんけん、\n早く、元気に帰ってきてね！！」
1451 = "「Không cần quà cáp gì đâu,\nanh mau chóng khỏe mạnh trở về nhé!!」"

# monologue
# JP: 言ってすぐ、日々姫は『しまった！』という顔になり、\n自分の口を手で覆う。
2393 = "Vừa nói xong, khuôn mặt Hibiki lộ vẻ \"Tiêu\nrồi!\",\nvà vội lấy tay che miệng lại."

# 【日々姫】
# display as 日日姬
# JP: 「もちろんにぃにがのんびりしたいだけのんびりしてきて。\nその……つもる話とかもあるだろうし――あうっ！？」
1782 = "「Tất nhiên là anh hai cứ thong thả bao lâu\ntùy thích.\nÀ thì... chắc cũng có nhiều chuyện muốn\nnói mà――Auu!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1731 = "「Đúng vậy.」"

# monologue
# JP: しまったという顔を再度され、\n少しあわてて、日々姫の言葉を言葉で断ち切る。
2394 = "Thấy em ấy lại lộ vẻ \"Tiêu rồi\",\ntôi hơi bối rối, bèn dùng lời nói cắt\nngang lời Hibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「確かに話したいことはたくさんだ。\nとはいえ、そう長居をするつもりもない」
1796 = "「Quả thật có rất nhiều chuyện muốn nói.\nTuy nhiên, anh cũng không định nán lại\nlâu.」"

# monologue
# JP: 日々姫をひどく、やきもきさせてしまっている。
2442 = "Tôi đã khiến Hibiki vô cùng lo lắng bồn\nchồn."

# monologue
# JP: 気の毒でもあるし、嬉しくもある。\nだから、少しでもこころ穏やかにしてやりたい。
2586 = "Vừa thấy tội nghiệp, lại vừa thấy vui.\nThế nên, tôi muốn làm em ấy an tâm dù chỉ\nmột chút."

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜で、[うち]家でやりたいことが山のようにある。\nできるだけ早く、無論、元気に帰ってくるさ」
1684 = "「Ở Ohito, ở nhà còn chất đống chuyện anh\nmuốn làm.\nAnh sẽ cố gắng về sớm nhất có thể, tất\nnhiên là sẽ khỏe mạnh trở về rồi.」"

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
1564 = "「Vâng!」"

# 【ハチロク】
# display as 八六
# JP: 「……[あのこ,3]8620を放っておけないことも確かなのですが――\n本当に、お供さしあげなくて大丈夫でしょうか？」
1195 = "「……Mặc dù không thể bỏ mặc 8620 cũng là sự\nthật, nhưng――\nThực sự không cần em đi cùng ngài sao ạ?」"

# monologue
# JP: 日々姫が安心してくれた、と、思うやいなやのハチロクだ。\nやはり、冴えない顔をしている。
2152 = "Vừa nghĩ Hibiki đã an tâm rồi, thì đến\nlượt Hachiroku.\nQuả nhiên, khuôn mặt cô ấy trông không\nđược vui vẻ cho lắm."

# monologue
# JP: 同行したい――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の責任感があるのだろうか？\nこれはまさしく文字通り、“私的”な旅であるというのに。
2233 = "Muốn đi cùng――Liệu có phải vì tinh thần\ntrách nhiệm của một \\x%lレイルロオド;#00ffc040;Railord%l;#; không?\nTrong khi đây đúng nghĩa đen là một chuyến\nđi \"cá nhân\"."

# 【双鉄】
# display as 雙鐵
# JP: 「お前の気持ちは嬉しいが、[ハチロク,3]8620のことが無くとも――\n今回だけは、僕は、一人旅をしたいのだ」
1881 = "「Tôi rất vui vì tấm lòng của cô, nhưng dù\nkhông có chuyện của 8620――\nChỉ lần này thôi, tôi muốn đi một mình.」"

# monologue
# JP: 瞬間、ふっと影が落ちる。\nハチロクの顔にではなく、地面の上に。
2456 = "Trong khoảnh khắc, một bóng đen vụt đổ\nxuống.\nKhông phải trên khuôn mặt Hachiroku, mà là\ntrên mặt đất."

# monologue
# JP: そうであったと、苦笑が浮かぶ。
2352 = "Nhớ ra điều đó, tôi nở nụ cười khổ."

# 【双鉄】
# display as 雙鐵
# JP: 「訂正だ。一人旅ではないな。\nナビと、僕との二人旅を」
1681 = "「Đính chính lại. Không phải đi một mình.\nMà là chuyến đi của hai người, Navi và\ntôi.」"

# 【ハチロク】
# display as 八六
# JP: 「左様でございますか」
1743 = "「Vậy sao ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なにせ、父さんと母さんに会うのも久しぶりだ」
1575 = "「Dù sao thì, cũng đã lâu lắm rồi tôi mới\ngặp lại bố mẹ.」"

# monologue
# JP: ……思い立ったが吉日、と、\n昔の人は、まこと、良い言葉を残してくれた。
1064 = "……Nghĩ là làm ngay,\nNgười xưa quả thật đã để lại một câu nói\nrất hay."

# monologue
# JP: 御一夜に帰ってきて初めての休暇の申し出を\n右田家も、御一夜鉄道も、即座に快諾してくれた。
2575 = "Lời đề nghị xin nghỉ phép đầu tiên kể từ\nkhi trở về Ohito\nđã được nhà Migita và Đường sắt Ohito\nnhanh chóng chấp thuận."

# 【双鉄】
# display as 雙鐵
# JP: 「……いろいろな意味で、いっぱいいっぱいになりそうだ。\nゆえ――」
1177 = "「……Theo nhiều nghĩa, chắc tôi sẽ phải lo\nliệu rất nhiều thứ.\nVì vậy――」"

# 【ハチロク】
# display as 八六
# JP: 「わたくし、\n大変に気の利かないことを申してしまいました」
1785 = "「Tôi,\nđã nói ra một điều thật vô ý.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1571 = "「嗯？」" 

# monologue
# JP: 不満げだったハチロクが、スッ――と静かな一礼をする。\nとても穏やかな顔をして、いたわるような声を出す。
2151 = "Hachiroku, người mới nãy còn vẻ bất mãn,\nbỗng nhẹ nhàng――cúi chào tĩnh lặng.\nVới khuôn mặt vô cùng điềm đạm, cô ấy cất\ngiọng đầy quan tâm."

# 【ハチロク】
# display as 八六
# JP: 「どうぞごゆっくりお過ごしください。\n幸せな――親子水入らずのお時間を」
1826 = "「Xin ngài cứ thong thả nghỉ ngơi.\nCùng tận hưởng khoảng thời gian hạnh\nphúc――riêng tư của gia đình ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1563 = "「嗯」" 

# monologue
# JP: そう言われると、照れくさい。\n同時になにやら、申し訳無さも感じてしまう。
2237 = "Nghe vậy, tôi thấy hơi ngại.\nĐồng thời cũng cảm thấy có chút áy náy."

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ今回は、そういうわけだが、\nもしいずれ、機会があったら――」
1852 = "「À thì lần này là vậy,\nnhưng nếu sau này có cơ hội――」"

# monologue
# JP: いや、おかしいか。\n生家の墓参に、今の家族を紹介するというのも。
2084 = "Không, nghe kỳ cục nhỉ.\nĐi viếng mộ gia đình ruột thịt mà lại giới\nthiệu gia đình hiện tại."

# 【ハチロク】
# display as 八六
# JP: 「はい。必ず。\nそのときには、わたくしにもご挨拶をさせてください」
1589 = "「Vâng. Nhất định ạ.\nKhi đó, xin hãy cho phép tôi được gửi lời\nchào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1534 = "「!」"

# 【日々姫】
# display as 日日姬
# JP: 「わたし！　わたしも！！\nもしも、にぃにが、イヤじゃなければだけど」
1859 = "「Em! Cả em nữa!!\nNếu anh hai không phiền.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……イヤなものか」
1163 = "「……Phiền gì chứ.」"

# monologue
# JP: 自ら蓋してしまった言葉を、\nハチロクが、日々姫が、導いてくれた。
2342 = "Những lời định giấu nhẹm đi,\nlại được Hachiroku và Hibiki khơi gợi ra."

# monologue
# JP: とてもうれしく、ありがたい。
2313 = "Tôi rất vui và biết ơn."

# 【双鉄】
# display as 雙鐵
# JP: 「そのときには会って欲しい。紹介させて欲しい。\n僕の家族に――僕の家族を」
1493 = "「Khi đó anh muốn hai người đến gặp họ. Hãy\nđể anh giới thiệu.\nVới gia đình anh――gia đình của anh.」"

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1564 = "「嗯！」" 

# 【ハチロク】
# display as 八六
# JP: 「この上なく、光栄なことと存じます」
1752 = "「Thật là một niềm vinh hạnh không gì sánh\nbằng ạ.」"

# 【真闇】
# display as 真闇
# JP: 「ほんなら、そんときに双ちゃんのお父さんとお母さんを、\n驚かせてしまわんよーに」
1863 = "「Vậy thì, để lúc đó không làm bố mẹ\nSou-chan bất ngờ nha.」"

# monologue
# JP: ぽんっと軽く、背中を押される。\n真闇姉の優しい腕と、言葉とに。
2448 = "Lưng tôi được vỗ nhẹ một cái.\nBởi cánh tay dịu dàng và những lời nói của\nchị Mayami."

# 【真闇】
# display as 真闇
# JP: 「ゆっくり、しっかり。\nいろんな話ば、できたらよかとね？」
1686 = "「Cứ từ từ, thong thả.\nKể cho hai bác nghe thật nhiều chuyện,\nđược chứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん――」
1554 = "「Vâng――」"

# monologue
# JP: だから、迷わず出かけられる。
2219 = "Nhờ vậy, tôi có thể cất bước mà không chút\ndo dự."

# monologue
# JP: ナビならば、上空を何度も旋回し、\n僕をずうっと、待っていてくれる。
2633 = "Navi vẫn đang lượn vòng trên không trung\nhết lần này đến lần khác,\nkiên nhẫn chờ đợi tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう――いってくる」
1828 = "「Cảm ơn mọi người――Tôi đi đây.」"

# 【真闇】
# display as 真闇
# JP: 「はぁい、いってらっしゃい」
1588 = "「Ừm, đi đường cẩn thận nha.」"

# 【日々姫】
# display as 日日姬
# JP: 「いってらっしゃい、にぃに！　気をつけて！」
1406 = "「Đi đường cẩn thận nha, anh hai! Nhớ chú ý\nan toàn!」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。どうぞ――\nご安全に、素敵な旅を」
1885 = "「Ngài Soutetsu. Chúc ngài――\nThượng lộ bình an, có một chuyến đi tuyệt\nvời.」"

# monologue
# JP: （ザリっ）
2622 = "（Lạo xạo）"

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅ」
1529 = "「Phù.」"

# monologue
# JP: ……随分と田舎だったのだなと、ぼんやり思う。\n帝都から、ほんの一時間ほどの場所だというのに。
1061 = "……Tôi thầm nghĩ, nơi này quả thực rất hẻo\nlánh.\nMặc dù chỉ cách Đế đô khoảng một giờ đồng\nhồ."

# monologue
# JP: 御一夜を離れてからの六年半。\nその一時間を、僕は、どうしても使えなかった。
2213 = "Sáu năm rưỡi kể từ khi rời khỏi Ohito.\nTôi đã không thể nào dành ra được một giờ\nđồng hồ đó."

# 【双鉄】
# display as 雙鐵
# JP: 「――ひさしぶりです。父さん、母さん」
1092 = "「――Đã lâu không gặp. Bố, mẹ.」"

# monologue
# JP: 平凡な、けれど初めて目にする墓石。\n父さんと、母さんと――路子との墓。
2572 = "Tấm bia mộ bình dị, nhưng đây là lần đầu\ntiên tôi nhìn thấy.\nMộ của bố, mẹ và――Michiko."

# monologue
# JP: 僕の生家の、[そごう,1]十川家の墓。\n父さんと、母さんと、路子と――三人だけの、眠る墓。
2413 = "Mộ của gia đình Sogou, gia đình ruột thịt\ncủa tôi.\nMộ của bố, mẹ, và Michiko――Nơi an nghỉ của\nchỉ ba người."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや……路子はここにはいないんだよな」
1546 = "「A, không……Michiko không có ở đây nhỉ.」"

# monologue
# JP: 言った途端に、そうかと気づく。\n父さんと母さんだって、心配してるに決まってる。
2511 = "Vừa dứt lời, tôi chợt nhận ra.\nChắc chắn bố và mẹ cũng đang lo lắng."

# monologue
# JP: 路子と列車で出会ってすぐに、\nそのことを、真っ先に報告に来るべきであったと――
2519 = "Ngay sau khi gặp Michiko trên chuyến tàu,\nlẽ ra tôi nên đến báo tin này đầu tiên mới\nphải――"

# 【双鉄】
# display as 雙鐵
# JP: 「ごめん。\n会いに来るのが、こんなに遅くなってしまって」
1604 = "「Con xin lỗi.\nĐã đến thăm hai người muộn thế này.」"

# monologue
# JP: その一言が出ると自然に、頭が下がる。ゆえ、気づく。\n気づかなかった自分がひどく、恥ずかしくなる。
2510 = "Vừa nói xong, tôi bất giác cúi đầu. Nhờ\nđó, tôi nhận ra.\nTôi cảm thấy vô cùng xấu hổ vì sự vô tâm\ncủa chính mình."

# monologue
# JP: ――雑草だ。\nまずは、これを……お墓を、綺麗に掃除しよう。
1013 = "――Cỏ dại.\nTrước tiên phải dọn dẹp... làm sạch mộ đã."

# 【双鉄】
# display as 雙鐵
# JP: 「…………こんなものかな」
1161 = "「…………Chắc thế này là được rồi nhỉ.」"

# monologue
# JP: 商売上手というよりも、\n恐らくは、それも見込んでの出店なのだろう。
2482 = "Thay vì nói là giỏi kinh doanh,\ncó lẽ họ mở cửa hàng ở đây cũng là để nhắm\ntới lượng khách này."

# monologue
# JP: 霊園近くのコンビニエンスストアには、\n線香もライターも、菓子も生花も売っていた。
2320 = "Ở cửa hàng tiện lợi gần nghĩa trang,\ncó bán cả nhang, bật lửa, bánh kẹo và hoa\ntươi."

# 【双鉄】
# display as 雙鐵
# JP: 「気が利かなくて、ごめん」
1676 = "「Xin lỗi vì con đã không chu đáo.」"

# monologue
# JP: 綺麗になったお墓にたっぷり、\nひしゃくの水を、何度も注ぐ。
2334 = "Tôi múc nước bằng gáo,\ntưới nhiều lần lên ngôi mộ đã được dọn\nsạch."

# monologue
# JP: 小さなころの僕と路子が面白がって、\nひしゃくの取り合いをしていたことを、ふと思い出す。
2291 = "Tôi chợt nhớ lại hồi nhỏ, tôi và Michiko\nhay tranh nhau cái gáo\nvì thấy nó rất thú vị."

# 【双鉄】
# display as 雙鐵
# JP: 「父さんの実家の――[しこく,1]四國のお墓にも、ずっといけてない。\n本当にごめん。なにもかも、[おろそ]疎かにしてしまって」
1652 = "「Ngôi mộ ở quê nội――ở Shikoku, con cũng\nchưa từng đến viếng.\nThật sự xin lỗi. Mọi thứ, con đều đã bỏ\nbê.」"

# monologue
# JP: ……とはいえ同時に、仕方なかったとも思う。\nただ生きること――死なないことで、精一杯であったから。
1079 = "……Nhưng đồng thời, tôi cũng nghĩ đó là\nchuyện bất khả kháng.\nBởi vì tôi đã phải dốc toàn lực chỉ để\nsống――để không phải chết."

# monologue
# JP: 路子のつないでくれた命を、無駄には出来ない。\nその一念で生きていただけの日々が余りに、長かったから。
2304 = "Không thể để mạng sống mà Michiko đã cứu\nlấy trở nên vô ích.\nNhững ngày tháng chỉ sống bằng niềm tin đó\nđã quá dài."

# 【双鉄】
# display as 雙鐵
# JP: 「いや――それでも、もっと早くに来れた。\nもっと早くに、報告に、お願いに来なきゃいけなかった」
1408 = "「Không――Dù vậy, con đáng lẽ phải đến sớm\nhơn.\nĐáng lẽ con phải đến báo cáo, đến thỉnh\ncầu sớm hơn.」"

# monologue
# JP: 情けないなと、つくづく思う。\nけれどだからこそ、きちんと報告せねばならない。
2347 = "Tôi thực sự cảm thấy mình quá thảm hại.\nNhưng chính vì vậy, tôi phải báo cáo một\ncách đàng hoàng."

# 【双鉄】
# display as 雙鐵
# JP: 「……路子は、まだ列車に乗ってるんだ。\n事故が起きる前の列車に――あのまま、ずうっと」
1189 = "「……Michiko vẫn đang ở trên tàu.\nTrên chuyến tàu trước khi xảy ra tai\nnạn――Cứ như vậy, mãi mãi.」"

# monologue
# JP: 日陰が出来る。\nまた日向になる。
2076 = "Bóng râm phủ xuống.\nRồi lại ngập tràn ánh nắng."

# monologue
# JP: 顔をあげれば、\nナビはゆっくりゆっくりと、僕の頭上を旋回している。
2325 = "Ngẩng mặt lên,\ntôi thấy Navi đang chầm chậm lượn vòng\ntrên đỉnh đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「――きっと、迷っているんだと思う。\n僕が再会できたとき、路子は……喜んで、大泣きをした」
1097 = "「――Chắc hẳn con bé đang rất lạc lõng.\nKhi con gặp lại con bé, Michiko……đã khóc\nnức nở vì vui mừng.」"

# monologue
# JP: 単なる夢だと思っていた。\nいいや、今でも――僕の夢、無意識の働きと思っている。
2328 = "Tôi từng nghĩ đó chỉ là một giấc mơ.\nKhông, ngay cả bây giờ――tôi vẫn cho rằng\nđó là giấc mơ, là sự hoạt động của vô\nthức."

# monologue
# JP: 僕が見ている路子はきっと、僕の投影――\n幽霊だの、亡霊だのでは、恐らくない、と。
2336 = "Michiko mà tôi nhìn thấy chắc chắn là hình\nbóng của chính tôi――\nCó lẽ không phải là hồn ma hay vong linh\ngì cả."

# 【双鉄】
# display as 雙鐵
# JP: 「それからときどき夢で会うんだ。あの頃のままの路子に。\n路子は、僕を――断片的に、見てくれている」
1631 = "「Kể từ đó, thỉnh thoảng con lại gặp con bé\ntrong mơ. Vẫn là Michiko của ngày xưa.\nMichiko――đã dõi theo con từng chút một.」"

# monologue
# JP: けれども僕は、確かに知った。\nハチロクと、れいなと出会い、教えてもらえた。
2106 = "Nhưng tôi đã thực sự hiểu ra.\nKhi gặp Hachiroku và Reina, tôi đã được\nchỉ bảo."

# monologue
# JP: “たましい”としかいいようのない何ものかが、\nこの世には、確かに存在するのだということを。
2423 = "Một thứ gì đó chỉ có thể gọi là \"linh\nhồn\",\nthực sự tồn tại trên cõi đời này."

# 【双鉄】
# display as 雙鐵
# JP: 「路子は、会いたがっているんだ。父さんと母さんに。\nだから列車で――ずっと、待っているのかもしれない」
1777 = "「Michiko rất muốn gặp hai người. Bố và mẹ.\nVì vậy có lẽ con bé――vẫn luôn đợi trên\nchuyến tàu đó.」"

# monologue
# JP: たましいは、熱のようなものだと感じる。\nそれが体を離れたのなら、はかなく蒸散するのだろうと。
2323 = "Tôi cảm thấy linh hồn giống như một dạng\nnhiệt lượng.\nNếu nó rời khỏi cơ thể, có lẽ nó sẽ mong\nmanh bốc hơi mất."

# monologue
# JP: けれどももしも、それが僕に取りついてくれるのならば。\n僕とともに、路子の魂がいまもあるのだとするのなら――
2101 = "Nhưng giả sử, nếu nó bám vào tôi.\nNếu linh hồn của Michiko hiện tại vẫn đang\nở cùng tôi――"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、迎えにいってあげてほしいんだ。\nもし出来るなら、父さんと母さんに、路子を、迎えに」
1691 = "「Thế nên, con mong hai người hãy đến đón\ncon bé.\nNếu có thể, bố và mẹ, hãy đến đón\nMichiko.」"

# monologue
# JP: 例え0.1\%でも、路子の魂が今もなお、\nこの世にあって、迷ってしまっている恐れがあるなら――
2484 = "Dù chỉ là 0.1%, nếu linh hồn của Michiko\nvẫn còn tồn tại trên cõi đời này,\nvà có nguy cơ đang lạc lối――"

# monologue
# JP: 僕は路子を、必ず救い出さねばならない。\nいや、本当は――もっと早くに動き出さねばならなかった。
2306 = "Tôi nhất định phải cứu Michiko ra.\nKhông, đáng lẽ ra――tôi phải hành động sớm\nhơn."

# 【双鉄】
# display as 雙鐵
# JP: 「頼みにくるのが、こんなにも、\n遅くなってしまったのは――」
1884 = "「Con đến nhờ vả chuyện này,\nmuộn màng như thế là vì――」"

# monologue
# JP: （どくんっ）
2617 = "（Thịch）"

# monologue
# JP: 恐怖が、いきなり這い登ってくる。\n怖い、怖い、怖い、怖い。
2289 = "Nỗi sợ hãi bất chợt bò lên.\nSợ, sợ, sợ, sợ quá."

# monologue
# JP: “何故怖いのか”、それを考えるのさえ怖い。\nひゅっ、ひゅっ。浅くて早い呼吸が聞こえ、息苦しくなる。
2576 = "\"Tại sao lại sợ\", ngay cả việc nghĩ về\nđiều đó cũng thấy sợ.\nPhù, phù. Tôi nghe thấy tiếng thở nông và\nnhanh của mình, cảm thấy khó thở."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――今は――」
1649 = "「Con――Bây giờ――」"

# monologue
# JP: ズラす。思考を。\n無理やりズラして、息苦しくない場所を求める。
2308 = "Đánh trống lảng. Dòng suy nghĩ.\nCố gắng đánh trống lảng, tìm kiếm một nơi\nkhông bị ngột ngạt."

# monologue
# JP: ここまで来れるようになったと――自分で自分を評価する。\n今は、それだけで構わない。
2339 = "Tôi tự đánh giá bản thân――rằng mình đã có\nthể đi đến bước này.\nHiện tại, chỉ cần thế là đủ."

# 【双鉄】
# display as 雙鐵
# JP: 「……僕は、今は。\n鉄道に関係する仕事をしているんだ」
1165 = "「……Bây giờ, con.\nĐang làm công việc liên quan đến đường\nsắt.」"

# monologue
# JP: 言える、それは。\n無理なく、苦もなく。
2571 = "Tôi có thể nói điều đó.\nKhông hề khiên cưỡng, không hề đau khổ."

# monologue
# JP: 安堵したなら恐怖も薄れる、\n言葉がつぎつぎ、喉から出ていく。
2326 = "Nếu cảm thấy an tâm, nỗi sợ hãi cũng phai\nnhạt dần,\nnhững lời nói liên tiếp tuôn ra từ cổ\nhọng."

# 【双鉄】
# display as 雙鐵
# JP: 「あれほど憎み、恨みに思っていた鉄道を――\n不思議なことに、今、僕は仕事にしているんだ」
1440 = "「Ngành đường sắt mà con từng vô cùng căm\nghét, hận thù――\nThật kỳ lạ, bây giờ con lại đang làm việc\ncho nó.」"

# monologue
# JP: 御一夜のこと。\n御一夜鉄道のこと。
2319 = "Về Ohito.\nVề Đường sắt Ohito."

# monologue
# JP: ポーレットのこと、れいなのこと、ハチロクのこと。\n話せば、そこからつながっていく。
2421 = "Về Paulette, về Reina, về Hachiroku.\nCứ kể ra, rồi mọi chuyện sẽ kết nối với\nnhau."

# 【双鉄】
# display as 雙鐵
# JP: 「そうして僕は、家族として迎えてもらえているんだ。\n右田の家に――真闇姉と、日々姫とに」
1767 = "「Và con đã được đón nhận như một thành\nviên trong gia đình.\nTại nhà Migita――Cùng với chị Mayami và\nHibiki.」"

# monologue
# JP: ……父さんと母さんに、\n義父さん、義母さんのことはなかなか、報告しづらい。
1073 = "……Rất khó để báo cáo với bố mẹ,\nvề bố nuôi và mẹ nuôi."

# monologue
# JP: だからこれは、次のときでもいいかと思う。\n思った瞬間、可笑しくなる。ふわりほのかに、幸せになる。
2364 = "Thế nên tôi nghĩ để lần sau kể cũng được.\nKhoảnh khắc nghĩ vậy, tôi thấy thật buồn\ncười. Một niềm hạnh phúc nhẹ nhàng lan\ntỏa."

# 【双鉄】
# display as 雙鐵
# JP: 「だけどね――父さん、母さん。\n僕の両親は、やっぱり、父さんと母さんなんだ」
1443 = "「Nhưng mà――Bố, mẹ.\nBố mẹ của con, vẫn luôn là hai người.」"

# monologue
# JP: だって、こんなに甘えている。\n“できない自分”を、これほど素直に許せている。
2209 = "Bởi vì, tôi đang làm nũng thế này cơ mà.\nCó thể ngoan ngoãn tha thứ cho \"bản thân\nvô dụng\" đến nhường này."

# monologue
# JP: 感じた瞬間、こみ上げてくる。\n大きな大きな塊が、自分の底からこみ上げてくる。
2570 = "Khoảnh khắc cảm nhận được điều đó, một cảm\nxúc trào dâng.\nMột khối lớn vô cùng trào lên từ tận đáy\nlòng."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――僕は――頑張ってるんだ。\n頑張っていて、けれども全然、足りてないんだ」
1647 = "「Con――Con――đang rất cố gắng.\nCon đang cố gắng, nhưng vẫn hoàn toàn chưa\nđủ.」"

# monologue
# JP: 言ってしまえば、力が抜ける。\nどうしようもなく不安になる。
2512 = "Nói ra rồi, tôi như kiệt sức.\nMột cảm giác bất an tột độ ập đến."

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道を、復活させること。みんなはそれを望んでる。\n僕は、だから、それに応えようとしている」
1577 = "「Phục sinh đường sắt. Mọi người đều mong\nmuốn điều đó.\nVì vậy, con đang cố gắng đáp lại kỳ vọng\nấy.」"

# monologue
# JP: 僕は鉄路と、レールだと、言ってもらった。\nそれが自らのあり方なのだと、納得できた。
2228 = "Tôi đã được bảo rằng mình là tuyến đường\nsắt, là đường ray.\nTôi đã chấp nhận đó là cách tồn tại của\nbản thân."

# monologue
# JP: だから僕は、歪み得ない。だから僕は、ゆるみ得ない。\nみんなの前では、決して、決して――何があろうと。
2360 = "Vì thế, tôi không thể sai lệch. Vì thế,\ntôi không thể lỏng lẻo.\nTrước mặt mọi người, tuyệt đối, tuyệt\nđối――dù có chuyện gì xảy ra."

# 【双鉄】
# display as 雙鐵
# JP: 「……僕には、大きすぎる目標だ。\n僕の力では、及ぶはずもない目標なんだ」
1191 = "「……Đó là một mục tiêu quá lớn đối với con.\nMột mục tiêu mà sức con không thể nào với\ntới được.」"

# monologue
# JP: それでも、果たすまでやらねばならない。\nくじけること、膝をつくことは許されない。
2159 = "Dù vậy, tôi vẫn phải làm cho đến khi hoàn\nthành.\nKhông được phép nản lòng, không được phép\nquỳ gối."

# monologue
# JP: 汰斗さんが、そうすれば生き延びられると教えてくれた。\nそうすることが、僕の贖罪で、報恩なのだと。
2433 = "Ngài Taito đã dạy tôi rằng làm như vậy mới\ncó thể sống sót.\nRằng làm như vậy chính là sự chuộc tội, là\nsự đền đáp của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「無理だと言えない。出来ないとは言えない。\n――いや。そう思うことさえ、普段の僕には、叶わない」
1657 = "「Con không thể nói là vô lý. Không thể nói\nlà không làm được.\n――Không. Ngay cả việc nghĩ như vậy, đối\nvới con thường ngày, cũng là điều bất khả\nthi.」"

# monologue
# JP: 言ってしまえば、止まらなくなる。
2067 = "Một khi đã nói ra, sẽ không thể dừng lại\nđược."

# monologue
# JP: 言えば恐らく自分が崩れる――\nそうと理性が警告しても。
2068 = "Nếu nói ra, có lẽ bản thân tôi sẽ sụp đổ――\nDù lý trí có cảnh báo như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうだ。挫けぬように、思考さえ、\n僕は、ガチガチに縛っているんだ」
1558 = "「A――Đúng vậy. Để không bị khuất phục, ngay\ncả suy nghĩ,\ncon cũng đang trói buộc nó thật chặt.」"

# monologue
# JP: 自覚してしまった瞬間に、\n足元全てが、ぐらぐらと、崩れ落ちていく感覚がある。
2259 = "Khoảnh khắc nhận thức được điều đó,\ntôi có cảm giác mọi thứ dưới chân đang\nrung chuyển, sụp đổ."

# monologue
# JP: 吐き気がする。体が震える。喉がカラカラに乾いている。\nだからか――涙はでてこない。
2239 = "Buồn nôn. Cơ thể run rẩy. Cổ họng khô\nkhốc.\nCó lẽ vì vậy――mà nước mắt không tuôn rơi."

# monologue
# JP: （ふっ――）
2614 = "（Phù――）"

# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1090 = "「――A.」"

# monologue
# JP: 影が落ち。空を見上げる。\nナビは変わらず、旋回している。
2278 = "Bóng râm buông xuống. Tôi ngước nhìn bầu\ntrời.\nNavi vẫn không đổi, đang bay lượn vòng\nquanh."

# monologue
# JP: 何も変わらず、ずっと変わらず、\nただ僕を――愚直に、見守り続けてくれている。
2066 = "Không có gì thay đổi, mãi mãi không thay\nđổi,\nnó chỉ đơn giản――chân thành, tiếp tục dõi\ntheo tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「僕が、ここに来るのが怖かったのは――」
1664 = "「Lý do con sợ phải đến đây là――」"

# monologue
# JP: それで、落ち着く――落ち着ける。\n半ば無理やり深呼吸すれば、体の震えもいくらか収まる。
2205 = "Nhờ vậy, tôi bình tĩnh lại――có thể bình\ntĩnh lại.\nCố gắng ép mình hít một hơi thật sâu, cơ\nthể cũng bớt run đi phần nào."

# monologue
# JP: 手先の痛みを不意に感じて、手を解く。\nいつの間にひどく冷え切って、握りしめきっていた手を。
2089 = "Bất chợt cảm thấy đau nhói ở đầu ngón tay,\ntôi buông tay ra.\nBàn tay đã lạnh buốt và nắm chặt tự lúc\nnào."

# 【双鉄】
# display as 雙鐵
# JP: 「……昔の自分に会うことが、\n怖かったからなのかもしれない」
1168 = "「……Có lẽ là vì,\ncon sợ phải đối mặt với bản thân mình\ntrong quá khứ.」"

# monologue
# JP: いま、ぶり返してきた、“昔の自分”。\n何も知らない、無邪気な――単なる子供だった、僕。
2577 = "Bây giờ, \"bản thân trong quá khứ\" đã quay\ntrở lại.\nMột đứa trẻ ngây thơ, không biết gì――chỉ\nlà một đứa trẻ đơn thuần."

# monologue
# JP: 義務感でギチギチに縛らなくとも――父と母と路子とが、\n注いでくれる愛情だけで、立てていた僕。
2581 = "Không bị trói buộc bởi cảm giác nghĩa\nvụ――chỉ cần tình yêu thương của bố, mẹ và\nMichiko,\nlà tôi đã có thể đứng vững."

# 【双鉄】
# display as 雙鐵
# JP: 「昔の自分を思い出したら、二度と頑張れなくなると――\nこころの底が、それを恐れてたのかもしれない」
1518 = "「Nếu nhớ lại bản thân trong quá khứ, con\nsẽ không thể cố gắng được nữa――\nCó lẽ tận đáy lòng con đã sợ hãi điều đó.」"

# monologue
# JP: 実際に、あれほど体が、こころが震えた。
2454 = "Thực tế, cơ thể và trái tim tôi đã run rẩy\nđến thế."

# monologue
# JP: 凍えてしまう冬の夜から、温かい家にようやく戻り――\n安心できた瞬間不意に、寒さを思い出すかのように。
2268 = "Từ đêm đông lạnh giá, cuối cùng cũng trở\nvề ngôi nhà ấm áp――\nNhư thể chợt nhớ lại cái lạnh buốt ngay\nkhoảnh khắc cảm thấy an tâm."

# 【双鉄】
# display as 雙鐵
# JP: 「――だけどね、父さん、母さん。\nどうやら、それは、杞憂だったみたいだ」
1088 = "「――Nhưng mà này, bố, mẹ.\nCó vẻ như, đó chỉ là nỗi lo hão huyền\nthôi.」"

# monologue
# JP: だって、止まった。\n震えを止めた。
2211 = "Bởi vì, nó đã dừng lại.\nSự run rẩy đã ngừng lại."

# monologue
# JP: 崩れてしまいたかった膝を――\n見えないけれど暖かな手が、支えてくれた。
2224 = "Đôi đầu gối muốn gục ngã――\nĐã được một bàn tay vô hình nhưng ấm áp\nnâng đỡ."

# 【双鉄】
# display as 雙鐵
# JP: 「帰れる場所が、今はあるから。\n新しい僕の家も、やっぱり、僕の家なんだ」
1574 = "「Bởi vì bây giờ, con đã có nơi để trở về.\nNgôi nhà mới của con, quả nhiên vẫn là nhà\ncủa con.」"

# monologue
# JP: だから、戻れる。\n“昔の僕”を思い出しても――“今の僕”へと。
2373 = "Vì vậy, tôi có thể quay lại.\nDù có nhớ lại \"bản thân trong quá\nkhứ\"――tôi vẫn có thể trở về với \"bản thân\nhiện tại\"."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、今の家を好きなんだ。\n今の家族を、今の仲間を、とても大事に思っているんだ」
1667 = "「Con rất thích ngôi nhà hiện tại.\nCon vô cùng trân trọng gia đình hiện tại,\nnhững người đồng đội hiện tại.」"

# monologue
# JP: 頑張ったから、居場所を作れた。\n頑張ったから、たくさんの笑顔と向き合えた。
2208 = "Vì đã cố gắng, nên tôi đã tạo ra được nơi\nchốn cho riêng mình.\nVì đã cố gắng, nên tôi có thể đối diện với\nrất nhiều nụ cười."

# monologue
# JP: きっかけがどれほど歪であろうと、\n強いられた物であろうとも、そこを見失うことは無い。
2093 = "Dù cho khởi đầu có méo mó đến đâu,\ndù là bị ép buộc, tôi cũng sẽ không đánh\nmất nơi đó."

# 【双鉄】
# display as 雙鐵
# JP: 「だから、僕は――“今の僕”を、好きなんだ」
1694 = "「Vì thế, con――rất thích 'bản thân hiện\ntại'.」"

# monologue
# JP: そうと確信できたから、確信できるようになったから。\nあるいは僕は今日ここへ、やっと、来れたのかもしれない。
2206 = "Bởi vì tôi có thể tin chắc như vậy, bởi vì\ntôi đã trở nên tin chắc như vậy.\nHoặc có lẽ, cuối cùng tôi cũng có thể đến\nđây vào ngày hôm nay."

# 【双鉄】
# display as 雙鐵
# JP: 「それに、ね。最近は――“今の僕”も変わってきたんだ。\n『みんながそれを望むから』っていうだけじゃなく」
1808 = "「Hơn nữa nhé. Gần đây――'bản thân hiện tại'\ncũng đã thay đổi.\nKhông chỉ vì 'mọi người mong muốn điều đó'\nnữa.」"

# monologue
# JP: だって、ひとつだけは変わらないから。\n産まれたときから、今に至って、死ぬ時にまで。
2210 = "Bởi vì, có một điều duy nhất không bao giờ\nthay đổi.\nTừ khi sinh ra, cho đến tận bây giờ, và\ncho đến lúc chết đi."

# monologue
# JP: 僕と路子は、ずっとふたごで。\n僕は、路子の――おにいちゃんだから。
2311 = "Tôi và Michiko, mãi mãi là anh em sinh\nđôi.\nVì tôi là――anh trai của Michiko."

# 【双鉄】
# display as 雙鐵
# JP: 「路子に――路子だけじゃなく、父さんと母さんにも、\nあの日の旅を……今度こそ、楽しんでほしいんだ」
1622 = "「Con muốn Michiko――Không chỉ Michiko, mà\ncả bố và mẹ nữa,\nchuyến đi ngày hôm đó... lần này, mong mọi\nngười hãy tận hưởng nó.」"

# monologue
# JP: 終えられなかった家族旅行を。\n越えられなかった橋を越え――終着駅へと、旅して欲しい。
2257 = "Chuyến du lịch gia đình dang dở.\nVượt qua cây cầu chưa thể vượt qua――Tôi\nmuốn họ du hành đến ga cuối cùng."

# 【双鉄】
# display as 雙鐵
# JP: 「それは他の誰のでもない、“今の僕”自身の望みだ。\nだから必ず叶えてみせる。どれほど果て無い道のりでも」
1849 = "「Đó không phải mong muốn của ai khác, mà\nlà của chính 'bản thân hiện tại'.\nVì thế con nhất định sẽ biến nó thành hiện\nthực. Dù con đường đó có dài đằng đẵng đến\nđâu.」"

# monologue
# JP: （ざあっ）
# 2622 = "（沙沙）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1534 = "「唔！」" 

# monologue
# JP: 風が吹く。\n霊園を囲む木々を揺らして、ざわめかせる。
2599 = "Gió thổi.\nLàm rung rinh những tán cây bao quanh\nnghĩa trang, tạo nên những tiếng xào xạc."

# monologue
# JP: ナビは変わらず、僕の頭上を旋回している。\n……その他に何も聞こえない。誰の声さえ、響かない。
2630 = "Navi vẫn không đổi, lượn vòng trên đỉnh\nđầu tôi.\n……Ngoài ra không nghe thấy gì khác. Ngay\ncả giọng nói của ai đó cũng không vang\nlên."

# monologue
# JP: （……もしか、したら）
2602 = "（……Biết đâu, có khi nào）"

# monologue
# JP: ぞくりと、背筋に寒気を感じる。
2317 = "Một luồng khí lạnh chạy dọc sống lưng."

# monologue
# JP: 声など聞こえるはずもない――\nその当然の状況が、急に不安になってくる。
2080 = "Làm sao có thể nghe thấy giọng nói cơ\nchứ――\nTình huống hiển nhiên đó, bỗng dưng khiến\ntôi cảm thấy bất an."

# monologue
# JP: （父さんと、母さんも――\n列車に乗って、さまよい続けているのかもしれない）
2625 = "（Bố và mẹ――\nCó lẽ cũng đang ở trên chuyến tàu đó, tiếp\ntục lang thang vô định.）"

# 【双鉄】
# display as 雙鐵
# JP: 「父さん――母さん――」
1773 = "「Bố――Mẹ――」"

# monologue
# JP: ……もちろん、返事は帰ってこない。\n当然だ。
1069 = "……Tất nhiên, không có tiếng trả lời.\nĐó là lẽ đương nhiên."

# monologue
# JP: 当然なのに、寂しくなる。\n当然なのに、不安になる。
2411 = "Rõ ràng là đương nhiên, nhưng lại thấy cô\nđơn.\nRõ ràng là đương nhiên, nhưng lại thấy bất\nan."

# 【双鉄】
# display as 雙鐵
# JP: 「僕の声が――届いていればいいのだけれど。\n路子は、だって、ずっと一人でさまよってるから」
1598 = "「Giọng nói của con――Nếu có thể truyền đến\nhai người thì tốt biết mấy.\nBởi vì Michiko vẫn luôn lang thang một\nmình.」"

# monologue
# JP: もしも届いていないなら――\n思った瞬間、立ち上がっている。
2243 = "Nhỡ đâu không truyền đến được thì sao――\nKhoảnh khắc nghĩ vậy, tôi liền đứng bật\ndậy."

# monologue
# JP: 立たねばならない。そうであるなら、なおさらのこと。\n父と母とを、僕が、見つけ出さねばならない。
2314 = "Phải đứng lên. Nếu đã như vậy thì càng\nphải thế.\nTôi phải tìm ra bố và mẹ."

# 【双鉄】
# display as 雙鐵
# JP: 「久しぶりに会えて――話ができて、嬉しかった。\n話したいこと。もっとたくさんあったのだけれど」
1581 = "「Đã lâu không gặp――Được trò chuyện với hai\nngười, con rất vui.\nChuyện muốn nói. Vẫn còn rất nhiều nhưng\nmà.」"

# monologue
# JP: けれども今は、その時ではない。\n届いているかを疑いながら――そんな話は空虚であるから。
2118 = "Nhưng bây giờ chưa phải lúc.\nVừa nghi ngờ không biết có truyền đến được\nkhông――Thì những lời đó thật trống rỗng."

# 【双鉄】
# display as 雙鐵
# JP: 「また来る、必ず――\nああ」
1675 = "「Con sẽ lại đến, nhất định――\nA.」"

# monologue
# JP: いつの間に、墓石がカラカラに乾いている。\nだから、たっぷりと水をかける。
2092 = "Từ lúc nào, bia mộ đã khô khốc.\nThế nên, tôi lại tưới thật nhiều nước lên."

# monologue
# JP: ……届いてないかもしれないと、\nそう思っても、放ったままでは帰れない。
1078 = "……Dù nghĩ rằng có thể chưa truyền đến\nđược,\nnhưng tôi cũng không thể bỏ mặc mà về."

# 【双鉄】
# display as 雙鐵
# JP: 「――それじゃあ、また。\n今度はもっと、しっかり話そう」
1104 = "「――Vậy thì, hẹn gặp lại.\nLần tới chúng ta hãy nói chuyện nhiều hơn\nnhé.」"

# monologue
# JP: ……ひどく、疲れた。\n口を開くのもおっくうなほど。
1053 = "……Mệt mỏi vô cùng.\nĐến mức lười cả mở miệng."

# monologue
# JP: けれども、寂しい。\nひとりでいるのを、どうしようもなく辛いと感じる。
2110 = "Thế nhưng, lại thấy cô đơn.\nCảm giác ở một mình thật khó chịu không\nsao tả xiết."

# 【双鉄】
# display as 雙鐵
# JP: 「……なぁ、ナビ」
1166 = "「……Này, Navi.」"

# monologue
# JP: だから、開く。\nこれほどに重く感じていても、瞳を、そして唇を。
2374 = "Vì vậy, tôi mở miệng.\nDù cảm thấy nặng nề đến nhường này, cả đôi\nmắt và đôi môi."

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい。なんでしょう、双鉄様」
1663 = "「Vâng. Có chuyện gì vậy ạ, ngài Soutetsu.」"

# monologue
# JP: そうすればナビは答えてくれる。\nいままでとまったく変わらずに。
2383 = "Làm vậy Navi sẽ trả lời tôi.\nGiống hệt như từ trước đến nay."

# 【双鉄】
# display as 雙鐵
# JP: 「――今の僕は、弱ってみえるか？」
1100 = "「――Tôi bây giờ, trông có yếu đuối không?」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「いいえ、双鉄様。\n体温、脈拍、呼吸、全てが正常の範囲内にあります」
1759 = "「Không ạ, ngài Soutetsu.\nThân nhiệt, nhịp đập, nhịp thở, tất cả đều\nnằm trong phạm vi bình thường.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうではなく。バイタルではなく――」
1548 = "「A, không phải vậy. Không phải chỉ số sinh\ntồn――」"

# monologue
# JP: メンタル面で、と、言いかけ言葉を飲んでしまう。
2472 = "Về mặt tinh thần cơ, định nói vậy nhưng\ntôi lại nuốt ngược vào trong."

# monologue
# JP: そう問うて、\nハチロクならば、きっと答えてくれようが――
2247 = "Nếu hỏi như vậy,\nHachiroku chắc chắn sẽ trả lời cho tôi――"

# 【双鉄】
# display as 雙鐵
# JP: 「……墓参をして、僕は、ひどく混乱したのだ。\n昔の僕に、ひとときであったが、戻ってしまった」
1171 = "「……Sau khi viếng mộ, tôi đã vô cùng bối\nrối.\nDù chỉ một khoảnh khắc, tôi đã trở lại là\nbản thân trong quá khứ.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「昔の双鉄様、ですか？」
1858 = "「Ngài Soutetsu của quá khứ, sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1563 = "「嗯」" 

# monologue
# JP: ナビは、ナビだ。\n常に、少しも変わらない。
2649 = "Navi vẫn là Navi.\nLúc nào cũng vậy, không hề thay đổi chút\nnào."

# monologue
# JP: ゆえに伝わらぬこともある。\n知っているから、ゆっくり意味を噛み砕いていく。
2370 = "Vì vậy, cũng có những điều nó không hiểu\nđược.\nTôi biết điều đó, nên mới từ từ giải thích\ncho nó hiểu."

# 【双鉄】
# display as 雙鐵
# JP: 「幼いころの僕は――当然ながら、単なる子供だったのだ。\nわがままで、甘えん坊で、守られることが当然だった」
1608 = "「Tôi khi còn nhỏ――đương nhiên, chỉ là một\nđứa trẻ đơn thuần.\nÍch kỷ, hay làm nũng, và việc được bảo vệ\nlà điều hiển nhiên.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい」
# 1731 = "「是啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「けれど、あの事故に遭い、僕は変わった。\n生きていくために、変わらなければならなかったから」
1447 = "「Nhưng sau khi gặp phải tai nạn đó, tôi đã\nthay đổi.\nVì để sống sót, tôi buộc phải thay đổi.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「わがままで甘えん坊で守られることが当然の状態から\n変化をされたのであれば――」
1414 = "「Nếu ngài đã thay đổi từ trạng thái ích\nkỷ, hay làm nũng và coi việc được bảo vệ\nlà điều hiển nhiên――」"

# monologue
# JP: 不意に、沈黙。\nナビはいったい、何を演算しているのだろう。
2288 = "Bất chợt, im lặng.\nRốt cuộc Navi đang tính toán điều gì vậy."

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「――わがままではなく。甘えることをせず。守られない。\nそういう風に、双鉄様は変わられたのですか？」
1086 = "「――Không ích kỷ. Không làm nũng. Không\nđược bảo vệ.\nNgài Soutetsu đã thay đổi theo hướng như\nvậy sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「……多分、な。それがどこまで果たせているかを、\n僕自身では計れんが」
1158 = "「……Có lẽ vậy. Mặc dù chính bản thân tôi\ncũng không thể đo lường được\nmình đã làm được đến mức nào.」"

# monologue
# JP: けれども、尽くした。\nそのときどきの僕の全てをフルに使って。
2114 = "Thế nhưng, tôi đã dốc hết sức.\nSử dụng toàn bộ những gì tôi có ở từng\nthời điểm."

# 【双鉄】
# display as 雙鐵
# JP: 「そうしなければ、望まれることを果たせなかった。\n望まれることを果たせなければ、生きられなかった」
1594 = "「Nếu không làm vậy, tôi đã không thể hoàn\nthành những gì được kỳ vọng.\nNếu không hoàn thành những gì được kỳ\nvọng, tôi đã không thể sống sót.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様の生命は、ナビが、いつでも守っておりますが」
1751 = "「Sinh mạng của ngài Soutetsu, lúc nào cũng\ncó Navi bảo vệ mà ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「生命反応としての生ではなくて――」
1654 = "「Không phải sự sống dưới góc độ phản ứng\nsinh tồn――」"

# monologue
# JP: ナビの受け答えは、人間には有りえぬ程に直線的だ。\nそれゆえときに、普段は考えぬことを考えさせられる。
2639 = "Cách đối đáp của Navi thẳng thắn đến mức\ncon người không thể có được.\nVì vậy, đôi khi nó khiến tôi phải suy nghĩ\nvề những điều mà bình thường tôi chẳng\nmàng tới."

# 【双鉄】
# display as 雙鐵
# JP: 「ではなく――\nああ、つまり。人間としての、社会的な生という意味だ」
1418 = "「Không phải vậy――\nA, ý tôi là. Sự sống mang tính xã hội, với\ntư cách là một con người.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「社会的な生とは、どのような意味でしょうか」
1802 = "「Sự sống mang tính xã hội, là có ý nghĩa\nnhư thế nào ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「人とつながって、人に必要とされて生きるという意味だ。\nただ庇護を受けることが、僕には耐えられなかったゆえ」
1616 = "「Có nghĩa là kết nối với mọi người, sống\nvà được mọi người cần đến.\nBởi vì tôi không thể chịu đựng được việc\nchỉ biết nhận sự che chở.」"

# monologue
# JP: そうだ。確かにそう考えた。\nあの頃から、事故被害者として扱われることは嫌だった。
2415 = "Đúng vậy. Quả thực tôi đã nghĩ như thế.\nTừ hồi đó, tôi đã ghét việc bị đối xử như\nmột nạn nhân của vụ tai nạn."

# monologue
# JP: “右田の家にいる価値”を示さなければ、\n日々の食事も施しとなると、少年ながらに考えたのだ。
2266 = "「Vì vậy, tôi đã thỉnh cầu ngài Taito. Tôi\nđã xin――\nvà được ngài dạy cho 'cách để sống như một\ncon người'.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、汰斗さんに[こいねが]希った。僕は願って――\n『人として生きていくための方法』を、教わったのだ」
1698 = "「Đó là phương pháp như thế nào ạ?」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「それは、どのような方法だったのですか？」
1869 = "「Đó là phương pháp như thế nào ạ?」"

# monologue
# JP: 承知しているはずのことを、ナビは問う。\nだから答える。単なる過去の事実を、問われたままに。
2636 = "Navi hỏi một điều mà đáng lẽ nó phải biết.\nThế nên tôi trả lời. Chỉ đơn thuần thuật\nlại sự thật trong quá khứ theo đúng như\nnhững gì được hỏi."

# 【双鉄】
# display as 雙鐵
# JP: 「右田の役に立つことだ。誰かの役に立つことだ。\n望まれたことを、必ず叶えて、示すことだ」
1615 = "「Là trở nên có ích cho nhà Migita. Là trở\nnên có ích cho một ai đó.\nLà nhất định phải hoàn thành những gì được\nkỳ vọng và chứng minh điều đó.」"

# monologue
# JP: だから、そうした。\nそうし続けたから、生きられた。
2358 = "Thế nên, tôi đã làm vậy.\nVì tiếp tục làm vậy, tôi mới có thể sống\nsót."

# monologue
# JP: 路子の命と引き換えにして守ってもらった僕の命の。\n価値をそうして――僕は、少しでも高めたかった。
2353 = "Sinh mạng của tôi được bảo vệ bằng cách\nđánh đổi lấy sinh mạng của Michiko.\nBằng cách đó――tôi muốn nâng cao giá trị\ncủa nó dù chỉ một chút."

# 【双鉄】
# display as 雙鐵
# JP: 「示し続けて、示し続けて、示し続けて――\n僕は、今の僕になれた。だから僕は、僕を恥じない」
1416 = "「Không ngừng chứng minh, không ngừng chứng\nminh, không ngừng chứng minh――\nTôi mới có thể trở thành tôi của hiện tại.\nVì vậy, tôi không hổ thẹn với chính mình.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい。双鉄様は、とてもお強く成長されたと、\nナビも、そのように観測します」
1585 = "「Vâng. Navi cũng quan trắc được rằng,\nngài Soutetsu đã trưởng thành và trở nên\nvô cùng mạnh mẽ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1563 = "「嗯」" 

# monologue
# JP: ナビは、僕のメンタルまでには気を配れない。\nゆえに決して、世辞は言わない。
2628 = "Navi không thể bận tâm đến cả khía cạnh\ntinh thần của tôi.\nDo đó, nó tuyệt đối không biết nịnh nọt."

# monologue
# JP: だから、嬉しい。\n今まで重ねてきたことが、正しかったと評価され。
2363 = "Thế nên, tôi thấy vui.\nKhi những gì tôi đã tích lũy từ trước đến\nnay được đánh giá là đúng đắn."

# 【双鉄】
# display as 雙鐵
# JP: 「そう育てたと、思ったのだ。だから、墓参も平気だと\n――いつもの僕で挨拶できると、思ったのだが」
1670 = "「Tôi cứ tưởng mình đã trưởng thành như\nvậy. Thế nên tôi nghĩ đi viếng mộ cũng\nchẳng sao\n――nghĩ rằng mình có thể đến chào hỏi với\ntư cách là tôi thường ngày.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「平気ではいられなかったのでしょうか？」
1497 = "「Ngài đã không thể bình tĩnh được sao ạ?」"

# monologue
# JP: ……ずっと頭上で、ナビは見ていた。\n僕をモニターしつづけていた。
1081 = "……Navi vẫn luôn quan sát từ trên đỉnh đầu.\nNó vẫn luôn theo dõi tôi."

# monologue
# JP: にもかかわらずの質問に、\n僕の方が、不思議な気持ちにさせられる。
2435 = "Mặc dù vậy mà nó vẫn hỏi câu đó,\nkhiến chính tôi cũng cảm thấy thật kỳ lạ."

# 【双鉄】
# display as 雙鐵
# JP: 「見ていただろう。僕は、ひどく混乱した。\nいつもの僕なら吐かない弱音を、無様に漏らした」
1454 = "「Cô cũng thấy rồi mà. Tôi đã vô cùng bối\nrối.\nThậm chí còn thảm hại buông những lời yếu\nđuối mà bình thường tôi chẳng bao giờ nói\nra.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「確かに弱音を吐かれていました」
1797 = "「Quả thực ngài đã nói những lời yếu đuối.」"

# 【双鉄】
# display as 雙鐵
# JP: 「昔の僕に、ひととき、戻ってしまった気がして――\nだから、そうだな……今も、少しだけ不安なのだ」
1644 = "「Tôi có cảm giác như mình đã quay lại làm\nbản thân trong quá khứ một chốc――\nThế nên, ừm……bây giờ tôi cũng hơi bất an\nmột chút.」"

# monologue
# JP: なるほど、聞き方が悪かった。
2161 = "Ra là vậy, do cách hỏi của tôi không tốt."

# monologue
# JP: 最初からこう尋ねていれば、\nナビはすぐさま、正確な評価をくれただろう。
2241 = "Nếu hỏi như thế này ngay từ đầu,\nNavi hẳn đã đưa ra đánh giá chính xác ngay\nlập tức rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、改めてナビに問おう。\n今の僕は、普段の僕と変わらずいるか？」
1695 = "「Vậy, tôi hỏi lại Navi nhé.\nTôi của hiện tại, có gì khác so với tôi\nthường ngày không?」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様は、双鉄様です」
1887 = "「Ngài Soutetsu vẫn là ngài Soutetsu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1587 = "「Vậy sao.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「今ここにいる双鉄様も、\nお墓の前で弱音を吐かれていた双鉄様も、変わりません」
1779 = "「Ngài Soutetsu đang ở đây lúc này,\nvà ngài Soutetsu buông lời yếu đuối trước\nbia mộ kia, đều không có gì khác biệt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
1535 = "「Hả!?」"

# monologue
# JP: 覚えた安堵がぐるりとひっくり返される。
2153 = "Cảm giác an tâm vừa nhen nhóm lập tức bị\nđảo lộn hoàn toàn."

# monologue
# JP: ナビが下す評価ならば妥当――\nわかっているのに、納得できない。
2642 = "Nếu là đánh giá do Navi đưa ra thì chắc\nchắn là thỏa đáng――\nBiết vậy, nhưng tôi vẫn không thể chấp\nnhận được."

# 【双鉄】
# display as 雙鐵
# JP: 「同じといったか？　今の僕と――\nあの頃の、ただの子供であった僕とが」
1457 = "「Cô nói là giống nhau sao? Tôi của hiện\ntại và――\nTôi của ngày đó, khi chỉ là một đứa trẻ.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ナビは、\n初めてお迎えした以前の双鉄様のことを存じ上げません」
1893 = "「Navi không biết về ngài Soutetsu\ntrước thời điểm lần đầu tiên chúng ta gặp\nnhau ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……それはそうだ。そうだよな」
1541 = "「A……Đúng là vậy. Phải rồi nhỉ.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ですのでナビは、ナビが観測し、記録している範囲で、\n双鉄様のご質問に返答いたします」
1704 = "「Vì vậy, Navi sẽ trả lời câu hỏi của ngài\nSoutetsu\ntrong phạm vi mà Navi đã quan trắc và ghi\nnhận được ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1563 = "「嗯」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様は、間違いなく強く成長されました。\n以前に出来なかった事を、多くできるようになりました」
1757 = "「Ngài Soutetsu chắc chắn đã trưởng thành\nvà trở nên mạnh mẽ hơn.\nNgài đã có thể làm được rất nhiều điều mà\ntrước đây ngài không thể.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1563 = "「嗯」" 

# monologue
# JP: ……それもまた、確かな事実だ。\n例えば今日の墓参ひとつをとってみても。
1075 = "……Đó cũng là một sự thật chắc chắn.\nChẳng hạn như việc đi viếng mộ hôm nay."

# monologue
# JP: なんとか行こうと試みて、けれども果たせず諦めた。\nそんな日がいくつもあったことを、ナビだけは知っている。
2329 = "Đã cố gắng đi, nhưng không thể và đành bỏ\ncuộc.\nChỉ có Navi mới biết đã có bao nhiêu ngày\nnhư thế."

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ですが、双鉄様の――OS的な部分には、\n大きな変化は発生していないと、ナビは観測します」
1516 = "「Tuy nhiên, Navi quan trắc thấy――phần mang\ntính Hệ điều hành (OS)\ncủa ngài Soutetsu không hề phát sinh thay\nđổi lớn nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「OS的な部分」
1709 = "「Phần mang tính OS.」"

# monologue
# JP: 突拍子もない言葉がかえって、理解を助ける。
2573 = "Từ ngữ bất ngờ đó ngược lại lại giúp tôi\ndễ hiểu hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「それは、つまりは本質か。出会った頃も、今も。\n僕の本質には変化は無いと、ナビはみるか」
1735 = "「Đó, tức là bản chất sao. Cả lúc mới gặp\nnhau, và bây giờ.\nNavi thấy bản chất của tôi không hề thay\nđổi ư.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「単なる物品による、一面からだけの観測ですので」
1850 = "「Đây chỉ là quan trắc từ một phía, của một\nvật phẩm đơn thuần thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「一面なものか。文字通りの立体視ではないか」
1641 = "「Một phía gì chứ. Rõ ràng là cái nhìn lập\nthể đúng nghĩa đen mà.」"

# monologue
# JP: そこを疑う余地はない。\nだからこそ……困惑が、理解に遅れてやってくる。
2569 = "Không có chỗ nào để nghi ngờ điều đó.\nChính vì thế……Sự bối rối mới ập đến sau\nkhi tôi đã hiểu ra."

# 【双鉄】
# display as 雙鐵
# JP: 「……しかし、ナビにはそう見えるのか。\n事故直後の僕と、今の僕では――――ああ、いや」
1182 = "「……Nhưng, trong mắt Navi lại thấy vậy sao.\nTôi ngay sau vụ tai nạn, và tôi của bây\ngiờ――――A, không.」"

# monologue
# JP: そうかと思えば、苦笑が浮かぶ。
2438 = "Vừa nghĩ vậy, tôi liền nở nụ cười khổ."

# monologue
# JP: なるほど、それは恐らく、\n“ナビにしかし得ない”評価であろう。
2162 = "Ra là vậy, đó có lẽ là đánh giá\n\"chỉ có Navi mới có thể đưa ra\"."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ナビには甘えてきたものな。\nナビの前では、わがままも言うし、弱音も吐く」
1784 = "「Tôi, vẫn luôn làm nũng với Navi mà.\nTrước mặt Navi, tôi nói những lời ích kỷ,\nvà cả những lời yếu đuối nữa.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい。そうですね双鉄様」
1730 = "「Vâng. Đúng vậy ạ, ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「であらば、その評価も当然か」
1853 = "「Nếu vậy, đánh giá đó cũng là điều hiển\nnhiên thôi.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「いえ、違います双鉄様」
1422 = "「Không, không phải vậy đâu ạ, ngài\nSoutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！？」
1538 = "「Hả!?」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ナビがさほど変化をしていないと評価したのは、\n感情的な行動の有無という一面によってではなく――」
1903 = "「Việc Navi đánh giá ngài không có nhiều\nthay đổi,\nkhông phải dựa trên khía cạnh có hay không\ncó những hành động mang tính cảm xúc――」"

# monologue
# JP: 珍しく、ナビが沈黙する。
2650 = "Hiếm khi thấy Navi im lặng."

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「――双鉄様に、\nナビが質問をしてもよろしいでしょうか？」
1105 = "「――Navi có thể hỏi ngài Soutetsu\nmột câu được không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「構わん。なんだ？」
1514 = "「Được thôi. Chuyện gì?」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「何故、双鉄様は、今の双鉄様と過去の双鉄様とに、\n顕著な変化が認められるという評価を望まれますか？」
1888 = "「Tại sao ngài Soutetsu lại mong muốn được\nđánh giá rằng,\ngiữa ngài Soutetsu của hiện tại và quá khứ\ncó sự thay đổi rõ rệt ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
# 1535 = "「唔！？」" 

# monologue
# JP: 問われて、気づく。
2475 = "Được hỏi, tôi mới nhận ra."

# monologue
# JP: ナビの評価を認めながらも、それに納得できぬのは、\nなるほど――『変化があると評価されたい』故だろう。
2345 = "Dù công nhận đánh giá của Navi, nhưng vẫn\nkhông thể chấp nhận được,\nra là vậy――Có lẽ là vì tôi \"muốn được đánh\ngiá là đã thay đổi\"."

# 【双鉄】
# display as 雙鐵
# JP: 「……そうだな。僕自身としては、大きく変化を\nしてしまったかと――恐らく、感じているからだ」
1175 = "「……Đúng vậy. Bản thân tôi――có lẽ cảm thấy\nrằng\nmình đã thay đổi rất nhiều.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「どのようにでしょうか？」
1722 = "「Như thế nào ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「さっきも言ったが――幼いころの僕は、\nわがままで、甘えっ子で、弱かった」
1494 = "「Như tôi đã nói lúc nãy――Tôi khi còn nhỏ,\ních kỷ, hay làm nũng, và yếu đuối.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい」
1739 = "「Vâng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「その状態で事故に遭い、僕は、変わった。\nナビと出会った当初の僕は――」
1855 = "「Gặp tai nạn trong trạng thái đó, tôi đã\nthay đổi.\nTôi lúc mới gặp Navi――」"

# monologue
# JP: 思い出すだけでこころが痛む。\nかさぶたに、じくりと新しい血が滲む。
2141 = "Chỉ cần nhớ lại thôi cũng thấy đau lòng.\nMáu mới rịn ra từ lớp vảy vết thương."

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道を恨み、人を憎み。どうしようも無い状態だった。\n――生きながらにして死んでいたと、今なら思う」
1781 = "「Căm hận đường sắt, oán ghét con người.\nMột trạng thái vô phương cứu chữa.\n――Bây giờ nghĩ lại, lúc đó tôi chẳng khác\nnào một kẻ sống dở chết dở.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい」
# 1739 = "「是的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、汰斗さんに教えられ。真闇姉に守られ、\n日々姫の目に見開かされて――僕は、変わった」
1445 = "「Nhưng, được ngài Taito chỉ bảo. Được chị\nMayami bảo vệ,\nĐược đôi mắt của Hibiki làm cho thức\ntỉnh――Tôi đã thay đổi.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい」
# 1739 = "「是的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「誰かの役に立つことで、もう一度の生を生き始めた。\nゆえ……やはり僕は、大きな変化を遂げている、と」
1810 = "「Bằng cách trở nên có ích cho ai đó, tôi\nđã bắt đầu một cuộc sống mới.\nThế nên……quả thực tôi đã trải qua một sự\nthay đổi lớn.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様」
1886 = "「Ngài Soutetsu.」"

# monologue
# JP: ナビの声音は、一切の変化というものを見せない。\nけれども、感じる。焦り、あるいは怯えに近い何かを。
2641 = "Giọng nói của Navi không hề có chút thay\nđổi nào.\nThế nhưng, tôi cảm nhận được. Một sự vội\nvã, hay thứ gì đó gần giống như sự sợ hãi."

# monologue
# JP: ナビは恐らく大事なことを――\n極めて重要な何かを僕に、言おうとしている。
2295 = "Navi có lẽ đang định nói với tôi――\nmột điều gì đó cực kỳ quan trọng."

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　ナビ」
1432 = "「Gì vậy? Navi.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「過去の双鉄様と、今の双鉄様を『違うものだと』、\n双鉄様は評価されることを望んでいます」
1642 = "「Ngài Soutetsu mong muốn được đánh giá\nrằng,\nngài Soutetsu của quá khứ và ngài Soutetsu\ncủa hiện tại là 'hai người khác nhau'.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん。\n言われてみれば、そのとおりだ」
1726 = "「A……Ừ.\nNói mới thấy, đúng là vậy.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「それは恐らく、双鉄様にとっての、重大な危機に。\n生命に纏わる危機に繋がりかねない欲求です」
1851 = "「Điều đó có lẽ sẽ dẫn đến một cuộc khủng\nhoảng nghiêm trọng đối với ngài Soutetsu.\nMột khao khát có thể liên quan đến cả tính\nmạng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
# 1535 = "「唔！？」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ですので、ナビは、双鉄様に、\n強く推奨をいたします」
1703 = "「Vì vậy, Navi đặc biệt khuyến nghị\nngài Soutetsu.」"

# monologue
# JP: ナビは決して嘘をつかない。\n冗談など、言おうとしても言えないだろう。
2644 = "Navi tuyệt đối không bao giờ nói dối.\nNgay cả khi muốn nói đùa, nó cũng không\nthể nói được."

# monologue
# JP: ならば、その認識は、少なくともナビにとっては真実だ。\nそうして僕は――ナビを信じる。
2376 = "Nếu vậy, nhận thức đó, ít nhất đối với\nNavi, là sự thật.\nVà tôi――tin tưởng Navi."

# 【双鉄】
# display as 雙鐵
# JP: 「推奨するとは、いったい何をだ」
1433 = "「Khuyến nghị, rốt cuộc là chuyện gì?」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様の成長は、ナビも観測しています。\nその成長は、双鉄様の生命維持に有意だとも認識します」
1894 = "「Navi cũng quan trắc được sự trưởng thành\ncủa ngài Soutetsu.\nVà cũng nhận thức được rằng sự trưởng\nthành đó có ý nghĩa quan trọng trong việc\nduy trì sự sống của ngài.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1563 = "「嗯」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「その成長を著しく促したのは、双鉄様の身の回りの、\n右田家や、御一夜鉄道に纏わる人々だと観測します」
1901 = "「Navi quan trắc thấy rằng, những người\nxung quanh ngài Soutetsu,\nnhững người liên quan đến nhà Migita và\nĐường sắt Ohito, đã thúc đẩy sự trưởng\nthành đó một cách đáng kể.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ――そうだろうな」
1560 = "「À, ừm――Chắc là vậy rồi.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ですので双鉄様は。そうした人たちと、\nより深く向き合うようになさってください」
1700 = "「Vì vậy, ngài Soutetsu. Xin ngài hãy\nđối diện và thấu hiểu những người đó sâu\nsắc hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「向き合う……真闇姉や日々姫――\nあの頃の僕を、知っているような人たちとか？」
1427 = "「Đối diện... Chị Mayami hay Hibiki――\nNhững người biết tôi vào khoảng thời gian\nđó sao?」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「いいえ双鉄様。そうした方々ももちろん含みますが、\nそれだけではない方々ともです」
1421 = "「Không ạ, thưa ngài Soutetsu. Tất nhiên là\nbao gồm cả những người đó,\nnhưng không chỉ dừng lại ở đó đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうと……ハチロクなどともか」
1617 = "「Nói vậy là……cả Hachiroku nữa sao.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい。ハチロクやポーレット様。れいな、稀咲様。\n凪様、ふかみ様。そうした方々とも、必ず」
1755 = "「Vâng. Hachiroku và ngài Paulette. Reina,\nngài Kisaki.\nNgài Nagi, ngài Fukami. Với cả những người\nđó nữa, nhất định ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「凪やふかみともか。より深く向き合う――とは、\nそれは例えば、二人で過ごす時間を作るような感じか？」
1833 = "「Cả Nagi và Fukami nữa sao. Đối diện sâu\nsắc hơn――có nghĩa là,\nví dụ như, dành thời gian ở riêng với nhau\nchăng?」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「具体的な方法は、双鉄様にお任せします。\nとにかく、成長を促した要素と深く向き合って下さい」
1485 = "「Phương pháp cụ thể, Navi xin nhường lại\ncho ngài Soutetsu quyết định.\nNói chung, xin hãy đối diện sâu sắc với\nnhững yếu tố đã thúc đẩy sự trưởng thành\ncủa ngài.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1533 = "「Hừm.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「その行為は、双鉄様がお抱えになった重大な矛盾を\n解消するために役立つものと、ナビは推測します」
1462 = "「Navi suy đoán rằng hành động đó sẽ hữu\ních trong việc giải quyết\nmâu thuẫn nghiêm trọng mà ngài Soutetsu\nđang mang trong mình ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「重大な矛盾……」
1620 = "「Mâu thuẫn nghiêm trọng……」"

# monologue
# JP: 成るほど確かに、矛盾かもしれん。\n“過去の自分”と“今の自分”を、分かつことは。
2441 = "Ra là vậy, quả thực có thể là một mâu\nthuẫn.\nViệc phân biệt \"bản thân trong quá khứ\" và\n\"bản thân hiện tại\"."

# monologue
# JP: が、あの事故という、そして路子の喪失という、\n極めて大きな断絶が――いや――
2107 = "Nhưng vụ tai nạn đó, và sự ra đi của\nMichiko,\nlà một sự đứt gãy vô cùng lớn――Không――"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1674 = "「Tôi hiểu rồi.」"

# monologue
# JP: ……今の僕が考えたところで、堂々めぐりだ。\nひとつの答えを、はっきり望んでいるのだから。
1060 = "……Dù tôi bây giờ có suy nghĩ thì cũng chỉ\nlà luẩn quẩn.\nBởi vì tôi đang mong muốn một câu trả lời\nrõ ràng."

# monologue
# JP: ナビのいう“重大な矛盾”を、\n強化してしまうだけの結果しか招き得ぬだろう。
2354 = "Điều đó có lẽ chỉ dẫn đến kết quả\nlà làm tăng thêm \"mâu thuẫn nghiêm trọng\"\nmà Navi nói đến."

# 【双鉄】
# display as 雙鐵
# JP: 「他ならぬナビ先生のお見立てだ。\nいわれたとおりにしてみよう」
1900 = "「Đây là nhận định của không ai khác ngoài\nthầy Navi.\nTôi sẽ làm theo những gì cô nói.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「そうしていただけるのでしたら、ナビも、\nナビの職務を全うできる可能性を向上させられます」
1596 = "「Nếu ngài làm như vậy, Navi cũng có thể\nnâng cao khả năng hoàn thành trọn vẹn chức\nvụ của mình ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ナビの職務か」
1898 = "「Chức vụ của Navi sao.」"

# monologue
# JP: 僕の命を救うこと。\nそれがナビに刻み込まれた、唯一・至上の命令だ。
2382 = "Cứu mạng tôi.\nĐó là mệnh lệnh tối thượng và duy nhất\nđược khắc sâu vào Navi."

# 【双鉄】
# display as 雙鐵
# JP: 「……考えてみれば、常にだな。\n常に、僕は、ナビに守られ続けてきている」
1145 = "「……Nghĩ lại thì, lúc nào cũng vậy nhỉ.\nLúc nào, tôi cũng được Navi bảo vệ.」"

# monologue
# JP: 最悪の底にいたころから、\n今もこうして――そうして恐らく、将来も。
2280 = "Từ lúc ở tận cùng của sự tồi tệ,\nđến bây giờ vẫn vậy――và có lẽ, cả trong\ntương lai nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「僕が成長できたというなら、\nナビこそが、その源を支えてくれた」
1600 = "「Nếu nói tôi đã trưởng thành,\nthì chính Navi là người đã nâng đỡ cội\nnguồn đó.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「それがナビの職務ですので」
1865 = "「Vì đó là chức vụ của Navi mà ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「承知している」
1678 = "「Tôi biết.」"

# monologue
# JP: ナビには僕は、たましいを感じたことがなかった。\nけれども、常に感じている。
2332 = "Tôi chưa từng cảm nhận được linh hồn ở\nNavi.\nThế nhưng, tôi luôn cảm nhận được."

# monologue
# JP: ナビには確かな体温があり――\nそのぬくもりに、僕はいつでも、守られていると。
2104 = "Rằng Navi có một hơi ấm thực sự――\nVà tôi luôn được chở che bởi hơi ấm đó."

# 【双鉄】
# display as 雙鐵
# JP: 「承知した上で、感謝している。\nナビ――いつも僕を守ってくれて、ありがとう」
1679 = "「Biết vậy, nhưng tôi vẫn rất biết ơn.\nNavi――Cảm ơn cô vì đã luôn bảo vệ tôi.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「あ」
1542 = "「A.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！？」
1553 = "「Uo!?」"

# monologue
# JP: 一瞬、機体が大きく揺れる。
2072 = "Trong thoáng chốc, thân máy bay rung lắc\nmạnh."

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「失礼しました。姿勢修正の必要が生じました」
1580 = "「Thất lễ rồi ạ. Có sự cố cần phải điều\nchỉnh lại tư thế.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、そうか？　珍しいことだな」
1537 = "「Ừm, vậy sao? Hiếm thấy thật đấy.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「誤った[ルート,1]航路を取ってしまうところでした。\n双鉄様の生命と安全を維持するために、修正します」
1495 = "「Suýt chút nữa tôi đã đi sai đường bay.\nĐể duy trì tính mạng và sự an toàn cho\nngài Soutetsu, tôi xin phép điều chỉnh lại\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
1550 = "「Ồ――」"

# monologue
# JP: 大きく、ナビが旋回する。\nぐるり、360度近く。
2646 = "Navi lượn một vòng lớn.\nXoay tròn, gần như 360 độ."

# monologue
# JP: 素人の僕には無意味な挙動とも思えるが、\nナビが無意味なことをする筈も有り得ぬし――
2585 = "Đối với một kẻ nghiệp dư như tôi thì hành\nđộng này có vẻ vô nghĩa,\nnhưng Navi không thể nào làm những việc vô\nnghĩa được――"

# 【双鉄】
# display as 雙鐵
# JP: 「姿勢修正とやらも、なかなかに爽快だな。\nたまには、こうした滑空も悪くない」
1460 = "「Cái gọi là điều chỉnh tư thế này, cũng\nkhá là sảng khoái đấy.\nThỉnh thoảng lượn lờ thế này cũng không\ntệ.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「何よりのことです」
1866 = "「Vậy thì tốt quá rồi ạ.」"

# monologue
# JP: ――ナビが再び、まっすぐに飛ぶ。\n御一夜目指して、まっすぐに。
1017 = "――Navi lại tiếp tục bay thẳng.\nHướng thẳng về phía Ohito."

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ご安心下さい双鉄様。\nナビは必ず安全に、双鉄様を目的地へとお送りします」
1827 = "「Xin ngài hãy yên tâm, ngài Soutetsu.\nNavi nhất định sẽ đưa ngài Soutetsu đến\nđích an toàn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、頼む」
1570 = "「Ừ, nhờ cô nhé.」"

# monologue
# JP: ……それきりナビは黙ってしまう。\n沈黙が続けばやはり、悩んでしまう。
1066 = "……Kể từ đó, Navi im lặng.\nSự im lặng kéo dài quả nhiên khiến tôi\nphải suy nghĩ."

# monologue
# JP: （向き合う、か――\n果たして、どのようにすればいいのか）
2618 = "（Đối diện sao――\nRốt cuộc, mình nên làm thế nào đây）"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「――双鉄様、お疲れ様でした。\n目的地に到着しました」
1889 = "「――Ngài Soutetsu, ngài vất vả rồi.\nChúng ta đã đến đích ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ありがとう」
1561 = "「Ừm. Cảm ơn cô.」"

# monologue
# JP: ……ナビが着水してもなお、\n僕の思考は、どこにも落ち着くことができない。
1082 = "……Ngay cả khi Navi đã đáp xuống nước,\nsuy nghĩ của tôi vẫn không thể tĩnh lại\nđược."

# 【日々姫】
# display as 日日姬
# JP: 「あ！　おかえり、にぃにー！」
1544 = "「A! Mừng anh hai về nhà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお。ただいま、日々姫。\n日々姫もちょうどいま帰りか」
1551 = "「Ồ. Anh về rồi đây, Hibiki.\nEm cũng vừa mới về à?」"

# 【日々姫】
# display as 日日姬
# JP: 「ほんとにちょうど！\nえへへっ、すっごいタイミング」
1732 = "「Thật sự là vừa khít luôn!\nEhehe, đúng lúc ghê.」"

# monologue
# JP: 嬉しげに日々姫が小さく跳ねれば、\n肩から提げてる長い筒――図面ケースもぴょこんと踊る。
2407 = "Hibiki vui vẻ nhảy cẫng lên,\nchiếc ống dài đeo trên vai――ống đựng bản\nvẽ cũng nhảy múa theo."

# 【双鉄】
# display as 雙鐵
# JP: 「仕事帰りか」
1720 = "「Em đi làm về à?」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！　打ち合わせがかなり長引いたけん、\nそんおかげで、ちょうどにぃにとここで会えたと！」
1567 = "「Vâng! Buổi họp kéo dài khá lâu,\nnhờ vậy mà em mới tình cờ gặp được anh hai\nở đây nè!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、随分と嬉しそうだな」
1639 = "「Sao thế, trông em có vẻ vui quá nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！　盛り上がって長引いた打ち合わせやけん！\nしかも、そのおかげでばったりにぃにと会えちゃったし」
1566 = "「Vâng! Vì buổi họp sôi nổi quá nên mới kéo\ndài mà!\nHơn nữa, nhờ vậy em mới tình cờ gặp được\nanh hai nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1563 = "「嗯」" 

# monologue
# JP: 眩しいほどの日々姫の笑顔が、答えをくれる。\n“向き合う”とは、つまりこのことだ。
2400 = "Nụ cười rạng rỡ của Hibiki đã cho tôi câu\ntrả lời.\n\"Đối diện\", tóm lại chính là thế này đây."

# monologue
# JP: 日々姫がもっとも日々姫らしくある時間――\nそれは日々姫が真剣に、仕事に向き合っている時だろう。
2397 = "Khoảng thời gian Hibiki được là chính mình\nnhất――\nCó lẽ là khi em ấy đang nghiêm túc đối\ndiện với công việc."

# monologue
# JP: （そうだ。それに――仕事は、くらしだ。\nそれぞれの仕事に、きちんと向き合うことができたなら）
2621 = "（Đúng vậy. Hơn nữa――công việc, chính là\ncuộc sống.\nNếu có thể nghiêm túc đối diện với công\nviệc của mỗi người）"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに？　どぎゃんしたと？」
1880 = "「Anh hai? Có chuyện gì sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――うむ」
1410 = "「Không――ừm.」"

# monologue
# JP: 向き合うこと。仕事をみること。くらしをみること。\nひとりひとりと重ねていけば、その果てに――
2217 = "Đối diện. Nhìn nhận công việc. Nhìn nhận\ncuộc sống.\nNếu cứ tiếp tục gắn kết với từng người\nmột, thì cuối cùng――"

# monologue
# JP: 元忠氏に出された課題の解決があり、\nオール御一夜体制を築けるような、そんな気もする。
2355 = "Tôi có cảm giác rằng mình sẽ giải quyết\nđược bài toán mà ông Mototada đặt ra,\nvà có thể xây dựng nên một thể chế toàn\nOhito."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、僕は――\n御一夜を、もっと知りたいと思うんだ」
1713 = "「Hibiki này, anh――\nmuốn hiểu thêm về Ohito.」"

# 【日々姫】
# display as 日日姬
# JP: 「え！？　うん！\nそいば、すごく！　すごく良かことって思う！！」
1531 = "「Hả!? Vâng!\nChuyện đó, tuyệt lắm! Em nghĩ đó là một\nđiều rất tuyệt vời!!」"

# monologue
# JP: 今度は一転、はにかむ笑顔に思い出す。\nそれは日々姫が、僕に勧めてくれていたことだと。
2399 = "Nụ cười bẽn lẽn chợt lóe lên nhắc tôi nhớ\nlại.\nRằng đó chính là điều mà Hibiki đã từng\nkhuyên tôi."

# monologue
# JP: ナビと日々姫と。\n勧めた理由は、それぞれ異なっているのだろうが――
2631 = "Navi và Hibiki.\nLý do họ khuyên tôi có lẽ khác nhau,\nnhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「そのために、まずは日々姫をもっと知りたい。\n日々姫の仕事を――見学させてもらっても構わんか？」
1763 = "「Để làm được điều đó, trước tiên anh muốn\nhiểu thêm về Hibiki.\nAnh có thể――đến xem em làm việc được\nkhông?」"

# 【日々姫】
# display as 日日姬
# JP: 「よか！　よかよ！　もちろん、大歓迎っ！！」
1591 = "「Được! Được chứ! Tất nhiên là vô cùng hoan\nnghênh rồi!!」"

# monologue
# JP: ぴょこん、と日々姫は小さくはねて、\n体を縮めてガッツポーズをしてみせる。
2404 = "Hibiki khẽ nhảy cẫng lên,\nthu người lại và làm động tác ăn mừng."

# monologue
# JP: 次の瞬間、ひょっこりと、\n不思議そうな顔が持ち上がる。
2078 = "Khoảnh khắc tiếp theo, em ấy bất chợt\nngẩng lên\nvới vẻ mặt đầy thắc mắc."

# 【日々姫】
# display as 日日姬
# JP: 「ばってん、なんで急にそぎゃんこと？」
1640 = "「Nhưng mà, sao tự dưng anh lại nói vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ナビに、勧められたのだ。僕の周囲のひとりひとりと、\nじっくりと向き合うように、と」
1745 = "「Là Navi khuyên anh đấy. Khuyên anh nên\ndành thời gian\nđể đối diện sâu sắc với từng người xung\nquanh mình.」"

# 【日々姫】
# display as 日日姬
# JP: 「じっくりと、向き合う――\nどぎゃんして、ナビはそんなこと？」
1584 = "「Dành thời gian, đối diện sâu sắc――\nSao Navi lại nói vậy chứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「わからん」
1656 = "「Anh không biết.」"

# monologue
# JP: 言って、数秒待ってみる。\n……ナビからは、何の補足も送られてこない。
2513 = "Nói xong, tôi chờ vài giây.\n……Navi không gửi thêm bất kỳ lời giải\nthích nào."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ恐らく、その理由を考えることもまた、\n僕にとっての、大事な課題なのだろう」
1783 = "「Vì vậy có lẽ, việc suy nghĩ về lý do đó\ncũng là một bài toán quan trọng đối với\nanh.」"

# 【日々姫】
# display as 日日姬
# JP: 「あぁ……」
1549 = "「À……」"

# monologue
# JP: わかったような、わからぬような。\n納得をしているようで、どこか残念そうにも聞こえる声。
2403 = "Như hiểu, lại như không hiểu.\nGiọng nói nghe có vẻ như đã chấp nhận,\nnhưng lại phảng phất chút tiếc nuối."

# monologue
# JP: 違う。これだけでは言葉が足りていない。\n僕の気持ちを、まっすぐ伝えきれてはいない。
2083 = "Không phải. Chỉ bấy nhiêu lời là chưa đủ.\nTôi vẫn chưa truyền đạt trọn vẹn cảm xúc\ncủa mình."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、僕は向き合いたいのだ」
1699 = "「Thế nên, anh muốn đối diện với em.」"

# monologue
# JP: だから、日々姫をまっすぐ見つめる。\n日々姫は少し慌てたように、背筋をぴんと伸ばしてくれる。
2369 = "Vì vậy, tôi nhìn thẳng vào Hibiki.\nHibiki có vẻ hơi bối rối, vội vàng ngồi\nthẳng lưng lên."

# 【双鉄】
# display as 雙鐵
# JP: 「向き合いたいのだ。まずは日々姫と。\nそうして、他のみんなとも――大切な何かを、学ぶため」
1669 = "「Anh muốn đối diện. Trước tiên là với\nHibiki.\nSau đó là với những người khác nữa――để học\nhỏi một điều gì đó quan trọng.」"
