[script]
# lines: 452 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2616 = "（哐當、哐當、哐當、哐當——）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1539 = "「啊——」" 

# monologue
# JP: レールが刻む列車の音に、安堵を覚える。\n戻ってこれたという感覚。
2146 = "列車碰撞鐵軌的聲音使我安心。讓我有種回到故鄉的實感。" 

# monologue
# JP: そして同時に、罪悪感。\n路子の背中が、あまりにちいさく、か弱く見えて。
2483 = "與此同時，也產生了罪惡感。路子的背影，顯得那麼弱小。" 

# 【路子】
# display as 路子
# JP: 「そーちゃん？」
1612 = "「小雙？」" 

# monologue
# JP: 気づいたときには、向かい合わせに座っている。\nそうしたという感覚も無く。
2437 = "當我回過神來，發現我和她已經相對而坐。我絲毫不記得是怎麼變成這樣的。" 

# monologue
# JP: 路子は、僕をじっと見ている。\nあどけない目で、じいっと見ている。
2549 = "路子正一動不動地用她天真無邪的眼神盯著我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、路子。なにかあったか？」
1638 = "「怎麼了，路子。發生什麼事了？」" 

# 【路子】
# display as 路子
# JP: 「みち、ね？　見たの。\nれっ車の中から、みちにも見えたの」
1610 = "「小路看到了。從列車裡看到了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「見えた……何がだ？」
1787 = "「看到了什麼……？」" 

# 【路子】
# display as 路子
# JP: 「きれいなポスター。『みらいいき列車』」
1761 = "「漂亮的海報。上面寫著“發往未來列車”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
# 1539 = "「啊——」" 

# monologue
# JP: 言葉が、喉に詰まってしまう。\nあのポスターは、『みんな』をうつしたポスターだから。
2509 = "話語堵在喉嚨裡，說不出口。因為，那幅海報上有著大家的身影。" 

# monologue
# JP: みんなで作った輪の中に、\n路子の姿を――僕は、交えてやれなかったから。
2223 = "大家團聚一堂，但是路子卻不在——因為我沒能讓她加入。" 

# 【路子】
# display as 路子
# JP: 「そーちゃんは、さ。\nあのれっ車」
1611 = "「小雙，那輛列車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん？」
1571 = "「嗯？」" 

# monologue
# JP: だけれど、無理やり声を出す。\n沈黙も動揺も、路子をきっと、怯えさせる。
2112 = "但是，我卻強迫自己出聲。我的沉默，我的動搖，一定會讓路子害怕。" 

# monologue
# JP: あのとき、離れてしまったとはいえ――\n僕らはやっぱり、いまでも、ふたごなのだから。
2589 = "雖說從那天起，我們分離了——但就算如此，我們也還是雙胞胎。" 

# 【路子】
# display as 路子
# JP: 「まだ無い列車。みらいいき列車。\nあのおにんぎょうと、はしらせたいんだよね？」
1872 = "「那輛尚不存在的列車——發往未來列車。你想和那個人偶一起開動對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロク、だ。お人形ではなくて。\n名を持つ、ひとりの――あれは、意思を持つものだ」
1159 = "「……她叫八六。她不是人偶。她有自己的名字——有自己的意識」" 

# 【路子】
# display as 路子
# JP: 「ハチロク？　ハチロク」
1481 = "「八六？八六」" 

# monologue
# JP: 噛みしめるように。自分を納得させるかのように。\n路子はゆっくり、ハチロクの名を繰り返す。
2545 = "路子慢慢地重複著八六的名字。彷彿在咀嚼著這個名字一樣。彷彿讓自己接受這個名字一樣。" 

# 【路子】
# display as 路子
# JP: 「ハチロク――ちゃん。\nそーちゃん、あのこと、なかよしだよね？」
1480 = "「八六——小雙，你和她關係很好吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……仲良しというようなベタついた感じでも無いが――\n確かに――うむ。言われてみれば、仲良くはある」
1194 = "「……雖然我們沒有關係好到黏在一起——不過的確——嗯。說起來，確實關係不錯」" 

# monologue
# JP: “家族で相棒”。\n遠慮をしていたハチロクに、かけた言葉を思い出す。
1033 = "“既是家人，又是搭檔”。我回想起了八六從前在跟我客套時，我對她說的話。" 

# monologue
# JP: 考えなしに言ったことだが――\nいや、考えなしなら、それは僕の、本心に近いものだろう。
2587 = "雖然那只是我不經考慮的發言——不對，既然沒有考慮過，那就證明這句話更接近於我的心聲。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……あれに対しては、ナビに対するときと同じく、\n何を身構えなくてすむ。そういう意味で、気楽な相手だ」
1185 = "「……跟她相處就好像跟Ｎａｖｉ相處一樣，不用裝模作樣。所以，跟她在一起很輕鬆」" 

# 【路子】
# display as 路子
# JP: 「そーなんだ」
1742 = "「是這樣啊」" 

# monologue
# JP: 小さな頷き。\nそうして路子は、まっすぐ僕を見つめてくる。
2556 = "路子輕輕點點頭。然後，她直率地看著我。" 

# 【路子】
# display as 路子
# JP: 「わかる。そーちゃん、あのおにんぎょう――\nハチロクちゃんと、楽しそうにおはなししてるから」
1673 = "「我明白。因為，你跟那個人偶——跟八六，聊得很開心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
1747 = "「有嗎？」" 

# 【路子】
# display as 路子
# JP: 「うん！　それからね、ひびきちゃんとも、\nきんぱつのおねーさんとおちびちゃんとも」
1749 = "「有！而且，你跟日日姬，跟那個金髮大姐姐，還有跟那個小姑娘也是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとれいなだな」
1738 = "「是波萊特和玲奈吧」" 

# 【路子】
# display as 路子
# JP: 「ぽーれっとちゃんとれいなちゃんとも――そーちゃん、\nだんだん楽しそうにはなすようになってるよ！」
1835 = "「跟波萊特和玲奈也是——小雙，你跟別人聊天的時候越來越開心了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1734 = "「是嗎」" 

# monologue
# JP: れいなの名が出て、真闇姉の名が出なかった。\nだから、容易に推測できる。
2584 = "雖然她提到了玲奈，卻沒有提到真闇姐。所以，我很容易推測出來。" 

# monologue
# JP: 路子が見ている僕はおそらく、駅での僕だ。\n車窓から見える景色だけが、路子に見える全てであるのだ。
2553 = "路子看到的我，應該是在車站中的我。車窗外的景色，就是路子能看到的一切。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ならば、僕は。仕事を楽しめているのだな」
1867 = "「那我一定是很享受工作了」" 

# monologue
# JP: であるのならば、幸いだ。\n路子の瞳に映る姿が、路子を少しでも喜ばせるなら。
2249 = "如果是這樣的話，就太好了。如果我在路子眼中的形象能讓路子開心哪怕一點點的話，就太好了。" 

# monologue
# JP: 路子が繰り返し繰り返す、\nいまだ終わらせられない旅の、慰めとなるのなら。
2244 = "如果在路子至今仍未結束的無盡旅程中，能因此得到慰藉就太好了。" 

# 【路子】
# display as 路子
# JP: 「きっとそうだよ！\nだっていまも！　そーちゃん、なんだか楽しそう！」
1405 = "「一定是的！因為現在的你也一副很高興的樣子啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1098 = "「——是啊」" 

# monologue
# JP: 路子は、笑ってくれている。\n『楽しそうにしている』僕を、素直に喜んでくれている。
2543 = "路子對我笑了。她直率地因為我快樂的樣子而感到高興。" 

# monologue
# JP: それが、嬉しい。\n――路子がいまも、変わらず路子でいてくれることが。
2574 = "這讓我也好高興。——因為，現在的路子也沒有變，還是原來的她。" 

# 【路子】
# display as 路子
# JP: 「だから、きっとそーちゃんは」
1689 = "「所以，你一定——」" 

# monologue
# JP: けれどもふっと、路子が下を向いてしまう。
2116 = "但是，路子忽然垂下頭。" 

# 【路子】
# display as 路子
# JP: 「……そーちゃんは、みらいいき列車がはしったら、\nきっと、みんなとのるんだよね？」
1804 = "「等發往未來列車啟動，小雙，你一定會和大家一起乘上去吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。恐らく乗務にあたるだろうし、\nみなも、乗車をしてくれるだろう」
1729 = "「是啊。我應該會在車上擔任乘務工作，大家也會乘上那輛車吧」" 

# 【路子】
# display as 路子
# JP: 「そうしたら、みち」
1862 = "「那到時候，小路——」" 

# monologue
# JP: 路子が足をぶらぶらさせる。\nぶらぶら、ぶらぶら。
2547 = "路子擺著她的雙腿。" 

# monologue
# JP: かなり激しく。\n靴をいっそ、脱ぎ落としてでもしまいたいかのように。
2230 = "她動作非常劇烈。就好像想要把鞋子抖落在地似的。" 

# 【路子】
# display as 路子
# JP: 「そしたら、みち……そーちゃんにおいてかれちゃう。\nひとりぼっちに、またなっちゃうねぇ」
1492 = "「到時候，小路……就會被小雙落在後面了。小路又會變回孤獨一人了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことはない！」
1419 = "「不會的！」" 

# 【路子】
# display as 路子
# JP: 「ひゃっ！？」
1527 = "「呀！？」" 

# monologue
# JP: ――あの事故のあと、二年かかった。\n路子の夢を、見ることができるようになるまで。
1015 = "——那次事故之後，我花了兩年，才能在做夢的時候看到路子。" 

# monologue
# JP: 右田の家に引き取られ――\n罪悪感を抱えたままに、それでも、確かな落ち着きを得て。
2344 = "我被右田家收養——雖然心裡還有著罪惡感，但也的確得到了平靜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――あんな思いは、二度とさせない」
1095 = "「——我不會再讓你被拋下了」" 

# monologue
# JP: そうしてやっと夢で再会できたとき、\n路子は一人、泣いていた。
2473 = "而等我終於在夢裡見到路子的時候，她正在獨自哭泣。" 

# monologue
# JP: 元気なころの姿のままで、事故にあう前の路子のままで。\nだけれど一人、泣いていた。
2559 = "路子還是她遇到事故之前充滿活力的樣子。但是她卻在黯自哭泣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「約束する。\n路子を決して、置き去りにしたりはしない」
1661 = "「我們約好了。我絕對不會拋下你一個人的」" 

# monologue
# JP: だから、言葉が止まらなくなる。\nだから思いが止まらなくなる。
2366 = "所以，我的話語停不下來。我的思緒也同樣停不下來。" 

# monologue
# JP: もう決して、路子と共に大人になることはできないが――\nそうであっても、僕は路子を、ひとりにしない。
2588 = "雖然，我已經不可能跟路子一起長大了——但即便如此，我也不會留下路子一個人的。" 

# 【路子】
# display as 路子
# JP: 「どうやって？　そーちゃん、だって――この列車に、\nそーちゃんがずっとのってちゃ、ダメなんだよ？」
1456 = "「你要怎麼做？因為，小雙——你不能一直坐在這輛列車上的呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
1091 = "「——嗯」" 

# monologue
# JP: ああ、本当に路子は同じだ。
2193 = "啊，路子真的沒有變。" 

# monologue
# JP: あの日あの時と変わらずに、\n今でも僕を少しでも、死から遠ざけようとしてくれる。
2235 = "她與那天，那時候一樣，即便在今天，也在想方設法拉開我與死亡之間的距離。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……それなら路子も。\nこの列車に、ずっと乗ってちゃだめなんだ」
1193 = "「……那路子也一樣。你也不能一直坐在這輛列車上的」" 

# monologue
# JP: 答えが見える。
2338 = "我看到答案了。" 

# monologue
# JP: “終着駅に”――抱え続けていた思いと今とが、\nカチャン、と音を立て連結される。
2582 = "那就是“去終點站”——藏在我心中至今的思念和現在的我，喀嚓一聲聯繫在了一起。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が必ず送り届ける。\n路子のことを、父さんと母さんが待ってる場所に」
1651 = "「我一定會送你去的。送你去父親和母親等待的地方」" 

# 【路子】
# display as 路子
# JP: 「パパとママ！　まっててくれるの？\nみちのこと」
1775 = "「爸爸和媽媽！他們在等我嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――絶対に、待っていてくれる」
1556 = "「嗯——他們絕對在等著你」" 

# 【路子】
# display as 路子
# JP: 「――そーだったんだぁ」
1102 = "「——這樣啊」" 

# monologue
# JP: 路子が笑う。\n安心しきった――懐かしい、あまえっこの路子の顔で。
2554 = "路子笑了。那是讓我安心的——令我懷念的、向我撒嬌的路子的臉。" 

# monologue
# JP: 路子の笑顔が、定めてくれる。\n終着駅を――ずっと探してたその場所を。
2550 = "路子的笑容讓我找到了方向。找到了我一直尋找的終點的方向。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――\nだから、列車を走らせたいんだ」
1687 = "「所以我——要讓列車行進起來」" 

# 【路子】
# display as 路子
# JP: 「そっかー。そうだったんだねー。\nみらいいき列車は、みちをおいてく列車じゃなくて」
1733 = "「是嗎……這樣啊。原來，發往未來列車不會丟下小路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1563 = "「嗯」" 

# monologue
# JP: 安心してしまったせいなのか、世界が揺らめく。\n――ああ、目覚めるな――
2169 = "可能是因為我懸著的心放了下來，這時世界開始搖晃。啊，我要醒了——" 

# monologue
# JP: 自覚するから、\n少し早口に言葉をつむぐ。
2207 = "因為我察覺到自己快要醒來，所以加快了一點語速。" 

# 【双鉄】
# display as 雙鐵
# JP: 「路子の未来を――\n僕らの未来を、つなげる列車だ」
1871 = "「那是聯繫著路子的未來與我們的未來的列車」" 

# 【日々姫】
# display as 日日姬
# JP: 「おみやげとかはいらんけん、\n早く、元気に帰ってきてね！！」
1451 = "「你就不用帶什麼禮物啦，趕緊好好兒地回來就得啦！！」" 

# monologue
# JP: 言ってすぐ、日々姫は『しまった！』という顔になり、\n自分の口を手で覆う。
2393 = "日日姬剛說完就意識到自己說錯了話，連忙捂住自己的嘴。" 

# 【日々姫】
# display as 日日姬
# JP: 「もちろんにぃにがのんびりしたいだけのんびりしてきて。\nその……つもる話とかもあるだろうし――あうっ！？」
1782 = "「當然啦，你慢慢來也成，想什麼時候回來就什麼時候回來。而且……你們肯定還得嘮好多呢——啊嗚！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1731 = "「是啊」" 

# monologue
# JP: しまったという顔を再度され、\n少しあわてて、日々姫の言葉を言葉で断ち切る。
2394 = "日日姬感覺自己開始多說多錯，顯得有點慌，於是我打斷了日日姬的話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに話したいことはたくさんだ。\nとはいえ、そう長居をするつもりもない」
1796 = "「確實我們有很多想說的話，但是，我也不打算待太久」" 

# monologue
# JP: 日々姫をひどく、やきもきさせてしまっている。
2442 = "看來是我讓日日姬感到坐立不安了。" 

# monologue
# JP: 気の毒でもあるし、嬉しくもある。\nだから、少しでもこころ穏やかにしてやりたい。
2586 = "雖然這樣的她有點可憐，但同時也讓我感到很高興。所以，我想儘量安撫她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜で、[うち]家でやりたいことが山のようにある。\nできるだけ早く、無論、元気に帰ってくるさ」
1684 = "「我還有一大堆事情想在御一夜、在家裡做呢。所以我會儘量早點回來，當然會好好的啦」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
1564 = "「嗯！」" 

# 【ハチロク】
# display as 八六
# JP: 「……[あのこ,3]8620を放っておけないことも確かなのですが――\n本当に、お供さしあげなくて大丈夫でしょうか？」
1195 = "「……雖然我確實放不下８６２０——不過，真的不需要我陪著您嗎？」" 

# monologue
# JP: 日々姫が安心してくれた、と、思うやいなやのハチロクだ。\nやはり、冴えない顔をしている。
2152 = "剛安撫好日日姬，八六又來了。她也是一副不安的表情。" 

# monologue
# JP: 同行したい――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の責任感があるのだろうか？\nこれはまさしく文字通り、“私的”な旅であるというのに。
2233 = "她想跟我一起去——是因為出於\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的責任感嗎？明明這只是一趟不折不扣的私人旅程。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前の気持ちは嬉しいが、[ハチロク,3]8620のことが無くとも――\n今回だけは、僕は、一人旅をしたいのだ」
1881 = "「雖然你有這份心我很高興，但是就算沒有[八六,3]８６２０的事——至少這次，我也想獨自一個人去」" 

# monologue
# JP: 瞬間、ふっと影が落ちる。\nハチロクの顔にではなく、地面の上に。
2456 = "突然，一道影子落在了地面上。" 

# monologue
# JP: そうであったと、苦笑が浮かぶ。
2352 = "我這才想起來忘記了什麼，露出苦笑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「訂正だ。一人旅ではないな。\nナビと、僕との二人旅を」
1681 = "「我糾正一下。這不是獨自一人的旅程。而是Ｎａｖｉ和我兩人的旅程」" 

# 【ハチロク】
# display as 八六
# JP: 「左様でございますか」
1743 = "「是這樣嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにせ、父さんと母さんに会うのも久しぶりだ」
1575 = "「因為，我跟父母也好久沒見了」" 

# monologue
# JP: ……思い立ったが吉日、と、\n昔の人は、まこと、良い言葉を残してくれた。
1064 = "……擇日不如撞日。古人誠不我欺。" 

# monologue
# JP: 御一夜に帰ってきて初めての休暇の申し出を\n右田家も、御一夜鉄道も、即座に快諾してくれた。
2575 = "這還是我回到御一夜之後第一次提出休假申請，右田家和御一夜鐵路都乾脆地應允了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……いろいろな意味で、いっぱいいっぱいになりそうだ。\nゆえ――」
1177 = "「……由於各種緣故，這次旅行可能會非常充實。所以——」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし、\n大変に気の利かないことを申してしまいました」
1785 = "「看來，我是提出了一個非常沒眼力見的請求」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1571 = "「嗯？」" 

# monologue
# JP: 不満げだったハチロクが、スッ――と静かな一礼をする。\nとても穏やかな顔をして、いたわるような声を出す。
2151 = "剛剛神色中還有不滿的八六，靜靜地對我行了一禮。她表情柔和，像是在安慰我一般如此說道。" 

# 【ハチロク】
# display as 八六
# JP: 「どうぞごゆっくりお過ごしください。\n幸せな――親子水入らずのお時間を」
1826 = "「請您務必充分享受這次旅程。與父母享受這段幸福的時光」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1563 = "「嗯」" 

# monologue
# JP: そう言われると、照れくさい。\n同時になにやら、申し訳無さも感じてしまう。
2237 = "她這麼說，讓我有點害羞。同時，也感到有點對不起她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ今回は、そういうわけだが、\nもしいずれ、機会があったら――」
1852 = "「這次確實是有原因的，不過如果下次有機會的話——」" 

# monologue
# JP: いや、おかしいか。\n生家の墓参に、今の家族を紹介するというのも。
2084 = "不對，好像挺奇怪的。給老家人上墳的時候，介紹自己現在的家人也有點怪。" 

# 【ハチロク】
# display as 八六
# JP: 「はい。必ず。\nそのときには、わたくしにもご挨拶をさせてください」
1589 = "「好的，請務必。到時候，請允許我向您的家人打招呼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1534 = "「唔！」" 

# 【日々姫】
# display as 日日姬
# JP: 「わたし！　わたしも！！\nもしも、にぃにが、イヤじゃなければだけど」
1859 = "「還有我！還有我！！不過，前提是阿哥願意讓我去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……イヤなものか」
1163 = "「……怎麼可能不願意」" 

# monologue
# JP: 自ら蓋してしまった言葉を、\nハチロクが、日々姫が、導いてくれた。
2342 = "我自己嚥下去的話語，八六和日日姬又引導著我說了出來。" 

# monologue
# JP: とてもうれしく、ありがたい。
2313 = "我很高興，也很感激。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのときには会って欲しい。紹介させて欲しい。\n僕の家族に――僕の家族を」
1493 = "「到時候，請讓我介紹你們給我的家人認識——請讓我向你們介紹我的家人」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1564 = "「嗯！」" 

# 【ハチロク】
# display as 八六
# JP: 「この上なく、光栄なことと存じます」
1752 = "「榮幸之至」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら、そんときに双ちゃんのお父さんとお母さんを、\n驚かせてしまわんよーに」
1863 = "「那到時候，希望我們不要嚇到了小雙的爸爸媽媽」" 

# monologue
# JP: ぽんっと軽く、背中を押される。\n真闇姉の優しい腕と、言葉とに。
2448 = "真闇姐溫柔的手，和她溫柔的話語，在我的背後推了一把。" 

# 【真闇】
# display as 真闇
# JP: 「ゆっくり、しっかり。\nいろんな話ば、できたらよかとね？」
1686 = "「所以你要慢慢兒地，跟他們多講講我們的事哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん――」
1554 = "「嗯——」" 

# monologue
# JP: だから、迷わず出かけられる。
2219 = "多虧了她們，我才能毫不迷茫地踏上回家的路。" 

# monologue
# JP: ナビならば、上空を何度も旋回し、\n僕をずうっと、待っていてくれる。
2633 = "Ｎａｖｉ已經在我上方盤旋了多次，它一直在等我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう――いってくる」
1828 = "「謝謝——那我走了」" 

# 【真闇】
# display as 真闇
# JP: 「はぁい、いってらっしゃい」
1588 = "「好的，一路平安」" 

# 【日々姫】
# display as 日日姬
# JP: 「いってらっしゃい、にぃに！　気をつけて！」
1406 = "「一路平安，阿哥！路上小心！」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。どうぞ――\nご安全に、素敵な旅を」
1885 = "「雙鐵少爺。祝您的旅程安全、愉快」" 

# monologue
# JP: （ザリっ）
2622 = "（沙沙）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅ」
1529 = "「呼」" 

# monologue
# JP: ……随分と田舎だったのだなと、ぼんやり思う。\n帝都から、ほんの一時間ほどの場所だというのに。
1061 = "……我漫不經心地想，這裡真的很偏僻。明明這裡離帝都只有不到一小時的路程。" 

# monologue
# JP: 御一夜を離れてからの六年半。\nその一時間を、僕は、どうしても使えなかった。
2213 = "在離開御一夜的六年半中，我無論如何都沒能鼓起勇氣花上這一小時回來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ひさしぶりです。父さん、母さん」
1092 = "「——好久不見。爸爸、媽媽」" 

# monologue
# JP: 平凡な、けれど初めて目にする墓石。\n父さんと、母さんと――路子との墓。
2572 = "這是我第一次見到這塊極其平凡的墓碑。這是爸爸、媽媽——和路子的墓。" 

# monologue
# JP: 僕の生家の、[そごう,1]十川家の墓。\n父さんと、母さんと、路子と――三人だけの、眠る墓。
2413 = "是我的親生父母，十川家的墓。是爸爸，媽媽和路子——他們三人的長眠之地。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや……路子はここにはいないんだよな」
1546 = "「啊，不對……路子不在這裡吧」" 

# monologue
# JP: 言った途端に、そうかと気づく。\n父さんと母さんだって、心配してるに決まってる。
2511 = "說到一半，我這才發覺，爸爸和媽媽一定也很擔心她。" 

# monologue
# JP: 路子と列車で出会ってすぐに、\nそのことを、真っ先に報告に来るべきであったと――
2519 = "跟路子在列車上相遇之後，我應該馬上就過來跟他們報告這件事的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ごめん。\n会いに来るのが、こんなに遅くなってしまって」
1604 = "「對不起，我這麼晚才來見你們」" 

# monologue
# JP: その一言が出ると自然に、頭が下がる。ゆえ、気づく。\n気づかなかった自分がひどく、恥ずかしくなる。
2510 = "說出這句話之後，我自然而然地低下頭。我意識到，未曾想到這件事，讓自己非常難為情。" 

# monologue
# JP: ――雑草だ。\nまずは、これを……お墓を、綺麗に掃除しよう。
1013 = "——先除除雜草吧。除了草之後，再好好打掃一下這塊墓地。" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………こんなものかな」
1161 = "「……差不多了吧」" 

# monologue
# JP: 商売上手というよりも、\n恐らくは、それも見込んでの出店なのだろう。
2482 = "與其說這裡的便利商店很會做買賣，倒不如說可能出售這些東西也是在這裡開店的目的吧。" 

# monologue
# JP: 霊園近くのコンビニエンスストアには、\n線香もライターも、菓子も生花も売っていた。
2320 = "我想起公墓附近的便利商店裡，擺著線香和打火機，還有點心、鮮花。" 

# 【双鉄】
# display as 雙鐵
# JP: 「気が利かなくて、ごめん」
1676 = "「我沒能想到這些，抱歉」" 

# monologue
# JP: 綺麗になったお墓にたっぷり、\nひしゃくの水を、何度も注ぐ。
2334 = "我用舀子舀起水，向乾淨的墳墓上灑了許多次。" 

# monologue
# JP: 小さなころの僕と路子が面白がって、\nひしゃくの取り合いをしていたことを、ふと思い出す。
2291 = "忽然，我想起小時候我和路子曾經搶著舀子玩的事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「父さんの実家の――[しこく,1]四國のお墓にも、ずっといけてない。\n本当にごめん。なにもかも、[おろそ]疎かにしてしまって」
1652 = "「我一直沒能去爸爸在老家四國的墓。真的很抱歉。實在是我太疏忽了」" 

# monologue
# JP: ……とはいえ同時に、仕方なかったとも思う。\nただ生きること――死なないことで、精一杯であったから。
1079 = "……雖說如此，我也覺得這是沒有辦法的事。因為，當時我光是讓自己活著——讓自己不要死去就已經竭盡全力。" 

# monologue
# JP: 路子のつないでくれた命を、無駄には出来ない。\nその一念で生きていただけの日々が余りに、長かったから。
2304 = "我不能浪費被路子救下的性命。僅靠這一份信念，我實在是生活了太久太久。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――それでも、もっと早くに来れた。\nもっと早くに、報告に、お願いに来なきゃいけなかった」
1408 = "「不——即便如此，我也該早些過來。我應該更早向你們報告，向你們請求的」" 

# monologue
# JP: 情けないなと、つくづく思う。\nけれどだからこそ、きちんと報告せねばならない。
2347 = "我越來越覺得自己太沒用了。但正因如此我才應該好好向雙親報告。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……路子は、まだ列車に乗ってるんだ。\n事故が起きる前の列車に――あのまま、ずうっと」
1189 = "「……路子現在還坐在列車上。坐在事故發生之前的列車上——一直保持著當時的樣子」" 

# monologue
# JP: 日陰が出来る。\nまた日向になる。
2076 = "上空投下影子。然後太陽又再次照射下來。" 

# monologue
# JP: 顔をあげれば、\nナビはゆっくりゆっくりと、僕の頭上を旋回している。
2325 = "我抬起頭，看到Ｎａｖｉ慢慢地在我頭上盤旋。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――きっと、迷っているんだと思う。\n僕が再会できたとき、路子は……喜んで、大泣きをした」
1097 = "「——我想，她一定正在迷茫。跟我再會的時候，路子她……高興得大哭了一場」" 

# monologue
# JP: 単なる夢だと思っていた。\nいいや、今でも――僕の夢、無意識の働きと思っている。
2328 = "我曾經以為那只是個夢。不，即使到現在——我也將其當做是夢，是潛意識的作用。" 

# monologue
# JP: 僕が見ている路子はきっと、僕の投影――\n幽霊だの、亡霊だのでは、恐らくない、と。
2336 = "我看到的路子一定是我的投影——恐怕並不是幽靈、亡靈一類的東西。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それからときどき夢で会うんだ。あの頃のままの路子に。\n路子は、僕を――断片的に、見てくれている」
1631 = "「從那之後，我經常在夢裡見到她。見到跟當時一模一樣的路子。路子她——看到了我生活的片段」" 

# monologue
# JP: けれども僕は、確かに知った。\nハチロクと、れいなと出会い、教えてもらえた。
2106 = "但我的確是知道了一件事。這是與八六、玲奈相遇之後，她們教會我的。" 

# monologue
# JP: “たましい”としかいいようのない何ものかが、\nこの世には、確かに存在するのだということを。
2423 = "某種被稱為“靈魂”的東西，雖然看不見摸不著，但卻的的確確地存在於這世上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「路子は、会いたがっているんだ。父さんと母さんに。\nだから列車で――ずっと、待っているのかもしれない」
1777 = "「爸爸媽媽，路子很想見你們。可能是因為這個——她才一直在列車裡等待」" 

# monologue
# JP: たましいは、熱のようなものだと感じる。\nそれが体を離れたのなら、はかなく蒸散するのだろうと。
2323 = "我感到，靈魂就像是熱量一樣的東西。如果靈魂離開身體，就會脆弱地消散。" 

# monologue
# JP: けれどももしも、それが僕に取りついてくれるのならば。\n僕とともに、路子の魂がいまもあるのだとするのなら――
2101 = "但如果她附在我身上的話，如果路子的靈魂一直和我在一起的話——" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、迎えにいってあげてほしいんだ。\nもし出来るなら、父さんと母さんに、路子を、迎えに」
1691 = "「所以，如果可以的話，爸爸媽媽，我希望你們來接她」" 

# monologue
# JP: 例え0.1\%でも、路子の魂が今もなお、\nこの世にあって、迷ってしまっている恐れがあるなら――
2484 = "萬一路子的靈魂還在這世上徘徊，哪怕只有０.１％的可能——" 

# monologue
# JP: 僕は路子を、必ず救い出さねばならない。\nいや、本当は――もっと早くに動き出さねばならなかった。
2306 = "我也一定要拯救路子。不，說真的——我本應該早點行動的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「頼みにくるのが、こんなにも、\n遅くなってしまったのは――」
1884 = "「雖然我來拜託你們這件事實在是太晚了——」" 

# monologue
# JP: （どくんっ）
2617 = "（噗通）" 

# monologue
# JP: 恐怖が、いきなり這い登ってくる。\n怖い、怖い、怖い、怖い。
2289 = "忽然，恐怖爬上了我的心。好可怕、好可怕、好可怕、好可怕。" 

# monologue
# JP: “何故怖いのか”、それを考えるのさえ怖い。\nひゅっ、ひゅっ。浅くて早い呼吸が聞こえ、息苦しくなる。
2576 = "連思考“為什麼會這麼可怕”本身對我來說都好可怕。我聽到自己急促的呼吸，感覺開始缺氧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――今は――」
1649 = "「我——現在——」" 

# monologue
# JP: ズラす。思考を。\n無理やりズラして、息苦しくない場所を求める。
2308 = "我努力思考別的事情。強迫自己轉移注意力，思索著怎樣才不會呼吸困難。" 

# monologue
# JP: ここまで来れるようになったと――自分で自分を評価する。\n今は、それだけで構わない。
2339 = "我能來到這個地方很了不起——我自己表揚著自己。現在，能做到這一步就不錯了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕は、今は。\n鉄道に関係する仕事をしているんだ」
1165 = "「……我現在，正在做鐵路相關的工作」" 

# monologue
# JP: 言える、それは。\n無理なく、苦もなく。
2571 = "這句話，我說得出口。不用勉強自己，也沒感到難受。" 

# monologue
# JP: 安堵したなら恐怖も薄れる、\n言葉がつぎつぎ、喉から出ていく。
2326 = "我放下心來，恐怖也變得稀薄。接著，話語不斷地從口中奔湧而出。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あれほど憎み、恨みに思っていた鉄道を――\n不思議なことに、今、僕は仕事にしているんだ」
1440 = "「以前，我曾經那麼痛恨，那麼討厭鐵路——但是不可思議的是，現在它卻成了我的事業」" 

# monologue
# JP: 御一夜のこと。\n御一夜鉄道のこと。
2319 = "我想著有關御一夜的事。有關御一夜鐵路的事。" 

# monologue
# JP: ポーレットのこと、れいなのこと、ハチロクのこと。\n話せば、そこからつながっていく。
2421 = "有關波萊特、玲奈、八六的事。說出口之後，接下來的話都變得流暢起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうして僕は、家族として迎えてもらえているんだ。\n右田の家に――真闇姉と、日々姫とに」
1767 = "「然後，我被她們當成家人，接進了那個家。右田家——跟真闇姐，還有日日姬一起」" 

# monologue
# JP: ……父さんと母さんに、\n義父さん、義母さんのことはなかなか、報告しづらい。
1073 = "……跟爸爸、媽媽報告養父養母的事，有點說不出口。" 

# monologue
# JP: だからこれは、次のときでもいいかと思う。\n思った瞬間、可笑しくなる。ふわりほのかに、幸せになる。
2364 = "所以，我想下次再講也可以。想到這裡的瞬間，我不由得感到可笑。我感到了淡淡的溫暖與幸福。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だけどね――父さん、母さん。\n僕の両親は、やっぱり、父さんと母さんなんだ」
1443 = "「但是——爸爸、媽媽。我真正的父母，還是你們二位」" 

# monologue
# JP: だって、こんなに甘えている。\n“できない自分”を、これほど素直に許せている。
2209 = "因為，他們對我如此寬容。就這麼直接原諒了沒用的我。" 

# monologue
# JP: 感じた瞬間、こみ上げてくる。\n大きな大きな塊が、自分の底からこみ上げてくる。
2570 = "這份感受，讓我心裡一股遮天蔽日揮之不去的感覺湧了上來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――僕は――頑張ってるんだ。\n頑張っていて、けれども全然、足りてないんだ」
1647 = "「我——我正在努力。雖然我在努力，但是努力得還不夠」" 

# monologue
# JP: 言ってしまえば、力が抜ける。\nどうしようもなく不安になる。
2512 = "說著，我的力氣消失了。我感受到一種無法言說的不安。" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道を、復活させること。みんなはそれを望んでる。\n僕は、だから、それに応えようとしている」
1577 = "「大家都希望能復活鐵路。所以我想回應大家的期望」" 

# monologue
# JP: 僕は鉄路と、レールだと、言ってもらった。\nそれが自らのあり方なのだと、納得できた。
2228 = "她們說，我就是鐵軌。我明白了，原來這就是我的存在方式。" 

# monologue
# JP: だから僕は、歪み得ない。だから僕は、ゆるみ得ない。\nみんなの前では、決して、決して――何があろうと。
2360 = "所以，我不會扭曲。所以，我不會動搖。我絕對不會在大家面前扭曲或者動搖——無論發生什麼事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕には、大きすぎる目標だ。\n僕の力では、及ぶはずもない目標なんだ」
1191 = "「……這個目標，對我來說太過龐大了。憑我一個人的力量，是不可能抵達這個目標的」" 

# monologue
# JP: それでも、果たすまでやらねばならない。\nくじけること、膝をつくことは許されない。
2159 = "即便如此，我也必須達成這個目標。我不能倒下，也不能停止。" 

# monologue
# JP: 汰斗さんが、そうすれば生き延びられると教えてくれた。\nそうすることが、僕の贖罪で、報恩なのだと。
2433 = "汰斗老爺告訴過我，這樣就能夠活下去。他說，這就是我的贖罪，我的報恩。" 

# 【双鉄】
# display as 雙鐵
# JP: 「無理だと言えない。出来ないとは言えない。\n――いや。そう思うことさえ、普段の僕には、叶わない」
1657 = "「我不能說我做不到。不能說我不行。——不。平時的我，根本就不能有這些想法」" 

# monologue
# JP: 言ってしまえば、止まらなくなる。
2067 = "一旦說出來，就剎不住車了。" 

# monologue
# JP: 言えば恐らく自分が崩れる――\nそうと理性が警告しても。
2068 = "一旦說出來，恐怕我就會崩潰——我的理性如此警告著我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうだ。挫けぬように、思考さえ、\n僕は、ガチガチに縛っているんだ」
1558 = "「嗯——對啊。為了不讓自己停下，我甚至牢牢地束縛住了自己的思考」" 

# monologue
# JP: 自覚してしまった瞬間に、\n足元全てが、ぐらぐらと、崩れ落ちていく感覚がある。
2259 = "察覺到這一點的瞬間，我感覺天旋地轉，彷彿就要這麼倒下去。" 

# monologue
# JP: 吐き気がする。体が震える。喉がカラカラに乾いている。\nだからか――涙はでてこない。
2239 = "好想吐。我的身體在顫抖。喉嚨乾得要命。或許正因如此——我流不出眼淚。" 

# monologue
# JP: （ふっ――）
2614 = "（呼——）" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1090 = "「——啊」" 

# monologue
# JP: 影が落ち。空を見上げる。\nナビは変わらず、旋回している。
2278 = "影子落下來。我仰望天空。Ｎａｖｉ仍然在我頭上盤旋。" 

# monologue
# JP: 何も変わらず、ずっと変わらず、\nただ僕を――愚直に、見守り続けてくれている。
2066 = "一成不變，永遠不變，它不假思索地，忠誠地守望著我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が、ここに来るのが怖かったのは――」
1664 = "「我害怕來到這裡，是因為——」" 

# monologue
# JP: それで、落ち着く――落ち着ける。\n半ば無理やり深呼吸すれば、体の震えもいくらか収まる。
2205 = "因為它，我冷靜下來——因為它，我才能冷靜。我逼迫自己深呼吸，身體的顫抖多少有所好轉。" 

# monologue
# JP: 手先の痛みを不意に感じて、手を解く。\nいつの間にひどく冷え切って、握りしめきっていた手を。
2089 = "不知不覺，我感受到指尖的疼痛，於是鬆開手。原來我緊緊握成拳頭的手，不知何時已經變得冰冷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……昔の自分に会うことが、\n怖かったからなのかもしれない」
1168 = "「……或許是因為，我害怕與過去的自己相遇」" 

# monologue
# JP: いま、ぶり返してきた、“昔の自分”。\n何も知らない、無邪気な――単なる子供だった、僕。
2577 = "過去的自己如今又要復甦了。那個一無所知，單純無邪——只是個孩子的自己。" 

# monologue
# JP: 義務感でギチギチに縛らなくとも――父と母と路子とが、\n注いでくれる愛情だけで、立てていた僕。
2581 = "那個不必用責任感緊緊束縛住自己——僅靠父母和路子對我傾注的愛，也可以筆直站立的自己。" 

# 【双鉄】
# display as 雙鐵
# JP: 「昔の自分を思い出したら、二度と頑張れなくなると――\nこころの底が、それを恐れてたのかもしれない」
1518 = "「可能我的心底恐懼著——萬一我回想起過去的自己，就無法繼續努力了」" 

# monologue
# JP: 実際に、あれほど体が、こころが震えた。
2454 = "確實，我的身體都顫抖得那麼厲害了。" 

# monologue
# JP: 凍えてしまう冬の夜から、温かい家にようやく戻り――\n安心できた瞬間不意に、寒さを思い出すかのように。
2268 = "就好像在冰冷的冬夜，好不容易回到溫暖的家——在放下心來的瞬間，又回想起了外面的寒冷一般。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――だけどね、父さん、母さん。\nどうやら、それは、杞憂だったみたいだ」
1088 = "「——但是，爸爸、媽媽。看來我的擔心是多餘的」" 

# monologue
# JP: だって、止まった。\n震えを止めた。
2211 = "因為，我已經不再顫抖了。" 

# monologue
# JP: 崩れてしまいたかった膝を――\n見えないけれど暖かな手が、支えてくれた。
2224 = "天旋地轉，馬上就要倒下的我——被雖然看不見，卻溫暖的手支撐住了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「帰れる場所が、今はあるから。\n新しい僕の家も、やっぱり、僕の家なんだ」
1574 = "「因為，我現在有容身之所。我現在的新家，也一樣是我的家」" 

# monologue
# JP: だから、戻れる。\n“昔の僕”を思い出しても――“今の僕”へと。
2373 = "所以，我能恢復。即使回想起過去的自己，也能恢復成現在的自己。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、今の家を好きなんだ。\n今の家族を、今の仲間を、とても大事に思っているんだ」
1667 = "「我很喜歡自己現在的家。我很珍惜自己現在的家人，現在的同伴」" 

# monologue
# JP: 頑張ったから、居場所を作れた。\n頑張ったから、たくさんの笑顔と向き合えた。
2208 = "因為我很努力，所以得到了容身之所。因為我很努力，所以能面對種種笑容。" 

# monologue
# JP: きっかけがどれほど歪であろうと、\n強いられた物であろうとも、そこを見失うことは無い。
2093 = "不論相遇的原因有多麼扭曲，多麼身不由己，我都不會丟掉自己的容身之處。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、僕は――“今の僕”を、好きなんだ」
1694 = "「所以，我——很喜歡現在的自己」" 

# monologue
# JP: そうと確信できたから、確信できるようになったから。\nあるいは僕は今日ここへ、やっと、来れたのかもしれない。
2206 = "因為我一直如此確信，因為我能夠如此確信。或許，我竭盡全力，才得以今天來到這裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それに、ね。最近は――“今の僕”も変わってきたんだ。\n『みんながそれを望むから』っていうだけじゃなく」
1808 = "「而且，最近——現在的我也改變了。我不再單純按照大家的期望行事」" 

# monologue
# JP: だって、ひとつだけは変わらないから。\n産まれたときから、今に至って、死ぬ時にまで。
2210 = "因為，只有一件事是不會改變的。從出生到現在，再到死亡。" 

# monologue
# JP: 僕と路子は、ずっとふたごで。\n僕は、路子の――おにいちゃんだから。
2311 = "我和路子永遠都是雙胞胎。我永遠是路子的哥哥。" 

# 【双鉄】
# display as 雙鐵
# JP: 「路子に――路子だけじゃなく、父さんと母さんにも、\nあの日の旅を……今度こそ、楽しんでほしいんだ」
1622 = "「希望這次，路子——不光是路子，還有爸爸媽媽，一定要快快樂樂地享受那天的旅程」" 

# monologue
# JP: 終えられなかった家族旅行を。\n越えられなかった橋を越え――終着駅へと、旅して欲しい。
2257 = "完成那未能完成的全家旅行。希望他們渡過那座沒能渡過的橋——到達終點站。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは他の誰のでもない、“今の僕”自身の望みだ。\nだから必ず叶えてみせる。どれほど果て無い道のりでも」
1849 = "「這不是任何其他人的願望，而是現在的我如此期望。所以，我一定會實現這個願望。不管實現它的路有多漫長」" 

# monologue
# JP: （ざあっ）
# 2622 = "（沙沙）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1534 = "「唔！」" 

# monologue
# JP: 風が吹く。\n霊園を囲む木々を揺らして、ざわめかせる。
2599 = "風吹拂著。圍繞著公墓的樹木搖晃著，發出沙沙的聲音。" 

# monologue
# JP: ナビは変わらず、僕の頭上を旋回している。\n……その他に何も聞こえない。誰の声さえ、響かない。
2630 = "Ｎａｖｉ仍然在我頭上盤旋。……除此之外沒有其他聲音，一片寂靜。甚至沒有任何人的聲音。" 

# monologue
# JP: （……もしか、したら）
2602 = "（……說不定）" 

# monologue
# JP: ぞくりと、背筋に寒気を感じる。
2317 = "我忽地背後發涼。" 

# monologue
# JP: 声など聞こえるはずもない――\nその当然の状況が、急に不安になってくる。
2080 = "不可能聽到別人的聲音的——這明明是理所當然的，我卻忽然變得不安。" 

# monologue
# JP: （父さんと、母さんも――\n列車に乗って、さまよい続けているのかもしれない）
2625 = "（說不定爸爸和媽媽——也坐在列車上，至今仍然在不斷遊蕩）" 

# 【双鉄】
# display as 雙鐵
# JP: 「父さん――母さん――」
1773 = "「爸爸——媽媽——」" 

# monologue
# JP: ……もちろん、返事は帰ってこない。\n当然だ。
1069 = "……當然，沒有人回答我。理所當然。" 

# monologue
# JP: 当然なのに、寂しくなる。\n当然なのに、不安になる。
2411 = "明明是理所當然，我卻感到寂寞。明明是理所當然，我卻感到不安。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の声が――届いていればいいのだけれど。\n路子は、だって、ずっと一人でさまよってるから」
1598 = "「如果我的聲音能讓他們聽見就好了——路子一直在獨自遊蕩啊」" 

# monologue
# JP: もしも届いていないなら――\n思った瞬間、立ち上がっている。
2243 = "如果他們沒有聽到我的聲音——想到這裡的瞬間，我站起身。" 

# monologue
# JP: 立たねばならない。そうであるなら、なおさらのこと。\n父と母とを、僕が、見つけ出さねばならない。
2314 = "我必須要站起身。既然是這樣，我就更加應該找到爸爸媽媽了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「久しぶりに会えて――話ができて、嬉しかった。\n話したいこと。もっとたくさんあったのだけれど」
1581 = "「好久不見——能和你們說話，我非常開心。不過，其實我還有更多想說的話」" 

# monologue
# JP: けれども今は、その時ではない。\n届いているかを疑いながら――そんな話は空虚であるから。
2118 = "但現在還不是時候。雖然，我也懷疑著這些話能否被他們聽到——如果聽不到的話就太空虛了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「また来る、必ず――\nああ」
1675 = "「我會再來的，一定——啊」" 

# monologue
# JP: いつの間に、墓石がカラカラに乾いている。\nだから、たっぷりと水をかける。
2092 = "不知何時，墓碑已經乾透了。所以，我又淋上更多的水。" 

# monologue
# JP: ……届いてないかもしれないと、\nそう思っても、放ったままでは帰れない。
1078 = "……雖然他們可能並不能感受到，但我還是不能放著幹掉的墓碑這樣回去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――それじゃあ、また。\n今度はもっと、しっかり話そう」
1104 = "「——那麼，下次見。下次我會多聊一些的」" 

# monologue
# JP: ……ひどく、疲れた。\n口を開くのもおっくうなほど。
1053 = "……好累，累到甚至不想張嘴。" 

# monologue
# JP: けれども、寂しい。\nひとりでいるのを、どうしようもなく辛いと感じる。
2110 = "但是，也好寂寞。我感受到，孤獨一人是那麼難過。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……なぁ、ナビ」
1166 = "「……我說，Ｎａｖｉ」" 

# monologue
# JP: だから、開く。\nこれほどに重く感じていても、瞳を、そして唇を。
2374 = "所以，我開了口。即使感覺如此沉重，我還是強迫讓眼睛和嘴唇動起來。" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい。なんでしょう、双鉄様」
1663 = "「我在。雙鐵少爺，有什麼事嗎」" 

# monologue
# JP: そうすればナビは答えてくれる。\nいままでとまったく変わらずに。
2383 = "於是，Ｎａｖｉ回答了我。一如往常。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――今の僕は、弱ってみえるか？」
1100 = "「——現在的我，看起來很脆弱嗎？」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「いいえ、双鉄様。\n体温、脈拍、呼吸、全てが正常の範囲内にあります」
1759 = "「沒有，雙鐵少爺。您的體溫、脈搏、呼吸都在正常範圍內」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうではなく。バイタルではなく――」
1548 = "「啊，我不是這個意思。不是指我的生命徵象——」" 

# monologue
# JP: メンタル面で、と、言いかけ言葉を飲んでしまう。
2472 = "而是精神狀態——我把後半句話咽了下去。" 

# monologue
# JP: そう問うて、\nハチロクならば、きっと答えてくれようが――
2247 = "如果是八六，一定能回答我這個問題，但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……墓参をして、僕は、ひどく混乱したのだ。\n昔の僕に、ひとときであったが、戻ってしまった」
1171 = "「……掃過墓之後，我感覺非常混亂。雖然只是一會，但我變回了過去的我」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「昔の双鉄様、ですか？」
1858 = "「過去的雙鐵少爺？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1563 = "「嗯」" 

# monologue
# JP: ナビは、ナビだ。\n常に、少しも変わらない。
2649 = "Ｎａｖｉ還是Ｎａｖｉ。它總是那樣，絲毫沒有改變。" 

# monologue
# JP: ゆえに伝わらぬこともある。\n知っているから、ゆっくり意味を噛み砕いていく。
2370 = "所以，我知道有些話它是聽不懂的。因此，我慢慢想著如何向它解釋。" 

# 【双鉄】
# display as 雙鐵
# JP: 「幼いころの僕は――当然ながら、単なる子供だったのだ。\nわがままで、甘えん坊で、守られることが当然だった」
1608 = "「小時候的我——當然了，那時我只是個孩子。又任性，又愛撒嬌，被人守護是我的日常」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい」
# 1731 = "「是啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「けれど、あの事故に遭い、僕は変わった。\n生きていくために、変わらなければならなかったから」
1447 = "「但是，遇到那次事故之後，我變了。因為為了活下去，我不得不改變」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「わがままで甘えん坊で守られることが当然の状態から\n変化をされたのであれば――」
1414 = "「不得不從又任性，又愛撒嬌，以為被守護是理所當然的狀態中改變的話——」" 

# monologue
# JP: 不意に、沈黙。\nナビはいったい、何を演算しているのだろう。
2288 = "忽然降臨的沉默。不知道Ｎａｖｉ到底在演算著什麼呢。" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「――わがままではなく。甘えることをせず。守られない。\nそういう風に、双鉄様は変わられたのですか？」
1086 = "「——不任性，不撒嬌，不被人守護。雙鐵少爺，您是變成這樣的人了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……多分、な。それがどこまで果たせているかを、\n僕自身では計れんが」
1158 = "「……大概吧。雖然我不知道自己到底有了多大程度的變化」" 

# monologue
# JP: けれども、尽くした。\nそのときどきの僕の全てをフルに使って。
2114 = "但是，我盡力了。我每時每刻都用盡自己全部力氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしなければ、望まれることを果たせなかった。\n望まれることを果たせなければ、生きられなかった」
1594 = "「如果不那麼做，我就無法實現別人對我的期望，如果不能實現別人對我的期望，我就無法存活下去」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様の生命は、ナビが、いつでも守っておりますが」
1751 = "「有Ｎａｖｉ一直守護雙鐵少爺的性命」" 

# 【双鉄】
# display as 雙鐵
# JP: 「生命反応としての生ではなくて――」
1654 = "「我不是說生命徵象意義上的活著——」" 

# monologue
# JP: ナビの受け答えは、人間には有りえぬ程に直線的だ。\nそれゆえときに、普段は考えぬことを考えさせられる。
2639 = "Ｎａｖｉ的回答比人類直接太多了。因此，她會讓我思考平時不會思考的事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ではなく――\nああ、つまり。人間としての、社会的な生という意味だ」
1418 = "「不是那個意思——其實就是，作為人類活著，社會意義上的生存」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「社会的な生とは、どのような意味でしょうか」
1802 = "「社會意義上的生存是什麼意思呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「人とつながって、人に必要とされて生きるという意味だ。\nただ庇護を受けることが、僕には耐えられなかったゆえ」
1616 = "「就是與他人聯繫，被他人需要的意思。因為，我不能再忍受被別人單方面保護的生活了」" 

# monologue
# JP: そうだ。確かにそう考えた。\nあの頃から、事故被害者として扱われることは嫌だった。
2415 = "是的。我的確是這麼想的。從那時起，我就不喜歡被人當成事故受害者對待。" 

# monologue
# JP: “右田の家にいる価値”を示さなければ、\n日々の食事も施しとなると、少年ながらに考えたのだ。
2266 = "少年時的我認為，如果不展現出自己在右田家的價值，那每天的食物也都成了施捨。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、汰斗さんに[こいねが]希った。僕は願って――\n『人として生きていくための方法』を、教わったのだ」
1698 = "「所以，我向汰斗老爺請求——拜託他教我“作為人類活下去”的方法」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「それは、どのような方法だったのですか？」
1869 = "「那是什麼樣的方法？」" 

# monologue
# JP: 承知しているはずのことを、ナビは問う。\nだから答える。単なる過去の事実を、問われたままに。
2636 = "Ｎａｖｉ明知故問。所以我回答了它。照原樣單純回答過去的事實。" 

# 【双鉄】
# display as 雙鐵
# JP: 「右田の役に立つことだ。誰かの役に立つことだ。\n望まれたことを、必ず叶えて、示すことだ」
1615 = "「就是為右田家派上用場，為他人派上用場。就是，一定要實現別人想讓我做的事，展示我的用處」" 

# monologue
# JP: だから、そうした。\nそうし続けたから、生きられた。
2358 = "所以我這樣做了。我不斷這樣做，才活了下來。" 

# monologue
# JP: 路子の命と引き換えにして守ってもらった僕の命の。\n価値をそうして――僕は、少しでも高めたかった。
2353 = "我這條命是路子犧牲性命才換回來的。我希望能儘量提高這條命的價值。" 

# 【双鉄】
# display as 雙鐵
# JP: 「示し続けて、示し続けて、示し続けて――\n僕は、今の僕になれた。だから僕は、僕を恥じない」
1416 = "「不斷展示、不斷展示、不斷展示——我才成為了今天的我。所以，我不會因自己而羞愧」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい。双鉄様は、とてもお強く成長されたと、\nナビも、そのように観測します」
1585 = "「好的。Ｎａｖｉ也觀測到了，雙鐵少爺成長得非常堅強」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1563 = "「嗯」" 

# monologue
# JP: ナビは、僕のメンタルまでには気を配れない。\nゆえに決して、世辞は言わない。
2628 = "Ｎａｖｉ並不會照顧我的感受。所以絕對不會對我說客套話。" 

# monologue
# JP: だから、嬉しい。\n今まで重ねてきたことが、正しかったと評価され。
2363 = "所以，我很高興。因為它告訴我，我迄今為止的所作所為是正確的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう育てたと、思ったのだ。だから、墓参も平気だと\n――いつもの僕で挨拶できると、思ったのだが」
1670 = "「我想我就是成長為了這樣的人。所以我本以為自己可以來掃墓——能夠以平時的模樣問候父母」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「平気ではいられなかったのでしょうか？」
1497 = "「原來您沒能保持自己平時的樣子嗎？」" 

# monologue
# JP: ……ずっと頭上で、ナビは見ていた。\n僕をモニターしつづけていた。
1081 = "……Ｎａｖｉ一直在頭上看著我。一直監視著我。" 

# monologue
# JP: にもかかわらずの質問に、\n僕の方が、不思議な気持ちにさせられる。
2435 = "然而，它還是向我提問。這反而讓我感覺不可思議。" 

# 【双鉄】
# display as 雙鐵
# JP: 「見ていただろう。僕は、ひどく混乱した。\nいつもの僕なら吐かない弱音を、無様に漏らした」
1454 = "「你看到了吧。我陷入了嚴重的混亂。甚至毫無形象地吐露著平時的我絕不會說的喪氣話」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「確かに弱音を吐かれていました」
1797 = "「確實，您說了喪氣話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「昔の僕に、ひととき、戻ってしまった気がして――\nだから、そうだな……今も、少しだけ不安なのだ」
1644 = "「感覺我好像變回了過去的我——所以……我現在也有點不安」" 

# monologue
# JP: なるほど、聞き方が悪かった。
2161 = "原來如此，是我的問法不對。" 

# monologue
# JP: 最初からこう尋ねていれば、\nナビはすぐさま、正確な評価をくれただろう。
2241 = "如果一開始就這麼問，Ｎａｖｉ一定會對我做出正確的評價吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、改めてナビに問おう。\n今の僕は、普段の僕と変わらずいるか？」
1695 = "「所以，我再問你一次。現在的我跟平時的我一樣嗎？」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様は、双鉄様です」
1887 = "「雙鐵少爺，您就是您」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1587 = "「好的」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「今ここにいる双鉄様も、\nお墓の前で弱音を吐かれていた双鉄様も、変わりません」
1779 = "「現在這裡的雙鐵少爺，和在墓前說著喪氣話的雙鐵少爺都是一樣的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
1535 = "「唔！？」" 

# monologue
# JP: 覚えた安堵がぐるりとひっくり返される。
2153 = "剛放心下來的我，心情一百八十度轉彎。" 

# monologue
# JP: ナビが下す評価ならば妥当――\nわかっているのに、納得できない。
2642 = "Ｎａｖｉ的評價一定沒問題——我明明知道這一點，卻難以接受。" 

# 【双鉄】
# display as 雙鐵
# JP: 「同じといったか？　今の僕と――\nあの頃の、ただの子供であった僕とが」
1457 = "「你說，現在的我，和當時只是個孩子的我一樣？」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ナビは、\n初めてお迎えした以前の双鉄様のことを存じ上げません」
1893 = "「Ｎａｖｉ並不知道您在與我相遇之前的樣子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……それはそうだ。そうだよな」
1541 = "「啊……那當然了。當然是啊」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ですのでナビは、ナビが観測し、記録している範囲で、\n双鉄様のご質問に返答いたします」
1704 = "「所以，Ｎａｖｉ會在自己觀測、記錄的範圍內，回答您的問題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1563 = "「嗯」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様は、間違いなく強く成長されました。\n以前に出来なかった事を、多くできるようになりました」
1757 = "「毫無疑問，雙鐵少爺已經成長為強大的人了。很多過去做不到的事，您現在已經能夠做到了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1563 = "「嗯」" 

# monologue
# JP: ……それもまた、確かな事実だ。\n例えば今日の墓参ひとつをとってみても。
1075 = "……這也是確切無疑的事實。比如說今天這次掃墓。" 

# monologue
# JP: なんとか行こうと試みて、けれども果たせず諦めた。\nそんな日がいくつもあったことを、ナビだけは知っている。
2329 = "我曾經嘗試過許多次，但每次都放棄了。只有Ｎａｖｉ知道我嘗試過多少次。" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ですが、双鉄様の――OS的な部分には、\n大きな変化は発生していないと、ナビは観測します」
1516 = "「可是根據Ｎａｖｉ的觀測，雙鐵少爺——類似操作系統的部分並沒有發生大的變化」" 

# 【双鉄】
# display as 雙鐵
# JP: 「OS的な部分」
1709 = "「操作系統」" 

# monologue
# JP: 突拍子もない言葉がかえって、理解を助ける。
2573 = "這種奇怪的形容反而便於我的理解。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、つまりは本質か。出会った頃も、今も。\n僕の本質には変化は無いと、ナビはみるか」
1735 = "「是指我的本質吧。就是說，你認為從相遇時起到現在，我的本質都沒有發生變化嗎」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「単なる物品による、一面からだけの観測ですので」
1850 = "「這只是一介物品的片面觀測而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「一面なものか。文字通りの立体視ではないか」
1641 = "「怎麼會片面呢，很全面啊」" 

# monologue
# JP: そこを疑う余地はない。\nだからこそ……困惑が、理解に遅れてやってくる。
2569 = "這一點毋庸置疑。正因如此，我才能理解，並隨之感到困惑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……しかし、ナビにはそう見えるのか。\n事故直後の僕と、今の僕では――――ああ、いや」
1182 = "「……話說回來，原來Ｎａｖｉ是這麼看我的。事故之後的我，和現在的我——啊，不對」" 

# monologue
# JP: そうかと思えば、苦笑が浮かぶ。
2438 = "疑慮突然被打消，我露出苦笑。" 

# monologue
# JP: なるほど、それは恐らく、\n“ナビにしかし得ない”評価であろう。
2162 = "原來如此，這恐怕是只有Ｎａｖｉ才能作出的評價吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ナビには甘えてきたものな。\nナビの前では、わがままも言うし、弱音も吐く」
1784 = "「看來，我一直以來都太依賴Ｎａｖｉ了。總會在你面前說任性的話和喪氣話」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい。そうですね双鉄様」
1730 = "「是啊。雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「であらば、その評価も当然か」
1853 = "「這麼說來，你給我這樣的評價也是理所當然」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「いえ、違います双鉄様」
1422 = "「並不是這樣，雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！？」
1538 = "「唔？」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ナビがさほど変化をしていないと評価したのは、\n感情的な行動の有無という一面によってではなく――」
1903 = "「Ｎａｖｉ認為您沒有發生變化的，並不是從有沒有感情用事的角度而言——」" 

# monologue
# JP: 珍しく、ナビが沈黙する。
2650 = "Ｎａｖｉ陷入了沉默。" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「――双鉄様に、\nナビが質問をしてもよろしいでしょうか？」
1105 = "「——雙鐵少爺，Ｎａｖｉ想問您一個問題，可以嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「構わん。なんだ？」
1514 = "「可以啊。什麼問題？」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「何故、双鉄様は、今の双鉄様と過去の双鉄様とに、\n顕著な変化が認められるという評価を望まれますか？」
1888 = "「雙鐵少爺，您為什麼希望獲得自己發生了顯著變化的評價呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
# 1535 = "「唔！？」" 

# monologue
# JP: 問われて、気づく。
2475 = "聽它這麼問，我才發現。" 

# monologue
# JP: ナビの評価を認めながらも、それに納得できぬのは、\nなるほど――『変化があると評価されたい』故だろう。
2345 = "我認同Ｎａｖｉ的回答，卻又難以接受，原來如此——是因為我希望它承認我發生了變化。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうだな。僕自身としては、大きく変化を\nしてしまったかと――恐らく、感じているからだ」
1175 = "「……是啊。恐怕這是因為——我感覺自己發生了巨大的變化」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「どのようにでしょうか？」
1722 = "「是什麼樣的變化呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さっきも言ったが――幼いころの僕は、\nわがままで、甘えっ子で、弱かった」
1494 = "「剛剛也說過——小時候的我，又任性、又愛撒嬌、又弱小」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい」
1739 = "「是的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その状態で事故に遭い、僕は、変わった。\nナビと出会った当初の僕は――」
1855 = "「遇到那次事故之後，我變了。在與你相識之前，我是——」" 

# monologue
# JP: 思い出すだけでこころが痛む。\nかさぶたに、じくりと新しい血が滲む。
2141 = "光是想起當時的事，我的心就好痛。結痂的傷口又滲出了新的血跡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道を恨み、人を憎み。どうしようも無い状態だった。\n――生きながらにして死んでいたと、今なら思う」
1781 = "「當時的我憎恨鐵路、憎恨他人，狀態非常糟糕……現在想來，當時的我只是一具行屍走肉」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい」
# 1739 = "「是的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、汰斗さんに教えられ。真闇姉に守られ、\n日々姫の目に見開かされて――僕は、変わった」
1445 = "「但是，汰斗老爺教會了我。真闇姐守護了我。日日姬點醒了我——我變了」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい」
# 1739 = "「是的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「誰かの役に立つことで、もう一度の生を生き始めた。\nゆえ……やはり僕は、大きな変化を遂げている、と」
1810 = "「能夠為他人派上用場的我，又開始了第二次人生。因此……我還是發生了很大的變化」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様」
1886 = "「雙鐵少爺」" 

# monologue
# JP: ナビの声音は、一切の変化というものを見せない。\nけれども、感じる。焦り、あるいは怯えに近い何かを。
2641 = "Ｎａｖｉ的聲音毫無變化。但我能感受到。它聲音裡近似於焦急，或是膽怯的某種情感。" 

# monologue
# JP: ナビは恐らく大事なことを――\n極めて重要な何かを僕に、言おうとしている。
2295 = "恐怕Ｎａｖｉ是想要——對我說出某件非常重要的事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　ナビ」
1432 = "「什麼事？Ｎａｖｉ」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「過去の双鉄様と、今の双鉄様を『違うものだと』、\n双鉄様は評価されることを望んでいます」
1642 = "「您希望Ｎａｖｉ給出評價，現在的雙鐵少爺與過去的雙鐵少爺不同」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん。\n言われてみれば、そのとおりだ」
1726 = "「是啊……嗯。這麼一說，你確實說得沒錯」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「それは恐らく、双鉄様にとっての、重大な危機に。\n生命に纏わる危機に繋がりかねない欲求です」
1851 = "「這對於雙鐵少爺來說，恐怕是重大的危機。這期望恐怕是和與您性命攸關的危機聯繫在一起的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
# 1535 = "「唔！？」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ですので、ナビは、双鉄様に、\n強く推奨をいたします」
1703 = "「所以，Ｎａｖｉ向雙鐵少爺提出強烈建議」" 

# monologue
# JP: ナビは決して嘘をつかない。\n冗談など、言おうとしても言えないだろう。
2644 = "Ｎａｖｉ絕對不會說謊。就算它想開玩笑，恐怕也沒辦法開。" 

# monologue
# JP: ならば、その認識は、少なくともナビにとっては真実だ。\nそうして僕は――ナビを信じる。
2376 = "所以，至少對於Ｎａｖｉ自己來說，這認知是真實的。於是我選擇相信Ｎａｖｉ。" 

# 【双鉄】
# display as 雙鐵
# JP: 「推奨するとは、いったい何をだ」
1433 = "「什麼建議？」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様の成長は、ナビも観測しています。\nその成長は、双鉄様の生命維持に有意だとも認識します」
1894 = "「Ｎａｖｉ也觀測到了雙鐵少爺的成長。Ｎａｖｉ認為，這成長對於雙鐵少爺維持生命是有意義的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1563 = "「嗯」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「その成長を著しく促したのは、双鉄様の身の回りの、\n右田家や、御一夜鉄道に纏わる人々だと観測します」
1901 = "「Ｎａｖｉ觀測到，雙鐵少爺身邊的人，包括右田家和御一夜鐵路相關的人們，顯著地促進了您的成長」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ――そうだろうな」
1560 = "「嗯——應該是的」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ですので双鉄様は。そうした人たちと、\nより深く向き合うようになさってください」
1700 = "「所以，雙鐵少爺。Ｎａｖｉ建議您與那些人們進行更深入的交流」" 

# 【双鉄】
# display as 雙鐵
# JP: 「向き合う……真闇姉や日々姫――\nあの頃の僕を、知っているような人たちとか？」
1427 = "「交流……是指真闇姐和日日姬——是指了解那時候的我的那些人嗎？」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「いいえ双鉄様。そうした方々ももちろん含みますが、\nそれだけではない方々ともです」
1421 = "「不，雙鐵少爺。當然那些人也包括在內，但也不限於此」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうと……ハチロクなどともか」
1617 = "「就是說……八六等人也包含在內嗎」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい。ハチロクやポーレット様。れいな、稀咲様。\n凪様、ふかみ様。そうした方々とも、必ず」
1755 = "「正是，八六和波萊特小姐。玲奈、稀咲小姐。凪小姐、深美小姐。請務必跟這些人交流」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪やふかみともか。より深く向き合う――とは、\nそれは例えば、二人で過ごす時間を作るような感じか？」
1833 = "「跟凪和深美她們也要更深入地交流嗎——也就是說，增加二人獨處的時間？」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「具体的な方法は、双鉄様にお任せします。\nとにかく、成長を促した要素と深く向き合って下さい」
1485 = "「具體的方法就交由雙鐵少爺自己決定了。總之，請與能促進您成長的要素多加交流」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1533 = "「唔」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「その行為は、双鉄様がお抱えになった重大な矛盾を\n解消するために役立つものと、ナビは推測します」
1462 = "「依Ｎａｖｉ推測，這種行為有利於雙鐵少爺消除您背負的巨大矛盾」" 

# 【双鉄】
# display as 雙鐵
# JP: 「重大な矛盾……」
1620 = "「巨大矛盾……」" 

# monologue
# JP: 成るほど確かに、矛盾かもしれん。\n“過去の自分”と“今の自分”を、分かつことは。
2441 = "的確，把過去的自己和現在的自己分開看待，這或許是矛盾也說不定。" 

# monologue
# JP: が、あの事故という、そして路子の喪失という、\n極めて大きな断絶が――いや――
2107 = "但我經歷了那次事故，失去了路子，受到了巨大的衝擊——不對——" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1674 = "「我明白了」" 

# monologue
# JP: ……今の僕が考えたところで、堂々めぐりだ。\nひとつの答えを、はっきり望んでいるのだから。
1060 = "……我剛才在思考的事，完全就是原地兜圈子。因為，我太想要一個清楚的答案了。" 

# monologue
# JP: ナビのいう“重大な矛盾”を、\n強化してしまうだけの結果しか招き得ぬだろう。
2354 = "我這種思考只會進一步增大Ｎａｖｉ所說的巨大矛盾。" 

# 【双鉄】
# display as 雙鐵
# JP: 「他ならぬナビ先生のお見立てだ。\nいわれたとおりにしてみよう」
1900 = "「Ｎａｖｉ老師教訓的是。我謹遵教誨」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「そうしていただけるのでしたら、ナビも、\nナビの職務を全うできる可能性を向上させられます」
1596 = "「如果您能辦到的話，Ｎａｖｉ也能更好地完成職責」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ナビの職務か」
1898 = "「Ｎａｖｉ的職責嗎」" 

# monologue
# JP: 僕の命を救うこと。\nそれがナビに刻み込まれた、唯一・至上の命令だ。
2382 = "拯救我的生命。這就是刻在Ｎａｖｉ程序中，唯一且至高的命令。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……考えてみれば、常にだな。\n常に、僕は、ナビに守られ続けてきている」
1145 = "「……仔細一想，我總是被你守護著」" 

# monologue
# JP: 最悪の底にいたころから、\n今もこうして――そうして恐らく、将来も。
2280 = "從我身處於最深的黑暗中時就是，現在也是——恐怕將來也是。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が成長できたというなら、\nナビこそが、その源を支えてくれた」
1600 = "「如果我確實取得了成長，那Ｎａｖｉ就是支撐我成長的源泉」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「それがナビの職務ですので」
1865 = "「那只是Ｎａｖｉ的職責而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「承知している」
1678 = "「我知道」" 

# monologue
# JP: ナビには僕は、たましいを感じたことがなかった。\nけれども、常に感じている。
2332 = "我沒有從Ｎａｖｉ身上感受到過靈魂的存在。" 

# monologue
# JP: ナビには確かな体温があり――\nそのぬくもりに、僕はいつでも、守られていると。
2104 = "但我又總能感受到Ｎａｖｉ確確實實地擁有著體溫——它的體溫，總是在身邊溫暖著我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「承知した上で、感謝している。\nナビ――いつも僕を守ってくれて、ありがとう」
1679 = "「我知道，而且很感謝你。Ｎａｖｉ——謝謝你總是守護著我」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「あ」
1542 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！？」
1553 = "「嗚喔！？」" 

# monologue
# JP: 一瞬、機体が大きく揺れる。
2072 = "一瞬間，它的機體劇烈地動搖了。" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「失礼しました。姿勢修正の必要が生じました」
1580 = "「失禮了。有必要修正飛行姿勢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、そうか？　珍しいことだな」
1537 = "「唔，是嗎？真稀奇啊」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「誤った[ルート,1]航路を取ってしまうところでした。\n双鉄様の生命と安全を維持するために、修正します」
1495 = "「剛才選取了錯誤的路徑。為了雙鐵少爺的生命安全，現在修正路徑」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
1550 = "「喔喔——」" 

# monologue
# JP: 大きく、ナビが旋回する。\nぐるり、360度近く。
2646 = "Ｎａｖｉ轉了一個圈。幾乎接近３６０度。" 

# monologue
# JP: 素人の僕には無意味な挙動とも思えるが、\nナビが無意味なことをする筈も有り得ぬし――
2585 = "雖然我不內行，看不出這個舉動有什麼意義，但Ｎａｖｉ肯定不會做無意義的事——" 

# 【双鉄】
# display as 雙鐵
# JP: 「姿勢修正とやらも、なかなかに爽快だな。\nたまには、こうした滑空も悪くない」
1460 = "「你這個修正姿勢的動作還挺爽快的。偶爾這麼滑翔一下也不賴」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「何よりのことです」
1866 = "「那就好」" 

# monologue
# JP: ――ナビが再び、まっすぐに飛ぶ。\n御一夜目指して、まっすぐに。
1017 = "——Ｎａｖｉ又開始直線飛行。徑直朝著御一夜飛去。" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「ご安心下さい双鉄様。\nナビは必ず安全に、双鉄様を目的地へとお送りします」
1827 = "「請放心，雙鐵少爺。Ｎａｖｉ一定會安全地把雙鐵少爺送往目的地」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、頼む」
1570 = "「嗯，拜託了」" 

# monologue
# JP: ……それきりナビは黙ってしまう。\n沈黙が続けばやはり、悩んでしまう。
1066 = "……然後，Ｎａｖｉ就陷入了沉默。持續不斷的沉默，還是讓我很頭痛。" 

# monologue
# JP: （向き合う、か――\n果たして、どのようにすればいいのか）
2618 = "（多多交流啊——到底該怎麼做才好呢）" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「――双鉄様、お疲れ様でした。\n目的地に到着しました」
1889 = "「雙鐵少爺，辛苦了。我們到達目的地了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ありがとう」
1561 = "「嗯。謝謝」" 

# monologue
# JP: ……ナビが着水してもなお、\n僕の思考は、どこにも落ち着くことができない。
1082 = "……Ｎａｖｉ都降落了，我的思緒還是久久不能平靜。" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　おかえり、にぃにー！」
1544 = "「啊！歡迎回來，阿哥！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお。ただいま、日々姫。\n日々姫もちょうどいま帰りか」
1551 = "「喔，我回來了，日日姬。你也是剛好才回來嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「ほんとにちょうど！\nえへへっ、すっごいタイミング」
1732 = "「是啊，正好！嘿嘿，真巧啊」" 

# monologue
# JP: 嬉しげに日々姫が小さく跳ねれば、\n肩から提げてる長い筒――図面ケースもぴょこんと踊る。
2407 = "日日姬高興地輕輕跳著，她肩膀上掛著的長圓筒——畫紙筒也跟著一跳一跳的，" 

# 【双鉄】
# display as 雙鐵
# JP: 「仕事帰りか」
1720 = "「是下班回家嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　打ち合わせがかなり長引いたけん、\nそんおかげで、ちょうどにぃにとここで会えたと！」
1567 = "「嗯！跟客戶開老半天會，正好擱這裡碰著阿哥了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、随分と嬉しそうだな」
1639 = "「怎麼你還挺開心的」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　盛り上がって長引いた打ち合わせやけん！\nしかも、そのおかげでばったりにぃにと会えちゃったし」
1566 = "「嗯！會開得太熱鬧了才拖長了！而且這不正好碰著阿哥了嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1563 = "「嗯」" 

# monologue
# JP: 眩しいほどの日々姫の笑顔が、答えをくれる。\n“向き合う”とは、つまりこのことだ。
2400 = "日日姬耀眼的笑容給了我答案。這就是交流的意義。" 

# monologue
# JP: 日々姫がもっとも日々姫らしくある時間――\nそれは日々姫が真剣に、仕事に向き合っている時だろう。
2397 = "日日姬最為顯露本色的時候——那就是日日姬認真面對工作的時候吧。" 

# monologue
# JP: （そうだ。それに――仕事は、くらしだ。\nそれぞれの仕事に、きちんと向き合うことができたなら）
2621 = "（是啊。而且——工作，就是生活。如果我們每個人都可以好好面對自己的工作就好了）" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに？　どぎゃんしたと？」
1880 = "「阿哥？愣著幹什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――うむ」
1410 = "「不——沒事」" 

# monologue
# JP: 向き合うこと。仕事をみること。くらしをみること。\nひとりひとりと重ねていけば、その果てに――
2217 = "多多交流。觀察對方的工作，觀察對方的生活。只要每天積累著這些小事，到最後——" 

# monologue
# JP: 元忠氏に出された課題の解決があり、\nオール御一夜体制を築けるような、そんな気もする。
2355 = "或許就能解決元忠先生提出的問題，建立起全御一夜體制。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、僕は――\n御一夜を、もっと知りたいと思うんだ」
1713 = "「日日姬，我——想要更加了解御一夜」" 

# 【日々姫】
# display as 日日姬
# JP: 「え！？　うん！\nそいば、すごく！　すごく良かことって思う！！」
1531 = "「哎！？嗯！那敢情好！我覺著特別好！」" 

# monologue
# JP: 今度は一転、はにかむ笑顔に思い出す。\nそれは日々姫が、僕に勧めてくれていたことだと。
2399 = "日日姬突然的靦腆一笑讓我想起，這就是日日姬曾經向我提出的建議。" 

# monologue
# JP: ナビと日々姫と。\n勧めた理由は、それぞれ異なっているのだろうが――
2631 = "Ｎａｖｉ和日日姬向我提出建議的理由雖然各有不同——" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのために、まずは日々姫をもっと知りたい。\n日々姫の仕事を――見学させてもらっても構わんか？」
1763 = "「為了這個，我想先多了解你。我能在旁邊觀察你的工作嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「よか！　よかよ！　もちろん、大歓迎っ！！」
1591 = "「好！那必須的！熱烈歡迎！！」" 

# monologue
# JP: ぴょこん、と日々姫は小さくはねて、\n体を縮めてガッツポーズをしてみせる。
2404 = "日日姬輕輕跳起，興奮得揮了揮拳頭。" 

# monologue
# JP: 次の瞬間、ひょっこりと、\n不思議そうな顔が持ち上がる。
2078 = "下個瞬間，她抬起頭，露出疑問的表情。" 

# 【日々姫】
# display as 日日姬
# JP: 「ばってん、なんで急にそぎゃんこと？」
1640 = "「怎麼就突然想起這事了呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ナビに、勧められたのだ。僕の周囲のひとりひとりと、\nじっくりと向き合うように、と」
1745 = "「是Ｎａｖｉ推薦我這麼做的。它希望我和身邊的每一個人好好交流」" 

# 【日々姫】
# display as 日日姬
# JP: 「じっくりと、向き合う――\nどぎゃんして、ナビはそんなこと？」
1584 = "「好好交流——Ｎａｖｉ又是怎麼想起跟你說這個的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わからん」
1656 = "「我不知道」" 

# monologue
# JP: 言って、数秒待ってみる。\n……ナビからは、何の補足も送られてこない。
2513 = "說過之後，我停頓了數秒。……Ｎａｖｉ沒有為我做任何補充說明。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ恐らく、その理由を考えることもまた、\n僕にとっての、大事な課題なのだろう」
1783 = "「看來，思考其中的理由也是一個重要課題啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「あぁ……」
1549 = "「喔……」" 

# monologue
# JP: わかったような、わからぬような。\n納得をしているようで、どこか残念そうにも聞こえる声。
2403 = "日日姬表現得似懂非懂。她似乎接受了我的解釋，聲音裡卻又有一絲遺憾。" 

# monologue
# JP: 違う。これだけでは言葉が足りていない。\n僕の気持ちを、まっすぐ伝えきれてはいない。
2083 = "不對。僅僅說這些是不夠的。我還沒有直接表達自己的心情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、僕は向き合いたいのだ」
1699 = "「所以，我想和你交流」" 

# monologue
# JP: だから、日々姫をまっすぐ見つめる。\n日々姫は少し慌てたように、背筋をぴんと伸ばしてくれる。
2369 = "所以，我直率地看著日日姬。日日姬好像有些慌亂，她忽地挺直身子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「向き合いたいのだ。まずは日々姫と。\nそうして、他のみんなとも――大切な何かを、学ぶため」
1669 = "「我想和大家交流。首先從你開始，然後再跟其他人交流——從中學到某些重要的道理」" 
