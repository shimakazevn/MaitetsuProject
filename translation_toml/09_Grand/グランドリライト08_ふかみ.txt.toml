# JP: あがってくるなら、それは条件全てを満たすデザインだ。\nならば――なんとしても通してやろう。
2574 = "只要能完成，那就會是一個能滿足所有條件的設計。如果能成功，那我無論如何都得讓它通過。" 

# monologue
# JP: ふかみが夢見た光景を、日々姫がともに形に起こす――\nその新しい列車の姿を、誰より僕が、見てみたいから。
2790 = "深美夢想中的風景，將在日日姬的筆下成形。最想看看那全新列車模樣的人，當然是我。" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　そこは任された！　ばってん――えと――\nけどね？　ふかみちゃん」
1832 = "「嗯！這個就交給我吧！但是……呃……但是吧，小深」" 

# 【ふかみ】
# display as 深美
# JP: 「はい。日々姫さん」
1704 = "「你說，日日姬小姐」" 

# monologue
# JP: ふたりの声が、いきなり硬くなってしまう。\nああこれは――あの激論に。
2620 = "她們倆的聲音一下就僵硬起來。噢，看來是要回到那個激烈討論過的話題了。" 

# monologue
# JP: 『客室から出たゴミを、一晩捨てずに保管する』かを、\nもう一度話し合うことになってしまうのか。
2621 = "她們準備重新討論一下是否要將客房扔出來的垃圾保存一個晚上。" 

# 【日々姫】
# display as 日日姬
# JP: 「ゴミの話。オーバーサービスだと思う。ホテルなら、\nまる24時間、捨てるのを待ったっていいだろうけど」
2283 = "「關於垃圾，我覺得你的主意已經是過度服務了。如果是酒店，倒確實可以等二十四小時再扔垃圾」" 

# 【ふかみ】
# display as 深美
# JP: 「出たゴミをどこにしまっておくのか、臭い対策は\nどうするか――そこが難しいのは、聞きました」
1998 = "「我記得你說了，垃圾的放置與氣味的處理是個難題」" 

# monologue
# JP: まずは落ち着けて話に入ろう――\nそう思うより先、ふたりが勝手にはじめてしまう。
2687 = "我本想說兩句讓她們冷靜地開始議論，但她們不等我主持就立刻開始對話了。" 

# 【ふかみ】
# display as 深美
# JP: 「でも、お客さんがゴミ箱にうっかり大事なものを\n捨てちゃうことって、結構――すごく多いんです」
1687 = "「但是，其實客人不小心將重要的東西丟進垃圾桶是很經常發生的事情」" 

# 【日々姫】
# display as 日日姬
# JP: 「やけん。停車駅にゴミ保管所をつくって、\n『24時間必ず保管する』ってルールをつくれば」
2004 = "「所以在停車的車站設置垃圾保存處，承諾保存二十四小時就行了啊」" 

# 【ふかみ】
# display as 深美
# JP: 「旅行者さんです。取りに戻るの大変ですよ。\nそれに、もしもきっぷを間違って捨てちゃったら」
2193 = "「車上都是旅客，要回去取會很麻煩呀。而且，如果一不小心扔掉的是車票……」" 

# 【稀咲】
# display as ？？？
# JP: 「双鉄！　まだここに居るっ！？」
2290 = "「雙鐵！你還在這裡嗎？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲か――\nっ！？　――どうした、その顔色は」
2074 = "「是稀咲啊……啊？！你怎麼臉色這麼難看」" 

# monologue
# JP: ふかみと日々姫もぴたりと黙る。\nというか、声を出せなくなってしまったのだろう。
2785 = "深美和日日姬也沉默了。她們一時不知道說什麼好。" 

# monologue
# JP: 稀咲の顔は、顔色は――\n紙より雪より、なお真っ白だ。
2874 = "稀咲臉色煞白，毫無血色。" 

# 【稀咲】
# display as 稀咲
# JP: 「アクシデントだ。買収済みの用地に陥没が発生した」
1730 = "「出事了，購買的鐵路用地發生了地陷」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！！！？」
1672 = "「什麼？！」" 

# 【稀咲】
# display as 稀咲
# JP: 「地盤調査して、線路としての用地許可も得た。けど――\n2キロ以上も先にある、廃坑道の崩壊の影響がでたんだ」
1976 = "「我們調查過地基，也拿到了鐵路用地許可。可是……兩公里開外的廢礦井崩塌造成了惡劣的影響」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……確かに災難だ。がしかし――\nその程度であれば、補強をすれば」
2218 = "「這……確實是壞消息啊。可是……只是地陷的話，只要強化一下……」" 

# 【稀咲】
# display as 稀咲
# JP: 「その通りなんだ。双鉄。\nその通りなんだけれど――」
2110 = "「沒錯，雙鐵。你說得不錯，可是……」" 

# monologue
# JP: 稀咲は真新しいコップから、\n喉へと一気に水を落とす。
2870 = "稀咲端起嶄新的杯子，將水一口喝完。" 

# monologue
# JP: ああ――\nふかみが山崎さんに合図して、運んでもらったのか。
2583 = "哦，是深美示意山崎先生端過來的啊。" 

# 【稀咲】
# display as 稀咲
# JP: 「――んっ。ああっ」
1245 = "「……呼，嗯」" 

# monologue
# JP: それで一息つけたのか。\n稀咲の口調が、かなり落ち着く。
2590 = "喝了水，稀咲似乎緩了過來，聲音也變得冷靜了許多。" 

# 【稀咲】
# display as 稀咲
# JP: 「補強には、同様の影響を及ぼす可能性がある範囲の全て。\n廃坑道を数キロに渡って埋め戻す他に、手段が無いんだ」
1898 = "「如果要強化，那就需要強化所有可能造成影響的地方。除了把整個長達幾公里的廢礦井填回去，沒有別的辦法」" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいなも、先に帰しました。\nひとまずは、最低人数で緊急会議ということで」
1971 = "「我也讓玲奈先回去了。現在先湊齊最少人數開個緊急會議」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1830 = "「嗯」" 

# monologue
# JP: 扱い方を間違えれば、\nナインスターズが、日ノ本鉄路ごと吹き飛ぶ話だ。
2634 = "如果處理失當，這可能會給九星乃至日本鐵路帶來毀滅性打擊。" 

# monologue
# JP: ポーレット以外は、すでに事情を知っている者だけで、\n最初の対応だけは固めてしまう方がいい。
2818 = "現在最好還是只召集知情人，擬定一個初步的解決方案。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふかみちゃんは、ご自宅に電話しなくて大丈夫？\n門限とかは」
1921 = "「小深，你不用給家裡打電話嗎？有沒有回家時間的要求？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1801 = "「啊！」" 

# monologue
# JP: ポーレットは純粋な善意であろうが、\nこの聞き方はかなり危ない。
2775 = "波萊特會這麼問純粹是出於善意，但這問法不對。" 

# monologue
# JP: 繊細なふかみのことだ。\n自分が居ないほうがいいのかと考え込んで――
2796 = "深美生性敏感，她可能會覺得自己在這裡太多餘……" 

# 【ふかみ】
# display as 深美
# JP: 「平気です。けど、お気遣いありがとうございます」
2106 = "「沒事，謝謝關心」" 

# monologue
# JP: （ああ）
2993 = "（啊）" 

# monologue
# JP: 杞憂であったか。\n本当に、ふかみは成長したのだ。
2825 = "看來是我想多了。深美真的已經長大了。" 

# monologue
# JP: が、この場での最年少者にも違いない。\n守るべきところはやはり、守ってやらねばと思う。
2522 = "但是，她依然是在場的人裡面最年輕的一個。該護著她的時候還是得出手保護。" 

# 【双鉄】
# display as 雙鐵
# JP: 「遅くなるようなら僕が送る。\nこの会議は、ふかみにもいてもらった方がいい」
1899 = "「如果討論到很晚，我送你回家。這場會議需要你參加」" 

# 【ふかみ】
# display as 深美
# JP: 「あ」
1798 = "「啊」" 

# monologue
# JP: 抑えた、けれどほっとしたような声。\nごくごく小さな、小さな頷き。
2793 = "深美控制著自己的聲音，但能聽出她鬆了一口氣。她非常非常輕地點了點頭。" 

# 【ふかみ】
# display as 深美
# JP: 「このお話、なんですけど」
2284 = "「關於這件事」" 

# 【稀咲】
# display as 稀咲
# JP: 「！」
# 1801 = "「啊！」" 

# monologue
# JP: よほど安心してくれたのだろうか？
2501 = "也許深美比我理解中要安心得多。" 

# monologue
# JP: 誰もが切り出しづらかったところに、\nまさかのふかみが、切り込んでいってくれる。
2615 = "大家都不好第一個開口，沒想到深美竟然起了頭。" 

# 【ふかみ】
# display as 深美
# JP: 「わたしの、全然わかってない視点からだと――\n今、問題がわかってよかったようにも思う、です」
1983 = "「我對這方面完全不懂……但我覺得，現在能發現問題其實是好事」" 

# 【稀咲】
# display as 稀咲
# JP: 「え？」
1820 = "「啊？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　そうですよ！　稀咲先輩！！」
1812 = "「啊！沒錯！稀咲學姐」" 

# monologue
# JP: なるほどと思うと同時、日々姫も強く頷いている。
2639 = "就在我恍然大悟的時候，日日姬也用力點了點頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「もしもっと前に崩壊のことがわかってても。\n結局は、この線路用地以外には、買えないんですから」
1743 = "「即使更早發現了礦井崩塌的問題，我們也沒辦法買其他的地皮修建鐵路」" 

# 【ポーレット】
# display as 波萊特
# JP: 「たしかにそうですよね。軟弱地盤への埋戻し工事の方が、\n他の用地をゼロから買収しなおすよりも、絶対に安い」
2084 = "「有道理。填埋強化軟弱地基，遠比從零開始購買其他土地來得便宜」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。そして、旧炭鉱専用線群の活用なしには、\n福丘県の線路を繋ぐことは、できない」
2048 = "「是啊。而且，如果不利用舊煤礦專用線路群，我們也沒辦法將福岡的線路連起來」" 

# monologue
# JP: 稀咲をフォローするためもあろう。
2948 = "這也是在給稀咲打圓場。" 

# monologue
# JP: が、みなが口々にいうとおり、究極的には、\nこれは本当に『絶対に回避できない』類の問題なのだ。
2516 = "但是大家說的也沒錯，歸根結底，這是絕對無法迴避的問題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「危険に気づかず営業運転を開始し、その後の事故となる。\n――そうした事態を回避できたことは、むしろ幸運だ」
1893 = "「如果沒發現危險就開始營運，日後就可能發生事故。能夠避免這樣的危險，我們是幸運的」" 

# 【稀咲】
# display as 稀咲
# JP: 「それは――うん。確かに、そうだ」
2216 = "「這……嗯，確實，有道理」" 

# monologue
# JP: なぐさめにもならんであろう言葉だが、\n稀咲は顔をあげてくれる。
2967 = "雖說這話根本算不上安慰，但稀咲還是抬起了頭。" 

# monologue
# JP: 笑顔を、多分うかべようとし――\nけれどもそれは、あの完璧な営業スマイルにさえならない。
2619 = "她似乎想擠出笑容，但那表情根本不像是她往日完美的商業微笑。" 

# 【稀咲】
# display as 稀咲
# JP: 「そう考えても。だけど、双鉄。\nどう転んでも、資金不足は変わらないよね」
1679 = "「但就算這麼想，雙鐵，不管怎麼處理，錢就是不夠啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……それも、確かにそのとおりだ。\nゆえ、対策を考えるために、会議をしている」
1242 = "「……你說的確實也對。因此，我們才會像這樣開會商討對策」" 

# monologue
# JP: ざっとの見積もりで、埋戻し補強工事に、40億弱。\nまったく別途の用地買収を試みるなら、その二十倍。
2882 = "簡單計算了一下，填埋和強化工程需要將近４０億日元。如果重新購買土地，需要的資金是二十倍。" 

# monologue
# JP: ならば、なんとしても40億。\n用立てる他にないのだが――
2960 = "那麼，我們的選擇就是不惜一切代價籌措４０億日元了，可是……" 

# 【稀咲】
# display as 稀咲
# JP: 「……隈銀から、これ以上の出資も融資も見込めない」
1262 = "「……無法期待隈元銀行繼續出資或者貸款給我們了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。元忠さんに隈銀頭取を追われるようなリスクを、\n決して負わせてはならん」
2052 = "「是啊，絕不能讓元忠先生承受被撤職的風險」" 

# monologue
# JP: 稀咲と元忠氏とが父子である。\nそれが事実である以上、李下に冠を正してはなるまい。
2875 = "稀咲與元忠先生是父女。有這層關係在，還是不要讓外人產生毫無根據的臆想比較好。" 

# 【日々姫】
# display as 日日姬
# JP: 「ばってん――マイレールファンドの追加出資も……\n私、よくわからんけど――でもなんとなく」
1764 = "「可是，讓私有線路基金另外出資應該也一樣……雖然我不太懂，但是感覺應該是不行的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\n率直に言って、やらん方がいいだろう」
1828 = "「嗯。說實話，不要這樣做比較好」" 

# monologue
# JP: 投資対象としての日ノ本鉄路は、\n配当を出せるようになるまで、まだ何年もかかってしまう。
2746 = "日本鐵路作為投資對象，恐怕還需要等個幾年才能盈利。" 

# monologue
# JP: その状態で、アクシデント対応のための追加募集は、\n逆に資金の引き上げを招いてしまいかねない。それに――
2606 = "在這種情況下，為了應對意外情況增加募集資金的規模，反而可能引發撤資。而且……" 

# 【ポーレット】
# display as 波萊特
# JP: 「仮に実施しても、効果は望めないだろうって思います。\n熱心な鉄道ファンも、地元の人達も、出資疲れしてる」
1744 = "「即使真的提出請求，效果也不一定值得期待。那些熱情的鐵路愛好者與當地人已經竭盡全力了」" 

# monologue
# JP: ――ナインスターズプロジェクトに参加した各自治体、\n各鉄道事業者も、ふるさと納税や[クラウドファンディング,1]ＣＦでの資金調達をした。
2564 = "參加九星計劃的各大自治體、各大鐵路相關公司，也都通過故鄉稅與眾籌籌措了資金。" 

# monologue
# JP: 支えてくれる鉄道ファン、投資の対象としてみている層。\nそのどちらもが、今は財布を軽くしてしまっている。
2954 = "那些支持我們的鐵路愛好者，那些把我們當成投資對象的人，他們的錢包現在都空了不少。" 

# 【ふかみ】
# display as 深美
# JP: 「あの……その話も、わたし、わからなくて。\nだから、すごくズレてたらごめんなさいなんですけど」
1719 = "「其實……這件事我也不太懂。所以如果我說得很不對，請大家糾正」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、聞かせてくれ、ふかみ」
2105 = "「沒事，你儘管說吧，深美」" 

# monologue
# JP: ホテルといえば、人脈と情報との宝庫とも聞く、
2902 = "聽說酒店乃是人脈與情報的寶庫。" 

# monologue
# JP: ふかみの掴んだ水源は、\n今はもう、クマ川のみにとどまらぬものとなっていよう。
2663 = "想必深美手中的水源，如今已經如隈河一樣綿綿不絕了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どんなアイディアであれ、聞かせて欲しい。\n僕らの知恵も――恐らく、枯渇に近いのだ」
1647 = "「不管你有什麼見解都可以說出來。我們現在都已經江郎才盡了」" 

# 【ふかみ】
# display as 深美
# JP: 「あの、すごく単純だから、ええっと――\n期待はずれかもって、わたし、思うんです、けど」
1778 = "「呃，我的意見很簡單，所以……我覺得可能無法回應各位的期待，但是……」" 

# monologue
# JP: ふるふる小さく頭を振って。\nそれでもふかみは、続く言葉を発しきる。
2799 = "深美輕輕搖了搖頭，但依然繼續說了下去。" 

# 【ふかみ】
# display as 深美
# JP: 「ええと――だから。インバウンド誘致と同じで」
1777 = "「呃，我的意思是，這跟招徠外國遊客一個道理」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！　海外からの投資を誘引するのか！」
1817 = "「啊！邀請國外投資啊！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ！」
# 1801 = "「啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「それって！　それなら、インバウンドの誘致にも、\nナインスターズの広報告知にもつながるし！」
2154 = "「確實！而且這還可以當作一次機會，用來向國外宣傳九星計劃！」" 

# monologue
# JP: 僕らの視線が、稀咲に集まる。\n稀咲はけれど――やはり、笑顔を見せてくれない。
2673 = "我們集體看向了稀咲。但是稀咲依然沒有露出笑容。" 

# 【稀咲】
# display as 稀咲
# JP: 「それは……できれば素晴らしいと思う。けど、\n大陸方面――隈銀が強い方面には、もうやってるんだ」
2217 = "「這……如果能實施，確實是個好方案。但是大陸那邊……隈元銀行熟悉的地區已經在推進這件事了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲と元忠氏の仲国人脈のことならば知っている。\nというか、その他の国に、ツテはないのか？」
1997 = "「我知道你和元忠有仲國的人脈。其他的國家你們沒有人脈嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「鴎州や冥国との、太いパイプはほとんどないね。\n単純な知人であれば、あちらにも少しはいるけど」
2094 = "「歐洲跟美國那邊基本上沒什麼特別有地位的熟人。普通熟人倒也不是沒有」" 

# 【双鉄】
# display as 雙鐵
# JP: 「であれば――\n後東氏の人脈に頼る……のは――まずいのか？」
2269 = "「那麼……如果去依靠後東先生的人脈……會很麻煩嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「だろうね。ここぞとばかりに、絶対確実に、\n日ノ本鉄路が買い叩かれる」
1948 = "「很可能會。這種危急時刻，他肯定會大殺一筆價錢把日本鐵路納入囊中」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1801 = "「啊！」" 

# monologue
# JP: 言われた瞬間、ようやく理解する。\n稀咲の顔があれほどに、青ざめていたその理由を。
2901 = "聽稀咲這麼說，我才終於明白她臉色鐵青的原因。" 

# monologue
# JP: 稀咲は確かに創設者だが、\n現在の立場的には、日ノ本鉄路の取締役にすぎない。
2966 = "雖說稀咲是創辦者，但現在她只不過是日本鐵路的董事。" 

# monologue
# JP: そして社長は――\n後東さんから送り込まれた人物なのだ。
2896 = "而社長是後東先生送來的人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……この情報を、小石川さんは」
2220 = "「這件事情，小石川女士她……」" 

# 【稀咲】
# display as 稀咲
# JP: 「彼女が社長だもの。報告をあげないわけにはいかない。\nだから、その前に対策を固められないと、まずい」
1874 = "「她是社長，我不可能不匯報給她。所以必須搶在那之前定好對策」" 

# monologue
# JP: 確かに、まずい、小石川さんの能力は、今後の用地買収に\n絶対不可欠――株主総会で追い出すわけにはいかない。
2844 = "確實很不妙。小石川女士的能力在今後的土地收購當中不可或缺，我們不能把她從董事會裡趕出去。" 

# monologue
# JP: が、小石川さんの報告を受け後東氏の――買収屋の血が\n騒いでしまえば、なにが起きても不思議ではない。
2520 = "但是萬一後東先生接到匯報後難以抑制自己的收購衝動，任何事情都有可能發生。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……必要なのは、鴎州なり冥国なりへの太いパイプか。\n真闇姉や義父さんも、単純な知り合いならばいようが」
1273 = "「……那麼我們需要的就是歐洲、美國那邊的大人物支持。真闇姐和[父親,1]養父或許有些普通的熟人」" 

# 【ふかみ】
# display as 深美
# JP: 「あの……どういう人ならなれるんですか？\nその――投資を誘引する？　窓口に」
2179 = "「請問……要成為吸引投資的窗口，具體需要什麼樣的人牽頭呢？」" 

# monologue
# JP: ああ、そうだ。\n焦りすぎていた――危うかった。
2587 = "啊，對。我太急了，把這個給忘了。" 

# monologue
# JP: そこをきちんと把握せねば、\n無駄に情報を拡散させてしまうだけのこととなる。
2631 = "如果不把握清楚這一點，只會白白地洩露出情報。" 

# 【稀咲】
# display as 稀咲
# JP: 「まずは、その国を母国としている人間。よそ者が\n持ち込むお金の話は、それだけでひどく警戒される」
2295 = "「首先必須是當地人。外國人要本國人出錢，容易招致戒備」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー、ありそう。そういうの」
1851 = "「噢，確實，有可能」" 

# 【稀咲】
# display as 稀咲
# JP: 「その上で、その国において金融商品を作成できる\n立場であれば、一番理想的だといえるね」
1652 = "「並且，如果那個人能在自己的國家發行金融商品是最好不過的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのような知り合いがいるか。真闇姉と義父さんならば、\n絶対に信用できるゆえ、まずあたってみよう」
2146 = "「真闇姐和[父親,1]養父肯定值得信任，我先請他們找找有沒有這樣的熟人吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「わたしは――んー……ねぇねと父さん以外だと～」
1981 = "「我呢……唔……除了阿姐和爸爸之外……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、日々姫とふかみはデザインに専念してくれ。\n完成デザインの質の高さは、投資誘引の力となるゆえ」
1651 = "「不，你跟深美專心做設計。你們的成品品質越高，對投資的吸引力就越大」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　うん！　わかった！！」
1807 = "「啊！嗯！好的！！」" 

# 【ふかみ】
# display as 深美
# JP: 「わたしも、全力でお手伝いします！　です！！」
1962 = "「我也會盡全力協助的！嗯！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「で、ポーレットは――\nポーレット？」
2130 = "「然後，波萊特……波萊特？」" 

# monologue
# JP: ぎゅっと、唇を噛んでいる。\nぎゅうっと、瞳を閉じている。
2776 = "波萊特正咬著唇，雙目緊閉。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ポーレット」
1953 = "「怎麼了，波萊特？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「――安心して、稀咲。双鉄くん」
1240 = "「……你們放心吧，稀咲，雙鐵君」" 

# 【稀咲】
# display as 稀咲
# JP: 「ポーレット？」
2121 = "「波萊特？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そういう――銀行に、強力にセールスかけられるひと。\nフランクに、わたし、一人だけだけど知ってるから」
2228 = "「這種有能力向銀行推銷項目的……我認識一個，在法國」" 

# 【双鉄】
# display as 雙鐵＆稀咲
# JP: 「おお！」\n「――っ！」
1846 = "「噢！」\\n「啊！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜のこと。わたしのこと。きっと助けてくれるから。\nいまも絶対、愛してくれてるって思うから」
1871 = "「她一定會幫助御一夜、一定會幫助我的。她現在肯定依然愛著我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1798 = "「啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「――ポーレット」
1261 = "「……波萊特」" 

# monologue
# JP: ……感じてはいた。\nポーレットも僕と同様、過去に何かをかかえていると。
1192 = "……我早就感覺到了。波萊特也和我一樣，默默背負著自己的過去。" 

# monologue
# JP: 稀咲もそれを――いや、稀咲はあるいはその詳細を、\nポーレットから、既に聞かされているのだろうか？
2871 = "稀咲肯定也感覺到了……不，她或許早就從波萊特那裡聽說了這些事情吧。" 

# 【稀咲】
# display as 稀咲
# JP: 「キミは、それで――」
1702 = "「你確定要……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫。稀咲。これ、いい機会だって思うから。\nわたしとママとが――もう一回、お話するための」
2104 = "「沒事。稀咲，我覺得這是個好機會。這樣我也能再次聯繫媽媽」" 

# monologue
# JP: そしてポーレットは手を伸ばす。
2704 = "接著，波萊特伸出了手。" 

# monologue
# JP: わずかに震える指先で――\nそれでもしっかり、受話器を掴む。
2626 = "她的手指在顫抖，但依然緊緊抓起了聽筒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……今日はふかみに、びっくりするほど助けられたな」
1235 = "「……今天你貢獻了許多啊，我非常驚訝」" 

# 【ふかみ】
# display as 深美
# JP: 「そんな――そんなことない、です」
2108 = "「沒有……沒這回事的，嗯」" 

# monologue
# JP: ふかみがはにかむ。
2791 = "深美害羞地笑了。" 

# monologue
# JP: 送っていくための帰り道。\nふかみはすっかり、昔に戻ってしまったようだ。
2690 = "我走在送深美回家的路上。她似乎徹底變回了以前的模樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことは、あるさ。ふかみのおかげだ。\nポーレットとお母様とが、話し合えたのも」
2139 = "「當然是你的功勞了。包括波萊特終於和她的母親搭上了話，也是多虧了你」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　あれは――本当に素敵だった。です。\nちょっとでもきっかけになれたなら……うれしい。です」
1816 = "「啊！這件事確實值得高興，嗯。能製造出這樣一個機會……我很開心，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1830 = "「嗯」" 

# monologue
# JP: 確かに、本当に素敵だった。\nこうして思い出すだけで、こころがあたたかになる程に。
2824 = "的確值得高興。光是回想起來，我就覺得心裡一陣暖意。" 

# 【ふかみ】
# display as 深美
# JP: 「マイアさん――ポーレットさんのこと、ずっと、\nずうっと。離れてても、見守ってくれてたんですね」
2232 = "「邁雅阿姨雖然離開了波萊特小姐，但卻一直一直在守望著她」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。ナインスターズプロジェクトのことどころか、\n日ノ本鉄路のことまで、既に知ってくださっていたとは」
2044 = "「是啊。不僅是九星計劃，就連日本鐵路的事情，她都已經知道了」" 

# monologue
# JP: ……おかげで話は早かった。
1194 = "……所以事情談起來特別順利。" 

# monologue
# JP: というかむしろ、ポーレットが頼ってくるのを待っていた。\nそんな印象さえ感じるほどに。
2821 = "甚至讓我有種感覺，她簡直像是在等待波萊特來找自己。" 

# 【ふかみ】
# display as 深美
# JP: 「……うまくいきますかね？\nマイアさんが、フランクの銀行紹介してくれるのって」
1265 = "「……能順利嗎？邁雅阿姨真的能為我們介紹法國的銀行嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、うまくいくだろう。\nなにせマイアさんは、あのポーレットのお母様だぞ」
2223 = "「這個應該是可以的。畢竟邁雅阿姨可是波萊特的母親啊」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　いわれてみたらそうですね」
1814 = "「啊！聽你這麼說確實是這麼回事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その上、稀咲だ。ご紹介が仮にか細い縁だとしても、\n必ず、話をまとめるさ」
2168 = "「而且還有稀咲呢。就算介紹過來的關係不夠硬，她也一定能夠順利打動對方」" 

# 【ふかみ】
# display as 深美
# JP: 「はい、そうですね！！」
2064 = "「是的，你說得對！！」" 

# monologue
# JP: （くぅ～）
2989 = "（咕……）" 

# monologue
# JP: おっと、ふかみの腹がなったか。
2581 = "哎呀，深美的肚子叫了。" 

# monologue
# JP: ああ、ではない。\nこういうときは、僕が泥をかぶって――
2585 = "啊，不對，這種時候我應該假裝是自己，好保住深美的面子。" 

# 【ふかみ】
# display as 深美
# JP: 「あはは！　おなか、なっちゃいました。です。\nわたし、安心しちゃったから」
1785 = "「哈哈哈，肚子叫了，嗯。這應該是因為我放心了吧」" 

# monologue
# JP: ――恥ずかしがらずに、閉じこもらずに。\nふかみが笑顔で、お腹の虫を吹き飛ばす。
1149 = "——深美沒有害羞，也沒有自閉，而是拿出笑容趕走了飢餓。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕にも聞こえた。――というか、そうか。\n僕らは夕飯を、まだ食べてないのだなぁ」
1963 = "「我也聽見了。話說我這才想起來，我們還都沒吃晚餐呢」" 

# monologue
# JP: 緊張と切迫感とに、空腹さえも飛んでいたが――\nなるほど確かに。安心すれば、腹もすくものだ。
2887 = "緊張與迫切的氣氛，甚至讓我們忘記了飢餓。不過安下心來之後，肚子自然而然也餓了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、この時間だとコンビニでしか食事できんな。\nどうだ、ふかみ。イートインでも構わなければ」
1767 = "「可是，這麼晚了想吃東西只能去便利商店啊。怎麼樣，你介不介意在便利商店裡吃？」" 

# monologue
# JP: 言った瞬間、ふかみがぽっと、赤くなる。
2900 = "聽我這麼說，深美立刻羞紅了臉。" 

# 【ふかみ】
# display as 深美
# JP: 「わたし――双鉄おにいさ――双鉄さんの食事のお誘い、\nとっても、とっても嬉しい、です」
2172 = "「能得到雙鐵哥哥……雙鐵先生的晚餐邀請，我非常非常高興，嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2059 = "「是嗎」" 

# 【ふかみ】
# display as 深美
# JP: 「だけど、今日は帰ります。です。遅くなっちゃったし、\nおかあさん、ご飯作ってくれてるって思いますし」
1683 = "「但是今天我要回家，嗯。現在已經晚了，而且媽媽應該已經為我做了晚餐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――そうか。ならば、次の機会にだな。\n今日のお礼をきちんとしたい」
1248 = "「……好的。那留到下次吧。我想好好為你今天做的事情道謝」" 

# 【ふかみ】
# display as 深美
# JP: 「あのっ！」
1999 = "「我說！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――っ！」
1845 = "「嗯？　……啊！」" 

# monologue
# JP: ふかみが、近い。\nいつの間に、僕のすぐそばによってきている。
2804 = "深美靠得很近。不知什麼時候，她貼到了我的身邊。" 

# monologue
# JP: 大きな瞳で――すみれ色の目で。\n僕を、まっすぐ見つめている。
2625 = "她用那大大的、藍紫色的雙眸望著我。" 

# 【ふかみ】
# display as 深美
# JP: 「そのお食事って、ふたりっきりでもいいですか？」
2266 = "「那餐飯可以只有我們兩個人吃嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。凪なり誰かと一緒でも、二人きりでも。\nふかみへの礼ゆえ、ふかみの希望にあわせよう」
2138 = "「當然了。你想叫上凪或者別人，或者只有我們兩個吃都行。這是給你的謝禮，我尊重你的意願」" 

# 【ふかみ】
# display as 深美
# JP: 「……あはー」
1246 = "「……哈哈」" 

# monologue
# JP: 気の抜けたような妙な笑み。\nそしてふかみは、ぽーんと大きな一歩で僕から距離を取る。
2783 = "深美像是鬆了口氣一樣，發出奇怪的笑聲。接著，她大大地邁了一步，和我拉開了距離。" 

# 【ふかみ】
# display as 深美
# JP: 「なら、しばらくはまだいーでーす！\nお礼、先にとっといてください！」
2257 = "「那暫時就算了！這次感恩宴就留到以後吧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
1703 = "「你確定？」" 

# 【ふかみ】
# display as 深美
# JP: 「はいです。わたし、もっともっとがんばって、\n素敵な大人――素敵な女の子になりますです、から」
2137 = "「當然。我要更加更加努力，成為更出色的大人——成為更出色的女孩子」" 

# monologue
# JP: ふかみがはにかむ。下を向く。
2797 = "深美羞紅了臉，低下了腦袋。" 

# monologue
# JP: けれどもそれは一瞬で、\n僕へと向き直した顔は明るく、笑ってる。
2524 = "但這也只是短短一瞬的事情。下一個瞬間，她已經抬起頭來，向我露出一個陽光般的微笑。" 

# 【ふかみ】
# display as 深美
# JP: 「だからそのとき！　双鉄さんがわたしのこと、\nふたりっきりで誘いたいって思ってくれたら！」
2007 = "「所以就等雙鐵先生看著我的模樣，覺得想邀請我單獨吃飯的時候再說吧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1830 = "「嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「そのときは！　素敵なディナー！\nご馳走してもらえたらうれしいです！　です！！」
1735 = "「到時候，請我吃一頓豐盛的晚餐吧！嗯！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1801 = "「啊！」" 

# monologue
# JP: なるほど、これは、デートに誘えと言われているのか。
2749 = "明白了，這是要我邀請她約會。" 

# monologue
# JP: ……デートだなんだは、よくわからん。\nゆえ、先のことになるかもしれんが。
1188 = "……我不是很懂約會這種東西，所以這餐飯或許要等很久以後才能吃了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。そのときにはそうしよう」
1836 = "「嗯，到時候我會邀請你的」" 

# 【ふかみ】
# display as 深美
# JP: 「嬉しい！　ありがとうございます！\nそうなるように、わたし、頑張っちゃいますね！」
1864 = "「太好了！謝謝！我會努力變得更出色的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ、おい」
1819 = "「啊，喂」" 

# monologue
# JP: ふかみが駆け出す。\n軽やかに、楽しげに――背中で笑っているように。
2802 = "深美邁開輕快的腳步，開心地跑了起來。她的背影彷彿都帶著笑意。" 

# 【ふかみ】
# display as 深美
# JP: 「ここまできたら大丈夫です！\nおやすみなさい！　双鉄さん！！」
1737 = "「到這裡就沒問題了！晚安！雙鐵先生！！」" 

# monologue
