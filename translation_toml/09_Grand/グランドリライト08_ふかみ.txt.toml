1994 = "「我相信日日姬你的取捨品味，也理解並尊重你想儘量聽取更多意見的想法」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1830 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
