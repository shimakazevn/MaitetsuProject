2165 = "「綜合我們剛才的討論，我再問一遍。你們覺得列車應該設置專用入口？」" 

# 【日々姫】
# display as 日日姬
# JP: 「思う！」
2063 = "「是的！」" 

# 【ふかみ】
# display as 深美
# JP: 「思います、です！」
2069 = "「是的，嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば……一週間。申し訳ないがこの時間内に、\n新デザインを、草案でいいので起こしてくれ」
2268 = "「那麼……一星期。請你們在一星期內給出新設計的草案。很抱歉，我只能給你們這點時間」" 

# 【日々姫】
# display as 日日姬
# JP: 「一週間っ！！？」
1631 = "「一星期？！」" 

# monologue
# JP: 日々姫が絶句してしまう。\n無理もない。厳しいにもほどがある短期間ゆえ。
2738 = "日日姬啞口無言了。這也沒辦法，畢竟一星期對做設計草案來說真的很短。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それで叶うならば、僕の責任において新案を\nポーレット、そしてその先にも提出しよう。が」
1892 = "「如果你們能做到，那我就會負責將新的方案轉交波萊特以及之後的其他程序。但是……」" 

