# 【日々姫】
# display as 日日姬
# JP: 「いまうとうとしとったでしょー。疲れとるのわかるけど、\nいけんよ？　講義中にいねむりだとか」
1693 = "「你剛打瞌睡了吧。我知道你累，但這樣可不行唉。上課的時候怎麼能打瞌睡呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ……うむ。すまん」
1796 = "「啊……嗯，抱歉」" 

# monologue
# JP: というか、完全に一瞬寝ていた。\n夢まで見ていたような気がする。
2675 = "我剛剛是徹底睡著了。感覺好像還做了一個夢。" 

# 【日々姫】
# display as 日日姬
# JP: 「わたしはよかけど、ふかみちゃん――\nふかみ先生が気の毒でしょお」
1977 = "「我倒沒事，但這樣小深……深美老師多可憐啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。そして同時に、聴き逃してはもったいない。\n講義内容――実際に、すぐにも業務に活かせそうだ」
2054 = "「是啊，而且錯過這堂課就太可惜了。課程內容非常實用，感覺可以立刻應用到工作當中」" 

# 【日々姫】
# display as 日日姬
# JP: 「よね」
# 2049 = "「是啊」" 

# monologue
# JP: 日々姫の手元、開かれてるスケッチブックはもう、\n絵で、図で、メモで、真っ黒に近くなっている。
2740 = "日日姬手邊攤開的素描簿，已經被圖、被畫、被筆記填塗成了黑本子。" 

# monologue
# JP: ――ふかみが学び取ってきて、伝えてくれていることが、\n鉄道業にも、デザインにさえも応用できることの証左だ。
1152 = "——這說明了深美學來又教給我們的這些知識，既可以運用於鐵路，也可以運用於設計。" 

# 【ふかみ】
# display as 深美
# JP: 「[ていおう,1]帝央ホテルにおける一年間の研修で、最も徹底的に\n教えていただけたのは、“背中に目を持つ”ことです」
1858 = "「在帝都中央車站酒店培訓的一年裡，老師們最常強調的是“背後要長眼睛”」" 

# monologue
# JP: ……ふかみが不在の一年間。
1200 = "……深美離開了一年。" 

# monologue
# JP: クマ川下りも極めて厳しかったようだが、\n御一夜鉄道も、大変に苦労させられた。
2604 = "在這期間，隈河漂流和御一夜鐵路的經營情況都極為嚴峻。" 

# 【ふかみ】
# display as 深美
# JP: 「――背中に目を持つ。見えていないお客様の動きを、\n常に意識し予測する。そのために必要なのは、視点です」
2170 = "「背後要長眼睛，就是說要關注與預測客人在看不見的地方做的事情。為此需要不一樣的視角」" 

# monologue
# JP: （ふかみがどれほど、目立たぬ部分を、\n地道に埋め続けてくれていたことか――）
2999 = "（那些不起眼的問題，一直都是深美在勤勤懇懇地為我們修補啊……）" 

# monologue
# JP: 凪とのコミュニケーションミスが驚くほどに増加したし、\n実りを得ぬまま散会に至る会議も頻発した。
2958 = "那段時間，我與凪之間的溝通問題頻發，會議也經常得不到實質性成果。" 

# monologue
# JP: が、月一でふかみが御一夜に戻ってくると、\nそれが綺麗に解消するのだ。
2519 = "但是每個月深美回到御一夜的時候，一切問題就都迎刃而解了。" 

# 【ふかみ】
# display as 深美
# JP: 「上から見おろす鳥の視点と、地表を動く[あり]蟻の視点とを、\n両立させて、ともに[おろそ]疎かにしないこと」
2176 = "「要有俯瞰一切的飛鳥一樣的視角，也要有走在大地上的螞蟻一樣的視角。兩者都不可以忽視」" 

# monologue
# JP: その事実だけで、逆説的に、ふかみがどれほど\n見えないところで、僕らのチームに寄与しているかが――
2570 = "反言之，這也說明深美在看不見的地方為我們的團隊做出了多少貢獻。" 

# 【ふかみ】
# display as 深美
# JP: 「この視点は、鉄道業にも応用できます。実際に適用する\nことで、[プロジェクト・ナインスターズ,4]九つ星計画の課題の一つ、インバウンド誘致」
2229 = "「這種視角思維也可以帶入鐵路行業。其中的一個實例就是九星計劃實施的著眼點之一，招徠境外遊客」" 

# 【凪】
# display as 凪
# JP: 「インバウンド誘致って、なにばい？」
1670 = "「什麼意思？」" 

# 【ふかみ】
# display as 深美
# JP: 「それはね？　凪ちゃん」
2222 = "「這個嘛，小凪」" 

# monologue
# JP: ああ――これだ。\n『それはね？　凪ちゃん』『あのね？　凪ちゃん』。
2589 = "啊，就是這個。『這個嘛，小凪』『聽我說，小凪』" 

# monologue
# JP: そこから始まる会話がどれ程、論点整理に役立っているか、\n僕らはまったく、理解も感謝もできてなかった。
2695 = "打這兩句開始的對話，一直都對我們歸納總結論點大有幫助。儘管以前的我們並不理解，也不知道感謝。" 

# 【ふかみ】
# display as 深美
# JP: 「インバウンドっていうのは、この場合、日ノ本から見た\n海外――外国から来てくださる観光客さんのこと」
2008 = "「所謂境外遊客呢，在這種情況下，指的是來自日本之外的遊客，也就是外國遊客」" 

# 【凪】
# display as 凪
# JP: 「なーんね、外国人さん誘致のことなら、\nいっつも話とって、全然方法のでんこと――おおお！？」
1669 = "「什麼嘛，如果是要招徠外國遊客，咱們都聊過不知道多少次了，但是根本找不到辦法……嗯？！」" 

# monologue
# JP: 凪の瞳がまんまるになる。
2552 = "凪瞪圓了眼。" 

# 【凪】
# display as 凪
# JP: 「そん方法、“背中に目”やらで、\nふかみちゃん、思いついたと？」
2292 = "「難不成小深，你靠“背後的眼睛”找到了辦法？」" 

# 【ふかみ】
# display as 深美
# JP: 「方法っていうか、少しはヒントになるかもってことなら。\n――うん、思いついた」
1844 = "「嗯，確實想到了。不過也不是具體的方法，只是一點小小的提示」" 

# monologue
# JP: （ああ――）
2992 = "（啊……）" 

# monologue
# JP: 一年間。僕らとも翠さんとも堰さんたちとも。\nそうしてなによりクマ川とも、離れ暮らした研修生活。
2947 = "這一年，她離開了翠小姐，離開了堰先生，也離開了隈河，獨自在外接受培訓。" 

# monologue
# JP: それがどれほど、ふかみの背筋を伸ばしてくれたか――\n今、鮮やかに示されている。
2895 = "而現在我能清楚地看出，這段時間讓她成長了不少。" 

# 【凪】
# display as 凪
# JP: 「どぎゃん方法ばい？」
1671 = "「什麼方法啊？」" 

# 【ふかみ】
# display as 深美
# JP: 「想像してみて、凪ちゃん。ナインスターズの走る線路。\nそれが、全部繋がってる九洲を」
1695 = "「你想像一下吧，小凪。想像一下被九星的線路連接起的整個九州」" 

# 【凪】
# display as 凪
# JP: 「……想像したばい！　凪様、にーさんとハチロクと、\n九洲中を走り回っとるばい！」
1264 = "「……老早想過咧！本小姐跟大哥哥還有八六一直就在圍著九州轉呢！」" 

# 【ふかみ】
# display as 深美
# JP: 「それが、蟻の視点。今見えたものを忘れないまま、\n今度は、鳥になって、線路の上を飛んでみて？」
2226 = "「這就是螞蟻的視角。那麼在這個視角的基礎上，你再讓自己化身飛鳥，俯瞰一下線路試試？」" 

# 【凪】
# display as 凪
# JP: 「わかったとばい！！」
1879 = "「好嘞！！」" 

# monologue
# JP: ……僕も、凪と同じく、蟻の視点で考えていた。\n皆も同じであったのか、ハッとしたような顔をする。
1191 = "……我也和凪一樣，是以螞蟻的視角思考問題的。大家似乎也都是這樣，一個個看起來都恍然大悟。" 

# monologue
# JP: 意識を切り替え、鳥の視点――\n上から見ようと試みてみる。
2691 = "我轉換思維，讓自己站在飛鳥的視角開始俯瞰全局。" 

# 【凪】
# display as 凪
# JP: 「見えたばい！　隈元県が、線路でつながっとるばい！」
2143 = "「看見咧！隈元縣被線路聯繫起來囉！」" 

# 【ふかみ】
# display as 深美
# JP: 「もっと高くに飛んで？　九洲全部はどう見える？」
1721 = "「再飛高一點，整個九州又是什麼樣的？」" 

# 【凪】
# display as 凪
# JP: 「九洲ぐるっと、線路がぜぇんぶつながっとるばい！」
2019 = "「整個九州的線路全都連起來了！」" 

# 【ふかみ】
# display as 深美
# JP: 「もっと高く。衛星軌道にまで飛んで？　どう見える？\n[めいこく,1]冥国、[えいこく,1]詠国、[どっこく,1]髑国、フランク、[ちゅうごく,1]仲国、[かんこく,1]汗国とかの線路は」
1722 = "「再飛高點，飛上衛星軌道。美國、英國、德國、法國、仲國、韓國的線路，看起來怎麼樣？」" 

# 【凪】
# display as 凪
# JP: 「え？　ええっと」
1821 = "「啊？咱想想」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！　そうか！\nそこ自体が、最大の売りになるのか！！」
1810 = "「啊！明白了！原來這就是最大的賣點啊！！」" 

# 【ふかみ】
# display as 深美
# JP: 「やっぱり！　双鉄おにいさんもそう思いますか！？」
1986 = "「我就知道！雙鐵哥哥你也這麼覺得吧？！」" 

# 【日々姫】
# display as 日日姬
# JP: 「そっか！　わかった！！！」
2061 = "「是嗎！我也懂了！！！」" 

# monologue
# JP: 日々姫が猛然とスケッチブックに絵を描き始め、\nポーレットと稀咲も動き始める。
2744 = "日日姬立刻在素描簿上開始繪畫。而波萊特和稀咲也都有所反應。" 

# monologue
# JP: 真闇姉はただにこにことして――\nハチロクれいな、凪はその首を傾げたままだ。
2836 = "真闇姐的臉上現出了微笑，但八六、玲奈和凪卻還是歪著個腦袋。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。わたくし、日ノ本以外の国の鉄道事情には、\nまったくくわしくないのですけれど」
2289 = "「雙鐵少爺，我完全不了解國外的鐵路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「エアクラの更なる躍進。大廃線による鉄道衰退は、\n全世界的な傾向であることは変わっていない」
2162 = "「空凝機的進一步發展與大廢線導致的鐵路衰退，現在依然是世界性的發展方向」" 

# monologue
# JP: 必要なのは、ただその事実を思い出すことだけ。
2672 = "我們只需要回想起這個事實。" 

# monologue
# JP: うんうん悩みこんでたれいなが、\n言った瞬間、うれしげにその顔を持ち上げる。
2899 = "聽我這麼一說，剛才還在煩惱的玲奈立刻就欣喜地抬起頭來。" 

# 【れいな】
# display as 玲奈
# JP: 「ならなら、日ノ本がいちばぁん最初に、\nそこをぬけられるかもしれないんですねぇ」
2271 = "「那麼，日本就有可能是第一個走出這種困境的國家」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ！」
# 1801 = "「啊！」" 

# 【凪】
# display as 凪
# JP: 「わかったとばい！　すごかとばい！！」
2035 = "「明白囉！真厲害！！」" 

# 【れいな】
# display as 玲奈
# JP: 「ほえ？　なにがですかぁ？」
1787 = "「哎？什麼厲害？」" 

# monologue
# JP: 殆ど正解を示していながら、\nしかしれいなには見えていない。
2816 = "玲奈已經很接近了，但她還是沒發現正確答案。" 

# monologue
# JP: ……れいなの視点はどこまでも、\n日常に添い、それを愛する、蟻の視点であるのだろう。
1201 = "……畢竟她的視角總是貼近著、熱愛著日常生活，屬於螞蟻環視的視角。" 

# 【凪】
# display as 凪
# JP: 「日ノ本だけが！　九洲だけが！！　\nこぎゃんと長くつながってる線路を持つとこになるばい」
2017 = "「擁有這麼長的連在一起的線路的，只有日本、只有九州！」" 

# 【ハチロク】
# display as 八六
# JP: 「鉄道に9日間乗り続けられるナインスターズの旅は、\nただそれだけで、“世界で唯一”のものとなるのですね」
1857 = "「在九星上可以連續乘坐九天，這本身就是“世界唯一”的東西」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ホテルクオリティの車内サービスより、こだわり抜いた\n内外装より。一番に打ち出すべきは、そこだったのだな」
2102 = "「比肩酒店的服務水平，精緻的內外裝修。最應當拿來當賣點的，就是這些啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、海外の鉄道事情、\n念のため海外テツの人に確認してみます！」
1709 = "「保險起見，我去找國外的人問問國外鐵路的情況！」" 

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんも、海外に知り合いのおるけん。\nそいば売りになるか、何人かに聞いてみるとね」
1902 = "「姐姐在外國也有熟人。也可以去問問這個能不能成為賣點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その方向で、構わんか？」
2090 = "「朝這個方向開展工作可以嗎？」" 

# monologue
# JP: ポーレットに問えばみなが頷く。\nそして、一斉に動き始める。
2677 = "我向波萊特問了一句，但所有人都向我點頭回應。接著，大家一起行動了起來。" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。なんだかすごいことになりそうですねぇ」
1780 = "「呵呵，感覺會變得很厲害」" 

# 【凪】
# display as 凪
# JP: 「凪様！　凪様もなにかするばい！」
1732 = "「別忘了本小姐！本小姐也會幫忙的！」" 

# 【ハチロク】
# display as 八六
# JP: 「なにかも何も乗務でしょう。\n本日は、赤井－凪－ニイロク体制ですよ？」
1697 = "「你最該做的就是乘務工作吧。今天可是輪到你和赤井、二六啊」" 

# 【凪】
# display as 凪
# JP: 「そうだったばい！　今度こそハチロクから百点！\nもらえるようにがんばるばい！！」
1663 = "「也是咧！這次一定要努力讓八六給出一百分！」" 

# monologue
# JP: 凪が小走りに駆け出していく。
2548 = "凪小跑著離開了。" 

# 【凪】
# display as 凪
# JP: 「ばいばいふかみちゃん！　またあとでー！\n話、ちょー面白かったばい！」
2014 = "「拜拜，小深！待會見！你說的事真有意思！」" 

# 【ふかみ】
# display as 深美
# JP: 「ありがと、凪ちゃん。気をつけて」
2180 = "「謝謝你，小凪，小心一點」" 

# 【ハチロク】
# display as 八六
# JP: 「それでは双鉄様、いってまいります」
2272 = "「那麼，雙鐵少爺，我先告辭了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ご安全に。よい乗務を」
1839 = "「嗯，注意安全，祝工作順利」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい。気をつけてがんばってきますねぇ」
1886 = "「好的，玲奈會小心仔細地努力加油的」" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;組が部屋を出ていくと同時。
73 = "\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;們離開了房間。" 

# monologue
# JP: それを待ちかねていたかのように、\n稀咲が僕に近づいてくる。
2863 = "稀咲似乎等待這個時刻很久了。她向我靠了過來。" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄。日々姫とふかみ君もいいかな？　後東氏も交えて、\n帝都の広告代理店との打ち合わせをできるだけ早期に」
2291 = "「雙鐵，另外日日姬還有深美，你們都方便吧？我們需要儘早和後東先生一起與帝都的廣告公司談談」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　ちょっとだけ――あと半日だけ、\nその席を作るかどうかの判断、待ってもらえますか？」
1802 = "「啊！再等一下，再等半天，讓我判斷一下要不要做這次談判」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ――まだ懸念点。\n何か、解消すべき点があるんだね？」
1853 = "「噢，還沒想清楚啊。看來你是還有什麼要解決的問題吧？」" 

# monologue
# JP: ふかみの答えを聞かぬまま、稀咲はあっさり席を立つ。
2861 = "稀咲並沒有等深美回答，便起身準備離開。" 

# 【稀咲】
# display as 稀咲
# JP: 「皆がいるところで持ち出さなかったのだから、\nボクもいない方がいいね？　決まったら知らせて欲しい」
2136 = "「畢竟大家都在場的時候你沒提出來，那想必是我也不方便聽這件事。定好了記得通知我」" 

# 【ふかみ】
# display as 深美
# JP: 「はい。ありがとうございます。\n必ずお知らせします、です！」
