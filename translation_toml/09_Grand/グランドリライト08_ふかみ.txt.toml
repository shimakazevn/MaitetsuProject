[script]
# lines: 503 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2991 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch――）"

# 【双鉄】
# display as 雙鐵
# JP: 「……これは――」
2227 = "「……Đây là――」"

# 【路子】
# display as 路子
# JP: 「……くぅ……すぅ……」
1244 = "「……Kuu……suu……」"

# monologue
# JP: 路子が、寝てる。\nいつもの列車の、いつもの座席で。
2605 = "Michiko đang ngủ. Trên chuyến tàu quen thuộc, ở chỗ ngồi quen thuộc."

# monologue
# JP: 極めて平和なその光景に、けれど、困惑してしまう。
2838 = "Khung cảnh vô cùng yên bình ấy, lại khiến tôi bối rối."

# monologue
# JP: （夢の中で眠ってしまうと――\nいったい、どこへいくのだろうか）
2998 = "（Nếu chìm vào giấc ngủ trong mơ―― thì rốt cuộc, mình sẽ đi về đâu nhỉ）"

# monologue
# JP: 不安になる。これは恐らく僕の夢だと――\nいまここにいる路子自体が、現でないと知っているから。
2693 = "Tôi bắt đầu thấy bất an. Có lẽ đây là giấc mơ của tôi―― Bởi vì tôi biết Michiko đang ở đây lúc này không phải là thực tại."

# 【双鉄】
# display as 雙鐵
# JP: 「路子――路子」
2188 = "「Michiko――Michiko.」"

# monologue
# JP: ゆえ、起こす。\nそっと優しく、体を揺する。
2593 = "Vì vậy, tôi đánh thức con bé. Khẽ khàng, dịu dàng lay người nó."

# 【路子】
# display as 路子
# JP: 「んにゃあ……くゆぅ……すぅ……すぅ」
1793 = "「Nnyaa……kuyuu……suu……suu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「路子。時間だ。\n――ああ、いや。『終点です。お客さん』」
2192 = "「Michiko. Đến giờ rồi. ――À, không. 'Đến ga cuối rồi. Thưa quý khách'.」"

# 【路子】
# display as 路子
# JP: 「ふにゅう……むゆ……すぅ……すや……」
# 1793 = "「唔……呼……呼……呼……」" 

# monologue
# JP: ……何度繰り返し揺すっても、\n何をいっても起きてくれない。
1179 = "……Dù tôi có lay bao nhiêu lần, có nói gì đi nữa thì con bé cũng không chịu dậy."

# 【双鉄】
# display as 雙鐵
# JP: 「――やむなしか」
1258 = "「――Hết cách rồi sao.」"

# monologue
# JP: 路子がこのまま目覚めないことが、なにより怖い。\nゆえに、いささか気の毒かとも思いはするが――
2686 = "Việc Michiko cứ mãi không tỉnh lại là điều tôi sợ nhất. Vì vậy, dù thấy hơi tội nghiệp nhưng――"

# monologue
# JP: （むにっ）
2997 = "（Bóp）"

# monologue
# JP: 鼻をつまんで、しばし待つ。\n昔から路子はこうやれば、三十秒もしないうち――！
2682 = "Bóp mũi con bé rồi đợi một lát. Từ xưa đến nay, chỉ cần làm thế này với Michiko, chưa đầy 30 giây――!"

# 【路子】
# display as 路子
# JP: 「ふがっ！？　んにゅっ！？　んっ――ふぁっ！\nぷはあっ！！？」
1823 = "「Fuga!? Nnyu!? Ưm――Fua!\nPuhaa!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おはよう、路子。よく眠れたか？」
1707 = "「Chào buổi sáng, Michiko. Ngủ ngon không?」"

# 【路子】
# display as 路子
# JP: 「あれ？　そーちゃん……？？」
1783 = "「Ủa? Sou-chan……??」"

# monologue
# JP: ぽかんとしている。\n昔とまるっきり同じ反応。
2610 = "Con bé đang ngơ ngác.\nPhản ứng giống hệt như ngày xưa."

# monologue
# JP: 懐かしさが猛烈にこみあげてきて――
2949 = "Nỗi hoài niệm mãnh liệt trào dâng――"

# monologue
# JP: （ぱちっ）
2994 = "（Búng）"

# 【路子】
# display as 路子
# JP: 「ひゃうっ！？　や、でこぴん～っ」
1772 = "「Hyau!? Ây, anh búng trán em~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。ついというか、思わずというか」
1790 = "「A, xin lỗi. Là anh lỡ tay, hay nói đúng hơn là không kiềm chế được.」"

# 【路子】
# display as 路子
# JP: 「すまなくないよ～　えへへ～」
2107 = "「Không cần xin lỗi đâu~ Ehehe~」"

# monologue
# JP: おでこをわずかに赤くして、\nなのに路子は、とっても幸せそうに笑う。
2937 = "Trán hơi ửng đỏ, nhưng Michiko lại cười trông vô cùng hạnh phúc."

# 【路子】
# display as 路子
# JP: 「からだはおっきくなっちゃっても。\nそーちゃんは、そーちゃんなんだねぇ」
2287 = "「Dù cơ thể đã lớn lên. Nhưng Sou-chan vẫn là Sou-chan nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
1795 = "「Ư――」"

# monologue
# JP: なんと、答えればいいのだろうか。\n体さえ、大きくなることができない路子に。
2971 = "Tôi nên trả lời thế nào đây. Với Michiko, người thậm chí không thể lớn lên về mặt thể xác."

# 【双鉄】
# display as 雙鐵
# JP: 「その……だ」
1918 = "「Chuyện đó……」"

# monologue
# JP: もちろん答えはみつけられずに、\nだから、言葉は逃げてしまう。
2679 = "Đương nhiên là không tìm được câu trả lời, thế nên, lời nói đành phải lảng tránh."

# 【路子】
# display as 路子
# JP: 「その？」
1824 = "「Chuyện đó?」"

# 【双鉄】
# display as 雙鐵
# JP: 「その――路子は、ああ、うん。\n眠っているとき、夢をみたのか？」
1928 = "「Chuyện đó――Michiko, à, ừm. Lúc ngủ, em có mơ thấy gì không?」"

# 【路子】
# display as 路子
# JP: 「あ！　うん！　見た！　見たって思う！！\nパパとママのゆめ！　見てた気がする！」 
1806 = "「A! Vâng! Có mơ! Em nghĩ là có mơ!! Giấc mơ về bố và mẹ! Em cảm giác mình đã mơ thấy!」"

# 【双鉄】
# display as 雙鐵
# JP: 「父さんと母さんの？」
1694 = "「Của bố và mẹ sao?」"

# 【路子】
# display as 路子
# JP: 「うん。あのね、パパとママ、きっともうすぐあえるって。\nいいこでまっててって――うん！　うん！　いってた！」
1842 = "「Vâng. Bố và mẹ nói rằng, chắc chắn sắp được gặp nhau rồi. Bảo em phải ngoan ngoãn đợi――Vâng! Vâng! Đã nói vậy đó!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか――\n待っているように。そう伝えてくれたのか」
2056 = "「Vậy sao――\nBảo em đợi. Họ đã nói với em như vậy à.」"

# 【路子】
# display as 路子
# JP: 「うん！！」
1833 = "「Vâng!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――きっと。\n路子を、絶対に迎えにきてくれるな」
2243 = "「Nếu vậy――Chắc chắn rồi. Họ tuyệt đối sẽ đến đón Michiko.」"

# 【路子】
# display as 路子
# JP: 「うん！！！」
1834 = "「Vâng!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのためにも」
2124 = "「Cũng vì điều đó.」"

# 【路子】
# display as 路子
# JP: 「そーちゃんのれっ車！　ナインスターズ！\nじゅんびすごいね、すごいいきおいで動いてるね！」
1925 = "「Chuyến tàu của Sou-chan! Nine Stars! Chuẩn bị hoành tráng quá, đang di chuyển với khí thế hừng hực nhỉ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2049 = "「Ừ――」"

# monologue
# JP: 苦労が、疲れが、一気に吹き飛ぶ。\n路子が、わくわくしてくれている。
2940 = "Mọi vất vả, mệt nhọc như tan biến trong chốc lát. Michiko đang rất háo hức."

# monologue
# JP: 僕の、僕らの列車のことを、\nこれほど眩しいような笑顔で、語ってくれてる。
2629 = "Về chuyến tàu của tôi, của chúng tôi, con bé đang nói với một nụ cười rạng rỡ đến thế."

# 【路子】
# display as 路子
# JP: 「えきまえ！　なんかできたよね？！\nあれなぁに？？」
2194 = "「Trước nhà ga! Hình như mới xây xong cái gì đó đúng không?! Đó là cái gì vậy??」"

# 【双鉄】
# display as 雙鐵
# JP: 「“ガマダス”だな。鉄道資料館を兼務した、\n休憩と観光案内のための施設だ」
2255 = "「Là \"Gamadasu\". Một cơ sở kiêm luôn bảo tàng tư liệu đường sắt, dùng để nghỉ ngơi và hướng dẫn du lịch.」"

# 【路子】
# display as 路子
# JP: 「がまだす――カエルさんでてくるの？\nなにいろのカエルさん？？」
2305 = "「Gamadasu――Có ếch xuất hiện không? Chú ếch màu gì vậy??」"

# 【双鉄】
# display as 雙鐵
# JP: 「残念ながらガマは出てこん。“がまだす”というのは、\n隈元弁で、“頑張る”というほどの意味だそうだ」
2011 = "「Rất tiếc là không có con ếch nào cả. \"Gamadasu\" trong phương ngữ Kumamoto có nghĩa là \"cố gắng\".」"

# 【路子】
# display as 路子
# JP: 「そーなんだ！　おもしろぉい！」
2079 = "「Ra là vậy! Thú vị quá!」"

# 【双鉄】
# display as 雙鐵
# JP: 「実際。面白い施設だな。日々姫デザインで、\n丸一日でも飽きずに過ごせる空間に仕上がっている」
2259 = "「Thực tế thì. Đó là một cơ sở rất thú vị. Do Hibiki thiết kế, được hoàn thiện thành một không gian có thể dành trọn một ngày mà không thấy chán.」"

# 【路子】
# display as 路子
# JP: 「へぇぇ！」
2060 = "「Hee!」"

# 【双鉄】
# display as 雙鐵
# JP: 「レイルロマネスク湯医線の。そしてナインスターズの。\n起点駅であることを示す、いわば、駅併設の迎賓館だ」
2260 = "「Nó thể hiện đây là ga khởi điểm của Tuyến Rail Romanesque Yui. Và của Nine Stars. Có thể nói, đó là một nhà khách gắn liền với nhà ga.」"

# 【路子】
# display as 路子
# JP: 「げいひんかん」
2199 = "「Nhà khách.」"

# 【双鉄】
# display as 雙鐵
# JP: 「実際、オリヴィなどはじめて訪ねた時、\n"wonderful!"と叫んで、丸一日入り浸っていたそうだ」
1867 = "「Thực tế, khi Olivy đến thăm lần đầu, cô bé đã hét lên \"wonderful!\" và nấn ná ở đó suốt cả ngày đấy.」"

# monologue
# JP: 言えば路子は、目を輝かせる。
2898 = "Nghe vậy, đôi mắt Michiko sáng rực lên."

# 【路子】
# display as 路子
# JP: 「金ぱつのちっちゃいこのこと！？　あのこかわいい！\nあのこの機関車も、ちっちゃくてかわいい！」
1932 = "「Là cô bé tóc vàng nhỏ nhắn đó hả!? Cô bé đó đáng yêu lắm! Đầu máy của cô bé đó cũng nhỏ xíu và dễ thương nữa!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、オリヴィのことも知っていたか。\n機関車の方は、[きゅう]Ⅸ号だ」
1849 = "「À, em cũng biết cả Olivy sao. Còn chiếc đầu máy là số IX.」"

# 【路子】
# display as 路子
# JP: 「きゅうごう！　あのこといっしょにのってるおじさんは、\nちょっぴりこわそうだけど」
1661 = "「Số IX! Chú đi cùng với cô bé đó, trông hơi đáng sợ một chút nhưng mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「宗方\x%l機関士;#00ffc040;機関士%l;#;は、怖い人ではないぞ。ただ……\nまぁ確かに、愛想には欠けるが、根は親切だ」
1906 = "「\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata không phải người đáng sợ đâu. Chỉ là…… À thì đúng là chú ấy hơi thiếu hòa đồng, nhưng bản chất lại rất tốt bụng.」"

# 【路子】
# display as 路子
# JP: 「そおなんだ！　しんせつっていったら、\nなぎちゃんの新しいおともだちもしんせつだよね！」
2080 = "「Vậy sao! Nhắc đến tốt bụng thì, bạn mới của Nagi-chan cũng tốt bụng lắm đó!」"

# monologue
# JP: 凪の新しい――お友達というよりはライバルだろうが、\n中村千景さんのことだろう。
2550 = "Người bạn mới của Nagi――nói là đối thủ thì đúng hơn, chắc là đang nhắc đến cô Nakamura Chikage."

# monologue
# JP: 凪をして、公式大会1勝13敗の対戦成績だという\n少等部時代からの、凪の、剣道の宿敵だ。
2544 = "Với thành tích đối đầu ở các giải đấu chính thức là 1 thắng 13 thua, cô ấy là kỳ phùng địch thủ kendo của Nagi từ thời tiểu học."

# 【双鉄】
# display as 雙鐵
# JP: 「中村さんが、なにか親切を？」
1655 = "「Cô Nakamura đã làm gì tốt bụng sao?」"

# 【路子】
# display as 路子
# JP: 「朝早くからひとりでさがしてあげてたよ！\nみんなでいっしょうけんめいさがしものしてた、次のひ」
1868 = "「Từ sáng sớm chị ấy đã đi tìm một mình đó! Vào ngày hôm sau cái hôm mà mọi người cùng nhau cố gắng tìm kiếm ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！　コンタクト騒動のときか！！」
1809 = "「! Là vụ ồn ào tìm kính áp tròng sao!!」"

# monologue
# JP: お客様がホームでコンタクトレンズを落とされて、\n総動員して探し回って、見つからなかった騒動だ。
2753 = "Một hành khách làm rơi kính áp tròng trên sân ga, mọi người đã huy động toàn bộ lực lượng để tìm kiếm nhưng không thấy."

# monologue
# JP: 次の日に、「たまたまみつけた」と、\n中村さんが届けてくれて、大感謝されたことがあったが。
2880 = "Ngày hôm sau, cô Nakamura đã mang đến và bảo là \"tình cờ tìm thấy\", và đã được cảm ơn rối rít."

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことをしてくれていたのか――\nまだ、内定段階であるというのに」
1877 = "「Cô ấy đã làm đến mức đó sao―― Mặc dù vẫn đang trong giai đoạn nội định.」"

# 【路子】
# display as 路子
# JP: 「ないてーだんかい？」
1715 = "「Giai đoạn nội định?」"

# 【双鉄】
# display as 雙鐵
# JP: 「“会社に入る約束はしているが、\nまだ入社はしていない”という状態だな」
1929 = "「Là trạng thái \"đã hứa hẹn sẽ vào công ty, nhưng vẫn chưa chính thức làm việc\" ấy.」"

# 【路子】
# display as 路子
# JP: 「そーなんだ」
2078 = "「Ra là vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「前職との兼ね合いだなんだがあるらしく、来年4月の\n入社となる。宗方さんとオリヴィも、同様だな」
1873 = "「Có vẻ như còn vướng bận công việc trước đây nên tháng 4 năm sau mới chính thức vào làm. Chú Munakata và Olivy cũng vậy.」"

# 【路子】
# display as 路子
# JP: 「へええ。おとなのせかいは、いろいろあるんだねぇ」
2058 = "「Hêê. Thế giới của người lớn, có nhiều chuyện phức tạp nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ、確かにいろいろ――\nありすぎるほどいろいろある」
2051 = "「Đúng vậy, quả thật có rất nhiều chuyện―― Nhiều đến mức quá đáng.」"

# monologue
# JP: ここのところはようやく順調に全般回り始めたが、\nさりとて少しも油断は出来ない。
2751 = "Dạo gần đây mọi việc cuối cùng cũng bắt đầu đi vào quỹ đạo, nhưng dẫu vậy vẫn không thể lơ là dù chỉ một chút."

# 【路子】
# display as 路子
# JP: 「そーちゃん、またたいへんなの？」
1926 = "「Sou-chan, anh lại đang vất vả sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1801 = "「!」"

# monologue
# JP: いかん。路子の妙におとなびた声につられてしまい、\n余計な心配をかけてしまった。
2484 = "Không ổn rồi. Bị cuốn theo giọng nói có vẻ trưởng thành đến lạ của Michiko, đã khiến con bé phải bận tâm không đáng có."

# 【双鉄】
# display as 雙鐵
# JP: 「いろいろあるし、大変でもあるが、辛くはない。\nむしろ、充実しているから安心してくれ」
1665 = "「Đúng là có nhiều chuyện và cũng vất vả, nhưng không hề khổ sở. Ngược lại, anh thấy rất trọn vẹn nên em cứ yên tâm đi.」"

# 【路子】
# display as 路子
# JP: 「けど――」
1761 = "「Nhưng mà――」"

# monologue
# JP: 路子が急に沈んでしまう。\n不安でゆれる瞳が僕を、見上げてくる。
2935 = "Michiko đột nhiên trầm xuống. Đôi mắt dao động đầy bất an ngước lên nhìn tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「けれど――どうした？」
1681 = "「Nhưng mà――sao thế?」"

# 【路子】
# display as 路子
# JP: 「おどおどちゃん、ふかみちゃん――\nいなくなっちゃったの？　もう、ずっと見てない」
2244 = "「Cô bé nhút nhát, Fukami-chan―― đã đi đâu rồi sao? Lâu lắm rồi em không thấy chị ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。なんだ。そのことを心配してくれたのか」
1789 = "「À. Ra vậy. Em đang lo lắng về chuyện đó sao.」"

# monologue
# JP: 大丈夫だと、頭を撫でる。
2684 = "Tôi xoa đầu con bé, bảo rằng không sao đâu."

# monologue
# JP: ――路子の頭は、こんなにも小さなものだったのかと、\n感じつつ。
1148 = "――Trong khi cảm nhận được rằng, đầu của Michiko lại nhỏ bé đến nhường này."

# 【双鉄】
# display as 雙鐵
# JP: 「そのことであれば心配無用だ。\nふかみは単に、長期研修にでているだけだ」
2221 = "「Nếu là chuyện đó thì không cần phải lo. Fukami chỉ đơn giản là đang đi tham gia khóa tu nghiệp dài hạn thôi.」"

# 【路子】
# display as 路子
# JP: 「ちょーきけんしゅう？」
2281 = "「Khóa tu nghiệp dài hạn?」"

# 【日々姫】
# display as ？？？
# JP: 「――にぃに！　にぃにっ！」
1205 = "「――Anh hai! Anh hai!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1822 = "「!!?」"

# 【日々姫】
# display as 日日姬
# JP: 「いまうとうとしとったでしょー。疲れとるのわかるけど、\nいけんよ？　講義中にいねむりだとか」
1693 = "「Anh vừa mới ngủ gật đúng không. Em biết là anh mệt, nhưng không được đâu nha? Ngủ gật trong giờ giảng bài là không được đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ……うむ。すまん」
1796 = "「A……ừm. Xin lỗi.」"

# monologue
# JP: というか、完全に一瞬寝ていた。\n夢まで見ていたような気がする。
2675 = "Nói đúng hơn là tôi đã hoàn toàn ngủ thiếp đi trong một chốc. Cảm giác như tôi còn mơ thấy gì đó nữa."

# 【日々姫】
# display as 日日姬
# JP: 「わたしはよかけど、ふかみちゃん――\nふかみ先生が気の毒でしょお」
1977 = "「Em thì sao cũng được, nhưng Fukami-chan―― cô giáo Fukami sẽ thấy buồn đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。そして同時に、聴き逃してはもったいない。\n講義内容――実際に、すぐにも業務に活かせそうだ」
2054 = "「Đúng vậy. Đồng thời, bỏ lỡ bài giảng này thì thật uổng phí. Nội dung bài giảng――thực tế là có thể áp dụng ngay vào công việc được.」"

# 【日々姫】
# display as 日日姬
# JP: 「よね」
# 2049 = "「是啊」" 

# monologue
# JP: 日々姫の手元、開かれてるスケッチブックはもう、\n絵で、図で、メモで、真っ黒に近くなっている。
2740 = "Cuốn phác thảo đang mở trên tay Hibiki, đã gần như đen kịt bởi những bức vẽ, sơ đồ và ghi chú."

# monologue
# JP: ――ふかみが学び取ってきて、伝えてくれていることが、\n鉄道業にも、デザインにさえも応用できることの証左だ。
1152 = "――Những điều Fukami học được và truyền đạt lại, chính là minh chứng cho việc có thể ứng dụng vào cả ngành đường sắt lẫn thiết kế."

# 【ふかみ】
# display as 深美
# JP: 「[ていおう,1]帝央ホテルにおける一年間の研修で、最も徹底的に\n教えていただけたのは、“背中に目を持つ”ことです」
1858 = "「Trong suốt một năm tu nghiệp tại Khách sạn Teio, điều em được chỉ dạy cặn kẽ nhất chính là \"Phải có mắt ở sau lưng\".」"

# monologue
# JP: ……ふかみが不在の一年間。
1200 = "……Một năm Fukami vắng mặt."

# monologue
# JP: クマ川下りも極めて厳しかったようだが、\n御一夜鉄道も、大変に苦労させられた。
2604 = "Có vẻ như dịch vụ xuôi dòng sông Kuma cũng gặp vô vàn khó khăn, và Đường sắt Ohito cũng đã phải chật vật rất nhiều."

# 【ふかみ】
# display as 深美
# JP: 「――背中に目を持つ。見えていないお客様の動きを、\n常に意識し予測する。そのために必要なのは、視点です」
2170 = "「――Phải có mắt ở sau lưng. Luôn ý thức và dự đoán được hành động của những vị khách mà ta không nhìn thấy. Để làm được điều đó, cần phải có góc nhìn.」"

# monologue
# JP: （ふかみがどれほど、目立たぬ部分を、\n地道に埋め続けてくれていたことか――）
2999 = "（Fukami đã luôn âm thầm lấp đầy những khoảng trống không ai chú ý đến nhường nào――）"

# monologue
# JP: 凪とのコミュニケーションミスが驚くほどに増加したし、\n実りを得ぬまま散会に至る会議も頻発した。
2958 = "Lỗi giao tiếp với Nagi tăng lên một cách đáng kinh ngạc, những cuộc họp kết thúc mà không thu được kết quả gì cũng diễn ra thường xuyên."

# monologue
# JP: が、月一でふかみが御一夜に戻ってくると、\nそれが綺麗に解消するのだ。
2519 = "Thế nhưng, cứ mỗi tháng một lần khi Fukami trở về Ohito, những vấn đề đó lại được giải quyết một cách êm đẹp."

# 【ふかみ】
# display as 深美
# JP: 「上から見おろす鳥の視点と、地表を動く[あり]蟻の視点とを、\n両立させて、ともに[おろそ]疎かにしないこと」
2176 = "「Góc nhìn của loài chim nhìn xuống từ trên cao, và góc nhìn của loài kiến di chuyển trên mặt đất, phải kết hợp cả hai và không được lơ là bên nào.」"

# monologue
# JP: その事実だけで、逆説的に、ふかみがどれほど\n見えないところで、僕らのチームに寄与しているかが――
2570 = "Chỉ với sự thật đó thôi, theo một cách nghịch lý, đã cho thấy Fukami đóng góp cho đội của chúng tôi ở những nơi khuất tầm mắt nhiều đến mức nào――"

# 【ふかみ】
# display as 深美
# JP: 「この視点は、鉄道業にも応用できます。実際に適用する\nことで、[プロジェクト・ナインスターズ,4]九つ星計画の課題の一つ、インバウンド誘致」
2229 = "「Góc nhìn này cũng có thể ứng dụng vào ngành đường sắt. Bằng cách áp dụng vào thực tế, một trong những bài toán của Kế hoạch Nine Stars, đó là thu hút khách du lịch quốc tế (inbound).」"

# 【凪】
# display as 凪
# JP: 「インバウンド誘致って、なにばい？」
1670 = "「Thu hút khách du lịch quốc tế, là sao á?」"

# 【ふかみ】
# display as 深美
# JP: 「それはね？　凪ちゃん」
2222 = "「Cái đó á? Nagi-chan.」"

# monologue
# JP: ああ――これだ。\n『それはね？　凪ちゃん』『あのね？　凪ちゃん』。
2589 = "A――Chính là cái này. \"Cái đó á? Nagi-chan\" \"Nghe này? Nagi-chan\"."

# monologue
# JP: そこから始まる会話がどれ程、論点整理に役立っているか、\n僕らはまったく、理解も感謝もできてなかった。
2695 = "Những cuộc trò chuyện bắt đầu từ đó đã giúp ích cho việc sắp xếp lại các luận điểm nhiều đến nhường nào, mà chúng tôi hoàn toàn không hiểu được, cũng chẳng hề biết ơn."

# 【ふかみ】
# display as 深美
# JP: 「インバウンドっていうのは、この場合、日ノ本から見た\n海外――外国から来てくださる観光客さんのこと」
2008 = "「Khách du lịch quốc tế, trong trường hợp này, là từ góc nhìn của Hinamoto đối với nước ngoài――chỉ những du khách đến từ các nước khác.」"

# 【凪】
# display as 凪
# JP: 「なーんね、外国人さん誘致のことなら、\nいっつも話とって、全然方法のでんこと――おおお！？」
1669 = "「Gì vậy nè, nếu là chuyện thu hút người nước ngoài thì lúc nào cũng bàn mà có ra được cách nào đâu――Ooo!?」"

# monologue
# JP: 凪の瞳がまんまるになる。
2552 = "Đôi mắt Nagi tròn xoe."

# 【凪】
# display as 凪
# JP: 「そん方法、“背中に目”やらで、\nふかみちゃん、思いついたと？」
2292 = "「Cái cách đó, nhờ \"mắt ở sau lưng\" gì đó, Fukami-chan đã nghĩ ra rồi sao?」"

# 【ふかみ】
# display as 深美
# JP: 「方法っていうか、少しはヒントになるかもってことなら。\n――うん、思いついた」
1844 = "「Nói là cách thì cũng không hẳn, nhưng nếu là một chút gợi ý thì. ――Ừm, em nghĩ ra rồi.」"

# monologue
# JP: （ああ――）
2992 = "（A――）"

# monologue
# JP: 一年間。僕らとも翠さんとも堰さんたちとも。\nそうしてなによりクマ川とも、離れ暮らした研修生活。
2947 = "Một năm trời. Xa cách chúng tôi, cô Midori, ông Seki và mọi người. Và hơn hết là xa dòng sông Kuma, để trải qua cuộc sống tu nghiệp."

# monologue
# JP: それがどれほど、ふかみの背筋を伸ばしてくれたか――\n今、鮮やかに示されている。
2895 = "Quãng thời gian đó đã giúp Fukami trưởng thành và tự tin lên nhường nào―― Bây giờ, điều đó đang được thể hiện vô cùng rõ nét."

# 【凪】
# display as 凪
# JP: 「どぎゃん方法ばい？」
1671 = "「Cách gì vậy nè?」"

# 【ふかみ】
# display as 深美
# JP: 「想像してみて、凪ちゃん。ナインスターズの走る線路。\nそれが、全部繋がってる九洲を」
1695 = "「Thử tưởng tượng xem, Nagi-chan. Tuyến đường sắt mà Nine Stars chạy qua. Đó là một Kyushu được kết nối toàn bộ.」"

# 【凪】
# display as 凪
# JP: 「……想像したばい！　凪様、にーさんとハチロクと、\n九洲中を走り回っとるばい！」
1264 = "「……Tưởng tượng rồi nè! Nagi-sama, cùng với anh hai và chị Hachiroku, đang chạy vòng quanh khắp Kyushu luôn!」"

# 【ふかみ】
# display as 深美
# JP: 「それが、蟻の視点。今見えたものを忘れないまま、\n今度は、鳥になって、線路の上を飛んでみて？」
2226 = "「Đó là góc nhìn của loài kiến. Hãy ghi nhớ những gì em vừa thấy, và lần này, thử biến thành một chú chim, bay lượn trên đường ray xem sao?」"

# 【凪】
# display as 凪
# JP: 「わかったとばい！！」
1879 = "「Hiểu rồi nè!!」"

# monologue
# JP: ……僕も、凪と同じく、蟻の視点で考えていた。\n皆も同じであったのか、ハッとしたような顔をする。
1191 = "……Tôi cũng giống như Nagi, luôn suy nghĩ từ góc nhìn của loài kiến. Có lẽ mọi người cũng vậy, ai nấy đều tỏ vẻ chợt nhận ra điều gì đó."

# monologue
# JP: 意識を切り替え、鳥の視点――\n上から見ようと試みてみる。
2691 = "Thay đổi nhận thức, góc nhìn của loài chim―― Thử cố gắng nhìn xuống từ trên cao."

# 【凪】
# display as 凪
# JP: 「見えたばい！　隈元県が、線路でつながっとるばい！」
2143 = "「Thấy rồi nè! Tỉnh Kumamoto, được kết nối bằng đường ray!」"

# 【ふかみ】
# display as 深美
# JP: 「もっと高くに飛んで？　九洲全部はどう見える？」
1721 = "「Bay cao hơn nữa xem? Toàn bộ Kyushu trông như thế nào?」"

# 【凪】
# display as 凪
# JP: 「九洲ぐるっと、線路がぜぇんぶつながっとるばい！」
2019 = "「Khắp Kyushu, đường ray được kết nối toàn bộ luôn nè!」"

# 【ふかみ】
# display as 深美
# JP: 「もっと高く。衛星軌道にまで飛んで？　どう見える？\n[めいこく,1]冥国、[えいこく,1]詠国、[どっこく,1]髑国、フランク、[ちゅうごく,1]仲国、[かんこく,1]汗国とかの線路は」
1722 = "「Cao hơn nữa. Bay lên tận quỹ đạo vệ tinh xem? Trông như thế nào? Đường ray ở các nước như Mỹ, Anh, Đức, Pháp, Trung Quốc, Hàn Quốc thì sao?」"

# 【凪】
# display as 凪
# JP: 「え？　ええっと」
1821 = "「Hả? Ờ thì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！　そうか！\nそこ自体が、最大の売りになるのか！！」
1810 = "「! Ra là vậy! Chính điều đó sẽ trở thành điểm bán hàng lớn nhất sao!!」"

# 【ふかみ】
# display as 深美
# JP: 「やっぱり！　双鉄おにいさんもそう思いますか！？」
1986 = "「Quả nhiên là vậy! Anh Soutetsu cũng nghĩ thế ạ!?」"

# 【日々姫】
# display as 日日姬
# JP: 「そっか！　わかった！！！」
2061 = "「Ra vậy! Em hiểu rồi!!!」"

# monologue
# JP: 日々姫が猛然とスケッチブックに絵を描き始め、\nポーレットと稀咲も動き始める。
2744 = "Hibiki bắt đầu cắm cúi vẽ lên cuốn phác thảo, Paulette và Kisaki cũng bắt đầu hành động."

# monologue
# JP: 真闇姉はただにこにことして――\nハチロクれいな、凪はその首を傾げたままだ。
2836 = "Chị Mayami chỉ mỉm cười―― Còn Hachiroku, Reina và Nagi thì vẫn nghiêng đầu khó hiểu."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。わたくし、日ノ本以外の国の鉄道事情には、\nまったくくわしくないのですけれど」
2289 = "「Ngài Soutetsu. Tôi hoàn toàn không nắm rõ tình hình đường sắt ở các quốc gia khác ngoài Hinamoto, nhưng mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「エアクラの更なる躍進。大廃線による鉄道衰退は、\n全世界的な傾向であることは変わっていない」
2162 = "「Sự tiến bộ vượt bậc của Aircra. Sự suy thoái của đường sắt do Đại bãi bỏ các tuyến, là xu hướng mang tính toàn cầu không hề thay đổi.」"

# monologue
# JP: 必要なのは、ただその事実を思い出すことだけ。
2672 = "Điều cần thiết, chỉ là nhớ lại sự thật đó."

# monologue
# JP: うんうん悩みこんでたれいなが、\n言った瞬間、うれしげにその顔を持ち上げる。
2899 = "Reina đang nhăn nhó suy nghĩ, khoảnh khắc tôi vừa nói xong, em ấy vui vẻ ngẩng mặt lên."

# 【れいな】
# display as 玲奈
# JP: 「ならなら、日ノ本がいちばぁん最初に、\nそこをぬけられるかもしれないんですねぇ」
2271 = "「Nếu vậy thì, Hinamoto có thể là quốc gia đầu tiên, thoát khỏi tình trạng đó nhỉ~」"

# 【ハチロク】
# display as 八六
# JP: 「ああ！」
# 1801 = "「啊！」" 

# 【凪】
# display as 凪
# JP: 「わかったとばい！　すごかとばい！！」
2035 = "「Hiểu rồi nè! Đỉnh quá đi!!」"

# 【れいな】
# display as 玲奈
# JP: 「ほえ？　なにがですかぁ？」
1787 = "「Hả? Cái gì cơ ạ?」"

# monologue
# JP: 殆ど正解を示していながら、\nしかしれいなには見えていない。
2816 = "Dù gần như đã đưa ra câu trả lời chính xác, nhưng Reina vẫn chưa nhìn ra."

# monologue
# JP: ……れいなの視点はどこまでも、\n日常に添い、それを愛する、蟻の視点であるのだろう。
1201 = "……Góc nhìn của Reina luôn luôn gắn liền với cuộc sống thường ngày và yêu thương nó, đó có lẽ là góc nhìn của loài kiến."

# 【凪】
# display as 凪
# JP: 「日ノ本だけが！　九洲だけが！！　\nこぎゃんと長くつながってる線路を持つとこになるばい」
2017 = "「Chỉ có Hinamoto! Chỉ có Kyushu!! Mới có được tuyến đường sắt kết nối dài đến như vậy đó!」"

# 【ハチロク】
# display as 八六
# JP: 「鉄道に9日間乗り続けられるナインスターズの旅は、\nただそれだけで、“世界で唯一”のものとなるのですね」
1857 = "「Chuyến đi Nine Stars kéo dài 9 ngày liên tục trên tàu hỏa, chỉ riêng điều đó thôi, đã trở thành thứ \"duy nhất trên thế giới\" rồi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ホテルクオリティの車内サービスより、こだわり抜いた\n内外装より。一番に打ち出すべきは、そこだったのだな」
2102 = "「Hơn cả dịch vụ trên tàu chất lượng như khách sạn, hơn cả nội ngoại thất được chăm chút tỉ mỉ. Đó mới là điểm cần được quảng bá mạnh mẽ nhất.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、海外の鉄道事情、\n念のため海外テツの人に確認してみます！」
1709 = "「Tôi sẽ thử xác nhận lại tình hình đường sắt ở nước ngoài với những người hâm mộ đường sắt quốc tế cho chắc ăn!」"

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんも、海外に知り合いのおるけん。\nそいば売りになるか、何人かに聞いてみるとね」
1902 = "「Chị cũng có người quen ở nước ngoài. Chị sẽ thử hỏi vài người xem liệu đó có thể trở thành điểm nhấn bán hàng không nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「その方向で、構わんか？」
2090 = "「Triển khai theo hướng đó, có được không?」"

# monologue
# JP: ポーレットに問えばみなが頷く。\nそして、一斉に動き始める。
2677 = "Tôi hỏi Paulette, mọi người đều gật đầu. Và rồi, tất cả đồng loạt bắt tay vào việc."

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。なんだかすごいことになりそうですねぇ」
1780 = "「Ufufuu. Cảm giác sắp có chuyện gì đó thật tuyệt vời xảy ra nhỉ~」"

# 【凪】
# display as 凪
# JP: 「凪様！　凪様もなにかするばい！」
1732 = "「Nagi-sama! Nagi-sama cũng sẽ làm gì đó nè!」"

# 【ハチロク】
# display as 八六
# JP: 「なにかも何も乗務でしょう。\n本日は、赤井－凪－ニイロク体制ですよ？」
1697 = "「Làm gì nữa chứ, đương nhiên là làm nhiệm vụ trên tàu rồi. Hôm nay là ca trực của nhóm Akai - Nagi - Niiroku mà?」"

# 【凪】
# display as 凪
# JP: 「そうだったばい！　今度こそハチロクから百点！\nもらえるようにがんばるばい！！」
1663 = "「Đúng rồi nè! Lần này nhất định phải cố gắng để được chị Hachiroku cho 100 điểm mới được!!」"

# monologue
# JP: 凪が小走りに駆け出していく。
2548 = "Nagi chạy chậm bước đi."

# 【凪】
# display as 凪
# JP: 「ばいばいふかみちゃん！　またあとでー！\n話、ちょー面白かったばい！」
2014 = "「Bái bai Fukami-chan! Lát gặp lại nha~! Câu chuyện thú vị lắm luôn đó!」"

# 【ふかみ】
# display as 深美
# JP: 「ありがと、凪ちゃん。気をつけて」
2180 = "「Cảm ơn em, Nagi-chan. Đi cẩn thận nhé.」"

# 【ハチロク】
# display as 八六
# JP: 「それでは双鉄様、いってまいります」
2272 = "「Vậy thì ngài Soutetsu, tôi xin phép đi trước ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ご安全に。よい乗務を」
1839 = "「Ừm. Chú ý an toàn nhé. Chúc chuyến đi thuận lợi.」"

# 【れいな】
# display as 玲奈
# JP: 「はぁい。気をつけてがんばってきますねぇ」
1886 = "「Vâng ạ. Reina sẽ đi cẩn thận và cố gắng nha~」"

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;組が部屋を出ていくと同時。
73 = "Ngay khi nhóm \\x%lレイルロオド;#00ffc040;Railord%l;#; rời khỏi phòng."

# monologue
# JP: それを待ちかねていたかのように、\n稀咲が僕に近づいてくる。
2863 = "Như thể đã đợi sẵn từ lâu,\nKisaki tiến lại gần tôi."

# 【稀咲】
# display as 稀咲
# JP: 「双鉄。日々姫とふかみ君もいいかな？　後東氏も交えて、\n帝都の広告代理店との打ち合わせをできるだけ早期に」
2291 = "「Soutetsu. Hibiki và Fukami cũng được chứ? Cần phải sắp xếp một buổi họp với công ty quảng cáo ở Đế đô cùng với ông Goto càng sớm càng tốt.」"

# 【ふかみ】
# display as 深美
# JP: 「あ！　ちょっとだけ――あと半日だけ、\nその席を作るかどうかの判断、待ってもらえますか？」
1802 = "「A! Đợi một chút――chỉ nửa ngày nữa thôi, chị có thể đợi em quyết định xem có nên tổ chức buổi họp đó không được không ạ?」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ――まだ懸念点。\n何か、解消すべき点があるんだね？」
1853 = "「À――vẫn còn điểm đáng lo ngại. Có vấn đề gì đó cần phải giải quyết đúng không?」"

# monologue
# JP: ふかみの答えを聞かぬまま、稀咲はあっさり席を立つ。
2861 = "Không đợi Fukami trả lời, Kisaki dứt khoát đứng dậy."

# 【稀咲】
# display as 稀咲
# JP: 「皆がいるところで持ち出さなかったのだから、\nボクもいない方がいいね？　決まったら知らせて欲しい」
2136 = "「Vì lúc nãy có mọi người ở đây em không tiện nói, nên chắc tôi cũng không nên ở lại nhỉ? Quyết định xong thì báo cho tôi biết nhé.」"

# 【ふかみ】
# display as 深美
# JP: 「はい。ありがとうございます。\n必ずお知らせします、です！」
1887 = "「Vâng. Cảm ơn chị ạ.\nNhất định em sẽ thông báo, ạ!」"

# monologue
# JP: よほどほっとしたのだろうか、\n昔のふかみがわずかに覗いた。
2781 = "Có vẻ như đã thở phào nhẹ nhõm, Fukami của ngày xưa lại thoáng hiện ra."

# monologue
# JP: そこにか、他のどこかにか。\n稀咲はほんのりと笑いを浮かべて、部屋を出て行く。
2865 = "Không biết là vì điều đó hay vì lý do nào khác. Kisaki nở một nụ cười nhẹ, rồi rời khỏi phòng."

# 【ふかみ】
# display as 深美
# JP: 「それで、ですね。日々姫さん」
2003 = "「Và, chuyện là. Chị Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん。わかっとー。\nふかみちゃんの話聞いとったら、わかった」
1838 = "「Ừ. Chị hiểu mà. Nghe Fukami-chan nói là chị hiểu rồi.」"

# monologue
# JP: 日々姫がスケッチブックを閉じる。
2734 = "Hibiki gập cuốn phác thảo lại."

# monologue
# JP: そうして、このガマダス・カフェの雇われマスター、\n山崎さんを、手をあげて呼ぶ。
2809 = "Rồi em ấy giơ tay gọi anh Yamazaki, người quản lý được thuê của quán cà phê Gamadasu này."

# 【日々姫】
# display as 日日姬
# JP: 「山崎さん、すいません。レモンティーをホットで。\nそれと――にぃにとふかみちゃんは？」
1936 = "「Anh Yamazaki, phiền anh cho một trà chanh nóng. Với lại――anh hai và Fukami-chan thì sao?」"

# 【ふかみ】
# display as 深美
# JP: 「あの、ええと？」
1775 = "「Dạ, ờm?」"

# 【日々姫】
# display as 日日姬
# JP: 「頼んどいたほうが良かとよ。ふかみちゃんの話ば、\nナインスターズ。『足りてない』ってことでしょお？」
2233 = "「Nên gọi nước đi thì hơn đó. Chuyện Fukami-chan muốn nói, là về Nine Stars. 'Vẫn chưa đủ' đúng không?」"

# 【ふかみ】
# display as 深美
# JP: 「――はい。一番簡単にいうと、そうなります」
1256 = "「――Vâng. Nói một cách đơn giản nhất thì là vậy ạ.」"

# monologue
# JP: なるほど。日々姫があれほど真剣にふかみの講義を\n受講していたその理由。
2559 = "Ra là vậy. Lý do mà Hibiki lại tham gia bài giảng của Fukami một cách nghiêm túc đến thế."

# monologue
# JP: それはつまり、ふかみの示す一流ホテルのもてなしに、\n現行ナインスターズ案では届いていないゆえであったか。
2705 = "Tức là, với phương án Nine Stars hiện tại, vẫn chưa đạt đến tiêu chuẩn hiếu khách của một khách sạn hạng nhất mà Fukami đã chỉ ra."

# 【日々姫】
# display as 日日姬
# JP: 「それなら、頼んどこ？　こいば、どー考えても、\n長か話し合いになっちゃうけんね」
2251 = "「Nếu vậy thì gọi nước đi ha? Dù nghĩ thế nào đi nữa, cuộc nói chuyện này chắc chắn sẽ dài lắm đây.」"

# 【ふかみ】
# display as 深美
# JP: 「はい――です。はい」
1880 = "「Vâng――ạ. Vâng.」"

# 【日々姫】
# display as 日日姬
# JP: 「で。ふかみちゃん的にも、\nにぃににもいてもらったほうが、よかとでしょ？」
2234 = "「Và. Về phía Fukami-chan, cũng muốn anh hai ở lại cùng đúng không?」"

# 【ふかみ】
# display as 深美
# JP: 「はい。双鉄おにい――双鉄さん」
2072 = "「Vâng. Anh Soutetsu――Anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1801 = "「啊！」" 

# monologue
# JP: 間近にじっと見つめられ、\n一瞬、心臓がはねてしまう。
2607 = "Bị nhìn chằm chằm ở khoảng cách gần, trong chốc lát, tim tôi đập lỡ một nhịp."

# monologue
# JP: 未熟なころから、ふかみは美人と感じていたが――\n強い志を帯びた瞳の、なんと深く美しいことか。
2599 = "Từ lúc còn ngây ngô, tôi đã thấy Fukami là một người xinh đẹp―― Nhưng đôi mắt mang ý chí kiên định ấy, sao lại sâu thẳm và đẹp đẽ đến thế."

# 【ふかみ】
# display as 深美
# JP: 「お願いします。日々姫さんへの相談に、\nどうか、立ち会って欲しいです」
2015 = "「Làm phiền anh. Buổi bàn bạc với chị Hibiki, mong anh hãy có mặt ở đây ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1878 = "「Được――」"

# monologue
# JP: 一年一人で頑張って、僕らに不足している多くを、\n御一夜鉄道へと持ち込んでくれた。
2623 = "Một năm trời nỗ lực một mình, em ấy đã mang về cho Đường sắt Ohito rất nhiều điều mà chúng tôi còn thiếu sót."

# monologue
# JP: その恩にわずかでも報いるためにも、\n無論、できることの全てを尽くそう。
2806 = "Để báo đáp phần nào công ơn đó, đương nhiên, tôi sẽ dốc hết sức mình làm mọi thứ có thể."

# 【双鉄】
# display as 雙鐵
# JP: 「喜んで」
1988 = "「Rất sẵn lòng.」"

# 【日々姫】
# display as 日日姬
# JP: 「…………」
1222 = "「…………」"

# 【ふかみ】
# display as 深美
# JP: 「…………」
# 1222 = "「……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうて――っと」
2131 = "「Tranh――à.」"

# monologue
# JP: 争点、などと迂闊にいえば、\n今の議論が、争いであったと認識させてしまいかねない。
2911 = "Nếu lỡ miệng nói là \"tranh luận\", rất có thể sẽ khiến hai người họ nghĩ rằng cuộc thảo luận vừa rồi là một cuộc cãi vã."

# monologue
# JP: 日々姫もふかみも、お互いに譲れぬものを正面に立て、\nまっこうから激しくぶつかりあってはいたが。
2965 = "Dù Hibiki và Fukami đều thẳng thắn đưa ra những quan điểm không thể nhượng bộ, và đã va chạm với nhau rất gay gắt."

# 【双鉄】
# display as 雙鐵
# JP: 「……論点は、ひとまず出揃ったと考えて構わんか？」
1241 = "「……Các luận điểm, coi như đã được đưa ra đầy đủ rồi chứ?」"

# 【ふかみ】
# display as 深美
# JP: 「はい――です。わたしは、改善してほしい点は、\n全部おはなしできたかなって、思ってます」
2067 = "「Vâng――ạ. Em nghĩ là mình đã nói hết những điểm muốn cải thiện rồi.」"

# 【日々姫】
# display as 日日姬
# JP: 「こっちもよかとよ。できんことはできんって、\nきっちり伝え終えたけん」
1970 = "「Bên em cũng ổn rồi. Những gì không làm được thì là không làm được, em đã truyền đạt rõ ràng rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1794 = "「Hừm.」"

# monologue
# JP: 二人の口調からも、尖った感情が消えている。\nあれほど激しくやりあったのにもかかわらず。
2531 = "Những cảm xúc gay gắt trong giọng điệu của hai người cũng đã biến mất. Mặc dù trước đó họ đã tranh luận rất quyết liệt."

# monologue
# JP: ふかみも日々姫も、健やかに大人になっている――と、\nじんわり、しみじみ、嬉しく思う。
2829 = "Cả Fukami và Hibiki đều đang trưởng thành một cách lành mạnh―― Nghĩ vậy, tôi chợt thấy vui mừng và thấm thía."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、まずは双方が同意した、\n全体への改善提案の方を整頓しよう」
2247 = "「Nếu vậy, trước tiên hãy cùng sắp xếp lại những đề xuất cải thiện tổng thể mà cả hai bên đã đồng ý nhé.」"

# monologue
# JP: 二人の成長に恥じぬよう、\n僕もこの場の最年長者として相応しくふるまおう。
2709 = "Để không hổ thẹn với sự trưởng thành của hai người, tôi cũng phải cư xử cho ra dáng người lớn tuổi nhất ở đây mới được."

# monologue
# JP: 現時点では一致できていない諸点においても、\n最善の着地点へと、必ず落とし込んでいこう。
2558 = "Ngay cả với những điểm hiện tại chưa thể thống nhất, nhất định cũng phải tìm ra điểm dừng tốt nhất."

# 【双鉄】
# display as 雙鐵
# JP: 「ナインスターズ乗務憲章の策定は、僕も大賛成だ。\nこれは、ふかみに草稿の作成を頼みたい」
1960 = "「Anh cũng rất tán thành việc xây dựng Hiến chương công vụ Nine Stars. Việc này, anh muốn nhờ Fukami soạn thảo bản nháp.」"

# 【ふかみ】
# display as 深美
# JP: 「はい。喜んで引き受けます、です。けどわたし――\n鉄道特有の部分は、全然勉強足りてないです、から」
1884 = "「Vâng. Em rất sẵn lòng nhận lời ạ. Nhưng mà em―― những phần đặc thù của đường sắt thì em hoàn toàn chưa học đủ đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論、その辺は僕と日々姫に、ハチロクれいな、\nポーレットにも加わってもらい、練り込んでいこう」
2140 = "「Đương nhiên, phần đó anh và Hibiki, cùng với Hachiroku, Reina, và cả Paulette sẽ cùng tham gia để hoàn thiện.」"

# monologue
# JP: いいながら、ふと思いつく。Ⅸ号機関車のオリヴィは、\n\x%l入換;#00ffc040;入換%l;#;の乗務がないとき観光車掌を務めるという。
2920 = "Vừa nói, tôi chợt nảy ra một ý. Olivy của đầu máy số IX, nghe nói sẽ đảm nhận vai trò trưởng tàu du lịch khi không có nhiệm vụ \\x%l入換;#00ffc040;dồn toa%l;#;."

# monologue
# JP: ならば、次にオリヴィが研修にくるときに、\nオリヴィと宗方さんにも、草案を見せて意見をもらおう。
2959 = "Vậy thì, lần tới khi Olivy đến tu nghiệp, hãy cho Olivy và chú Munakata xem bản nháp để xin ý kiến của họ luôn."

# 【日々姫】
# display as 日日姬
# JP: 「できるだけ多くの人にみてもらって、その上で、\nできるだけシンプルなものにまとめるのが良かとよね」
1714 = "「Để càng nhiều người xem càng tốt, rồi trên cơ sở đó, tóm tắt lại sao cho càng đơn giản càng tốt nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「はい。わたしもそう思います。ですから、最終的な\nブラッシュアップは、稀咲さんにお願いできればと」
1882 = "「Vâng. Em cũng nghĩ vậy. Thế nên, việc trau chuốt cuối cùng, em muốn nhờ chị Kisaki giúp ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「わたしも同じこと考えとったと！　稀咲先輩、\n無駄を削るのめちゃくちゃうまいけん！」
1966 = "「Chị cũng nghĩ y chang vậy luôn! Chị Kisaki, cực kỳ giỏi trong việc lược bỏ những phần thừa thãi mà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、この件はそのように進めよう。\n草稿は……どうかな、二週間で作成できるか？」
2263 = "「Vậy thì, chuyện này cứ tiến hành như thế nhé. Bản nháp thì……sao nhỉ, hai tuần có xong được không?」"

# 【ふかみ】
# display as 深美
# JP: 「一週間あれば大丈夫だと思います。です。帝央ホテルの\n行動憲章――下敷きにできちゃいますですから」
1628 = "「Em nghĩ một tuần là đủ rồi ạ. Bởi vì em có thể lấy Hiến chương hành động của Khách sạn Teio――làm nền tảng.」"

# monologue
# JP: （おや）
2990 = "（Ồ）"

# monologue
# JP: 日々姫と向き合っている時と、僕との時でトーンが違う。
2788 = "Giọng điệu của em ấy khi đối diện với Hibiki và khi nói chuyện với tôi có sự khác biệt."

# monologue
# JP: 僕と話しているときは、多少安心できるのだろうか？\n昔のふかみが、背伸び無く出てきてしまうようだ。
2926 = "Phải chăng khi nói chuyện với tôi, em ấy cảm thấy an tâm hơn phần nào? Fukami của ngày xưa dường như lại hiện ra một cách rất tự nhiên."

# 【双鉄】
# display as 雙鐵
# JP: 「では、そのようによろしく頼む。次の――乗務員全員\nへのスマホもしくはタブレット等、専用端末の配布だが」
2250 = "「Vậy, nhờ em chuyện đó nhé. Tiếp theo――việc phát thiết bị chuyên dụng như điện thoại thông minh hay máy tính bảng cho toàn bộ nhân viên trên tàu.」"

# 【ふかみ】
# display as 深美
# JP: 「タイムラグの無い情報共有とコミュニケーションは、\n高質なサービスのご提供のために絶対に必要です」
2122 = "「Việc chia sẻ thông tin và giao tiếp không có độ trễ, là điều tuyệt đối cần thiết để cung cấp dịch vụ chất lượng cao ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「わたしもそう思うと！　\x%l客車;#00ffc040;客車%l;#;、冷蔵・電源車は長旅に\nなるけん、そこのチェックと情報共有もして欲しいし」
1964 = "「Chị cũng nghĩ vậy! \\x%l客車;#00ffc040;Toa hành khách%l;#;, toa lạnh và toa phát điện sẽ phải đi đường dài, nên chị cũng muốn có thể kiểm tra và chia sẻ thông tin ở đó nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「となると、共通端末と専用アプリ――\nくらいは用意したくなってくるところか」
2270 = "「Nếu vậy thì, cũng muốn chuẩn bị sẵn thiết bị dùng chung và ứng dụng chuyên dụng――nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「沿線の車両整備拠点には、\n拠点ごとに一端末ずつで十分だと思う」
2098 = "「Tại các cơ sở bảo dưỡng toa xe dọc tuyến đường, em nghĩ mỗi cơ sở một thiết bị là đủ rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「一運行で乗務するサービススタッフは、専務車掌一人。\n客室乗務員４～５人くらいで十分かなって思います」
2099 = "「Nhân viên phục vụ trên một chuyến tàu, gồm một trưởng tàu chuyên trách. Cùng khoảng 4 đến 5 nhân viên phục vụ khoang khách chắc là đủ rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「専務車掌は通し乗務で全体統括を行い。客室乗務員は、\n一人で客室二つを見るような感じとなるか」
2253 = "「Trưởng tàu chuyên trách sẽ làm nhiệm vụ xuyên suốt và quán xuyến toàn bộ. Còn nhân viên phục vụ khoang khách, mỗi người sẽ phụ trách hai khoang khách nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「はい。そのイメージです。です」
2071 = "「Vâng. Đúng là như vậy. Ạ.」"

# monologue
# JP: ……ならば、電源車・冷蔵車を見ることも考え、\n客室乗務員５人体制がいいだろう。
1203 = "……Nếu vậy, tính cả việc kiểm tra toa phát điện và toa lạnh, thì đội ngũ 5 nhân viên phục vụ khoang khách sẽ là tốt nhất."

# monologue
# JP: 乗務員交代のあるときは、タブレット端末まるごと、\nそのまま受け渡し引き継げばよいか。
2494 = "Khi thay ca, chỉ cần bàn giao lại toàn bộ máy tính bảng là được nhỉ."

# 【双鉄】
# display as 雙鐵
# JP: 「……これも、ポーレットに提案しよう。\n専用アプリの開発にいくらかかるかは検討もつかんが」
1269 = "「……Việc này, anh cũng sẽ đề xuất với Paulette. Mặc dù anh chưa ước tính được chi phí phát triển ứng dụng chuyên dụng là bao nhiêu.」"

# 【日々姫】
# display as 日日姬
# JP: 「鉄道事業者さんの中には、アプリ開発の子会社なり\nなんなり持っとるとこも、きっとあるって思うけん」
2279 = "「Trong số các công ty đường sắt, chắc chắn cũng có chỗ sở hữu công ty con chuyên phát triển ứng dụng hay gì đó mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。それは妙案だな。では、参加各事業者に\nこころあたりを訪ね、ダメなら電車姫様にも相談しよう」
2086 = "「Ra vậy. Đúng là một ý kiến hay. Vậy thì, anh sẽ hỏi thử các công ty tham gia xem có biết chỗ nào không, nếu không được thì nhờ ngài Denshahime tư vấn vậy.」"

# monologue
# JP: 日々姫もふかみも、即座に頷く。\nここまではいい。ここまでは、まったく問題ない事項だ。
2736 = "Cả Hibiki và Fukami đều gật đầu ngay lập tức. Đến đây thì ổn rồi. Cho đến lúc này, mọi chuyện đều không có vấn đề gì."

# 【双鉄】
# display as 雙鐵
# JP: 「次。『各列車の戸を使わず、\nひとつ大きな、全体のエントランスを作る』だが」
1643 = "「Tiếp theo. 'Không sử dụng cửa của từng toa tàu, mà tạo một lối vào chung thật lớn' à.」"

# 【日々姫】
# display as 日日姬＆深美
# JP: 「絶対やった方がよかとよ！！」\n「これはどうしてもやるべきです！」
2224 = "「Tuyệt đối nên làm vậy đó!!」 「Việc này nhất định phải làm ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
1792 = "「Hừm.」"

# monologue
# JP: ふかみと日々姫が声を揃えて断言する。\nならば無論、実施した方が良いのであろうが――
2787 = "Fukami và Hibiki đồng thanh khẳng định. Nếu vậy thì đương nhiên là nên thực hiện rồi, nhưng――"

# 【日々姫】
# display as 日日姬
# JP: 「ナインスターズという列車そのものを小さな九洲にする。\nそのためには、[かんもん,1]關門海峡に当たる入り口が欲しかとよ」
2182 = "「Biến bản thân chuyến tàu Nine Stars thành một Kyushu thu nhỏ. Để làm được điều đó, cần có một lối vào tương đương với Eo biển Kanmon.」"

# 【ふかみ】
# display as 深美
# JP: 「各列車にある戸から入って行くのは、“乗車”です。\nけど、エントランスを設ければ、“宿泊”にできます」
1949 = "「Bước vào từ cửa của từng toa tàu, gọi là \"lên tàu\". Nhưng nếu thiết lập lối vào chung, thì có thể gọi là \"lưu trú\" ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――うむ」
1830 = "「――Ừm.」"

# monologue
# JP: ナインスターズ客車各室が九洲九国であるならば、\n関門海峡を渡り、それぞれの部屋に向かうべき。
2711 = "Nếu mỗi phòng trên toa khách Nine Stars là một trong chín tỉnh của Kyushu, thì hành khách nên băng qua Eo biển Kanmon rồi mới tiến vào từng phòng."

# monologue
# JP: ナインスターズ各室をホテルの部屋と考えるのなら、\nエントランスとフロントを経て向かうべき。
2636 = "Nếu coi mỗi phòng trên Nine Stars như một phòng khách sạn, thì hành khách nên đi qua lối vào và quầy lễ tân rồi mới đến phòng."

# 【双鉄】
# display as 雙鐵
# JP: 「ともに、ナインスターズでの宿泊・旅行体験を、\nもうワンランク上のものにするための提言と理解できる」
1991 = "「Cả hai ý kiến đều có thể hiểu là đề xuất nhằm nâng tầm trải nghiệm lưu trú và du lịch trên Nine Stars lên một đẳng cấp mới.」"

# 【ふかみ】
# display as 深美＆日日姬
# JP: 「なら」\n「やったら！」
2026 = "「Vậy thì」\n「Làm thôi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「が、得られるメリットとかかるコストのバランスもある。\nまた、万一のときの避難経路の問題も出てくる」
1691 = "「Nhưng cũng phải cân nhắc sự cân bằng giữa lợi ích đạt được và chi phí bỏ ra. Hơn nữa, còn phát sinh vấn đề về lối thoát hiểm trong trường hợp khẩn cấp nữa.」"

# 【日々姫】
# display as 日日姬
# JP: 「各車両の戸は殺さないで、うまく内装となじませつつ、\n非常口として確保するけん」
1644 = "「Cửa của mỗi toa sẽ không bị bịt kín, mà sẽ được hòa hợp khéo léo với nội thất, đồng thời vẫn đảm bảo chức năng làm lối thoát hiểm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「となると、デザインは全て見直しになろう。\nただでさえ、今でも難航しているのだ」
2264 = "「Nếu vậy, toàn bộ thiết kế sẽ phải xem xét lại. Trong khi hiện tại chúng ta vốn đã gặp nhiều khó khăn rồi.」"

# 【日々姫】
# display as 日日姬
# JP: 「あう」
1800 = "「Au.」"

# monologue
# JP: ――九洲九国。それぞれの国を、それぞれの客室に。\nこのコンセプトは、どの主要都市にも受け入れられた。
2496 = "――Kyushu chín tỉnh. Mỗi tỉnh một phòng khách. Ý tưởng này đã được tất cả các thành phố lớn chấp thuận."

# monologue
# JP: そしてそれゆえ、各地から寄せられる要求は異常な多数\n――10000件を超えるものにまでなってしまった。
2500 = "Và cũng chính vì thế, yêu cầu gửi về từ khắp nơi nhiều đến mức bất thường ――thậm chí đã vượt quá 10.000 yêu cầu."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、日々姫のバランス感覚を信じている。できるだけ\n多くの希望を取り入れようとする気持ちも尊重している」
1994 = "「Anh tin tưởng vào khả năng cân bằng của Hibiki. Anh cũng tôn trọng mong muốn cố gắng tiếp thu càng nhiều nguyện vọng càng tốt của em.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1830 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、ナインスターズは、最悪でもあと四年。\nそこまでで一号列車を走らせねばならん」
1689 = "「Nhưng Nine Stars, chậm nhất cũng chỉ còn 4 năm nữa. Đến lúc đó, chúng ta bắt buộc phải cho chuyến tàu số 1 khởi hành.」"

# 【日々姫】
# display as 日日姬
# JP: 「そこは……稀咲先輩からも何度も何度も言われとー。\n期限ば超えたら、持たん事業者さんば出てくるって」
2219 = "「Điều đó……Chị Kisaki cũng đã nhắc nhở em hết lần này đến lần khác rồi. Rằng nếu vượt quá thời hạn, sẽ có những công ty không trụ nổi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。稀咲の――日ノ本鉄路の躍進は、\nナインスターズ計画の、大きな希望となっている」
1648 = "「Đúng vậy. Bước tiến vọt của Kisaki――của Đường sắt Hinamoto, đang là niềm hy vọng to lớn của Kế hoạch Nine Stars.」"

# 【ふかみ】
# display as 深美
# JP: 「マイレールファンド。すごいですよね！\n帝央ホテルの人達にも、出資者さん、何人もいました」
2155 = "「Quỹ My Rail. Thật tuyệt vời đúng không ạ! Ngay cả những người ở Khách sạn Teio, cũng có không ít người là nhà đầu tư.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、それは嬉しいことを聞いた」
2062 = "「Vậy sao, nghe được điều đó thật đáng mừng.」"

# monologue
# JP: 稀咲提案、エアクラ社と隈元銀行、後東急行他多数社の\n支援を受けて指導した、マイレールファンド。
2845 = "Quỹ My Rail do Kisaki đề xuất, được sự hỗ trợ và chỉ đạo của Công ty Aircra, Ngân hàng Kumamoto, Goto Express và nhiều công ty khác."

# monologue
# JP: ファンドによって集まった資金で、日ノ本鉄路は、\n理想以上の素晴らしい成果をあげつづけている。
2553 = "Nhờ nguồn vốn huy động được từ quỹ, Đường sắt Hinamoto vẫn đang tiếp tục gặt hái những thành quả tuyệt vời ngoài mong đợi."

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本鉄路が線路を負担したことにより、鉄道事業者は、\nナインスターズ計画を押し進めるだけの余裕をもてた」
2032 = "「Nhờ Đường sắt Hinamoto gánh vác phần đường ray, các công ty đường sắt mới có đủ khả năng để thúc đẩy Kế hoạch Nine Stars.」"

# 【日々姫】
# display as 日日姬
# JP: 「ばってん。それでも巨額投資が必要やけん、\nどこも補助金や社債や、銀行からの借り入れに頼っとる」
1685 = "「Nhưng mà. Dù vậy vẫn cần khoản đầu tư khổng lồ, nên nơi nào cũng phải dựa vào tiền trợ cấp, trái phiếu công ty hay vay vốn ngân hàng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。ゆえ」
2109 = "「Đúng vậy. Vì thế.」"

# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 1801 = "「啊！」" 

# monologue
# JP: 思わず、といった感じの声。\nあわてて口をつぐんでしまったふかみを目線で促してみる。
2778 = "Một giọng nói cất lên như bật thốt. Tôi dùng ánh mắt khuyến khích Fukami, người vừa vội vàng ngậm miệng lại."

# 【ふかみ】
# display as 深美
# JP: 「……だから、もしも一号列車が走り始めるのが遅れたら。\nそれだけ、その分。利息とかがふくらんじゃう、です？」
1254 = "「……Vì vậy, nếu chuyến tàu số 1 bị trì hoãn khởi hành. Thì tương ứng với khoảng thời gian đó. Tiền lãi các thứ sẽ tăng lên, đúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。そして金銭面だけでなく、\nモチベーション面の心配も、同じくでてくる」
2045 = "「Đúng thế. Và không chỉ về mặt tài chính, mà nỗi lo về mặt động lực cũng xuất hiện tương tự.」"

# monologue
# JP: 九洲周遊リレートレイン・ナインスターズ一号列車。\n参加を希望し、大物まいてつも九洲入りを予定している。
2595 = "Chuyến tàu tiếp sức vòng quanh Kyushu - Nine Stars số 1. Các ông trùm đường sắt cũng bày tỏ nguyện vọng tham gia và dự định tiến vào Kyushu."

# monologue
# JP: 東日本の看板であった、D51　840\x%lレイルロオド;#00ffc040;レイルロオド%l;#;『らん』と、\nそのマスターとの[にしてつ,2]二四鉄入りが、その顕著な例だ。
2761 = "Điển hình là việc \\x%lレイルロオド;#00ffc040;Railord%l;#; D51 840 \"Ran\", từng là biểu tượng của Đông Nhật Bản, cùng với Master của mình gia nhập Đường sắt Nishitetsu."

# 【双鉄】
# display as 雙鐵
# JP: 「一号列車走行開始というゴールに向けて、事業者も\nまいてつも、息をとめての全力疾走を続けている」
2123 = "「Hướng tới mục tiêu khởi hành chuyến tàu số 1, cả các doanh nghiệp và giới đường sắt đều đang nín thở chạy nước rút.」"

# monologue
# JP: それが、この先最長四年。\nどう考えても限界ラインだ。
2514 = "Tình trạng đó, tối đa cũng chỉ kéo dài được 4 năm nữa. Dù nghĩ thế nào thì đó cũng là giới hạn rồi."

# monologue
# JP: 一つの事業者が、一人のまいてつが挫けてしまえば、\nその時点で、ナインスターズは地に落ち砕けかねない。
2572 = "Chỉ cần một doanh nghiệp, một ông trùm đường sắt bỏ cuộc, thì ngay lúc đó, Nine Stars có thể sẽ tan tành mây khói."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、これ以上のデザイン遅延、車両製造開始遅延に\n繋がる提案には、僕は容易には賛成できない」
1854 = "「Vì vậy, những đề xuất dẫn đến việc chậm trễ thiết kế hay chậm trễ khởi công chế tạo toa xe thêm nữa, anh không thể dễ dàng tán thành.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにの心配はよーくわかったと。\nばってん、それでも、その上で――」
1993 = "「Em rất hiểu nỗi lo của anh hai. Nhưng mà, dù vậy, trên cơ sở đó――」"

# monologue
# JP: 日々姫がじっと、ふかみを見つめる。\n見つめてそうして、ふわりと笑う。
2742 = "Hibiki nhìn chằm chằm vào Fukami. Nhìn một lúc, rồi em ấy mỉm cười nhẹ nhàng."

# 【日々姫】
# display as 日日姬
# JP: 「ふかみちゃんのことやけん。きっと――\nううん、絶対。資料、用意してくれておるでしょお？」
1924 = "「Em biết tính Fukami-chan mà. Chắc chắn―― Không, tuyệt đối. Cậu đã chuẩn bị sẵn tài liệu rồi đúng không?」"

# 【ふかみ】
# display as 深美
# JP: 「写真と動画で大丈夫なら、たくさん撮ってあります。\n帝央ホテルだけじゃなく、帝都の代表的なとこは全部」
1895 = "「Nếu hình ảnh và video là đủ thì em đã chụp rất nhiều. Không chỉ Khách sạn Teio, mà tất cả những nơi tiêu biểu ở Đế đô.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
# 1801 = "「啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「やっぱり」
1984 = "「Quả nhiên.」"

# monologue
# JP: ――日々姫の頷きに思い出す。クマ川流域イラストマップ。\n作成時には、もちろんふかみの手助けに大いに助けられた。
2914 = "――Cái gật đầu của Hibiki làm tôi nhớ lại. Bản đồ minh họa lưu vực sông Kuma. Lúc thực hiện, đương nhiên đã được sự giúp đỡ to lớn từ Fukami."

# monologue
# JP: あの時間が。そうして、僕の知らない時間が。\nふかみと日々姫の、相互信頼を作っていたのか。
2955 = "Khoảng thời gian đó. Và cả những khoảng thời gian mà tôi không biết. Đã tạo nên sự tin tưởng lẫn nhau giữa Fukami và Hibiki sao."

# 【日々姫】
# display as 日日姬
# JP: 「エントランスのあるタイプの寝台客車の資料も、\nポーレットさんに借りとる中にあるけん。いけると思う」
1989 = "「Tài liệu về loại toa khách giường nằm có lối vào, cũng có trong đống tài liệu em mượn của chị Paulette. Em nghĩ là làm được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――\n準備があって、その上での希望というわけか」
1746 = "「Ra là vậy―― Đã có sự chuẩn bị, và trên cơ sở đó mới đưa ra nguyện vọng nhỉ.」"

# monologue
# JP: 図面を変えれば、安全審査を一から受け直すことになる。\n現行案で納得している各層を、再び刺激もするだろう。
2637 = "Nếu thay đổi bản vẽ, sẽ phải bắt đầu lại quy trình thẩm định an toàn từ đầu. Cũng sẽ kích động lại các bên vốn đã đồng ý với phương án hiện tại."

# monologue
# JP: ――苦労の増加は目に見えていて。\nそれでも、心が動いてしまう。
2950 = "――Dù thấy rõ sự vất vả sẽ gia tăng. Thế nhưng, lòng tôi vẫn lay động."

# 【双鉄】
# display as 雙鐵
# JP: 「今までの会話、全てを含めて改めて聞こう。\n日々姫とふかみは――エントランスを設けるべきと」
2165 = "「Bao gồm tất cả cuộc trò chuyện từ nãy đến giờ, anh xin hỏi lại. Hibiki và Fukami――có nên thiết lập lối vào không?」"

# 【日々姫】
# display as 日日姬
# JP: 「思う！」
2063 = "「Nên ạ!」"

# 【ふかみ】
# display as 深美
# JP: 「思います、です！」
2069 = "「Nên ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば……一週間。申し訳ないがこの時間内に、\n新デザインを、草案でいいので起こしてくれ」
2268 = "「Nếu vậy……một tuần. Rất xin lỗi nhưng trong khoảng thời gian này, hãy phác thảo thiết kế mới, chỉ cần bản nháp cũng được.」"

# 【日々姫】
# display as 日日姬
# JP: 「一週間っ！！？」
1631 = "「Một tuần!!?」"

# monologue
# JP: 日々姫が絶句してしまう。\n無理もない。厳しいにもほどがある短期間ゆえ。
2738 = "Hibiki á khẩu. Cũng phải thôi. Vì thời gian quá đỗi ngắn ngủi và khắc nghiệt."

# 【双鉄】
# display as 雙鐵
# JP: 「それで叶うならば、僕の責任において新案を\nポーレット、そしてその先にも提出しよう。が」
1892 = "「Nếu làm được, anh sẽ chịu trách nhiệm đệ trình phương án mới cho Paulette, và cả những bước tiếp theo nữa. Nhưng」"

# 【日々姫】
# display as 日日姬
# JP: 「一週間――で。要望全部をいれなおして、\n導線と安全性を確保、して――」
1627 = "「Một tuần――sao. Phải đưa toàn bộ yêu cầu vào lại, đảm bảo luồng di chuyển và tính an toàn, rồi――」"

# monologue
# JP: ……日々姫を苦しめたくはない。\nそれでも、無理であるなら、諦めるしか無い。
1187 = "……Tôi không muốn làm khó Hibiki. Nhưng nếu không thể, thì đành phải từ bỏ thôi."

# monologue
# JP: 夢を形にするために――\n追うべきはただひたすらに、現実あるのみなのだから。
2807 = "Để biến giấc mơ thành hiện thực―― Thứ cần theo đuổi duy nhất, chỉ có thực tại mà thôi."

# 【ふかみ】
# display as 深美
# JP: 「あの、日々姫さん。ええと、ホテル、いろんなホテルの\n非常口と通路の関係とかも、資料、あります。です」
2245 = "「Dạ, chị Hibiki. Ờm, khách sạn, về mối quan hệ giữa lối thoát hiểm và hành lang của nhiều khách sạn khác nhau, em cũng có tài liệu. Ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
# 1822 = "「啊？！」" 

# 【ふかみ】
# display as 深美
# JP: 「それと――役にたたなかったらごめんなさいですけど。\n帝都にある物産館とか。九洲のやつは全部、写真と動画」
1760 = "「Với lại――xin lỗi nếu nó không giúp ích được gì. Nhưng mấy cái như Hội quán Vật sản ở Đế đô. Những thứ liên quan đến Kyushu, em đều có hình ảnh và video.」"

# 【日々姫】
# display as 日日姬
# JP: 「物産館――アンテナショップ！！！」
2134 = "「Hội quán Vật sản――Cửa hàng giới thiệu sản phẩm địa phương!!!」"

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんが――路線を観光カタログにって。\nわたし、それ、すごくいいって思ったから。だから――」
2288 = "「Anh Soutetsu từng nói――biến tuyến đường thành một cuốn cẩm nang du lịch. Em thấy ý tưởng đó rất tuyệt. Vì thế nên――」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――それは盲点だった」
2057 = "「Ra là vậy――Anh đã không nghĩ tới điểm đó.」"

# monologue
# JP: 物産館は、九洲各県の名物と見せ所を、\n各県自体が主体となって作った、いわば、県のカタログだ。
2811 = "Hội quán Vật sản là nơi trưng bày đặc sản và điểm tham quan của các tỉnh Kyushu, do chính các tỉnh làm chủ thể xây dựng, có thể nói là cẩm nang của tỉnh."

# 【日々姫】
# display as 日日姬
# JP: 「ありがとふかみちゃん！　それ全部！　絶対確実に\n役にたつ！！　役にたたないわけがない！！」
2181 = "「Cảm ơn Fukami-chan! Tất cả những thứ đó! Tuyệt đối chắc chắn sẽ có ích!! Không thể nào không có ích được!!」"

# 【ふかみ】
# display as 深美
# JP: 「あ……よかった――です」
1797 = "「A……may quá――ạ.」"

# monologue
# JP: それほど不安だったのだろう。
2826 = "Chắc hẳn em ấy đã rất bất an."

# monologue
# JP: 日々姫と話しているというのに、\nふかみは昔の、おどおどちゃんに少し戻ってしまっている。
2510 = "Dù đang nói chuyện với Hibiki, nhưng Fukami lại hơi trở về dáng vẻ rụt rè của ngày xưa."

# monologue
# JP: （いや――だよな。\nそう簡単に、本質までもが変わるものか）
2988 = "（À không――cũng phải. Làm sao bản chất có thể thay đổi dễ dàng thế được.）"

# monologue
# JP: 成長は、ふかみの背筋を美しく伸ばして、\nふかみの社会性を強化した。
2884 = "Sự trưởng thành đã giúp Fukami vươn cao dáng vẻ xinh đẹp, và củng cố kỹ năng xã hội của em ấy."

# monologue
# JP: けれどやっぱり、根っこはふかみで。\nゆるめば、おどおど。自分の世界にこもりたがるのだ。
2512 = "Nhưng suy cho cùng, bản chất vẫn là Fukami. Khi buông lỏng, em ấy lại rụt rè. Lại muốn thu mình vào thế giới riêng."

# 【双鉄】
# display as 雙鐵
# JP: 「そうであるのに――慣れぬ帝都で……たった一人で」
1763 = "「Vậy mà――ở nơi Đế đô xa lạ……chỉ có một mình.」"

# monologue
# JP: ホテルの業務を、精神を身につけ、御一夜に持ち帰る。\nその時点でもう、かなり厳しい任務であろうに――
2562 = "Học hỏi nghiệp vụ và tinh thần của khách sạn, rồi mang về Ohito. Chỉ riêng điều đó thôi đã là một nhiệm vụ khá khó khăn rồi――"

# monologue
# JP: その上、貴重な休みを使って、僕らの、ナインスターズの\nために、他のホテルや物産館までをめぐってくれた。
2480 = "Hơn nữa, em ấy còn dành những ngày nghỉ quý giá, vì chúng tôi, vì Nine Stars, mà đi tham quan các khách sạn khác và Hội quán Vật sản."

# 【日々姫】
# display as 日日姬
# JP: 「やる。やれる！　にぃに。\nわたし一週間でデザイン起こす！」
1979 = "「Làm. Sẽ làm được! Anh hai. Em sẽ phác thảo thiết kế trong một tuần!」"

# monologue
# JP: きっと、日々姫はやるだろう。
2732 = "Chắc chắn, Hibiki sẽ làm được."

# monologue
# JP: 不可能に近かったオーダーに、\nふかみが支えを、大きな支えをくれたのだから。
2532 = "Đối với yêu cầu gần như bất khả thi này, Fukami đã mang đến một sự hỗ trợ, một sự hỗ trợ to lớn."

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。頼む」
1889 = "「Anh hiểu rồi. Trông cậy vào em.」"

# monologue
# JP: あがってくるなら、それは条件全てを満たすデザインだ。\nならば――なんとしても通してやろう。
2574 = "Nếu hoàn thành, đó sẽ là một thiết kế đáp ứng mọi điều kiện. Vậy thì――bằng mọi giá tôi sẽ cho thông qua."

# monologue
# JP: ふかみが夢見た光景を、日々姫がともに形に起こす――\nその新しい列車の姿を、誰より僕が、見てみたいから。
2790 = "Khung cảnh mà Fukami hằng mơ ước, sẽ được Hibiki cùng nhào nặn thành hình―― Bởi vì hơn ai hết, tôi muốn nhìn thấy dáng vẻ của chuyến tàu mới đó."

# 【日々姫】
# display as 日日姬
# JP: 「うん！　そこは任された！　ばってん――えと――\nけどね？　ふかみちゃん」
1832 = "「Vâng! Cứ giao cho em! Cơ mà――ờm―― Nhưng mà này? Fukami-chan.」"

# 【ふかみ】
# display as 深美
# JP: 「はい。日々姫さん」
1704 = "「Dạ. Chị Hibiki.」"

# monologue
# JP: ふたりの声が、いきなり硬くなってしまう。\nああこれは――あの激論に。
2620 = "Giọng nói của hai người đột nhiên trở nên cứng nhắc. A đây là――trở lại cuộc tranh luận nảy lửa đó."

# monologue
# JP: 『客室から出たゴミを、一晩捨てずに保管する』かを、\nもう一度話し合うことになってしまうのか。
2621 = "Lại chuẩn bị thảo luận một lần nữa về việc, \"Có nên giữ lại rác từ khoang khách qua một đêm mà không vứt đi\" hay không sao."

# 【日々姫】
# display as 日日姬
# JP: 「ゴミの話。オーバーサービスだと思う。ホテルなら、\nまる24時間、捨てるのを待ったっていいだろうけど」
2283 = "「Chuyện rác thải. Chị nghĩ là phục vụ thái quá rồi. Nếu là khách sạn, thì có chờ tròn 24 tiếng mới vứt cũng được, nhưng mà.」"

# 【ふかみ】
# display as 深美
# JP: 「出たゴミをどこにしまっておくのか、臭い対策は\nどうするか――そこが難しいのは、聞きました」
1998 = "「Rác thải ra sẽ cất ở đâu, biện pháp xử lý mùi hôi sẽ làm thế nào――Chỗ đó rất khó giải quyết, em đã nghe rồi ạ.」"

# monologue
# JP: まずは落ち着けて話に入ろう――\nそう思うより先、ふたりが勝手にはじめてしまう。
2687 = "Trước tiên phải làm dịu tình hình rồi mới vào chuyện―― Chưa kịp nghĩ xong thì hai người đã tự ý bắt đầu mất rồi."

# 【ふかみ】
# display as 深美
# JP: 「でも、お客さんがゴミ箱にうっかり大事なものを\n捨てちゃうことって、結構――すごく多いんです」
1687 = "「Nhưng mà, việc hành khách vô tình vứt nhầm những thứ quan trọng vào thùng rác, thực sự――xảy ra rất nhiều ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「やけん。停車駅にゴミ保管所をつくって、\n『24時間必ず保管する』ってルールをつくれば」
2004 = "「Vì thế. Nếu chúng ta tạo khu bảo quản rác ở các ga dừng, và đặt ra quy định 'Bắt buộc bảo quản trong 24 giờ' thì...」"

# 【ふかみ】
# display as 深美
# JP: 「旅行者さんです。取りに戻るの大変ですよ。\nそれに、もしもきっぷを間違って捨てちゃったら」
2193 = "「Họ là khách du lịch mà. Quay lại lấy sẽ vất vả lắm đó ạ. Hơn nữa, lỡ như họ vứt nhầm vé tàu thì sao.」"

# 【稀咲】
# display as ？？？
# JP: 「双鉄！　まだここに居るっ！？」
2290 = "「Soutetsu! Cậu vẫn còn ở đây chứ!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲か――\nっ！？　――どうした、その顔色は」
2074 = "「Kisaki à――\n!? ――Sao sắc mặt cô tệ vậy.」"

# monologue
# JP: ふかみと日々姫もぴたりと黙る。\nというか、声を出せなくなってしまったのだろう。
2785 = "Fukami và Hibiki cũng im bặt. Hay nói đúng hơn là không thốt nên lời."

# monologue
# JP: 稀咲の顔は、顔色は――\n紙より雪より、なお真っ白だ。
2874 = "Khuôn mặt Kisaki, sắc mặt cô ấy―― Còn trắng bệch hơn cả giấy, hơn cả tuyết."

# 【稀咲】
# display as 稀咲
# JP: 「アクシデントだ。買収済みの用地に陥没が発生した」
1730 = "「Có sự cố. Khu đất đã thu mua xảy ra sụt lún.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！！！？」
1672 = "「Cái gì!!!?」"

# 【稀咲】
# display as 稀咲
# JP: 「地盤調査して、線路としての用地許可も得た。けど――\n2キロ以上も先にある、廃坑道の崩壊の影響がでたんだ」
1976 = "「Đã khảo sát địa chất và xin được giấy phép sử dụng đất làm đường sắt rồi. Nhưng―― Lại bị ảnh hưởng bởi sự sụp đổ của một hầm mỏ bỏ hoang cách đó hơn 2 km.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは……確かに災難だ。がしかし――\nその程度であれば、補強をすれば」
2218 = "「Đó quả thực……là một tai họa. Nhưng mà―― Nếu chỉ ở mức độ đó, thì chỉ cần gia cố là được.」"

# 【稀咲】
# display as 稀咲
# JP: 「その通りなんだ。双鉄。\nその通りなんだけれど――」
2110 = "「Đúng là vậy. Soutetsu.\nĐúng là vậy, nhưng mà――」"

# monologue
# JP: 稀咲は真新しいコップから、\n喉へと一気に水を落とす。
2870 = "Kisaki cầm lấy chiếc cốc mới tinh,\nuống cạn một hơi."

# monologue
# JP: ああ――\nふかみが山崎さんに合図して、運んでもらったのか。
2583 = "À―― Là Fukami đã ra hiệu cho anh Yamazaki mang đến sao."

# 【稀咲】
# display as 稀咲
# JP: 「――んっ。ああっ」
1245 = "「――Ưm. A.」"

# monologue
# JP: それで一息つけたのか。\n稀咲の口調が、かなり落ち着く。
2590 = "Nhờ vậy mà cô ấy đã thở phào nhẹ nhõm được chút chăng. Giọng điệu của Kisaki đã bình tĩnh lại khá nhiều."

# 【稀咲】
# display as 稀咲
# JP: 「補強には、同様の影響を及ぼす可能性がある範囲の全て。\n廃坑道を数キロに渡って埋め戻す他に、手段が無いんだ」
1898 = "「Để gia cố, phải bao trùm toàn bộ phạm vi có khả năng gây ra ảnh hưởng tương tự. Ngoài việc lấp lại hầm mỏ bỏ hoang trải dài vài km, không còn cách nào khác.」"

# 【ポーレット】
# display as 波萊特
# JP: 「れいなも、先に帰しました。\nひとまずは、最低人数で緊急会議ということで」
1971 = "「Tôi cũng đã cho Reina về trước rồi. Tạm thời, chúng ta sẽ họp khẩn cấp với số lượng người ít nhất có thể.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1830 = "「嗯」" 

# monologue
# JP: 扱い方を間違えれば、\nナインスターズが、日ノ本鉄路ごと吹き飛ぶ話だ。
2634 = "Nếu xử lý sai lầm, Nine Stars và cả Đường sắt Hinamoto sẽ tan thành mây khói."

# monologue
# JP: ポーレット以外は、すでに事情を知っている者だけで、\n最初の対応だけは固めてしまう方がいい。
2818 = "Ngoài Paulette ra, chỉ có những người đã biết chuyện, nên thống nhất phương án ứng phó ban đầu thì hơn."

# 【ポーレット】
# display as 波萊特
# JP: 「ふかみちゃんは、ご自宅に電話しなくて大丈夫？\n門限とかは」
1921 = "「Fukami-chan không gọi điện về nhà có sao không? Giờ giới nghiêm các thứ ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1801 = "「啊！」" 

# monologue
# JP: ポーレットは純粋な善意であろうが、\nこの聞き方はかなり危ない。
2775 = "Dù Paulette chỉ có ý tốt thuần túy, nhưng cách hỏi này khá là nguy hiểm."

# monologue
# JP: 繊細なふかみのことだ。\n自分が居ないほうがいいのかと考え込んで――
2796 = "Với một người nhạy cảm như Fukami. Em ấy sẽ nghĩ rằng mình không nên ở đây――"

# 【ふかみ】
# display as 深美
# JP: 「平気です。けど、お気遣いありがとうございます」
2106 = "「Em không sao ạ. Nhưng mà, cảm ơn chị đã quan tâm.」"

# monologue
# JP: （ああ）
2993 = "（A）"

# monologue
# JP: 杞憂であったか。\n本当に、ふかみは成長したのだ。
2825 = "Là tôi lo xa rồi sao. Quả thực, Fukami đã trưởng thành rồi."

# monologue
# JP: が、この場での最年少者にも違いない。\n守るべきところはやはり、守ってやらねばと思う。
2522 = "Nhưng chắc chắn em ấy vẫn là người nhỏ tuổi nhất ở đây. Những lúc cần bảo vệ thì vẫn phải bảo vệ thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「遅くなるようなら僕が送る。\nこの会議は、ふかみにもいてもらった方がいい」
1899 = "「Nếu muộn anh sẽ đưa em về. Cuộc họp này, có Fukami ở lại thì tốt hơn.」"

# 【ふかみ】
# display as 深美
# JP: 「あ」
1798 = "「A.」"

# monologue
# JP: 抑えた、けれどほっとしたような声。\nごくごく小さな、小さな頷き。
2793 = "Một giọng nói kìm nén, nhưng có vẻ nhẹ nhõm. Một cái gật đầu vô cùng, vô cùng nhỏ."

# 【ふかみ】
# display as 深美
# JP: 「このお話、なんですけど」
2284 = "「Chuyện này, là thế này ạ.」"

# 【稀咲】
# display as 稀咲
# JP: 「！」
# 1801 = "「啊！」" 

# monologue
# JP: よほど安心してくれたのだろうか？
2501 = "Chắc hẳn em ấy đã an tâm lắm rồi sao?"

# monologue
# JP: 誰もが切り出しづらかったところに、\nまさかのふかみが、切り込んでいってくれる。
2615 = "Trong lúc ai cũng khó mở lời, không ngờ Fukami lại là người chủ động bắt đầu."

# 【ふかみ】
# display as 深美
# JP: 「わたしの、全然わかってない視点からだと――\n今、問題がわかってよかったようにも思う、です」
1983 = "「Từ góc nhìn hoàn toàn không hiểu gì của em thì―― Em nghĩ rằng, bây giờ phát hiện ra vấn đề cũng là một điều tốt, ạ.」"

# 【稀咲】
# display as 稀咲
# JP: 「え？」
1820 = "「Hả?」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！　そうですよ！　稀咲先輩！！」
1812 = "「A! Đúng rồi đó! Chị Kisaki!!」"

# monologue
# JP: なるほどと思うと同時、日々姫も強く頷いている。
2639 = "Vừa lúc tôi hiểu ra, Hibiki cũng gật đầu mạnh mẽ."

# 【日々姫】
# display as 日日姬
# JP: 「もしもっと前に崩壊のことがわかってても。\n結局は、この線路用地以外には、買えないんですから」
1743 = "「Cho dù có biết về vụ sập hầm từ trước đi chăng nữa. Thì rốt cuộc, chúng ta cũng không thể mua khu đất nào khác ngoài khu đất làm đường ray này mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「たしかにそうですよね。軟弱地盤への埋戻し工事の方が、\n他の用地をゼロから買収しなおすよりも、絶対に安い」
2084 = "「Đúng là vậy nhỉ. Công trình lấp đất gia cố nền đất yếu, chắc chắn sẽ rẻ hơn so với việc mua lại khu đất khác từ con số không.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。そして、旧炭鉱専用線群の活用なしには、\n福丘県の線路を繋ぐことは、できない」
2048 = "「Quả thực là vậy. Và nếu không tận dụng cụm tuyến chuyên dụng mỏ than cũ, thì không thể nào kết nối được tuyến đường sắt của tỉnh Fukuoka.」"

# monologue
# JP: 稀咲をフォローするためもあろう。
2948 = "Có lẽ cũng là để hỗ trợ Kisaki."

# monologue
# JP: が、みなが口々にいうとおり、究極的には、\nこれは本当に『絶対に回避できない』類の問題なのだ。
2516 = "Nhưng, đúng như mọi người nói, xét cho cùng, đây thực sự là một vấn đề thuộc loại \"tuyệt đối không thể né tránh\"."

# 【双鉄】
# display as 雙鐵
# JP: 「危険に気づかず営業運転を開始し、その後の事故となる。\n――そうした事態を回避できたことは、むしろ幸運だ」
1893 = "「Bắt đầu vận hành thương mại mà không nhận ra nguy hiểm, rồi sau đó xảy ra tai nạn. ――Tránh được tình trạng đó, ngược lại còn là một điều may mắn.」"

# 【稀咲】
# display as 稀咲
# JP: 「それは――うん。確かに、そうだ」
2216 = "「Chuyện đó――ừm. Quả thực, là vậy.」"

# monologue
# JP: なぐさめにもならんであろう言葉だが、\n稀咲は顔をあげてくれる。
2967 = "Dù là những lời chẳng mang tính an ủi, nhưng Kisaki vẫn ngẩng mặt lên."

# monologue
# JP: 笑顔を、多分うかべようとし――\nけれどもそれは、あの完璧な営業スマイルにさえならない。
2619 = "Có lẽ cô ấy đang cố nặn ra một nụ cười―― Nhưng nó thậm chí còn chẳng giống nụ cười xã giao hoàn hảo thường ngày."

# 【稀咲】
# display as 稀咲
# JP: 「そう考えても。だけど、双鉄。\nどう転んでも、資金不足は変わらないよね」
1679 = "「Dù có nghĩ như vậy. Nhưng mà, Soutetsu. Dù xoay sở thế nào, thì việc thiếu vốn cũng không thay đổi đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……それも、確かにそのとおりだ。\nゆえ、対策を考えるために、会議をしている」
1242 = "「……Điều đó, quả thực đúng là như vậy. Vì thế, chúng ta mới đang họp để suy nghĩ biện pháp đối phó.」"

# monologue
# JP: ざっとの見積もりで、埋戻し補強工事に、40億弱。\nまったく別途の用地買収を試みるなら、その二十倍。
2882 = "Ước tính sơ bộ, công trình lấp đất gia cố tốn khoảng gần 4 tỷ yên. Nếu thử mua một khu đất hoàn toàn khác, thì gấp 20 lần số đó."

# monologue
# JP: ならば、なんとしても40億。\n用立てる他にないのだが――
2960 = "Nếu vậy, bằng mọi giá phải xoay xở được 4 tỷ yên. Không còn cách nào khác, nhưng mà――"

# 【稀咲】
# display as 稀咲
# JP: 「……隈銀から、これ以上の出資も融資も見込めない」
1262 = "「……Không thể hy vọng Ngân hàng Kumamoto đầu tư hay cho vay thêm nữa đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。元忠さんに隈銀頭取を追われるようなリスクを、\n決して負わせてはならん」
2052 = "「Ừ. Tuyệt đối không được để ông Mototada phải chịu rủi ro bị mất chức Giám đốc Ngân hàng Kumamoto.」"

# monologue
# JP: 稀咲と元忠氏とが父子である。\nそれが事実である以上、李下に冠を正してはなるまい。
2875 = "Kisaki và ông Mototada là cha con. Đó là sự thật, nên không thể để người khác có cớ dị nghị được."

# 【日々姫】
# display as 日日姬
# JP: 「ばってん――マイレールファンドの追加出資も……\n私、よくわからんけど――でもなんとなく」
1764 = "「Nhưng mà――việc Quỹ My Rail đầu tư thêm cũng…… Em không rõ lắm――nhưng mà linh cảm thế nào ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\n率直に言って、やらん方がいいだろう」
1828 = "「Ừm.\nThẳng thắn mà nói, không làm thì hơn.」"

# monologue
# JP: 投資対象としての日ノ本鉄路は、\n配当を出せるようになるまで、まだ何年もかかってしまう。
2746 = "Đường sắt Hinamoto với tư cách là một đối tượng đầu tư, sẽ còn mất nhiều năm nữa mới có thể trả cổ tức."

# monologue
# JP: その状態で、アクシデント対応のための追加募集は、\n逆に資金の引き上げを招いてしまいかねない。それに――
2606 = "Trong tình trạng đó, việc kêu gọi thêm vốn để ứng phó với sự cố, ngược lại có thể dẫn đến việc rút vốn. Hơn nữa――"

# 【ポーレット】
# display as 波萊特
# JP: 「仮に実施しても、効果は望めないだろうって思います。\n熱心な鉄道ファンも、地元の人達も、出資疲れしてる」
1744 = "「Dù có thực hiện, tôi nghĩ cũng không mang lại hiệu quả. Cả những người hâm mộ đường sắt cuồng nhiệt lẫn người dân địa phương, đều đã mệt mỏi với việc góp vốn rồi.」"

# monologue
# JP: ――ナインスターズプロジェクトに参加した各自治体、\n各鉄道事業者も、ふるさと納税や[クラウドファンディング,1]ＣＦでの資金調達をした。
2564 = "――Các chính quyền địa phương, các doanh nghiệp đường sắt tham gia Dự án Nine Stars cũng đã huy động vốn thông qua Thuế quê hương và Crowdfunding (CF)."

# monologue
# JP: 支えてくれる鉄道ファン、投資の対象としてみている層。\nそのどちらもが、今は財布を軽くしてしまっている。
2954 = "Những người hâm mộ đường sắt ủng hộ chúng tôi, những người xem đây là đối tượng đầu tư. Cả hai nhóm này, hiện tại ví tiền đều đã vơi đi nhiều."

# 【ふかみ】
# display as 深美
# JP: 「あの……その話も、わたし、わからなくて。\nだから、すごくズレてたらごめんなさいなんですけど」
1719 = "「Dạ……chuyện đó, em cũng không hiểu lắm. Nên nếu em nói sai thì cho em xin lỗi, nhưng mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、聞かせてくれ、ふかみ」
2105 = "「Không sao, em cứ nói đi, Fukami.」"

# monologue
# JP: ホテルといえば、人脈と情報との宝庫とも聞く、
2902 = "Khách sạn vốn được coi là kho tàng của các mối quan hệ và thông tin."

# monologue
# JP: ふかみの掴んだ水源は、\n今はもう、クマ川のみにとどまらぬものとなっていよう。
2663 = "Nguồn nước mà Fukami nắm giữ, hiện tại có lẽ không chỉ dừng lại ở sông Kuma nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「どんなアイディアであれ、聞かせて欲しい。\n僕らの知恵も――恐らく、枯渇に近いのだ」
1647 = "「Dù là ý tưởng gì đi nữa, anh cũng muốn nghe. Trí tuệ của chúng ta――có lẽ cũng gần cạn kiệt rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「あの、すごく単純だから、ええっと――\n期待はずれかもって、わたし、思うんです、けど」
1778 = "「Dạ, vì nó rất đơn giản nên, ờm―― Em nghĩ là có thể sẽ không được như kỳ vọng, nhưng mà.」"

# monologue
# JP: ふるふる小さく頭を振って。\nそれでもふかみは、続く言葉を発しきる。
2799 = "Em ấy khẽ lắc đầu. Dù vậy, Fukami vẫn nói trọn vẹn câu tiếp theo."

# 【ふかみ】
# display as 深美
# JP: 「ええと――だから。インバウンド誘致と同じで」
1777 = "「Ờm――Vậy nên. Giống như việc thu hút khách du lịch quốc tế.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！　海外からの投資を誘引するのか！」
1817 = "「! Thu hút đầu tư từ nước ngoài sao!」"

# 【ポーレット】
# display as 波萊特
# JP: 「あっ！」
# 1801 = "「啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「それって！　それなら、インバウンドの誘致にも、\nナインスターズの広報告知にもつながるし！」
2154 = "「Chuyện đó! Nếu vậy thì cũng sẽ kết nối được với việc thu hút khách du lịch quốc tế, và cả việc quảng bá Nine Stars nữa!」"

# monologue
# JP: 僕らの視線が、稀咲に集まる。\n稀咲はけれど――やはり、笑顔を見せてくれない。
2673 = "Ánh mắt của chúng tôi đổ dồn về phía Kisaki. Thế nhưng Kisaki――vẫn không nở nụ cười."

# 【稀咲】
# display as 稀咲
# JP: 「それは……できれば素晴らしいと思う。けど、\n大陸方面――隈銀が強い方面には、もうやってるんだ」
2217 = "「Chuyện đó……nếu làm được thì thật tuyệt vời. Nhưng mà, khu vực đại lục――nơi Ngân hàng Kumamoto có thế mạnh, chúng ta đã làm rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲と元忠氏の仲国人脈のことならば知っている。\nというか、その他の国に、ツテはないのか？」
1997 = "「Về mạng lưới quan hệ ở Trung Quốc của Kisaki và ông Mototada thì tôi biết. Nói đúng hơn là, không có mối liên hệ nào ở các quốc gia khác sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「鴎州や冥国との、太いパイプはほとんどないね。\n単純な知人であれば、あちらにも少しはいるけど」
2094 = "「Hầu như không có mối liên hệ lớn nào với Châu Âu hay Mỹ. Nếu chỉ là người quen bình thường thì bên đó cũng có một ít.」"

# 【双鉄】
# display as 雙鐵
# JP: 「であれば――\n後東氏の人脈に頼る……のは――まずいのか？」
2269 = "「Nếu vậy―― Dựa vào mạng lưới quan hệ của ông Goto……thì――không ổn sao?」"

# 【稀咲】
# display as 稀咲
# JP: 「だろうね。ここぞとばかりに、絶対確実に、\n日ノ本鉄路が買い叩かれる」
1948 = "「Chắc là vậy rồi. Nhân cơ hội này, tuyệt đối chắc chắn, Đường sắt Hinamoto sẽ bị ép giá thê thảm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1801 = "「啊！」" 

# monologue
# JP: 言われた瞬間、ようやく理解する。\n稀咲の顔があれほどに、青ざめていたその理由を。
2901 = "Khoảnh khắc nghe điều đó, tôi mới hiểu ra. Lý do khuôn mặt Kisaki lại tái nhợt đến thế."

# monologue
# JP: 稀咲は確かに創設者だが、\n現在の立場的には、日ノ本鉄路の取締役にすぎない。
2966 = "Kisaki quả thực là người sáng lập, nhưng xét về vị trí hiện tại, cô ấy chỉ là Giám đốc của Đường sắt Hinamoto."

# monologue
# JP: そして社長は――\n後東さんから送り込まれた人物なのだ。
2896 = "Và Chủ tịch――\nlại là người do ông Goto đưa vào."

# 【双鉄】
# display as 雙鐵
# JP: 「……この情報を、小石川さんは」
2220 = "「……Thông tin này, cô Koishikawa đã...」"

# 【稀咲】
# display as 稀咲
# JP: 「彼女が社長だもの。報告をあげないわけにはいかない。\nだから、その前に対策を固められないと、まずい」
1874 = "「Cô ấy là Chủ tịch mà. Không thể không báo cáo được. Thế nên, nếu không thống nhất được biện pháp đối phó trước đó thì rắc rối to.」"

# monologue
# JP: 確かに、まずい、小石川さんの能力は、今後の用地買収に\n絶対不可欠――株主総会で追い出すわけにはいかない。
2844 = "Quả thực rắc rối. Năng lực của cô Koishikawa là tuyệt đối không thể thiếu cho việc thu mua đất đai sau này――không thể đuổi cô ấy đi trong Đại hội cổ đông được."

# monologue
# JP: が、小石川さんの報告を受け後東氏の――買収屋の血が\n騒いでしまえば、なにが起きても不思議ではない。
2520 = "Nhưng, nếu nhận được báo cáo từ cô Koishikawa, dòng máu chuyên gia thâu tóm của ông Goto mà nổi lên thì có chuyện gì xảy ra cũng không có gì lạ."

# 【双鉄】
# display as 雙鐵
# JP: 「……必要なのは、鴎州なり冥国なりへの太いパイプか。\n真闇姉や義父さんも、単純な知り合いならばいようが」
1273 = "「……Thứ chúng ta cần là một đường dây lớn nối tới Châu Âu hay Mỹ sao. Chị Mayami hay bố nuôi chắc cũng có người quen bình thường, nhưng mà.」"

# 【ふかみ】
# display as 深美
# JP: 「あの……どういう人ならなれるんですか？\nその――投資を誘引する？　窓口に」
2179 = "「Dạ……người như thế nào thì mới làm được ạ? Cái đó――thu hút đầu tư ấy? Làm đầu mối.」"

# monologue
# JP: ああ、そうだ。\n焦りすぎていた――危うかった。
2587 = "A, đúng rồi.\nTôi đã quá vội vàng――thật nguy hiểm."

# monologue
# JP: そこをきちんと把握せねば、\n無駄に情報を拡散させてしまうだけのこととなる。
2631 = "Nếu không nắm rõ điều đó, thì chỉ tổ làm thông tin bị rò rỉ một cách vô ích."

# 【稀咲】
# display as 稀咲
# JP: 「まずは、その国を母国としている人間。よそ者が\n持ち込むお金の話は、それだけでひどく警戒される」
2295 = "「Trước tiên, phải là người mang quốc tịch của nước đó. Chuyện tiền bạc do người ngoài mang đến, chỉ bấy nhiêu thôi cũng đủ khiến họ cảnh giác cao độ rồi.」"

# 【日々姫】
# display as 日日姬
# JP: 「あー、ありそう。そういうの」
1851 = "「A, có vẻ là vậy. Kiểu thế.」"

# 【稀咲】
# display as 稀咲
# JP: 「その上で、その国において金融商品を作成できる\n立場であれば、一番理想的だといえるね」
1652 = "「Trên cơ sở đó, nếu họ ở vị trí có thể tạo ra các sản phẩm tài chính tại quốc gia đó thì có thể nói là lý tưởng nhất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのような知り合いがいるか。真闇姉と義父さんならば、\n絶対に信用できるゆえ、まずあたってみよう」
2146 = "「Không biết có người quen nào như vậy không. Nếu là chị Mayami và bố nuôi, thì tuyệt đối có thể tin tưởng được, nên tôi sẽ thử hỏi xem sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「わたしは――んー……ねぇねと父さん以外だと～」
1981 = "「Em thì――ưm……ngoài chị hai và bố ra thì~」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、日々姫とふかみはデザインに専念してくれ。\n完成デザインの質の高さは、投資誘引の力となるゆえ」
1651 = "「Không, Hibiki và Fukami cứ tập trung vào việc thiết kế đi. Chất lượng cao của thiết kế hoàn chỉnh sẽ là sức hút đầu tư đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！　うん！　わかった！！」
1807 = "「A! Vâng! Em hiểu rồi!!」"

# 【ふかみ】
# display as 深美
# JP: 「わたしも、全力でお手伝いします！　です！！」
1962 = "「Em cũng sẽ dốc toàn lực hỗ trợ ạ! Ạ!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「で、ポーレットは――\nポーレット？」
2130 = "「Vậy, Paulette thì――\nPaulette?」"

# monologue
# JP: ぎゅっと、唇を噛んでいる。\nぎゅうっと、瞳を閉じている。
2776 = "Cắn chặt môi.\nNhắm nghiền đôi mắt."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ポーレット」
1953 = "「Sao thế? Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「――安心して、稀咲。双鉄くん」
1240 = "「――Yên tâm đi, Kisaki. Anh Soutetsu.」"

# 【稀咲】
# display as 稀咲
# JP: 「ポーレット？」
2121 = "「Paulette?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そういう――銀行に、強力にセールスかけられるひと。\nフランクに、わたし、一人だけだけど知ってるから」
2228 = "「Người như vậy――có khả năng chào mời mạnh mẽ với ngân hàng. Ở Pháp, tôi biết một người, dù chỉ có một người thôi.」"

# 【双鉄】
# display as 雙鐵＆稀咲
# JP: 「おお！」\n「――っ！」
1846 = "「Ồ!」\n「――!」"

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜のこと。わたしのこと。きっと助けてくれるから。\nいまも絶対、愛してくれてるって思うから」
1871 = "「Chuyện của Ohito. Chuyện của tôi. Nhất định người đó sẽ giúp đỡ. Bởi vì tôi tin rằng, bây giờ người đó vẫn tuyệt đối yêu thương tôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1798 = "「啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「――ポーレット」
1261 = "「――Paulette.」"

# monologue
# JP: ……感じてはいた。\nポーレットも僕と同様、過去に何かをかかえていると。
1192 = "……Tôi đã cảm nhận được. Paulette cũng giống như tôi, đang mang trong mình một quá khứ nào đó."

# monologue
# JP: 稀咲もそれを――いや、稀咲はあるいはその詳細を、\nポーレットから、既に聞かされているのだろうか？
2871 = "Kisaki cũng vậy――không, hay là Kisaki đã được nghe Paulette kể chi tiết về chuyện đó rồi chăng?"

# 【稀咲】
# display as 稀咲
# JP: 「キミは、それで――」
1702 = "「Cậu, như vậy thì――」"

# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫。稀咲。これ、いい機会だって思うから。\nわたしとママとが――もう一回、お話するための」
2104 = "「Không sao đâu. Kisaki. Vì tôi nghĩ đây là một cơ hội tốt. Để tôi và mẹ――có thể nói chuyện với nhau một lần nữa.」"

# monologue
# JP: そしてポーレットは手を伸ばす。
2704 = "Và rồi Paulette vươn tay ra."

# monologue
# JP: わずかに震える指先で――\nそれでもしっかり、受話器を掴む。
2626 = "Với những đầu ngón tay hơi run rẩy―― Nhưng vẫn nắm chặt lấy ống nghe điện thoại."

# 【双鉄】
# display as 雙鐵
# JP: 「……今日はふかみに、びっくりするほど助けられたな」
1235 = "「……Hôm nay Fukami đã giúp đỡ nhiều đến mức đáng ngạc nhiên nhỉ.」"

# 【ふかみ】
# display as 深美
# JP: 「そんな――そんなことない、です」
2108 = "「Làm gì――làm gì có chuyện đó, ạ.」"

# monologue
# JP: ふかみがはにかむ。
2791 = "Fukami bẽn lẽn."

# monologue
# JP: 送っていくための帰り道。\nふかみはすっかり、昔に戻ってしまったようだ。
2690 = "Trên đường đưa em ấy về nhà. Fukami dường như đã hoàn toàn trở lại như ngày xưa."

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことは、あるさ。ふかみのおかげだ。\nポーレットとお母様とが、話し合えたのも」
2139 = "「Có chứ. Là nhờ Fukami đấy. Cả việc Paulette và mẹ cô ấy có thể nói chuyện với nhau nữa.」"

# 【ふかみ】
# display as 深美
# JP: 「あ！　あれは――本当に素敵だった。です。\nちょっとでもきっかけになれたなら……うれしい。です」
1816 = "「A! Chuyện đó――thực sự rất tuyệt vời. Ạ. Nếu em có thể trở thành cơ hội dù chỉ một chút……thì em rất vui. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1830 = "「嗯」" 

# monologue
# JP: 確かに、本当に素敵だった。\nこうして思い出すだけで、こころがあたたかになる程に。
2824 = "Quả thực, rất tuyệt vời. Đến mức chỉ cần nhớ lại thế này thôi cũng thấy ấm lòng."

# 【ふかみ】
# display as 深美
# JP: 「マイアさん――ポーレットさんのこと、ずっと、\nずうっと。離れてても、見守ってくれてたんですね」
2232 = "「Cô Maia――đã luôn, luôn dõi theo chị Paulette dù ở xa nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。ナインスターズプロジェクトのことどころか、\n日ノ本鉄路のことまで、既に知ってくださっていたとは」
2044 = "「Đúng vậy. Không chỉ Dự án Nine Stars, mà cô ấy thậm chí đã biết cả chuyện của Đường sắt Hinamoto nữa.」"

# monologue
# JP: ……おかげで話は早かった。
1194 = "……Nhờ vậy mà câu chuyện tiến triển rất nhanh."

# monologue
# JP: というかむしろ、ポーレットが頼ってくるのを待っていた。\nそんな印象さえ感じるほどに。
2821 = "Hay đúng hơn là, cô ấy đang chờ đợi Paulette nhờ vả. Đến mức mang lại cho tôi ấn tượng như vậy."

# 【ふかみ】
# display as 深美
# JP: 「……うまくいきますかね？\nマイアさんが、フランクの銀行紹介してくれるのって」
1265 = "「……Liệu có suôn sẻ không nhỉ? Chuyện cô Maia giới thiệu ngân hàng ở Pháp ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは、うまくいくだろう。\nなにせマイアさんは、あのポーレットのお母様だぞ」
2223 = "「Chắc chắn sẽ suôn sẻ thôi. Dù sao thì cô Maia cũng là mẹ của Paulette kia mà.」"

# 【ふかみ】
# display as 深美
# JP: 「あ！　いわれてみたらそうですね」
1814 = "「A! Anh nói em mới để ý.」"

# 【双鉄】
# display as 雙鐵
# JP: 「その上、稀咲だ。ご紹介が仮にか細い縁だとしても、\n必ず、話をまとめるさ」
2168 = "「Hơn nữa, còn có Kisaki. Cho dù sự giới thiệu đó chỉ là một mối duyên mỏng manh, cô ấy nhất định sẽ dàn xếp ổn thỏa.」"

# 【ふかみ】
# display as 深美
# JP: 「はい、そうですね！！」
2064 = "「Vâng, đúng vậy ạ!!」"

# monologue
# JP: （くぅ～）
2989 = "（Rột~）"

# monologue
# JP: おっと、ふかみの腹がなったか。
2581 = "Ôi chao, bụng Fukami réo rồi à."

# monologue
# JP: ああ、ではない。\nこういうときは、僕が泥をかぶって――
2585 = "À, không phải. Những lúc thế này, tôi phải đứng ra chịu trận――"

# 【ふかみ】
# display as 深美
# JP: 「あはは！　おなか、なっちゃいました。です。\nわたし、安心しちゃったから」
1785 = "「A haha! Bụng em, réo lên mất rồi. Ạ. Tại em thấy an tâm rồi nên.」"

# monologue
# JP: ――恥ずかしがらずに、閉じこもらずに。\nふかみが笑顔で、お腹の虫を吹き飛ばす。
1149 = "――Không hề xấu hổ, không hề thu mình lại. Fukami mỉm cười, xua tan tiếng réo của cái bụng đói."

# 【双鉄】
# display as 雙鐵
# JP: 「僕にも聞こえた。――というか、そうか。\n僕らは夕飯を、まだ食べてないのだなぁ」
1963 = "「Anh cũng nghe thấy. ――Mà, đúng rồi nhỉ. Chúng ta vẫn chưa ăn tối mà.」"

# monologue
# JP: 緊張と切迫感とに、空腹さえも飛んでいたが――\nなるほど確かに。安心すれば、腹もすくものだ。
2887 = "Căng thẳng và cấp bách đã làm cơn đói bay biến đi đâu mất―― Nhưng quả thực là vậy. Khi an tâm rồi, bụng cũng sẽ đói thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、この時間だとコンビニでしか食事できんな。\nどうだ、ふかみ。イートインでも構わなければ」
1767 = "「Tuy nhiên, giờ này thì chỉ có thể ăn ở cửa hàng tiện lợi thôi. Sao hả Fukami. Nếu em không ngại ăn tại cửa hàng.」"

# monologue
# JP: 言った瞬間、ふかみがぽっと、赤くなる。
2900 = "Vừa dứt lời, mặt Fukami bỗng đỏ bừng."

# 【ふかみ】
# display as 深美
# JP: 「わたし――双鉄おにいさ――双鉄さんの食事のお誘い、\nとっても、とっても嬉しい、です」
2172 = "「Em――Lời mời ăn uống của anh Soutetsu――anh Soutetsu, em rất, rất vui, ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2059 = "「Vậy sao.」"

# 【ふかみ】
# display as 深美
# JP: 「だけど、今日は帰ります。です。遅くなっちゃったし、\nおかあさん、ご飯作ってくれてるって思いますし」
1683 = "「Nhưng mà, hôm nay em sẽ về. Ạ. Cũng muộn rồi, với lại em nghĩ mẹ đã nấu cơm cho em rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――そうか。ならば、次の機会にだな。\n今日のお礼をきちんとしたい」
1248 = "「――Vậy sao. Thế thì để dịp khác nhé. Anh muốn cảm ơn em đàng hoàng vì chuyện hôm nay.」"

# 【ふかみ】
# display as 深美
# JP: 「あのっ！」
1999 = "「Anh này!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――っ！」
1845 = "「Hửm? ――!」"

# monologue
# JP: ふかみが、近い。\nいつの間に、僕のすぐそばによってきている。
2804 = "Fukami, thật gần. Em ấy đã tiến sát lại bên tôi từ lúc nào."

# monologue
# JP: 大きな瞳で――すみれ色の目で。\n僕を、まっすぐ見つめている。
2625 = "Với đôi mắt to tròn――đôi mắt màu hoa violet. Đang nhìn thẳng vào tôi."

# 【ふかみ】
# display as 深美
# JP: 「そのお食事って、ふたりっきりでもいいですか？」
2266 = "「Bữa ăn đó, chỉ có hai chúng ta thôi được không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。凪なり誰かと一緒でも、二人きりでも。\nふかみへの礼ゆえ、ふかみの希望にあわせよう」
2138 = "「Tất nhiên rồi. Dù là cùng với Nagi hay ai đó, hay chỉ có hai chúng ta. Vì là để cảm ơn Fukami, nên anh sẽ theo ý em.」"

# 【ふかみ】
# display as 深美
# JP: 「……あはー」
1246 = "「……Aha~」"

# monologue
# JP: 気の抜けたような妙な笑み。\nそしてふかみは、ぽーんと大きな一歩で僕から距離を取る。
2783 = "Một nụ cười kỳ lạ như thở phào nhẹ nhõm. Rồi Fukami lùi lại một bước lớn, tạo khoảng cách với tôi."

# 【ふかみ】
# display as 深美
# JP: 「なら、しばらくはまだいーでーす！\nお礼、先にとっといてください！」
2257 = "「Nếu vậy, tạm thời thì chưa cần đâu ạ! Lời cảm ơn, xin hãy giữ lại cho lần sau nhé!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
1703 = "「Vậy sao?」"

# 【ふかみ】
# display as 深美
# JP: 「はいです。わたし、もっともっとがんばって、\n素敵な大人――素敵な女の子になりますです、から」
2137 = "「Vâng ạ. Em sẽ cố gắng nhiều, nhiều hơn nữa, để trở thành một người lớn tuyệt vời――một cô gái tuyệt vời, ạ.」"

# monologue
# JP: ふかみがはにかむ。下を向く。
2797 = "Fukami bẽn lẽn. Cúi gằm mặt xuống."

# monologue
# JP: けれどもそれは一瞬で、\n僕へと向き直した顔は明るく、笑ってる。
2524 = "Nhưng đó chỉ là trong tích tắc, khi quay mặt về phía tôi, khuôn mặt em ấy tươi sáng và đang mỉm cười."

# 【ふかみ】
# display as 深美
# JP: 「だからそのとき！　双鉄さんがわたしのこと、\nふたりっきりで誘いたいって思ってくれたら！」
2007 = "「Vì thế lúc đó! Nếu anh Soutetsu nghĩ rằng, muốn mời riêng một mình em!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1830 = "「嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「そのときは！　素敵なディナー！\nご馳走してもらえたらうれしいです！　です！！」
1735 = "「Lúc đó! Một bữa tối tuyệt vời! Nếu được anh thiết đãi thì em sẽ rất vui! Ạ!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1801 = "「啊！」" 

# monologue
# JP: なるほど、これは、デートに誘えと言われているのか。
2749 = "Ra là vậy, đây là đang bảo tôi hãy mời hẹn hò sao."

# monologue
# JP: ……デートだなんだは、よくわからん。\nゆえ、先のことになるかもしれんが。
1188 = "……Hẹn hò hay gì đó, tôi không rành lắm. Vì vậy, có thể sẽ là chuyện của tương lai xa, nhưng mà."

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。そのときにはそうしよう」
1836 = "「Anh hiểu rồi. Đến lúc đó anh sẽ làm vậy.」"

# 【ふかみ】
# display as 深美
# JP: 「嬉しい！　ありがとうございます！\nそうなるように、わたし、頑張っちゃいますね！」
1864 = "「Vui quá! Cảm ơn anh! Để được như vậy, em sẽ cố gắng hết sức nhé!」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ、おい」
1819 = "「A, này.」"

# monologue
# JP: ふかみが駆け出す。\n軽やかに、楽しげに――背中で笑っているように。
2802 = "Fukami chạy vụt đi. Nhẹ nhàng, vui vẻ――như thể bóng lưng em ấy đang cười vậy."

# 【ふかみ】
# display as 深美
# JP: 「ここまできたら大丈夫です！\nおやすみなさい！　双鉄さん！！」
1737 = "「Đến đây là ổn rồi ạ!\nChúc ngủ ngon! Anh Soutetsu!!」"

# monologue
# JP: ――ああ、本当に。\n本当にふかみは大人になった。
1145 = "――A, quả thực. Fukami thực sự đã trở thành người lớn rồi."

# monologue
# JP: 恐らく僕より、ずうっと早く。
2892 = "Có lẽ còn sớm hơn tôi rất nhiều."

# 【双鉄】
# display as 雙鐵
# JP: 「おやすみ、ふかみ。良い夜を」
2082 = "「Chúc ngủ ngon, Fukami. Có một đêm ngon giấc nhé.」"
