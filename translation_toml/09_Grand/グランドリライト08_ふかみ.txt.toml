# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――それは盲点だった」
2057 = "「是嗎……這我還真的沒想到」" 

# monologue
# JP: 物産館は、九洲各県の名物と見せ所を、\n各県自体が主体となって作った、いわば、県のカタログだ。
2811 = "物產館是由各縣自主設計，展示了本地的特產與特色，簡而言之，就像當地的商品目錄。" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがとふかみちゃん！　それ全部！　絶対確実に\n役にたつ！！　役にたたないわけがない！！」
2181 = "「謝謝你，小深！這些肯定全都能派上用場的！！不可能派不上用場！！」" 

# 【ふかみ】
# display as 深美
# JP: 「あ……よかった――です」
1797 = "「啊……那就好，嗯」" 

# monologue
# JP: それほど不安だったのだろう。
2826 = "看來深美確實非常擔心。" 

