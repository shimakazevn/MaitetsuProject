2572 = "只要有那麼一個相關公司、一個掌車人放棄，九星計劃就有可能因此夭折。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、これ以上のデザイン遅延、車両製造開始遅延に\n繋がる提案には、僕は容易には賛成できない」
1854 = "「因此，我不能輕易贊同可能延緩設計、延緩車輛製造的提議」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにの心配はよーくわかったと。\nばってん、それでも、その上で――」
1993 = "「我明白阿哥擔心的事情了。可是就算這樣，也可以在原方案的基礎上……」" 

# monologue
# JP: 日々姫がじっと、ふかみを見つめる。\n見つめてそうして、ふわりと笑う。
2742 = "日日姬盯著深美。過了一會，她笑了。" 

# 【日々姫】
# display as 日日姬
