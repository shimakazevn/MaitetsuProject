# 【ふかみ】
# display as 深美
# JP: 「マイレールファンド。すごいですよね！\n帝央ホテルの人達にも、出資者さん、何人もいました」
2155 = "「私有線路基金，真的很厲害！就連帝都中央車站酒店的人也有幾位參與了出資」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、それは嬉しいことを聞いた」
2062 = "「是嗎，這真是令人高興啊」" 

