1895 = "「如果照片和影片就行的話，我拍了不少。不只是帝都中央車站酒店，還有帝都其他的代表性酒店」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
# 1801 = "「啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「やっぱり」
1984 = "「我就知道」" 

