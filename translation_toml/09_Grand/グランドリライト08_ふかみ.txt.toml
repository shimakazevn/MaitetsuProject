# monologue
# JP: ファンドによって集まった資金で、日ノ本鉄路は、\n理想以上の素晴らしい成果をあげつづけている。
2553 = "募集到的資金正在讓日本鐵路收穫超乎理想的成果。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本鉄路が線路を負担したことにより、鉄道事業者は、\nナインスターズ計画を押し進めるだけの余裕をもてた」
