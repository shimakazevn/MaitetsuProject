# monologue
# JP: きっと、日々姫はやるだろう。
2732 = "日日姬一定可以。" 

# monologue
# JP: 不可能に近かったオーダーに、\nふかみが支えを、大きな支えをくれたのだから。
2532 = "儘管這看似是一個不可能完成的任務，但深美的準備工作為她節約了寶貴的時間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。頼む」
1889 = "「好，交給你了」" 

