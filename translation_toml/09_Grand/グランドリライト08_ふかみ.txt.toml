# JP: 日々姫と話しているというのに、\nふかみは昔の、おどおどちゃんに少し戻ってしまっている。
2510 = "以至於在和日日姬說話的時候，都多少顯現出了從前那個膽小的小女孩的樣子。" 

# monologue
# JP: （いや――だよな。\nそう簡単に、本質までもが変わるものか）
2988 = "（不對，這也很正常。畢竟人的秉性沒那麼容易改變）" 

