1627 = "「一個星期內，要把需求全都重新加進去，還要保障動線與安全性」" 

# monologue
# JP: ……日々姫を苦しめたくはない。\nそれでも、無理であるなら、諦めるしか無い。
1187 = "……我不想折磨日日姬。但如果實在不行，那就只能放棄。" 

