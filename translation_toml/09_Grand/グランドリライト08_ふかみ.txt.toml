2512 = "但她本性依然是那個深美。游移不定、畏畏縮縮，想躲在自己的世界裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうであるのに――慣れぬ帝都で……たった一人で」
1763 = "「可是……她卻獨自前往了人生地不熟的帝都」" 

# monologue
# JP: ホテルの業務を、精神を身につけ、御一夜に持ち帰る。\nその時点でもう、かなり厳しい任務であろうに――
2562 = "去學習酒店的工作，去鑽研酒店的精神，然後帶回御一夜。她應該早就明白這個任務有多艱辛……" 

# monologue
# JP: その上、貴重な休みを使って、僕らの、ナインスターズの\nために、他のホテルや物産館までをめぐってくれた。
