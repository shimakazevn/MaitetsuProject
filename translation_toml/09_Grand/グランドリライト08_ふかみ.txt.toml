1685 = "「但是就算這樣還是需要巨額投資。大家都在靠著補助金、公司債券和銀行貸款過日子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。ゆえ」
2109 = "「沒錯，因此……」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 1801 = "「啊！」" 

# monologue
# JP: 思わず、といった感じの声。\nあわてて口をつぐんでしまったふかみを目線で促してみる。
2778 = "深美下意識地叫出了聲。她慌慌張張地閉上了嘴，我則用眼神示意她說出自己的想法。" 

# 【ふかみ】
# display as 深美
# JP: 「……だから、もしも一号列車が走り始めるのが遅れたら。\nそれだけ、その分。利息とかがふくらんじゃう、です？」
1254 = "「……所以，一號列車開始運營的時間越晚，利息就會越滾越多，是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。そして金銭面だけでなく、\nモチベーション面の心配も、同じくでてくる」
2045 = "「是啊。而且除了金錢之外，還會影響到大家的士氣」" 

# monologue
# JP: 九洲周遊リレートレイン・ナインスターズ一号列車。\n参加を希望し、大物まいてつも九洲入りを予定している。
2595 = "因為環遊九州聯運列車九星一號列車，一些知名掌車人也希望進駐九州，參與運營。" 

# monologue
# JP: 東日本の看板であった、D51　840\x%lレイルロオド;#00ffc040;レイルロオド%l;#;『らん』と、\nそのマスターとの[にしてつ,2]二四鉄入りが、その顕著な例だ。
2761 = "東日本的招牌Ｄ５１　８４０\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;“蘭”與她的主人進駐西鐵就是一個很好的例子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「一号列車走行開始というゴールに向けて、事業者も\nまいてつも、息をとめての全力疾走を続けている」
2123 = "「為了讓一號列車開始運營，相關公司與掌車人都屏著呼吸，向著目標全力奔跑」" 

# monologue
# JP: それが、この先最長四年。\nどう考えても限界ラインだ。
2514 = "但我們的時限最多只有四年。絕對不能超過這個極限。" 

# monologue
