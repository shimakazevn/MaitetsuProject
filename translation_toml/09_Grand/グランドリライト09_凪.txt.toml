# 【凪】
# display as 凪
# JP: 「それなら凪さま！　左ポケット！！」
2014 = "「那本小姐選左邊！！」" 

# 【中村】
# display as 中村
# JP: 「残ったほうで。右ポケットでお願いします」
2008 = "「那我就選另一邊吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！　じゃあナギにはキャンディー！\nナカムラにはチョコをプレゼントー！」
2057 = "「ＯＫ！那就送給凪糖果！送給中村巧克力！」" 

# 【凪】
# display as 凪
# JP: 「わおわお！　うれしかー！」
1610 = "「哇哦哇哦！真開心！」" 

# 【中村】
# display as 中村
# JP: 「これはどうも。ありがとうございます」
1960 = "「謝謝你的巧克力」" 

# monologue
# JP: なるほど。オリヴィはポケットに菓子を入れているのか。\nちびっこたちに大人気なだけのことはある準備のよさ――
2431 = "原來奧莉薇在口袋裡準備了糖果。她那麼受小孩子歡迎，就是因為準備得很周全——" 

# monologue
# JP: ああいや、ファンサービスのため、\n僕もさっそく真似するべきか。
2243 = "不對，我也應該向她學習，這樣才能更好地服務我們的支持者們。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツはなんにもあげないの？　ごほーび！\n今日のふたりの運転、すっごくよかったでしょ？」
2033 = "「雙鐵不給她們獎勵嗎？她們兩個今天做得很棒哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。非常によかった」
1646 = "「嗯，確實很棒」" 

# monologue
# JP: とはいえ、僕は運転部長だ。\n一部職員だけを贔屓していると取られかねない言動は――
2294 = "但我畢竟是運營部長，不應該作出偏向部分職員的言行。" 

# monologue
# JP: （ああ、いや）
2932 = "（噢，不對）" 

# monologue
# JP: 運転部長であるからこそ、信賞必罰、\nその姿勢を明示することも大事な気がする。
2668 = "正因為我是部長，才應該做到賞罰分明。表現出這種態度非常重要。" 

# monologue
# JP: ……例えば乗客アンケートなどをとるようにして、\n毎月もっとも評価の高い者にボーナスを支給するなど――
1068 = "……比如對乘客進行問卷調查，每個月給獲評最高的員工發獎金，之類的。" 

# 【凪】
# display as 凪
# JP: 「にーさん、どぎゃんしたと？」
1685 = "「大哥哥，你怎麼咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひときわよい乗務には、ご褒美が与えられる。\n社としての、そういう仕組があっても良いかと考えた」
1758 = "「工作完成得出色，應該得到獎勵。我在想，公司裡應該建立這種獎勵制度」" 

# 【凪】
# display as 凪
# JP: 「わおわお！　そりゃよかばいね！」
1608 = "「哇哦哇哦！太好啦！」" 

# 【中村】
# display as 中村
# JP: 「社としてでしたら、昇進評価につなげてもらえるのが\n一番私は、嬉しいです」
1705 = "「如果是公司決策的話，對我而言，能跟晉升評價聯繫起來就最好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。道理だな。考慮する。評価システムのことと\nあわせて、ポーレットに提言しておこう」
1642 = "「嗯，有道理，我會考慮的。到時候和評價體系一起向波萊特提議吧」" 

# 【中村】
# display as 中村
# JP: 「ふふっ、素晴らしいご褒美をいただきました。\nありがとうございます」
1601 = "「呵呵，真是一份很棒的獎勵。非常感謝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
# 1651 = "「嗯？！」" 

# 【中村】
# display as 中村
# JP: 「では、失礼します」
2006 = "「那我先失陪了」" 

# monologue
# JP: ご褒美というつもりはなかったのだが、\n訂正しようとするより先に、中村さんは上がってしまう。
2849 = "這不是特地給她的獎勵，但我還沒來得及糾正中村小姐，她就先一步離開了。" 

# monologue
# JP: （これは――うむ。\nほんの少しだけ困った事態に陥らされてしまったな）
2928 = "（呃……這下有點麻煩了）" 

# monologue
# JP: 中村さんだけにご褒美を与えた、\nという形になるのは、いかにもまずい。
2809 = "變成只有中村小姐得到獎勵，太不合適了。" 

# monologue
# JP: どうしたものかとハチロクを見れば、\n動物園のみどころを、みくろから楽しげに聞いている。
2582 = "我看向八六，想向她求助，發現她正津津有味地聽美玖路說動物園內的看點。" 

# monologue
# JP: （あれもあれで、完全にご褒美になっているな）
2942 = "（這也是一種獎勵啊）" 

# monologue
# JP: ならば、うむ。\n仮称“積極評価制度”の、これをテストケースとしよう。
2875 = "那就把這次當作是“積極評價制度”的測試吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――凪」
1739 = "「對了，凪」" 

# 【凪】
# display as 凪
# JP: 「凪さまにもご褒美くれると！？」
1845 = "「本小姐也有獎勵嗎？！」" 

# monologue
# JP: なんと嬉しげな顔だろう。\n凪は凪、どこまでいってもまっすぐだなぁとホっとする。
2412 = "凪顯得十分開心。看她還是這麼直率，我不禁放下了心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そうすることとした。\n大した褒美は用意できんが、なにか希望があるなら」
1643 = "「嗯，沒錯。你有什麼願望就說吧，雖然我能做的事情有限」" 

# 【凪】
# display as 凪
# JP: 「あるとよ。希望」
1607 = "「咱確實有個願望」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1630 = "「啊！」" 

# monologue
# JP: 真剣な目だ。
2398 = "凪的眼神十分認真。" 

# monologue
# JP: 大会で、あるいは乗務で。\n強敵と、難関と向き合う――そうしたときの、凪の目だ。
2526 = "就像是在大賽上、在工作時一樣。這是面對強敵與難關時才會露出的眼神。" 

# 【凪】
# display as 凪
# JP: 「凪さま、\nどーしてもにーさんと行きたかったところが、あると」
1851 = "「本小姐非常想跟大哥哥去一個地方」" 

# 【凪】
# display as 凪
# JP: 「なーんだ、そぎゃんわけだったとねー」
1462 = "「什麼嘛，原來是這樣啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1635 = "「嗯」" 

# 【凪】
# display as 凪
# JP: 「ナビにいわれて、向き合うために、\nにーさん、ふたりっきりにたくさんなっとったとね」
1677 = "「大哥哥是聽了Ｎａｖｉ的建議，為了面對其他人，才經常找機會和人獨處啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1827 = "「是啊」" 

# monologue
# JP: いつの間に、意識することを忘れていたが、\n確かに、そうした時期はあった。
2246 = "不知不覺我已經不會特地做這種事了，但有一段時期確實是這樣的。" 

# monologue
# JP: （“このままだと僕の命にかかわる”と、\nそのようなことを、確かナビには警告されたが――）
2945 = "（雖說Ｎａｖｉ警告了我“再這樣下去會有生命危險”……）" 

# monologue
# JP: 向き合うことで、その危機は回避されたのだろうか？\nいまもってなお、僕にはまるでわからない。
2439 = "可是面對他人，就能迴避生命危險嗎？直到現在，我還是完全想不明白。" 

# 【凪】
# display as 凪
# JP: 「そぎゃん理由なら納得ばい！\n凪さま、ちょこっと安心したばい」
2000 = "「那咱就明白了！本小姐放心咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1650 = "「嗯？」" 

# monologue
# JP: そのひとことに、わずかな疑問を感じてしまう。
2483 = "她的話讓我有些疑惑。" 

# monologue
# JP: と、いうか――\nこの質問を凪がぶつけてきた理由も、やはり、疑問だ。
2801 = "話說回來，凪為什麼會問我這種問題呢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにが一体、安心なのだ？」
1810 = "「放心什麼？」" 

# 【凪】
# display as 凪
# JP: 「そりゃ、にーさんが女の子ば誘いまくって、\nふたりっきりになっとったのに、誘われんかったけん」
1982 = "「這個嘛……因為大哥哥到處勾搭女生，還跟女生獨處，卻一直不來找咱」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1650 = "「嗯？」" 

# 【凪】
# display as 凪
# JP: 「やけん、凪さま。女の子としての魅力とか、\n足りんのかもって、ちょっと不安になっとったばい」
1794 = "「所以本小姐有點擔心，咱是不是缺少女的魅力呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは無い。凪は、十分に魅力的だと素直に思うぞ。\n実際、どこへいっても人気者ではないか」
1775 = "「怎麼會呢，我覺得你很有魅力啊。事實上，你走到哪裡都很受歡迎不是嗎？」" 

# 【凪】
# display as 凪
# JP: 「お年寄りとちびすけたちと動物と女の子にはモテると！\nばってん、男の子からはさっぱりばい」
1939 = "「老人家、小孩子、小動物和女生倒是挺喜歡咱的！但是男生對咱就沒有多大興趣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　それは意外だ」
1836 = "「是嗎？真意外」" 

# monologue
# JP: モテていないという事実もだが、\nそれ以前に――
2577 = "我沒想到她不受男生歡迎，不過更讓我好奇的是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪は、異性からもてたいのか？」
1513 = "「你想受男生歡迎嗎？」" 

# 【凪】
# display as 凪
# JP: 「そういうわけじゃなかばい。実際よってこられても、\n今は相手ばしとられんよねー、っていうのもあるし」
1997 = "「那倒不是。就算真的有男生接近咱，現在咱也沒工夫搭理他們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
# 1827 = "「是啊」" 

# monologue
# JP: ポーレットや日々姫やふかみも実際、\n数多の誘いを同じ理由で跳ね除け続けているようだ。
2679 = "波萊特、日日姬、深美其實也以同樣的理由，拒絕了許多人的邀請。" 

# 【凪】
# display as 凪
# JP: 「ばってん、ぜーんぜんそぎゃん声がかからんのは、\nやっぱりちょっと、不安に感じる部分あるとよ」
1480 = "「但是完全沒有人對咱感興趣，咱心裡還是會有些擔心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
# 1990 = "「這樣啊」" 

# monologue
# JP: ……言われて、眺めて、改めて気付かされる。\n成長したのは、内面や技量だけのことではない。
1073 = "……聽到凪的心聲，我打量了她一番，忽然發現，她不只是獲得了心理和工作技能上的成長。" 

# monologue
# JP: 凪もまた、極めて健やかに美しく、\n女性としても、鮮やかに成長しているのだと。
2372 = "凪也出色成了一位活力四射的美麗女性。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪も、大人になったのだなぁ」
1500 = "「你也長大了啊」" 

# 【凪】
# display as 凪
# JP: 「そりゃそうばい！　ばってん――\nまだ、大人になり損なってる部分もあると」
1890 = "「當然嘞！但是……有些部分還是沒有長大」" 

# monologue
# JP: ふと、凪の足が止まる。\nなんでもないような場所でいきなり――――っ！
2404 = "凪突然駐足，停在一個看似毫無特殊之處的地方。不對，我想起來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ここ、か」
1751 = "「就是這裡嗎」" 

# monologue
# JP: 凪が頷く。\nとても静かに――落ち着いた大人の顔をして。
2413 = "凪點了點頭，表情十分平靜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ここに、凪は来たかったのか」
1508 = "「你就是想來這裡嗎」" 

# monologue
# JP: 事情を知らぬ者にとっては、\n他のどことも変わらぬ風景。
2519 = "對於不知情的人來說，這裡的景色平平無奇。" 

# monologue
# JP: けれども、凪には――\nそうして僕にも、特別な場所。
2298 = "但是對於我們而言，這裡卻有著特殊的意義。" 

# 【凪】
# display as 凪
# JP: 「うち。ずっと。\nずーっと謝りたかったと」
1602 = "「咱……一直……一直很想道歉」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1635 = "「嗯」" 

# 【凪】
# display as 凪
# JP: 「あのとき――ホントに、周りのことば、\nちょっとも見えておらんかったばい」
2011 = "「那時候……咱完全沒有把周遭的事情放在心上」" 

# monologue
# JP: 落ち着き払った声を出し。\nそうしながらも凪の目が、僕の視線からわずかにずれる。
2474 = "她冷靜地對我說著，同時稍稍挪開了視線，避免與我對視。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
1124 = "「……嗯」" 

# 【凪】
# display as 凪
# JP: 「いま考えたら――あれば、まっとうな修行じゃなくて、\nヤツアタリだったとも思うばい」
1879 = "「現在想起來……那根本不是正經的修行，只是亂發脾氣而已」" 

# monologue
# JP: 罪悪感の重みがどれほど苦しいものかを、\nこの身をもって、僕は知っている。
2673 = "沉重的罪惡感有多麼折磨人，我對此深有體會。" 

# monologue
# JP: それはしばしば、事実をも、自身さえをも歪めてしまう。\n――知っているから、懸命に凪の声を聞く。
2877 = "那時常會扭曲事實，甚至會扭曲自己。我明白這種痛苦，所以選擇聆聽她的傾訴。" 

# 【凪】
# display as 凪
# JP: 「[むて,1]無手でんなんでん、本気で切りかかったとに、\nにーさんに軽くあしらわれて……ウチ、悔しかったと」
2031 = "「雖然是赤手空拳，但大哥哥輕鬆招架住了咱的全力一擊……咱很不甘心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……悔しかったか」
1131 = "「……是嗎」" 

# monologue
# JP: 凪が素直に、こころの重荷を吐き出せるよう、\n僕も素直に、自分のこころを伝えよう。
2401 = "凪真誠地向我袒露出心事，所以我也要真誠地回應她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、僕の方とて、軽くあしらえてなどいなかった。\n身がすくむ程の迫力に、体が生き残ろうと動いただけだ」
1534 = "「其實也沒那麼輕鬆。我只是感受到了強烈的殺氣，身體出於求生欲望動了起來而已」" 

# 【凪】
# display as 凪
# JP: 「そん迫力も……ウチの未熟なとこばい。\n本当にあのとき、[ハチロク,2]女の子のこと――助けたかったら」
1816 = "「散發出殺氣……也是因為咱太幼稚了。那個時候，如果咱真的想救八六……」" 

# monologue
# JP: じっと、凪が考え込む。\n凪らしくもない神妙さで。実に凪らしく、一心に。
2408 = "凪陷入了沉思。看似不像她往日的作風，其實她投入時就是如此專注。" 

# 【凪】
# display as 凪
# JP: 「にーさんのこと観察して、気配を絶って、隙を伺って\n――絶対に一刀で倒せるまで、待つべきだったとよ」
1604 = "「咱就應該隱藏自己，暗中觀察，尋找機會，等到有把握一刀制勝的時候再出手」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1824 = "「是啊……」" 

# monologue
# JP: 確かにそれは、かつての凪には、\nまったくできていないことだった。
2503 = "如果是以前的她，是完全沒有做到這些的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が――それも無理からぬことではなかろうか？\nハチロクを守ろうとする気持ちのゆえに」
1479 = "「但是……這也沒辦法吧？因為你想要保護八六，所以才忍不住出手」" 

# 【凪】
# display as 凪
# JP: 「ばってん――守れんかったと」
1476 = "「但是……咱沒有保護住她」" 

# monologue
# JP: 声が、震える。
2400 = "凪的聲音顫抖起來。" 

# monologue
# JP: それを抑えようとするかのように、\n凪は唇をぎゅっと噛む。
2488 = "她緊緊咬住嘴唇，想要抑制聲音的顫抖。" 

# 【凪】
# display as 凪
# JP: 「にーさんが本当に悪党だったら、守るどころか……\nあれで、助けるチャンスば――失くしてたばい」
1701 = "「如果大哥哥真的是壞人，咱別說保護她了……反而是失去了幫助她的機會」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……それは、そうだな」
1130 = "「……是啊」" 

# 【凪】
# display as 凪
# JP: 「誰かをまっこと守るためには、失敗は許されんけん。\nうちは――自分の未熟さが、悔しか」
1951 = "「要保護他人，是不允許失敗的。咱對自己的幼稚……感到很不甘心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「失敗は許されん……\nそうしたことは、確かにあるよな」
1433 = "「不允許失敗……有些事情，確實是這樣的」" 

# monologue
# JP: 僕も同じだ。\n失敗すれば、僕の生きている価値がなくなる。
2554 = "我也一樣。如果失敗，我的生存價值就會消失。" 

# monologue
# JP: 路子が僕に渡してくれた、命を無駄にしてしまう。\nそう考えて、ずっと、行動してきたゆえに――
2853 = "這會白白浪費路子給予我的這條性命。正因為我一直抱著這種想法在生活……" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、自らを鍛え上げようとしたわけか」
1795 = "「所以，你才想鍛鍊自己啊」" 

# monologue
# JP: 僕と同じであるのなら、\n凪の気持ちを推し量れる。
2498 = "如果我們想的一樣，那我就可以揣測出凪的想法。" 

# monologue
# JP: こくりと、凪が無言で頷く。\nその目がじわり、潤み始める。
2391 = "凪沉默著點點頭，眼中泛起了淚光。" 

# 【凪】
# display as 凪
# JP: 「頭ばすぐにカーってなるの、ウチの悪いクセやけん。\nどうしても……どうしても――直したかったけん」
1731 = "「容易上頭是咱的壞毛病。咱很想……很想改掉這個毛病」" 

# monologue
# JP: ゆえに、凪は一心不乱に木刀をふるった。\n恐らく仏師が、木から仏を彫り出すのと同じように。
2593 = "所以凪才全神貫注地揮舞木刀，就像佛師用木頭雕刻佛像一樣。" 

# monologue
# JP: それが叶えば、斬り倒せたなら、\nかけている願が成就すると、ひたすら信じて。
2480 = "她深信自己如果能夠成功斬斷，就能實現自己的祈願。" 

# 【凪】
# display as 凪
# JP: 「ばってん。ほんとはヤツアタリやけん。\nあぎゃんことで、何が直せるわけもなかったと」
1493 = "「但是，咱其實只是亂發脾氣。做這種事情，根本什麼都改變不了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
1981 = "「這……」" 

# monologue
# JP: 違うと言いたい。\nけれども今は、言うべきではない。
2567 = "我想否定她的說法。但這不是現在應該說的話。" 

# 【凪】
# display as 凪
# JP: 「直るどころか、事故ば起こして――じーちゃんにも、\nにーさんにも、みんなに、たくさん迷惑ばかけて――」
1555 = "「別說改變了，甚至還引起了事故。給爺爺和大哥哥，還有其他人添了很多麻煩」" 

# monologue
# JP: 蓑笠老人が凪と一緒にあの後どれだけ頭を下げたか\n……僕も見ていて、心が傷んだ。
2779 = "蓑笠爺爺和凪在那之後一起不停地賠禮道歉……目睹那一幕的我也十分心疼。" 

# monologue
# JP: 金銭的な賠償は、線路交換の実費だけであったが、\n交換作業へのボランティア参加までして下さった。
2884 = "雖說金錢方面只需要賠償更換線路的費用，不過她還自願參加了更換工作。" 

# 【凪】
# display as 凪
# JP: 「やけん、うち、ずっとにーさんにも謝りたくって。\nばってん、ちゃんとわからんうちは、謝りたくなくて」
1797 = "「所以，咱一直想向大哥哥說聲對不起。但是咱還沒有真正理解的時候，就沒有道歉的想法」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
# 1124 = "「……嗯」" 

# monologue
# JP: “ちゃんとわかる”必要があるのは、\nつけてしまった傷の重さだ。
2490 = "她需要理解的是自己造成了多麼嚴重的後果。" 

# monologue
# JP: それを計ることもできないうちに謝ろうとも、\n謝罪は恐らく、上辺をなぞるだけしか――っ！！
2492 = "如果不明白後果多嚴重，道歉也只是表面工夫而已……噢！" 

# monologue
# JP: （――ああ、そうなのか）
2921 = "（原來是這樣）" 

# monologue
# JP: 不意に、つながったような気がする。
2248 = "不經意間，我發現事情聯繫了起來。" 

# monologue
# JP: （向き合うことは、ちゃんとわかるということか。\nだからナビは、僕にそうしろとすすめてきたのか）
2947 = "（面對，就代表著理解。所以Ｎａｖｉ才勸誡我去面對他人啊）" 

# 【凪】
# display as 凪
# JP: 「ばってん、今なら。鉄道のことば、線路の大事さ。\nウチも少しは、勉強できた気がするけん」
1495 = "「但是，咱現在感覺漸漸理解了鐵路、線路的重要性」" 

# monologue
# JP: 凪が大きく頭を下げる。\n膝とおでこを、くっつける。
2394 = "凪深深鞠了一躬，額頭都快貼到了膝蓋上。" 

# 【凪】
# display as 凪
# JP: 「あのときは本当にごめんなさい！\nウチのこと、助けてくれてありがとう！！」
2012 = "「那時候真的非常抱歉！謝謝你幫了咱！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1635 = "「嗯」" 

# monologue
# JP: 『助けてくれてありがとう』。\nその一言から、凪の理解が伝わってくる。
2486 = "她的這句道謝，讓我從中感受到了她的心意。" 

# monologue
# JP: “ちゃんとわかる”そのために、鉄道を知るそのために、\nどれほど多くの時間と努力を、凪が注ぎ続けてきたのかが。
2570 = "我感受到她為了“理解”，為了了解鐵路，付出了多少時間和努力。" 

# 【凪】
# display as 凪
# JP: 「もし、あのときあのまま大事故につながっとったら、\nウチはきっと、自分を許せなくなっとったばい」
1715 = "「如果那個時候真的造成了重大事故，咱肯定無法原諒自己」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪の謝罪を、僕は喜んで受け入れる。\nその過去の過ちを、受け入れ、許そう」
1786 = "「我很樂意接受你的道歉。願意接納、原諒你過去犯下的錯誤」" 

# 【凪】
# display as 凪
# JP: 「あ――」
# 1626 = "「啊……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そして同時に僕からも、\n凪に、ありがとうと伝えさせて欲しい」
1595 = "「同時，我也想表達對你的謝意」" 

# 【凪】
# display as 凪
# JP: 「ほえっ！？」
# 1621 = "「哎？！」" 

# monologue
# JP: 素っ頓狂な声と愛嬌のあるマヌケヅラ。
2405 = "凪突然驚叫出聲，露出呆呆的可愛表情。" 

# monologue
# JP: 謝罪を終えて、受け入れられて、\n凪は重荷を捨て去ったのだと、一瞬だけで伝わってくる。
2585 = "我瞬間感受到她卸下了重擔，因為她終於道出了歉意，並得到我的原諒。" 

# monologue
# JP: （ああ――凪はなんと、\nなんと伸びやかで強いのだ）
2919 = "（凪真是積極又堅強）" 

# 【凪】
# display as 凪
# JP: 「なんでにーさんが、凪さまにありがとばい？\n凪さま、にーさんに何かしたと？？」
1872 = "「為什麼要謝本小姐？本小姐幫過你的忙嗎？？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。大いに何かをしてくれた。\n大切なものを、大切なことを――教えてもらった」
1892 = "「當然，你幫了我一個大忙。教會了我一件非常非常重要的事情」" 

# 【凪】
# display as 凪
# JP: 「そいば、何ばい？」
1821 = "「是什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「向き合うこと。ちゃんとわかること。\n――本当に向き合うとは、どういうことであるかをだ」
2037 = "「面對，還有理解。你教會了我，什麼是真正的坦誠相待」" 

# monologue
# JP: 一番最初に問われたときには、考えた。
2476 = "她向我提出第一個問題的時候，我就想到了。" 

# monologue
# JP: 凪とハチロク。その二人と意識して向き合わなかったのは、\n『普段から素直に向き合えている』ゆえであろうと。
2578 = "我沒有刻意去面對凪和八六，是因為我平時就在真誠地面對她們。" 

# 【凪】
# display as 凪
# JP: 「本当に向き合うことって、どぎゃんことばい？」
1463 = "「什麼是真正的坦誠相待？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今、凪が見せてくれたとおりだ。\n自分を隠さず、その傷とさえ、向き合うことだ」
1747 = "「就像你現在展現出來的一樣。不偽裝自己，去面對自己、甚至面對內心的傷痛」" 

# monologue
# JP: けれど、違った。\n僕は単純に逃げていたのだ。
2253 = "不，不是這樣的，我只是在逃避而已。" 

# monologue
# JP: 相手と向き合うそのためには、相手一人とだけでなく、\n自分自身とも、向き合わなければならないゆえに。
2458 = "坦誠相待需要面對的不只是對方，還必須面對自己。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それを出来ずにいたことが、\nそこから逃げ続けてきたことが、僕の傷が癒えない――」
1664 = "「因為我沒有做到面對自己，一直選擇逃避，我的傷痕才遲遲無法癒合」" 

# monologue
# JP: いや、違う。\nその解釈では、自分と真に向き合えていない。
2244 = "不對，這樣解釋也不是真正的面對自我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまりはそれが、僕の、自らの傷を癒やさない――\n僕が自ら、僕を殺していた理由だったのだ」
1453 = "「也就是說，這是我沒有治癒自己的傷痕——選擇扼殺自己的原因」" 

# monologue
# JP: “生きながらにして死んでいた”\nそうと決めつけることにより、僕は、過去の自分を殺した。
2575 = "我曾經逼迫自己活得像個行屍走肉，以此來扼殺過去的自己。" 

# monologue
# JP: 過去を殺して、事故の記憶を、痛みを恐れを封印し、\nそうすることで、新しい自分を生きようとした。
2606 = "抹消過去，封印事故的記憶、痛苦與恐懼，以此讓嶄新的自己苟延殘喘下去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ずっと謝れなかったから。逃げずに向き合い続けたから。\nあのアクシデントがあったから。凪は、今の凪になれた」
1662 = "「因為一直沒能道歉。因為一直沒有逃避，選擇了面對。因為有那場事故。你才能成為現在的你」" 

# 【凪】
# display as 凪
# JP: 「そぎゃんこつ、あたりまえのことばい」
2015 = "「那當然嘞」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。けれど、そのあたりまえを、\n僕は否定しようとしてしまっていたんだ」
1826 = "「是啊。可我以前卻想要否定這麼簡單的道理」" 

# monologue
# JP: ――とても、とても歪な形で。
1025 = "——以一種極其扭曲的形式。" 

# monologue
# JP: 誰より大事な妹の夢を見たときにさえ、\nそれを忘れてしまうほど、過去の自分を抑える形で。
2460 = "壓抑著過去的自己，甚至遺忘自己在夢中見到的摯愛的妹妹。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――それではいけなかったんだ。\n右田双鉄と[そごう,1]十川双鉄を、別人にしてはいけなかったんだ」
1985 = "「這是錯誤的。我不應該把右田雙鐵和十川雙鐵區分開來」" 

# monologue
# JP: 過去の僕がいて、今の僕がいる。
2669 = "正因為有過去的我，才會有現在的我。" 

# monologue
# JP: 全ては連続しているし、傷も痛みも罪さえも――\nどれが欠けても、僕は、僕になれなかった。
2223 = "一切都聯繫在一起，無論是傷痕、疼痛，還是罪惡。少了任何一樣，我都無法成為現在的自己。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そう思えるのは。そう思えるようになったのは。\n僕が僕を、今の僕自身を評価できるようになれたからだ」
1128 = "「……我現在會這麼想，是因為變得能夠正確評價自我了」" 

# monologue
# JP: みんなのおかげと、素直に思う。\n心のそこから、ただ感謝だけが沸き起こってくる。
2855 = "這都是多虧了大家。感激之情從我心底油然而生。" 

# 【双鉄】
# display as 雙鐵
# JP: 「みんなが僕を、あたためつづけてくれたから。\n僕は自分を、認められるようになったのだ」
1838 = "「是因為大家一直溫暖著我。我才變得能夠接受自己」" 

# 【凪】
# display as 凪
# JP: 「よーわからんけど、にーさんはにーさんばい？\n変わっても変わらんでも、認めても認められんでも」
2032 = "「雖然聽不太懂，但是大哥哥不就是大哥哥唄？不管你變沒變，接不接受，結果都一樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1827 = "「是啊」" 

# monologue
# JP: 僕は、僕。\n傷も痛みも罪悪感も、全てが僕で、双鉄だ。
2563 = "我就是我，傷痛與罪惡感也都是我的一部分。" 

# monologue
# JP: 押しつぶしていたそれらと向き合い、許してはじめて。\n僕はきっと、僕になれる――大人の男に、なれるのだろう。
2535 = "從敢於面對、接納恐懼的那一刻起，我一定能真正成為自己，邁向成熟。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんな当然のことも見失うほど――\n僕は、事故を恐れてしまっていたんだ」
1782 = "「我就是如此害怕發生事故，怕到忽視了這麼簡單的道理」" 

# monologue
# JP: だから、凪と向き合えなかった。\nそうして、だから、ハチロクとも――
2599 = "所以我才沒能和凪，沒能跟八六坦誠相待。" 

# 【凪】
# display as 凪
# JP: 「いまはもう、怖くなかと？」
1515 = "「你現在不怕咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、怖いさ。とても怖い。だが、それが、嬉しい。\n怖いと素直に、認められることが」
1441 = "「不，當然怕，非常怕。但是我很開心，因為我能夠承認自己的恐懼了」" 

# 【凪】
# display as 凪
# JP: 「怖かとが嬉しいだなんて、ヘンなにーさんばい」
1567 = "「又害怕又高興，大哥哥真是奇怪咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。ヘンだな」
1832 = "「是啊，確實很奇怪」" 

# monologue
# JP: 押さえ続けた自分の歪みは、きっとすぐには治らんだろう。\nあるいは一生、歪んだままでいるかもしれん。
2561 = "我壓抑至今的扭曲之處一定很快就會治癒。又或許，我會將扭曲背負一生。" 

# monologue
# JP: けれども、そこから目を逸らすまい。\n歪みの形を正しく知って、上手につきあっていけばいい。
2292 = "但我不會再逃避。只要了解自己的缺陷，正確對待就行了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、ヘンな僕が僕なのだ。\nそのことに、凪が気づかせてくれたのだ」
1485 = "「但是這種奇怪，也是我的一部分。是你讓我明白了這一點」" 

# 【凪】
# display as 凪
# JP: 「凪さま、なんにもしてなかとよー」
1846 = "「本小姐也沒特地做什麼呀」" 

# monologue
# JP: 凪が、笑う。\nとても穏やかに、あたたかに。
2411 = "凪露出了平靜而溫暖的笑容。" 

# 【凪】
# display as 凪
# JP: 「ただきっと、にーさんが気付きたがっていたとよ。\nそのタイミングに、凪さまたまたまいただけばい」
1678 = "「大哥哥肯定早就察覺到了。本小姐只是湊巧撞上了而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな」
1457 = "「也許是吧」" 

# monologue
# JP: いいや、実際そうなのだろう。\n歪ながらに、みんなと向き合い続けたことが――
2255 = "不，的確如她所說吧。我懷抱著心中的扭曲，一直與大家坦誠相待——" 

# monologue
# JP: そのあたたかさに包まれ続けてきたことが、\n凍えきってた僕自身の種を、芽吹かせたのだ。
2629 = "是大家給我的溫暖，讓我心中凍結的種子再次生根發芽。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だとしても、僕は、凪にお礼をいいたい」
1753 = "「就算是這樣，我還是想向你道謝」" 

# 【凪】
# display as 凪
# JP: 「なら！　にーさんっ！」
2004 = "「那就這樣吧！大哥哥！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1651 = "「嗯？！」" 

# monologue
# JP: 体が、勝手に引いてしまう。
2835 = "身體不由自主地躲開了。" 

# monologue
# JP: 凪はいま、指一本さえ動かさず、\nけれども僕を、切りつけてきた。
2407 = "凪絲毫未動，卻從無形中對我發起了攻擊。" 

# 【凪】
# display as 凪
# JP: 「さすがにーさん、ナマってなかとねー」
1675 = "「大哥哥厲害，反應還是那麼快」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、今のは誰でも逃げるだろう」
1439 = "「不，剛才這招是個人都能躲開吧」" 

# monologue
# JP: その反論に答えずに、\n凪はニッカリ、笑ってみせる。
2392 = "凪沒有反駁我，只是咧嘴露出了笑容。" 

# 【凪】
# display as 凪
# JP: 「凪さま、にーさんと立会いたかと！　今のにーさんの剣、\nどぎゃんか凪さま、見てみたかとばい！」
1848 = "「本小姐想跟大哥哥比試一場！本小姐想見識見識，大哥哥現在的劍法究竟如何！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今の僕など、凪の足元にも及ばんぞ」
1470 = "「以我現在的水準，根本比不上你」" 

# monologue
# JP: 汰斗さんに言われて始めたことゆえ、\n今も素振りは欠かしていないが――それだけだ。
2457 = "因為是聽汰斗老爺的話才開始練的，所以我現在也沒有落下空揮練習，但也僅此而已了。" 

# monologue
# JP: 剣道部を作り、日々、中村さんと切磋琢磨をしあっている、今の凪には、恐らく瞬殺されるだろう。
2383 = "凪創建了劍道社，每天和中村小姐互相切磋。以她現在的實力，恐怕都能秒殺我了吧。" 

# 【凪】
# display as 凪
# JP: 「そいでよかとよ」
1994 = "「那也沒關係咧」" 

# monologue
# JP: 優しい、声だ。\n凪らしくもない――けれども凪の、大人の声だ。
2685 = "溫柔而成熟的聲音絲毫不像她的風格，但的確來自於她。" 

# 【凪】
# display as 凪
# JP: 「だってにーさん、ずっとしょってた重かとを、\nきっと、もーすぐおろすとでしょお？」
1663 = "「因為大哥哥馬上就能放下心裡的包袱了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
# 1626 = "「啊……」" 

# monologue
# JP: そんな話をした記憶など、まるで無い。
2551 = "我不記得自己說過這些事。" 

# monologue
# JP: むしろお互い、傷があるゆえ、\n事故に関するような話は、自然と避け続けてきた筈だ。
2239 = "不如說因為我們各自都懷抱著創傷，所以才自然而然一直避開有關事故的話題。" 

# monologue
# JP: （――ああ。\n凪は、本当に凪なのだな）
2902 = "（……嗯，她果然還是老樣子）" 

# monologue
# JP: それでも凪には、見えていたのだ。
2425 = "即便如此，凪還是直視著我。" 

# monologue
# JP: 僕自身、まるで自覚をせぬままに、\n重荷をずっと、好んで背負い続けていたと。
2714 = "直視著我毫無自覺、主動背負著包袱的模樣。" 

# 【凪】
# display as 凪
# JP: 「そいばおろしたにーさんが、どぎゃん剣ばふるうか――\n凪さま、ちょこと興味あるけん！！！」
1808 = "「放下包袱後的大哥哥，究竟會揮出怎樣的劍？本小姐很有興趣！！！」" 
