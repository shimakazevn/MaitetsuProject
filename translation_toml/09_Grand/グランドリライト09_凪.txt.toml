# lines: 507 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2929 = "「Ừ. Lúc đó, anh sẽ chủ động mời em.」"

# 【路子】
# display as 路子
# JP: 「そーちゃん！　そーちゃん！！」
1745 = "「Tuyệt quá! Em cảm ơn anh! Em sẽ cố gắng!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！？」
1651 = "「A, này.」"

# monologue
# JP: 路子の声に起こされる。\nさっき布団に入ったばかりだというのに――ああ、違う。
2830 = "Với bước chân nhẹ tênh, em ấy vui vẻ chạy đi. Đến cả bóng lưng đó, trông cũng như đang mỉm cười."

# monologue
# JP: それほど早くに、僕は夢へと落ち込んだ。\nあるいはきっと――路子が呼んでくれたのだ。
2718 = "「Từ đây là em tự về được rồi! Chúc ngủ ngon! Anh Soutetsu!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「どうした路子。そんなにあわてて」
1774 = "――A, đúng rồi. Fukami đã trở thành người lớn mất rồi."

# 【路子】
# display as 路子
# JP: 「もうすぐなんでしょ！　みちね、わかるの！\nパパとママ、みちの近くに来てくれてるって！」
2045 = "Hơn nữa có lẽ, còn sớm hơn tôi rất nhiều."

# 【双鉄】
# display as 雙鐵
# JP: 「――そうなのか」
1133 = "「Chúc ngủ ngon. Fukami. Chúc em có những giấc mơ đẹp.」"

# monologue
# JP: 聞かされて、さほど自分が驚かないでいることに驚く。\nああ、ならば――
2721 = "（Cọc cạch, cọc cạch, xình xịch, xình xịch——）"

# monologue
# JP: 僕もこころのどこかでは、予期を\n……あるいは覚悟を、していたのだろう。
2558 = "「Anh hai! Anh hai!!」"

# 【路子】
# display as 路子
# JP: 「だからね？　きっともうすぐ、\nそーちゃんのれっ車、走るんだなって」
1800 = "「Ừm!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「もうすぐ……か。\nすぐ、というほどに早くは走り始められんが」
2044 = "Bị đánh thức bởi giọng nói của Michiko. Mình vừa mới chui vào chăn thôi mà――a, không phải."

# 【路子】
# display as 路子
# JP: 「そーなの？」
1835 = "Mình đã chìm vào giấc ngủ nhanh đến vậy sao. Hoặc cũng có thể là do――Michiko đã gọi mình."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、大きく厳しかった山を越えたことは確かだ。\n災いが、転じて福となったゆえ」
1483 = "「Sao thế Michiko. Sao lại hốt hoảng vậy.」"

# 【路子】
# display as 路子
# JP: 「わざわい？」
1116 = "「Sắp rồi đúng không! Michi, biết mà! Bố và mẹ, đang đến gần Michi rồi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「とても大きな困りごとのことだな。\n線路を繋げるためのお金が、足りなくなりかけたのだ」
1749 = "「――Vậy sao.」"

# 【路子】
# display as 路子
# JP: 「えええっ！？」
1621 = "Nghe xong, tôi ngạc nhiên khi thấy bản thân mình không mấy bất ngờ. A, nếu vậy thì――"

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。\nもう、乗り越えてしまえたことだから」
1812 = "Ở một góc nào đó trong thâm tâm, có lẽ tôi cũng đã dự liệu được ......hoặc là đã chuẩn bị sẵn tinh thần rồi."

# monologue
# JP: 幼いままの路子にも、どれほど危険かが伝わる事態。\nそれゆえ急ぎ言葉を重ね、路子の不安をすぐに解く。
2862 = "「Nên là nhé? Chắc chắn sắp rồi, đoàn tàu của Sou-chan, sắp chạy rồi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみが、ポーレットが、皆が、それぞれ。\nできる全てを尽くしてくれたゆえ、越えられたのだ」
1432 = "「Sắp rồi......sao. Cũng không thể bắt đầu chạy nhanh đến mức gọi là sắp được đâu, nhưng mà.」"

# monologue
# JP: ――本当に、災い転じて福となった。\nマイアさんの紹介してくれた[フランク銀行,1]佛銀の担当者は、優秀だった。
1030 = "「Vậy sao?」"

# monologue
# JP: 彼の作成した国際日ノ本鉄路債。通称、ヒノモトボンドは、\nフランクを皮切りに、実に7カ国で販売されるに至った。
2282 = "「Tuy nhiên, đúng là chúng ta đã vượt qua được một ngọn núi lớn và hiểm trở. Bởi vì trong cái rủi, lại có cái may.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お金を集めるための努力がそのまま、宣伝になり、\n人気を呼んだ。その結果、御一夜を含む九洲各地へ」
1780 = "「Cái rủi?」"

# 【路子】
# display as 路子
# JP: 「それでなんだ！　外国のおきゃくさんふえてるの！\n8620が今ひっぱってる、緑色のれっ車とかすごいよね」
1988 = "「Là một rắc rối rất lớn đó. Số tiền để kết nối đường ray, suýt chút nữa là không đủ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「クマ一号試験客車と、クマ二号試験客車か」
1516 = "「Ể!?」"

# 【路子】
# display as 路子
# JP: 「クマっていうの？　あのれっ車。かわいい！」
1999 = "「Không sao đâu. Chuyện đó, chúng ta đã vượt qua được rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに可愛いな。廃棄された\\x%l気動車;#00ffc040;気動車%l;#;を改造した、\n急造の試験客車とはまるで思えない」
1909 = "Tình hình nguy hiểm đến mức ngay cả một đứa trẻ như Michiko cũng có thể cảm nhận được. Do đó tôi vội vàng nói thêm, để nhanh chóng xua tan sự bất an của Michiko."

# monologue
# JP: ゆえに、特に珍しいもの好きの外国人に好まれている。
2598 = "「Fukami, Paulette, và tất cả mọi người. Mỗi người đều đã làm tất cả những gì có thể, nên mới vượt qua được.」"

# monologue
# JP: 人を乗せての試験走行のための抽選倍率が、\n100に近づいてしまうことさえあるほどに。
2836 = "――Đúng là trong cái rủi có cái may. Người phụ trách của ngân hàng Pháp do bác Maia giới thiệu rất xuất sắc."

# 【路子】
# display as 路子
# JP: 「しけんきゃくしゃって？」
1870 = "Trái phiếu Đường sắt Quốc tế Hinomoto do anh ta tạo ra. Thường gọi là Trái phiếu Hinomoto, bắt đầu từ Pháp, nay đã được bán ở tận 7 quốc gia."

# 【双鉄】
# display as 雙鐵
# JP: 「文字通り、様々な試験を行うための\\x%l客車;#00ffc040;客車%l;#;だ。\n僕らの列車。ナインスターズを走らせるための」
1724 = "「Những nỗ lực huy động vốn đó đã trực tiếp trở thành một chiến dịch quảng bá, và thu hút được sự chú ý. Kết quả là, khắp các vùng của Kyushu, bao gồm cả Ohimitera.」"

# monologue
# JP: ナインスターズは、基本的には伝統工芸や、\n枯れた技術の組み合わせにより、設計され運用される。
2269 = "「Ra là vậy! Khách nước ngoài đang tăng lên kìa! Đoàn tàu màu xanh lá cây mà 8620 đang kéo bây giờ, tuyệt quá nhỉ.」"

# monologue
# JP: が、今まで誰一人試していない、\n“枯れた技術の組み合わせ”も、いくらでもある。
2300 = "「Toa hành khách thử nghiệm Kuma số 1, và Toa hành khách thử nghiệm Kuma số 2 sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、ナインスターズの一部をシャワー室とし、\nそこには小さな風呂桶もつける計画があった」
1862 = "「Tên là Kuma (Gấu) sao? Đoàn tàu đó ấy. Dễ thương quá!」"

# 【路子】
# display as 路子
# JP: 「わ！　れっ車で旅をしながらおふろはいれるの！？」
1613 = "「Đúng là dễ thương thật. Hoàn toàn không giống một toa hành khách thử nghiệm được chế tạo vội vàng từ \\x%l気動車;#00ffc040;toa xe diesel tự hành%l;#; phế liệu chút nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「試験がうまく行き、かつ諸問題も解決できていればな。\nそのための実験をする\\x%l客車;#00ffc040;客車%l;#;が、試験客車だ」
1708 = "Do đó, nó đặc biệt được những người nước ngoài thích sự mới lạ ưa chuộng."

# monologue
# JP: 風呂桶を線路方向、\\x%l枕木;#00ffc040;枕木%l;#;方向、いずれに設置するべきか。\nどれほどの湯が零れてしまい、何リットルを消費するのか。
2802 = "Tỷ lệ chọi trong các buổi rút thăm để được lên tàu chạy thử, thậm chí có lúc còn lên tới gần 1/100."

# monologue
# JP: データがまるでないことならば、\n実車を走らせ、試していく他に手段は無い。
2618 = "「Toa hành khách thử nghiệm là gì vậy?」"

# 【路子】
# display as 路子
# JP: 「じゃ、クマさんたち、おふろついてるの？」
2017 = "「Đúng như tên gọi, là \\x%l客車;#00ffc040;toa hành khách%l;#; dùng để tiến hành nhiều thử nghiệm khác nhau. Để cho đoàn tàu của chúng ta. Nine Stars, được lăn bánh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「一時期にはついていた。しかし、もうない。\n残念ながら、今後つけられることもないだろう」
1843 = "Nine Stars về cơ bản được thiết kế và vận hành, dựa trên sự kết hợp giữa thủ công mỹ nghệ truyền thống và những công nghệ đã trưởng thành."

# 【路子】
# display as 路子
# JP: 「えー」
1435 = "Nhưng, cũng có vô số những “sự kết hợp công nghệ đã trưởng thành” mà cho đến nay chưa từng có ai thử nghiệm."

# 【双鉄】
# display as 雙鐵
# JP: 「試験の結果、今予定されているナインスターズ\\x%l編成;#00ffc040;編成%l;#;では、\n風呂桶の設置は極めて厳しいとわかってしまったからな」
1770 = "「Ví dụ như, có một kế hoạch biến một phần của Nine Stars thành phòng tắm vòi sen, và lắp đặt một bồn tắm nhỏ ở đó.」"

# 【路子】
# display as 路子
# JP: 「そおなんだー」
1989 = "「Oa! Vừa đi du lịch bằng tàu vừa được tắm bồn sao!?」"

# monologue
# JP: 9室×6人で、最大54人の乗客。\nその全員に同じ湯を使いまわさせるわけにもいかない。
2267 = "「Nếu cuộc thử nghiệm diễn ra suôn sẻ, và giải quyết được các vấn đề liên quan. \\x%l客車;#00ffc040;Toa hành khách%l;#; dùng để thực hiện các thí nghiệm đó, chính là toa hành khách thử nghiệm.」"

# monologue
# JP: 家族風呂扱いとし、9回の入浴で済ませるのなら、\n複数人が一度につかれる、より大型の風呂桶が必要となる。
2505 = "Nên đặt bồn tắm theo hướng đường ray, hay hướng \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#;. Sẽ có bao nhiêu nước nóng bị tràn ra ngoài, và tiêu thụ bao nhiêu lít."

# 【双鉄】
# display as 雙鐵
# JP: 「つかれるタイプの風呂において、\n日ノ本人は恐るべき量の水を消費する」
1667 = "Nếu hoàn toàn không có dữ liệu nào, thì không còn cách nào khác ngoài việc cho xe chạy thực tế để thử nghiệm."

# monologue
# JP: 風呂桶の湯を完全入替えとする場合、\n一走行、一人の入浴につき、平均300リットル弱の消費。
2306 = "「Vậy, các Kuma, có bồn tắm không?」"

# monologue
# JP: これが最低でも9回。一日につき、3t近くの水の追加と、\nそれをおさめるためのタンクが必用となってしまう。
2765 = "「Đã từng có một thời gian. Nhưng, bây giờ thì không còn nữa. Đáng tiếc là, sau này có lẽ cũng sẽ không được lắp đặt nữa đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「"蒸機の湯"として、ボイラ水や水タンク内の水をという\n案も出たが、全区間を蒸機牽引というわけでもない」
1455 = "「Ể~」"

# monologue
# JP: それに、水タンクにいれる水には、井戸水や湧水の利用も\n珍しくない。クレームリスクを、そこで抱えたくもない。
2763 = "「Vì kết quả thử nghiệm cho thấy, với \\x%l編成;#00ffc040;đoàn tàu%l;#; Nine Stars dự kiến hiện tại, việc lắp đặt bồn tắm là cực kỳ khó khăn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、様々に検討した結果、車内はシャワーだけとした。\nその代わり、各地方必ず、温泉駅での入浴停車を設けた」
1792 = "「Ra là vậy~」"

# 【路子】
# display as 路子
# JP: 「にゅうよくていしゃ！　おもしろそー！！」
1523 = "9 phòng x 6 người, tối đa 54 hành khách. Không thể bắt tất cả họ dùng chung một bồn nước được."

# 【双鉄】
# display as 雙鐵
# JP: 「実質、食事・観光の時間も含めてのドカ停だがな。凪の\n『お風呂停車すればよかと！』の声が、決め手となった」
1535 = "Nếu coi như bồn tắm gia đình, và chỉ cần 9 lượt tắm là xong, thì sẽ cần một bồn tắm lớn hơn để nhiều người có thể ngâm mình cùng lúc."

# 【路子】
# display as 路子
# JP: 「おもしろーい！」
1694 = "「Đối với loại bồn tắm ngâm mình, người Hinomoto tiêu thụ một lượng nước đáng sợ.」"

# monologue
# JP: 言って笑って、けれどもすぐに、\n路子は少し不満げな顔に変わってしまう。
2831 = "Trong trường hợp thay toàn bộ nước trong bồn, mỗi chuyến đi, một người tắm sẽ tiêu thụ trung bình gần 300 lít."

# 【路子】
# display as 路子
# JP: 「だけど、れっ車のおふろ。\nせっかくしけんしたのに、もったいないねぇ」
1496 = "Ít nhất cũng phải 9 lần. Tức là mỗi ngày cần bổ sung gần 3 tấn nước, và bắt buộc phải có một bồn chứa để chứa số nước đó."

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、そうでもない。クマ一・クマ二は、\n本当に良く、試験に耐えてくれたからな」
1437 = "「Cũng có đề xuất sử dụng nước lò hơi hay nước trong bồn chứa làm \"Nước tắm đầu máy hơi nước\", nhưng không phải đoạn đường nào cũng do đầu máy hơi nước kéo.」"

# monologue
# JP: 安全基準を満たしながらの改造につぐ改造は、\n\\x%l台枠;#00ffc040;台枠%l;\\x%l台車;#;#00ffc040;台車%l;#;車体全てに、回復不能な疲労をためた。
2329 = "Hơn nữa, việc sử dụng nước giếng hay nước suối để bơm vào bồn chứa cũng không phải là hiếm. Tôi không muốn phải gánh chịu rủi ro bị phàn nàn vì chuyện đó."

# monologue
# JP: その代償を払ってまでも得たデータ群は、\n必ず御一夜――いや、日ノ本の鉄道全ての資産となる。
2288 = "「Vì vậy, sau khi xem xét nhiều phương án, chúng ta quyết định chỉ bố trí vòi hoa sen trên tàu. Đổi lại, ở mỗi địa phương, chắc chắn sẽ có điểm dừng đỗ tại ga suối nước nóng để hành khách tắm rửa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いつか、未来に。必ず風呂桶を乗せた列車が走る。\n僕らの試験を、決して無駄になど終わらせはしないさ」
1920 = "「Dừng đỗ để tắm rửa! Nghe thú vị quá!!」"

# 【路子】
# display as 路子
# JP: 「そーなんだ！」
1991 = "「Thực chất, đó là \\x%lドカ停;#00ffc040;đỗ tàu lâu%l;#; bao gồm cả thời gian ăn uống và tham quan. Câu nói của Nagi 『Chỉ cần dừng tàu để tắm là được mà!』 đã trở thành yếu tố quyết định.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それに、\nクマ一・クマ二の試験終了後の職場も決まっている」
1941 = "「Thú vị quá!」"

# 【路子】
# display as 路子
# JP: 「そーなの？」
# 1835 = "「是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「車籍を外れ、[あさぎり,1]麻霧駅に留置。レンタルスペースとして\n地域の皆様や、僕らの役に立ち続けることになる」
1737 = "Vừa nói vừa cười, nhưng ngay sau đó, khuôn mặt Michiko lại chuyển sang vẻ hơi bất mãn."

# 【路子】
# display as 路子
# JP: 「みんながあつまる場所になるの？」
1841 = "「Nhưng mà, bồn tắm trên tàu. Cất công thử nghiệm rồi mà, tiếc quá nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうしていきたい。ナインスターズの基礎を固める――\n鉄道再建の、影の立役者となる車両なのだから」
1984 = "「Không, cũng không hẳn đâu. Kuma 1 và Kuma 2, thực sự đã chịu đựng các cuộc thử nghiệm rất tốt mà.」"

# 【路子】
# display as 路子
# JP: 「そっか！　それならきっとクマさんたちもうれしいね」
1987 = "Việc liên tục cải tạo để đáp ứng tiêu chuẩn an toàn, đã tích tụ những hao mòn không thể phục hồi lên toàn bộ \\x%l台枠;#00ffc040;khung gầm%l;\\x%l台車;#;#00ffc040;giá chuyển hướng%l;#; và thân xe."

# 【双鉄】
# display as 雙鐵
# JP: 「そうであるなら、僕らにとっても嬉しいことだな」
1713 = "Tập hợp dữ liệu thu được dù phải trả cái giá đó, chắc chắn sẽ trở thành tài sản của Ohimitera――không, của toàn bộ ngành đường sắt Hinomoto."

# 【路子】
# display as 路子
# JP: 「ね！　そーちゃん」
1943 = "「Một ngày nào đó, trong tương lai. Chắc chắn sẽ có một đoàn tàu chở theo bồn tắm lăn bánh. Cuộc thử nghiệm của chúng ta, tuyệt đối sẽ không kết thúc trong vô ích đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1630 = "「Vậy sao!」"

# monologue
# JP: 僕をみあげる路子の瞳に、\n何故か瞬間、物凄い郷愁を感じてしまう。
2825 = "「Hơn nữa, nơi làm việc của Kuma 1 và Kuma 2 sau khi kết thúc thử nghiệm cũng đã được quyết định rồi.」"

# monologue
# JP: キラキラ輝く、こどもらしい――\nああ、そうだ。これが路子の……僕の妹のまなざしだ。
2481 = "「Chúng sẽ bị rút khỏi danh sách đăng ký xe, và được lưu giữ tại ga Asagiri. Dưới hình thức không gian cho thuê, chúng sẽ tiếp tục giúp ích cho mọi người trong khu vực và cả chúng ta nữa.」"

# 【路子】
# display as 路子
# JP: 「おふろをつんであるれっ車。\nすぐにはむりでも、みらいに、みち、のれるかなぁ」
1755 = "「Sẽ trở thành nơi mọi người tụ tập sao?」"

# monologue
# JP: 未来――ああ。\nそうだ、路子にも必ず未来が待ってる。
2643 = "「Anh muốn như vậy. Bởi vì chúng là những toa xe đã củng cố nền tảng cho Nine Stars―― là những người hùng thầm lặng trong công cuộc tái thiết đường sắt mà.」"

# monologue
# JP: 父さんと母さんが迎えにきたなら。\nそこから再び――新しい路子の時間は、動き出すのだ。
2620 = "「Ra vậy! Nếu thế thì chắc chắn các Kuma cũng sẽ vui lắm nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「乗れる」
1423 = "「Nếu được như vậy, thì đối với chúng ta cũng là một điều đáng mừng.」"

# monologue
# JP: 言葉が、勝手にこぼれ出ていく。\n路子の前では決して流せぬ、涙の代わりであるかのように。
2800 = "「Này! Sou-chan.」"

# 【双鉄】
# display as 雙鐵
# JP: 「乗れるとも。路子が望む、どんな列車にだって、必ず。\nそうするために――僕は、ずうっと頑張っているんだ」
1422 = "「!」"

# 【路子】
# display as 路子
# JP: 「ほんと！？　ならね、そーちゃん――\nあのね？　お耳かして」
1902 = "Nhìn vào đôi mắt Michiko đang ngước lên nhìn tôi, không hiểu sao trong khoảnh khắc đó, tôi cảm thấy một nỗi nhớ nhà da diết."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1650 = "Lấp lánh rạng ngời, mang đậm nét trẻ thơ―― A, đúng rồi. Đây chính là ánh mắt của Michiko......của em gái tôi."

# monologue
# JP: ひそひそと、路子が僕に聞かせてくれる。\nあどけない、とても子供らしい、列車の夢を。
2828 = "「Đoàn tàu có chở theo bồn tắm. Dù bây giờ chưa được, nhưng trong tương lai, Michi, có được lên không nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1125 = "Tương lai――A. Đúng rồi, chắc chắn cũng có một tương lai đang chờ đợi Michiko."

# monologue
# JP: 少年時代の僕がきっと夢見て、捨ててしまっていた夢を、\n僕のふたごの妹が、そうっと差し出し、返してくれる。
2525 = "Nếu bố và mẹ đến đón. Thì từ lúc đó――thời gian mới của Michiko, sẽ lại bắt đầu trôi."

# 【双鉄】
# display as 雙鐵
# JP: 「――楽しみにしていろ。路子。\n僕が必ず。走らせてやるし、乗せてやる」
1511 = "「Sẽ được lên mà.」"

# 【路子】
# display as 路子
# JP: 「うんっ！！」
1637 = "Lời nói, tự động thốt ra. Như thể thay cho những giọt nước mắt, tuyệt đối không được rơi trước mặt Michiko."

# monologue
# JP: そうだ、僕は、何を勘違いしてしまっていたんだ。\nナインスターズを走らせること、路子を送り届けること。
2520 = "「Chắc chắn sẽ được lên. Bất cứ đoàn tàu nào Michiko muốn, chắc chắn. Để làm được điều đó――anh, vẫn luôn cố gắng mà.」"

# monologue
# JP: そこは確かに終着駅だが――同時に、始発駅でもある。\n未来へ、列車を。もっと未来へ――
2854 = "「Thật sao!? Nếu vậy nhé, Sou-chan―― Này nhé? Đưa tai đây cho em.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
1626 = "「Ừm?」"

# monologue
# JP: 瞬きをして、いま僕は、目を開いているのだと――\n手を握ってはまた開き、現実感を確かめる。
2584 = "Michiko thì thầm vào tai tôi. Một giấc mơ về đoàn tàu ngây thơ, mang đậm nét trẻ con."

# monologue
# JP: つまりは、今のは……\n俗にいう、白昼夢というやつだろう。
2270 = "「――Ừ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、やっぱり――\n夢で、路子と会っていたんだ」
1787 = "Giấc mơ mà thời niên thiếu tôi chắc chắn đã từng mơ, và rồi vứt bỏ, nay được cô em gái sinh đôi của tôi, nhẹ nhàng đưa ra, và trả lại cho tôi."

# monologue
# JP: よすがであるなら、過去にも何度も感じてはいた。\nきっと路子だろうと思い、そうあって欲しいと願っていた。
2852 = "「――Hãy mong chờ nhé. Michiko. Anh chắc chắn. Sẽ cho nó lăn bánh, và cho em lên tàu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「路子と会って。話していたんだ」
1789 = "「Vâng!!」"

# monologue
# JP: 一眠りのあと、悩みが解けていることがあった。\nうたた寝をして起きたというのに、体が軽くなっていた。
2642 = "Đúng rồi, tôi đã hiểu lầm điều gì cơ chứ. Việc cho Nine Stars lăn bánh, việc đưa tiễn Michiko."

# monologue
# JP: そうしたときには、今と同じく。\nきっと路子が、僕を励ましてくれてたのだろう。
2225 = "Đó đúng là ga cuối――nhưng đồng thời, cũng là ga khởi hành. Đưa đoàn tàu, hướng tới tương lai. Hướng tới một tương lai xa hơn nữa――"

# 【双鉄】
# display as 雙鐵
# JP: 「父さんと母さんと、もうすぐ会える。か――」
1692 = "「A――」"

# monologue
# JP: 覚えている。はっきりと。\n路子と交わした言葉を、声を。
2590 = "Chớp mắt một cái, và nhận ra bây giờ mình đang mở mắt―― Tôi nắm chặt tay rồi lại mở ra, để xác nhận cảm giác thực tại."

# monologue
# JP: 路子がどれほどキラキラと、\n瞳を輝かせてくれたかを。
2286 = "Tóm lại, lúc nãy là...... Thứ mà người ta thường gọi là, giấc mơ giữa ban ngày."

# 【双鉄】
# display as 雙鐵
# JP: 「ならばまず、ナインスターズ一号列車を走らせて。\nその更に先まで、レールを伸ばしていかねばならんな」
2042 = "「Mình, quả nhiên―― đã gặp Michiko, trong giấc mơ.」"

# monologue
# JP: ごく単純な理屈が悩みを解いてくれる。
2221 = "Nếu đó là sự kết nối, thì trong quá khứ tôi cũng đã cảm nhận được vô số lần. Tôi đã nghĩ chắc chắn đó là Michiko, và cũng mong muốn điều đó là sự thật."

# monologue
# JP: ポーレットからの一任も、\n運転部長として既に受けている。
2564 = "「Mình đã gặp Michiko. Và nói chuyện với em ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「鈴木さん、しばらくお願いします」
2021 = "Đã có lúc sau một giấc ngủ, những muộn phiền được gỡ bỏ. Dù chỉ chợp mắt một lúc rồi tỉnh dậy, cơ thể lại trở nên nhẹ nhõm."

# monologue
# JP: 事務員の鈴木さんへとレールショップをひととき預け、\n未来を担う若者達の姿を探す。
2571 = "Những lúc như vậy, cũng giống hệt như bây giờ. Chắc chắn Michiko, đã luôn cổ vũ cho tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「……ああ、中村さんはここであったか」
1123 = "「Sắp được gặp lại bố và mẹ rồi. Sao――」"

# monologue
# JP: 8620をオイルで磨いてくれている。\n丹念に丹念に――ただひたすらに丹念に。
2478 = "Tôi vẫn nhớ. Rất rõ ràng. Những lời đã trao đổi với Michiko, và cả giọng nói ấy."

# monologue
# JP: 極めて単調な作業というのに、\n驚くほどに集中している。
2851 = "Rằng đôi mắt của Michiko, đã lấp lánh rạng rỡ đến nhường nào."

# monologue
# JP: （さすがは、凪のライバルか）
2937 = "「Nếu vậy thì trước tiên, phải cho đoàn tàu số 1 Nine Stars lăn bánh. Rồi phải kéo dài đường ray, vươn xa hơn nữa mới được.」"

# monologue
# JP: 学園生時代の凪を、ほとんど常に退け続けてきた、\n九洲最強、全国屈指の剣道少女――
2262 = "Một lý lẽ vô cùng đơn giản đã gỡ rối cho những muộn phiền của tôi."

# monologue
# JP: いや、立派な社会人となった今となっては、\n少女よばわりも失礼だろうが。
2251 = "Sự ủy thác từ Paulette, tôi cũng đã nhận lấy với tư cách là Trưởng phòng Vận hành."

# 【双鉄】
# display as 雙鐵
# JP: 「中村さん。少しいいかな」
1446 = "「Chị Suzuki, nhờ chị trông coi một lúc nhé.」"

# monologue
# JP: 声をかければ、整備の手が止まる。\nウェスをまとめ、零さぬように油を床の上に戻して。
2265 = "Tạm giao cửa hàng đường sắt cho nhân viên văn phòng Suzuki, tôi đi tìm bóng dáng của những người trẻ tuổi sẽ gánh vác tương lai."

# monologue
# JP: それから姿勢を整え直して、僕と向き合う。\n――小動物めいた容姿ゆえ、その落ち着きが際立ち目立つ。
2694 = "「......A, cô Nakamura ở đây sao.」"

# 【中村】
# display as 中村
# JP: 「右田\\x%l機関士;#00ffc040;機関士%l;#;。おはようございます」
1578 = "Cô ấy đang lau chùi 8620 bằng dầu. Cẩn thận, tỉ mỉ――chỉ một mực cẩn thận và tỉ mỉ."

# 【凪】
# display as 凪
# JP: 「おおっ、にーさん来たと？」
1618 = "Dù là một công việc cực kỳ đơn điệu, nhưng cô ấy lại tập trung đến mức đáng kinh ngạc."

# monologue
# JP: 凪は\\x%lピット;#00ffc040;ピット%l;#;に潜っていたのか。\n声とほとんど同時に姿が現れる。
2374 = "（Quả nhiên là đối thủ của Nagi nhỉ）"

# 【双鉄】
# display as 雙鐵
# JP: 「ふたりとも揃っているなら、話が早い。\nできれば、みくろにも」
1504 = "Cô gái Kendo mạnh nhất Kyushu, thuộc hàng top toàn quốc, người gần như luôn đánh bại Nagi thời còn đi học――"

# 【凪】
# display as 凪
# JP: 「みくろー！　みくろー！\nにーさんが呼んどるばい！！」
1927 = "Không, giờ cô ấy đã là một người đi làm chững chạc rồi, gọi là thiếu nữ thì cũng hơi thất lễ."

# 【みくろ】
# display as 美玖路
# JP: 「はぁい。いまいきまーす」
1696 = "「Cô Nakamura. Nói chuyện một chút được không.」"

# monologue
# JP: 研修庫の方から声がする。\n今日も今日とて、みくろはD51 1031を――
2663 = "Vừa cất tiếng gọi, tay đang bảo dưỡng liền dừng lại. Cô ấy gom giẻ lau lại, rồi cẩn thận đặt hộp dầu xuống sàn để không bị đổ."

# monologue
# JP: 湯富院で解体を待つのみの窮地から、奇跡の復元を遂げた\nデゴイチを、大事に整備していたのだろう。
2878 = "Sau đó cô ấy chỉnh lại tư thế, quay mặt về phía tôi. ――Vì ngoại hình giống hệt một con thú nhỏ, nên sự điềm tĩnh đó càng trở nên nổi bật."

# 【みくろ】
# display as 美玖路
# JP: 「みくろ、来ました。\n右田\\x%l機関士;#00ffc040;機関士%l;#;、ご用はなんですか？」
1921 = "「\\x%l機関士;#00ffc040;Lái tàu%l;#; Migita. Chào buổi sáng.」"

# 【凪】
# display as 凪
# JP: 「この三人を集めたんなら決まっとるばい！\nあの話ばい！！」
2019 = "「Oa, anh hai tới đó hả?」"

# 【中村】
# display as 中村
# JP: 「[やたけ,1]屋岳越えのことでしょうか？」
1963 = "「Vượt qua đỉnh Yatake phải không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「その通りだ」
1865 = "「Đúng vậy.」"

# monologue
# JP: 現在のクマ一・クマ二には、\\x%l死重;#00ffc040;死重%l;#;をたっぷり載せている。\nナインスターズ客車の設計重量と同じ重さになるように。
2703 = "Kuma 1 và Kuma 2 hiện tại đang được chở đầy \\x%l死重;#00ffc040;trọng lượng bản thân%l;#;. Để có cùng trọng lượng với trọng lượng thiết kế của toa hành khách Nine Stars."

# monologue
# JP: これにみかん鉄道、松裏九洲線、阿蘇山岳鉄道から\nそれぞれ貸与された\\x%l客車;#00ffc040;客車%l;#;、電源車、\\x%l貨車;#00ffc040;貨車%l;#;もつけ――
2349 = "Thêm vào đó là \\x%l客車;#00ffc040;toa hành khách%l;#;, toa phát điện và \\x%l貨車;#00ffc040;toa chở hàng%l;#; được mượn từ Đường sắt Mikan, Tuyến Matsuura Kyushu và Đường sắt Vùng núi Aso――"

# 【双鉄】
# display as 雙鐵
# JP: 「仮想ナインスターズによる屋岳越え。\nこの三名に、\\x%l補機;#00ffc040;補機%l;#;の運用を任せてみたい」
1857 = "「Vượt qua đỉnh Yatake bằng Nine Stars mô phỏng. Anh muốn giao việc vận hành \\x%l補機;#00ffc040;đầu máy phụ%l;#; cho ba người này.」"

# 【凪】
# display as 凪
# JP: 「わおわお！　やったばい！！\nやーっと凪様、チームリーダーになれるばい！！」
1615 = "「Oa oa! Tuyệt quá!! Cuối cùng thì Nagi vĩ đại cũng được làm trưởng nhóm rồi!!」"

# 【中村】
# display as 中村
# JP: 「嬉しいお知らせですが、急すぎて違和感を覚えます。\n一番強く反対していたのは、右田\\x%l機関士;#00ffc040;機関士%l;#;だったでしょう」
1911 = "「Tuy là một tin vui, nhưng đường đột quá làm tôi thấy hơi lạ. Người phản đối mạnh mẽ nhất chẳng phải là \\x%l機関士;#00ffc040;lái tàu%l;#; Migita sao.」"

# 【凪】
# display as 凪
# JP: 「わー！　[ちかげ,1]千景ちゃん！　余計なこと聞かんと！\nもしにーさんの気ば変わったら」
1616 = "「Oa! Chikage! Đừng có hỏi thừa thãi mà! Lỡ anh hai đổi ý thì sao.」"

# 【みくろ】
# display as 美玖路
# JP: 「でも、みくろもそこは気になります。\n理由があるなら、きちんと知って運行したいです」
1499 = "「Nhưng, Mikuro cũng tò mò chuyện đó. Nếu có lý do, thì em muốn biết rõ rồi mới vận hành ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1635 = "「Ừm.」"

# monologue
# JP: ――やはり、これはこれで良いチームだ。\n突破力、分析力、視野の広さ。
2471 = "――Quả nhiên, đây là một đội hình tốt. Khả năng đột phá, khả năng phân tích, và tầm nhìn bao quát."

# monologue
# JP: それぞれが他に無いものを、\n綺麗に補いあっている。
2514 = "Những điểm mà người này có người kia không, đều được bù trừ cho nhau một cách hoàn hảo."

# 【双鉄】
# display as 雙鐵
# JP: 「8620は、D51 1031を\\x%l補機;#00ffc040;補機%l;#;とする屋岳越えに、\n過去何度となく成功している」
2051 = "「8620 đã từng vô số lần vượt qua đỉnh Yatake thành công, với D51 1031 làm \\x%l補機;#00ffc040;đầu máy phụ%l;#;.」"

# monologue
# JP: 最初は短い\\x%l編成;#00ffc040;編成%l;#;で、\\x%l機関士;#00ffc040;機関士%l;#;宗方、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィ助士赤井という、ベテランチームの\\x%l補機;#00ffc040;補機%l;#;運用により。
2231 = "Ban đầu là với một \\x%l編成;#00ffc040;đoàn tàu%l;#; ngắn, được vận hành \\x%l補機;#00ffc040;đầu máy phụ%l;#; bởi đội ngũ kỳ cựu gồm \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, \\x%lレイルロオド;#00ffc040;Railord%l;#; Olivy và phụ lái Akai."

# monologue
# JP: そこから助士に、凪、日々姫、中村を混ぜ、\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;をニイロク、みくろに交代し――
2695 = "Từ đó, trộn thêm Nagi, Hibiki, Nakamura vào vị trí phụ lái, và thay \\x%lレイルロオド;#00ffc040;Railord%l;#; thành Niiroku, Mikuro――"

# 【双鉄】
# display as 雙鐵
# JP: 「様々な組み合わせを試験した。が、比較的経験に乏しい\n君たちのみによる\\x%l補機;#00ffc040;補機%l;#;運転は、一度も任せたことがない」
1590 = "「Chúng ta đã thử nghiệm nhiều tổ hợp khác nhau. Nhưng, anh chưa từng giao việc lái \\x%l補機;#00ffc040;đầu máy phụ%l;#; cho riêng những người còn ít kinh nghiệm như các em.」"

# monologue
# JP: 言えば、三人は深く頷く。
2236 = "Nghe vậy, cả ba người đều gật đầu sâu sắc."

# 【双鉄】
# display as 雙鐵
# JP: 「その理由が、わかるか？」
1505 = "「Các em có biết lý do là gì không?」"

# 【凪】
# display as 凪
# JP: 「ウチたちじゃまだ危なっかしいって、\nにーさんが思っとるからばい！」
1680 = "「Là do anh hai nghĩ, bọn em vẫn còn nguy hiểm chứ gì!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1635 = "「嗯」" 

# 【中村】
# display as 中村
# JP: 「万一のときの被害が深刻なものになりかねないから。\nそれも、大きな理由の一つだと思います」
1895 = "「Vì lỡ có chuyện gì xảy ra thì thiệt hại có thể rất nghiêm trọng. Tôi nghĩ đó cũng là một trong những lý do lớn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論、それも大きな理由だ」
1893 = "「Tất nhiên, đó cũng là một lý do lớn.」"

# monologue
# JP: D51形は8620形よりも遥かに重い。\nそして8620形ほどに優れた\\x%l粘着力;#00ffc040;粘着力%l;#;も有していない。
2953 = "Mẫu D51 nặng hơn mẫu 8620 rất nhiều. Và cũng không có \\x%l粘着力;#00ffc040;lực bám đường%l;#; xuất sắc như mẫu 8620."

# monologue
# JP: もし後補機のD51 1031が登坂中に\\x%l空転;#00ffc040;空転%l;#;、\\x%l滑走;#00ffc040;滑走%l;#;、逆走すれば、\n8620と\\x%l客車;#00ffc040;客車%l;#;達は、そのまま引きずられる可能性がある。
2495 = "Nếu đầu máy phụ phía sau là D51 1031 bị \\x%l空転;#00ffc040;quay trơn%l;#;, \\x%l滑走;#00ffc040;trượt bánh%l;#;, hoặc chạy ngược khi đang leo dốc, thì 8620 và các \\x%l客車;#00ffc040;toa hành khách%l;#; có khả năng sẽ bị kéo tụt lại theo."

# 【双鉄】
# display as 雙鐵
# JP: 「D51に巻き込まれ、全ての車両が逆走して落ちていけば、\n恐らくはどこかで脱線。一番下になるD51は潰されよう」
1702 = "「Bị D51 cuốn vào, toàn bộ toa xe chạy ngược và rơi xuống, thì có lẽ sẽ trật bánh ở đâu đó. D51 nằm dưới cùng sẽ bị nghiền nát.」"

# 【中村】
# display as 中村
# JP: 「――」                                                                                                         
1117 = "「――」"

# 【みくろ】
# display as 美玖路
# JP: 「そんな事故が今起きたら、ナインスターズ計画も潰れる。\nそれも、きっと大きな理由ってみくろ、思います。
1711 = "「Nếu tai nạn như vậy xảy ra lúc này, dự án Nine Stars cũng sẽ sụp đổ. Mikuro nghĩ, đó chắc chắn cũng là một lý do lớn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1827 = "「Đúng vậy.」"

# monologue
# JP: 8620の復活が、オール御一夜の象徴ならば\nD51 1031の復活は、オール九洲の象徴だ。
2507 = "Nếu sự hồi sinh của 8620 là biểu tượng của toàn Ohimitera, thì sự hồi sinh của D51 1031 là biểu tượng của toàn Kyushu."

# monologue
# JP: 湯富院で放置されボロボロだったD51が、術仙の工場で\n復元され、雄武田の\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とともに、再び走る――
2613 = "Chiếc D51 tàn tạ bị bỏ hoang ở Yufuin, được phục dựng tại nhà máy ở Jutsusen, và cùng với \\x%lレイルロオド;#00ffc040;Railord%l;#; của Omuta, một lần nữa lăn bánh――"

# monologue
# JP: （その復元も、術仙に集った、九洲中の――\n日ノ本中の技師達の業によるものだ）
2949 = "（Sự phục dựng đó, cũng là nhờ công sức của các kỹ sư trên khắp Kyushu―― khắp Hinomoto, tập trung tại Jutsusen）"

# monologue
# JP: その一角を、数年前までは御一夜の町の、\nごく普通のボイラー屋さんだった、秦さんが担ってくれた。
2738 = "Đóng góp một phần trong đó, là bác Hata, người mà vài năm trước chỉ là một chủ tiệm lò hơi bình thường ở Ohimitera."

# monologue
# JP: 術仙に入り浸るようになり、蒸機ボイラーを学び始め、\n今では熟練の技師たちも舌を巻く存在となった、秦さんが。
2284 = "Bác Hata thường xuyên lui tới Jutsusen, bắt đầu học về lò hơi đầu máy hơi nước, và giờ đây đã trở thành một người khiến ngay cả những kỹ sư lành nghề cũng phải nể phục."

# 【双鉄】
# display as 雙鐵
# JP: 「D51 1031号機は、結束と復活との大きな象徴のひとつだ。\n鉄道関係者だけではなく、一般市民からの注目度も高い」
2054 = "「Đầu máy D51 1031 là một trong những biểu tượng lớn của sự đoàn kết và hồi sinh. Không chỉ những người trong ngành đường sắt, mà cả sự chú ý từ người dân cũng rất cao.」"

# monologue
# JP: 再び、三人が同時に頷く。
2234 = "Một lần nữa, cả ba người đồng thời gật đầu."

# monologue
# JP: ミッションの難度、重要度を、生命の危機をも示唆されて、\nけれどわずかも、瞳の強さはゆるがない。
2574 = "Dù đã được nhắc nhở về độ khó, tầm quan trọng của nhiệm vụ, và cả mối nguy hiểm đến tính mạng, nhưng ánh mắt mạnh mẽ của họ không hề lung lay dù chỉ một chút."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、君たちにはまだ任せられないと考えた。\nが――だからこそ、君たちに任せねばと、考え直した」
1801 = "「Do đó, anh đã nghĩ là vẫn chưa thể giao phó cho các em. Nhưng――chính vì thế, anh đã nghĩ lại rằng, bắt buộc phải giao cho các em.」"

# 【凪】
# display as 凪
# JP: 「にーさん！　気付くのがおそかとばい！！」
1683 = "「Anh hai! Anh nhận ra hơi muộn rồi đó nha!!」"

# 【中村】
# display as 中村
# JP: 「右田\\x%l機関士;#00ffc040;機関士%l;#;。もう少し詳しく聞かせてください。\nどうして、だからこそなんですか？」
1579 = "「\\x%l機関士;#00ffc040;Lái tàu%l;#; Migita. Xin hãy nói rõ hơn một chút. Tại sao, lại là chính vì thế?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ナインスターズ専用客車。\n[きゅうじゅう,1]90系客車群は、間もなくロールアウトする」
1452 = "「Toa hành khách chuyên dụng của Nine Stars. Đội toa hành khách dòng 90, sẽ sớm được xuất xưởng.」"

# monologue
# JP: ……みくろはわかっているのだろうか？\n何も言わずに、何も問わずに、ただ穏やかに笑っている。
1072 = "......Mikuro có hiểu không nhỉ? Không nói gì, không hỏi gì, chỉ nở nụ cười điềm tĩnh."

# 【双鉄】
# display as 雙鐵
# JP: 「そこから営業運転開始までに習熟してもらうためには、\n今が、ギリギリのタイミングだと判断した」
1953 = "「Để các em có thể thành thạo từ giờ cho đến lúc bắt đầu vận hành thương mại, anh đánh giá đây là thời điểm sát nút rồi.」"

# 【中村】
# display as 中村
# JP: 「ですから、その判断を下した理由を聞かせてください」
1803 = "「Vì vậy, xin hãy cho chúng tôi biết lý do anh đưa ra quyết định đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「決まっている。君たち、若い世代こそが、\nナインスターズを――その更に先を、担っていくからだ」
1891 = "「Rõ ràng rồi. Bởi vì các em, những thế hệ trẻ, sẽ là người gánh vác Nine Stars――và cả tương lai xa hơn nữa.」"

# 【凪】
# display as 凪＆中村
# JP: 「！」
# 1630 = "「啊！」" 

# monologue
# JP: 若い世代が、古い世代を押し上げて、\n屋岳の峠を――難所を越えて、レールをつなぐ。
2616 = "Thế hệ trẻ, thúc đẩy thế hệ đi trước, vượt qua đèo Yatake――vượt qua nơi hiểm trở, để nối liền đường ray."

# monologue
# JP: その光景は必ずや、大廃線からの鉄道復活にとどまらぬ、\n『未来への延伸』を象徴する景色となるだろう。
2873 = "Cảnh tượng đó chắc chắn sẽ không chỉ dừng lại ở việc phục sinh đường sắt từ sau Đại bãi bỏ các tuyến, mà sẽ trở thành khung cảnh biểu tượng cho việc 『Vươn tới tương lai』."

# 【双鉄】
# display as 雙鐵
# JP: 「いつかは必ず任せることになる。\nその“いつか”が今日だと――僕は、そう感じたのだ」
1919 = "「Một ngày nào đó chắc chắn sẽ phải giao phó. Cái \"một ngày nào đó\" chính là hôm nay――anh đã cảm thấy như vậy.」"

# 【凪】
# display as 凪
# JP: 「千景ちゃん！」
1564 = "「Chikage!」"

# 【中村】
# display as 中村
# JP: 「蓑笠さん」
1947 = "「Cô Minokasa.」"

# monologue
# JP: 凪と中村さんとの目が合う。\nふたり、同時に頷き合う。
2385 = "Nagi và Nakamura chạm mắt nhau. Cả hai đồng thời gật đầu với nhau."

# 【凪】
# display as 凪
# JP: 「にーさん、やるばい！！\nウチたち、絶対やりとげるけん！！」
1686 = "「Anh hai, làm thôi!! Bọn em, tuyệt đối sẽ làm được!!」"

# 【中村】
# display as 中村
# JP: 「教えてもらって、取り組む意義がはっきりしました。\nだから、必ず成功させます」
1942 = "「Được anh giải thích, tôi đã hiểu rõ ý nghĩa của việc thực hiện nhiệm vụ này. Nên là, nhất định chúng tôi sẽ thành công.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。君たちなら出来ると確信している」
1640 = "「Ừ. Anh tin chắc là các em làm được.」"

# monologue
# JP: ……そうだ。確信なら、とうの昔からできていた。\n中村さんが入社して、凪と組みはじめて僅か二ヶ月――
1069 = "......Đúng vậy. Tôi đã tin chắc từ lâu rồi. Kể từ khi cô Nakamura vào công ty và bắt đầu bắt cặp với Nagi, mới chỉ vỏn vẹn hai tháng――"

# monologue
# JP: その頃からもうこの新コンビは、その恐るべき勘の良さを、\n赤井・宗方、両ベテランからさえ、認められていたから。
2850 = "Từ lúc đó, cặp đôi mới này đã thể hiện trực giác nhạy bén đến đáng sợ, được cả hai lão tướng Akai và Munakata công nhận."

# monologue
# JP: （……にもかかわらず、僕がためらった理由なら――）
2900 = "（......Mặc dù vậy, lý do khiến tôi do dự là――）"

# monologue
# JP: 事故を、恐れた。\nただそれだけのことだろう。
2591 = "Sợ tai nạn xảy ra. Chỉ đơn giản là vậy thôi."

# monologue
# JP: が、事故を恐れて止まるのならば、\n僕は、路子は――永遠に、終着駅にはたどり着けない。
2290 = "Nhưng, nếu vì sợ tai nạn mà dừng bước, thì tôi, và Michiko――sẽ mãi mãi không bao giờ đến được ga cuối."

# 【双鉄】
# display as 雙鐵
# JP: 「だから、頼む」
1806 = "「Vì vậy, trông cậy vào các em.」"

# monologue
# JP: \\x%l補機;#00ffc040;補機%l;#;の運転のことばかりは、\n僕自身には何もできない。
95 = "Riêng về việc lái \\x%l補機;#00ffc040;đầu máy phụ%l;#;, bản thân tôi không thể làm gì được."

# monologue
# JP: ハチロクとともに今まで重ねた訓練と指導の成果を信じ、\nひたすら託す他にない。
2596 = "Tôi chỉ còn cách tin tưởng vào thành quả huấn luyện và chỉ đạo đã tích lũy cùng Hachiroku từ trước đến nay, và phó thác hoàn toàn cho họ."

# 【双鉄】
# display as 雙鐵
# JP: 「僕達を、8620を。君たちの助けで屋岳の上まで、\nどうか、押し上げてやってくれ」
1762 = "「Hãy giúp chúng tôi, giúp 8620. Đẩy lên tận đỉnh Yatake nhé.」"

# 【ハチロク】
# display as 八六
# JP: 「みくろ。\\x%l加減弁;#00ffc040;加減弁%l;#;、いま全開です」
1934 = "「Mikuro. \\x%l加減弁;#00ffc040;Van tiết lưu hơi%l;#;, hiện đang mở hết cỡ.」"

# monologue
# JP: ――普段であれば無いことだ。
1027 = "――Bình thường thì không có chuyện này đâu."

# monologue
# JP: 僕達にも聞こえるようにだろう。\nみくろへ送る\\x%l共感;#00ffc040;共感%l;#;を、ハチロクは声に出してくれる。
2334 = "Chắc là để cho chúng tôi cũng nghe thấy. Hachiroku đã nói ra thành tiếng những \\x%l共感;#00ffc040;cộng cảm%l;#; gửi đến Mikuro."

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、\\x%l投炭;#00ffc040;投炭%l;#;もあげるけん」
2025 = "「Anh hai, em cũng tăng tốc \\x%l投炭;#00ffc040;thêm than%l;#; đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1635 = "「嗯」" 

# monologue
# JP: ――僕からは、ほとんど何も指示していない。\nけれど黙々、30.3パーミルを、8620は登り続ける。
2566 = "――Tôi gần như không đưa ra chỉ thị nào. Nhưng 8620 vẫn lầm lũi leo lên con dốc 30.3 phần nghìn."

# monologue
# JP: 無論、速度はガクリと落ちるが、\nそうありながら、極めて走行は安定している。
2861 = "Tất nhiên, tốc độ giảm đi đáng kể, nhưng dù vậy, việc chạy tàu vẫn cực kỳ ổn định."

# monologue
# JP: （後補機が――D51 1031が、それほど僕らを、\n力強く、効率良く助けてくれているのだ）
2933 = "（Đầu máy phụ phía sau――D51 1031, đang hỗ trợ chúng tôi một cách mạnh mẽ và hiệu quả đến vậy）"

# monologue
# JP: 同調させるべき出力が、大きすぎても小さすぎても、\nそれは主務機の――8620の負荷になる。
2437 = "Công suất cần đồng bộ, nếu quá lớn hay quá nhỏ, đều sẽ trở thành gánh nặng cho đầu máy chính――8620."

# monologue
# JP: 赤井ニイロク組とでも、宗方オリヴィ組とでも\nかくも快適な登坂は、ついぞ経験したことがない。
2690 = "Dù là với cặp Akai - Niiroku, hay Munakata - Olivy, tôi cũng chưa từng trải nghiệm một chuyến leo dốc nào thoải mái đến thế này."

# monologue
# JP: （これが若さか、成長か――\nいや）
2943 = "（Đây là sự trẻ trung, hay là sự trưởng thành―― Không）"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、すまんが」
1530 = "「Hachiroku, xin lỗi nhé.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。なんでしょう、双鉄様」
1461 = "「Vâng. Có chuyện gì vậy ạ, ngài Soutetsu.」"

# monologue
# JP: 最大勾配。\\x%l逆転機;#00ffc040;逆転機%l;#;は\\x%l前進フルギア;#00ffc040;前進フルギア%l;#;の最大トルク。\n\\x%l加減弁;#00ffc040;加減弁%l;#;も、基本、全開で登りきる。
2638 = "Độ dốc tối đa. \\x%l逆転機;#00ffc040;Cần đảo chiều%l;#; ở mô-men xoắn cực đại của \\x%l前進フルギア;#00ffc040;cài hết số tiến%l;#;. \\x%l加減弁;#00ffc040;Van tiết lưu hơi%l;#; cơ bản cũng mở hết cỡ để leo lên."

# monologue
# JP: 登坂までに速度をあげつつ蒸気の量を節約し。\nそうした全てを、ここで一気に叩き込むのだ。
2238 = "Tăng tốc độ đồng thời tiết kiệm lượng hơi nước trước khi leo dốc. Tất cả những thứ đó, sẽ được dồn hết vào đây trong một lần."

# 【日々姫】
# display as 日日姬
# JP: 「っ！　――っ！」
1629 = "「! ――!」"

# monologue
# JP: ゆえ、この状況での主役は日々姫。\n歯を食いしばるようにして、ひたすら\\x%l投炭;#00ffc040;投炭%l;#;を繰り返す。
2603 = "Vì vậy, nhân vật chính trong tình huống này là Hibiki. Em ấy nghiến chặt răng, miệt mài lặp lại việc \\x%l投炭;#00ffc040;thêm than%l;#;."

# monologue
# JP: 沸かす蒸気が使う蒸気に追いつかなくなってしまうなら、\n8620は登り続けるための力を失ってしまうのだから。
2777 = "Nếu hơi nước tạo ra không kịp với lượng hơi nước sử dụng, thì 8620 sẽ mất đi sức mạnh để tiếp tục leo dốc."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2035 = "「Ngài Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――いや」
1627 = "「A――không có gì.」"

# monologue
# JP: 無論、僕とて油断できない。\nなにか不測の事態が起きれば、非常制動せねばならない。
2705 = "Tất nhiên, tôi cũng không thể lơ là. Nếu có chuyện gì bất trắc xảy ra, tôi phải phanh khẩn cấp ngay."

# monologue
# JP: それが遅れて、万が一にも逆走の事態に至ってしまえば、\nどんな\\x%l制動;#00ffc040;制動%l;#;をかけようと、重力に負けてしまうゆえ。
2501 = "Nếu chậm trễ, lỡ như dẫn đến tình trạng chạy ngược, thì dù có áp dụng \\x%l制動;#00ffc040;hãm phanh%l;#; nào đi chăng nữa, cũng sẽ bị trọng lực khuất phục."

# 【双鉄】
# display as 雙鐵
# JP: 「この状況なら、添乗に確認を願えるかと思ったのだが。\nどうだろうか」
1880 = "「Trong tình huống này, anh nghĩ có thể nhờ người đi cùng xác nhận giúp. Em thấy sao.」"

# 【ハチロク】
# display as 八六
# JP: 「そのことでしたら、すでに確認いたしております」
1783 = "「Về chuyện đó, em đã xác nhận rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1630 = "「啊！」" 

# monologue
# JP: 前方注視は崩せない。\nけれども、はっきり伝わってくる。
2556 = "Tôi không thể rời mắt khỏi phía trước. Nhưng, tôi có thể cảm nhận được rõ ràng."

# monologue
# JP: ハチロクは静かに微笑んでいる。\nごく穏やかに――そうありながら、誇らしげに。
2343 = "Hachiroku đang mỉm cười lặng lẽ. Vô cùng điềm tĩnh――nhưng đồng thời, cũng đầy tự hào."

# 【ハチロク】
# display as 八六
# JP: 「添乗の宗方\\x%l機関士;#00ffc040;機関士%l;#;、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィともに、\n本日の乗務に関し、一切の指示を行ってはございません」
2028 = "「Cả \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata và \\x%lレイルロオド;#00ffc040;Railord%l;#; Olivy đi cùng, đều không đưa ra bất kỳ chỉ thị nào liên quan đến ca trực hôm nay ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1990 = "「Vậy sao.」"

# monologue
# JP: ハチロクもその確認を飛ばしていたほど、\n後補機は、本当に見事な運転だ。
2863 = "Đến mức Hachiroku cũng phải bỏ qua việc xác nhận đó, đầu máy phụ phía sau thực sự đang được lái một cách ngoạn mục."

# monologue
# JP: \\x%l機関士;#00ffc040;機関士%l;#;・凪での8620の運転は、\n昨今はまったく珍しいことではなくなっていたが――
2380 = "Việc \\x%l機関士;#00ffc040;lái tàu%l;#; Nagi điều khiển 8620, dạo gần đây đã không còn là chuyện hiếm lạ gì nữa, nhưng――"

# monologue
# JP: （D51でもここまでやるとは。適正の高さに甘えず、\nよほどの努力を重ね続けていたのだな）
2944 = "（Không ngờ với D51 mà em ấy cũng làm được đến mức này. Không hề ỷ lại vào năng khiếu của mình, chắc hẳn em ấy đã nỗ lực rất nhiều.）"

# monologue
# JP: D51の復元が果たされ、本線で再び走りはじめてから、\nまだ一年も経っていない。
2956 = "Kể từ khi D51 được phục dựng xong và bắt đầu chạy lại trên tuyến chính, vẫn chưa qua nổi một năm."

# monologue
# JP: 習熟のためも兼ねている湯医線客車列車の運行ですら、\nD51の凪\\x%l機関士;#00ffc040;機関士%l;#;での乗務は確かまだ、200時間も無い筈だ。
2428 = "Ngay cả với việc vận hành đoàn tàu khách trên tuyến Yui nhằm mục đích làm quen, số giờ trực của \\x%l機関士;#00ffc040;lái tàu%l;#; Nagi trên D51 chắc chắn vẫn chưa tới 200 giờ."

# 【双鉄】
# display as 雙鐵
# JP: 「習熟のため、\nなにか、特別な工夫をしていたのかな」
1691 = "「Để làm quen, em ấy có làm gì đặc biệt không nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「D51\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の知り合いを作ったようですよ？\nみくろと凪とで、ときおり訪ねにいっております」
1550 = "「Có vẻ như em ấy đã làm quen với \\x%lレイルロオド;#00ffc040;Railord%l;#; của D51 đấy ạ? Mikuro và Nagi thỉnh thoảng lại đến thăm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――では、そのこの列車で\n訓練を積ませてもらっていたのかもしれんな――っと」
1899 = "「Ra vậy――vậy thì, có lẽ em ấy đã được tích lũy kinh nghiệm huấn luyện trên đoàn tàu đó――à.」"

# monologue
# JP: じわじわ、蒸気圧が下がり始める。\nこここそ屋岳の正念場だ。
2775 = "Áp suất hơi nước bắt đầu giảm dần. Đây chính là khoảnh khắc quyết định của đỉnh Yatake."

# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lブロワー;#00ffc040;ブロワー%l;#;！」
1094 = "「\\x%lブロワー;#00ffc040;Thiết bị thổi gió%l;#;!」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！！」
1633 = "「!!」"

# monologue
# JP: （ザッ！　ザッ！！！）
2930 = "（Phập! Phập!!!）"

# 【ハチロク】
# display as 八六
# JP: 「みくろ。主務機\\x%lブロワー;#00ffc040;ブロワー%l;#;です」
1931 = "「Mikuro. Đầu máy chính đang dùng \\x%lブロワー;#00ffc040;thiết bị thổi gió%l;#;.」"

# monologue
# JP: \\x%lブロワー;#00ffc040;ブロワー%l;#;をかけ\\x%l火室;#00ffc040;火室%l;#;内での燃焼を助けてやればすぐさま、\n日々姫が\\x%l投炭;#00ffc040;投炭%l;#;のペースをあげる。
2856 = "Ngay khi bật \\x%lブロワー;#00ffc040;thiết bị thổi gió%l;#; để hỗ trợ quá trình đốt cháy bên trong \\x%l火室;#00ffc040;buồng đốt%l;#;, Hibiki lập tức tăng nhịp độ \\x%l投炭;#00ffc040;thêm than%l;#;."

# 【日々姫】
# display as 日日姬
# JP: 「給水、まだ我慢してよかと？」
1993 = "「Cấp nước, vẫn phải nhịn thêm chút nữa hả anh?」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
1738 = "「Tất nhiên.」"

# monologue
# JP: 勾配の影響で、水面計の正確な数値はよみとれん。\nが、見た目ではかなり低下している。
2456 = "Do ảnh hưởng của độ dốc, không thể đọc được con số chính xác trên máy đo mực nước. Nhưng, nhìn bằng mắt thường thì đã giảm khá nhiều rồi."

# monologue
# JP: だがしかし、ここで給水をしてしまうなら、\nボイラー温度が下がってしまい、蒸気の量が危うくなる。
2296 = "Tuy nhiên, nếu cấp nước lúc này, nhiệt độ lò hơi sẽ giảm xuống, và lượng hơi nước sẽ trở nên nguy hiểm."

# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l溶栓;#00ffc040;溶栓%l;#;が匂い始めるまで、給水は控えて構わん。\nが、大丈夫だ。そうなる前に――」
1100 = "「Cứ khoan cấp nước cho đến khi \\x%l溶栓;#00ffc040;nút chảy an toàn%l;#; bắt đầu có mùi. Nhưng, không sao đâu. Trước khi chuyện đó xảy ra――」"

# 【日々姫】
# display as 日日姬
# JP: 「――うん！！」
1102 = "「――Vâng!!」"

# monologue
# JP: ボボボボ、と、8620は息を切らさず、登り続ける。\n愚直に、愚直に、緩むことなく――
2450 = "Bô bô bô bô, 8620 không hề đứt hơi, tiếp tục leo lên. Lầm lì, lầm lì, không chút lơi lỏng――"

# 【双鉄】
# display as 雙鐵
# JP: 「[カットオフ,4]逆転機中立。\\x%l加減弁;#00ffc040;加減弁%l;#;全閉。\\x%l自弁;#00ffc040;自弁%l;#;、\\x%l制動;#00ffc040;制動%l;#;。\nよし！　給水！！」
1657 = "「Cần đảo chiều về số trung tính. Đóng hoàn toàn \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;. \\x%l自弁;#00ffc040;Van hãm tự động%l;#;, \\x%l制動;#00ffc040;hãm phanh%l;#;. Tốt! Cấp nước!!」"

# 【日々姫】
# display as 日日姬
# JP: 「給水！！」
1562 = "「Cấp nước!!」"

# monologue
# JP: 登りきったと同時に日々姫がバルブをひねる。\nざーーっと水の流れていく音。
2711 = "Ngay khi vừa lên tới đỉnh, Hibiki vặn van. Tiếng nước rào rào chảy ra."

# 【双鉄】
# display as 雙鐵
# JP: 「一気にはやりすぎるなよ」
1554 = "「Đừng làm quá tay trong một lần đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「わかっとるばい！」
1605 = "「Em biết rồi!」"

# monologue
# JP: ――峠を登れば、すぐに駅。
1028 = "――Vượt qua con đèo, là đến ngay nhà ga."

# monologue
# JP: 利用客などほとんどいない――\n列車と僕らが休むための、屋岳の駅だ。
2726 = "Gần như chẳng có hành khách nào―― Là ga Yatake, nơi để đoàn tàu và chúng tôi nghỉ ngơi."

# 【日々姫】
# display as 日日姬
# JP: 「発車時刻までに、蒸気圧ばばっちり戻すけん！」
1896 = "「Từ giờ cho đến giờ xuất phát, em sẽ phục hồi áp suất hơi nước hoàn hảo luôn!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。よろしく頼む」
1649 = "「Ừm. Trông cậy vào em.」"

# monologue
# JP: ――停止位置、ぴたり。\n止めると同時に、後ろD51もぴたりと止まる。
2308 = "――Vị trí dừng, chuẩn xác. Ngay khi dừng lại, D51 phía sau cũng dừng lại chuẩn xác."

# monologue
# JP: 全く押されず、がくんと引っ張られることもなかった。
2631 = "Hoàn toàn không bị đẩy, cũng không hề bị giật lùi."

# 【双鉄】
# display as 雙鐵
# JP: 「ブレーキタイミングも完璧か」
1561 = "「Thời điểm phanh cũng hoàn hảo sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！　そこは私も出来るとよ？\nにぃにのタイミングで、私も凪ちゃんも覚えとるけん」
1632 = "「A! Cái đó em cũng làm được nha? Thời điểm của anh hai, cả em và Nagi đều nhớ mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1653 = "「A――」"

# monologue
# JP: 言われて、ようやく理解する。\n宗方・赤井両\\x%l機関士;#00ffc040;機関士%l;#;は、『僕の運転』に習熟してない。
2768 = "Nghe vậy, tôi mới hiểu ra. Hai \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata và Akai, không quen thuộc với 『cách lái của tôi』."

# monologue
# JP: オリヴィとニイロクも同様だ。\nが、凪・日々姫なら。ハチロクの直接の妹のみくろなら。
2468 = "Olivy và Niiroku cũng vậy. Nhưng, nếu là Nagi và Hibiki. Nếu là Mikuro, cô em gái trực tiếp của Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「生え抜きとは――受け渡すとは、\nそうした強さを持つものなのだな」
1769 = "「Người được đào tạo từ đầu――việc truyền đạt lại, lại mang đến sức mạnh như vậy sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「そりゃそーよ！　ハチロクとにぃににわたし達、\n大事に育ててもらったけんね」
1889 = "「Tất nhiên rồi! Bọn em được Hachiroku và anh hai chăm chút nuôi dưỡng cẩn thận mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そこを差し引いても、だ」
1475 = "「Nhưng, dù không tính chuyện đó đi nữa.」"

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
1636 = "「Vâng!」"

# monologue
# JP: ようやくワンスコを床につけ、\n日々姫が明るい笑顔を浮かべる。
2626 = "Cuối cùng cũng đặt xẻng xúc than xuống sàn, Hibiki nở một nụ cười rạng rỡ."

# 【日々姫】
# display as 日日姬
# JP: 「凪ちゃんと中村さん、[うま,1]上手かったとねー！」
1743 = "「Nagi và cô Nakamura, giỏi quá nhỉ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。文句の付け所もみつからん」
1830 = "「Đúng vậy. Chẳng tìm được chỗ nào để chê cả.」"

# monologue
# JP: 最初の一度がこの出来だと、むしろ二度目が怖くなる。
2743 = "Lần đầu tiên mà đã làm được thế này, thì tôi lại thấy sợ lần thứ hai hơn."

# monologue
# JP: 油断・慢心――\n特に凪には、気をつけてもらいたくなるところゆえ。
2706 = "Lơ là, tự mãn―― Đặc biệt là Nagi, tôi muốn em ấy phải cẩn thận với những điều đó."

# 【ハチロク】
# display as 八六
# JP: 「\\x%l機関士;#00ffc040;機関士%l;#;と助士も見事でしたが、\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――みくろも素晴らしい仕事をしました」
1097 = "「\\x%l機関士;#00ffc040;Lái tàu%l;#; và phụ lái cũng rất xuất sắc, nhưng \\x%lレイルロオド;#00ffc040;Railord%l;#;――Mikuro cũng đã làm rất tuyệt vời ạ.」"

# monologue
# JP: ハチロクも、笑顔と声を輝かせている。
2333 = "Hachiroku cũng đang nở nụ cười và cất giọng rạng rỡ."

# 【ハチロク】
# display as 八六
# JP: 「わたくしたち、日ノ本式の\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にとって、\n半身たる車輌を離れ、他の車輌を動かすことがどれ程に」
1740 = "「Đối với những \\x%lレイルロオド;#00ffc040;Railord%l;#; kiểu Hinomoto như chúng em, việc rời xa toa xe là một nửa cơ thể mình, để vận hành một toa xe khác là khó khăn đến nhường nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは、ハチロク」
1529 = "「Cái đó thì, Hachiroku.」"

# monologue
# JP: 輝くからこそ、もったいないと感じてしまう。\nだから制帽の上からそっと、ハチロクの頭を撫でて伝える。
2667 = "Chính vì em ấy đang tỏa sáng rạng rỡ như vậy, nên tôi mới thấy tiếc. Vì thế, tôi nhẹ nhàng xoa đầu Hachiroku qua lớp mũ đồng phục và nói."

# 【双鉄】
# display as 雙鐵
# JP: 「その賞賛を一番最初に耳にすべきは、\nきっと、僕らではないと思うぞ？」
1916 = "「Người đầu tiên nên được nghe những lời khen ngợi đó, chắc chắn không phải là chúng ta đâu nhỉ?」"

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1630 = "「啊！」" 

# monologue
# JP: とろけるような――\nああ、ハチロクは、こんな笑顔を隠していたのか。
2341 = "Ngọt ngào như muốn tan chảy―― A, Hachiroku, em ấy đã giấu một nụ cười như thế này sao."

# monologue
# JP: これほど身近にいる僕でさえ、初めて目にするその笑顔は、\n車番の離れた妹への、純粋な愛情のあらわれだろう。
2529 = "Ngay cả tôi, người ở gần em ấy đến vậy, cũng là lần đầu tiên nhìn thấy nụ cười đó, chắc hẳn đó là biểu hiện của tình yêu thương thuần khiết dành cho cô em gái khác xa số hiệu xe."

# 【ハチロク】
# display as 八六
# JP: 「左様ですね、双鉄様。ありがとうございます。\nわたくしきっと、一番にみくろに伝えてあげます」
1833 = "「Đúng vậy nhỉ, ngài Soutetsu. Em cảm ơn ạ. Em chắc chắn, sẽ truyền đạt lại cho Mikuro đầu tiên.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ならば、そうするためにも」
1648 = "「Ừm. Nếu vậy, để làm được điều đó.」"

# 【ハチロク】
# display as 八六
# JP: 「はい！」
1695 = "「Vâng!」"

# monologue
# JP: 信号は、青。発車時刻。\n蒸気圧もすっかり回復している。
2305 = "Tín hiệu, màu xanh. Giờ xuất phát. Áp suất hơi nước cũng đã phục hồi hoàn toàn."

# 【日々姫】
# display as 日日姬
# JP: 「圧良し！　発車準備良し！」
1668 = "「Áp suất tốt! Chuẩn bị xuất phát tốt!」"

# 【双鉄】
# display as 雙鐵
# JP: 「信号良し！　時期良し！　出発！」
1522 = "「Tín hiệu tốt! Thời điểm tốt! Xuất phát!」"

# 【双鉄】
# display as ３人
# JP: 「進行！」
1560 = "「Tiến lên!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Excellent！　ほんと良かった！！\n最後まで、ナギ、よく集中つづいたねー」
2056 = "「Excellent! Thật sự rất tốt!! Đến tận phút cuối, Nagi, vẫn giữ được sự tập trung cao độ nhỉ~」"

# 【凪】
# display as 凪
# JP: 「えへへー、凪さま頑張ったばい！」
1652 = "「E hẹ hẹ, Nagi đại nhân đã cố gắng hết sức đó!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ナカムラも！　ナギえんりょなく蒸気使うのに、\nいっかいも危なくならなかったねー！　えらい！！」
1444 = "「Cả Nakamura nữa! Nagi dùng hơi nước không chút kiêng dè, vậy mà chẳng có lúc nào nguy hiểm cả! Giỏi quá!!」"

# 【中村】
# display as 中村
# JP: 「――仕事ですから。\n当然のことですけれど、ご評価は嬉しいです」
1983 = "「――Vì đó là công việc mà. Là chuyện đương nhiên thôi, nhưng được khen ngợi tôi rất vui.」"

# monologue
# JP: ……一番小さなオリヴィが、一番大きな顔をして、\n若者達を褒めに褒めている。
1066 = "......Olivy nhỏ bé nhất, lại ra vẻ người lớn nhất, khen ngợi những người trẻ tuổi hết lời."

# monologue
# JP: 確かにふたりは、賞賛に値する働きをした。\nそうして、ふたりだけでなく――
2472 = "Quả thực hai người họ đã làm việc xứng đáng được khen ngợi. Và, không chỉ hai người họ――"

# 【みくろ】
# display as 美玖路
# JP: 「みくろ、感激です！　お姉様」
1924 = "「Mikuro, cảm kích lắm ạ! Chị hai.」"

# 【ハチロク】
# display as 八六
# JP: 「大げさですよ、みくろ。\nあなたの仕事を、正当に評価しただけではないですか」
1507 = "「Em làm quá rồi đấy, Mikuro. Chị chỉ đánh giá công việc của em một cách công bằng thôi mà.」"

# 【みくろ】
# display as 美玖路
# JP: 「そうしてもらえることが、お姉様の役に立てたことが、\nみくろ、とっても幸せなんです」
1945 = "「Được như vậy, được giúp ích cho chị hai, Mikuro, thực sự rất hạnh phúc ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1620 = "「Trời ạ.」"

# monologue
# JP: ――みくろの果たした仕事もやはり、\nハチロクによって賞賛されている。
1033 = "――Công việc mà Mikuro hoàn thành, quả nhiên, cũng đã được Hachiroku khen ngợi."

# monologue
# JP: それがよっぽど嬉しいのだろう。\nみくろはほとんど、涙目だ。
2757 = "Chắc hẳn điều đó khiến em ấy rất vui. Mikuro gần như rơm rớm nước mắt."

# 【みくろ】
# display as 美玖路
# JP: 「[うちのこ,4]38696を置いてくの、[おおむた,2]雄武田を離れるの、\nみくろ、ほんとに不安だったんですけど――」
1884 = "「Để [đứa bé đó,4]38696 lại, rời khỏi Omuta, Mikuro, thực sự đã rất bất an, nhưng mà――」"

# 【ハチロク】
# display as 八六
# JP: 「ええ。わかりますよ」
1638 = "「Ừ. Chị hiểu mà.」"

# 【みくろ】
# display as 美玖路
# JP: 「それでも、思い切って来てよかったです！\n[うちのこ,4]38696もきっと、園のみんなと喜んでくれてます！」
1489 = "「Dù vậy, em quyết tâm đến đây thật là tốt quá! Chắc chắn [đứa bé đó,4]38696 cũng đang cùng mọi người trong sở thú vui mừng cho em!」"

# 【ハチロク】
# display as 八六
# JP: 「ああ、動物園でしたね。あなたの車輌――\n38696号機が、\\x%l静態保存;#00ffc040;静態保存%l;#;されているのは」
1622 = "「A, là sở thú nhỉ. Toa xe của em―― Đầu máy 38696, đang được \\x%l静態保存;#00ffc040;lưu tĩnh%l;#; ở đó.」"

# 【みくろ】
# display as 美玖路
# JP: 「はい。雄武田の動物園です。\nとっても楽しいところですよ」
1840 = "「Vâng. Là sở thú ở Omuta ạ. Đó là một nơi rất vui vẻ đấy ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「そうなのですか」
1986 = "「Vậy sao.」"

# monologue
# JP: 我が子を見守る母のよう――\nそんな目をしたハチロクが、ふわり、甘えて僕を見上げる。
2339 = "Như một người mẹ đang dõi theo đứa con của mình―― Hachiroku với ánh mắt như vậy, nhẹ nhàng, làm nũng ngước nhìn tôi."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　わたくし、世なれないものですので、\n動物園、一度もお伺いしたことが無いのですが」
2034 = "「Ngài Soutetsu? Em, vì không rành sự đời, nên chưa từng được đến sở thú bao giờ ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1654 = "「A――」"

# monologue
# JP: 雄武田であれば、立ち上がったばかりのくろがね鉄道――\n筑方炭田周辺の鉱山鉄道や工場専用線を再編した鉄道会社
2804 = "Nếu là Omuta, thì Đường sắt Kurogane mới thành lập―― Công ty đường sắt đã tái cơ cấu lại đường sắt mỏ và tuyến chuyên dụng cho nhà máy quanh mỏ than Chikuhou."

# monologue
# JP: ――の、本社の、確か所在地だ。\nならば、赴く機会も少なくはなかろうし……
2587 = "――Hình như, trụ sở chính nằm ở đó. Nếu vậy, cơ hội đến đó chắc cũng không ít......"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。機会をみつけて行こう」
1699 = "「Anh hiểu rồi. Chúng ta sẽ tìm cơ hội để đi nhé.」"

# 【ハチロク】
# display as 八六
# JP: 「はい！」
# 1695 = "「好的！」" 

# 【みくろ】
# display as 美玖路
# JP: 「わぁあ！」
1611 = "「Oa!」"

# monologue
# JP: ハチロク以上に、みくろが顔を輝かす。
2759 = "Còn hơn cả Hachiroku, khuôn mặt Mikuro bừng sáng."

# monologue
# JP: 喜色満面――その文字列を具現化すれば、\nいまのみくろの笑顔になろう。
2741 = "Mừng rỡ ra mặt――nếu cụm từ đó được hiện thực hóa, thì chắc chắn sẽ trở thành nụ cười của Mikuro lúc này."

# 【みくろ】
# display as 美玖路
# JP: 「お姉様に来てもらえるの、嬉しいです！\n[うちのこ,4]38696の、なにより素敵なご褒美になります！」
1716 = "「Chị hai có thể đến, em vui lắm ạ! Đó sẽ là phần thưởng tuyệt vời hơn bất cứ thứ gì dành cho [đứa bé đó,4]38696!」"

# 【ハチロク】
# display as 八六
# JP: 「ですからみくろ、大げさすぎです」
1928 = "「Đã bảo là Mikuro, em làm quá lên rồi đấy.」"

# 【みくろ】
# display as 美玖路
# JP: 「大げさなんかじゃありません！」
1428 = "「Không hề làm quá chút nào đâu ạ!」"

# monologue
# JP: （ふぅむ。なるほど、ご褒美か）
2920 = "（Hừm. Ra vậy, phần thưởng sao.）"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、オリヴィからもごほーびあげるね！\n右のポッケと左のポッケ、どっちかずつえらんで！」
2002 = "「Vậy, Olivy cũng sẽ cho phần thưởng nhé! Túi bên phải và túi bên trái, mỗi người chọn một bên đi!」"

# 【凪】
# display as 凪
# JP: 「それなら凪さま！　左ポケット！！」
2014 = "「Thế thì Nagi đại nhân! Túi bên trái!!」"

# 【中村】
# display as 中村
# JP: 「残ったほうで。右ポケットでお願いします」
2008 = "「Tôi lấy bên còn lại. Xin chọn túi bên phải.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！　じゃあナギにはキャンディー！\nナカムラにはチョコをプレゼントー！」
2057 = "「Okay! Vậy thì tặng Nagi kẹo! Tặng Nakamura sô-cô-la!」"

# 【凪】
# display as 凪
# JP: 「わおわお！　うれしかー！」
1610 = "「Oa oa! Vui quá đi!」"

# 【中村】
# display as 中村
# JP: 「これはどうも。ありがとうございます」
1960 = "「Cảm ơn rất nhiều.」"

# monologue
# JP: なるほど。オリヴィはポケットに菓子を入れているのか。\nちびっこたちに大人気なだけのことはある準備のよさ――
2431 = "Ra vậy. Olivy để bánh kẹo trong túi sao. Sự chuẩn bị chu đáo này đúng là xứng danh người rất được bọn trẻ yêu mến――"

# monologue
# JP: ああいや、ファンサービスのため、\n僕もさっそく真似するべきか。
2243 = "À không, vì mục đích phục vụ người hâm mộ (fan service), có lẽ tôi cũng nên học theo ngay lập tức."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツはなんにもあげないの？　ごほーび！\n今日のふたりの運転、すっごくよかったでしょ？」
2033 = "「Soutetsu không cho gì sao? Phần thưởng ấy! Hai người hôm nay lái rất tốt đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。非常によかった」
1646 = "「Ừm. Rất xuất sắc.」"

# monologue
# JP: とはいえ、僕は運転部長だ。\n一部職員だけを贔屓していると取られかねない言動は――
2294 = "Dù vậy, tôi là Trưởng phòng Vận hành. Những lời nói và hành động có thể bị coi là thiên vị một vài nhân viên――"

# monologue
# JP: （ああ、いや）
2932 = "（A, không.）"

# monologue
# JP: 運転部長であるからこそ、信賞必罰、\nその姿勢を明示することも大事な気がする。
2668 = "\"Chính vì là Trưởng bộ phận vận hành, nên việc thưởng phạt phân minh, thể hiện rõ thái độ đó cũng là điều rất quan trọng.\""

# monologue
# JP: ……例えば乗客アンケートなどをとるようにして、\n毎月もっとも評価の高い者にボーナスを支給するなど――
1068 = "\"......Ví dụ như tiến hành khảo sát hành khách, rồi phát tiền thưởng cho người được đánh giá cao nhất mỗi tháng chẳng hạn——\""

# 【凪】
# display as 凪
# JP: 「にーさん、どぎゃんしたと？」
1685 = "\"「Anh hai, anh sao thế?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ひときわよい乗務には、ご褒美が与えられる。\n社としての、そういう仕組があっても良いかと考えた」
1758 = "\"「Hoàn thành tốt công việc thì sẽ được thưởng. Tôi đang nghĩ xem có nên thiết lập một cơ chế như vậy trong công ty hay không.」\""

# 【凪】
# display as 凪
# JP: 「わおわお！　そりゃよかばいね！」
1608 = "\"「Oa oa! Thế thì tuyệt quá nè!」\""

# 【中村】
# display as 中村
# JP: 「社としてでしたら、昇進評価につなげてもらえるのが\n一番私は、嬉しいです」
1705 = "\"「Nếu là chính sách của công ty, thì tôi sẽ rất vui nếu nó được liên kết với đánh giá thăng tiến.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。道理だな。考慮する。評価システムのことと\nあわせて、ポーレットに提言しておこう」
1642 = "\"「Hừm. Có lý đấy. Tôi sẽ cân nhắc. Tôi sẽ đề xuất với Paulette cùng với hệ thống đánh giá luôn.」\""

# 【中村】
# display as 中村
# JP: 「ふふっ、素晴らしいご褒美をいただきました。\nありがとうございます」
1601 = "\"「Fufu, tôi đã nhận được một phần thưởng tuyệt vời rồi. Cảm ơn anh.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
# 1651 = "「嗯？！」" 

# 【中村】
# display as 中村
# JP: 「では、失礼します」
2006 = "\"「Vậy, tôi xin phép.」\""

# monologue
# JP: ご褒美というつもりはなかったのだが、\n訂正しようとするより先に、中村さんは上がってしまう。
2849 = "\"Tôi không có ý coi đó là phần thưởng, nhưng chưa kịp đính chính thì cô Nakamura đã đi mất.\""

# monologue
# JP: （これは――うむ。\nほんの少しだけ困った事態に陥らされてしまったな）
2928 = "\"（Cái này——hừm. Lâm vào tình thế hơi khó xử một chút rồi đây.）\""

# monologue
# JP: 中村さんだけにご褒美を与えた、\nという形になるのは、いかにもまずい。
2809 = "\"Trở thành tình huống chỉ có mình cô Nakamura được nhận thưởng thì đúng là không ổn chút nào.\""

# monologue
# JP: どうしたものかとハチロクを見れば、\n動物園のみどころを、みくろから楽しげに聞いている。
2582 = "\"Tôi nhìn sang Hachiroku xem nên làm thế nào, thì thấy em ấy đang vui vẻ nghe Mikuro kể về những điểm thú vị của sở thú.\""

# monologue
# JP: （あれもあれで、完全にご褒美になっているな）
2942 = "\"（Thế kia thì cũng hoàn toàn là một phần thưởng rồi còn gì.）\""

# monologue
# JP: ならば、うむ。\n仮称“積極評価制度”の、これをテストケースとしよう。
2875 = "\"Nếu vậy thì, hừm. Hãy coi đây là một trường hợp thử nghiệm cho \\\"Chế độ đánh giá tích cực\\\" tạm gọi vậy.\""

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――凪」
1739 = "\"「À——Nagi.」\""

# 【凪】
# display as 凪
# JP: 「凪さまにもご褒美くれると！？」
1845 = "\"「Nagi cũng có phần thưởng hả!?」\""

# monologue
# JP: なんと嬉しげな顔だろう。\n凪は凪、どこまでいってもまっすぐだなぁとホっとする。
2412 = "\"Khuôn mặt mới rạng rỡ làm sao. Nagi vẫn là Nagi, dù thế nào cũng luôn ngay thẳng, khiến tôi cảm thấy nhẹ nhõm.\""

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そうすることとした。\n大した褒美は用意できんが、なにか希望があるなら」
1643 = "\"「Ừm. Anh quyết định vậy rồi. Anh không chuẩn bị được phần thưởng gì to tát đâu, nhưng nếu em có nguyện vọng gì.」\""

# 【凪】
# display as 凪
# JP: 「あるとよ。希望」
1607 = "\"「Có chứ. Nguyện vọng á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1630 = "「啊！」" 

# monologue
# JP: 真剣な目だ。
2398 = "\"Ánh mắt thật nghiêm túc.\""

# monologue
# JP: 大会で、あるいは乗務で。\n強敵と、難関と向き合う――そうしたときの、凪の目だ。
2526 = "\"Tại giải đấu, hay khi làm nhiệm vụ. Đối mặt với kẻ thù mạnh, với thử thách cam go——đó là ánh mắt của Nagi vào những lúc như vậy.\""

# 【凪】
# display as 凪
# JP: 「凪さま、\nどーしてもにーさんと行きたかったところが、あると」
1851 = "\"「Nagi có một nơi nhất định muốn đi cùng anh hai nè.」\""

# 【凪】
# display as 凪
# JP: 「なーんだ、そぎゃんわけだったとねー」
1462 = "\"「Gì chứ, hóa ra là vậy à~」\""

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1635 = "「嗯」" 

# 【凪】
# display as 凪
# JP: 「ナビにいわれて、向き合うために、\nにーさん、ふたりっきりにたくさんなっとったとね」
1677 = "\"「Anh hai nghe lời Navi, để đối mặt với mọi người, nên mới thường xuyên ở riêng với họ nhỉ.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1827 = "「是啊」" 

# monologue
# JP: いつの間に、意識することを忘れていたが、\n確かに、そうした時期はあった。
2246 = "\"Không biết từ lúc nào tôi đã quên mất việc phải để tâm đến điều đó, nhưng quả thực là đã từng có khoảng thời gian như vậy.\""

# monologue
# JP: （“このままだと僕の命にかかわる”と、\nそのようなことを、確かナビには警告されたが――）
2945 = "\"（\\\"Cứ thế này thì sẽ nguy hiểm đến tính mạng của tôi\\\", chắc chắn Navi đã từng cảnh báo tôi như vậy, nhưng——）\""

# monologue
# JP: 向き合うことで、その危機は回避されたのだろうか？\nいまもってなお、僕にはまるでわからない。
2439 = "\"Liệu việc đối mặt có giúp tôi tránh được khủng hoảng đó không? Đến tận bây giờ, tôi vẫn hoàn toàn không hiểu.\""

# 【凪】
# display as 凪
# JP: 「そぎゃん理由なら納得ばい！\n凪さま、ちょこっと安心したばい」
2000 = "\"「Lý do vậy thì hiểu rồi nè! Nagi cũng an tâm hơn một chút rồi á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1650 = "「嗯？」" 

# monologue
# JP: そのひとことに、わずかな疑問を感じてしまう。
2483 = "\"Chỉ một câu nói đó thôi cũng khiến tôi cảm thấy đôi chút nghi ngờ.\""

# monologue
# JP: と、いうか――\nこの質問を凪がぶつけてきた理由も、やはり、疑問だ。
2801 = "\"Nói đúng hơn là—— lý do Nagi ném câu hỏi này cho tôi, quả nhiên cũng rất đáng ngờ.\""

# 【双鉄】
# display as 雙鐵
# JP: 「なにが一体、安心なのだ？」
1810 = "\"「Rốt cuộc thì em an tâm chuyện gì?」\""

# 【凪】
# display as 凪
# JP: 「そりゃ、にーさんが女の子ば誘いまくって、\nふたりっきりになっとったのに、誘われんかったけん」
1982 = "\"「Thì là, anh hai cứ liên tục rủ rê con gái, ở riêng với họ, thế mà lại chẳng rủ em.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1650 = "「嗯？」" 

# 【凪】
# display as 凪
# JP: 「やけん、凪さま。女の子としての魅力とか、\n足りんのかもって、ちょっと不安になっとったばい」
1794 = "\"「Bởi vậy nên, Nagi mới thấy hơi bất an, không biết mình có thiếu sức hấp dẫn của một đứa con gái hay không á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「それは無い。凪は、十分に魅力的だと素直に思うぞ。\n実際、どこへいっても人気者ではないか」
1775 = "\"「Không có chuyện đó đâu. Anh thành thật nghĩ Nagi rất có sức hấp dẫn đấy. Thực tế thì, đi đến đâu em cũng được yêu mến mà, phải không?」\""

# 【凪】
# display as 凪
# JP: 「お年寄りとちびすけたちと動物と女の子にはモテると！\nばってん、男の子からはさっぱりばい」
1939 = "\"「Em chỉ được lòng người già, bọn nhóc tì, động vật với con gái thôi nè! Nhưng mà, con trai thì chả ai thèm để ý á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　それは意外だ」
1836 = "\"「Vậy sao? Bất ngờ thật đấy.」\""

# monologue
# JP: モテていないという事実もだが、\nそれ以前に――
2577 = "\"Sự thật là em ấy không được mến mộ, nhưng trước đó thì——\""

# 【双鉄】
# display as 雙鐵
# JP: 「凪は、異性からもてたいのか？」
1513 = "\"「Nagi, em muốn được người khác giới mến mộ sao?」\""

# 【凪】
# display as 凪
# JP: 「そういうわけじゃなかばい。実際よってこられても、\n今は相手ばしとられんよねー、っていうのもあるし」
1997 = "\"「Cũng không hẳn là vậy nè. Thực tế thì dù có người đến gần, bây giờ em cũng chẳng có thời gian mà để ý tới á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
# 1827 = "「是啊」" 

# monologue
# JP: ポーレットや日々姫やふかみも実際、\n数多の誘いを同じ理由で跳ね除け続けているようだ。
2679 = "\"Paulette, Hibiki hay Fukami thực tế cũng liên tục từ chối vô số lời mời gọi với cùng một lý do.\""

# 【凪】
# display as 凪
# JP: 「ばってん、ぜーんぜんそぎゃん声がかからんのは、\nやっぱりちょっと、不安に感じる部分あるとよ」
1480 = "\"「Nhưng mà, hoàn toàn không có ai ngó ngàng tới, quả nhiên cũng làm em thấy hơi bất an á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
# 1990 = "「這樣啊」" 

# monologue
# JP: ……言われて、眺めて、改めて気付かされる。\n成長したのは、内面や技量だけのことではない。
1073 = "\"......Nghe em ấy nói, tôi nhìn lại và chợt nhận ra. Sự trưởng thành không chỉ nằm ở nội tâm hay kỹ năng.\""

# monologue
# JP: 凪もまた、極めて健やかに美しく、\n女性としても、鮮やかに成長しているのだと。
2372 = "\"Nagi cũng vậy, em ấy đang lớn lên vô cùng khỏe mạnh và xinh đẹp, như một thiếu nữ rực rỡ.\""

# 【双鉄】
# display as 雙鐵
# JP: 「凪も、大人になったのだなぁ」
1500 = "\"「Nagi cũng đã trở thành người lớn rồi nhỉ.」\""

# 【凪】
# display as 凪
# JP: 「そりゃそうばい！　ばってん――\nまだ、大人になり損なってる部分もあると」
1890 = "\"「Chắc chắn rồi nè! Nhưng mà—— vẫn còn những phần chưa kịp lớn đâu á.」\""

# monologue
# JP: ふと、凪の足が止まる。\nなんでもないような場所でいきなり――――っ！
2404 = "\"Đột nhiên, Nagi dừng bước. Ở một nơi có vẻ như chẳng có gì đặc biệt――――っ!\""

# 【双鉄】
# display as 雙鐵
# JP: 「ここ、か」
1751 = "\"「Là chỗ này, sao.」\""

# monologue
# JP: 凪が頷く。\nとても静かに――落ち着いた大人の顔をして。
2413 = "\"Nagi gật đầu. Rất tĩnh lặng——với khuôn mặt điềm tĩnh của một người lớn.\""

# 【双鉄】
# display as 雙鐵
# JP: 「ここに、凪は来たかったのか」
1508 = "\"「Nagi muốn đến đây sao?」\""

# monologue
# JP: 事情を知らぬ者にとっては、\n他のどことも変わらぬ風景。
2519 = "\"Đối với những người không biết chuyện, thì phong cảnh ở đây chẳng khác gì những nơi khác.\""

# monologue
# JP: けれども、凪には――\nそうして僕にも、特別な場所。
2298 = "\"Thế nhưng, đối với Nagi—— và cả đối với tôi, đây là một nơi đặc biệt.\""

# 【凪】
# display as 凪
# JP: 「うち。ずっと。\nずーっと謝りたかったと」
1602 = "\"「Em. Luôn luôn. Luôn luôn muốn xin lỗi anh.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1635 = "「嗯」" 

# 【凪】
# display as 凪
# JP: 「あのとき――ホントに、周りのことば、\nちょっとも見えておらんかったばい」
2011 = "\"「Lúc đó——thật sự, em đã không hề để mắt đến những thứ xung quanh một chút nào á.」\""

# monologue
# JP: 落ち着き払った声を出し。\nそうしながらも凪の目が、僕の視線からわずかにずれる。
2474 = "\"Cất lên một giọng điệu vô cùng điềm tĩnh. Nhưng ánh mắt của Nagi lại hơi né tránh ánh nhìn của tôi.\""

# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
1124 = "\"「——Ừm.」\""

# 【凪】
# display as 凪
# JP: 「いま考えたら――あれば、まっとうな修行じゃなくて、\nヤツアタリだったとも思うばい」
1879 = "\"「Bây giờ nghĩ lại——cái đó, không phải là tu hành tử tế gì, mà chỉ là giận cá chém thớt thôi nè.」\""

# monologue
# JP: 罪悪感の重みがどれほど苦しいものかを、\nこの身をもって、僕は知っている。
2673 = "\"Sức nặng của cảm giác tội lỗi đau khổ đến nhường nào, chính bản thân tôi là người hiểu rõ nhất.\""

# monologue
# JP: それはしばしば、事実をも、自身さえをも歪めてしまう。\n――知っているから、懸命に凪の声を聞く。
2877 = "\"Nó thường xuyên bóp méo cả sự thật, bóp méo cả chính bản thân mình. ——Vì hiểu điều đó, nên tôi dốc lòng lắng nghe Nagi nói.\""

# 【凪】
# display as 凪
# JP: 「[むて,1]無手でんなんでん、本気で切りかかったとに、\nにーさんに軽くあしらわれて……ウチ、悔しかったと」
2031 = "\"「Dù là tay không đi nữa, em đã lao vào chém thật lòng, thế mà lại bị anh hai dễ dàng đối phó...... Em, đã rất cay cú á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「……悔しかったか」
1131 = "\"「......Cay cú sao.」\""

# monologue
# JP: 凪が素直に、こころの重荷を吐き出せるよう、\n僕も素直に、自分のこころを伝えよう。
2401 = "\"Để Nagi có thể ngoan ngoãn trút bỏ gánh nặng trong lòng, tôi cũng sẽ thành thật truyền đạt nỗi lòng của mình.\""

# 【双鉄】
# display as 雙鐵
# JP: 「が、僕の方とて、軽くあしらえてなどいなかった。\n身がすくむ程の迫力に、体が生き残ろうと動いただけだ」
1534 = "\"「Nhưng mà, anh cũng chẳng đối phó dễ dàng gì đâu. Sức ép đến mức rùng mình đó, cơ thể anh chỉ tự động phản ứng để sống sót thôi.」\""

# 【凪】
# display as 凪
# JP: 「そん迫力も……ウチの未熟なとこばい。\n本当にあのとき、[ハチロク,2]女の子のこと――助けたかったら」
1816 = "\"「Cái sức ép đó cũng là...... sự non nớt của em á. Nếu lúc đó, em thực sự muốn cứu cô gái đó——」\""

# monologue
# JP: じっと、凪が考え込む。\n凪らしくもない神妙さで。実に凪らしく、一心に。
2408 = "\"Nagi chìm vào trầm tư. Với một vẻ nghiêm túc không giống Nagi chút nào. Nhưng lại rất Nagi, vô cùng tập trung.\""

# 【凪】
# display as 凪
# JP: 「にーさんのこと観察して、気配を絶って、隙を伺って\n――絶対に一刀で倒せるまで、待つべきだったとよ」
1604 = "\"「Phải quan sát anh hai, che giấu khí tức, rình rập sơ hở ——phải đợi cho đến khi chắc chắn có thể hạ gục bằng một nhát chém á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1824 = "\"「À——」\""

# monologue
# JP: 確かにそれは、かつての凪には、\nまったくできていないことだった。
2503 = "\"Quả thực điều đó, đối với Nagi trước đây, là hoàn toàn không thể làm được.\""

# 【双鉄】
# display as 雙鐵
# JP: 「が――それも無理からぬことではなかろうか？\nハチロクを守ろうとする気持ちのゆえに」
1479 = "\"「Nhưng——đó cũng là chuyện không thể tránh khỏi mà phải không? Bởi vì em mang trong mình khao khát muốn bảo vệ Hachiroku.」\""

# 【凪】
# display as 凪
# JP: 「ばってん――守れんかったと」
1476 = "\"「Nhưng mà——đã không bảo vệ được á.」\""

# monologue
# JP: 声が、震える。
2400 = "\"Giọng nói, đang run rẩy.\""

# monologue
# JP: それを抑えようとするかのように、\n凪は唇をぎゅっと噛む。
2488 = "\"Như thể đang cố kìm nén nó lại, Nagi cắn chặt môi.\""

# 【凪】
# display as 凪
# JP: 「にーさんが本当に悪党だったら、守るどころか……\nあれで、助けるチャンスば――失くしてたばい」
1701 = "\"「Nếu anh hai thực sự là kẻ xấu, thì đừng nói là bảo vệ... Chỉ vì vậy mà em đã đánh mất——cơ hội cứu người á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「……それは、そうだな」
1130 = "\"「......Đúng là vậy nhỉ.」\""

# 【凪】
# display as 凪
# JP: 「誰かをまっこと守るためには、失敗は許されんけん。\nうちは――自分の未熟さが、悔しか」
1951 = "\"「Để thực sự bảo vệ ai đó, thất bại là điều không được phép nè. Em——rất hối hận vì sự non nớt của mình á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「失敗は許されん……\nそうしたことは、確かにあるよな」
1433 = "\"「Thất bại là điều không được phép... Những chuyện như vậy, quả thực là có nhỉ.」\""

# monologue
# JP: 僕も同じだ。\n失敗すれば、僕の生きている価値がなくなる。
2554 = "\"Tôi cũng vậy. Nếu thất bại, giá trị sống của tôi sẽ không còn.\""

# monologue
# JP: 路子が僕に渡してくれた、命を無駄にしてしまう。\nそう考えて、ずっと、行動してきたゆえに――
2853 = "\"Tôi sẽ lãng phí sinh mạng mà Michiko đã trao cho tôi. Vì luôn nghĩ như vậy và hành động dựa trên điều đó, nên——\""

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、自らを鍛え上げようとしたわけか」
1795 = "\"「Bởi vậy, em mới cố gắng rèn luyện bản thân sao.」\""

# monologue
# JP: 僕と同じであるのなら、\n凪の気持ちを推し量れる。
2498 = "\"Nếu em ấy cũng giống tôi, thì tôi có thể đoán được cảm xúc của Nagi.\""

# monologue
# JP: こくりと、凪が無言で頷く。\nその目がじわり、潤み始める。
2391 = "\"Nagi lặng lẽ gật đầu. Đôi mắt em ấy bắt đầu ươn ướt.\""

# 【凪】
# display as 凪
# JP: 「頭ばすぐにカーってなるの、ウチの悪いクセやけん。\nどうしても……どうしても――直したかったけん」
1731 = "\"「Cái tật hễ đụng chuyện là nóng máu lên ngay là thói xấu của em á. Dù thế nào... dù thế nào đi nữa——em cũng muốn sửa nó á.」\""

# monologue
# JP: ゆえに、凪は一心不乱に木刀をふるった。\n恐らく仏師が、木から仏を彫り出すのと同じように。
2593 = "\"Vì vậy, Nagi đã vung mộc kiếm một cách say sưa. Có lẽ cũng giống như một nhà điêu khắc tạc tượng Phật từ gỗ vậy.\""

# monologue
# JP: それが叶えば、斬り倒せたなら、\nかけている願が成就すると、ひたすら信じて。
2480 = "\"Nếu điều đó thành hiện thực, nếu có thể chém đổ nó, em ấy một lòng tin tưởng rằng tâm nguyện của mình sẽ được hoàn thành.\""

# 【凪】
# display as 凪
# JP: 「ばってん。ほんとはヤツアタリやけん。\nあぎゃんことで、何が直せるわけもなかったと」
1493 = "\"「Nhưng mà. Thực ra chỉ là giận cá chém thớt thôi nè. Làm mấy trò đó, thì sửa được cái gì đâu á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
1981 = "\"「Chuyện đó thì——」\""

# monologue
# JP: 違うと言いたい。\nけれども今は、言うべきではない。
2567 = "\"Tôi muốn nói là không phải vậy. Nhưng bây giờ, không phải lúc để nói điều đó.\""

# 【凪】
# display as 凪
# JP: 「直るどころか、事故ば起こして――じーちゃんにも、\nにーさんにも、みんなに、たくさん迷惑ばかけて――」
1555 = "\"「Đừng nói là sửa được, còn gây ra tai nạn——khiến cho ông, cho anh hai, cho mọi người, chuốc lấy bao nhiêu phiền phức——」\""

# monologue
# JP: 蓑笠老人が凪と一緒にあの後どれだけ頭を下げたか\n……僕も見ていて、心が傷んだ。
2779 = "\"Sau chuyện đó, ông Minokasa đã cùng Nagi cúi đầu xin lỗi bao nhiêu lần ......Tôi nhìn thấy cũng cảm thấy xót xa.\""

# monologue
# JP: 金銭的な賠償は、線路交換の実費だけであったが、\n交換作業へのボランティア参加までして下さった。
2884 = "\"Về mặt bồi thường tài chính, dù chỉ là chi phí thực tế để thay đường ray, nhưng họ còn tình nguyện tham gia vào công việc thay thế đó.\""

# 【凪】
# display as 凪
# JP: 「やけん、うち、ずっとにーさんにも謝りたくって。\nばってん、ちゃんとわからんうちは、謝りたくなくて」
1797 = "\"「Cho nên, em luôn muốn xin lỗi anh hai nè. Nhưng mà, khi chưa hiểu rõ mọi chuyện, em không muốn xin lỗi á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
# 1124 = "「……嗯」" 

# monologue
# JP: “ちゃんとわかる”必要があるのは、\nつけてしまった傷の重さだ。
2490 = "\"Điều cần phải \\\"hiểu rõ\\\" chính là mức độ nghiêm trọng của vết thương đã gây ra.\""

# monologue
# JP: それを計ることもできないうちに謝ろうとも、\n謝罪は恐らく、上辺をなぞるだけしか――っ！！
2492 = "\"Nếu chưa thể đong đếm được điều đó mà đã vội vàng xin lỗi, thì lời xin lỗi có lẽ cũng chỉ là ngoài mặt——っ!!\""

# monologue
# JP: （――ああ、そうなのか）
2921 = "\"（——A, ra là vậy sao.）\""

# monologue
# JP: 不意に、つながったような気がする。
2248 = "\"Đột nhiên, tôi cảm thấy mọi thứ dường như đã được kết nối.\""

# monologue
# JP: （向き合うことは、ちゃんとわかるということか。\nだからナビは、僕にそうしろとすすめてきたのか）
2947 = "\"（Đối mặt, nghĩa là hiểu rõ mọi chuyện sao. Đó là lý do Navi khuyên tôi làm vậy à.）\""

# 【凪】
# display as 凪
# JP: 「ばってん、今なら。鉄道のことば、線路の大事さ。\nウチも少しは、勉強できた気がするけん」
1495 = "\"「Nhưng mà, bây giờ thì. Chuyện về đường sắt, tầm quan trọng của đường ray. Em cũng cảm thấy mình đã học hỏi được một chút rồi á.」\""

# monologue
# JP: 凪が大きく頭を下げる。\n膝とおでこを、くっつける。
2394 = "\"Nagi gập người cúi đầu thật sâu. Trán gần như chạm vào đầu gối.\""

# 【凪】
# display as 凪
# JP: 「あのときは本当にごめんなさい！\nウチのこと、助けてくれてありがとう！！」
2012 = "\"「Lúc đó thật sự xin lỗi anh! Và cảm ơn anh đã cứu em!!」\""

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1635 = "「嗯」" 

# monologue
# JP: 『助けてくれてありがとう』。\nその一言から、凪の理解が伝わってくる。
2486 = "\"『Cảm ơn anh đã cứu em』. Từ một câu nói đó, tôi có thể cảm nhận được sự thấu hiểu của Nagi.\""

# monologue
# JP: “ちゃんとわかる”そのために、鉄道を知るそのために、\nどれほど多くの時間と努力を、凪が注ぎ続けてきたのかが。
2570 = "\"Để \\\"hiểu rõ\\\", để biết về đường sắt, Nagi đã đổ biết bao nhiêu thời gian và công sức vào đó.\""

# 【凪】
# display as 凪
# JP: 「もし、あのときあのまま大事故につながっとったら、\nウチはきっと、自分を許せなくなっとったばい」
1715 = "\"「Nếu lúc đó mà dẫn đến một tai nạn nghiêm trọng, em chắc chắn sẽ không bao giờ tha thứ cho bản thân mình đâu á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「凪の謝罪を、僕は喜んで受け入れる。\nその過去の過ちを、受け入れ、許そう」
1786 = "\"「Anh rất vui lòng chấp nhận lời xin lỗi của Nagi. Anh sẽ chấp nhận và tha thứ cho lỗi lầm trong quá khứ đó.」\""

# 【凪】
# display as 凪
# JP: 「あ――」
# 1626 = "「啊……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そして同時に僕からも、\n凪に、ありがとうと伝えさせて欲しい」
1595 = "\"「Đồng thời, anh cũng muốn nói lời cảm ơn với Nagi.」\""

# 【凪】
# display as 凪
# JP: 「ほえっ！？」
# 1621 = "「哎？！」" 

# monologue
# JP: 素っ頓狂な声と愛嬌のあるマヌケヅラ。
2405 = "\"Một giọng nói the thé cất lên cùng vẻ mặt ngơ ngác nhưng đáng yêu.\""

# monologue
# JP: 謝罪を終えて、受け入れられて、\n凪は重荷を捨て去ったのだと、一瞬だけで伝わってくる。
2585 = "\"Xin lỗi xong và được chấp nhận, chỉ trong khoảnh khắc, tôi cảm nhận được Nagi đã trút bỏ được gánh nặng.\""

# monologue
# JP: （ああ――凪はなんと、\nなんと伸びやかで強いのだ）
2919 = "\"（A——Nagi thật là, thật là một cô gái kiên cường và tràn đầy sức sống.）\""

# 【凪】
# display as 凪
# JP: 「なんでにーさんが、凪さまにありがとばい？\n凪さま、にーさんに何かしたと？？」
1872 = "\"「Sao anh hai lại cảm ơn Nagi nè? Nagi đã làm gì cho anh hai sao??」\""

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。大いに何かをしてくれた。\n大切なものを、大切なことを――教えてもらった」
1892 = "\"「Ừ. Em đã giúp anh rất nhiều đấy. Em đã dạy cho anh những điều quan trọng, những thứ quý giá——」\""

# 【凪】
# display as 凪
# JP: 「そいば、何ばい？」
1821 = "\"「Vậy, là cái gì nè?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「向き合うこと。ちゃんとわかること。\n――本当に向き合うとは、どういうことであるかをだ」
2037 = "\"「Việc đối mặt. Việc hiểu rõ ngọn ngành. ——Và thế nào mới là đối mặt thực sự.」\""

# monologue
# JP: 一番最初に問われたときには、考えた。
2476 = "\"Khi được hỏi lần đầu tiên, tôi đã suy nghĩ.\""

# monologue
# JP: 凪とハチロク。その二人と意識して向き合わなかったのは、\n『普段から素直に向き合えている』ゆえであろうと。
2578 = "\"Lý do tôi không chủ động đối mặt với Nagi và Hachiroku, là vì \\\"bình thường tôi vẫn luôn thành thật đối mặt với họ rồi\\\".\""

# 【凪】
# display as 凪
# JP: 「本当に向き合うことって、どぎゃんことばい？」
1463 = "\"「Đối mặt thực sự, là chuyện như thế nào á?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「今、凪が見せてくれたとおりだ。\n自分を隠さず、その傷とさえ、向き合うことだ」
1747 = "\"「Giống như những gì Nagi vừa cho anh thấy đấy. Không che giấu bản thân, và đối mặt với cả vết thương của chính mình.」\""

# monologue
# JP: けれど、違った。\n僕は単純に逃げていたのだ。
2253 = "\"Nhưng mà, không phải vậy. Tôi chỉ đơn thuần là đang chạy trốn.\""

# monologue
# JP: 相手と向き合うそのためには、相手一人とだけでなく、\n自分自身とも、向き合わなければならないゆえに。
2458 = "\"Để đối mặt với người khác, không chỉ là đối mặt với mỗi họ, mà còn phải đối mặt với chính bản thân mình nữa.\""

# 【双鉄】
# display as 雙鐵
# JP: 「それを出来ずにいたことが、\nそこから逃げ続けてきたことが、僕の傷が癒えない――」
1664 = "\"「Chính vì không thể làm được điều đó, chính vì luôn chạy trốn khỏi nó, nên vết thương của anh mới không thể lành——」\""

# monologue
# JP: いや、違う。\nその解釈では、自分と真に向き合えていない。
2244 = "\"Không, sai rồi. Cách giải thích đó vẫn chưa thực sự đối mặt với bản thân.\""

# 【双鉄】
# display as 雙鐵
# JP: 「つまりはそれが、僕の、自らの傷を癒やさない――\n僕が自ら、僕を殺していた理由だったのだ」
1453 = "\"「Nói tóm lại, đó chính là lý do khiến anh không tự chữa lành vết thương của mình—— là lý do khiến anh tự giết chết chính mình.」\""

# monologue
# JP: “生きながらにして死んでいた”\nそうと決めつけることにより、僕は、過去の自分を殺した。
2575 = "\"\\\"Sống mà như đã chết\\\" Bằng cách áp đặt suy nghĩ đó, tôi đã giết chết con người tôi trong quá khứ.\""

# monologue
# JP: 過去を殺して、事故の記憶を、痛みを恐れを封印し、\nそうすることで、新しい自分を生きようとした。
2606 = "\"Giết chết quá khứ, phong ấn ký ức về vụ tai nạn, nỗi đau và sự sợ hãi, bằng cách đó, tôi đã cố gắng sống như một con người mới.\""

# 【双鉄】
# display as 雙鐵
# JP: 「ずっと謝れなかったから。逃げずに向き合い続けたから。\nあのアクシデントがあったから。凪は、今の凪になれた」
1662 = "\"「Vì luôn không thể nói lời xin lỗi. Vì đã không chạy trốn mà tiếp tục đối mặt. Vì có sự cố đó. Nên Nagi mới trở thành Nagi của hiện tại.」\""

# 【凪】
# display as 凪
# JP: 「そぎゃんこつ、あたりまえのことばい」
2015 = "\"「Chuyện đó, là đương nhiên rồi nè.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「だな。けれど、そのあたりまえを、\n僕は否定しようとしてしまっていたんだ」
1826 = "\"「Đúng vậy. Thế nhưng, điều hiển nhiên đó, anh lại đang cố gắng phủ nhận nó.」\""

# monologue
# JP: ――とても、とても歪な形で。
1025 = "\"——Dưới một hình hài vô cùng, vô cùng méo mó.\""

# monologue
# JP: 誰より大事な妹の夢を見たときにさえ、\nそれを忘れてしまうほど、過去の自分を抑える形で。
2460 = "\"Dưới hình hài kìm nén con người quá khứ của mình, đến mức ngay cả khi mơ thấy đứa em gái quan trọng hơn bất cứ ai, tôi cũng quên mất điều đó.\""

# 【双鉄】
# display as 雙鐵
# JP: 「――それではいけなかったんだ。\n右田双鉄と[そごう,1]十川双鉄を、別人にしてはいけなかったんだ」
1985 = "\"「——Như thế là không được. Không được phép biến Migita Soutetsu và Sogou Soutetsu thành hai người khác biệt.」\""

# monologue
# JP: 過去の僕がいて、今の僕がいる。
2669 = "\"Có tôi của quá khứ, thì mới có tôi của hiện tại.\""

# monologue
# JP: 全ては連続しているし、傷も痛みも罪さえも――\nどれが欠けても、僕は、僕になれなかった。
2223 = "\"Tất cả đều là một chuỗi liên tục, vết thương, nỗi đau, hay thậm chí là tội lỗi—— thiếu đi bất cứ thứ gì, tôi cũng không thể trở thành chính tôi.\""

# 【双鉄】
# display as 雙鐵
# JP: 「……そう思えるのは。そう思えるようになったのは。\n僕が僕を、今の僕自身を評価できるようになれたからだ」
1128 = "\"「......Sở dĩ anh có thể nghĩ như vậy. Có thể trở nên nghĩ như vậy. Là vì anh đã có thể đánh giá được chính mình, chính bản thân anh hiện tại.」\""

# monologue
# JP: みんなのおかげと、素直に思う。\n心のそこから、ただ感謝だけが沸き起こってくる。
2855 = "\"Thành thật mà nói, tất cả là nhờ mọi người. Từ tận đáy lòng, chỉ có sự biết ơn trào dâng.\""

# 【双鉄】
# display as 雙鐵
# JP: 「みんなが僕を、あたためつづけてくれたから。\n僕は自分を、認められるようになったのだ」
1838 = "\"「Vì mọi người đã luôn sưởi ấm cho anh. Nên anh mới có thể chấp nhận chính mình.」\""

# 【凪】
# display as 凪
# JP: 「よーわからんけど、にーさんはにーさんばい？\n変わっても変わらんでも、認めても認められんでも」
2032 = "\"「Tuy em không hiểu lắm, nhưng anh hai vẫn là anh hai mà? Dù có thay đổi hay không, dù có được công nhận hay không á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1827 = "「是啊」" 

# monologue
# JP: 僕は、僕。\n傷も痛みも罪悪感も、全てが僕で、双鉄だ。
2563 = "\"Tôi, là tôi. Vết thương, nỗi đau, cảm giác tội lỗi, tất cả đều là tôi, là Soutetsu.\""

# monologue
# JP: 押しつぶしていたそれらと向き合い、許してはじめて。\n僕はきっと、僕になれる――大人の男に、なれるのだろう。
2535 = "\"Chỉ khi đối mặt và tha thứ cho những thứ từng bị đè nén đó. Tôi mới có thể thực sự trở thành chính mình——trở thành một người đàn ông trưởng thành.\""

# 【双鉄】
# display as 雙鐵
# JP: 「そんな当然のことも見失うほど――\n僕は、事故を恐れてしまっていたんだ」
1782 = "\"「Đến mức đánh mất cả một điều hiển nhiên như vậy—— anh đã quá sợ hãi vụ tai nạn đó.」\""

# monologue
# JP: だから、凪と向き合えなかった。\nそうして、だから、ハチロクとも――
2599 = "\"Đó là lý do tôi không thể đối mặt với Nagi. Và cũng là lý do tôi không thể đối mặt với Hachiroku——\""

# 【凪】
# display as 凪
# JP: 「いまはもう、怖くなかと？」
1515 = "\"「Bây giờ anh hết sợ rồi hả?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、怖いさ。とても怖い。だが、それが、嬉しい。\n怖いと素直に、認められることが」
1441 = "\"「Không, anh sợ chứ. Rất sợ là đằng khác. Nhưng, anh lại thấy vui vì điều đó. Vì anh có thể thành thật thừa nhận rằng mình đang sợ.」\""

# 【凪】
# display as 凪
# JP: 「怖かとが嬉しいだなんて、ヘンなにーさんばい」
1567 = "\"「Vừa sợ lại vừa vui, anh hai kì lạ quá nè.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。ヘンだな」
1832 = "\"「Đúng vậy. Kỳ lạ thật.」\""

# monologue
# JP: 押さえ続けた自分の歪みは、きっとすぐには治らんだろう。\nあるいは一生、歪んだままでいるかもしれん。
2561 = "\"Sự méo mó của bản thân mà tôi đã kìm nén bấy lâu nay, chắc chắn sẽ không thể chữa khỏi ngay được. Hoặc có lẽ, nó sẽ cứ méo mó như vậy suốt phần đời còn lại.\""

# monologue
# JP: けれども、そこから目を逸らすまい。\n歪みの形を正しく知って、上手につきあっていけばいい。
2292 = "\"Thế nhưng, tôi sẽ không lảng tránh nó nữa. Chỉ cần hiểu rõ hình dạng của sự méo mó đó và khéo léo sống chung với nó là được.\""

# 【双鉄】
# display as 雙鐵
# JP: 「だが、ヘンな僕が僕なのだ。\nそのことに、凪が気づかせてくれたのだ」
1485 = "\"「Nhưng mà, con người kỳ lạ đó chính là anh. Và Nagi đã giúp anh nhận ra điều đó.」\""

# 【凪】
# display as 凪
# JP: 「凪さま、なんにもしてなかとよー」
1846 = "\"「Nagi có làm gì đâu chứ~」\""

# monologue
# JP: 凪が、笑う。\nとても穏やかに、あたたかに。
2411 = "\"Nagi, mỉm cười. Một nụ cười rất dịu dàng và ấm áp.\""

# 【凪】
# display as 凪
# JP: 「ただきっと、にーさんが気付きたがっていたとよ。\nそのタイミングに、凪さまたまたまいただけばい」
1678 = "\"「Chỉ là chắc chắn anh hai đã muốn nhận ra điều đó thôi nè. Và Nagi tình cờ có mặt đúng lúc đó á.」\""

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな」
1457 = "\"「Cũng có thể là vậy.」\""

# monologue
# JP: いいや、実際そうなのだろう。\n歪ながらに、みんなと向き合い続けたことが――
2255 = "\"Không, thực tế chắc chắn là vậy. Dù có méo mó, việc tiếp tục đối mặt với mọi người——\""

# monologue
# JP: そのあたたかさに包まれ続けてきたことが、\n凍えきってた僕自身の種を、芽吹かせたのだ。
2629 = "\"Việc luôn được bao bọc trong sự ấm áp đó, đã khiến hạt giống đóng băng trong tôi đâm chồi nảy lộc.\""

# 【双鉄】
# display as 雙鐵
# JP: 「だとしても、僕は、凪にお礼をいいたい」
1753 = "\"「Dù là vậy, anh vẫn muốn nói lời cảm ơn Nagi.」\""

# 【凪】
# display as 凪
# JP: 「なら！　にーさんっ！」
2004 = "\"「Vậy thì! Anh hai!」\""

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1651 = "「嗯？！」" 

# monologue
# JP: 体が、勝手に引いてしまう。
2835 = "\"Cơ thể tôi, tự động lùi lại.\""

# monologue
# JP: 凪はいま、指一本さえ動かさず、\nけれども僕を、切りつけてきた。
2407 = "\"Nagi lúc này, dù không hề nhúc nhích một ngón tay, nhưng lại đang chém về phía tôi.\""

# 【凪】
# display as 凪
# JP: 「さすがにーさん、ナマってなかとねー」
1675 = "\"「Quả không hổ danh anh hai, phản xạ vẫn nhạy bén như xưa nè~」\""

# 【双鉄】
# display as 雙鐵
# JP: 「いや、今のは誰でも逃げるだろう」
1439 = "\"「Không, cú vừa rồi thì ai mà chẳng tránh.」\""

# monologue
# JP: その反論に答えずに、\n凪はニッカリ、笑ってみせる。
2392 = "\"Không thèm đáp lại lời phản bác đó, Nagi toét miệng cười.\""

# 【凪】
# display as 凪
# JP: 「凪さま、にーさんと立会いたかと！　今のにーさんの剣、\nどぎゃんか凪さま、見てみたかとばい！」
1848 = "\"「Nagi, muốn giao đấu với anh hai! Kiếm pháp hiện tại của anh hai, Nagi muốn xem thử nó ra sao á!」\""

# 【双鉄】
# display as 雙鐵
# JP: 「今の僕など、凪の足元にも及ばんぞ」
1470 = "\"「Anh bây giờ, còn lâu mới bằng được Nagi.」\""

# monologue
# JP: 汰斗さんに言われて始めたことゆえ、\n今も素振りは欠かしていないが――それだけだ。
2457 = "\"Vì bắt đầu do lời dặn của ông Taito, nên bây giờ tôi vẫn không bỏ bê việc vung kiếm——nhưng cũng chỉ có thế.\""

# monologue
# JP: 剣道部を作り、日々、中村さんと切磋琢磨をしあっている、今の凪には、恐らく瞬殺されるだろう。
2383 = "\"Với Nagi hiện tại, người đã lập ra câu lạc bộ kendo và hàng ngày rèn luyện cùng cô Nakamura, có lẽ tôi sẽ bị hạ gục trong chớp mắt.\""

# 【凪】
# display as 凪
# JP: 「そいでよかとよ」
1994 = "\"「Thế cũng được mà nè.」\""

# monologue
# JP: 優しい、声だ。\n凪らしくもない――けれども凪の、大人の声だ。
2685 = "\"Một giọng nói, thật dịu dàng. Chẳng giống Nagi chút nào——thế nhưng đó lại là giọng nói của Nagi khi đã trưởng thành.\""

# 【凪】
# display as 凪
# JP: 「だってにーさん、ずっとしょってた重かとを、\nきっと、もーすぐおろすとでしょお？」
1663 = "\"「Bởi vì anh hai, cái gánh nặng anh vác trên lưng bấy lâu nay, chắc chắn, sắp trút xuống được rồi phải không nè?」\""

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
# 1626 = "「啊……」" 

# monologue
# JP: そんな話をした記憶など、まるで無い。
2551 = "\"Tôi hoàn toàn không có ký ức gì về việc đã nói chuyện đó.\""

# monologue
# JP: むしろお互い、傷があるゆえ、\n事故に関するような話は、自然と避け続けてきた筈だ。
2239 = "\"Đúng hơn là vì cả hai đều mang trong mình những vết thương, nên lẽ ra chúng tôi đã luôn tự nhiên tránh nhắc đến những chuyện liên quan đến vụ tai nạn.\""

# monologue
# JP: （――ああ。\n凪は、本当に凪なのだな）
2902 = "\"（——A. Nagi, quả nhiên vẫn là Nagi.）\""

# monologue
# JP: それでも凪には、見えていたのだ。
2425 = "\"Dù vậy, Nagi vẫn nhìn thấy.\""

# monologue
# JP: 僕自身、まるで自覚をせぬままに、\n重荷をずっと、好んで背負い続けていたと。
2714 = "\"Bản thân tôi, trong lúc hoàn toàn không tự nhận thức được, đã luôn tự nguyện gánh vác gánh nặng đó.\""

# 【凪】
# display as 凪
# JP: 「そいばおろしたにーさんが、どぎゃん剣ばふるうか――\n凪さま、ちょこと興味あるけん！！！」
1808 = "\"「Anh hai sau khi trút bỏ nó sẽ vung thanh kiếm như thế nào—— Nagi, hơi bị tò mò rồi á!!!」\""
