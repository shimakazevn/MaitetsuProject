[script]
# lines: 507 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2929 = "（哐啷，哐啷，哐啷，哐啷……）" 

# 【路子】
# display as 路子
# JP: 「そーちゃん！　そーちゃん！！」
1745 = "「小雙！小雙！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！？」
1651 = "「嗯？！」" 

# monologue
# JP: 路子の声に起こされる。\nさっき布団に入ったばかりだというのに――ああ、違う。
2830 = "路子的聲音叫醒了我。我明明才剛進被窩……不對。" 

# monologue
# JP: それほど早くに、僕は夢へと落ち込んだ。\nあるいはきっと――路子が呼んでくれたのだ。
2718 = "看來我很快就墜入了夢鄉。或許是因為路子在呼喚著我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした路子。そんなにあわてて」
1774 = "「怎麼了，路子。你為什麼慌慌張張的」" 

# 【路子】
# display as 路子
# JP: 「もうすぐなんでしょ！　みちね、わかるの！\nパパとママ、みちの近くに来てくれてるって！」
2045 = "「馬上就要來了！小路能感覺到！爸爸媽媽快要來接小路了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――そうなのか」
1133 = "「……這樣啊」" 

# monologue
# JP: 聞かされて、さほど自分が驚かないでいることに驚く。\nああ、ならば――
2721 = "真沒想到，我聽到這個消息後並不算很吃驚。這樣看來——" 

# monologue
# JP: 僕もこころのどこかでは、予期を\n……あるいは覚悟を、していたのだろう。
2558 = "我其實已經有所預料……或者說是做好心理準備了吧。" 

# 【路子】
# display as 路子
# JP: 「だからね？　きっともうすぐ、\nそーちゃんのれっ車、走るんだなって」
1800 = "「所以，小雙的列車一定馬上就能跑起來了吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もうすぐ……か。\nすぐ、というほどに早くは走り始められんが」
2044 = "「馬上啊……也沒那麼快吧」" 

# 【路子】
# display as 路子
# JP: 「そーなの？」
1835 = "「是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、大きく厳しかった山を越えたことは確かだ。\n災いが、転じて福となったゆえ」
1483 = "「但是我們確實跨越了難關，轉禍為福了」" 

# 【路子】
# display as 路子
# JP: 「わざわい？」
1116 = "「“禍”是什麼意思？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「とても大きな困りごとのことだな。\n線路を繋げるためのお金が、足りなくなりかけたのだ」
1749 = "「就是巨大的困難。連接線路需要的資金馬上要不夠用了」" 

# 【路子】
# display as 路子
# JP: 「えええっ！？」
1621 = "「哎？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。\nもう、乗り越えてしまえたことだから」
1812 = "「放心，我們已經解決了」" 

# monologue
# JP: 幼いままの路子にも、どれほど危険かが伝わる事態。\nそれゆえ急ぎ言葉を重ね、路子の不安をすぐに解く。
2862 = "連依然年幼的路子都能明白事態有多危急。所以我急忙補上一句，解除她的擔憂。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみが、ポーレットが、皆が、それぞれ。\nできる全てを尽くしてくれたゆえ、越えられたのだ」
1432 = "「不僅是深美和波萊特，所有人全都盡了自己最大的努力，所以我們才能跨越難關」" 

# monologue
# JP: ――本当に、災い転じて福となった。\nマイアさんの紹介してくれた[フランク銀行,1]佛銀の担当者は、優秀だった。
1030 = "——真是轉禍為福了。邁雅阿姨介紹的法國銀行負責人非常優秀。" 

# monologue
# JP: 彼の作成した国際日ノ本鉄路債。通称、ヒノモトボンドは、\nフランクを皮切りに、実に7カ国で販売されるに至った。
2282 = "他擬定的國際日本鐵路債券——通稱日本債券，以法國為起點，最終銷售向了七個國家。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お金を集めるための努力がそのまま、宣伝になり、\n人気を呼んだ。その結果、御一夜を含む九洲各地へ」
1780 = "「我們籌集資金的努力也起到了宣傳效果，成功為包括御一夜在內的九州各地聚集了人氣」" 

# 【路子】
# display as 路子
# JP: 「それでなんだ！　外国のおきゃくさんふえてるの！\n8620が今ひっぱってる、緑色のれっ車とかすごいよね」
1988 = "「這樣呀！所以國外的遊客才會增加呀！８６２０現在拉著的綠色列車就好厲害」" 

# 【双鉄】
# display as 雙鐵
# JP: 「クマ一号試験客車と、クマ二号試験客車か」
1516 = "「你說隈元一號、二號測試客車啊」" 

# 【路子】
# display as 路子
# JP: 「クマっていうの？　あのれっ車。かわいい！」
1999 = "「那叫隈元號呀？長得好可愛！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに可愛いな。廃棄された\x%l気動車;#00ffc040;気動車%l;#;を改造した、\n急造の試験客車とはまるで思えない」
1909 = "「確實很可愛。完全看不出是用廢棄\\x%l気動車;#00ffc040;動車%l;#;趕製的測試客車」" 

# monologue
# JP: ゆえに、特に珍しいもの好きの外国人に好まれている。
2598 = "所以喜歡稀奇事物的外國人特別中意。" 

# monologue
# JP: 人を乗せての試験走行のための抽選倍率が、\n100に近づいてしまうことさえあるほどに。
2836 = "載人行駛測試的應徵者人數，甚至達到了乘客容量的近百倍。" 

# 【路子】
# display as 路子
# JP: 「しけんきゃくしゃって？」
1870 = "「測試客車是什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「文字通り、様々な試験を行うための\x%l客車;#00ffc040;客車%l;#;だ。\n僕らの列車。ナインスターズを走らせるための」
1724 = "「字面意思，就是用來進行各種測試的\\x%l客車;#00ffc040;客運車廂%l;#;。有了它才能讓我們的列車——九星成功運行起來」" 

# monologue
# JP: ナインスターズは、基本的には伝統工芸や、\n枯れた技術の組み合わせにより、設計され運用される。
2269 = "九星基本上是將早已普及的基礎技術進行組合，再加上傳統工藝設計而成的。" 

# monologue
# JP: が、今まで誰一人試していない、\n“枯れた技術の組み合わせ”も、いくらでもある。
2300 = "但是，其中也有幾項從未有人嘗試過的“基礎技術組合”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、ナインスターズの一部をシャワー室とし、\nそこには小さな風呂桶もつける計画があった」
1862 = "「比如我們有個計劃，把九星的一部分劃為浴室，在裡面放上小浴桶」" 

# 【路子】
# display as 路子
# JP: 「わ！　れっ車で旅をしながらおふろはいれるの！？」
1613 = "「哇！一邊坐車旅行，一邊還能泡澡嗎？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「試験がうまく行き、かつ諸問題も解決できていればな。\nそのための実験をする\x%l客車;#00ffc040;客車%l;#;が、試験客車だ」
1708 = "「如果測試順利，並且解決了各種問題就可以。用來做這些實驗的\\x%l客車;#00ffc040;客運車廂%l;#;，就是測試客車」" 

# monologue
# JP: 風呂桶を線路方向、\x%l枕木;#00ffc040;枕木%l;#;方向、いずれに設置するべきか。\nどれほどの湯が零れてしまい、何リットルを消費するのか。
2802 = "該把浴桶順線路方向，還是\\x%l枕木;#00ffc040;枕木%l;#;方向設置？路上會灑出多少水？水的消耗量又如何？" 

# monologue
# JP: データがまるでないことならば、\n実車を走らせ、試していく他に手段は無い。
2618 = "既然完全沒有數據可以參考，那就只能讓列車實際跑起來試一試了。" 

# 【路子】
# display as 路子
# JP: 「じゃ、クマさんたち、おふろついてるの？」
2017 = "「那隈元號上面都有浴室嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「一時期にはついていた。しかし、もうない。\n残念ながら、今後つけられることもないだろう」
1843 = "「有一段時間有，但是現在已經沒有了。很可惜，以後大概也不會再有了」" 

# 【路子】
# display as 路子
# JP: 「えー」
1435 = "「不是吧……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「試験の結果、今予定されているナインスターズ\x%l編成;#00ffc040;編成%l;#;では、\n風呂桶の設置は極めて厳しいとわかってしまったからな」
1770 = "「從測試結果來看，以九星目前設計中的\\x%l編成;#00ffc040;編組%l;#;，想設置浴桶非常困難」" 

# 【路子】
# display as 路子
# JP: 「そおなんだー」
1989 = "「這樣啊……」" 

# monologue
# JP: 9室×6人で、最大54人の乗客。\nその全員に同じ湯を使いまわさせるわけにもいかない。
2267 = "九個六人間，乘客最多可達五十四人，不可能讓所有人都用同一桶水。" 

# monologue
# JP: 家族風呂扱いとし、9回の入浴で済ませるのなら、\n複数人が一度につかれる、より大型の風呂桶が必要となる。
2505 = "如果要設計成家庭浴室，讓入浴次數縮減為九次，就必須設置能夠容納多人的大型浴桶。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つかれるタイプの風呂において、\n日ノ本人は恐るべき量の水を消費する」
1667 = "「在泡澡的時候，日本人會用掉驚人多的水」" 

# monologue
# JP: 風呂桶の湯を完全入替えとする場合、\n一走行、一人の入浴につき、平均300リットル弱の消費。
2306 = "假設完全更換浴桶內的水，一趟下來平均每人需要消耗近三百升的水。" 

# monologue
# JP: これが最低でも9回。一日につき、3t近くの水の追加と、\nそれをおさめるためのタンクが必用となってしまう。
2765 = "而這至少需要九次。每天要追加近三噸的水，就必須要有裝水的水槽。" 

# 【双鉄】
# display as 雙鐵
# JP: 「"蒸機の湯"として、ボイラ水や水タンク内の水をという\n案も出たが、全区間を蒸機牽引というわけでもない」
1455 = "「也有人提議改為“蒸汽機車之浴”，使用鍋爐水或者水櫃裡的水，但是也不可能每段都用蒸汽機車牽引」" 

# monologue
# JP: それに、水タンクにいれる水には、井戸水や湧水の利用も\n珍しくない。クレームリスクを、そこで抱えたくもない。
2763 = "而且水櫃內裝的水經常來自井水或者地下水。我不希望因為這個被乘客投訴。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、様々に検討した結果、車内はシャワーだけとした。\nその代わり、各地方必ず、温泉駅での入浴停車を設けた」
1792 = "「所以我們經過探討，決定只在車裡設置淋浴。作為替代，各地區都會在溫泉站停車，供乘客入浴」" 

# 【路子】
# display as 路子
# JP: 「にゅうよくていしゃ！　おもしろそー！！」
1523 = "「停車入浴！感覺好好玩！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「実質、食事・観光の時間も含めてのドカ停だがな。凪の\n『お風呂停車すればよかと！』の声が、決め手となった」
1535 = "「其實把進餐、觀光的時間也包含進去了，也就是說會\\x%lドカ停;#00ffc040;長時間停車%l;#;。這都是多虧凪當時說了句“停車洗澡就行唄！”」" 

# 【路子】
# display as 路子
# JP: 「おもしろーい！」
1694 = "「好有意思！」" 

# monologue
# JP: 言って笑って、けれどもすぐに、\n路子は少し不満げな顔に変わってしまう。
2831 = "路子說著露出了笑容，但馬上又轉為不滿。" 

# 【路子】
# display as 路子
# JP: 「だけど、れっ車のおふろ。\nせっかくしけんしたのに、もったいないねぇ」
1496 = "「但是，好不容易做了列車浴室的實驗，取消掉就太可惜了吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、そうでもない。クマ一・クマ二は、\n本当に良く、試験に耐えてくれたからな」
1437 = "「不，也不是完全取消。多虧隈一、隈二努力把測試堅持下來了啊」" 

# monologue
# JP: 安全基準を満たしながらの改造につぐ改造は、\n\x%l台枠;#00ffc040;台枠%l;\x%l台車;#;#00ffc040;台車%l;#;車体全てに、回復不能な疲労をためた。
2329 = "兩輛列車為了達到安全標準而進行了改造，在這基礎上的第二次改造，更是給\\x%l台枠;#00ffc040;車架%l;#;、\\x%l台車;#00ffc040;轉向架%l;#;、車體造成了無法恢復的損耗。" 

# monologue
# JP: その代償を払ってまでも得たデータ群は、\n必ず御一夜――いや、日ノ本の鉄道全ての資産となる。
2288 = "以這些代價換來的數據，一定會成為御一夜——不，會成為日本所有鐵路的寶貴資產。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いつか、未来に。必ず風呂桶を乗せた列車が走る。\n僕らの試験を、決して無駄になど終わらせはしないさ」
1920 = "「總有一天，鐵路上一定會馳騁著裝載了浴桶的列車。我們絕對不會浪費這次測試的成果」" 

# 【路子】
# display as 路子
# JP: 「そーなんだ！」
1991 = "「這樣啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それに、\nクマ一・クマ二の試験終了後の職場も決まっている」
1941 = "「而且隈一、隈二在測試結束後的工作地點也已經決定了」" 

# 【路子】
# display as 路子
# JP: 「そーなの？」
# 1835 = "「是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「車籍を外れ、[あさぎり,1]麻霧駅に留置。レンタルスペースとして\n地域の皆様や、僕らの役に立ち続けることになる」
1737 = "「將它們移除車籍，放置在麻霧站。作為可租賃空間，繼續給當地的居民和我們作貢獻」" 

# 【路子】
# display as 路子
# JP: 「みんながあつまる場所になるの？」
1841 = "「會變成很多人聚集的地方嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしていきたい。ナインスターズの基礎を固める――\n鉄道再建の、影の立役者となる車両なのだから」
1984 = "「這是我們的願望。因為它們奠定了九星的基礎，是重建鐵路的幕後功臣啊」" 

# 【路子】
# display as 路子
# JP: 「そっか！　それならきっとクマさんたちもうれしいね」
1987 = "「這樣呀！　那隈元號一定會很開心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうであるなら、僕らにとっても嬉しいことだな」
1713 = "「如果真能成功，我們也會感覺很榮幸」" 

# 【路子】
# display as 路子
# JP: 「ね！　そーちゃん」
1943 = "「聽我說，小雙！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1630 = "「啊！」" 

# monologue
# JP: 僕をみあげる路子の瞳に、\n何故か瞬間、物凄い郷愁を感じてしまう。
2825 = "路子仰視著我，這讓我莫名感受到了濃烈的鄉愁。" 

# monologue
# JP: キラキラ輝く、こどもらしい――\nああ、そうだ。これが路子の……僕の妹のまなざしだ。
2481 = "她的眼神閃閃發光，稚氣未脫……啊，沒錯。這是屬於路子的——屬於我妹妹的目光。" 

# 【路子】
# display as 路子
# JP: 「おふろをつんであるれっ車。\nすぐにはむりでも、みらいに、みち、のれるかなぁ」
1755 = "「就算短時間內不行，小路在未來……能坐上有浴室的列車嗎」" 

# monologue
# JP: 未来――ああ。\nそうだ、路子にも必ず未来が待ってる。
2643 = "未來……沒錯，路子也一定擁有未來。" 

# monologue
# JP: 父さんと母さんが迎えにきたなら。\nそこから再び――新しい路子の時間は、動き出すのだ。
2620 = "既然父母來迎接路子了，那麼她也會再次迎來新生。" 

# 【双鉄】
# display as 雙鐵
# JP: 「乗れる」
1423 = "「一定能」" 

# monologue
# JP: 言葉が、勝手にこぼれ出ていく。\n路子の前では決して流せぬ、涙の代わりであるかのように。
2800 = "話語彷彿替代了在路子面前絕不會流下的眼淚，情不自禁奔湧而出。" 

# 【双鉄】
# display as 雙鐵
# JP: 「乗れるとも。路子が望む、どんな列車にだって、必ず。\nそうするために――僕は、ずうっと頑張っているんだ」
1422 = "「一定可以。只要是你的願望，不管什麼樣的列車，我都會讓它實現。為了這個目標——我一直在努力」" 

# 【路子】
# display as 路子
# JP: 「ほんと！？　ならね、そーちゃん――\nあのね？　お耳かして」
1902 = "「真的嗎？！這樣的話……小雙，你湊過來一下」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1650 = "「嗯？」" 

# monologue
# JP: ひそひそと、路子が僕に聞かせてくれる。\nあどけない、とても子供らしい、列車の夢を。
2828 = "路子在我耳邊低聲說了幾句。那是她純真而幼稚的、關於列車的夢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1125 = "「……噢」" 

# monologue
# JP: 少年時代の僕がきっと夢見て、捨ててしまっていた夢を、\n僕のふたごの妹が、そうっと差し出し、返してくれる。
2525 = "少年時代的我懷揣著夢想，而現在我的雙胞胎妹妹，將我拋棄的夢想交還給我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――楽しみにしていろ。路子。\n僕が必ず。走らせてやるし、乗せてやる」
1511 = "「你就期待著那一天吧，路子。我一定會實現它，讓你坐上那樣的列車」" 

# 【路子】
# display as 路子
# JP: 「うんっ！！」
1637 = "「嗯！！」" 

# monologue
# JP: そうだ、僕は、何を勘違いしてしまっていたんだ。\nナインスターズを走らせること、路子を送り届けること。
2520 = "對，是我誤會了。讓九星行駛起來，以及將路子送達最終的目的地——" 

# monologue
# JP: そこは確かに終着駅だが――同時に、始発駅でもある。\n未来へ、列車を。もっと未来へ――
2854 = "這的確是終點站，但同時也是嶄新的始發站。列車將載著她，駛向未來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
1626 = "「啊……」" 

# monologue
# JP: 瞬きをして、いま僕は、目を開いているのだと――\n手を握ってはまた開き、現実感を確かめる。
2584 = "我眨了眨眼，發現自己正睜著眼睛。我握緊拳頭，然後再鬆開，確認這份現實感。" 

# monologue
# JP: つまりは、今のは……\n俗にいう、白昼夢というやつだろう。
2270 = "也就是說……剛才的是白日夢啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、やっぱり――\n夢で、路子と会っていたんだ」
1787 = "「我果然……是在夢裡見到了路子啊」" 

# monologue
# JP: よすがであるなら、過去にも何度も感じてはいた。\nきっと路子だろうと思い、そうあって欲しいと願っていた。
2852 = "這是我們之間的因緣吧，過去也有幾次同樣的感覺。我在心中如此期望著，那些時候我一定也是見到了路子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「路子と会って。話していたんだ」
1789 = "「我見到了路子，還跟她說話了啊」" 

# monologue
# JP: 一眠りのあと、悩みが解けていることがあった。\nうたた寝をして起きたというのに、体が軽くなっていた。
2642 = "有時一覺醒來就解開了煩惱，有時只是打個瞌睡，就感覺身體輕鬆不少。" 

# monologue
# JP: そうしたときには、今と同じく。\nきっと路子が、僕を励ましてくれてたのだろう。
2225 = "一定都是因為路子鼓勵了我吧，就像剛才一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「父さんと母さんと、もうすぐ会える。か――」
1692 = "「她馬上就能見到父親母親了啊……」" 

# monologue
# JP: 覚えている。はっきりと。\n路子と交わした言葉を、声を。
2590 = "我還清晰記得她的話語與聲音。" 

# monologue
# JP: 路子がどれほどキラキラと、\n瞳を輝かせてくれたかを。
2286 = "以及她那時的目光有多麼耀眼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばまず、ナインスターズ一号列車を走らせて。\nその更に先まで、レールを伸ばしていかねばならんな」
2042 = "「首先得讓九星一號列車跑起來。還要讓鐵軌延伸向更遠的地方」" 

# monologue
# JP: ごく単純な理屈が悩みを解いてくれる。
2221 = "一個極其簡單的道理解開了我的煩惱。" 

# monologue
# JP: ポーレットからの一任も、\n運転部長として既に受けている。
2564 = "我已經接受了波萊特任命的運營部長職位。" 

# 【双鉄】
# display as 雙鐵
# JP: 「鈴木さん、しばらくお願いします」
2021 = "「鈴木小姐，麻煩你看顧一下」" 

# monologue
# JP: 事務員の鈴木さんへとレールショップをひととき預け、\n未来を担う若者達の姿を探す。
2571 = "我把鐵路商店交給事務員鈴木小姐關照，去尋找肩負未來的年輕人們。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ああ、中村さんはここであったか」
1123 = "「……哦，中村小姐在這裡啊」" 

# monologue
# JP: 8620をオイルで磨いてくれている。\n丹念に丹念に――ただひたすらに丹念に。
2478 = "她正聚精會神地給８６２０擦油。" 

# monologue
# JP: 極めて単調な作業というのに、\n驚くほどに集中している。
2851 = "這是件極為單調的工作，她卻做得全神貫注、一絲不苟。" 

# monologue
# JP: （さすがは、凪のライバルか）
2937 = "（真不愧是凪的勁敵啊）" 

# monologue
# JP: 学園生時代の凪を、ほとんど常に退け続けてきた、\n九洲最強、全国屈指の剣道少女――
2262 = "中村小姐可以說是九州最強、全國首屈一指的劍道少女，學生時代的凪都屢屢敗在她手下。" 

# monologue
# JP: いや、立派な社会人となった今となっては、\n少女よばわりも失礼だろうが。
2251 = "不過她現在已經成長為一名出色的員工，再用少女來稱呼就太失禮了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「中村さん。少しいいかな」
1446 = "「中村小姐，能跟你聊兩句嗎」" 

# monologue
# JP: 声をかければ、整備の手が止まる。\nウェスをまとめ、零さぬように油を床の上に戻して。
2265 = "中村小姐聽到我搭話，就停下了忙於整備工作的手。她收拾好擦機布，小心翼翼把油放回地上。" 

# monologue
# JP: それから姿勢を整え直して、僕と向き合う。\n――小動物めいた容姿ゆえ、その落ち着きが際立ち目立つ。
2694 = "然後她端正好姿勢，向我轉過身來。她身材嬌小，所以讓沉穩的氣質變得極為顯眼。" 

# 【中村】
# display as 中村
# JP: 「右田\x%l機関士;#00ffc040;機関士%l;#;。おはようございます」
1578 = "「右田\\x%l機関士;#00ffc040;司機%l;#;，早安」" 

# 【凪】
# display as 凪
# JP: 「おおっ、にーさん来たと？」
1618 = "「哇，大哥哥來啦？」" 

# monologue
# JP: 凪は\x%lピット;#00ffc040;ピット%l;#;に潜っていたのか。\n声とほとんど同時に姿が現れる。
2374 = "凪似乎在\\x%lピット;#00ffc040;維修區%l;#;，話音未落就探出了身子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふたりとも揃っているなら、話が早い。\nできれば、みくろにも」
1504 = "「你們兩個都在啊，那談起來就方便多了。能不能把美玖路也叫過來」" 

# 【凪】
# display as 凪
# JP: 「みくろー！　みくろー！\nにーさんが呼んどるばい！！」
1927 = "「美玖路！美玖路！大哥哥叫你嘞！！」" 

# 【みくろ】
# display as 美玖路
# JP: 「はぁい。いまいきまーす」
1696 = "「好的，馬上就來」" 

# monologue
# JP: 研修庫の方から声がする。\n今日も今日とて、みくろはD51 1031を――
2663 = "檢修庫方向傳來了美玖路的聲音。她今天也在細心地給Ｄ５１　１０３１做整備工作吧。" 

# monologue
# JP: 湯富院で解体を待つのみの窮地から、奇跡の復元を遂げた\nデゴイチを、大事に整備していたのだろう。
2878 = "那輛Ｄ５１在湯布院等待解體的絕境中奇蹟般盼來了修復的機會。" 

# 【みくろ】
# display as 美玖路
# JP: 「みくろ、来ました。\n右田\x%l機関士;#00ffc040;機関士%l;#;、ご用はなんですか？」
1921 = "「美玖路來了。右田\\x%l機関士;#00ffc040;司機%l;#;，有什麼事嗎？」" 

# 【凪】
# display as 凪
# JP: 「この三人を集めたんなら決まっとるばい！\nあの話ばい！！」
2019 = "「都把咱們三人叫到一起了！還不就是那件事唄！！」" 

# 【中村】
# display as 中村
# JP: 「[やたけ,1]屋岳越えのことでしょうか？」
1963 = "「跨越矢岳嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その通りだ」
1865 = "「沒錯」" 

# monologue
# JP: 現在のクマ一・クマ二には、\x%l死重;#00ffc040;死重%l;#;をたっぷり載せている。\nナインスターズ客車の設計重量と同じ重さになるように。
2703 = "現在的隈一、隈二上裝載了很多\\x%l死重;#00ffc040;呆重%l;#;。這是為了模擬九星客車的設計重量。" 

# monologue
# JP: これにみかん鉄道、松裏九洲線、阿蘇山岳鉄道から\nそれぞれ貸与された\x%l客車;#00ffc040;客車%l;#;、電源車、\x%l貨車;#00ffc040;貨車%l;#;もつけ――
2349 = "再掛接上從橙鐵路、松浦九州線、阿蘇山岳鐵路那裡，分別借來的\\x%l客車;#00ffc040;客運車廂%l;#;、供電車、\\x%l貨車;#00ffc040;貨運車廂%l;#;——" 

# 【双鉄】
# display as 雙鐵
# JP: 「仮想ナインスターズによる屋岳越え。\nこの三名に、\x%l補機;#00ffc040;補機%l;#;の運用を任せてみたい」
1857 = "「模擬九星跨越矢岳的時候，我想讓你們三個來駕駛\\x%l補機;#00ffc040;補機%l;#;」" 

# 【凪】
# display as 凪
# JP: 「わおわお！　やったばい！！\nやーっと凪様、チームリーダーになれるばい！！」
1615 = "「哇！好嘞！！本小姐可算當上車組長囉！！」" 

# 【中村】
# display as 中村
# JP: 「嬉しいお知らせですが、急すぎて違和感を覚えます。\n一番強く反対していたのは、右田\x%l機関士;#00ffc040;機関士%l;#;だったでしょう」
1911 = "「確實是個好消息。可是這麼突然，反倒讓我感覺很奇怪。最強烈反對的不就是你嗎，右田\\x%l機関士;#00ffc040;司機%l;#;」" 

# 【凪】
# display as 凪
# JP: 「わー！　[ちかげ,1]千景ちゃん！　余計なこと聞かんと！\nもしにーさんの気ば変わったら」
1616 = "「哇！小千！別瞎問啦！大哥哥要讓你問變卦了怎麼辦」" 

# 【みくろ】
# display as 美玖路
# JP: 「でも、みくろもそこは気になります。\n理由があるなら、きちんと知って運行したいです」
1499 = "「但是，美玖路也很好奇。希望能在知曉原委的情況下進行駕駛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1635 = "「嗯」" 

# monologue
# JP: ――やはり、これはこれで良いチームだ。\n突破力、分析力、視野の広さ。
2471 = "她們三人果然是個優秀的車組。兼具突破力、分析力、寬闊的眼界。" 

# monologue
# JP: それぞれが他に無いものを、\n綺麗に補いあっている。
2514 = "完美互補了各自的缺陷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「8620は、D51 1031を\x%l補機;#00ffc040;補機%l;#;とする屋岳越えに、\n過去何度となく成功している」
2051 = "「８６２０過去多次以Ｄ５１　１０３１為\\x%l補機;#00ffc040;補機%l;#;，成功跨越了矢岳」" 

# monologue
# JP: 最初は短い\x%l編成;#00ffc040;編成%l;#;で、\x%l機関士;#00ffc040;機関士%l;#;宗方、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィ助士赤井という、ベテランチームの\x%l補機;#00ffc040;補機%l;#;運用により。
2231 = "一開始是短\\x%l編成;#00ffc040;編組%l;#;，以宗方\\x%l機関士;#00ffc040;司機%l;#;、\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;奧莉薇、赤井司爐組成的老手隊伍駕駛\\x%l補機;#00ffc040;補機%l;#;。" 

# monologue
# JP: そこから助士に、凪、日々姫、中村を混ぜ、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;をニイロク、みくろに交代し――
2695 = "然後讓凪、日日姬、中村參與司爐工作，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;換為二六、美玖路。" 

# 【双鉄】
# display as 雙鐵
# JP: 「様々な組み合わせを試験した。が、比較的経験に乏しい\n君たちのみによる\x%l補機;#00ffc040;補機%l;#;運転は、一度も任せたことがない」
1590 = "「各式各樣的組合都測試過了。但是，還從來沒有隻讓經驗尚不豐富的你們駕駛過\\x%l補機;#00ffc040;補機%l;#;」" 

# monologue
# JP: 言えば、三人は深く頷く。
2236 = "三人聽到我的話，用力點了點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その理由が、わかるか？」
1505 = "「你們知道是為什麼嗎？」" 

# 【凪】
# display as 凪
# JP: 「ウチたちじゃまだ危なっかしいって、\nにーさんが思っとるからばい！」
1680 = "「大哥哥肯定是覺得，光咱們幾個太危險了唄！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1635 = "「嗯」" 

# 【中村】
# display as 中村
# JP: 「万一のときの被害が深刻なものになりかねないから。\nそれも、大きな理由の一つだと思います」
1895 = "「發生意外的時候會釀成非常嚴重的後果。這也是重要的原因之一吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、それも大きな理由だ」
1893 = "「當然，這也是一大原因」" 

# monologue
# JP: D51形は8620形よりも遥かに重い。\nそして8620形ほどに優れた\x%l粘着力;#00ffc040;粘着力%l;#;も有していない。
2953 = "Ｄ５１型的重量遠超８６２０型。而且也沒有８６２０型那麼優秀的\\x%l粘着力;#00ffc040;黏著力%l;#;。" 

# monologue
# JP: もし後補機のD51 1031が登坂中に\x%l空転;#00ffc040;空転%l;#;、\x%l滑走;#00ffc040;滑走%l;#;、逆走すれば、\n8620と\x%l客車;#00ffc040;客車%l;#;達は、そのまま引きずられる可能性がある。
2495 = "如果後補機Ｄ５１　１０３１在上坡時出現了\\x%l空転;#00ffc040;空轉%l;#;、\\x%l滑走;#00ffc040;打滑%l;#;、反向溜逸，８６２０和\\x%l客車;#00ffc040;客運車廂%l;#;可能會受到拖拽。" 

# 【双鉄】
# display as 雙鐵
# JP: 「D51に巻き込まれ、全ての車両が逆走して落ちていけば、\n恐らくはどこかで脱線。一番下になるD51は潰されよう」
1702 = "「如果所有車輛都被Ｄ５１影響反向溜逸下墜，恐怕會在某個位置脫軌。位於最下方的Ｄ５１就會死無全屍」" 

# 【中村】
# display as 中村
# JP: 「――」                                                                                                         
1117 = "「……」" 

# 【みくろ】
# display as 美玖路
# JP: 「そんな事故が今起きたら、ナインスターズ計画も潰れる。\nそれも、きっと大きな理由ってみくろ、思います。
1711 = "「如果現在發生事故，九星計劃也會破產。美玖路覺得，這也是個重要的原因吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1827 = "「是啊」" 

# monologue
# JP: 8620の復活が、オール御一夜の象徴ならば\nD51 1031の復活は、オール九洲の象徴だ。
2507 = "如果說８６２０的復活是全御一夜體制的象徵，那麼Ｄ５１　１０３１的復活，就是全九州體制的象徵。" 

# monologue
# JP: 湯富院で放置されボロボロだったD51が、術仙の工場で\n復元され、雄武田の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とともに、再び走る――
2613 = "放置在湯布院破舊不堪的Ｄ５１，在術仙的工廠得到復原，與大牟田的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;一道，再次飛馳於鐵軌上——" 

# monologue
# JP: （その復元も、術仙に集った、九洲中の――\n日ノ本中の技師達の業によるものだ）
2949 = "（Ｄ５１的復原，也要歸功於全九州——乃至於全日本聚集在術仙的技工們啊）" 

# monologue
# JP: その一角を、数年前までは御一夜の町の、\nごく普通のボイラー屋さんだった、秦さんが担ってくれた。
2738 = "秦先生直到幾年前，還只是御一夜普普通通的鍋爐店老闆，但這次也在其中作出了貢獻。" 

# monologue
# JP: 術仙に入り浸るようになり、蒸機ボイラーを学び始め、\n今では熟練の技師たちも舌を巻く存在となった、秦さんが。
2284 = "他融入了術仙，開始學習蒸汽機車鍋爐技術，現在的水準已經連老技工都為之咂舌。" 

# 【双鉄】
# display as 雙鐵
# JP: 「D51 1031号機は、結束と復活との大きな象徴のひとつだ。\n鉄道関係者だけではなく、一般市民からの注目度も高い」
2054 = "「Ｄ５１　１０３１號機是結束與復活的重要象徵之一。不僅是鐵路從業人員，普通市民對它也十分重視」" 

# monologue
# JP: 再び、三人が同時に頷く。
2234 = "三人再次同時點頭。" 

# monologue
# JP: ミッションの難度、重要度を、生命の危機をも示唆されて、\nけれどわずかも、瞳の強さはゆるがない。
2574 = "我提醒了她們任務的難度、重要程度以及危險程度，但她們的眼神依舊堅定。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、君たちにはまだ任せられないと考えた。\nが――だからこそ、君たちに任せねばと、考え直した」
1801 = "「所以，我之前覺得這件事還不能交給你們。但是……我現在改變主意了，正因為這樣，才應該交給你們」" 

# 【凪】
# display as 凪
# JP: 「にーさん！　気付くのがおそかとばい！！」
1683 = "「大哥哥！你怎麼現在才想通咧！！」" 

# 【中村】
# display as 中村
# JP: 「右田\x%l機関士;#00ffc040;機関士%l;#;。もう少し詳しく聞かせてください。\nどうして、だからこそなんですか？」
1579 = "「右田\\x%l機関士;#00ffc040;司機%l;#;，請你說得具體一些。為什麼應該交給我們？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ナインスターズ専用客車。\n[きゅうじゅう,1]90系客車群は、間もなくロールアウトする」
1452 = "「九星專用客運車廂，９０系客運車廂編組馬上就要首次亮相了」" 

# monologue
# JP: ……みくろはわかっているのだろうか？\n何も言わずに、何も問わずに、ただ穏やかに笑っている。
1072 = "……美玖路似乎是明白了什麼。她一言不發，只是在旁邊安靜地笑著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこから営業運転開始までに習熟してもらうためには、\n今が、ギリギリのタイミングだと判断した」
1953 = "「要想在商業運營開始之前讓你們的身手熟練起來，現在再不動起手就來不及了」" 

# 【中村】
# display as 中村
# JP: 「ですから、その判断を下した理由を聞かせてください」
1803 = "「所以，請告訴我們為什麼會下這樣的判斷」" 

# 【双鉄】
# display as 雙鐵
# JP: 「決まっている。君たち、若い世代こそが、\nナインスターズを――その更に先を、担っていくからだ」
1891 = "「當然是因為你們作為新一代，肩負著九星的——肩負著未來的重擔」" 

# 【凪】
# display as 凪＆中村
# JP: 「！」
# 1630 = "「啊！」" 

# monologue
# JP: 若い世代が、古い世代を押し上げて、\n屋岳の峠を――難所を越えて、レールをつなぐ。
2616 = "新一代推動老一代，跨越矢岳這一難關，將鐵路聯繫起來。" 

# monologue
# JP: その光景は必ずや、大廃線からの鉄道復活にとどまらぬ、\n『未来への延伸』を象徴する景色となるだろう。
2873 = "那一幕將不僅象徵著鐵路的復活，更是邁向未來的標誌。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いつかは必ず任せることになる。\nその“いつか”が今日だと――僕は、そう感じたのだ」
1919 = "「總有一天要讓你們承擔起這份責任。我覺得……那就是今天了」" 

# 【凪】
# display as 凪
# JP: 「千景ちゃん！」
1564 = "「千景！」" 

# 【中村】
# display as 中村
# JP: 「蓑笠さん」
1947 = "「蓑笠小姐」" 

# monologue
# JP: 凪と中村さんとの目が合う。\nふたり、同時に頷き合う。
2385 = "凪和中村小姐對視了一眼，同時點了點頭。" 

# 【凪】
# display as 凪
# JP: 「にーさん、やるばい！！\nウチたち、絶対やりとげるけん！！」
1686 = "「大哥哥，咱要做！！咱們一定會做好這工作的！！」" 

# 【中村】
# display as 中村
# JP: 「教えてもらって、取り組む意義がはっきりしました。\nだから、必ず成功させます」
1942 = "「聽到你這麼說，我明白這次安排的意義所在了。所以，我一定會讓這次測試成功的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。君たちなら出来ると確信している」
1640 = "「嗯，我相信你們一定能做到」" 

# monologue
# JP: ……そうだ。確信なら、とうの昔からできていた。\n中村さんが入社して、凪と組みはじめて僅か二ヶ月――
1069 = "……沒錯，我很久以前就如此確信了。中村小姐入職，和凪組成搭檔僅僅過去兩個月——" 

# monologue
# JP: その頃からもうこの新コンビは、その恐るべき勘の良さを、\n赤井・宗方、両ベテランからさえ、認められていたから。
2850 = "這對新組合從那時開始就展現出了驚人的敏銳，連赤井、宗方兩位老司機都認可了她們的能力。" 

# monologue
# JP: （……にもかかわらず、僕がためらった理由なら――）
2900 = "（……但我還是猶豫不決）" 

# monologue
# JP: 事故を、恐れた。\nただそれだけのことだろう。
2591 = "或許單純是因為害怕發生事故吧。" 

# monologue
# JP: が、事故を恐れて止まるのならば、\n僕は、路子は――永遠に、終着駅にはたどり着けない。
2290 = "但如果因為害怕事故就止步不前，我和路子……就永遠無法抵達終點站。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、頼む」
1806 = "「拜託你們了」" 

# monologue
# JP: \x%l補機;#00ffc040;補機%l;#;の運転のことばかりは、\n僕自身には何もできない。
95 = "\\x%l補機;#00ffc040;補機%l;#;的駕駛方面，我根本沒辦法親自出手。" 

# monologue
# JP: ハチロクとともに今まで重ねた訓練と指導の成果を信じ、\nひたすら託す他にない。
2596 = "所以只能相信她們與八六日積月累訓練與指導的成果，將一切都託付給她們。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕達を、8620を。君たちの助けで屋岳の上まで、\nどうか、押し上げてやってくれ」
1762 = "「幫助我們，幫助８６２０登上矢岳的山巒吧」" 

# 【ハチロク】
# display as 八六
# JP: 「みくろ。\x%l加減弁;#00ffc040;加減弁%l;#;、いま全開です」
1934 = "「美玖路，現在\\x%l加減弁;#00ffc040;汽門%l;#;全開」" 

# monologue
# JP: ――普段であれば無いことだ。
1027 = "——放在平時根本不會發生這種事。" 

# monologue
# JP: 僕達にも聞こえるようにだろう。\nみくろへ送る\x%l共感;#00ffc040;共感%l;#;を、ハチロクは声に出してくれる。
2334 = "八六或許是為了讓我們也都能聽見——她將與美玖路的\\x%l共感;#00ffc040;共鳴%l;#;的交流內容說了出來。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、\x%l投炭;#00ffc040;投炭%l;#;もあげるけん」
2025 = "「阿哥，咱開始\\x%l投炭;#00ffc040;加煤%l;#;了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1635 = "「嗯」" 

# monologue
# JP: ――僕からは、ほとんど何も指示していない。\nけれど黙々、30.3パーミルを、8620は登り続ける。
2566 = "我幾乎沒有發出過指示。但８６２０還是默默在坡度３０．３‰的上坡上行駛著。" 

# monologue
# JP: 無論、速度はガクリと落ちるが、\nそうありながら、極めて走行は安定している。
2861 = "速度當然降了很多，但行駛極為平穩。" 

# monologue
# JP: （後補機が――D51 1031が、それほど僕らを、\n力強く、効率良く助けてくれているのだ）
2933 = "（後補機——Ｄ５１　１０３１，對我們的輔助竟是如此有力且高效）" 

# monologue
# JP: 同調させるべき出力が、大きすぎても小さすぎても、\nそれは主務機の――8620の負荷になる。
2437 = "只要功率的同步出現絲毫偏差，都會造成本務機車——８６２０的負擔。" 

# monologue
# JP: 赤井ニイロク組とでも、宗方オリヴィ組とでも\nかくも快適な登坂は、ついぞ経験したことがない。
2690 = "無論是赤井二六車組，還是宗方奧莉薇車組，都沒有讓上坡過程如此順利過。" 

# monologue
# JP: （これが若さか、成長か――\nいや）
2943 = "（這就是新一代的成長啊……且慢）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、すまんが」
1530 = "「八六，不好意思」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。なんでしょう、双鉄様」
1461 = "「什麼事，雙鐵少爺？」" 

# monologue
# JP: 最大勾配。\x%l逆転機;#00ffc040;逆転機%l;#;は\x%l前進フルギア;#00ffc040;前進フルギア%l;#;の最大トルク。\n\x%l加減弁;#00ffc040;加減弁%l;#;も、基本、全開で登りきる。
2638 = "最大坡度。\\x%l逆転機;#00ffc040;回動機%l;\\x%l前進フルギア;#;#00ffc040;滿檔前進%l;#;，最大扭矩。\\x%l加減弁;#00ffc040;汽門%l;#;也基本是全開狀態。" 

# monologue
# JP: 登坂までに速度をあげつつ蒸気の量を節約し。\nそうした全てを、ここで一気に叩き込むのだ。
2238 = "上坡之前加速時節約下的蒸汽，現在要一口氣全部投入進去。" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！　――っ！」
1629 = "「啊！　……唔！」" 

# monologue
# JP: ゆえ、この状況での主役は日々姫。\n歯を食いしばるようにして、ひたすら\x%l投炭;#00ffc040;投炭%l;#;を繰り返す。
2603 = "所以現在的主角就是日日姬了。她咬緊牙關，不停地\\x%l投炭;#00ffc040;加煤%l;#;。" 

# monologue
# JP: 沸かす蒸気が使う蒸気に追いつかなくなってしまうなら、\n8620は登り続けるための力を失ってしまうのだから。
2777 = "蒸汽要是跟不上消耗量，８６２０就會失去上坡的動力。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2035 = "「雙鐵少爺？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――いや」
1627 = "「啊……我沒事」" 

# monologue
# JP: 無論、僕とて油断できない。\nなにか不測の事態が起きれば、非常制動せねばならない。
2705 = "當然，我也不能放鬆。萬一出現意外狀況，就必須進行緊急剎車。" 

# monologue
# JP: それが遅れて、万が一にも逆走の事態に至ってしまえば、\nどんな\x%l制動;#00ffc040;制動%l;#;をかけようと、重力に負けてしまうゆえ。
2501 = "如果我操作遲了，萬一陷入列車反向溜逸的絕境，到時候如何\\x%l制動;#00ffc040;減速%l;#;都無法戰勝重力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この状況なら、添乗に確認を願えるかと思ったのだが。\nどうだろうか」
1880 = "「現在這個情況，我覺得可以請求陪同人員協助確認。你覺得怎麼樣」" 

# 【ハチロク】
# display as 八六
# JP: 「そのことでしたら、すでに確認いたしております」
1783 = "「我已經確認過了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1630 = "「啊！」" 

# monologue
# JP: 前方注視は崩せない。\nけれども、はっきり伝わってくる。
2556 = "我依然保持著目視前方，但卻能清晰地感受到。" 

# monologue
# JP: ハチロクは静かに微笑んでいる。\nごく穏やかに――そうありながら、誇らしげに。
2343 = "八六靜靜微笑著。她平靜的笑容中透露著自豪。" 

# 【ハチロク】
# display as 八六
# JP: 「添乗の宗方\x%l機関士;#00ffc040;機関士%l;#;、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィともに、\n本日の乗務に関し、一切の指示を行ってはございません」
2028 = "「陪同的宗方\\x%l機関士;#00ffc040;司機%l;#;、\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;奧莉薇，都沒有對今天的乘務工作發出任何指示」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1990 = "「這樣啊」" 

# monologue
# JP: ハチロクもその確認を飛ばしていたほど、\n後補機は、本当に見事な運転だ。
2863 = "連八六都特地確認情況，說明後補機的駕駛確實很穩健。" 

# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;・凪での8620の運転は、\n昨今はまったく珍しいことではなくなっていたが――
2380 = "凪作為\\x%l機関士;#00ffc040;司機%l;#;駕駛８６２０早已是稀鬆平常的事情了，但是……" 

# monologue
# JP: （D51でもここまでやるとは。適正の高さに甘えず、\nよほどの努力を重ね続けていたのだな）
2944 = "（連Ｄ５１都能駕駛得這麼平穩啊。這說明她沒有依賴自己的天賦，而是持之以恆地付出了努力）" 

# monologue
# JP: D51の復元が果たされ、本線で再び走りはじめてから、\nまだ一年も経っていない。
2956 = "Ｄ５１復原後再次開始在幹線行駛還不到一年時間。" 

# monologue
# JP: 習熟のためも兼ねている湯医線客車列車の運行ですら、\nD51の凪\x%l機関士;#00ffc040;機関士%l;#;での乗務は確かまだ、200時間も無い筈だ。
2428 = "即便把為熟悉操作而牽引湯醫線客運列車的時間也算上，凪在Ｄ５１上以\\x%l機関士;#00ffc040;司機%l;#;身份做乘務的經驗也不到２００小時。" 

# 【双鉄】
# display as 雙鐵
# JP: 「習熟のため、\nなにか、特別な工夫をしていたのかな」
1691 = "「她是為了熟悉工作，背地裡自己搞了什麼訓練吧」" 

# 【ハチロク】
# display as 八六
# JP: 「D51\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の知り合いを作ったようですよ？\nみくろと凪とで、ときおり訪ねにいっております」
1550 = "「凪好像交到了其他的Ｄ５１的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;朋友。美玖路和凪有時會一起去拜訪」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――では、そのこの列車で\n訓練を積ませてもらっていたのかもしれんな――っと」
1899 = "「看來，也許是用那邊的列車進行了訓練……啊」" 

# monologue
# JP: じわじわ、蒸気圧が下がり始める。\nこここそ屋岳の正念場だ。
2775 = "蒸汽壓力開始逐漸下降。這裡就是跨越矢岳的關鍵了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lブロワー;#00ffc040;ブロワー%l;#;！」
1094 = "「\\x%lブロワー;#00ffc040;風管%l;#;！」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！！」
1633 = "「啊！！」" 

# monologue
# JP: （ザッ！　ザッ！！！）
2930 = "（唰啦！唰啦！！！）" 

# 【ハチロク】
# display as 八六
# JP: 「みくろ。主務機\x%lブロワー;#00ffc040;ブロワー%l;#;です」
1931 = "「美玖路，本務機車開始通風」" 

# monologue
# JP: \x%lブロワー;#00ffc040;ブロワー%l;#;をかけ\x%l火室;#00ffc040;火室%l;#;内での燃焼を助けてやればすぐさま、\n日々姫が\x%l投炭;#00ffc040;投炭%l;#;のペースをあげる。
2856 = "通風讓\\x%l火室;#00ffc040;燃燒室%l;#;內的火勢變得更旺，日日姬馬上加快了\\x%l投炭;#00ffc040;加煤%l;#;的節奏。" 

# 【日々姫】
# display as 日日姬
# JP: 「給水、まだ我慢してよかと？」
1993 = "「還不能加水嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
1738 = "「對」" 

# monologue
# JP: 勾配の影響で、水面計の正確な数値はよみとれん。\nが、見た目ではかなり低下している。
2456 = "因為上坡的影響，水位計的數值無法正確讀出。不過，水位看起來已經相當低了。" 

# monologue
# JP: だがしかし、ここで給水をしてしまうなら、\nボイラー温度が下がってしまい、蒸気の量が危うくなる。
2296 = "但是如果現在加水，鍋爐溫度就會下降，蒸汽量也會不足。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l溶栓;#00ffc040;溶栓%l;#;が匂い始めるまで、給水は控えて構わん。\nが、大丈夫だ。そうなる前に――」
1100 = "「\\x%l溶栓;#00ffc040;易熔塞%l;#;散發出氣味之前都不用加水。沒問題，不用等那麼久——」" 

# 【日々姫】
# display as 日日姬
# JP: 「――うん！！」
1102 = "「——嗯！！」" 

# monologue
# JP: ボボボボ、と、8620は息を切らさず、登り続ける。\n愚直に、愚直に、緩むことなく――
2450 = "啵啵啵啵——８６２０毫不停歇，繼續向上攀登。心無旁騖，一路向前。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[カットオフ,4]逆転機中立。\x%l加減弁;#00ffc040;加減弁%l;#;全閉。\x%l自弁;#00ffc040;自弁%l;#;、\x%l制動;#00ffc040;制動%l;#;。\nよし！　給水！！」
1657 = "「回動機中位檔。\\x%l加減弁;#00ffc040;汽門%l;#;關閉。\\x%l自弁;#00ffc040;自剎%l;#;、\\x%l制動;#00ffc040;減速%l;#;。好！加水！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「給水！！」
1562 = "「加水！！」" 

# monologue
# JP: 登りきったと同時に日々姫がバルブをひねる。\nざーーっと水の流れていく音。
2711 = "登上最高點的同時，日日姬擰開閥門，傳來一陣水流聲。" 

# 【双鉄】
# display as 雙鐵
# JP: 「一気にはやりすぎるなよ」
1554 = "「別一次性放太多」" 

# 【日々姫】
# display as 日日姬
# JP: 「わかっとるばい！」
1605 = "「咱知道！」" 

# monologue
# JP: ――峠を登れば、すぐに駅。
1028 = "——登上山頂之後，很快就能到達車站。" 

# monologue
# JP: 利用客などほとんどいない――\n列車と僕らが休むための、屋岳の駅だ。
2726 = "矢岳站幾乎沒有乘客使用，只用來給我們和列車休整。" 

# 【日々姫】
# display as 日日姬
# JP: 「発車時刻までに、蒸気圧ばばっちり戻すけん！」
1896 = "「發車之前會讓蒸汽壓力完全恢復的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。よろしく頼む」
1649 = "「嗯，靠你了」" 

# monologue
# JP: ――停止位置、ぴたり。\n止めると同時に、後ろD51もぴたりと止まる。
2308 = "停車位置很完美，後面的Ｄ５１也同步停了下來。" 

# monologue
# JP: 全く押されず、がくんと引っ張られることもなかった。
2631 = "時機精確無比，全無拖拽或是衝撞。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ブレーキタイミングも完璧か」
1561 = "「剎車時機也很完美啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　そこは私も出来るとよ？\nにぃにのタイミングで、私も凪ちゃんも覚えとるけん」
1632 = "「啊！我也辦得到哦！我和小凪都記得阿哥的停車時機嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1653 = "「噢……」" 

# monologue
# JP: 言われて、ようやく理解する。\n宗方・赤井両\x%l機関士;#00ffc040;機関士%l;#;は、『僕の運転』に習熟してない。
2768 = "聽她這麼一說，我總算明白了。宗方、赤井兩位\\x%l機関士;#00ffc040;司機%l;#;都不熟悉我的駕駛習慣。" 

# monologue
# JP: オリヴィとニイロクも同様だ。\nが、凪・日々姫なら。ハチロクの直接の妹のみくろなら。
2468 = "奧莉薇和二六也是一樣。但是凪、日日姬，還有八六的妹妹美玖路就不同了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「生え抜きとは――受け渡すとは、\nそうした強さを持つものなのだな」
1769 = "「得到傳承的老員工，就會有這種優勢啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「そりゃそーよ！　ハチロクとにぃににわたし達、\n大事に育ててもらったけんね」
1889 = "「當然了！我們是八六和阿哥悉心培養起來的嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そこを差し引いても、だ」
1475 = "「但就算去掉這一點，你們還是很優秀」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
1636 = "「嗯！」" 

# monologue
# JP: ようやくワンスコを床につけ、\n日々姫が明るい笑顔を浮かべる。
2626 = "日日姬把公斤鍬擱到地上，露出了開朗的笑容。" 

# 【日々姫】
# display as 日日姬
# JP: 「凪ちゃんと中村さん、[うま,1]上手かったとねー！」
1743 = "「小凪和中村小姐幹得真不錯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。文句の付け所もみつからん」
1830 = "「是啊，無可挑剔」" 

# monologue
# JP: 最初の一度がこの出来だと、むしろ二度目が怖くなる。
2743 = "第一次就做得這麼好，反倒讓我擔心下一次的行駛。" 

# monologue
# JP: 油断・慢心――\n特に凪には、気をつけてもらいたくなるところゆえ。
2706 = "疏忽大意、驕傲自滿……尤其要讓凪注意避免這些。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;と助士も見事でしたが、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――みくろも素晴らしい仕事をしました」
1097 = "「\\x%l機関士;#00ffc040;司機%l;#;和司爐都做得很好，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;——美玖路完成得也很出色」" 

# monologue
# JP: ハチロクも、笑顔と声を輝かせている。
2333 = "八六也興奮地笑著說道。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしたち、日ノ本式の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にとって、\n半身たる車輌を離れ、他の車輌を動かすことがどれ程に」
1740 = "「對我們這些日本式\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;來說，要離開至親的車輛，控制別的車輛是非常困難的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、ハチロク」
1529 = "「八六啊」" 

# monologue
# JP: 輝くからこそ、もったいないと感じてしまう。\nだから制帽の上からそっと、ハチロクの頭を撫でて伝える。
2667 = "正因為她的笑容十分動人，我才感到有些遺憾。於是我隔著帽子輕輕撫摸八六的頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その賞賛を一番最初に耳にすべきは、\nきっと、僕らではないと思うぞ？」
1916 = "「第一個聽到你的讚美的人，肯定不應該是我們吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1630 = "「啊！」" 

# monologue
# JP: とろけるような――\nああ、ハチロクは、こんな笑顔を隠していたのか。
2341 = "八六露出了燦爛的笑容——原來她也會這樣笑啊。" 

# monologue
# JP: これほど身近にいる僕でさえ、初めて目にするその笑顔は、\n車番の離れた妹への、純粋な愛情のあらわれだろう。
2529 = "就連跟她最為親近的我，都是第一次看到這副笑容。這是她對車號相隔甚遠的妹妹的真情流露吧。" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね、双鉄様。ありがとうございます。\nわたくしきっと、一番にみくろに伝えてあげます」
1833 = "「是啊，雙鐵少爺，謝謝。我一定會先告訴美玖路的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ならば、そうするためにも」
1648 = "「嗯，那就得先完成今天的任務啊」" 

# 【ハチロク】
# display as 八六
# JP: 「はい！」
1695 = "「好的！」" 

# monologue
# JP: 信号は、青。発車時刻。\n蒸気圧もすっかり回復している。
2305 = "信號機亮起綠燈，到了發車時間。蒸汽壓力也完全恢復了。" 

# 【日々姫】
# display as 日日姬
# JP: 「圧良し！　発車準備良し！」
1668 = "「壓力正常！發車準備完畢！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「信号良し！　時期良し！　出発！」
1522 = "「信號燈確認完畢！時機無誤！出發！」" 

# 【双鉄】
# display as ３人
# JP: 「進行！」
1560 = "「前進！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Excellent！　ほんと良かった！！\n最後まで、ナギ、よく集中つづいたねー」
2056 = "「Ｅｘｃｅｌｌｅｎｔ！真是太好了！！凪集中精神堅持到最後了呀」" 

# 【凪】
# display as 凪
# JP: 「えへへー、凪さま頑張ったばい！」
1652 = "「嘿嘿，本小姐可努力了！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ナカムラも！　ナギえんりょなく蒸気使うのに、\nいっかいも危なくならなかったねー！　えらい！！」
1444 = "「中村做得也很好！凪消耗蒸汽的時候一點也不客氣，蒸汽量卻從來沒有跟不上！了不起！！」" 

# 【中村】
# display as 中村
# JP: 「――仕事ですから。\n当然のことですけれど、ご評価は嬉しいです」
1983 = "「這就是我的職責。完成職責是我的義務，但是能得到誇獎我很開心」" 

# monologue
# JP: ……一番小さなオリヴィが、一番大きな顔をして、\n若者達を褒めに褒めている。
1066 = "……最嬌小的奧莉薇擺出一副長輩的樣子，誇獎著年輕人們的工作。" 

# monologue
# JP: 確かにふたりは、賞賛に値する働きをした。\nそうして、ふたりだけでなく――
2472 = "她們的努力確實值得讚賞。而且不僅是她們兩個……" 

# 【みくろ】
# display as 美玖路
# JP: 「みくろ、感激です！　お姉様」
1924 = "「美玖路感激不盡！多謝姐姐大人！」" 

# 【ハチロク】
# display as 八六
# JP: 「大げさですよ、みくろ。\nあなたの仕事を、正当に評価しただけではないですか」
1507 = "「你太激動了，美玖路。我只是對你的工作給予了正當評價」" 

# 【みくろ】
# display as 美玖路
# JP: 「そうしてもらえることが、お姉様の役に立てたことが、\nみくろ、とっても幸せなんです」
1945 = "「能幫上姐姐大人的忙，還得到了誇獎，美玖路感覺好幸福」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1620 = "「哎呀」" 

# monologue
# JP: ――みくろの果たした仕事もやはり、\nハチロクによって賞賛されている。
1033 = "——美玖路的工作成果不出意外得到了八六的褒獎。" 

# monologue
# JP: それがよっぽど嬉しいのだろう。\nみくろはほとんど、涙目だ。
2757 = "美玖路都快哭出來了，看來是真的很高興吧。" 

# 【みくろ】
# display as 美玖路
# JP: 「[うちのこ,4]38696を置いてくの、[おおむた,2]雄武田を離れるの、\nみくろ、ほんとに不安だったんですけど――」
1884 = "「留下[那孩子,4]３８６９６，離開大牟田，美玖路真的覺得好擔心——」" 

# 【ハチロク】
# display as 八六
# JP: 「ええ。わかりますよ」
1638 = "「嗯，我明白」" 

# 【みくろ】
# display as 美玖路
# JP: 「それでも、思い切って来てよかったです！\n[うちのこ,4]38696もきっと、園のみんなと喜んでくれてます！」
1489 = "「但是，下定決心來這裡真是太好了！[那孩子,4]３８６９６和動物園的朋友們肯定都會很高興！」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ、動物園でしたね。あなたの車輌――\n38696号機が、\x%l静態保存;#00ffc040;静態保存%l;#;されているのは」
1622 = "「哦，你的車輛——３８６９６號機\\x%l静態保存;#00ffc040;靜態保存%l;#;在動物園裡啊」" 

# 【みくろ】
# display as 美玖路
# JP: 「はい。雄武田の動物園です。\nとっても楽しいところですよ」
1840 = "「是的，在大牟田的動物園裡。是個非常歡樂的地方哦」" 

# 【ハチロク】
# display as 八六
# JP: 「そうなのですか」
1986 = "「這樣呀」" 

# monologue
# JP: 我が子を見守る母のよう――\nそんな目をしたハチロクが、ふわり、甘えて僕を見上げる。
2339 = "八六的目光就像是守望孩子的慈母。接著八六抬起頭，用眼神向我請求。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　わたくし、世なれないものですので、\n動物園、一度もお伺いしたことが無いのですが」
2034 = "「雙鐵少爺，我沒有什麼社會經驗，到現在都沒有去過動物園」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1654 = "「噢」" 

# monologue
# JP: 雄武田であれば、立ち上がったばかりのくろがね鉄道――\n筑方炭田周辺の鉱山鉄道や工場専用線を再編した鉄道会社
2804 = "說到大牟田，我就想起剛剛復活的黑鐵鐵路——築豐煤礦周邊的礦山鐵路和工廠專用線。" 

# monologue
# JP: ――の、本社の、確か所在地だ。\nならば、赴く機会も少なくはなかろうし……
2587 = "我記得負責其重組工作的鐵路公司，總部就位於大牟田。那麼前去造訪的機會應該不算少……" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。機会をみつけて行こう」
1699 = "「好，下次找機會一起去吧」" 

# 【ハチロク】
# display as 八六
# JP: 「はい！」
# 1695 = "「好的！」" 

# 【みくろ】
# display as 美玖路
# JP: 「わぁあ！」
1611 = "「哇！」" 

# monologue
# JP: ハチロク以上に、みくろが顔を輝かす。
2759 = "美玖路顯得比八六還興奮。" 

# monologue
# JP: 喜色満面――その文字列を具現化すれば、\nいまのみくろの笑顔になろう。
2741 = "笑容滿面這四個字，用來形容現在的她再合適不過了。" 

# 【みくろ】
# display as 美玖路
# JP: 「お姉様に来てもらえるの、嬉しいです！\n[うちのこ,4]38696の、なにより素敵なご褒美になります！」
1716 = "「姐姐大人能來大牟田，美玖路真是太開心了！這對[那孩子,4]３８６９６來說就是最棒的獎勵！」" 

# 【ハチロク】
# display as 八六
# JP: 「ですからみくろ、大げさすぎです」
1928 = "「美玖路，你說得太誇張了」" 

# 【みくろ】
# display as 美玖路
# JP: 「大げさなんかじゃありません！」
1428 = "「一點也不誇張！」" 

# monologue
# JP: （ふぅむ。なるほど、ご褒美か）
2920 = "（原來如此，要有獎勵啊）" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、オリヴィからもごほーびあげるね！\n右のポッケと左のポッケ、どっちかずつえらんで！」
