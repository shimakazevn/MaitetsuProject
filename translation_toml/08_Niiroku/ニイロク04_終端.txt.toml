1203 = "……我只能想到，門司可能是在偷偷照顧我們。或者有人在那邊幫我們做內鬼。" 

# 【赤井】
# display as 赤井
# JP: 「話し合い……コミュニケーションの不足」
1876 = "「我們的交流……溝通還不夠」" 

# monologue
# JP: 誰もが誰もを疑って――\nレイルロオドたちだけが、お互いを信じあっていた。
2601 = "我總是在懷疑別人——只有鐵路人偶們彼此信賴。" 

# monologue
# JP: その結末が、この有様です。\n“死”の共感に――ニイロクを晒し、巻き込んだ。
2713 = "結果，就得到了這樣的下場。讓二六陷入了與“死亡”的共鳴。" 

# 【赤井】
# display as 赤井
# JP: 「一瞬で済んでいる筈です。\nもうシロは、共感を送ることなど……出来ない筈です」
1860 = "「應該是在一瞬間結束的。她應該……沒機會再和四六共鳴了」" 

# monologue
# JP: 検査省略での即時破壊。
2517 = "對四六略去了檢查，直接破壞。" 

# monologue
# JP: 隠蔽が目的である以上、\nできるだけ早く、原型を残さず、徹底的に。
2640 = "既然目的是掩人耳目，那就得儘快徹底破壞她，不留原型。" 

# 【赤井】
# display as 赤井
# JP: 「――専用ピン……出さないと」
1245 = "「——專用重啟針呢……在哪」" 

# monologue
# JP: 運転士鞄を漁ります。
2603 = "我翻找著駕駛包。" 

# monologue
# JP: 再起動スイッチは耳の奥。\nレイルロオドには不要なはずの、隙間の最奥。
2793 = "重啟開關在鐵路人偶耳孔最深處。那是對於鐵路人偶來說無用的孔隙。" 

# 【赤井】
# display as 赤井
# JP: 「――ニイロク、起きてください」
1241 = "「——二六，起床了」" 

# monologue
# JP: コンセントを差し。\n耳の奥へと、か細いピンを。
2597 = "我用細細的針插入她耳朵裡的插孔。" 

# monologue
# JP: （よしっ）
2855 = "（好）" 

# monologue
# JP: カチリと、確かなクリック感。
2488 = "啪嚓一聲，我感受到了紮實的回饋。" 

# 【赤井】
# display as 赤井
# JP: 「ニイロク？　聞こえますか、起きましょう」
1627 = "「二六？聽到了嗎，起床了」" 

# 【ニイロク】
# display as 二六
# JP: 「――――――」
1238 = "「——————」" 

# 【赤井】
# display as 赤井
# JP: 「ニイロク？　ニイロク！　起きるんだ！！」
1625 = "「二六？二六！起床了！！」" 

# 【ニイロク】
# display as 二六
# JP: 「――――――あ」
1239 = "「——————啊」" 

# 【赤井】
# display as 赤井
# JP: 「ニイロク！　よかった！！！\nニイロクっ！！　ニイロクっ！！」
1620 = "「二六！太好了！！！二六！！二六！！」" 

# 【ニイロク】
# display as 二六
# JP: 「清――春。清春。清春」
1988 = "「清——春、清春、清春」" 

# monologue
# JP: パニックをもう起こしていません。
2502 = "她已經不再混亂了。" 

# 【ニイロク】
# display as 二六
# JP: 「清春」
1994 = "「清春」" 

# monologue
# JP: その手が伸びて、私に甘え、すがってきます。\n――歓喜が膨れあがります！！
2726 = "而是伸出手抱住我，向我撒嬌。——我的心一下子充滿了喜悅！！" 

# 【赤井】
# display as 赤井
# JP: 「ニイロク！　よかった！　本当によかった！」
1619 = "「二六！太好了！真是太好了！」" 

# 【ニイロク】
# display as 二六
# JP: 「清春。壊れた」
2003 = "「清春，我壞掉了」" 

# 【赤井】
# display as 赤井
# JP: 「ですね。それでも、シロは見事に――。\n自分を犠牲に、ニイロクのことも、鉄道も！」
1944 = "「是啊。但是，四六完美地——犧牲了自己，拯救了二六，還有鐵路！」" 

# 【ニイロク】
# display as 二六
# JP: 「シロおねえちゃんも、壊れた。\n自分も。同じ。どこかが。壊れた。取り返せない」
1783 = "「四六姐也壞掉了。我也是。我們一樣。某個地方。壞掉了。再也修不好了」" 

# 【赤井】
# display as 赤井
# JP: 「ニイロクっ！！？」
1622 = "「二六！！？」" 

# monologue
# JP: 言われて――気づく。気づきます。
2507 = "她這麼說了——我才注意到。" 

# monologue
# JP: ニイロクが――ニイロクの表情がさっきから、\n一切変化してないことに。
2362 = "二六——二六的表情，從剛才開始，就沒有發生任何變化。" 

# 【ニイロク】
# display as 二六
# JP: 「清春――自分は――笑えてる？」
1991 = "「清春——我——在笑嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「あ――ああ。\n笑えている、よ。いつもどおりだ。凄くかわいい」
1736 = "「啊——嗯。你在笑哦。就像平時一樣。非常可愛」" 

# 【ニイロク】
# display as 二六
# JP: 「ウソ。清春。いつもと違う」
2176 = "「騙人，清春。你跟剛才不一樣」" 

# 【赤井】
# display as 赤井
# JP: 「っ！！！」
# 1731 = "「唔！！！」" 

# monologue
# JP: コンパクトを、ニイロクが出し――\nそうして、静かに、しまいます。
2375 = "二六拿出帶鏡粉盒——然後安靜地把它收了起來。" 

# monologue
# JP: （いつもと同じに、いつもの自分で――）
2878 = "（要保持自己平時的樣子——）" 

# monologue
# JP: ニイロクを、これ以上不安にさせないために。\nそうと思えば、シロが、どれほど強かったかを――
2354 = "不能讓二六繼續擔心下去了。想到這裡，我忽然明白了四六究竟有多麼堅強——" 

# 【ニイロク】
# display as 二六
# JP: 「清春？　清春？　どこか、痛いの？」
2005 = "「清春？清春？你有哪裡痛嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「いつもの自分で――いるなど――とてもっ」
1658 = "「保持平時的樣子——實在是——太難了」" 

# monologue
# JP: 体が言葉が震えます。\n思考も、ぶるぶる震えています。
2600 = "我的身體和話語都在顫抖。思緒也搖擺個不停。" 

# monologue
# JP: 罪悪感と、後悔と――\nニイロクを苦しめるだけの感情を、抑えられません。
2573 = "我完全無法壓制自己由於讓二六痛苦，而湧上來的罪惡感，還有後悔——" 

# 【ニイロク】
# display as 二六
# JP: 「泣かないで。清春。\n清春が泣けば。自分は。悲しい」
1674 = "「別哭了，清春。你再哭的話，我也會，很傷心」" 

# 【赤井】
# display as 赤井
# JP: 「すまないっ――すみません――ニイロク。\nわかっていても――それでも――それでもっ」
1820 = "「對不起——對不起——二六。雖然我知道——但是——但是」" 

# 【ニイロク】
# display as 二六
# JP: 「だけど。嬉しい。\n清春が。自分の代わりに、泣いてくれて」
1650 = "「但是，我好高興。因為，你願意替我哭」" 

# 【赤井】
# display as 赤井
# JP: 「っ！」
# 1743 = "「啊！」" 

# monologue
# JP: ニイロクの指が静かに、私の頬をなぞります。
2386 = "二六的手指無聲地撫摸著我的臉頰。" 

# monologue
# JP: そうして、涙を――\n自分の頬へと、移します。
2677 = "然後，她——把眼淚抹上了自己的臉頰。" 

# 【ニイロク】
# display as 二六
# JP: 「清春は自分を救ってくれた。\nあのままだったら。自分も全部。壊れてた」
2000 = "「清春，你救了我。如果你沒有幫我的話，我也會，徹底壞掉」" 

# 【赤井】
# display as 赤井
# JP: 「そうだろうとは、思います。\nけれど――」
1889 = "「我就知道會那樣。但是——」" 

# 【ニイロク】
# display as 二六
# JP: 「だから、清春が笑えていれば。\n自分も、いっしょに笑ってる」
1913 = "「所以，只要你能笑。我也會跟你一起笑的」" 

# 【赤井】
# display as 赤井
# JP: 「っ！！！」
# 1731 = "「唔！！！」" 

# monologue
# JP: 笑い、ます。\n口の端を、持ち上げて――目尻を、下げて。
2605 = "我要笑。我努力翹起嘴角——垂下眼角。" 

# 【ニイロク】
# display as 二六
# JP: 「下手くそ。清春。笑えてない」
2039 = "「笑得好爛。清春，你根本沒笑」" 

# 【赤井】
# display as 赤井
# JP: 「それは……今は、まだっ、\n慣れて――ないっ、から」
2145 = "「那是……因為，我還，不習慣——」" 

# 【ニイロク】
# display as 二六
# JP: 「そう。慣れる。この顔にも。\n――シロおねえちゃんがいないことにも」
1778 = "「嗯，會習慣的。習慣這張臉。——還有四六姐已經不在的事實」" 

# 【赤井】
# display as 赤井
# JP: 「そう――ですね。\n慣れるしかない――全てに、新しい環境にも」
1937 = "「是啊——我們必須習慣——習慣嶄新的環境」" 

# 【ニイロク】
# display as 二六
# JP: 「うん。だけど。\n清春は、変わらないで欲しい」
1760 = "「嗯。但是。我希望你不要改變」" 

# monologue
# JP: ニイロクが、両手を差し伸べてきます。\n何を求めてもらっているか、わかります。
2393 = "二六的雙手伸向我。我知道她在向我索求什麼。" 

# 【赤井】
# display as 赤井
# JP: 「もちろんですとも」
2023 = "「當然不會了」" 

# 【ニイロク】
# display as 二六
# JP: 「ん……」
1758 = "「嗯……」" 

# monologue
# JP: キスのさなかも、ニイロクは目を閉じません。\n完全に、顔が固まってしまっています。
2521 = "就算正在接吻的時候，二六的眼睛也沒有閉上。她的臉完全僵硬了。" 

# 【赤井】
# display as 赤井
# JP: 「ゆっくり、慣れていきましょう。\n少しずつ、回復をしていきましょう」
1877 = "「我們，慢慢習慣吧。慢慢恢復吧」" 

# 【ニイロク】
# display as 二六
# JP: 「そうする。清春と、そうしてく」
1898 = "「我會的。我會和你一起習慣」" 

# 【赤井】
# display as 赤井
# JP: 「ええ」
# 1769 = "「嗯」" 

# monologue
# JP: 表情は一切かわりません。\nけれど、わからないはずもありません。
2574 = "我完全看不出她的表情。但是，我又不可能看不出她的表情。" 

# monologue
# JP: ニイロクは、今、\nわたしに微笑んでくれました。
2463 = "剛剛，二六她是在對我微笑。" 

# 【ニイロク】
# display as 二六
# JP: 「少し疲れた。眠ってもいい？」
1900 = "「我有點累了。可以睡一會嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「もちろんですとも。運転鞄、あけますね」
2024 = "「當然可以。我把駕駛包打開」" 

# 【ニイロク】
# display as 二六
# JP: 「ううん、鞄は、今はこわい」
1599 = "「不要，我現在害怕駕駛包」" 

# 【赤井】
# display as 赤井
# JP: 「そうですか」
1965 = "「是這樣嗎」" 

# monologue
# JP: だっこを、します。\n腕の中、ニイロクは頭を擦り付けてきます。
2586 = "我抱住她。懷中的二六用頭蹭著我。" 

# 【ニイロク】
# display as 二六
# JP: 「清春といっしょなら、怖くない」
2079 = "「跟你在一起，就不害怕」" 

# 【赤井】
# display as 赤井
# JP: 「光栄です。安心して眠って下さい」
1973 = "「榮幸之至。那你就安心睡吧」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1769 = "「嗯」" 

# monologue
# JP: ニイロクが全ての力を抜きます。\nまぶたは、けれど動きません。
2379 = "二六放鬆了身上的所有力氣。眼皮卻一動不動。" 

# 【赤井】
# display as 赤井
# JP: 「おやすみ、ニイロク」
1968 = "「晚安，二六」" 

# 【ニイロク】
# display as 二六
# JP: 「うん、清春」
1781 = "「嗯，清春」" 

# monologue
# JP: 手をあて、まぶたを下にさげ。\nそうっと瞳を閉ざします。
2595 = "我用手合上她的眼皮，輕輕讓她閉上眼睛。" 

# 【ニイロク】
# display as 二六
# JP: 「おやすみなさい」
1967 = "「晚安」" 
