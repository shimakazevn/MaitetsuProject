[script]
# lines: 470 
# 【赤井】
# display as 赤井
# JP: 「こちらが、現帝鉄職員338名分の署名。\nそして、こちらが趣旨提案書となります」
2110 = "「這是現帝國鐵路職員共計３３８人的署名。還有，這是我們主要計劃的提案書」" 

# 【電車区長】
# display as 電車段長
# JP: 「338！　近隣からも集めよったとか。\nいや、それにしても太か数よの」
2182 = "「３３８人！你們怎麼還把附近居民的簽名整來了。哎呀，還沒少整」" 

# monologue
# JP: 驚いたような声ですが、\n目に、表情に、いささかの動揺もありません。
2797 = "雖然他發出驚訝的聲音，但是眼神和表情卻沒有絲毫的動搖。" 

# monologue
# JP: 立場を違え対峙して、改めて、車輌工場のみならず、\n電車区全てを統括してきた人物なのだと感じます。
2798 = "雖然我們立場不同，互相對立，但我再一次感受到，他不愧是管理著車輛工廠和整個電車段的人物。" 

# 【赤井】
# display as 赤井
# JP: 「[げんぎょうしょく,2]現業職からの署名だけではありません。\n総合職や、幹部職員からの署名もあります」
1874 = "「我們不僅拿到了技術崗位的署名，還有行政崗位，以及幹部職員的署名」" 

# 【電車区長】
# display as 電車段長
# JP: 「ほーう、幹部職員からも」
1754 = "「喔……連幹部職員都有」" 

# monologue
# JP: 電車区長が見回すと、何人かの職員が目を逸します。\nいい反応ではありません、急ぎ言葉を継ぎ足します。
2809 = "電車段長環視四周，好幾名職員移開視線。這並不算良好的反應，我趕緊補充說道。" 

# 【赤井】
# display as 赤井
# JP: 「[もじ,1]門次・[こくら,1]粉蔵・[はかた,1]博太間を廃線することはそれほどに\n無意味――ナンセンスだと多くが感じている証です」
2113 = "「這證明了，大部分人認為廢除門司、小倉、博多之間的線路是非常沒有意義——沒有道理的一件事」" 

# 【電車区長】
# display as 電車段長
# JP: 「そらぁそうよ。こぎゃんとバカな話ばあらぁせん。\nこどもにだってわかることとや」
2146 = "「那當然了。咱也不是傻子。小孩都能整明白的事咱能整不明白」" 

# 【赤井】
# display as 赤井
# JP: 「！？　でしたら――分轄・民営化案を」
1774 = "「嗯！？那麼——可以考慮分區域管理和民營化方案嗎」" 

# 【電車区長】
# display as 電車段長
# JP: 「逆から言えば、バカな話を呑まさるだけの理由が、\nこっちにもあるいうことよ」
1696 = "「反過來說，咱能接受這種扯淡方案，肯定有咱的道理」" 

# monologue
# JP: 渡した署名に、電車区長の目が注がれます。\nその口元が、ふ、と緩みます。
2810 = "電車段長看著我遞給他的署名。他的嘴角忽然露出一絲笑容。" 

# 【電車区長】
# display as 電車段長
# JP: 「……よぉこれだけ集めてくれたの。\nこれじゃったら、腹ぁ割って話せるけん」
1279 = "「……你整了這麼多簽名也不容易。那就直說了吧」" 

# 【赤井】
# display as 赤井
# JP: 「え？」
1726 = "「哎？」" 

# 【電車区長】
# display as 電車段長
# JP: 「ニイロクば、おらんな？」
1617 = "「二六沒擱這裡吧？」" 

# 【赤井】
# display as 赤井
# JP: 「はい。そういう約束でしたから。\nもちろん、私一人だけのことでもありません」
1954 = "「是的。因為約定就是這樣的。當然，也不僅僅是我一個人要遵守這個約定」" 

# monologue
# JP: 見回せば、無数の視線が返ります。\n粉蔵所属の――大げさではなく、全運転士・機関士の。
2592 = "我環顧四周，看到無數視線正看著我。不誇張地說，屬於小倉管轄的所有駕駛員和司機都在這。" 

# monologue
# JP: その誰一人、レイルロオドを連れていません。\nそれが、この面談の条件でしたから。
2723 = "而且他們沒有任何一個人身邊帶著鐵路人偶。因為，這就是這次面談的條件。" 

# 【電車区長】
# display as 電車段長
# JP: 「じゃったら、よか」
2148 = "「那行吧」" 

# 【赤井】
# display as 赤井
# JP: 「っ！？　これは？」
1748 = "「啊！？您的意思是？」" 

# monologue
# JP: 投げ渡されたのは、書類です。\n表紙には、「極秘」と朱書きしてあります。
2406 = "他丟給我一份文件。文件封面上用紅字寫著“機密”二字。" 

# 【電車区長】
# display as 電車段長
# JP: 「“帝鉄側”の、手の内全部ぞ」
1261 = "「“帝國鐵路方”所有的手段都跟這裡寫著呢」" 

# 【後東】
# display as 司機Ａ
# JP: 「マジかよ！？　俺にも見せてくれよ」
2029 = "「真的假的！？我也要看」" 

# 【電車区長】
# display as 電車段長
# JP: 「やめぇ[ごとう,1]後東っ！！！」
1847 = "「後東，不准亂來！！！」" 

# 【赤井】
# display as 赤井
# JP: 「読みます！　私が声に出して読みますから！！」
1897 = "「我會唸出來的！我大聲念給你們聽就行了吧！！」" 

# 【後東】
# display as 後東
# JP: 「そっか、なら任せるぜ」
2111 = "「這樣啊，那就拜託你了」" 

# monologue
# JP: 沸き起こりかけてたどよめきが、\n押し寄せかけた人波が――
2403 = "人群中響起吵鬧聲，還有一些人想要圍上來，" 

# monologue
# JP: 電車区長の一喝と、その一言とに鎮まります。
2728 = "而電車段長只用一聲大喝就把他們鎮住了。" 

# monologue
# JP: （……計算でやっているのか、天然なのか）
2830 = "（……不知道這是他有意的還是無意的）" 

# monologue
# JP: [ごとうかいた,3]後東塊太――\n同期の中でもこれ程に、食えぬ男は他にいません。
2550 = "後東慶太——在我的同期中，他是令我最不爽的人。" 

# monologue
# JP: 強盗塊太とさえも呼ばれる、アクの強い男ですが……\nあるいは真に相談すべきは、先輩よりもむしろ――
2796 = "雖然他很有個性，甚至被別人取了個外號叫強盜慶太……但是，或許我應該商量的人，不是前輩，而是——" 

# 【後東】
# display as 後東
# JP: 「どうしたい？　読めねぇ字でもあんのかよ？」
1856 = "「怎麼了？該不會你碰到不認識的字了吧？」" 

# 【赤井】
# display as 赤井
# JP: 「ああいえ、読みます。\n『帝鉄解体に向け予想される反発への対処法』」
1603 = "「不，我都認識。那我念了。“關於帝國鐵路解散可能遇到的反對意見與處理方法”」" 

# 【後東】
# display as 後東
# JP: 「なっ！？」
1635 = "「什麼！？」" 

# 【技工Ａ】
# display as 技工Ａ
# JP: 「手の内全部て！」
1924 = "「所有手段？」" 

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「経営側の――こいば対処マニュアルと？」
2107 = "「這是——經營方的處理方案？」" 

# 【先輩】
# display as 前輩
# JP: 「そぎゃん手の内ば明かすわけがなか！！\nこらぁ経営側の分断工作ぞっ！！！」
1638 = "「他們怎麼會告訴我們所有手段呢！！這是經營那邊兒分化我們的策略！！！」" 

# monologue
# JP: 先輩の怒声が、ざわめきを揺らし、大きく乱して。\nやがてそれは、緊張に満ちた沈黙へと収束します。
2460 = "前輩憤怒地喊著，人聲鼎沸，場面一下子混亂了。過了好一陣子，大家才安靜下來，劍拔弩張的沉默降臨。" 

# monologue
# JP: いえ――満ちているのは緊張ではなく、\n疑心暗鬼の四文字です。
2349 = "不——這不是劍拔弩張，而是疑神疑鬼。" 

# 【赤井】
# display as 赤井
# JP: 「……とにかく、読みます。\n『１：鉄道全廃へのロードマップ』」
1298 = "「……總之，我先讀了。“１：鐵路全部廢止步驟”」" 

# monologue
# JP: ……読み進むにつれ、沈黙の質が変化します。\n疑心暗鬼は、静かに、闇に呑まれていくようです。
1220 = "……越是讀下去，沉默就變得越是沉重。彷彿就連疑神疑鬼都要安靜地被一股黑暗吞噬了一般。" 

# monologue
# JP: 深く、黒く、濃く、重い。\n絶望という名の、冷たい闇に。
2778 = "這股黑暗既冷酷又深沉濃重，其名為絕望。" 

# monologue
# JP: （これは――こんなものを電車区長が――\nいや、帝鉄上層部さえ用意できるとは思えない）
2883 = "（這——這是電車段長寫的嗎——不，哪怕是帝國鐵路高層，應該也拿不出這種東西）" 

# monologue
# JP: 日ノ本国内のみならず、海外という視点も持った、\n冷酷なまでに透徹された、『運輸計画』。
2777 = "這本《運輸計劃書》融合了日本國內和海外視角，冷靜理智到了甚至有些冷酷的地步。" 

# monologue
# JP: エアクラ推進のため、鉄道は、徐々に――\nそのイメージも含め弱体化させられてきたのだと……
2514 = "它告訴我們，一直以來，為了推廣空凝機，他們正在有計劃地削弱鐵路的對外形象及其本身——" 

# monologue
# JP: （いや――そういってしまうのは、甘えですね。\nイメージ悪化は、我々自身の弱さでしかない）
2820 = "（——不，這種想法太天真了。我們的對外形象會惡化，只是因為我們自身太弱了而已）" 

# monologue
# JP: 経営が傾きはじめ、待遇が悪くなり、サービス低下。\nより経営が落ち込んでいく、典型的な悪循環。
2714 = "經營不善導致員工待遇下降，待遇下降導致服務水平下降。而這又導致了進一步的經營不善，典型的惡性循環。" 

# monologue
# JP: 全国的にそれが明らかになりはじめ、\n“帝鉄叩き”が同時多発的に沸き起こってもなお――
2689 = "當這種現象遍布全國的時候，帝國鐵路就開始經常同時遭到大量批判，進一步惡化了我們的處境——" 

# monologue
# JP: （帝鉄は、ほんのわずかも、\n変われなかった――変わらなかった）
2861 = "（帝國鐵路根本就沒能改變——是它沒有選擇改變）" 

# monologue
# JP: いまよりは遥かに状況が良く、\n職員たちの士気もまだ高かった時期にさえ。
2484 = "哪怕從前與現在相比，經營尚算不錯，職員們的士氣也還不低，當時也沒有選擇改變。" 

# monologue
# JP: 自発的な改善案が、どれほど根こそぎ潰されたのか\n……振り返るなら、絶望の黒は濃さを増します。
2491 = "回頭一想，那些主動選擇改變的方案都被斬草除根了……這使我更感到黑暗與絕望。" 

# 【後東】
# display as 後東
# JP: 「全部――計画通りに運ばれてきたって訳かよ。\n今日ここで巻き込まれてる、クソ茶番さえもよぉ！」
1684 = "「原來一切都只是你們的計劃嗎——連我們今天到這裡來演了一場荒誕的鬧劇也是嗎！」" 

# monologue
# JP: 後東の怒声に、けれども誰も、呼応しません。
2549 = "後東大吼著，但是沒有任何人回應他。" 

# monologue
# JP: それほどまでに――“経営側”は周到で、\n逆転の余地など、残されているとは思えません。
1192 = "“經營方”的計策實在太過周到，我實在想不出他們會給我們留下絲毫翻盤的可能性。" 

# monologue
# JP: （だが――それでも。\nそれでもニイロクを諦めるわけにはいきません）
2847 = "（但是——即便如此，即便如此我也不能放棄二六）" 

# 【赤井】
# display as 赤井
# JP: 「――ここまで読めば、十分です」
1248 = "「——讀到這裡就夠了」" 

# monologue
# JP: 震えそうになる声を抑えて、\n電車区長に視線を向けます。
2563 = "我一邊壓制著自己的聲音以免顫抖，一邊看向電車段長。" 

# monologue
# JP: 同意も、異議も、聞こえません。\n――誰も、何一つ言いません。
2638 = "既沒有同意的聲音，也沒有反對的聲音。——沒有任何人說話。" 

# 【赤井】
# display as 赤井
# JP: 「帝鉄の――冥国のいう“帝鉄解体”とは、\nつまり、全車輌の解体という意味なのですね？」
1828 = "「帝國鐵路——美國所謂的“解散帝國鐵路”，是指要拆毀所有車輛嗎？」" 

# 【後東】
# display as 後東
# JP: 「バカじゃねえのか！！　んなことして何になるよ。\n線路全部剥がして道路にしたって」
2109 = "「這是什麼傻話！！做這種事有什麼意義？把鐵路全部拆毀，改成公路，又能怎樣」" 

# 【電車区長】
# display as 電車段長
# JP: 「『全部』とは書かれとらん。\n売却ばして構わん路線も、列記されとる」
2112 = "「這裡面可沒寫“全部”。也就是列舉了賣掉也不礙事的線路而已」" 

# monologue
# JP: 資料を、少し戻ります。\n間違えて伝えるわけにはいきません。
2577 = "我往回翻了翻資料。要是給別人轉達了錯誤訊息就不好了。" 

# 【赤井】
# display as 赤井
# JP: 「確かに、列記されていますね。[ゆのい,1]湯医線。[たかもり,1]鷹森線。\n[まつうら,1]松裏線、[からぎ,1]辛木線。[かごしま,2]鹿兒島本線の[せんだい,1]千内-[やつしろ,2]八ツ城間」
2027 = "「的確是列舉了這些線路。湯醫線、高森線、松浦線、三岐線。鹿兒島幹線上的川內至八代段」" 

# 【後東】
# display as 後東
# JP: 「バラっバラに散ってるじゃねえか！　しかも、\n非電化の単線区間ばっかだ！！！」
2105 = "「這不是各地都有嗎！而且，這些都是非電力化的單線路段！！！」" 

# 【電車区長】
# display as 電車段長
# JP: 「じゃの。そぎゃんば、帝鉄の――いいや、\n国と、[めいこく,1]冥国との意思たい」
1819 = "「對。這是帝國鐵路的——不對，是日本跟美國的意思」" 

# 【赤井】
# display as 赤井
# JP: 「ガス抜きのため――\n一時的には存続できる路線と、旧型車輌とを[かつじょう,1]割譲する」
2010 = "「為了維穩——可以割讓那些暫時可以保留的線路和舊型號車輛」" 

# 【後東】
# display as 後東
# JP: 「やってけるわけねえだろ、そんなの！\n最終的には鉄道全廃かよ！　クソっくらえだ！！」
1859 = "「怎麼能這樣！那最後一步還是廢除全部鐵路嗎！去吃屎吧！！」" 

# 【電車区長】
# display as 電車段長
# JP: 「ばってん、そぎゃんクソでも、食らうしか――\n鉄道存続の可能性を残す道は、なか」
1702 = "「吃屎要是能找個法子讓鐵路留著——那也得吃」" 

# 【赤井】
# display as 赤井
# JP: 「っ！」
1743 = "「啊！」" 

# monologue
# JP: その一言に確信します。\n――繋がります。
2729 = "聽到這句話，我心裡明白了。——一切線索都連在了一起。" 

# monologue
# JP: この資料の開示も、署名への評価も、何もかも。\n電車区長の言動が、一筋のレールを描きます。
2811 = "電車段長給我們看這份資料的用意，他對署名的評價，都聯繫在了一起。他的話語和行為，為我指明了一條線路。" 

# 【赤井】
# display as 赤井
# JP: 「電車区長は、鉄道存続をお望みなのですね？」
2170 = "「電車段長，其實你是希望鐵路存續下去吧？」" 

# 【電車区長】
# display as 電車段長
# JP: 「電化路線と電車達。未来ば[いっとき,1]一時は潰しても……\nそいでん、生き残らせるもんば、作らんと」
2161 = "「電力化線路和電車目前是要被整沒了……但那也得想法子讓它們留條命啊」" 

# 【赤井】
# display as 赤井
# JP: 「そのお覚悟があるのでしたら――電車区長。\n自主運用での徹底抗戦も選択肢にできるかと」
1811 = "「如果你有這份決心的話——電車段長，我們還可以選擇利用自主運營來徹底反抗吧」" 

# monologue
# JP: 一時的、形式的な延命ですり潰されていくよりも、\n真正面から戦う方が、ずっといい。
2735 = "與其苟延殘喘等著被摧毀，還不如堂堂正正地應戰。" 

# 【赤井】
# display as 赤井
# JP: 「電車特急――エグゼクティブエクスプレスは確実に、\n闇を裂き、光となれる車輌なのですから」
1792 = "「因為電車特快——行政特快它真的是，那輛在黑暗中能給我們帶來光明的列車啊」" 

# 【後東】
# display as 後東
# JP: 「ひかりか――いいな、いかにも復活の切り札だ。\nエグゼクティブエクスプレス“ひかり”号」
1835 = "「帶來光明——不錯，行政特快“光”號配得上當我們復活用的底牌」" 

# 【技工Ａ】
# display as 技工Ａ
# JP: 「ひかり号」
1663 = "「光號」" 

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「\x%l電車;#00ffc040;電車%l;#;特急――ひかり号！」
1236 = "「\\x%l電車;#00ffc040;電車%l;#;特快——光號！」" 

# 【先輩】
# display as 前輩
# JP: 「冷静さば欠いちゅうぞ、赤井君。\n国ば敵にまわして“\x%l電車;#00ffc040;電車%l;#;”ば、走れん」
1654 = "「你太不冷靜了，赤井。與國家為敵的\\x%l電車;#00ffc040;電車%l;#;能跑幾步啊」" 

# 【赤井】
# display as 赤井
# JP: 「あ――」
1734 = "「啊——」" 

# monologue
# JP: 差し込みかけたひかり――\nいえ、幻のひかりがあえなく、呑まれていきます。
2534 = "幾乎快投入使用的“光”——不，活在夢幻中的“光”，會被輕易取締。" 

# 【電車区長】
# display as 電車段長
# JP: 「送電停止。[がせん,1]架線撤去――\n国ば、なんでもやれるけんのう」
1659 = "「停止輸電。撤掉架線——國家想怎麼整你都行」" 

# monologue
# JP: ……その通りです。必要設備の多さはそのまま、\n自主運用の困難さに他なりません。
1215 = "……沒錯。大多數必要設備，都很難在繞過國家的前提下使用。" 

# 【電車区長】
# display as 電車段長
# JP: 「……\x%lクハ26;#00ffc040;クハ26%l;#;を初めとする全ての\x%l電車;#00ffc040;電車%l;#;。電化完了路線群。\nそいば犠牲にすることで、少しは助かるもんもある」
1282 = "「……只能犧牲包括\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;的所有\\x%l電車;#00ffc040;電車%l;#;還有完成電力化的線路。這樣也能讓它們派上點用場」" 

# 【先輩】
# display as 前輩
# JP: 「そん言い方ばっ！！」
1656 = "「你怎麼說話呢！！」" 

# 【赤井】
# display as 赤井
# JP: 「いいえ先輩。構いません。\nそれは単なる事実であり、単なる評価の対象です」
1977 = "「沒事，前輩。不要緊。他說的是事實，這是就事論事」" 

# 【先輩】
# display as 前輩
# JP: 「じゃっどん――」
2128 = "「那也不能——」" 

# 【電車区長】
# display as 電車段長
# JP: 「\x%l電車;#00ffc040;電車%l;#;ば、どう転んでも走れんと。\n走れんもんば飾っておいて、どぎゃんすっとか」
1692 = "「反正\\x%l電車;#00ffc040;電車%l;#;是上不了鐵軌了。沒辦法上路跑的東西那還擺那裡當裝飾嗎」" 

# 【技工Ａ】
# display as 技工Ａ
# JP: 「そいば――確かにそがいじゃが」
2104 = "「這——說得也是」" 

# monologue
# JP: 沈みきっていた人の群れから、\nざわめきが、少しずつ、少しずつ戻ってきます。
2467 = "原本沉默著的人們又開始慢慢議論起來。" 

# monologue
# JP: \x%lクハ26;#00ffc040;クハ26%l;#;が、ニイロクが――\n象徴そのものであることを、逆説的に思い知ります。
2566 = "我再次意識到，\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;——二六擁有著多麼重大的象徵意義。" 

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「いうてもの、技術ばなんとしても継承せんと――\n鉄道ば、経験工学じゃけん」
2123 = "「那不就一點技術都繼承不下來了嗎——鐵路這行不得靠經驗嗎」" 

# 【技工Ａ】
# display as 技工Ａ
# JP: 「\x%l電車;#00ffc040;電車%l;#;技術ば犠牲にすっとはありえんばい！\n二度と取り戻せんよーになりよるぞ」
1857 = "「怎麼能犧牲\\x%l電車;#00ffc040;電車%l;#;技術呢！犧牲完了到時候可就找不回來了」" 

# 【先輩】
# display as 前輩
# JP: 「決裂でよか！　徹底抗戦！\n実力行使なんぞさせんで架線ば守れば良かたい！！」
2135 = "「那咱們決裂！反抗到底！要罷工抗議也成，咱們守著架線不就得了！！」" 

# 【後東】
# display as 後東
# JP: 「おい、どうすんだよ赤井」
1752 = "「喂，怎麼辦，赤井」" 

# monologue
# JP: ……後東の問いが、突き刺さります。
1202 = "……後東的問題令我如坐針氈。" 

# monologue
# JP: どうするか――どうし得るのか。\n答えはひとつしか見えず、けれど決して私には――
2606 = "我該怎麼辦——我能怎麼辦。答案只有一個，但是我實在是沒有辦法——" 

# 【赤井】
# display as 赤井
# JP: 「……一日。二十四時間だけ猶予を下さい」
1297 = "「……給我一天時間，寬限二十四小時吧」" 

# monologue
# JP: ――選べません。\nならば、あがくしかありません。
1177 = "——我無法做出選擇。那麼，就只能垂死掙扎了。" 

# monologue
# JP: あがいてそして――[すが]縋るしか。
2469 = "只能掙扎——抓住那點微小的希望。" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
1769 = "「嗯」" 

# monologue
# JP: ニイロクが静かに頷きます。\n説明を始めるその前と、まったく変わらぬ表情で。
2372 = "二六安靜地點點頭。與說明開始前相比，她的表情沒有絲毫改變。" 

# 【ニイロク】
# display as 二六
# JP: 「自分は、清春の望むとおりに。\n清春の役にたてるのであれば、それが、幸せ」
1999 = "「清春希望怎麼辦，我就怎麼辦。能給你派上用場，就是我的幸福」" 

# 【赤井】
# display as 赤井
# JP: 「……\x%lクハ26;#00ffc040;クハ26%l;#;とその編成を助けることは、\nほぼ無理であるかと思っています」
1287 = "「……我認為，拯救\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;及其編組幾乎是不可能的任務」" 

# 【ニイロク】
# display as 二六
# JP: 「自分も、同じ。そう思う。\n\x%lクハ26;#00ffc040;クハ26%l;#;が走れる線路が、なくなるんだから」
1866 = "「我也這麼覺得。因為，\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;能跑的線路已經不存在了」" 

# monologue
# JP: けれどもハッキリわかります。\nニイロクは、装っているだけなのだと。
2431 = "但是我很清楚。二六隻不過是在故作堅強。" 

# monologue
# JP: 平静を装うそのことで、\n私の感じる罪悪感を、減らそうとしてくれているのだと。
2505 = "她想裝出平靜的樣子，好減少我感受到的罪惡感。" 

# 【ニイロク】
# display as 二六
# JP: 「走れないなら、無いのと同じ。\n自分が犠牲になることで――」
1595 = "「不能在鐵路上奔跑，與消失也沒什麼區別。如果能靠犧牲我——」" 

# 【赤井】
# display as 赤井
# JP: 「いいえ、ニイロク。君を犠牲にはしません」
1601 = "「不，二六。我不會犧牲你的」" 

# 【ニイロク】
# display as 二六
# JP: 「あ」
1741 = "「啊」" 

# monologue
# JP: 抱きしめます。
2584 = "我抱住她。" 

# monologue
# JP: ニイロクが冷えきっていると、\nそうして初めて気づきます。
2609 = "我這才發現，二六的身體變得冰涼。" 

# 【赤井】
# display as 赤井
# JP: 「私が選択した人生の、積み重ねてきた時間の。\nニイロク、君は、かけがえのない結晶です」
1624 = "「二六，你是我選擇的人生、是我積攢的一切凝固成的寶貴結晶，你是無可替代的」" 

# monologue
# JP: だから、伝えます。\n私の熱を、祈りを――想いを。
2617 = "所以，我對她傾訴。傾訴我的熱情、我的祈願——我的心意。" 

# 【赤井】
# display as 赤井
# JP: 「君だけは、決して譲れない。\nそれが私の、絶対防衛ラインです」
1903 = "「我絕對不會讓步的，只有你。你是我絕對要守住的底線」" 

# 【ニイロク】
# display as 二六
# JP: 「嬉しい。清春。――清春。清春」
1887 = "「我好高興，清春……清春、清春」" 

# monologue
# JP: ニイロクの手が応えます。\n私を、抱きしめ返してくれます。
2394 = "二六的雙手回應了我的擁抱。她緊緊地抱住我。" 

# 【ニイロク】
# display as 二六
# JP: 「だけど、できるの？\n\x%lクハ26;#00ffc040;クハ26%l;#;は――[はいしゃかいそう,3]廃車回送されるでしょ？」
1647 = "「但是，你能做到嗎？\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;——不是會被當成廢車回送嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「そうですね。\x%lクハ26;#00ffc040;クハ26%l;#;の[はいかい,1]廃回は、間違いなく、\n粉蔵工場の終わりを告げる、象徴的な儀式にされる」
1938 = "「是啊。\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;的報廢，絕對會成為小倉工廠徹底消亡的象徵儀式」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1769 = "「嗯」" 

# monologue
# JP: 抱き合っているから、ようやくわかる――\nそれほど、小さな小さな震え。
2661 = "正因為我抱著她，才能感受她在微微顫抖。" 

# monologue
# JP: ただ、守りたいと感じます。\nただ、愛おしいと感じます。
2779 = "這讓我無比想要守護。讓我無比感到憐愛。" 

# 【赤井】
# display as 赤井
# JP: 「ですので、手続は正規のものとされた上、\n厳しく監視されるでしょう」
1921 = "「所以，既然要通過正規手續報廢，全程肯定會在嚴格監視之下進行」" 

# 【ニイロク】
# display as 二六
# JP: 「廃回手続。正規のもの」
1794 = "「報廢手續。是正規的」" 

# 【赤井】
# display as 赤井
# JP: 「車輌、レイルロオド運転体、レイルロオド整備体。\nその全てが揃っていることが、まず確認されます」
2041 = "「第一步，是檢查車輛、鐵路人偶駕駛體、鐵路人偶整備體這三者是不是都齊全」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1769 = "「嗯」" 

# monologue
# JP: 仕事がら嫌でも熟知したことを、\n過不足なしに伝えます。
2565 = "我儘量適當地教給她工作中我不得不熟知的知識。" 

# monologue
# JP: 決して伝えたくなかったことを――\nそれでも、知恵を求めるために。
2789 = "那是我萬般不願告訴她的內容——但這也是為了徵求她的意見。" 

# 【赤井】
# display as 赤井
# JP: 「レイルロオドは、\nタブレット換装によっての動作確認がなされます」
2153 = "「鐵路人偶是更換操作板來測試運作是否正常的」" 

# 【ニイロク】
# display as 二六
# JP: 「確認の順番に規定はあるの？」
2007 = "「測試的順序有規定嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「そこは任意です。運転体・整備体の順であっても、\nその逆であってもかまわない。結果は同じですから」
1978 = "「沒有，可以隨意測試。不管是從駕駛體開始，還是從整備體開始都沒有關係。因為結果是一樣的」" 

# 【ニイロク】
# display as 二六
# JP: 「なら、\n動作確認したあとのタブレットは、そのまま？」
2151 = "「那麼，測試完之後的操作板，就放在那不動了？」" 

# 【赤井】
# display as 赤井
# JP: 「ですね。実装されたままの状態で、\n廃車回送に向かいます」
1947 = "「是啊。會保持原本的狀態廢車回送」" 

# 【ニイロク】
# display as 二六
# JP: 「監視の人間は添乗するの？」
2074 = "「負責監視流程的人會一起上車嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「いいえ。けれど、列車を止めることは許されません。\n解体処分をされる[もじ,1]門次まで――、一直線です」
1593 = "「不會。但是，誰都不可以停下列車。列車要直接開到進行拆解處理的門司」" 

# 【ニイロク】
# display as 二六
# JP: 「――[もじ,1]門次についたら、どうなるの？」
1242 = "「——列車到達門司之後，將會怎麼樣？」" 

# 【赤井】
# display as 赤井
# JP: 「牽引機関車と切り離され、留置され、解体されます。\nですが、正規の手続きを厳用される場合には」
2063 = "「與牽引機車脫離，保留一段時間之後進行拆解。但是，嚴格執行正規手續的話」" 

# 【ニイロク】
# display as 二六
# JP: 「[あいだ]間を置かない」
1594 = "「不會有保留在那裡的時間」" 

# monologue
# JP: ニイロクが導き出した答えは、悲しい程に正確です。
2415 = "令人難過的是，二六得出的答案是那麼正確。" 

# 【ニイロク】
# display as 二六
# JP: 「留置なしの、即時の解体処分がされる。\n留置している間に、不正が行われないように」
1969 = "「會直接進行拆解處理。不然，如果把列車暫存那裡，可能會發生黑箱作業」" 

# 【赤井】
# display as 赤井
# JP: 「そのとおりです。その上、門次側で最終の、\nレイルロオドの動作確認まで行われます」
1979 = "「沒錯。在那之後，門司方面將會再次測試鐵路人偶的功能是否正常」" 

# 【ニイロク】
# display as 二六
# JP: 「それは――んと、どうして？\nそんなことをしなくたって、同じじゃないの？」
2108 = "「這是——這又是為什麼？測不測試不是都一樣嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「レイルロオド自らがタブレットを外部に投げ捨てる。\n機関助士、ないし密乗した者が同様の行為をする」
2152 = "「鐵路人偶可能會自己把操作板丟到車外面。司爐，以及偷偷搭上車的人也有可能會這麼做」" 

# 【ニイロク】
# display as 二六
# JP: 「あ！」
# 1743 = "「啊！」" 

# 【赤井】
# display as 赤井
# JP: 「そうした先例が、過去にありました。\nその度に、手続きは厳重化されたのです」
2119 = "「過去就發生過類似的例子。每次發生之後，手續都會變得更嚴格」" 

# 【ニイロク】
# display as 二六
# JP: 「でも……電車区長が味方をしてくれれば、\n門次側にだって協力者を作ったりできない？」
1644 = "「但是……電車段長如果站在我們這邊，我們也可以讓門司那邊助我們一臂之力吧？」" 

# 【赤井】
# display as 赤井
# JP: 「大きな意味では確かに、電車区長は味方です。\nけれどあの人にも、決して譲れない仕事があります」
1800 = "「大致上來說，電車段長的確跟我們是同一邊的。但是，他有一個職責必須要完成」" 

# 【ニイロク】
# display as 二六
# JP: 「譲れない仕事？」
1850 = "「必須要完成的職責？」" 

# 【赤井】
# display as 赤井
# JP: 「エアクラ・バス社になるべく大勢を移籍させること。\nそうして、予想される首切りから守ることです」
2138 = "「那就是讓儘量多的人跳槽到空凝機公車公司。這樣，就可以避免太多人被炒魷魚」" 

# 【ニイロク】
# display as 二六
# JP: 「あ――\n生活、とか。責任とかのお話」
1737 = "「啊——是說他要顧忌手下的生計啦，責任之類的意思吧」" 

# 【赤井】
# display as 赤井
# JP: 「そのとおりですね。そしてレベルは違えども――\n先輩や、他の方々に関しても、同じことがいえます」
1980 = "「沒錯。而且，雖然程度不同——前輩和其他人也是這樣」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1769 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「技術・知識をもつ人員の散逸を防ぐこと。\nいつかの鉄道復権のため、その価値は計り知れません」
2068 = "「要避免擁有技術、知識的人員散失。今後如果鐵路還能恢復運營，他們就擁有無可估量的價值了」" 

# 【ニイロク】
# display as 二六
# JP: 「わかる。と、思う。そのときがきて\n\x%lクハ26;#00ffc040;クハ26%l;#;が復活できても、ただそれだけじゃ意味がない」
1884 = "「我好像能懂。要不然，到那時光是復活\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;也沒什麼意義」" 

# 【赤井】
# display as 赤井
# JP: 「粉蔵工場を、電化路線を復活させるそのときのため。\n味方であっても、行動面での無理は出来ない」
2106 = "「這些都是為了給小倉工廠恢復電力化線路做準備。所以雖然他站在我們這邊，但也不能隨心所欲」" 

# 【ニイロク】
# display as 二六
# JP: 「わかった。門次にまでうかつに工作をしたら、\nそれが漏れちゃう可能性はきっと跳ね上がっちゃう」
1932 = "「明白了。如果貿然在門司那邊找人行動，肯定會很容易走漏風聲的」" 

# 【赤井】
# display as 赤井
# JP: 「帝鉄の上層部、あるいは、さらに上位の組織から、\n監視の人員は既に送られているでしょうしね」
1829 = "「帝國鐵路上層，或者更高層的人，已經派監視的人過來了吧」" 

# 【ニイロク】
# display as 二六
# JP: 「そうなんだ」
1685 = "「原來如此」" 

# 【赤井】
# display as 赤井
# JP: 「\x%lクハ26;#00ffc040;クハ26%l;#;の廃車回送のときには、当然、\nその監視の目も、一層厳しくなるでしょう」
2043 = "「等\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;廢車回送的時候，對你的監視肯定會變得更加嚴格」" 

# 【ニイロク】
# display as 二六
# JP: 「なら……抜け道は、ない？」
2149 = "「那麼……沒有漏洞可鑽嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「無くても、創りだすのです」
1824 = "「就算沒有，也可以製造漏洞」" 

# monologue
# JP: 自分自身に言い聞かせ、\nニイロクの体を抱きしめ直します。
2611 = "我重新抱緊二六，說給她聽的同時也是安慰著自己。" 

# 【赤井】
# display as 赤井
# JP: 「――整備体は、諦めるしかないかと思います」
1247 = "「——我想，只能放棄你的整備體了」" 

# 【ニイロク】
# display as 二六
# JP: 「うん。それは最初からわかっていた。\n整備体には、[パーソナルマーク,5]個体識別部位が多すぎる」
1768 = "「嗯。打從一開始我就知道了。整備體的個體識別部位太多了」" 

# 【赤井】
# display as 赤井
# JP: 「はい」
1952 = "「是啊」" 

# monologue
# JP: すっと冷え込む体温が、見た目にも青ざめた顔色が、\nニイロクの心を、言葉より雄弁に物語ります。
2398 = "二六那冰冷的體溫，蒼白的臉色，比話語更清楚地表達著她的內心。" 

# monologue
# JP: 抱きしめる手を強くして――\nそれしか出来ない自分の無力を、押し隠します。
2589 = "我更用力地抱住她——好掩飾自己除此之外是多麼無能為力。" 

# 【赤井】
# display as 赤井
# JP: 「運転体とタブレット。最低限それだけ守れば」
2061 = "「至少，我一定要保住你的駕駛體和操作板」" 

# 【ニイロク】
# display as 二六
# JP: 「うん。自分は、自分でいられる。\n清春と――いっしょにいられる」
1766 = "「嗯。我還能做自己。還能和你在一起——」" 

# 【赤井】
# display as 赤井
# JP: 「そうですね。ずっと、いっしょに」
1946 = "「是啊。我們要永遠在一起」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1769 = "「嗯」" 

# monologue
# JP: 抱きしめあうことは、守り合うこと。\nそんなことを、生まれてはじめて、思います。
2400 = "互相擁抱，就是互相守護。自從出生起，我頭一次這麼想。" 

# monologue
# JP: この手の中のぬくもりを、愛しさを、\n決して失わないように、心を、強くと願います。
2570 = "我在心裡強烈地祈禱，但願我絕不要失去懷中至愛的這份溫暖。" 

# 【赤井】
# display as 赤井
# JP: 「……運転体については、\n取引を持ちかけられています」
1285 = "「……對於駕駛體，有人想跟我們做個交易」" 

# 【ニイロク】
# display as 二六
# JP: 「取引？　どんなの？\n誰から持ちかけられてるの？」
1631 = "「交易？什麼交易？誰想跟我們交易？」" 

# 【赤井】
# display as 赤井
# JP: 「後東――といって分かりますか？\n私の同期の、口の悪い」
1843 = "「後東——你認識那個人嗎？他是我的同期，說話很難聽」" 

# 【ニイロク】
# display as 二六
# JP: 「うん。わかる。あの口の悪い――\nけど、多分、頭がいい」
1763 = "「嗯。我認識。就是那個說話很難聽的——不過，他的腦子應該很好」" 

# 【赤井】
# display as 赤井
# JP: 「ですね。彼からの持ちかけです」
1949 = "「是啊。這是他提出的交易」" 

# 【ニイロク】
# display as 二六
# JP: 「どんな？」
1634 = "「什麼交易？」" 

# 【赤井】
# display as 赤井
# JP: 「……まさに今、彼の車輌とレイルロオドは、\n廃車回送に送られています」
1296 = "「……現在，他的車輛和鐵路人偶，正要去廢車回送」" 

# 【ニイロク】
# display as 二六
# JP: 「！！？」
1747 = "「啊！！？」" 

# 【赤井】
# display as 赤井
# JP: 「電車区長と話をつけて、厳格な手続きを踏まず。\nその上での、廃車回送をとったそうです」
1640 = "「他已經跟電車段長談好了，他的廢車回送不必經過嚴格手續」" 

# monologue
# JP: \x%lクハ26;#00ffc040;クハ26%l;#;では、\nどう転んでも出来ようもない芸当です。
51 = "\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;的廢車回送肯定會被嚴格監管。" 

# monologue
# JP: この混乱の最中なら、単なる普通車輌なら――\nそうした勝負を、後東は仕掛け、勝ったのです。
2790 = "那麼在這混亂的時期中，普通車輛說不定有希望鑽空子——後東賭上了這一點，而且贏了。" 

# 【ニイロク】
# display as 二六
# JP: 「厳格な手続きを踏まないって、どういうこと？」
1591 = "「不必經過嚴格手續，是什麼意思？」" 

# 【赤井】
# display as 赤井
# JP: 「動作確認を省略した。結果、運転鞄の中には、\n運転体の[モックアップ,4]等身大模型が入っています」
1639 = "「他們省略了測試功能那一步。所以，現在他的駕駛包裡，裝著駕駛體的等身大模型」" 

# 【ニイロク】
# display as 二六
# JP: 「それなら！　後東さんのレイルロオドは、\n運転体だけは助かるの？」
2150 = "「那麼！後東先生的鐵路人偶就可以保住駕駛體了，是嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「いいえ、ニイロク」
1602 = "「不，二六」" 

# monologue
# JP: 話の持っていきかたを、間違えたのかもしれません。
2471 = "可能我不應該對她用這個說法吧。" 

# monologue
# JP: けれど――どう話したところでこれは、\n重い話にしかなりません。
2424 = "但是——不論用什麼話語來掩飾，這都只能是一個沉重的話題。" 

# 【赤井】
# display as 赤井
# JP: 「ニイロク。君を助けること。\nそれを高く売るために、彼は――」
1616 = "「二六。這是為了救你。為了讓交易能有個好價錢，他——」" 

# 【ニイロク】
# display as 二六
# JP: 「わかった」
1892 = "「我明白了」" 

# monologue
# JP: 腕に感じる頷きは、思いがけぬほど強いものです。
2582 = "我感受到她在我懷裡點點頭，看來她比我想像中堅定得多。" 

# 【ニイロク】
# display as 二六
# JP: 「後藤さんのレイルロオドは、果たした。\nマスターのため、自分の全部を、使いきった」
1846 = "「後東先生的鐵路人偶，為了自己的駕駛員，奉獻了自己的一切，對嗎」" 

# 【赤井】
# display as 赤井
# JP: 「……そうなのでしょうね。彼女にとっては、\nただ後東のため――マスターのため」
1293 = "「……是啊。對於她來說，這只是為了後東——為了她的駕駛員」" 

# monologue
# JP: 当然のことといわんばかりに、\n腕の中、ニイロクがまた頷きます。
2561 = "懷中的二六又點點頭，好像我說的是什麼理所當然的事情一樣。" 

# monologue
# JP: 価値観の違いか、単なる私の感傷か――\nいえ、どちらであろうと、同じことです。
2775 = "這是到底因為我和她的價值觀不同呢，還是我單純的感情用事呢——不對，這兩者是一樣的。" 

# 【赤井】
# display as 赤井
# JP: 「結果として、ブランクの運転体が[のこ]遺りました。\nタブレットも、整備体も車輌も無い運転体が」
2054 = "「結果就是，他保住了一台空白的駕駛體。它既沒有操作板，也沒有整備體、更別提車輛」" 

# 【ニイロク】
# display as 二六
# JP: 「運転体なら、パーソナルマークはとても少ない。\nレイルロオド工機部の人たちに頼めば」
2175 = "「駕駛體的個體識別部位非常少。只要拜託鐵路人偶工程機械部的人動個手腳——」" 

# 【赤井】
# display as 赤井
# JP: 「ええ、そのとおりです。明日の朝には、\nニイロクにそっくりに仕上がっているそうです」
1779 = "「嗯，沒錯。明天早上，就能把她改造得跟二六一模一樣」" 

# 【ニイロク】
# display as 二六
# JP: 「すごい。やっぱり、頭よかったんだ。あの人」
1807 = "「好厲害。果然，那個人的腦子很好」" 

# 【赤井】
# display as 赤井
# JP: 「そうですね。ああいうタイプの頭の良さが、\n鉄道存続のためには、必要なのかもしれません」
1941 = "「是啊。他這種靈活的頭腦，說不定在保護鐵路上能派上用場」" 

# monologue
# JP: 電車区長、レイルロオド工機部長、それから私、\nそのほか、恐らく何人も――
2808 = "電車段長、鐵路人偶工程機械部部長，還有我，除了我們之外，恐怕還有好多人想拯救二六——" 

# monologue
# JP: ニイロクを助けたいと願う人たちに、\nたった一つの商品を、彼は何度でも売りつけるのです。
2413 = "他向每一個想要拯救二六的人，都做了同一個交易。" 

# 【赤井】
# display as 赤井
# JP: 「ニイロク。君を守りぬき、電車特急をいつか必ず\n復活させる――それが、私に求められた対価です」
1613 = "「二六。他提出的交易要求——就是讓我保護你，然後在今後的某一天讓電車特快復活」" 

# 【ニイロク】
# display as 二六
# JP: 「あれれ？　思ったほど頭良くないのかも、あの人」
1718 = "「咦？說不定那個人的腦子也沒有我想像中那麼好」" 

# 【赤井】
# display as 赤井
# JP: 「かもしれませんね。それは何の約束が無くても、\n私が必ず、やりとげることですから」
1910 = "「或許吧。即使沒有任何約定，我也一定會完成這件事的」" 

# monologue
# JP: しかし――彼は信頼を得ます。
2426 = "但是——他獲得了信賴。" 

# monologue
# JP: 犠牲を払い、たったひとつの約束を得た――\n結果ではなく経過自体を、彼なら商品にするでしょう。
2409 = "他付出這些犧牲，得到了獨一無二的約定——他拿來做交易的，或許並不是結果，而是過程本身吧。" 

# 【赤井】
# display as 赤井
# JP: 「ですので、あとはタブレットです。\nタブレットさえどうにかできれば」
1918 = "「所以，接下來就是操作板了。只要能搞定操作板，接下來就好說了」" 

# 【ニイロク】
# display as 二六
# JP: 「そこまでするなら――後東さんは、\nどうしてタブレットも助けないの？」
2011 = "「為什麼後東先生做到這種地步，也保不住操作板呢？」" 

# 【赤井】
# display as 赤井
# JP: 「もちろん、\n門次側で工作をするリスクは取れないからです」
2147 = "「那當然是因為，我們無法保證門司那邊沒有上面的人滲透」" 

# 【ニイロク】
# display as 二六
# JP: 「あ、そうだった。\n門次の人たちがどんな立場か、わからないから」
1750 = "「啊，確實。不知道門司那邊的人會站在哪邊」" 

# 【赤井】
# display as 赤井
# JP: 「門次側のチェックの内容を送るように指示したと\n聞いていますが――果たして、そこまで出来るかは」
1905 = "「我聽說，門司那邊收到命令，要把檢查得到的訊息報上去——不知道他們能不能做到這一步」" 

# 【ニイロク】
# display as 二六
# JP: 「それは。聞ける、簡単に」
1879 = "「我可以問問。很簡單的」" 

# 【赤井】
# display as 赤井
# JP: 「え！？」
1725 = "「哎！？」" 

# 【ニイロク】
# display as 二六
# JP: 「だって、ちょっと共感すれば\n――あ、いた！　今大丈夫？　シロおねえちゃん」
1791 = "「因為我只要共鳴一下就行——啊，連上了！你現在還好嗎？四六姐」" 

# 【赤井】
# display as 赤井
# JP: 「っ！！！」
2114 = "「這！！！」" 

# monologue
# JP: シロ。デロクマルのシロ。
2489 = "四六。Ｄ６０的四六。" 

# monologue
# JP: ――誰もが忌み嫌う廃車回送を\n一手に引き受けている貨物機のレイルロオド。
1180 = "——那位貨運機車鐵路人偶獨自承擔了被所有人避之不及的廢車回送。" 

# 【ニイロク】
# display as 二六
# JP: 「あのね？　聞きたいことがあるの。\nそう、門次のこと。すごい！　なんでわかったの？」
1670 = "「其實呢，我有事想問你。對，就是門司的事。好厲害！你怎麼知道？」" 

# monologue
# JP: ……新会社での、良いポジションを得るために。\nそんな動機であろうと、私は勝手に思っていました。
1206 = "……我曾武斷地認為，她這是為了在新公司站穩腳跟。" 

# monologue
# JP: けれども、しかし――シロのマスターが\nシロの願いを、受け止めるタイプの人であるなら――
2429 = "但是——假如四六的司機願意傾聽四六的請求——" 

# 【ニイロク】
# display as 二六
# JP: 「え？　わ！　シロおねえちゃん、\nそんなこと考えてくれてたの！？　でも、いいの？」
1730 = "「哎？哇！四六姐，連這都幫我考慮到了！？但是這樣好嗎？」" 

# monologue
# JP: ……あるいは技術を繋ぐことを、\nレールを先へと伸ばすことを、何より願う人ならば。
1211 = "……或許，他也希望讓技術傳承下去，讓鐵路不斷延續下去。" 

# monologue
# JP: （”そのため”に、\n準備をもしも、重ねてくれていたのなら――）
2879 = "（說不定，他還為此做了許多準備）" 

# 【ニイロク】
# display as 二六
# JP: 「うん。わかる。順番。自分はまだ稼働半年少しで、\nシロおねえちゃんは、引退間近なんだもんね」
1761 = "「嗯。我知道了。要按順序來。我才投入運行半年多，四六姐你已經快引退了吧」" 

# monologue
# JP: ……仮説は、すぐに裏付けられます。\nニイロクの見せる反応は、“その提案ゆえ”のもの。
1208 = "……我的推測立刻就有了證據。二六的反應，正是基於“那個提案”。" 

# monologue
# JP: 牽引機側のレイルロオドを、そのキャブ内を、\nチェックしようとする者など、誰もいないのですから。
2493 = "因為在駕駛室內，沒人會想到要檢查牽引機那方的鐵路人偶。" 

# 【ニイロク】
# display as 二六
# JP: 「シロおねえちゃんのマスターだもんね。\n門次まで、レイルロオドなしでもへいちゃらだよね」
1790 = "「因為他是四六姐的司機啊。沒有鐵路人偶也能平安把車開到門司的」" 

# monologue
# JP: シロのタブレットを、ブランクのダミー運転体に、\nそして、ニイロクの整備体へと。
2624 = "把四六的操作板放到空白的駕駛體上，然後，配以二六的整備體。" 

# monologue
# JP: その手段なら、全てのチェックをすり抜けられます。\nけれども――シロは助かりません。
2771 = "這個手段，可以繞過一切檢查。但是——卻保不住四六。" 

# 【ニイロク】
# display as 二六
# JP: 「そうなの？　マスターも引退するの？\nだったら、何の問題もない？」
1966 = "「是這樣嗎？你的司機也要引退嗎？所以，不會有任何問題？」" 

# 【赤井】
# display as 赤井
# JP: 「っ」
1265 = "「……」" 

# monologue
# JP: 問題がない――\nなどということは断じてありえません。
2556 = "怎麼會呢——這根本不算是沒有問題。" 

# monologue
# JP: けれどもしかし、ニイロクはまだ、余りに幼い。\n“死”ということを、全く理解できていません。
2433 = "但是，二六還太幼小了。她根本不能理解“死”這個詞的意義。" 

# monologue
# JP: （ですが――わたしがそれを押し付けたとて――）
2848 = "（但是——我也不能強行把這個概念塞給她——）" 

# monologue
# JP: ニイロクが、余分に苦しみ悩むだけ。\nそうなることは明白です。
2773 = "這只會給二六帶來更多的痛苦和煩惱。顯而易見。" 

# monologue
# JP: でしたら、このまま――\n何も知らせず、運んだ方が、良いのでしょう……か。
2791 = "那麼，就讓她保持現狀——讓她一無所知地經歷接下來的一切才比較好嗎……" 

# 【ニイロク】
# display as 二六
# JP: 「わかった。ありがとシロおねえちゃん。うん、うん。\n大好き！　それじゃね、またね！」
1934 = "「明白了。謝謝你，四六姐。嗯、嗯。我最喜歡你了！那待會見！」" 

# 【赤井】
# display as 赤井
# JP: 「っ！！！！」
1757 = "「嗚！！！！」" 

# 【ニイロク】
# display as 二六
# JP: 「えっ！！？　ちょっとまって。\nなに？　どうしたの、清春」
1724 = "「哎！！？等一下。什麼事？你怎麼了，清春」" 

# 【赤井】
# display as 赤井
# JP: 「ああ――いえ――」
1739 = "「啊——沒事——」" 

# monologue
# JP: またね、ではなく、さよならなのだと。\nその瞬間には、共感さえも交わせないのだと――
2770 = "這不是待會見，而是永別。在那個瞬間來臨之際，她們將不可能再見面，也不會再有共鳴——" 

# monologue
# JP: 伝えるべきであることか、\n私には……私には、まったく……決断できません。
2646 = "明明我應該告訴她這件事，但是我……我……無論如何都下不了決心。" 

# 【赤井】
# display as 赤井
# JP: 「その……シロさんに、『ありがとう』と。\n『レールは必ず、つなげていく』と」
2129 = "「那個……跟四六小姐說句謝謝吧。還有，對她轉達，我一定會讓線路延續下去」" 

# 【ニイロク】
# display as 二六
# JP: 「わかった！　あのね？　シロおねえちゃん。\n清春がね？　――うん――うん！　わかった！」
1893 = "「我明白了！喂喂，四六姐，清春他說——嗯——嗯！我明白了！」" 

# monologue
# JP: ニイロクが、ぱっと笑顔になります。\n腕の中、暖かさがふわり、広がります。
2387 = "二六的笑容一下子綻開。我感到懷中原本冰冷的二六再次溫暖了起來。" 

# 【ニイロク】
# display as 二六
# JP: 「じゃあね、おねえちゃん。ばいばい、またね！\n――うんっ」
1930 = "「拜拜，四六姐，待會見！嗯！」" 

# monologue
# JP: もぞりと動き、ニイロクが私を見上げます。\nまっすぐ、まっすぐ見上げます。
2370 = "二六在我的懷裡動了一下，抬頭看我。她的眼神是那麼，那麼直率。" 

# 【ニイロク】
# display as 二六
# JP: 「おねえちゃん、清春にね？\n『ありがとう。ニイロクのことを、頼みます』って」
1784 = "「四六姐讓我轉告你，“謝謝你。二六就拜託你了”」" 

# 【赤井】
# display as 赤井
# JP: 「……そう、ですか」
1294 = "「……是嗎」" 

# 【ニイロク】
# display as 二六
# JP: 「それでね？　清春」
2121 = "「還有，清春」" 

# 【赤井】
# display as 赤井
# JP: 「あ」
# 1741 = "「啊」" 

# monologue
# JP: ニイロクが、私の腕からすり抜けます。\n正面に立ち。もう一度、わたしをまっすぐ見つめます。
2373 = "二六從我的懷裡鑽出去。她站在我的面前。再一次用直率的視線看著我。" 

# 【ニイロク】
# display as 二六
# JP: 「この体。整備体。\n明日にはもう、なくなっちゃうでしょ？」
1902 = "「我的這副身體——整備體。明天是不是就要消失了？」" 

# 【赤井】
# display as 赤井
# JP: 「はい」
# 1952 = "「是啊」" 

# monologue
# JP: 匂いを、不意に感じます。\n……水の匂いであるような、血の匂いでもあるような。
2552 = "忽然，我聞到了一種味道。——好像水的味道，又好像血的味道。" 

# monologue
# JP: ニイロクから、今まで嗅いだことのない――\n生きているものの、命の匂いを。
2579 = "我從未在二六身上聞到過這種味道——那是生命的味道。" 

# 【ニイロク】
# display as 二六
# JP: 「だから、清春に見て欲しいの。\n自分の全部を――残らず、覚えていて欲しい」
1916 = "「所以，我想讓你再多看看我。看看我的一切——記住我的一切，一絲一毫也不要忘記」" 

# 【ニイロク】
# display as 二六
# JP: 「あと五分」
2120 = "「還有五分鐘」" 

# 【赤井】
# display as 赤井
# JP: 「ええ」
# 1769 = "「嗯」" 

# monologue
# JP: いつもの部屋。ニイロクと自分と、ふたりきり。\n荷物は、手近にまとめてあります。
2780 = "這還是平時的房間。只有我和二六兩個人。行李就在身邊，已經收拾好了。" 

# monologue
# JP: いつもよりずっと小さな体のニイロクと、\nいつものようにくっつきあいます。
2392 = "二六的身體顯得比平時還要嬌小，我們像往常一樣緊緊靠在一起。" 

# 【ニイロク】
# display as 二六
# JP: 「うまくいくよね？」
1875 = "「我們會順利吧？」" 

# 【赤井】
# display as 赤井
# JP: 「そうあることを信じるのみです」
1700 = "「只能如此相信了」" 

# monologue
# JP: 複数系統の、相互の繋がりを確認できない、\n信頼が置けそうな人たちを選び、頼んであります。
2501 = "大家身處不同的部門，很難了解互相之間的聯繫，所以我選擇了值得相信的人，拜託了他們。" 

# monologue
# JP: もしも失敗したならば、すぐメールを、と。
2751 = "讓他們萬一失敗了，馬上給我發簡訊。" 

# 【ニイロク】
# display as 二六
# JP: 「そういかなければ？」
1812 = "「如果沒成功怎麼辦？」" 

# 【赤井】
# display as 赤井
# JP: 「逃げ出すのみです。\nなに、そうなればなったで、どうとでも出来ます」
2132 = "「那只能逃跑了。沒事的，船到橋頭自然直」" 

# 【ニイロク】
# display as 二六
# JP: 「そうなんだ」
1961 = "「是這樣啊」" 

# monologue
# JP: 初めて、でしょうか？\nニイロクにウソをついたのは。
2774 = "這大概是我第一次對二六說謊吧？" 

# monologue
# JP: 逃げてしまえば、先は闇です。\n成功を、祈る他にはありません。
2511 = "如果我們逃跑的話，只能面對黑暗的未來。所以，我只能祈禱行動成功了。" 

# 【ニイロク】
# display as 二六
# JP: 「うまくいったら、清春と自分はどこいくの？」
1814 = "「如果順利逃走的話，咱們要去哪裡？」" 

# 【赤井】
# display as 赤井
# JP: 「どこへだっていけますよ。\n電車区長は、多くを勝ち取ってくれましたから」
1690 = "「去哪都可以。電車段長已經幫了我們很多」" 

# monologue
# JP: 幹部職員も含まれる多くの署名は、\nそれなりの武器になったようです。
2636 = "拿到那麼多職員、幹部職員的署名，似乎是一項比較有用的武器。" 

# monologue
# JP: \x%lクハ26;#00ffc040;クハ26%l;#;を私たちは、\n高く、売ったのだとも思います。
2705 = "簡直是我們把\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;用高價賣了出去。" 

# 【赤井】
# display as 赤井
# JP: 「単線、非電化の複数の路線が、帝鉄廃止後に\nいくらかの車輌とともに売却されると内定しました」
1666 = "「公司已經決定，在帝國鐵路被廢除後，把許多單線、非電力化的線路與一些車輛一起出售」" 

# 【ニイロク】
# display as 二六
# JP: 「そうなんだ！」
1962 = "「是這樣啊！」" 

# 【赤井】
# display as 赤井
# JP: 「ですので、その中で一番電化が早そうなところへ\n行きましょう。私達なら、受け入れられます」
1915 = "「所以，我們就去那些線路中能最快電力化的地方吧。他們一定會收留我們的」" 

# 【ニイロク】
# display as 二六
# JP: 「そっか、どこがいいのかな？」
1963 = "「是這樣啊，那咱們去哪裡好呢？」" 

# monologue
# JP: 地図を、ニイロクが無邪気に広げます。\nもう数日でズタズタに分断される、路線図を。
2368 = "二六單純無邪地展開地圖。那是再過幾天之後，就會變得支離破碎的線路圖。" 

# 【ニイロク】
# display as 二六
# JP: 「[ゆのい,1]湯医線は清春の神社の近くだけれど、\n電化はむつかしそうだよね」
2009 = "「湯醫線雖然離你家的神社很近，但是電力化應該很難吧」" 

# monologue
# JP: そう。どこも電化は、厳しいでしょう。\nそうした路線しか、割譲されないのですから。
2652 = "是啊。每條線路的電力化應該都很難。因為只有那種線路會被割讓出去。" 

# monologue
# JP: あるいは、わたしたちの闘争そのものさえも、\n最初から描かれていたのかもしれません。
2612 = "或許我們的反抗本身，也早已寫在他們的計劃之中了。" 

# monologue
# JP: （分断されれば摺り潰されていくだけです。\nレールを――なんとしても繋がなければ）
2875 = "（線路一旦被他們截斷，鐵路就只有被摧毀一條路了。我必須要保護連在一起的線路）" 

# monologue
# JP: 後東。先輩。彼らはどこに行くのでしょうか？\n彼らは本当に、信頼に足る人間でしょうか？
2551 = "後東還有前輩，也不知他們將會何去何從？他們真的是我能夠信賴的人嗎？" 

# monologue
# JP: 同じところに行くべきか、別の路線を選ぶべきか。\nそこは、慎重に考えなければなりません。
2583 = "我應該跟他們一起去呢，還是應該選別的路呢。我必須仔細考慮這一點。" 

# 【ニイロク】
# display as 二六
# JP: 「ね？　清春はどこに行きたい？」
1907 = "「我說，清春，你想去哪啊？」" 

# 【赤井】
# display as 赤井
# JP: 「それは、ことが済んでから考えましょう」
2044 = "「等事情結束我再慢慢想吧」" 

# 【ニイロク】
# display as 二六
# JP: 「あ！」
# 1743 = "「啊！」" 

# monologue
# JP: 時間です。
2654 = "時間到了。" 

# monologue
# JP: 共感を、さっそくつないだのでしょう。\nニイロクの体があたたかに――っ！！？
2364 = "二六一定是很快連上了共鳴。她的身體變熱了——！！？" 

# 【ニイロク】
# display as 二六
# JP: 「ひっ！？　ひあっ――あっ！！　これ――やめっ！\n無理しないで！　シロおねえちゃんっ！！」
1710 = "「呀！？呀啊——啊！！這——不行！不要這樣！四六姐！！」" 

# 【赤井】
# display as 赤井
# JP: 「っ――」
# 1265 = "「……」" 

# monologue
# JP: 直面させるしかないと。説明では理解させられないと、\n覚悟していた筈でした。
2682 = "用語言是無法讓二六理解的。我早已做好心理準備，只能讓她直接面對事實。" 

# monologue
# JP: それでもニイロクの悲鳴を聞けば、\n心がざくりと切り裂かれます。
2423 = "但即便如此，聽到二六的慘叫，我的心還是被扯得粉碎。" 

# monologue
# JP: （――蒸気機関車、\x%lD60;#00ffc040;D60%l;#;の量産レイルロオドの能力で、\n\x%lクハ26;#00ffc040;クハ26%l;#;、最新鋭レイルロオドの体を稼働させるのです）
2823 = "（——畢竟這是用蒸汽機車——\\x%lD60;#00ffc040;Ｄ６０%l;#;的量產鐵路人偶的能力，來運作\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;——最新型鐵路人偶的身體）" 

# monologue
# JP: どう考えても、高負荷すぎです。\nタブレットが瞬時に破損したとて、おかしくない程。
2673 = "無論怎麼想，這對四六那邊的負荷都太重了。哪怕操作板瞬間損壞也不奇怪。" 

# 【ニイロク】
# display as 二六
# JP: 「しゃべっちゃダメ！！　こわれちゃう！！\nシロおねえちゃん！　無理！　こわれちゃうよぉ」
1589 = "「不可以說話！！你會壞掉的！！四六姐！不行！你會壞掉的……」" 

# 【赤井】
# display as 赤井
# JP: 「壊れても、やってもらうしかありません」
1823 = "「就算會壞掉，也只能讓她繼續下去」" 

# 【ニイロク】
# display as 二六
# JP: 「っ！！！？」
2115 = "「這！！！？」" 

# 【赤井】
# display as 赤井
# JP: 「中断すれば、シロの覚悟さえ無駄になります。\nですので、止めるのではなく――応援を」
2065 = "「萬一中斷，四六的決心就白費了。所以，我們不能阻止她——而是要替她加油」" 

# 【ニイロク】
# display as 二六
# JP: 「ひぐっ！！！」
1756 = "「嗚！！！」" 

# monologue
# JP: 最新鋭で、最高性能。\nその意味を私は誰より、知っています。
2656 = "最新型、最高性能。我比任何人都清楚這個詞的意義。" 

# monologue
# JP: ニイロクは――精神が未だ幼くあろうと、\n悲しいほどに、計算能力が高いのです。
2390 = "二六的精神明明還很幼稚，但她的計算能力卻高得可悲。" 

# 【赤井】
# display as 赤井
# JP: 「それが無理なら、マスターとして命令を」
1808 = "「如果你做不到的話，我就作為駕駛員命令你」" 

# 【ニイロク】
# display as 二六
# JP: 「無理じゃない！　命令、しないでっ！\nできる――する――から、したいからっ！！」
1878 = "「我做得到！不要命令我！我做得到——我想要做到！！！」" 

# monologue
# JP: だから、ニイロクは理解します。\nどう転んでも、シロは終わりだということを。
2614 = "所以，二六終於明白了。她明白了，無論如何，四六都會由此走向終點。" 

# monologue
# JP: そして万一中断し、工作が明らかになるのなら、\n努力全てが、シロの覚悟が、潰えることを。
2724 = "而且萬一打斷她，暴露了我們動的手腳，四六一切的努力、一切的決心，就會化為泡影。" 

# 【赤井】
# display as 赤井
# JP: 「でしたら、ニイロク。\nシロに――全力で、応援を」
2137 = "「那好，二六。盡全力為四六加油吧——」" 

# 【ニイロク】
# display as 二六
# JP: 「うんっ！！！」
1772 = "「嗯！！！」" 

# monologue
# JP: 運転体の小さな体が、大きく、大きく頷きます。
2815 = "駕駛體小小的身體，用力地點點頭。" 

# 【ニイロク】
# display as 二六
# JP: 「がんばれ！　がんばれシロおねえちゃん！！！\nがんばれ、がんばれシロおねえちゃんっ！！」
1678 = "「加油！四六姐，加油！！！加油、加油，四六姐！！」" 

# monologue
# JP: （まだ、か――まだなのか）
2884 = "（還沒結束嗎——）" 

# monologue
# JP: ――機体照合。動作確認。\n数分もかからぬはずの時間が、いまだ終わりません。
1182 = "——驗明機體。測試功能。明明這些工作應該花不了幾分鐘，但現在還沒做完。" 

# 【ニイロク】
# display as 二六
# JP: 「がんばれ！　負けるなシロおねえちゃん！！！\nいっしょ！　ニイロク！　いっしょにいるから！」
1676 = "「加油！四六姐，不要輸！！！我們和你在一起！二六和你在一起！」" 

# monologue
# JP: 確認が終わってくれるなら、\n機関車さえ走り始めてくれるなら――
2513 = "如果檢查完畢的話，如果機車開始運行的話——" 

# 【ニイロク】
# display as 二六
# JP: 「あ」
# 1741 = "「啊」" 

# monologue
# JP: ニイロクの口から、安堵の声。\nメールは――――大丈夫、届きません。
2382 = "二六發出了放心的聲音。訊息內容是————沒關係，沒有發現。" 

# 【赤井】
# display as 赤井
# JP: 「走りましたか」
2025 = "「發車了嗎」" 

# 【ニイロク】
# display as 二六
# JP: 「多分、そう。おねえちゃん、\n『イェイ！』って、スリープはいったから」
1861 = "「應該是的。四六姐說了一句“耶！”就睡著了」" 

# 【赤井】
# display as 赤井
# JP: 「共感を――意味ある共感を送ったのですか！？」
1804 = "「她——她給你發送了有意義的共鳴！？」" 

# 【ニイロク】
# display as 二六
# JP: 「ずうっとぐちゃぐちゃだったけど、\n『イェイ！』って、それはハッキリ伝わってきた！」
2160 = "「雖然那邊傳來的訊息大部分亂糟糟的，但是那句“耶！”聽起來卻很清楚！」" 

# 【赤井】
# display as 赤井
# JP: 「そう……ですか。\nそれほどのレイルロオドを育てる方が、貨物に――」
1964 = "「是這樣嗎……貨運組裡，居然有人能把鐵路人偶培養得這麼好——」" 

