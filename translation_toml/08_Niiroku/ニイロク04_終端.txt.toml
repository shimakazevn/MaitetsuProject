[script]
# lines: 470 
# 【赤井】
# display as 赤井
# JP: 「こちらが、現帝鉄職員338名分の署名。\nそして、こちらが趣旨提案書となります」
2110 = "「Đây là chữ ký của 338 nhân viên Đường sắt Hoàng gia hiện tại. Và, đây là bản đề xuất mục đích.」"
# 【電車区長】
# display as 電車段長
# JP: 「338！　近隣からも集めよったとか。\nいや、それにしても太か数よの」
2182 = "「338! Cậu thu thập cả từ những người xung quanh nữa sao. Không, dù vậy thì con số này cũng lớn đấy.」"
# monologue
# JP: 驚いたような声ですが、\n目に、表情に、いささかの動揺もありません。
2797 = "Dù giọng điệu có vẻ ngạc nhiên, nhưng trong ánh mắt, trên nét mặt, không hề có chút bối rối nào."
# monologue
# JP: 立場を違え対峙して、改めて、車輌工場のみならず、\n電車区全てを統括してきた人物なのだと感じます。
2798 = "Đứng ở lập trường đối lập, tôi lại một lần nữa cảm nhận được rằng, ông ấy không chỉ là người quản lý nhà máy toa xe, mà còn là người thống lĩnh toàn bộ Đoạn xe điện."
# 【赤井】
# display as 赤井
# JP: 「[げんぎょうしょく,2]現業職からの署名だけではありません。\n総合職や、幹部職員からの署名もあります」
1874 = "「Không chỉ có chữ ký từ các nhân viên hiện trường đâu. Còn có cả chữ ký của các nhân viên tổng hợp và cán bộ nữa.」"
# 【電車区長】
# display as 電車段長
# JP: 「ほーう、幹部職員からも」
1754 = "「Hô, từ cả cán bộ nữa cơ à.」"
# monologue
# JP: 電車区長が見回すと、何人かの職員が目を逸します。\nいい反応ではありません、急ぎ言葉を継ぎ足します。
2809 = "Khi Đoạn trưởng xe điện đảo mắt nhìn quanh, một vài nhân viên đã lảng tránh ánh mắt ông. Đó không phải là một phản ứng tốt, tôi vội vàng nói tiếp."
# 【赤井】
# display as 赤井
# JP: 「[もじ,1]門次・[こくら,1]粉蔵・[はかた,1]博太間を廃線することはそれほどに\n無意味――ナンセンスだと多くが感じている証です」
2113 = "「Đó là bằng chứng cho thấy rất nhiều người cảm thấy việc bãi bỏ tuyến đường giữa Moji, Kokura và Hakata là một việc vô nghĩa――thật vô lý.」"
# 【電車区長】
# display as 電車段長
# JP: 「そらぁそうよ。こぎゃんとバカな話ばあらぁせん。\nこどもにだってわかることとや」
2146 = "「Chuyện đó thì rõ rồi. Làm gì có chuyện ngu xuẩn đến thế chứ. Đến con nít cũng hiểu được mà.」"
# 【赤井】
# display as 赤井
# JP: 「！？　でしたら――分轄・民営化案を」
1774 = "「!? Nếu vậy――phương án chia tách, tư nhân hóa thì sao」"
# 【電車区長】
# display as 電車段長
# JP: 「逆から言えば、バカな話を呑まさるだけの理由が、\nこっちにもあるいうことよ」
1696 = "「Nói ngược lại thì, chúng tôi cũng có lý do để phải nuốt trôi cái chuyện ngu xuẩn đó đấy.」"
# monologue
# JP: 渡した署名に、電車区長の目が注がれます。\nその口元が、ふ、と緩みます。
2810 = "Ánh mắt của Đoạn trưởng xe điện đổ dồn vào tờ giấy có chữ ký mà tôi vừa đưa. Khóe miệng ông ấy, khẽ nhếch lên."
# 【電車区長】
# display as 電車段長
# JP: 「……よぉこれだけ集めてくれたの。\nこれじゃったら、腹ぁ割って話せるけん」
1279 = "「......Cậu thu thập được chừng này cũng khá đấy. Thế này thì, chúng ta có thể nói chuyện thẳng thắn với nhau rồi.」"
# 【赤井】
# display as 赤井
# JP: 「え？」
1726 = "「Hả?」"
# 【電車区長】
# display as 電車段長
# JP: 「ニイロクば、おらんな？」
1617 = "「Niiroku, không có ở đây chứ?」"
# 【赤井】
# display as 赤井
# JP: 「はい。そういう約束でしたから。\nもちろん、私一人だけのことでもありません」
1954 = "「Vâng. Vì chúng ta đã thỏa thuận như vậy mà. Tất nhiên, chuyện này cũng không chỉ có riêng mình tôi.」"
# monologue
# JP: 見回せば、無数の視線が返ります。\n粉蔵所属の――大げさではなく、全運転士・機関士の。
2592 = "Nhìn quanh, vô số ánh mắt đáp lại tôi. Của những người thuộc Kokura――không nói quá đâu, là của toàn bộ lái tàu và thợ máy."
# monologue
# JP: その誰一人、レイルロオドを連れていません。\nそれが、この面談の条件でしたから。
2723 = "Không một ai trong số họ mang theo Railord. Bởi vì đó là điều kiện của cuộc gặp mặt này."
# 【電車区長】
# display as 電車段長
# JP: 「じゃったら、よか」
2148 = "「Nếu vậy thì, tốt rồi.」"
# 【赤井】
# display as 赤井
# JP: 「っ！？　これは？」
1748 = "「!? Đây là?」"
# monologue
# JP: 投げ渡されたのは、書類です。\n表紙には、「極秘」と朱書きしてあります。
2406 = "Thứ được ném qua, là một tập tài liệu. Trên trang bìa, có viết chữ 'Tuyệt mật' bằng mực đỏ."
# 【電車区長】
# display as 電車段長
# JP: 「“帝鉄側”の、手の内全部ぞ」
1261 = "「Là toàn bộ con bài trong tay của 'Phía Đường sắt Hoàng gia' đấy.」"
# 【後東】
# display as 司機Ａ
# JP: 「マジかよ！？　俺にも見せてくれよ」
2029 = "「Thật sao!? Cho tôi xem với.」"
# 【電車区長】
# display as 電車段長
# JP: 「やめぇ[ごとう,1]後東っ！！！」
1847 = "「Dừng lại đi Hậu Đông!!!」"
# 【赤井】
# display as 赤井
# JP: 「読みます！　私が声に出して読みますから！！」
1897 = "「Tôi sẽ đọc! Tôi sẽ đọc to lên cho mọi người nghe!!」"
# 【後東】
# display as 後東
# JP: 「そっか、なら任せるぜ」
2111 = "「Vậy sao, thế thì giao cho cậu đấy.」"
# monologue
# JP: 沸き起こりかけてたどよめきが、\n押し寄せかけた人波が――
2403 = "Tiếng xì xào bàn tán vừa chực bùng lên, Đám đông vừa định ùa tới――"
# monologue
# JP: 電車区長の一喝と、その一言とに鎮まります。
2728 = "Đã bị dập tắt bởi tiếng quát và một lời nói của Đoạn trưởng xe điện."
# monologue
# JP: （……計算でやっているのか、天然なのか）
2830 = "（......Là do ông ấy tính toán trước, hay là bản năng tự nhiên vậy）"
# monologue
# JP: [ごとうかいた,3]後東塊太――\n同期の中でもこれ程に、食えぬ男は他にいません。
2550 = "Hậu Đông Khối Thái―― Trong số những người cùng thời, không ai khó đối phó bằng cậu ta."
# monologue
# JP: 強盗塊太とさえも呼ばれる、アクの強い男ですが……\nあるいは真に相談すべきは、先輩よりもむしろ――
2796 = "Một gã đàn ông mạnh mẽ, thậm chí còn bị gọi là Cường Đạo Khối Thái...... Nhưng có lẽ người tôi thực sự nên bàn bạc, không phải là tiền bối mà là――"
# 【後東】
# display as 後東
# JP: 「どうしたい？　読めねぇ字でもあんのかよ？」
1856 = "「Sao thế? Bộ có chữ nào không đọc được à?」"
# 【赤井】
# display as 赤井
# JP: 「ああいえ、読みます。\n『帝鉄解体に向け予想される反発への対処法』」
1603 = "「À không, tôi đọc đây. 『Phương pháp đối phó với những phản đối dự kiến hướng tới việc giải thể Teitetsu』」"
# 【後東】
# display as 後東
# JP: 「なっ！？」
1635 = "「Cái gì!?」"
# 【技工Ａ】
# display as 技工Ａ
# JP: 「手の内全部て！」
1924 = "「Toàn bộ thủ đoạn sao!」"
# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「経営側の――こいば対処マニュアルと？」
2107 = "「Đây là——sổ tay đối phó của phía ban điều hành sao?」"
# 【先輩】
# display as 前輩
# JP: 「そぎゃん手の内ば明かすわけがなか！！\nこらぁ経営側の分断工作ぞっ！！！」
1638 = "「Làm gì có chuyện chúng tiết lộ toàn bộ thủ đoạn như thế!! Đây là công tác chia rẽ của phía ban điều hành đấy!!!」"
# monologue
# JP: 先輩の怒声が、ざわめきを揺らし、大きく乱して。\nやがてそれは、緊張に満ちた沈黙へと収束します。
2460 = "Tiếng gầm lên tức giận của tiền bối làm xáo trộn sự xôn xao, gây ra sự hỗn loạn lớn. Chẳng bao lâu sau, nó hội tụ thành một sự im lặng đầy căng thẳng."
# monologue
# JP: いえ――満ちているのは緊張ではなく、\n疑心暗鬼の四文字です。
2349 = "Không——thứ lấp đầy không phải là sự căng thẳng, mà là bốn chữ bán tín bán nghi."
# 【赤井】
# display as 赤井
# JP: 「……とにかく、読みます。\n『１：鉄道全廃へのロードマップ』」
1298 = "「……Dù sao thì, tôi sẽ đọc. 『1: Lộ trình tiến tới bãi bỏ toàn bộ đường sắt』」"
# monologue
# JP: ……読み進むにつれ、沈黙の質が変化します。\n疑心暗鬼は、静かに、闇に呑まれていくようです。
1220 = "……Càng đọc tiếp, bản chất của sự im lặng càng thay đổi. Sự bán tín bán nghi, dường như đang lặng lẽ bị bóng tối nuốt chửng."
# monologue
# JP: 深く、黒く、濃く、重い。\n絶望という名の、冷たい闇に。
2778 = "Sâu thẳm, đen kịt, đặc quánh, nặng nề. Vào bóng tối lạnh lẽo mang tên tuyệt vọng."
# monologue
# JP: （これは――こんなものを電車区長が――\nいや、帝鉄上層部さえ用意できるとは思えない）
2883 = "（Cái này——một thứ như thế này mà Trưởng khu tàu điện—— Không, ngay cả tầng lớp thượng tầng của Teitetsu cũng không thể chuẩn bị được）"
# monologue
# JP: 日ノ本国内のみならず、海外という視点も持った、\n冷酷なまでに透徹された、『運輸計画』。
2777 = "Một 『Kế hoạch vận tải』 được nhìn nhận một cách thấu đáo đến mức tàn nhẫn, không chỉ trong nước Hinomoto mà còn mang góc nhìn từ nước ngoài."
# monologue
# JP: エアクラ推進のため、鉄道は、徐々に――\nそのイメージも含め弱体化させられてきたのだと……
2514 = "Vì mục đích thúc đẩy Aircra, đường sắt, đang dần dần—— bị làm cho suy yếu, bao gồm cả hình ảnh của nó……"
# monologue
# JP: （いや――そういってしまうのは、甘えですね。\nイメージ悪化は、我々自身の弱さでしかない）
2820 = "（Không——nói như vậy, thì quá ngây thơ rồi. Hình ảnh trở nên tồi tệ đi, chỉ là do sự yếu kém của chính chúng ta mà thôi）"
# monologue
# JP: 経営が傾きはじめ、待遇が悪くなり、サービス低下。\nより経営が落ち込んでいく、典型的な悪循環。
2714 = "Kinh doanh bắt đầu sa sút, đãi ngộ trở nên tồi tệ, dịch vụ đi xuống. Kinh doanh càng thêm suy sụp, một vòng luẩn quẩn điển hình."
# monologue
# JP: 全国的にそれが明らかになりはじめ、\n“帝鉄叩き”が同時多発的に沸き起こってもなお――
2689 = "Dù cho điều đó bắt đầu trở nên rõ ràng trên toàn quốc, và làn sóng “chỉ trích Teitetsu” bùng nổ đồng loạt ở nhiều nơi——"
# monologue
# JP: （帝鉄は、ほんのわずかも、\n変われなかった――変わらなかった）
2861 = "（Teitetsu, dù chỉ một chút, cũng không thể thay đổi——đã không thay đổi）"
# monologue
# JP: いまよりは遥かに状況が良く、\n職員たちの士気もまだ高かった時期にさえ。
2484 = "Ngay cả trong thời kỳ mà tình hình tốt hơn bây giờ rất nhiều, và sĩ khí của các nhân viên vẫn còn cao."
# monologue
# JP: 自発的な改善案が、どれほど根こそぎ潰されたのか\n……振り返るなら、絶望の黒は濃さを増します。
2491 = "Những phương án cải thiện tự phát đã bị bóp nghẹt tận gốc đến nhường nào ……Nếu nhìn lại, sắc đen của sự tuyệt vọng càng thêm đậm đặc."
# 【後東】
# display as 後東
# JP: 「全部――計画通りに運ばれてきたって訳かよ。\n今日ここで巻き込まれてる、クソ茶番さえもよぉ！」
1684 = "「Tất cả——đều được tiến hành theo đúng kế hoạch sao. Ngay cả cái trò hề chết tiệt mà chúng ta bị cuốn vào ngày hôm nay cũng vậy!」"
# monologue
# JP: 後東の怒声に、けれども誰も、呼応しません。
2549 = "Trước tiếng gầm giận dữ của Goto, tuy nhiên, không một ai hưởng ứng."
# monologue
# JP: それほどまでに――“経営側”は周到で、\n逆転の余地など、残されているとは思えません。
1192 = "Đến mức độ đó——“phía ban điều hành” đã chuẩn bị quá chu đáo, tôi không nghĩ rằng còn lại chút dư địa nào để lật ngược tình thế."
# monologue
# JP: （だが――それでも。\nそれでもニイロクを諦めるわけにはいきません）
2847 = "（Nhưng——dù vậy. Dù vậy tôi cũng không thể từ bỏ Niiroku được）"
# 【赤井】
# display as 赤井
# JP: 「――ここまで読めば、十分です」
1248 = "「——Đọc đến đây, là đủ rồi.」"
# monologue
# JP: 震えそうになる声を抑えて、\n電車区長に視線を向けます。
2563 = "Kìm nén giọng nói như sắp run rẩy, tôi hướng ánh mắt về phía Trưởng khu tàu điện."
# monologue
# JP: 同意も、異議も、聞こえません。\n――誰も、何一つ言いません。
2638 = "Sự đồng tình, hay phản đối, đều không nghe thấy. ——Không một ai, nói bất cứ điều gì."
# 【赤井】
# display as 赤井
# JP: 「帝鉄の――冥国のいう“帝鉄解体”とは、\nつまり、全車輌の解体という意味なのですね？」
1828 = "「“Giải thể Teitetsu” mà Teitetsu——nước Meikoku nói đến, nói cách khác, có nghĩa là giải thể toàn bộ toa xe phải không?」"
# 【後東】
# display as 後東
# JP: 「バカじゃねえのか！！　んなことして何になるよ。\n線路全部剥がして道路にしたって」
2109 = "「Bị ngu à!! Làm mấy cái trò đó thì được tích sự gì chứ. Dù có lột sạch toàn bộ đường ray rồi biến thành đường bộ đi chăng nữa」"
# 【電車区長】
# display as 電車段長
# JP: 「『全部』とは書かれとらん。\n売却ばして構わん路線も、列記されとる」
2112 = "「Không có viết là 『Toàn bộ』 đâu. Những tuyến đường sắt không ngại bán đi, cũng được liệt kê ra đấy.」"
# monologue
# JP: 資料を、少し戻ります。\n間違えて伝えるわけにはいきません。
2577 = "Tôi lật lại tài liệu một chút. Không thể truyền đạt sai lệch được."
# 【赤井】
# display as 赤井
# JP: 「確かに、列記されていますね。[ゆのい,1]湯医線。[たかもり,1]鷹森線。\n[まつうら,1]松裏線、[からぎ,1]辛木線。[かごしま,2]鹿兒島本線の[せんだい,1]千内-[やつしろ,2]八ツ城間」
2027 = "「Quả thực, có được liệt kê ra nhỉ. Tuyến Yunoi. Tuyến Takamori. Tuyến Matsuura, tuyến Karagi. Tuyến chính Kagoshima đoạn từ Sendai đến Yatsushiro.」"
# 【後東】
# display as 後東
# JP: 「バラっバラに散ってるじゃねえか！　しかも、\n非電化の単線区間ばっかだ！！！」
2105 = "「Nằm rải rác tứ tung khắp nơi mà! Hơn nữa, toàn là các đoạn đường đơn không điện khí hóa!!!」"
# 【電車区長】
# display as 電車段長
# JP: 「じゃの。そぎゃんば、帝鉄の――いいや、\n国と、[めいこく,1]冥国との意思たい」
1819 = "「Đúng vậy. Đó chính là ý chí của Teitetsu——à không, của quốc gia, và của nước Meikoku đấy.」"
# 【赤井】
# display as 赤井
# JP: 「ガス抜きのため――\n一時的には存続できる路線と、旧型車輌とを[かつじょう,1]割譲する」
2010 = "「Để xoa dịu tình hình—— họ sẽ cắt nhượng những tuyến đường sắt có thể tồn tại tạm thời, cùng với các toa xe kiểu cũ.」"
# 【後東】
# display as 後東
# JP: 「やってけるわけねえだろ、そんなの！\n最終的には鉄道全廃かよ！　クソっくらえだ！！」
1859 = "「Làm sao mà tiếp tục được với mấy thứ đó chứ! Cuối cùng thì vẫn là bãi bỏ toàn bộ đường sắt sao! Chết tiệt!!」"
# 【電車区長】
# display as 電車段長
# JP: 「ばってん、そぎゃんクソでも、食らうしか――\n鉄道存続の可能性を残す道は、なか」
1702 = "「Tuy nhiên, dù có chết tiệt như thế, cũng chỉ đành cắn răng chịu đựng—— chẳng còn con đường nào khác để giữ lại khả năng tồn tại của đường sắt đâu.」"
# 【赤井】
# display as 赤井
# JP: 「っ！」
1743 = "「っ!」"
# monologue
# JP: その一言に確信します。\n――繋がります。
2729 = "Lời nói đó đã làm tôi tin chắc. ——Mọi thứ đã kết nối lại với nhau."
# monologue
# JP: この資料の開示も、署名への評価も、何もかも。\n電車区長の言動が、一筋のレールを描きます。
2811 = "Việc công bố tài liệu này, sự đánh giá đối với việc ký tên, và mọi thứ khác. Lời nói và hành động của Trưởng khu tàu điện, đã vẽ nên một đường ray duy nhất."
# 【赤井】
# display as 赤井
# JP: 「電車区長は、鉄道存続をお望みなのですね？」
2170 = "「Trưởng khu tàu điện, ngài mong muốn đường sắt tiếp tục tồn tại phải không?」"
# 【電車区長】
# display as 電車段長
# JP: 「電化路線と電車達。未来ば[いっとき,1]一時は潰しても……\nそいでん、生き残らせるもんば、作らんと」
2161 = "「Các tuyến đường sắt điện khí hóa và các tàu điện. Dù tương lai có bị bóp nát nhất thời đi chăng nữa…… thì vẫn phải tạo ra những thứ có thể sống sót chứ.」"
# 【赤井】
# display as 赤井
# JP: 「そのお覚悟があるのでしたら――電車区長。\n自主運用での徹底抗戦も選択肢にできるかと」
1811 = "「Nếu ngài đã có giác ngộ đó——thưa Trưởng khu tàu điện. Liệu việc kháng chiến triệt để bằng cách tự chủ vận hành cũng có thể trở thành một lựa chọn không?」"
# monologue
# JP: 一時的、形式的な延命ですり潰されていくよりも、\n真正面から戦う方が、ずっといい。
2735 = "So với việc bị nghiền nát bởi sự kéo dài sự sống mang tính hình thức và nhất thời, thì việc chiến đấu trực diện sẽ tốt hơn rất nhiều."
# 【赤井】
# display as 赤井
# JP: 「電車特急――エグゼクティブエクスプレスは確実に、\n闇を裂き、光となれる車輌なのですから」
1792 = "「Bởi vì tàu điện tốc hành——Executive Express chắc chắn, là toa xe có thể xé toạc bóng tối, và trở thành ánh sáng.」"
# 【後東】
# display as 後東
# JP: 「ひかりか――いいな、いかにも復活の切り札だ。\nエグゼクティブエクスプレス“ひかり”号」
1835 = "「Ánh sáng sao——tuyệt đấy, quả đúng là con át chủ bài của sự phục sinh. Executive Express tàu “Hikari”.」"
# 【技工Ａ】
# display as 技工Ａ
# JP: 「ひかり号」
1663 = "「Tàu Hikari」"
# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「\x%l電車;#00ffc040;電車%l;#;特急――ひかり号！」
1236 = "「\\x%l電車;#00ffc040;Tàu điện%l;#; tốc hành——tàu Hikari!」"
# 【先輩】
# display as 前輩
# JP: 「冷静さば欠いちゅうぞ、赤井君。\n国ば敵にまわして“\x%l電車;#00ffc040;電車%l;#;”ば、走れん」
1654 = "「Cậu thiếu bình tĩnh quá rồi đấy, cậu Akai. Đối đầu với quốc gia thì “\\x%l電車;#00ffc040;tàu điện%l;#;” làm sao mà chạy được.」"
# 【赤井】
# display as 赤井
# JP: 「あ――」
1734 = "「A——」"
# monologue
# JP: 差し込みかけたひかり――\nいえ、幻のひかりがあえなく、呑まれていきます。
2534 = "Ánh sáng vừa mới lóe lên—— Không, ánh sáng ảo ảnh ấy đã bị nuốt chửng một cách vô vọng."
# 【電車区長】
# display as 電車段長
# JP: 「送電停止。[がせん,1]架線撤去――\n国ば、なんでもやれるけんのう」
1659 = "「Ngừng cấp điện. Tháo dỡ \\x%l架線;#00ffc040;đường dây tiếp điện trên cao%l;#;—— Quốc gia thì, chuyện gì cũng làm được mà.」"
# monologue
# JP: ……その通りです。必要設備の多さはそのまま、\n自主運用の困難さに他なりません。
1215 = "……Đúng là như vậy. Số lượng thiết bị cần thiết quá nhiều, chính là sự khó khăn của việc tự chủ vận hành."
# 【電車区長】
# display as 電車段長
# JP: 「……\x%lクハ26;#00ffc040;クハ26%l;#;を初めとする全ての\x%l電車;#00ffc040;電車%l;#;。電化完了路線群。\nそいば犠牲にすることで、少しは助かるもんもある」
1282 = "「……Bắt đầu từ \\x%lクハ26;#00ffc040;Kuha 26%l;#; cùng toàn bộ các \\x%l電車;#00ffc040;tàu điện%l;#; khác. Và các tuyến đường sắt đã hoàn thành điện khí hóa. Bằng cách hy sinh những thứ đó, sẽ có một vài thứ được cứu vãn.」"
# 【先輩】
# display as 前輩
# JP: 「そん言い方ばっ！！」
1656 = "「Cái cách nói đó là sao!!」"
# 【赤井】
# display as 赤井
# JP: 「いいえ先輩。構いません。\nそれは単なる事実であり、単なる評価の対象です」
1977 = "「Không sao đâu tiền bối. Tôi không bận tâm đâu. Đó chỉ đơn thuần là sự thật, và là đối tượng để đánh giá mà thôi.」"
# 【先輩】
# display as 前輩
# JP: 「じゃっどん――」
2128 = "「Nhưng mà——」"
# 【電車区長】
# display as 電車段長
# JP: 「\x%l電車;#00ffc040;電車%l;#;ば、どう転んでも走れんと。\n走れんもんば飾っておいて、どぎゃんすっとか」
1692 = "「\\x%l電車;#00ffc040;Tàu điện%l;#; thì, dù thế nào cũng không thể chạy được. Để những thứ không chạy được lại làm đồ trang trí, thì làm được gì chứ.」"
# 【技工Ａ】
# display as 技工Ａ
# JP: 「そいば――確かにそがいじゃが」
2104 = "「Chuyện đó——quả thực là như vậy nhưng mà.」"
# monologue
# JP: 沈みきっていた人の群れから、\nざわめきが、少しずつ、少しずつ戻ってきます。
2467 = "Từ đám đông đang chìm trong im lặng, tiếng xôn xao, từng chút, từng chút một trở lại."
# monologue
# JP: \x%lクハ26;#00ffc040;クハ26%l;#;が、ニイロクが――\n象徴そのものであることを、逆説的に思い知ります。
2566 = "Tôi nhận ra một cách nghịch lý rằng, \\x%lクハ26;#00ffc040;Kuha 26%l;#;, và Niiroku——chính là một biểu tượng."
# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「いうてもの、技術ばなんとしても継承せんと――\n鉄道ば、経験工学じゃけん」
2123 = "「Nói gì thì nói, dù thế nào cũng phải kế thừa kỹ thuật chứ—— Đường sắt, là kỹ thuật đúc kết từ kinh nghiệm mà.」"
# 【技工Ａ】
# display as 技工Ａ
# JP: 「\x%l電車;#00ffc040;電車%l;#;技術ば犠牲にすっとはありえんばい！\n二度と取り戻せんよーになりよるぞ」
1857 = "「Không thể nào có chuyện hy sinh kỹ thuật \\x%l電車;#00ffc040;tàu điện%l;#; được! Sẽ trở nên không thể lấy lại được lần thứ hai đâu đấy.」"
# 【先輩】
# display as 前輩
# JP: 「決裂でよか！　徹底抗戦！\n実力行使なんぞさせんで架線ば守れば良かたい！！」
2135 = "「Quyết liệt đi! Kháng chiến triệt để! Không để chúng dùng vũ lực, chỉ cần bảo vệ đường dây tiếp điện trên cao là được!!」"
# 【後東】
# display as 後東
# JP: 「おい、どうすんだよ赤井」
1752 = "「Này, cậu tính sao đây Akai.」"
# monologue
# JP: ……後東の問いが、突き刺さります。
1202 = "……Câu hỏi của Goto, như đâm xuyên qua tôi."
# monologue
# JP: どうするか――どうし得るのか。\n答えはひとつしか見えず、けれど決して私には――
2606 = "Làm thế nào——có thể làm thế nào đây. Tôi chỉ nhìn thấy một câu trả lời duy nhất, nhưng đối với tôi thì tuyệt đối——"
# 【赤井】
# display as 赤井
# JP: 「……一日。二十四時間だけ猶予を下さい」
1297 = "「……Một ngày. Xin hãy cho tôi thời hạn 24 giờ.」"
# monologue
# JP: ――選べません。\nならば、あがくしかありません。
1177 = "——Tôi không thể chọn. Nếu vậy, chỉ còn cách vùng vẫy mà thôi."
# monologue
# JP: あがいてそして――[すが]縋るしか。
2469 = "Vùng vẫy và sau đó——chỉ còn cách bám víu vào."
# 【ニイロク】
# display as 二六
# JP: 「うん」
1769 = "「Ừm.」"
# monologue
# JP: ニイロクが静かに頷きます。\n説明を始めるその前と、まったく変わらぬ表情で。
2372 = "Niiroku lặng lẽ gật đầu. Với vẻ mặt hoàn toàn không thay đổi so với trước khi tôi bắt đầu giải thích."
# 【ニイロク】
# display as 二六
# JP: 「自分は、清春の望むとおりに。\n清春の役にたてるのであれば、それが、幸せ」
1999 = "「Em sẽ làm theo những gì Kiyoharu mong muốn. Nếu có thể giúp ích cho Kiyoharu, thì đó chính là, hạnh phúc của em.」"
# 【赤井】
# display as 赤井
# JP: 「……\x%lクハ26;#00ffc040;クハ26%l;#;とその編成を助けることは、\nほぼ無理であるかと思っています」
1287 = "「……Tôi nghĩ rằng việc cứu \\x%lクハ26;#00ffc040;Kuha 26%l;#; và \\x%l編成;#00ffc040;đoàn tàu%l;#; của nó, là điều gần như không thể.」"
# 【ニイロク】
# display as 二六
# JP: 「自分も、同じ。そう思う。\n\x%lクハ26;#00ffc040;クハ26%l;#;が走れる線路が、なくなるんだから」
1866 = "「Em cũng, nghĩ như vậy. Bởi vì tuyến đường sắt mà \\x%lクハ26;#00ffc040;Kuha 26%l;#; có thể chạy, sẽ không còn nữa mà.」"
# monologue
# JP: けれどもハッキリわかります。\nニイロクは、装っているだけなのだと。
2431 = "Tuy nhiên tôi có thể hiểu rõ. Rằng Niiroku, chỉ đang giả vờ mà thôi."
# monologue
# JP: 平静を装うそのことで、\n私の感じる罪悪感を、減らそうとしてくれているのだと。
2505 = "Bằng cách giả vờ bình tĩnh đó, em ấy đang cố gắng làm giảm bớt cảm giác tội lỗi mà tôi đang cảm thấy."
# 【ニイロク】
# display as 二六
# JP: 「走れないなら、無いのと同じ。\n自分が犠牲になることで――」
1595 = "「Nếu không thể chạy, thì cũng giống như không tồn tại. Bằng việc hy sinh bản thân em——」"
# 【赤井】
# display as 赤井
# JP: 「いいえ、ニイロク。君を犠牲にはしません」
1601 = "「Không, Niiroku. Tôi sẽ không hy sinh em đâu.」"
# 【ニイロク】
# display as 二六
# JP: 「あ」
1741 = "「A.」"
# monologue
# JP: 抱きしめます。
2584 = "Tôi ôm chặt lấy em ấy."
# monologue
# JP: ニイロクが冷えきっていると、\nそうして初めて気づきます。
2609 = "Rằng cơ thể Niiroku đang lạnh toát, lúc đó tôi mới nhận ra."
# 【赤井】
# display as 赤井
# JP: 「私が選択した人生の、積み重ねてきた時間の。\nニイロク、君は、かけがえのない結晶です」
1624 = "「Trong cuộc đời mà tôi đã lựa chọn, trong khoảng thời gian mà tôi đã tích lũy. Niiroku, em là kết tinh không thể thay thế.」"
# monologue
# JP: だから、伝えます。\n私の熱を、祈りを――想いを。
2617 = "Vì vậy, tôi truyền đạt lại. Hơi ấm của tôi, lời cầu nguyện của tôi——và tâm tư của tôi."
# 【赤井】
# display as 赤井
# JP: 「君だけは、決して譲れない。\nそれが私の、絶対防衛ラインです」
1903 = "「Chỉ riêng em, là tôi tuyệt đối không thể nhượng bộ. Đó chính là, phòng tuyến phòng thủ tuyệt đối của tôi.」"
# 【ニイロク】
# display as 二六
# JP: 「嬉しい。清春。――清春。清春」
1887 = "「Em vui lắm. Kiyoharu. ——Kiyoharu. Kiyoharu.」"
# monologue
# JP: ニイロクの手が応えます。\n私を、抱きしめ返してくれます。
2394 = "Bàn tay của Niiroku đáp lại.\nEm ấy ôm chầm lấy tôi."
# 【ニイロク】
# display as 二六
# JP: 「だけど、できるの？\n\x%lクハ26;#00ffc040;クハ26%l;#;は――[はいしゃかいそう,3]廃車回送されるでしょ？」
1647 = "「Nhưng mà, anh có làm được không? \\x%lクハ26;#00ffc040;Kuha 26%l;#;——sẽ bị đưa đi phế thải hồi tống đúng không?」"
# 【赤井】
# display as 赤井
# JP: 「そうですね。\x%lクハ26;#00ffc040;クハ26%l;#;の[はいかい,1]廃回は、間違いなく、\n粉蔵工場の終わりを告げる、象徴的な儀式にされる」
1938 = "「Đúng vậy. Việc phế thải hồi tống \\x%lクハ26;#00ffc040;Kuha 26%l;#;, chắc chắn, sẽ trở thành một nghi thức mang tính biểu tượng, báo hiệu sự kết thúc của Nhà máy Kokura.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1769 = "「嗯」" 
# monologue
# JP: 抱き合っているから、ようやくわかる――\nそれほど、小さな小さな震え。
2661 = "Bởi vì đang ôm nhau, nên tôi mới có thể nhận ra—— một sự run rẩy vô cùng nhỏ bé."
# monologue
# JP: ただ、守りたいと感じます。\nただ、愛おしいと感じます。
2779 = "Tôi chỉ cảm thấy muốn bảo vệ em ấy. Tôi chỉ cảm thấy em ấy thật đáng yêu."
# 【赤井】
# display as 赤井
# JP: 「ですので、手続は正規のものとされた上、\n厳しく監視されるでしょう」
1921 = "「Vì vậy, các thủ tục sẽ được thực hiện một cách chính quy, và sẽ bị giám sát nghiêm ngặt.」"
# 【ニイロク】
# display as 二六
# JP: 「廃回手続。正規のもの」
1794 = "「Thủ tục phế thải hồi tống. Một cách chính quy.」"
# 【赤井】
# display as 赤井
# JP: 「車輌、レイルロオド運転体、レイルロオド整備体。\nその全てが揃っていることが、まず確認されます」
2041 = "「Toa xe, \\x%l運転体;#00ffc040;kíp lái%l;#; Railord, \\x%l整備体;#00ffc040;thân chính%l;#; Railord. Trước tiên, họ sẽ xác nhận xem tất cả những thứ đó có đầy đủ hay không.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1769 = "「嗯」" 
# monologue
# JP: 仕事がら嫌でも熟知したことを、\n過不足なしに伝えます。
2565 = "Tôi truyền đạt lại một cách đầy đủ và chính xác, những điều mà tôi buộc phải nắm rõ do tính chất công việc."
# monologue
# JP: 決して伝えたくなかったことを――\nそれでも、知恵を求めるために。
2789 = "Những điều mà tôi tuyệt đối không muốn truyền đạt—— Nhưng dù vậy, vẫn phải nói ra để tìm kiếm sự khôn ngoan."
# 【赤井】
# display as 赤井
# JP: 「レイルロオドは、\nタブレット換装によっての動作確認がなされます」
2153 = "「Railord thì, sẽ được xác nhận hoạt động thông qua việc hoán đổi \\x%l操作板;#00ffc040;thẻ bảng%l;#;.」"
# 【ニイロク】
# display as 二六
# JP: 「確認の順番に規定はあるの？」
2007 = "「Thứ tự xác nhận có quy định gì không?」"
# 【赤井】
# display as 赤井
# JP: 「そこは任意です。運転体・整備体の順であっても、\nその逆であってもかまわない。結果は同じですから」
1978 = "「Cái đó là tùy ý. Dù là theo thứ tự \\x%l運転体;#00ffc040;kíp lái%l;#; - \\x%l整備体;#00ffc040;thân chính%l;#;, hay ngược lại cũng không sao. Vì kết quả đều giống nhau mà.」"
# 【ニイロク】
# display as 二六
# JP: 「なら、\n動作確認したあとのタブレットは、そのまま？」
2151 = "「Nếu vậy, \\x%l操作板;#00ffc040;thẻ bảng%l;#; sau khi xác nhận hoạt động xong, sẽ để nguyên như thế à?」"
# 【赤井】
# display as 赤井
# JP: 「ですね。実装されたままの状態で、\n廃車回送に向かいます」
1947 = "「Đúng vậy. Vẫn giữ nguyên trạng thái được lắp đặt đó, và hướng đến nơi phế thải hồi tống.」"
# 【ニイロク】
# display as 二六
# JP: 「監視の人間は添乗するの？」
2074 = "「Người giám sát có đi cùng trên tàu không?」"
# 【赤井】
# display as 赤井
# JP: 「いいえ。けれど、列車を止めることは許されません。\n解体処分をされる[もじ,1]門次まで――、一直線です」
1593 = "「Không. Tuy nhiên, không được phép dừng \\x%l列車;#00ffc040;tàu%l;#; lại. Cho đến tận Moji, nơi sẽ tiến hành tháo dỡ——, là đi thẳng một mạch.」"
# 【ニイロク】
# display as 二六
# JP: 「――[もじ,1]門次についたら、どうなるの？」
1242 = "「——Khi đến Moji rồi, thì sẽ ra sao?」"
# 【赤井】
# display as 赤井
# JP: 「牽引機関車と切り離され、留置され、解体されます。\nですが、正規の手続きを厳用される場合には」
2063 = "「Sẽ bị tách khỏi đầu máy kéo, bị lưu giữ lại, và tháo dỡ. Nhưng, trong trường hợp các thủ tục chính quy được áp dụng nghiêm ngặt thì」"
# 【ニイロク】
# display as 二六
# JP: 「[あいだ]間を置かない」
1594 = "「Sẽ không có thời gian lưu giữ.」"
# monologue
# JP: ニイロクが導き出した答えは、悲しい程に正確です。
2415 = "Câu trả lời mà Niiroku đưa ra, chính xác đến mức đáng buồn."
# 【ニイロク】
# display as 二六
# JP: 「留置なしの、即時の解体処分がされる。\n留置している間に、不正が行われないように」
1969 = "「Sẽ không có lưu giữ, mà bị đem đi tháo dỡ ngay lập tức. Để tránh việc xảy ra gian lận trong thời gian lưu giữ.」"
# 【赤井】
# display as 赤井
# JP: 「そのとおりです。その上、門次側で最終の、\nレイルロオドの動作確認まで行われます」
1979 = "「Đúng là như vậy. Hơn nữa, ở phía Moji sẽ tiến hành xác nhận hoạt động của Railord lần cuối cùng.」"
# 【ニイロク】
# display as 二六
# JP: 「それは――んと、どうして？\nそんなことをしなくたって、同じじゃないの？」
2108 = "「Đó là——ừm, tại sao chứ? Dù không làm chuyện đó, thì kết quả cũng giống nhau mà?」"
# 【赤井】
# display as 赤井
# JP: 「レイルロオド自らがタブレットを外部に投げ捨てる。\n機関助士、ないし密乗した者が同様の行為をする」
2152 = "「Railord tự mình ném \\x%l操作板;#00ffc040;thẻ bảng%l;#; ra bên ngoài. \\x%l機関助士;#00ffc040;Phụ lái tàu%l;#;, hoặc kẻ đi lậu vé cũng có thể làm hành động tương tự.」"
# 【ニイロク】
# display as 二六
# JP: 「あ！」
# 1743 = "「啊！」" 
# 【赤井】
# display as 赤井
# JP: 「そうした先例が、過去にありました。\nその度に、手続きは厳重化されたのです」
2119 = "「Những tiền lệ như vậy, đã từng xảy ra trong quá khứ. Mỗi lần như thế, các thủ tục lại càng trở nên nghiêm ngặt hơn.」"
# 【ニイロク】
# display as 二六
# JP: 「でも……電車区長が味方をしてくれれば、\n門次側にだって協力者を作ったりできない？」
1644 = "「Nhưng……nếu Trưởng khu tàu điện đứng về phía chúng ta, thì chẳng phải cũng có thể tạo ra người cộng tác ở phía Moji sao?」"
# 【赤井】
# display as 赤井
# JP: 「大きな意味では確かに、電車区長は味方です。\nけれどあの人にも、決して譲れない仕事があります」
1800 = "「Theo nghĩa rộng thì quả thực, Trưởng khu tàu điện là đồng minh. Nhưng người đó cũng có, công việc tuyệt đối không thể nhượng bộ.」"
# 【ニイロク】
# display as 二六
# JP: 「譲れない仕事？」
1850 = "「Công việc không thể nhượng bộ?」"
# 【赤井】
# display as 赤井
# JP: 「エアクラ・バス社になるべく大勢を移籍させること。\nそうして、予想される首切りから守ることです」
2138 = "「Là việc chuyển càng nhiều người càng tốt sang công ty Aircra Bus. Bằng cách đó, bảo vệ họ khỏi đợt sa thải được dự báo trước.」"
# 【ニイロク】
# display as 二六
# JP: 「あ――\n生活、とか。責任とかのお話」
1737 = "「A——\nLà chuyện về cuộc sống, hay trách nhiệm các thứ.」"
# 【赤井】
# display as 赤井
# JP: 「そのとおりですね。そしてレベルは違えども――\n先輩や、他の方々に関しても、同じことがいえます」
1980 = "「Đúng là như vậy. Và dù mức độ có khác nhau—— nhưng đối với tiền bối, hay những người khác, cũng có thể nói điều tương tự.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1769 = "「嗯」" 
# 【赤井】
# display as 赤井
# JP: 「技術・知識をもつ人員の散逸を防ぐこと。\nいつかの鉄道復権のため、その価値は計り知れません」
2068 = "「Ngăn chặn sự phân tán của các nhân sự có kỹ thuật và kiến thức. Vì sự phục hưng của đường sắt vào một ngày nào đó, giá trị của việc đó là không thể đong đếm được.」"
# 【ニイロク】
# display as 二六
# JP: 「わかる。と、思う。そのときがきて\n\x%lクハ26;#00ffc040;クハ26%l;#;が復活できても、ただそれだけじゃ意味がない」
1884 = "「Em hiểu. Em nghĩ vậy. Khi thời khắc đó đến dù \\x%lクハ26;#00ffc040;Kuha 26%l;#; có thể phục sinh, nhưng chỉ có vậy thôi thì cũng vô nghĩa.」"
# 【赤井】
# display as 赤井
# JP: 「粉蔵工場を、電化路線を復活させるそのときのため。\n味方であっても、行動面での無理は出来ない」
2106 = "「Vì thời khắc phục sinh lại Nhà máy Kokura, và các tuyến đường sắt điện khí hóa. Dù là đồng minh, nhưng về mặt hành động thì không thể làm liều được.」"
# 【ニイロク】
# display as 二六
# JP: 「わかった。門次にまでうかつに工作をしたら、\nそれが漏れちゃう可能性はきっと跳ね上がっちゃう」
1932 = "「Em hiểu rồi. Nếu tiến hành công tác một cách bất cẩn đến tận Moji, thì khả năng bị lộ chắc chắn sẽ tăng vọt.」"
# 【赤井】
# display as 赤井
# JP: 「帝鉄の上層部、あるいは、さらに上位の組織から、\n監視の人員は既に送られているでしょうしね」
1829 = "「Từ tầng lớp thượng tầng của Teitetsu, hoặc có thể từ tổ chức cấp cao hơn nữa, nhân sự giám sát có lẽ đã được phái đến rồi.」"
# 【ニイロク】
# display as 二六
# JP: 「そうなんだ」
1685 = "「Ra là vậy.」"
# 【赤井】
# display as 赤井
# JP: 「\x%lクハ26;#00ffc040;クハ26%l;#;の廃車回送のときには、当然、\nその監視の目も、一層厳しくなるでしょう」
2043 = "「Vào lúc phế thải hồi tống \\x%lクハ26;#00ffc040;Kuha 26%l;#;, đương nhiên, ánh mắt giám sát đó, cũng sẽ trở nên nghiêm ngặt hơn một bậc.」"
# 【ニイロク】
# display as 二六
# JP: 「なら……抜け道は、ない？」
2149 = "「Vậy thì……không có, lối thoát nào sao?」"
# 【赤井】
# display as 赤井
# JP: 「無くても、創りだすのです」
1824 = "「Dù không có, thì cũng phải tạo ra.」"
# monologue
# JP: 自分自身に言い聞かせ、\nニイロクの体を抱きしめ直します。
2611 = "Tự nhủ với chính mình như vậy, tôi ôm lại cơ thể Niiroku."
# 【赤井】
# display as 赤井
# JP: 「――整備体は、諦めるしかないかと思います」
1247 = "「——\\x%l整備体;#00ffc040;Thân chính%l;#; thì, tôi nghĩ chỉ còn cách từ bỏ thôi.」"
# 【ニイロク】
# display as 二六
# JP: 「うん。それは最初からわかっていた。\n整備体には、[パーソナルマーク,5]個体識別部位が多すぎる」
1768 = "「Ừm. Chuyện đó thì ngay từ đầu em đã biết rồi. \\x%l整備体;#00ffc040;Thân chính%l;#; có quá nhiều bộ phận nhận diện cá thể.」"
# 【赤井】
# display as 赤井
# JP: 「はい」
1952 = "「Vâng.」"
# monologue
# JP: すっと冷え込む体温が、見た目にも青ざめた顔色が、\nニイロクの心を、言葉より雄弁に物語ります。
2398 = "Nhiệt độ cơ thể bỗng chốc lạnh toát, sắc mặt trông có vẻ nhợt nhạt, đã nói lên tiếng lòng của Niiroku, hùng hồn hơn bất cứ lời nói nào."
# monologue
# JP: 抱きしめる手を強くして――\nそれしか出来ない自分の無力を、押し隠します。
2589 = "Vòng tay ôm em ấy càng thêm siết chặt—— Tôi cố che giấu đi sự bất lực của bản thân khi chỉ có thể làm được bấy nhiêu."
# 【赤井】
# display as 赤井
# JP: 「運転体とタブレット。最低限それだけ守れば」
2061 = "「\\x%l運転体;#00ffc040;Kíp lái%l;#; và \\x%l操作板;#00ffc040;thẻ bảng%l;#;. Chỉ cần bảo vệ được tối thiểu những thứ đó.」"
# 【ニイロク】
# display as 二六
# JP: 「うん。自分は、自分でいられる。\n清春と――いっしょにいられる」
1766 = "「Ừm. Em vẫn sẽ là, chính em. Và có thể ở cùng——với Kiyoharu.」"
# 【赤井】
# display as 赤井
# JP: 「そうですね。ずっと、いっしょに」
1946 = "「Đúng vậy. Mãi mãi, ở cùng nhau.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1769 = "「嗯」" 
# monologue
# JP: 抱きしめあうことは、守り合うこと。\nそんなことを、生まれてはじめて、思います。
2400 = "Việc ôm lấy nhau, chính là bảo vệ lẫn nhau. Lần đầu tiên trong đời, tôi có suy nghĩ như vậy."
# monologue
# JP: この手の中のぬくもりを、愛しさを、\n決して失わないように、心を、強くと願います。
2570 = "Hơi ấm trong vòng tay này, sự đáng yêu này, để tuyệt đối không đánh mất, trong thâm tâm, tôi nguyện cầu một cách mạnh mẽ."
# 【赤井】
# display as 赤井
# JP: 「……運転体については、\n取引を持ちかけられています」
1285 = "「……Về \\x%l運転体;#00ffc040;kíp lái%l;#; thì, đang có người đề nghị giao dịch.」"
# 【ニイロク】
# display as 二六
# JP: 「取引？　どんなの？\n誰から持ちかけられてるの？」
1631 = "「Giao dịch? Giao dịch như thế nào?\nLà ai đề nghị vậy?」"
# 【赤井】
# display as 赤井
# JP: 「後東――といって分かりますか？\n私の同期の、口の悪い」
1843 = "「Goto——nói vậy em có biết không? Người bạn đồng khóa của tôi, ăn nói thô lỗ ấy.」"
# 【ニイロク】
# display as 二六
# JP: 「うん。わかる。あの口の悪い――\nけど、多分、頭がいい」
1763 = "「Ừm. Em biết. Cái người ăn nói thô lỗ đó—— Nhưng, có lẽ, rất thông minh.」"
# 【赤井】
# display as 赤井
# JP: 「ですね。彼からの持ちかけです」
1949 = "「Đúng vậy. Là đề nghị từ cậu ta.」"
# 【ニイロク】
# display as 二六
# JP: 「どんな？」
1634 = "「Như thế nào?」"
# 【赤井】
# display as 赤井
# JP: 「……まさに今、彼の車輌とレイルロオドは、\n廃車回送に送られています」
1296 = "「……Ngay lúc này đây, toa xe và Railord của cậu ta, đang được đưa đi phế thải hồi tống.」"
# 【ニイロク】
# display as 二六
# JP: 「！！？」
1747 = "「!!?」"
# 【赤井】
# display as 赤井
# JP: 「電車区長と話をつけて、厳格な手続きを踏まず。\nその上での、廃車回送をとったそうです」
1640 = "「Cậu ta đã nói chuyện với Trưởng khu tàu điện, và không thực hiện các thủ tục nghiêm ngặt. Nghe nói cậu ta đã chọn phế thải hồi tống, dựa trên cơ sở đó.」"
# monologue
# JP: \x%lクハ26;#00ffc040;クハ26%l;#;では、\nどう転んでも出来ようもない芸当です。
51 = "Đối với \\x%lクハ26;#00ffc040;Kuha 26%l;#;, thì dù có làm thế nào cũng không thể thực hiện được chiêu trò đó."
# monologue
# JP: この混乱の最中なら、単なる普通車輌なら――\nそうした勝負を、後東は仕掛け、勝ったのです。
2790 = "Nếu là giữa lúc hỗn loạn này, nếu chỉ là một toa xe bình thường—— Goto đã bày ra ván cược đó, và đã giành chiến thắng."
# 【ニイロク】
# display as 二六
# JP: 「厳格な手続きを踏まないって、どういうこと？」
1591 = "「Không thực hiện các thủ tục nghiêm ngặt, là sao cơ?」"
# 【赤井】
# display as 赤井
# JP: 「動作確認を省略した。結果、運転鞄の中には、\n運転体の[モックアップ,4]等身大模型が入っています」
1639 = "「Đã lược bỏ việc xác nhận hoạt động. Kết quả là, bên trong \\x%l乗務鞄;#00ffc040;túi phi hành đoàn%l;#;, chứa một mô hình kích thước người thật của \\x%l運転体;#00ffc040;kíp lái%l;#;.」"
# 【ニイロク】
# display as 二六
# JP: 「それなら！　後東さんのレイルロオドは、\n運転体だけは助かるの？」
2150 = "「Nếu vậy! Railord của anh Goto, chỉ cứu được mỗi \\x%l運転体;#00ffc040;kíp lái%l;#; thôi sao?」"
# 【赤井】
# display as 赤井
# JP: 「いいえ、ニイロク」
1602 = "「Không đâu, Niiroku.」"
# monologue
# JP: 話の持っていきかたを、間違えたのかもしれません。
2471 = "Có lẽ tôi đã sai lầm, trong cách dẫn dắt câu chuyện."
# monologue
# JP: けれど――どう話したところでこれは、\n重い話にしかなりません。
2424 = "Nhưng——dù có nói thế nào đi chăng nữa, đây cũng chỉ có thể là một câu chuyện nặng nề."
# 【赤井】
# display as 赤井
# JP: 「ニイロク。君を助けること。\nそれを高く売るために、彼は――」
1616 = "「Niiroku. Việc cứu em. Để bán nó với giá cao, cậu ta đã——」"
# 【ニイロク】
# display as 二六
# JP: 「わかった」
1892 = "「Em hiểu rồi.」"
# monologue
# JP: 腕に感じる頷きは、思いがけぬほど強いものです。
2582 = "Cái gật đầu mà tôi cảm nhận được trên cánh tay, mạnh mẽ đến mức không ngờ."
# 【ニイロク】
# display as 二六
# JP: 「後藤さんのレイルロオドは、果たした。\nマスターのため、自分の全部を、使いきった」
1846 = "「Railord của anh Goto, đã hoàn thành nhiệm vụ. Vì \\x%lマスター;#00ffc040;Master%l;#;, cô ấy đã dùng cạn kiệt, toàn bộ bản thân mình.」"
# 【赤井】
# display as 赤井
# JP: 「……そうなのでしょうね。彼女にとっては、\nただ後東のため――マスターのため」
1293 = "「……Chắc là vậy nhỉ. Đối với cô ấy, chỉ là vì Goto——vì \\x%lマスター;#00ffc040;Master%l;#; mà thôi.」"
# monologue
# JP: 当然のことといわんばかりに、\n腕の中、ニイロクがまた頷きます。
2561 = "Như thể đó là điều hiển nhiên, trong vòng tay tôi, Niiroku lại gật đầu."
# monologue
# JP: 価値観の違いか、単なる私の感傷か――\nいえ、どちらであろうと、同じことです。
2775 = "Là sự khác biệt về hệ giá trị, hay chỉ đơn thuần là sự đa sầu đa cảm của tôi—— Không, dù là cái nào đi nữa, thì cũng giống nhau cả thôi."
# 【赤井】
# display as 赤井
# JP: 「結果として、ブランクの運転体が[のこ]遺りました。\nタブレットも、整備体も車輌も無い運転体が」
2054 = "「Kết quả là, một \\x%l運転体;#00ffc040;kíp lái%l;#; trống rỗng đã bị bỏ lại. Một \\x%l運転体;#00ffc040;kíp lái%l;#; không có \\x%l操作板;#00ffc040;thẻ bảng%l;#;, không có \\x%l整備体;#00ffc040;thân chính%l;#; cũng không có toa xe.」"
# 【ニイロク】
# display as 二六
# JP: 「運転体なら、パーソナルマークはとても少ない。\nレイルロオド工機部の人たちに頼めば」
2175 = "「Nếu là \\x%l運転体;#00ffc040;kíp lái%l;#; thì, bộ phận nhận diện cá thể rất ít. Nếu nhờ những người ở bộ phận cơ khí Railord thì.」"
# 【赤井】
# display as 赤井
# JP: 「ええ、そのとおりです。明日の朝には、\nニイロクにそっくりに仕上がっているそうです」
1779 = "「Đúng, chính xác là vậy. Nghe nói sáng ngày mai, nó sẽ được hoàn thiện giống hệt như Niiroku.」"
# 【ニイロク】
# display as 二六
# JP: 「すごい。やっぱり、頭よかったんだ。あの人」
1807 = "「Thật tuyệt. Quả nhiên, người đó rất thông minh.」"
# 【赤井】
# display as 赤井
# JP: 「そうですね。ああいうタイプの頭の良さが、\n鉄道存続のためには、必要なのかもしれません」
1941 = "「Đúng vậy. Sự thông minh theo kiểu đó, có lẽ là điều cần thiết, để đường sắt tiếp tục tồn tại.」"
# monologue
# JP: 電車区長、レイルロオド工機部長、それから私、\nそのほか、恐らく何人も――
2808 = "Trưởng khu tàu điện, Trưởng bộ phận cơ khí Railord, rồi đến tôi, và ngoài ra, có lẽ còn nhiều người khác nữa——"
# monologue
# JP: ニイロクを助けたいと願う人たちに、\nたった一つの商品を、彼は何度でも売りつけるのです。
2413 = "Cho những người mong muốn cứu Niiroku, cậu ta đã bán đi bán lại, chỉ một món hàng duy nhất."
# 【赤井】
# display as 赤井
# JP: 「ニイロク。君を守りぬき、電車特急をいつか必ず\n復活させる――それが、私に求められた対価です」
1613 = "「Niiroku. Bảo vệ em đến cùng, và một ngày nào đó chắc chắn sẽ phục sinh tàu điện tốc hành——đó là, cái giá mà tôi bị yêu cầu.」"
# 【ニイロク】
# display as 二六
# JP: 「あれれ？　思ったほど頭良くないのかも、あの人」
1718 = "「Ủa? Có lẽ người đó không thông minh như em nghĩ đâu.」"
# 【赤井】
# display as 赤井
# JP: 「かもしれませんね。それは何の約束が無くても、\n私が必ず、やりとげることですから」
1910 = "「Cũng có thể. Bởi vì dù không có lời hứa nào, đó cũng là điều mà tôi chắc chắn, sẽ hoàn thành mà.」"
# monologue
# JP: しかし――彼は信頼を得ます。
2426 = "Nhưng——cậu ta đã có được sự tin tưởng."
# monologue
# JP: 犠牲を払い、たったひとつの約束を得た――\n結果ではなく経過自体を、彼なら商品にするでしょう。
2409 = "Đã trả giá bằng sự hy sinh, để đổi lấy một lời hứa duy nhất—— Nếu là cậu ta, có lẽ cậu ta sẽ biến quá trình đó thành món hàng, chứ không phải là kết quả."
# 【赤井】
# display as 赤井
# JP: 「ですので、あとはタブレットです。\nタブレットさえどうにかできれば」
1918 = "「Vì vậy, còn lại là \\x%l操作板;#00ffc040;thẻ bảng%l;#;. Chỉ cần giải quyết được \\x%l操作板;#00ffc040;thẻ bảng%l;#; thì.」"
# 【ニイロク】
# display as 二六
# JP: 「そこまでするなら――後東さんは、\nどうしてタブレットも助けないの？」
2011 = "「Nếu đã làm đến mức đó——thì anh Goto, tại sao lại không cứu cả \\x%l操作板;#00ffc040;thẻ bảng%l;#;?」"
# 【赤井】
# display as 赤井
# JP: 「もちろん、\n門次側で工作をするリスクは取れないからです」
2147 = "「Tất nhiên là, vì không thể gánh chịu rủi ro khi tiến hành công tác ở phía Moji được.」"
# 【ニイロク】
# display as 二六
# JP: 「あ、そうだった。\n門次の人たちがどんな立場か、わからないから」
1750 = "「A, đúng rồi. Vì không biết những người ở Moji đứng ở lập trường nào.」"
# 【赤井】
# display as 赤井
# JP: 「門次側のチェックの内容を送るように指示したと\n聞いていますが――果たして、そこまで出来るかは」
1905 = "「Tôi nghe nói đã có chỉ thị yêu cầu gửi nội dung kiểm tra của phía Moji nhưng——liệu họ có thể làm được đến mức đó hay không.」"
# 【ニイロク】
# display as 二六
# JP: 「それは。聞ける、簡単に」
1879 = "「Chuyện đó thì. Có thể hỏi được, dễ dàng thôi.」"
# 【赤井】
# display as 赤井
# JP: 「え！？」
1725 = "「Hả!?」"
# 【ニイロク】
# display as 二六
# JP: 「だって、ちょっと共感すれば\n――あ、いた！　今大丈夫？　シロおねえちゃん」
1791 = "「Bởi vì, chỉ cần \\x%l共感;#00ffc040;cộng cảm%l;#; một chút là ——A, thấy rồi! Bây giờ có tiện không? Chị Shiro.」"
# 【赤井】
# display as 赤井
# JP: 「っ！！！」
2114 = "「っ!!!」"
# monologue
# JP: シロ。デロクマルのシロ。
2489 = "Shiro. Shiro của D60."
# monologue
# JP: ――誰もが忌み嫌う廃車回送を\n一手に引き受けている貨物機のレイルロオド。
1180 = "——Railord của đầu máy chở hàng, người đã một tay đảm nhận việc phế thải hồi tống mà ai ai cũng chán ghét."
# 【ニイロク】
# display as 二六
# JP: 「あのね？　聞きたいことがあるの。\nそう、門次のこと。すごい！　なんでわかったの？」
1670 = "「Chị nè? Em có chuyện muốn hỏi. Đúng vậy, chuyện ở Moji. Tuyệt quá! Sao chị biết hay vậy?」"
# monologue
# JP: ……新会社での、良いポジションを得るために。\nそんな動機であろうと、私は勝手に思っていました。
1206 = "……Để có được một vị trí tốt ở công ty mới. Tôi đã tự ý cho rằng, đó là động cơ của cô ấy."
# monologue
# JP: けれども、しかし――シロのマスターが\nシロの願いを、受け止めるタイプの人であるなら――
2429 = "Tuy nhiên, nhưng mà——nếu \\x%lマスター;#00ffc040;Master%l;#; của Shiro là kiểu người sẵn sàng đón nhận mong muốn của Shiro thì——"
# 【ニイロク】
# display as 二六
# JP: 「え？　わ！　シロおねえちゃん、\nそんなこと考えてくれてたの！？　でも、いいの？」
1730 = "「Hả? Oa! Chị Shiro, chị đã suy nghĩ cho em đến mức đó sao!? Nhưng mà, có được không?」"
# monologue
# JP: ……あるいは技術を繋ぐことを、\nレールを先へと伸ばすことを、何より願う人ならば。
1211 = "……Hoặc là nếu người đó mong muốn hơn bất cứ điều gì, là kết nối kỹ thuật, và kéo dài đường ray về phía trước."
# monologue
# JP: （”そのため”に、\n準備をもしも、重ねてくれていたのなら――）
2879 = "（Nếu như, họ đã chuẩn bị hết lần này đến lần khác, ”vì mục đích đó” thì——）"
# 【ニイロク】
# display as 二六
# JP: 「うん。わかる。順番。自分はまだ稼働半年少しで、\nシロおねえちゃんは、引退間近なんだもんね」
1761 = "「Ừm. Em hiểu rồi. Là thứ tự. Em thì mới hoạt động được hơn nửa năm, còn chị Shiro thì, sắp đến lúc nghỉ hưu rồi mà.」"
# monologue
# JP: ……仮説は、すぐに裏付けられます。\nニイロクの見せる反応は、“その提案ゆえ”のもの。
1208 = "……Giả thuyết đó, ngay lập tức được chứng minh. Phản ứng mà Niiroku thể hiện, chính là “vì lời đề nghị đó”."
# monologue
# JP: 牽引機側のレイルロオドを、そのキャブ内を、\nチェックしようとする者など、誰もいないのですから。
2493 = "Bởi vì sẽ chẳng có ai, lại đi kiểm tra Railord của đầu máy kéo, hay bên trong buồng lái đó cả."
# 【ニイロク】
# display as 二六
# JP: 「シロおねえちゃんのマスターだもんね。\n門次まで、レイルロオドなしでもへいちゃらだよね」
1790 = "「Là \\x%lマスター;#00ffc040;Master%l;#; của chị Shiro mà lị. Đến tận Moji, dù không có Railord thì cũng chẳng hề hấn gì nhỉ.」"
# monologue
# JP: シロのタブレットを、ブランクのダミー運転体に、\nそして、ニイロクの整備体へと。
2624 = "\\x%l操作板;#00ffc040;Thẻ bảng%l;#; của Shiro, vào \\x%l運転体;#00ffc040;kíp lái%l;#; mô hình trống rỗng, và sau đó, là vào \\x%l整備体;#00ffc040;thân chính%l;#; của Niiroku."
# monologue
# JP: その手段なら、全てのチェックをすり抜けられます。\nけれども――シロは助かりません。
2771 = "Nếu dùng cách đó, thì có thể lọt qua mọi vòng kiểm tra. Nhưng mà——Shiro sẽ không được cứu."
# 【ニイロク】
# display as 二六
# JP: 「そうなの？　マスターも引退するの？\nだったら、何の問題もない？」
1966 = "「Vậy sao? \\x%lマスター;#00ffc040;Master%l;#; cũng sẽ nghỉ hưu à? Nếu vậy thì, không có vấn đề gì cả?」"
# 【赤井】
# display as 赤井
# JP: 「っ」
1265 = "「っ」"
# monologue
# JP: 問題がない――\nなどということは断じてありえません。
2556 = "Không có vấn đề gì—— chuyện như vậy tuyệt đối không thể nào xảy ra được."
# monologue
# JP: けれどもしかし、ニイロクはまだ、余りに幼い。\n“死”ということを、全く理解できていません。
2433 = "Tuy nhiên, Niiroku vẫn còn, quá đỗi nhỏ bé. Hoàn toàn không thể hiểu được ý nghĩa của từ “chết”."
# monologue
# JP: （ですが――わたしがそれを押し付けたとて――）
2848 = "（Nhưng mà——dù tôi có áp đặt điều đó đi chăng nữa——）"
# monologue
# JP: ニイロクが、余分に苦しみ悩むだけ。\nそうなることは明白です。
2773 = "Chỉ làm cho Niiroku thêm đau khổ và phiền não mà thôi. Điều đó là quá rõ ràng."
# monologue
# JP: でしたら、このまま――\n何も知らせず、運んだ方が、良いのでしょう……か。
2791 = "Nếu vậy, cứ giữ nguyên thế này—— Không cho em ấy biết gì cả, cứ thế tiến hành thì sẽ tốt hơn…… sao."
# 【ニイロク】
# display as 二六
# JP: 「わかった。ありがとシロおねえちゃん。うん、うん。\n大好き！　それじゃね、またね！」
1934 = "「Em hiểu rồi. Cảm ơn chị Shiro. Ưm, ưm. Em yêu chị lắm! Vậy nha, hẹn gặp lại!」"
# 【赤井】
# display as 赤井
# JP: 「っ！！！！」
1757 = "「っ!!!!」"
# 【ニイロク】
# display as 二六
# JP: 「えっ！！？　ちょっとまって。\nなに？　どうしたの、清春」
1724 = "「Hả!!? Đợi một chút.\nGì vậy? Anh sao thế, Kiyoharu.」"
# 【赤井】
# display as 赤井
# JP: 「ああ――いえ――」
1739 = "「A——không——」"
# monologue
# JP: またね、ではなく、さよならなのだと。\nその瞬間には、共感さえも交わせないのだと――
2770 = "Không phải là hẹn gặp lại, mà là vĩnh biệt. Đến khoảnh khắc đó, ngay cả \\x%l共感;#00ffc040;cộng cảm%l;#; cũng không thể trao đổi được nữa——"
# monologue
# JP: 伝えるべきであることか、\n私には……私には、まったく……決断できません。
2646 = "Có nên nói cho em ấy biết hay không, tôi……tôi hoàn toàn……không thể đưa ra quyết định."
# 【赤井】
# display as 赤井
# JP: 「その……シロさんに、『ありがとう』と。\n『レールは必ず、つなげていく』と」
2129 = "「Chuyện đó……hãy nói với cô Shiro, là 『Cảm ơn』. Và 『Chắc chắn, sẽ tiếp tục kết nối đường ray』.」"
# 【ニイロク】
# display as 二六
# JP: 「わかった！　あのね？　シロおねえちゃん。\n清春がね？　――うん――うん！　わかった！」
1893 = "「Em hiểu rồi! Chị nè? Chị Shiro. Kiyoharu nói là? ——Ưm——ưm! Em hiểu rồi!」"
# monologue
# JP: ニイロクが、ぱっと笑顔になります。\n腕の中、暖かさがふわり、広がります。
2387 = "Niiroku, bỗng chốc nở nụ cười. Trong vòng tay tôi, hơi ấm nhẹ nhàng, lan tỏa."
# 【ニイロク】
# display as 二六
# JP: 「じゃあね、おねえちゃん。ばいばい、またね！\n――うんっ」
1930 = "「Vậy nha, chị. Bye bye, hẹn gặp lại!\n——Ưm.」"
# monologue
# JP: もぞりと動き、ニイロクが私を見上げます。\nまっすぐ、まっすぐ見上げます。
2370 = "Cựa quậy một chút, Niiroku ngước nhìn tôi. Nhìn thẳng, nhìn chằm chằm vào tôi."
# 【ニイロク】
# display as 二六
# JP: 「おねえちゃん、清春にね？\n『ありがとう。ニイロクのことを、頼みます』って」
1784 = "「Chị ấy bảo, nói với Kiyoharu là? 『Cảm ơn. Trăm sự nhờ cậu lo cho Niiroku』.」"
# 【赤井】
# display as 赤井
# JP: 「……そう、ですか」
1294 = "「……Vậy, sao.」"
# 【ニイロク】
# display as 二六
# JP: 「それでね？　清春」
2121 = "「Và còn nữa? Kiyoharu.」"
# 【赤井】
# display as 赤井
# JP: 「あ」
# 1741 = "「啊」" 
# monologue
# JP: ニイロクが、私の腕からすり抜けます。\n正面に立ち。もう一度、わたしをまっすぐ見つめます。
2373 = "Niiroku, luồn ra khỏi vòng tay tôi. Đứng đối diện. Một lần nữa, nhìn thẳng vào tôi."
# 【ニイロク】
# display as 二六
# JP: 「この体。整備体。\n明日にはもう、なくなっちゃうでしょ？」
1902 = "「Cơ thể này. \\x%l整備体;#00ffc040;Thân chính%l;#; này. Đến ngày mai là, sẽ biến mất đúng không?」"
# 【赤井】
# display as 赤井
# JP: 「はい」
# 1952 = "「是啊」" 
# monologue
# JP: 匂いを、不意に感じます。\n……水の匂いであるような、血の匂いでもあるような。
2552 = "Bất chợt, tôi ngửi thấy một mùi hương. ……Giống như mùi của nước, lại cũng giống như mùi của máu."
# monologue
# JP: ニイロクから、今まで嗅いだことのない――\n生きているものの、命の匂いを。
2579 = "Từ Niiroku, một mùi hương mà tôi chưa từng ngửi thấy bao giờ—— Mùi của sự sống, mùi của sinh mệnh."
# 【ニイロク】
# display as 二六
# JP: 「だから、清春に見て欲しいの。\n自分の全部を――残らず、覚えていて欲しい」
1916 = "「Vì vậy, em muốn Kiyoharu nhìn em. Toàn bộ bản thân em——không chừa lại gì cả, em muốn anh ghi nhớ hết.」"
# 【ニイロク】
# display as 二六
# JP: 「あと五分」
2120 = "「Còn 5 phút nữa.」"
# 【赤井】
# display as 赤井
# JP: 「ええ」
# 1769 = "「嗯」" 
# monologue
# JP: いつもの部屋。ニイロクと自分と、ふたりきり。\n荷物は、手近にまとめてあります。
2780 = "Vẫn là căn phòng quen thuộc. Chỉ có hai người, tôi và Niiroku. Hành lý, đã được thu dọn gọn gàng ở gần đó."
# monologue
# JP: いつもよりずっと小さな体のニイロクと、\nいつものようにくっつきあいます。
2392 = "Với Niiroku mang cơ thể nhỏ bé hơn mọi khi rất nhiều, chúng tôi dính sát vào nhau như thường lệ."
# 【ニイロク】
# display as 二六
# JP: 「うまくいくよね？」
1875 = "「Sẽ suôn sẻ đúng không?」"
# 【赤井】
# display as 赤井
# JP: 「そうあることを信じるのみです」
1700 = "「Chỉ có thể tin tưởng là sẽ như vậy thôi.」"
# monologue
# JP: 複数系統の、相互の繋がりを確認できない、\n信頼が置けそうな人たちを選び、頼んであります。
2501 = "Tôi đã chọn những người có vẻ đáng tin cậy, từ nhiều bộ phận khác nhau, mà không thể xác nhận được mối liên hệ lẫn nhau, và nhờ vả họ."
# monologue
# JP: もしも失敗したならば、すぐメールを、と。
2751 = "Và dặn họ rằng, nếu lỡ thất bại, hãy gửi mail ngay lập tức."
# 【ニイロク】
# display as 二六
# JP: 「そういかなければ？」
1812 = "「Nếu không suôn sẻ thì sao?」"
# 【赤井】
# display as 赤井
# JP: 「逃げ出すのみです。\nなに、そうなればなったで、どうとでも出来ます」
2132 = "「Thì chỉ còn cách bỏ trốn thôi. Không sao đâu, đến lúc đó thì tùy cơ ứng biến.」"
# 【ニイロク】
# display as 二六
# JP: 「そうなんだ」
1961 = "「Ra là vậy.」"
# monologue
# JP: 初めて、でしょうか？\nニイロクにウソをついたのは。
2774 = "Đây là lần đầu tiên, nhỉ?\nTôi nói dối Niiroku."
# monologue
# JP: 逃げてしまえば、先は闇です。\n成功を、祈る他にはありません。
2511 = "Nếu bỏ trốn, thì phía trước chỉ toàn là bóng tối. Không còn cách nào khác ngoài việc cầu nguyện, cho sự thành công."
# 【ニイロク】
# display as 二六
# JP: 「うまくいったら、清春と自分はどこいくの？」
1814 = "「Nếu suôn sẻ, Kiyoharu và em sẽ đi đâu?」"
# 【赤井】
# display as 赤井
# JP: 「どこへだっていけますよ。\n電車区長は、多くを勝ち取ってくれましたから」
1690 = "「Đi đâu cũng được cả. Trưởng khu tàu điện, đã giành được rất nhiều thứ cho chúng ta rồi.」"
# monologue
# JP: 幹部職員も含まれる多くの署名は、\nそれなりの武器になったようです。
2636 = "Số lượng lớn chữ ký, bao gồm cả của các nhân viên cán bộ, có vẻ như đã trở thành một thứ vũ khí đáng kể."
# monologue
# JP: \x%lクハ26;#00ffc040;クハ26%l;#;を私たちは、\n高く、売ったのだとも思います。
2705 = "Tôi cũng nghĩ rằng, chúng tôi đã bán \\x%lクハ26;#00ffc040;Kuha 26%l;#;, với một cái giá rất cao."
# 【赤井】
# display as 赤井
# JP: 「単線、非電化の複数の路線が、帝鉄廃止後に\nいくらかの車輌とともに売却されると内定しました」
1666 = "「Nhiều tuyến \\x%l単線;#00ffc040;đường đơn%l;#; không điện khí hóa, sau khi Teitetsu bị bãi bỏ đã được quyết định nội bộ là sẽ đem bán cùng với một số toa xe.」"
# 【ニイロク】
# display as 二六
# JP: 「そうなんだ！」
1962 = "「Ra là vậy!」"
# 【赤井】
# display as 赤井
# JP: 「ですので、その中で一番電化が早そうなところへ\n行きましょう。私達なら、受け入れられます」
1915 = "「Vì vậy, hãy đến nơi nào có vẻ sẽ được điện khí hóa sớm nhất trong số đó. Nếu là chúng ta, chắc chắn sẽ được tiếp nhận thôi.」"
# 【ニイロク】
# display as 二六
# JP: 「そっか、どこがいいのかな？」
1963 = "「Vậy à, đi đâu thì tốt nhỉ?」"
# monologue
# JP: 地図を、ニイロクが無邪気に広げます。\nもう数日でズタズタに分断される、路線図を。
2368 = "Niiroku ngây thơ mở bản đồ ra. Bản đồ tuyến đường, thứ sẽ bị chia cắt tơi tả chỉ trong vài ngày tới."
# 【ニイロク】
# display as 二六
# JP: 「[ゆのい,1]湯医線は清春の神社の近くだけれど、\n電化はむつかしそうだよね」
2009 = "「Tuyến Yunoi tuy ở gần đền của Kiyoharu, nhưng có vẻ việc điện khí hóa sẽ rất khó khăn nhỉ.」"
# monologue
# JP: そう。どこも電化は、厳しいでしょう。\nそうした路線しか、割譲されないのですから。
2652 = "Đúng vậy. Ở đâu việc điện khí hóa cũng khó khăn cả. Bởi vì họ chỉ cắt nhượng những tuyến đường như thế thôi mà."
# monologue
# JP: あるいは、わたしたちの闘争そのものさえも、\n最初から描かれていたのかもしれません。
2612 = "Hoặc là, ngay cả cuộc đấu tranh của chúng tôi, có lẽ cũng đã nằm trong kịch bản từ đầu rồi."
# monologue
# JP: （分断されれば摺り潰されていくだけです。\nレールを――なんとしても繋がなければ）
2875 = "（Nếu bị chia cắt thì chỉ còn nước bị nghiền nát mà thôi. Đường ray——dù thế nào cũng phải kết nối lại.）"
# monologue
# JP: 後東。先輩。彼らはどこに行くのでしょうか？\n彼らは本当に、信頼に足る人間でしょうか？
2551 = "Goto. Tiền bối. Bọn họ sẽ đi đâu? Bọn họ có thực sự, là những người đáng tin cậy hay không?"
# monologue
# JP: 同じところに行くべきか、別の路線を選ぶべきか。\nそこは、慎重に考えなければなりません。
2583 = "Nên đi cùng một nơi, hay chọn một tuyến đường khác. Chuyện đó, cần phải suy nghĩ thật cẩn thận."
# 【ニイロク】
# display as 二六
# JP: 「ね？　清春はどこに行きたい？」
1907 = "「Nè? Kiyoharu muốn đi đâu?」"
# 【赤井】
# display as 赤井
# JP: 「それは、ことが済んでから考えましょう」
2044 = "「Chuyện đó, để xong xuôi mọi việc rồi hãy tính.」"
# 【ニイロク】
# display as 二六
# JP: 「あ！」
# 1743 = "「啊！」" 
# monologue
# JP: 時間です。
2654 = "Đến giờ rồi."
# monologue
# JP: 共感を、さっそくつないだのでしょう。\nニイロクの体があたたかに――っ！！？
2364 = "Có lẽ em ấy đã kết nối \\x%l共感;#00ffc040;cộng cảm%l;#; ngay lập tức. Cơ thể Niiroku bỗng trở nên ấm áp——っ!!?"
# 【ニイロク】
# display as 二六
# JP: 「ひっ！？　ひあっ――あっ！！　これ――やめっ！\n無理しないで！　シロおねえちゃんっ！！」
1710 = "「Hí!? Hi á——á!! Cái này——dừng lại đi! Đừng cố quá! Chị Shiro!!」"
# 【赤井】
# display as 赤井
# JP: 「っ――」
# 1265 = "「……」" 
# monologue
# JP: 直面させるしかないと。説明では理解させられないと、\n覚悟していた筈でした。
2682 = "Chỉ còn cách để em ấy đối mặt trực tiếp. Tôi đã chuẩn bị tinh thần rằng, chỉ bằng lời giải thích thì không thể làm cho em ấy hiểu được."
# monologue
# JP: それでもニイロクの悲鳴を聞けば、\n心がざくりと切り裂かれます。
2423 = "Dù vậy, khi nghe thấy tiếng hét của Niiroku, trái tim tôi vẫn như bị xé toạc ra."
# monologue
# JP: （――蒸気機関車、\x%lD60;#00ffc040;D60%l;#;の量産レイルロオドの能力で、\n\x%lクハ26;#00ffc040;クハ26%l;#;、最新鋭レイルロオドの体を稼働させるのです）
2823 = "（——Bằng năng lực của một Railord sản xuất hàng loạt cho \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; \\x%lD60;#00ffc040;D60%l;#;, mà phải vận hành cơ thể của \\x%lクハ26;#00ffc040;Kuha 26%l;#;, một Railord tối tân nhất）"
# monologue
# JP: どう考えても、高負荷すぎです。\nタブレットが瞬時に破損したとて、おかしくない程。
2673 = "Dù nghĩ thế nào, thì cũng quá sức chịu đựng. Đến mức dù \\x%l操作板;#00ffc040;thẻ bảng%l;#; có bị phá hủy ngay tức khắc, thì cũng không có gì lạ."
# 【ニイロク】
# display as 二六
# JP: 「しゃべっちゃダメ！！　こわれちゃう！！\nシロおねえちゃん！　無理！　こわれちゃうよぉ」
1589 = "「Không được nói chuyện!! Sẽ hỏng mất!! Chị Shiro! Không được đâu! Sẽ hỏng mất đó」"
# 【赤井】
# display as 赤井
# JP: 「壊れても、やってもらうしかありません」
1823 = "「Dù có hỏng, cũng chỉ đành nhờ cô ấy tiếp tục thôi.」"
# 【ニイロク】
# display as 二六
# JP: 「っ！！！？」
2115 = "「っ!!!?」"
# 【赤井】
# display as 赤井
# JP: 「中断すれば、シロの覚悟さえ無駄になります。\nですので、止めるのではなく――応援を」
2065 = "「Nếu gián đoạn, thì ngay cả sự giác ngộ của Shiro cũng sẽ trở nên vô ích. Vì vậy, đừng ngăn cản——mà hãy cổ vũ.」"
# 【ニイロク】
# display as 二六
# JP: 「ひぐっ！！！」
1756 = "「Hức!!!」"
# monologue
# JP: 最新鋭で、最高性能。\nその意味を私は誰より、知っています。
2656 = "Tối tân nhất, và hiệu suất cao nhất. Ý nghĩa của nó, tôi là người biết rõ hơn ai hết."
# monologue
# JP: ニイロクは――精神が未だ幼くあろうと、\n悲しいほどに、計算能力が高いのです。
2390 = "Niiroku——dù cho tinh thần vẫn còn non nớt, nhưng năng lực tính toán lại cao đến mức đáng buồn."
# 【赤井】
# display as 赤井
# JP: 「それが無理なら、マスターとして命令を」
1808 = "「Nếu không làm được, thì với tư cách là \\x%lマスター;#00ffc040;Master%l;#;, tôi sẽ ra lệnh.」"
# 【ニイロク】
# display as 二六
# JP: 「無理じゃない！　命令、しないでっ！\nできる――する――から、したいからっ！！」
1878 = "「Không phải là không làm được! Đừng, ra lệnh cho em! Em làm được——em sẽ làm——mà, vì em muốn làm!!」"
# monologue
# JP: だから、ニイロクは理解します。\nどう転んでも、シロは終わりだということを。
2614 = "Vì vậy, Niiroku hiểu được. Rằng dù có thế nào đi chăng nữa, Shiro cũng sẽ kết thúc."
# monologue
# JP: そして万一中断し、工作が明らかになるのなら、\n努力全てが、シロの覚悟が、潰えることを。
2724 = "Và lỡ như bị gián đoạn, khiến cho công tác bị bại lộ, thì mọi nỗ lực, và sự giác ngộ của Shiro, sẽ tan thành mây khói."
# 【赤井】
# display as 赤井
# JP: 「でしたら、ニイロク。\nシロに――全力で、応援を」
2137 = "「Nếu vậy thì, Niiroku. Hãy cổ vũ cho Shiro——bằng toàn bộ sức lực.」"
# 【ニイロク】
# display as 二六
# JP: 「うんっ！！！」
1772 = "「Vâng!!!」"
# monologue
# JP: 運転体の小さな体が、大きく、大きく頷きます。
2815 = "Cơ thể nhỏ bé của \\x%l運転体;#00ffc040;kíp lái%l;#;, gật đầu thật mạnh, thật mạnh."
# 【ニイロク】
# display as 二六
# JP: 「がんばれ！　がんばれシロおねえちゃん！！！\nがんばれ、がんばれシロおねえちゃんっ！！」
1678 = "「Cố lên! Cố lên chị Shiro!!! Cố lên, cố lên chị Shiro!!」"
# monologue
# JP: （まだ、か――まだなのか）
2884 = "（Vẫn chưa, xong sao——vẫn chưa sao.）"
# monologue
# JP: ――機体照合。動作確認。\n数分もかからぬはずの時間が、いまだ終わりません。
1182 = "——Đối chiếu cơ thể. Xác nhận hoạt động. Khoảng thời gian đáng lẽ chỉ mất vài phút, mà đến giờ vẫn chưa kết thúc."
# 【ニイロク】
# display as 二六
# JP: 「がんばれ！　負けるなシロおねえちゃん！！！\nいっしょ！　ニイロク！　いっしょにいるから！」
1676 = "「Cố lên! Đừng thua nhé chị Shiro!!! Cùng nhau! Niiroku! Sẽ luôn ở bên chị!」"
# monologue
# JP: 確認が終わってくれるなら、\n機関車さえ走り始めてくれるなら――
2513 = "Nếu việc xác nhận kết thúc,\nnếu đầu máy bắt đầu chạy——"
# 【ニイロク】
# display as 二六
# JP: 「あ」
# 1741 = "「啊」" 
# monologue
# JP: ニイロクの口から、安堵の声。\nメールは――――大丈夫、届きません。
2382 = "Từ miệng Niiroku, vang lên tiếng thở phào nhẹ nhõm. Mail thì――――không sao, vẫn chưa thấy gửi đến."
# 【赤井】
# display as 赤井
# JP: 「走りましたか」
2025 = "「Chạy rồi sao?」"
# 【ニイロク】
# display as 二六
# JP: 「多分、そう。おねえちゃん、\n『イェイ！』って、スリープはいったから」
1861 = "「Có lẽ, là vậy. Chị ấy, nói 『Yeah!』, rồi rơi vào trạng thái ngủ luôn rồi.」"
# 【赤井】
# display as 赤井
# JP: 「共感を――意味ある共感を送ったのですか！？」
1804 = "「\\x%l共感;#00ffc040;Cộng cảm%l;#;——đã gửi \\x%l共感;#00ffc040;cộng cảm%l;#; có ý nghĩa sao!?」"
# 【ニイロク】
# display as 二六
# JP: 「ずうっとぐちゃぐちゃだったけど、\n『イェイ！』って、それはハッキリ伝わってきた！」
2160 = "「Dù từ nãy đến giờ toàn là mớ hỗn độn, nhưng chữ 『Yeah!』 đó, đã được truyền đạt rất rõ ràng!」"
# 【赤井】
# display as 赤井
# JP: 「そう……ですか。\nそれほどのレイルロオドを育てる方が、貨物に――」
1964 = "「Vậy……sao. Người có thể nuôi dưỡng một Railord đến mức đó, lại ở bên chở hàng——」"
# monologue
# JP: こぼれた言葉に気づきます。\n自分の中に、いつの間にか巣食っていた差別意識を。
2352 = "Tôi nhận ra những lời mình vừa buột miệng nói ra. Sự phân biệt đối xử đã ăn sâu vào trong tôi từ lúc nào không hay."
# monologue
# JP: （工場内に車輌を運び、持ちだしていく。\n貨物組を、それだけの存在と思っていました）
2869 = "（Vận chuyển toa xe vào trong nhà máy, rồi lại mang ra ngoài. Tôi đã nghĩ tổ chở hàng, chỉ là những tồn tại như thế mà thôi.）"
# monologue
# JP: けれど違った。\nそこには気高い誇りがあった。
2421 = "Nhưng tôi đã nhầm.\nỞ đó có một niềm tự hào cao quý."
# monologue
# JP: （シロと、そのマスターと、もしも話していたのなら。\n……そうした時間を、もしも重ねていたのなら）
2857 = "（Nếu như, tôi đã nói chuyện với Shiro, và \\x%lマスター;#00ffc040;Master%l;#; của cô ấy. ……Nếu như, tôi đã dành thời gian cho những việc như thế.）"
# monologue
# JP: 優れた人が、レイルロオドが、\nきっと、粉蔵のあちこちにいた。
2519 = "Những con người xuất sắc, những Railord ưu tú, chắc chắn, đã ở khắp nơi trong Nhà máy Kokura."
# monologue
# JP: 繋がりを持ち、協力し合い、\n別のレールを、敷けていたなら――
2510 = "Nếu chúng tôi có sự kết nối, hợp tác cùng nhau, và có thể trải ra, một đường ray khác——"
# 【赤井】
# display as 赤井
# JP: 「いや……今からでも遅くない」
1586 = "「Không……bây giờ vẫn chưa muộn.」"
# 【ニイロク】
# display as 二六
# JP: 「え？　なにが？？」
1728 = "「Hả? Cái gì cơ??」"
# 【赤井】
# display as 赤井
# JP: 「新しい、鉄道会社のことですよ」
1895 = "「Là chuyện về công ty đường sắt, mới đấy.」"
# monologue
# JP: シロがどれほど、優しく強いレイルロオドであるのかを、\nニイロクの無邪気な反応が教えてくれます。
2395 = "Phản ứng ngây thơ của Niiroku đã cho tôi biết, Shiro là một Railord dịu dàng và mạnh mẽ đến nhường nào."
# monologue
# JP: 不安を、苦痛を、ぬぐってやるため――\nただ一言を、どれだけの負荷の中、送ってくれたか。
2672 = "Để xua tan đi sự bất an, và nỗi đau đớn—— Chỉ một câu nói thôi, cô ấy đã phải gửi đi trong muôn vàn gánh nặng."
# 【赤井】
# display as 赤井
# JP: 「話し合うこと。伝え合うこと。\n帝鉄は、きっと、それを忘れてしまっていたのです」
1628 = "「Cùng nhau trò chuyện. Cùng nhau truyền đạt. Teitetsu, chắc chắn, đã quên mất điều đó rồi.」"
# monologue
# JP: 細分化し、専門化し、横の繋がりを持たなくなる。\n縄張り意識に凝り固まって、自分の職域だけを守る。
2525 = "Chia nhỏ ra, chuyên môn hóa, và không còn sự kết nối ngang. Cứng nhắc với ý thức lãnh thổ, chỉ bảo vệ lĩnh vực công việc của riêng mình."
# monologue
# JP: ――結果、お客様へのサービスも低下の一途を辿り、\n帝鉄解体を、国民が歓迎するまでに至ってしまった。
1178 = "——Kết quả là, dịch vụ dành cho khách hàng cũng ngày càng đi xuống, đến mức người dân hoan nghênh việc giải thể Teitetsu."
# 【赤井】
# display as 赤井
# JP: 「だから、新しい鉄道会社では、\n話し合い、伝え合うことを大事にしていきたいと」
1922 = "「Vì vậy, ở công ty đường sắt mới, tôi muốn trân trọng việc cùng nhau trò chuyện, cùng nhau truyền đạt.」"
# 【ニイロク】
# display as 二六
# JP: 「うん！　賛成！　話をするの、すごく楽しい」
1770 = "「Vâng! Tán thành! Nói chuyện với nhau, rất là vui.」"
# 【赤井】
# display as 赤井
# JP: 「でしたら、話し合いましょう。\n新しい鉄道会社の――さっきの話の続きから」
2143 = "「Nếu vậy thì, hãy cùng trò chuyện nhé. Từ phần tiếp theo của câu chuyện lúc nãy——về công ty đường sắt mới.」"
# 【ニイロク】
# display as 二六
# JP: 「うん、あのね？　九洲は、どこも電化難しそうなの。\nだから、九洲の[そと]外は、どんなとこかなって？」
1777 = "「Vâng, anh biết không? Việc điện khí hóa ở Kyushu có vẻ khó khăn ở khắp mọi nơi. Nên em tự hỏi, bên ngoài Kyushu thì sẽ như thế nào nhỉ?」"
# 【赤井】
# display as 赤井
# JP: 「私も詳しくはありません。\nどこか、行ってみたいところでもあるのですか？」
1863 = "「Tôi cũng không rành lắm. Em có nơi nào muốn đi thử không?」"
# 【ニイロク】
# display as 二六
# JP: 「[とうかいどう,2]東峡道！　日ノ本で一番の本線なんでしょ？\nだったら、そこを走ってみたい！！！」
1891 = "「Tokaido! Là tuyến chính số một ở Hinomoto đúng không? Nếu vậy, em muốn thử chạy trên đó!!!」"
# 【赤井】
# display as 赤井
# JP: 「[とうかいどう,2]東峡道こそ、\nまっさきに剥がされる線路でしょうが――」
1972 = "「Tokaido có lẽ, sẽ là tuyến đường ray bị lột bỏ đầu tiên đấy——」"
# monologue
# JP: ……話し合います。
1209 = "……Chúng tôi trò chuyện cùng nhau."
# monologue
# JP: ニイロクの不安を拭うため、\nシロの願いを、決して無駄にはしないため。
2776 = "Để xua tan đi sự bất an của Niiroku, và để nguyện vọng của Shiro, tuyệt đối không trở nên vô ích."
# 【ニイロク】
# display as 二六
# JP: 「それじゃ、北開道ってどうなの？\n広くて土地がたくさんなんでしょ？」
2131 = "「Vậy còn Hokkaido thì sao? Rộng lớn và có nhiều đất đai lắm đúng không?」"
# 【赤井】
# display as 赤井
# JP: 「広すぎますし、雪の影響が甚大と聞きます。\n電化以前に、保線コストが極めて厳しいかと」
2056 = "「Quá rộng lớn, và tôi nghe nói ảnh hưởng của tuyết là rất nghiêm trọng. Chưa nói đến việc điện khí hóa, chi phí \\x%l保線;#00ffc040;bảo trì đường ray%l;#; có lẽ sẽ cực kỳ đắt đỏ.」"
# 【ニイロク】
# display as 二六
# JP: 「ふぅん。なら、やっぱり九洲が一番いい？\nね？　清春はどう思う？」
1733 = "「Hừm. Vậy thì, quả nhiên Kyushu vẫn là tốt nhất sao? Nè? Kiyoharu nghĩ sao?」"
# 【赤井】
# display as 赤井
# JP: 「九洲は、鉄道王国になりうる土地とは考えます。\nので、再編の道筋さえ間違えなければ――」
1906 = "「Tôi nghĩ rằng Kyushu, là vùng đất có thể trở thành vương quốc đường sắt. Nên, chỉ cần không đi sai hướng trong quá trình tái cơ cấu——」"
# 【ニイロク】
# display as 二六
# JP: 「あ！　[もじ,1]門次ついた！」
1744 = "「A! Đến Moji rồi!」"
# 【赤井】
# display as 赤井
# JP: 「っ！！！」
1731 = "「っ!!!」"
# monologue
# JP: 共感が戻った――\nシロが、スリープモードから回復したのでしょう。
2451 = "\\x%l共感;#00ffc040;Cộng cảm%l;#; đã trở lại—— Có lẽ Shiro, đã phục hồi từ trạng thái ngủ."
# monologue
# JP: ニイロクの反応を見るかぎり、\nシロも今度は、安定してくれているのでしょうか？
2693 = "Nhìn vào phản ứng của Niiroku, có vẻ như lần này, Shiro cũng đã ổn định lại rồi sao?"
# monologue
# JP: （門次側の検査を――\nそこさえ切り抜けてくれるなら）
2853 = "（Kiểm tra ở phía Moji—— Chỉ cần vượt qua được chỗ đó thì）"
# monologue
# JP: 希望は、冷静な評価の敵と――\nわかっていても、どうしても思ってしまいます。
2799 = "Hy vọng, là kẻ thù của sự đánh giá lạnh lùng—— Dù biết vậy, nhưng tôi vẫn không thể không nghĩ đến."
# monologue
# JP: これほどの機関士とレイルロオドです。\n機転によって、シロのタブレットも回収されれば――
2411 = "Là một \\x%l機関士;#00ffc040;lái tàu%l;#; và Railord tuyệt vời đến thế cơ mà. Nếu tùy cơ ứng biến, và thu hồi được cả \\x%l操作板;#00ffc040;thẻ bảng%l;#; của Shiro thì——"
# 【ニイロク】
# display as 二六
# JP: 「やった！　なんか、検査とか無いみたいな感じ」
1803 = "「Tuyệt quá! Hình như, không có kiểm tra gì cả thì phải.」"
# 【赤井】
# display as 赤井
# JP: 「え？」
# 1726 = "「哎？」" 
# 【ニイロク】
# display as 二六
# JP: 「だって、すぐ動かされて――って、え？　え？？\n――やっ！！！？」
1793 = "「Bởi vì, ngay lập tức bị di chuyển——ủa, hả? Hả?? ——Á!!!?」"
# 【赤井】
# display as 赤井
# JP: 「切るんだっ！！！　共感をいますぐにっ！！！！」
1853 = "「Ngắt ngay đi!!! Ngắt \\x%l共感;#00ffc040;cộng cảm%l;#; ngay lập tức!!!!」"
# 【ニイロク】
# display as 二六
# JP: 「いやあああああああああああああああああああああ\nああああああああああああああああああああああああ」
1597 = "「Khônggggggggggggggggggggggggg gggggggggggggggggggggggg」"
# 【赤井】
# display as 赤井
# JP: 「ニイロクっ！！！！」
1621 = "「Niiroku!!!!」"
# 【ニイロク】
# display as 二六
# JP: 「あああああああああああああああああああああああ\nあああああああああああああああああああああああ」
1742 = "「Áááááááááááááááááááááááá\náááááááááááááááááááááááá」"
# monologue
# JP: ダメだ、壊れるっ！　ニイロクがっ！！\n共感――遮断！　強制遮断っ！！！！
2357 = "Không được rồi, sẽ hỏng mất! Niiroku sẽ hỏng mất!! \\x%l共感;#00ffc040;Cộng cảm%l;#;——ngắt kết nối! Ngắt kết nối cưỡng chế!!!!"
# 【赤井】
# display as 赤井
# JP: 「っ！！！」
1746 = "「っ!!!」"
# 【ニイロク】
# display as 二六
# JP: 「ぎぎゅっ！！？　――ぐっ」
1755 = "「Gya!!? ——Ư」"
# monologue
# JP: 真正面から、喉の、奥。そこを強く、親指で押す。\n運転体でも、整備体でも、変わらない。
2594 = "Từ chính diện, sâu bên trong, cổ họng. Dùng ngón cái ấn mạnh vào đó. Dù là \\x%l運転体;#00ffc040;kíp lái%l;#; hay \\x%l整備体;#00ffc040;thân chính%l;#;, cũng không có gì khác biệt."
# monologue
# JP: レイルロオドの機能を無条件停止させる、\n最終唯一の強制手段。
2560 = "Là biện pháp cưỡng chế duy nhất và cuối cùng, để dừng vô điều kiện các chức năng của Railord."
# 【ニイロク】
# display as 二六
# JP: 「はっ――ぐっ――あっ――がっ――」
1722 = "「Hà——ư——a——gà——」"
# monologue
# JP: 外から見れば、絞殺にしか見えない姿勢。\n誰もが異常と異変を感じ、警察に通報する姿勢。
2498 = "Nhìn từ bên ngoài, tư thế này chẳng khác nào đang bóp cổ. Một tư thế mà bất cứ ai nhìn thấy cũng sẽ cảm thấy bất thường, và báo cảnh sát ngay lập tức."
# monologue
# JP: 悪意を持った者にレイルロオドが壊される前、\nデータを保全し、仮死状態へと陥らせる機構。
2772 = "Là cơ chế để bảo toàn dữ liệu, và đưa Railord vào trạng thái chết lâm sàng, trước khi bị những kẻ có ác ý phá hoại."
# 【ニイロク】
# display as 二六
# JP: 「いぎっ――きゅっ――ぐっ――ぎぅ――」
1717 = "「Igi——kyu——gu——gyu——」"
# monologue
# JP: レイルロオドの安全保持を――\nそれだけを再優先した、非常手段。
2417 = "Là biện pháp khẩn cấp, đặt việc duy trì sự an toàn của Railord—— lên mức ưu tiên hàng đầu."
# monologue
# JP: ニイロクは、私の腕を振りほどかず、\nただ、絶叫は――親指の下で奮え続けて。
2377 = "Niiroku, không hất tay tôi ra, chỉ là, tiếng hét thảm thiết——vẫn tiếp tục run rẩy dưới ngón cái của tôi."
# 【ニイロク】
# display as 二六
# JP: 「はっ――ひゅ――ぐっ――んぐっ――」
1721 = "「Hà——hyu——gu——ngu——」"
# monologue
# JP: （早く――早く落ちてくれっ！！！）
2866 = "（Nhanh lên——hãy mau tắt đi!!!）"
# monologue
# JP: １０秒。\nもう経過している筈な気がする。
2535 = "10 giây. Tôi có cảm giác như thời gian đó đã trôi qua rồi."
# monologue
# JP: 運転士であるというのに、\n時間感覚を失っている。
2650 = "Mặc dù là một \\x%l運転士;#00ffc040;lái tàu%l;#;, nhưng tôi lại đang đánh mất cảm giác về thời gian."
# monologue
# JP: （どうか――早くっ！！！）
2867 = "（Xin hãy——nhanh lên!!!）"
# 【ニイロク】
# display as 二六
# JP: 「あっ――」
# 1734 = "「啊——」" 
# monologue
# JP: そして――ようやく、くったり崩れる。\n手の中、抵抗が消え、負荷が増す。
2676 = "Và rồi——cuối cùng, em ấy cũng đổ gục xuống. Trong tay tôi, sự kháng cự biến mất, và sức nặng tăng lên."
# monologue
# JP: 体を支え、横に寝かせて――
2587 = "Đỡ lấy cơ thể em ấy, và đặt nằm xuống——"
# monologue
# JP: （ああ……）
2854 = "（A……）"
# monologue
# JP: あれほど強く押し込んだのに、\nあざさえ、残っていない首筋。
2648 = "Mặc dù đã ấn mạnh đến thế, nhưng trên cổ em ấy, không lưu lại dù chỉ là một vết bầm tím."
# monologue
# JP: ニイロクはレイルロオドだと。\nいまさらのことを、改めて、強く、強く感じる。
2380 = "Niiroku là một Railord. Một sự thật hiển nhiên, nhưng giờ đây, tôi lại cảm nhận được nó một cách vô cùng mạnh mẽ."
# monologue
# JP: （時間は……多分、もう大丈夫。\n深呼吸――とにかく一度――深呼吸、して）
2872 = "（Thời gian thì……có lẽ, ổn rồi. Hít thở sâu——dù sao thì cũng phải——hít thở sâu một lần đã.）"
# 【赤井】
# display as 赤井
# JP: 「――っ――くっ――すう――――はぁっ！」
1244 = "「——っ——ư——hít――――hà!」"
# monologue
# JP: ……門次側が『察してくれた』としか思えません。\nあるいは誰かが、工作をしてくれていたのか。
1203 = "……Tôi chỉ có thể nghĩ rằng phía Moji đã 『nhận ra』. Hoặc là ai đó, đã ngầm giúp đỡ chúng tôi."
# 【赤井】
# display as 赤井
# JP: 「話し合い……コミュニケーションの不足」
1876 = "「Trò chuyện……sự thiếu hụt giao tiếp.」"
# monologue
# JP: 誰もが誰もを疑って――\nレイルロオドたちだけが、お互いを信じあっていた。
2601 = "Tất cả mọi người đều nghi ngờ lẫn nhau—— Chỉ có các Railord, là tin tưởng lẫn nhau."
# monologue
# JP: その結末が、この有様です。\n“死”の共感に――ニイロクを晒し、巻き込んだ。
2713 = "Kết cục, lại thành ra thế này. Phơi bày, và cuốn Niiroku vào——\\x%l共感;#00ffc040;cộng cảm%l;#; của cái “chết”."
# 【赤井】
# display as 赤井
# JP: 「一瞬で済んでいる筈です。\nもうシロは、共感を送ることなど……出来ない筈です」
1860 = "「Chắc hẳn là đã kết thúc trong nháy mắt. Shiro, chắc chắn không thể……gửi \\x%l共感;#00ffc040;cộng cảm%l;#; được nữa.」"
# monologue
# JP: 検査省略での即時破壊。
2517 = "Bỏ qua kiểm tra và phá hủy ngay lập tức."
# monologue
# JP: 隠蔽が目的である以上、\nできるだけ早く、原型を残さず、徹底的に。
2640 = "Một khi mục đích là để che giấu, thì phải làm càng nhanh càng tốt, không để lại nguyên dạng, một cách triệt để."
# 【赤井】
# display as 赤井
# JP: 「――専用ピン……出さないと」
1245 = "「——Phải lấy……chốt chuyên dụng ra.」"
# monologue
# JP: 運転士鞄を漁ります。
2603 = "Tôi lục lọi trong \\x%l乗務鞄;#00ffc040;túi phi hành đoàn%l;#;."
# monologue
# JP: 再起動スイッチは耳の奥。\nレイルロオドには不要なはずの、隙間の最奥。
2793 = "Công tắc khởi động lại nằm sâu trong tai. Sâu tận cùng của một khe hở, nơi đáng lẽ ra không cần thiết đối với Railord."
# 【赤井】
# display as 赤井
# JP: 「――ニイロク、起きてください」
1241 = "「——Niiroku, tỉnh dậy đi.」"
# monologue
# JP: コンセントを差し。\n耳の奥へと、か細いピンを。
2597 = "Cắm vào ổ cắm. Đưa chiếc chốt mỏng manh, vào sâu trong tai em ấy."
# monologue
# JP: （よしっ）
2855 = "（Được rồi.）"
# monologue
# JP: カチリと、確かなクリック感。
2488 = "Cạch, một cảm giác click rõ ràng."
# 【赤井】
# display as 赤井
# JP: 「ニイロク？　聞こえますか、起きましょう」
1627 = "「Niiroku? Em có nghe thấy không, dậy thôi nào.」"
# 【ニイロク】
# display as 二六
# JP: 「――――――」
1238 = "「――――――」"
# 【赤井】
# display as 赤井
# JP: 「ニイロク？　ニイロク！　起きるんだ！！」
1625 = "「Niiroku? Niiroku! Tỉnh dậy đi!!」"
# 【ニイロク】
# display as 二六
# JP: 「――――――あ」
1239 = "「――――――A.」"
# 【赤井】
# display as 赤井
# JP: 「ニイロク！　よかった！！！\nニイロクっ！！　ニイロクっ！！」
1620 = "「Niiroku! May quá!!!\nNiiroku!! Niiroku!!」"
# 【ニイロク】
# display as 二六
# JP: 「清――春。清春。清春」
1988 = "「Kiyo——haru. Kiyoharu. Kiyoharu.」"
# monologue
# JP: パニックをもう起こしていません。
2502 = "Em ấy không còn hoảng loạn nữa."
# 【ニイロク】
# display as 二六
# JP: 「清春」
1994 = "「Kiyoharu.」"
# monologue
# JP: その手が伸びて、私に甘え、すがってきます。\n――歓喜が膨れあがります！！
2726 = "Bàn tay ấy vươn ra, làm nũng, và bám víu lấy tôi. ——Niềm vui sướng trào dâng!!"
# 【赤井】
# display as 赤井
# JP: 「ニイロク！　よかった！　本当によかった！」
1619 = "「Niiroku! May quá! Thật sự may quá rồi!」"
# 【ニイロク】
# display as 二六
# JP: 「清春。壊れた」
2003 = "「Kiyoharu. Em hỏng mất rồi.」"
# 【赤井】
# display as 赤井
# JP: 「ですね。それでも、シロは見事に――。\n自分を犠牲に、ニイロクのことも、鉄道も！」
1944 = "「Đúng vậy. Dù vậy, Shiro đã rất xuất sắc——. Hy sinh bản thân mình, vì cả Niiroku, và cả đường sắt!」"
# 【ニイロク】
# display as 二六
# JP: 「シロおねえちゃんも、壊れた。\n自分も。同じ。どこかが。壊れた。取り返せない」
1783 = "「Chị Shiro cũng, hỏng mất rồi. Em cũng vậy. Giống nhau. Một nơi nào đó. Đã hỏng rồi. Không thể lấy lại được.」"
# 【赤井】
# display as 赤井
# JP: 「ニイロクっ！！？」
1622 = "「Niiroku!!?」"
# monologue
# JP: 言われて――気づく。気づきます。
2507 = "Nghe em ấy nói vậy——tôi mới nhận ra. Tôi nhận ra."
# monologue
# JP: ニイロクが――ニイロクの表情がさっきから、\n一切変化してないことに。
2362 = "Niiroku——biểu cảm của Niiroku từ nãy đến giờ, hoàn toàn không thay đổi chút nào."
# 【ニイロク】
# display as 二六
# JP: 「清春――自分は――笑えてる？」
1991 = "「Kiyoharu——em——có đang cười không?」"
# 【赤井】
# display as 赤井
# JP: 「あ――ああ。\n笑えている、よ。いつもどおりだ。凄くかわいい」
1736 = "「A——ừm. Đang cười đấy. Giống như mọi khi. Đáng yêu lắm.」"
# 【ニイロク】
# display as 二六
# JP: 「ウソ。清春。いつもと違う」
2176 = "「Nói dối. Kiyoharu. Khác với mọi khi.」"
# 【赤井】
# display as 赤井
# JP: 「っ！！！」
# 1731 = "「唔！！！」" 
# monologue
# JP: コンパクトを、ニイロクが出し――\nそうして、静かに、しまいます。
2375 = "Niiroku lấy hộp phấn trang điểm ra—— Và rồi, lặng lẽ, cất nó đi."
# monologue
# JP: （いつもと同じに、いつもの自分で――）
2878 = "（Vẫn như mọi khi, với chính bản thân mình như mọi khi——）"
# monologue
# JP: ニイロクを、これ以上不安にさせないために。\nそうと思えば、シロが、どれほど強かったかを――
2354 = "Để không làm cho Niiroku thêm bất an nữa. Nghĩ như vậy, tôi mới nhận ra Shiro đã mạnh mẽ đến nhường nào——"
# 【ニイロク】
# display as 二六
# JP: 「清春？　清春？　どこか、痛いの？」
2005 = "「Kiyoharu? Kiyoharu? Anh đau ở đâu à?」"
# 【赤井】
# display as 赤井
# JP: 「いつもの自分で――いるなど――とてもっ」
1658 = "「Trở thành chính bản thân mình như mọi khi——chuyện đó——thật sự quá sức」"
# monologue
# JP: 体が言葉が震えます。\n思考も、ぶるぶる震えています。
2600 = "Cơ thể, và lời nói của tôi đều run rẩy. Suy nghĩ của tôi cũng đang run lên bần bật."
# monologue
# JP: 罪悪感と、後悔と――\nニイロクを苦しめるだけの感情を、抑えられません。
2573 = "Cảm giác tội lỗi, và sự hối hận—— Tôi không thể kìm nén được những cảm xúc chỉ làm khổ Niiroku."
# 【ニイロク】
# display as 二六
# JP: 「泣かないで。清春。\n清春が泣けば。自分は。悲しい」
1674 = "「Đừng khóc. Kiyoharu. Nếu Kiyoharu khóc. Em sẽ. Rất buồn.」"
# 【赤井】
# display as 赤井
# JP: 「すまないっ――すみません――ニイロク。\nわかっていても――それでも――それでもっ」
1820 = "「Xin lỗi——xin lỗi em——Niiroku. Dù biết là vậy——nhưng mà——nhưng mà」"
# 【ニイロク】
# display as 二六
# JP: 「だけど。嬉しい。\n清春が。自分の代わりに、泣いてくれて」
1650 = "「Nhưng mà. Em rất vui. Vì Kiyoharu. Đã khóc thay cho em.」"
# 【赤井】
# display as 赤井
# JP: 「っ！」
# 1743 = "「啊！」" 
# monologue
# JP: ニイロクの指が静かに、私の頬をなぞります。
2386 = "Ngón tay của Niiroku lặng lẽ, lướt qua má tôi."
# monologue
# JP: そうして、涙を――\n自分の頬へと、移します。
2677 = "Và rồi, giọt nước mắt—— Được chuyển sang, má của em ấy."
# 【ニイロク】
# display as 二六
# JP: 「清春は自分を救ってくれた。\nあのままだったら。自分も全部。壊れてた」
2000 = "「Kiyoharu đã cứu em. Nếu cứ để như vậy. Em cũng sẽ. Hỏng toàn bộ.」"
# 【赤井】
# display as 赤井
# JP: 「そうだろうとは、思います。\nけれど――」
1889 = "「Tôi nghĩ, chắc là vậy.\nNhưng mà——」"
# 【ニイロク】
# display as 二六
# JP: 「だから、清春が笑えていれば。\n自分も、いっしょに笑ってる」
1913 = "「Vì vậy, nếu Kiyoharu có thể cười. Em cũng sẽ, cười cùng anh.」"
# 【赤井】
# display as 赤井
# JP: 「っ！！！」
# 1731 = "「唔！！！」" 
# monologue
# JP: 笑い、ます。\n口の端を、持ち上げて――目尻を、下げて。
2605 = "Tôi, sẽ cười.\nNhếch khóe miệng lên——hạ đuôi mắt xuống."
# 【ニイロク】
# display as 二六
# JP: 「下手くそ。清春。笑えてない」
2039 = "「Tệ quá. Kiyoharu. Anh không có cười.」"
# 【赤井】
# display as 赤井
# JP: 「それは……今は、まだっ、\n慣れて――ないっ、から」
2145 = "「Chuyện đó……là do bây giờ, tôi vẫn chưa, quen——với việc đó, mà thôi.」"
# 【ニイロク】
# display as 二六
# JP: 「そう。慣れる。この顔にも。\n――シロおねえちゃんがいないことにも」
1778 = "「Đúng vậy. Sẽ quen thôi. Kể cả với khuôn mặt này. ——Và kể cả với việc chị Shiro không còn nữa.」"
# 【赤井】
# display as 赤井
# JP: 「そう――ですね。\n慣れるしかない――全てに、新しい環境にも」
1937 = "「Đúng——vậy nhỉ. Chỉ còn cách làm quen thôi——với mọi thứ, và với cả môi trường mới nữa.」"
# 【ニイロク】
# display as 二六
# JP: 「うん。だけど。\n清春は、変わらないで欲しい」
1760 = "「Ừm. Nhưng mà.\nEm muốn Kiyoharu, sẽ không thay đổi.」"
# monologue
# JP: ニイロクが、両手を差し伸べてきます。\n何を求めてもらっているか、わかります。
2393 = "Niiroku, dang hai tay về phía tôi. Tôi biết, em ấy đang mong muốn điều gì."
# 【赤井】
# display as 赤井
# JP: 「もちろんですとも」
2023 = "「Tất nhiên rồi.」"
# 【ニイロク】
# display as 二六
# JP: 「ん……」
1758 = "「Ưm……」"
# monologue
# JP: キスのさなかも、ニイロクは目を閉じません。\n完全に、顔が固まってしまっています。
2521 = "Ngay cả khi đang hôn, Niiroku cũng không nhắm mắt lại. Khuôn mặt em ấy, đã hoàn toàn cứng đờ."
# 【赤井】
# display as 赤井
# JP: 「ゆっくり、慣れていきましょう。\n少しずつ、回復をしていきましょう」
1877 = "「Từ từ, làm quen dần nhé. Từng chút một, cùng nhau hồi phục nhé.」"
# 【ニイロク】
# display as 二六
# JP: 「そうする。清春と、そうしてく」
1898 = "「Em sẽ làm vậy. Cùng với Kiyoharu, làm như vậy.」"
# 【赤井】
# display as 赤井
# JP: 「ええ」
# 1769 = "「嗯」" 
# monologue
# JP: 表情は一切かわりません。\nけれど、わからないはずもありません。
2574 = "Biểu cảm hoàn toàn không thay đổi. Nhưng mà, không thể nào tôi lại không nhận ra."
# monologue
# JP: ニイロクは、今、\nわたしに微笑んでくれました。
2463 = "Niiroku, vừa mới,\nmỉm cười với tôi."
# 【ニイロク】
# display as 二六
# JP: 「少し疲れた。眠ってもいい？」
1900 = "「Em hơi mệt rồi. Em ngủ một chút được không?」"
# 【赤井】
# display as 赤井
# JP: 「もちろんですとも。運転鞄、あけますね」
2024 = "「Tất nhiên là được rồi. Tôi mở \\x%l乗務鞄;#00ffc040;túi phi hành đoàn%l;#; ra nhé.」"
# 【ニイロク】
# display as 二六
# JP: 「ううん、鞄は、今はこわい」
1599 = "「Không đâu, cái túi đó, bây giờ em sợ lắm.」"
# 【赤井】
# display as 赤井
# JP: 「そうですか」
1965 = "「Vậy sao.」"
# monologue
# JP: だっこを、します。\n腕の中、ニイロクは頭を擦り付けてきます。
2586 = "Tôi bế em ấy lên. Trong vòng tay tôi, Niiroku cọ cọ đầu vào."
# 【ニイロク】
# display as 二六
# JP: 「清春といっしょなら、怖くない」
2079 = "「Ở cùng với Kiyoharu, thì không sợ.」"
# 【赤井】
# display as 赤井
# JP: 「光栄です。安心して眠って下さい」
1973 = "「Thật vinh hạnh. Hãy an tâm ngủ đi nhé.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1769 = "「嗯」" 
# monologue
# JP: ニイロクが全ての力を抜きます。\nまぶたは、けれど動きません。
2379 = "Niiroku thả lỏng toàn bộ sức lực. Nhưng mí mắt, lại không hề nhúc nhích."
# 【赤井】
# display as 赤井
# JP: 「おやすみ、ニイロク」
1968 = "「Ngủ ngon nhé, Niiroku.」"
# 【ニイロク】
# display as 二六
# JP: 「うん、清春」
1781 = "「Vâng, Kiyoharu.」"
# monologue
# JP: 手をあて、まぶたを下にさげ。\nそうっと瞳を閉ざします。
2595 = "Tôi đưa tay lên, vuốt mí mắt em ấy xuống. Nhẹ nhàng khép lại đôi mắt ấy."
# 【ニイロク】
# display as 二六
# JP: 「おやすみなさい」
1967 = "「Ngủ ngon nhé.」"
