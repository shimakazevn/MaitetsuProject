2352 = "不由自主說出來之後，我才察覺到，不知什麼時候，自己的心中已經帶上了這種帶有歧視的印象。" 

# monologue
# JP: （工場内に車輌を運び、持ちだしていく。\n貨物組を、それだけの存在と思っていました）
2869 = "（我還以為，貨運組只會把工廠裡的車輛運出去）" 

# monologue
# JP: けれど違った。\nそこには気高い誇りがあった。
2421 = "但其實並非如此。他們也有屬於他們自己的驕傲。" 

# monologue
# JP: （シロと、そのマスターと、もしも話していたのなら。\n……そうした時間を、もしも重ねていたのなら）
2857 = "（如果我之前和四六，以及她的司機交談過……如果我們曾經相處過——）" 

# monologue
# JP: 優れた人が、レイルロオドが、\nきっと、粉蔵のあちこちにいた。
2519 = "小倉各地一定有許多優秀的人，以及鐵路人偶。" 

# monologue
# JP: 繋がりを持ち、協力し合い、\n別のレールを、敷けていたなら――
2510 = "如果我們互相聯繫，互相幫助，鋪設下其它的線路——" 

# 【赤井】
# display as 赤井
# JP: 「いや……今からでも遅くない」
1586 = "「不……從現在開始也不晚」" 

# 【ニイロク】
# display as 二六
# JP: 「え？　なにが？？」
1728 = "「哎？什麼意思？？」" 

# 【赤井】
# display as 赤井
# JP: 「新しい、鉄道会社のことですよ」
1895 = "「我是說，我們可以設立全新的鐵路公司」" 

# monologue
# JP: シロがどれほど、優しく強いレイルロオドであるのかを、\nニイロクの無邪気な反応が教えてくれます。
2395 = "二六純真無邪的反應，告訴著我，四六是一位多麼溫柔，多麼堅強的鐵路人偶。" 

# monologue
# JP: 不安を、苦痛を、ぬぐってやるため――\nただ一言を、どれだけの負荷の中、送ってくれたか。
2672 = "為了紓解她的不安、她的痛苦——四六承受著不知道多沉重的負擔，卻還努力對她說了那句話。" 

# 【赤井】
# display as 赤井
# JP: 「話し合うこと。伝え合うこと。\n帝鉄は、きっと、それを忘れてしまっていたのです」
1628 = "「互相交談。互相理解。帝國鐵路一定已經遺忘了這件事的重要性」" 

# monologue
# JP: 細分化し、専門化し、横の繋がりを持たなくなる。\n縄張り意識に凝り固まって、自分の職域だけを守る。
2525 = "局限於把工作細分化、專業化，切斷了人與人之間的聯繫。因領地意識而變得死板，一味守著自己的專業領域不動。" 

# monologue
# JP: ――結果、お客様へのサービスも低下の一途を辿り、\n帝鉄解体を、国民が歓迎するまでに至ってしまった。
1178 = "——結果，公司對客人的服務質量不斷變差，面對帝國鐵路的解散，民眾甚至拍手叫好。" 

# 【赤井】
# display as 赤井
# JP: 「だから、新しい鉄道会社では、\n話し合い、伝え合うことを大事にしていきたいと」
1922 = "「所以，設立全新的鐵路公司之後，我想更重視溝通、理解」" 

# 【ニイロク】
# display as 二六
# JP: 「うん！　賛成！　話をするの、すごく楽しい」
1770 = "「嗯！我同意！跟別人交談真的很快樂」" 

# 【赤井】
# display as 赤井
# JP: 「でしたら、話し合いましょう。\n新しい鉄道会社の――さっきの話の続きから」
2143 = "「那我們就多聊聊吧。繼續聊剛才的話題——建立新的鐵路公司」" 

# 【ニイロク】
# display as 二六
# JP: 「うん、あのね？　九洲は、どこも電化難しそうなの。\nだから、九洲の[そと]外は、どんなとこかなって？」
1777 = "「嗯，其實，九州各地要電力化好像都很難。所以我很好奇，九州的外面是什麼樣的？」" 

# 【赤井】
# display as 赤井
# JP: 「私も詳しくはありません。\nどこか、行ってみたいところでもあるのですか？」
1863 = "「我也不太熟悉。你有什麼想去的地方嗎？」" 

# 【ニイロク】
# display as 二六
# JP: 「[とうかいどう,2]東峡道！　日ノ本で一番の本線なんでしょ？\nだったら、そこを走ってみたい！！！」
1891 = "「我想去東海道！那是日本第一的幹線吧？我好想在上面跑跑看！！！」" 

# 【赤井】
# display as 赤井
# JP: 「[とうかいどう,2]東峡道こそ、\nまっさきに剥がされる線路でしょうが――」
1972 = "「東海道肯定是最先被廢除的線路吧——」" 

# monologue
# JP: ……話し合います。
1209 = "……我要跟她多說說話。" 

# monologue
# JP: ニイロクの不安を拭うため、\nシロの願いを、決して無駄にはしないため。
2776 = "這是為了拂去二六的不安，也是為了不要讓四六的願望白費。" 

# 【ニイロク】
# display as 二六
# JP: 「それじゃ、北開道ってどうなの？\n広くて土地がたくさんなんでしょ？」
2131 = "「那北海道怎麼樣？那裡不是很寬廣，又有很多土地嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「広すぎますし、雪の影響が甚大と聞きます。\n電化以前に、保線コストが極めて厳しいかと」
2056 = "「聽說那裡太寬廣了，下雪對鐵路的影響又很厲害。電力化先不說，巡線一定非常費事吧」" 

# 【ニイロク】
# display as 二六
# JP: 「ふぅん。なら、やっぱり九洲が一番いい？\nね？　清春はどう思う？」
1733 = "「唔，那果然還是九州最好？清春，你怎麼想？」" 

# 【赤井】
# display as 赤井
# JP: 「九洲は、鉄道王国になりうる土地とは考えます。\nので、再編の道筋さえ間違えなければ――」
1906 = "「我認為，九州其實是有潛力成為鐵路王國的。所以，只要重組順利——」" 

# 【ニイロク】
# display as 二六
# JP: 「あ！　[もじ,1]門次ついた！」
1744 = "「啊！已經到達門司了！」" 

# 【赤井】
# display as 赤井
# JP: 「っ！！！」
1731 = "「唔！！！」" 

# monologue
# JP: 共感が戻った――\nシロが、スリープモードから回復したのでしょう。
2451 = "共鳴恢復了——看來，四六已經解除了睡眠模式。" 

# monologue
# JP: ニイロクの反応を見るかぎり、\nシロも今度は、安定してくれているのでしょうか？
2693 = "看二六的反應，現在的四六狀態應該比較穩定吧？" 

# monologue
# JP: （門次側の検査を――\nそこさえ切り抜けてくれるなら）
2853 = "（只要她能通過門司檢查的這一關——）" 

# monologue
# JP: 希望は、冷静な評価の敵と――\nわかっていても、どうしても思ってしまいます。
2799 = "雖然我知道，心懷希望就難以保持冷靜理智——雖然心裡清楚，但我還是不由自主地在心裡祈禱。" 

# monologue
# JP: これほどの機関士とレイルロオドです。\n機転によって、シロのタブレットも回収されれば――
2411 = "他們是那麼優秀的司機和鐵路人偶。如果隨機應變，能拿回四六的操作板——" 

# 【ニイロク】
# display as 二六
# JP: 「やった！　なんか、検査とか無いみたいな感じ」
1803 = "「太好了！好像那邊不需要通過檢查」" 

# 【赤井】
# display as 赤井
# JP: 「え？」
# 1726 = "「哎？」" 

# 【ニイロク】
# display as 二六
# JP: 「だって、すぐ動かされて――って、え？　え？？\n――やっ！！！？」
1793 = "「因為，馬上又開始動了——哎？哎？？不要啊！！！？」" 

# 【赤井】
# display as 赤井
# JP: 「切るんだっ！！！　共感をいますぐにっ！！！！」
1853 = "「快切斷共鳴！！！馬上！！！！」" 

# 【ニイロク】
# display as 二六
# JP: 「いやあああああああああああああああああああああ\nああああああああああああああああああああああああ」
1597 = "「不要啊————————————————————————————————————————————」" 

# 【赤井】
# display as 赤井
# JP: 「ニイロクっ！！！！」
1621 = "「二六！！！！」" 

# 【ニイロク】
# display as 二六
# JP: 「あああああああああああああああああああああああ\nあああああああああああああああああああああああ」
1742 = "「啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊」" 

# monologue
# JP: ダメだ、壊れるっ！　ニイロクがっ！！\n共感――遮断！　強制遮断っ！！！！
2357 = "不行，二六會壞掉的！——我要切斷共鳴！強行切斷！！！！" 

# 【赤井】
# display as 赤井
# JP: 「っ！！！」
1746 = "「啊！！！」" 

# 【ニイロク】
# display as 二六
# JP: 「ぎぎゅっ！！？　――ぐっ」
1755 = "「嗚嗚！！？——呃」" 

# monologue
# JP: 真正面から、喉の、奥。そこを強く、親指で押す。\n運転体でも、整備体でも、変わらない。
2594 = "我用大拇指，用力從正面按住二六的喉嚨。駕駛體和整備體的強制關閉方式都一樣。" 

# monologue
# JP: レイルロオドの機能を無条件停止させる、\n最終唯一の強制手段。
2560 = "想要無條件停止鐵路人偶的運行，這是最終的，也是唯一的強制手段。" 

# 【ニイロク】
# display as 二六
# JP: 「はっ――ぐっ――あっ――がっ――」
1722 = "「哈——咕——啊——呃——」" 

# monologue
# JP: 外から見れば、絞殺にしか見えない姿勢。\n誰もが異常と異変を感じ、警察に通報する姿勢。
2498 = "外人看來，這姿勢跟我要掐死她沒什麼區別。任何人都看得出這姿勢不正常，第一反應就是報警。" 

# monologue
# JP: 悪意を持った者にレイルロオドが壊される前、\nデータを保全し、仮死状態へと陥らせる機構。
2772 = "這個機關是為了預防有人惡意破壞鐵路人偶，故意讓人偶陷入假死狀態，好保存數據。" 

# 【ニイロク】
# display as 二六
# JP: 「いぎっ――きゅっ――ぐっ――ぎぅ――」
1717 = "「咦——嗚——嗚——咕」" 

# monologue
# JP: レイルロオドの安全保持を――\nそれだけを再優先した、非常手段。
2417 = "以保護鐵路人偶的安全為最優先——為此而採取的非常手段。" 

# monologue
# JP: ニイロクは、私の腕を振りほどかず、\nただ、絶叫は――親指の下で奮え続けて。
2377 = "二六掙脫不開我的手，只是——在我的大拇指之下掙扎著尖叫。" 

# 【ニイロク】
# display as 二六
# JP: 「はっ――ひゅ――ぐっ――んぐっ――」
1721 = "「哈——呼——咕——嗚嗯——」" 

# monologue
# JP: （早く――早く落ちてくれっ！！！）
2866 = "（快點——快點停止吧！！！）" 

# monologue
# JP: １０秒。\nもう経過している筈な気がする。
2535 = "強制關閉需要１０秒。我以為時間已經到了的。" 

# monologue
# JP: 運転士であるというのに、\n時間感覚を失っている。
2650 = "明明身為駕駛員，我卻失去了對時間的感知能力。" 

# monologue
# JP: （どうか――早くっ！！！）
2867 = "（快點——拜託了！！！）" 

# 【ニイロク】
# display as 二六
# JP: 「あっ――」
# 1734 = "「啊——」" 

# monologue
# JP: そして――ようやく、くったり崩れる。\n手の中、抵抗が消え、負荷が増す。
2676 = "然後——她終於無力地垂下頭。手中的抵抗消失了，重量卻增加了。" 

# monologue
# JP: 体を支え、横に寝かせて――
2587 = "我支撐著她的身體，讓她橫躺下——" 

# monologue
# JP: （ああ……）
2854 = "（啊……）" 

# monologue
# JP: あれほど強く押し込んだのに、\nあざさえ、残っていない首筋。
2648 = "明明我那麼用力地掐了下去。可是她的脖子上，卻沒有絲毫的淤青。" 

# monologue
# JP: ニイロクはレイルロオドだと。\nいまさらのことを、改めて、強く、強く感じる。
2380 = "二六是鐵路人偶。明明我早已知道了，卻再度強烈地感受到這個事實。" 

# monologue
# JP: （時間は……多分、もう大丈夫。\n深呼吸――とにかく一度――深呼吸、して）
2872 = "（時間……應該還來得及。深呼吸——總之先深呼吸一次——）" 

# 【赤井】
# display as 赤井
# JP: 「――っ――くっ――すう――――はぁっ！」
1244 = "「——吸——呼！」" 

# monologue
