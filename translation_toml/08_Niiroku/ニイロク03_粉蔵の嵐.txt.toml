1074 = "「……一般來說，進行民營化、分公司經營對帝國鐵路也是有利的」" 

# 【ニイロク】
# display as 二六
# JP: 「そう思う。鉄くずにして処分するより、\n欲しがる人に売る方が、高く売れるに決まってる」
1560 = "「我也這麼想。比起拆解成廢鐵，還是把車輛賣給想要的人更划算」" 

# 【赤井】
# display as 赤井
# JP: 「けれど、今回の件は違います。エアクラ社――\nいえむしろ、冥国の命令での、施策でしょうから」
1409 = "「可是這次不一樣。這個政策是空凝機公司——不，是美國的命令」" 

# 【ニイロク】
# display as 二六
# JP: 「鉄道が滅びれば、\nエアクラの普及に加速がつくから？」
1624 = "「是因為清除鐵路就可以加快普及空凝機了嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「でしょうね。解体後の受け皿のエアクラ＝バス社は\n鉄道からエアクラへの転換の象徴ともなるでしょう」
1535 = "「恐怕是吧。鐵路解體後，代替它的空凝機公車公司就會成為成功轉型的象徵」" 

# 【ニイロク】
# display as 二六
# JP: 「じゃあ、民営・分社化は難しい？」
1828 = "「那鐵路想要民營化、分公司經營是很難的嗎？」" 

# monologue
# JP: そうなったらって――\n思っちゃってすごく、怖くなる。
2263 = "說到這裡，我都怕到不敢想下去了。" 

# monologue
# JP: おねえちゃんたちみんなも、自分も、車両ごと。\n解体されて――全部がゼロになっちゃうんだって。
2088 = "我不敢想像，姐姐、大家還有我都會連車輛一起被人拆解，化為虛無。" 

# 【赤井】
# display as 赤井
# JP: 「大丈夫ですよ、ニイロク」
1349 = "「二六，不用擔心」" 

# 【ニイロク】
# display as 二六
# JP: 「あ――」
1453 = "「啊——」" 

# monologue
# JP: ぎゅって。\n清春が抱きしめてくれる。
2188 = "清春抱住了我。" 

# monologue
# JP: いいこいいこってしてくれる。\n仕事の手、止まっちゃう。並列処理、できっこない。
1982 = "他摸了摸我的頭。我不由得停下了工作。這還怎麼平行處理啊。" 

# 【赤井】
# display as 赤井
# JP: 「引き受けたからには成功させます。\nどのみち、最初から引き受けるつもりでした」
1612 = "「既然接過了這份工作，我就要讓它成功。反正我從一開始就打算這麼做的」" 

# 【ニイロク】
# display as 二六
# JP: 「そうなんだ！」
1809 = "「這樣啊！」" 

# monologue
# JP: 嬉しい。すごくホっとする。
2059 = "好高興，我一下子就放心了。" 

# monologue
# JP: 責任って、少しずつ本当にわかるようになってきて\n――だんだん、不安になってきたから。
2121 = "我這些天一點點理解了什麼叫做責任，也漸漸不安了起來。" 

# 【ニイロク】
# display as 二六
# JP: 「あのとき出しゃばっちゃったから――\nそれで清春、断れなくなったとかじゃなかった？」
1329 = "「不是因為我那個時候突然出現，才害得清春無法拒絕嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「ああ――そんな心配ができるほど。\nニイロク――きみは、成長してくれているのですね」
1477 = "「嗯——二六，你長大了，居然都會這麼擔心我啦」" 

# monologue
# JP: いいこいいこが強くなる。\n気持ちいい。どんどんどんどん幸せになる。
1984 = "他摸我頭的力度加大了。好舒服，心裡幸福的感覺越來越強。" 

# 【赤井】
# display as 赤井
# JP: 「言ったとおり、どのみち引き受けるつもりでした。\n鉄道を失えば私の選んだ全てが、無意味になります」
1544 = "「我不是說過了嗎，反正我早就決定了。要是失去了鐵路，我過去選擇的一切就都沒有意義了」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1481 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「だからこそ、ゴネたのです。\nゴネる姿勢を見せておくことに、意味がありました」
1603 = "「所以我才要先表示出不願意的態度。表達不願意的態度是有意義的」" 

# 【ニイロク】
# display as 二六
# JP: 「意味って？」
1539 = "「意義是什麼？」" 

# 【赤井】
# display as 赤井
# JP: 「それはですね」
1805 = "「這個啊」" 

# 【ニイロク】
# display as 二六
# JP: 「あっ！　待って」
1469 = "「啊，等一下！」" 

# monologue
# JP: 清春が体を離そうとして、\nヤダって思って声が出ちゃう。
2186 = "清春想要放開我，我不由得發出了不願意的聲音。" 

# monologue
# JP: ……なんだか、照れちゃう。\n照れるけど、言っちゃったから、全部言う。
1033 = "……感覺好難為情。雖然難為情，但我還是要說。" 

# 【ニイロク】
# display as 二六
# JP: 「時間、大丈夫なら、このまま聞きたい。\n――このままで、全部……教えて欲しい」
1746 = "「要是你不著急，就抱著我說吧。就這樣抱著我，告訴我一切」" 

# 【赤井】
# display as 赤井
# JP: 「甘えっ子ですね、ニイロクは」
1351 = "「二六，你可真是個纏人的孩子」" 

# 【ニイロク】
# display as 二六
# JP: 「……うん」
1082 = "「……嗯」" 

# monologue
# JP: いいこいいこ。\n今度はゆっくり、やさしくやさしく。
2293 = "這次清春溫柔地慢慢撫摸著我的頭。" 

# 【赤井】
# display as 赤井
# JP: 「ゴネた理由のひとつは彼らの覚悟を見るためです。\n『それなら自分が』という者がいるかを見たかった」
1550 = "「我之所以一開始拒絕，是因為想見識一下他們的決心。我想看看會不會有人站出來」" 

# 【ニイロク】
# display as 二六
# JP: 「わかった！　そういう人がいたら、\nその人に前に立ってもらったの？」
1580 = "「我懂了！要是有人站出來，就讓他站在前面好了？」" 

# 【赤井】
# display as 赤井
# JP: 「それも選択肢のひとつでした。\n私は臆病者です。まったく、フロント向きではない」
1804 = "「這也是一種選擇。我可是很膽小的，完全不適合領著別人做事」" 

# 【ニイロク】
# display as 二六
# JP: 「だと思う。慎重で臆病だから、\n清春は、最高の試験運転士なんだし」
1557 = "「我也覺得。就是因為你這麼小心謹慎，才能成為最棒的試車員啊」" 

# 【赤井】
# display as 赤井
# JP: 「わかってもらえて、ほっとしますよ」
1378 = "「你這麼懂我，我就放心了」" 

# monologue
# JP: なでなで。ふんわり。\n体も、なんだかぽかぽかしてくる。
2251 = "被清春摸著腦袋，我感到身體漸漸熱了起來，有些輕飄飄的。" 

# 【赤井】
# display as 赤井
# JP: 「しかし、そうはなりませんでした。\nつまり彼らも、どのレベルかで、様子見をしている」
1406 = "「可是沒人站出來。也就是說他們也在一定程度上保持觀望」" 

# 【ニイロク】
# display as 二六
# JP: 「――いつでも転べるようにしてるってこと？」
1046 = "「——是觀望要不要掉頭嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「端的に言えばそうなります。\n条件次第で、あの四人の誰にも、転ぶ可能性がある」
1757 = "「說難聽點就是這樣。如果拿到合適條件，那四個人裡誰都有掉頭的可能性」" 

# monologue
# JP: 普通に話そうとしてるけど――それでも寂しそうな声。\nそんなの当然。
2307 = "雖然清春說這話的時候很平靜，但他的聲音還是透出幾分落寞。這也是理所當然的。" 

# monologue
# JP: みんな、だって。\nこんなことがなければずっと、仲間なんだから。
2254 = "要是沒出現這種情況，大家肯定會一直當同事。" 

# 【ニイロク】
# display as 二六
# JP: 「……うん」
# 1082 = "「……嗯」" 

# 【赤井】
# display as 赤井
# JP: 「すでに経営者サイドの者もいるかもしれない。\nその心配も、ごねてみた理由のひとつです」
1403 = "「另一個理由則是，說不定已經有人掉頭去資方那邊了」" 

# monologue
# JP: でも、清春は普通にしてる。\nだったら、自分も普通に話す。
2024 = "可是清春依然表現得很平常。那我也要表現得平常些。" 

# 【ニイロク】
# display as 二六
# JP: 「……ええ、と――経営者側の人がいたら、\n清春の様子を報告する――から？」
1105 = "「……那個——是不是因為，萬一有資方那邊的內鬼，就會把你的態度報告給他們？」" 

# 【赤井】
# display as 赤井
# JP: 「そうですね」
1620 = "「是啊」" 

# 【ニイロク】
# display as 二六
# JP: 「――清春が消極的って思わせてたら――\nなにか、工作をしてくるかもしれない？」
1044 = "「——假如他們覺得你的應對很消極，可能就會試圖說服你倒戈？」" 

# 【赤井】
# display as 赤井
# JP: 「すごいですね、ニイロク。さすがは最新鋭。\n稼働半年強で、ここまで人間を理解するとは」
1711 = "「真聰明，不愧是最新型號。只啟動了半年就能如此理解人類」" 

# 【ニイロク】
# display as 二六
# JP: 「ううん、違う！」
1608 = "「才沒有呢！」" 

# monologue
# JP: ほめてもらえて、すごく嬉しい。\nだけどデータは、正確なものをあげなくちゃ。
2253 = "被清春稱讚了，好高興。但是我一定要表達準確的數據。" 

# 【ニイロク】
# display as 二六
# JP: 「人間全部のことはわからない。けど――\n清春のことだったら、ずっと見てた分、わかる」
1582 = "「我才沒有理解人類的全部。可是——我一直在你身邊，一直都看著你，所以我能理解你」" 

# 【赤井】
# display as 赤井
# JP: 「っ！」
1451 = "「唔！」" 

# monologue
# JP: 手、なでなでの手、止まっちゃう。
2189 = "清春撫摸我的手停下了。" 

# 【ニイロク】
# display as 二六
# JP: 「清春？　自分、間違えた？？」
1686 = "「清春？難道我搞錯了嗎？？」" 

# 【赤井】
# display as 赤井
# JP: 「いいえ――ニイロク。いいえ――。\nその……正直にいって――照れただけです」
1468 = "「啊，不是的。我只是——老實說，有點害羞」" 

# 【ニイロク】
# display as 二六
# JP: 「照れるの？　清春も」
1368 = "「你也會害羞？」" 

# 【赤井】
# display as 赤井
# JP: 「照れますよ。それは――やはり」
1823 = "「那當然是會了」" 

# 【ニイロク】
# display as 二六
# JP: 「そうなんだ！」
# 1809 = "「這樣啊！」" 

# monologue
# JP: 嬉しい。嬉しい。にこにこしちゃう。\n清春のこと、照れさせちゃった！
2057 = "好高興、太高興了。我不由得微笑了起來。我竟然讓清春害羞了！" 

# 【赤井】
# display as 赤井
# JP: 「ああ――こほんっ」
1615 = "「是啊——咳咳」" 

# monologue
# JP: なでなで、乱暴にくしゃくしゃって。
1980 = "他一邊繼續摸著我的頭，一邊強行咳嗽了幾聲。" 

# monologue
# JP: 清春、かわいい。\n照れてるの、ごまかそうってしてる。
2181 = "清春好可愛。他這是在掩蓋自己的害羞吧。" 

# 【赤井】
# display as 赤井
# JP: 「……最初の話に戻りますが、\n民営・分社化は理想的な成功です」
1093 = "「……我們回到剛才的話題吧。能成功民營化、分公司經營當然是最理想的」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1481 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「ですが、交渉の余地なしと判断されれば潰される。\n冥国絡みの国策に、私達レベルでは抗えません」
1412 = "「可是，一旦對面判斷沒有交涉的餘地，我們就完了。畢竟這是攸關美國的國策，不是我們這些平民能夠抗衡的」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1481 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「私が絶対に譲れないものはニイロク――君です。\n君という、私が人生を注いだものの、結晶です」
1592 = "「我有一樣絕對不能放手的東西——二六，就是你。你是我傾注了整個人生的結晶」" 

# 【ニイロク】
# display as 二六
# JP: 「――うん」
1045 = "「——嗯」" 

# monologue
# JP: なでなでが、止まる。\n抱きしめられる。
2130 = "摸著我頭的手停下來了。取而代之的是一個擁抱。" 

# monologue
# JP: ぎゅって、ぎゅうって。強く。強く。\nでも苦しくない。もっとつよくって思っちゃう。
2193 = "清春用力地抱住了我。不過我卻一點也不覺得難受，甚至希望他更用力些。" 

# 【赤井】
# display as 赤井
# JP: 「最悪の場合でも、君さえ残ってくれるなら、\n帝鉄――いえ、鉄道復活の種火は、残り続ける」
1520 = "「就算是最壞的情況下，只要你能留下來，帝國鐵路——不，鐵路復活的火種就能保留下來」" 

# 【ニイロク】
# display as 二六
# JP: 「わかる。自分は、そうした機体。\n自分さえいれば、\x%lクハ26;#00ffc040;クハ26%l;#;だって編成ごと復元できる」
1595 = "「我知道。我就是這樣的機體。只要有我在，\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;的編組就能整個復原」" 

# 【赤井】
# display as 赤井
# JP: 「\x%lクハ26;#00ffc040;クハ26%l;#;は残したい。可能なら、粉蔵-[はかた,1]博太の路線も。\nそういう風に、成功にいくつかのレベルがあります」
1553 = "「我也想保下\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;。如果可以的話，小倉到博多的線路最好也能留下來。能保下多少東西，就算多少成功」" 

# 【ニイロク】
# display as 二六
# JP: 「わかった。と思う。この署名も、ゴネたのも。\n全部――成功のレベルをより高くするため」
1586 = "「我明白你是怎麼想的了。這份署名和你之前不配合的態度，都是為了儘可能多留下東西」" 

# 【赤井】
# display as 赤井
# JP: 「そのとおりです、ニイロク。\n……私は臆病もので、決して英雄にはなれない」
1578 = "「我就是這樣的人，二六。我很膽小，絕對無法成為英雄」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1481 = "「嗯」" 

# monologue
# JP: だから、自分は清春が好き。\n思って――どんどん、あったかくなる。満ちてくる。
2096 = "我就是喜歡上了這樣的清春。只要一想到他，心裡就熱熱的、滿滿的。" 

# monologue
# JP: （清春が好き。清春が好き。清春が好き。清春が好き）
2327 = "（好喜歡清春、好喜歡清春、好喜歡清春、好喜歡清春）" 

# monologue
# JP: ――少女マンガで読んだのと違う。\nドッキンってしない、あったかな好き。静かな好き。
2212 = "現在心裡的感覺和少女漫畫裡描寫的不太一樣，不是怦然心動，而是淡淡而溫暖的愛。" 

# monologue
# JP: だけど、わかる。\nもう、わかった。
2122 = "所以，我懂了，已經完全懂了。" 

# 【ニイロク】
# display as 二六
# JP: 「清春――自分は、清春が好き。\n清春に、きっと恋してる」
1659 = "「清春——我喜歡你。我一定是愛上你了」" 

# monologue
# JP: おなかの奥がキリキリってする。\n少し、じんじん痛くなる。
2086 = "感覺我腹部深處的絞痛擴散了開來。" 

# monologue
# JP: マンガと違う。マンガだと痛むのは胸。\nだけど、わかる。言葉にしたら、もっとわかる。
2290 = "這和漫畫裡的不一樣，漫畫裡說痛的是胸口。可是我已經懂了。說出口就更明白了。" 

# 【ニイロク】
# display as 二六
# JP: 「きっと、じゃない。\n自分は――清春に恋してる」
1335 = "「不，不是一定。我就是愛上了你」" 

# monologue
# JP: 他に、なんにも考えられない。\n清春とずっと一緒にいたい。清春のことを守りたい。
2097 = "我已經無法思考其他的事情了。腦海裡只想著要永遠陪伴他、守護他。" 

# monologue
# JP: 好き。好き。好き。好き。\n溢れてくるから、止められない。
2035 = "喜歡、喜歡、喜歡、喜歡。我對他的愛戀已經溢於言表。" 

# 【ニイロク】
# display as 二六
# JP: 「清春のことが。好き――大好き」
1574 = "「我喜歡你。喜歡——最喜歡了」" 

# 【赤井】
# display as 赤井
# JP: 「私は……ニイロク。臆病ものです」
1541 = "「我……二六，我是個膽小的人」" 

# 【ニイロク】
# display as 二六
# JP: 「知ってる。だから好き」
1598 = "「我知道。所以才喜歡」" 

# 【赤井】
# display as 赤井
# JP: 「君に対する愛情も、執着も、欲もあります。\nしかし私には、それが純粋な愛情なのかがもはや」
1576 = "「我對你的感情有愛，有執著，有欲望。可是，我已經不明白那是不是純粹的愛情了」" 

# 【ニイロク】
# display as 二六
# JP: 「自分の好きだって、\n純粋かどうかなんてわからない」
1552 = "「我也一樣，也不知道我的喜歡是不是純粹的啊」" 

# 【赤井】
# display as 赤井
# JP: 「！」
# 1451 = "「唔！」" 

# monologue
# JP: 難しいこと、たくさん教えてもらったから。\n思考にどんどん、冗長性が加わったから。
2304 = "都是因為清春教給了我很多複雜的知識，所以我的思考才越來越冗餘化了。" 

# monologue
# JP: 清春にして欲しいこと、たくさんあるし、\nそれが欲か、愛情かなんて、よくわからない。
2138 = "有好多想讓清春做的事。我也不明白這是出於欲望還是愛情了。" 

# 【ニイロク】
# display as 二六
# JP: 「だけど、好き。清春が好き。\n純粋じゃなくたって好き。いっぱい好き。大好き」
1366 = "「但是，我喜歡你。就算這份感情不純粹我也喜歡。就是喜歡，最喜歡了」" 

# 【赤井】
# display as 赤井
# JP: 「純粋じゃなくても――わからなくても」
1515 = "「就算不純粹，就算搞不懂——」" 

# 【ニイロク】
# display as 二六
# JP: 「あ」
# 1457 = "「啊」" 

# 【赤井】
# display as 赤井
# JP: 「確かに、ですね。\nたったひとつだけは、わかります」
1375 = "「你說的沒錯。我心裡只有一件事是最清楚的」" 

# monologue
# JP: ……うそ、すごい。\n全部、全然、少女マンガと違ったのに。
1037 = "……騙人，這是怎麼回事。明明一切發展都和少女漫畫不同。" 

# monologue
# JP: ここから先だけ、絶対おんなじ。\nわかる。こんなの、間違えっこない。
1986 = "但我明白了，絕對不會弄錯，我們一定會和少女漫畫走向同一個結局。" 

# 【赤井】
# display as 赤井
# JP: 「ニイロク。私も――君が好きです」
1356 = "「二六，我也喜歡你」" 

# monologue
# JP: 清春の顔、近づいてくる。\n無精髭、生えてる。肌、ちょっと荒れてる。
2196 = "清春的臉越來越近了。他臉上還留著邋遢鬍子，皮膚有些粗糙。" 

# monologue
# JP: それで、唇――唇、くちびるっ！
2227 = "而且，嘴唇——嘴唇！" 

# 【ニイロク】
# display as 二六
# JP: 「！！！」
1452 = "「唔！！！」" 

# monologue
# JP: キス。ちゅって。\n一回だけ、すごく短く。
2249 = "被他親了。雖然只是短短碰了一下。" 

# monologue
# JP: だから――だから。\n短すぎて、わからなくて、知りたくなる。
2288 = "這下太快了，根本沒什麼感覺，所以我好想再多嘗試一下。" 

# 【ニイロク】
# display as 二六
# JP: 「味、わからない。今のだと。\nだから、清春――もし、よかったら、もう一回」
1393 = "「剛剛太快了，還不知道是什麼味道呢。所以，可不可以再來一次」" 

# monologue
# JP: 清春が、笑う。\nくすって優しく。
2201 = "清春輕輕地、溫柔地笑了。" 

# monologue
# JP: だからおねだり、素直にできる。
2217 = "看到他這副表情，我就知道我可以盡情向他撒嬌了。" 

# 【ニイロク】
# display as 二六
# JP: 「キスの時間。\nもう少しだけ――長くして？」
1810 = "「這次再親久一點吧？」" 
