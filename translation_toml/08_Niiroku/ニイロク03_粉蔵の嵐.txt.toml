2092 = "我可是最新型、最高性能的鐵路人偶。是清春培養的最高傑作。" 

# 【ニイロク】
# display as 二六
# JP: 「清春。署名、これでいい？」
1683 = "「清春，收到的署名就這些，夠了嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「ああ――いや、これは素晴らしいですね、ニイロク。\n百を超えてるじゃないですか」
1480 = "「嗯——哎呀，這可真是厲害。都超過一百了」" 

# 【ニイロク】
# display as 二六
