# lines: 368 
# 【ニイロク】
# display as 二六
# JP: 「えへ……えへへへ……」
1485 = "「E he...... e hehehe......」"

# monologue
# JP: 清春の手、おっきい、あったかい。
2194 = "Bàn tay của Kiyoharu, thật to, thật ấm áp."

# monologue
# JP: ふわふわする、キュンキュンする。\nふたりっきりって、すごくしあわせ。
2213 = "Cảm giác lâng lâng, tim đập thình thịch.\nChỉ có hai người ở bên nhau, thật sự rất\nhạnh phúc."

# 【技工Ａ】
# display as ？？？
# JP: 「冗談じゃなかとよ！！」
1839 = "「Không phải chuyện đùa đâu!!」"

# 【技工Ｂ】
# display as ？？？
# JP: 「電車区長ばどこばい！　話ば聞かんと！！」
1847 = "「Đoạn trưởng xe điện đâu rồi! Phải hỏi cho\nra nhẽ!!」"

# 【ニイロク】
# display as 二六
# JP: 「ふきゅっ！！？」
1429 = "「Fu kyu!!?」"

# 【ニイロク】
# display as 二六
# JP: 「え？　なに――なに？　清春、どこ――\n夢！！？」
1440 = "「Ơ? Gì――gì vậy? Kiyoharu, ở đâu――\nLà giấc mơ!!?」"

# monologue
# JP: ――あ、ううん！　大丈夫。
1013 = "――A, không! Không sao."

# monologue
# JP: ちゃんとある。\n清春のおうち、赤井阿曽神社のお守り札。
2183 = "Vẫn còn đó.\nNhà của Kiyoharu, bùa hộ mệnh của Đền Akai\nAso."

# 【ニイロク】
# display as 二六
# JP: 「よかった。夢じゃなかった」
1493 = "「May quá. Không phải là mơ.」"

# monologue
# JP: 清春のおうちにいって、お風呂にはいって。\nそうしたら自分、ぼーっとしちゃって――
2118 = "Mình đã đến nhà Kiyoharu, đi tắm.\nSau đó, mình bị choáng váng――"

# 【ニイロク】
# display as 二六
# JP: 「あれが。のぼせる？　なの？\nわからない。あとでシロおねえちゃんに聞いてみる」
1396 = "「Đó là. Choáng vì ngâm nước nóng? Sao?\nKhông hiểu nữa. Lát nữa phải hỏi chị Shiro\nxem sao.」"

# monologue
# JP: けど、状況を見ればそうなんだとしか思えない。\n清春が、連れ帰ってきて寝かせてくれたんだって。
2028 = "Nhưng nhìn vào tình hình hiện tại thì chỉ\ncó thể nghĩ như vậy thôi.\nKiyoharu đã đưa mình về và đặt mình nằm\nngủ."

# monologue
# JP: 服……きっと清春が着せてくれたんだ。\nちょっと不格好。だけど、うれしい――ううん！
2295 = "Quần áo...... chắc chắn là Kiyoharu đã mặc\ncho mình rồi.\nHơi xộc xệch một chút. Nhưng mà, mình thấy\nvui――không!"

# 【ニイロク】
# display as 二六
# JP: 「嬉しくない！　違う！　嬉しいけどもったいない！\n清春と、ずっともっとおしゃべりできるチャンス」
1547 = "「Không vui! Không phải! Vui thì có vui\nnhưng mà phí quá!\nRõ ràng là cơ hội để được nói chuyện nhiều\nhơn với Kiyoharu mà.」"

# 【後東】
# display as ？？？
# JP: 「え？　赤井んとこスか？\nはい？　その前に合流？　――あい、わかったッス」
1438 = "「Hả? Chỗ của Akai á?\nVâng? Tập hợp trước khi đến đó sao?\n――Vâng, tôi hiểu rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「！？」
1436 = "「!?」"

# monologue
# JP: （バタバタバタ）
2323 = "（Lạch cạch lạch cạch lạch cạch）"

# monologue
# JP: 大きな声。足音。\nそうだ、自分――きっと、それで起こされたんだ。
2113 = "Giọng nói lớn. Tiếng bước chân.\nĐúng rồi, mình――chắc chắn đã bị đánh thức\nbởi những âm thanh đó."

# monologue
# JP: なにかあったのかも。\nシロおねえちゃんに聞いてみようっと。
2262 = "Có lẽ đã xảy ra chuyện gì đó.\nThử hỏi chị Shiro xem sao."

# 【ニイロク】
# display as 二六
# JP: 「ね？　シロおねえちゃん」
1474 = "「Này? Chị Shiro.」"

# 【シロ】
# display as 四六
# JP: 「ニイロク！！　よかった！　起きたのねっ！」
1346 = "「Niiroku!! May quá! Em dậy rồi à!」"

# 【ニイロク】
# display as 二六
# JP: 「え？　なに」
1450 = "「Hả? Gì cơ.」"

# monologue
# JP: すごい勢い。どどどって流れ込んでくる。\nシロおねえちゃん――焦ってる。
2040 = "Sự dồn dập đáng kinh ngạc. Tràn vào như\nthác đổ.\nChị Shiro――đang hoảng hốt."

# 【シロ】
# display as 四六
# JP: 「詳しい話はあと。とにかく一番安全な――\nそう、赤井運転士。赤井さんの所にいきなさい！」
1318 = "「Chuyện chi tiết để sau. Tóm lại hãy đến\nnơi an toàn nhất――\nĐúng rồi, lái tàu Akai. Hãy đến chỗ của\nanh Akai đi!」"

# 【ニイロク】
# display as 二六
# JP: 「どういうこと？　何があったの？？」
1533 = "「Là sao? Đã có chuyện gì xảy ra vậy??」"

# 【シロ】
# display as 四六
# JP: 「いい？　とにかく赤井さんのとこ。\n流されちゃうから共感切って！　急ぐのよ！」
1734 = "「Nghe này? Tóm lại cứ đến chỗ anh Akai đi.\nSẽ bị cuốn theo mất nên hãy ngắt cộng cảm\nngay! Nhanh lên!」"

# 【ニイロク】
# display as 二六
# JP: 「待って！　シロおねえちゃん！\n――シロおねえちゃん？？」
1724 = "「Đợi đã! Chị Shiro!\n――Chị Shiro??」"

# monologue
# JP: 共感、いきなり切れちゃった。
2004 = "Cộng cảm, đột nhiên bị ngắt rồi."

# monologue
# JP: ……つながらない。\nチャンネル、もっと広げ――っ！！！？
1036 = "......Không kết nối được.\nMở rộng kênh tần số hơn nữa――!!!?"

# monologue
# JP: （解体なんてされたくない！　いやだ！　逃げたい）
2328 = "（Tôi không muốn bị tháo dỡ đâu! Không\nmuốn! Tôi muốn trốn chạy）"

# monologue
# JP: （どうしてこんな――一生懸命頑張ってるのに）
2333 = "（Tại sao lại thành ra thế này――tôi đã cố\ngắng hết sức rồi mà）"

# 【ニイロク】
# display as 二六
# JP: 「ひっ！！？」
1425 = "「Hí!!?」"

# monologue
# JP: 渦まいて、凄く、たくさん――一斉に――\n怒ってる、泣いて、戸惑って――っ！！？
2083 = "Cuộn xoáy, rất nhiều, vô số――cùng một\nlúc――\nTức giận, khóc lóc, hoang mang――!!?"

# monologue
# JP: （助けて。助けて。助けて――助けてっ！！！）
2331 = "（Cứu tôi với. Cứu tôi với. Cứu tôi\nvới――Cứu tôi với!!!）"

# 【ニイロク】
# display as 二六
# JP: 「やっ！！！」
1334 = "「Không!!!」"

# monologue
# JP: 無理やり共感を断ち切って――\nそしたら、ゆっくり、怖くなる。
2090 = "Ép buộc bản thân cắt đứt cộng cảm――\nSau đó, nỗi sợ hãi từ từ ập đến."

# monologue
# JP: 今のが――きっと、パニックっていうやつ。\nシロおねえちゃんが焦ってた意味を、わからされた。
2019 = "Cảm giác vừa rồi――chắc chắn là thứ gọi là\nhoảng loạn.\nTôi đã hiểu được lý do tại sao chị Shiro\nlại vội vàng đến thế."

# 【ニイロク】
# display as 二六
# JP: 「狂っちゃう。\n……あんなの、ずっと受け取ってたら」
1744 = "「Phát điên mất thôi.\n......Nếu cứ tiếp tục tiếp nhận những thứ\nnhư vậy.」"

# monologue
# JP: 気持ち悪い。イヤだ。怖い。\nなにがあったか、わからない。
2052 = "Khó chịu quá. Không muốn đâu. Sợ quá.\nKhông biết đã xảy ra chuyện gì nữa."

# monologue
# JP: どうしていいかも――\nううん、どうしていいかなら、わかる！
1964 = "Không biết phải làm sao――\nKhông, nếu hỏi phải làm sao thì, mình\nbiết!"

# 【ニイロク】
# display as 二六
# JP: 「清春」
1667 = "「Kiyoharu.」"

# monologue
# JP: シロおねえちゃん、教えてくれた。\n清春のとこが、一番安全なとこだって。
2037 = "Chị Shiro, đã bảo rồi.\nChỗ của Kiyoharu, là nơi an toàn nhất."

# 【ニイロク】
# display as 二六
# JP: 「清春。清春」
1662 = "「Kiyoharu. Kiyoharu.」"

# monologue
# JP: だから、行く。\n教わらなくても、絶対行ってた。
2116 = "Vì vậy, phải đi thôi.\nDù không được bảo, mình cũng nhất định sẽ\nđi."

# monologue
# JP: 清春だったら、どんなことが起きてたって――\nこのパニックから、自分を守ってくれるから。
2209 = "Nếu là Kiyoharu, dù có chuyện gì xảy ra đi\nchăng nữa――\nanh ấy cũng sẽ bảo vệ mình khỏi sự hoảng\nloạn này."

# 【ニイロク】
# display as 二六
# JP: 「きよは」
1657 = "「Kiyoha」"

# 【赤井】
# display as 赤井
# JP: 「ニイロク！　良かった！　早く入って！」
1354 = "「Niiroku! May quá! Mau vào trong đi!」"

# 【ニイロク】
# display as 二六
# JP: 「わっ！？」
1448 = "「Oa!?」"

# monologue
# JP: ぐいって、清春に引っ張り込まれる。\n――抱きしめられてる。
2198 = "Bị Kiyoharu kéo mạnh vào trong.\n――Đang được ôm chặt."

# monologue
# JP: 嬉しい。嬉しい。嬉しい。嬉しい！\n回路、すっごくギュンギュンしてる！
2058 = "Vui quá. Vui quá. Vui quá. Vui quá!\nMạch điện, đang hoạt động hết công suất!"

# 【赤井】
# display as 赤井
# JP: 「無事ですね！？　本当に良かった、\nいま向かおうとしていたところです」
1371 = "「Cô không sao chứ!? Thật may quá,\ntôi vừa định đi tìm cô đấy.」"

# 【ニイロク】
# display as 二六
# JP: 「無事？」
1542 = "「Không sao?」"

# 【赤井】
# display as 赤井
# JP: 「ええ、ニイロクは帝鉄再生の象徴――\nこの状況では、真っ先に槍玉にあげられかねない」
1622 = "「Đúng vậy, Niiroku là biểu tượng cho sự\ntái sinh của Đường sắt Hoàng gia――\nTrong tình huống này, cô rất có thể sẽ trở\nthành mục tiêu công kích đầu tiên.」"

# 【ニイロク】
# display as 二六
# JP: 「槍玉って」
1707 = "「Mục tiêu công kích á」"

# 【赤井】
# display as 赤井
# JP: 「もちろん、普段はみんな、気持ちのよい連中です。\nが――人間は、一度パニックに陥ってしまうと」
1840 = "「Tất nhiên, bình thường mọi người đều là\nnhững người tốt.\nNhưng――con người, một khi đã rơi vào trạng\nthái hoảng loạn thì」"

# 【ニイロク】
# display as 二六
# JP: 「あ！」
1458 = "「A!」"

# monologue
# JP: そうだ、パニック。\nおねえちゃんたち、みんな泣いてた――叫んでた。
2066 = "Đúng rồi, hoảng loạn.\nCác chị, tất cả đều đang khóc――đang la\nhét."

# 【ニイロク】
# display as 二六
# JP: 「それ！　ね、なんなの、清春！\nなにがあったの？」
1506 = "「Là chuyện đó! Này, rốt cuộc là sao vậy,\nKiyoharu!\nĐã có chuyện gì xảy ra?」"

# 【赤井】
# display as 赤井
# JP: 「！？　まだ知らないのですか？」
1466 = "「!? Cô vẫn chưa biết sao?」"

# 【ニイロク】
# display as 二六
# JP: 「知らない。なんだかおっきい音がして、起きて。\n起きたらすぐシロおねえちゃんが、ここに行けって」
1332 = "「Không biết. Tự nhiên nghe thấy tiếng động\nlớn, rồi tỉnh dậy.\nVừa tỉnh dậy thì chị Shiro đã bảo tôi đến\nđây ngay.」"

# 【赤井】
# display as 赤井
# JP: 「そうでしたか――\nええと、何から説明すればいいのか」
1628 = "「Ra là vậy――\nỪm, tôi nên bắt đầu giải thích từ đâu\nđây.」"

# 【先輩】
# display as ？？？
# JP: 「赤井君！　赤井君！」
1782 = "「Cậu Akai! Cậu Akai!」"

# 【後東】
# display as ？？？
# JP: 「赤井！　いるだろ！？」
1781 = "「Akai! Có ở đó không!?」"

# 【赤井】
# display as 赤井
# JP: 「！　少しの間、ここに隠れていてください。\nいいですか？　声も出してはいけません」
1460 = "「! Hãy trốn ở đây một lát nhé.\nĐược chứ? Tuyệt đối không được lên tiếng\nđâu.」"

# 【ニイロク】
# display as 二六
# JP: 「！！？」
1463 = "「!!?」"

# monologue
# JP: 入れられた――隠されたのは、押入れの中。\nちょっとだけ隙間……これ、閉じた方がいいのかな？
2115 = "Bị đẩy vào――bị giấu đi, là ở bên trong tủ\nâm tường.\nChỉ có một khe hở nhỏ...... cái này, có\nnên đóng lại không nhỉ?"

# 【先輩】
# display as ？？？
# JP: 「赤井君！」
1780 = "「Cậu Akai!」"

# 【赤井】
# display as 赤井
# JP: 「はい、今」
1491 = "「Vâng, tôi ra ngay.」"

# monologue
# JP: 入ってきたの、知ってる顔。気動車試験運転士の人。\n清春の――赤井運転士の、先輩の人。
2296 = "Người bước vào, là một gương mặt quen\nthuộc. Lái tàu thử nghiệm toa xe tự hành.\nTiền bối của Kiyoharu――của lái tàu Akai."

# monologue
# JP: 他にも技工さんたちと――運転士さん、かな？
2298 = "Còn có cả các thợ máy――và lái tàu nữa,\nchắc vậy?"

# 【先輩】
# display as 前輩
# JP: 「こいば読んだとっ！？」
1374 = "「Cậu đọc cái này chưa!?」"

# 【赤井】
# display as 赤井
# JP: 「はい、読みました。まさかこれほど早く、\nこれほど極端な動きになるとは」
1709 = "「Vâng, tôi đọc rồi. Không ngờ lại nhanh\nđến vậy,\nhành động cực đoan đến thế này.」"

# monologue
# JP: なに、あれ？　新聞？\nなんか、大きく列車の写真が乗ってるけど――
2302 = "Cái gì kia? Báo à?\nHình như, có in hình một đoàn tàu rất\nlớn――"

# 【技工Ａ】
# display as 技工Ａ
# JP: 「『帝鉄解体。全路線を廃線・道路化』！\n『エアクラ・バス社誕生へ』」
1057 = "「'Giải thể Đường sắt Hoàng gia. Bãi bỏ\ntoàn bộ tuyến đường - Chuyển đổi thành\nđường bộ'!\n'Hướng tới sự ra đời của công ty Xe buýt\nAircra'」"

# 【ニイロク】
# display as 二六
# JP: 「！！？」
1435 = "「!!?」"

# 【後東】
# display as 司機Ａ
# JP: 「こんなバカな話ねぇよな！？\n上は何考えてんだよ！！！」
1534 = "「Chuyện ngu ngốc này là sao chứ!?\nMấy lão cấp trên đang nghĩ cái quái gì\nvậy!!!」"

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「電車区長ば逃げまわっとるみたいで――\n赤井さん、あんた、なんか知りませんかね」
1846 = "「Đoạn trưởng xe điện có vẻ đang lẩn trốn――\nAkai, cậu, có biết gì không?」"

# monologue
# JP: 帝鉄解体？\n全路線廃止？
2261 = "Giải thể Đường sắt Hoàng gia?\nBãi bỏ toàn bộ tuyến đường?"

# monologue
# JP: ――ウソ、だって、そんなの――\nだって、自分は、まだ本線にも出てないのに――
1017 = "――Nói dối, bởi vì, chuyện đó――\nBởi vì, mình, vẫn còn chưa được ra tuyến\nchính mà――"

# 【赤井】
# display as 赤井
# JP: 「……電車区長を捕まえて、\nみなさんはどうされるおつもりですか？」
1097 = "「......Bắt được Đoạn trưởng xe điện rồi,\nmọi người định sẽ làm gì?」"

# 【後東】
# display as 司機Ａ
# JP: 「決まってらァ！　このバカげた決定の撤回を！」
1735 = "「Còn phải hỏi sao! Yêu cầu rút lại quyết\nđịnh ngu xuẩn này!」"

# 【赤井】
# display as 赤井
# JP: 「――区長は、確かに粉蔵の最高責任者です。\nしかし、粉蔵の最高責任者でしかありませんよ？」
1048 = "「――Đoạn trưởng, đúng là người chịu trách\nnhiệm cao nhất của Kokura.\nNhưng, ông ấy cũng chỉ là người chịu trách\nnhiệm cao nhất của Kokura mà thôi?」"

# 【後東】
# display as 司機Ａ
# JP: 「っ！！！」
1812 = "「!!!」"

# monologue
# JP: ――清春の声。落ち着いてる。\n聞いたら、自分もすこし落ち着く。
1016 = "――Giọng của Kiyoharu. Thật bình tĩnh.\nNghe thấy vậy, mình cũng bình tĩnh lại một\nchút."

# monologue
# JP: “決定”って――もし、帝鉄の解体決定が本当なら。\nそんなこと出来るのって――
2226 = "「Đây là quyết định của chính phủ.\nKhông phải là thứ mà một Đoạn trưởng xe\nđiện có thể lật ngược được đâu.」"

# 【先輩】
# display as 前輩
# JP: 「こらぁ政府の決定ぞ。\n一電車区長が覆せるもんじゃなか」
1807 = "「Chuyện đó thì có lẽ là vậy, nhưng mà」"

# 【技工Ａ】
# display as 技工Ａ
# JP: 「そいばそうかもしれんばってん」
1752 = "「Thế tóm lại tiền bối đứng về phe nào\nvậy!」"

# 【後東】
# display as 司機Ａ
# JP: 「って、どっちの味方なんスか、先輩は！」
1391 = "「Dù không lật ngược được quyết định, thì\nông ta cũng phải làm người trung gian chứ!\nThế nên, phải bắt ông ta tập hợp ý kiến\ncủa chúng ta lại.」"

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「決定ば覆せんでも、窓口にゃなるでしょーよ！\nやけん、ワシらん意見ばまとめてもらって」
1518 = "「Chà, là chuyện đó đấy.\nVì muốn bàn bạc chuyện đó, nên tôi mới dẫn\nmọi người đến chỗ cậu Akai.」"

# 【先輩】
# display as 前輩
# JP: 「さて、そこじゃ。\nそこを話し合いとーて、赤井君とこ連れてきた」
1630 = "「Chà, là chuyện đó đấy.\nVì muốn bàn bạc chuyện đó, nên tôi mới dẫn\nmọi người đến chỗ cậu Akai.」"

# monologue
# JP: 先輩の人が、連れの三人が座り込む。
2009 = "Tiền bối, cùng ba người đi theo ngồi phịch\nxuống."

# monologue
# JP: 清春は何も言わない。\nお茶も出さない。
2176 = "Kiyoharu không nói gì.\nCũng không rót trà."

# 【先輩】
# display as 前輩
# JP: 「……ワシと赤井君ば、こぎゃんなったときんこと、\n随分前から話おうとった」
1079 = "「......Tôi và cậu Akai, đã bàn bạc về\nchuyện khi tình huống này xảy ra,\ntừ rất lâu rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「！！？」
# 1435 = "「咦！！？」" 

# 【赤井】
# display as 赤井
# JP: 「最悪の場合こうなることは容易に予想できました。\nそのとき、どうするのが最善かを考えていました」
1706 = "「Rất dễ để dự đoán rằng trong trường hợp\nxấu nhất mọi chuyện sẽ thành ra thế này.\nLúc đó, chúng tôi đã suy nghĩ xem làm thế\nnào mới là tốt nhất.」"

# monologue
# JP: 清春の声。目の前にいる四人にじゃなく――\n自分に話しかけてくれている。
2204 = "Giọng của Kiyoharu. Không phải nói với bốn\nngười trước mặt――\nMà là đang nói với mình."

# monologue
# JP: そう感じるから、もっと落ち着く。\nとにかく聞こうって、集中できる。
2101 = "Cảm nhận được điều đó, mình càng bình tĩnh\nhơn.\nTóm lại cứ lắng nghe đã, mình có thể tập\ntrung rồi."

# 【技工Ａ】
# display as 技工Ａ
# JP: 「最善ば、そりゃ帝鉄解体を撤回させて」
1634 = "「Tốt nhất thì, tất nhiên là bắt họ rút lại\nquyết định giải thể Đường sắt Hoàng gia\nrồi.」"

# 【後東】
# display as 司機Ａ
# JP: 「だよな！\n電化が進んで、\x%l電車;#00ffc040;電車%l;#;が走り回るようになりゃ」
1513 = "「Đúng vậy!\nĐiện khí hóa được đẩy mạnh, \\x%l電車;#00ffc040;tàu điện%l;#; chạy\nkhắp nơi thì」"

# 【先輩】
# display as 前輩
# JP: 「\x%l電車;#00ffc040;電車%l;#;ばどんどん走らせて――そいでいくら儲ければ、\n地方路線の赤字を全部埋められっとか」
1826 = "「Cứ cho \\x%l電車;#00ffc040;tàu điện%l;#; chạy ầm ầm――rồi kiếm được\nbao nhiêu lợi nhuận,\nthì mới bù đắp được hết số thâm hụt của\ncác tuyến đường địa phương chứ.」"

# 【後東】
# display as 司機Ａ
# JP: 「いや、そんなこと俺らに聞かれても――」
1802 = "「Không, anh hỏi chúng tôi chuyện đó thì――」"

# monologue
# JP: 先輩さんの一言に、三人はそろって黙りこむ。
2232 = "Trước câu nói của tiền bối, cả ba người\nđồng loạt im bặt."

# monologue
# JP: 自分は、知ってる。\n清春ももちろん、知っている。
2108 = "Mình, biết điều đó.\nKiyoharu tất nhiên, cũng biết."

# 【赤井】
# display as 赤井
# JP: 「……帝鉄の昨年の単年度赤字額は8300億円強。\n[るいせきさいむ,3]累積債務は実に37兆円に及んでいます」
1086 = "「......Mức thâm hụt trong một năm vừa qua\ncủa Đường sắt Hoàng gia là hơn 830 tỷ yên.\nKhoản nợ lũy kế thực tế đã lên tới 37\nnghìn tỷ yên.」"

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「37兆っ！！？」
1857 = "「37 nghìn tỷ!!?」"

# 【技工Ａ】
# display as 技工Ａ
# JP: 「エアクラ普及の影響ば――そこまで鉄道を」
1833 = "「Ảnh hưởng của việc phổ cập Aircra――đã đẩy\nđường sắt đến mức đó sao.」"

# 【先輩】
# display as 前輩
# JP: 「もっと前から。ディーゼルエンジンのトラックが、\n物流の主役に躍り出て以降、ずっとの話ばい」
1341 = "「Từ trước đó nữa cơ. Kể từ khi xe tải động\ncơ diesel\nvươn lên trở thành phương tiện vận chuyển\nhàng hóa chủ lực, thì chuyện này đã diễn\nra rồi.」"

# monologue
# JP: 知ってる。シロおねえちゃんがグチってたから。\n貨物シェアをトラックに奪われ、帝鉄貨物を分離して。
2112 = "Mình biết. Vì chị Shiro từng than vãn rồi.\nThị phần hàng hóa bị xe tải cướp mất, Vận\ntải hàng hóa Đường sắt Hoàng gia bị tách\nriêng."

# monologue
# JP: その判断が、赤字解消につながるどころか、\n完全な裏目に出ちゃったんだってって。
2223 = "Quyết định đó, chẳng những không giúp giải\nquyết thâm hụt,\nmà còn hoàn toàn phản tác dụng."

# 【後東】
# display as 司機Ａ
# JP: 「そんな昔っからの赤字……ここまで積んじまったら、\n返しようがねぇじゃねぇスか」
1529 = "「Khoản thâm hụt từ thời xa xưa như\nvậy...... tích tụ đến mức này rồi,\nthì làm sao mà trả nổi chứ.」"

# 【赤井】
# display as 赤井
# JP: 「ですので、私達は話し合っていました。\n帝鉄は発展的に、民営化し分社化すべきと」
1601 = "「Vì vậy, chúng tôi đã bàn bạc với nhau.\nĐường sắt Hoàng gia nên phát triển theo\nhướng tư nhân hóa và chia tách thành các\ncông ty con.」"

# 【後東】
# display as 司機Ａ
# JP: 「ミンエイカ――って、どういうことだよ？」
1644 = "「Tư nhân hóa――là ý gì vậy?」"

# 【先輩】
# display as 前輩
# JP: 「帝鉄ば一度潰して、バラバラにするいうこったい。\nそぎゃんした上で、新しい会社ば作る」
1508 = "「Tức là giải thể Đường sắt Hoàng gia một\nlần, rồi chia nhỏ nó ra.\nSau khi làm vậy, sẽ thành lập các công ty\nmới.」"

# 【後東】
# display as 司機Ａ
# JP: 「なっ！？」
1363 = "「Cái gì!?」"

# 【技工Ａ】
# display as 技工Ａ
# JP: 「潰すて！」
1749 = "「Giải thể á!」"

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「鉄道ば、見捨てるいうことですか！」
1808 = "「Tức là, vứt bỏ đường sắt sao!」"

# monologue
# JP: 三人の腰が浮き上がる。\n怖い。目が、血走ってるみたい。
2300 = "Ba người nhỏm dậy.\nĐáng sợ quá. Mắt họ, như hằn lên những tia\nmáu."

# monologue
# JP: けど清春は慌ててない。\n先輩さんも、落ち着けって顔で三人を見る。
2026 = "Nhưng Kiyoharu không hề hoảng hốt.\nTiền bối cũng nhìn ba người với vẻ mặt bảo\nhọ hãy bình tĩnh."

# 【赤井】
# display as 赤井
# JP: 「精算されれば譲渡を受け、もしくは買受できます。\n『我々に必要なだけの線区と車輌』とを」
1762 = "「Nếu được thanh lý, chúng ta có thể nhận\nchuyển nhượng, hoặc mua lại.\n'Chỉ những khu vực tuyến đường và toa xe\nmà chúng ta cần'.」"

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「あ――ああ！」
1456 = "「A――aa!」"

# 【後東】
# display as 司機Ａ
# JP: 「いったん潰せば儲かんねぇとこ切り捨てて、\n儲かるとこだけを切り取って買えるってことか！」
1369 = "「Nếu giải thể một lần, chúng ta có thể cắt\nbỏ những chỗ không sinh lời,\nvà chỉ mua lại những chỗ sinh lời thôi\nsao!」"

# 【技工Ａ】
# display as 技工Ａ
# JP: 「よか話ばい！　そぎゃんとできたら、\n粉蔵ば生き残れっとよ！」
1816 = "「Chuyện tốt đấy! Nếu làm được như vậy,\nKokura sẽ sống sót!」"

# 【先輩】
# display as 前輩
# JP: 「ま、そういうことばい。\n出来るかどうかは、全く別ん話じゃけんど」
1484 = "「Chà, là như vậy đấy.\nCòn có làm được hay không, lại là một\nchuyện hoàn toàn khác.」"

# 【赤井】
# display as 赤井
# JP: 「……帝鉄が主導となれば、容易に出来た話です。\n鉄道存続の為、当然、そうすると思っていました」
1084 = "「......Nếu Đường sắt Hoàng gia đứng ra chủ\nđạo, thì chuyện này rất dễ dàng.\nVì sự tồn tại của đường sắt, tôi cứ nghĩ\nđương nhiên họ sẽ làm như vậy.」"

# 【先輩】
# display as 前輩
# JP: 「うむ」
1481 = "「Ừm.」"

# monologue
# JP: 先輩の人が黙りこむ。\nみんな、じいっと清春を見る。
2010 = "Tiền bối im lặng.\nMọi người, chăm chú nhìn Kiyoharu."

# monologue
# JP: 清春の顔、すごくつらそう。\n“責任”って――言ってたときの顔になってる。
2199 = "Khuôn mặt Kiyoharu, trông rất đau khổ.\nKhuôn mặt giống như lúc anh ấy nói về\n'trách nhiệm'――."

# 【赤井】
# display as 赤井
# JP: 「……しかし帝鉄はそう出来なかった。\n恐らく、国か[めいこく,1]冥国かに、そうさせてもらえなかった」
1081 = "「......Nhưng Đường sắt Hoàng gia đã không\nthể làm như vậy.\nCó lẽ, chính phủ hoặc là Meikoku, đã không\ncho phép họ làm điều đó.」"

# 【技工Ａ】
# display as 技工Ａ
# JP: 「出来る出来んは関係なかとよ！\nやるか、やらんかの話ばいっ！！」
1803 = "「Làm được hay không làm được không quan\ntrọng!\nVấn đề là có làm hay không!!」"

# 【ニイロク】
# display as 二六
# JP: 「！？」
1464 = "「!?」"

# 【後東】
# display as 司機Ａ
# JP: 「そッスよね！　帝鉄解体が避けられないってんなら\nやるしかねッスよ！！」
1510 = "「Đúng vậy! Nếu việc giải thể Đường sắt\nHoàng gia là không thể tránh khỏi\nthì chỉ còn cách làm thôi!!」"

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「赤井さんならできよーばい！　帝鉄の希望、\n\x%lクハ26;#00ffc040;クハ26%l;#;系ば任される試験運転士やけん！！」
1768 = "「Nếu là anh Akai thì chắc chắn làm được!\nAnh là niềm hy vọng của Đường sắt Hoàng\ngia,\nlà lái tàu thử nghiệm được giao phó dòng \\x%lクハ26;#00ffc040;Kuha 26%l;#;\nmà!!」"

# monologue
# JP: 理解、不能。\n原因を究明出来ないままで、解決できるはずがない。
2107 = "Không thể, lý giải nổi.\nKhi chưa tìm ra nguyên nhân, thì làm sao\ncó thể giải quyết được chứ."

# monologue
# JP: なのに、どうしてこの人たちは――
2022 = "Vậy mà, tại sao những người này lại――"

# 【ニイロク】
# display as 二六
# JP: 「あ」
1457 = "「A.」"

# monologue
# JP: わかった。清春が自分を隠れさせてくれた理由が。\nパニックになるというのが、どういうことか。
2104 = "Mình hiểu rồi. Lý do Kiyoharu giấu mình\nđi.\nHoảng loạn, rốt cuộc là như thế nào."

# monologue
# JP: （自分の判断を停止して、怒りのぶつけ所を――\nでなければ救いを、誰かに求めるようになるんだ）
2340 = "（Ngừng đưa ra phán đoán của bản thân, và\ntìm một nơi để trút giận――\nNếu không thì, sẽ tìm kiếm sự cứu rỗi từ\nmột ai đó）"

# monologue
# JP: そして自分は、\x%lクハ26;#00ffc040;クハ26%l;#;統括制御レイルロオドだから。\n帝鉄復活の希望の象徴、そのものだから。
2228 = "Và bởi vì mình, là Railord điều khiển tổng\nhợp \\x%lクハ26;#00ffc040;Kuha 26%l;#;.\nChính là biểu tượng hy vọng cho sự phục\nsinh của Đường sắt Hoàng gia."

# monologue
# JP: （だから――“槍玉”）
2330 = "（Nên mới trở thành――'Mục tiêu công kích'）"

# 【先輩】
# display as 前輩
# JP: 「赤井君。こん連中ば、ここへ連れてきたんは、\nそぎゃん[わけ,1]理由たい」
1784 = "「Cậu Akai. Lý do tôi đưa bọn họ đến đây,\nlà vì chuyện đó đấy.」"

# 【赤井】
# display as 赤井
# JP: 「…………」
1059 = "「............」"

# 【先輩】
# display as 前輩
# JP: 「分割民営化。誰かが旗ぁ振って運動ば一本化せねば、\nなるものもなせんようになるけんの」
1386 = "「Chia tách tư nhân hóa. Nếu không có ai\nphất cờ khởi xướng và thống nhất phong\ntrào,\nthì chuyện có thể thành cũng sẽ hóa hư\nkhông thôi.」"

# 【赤井】
# display as 赤井
# JP: 「それは、私には向いていません。\n私は、その責任に耐えられる強さがありません」
1548 = "「Việc đó, không hợp với tôi.\nTôi không đủ mạnh mẽ để gánh vác trách\nnhiệm đó.」"

# monologue
# JP: 責任。やっぱり、清春そう思ってる。\nそこのところで、苦しんでる。
2268 = "Trách nhiệm. Quả nhiên, Kiyoharu đang nghĩ\nnhư vậy.\nAnh ấy đang đau khổ vì điều đó."

# monologue
# JP: 清春のこと、ちゃんとわかった。\nこんな状況なのにそこだけ、ぽわって嬉しい。
2106 = "Mình đã thực sự hiểu về Kiyoharu.\nDù trong hoàn cảnh này, chỉ riêng điều đó\nthôi cũng khiến mình thấy vui lây."

# 【先輩】
# display as 前輩
# JP: 「そこばワシらがフォローするけん、引き受けてくれ。\n[こくら,1]粉蔵を――ここん鉄道ば残すため、旗ぁ振ってくれ」
1567 = "「Chuyện đó chúng tôi sẽ hỗ trợ, cậu hãy\nnhận lời đi.\nVì Kokura――vì muốn giữ lại tuyến đường sắt\nở đây, hãy phất cờ khởi xướng đi.」"

# 【赤井】
# display as 赤井
# JP: 「いえ――先輩が先頭に立ってください。\n私は、全力でその補佐を行いますから」
1323 = "「Không――tiền bối hãy đứng ra dẫn đầu đi.\nTôi sẽ dốc toàn lực hỗ trợ anh.」"

# 【先輩】
# display as 前輩
# JP: 「できたらやっとる。が、ワシは[ていろう,1]帝労の幹部。\n経営側とは水と油ぞ」
1444 = "「Nếu làm được thì tôi đã làm rồi. Nhưng,\ntôi là cán bộ của Công đoàn Đường sắt\nHoàng gia.\nVới phía ban quản lý thì như nước với lửa\nvậy.」"

# monologue
# JP: 帝労。帝鉄最大の労働組合。経営者側とは、\nずっと対立してるって、シロおねえちゃんに習ってる。
2072 = "Công đoàn Đường sắt Hoàng gia. Tổ chức\ncông đoàn lớn nhất của Đường sắt Hoàng\ngia. Luôn đối lập với phía ban quản lý,\nchị Shiro đã dạy mình như vậy."

# monologue
# JP: 他にも労組はたくさんあって、\n労組同士も対立してることも。話、聞いてる。
2234 = "Còn có rất nhiều tổ chức công đoàn khác,\nvà các công đoàn cũng đối lập với nhau.\nMình đã nghe kể rồi."

# 【後東】
# display as 司機Ａ
# JP: 「ああ！　だから赤井なんスね！\nどの労組とも、経営側とも距離を置いてるから」
1462 = "「A! Vì vậy nên mới là Akai nhỉ!\nVì anh ấy luôn giữ khoảng cách với mọi tổ\nchức công đoàn và cả phía ban quản lý.」"

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「赤井さんしかおらんとばい」
1566 = "「Chỉ có anh Akai mới làm được thôi.」"

# 【技工Ａ】
# display as 技工Ａ
# JP: 「この通りじゃ。頼むっ！」
1652 = "「Là vậy đó. Trăm sự nhờ cậu!」"

# monologue
# JP: （うん。対立なんてしてる場合じゃ、絶対にない。\n帝鉄がなくなっちゃうかもしれない、瀬戸際だから）
2325 = "（Ừm. Tuyệt đối không phải lúc để đối đầu\nnhau.\nBởi vì đây là thời khắc sinh tử, Đường sắt\nHoàng gia có thể sẽ biến mất）"

# 【赤井】
# display as 赤井
# JP: 「状況が状況です。電車区長――経営側も、\n[ききょう,1]機協や[げんろう,1]現労だって、今までの対立を置いた話を」
1702 = "「Tình hình hiện tại là như vậy. Đoạn\ntrưởng xe điện――phía ban quản lý,\ncả Hiệp hội Cơ khí hay Công đoàn Hiện\ntrường cũng vậy, hãy gác lại những đối đầu\ntừ trước đến nay mà nói chuyện」"

# 【先輩】
# display as 前輩
# JP: 「ありえんばい！　こぎゃん話ば進んどるのは、\n自分らはもう、新会社のポストば確保しとるからよ」
1327 = "「Không thể nào! Chuyện này tiến triển đến\nmức này,\nlà vì bọn họ đã nắm chắc vị trí trong công\nty mới rồi.」"

# 【赤井】
# display as 赤井
# JP: 「でしたら、新体制移行を認めることを条件に、\nこちらも分社化の話を受け入れさせればいい」
1822 = "「Nếu vậy, với điều kiện là chấp nhận\nchuyển đổi sang thể chế mới,\nchúng ta chỉ cần bắt họ chấp nhận chuyện\nchia tách công ty là được.」"

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「そらぁ、どういう――」
1806 = "「Đó là, có ý gì――」"

# 【赤井】
# display as 赤井
# JP: 「粉蔵内でも分轄をするということです。\nお互いの主張を認め合うことを条件に、棲み分ける」
1489 = "「Nghĩa là sẽ chia tách ngay trong nội bộ\nKokura.\nVới điều kiện là thừa nhận quan điểm của\nnhau, chúng ta sẽ phân chia ranh giới hoạt\nđộng.」"

# 【技工Ａ】
# display as 技工Ａ
# JP: 「経営側が、そんなん受け入れるわけなかろーて」
1801 = "「Phía ban quản lý, làm sao mà chấp nhận\nchuyện đó được chứ.」"

# 【赤井】
# display as 赤井
# JP: 「いえ、経営側も、新体制でのポジションを――\n高評価を得ることを求める以上、交換条件にできます」
1337 = "「Không, phía ban quản lý cũng muốn có vị\ntrí trong thể chế mới――\nMột khi họ muốn đạt được đánh giá cao, thì\nchúng ta có thể đưa ra điều kiện trao\nđổi.」"

# 【先輩】
# display as 前輩
# JP: 「……なるほど、泥沼の雇用闘争にでもなれば、\n新会社での管理職就任ば、難しかろーいう話じゃの」
1095 = "「......Ra là vậy, nếu biến thành một cuộc\nđấu tranh việc làm sa lầy,\nthì việc nhậm chức quản lý ở công ty mới\nsẽ trở nên khó khăn nhỉ.」"

# monologue
# JP: 先輩さんの一言に、\n清春以外のみんなが「ああ」って顔して頷く。
2233 = "Trước câu nói của tiền bối,\ntất cả mọi người trừ Kiyoharu đều gật đầu\nvới vẻ mặt 'À ra thế'."

# 【先輩】
# display as 前輩
# JP: 「そぎゃん取引、ワシらじゃすぐには思いつけん。\nやつらに丸め込まれるだけぞ。やけん、頼む」
1441 = "「Những giao dịch kiểu đó, bọn tôi không\nthể nghĩ ra ngay được.\nChỉ tổ bị bọn họ qua mặt thôi. Nên là,\ntrăm sự nhờ cậu.」"

# 【赤井】
# display as 赤井
# JP: 「いや――しかし」
1321 = "「Không――nhưng mà」"

# 【技工Ａ】
# display as 技工Ａ
# JP: 「ここまで頼んで、\nどぎゃんして引き受けてくれんとか」
1446 = "「Đã nhờ vả đến mức này rồi,\nsao cậu vẫn không chịu nhận lời chứ.」"

# 【後東】
# display as 司機Ａ
# JP: 「赤井、お前……まさかもう経営側と」
1788 = "「Akai, cậu...... không lẽ đã thỏa thuận\nvới phía ban quản lý rồi」"

# 【赤井】
# display as 赤井
# JP: 「そんなことはありません」
1731 = "「Không có chuyện đó đâu.」"

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「じゃったら！　お願いだ、赤井さん！！」
1817 = "「Vậy thì! Xin anh đấy, anh Akai!!」"

# monologue
# JP: （これが、パニック。これが――“槍玉”）
2338 = "（Đây chính là, hoảng loạn. Đây chính\nlà――'Mục tiêu công kích'）"

# monologue
# JP: 自分の代わりに清春が、\nいま、槍玉にあげられている。
2143 = "Thay vì mình, thì Kiyoharu,\nhiện tại đang bị lôi ra làm mục tiêu công\nkích."

# monologue
# JP: そんなの違う。まるっきり逆。\n自分は、道具なんだから。
2292 = "Như vậy là không đúng. Hoàn toàn ngược\nlại.\nVì mình, chỉ là một công cụ thôi mà."

# monologue
# JP: （すっ――）
2322 = "（Soạt――）"

# 【赤井】
# display as 赤井
# JP: 「ニイロクっ！？」
1347 = "「Niiroku!?」"

# 【ニイロク】
# display as 二六
# JP: 「清春。平気。\n自分に、清春の責任を押し付けてほしい」
1675 = "「Kiyoharu. Không sao đâu.\nHãy đùn đẩy trách nhiệm của Kiyoharu cho\ntôi đi.」"

# 【赤井】
# display as 赤井
# JP: 「っ！！？」
1426 = "「!!?」"

# 【後東】
# display as 司機Ａ
# JP: 「あ？　\x%lクハ26;#00ffc040;クハ26%l;#;の！？」
1471 = "「Hả? Của \\x%lクハ26;#00ffc040;Kuha 26%l;#;!?」"

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「ああ――隠しよっとったですか」
1454 = "「À――ra là cậu đã giấu cô ta đi.」"

# 【技工Ａ】
# display as 技工Ａ
# JP: 「黙らせとけ！\nレイルロオドが口出しするような話じゃ無かっ」
1758 = "「Bắt cô ta im miệng đi!\nChuyện này không đến lượt Railord xen vào\nđâu.」"

# 【赤井】
# display as 赤井
# JP: 「ニイロク。今は――」
1343 = "「Niiroku. Bây giờ thì――」"

# 【先輩】
# display as 前輩
# JP: 「いや、待て待て」
1339 = "「Không, từ từ đã.」"

# 【赤井】
# display as 赤井
# JP: 「ニイロク、下がっていなさい」
1352 = "「Niiroku, lùi lại đi.」"

# 【先輩】
# display as 前輩
# JP: 「待てぇ言うとる」
1571 = "「Tôi bảo từ từ đã mà.」"

# monologue
# JP: 先輩さんが、こっちを向く。\n笑ってる――のに、いい感じがしない。
2012 = "Tiền bối, quay sang phía này.\nĐang cười――nhưng lại không mang đến cảm\ngiác tốt lành."

# monologue
# JP: 怖い。\nすごく、怖い気がする。
2050 = "Sợ quá.\nCảm giác rất đáng sợ."

# 【先輩】
# display as 前輩
# JP: 「ニイロクよ――きさん、どぎゃん風に、\n赤井君の責任ば負いよるつもりと？」
1345 = "「Niiroku này――cô, định gánh vác trách\nnhiệm của cậu Akai\ntheo cách nào đây?」"

# 【ニイロク】
# display as 二六
# JP: 「決まってる。\x%lクハ26;#00ffc040;クハ26%l;#;を本線営業運転に乗せる。\n自分の特急――エアクラに負けないための特急を」
1824 = "「Đã quyết định rồi. Sẽ đưa \\x%lクハ26;#00ffc040;Kuha 26%l;#; vào vận\nhành thương mại trên tuyến chính.\nTàu tốc hành của tôi――tàu tốc hành được\ntạo ra để không thua kém Aircra.」"

# 【後東】
# display as 司機Ａ
# JP: 「エアクラに負けねえって――\nああ、いや――そのための開発だもんな」
1330 = "「Không thua kém Aircra sao――\nÀ, đúng rồi――nó được phát triển vì mục\nđích đó mà.」"

# 【ニイロク】
# display as 二六
# JP: 「そう。エアクラに勝つために想定されてる運用。\nエグゼクティブ[エクスプレス,1]特急として、速度に快適性を加える」
1653 = "「Đúng vậy. Việc vận hành được dự tính để\nchiến thắng Aircra.\nVới tư cách là một tàu tốc hành Executive [Express]\n, bổ sung thêm sự thoải mái vào tốc độ.」"

# 【技工Ａ】
# display as 技工Ａ
# JP: 「[とっきゅう,1]特急？　……定点輸送の速度面だけなら、\n確かにエアクラに負けはせんじゃろうが」
1693 = "「Tàu tốc hành? ......Nếu chỉ xét về mặt\ntốc độ của vận chuyển điểm cố định,\nthì đúng là sẽ không thua kém Aircra đâu\nnhưng mà」"

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「向こうにはドアツードアの強みばあるとよ。\nどぎゃんして、そこに勝つとか？」
1416 = "「Bên kia có thế mạnh là giao hàng tận nơi\n(door-to-door) đấy.\nLàm sao mà thắng được điểm đó chứ?」"

# 【ニイロク】
# display as 二六
# JP: 「ゆったりとしたシート。ビュッフェ。カーテン。\n軽食を取りながら、仕事をしながらの移動を提供」
1568 = "「Ghế ngồi rộng rãi thoải mái. \\x%lビュッフェ;#00ffc040;Quầy ăn nhẹ%l;#;.\nRèm che.\nCung cấp một chuyến đi vừa có thể thưởng\nthức bữa ăn nhẹ, vừa có thể làm việc.」"

# monologue
# JP: エアクラも自動運転だから、\n仕事も、食事も、やろうと思えばできるって聞く。
2306 = "Nghe nói Aircra cũng là lái tự động,\nnên nếu muốn thì làm việc hay ăn uống đều\nđược cả."

# monologue
# JP: けれど、個であり多数であるがゆえ、\n個人用エアクラは大きくできない。余裕を持てない。
1969 = "Nhưng, vì là phương tiện cá nhân và có số\nlượng lớn,\nnên Aircra cá nhân không thể làm lớn được.\nKhông có sự rộng rãi."

# 【ニイロク】
# display as 二六
# JP: 「快適性とは、余裕のこと。実利より余裕を求める、\nそうした富裕層向けを狙って、シェアを確保する」
1740 = "「Sự thoải mái, chính là sự rộng rãi. Hướng\ntới những người coi trọng sự thoải mái hơn\nlà lợi ích thực tế,\nnhắm vào tầng lớp thượng lưu đó để đảm bảo\nthị phần.」"

# monologue
# JP: 自分の目的、達成すべきこと。\n叩きこまれていることだから、間違いなく伝えられる。
2110 = "Mục đích của bản thân, những điều cần đạt\nđược.\nVì đã được nhồi nhét kỹ lưỡng, nên có thể\ntruyền đạt lại không sai một ly."

# 【ニイロク】
# display as 二六
# JP: 「各所での試験を終えれば、営業路線も延伸される。\n[ていおう,1]帝央-[なごや,2]名児耶-[おおさか,1]逢坂。[はかた,1]博太からも、逆に伸びていく」
1404 = "「Sau khi hoàn thành thử nghiệm ở các nơi,\ntuyến đường thương mại cũng sẽ được mở\nrộng.\nTeiou - Nagoya - Osaka. Và từ Hakata, cũng\nsẽ mở rộng ngược lại.」"

# 【技工Ｂ】
# display as 技工Ｂ
# JP: 「ゆったりと仕事をしながら――快適に、\n帝央を出て……最終的には、博太まで」
1570 = "「Vừa làm việc thong thả――vừa thoải mái,\nkhởi hành từ Teiou...... và cuối cùng là\nđến Hakata.」"

# 【後東】
# display as 司機Ａ
# JP: 「なるほど！　それでエグゼクティブ[エクスプレス,1]特急か！\nお前――じゃねぇな、[うえ,3]経営者側もやるじゃねえか」
1395 = "「Ra là vậy! Vì thế nên mới gọi là tàu tốc\nhành Executive [Express] à!\nCô――à không, mấy gã [cấp trên] phía ban quản lý cũng\nkhá đấy chứ.」"

# 【先輩】
# display as 前輩
# JP: 「なるほどなるほど。\n大変、ためになったとよ」
1394 = "「Ra là vậy, ra là vậy.\nThật sự, rất hữu ích đấy.」"

# monologue
# JP: 先輩の人が清春を見る。
2011 = "Tiền bối nhìn Kiyoharu."

# monologue
# JP: たぶん、自分を見ていたときと同じ瞳で。\nあの、怖い目で。
2046 = "Có lẽ, với cùng một ánh mắt như khi nhìn\nmình.\nBằng ánh mắt đáng sợ đó."

# 【先輩】
# display as 前輩
# JP: 「赤井君。レイルロオドがここまで言うとっとよ。\nどぎゃんかね――引き受けてくれんかね」
1785 = "「Cậu Akai. Railord đã nói đến mức này rồi\nđấy.\nSao nào――cậu nhận lời giúp chúng tôi nhé.」"

# monologue
# JP: でも、大丈夫。\n清春とふたりだったら、何でもできる。
1968 = "Nhưng, không sao đâu.\nNếu là hai người cùng với Kiyoharu, thì\nchuyện gì cũng làm được."

# monologue
# JP: 自分は、最新鋭、最高性能のレイルロオド。\n清春に産みだしてもらった、最高傑作なんだから。
2092 = "Mình là Railord hiện đại nhất, hiệu suất\ncao nhất.\nLà kiệt tác tuyệt vời nhất do Kiyoharu\nsinh ra mà."

# 【ニイロク】
# display as 二六
# JP: 「清春。署名、これでいい？」
1683 = "「Kiyoharu. Chữ ký, chừng này đủ chưa?」"

# 【赤井】
# display as 赤井
# JP: 「ああ――いや、これは素晴らしいですね、ニイロク。\n百を超えてるじゃないですか」
1480 = "「A――không, tuyệt vời lắm, Niiroku.\nHơn một trăm người rồi này.」"

# 【ニイロク】
# display as 二六
# JP: 「清春がリーダーだから。それに……嫌だけど、\n[はいしゃかいそう,3]廃車回送の活発化も強い後押しになってると思う」
1811 = "「Vì Kiyoharu là thủ lĩnh mà. Hơn nữa......\ndù không muốn nói nhưng,\ntôi nghĩ sự gia tăng của hoạt động [hồi tống phế xa] cũng\nlà một động lực lớn.」"

# 【赤井】
# display as 赤井
# JP: 「ですね。電車区長たちが面会を拒んでいる状況も、\nみなさんの不安を煽っていますから」
1619 = "「Đúng vậy. Việc Đoạn trưởng xe điện và\nnhững người khác từ chối gặp mặt,\ncũng đang thổi bùng lên sự bất an của mọi\nngười.」"

# monologue
# JP: 電車区長。帝鉄解体のニュースが出てから、\nほんとに誰とも清春とさえ会ってない。
2244 = "Đoạn trưởng xe điện. Kể từ khi có tin tức\ngiải thể Đường sắt Hoàng gia,\nông ấy thực sự không gặp bất cứ ai, kể cả\nKiyoharu."

# monologue
# JP: あんなに親切にしてくれたのにって――\n少し不安で、怖くなる。
1985 = "Rõ ràng ông ấy đã đối xử tốt với mình như\nvậy mà――\nCảm thấy có chút bất an, và sợ hãi."

# 【ニイロク】
# display as 二六
# JP: 「三階にあがる階段の前、幹部の人たちで\nバリケードを組んでるって、ほんと？」
1599 = "「Trước cầu thang lên tầng ba, các cán bộ\nđang dựng rào chắn, là thật sao?」"

# 【赤井】
# display as 赤井
# JP: 「バリケードではありませんが、実質的には。\n幹部連は交代で、人垣を組んでいます」
1380 = "「Không phải là rào chắn, nhưng về thực\nchất thì cũng giống vậy.\nCác cán bộ đang thay phiên nhau, tạo thành\nmột bức tường người.」"

# 【ニイロク】
# display as 二六
# JP: 「人垣」
1359 = "「Bức tường người」"

# 【赤井】
# display as 赤井
# JP: 「原始的ですが効果的です。指一本でも触れたら\n暴行罪で警察沙汰です。退職金も出なくなる」
1841 = "「Dù nguyên thủy nhưng lại rất hiệu quả.\nChỉ cần chạm một ngón tay vào thôi\nlà sẽ bị cảnh sát sờ gáy vì tội hành hung.\nTiền trợ cấp thôi việc cũng sẽ không được\nnhận nữa.」"

# 【ニイロク】
# display as 二六
# JP: 「だから、誰も三階に上がれない？\n幹部の人達と、話ができない」
1604 = "「Nên, không ai có thể lên tầng ba được?\nKhông thể nói chuyện với các cán bộ.」"

# 【赤井】
# display as 赤井
# JP: 「ええ。けれども指示だけはおりてくる。\n仮に抗おうものなら、これもまた、即免職です」
1617 = "「Đúng vậy. Nhưng chỉ có chỉ thị là được\ntruyền xuống.\nNếu có ý định chống đối, thì cũng sẽ bị\ncách chức ngay lập tức.」"

# 【ニイロク】
# display as 二六
# JP: 「でも！」
1410 = "「Nhưng mà!」"

# monologue
# JP: 廃回。毎日数輌ずつ、確実に進んでる。\nわざわざ粉蔵から運びだして、門次まで運んで。
2080 = "Hồi tống phế xa. Mỗi ngày vài toa, vẫn\nđang được tiến hành một cách chắc chắn.\nCất công đưa từ Kokura, vận chuyển đến tận\nMoji."

# monologue
# JP: 解体してすぐ船に積み込み、運び出す。\n門次はもう、それしかやらなくなってるって聞く。
2276 = "Tháo dỡ xong là lập tức chất lên tàu, rồi\nchở đi.\nNghe nói Moji bây giờ, chỉ còn làm mỗi\nviệc đó thôi."

# 【ニイロク】
# display as 二六
# JP: 「命令だから、従うものってわかってるけど。\nだけど――シロおねえちゃん、すごくつらそうで」
1588 = "「Tôi biết đó là mệnh lệnh, nên phải tuân\ntheo.\nNhưng mà――chị Shiro, trông có vẻ rất đau\nkhổ.」"

# monologue
# JP: おねえちゃんのこと、\nみんな、死神って呼ぶようになった。
2045 = "Mọi người, giờ đây,\nđã bắt đầu gọi chị ấy là Tử thần."

# monologue
# JP: 廃車回送の列車を、おねえちゃんが牽引してるから。\n一番辛い仕事だからって――引き受けたから。
2041 = "Bởi vì chị ấy đang kéo những chuyến tàu\nhồi tống phế xa.\nVì đó là công việc đau khổ nhất――nên chị\nấy đã nhận lấy."

# 【赤井】
# display as 赤井
# JP: 「……ニイロク。それが、責任というものです。\n仕事とは、生活とは、それほどまでに重い」
1077 = "「......Niiroku. Đó chính là, thứ gọi là\ntrách nhiệm.\nCông việc, và cuộc sống, nặng nề đến mức\nnhư vậy đấy.」"

# 【ニイロク】
# display as 二六
# JP: 「だけど！　シロおねえちゃんのマスターを\n悪くいう人もいるの！　“転んだ”って」
1413 = "「Nhưng mà! Cũng có những người nói xấu\nMaster của chị Shiro!\nBảo là 'Đã quay xe' rồi.」"

# monologue
# JP: 新しく知った言葉。転ぶ。転向。とても嫌な言葉。\n労組側から、経営側の味方に変わること。
2289 = "Một từ mới học được. Quay xe. Chuyển\nhướng. Một từ rất đáng ghét.\nTừ phe công đoàn, chuyển sang làm đồng\nminh cho phía ban quản lý."

# monologue
# JP: そうすれば、新会社でのお仕事が確保されるから\n――今までの仕事を、鉄道を、捨ててしまうこと。
2291 = "Làm như vậy, sẽ đảm bảo được công việc ở\ncông ty mới\n――tức là vứt bỏ công việc từ trước đến\nnay, vứt bỏ đường sắt."

# 【ニイロク】
# display as 二六
# JP: 「おねえちゃんのマスターがそんなことするわけ！」
1487 = "「Master của chị ấy làm sao có thể làm ra\nchuyện như vậy chứ!」"

# 【赤井】
# display as 赤井
# JP: 「それは誰にもわかりません。ご本人たち以外には。\nですから人前では、反論も同調も禁物です」
1389 = "「Chuyện đó thì không ai biết được đâu.\nNgoại trừ chính bản thân họ.\nVì vậy, ở trước mặt người khác, tuyệt đối\nkhông được phản bác hay hùa theo.」"

# 【ニイロク】
# display as 二六
# JP: 「清春！？」
1673 = "「Kiyoharu!?」"

# 【赤井】
# display as 赤井
# JP: 「話題に加わるそれだけで、相手の立場を悪くする。\nそうしたことも、世の中にはたくさんあるのです」
1641 = "「Chỉ cần tham gia vào chủ đề đó thôi, cũng\nsẽ làm cho lập trường của đối phương trở\nnên tồi tệ hơn.\nNhững chuyện như vậy, trên đời này có rất\nnhiều.」"

# 【ニイロク】
# display as 二六
# JP: 「だから――違う！　っていっちゃダメなの？\nそれも、やっぱり責任なの？」
1607 = "「Nên là――không được nói 'Không phải!' sao?\nĐó cũng là, trách nhiệm sao?」"

# 【赤井】
# display as 赤井
# JP: 「ですね。ニイロクは私のレイルロオドですから。\n私と同じ責任を、やはり負わねばなりません」
1651 = "「Đúng vậy. Vì Niiroku là Railord của tôi\nmà.\nNên cũng phải gánh vác trách nhiệm giống\nnhư tôi.」"

# 【ニイロク】
# display as 二六
# JP: 「！！！」
# 1812 = "「這！！！」" 

# monologue
# JP: いま、いま、清春――\n絶対いった！　絶対、絶対いってくれた！！！
2018 = "Lúc nãy, lúc nãy, Kiyoharu――\nChắc chắn đã nói! Chắc chắn, chắc chắn đã\nnói rồi!!!"

# 【ニイロク】
# display as 二六
# JP: 「清春の、レイルロオド？」
1589 = "「Railord, của Kiyoharu?」"

# 【赤井】
# display as 赤井
# JP: 「そうなります。新会社が無事設立できれば、\n私はあなたを手放さない。誰にも決して渡しません」
1626 = "「Là vậy đấy. Nếu công ty mới được thành\nlập suôn sẻ,\ntôi sẽ không buông tay cô đâu. Tuyệt đối\nsẽ không giao cho bất cứ ai.」"

# 【ニイロク】
# display as 二六
# JP: 「わ」
1447 = "「Oa」"

# 【赤井】
# display as 赤井
# JP: 「そうならなければ――このまま終わり。\nその場合にも、私だけが、あなたのマスターです」
1497 = "「Nếu không được như vậy――thì cứ thế mà kết\nthúc.\nTrong trường hợp đó, cũng chỉ có tôi, là\nMaster của cô thôi.」"

# monologue
# JP: そんな場合じゃないって、すごくわかってる。\nだけど――嬉しくて止まらなくなる！！！
2305 = "Mình rất hiểu đây không phải là lúc cho\nchuyện đó.\nNhưng mà――vui quá không kìm lại được!!!"

# 【ニイロク】
# display as 二六
# JP: 「うれしい！　清春！　ううん――マイ・マスター！\n最初で最後の、自分だけの、マスター」
1679 = "「Vui quá! Kiyoharu! Không phải――My Master!\nMaster đầu tiên và cũng là cuối cùng, của\nriêng mình tôi.」"

# 【赤井】
# display as 赤井
# JP: 「喜んでもらえて光栄です。\nニイロク――私の最後のレイルロオド」
1325 = "「Cô vui là tôi thấy vinh hạnh rồi.\nNiiroku――Railord cuối cùng của tôi.」"

# 【ニイロク】
# display as 二六
# JP: 「うん！！！」
1482 = "「Ừm!!!」"

# monologue
# JP: 最後って、最後って清春、いま言った！\nそれって絶対、新会社でも最後ってこと！！
2180 = "Cuối cùng, Kiyoharu vừa nói từ cuối cùng!\nNhư vậy chắc chắn có nghĩa là, ở công ty\nmới cũng là cuối cùng!!"

# monologue
# JP: 清春、自分と\x%lクハ26;#00ffc040;クハ26%l;#;を、廃棄・廃車のそのときまで\nずうっと使ってくれるんだ！！
2190 = "Kiyoharu, sẽ sử dụng mình và \\x%lクハ26;#00ffc040;Kuha 26%l;#;,\ncho đến tận lúc bị phế bỏ, tháo dỡ luôn!!"

# 【ニイロク】
# display as 二六
# JP: 「なら教えて？　新会社を作るため何をすればいいか。\n未来のために、一緒に走りつづけるために」
1813 = "「Vậy thì nói cho tôi biết đi? Để thành lập\ncông ty mới thì phải làm gì.\nVì tương lai, vì để tiếp tục chạy cùng\nnhau.」"

# 【赤井】
# display as 赤井
# JP: 「……そうですね。\nでは、署名を整理しながら話しましょう」
1103 = "「......Để xem nào.\nVậy, chúng ta vừa sắp xếp chữ ký vừa nói\nchuyện nhé.」"

# 【ニイロク】
# display as 二六
# JP: 「署名の整理？」
1610 = "「Sắp xếp chữ ký?」"

# 【赤井】
# display as 赤井
# JP: 「私が集めたものとの照合ですよ。\n五十音順に並べ直して、重複を外してリストにする」
1434 = "「Là đối chiếu với những chữ ký tôi đã thu\nthập được.\nSắp xếp lại theo thứ tự bảng chữ cái, loại\nbỏ những cái trùng lặp rồi lập thành danh\nsách.」"

# 【ニイロク】
# display as 二六
# JP: 「わかった」
1584 = "「Tôi hiểu rồi.」"

# 【赤井】
# display as 赤井
# JP: 「重複があると不正な署名とされる危険があります。\n未記入の項目があるものも外してください」
1748 = "「Nếu có trùng lặp sẽ có nguy cơ bị coi là\nchữ ký không hợp lệ.\nNhững cái có mục chưa điền cũng hãy loại\nra nhé.」"

# 【ニイロク】
# display as 二六
# JP: 「わかった。\n自分が入力するから、清春にはチェックして欲しい」
1613 = "「Tôi hiểu rồi.\nTôi sẽ nhập liệu, nên Kiyoharu hãy kiểm\ntra giúp nhé.」"

# 【赤井】
# display as 赤井
# JP: 「それでいきましょう。お願いします」
1496 = "「Cứ làm vậy đi. Nhờ cô nhé.」"

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1481 = "「嗯」" 

# monologue
# JP: この手の作業は、レイルロオドなら誰でも得意。\nまして自分は、最新鋭機。並列処理をしたって余裕。
2294 = "Loại công việc này, Railord nào cũng giỏi\ncả.\nHuống hồ mình còn là cỗ máy hiện đại nhất.\nXử lý song song cũng dư sức."

# monologue
# JP: 清春にも、それがわかってる。\nだから、仕事しながらも話してくれる。
2174 = "Kiyoharu cũng hiểu điều đó.\nNên mới vừa làm việc vừa nói chuyện với\nmình."

# 【赤井】
# display as 赤井
# JP: 「……普通であれば、\n民営・分社化は帝鉄にも有利な提案となります」
1074 = "「......Thông thường thì,\ntư nhân hóa và chia tách công ty là một đề\nxuất có lợi cho cả Đường sắt Hoàng gia.」"

# 【ニイロク】
# display as 二六
# JP: 「そう思う。鉄くずにして処分するより、\n欲しがる人に売る方が、高く売れるに決まってる」
1560 = "「Tôi cũng nghĩ vậy. So với việc biến thành\nsắt vụn để xử lý,\nthì bán cho những người cần chắc chắn sẽ\nđược giá cao hơn.」"

# 【赤井】
# display as 赤井
# JP: 「けれど、今回の件は違います。エアクラ社――\nいえむしろ、冥国の命令での、施策でしょうから」
1409 = "「Nhưng, chuyện lần này lại khác. Công ty\nAircra――\nKhông, đúng hơn là, chính sách này được\nđưa ra theo mệnh lệnh của Meikoku.」"

# 【ニイロク】
# display as 二六
# JP: 「鉄道が滅びれば、\nエアクラの普及に加速がつくから？」
1624 = "「Vì nếu đường sắt bị tiêu diệt,\nthì việc phổ cập Aircra sẽ được tăng tốc\nsao?」"

# 【赤井】
# display as 赤井
# JP: 「でしょうね。解体後の受け皿のエアクラ＝バス社は\n鉄道からエアクラへの転換の象徴ともなるでしょう」
1535 = "「Có lẽ là vậy. Công ty Xe buýt Aircra, nơi\ntiếp nhận sau khi giải thể,\ncũng sẽ trở thành biểu tượng cho sự chuyển\nđổi từ đường sắt sang Aircra.」"

# 【ニイロク】
# display as 二六
# JP: 「じゃあ、民営・分社化は難しい？」
1828 = "「Vậy thì, việc tư nhân hóa và chia tách\ncông ty sẽ rất khó khăn sao?」"

# monologue
# JP: そうなったらって――\n思っちゃってすごく、怖くなる。
2263 = "Nếu chuyện đó xảy ra――\nNghĩ đến đó thôi, mình lại thấy vô cùng sợ\nhãi."

# monologue
# JP: おねえちゃんたちみんなも、自分も、車両ごと。\n解体されて――全部がゼロになっちゃうんだって。
2088 = "Cả các chị, cả mình, và cả toa xe.\nBị tháo dỡ――tất cả sẽ trở về con số không."

# 【赤井】
# display as 赤井
# JP: 「大丈夫ですよ、ニイロク」
1349 = "「Không sao đâu, Niiroku.」"

# 【ニイロク】
# display as 二六
# JP: 「あ――」
1453 = "「A――」"

# monologue
# JP: ぎゅって。\n清春が抱きしめてくれる。
2188 = "Ôm thật chặt.\nKiyoharu ôm lấy mình."

# monologue
# JP: いいこいいこってしてくれる。\n仕事の手、止まっちゃう。並列処理、できっこない。
1982 = "Anh ấy xoa đầu mình.\nTay làm việc, phải dừng lại thôi. Xử lý\nsong song, không thể nào làm được nữa rồi."

# 【赤井】
# display as 赤井
# JP: 「引き受けたからには成功させます。\nどのみち、最初から引き受けるつもりでした」
1612 = "「Một khi đã nhận lời thì tôi sẽ làm cho\nthành công.\nDù sao thì, ngay từ đầu tôi đã định nhận\nlời rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「そうなんだ！」
1809 = "「Ra là vậy!」"

# monologue
# JP: 嬉しい。すごくホっとする。
2059 = "Vui quá. Cảm thấy nhẹ nhõm hẳn."

# monologue
# JP: 責任って、少しずつ本当にわかるようになってきて\n――だんだん、不安になってきたから。
2121 = "Trách nhiệm, mình đã dần dần thực sự hiểu\nđược nó là gì\n――và cũng vì thế mà dần trở nên bất an."

# 【ニイロク】
# display as 二六
# JP: 「あのとき出しゃばっちゃったから――\nそれで清春、断れなくなったとかじゃなかった？」
1329 = "「Lúc đó vì tôi xen vào――\nNên Kiyoharu mới không thể từ chối được\nđúng không?」"

# 【赤井】
# display as 赤井
# JP: 「ああ――そんな心配ができるほど。\nニイロク――きみは、成長してくれているのですね」
1477 = "「A――Đã biết lo lắng đến mức đó rồi sao.\nNiiroku――cô, đã trưởng thành hơn rồi nhỉ.」"

# monologue
# JP: いいこいいこが強くなる。\n気持ちいい。どんどんどんどん幸せになる。
1984 = "Những cái xoa đầu trở nên mạnh mẽ hơn.\nThật dễ chịu. Cảm giác hạnh phúc cứ thế\nlớn dần, lớn dần."

# 【赤井】
# display as 赤井
# JP: 「言ったとおり、どのみち引き受けるつもりでした。\n鉄道を失えば私の選んだ全てが、無意味になります」
1544 = "「Như tôi đã nói, đằng nào tôi cũng định\nnhận lời.\nNếu mất đi đường sắt, mọi thứ tôi đã chọn\nsẽ trở nên vô nghĩa.」"

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1481 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「だからこそ、ゴネたのです。\nゴネる姿勢を見せておくことに、意味がありました」
1603 = "「Chính vì vậy, tôi mới tỏ vẻ không đồng ý.\nViệc thể hiện thái độ không đồng ý đó, là\ncó ý nghĩa của nó.」"

# 【ニイロク】
# display as 二六
# JP: 「意味って？」
1539 = "「Ý nghĩa là gì?」"

# 【赤井】
# display as 赤井
# JP: 「それはですね」
1805 = "「Đó là」"

# 【ニイロク】
# display as 二六
# JP: 「あっ！　待って」
1469 = "「A! Đợi đã.」"

# monologue
# JP: 清春が体を離そうとして、\nヤダって思って声が出ちゃう。
2186 = "Kiyoharu định rời người ra,\nmình không muốn thế nên đã buột miệng kêu\nlên."

# monologue
# JP: ……なんだか、照れちゃう。\n照れるけど、言っちゃったから、全部言う。
1033 = "......Cảm thấy, hơi xấu hổ.\nXấu hổ thật đấy, nhưng lỡ nói ra rồi, thì\nnói cho hết luôn."

# 【ニイロク】
# display as 二六
# JP: 「時間、大丈夫なら、このまま聞きたい。\n――このままで、全部……教えて欲しい」
1746 = "「Nếu có thời gian, tôi muốn nghe trong tư\nthế này.\n――Cứ như thế này, hãy kể cho tôi\nnghe...... tất cả.」"

# 【赤井】
# display as 赤井
# JP: 「甘えっ子ですね、ニイロクは」
1351 = "「Cô đúng là đứa trẻ thích làm nũng nhỉ,\nNiiroku.」"

# 【ニイロク】
# display as 二六
# JP: 「……うん」
1082 = "「......Ừm.」"

# monologue
# JP: いいこいいこ。\n今度はゆっくり、やさしくやさしく。
2293 = "Xoa đầu, xoa đầu.\nLần này thì chậm rãi, thật dịu dàng, thật\ndịu dàng."

# 【赤井】
# display as 赤井
# JP: 「ゴネた理由のひとつは彼らの覚悟を見るためです。\n『それなら自分が』という者がいるかを見たかった」
1550 = "「Một trong những lý do tôi tỏ vẻ không\nđồng ý là để xem quyết tâm của họ.\nTôi muốn xem liệu có ai đứng ra nói 'Nếu\nvậy thì để tôi làm' hay không.」"

# 【ニイロク】
# display as 二六
# JP: 「わかった！　そういう人がいたら、\nその人に前に立ってもらったの？」
1580 = "「Tôi hiểu rồi! Nếu có người như vậy,\nanh sẽ để người đó đứng ra dẫn đầu sao?」"

# 【赤井】
# display as 赤井
# JP: 「それも選択肢のひとつでした。\n私は臆病者です。まったく、フロント向きではない」
1804 = "「Đó cũng là một trong những lựa chọn.\nTôi là kẻ nhát gan. Hoàn toàn không hợp\nvới việc đứng mũi chịu sào.」"

# 【ニイロク】
# display as 二六
# JP: 「だと思う。慎重で臆病だから、\n清春は、最高の試験運転士なんだし」
1557 = "「Tôi cũng nghĩ vậy. Vì cẩn trọng và nhát\ngan,\nnên Kiyoharu mới là lái tàu thử nghiệm\ntuyệt vời nhất.」"

# 【赤井】
# display as 赤井
# JP: 「わかってもらえて、ほっとしますよ」
1378 = "「Cô hiểu được điều đó, tôi thấy nhẹ nhõm\nhẳn.」"

# monologue
# JP: なでなで。ふんわり。\n体も、なんだかぽかぽかしてくる。
2251 = "Xoa xoa. Nhẹ nhàng.\nCơ thể, cũng dần trở nên ấm áp."

# 【赤井】
# display as 赤井
# JP: 「しかし、そうはなりませんでした。\nつまり彼らも、どのレベルかで、様子見をしている」
1406 = "「Nhưng, mọi chuyện đã không diễn ra như\nvậy.\nTức là bọn họ, ở một mức độ nào đó, cũng\nđang chờ xem tình hình thế nào.」"

# 【ニイロク】
# display as 二六
# JP: 「――いつでも転べるようにしてるってこと？」
1046 = "「――Ý anh là họ luôn sẵn sàng quay xe bất\ncứ lúc nào sao?」"

# 【赤井】
# display as 赤井
# JP: 「端的に言えばそうなります。\n条件次第で、あの四人の誰にも、転ぶ可能性がある」
1757 = "「Nói thẳng ra là vậy.\nTùy thuộc vào điều kiện, cả bốn người bọn\nhọ, ai cũng có khả năng quay xe.」"

# monologue
# JP: 普通に話そうとしてるけど――それでも寂しそうな声。\nそんなの当然。
2307 = "Cố tỏ ra nói chuyện bình thường――nhưng\ngiọng nói vẫn có vẻ buồn bã.\nChuyện đó cũng là đương nhiên thôi."

# monologue
# JP: みんな、だって。\nこんなことがなければずっと、仲間なんだから。
2254 = "Mọi người, bởi vì.\nNếu không có chuyện này xảy ra thì vẫn mãi\nlà đồng đội mà."

# 【ニイロク】
# display as 二六
# JP: 「……うん」
# 1082 = "「……嗯」" 

# 【赤井】
# display as 赤井
# JP: 「すでに経営者サイドの者もいるかもしれない。\nその心配も、ごねてみた理由のひとつです」
1403 = "「Có khi đã có người theo phe ban quản lý\nrồi cũng nên.\nNỗi lo đó, cũng là một trong những lý do\nkhiến tôi thử làm mình làm mẩy.」"

# monologue
# JP: でも、清春は普通にしてる。\nだったら、自分も普通に話す。
2024 = "Nhưng, Kiyoharu vẫn tỏ ra bình thường.\nNếu vậy, mình cũng sẽ nói chuyện bình\nthường."

# 【ニイロク】
# display as 二六
# JP: 「……ええ、と――経営者側の人がいたら、\n清春の様子を報告する――から？」
1105 = "「......Ừm, thì――nếu có người của phía ban\nquản lý,\nhọ sẽ báo cáo lại thái độ của\nKiyoharu――sao?」"

# 【赤井】
# display as 赤井
# JP: 「そうですね」
1620 = "「Đúng vậy.」"

# 【ニイロク】
# display as 二六
# JP: 「――清春が消極的って思わせてたら――\nなにか、工作をしてくるかもしれない？」
1044 = "「――Nếu khiến họ nghĩ rằng Kiyoharu đang\ntiêu cực――\nThì có thể họ sẽ giở trò gì đó sao?」"

# 【赤井】
# display as 赤井
# JP: 「すごいですね、ニイロク。さすがは最新鋭。\n稼働半年強で、ここまで人間を理解するとは」
1711 = "「Tuyệt thật đấy, Niiroku. Quả không hổ\ndanh là cỗ máy hiện đại nhất.\nMới đi vào hoạt động được hơn nửa năm, mà\nđã hiểu con người đến mức này rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「ううん、違う！」
1608 = "「Không, không phải!」"

# monologue
# JP: ほめてもらえて、すごく嬉しい。\nだけどデータは、正確なものをあげなくちゃ。
2253 = "Được khen, mình thấy rất vui.\nNhưng dữ liệu, thì phải đưa ra một cách\nchính xác."

# 【ニイロク】
# display as 二六
# JP: 「人間全部のことはわからない。けど――\n清春のことだったら、ずっと見てた分、わかる」
1582 = "「Tôi không hiểu hết về con người đâu.\nNhưng――\nNếu là về Kiyoharu, thì tôi hiểu, vì tôi\nluôn quan sát anh mà.」"

# 【赤井】
# display as 赤井
# JP: 「っ！」
1451 = "「!」"

# monologue
# JP: 手、なでなでの手、止まっちゃう。
2189 = "Bàn tay, bàn tay đang xoa đầu mình, dừng\nlại rồi."

# 【ニイロク】
# display as 二六
# JP: 「清春？　自分、間違えた？？」
1686 = "「Kiyoharu? Tôi, nói sai gì sao??」"

# 【赤井】
# display as 赤井
# JP: 「いいえ――ニイロク。いいえ――。\nその……正直にいって――照れただけです」
1468 = "「Không――Niiroku. Không đâu――.\nCái đó...... thành thật mà nói――tôi chỉ\nthấy hơi ngại thôi.」"

# 【ニイロク】
# display as 二六
# JP: 「照れるの？　清春も」
1368 = "「Anh cũng biết ngại sao? Kiyoharu.」"

# 【赤井】
# display as 赤井
# JP: 「照れますよ。それは――やはり」
1823 = "「Ngại chứ. Chuyện đó――tất nhiên rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「そうなんだ！」
# 1809 = "「這樣啊！」" 

# monologue
# JP: 嬉しい。嬉しい。にこにこしちゃう。\n清春のこと、照れさせちゃった！
2057 = "Vui quá. Vui quá. Tủm tỉm cười mất thôi.\nMình làm cho Kiyoharu ngại ngùng rồi!"

# 【赤井】
# display as 赤井
# JP: 「ああ――こほんっ」
1615 = "「A――e hèm.」"

# monologue
# JP: なでなで、乱暴にくしゃくしゃって。
1980 = "Xoa xoa, rồi vò đầu mình một cách thô bạo."

# monologue
# JP: 清春、かわいい。\n照れてるの、ごまかそうってしてる。
2181 = "Kiyoharu, đáng yêu quá.\nĐang cố che giấu sự ngại ngùng kìa."

# 【赤井】
# display as 赤井
# JP: 「……最初の話に戻りますが、\n民営・分社化は理想的な成功です」
1093 = "「......Quay lại câu chuyện lúc đầu,\ntư nhân hóa và chia tách công ty là một\nthành công lý tưởng.」"

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1481 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「ですが、交渉の余地なしと判断されれば潰される。\n冥国絡みの国策に、私達レベルでは抗えません」
1412 = "「Nhưng, nếu bị đánh giá là không có dư địa\nđàm phán thì sẽ bị đè bẹp.\nVới quốc sách có liên quan đến Meikoku,\nnhững kẻ ở tầm cỡ như chúng ta không thể\nchống cự được đâu.」"

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1481 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「私が絶対に譲れないものはニイロク――君です。\n君という、私が人生を注いだものの、結晶です」
1592 = "「Thứ mà tôi tuyệt đối không thể nhượng bộ\nchính là Niiroku――cô.\nCô chính là kết tinh của những gì tôi đã\ndốc cả cuộc đời vào.」"

# 【ニイロク】
# display as 二六
# JP: 「――うん」
1045 = "「――Ừm.」"

# monologue
# JP: なでなでが、止まる。\n抱きしめられる。
2130 = "Những cái xoa đầu, dừng lại.\nMình được ôm vào lòng."

# monologue
# JP: ぎゅって、ぎゅうって。強く。強く。\nでも苦しくない。もっとつよくって思っちゃう。
2193 = "Ôm thật chặt, thật chặt. Thật mạnh. Thật\nmạnh.\nNhưng không hề thấy khó thở. Mình còn muốn\nanh ấy ôm chặt hơn nữa cơ."

# 【赤井】
# display as 赤井
# JP: 「最悪の場合でも、君さえ残ってくれるなら、\n帝鉄――いえ、鉄道復活の種火は、残り続ける」
1520 = "「Dù trong trường hợp xấu nhất, chỉ cần cô\ncòn ở lại,\nĐường sắt Hoàng gia――không, mồi lửa cho sự\nphục sinh của đường sắt, sẽ tiếp tục tồn\ntại.」"

# 【ニイロク】
# display as 二六
# JP: 「わかる。自分は、そうした機体。\n自分さえいれば、\x%lクハ26;#00ffc040;クハ26%l;#;だって編成ごと復元できる」
1595 = "「Tôi hiểu. Tôi là một cỗ máy như vậy.\nChỉ cần có tôi, \\x%lクハ26;#00ffc040;Kuha 26%l;#; cũng có thể được\nphục nguyên cả đoàn.」"

# 【赤井】
# display as 赤井
# JP: 「\x%lクハ26;#00ffc040;クハ26%l;#;は残したい。可能なら、粉蔵-[はかた,1]博太の路線も。\nそういう風に、成功にいくつかのレベルがあります」
1553 = "「Tôi muốn giữ lại \\x%lクハ26;#00ffc040;Kuha 26%l;#;. Nếu có thể, cả\ntuyến đường Kokura - Hakata nữa.\nNhư vậy đấy, thành công cũng có nhiều cấp\nđộ khác nhau.」"

# 【ニイロク】
# display as 二六
# JP: 「わかった。と思う。この署名も、ゴネたのも。\n全部――成功のレベルをより高くするため」
1586 = "「Tôi hiểu rồi. Chắc vậy. Cả chữ ký này, cả\nviệc làm mình làm mẩy nữa.\nTất cả――đều là để nâng cao mức độ thành\ncông.」"

# 【赤井】
# display as 赤井
# JP: 「そのとおりです、ニイロク。\n……私は臆病もので、決して英雄にはなれない」
1578 = "「Đúng là vậy, Niiroku.\n......Tôi là kẻ nhát gan, tuyệt đối không\nthể trở thành anh hùng được.」"

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1481 = "「嗯」" 

# monologue
# JP: だから、自分は清春が好き。\n思って――どんどん、あったかくなる。満ちてくる。
2096 = "Vì vậy, mình mới thích Kiyoharu.\nNghĩ vậy――cơ thể dần trở nên ấm áp. Cảm\ngiác đong đầy."

# monologue
# JP: （清春が好き。清春が好き。清春が好き。清春が好き）
2327 = "（Thích Kiyoharu. Thích Kiyoharu. Thích\nKiyoharu. Thích Kiyoharu）"

# monologue
# JP: ――少女マンガで読んだのと違う。\nドッキンってしない、あったかな好き。静かな好き。
2212 = "――Khác với những gì mình đọc trong shoujo\nmanga.\nKhông phải là kiểu tim đập thình thịch, mà\nlà một sự thích ấm áp. Một sự thích tĩnh\nlặng."

# monologue
# JP: だけど、わかる。\nもう、わかった。
2122 = "Nhưng, mình hiểu.\nMình đã hiểu rồi."

# 【ニイロク】
# display as 二六
# JP: 「清春――自分は、清春が好き。\n清春に、きっと恋してる」
1659 = "「Kiyoharu――Tôi, thích Kiyoharu.\nChắc chắn, tôi đang yêu Kiyoharu rồi.」"

# monologue
# JP: おなかの奥がキリキリってする。\n少し、じんじん痛くなる。
2086 = "Sâu trong bụng nhói lên một cái.\nHơi đau âm ỉ một chút."

# monologue
# JP: マンガと違う。マンガだと痛むのは胸。\nだけど、わかる。言葉にしたら、もっとわかる。
2290 = "Khác với trong manga. Trong manga thì ngực\nmới là chỗ đau.\nNhưng, mình hiểu. Nói ra thành lời rồi,\nlại càng hiểu rõ hơn."

# 【ニイロク】
# display as 二六
# JP: 「きっと、じゃない。\n自分は――清春に恋してる」
1335 = "「Không phải là chắc chắn nữa.\nTôi――đang yêu Kiyoharu.」"

# monologue
# JP: 他に、なんにも考えられない。\n清春とずっと一緒にいたい。清春のことを守りたい。
2097 = "Không thể nghĩ được gì khác nữa.\nMuốn mãi mãi ở bên Kiyoharu. Muốn bảo vệ\nKiyoharu."

# monologue
# JP: 好き。好き。好き。好き。\n溢れてくるから、止められない。
2035 = "Thích. Thích. Thích. Thích.\nCảm xúc trào dâng, không thể nào ngăn lại\nđược."

# 【ニイロク】
# display as 二六
# JP: 「清春のことが。好き――大好き」
1574 = "「Kiyoharu. Thích――rất thích anh.」"

# 【赤井】
# display as 赤井
# JP: 「私は……ニイロク。臆病ものです」
1541 = "「Tôi...... Niiroku. Là một kẻ nhát gan.」"

# 【ニイロク】
# display as 二六
# JP: 「知ってる。だから好き」
1598 = "「Tôi biết. Nên tôi mới thích.」"

# 【赤井】
# display as 赤井
# JP: 「君に対する愛情も、執着も、欲もあります。\nしかし私には、それが純粋な愛情なのかがもはや」
1576 = "「Tôi có tình yêu, có sự cố chấp, và cả dục\nvọng đối với cô.\nNhưng đối với tôi, liệu đó có còn là tình\nyêu thuần khiết hay không thì」"

# 【ニイロク】
# display as 二六
# JP: 「自分の好きだって、\n純粋かどうかなんてわからない」
1552 = "「Ngay cả sự yêu thích của tôi,\ncũng không biết có thuần khiết hay không\nmà.」"

# 【赤井】
# display as 赤井
# JP: 「！」
# 1451 = "「唔！」" 

# monologue
# JP: 難しいこと、たくさん教えてもらったから。\n思考にどんどん、冗長性が加わったから。
2304 = "Vì đã được dạy cho rất nhiều điều khó\nhiểu.\nVì suy nghĩ ngày càng trở nên rườm rà phức\ntạp."

# monologue
# JP: 清春にして欲しいこと、たくさんあるし、\nそれが欲か、愛情かなんて、よくわからない。
2138 = "Có rất nhiều điều tôi muốn Kiyoharu làm\ncho mình,\nđó là dục vọng hay tình yêu, tôi cũng\nkhông rõ nữa."

# 【ニイロク】
# display as 二六
# JP: 「だけど、好き。清春が好き。\n純粋じゃなくたって好き。いっぱい好き。大好き」
1366 = "「Nhưng, tôi thích. Thích Kiyoharu.\nDù không thuần khiết tôi vẫn thích. Rất\nthích. Cực kỳ thích.」"

# 【赤井】
# display as 赤井
# JP: 「純粋じゃなくても――わからなくても」
1515 = "「Dù không thuần khiết――dù không hiểu rõ」"

# 【ニイロク】
# display as 二六
# JP: 「あ」
# 1457 = "「啊」" 

# 【赤井】
# display as 赤井
# JP: 「確かに、ですね。\nたったひとつだけは、わかります」
1375 = "「Quả thực, là vậy nhỉ.\nChỉ có một điều duy nhất, là tôi hiểu rõ.」"

# monologue
# JP: ……うそ、すごい。\n全部、全然、少女マンガと違ったのに。
1037 = "......Không thể nào, tuyệt quá.\nTất cả, hoàn toàn khác với shoujo manga\nmà."

# monologue
# JP: ここから先だけ、絶対おんなじ。\nわかる。こんなの、間違えっこない。
1986 = "Chỉ từ lúc này trở đi, chắc chắn sẽ giống\nhệt.\nMình biết. Chuyện này, không thể nào nhầm\nđược."

# 【赤井】
# display as 赤井
# JP: 「ニイロク。私も――君が好きです」
1356 = "「Niiroku. Tôi cũng――thích cô.」"

# monologue
# JP: 清春の顔、近づいてくる。\n無精髭、生えてる。肌、ちょっと荒れてる。
2196 = "Khuôn mặt của Kiyoharu, đang tiến lại gần.\nRâu ria lởm chởm. Làn da, hơi sần sùi một\nchút."

# monologue
# JP: それで、唇――唇、くちびるっ！
2227 = "Và, đôi môi――đôi môi, đôi môi!"

# 【ニイロク】
# display as 二六
# JP: 「！！！」
1452 = "「!!!」"

# monologue
# JP: キス。ちゅって。\n一回だけ、すごく短く。
2249 = "Hôn. Một nụ hôn chụt.\nChỉ một lần, rất ngắn ngủi."

# monologue
# JP: だから――だから。\n短すぎて、わからなくて、知りたくなる。
2288 = "Vì vậy――vì vậy.\nQuá ngắn, chưa kịp hiểu gì, nên lại muốn\nbiết thêm."

# 【ニイロク】
# display as 二六
# JP: 「味、わからない。今のだと。\nだから、清春――もし、よかったら、もう一回」
1393 = "「Chưa biết vị gì cả. Lúc nãy ấy.\nNên là, Kiyoharu――nếu được, thêm một lần\nnữa đi.」"

# monologue
# JP: 清春が、笑う。\nくすって優しく。
2201 = "Kiyoharu, cười.\nCười khúc khích thật dịu dàng."

# monologue
# JP: だからおねだり、素直にできる。
2217 = "Vì vậy, mình có thể ngoan ngoãn đòi hỏi."

# 【ニイロク】
# display as 二六
# JP: 「キスの時間。\nもう少しだけ――長くして？」
1810 = "「Thời gian hôn.\nDài thêm――một chút nữa được không?」"
