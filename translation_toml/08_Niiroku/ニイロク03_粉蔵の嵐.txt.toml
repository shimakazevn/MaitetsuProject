# JP: 「それは誰にもわかりません。ご本人たち以外には。\nですから人前では、反論も同調も禁物です」
1389 = "「別人也不知道他們內心的真實想法。所以你不要在別人面前反駁或者贊同這種言論」" 

# 【ニイロク】
# display as 二六
