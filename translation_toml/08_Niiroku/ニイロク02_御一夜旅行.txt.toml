2167 = "Việc còn lại là đợi đến giờ tan làm......\nBa, hai, một――được rồi!"

# 【ニイロク】
# display as 二六
# JP: 「あの、赤井運転士！」
1808 = "「Cái đó, lái tàu Akai!」"

# 【赤井】
# display as 赤井
# JP: 「ああ、ニイロクさん。お疲れ様です」
1577 = "「A, Niiroku. Cô vất vả rồi.」"

# monologue
