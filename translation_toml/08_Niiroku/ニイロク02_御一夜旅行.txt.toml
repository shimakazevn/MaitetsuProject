# 【ニイロク】
# display as 二六
# JP: 「……なにこれ。勉強にならない。全然。\n\x%l電車;#00ffc040;電車%l;#;、一両も出てこない」
1190 = "「......Cái gì thế này. Chẳng học được gì\ncả. Hoàn toàn không.\n\\x%l電車;#00ffc040;Tàu điện%l;#;, một toa cũng không có.」"

# monologue
# JP: \x%l電車;#00ffc040;電車%l;#;だけじゃない。気動車も。機関車も。\n鉄道要素がまるでない。
2012 = "Không chỉ \\x%l電車;#00ffc040;tàu điện%l;#;. Toa xe tự hành cũng\nkhông. Đầu máy cũng không.\nHoàn toàn không có chút yếu tố đường sắt\nnào."

# 【ニイロク】
# display as 二六
# JP: 「学園も、[しょうわ,1]正和鉄道でも[いわくら,1]岩鞍でもない。\n鉄道員を養成してない」
1796 = "「Ngôi trường này cũng không phải Đường sắt\nShowa hay trường Iwakura.\nKhông đào tạo nhân viên đường sắt.」"

# monologue
# JP: ページを先までめくってみても、やっぱりおなじ。\nシロおねえちゃんが、なんか勘違いしたのかも。
2102 = "Lật tiếp mấy trang nữa, kết quả vẫn y như\nvậy.\nChắc là chị Shiro đã nhầm lẫn ở đâu đó\nrồi."

# 【ニイロク】
# display as 二六
# JP: 「シロおねえちゃん？　いま届く？\n乗務中？？」
1617 = "「Chị Shiro? Chị nghe thấy không?\nĐang làm nhiệm vụ à??」"

# 【シロ】
# display as 四六
# JP: 「あらニイロクちゃん。大丈夫よ？\nいまは、お夕飯の支度中」
1547 = "「Ôi bé Niiroku. Chị nghe đây?\nChị đang chuẩn bị bữa tối.」"

# monologue
# JP: よかった。シロおねえちゃん粉蔵にいた。\n共感、邪魔にならないみたい。
2072 = "May quá. Chị Shiro đang ở Kokura.\nCộng cảm, có vẻ không làm phiền chị ấy."

# 【シロ】
# display as 四六
# JP: 「どうしたの？\nまたお勉強のお悩みかしら？」
1661 = "「Sao thế?\nLại có chuyện gì vướng mắc trong học tập\nà?」"

# 【ニイロク】
# display as 二六
# JP: 「そのこと。借りたマンガ。少女マンガのこと」
1699 = "「Chuyện đó đấy. Quyển manga mượn của chị.\nQuyển shoujo manga ấy.」"

# 【シロ】
# display as 四六
# JP: 「あらら、むつかしすぎた？」
1545 = "「Chà chà, khó quá sao em?」"

# 【ニイロク】
# display as 二六
# JP: 「むつかしいも何も。勉強になるところがない。\n鉄道が出てこないし、学園生だって旗も振らない」
1497 = "「Khó hay không khó gì chứ. Chẳng có chỗ\nnào để học hỏi cả.\nĐường sắt không thấy xuất hiện, học sinh\ntrong trường cũng chẳng vẫy cờ.」"

# 【シロ】
# display as 四六
# JP: 「あらあら」
1541 = "「Chà chà.」"

# monologue
# JP: ケラケラと、シロおねえちゃんの笑いの共感。\n笑われる理由が不明。だから聞く。
2274 = "Qua cộng cảm, tôi nghe thấy tiếng cười\nkhanh khách của chị Shiro.\nKhông rõ lý do tại sao chị ấy lại cười.\nNên tôi phải hỏi."

# 【ニイロク】
# display as 二六
# JP: 「なにがおかしいの？」
1743 = "「Có gì buồn cười sao?」"

# 【シロ】
# display as 四六
# JP: 「鉄道のこと教えられるマンガなんてなくない？\nあたしらレイルロオド相手にさ」
1553 = "「Làm gì có cuốn manga nào dạy được kiến\nthức đường sắt cơ chứ?\nNhất là với những Railord như chúng ta.」"

# 【ニイロク】
# display as 二六
# JP: 「あ。そうかも」
1586 = "「A. Có lẽ vậy.」"

# monologue
# JP: 普段読む技術書とか仕様書とくらべると、\n情報密度、マンガ、かなり薄そう。
2268 = "So với các sách kỹ thuật hay tài liệu đặc\ntả thường đọc,\nmật độ thông tin trong manga có vẻ khá\nmỏng."

# 【ニイロク】
# display as 二六
# JP: 「じゃあ、なんでシロおねえちゃんは」
1860 = "「Vậy, tại sao chị Shiro lại...」"

# 【シロ】
# display as 四六
# JP: 「ニイロクちゃんがあたしに一番相談してくること、\nなぁに？」
1463 = "「Chuyện mà bé Niiroku hay hỏi ý kiến chị\nnhất,\nlà chuyện gì nào?」"

# 【ニイロク】
# display as 二六
# JP: 「決まってる。赤井運転士のこと。\n自分はもっと、赤井運転士とお話ししたい」
1878 = "「Rõ ràng quá rồi. Chuyện của lái tàu Akai.\nEm muốn được nói chuyện nhiều hơn với lái\ntàu Akai.」"

# 【シロ】
# display as 四六
# JP: 「そうよね？　それじゃあ、シロおねえちゃんは、\nニイロクちゃんに何のお勉強させてあげたいかな？」
1641 = "「Đúng không nào? Vậy thì, chị Shiro\nđang muốn bé Niiroku học hỏi điều gì đây\nnhỉ?」"

# 【ニイロク】
# display as 二六
# JP: 「は！\nわかった。と思う。このマンガには、きっと」
1570 = "「A!\nEm hiểu rồi. Chắc vậy. Trong cuốn manga\nnày, chắc chắn có...」"

# monologue
# JP: 回路をパチンと切り替える。\n鉄道のお勉強のためじゃなく。
2135 = "Đóng ngắt mạch điện cái tách.\nKhông phải để học về đường sắt."

# monologue
# JP: 赤井運転士ともっと仲良くなるためのヒント。\nそれがもし、この中にこめられているなら――！
2119 = "Những gợi ý để trở nên thân thiết hơn với\nlái tàu Akai.\nNếu như chúng được ẩn chứa trong cuốn sách\nnày――!"

# 【ニイロク】
# display as 二六
# JP: 「わ――おお――おお――ふむ――ふむ」
1536 = "「Oa——ồ——ồ——hừm——hừm.」"

# 【シロ】
# display as 四六
# JP: 「わかったみたい？　ね。\nじゃ、がんばってね～」
1761 = "「Có vẻ em hiểu rồi nhỉ?\nVậy, cố lên nha~」"

# 【ニイロク】
# display as 二六
# JP: 「あ、うん。ありがと、シロおねえちゃん。\n……えと、つづき――うん――うん――ほおぉ」
1580 = "「A, vâng. Cảm ơn chị Shiro.\n......Ừm, phần tiếp theo——ừm——ừm——ồ.」"

# monologue
# JP: すごい。情報密度。濃い。\nすごい、マンガ。感動的によくわかる。
2087 = "Tuyệt quá. Mật độ thông tin. Dày đặc.\nTuyệt quá, manga. Hiểu rõ đến mức cảm động\nluôn."

# monologue
# JP: 女の子と男の子。どういうふうに仲良くなるか。\n完璧すぎる。これこそ。マニュアル！
2179 = "Con gái và con trai. Làm thế nào để trở\nnên thân thiết.\nQuá hoàn hảo. Đây chính là. Sổ tay hướng\ndẫn!"

# 【ニイロク】
# display as 二六
# JP: 「それに……わかった。\nわかった、気が、する」
1788 = "「Hơn nữa...... em hiểu rồi.\nCó cảm giác, là đã hiểu rồi.」"

# monologue
# JP: 赤井運転士のことをもっと知りたい。\nもっとどんどん仲良くなりたい、この感情。
2150 = "Muốn biết nhiều hơn về lái tàu Akai.\nMuốn ngày càng trở nên thân thiết hơn, thứ\ncảm xúc này."

# monologue
# JP: この感情がなんて名前か、\n自分は、わかったような気がする。
2176 = "Thứ cảm xúc này mang tên là gì,\ntôi có cảm giác mình đã hiểu ra rồi."

# 【ニイロク】
# display as 二六
# JP: 「けど――」
1515 = "「Nhưng mà——」"

# monologue
# JP: 本当にそうか、自信がもてない。\n最新鋭機の自分がもしも、勘違いしたら恥ずかしい。
2127 = "Tôi không tự tin, liệu có thực sự là vậy\nkhông.\nNếu cỗ máy hiện đại nhất là tôi mà lại\nhiểu nhầm thì xấu hổ lắm."

# monologue
# JP: もっと多面的に情報を得て、整理して、\n第三者レビューももらうのがいい。
2278 = "Tốt nhất là nên thu thập thông tin đa\nchiều hơn, tổng hợp lại,\nvà nhờ bên thứ ba đánh giá."

# 【ニイロク】
# display as 二六
# JP: 「うん」
1600 = "「Ừm.」"

# monologue
# JP: もやもやしてたのが、ちょっと変わる。\nなくなったんじゃなくって、もっと膨らんで。
2038 = "Cảm giác bứt rứt trong lòng, đã có chút\nthay đổi.\nKhông phải là biến mất, mà là phình to\nhơn."

# monologue
# JP: 膨らんで――そう。\nもやもやじゃなくて、ふわふわになってる。
2098 = "Phình to hơn——đúng vậy.\nKhông còn là bứt rứt nữa, mà trở nên lâng\nlâng."

# 【ニイロク】
# display as 二六
# JP: 「うん。うん。……うふふふふふ」
1592 = "「Ừm. Ừm. ......Ư fufufufu.」"

# monologue
# JP: 楽しい。幸せ。\nわからないものがわかるの、楽しい。
2094 = "Vui quá. Hạnh phúc quá.\nHiểu được những điều mình chưa biết, thật\nlà vui."

# monologue
# JP: わかってないかもしれないけれど、\n間違いだったら、恥ずかしいけど、それも楽しい。
2284 = "Dù có thể tôi vẫn chưa hiểu rõ,\ndù có nhầm lẫn thì sẽ rất xấu hổ, nhưng\nthế cũng vui."

# 【ニイロク】
# display as 二六
# JP: 「恋。――恋！」
1672 = "「Tình yêu. ——Tình yêu!」"

# monologue
# JP: 恋かどうかを確かめる。まずはそこから。
2302 = "Xác nhận xem đó có phải là tình yêu hay\nkhông. Trước tiên bắt đầu từ đó."

# monologue
# JP: そのための方法だったら、\nこの中に、きっとたくさん詰まってる。
2232 = "Nếu là phương pháp để làm điều đó,\nthì trong cuốn sách này, chắc chắn có chứa\nrất nhiều."

# 【ニイロク】
# display as 二六
# JP: 「読みなおす。今度はちゃんと\nレジュメ作成しながら、読む」
1689 = "「Đọc lại thôi. Lần này phải đàng hoàng\nvừa lập dàn ý, vừa đọc.」"

# monologue
# JP: 一ページだって、一コマだって無駄にしない。\n全部のセリフを、全ての行動を暗記する。
2128 = "Dù chỉ một trang, hay một khung hình cũng\nkhông được bỏ lỡ.\nPhải học thuộc lòng toàn bộ lời thoại,\ntoàn bộ hành động."

# monologue
# JP: それから可能な限り多数回の実践をして、\n分散分析して、必要があれば多重比較。
2207 = "Sau đó thực hành nhiều lần nhất có thể,\nphân tích phương sai, nếu cần thiết thì so\nsánh đa chiều."

# 【ニイロク】
# display as 二六
# JP: 「そうしたら、シロ姉にもレビューしてもらう。\nそれで、恋かどうかを適正に解釈できる……うん！」
1747 = "「Sau đó, nhờ chị Shiro đánh giá giúp.\nNhư vậy, sẽ có thể giải thích chính xác\nxem đó có phải là tình yêu hay không......\nừm!」"

# monologue
# JP: 決めたら、するだけ。自分だったら、必ず出来る。\n最新鋭で最優秀。帝鉄史上最高スペックなんだから。
2171 = "Đã quyết định rồi thì cứ làm thôi. Nếu là\ntôi, chắc chắn sẽ làm được.\nLà hiện đại nhất, xuất sắc nhất. Sở hữu\nthông số kỹ thuật cao nhất trong lịch sử\nĐường sắt Hoàng gia cơ mà."

# 【ニイロク】
# display as 二六
# JP: 「買い物リスト。焼きたてのトースト。\nどこで売ってる？　……ね！　シロおねえちゃん？」
1825 = "「Danh sách mua sắm. Bánh mì nướng mới ra\nlò.\nBán ở đâu nhỉ? ......Nè! Chị Shiro?」"

# 【ニイロク】
# display as 二六
# JP: 「トースト焦げ、良し。寝癖、良し。ブラシ、良し」
1521 = "「Độ cháy của bánh mì, tốt. Tóc vểnh, tốt.\nLược chải, tốt.」"

# monologue
# JP: \x%l指差喚呼;#00ffc040;指差喚呼%l;#;。\n手順もきっちり確認しなおす。
50 = "\\x%l指差喚呼;#00ffc040;Chỉ tay hô xác nhận%l;#;.\nQuy trình cũng phải kiểm tra lại cẩn thận."

# 【ニイロク】
# display as 二六
# JP: 「焦げたトーストくわえる。ブラシ寝ぐせ直す。\n曲がり角、ぶつかる。そのあと、再会」
1520 = "「Ngậm miếng bánh mì nướng hơi cháy. Dùng\nlược chải lại mái tóc vểnh.\nGóc rẽ, va chạm. Sau đó, hội ngộ.」"

# monologue
# JP: うん、完璧。\nけど……一点だけ、自分のスペックでは無理だった。
2053 = "Ừm, hoàn hảo.\nNhưng...... có một điểm duy nhất, với\nthông số kỹ thuật của tôi thì không thể\nlàm được."

# monologue
# JP: いや、諦めるのよくない。\nギリギリまで、粘ってみるべき。
2018 = "Không, bỏ cuộc là không tốt.\nNên kiên trì thử cho đến phút cuối cùng."

# 【ニイロク】
# display as 二六
# JP: 「ひっへはーひ！　ひほふひほふっ！」
1526 = "「Hí ha hi! Hi ho hu hi ho hu!」"

# monologue
# JP: ……やはり。無理。
1153 = "......Quả nhiên. Là không thể."

# monologue
# JP: トーストを口にくわえたままだと、\n『いっけーない！　遅刻遅刻っ』って、言えない。
2047 = "Nếu cứ ngậm bánh mì trong miệng,\nthì không thể nói 'Chết rồi! Trễ mất trễ\nmất' được."

# 【ニイロク】
# display as 二六
# JP: 「でも、マンガではやってる。\n絶対、解決方法はあるはず……」
1452 = "「Nhưng, trong manga vẫn làm được mà.\nChắc chắn, phải có cách giải quyết\nchứ......」"

# 【ニイロク】
# display as 二六
# JP: 「仮説をたてて検証する。いつものルーチン。\n大丈夫。自分のスペックなら必ず矛盾を解消できる」
1872 = "「Lập giả thuyết và kiểm chứng. Vẫn là quy\ntrình thường ngày.\nKhông sao. Với thông số kỹ thuật của mình,\nnhất định có thể giải quyết được mâu thuẫn\nnày.」"

# 【赤井】
# display as 赤井
# JP: 「おや、ニイロクさんおはようござ――おっと、\n[かんがえごと,3]演算処理の最中でしたか」
1579 = "「Ô, chào buổi sáng Niiroku――Ái chà,\ncô đang trong quá trình xử lý tính toán\nsao.」"

# 【ニイロク】
# display as 二六
# JP: 「仮説16。鼻と上唇の間でパンを保持している。\n[リジェクト,3]仮説却下。ビジュアル的に恋が芽生えなくなる」
1498 = "「Giả thuyết 16. Giữ bánh mì giữa mũi và\nmôi trên.\nBác bỏ giả thuyết. Về mặt hình ảnh sẽ làm\nmất đi cảm giác nảy nở tình yêu.」"

# 【赤井】
# display as 赤井
# JP: 「……お邪魔をしては悪そうですね。\nそれではニイロクさん、またのちほど」
1205 = "「......Có vẻ như tôi đang làm phiền cô\nrồi.\nVậy thì Niiroku, hẹn gặp lại sau nhé.」"

# 【ニイロク】
# display as 二六
# JP: 「仮説31。[リジェクト,1]却下。仮説32。却下。仮説33――\nじゃない！　時間。赤井運転士が来ちゃう」
1499 = "「Giả thuyết 31. Bác bỏ. Giả thuyết 32. Bác\nbỏ. Giả thuyết 33――\nKhông phải! Thời gian. Lái tàu Akai sắp\nđến rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「来た！？　はわわ！　あ、すごい、マンガの通り。\nじゃなくて――はむっ！　ん！　ひははひゃ！」
1770 = "「Đến rồi!? Hawawa! A, tuyệt quá, y như\ntrong manga.\nKhông phải――ngoạm! Ưm! Hi ha ha hya!」"

# 【ニイロク】
# display as 二六
# JP: 「ひっへはーひ！　ひほふひほふっ！！」
1527 = "「Hí ha hi! Hi ho hu hi ho hu!!」"

# 【電車区長】
# display as ？？？
# JP: 「うおっ！！？」
1557 = "「U oá!!?」"

# monologue
# JP: （どっし～～ん！！）
2332 = "（Rầm!!）"

# 【ニイロク】
# display as 二六
# JP: 「『きゃっ！？』」
1213 = "「『Á!?』」"

# 【電車区長】
# display as ？？？
# JP: 「イテテテ――おお、大丈夫と？」
1634 = "「Ui da――ồ, cô không sao chứ?」"

# 【ニイロク】
# display as 二六
# JP: 「『だ、大丈夫ですっ』――って？　え？　\n――“と”？」
1166 = "「『Tôi, tôi không sao』――hả? Hả?\n――'Chứ'?」"

# 【電車区長】
# display as 電車段長
# JP: 「ニイロクと？\nご自慢のセンサーば、どぎゃんした？」
1467 = "「Niiroku hả?\nCái cảm biến đáng tự hào của cô, bị sao\nvậy?」"

# 【ニイロク】
# display as 二六
# JP: 「電車区長！？\nなんで！？　なんで電車区長！？」
1900 = "「Đoạn trưởng xe điện!?\nTại sao!? Tại sao lại là Đoạn trưởng xe\nđiện!?」"

# 【電車区長】
# display as 電車段長
# JP: 「なんでもかんでも、出会い頭やけん――ん？\nなぁんでこぎゃんとこに焦げたトーストば？」
1659 = "「Chuyện gì ra chuyện đó, đâm sầm vào nhau\nthì――hửm?\nSao ở chỗ này lại có miếng bánh mì nướng\ncháy thế kia?」"

# 【ニイロク】
# display as 二六
# JP: 「な、な、なんでもない！　乗務。試験。\nあの。自分。乗務。いく。ます。失礼っ」
1726 = "「Kh-Kh-Không có gì! Nhiệm vụ. Thử nghiệm.\nCái đó. Tôi. Đi. Làm. Nhiệm vụ đây. Xin\nphép.」"

# 【電車区長】
# display as 電車段長
# JP: 「最新鋭機がおかしか挙動ば、冗談にもならん――\nああ、いや……ま、同じことかの……」
1802 = "「Cỗ máy hiện đại nhất mà có hành động kỳ\nlạ thì không phải chuyện đùa đâu――\nA, không...... chà, chắc cũng giống nhau\nthôi......」"

# 【ニイロク】
# display as 二六
# JP: 「……こないだのは、失敗に含まれない。\nなぜなら、『自分と赤井運転士はもう出会ってる』」
1182 = "「......Lần trước, không được tính là thất\nbại.\nBởi vì, 'Tôi và lái tàu Akai đã gặp nhau\nrồi'.」"

# monologue
# JP: 前提条件が間違ってたから、\n適切ではない結果が返った。それだけのこと。
2170 = "Vì điều kiện tiền đề đã sai,\nnên kết quả trả về không phù hợp. Chỉ vậy\nthôi."

# 【ニイロク】
# display as 二六
# JP: 「必要なのは、『出会ってからの好感度アップ』。\nそのための最適解は、『フリースロー』」
1749 = "「Điều cần thiết là 'Tăng độ hảo cảm sau\nkhi gặp mặt'.\nGiải pháp tối ưu cho việc đó là 'Ném\nphạt'.」"

# monologue
# JP: 第一印象は最悪のアイツ。\nけど、放課後の体育館で一人で秘密の特訓。
2205 = "Ấn tượng đầu tiên về hắn ta cực kỳ tồi tệ.\nNhưng, hắn lại bí mật tập luyện một mình\ntrong nhà thể chất sau giờ học."

# monologue
# JP: 信じられないようなフリースローが鮮やかに決まって\nヒロインの胸がきゅん！　ってなる。
2214 = "Cú ném phạt đẹp mắt đến khó tin đã ghi bàn\nkhiến trái tim nữ chính rung động! Là vậy\nđó."

# 【ニイロク】
# display as 二六
# JP: 「男女を入換え、自分がフリースローする。\n赤井運転士の胸がきゅん！　好感度は確実に上昇」
1855 = "「Hoán đổi nam nữ, mình sẽ là người ném\nphạt.\nTrái tim lái tàu Akai sẽ rung động! Độ hảo\ncảm chắc chắn sẽ tăng.」"

# monologue
# JP: 計算はこれで間違いないし、\nそのための特訓も十分にした。
2249 = "Tính toán như vậy là không sai,\nmình cũng đã tập luyện đủ cho việc đó rồi."

# monologue
