1184 = "「......Nguyên nhân thất bại lần trước rất\nrõ ràng.\nĐó là 'xung quanh có quá nhiều người'.」"

# monologue
# JP: 同じ失敗を繰り返すなんて、最新鋭機には――\nううん、鉄道従事者には許されないこと。
2133 = "Lặp lại cùng một sai lầm, đối với cỗ máy\nhiện đại nhất――\nKhông, đối với người làm đường sắt là điều\nkhông thể chấp nhận được."

# 【ニイロク】
# display as 二六
# JP: 「鉄道は経験工学。自分はその集大成。大丈夫――\nこのプランなら、ただ赤井運転士を待てばいい」
1891 = "「Đường sắt là ngành kỹ thuật dựa trên kinh\nnghiệm. Mình chính là sự đúc kết của những\nđiều đó. Không sao――\nVới kế hoạch này, chỉ cần đợi lái tàu Akai\nlà được.」"

# monologue
# JP: 終業後すぐの外出予定は確認してる。\n赤井運転士が傘を持って出てないことも。
2138 = "Đã xác nhận lịch trình đi ra ngoài ngay\nsau giờ làm việc.\nCả việc lái tàu Akai không mang theo ô khi\nra ngoài nữa."

# monologue
# JP: ここなら絶対、赤井運転士が通るはずだし、\nこの雨で、こんなところで長話する人もいないはず。
2154 = "Ở đây thì chắc chắn lái tàu Akai sẽ đi\nngang qua,\nvà với cơn mưa này, cũng sẽ chẳng có ai\nđứng nói chuyện phiếm ở một nơi như thế\nnày."

# 【ニイロク】
# display as 二六
# JP: 「セリフも簡単。くわえるパンも無いから、明瞭。\n『傘ないの？　もう、しょうがないなぁ、ほら』」
1517 = "「Lời thoại cũng đơn giản. Không ngậm bánh\nmì nên phát âm cũng rõ ràng.\n'Anh không có ô sao? Thiệt tình, hết cách\nvới anh, đây này'.」"

# 【赤井】
# display as 赤井
# JP: 「おや、ニイロクさん」
1542 = "「Ô, Niiroku.」"

# 【ニイロク】
# display as 二六
# JP: 「わわ！？　もう来たっ！！？」
1538 = "「Oa oa!? Đã đến rồi sao!!?」"

# 【赤井】
# display as 赤井
# JP: 「え？　何か早すぎましたか？」
1606 = "「Hả? Tôi đến hơi sớm sao?」"

# 【ニイロク】
# display as 二六
# JP: 「う、ううん。早すぎない。ジャストタイミング」
1727 = "「Kh-Không. Không sớm đâu. Rất đúng lúc.」"

# 【赤井】
# display as 赤井
# JP: 「ジャスト？　ああ、私にご用でしたか」
1495 = "「Đúng lúc? À, cô có việc tìm tôi sao.」"

# 【ニイロク】
# display as 二六
# JP: 「あ、うん」
1582 = "「A, ừm.」"

# monologue
# JP: この流れなら、絶対言える。\nいうだけ。『傘ないの？』って
2209 = "Theo mạch này, chắc chắn có thể nói được.\nChỉ cần nói. 'Anh không có ô sao?'"

# monologue
# JP: ん？　でも、この流れだと、\n会話、全然つながってない。
2055 = "Hửm? Nhưng mà, theo mạch này thì,\ncâu chuyện hoàn toàn không ăn nhập với\nnhau."

# 【赤井】
# display as 赤井
# JP: 「ニイロクさん？」
1457 = "「Niiroku?」"

# monologue
# JP: もう少しだけ組み立てないと――
2104 = "Phải sắp xếp lại một chút mới được――"

# 【ニイロク】
# display as 二六
# JP: 「ええと……お天気」
1866 = "「Cái đó...... Thời tiết」"

# 【赤井】
# display as 赤井
# JP: 「ええ、ひどい雨ですねぇ。\n傘を取りに戻るのが面倒です」
1551 = "「Ừm, mưa to thật đấy.\nQuay lại lấy ô thì phiền phức quá.」"

# 【ニイロク】
# display as 二六
# JP: 「来た！　『傘ないの？』」
1494 = "「Đến rồi! 'Anh không có ô sao?'」"

# 【赤井】
# display as 赤井
# JP: 「そうなんですよ。ニイロクさんと同じですね」
1697 = "「Đúng vậy đấy. Giống như Niiroku thôi.」"

# 【ニイロク】
# display as 二六
# JP: 「『もう、しょうがないなぁ――』……って、\nあれ？　あれれ？　傘――ないのっ！？？」
1168 = "「『Thiệt tình, hết cách với anh――』......Ơ,\nHả? Hả hả? Ô――không có sao!!?」"

# monologue
# JP: ない。ない。ない。信じられない。ありえない。\n手順ばかりを意識して、必要装備を忘れるだとか。
2190 = "Không có. Không có. Không có. Không thể\ntin được. Không thể nào.\nChỉ chăm chăm vào các bước mà quên mất\ntrang bị cần thiết."

# monologue
# JP: そんなの絶対。あるわけない。\nけど――やっぱり、ない。
2276 = "Chuyện đó tuyệt đối. Không thể nào xảy ra.\nNhưng――quả nhiên là, không có."

# 【赤井】
# display as 赤井
# JP: 「本当、しょうがないですよね。\n置き傘もこの急な雨で全滅ですし」
1702 = "「Thật sự, hết cách luôn nhỉ.\nÔ dùng chung cũng hết sạch vì cơn mưa đột\nngột này rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「どうしようもない。忘れた――傘。\n\x%l指差喚呼;#00ffc040;指差喚呼%l;#;するの、忘れてた」
1850 = "「Hết cách rồi. Quên――ô rồi.\nQuên mất, không \\x%l指差喚呼;#00ffc040;chỉ tay hô xác nhận%l;#;.」"

# 【赤井】
# display as 赤井
# JP: 「職務でもなし、そこまで落ち込むようなことでも。\nなに、わたしがひとっ走り宿舎まで――おや」
1649 = "「Cũng đâu phải nhiệm vụ, không cần phải ủ\nrũ đến thế đâu.\nKhông sao, tôi sẽ chạy ù về ký túc xá một\nchuyến――ô hay.」"

# 【電車区長】
# display as 電車段長
# JP: 「赤井くん。こぎゃんところで――\nああ、傘忘れたと？　や、ニイロクも」
1837 = "「Cậu Akai. Sao lại ở chỗ này――\nÀ, quên mang ô sao? Ây, cả Niiroku nữa.」"

# monologue
# JP: 電車区長。また。\nああ――しかも――傘……置き傘、足しに来たんだ。
2109 = "Đoạn trưởng xe điện. Lại nữa.\nA――hơn nữa――ô...... ông ấy mang ô dùng\nchung đến bổ sung."

# 【赤井】
# display as 赤井
# JP: 「ああ、電車区長はさすがに用意がいいですね」
1701 = "「A, Đoạn trưởng xe điện quả nhiên chuẩn bị\nchu đáo thật.」"

# 【電車区長】
# display as 電車段長
# JP: 「責任者やけん。\nほい。ほい」
1534 = "「Vì là người chịu trách nhiệm mà.\nĐây. Đây.」"

# 【赤井】
# display as 赤井
# JP: 「ありがとうございます、助かります」
1650 = "「Cảm ơn ông, may quá.」"

# 【ニイロク】
# display as 二六
# JP: 「ありがとう。助かる。けど。……ううん。\n失敗したのは自分。自分に、全ての責任がある」
1814 = "「Cảm ơn. May quá. Nhưng. ......Không.\nNgười thất bại là tôi. Mọi trách nhiệm đều\nthuộc về tôi.」"

# 【赤井】
# display as 赤井
# JP: 「……ニイロクさん？\n何か思い詰めているのですか？」
1187 = "「......Niiroku?\nCô đang bận tâm chuyện gì sao?」"

# 【ニイロク】
# display as 二六
# JP: 「ううん。平気。それより、赤井運転士。\n時間。大丈夫？」
1729 = "「Không. Tôi không sao. Hơn nữa, lái tàu\nAkai.\nThời gian. Ổn chứ?」"

# 【赤井】
# display as 赤井
# JP: 「あっとそうでした。それじゃ、区長！\nすみませんが、傘、お借りします！」
1546 = "「A, đúng rồi. Vậy, Đoạn trưởng!\nXin lỗi, tôi mượn ô nhé!」"

# 【電車区長】
# display as 電車段長
# JP: 「んー。気ぃつけて」
1589 = "「Ừm. Đi cẩn thận nhé.」"

# 【ニイロク】
# display as 二六
# JP: 「気をつけて！　いってらっしゃい！」
1436 = "「Đi cẩn thận nhé! Đi đường bình an!」"

# 【赤井】
# display as 赤井
# JP: 「はい、いってきます！　ニイロクさん」
1602 = "「Vâng, tôi đi đây! Niiroku.」"

# 【ニイロク】
# display as 二六
# JP: 「っ！！！　うん。うん！　『いってらっしゃい』。\nふっ……うふふ――うふふふふ」
1571 = "「!!! Ừm. Ừm! 'Đi đường bình an'.\nHừm...... ư fufu――ư fufufufu.」"

# 【電車区長】
# display as 電車段長
# JP: 「『いってらっしゃい』『いってきます』ば、\nそぎゃんと嬉しかったとか」
1809 = "「'Đi đường bình an', 'Tôi đi đây',\ncô vui đến thế cơ à.」"

# 【ニイロク】
# display as 二六
# JP: 「うん。嬉しい。すごく、しあわせ――\nって、はわっ！？　電車区長」
1599 = "「Ừm. Vui lắm. Rất, hạnh phúc――\nỚ, ha wa!? Đoạn trưởng xe điện.」"

# 【電車区長】
# display as 電車段長
# JP: 「よかよか。誰の目にもバレバレのことやけん。\n赤井運転士と、もっとなかようになりたかとやろ？」
1728 = "「Được rồi được rồi. Ai nhìn vào cũng thấy\nrõ mồn một mà.\nCô muốn trở nên thân thiết hơn với lái tàu\nAkai chứ gì?」"

# 【ニイロク】
# display as 二六
# JP: 「――うん」
1162 = "「――Ừm.」"

# monologue
# JP: バレバレ。\n言われた。"誰の目にも"って。
2238 = "Rõ mồn một.\nBị nói rồi. 'Ai nhìn vào cũng thấy rõ' cơ\nđấy."

# monologue
# JP: なら、なら――赤井運転士も、気づいてる？\nあ、っていうか――なら！
2279 = "Vậy, vậy thì――lái tàu Akai, cũng nhận ra\nrồi sao?\nA, mà nói đúng hơn là――nếu vậy!"

# 【ニイロク】
# display as 二六
# JP: 「気づいてるのに。どうして、邪魔」
1492 = "「Rõ ràng là đã nhận ra. Vậy tại sao, lại\nlàm phiền.」"

# 【電車区長】
# display as 電車段長
# JP: 「邪魔ばしとらんよー。\nどこが、なんの邪魔とや？」
1812 = "「Tôi đâu có làm phiền gì đâu.\nChỗ nào, làm phiền cái gì chứ?」"

# 【ニイロク】
# display as 二六
# JP: 「今も。だって――あ。違う。\n今のも……今までのも、自分の、ミス」
1508 = "「Cả lúc nãy nữa. Bởi vì――a. Không phải.\nLúc nãy...... cả những lúc trước đó, đều\nlà do, lỗi của tôi.」"

# 【電車区長】
# display as 電車段長
# JP: 「どぎゃんこつね？」
1662 = "「Là chuyện gì vậy?」"

# monologue
# JP: ……話してもいい。そう思う。\n自分はだって、最新鋭。大事にされるに決まってる。
1151 = "......Kể ra cũng được. Mình nghĩ vậy.\nBởi vì mình, là cỗ máy hiện đại nhất. Chắc\nchắn sẽ được coi trọng."

# 【ニイロク】
# display as 二六
# JP: 「うん。\n自分は、良い計画を立てたつもりだった」
1597 = "「Ừm.\nTôi, cứ tưởng mình đã lập ra một kế hoạch\nrất hoàn hảo.」"

# 【電車区長】
# display as 電車段長
# JP: 「ほう？」
1615 = "「Hô?」"

# monologue
# JP: プラン。実行。そこから検証した結果。\nそれを順番に話してく。
2140 = "Kế hoạch. Thực hiện. Kết quả kiểm chứng từ\nđó.\nTôi kể lại mọi chuyện theo trình tự."

# monologue
# JP: レビュー貰うのシロおねえちゃんって思ってたけど、\n電車区長からも貰えば精度はもっとあがるし。
2275 = "Dù định nhờ chị Shiro đánh giá,\nnhưng nếu có thêm đánh giá từ Đoạn trưởng\nxe điện thì độ chính xác sẽ càng cao hơn."

# 【電車区長】
# display as 電車段長
# JP: 「……別に誰にも邪魔されとらんばい。\nゆーかの、そもそも失敗もしてなかろーとや」
1201 = "「......Đâu có ai làm phiền cô đâu.\nMà nói đúng hơn, ngay từ đầu cô đã không\nthất bại rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「でも！？　だって」
1442 = "「Nhưng!? Bởi vì」"

# 【電車区長】
# display as 電車段長
# JP: 「マンガんこつ、とんとん拍子にはいかんとよ。\n極端に[えが]描きよるから、マンガやけんね」
1443 = "「Chuyện trong manga, đâu phải lúc nào cũng\nsuôn sẻ được.\nBởi vì nó được vẽ phóng đại lên, nên mới\nlà manga chứ.」"

# 【ニイロク】
# display as 二六
# JP: 「わ！」
1539 = "「Oa!」"

# monologue
# JP: すごい、電車区長。\nさすがトップって初めて思った。感心した。
2086 = "Tuyệt quá, Đoạn trưởng xe điện.\nLần đầu tiên tôi thấy ông ấy đúng là người\nđứng đầu. Thật đáng khâm phục."

# 【電車区長】
# display as 電車段長
# JP: 「とんとん拍子に進まんでも、\nじわじわは、仲良ぅなれとろーもんよ」
1445 = "「Dù không suôn sẻ ngay lập tức,\nnhưng cứ từ từ, rồi sẽ thân thiết hơn\nthôi.」"

# 【ニイロク】
# display as 二六
# JP: 「ホント！？　なれてる？　じわじわ仲良く。\nそれって、どうやったら検証できる？」
1772 = "「Thật sao!? Trở nên thân thiết hơn? Từ từ\nthân thiết.\nLàm sao để kiểm chứng điều đó?」"

# 【電車区長】
# display as 電車段長
# JP: 「そら、赤井くんに聞くしかなかばい。\nあん男なら、まぁ正直に答えてくれよーよ」
1870 = "「Thì, chỉ còn cách hỏi cậu Akai thôi.\nNếu là cậu ta, chà, chắc sẽ trả lời thành\nthật thôi.」"

# 【ニイロク】
# display as 二六
# JP: 「聞く。赤井運転士に。直接」
1758 = "「Hỏi. Lái tàu Akai. Trực tiếp.」"

# monologue
# JP: ダメ。無理。\n一番最初に、思考しちゃう。
2148 = "Không được. Không thể nào.\nĐó là suy nghĩ đầu tiên nảy ra trong đầu\ntôi."

# monologue
# JP: 回路が勝手に加熱して、\n論理的には飛んだ結論を勝手に出しちゃう。
2149 = "Mạch điện tự động nóng lên,\nvà tự đưa ra một kết luận vượt xa khỏi\ntính logic."

# 【ニイロク】
# display as 二六
# JP: 「聞けない。そんなの。だって。そんなの」
1854 = "「Không hỏi được. Chuyện đó. Bởi vì. Chuyện\nđó.」"

# 【電車区長】
# display as 電車段長
# JP: 「怖かとか？　答えば聞くんが」
1664 = "「Sợ à? Sợ nghe câu trả lời sao?」"

# 【ニイロク】
# display as 二六
# JP: 「っ！！」
1524 = "「Ư!!」"

# monologue
# JP: 怖くなんてない。\n検証しなくちゃ、修正できない。
2110 = "Đâu có sợ.\nNếu không kiểm chứng, thì không thể sửa\nchữa được."

# monologue
# JP: 論理ではそう追えるのに、\n頭が勝手に、壊れたみたいにうなずいちゃってる。
2174 = "Dù logic bảo là vậy,\nnhưng cái đầu lại tự động gật lia lịa như\nbị hỏng."

# 【電車区長】
# display as 電車段長
# JP: 「……怖くて黙っておけるくらいの思いなら、\n黙ってしまっておくほうが、きっと良かとよ」
1199 = "「......Nếu đó là cảm xúc khiến cô sợ đến\nmức phải giữ im lặng,\nthì cứ giữ im lặng như vậy, chắc chắn sẽ\ntốt hơn đấy.」"

# 【ニイロク】
# display as 二六
# JP: 「あ――」
1562 = "「A――」"

# monologue
# JP: 怖い、って思う。\nそれはなんだか、回路外の、もっと深くで思ってる。
2146 = "Thấy sợ.\nCảm giác đó như đến từ một nơi sâu thẳm\nhơn, nằm ngoài mạch điện."

# monologue
# JP: けど――聞きたいって、\nやっぱり深く、自分の[コア]核が、囁いてる。
2043 = "Nhưng――vẫn muốn hỏi,\ntừ sâu thẳm, [lõi] cốt lõi của mình, đang thì\nthầm như vậy."

# 【ニイロク】
# display as 二六
# JP: 「怖くても――黙っていられなくなるの？\nそれが、恋なの？」
1644 = "「Dù có sợ――nhưng vẫn không thể giữ im lặng\nđược sao?\nĐó, là tình yêu sao?」"

# 【電車区長】
# display as 電車段長
# JP: 「ワシん場合は、そぎゃんじゃったの」
1676 = "「Trong trường hợp của tôi, là như vậy\nđấy.」"

# 【ニイロク】
# display as 二六
# JP: 「そうなんだ」
1853 = "「Ra là vậy.」"

# monologue
# JP: 知りたい、もっと。\n自分の今の気持ちが――これが、恋なのか。
2092 = "Muốn biết, nhiều hơn nữa.\nCảm xúc hiện tại của mình――đây, có phải là\ntình yêu không."

# monologue
# JP: 知りたいし、知らなきゃいけない。\nそうしなくっちゃ、きっとずうっと、悔み続ける。
2009 = "Muốn biết, và bắt buộc phải biết.\nNếu không làm vậy, chắc chắn mình sẽ hối\nhận mãi mãi."

# 【ニイロク】
# display as 二六
# JP: 「……自分、は」
1198 = "「......Mình, thì」"

# 【電車区長】
# display as 電車段長
# JP: 「ま、じっくり考えてみるとよか」
1784 = "「Chà, cứ suy nghĩ kỹ đi.」"

# 【ニイロク】
# display as 二六
# JP: 「あ」
# 1564 = "「啊」" 

# monologue
# JP: 電車区長が傘をさす。\n雨の中、どんどん先に進んでく。
2298 = "Đoạn trưởng xe điện bung ô.\nĐi thẳng về phía trước trong màn mưa."

# 【電車区長】
# display as 電車段長
# JP: 「いずれ決断ば迫られるけん。そん日まで――\n悩めるだけを悩んどくのも、悪くなかとよ」
1514 = "「Sớm muộn gì cũng sẽ phải đưa ra quyết\nđịnh thôi. Cho đến ngày đó――\ncứ phiền não bao nhiêu tùy thích, cũng\nkhông tồi đâu.」"

# 【赤井】
# display as 赤井
# JP: 「ニイロクさん。ニイロクさん。\nそろそろ起きてください」
1455 = "「Niiroku. Niiroku.\nĐã đến lúc phải dậy rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「ふにゅ？」
1525 = "「Fu nyu?」"

# 【ニイロク】
# display as 二六
# JP: 「あれ？　赤井運転士。ええと……ここ、は」
1532 = "「Ơ? Lái tàu Akai. Ừm...... đây, là」"

# 【赤井】
# display as 赤井
# JP: 「よほど深く眠られてたんですね。\nここは御一夜温泉駅。御一夜の中心地ですよ？」
1760 = "「Cô ngủ say thật đấy.\nĐây là ga suối nước nóng Ohimitera. Trung\ntâm của Ohimitera đấy?」"

# 【ニイロク】
# display as 二六
# JP: 「あぅ」
# 1564 = "「啊」" 

# monologue
# JP: 恥ずかしい。ほんとにぐっすり寝ちゃってたんだ。\nけど――ええと――。
2080 = "Xấu hổ quá. Mình thực sự đã ngủ say sưa.\nNhưng――ừm――."

# 【ニイロク】
# display as 二六
# JP: 「いつ？　寝ちゃったの？　自分」
1674 = "「Lúc nào? Tôi ngủ lúc nào vậy?」"

# 【赤井】
# display as 赤井
# JP: 「四回目の乗車の復路からですね。\n私が、『必要なデータは全部取れましたね』と」
1653 = "「Từ chuyến khứ hồi của lần lên tàu thứ tư.\nKhi tôi nói, 'Đã thu thập đủ dữ liệu cần\nthiết rồi nhỉ'.」"

# 【ニイロク】
# display as 二六
# JP: 「あ、そう。それですごくホっとして」
1584 = "「A, đúng rồi. Lúc đó tôi đã thở phào nhẹ\nnhõm.」"

# 【赤井】
# display as 赤井
# JP: 「よほど集中してくれてたんですね。\nあくびをしたな、と思ったらコトン、って」
1484 = "「Chắc cô đã tập trung cao độ lắm nhỉ.\nVừa thấy cô ngáp một cái, thoắt cái đã ngủ\ngục rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「はうぅ」
1565 = "「Ha ư」"

# monologue
# JP: 恥ずかしい。集中して頑張ってたのは当然のこと。\nだけど、だけど、その前に自分、寝不足だった。
2079 = "Xấu hổ quá. Việc tập trung cố gắng là điều\nđương nhiên.\nNhưng mà, nhưng mà, trước đó mình đã bị\nthiếu ngủ."

# monologue
# JP: だって――だって――
2065 = "Bởi vì――bởi vì――"

# 【電車区長】
# display as 電車段長
# JP: 「[ゆのいせん,2]湯医線の視察に誰ぞ――あ、赤井君の出身地よな。\nどぎゃんと？　ニイロクば連れて行ってくれんね？」
1738 = "「Ai đi thị sát tuyến Yunoi đây――A, quê của\ncậu Akai nhỉ.\nSao nào? Cậu dẫn Niiroku đi cùng nhé?」"

# 【シロ】
# display as 四六
# JP: 「チャンスよ～、またとない大チャンス！\nここで一発、告白、決めてきちゃったら？？」
1851 = "「Cơ hội đó~, cơ hội ngàn năm có một!\nHay là nhân dịp này, chốt hạ tỏ tình luôn\nđi??」"

# 【ニイロク】
# display as 二六
# JP: 「ふあぁ～――っ！？\nぅぅっ……自分、考えすぎて」
1563 = "「Fuaa~――!?\nƯ ư...... do tôi, suy nghĩ nhiều quá」"

# 【赤井】
# display as 赤井
# JP: 「そのおかげで必要十分以上のデータが取れました。\nありがとうございます、ニイロクさん」
1629 = "「Nhờ vậy mà chúng ta đã thu thập được dữ\nliệu nhiều hơn cả mức cần thiết.\nCảm ơn cô, Niiroku.」"

# 【ニイロク】
# display as 二六
# JP: 「ううん！？　そんなの。ええと、だって――\n当然。お仕事、一生懸命するの、当然」
1574 = "「Không!? Chuyện đó. Ừm, bởi vì――\nĐương nhiên mà. Công việc thì phải cố gắng\nhết sức, là chuyện đương nhiên.」"

# 【赤井】
# display as 赤井
# JP: 「そのおかげで時間に余裕ができました。\nどうします？　御一夜を観光でもしますか？」
1623 = "「Nhờ vậy mà chúng ta có dư dả thời gian.\nSao đây? Cô có muốn tham quan Ohimitera\nmột chút không?」"

# 【ニイロク】
# display as 二六
# JP: 「観光！　したい！！　したい。けど――」
1512 = "「Tham quan! Muốn!! Tôi muốn. Nhưng――」"

# 【赤井】
# display as 赤井
# JP: 「けど？」
1516 = "「Nhưng?」"

# 【ニイロク】
# display as 二六
# JP: 「あの……ええと……その。\nもし、迷惑じゃ、なかったら――だけど」
1857 = "「Cái đó...... ừm...... thì.\nNếu, không phiền――thì」"

# 【赤井】
# display as 赤井
# JP: 「頑張ってくれましたからね。いいですよ？\n遠慮無く、なんでもおねだりしてみてください」
1491 = "「Vì cô đã cố gắng rất nhiều mà. Được thôi?\nĐừng ngại, cứ thử đòi hỏi bất cứ thứ gì\nxem.」"

# 【ニイロク】
# display as 二六
# JP: 「おねだり！」
1903 = "「Đòi hỏi!」"

# monologue
# JP: すごく、いい。\nおねだり、したい。おねだり、すごく、恋な感じ。
2215 = "Rất, tốt.\nMuốn, đòi hỏi. Đòi hỏi, cảm giác rất\ngiống, đang yêu."

# 【ニイロク】
# display as 二六
# JP: 「あの。おねだり――ええと――\nいくつ、平気？」
1868 = "「Cái đó. Đòi hỏi――ừm――\nBao nhiêu cái, thì được?」"

# 【赤井】
# display as 赤井
# JP: 「いくつ、ですか……そうですね。\n一往復につきひとつで――みっつ？　あたりで」
1628 = "「Bao nhiêu cái, sao...... Để xem nào.\nMỗi vòng khứ hồi một cái――khoảng ba cái?\nNhỉ.」"

# 【ニイロク】
# display as 二六
# JP: 「じゃあひとつめ！　自分は、その――\n赤井運転士のこと、下のお名前で呼びたい――です」
1877 = "「Vậy thì cái đầu tiên! Tôi, ừm――\nMuốn gọi lái tàu Akai, bằng tên――được\nkhông.」"

# 【赤井】
# display as 赤井
# JP: 「下の名前……清春ですか？」
1685 = "「Tên...... Kiyoharu sao?」"

# 【ニイロク】
# display as 二六
# JP: 「う、うん。清春。きよはる――きよはる、って」
1593 = "「Ừ, ừm. Kiyoharu. Kiyoharu――là Kiyoharu.」"

# 【赤井】
# display as 赤井
# JP: 「職務中でなければ、構いませんよ？\n二人でのミーティングのときや、こういうときには」
1587 = "「Nếu không phải trong lúc làm nhiệm vụ thì\nkhông sao đâu?\nTrong những lúc họp riêng hai người, hay\nnhững lúc như thế này.」"

# 【ニイロク】
# display as 二六
# JP: 「なら呼ぶ！　いま呼ぶ！　ええと――ええと！\nきよはる――清春！」
1875 = "「Vậy thì gọi! Gọi bây giờ luôn! Ừm――ừm!\nKiyoharu――Kiyoharu!」"

# 【赤井】
# display as 赤井
# JP: 「はい、なんでしょう？　ニイロクさん」
1660 = "「Vâng, có chuyện gì vậy? Niiroku.」"

# monologue
# JP: すごい。電車区長のいってたとおり。\nシロおねえちゃんの共感どおり！
2088 = "Tuyệt quá. Đúng như lời Đoạn trưởng xe\nđiện nói.\nĐúng như những gì chị Shiro chia sẻ qua\ncộng cảm!"

# monologue
# JP: 一緒に旅行したらこんなに！\n赤井運転士――ううん、清春が近くなった！！
2040 = "Chỉ cần đi du lịch cùng nhau là thế này\nđây!\nLái tàu Akai――không, Kiyoharu đã trở nên\ngần gũi hơn rồi!!"

# 【ニイロク】
# display as 二六
# JP: 「おねだり！　ふたつめ！　あの、ふたつめ！」
1880 = "「Đòi hỏi! Cái thứ hai! Cái đó, cái thứ\nhai!」"

# 【赤井】
# display as 赤井
# JP: 「二つ目ですね？　なんでしょう」
1782 = "「Cái thứ hai nhỉ? Là gì vậy.」"

# monologue
# JP: 近くになったら、もっと、もっとって。\n気持ち、どんどんふくらんでいく。
2051 = "Khi đã trở nên gần gũi hơn, lại muốn thêm,\nthêm nữa.\nCảm xúc, ngày càng phình to."

# monologue
# JP: 怖いのはずっとあるけどそれでも、\n心の中に、閉じ込めてなんておけないくらいに！
2285 = "Dù nỗi sợ hãi vẫn luôn hiện hữu nhưng,\nđã đến mức không thể nhốt chặt trong lòng\nđược nữa!"

# 【ニイロク】
# display as 二六
# JP: 「自分のことも呼び捨ててほしい。\nニイロクって。さん、つけなくって」
1681 = "「Tôi cũng muốn anh gọi trống không tên\ntôi.\nLà Niiroku. Đừng thêm chữ 'san' nữa.」"

# 【赤井】
# display as 赤井
# JP: 「お安いご用です。ニイロク。\n……これでいいですか？」
1756 = "「Chuyện nhỏ thôi. Niiroku.\n......Thế này được chưa?」"

# 【ニイロク】
# display as 二六
# JP: 「～～～～～～っ！！！！」
1561 = "「~~~~~~!!!!」"

# monologue
# JP: 回路、いま自分焼き切れた。\n熱暴走してエラー出て頭ぶんぶん振るしか出来ない！
2066 = "Mạch điện, giờ chắc cháy rụi luôn rồi.\nQuá nhiệt sinh ra lỗi, chỉ có thể lắc đầu\nnguầy nguậy thôi!"

# 【赤井】
# display as 赤井
# JP: 「それで？　ニイロク。\nみっつめ、今日の最後のおねだりは？」
1865 = "「Vậy thì? Niiroku.\nCái thứ ba, đòi hỏi cuối cùng của ngày hôm\nnay là gì?」"

# 【ニイロク】
# display as 二六
# JP: 「あ！」
1568 = "「A!」"

# monologue
# JP: いま、言った。\n清春、言った。
2201 = "Vừa nãy, đã nói.\nKiyoharu, đã nói."

# monologue
# JP: 最後の前に、今日の、って。\n今日の最後のおねだりって！！
2027 = "Trước chữ 'cuối cùng', là chữ 'hôm nay'.\nĐòi hỏi cuối cùng của 'hôm nay'!!"

# 【ニイロク】
# display as 二六
# JP: 「あの、あのね？　清春」
1642 = "「Cái đó, này? Kiyoharu.」"

# 【赤井】
# display as 赤井
# JP: 「はい。なんでしょう？　ニイロク」
1686 = "「Vâng. Có chuyện gì vậy? Niiroku.」"

# 【ニイロク】
# display as 二六
# JP: 「いいこにしたら。頑張ったら。今日がおわっても、\n明日とか、あさってとかも、また、おねだり」
1688 = "「Nếu tôi ngoan. Nếu tôi cố gắng. Dù ngày\nhôm nay kết thúc,\nngày mai, hay ngày kia, lại có thể, đòi\nhỏi tiếp chứ.」"

# 【赤井】
# display as 赤井
# JP: 「もちろんですとも」
1757 = "「Tất nhiên rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「うんっ！」
# 1601 = "「嗯！」" 

# monologue
# JP: だったら、だったら！　\nみっつめもすぐにお願いしちゃう！
2281 = "Nếu vậy, nếu vậy thì!\nMình sẽ xin luôn cái thứ ba!"

# 【ニイロク】
# display as 二六
# JP: 「観光もいいけど、してみたいけど。\nそれよりも、おうち――清春のお家、見てみたい！」
1897 = "「Tham quan cũng được, tôi cũng muốn thử.\nNhưng hơn thế nữa, nhà――tôi muốn xem nhà\ncủa Kiyoharu!」"

# 【赤井】
# display as 赤井
# JP: 「どうです？\n熱かったりぬるかったりしませんか？」
1663 = "「Thế nào?\nCó bị nóng hay nguội quá không?」"

# 【ニイロク】
# display as 二六
# JP: 「ううん、清春。ちょうどいい」
1730 = "「Không đâu, Kiyoharu. Vừa vặn lắm.」"

# 【赤井】
# display as 赤井
# JP: 「そうですか」
1704 = "「Vậy sao.」"

# monologue
# JP: ……ちょっと不満。
1154 = "......Hơi bất mãn một chút."

# monologue
# JP: 清春、今。自分が「清春」っていったのに、\nニイロクって言ってくれなかった。
2143 = "Kiyoharu, lúc nãy. Mình đã gọi 'Kiyoharu'\nrồi,\nmà anh ấy không chịu gọi mình là Niiroku."

# 【赤井】
# display as 赤井
# JP: 「しかしまさか、大掃除までしてくれるとは。\n本当にありがとう。ご苦労様でした、ニイロク」
1451 = "「Nhưng không ngờ cô lại dọn dẹp tổng vệ\nsinh giúp tôi.\nThực sự cảm ơn cô. Vất vả cho cô rồi,\nNiiroku.」"

# 【ニイロク】
# display as 二六
# JP: 「ううん！！！」
1447 = "「Không có gì!!!」"

# monologue
# JP: 言ってくれた！　ニイロクって。\n嬉しい、嬉しい、嬉しい、嬉しい！！
2026 = "Anh ấy gọi rồi! Là Niiroku.\nVui quá, vui quá, vui quá, vui quá!!"

# 【ニイロク】
# display as 二六
# JP: 「お手伝い当たり前。だって、外はぴかぴかなのに、\n中、ほこりとかつもってたから」
1683 = "「Giúp đỡ là chuyện đương nhiên. Bởi vì,\nbên ngoài thì sáng bóng,\nmà bên trong, bụi bặm đóng đầy ra.」"

# 【赤井】
# display as 赤井
# JP: 「長く不在にしてしまいましたからねぇ。外の方は、\n氏子さんたちが定期的にお掃除してくれるのですが」
1755 = "「Vì tôi đã vắng nhà một thời gian dài mà.\nBên ngoài thì,\ncác Ujiko vẫn định kỳ dọn dẹp giúp, nhưng\nmà.」"

# 【ニイロク】
# display as 二六
# JP: 「長く不在にさせたの、テスト頑張ってくれたから。\nだから、自分が、その分お掃除するの、当然」
1886 = "「Anh vắng nhà lâu như vậy, là vì đã cố\ngắng cho cuộc thử nghiệm.\nNên, việc tôi dọn dẹp bù lại, là chuyện\nđương nhiên.」"

# 【赤井】
# display as 赤井
# JP: 「そういってもらえるのは嬉しいですが――\n体、しっかりとほぐしてくださいね」
1486 = "「Được cô nói vậy tôi rất vui nhưng――\nHãy ngâm mình cho thật thoải mái nhé.」"

# 【ニイロク】
# display as 二六
# JP: 「はうう」
1566 = "「Ha ư ư.」"

# monologue
# JP: 体って言われたら、なんだか急に恥ずかしくなる。
2008 = "Nghe nhắc đến cơ thể, tự dưng lại thấy xấu\nhổ."

# monologue
# JP: 壁一枚の向こうには、清春がいて、\n薪を焚いてくれてるって、改めて思っちゃって。
2153 = "Nghĩ lại thì, chỉ cách một bức tường,\nKiyoharu đang ở đó,\nvà đang đun củi cho mình."

# 【赤井】
# display as 赤井
# JP: 「最新鋭機に雑巾がけを手伝わせて、\n万一故障でも引き起こしたら、私がクビですからね」
1677 = "「Bắt cỗ máy hiện đại nhất phụ lau nhà bằng\ngiẻ,\nlỡ như gây ra hỏng hóc gì, là tôi bị sa\nthải đấy.」"

# 【ニイロク】
# display as 二六
# JP: 「あ」
# 1564 = "「啊」" 

# monologue
# JP: 冗談っぽく言ってるけど、\n清春の言ってることは、本当のこと。
2283 = "Dù nói với giọng điệu đùa cợt,\nnhưng những lời Kiyoharu nói, là sự thật."

# monologue
# JP: 本来だったら、こんな視察に自分がいけてる事自体、\n絶対、ありえないようなこと。
2165 = "Đáng lẽ ra, việc mình có thể đi chuyến thị\nsát này,\ntuyệt đối, là chuyện không thể nào xảy ra."

# 【ニイロク】
# display as 二六
# JP: 「……ごめんなさい。\n大掃除したいとか、わがままいって」
1195 = "「......Xin lỗi anh.\nVì đã ích kỷ, đòi dọn dẹp tổng vệ sinh.」"

# 【赤井】
# display as 赤井
# JP: 「いえいえ！　大歓迎でしたとも。\n雑巾がけレースなんて、何年ぶりにしたことか」
1731 = "「Không không! Tôi rất hoan nghênh là đằng\nkhác.\nCuộc đua lau nhà bằng giẻ, không biết đã\nbao nhiêu năm rồi tôi mới được chơi lại\nđấy.」"

# 【ニイロク】
# display as 二六
# JP: 「あ」
# 1564 = "「啊」" 

# monologue
# JP: よかった。そうだ。そうだった。\n清春もほんとににこにこしてた、はしゃいでた。
2070 = "Tốt quá. Đúng rồi. Là vậy mà.\nKiyoharu cũng thực sự tươi cười, rất hào\nhứng."

# 【赤井】
# display as 赤井
# JP: 「だからこそ、きちんとケアして欲しいんです。\nせっかくの楽しい思い出を暗転させずにすむように」
1692 = "「Chính vì vậy, tôi muốn cô chăm sóc bản\nthân thật cẩn thận.\nĐể những kỷ niệm vui vẻ này không bị\nchuyển thành tồi tệ.」"

# 【ニイロク】
# display as 二六
# JP: 「うん、わかった。清春」
1603 = "「Ừm, tôi hiểu rồi. Kiyoharu.」"

# 【赤井】
# display as 赤井
# JP: 「わかってくれてなによりです。ニイロク」
1487 = "「Cô hiểu được là tốt rồi. Niiroku.」"

# 【ニイロク】
# display as 二六
# JP: 「！」
# 1601 = "「嗯！」" 

# monologue
# JP: わかってくれてる。わかってくれてる。\n清春。すごく自分のこと。
2198 = "Anh ấy hiểu mình. Anh ấy hiểu mình.\nKiyoharu. Rất hiểu về mình."

# 【ニイロク】
# display as 二六
# JP: 「あのね！　清春」
1807 = "「Này nhé! Kiyoharu.」"

# 【赤井】
# display as 赤井
# JP: 「はい、なんでしょう？　ニイロク」
1625 = "「Vâng, có chuyện gì vậy? Niiroku.」"

# 【ニイロク】
# display as 二六
# JP: 「あのね！　自分ねっ――っ！！？」
1503 = "「Này nhé! Tôi――!!?」"

# monologue
# JP: 言いたい。好きって。だけど、言えない。\n怖いの、ぶくぶく湧きだしちゃう。
2089 = "Muốn nói. Là thích anh ấy. Nhưng, không\nthể nói.\nSự sợ hãi, cứ sùng sục trào dâng."

# monologue
# JP: （それに……清春も、さっき言ってた）
2334 = "（Hơn nữa...... Kiyoharu, lúc nãy cũng vừa\nnói）"

# monologue
# JP: せっかくの楽しい思い出を、\n暗転させずにすむように、って。
2015 = "Để những kỷ niệm vui vẻ này,\nkhông bị chuyển thành tồi tệ."

# monologue
# JP: 今ここで告白をして失敗したら、\n帰りの旅が――きっと、ものすごく真っ暗になる。
2241 = "Nếu bây giờ tỏ tình ở đây mà thất bại,\nchuyến đi về――chắc chắn, sẽ trở nên vô\ncùng tăm tối."

# 【ニイロク】
# display as 二六
# JP: 「ぼべば……びびゃ」
1611 = "「Bô bế ba...... bi bya.」"

# 【赤井】
# display as 赤井
# JP: 「ニイロク？」
1465 = "「Niiroku?」"

# monologue
# JP: だけど、言いたい。伝えたい。\nこんなに熱くなるくらい、清春のこと好きだから。
2044 = "Nhưng, tôi muốn nói. Muốn cho anh ấy biết.\nBởi vì tôi thích Kiyoharu đến mức cơ thể\ntrở nên nóng ran thế này cơ mà."

# monologue
# JP: 言いたい。言えない。言えない。言いたい。\n暑い。熱い――どんどん頭がぐちゃぐちゃしてくる。
2124 = "Muốn nói. Không thể nói. Không thể nói.\nMuốn nói.\nNóng quá. Nóng quá――Đầu óc tôi ngày càng\ntrở nên rối bời."

# 【ニイロク】
# display as 二六
# JP: 「ぷあっ！」
1610 = "「Pua!」"

# 【赤井】
# display as 赤井
# JP: 「どうしました？　ニイロク」
1462 = "「Sao vậy? Niiroku.」"

# monologue
# JP: 清春の声。心配そう。\n自分を、心配してくれてる声。
2200 = "Giọng của Kiyoharu. Nghe có vẻ lo lắng.\nGiọng nói đang lo lắng cho mình."

# monologue
# JP: 嬉しい。ぽかぽかどんどんしてくる。\nぽかぽかが、熱くて暑くてあつくて――
2137 = "Vui quá. Cảm giác ấm áp ngày càng lan tỏa.\nSự ấm áp đó, trở nên nóng, nóng, nóng\nquá――"

# 【ニイロク】
# display as 二六
# JP: 「清、春……自分、は――」
1740 = "「Kiyo, haru...... Tôi, thì――」"

# 【赤井】
# display as 赤井
# JP: 「ニイロク？　のぼせましたか？」
1469 = "「Niiroku? Cô bị choáng vì ngâm nước nóng\nsao?」"

# monologue
# JP: のぼせる――そう、自分はとっくにのぼせてる。\n清春に。清春をもっと、知りたくて――
2193 = "Choáng――đúng vậy, tôi đã bị choáng từ lâu\nrồi.\nVì Kiyoharu. Vì muốn biết nhiều hơn, về\nKiyoharu――"

# monologue
# JP: （ばしゃんっ！！！）
2331 = "（Tùm!!!）"

# 【赤井】
# display as 赤井
# JP: 「ニイロクっ！？　ニイロクっ！！！」
1460 = "「Niiroku!? Niiroku!!!」"
