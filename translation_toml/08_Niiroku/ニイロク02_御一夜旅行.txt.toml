2228 = "Nhắc mới nhớ, những chiếc lon của Đoạn\ntrưởng xe điện rất lộn xộn.\nBởi vì ông ấy chỉ nhận lần lượt những\nchiếc lon được thu thập từ mọi người."

# 【ニイロク】
# display as 二六
