1621 = "「Đi về rồi!? Từ lúc mới bắt đầu!? Anh ấy\nkhông xem sao?\nNếu vậy thì――nếu vậy thì còn ý nghĩa gì\nnữa chứ!」"

# monologue
# JP: っていうかこれ、途中からスポ根になっちゃってた。\n自分は、ラブコメしたいのに！
2254 = "Nói đúng hơn là, từ giữa chừng nó đã biến\nthành manga thể thao nhiệt huyết mất rồi.\nTrong khi mình, lại muốn diễn một bộ hài\nkịch lãng mạn cơ mà!"

# 【ニイロク】
# display as 二六
# JP: 「ああああああ～」
1567 = "「A a a a a a~」"

