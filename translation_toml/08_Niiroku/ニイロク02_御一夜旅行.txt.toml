2337 = "Thành công rồi! Quả nhiên là lon trà giống\nnhư mọi khi.\nMình đã tập luyện với chiếc lon rỗng y\nhệt. Nên chắc chắn sẽ ổn thôi."

# 【ニイロク】
# display as 二六
# JP: 「缶。それ、捨てる？」
1867 = "「Cái lon. Anh, vứt đi sao?」"

# 【赤井】
# display as 赤井
# JP: 「はい。飲み終わってますからね」
1594 = "「Đúng vậy. Vì tôi uống xong rồi.」"

# 【ニイロク】
# display as 二六
