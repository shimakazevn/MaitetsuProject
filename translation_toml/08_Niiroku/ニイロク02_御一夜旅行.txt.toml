# JP: 「なら呼ぶ！　いま呼ぶ！　ええと――ええと！\nきよはる――清春！」
1875 = "「那我就要叫了！現在就叫！那——那個！清——清春！」" 

# 【赤井】
# display as 赤井
# JP: 「はい、なんでしょう？　ニイロクさん」
1660 = "「怎麼了？二六小姐」" 

# monologue
# JP: すごい。電車区長のいってたとおり。\nシロおねえちゃんの共感どおり！
2088 = "好厲害，跟電車段長說的一樣，跟四六姐共鳴中說的一樣！" 

# monologue
# JP: 一緒に旅行したらこんなに！\n赤井運転士――ううん、清春が近くなった！！
2040 = "只要一起旅行，就可以和赤井駕駛員——不，和清春瞬間拉近距離！！" 

# 【ニイロク】
# display as 二六
# JP: 「おねだり！　ふたつめ！　あの、ふたつめ！」
1880 = "「那第二個願望！第二個！」" 

# 【赤井】
# display as 赤井
# JP: 「二つ目ですね？　なんでしょう」
1782 = "「第二個願望是什麼呢」" 

# monologue
# JP: 近くになったら、もっと、もっとって。\n気持ち、どんどんふくらんでいく。
2051 = "和他拉近關係之後，自己心中的這份感情就越來越按捺不住了。" 

# monologue
# JP: 怖いのはずっとあるけどそれでも、\n心の中に、閉じ込めてなんておけないくらいに！
2285 = "雖然自己心中一直有著恐懼，但這份感情已經膨脹到了隱藏不住的程度。" 

# 【ニイロク】
# display as 二六
# JP: 「自分のことも呼び捨ててほしい。\nニイロクって。さん、つけなくって」
1681 = "「我希望你也不要對我用敬稱。不要再叫我二六小姐了」" 

# 【赤井】
# display as 赤井
# JP: 「お安いご用です。ニイロク。\n……これでいいですか？」
1756 = "「當然可以。二六……這樣就行了吧？」" 

# 【ニイロク】
# display as 二六
# JP: 「～～～～～～っ！！！！」
1561 = "「唔～～～～～～！！！！」" 

# monologue
# JP: 回路、いま自分焼き切れた。\n熱暴走してエラー出て頭ぶんぶん振るしか出来ない！
2066 = "因為這句話，我的電路簡直像燒壞了一樣。過熱失控出錯讓我只能瘋狂點頭。" 

# 【赤井】
# display as 赤井
# JP: 「それで？　ニイロク。\nみっつめ、今日の最後のおねだりは？」
1865 = "「那二六，第三個了，今天最後的願望是什麼？」" 

# 【ニイロク】
# display as 二六
# JP: 「あ！」
1568 = "「啊！」" 

# monologue
# JP: いま、言った。\n清春、言った。
2201 = "清春說了。" 

# monologue
# JP: 最後の前に、今日の、って。\n今日の最後のおねだりって！！
2027 = "他說這是“今天”最後的願望！！" 

# 【ニイロク】
# display as 二六
# JP: 「あの、あのね？　清春」
1642 = "「就是、就是——清春」" 

# 【赤井】
# display as 赤井
# JP: 「はい。なんでしょう？　ニイロク」
1686 = "「我聽著呢，是什麼？」" 

# 【ニイロク】
# display as 二六
# JP: 「いいこにしたら。頑張ったら。今日がおわっても、\n明日とか、あさってとかも、また、おねだり」
1688 = "「我要是以後也乖乖的，努力工作的話，等今天過了，明天、後天、今後還能向你提要求嗎」" 

# 【赤井】
# display as 赤井
# JP: 「もちろんですとも」
1757 = "「當然可以」" 

# 【ニイロク】
# display as 二六
# JP: 「うんっ！」
# 1601 = "「嗯！」" 

# monologue
# JP: だったら、だったら！　\nみっつめもすぐにお願いしちゃう！
2281 = "那，那我就馬上告訴他第三個願望吧！" 

# 【ニイロク】
# display as 二六
# JP: 「観光もいいけど、してみたいけど。\nそれよりも、おうち――清春のお家、見てみたい！」
1897 = "「雖然我也很想參觀一下這裡，不過在此之前，我想看看你家！」" 

# 【赤井】
# display as 赤井
# JP: 「どうです？\n熱かったりぬるかったりしませんか？」
1663 = "「怎麼樣？溫度有太燙或者太涼嗎？」" 

# 【ニイロク】
# display as 二六
# JP: 「ううん、清春。ちょうどいい」
1730 = "「沒有。溫度正好」" 

# 【赤井】
# display as 赤井
# JP: 「そうですか」
1704 = "「是嗎」" 

# monologue
# JP: ……ちょっと不満。
1154 = "……總感覺有點不滿。" 

# monologue
# JP: 清春、今。自分が「清春」っていったのに、\nニイロクって言ってくれなかった。
2143 = "我明明叫了他清春，他卻沒有叫我二六。" 

# 【赤井】
# display as 赤井
# JP: 「しかしまさか、大掃除までしてくれるとは。\n本当にありがとう。ご苦労様でした、ニイロク」
1451 = "「不過沒想到你還幫我做了大掃除。真是太感謝你了，二六」" 

# 【ニイロク】
# display as 二六
# JP: 「ううん！！！」
1447 = "「不用客氣！！！」" 

# monologue
# JP: 言ってくれた！　ニイロクって。\n嬉しい、嬉しい、嬉しい、嬉しい！！
2026 = "他叫我二六了！好高興、好高興、好高興、好高興！！" 

# 【ニイロク】
# display as 二六
# JP: 「お手伝い当たり前。だって、外はぴかぴかなのに、\n中、ほこりとかつもってたから」
1683 = "「我幫忙打掃是應該的。因為你家外面那麼乾淨裡面卻積滿了灰塵」" 

# 【赤井】
# display as 赤井
# JP: 「長く不在にしてしまいましたからねぇ。外の方は、\n氏子さんたちが定期的にお掃除してくれるのですが」
1755 = "「畢竟我很久不在這裡住了嘛。外面會有信徒定期幫我打掃」" 

# 【ニイロク】
# display as 二六
# JP: 「長く不在にさせたの、テスト頑張ってくれたから。\nだから、自分が、その分お掃除するの、当然」
1886 = "「都是因為你投身於試驗編組，所以才好久沒能回來。為了報答你，我來幫忙打掃是應該的」" 

# 【赤井】
# display as 赤井
# JP: 「そういってもらえるのは嬉しいですが――\n体、しっかりとほぐしてくださいね」
1486 = "「你有這份心真讓我高興——那就泡個澡好好放鬆一下身體吧」" 

# 【ニイロク】
# display as 二六
# JP: 「はうう」
1566 = "「啊唔唔」" 

# monologue
# JP: 体って言われたら、なんだか急に恥ずかしくなる。
2008 = "一聽清春說到身體這個詞，我不知道為什麼就突然害羞了起來。" 

# monologue
# JP: 壁一枚の向こうには、清春がいて、\n薪を焚いてくれてるって、改めて思っちゃって。
2153 = "我這才重新意識到，清春跟我就隔著一堵牆，他正在給我燒柴。" 

# 【赤井】
# display as 赤井
# JP: 「最新鋭機に雑巾がけを手伝わせて、\n万一故障でも引き起こしたら、私がクビですからね」
1677 = "「我可是讓最新型號幫忙用抹布擦地板了，要是你出了什麼故障，我可要被炒魷魚了」" 

# 【ニイロク】
# display as 二六
# JP: 「あ」
# 1564 = "「啊」" 

# monologue
# JP: 冗談っぽく言ってるけど、\n清春の言ってることは、本当のこと。
2283 = "雖然他的語氣聽起來像玩笑，但這是真的。" 

# monologue
# JP: 本来だったら、こんな視察に自分がいけてる事自体、\n絶対、ありえないようなこと。
2165 = "按規矩，原本這樣的視察，我是絕對不能來的。" 

# 【ニイロク】
# display as 二六
# JP: 「……ごめんなさい。\n大掃除したいとか、わがままいって」
1195 = "「……對不起。都怪我說想來個大掃除」" 

# 【赤井】
# display as 赤井
# JP: 「いえいえ！　大歓迎でしたとも。\n雑巾がけレースなんて、何年ぶりにしたことか」
1731 = "「沒有沒有！我正求之不得呢。都不知道多少年沒跟人比賽過抹布擦地板的速度了」" 

# 【ニイロク】
# display as 二六
# JP: 「あ」
# 1564 = "「啊」" 

# monologue
# JP: よかった。そうだ。そうだった。\n清春もほんとににこにこしてた、はしゃいでた。
2070 = "太好了。對，是這樣的。清春剛才真的笑嘻嘻的，特別開心。" 

# 【赤井】
# display as 赤井
# JP: 「だからこそ、きちんとケアして欲しいんです。\nせっかくの楽しい思い出を暗転させずにすむように」
1692 = "「所以我希望你好好保養自己，不要讓我們之間快樂的回憶留下一個不開心的結局」" 

# 【ニイロク】
# display as 二六
# JP: 「うん、わかった。清春」
1603 = "「嗯，我明白。清春」" 

# 【赤井】
# display as 赤井
# JP: 「わかってくれてなによりです。ニイロク」
1487 = "「你理解就好。二六」" 

# 【ニイロク】
# display as 二六
# JP: 「！」
# 1601 = "「嗯！」" 

# monologue
# JP: わかってくれてる。わかってくれてる。\n清春。すごく自分のこと。
2198 = "清春比任何人都要了解我。" 

# 【ニイロク】
# display as 二六
# JP: 「あのね！　清春」
1807 = "「話說，清春！」" 

# 【赤井】
# display as 赤井
# JP: 「はい、なんでしょう？　ニイロク」
1625 = "「在，怎麼了？」" 

# 【ニイロク】
# display as 二六
# JP: 「あのね！　自分ねっ――っ！！？」
1503 = "「其實，我……！」" 

# monologue
# JP: 言いたい。好きって。だけど、言えない。\n怖いの、ぶくぶく湧きだしちゃう。
2089 = "好想告訴他，我喜歡他。但是卻說不出口。內心的恐懼一點一點湧上心頭。" 

# monologue
# JP: （それに……清春も、さっき言ってた）
2334 = "（而且……清春剛才也說過）" 

# monologue
# JP: せっかくの楽しい思い出を、\n暗転させずにすむように、って。
2015 = "不要讓我們之間快樂的回憶留下一個不開心的結局。" 

# monologue
# JP: 今ここで告白をして失敗したら、\n帰りの旅が――きっと、ものすごく真っ暗になる。
2241 = "要是現在表白失敗的話，回去的旅程肯定會一片黑暗。" 

# 【ニイロク】
# display as 二六
# JP: 「ぼべば……びびゃ」
1611 = "「噗噗噗……噗噗」" 

# 【赤井】
# display as 赤井
# JP: 「ニイロク？」
1465 = "「二六？」" 

# monologue
# JP: だけど、言いたい。伝えたい。\nこんなに熱くなるくらい、清春のこと好きだから。
2044 = "可是，好想說出口，好想告訴他。因為我是那麼喜歡他，喜歡到電路已經如此發燙了。" 

# monologue
# JP: 言いたい。言えない。言えない。言いたい。\n暑い。熱い――どんどん頭がぐちゃぐちゃしてくる。
2124 = "想說、說不出口；說不出口、想說。好熱，好燙——我的大腦越來越混亂了。" 

# 【ニイロク】
# display as 二六
# JP: 「ぷあっ！」
1610 = "「噗啊！」" 

# 【赤井】
# display as 赤井
# JP: 「どうしました？　ニイロク」
1462 = "「二六，你怎麼了？」" 

# monologue
# JP: 清春の声。心配そう。\n自分を、心配してくれてる声。
2200 = "清春的聲音充滿了擔心。他在擔心我。" 

# monologue
# JP: 嬉しい。ぽかぽかどんどんしてくる。\nぽかぽかが、熱くて暑くてあつくて――
2137 = "我好高興，大腦都要沸騰了。整個人都紅彤彤，熱呼呼的——" 

# 【ニイロク】
# display as 二六
# JP: 「清、春……自分、は――」
1740 = "「清、春……我——」" 

# 【赤井】
# display as 赤井
# JP: 「ニイロク？　のぼせましたか？」
1469 = "「二六？你泡暈了？」" 

# monologue
# JP: のぼせる――そう、自分はとっくにのぼせてる。\n清春に。清春をもっと、知りたくて――
2193 = "泡暈了——沒錯，我早就暈了。都怪清春，都怪我想更多了解他——" 

# monologue
# JP: （ばしゃんっ！！！）
2331 = "（撲通！！！）" 

# 【赤井】
# display as 赤井
# JP: 「ニイロクっ！？　ニイロクっ！！！」
1460 = "「二六！？二六！！！」" 
