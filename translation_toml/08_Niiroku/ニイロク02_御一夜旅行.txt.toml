2229 = "Chức năng cơ thể ở mức độ cao đủ để thực\nhành tính toán,\nbản thân tôi, một cỗ máy hiện đại nhất và\ncó hiệu suất cao nhất, cũng được trang\nbị――đầy đủ!"

# monologue
# JP: （しゅっ！）
2328 = "（Vút!）"

# 【赤井】
# display as 赤井
# JP: 「おお！」
