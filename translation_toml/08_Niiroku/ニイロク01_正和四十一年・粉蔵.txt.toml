1708 = "「Đúng vậy. Khi cô ấy mở lời, tôi vừa sốc,\nvừa cam chịu.\nVà đồng thời...... thành thật mà nói, tôi\ncũng cảm thấy nhẹ nhõm.」"

# 【ニイロク】
# display as 二六
