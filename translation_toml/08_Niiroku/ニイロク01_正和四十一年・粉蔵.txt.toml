2098 = "Trong tủ lạnh chỉ có củ cải, miso và trứng\nthôi,\nvậy mà cô ấy đã làm rất tốt."

# 【ニイロク】
# display as 二六
# JP: 「あ――お米、炊き忘れ」
1506 = "「A——quên nấu cơm mất rồi.」"

# 【赤井】
# display as 赤井
# JP: 「ああ、不要です。お[みき,1]神酒でいただきましょう」
1503 = "「À, không cần đâu. Cứ nhắm với rượu Thần\nlà được.」"

# 【ニイロク】
# display as 二六
# JP: 「オミキ？」
1376 = "「Rượu Thần?」"

# 【赤井】
# display as 赤井
