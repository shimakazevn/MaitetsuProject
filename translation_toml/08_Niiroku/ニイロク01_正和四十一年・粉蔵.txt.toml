# 【ニイロク】
# display as 二六
# JP: 「失礼じゃない。ただ――自分が。\nうん。自分が、世間知らずなだけ」
1382 = "「不會失禮。我驚訝只是因為我……嗯，我太不懂人情世故了」" 

# 【赤井】
# display as 赤井
# JP: 「仕方ないでしょう。稼働、まだ半年ですもの」
1867 = "「這沒辦法。畢竟你才剛啟動半年」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 

# monologue
# JP: なるべく、軽く。
2195 = "我的語氣儘可能地放輕。" 

# monologue
# JP: 意識した口調が良かったのでしょうか、\nニイロクさんの言葉にも少し勢いが戻ってきます。
2039 = "二六小姐的聲音也恢復了一點精神，看來我並沒有做錯。" 

# 【ニイロク】
# display as 二六
# JP: 「だから、その――知りたい。詳しく。\nあまり聞けそうにない話だし」
1669 = "「所以，那個……我想了解詳情。因為平時沒什麼機會聽你說這個」" 

# 【赤井】
# display as 赤井
# JP: 「構いませんよ」
1474 = "「可以」" 

# monologue
# JP: ホっとします。同時に、少しだけ寂しくも感じます。
2181 = "我在放心的同時，還感到了一絲寂寞。" 

# monologue
# JP: ニイロクさんを突き動かすもの。\nそれがおそらく、純粋な知的好奇心だということに。
2323 = "驅動她的可能只是純粹的、對於未知的好奇心。" 

# 【赤井】
# display as 赤井
# JP: 「守秘義務に反しない範囲でなら何でも答えます。\nそれも、わたしの仕事です」
1473 = "「只要不違反保密義務，我都可以回答你。這也是我的工作」" 

# 【ニイロク】
# display as 二六
# JP: 「なら、聞く」
1883 = "「那我就問了」" 

# monologue
# JP: ニイロクさんの目が輝きます。\n体が乗り出し、コードのたるみも伸ばされます。
2038 = "二六小姐的眼神中充滿了光彩。她探出身體，充電線也一下子拉長，繃得緊緊的。" 

# 【ニイロク】
# display as 二六
# JP: 「その……元・妻……ということは、\n赤井運転士は、前は結婚していて。今は――独身」
1876 = "「那個……前·妻……也就是說你之前結過婚。而現在……是單身」" 

# 【赤井】
# display as 赤井
# JP: 「そのとおりですね」
1748 = "「沒有錯」" 

# 【ニイロク】
# display as 二六
# JP: 「こどもは、その、元・妻と一緒？」
1580 = "「孩子和那位前·妻在一起？」" 

# 【赤井】
# display as 赤井
# JP: 「親権が向こうにある上、元妻がいやがるんですよ。\n会わせてもらえないんです」
1681 = "「撫養權在前妻手上，而且她也討厭我，不讓我跟孩子見面」" 

# 【ニイロク】
# display as 二六
# JP: 「あ――」
1495 = "「啊——」" 

# monologue
# JP: ほぐれかけてた空気がひやり、\nまた落ち込んでしまいます。
2227 = "活躍起來的氣氛又一下子陰沉了下去。" 

# 【赤井】
# display as 赤井
# JP: 「ニイロクさん？」
1400 = "「二六小姐？」" 

# 【ニイロク】
# display as 二六
# JP: 「世間知らずの想像だけれど。\nそれはきっと……苦しいことだと思う」
1659 = "「我這不懂世故的人偶可能只是在亂猜。不過你是不是……覺得很難過？」" 

# 【赤井】
# display as 赤井
# JP: 「苦しい……ですか」
1892 = "「難過……」" 

# monologue
# JP: まず意識します。言葉に引きずられないように。\nその上で、ただ正直に答えます。
2321 = "首先要小心不要被她的話給帶跑。然後在這個基礎上老老實實地回答。" 

# 【赤井】
# display as 赤井
# JP: 「確かに、苦しいことでした。\n忘れなければ、まともに生活できないほどに」
1776 = "「當初確實很難過。難過到不刻意忘記的話，就沒辦法正常生活」" 

# 【ニイロク】
# display as 二六
# JP: 「！！？　赤井運転士が？」
1501 = "「啊！！？你也會這樣？」" 

# 【赤井】
# display as 赤井
# JP: 「ええ。\nわたしなど、ごく平凡な人間ですから」
1518 = "「嗯。因為我是個普通人嘛」" 

# monologue
# JP: ニイロクさんの目には私が、\nよほど冷静と写っているのでしょうか？
2099 = "在二六小姐的眼裡，我是個很冷靜沉著的人吧。" 

# monologue
# JP: ……表に出すほど若くはないというだけで、\n傷つきも、荒れももちろん、するものですが。
1138 = "……我只是到了不會表露出來的年紀罷了，其實我當然也會感到傷心和煩躁。" 

# 【赤井】
# display as 赤井
# JP: 「ですから、忘れるしかできなかった。\n全てを過去にし――カレンダーの[しるし]印が残るのみです」
1664 = "「所以我能做的只有去忘記。把一切當成是過去，只在日曆上留下印記」" 

# 【ニイロク】
# display as 二六
# JP: 「誕生日も……」
1770 = "「生日也……」" 

# 【赤井】
# display as 赤井
# JP: 「！」
# 1498 = "「啊！」" 

# monologue
# JP: 会話をしている――\n不意に感じて、ふつふつと喜びが湧き出て来ます。
2258 = "突然，我發覺到我們正在對話，喜悅之情一下子噴湧而出。" 

# monologue
# JP: 話した以上を、受け取ってもらえ、返してもらえる。\nそれがこれほど嬉しいことだと、忘れていました。
2128 = "她領會到了我的言外之意，而且還給出了回應。我都忘記這是多麼令人高興的一件事了。" 

# 【ニイロク】
# display as 二六
# JP: 「誕生日もカレンダーに書かないと忘れるくらい、\n過去に――したの？」
1772 = "「生日也得標記在日曆上才能記住，你這麼徹底地告別了過去嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「しましたね。たった五年で、そうできました」
1699 = "「是啊，只用五年就做到了」" 

# 【ニイロク】
# display as 二六
# JP: 「五年かけないと、過去にできない」
1817 = "「要花整整五年才能忘掉」" 

# monologue
# JP: 言葉を選んでくれているのでしょう。
2117 = "她應該是在思考該怎麼開口。" 

# monologue
# JP: ニイロクさんは、開けかけた口を一度閉じ。\nそれからゆっくり、また開きます。
2032 = "二六小姐欲言又止，然後又慢慢開口道。" 

# 【ニイロク】
# display as 二六
# JP: 「それほど強く思っていたのに。\nどうして、一緒にいられなくなったの？」
1431 = "「你明明那麼關心他們。為什麼不能再相處下去呢？」" 

# 【赤井】
# display as 赤井
# JP: 「さぁ……過去にしたことですからね。\nあのころのことは、上手くは思い出せませんよ」
1386 = "「不知道……畢竟都是陳年舊事了。那個時候的事，我已經不太能想起來了」" 

# 【ニイロク】
# display as 二六
# JP: 「それでも、聞きたい」
1418 = "「但我還是想知道」" 

# 【赤井】
# display as 赤井
# JP: 「長い話になりますよ？」
1879 = "「那就說來話長了」" 

# monologue
# JP: ニイロクさんは頷きます。\n目は、どこまでもまっすぐです。
2048 = "二六小姐點了點頭。她的眼神無比堅定。" 

# 【ニイロク】
# display as 二六
# JP: 「聞きたい。自分は、聞かせて欲しい」
1637 = "「我想聽，希望你能告訴我」" 

# monologue
# JP: 頷いて。\n少し考え、話の糸口を選びます。
2210 = "我點了點頭。然後想了一會該從何說起。" 

# 【赤井】
# display as 赤井
# JP: 「……以前にも少しは話していることですが、\n私は、[しんしょく,1]神職の家の出身です」
1181 = "「……我以前也稍微提到過，我出生在神職家庭」" 

# monologue
# JP: 赤井さんの子。神社さんの子。\n言われ続けて、思春期まではそれが誇りで。
2070 = "別人總是說我是赤井家的孩子，神社家的孩子。在青春期前我也一直引以為傲。" 

# 【赤井】
# display as 赤井
# JP: 「ですが、進路に悩むころ、ふと思ったのです。\n神社を離れた自分には、一体何が残るのだろうと」
1420 = "「但是，到了要為未來出路而煩惱的歲數，我不禁想到一個問題。離開神社後的我，究竟還剩下些什麼呢？」" 

# 【ニイロク】
# display as 二六
# JP: 「それで、運転士になった？」
1663 = "「所以你成為了駕駛員？」" 

# 【赤井】
# display as 赤井
# JP: 「まず、目指そうと。\n鉄道が好きでしたから、関わりたいと思いました」
1625 = "「我先是以此為目標。因為我喜歡鐵路，所以想從事鐵路相關的工作」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「御一夜を離れ、[こくら,1]粉蔵に住んで。\n実際の就職活動は、それからでした」
1661 = "「我離開了御一夜，選擇在小倉定居。參加工作是在那之後了」" 

# monologue
# JP: 幸運にも庫内手として採用されて、\n試験を受けて、機関助士。そして機関士に。
2153 = "幸運的是我被聘用為洗爐工，接受考試後成為了司爐，然後又當上了司機。" 

# monologue
# JP: 苦労も多く、けれど楽しさの方がずうっと多く。\nですので毎日は、飛ぶように過ぎていきました。
2313 = "雖然很辛苦，但更多的還是快樂。因此時光也過得飛快。" 

# 【赤井】
# display as 赤井
# JP: 「気動車免許、電車免許も、順次に取りました。\n運転が、よほど肌にあったのでしょうね」
1660 = "「我還依次考到了動車執照和電車執照。看來我確實是很適合駕駛這一行啊」" 

# 【ニイロク】
# display as 二六
# JP: 「うん。赤井運転士は、天性の運転士だと思う。\nお客様にも、[わたしたち,2]車輌側にも、優しい運転をする」
1529 = "「嗯，我認為你是天生的駕駛員。不管是對於旅客，還是對於[我們,1]車輛，你的駕駛都很顧及大家的感受」" 

# 【赤井】
# display as 赤井
# JP: 「そういってもらえて光栄です」
1804 = "「能得到你的誇獎，我很榮幸」" 

# monologue
# JP: けれど、そこまでの気遣いで、\n私の器はいっぱいだったのかもしれません。
2020 = "不過以我的才能，大概也只能做到這麼多了。" 

# 【赤井】
# display as 赤井
# JP: 「元妻と出会ったのは、そのころ――\n電車免許を取得してほどなくのころでした」
1482 = "「和前妻相遇就是在那個時候——取得電車執照的不久之後」" 

# 【ニイロク】
# display as 二六
# JP: 「！」
# 1498 = "「啊！」" 

# 【赤井】
# display as 赤井
# JP: 「先輩運転士の紹介で、『父親も[てつどういん,2]鉄道員』だと。\n実際、彼女は鉄道の仕事を理解してくれていました」
1716 = "「是駕駛員前輩介紹我們認識的，那位前輩說她的父親也是鐵路工人。而她也確實很理解鐵路的工作」" 

# monologue
# JP: 公休を潰しての乗務も、当然。\n公休の日には、とにかく寝ないと体が持たない。
2101 = "在休息日值班是家常便飯。就算不用值班，休息日也都是睡過去的，不然身體會支撐不住。" 

# monologue
# JP: ゆえに一緒に出かけることもほとんど出来ず――\nそれでも彼女は、私を受け入れてくれました。
2097 = "因此我幾乎沒辦法和她一起外出遊玩——但她還是接受了我。" 

# 【赤井】
# display as 赤井
# JP: 「障害らしい障害もなく祝福されて結婚し、\n二年目には子宝にも恵まれました」
1623 = "「我們順利地在眾人的祝福下結婚，並在第二年生下了孩子」" 

# 【ニイロク】
# display as 二六
# JP: 「――うん」
1152 = "「——嗯」" 

# 【赤井】
# display as 赤井
# JP: 「それからほどなくのことです。\n『電車試験運転士』任用試験の誘いを頂きました」
1579 = "「孩子出生後不久，我接到了“電車試車員”任用考試的邀請」" 

# 【ニイロク】
# display as 二六
# JP: 「すごい。大出世」
1570 = "「好厲害，簡直是飛黃騰達啊」" 

# monologue
# JP: ニイロクさんの目が輝きます。
2037 = "二六小姐的眼神中充滿了光彩。" 

# monologue
# JP: ……多分、誘いをいただいたとき、\n私もあんな目をしていたのでしょう。
1133 = "……在被邀請的時候，我或許也露出過這樣的眼神吧。" 

# 【赤井】
# display as 赤井
# JP: 「電車免許保持者自体が少なかった頃ですから。\nほぼ全員にお声掛けがあったのではないでしょうか」
1552 = "「因為當時很少有人有電車執照。所以有執照的人基本都被邀請了吧」" 

# 【ニイロク】
# display as 二六
# JP: 「保持した時点で、凄いってこと。\n試験、すぐに受けたの？」
1456 = "「光是有執照就很厲害了。所以你馬上就接受考試了？」" 

# 【赤井】
# display as 赤井
# JP: 「はい。『受けます』と即答して、\nそれからは猛勉強と猛特訓の日が続きました」
1710 = "「是的。我立刻接受了邀請，然後每天都投入到學習和特訓之中」" 

# monologue
# JP: 産まれたばかりのこどもを無視する形になっても、\n合格を、再優先の課題としました。
2185 = "我將考試合格放在了第一位，為此甚至忽視了剛出生的孩子。" 

# monologue
# JP: それは当然に許されること――\nいま考えれば、そんな甘えもあったのでしょう。
2137 = "家人一定會理解我的——現在回想起來，當時我可能有過這種天真的念頭。" 

# 【赤井】
# display as 赤井
# JP: 「最初は、昇給への期待が大きかった。\nそれで生活が潤えば――という気持ちも強かった」
1375 = "「一開始我最大的期待是加薪。這樣一來就能過上更好的生活了」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「ですが、帝鉄史を改めて学ぶうち。\n全く別の欲望が、私の中に芽生えたのです」
1422 = "「但是，在重新學習帝國鐵路史的時候。我的心中又萌生了其他的欲望」" 

# 【ニイロク】
# display as 二六
# JP: 「帝鉄史――」
1596 = "「帝國鐵路史——」" 

# monologue
# JP: 珍しく、ニイロクさんが言いよどみます。
2157 = "很少見她這麼吞吞吐吐的樣子。" 

# 【ニイロク】
# display as 二六
# JP: 「あまり、勉強したことがない」
1644 = "「我沒怎麼學習過」" 

# 【赤井】
# display as 赤井
# JP: 「\x%l明智;#00ffc040;明智%l;#;・\x%l大詔;#00ffc040;大詔%l;#;と発展の一途を辿る帝鉄の\n最初の[つまず]躓きは、\x%l大詔;#00ffc040;大詔%l;#;三十五年に訪れました」
1554 = "「在\\x%l明智;#00ffc040;明治%l;#;、\\x%l大詔;#00ffc040;大正%l;#;時期迅猛發展的帝國鐵路的首次受挫，發生在\\x%l大詔;#00ffc040;大正%l;#;三十五年」" 

# 【ニイロク】
# display as 二六
# JP: 「ん……[たいしょう,1]大詔三十五年は、[しょうわ,1]正和元年。\n[ひのもと,2]日ノ本が、戦争に負けた年？」
1514 = "「嗯……大正三十五年是正和元年。日本戰敗的那一年？」" 

# 【赤井】
# display as 赤井
# JP: 「その通りです。正和元年。焦土となった国土に\n復興の音を響かせたものは、鉄道だったそうです」
1713 = "「是的。正和元年，在化作焦土的國土上吹響復興號角的便是鐵路」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「それから十八年でエアクラ機関が実用化。\n正和二十一年、エアクラ法制定・施行」
1765 = "「然後在正和十八年，空凝機引擎實用化。正和二十一年制訂並實施空凝機法」" 

# 【ニイロク】
# display as 二六
# JP: 「その先は、習ってる。正和三十年に、\n帝鉄関連予算が、大幅削減」
1677 = "「接下來的內容我學到過。正和三十年大幅削減了帝國鐵路的相關預算」" 

# 【赤井】
# display as 赤井
# JP: 「そうですね、それがいわゆる、\n『大廃線時代』の、始まりとされています」
1749 = "「沒錯，那據說便是所謂的“大廢線時代”的開始」" 

# monologue
# JP: 大廃線時代。\n好んで口にはしたくない、なんとも嫌な言葉です。
2107 = "大廢線時代。我很討厭這個詞，甚至不想把它說出口。" 

# 【赤井】
# display as 赤井
# JP: 「その流れに抗うため、帝鉄は大きな賭けに出ます」
1761 = "「為了抵抗衰退，帝國鐵路甚至不惜鋌而走險」" 

# 【ニイロク】
# display as 二六
# JP: 「知ってる。本線全線電化構想」
1651 = "「我知道。是幹線全線電力化的構想」" 

# 【赤井】
# display as 赤井
# JP: 「そのとおりです。苦しみながらも、\n構想は実現に向け、少しずつ少しずつ進んでいった」
