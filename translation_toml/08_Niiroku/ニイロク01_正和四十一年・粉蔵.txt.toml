2073 = "Cô ấy không phải là một người phụ nữ đủ\nmạnh mẽ để phá vỡ cục diện đó.\nHoặc đơn giản là chúng tôi đã không thể\ntrở thành một cặp vợ chồng đúng nghĩa."

# 【赤井】
# display as 赤井
