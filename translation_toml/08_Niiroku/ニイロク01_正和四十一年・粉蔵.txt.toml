# 【ニイロク】
# display as 二六
# JP: 「一緒にいるのが、そこまで苦しくなってたの？」
1426 = "「你們在一起就這麼難受嗎？」" 

# 【赤井】
# display as 赤井
# JP: 「……さぁ、どうでしたか」
1177 = "「……我也不知道」" 

# monologue
# JP: 不意に、味噌汁を飲みたくなります。\nもう一口。焼酎ではなく、味噌汁を。
2256 = "突然想喝味噌湯了。於是我又喝了一口味噌湯，而不是燒酒。" 

# 【赤井】
# display as 赤井
# JP: 「――ああ」
1149 = "「——啊」" 

# monologue
# JP: そうして、飲めば思い知ります。
2011 = "一口下去，我不得不領會到另一個事實。" 

# monologue
# JP: 自分はもう、妻だった人が毎日作っていた味噌汁の、\nその味さえも、忘れてしまっていることを。
2309 = "那就是我已經連前妻當初每天做的味噌湯的味道都忘記了。" 

# 【赤井】
# display as 赤井
# JP: 「元妻以上に、こどもに。申し訳なく思っています。\n……愛情を、もっと注いであげたかったと」
1630 = "「我對不起前妻，但更對不起我的孩子……真希望當初我能對他投入更多的愛」" 

# 【ニイロク】
# display as 二六
# JP: 「それは、無理」
1871 = "「那不可能」" 

# 【赤井】
# display as 赤井
# JP: 「！！？」
# 1499 = "「啊！！？」" 

# 【ニイロク】
# display as 二六
# JP: 「愛情がたとえ無限でも。\n時間は、どうしても有限だから」
1490 = "「哪怕愛是無限的，時間也是有限的」" 

# monologue
# JP: ニイロクさんが、じっと私を見つめます。\n静かで、ときおりゆらめいて――湖のような瞳です。
2052 = "二六筆直地注視著我。她的眼神很平靜，有時會盪起一絲漣漪——就像湖面一樣。" 

# 【ニイロク】
# display as 二六
# JP: 「そして赤井運転士の時間は、\n自分たちのため、どこまでだって注がれたから」
1801 = "「而你的時間全部花費在了我們身上」" 

# 【赤井】
# display as 赤井
# JP: 「――はい」
1153 = "「——是的」" 

# monologue
# JP: そういうことです。\n突き詰めてしまえば、本当にただそれだけのこと。
2145 = "就是這樣。歸根究底起來也僅僅只是如此。" 

# monologue
# JP: “仕事と家庭”あまりに古典的な二択において、\n前者を自分は、選び続けただけのことです。
2143 = "就是因為在“工作與家庭”這種老套的選擇中，我總是在選擇前者。" 

# 【ニイロク】
# display as 二六
# JP: 「だから。もう。苦しまなくても大丈夫」
1667 = "「所以，你不用再難過了」" 

# monologue
# JP: ニイロクさんが、私を、見ます。\n湖の目で――どこか懐かしい、深い目で。
2041 = "二六小姐看著我。她那湖面般的深邃雙眸——不知怎麼的讓人倍感懷念。" 

# 【ニイロク】
# display as 二六
# JP: 「赤井運転士が産んだ自分は。\x%lクハ26;#00ffc040;クハ26%l;#;とその編成は。\n最優秀で最新鋭の、特急系電車試験車輌だから」
1545 = "「因為在你手中誕生的我——\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;及其編組，是最優秀、最先進的特快電車試驗列車」" 

# 【赤井】
# display as 赤井
# JP: 「……そう思います。\nそこだけは、私は、迷わず誇れます」
1179 = "「……我也是這麼認為的。這是我唯一的驕傲，我對此深信不疑」" 

# monologue
# JP: 妻は大人で、自分自身が為した選択の結果です。\n私自身も、無論、同様。
2174 = "我前妻也是成年人了，這是她自己作出的選擇。我當然也一樣。" 

# monologue
# JP: けれどもこどもを巻き込んだ。\nその苦しさを一生抱えていくのでも、なお。
2063 = "但是孩子卻受到了牽連。縱使讓我一輩子背負這種痛苦，我也依然有愧於他。" 

# 【赤井】
# display as 赤井
# JP: 「君と私は、そう答えられるだけのデータを重ねた。\nそのことだけは、自信をもって答えられます」
1551 = "「因為有你我共同積累的數據，我才能這樣說。這是我唯一的自信之處。」" 

# 【ニイロク】
# display as 二六
# JP: 「うん。……うん。うふふっ」
1510 = "「嗯……嗯，呵呵」" 

# monologue
# JP: 自信に満ちた、眩しいほどに誇らしげな笑み。\nああ――私はそれを、いくつ見てきたことでしょう。
2127 = "她耀眼的笑容中充滿了自信與自豪。啊……我究竟目睹過多少次這樣的笑容呢？" 

# monologue
# JP: 昨日までは隣に輝いてくれていたそれを、\nいくつ――私は失ってきたことでしょう。
2202 = "我究竟失去過多少個隔天就不復存在的耀眼之物呢？" 

# 【ニイロク】
# display as 二六
# JP: 「赤井運転士は、自分たちに時間を注いでくれた」
1839 = "「赤井駕駛員，你將時間投入在了我們身上」" 

# monologue
# JP: ニイロクさんが、また見ます。\nその目を見ろと、わたしに言おうとするかのように。
2028 = "二六小姐又在看著我。她的眼神彷彿在對我說話，要我看著她的眼睛。" 

# 【ニイロク】
# display as 二六
# JP: 「何度でも言う。\n『だから』。『自分は』。『ここにいる』」
1643 = "「我會不厭其煩地告訴你。“所以”，“我”，“才會在這裡”」" 

# 【赤井】
# display as 赤井
# JP: 「あ！」
# 1498 = "「啊！」" 

# monologue
# JP: 湖の目が、私を見ます。\nその表面が、ゆらぎます。
2311 = "那雙湖面般的眼睛在看著我。而湖面在蕩漾。" 

# 【ニイロク】
# display as 二六
# JP: 「蓄積されたデータは、継承されて反映されるから。\nレイルロオドは――自分たちは、共感するから」
1799 = "「積累下來的數據一定會被繼承下去，體現它的價值。因為鐵路人偶——我們之間會進行共鳴」" 

# monologue
# JP: いくつもの色が、湖上につかの間、ひらめきます。\nかつては隣にいてくれた、試験機たちのまなざしが。
2075 = "剎那間，幾種神采在湖面上閃耀。那是曾經待在我身邊的測試機們的眼神。" 

# 【赤井】
# display as 赤井
# JP: 「ニイロクさん――君は」
1398 = "「二六小姐，你……」" 

# 【ニイロク】
# display as 二六
# JP: 「最新鋭とは、そういうこと。\n無数の思い出が、データが。自分を産んでくれた」
1672 = "「所謂最先進便是這麼回事。是無數的回憶、無數的數據造就了我」" 

# 【赤井】
# display as 赤井
# JP: 「そう……なのですね」
1466 = "「原來……是這樣啊」" 

# monologue
# JP: 恨まれていると、思っていました。\n恨まれることこそ贖罪と、そんなことさえ恐らくは。
2168 = "我以為自己遭到了怨恨。我甚至還想，或許被怨恨便是我的贖罪。" 

# 【赤井】
# display as 赤井
# JP: 「最新鋭とは、過去の全てを――\n受け継いでいるということなのですね」
1671 = "「所謂最先進——就是因為繼承了過去的一切啊」" 

# 【ニイロク】
# display as 二六
# JP: 「わかってくれたなら、嬉しい。\nここのところ、元気がないみたいだったから」
1632 = "「我很高興你能明白。因為你最近好像沒什麼精神」" 

# 【赤井】
# display as 赤井
# JP: 「気にかけてくれたのですか」
1434 = "「你發現了啊」" 

# 【ニイロク】
# display as 二六
# JP: 「気にかける。赤井運転士のことは、いつでも」
1548 = "「因為我一直都很關心你」" 

# monologue
# JP: ニイロクさんの目を見ます。\nそこにはもう、元の色しかありません。
2198 = "我看著二六小姐的雙眼。她的眼中已經只剩下原來的神采了。" 

# monologue
# JP: ニイロクさんの言葉なのだと――\n感じて、ふつふつ嬉しくなります。
2163 = "意識到這是二六小姐自己所說的話，我便覺得無比欣喜。" 

# 【赤井】
# display as 赤井
# JP: 「そうですか。ありがとう」
1704 = "「是嗎？謝謝你」" 

# 【ニイロク】
# display as 二六
# JP: 「よかった。\n元気がなかった理由もわかって」
1561 = "「太好了。你沒精神的原因也找到了」" 

# 【赤井】
# display as 赤井
# JP: 「はい」
# 1696 = "「是啊」" 

# monologue
# JP: ――ニイロクさんに心配をさせてしまうほど、\n悩んでみえた理由なら、別にあります。
2281 = "要說讓我煩惱到連她都擔心起來的原因，其實並不止這件事。" 

# monologue
# JP: けれどもそれを今伝え、\nこれほど晴れた笑顔を曇らせたくありません。
2058 = "但我並不想現在告訴她，因為這樣會讓她燦爛的笑容黯淡下去。" 

# 【赤井】
# display as 赤井
# JP: 「頑張りましょう。ニイロクさん。\nいつか、旧車と呼ばれるときまで」
1463 = "「加油吧，二六小姐。直到有一天你被稱為“老車”為止」" 

# 【ニイロク】
# display as 二六
# JP: 「うん。それ。素敵。\nそのときの最新鋭機に。全力で嫉妬してみたい」
1525 = "「嗯，我很嚮往那個場景。我很想知道全力嫉妒那時的最先進機車是什麼感覺」" 

# 【赤井】
# display as 赤井
# JP: 「嫉妬しましょう。憧れましょう。\nそれほどの進歩を、必ず見ましょう」
1471 = "「去嫉妒吧，去嚮往吧。到時你一定會見到讓你驚訝的巨大進步」" 

# 【ニイロク】
# display as 二六
# JP: 「うん！」
1520 = "「嗯！」" 

# monologue
# JP: ニイロクさんが立ち上がり――ああ！
2042 = "二六小姐站了起來——啊！" 

# 【赤井】
# display as 赤井
# JP: 「後片付けくらいは自分でします。\nそこまで面倒をかけるわけには」
1682 = "「收拾的話讓我來吧。也不能總是麻煩你」" 

# 【ニイロク】
# display as 二六
# JP: 「面倒じゃない。けど――なら。そう。\nふたりですると、きっと、二倍早く終る」
1388 = "「不麻煩。不過……那這樣吧。兩個人一起收拾，速度一定也會變成兩倍」" 

# 【赤井】
# display as 赤井
# JP: 「わかりました。では、そうしましょう」
1816 = "「行啊，那就這麼辦吧」" 

# 【ニイロク】
# display as 二六
# JP: 「うん！」
# 1520 = "「嗯！」" 

# monologue
# JP: ……コップと湯のみが一つずつ。\n味噌汁椀に、お皿に小鉢。
1144 = "……酒杯和茶杯各一個，還有味噌湯碗、盤子和小碗。" 

# monologue
# JP: あっという間に片付けば、\nニイロクさんは、あっさりノブに手をかけます。
2240 = "眨眼之間收拾完後，二六小姐乾脆俐落地把手搭在門把上。" 

# 【ニイロク】
# display as 二六
# JP: 「楽しかった。たくさん話せてうれしかった。\nありがとう」
1480 = "「和你聊了這麼多，我很開心。謝謝你」" 

# 【赤井】
# display as 赤井
# JP: 「こちらこそです。ありがとう。\nそれから、ごちそうさま。とても美味しかった」
1641 = "「我才要感謝你。還有，承蒙款待，真的很好吃」" 

# 【ニイロク】
# display as 二六
# JP: 「うん。――うん。なら、また作る」
1511 = "「嗯……嗯，那下次我再給你做」" 

# 【赤井】
# display as 赤井
# JP: 「ええ、そのうちに、また」
1522 = "「嗯，下次再麻煩你了」" 

# 【ニイロク】
# display as 二六
# JP: 「わかった。それじゃあ！」
1655 = "「我記住了，再見！」" 

# monologue
# JP: ニイロクさんが廊下に出ます。\nドアを締め――けれども鍵は、まだかけません。
2044 = "二六小姐走到了走廊上。我把門關好，但沒有上鎖。" 

# monologue
# JP: あの音――閉めだされたと感じる音を、\nニイロクさんに、聞かせたいとは思いません。
2208 = "我覺得她可能不會喜歡那種聲音——被我關在門外的聲音。" 

# monologue
# JP: （足音が消えるのを待ってから――）
2339 = "（等到腳步聲消失之後再——）" 

# 【ニイロク】
# display as 二六
# JP: 「やった！　やったあ！　あ、シロおねえちゃん！？\nうん、あのね！　すごくいいよ！　脈あり！！！」
1563 = "「太好了！太好了！啊，四六姐！？嗯，我跟你說！特別順利！有希望！！！」" 

# 【赤井】
# display as 赤井
# JP: 「！！？」
1492 = "「唔！！？」" 

# monologue
# JP: 声が思わず出そうになって、飲み込みます。
2200 = "我禁不住想喊出聲，然後又憋了回去。" 

# 【ニイロク】
# display as 二六
# JP: 「――うん――そう――でね？　――うん――\n……ふき大根？　……しえて！　……がと……ん！」
1151 = "「——嗯——是的——就是啊。——嗯——……煮蘿蔔？……教我！……還有……嗯！」" 

# monologue
# JP: （脈、ですか）
2337 = "（有希望嗎）" 

# monologue
# JP: ……ニイロクさんの賑やかな声と足音が、\nどんどん小さくなって――消えます。
1130 = "……二六小姐歡快的聲音和腳步聲越來越小，最後消失。" 

# monologue
# JP: （カチャリ）
2335 = "（喀嚓）" 

# 【赤井】
# display as 赤井
# JP: 「脈……ですか」
1593 = "「希望……啊」" 

# monologue
# JP: どうしたものかと考えて、\n自分の手首を、なんの気なしに掴んでみます。
2165 = "我不由地抓起自己的手腕，思考到底該如何是好。" 

# 【赤井】
# display as 赤井
# JP: 「脈は――確かにありますが」
1592 = "「希望——確實是有的啊」" 
