2143 = "Giữa hai sự lựa chọn quá đỗi kinh điển\n'công việc và gia đình',\ntôi chỉ đơn giản là liên tục chọn vế trước\nmà thôi."

# 【ニイロク】
# display as 二六
# JP: 「だから。もう。苦しまなくても大丈夫」
1667 = "「Vì vậy. Anh không cần phải. Đau khổ nữa\nđâu.」"

# monologue
