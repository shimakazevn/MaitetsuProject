1490 = "「Dù tình yêu thương có là vô hạn.\nThì thời gian, dù thế nào đi nữa cũng chỉ\ncó giới hạn thôi.」"

# monologue
# JP: ニイロクさんが、じっと私を見つめます。\n静かで、ときおりゆらめいて――湖のような瞳です。
2052 = "Niiroku chăm chú nhìn tôi.\nĐôi mắt ấy tĩnh lặng, thỉnh thoảng lại gợn\nsóng——như một mặt hồ."

# 【ニイロク】
# display as 二六
