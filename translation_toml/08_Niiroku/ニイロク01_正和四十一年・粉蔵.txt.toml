1545 = "「Bởi vì tôi, người được sinh ra bởi lái\ntàu Akai. Cùng với \\x%lクハ26;#00ffc040;Kuha 26%l;#; và đoàn tàu của\nnó.\nLà toa xe thử nghiệm tàu điện tốc hành\nxuất sắc nhất, hiện đại nhất.」"

# 【赤井】
# display as 赤井
