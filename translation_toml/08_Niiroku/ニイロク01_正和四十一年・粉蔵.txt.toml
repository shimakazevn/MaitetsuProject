2187 = "Cái gai đó tất nhiên vẫn còn ghim chặt.\nVì tôi——vẫn đang tiếp tục gây phiền phức\ncho con trai mình."

# monologue
# JP: けれどニイロクさんの言葉は確かに、\n痛みを緩和させてくれます。
2064 = "Nhưng những lời của Niiroku quả thực\nđã làm dịu đi nỗi đau đó."

# 【赤井】
# display as 赤井
