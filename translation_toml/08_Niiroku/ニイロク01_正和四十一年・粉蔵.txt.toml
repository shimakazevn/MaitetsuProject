1773 = "「Là rượu dâng lên thần linh.\nTuy không phải là thanh tựu, mà là rượu\nshochu Kuma.」"

# monologue
# JP: 神棚代わりの[おふだ,2]御神札の前に捧げおいたお神酒を\n授かることにします。
2184 = "Tôi quyết định lấy rượu Thần\nđược dâng trước ngự thần trát thay cho bàn\nthờ Thần đạo."

# 【赤井】
# display as 赤井
# JP: 「[みぎたいち,2]右田一さんの“右田一”です。\nクマ焼酎らしいクマ焼酎です」
1860 = "「Là rượu 'Migita Ichi' của nhà Migita\nIchi.\nĐúng chuẩn rượu shochu Kuma đấy.」"

# 【ニイロク】
# display as 二六
# JP: 「ふぅん」
1484 = "「Hừm.」"

# 【赤井】
# display as 赤井
# JP: 「と、焼酎をいただくその前に――\n（ずずっ）うん。美味しい」
1556 = "「Và, trước khi thưởng thức rượu shochu——\n（Sụp sụp）Ừm. Ngon lắm.」"

# 【ニイロク】
# display as 二六
# JP: 「やった！　よかった！！」
1617 = "「Thành công rồi! May quá!!」"

# 【赤井】
# display as 赤井
# JP: 「煮物も……お、柔らかい――し。うん。うん！\n驚きました。普通に、ちゃんと美味しいです」
1768 = "「Món hầm cũng...... ồ, mềm quá——. Ừm. Ừm!\nThật bất ngờ. Rất ngon, đúng chuẩn luôn.」"

# 【ニイロク】
# display as 二六
# JP: 「先生が良かったし、\n教わったことを再現できる性能があるから」
1775 = "「Vì giáo viên dạy tốt,\nvà tôi cũng có hiệu suất để tái hiện lại\nnhững gì đã được học.」"

# 【赤井】
# display as 赤井
# JP: 「なるほどなるほど」
1866 = "「Ra là vậy, ra là vậy.」"

# monologue
# JP: 貨物機レイルロオドの指導だからでしょう。
2111 = "Có lẽ là do sự chỉ dẫn của Railord đầu máy\nhàng hóa."

# monologue
# JP: 私には少し塩気が強すぎますが、\n肴と見ればむしろ良しです。
2274 = "Đối với tôi thì hơi mặn một chút,\nnhưng nếu coi là đồ nhắm thì lại rất hợp."

# 【赤井】
# display as 赤井
# JP: 「では、と」
1887 = "「Vậy thì, tôi xin phép.」"

# 【ニイロク】
# display as 二六
# JP: 「あ、[てじゃく,1]手酌、だめ」
1504 = "「A, tự rót rượu, không được.」"

# 【赤井】
# display as 赤井
# JP: 「そんなことまで教わっているのですか」
1438 = "「Cô được dạy cả những điều như vậy sao.」"

# monologue
# JP: ニイロクさんのお酌を受けて、\n口を、右田一で満たします。
2191 = "Nhận lấy chén rượu Niiroku rót cho,\ntôi để rượu Migita Ichi lấp đầy khoang\nmiệng."

# 【赤井】
# display as 赤井
# JP: 「ああ――――――旨い」
1497 = "「Aaaaaa——————Ngon tuyệt.」"

# 【ニイロク】
# display as 二六
# JP: 「む。自分の料理を食べたときより、反応がいい」
1493 = "「Hứ. Phản ứng của anh còn tốt hơn lúc ăn\nđồ tôi nấu nữa.」"

# 【赤井】
# display as 赤井
# JP: 「それはアレです。\nニイロクさんのお酌だからですよ」
1861 = "「Cái đó là vì.\nLà do Niiroku rót rượu cho tôi đấy.」"

# 【ニイロク】
# display as 二六
# JP: 「そ、そう。なら――うん。嬉しい」
1689 = "「V-Vậy sao. Nếu thế——ừm. Tôi rất vui.」"

# 【赤井】
# display as 赤井
# JP: 「でしたら私も嬉しいですね」
1882 = "「Vậy thì tôi cũng rất vui.」"

# monologue
# JP: 卵焼きの味付けも濃く、\nそれゆえに、大根おろしが爽やかです。
2233 = "Trứng cuộn cũng được nêm nếm đậm đà,\nnhờ vậy mà củ cải bào ăn kèm lại mang đến\ncảm giác rất thanh mát."

# monologue
# JP: なるほど確かに……\n腹が満ちれば、それだけで心が和らぎます。
2078 = "Ra là vậy, quả thực là......\nChỉ cần cái bụng được lấp đầy, cõi lòng\ncũng tự nhiên dịu lại."

# 【赤井】
# display as 赤井
# JP: 「仕事で感じたストレスを、\n私は、家には持ち帰りませんでした」
1633 = "「Những áp lực cảm nhận được trong công\nviệc,\ntôi không mang về nhà.」"

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 

# monologue
# JP: とても自然に、聞いてくれます。\nだから、自然に話せます。
2115 = "Cô ấy lắng nghe tôi một cách rất tự nhiên.\nVì vậy, tôi cũng có thể kể chuyện một cách\ntự nhiên."

# 【赤井】
# display as 赤井
# JP: 「そうすることが、マナーであると信じていました。\nけれど……その選択が生んだのは、沈黙だけでした」
1647 = "「Tôi từng tin rằng làm như vậy là một phép\nlịch sự.\nNhưng...... sự lựa chọn đó chỉ mang lại sự\nim lặng.」"

# monologue
