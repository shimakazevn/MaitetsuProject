1839 = "「Lái tàu Akai, đã dành thời gian cho chúng\ntôi.」"

# monologue
# JP: ニイロクさんが、また見ます。\nその目を見ろと、わたしに言おうとするかのように。
2028 = "Niiroku, lại nhìn tôi.\nNhư thể muốn bảo tôi hãy nhìn vào đôi mắt\nấy."

# 【ニイロク】
# display as 二六
# JP: 「何度でも言う。\n『だから』。『自分は』。『ここにいる』」
1643 = "「Tôi sẽ nói bao nhiêu lần cũng được.\n'Vì vậy'. 'Tôi'. 'Mới ở đây'.」"

# 【赤井】
# display as 赤井
# JP: 「あ！」
# 1498 = "「啊！」" 

# monologue
# JP: 湖の目が、私を見ます。\nその表面が、ゆらぎます。
2311 = "Đôi mắt như mặt hồ ấy, nhìn tôi.\nBề mặt của nó, khẽ dao động."

# 【ニイロク】
# display as 二六
# JP: 「蓄積されたデータは、継承されて反映されるから。\nレイルロオドは――自分たちは、共感するから」
1799 = "「Vì những dữ liệu được tích lũy sẽ được kế\nthừa và phản ánh lại.\nBởi vì Railord——chúng tôi, có sự cộng\ncảm.」"

# monologue
# JP: いくつもの色が、湖上につかの間、ひらめきます。\nかつては隣にいてくれた、試験機たちのまなざしが。
2075 = "Vô vàn sắc màu, thoáng chốc lóe lên trên\nmặt hồ.\nLà ánh mắt của những cỗ máy thử nghiệm, đã\ntừng kề vai sát cánh bên tôi."

# 【赤井】
# display as 赤井
# JP: 「ニイロクさん――君は」
1398 = "「Niiroku——Cô」"

# 【ニイロク】
# display as 二六
# JP: 「最新鋭とは、そういうこと。\n無数の思い出が、データが。自分を産んでくれた」
1672 = "「Hiện đại nhất, chính là như vậy.\nVô số những kỷ niệm, những dữ liệu. Đã\nsinh ra tôi.」"

# 【赤井】
# display as 赤井
# JP: 「そう……なのですね」
1466 = "「Ra...... là vậy.」"

# monologue
# JP: 恨まれていると、思っていました。\n恨まれることこそ贖罪と、そんなことさえ恐らくは。
2168 = "Tôi cứ nghĩ rằng, mình đang bị oán hận.\nThậm chí có lẽ tôi còn nghĩ, bị oán hận\nchính là một cách để chuộc tội."

# 【赤井】
# display as 赤井
# JP: 「最新鋭とは、過去の全てを――\n受け継いでいるということなのですね」
1671 = "「Hiện đại nhất, chính là kế thừa——\ntất cả mọi thứ của quá khứ nhỉ.」"

# 【ニイロク】
# display as 二六
# JP: 「わかってくれたなら、嬉しい。\nここのところ、元気がないみたいだったから」
1632 = "「Anh hiểu được thì tôi rất vui.\nVì dạo gần đây, trông anh có vẻ không được\nkhỏe.」"

# 【赤井】
# display as 赤井
# JP: 「気にかけてくれたのですか」
1434 = "「Cô đã lo lắng cho tôi sao?」"

# 【ニイロク】
# display as 二六
# JP: 「気にかける。赤井運転士のことは、いつでも」
1548 = "「Lo chứ. Lúc nào tôi cũng lo cho lái tàu\nAkai hết.」"

# monologue
# JP: ニイロクさんの目を見ます。\nそこにはもう、元の色しかありません。
2198 = "Tôi nhìn vào mắt Niiroku.\nTrong đó giờ đây chỉ còn lại màu sắc\nnguyên bản."

# monologue
# JP: ニイロクさんの言葉なのだと――\n感じて、ふつふつ嬉しくなります。
2163 = "Nhận ra đó chính là những lời của\nNiiroku――\ntôi cảm thấy một niềm vui sướng trào dâng."

# 【赤井】
# display as 赤井
# JP: 「そうですか。ありがとう」
1704 = "「Vậy sao. Cảm ơn cô.」"

# 【ニイロク】
# display as 二六
# JP: 「よかった。\n元気がなかった理由もわかって」
1561 = "「Tốt quá rồi.\nCũng hiểu được lý do tại sao anh lại không\ncó tinh thần.」"

# 【赤井】
# display as 赤井
# JP: 「はい」
# 1696 = "「是啊」" 

# monologue
# JP: ――ニイロクさんに心配をさせてしまうほど、\n悩んでみえた理由なら、別にあります。
2281 = "――Nếu nói về lý do khiến tôi trông có vẻ\nphiền não\nđến mức làm Niiroku phải lo lắng, thì lại\nlà một chuyện khác."

# monologue
# JP: けれどもそれを今伝え、\nこれほど晴れた笑顔を曇らせたくありません。
2058 = "Nhưng nếu bây giờ nói ra điều đó,\ntôi không muốn làm lu mờ đi nụ cười rạng\nrỡ này."

# 【赤井】
# display as 赤井
# JP: 「頑張りましょう。ニイロクさん。\nいつか、旧車と呼ばれるときまで」
1463 = "「Cùng cố gắng nhé. Niiroku.\nCho đến một ngày nào đó, khi cô được gọi\nlà 'xe cũ'.」"

# 【ニイロク】
# display as 二六
# JP: 「うん。それ。素敵。\nそのときの最新鋭機に。全力で嫉妬してみたい」
1525 = "「Ừm. Cái đó. Tuyệt thật đấy.\nTôi muốn thử dốc toàn lực ghen tị với cỗ\nmáy hiện đại nhất lúc bấy giờ xem sao.」"

# 【赤井】
# display as 赤井
# JP: 「嫉妬しましょう。憧れましょう。\nそれほどの進歩を、必ず見ましょう」
1471 = "「Hãy cứ ghen tị đi. Hãy cứ khao khát đi.\nChúng ta nhất định sẽ chứng kiến một sự\ntiến bộ to lớn như thế.」"

# 【ニイロク】
# display as 二六
# JP: 「うん！」
1520 = "「Ừm!」"

# monologue
# JP: ニイロクさんが立ち上がり――ああ！
2042 = "Niiroku đứng dậy——a!"

# 【赤井】
# display as 赤井
# JP: 「後片付けくらいは自分でします。\nそこまで面倒をかけるわけには」
1682 = "「Việc dọn dẹp thì để tôi tự làm.\nKhông thể làm phiền cô đến mức đó được.」"

# 【ニイロク】
# display as 二六
# JP: 「面倒じゃない。けど――なら。そう。\nふたりですると、きっと、二倍早く終る」
1388 = "「Không phiền đâu. Nhưng——nếu vậy thì. Đúng\nrồi.\nHai người cùng làm, chắc chắn sẽ xong\nnhanh gấp đôi.」"

# 【赤井】
# display as 赤井
# JP: 「わかりました。では、そうしましょう」
1816 = "「Tôi hiểu rồi. Vậy cứ làm thế đi.」"

# 【ニイロク】
# display as 二六
# JP: 「うん！」
# 1520 = "「嗯！」" 

# monologue
# JP: ……コップと湯のみが一つずつ。\n味噌汁椀に、お皿に小鉢。
1144 = "......Một chiếc ly và một tách trà.\nMột bát súp miso, một cái đĩa và một cái\nbát nhỏ."

# monologue
# JP: あっという間に片付けば、\nニイロクさんは、あっさりノブに手をかけます。
2240 = "Chỉ trong chớp mắt đã dọn dẹp xong,\nNiiroku thản nhiên đặt tay lên tay nắm\ncửa."

# 【ニイロク】
# display as 二六
# JP: 「楽しかった。たくさん話せてうれしかった。\nありがとう」
1480 = "「Vui lắm. Được nói chuyện nhiều thế này\ntôi rất vui.\nCảm ơn anh.」"

# 【赤井】
# display as 赤井
# JP: 「こちらこそです。ありがとう。\nそれから、ごちそうさま。とても美味しかった」
1641 = "「Tôi mới là người phải nói thế. Cảm ơn cô.\nVà, cảm ơn vì bữa ăn. Rất ngon.」"

# 【ニイロク】
# display as 二六
# JP: 「うん。――うん。なら、また作る」
1511 = "「Ừm. ——Ừm. Vậy, lần sau tôi lại nấu nữa.」"

# 【赤井】
# display as 赤井
# JP: 「ええ、そのうちに、また」
1522 = "「Ừm, lúc nào đó, lại nhờ cô nhé.」"

# 【ニイロク】
# display as 二六
# JP: 「わかった。それじゃあ！」
1655 = "「Tôi biết rồi. Vậy thì, chào nhé!」"

# monologue
# JP: ニイロクさんが廊下に出ます。\nドアを締め――けれども鍵は、まだかけません。
2044 = "Niiroku bước ra hành lang.\nĐóng cửa lại——nhưng tôi vẫn chưa khóa vội."

# monologue
# JP: あの音――閉めだされたと感じる音を、\nニイロクさんに、聞かせたいとは思いません。
2208 = "Âm thanh đó——âm thanh khiến người ta cảm\nthấy như bị nhốt ở ngoài,\ntôi không muốn Niiroku phải nghe thấy."

# monologue
# JP: （足音が消えるのを待ってから――）
2339 = "（Đợi đến khi tiếng bước chân khuất hẳn rồi\nhẵng——）"

# 【ニイロク】
# display as 二六
# JP: 「やった！　やったあ！　あ、シロおねえちゃん！？\nうん、あのね！　すごくいいよ！　脈あり！！！」
1563 = "「Thành công rồi! Thành công rồi! A, chị\nShiro!?\nỪm, em bảo này! Tốt lắm luôn! Có hi\nvọng!!!」"

# 【赤井】
# display as 赤井
# JP: 「！！？」
1492 = "「!!?」"

# monologue
# JP: 声が思わず出そうになって、飲み込みます。
2200 = "Suýt nữa thì thốt ra thành tiếng, tôi vội\nnuốt ngược vào trong."

# 【ニイロク】
# display as 二六
# JP: 「――うん――そう――でね？　――うん――\n……ふき大根？　……しえて！　……がと……ん！」
1151 = "「——Ừm——Đúng rồi——Thế nhé? ——Ừm——\n......Củ cải hầm? ......Chỉ em với!\n......Cảm ơn......Ừm!」"

# monologue
# JP: （脈、ですか）
2337 = "（Hi vọng, sao）"

# monologue
# JP: ……ニイロクさんの賑やかな声と足音が、\nどんどん小さくなって――消えます。
1130 = "......Giọng nói náo nhiệt và tiếng bước\nchân của Niiroku,\ndần dần nhỏ lại——rồi biến mất."

# monologue
# JP: （カチャリ）
2335 = "（Lạch cạch）"

# 【赤井】
# display as 赤井
# JP: 「脈……ですか」
1593 = "「Hi vọng...... sao.」"

# monologue
# JP: どうしたものかと考えて、\n自分の手首を、なんの気なしに掴んでみます。
2165 = "Đang nghĩ xem phải làm sao đây,\ntôi vô thức nắm lấy cổ tay mình."

# 【赤井】
# display as 赤井
# JP: 「脈は――確かにありますが」
1592 = "「Mạch thì——đúng là có đập thật.」"
