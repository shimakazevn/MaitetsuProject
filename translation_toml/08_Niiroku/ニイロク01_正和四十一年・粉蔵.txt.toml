1630 = "「Hơn cả vợ cũ, là đối với đứa con. Tôi cảm\nthấy rất có lỗi.\n......Giá như tôi có thể dành nhiều tình\nyêu thương hơn cho thằng bé.」"

# 【ニイロク】
# display as 二六
# JP: 「それは、無理」
1871 = "「Điều đó là không thể nào.」"

# 【赤井】
# display as 赤井
# JP: 「！！？」
# 1499 = "「啊！！？」" 

