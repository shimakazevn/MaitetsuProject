# lines: 354 
# 【赤井】
# display as 赤井
# JP: 「はい？」
1489 = "「Vâng?」"
# 【ニイロク】
# display as ？？？
# JP: 「入りたい」
1829 = "「Tôi muốn vào.」"
# 【赤井】
# display as 赤井
# JP: 「ああ、ニイロクさんですか。\nどうぞ、入って下さい」
1485 = "「À, là cô Niiroku sao.\nXin mời vào.」"
# 【ニイロク】
# display as 二六
# JP: 「ん……」
1509 = "「Ưm...」"
# monologue
# JP: ニイロクさんは入るなり、仔細にあたりを眺めます。\n巣穴に戻った小動物が、いかにもしそうな姿です。
2026 = "Niiroku vừa bước vào đã nhìn quanh quan sát tỉ mỉ. Dáng vẻ hệt như một con thú nhỏ vừa trở về hang ổ của mình."
# 【ニイロク】
# display as 二六
# JP: 「つまらない。いつも片付き過ぎている」
1779 = "「Chán ngắt. Lúc nào cũng ngăn nắp quá mức.」"
# 【赤井】
# display as 赤井
# JP: 「片付いていると、つまらない。ですか」
1684 = "「Ngăn nắp quá, thì chán ngắt. Sao.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
1519 = "「Ừ.」"
# monologue
# JP: いいながら、慣れた手つきでコンセントへと\n自分のコードを差し込みながら座ります。
2023 = "Vừa nói, cô ấy vừa thuần thục cắm dây sạc của mình vào ổ điện rồi ngồi xuống."
# 【ニイロク】
# display as 二六
# JP: 「赤井運転士。クッション」
1841 = "「Tài xế Akai. Đệm.」"
# monologue
# JP: ……もう六ヶ月前になりますか。\nこの部屋にニイロクさんが初めて訪ねて来たその日。
1141 = "...Đã sáu tháng trước rồi sao. Cái ngày đầu tiên Niiroku đến thăm căn phòng này."
# monologue
# JP: 「クッションくらいは出して欲しい」とせがまれて、\n一緒にでかけて買ってきた、かわいらしいもの。
2237 = "Bị cô ấy nằng nặc đòi \"Ít ra cũng phải có cái đệm chứ\", thế là hai chúng tôi cùng nhau ra ngoài mua về, một chiếc đệm thật đáng yêu."
# 【赤井】
# display as 赤井
# JP: 「はい、どうぞ」
1439 = "「Vâng, của cô đây.」"
# 【ニイロク】
# display as 二六
# JP: 「これくらいは、いつも転がっててもいいと思う」
1858 = "「Tôi nghĩ cỡ này thì cứ vứt lăn lóc ở ngoài cũng được mà.」"
# 【赤井】
# display as 赤井
# JP: 「なるほど」
1640 = "「Ra là vậy.」"
# monologue
# JP: ――\x%lクハ26;#00ffc040;クハ26%l;#;専用レイルロオド。\n最新鋭特急系電車統括制御専用、人型モジュール。
2119 = "――Railord chuyên dụng của \\x%lクハ26;#00ffc040;Kuha 26%l;#;. Module hình người chuyên dụng cho hệ thống điều khiển tổng hợp tàu điện tốc hành tối tân nhất."
# monologue
# JP: 帝鉄がその小さな体にどれほど多くを詰め込んだのか、\n今のささいな呟きからも、伝わってくる気がします。
2147 = "Teitetsu đã nhồi nhét biết bao nhiêu thứ vào cơ thể nhỏ bé ấy, tôi cảm giác như mình có thể hiểu được phần nào qua lời lẩm bẩm nhỏ nhặt vừa rồi."
# 【赤井】
# display as 赤井
# JP: 「確かに、片付けすぎだったようですね」
1568 = "「Quả thực, có vẻ như tôi đã dọn dẹp quá mức rồi.」"
# 【ニイロク】
# display as 二六
# JP: 「ふふっ」
1478 = "「Fufu.」"
# monologue
# JP: クッションひとつで居場所が生まれる。\n居場所を、誰かと共有できる。
2083 = "Chỉ một chiếc đệm cũng đủ tạo ra một chốn dừng chân. Một chốn dừng chân có thể sẻ chia cùng ai đó."
# monologue
# JP: それは確かな幸せなのだと――\n私はいつから、忘れてしまっていたのでしょう。
2303 = "Đó là một niềm hạnh phúc đích thực―― Tôi đã lãng quên điều đó từ bao giờ nhỉ."
# 【ニイロク】
# display as 二六
# JP: 「…………」
1164 = "「............」"
# monologue
# JP: ……そわそわと、ニイロクさんは落ち着きません。\nどこか不安げにも見えます。
1128 = "...Niiroku bồn chồn, không yên. Trông cô ấy có vẻ gì đó bất an."
# 【赤井】
# display as 赤井
# JP: 「……お茶を淹れます。少し待っていてくださいね」
1182 = "「...Tôi sẽ pha trà. Đợi một chút nhé.」"
# monologue
# JP: 喉は渇いていませんが、\nどうぞゆっくりしてくださいと、伝えるために。
2177 = "Dù không khát nước, nhưng tôi làm vậy để ngầm bảo cô ấy hãy cứ tự nhiên đi."
# 【赤井】
# display as 赤井
# JP: 「……ふぅ」
1174 = "「...Phù.」"
# 【ニイロク】
# display as 二六
# JP: 「お茶って、どんな味がするの？」
1811 = "「Trà, có vị như thế nào vậy?」"
# 【赤井】
# display as 赤井
# JP: 「飲んだことありませんでしたっけ？」
1432 = "「Cô chưa uống bao giờ sao?」"
# 【ニイロク】
# display as 二六
# JP: 「無い。\n赤井運転士がお茶を淹れるのを見たのも、初めて」
1745 = "「Chưa. Đây cũng là lần đầu tiên tôi thấy tài xế Akai pha trà.」"
# 【赤井】
# display as 赤井
# JP: 「ああ、そうでしたか。それでは――」
1488 = "「À, ra là vậy. Thế thì――」"
# 【ニイロク】
# display as 二六
# JP: 「いい。ひとくちでいい。\nだから、それをもらえる？」
1383 = "「Được rồi. Một ngụm là đủ. Nên, cho tôi cốc đó được không?」"
# 【赤井】
# display as 赤井
# JP: 「構いませんよ」
1777 = "「Không sao đâu.」"
# monologue
# JP: 私の手にさえ大きな湯のみを、\n大事に大事に、小さな両手が包み込みます。
2113 = "Chiếc tách trà đến tay tôi cầm còn thấy lớn, được hai bàn tay nhỏ bé ôm trọn lấy một cách nâng niu, cẩn thận."
# 【ニイロク】
# display as 二六
# JP: 「ん……。\nさっぱりしてる。温かい。優しい匂いがする」
1515 = "「Ưm... Thanh đạm thật. Ấm áp nữa. Có mùi hương rất dịu nhẹ.」"
# 【赤井】
# display as 赤井
# JP: 「[うじこ,1]氏子さんからいただいたお茶ですからね。\nクマ茶の中でも上等なものです」
1859 = "「Là trà được giáo dân biếu tặng mà lị. Thuộc loại thượng hạng trong số các loại trà Kuma đấy.」"
# 【ニイロク】
# display as 二六
# JP: 「ウジコ？　クマ茶？」
1442 = "「Giáo dân? Trà Kuma?」"
# 【赤井】
# display as 赤井
# JP: 「氏子さん、というのはですね――」
1670 = "「Giáo dân, có nghĩa là――」"
# monologue
# JP: 取るにたらない話にけれど、\nニイロクさんは表情をくるくる変化させます。
2312 = "Dù chỉ là những câu chuyện vặt vãnh, nhưng biểu cảm của Niiroku lại thay đổi liên tục."
# 【ニイロク】
# display as 二六
# JP: 「そうなんだ。赤井[あそ,1]阿蘇神社。[おひとよ,2]御一夜。クマ。\nこのお茶と赤井運転士の、ふるさと――（コクっ）」
1715 = "「Ra là vậy. Đền Akai Aso. Ohimitera. Kuma. Quê hương của loại trà này, và của tài xế Akai――(Ực)」"
# monologue
# JP: ……ああ、いい顔です。
1131 = "...Chà, một khuôn mặt thật đẹp."
# monologue
# JP: 飲む。食べる。満たされる。\nそれが喜びであることを、思い出させてくれるほど。
2293 = "Uống. Ăn. Thỏa mãn. Đến mức khiến tôi nhớ lại rằng đó chính là niềm vui."
# 【ニイロク】
# display as 二六
# JP: 「行ってみたい。連れて行ってほしい」
1635 = "「Tôi muốn đến đó thử. Anh dẫn tôi đi nhé.」"
# 【赤井】
# display as 赤井
# JP: 「電化区間が伸びればいつか、いけますよ。\n[くまもと,1]隈元-[おひとよ,2]御一夜にはきっと、特急電車が走ります」
1574 = "「Nếu đoạn đường điện hóa được mở rộng thì một ngày nào đó sẽ đi được thôi. Chắc chắn sẽ có tàu điện tốc hành chạy tuyến Kumamoto - Ohimitera.」"
# 【ニイロク】
# display as 二六
# JP: 「そうじゃなくて――あ！？　ううん。\nそうでもいい。そうでも……それは、すごくいい」
1381 = "「Không phải thế――a!? Không. Thế cũng được. Thế cũng... rất tuyệt.」"
# monologue
# JP: （あ）
2334 = "(A)"
# monologue
# JP: うかつなことを言ってしまったかもしれません。\n私は試験運転士。
2188 = "Có lẽ tôi đã lỡ lời mất rồi.\nTôi là tài xế lái thử."
# monologue
# JP: ニイロクさんが、\x%lクハ26;#00ffc040;クハ26%l;#;が本線運用に移るまで――\nただそれだけの、短い期間の付き合いだというのに。
2171 = "Mối quan hệ này chỉ kéo dài trong một khoảng thời gian ngắn ngủi, cho đến khi Niiroku, và \\x%lクハ26;#00ffc040;Kuha 26%l;#; chuyển sang vận hành trên tuyến chính――vậy mà."
# 【赤井】
# display as 赤井
# JP: 「……ところでニイロクさん。次の試験運転ですが」
1176 = "「...Nhân tiện thì cô Niiroku. Về lần lái thử tiếp theo.」"
# 【ニイロク】
# display as 二六
# JP: 「ん」
# 1519 = "「嗯」" 
# monologue
# JP: 不満そうな顔を隠そうともせず、\nいかにもしぶしぶ、頷きます。
2053 = "Không thèm giấu đi vẻ mặt bất mãn, cô ấy gật đầu một cách miễn cưỡng."
# monologue
# JP: （ああ）
# 2334 = "（啊）" 
# monologue
# JP: それを嬉しく感じてしまい、感じた自分を戒めます。
2192 = "Cảm thấy vui sướng vì điều đó, tôi tự nhắc nhở bản thân mình."
# monologue
# JP: ニイロクさんを他の誰かに受け渡す。\n――それが、私の職務ですから。
2139 = "Bàn giao Niiroku cho một ai đó khác. ――Đó là bổn phận của tôi."
# 【赤井】
# display as 赤井
# JP: 「その話を伝えに来てくれたんですよね？」
1428 = "「Cô đến đây để truyền đạt chuyện đó đúng không?」"
# 【ニイロク】
# display as 二六
# JP: 「その話"も"、伝えに来た」
1863 = "「Tôi đến để truyền đạt chuyện đó \"nữa\".」"
# 【赤井】
# display as 赤井
# JP: 「伺いましょう」
1757 = "「Tôi nghe đây.」"
# monologue
# JP: 強調に気づかぬ体で促せば、\nニイロクさんは息を吐き、仕事の声に引き締めます。
2205 = "Giả vờ như không nhận ra sự nhấn mạnh đó và giục cô ấy nói tiếp, Niiroku thở hắt ra, lấy lại giọng điệu nghiêm túc của công việc."
# 【ニイロク】
# display as 二六
# JP: 「次から編成が伸びる。4両基本編成に\nモハシ[ニイイチ,1]21試験車両が組み込まれる」
1609 = "「Từ lần sau, đoàn tàu sẽ dài ra. Thêm \\x%lモハシ21試験車両;#00ffc040;Toa xe thử nghiệm Mohashi 21%l;#; vào đội hình 4 toa cơ bản.」"
# 【赤井】
# display as 赤井
# JP: 「モハシ――モーター車の普通車と、食堂車との\x%l合造車;#00ffc040;合造車%l;\n#;……ああいやビュッフェか」
1911 = "「Mohashi――\\x%l合造車;#00ffc040;Toa xe hỗn hợp%l;#; giữa toa động lực hạng thường và toa ăn ...à không, là \\x%lビュッフェ;#00ffc040;quầy ăn nhẹ%l;#; chứ.」"
# 【ニイロク】
# display as 二六
# JP: 「そう。\x%lクハ26;#00ffc040;クハ26%l;#;編成は最速の特急列車になるから。\n食事を楽しむ間に[はかた,1]博太につく。だからビュッフェ」
1587 = "「Đúng vậy. Vì đoàn tàu \\x%lクハ26;#00ffc040;Kuha 26%l;#; sẽ là chuyến tàu tốc hành nhanh nhất. Trong lúc hành khách thưởng thức bữa ăn thì tàu đã đến Hakata rồi. Nên mới là quầy ăn nhẹ.」"
# 【赤井】
# display as 赤井
# JP: 「確かに。いまの電化区間の短さを考えれば、\n[ビュッフェ,5]軽食コーナーでも過大設備でしょうね」
1790 = "「Quả thực. Nếu xét đến việc đoạn đường điện hóa hiện tại còn ngắn, thì dù là góc ăn nhẹ cũng là một trang bị quá mức rồi.」"
# 【ニイロク】
# display as 二六
# JP: 「期待のあらわれ。意思のあらわれ。全線電化への\n――帝鉄復活への。自分は、それに応えたい」
1862 = "「Đó là biểu hiện của sự kỳ vọng. Biểu hiện của ý chí. Hướng tới điện hóa toàn tuyến ――hướng tới sự hồi sinh của Teitetsu. Tôi muốn đáp lại điều đó.」"
# 【赤井】
# display as 赤井
# JP: 「ですね。がんばりましょう、ニイロクさん」
1693 = "「Đúng vậy. Cùng cố gắng nhé, Niiroku.」"
# 【ニイロク】
# display as 二六
# JP: 「うん。がんばる」
1528 = "「Ừm. Tôi sẽ cố gắng.」"
# 【赤井】
# display as 赤井
# JP: 「モーター車が増える分、\nニイロクさんの計算量も増えるでしょうが――」
1465 = "「Số lượng toa xe động lực tăng lên, khối lượng tính toán của Niiroku chắc cũng sẽ tăng theo nhỉ——」"
# 【ニイロク】
# display as 二六
# JP: 「問題ない」
1746 = "「Không vấn đề gì.」"
# monologue
# JP: 自信が、誇りが。\n声から溢れでてくるようです。
2123 = "Sự tự tin, niềm tự hào. Dường như đang tuôn trào qua giọng nói của cô ấy."
# 【ニイロク】
# display as 二六
# JP: 「当初から想定されている運用。\n余力は十二分。赤井運転士は安心していい」
1868 = "「Việc vận hành này đã nằm trong dự tính ngay từ đầu. Khả năng của tôi vẫn còn dư dả lắm. Lái tàu Akai cứ yên tâm.」"
# 【赤井】
# display as 赤井
# JP: 「そうですか。それでも、油断は禁物ですよ？」
1703 = "「Vậy sao. Dù vậy cũng không được lơ là đâu nhé?」"
# 【ニイロク】
# display as 二六
# JP: 「わかっている。安全が第一の使命」
1649 = "「Tôi biết rồi. An toàn là sứ mệnh đặt lên hàng đầu.」"
# 【赤井】
# display as 赤井
# JP: 「ですね。でしたら――」
1695 = "「Đúng vậy. Nếu thế thì——」"
# 【ニイロク】
# display as 二六
# JP: 「あ！」
1498 = "「A!」"
# monologue
# JP: 問題が何もないのなら、話はこれで終わりです。\n湯のみもとうに空ですし、充電はもとより十分なはず。
2211 = "Nếu không có vấn đề gì thì câu chuyện đến đây là kết thúc. Tách trà cũng đã cạn từ lâu, và việc sạc pin thì vốn dĩ đã đủ rồi."
# 【赤井】
# display as 赤井
# JP: 「ニイロクさん？　そろそろ」
1399 = "「Niiroku? Chắc cũng sắp...」"
# 【ニイロク】
# display as 二六
# JP: 「違う。まだ。大事な話は他にもある。\nあの――ええと――」
1392 = "「Không phải. Vẫn chưa. Vẫn còn chuyện quan trọng khác. Cái đó——ừm——」"
# monologue
# JP: ニイロクさんの目が泳ぎます。\nこの部屋の少ない家具の間を何度も往復し――
2050 = "Ánh mắt của Niiroku đảo quanh. Cô ấy liên tục đưa mắt nhìn qua lại giữa những món đồ nội thất ít ỏi trong căn phòng này——"
# 【ニイロク】
# display as 二六
# JP: 「そう、公休！\n赤井運転士の次の公休……は」
1590 = "「Đúng rồi, ngày nghỉ! Ngày nghỉ tiếp theo của lái tàu Akai...... là」"
# monologue
# JP: （ああ……）
2333 = "（A......）"
# monologue
# JP: カレンダー。一点で視線が止まっています。\n……これは、聞かれることでしょう。
2124 = "Tờ lịch. Ánh mắt cô ấy dừng lại ở một điểm. ......Chắc là cô ấy sẽ hỏi đây."
# 【ニイロク】
# display as 二六
# JP: 「なに？　あの『七』って。\n二十六日なのに、『七』」
1875 = "「Cái 'Bảy' kia là sao vậy? Rõ ràng là ngày hai mươi sáu, vậy mà lại viết là 'Bảy'.」"
# 【赤井】
# display as 赤井
# JP: 「誕生日ですよ」
1705 = "「Là sinh nhật đấy.」"
# 【ニイロク】
# display as 二六
# JP: 「え？　けど、赤井運転士の誕生日は、九月の――」
1483 = "「Hả? Nhưng mà, sinh nhật của lái tàu Akai là vào tháng Chín——」"
# 【赤井】
# display as 赤井
# JP: 「私のではなく、息子のです」
1379 = "「Không phải của tôi, mà là của con trai tôi.」"
# monologue
# JP: 稼働半年のレイルロオドが、\n仮とはいえどマスターから、隠し事をされてしまう。
2315 = "Một Railord mới đi vào hoạt động được nửa năm, vậy mà lại bị Master, dù chỉ là tạm thời, giấu giếm."
# monologue
# JP: ――そこから受ける悪影響を想像すれば、\n私の些細な感傷などは、考慮に値さえもしません。
2014 = "――Nếu tưởng tượng đến những ảnh hưởng xấu mà điều đó mang lại, thì chút đa cảm nhỏ nhặt của tôi chẳng đáng để bận tâm."
# 【ニイロク】
# display as 二六
# JP: 「息子？　誰の？」
1458 = "「Con trai? Của ai?」"
# 【赤井】
# display as 赤井
# JP: 「私と、私の元妻との」
1628 = "「Của tôi và vợ cũ của tôi.」"
# 【ニイロク】
# display as 二六
# JP: 「モトツマ？」
1461 = "「Vợ cũ?」"
# 【赤井】
# display as 赤井
# JP: 「元妻というのは、そのままの意味の言葉です。\nつまり、元々の、という意味の元と」
1577 = "「Vợ cũ, nghĩa đúng như mặt chữ thôi. Tức là, chữ 'cũ' mang nghĩa là trước đây, cộng với chữ...」"
# 【ニイロク】
# display as 二六
# JP: 「元・妻――？」
1460 = "「Vợ... cũ——?」"
# 【ニイロク】
# display as 二六
# JP: 「ごめんなさい」
1589 = "「Xin lỗi.」"
# 【赤井】
# display as 赤井
# JP: 「いえいえ、湯のみが空で幸いでした」
1744 = "「Không sao không sao, may mà tách trà đã cạn rồi.」"
# monologue
# JP: 実害は何もありません。\nニイロクさんは、けれどもひどく落ち込んでいます。
2314 = "Không có thiệt hại gì thực tế cả. Nhưng Niiroku lại tỏ ra vô cùng ủ rũ."
# 【赤井】
# display as 赤井
# JP: 「ただプレゼントを送るのを忘れないようにとの\n目印でしたが――驚かせてしまいましたか」
1627 = "「Đó chỉ là dấu hiệu để tôi không quên gửi quà thôi—— Tôi làm cô ngạc nhiên rồi sao?」"
# 【ニイロク】
# display as 二六
# JP: 「うん。驚いた」
1527 = "「Ừm. Tôi ngạc nhiên lắm.」"
# 【赤井】
# display as 赤井
# JP: 「それは失礼いたしました」
1886 = "「Vậy thì thất lễ quá.」"
# 【ニイロク】
# display as 二六
# JP: 「失礼じゃない。ただ――自分が。\nうん。自分が、世間知らずなだけ」
1382 = "「Không thất lễ đâu. Chỉ là——bản thân tôi. Ừm. Chỉ là do bản thân tôi thiếu hiểu biết sự đời thôi.」"
# 【赤井】
# display as 赤井
# JP: 「仕方ないでしょう。稼働、まだ半年ですもの」
1867 = "「Cũng hết cách mà. Cô mới đi vào hoạt động được nửa năm thôi.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 
# monologue
# JP: なるべく、軽く。
2195 = "Cố gắng, nói nhẹ nhàng nhất có thể."
# monologue
# JP: 意識した口調が良かったのでしょうか、\nニイロクさんの言葉にも少し勢いが戻ってきます。
2039 = "Có lẽ giọng điệu có chủ ý của tôi đã phát huy tác dụng, lời nói của Niiroku cũng đã lấy lại được chút sức sống."
# 【ニイロク】
# display as 二六
# JP: 「だから、その――知りたい。詳しく。\nあまり聞けそうにない話だし」
1669 = "「Cho nên, ừm——tôi muốn biết. Chi tiết hơn. Vì đây là chuyện có vẻ không dễ gì nghe được.」"
# 【赤井】
# display as 赤井
# JP: 「構いませんよ」
1474 = "「Không sao đâu.」"
# monologue
# JP: ホっとします。同時に、少しだけ寂しくも感じます。
2181 = "Tôi thở phào nhẹ nhõm. Đồng thời, cũng cảm thấy có chút cô đơn."
# monologue
# JP: ニイロクさんを突き動かすもの。\nそれがおそらく、純粋な知的好奇心だということに。
2323 = "Thứ thôi thúc Niiroku. Có lẽ chỉ là trí tò mò thuần túy mà thôi."
# 【赤井】
# display as 赤井
# JP: 「守秘義務に反しない範囲でなら何でも答えます。\nそれも、わたしの仕事です」
1473 = "「Trong phạm vi không vi phạm nghĩa vụ bảo mật, tôi sẽ trả lời bất cứ điều gì. Đó cũng là công việc của tôi mà.」"
# 【ニイロク】
# display as 二六
# JP: 「なら、聞く」
1883 = "「Vậy, tôi sẽ hỏi.」"
# monologue
# JP: ニイロクさんの目が輝きます。\n体が乗り出し、コードのたるみも伸ばされます。
2038 = "Đôi mắt Niiroku sáng rực lên. Cô ấy rướn người về phía trước, đoạn dây cáp chùng cũng bị kéo căng ra."
# 【ニイロク】
# display as 二六
# JP: 「その……元・妻……ということは、\n赤井運転士は、前は結婚していて。今は――独身」
1876 = "「Cái đó... vợ cũ... có nghĩa là, lái tàu Akai trước đây đã từng kết hôn. Còn bây giờ——là người độc thân.」"
# 【赤井】
# display as 赤井
# JP: 「そのとおりですね」
1748 = "「Đúng là vậy.」"
# 【ニイロク】
# display as 二六
# JP: 「こどもは、その、元・妻と一緒？」
1580 = "「Đứa trẻ, ừm, đang ở cùng vợ cũ sao?」"
# 【赤井】
# display as 赤井
# JP: 「親権が向こうにある上、元妻がいやがるんですよ。\n会わせてもらえないんです」
1681 = "「Quyền nuôi dưỡng thuộc về bên đó, hơn nữa vợ cũ tôi cũng không thích. Cô ấy không cho tôi gặp con.」"
# 【ニイロク】
# display as 二六
# JP: 「あ――」
1495 = "「A——」"
# monologue
# JP: ほぐれかけてた空気がひやり、\nまた落ち込んでしまいます。
2227 = "Bầu không khí vừa mới giãn ra lại trở nên lạnh lẽo, cô ấy lại chìm vào sự ủ rũ."
# 【赤井】
# display as 赤井
# JP: 「ニイロクさん？」
1400 = "「Niiroku?」"
# 【ニイロク】
# display as 二六
# JP: 「世間知らずの想像だけれど。\nそれはきっと……苦しいことだと思う」
1659 = "「Dù chỉ là tưởng tượng của một kẻ thiếu hiểu biết sự đời. Nhưng tôi nghĩ...... điều đó chắc hẳn đau khổ lắm.」"
# 【赤井】
# display as 赤井
# JP: 「苦しい……ですか」
1892 = "「Đau khổ...... sao.」"
# monologue
# JP: まず意識します。言葉に引きずられないように。\nその上で、ただ正直に答えます。
2321 = "Trước tiên phải giữ tỉnh táo. Để không bị cuốn theo những lời nói đó. Sau đó, chỉ cần trả lời một cách thành thật."
# 【赤井】
# display as 赤井
# JP: 「確かに、苦しいことでした。\n忘れなければ、まともに生活できないほどに」
1776 = "「Quả thực là rất đau khổ. Đến mức nếu không quên đi, tôi sẽ không thể sống một cuộc sống bình thường.」"
# 【ニイロク】
# display as 二六
# JP: 「！！？　赤井運転士が？」
1501 = "「!!? Lái tàu Akai mà cũng vậy sao?」"
# 【赤井】
# display as 赤井
# JP: 「ええ。\nわたしなど、ごく平凡な人間ですから」
1518 = "「Đúng vậy. Vì tôi cũng chỉ là một con người hết sức bình thường thôi mà.」"
# monologue
# JP: ニイロクさんの目には私が、\nよほど冷静と写っているのでしょうか？
2099 = "Trong mắt Niiroku, chắc hẳn tôi trông vô cùng điềm tĩnh nhỉ?"
# monologue
# JP: ……表に出すほど若くはないというだけで、\n傷つきも、荒れももちろん、するものですが。
1138 = "......Chỉ là tôi không còn trẻ đến mức bộc lộ hết ra ngoài, chứ tất nhiên là tôi cũng biết tổn thương, biết suy sụp chứ."
# 【赤井】
# display as 赤井
# JP: 「ですから、忘れるしかできなかった。\n全てを過去にし――カレンダーの[しるし]印が残るのみです」
1664 = "「Vì vậy, tôi chỉ còn cách quên đi. Biến mọi thứ thành quá khứ——và giờ chỉ còn lại vết tích trên tờ lịch.」"
# 【ニイロク】
# display as 二六
# JP: 「誕生日も……」
1770 = "「Cả sinh nhật cũng...」"
# 【赤井】
# display as 赤井
# JP: 「！」
# 1498 = "「啊！」" 
# monologue
# JP: 会話をしている――\n不意に感じて、ふつふつと喜びが湧き出て来ます。
2258 = "Đang trò chuyện―― Bất chợt nhận ra điều đó, một niềm vui sướng trào dâng trong tôi."
# monologue
# JP: 話した以上を、受け取ってもらえ、返してもらえる。\nそれがこれほど嬉しいことだと、忘れていました。
2128 = "Nhận lại được nhiều hơn những gì mình đã nói, và được hồi đáp. Tôi đã quên mất rằng điều đó lại đáng vui mừng đến nhường này."
# 【ニイロク】
# display as 二六
# JP: 「誕生日もカレンダーに書かないと忘れるくらい、\n過去に――したの？」
1772 = "「Anh đã biến nó thành quá khứ—— đến mức sinh nhật cũng sẽ quên nếu không ghi lên lịch sao?」"
# 【赤井】
# display as 赤井
# JP: 「しましたね。たった五年で、そうできました」
1699 = "「Đúng vậy. Chỉ mất năm năm, tôi đã làm được điều đó.」"
# 【ニイロク】
# display as 二六
# JP: 「五年かけないと、過去にできない」
1817 = "「Phải mất đến năm năm, mới có thể biến nó thành quá khứ.」"
# monologue
# JP: 言葉を選んでくれているのでしょう。
2117 = "Chắc hẳn cô ấy đang lựa lời để nói."
# monologue
# JP: ニイロクさんは、開けかけた口を一度閉じ。\nそれからゆっくり、また開きます。
2032 = "Niiroku khép lại đôi môi vừa hé mở. Sau đó, cô ấy từ từ mở miệng ra lần nữa."
# 【ニイロク】
# display as 二六
# JP: 「それほど強く思っていたのに。\nどうして、一緒にいられなくなったの？」
1431 = "「Rõ ràng là anh nghĩ nhiều đến vậy mà. Tại sao lại không thể ở bên nhau nữa?」"
# 【赤井】
# display as 赤井
# JP: 「さぁ……過去にしたことですからね。\nあのころのことは、上手くは思い出せませんよ」
1386 = "「Chà...... vì đã là quá khứ rồi mà. Chuyện hồi đó, tôi cũng không thể nhớ rõ được nữa.」"
# 【ニイロク】
# display as 二六
# JP: 「それでも、聞きたい」
1418 = "「Dù vậy, tôi vẫn muốn nghe.」"
# 【赤井】
# display as 赤井
# JP: 「長い話になりますよ？」
1879 = "「Sẽ là một câu chuyện dài đấy nhé?」"
# monologue
# JP: ニイロクさんは頷きます。\n目は、どこまでもまっすぐです。
2048 = "Niiroku gật đầu.\nÁnh mắt cô ấy vô cùng thẳng thắn."
# 【ニイロク】
# display as 二六
# JP: 「聞きたい。自分は、聞かせて欲しい」
1637 = "「Tôi muốn nghe. Tôi muốn anh kể cho tôi nghe.」"
# monologue
# JP: 頷いて。\n少し考え、話の糸口を選びます。
2210 = "Tôi gật đầu. Suy nghĩ một chút, rồi chọn điểm bắt đầu câu chuyện."
# 【赤井】
# display as 赤井
# JP: 「……以前にも少しは話していることですが、\n私は、[しんしょく,1]神職の家の出身です」
1181 = "「......Trước đây tôi cũng từng nhắc đến một chút rồi, tôi xuất thân từ một gia đình làm Thần quan.」"
# monologue
# JP: 赤井さんの子。神社さんの子。\n言われ続けて、思春期まではそれが誇りで。
2070 = "Con của nhà Akai. Con của nhà đền. Liên tục được gọi như vậy, cho đến tuổi dậy thì, đó vẫn là niềm tự hào của tôi."
# 【赤井】
# display as 赤井
# JP: 「ですが、進路に悩むころ、ふと思ったのです。\n神社を離れた自分には、一体何が残るのだろうと」
1420 = "「Nhưng, khi đang băn khoăn về tương lai, tôi chợt nghĩ. Nếu rời khỏi đền thờ, rốt cuộc tôi còn lại gì.」"
# 【ニイロク】
# display as 二六
# JP: 「それで、運転士になった？」
1663 = "「Vì vậy, anh đã trở thành lái tàu?」"
# 【赤井】
# display as 赤井
# JP: 「まず、目指そうと。\n鉄道が好きでしたから、関わりたいと思いました」
1625 = "「Đầu tiên là đặt mục tiêu đã. Vì tôi thích đường sắt, nên tôi muốn làm công việc liên quan đến nó.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 
# 【赤井】
# display as 赤井
# JP: 「御一夜を離れ、[こくら,1]粉蔵に住んで。\n実際の就職活動は、それからでした」
1661 = "「Rời khỏi Ohimitera, đến sống ở Kokura. Hoạt động tìm việc thực sự bắt đầu từ đó.」"
# monologue
# JP: 幸運にも庫内手として採用されて、\n試験を受けて、機関助士。そして機関士に。
2153 = "May mắn được tuyển dụng làm thợ rửa lò, trải qua kỳ thi, tôi trở thành phụ lái tàu. Rồi sau đó là lái tàu."
# monologue
# JP: 苦労も多く、けれど楽しさの方がずうっと多く。\nですので毎日は、飛ぶように過ぎていきました。
2313 = "Vất vả thì nhiều, nhưng niềm vui lại nhiều hơn hẳn. Vì vậy, mỗi ngày đều trôi qua nhanh như chớp."
# 【赤井】
# display as 赤井
# JP: 「気動車免許、電車免許も、順次に取りました。\n運転が、よほど肌にあったのでしょうね」
1660 = "「Tôi cũng lần lượt lấy được bằng lái toa xe tự hành và bằng lái tàu điện. Có lẽ công việc lái tàu rất hợp với tôi.」"
# 【ニイロク】
# display as 二六
# JP: 「うん。赤井運転士は、天性の運転士だと思う。\nお客様にも、[わたしたち,2]車輌側にも、優しい運転をする」
1529 = "「Ừm. Tôi nghĩ lái tàu Akai là một lái tàu bẩm sinh. Anh luôn lái tàu một cách êm ái, chu đáo với cả hành khách lẫn phía toa xe chúng tôi.」"
# 【赤井】
# display as 赤井
# JP: 「そういってもらえて光栄です」
1804 = "「Được nghe cô nói vậy, tôi rất vinh hạnh.」"
# monologue
# JP: けれど、そこまでの気遣いで、\n私の器はいっぱいだったのかもしれません。
2020 = "Thế nhưng, với chừng đó sự chu đáo, có lẽ giới hạn của tôi đã đạt đến mức tối đa rồi."
# 【赤井】
# display as 赤井
# JP: 「元妻と出会ったのは、そのころ――\n電車免許を取得してほどなくのころでした」
1482 = "「Tôi gặp vợ cũ vào khoảng thời gian đó—— không lâu sau khi lấy được bằng lái tàu điện.」"
# 【ニイロク】
# display as 二六
# JP: 「！」
# 1498 = "「啊！」" 
# 【赤井】
# display as 赤井
# JP: 「先輩運転士の紹介で、『父親も[てつどういん,2]鉄道員』だと。\n実際、彼女は鉄道の仕事を理解してくれていました」
1716 = "「Thông qua sự giới thiệu của một lái tàu tiền bối, anh ấy bảo 'bố cô ấy cũng là nhân viên đường sắt'. Thực tế, cô ấy rất thấu hiểu công việc đường sắt.」"
# monologue
# JP: 公休を潰しての乗務も、当然。\n公休の日には、とにかく寝ないと体が持たない。
2101 = "Việc phải hy sinh ngày nghỉ để làm nhiệm vụ là chuyện đương nhiên. Vào ngày nghỉ, nếu không ngủ thì cơ thể sẽ không trụ nổi."
# monologue
# JP: ゆえに一緒に出かけることもほとんど出来ず――\nそれでも彼女は、私を受け入れてくれました。
2097 = "Do đó, chúng tôi hầu như không thể cùng nhau ra ngoài—— Dù vậy, cô ấy vẫn chấp nhận tôi."
# 【赤井】
# display as 赤井
# JP: 「障害らしい障害もなく祝福されて結婚し、\n二年目には子宝にも恵まれました」
1623 = "「Chúng tôi kết hôn trong sự chúc phúc mà không gặp trở ngại gì đáng kể, và đến năm thứ hai thì có được một đứa con.」"
# 【ニイロク】
# display as 二六
# JP: 「――うん」
1152 = "「——Ừm.」"
# 【赤井】
# display as 赤井
# JP: 「それからほどなくのことです。\n『電車試験運転士』任用試験の誘いを頂きました」
1579 = "「Không lâu sau đó. Tôi nhận được lời mời tham gia kỳ thi tuyển 'Lái tàu thử nghiệm tàu điện'.」"
# 【ニイロク】
# display as 二六
# JP: 「すごい。大出世」
1570 = "「Tuyệt quá. Thăng tiến vượt bậc luôn.」"
# monologue
# JP: ニイロクさんの目が輝きます。
2037 = "Đôi mắt Niiroku sáng rực lên."
# monologue
# JP: ……多分、誘いをいただいたとき、\n私もあんな目をしていたのでしょう。
1133 = "......Có lẽ, khi nhận được lời mời, tôi cũng đã có ánh mắt như vậy."
# 【赤井】
# display as 赤井
# JP: 「電車免許保持者自体が少なかった頃ですから。\nほぼ全員にお声掛けがあったのではないでしょうか」
1552 = "「Vì lúc đó số người có bằng lái tàu điện vốn đã ít. Nên chắc là gần như tất cả đều được ngỏ lời mời.」"
# 【ニイロク】
# display as 二六
# JP: 「保持した時点で、凄いってこと。\n試験、すぐに受けたの？」
1456 = "「Có được bằng lái vào thời điểm đó đã là rất tuyệt rồi. Anh đã tham gia kỳ thi ngay sao?」"
# 【赤井】
# display as 赤井
# JP: 「はい。『受けます』と即答して、\nそれからは猛勉強と猛特訓の日が続きました」
1710 = "「Đúng vậy. Tôi đã đáp ngay 'Tôi sẽ tham gia', và từ đó là những ngày tháng học tập và rèn luyện không ngừng nghỉ.」"
# monologue
# JP: 産まれたばかりのこどもを無視する形になっても、\n合格を、再優先の課題としました。
2185 = "Dù có trở thành kẻ bỏ bê đứa con mới chào đời, tôi vẫn đặt việc thi đỗ làm ưu tiên hàng đầu."
# monologue
# JP: それは当然に許されること――\nいま考えれば、そんな甘えもあったのでしょう。
2137 = "Điều đó đương nhiên sẽ được tha thứ—— Bây giờ nghĩ lại, có lẽ tôi đã ỷ lại như thế."
# 【赤井】
# display as 赤井
# JP: 「最初は、昇給への期待が大きかった。\nそれで生活が潤えば――という気持ちも強かった」
1375 = "「Lúc đầu, kỳ vọng được tăng lương là rất lớn. Nếu nhờ đó mà cuộc sống khấm khá hơn——tôi đã mang suy nghĩ mãnh liệt như vậy.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 
# 【赤井】
# display as 赤井
# JP: 「ですが、帝鉄史を改めて学ぶうち。\n全く別の欲望が、私の中に芽生えたのです」
1422 = "「Nhưng, trong lúc học lại lịch sử Đường sắt Hoàng gia. Một khao khát hoàn toàn khác đã nảy mầm trong tôi.」"
# 【ニイロク】
# display as 二六
# JP: 「帝鉄史――」
1596 = "「Lịch sử Đường sắt Hoàng gia——」"
# monologue
# JP: 珍しく、ニイロクさんが言いよどみます。
2157 = "Hiếm khi thấy Niiroku ngập ngừng như vậy."
# 【ニイロク】
# display as 二六
# JP: 「あまり、勉強したことがない」
1644 = "「Tôi chưa học qua nhiều lắm.」"
# 【赤井】
# display as 赤井
# JP: 「\x%l明智;#00ffc040;明智%l;#;・\x%l大詔;#00ffc040;大詔%l;#;と発展の一途を辿る帝鉄の\n最初の[つまず]躓きは、\x%l大詔;#00ffc040;大詔%l;#;三十五年に訪れました」
1554 = "「Đường sắt Hoàng gia vốn đang trên đà phát triển không ngừng qua các thời kỳ \\x%l明智;#00ffc040;Meiji%l;#; và \\x%l大詔;#00ffc040;Taisho%l;#;, nhưng bước vấp ngã đầu tiên đã ập đến vào năm \\x%l大詔;#00ffc040;Taisho%l;#; thứ 35.」"
# 【ニイロク】
# display as 二六
# JP: 「ん……[たいしょう,1]大詔三十五年は、[しょうわ,1]正和元年。\n[ひのもと,2]日ノ本が、戦争に負けた年？」
1514 = "「Ừm...... năm Taisho thứ 35 là năm Showa thứ nhất. Là năm mà Hinomoto thua trận sao?」"
# 【赤井】
# display as 赤井
# JP: 「その通りです。正和元年。焦土となった国土に\n復興の音を響かせたものは、鉄道だったそうです」
1713 = "「Đúng vậy. Năm Showa thứ nhất. Trên mảnh đất đã biến thành tro bụi, thứ vang lên âm thanh của sự phục hưng chính là đường sắt.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 
# 【赤井】
# display as 赤井
# JP: 「それから十八年でエアクラ機関が実用化。\n正和二十一年、エアクラ法制定・施行」
1765 = "「Mười tám năm sau đó, động cơ Aircra được đưa vào thực tiễn. Năm Showa thứ 21, Luật Aircra được ban hành và thực thi.」"
# 【ニイロク】
# display as 二六
# JP: 「その先は、習ってる。正和三十年に、\n帝鉄関連予算が、大幅削減」
1677 = "「Phần tiếp theo thì tôi đã học rồi. Năm Showa thứ 30, ngân sách liên quan đến Đường sắt Hoàng gia bị cắt giảm đáng kể.」"
# 【赤井】
# display as 赤井
# JP: 「そうですね、それがいわゆる、\n『大廃線時代』の、始まりとされています」
1749 = "「Đúng vậy, đó được coi là khởi đầu của cái gọi là 'Thời đại Đại bãi bỏ các tuyến đường sắt'.」"
# monologue
# JP: 大廃線時代。\n好んで口にはしたくない、なんとも嫌な言葉です。
2107 = "Thời đại Đại bãi bỏ các tuyến đường sắt. Một cụm từ đáng ghét mà tôi chẳng bao giờ muốn thốt ra."
# 【赤井】
# display as 赤井
# JP: 「その流れに抗うため、帝鉄は大きな賭けに出ます」
1761 = "「Để chống lại làn sóng đó, Đường sắt Hoàng gia đã đánh một canh bạc lớn.」"
# 【ニイロク】
# display as 二六
# JP: 「知ってる。本線全線電化構想」
1651 = "「Tôi biết. Ý tưởng điện khí hóa toàn bộ các tuyến đường chính.」"
# 【赤井】
# display as 赤井
# JP: 「そのとおりです。苦しみながらも、\n構想は実現に向け、少しずつ少しずつ進んでいった」
1747 = "「Đúng vậy. Dù gặp nhiều khó khăn, nhưng ý tưởng đó vẫn từng bước, từng bước tiến tới hiện thực.」"
# 【ニイロク】
# display as 二六
# JP: 「それが――自分の誕生にも繋がった」
1857 = "「Và điều đó——cũng dẫn đến sự ra đời của tôi.」"
# 【赤井】
# display as 赤井
# JP: 「まさしくですね、ニイロクさん。\n私は、君に逢いたかった」
1697 = "「Chính xác là vậy, Niiroku.\nTôi, đã rất muốn gặp cô.」"
# 【ニイロク】
# display as 二六
# JP: 「っ！！？」
1499 = "「!!?」"
# 【赤井】
# display as 赤井
# JP: 「帝鉄の悲願、鉄道復興のための全線電化。\nその象徴であり切り札となる、特急系電車開発」
1597 = "「Điện khí hóa toàn tuyến vì sự phục hưng của đường sắt, ước nguyện tha thiết của Đường sắt Hoàng gia. Sự phát triển của tàu điện tốc hành chính là biểu tượng và cũng là con át chủ bài cho điều đó.」"
# 【ニイロク】
# display as 二六
# JP: 「あ」
1496 = "「A.」"
# 【赤井】
# display as 赤井
# JP: 「そこに関わり、鉄道復権の一翼を担いたい。\nその欲を感じ、『何をしても』と、思ったのです」
1638 = "「Tôi muốn tham gia vào đó, muốn gánh vác một phần công cuộc phục hưng đường sắt. Cảm nhận được khát khao ấy, tôi đã nghĩ 'dù phải làm bất cứ điều gì'.」"
# monologue
# JP: ほっと、排気音が聞こえます。
2224 = "Một tiếng xả khí nhẹ nhàng vang lên."
# monologue
# JP: 安堵のような、失望のような――\nまるで吐息に聞こえる音が。
2260 = "Giống như sự nhẹ nhõm, lại giống như sự thất vọng—— Một âm thanh nghe như tiếng thở dài."
# 【ニイロク】
# display as 二六
# JP: 「――そういうこと。\nなら、当然のこと。自分も、同じ」
1155 = "「——Ra là vậy. Nếu thế thì, đó là điều đương nhiên. Tôi cũng giống như vậy.」"
# 【赤井】
# display as 赤井
# JP: 「そうですよね」
1696 = "「Đúng vậy nhỉ.」"
# monologue
# JP: レイルロオドであるならば。\n鉄道に自分を捧げる、そうした生き方を選んだ者なら。
2084 = "Nếu là một Railord. Nếu là người đã chọn cách sống cống hiến bản thân cho đường sắt."
# monologue
# JP: けれど、彼女はそうではなく。\nそして――私は、何も理解していなかったのです。
2060 = "Nhưng, cô ấy lại không phải như vậy. Và——tôi đã không hiểu được điều gì cả."
# 【赤井】
# display as 赤井
# JP: 「任用されて、働きはじめて。\n“試験”に[まつ]纏わる責任を、遅まきながら知りました」
1559 = "「Sau khi được bổ nhiệm và bắt đầu làm việc. Tôi mới nhận ra trách nhiệm gắn liền với 'thử nghiệm', dù đã muộn màng.」"
# 【ニイロク】
# display as 二六
# JP: 「試験運転士。\nその責任が、軽いはずがない」
1820 = "「Lái tàu thử nghiệm. Trách nhiệm đó, không thể nào nhẹ nhàng được.」"
# 【赤井】
# display as 赤井
# JP: 「ええ、本当に。“試験”ですから――\nどんな些細なデータでも、正確にあげる必要がある」
1700 = "「Đúng vậy, thật sự là thế. Vì là 'thử nghiệm' nên—— dù là dữ liệu nhỏ nhặt đến đâu cũng cần phải báo cáo chính xác.」"
# monologue
# JP: 機械的に。ただ機械的に。\n主観を一切交えずに、なにひとつ省くことなしに。
2206 = "Một cách máy móc. Chỉ đơn thuần là máy móc. Không xen lẫn bất kỳ sự chủ quan nào, không bỏ sót bất cứ điều gì."
# 【ニイロク】
# display as 二六
# JP: 「当然のこと。どんなデータにも価値がある。\nその瞬間には、たとえ無意味なものに見えても――」
1865 = "「Đó là điều hiển nhiên. Bất kỳ dữ liệu nào cũng có giá trị. Dù tại thời điểm đó, nó có vẻ vô nghĩa đi chăng nữa——」"
# monologue
# JP: ニイロクさんが、ほんの一瞬、目を瞑ります。
2046 = "Niiroku nhắm mắt lại trong một khoảnh khắc ngắn ngủi."
# monologue
# JP: もう何年も稼働して、過去が瞼に焼き付いている、\nそんな錯覚をふと覚えます。
2305 = "Đã hoạt động bao nhiêu năm, quá khứ đã in hằn trong tâm trí, tôi chợt có ảo giác như vậy."
# 【ニイロク】
# display as 二六
# JP: 「そのデータが大きな危険を予知していたと、\nずうっと先に浮かびあがってくることもあるから」
1550 = "「Bởi vì đôi khi, mãi về sau người ta mới nhận ra rằng dữ liệu đó đã dự báo trước một mối nguy hiểm lớn.」"
# 【赤井】
# display as 赤井
# JP: 「はい。輸送は常に、“安全が第一の使命”です。\n当然、わかってはいるつもりでしたが――」
1709 = "「Đúng vậy. Trong vận tải, 'An toàn là sứ mệnh hàng đầu'. Tất nhiên, tôi cứ nghĩ là mình đã hiểu điều đó, nhưng——」"
# monologue
# JP: 本線で感じる“安全”と、試験が求める“安全”と。
2179 = "'An toàn' cảm nhận trên tuyến chính, và 'An toàn' mà thử nghiệm yêu cầu."
# monologue
# JP: 目指すところは同じでも、\n求める深さが、全く違う。
2090 = "Dù mục tiêu hướng tới là như nhau, nhưng độ sâu yêu cầu lại hoàn toàn khác biệt."
# 【赤井】
# display as 赤井
# JP: 「……試験が、どこまで厳しく安全を要求するのか。\n私は、本当には理解できていませんでした」
1184 = "「......Thử nghiệm đòi hỏi sự an toàn khắt khe đến mức nào. Tôi đã không thực sự hiểu được.」"
# 【ニイロク】
# display as 二六
# JP: 「そうなの？」
1702 = "「Vậy sao?」"
# 【赤井】
# display as 赤井
# JP: 「試験車両が、そのまま営業運転に回ることもある。\nけれど。そうならないケースも、数多い」
1759 = "「Cũng có khi phương tiện thử nghiệm được đưa thẳng vào vận hành thương mại. Nhưng, những trường hợp không được như vậy cũng rất nhiều.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 
# monologue
# JP: 試験継続さえも危ない。\nそうしたデータをあげてしまえば、終わりです。
2270 = "Ngay cả việc tiếp tục thử nghiệm cũng nguy hiểm. Nếu báo cáo những dữ liệu như vậy, thì mọi chuyện sẽ kết thúc."
# monologue
# JP: 試験は中止。そして車両は――\nレイルロオドごと、解体されます。
2229 = "Thử nghiệm bị hủy bỏ. Và toa xe sẽ—— bị tháo dỡ cùng với cả Railord."
# 【赤井】
# display as 赤井
# JP: 「自分のあげたデータによって、\n今日組んでいるレイルロオドが、明日には消える」
1549 = "「Bởi vì những dữ liệu tôi báo cáo, Railord đồng hành cùng tôi hôm nay, ngày mai có thể sẽ biến mất.」"
# 【ニイロク】
# display as 二六
# JP: 「それは、危険を未然に[つ]摘むため。\nとても重要で、価値のある仕事」
1864 = "「Đó là để ngăn chặn nguy hiểm từ trong trứng nước. Một công việc rất quan trọng và có giá trị.」"
# 【赤井】
# display as 赤井
# JP: 「わかっています。わかっていても――\n正直、とても大きなストレスです」
1653 = "「Tôi biết chứ. Dù biết là vậy—— nhưng thành thật mà nói, đó là một áp lực rất lớn.」"
# monologue
# JP: 決して過去形で語れない程。
2055 = "Đến mức tuyệt đối không thể nói bằng thì quá khứ."
# monologue
# JP: 言葉にこうして落とすだけでも、\n胃がギリギリと絞られる――
2088 = "Chỉ cần thốt ra thành lời thế này thôi, dạ dày tôi cũng đã quặn thắt lại——"
# monologue
# JP: （ぐ～～～～っっ）
2331 = "（Ọt~~~~~）"
# 【ニイロク】
# display as 二六
# JP: 「あ」
# 1496 = "「啊」" 
# 【赤井】
# display as 赤井
# JP: 「あ」
# 1496 = "「啊」" 
# monologue
# JP: ふ、と。\nニイロクさんの目が緩みます。
2253 = "Đột nhiên.\nÁnh mắt Niiroku dịu lại."
# 【ニイロク】
# display as 二六
# JP: 「赤井運転士。おなかすいたの？」
1840 = "「Lái tàu Akai. Anh đói bụng rồi sao?」"
# 【赤井】
# display as 赤井
# JP: 「いえ――そんな自覚はないのですが」
1389 = "「Không——tôi không cảm thấy thế.」"
# 【ニイロク】
# display as 二六
# JP: 「でも、食べた方がいい」
1416 = "「Nhưng mà, anh nên ăn một chút đi.」"
# monologue
# JP: コンセントを抜き、ニイロクさんが立ち上がります。
2030 = "Rút phích cắm, Niiroku đứng dậy."
# 【ニイロク】
# display as 二六
# JP: 「人間は、お腹が空くと気分が沈む。\nおねえちゃんたちに、そう教わってる」
1405 = "「Con người khi đói bụng thì tâm trạng sẽ chùng xuống. Tôi đã được các chị dạy như vậy.」"
# monologue
# JP: （とんとんとんとん）
2332 = "（Lộc cộc lộc cộc lộc cộc lộc cộc）"
# 【赤井】
# display as 赤井
# JP: 「ニイロクさん……料理できるんですねぇ」
1397 = "「Niiroku... cô biết nấu ăn nhỉ.」"
# 【ニイロク】
# display as 二六
# JP: 「[デロクマルのシロ,5]Ｄ６０　４６おねえちゃんが、\n必ず役に立つから、って」
1907 = "「Chị D60 46 bảo rằng,\nchắc chắn sẽ có ích, nên là.」"
# 【赤井】
# display as 赤井
# JP: 「なるほど。貨物機レイルロオドがですか」
1467 = "「Ra là vậy. Railord của đầu máy hàng hóa sao.」"
# monologue
# JP: 貨物となると、運転士交代なしの\n長距離・長時間乗務も、ザラだと聞きます。
2203 = "Đối với tàu hàng hóa, việc không đổi lái tàu mà phải làm nhiệm vụ trên chặng đường dài, thời gian dài, nghe nói là chuyện thường tình."
# monologue
# JP: 小休止中の機関区で、炊事場を借りて軽食を――\nそんな形で機関士を助けることも覚えたのでしょう。
2306 = "Tranh thủ lúc nghỉ ngơi ở kho đầu máy, mượn nhà bếp làm chút đồ ăn nhẹ—— Chắc hẳn cô ấy cũng đã học được cách giúp đỡ lái tàu theo cách đó."
# 【ニイロク】
# display as 二六
# JP: 「ちゃんと教えてもらえたら、ちゃんとこなせる。\n自分の性能なら、料理でもなんでも。はい、できた」
1547 = "「Nếu được dạy đàng hoàng, tôi sẽ làm được đàng hoàng. Với hiệu suất của tôi, dù là nấu ăn hay bất cứ việc gì. Xong rồi đây.」"
# 【赤井】
# display as 赤井
# JP: 「おお。おいしそうですね」
1535 = "「Ồ. Trông ngon quá nhỉ.」"
# monologue
# JP: 大根のお味噌汁。大根と卵の煮物。\n卵焼きに大根おろし。
2276 = "Canh súp miso củ cải. Củ cải hầm trứng. Trứng cuộn ăn kèm củ cải bào."
# monologue
# JP: 冷蔵庫の中に大根とお味噌と卵しかないのですから、\n大健闘をしてくれました。
2098 = "Trong tủ lạnh chỉ có củ cải, miso và trứng thôi, vậy mà cô ấy đã làm rất tốt."
# 【ニイロク】
# display as 二六
# JP: 「あ――お米、炊き忘れ」
1506 = "「A——quên nấu cơm mất rồi.」"
# 【赤井】
# display as 赤井
# JP: 「ああ、不要です。お[みき,1]神酒でいただきましょう」
1503 = "「À, không cần đâu. Cứ nhắm với rượu Thần là được.」"
# 【ニイロク】
# display as 二六
# JP: 「オミキ？」
1376 = "「Rượu Thần?」"
# 【赤井】
# display as 赤井
# JP: 「神様に捧げたお酒です。\n[せいしゅ,1]清酒ではなく、クマ[じょうちゅう,1]焼酎になりますが」
1773 = "「Là rượu dâng lên thần linh. Tuy không phải là thanh tựu, mà là rượu shochu Kuma.」"
# monologue
# JP: 神棚代わりの[おふだ,2]御神札の前に捧げおいたお神酒を\n授かることにします。
2184 = "Tôi quyết định lấy rượu Thần được dâng trước ngự thần trát thay cho bàn thờ Thần đạo."
# 【赤井】
# display as 赤井
# JP: 「[みぎたいち,2]右田一さんの“右田一”です。\nクマ焼酎らしいクマ焼酎です」
1860 = "「Là rượu 'Migita Ichi' của nhà Migita Ichi. Đúng chuẩn rượu shochu Kuma đấy.」"
# 【ニイロク】
# display as 二六
# JP: 「ふぅん」
1484 = "「Hừm.」"
# 【赤井】
# display as 赤井
# JP: 「と、焼酎をいただくその前に――\n（ずずっ）うん。美味しい」
1556 = "「Và, trước khi thưởng thức rượu shochu—— （Sụp sụp）Ừm. Ngon lắm.」"
# 【ニイロク】
# display as 二六
# JP: 「やった！　よかった！！」
1617 = "「Thành công rồi! May quá!!」"
# 【赤井】
# display as 赤井
# JP: 「煮物も……お、柔らかい――し。うん。うん！\n驚きました。普通に、ちゃんと美味しいです」
1768 = "「Món hầm cũng...... ồ, mềm quá——. Ừm. Ừm! Thật bất ngờ. Rất ngon, đúng chuẩn luôn.」"
# 【ニイロク】
# display as 二六
# JP: 「先生が良かったし、\n教わったことを再現できる性能があるから」
1775 = "「Vì giáo viên dạy tốt, và tôi cũng có hiệu suất để tái hiện lại những gì đã được học.」"
# 【赤井】
# display as 赤井
# JP: 「なるほどなるほど」
1866 = "「Ra là vậy, ra là vậy.」"
# monologue
# JP: 貨物機レイルロオドの指導だからでしょう。
2111 = "Có lẽ là do sự chỉ dẫn của Railord đầu máy hàng hóa."
# monologue
# JP: 私には少し塩気が強すぎますが、\n肴と見ればむしろ良しです。
2274 = "Đối với tôi thì hơi mặn một chút, nhưng nếu coi là đồ nhắm thì lại rất hợp."
# 【赤井】
# display as 赤井
# JP: 「では、と」
1887 = "「Vậy thì, tôi xin phép.」"
# 【ニイロク】
# display as 二六
# JP: 「あ、[てじゃく,1]手酌、だめ」
1504 = "「A, tự rót rượu, không được.」"
# 【赤井】
# display as 赤井
# JP: 「そんなことまで教わっているのですか」
1438 = "「Cô được dạy cả những điều như vậy sao.」"
# monologue
# JP: ニイロクさんのお酌を受けて、\n口を、右田一で満たします。
2191 = "Nhận lấy chén rượu Niiroku rót cho, tôi để rượu Migita Ichi lấp đầy khoang miệng."
# 【赤井】
# display as 赤井
# JP: 「ああ――――――旨い」
1497 = "「Aaaaaa——————Ngon tuyệt.」"
# 【ニイロク】
# display as 二六
# JP: 「む。自分の料理を食べたときより、反応がいい」
1493 = "「Hứ. Phản ứng của anh còn tốt hơn lúc ăn đồ tôi nấu nữa.」"
# 【赤井】
# display as 赤井
# JP: 「それはアレです。\nニイロクさんのお酌だからですよ」
1861 = "「Cái đó là vì.\nLà do Niiroku rót rượu cho tôi đấy.」"
# 【ニイロク】
# display as 二六
# JP: 「そ、そう。なら――うん。嬉しい」
1689 = "「V-Vậy sao. Nếu thế——ừm. Tôi rất vui.」"
# 【赤井】
# display as 赤井
# JP: 「でしたら私も嬉しいですね」
1882 = "「Vậy thì tôi cũng rất vui.」"
# monologue
# JP: 卵焼きの味付けも濃く、\nそれゆえに、大根おろしが爽やかです。
2233 = "Trứng cuộn cũng được nêm nếm đậm đà, nhờ vậy mà củ cải bào ăn kèm lại mang đến cảm giác rất thanh mát."
# monologue
# JP: なるほど確かに……\n腹が満ちれば、それだけで心が和らぎます。
2078 = "Ra là vậy, quả thực là...... Chỉ cần cái bụng được lấp đầy, cõi lòng cũng tự nhiên dịu lại."
# 【赤井】
# display as 赤井
# JP: 「仕事で感じたストレスを、\n私は、家には持ち帰りませんでした」
1633 = "「Những áp lực cảm nhận được trong công việc, tôi không mang về nhà.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 
# monologue
# JP: とても自然に、聞いてくれます。\nだから、自然に話せます。
2115 = "Cô ấy lắng nghe tôi một cách rất tự nhiên. Vì vậy, tôi cũng có thể kể chuyện một cách tự nhiên."
# 【赤井】
# display as 赤井
# JP: 「そうすることが、マナーであると信じていました。\nけれど……その選択が生んだのは、沈黙だけでした」
1647 = "「Tôi từng tin rằng làm như vậy là một phép lịch sự. Nhưng...... sự lựa chọn đó chỉ mang lại sự im lặng.」"
# monologue
# JP: 私が沈黙を抱えれば、\n相手も沈黙を抱えるしかない。
2268 = "Nếu tôi giữ im lặng, đối phương cũng đành phải giữ im lặng theo."
# monologue
# JP: その構造を打ち崩すほど彼女は強い女性ではなく。\nあるいは単に私達は、夫婦になれていなかった。
2073 = "Cô ấy không phải là một người phụ nữ đủ mạnh mẽ để phá vỡ cục diện đó. Hoặc đơn giản là chúng tôi đã không thể trở thành một cặp vợ chồng đúng nghĩa."
# 【赤井】
# display as 赤井
# JP: 「沈黙は次第に重くなり、家に帰るのが辛くなり。\nわたしはますます、仕事にのめり込みました」
1743 = "「Sự im lặng dần trở nên nặng nề, việc trở về nhà cũng trở nên đau khổ. Tôi ngày càng đâm đầu vào công việc.」"
# 【ニイロク】
# display as 二六
# JP: 「赤井運転士の仕事は、見事なもの。\n自分の誕生を、大きく早めてくれたから！」
1436 = "「Công việc của lái tàu Akai thật đáng ngưỡng mộ. Bởi vì anh đã góp phần to lớn đẩy nhanh sự ra đời của tôi!」"
# 【赤井】
# display as 赤井
# JP: 「そうであるなら……\nそういってもらえると、救われる気がします」
1573 = "「Nếu được như vậy...... Nghe cô nói thế, tôi cảm thấy như được cứu rỗi vậy.」"
# monologue
# JP: 棘はもちろん刺さっています。\n息子に――私は、迷惑をかけ続けているのですから。
2187 = "Cái gai đó tất nhiên vẫn còn ghim chặt. Vì tôi——vẫn đang tiếp tục gây phiền phức cho con trai mình."
# monologue
# JP: けれどニイロクさんの言葉は確かに、\n痛みを緩和させてくれます。
2064 = "Nhưng những lời của Niiroku quả thực đã làm dịu đi nỗi đau đó."
# 【赤井】
# display as 赤井
# JP: 「接触が減り、会話が減り、相手の存在が重くなり。\n離婚を、けれど、私は自分からは切り出せなかった」
1622 = "「Sự tiếp xúc thưa dần, những cuộc trò chuyện ít đi, sự hiện diện của đối phương trở nên nặng nề. Nhưng tôi lại không thể tự mình mở lời ly hôn.」"
# 【ニイロク】
# display as 二六
# JP: 「なら、向こうから？」
1878 = "「Vậy là, từ phía bên kia sao?」"
# 【赤井】
# display as 赤井
# JP: 「はい。切りだされたときには、ショックと諦めと。\nそして同時に……正直、安堵も感じてしまいました」
1708 = "「Đúng vậy. Khi cô ấy mở lời, tôi vừa sốc, vừa cam chịu. Và đồng thời...... thành thật mà nói, tôi cũng cảm thấy nhẹ nhõm.」"
# 【ニイロク】
# display as 二六
# JP: 「一緒にいるのが、そこまで苦しくなってたの？」
1426 = "「Ở bên nhau, đã trở nên đau khổ đến mức đó sao?」"
# 【赤井】
# display as 赤井
# JP: 「……さぁ、どうでしたか」
1177 = "「......Chà, ai biết được chứ.」"
# monologue
# JP: 不意に、味噌汁を飲みたくなります。\nもう一口。焼酎ではなく、味噌汁を。
2256 = "Bất giác, tôi muốn uống súp miso. Thêm một ngụm nữa. Không phải rượu shochu, mà là súp miso."
# 【赤井】
# display as 赤井
# JP: 「――ああ」
1149 = "「——A.」"
# monologue
# JP: そうして、飲めば思い知ります。
2011 = "Và rồi, khi uống vào tôi mới nhận ra."
# monologue
# JP: 自分はもう、妻だった人が毎日作っていた味噌汁の、\nその味さえも、忘れてしまっていることを。
2309 = "Rằng tôi đã quên mất, cả hương vị súp miso mà người từng là vợ tôi nấu mỗi ngày."
# 【赤井】
# display as 赤井
# JP: 「元妻以上に、こどもに。申し訳なく思っています。\n……愛情を、もっと注いであげたかったと」
1630 = "「Hơn cả vợ cũ, là đối với đứa con. Tôi cảm thấy rất có lỗi. ......Giá như tôi có thể dành nhiều tình yêu thương hơn cho thằng bé.」"
# 【ニイロク】
# display as 二六
# JP: 「それは、無理」
1871 = "「Điều đó là không thể nào.」"
# 【赤井】
# display as 赤井
# JP: 「！！？」
# 1499 = "「啊！！？」" 
# 【ニイロク】
# display as 二六
# JP: 「愛情がたとえ無限でも。\n時間は、どうしても有限だから」
1490 = "「Dù tình yêu thương có là vô hạn. Thì thời gian, dù thế nào đi nữa cũng chỉ có giới hạn thôi.」"
# monologue
# JP: ニイロクさんが、じっと私を見つめます。\n静かで、ときおりゆらめいて――湖のような瞳です。
2052 = "Niiroku chăm chú nhìn tôi. Đôi mắt ấy tĩnh lặng, thỉnh thoảng lại gợn sóng——như một mặt hồ."
# 【ニイロク】
# display as 二六
# JP: 「そして赤井運転士の時間は、\n自分たちのため、どこまでだって注がれたから」
1801 = "「Và thời gian của lái tàu Akai, đã được dốc cạn vì chúng tôi rồi.」"
# 【赤井】
# display as 赤井
# JP: 「――はい」
1153 = "「——Đúng vậy.」"
# monologue
# JP: そういうことです。\n突き詰めてしまえば、本当にただそれだけのこと。
2145 = "Chính là như vậy. Nghĩ cho cùng, thực sự chỉ có vậy thôi."
# monologue
# JP: “仕事と家庭”あまりに古典的な二択において、\n前者を自分は、選び続けただけのことです。
2143 = "Giữa hai sự lựa chọn quá đỗi kinh điển 'công việc và gia đình', tôi chỉ đơn giản là liên tục chọn vế trước mà thôi."
# 【ニイロク】
# display as 二六
# JP: 「だから。もう。苦しまなくても大丈夫」
1667 = "「Vì vậy. Anh không cần phải. Đau khổ nữa đâu.」"
# monologue
# JP: ニイロクさんが、私を、見ます。\n湖の目で――どこか懐かしい、深い目で。
2041 = "Niiroku, nhìn tôi. Bằng đôi mắt như mặt hồ ấy——một đôi mắt sâu thẳm, có chút gì đó hoài niệm."
# 【ニイロク】
# display as 二六
# JP: 「赤井運転士が産んだ自分は。\x%lクハ26;#00ffc040;クハ26%l;#;とその編成は。\n最優秀で最新鋭の、特急系電車試験車輌だから」
1545 = "「Bởi vì tôi, người được sinh ra bởi lái tàu Akai. Cùng với \\x%lクハ26;#00ffc040;Kuha 26%l;#; và đoàn tàu của nó. Là toa xe thử nghiệm tàu điện tốc hành xuất sắc nhất, hiện đại nhất.」"
# 【赤井】
# display as 赤井
# JP: 「……そう思います。\nそこだけは、私は、迷わず誇れます」
1179 = "「......Tôi cũng nghĩ vậy. Chỉ riêng điều đó, tôi có thể tự hào mà không chút do dự.」"
# monologue
# JP: 妻は大人で、自分自身が為した選択の結果です。\n私自身も、無論、同様。
2174 = "Vợ tôi là người lớn, đó là kết quả từ sự lựa chọn của chính cô ấy. Bản thân tôi, tất nhiên, cũng vậy."
# monologue
# JP: けれどもこどもを巻き込んだ。\nその苦しさを一生抱えていくのでも、なお。
2063 = "Nhưng tôi đã kéo cả con mình vào. Dù cho phải ôm lấy nỗi đau đó suốt cả cuộc đời này đi chăng nữa."
# 【赤井】
# display as 赤井
# JP: 「君と私は、そう答えられるだけのデータを重ねた。\nそのことだけは、自信をもって答えられます」
1551 = "「Cô và tôi đã tích lũy đủ dữ liệu để có thể đưa ra câu trả lời đó. Chỉ riêng điều đó, tôi có thể tự tin khẳng định.」"
# 【ニイロク】
# display as 二六
# JP: 「うん。……うん。うふふっ」
1510 = "「Ừm...... ừm. Ư fufu.」"
# monologue
# JP: 自信に満ちた、眩しいほどに誇らしげな笑み。\nああ――私はそれを、いくつ見てきたことでしょう。
2127 = "Một nụ cười đầy tự tin, tự hào đến chói lóa. A――Tôi đã nhìn thấy nụ cười ấy bao nhiêu lần rồi nhỉ."
# monologue
# JP: 昨日までは隣に輝いてくれていたそれを、\nいくつ――私は失ってきたことでしょう。
2202 = "Nụ cười mới hôm qua vẫn còn tỏa sáng bên cạnh tôi, tôi đã đánh mất nó——bao nhiêu lần rồi."
# 【ニイロク】
# display as 二六
# JP: 「赤井運転士は、自分たちに時間を注いでくれた」
1839 = "「Lái tàu Akai, đã dành thời gian cho chúng tôi.」"
# monologue
# JP: ニイロクさんが、また見ます。\nその目を見ろと、わたしに言おうとするかのように。
2028 = "Niiroku, lại nhìn tôi. Như thể muốn bảo tôi hãy nhìn vào đôi mắt ấy."
# 【ニイロク】
# display as 二六
# JP: 「何度でも言う。\n『だから』。『自分は』。『ここにいる』」
1643 = "「Tôi sẽ nói bao nhiêu lần cũng được. 'Vì vậy'. 'Tôi'. 'Mới ở đây'.」"
# 【赤井】
# display as 赤井
# JP: 「あ！」
# 1498 = "「啊！」" 
# monologue
# JP: 湖の目が、私を見ます。\nその表面が、ゆらぎます。
2311 = "Đôi mắt như mặt hồ ấy, nhìn tôi. Bề mặt của nó, khẽ dao động."
# 【ニイロク】
# display as 二六
# JP: 「蓄積されたデータは、継承されて反映されるから。\nレイルロオドは――自分たちは、共感するから」
1799 = "「Vì những dữ liệu được tích lũy sẽ được kế thừa và phản ánh lại. Bởi vì Railord——chúng tôi, có sự cộng cảm.」"
# monologue
# JP: いくつもの色が、湖上につかの間、ひらめきます。\nかつては隣にいてくれた、試験機たちのまなざしが。
2075 = "Vô vàn sắc màu, thoáng chốc lóe lên trên mặt hồ. Là ánh mắt của những cỗ máy thử nghiệm, đã từng kề vai sát cánh bên tôi."
# 【赤井】
# display as 赤井
# JP: 「ニイロクさん――君は」
1398 = "「Niiroku——Cô」"
# 【ニイロク】
# display as 二六
# JP: 「最新鋭とは、そういうこと。\n無数の思い出が、データが。自分を産んでくれた」
1672 = "「Hiện đại nhất, chính là như vậy. Vô số những kỷ niệm, những dữ liệu. Đã sinh ra tôi.」"
# 【赤井】
# display as 赤井
# JP: 「そう……なのですね」
1466 = "「Ra...... là vậy.」"
# monologue
# JP: 恨まれていると、思っていました。\n恨まれることこそ贖罪と、そんなことさえ恐らくは。
2168 = "Tôi cứ nghĩ rằng, mình đang bị oán hận. Thậm chí có lẽ tôi còn nghĩ, bị oán hận chính là một cách để chuộc tội."
# 【赤井】
# display as 赤井
# JP: 「最新鋭とは、過去の全てを――\n受け継いでいるということなのですね」
1671 = "「Hiện đại nhất, chính là kế thừa—— tất cả mọi thứ của quá khứ nhỉ.」"
# 【ニイロク】
# display as 二六
# JP: 「わかってくれたなら、嬉しい。\nここのところ、元気がないみたいだったから」
1632 = "「Anh hiểu được thì tôi rất vui. Vì dạo gần đây, trông anh có vẻ không được khỏe.」"
# 【赤井】
# display as 赤井
# JP: 「気にかけてくれたのですか」
1434 = "「Cô đã lo lắng cho tôi sao?」"
# 【ニイロク】
# display as 二六
# JP: 「気にかける。赤井運転士のことは、いつでも」
1548 = "「Lo chứ. Lúc nào tôi cũng lo cho lái tàu Akai hết.」"
# monologue
# JP: ニイロクさんの目を見ます。\nそこにはもう、元の色しかありません。
2198 = "Tôi nhìn vào mắt Niiroku. Trong đó giờ đây chỉ còn lại màu sắc nguyên bản."
# monologue
# JP: ニイロクさんの言葉なのだと――\n感じて、ふつふつ嬉しくなります。
2163 = "Nhận ra đó chính là những lời của Niiroku―― tôi cảm thấy một niềm vui sướng trào dâng."
# 【赤井】
# display as 赤井
# JP: 「そうですか。ありがとう」
1704 = "「Vậy sao. Cảm ơn cô.」"
# 【ニイロク】
# display as 二六
# JP: 「よかった。\n元気がなかった理由もわかって」
1561 = "「Tốt quá rồi. Cũng hiểu được lý do tại sao anh lại không có tinh thần.」"
# 【赤井】
# display as 赤井
# JP: 「はい」
# 1696 = "「是啊」" 
# monologue
# JP: ――ニイロクさんに心配をさせてしまうほど、\n悩んでみえた理由なら、別にあります。
2281 = "――Nếu nói về lý do khiến tôi trông có vẻ phiền não đến mức làm Niiroku phải lo lắng, thì lại là một chuyện khác."
# monologue
# JP: けれどもそれを今伝え、\nこれほど晴れた笑顔を曇らせたくありません。
2058 = "Nhưng nếu bây giờ nói ra điều đó, tôi không muốn làm lu mờ đi nụ cười rạng rỡ này."
# 【赤井】
# display as 赤井
# JP: 「頑張りましょう。ニイロクさん。\nいつか、旧車と呼ばれるときまで」
1463 = "「Cùng cố gắng nhé. Niiroku. Cho đến một ngày nào đó, khi cô được gọi là 'xe cũ'.」"
# 【ニイロク】
# display as 二六
# JP: 「うん。それ。素敵。\nそのときの最新鋭機に。全力で嫉妬してみたい」
1525 = "「Ừm. Cái đó. Tuyệt thật đấy. Tôi muốn thử dốc toàn lực ghen tị với cỗ máy hiện đại nhất lúc bấy giờ xem sao.」"
# 【赤井】
# display as 赤井
# JP: 「嫉妬しましょう。憧れましょう。\nそれほどの進歩を、必ず見ましょう」
1471 = "「Hãy cứ ghen tị đi. Hãy cứ khao khát đi. Chúng ta nhất định sẽ chứng kiến một sự tiến bộ to lớn như thế.」"
# 【ニイロク】
# display as 二六
# JP: 「うん！」
1520 = "「Ừm!」"
# monologue
# JP: ニイロクさんが立ち上がり――ああ！
2042 = "Niiroku đứng dậy——a!"
# 【赤井】
# display as 赤井
# JP: 「後片付けくらいは自分でします。\nそこまで面倒をかけるわけには」
1682 = "「Việc dọn dẹp thì để tôi tự làm. Không thể làm phiền cô đến mức đó được.」"
# 【ニイロク】
# display as 二六
# JP: 「面倒じゃない。けど――なら。そう。\nふたりですると、きっと、二倍早く終る」
1388 = "「Không phiền đâu. Nhưng——nếu vậy thì. Đúng rồi. Hai người cùng làm, chắc chắn sẽ xong nhanh gấp đôi.」"
# 【赤井】
# display as 赤井
# JP: 「わかりました。では、そうしましょう」
1816 = "「Tôi hiểu rồi. Vậy cứ làm thế đi.」"
# 【ニイロク】
# display as 二六
# JP: 「うん！」
# 1520 = "「嗯！」" 
# monologue
# JP: ……コップと湯のみが一つずつ。\n味噌汁椀に、お皿に小鉢。
1144 = "......Một chiếc ly và một tách trà. Một bát súp miso, một cái đĩa và một cái bát nhỏ."
# monologue
# JP: あっという間に片付けば、\nニイロクさんは、あっさりノブに手をかけます。
2240 = "Chỉ trong chớp mắt đã dọn dẹp xong, Niiroku thản nhiên đặt tay lên tay nắm cửa."
# 【ニイロク】
# display as 二六
# JP: 「楽しかった。たくさん話せてうれしかった。\nありがとう」
1480 = "「Vui lắm. Được nói chuyện nhiều thế này tôi rất vui. Cảm ơn anh.」"
# 【赤井】
# display as 赤井
# JP: 「こちらこそです。ありがとう。\nそれから、ごちそうさま。とても美味しかった」
1641 = "「Tôi mới là người phải nói thế. Cảm ơn cô. Và, cảm ơn vì bữa ăn. Rất ngon.」"
# 【ニイロク】
# display as 二六
# JP: 「うん。――うん。なら、また作る」
1511 = "「Ừm. ——Ừm. Vậy, lần sau tôi lại nấu nữa.」"
# 【赤井】
# display as 赤井
# JP: 「ええ、そのうちに、また」
1522 = "「Ừm, lúc nào đó, lại nhờ cô nhé.」"
# 【ニイロク】
# display as 二六
# JP: 「わかった。それじゃあ！」
1655 = "「Tôi biết rồi. Vậy thì, chào nhé!」"
# monologue
# JP: ニイロクさんが廊下に出ます。\nドアを締め――けれども鍵は、まだかけません。
2044 = "Niiroku bước ra hành lang. Đóng cửa lại——nhưng tôi vẫn chưa khóa vội."
# monologue
# JP: あの音――閉めだされたと感じる音を、\nニイロクさんに、聞かせたいとは思いません。
2208 = "Âm thanh đó——âm thanh khiến người ta cảm thấy như bị nhốt ở ngoài, tôi không muốn Niiroku phải nghe thấy."
# monologue
# JP: （足音が消えるのを待ってから――）
2339 = "（Đợi đến khi tiếng bước chân khuất hẳn rồi hẵng——）"
# 【ニイロク】
# display as 二六
# JP: 「やった！　やったあ！　あ、シロおねえちゃん！？\nうん、あのね！　すごくいいよ！　脈あり！！！」
1563 = "「Thành công rồi! Thành công rồi! A, chị Shiro!? Ừm, em bảo này! Tốt lắm luôn! Có hi vọng!!!」"
# 【赤井】
# display as 赤井
# JP: 「！！？」
1492 = "「!!?」"
# monologue
# JP: 声が思わず出そうになって、飲み込みます。
2200 = "Suýt nữa thì thốt ra thành tiếng, tôi vội nuốt ngược vào trong."
# 【ニイロク】
# display as 二六
# JP: 「――うん――そう――でね？　――うん――\n……ふき大根？　……しえて！　……がと……ん！」
1151 = "「——Ừm——Đúng rồi——Thế nhé? ——Ừm—— ......Củ cải hầm? ......Chỉ em với! ......Cảm ơn......Ừm!」"
# monologue
# JP: （脈、ですか）
2337 = "（Hi vọng, sao）"
# monologue
# JP: ……ニイロクさんの賑やかな声と足音が、\nどんどん小さくなって――消えます。
1130 = "......Giọng nói náo nhiệt và tiếng bước chân của Niiroku, dần dần nhỏ lại——rồi biến mất."
# monologue
# JP: （カチャリ）
2335 = "（Lạch cạch）"
# 【赤井】
# display as 赤井
# JP: 「脈……ですか」
1593 = "「Hi vọng...... sao.」"
# monologue
# JP: どうしたものかと考えて、\n自分の手首を、なんの気なしに掴んでみます。
2165 = "Đang nghĩ xem phải làm sao đây, tôi vô thức nắm lấy cổ tay mình."
# 【赤井】
# display as 赤井
# JP: 「脈は――確かにありますが」
1592 = "「Mạch thì——đúng là có đập thật.」"
