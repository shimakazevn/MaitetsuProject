# lines: 354 
# 【赤井】
# display as 赤井
# JP: 「はい？」
1489 = "「Vâng?」"

# 【ニイロク】
# display as ？？？
# JP: 「入りたい」
1829 = "「Tôi muốn vào.」"

# 【赤井】
# display as 赤井
# JP: 「ああ、ニイロクさんですか。\nどうぞ、入って下さい」
1485 = "「À, là cô Niiroku sao.\nXin mời vào.」"

# 【ニイロク】
# display as 二六
# JP: 「ん……」
1509 = "「Ưm...」"

# monologue
# JP: ニイロクさんは入るなり、仔細にあたりを眺めます。\n巣穴に戻った小動物が、いかにもしそうな姿です。
2026 = "Niiroku vừa bước vào đã nhìn quanh quan\nsát tỉ mỉ.\nDáng vẻ hệt như một con thú nhỏ vừa trở về\nhang ổ của mình."

# 【ニイロク】
# display as 二六
# JP: 「つまらない。いつも片付き過ぎている」
1779 = "「Chán ngắt. Lúc nào cũng ngăn nắp quá\nmức.」"

# 【赤井】
# display as 赤井
# JP: 「片付いていると、つまらない。ですか」
1684 = "「Ngăn nắp quá, thì chán ngắt. Sao.」"

# 【ニイロク】
# display as 二六
# JP: 「うん」
1519 = "「Ừ.」"

# monologue
# JP: いいながら、慣れた手つきでコンセントへと\n自分のコードを差し込みながら座ります。
2023 = "Vừa nói, cô ấy vừa thuần thục cắm dây sạc\ncủa mình\nvào ổ điện rồi ngồi xuống."

# 【ニイロク】
# display as 二六
# JP: 「赤井運転士。クッション」
1841 = "「Tài xế Akai. Đệm.」"

# monologue
# JP: ……もう六ヶ月前になりますか。\nこの部屋にニイロクさんが初めて訪ねて来たその日。
1141 = "...Đã sáu tháng trước rồi sao.\nCái ngày đầu tiên Niiroku đến thăm căn\nphòng này."

# monologue
# JP: 「クッションくらいは出して欲しい」とせがまれて、\n一緒にでかけて買ってきた、かわいらしいもの。
2237 = "「Vâng, của cô đây.」"

# 【赤井】
# display as 赤井
# JP: 「はい、どうぞ」
1439 = "「Tôi nghĩ cỡ này thì cứ vứt lăn lóc ở\nngoài cũng được mà.」"

# 【ニイロク】
# display as 二六
# JP: 「これくらいは、いつも転がっててもいいと思う」
1858 = "「Ra là vậy.」"

# 【赤井】
# display as 赤井
# JP: 「なるほど」
1640 = "「Ra là vậy.」"

# monologue
# JP: ――\x%lクハ26;#00ffc040;クハ26%l;#;専用レイルロオド。\n最新鋭特急系電車統括制御専用、人型モジュール。
2119 = "――Railord chuyên dụng của \\x%lクハ26;#00ffc040;Kuha 26%l;#;.\nModule hình người chuyên dụng cho hệ thống\nđiều khiển tổng hợp tàu điện tốc hành tối\ntân nhất."

# monologue
# JP: 帝鉄がその小さな体にどれほど多くを詰め込んだのか、\n今のささいな呟きからも、伝わってくる気がします。
2147 = "Teitetsu đã nhồi nhét biết bao nhiêu thứ\nvào cơ thể nhỏ bé ấy,\ntôi cảm giác như mình có thể hiểu được\nphần nào qua lời lẩm bẩm nhỏ nhặt vừa rồi."

# 【赤井】
# display as 赤井
# JP: 「確かに、片付けすぎだったようですね」
1568 = "「Quả thực, có vẻ như tôi đã dọn dẹp quá\nmức rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「ふふっ」
1478 = "「Fufu.」"

# monologue
# JP: クッションひとつで居場所が生まれる。\n居場所を、誰かと共有できる。
2083 = "Chỉ một chiếc đệm cũng đủ tạo ra một chốn\ndừng chân.\nMột chốn dừng chân có thể sẻ chia cùng ai\nđó."

# monologue
# JP: それは確かな幸せなのだと――\n私はいつから、忘れてしまっていたのでしょう。
2303 = "Đó là một niềm hạnh phúc đích thực――\nTôi đã lãng quên điều đó từ bao giờ nhỉ."

# 【ニイロク】
# display as 二六
# JP: 「…………」
1164 = "「............」"

# monologue
# JP: ……そわそわと、ニイロクさんは落ち着きません。\nどこか不安げにも見えます。
1128 = "...Niiroku bồn chồn, không yên.\nTrông cô ấy có vẻ gì đó bất an."

# 【赤井】
# display as 赤井
# JP: 「……お茶を淹れます。少し待っていてくださいね」
1182 = "「...Tôi sẽ pha trà. Đợi một chút nhé.」"

# monologue
# JP: 喉は渇いていませんが、\nどうぞゆっくりしてくださいと、伝えるために。
2177 = "Dù không khát nước,\nnhưng tôi làm vậy để ngầm bảo cô ấy hãy cứ\ntự nhiên đi."

# 【赤井】
# display as 赤井
# JP: 「……ふぅ」
1174 = "「...Phù.」"

# 【ニイロク】
# display as 二六
# JP: 「お茶って、どんな味がするの？」
1811 = "「Trà, có vị như thế nào vậy?」"

# 【赤井】
# display as 赤井
# JP: 「飲んだことありませんでしたっけ？」
1432 = "「Cô chưa uống bao giờ sao?」"

# 【ニイロク】
# display as 二六
# JP: 「無い。\n赤井運転士がお茶を淹れるのを見たのも、初めて」
1745 = "「Chưa.\nĐây cũng là lần đầu tiên tôi thấy tài xế\nAkai pha trà.」"

# 【赤井】
# display as 赤井
# JP: 「ああ、そうでしたか。それでは――」
1488 = "「À, ra là vậy. Thế thì――」"

# 【ニイロク】
# display as 二六
# JP: 「いい。ひとくちでいい。\nだから、それをもらえる？」
1383 = "「Được rồi. Một ngụm là đủ.\nNên, cho tôi cốc đó được không?」"

# 【赤井】
# display as 赤井
# JP: 「構いませんよ」
1777 = "「Không sao đâu.」"

# monologue
# JP: 私の手にさえ大きな湯のみを、\n大事に大事に、小さな両手が包み込みます。
2113 = "Chiếc tách trà đến tay tôi cầm còn thấy\nlớn,\nđược hai bàn tay nhỏ bé ôm trọn lấy một\ncách nâng niu, cẩn thận."

# 【ニイロク】
# display as 二六
# JP: 「ん……。\nさっぱりしてる。温かい。優しい匂いがする」
1515 = "「Ưm...\nThanh đạm thật. Ấm áp nữa. Có mùi hương\nrất dịu nhẹ.」"

# 【赤井】
# display as 赤井
# JP: 「[うじこ,1]氏子さんからいただいたお茶ですからね。\nクマ茶の中でも上等なものです」
1859 = "「Là trà được giáo dân biếu tặng mà lị.\nThuộc loại thượng hạng trong số các loại\ntrà Kuma đấy.」"

# 【ニイロク】
# display as 二六
# JP: 「ウジコ？　クマ茶？」
1442 = "「Giáo dân? Trà Kuma?」"

# 【赤井】
# display as 赤井
# JP: 「氏子さん、というのはですね――」
1670 = "「Giáo dân, có nghĩa là――」"

# monologue
# JP: 取るにたらない話にけれど、\nニイロクさんは表情をくるくる変化させます。
2312 = "Dù chỉ là những câu chuyện vặt vãnh,\nnhưng biểu cảm của Niiroku lại thay đổi\nliên tục."

# 【ニイロク】
# display as 二六
# JP: 「そうなんだ。赤井[あそ,1]阿蘇神社。[おひとよ,2]御一夜。クマ。\nこのお茶と赤井運転士の、ふるさと――（コクっ）」
1715 = "「Ra là vậy. Đền Akai Aso. Ohimitera. Kuma.\nQuê hương của loại trà này, và của tài xế\nAkai――(Ực)」"

# monologue
# JP: ……ああ、いい顔です。
1131 = "...Chà, một khuôn mặt thật đẹp."

# monologue
# JP: 飲む。食べる。満たされる。\nそれが喜びであることを、思い出させてくれるほど。
2293 = "Uống. Ăn. Thỏa mãn.\nĐến mức khiến tôi nhớ lại rằng đó chính là\nniềm vui."

# 【ニイロク】
# display as 二六
# JP: 「行ってみたい。連れて行ってほしい」
1635 = "「Tôi muốn đến đó thử. Anh dẫn tôi đi nhé.」"

# 【赤井】
# display as 赤井
# JP: 「電化区間が伸びればいつか、いけますよ。\n[くまもと,1]隈元-[おひとよ,2]御一夜にはきっと、特急電車が走ります」
1574 = "「Nếu đoạn đường điện hóa được mở rộng thì\nmột ngày nào đó sẽ đi được thôi.\nChắc chắn sẽ có tàu điện tốc hành chạy\ntuyến Kumamoto - Ohimitera.」"

# 【ニイロク】
# display as 二六
# JP: 「そうじゃなくて――あ！？　ううん。\nそうでもいい。そうでも……それは、すごくいい」
1381 = "「Không phải thế――a!? Không.\nThế cũng được. Thế cũng... rất tuyệt.」"

# monologue
# JP: （あ）
2334 = "(A)"

# monologue
# JP: うかつなことを言ってしまったかもしれません。\n私は試験運転士。
2188 = "Có lẽ tôi đã lỡ lời mất rồi.\nTôi là tài xế lái thử."

# monologue
# JP: ニイロクさんが、\x%lクハ26;#00ffc040;クハ26%l;#;が本線運用に移るまで――\nただそれだけの、短い期間の付き合いだというのに。
2171 = "Mối quan hệ này chỉ kéo dài trong một\nkhoảng thời gian ngắn ngủi,\ncho đến khi Niiroku, và \\x%lクハ26;#00ffc040;Kuha 26%l;#; chuyển\nsang vận hành trên tuyến chính――vậy mà."

# 【赤井】
# display as 赤井
# JP: 「……ところでニイロクさん。次の試験運転ですが」
1176 = "「...Nhân tiện thì cô Niiroku. Về lần lái\nthử tiếp theo.」"

# 【ニイロク】
# display as 二六
# JP: 「ん」
# 1519 = "「嗯」" 

# monologue
# JP: 不満そうな顔を隠そうともせず、\nいかにもしぶしぶ、頷きます。
2053 = "Không thèm giấu đi vẻ mặt bất mãn,\ncô ấy gật đầu một cách miễn cưỡng."

# monologue
# JP: （ああ）
# 2334 = "（啊）" 

# monologue
# JP: それを嬉しく感じてしまい、感じた自分を戒めます。
2192 = "Cảm thấy vui sướng vì điều đó, tôi tự nhắc\nnhở bản thân mình."

# monologue
# JP: ニイロクさんを他の誰かに受け渡す。\n――それが、私の職務ですから。
2139 = "Bàn giao Niiroku cho một ai đó khác.\n――Đó là bổn phận của tôi."

# 【赤井】
# display as 赤井
# JP: 「その話を伝えに来てくれたんですよね？」
1428 = "「Cô đến đây để truyền đạt chuyện đó đúng\nkhông?」"

# 【ニイロク】
# display as 二六
# JP: 「その話"も"、伝えに来た」
1863 = "「Tôi đến để truyền đạt chuyện đó \"nữa\".」"

# 【赤井】
# display as 赤井
# JP: 「伺いましょう」
1757 = "「Tôi nghe đây.」"

# monologue
# JP: 強調に気づかぬ体で促せば、\nニイロクさんは息を吐き、仕事の声に引き締めます。
2205 = "Giả vờ như không nhận ra sự nhấn mạnh đó\nvà giục cô ấy nói tiếp,\nNiiroku thở hắt ra, lấy lại giọng điệu\nnghiêm túc của công việc."

# 【ニイロク】
# display as 二六
# JP: 「次から編成が伸びる。4両基本編成に\nモハシ[ニイイチ,1]21試験車両が組み込まれる」
1609 = "「Từ lần sau, đoàn tàu sẽ dài ra. Thêm \\x%lモハシ21試験車両;#00ffc040;Toa xe thử nghiệm Mohashi 21%l;#;\nvào đội hình 4 toa cơ bản.」"

# 【赤井】
# display as 赤井
# JP: 「モハシ――モーター車の普通車と、食堂車との\x%l合造車;#00ffc040;合造車%l;\n#;……ああいやビュッフェか」
1911 = "「Mohashi――\\x%l合造車;#00ffc040;Toa xe hỗn hợp%l;#; giữa toa động lực\nhạng thường và toa ăn\n...à không, là \\x%lビュッフェ;#00ffc040;quầy ăn nhẹ%l;#; chứ.」"

# 【ニイロク】
# display as 二六
# JP: 「そう。\x%lクハ26;#00ffc040;クハ26%l;#;編成は最速の特急列車になるから。\n食事を楽しむ間に[はかた,1]博太につく。だからビュッフェ」
1587 = "「Đúng vậy. Vì đoàn tàu \\x%lクハ26;#00ffc040;Kuha 26%l;#; sẽ là\nchuyến tàu tốc hành nhanh nhất.\nTrong lúc hành khách thưởng thức bữa ăn\nthì tàu đã đến Hakata rồi. Nên mới là quầy\năn nhẹ.」"

# 【赤井】
# display as 赤井
# JP: 「確かに。いまの電化区間の短さを考えれば、\n[ビュッフェ,5]軽食コーナーでも過大設備でしょうね」
1790 = "「Quả thực. Nếu xét đến việc đoạn đường\nđiện hóa hiện tại còn ngắn,\nthì dù là góc ăn nhẹ cũng là một trang bị\nquá mức rồi.」"

# 【ニイロク】
# display as 二六
# JP: 「期待のあらわれ。意思のあらわれ。全線電化への\n――帝鉄復活への。自分は、それに応えたい」
1862 = "「Đó là biểu hiện của sự kỳ vọng. Biểu hiện\ncủa ý chí. Hướng tới điện hóa toàn tuyến\n――hướng tới sự hồi sinh của Teitetsu. Tôi\nmuốn đáp lại điều đó.」"

# 【赤井】
# display as 赤井
# JP: 「ですね。がんばりましょう、ニイロクさん」
1693 = "「Đúng vậy. Cùng cố gắng nhé, Niiroku.」"

# 【ニイロク】
# display as 二六
# JP: 「うん。がんばる」
1528 = "「Ừm. Tôi sẽ cố gắng.」"

# 【赤井】
# display as 赤井
# JP: 「モーター車が増える分、\nニイロクさんの計算量も増えるでしょうが――」
1465 = "「Số lượng toa xe động lực tăng lên,\nkhối lượng tính toán của Niiroku chắc cũng\nsẽ tăng theo nhỉ——」"

# 【ニイロク】
# display as 二六
# JP: 「問題ない」
1746 = "「Không vấn đề gì.」"

# monologue
# JP: 自信が、誇りが。\n声から溢れでてくるようです。
2123 = "Sự tự tin, niềm tự hào.\nDường như đang tuôn trào qua giọng nói của\ncô ấy."

# 【ニイロク】
# display as 二六
# JP: 「当初から想定されている運用。\n余力は十二分。赤井運転士は安心していい」
1868 = "「Việc vận hành này đã nằm trong dự tính\nngay từ đầu.\nKhả năng của tôi vẫn còn dư dả lắm. Lái\ntàu Akai cứ yên tâm.」"

# 【赤井】
# display as 赤井
# JP: 「そうですか。それでも、油断は禁物ですよ？」
1703 = "「Vậy sao. Dù vậy cũng không được lơ là đâu\nnhé?」"

# 【ニイロク】
# display as 二六
# JP: 「わかっている。安全が第一の使命」
1649 = "「Tôi biết rồi. An toàn là sứ mệnh đặt lên\nhàng đầu.」"

# 【赤井】
# display as 赤井
# JP: 「ですね。でしたら――」
1695 = "「Đúng vậy. Nếu thế thì——」"

# 【ニイロク】
# display as 二六
# JP: 「あ！」
1498 = "「A!」"

# monologue
# JP: 問題が何もないのなら、話はこれで終わりです。\n湯のみもとうに空ですし、充電はもとより十分なはず。
2211 = "Nếu không có vấn đề gì thì câu chuyện đến\nđây là kết thúc.\nTách trà cũng đã cạn từ lâu, và việc sạc\npin thì vốn dĩ đã đủ rồi."

# 【赤井】
# display as 赤井
# JP: 「ニイロクさん？　そろそろ」
1399 = "「Niiroku? Chắc cũng sắp...」"

# 【ニイロク】
# display as 二六
# JP: 「違う。まだ。大事な話は他にもある。\nあの――ええと――」
1392 = "「Không phải. Vẫn chưa. Vẫn còn chuyện quan\ntrọng khác.\nCái đó——ừm——」"

# monologue
# JP: ニイロクさんの目が泳ぎます。\nこの部屋の少ない家具の間を何度も往復し――
2050 = "Ánh mắt của Niiroku đảo quanh.\nCô ấy liên tục đưa mắt nhìn qua lại giữa\nnhững món đồ nội thất ít ỏi trong căn\nphòng này——"

# 【ニイロク】
# display as 二六
# JP: 「そう、公休！\n赤井運転士の次の公休……は」
1590 = "「Đúng rồi, ngày nghỉ!\nNgày nghỉ tiếp theo của lái tàu Akai......\nlà」"

# monologue
# JP: （ああ……）
2333 = "（A......）"

# monologue
# JP: カレンダー。一点で視線が止まっています。\n……これは、聞かれることでしょう。
2124 = "Tờ lịch. Ánh mắt cô ấy dừng lại ở một\nđiểm.\n......Chắc là cô ấy sẽ hỏi đây."

# 【ニイロク】
# display as 二六
# JP: 「なに？　あの『七』って。\n二十六日なのに、『七』」
1875 = "「Cái 'Bảy' kia là sao vậy?\nRõ ràng là ngày hai mươi sáu, vậy mà lại\nviết là 'Bảy'.」"

# 【赤井】
# display as 赤井
# JP: 「誕生日ですよ」
1705 = "「Là sinh nhật đấy.」"

# 【ニイロク】
# display as 二六
# JP: 「え？　けど、赤井運転士の誕生日は、九月の――」
1483 = "「Hả? Nhưng mà, sinh nhật của lái tàu Akai\nlà vào tháng Chín——」"

# 【赤井】
# display as 赤井
# JP: 「私のではなく、息子のです」
1379 = "「Không phải của tôi, mà là của con trai\ntôi.」"

# monologue
# JP: 稼働半年のレイルロオドが、\n仮とはいえどマスターから、隠し事をされてしまう。
2315 = "Một Railord mới đi vào hoạt động được nửa\nnăm,\nvậy mà lại bị Master, dù chỉ là tạm thời,\ngiấu giếm."

# monologue
# JP: ――そこから受ける悪影響を想像すれば、\n私の些細な感傷などは、考慮に値さえもしません。
2014 = "――Nếu tưởng tượng đến những ảnh hưởng xấu\nmà điều đó mang lại,\nthì chút đa cảm nhỏ nhặt của tôi chẳng\nđáng để bận tâm."

# 【ニイロク】
# display as 二六
# JP: 「息子？　誰の？」
1458 = "「Con trai? Của ai?」"

# 【赤井】
# display as 赤井
# JP: 「私と、私の元妻との」
1628 = "「Của tôi và vợ cũ của tôi.」"

# 【ニイロク】
# display as 二六
# JP: 「モトツマ？」
1461 = "「Vợ cũ?」"

# 【赤井】
# display as 赤井
# JP: 「元妻というのは、そのままの意味の言葉です。\nつまり、元々の、という意味の元と」
1577 = "「Vợ cũ, nghĩa đúng như mặt chữ thôi.\nTức là, chữ 'cũ' mang nghĩa là trước đây,\ncộng với chữ...」"

# 【ニイロク】
# display as 二六
# JP: 「元・妻――？」
1460 = "「Vợ... cũ——?」"

# 【ニイロク】
# display as 二六
# JP: 「ごめんなさい」
1589 = "「Xin lỗi.」"

# 【赤井】
# display as 赤井
# JP: 「いえいえ、湯のみが空で幸いでした」
1744 = "「Không sao không sao, may mà tách trà đã\ncạn rồi.」"

# monologue
# JP: 実害は何もありません。\nニイロクさんは、けれどもひどく落ち込んでいます。
2314 = "Không có thiệt hại gì thực tế cả.\nNhưng Niiroku lại tỏ ra vô cùng ủ rũ."

# 【赤井】
# display as 赤井
# JP: 「ただプレゼントを送るのを忘れないようにとの\n目印でしたが――驚かせてしまいましたか」
1627 = "「Đó chỉ là dấu hiệu để tôi không quên gửi\nquà thôi——\nTôi làm cô ngạc nhiên rồi sao?」"

# 【ニイロク】
# display as 二六
# JP: 「うん。驚いた」
1527 = "「Ừm. Tôi ngạc nhiên lắm.」"

# 【赤井】
# display as 赤井
# JP: 「それは失礼いたしました」
1886 = "「Vậy thì thất lễ quá.」"

# 【ニイロク】
# display as 二六
# JP: 「失礼じゃない。ただ――自分が。\nうん。自分が、世間知らずなだけ」
1382 = "「Không thất lễ đâu. Chỉ là——bản thân tôi.\nỪm. Chỉ là do bản thân tôi thiếu hiểu biết\nsự đời thôi.」"

# 【赤井】
# display as 赤井
# JP: 「仕方ないでしょう。稼働、まだ半年ですもの」
1867 = "「Cũng hết cách mà. Cô mới đi vào hoạt động\nđược nửa năm thôi.」"

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 

# monologue
# JP: なるべく、軽く。
2195 = "Cố gắng, nói nhẹ nhàng nhất có thể."

# monologue
# JP: 意識した口調が良かったのでしょうか、\nニイロクさんの言葉にも少し勢いが戻ってきます。
2039 = "Có lẽ giọng điệu có chủ ý của tôi đã phát\nhuy tác dụng,\nlời nói của Niiroku cũng đã lấy lại được\nchút sức sống."

# 【ニイロク】
# display as 二六
# JP: 「だから、その――知りたい。詳しく。\nあまり聞けそうにない話だし」
1669 = "「Cho nên, ừm——tôi muốn biết. Chi tiết hơn.\nVì đây là chuyện có vẻ không dễ gì nghe\nđược.」"

# 【赤井】
# display as 赤井
# JP: 「構いませんよ」
1474 = "「Không sao đâu.」"

# monologue
# JP: ホっとします。同時に、少しだけ寂しくも感じます。
2181 = "Tôi thở phào nhẹ nhõm. Đồng thời, cũng cảm\nthấy có chút cô đơn."

# monologue
# JP: ニイロクさんを突き動かすもの。\nそれがおそらく、純粋な知的好奇心だということに。
2323 = "Thứ thôi thúc Niiroku.\nCó lẽ chỉ là trí tò mò thuần túy mà thôi."

# 【赤井】
# display as 赤井
# JP: 「守秘義務に反しない範囲でなら何でも答えます。\nそれも、わたしの仕事です」
1473 = "「Trong phạm vi không vi phạm nghĩa vụ bảo\nmật, tôi sẽ trả lời bất cứ điều gì.\nĐó cũng là công việc của tôi mà.」"

# 【ニイロク】
# display as 二六
# JP: 「なら、聞く」
1883 = "「Vậy, tôi sẽ hỏi.」"

# monologue
# JP: ニイロクさんの目が輝きます。\n体が乗り出し、コードのたるみも伸ばされます。
2038 = "Đôi mắt Niiroku sáng rực lên.\nCô ấy rướn người về phía trước, đoạn dây\ncáp chùng cũng bị kéo căng ra."

# 【ニイロク】
# display as 二六
# JP: 「その……元・妻……ということは、\n赤井運転士は、前は結婚していて。今は――独身」
1876 = "「Cái đó... vợ cũ... có nghĩa là,\nlái tàu Akai trước đây đã từng kết hôn.\nCòn bây giờ——là người độc thân.」"

# 【赤井】
# display as 赤井
# JP: 「そのとおりですね」
1748 = "「Đúng là vậy.」"

# 【ニイロク】
# display as 二六
# JP: 「こどもは、その、元・妻と一緒？」
1580 = "「Đứa trẻ, ừm, đang ở cùng vợ cũ sao?」"

# 【赤井】
# display as 赤井
# JP: 「親権が向こうにある上、元妻がいやがるんですよ。\n会わせてもらえないんです」
1681 = "「Quyền nuôi dưỡng thuộc về bên đó, hơn nữa\nvợ cũ tôi cũng không thích.\nCô ấy không cho tôi gặp con.」"

# 【ニイロク】
# display as 二六
# JP: 「あ――」
1495 = "「A——」"

# monologue
# JP: ほぐれかけてた空気がひやり、\nまた落ち込んでしまいます。
2227 = "Bầu không khí vừa mới giãn ra lại trở nên\nlạnh lẽo,\ncô ấy lại chìm vào sự ủ rũ."

# 【赤井】
# display as 赤井
# JP: 「ニイロクさん？」
1400 = "「Niiroku?」"

# 【ニイロク】
# display as 二六
# JP: 「世間知らずの想像だけれど。\nそれはきっと……苦しいことだと思う」
1659 = "「Dù chỉ là tưởng tượng của một kẻ thiếu\nhiểu biết sự đời.\nNhưng tôi nghĩ...... điều đó chắc hẳn đau\nkhổ lắm.」"

# 【赤井】
# display as 赤井
# JP: 「苦しい……ですか」
1892 = "「Đau khổ...... sao.」"

# monologue
# JP: まず意識します。言葉に引きずられないように。\nその上で、ただ正直に答えます。
2321 = "Trước tiên phải giữ tỉnh táo. Để không bị\ncuốn theo những lời nói đó.\nSau đó, chỉ cần trả lời một cách thành\nthật."

# 【赤井】
# display as 赤井
# JP: 「確かに、苦しいことでした。\n忘れなければ、まともに生活できないほどに」
1776 = "「Quả thực là rất đau khổ.\nĐến mức nếu không quên đi, tôi sẽ không\nthể sống một cuộc sống bình thường.」"

# 【ニイロク】
# display as 二六
# JP: 「！！？　赤井運転士が？」
1501 = "「!!? Lái tàu Akai mà cũng vậy sao?」"

# 【赤井】
# display as 赤井
# JP: 「ええ。\nわたしなど、ごく平凡な人間ですから」
1518 = "「Đúng vậy.\nVì tôi cũng chỉ là một con người hết sức\nbình thường thôi mà.」"

# monologue
# JP: ニイロクさんの目には私が、\nよほど冷静と写っているのでしょうか？
2099 = "Trong mắt Niiroku,\nchắc hẳn tôi trông vô cùng điềm tĩnh nhỉ?"

# monologue
# JP: ……表に出すほど若くはないというだけで、\n傷つきも、荒れももちろん、するものですが。
1138 = "......Chỉ là tôi không còn trẻ đến mức bộc\nlộ hết ra ngoài,\nchứ tất nhiên là tôi cũng biết tổn thương,\nbiết suy sụp chứ."

# 【赤井】
# display as 赤井
# JP: 「ですから、忘れるしかできなかった。\n全てを過去にし――カレンダーの[しるし]印が残るのみです」
1664 = "「Vì vậy, tôi chỉ còn cách quên đi.\nBiến mọi thứ thành quá khứ——và giờ chỉ còn\nlại vết tích trên tờ lịch.」"

# 【ニイロク】
# display as 二六
# JP: 「誕生日も……」
1770 = "「Cả sinh nhật cũng...」"

# 【赤井】
# display as 赤井
# JP: 「！」
# 1498 = "「啊！」" 

# monologue
# JP: 会話をしている――\n不意に感じて、ふつふつと喜びが湧き出て来ます。
2258 = "Đang trò chuyện――\nBất chợt nhận ra điều đó, một niềm vui\nsướng trào dâng trong tôi."

# monologue
# JP: 話した以上を、受け取ってもらえ、返してもらえる。\nそれがこれほど嬉しいことだと、忘れていました。
2128 = "Nhận lại được nhiều hơn những gì mình đã\nnói, và được hồi đáp.\nTôi đã quên mất rằng điều đó lại đáng vui\nmừng đến nhường này."

# 【ニイロク】
# display as 二六
# JP: 「誕生日もカレンダーに書かないと忘れるくらい、\n過去に――したの？」
1772 = "「Anh đã biến nó thành quá khứ——\nđến mức sinh nhật cũng sẽ quên nếu không\nghi lên lịch sao?」"

# 【赤井】
# display as 赤井
# JP: 「しましたね。たった五年で、そうできました」
1699 = "「Đúng vậy. Chỉ mất năm năm, tôi đã làm\nđược điều đó.」"

# 【ニイロク】
# display as 二六
# JP: 「五年かけないと、過去にできない」
1817 = "「Phải mất đến năm năm, mới có thể biến nó\nthành quá khứ.」"

# monologue
# JP: 言葉を選んでくれているのでしょう。
2117 = "Chắc hẳn cô ấy đang lựa lời để nói."

# monologue
# JP: ニイロクさんは、開けかけた口を一度閉じ。\nそれからゆっくり、また開きます。
2032 = "Niiroku khép lại đôi môi vừa hé mở.\nSau đó, cô ấy từ từ mở miệng ra lần nữa."

# 【ニイロク】
# display as 二六
# JP: 「それほど強く思っていたのに。\nどうして、一緒にいられなくなったの？」
1431 = "「Rõ ràng là anh nghĩ nhiều đến vậy mà.\nTại sao lại không thể ở bên nhau nữa?」"

# 【赤井】
# display as 赤井
# JP: 「さぁ……過去にしたことですからね。\nあのころのことは、上手くは思い出せませんよ」
1386 = "「Chà...... vì đã là quá khứ rồi mà.\nChuyện hồi đó, tôi cũng không thể nhớ rõ\nđược nữa.」"

# 【ニイロク】
# display as 二六
# JP: 「それでも、聞きたい」
1418 = "「Dù vậy, tôi vẫn muốn nghe.」"

# 【赤井】
# display as 赤井
# JP: 「長い話になりますよ？」
1879 = "「Sẽ là một câu chuyện dài đấy nhé?」"

# monologue
# JP: ニイロクさんは頷きます。\n目は、どこまでもまっすぐです。
2048 = "Niiroku gật đầu.\nÁnh mắt cô ấy vô cùng thẳng thắn."

# 【ニイロク】
# display as 二六
# JP: 「聞きたい。自分は、聞かせて欲しい」
1637 = "「Tôi muốn nghe. Tôi muốn anh kể cho tôi\nnghe.」"

# monologue
# JP: 頷いて。\n少し考え、話の糸口を選びます。
2210 = "Tôi gật đầu.\nSuy nghĩ một chút, rồi chọn điểm bắt đầu\ncâu chuyện."

# 【赤井】
# display as 赤井
# JP: 「……以前にも少しは話していることですが、\n私は、[しんしょく,1]神職の家の出身です」
1181 = "「......Trước đây tôi cũng từng nhắc đến\nmột chút rồi,\ntôi xuất thân từ một gia đình làm Thần\nquan.」"

# monologue
# JP: 赤井さんの子。神社さんの子。\n言われ続けて、思春期まではそれが誇りで。
2070 = "Con của nhà Akai. Con của nhà đền.\nLiên tục được gọi như vậy, cho đến tuổi\ndậy thì, đó vẫn là niềm tự hào của tôi."

# 【赤井】
# display as 赤井
# JP: 「ですが、進路に悩むころ、ふと思ったのです。\n神社を離れた自分には、一体何が残るのだろうと」
1420 = "「Nhưng, khi đang băn khoăn về tương lai,\ntôi chợt nghĩ.\nNếu rời khỏi đền thờ, rốt cuộc tôi còn lại\ngì.」"

# 【ニイロク】
# display as 二六
# JP: 「それで、運転士になった？」
1663 = "「Vì vậy, anh đã trở thành lái tàu?」"

# 【赤井】
# display as 赤井
# JP: 「まず、目指そうと。\n鉄道が好きでしたから、関わりたいと思いました」
1625 = "「Đầu tiên là đặt mục tiêu đã.\nVì tôi thích đường sắt, nên tôi muốn làm\ncông việc liên quan đến nó.」"

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「御一夜を離れ、[こくら,1]粉蔵に住んで。\n実際の就職活動は、それからでした」
1661 = "「Rời khỏi Ohimitera, đến sống ở Kokura.\nHoạt động tìm việc thực sự bắt đầu từ đó.」"

# monologue
# JP: 幸運にも庫内手として採用されて、\n試験を受けて、機関助士。そして機関士に。
2153 = "May mắn được tuyển dụng làm thợ rửa lò,\ntrải qua kỳ thi, tôi trở thành phụ lái\ntàu. Rồi sau đó là lái tàu."

# monologue
# JP: 苦労も多く、けれど楽しさの方がずうっと多く。\nですので毎日は、飛ぶように過ぎていきました。
2313 = "Vất vả thì nhiều, nhưng niềm vui lại nhiều\nhơn hẳn.\nVì vậy, mỗi ngày đều trôi qua nhanh như\nchớp."

# 【赤井】
# display as 赤井
# JP: 「気動車免許、電車免許も、順次に取りました。\n運転が、よほど肌にあったのでしょうね」
1660 = "「Tôi cũng lần lượt lấy được bằng lái toa\nxe tự hành và bằng lái tàu điện.\nCó lẽ công việc lái tàu rất hợp với tôi.」"

# 【ニイロク】
# display as 二六
# JP: 「うん。赤井運転士は、天性の運転士だと思う。\nお客様にも、[わたしたち,2]車輌側にも、優しい運転をする」
1529 = "「Ừm. Tôi nghĩ lái tàu Akai là một lái tàu\nbẩm sinh.\nAnh luôn lái tàu một cách êm ái, chu đáo\nvới cả hành khách lẫn phía toa xe chúng\ntôi.」"

# 【赤井】
# display as 赤井
# JP: 「そういってもらえて光栄です」
1804 = "「Được nghe cô nói vậy, tôi rất vinh hạnh.」"

# monologue
# JP: けれど、そこまでの気遣いで、\n私の器はいっぱいだったのかもしれません。
2020 = "Thế nhưng, với chừng đó sự chu đáo,\ncó lẽ giới hạn của tôi đã đạt đến mức tối\nđa rồi."

# 【赤井】
# display as 赤井
# JP: 「元妻と出会ったのは、そのころ――\n電車免許を取得してほどなくのころでした」
1482 = "「Tôi gặp vợ cũ vào khoảng thời gian đó——\nkhông lâu sau khi lấy được bằng lái tàu\nđiện.」"

# 【ニイロク】
# display as 二六
# JP: 「！」
# 1498 = "「啊！」" 

# 【赤井】
# display as 赤井
# JP: 「先輩運転士の紹介で、『父親も[てつどういん,2]鉄道員』だと。\n実際、彼女は鉄道の仕事を理解してくれていました」
1716 = "「Thông qua sự giới thiệu của một lái tàu\ntiền bối, anh ấy bảo 'bố cô ấy cũng là\nnhân viên đường sắt'.\nThực tế, cô ấy rất thấu hiểu công việc\nđường sắt.」"

# monologue
# JP: 公休を潰しての乗務も、当然。\n公休の日には、とにかく寝ないと体が持たない。
2101 = "Việc phải hy sinh ngày nghỉ để làm nhiệm\nvụ là chuyện đương nhiên.\nVào ngày nghỉ, nếu không ngủ thì cơ thể sẽ\nkhông trụ nổi."

# monologue
# JP: ゆえに一緒に出かけることもほとんど出来ず――\nそれでも彼女は、私を受け入れてくれました。
2097 = "Do đó, chúng tôi hầu như không thể cùng\nnhau ra ngoài——\nDù vậy, cô ấy vẫn chấp nhận tôi."

# 【赤井】
# display as 赤井
# JP: 「障害らしい障害もなく祝福されて結婚し、\n二年目には子宝にも恵まれました」
1623 = "「Chúng tôi kết hôn trong sự chúc phúc mà\nkhông gặp trở ngại gì đáng kể,\nvà đến năm thứ hai thì có được một đứa\ncon.」"

# 【ニイロク】
# display as 二六
# JP: 「――うん」
1152 = "「——Ừm.」"

# 【赤井】
# display as 赤井
# JP: 「それからほどなくのことです。\n『電車試験運転士』任用試験の誘いを頂きました」
1579 = "「Không lâu sau đó.\nTôi nhận được lời mời tham gia kỳ thi\ntuyển 'Lái tàu thử nghiệm tàu điện'.」"

# 【ニイロク】
# display as 二六
# JP: 「すごい。大出世」
1570 = "「Tuyệt quá. Thăng tiến vượt bậc luôn.」"

# monologue
# JP: ニイロクさんの目が輝きます。
2037 = "Đôi mắt Niiroku sáng rực lên."

# monologue
# JP: ……多分、誘いをいただいたとき、\n私もあんな目をしていたのでしょう。
1133 = "......Có lẽ, khi nhận được lời mời,\ntôi cũng đã có ánh mắt như vậy."

# 【赤井】
# display as 赤井
# JP: 「電車免許保持者自体が少なかった頃ですから。\nほぼ全員にお声掛けがあったのではないでしょうか」
1552 = "「Vì lúc đó số người có bằng lái tàu điện\nvốn đã ít.\nNên chắc là gần như tất cả đều được ngỏ\nlời mời.」"

# 【ニイロク】
# display as 二六
# JP: 「保持した時点で、凄いってこと。\n試験、すぐに受けたの？」
1456 = "「Có được bằng lái vào thời điểm đó đã là\nrất tuyệt rồi.\nAnh đã tham gia kỳ thi ngay sao?」"

# 【赤井】
# display as 赤井
# JP: 「はい。『受けます』と即答して、\nそれからは猛勉強と猛特訓の日が続きました」
1710 = "「Đúng vậy. Tôi đã đáp ngay 'Tôi sẽ tham\ngia',\nvà từ đó là những ngày tháng học tập và\nrèn luyện không ngừng nghỉ.」"

# monologue
# JP: 産まれたばかりのこどもを無視する形になっても、\n合格を、再優先の課題としました。
2185 = "Dù có trở thành kẻ bỏ bê đứa con mới chào\nđời,\ntôi vẫn đặt việc thi đỗ làm ưu tiên hàng\nđầu."

# monologue
# JP: それは当然に許されること――\nいま考えれば、そんな甘えもあったのでしょう。
2137 = "Điều đó đương nhiên sẽ được tha thứ——\nBây giờ nghĩ lại, có lẽ tôi đã ỷ lại như\nthế."

# 【赤井】
# display as 赤井
# JP: 「最初は、昇給への期待が大きかった。\nそれで生活が潤えば――という気持ちも強かった」
1375 = "「Lúc đầu, kỳ vọng được tăng lương là rất\nlớn.\nNếu nhờ đó mà cuộc sống khấm khá hơn——tôi\nđã mang suy nghĩ mãnh liệt như vậy.」"

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「ですが、帝鉄史を改めて学ぶうち。\n全く別の欲望が、私の中に芽生えたのです」
1422 = "「Nhưng, trong lúc học lại lịch sử Đường\nsắt Hoàng gia.\nMột khao khát hoàn toàn khác đã nảy mầm\ntrong tôi.」"

# 【ニイロク】
# display as 二六
# JP: 「帝鉄史――」
1596 = "「Lịch sử Đường sắt Hoàng gia——」"

# monologue
# JP: 珍しく、ニイロクさんが言いよどみます。
2157 = "Hiếm khi thấy Niiroku ngập ngừng như vậy."

# 【ニイロク】
# display as 二六
# JP: 「あまり、勉強したことがない」
1644 = "「Tôi chưa học qua nhiều lắm.」"

# 【赤井】
# display as 赤井
# JP: 「\x%l明智;#00ffc040;明智%l;#;・\x%l大詔;#00ffc040;大詔%l;#;と発展の一途を辿る帝鉄の\n最初の[つまず]躓きは、\x%l大詔;#00ffc040;大詔%l;#;三十五年に訪れました」
1554 = "「Đường sắt Hoàng gia vốn đang trên đà phát\ntriển không ngừng qua các thời kỳ \\x%l明智;#00ffc040;Meiji%l;#; và\n\\x%l大詔;#00ffc040;Taisho%l;#;,\nnhưng bước vấp ngã đầu tiên đã ập đến vào\nnăm \\x%l大詔;#00ffc040;Taisho%l;#; thứ 35.」"

# 【ニイロク】
# display as 二六
# JP: 「ん……[たいしょう,1]大詔三十五年は、[しょうわ,1]正和元年。\n[ひのもと,2]日ノ本が、戦争に負けた年？」
1514 = "「Ừm...... năm Taisho thứ 35 là năm Showa\nthứ nhất.\nLà năm mà Hinomoto thua trận sao?」"

# 【赤井】
# display as 赤井
# JP: 「その通りです。正和元年。焦土となった国土に\n復興の音を響かせたものは、鉄道だったそうです」
1713 = "「Đúng vậy. Năm Showa thứ nhất. Trên mảnh\nđất đã biến thành tro bụi,\nthứ vang lên âm thanh của sự phục hưng\nchính là đường sắt.」"

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 

# 【赤井】
# display as 赤井
# JP: 「それから十八年でエアクラ機関が実用化。\n正和二十一年、エアクラ法制定・施行」
1765 = "「Mười tám năm sau đó, động cơ Aircra được\nđưa vào thực tiễn.\nNăm Showa thứ 21, Luật Aircra được ban\nhành và thực thi.」"

# 【ニイロク】
# display as 二六
# JP: 「その先は、習ってる。正和三十年に、\n帝鉄関連予算が、大幅削減」
1677 = "「Phần tiếp theo thì tôi đã học rồi. Năm\nShowa thứ 30,\nngân sách liên quan đến Đường sắt Hoàng\ngia bị cắt giảm đáng kể.」"

# 【赤井】
# display as 赤井
# JP: 「そうですね、それがいわゆる、\n『大廃線時代』の、始まりとされています」
1749 = "「Đúng vậy, đó được coi là khởi đầu của\ncái gọi là 'Thời đại Đại bãi bỏ các tuyến\nđường sắt'.」"

# monologue
# JP: 大廃線時代。\n好んで口にはしたくない、なんとも嫌な言葉です。
2107 = "Thời đại Đại bãi bỏ các tuyến đường sắt.\nMột cụm từ đáng ghét mà tôi chẳng bao giờ\nmuốn thốt ra."

# 【赤井】
# display as 赤井
# JP: 「その流れに抗うため、帝鉄は大きな賭けに出ます」
1761 = "「Để chống lại làn sóng đó, Đường sắt Hoàng\ngia đã đánh một canh bạc lớn.」"

# 【ニイロク】
# display as 二六
# JP: 「知ってる。本線全線電化構想」
1651 = "「Tôi biết. Ý tưởng điện khí hóa toàn bộ\ncác tuyến đường chính.」"

# 【赤井】
# display as 赤井
# JP: 「そのとおりです。苦しみながらも、\n構想は実現に向け、少しずつ少しずつ進んでいった」
1747 = "「Đúng vậy. Dù gặp nhiều khó khăn,\nnhưng ý tưởng đó vẫn từng bước, từng bước\ntiến tới hiện thực.」"

# 【ニイロク】
# display as 二六
# JP: 「それが――自分の誕生にも繋がった」
1857 = "「Và điều đó——cũng dẫn đến sự ra đời của\ntôi.」"

# 【赤井】
# display as 赤井
# JP: 「まさしくですね、ニイロクさん。\n私は、君に逢いたかった」
1697 = "「Chính xác là vậy, Niiroku.\nTôi, đã rất muốn gặp cô.」"

# 【ニイロク】
# display as 二六
# JP: 「っ！！？」
1499 = "「!!?」"

# 【赤井】
# display as 赤井
# JP: 「帝鉄の悲願、鉄道復興のための全線電化。\nその象徴であり切り札となる、特急系電車開発」
1597 = "「Điện khí hóa toàn tuyến vì sự phục hưng\ncủa đường sắt, ước nguyện tha thiết của\nĐường sắt Hoàng gia.\nSự phát triển của tàu điện tốc hành chính\nlà biểu tượng và cũng là con át chủ bài\ncho điều đó.」"

# 【ニイロク】
# display as 二六
# JP: 「あ」
1496 = "「A.」"

# 【赤井】
# display as 赤井
# JP: 「そこに関わり、鉄道復権の一翼を担いたい。\nその欲を感じ、『何をしても』と、思ったのです」
1638 = "「Tôi muốn tham gia vào đó, muốn gánh vác\nmột phần công cuộc phục hưng đường sắt.\nCảm nhận được khát khao ấy, tôi đã nghĩ\n'dù phải làm bất cứ điều gì'.」"

# monologue
# JP: ほっと、排気音が聞こえます。
2224 = "Một tiếng xả khí nhẹ nhàng vang lên."

# monologue
# JP: 安堵のような、失望のような――\nまるで吐息に聞こえる音が。
2260 = "Giống như sự nhẹ nhõm, lại giống như sự\nthất vọng——\nMột âm thanh nghe như tiếng thở dài."

# 【ニイロク】
# display as 二六
# JP: 「――そういうこと。\nなら、当然のこと。自分も、同じ」
1155 = "「——Ra là vậy.\nNếu thế thì, đó là điều đương nhiên. Tôi\ncũng giống như vậy.」"

# 【赤井】
# display as 赤井
# JP: 「そうですよね」
1696 = "「Đúng vậy nhỉ.」"

# monologue
# JP: レイルロオドであるならば。\n鉄道に自分を捧げる、そうした生き方を選んだ者なら。
2084 = "Nếu là một Railord.\nNếu là người đã chọn cách sống cống hiến\nbản thân cho đường sắt."

# monologue
# JP: けれど、彼女はそうではなく。\nそして――私は、何も理解していなかったのです。
2060 = "Nhưng, cô ấy lại không phải như vậy.\nVà——tôi đã không hiểu được điều gì cả."

# 【赤井】
# display as 赤井
# JP: 「任用されて、働きはじめて。\n“試験”に[まつ]纏わる責任を、遅まきながら知りました」
1559 = "「Sau khi được bổ nhiệm và bắt đầu làm\nviệc.\nTôi mới nhận ra trách nhiệm gắn liền với\n'thử nghiệm', dù đã muộn màng.」"

# 【ニイロク】
# display as 二六
# JP: 「試験運転士。\nその責任が、軽いはずがない」
1820 = "「Lái tàu thử nghiệm.\nTrách nhiệm đó, không thể nào nhẹ nhàng\nđược.」"

# 【赤井】
# display as 赤井
# JP: 「ええ、本当に。“試験”ですから――\nどんな些細なデータでも、正確にあげる必要がある」
1700 = "「Đúng vậy, thật sự là thế. Vì là 'thử\nnghiệm' nên——\ndù là dữ liệu nhỏ nhặt đến đâu cũng cần\nphải báo cáo chính xác.」"

# monologue
# JP: 機械的に。ただ機械的に。\n主観を一切交えずに、なにひとつ省くことなしに。
2206 = "Một cách máy móc. Chỉ đơn thuần là máy\nmóc.\nKhông xen lẫn bất kỳ sự chủ quan nào,\nkhông bỏ sót bất cứ điều gì."

# 【ニイロク】
# display as 二六
# JP: 「当然のこと。どんなデータにも価値がある。\nその瞬間には、たとえ無意味なものに見えても――」
1865 = "「Đó là điều hiển nhiên. Bất kỳ dữ liệu nào\ncũng có giá trị.\nDù tại thời điểm đó, nó có vẻ vô nghĩa đi\nchăng nữa——」"

# monologue
# JP: ニイロクさんが、ほんの一瞬、目を瞑ります。
2046 = "Niiroku nhắm mắt lại trong một khoảnh khắc\nngắn ngủi."

# monologue
# JP: もう何年も稼働して、過去が瞼に焼き付いている、\nそんな錯覚をふと覚えます。
2305 = "Đã hoạt động bao nhiêu năm, quá khứ đã in\nhằn trong tâm trí,\ntôi chợt có ảo giác như vậy."

# 【ニイロク】
# display as 二六
# JP: 「そのデータが大きな危険を予知していたと、\nずうっと先に浮かびあがってくることもあるから」
1550 = "「Bởi vì đôi khi, mãi về sau người ta mới\nnhận ra rằng\ndữ liệu đó đã dự báo trước một mối nguy\nhiểm lớn.」"

# 【赤井】
# display as 赤井
# JP: 「はい。輸送は常に、“安全が第一の使命”です。\n当然、わかってはいるつもりでしたが――」
1709 = "「Đúng vậy. Trong vận tải, 'An toàn là sứ\nmệnh hàng đầu'.\nTất nhiên, tôi cứ nghĩ là mình đã hiểu\nđiều đó, nhưng——」"

# monologue
# JP: 本線で感じる“安全”と、試験が求める“安全”と。
2179 = "'An toàn' cảm nhận trên tuyến chính, và\n'An toàn' mà thử nghiệm yêu cầu."

# monologue
# JP: 目指すところは同じでも、\n求める深さが、全く違う。
2090 = "Dù mục tiêu hướng tới là như nhau,\nnhưng độ sâu yêu cầu lại hoàn toàn khác\nbiệt."

# 【赤井】
# display as 赤井
# JP: 「……試験が、どこまで厳しく安全を要求するのか。\n私は、本当には理解できていませんでした」
1184 = "「......Thử nghiệm đòi hỏi sự an toàn khắt\nkhe đến mức nào.\nTôi đã không thực sự hiểu được.」"

# 【ニイロク】
# display as 二六
# JP: 「そうなの？」
1702 = "「Vậy sao?」"

# 【赤井】
# display as 赤井
# JP: 「試験車両が、そのまま営業運転に回ることもある。\nけれど。そうならないケースも、数多い」
1759 = "「Cũng có khi phương tiện thử nghiệm được\nđưa thẳng vào vận hành thương mại.\nNhưng, những trường hợp không được như vậy\ncũng rất nhiều.」"

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1519 = "「嗯」" 

# monologue
# JP: 試験継続さえも危ない。\nそうしたデータをあげてしまえば、終わりです。
2270 = "Ngay cả việc tiếp tục thử nghiệm cũng nguy\nhiểm.\nNếu báo cáo những dữ liệu như vậy, thì mọi\nchuyện sẽ kết thúc."

# monologue
# JP: 試験は中止。そして車両は――\nレイルロオドごと、解体されます。
2229 = "Thử nghiệm bị hủy bỏ. Và toa xe sẽ——\nbị tháo dỡ cùng với cả Railord."

# 【赤井】
# display as 赤井
# JP: 「自分のあげたデータによって、\n今日組んでいるレイルロオドが、明日には消える」
1549 = "「Bởi vì những dữ liệu tôi báo cáo,\nRailord đồng hành cùng tôi hôm nay, ngày\nmai có thể sẽ biến mất.」"

# 【ニイロク】
# display as 二六
# JP: 「それは、危険を未然に[つ]摘むため。\nとても重要で、価値のある仕事」
1864 = "「Đó là để ngăn chặn nguy hiểm từ trong\ntrứng nước.\nMột công việc rất quan trọng và có giá\ntrị.」"

# 【赤井】
# display as 赤井
# JP: 「わかっています。わかっていても――\n正直、とても大きなストレスです」
1653 = "「Tôi biết chứ. Dù biết là vậy——\nnhưng thành thật mà nói, đó là một áp lực\nrất lớn.」"

# monologue
# JP: 決して過去形で語れない程。
2055 = "Đến mức tuyệt đối không thể nói bằng thì\nquá khứ."

# monologue
# JP: 言葉にこうして落とすだけでも、\n胃がギリギリと絞られる――
2088 = "Chỉ cần thốt ra thành lời thế này thôi,\ndạ dày tôi cũng đã quặn thắt lại——"

# monologue
# JP: （ぐ～～～～っっ）
2331 = "（Ọt~~~~~）"

# 【ニイロク】
# display as 二六
# JP: 「あ」
# 1496 = "「啊」" 

# 【赤井】
# display as 赤井
# JP: 「あ」
# 1496 = "「啊」" 

# monologue
# JP: ふ、と。\nニイロクさんの目が緩みます。
2253 = "Đột nhiên.\nÁnh mắt Niiroku dịu lại."

# 【ニイロク】
# display as 二六
# JP: 「赤井運転士。おなかすいたの？」
1840 = "「Lái tàu Akai. Anh đói bụng rồi sao?」"

# 【赤井】
# display as 赤井
# JP: 「いえ――そんな自覚はないのですが」
1389 = "「Không——tôi không cảm thấy thế.」"

# 【ニイロク】
# display as 二六
# JP: 「でも、食べた方がいい」
1416 = "「Nhưng mà, anh nên ăn một chút đi.」"

# monologue
# JP: コンセントを抜き、ニイロクさんが立ち上がります。
2030 = "Rút phích cắm, Niiroku đứng dậy."

# 【ニイロク】
# display as 二六
# JP: 「人間は、お腹が空くと気分が沈む。\nおねえちゃんたちに、そう教わってる」
1405 = "「Con người khi đói bụng thì tâm trạng sẽ\nchùng xuống.\nTôi đã được các chị dạy như vậy.」"

# monologue
# JP: （とんとんとんとん）
2332 = "（Lộc cộc lộc cộc lộc cộc lộc cộc）"

# 【赤井】
# display as 赤井
# JP: 「ニイロクさん……料理できるんですねぇ」
1397 = "「Niiroku... cô biết nấu ăn nhỉ.」"

# 【ニイロク】
# display as 二六
# JP: 「[デロクマルのシロ,5]Ｄ６０　４６おねえちゃんが、\n必ず役に立つから、って」
1907 = "「Chị D60 46 bảo rằng,\nchắc chắn sẽ có ích, nên là.」"

# 【赤井】
# display as 赤井
# JP: 「なるほど。貨物機レイルロオドがですか」
1467 = "「Ra là vậy. Railord của đầu máy hàng hóa\nsao.」"

# monologue
# JP: 貨物となると、運転士交代なしの\n長距離・長時間乗務も、ザラだと聞きます。
2203 = "Đối với tàu hàng hóa, việc không đổi lái\ntàu\nmà phải làm nhiệm vụ trên chặng đường dài,\nthời gian dài, nghe nói là chuyện thường\ntình."

# monologue
# JP: 小休止中の機関区で、炊事場を借りて軽食を――\nそんな形で機関士を助けることも覚えたのでしょう。
2306 = "Tranh thủ lúc nghỉ ngơi ở kho đầu máy,\nmượn nhà bếp làm chút đồ ăn nhẹ——\nChắc hẳn cô ấy cũng đã học được cách giúp\nđỡ lái tàu theo cách đó."

# 【ニイロク】
# display as 二六
# JP: 「ちゃんと教えてもらえたら、ちゃんとこなせる。\n自分の性能なら、料理でもなんでも。はい、できた」
1547 = "「Nếu được dạy đàng hoàng, tôi sẽ làm được\nđàng hoàng.\nVới hiệu suất của tôi, dù là nấu ăn hay\nbất cứ việc gì. Xong rồi đây.」"

# 【赤井】
# display as 赤井
# JP: 「おお。おいしそうですね」
1535 = "「Ồ. Trông ngon quá nhỉ.」"

# monologue
# JP: 大根のお味噌汁。大根と卵の煮物。\n卵焼きに大根おろし。
2276 = "Canh súp miso củ cải. Củ cải hầm trứng.\nTrứng cuộn ăn kèm củ cải bào."

# monologue
