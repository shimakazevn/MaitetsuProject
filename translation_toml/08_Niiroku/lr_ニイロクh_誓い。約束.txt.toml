# display as 赤井
# JP: 「くあっ！！！！」
1269 = "「Ư a!!!!」"
# monologue
# JP: （びゅぶっ！　ぶっ！　びゅるっ！！！　びゅううっ！）
2048 = "（Phụt! Phụt! Phụtttt!!! Phụttttt!）"
# monologue
# JP: [はらわた]腸全てを精子に引っ張りださてく、余りに強い快感に、\n思わず体が崩れてしまい──
1829 = "Khoái cảm mãnh liệt đến mức tưởng chừng như ruột gan đều bị lôi tuột ra theo dòng tinh dịch,\nkhiến cơ thể tôi bất giác sụp xuống──"
# 【ニイロク】
# display as 二六
# JP: 「んっ！！！！！！」
1361 = "「Ưm!!!!!!」"
# 【赤井】
# display as 赤井
# JP: 「んむっ！！？」
1357 = "「Ưm!!?」"
# 【ニイロク】
# display as 二六
# JP: 「んっ！！！！！！！！！！！！！　んっ！！！！！！\nんゆっっぅぅぅぅうぅぅぅうぅぅっぅぅぅぅぅ！！！！」
1363 = "「Ưm!!!!!!!!!!!!! Ưm!!!!!!\nƯmmmmmmmmmmmmmmmmmm!!!!」"
# monologue
# JP: キスを交わして──\n同時にニイロクが大きく大きく震えます。
1818 = "Trao nhau nụ hôn──\nĐồng thời Niiroku run lên từng cơn dữ dội."
# monologue
# JP: （びゅるっ！　びゅっ！　びゅくう！　どびゅっ！！）
# 2048 = "（猛烈射精）" 
# 【ニイロク】
# display as 二六
# JP: 「んっ──きゅううんんっ────んっ──ぷあっ！\nあっ！　あっ！　あっ！　あああっ！！！！！」
1336 = "「Ưm──ưmmmm────ưm──phù!\nA! A! A! Aaa!!!!!」"
# 【赤井】
# display as 赤井
# JP: 「ニイロク──ニイロク──ニイロク──ニイロクっ」
1220 = "「Niiroku──Niiroku──Niiroku──Niiroku」"
# 【ニイロク】
# display as 二六
# JP: 「きよはる──きよはる……\nはぁっ、はあっ、はあっ──はあ──────んっ」
1468 = "「Kiyoharu──Kiyoharu...\nHà, hà, hà──hà──────ưm」"
# monologue
# JP: 脱力しきった汗まみれのキス。\n長いキス。
1957 = "Nụ hôn nhễ nhại mồ hôi trong trạng thái kiệt sức.\nMột nụ hôn dài."
# 【ニイロク】
# display as 二六
# JP: 「ん………………ぷあっ──えへへっ──\nきよはる──きよはるぅ」
1337 = "「Ưm.................. phù──e he he──\nKiyoharu──Kiyoharu」"
# monologue
# JP: 頭をぐりぐり、小動物か何かのように擦り付けて、\n実にわかりやすく甘えてきます。
1697 = "Cô ấy dụi đầu cọ cọ vào tôi như một con thú nhỏ,\nlàm nũng một cách vô cùng dễ hiểu."
# 【赤井】
# display as 赤井
# JP: 「なんです？　ニイロク」
1231 = "「Sao thế? Niiroku.」"
# 【ニイロク】
# display as 二六
# JP: 「あのね、さっきの。忘れないでね」
1546 = "「Nè, chuyện lúc nãy. Đừng có quên đấy nhé.」"
# 【赤井】
# display as 赤井
# JP: 「ん」
# 1348 = "「嗯」" 
# monologue
# JP: 短い指が、私の唇を閉ざします。
1767 = "Những ngón tay ngắn ngủn chặn lấy môi tôi."
# 【ニイロク】
# display as 二六
# JP: 「次の機会にも、絶対。愛撫のことも、そのほかのことも。\nもっとくわしく、もっとたくさん。絶対絶対、教えてね」
1211 = "「Dịp khác, nhất định nhé. Cả chuyện ái ân vuốt ve, và những chuyện khác nữa.\nChi tiết hơn, nhiều hơn nữa. Nhất định, nhất định phải dạy cho em đấy.」"
# monologue
# JP: ふふっ、と笑って。\n唇の形を一度なぞって。
1772 = "Bật cười khúc khích.\nNgón tay lướt dọc theo đường nét đôi môi tôi một lần."
# 【ニイロク】
# display as 二六
# JP: 「約束、ね？」
1432 = "「Hứa nhé?」"
# 【赤井】
# display as 赤井
# JP: 「もちろんです。ニイロク──\n私のニイロク。かわいいニイロク。約束しますよ」
1558 = "「Tất nhiên rồi. Niiroku──\nNiiroku của tôi. Niiroku đáng yêu. Tôi hứa mà.」"
# monologue
# JP: ぎゅっと抱き寄せ、あたまを胸に押し付けます。\n君は私の、私は君の所有物だと、鼓動と熱で伝えるように。
1834 = "Tôi ôm chặt cô ấy vào lòng, ép sát đầu cô ấy vào ngực mình.\nNhư muốn dùng nhịp tim và hơi ấm để truyền đạt rằng, cô là của tôi, và tôi cũng là của cô."
# 【ニイロク】
# display as 二六
# JP: 「やった！　なら」
1380 = "「Tuyệt quá! Vậy thì」"
# 【赤井】
# display as 赤井
# JP: 「いいえ、ニイロク。\n大人の誓いは、指切りでかわすものではないのです」
1214 = "「Không đâu, Niiroku.\nLời thề của người lớn, không phải dùng móc ngoéo tay để giao kèo đâu.」"
# 【ニイロク】
# display as 二六
# JP: 「あ」
# 1313 = "「啊」" 
# monologue
# JP: 頷いて。ニイロクはそっと瞳を閉じます。\nそういえば──キスはもう幾度も交わしていますけれども。
1703 = "Gật đầu. Niiroku khẽ nhắm mắt lại.\nNhắc mới nhớ──dù chúng tôi đã trao nhau không biết bao nhiêu nụ hôn rồi."
# 【赤井】
# display as 赤井
# JP: 「では、交わしましょう」
1555 = "「Vậy thì, cùng giao kèo nào.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1348 = "「嗯」" 
# monologue
# JP: とても静かに。祈りの如く。\n二人の、はじめての誓いのキスを──。
1812 = "Thật tĩnh lặng. Như một lời nguyện cầu.\nNụ hôn thề ước đầu tiên của hai chúng tôi──."
