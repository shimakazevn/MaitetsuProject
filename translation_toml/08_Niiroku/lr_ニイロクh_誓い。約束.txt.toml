# JP: 精液が大きく熱い塊となり尿道口へと押し寄せます。\nけれど、けれども──もう少しだけっ──
1920 = "Tinh dịch tụ lại thành một khối lớn nóng rực, chực chờ tuôn trào ra khỏi niệu đạo.\nNhưng, nhưng mà──thêm một chút nữa thôi──"
# monologue
# JP: （ばちゅっ！　ずびゅ！　ごりゅっ！　ごちゅんっ！）
2027 = "（Bạch! Phập! Rột! Cộc!）"
# 【ニイロク】
# display as 二六
# JP: 「きてるっ！　しゅごいのっ！　おっっきい、のっ！\nおまた──おなかっ──きゅんきゅん、あつく、てっ！」
1242 = "「Đến rồi! Tuyệt quá! To, quá!\nHáng──bụng──râm ran, nóng, hổi!」"
# 【赤井】
# display as 赤井
# JP: 「ニイ、ろくっ！」
1224 = "「Nii, roku!」"
# 【ニイロク】
# display as 二六
# JP: 「ふあっ！　あっ！　あっ！　あっ！\nあっ！　あっ！　あっ！　あっ！！！」
1281 = "「Phù! A! A! A!\nA! A! A! A!!!」"
# monologue
# JP: （きゅうううううううううううっっっっんん！！！！）
# 2030 = "（小穴夾緊）" 
