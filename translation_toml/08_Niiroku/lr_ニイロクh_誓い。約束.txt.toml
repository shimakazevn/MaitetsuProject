# 【赤井】
# display as 赤井
# JP: 「ニイロクのちいさな膣口に、\n私の性器をねじこみ、広げて──」
1480 = "「Xuyên bộ phận sinh dục của tôi vào cửa âm đạo nhỏ bé của Niiroku,\nmở rộng nó ra──」"
# monologue
# JP: 姿勢的には疑似セックスです。ニイロクの可憐な縦筋に、\n醜悪な私の陰茎が食い込むように接しています。
1813 = "Về tư thế thì đây là mô phỏng làm tình. Dương vật xấu xí của tôi\nđang áp sát, như thể muốn đâm xuyên vào khe hở dọc đáng yêu của Niiroku."
