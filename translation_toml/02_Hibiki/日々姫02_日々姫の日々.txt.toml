2981 = "而“其他各種原因”指的是什麼，同樣不難想像——我點點頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「けど、今ならそんなに怖くないから。なくなったから。\nだから、描いてみたいって思いました。まるっ！」
1899 = "「但是，現在不那麼害怕了，變得不害怕了。所以，想要畫畫看了。句號！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2319 = "「這樣啊」" 

# monologue
# JP: おどけた口調と、穏やかな笑顔と。
3022 = "詼諧的口吻與溫和的笑容。" 

# monologue
# JP: 日々姫は大人になったのだなぁ、と、\nそれこそ今さら――しみじみ感じる。
2810 = "日日姬也長大了啊——我也同樣後知後覺地如此感慨道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よかったな」
2049 = "「太好了」" 

# 【日々姫】
# display as 日日姬
# JP: 「って！　上手かこと描けるかどーかは、\nまるっきり別次元の話やけどねぇ～っ」
2002 = "「啊！不過能不能畫出好作品，又是另一回事了～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「描ける」
1900 = "「你一定可以的」" 

# monologue
# JP: それが単なる照れ隠しだとわかっていても、\n伝えないではいられない。
2673 = "就算我明白她只是在掩飾難為情，我還是忍不住說了出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「描けるさ、日々姫には。誰より上手く」
1869 = "「一定行。你肯定能畫得比任何人都好」" 

