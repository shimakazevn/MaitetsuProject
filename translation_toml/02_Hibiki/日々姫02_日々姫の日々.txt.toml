2734 = "我突然想起兩件事——之前日日姬叫我陪她收集資料時，我所領悟到的縱軸與橫軸的價值。" 

# monologue
# JP: そうして遠い昔に日々姫が教えてくれた、\n”赤は赤い”ということを。
2535 = "以及遙遠的過去，日日姬告訴過我“紅色很紅”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「黒の黒さを知れば、白の白さもより深く理解できよう。\nだから日々姫はきっと誰より、この光景を綺麗に描ける」
2077 = "「對黑色了解得越深，對白色的理解就會越透徹。所以你畫這幅景象，一定能畫得比任何人都好」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに……」
2360 = "「阿哥……」" 

# monologue
# JP: ほうっと、熱っぽい息を吐き。\n日々姫は唇をわずかに動かし、けれど何も言わずに結ぶ。
2824 = "日日姬呼出一口熱氣。她的嘴唇蠕動了兩下，但什麼都沒說又閉了起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん――」
2011 = "「嗯——」" 

# monologue
# JP: ごく無造作――そうとしか思えぬ仕草で、\nスケッチブックが開かれ鉛筆が動き出す。
2630 = "她以極其自然的動作翻開素描本，動起了筆。" 

# monologue
# JP: 真っ白だった画用紙に、いくつも黒が引かれていく。\nそれは線から、すぐさま影に、面へと変わる。
2613 = "在潔白的畫紙上勾出幾條黑線。很快，線化成了陰影，形成了麵。" 

# 【日々姫】
# display as 日日姬
# JP: 「……にぃにこそ、なんでこぎゃんと時間から？」
1650 = "「……阿哥才是，為什麼這麼早就來咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――僕か？」
1990 = "「啊——我嗎？」" 

# monologue
# JP: 手に見とれ、返事が一瞬遅れてしまった。
2731 = "我看得入迷，回話慢了一拍。" 

# monologue
# JP: それがどうにも気恥ずかしくて、\n僕もタンクを磨く手を再び動かし始める。
3038 = "這實在是讓人感到很難為情，於是我再次動手開始擦拭容器。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕なら、単なる時間配分だ」
2114 = "「我只是把時間進行了適當的分配而已啦」" 

# 【日々姫】
# display as 日日姬
# JP: 「時間配分？」
1940 = "「分配時間？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうすれば、一番多くを経験できる」
2326 = "「這麼做，就能獲得更多的經驗」" 

# monologue
# JP: 通勤・通園の人通りが一番多くなるのが７～８時。
3125 = "７點～８點是上班、上學的人流高峰。" 

# monologue
# JP: その時間帯に玄関先の掃除をするためには、\n早朝のうち、タンク磨きを済ませておくのが一番良い。
2906 = "為了能在那個時間段打掃門口，在清晨先完成容器擦拭是最佳的選擇。" 

# 【日々姫】
# display as 日日姬
# JP: 「はぁぁ～――にぃにもいろいろ――んんっ！\n兄さんも、いろいろ考えてらっしゃるんですね？」
1983 = "「哦～阿哥也——咳咳！哥哥也考慮了很多啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜をもっと知りたいだけだ。日々姫が言った通り、\n掃除番を務めて初めて、見えてきた景色もある」
2111 = "「我只是想要更了解御一夜。就像你說的，我在負責清掃工作之後發現了一些新的事物」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
1997 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、より多くを見るため、より懸命に努めるだけだ。\n僕は、そのほかにやり方を知らん」
2118 = "「我想看到更多的東西，所以就更拚命地去做。我只會這種做法」" 

# 【日々姫】
# display as 日日姬
# JP: 「そ、それなら！」
2331 = "「那、那麼！」" 

# monologue
# JP: 大きな声。\n鉛筆を動かす手が止まっている。
2828 = "日日姬大聲說道。她手上的鉛筆停了下來。" 

# 【日々姫】
# display as 日日姬
# JP: 「もし良かったら、兄さんにも来てもらいたいんですけど。\n今日の午後」
2272 = "「要是可以的話，希望哥哥今天下午能來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どこにだ？」
1945 = "「去哪裡？」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい、あのっ――\n稀咲センパイのところです」
2082 = "「就是，那個——稀咲學姐那裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「宝生稀咲の？」
2074 = "「寶生稀咲那裡？」" 

# monologue
# JP: “それなら”と日々姫は言った。
2819 = "日日姬剛才說了“那麼”。" 

# monologue
# JP: ならば、宝生稀咲のところできっと、\n御一夜をより知るための何かと出会えるということだろう。
2524 = "也就是說，這會有助於我進一步了解御一夜。" 

# 【日々姫】
# display as 日日姬
# JP: 「ええとですね、私、稀咲センパイのところで――」
2339 = "「那個，我啊，在稀咲學姐那裡——」" 

# monologue
# JP: （きぃ――ぃ）
3114 = "（吱——）" 

# monologue
# JP: 金属扉の軋む音。
3056 = "金屬門吱吱作響。" 

# monologue
# JP: 誰かが、酒蔵に入ってきたのだ。\n途端、日々姫の弾んでいた声が止まってしまう。
3046 = "酒窖裡有人進來了。日日姬興奮的聲音隨即停止。" 

# 【斎藤】
# display as ？？？
# JP: 「おや。坊っちゃん、嬢ちゃん。お早ぅございます。\nこんな時間におらすとは珍しかですねぇ」
1973 = "「哎呀？少爺，小姐。早安。這麼早就在真是少見啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「斎藤さん、おはようございます」
2373 = "「齋藤婆婆，早安」" 

# 【日々姫】
# display as 日日姬
# JP: 「……おはようございます」
1644 = "「……早安」" 

# monologue
# JP: 蔵人頭の斎藤さん。
3097 = "齋藤婆婆是釀酒師總管。" 

# monologue
# JP: 酒造りに関しては蔵の誰より経験豊富で、誰より厳しい\n――小柄ではあるが威厳に満ちた、老婦人だ。
2640 = "她在釀酒方面是這個酒窖中經驗最豐富、最嚴格的人，是位個子小卻充滿威嚴的老婦。" 

# 【双鉄】
# display as 雙鐵
# JP: 「タンク磨きをしていたのですが」
2122 = "「我正在擦拭容器」" 

# 【斎藤】
# display as 齋藤
# JP: 「邪魔にゃなりません。\nよかですよ。そのまま続けよってください」
2207 = "「沒關係，你不會礙事的。請繼續吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 2016 = "「嗯」" 

# monologue
# JP: 坊っちゃん、と呼ばれる身でも、\n蔵の中では僕は単なる、掃除番。
3077 = "雖被被稱作少爺，但在酒窖中我只是個清掃工。" 

# monologue
# JP: 蔵人頭――右田一酒蔵元でナンバー２の斎藤さんに、\n何を意見できるような立場ではない。
2671 = "對於釀酒師總管——右田一釀酒廠的副手齋藤婆婆，我是沒有資格提意見的。" 

# 【日々姫】
# display as 日日姬
# JP: 「あの――兄さん」
2338 = "「那個——哥哥」" 

# monologue
# JP: まして今の日々姫は、酒造りに関しては“部外者”だ。
2542 = "何況日日姬現在在釀酒方面是“無關人士”。" 

# monologue
# JP: スケッチブックはもうたたまれて、\n鉛筆は筆入れへと収められている。
2973 = "素描簿已經合上，鉛筆也收進了筆盒。" 

# 【斎藤】
# display as 齋藤
# JP: 「ああ。悪かこつなかですねぇ」
2327 = "「還不錯啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
2374 = "「！」" 

# monologue
# JP: 斎藤さんの独り言。日々姫はびくりと身を硬くする。\nどうやら今だに、苦手らしい。
2988 = "聽到齋藤婆婆的自言自語，日日姬渾身一緊。看來她現在還是會害怕。" 

# monologue
# JP: が、無理もない。実際問題、僕から見ても斎藤さんは、\nとりわけ日々姫に、どうにも冷淡にすぎるのだ。
2514 = "不過這也難怪。實際上我也覺得齋藤婆婆對日日姬格外冷淡。" 

# monologue
# JP: （……どうしたものか）
3102 = "（……該怎麼辦呢）" 

# monologue
# JP: 斎藤さんを見てみれば、\nしかし途端に沸き起こるのは、強い納得と安堵とだ。
2914 = "然而看著齋藤婆婆，我突然湧現出了強烈的確信和安心感。" 

# 【双鉄】
# display as 雙鐵
# JP: 「悪くないのは、ハチロクですか」
2328 = "「還不錯是說八六嗎」" 

# monologue
# JP: ハチロクが、温度管理を任せてもらっている\x%lもろみ;#00ffc040;もろみ%l;#;。
62 = "\\x%lもろみ;#00ffc040;酒醪%l;#;的溫度管理交給了八六。" 

# monologue
# JP: 斎藤さんは、そこにざっくり櫂棒をさし、\n\x%lもろみ;#00ffc040;もろみ%l;#;をゆるゆる、広げるように櫂入れしている。
3095 = "齋藤婆婆把櫂棒往\\x%lもろみ;#00ffc040;酒醪%l;#;裡簡單一插，就像要把它搗開一般，緩緩插入。" 

# 【斎藤】
# display as 齋藤
# JP: 「温度管理ば、上手かとですねぇ。\n“\x%lもろみ;#00ffc040;もろみ%l;#;ば驚かさんように”と、先日教えたとですが」
2218 = "「溫度管理做得很好啊。我之前教過她“小心不要打擾到\\x%lもろみ;#00ffc040;酒醪%l;#;發酵”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2171 = "「是的」" 

# monologue
# JP: 確かに、何も教えなければ、\nハチロクの温度管理は“機械的”なものになるだろう。
2923 = "的確，要是什麼都不教她，八六肯定會“機械式”地進行溫度管理。" 

# monologue
# JP: 高ければ低く、低ければ高く――\nバルブをひねり規定温度へ、一直線に寄せてしまうはずだ。
3090 = "高了調低，低了調高——旋轉閥門，直接調整到規定溫度。" 

# 【斎藤】
# display as 齋藤
# JP: 「\x%lもろみ;#00ffc040;もろみ%l;#;ば、気持ちよぉまどろんどりますねぇ。\n驚かさんようゆるゆる、寝かせてくれよりましたねぇ」
1615 = "「\\x%lもろみ;#00ffc040;酒醪%l;#;正在舒服地打瞌睡。它沒被打擾到，正在慢慢地發酵」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうですか。でしたら、よかった」
2168 = "「是嗎。那太好了」" 

# monologue
# JP: 安心と、それを上回る喜びが、胸にふつふつ湧いてくる。
2668 = "安心感，以及較之更強的喜悅之情油然而生。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉の見立て通り。\nハチロクは、よほど温度管理に向いているようですね」
1966 = "「和真闇姐想的一樣。八六非常適合溫度管理」" 

# 【斎藤】
# display as 齋藤
# JP: 「向いとる向いとらんで言うなら、向いとりますねぇ」
2276 = "「要說適不適合的話，確實是適合」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2374 = "「！」" 

# monologue
# JP: 日々姫が、ぎくりと息を呑む。
2835 = "日日姬屏息。" 

# monologue
# JP: 僕には理由がわからない。\n不穏な気配は感じるが、何をどうしたらいいものか――
2708 = "我不清楚她為什麼會這樣。雖然能感覺到氣氛不妙，但我不知該如何是好——" 

# 【斎藤】
# display as 齋藤
# JP: 「ま、向いとるゆーだけで、\n[くらびと,1]蔵人になるもんとはまた、違いましょーが」
1884 = "「不過也只是合適而已，和能不能當釀酒師是另一回事」" 

# 【日々姫】
# display as 日日姬
# JP: 「～～っ！」
2376 = "「～～！」" 

# monologue
# JP: 日々姫の全身が凍りつく。\nギリ、と歯噛みのような音。
2817 = "日日姬全身僵硬，發出咬牙的聲音。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫？」
2155 = "「日日姬？」" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん、私、これで失礼します」
1981 = "「哥哥，我先走了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ……うむ、そうか」
1994 = "「啊……嗯，這樣啊」" 

# monologue
# JP: 言葉は澄まして落ち着いて、\nけれども日々姫の頬はぷうっとふくらんでいる。
3076 = "雖然語氣淡薄而冷靜，可日日姬的臉蛋卻是鼓鼓的。" 

# monologue
# JP: 不機嫌そう、を通り越し、あかんべえでもしそうなくらい\nあからさまなゴキゲンナナメの表情だ。
2651 = "她的心情已經遠超不爽的程度，看她的表情，彷彿隨時會向我吐舌頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「午後のこと、考えといてくださいね。\nお昼休みにまた来ますから」
1872 = "「下午的事請考慮一下。午休的時候我會再來的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。それではまた昼に」
2125 = "「我知道了。那午休見」" 

# monologue
# JP: 斎藤さんには軽く会釈し、あとはもう、\n振り返りもせず、日々姫はスタスタ蔵を出て行く。
2636 = "她向齋藤婆婆隨意打了個招呼，然後頭也不回地快步走出酒窖。" 

# monologue
# JP: いや、これは――\nうかつに理由も尋ねられんし……
2602 = "唉，看來這件事不是能隨隨便便問的……" 

# 【斎藤】
# display as 齋藤
# JP: 「……嬢ちゃんは、随分と元気ば出よりましたねぇ」
1640 = "「……小姐精神多了啊」" 

# monologue
# JP: ドアの閉まる音を、まるで待っていたかのように、\nぽつり、斎藤さんが言葉を漏らす。
3057 = "門一關上，齋藤婆婆就開口說道。" 

# monologue
# JP: 口調は、柔らかで温かい。\n僕までホっとさせられる。
2650 = "她溫和的語調讓我鬆了一口氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「元気がなかったのですか？」
2050 = "「她之前沒精神嗎？」" 

# 【斎藤】
# display as 齋藤
# JP: 「坊っちゃんが帝都に向かわれてから、\nしばらくの間は塞ぎこんでおられたとですねぇ」
2080 = "「少爺去了帝都之後，她悶悶不樂了一陣子」" 

# monologue
# JP: 目線は\x%lもろみ;#00ffc040;もろみ%l;#;を向いたまま、\n斎藤さんは、律儀に僕に答えてくれる。
3099 = "齋藤婆婆看著\\x%lもろみ;#00ffc040;酒醪%l;#;禮貌地回了我的話。" 

# 【斎藤】
# display as 齋藤
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致賛成なんぞと言い出したのも、\nまぁ、それが響いてのこととでしょうねぇ」
2056 = "「她會說出贊成引進\\x%lエアクラ;#00ffc040;空凝機%l;#;，我想也是因為這個吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1991 = "「啊……」" 

# monologue
# JP: そういう風に説明されると、\nそこに明確なつながりがあるように思えてしまう。
3007 = "被她這麼一說，我也開始覺得兩者之間存在明確的聯繫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「寂しがっていた、ということでしょうか？\nそこで宝生稀咲と仲良くなり、その影響をモロに受けた」
2055 = "「她是感到寂寞了吧？然後和寶生稀咲走得太近，受了她很大的影響」" 

# 【斎藤】
# display as 齋藤
# JP: 「蔵人になるもんではなかゆうても、嬢ちゃんも、\nこの蔵で産まれ育たれよったお子ですけんねぇ」
2084 = "「就算成不了釀酒師，小姐她也是在這個酒窖裡出生長大的」" 

# monologue
# JP: “蔵人になるものではない”――
1602 = "“成不了釀酒師”——" 

# monologue
# JP: ハチロクへと使った評を、日々姫に対しても同じく、\n斎藤さんは当たり前のように口にする。
3098 = "齋藤婆婆用理所當然的語氣，對日日姬給出了和八六相同的評價。" 

# 【斎藤】
# display as 齋藤
# JP: 「クマ川の水ば汚すような工場の誘致のごたる話、\n影響されねば、賛成派になぞならぁしませんでしょ」
2322 = "「這種會汙染隈河河水的工廠引進提案，要不是受了影響，她怎麼會贊成」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい、僕もそう思います」
2175 = "「是的，我也是這麼想的」" 

# monologue
# JP: 斎藤さんは、決して日々姫に冷たくない。\nどころか、暖かな目で見てくれている。
3093 = "齋藤婆婆對日日姬絕不冷淡。非但如此，她還一直以溫柔的目光關注著日日姬。" 

# monologue
# JP: その感触がよりざらつかせる違和感を、\nだから、素直に口にしてみる。
3037 = "這加深了我心中的違和感，我忍不住發問。" 

# 【双鉄】
# display as 雙鐵
# JP: 「“蔵人になるもの”とは、\n一体、どういったものでしょうか？」
1620 = "「“成得了釀酒師的人”——究竟是指怎樣的人？」" 

# 【斎藤】
# display as 齋藤
# JP: 「真闇さんやわたしのごつ、\n蔵でしか生きれんもんですなぁ」
1912 = "「像真闇小姐和我這樣，只能活在酒窖裡的人」" 

# monologue
# JP: ただ二例。それだけでしかし、納得できたような気がする。\n焼酎づくり以外をしている斎藤さんなど、想像も出来ない。
2634 = "她只列舉了兩個人，可我似乎已經懂了她的意思。我完全無法想像齋藤婆婆從事釀酒以外的其他工作。" 

# monologue
# JP: そして、真闇姉はなんでも容易にこなす人だが――\n焼酎づくりに関してだけは、いつでも悩み、惑っている。
2982 = "而真闇姐凡事都能輕輕鬆鬆地完成——唯獨在釀酒上會絞盡腦汁。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……酒造りに全てをかけている、というほどの\n意味でしょうか？」
2094 = "「您的意思是……將人生的一切都獻給釀酒事業的人嗎？」" 

# 【斎藤】
# display as 齋藤
# JP: 「ただ単に、他んこつには興味がよー向かん――\nそぎゃん感じかと思うとります」
1951 = "「只是單純對其他事都提不起興趣的人——應該是這樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1997 = "「啊」" 

# monologue
# JP: 納得が深まり、理解に変わる。
2727 = "我的認同變成了理解。" 

# monologue
# JP: ならばそれは、ネガティブでもポジティブでも無い評価\n――いや、単なる観察結果にすぎん。
2523 = "也就是說那些評價並無褒貶之意——不，不如說那些純粹只是她的觀察結果。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫には絵があり、ハチロクには鉄道がある。故に、\n彼女らは蔵人になるものではない――ということですか」
2154 = "「日日姬喜歡畫畫，八六則關心鐵路，所以她們成不了釀酒師——是這個意思嗎」" 

# 【斎藤】
# display as 齋藤
# JP: 「……蔵は、ようけを詰め込みよるもんですけんねぇ。\nそこで育ち、そこで学ぶは、良かことやろうと思います」
1647 = "「……酒窖裡匯集了許許多多的東西。在酒窖學習長大，我認為是一件好事」" 

# monologue
# JP: いつの間に、櫂棒を動かす手が止まっている。\n斎藤さんの瞳はまっすぐ、僕を見ている。
3094 = "齋藤婆婆已經停止了攪拌。她直直地看著我。" 

# 【斎藤】
# display as 齋藤
# JP: 「けど、『いつでも蔵に戻れる』思うて甘えよったら、\nなるべきもんに、なりそこねるかもしれませんなぁ」
1886 = "「不過，要是因為覺得隨時都能回酒窖而不下決心，或許會無法走上正確的道路啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1988 = "「啊——」" 

# monologue
# JP: 恐らくだけれど。\n斎藤さんはその意味で、日々姫を蔵から追ったのだろう。
2702 = "恐怕，這就是齋藤婆婆把日日姬趕出酒窖的原因。" 

# monologue
# JP: “蔵人になるものではない”との判断を告げ、\n絵の道へ進み、決して戻ることの無いように。
2908 = "為了讓她明白自己“成不了釀酒師”，從而義無反顧地走上繪畫之路。" 

# 【斎藤】
# display as 齋藤
# JP: 「しかし……時を正しく見極める、ゆうのは、\nまず難しかことですねぇ」
1955 = "「可是……把握好時機是很難的啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1975 = "「哎？」" 

# monologue
# JP: 櫂棒がまた、動き出す。\n斎藤さんは、もう僕の方を見ていない。
2867 = "櫂棒繼續動了起來。齋藤婆婆已經不再看我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは一体、どういう意味で――」
2313 = "「這到底是什麼意思——」" 

# 【ハチロク】
