[script]
# lines: 422 
# monologue
# JP: ステンタンクが主流だが、ホーローのものも、[かめ]甕もある。\nどころか、オークの樽もある。
3041 = "這裡的容器以不鏽鋼桶為主，也有搪瓷容器和罈子，甚至還有橡木桶。" 

# monologue
# JP: 醸造した後の焼酎を木樽でじっくり寝かせると、\nウィスキーのような風味と色とが付け加わるのだ。
2976 = "經過釀造的燒酒置於桶中慢慢發酵，會生出威士忌般的醇香與色澤。" 

# monologue
# JP: （きゅっ――きゅっ）
3115 = "（咯滋——咯滋）" 

# monologue
# JP: 磨けばさらに、多くがわかる。
2611 = "在擦拭的過程中，也讓我了解到更多。" 

# monologue
# JP: 音が香りが肌合いが、\n教わるだけでは学べぬ知識を与えてくれる。
2986 = "聲音、香味和觸感，它們讓我學到很多不去實際接觸就學不到的知識。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……他の物と比べて手間がかからぬが――\nしかしどうも、ステンタンクは曇りやすいな」
1629 = "「……不鏽鋼桶擦起來倒是省力些，就是太容易濛霧了」" 

# monologue
# JP: （きゅっ――きゅ）
# 3115 = "（咯滋——咯滋）" 

# monologue
# JP: 曇りなど、汚れといえぬようなものだし、\nその中で眠る焼酎に、いささかの悪影響も与えぬだろう。
2904 = "濛霧與汙漬不同，不會對其中的燒酒造成些許危害。" 

# monologue
# JP: が、せっかく磨いているのだから、\n出来るかぎりは綺麗に仕上げきってしまいたい。
2515 = "不過，反正都在擦了，不如做得徹底點，讓桶看起來也很乾淨。" 

# 【日々姫】
# display as 日日姬
# JP: 「目立つだけですよ、兄さん。\nピカピカだから、曇りが目立ってしまうだけです」
2317 = "「這樣只會更顯眼，哥哥。整個桶都擦得發亮的話，暗的部分只會更顯眼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫か」
2170 = "「是日日姬啊」" 

# monologue
# JP: 掃除番の仕事のひとつ、タンク清掃。\n朝一番、誰も来ぬうち済ませておこうと思ったのだが――
2903 = "清潔容器是清掃工作的一部分。本來我想趁著一大早還沒人來的時候做完——" 

# 【日々姫】
# display as 日日姬
# JP: 「ハチロクは？　一緒じゃないんですか？」
1930 = "「八六呢？你們沒在一起嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あれはまだ寝て――いや、寝たふりをしてくれている」
2061 = "「她還在睡——不，在裝睡」" 

# 【日々姫】
# display as 日日姬
# JP: 「寝たふり？　ですか」
2269 = "「裝睡？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。あれはそうした気をつかうのだ。\n『誰も起こさないように起きだした』僕に対してな」
2013 = "「嗯。她是故意配合我。因為我想“在不吵醒別人的情況下起床”」" 

# 【日々姫】
# display as 日日姬
# JP: 「ああ」
2319 = "「這樣啊」" 

# monologue
# JP: 呆れと納得、半分半分のような声。
2837 = "日日姬帶著苦笑表示認同。" 

# 【日々姫】
# display as 日日姬
# JP: 「確かに、あの子はそのくらいのことしそうですね」
2059 = "「她確實會做出這種事」" 

# monologue
# JP: 頷きながら、“しかし”と思う。
2716 = "我在表示同意的同時，心中冒出一個想法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「残念ながら、ハチロクの気遣いは無駄となったな。\n随分早いが、ひょっとして、僕が起こしてしまったか？」
1952 = "「可惜，八六白費心了。你起這麼早，不會就是我吵醒的吧？」" 

# monologue
# JP: 言えばあははと、日々姫は快活に笑い手を振る。\n右手の中のペン入れが、かさかさ左右に揺れ動く。
2841 = "日日姬爽朗地笑著揮了揮手，她右手中的筆盒在搖晃下發出嘩啦聲。" 

# 【日々姫】
# display as 日日姬
# JP: 「蔵でガタガタいうたくらいで起こされとったら、\n酒蔵の娘はとてもじゃないけど、やっとれんけん」
2274 = "「要是酒窖裡發出這點動靜就給吵醒，那還算哪門子打小在釀酒廠裡長大的姑娘啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。そうだな」
2281 = "「說的也是」" 

# monologue
# JP: 酒は生き物と誰もが言うが、その前段階、麹も、\x%lもろみ;#00ffc040;もろみ%l;\n#;――つまりは酒母――も、当然ながら生きている。
2529 = "人人都說酒是活的。當然，在成酒之前，不管是麴，還是\\x%lもろみ;#00ffc040;酒醪%l;#;——即酒母，它們也都是活的。" 

# monologue
# JP: 生きているもの相手なら、何が起きても不思議は無い。\n\x%l杜氏;#00ffc040;杜氏%l;#;も蔵人も、必要があれば夜も昼もなく酒と向き合う。
2608 = "因為是活的，所以什麼都可能發生。如有必要，\\x%l杜氏;#00ffc040;掌窖%l;#;和釀酒師需要不分晝夜地與酒打交道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、描きに来たのか。いったい何をだ？」
2336 = "「那你是來畫畫的嗎？到底要畫什麼？」" 

# monologue
# JP: 日々姫は一瞬おどろいたような顔をして、\nけれどもすぐに、自分自身を見下ろしながら苦笑する。
2815 = "日日姬先是吃了一驚，隨即低頭看了看自己，然後發出苦笑。" 

# monologue
# JP: ペン入れ、そしてスケッチブック。\nその格好で、絵を描く以外を想像する方が難しい。
2971 = "筆盒和素描簿，這身裝扮除了畫畫很難想到其他可能。" 

# 【日々姫】
# display as 日日姬
# JP: 「みんなの邪魔にならない時間に、蔵全体――\nこの光景を、スケッチしようと思ったんです」
2120 = "「我想趁著早上不會打擾到大家，把整個酒窖——這幅景象素描下來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「この光景を？　今さらか？」
2226 = "「現在才來素描這幅景象？」" 

# monologue
# JP: 僕ですら、見慣れに見慣れた景色ゆえ、\nつるりと、喉から出てしまった言葉。
2921 = "畢竟這幅景象連我都熟悉到不能再熟悉，所以我不自覺地問了出來。" 

# monologue
# JP: 軽率だったかとひやひやするが、\n日々姫は気にした風もなく、ほんのわずかに苦笑する。
2738 = "我還在擔心這話有些輕率，可日日姬看起來沒有在意，她稍稍露出苦笑。" 

# 【日々姫】
# display as 日日姬
# JP: 「ほんっと、今さらですよねー。\n次女っていっても、私も酒蔵の娘なのに」
2247 = "「確實是後知後覺啊。雖說是次女，但我明明也是在釀酒廠裡長大的姑娘」" 

# monologue
# JP: 微妙な話題だ。僕は沈黙するしかない。\n沈黙するうち……ふと、思い出す。
3079 = "難以接話。我唯有沉默。沉默的同時……我突然想到。" 

# monologue
# JP: 日々姫が絵を描いている姿を、昔からあちこち見ているが\n……ただの一度も酒蔵内では見かけていないということを。
3075 = "雖然我一直以來隨處都能見到日日姬在畫畫……卻唯獨在酒窖從未見過。" 

# 【日々姫】
# display as 日日姬
# JP: 「わたし、苦手でしたからね、ここ」
2116 = "「我啊，以前不怎麼喜歡這裡」" 

# monologue
# JP: 過去形か。
2534 = "以前啊。" 

# monologue
# JP: 大きな安堵を感じるが、今度はうかつに口に出さぬよう\n気をつけながら、言葉を選ぶ。
2722 = "我心中大大鬆了一口氣。這回可不能再說錯話了，我小心斟酌著用詞。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、描きたくなったのか？」
2224 = "「然後現在想畫了嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「描きたい？　描かなきゃ？　ん……どっちかな。\nええと――あ、そう！　『描いてみたい』」
1618 = "「“想畫”？還是說是“必須得畫才行”？嗯……是哪種呢。呃——啊，對了！“想試著畫畫看”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「描いてみたい」
2098 = "「想試著畫畫看」" 

# 【日々姫】
# display as 日日姬
# JP: 「駅弁関係とか、蒸気焼酎がらみとか、そういうのあるし。\nそれで――描いてみといた方がいいなってのがあって」
1915 = "「像鐵路便當啊，蒸汽燒酒啊，考慮到這些工作，我覺得還是應該畫畫看」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。クマ焼酎こそは、何もなくとも既に全国に\n知れ渡っている、クマ川流域の象徴だ」
2246 = "「確實啊。隈燒酒已經在不知不覺中聞名全國，現在已經是隈河流域的象徵了」" 

# monologue
# JP: 御一夜のシンボルとして描くのならば、最適だろう。\nが――うん、と頷く日々姫の顔は、いささか硬い。
2741 = "把它當成御一夜的標誌畫在畫上，可謂再合適不過了吧。但是——日日姬雖然表示贊同，表情卻略顯生硬。" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、かな」
2134 = "「所以我才會這樣吧」" 

# monologue
# JP: 同意の言葉をはけば、ゆるり――\nそれは自然な笑みへとほぐれる。
2858 = "日日姬附和道。她的表情漸漸舒展為自然的笑容。" 

# 【日々姫】
# display as 日日姬
# JP: 「他にもいろいろあるけど……多分、それもきっとあって。\nクマ焼酎が、だから怖くて、描きたくなくて」
2365 = "「雖然也有其他各種原因……但我想肯定是因為這個，我才會感到害怕，不想去畫隈燒酒」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2016 = "「嗯」" 

# monologue
# JP: 大きすぎ、身近すぎるものだから容易に描けない。\nその気持ちなら僕にも容易に想像できる。
3029 = "近在咫尺又太過重要的東西很難下手去畫。她的心情就連我也很容易想像得到。" 

# monologue
