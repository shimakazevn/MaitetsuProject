[script]
# lines: 422 
# monologue
# JP: ステンタンクが主流だが、ホーローのものも、[かめ]甕もある。\nどころか、オークの樽もある。
3041 = "Bồn thép không gỉ là chủ yếu, nhưng cũng có loại tráng men, cả chum vại nữa. Thậm chí còn có cả thùng gỗ sồi."
# monologue
# JP: 醸造した後の焼酎を木樽でじっくり寝かせると、\nウィスキーのような風味と色とが付け加わるのだ。
2976 = "Rượu shochu sau khi chưng cất nếu được ủ kỹ trong thùng gỗ, sẽ có thêm hương vị và màu sắc giống như rượu whisky."
# monologue
# JP: （きゅっ――きゅっ）
3115 = "（Két——kéét）"
# monologue
# JP: 磨けばさらに、多くがわかる。
2611 = "Càng đánh bóng, tôi càng hiểu ra nhiều điều."
# monologue
# JP: 音が香りが肌合いが、\n教わるだけでは学べぬ知識を与えてくれる。
2986 = "Âm thanh, mùi hương, xúc giác, mang đến cho tôi những kiến thức mà chỉ nghe giảng thôi thì không thể học được."
# 【双鉄】
# display as 雙鐵
# JP: 「……他の物と比べて手間がかからぬが――\nしかしどうも、ステンタンクは曇りやすいな」
1629 = "「......So với những thứ khác thì không tốn công bằng—— Nhưng bồn thép không gỉ lại dễ bị mờ đục quá.」"
# monologue
# JP: （きゅっ――きゅ）
# 3115 = "（咯滋——咯滋）" 
# monologue
# JP: 曇りなど、汚れといえぬようなものだし、\nその中で眠る焼酎に、いささかの悪影響も与えぬだろう。
2904 = "Vết mờ đục cũng chẳng thể gọi là vết bẩn, và có lẽ nó cũng chẳng gây ảnh hưởng xấu gì đến rượu shochu đang ngủ yên bên trong."
# monologue
# JP: が、せっかく磨いているのだから、\n出来るかぎりは綺麗に仕上げきってしまいたい。
2515 = "Nhưng đã cất công đánh bóng rồi, thì tôi muốn làm cho nó sạch sẽ nhất có thể."
# 【日々姫】
# display as 日日姬
# JP: 「目立つだけですよ、兄さん。\nピカピカだから、曇りが目立ってしまうだけです」
2317 = "「Chỉ là do nó nổi bật thôi, anh trai. Vì nó sáng bóng nên vết mờ đục mới dễ thấy thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫か」
2170 = "「Hibiki à.」"
# monologue
# JP: 掃除番の仕事のひとつ、タンク清掃。\n朝一番、誰も来ぬうち済ませておこうと思ったのだが――
2903 = "Một trong những công việc của người quét dọn, vệ sinh bồn chứa. Tôi định làm xong ngay từ sáng sớm khi chưa có ai đến, vậy mà——"
# 【日々姫】
# display as 日日姬
# JP: 「ハチロクは？　一緒じゃないんですか？」
1930 = "「Chị Hachiroku đâu rồi ạ? Không đi cùng anh sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あれはまだ寝て――いや、寝たふりをしてくれている」
2061 = "「Cô ấy vẫn còn đang ngủ——à không, đang giả vờ ngủ.」"
# 【日々姫】
# display as 日日姬
# JP: 「寝たふり？　ですか」
2269 = "「Giả vờ ngủ? Sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。あれはそうした気をつかうのだ。\n『誰も起こさないように起きだした』僕に対してな」
2013 = "「Ừm. Cô ấy là người tinh ý như vậy đấy. Đối với người 『thức dậy sao cho không đánh thức ai』 như anh.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ」
2319 = "「À.」"
# monologue
# JP: 呆れと納得、半分半分のような声。
2837 = "Giọng điệu như nửa cạn lời, nửa đồng tình."
# 【日々姫】
# display as 日日姬
# JP: 「確かに、あの子はそのくらいのことしそうですね」
2059 = "「Đúng là chị ấy có vẻ sẽ làm những việc như vậy nhỉ.」"
# monologue
# JP: 頷きながら、“しかし”と思う。
2716 = "Vừa gật đầu, tôi vừa nghĩ \"Nhưng mà\"."
# 【双鉄】
# display as 雙鐵
# JP: 「残念ながら、ハチロクの気遣いは無駄となったな。\n随分早いが、ひょっとして、僕が起こしてしまったか？」
1952 = "「Tiếc là sự tinh ý của Hachiroku thành công cốc rồi. Còn sớm lắm, không lẽ là do anh đánh thức em à?」"
# monologue
# JP: 言えばあははと、日々姫は快活に笑い手を振る。\n右手の中のペン入れが、かさかさ左右に揺れ動く。
2841 = "Nghe vậy, Hibiki cười sảng khoái xua tay. Hộp bút trong tay phải con bé lắc lư qua lại kêu lạch cạch."
# 【日々姫】
# display as 日日姬
# JP: 「蔵でガタガタいうたくらいで起こされとったら、\n酒蔵の娘はとてもじゃないけど、やっとれんけん」
2274 = "「Nếu chỉ vì tiếng động lạch cạch trong nhà xưởng mà bị đánh thức, thì con gái nhà nấu rượu đâu có làm ăn gì được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。そうだな」
2281 = "「Vậy sao. Đúng vậy nhỉ.」"
# monologue
# JP: 酒は生き物と誰もが言うが、その前段階、麹も、\\x%lもろみ;#00ffc040;もろみ%l;\n#;――つまりは酒母――も、当然ながら生きている。
2529 = "Ai cũng nói rượu là một sinh vật sống, nhưng ở giai đoạn trước đó, men kōji, hay \\x%lもろみ;#00ffc040;cơm rượu%l;#; ——tức là rượu mẹ——tất nhiên cũng đang sống."
# monologue
# JP: 生きているもの相手なら、何が起きても不思議は無い。\n\\x%l杜氏;#00ffc040;杜氏%l;#;も蔵人も、必要があれば夜も昼もなく酒と向き合う。
2608 = "Nếu đối tượng là sinh vật sống thì chuyện gì xảy ra cũng không có gì lạ. Cả \\x%l杜氏;#00ffc040;trưởng hầm rượu%l;#; lẫn thợ nấu rượu, khi cần thiết đều phải đối mặt với rượu bất kể ngày đêm."
# 【双鉄】
# display as 雙鐵
# JP: 「では、描きに来たのか。いったい何をだ？」
2336 = "「Vậy, em đến để vẽ à. Rốt cuộc là vẽ gì vậy?」"
# monologue
# JP: 日々姫は一瞬おどろいたような顔をして、\nけれどもすぐに、自分自身を見下ろしながら苦笑する。
2815 = "Hibiki thoáng lộ vẻ ngạc nhiên, nhưng ngay sau đó, con bé cúi xuống nhìn bản thân rồi cười khổ."
# monologue
# JP: ペン入れ、そしてスケッチブック。\nその格好で、絵を描く以外を想像する方が難しい。
2971 = "Hộp bút, và sổ phác thảo. Với bộ dạng đó, thật khó để tưởng tượng ra việc gì khác ngoài vẽ tranh."
# 【日々姫】
# display as 日日姬
# JP: 「みんなの邪魔にならない時間に、蔵全体――\nこの光景を、スケッチしようと思ったんです」
2120 = "「Em định nhân lúc không làm phiền mọi người, phác họa lại toàn bộ nhà xưởng—— khung cảnh này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「この光景を？　今さらか？」
2226 = "「Khung cảnh này sao? Bây giờ mới vẽ à?」"
# monologue
# JP: 僕ですら、見慣れに見慣れた景色ゆえ、\nつるりと、喉から出てしまった言葉。
2921 = "Đến cả tôi cũng đã quá quen thuộc với khung cảnh này, nên lời nói cứ thế buột ra khỏi miệng."
# monologue
# JP: 軽率だったかとひやひやするが、\n日々姫は気にした風もなく、ほんのわずかに苦笑する。
2738 = "Tôi thót tim lo sợ mình đã lỡ lời, nhưng Hibiki có vẻ không bận tâm, chỉ hơi cười khổ một chút."
# 【日々姫】
# display as 日日姬
# JP: 「ほんっと、今さらですよねー。\n次女っていっても、私も酒蔵の娘なのに」
2247 = "「Thật sự là, bây giờ mới vẽ nhỉ. Dù là con thứ, nhưng em cũng là con gái nhà nấu rượu mà.」"
# monologue
# JP: 微妙な話題だ。僕は沈黙するしかない。\n沈黙するうち……ふと、思い出す。
3079 = "Một chủ đề tế nhị. Tôi chỉ biết im lặng. Trong lúc im lặng... tôi chợt nhớ ra."
# monologue
# JP: 日々姫が絵を描いている姿を、昔からあちこち見ているが\n……ただの一度も酒蔵内では見かけていないということを。
3075 = "Từ trước đến nay tôi đã thấy Hibiki vẽ tranh ở khắp nơi ...nhưng chưa một lần nào thấy con bé vẽ bên trong nhà xưởng ủ rượu."
# 【日々姫】
# display as 日日姬
# JP: 「わたし、苦手でしたからね、ここ」
2116 = "「Tại vì em, từng không thích nơi này mà.」"
# monologue
# JP: 過去形か。
2534 = "Thì quá khứ sao."
# monologue
# JP: 大きな安堵を感じるが、今度はうかつに口に出さぬよう\n気をつけながら、言葉を選ぶ。
2722 = "Cảm thấy vô cùng nhẹ nhõm, nhưng lần này để không buột miệng nói hớ, tôi cẩn thận chọn lọc từ ngữ."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、描きたくなったのか？」
2224 = "「Nhưng mà, giờ em lại muốn vẽ sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「描きたい？　描かなきゃ？　ん……どっちかな。\nええと――あ、そう！　『描いてみたい』」
1618 = "「Muốn vẽ? Phải vẽ? Ưm... là cái nào nhỉ. À——A, đúng rồi! 『Muốn vẽ thử』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「描いてみたい」
2098 = "「Muốn vẽ thử.」"
# 【日々姫】
# display as 日日姬
# JP: 「駅弁関係とか、蒸気焼酎がらみとか、そういうのあるし。\nそれで――描いてみといた方がいいなってのがあって」
1915 = "「Liên quan đến cơm hộp nhà ga này, rồi shochu hơi nước này, mấy thứ như vậy ấy. Thế nên——em nghĩ là mình nên vẽ thử xem sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。クマ焼酎こそは、何もなくとも既に全国に\n知れ渡っている、クマ川流域の象徴だ」
2246 = "「Đúng vậy nhỉ. Dù không có gì, thì rượu shochu Kuma cũng đã nổi tiếng khắp cả nước, là biểu tượng của lưu vực sông Kuma mà.」"
# monologue
# JP: 御一夜のシンボルとして描くのならば、最適だろう。\nが――うん、と頷く日々姫の顔は、いささか硬い。
2741 = "Nếu vẽ như một biểu tượng của Ohimitera thì quá hợp lý rồi. Nhưng——ừm, khuôn mặt gật đầu của Hibiki lại có phần cứng nhắc."
# 【日々姫】
# display as 日日姬
# JP: 「だから、かな」
2134 = "「Chắc là, vì thế.」"
# monologue
# JP: 同意の言葉をはけば、ゆるり――\nそれは自然な笑みへとほぐれる。
2858 = "Nói lời đồng tình xong, khuôn mặt con bé từ từ—— giãn ra thành một nụ cười tự nhiên."
# 【日々姫】
# display as 日日姬
# JP: 「他にもいろいろあるけど……多分、それもきっとあって。\nクマ焼酎が、だから怖くて、描きたくなくて」
2365 = "「Dù còn nhiều lý do khác nữa... nhưng có lẽ, chắc chắn là có lý do đó. Rượu shochu Kuma, vì thế nên em mới sợ, mới không muốn vẽ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2016 = "「Ừm.」"
# monologue
# JP: 大きすぎ、身近すぎるものだから容易に描けない。\nその気持ちなら僕にも容易に想像できる。
3029 = "Vì nó quá lớn lao, quá đỗi quen thuộc nên không dễ gì vẽ được. Cảm giác đó tôi cũng có thể dễ dàng tưởng tượng ra."
# monologue
# JP: そしてまた、“他にもいろいろある”の中身も、\n容易に想像できてしまって――頷く。
2981 = "Và cả nội tình của \"nhiều lý do khác nữa\", tôi cũng dễ dàng đoán được——nên gật đầu."
# 【日々姫】
# display as 日日姬
# JP: 「けど、今ならそんなに怖くないから。なくなったから。\nだから、描いてみたいって思いました。まるっ！」
1899 = "「Nhưng mà, bây giờ thì em không còn sợ đến thế nữa. Hết sợ rồi. Thế nên, em mới nghĩ là muốn vẽ thử. Chấm hết!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2319 = "「這樣啊」" 
# monologue
# JP: おどけた口調と、穏やかな笑顔と。
3022 = "Giọng điệu đùa cợt, cùng nụ cười hiền hòa."
# monologue
# JP: 日々姫は大人になったのだなぁ、と、\nそれこそ今さら――しみじみ感じる。
2810 = "Hibiki đã trưởng thành rồi nhỉ, đến tận bây giờ tôi mới——thấm thía điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「よかったな」
2049 = "「Tốt quá rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「って！　上手かこと描けるかどーかは、\nまるっきり別次元の話やけどねぇ～っ」
2002 = "「Cơ mà! Việc có vẽ đẹp được hay không, lại là một chuyện hoàn toàn khác đấy nhé~」"
# 【双鉄】
# display as 雙鐵
# JP: 「描ける」
1900 = "「Sẽ vẽ được thôi.」"
# monologue
# JP: それが単なる照れ隠しだとわかっていても、\n伝えないではいられない。
2673 = "Dù biết đó chỉ là lời nói lấp liếm sự ngượng ngùng, nhưng tôi vẫn không thể không nói ra."
# 【双鉄】
# display as 雙鐵
# JP: 「描けるさ、日々姫には。誰より上手く」
1869 = "「Sẽ vẽ được thôi, nếu là Hibiki. Đẹp hơn bất cứ ai.」"
# monologue
# JP: ふと思い出す。日々姫に言われ、\n資料を集めていたとき感じた、縦軸・横軸ということを。
2734 = "Chợt nhớ lại. Điều mà Hibiki đã nói, và cảm giác về trục tung - trục hoành khi tôi thu thập tư liệu."
# monologue
# JP: そうして遠い昔に日々姫が教えてくれた、\n”赤は赤い”ということを。
2535 = "Và cả điều mà Hibiki đã dạy tôi từ rất lâu về trước, rằng \"Màu đỏ là màu đỏ\"."
# 【双鉄】
# display as 雙鐵
# JP: 「黒の黒さを知れば、白の白さもより深く理解できよう。\nだから日々姫はきっと誰より、この光景を綺麗に描ける」
2077 = "「Nếu biết được độ đen của màu đen, thì sẽ hiểu sâu sắc hơn độ trắng của màu trắng. Thế nên Hibiki chắc chắn sẽ vẽ khung cảnh này đẹp hơn bất cứ ai.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに……」
2360 = "「Anh hai......」"
# monologue
# JP: ほうっと、熱っぽい息を吐き。\n日々姫は唇をわずかに動かし、けれど何も言わずに結ぶ。
2824 = "Hờ, con bé phả ra một hơi thở nóng hổi. Hibiki hơi mấp máy môi, nhưng rồi lại ngậm miệng không nói gì."
# 【日々姫】
# display as 日日姬
# JP: 「ん――」
2011 = "「Ưm——」"
# monologue
# JP: ごく無造作――そうとしか思えぬ仕草で、\nスケッチブックが開かれ鉛筆が動き出す。
2630 = "Bằng một động tác vô cùng tự nhiên——chỉ có thể nghĩ là vậy, con bé mở sổ phác thảo ra và bắt đầu đưa bút chì."
# monologue
# JP: 真っ白だった画用紙に、いくつも黒が引かれていく。\nそれは線から、すぐさま影に、面へと変わる。
2613 = "Trên tờ giấy trắng tinh, vô số nét đen được vạch ra. Từ những đường nét, chúng nhanh chóng biến thành bóng râm, thành mặt phẳng."
# 【日々姫】
# display as 日日姬
# JP: 「……にぃにこそ、なんでこぎゃんと時間から？」
1650 = "「......Anh hai mới đúng đó, sao lại dậy từ giờ này?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――僕か？」
1990 = "「A——anh á?」"
# monologue
# JP: 手に見とれ、返事が一瞬遅れてしまった。
2731 = "Mải ngắm nhìn bàn tay ấy, tôi trả lời chậm mất một nhịp."
# monologue
# JP: それがどうにも気恥ずかしくて、\n僕もタンクを磨く手を再び動かし始める。
3038 = "Thấy ngượng ngùng quá, tôi cũng bắt đầu đưa tay đánh bóng bồn chứa trở lại."
# 【双鉄】
# display as 雙鐵
# JP: 「僕なら、単なる時間配分だ」
2114 = "「Anh thì, chỉ đơn giản là phân bổ thời gian thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「時間配分？」
1940 = "「Phân bổ thời gian?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうすれば、一番多くを経験できる」
2326 = "「Làm vậy thì sẽ trải nghiệm được nhiều nhất.」"
# monologue
# JP: 通勤・通園の人通りが一番多くなるのが７～８時。
3125 = "Thời điểm người đi làm, đi học đông nhất là từ 7 đến 8 giờ."
# monologue
# JP: その時間帯に玄関先の掃除をするためには、\n早朝のうち、タンク磨きを済ませておくのが一番良い。
2906 = "Để có thể dọn dẹp trước cổng vào khung giờ đó, thì tốt nhất là nên đánh bóng bồn chứa xong từ sáng sớm."
# 【日々姫】
# display as 日日姬
# JP: 「はぁぁ～――にぃにもいろいろ――んんっ！\n兄さんも、いろいろ考えてらっしゃるんですね？」
1983 = "「Hàà~——anh hai cũng có nhiều——ưm! Anh trai cũng, suy nghĩ nhiều thứ nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜をもっと知りたいだけだ。日々姫が言った通り、\n掃除番を務めて初めて、見えてきた景色もある」
2111 = "「Anh chỉ muốn hiểu thêm về Ohimitera thôi. Đúng như Hibiki đã nói, có những khung cảnh chỉ khi làm người quét dọn mới nhìn thấy được.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
1997 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、より多くを見るため、より懸命に努めるだけだ。\n僕は、そのほかにやり方を知らん」
2118 = "「Vậy thì, để nhìn thấy nhiều hơn, anh chỉ còn cách nỗ lực hết mình thôi. Ngoài cách đó ra anh chẳng biết cách nào khác cả.」"
# 【日々姫】
# display as 日日姬
# JP: 「そ、それなら！」
2331 = "「V, vậy thì!」"
# monologue
# JP: 大きな声。\n鉛筆を動かす手が止まっている。
2828 = "Giọng nói lớn. Bàn tay đang đưa bút chì chợt dừng lại."
# 【日々姫】
# display as 日日姬
# JP: 「もし良かったら、兄さんにも来てもらいたいんですけど。\n今日の午後」
2272 = "「Nếu được, em muốn anh trai cũng đến. Chiều nay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どこにだ？」
1945 = "「Đến đâu?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、あのっ――\n稀咲センパイのところです」
2082 = "「Vâng, là—— chỗ của chị Kisaki ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「宝生稀咲の？」
2074 = "「Của Houshou Kisaki sao?」"
# monologue
# JP: “それなら”と日々姫は言った。
2819 = "Hibiki vừa nói \"Vậy thì\"."
# monologue
# JP: ならば、宝生稀咲のところできっと、\n御一夜をより知るための何かと出会えるということだろう。
2524 = "Nếu vậy, chắc chắn ở chỗ của Houshou Kisaki, tôi sẽ gặp được điều gì đó giúp hiểu thêm về Ohimitera."
# 【日々姫】
# display as 日日姬
# JP: 「ええとですね、私、稀咲センパイのところで――」
2339 = "「Chuyện là, em ở chỗ chị Kisaki——」"
# monologue
# JP: （きぃ――ぃ）
3114 = "（Két——）"
# monologue
# JP: 金属扉の軋む音。
3056 = "Tiếng cánh cửa kim loại cọt kẹt."
# monologue
# JP: 誰かが、酒蔵に入ってきたのだ。\n途端、日々姫の弾んでいた声が止まってしまう。
3046 = "Ai đó đã bước vào nhà xưởng. Ngay lập tức, giọng nói hào hứng của Hibiki tắt lịm."
# 【斎藤】
# display as ？？？
# JP: 「おや。坊っちゃん、嬢ちゃん。お早ぅございます。\nこんな時間におらすとは珍しかですねぇ」
1973 = "「Ây da. Cậu chủ, cô chủ. Chào buổi sáng. Hai người ở đây giờ này đúng là hiếm thấy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「斎藤さん、おはようございます」
2373 = "「Bà Saitou, chào buổi sáng ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「……おはようございます」
1644 = "「......Chào buổi sáng ạ.」"
# monologue
# JP: 蔵人頭の斎藤さん。
3097 = "Thợ nấu rượu trưởng, bà Saitou."
# monologue
# JP: 酒造りに関しては蔵の誰より経験豊富で、誰より厳しい\n――小柄ではあるが威厳に満ちた、老婦人だ。
2640 = "Về khoản nấu rượu, bà ấy có nhiều kinh nghiệm hơn bất cứ ai trong nhà xưởng, và cũng nghiêm khắc hơn bất cứ ai ——Một bà lão tuy nhỏ nhắn nhưng lại tràn đầy uy nghiêm."
# 【双鉄】
# display as 雙鐵
# JP: 「タンク磨きをしていたのですが」
2122 = "「Cháu đang đánh bóng bồn chứa ạ.」"
# 【斎藤】
# display as 齋藤
# JP: 「邪魔にゃなりません。\nよかですよ。そのまま続けよってください」
2207 = "「Không vướng víu gì đâu. Được mà. Cậu cứ tiếp tục đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 2016 = "「嗯」" 
# monologue
# JP: 坊っちゃん、と呼ばれる身でも、\n蔵の中では僕は単なる、掃除番。
3077 = "Dù được gọi là cậu chủ, nhưng trong nhà xưởng, tôi cũng chỉ là một người quét dọn đơn thuần."
# monologue
# JP: 蔵人頭――右田一酒蔵元でナンバー２の斎藤さんに、\n何を意見できるような立場ではない。
2671 = "Trước mặt thợ nấu rượu trưởng——nhân vật số 2 ở nhà nấu rượu Migita System là bà Saitou, tôi không có tư cách để đưa ra ý kiến gì cả."
# 【日々姫】
# display as 日日姬
# JP: 「あの――兄さん」
2338 = "「Cái đó——anh trai.」"
# monologue
# JP: まして今の日々姫は、酒造りに関しては“部外者”だ。
2542 = "Huống hồ Hibiki hiện tại, đối với việc nấu rượu chỉ là \"người ngoài\"."
# monologue
# JP: スケッチブックはもうたたまれて、\n鉛筆は筆入れへと収められている。
2973 = "Cuốn sổ phác thảo đã được gấp lại, bút chì cũng đã được cất vào hộp."
# 【斎藤】
# display as 齋藤
# JP: 「ああ。悪かこつなかですねぇ」
2327 = "「Chà. Không tệ chút nào nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
2374 = "「!」"
# monologue
# JP: 斎藤さんの独り言。日々姫はびくりと身を硬くする。\nどうやら今だに、苦手らしい。
2988 = "Lời lẩm bẩm của bà Saitou. Hibiki giật mình cứng đờ người. Có vẻ như đến tận bây giờ, con bé vẫn sợ bà ấy."
# monologue
# JP: が、無理もない。実際問題、僕から見ても斎藤さんは、\nとりわけ日々姫に、どうにも冷淡にすぎるのだ。
2514 = "Nhưng cũng dễ hiểu thôi. Thực tế mà nói, theo góc nhìn của tôi thì bà Saitou, đặc biệt đối xử quá đỗi lạnh nhạt với Hibiki."
# monologue
# JP: （……どうしたものか）
3102 = "（......Nên làm thế nào đây）"
# monologue
# JP: 斎藤さんを見てみれば、\nしかし途端に沸き起こるのは、強い納得と安堵とだ。
2914 = "Thử nhìn bà Saitou, nhưng ngay lập tức, một cảm giác đồng tình và an tâm mạnh mẽ trào dâng."
# 【双鉄】
# display as 雙鐵
# JP: 「悪くないのは、ハチロクですか」
2328 = "「Không tệ là, Hachiroku sao ạ?」"
# monologue
# JP: ハチロクが、温度管理を任せてもらっている\\x%lもろみ;#00ffc040;もろみ%l;#;。
62 = "\\x%lもろみ;#00ffc040;Cơm rượu%l;#; mà Hachiroku được giao phó quản lý nhiệt độ."
# monologue
# JP: 斎藤さんは、そこにざっくり櫂棒をさし、\n\\x%lもろみ;#00ffc040;もろみ%l;#;をゆるゆる、広げるように櫂入れしている。
3095 = "Bà Saitou cắm mạnh mái chèo vào đó, rồi từ từ khuấy đảo, như thể đang làm tơi \\x%lもろみ;#00ffc040;cơm rượu%l;#; ra."
# 【斎藤】
# display as 齋藤
# JP: 「温度管理ば、上手かとですねぇ。\n“\\x%lもろみ;#00ffc040;もろみ%l;#;ば驚かさんように”と、先日教えたとですが」
2218 = "「Quản lý nhiệt độ, giỏi lắm. Hôm trước tôi vừa dạy là \"đừng làm \\x%lもろみ;#00ffc040;cơm rượu%l;#; giật mình\" xong.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2171 = "「Vâng.」"
# monologue
# JP: 確かに、何も教えなければ、\nハチロクの温度管理は“機械的”なものになるだろう。
2923 = "Quả thực, nếu không dạy bảo gì, thì việc quản lý nhiệt độ của Hachiroku sẽ trở nên \"máy móc\"."
# monologue
# JP: 高ければ低く、低ければ高く――\nバルブをひねり規定温度へ、一直線に寄せてしまうはずだ。
3090 = "Cao thì hạ xuống, thấp thì tăng lên—— Chắc chắn cô ấy sẽ vặn van để đưa thẳng về nhiệt độ quy định."
# 【斎藤】
# display as 齋藤
# JP: 「\\x%lもろみ;#00ffc040;もろみ%l;#;ば、気持ちよぉまどろんどりますねぇ。\n驚かさんようゆるゆる、寝かせてくれよりましたねぇ」
1615 = "「\\x%lもろみ;#00ffc040;Cơm rượu%l;#; đang thiu thiu ngủ rất thoải mái. Cô ấy đã để nó ngủ từ từ, không làm nó giật mình.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうですか。でしたら、よかった」
2168 = "「Vậy sao ạ. Thế thì tốt quá rồi.」"
# monologue
# JP: 安心と、それを上回る喜びが、胸にふつふつ湧いてくる。
2668 = "Sự an tâm, và niềm vui sướng vượt trên cả điều đó, sục sôi trong lồng ngực tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉の見立て通り。\nハチロクは、よほど温度管理に向いているようですね」
1966 = "「Đúng như nhận định của chị Mayami. Có vẻ Hachiroku rất hợp với việc quản lý nhiệt độ nhỉ.」"
# 【斎藤】
# display as 齋藤
# JP: 「向いとる向いとらんで言うなら、向いとりますねぇ」
2276 = "「Nếu nói hợp hay không hợp thì, là hợp đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2374 = "「！」" 
# monologue
# JP: 日々姫が、ぎくりと息を呑む。
2835 = "Hibiki giật mình nín thở."
# monologue
# JP: 僕には理由がわからない。\n不穏な気配は感じるが、何をどうしたらいいものか――
2708 = "Tôi không hiểu lý do tại sao. Dù cảm nhận được bầu không khí bất ổn, nhưng không biết phải làm sao——"
# 【斎藤】
# display as 齋藤
# JP: 「ま、向いとるゆーだけで、\n[くらびと,1]蔵人になるもんとはまた、違いましょーが」
1884 = "「Mà, chỉ là hợp thôi, chứ để trở thành thợ nấu rượu thì lại là chuyện khác.」"
# 【日々姫】
# display as 日日姬
# JP: 「～～っ！」
2376 = "「~~!」"
# monologue
# JP: 日々姫の全身が凍りつく。\nギリ、と歯噛みのような音。
2817 = "Toàn thân Hibiki cứng đờ. Tiếng nghiến răng kèn kẹt vang lên."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫？」
2155 = "「Hibiki?」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、私、これで失礼します」
1981 = "「Anh trai, em xin phép đi trước đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ……うむ、そうか」
1994 = "「A... ừm, vậy sao.」"
# monologue
# JP: 言葉は澄まして落ち着いて、\nけれども日々姫の頬はぷうっとふくらんでいる。
3076 = "Lời nói rõ ràng và bình tĩnh, nhưng hai má Hibiki lại phồng to lên."
# monologue
# JP: 不機嫌そう、を通り越し、あかんべえでもしそうなくらい\nあからさまなゴキゲンナナメの表情だ。
2651 = "Vượt qua cả vẻ không vui, đó là một biểu cảm hờn dỗi ra mặt, đến mức tưởng chừng như con bé sắp lè lưỡi lêu lêu vậy."
# 【日々姫】
# display as 日日姬
# JP: 「午後のこと、考えといてくださいね。\nお昼休みにまた来ますから」
1872 = "「Chuyện buổi chiều, anh nhớ suy nghĩ nhé. Giờ nghỉ trưa em sẽ quay lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。それではまた昼に」
2125 = "「Anh biết rồi. Vậy hẹn gặp lại vào buổi trưa.」"
# monologue
# JP: 斎藤さんには軽く会釈し、あとはもう、\n振り返りもせず、日々姫はスタスタ蔵を出て行く。
2636 = "Chỉ khẽ cúi chào bà Saitou, rồi sau đó, Hibiki đi thẳng ra khỏi nhà xưởng mà không thèm ngoảnh lại."
# monologue
# JP: いや、これは――\nうかつに理由も尋ねられんし……
2602 = "Ây dà, chuyện này—— Cũng không thể tùy tiện hỏi lý do được..."
# 【斎藤】
# display as 齋藤
# JP: 「……嬢ちゃんは、随分と元気ば出よりましたねぇ」
1640 = "「......Cô chủ trông có vẻ tươi tắn hẳn lên rồi nhỉ.」"
# monologue
# JP: ドアの閉まる音を、まるで待っていたかのように、\nぽつり、斎藤さんが言葉を漏らす。
3057 = "Như thể chỉ đợi tiếng cửa đóng lại, bà Saitou mới lẩm bẩm buông lời."
# monologue
# JP: 口調は、柔らかで温かい。\n僕までホっとさせられる。
2650 = "Giọng điệu thật mềm mỏng và ấm áp. Đến cả tôi cũng cảm thấy nhẹ nhõm."
# 【双鉄】
# display as 雙鐵
# JP: 「元気がなかったのですか？」
2050 = "「Trước đó em ấy không được tươi tắn sao ạ?」"
# 【斎藤】
# display as 齋藤
# JP: 「坊っちゃんが帝都に向かわれてから、\nしばらくの間は塞ぎこんでおられたとですねぇ」
2080 = "「Từ khi cậu chủ lên Đế đô, cô chủ đã ủ rũ suốt một thời gian đấy.」"
# monologue
# JP: 目線は\\x%lもろみ;#00ffc040;もろみ%l;#;を向いたまま、\n斎藤さんは、律儀に僕に答えてくれる。
3099 = "Mắt vẫn hướng về phía \\x%lもろみ;#00ffc040;cơm rượu%l;#;, bà Saitou từ tốn trả lời tôi."
# 【斎藤】
# display as 齋藤
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致賛成なんぞと言い出したのも、\nまぁ、それが響いてのこととでしょうねぇ」
2056 = "「Chuyện lên tiếng tán thành việc thu hút \\x%lエアクラ;#00ffc040;Aircra%l;#;, chắc cũng là do ảnh hưởng từ chuyện đó thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1991 = "「A......」"
# monologue
# JP: そういう風に説明されると、\nそこに明確なつながりがあるように思えてしまう。
3007 = "Nghe giải thích như vậy, tôi lại cảm thấy có một mối liên hệ rõ ràng ở đó."
# 【双鉄】
# display as 雙鐵
# JP: 「寂しがっていた、ということでしょうか？\nそこで宝生稀咲と仲良くなり、その影響をモロに受けた」
2055 = "「Ý bà là em ấy cảm thấy cô đơn sao ạ? Rồi trở nên thân thiết với Houshou Kisaki, và chịu ảnh hưởng trực tiếp từ cô ta.」"
# 【斎藤】
# display as 齋藤
# JP: 「蔵人になるもんではなかゆうても、嬢ちゃんも、\nこの蔵で産まれ育たれよったお子ですけんねぇ」
2084 = "「Dù nói là không thể trở thành thợ nấu rượu, nhưng cô chủ, cũng là đứa trẻ sinh ra và lớn lên ở nhà xưởng này mà.」"
# monologue
# JP: “蔵人になるものではない”――
1602 = "\"Không thể trở thành thợ nấu rượu\"——"
# monologue
# JP: ハチロクへと使った評を、日々姫に対しても同じく、\n斎藤さんは当たり前のように口にする。
3098 = "Lời nhận xét dành cho Hachiroku, bà Saitou cũng dùng y hệt cho Hibiki, một cách hiển nhiên."
# 【斎藤】
# display as 齋藤
# JP: 「クマ川の水ば汚すような工場の誘致のごたる話、\n影響されねば、賛成派になぞならぁしませんでしょ」
2322 = "「Cái chuyện thu hút nhà máy có nguy cơ làm ô nhiễm nước sông Kuma ấy, nếu không bị ảnh hưởng thì đời nào cô chủ lại theo phe tán thành chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、僕もそう思います」
2175 = "「Vâng, cháu cũng nghĩ vậy.」"
# monologue
# JP: 斎藤さんは、決して日々姫に冷たくない。\nどころか、暖かな目で見てくれている。
3093 = "Bà Saitou tuyệt đối không hề lạnh nhạt với Hibiki. Trái lại, bà ấy còn nhìn con bé bằng ánh mắt ấm áp."
# monologue
# JP: その感触がよりざらつかせる違和感を、\nだから、素直に口にしてみる。
3037 = "Cảm giác đó càng làm tăng thêm sự gợn gợn trong lòng, thế nên, tôi quyết định hỏi thẳng."
# 【双鉄】
# display as 雙鐵
# JP: 「“蔵人になるもの”とは、\n一体、どういったものでしょうか？」
1620 = "「\"Người trở thành thợ nấu rượu\", rốt cuộc là người như thế nào ạ?」"
# 【斎藤】
# display as 齋藤
# JP: 「真闇さんやわたしのごつ、\n蔵でしか生きれんもんですなぁ」
1912 = "「Giống như cô Mayami hay tôi đây, là những người chỉ có thể sống ở nhà xưởng này thôi.」"
# monologue
# JP: ただ二例。それだけでしかし、納得できたような気がする。\n焼酎づくり以外をしている斎藤さんなど、想像も出来ない。
2634 = "Chỉ với hai ví dụ. Nhưng bấy nhiêu đó cũng đủ để tôi hiểu ra. Tôi không thể tưởng tượng nổi cảnh bà Saitou làm việc gì khác ngoài nấu rượu shochu."
# monologue
# JP: そして、真闇姉はなんでも容易にこなす人だが――\n焼酎づくりに関してだけは、いつでも悩み、惑っている。
2982 = "Còn chị Mayami, một người có thể dễ dàng hoàn thành mọi việc—— nhưng riêng chuyện nấu rượu shochu thì lúc nào cũng trăn trở, băn khoăn."
# 【双鉄】
# display as 雙鐵
# JP: 「それは……酒造りに全てをかけている、というほどの\n意味でしょうか？」
2094 = "「Ý bà là... những người cống hiến tất cả cho việc nấu rượu sao ạ?」"
# 【斎藤】
# display as 齋藤
# JP: 「ただ単に、他んこつには興味がよー向かん――\nそぎゃん感じかと思うとります」
1951 = "「Đơn giản chỉ là, không có hứng thú với những việc khác—— Tôi nghĩ là cảm giác như vậy đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1997 = "「啊」" 
# monologue
# JP: 納得が深まり、理解に変わる。
2727 = "Sự đồng tình sâu sắc hơn, chuyển thành sự thấu hiểu."
# monologue
# JP: ならばそれは、ネガティブでもポジティブでも無い評価\n――いや、単なる観察結果にすぎん。
2523 = "Nếu vậy thì đó không phải là đánh giá tiêu cực hay tích cực ——mà chỉ đơn thuần là kết quả quan sát."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫には絵があり、ハチロクには鉄道がある。故に、\n彼女らは蔵人になるものではない――ということですか」
2154 = "「Hibiki có hội họa, Hachiroku có đường sắt. Do đó, họ không phải là những người sẽ trở thành thợ nấu rượu——ý bà là vậy sao ạ?」"
# 【斎藤】
# display as 齋藤
# JP: 「……蔵は、ようけを詰め込みよるもんですけんねぇ。\nそこで育ち、そこで学ぶは、良かことやろうと思います」
1647 = "「......Nhà xưởng là nơi chứa đựng rất nhiều thứ mà. Được lớn lên ở đó, được học hỏi ở đó, tôi nghĩ là một điều tốt.」"
# monologue
# JP: いつの間に、櫂棒を動かす手が止まっている。\n斎藤さんの瞳はまっすぐ、僕を見ている。
3094 = "Từ lúc nào, bàn tay cầm mái chèo đã dừng lại. Đôi mắt bà Saitou nhìn thẳng vào tôi."
# 【斎藤】
# display as 齋藤
# JP: 「けど、『いつでも蔵に戻れる』思うて甘えよったら、\nなるべきもんに、なりそこねるかもしれませんなぁ」
1886 = "「Nhưng mà, nếu cứ ỷ lại rằng 『lúc nào cũng có thể quay về nhà xưởng』, thì có khi lại đánh mất cơ hội trở thành con người mà mình đáng lẽ phải trở thành đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1988 = "「A——」"
# monologue
# JP: 恐らくだけれど。\n斎藤さんはその意味で、日々姫を蔵から追ったのだろう。
2702 = "Có lẽ là vậy. Chính vì ý đó, nên bà Saitou mới đuổi Hibiki ra khỏi nhà xưởng."
# monologue
# JP: “蔵人になるものではない”との判断を告げ、\n絵の道へ進み、決して戻ることの無いように。
2908 = "Đưa ra phán quyết \"không thể trở thành thợ nấu rượu\", để con bé bước tiếp trên con đường hội họa, và không bao giờ quay đầu lại."
# 【斎藤】
# display as 齋藤
# JP: 「しかし……時を正しく見極める、ゆうのは、\nまず難しかことですねぇ」
1955 = "「Nhưng mà... việc nhìn nhận đúng thời cơ, quả thật là một điều khó khăn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1975 = "「Dạ?」"
# monologue
# JP: 櫂棒がまた、動き出す。\n斎藤さんは、もう僕の方を見ていない。
2867 = "Mái chèo lại tiếp tục di chuyển. Bà Saitou không còn nhìn về phía tôi nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「それは一体、どういう意味で――」
2313 = "「Rốt cuộc, ý bà là sao ạ——」"
# 【ハチロク】
# display as 八六
# JP: 「おはようございます、双鉄様。\n斎藤様もお早いのですね。おはようございます」
2157 = "「Chào buổi sáng, ngài Soutetsu. Bà Saitou cũng dậy sớm nhỉ. Chào buổi sáng ạ.」"
# 【真闇】
# display as 真闇
# JP: 「あら双ちゃん。朝からお掃除、ご苦労さんやねぇ」
1971 = "「Ây da Sou-chan. Sáng sớm đã dọn dẹp rồi, vất vả cho em quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、と――\nおはよう、真闇姉。おはよう、ハチロク」
2031 = "「A, ưm—— Chào buổi sáng, chị Mayami. Chào buổi sáng, Hachiroku.」"
# monologue
# JP: 時計を見る。出勤時間まではまだかなりあるが――\n他の蔵人たちもぽつぽつ、来始めるころだ。
2730 = "Tôi nhìn đồng hồ. Vẫn còn khá lâu mới đến giờ làm việc—— nhưng những thợ nấu rượu khác cũng bắt đầu lác đác đến rồi."
# monologue
# JP: なら、斎藤さんとの会話は、これでおしまいだろう。\n磨きかけだったタンクをきっちり磨ききらねば。
2927 = "Vậy thì, cuộc trò chuyện với bà Saitou chắc kết thúc ở đây thôi. Phải nhanh chóng đánh bóng xong cái bồn chứa đang làm dở mới được."
# monologue
# JP: （しかし……いろいろと難しい物だ）
3111 = "（Nhưng mà... cũng khó nghĩ thật.）"
# monologue
# JP: 日々姫が斎藤さんを苦手な理由は、\n無論、そのようにして蔵を追われたからだろう。
2809 = "Lý do Hibiki sợ bà Saitou, tất nhiên là vì con bé đã bị đuổi khỏi nhà xưởng theo cách như vậy."
# monologue
# JP: が、『こういう理由だったのだ』と僕が説明してしまえば、\n断ってもらった日々姫の退路を、再び開くこととなる。
2580 = "Nhưng, nếu tôi giải thích rằng 『lý do là như vậy đấy』, thì sẽ lại mở ra con đường lùi mà Hibiki đã bị cắt đứt."
# 【双鉄】
# display as 雙鐵
# JP: 「……いや、ともかくも今は掃除だ。\n気を散らすなら、汚れも曇りも拭えはせんぞ」
1632 = "「......Không, dù sao thì bây giờ cũng phải dọn dẹp đã. Nếu phân tâm thì chẳng thể lau sạch được vết bẩn hay vết mờ đục đâu.」"
# monologue
# JP: 自分に言い聞かせ気を引き締めて、\nタンクをひと通り磨ききる。
2720 = "Tôi tự nhủ với bản thân, xốc lại tinh thần, và đánh bóng xong một lượt bồn chứa."
# monologue
# JP: 続いて店の正面へ、竹箒を手に歩き始める。
2975 = "Tiếp đó, tôi cầm chổi tre đi về phía mặt tiền cửa hàng."
# monologue
# JP: （曇りを払い、汚れを落として、\nまっさらな目で、御一夜をゼロから知り直すのだ）
3116 = "（Phủi đi vết mờ đục, gột rửa vết bẩn, và dùng đôi mắt trong trẻo để tìm hiểu lại Ohimitera từ con số không.）"
# monologue
# JP: たくさんを見て、たくさんに会い、たくさんを聞く。
2622 = "Nhìn thật nhiều, gặp gỡ thật nhiều, lắng nghe thật nhiều."
# monologue
# JP: そうするうちに今の僕にはわからぬ問いの手掛かりも、\nいつかはきっと、つかめるようになる筈だ。
3039 = "Trong quá trình đó, chắc chắn một ngày nào đó, tôi sẽ nắm bắt được manh mối cho những câu hỏi mà hiện tại tôi chưa hiểu."
# 【日々姫】
# display as 日日姬
# JP: 「鏡で出来た看板、ですか？」
2358 = "「Biển hiệu làm bằng gương, sao ạ?」"
# monologue
# JP: 日々姫が目を丸くする。
2848 = "Hibiki tròn xoe mắt."
# monologue
# JP: クリーニング屋さんはそれに気づかず、\n興奮した口調で話し続ける。
2885 = "Ông chủ tiệm giặt ủi không nhận ra điều đó, vẫn tiếp tục nói với giọng điệu đầy phấn khích."
# 【クリーニング屋】
# display as 洗衣店老板
# JP: 「プレス機の工場見学ば行った時に見とうとですよ。\nこう……一面の、おっきな木の板がありましてな」
2110 = "「Lúc tôi đi tham quan nhà máy máy ép thì thấy đấy. Thế này... có một tấm ván gỗ lớn ở một mặt.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 2016 = "「嗯」" 
# 【クリーニング屋】
# display as 洗衣店老板
# JP: 「その木の板に、鏡で出来たロゴの文字とマークが、\n貼りついておるわけですよ。鏡の看板なわけとです」
2042 = "「Trên tấm ván gỗ đó, người ta dán chữ logo và ký hiệu làm bằng gương. Đó chính là biển hiệu bằng gương đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……イメージ出来てきました。木の地板に――\n鏡で出来た文字とマークが、貼り付けですね」
1995 = "「A... cháu tưởng tượng ra rồi. Trên nền ván gỗ—— dán chữ và ký hiệu làm bằng gương đúng không ạ.」"
# monologue
# JP: さささと、日々姫がスケッチブックにペンを走らす。
2877 = "Loẹt xoẹt, Hibiki đưa bút vẽ lên sổ phác thảo."
# 【クリーニング屋】
# display as 洗衣店老板
# JP: 「ああ、こがいな感じです！\nできますかいね？」
2078 = "「A, đúng kiểu này đấy! Làm được không cô?」"
# monologue
# JP: “こがいな感じ”がどがいな感じか、\n日々姫のスケッチで僕にもわかった。
1609 = "\"Kiểu này\" là kiểu nào, nhìn bản phác thảo của Hibiki thì tôi cũng đã hiểu."
# 【日々姫】
# display as 日日姬
# JP: 「シンボルマークが、直線的で単純な形なら、\n鏡のカット加工で出来る……ように思いますけど」
2066 = "「Nếu biểu tượng là hình dáng đơn giản với các đường thẳng, thì cháu nghĩ... có thể gia công cắt gương được.」"
# monologue
# JP: 日々姫の瞳が、\nすがりつくように傍らに立つ稀咲へと。
2821 = "Ánh mắt Hibiki, hướng về phía Kisaki đang đứng bên cạnh như để cầu cứu."
# monologue
# JP: 稀咲はすぐさま頷いて、部屋の奥、\nパソコンの前に座っている男へと視線を移す。
2956 = "Kisaki lập tức gật đầu, rồi chuyển ánh nhìn về phía người đàn ông đang ngồi trước máy tính ở góc phòng."
# 【稀咲】
# display as 稀咲
# JP: 「浦上？」
2213 = "「Uragami?」"
# 【浦上】
# display as 浦上
# JP: 「曲線のオーダーカットを受け付ける業者もあるようです。\nまた、樹脂ミラーというものなら加工は容易なようです」
2192 = "「Có vẻ cũng có những cơ sở nhận cắt đường cong theo yêu cầu. Ngoài ra, nếu là loại gương nhựa thì việc gia công có vẻ khá dễ dàng.」"
# 【稀咲】
# display as 稀咲
# JP: 「容易って？」
2089 = "「Dễ dàng sao?」"
# 【浦上】
# display as 浦上
# JP: 「鋏や糸鋸での曲線カットが可能だと。ですので、\n市内の職人に頼めば、容易に成形できるかと」
2348 = "「Có thể cắt đường cong bằng kéo hoặc cưa lọng. Vì vậy, nếu nhờ thợ trong thành phố thì chắc chắn sẽ dễ dàng tạo hình được.」"
# 【稀咲】
# display as 稀咲
# JP: 「お値段は？」
1918 = "「Giá cả thì sao?」"
# 【浦上】
# display as 浦上
# JP: 「価格表としては、これになりますね」
2315 = "「Bảng giá thì là cái này đây.」"
# monologue
# JP: 浦上が持ってきたプリントアウトを、\n稀咲はすぐさま、クリーニング屋さんの前に広げる。
2952 = "Kisaki ngay lập tức trải tờ giấy in mà Uragami mang đến ra trước mặt ông chủ tiệm giặt ủi."
# 【稀咲】
# display as 稀咲
# JP: 「具体的には、お見積りをいただいてになりますが、\nざっとでこの程度、鏡代として料金がアップしますね」
1934 = "「Cụ thể thì phải nhận được báo giá mới biết được, nhưng đại khái thì giá sẽ tăng lên chừng này cho tiền gương.」"
# 【クリーニング屋】
# display as 洗衣店老板
# JP: 「ああ、この位なら良かですたい。\nなら、出来るいうことで良かとですかね？」
2312 = "「A, tầm này thì được. Vậy là có thể làm được đúng không cô?」"
# monologue
# JP: 日々姫は、しかし即答しない。
2911 = "Tuy nhiên, Hibiki không trả lời ngay."
# monologue
# JP: イラストマップではなく、B4版の住宅地図を、\n広げてじっと見つめている。
2647 = "Con bé trải bản đồ khu dân cư khổ B4 ra, chứ không phải bản đồ minh họa, và nhìn chằm chằm vào đó."
# 【日々姫】
# display as 日日姬
# JP: 「ん、っと……茶玉クリーニングさんって、\n４メートル道路を挟んで、お向かい鮮魚店さんですよね」
1960 = "「Ưm... Tiệm giặt ủi Chadama, cách một con đường rộng 4 mét, đối diện là tiệm cá tươi đúng không ạ.」"
# 【クリーニング屋】
# display as 洗衣店老板
# JP: 「はい、魚留さんですたい」
2176 = "「Vâng, là tiệm Uodome đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「まわりに緑とかってどうですか？\n結構あります？」
1962 = "「Xung quanh có nhiều cây xanh không ạ? Có khá nhiều không?」"
# 【クリーニング屋】
# display as 洗衣店老板
# JP: 「いや、商店が集まってるところですけん、\n緑ば、ほとんどありません――あ」
2204 = "「Không, vì là khu tập trung nhiều cửa hàng, nên hầu như không có cây xanh——a.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい。その条件だと鏡の看板、\nあんまり綺麗に見えないかもしれませんね」
2173 = "「Vâng. Với điều kiện đó thì biển hiệu bằng gương, có thể sẽ không được đẹp cho lắm.」"
# 【クリーニング屋】
# display as 洗衣店老板
# JP: 「あ……あ～～っ」
1992 = "「A... a~~」"
# monologue
# JP: 恐らくは、自分の店の周囲を想像したのだろう。\nクリーニング屋さんの顔から興奮の色が消えていく。
2699 = "Có lẽ ông ấy đã tưởng tượng ra quang cảnh xung quanh cửa hàng của mình. Vẻ phấn khích dần biến mất khỏi khuôn mặt ông chủ tiệm giặt ủi."
# 【日々姫】
# display as 日日姬
# JP: 「ですから、ん……っと、例えばこう、\n旗竿型の看板にして、周囲より高く立てる、とか」
2131 = "「Vì vậy, ưm... ví dụ như thế này, làm biển hiệu hình cột cờ, và dựng cao hơn xung quanh chẳng hạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうすれば空が映る――か？」
2007 = "「A, làm vậy thì sẽ phản chiếu bầu trời——sao?」"
# monologue
# JP: 思わず挟んでしまった口に、\n日々姫は笑顔で答えてくれる。
2724 = "Tôi lỡ buột miệng xen vào, Hibiki mỉm cười trả lời."
# 【日々姫】
# display as 日日姬
# JP: 「試作してみないとわからないけど、\nそんな、雑然とした印象にはならないっぽいかなぁって」
1878 = "「Phải làm thử mới biết được, nhưng em nghĩ là sẽ không tạo cảm giác lộn xộn đâu.」"
# 【クリーニング屋】
# display as 洗衣店老板
# JP: 「そぎゃんですかの？　\nそんなら、あれこれ試してもらえれば」
2169 = "「Vậy sao? Nếu vậy thì cô cứ thử nhiều cách xem sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「逆に、周辺の景観を良くするという手もあるかな。\n花壇とか街路樹とか？　まわりのお店と協力しあって」
2128 = "「Ngược lại, cũng có cách là cải thiện cảnh quan xung quanh nhỉ. Bồn hoa hay cây xanh ven đường chẳng hạn? Hợp tác với các cửa hàng xung quanh.」"
# 【浦上】
# display as 浦上
# JP: 「そうした活動には、市から補助金も出る筈です」
2324 = "「Những hoạt động như vậy chắc chắn sẽ được thành phố trợ cấp.」"
# monologue
# JP: 稀咲の示した広い視点と、\n浦上のさりげないフォローと。
2957 = "Góc nhìn rộng mở mà Kisaki đưa ra, cùng sự hỗ trợ tinh tế của Uragami."
# monologue
# JP: それにも力づけられた様子で、\nクリーニング屋さんはすっかり顔色を取り戻す。
2568 = "Dường như được tiếp thêm sức mạnh từ những điều đó, ông chủ tiệm giặt ủi đã hoàn toàn lấy lại sắc mặt tươi tỉnh."
# 【クリーニング屋】
# display as 洗衣店老板
# JP: 「そいでしたら、出来るようなら鏡の看板でお願いします。\nこっちでも、やれるこたやってみますけん」
2341 = "「Nếu vậy, xin cô hãy làm biển hiệu bằng gương nếu có thể nhé. Bên tôi cũng sẽ cố gắng làm những gì có thể.」"
# 【日々姫】
# display as 日日姬
# JP: 「私は、それで大丈夫です」
2123 = "「Cháu thì không vấn đề gì ạ.」"
# monologue
# JP: 日々姫の言葉に、\n稀咲も、浦上も静かに頷く。
2987 = "Trước lời nói của Hibiki, cả Kisaki và Uragami đều lặng lẽ gật đầu."
# monologue
# JP: クリーニング屋さんがほっとした表情を浮かべると、\n日々姫は笑顔で、またスケッチブックを開いて示す。
2886 = "Khi ông chủ tiệm giặt ủi lộ vẻ nhẹ nhõm, Hibiki lại mỉm cười, mở sổ phác thảo ra đưa cho ông xem."
# 【日々姫】
# display as 日日姬
# JP: 「それなら、マークのデザイン、\n鏡にした時にも映えるように仕上げてみなきゃですよね」
2345 = "「Nếu vậy thì, thiết kế của ký hiệu, cũng phải hoàn thiện sao cho thật nổi bật khi làm bằng gương mới được.」"
# 【クリーニング屋】
# display as 洗衣店老板
# JP: 「あ、そぎゃんとですね」
2008 = "「A, đúng là vậy nhỉ.」"
# monologue
# JP: 日々姫と、クリーニング屋さんと。
2826 = "Hibiki và ông chủ tiệm giặt ủi."
# monologue
# JP: ようやく、本来の目的である、\n『看板のマークについての話し合い』に入れたようだ。
2984 = "Cuối cùng cũng đã bước vào mục đích chính, đó là 『thảo luận về ký hiệu của biển hiệu』."
# 【稀咲】
# display as 稀咲
# JP: 「どう？　コーヒー」
2271 = "「Sao? Cà phê nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまんな」
2024 = "「A, cảm ơn.」"
# monologue
# JP: 二人が話し合うテーブルから離れ、\n小声の稀咲が差し出してくれたカップを受け取る。
2710 = "Tôi rời khỏi chiếc bàn nơi hai người họ đang nói chuyện, và nhận lấy chiếc cốc mà Kisaki đưa cho với giọng nhỏ nhẹ."
# monologue
# JP: 浦上は――またパソコンの前に座って、\nテーブル上の会議の様子をさりげなく聞いているようだ。
2896 = "Uragami——lại ngồi trước máy tính, có vẻ như đang âm thầm lắng nghe cuộc họp trên bàn."
# 【稀咲】
# display as 稀咲
# JP: 「なかなかだろう？\n双鉄。キミの妹は」
2367 = "「Rất cừ đúng không? Soutetsu. Em gái cậu ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、正直に言えば見なおした」
2023 = "「Ừm, thành thật mà nói thì tôi phải nhìn em ấy bằng con mắt khác đấy.」"
# monologue
# JP: ……このクリーニング屋さんで、三人目だ。
1612 = "......Tính cả ông chủ tiệm giặt ủi này thì đây là người thứ ba rồi."
# monologue
# JP: その誰に対しても、日々姫は変わらず懇意に対応し、\nそれぞれの希望を汲んで、マークデザインを提案している。
2832 = "Dù là với ai, Hibiki vẫn luôn giữ thái độ niềm nở, lắng nghe nguyện vọng của từng người và đề xuất thiết kế ký hiệu phù hợp."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、看板の架替需要というのは、\nこんなにたくさんあるものなのだな」
2280 = "「Nhưng mà, nhu cầu thay mới biển hiệu, lại nhiều đến thế này sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「なんだ双鉄。\nキミは、何も聞かされずに引っ張られてきたのかい？」
1888 = "「Gì vậy Soutetsu. Cậu bị lôi đến đây mà không được nghe kể gì sao?」"
# monologue
# JP: さも楽しげにクスクス笑い、\nそして稀咲は、僕にも見慣れた紙を取り出す。
2964 = "Kisaki khúc khích cười có vẻ rất thích thú, rồi lấy ra một tờ giấy mà tôi cũng đã quen mắt."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜市のイラストマップか」
2316 = "「Bản đồ minh họa thành phố Ohimitera sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだ。日々姫のイラストと――\nほら、ところどころ、シンプルなマークがあるだろう？」
2206 = "「Đúng vậy. Hình minh họa của Hibiki và—— Cậu xem, rải rác đây đó có những ký hiệu đơn giản đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2016 = "「嗯」" 
# monologue
# JP: お茶屋さんなら、お茶のマーク。\n味噌蔵ならば、お味噌汁のマーク。
2993 = "Tiệm trà thì có ký hiệu trà. Nhà xưởng làm miso thì có ký hiệu súp miso."
# monologue
# JP: どこかで見たことあるような、わかりやすく、\nしかしひと味ちがうマークが、マップの上に点在している。
2617 = "Những ký hiệu trông quen quen, dễ hiểu, nhưng lại mang một nét riêng biệt, nằm rải rác trên bản đồ."
# 【稀咲】
# display as 稀咲
# JP: 「こうしたマークを、ピクトアイコンという。\nこれも全て、日々姫がデザインしたものだよ」
2323 = "「Những ký hiệu như thế này gọi là biểu tượng tượng hình. Tất cả những cái này cũng đều do Hibiki thiết kế đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2036 = "「Chà.」"
# monologue
# JP: 言われて、仔細に見てみれば、\n細かな工夫があちこちに覗き、面白い。
2989 = "Nghe vậy, tôi nhìn kỹ lại, những sự sáng tạo tỉ mỉ hiện hữu khắp nơi, thật thú vị."
# monologue
# JP: 面白い、のだが――
2940 = "Thú vị thì thú vị thật, nhưng——"
# monologue
# JP: （焼酎蔵のピクトアイコンは無いのか）
3120 = "（Không có biểu tượng tượng hình của nhà xưởng nấu shochu sao.）"
# monologue
# JP: ――その一点が、今朝の出来事のせいだろうか、\n妙に気になって仕方ない。
1594 = "——Có lẽ do chuyện sáng nay chăng, mà tôi cứ thấy bận tâm đến điểm đó một cách kỳ lạ."
# 【稀咲】
# display as 稀咲
# JP: 「ピクトアイコンは、希望した店にだけつけたのだけれど、\nこれがなかなかの好評でね」
2366 = "「Biểu tượng tượng hình chỉ được gắn cho những cửa hàng có yêu cầu thôi, nhưng lại nhận được đánh giá khá tốt đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1987 = "「Ừm.」"
# monologue
# JP: その一言に、安堵する。\nならば日々姫がクマ焼酎を嫌ったというわけではなく――
2655 = "Câu nói đó khiến tôi yên tâm. Vậy là không phải Hibiki ghét shochu Kuma——"
# monologue
# JP: ああ、しかし。それならばそれで、\n右田一酒造元が希望を出さなかったということになるのか。
2516 = "A, nhưng mà. Nếu vậy thì, chẳng phải là do nhà nấu rượu Migita System đã không yêu cầu sao."
# 【稀咲】
# display as 稀咲
# JP: 「来年版のマップには、うちもという希望が殺到したんだ。\nそこで、相乗効果を生めないものかと考えてね」
2159 = "「Trên bản đồ năm sau, rất nhiều nơi yêu cầu được thêm vào. Thế nên tôi mới nghĩ xem có thể tạo ra hiệu ứng cộng hưởng hay không.」"
# monologue
# JP: 相乗効果。
2560 = "Hiệu ứng cộng hưởng."
# monologue
# JP: 真闇姉が教えてくれたことをやはり稀咲も、\n当然のように口にする。
2953 = "Quả nhiên Kisaki cũng nói ra những điều chị Mayami đã dạy tôi một cách vô cùng tự nhiên."
# 【稀咲】
# display as 稀咲
# JP: 「『御一夜市看板もよしプロジェクト』というのを考えた。\nピクトアイコンを、マップと看板両方に載せるんだ」
2105 = "「Tôi đã nghĩ ra 『Dự án biển hiệu thành phố Ohimitera cũng phải đẹp』. Đưa biểu tượng tượng hình lên cả bản đồ lẫn biển hiệu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お――ぉ」
1982 = "「Ồ——ồ.」"
# monologue
# JP: 感心のあまり妙に詰まった声になる。\nしかし……それは、それは実に、優れた案だ。
2718 = "Quá đỗi thán phục khiến giọng tôi nghe hơi nghẹn lại. Nhưng... đó, đó thực sự là một ý tưởng tuyệt vời."
# 【双鉄】
# display as 雙鐵
# JP: 「そうすれば、例えば外国人観光客なども、\nピクトアイコンを頼りに、より容易に町を歩けるな」
2188 = "「Làm vậy thì, ví dụ như khách du lịch nước ngoài, cũng có thể dựa vào biểu tượng tượng hình để dạo quanh thành phố dễ dàng hơn.」"
# 【稀咲】
# display as 稀咲
# JP: 「地図のアナウンス効果も、商店の宣伝効果も上がる。\n加えてキミの言った通り、看板の架替需要も生まれる」
2046 = "「Hiệu quả thông báo của bản đồ và hiệu quả quảng cáo của cửa hàng đều tăng lên. Thêm vào đó, đúng như cậu nói, nhu cầu thay mới biển hiệu cũng sẽ xuất hiện.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさしく――御一夜市、看板も良し、だな」
2329 = "「Quả đúng là——thành phố Ohimitera, biển hiệu cũng phải đẹp, nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「あはは、双鉄。おっさんくさいよ？」
1964 = "「Ahaha, Soutetsu. Nghe sặc mùi ông chú đấy nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1987 = "「唔」" 
# monologue
# JP: それを言うなら、プロジェクト名が婆くさい。
3010 = "Nói thế thì, tên dự án nghe sặc mùi bà thím."
# monologue
# JP: が――このバカバカしいほどに単純な名は、\nそれだけに一度聞いたら忘れがたくある。
2513 = "Nhưng——cái tên đơn giản đến mức ngớ ngẩn này, chính vì thế mà nghe một lần là khó có thể quên được."
# 【稀咲】
# display as 稀咲
# JP: 「日々姫あってのプロジェクトだ。\n出会えたことに、心から感謝しているよ」
2190 = "「Đây là dự án có được nhờ Hibiki. Tôi thực sự biết ơn vì đã gặp được em ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それなら――[あに,1]義兄としてありがたい」
1906 = "「Vậy thì——với tư cách là anh trai nuôi, tôi rất biết ơn.」"
# monologue
# JP: わかってしまう。\n日々姫が稀咲に傾倒した理由を、強く。
2726 = "Tôi đã hiểu ra. Lý do Hibiki lại ngưỡng mộ Kisaki đến vậy, rất rõ ràng."
# monologue
# JP: 蔵を追われた日々姫に居場所を示してくれた。\nいや――単なる場所に留まらぬ、活躍の場を。
2853 = "Cô ấy đã chỉ cho Hibiki, người bị đuổi khỏi nhà xưởng, một chốn dung thân. Không——không chỉ là một nơi chốn đơn thuần, mà là một nơi để tỏa sáng."
# monologue
# JP: （まして……稀咲は本当に、御一夜の発展を考えている）
3122 = "（Hơn nữa... Kisaki thực sự đang nghĩ đến sự phát triển của Ohimitera.）"
# monologue
# JP: 観光振興と、\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の誘致と。\nその両立が可能と信じ、行動している。
2659 = "Thúc đẩy du lịch, và thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;. Cô ấy tin rằng có thể làm được cả hai, và đang hành động vì điều đó."
# monologue
# JP: “水汚染”への稀咲の評価が正しいものなら、\n稀咲の行動こそが最善の道であると、僕さえ思う。
2666 = "Nếu đánh giá của Kisaki về \"ô nhiễm nguồn nước\" là chính xác, thì ngay cả tôi cũng nghĩ hành động của cô ấy chính là con đường tốt nhất."
# monologue
# JP: （が――）
3112 = "（Nhưng——）"
# monologue
# JP: 稀咲は若い。経験にもおのずと限りがあるだろう。\n評判というものの恐ろしさを、恐らくは理解していない。
2962 = "Kisaki còn trẻ. Kinh nghiệm tự nhiên cũng có hạn. Có lẽ cô ấy chưa hiểu được sự đáng sợ của cái gọi là danh tiếng."
# monologue
# JP: 泥水一滴、タンクの中へと落とされ、知られてしまうなら、\n酒蔵全てが、『泥水焼酎』の汚名を雪げなくなるのだ。
2576 = "Chỉ một giọt nước bùn rơi vào bồn chứa mà bị phát hiện, thì toàn bộ nhà xưởng sẽ không thể rửa sạch tiếng nhơ 『Shochu nước bùn』."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄？　コーヒー冷めるよ？」
2368 = "「Soutetsu? Cà phê nguội rồi kìa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「む。すまん」
1986 = "「Hừm. Xin lỗi.」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、おまたせしてしまいました」
1980 = "「Anh trai, để anh phải đợi rồi.」"
# monologue
# JP: いつの間に打ち合わせが終わったようだ。
2830 = "Cuộc họp có vẻ đã kết thúc từ lúc nào."
# monologue
# JP: 日々姫は疲れた、しかし清々しい顔をして、\nスケッチブックを小脇に僕の方へと近寄ってくる。
2662 = "Hibiki mang vẻ mặt mệt mỏi nhưng sảng khoái, kẹp cuốn sổ phác thảo dưới nách đi về phía tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、全く待ったとは感じなかった。\nお前の仕事ぶり、非常に興味深く見せてもらった」
2203 = "「Không, anh không hề thấy đợi chờ gì đâu. Phong cách làm việc của em, anh đã được chiêm ngưỡng với sự thích thú tột độ đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「そ、そそそ、そうですか？」
2311 = "「V, v-v-v-vậy sao ạ?」"
# monologue
# JP: 慌てた声で、取り澄ます。\n僕の背後で稀咲がくすり、小さな小さな笑いを零す。
2843 = "Con bé cố tỏ ra điềm tĩnh với giọng điệu hoảng hốt. Phía sau tôi, Kisaki khẽ bật cười khúc khích."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そうだった。その上、勉強にもなった。\nなるほどこれは、“御一夜をより知る”助けになるな」
2165 = "「Ừm. Là vậy đấy. Hơn nữa, anh cũng học hỏi được nhiều điều. Ra là vậy, chuyện này sẽ giúp ích cho việc \"hiểu thêm về Ohimitera\" đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら、よかったです」
2340 = "「Vậy thì tốt quá rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「さてと、今日のお仕事はこれで終わりだね。\nおつかれ、日々姫。これからどうする？」
2266 = "「Thế là công việc hôm nay kết thúc ở đây nhỉ. Vất vả cho em rồi, Hibiki. Giờ em định làm gì?」"
# monologue
# JP: 稀咲の声に、日々姫はぱっと顔を向ける。
2851 = "Nghe giọng Kisaki, Hibiki lập tức ngoảnh mặt lại."
# 【日々姫】
# display as 日日姬
# JP: 「稀咲センパイも、浦上さんもお疲れ様です。\n今日も私、たくさん助けてもらっちゃいました」
2252 = "「Chị Kisaki, anh Uragami cũng vất vả rồi ạ. Hôm nay em cũng được hai người giúp đỡ rất nhiều.」"
# 【稀咲】
# display as 稀咲
# JP: 「もちつもたれつさ。\nボクらは利益共同体だから」
2106 = "「Có qua có lại thôi mà. Chúng ta là cộng đồng chung lợi ích mà lị.」"
# 【日々姫】
# display as 日日姬
# JP: 「あはっ」
1967 = "「Aha.」"
# monologue
# JP: 少しふざけた物言いに、日々姫の笑顔がいっそう輝く。
2959 = "Cách nói đùa cợt đó khiến nụ cười của Hibiki càng thêm rạng rỡ."
# monologue
# JP: 浦上は、ほんのすこしだけ会釈を返し、\nすぐにすました顔をして、パソコンに顔を向け直す。
2898 = "Uragami chỉ khẽ cúi đầu đáp lễ, rồi lập tức giữ vẻ mặt nghiêm nghị, quay lại nhìn màn hình máy tính."
# 【稀咲】
# display as 稀咲
# JP: 「疲れてないなら、\n食事でもしながらもう少し打ち合わせるかい？」
1901 = "「Nếu chưa mệt, thì vừa ăn vừa bàn bạc thêm chút nữa nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「疲れは、特にないんですけど」
2253 = "「Mệt thì em cũng không mệt lắm.」"
# monologue
# JP: ん、と少しだけ考えて。
2849 = "Ưm, con bé hơi ngẫm nghĩ một chút."
# monologue
# JP: それから日々姫は僕を見て、\n稀咲に向かい、ぺこりと、深めに頭を下げる。
2910 = "Sau đó Hibiki nhìn tôi, quay sang Kisaki, và cúi gập đầu thật sâu."
# 【日々姫】
# display as 日日姬
# JP: 「今日は、このまま帰ります。\n兄さんと一緒ですし」
1890 = "「Hôm nay em sẽ về luôn ạ. Vì em đang đi cùng anh trai nữa.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうか。なら、また。\n双鉄？　責任持って日々姫を送ってあげてくれよ？」
2318 = "「Vậy à. Vậy hẹn gặp lại. Soutetsu? Cậu nhớ có trách nhiệm đưa Hibiki về tận nhà đấy nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。大事な[いもうと,1]義妹であるし、\n僕の帰り道も同じだからな」
2325 = "「Tất nhiên rồi. Là cô em gái nuôi quan trọng của tôi mà, với lại đường về của tôi cũng là đường đó.」"
# 【稀咲】
# display as 稀咲
# JP: 「あははっ、なら安心だね。\nそれじゃ、銀行の外まで送るよ」
2000 = "「Ahaha, vậy thì yên tâm rồi. Thế thì tôi tiễn hai người ra ngoài ngân hàng nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「ありがと、センパイ。\n浦上さんもさようなら」
2284 = "「Cảm ơn chị. Chào anh Uragami ạ.」"
# 【浦上】
# display as 浦上
# JP: 「はい、さようなら。\nお気をつけて、日々姫さん、双鉄さん」
1937 = "「Vâng, tạm biệt. Đi đường cẩn thận nhé, cô Hibiki, anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お疲れ様です、さようなら」
2095 = "「Cảm ơn anh, tạm biệt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、もうできている看板もあるのだな」
2034 = "「Ồ, cũng có những biển hiệu đã làm xong rồi nhỉ.」"
# monologue
# JP: わざわざ遠回りした甲斐があった。
2915 = "Bõ công cất công đi đường vòng."
# monologue
# JP: そう注意して探してみれば、\n日々姫のピクトアイコンを、看板の上に見つけ出せる。
2573 = "Chú ý tìm kiếm như vậy, tôi có thể tìm thấy biểu tượng tượng hình của Hibiki trên các biển hiệu."
# 【日々姫】
# display as 日日姬
# JP: 「蒲田醸造所さんは、\nねぇねぇとも古い付き合いの味噌蔵さんやけん」
2259 = "「Xưởng ủ tương Kamata là xưởng miso có quan hệ lâu năm với chị hai mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「付き合いだけで、頼むようなものではなかろう。\n文字通り、店の看板だぞ？」
1928 = "「Đâu phải chỉ vì quan hệ mà người ta nhờ vả đâu. Đúng nghĩa đen là biển hiệu của cửa hàng đấy nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「……ん……」
1637 = "「......Ưm......」"
# monologue
# JP: そのとおりだと、内心思ってくれたのだろう。
2631 = "Chắc trong thâm tâm con bé cũng nghĩ vậy."
# monologue
# JP: 返事の代わりに頬を赤くし、日々姫は下を向いてしまう。\nだが――ああ、そうか。
2878 = "Thay cho câu trả lời, hai má Hibiki ửng đỏ, con bé cúi gằm mặt xuống. Nhưng——a, ra là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「まさしく、看板だものな」
2314 = "「Đúng là biển hiệu mà nhỉ.」"
# monologue
# JP: 御一夜は、戦争で焼けた部分も少ない、古い町だ。\n無論改築もあるのだろう。
2684 = "Ohimitera là một thành phố cổ, ít bị tàn phá bởi chiến tranh. Tất nhiên cũng có những nơi được xây dựng lại."
# monologue
# JP: 町の様相も変わりつつあるようだが、\n商店などは、昔ながらの佇まいのものも少なくない。
2553 = "Diện mạo thành phố có vẻ đang dần thay đổi, nhưng những cửa hàng mang dáng dấp từ ngày xưa cũng không hề ít."
# 【双鉄】
# display as 雙鐵
# JP: 「架け替えるというのは、\nなかなかに大変なことだろう」
2186 = "「Việc thay mới biển hiệu, chắc cũng khó khăn lắm nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、私もそう思うと――じゃなくって！\nはい兄さん、私も、同じように思います」
2020 = "「Vâng, em cũng nghĩ thế——à không phải! Vâng anh trai, em cũng nghĩ như vậy.」"
# monologue
# JP: 不意に感じる。
2725 = "Tôi chợt nhận ra."
# monologue
# JP: あるいは日々姫の標準語は、照れを隠すため一枚挟む、\nフィルターのようなものかもしれんと。
2861 = "Hoặc có lẽ tiếng phổ thông của Hibiki, như một lớp bộ lọc để che giấu sự ngượng ngùng."
# 【日々姫】
# display as 日日姬
# JP: 「せっかくのお話でも、『この看板を変えるだなんて』\nっていうのも、やっぱりありますから」
1919 = "「Dù là cơ hội hiếm có, nhưng vẫn có những ý kiến kiểu như 『Làm sao có thể thay đổi biển hiệu này được』 mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2036 = "「嚯」" 
# monologue
# JP: 年月だけしか扱い得ない、“古色”という色。
2605 = "Màu \"cổ kính\", thứ màu sắc chỉ có năm tháng mới tạo ra được."
# monologue
# JP: それを捨てるのは勿体ないと、\n説得することも少なく無い――
2517 = "Bỏ đi thì tiếc lắm, con bé cũng không ít lần phải thuyết phục như vậy——"
# monologue
# JP: 日々姫は語り、ふっと長めの息をつく。
2854 = "Hibiki kể, rồi khẽ thở dài."
# 【日々姫】
# display as 日日姬
# JP: 「そのお店の歴史そのものだったりしますから、看板は。\n清掃だけで見違えたりすることもありますし」
2136 = "「Vì biển hiệu chính là lịch sử của cửa hàng đó mà. Có khi chỉ cần dọn dẹp thôi là đã thấy khác hẳn rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1943 = "「Ra là vậy.」"
# monologue
# JP: 日々姫らしいと強く感じる。
3040 = "Tôi cảm thấy điều đó rất giống phong cách của Hibiki."
# monologue
# JP: 同時に、そうした日々姫を許す稀咲の度量も感じる。
2596 = "Đồng thời, tôi cũng cảm nhận được sự bao dung của Kisaki khi cho phép Hibiki làm như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、それでは\n『看板も良し』プロジェクトはすすまんな」
1885 = "「Nhưng mà, như vậy thì dự án 『Biển hiệu cũng phải đẹp』 sẽ không tiến triển được đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「まさか、兄さん。\nそういうときこそ、デザインの出番じゃないですか」
1880 = "「Đâu có, anh trai. Những lúc như thế mới là lúc thiết kế phát huy tác dụng chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2027 = "「Hửm?」"
# 【日々姫】
# display as 日日姬
# JP: 「調和するよう、ピクトアイコンを考えるんです。\n看板だけが、そのお店の全てなわけじゃないんですから」
2040 = "「Phải nghĩ ra biểu tượng tượng hình sao cho thật hài hòa. Vì biển hiệu đâu phải là tất cả của cửa hàng đó đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2032 = "「Ồ.」"
# monologue
# JP: 例えば、店頭、ショーウィンドーのガラスの上に、\nピクトアイコンをシール状にして貼り付ける。
2870 = "Ví dụ như, in biểu tượng tượng hình thành dạng decal và dán lên kính của tủ trưng bày trước cửa hàng."
# monologue
# JP: 例えば店前にたてたのぼりに、\n看板文字の店名と、ピクトアイコンを共存させる。
2869 = "Ví dụ như trên cờ phướn dựng trước cửa hàng, cho tên cửa hàng và biểu tượng tượng hình cùng xuất hiện."
# 【日々姫】
# display as 日日姬
# JP: 「平面だけじゃなく、ほら」
1879 = "「Không chỉ trên mặt phẳng đâu, anh xem kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おおお！」
2033 = "「Ồ ồ!」"
# monologue
# JP: 陶器屋さんの店先、大きなツボにドン、っと、\nピクトアイコンが染め付けられている。
2614 = "Trước cửa tiệm gốm sứ, một biểu tượng tượng hình được vẽ chễm chệ trên chiếc bình lớn."
# 【日々姫】
# display as 日日姬
# JP: 「ちょっと見つけづらいのも、\n宝探しみたいで楽しいかな？　って」
1914 = "「Hơi khó tìm một chút, nhưng giống như đi tìm kho báu vậy, chắc sẽ vui lắm nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいな、これは非常にいい」
2021 = "「Tuyệt thật, cái này vô cùng tuyệt vời.」"
# monologue
# JP: 立体物は、ただそれだけで迫力がある。\n思えば、思考がするりとつながる。
2969 = "Chỉ riêng vật thể ba chiều thôi cũng đã có sức hút rồi. Nghĩ vậy, dòng suy nghĩ của tôi bỗng trơn tru hẳn."
# 【双鉄】
# display as 雙鐵
# JP: 「例えば、蓑笠鍛冶店さんから依頼をいただけたら」
2199 = "「Ví dụ như, nếu nhận được yêu cầu từ lò rèn Minokasa thì sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ！　いいですね、それ！\nピクトアイコン、鉄のかたまりで作って欲しい！」
2004 = "「A! Ý hay đấy ạ! Em muốn họ làm biểu tượng tượng hình bằng một khối sắt!」"
# monologue
# JP: 言ってすぐ、日々姫はスケッチブックをひろげ、\nその端にこしょこしょなにやら記す。
2558 = "Nói xong, Hibiki liền mở sổ phác thảo ra, và cặm cụi ghi chép gì đó vào mép giấy."
# monologue
# JP: なるほど、メモ帳代わりにもしているのか。\n道理で、僕が持とうというのを照れて、断る筈だ。
2563 = "Ra là vậy, con bé dùng nó thay cho sổ tay luôn sao. Hèn chi lúc tôi định cầm giúp, con bé lại ngượng ngùng từ chối."
# 【双鉄】
# display as 雙鐵
# JP: 「……大人になったのだな、日々姫は」
1641 = "「......Hibiki, em đã trưởng thành rồi nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふえっ！！？」
1974 = "「Hể!!?」"
# monologue
# JP: スケッチブックをパタンと閉じて、\n日々姫はあわあわ、首を振る。
2638 = "Đóng sập cuốn sổ phác thảo lại, Hibiki luống cuống lắc đầu."
# 【日々姫】
# display as 日日姬
# JP: 「そんなん、全然！\n私なんか、まだまだ子供、小娘たいっ！」
1875 = "「Làm gì có chuyện đó! Em vẫn còn là trẻ con, là một cô nhóc thôi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなことはあるまい。\nプロの仕事を、きちんとしている」
2205 = "「Làm gì có chuyện đó. Em đang làm công việc của một chuyên gia rất đàng hoàng mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「……ぅ……ぁっ……」
1636 = "「......Ư......a......」"
# 【双鉄】
# display as 雙鐵
# JP: 「お互いに良い出会いであったのだな。\n日々姫と、そして稀咲とは」
2233 = "「Hai người đã có một cuộc gặp gỡ tốt đẹp nhỉ. Giữa Hibiki và Kisaki ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
2017 = "「Vâng!」"
# monologue
# JP: 思いっきりに強く頷き。
2839 = "Con bé gật đầu thật mạnh."
# monologue
# JP: けれど日々姫が持ち上げた顔の眉根は、寄っている。
2578 = "Nhưng khi Hibiki ngẩng mặt lên, đôi lông mày lại nhíu chặt."
# 【双鉄】
# display as 雙鐵
# JP: 「む？　どうした」
2029 = "「Hửm? Sao vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「や――ううんっ――いえ、あの――」
1957 = "「Không——ưm——dạ, cái đó——」"
# monologue
# JP: 深呼吸。\nそして日々姫は、僕へと顔を寄せてくる。
2813 = "Hít một hơi thật sâu. Rồi Hibiki kề mặt sát lại gần tôi."
# 【日々姫】
# display as 日日姬
# JP: 「兄さんと稀咲センパイ、どうして、その――\nお互い……呼び捨て、とか――してるんですか？」
1979 = "「Anh trai và chị Kisaki, tại sao, ừm—— lại... gọi trống không tên nhau vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そのことだったら単純な理由だ。\n僕と稀咲は、古くからの知り合いだったのだ」
2179 = "「À. Nếu là chuyện đó thì lý do đơn giản lắm. Anh và Kisaki là người quen từ xưa rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 1975 = "「哎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんに連れられ、会ったことがあるらしいぞ？\n幼少期の稀咲に、引き取られたばかりの僕が」
2108 = "「Nghe nói hồi nhỏ anh được ông Taito dẫn đi gặp cô ấy đấy? Anh vừa mới được nhận nuôi, còn Kisaki thì vẫn là một đứa trẻ.」"
# monologue
# JP: もっとも、僕は全く記憶をしておらんのだが。
2571 = "Tuy nhiên, tôi thì chẳng có chút ký ức nào cả."
# monologue
# JP: そう言い添えれば、日々姫は長い息を吐き、\nけれどもヒュっ、と、その息を吸う。
2990 = "Khi tôi nói thêm như vậy, Hibiki thở hắt ra một hơi dài, nhưng rồi lại hít ngược vào một cái \"hức\"."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――兄さんが覚えてないなら、\nどうして、そのことが？」
2145 = "「Anh hai——nếu anh trai không nhớ, thì sao anh lại biết chuyện đó?」"
# 【双鉄】
# display as 雙鐵
# JP: 「宝生元忠氏を知っているか？」
1904 = "「Em biết ông Houshou Mototada không?」"
# 【日々姫】
# display as 日日姬
# JP: 「もちろん。稀咲センパイのお父さんやけん」
2227 = "「Tất nhiên là có. Là bố của chị Kisaki mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「元忠氏が聞かせてくれたのだ。\n稀咲も、言われて思い出したようだな」
2160 = "「Ông Mototada đã kể cho anh nghe đấy. Kisaki hình như cũng nhờ được nhắc nên mới nhớ ra.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　じゃあ――やったら――だったら」
1976 = "「Hả? Vậy thì——nếu thế——nếu vậy thì.」"
# monologue
# JP: 人差し指と、人差し指。
3087 = "Ngón trỏ, và ngón trỏ."
# monologue
# JP: 右手と左手、すっくと立てて、\n指と指とを、日々姫はくっつけ、また離す。
2856 = "Tay phải và tay trái, dựng đứng lên, Hibiki cho hai ngón tay chạm vào nhau, rồi lại tách ra."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃと稀咲センパイ――保護者同士が……\nその――小さか頃に引き合わせたと？」
2362 = "「Anh hai và chị Kisaki——hai người giám hộ của hai người... cái đó——đã cho hai người làm quen với nhau từ khi còn nhỏ sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「らしいな。何度か会っているとのことなのだが、\n僕は完全に失念していた」
2062 = "「Có vẻ là vậy. Nghe nói đã gặp nhau vài lần, nhưng tôi hoàn toàn không nhớ gì cả.」"
# 【日々姫】
# display as 日日姬
# JP: 「あわわわわわわ」
1998 = "「A oa oa oa oa oa」"
# monologue
# JP: 何か……僕は……\nとんでもないことを言ったのだろうか？
3080 = "Lẽ nào... mình... đã nói điều gì kinh khủng lắm sao?」"
# monologue
# JP: フグにあたりでもしたかのように、\n日々姫の目は天を向き、その全身は震えている。
2834 = "Hibiki giống như bị ngộ độc cá nóc, mắt trợn ngược lên trời, toàn thân run rẩy."
# 【双鉄】
# display as 雙鐵
# JP: 「おい、日々姫、どうかしたか？」
2010 = "「Này, Hibiki, em sao vậy?」"
# 【日々姫】
# display as 日日姬
# JP: 「近づけたら、これ以上近づけたら危険やけん。\nセンパイが絶対来ないとこ――そうっ！」
1936 = "「Đến gần, đến gần nữa thì nguy hiểm lắm. Phải ở chỗ mà chị ấy tuyệt đối không đến——đúng rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2374 = "「！」" 
# monologue
# JP: ぐりんと、日々姫が僕を向く。
2806 = "Hibiki run rẩy, quay mặt về phía tôi."
# monologue
# JP: その目が、いささか――\nなんといおうか……据わってる。
2653 = "Ánh mắt đó, hơi—— nói sao nhỉ... có chút đờ đẫn."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、御一夜の復興は、\nハチロクの復活あってのことばい」
2364 = "「Anh hai, để phục hưng Ohimitera, sự hồi sinh của Hachiroku là không thể thiếu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それはもちろんだ」
2015 = "「Ừm. Đó là đương nhiên.」"
# monologue
# JP: ハチロク復活のため、\nあれほど多くの人が力を、気持ちをくれた。
2907 = "Để Hachiroku hồi sinh, đã có rất nhiều người góp công góp sức."
# monologue
# JP: それを活かさず腐らせたのなら、\n御一夜の復興をむしろ、遠ざけてしまうだろう。
2663 = "Nếu lãng phí những nỗ lực đó, thì việc phục hưng Ohimitera sẽ càng xa vời hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「改修の方も、あれから、進んでるんですよね？」
1910 = "「Việc sửa chữa, từ đó đến nay vẫn đang tiến triển tốt chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、順調と聞いている」
2022 = "「Ừ, nghe nói là rất thuận lợi.」"
# monologue
# JP: 試験走行で炙りだされた、いくつもの問題点。
3004 = "Những vấn đề được phát hiện trong quá trình chạy thử."
# monologue
# JP: その全てを潰し切るため、\nたくさんの手が、今も動いてくれている。
2905 = "Để giải quyết triệt để tất cả, hiều người vẫn đang làm việc không ngừng nghỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら、御一夜をよりよく知ることだけじゃ足りません。\n\\x%l8620;#00ffc040;8620%l;#;復活のためにも、もっとたくさん、努力しないと」
2320 = "「Nếu vậy, chỉ hiểu biết sâu sắc về Ohimitera thôi là chưa đủ. Để \\x%l8620;#00ffc040;8620%l;#; hồi sinh, chúng ta phải nỗ lực nhiều hơn nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、日々姫の言うとおりだ」
2166 = "「Đúng vậy, em nói không sai.」"
# monologue
# JP: 日々姫の充実ぶりを見ていると、\nどうにも言い出しづらかった。
2930 = "Nhìn thấy vẻ mặt tràn đầy quyết tâm của Hibiki, tôi thực sự rất khó mở lời."
# monologue
# JP: が、自分の方から言ってくれるなら、\n何の遠慮をすることもない。
2537 = "Nhưng nếu em ấy tự mình nói ra, thì không cần phải e ngại gì nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「では、その方面でも僕らにできることを尽くそう。\nまず、日々姫には\\x%l機関助士;#00ffc040;機関助士%l;#;としての基礎をつんでもらう」
2349 = "「Vậy thì, chúng ta hãy cố gắng hết sức trong khả năng của mình. Trước tiên, anh muốn Hibiki nắm vững kiến thức cơ bản của một \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん」
2064 = "「Vâng, thưa anh.」"
# monologue
# JP: 日々姫の瞳が燃えている。\nやる気に満ち満ち、輝いている。
2846 = "Ánh mắt Hibiki rực cháy. Tràn đầy nhiệt huyết, tỏa sáng rạng rỡ."
# 【日々姫】
# display as 日日姬
# JP: 「一生懸命覚えます。\nあの……ええと……」
2121 = "「Em sẽ cố gắng học thật chăm chỉ. À... ừm...」"
# monologue
# JP: もじっと、体が小さく動く。
2641 = "Em ấy vặn vẹo cơ thể, ngượng ngùng."
# monologue
# JP: 気合が入りすぎてるのだろうか、\n顔も赤らみ、呼吸までいささか速いようだ。
2505 = "Không biết có phải do quá hào hứng hay không, mà mặt em ấy ửng đỏ, nhịp thở cũng có vẻ nhanh hơn."
# 【日々姫】
# display as 日日姬
# JP: 「だから……兄さん、私に――あのっ、そのっ――\n手とり足取り、教えて、ください」
2130 = "「Vì vậy... anh trai, xin hãy——à, ừm—— chỉ bảo em tận tình nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「細かなことは、僕には無理だ。\nそれはハチロクに習うがよかろう」
2101 = "「Những chi tiết nhỏ nhặt thì anh chịu thôi. Cái đó em học từ Hachiroku thì tốt hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 1975 = "「哎？」" 
# monologue
# JP: 僕とて、どう甘く見ても\\x%l機関士;#00ffc040;機関士%l;#;の見習いの卵レベルだ。\n指導などとはおこがましい。
2713 = "Bản thân tôi, dù nhìn thế nào cũng chỉ là một \\x%l機関士;#00ffc040;người lái tàu%l;#; tập sự. Chỉ bảo người khác thì quá tự cao rồi."
# monologue
# JP: 当然のことを言っているのに、\nしかし日々姫は、なんとも落胆した顔をする。
2735 = "Mặc dù tôi đang nói một sự thật hiển nhiên, nhưng Hibiki lại lộ vẻ mặt vô cùng thất vọng."
# 【双鉄】
# display as 雙鐵
# JP: 「なに、そう落ち込むな。\n今の僕にも、指導してやれることが一つだけある」
1968 = "「Gì chứ, đừng chán nản thế. Hiện tại anh cũng có một thứ có thể hướng dẫn em đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうなんですか！？　\nでしたらそれを、じっくりたっぷり！」
2236 = "「Thật sao ạ!? Vậy xin anh hãy chỉ bảo cặn kẽ cho em!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、素晴らしいやる気だな」
2038 = "「Hô, tinh thần tuyệt vời lắm.」"
# monologue
# JP: 初心者相手だ。\n１００キロからと思っていたが――
2645 = "Đối với người mới bắt đầu. Tôi định bắt đầu từ 100kg——"
# monologue
# JP: 日々姫はこう見えて文武両道、\n４００キロからの\\x%l投炭;#00ffc040;投炭%l;#;も、まぁまぁ耐えられるかもしれん。
2512 = "Nhìn Hibiki văn võ song toàn thế này, có lẽ \\x%l投炭;#00ffc040;xúc than%l;#; từ 400kg cũng chịu đựng được."
# 【双鉄】
# display as 雙鐵
# JP: 「ならばいくぞ。目指すは御一夜温泉駅だ」
2346 = "「Vậy thì bắt đầu thôi. Mục tiêu là ga Suối nước nóng Ohimitera.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん！　どこまでだってついていきます！！」
2181 = "「Vâng, thưa anh! Dù đi đâu em cũng sẽ theo anh!!」"
