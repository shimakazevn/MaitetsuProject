2558 = "剛說完，日日姬打開素描簿，在邊緣處偷偷記了些什麼。" 

# monologue
# JP: なるほど、メモ帳代わりにもしているのか。\n道理で、僕が持とうというのを照れて、断る筈だ。
2563 = "原來如此，她還把它當做記事本來用啊。怪不得我一說要幫她拿，她就不好意思地拒絕了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……大人になったのだな、日々姫は」
1641 = "「……日日姬，你長大了啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「ふえっ！！？」
1974 = "「哎！！？」" 

# monologue
# JP: スケッチブックをパタンと閉じて、\n日々姫はあわあわ、首を振る。
2638 = "她啪地一聲合起素描簿，慌張地搖頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「そんなん、全然！\n私なんか、まだまだ子供、小娘たいっ！」
1875 = "「不不！我還是小孩子，離大人差得還遠咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことはあるまい。\nプロの仕事を、きちんとしている」
2205 = "「沒這回事。你已經做得很專業了」" 

# 【日々姫】
# display as 日日姬
# JP: 「……ぅ……ぁっ……」
1636 = "「……嗚……啊……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お互いに良い出会いであったのだな。\n日々姫と、そして稀咲とは」
2233 = "「看來對你和稀咲而言，這都是一個好的邂逅」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
2017 = "「嗯！」" 

# monologue
# JP: 思いっきりに強く頷き。
2839 = "日日姬毫不猶豫地重重點頭。" 

# monologue
# JP: けれど日々姫が持ち上げた顔の眉根は、寄っている。
2578 = "可是她卻皺著眉。" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？　どうした」
2029 = "「嗯？怎麼了」" 

# 【日々姫】
# display as 日日姬
# JP: 「や――ううんっ――いえ、あの――」
1957 = "「呃——沒什麼——不，那個——」" 

# monologue
# JP: 深呼吸。\nそして日々姫は、僕へと顔を寄せてくる。
2813 = "日日姬做了個深呼吸，然後把臉靠過來。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さんと稀咲センパイ、どうして、その――\nお互い……呼び捨て、とか――してるんですか？」
1979 = "「哥哥和稀咲學姐，那個——為什麼彼此……直呼對方的名字？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そのことだったら単純な理由だ。\n僕と稀咲は、古くからの知り合いだったのだ」
2179 = "「是這個啊。原因很簡單，我和稀咲很久以前就認識了」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 1975 = "「哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんに連れられ、会ったことがあるらしいぞ？\n幼少期の稀咲に、引き取られたばかりの僕が」
2108 = "「我剛被領養的時候，好像汰斗老爺帶我見過年幼的她」" 

# monologue
# JP: もっとも、僕は全く記憶をしておらんのだが。
2571 = "只是我完全不記得了。" 

# monologue
# JP: そう言い添えれば、日々姫は長い息を吐き、\nけれどもヒュっ、と、その息を吸う。
2990 = "聽我說完，日日姬吐了一口長氣，接著又吸了一口氣。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに――兄さんが覚えてないなら、\nどうして、そのことが？」
2145 = "「既然阿哥——哥哥你不記得的話，又是怎麼知道這件事的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「宝生元忠氏を知っているか？」
1904 = "「你知道寶生元忠先生嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「もちろん。稀咲センパイのお父さんやけん」
2227 = "「當然，他是稀咲學姐的父親吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「元忠氏が聞かせてくれたのだ。\n稀咲も、言われて思い出したようだな」
2160 = "「是元忠先生告訴我的。稀咲好像也是聽過之後才想起來了」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　じゃあ――やったら――だったら」
1976 = "「哎？那——那什麼——這麼說的話」" 

# monologue
# JP: 人差し指と、人差し指。
3087 = "食指與食指。" 

# monologue
# JP: 右手と左手、すっくと立てて、\n指と指とを、日々姫はくっつけ、また離す。
2856 = "日日姬豎起右手和左手，手指之間碰了又離離了又碰。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃと稀咲センパイ――保護者同士が……\nその――小さか頃に引き合わせたと？」
2362 = "「阿哥和稀咲學姐——你們倆的監護人……那個——讓你們在小時候就互相認識了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「らしいな。何度か会っているとのことなのだが、\n僕は完全に失念していた」
2062 = "「好像是的。似乎是見過幾次面，不過我完全沒印象了」" 

# 【日々姫】
# display as 日日姬
# JP: 「あわわわわわわ」
1998 = "「啊哇哇哇哇哇哇」" 

# monologue
# JP: 何か……僕は……\nとんでもないことを言ったのだろうか？
3080 = "難道……我……說了什麼驚人的話嗎？" 

# monologue
# JP: フグにあたりでもしたかのように、\n日々姫の目は天を向き、その全身は震えている。
2834 = "日日姬就像是河豚中毒了一樣眼睛往上翻，渾身哆嗦。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おい、日々姫、どうかしたか？」
2010 = "「喂，日日姬，你怎麼了？」" 

# 【日々姫】
# display as 日日姬
# JP: 「近づけたら、これ以上近づけたら危険やけん。\nセンパイが絶対来ないとこ――そうっ！」
1936 = "「再接近，再接近就危險咧。一定要在學姐絕對不會來的地方——對了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2374 = "「！」" 

# monologue
# JP: ぐりんと、日々姫が僕を向く。
2806 = "日日姬一顫，臉朝我這邊轉來。" 

# monologue
# JP: その目が、いささか――\nなんといおうか……据わってる。
2653 = "她的眼神——該怎麼說呢……有些發直。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、御一夜の復興は、\nハチロクの復活あってのことばい」
2364 = "「阿哥，要復興御一夜，八六的復活是必不可少的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それはもちろんだ」
2015 = "「嗯。這是當然」" 

# monologue
# JP: ハチロク復活のため、\nあれほど多くの人が力を、気持ちをくれた。
2907 = "為了讓八六復活，那麼多人出情出力。" 

# monologue
# JP: それを活かさず腐らせたのなら、\n御一夜の復興をむしろ、遠ざけてしまうだろう。
2663 = "如果浪費了這些付出，那復興御一夜只會變得更加困難。" 

# 【日々姫】
# display as 日日姬
# JP: 「改修の方も、あれから、進んでるんですよね？」
1910 = "「修復工作也在順利進行吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、順調と聞いている」
2022 = "「嗯，聽說很順利」" 

# monologue
# JP: 試験走行で炙りだされた、いくつもの問題点。
3004 = "行駛測試暴露出了一些問題。" 

# monologue
# JP: その全てを潰し切るため、\nたくさんの手が、今も動いてくれている。
2905 = "為了把它們全部解決，許多人正在行動。" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、御一夜をよりよく知ることだけじゃ足りません。\n\x%l8620;#00ffc040;8620%l;#;復活のためにも、もっとたくさん、努力しないと」
2320 = "「這樣的話，只是深入了解御一夜是不夠的。為了讓\\x%l8620;#00ffc040;８６２０%l;#;復活，必須付出更多努力才行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、日々姫の言うとおりだ」
2166 = "「是啊，你說得沒錯」" 

# monologue
# JP: 日々姫の充実ぶりを見ていると、\nどうにも言い出しづらかった。
2930 = "看著日日姬充實的樣子，我一開始實在難說出口。" 

# monologue
# JP: が、自分の方から言ってくれるなら、\n何の遠慮をすることもない。
2537 = "但是既然她自己提出來了，那就不需要多顧慮了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、その方面でも僕らにできることを尽くそう。\nまず、日々姫には\x%l機関助士;#00ffc040;機関助士%l;#;としての基礎をつんでもらう」
2349 = "「那麼，就讓我們盡己所能幫助八六復活吧。首先，希望你掌握一下\\x%l機関助士;#00ffc040;司爐%l;#;的基礎」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん」
2064 = "「好，哥哥」" 

# monologue
# JP: 日々姫の瞳が燃えている。\nやる気に満ち満ち、輝いている。
2846 = "日日姬眼中燃起熊熊鬥志，綻放出光彩。" 

# 【日々姫】
# display as 日日姬
# JP: 「一生懸命覚えます。\nあの……ええと……」
2121 = "「我會拚命學的。呃……那個……」" 

# monologue
# JP: もじっと、体が小さく動く。
2641 = "她忸忸怩怩地說道。" 

# monologue
# JP: 気合が入りすぎてるのだろうか、\n顔も赤らみ、呼吸までいささか速いようだ。
2505 = "不知是否是情緒高昂過頭，日日姬臉色泛紅，就連呼吸都有些加快。" 

# 【日々姫】
# display as 日日姬
# JP: 「だから……兄さん、私に――あのっ、そのっ――\n手とり足取り、教えて、ください」
2130 = "「所以……哥哥，呃——那個——請手把手教我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「細かなことは、僕には無理だ。\nそれはハチロクに習うがよかろう」
2101 = "「我也掌握得不精。你還是跟八六學比較好吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 1975 = "「哎？」" 

# monologue
# JP: 僕とて、どう甘く見ても\x%l機関士;#00ffc040;機関士%l;#;の見習いの卵レベルだ。\n指導などとはおこがましい。
2713 = "我充其量只是個正在學習的實習\\x%l機関士;#00ffc040;司機%l;#;，指導別人太自不量力了。" 

# monologue
# JP: 当然のことを言っているのに、\nしかし日々姫は、なんとも落胆した顔をする。
2735 = "我說的話十分合理，可不知為何，日日姬看起來非常沮喪。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なに、そう落ち込むな。\n今の僕にも、指導してやれることが一つだけある」
1968 = "「哎呀，別這麼失落。現在的我有一樣東西還是能指導你的」" 

# 【日々姫】
# display as 日日姬
# JP: 「そうなんですか！？　\nでしたらそれを、じっくりたっぷり！」
2236 = "「真的嗎！？那就請仔仔細細地教我！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、素晴らしいやる気だな」
2038 = "「嚯，了不起的幹勁」" 

# monologue
# JP: 初心者相手だ。\n１００キロからと思っていたが――
2645 = "她是初學者，就從１００公斤\\x%l投炭;#00ffc040;加煤%l;#;開始吧——" 

# monologue
# JP: 日々姫はこう見えて文武両道、\n４００キロからの\x%l投炭;#00ffc040;投炭%l;#;も、まぁまぁ耐えられるかもしれん。
2512 = "不過日日姬文武雙全，說不定４００公斤也能堅持下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばいくぞ。目指すは御一夜温泉駅だ」
2346 = "「那我們開始吧。目標御一夜溫泉站」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん！　どこまでだってついていきます！！」
2181 = "「是，哥哥！我赴湯蹈火在所不辭！！」" 
