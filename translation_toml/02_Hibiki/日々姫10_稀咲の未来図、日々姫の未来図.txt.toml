2353 = "「動起來了！」" 

# 【ふかみ】
# display as 深美
# JP: 「速いよ！　凪ちゃん、レイナナ、速すぎっ！」
2507 = "「好快！小凪，０７，太快了呀！」" 

# 【凪】
# display as 凪
