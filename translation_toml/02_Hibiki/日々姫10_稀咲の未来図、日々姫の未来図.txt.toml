# JP: そうした上で、“そういう感じでも無い”と見たのなら、\n右田真闇か前市長かの発案という線はまぁ、薄かろう。
3327 = "如果他這麼做了，又覺得“不是這樣”的話，那是右田真闇或前市長的提案的可能性就不大了。" 

# monologue
# JP: なら――日々姫、かな？\nそうでなければ……
3729 = "那——是日日姬嗎？不然的話……" 

# 【稀咲】
