# monologue
# JP: 太鼓持ち程度に考え、内心見くびってしまっていた、\n自分の浅さを、少し反省させられる。
3143 = "之前我一直把他看成是個只會拍馬屁的人，根本不把他放在眼裡。現在我不得不略為反省自己的淺薄了。" 

# 【記者Ａ】
# display as 市川
# JP: 「――って話なんですよ。私なんかにゃ良くできた計画に\n思えましたんで、隈銀さんの立案かなぁ……と」
1906 = "「——就是這麼回事。我覺得這真是個不錯的計劃，就在想是不是隈元銀行的提案……」" 

# 【稀咲】
# display as 稀咲
# JP: 「いや……」
2246 = "「不……」" 

# monologue
# JP: ボクじゃない。浦上でもない。
3125 = "不是我，也不是浦上。" 

# monologue
# JP: 父がわざわざ塩を送って、\n工場誘致成功の確率を下げてしまうなどありえない。
