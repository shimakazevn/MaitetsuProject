3669 = "而且，發生什麼異變導致在廣域範圍內\\x%lエアクラ;#00ffc040;空凝機%l;#;都無法運行的可能性也並不為零。" 

# monologue
# JP: （常用できる交通手段は複数系統なければならない。\nそれは、少し考えれば当たり前のことなのに――）
3762 = "（常用的交通手段必須要有多種方式才行。這一點只要稍微思考一下就應該覺得是理所當然的，可是——）" 

# 【記者Ａ】
# display as 市川
# JP: 「御一夜鉄道さんの動きも、それでは、\n隈銀さんが関与されてのものなのですかね？」
2856 = "「這次御一夜鐵路的一些動作，是隈元銀行也有參與的嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「動き？」
2352 = "「動作？」" 

# 【記者Ａ】
# display as 市川
