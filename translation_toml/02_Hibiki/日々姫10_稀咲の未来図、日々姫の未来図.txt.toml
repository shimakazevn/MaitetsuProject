# monologue
# JP: 落ち着いた声。\n日々姫が話に加わってくる。
3351 = "平靜的聲音。日日姬也參加進來了。" 

# monologue
# JP: その目は真っ赤で、ふちの方はまだ潤んでて。\nけれども強い意志の光を取り戻している。
3315 = "她的眼睛通紅，眼眶邊緣還仍然有點濕潤。但是她的眼神中已經重新擁有了強烈的意志。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そのやり方を試してみよう。\nれいな、いいか」
2888 = "「那就試試這個方案吧。玲奈，過來一下」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですよぉ～」
2506 = "「好呀～」" 

# monologue
# JP: 凪とふかみと一緒になってはしゃいでいた、\nれいながぽてぽてやってくる。
3521 = "正和凪和深美一起喧鬧的玲奈踩著小碎步走了過來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この地図にひとつ、お前の大好きな御一夜を\n加えるのなら、なにがいい？」
2523 = "「如果要在這地圖上加一點“你最喜歡的御一夜”，加什麼好呢？」" 

# 【れいな】
# display as 玲奈
# JP: 「レールショップ！\nレールショップにきまってますですぅ」
2907 = "「鐵路商店！當然是鐵路商店了」" 

# 【日々姫】
# display as 日日姬
# JP: 「オッケー。レールショップ」
2946 = "「ＯＫ。鐵路商店」" 

# monologue
# JP: こんなときでも肌身離さず持ってきている、\nスケッチブックと筆入れと。
3298 = "她在這種時候竟然也還隨身帶著素描簿和筆袋。" 

# monologue
# JP: 日々姫の鉛筆はさささと走り、\n白紙の上にレールショップを描き出す。
3501 = "日日姬的鉛筆唰唰地飛舞著，在白紙上畫出了鐵路商店。" 

# 【れいな】
# display as 玲奈
# JP: 「はわわ、じょうずですぅ」
2429 = "「啊哇哇！畫得真好」" 

# 【日々姫】
# display as 日日姬
# JP: 「スケッチがまとまったら、\n簡略化して、図面に――紙の模型に起こしてあげる」
2715 = "「畫好素描之後，再把它簡略化弄成圖面——然後做成紙模型」" 

# monologue
# JP: 直線がいくつも引かれ、その上、\n色鉛筆で屋根が、壁面が塗られていく。
3310 = "她畫出好幾條直線，再用彩色鉛筆給屋頂、牆壁塗上顏色。" 

# monologue
# JP: カッターとカッターマットと定規とノリとつまようじ。\nただそれだけで――レールショップが立ち上がる。
3662 = "美工刀、切割墊、尺、漿糊以及牙籤。只用了這些東西——一座鐵路商店就拔地而起。" 

# 【日々姫】
# display as 日日姬
# JP: 「これを、この駅舎の横に……ちょこんって」
2614 = "「把這個放在車站的旁邊……輕輕地」" 

# 【れいな】
# display as 玲奈
# JP: 「わぁ！　できました！　ポーレットとれいなの、\nみんなのお店ができましたぁ！」
2394 = "「哇！做好了！波萊特和玲奈的商店，大家的商店做好了！」" 

# monologue
# JP: れいな、興奮。\n日々姫が自然と、僕を見る。
3593 = "玲奈顯得很興奮。日日姬則自然地看向我。" 

# 【日々姫】
# display as 日日姬
# JP: 「これ、今は暫定で色鉛筆と画用紙だけど。\n紙を選んでガッシュで塗れば、クオリティあげられる」
2710 = "「現在就暫時用彩色鉛筆和圖畫紙將就下。如果選用好紙再塗上水粉顏料的話，那整體品質就會更好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これより更にか」
2681 = "「比現在的這個還好嗎」" 

# 【ふかみ】
# display as 深美
# JP: 「発船所！　発船所と川下りもっ」
2869 = "「還有發船點！發船點和下流漂游的木筏」" 

# 【凪】
# display as 凪
# JP: 「それなら、うちの鍛冶屋も欲しかとばいっ！」
2882 = "「那咱也想要一座咱家的鍛冶店！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ待て待て待て、順番だ」
2339 = "「別那麼急嘛，一個一個來」" 

# monologue
# JP: 手ごたえを強く感じる。\nだからこそ、あせらず足場を確認していく。
3407 = "我感覺充滿了希望。正因此，我才必須冷靜地確認好立腳點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「建物以外の、自然景などはどうだ？」
2560 = "「建築以外再弄點自然景觀怎麼樣？」" 

# 【日々姫】
# display as 日日姬
# JP: 「川は多分、掘ったスチロールに絵具を混ぜた樹脂を\n流してるんだと思う。山は、盛った上に絵具と……[いろずな,1]色砂」
2686 = "「河流的話，只用在泡沫塑膠上掘出溝再倒進混著顏料的樹脂就行。山嘛，堆起泡沫塑膠的小顆粒再塗上顏料和……彩沙」" 

# monologue
# JP: 森を、木を、砂地を、橋を。\nその構造を日々姫は確かめ、その目で構造を解剖していく。
3519 = "森林、樹木、沙地、小橋。日日姬用眼睛確認，並解剖它們的構造。" 

# 【日々姫】
# display as 日日姬
# JP: 「できる。っていうか――できなくても、やる。\n私、これ、できるようになるし、やりたい」
2369 = "「可以做出來。倒不如說——就算做不出來我也要做。我很想，也一定要學會做這個」" 

# monologue
# JP: 日々姫がすっくと立ち上がる。
3497 = "日日姬猛地站起身來。" 

# monologue
# JP: そして深々――\nとても自然に、凛と美しく頭を下げる。
3582 = "然後深深地——非常自然，而又威風凜凜地鞠了一躬。" 

# 【日々姫】
# display as 日日姬
# JP: 「私に、これ。どうかやらせてください。\nみんなの未来図、描くお手伝いをさせてください」
2794 = "「請把這個任務交給我吧。請讓我幫忙來畫出大家的未來圖景」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はもちろん、日々姫の味方だ。\n他のみんなは、どうだろう？」
2593 = "「我當然是站在日日姬那邊的了。其他人怎麼樣？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「賛成です。\nなんか、これ、すごく楽しくていいと思います」
2598 = "「我贊成。我總感覺似乎會很開心的樣子」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、もーっとおっきい御一夜の中で、\nレイナナが走るのを見てみたいですぅ！」
2703 = "「玲奈也想開著０７在更大的御一夜城裡轉轉！」" 

# 【ハチロク】
# display as 八六
# JP: 「電動、というのがやや悔しくはありますが、\n\x%l8620;#00ffc040;8620%l;#;も、ぜひとも走らせてあげてください」
2918 = "「雖然車子是電動的讓人有點不甘心，不過也請一定要讓\\x%l8620;#00ffc040;８６２０%l;#;在上面跑跑」" 

# 【凪】
# display as 凪
# JP: 「もちろん賛成、大賛成の超賛成ばいっ！」
2389 = "「咱當然贊成，超贊成，完全贊成！」" 

# 【ふかみ】
# display as 深美
# JP: 「わたしももちろん。ええと……究極賛成。です」
2581 = "「我也當然支持。唔……究極贊成。嗯」" 

# monologue
# JP: 圧倒的な――究極にまで至ってくれた、賛同の声。
3282 = "大家的想法都是壓倒性的贊成——甚至到了究極的程度。" 

# monologue
# JP: その中、最重要の人物だけは、\nまだ沈黙を保っている。
3175 = "但在這其中，最重要的那個人卻還保持著沉默。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉はどう思う？」
2730 = "「真闇姐怎麼想？」" 

# 【真闇】
# display as 真闇
# JP: 「向こうさんは『説明し、伝える』\n対してウチは、『忘れとることを、思いださせる』」
2542 = "「對方的綱領既然是“說明與傳達”，那咱們這邊就是“回憶被忘卻的過去”」" 

# monologue
# JP: ああ、そうか。
3266 = "啊，是這樣啊。" 

# monologue
# JP: 自分の大好きな御一夜の景色とは、\nその人の一番大事な思い出にほぼ等しいのか。
3112 = "一個人最喜歡的御一夜的景色，幾乎就等於是對那個人來說最重要的回憶。" 

# 【真闇】
# display as 真闇
# JP: 「向こうさんは、『完成形を見せて示す』\n対してウチは、『参加して共に作ってもらう』」
2541 = "「對方是“創造出完成品讓大家欣賞”，那咱們就是“一起參加一起創作”」" 

# monologue
# JP: それもそうだ。
3730 = "那也是啊。" 

# monologue
# JP: 話を聞き取り作るのだから、\nそれは自然と、対話・参加型ということになる。
3450 = "既然是一邊聽一邊製作，那自然就會成為對話、以及參加型的模式。" 

# 【真闇】
# display as 真闇
# JP: 「だけでなく、これ――『客車改修プロジェクト』とも、\n簡単に効果的に絡み合うとね」
2768 = "「而且還不止這樣，還能既簡單又有效地摻入“客運車廂修復計劃”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2461 = "「嗯」" 

# monologue
# JP: まさしくだ。\nハチロクに、レイナナに、改修\x%l客車;#00ffc040;客車%l;#;の模型を引かせる。
3526 = "正是這樣。可以讓八六和０７拖著修復過的\\x%l客車;#00ffc040;客運車廂%l;#;行駛。" 

# monologue
# JP: 日々姫のデザインする車輌なら、\n「これは何？」と、興味を喚起することもできよう。
3503 = "日日姬設計的車輛，也可以更好地激發起大家的興趣。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん。これ」
2549 = "「小雙，這個方案——」" 

# monologue
# JP: にこにこ笑いが消えている。\n真剣な目が、まっすぐまっすぐ僕を見据える。
3319 = "她臉上的笑容消失了，轉而一臉嚴肅地直直看著我。" 

# 【真闇】
# display as 真闇
# JP: 「うまく回せば――\nうまいこと回るようにできれば、勝てっとよ」
2367 = "「只要順利——如果我們做得順利就能贏」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2481 = "「噢噢！」" 

# monologue
# JP: 真闇姉のお墨付き。\n盛りあがらないわけがない。
3624 = "真闇姐都拍著胸脯保證了，我們當然很興奮。" 

# monologue
# JP: けれども真闇姉は緩まない。\nそのまますっくと立ち上がり、厳しい声で僕らに告げる。
3134 = "不過真闇姐卻絲毫沒有放鬆。她唰地站起身，用嚴肅的語氣對我們說道：" 

# 【真闇】
# display as 真闇
# JP: 「まずポーちゃんは\x%l客車;#00ffc040;客車%l;#;改修計画の準備と通常運行。\nその両方を、しっかりこなしてもらわんといけんよ」
2934 = "「首先小波去準備\\x%l客車;#00ffc040;客運車廂%l;#;的修復計劃和通常運行。這兩個都必須做得完美才行」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、やります。やるだけじゃなく、結果、出します」
2475 = "「嗯，我會的，不光是要做還要做出成果」" 

# 【真闇】
# display as 真闇
# JP: 「\x%l客車;#00ffc040;客車%l;#;改修ば軌道に乗せるには、ポーちゃんの\x%lまいてつ;#00ffc040;まいてつ%l;\n#;人脈だけが頼りやけんね。しっかり頼むと」
2781 = "「要讓\\x%l客車;#00ffc040;客運車廂%l;#;的修復進入正軌還是只能依靠小波的\\x%lまいてつ;#00ffc040;掌車人%l;#;人脈了。得去拜託她」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、ポーレットをお手伝いしますよぉ！」
2701 = "「玲奈也去幫波萊特的忙」" 

# 【真闇】
# display as 真闇
# JP: 「うん。れーちゃんにはそれ、お任せするけんねぇ」
2460 = "「嗯。這個就交給小玲了」" 

# monologue
# JP: やさしく言って、真闇姉の視線は凪とふかみに。
3308 = "她溫柔地說著，把視線轉向凪和深美。" 

# 【真闇】
# display as 真闇
# JP: 「ふたりには、\n学園生たちにこん話しば広めてもらいたかとよ」
2387 = "「咱想讓你們兩個多和學校裡的學生們宣傳宣傳這件事」" 

# 【凪】
# display as 凪
# JP: 「やるばい！　得意ばいっ！　任せろばいっ！！」
2463 = "「嗯嗯！這個咱擅長！就交給咱吧！！」" 

# 【ふかみ】
# display as 深美
# JP: 「これ、すっごくわくわくしますから。展示会のときより、\nもっとみんな、来てくれるって思います」
2725 = "「真讓人興奮。我覺得肯定會比展示會的時候還要來更多的人的」" 

# 【真闇】
# display as 真闇
# JP: 「ハチロクちゃんは、Ｎゲージやらの図面起こしの\n手伝いと、\x%l8620;#00ffc040;8620%l;#;復活のための準備全般」
2328 = "「八六，你的話就去幫忙起草ＮＧａｕｇｅ的圖面和進行讓\\x%l8620;#00ffc040;８６２０%l;#;復活的準備事項吧」" 

# 【ハチロク】
# display as 八六
# JP: 「お任せください。どちらも、完璧に仕上げて見せます」
2280 = "「交給我吧。我兩項都會做得很完美的」" 

# 【真闇】
# display as 真闇
# JP: 「で、双ちゃんは今までどおり」
2902 = "「那，小雙就和之前一樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「選挙の裏方全般と、\n\x%l8620;#00ffc040;8620%l;#;復活に備えた訓練の継続とだな」
2865 = "「進行選舉活動後勤工作，還有為了讓\\x%l8620;#00ffc040;８６２０%l;#;復活而進行的訓練也要繼續是吧」" 

# monologue
# JP: 組織固めにマスコミ対策、広報活動、資金調達等々、\n選挙においてやるべきことは無数にある。
3352 = "強化組織認同感、媒體對策、宣傳活動、資金籌措等等，選舉要做的事有無數件。" 

# monologue
# JP: 日々姫が安心して上に立てるよう、\nその足場を作ることこそ、言われずとも僕の今の最優先だ。
3575 = "為了讓日日姬能夠安心地站到高處，那我現在最優先要做的自然是給她鋪好台階。" 

# 【双鉄】
# display as 雙鐵
# JP: 「心配不要だ。上手くやるさ」
2256 = "「不用擔心。我會做好的」" 

# 【真闇】
# display as 真闇
# JP: 「で、ひーちゃん」
2901 = "「那，小日」" 

# monologue
# JP: 真闇姉が、にこにこを消して日々姫を見る。\n日々姫は背筋を伸ばし、真闇姉の視線を受け止める。
3619 = "真闇姐收起笑容看向日日姬。日日姬挺直身板正面應對真闇姐的視線。" 

# monologue
# JP: 姉と、妹。このふたりが対等に向き合う姿を……\n僕は初めて目にしている。
3335 = "姐姐與妹妹。我還是第一次看到她們平等對視的場景。" 

# 【真闇】
# display as 真闇
# JP: 「任せたいのは、御一夜の未来」
2385 = "「咱想交給你的是，御一夜的未來」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん、任された」
2466 = "「嗯，交給我吧」" 

# 【真闇】
# display as 真闇
# JP: 「なら、安心たい」
2884 = "「那咱就安心了」" 

# monologue
# JP: たったそれだけ。\n三十秒にも満たない会話。
3246 = "只說了這麼幾句。連三十秒都沒有的會話。" 

# monologue
# JP: けれども空気がピシリと締まる。\n名実ともに、日々姫が僕らの軸として立ったと強く感じる。
3180 = "但氣氛卻突然嚴肅了起來。我強烈感受到日日姬已經名副其實地成為了我們這些人的軸心了。" 

# 【日々姫】
# display as 日日姬
# JP: 「で、ええと……\nあ、真闇姉、ごめん」
2899 = "「那，唔……啊，真闇姐，對不起」" 

# monologue
# JP: 日々姫が椅子に座りなおして、\n凪とふかみを前に座らせ、申し訳なさそうな声をだす。
3508 = "日日姬重新坐回椅子上，然後讓凪和深美坐在她面前，用略帶抱歉的語氣說道：" 

# 【日々姫】
# display as 日日姬
# JP: 「私の画材――あの、木の箱の中に入ってる方の」
2595 = "「我的畫材——放在那個木箱子裡的」" 

# 【真闇】
# display as 真闇
# JP: 「よかよっ！」
2513 = "「好！」" 

# monologue
# JP: 破顔一笑。
3620 = "真闇姐破顏一笑。" 

# monologue
# JP: 見たこともないほどの、底抜けに明るい笑みを浮かべて、\n真闇姉は、足取り軽くレールショップから駆け出していく。
3626 = "真闇姐露出了我從沒有見過的非常爽朗的笑容。她邁著輕盈的腳步跑出了鐵路商店。" 
