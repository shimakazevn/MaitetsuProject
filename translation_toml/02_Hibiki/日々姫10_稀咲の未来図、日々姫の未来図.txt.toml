# monologue
# JP: もはや様付けを放棄して、\nしかしハチロクは、稀咲のことを称賛する。
3666 = "而且雖然連“小姐”都不叫了，但八六卻還在讚賞著稀咲。" 

# 【ハチロク】
# display as 八六
# JP: 「あの都市モデル……\n悔しいことに、わたくしは目を奪われてしまいました」
2891 = "「那座城市模型——雖然很不甘心，但是我也看得入迷了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、僕も圧倒された。\nあれは――凄まじい緻密さと仕事量とで、美しくあった」
2737 = "「確實，我也被徹底吸引了。不僅是龐大的工程量和細緻入微的精細度，而且還特別壯觀」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ。あのミニチュアの御一夜市に、\n\x%lキハ07;#00ffc040;キハ07%l;#;も走らせてあげてほしいですぅ」
2704 = "「玲奈也是。玲奈真想讓\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;在那個迷你模型裡跑跑看」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　あの、わたしも。です。\nウチには、最悪の未来図なのに……みとれちゃいました」
2434 = "「啊！那個，我也是。明明是我們最不希望的未來——但卻看入迷了」" 

# 【凪】
# display as 凪
# JP: 「なにいっとるばい！　ふかみちゃんまでっ！！」
2491 = "「在說什麼呢！連小深都這麼說！！」" 

# monologue
# JP: 憤懣やるかたなしとばかりに、\n凪が立ち上がり声を荒げる。
3379 = "憤怒不已的凪站起身提高音量說道：" 

# 【凪】
# display as 凪
# JP: 「あぎゃんところに工場ば建てられよったら、\nだぁれも川下り船乗らんよーになるばい！！」
2515 = "「如果在那種地方建造工廠的話，就沒人會再乘往下游漂流的船啦！！」" 

# 【ふかみ】
# display as 深美
# JP: 「そんなこともちろんわかってるよ？　けど……\nあれ、凪ちゃんは綺麗って思わなかった？」
2847 = "「這個我當然知道啊。可是……那個模型小凪不覺得漂亮嗎？」" 

# 【凪】
# display as 凪
# JP: 「…………答えたくなかばい」
1919 = "「…………咱不想回答」" 

# monologue
# JP: ウソをつくことも、敵を称賛することも、\n両方拒むがゆえに為される回答拒否。
3305 = "她既不想撒謊又不想稱讚敵人，所以只能拒絕回答。" 

# monologue
# JP: 凪さえ認める魅力はつまり、\n“万人受けする明快なもの”ということとなろう。が――
3726 = "連凪都承認它的魅力，說明它的魅力是能讓大家深有同感的，不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪。そうむくれるな。\n『一目でわかる魅力』の提示は、日々姫の専門領域だ」
2336 = "「凪。別這麼氣鼓鼓的嘛。展示“一眼就能看出的魅力”可是日日姬的專業領域啊」" 

# 【凪】
# display as 凪
# JP: 「それをさっきから待っとるばいっ！」
2561 = "「從剛才咱就一直在等了！」" 

# monologue
# JP: なだめようとしたはずなのに、\n凪をますますむくれさせてしまう。
3416 = "我明明是想安慰她，結果卻把她弄得更生氣了。" 

# monologue
# JP: というか、確かに……
3703 = "話說回來，我記得——" 

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、ずいぶんと遅いな」
2792 = "「說起來，她還真慢啊」" 

# 【ハチロク】
# display as 八六
# JP: 「まだ家を出てないのでしょうか？\n電話をしてみてはいかがですか？」
2925 = "「難道她還沒有離開家嗎？我去打個電話問問？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう……だな」
2647 = "「是啊……」" 

# monologue
# JP: 家を一緒に出ようと誘ったときに日々姫は、\n『もう少しでまとまるから先に行って』と言っていた。
3229 = "剛才我讓日日姬和我一起出來，她卻說“我馬上就整理好了你先去”。" 

# monologue
# JP: あれからかれこれ、一時間は優に経過している。
3580 = "然後不知不覺差不多過了一個小時。" 

# monologue
# JP: (……事故などではあるまいな）
37 = "(……可別出了什麼事故啊）" 

# monologue
# JP: 事故は突然やってくる。\nそのことならば、僕は誰より知っている。
3151 = "事故總是會來得很突然。這種事我比誰都清楚。" 

# monologue
# JP: 不安がぞわぞわ足元から這い上ってきてしまうけれども、\n今さら動揺するほどに、珍しい不安なわけでもない。
3124 = "不安正唰唰地從腳底往我頭上爬。可又不是那種現在還會讓人惴惴不安的那種鮮有的不安。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、すまんが、電話を借りてもいいか？」
2691 = "「波萊特，不好意思，我可以借一下電話嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「その必要はありません。\n兄さん、みなさん。お待たせしました」
2682 = "「沒有那個必要了，哥哥，各位，讓你們久等了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！」
2631 = "「日日姬！」" 

# monologue
# JP: 安堵しながら振り返り、\nとたんに別種の不安をべっとり塗りつけられる。
3392 = "我剛安心下來回過頭，瞬間又被另一種不安所籠罩。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、お前――その顔色は」
2314 = "「你的臉色——怎麼了」" 

# 【真闇】
# display as 真闇
# JP: 「ひーちゃん！？」
2544 = "「小日！？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫ですか！？　お薬――\nひととおり置いてありますけどっ」
2311 = "「你沒事嗎！？我這邊有各種常用藥」" 

# monologue
# JP: 奥でそれぞれの仕事をしていた\n真闇姉とポーレットまでが、焦った顔で飛び出してくる。
3140 = "之前在裡面各自做著工作的真闇姐和波萊特都一臉焦急地飛奔了出來。" 

# monologue
# JP: 日々姫の様子は、それほどまでに……\nなんといおうか――生気を、まるきり失っている。
3500 = "日日姬的樣子，已經到了——該怎麼說呢……完全沒有了靈氣的程度。" 

# 【日々姫】
# display as 日日姬
# JP: 「大丈夫です。顔色が良くないのは……\nただ単に寝不足と――あと――」
2589 = "「我沒事。臉色不好……只是單純因為睡眠不足——還有——」" 

# monologue
# JP: （ガバッ！）
3759 = "（咣！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ごめんなさいっ！！」
2537 = "「對不起！」" 

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「日々姫っ！？」\n「なにをっ！？」
2633 = "「日日姬！？」\\n「你做什麼！？」" 

# monologue
# JP: 日々姫は床に両膝をつき、\n大きく体を前に投げ出し、両てのひらも床へとつける。
3509 = "日日姬雙膝跪在地上，然後身體大幅度往前仰，兩手也貼在地上。" 

# 【れいな】
# display as 玲奈
# JP: 「はわわ、日々姫さん？」
2452 = "「嗚哇哇，日日姬小姐？」" 

# 【ふかみ】
# display as 深美
# JP: 「や、やめてください――そんな、こんなっ」
2795 = "「請，請快住手——為什麼要這樣」" 

# 【凪】
# display as 凪
# JP: 「これ――土下座ばい、初めてみたばい」
2844 = "「這不是——跪地謝罪嗎，咱還是第一次見」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2940 = "「！」" 

# monologue
# JP: 凪の言葉が、理解不能だった景色に意味を与える。\n同時に、体がもう動いているっ！
3223 = "凪的話賦予了這無法理解的場面以意義。同時我的身體已經開始自己動了起來！" 

# 【双鉄】
# display as 雙鐵
# JP: 「よせ、日々姫っ！\nお前にそんな真似はさせないっ！」
2338 = "「別這樣，日日姬！我不會讓你這麼做的！」" 

# 【日々姫】
# display as 日日姬
# JP: 「離してっ！　にぃにっ！　私、だって、\n謝らなくっちゃいけんけんっ！」
2624 = "「放開我！阿哥！我，我必須道歉才行！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「謝るのなら普通に謝れ！\n土下座など、悪趣味なパフォーマンスだ！」
2785 = "「要道歉就平常地道歉！跪地謝罪這種表演太惡趣味了！」" 

# 【日々姫】
# display as 日日姬
# JP: 「悪趣味でんなんでんっ！\nそれでしか、すまなか気持ちつたえられんもんっ！！」
2253 = "「不是惡趣味！是只有這樣才能表達出我的歉意！！」" 

# monologue
# JP: 悲鳴――\nいいや、これは、泣き声。
3370 = "悲鳴聲——不，這是哭聲。" 

# monologue
# JP: 何年ぶりかで耳にする――\n日々姫の、本気で泣きじゃくる声。
3323 = "好幾年沒有聽過的——日日姬的痛哭聲。" 

# 【日々姫】
# display as 日日姬
# JP: 「私、描けんけんっ！　期待して、任せてもらって――\nそれなのに、御一夜の未来図、描けんけんっ！！！」
2592 = "「我畫不出來！大家滿懷期待、交給我這個重任——但我卻畫不出御一夜的未來圖景來！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！」
# 2631 = "「日日姬！」" 

# monologue
# JP: 有無を言わせず抱きしめる。\n体全部でくるみこみ、日々姫の泣き顔を閉じ込めてしまう。
3384 = "我不由分說地抱住她。用整個身體把她包進去，把日日姬的哭泣的臉龐給捂在懷中。" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいな？」
2699 = "「玲奈」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、居てくれ」
2266 = "「不，你們不用走」" 

# monologue
# JP: 気を利かせてくれたのだろう。れいなを連れて\n出ようとしていたポーレットをけれど、呼び止める。
3549 = "波萊特為了不打擾我們準備帶著玲奈離開。不過我卻叫住了她。" 

# monologue
# JP: 日々姫は、全員に謝りたがっている。\nその気持ちを、まずは第一に尊重したいと思うから。
3492 = "日日姬想和所有人道歉。我覺得首先得尊重她的這種想法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それより何か、\n温かな飲み物をもらえれば」
2322 = "「先去泡點溫熱的飲料吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でしたら、ミルクティー。\nもちろん、みんなの分も用意しますね」
2887 = "「那就泡奶茶吧。當然我也會準備大家的份的」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、お手伝いします。です！」
2602 = "「我，我也來幫忙。嗯！」" 

# monologue
# JP: 少しでも場を離れたいのだろう。\nポーレットとともにふかみが奥へ消えていく。
3546 = "波萊特和深美肯定想儘快離開這裡。她們消失在房子深處。" 

# monologue
# JP: かちゃかちゃ、茶器の音が聞こえる。\nややあって、ピーっとヤカンの鳴る音も。
3672 = "聽見了茶器的聲音。隔了一會後，又聽見水壺的鳴叫聲。" 

# 【日々姫】
# display as 日日姬
# JP: 「ぅぅっ……ぅぇっ――ぐずっ――すんっ」
2453 = "「嗚嗚……嗚嗚——」" 

# monologue
# JP: 誰も――凪さえ――何も言おうとしない。\n僕はただただ、日々姫の背中をさすりつづける。
3126 = "不管是誰——連凪都——一句話也不說。我也只是不斷撫摸著日日姬的背部。" 

# monologue
# JP: やがて、紅茶のカップが置かれる。\nミルクと砂糖は、もう溶かされているようだ。
3357 = "很快，桌子上擺上了倒著紅茶的茶杯。牛奶和砂糖似乎已經放在裡面了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2410 = "「唔」" 

# monologue
# JP: 左手で日々姫を抱いたまま、\n右手でカップを持ち上げて、飲む。
3400 = "我左手抱著日日姬，用右手拿起茶杯喝起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「甘いな。うまい」
2510 = "「好甜啊。真好喝」" 

# monologue
# JP: 手の中、ふすふす――匂いを求めて鼻が鳴る。\n安堵する。
3421 = "我的手中傳來吸氣的感覺——是鼻子正在嗅著氣味。我安心了。" 

# monologue
# JP: 泣いてる日々姫の行動は、\n小さな日々姫の頃とまるきり変っていない。
3262 = "哭泣的日日姬的舉動和她小時候比完全沒變。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほれ、飲め」
2316 = "「來，喝吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん――」
2454 = "「嗯——」" 

# monologue
# JP: 僕の腕の中もぞもぞ動き、\n日々姫が顔を持ち上げる。
3423 = "我的手臂中傳來蠕動感，日日姬抬起了頭。" 

# monologue
# JP: その唇にカップをあてて、\nゆっくりゆっくり、傾けてやる。
3314 = "她的嘴唇碰到茶杯邊上，我緩緩傾斜著茶杯。" 

# 【ふかみ】
# display as 深美
# JP: 「わ――間接キス」
2391 = "「哇——間接親吻」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、余計なこといったらいけんばいっ！」
2545 = "「小深，別說多餘的話！」" 

# monologue
# JP: 余計なことがダブルで重なり聞こえてくるが、\n日々姫の耳には届いていない。
3654 = "結果我聽到了兩句多餘的話，不過倒是沒傳到日日姬的耳朵裡。" 

# monologue
# JP: 乳に吸いつく赤子のように、\n流した涙を、紅茶で必死に補填している。
3300 = "她就像在吃奶的孩子一樣，用紅茶拚命補充流掉的眼淚。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん」
# 2461 = "「嗯」" 

# monologue
# JP: こくり、と、大きく喉がなる。\nあたたかな息が吐かれて僕の肌をくすぐる。
3312 = "她的喉嚨發出“咕嚕”一聲。吐出一口溫熱的氣息，把我的皮膚吹的很癢。" 

# monologue
# JP: 日々姫の髪に手を伸ばす。\nゆっくり撫でて、撫でる動きに言葉を乗せる。
3411 = "我手伸向日日姬的頭髮，緩緩地撫摸起來，同時說道：" 

# 【双鉄】
# display as 雙鐵
# JP: 「描けないといったが――それはポスター……\nお前のいうところの、メインビジュアルというヤツか？」
2308 = "「你剛才說畫不了——那是海報……也就是用你的話說是主視覺圖的那個嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2461 = "「嗯」" 

# monologue
# JP: 立候補表明時に、本当は間に合うはずだった。\n\x%l8620;#00ffc040;8620%l;#;の走る町、鉄道とクマ川とに彩られる町。
3599 = "當她宣布參選的時候，本來是能趕得上的。有\\x%l8620;#00ffc040;８６２０%l;#;在行駛的城鎮，被鐵路和隈河所裝飾的城鎮。" 

# monologue
# JP: 僕らが作ろうとする御一夜を、\n日々姫は絵で、示してくれるはずだった。
3496 = "日日姬本應該用畫來展示出我們打算創造的御一夜的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうして描けないでいるのか……\n理由は、はっきりしているのか？」
2892 = "「那為什麼畫不了……你知道具體理由嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「なにが、描きたいのかわからなくって」
2579 = "「我不知道我想畫什麼」" 

# monologue
# JP: 即座に答えが返される。
3317 = "她立刻回答道。" 

# monologue
# JP: それほど日々姫は、自分と向き合い、\n向き合うほどに、追い詰められてしまったのだろう。
3506 = "日日姬逼著自己面對自己。但越是面對自己，就越是無路可走。" 

# 【日々姫】
# display as 日日姬
# JP: 「期待してもらってること、嬉しくて、\nあれも描きたい、これも描こうって思ってたら」
2502 = "「大家都期待我，我很高興，然後就又想畫這個又想畫那個的」" 

# monologue
# JP: ぐっと、日々姫のおでこが僕の胸板に押しつけられる。
3581 = "然後日日姬猛地把額頭頂在我的胸口。" 

# 【日々姫】
# display as 日日姬
# JP: 「もっともっとって思ううち、ぐちゃぐちゃしてきて、\nそれで私、自分の描きたい未来図に一度戻そうってして」
2696 = "「然後越想越多，就越來越混亂。然後我想暫時先返回到我自己想畫的未來圖景上」" 

# 【双鉄】
# display as 雙鐵
# JP: 「戻して――それでどうなった？」
2817 = "「返回——然後呢？」" 

# 【日々姫】
# display as 日日姬
# JP: 「真っ白――何も見えんくなって、怖くて――\nもっと、なんか、ぐちゃぐちゃになっちゃって」
2241 = "「一片空白——什麼都看不見，好害怕——感覺又更加更加混亂了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか」
2420 = "「啊……是嗎」" 

# monologue
# JP: 理屈で、答えを追えてしまった。
3414 = "我整理好思緒，給出了答案。" 

# monologue
# JP: 一度戻す――立ち返ろうとしてしまったなら、\n見えなくなるのが当然だ。
3373 = "想要返回——也就是回頭的話，當然會眼前一片空白了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「立候補表明のときも、それ以前からも、\nお前は言っていただろう、『ゼロから考えてみたい』と」
2260 = "「不管是宣布參選的時候，還是再之前的時候，你不都說過嗎，“我想試著從零開始思考”這句話」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
2425 = "「啊」" 

# monologue
# JP: そう、ひどくそれは単純なこと。
3534 = "沒錯，這就是這麼單純的事情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今の日々姫の未来図は、ゆえに、白紙で当然なのだ。\n愚かにも僕はその点を失念していた」
2606 = "「所以，現在你的未來圖景是白紙是很理所當然的。我真笨，沒注意到這一點」" 

# monologue
# JP: 日々姫の夢見る未来図が、\n僕の夢見る未来図と同じものだと思ってしまった。
3388 = "我之前一直以為日日姬夢想中的未來與我夢想中的未來是相同的。" 

# monologue
# JP: いや、おそらくは、日々姫自身も、\n同じものだと、思いこもうとしてくれた。
3137 = "不，恐怕日日姬她自己也一直以為我們想的是同一張畫面吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の配慮が不足していた。\n申し訳ない」
2653 = "「是我考慮不周了。真對不起」" 

# monologue
# JP: 日々姫に、みんなに軽く頭を下げる。\n深刻になってしまえば、かえって日々姫の重圧になる。
3395 = "我向日日姬以及大家輕輕低頭道歉。要是我道歉得太深刻的話反而會給日日姬造成更大的重壓吧。" 

# 【日々姫】
# display as 日日姬
# JP: 「そんなこと無いっ！」
2607 = "「才沒有那麼回事呢！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、僕は知っているのだぞ？　――日々姫には、\n日々姫の本当では無いものなど、描けはしないと」
2374 = "「可是我知道的。——日日姬是不會畫並非出自自己真心的東西的」" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
1921 = "「……」" 

# monologue
# JP: 僕の胸の中、日々姫が頷く。
3489 = "日日姬在我懷裡點點頭。" 

# monologue
# JP: “ごめんなさい”と、“ありがとう”と、\n声にならない言葉が聞こえる。
3427 = "我能聽見她極小聲地囁嚅著“對不起”和“謝謝”之類的話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、お互いに前を向くことにしよう。\n日々姫が本当を見つけ出せるように、視線をあげよう」
2894 = "「那麼我們就都一起向前看吧。抬起視線，為了讓你自己能夠找出“真實”」" 

# monologue
# JP: 日々姫が、声を出さずに頷く。\nなら後は、日々姫の瞳が何かを見つけるのを待てばいい。
3511 = "日日姬默默地點點頭。之後只要等待日日姬發現了什麼就行了。" 

# monologue
# JP: 僕と日々姫は、それでいい。\nが――
3398 = "我和日日姬現在保持這樣就好。可——" 

# 【ふかみ】
# display as 深美
# JP: 「ぁっ」
# 2425 = "「啊」" 

# 【凪】
# display as 凪
# JP: 「んぐぐっ！」
2411 = "「唔唔！」" 

# monologue
# JP: 顔を向ければその途端、\nふかみはもちろん、凪さえもが僕から視線を逃がす。
3432 = "我轉過頭望去，結果發現深美和凪都慌忙把視線從我身上撇開。" 

# monologue
# JP: このふたりも――他の誰だって理解している。\n理解して口には出せずに、わだかまっている。
3294 = "她們兩人也——其他的所有人都理解了。雖然理解了，但卻默默地藏在心中。" 

# 【真闇】
# display as 真闇
# JP: 「けどねぇ、双ちゃん」
2263 = "「不過呢，小雙」" 

# monologue
# JP: だから。真闇姉が切り出してくれる。
3441 = "所以，真闇姐開口了。" 

# monologue
# JP: 誰もが嫌がる貧乏くじを、\nいつもと同じくにこにこと、笑顔のままに引いてくれる。
3615 = "真闇姐和往常一樣，笑嘻嘻地主動來抽不論是誰都最討厭的下下籤。" 

# 【真闇】
# display as 真闇
# JP: 「『描けるようになるまで待つ』ことが許されるほど、\n甘か相手じゃなかよーやけんねぇ」
2539 = "「對手可不是會老好人到會慢慢等你畫出來為止的人啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これ――は」
2841 = "「這——個」" 

# monologue
# JP: ……真闇姉から手渡された新聞は、\n今の僕らにはあまりに重い。
1889 = "……真闇姐遞給我的報紙對現在的我們來說，真的是太過於沉重了。" 

# 【真闇】
# display as 真闇
# JP: 「こん合わせ技はキツかとよ？\n返せんよーなら、オトされるばい」
2540 = "「對手打出的組合拳可是招招致命的。如果不反擊的話就會被打敗了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2410 = "「唔」" 

# monologue
# JP: 合わせ技で[オト,1]落選される――とは、言い得て妙だ。\nが、それを称賛する余裕すらない。
3255 = "吃了連技而被“擊敗”——真是絕妙的比喻。不過我現在連稱讚這個比喻的從容都沒有。" 

# monologue
# JP: 喉がひりひりと痛むほど、一気に僕は乾ききる。
3419 = "我的喉嚨突然乾燥得火辣辣地痛。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　その新聞に何が書かれているのですか？」
2922 = "「雙鐵少爺？那份報紙裡寫了些什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぅむ――んんっ」
2451 = "「嗚——咳咳」" 

# monologue
# JP: かすれてしまった声を直すため、咳払い。\nポーレットがすぐ気を利かせ、新しい紅茶を淹れてくれる。
3574 = "為了讓我嘶啞的聲音緩過來，我乾咳了幾聲。波萊特很善解人意地新泡了一杯紅茶。" 

# 【双鉄】
# display as 雙鐵
# JP: 「簡単に言えば丸飲みだ。車両改修計画を稀咲は聞きつけ、\nそれを丸飲み。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致との並立を述べている」
2761 = "「簡單地說，他們要照搬我們的方案。稀咲聽到車輛修復計劃就照搬了過去，還宣傳要和\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠引進計劃並立推行」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それって！！？」
2860 = "「這！！？」" 

# monologue
# JP: 珍しく大きなポーレットの声。\n日々姫がびくりと体をすくませ、弱々しく首を横に振る。
3547 = "波萊特少見地大聲喊道。日日姬則驚得渾身僵硬，她微微地搖起了頭。" 

# monologue
# JP: が、そんなことをポーレットは責めているのではない。\n日々姫が籠りきってたことを、この場の全員が知っている。
3178 = "但是，波萊特也不是在責備情報洩露那種事。這裡的每個人都知道日日姬最近一直待在家裡。" 

# monologue
# JP: （稀咲が日々姫を情報源として利用していた――\nその懸念を、図らずもこれで払拭できた形になるか）
3771 = "（稀咲利用日日姬當情報源——沒想到這個疑念以這種方式消除了）" 

# monologue
# JP: ポスター描きに悪戦苦闘していた日々姫は、\n僕と真闇姉以外の誰とも接触していない。
3116 = "一直在創作海報的苦海中奮鬥的日日姬沒有接觸過除了我和真闇姐以外的任何人。" 

# monologue
# JP: あの会合の参加者は大人数ではなかったとはいえ、\n見知らぬ者も、幾人かは参加していたことだし。
3236 = "參加那次聚會的人雖說不多，但也有幾個陌生人在裡面。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしが、もっとちゃんと口止めをしているか――\nもっと早くに公表していたら」
2779 = "「要是我好好地下鉗口令——或是更早地公布出來的話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「人の口に戸は立てられぬと昔から言うし、\n実現可能性の見えぬ段階での公表は諸刃の剣だ」
1913 = "「“人嘴堵不住”，這是一句老話了。而且在還看不見實現可能性的階段就公布出來也只會是把雙刃劍」" 

# monologue
# JP: 僕の言葉に、真闇姉は鷹揚な頷きを重ねる。
3622 = "真闇姐聽了我的話也悠然地點點頭。" 

# 【真闇】
# display as 真闇
# JP: 「こぎゃんと見事に丸飲みされなきゃ、\n知られたところで、痛くも痒くも無かった話やったけん」
2674 = "「本來就算被他們知道，對我們來說也不痛不癢。誰能想到他們會照搬我們的方案」" 

# 【ポーレット】
# display as 波萊特
# JP: 「は……い」
1926 = "「……唔」" 

# monologue
# JP: フォローされても、ポーレットの顔色は戻らない。\n凪が、戸惑ったような声を出す。
3343 = "就算真闇姐安慰她，波萊特的臉色也還是沒有恢復。凪一臉疑惑地問道：" 

# 【凪】
# display as 凪
# JP: 「丸のみされると、何がそこまで困るとよ？」
2692 = "「為什麼方案被照搬會讓大家覺得這麼困擾呢？」" 

# monologue
# JP: ふかみとれいなも、凪の疑問に同時に頷く。
3571 = "深美和玲奈也都點點頭表示相同的疑問。" 

# monologue
# JP: 自分自身を落ち着かせるのにもちょうどいい、\nここでいったん整理し、説明しておこう。
3523 = "正好是個讓自己冷靜下來的好機會，我就暫且把事情整理說明一遍吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「現在の日々姫陣営の主体は、旧ポーレット陣営と、\n鉄道ボランティアからの参加組との、二系統だ」
2711 = "「現在，日日姬陣營的主體是由舊波萊特陣營和鐵路志願者參加組這兩個系統構成的」" 

# 【凪】
# display as 凪
# JP: 「そんくらいウチにもわかるばい」
2859 = "「這種事咱也知道啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「旧ポーレット陣営はクマ川水系の保護と工場誘致反対で\n一枚岩。以前は日々姫支持に乗り切れてなかったが――」
2773 = "「舊波萊特陣營在隈河水系保護與反對引進工廠方面非常團結。以前還沒有完全徹底倒向支持日日姬這一邊——」" 

# 【ふかみ】
# display as 深美
# JP: 「ゼロから考えなおしたい……って、\n日々姫さんが言ったから。です？」
1928 = "「……因為日日姬說想要從零開始重新思考。吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁな。稀咲と先輩後輩の関係にあることも、\nあらん疑惑をかきたててしまった一因だろう」
2660 = "「是的。而且她和稀咲的學姐學妹的關係也是讓他們產生不必要的疑惑的其中一個原因」" 

# monologue
# JP: 日々姫が工場誘致派に転ぶのではないか――
3494 = "日日姬會不會倒向支持引進工廠派那邊去——" 

# monologue
# JP: その懸念は、旧ポーレット陣営の選対幹部から、\n僕も直接、ぶつけられたことがある。
3737 = "關於這種擔憂，我也直接被舊波萊特陣營的選舉對策幹部當面質問過。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、日々姫がゼロベースで考えているのは、\n環境保護と経済振興の両立の方法だとご理解いただけた」
2264 = "「不過，倒是成功地讓他們理解了日日姬想要從零開始思考的問題，是如何讓環境保護與經濟振興兩立的方法」" 

# 【ポーレット】
# display as 波萊特
# JP: 「経済振興は、車輌再生プロジェクトを中心に果たせます。\nそうなれば、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の必要も消せますから」
2297 = "「以車輛新生計劃為中心來完成經濟振興。這樣的話，也就可以讓引進\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠的必要性消失了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その説得で、ポーレット支持層は日々姫支持で固まった。\n丸飲み案もこの層には影響せんだろう」
2863 = "「通過向波萊特支持階層說明這個觀點，他們對日日姬的支持就鞏固了。方案被照搬也不會對這個階層產生什麼影響吧」" 

# 【凪】
# display as 凪
# JP: 「なら、何がそんなにマズかとよ？」
2879 = "「那到底是什麼東西那麼糟啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道ボランティアからの参加組――\nつまりは、我々により近い、技術者集団の方だ」
2908 = "「鐵路志願者參加組——也就是那些離我們更近的技工集團的人」" 

# 【凪】
# display as 凪＆深美
# JP: 「へ？」\n「え？」
2404 = "「哎？」\\n「哎？」" 

# monologue
# JP: 凪とふかみが同時に疑問の声をあげ、\nゆずりあうように顔を見合わせる。
3218 = "凪和深美同時發出疑問，然後像是在互相謙讓一樣對了對眼。" 

# monologue
# JP: ややあって、\nふかみがおずおず、挙手をしてから声を出す。
3727 = "過了幾秒鐘後，深美總算膽膽怯怯地舉起了手說道：" 

# 【ふかみ】
# display as 深美
# JP: 「ええと。だって、職人さんたちこそ、車輛再生の\nプロジェクト。のりのりな感じでしたです。よ？」
2413 = "「唔，可是那些工匠們不是對車輛再生計劃感到特別高興嗎？」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　みーんな、やるき満々のバリバリばい！」
2649 = "「是啊！大家都充滿幹勁呢！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさしく、彼らはこの計画を何としても実現させたい。\n無論、環境保全を優先に考えてくれる方もいようが――」
2469 = "「嗯，他們當然想無論如何都要實現這個計劃。當然這之中也有著優先考慮環境保護的人——」" 

# 【ふかみ】
# display as 深美
# JP: 「わかった凪ちゃん！　\n車輌再生プロジェクトが、実現するのが一番ならさ」
2597 = "「我知道了小凪！因為他們認為車輛新生計劃的實現是最重要的」" 

# 【凪】
# display as 凪
# JP: 「うん？」
2941 = "「？？？」" 

# 【ふかみ】
# display as 深美
# JP: 「実現だけが目的で、クマ川のことがどうでもよければ。\n……銀行さんがやってくれた方が、ずっと安心」
2517 = "「如果目的只是這個計劃的實現，而隈河變成什麼樣都不要緊的話……當然讓銀行的人去幹要安心得多了」" 

# 【凪】
# display as 凪
# JP: 「あ――そりゃそうばいね」
2418 = "「啊——那倒也是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり。銀行主体であるのなら、\n事業の信用度や安定度は、各段に跳ね上がるからな」
2683 = "「沒錯。如果是銀行主體的話，不論是事業的信用度還是穩定度都會提升一個大台階」" 

# 【真闇】
# display as 真闇
# JP: 「そこに、『\x%lエアクラ;#00ffc040;エアクラ%l;#;シティ御一夜』\nこの都市モデルが後押しばしてきよるけんねぇ」
2770 = "「而且，那座“\\x%lエアクラ;#00ffc040;空凝機%l;#;之城御一夜”的城市模型也在後面做推手呢」" 

# monologue
# JP: 真闇姉がばさばさと新聞を広げて見せる。
3617 = "真闇姐嘩啦啦地攤開報紙給我們看。" 

# monologue
# JP: 大写しの写真の中の都市モデルは、\n平面となってなお強い魅力を放っている。
3589 = "特寫照片裡的城市模型就算印在平面上，也仍然釋放著強烈的魅力。" 

# 【真闇】
# display as 真闇
# JP: 「観光を捨てて、工業都市として御一夜ば再生させる。\n技師や職人には、むしろ魅力的なプランよね」
2623 = "「放棄觀光，讓御一夜作為工業都市獲得新生。對技師和工匠來說倒不如這個方案更有魅力呢」" 

# 【凪】
# display as 凪
# JP: 「そぎゃんとしたら！\n捨つるは、観光じゃなく環境になるばいっ！」
2525 = "「如果這樣的話！丟掉的可不是觀光而是環境了！」" 

# 【ふかみ】
# display as 深美
# JP: 「この都市モデルも綺麗。です。けど！\n御一夜の自然とクマ川の水の方が、もっと綺麗。です！」
2920 = "「雖然這座城市模型是很漂亮，但是御一夜的自然與隈河的水更漂亮。嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。僕もそう思う」
2651 = "「是啊，我也這麼想」" 

# monologue
# JP: 人の手が作っていくものと。\n自然にできているものと。
3159 = "人工創造出來的東西和自然形成的東西。" 

# monologue
# JP: どちらも美しく価値があり――\nならば保全すべきは、人の手で再生が利かない後者だ。
3130 = "不論哪一方都很美也很有價值——那應該保全的當然應該是靠人手無法再生的後者了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう思うし――\n誰もが本当はわかっているとも思うのだ」
2587 = "「我既這麼想——也認為不論是誰其實都懂這個道理」" 

# monologue
# JP: わかっていても、見失う。\n単純で当然な真実ほどに、いとも簡単に紛れてしまう。
3740 = "雖然誰都懂，但卻還是迷失了自我。越是單純和理所當然的事實，越是容易讓人忘卻。" 

# monologue
# JP: 窒息を感じるその瞬間まで、\n空気の価値を、人は認識できんのだから。
3598 = "畢竟直到窒息的那個瞬間，人是無法認識到空氣的價值的。" 

# 【凪】
# display as 凪
# JP: 「ほんなら！　もっとはっきりわからせてやらんとっ！」
2896 = "「那麼！必須讓他們清楚地知道才行！」" 

# 【真闇】
# display as 真闇
# JP: 「そーね。ゆーか……そーできんなら負けったい。\n誰にでもわかる形で、失われるものの大きさば示さんと」
2645 = "「是呢，不如說……如果不這樣做咱們就輸了。必須以一種誰都能理解的形式來讓大家看看會失去的東西有多麼重要」" 

# 【日々姫】
# display as 日日姬
# JP: 「ごめ――んむっ！？」
2536 = "「對不——唔！？」" 

# monologue
# JP: 『ごめんなさい』と言わせたくなく、\n言う必要などないと伝えたく、日々姫を胸に押しつける。
3382 = "我不想讓日日姬說出『對不起』，同時也想傳達給她“沒有必要說”的意思，於是又緊緊把她按向懷裡。" 

# monologue
# JP: その姿勢のまま――\nなにか手段がないかどうかを考え、探し求め――っ！！？
3390 = "我保持著這個姿勢——在腦海中認真思考有沒有什麼能打破這種場面的手段——啊！！？" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
2690 = "「波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい？」
2480 = "「嗯？」" 

# monologue
# JP: ずっと、この店にあったから、背景同然に思っていた。
3118 = "一直存在於這個店裡的，我已經想當然地認為是背景圖的一部分的東西。" 

# monologue
# JP: ハチロクとれいなの模型実演のときにさえ、\n『模型の線路』としか思っていなかった。
3345 = "就連在八六和玲奈進行模型實演的時候，我也一直把它當成是“鐵路模型”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これを――使えんか？」
2845 = "「這個——能不能利用呢？」" 

# monologue
# JP: が、よくよく見れば、このジオラマは\n懐かしい……御一夜の、昔の風景にしか思えなくなる。
3135 = "不過，仔細研究一番後，讓人覺得這座模型真是充滿了懷念感……完全讓人覺得這就是過去的御一夜風景。" 

# 【ポーレット】
# display as 波萊特
# JP: 「これって――これ？\nNのレイアウトのことですか？」
2309 = "「你是說這個？Ｎ場景模型嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「えぬのれいあうと？」
2943 = "「Ｎ場景模型？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、ごめんなさい。Nって、エヌゲージです。\nnine-gauge――線路幅９ミリの鉄道模型のことです」
2439 = "「啊，對不起。Ｎ是指ｎｉｎｅ－ｇａｕｇｅ——９毫米鐵軌間距的鐵路模型啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは理解してる。\nレイアウトとは――このジオラマのことか？」
2450 = "「啊，這個我知道。場景模型就是指這個微縮景觀模型嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうです。Nの世界では、ジオラマじゃなく、\nレイアウトっていうのが普通みたいです」
2476 = "「嗯，是的。在Ｎ的世界裡一般不是叫微縮景觀模型，而是叫場景模型」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、このレイアウトが生きている姿を、\n間近で、実際に見てみたいのだが」
2895 = "「那麼我想近距離看一看這個場景模型活動起來的樣子」" 

# 【ポーレット】
# display as 波萊特
# JP: 「すぐ用意します！　っていってもパパの遺品ですから、\nわたしも、そんなに詳しくはないんですけど――」
2600 = "「我馬上去準備！不過畢竟這是爸爸的遺物，我對它也不是很熟悉——」" 

# monologue
# JP: いいながら、\nポーレットは頭をカウンターの下へと潜らせる。
3321 = "她邊說邊往櫃臺下面鑽了進去。" 

# 【ハチロク】
# display as 八六
# JP: 「あら。あのときの」
2448 = "「啊，是那個時候的」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへー、れいなのレイナナなのです！」
2402 = "「哎嘿嘿，是玲奈的０７啦！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「で」
# 2410 = "「唔」" 

# monologue
# JP: またごそごそ。\n今度はもっと大きなものが飛び出してくる。
3238 = "又傳來了嘎吱嘎吱的聲響，一個更大的東西被甩了出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、\x%l運転台;#00ffc040;運転台%l;#;？」
2288 = "「什麼啊，這是\\x%l運転台;#00ffc040;駕駛台%l;#;？」" 

