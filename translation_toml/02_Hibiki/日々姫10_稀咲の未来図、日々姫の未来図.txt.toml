[script]
# lines: 497 
# 【浦上】
# display as 浦上
# JP: 「稀咲様。セッティングが整いました」
2743 = "「Thưa cô Kisaki. Mọi thứ đã chuẩn bị xong xuôi rồi ạ.」"
# monologue
# JP: ドアの外から浦上の声。\nボクの準備も、もう終わっている。
3736 = "Tiếng của Uragami vọng vào từ ngoài cửa. Sự chuẩn bị của tôi cũng đã hoàn tất."
# 【稀咲】
# display as 稀咲
# JP: 「いいよ。通して」
2478 = "「Được rồi. Cho vào đi.」"
# 【浦上】
# display as 浦上
# JP: 「畏まりました」
2279 = "「Đã rõ thưa cô.」"
# monologue
# JP: インタビューなんて好きじゃない。
3386 = "Tôi chẳng thích mấy vụ phỏng vấn chút nào."
# monologue
# JP: 話すべきことは政見放送にまとめてあるし、\n公示直後の記者会見でも過不足なく伝えた筈だ。けど――
3405 = "Những điều cần nói tôi đã gom gọn trong buổi phát sóng chính cương, và trong buổi họp báo ngay sau khi công bố cũng đã truyền đạt đầy đủ rồi. Nhưng――"
# monologue
# JP: （コンコン）
3764 = "（Cốc cốc）"
# 【記者Ａ】
# display as 市川
# JP: 「失礼します」
2505 = "「Xin thất lễ.」"
# 【稀咲】
# display as 稀咲
# JP: 「やぁ、ようこそいらっしゃいました、\n隈元新報の市川さん」
2380 = "「Chào anh, rất hân hạnh được đón tiếp, anh Ichikawa của tờ Kumamoto Shimpo.」"
# monologue
# JP: 笑顔で立ち上がる。名前を呼ぶ。こちらから握手を求める。\n――こうした些細なことの効果は決してバカに出来ない。
3403 = "Mỉm cười đứng dậy. Gọi tên. Chủ động bắt tay. ――Hiệu quả của những hành động nhỏ nhặt này tuyệt đối không thể xem thường."
# monologue
# JP: “過不足無し”では常に足りない。\n誰しもが「自分だけ」には、特別なサービスを求めるのだ。
1877 = "\"Không thừa không thiếu\" thì lúc nào cũng là không đủ. Bất cứ ai cũng mong muốn một dịch vụ đặc biệt dành riêng cho \"chỉ mình mình\"."
# 【稀咲】
# display as 稀咲
# JP: 「インタビューの機会を設けていただけましたこと、\nとても嬉しく思います」
2857 = "「Tôi rất vui vì cô đã sắp xếp thời gian để tôi có cơ hội phỏng vấn.」"
# 【記者Ａ】
# display as 市川
# JP: 「こちらこそ、\n市長就任前の貴重なお時間をありがとうございます」
2577 = "「Tôi mới là người phải cảm ơn, vì cô đã dành chút thời gian quý báu trước khi nhậm chức thị trưởng.」"
# 【稀咲】
# display as 稀咲
# JP: 「まだ投票も済んでいません。\nお世辞とわかっていても、プレッシャーを感じますよ」
2616 = "「Việc bỏ phiếu còn chưa xong mà. Dù biết là lời nịnh nọt nhưng tôi vẫn cảm thấy áp lực đấy.」"
# 【記者Ａ】
# display as 市川
# JP: 「いやいや、これは少しばかり気が早すぎましたか」
2401 = "「Ây da, tôi có hơi cầm đèn chạy trước ô tô quá không nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「あははっ、お上手ですね」
2431 = "「Ahaha, anh khéo đùa thật.」"
# monologue
# JP: “特別”を感じさせるための、社交辞令とお世辞の応酬。\n和やか親しい雰囲気を演出するためだけの笑い。
3724 = "Những lời xã giao và tâng bốc qua lại để tạo cảm giác \"đặc biệt\". Những nụ cười chỉ nhằm mục đích tạo ra một bầu không khí thân thiện, hòa nhã."
# monologue
# JP: インタビューも同じ。つまるところ、不特定多数に対する、\n“特別なサービス”の提供だ。
3446 = "Phỏng vấn cũng vậy. Suy cho cùng, nó là việc cung cấp \"dịch vụ đặc biệt\" cho vô số người không xác định."
# 【稀咲】
# display as 稀咲
# JP: 「ボク以外の候補のみなさんにも、\n同じことをおっしゃってるんではないですか？」
2568 = "「Chắc anh cũng nói y hệt như vậy với các ứng cử viên khác chứ gì?」"
# monologue
# JP: だから、ひねりすぎない言葉を選ぶ。
3439 = "Do đó, tôi chọn những từ ngữ không quá bóng gió."
# monologue
# JP: “わかる”と感じてもらえないなら、\n共感を得ることも不可能になる。
3128 = "Nếu không thể làm cho họ cảm thấy \"tôi hiểu\", thì việc giành được sự đồng cảm cũng là bất khả thi."
# 【記者Ａ】
# display as 市川
# JP: 「そこまでのことはしませんよ。\nインタビュー予定の候補者さん、他にお一方だけですし」
2254 = "「Tôi đâu có làm đến mức đó. Ngoài cô ra, tôi chỉ dự định phỏng vấn thêm một ứng cử viên nữa thôi.」"
# 【稀咲】
# display as 稀咲
# JP: 「一人だけ」
2239 = "「Chỉ một người.」"
# monologue
# JP: なら対立構図が、マスコミのいかにも好む絵になる……\n煽ったときに盛り上がる、その相手しかありえない。
3732 = "Vậy thì cục diện đối lập sẽ trở thành bức tranh mà giới truyền thông cực kỳ yêu thích…… Kẻ duy nhất có thể làm tăng sức nóng khi bị khiêu khích."
# 【稀咲】
# display as 稀咲
# JP: 「――右田日々姫候補ですか」
1908 = "「――Là ứng cử viên Migita Hibiki sao?」"
# 【記者Ａ】
# display as 市川
# JP: 「ご明察です。やはり、気になる存在ですか？」
2569 = "「Cô đoán đúng rồi. Quả nhiên, đó là một sự tồn tại khiến cô phải bận tâm sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「ええ。\n学園で、同じクラブの先輩後輩の仲ですから」
2456 = "「Vâng. Vì chúng tôi là tiền bối và hậu bối cùng câu lạc bộ ở trường mà.」"
# 【記者Ａ】
# display as 市川
# JP: 「おっと、その辺の話は少し待ってくださいね。\nテープ、回してよろしいですか？」
2484 = "「Ấy, xin hãy đợi một chút trước khi nói về chuyện đó. Tôi bật máy ghi âm được chứ?」"
# 【稀咲】
# display as 稀咲
# JP: 「ご自由に」
2793 = "「Cứ tự nhiên.」"
# monologue
# JP: テープといいつつ、取り出されるのはＩＣレコーダー。\n大雑把かつ古い人間だな、と感じてしまう。
3171 = "Miệng nói là máy ghi âm băng từ, nhưng thứ lấy ra lại là máy ghi âm IC. Khiến tôi cảm thấy ông ta đúng là một người vừa cẩu thả vừa cổ hủ."
# monologue
# JP: こういう男に、日々姫のことを論評されたいとは思わない。\n流れを、一度切ってしまおう。
3393 = "Tôi không muốn một gã như thế này bình luận về Hibiki. Phải cắt ngang mạch chuyện này một lần thôi."
# 【稀咲】
# display as 稀咲
# JP: 「それで――今日のインタビューでは、\nどのようなお話をさせていただけば？」
2893 = "「Vậy――trong buổi phỏng vấn hôm nay, tôi nên nói về những vấn đề gì đây?」"
# 【記者Ａ】
# display as 市川
# JP: 「まず、立候補会見の際に打ち出してらした都市計画、\n『エアクラシティ御一夜』についてお伺いできればと」
2938 = "「Đầu tiên, tôi muốn hỏi về dự án quy hoạch đô thị 『Thành phố Aircra Ohimitera』 mà cô đã đưa ra trong buổi họp báo tranh cử.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうですか。\nでしたら、こちらから御覧ください」
2652 = "「Vậy sao.\nNếu thế thì, xin mời anh xem qua cái này.」"
# monologue
# JP: 1/1000スケールの都市モデル――\n現在の御一夜ではなく、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致後の。
3774 = "Mô hình đô thị tỷ lệ 1/1000―― Không phải là Ohimitera hiện tại, mà là sau khi thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;."
# monologue
# JP: 精密にかつ美麗に作りこまれたそれは、\n仮住まいである支店長室を殆ど埋め尽くすほどに大きい。
3680 = "Mô hình được chế tác vô cùng tinh xảo và lộng lẫy, to đến mức gần như chiếm trọn cả căn phòng giám đốc chi nhánh mà tôi đang tạm trú."
# 【記者Ａ】
# display as 市川
# JP: 「ああ、これは……いや、\n立候補会見のときにも遠目では拝見しましたが」
2489 = "「À, cái này…… chà, lúc họp báo tranh cử tôi cũng có nhìn thấy từ xa rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「今日は市川さんの独り占めですから。\n細部まで、お気の済むまでじっくりどうぞ」
2293 = "「Hôm nay anh Ichikawa được độc chiếm nó đấy. Cứ từ từ mà ngắm nghía từng chi tiết cho thỏa thích nhé.」"
# 【記者Ａ】
# display as 市川
# JP: 「見れば見るほど……いや、じつに見事なものですねぇ」
2807 = "「Càng nhìn càng thấy…… chà, quả thực là một tác phẩm tuyệt vời.」"
# monologue
# JP: エアロ＝クラフテック社の専門部署の製作だ。\n工場誘致を推進する――その目的のためだけの。
3725 = "Là sản phẩm do bộ phận chuyên môn của công ty Aero-Craftech chế tạo. Chỉ nhằm một mục đích duy nhất――đó là thúc đẩy việc thu hút nhà máy."
# monologue
# JP: 見事でなければ意味が無い。\n見事であるに留まらず、魅力的なものでなければ。
3684 = "Nếu không tuyệt vời thì chẳng có ý nghĩa gì cả. Không chỉ tuyệt vời, mà còn phải đầy sức quyến rũ."
# 【記者Ａ】
# display as 市川
# JP: 「発船所の東にドン、と工場が出来るわけですか」
2272 = "「Vậy là một nhà máy to tướng sẽ được dựng lên ở phía đông bến thuyền sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「ええ。エアロ＝クラフテック機関の心臓部である、\nキルクイティウムの精製には豊富な真水が必要ですから」
2458 = "「Vâng. Để tinh chế Circuithium, trái tim của động cơ Aero-Craftech, thì cần một lượng lớn nước ngọt.」"
# 【記者Ａ】
# display as 市川
# JP: 「承知してます。\n実際、既存の\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の全ては――」
2848 = "「Tôi hiểu rồi. Thực tế thì, tất cả các nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; hiện có đều――」"
# monologue
# JP: 記者は、ポケットから手帳を取り出す。
3695 = "Nhà báo rút cuốn sổ tay từ trong túi ra."
# 【記者Ａ】
# display as 市川
# JP: 「[イシカリ,1]石借川、[キタカミ,1]北神川、[モガミ,1]最紙川、[シナノ,1]品野川、[ジンツウ,1]陣痛川、[キソ,1]基礎川、\n[クズリュウ,1]葛龍川、[カコ,1]過去川、[キノ,1]木ノ川、[イビ,1]伊日川、[シマント,2]四万斗川、[チクゴ,1]築後川」
2733 = "「Sông Ishikari, sông Kitakami, sông Mogami, sông Shinano, sông Jintsu, sông Kiso, sông Kuzuryu, sông Kako, sông Kino, sông Ibi, sông Shimanto, sông Chikugo.」"
# monologue
# JP: よく調べてある。\nこの全ては、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場が取水していて、なおかつ――
3169 = "Điều tra kỹ đấy. Tất cả những nơi này đều là nguồn lấy nước của nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, hơn nữa――"
# 【記者Ａ】
# display as 市川
# JP: 「一級水系――国が重要と認めている水系だけでも、\nこれだけの川が\x%lエアクラ;#00ffc040;エアクラ%l;#;工場と共存している」
2323 = "「Hệ thống sông ngòi cấp một――chỉ tính riêng những hệ thống sông ngòi được quốc gia công nhận là quan trọng, đã có chừng này con sông đang cùng tồn tại với nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# monologue
# JP: その通り。\nとなれば次は――答えたくない質問が来る。
3533 = "Chính xác. Vậy thì tiếp theo――sẽ là câu hỏi mà tôi không muốn trả lời."
# 【記者Ａ】
# display as 市川
# JP: 「つまり、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場からの排水の安全性は、\n国が保障していると考えても差し支えないわけですね？」
2271 = "「Tóm lại, sự an toàn của nước thải từ nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, có thể coi là đã được quốc gia bảo đảm đúng không?」"
# monologue
# JP: 質問の形をした事実確認――いや、世論誘導。
3172 = "Một sự xác nhận sự thật dưới vỏ bọc câu hỏi――không, là định hướng dư luận."
# monologue
# JP: そこに平然と乗れるほど、\nボクは大人に、なりきれてない。
3436 = "Tôi vẫn chưa đủ trưởng thành, để có thể điềm nhiên hùa theo điều đó."
# 【稀咲】
# display as 稀咲
# JP: 「それについては、浦上から。\n浦上は」
2842 = "「Về chuyện đó, để Uragami giải thích.\nUragami là」"
# 【記者Ａ】
# display as 市川
# JP: 「ああ、既にお名刺をいただいたことが。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社からの出向社員の方ですよね」
2440 = "「À, tôi đã nhận được danh thiếp của cậu ấy rồi. Là nhân viên biệt phái từ công ty \\x%lエアクラ;#00ffc040;Aircra%l;#; đúng không?」"
# 【浦上】
# display as 浦上
# JP: 「ご質問の件については、それでは自分から。\nエアロ＝クラフテック工場からの排水は、全て……」
2571 = "「Về câu hỏi của anh, xin phép để tôi trả lời. Nước thải từ nhà máy Aero-Craftech, tất cả đều……」"
# monologue
# JP: 滔々と、浦上が排水の安全性を説明していく。\nいちいち、ご説ごもっとも。ボクだって十分理解している。
3563 = "Uragami thao thao bất tuyệt giải thích về sự an toàn của nước thải. Câu nào câu nấy đều rất có lý. Ngay cả tôi cũng hoàn toàn hiểu rõ."
# monologue
# JP: いや…………九分九厘は理解し、納得できている。\nけど――
3120 = "Không………… mười phần thì tôi đã hiểu và chấp nhận đến chín phần chín. Nhưng――"
# monologue
# JP: （どうしてそれほど安全なら、[タマ,1]多麻川、[アラ]粗川、[トネ]舎川、\n[ヨド,1]余土川――大都市圏の水系に立地しないんだ）
3767 = "（Nếu an toàn đến vậy, tại sao lại không đặt ở sông Tama, sông Arakawa, sông Tone, sông Yodo――những hệ thống sông ngòi thuộc khu vực đại đô thị cơ chứ.）"
# monologue
# JP: ……答えのわかりきっている、\nあまりに子供じみてる疑問。
1895 = "……Một câu hỏi quá đỗi trẻ con, mà câu trả lời đã quá rõ ràng."
# monologue
# JP: 直視しようとしてしまうなら、\nボクは自分に、言い訳だけしか出来なくなる。
3328 = "Nếu cứ cố chấp nhìn thẳng vào nó, tôi sẽ chỉ có thể tự bao biện cho chính mình."
# monologue
# JP: （つまり、リスクはあるんだろうさ。けど――\n何のリスクも取らずに、地方都市の経済を再生なんて）
3756 = "（Nói tóm lại, rủi ro là có. Nhưng―― Nếu không chịu bất kỳ rủi ro nào, thì làm sao có thể vực dậy nền kinh tế của một thành phố địa phương được chứ.）"
# 【記者Ａ】
# display as 市川
# JP: 「わかりやすいご説明で納得できました。\nでは、質問を都市モデルの方に戻しますが――」
2575 = "「Tôi đã bị thuyết phục bởi lời giải thích rất dễ hiểu của cậu. Vậy, tôi xin phép quay lại với mô hình đô thị――」"
# monologue
# JP: 浦上の説明が、いつの間にやら終わっている。\nだけど慌てて表情を取り繕う必要なんてない。
3567 = "Lời giải thích của Uragami đã kết thúc từ lúc nào không hay. Nhưng tôi cũng chẳng cần phải vội vàng che giấu biểu cảm của mình."
# monologue
# JP: 営業スマイルならば顔面に張り付いている。\n“外そう”と意識をせねば、外せないほど。
1878 = "Nụ cười xã giao đã dính chặt trên khuôn mặt tôi rồi. Đến mức nếu không có ý thức \"gỡ nó xuống\" thì không thể nào gỡ ra được."
# 【記者Ａ】
# display as 市川
# JP: 「鉄道路線と\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;がこのモデルにもありますね？」
2850 = "「Tuyến đường sắt và \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; cũng có trong mô hình này nhỉ?」"
# 【稀咲】
# display as 稀咲
# JP: 「御一夜鉄道株式会社様の\x%l8620;#00ffc040;8620%l;#;をイメージしてます。\n工場誘致で住宅圏が広がれば、鉄道の重要性も増します」
2852 = "「Đó là hình ảnh mô phỏng \\x%l8620;#00ffc040;8620%l;#; của Công ty Cổ phần Đường sắt Ohimitera. Nếu khu dân cư được mở rộng nhờ việc thu hút nhà máy, tầm quan trọng của đường sắt cũng sẽ tăng lên.」"
# 【記者Ａ】
# display as 市川
# JP: 「通勤需要や通学需要」
2245 = "「Nhu cầu đi làm và đi học nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうです。ですので\x%lエアクラ;#00ffc040;エアクラ%l;#;と鉄道の共存、\n両立――それは必須のこととなります」
2656 = "「Đúng vậy. Do đó, sự cộng sinh giữa \\x%lエアクラ;#00ffc040;Aircra%l;#; và đường sắt, sự tồn tại song song――đó là điều bắt buộc.」"
# monologue
# JP: 納得顔で記者が頷く。
3696 = "Nhà báo gật đầu với vẻ mặt thấu hiểu."
# 【記者Ａ】
# display as 市川
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;の作動不能地帯を抱える御一夜ならでは、\nの重要性となりますか」
2854 = "「Tầm quan trọng đó, chỉ có ở một nơi có khu vực \\x%lエアクラ;#00ffc040;Aircra%l;#; không thể hoạt động như Ohimitera thôi sao?」"
# 【浦上】
# display as 浦上
# JP: 「あ。その点、念のため補足させてください」
2424 = "「À. Về điểm đó, để chắc chắn, xin cho phép tôi bổ sung thêm.」"
# monologue
# JP: 浦上の視線は、記者にではなくボクに向いてる。\n頷き返せば、すぐさま言葉は重なっていく。
3565 = "Ánh mắt của Uragami không hướng về phía nhà báo mà là tôi. Khi tôi gật đầu đáp lại, những lời nói lập tức tuôn ra."
# 【浦上】
# display as 浦上
# JP: 「エアロ＝クラフテック社は旧来の交通機関との共存を\n目指しています。御一夜に限っての話ではありません」
2753 = "「Công ty Aero-Craftech luôn hướng tới sự cộng sinh với các phương tiện giao thông truyền thống. Đây không phải là câu chuyện chỉ giới hạn ở Ohimitera.」"
# 【記者Ａ】
# display as 市川
# JP: 「おっと、そうでしたね。理解しています」
2486 = "「Ây da, đúng vậy nhỉ. Tôi hiểu rồi.」"
# monologue
# JP: 単純な利便性と経済性のみを人が追求していけば、\n旧来の交通機関は自然淘汰されてしまう。
3325 = "Nếu con người chỉ theo đuổi sự tiện lợi và tính kinh tế đơn thuần, thì các phương tiện giao thông truyền thống sẽ bị đào thải tự nhiên."
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;は、交通に関する思考停止を強いてくるほど、\n簡便で高効率の移動を提供してくれるから。
76 = "Bởi vì \\x%lエアクラ;#00ffc040;Aircra%l;#; cung cấp một phương thức di chuyển đơn giản và hiệu quả cao, đến mức buộc người ta phải ngừng suy nghĩ về giao thông."
# 【稀咲】
# display as 稀咲
# JP: 「けど――」
2304 = "「Nhưng――」"
# monologue
# JP: 地磁気など、誰にもコントロールできるものではない。\n太陽光にしても同じことだ。
3276 = "Địa từ và những thứ tương tự, không ai có thể kiểm soát được. Ánh sáng mặt trời cũng vậy."
# monologue
# JP: 何かの異変が起こり、\x%lエアクラ;#00ffc040;エアクラ%l;#;の作動不能が\n広域に発生してしまう可能性もゼロではない。
3669 = "Khả năng xảy ra một biến cố nào đó khiến \\x%lエアクラ;#00ffc040;Aircra%l;#; không thể hoạt động trên diện rộng cũng không phải là con số không."
# monologue
# JP: （常用できる交通手段は複数系統なければならない。\nそれは、少し考えれば当たり前のことなのに――）
3762 = "（Các phương tiện giao thông thường dùng phải có nhiều hệ thống khác nhau. Đó là điều hiển nhiên chỉ cần suy nghĩ một chút là nhận ra――）"
# 【記者Ａ】
# display as 市川
# JP: 「御一夜鉄道さんの動きも、それでは、\n隈銀さんが関与されてのものなのですかね？」
2856 = "「Vậy thì, những động thái của Đường sắt Ohimitera, cũng có sự can thiệp của Ngân hàng Kumamoto sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「動き？」
2352 = "「Động thái?」"
# 【記者Ａ】
# display as 市川
# JP: 「ああ……っと、まだ公表されてませんでしたっけ？\n『鉄道車輌再生』のプロジェクトのことですよ」
2422 = "「À…… ơ, chuyện đó vẫn chưa được công bố sao? Dự án 『Tái sinh toa xe đường sắt』 ấy.」"
# monologue
# JP: 浦上を見る。\n“とんでもない”と声を出さずに口だけが動く。
3424 = "Tôi nhìn Uragami. Khẩu hình miệng cậu ta mấp máy chữ \"Không hề\" mà không phát ra tiếng."
# 【稀咲】
# display as 稀咲
# JP: 「……少なくともボクの関与ではないけれど。\nそれは、どんなプロジェクトなのかな？」
1931 = "「……Ít nhất thì không có sự can dự của tôi. Đó là một dự án như thế nào vậy?」"
# 【記者Ａ】
# display as 市川
# JP: 「いや、まだ公表してないんなら、\n実現の可能性が低い話なのかもしれませんがね――」
2427 = "「Chà, nếu vẫn chưa công bố, thì có lẽ đó là một câu chuyện có khả năng thực hiện thấp chăng――」"
# monologue
# JP: ……未公表の話を聞きつけているあたり、\nさすがは記者、ということなのだろう。
1893 = "……Nghe ngóng được cả những chuyện chưa công bố, quả không hổ danh là nhà báo."
# monologue
# JP: 太鼓持ち程度に考え、内心見くびってしまっていた、\n自分の浅さを、少し反省させられる。
3143 = "Chỉ coi ông ta như một kẻ bợ đỡ, trong thâm tâm tôi đã coi thường ông ta, tôi phải tự kiểm điểm lại sự nông cạn của bản thân một chút."
# 【記者Ａ】
# display as 市川
# JP: 「――って話なんですよ。私なんかにゃ良くできた計画に\n思えましたんで、隈銀さんの立案かなぁ……と」
1906 = "「――Chuyện là như vậy đấy. Tôi thấy đó là một kế hoạch khá tốt, nên cứ nghĩ là do Ngân hàng Kumamoto đề xuất cơ……」"
# 【稀咲】
# display as 稀咲
# JP: 「いや……」
2246 = "「Không……」"
# monologue
# JP: ボクじゃない。浦上でもない。
3125 = "Không phải tôi. Cũng không phải Uragami."
# monologue
# JP: 父がわざわざ塩を送って、\n工場誘致成功の確率を下げてしまうなどありえない。
3587 = "Cha tôi cũng không đời nào lại đi tiếp tay cho địch, làm giảm xác suất thành công của việc thu hút nhà máy."
# 【稀咲】
# display as 稀咲
# JP: 「[まくら,1]真闇女史――\nあるいは、ポーレット前市長の？」
2668 = "「Là cô Mayami――\nHay là của cựu thị trưởng Paulette?」"
# 【記者Ａ】
# display as 市川
# JP: 「じゃ、ないらしいんです。右田日々姫……\nあのお嬢ちゃん候補の立案だ、って話でして」
2303 = "「Có vẻ, không phải vậy. Migita Hibiki…… Nghe nói đó là đề xuất của cô bé ứng cử viên đó.」"
# 【稀咲】
# display as 稀咲
# JP: 「日々姫が？」
2630 = "「Hibiki á?」"
# 【記者Ａ】
# display as 市川
# JP: 「まぁ、候補者に高下駄を履かせてるだけかもですが。\nどうにもね？　そういう感じでもないんでして、これが」
2417 = "「Chà, có thể họ chỉ đang tâng bốc ứng cử viên thôi. Nhưng mà sao nhỉ? Cảm giác lại không giống như vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、だから、隈銀の……もっと有り体に言えば、\n日々姫の先輩であるボクの立案じゃないかと考えたのか」
2444 = "「À, ra vậy, nên anh mới nghĩ đó là đề xuất của Ngân hàng Kumamoto…… nói thẳng ra là của tôi, đàn chị của Hibiki đúng không.」"
# 【記者Ａ】
# display as 市川
# JP: 「はぁ」
2395 = "「Vâng.」"
# monologue
# JP: どうとも取れる笑みを浮かべて、記者は頭をポリ、と掻く。\nいかにも凡庸に見える仕草だ。
3165 = "Nở một nụ cười khó đoán, nhà báo gãi gãi đầu. Một hành động trông có vẻ rất đỗi tầm thường."
# monologue
# JP: つまりこの男は――自分を無能に見せることで、\n入り込み、聞き出すタイプのプロなのだろう。
3144 = "Nói cách khác, người đàn ông này――chính là kiểu chuyên gia cố tỏ ra vô năng, để luồn lách và moi móc thông tin."
# 【稀咲】
# display as 稀咲
# JP: 「公表されてない情報も、そういう感じで得たのかな？\n選対事務所の中にでも紛れ込んだ――とか」
2858 = "「Thông tin chưa công bố cũng được thu thập theo cách đó sao? Lẻn vào văn phòng chiến dịch tranh cử――chẳng hạn.」"
# monologue
# JP: そうした上で、“そういう感じでも無い”と見たのなら、\n右田真闇か前市長かの発案という線はまぁ、薄かろう。
3327 = "Sau khi làm vậy mà ông ta vẫn thấy \"cảm giác không giống như vậy\", thì khả năng đó là ý tưởng của Migita Mayami hay cựu thị trưởng là rất thấp."
# monologue
# JP: なら――日々姫、かな？\nそうでなければ……
3729 = "Vậy thì――là Hibiki chăng?\nNếu không phải thì……"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄……右田、双鉄」
2921 = "「Soutetsu…… Migita, Soutetsu.」"
# monologue
# JP: 顔と名前が浮かんだ瞬間、納得している。
3429 = "Khoảnh khắc khuôn mặt và cái tên đó hiện lên, tôi đã hiểu ra."
# monologue
# JP: 双鉄なら、あの男なら、\nみっつ、可能性を作ることが出来る。
3743 = "Nếu là Soutetsu, nếu là người đàn ông đó, thì có thể tạo ra ba khả năng."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄自身が立案したか、ハチロクに立案させたか――\nそれとも日々姫に、案を“引き出させた”かな？」
2669 = "「Chính Soutetsu đã đề xuất, hay để Hachiroku đề xuất―― Hay là, anh ta đã “khơi gợi” ý tưởng đó từ Hibiki?」"
# monologue
# JP: 右田双鉄の帰還以来、\n日々姫は目に見えて――日を追うごとに成長している。
3253 = "Kể từ khi Migita Soutetsu trở về, Hibiki đã trưởng thành rõ rệt――từng ngày một."
# monologue
# JP: 二言目には、「兄さんが、兄さんは」だから、\n日々姫といれば、双鉄の情報はイヤでも耳に入ってくる。
3664 = "Cứ mở miệng ra là \"Anh trai em, anh trai em thế này thế nọ\", nên ở cạnh Hibiki, dù không muốn thì thông tin về Soutetsu vẫn cứ lọt vào tai."
# 【稀咲】
# display as 稀咲
# JP: 「双鉄の影響を受けた日々姫は、\nそこまでの案を絞りだすようになったのか」
2366 = "「Hibiki dưới sự ảnh hưởng của Soutetsu, đã có thể vắt óc nghĩ ra được một kế hoạch đến mức đó rồi sao.」"
# monologue
# JP: お腹の底に、なにか、あたたかな物を感じる。
3376 = "Tự đáy lòng, tôi cảm nhận được một thứ gì đó ấm áp."
# monologue
# JP: それは闘志かもしれないし、喜びであるかもしれないし\n――その両方が、交じり合っている熱かもしれない。
3704 = "Đó có thể là ý chí chiến đấu, cũng có thể là niềm vui ――hoặc có thể là sức nóng hòa quyện của cả hai."
# 【稀咲】
# display as 稀咲
# JP: 「面白いな。ボクの相手はもう既に、\nボクの知っている右田日々姫ではないわけか」
2724 = "「Thú vị thật đấy. Đối thủ của tôi giờ đây, đã không còn là Migita Hibiki mà tôi từng biết nữa rồi.」"
# 【記者Ａ】
# display as 市川
# JP: 「おっと？　興味深そうなお話ですね」
2408 = "「Ồ? Một câu chuyện có vẻ thú vị đây.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、いや」
2435 = "「À, không.」"
# monologue
# JP: ほんの一瞬、浦上に視線を送ればそれで済む。
3431 = "Chỉ cần đưa mắt nhìn Uragami một thoáng là xong."
# 【浦上】
# display as 浦上
# JP: 「稀咲様、そろそろ次のお約束のお時間が」
2746 = "「Thưa cô Kisaki, sắp đến giờ của cuộc hẹn tiếp theo rồi ạ.」"
# 【記者Ａ】
# display as 市川
# JP: 「ええっ！？」
2403 = "「Hả!?」"
# monologue
# JP: これでいい。
3723 = "Thế này là được rồi."
# monologue
# JP: 重要な事実を認識した今、\nこれ以上ここで時間を使いたくない。
3447 = "Giờ đây khi đã nhận thức được một sự thật quan trọng, tôi không muốn lãng phí thêm thời gian ở đây nữa."
# 【稀咲】
# display as 稀咲
# JP: 「市川さん、インタビューをありがとうございました。\nおかげで、いろいろなことに気が付きました」
2555 = "「Anh Ichikawa, cảm ơn anh vì buổi phỏng vấn. Nhờ anh mà tôi đã nhận ra được rất nhiều điều.」"
# 【記者Ａ】
# display as 市川
# JP: 「と、いうと――どんな気づきを具体的には」
2871 = "「Nói vậy là――cụ thể cô đã nhận ra điều gì?」"
# monologue
# JP: 転んでもただでは起きず、\n少しでも情報を引き出そうとする。
3160 = "Ngã cũng không chịu đứng lên tay không, ông ta cố moi móc thêm dù chỉ là một chút thông tin."
# monologue
# JP: 見事な職業意識と感心させられもするけれど、\nもちろん一番大事なことは、話したくないし話さない。
3437 = "Dù khá ấn tượng với ý thức nghề nghiệp tuyệt vời đó, nhưng tất nhiên, điều quan trọng nhất thì tôi không muốn nói và cũng sẽ không nói."
# 【稀咲】
# display as 稀咲
# JP: 「車輌再生プロジェクトの件――\nそれに関しての気付きが、ボクにとっては大きいですね」
2814 = "「Vụ dự án tái sinh toa xe―― Những nhận thức về vấn đề đó đối với tôi là rất lớn.」"
# monologue
# JP: うん、この辺ならウソではないし、\n記事素材として、丁度手頃な感じじゃないかな？
3263 = "Ừm, nói đến mức này thì không phải là nói dối, và cũng vừa vặn làm tư liệu cho bài báo nhỉ?"
# 【稀咲】
# display as 稀咲
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致とあわせ、御一夜発展のための、\nそれこそ車の両輪になれば良いかと感じています」
2519 = "「Cùng với việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, tôi cảm thấy nếu nó trở thành hai bánh xe thúc đẩy sự phát triển của Ohimitera thì thật tốt.」"
# 【記者Ａ】
# display as 市川
# JP: 「ははぁ。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場と、車輌再生プロジェクト。\nこれも、両立を目指すということですか」
2397 = "「Haha. Nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; và dự án tái sinh toa xe. Đây cũng là hướng tới sự tồn tại song song sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうですね、両立です」
2664 = "「Đúng vậy, là sự tồn tại song song.」"
# monologue
# JP: さっきの話ともからめ、\nこれを、このインタビューのキーワードにするらしい。
3163 = "Có vẻ như ông ta định liên kết với câu chuyện lúc nãy, và biến nó thành từ khóa cho buổi phỏng vấn này."
# monologue
# JP: わかりやすい。\nこの記者、やっぱり実力あるんだ。
3606 = "Dễ hiểu thật.\nNhà báo này quả nhiên có thực lực."
# 【稀咲】
# display as 稀咲
# JP: 「交通にも、御一夜の発展のためにも、\nどんなことにも、複数経路がある方がいい」
2258 = "「Dù là giao thông, hay sự phát triển của Ohimitera, bất cứ việc gì cũng nên có nhiều con đường.」"
# 【記者Ａ】
# display as 市川
# JP: 「ええ」
2461 = "「Vâng.」"
# 【稀咲】
# display as 稀咲
# JP: 「つまり、排除ではなく“両立”を志す。\nそんな視点に、今日ここで気づかせて頂きました」
2278 = "「Nói cách khác, hướng tới \"sự tồn tại song song\" chứ không phải là loại trừ. Hôm nay tại đây, anh đã giúp tôi nhận ra góc nhìn đó.」"
# 【記者Ａ】
# display as 市川
# JP: 「なるほど」
2354 = "「Ra là vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうした市政が、いずれ御一夜を――\n誰もが笑顔で暮らせる町に育てていくと思います」
2585 = "「Tôi tin rằng một chính quyền như vậy, rồi sẽ đưa Ohimitera―― phát triển thành một thị trấn nơi mọi người đều có thể sống với nụ cười trên môi.」"
# 【記者Ａ】
# display as 市川
# JP: 「良いお話をありがとうございました。\nおかげで、実りある記事が書けそうです」
2928 = "「Cảm ơn cô vì một cuộc trò chuyện thú vị. Nhờ cô mà tôi có thể viết được một bài báo chất lượng rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「なによりです」
2885 = "「Vậy thì tốt quá.」"
# monologue
# JP: 短い握手。\n手と手を離せば、記者がメモを片付けようとする。
3631 = "Một cái bắt tay ngắn ngủi. Khi buông tay ra, nhà báo định cất sổ ghi chép đi."
# monologue
# JP: このタイミング――\n思い出したように一言を足す。
3274 = "Đúng lúc này―― Tôi nói thêm một câu như thể vừa chợt nhớ ra."
# 【稀咲】
# display as 稀咲
# JP: 「そうそう、この都市モデルですが、\n皆様にも間近に見ていただきたいと思っております」
2538 = "「À phải rồi, về mô hình đô thị này, tôi cũng muốn mọi người được chiêm ngưỡng nó ở khoảng cách gần.」"
# 【記者Ａ】
# display as 市川
# JP: 「ほう！　そりゃあ朗報ですな」
2406 = "「Ồ! Quả là một tin tốt lành.」"
# monologue
# JP: しまわれかけてたメモに自然と、ペンがいく。
3648 = "Cây bút tự nhiên đưa về phía cuốn sổ tay đang cất dở."
# monologue
# JP: これでいい。\nこれなら、間違いなく広報をしてもらえる。
3722 = "Thế này là được rồi. Thế này thì chắc chắn ông ta sẽ quảng bá giúp mình."
# 【稀咲】
# display as 稀咲
# JP: 「隈元銀行御一夜支店のロビーで明日から公開しますので。\n『\x%lエアクラ;#00ffc040;エアクラ%l;#;シティ御一夜』を、是非見て頂きたいですね」
2641 = "「Từ ngày mai, nó sẽ được trưng bày tại sảnh chi nhánh Ohimitera của Ngân hàng Kumamoto. Rất mong mọi người sẽ đến xem 『Thành phố \\x%lエアクラ;#00ffc040;Aircra%l;#; Ohimitera』.」"
# 【記者Ａ】
# display as 市川
# JP: 「賑わうでしょうね。このモデルは本当に見事ですから。\nロビーの方にも、私もまた見に行きますよ」
2343 = "「Chắc sẽ nhộn nhịp lắm đây. Mô hình này thực sự rất tuyệt vời mà. Tôi cũng sẽ đến sảnh để xem lại.」"
# 【稀咲】
# display as 稀咲
# JP: 「そのときは、是非お声掛けくださいね」
2315 = "「Lúc đó, nhớ gọi tôi nhé.」"
# 【記者Ａ】
# display as 市川
# JP: 「いやいや、どうもどうも」
2437 = "「Chắc chắn rồi, cảm ơn cô rất nhiều.」"
# 【浦上】
# display as 浦上
# JP: 「稀咲様、そろそろ」
2748 = "「Thưa cô Kisaki, sắp đến giờ rồi ạ.」"
# monologue
# JP: 記者を行外まで送り出し――いや、お見送りして、\n支店長室に戻ればホっと、息が出る。
3412 = "Tiễn nhà báo ra khỏi ngân hàng――à không, tiễn ông ta về, khi quay lại phòng giám đốc chi nhánh, tôi thở phào nhẹ nhõm."
# 【稀咲】
# display as 稀咲
# JP: 「うん、いいね。\n予想以上に実りあるインタビューだったじゃないか」
2415 = "「Ừm, tốt lắm. Một cuộc phỏng vấn hiệu quả hơn cả mong đợi đấy chứ.」"
# monologue
# JP: 日々姫が大きく成長している。\nこの段階で、それを掴めたことは大きい。
3490 = "Hibiki đang trưởng thành vượt bậc. Nắm bắt được điều đó ở giai đoạn này là một lợi thế lớn."
# 【稀咲】
# display as 稀咲
# JP: 「全力でいくよ？　日々姫」
2588 = "「Chị sẽ dốc toàn lực đấy nhé? Hibiki.」"
# monologue
# JP: 先輩後輩でいるなら、日々姫はボクに甘えてしまって、\n死に物狂いの姿を見せてはくれないだろう。
3331 = "Nếu vẫn giữ mối quan hệ tiền bối - hậu bối, Hibiki sẽ ỷ lại vào tôi, và sẽ không cho tôi thấy dáng vẻ liều mạng của em ấy."
# monologue
# JP: けど――
3176 = "Nhưng――"
# 【稀咲】
# display as 稀咲
# JP: 「どうかな？　見せてくれるかな？\n日々姫は――日々姫の全力を」
2843 = "「Thế nào đây? Em sẽ cho chị thấy chứ? Hibiki――toàn bộ sức mạnh của em.」"
# 【ハチロク】
# display as 八六
# JP: 「しかし――\n宝生稀咲は、敵ながら見事な手ばかりを打ちますね」
2372 = "「Tuy nhiên―― Houshou Kisaki, dù là kẻ thù nhưng toàn đi những nước cờ xuất sắc nhỉ.」"
# monologue
# JP: 人と物とのケジメ以前に、\n“敵である”ということなのだろう。
3529 = "Trước cả sự phân biệt giữa con người và sự vật, đó là vì cô ấy là “kẻ thù”."
# monologue
# JP: もはや様付けを放棄して、\nしかしハチロクは、稀咲のことを称賛する。
3666 = "Hachiroku thậm chí đã từ bỏ việc dùng kính ngữ \"cô\", nhưng vẫn dành lời khen ngợi cho Kisaki."
# 【ハチロク】
# display as 八六
# JP: 「あの都市モデル……\n悔しいことに、わたくしは目を奪われてしまいました」
2891 = "「Mô hình đô thị đó…… Thật đáng tiếc, nhưng tôi đã bị nó hớp hồn mất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、僕も圧倒された。\nあれは――凄まじい緻密さと仕事量とで、美しくあった」
2737 = "「Quả thực, anh cũng bị choáng ngợp. Nó――đẹp đẽ bởi sự tỉ mỉ và khối lượng công việc khổng lồ.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ。あのミニチュアの御一夜市に、\n\x%lキハ07;#00ffc040;キハ07%l;#;も走らせてあげてほしいですぅ」
2704 = "「Reina cũng vậy đó ạ~ Reina cũng muốn cho \\x%lキハ07;#00ffc040;KiHa 07%l;#; chạy trong mô hình thành phố Ohimitera thu nhỏ đó nha~」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　あの、わたしも。です。\nウチには、最悪の未来図なのに……みとれちゃいました」
2434 = "「A! Dạ, em cũng vậy ạ. Dù đó là bức tranh tương lai tồi tệ nhất với chúng ta…… nhưng em lại bị cuốn hút mất rồi.」"
# 【凪】
# display as 凪
# JP: 「なにいっとるばい！　ふかみちゃんまでっ！！」
2491 = "「Cậu nói cái gì vậy! Cả Fukami-chan nữa!!」"
# monologue
# JP: 憤懣やるかたなしとばかりに、\n凪が立ち上がり声を荒げる。
3379 = "Tức giận đến mức không kìm nén được, Nagi đứng phắt dậy và lớn tiếng."
# 【凪】
# display as 凪
# JP: 「あぎゃんところに工場ば建てられよったら、\nだぁれも川下り船乗らんよーになるばい！！」
2515 = "「Nếu mà xây nhà máy ở cái chỗ đó, thì sẽ chẳng còn ai đi thuyền xuôi dòng nữa đâu!!」"
# 【ふかみ】
# display as 深美
# JP: 「そんなこともちろんわかってるよ？　けど……\nあれ、凪ちゃんは綺麗って思わなかった？」
2847 = "「Chuyện đó tất nhiên là chị biết rồi? Nhưng mà…… Này, Nagi-chan không thấy nó đẹp sao?」"
# 【凪】
# display as 凪
# JP: 「…………答えたくなかばい」
1919 = "「…………Em không muốn trả lời đâu.」"
# monologue
# JP: ウソをつくことも、敵を称賛することも、\n両方拒むがゆえに為される回答拒否。
3305 = "Từ chối trả lời vì không muốn nói dối, cũng như không muốn khen ngợi kẻ thù."
# monologue
# JP: 凪さえ認める魅力はつまり、\n“万人受けする明快なもの”ということとなろう。が――
3726 = "Sức hấp dẫn mà ngay cả Nagi cũng phải công nhận, nói cách khác, chính là \"sự rõ ràng mà ai cũng có thể tiếp nhận\". Nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「凪。そうむくれるな。\n『一目でわかる魅力』の提示は、日々姫の専門領域だ」
2336 = "「Nagi. Đừng hậm hực như vậy. Việc thể hiện 『sức hấp dẫn có thể thấy ngay từ cái nhìn đầu tiên』 là lĩnh vực chuyên môn của Hibiki mà.」"
# 【凪】
# display as 凪
# JP: 「それをさっきから待っとるばいっ！」
2561 = "「Em đã chờ cái đó từ nãy đến giờ rồi đây này!」"
# monologue
# JP: なだめようとしたはずなのに、\n凪をますますむくれさせてしまう。
3416 = "Rõ ràng là định dỗ dành, nhưng lại làm Nagi hậm hực thêm."
# monologue
# JP: というか、確かに……
3703 = "Mà nói mới nhớ, đúng là……"
# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、ずいぶんと遅いな」
2792 = "「Nhắc mới để ý, em ấy chậm thật đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「まだ家を出てないのでしょうか？\n電話をしてみてはいかがですか？」
2925 = "「Chưa ra khỏi nhà sao ạ?\nAnh thử gọi điện xem sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう……だな」
2647 = "「Chắc…… vậy thôi.」"
# monologue
# JP: 家を一緒に出ようと誘ったときに日々姫は、\n『もう少しでまとまるから先に行って』と言っていた。
3229 = "Lúc tôi rủ đi cùng, Hibiki đã nói: 『Em sắp xong rồi, anh cứ đi trước đi』."
# monologue
# JP: あれからかれこれ、一時間は優に経過している。
3580 = "Từ lúc đó đến giờ, cũng phải hơn một tiếng đồng hồ rồi."
# monologue
# JP: (……事故などではあるまいな）
37 = "(……Không phải là gặp tai nạn gì đâu nhỉ.）"
# monologue
# JP: 事故は突然やってくる。\nそのことならば、僕は誰より知っている。
3151 = "Tai nạn luôn ập đến bất ngờ. Điều đó thì tôi hiểu rõ hơn bất cứ ai."
# monologue
# JP: 不安がぞわぞわ足元から這い上ってきてしまうけれども、\n今さら動揺するほどに、珍しい不安なわけでもない。
3124 = "Sự bất an râm ran bò lên từ dưới chân, nhưng cũng không phải là loại bất an hiếm gặp đến mức khiến tôi phải dao động lúc này."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、すまんが、電話を借りてもいいか？」
2691 = "「Paulette, xin lỗi nhé, tôi mượn điện thoại được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「その必要はありません。\n兄さん、みなさん。お待たせしました」
2682 = "「Không cần đâu ạ. Anh ơi, mọi người. Xin lỗi vì đã để mọi người phải đợi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！」
2631 = "「Hibiki!」"
# monologue
# JP: 安堵しながら振り返り、\nとたんに別種の不安をべっとり塗りつけられる。
3392 = "Tôi thở phào nhẹ nhõm quay lại, nhưng ngay lập tức, một nỗi bất an khác lại bám chặt lấy tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、お前――その顔色は」
2314 = "「Sao vậy, em――sắc mặt em sao thế kia.」"
# 【真闇】
# display as 真闇
# JP: 「ひーちゃん！？」
2544 = "「Hi-chan!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫ですか！？　お薬――\nひととおり置いてありますけどっ」
2311 = "「Em không sao chứ!? Thuốc―― Ở đây có đủ các loại thuốc đấy.」"
# monologue
# JP: 奥でそれぞれの仕事をしていた\n真闇姉とポーレットまでが、焦った顔で飛び出してくる。
3140 = "Ngay cả chị Mayami và Paulette đang làm việc riêng ở bên trong cũng mang vẻ mặt hốt hoảng lao ra."
# monologue
# JP: 日々姫の様子は、それほどまでに……\nなんといおうか――生気を、まるきり失っている。
3500 = "Dáng vẻ của Hibiki lúc này, phải nói sao đây…… như thể――đã hoàn toàn mất đi sức sống."
# 【日々姫】
# display as 日日姬
# JP: 「大丈夫です。顔色が良くないのは……\nただ単に寝不足と――あと――」
2589 = "「Em không sao. Sắc mặt không tốt là vì…… chỉ đơn giản là do thiếu ngủ và――với lại――」"
# monologue
# JP: （ガバッ！）
3759 = "（Bịch!）"
# 【日々姫】
# display as 日日姬
# JP: 「ごめんなさいっ！！」
2537 = "「Em xin lỗi!!」"
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「日々姫っ！？」\n「なにをっ！？」
2633 = "「Hibiki!?」\n「Làm gì vậy!?」"
# monologue
# JP: 日々姫は床に両膝をつき、\n大きく体を前に投げ出し、両てのひらも床へとつける。
3509 = "Hibiki quỳ cả hai gối xuống sàn, đổ gục người về phía trước, hai lòng bàn tay úp chặt xuống sàn."
# 【れいな】
# display as 玲奈
# JP: 「はわわ、日々姫さん？」
2452 = "「Hawawa, chị Hibiki?」"
# 【ふかみ】
# display as 深美
# JP: 「や、やめてください――そんな、こんなっ」
2795 = "「X-xin chị dừng lại đi――sao lại, thế này.」"
# 【凪】
# display as 凪
# JP: 「これ――土下座ばい、初めてみたばい」
2844 = "「Cái này――là quỳ rạp xin lỗi đấy, lần đầu tiên em thấy luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2940 = "「!」"
# monologue
# JP: 凪の言葉が、理解不能だった景色に意味を与える。\n同時に、体がもう動いているっ！
3223 = "Lời nói của Nagi đã mang lại ý nghĩa cho khung cảnh không thể hiểu nổi này. Đồng thời, cơ thể tôi cũng đã tự động di chuyển!"
# 【双鉄】
# display as 雙鐵
# JP: 「よせ、日々姫っ！\nお前にそんな真似はさせないっ！」
2338 = "「Dừng lại đi, Hibiki! Anh không cho phép em làm trò đó!」"
# 【日々姫】
# display as 日日姬
# JP: 「離してっ！　にぃにっ！　私、だって、\n謝らなくっちゃいけんけんっ！」
2624 = "「Buông em ra! Anh hai! Em, em phải, phải xin lỗi mọi người!」"
# 【双鉄】
# display as 雙鐵
# JP: 「謝るのなら普通に謝れ！\n土下座など、悪趣味なパフォーマンスだ！」
2785 = "「Nếu muốn xin lỗi thì cứ xin lỗi bình thường đi! Quỳ rạp xuống như thế, chỉ là một màn trình diễn tệ hại thôi!」"
# 【日々姫】
# display as 日日姬
# JP: 「悪趣味でんなんでんっ！\nそれでしか、すまなか気持ちつたえられんもんっ！！」
2253 = "「Không phải tệ hại gì hết! Chỉ có cách đó, em mới truyền đạt được cảm giác có lỗi của mình thôi!!」"
# monologue
# JP: 悲鳴――\nいいや、これは、泣き声。
3370 = "Tiếng hét――\nKhông, đây là, tiếng khóc."
# monologue
# JP: 何年ぶりかで耳にする――\n日々姫の、本気で泣きじゃくる声。
3323 = "Đã mấy năm rồi mới lại được nghe―― Tiếng khóc nức nở thật sự của Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「私、描けんけんっ！　期待して、任せてもらって――\nそれなのに、御一夜の未来図、描けんけんっ！！！」
2592 = "「Em, không vẽ được! Mọi người đã kỳ vọng, đã giao phó cho em―― Vậy mà, bức tranh tương lai của Ohimitera, em không vẽ được!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！」
# 2631 = "「日日姬！」" 
# monologue
# JP: 有無を言わせず抱きしめる。\n体全部でくるみこみ、日々姫の泣き顔を閉じ込めてしまう。
3384 = "Tôi ôm chầm lấy em ấy, không cho phép em nói thêm lời nào. Bao bọc lấy em bằng cả cơ thể mình, giấu đi khuôn mặt đang giàn giụa nước mắt của Hibiki."
# 【ポーレット】
# display as 波萊特
# JP: 「れいな？」
2699 = "「Reina?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、居てくれ」
2266 = "「Không, xin cứ ở lại.」"
# monologue
# JP: 気を利かせてくれたのだろう。れいなを連れて\n出ようとしていたポーレットをけれど、呼び止める。
3549 = "Chắc hẳn là cô ấy muốn giữ ý. Tôi gọi Paulette lại khi cô ấy đang định dẫn Reina ra ngoài."
# monologue
# JP: 日々姫は、全員に謝りたがっている。\nその気持ちを、まずは第一に尊重したいと思うから。
3492 = "Hibiki đang muốn xin lỗi tất cả mọi người. Vì tôi muốn tôn trọng tâm trạng đó của em ấy lên hàng đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「それより何か、\n温かな飲み物をもらえれば」
2322 = "「Thay vì thế, cô có thể cho chúng tôi, một chút đồ uống ấm được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「でしたら、ミルクティー。\nもちろん、みんなの分も用意しますね」
2887 = "「Vậy thì, trà sữa nhé. Tất nhiên, tôi sẽ chuẩn bị cho tất cả mọi người.」"
# 【ふかみ】
# display as 深美
# JP: 「あ、お手伝いします。です！」
2602 = "「A, em sẽ phụ một tay. Ạ!」"
# monologue
# JP: 少しでも場を離れたいのだろう。\nポーレットとともにふかみが奥へ消えていく。
3546 = "Chắc hẳn em ấy muốn rời khỏi đây dù chỉ một chút. Fukami cùng Paulette đi vào bên trong."
# monologue
# JP: かちゃかちゃ、茶器の音が聞こえる。\nややあって、ピーっとヤカンの鳴る音も。
3672 = "Lách cách, lách cách, tiếng tách trà vang lên. Một lúc sau, là tiếng rít của ấm nước sôi."
# 【日々姫】
# display as 日日姬
# JP: 「ぅぅっ……ぅぇっ――ぐずっ――すんっ」
2453 = "「Ưư…… ư…… hức――sụt sịt.」"
# monologue
# JP: 誰も――凪さえ――何も言おうとしない。\n僕はただただ、日々姫の背中をさすりつづける。
3126 = "Không một ai――ngay cả Nagi――nói lời nào. Tôi chỉ biết liên tục vuốt ve tấm lưng của Hibiki."
# monologue
# JP: やがて、紅茶のカップが置かれる。\nミルクと砂糖は、もう溶かされているようだ。
3357 = "Chẳng mấy chốc, tách hồng trà đã được đặt xuống. Sữa và đường có vẻ đã được khuấy tan."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2410 = "「Ừm.」"
# monologue
# JP: 左手で日々姫を抱いたまま、\n右手でカップを持ち上げて、飲む。
3400 = "Tay trái vẫn ôm lấy Hibiki, tay phải nâng tách trà lên, và uống."
# 【双鉄】
# display as 雙鐵
# JP: 「甘いな。うまい」
2510 = "「Ngọt thật. Ngon lắm.」"
# monologue
# JP: 手の中、ふすふす――匂いを求めて鼻が鳴る。\n安堵する。
3421 = "Trong vòng tay tôi, phư phư――tiếng khịt mũi tìm kiếm mùi hương. Tôi cảm thấy an lòng."
# monologue
# JP: 泣いてる日々姫の行動は、\n小さな日々姫の頃とまるきり変っていない。
3262 = "Hành động của Hibiki khi khóc, hoàn toàn không khác gì hồi còn bé."
# 【双鉄】
# display as 雙鐵
# JP: 「ほれ、飲め」
2316 = "「Này, uống đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん――」
2454 = "「Ưm――」"
# monologue
# JP: 僕の腕の中もぞもぞ動き、\n日々姫が顔を持ち上げる。
3423 = "Cựa quậy trong vòng tay tôi,\nHibiki ngẩng mặt lên."
# monologue
# JP: その唇にカップをあてて、\nゆっくりゆっくり、傾けてやる。
3314 = "Đưa tách trà chạm vào đôi môi ấy, và từ từ, từ từ nghiêng nó."
# 【ふかみ】
# display as 深美
# JP: 「わ――間接キス」
2391 = "「Oa――Hôn gián tiếp kìa.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、余計なこといったらいけんばいっ！」
2545 = "「Fukami-chan, đừng nói mấy lời thừa thãi chứ!」"
# monologue
# JP: 余計なことがダブルで重なり聞こえてくるが、\n日々姫の耳には届いていない。
3654 = "Những lời thừa thãi chồng chéo lên nhau lọt vào tai tôi, nhưng lại không đến được tai Hibiki."
# monologue
# JP: 乳に吸いつく赤子のように、\n流した涙を、紅茶で必死に補填している。
3300 = "Như một đứa trẻ đang bú sữa mẹ, em ấy tuyệt vọng dùng hồng trà để bù đắp cho những giọt nước mắt đã rơi."
# 【日々姫】
# display as 日日姬
# JP: 「ん」
# 2461 = "「嗯」" 
# monologue
# JP: こくり、と、大きく喉がなる。\nあたたかな息が吐かれて僕の肌をくすぐる。
3312 = "Ực, một tiếng nuốt lớn vang lên từ cổ họng. Hơi thở ấm áp phả ra làm nhột làn da tôi."
# monologue
# JP: 日々姫の髪に手を伸ばす。\nゆっくり撫でて、撫でる動きに言葉を乗せる。
3411 = "Tôi đưa tay chạm vào mái tóc của Hibiki. Chậm rãi vuốt ve, và gửi gắm những lời nói qua từng cử chỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「描けないといったが――それはポスター……\nお前のいうところの、メインビジュアルというヤツか？」
2308 = "「Em bảo không vẽ được――là tấm áp phích…… cái mà em gọi là, hình ảnh chủ đạo đó sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2461 = "「嗯」" 
# monologue
# JP: 立候補表明時に、本当は間に合うはずだった。\n\x%l8620;#00ffc040;8620%l;#;の走る町、鉄道とクマ川とに彩られる町。
3599 = "Đáng lẽ ra nó đã phải hoàn thành kịp lúc tuyên bố tranh cử. Thị trấn có \\x%l8620;#00ffc040;8620%l;#; chạy qua, thị trấn được tô điểm bởi đường sắt và sông Kuma."
# monologue
# JP: 僕らが作ろうとする御一夜を、\n日々姫は絵で、示してくれるはずだった。
3496 = "Một Ohimitera mà chúng tôi đang nỗ lực tạo ra, đáng lẽ Hibiki đã phải thể hiện nó qua bức tranh."
# 【双鉄】
# display as 雙鐵
# JP: 「どうして描けないでいるのか……\n理由は、はっきりしているのか？」
2892 = "「Tại sao em lại không vẽ được…… Lý do, em có biết rõ không?」"
# 【日々姫】
# display as 日日姬
# JP: 「なにが、描きたいのかわからなくって」
2579 = "「Em không biết, mình muốn vẽ cái gì nữa.」"
# monologue
# JP: 即座に答えが返される。
3317 = "Câu trả lời được đưa ra ngay lập tức."
# monologue
# JP: それほど日々姫は、自分と向き合い、\n向き合うほどに、追い詰められてしまったのだろう。
3506 = "Chắc hẳn Hibiki đã phải đối mặt với chính mình rất nhiều, và càng đối mặt, em ấy càng bị dồn vào chân tường."
# 【日々姫】
# display as 日日姬
# JP: 「期待してもらってること、嬉しくて、\nあれも描きたい、これも描こうって思ってたら」
2502 = "「Được mọi người kỳ vọng, em rất vui, và rồi em cứ nghĩ, muốn vẽ cái này, muốn vẽ cả cái kia nữa.」"
# monologue
# JP: ぐっと、日々姫のおでこが僕の胸板に押しつけられる。
3581 = "Phịch, trán của Hibiki ấn chặt vào ngực tôi."
# 【日々姫】
# display as 日日姬
# JP: 「もっともっとって思ううち、ぐちゃぐちゃしてきて、\nそれで私、自分の描きたい未来図に一度戻そうってして」
2696 = "「Càng nghĩ muốn vẽ thêm nhiều thứ, mọi thứ lại càng trở nên lộn xộn, thế là em, quyết định quay lại với bức tranh tương lai mà em thực sự muốn vẽ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「戻して――それでどうなった？」
2817 = "「Quay lại――rồi sao nữa?」"
# 【日々姫】
# display as 日日姬
# JP: 「真っ白――何も見えんくなって、怖くて――\nもっと、なんか、ぐちゃぐちゃになっちゃって」
2241 = "「Trắng xóa――Em không nhìn thấy gì nữa, em sợ lắm―― Rồi mọi thứ, kiểu như, lại càng lộn xộn hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか」
2420 = "「À…… ra vậy.」"
# monologue
# JP: 理屈で、答えを追えてしまった。
3414 = "Bằng lý trí, tôi đã tìm ra câu trả lời."
# monologue
# JP: 一度戻す――立ち返ろうとしてしまったなら、\n見えなくなるのが当然だ。
3373 = "Quay lại một lần――nếu đã cố gắng trở về điểm xuất phát, thì việc không nhìn thấy gì là điều đương nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「立候補表明のときも、それ以前からも、\nお前は言っていただろう、『ゼロから考えてみたい』と」
2260 = "「Lúc tuyên bố tranh cử, và cả trước đó nữa, em đã từng nói rồi mà, 『Em muốn thử suy nghĩ lại từ con số không』.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
2425 = "「A.」"
# monologue
# JP: そう、ひどくそれは単純なこと。
3534 = "Đúng vậy, đó là một điều vô cùng đơn giản."
# 【双鉄】
# display as 雙鐵
# JP: 「今の日々姫の未来図は、ゆえに、白紙で当然なのだ。\n愚かにも僕はその点を失念していた」
2606 = "「Bức tranh tương lai của Hibiki hiện tại, vì thế, đương nhiên phải là một tờ giấy trắng. Thật ngu ngốc khi anh lại quên mất điều đó.」"
# monologue
# JP: 日々姫の夢見る未来図が、\n僕の夢見る未来図と同じものだと思ってしまった。
3388 = "Tôi đã lầm tưởng rằng bức tranh tương lai mà Hibiki mơ ước, cũng giống như bức tranh tương lai của tôi."
# monologue
# JP: いや、おそらくは、日々姫自身も、\n同じものだと、思いこもうとしてくれた。
3137 = "Không, có lẽ, chính Hibiki cũng, đã cố gắng tự thuyết phục bản thân rằng chúng là một."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の配慮が不足していた。\n申し訳ない」
2653 = "「Là do anh thiếu chu đáo.\nAnh xin lỗi.」"
# monologue
# JP: 日々姫に、みんなに軽く頭を下げる。\n深刻になってしまえば、かえって日々姫の重圧になる。
3395 = "Tôi khẽ cúi đầu xin lỗi Hibiki, và mọi người. Nếu tỏ ra quá nghiêm trọng, ngược lại sẽ càng tạo thêm áp lực cho Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「そんなこと無いっ！」
2607 = "「Không có chuyện đó đâu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、僕は知っているのだぞ？　――日々姫には、\n日々姫の本当では無いものなど、描けはしないと」
2374 = "「Nhưng mà, anh biết rõ đấy nhé? ――Hibiki, sẽ không thể nào vẽ được những thứ không phải là sự thật của chính em.」"
# 【日々姫】
# display as 日日姬
# JP: 「…………」
1921 = "「…………」"
# monologue
# JP: 僕の胸の中、日々姫が頷く。
3489 = "Trong vòng tay tôi, Hibiki gật đầu."
# monologue
# JP: “ごめんなさい”と、“ありがとう”と、\n声にならない言葉が聞こえる。
3427 = "\"Em xin lỗi\" và \"Cảm ơn anh\", tôi như nghe thấy những lời nói không thành tiếng ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「では、お互いに前を向くことにしよう。\n日々姫が本当を見つけ出せるように、視線をあげよう」
2894 = "「Vậy thì, chúng ta cùng hướng về phía trước nào. Hãy ngước nhìn lên, để Hibiki có thể tìm ra sự thật của chính mình.」"
# monologue
# JP: 日々姫が、声を出さずに頷く。\nなら後は、日々姫の瞳が何かを見つけるのを待てばいい。
3511 = "Hibiki im lặng gật đầu. Vậy thì sau đó, chỉ cần chờ đợi đôi mắt của Hibiki tìm thấy điều gì đó là được."
# monologue
# JP: 僕と日々姫は、それでいい。\nが――
3398 = "Tôi và Hibiki như vậy là được rồi.\\\nNhưng mà——"
# 【ふかみ】
# display as 深美
# JP: 「ぁっ」
# 2425 = "「啊」" 
# 【凪】
# display as 凪
# JP: 「んぐぐっ！」
2411 = "「Ư ư!」"
# monologue
# JP: 顔を向ければその途端、\nふかみはもちろん、凪さえもが僕から視線を逃がす。
3432 = "Ngay khi tôi quay mặt lại,\\ đừng nói là Fukami, ngay cả Nagi cũng vội vàng tránh ánh mắt của tôi."
# monologue
# JP: このふたりも――他の誰だって理解している。\n理解して口には出せずに、わだかまっている。
3294 = "Hai người họ——hay bất cứ ai khác đều hiểu rõ.\\ Hiểu rõ nhưng không thể nói ra, đành chôn giấu trong lòng."
# 【真闇】
# display as 真闇
# JP: 「けどねぇ、双ちゃん」
2263 = "「Nhưng mà này, Sou-chan」"
# monologue
# JP: だから。真闇姉が切り出してくれる。
3441 = "Vì thế, chị Mayami đã lên tiếng mở lời."
# monologue
# JP: 誰もが嫌がる貧乏くじを、\nいつもと同じくにこにこと、笑顔のままに引いてくれる。
3615 = "Chị ấy vẫn mỉm cười rạng rỡ như mọi khi,\\ chủ động rút lấy lá thăm xui xẻo mà ai cũng ghét bỏ."
# 【真闇】
# display as 真闇
# JP: 「『描けるようになるまで待つ』ことが許されるほど、\n甘か相手じゃなかよーやけんねぇ」
2539 = "「Đối thủ không phải là người tốt bụng đến mức\\ cho phép chúng ta 『chờ đến khi vẽ được』 đâu nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これ――は」
2841 = "「Cái này——là」"
# monologue
# JP: ……真闇姉から手渡された新聞は、\n今の僕らにはあまりに重い。
1889 = "……Tờ báo mà chị Mayami đưa cho,\\ đối với chúng tôi lúc này thực sự quá đỗi nặng nề."
# 【真闇】
# display as 真闇
# JP: 「こん合わせ技はキツかとよ？\n返せんよーなら、オトされるばい」
2540 = "「Đòn kết hợp này hiểm lắm đó nha?\\ Nếu không phản đòn được thì sẽ bị hạ gục ngay đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2410 = "「唔」" 
# monologue
# JP: 合わせ技で[オト,1]落選される――とは、言い得て妙だ。\nが、それを称賛する余裕すらない。
3255 = "Bị đánh bại bằng đòn kết hợp——quả là một sự so sánh tuyệt diệu.\\ Nhưng tôi thậm chí còn chẳng có tâm trí đâu mà tán thưởng nó."
# monologue
# JP: 喉がひりひりと痛むほど、一気に僕は乾ききる。
3419 = "Cổ họng tôi khô khốc đến mức đau rát."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　その新聞に何が書かれているのですか？」
2922 = "「Ngài Soutetsu? Trên tờ báo đó viết gì vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅむ――んんっ」
2451 = "「Ưm——khụ khụ」"
# monologue
# JP: かすれてしまった声を直すため、咳払い。\nポーレットがすぐ気を利かせ、新しい紅茶を淹れてくれる。
3574 = "Tôi hắng giọng để lấy lại giọng nói đang khàn đặc.\\ Paulette tinh ý nhận ra và pha ngay cho tôi một tách hồng trà mới."
# 【双鉄】
# display as 雙鐵
# JP: 「簡単に言えば丸飲みだ。車両改修計画を稀咲は聞きつけ、\nそれを丸飲み。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致との並立を述べている」
2761 = "「Nói đơn giản là sao chép toàn bộ. Kisaki đã nghe được kế hoạch phục hồi toa xe,\\ rồi bê nguyên xi. Cô ta tuyên bố sẽ thực hiện song song với việc thu hút nhà máy \\\\x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それって！！？」
2860 = "「Thế là sao!!?」"
# monologue
# JP: 珍しく大きなポーレットの声。\n日々姫がびくりと体をすくませ、弱々しく首を横に振る。
3547 = "Giọng Paulette lớn tiếng hiếm thấy.\\ Hibiki giật bắn mình co rúm người lại, yếu ớt lắc đầu."
# monologue
# JP: が、そんなことをポーレットは責めているのではない。\n日々姫が籠りきってたことを、この場の全員が知っている。
3178 = "Nhưng Paulette không hề trách móc chuyện đó.\\ Tất cả những người ở đây đều biết Hibiki đã giam mình trong phòng suốt thời gian qua."
# monologue
# JP: （稀咲が日々姫を情報源として利用していた――\nその懸念を、図らずもこれで払拭できた形になるか）
3771 = "（Kisaki đã lợi dụng Hibiki làm nguồn cung cấp thông tin——\\ Nỗi lo đó không ngờ lại được xóa bỏ theo cách này sao.）"
# monologue
# JP: ポスター描きに悪戦苦闘していた日々姫は、\n僕と真闇姉以外の誰とも接触していない。
3116 = "Hibiki bận rộn vật lộn với việc vẽ áp phích,\\ con bé không hề tiếp xúc với ai khác ngoài tôi và chị Mayami."
# monologue
# JP: あの会合の参加者は大人数ではなかったとはいえ、\n見知らぬ者も、幾人かは参加していたことだし。
3236 = "Dù số người tham gia cuộc họp đó không nhiều,\\ nhưng cũng có vài người lạ mặt ở đó."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしが、もっとちゃんと口止めをしているか――\nもっと早くに公表していたら」
2779 = "「Giá như tôi bịt miệng họ kỹ hơn——\\ Hoặc là công bố sớm hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「人の口に戸は立てられぬと昔から言うし、\n実現可能性の見えぬ段階での公表は諸刃の剣だ」
1913 = "「Người xưa có câu \"Miệng đời không thể che đậy\",\\ hơn nữa việc công bố ở giai đoạn chưa thấy khả năng thực hiện sẽ là một con dao hai lưỡi.」"
# monologue
# JP: 僕の言葉に、真闇姉は鷹揚な頷きを重ねる。
3622 = "Chị Mayami từ tốn gật đầu đồng tình với lời tôi nói."
# 【真闇】
# display as 真闇
# JP: 「こぎゃんと見事に丸飲みされなきゃ、\n知られたところで、痛くも痒くも無かった話やったけん」
2674 = "「Nếu không bị sao chép trắng trợn thế này,\\ thì dù có bị biết cũng chẳng ngứa ngáy gì đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「は……い」
1926 = "「Vâng……」"
# monologue
# JP: フォローされても、ポーレットの顔色は戻らない。\n凪が、戸惑ったような声を出す。
3343 = "Dù được an ủi, sắc mặt Paulette vẫn không khá hơn.\\ Nagi lên tiếng với vẻ bối rối."
# 【凪】
# display as 凪
# JP: 「丸のみされると、何がそこまで困るとよ？」
2692 = "「Bị sao chép thì có gì mà rắc rối đến vậy chứ?」"
# monologue
# JP: ふかみとれいなも、凪の疑問に同時に頷く。
3571 = "Fukami và Reina cũng gật đầu trước câu hỏi của Nagi."
# monologue
# JP: 自分自身を落ち着かせるのにもちょうどいい、\nここでいったん整理し、説明しておこう。
3523 = "Cũng là để tự trấn an bản thân,\\ tôi quyết định sắp xếp lại mọi thứ và giải thích cho họ hiểu."
# 【双鉄】
# display as 雙鐵
# JP: 「現在の日々姫陣営の主体は、旧ポーレット陣営と、\n鉄道ボランティアからの参加組との、二系統だ」
2711 = "「Chủ lực hiện tại của phe Hibiki bao gồm hai nhóm: phe Paulette cũ,\\ và nhóm tình nguyện viên đường sắt.」"
# 【凪】
# display as 凪
# JP: 「そんくらいウチにもわかるばい」
2859 = "「Cái đó thì em cũng biết.」"
# 【双鉄】
# display as 雙鐵
# JP: 「旧ポーレット陣営はクマ川水系の保護と工場誘致反対で\n一枚岩。以前は日々姫支持に乗り切れてなかったが――」
2773 = "「Phe Paulette cũ rất đoàn kết trong việc bảo vệ hệ thống sông Kuma và phản đối thu hút nhà máy. Trước đây họ chưa hoàn toàn ủng hộ Hibiki——」"
# 【ふかみ】
# display as 深美
# JP: 「ゼロから考えなおしたい……って、\n日々姫さんが言ったから。です？」
1928 = "「Là vì Hibiki nói……\\ muốn suy nghĩ lại từ con số không. Đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁな。稀咲と先輩後輩の関係にあることも、\nあらん疑惑をかきたててしまった一因だろう」
2660 = "「Đúng vậy. Việc Hibiki có mối quan hệ tiền bối - hậu bối với Kisaki\\ cũng là một nguyên nhân gây ra những nghi ngờ không đáng có.」"
# monologue
# JP: 日々姫が工場誘致派に転ぶのではないか――
3494 = "Liệu Hibiki có ngả theo phe thu hút nhà máy không——"
# monologue
# JP: その懸念は、旧ポーレット陣営の選対幹部から、\n僕も直接、ぶつけられたことがある。
3737 = "Nỗi lo ngại đó, chính tôi cũng từng bị\\ cán bộ ban bầu cử của phe Paulette cũ trực tiếp chất vấn."
# 【双鉄】
# display as 雙鐵
# JP: 「が、日々姫がゼロベースで考えているのは、\n環境保護と経済振興の両立の方法だとご理解いただけた」
2264 = "「Nhưng, họ đã hiểu rằng điều Hibiki đang suy nghĩ từ con số không,\\ chính là phương pháp kết hợp giữa bảo vệ môi trường và phát triển kinh tế.」"
# 【ポーレット】
# display as 波萊特
# JP: 「経済振興は、車輌再生プロジェクトを中心に果たせます。\nそうなれば、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の必要も消せますから」
2297 = "「Phát triển kinh tế có thể thực hiện xoay quanh dự án phục hồi toa xe.\\ Nếu làm được như vậy, sự cần thiết của việc thu hút nhà máy \\\\x%lエアクラ;#00ffc040;Aircra%l;#; cũng sẽ biến mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その説得で、ポーレット支持層は日々姫支持で固まった。\n丸飲み案もこの層には影響せんだろう」
2863 = "「Nhờ lời thuyết phục đó, những người ủng hộ Paulette đã kiên định ủng hộ Hibiki.\\ Phương án sao chép kia chắc cũng không ảnh hưởng đến nhóm này đâu.」"
# 【凪】
# display as 凪
# JP: 「なら、何がそんなにマズかとよ？」
2879 = "「Vậy thì có gì mà tệ đến thế?」"
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道ボランティアからの参加組――\nつまりは、我々により近い、技術者集団の方だ」
2908 = "「Nhóm tình nguyện viên đường sắt——\\ tức là nhóm kỹ thuật viên gần gũi với chúng ta hơn.」"
# 【凪】
# display as 凪＆深美
# JP: 「へ？」\n「え？」
2404 = "「Hả?」\\\n「Hả?」"
# monologue
# JP: 凪とふかみが同時に疑問の声をあげ、\nゆずりあうように顔を見合わせる。
3218 = "Nagi và Fukami đồng thanh thốt lên thắc mắc,\\ rồi nhìn nhau như nhường lời cho đối phương."
# monologue
# JP: ややあって、\nふかみがおずおず、挙手をしてから声を出す。
3727 = "Một lúc sau,\\ Fukami rụt rè giơ tay lên rồi cất tiếng."
# 【ふかみ】
# display as 深美
# JP: 「ええと。だって、職人さんたちこそ、車輛再生の\nプロジェクト。のりのりな感じでしたです。よ？」
2413 = "「Ừm. Bởi vì các nghệ nhân mới là những người hào hứng nhất\\ với dự án phục hồi toa xe mà. Phải không ạ?」"
# 【凪】
# display as 凪
# JP: 「そうばい！　みーんな、やるき満々のバリバリばい！」
2649 = "「Đúng đó! Ai nấy đều hừng hực khí thế luôn mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさしく、彼らはこの計画を何としても実現させたい。\n無論、環境保全を優先に考えてくれる方もいようが――」
2469 = "「Chính xác, họ muốn hiện thực hóa kế hoạch này bằng mọi giá.\\ Tất nhiên cũng có những người ưu tiên bảo vệ môi trường, nhưng——」"
# 【ふかみ】
# display as 深美
# JP: 「わかった凪ちゃん！　\n車輌再生プロジェクトが、実現するのが一番ならさ」
2597 = "「Mình hiểu rồi Nagi! \\ Nếu việc hiện thực hóa dự án phục hồi toa xe là ưu tiên hàng đầu...」"
# 【凪】
# display as 凪
# JP: 「うん？」
2941 = "「Hử?」"
# 【ふかみ】
# display as 深美
# JP: 「実現だけが目的で、クマ川のことがどうでもよければ。\n……銀行さんがやってくれた方が、ずっと安心」
2517 = "「Nếu mục đích chỉ là hiện thực hóa, còn sông Kuma ra sao cũng được.\\ ……Thì để phía ngân hàng làm sẽ yên tâm hơn nhiều.」"
# 【凪】
# display as 凪
# JP: 「あ――そりゃそうばいね」
2418 = "「A——Đúng là vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり。銀行主体であるのなら、\n事業の信用度や安定度は、各段に跳ね上がるからな」
2683 = "「Đúng vậy. Nếu do ngân hàng chủ trì,\\ độ uy tín và ổn định của dự án sẽ tăng vọt lên một bậc.」"
# 【真闇】
# display as 真闇
# JP: 「そこに、『\x%lエアクラ;#00ffc040;エアクラ%l;#;シティ御一夜』\nこの都市モデルが後押しばしてきよるけんねぇ」
2770 = "「Đã vậy, lại còn có mô hình đô thị\\ 『Thành phố \\\\x%lエアクラ;#00ffc040;Aircra%l;#; Ohimitera』 hậu thuẫn nữa chứ.」"
# monologue
# JP: 真闇姉がばさばさと新聞を広げて見せる。
3617 = "Chị Mayami loạt soạt mở tờ báo ra cho chúng tôi xem."
# monologue
# JP: 大写しの写真の中の都市モデルは、\n平面となってなお強い魅力を放っている。
3589 = "Mô hình đô thị trong bức ảnh chụp cận cảnh,\\ dù chỉ là mặt phẳng nhưng vẫn toát lên sức hút mãnh liệt."
# 【真闇】
# display as 真闇
# JP: 「観光を捨てて、工業都市として御一夜ば再生させる。\n技師や職人には、むしろ魅力的なプランよね」
2623 = "「Từ bỏ du lịch, tái thiết Ohimitera thành một thành phố công nghiệp.\\ Đối với các kỹ sư và nghệ nhân, đây quả là một kế hoạch hấp dẫn.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんとしたら！\n捨つるは、観光じゃなく環境になるばいっ！」
2525 = "「Nếu vậy thì!\\ Thứ bị vứt bỏ không phải là du lịch, mà là môi trường đấy!」"
# 【ふかみ】
# display as 深美
# JP: 「この都市モデルも綺麗。です。けど！\n御一夜の自然とクマ川の水の方が、もっと綺麗。です！」
2920 = "「Mô hình đô thị này cũng đẹp. Thật ạ. Nhưng!\\ Thiên nhiên Ohimitera và nước sông Kuma còn đẹp hơn nhiều. Lắm ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。僕もそう思う」
2651 = "「Đúng vậy. Anh cũng nghĩ thế.」"
# monologue
# JP: 人の手が作っていくものと。\n自然にできているものと。
3159 = "Những thứ do bàn tay con người tạo ra.\\ Và những thứ được hình thành từ tự nhiên."
# monologue
# JP: どちらも美しく価値があり――\nならば保全すべきは、人の手で再生が利かない後者だ。
3130 = "Cả hai đều mang vẻ đẹp và giá trị riêng——\\ Vậy thì thứ cần được bảo tồn là cái sau, thứ không thể tái tạo bằng sức người."
# 【双鉄】
# display as 雙鐵
# JP: 「そう思うし――\n誰もが本当はわかっているとも思うのだ」
2587 = "「Anh nghĩ vậy——\\ và anh cũng tin rằng thực ra ai cũng hiểu điều đó.」"
# monologue
# JP: わかっていても、見失う。\n単純で当然な真実ほどに、いとも簡単に紛れてしまう。
3740 = "Dù hiểu, nhưng họ vẫn đánh mất phương hướng.\\ Những sự thật càng đơn giản, hiển nhiên thì càng dễ bị lãng quên."
# monologue
# JP: 窒息を感じるその瞬間まで、\n空気の価値を、人は認識できんのだから。
3598 = "Bởi vì con người ta chỉ nhận ra giá trị của không khí,\\ cho đến giây phút họ cảm thấy nghẹt thở."
# 【凪】
# display as 凪
# JP: 「ほんなら！　もっとはっきりわからせてやらんとっ！」
2896 = "「Vậy thì! Phải làm cho họ hiểu rõ hơn nữa mới được!」"
# 【真闇】
# display as 真闇
# JP: 「そーね。ゆーか……そーできんなら負けったい。\n誰にでもわかる形で、失われるものの大きさば示さんと」
2645 = "「Đúng vậy. Hay nói đúng hơn... nếu không làm được thì chúng ta thua chắc.\\ Phải cho họ thấy sự to lớn của những thứ sắp mất đi bằng cách nào đó để ai cũng hiểu được.」"
# 【日々姫】
# display as 日日姬
# JP: 「ごめ――んむっ！？」
2536 = "「Xin lỗ——ưm!?」"
# monologue
# JP: 『ごめんなさい』と言わせたくなく、\n言う必要などないと伝えたく、日々姫を胸に押しつける。
3382 = "Không muốn em ấy nói 『Xin lỗi』,\\ muốn nói rằng em không cần phải làm thế, tôi kéo Hibiki ôm chặt vào lòng."
# monologue
# JP: その姿勢のまま――\nなにか手段がないかどうかを考え、探し求め――っ！！？
3390 = "Vẫn giữ nguyên tư thế đó——\\ Tôi cố gắng suy nghĩ, tìm kiếm xem có cách nào không——!!?"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
2690 = "「Paulette」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい？」
2480 = "「Vâng?」"
# monologue
# JP: ずっと、この店にあったから、背景同然に思っていた。
3118 = "Vì nó luôn ở trong cửa hàng này, nên tôi cứ ngỡ nó như một phần của phông nền."
# monologue
# JP: ハチロクとれいなの模型実演のときにさえ、\n『模型の線路』としか思っていなかった。
3345 = "Ngay cả lúc Hachiroku và Reina biểu diễn mô hình,\\ tôi cũng chỉ nghĩ đó là 『đường ray mô hình』."
# 【双鉄】
# display as 雙鐵
# JP: 「これを――使えんか？」
2845 = "「Cái này——có dùng được không?」"
# monologue
# JP: が、よくよく見れば、このジオラマは\n懐かしい……御一夜の、昔の風景にしか思えなくなる。
3135 = "Nhưng, nhìn kỹ lại thì, mô hình sa bàn này\\ thật hoài niệm... khiến tôi không thể không nghĩ đến khung cảnh Ohimitera ngày xưa."
# 【ポーレット】
# display as 波萊特
# JP: 「これって――これ？\nNのレイアウトのことですか？」
2309 = "「Cái này——là cái này sao?\\ Ý anh là sa bàn N-gauge á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「えぬのれいあうと？」
2943 = "「Sa bàn En-nu?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、ごめんなさい。Nって、エヌゲージです。\nnine-gauge――線路幅９ミリの鉄道模型のことです」
2439 = "「A, xin lỗi anh. N là N-gauge.\\ Nine-gauge——tức là mô hình đường sắt có khổ ray 9mm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは理解してる。\nレイアウトとは――このジオラマのことか？」
2450 = "「À, cái đó thì anh hiểu.\\ Còn sa bàn——là mô hình này sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうです。Nの世界では、ジオラマじゃなく、\nレイアウトっていうのが普通みたいです」
2476 = "「Vâng, đúng vậy. Trong thế giới N-gauge, người ta thường gọi là sa bàn\\ thay vì mô hình ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、このレイアウトが生きている姿を、\n間近で、実際に見てみたいのだが」
2895 = "「Vậy thì, anh muốn tận mắt nhìn thấy\\ hình ảnh sống động của sa bàn này ở cự ly gần.」"
# 【ポーレット】
# display as 波萊特
# JP: 「すぐ用意します！　っていってもパパの遺品ですから、\nわたしも、そんなに詳しくはないんですけど――」
2600 = "「Em chuẩn bị ngay đây! Dù nói vậy nhưng đây là di vật của bố em,\\ nên em cũng không rành lắm đâu——」"
# monologue
# JP: いいながら、\nポーレットは頭をカウンターの下へと潜らせる。
3321 = "Vừa nói,\\\nPaulette vừa chui đầu xuống dưới quầy."
# 【ハチロク】
# display as 八六
# JP: 「あら。あのときの」
2448 = "「Ô kìa. Là lúc đó.」"
# 【れいな】
# display as 玲奈
# JP: 「えへへー、れいなのレイナナなのです！」
2402 = "「Ehehe, là KiHa 07 của Reina đó nha!」"
# 【ポーレット】
# display as 波萊特
# JP: 「で」
# 2410 = "「唔」" 
# monologue
# JP: またごそごそ。\n今度はもっと大きなものが飛び出してくる。
3238 = "Lại lục lọi sột soạt.\\ Lần này cô ấy lôi ra một thứ còn to hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、\x%l運転台;#00ffc040;運転台%l;#;？」
2288 = "「Gì đây, \\\\x%l運転台;#00ffc040;buồng lái%l;#; à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「の形をしたパワーユニットです。これをコンセントに。\nで、こっちのコードはレールの端子に――」
2670 = "「Là bộ cấp nguồn có hình dáng như vậy ạ. Cắm cái này vào ổ điện.\\ Rồi cắm dây này vào đầu nối của đường ray——」"
# monologue
# JP: 線をいくつか接続してから、\nポーレットは小声で指差\x%l喚呼;#00ffc040;喚呼%l;#;。
3303 = "Sau khi cắm vài sợi dây,\\ Paulette nhỏ giọng thực hiện chỉ tay \\\\x%l喚呼;#00ffc040;hô xác nhận%l;#;."
# monologue
# JP: そして静かに、\nパワーユニットとやらのレバーを操作し――
3583 = "Rồi nhẹ nhàng,\\ điều khiển cần gạt của cái gọi là bộ cấp nguồn đó——"
# 【凪】
# display as 凪
# JP: 「おお、そうやって動かすばいっ！？」
2482 = "「Ồ, thì ra là làm nó chuyển động như vậy á!?」"
# 【ふかみ】
# display as 深美
# JP: 「おもしろそう。です。\nちょっと、動かしてみたいかも」
2509 = "「Có vẻ thú vị. Nhỉ.\\ Em cũng muốn thử điều khiển một chút.」"
# 【ポーレット】
# display as 波萊特
# JP: 「簡単にできるから、やってみる？」
2620 = "「Dễ lắm, em muốn thử không?」"
# 【凪】
# display as 凪＆深美
# JP: 「うんっ！」
2464 = "「Vâng!」\\\n「Vâng!」"
# monologue
# JP: もぞっと、僕の胸の中の日々姫が動く。\nいまは、気づかぬふりをしよう。
3409 = "Hibiki trong ngực tôi khẽ cựa quậy.\\ Bây giờ cứ vờ như không để ý vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「あのね？　こっちがブレーキハンドルで、\nこっちが[マスコンハンドル,5]集合運転装置」
2720 = "「Này nhé? Đây là cần phanh,\\ còn đây là bộ điều khiển trung tâm.」"
# monologue
# JP: 凪が\x%lマスコン;#00ffc040;マスコン%l;#;、\nふかみがブレーキにそれぞれ取りつく。
3219 = "Nagi nắm lấy \\\\x%lマスコン;#00ffc040;điều khiển trung tâm%l;#;,\\ còn Fukami thì giữ phanh."
# monologue
# JP: ポーレットの説明に従い、\nブレーキを\x%l運転位置;#00ffc040;運転位置%l;#;に、そして\x%lマスコン;#00ffc040;マスコン%l;#;は前進に――
3295 = "Làm theo hướng dẫn của Paulette,\\ họ chuyển phanh sang \\\\x%l運転位置;#00ffc040;vị trí chạy tàu%l;#;, và đẩy \\\\x%lマスコン;#00ffc040;điều khiển trung tâm%l;#; về phía trước——"
# monologue
# JP: （フィンっ）
3758 = "（Vùuu）"
# 【凪】
# display as 凪
# JP: 「動いたばいっ！」
2353 = "「Chạy rồi kìa!」"
# 【ふかみ】
# display as 深美
# JP: 「速いよ！　凪ちゃん、レイナナ、速すぎっ！」
2507 = "「Nhanh quá! Nagi, KiHa 07 chạy nhanh quá!」"
# 【凪】
# display as 凪
# JP: 「なら、ブレーキをかけりゃええばい」
2881 = "「Thế thì, đạp phanh là được chứ gì.」"
# 【ふかみ】
# display as 深美
# JP: 「あ、そうか」
2446 = "「A, đúng rồi.」"
# monologue
# JP: 絵に描いたような急\x%l制動;#00ffc040;制動%l;#;。
3203 = "Cú \\\\x%l制動;#00ffc040;hãm phanh%l;#; gấp y như trong tranh."
# monologue
# JP: レイアウトの中のレイナナは、\nけれどもスっ――と綺麗に止まる。
3249 = "KiHa 07 trong sa bàn,\\ thế mà lại dừng lại một cách hoàn hảo."
# 【ハチロク】
# display as 八六
# JP: 「……なるほど、こういう仕組みでしたか。\nこの模型のレイナナは、実は\x%l電車;#00ffc040;電車%l;#;だったのですね」
1924 = "「……Ra là vậy, cơ chế hoạt động là thế này sao.\\ KiHa 07 trong mô hình này, thực chất là \\\\x%l電車;#00ffc040;tàu điện%l;#; nhỉ.」"
# monologue
# JP: 感心したようなハチロクの声。\nポーレットは嬉しげに頷き返す。
3198 = "Giọng Hachiroku đầy vẻ thán phục.\\ Paulette vui vẻ gật đầu đáp lại."
# 【ポーレット】
# display as 波萊特
# JP: 「そう、\x%lNゲージ;#00ffc040;Nゲージ%l;#;は全部が電動」
2662 = "「Đúng vậy, \\\\x%lNゲージ;#00ffc040;N-gauge%l;#; đều chạy bằng điện hết.」"
# 【ハチロク】
# display as 八六
# JP: 「模型の中では、\n\x%l帝鉄;#00ffc040;帝鉄%l;#;の描いた理想の未来が実現したのですね」
2495 = "「Bên trong mô hình này,\\ tương lai lý tưởng mà \\\\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; vẽ ra đã trở thành hiện thực nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っと！」
2432 = "「A!」"
# monologue
# JP: ああ、そうだ。\nまさしくそうだ――“未来図”だ。
3267 = "À, đúng rồi.\\\nChính là nó——\\\"Bản đồ tương lai\\\"."
# monologue
# JP: おもちゃで遊ぶ楽しさに、心を奪われている場合ではない。
3596 = "Giờ không phải lúc để tâm trí bị cuốn vào niềm vui chơi đồ chơi."
# 【双鉄】
# display as 雙鐵
# JP: 「レイナナと、あとは[ハチロク,3]8620もあったよな。\nその他、\x%l客車;#00ffc040;客車%l;#;なども用意することはできるのか？」
2912 = "「Có KiHa 07, và cả 8620 nữa nhỉ.\\ Ngoài ra, có thể chuẩn bị thêm \\\\x%l客車;#00ffc040;toa hành khách%l;#; không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、できますよ。\n\x%lNゲージ;#00ffc040;Nゲージ%l;#;は今も、新作とか結構出てる世界ですから」
2471 = "「Vâng, được chứ ạ.\\ \\\\x%lNゲージ;#00ffc040;N-gauge%l;#; là thế giới mà đến giờ vẫn liên tục ra mắt các mẫu mới mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2490 = "「Ồ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それだけじゃなく、車輛やレイアウトを自作・改造する、\nいわゆる模型テツもたくさんいます」
2767 = "「Không chỉ vậy, còn có rất nhiều người đam mê tự chế, cải tạo toa xe và sa bàn,\\ hay còn gọi là những người đam mê mô hình đường sắt nữa.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、全力で進行するから、\n駅ぴったりにとめてばいっ！」
2547 = "「Fukami, mình sẽ cho chạy hết tốc lực,\\ cậu nhớ dừng đúng ngay nhà ga nha!」"
# 【ふかみ】
# display as 深美
# JP: 「むつかしそう。わたしにできるかな」
2512 = "「Có vẻ khó quá. Không biết mình làm được không.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ブレーキするときは\x%lマスコン;#00ffc040;マスコン%l;#;戻して！\nモーターに負荷がかかっちゃうから」
2346 = "「Lúc phanh nhớ trả \\\\x%lマスコン;#00ffc040;điều khiển trung tâm%l;#; về nhé!\\ Nếu không sẽ làm hỏng động cơ mất.」"
# 【凪】
# display as 凪
# JP: 「わかったばい」
2390 = "「Em biết rồi.」"
# monologue
# JP: 注意しつつもポーレットの目は、\n凪とふかみを、どこか嬉しげに見守っている。
3550 = "Dù đang nhắc nhở, nhưng ánh mắt Paulette\\ vẫn dõi theo Nagi và Fukami với vẻ vui mừng."
# 【ポーレット】
# display as 波萊特
# JP: 「“失われた鉄道風景を手元に置きたい”って、\nいまはそれが、一番主流の鉄道趣味で――――――あ」
1916 = "「\\\"Muốn giữ lại những khung cảnh đường sắt đã mất trong tầm tay\\\",\\ đó hiện là thú vui đường sắt phổ biến nhất――――――A.」"
# monologue
# JP: ポーレットの口が丸く開く。\n青い瞳が、僕へ向く。
3548 = "Miệng Paulette há hốc thành hình tròn.\\ Đôi mắt xanh biếc hướng về phía tôi."
# monologue
# JP: そう。\n僕もその可能性を考えている。
3512 = "Đúng vậy.\\\nTôi cũng đang nghĩ đến khả năng đó."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lNゲージ;#00ffc040;Nゲージ%l;#;の車輛や、レイアウトの自作・改造というのは、\nどうだ？　難しいものなのか？」
1900 = "「Việc tự chế tạo hay cải tạo toa xe và sa bàn \\\\x%lNゲージ;#00ffc040;N-gauge%l;#;,\\ thì sao? Có khó lắm không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの、レイアウトって発泡スチロールを削って、\n色を塗って、ミニチュア置いて作るものですし……」
2846 = "「Dạ, sa bàn thì chỉ cần gọt xốp,\\ tô màu, rồi đặt mô hình thu nhỏ lên là được mà……」"
# monologue
# JP: その一言を聞いた瞬間、ぐい、と日々姫が顔を上げる。
3671 = "Khoảnh khắc nghe thấy câu đó, Hibiki giật nảy mình ngẩng đầu lên."
# monologue
# JP: ポーレットは気づいていないのか、\nあるいは気づいたその上の、気づかぬふりで話し続ける。
3545 = "Không biết Paulette không nhận ra,\\ hay là nhận ra rồi nhưng vẫn vờ như không biết mà tiếp tục nói."
# 【ポーレット】
# display as 波萊特
# JP: 「車輛の方も、\x%l台車;#00ffc040;台車%l;#;とモーターは流用できるし、車体は、\n縮尺図面で設計図起こしてプラ[バン]板切って塗装して、で」
2248 = "「Về phần toa xe, \\\\x%l台車;#00ffc040;giá chuyển hướng%l;#; và động cơ có thể dùng lại được, còn thân xe,\\ chỉ cần vẽ bản thiết kế theo tỷ lệ thu nhỏ, cắt tấm nhựa rồi sơn lên là xong.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、こういうのはどうだろう」
2897 = "「Nếu vậy, thế này thì sao?」"
# monologue
# JP: 失われた鉄道風景――その一言で確信できた。\nこのレイアウトは、やはりかつての御一夜の光景なのだと。
3287 = "Khung cảnh đường sắt đã mất——chỉ một câu nói đó thôi đã đủ để tôi tin chắc.\\ Sa bàn này, quả nhiên là khung cảnh Ohimitera ngày xưa."
# 【双鉄】
# display as 雙鐵
# JP: 「このレイアウトに継ぎ足しをして巨大な御一夜市――\nいや、いっそ湯医線沿線の広域モデルを作る」
2613 = "「Thêm thắt vào sa bàn này để tạo thành một thành phố Ohimitera khổng lồ——\\ Không, thà làm luôn mô hình quy mô lớn dọc tuyến Yui đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 2461 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「作るが、完全な形にはしない。\n継ぎ足し部分は、あえて剥き出しの空白のままに留める」
2791 = "「Làm thì làm, nhưng không làm thành hình dạng hoàn chỉnh.\\ Phần thêm vào, cứ cố tình để trống trơn như vậy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「白紙ってことですね？　立体の」
2270 = "「Giống như tờ giấy trắng ạ? Nhưng là 3D.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこに『自分の好きな御一夜の景色』を加えてもらう。\n誰にでも、気楽にやれる形がいい。具体的には――」
2695 = "「Rồi để mọi người thêm 『khung cảnh Ohimitera yêu thích của mình』 vào đó.\\ Phải làm sao cho ai cũng có thể dễ dàng tham gia. Cụ thể là——」"
# 【日々姫】
# display as 日日姬
# JP: 「まずはスケッチ。景色を加えたい人の話を聞いて、\nイメージスケッチ起こしていくのはどうでしょう？」
2937 = "「Đầu tiên là phác thảo. Lắng nghe những người muốn thêm cảnh vật,\\ rồi vẽ phác thảo ý tưởng thì sao ạ?」"
# monologue
# JP: 落ち着いた声。\n日々姫が話に加わってくる。
3351 = "Giọng nói điềm tĩnh.\\\nHibiki xen vào câu chuyện."
# monologue
# JP: その目は真っ赤で、ふちの方はまだ潤んでて。\nけれども強い意志の光を取り戻している。
3315 = "Đôi mắt em ấy đỏ hoe, khóe mắt vẫn còn ươn ướt.\\ Nhưng đã lấy lại được ánh sáng của ý chí kiên định."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そのやり方を試してみよう。\nれいな、いいか」
2888 = "「Vậy thì, thử cách đó xem sao.\\\nReina, lại đây nào.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですよぉ～」
2506 = "「Dạ có em đây nha~」"
# monologue
# JP: 凪とふかみと一緒になってはしゃいでいた、\nれいながぽてぽてやってくる。
3521 = "Đang nô đùa cùng Nagi và Fukami,\\ Reina lạch bạch chạy tới."
# 【双鉄】
# display as 雙鐵
# JP: 「この地図にひとつ、お前の大好きな御一夜を\n加えるのなら、なにがいい？」
2523 = "「Nếu được thêm một nơi mà em yêu thích nhất ở Ohimitera\\ vào bản đồ này, em sẽ chọn gì?」"
# 【れいな】
# display as 玲奈
# JP: 「レールショップ！\nレールショップにきまってますですぅ」
2907 = "「Rail Shop!\\\nChắc chắn là Rail Shop rồi ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「オッケー。レールショップ」
2946 = "「Ok. Rail Shop.」"
# monologue
# JP: こんなときでも肌身離さず持ってきている、\nスケッチブックと筆入れと。
3298 = "Ngay cả lúc này, em ấy vẫn mang theo bên mình,\\ cuốn sổ phác thảo và hộp bút."
# monologue
# JP: 日々姫の鉛筆はさささと走り、\n白紙の上にレールショップを描き出す。
3501 = "Bút chì của Hibiki lướt nhanh,\\ vẽ ra Rail Shop trên tờ giấy trắng."
# 【れいな】
# display as 玲奈
# JP: 「はわわ、じょうずですぅ」
2429 = "「Oa, chị vẽ đẹp quá nha.」"
# 【日々姫】
# display as 日日姬
# JP: 「スケッチがまとまったら、\n簡略化して、図面に――紙の模型に起こしてあげる」
2715 = "「Khi phác thảo xong,\\ chị sẽ đơn giản hóa nó, rồi dựng thành bản vẽ——thành mô hình giấy.」"
# monologue
# JP: 直線がいくつも引かれ、その上、\n色鉛筆で屋根が、壁面が塗られていく。
3310 = "Vài đường thẳng được kẻ ra, sau đó,\\ mái nhà, bức tường được tô bằng bút chì màu."
# monologue
# JP: カッターとカッターマットと定規とノリとつまようじ。\nただそれだけで――レールショップが立ち上がる。
3662 = "Dao rọc giấy, thảm cắt, thước kẻ, hồ dán và tăm xỉa răng.\\ Chỉ với ngần ấy thứ——Rail Shop đã thành hình."
# 【日々姫】
# display as 日日姬
# JP: 「これを、この駅舎の横に……ちょこんって」
2614 = "「Đặt cái này, bên cạnh nhà ga này……nhẹ nhàng thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁ！　できました！　ポーレットとれいなの、\nみんなのお店ができましたぁ！」
2394 = "「Oa! Xong rồi! Cửa hàng của mọi người,\\ của chị Paulette và Reina xong rồi nha!」"
# monologue
# JP: れいな、興奮。\n日々姫が自然と、僕を見る。
3593 = "Reina phấn khích.\\\nHibiki tự nhiên nhìn tôi."
# 【日々姫】
# display as 日日姬
# JP: 「これ、今は暫定で色鉛筆と画用紙だけど。\n紙を選んでガッシュで塗れば、クオリティあげられる」
2710 = "「Cái này, bây giờ chỉ tạm thời dùng bút chì màu và giấy vẽ thôi.\\ Nếu chọn giấy tốt và tô bằng màu bột, chất lượng sẽ còn cao hơn nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これより更にか」
2681 = "「Còn đẹp hơn thế này nữa sao?」"
# 【ふかみ】
# display as 深美
# JP: 「発船所！　発船所と川下りもっ」
2869 = "「Bến thuyền! Cả bến thuyền và thuyền xuôi dòng nữa!」"
# 【凪】
# display as 凪
# JP: 「それなら、うちの鍛冶屋も欲しかとばいっ！」
2882 = "「Nếu vậy, em cũng muốn có lò rèn nhà em nữa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ待て待て待て、順番だ」
2339 = "「Thôi từ từ nào, xếp hàng đi.」"
# monologue
# JP: 手ごたえを強く感じる。\nだからこそ、あせらず足場を確認していく。
3407 = "Tôi cảm nhận được sự thành công rõ rệt.\\ Chính vì thế, tôi không vội vàng mà cẩn thận xác nhận từng bước đi."
# 【双鉄】
# display as 雙鐵
# JP: 「建物以外の、自然景などはどうだ？」
2560 = "「Ngoài các tòa nhà ra, còn cảnh quan thiên nhiên thì sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「川は多分、掘ったスチロールに絵具を混ぜた樹脂を\n流してるんだと思う。山は、盛った上に絵具と……[いろずな,1]色砂」
2686 = "「Sông thì chắc là đổ nhựa pha màu vào phần xốp đã khoét.\\ Còn núi thì đắp lên rồi tô màu và rắc……cát màu.」"
# monologue
# JP: 森を、木を、砂地を、橋を。\nその構造を日々姫は確かめ、その目で構造を解剖していく。
3519 = "Rừng, cây, bãi cát, cây cầu.\\ Hibiki kiểm tra cấu trúc của chúng, rồi dùng mắt phân tích từng chi tiết."
# 【日々姫】
# display as 日日姬
# JP: 「できる。っていうか――できなくても、やる。\n私、これ、できるようになるし、やりたい」
2369 = "「Làm được. Nói đúng hơn là——không được cũng phải làm.\\ Em sẽ học cách làm, và em muốn làm việc này.」"
# monologue
# JP: 日々姫がすっくと立ち上がる。
3497 = "Hibiki bật dậy."
# monologue
# JP: そして深々――\nとても自然に、凛と美しく頭を下げる。
3582 = "Rồi cúi gập người——\\ một cách vô cùng tự nhiên, trang nghiêm và tuyệt đẹp."
# 【日々姫】
# display as 日日姬
# JP: 「私に、これ。どうかやらせてください。\nみんなの未来図、描くお手伝いをさせてください」
2794 = "「Xin hãy giao việc này cho em.\\ Hãy để em giúp mọi người vẽ nên bản đồ tương lai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕はもちろん、日々姫の味方だ。\n他のみんなは、どうだろう？」
2593 = "「Anh tất nhiên là ủng hộ Hibiki rồi.\\ Còn mọi người thì sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「賛成です。\nなんか、これ、すごく楽しくていいと思います」
2598 = "「Em tán thành.\\ Em thấy việc này có vẻ rất vui và ý nghĩa.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、もーっとおっきい御一夜の中で、\nレイナナが走るのを見てみたいですぅ！」
2703 = "「Reina cũng muốn thấy KiHa 07\\ chạy trong một Ohimitera rộng lớn hơn nha!」"
# 【ハチロク】
# display as 八六
# JP: 「電動、というのがやや悔しくはありますが、\n\x%l8620;#00ffc040;8620%l;#;も、ぜひとも走らせてあげてください」
2918 = "「Dù chạy bằng điện thì có chút đáng tiếc,\\ nhưng xin hãy cho cả \\\\x%l8620;#00ffc040;8620%l;#; chạy cùng nhé.」"
# 【凪】
# display as 凪
# JP: 「もちろん賛成、大賛成の超賛成ばいっ！」
2389 = "「Tất nhiên là tán thành, cực kỳ tán thành, siêu tán thành luôn!」"
# 【ふかみ】
# display as 深美
# JP: 「わたしももちろん。ええと……究極賛成。です」
2581 = "「Em cũng vậy. Ừm……tán thành tuyệt đối. Ạ.」"
# monologue
# JP: 圧倒的な――究極にまで至ってくれた、賛同の声。
3282 = "Những tiếng tán thành áp đảo——đạt đến mức độ tuyệt đối."
# monologue
# JP: その中、最重要の人物だけは、\nまだ沈黙を保っている。
3175 = "Trong số đó, chỉ có nhân vật quan trọng nhất,\\ là vẫn giữ im lặng."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉はどう思う？」
2730 = "「Chị Mayami thấy sao?」"
# 【真闇】
# display as 真闇
# JP: 「向こうさんは『説明し、伝える』\n対してウチは、『忘れとることを、思いださせる』」
2542 = "「Bên kia thì 『giải thích và truyền đạt』.\\ Còn chúng ta thì 『gợi nhớ lại những điều đã bị lãng quên』.」"
# monologue
# JP: ああ、そうか。
3266 = "À, ra vậy."
# monologue
# JP: 自分の大好きな御一夜の景色とは、\nその人の一番大事な思い出にほぼ等しいのか。
3112 = "Khung cảnh Ohimitera mà mình yêu thích nhất,\\ gần như đồng nghĩa với kỷ niệm quý giá nhất của người đó sao."
# 【真闇】
# display as 真闇
# JP: 「向こうさんは、『完成形を見せて示す』\n対してウチは、『参加して共に作ってもらう』」
2541 = "「Bên kia thì 『trưng bày sản phẩm hoàn thiện』.\\ Còn chúng ta thì 『mời mọi người cùng tham gia chế tạo』.」"
# monologue
# JP: それもそうだ。
3730 = "Cũng đúng."
# monologue
# JP: 話を聞き取り作るのだから、\nそれは自然と、対話・参加型ということになる。
3450 = "Vì phải lắng nghe ý kiến rồi mới làm,\\ nên tự nhiên nó sẽ trở thành hình thức đối thoại - tham gia."
# 【真闇】
# display as 真闇
# JP: 「だけでなく、これ――『客車改修プロジェクト』とも、\n簡単に効果的に絡み合うとね」
2768 = "「Không chỉ vậy, cái này——còn có thể dễ dàng và hiệu quả\\ kết hợp với 『Dự án phục hồi toa hành khách』 nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2461 = "「嗯」" 
# monologue
# JP: まさしくだ。\nハチロクに、レイナナに、改修\x%l客車;#00ffc040;客車%l;#;の模型を引かせる。
3526 = "Đúng vậy.\\ Cho Hachiroku, cho KiHa 07 kéo mô hình \\\\x%l客車;#00ffc040;toa hành khách%l;#; đã được phục hồi."
# monologue
# JP: 日々姫のデザインする車輌なら、\n「これは何？」と、興味を喚起することもできよう。
3503 = "Nếu là toa xe do Hibiki thiết kế,\\ chắc chắn sẽ khơi gợi sự tò mò \"Đây là gì?\"."
# 【真闇】
# display as 真闇
# JP: 「双ちゃん。これ」
2549 = "「Sou-chan. Cái này...」"
# monologue
# JP: にこにこ笑いが消えている。\n真剣な目が、まっすぐまっすぐ僕を見据える。
3319 = "Nụ cười rạng rỡ đã biến mất.\\ Ánh mắt nghiêm túc nhìn chằm chằm vào tôi."
# 【真闇】
# display as 真闇
# JP: 「うまく回せば――\nうまいこと回るようにできれば、勝てっとよ」
2367 = "「Nếu vận hành tốt——\\ Nếu làm cho nó hoạt động trơn tru, chúng ta sẽ thắng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2481 = "「Ồ!」"
# monologue
# JP: 真闇姉のお墨付き。\n盛りあがらないわけがない。
3624 = "Đã được chị Mayami đảm bảo.\\ Không có lý do gì mà không hào hứng cả."
# monologue
# JP: けれども真闇姉は緩まない。\nそのまますっくと立ち上がり、厳しい声で僕らに告げる。
3134 = "Nhưng chị Mayami vẫn không hề thả lỏng.\\ Chị đứng bật dậy, nghiêm giọng tuyên bố với chúng tôi."
# 【真闇】
# display as 真闇
# JP: 「まずポーちゃんは\x%l客車;#00ffc040;客車%l;#;改修計画の準備と通常運行。\nその両方を、しっかりこなしてもらわんといけんよ」
2934 = "「Trước tiên, Pau-chan phải chuẩn bị cho kế hoạch phục hồi \\\\x%l客車;#00ffc040;toa hành khách%l;#; và duy trì vận hành bình thường.\\ Em phải hoàn thành tốt cả hai việc đó đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、やります。やるだけじゃなく、結果、出します」
2475 = "「Vâng, em sẽ làm. Không chỉ làm mà em sẽ mang lại kết quả.」"
# 【真闇】
# display as 真闇
# JP: 「\x%l客車;#00ffc040;客車%l;#;改修ば軌道に乗せるには、ポーちゃんの\x%lまいてつ;#00ffc040;まいてつ%l;\n#;人脈だけが頼りやけんね。しっかり頼むと」
2781 = "「Để việc phục hồi \\\\x%l客車;#00ffc040;toa hành khách%l;#; đi vào quỹ đạo, chỉ có thể trông cậy vào mạng lưới quan hệ \\\\x%lまいてつ;#00ffc040;chủ tàu%l;\\ #; của Pau-chan thôi. Trăm sự nhờ em đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、ポーレットをお手伝いしますよぉ！」
2701 = "「Reina sẽ giúp chị Paulette một tay nha!」"
# 【真闇】
# display as 真闇
# JP: 「うん。れーちゃんにはそれ、お任せするけんねぇ」
2460 = "「Ừm. Việc đó giao cho Rei-chan nhé.」"
# monologue
# JP: やさしく言って、真闇姉の視線は凪とふかみに。
3308 = "Nói một cách dịu dàng, ánh mắt chị Mayami chuyển sang Nagi và Fukami."
# 【真闇】
# display as 真闇
# JP: 「ふたりには、\n学園生たちにこん話しば広めてもらいたかとよ」
2387 = "「Chị muốn hai đứa\\ lan truyền chuyện này cho các học sinh trong trường biết.」"
# 【凪】
# display as 凪
# JP: 「やるばい！　得意ばいっ！　任せろばいっ！！」
2463 = "「Làm thôi! Sở trường của em mà! Cứ giao cho em!!」"
# 【ふかみ】
# display as 深美
# JP: 「これ、すっごくわくわくしますから。展示会のときより、\nもっとみんな、来てくれるって思います」
2725 = "「Cái này thú vị lắm luôn. Chắc chắn sẽ có nhiều người\\ đến xem hơn cả hồi triển lãm nữa.」"
# 【真闇】
# display as 真闇
# JP: 「ハチロクちゃんは、Ｎゲージやらの図面起こしの\n手伝いと、\x%l8620;#00ffc040;8620%l;#;復活のための準備全般」
2328 = "「Hachiroku-chan thì phụ giúp việc lên bản vẽ cho N-gauge,\\ và chuẩn bị toàn bộ những việc cần thiết để hồi sinh \\\\x%l8620;#00ffc040;8620%l;#; nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「お任せください。どちらも、完璧に仕上げて見せます」
2280 = "「Xin cứ giao cho tôi. Cả hai việc tôi đều sẽ hoàn thành một cách hoàn hảo.」"
# 【真闇】
# display as 真闇
# JP: 「で、双ちゃんは今までどおり」
2902 = "「Còn Sou-chan thì vẫn như trước giờ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「選挙の裏方全般と、\n\x%l8620;#00ffc040;8620%l;#;復活に備えた訓練の継続とだな」
2865 = "「Đảm nhận toàn bộ hậu phương của cuộc bầu cử,\\ và tiếp tục huấn luyện chuẩn bị cho sự hồi sinh của \\\\x%l8620;#00ffc040;8620%l;#; đúng không.」"
# monologue
# JP: 組織固めにマスコミ対策、広報活動、資金調達等々、\n選挙においてやるべきことは無数にある。
3352 = "Củng cố tổ chức, đối phó truyền thông, hoạt động quan hệ công chúng, huy động vốn, v.v.\\ Có vô số việc phải làm trong một cuộc bầu cử."
# monologue
# JP: 日々姫が安心して上に立てるよう、\nその足場を作ることこそ、言われずとも僕の今の最優先だ。
3575 = "Tạo nền tảng vững chắc để Hibiki yên tâm đứng ở vị trí lãnh đạo,\\ không cần nói cũng biết đó là ưu tiên hàng đầu của tôi lúc này."
# 【双鉄】
# display as 雙鐵
# JP: 「心配不要だ。上手くやるさ」
2256 = "「Không cần lo đâu. Anh sẽ làm tốt thôi.」"
# 【真闇】
# display as 真闇
# JP: 「で、ひーちゃん」
2901 = "「Vậy, Hi-chan.」"
# monologue
# JP: 真闇姉が、にこにこを消して日々姫を見る。\n日々姫は背筋を伸ばし、真闇姉の視線を受け止める。
3619 = "Chị Mayami tắt hẳn nụ cười, nhìn sang Hibiki.\\ Hibiki thẳng lưng, đón nhận ánh mắt của chị Mayami."
# monologue
# JP: 姉と、妹。このふたりが対等に向き合う姿を……\n僕は初めて目にしている。
3335 = "Chị gái và em gái. Cảnh hai người họ đối diện nhau một cách bình đẳng thế này……\\ Đây là lần đầu tiên tôi được chứng kiến."
# 【真闇】
# display as 真闇
# JP: 「任せたいのは、御一夜の未来」
2385 = "「Điều chị muốn giao phó cho em, là tương lai của Ohimitera.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、任された」
2466 = "「Vâng, cứ giao cho em.」"
# 【真闇】
# display as 真闇
# JP: 「なら、安心たい」
2884 = "「Vậy thì chị yên tâm rồi.」"
# monologue
# JP: たったそれだけ。\n三十秒にも満たない会話。
3246 = "Chỉ có vậy thôi.\\ Một cuộc trò chuyện chưa đầy 30 giây."
# monologue
# JP: けれども空気がピシリと締まる。\n名実ともに、日々姫が僕らの軸として立ったと強く感じる。
3180 = "Nhưng bầu không khí bỗng trở nên căng thẳng.\\ Tôi cảm nhận mạnh mẽ rằng, Hibiki đã thực sự trở thành trụ cột của chúng tôi cả về danh nghĩa lẫn thực tế."
# 【日々姫】
# display as 日日姬
# JP: 「で、ええと……\nあ、真闇姉、ごめん」
2899 = "「Vậy thì, ừm……\\\nA, chị Mayami, xin lỗi nhé.」"
# monologue
# JP: 日々姫が椅子に座りなおして、\n凪とふかみを前に座らせ、申し訳なさそうな声をだす。
3508 = "Hibiki ngồi lại ngay ngắn trên ghế,\\ để Nagi và Fukami ngồi đối diện, rồi cất giọng áy náy."
# 【日々姫】
# display as 日日姬
# JP: 「私の画材――あの、木の箱の中に入ってる方の」
2595 = "「Họa cụ của chị——cái loại được cất trong hộp gỗ ấy.」"
# 【真闇】
# display as 真闇
# JP: 「よかよっ！」
2513 = "「Được thôi!」"
# monologue
# JP: 破顔一笑。
3620 = "Chị Mayami phá lên cười."
# monologue
# JP: 見たこともないほどの、底抜けに明るい笑みを浮かべて、\n真闇姉は、足取り軽くレールショップから駆け出していく。
3626 = "Nở một nụ cười rạng rỡ chưa từng thấy,\\ chị Mayami nhẹ nhàng chạy vụt ra khỏi Rail Shop."
