2482 = "「噢，原來是這樣讓它動起來的啊！？」" 

# 【ふかみ】
# display as 深美
# JP: 「おもしろそう。です。\nちょっと、動かしてみたいかも」
2509 = "「好有趣啊。我也想開一次試試」" 

# 【ポーレット】
# display as 波萊特
