2670 = "「是駕駛台形狀的動力裝置。把這個插在插座上。然後這根線插到鐵軌的介面上——」" 

# monologue
# JP: 線をいくつか接続してから、\nポーレットは小声で指差\x%l喚呼;#00ffc040;喚呼%l;#;。
3303 = "她接完幾根接線後，小聲進行\\x%l喚呼;#00ffc040;復誦%l;#;。" 

