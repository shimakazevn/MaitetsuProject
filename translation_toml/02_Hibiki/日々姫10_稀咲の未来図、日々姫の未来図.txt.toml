# lines: 497 
# 【浦上】
# display as 浦上
# JP: 「稀咲様。セッティングが整いました」
2743 = "「稀咲小姐。採訪的人已經準備好了」" 

# monologue
# JP: ドアの外から浦上の声。\nボクの準備も、もう終わっている。
3736 = "門外傳來浦上的聲音。我也已經準備完畢了。" 

# 【稀咲】
# display as 稀咲
# JP: 「いいよ。通して」
2478 = "「嗯，讓他們進來吧」" 

# 【浦上】
# display as 浦上
# JP: 「畏まりました」
2279 = "「了解」" 

# monologue
# JP: インタビューなんて好きじゃない。
3386 = "我並不喜歡採訪。" 

# monologue
# JP: 話すべきことは政見放送にまとめてあるし、\n公示直後の記者会見でも過不足なく伝えた筈だ。けど――
3405 = "我想說的事都統一在政見節目裡說了，在公示之後的記者會也應該完完整整地表達了我的意見。但是——" 

# monologue
# JP: （コンコン）
3764 = "（敲門聲）" 

# 【記者Ａ】
# display as 市川
# JP: 「失礼します」
2505 = "「失禮了」" 

# 【稀咲】
# display as 稀咲
# JP: 「やぁ、ようこそいらっしゃいました、\n隈元新報の市川さん」
2380 = "「呀，歡迎你今天特地前來，隈元新報的市川先生」" 

# monologue
# JP: 笑顔で立ち上がる。名前を呼ぶ。こちらから握手を求める。\n――こうした些細なことの効果は決してバカに出来ない。
3403 = "我微笑著站起身。叫著他的名字，然後主動和他握手。——這些細節所產生的效果決不可輕視。" 

# monologue
# JP: “過不足無し”では常に足りない。\n誰しもが「自分だけ」には、特別なサービスを求めるのだ。
1877 = "“不偏不倚”往往會讓人覺得缺了點什麼。不管是誰都想讓自己能獲得一些特殊服務。" 

# 【稀咲】
# display as 稀咲
# JP: 「インタビューの機会を設けていただけましたこと、\nとても嬉しく思います」
2857 = "「這次承蒙您能給我一個接受採訪的機會，我感到十分高興」" 

# 【記者Ａ】
# display as 市川
# JP: 「こちらこそ、\n市長就任前の貴重なお時間をありがとうございます」
2577 = "「應該道謝的是我。感謝您能在就任市長前抽出寶貴的時間來接受採訪」" 

# 【稀咲】
# display as 稀咲
# JP: 「まだ投票も済んでいません。\nお世辞とわかっていても、プレッシャーを感じますよ」
2616 = "「投票都還沒結束呢。就算您說的是客套話也會讓我感到壓力很大呀」" 

# 【記者Ａ】
# display as 市川
# JP: 「いやいや、これは少しばかり気が早すぎましたか」
2401 = "「哎呀哎呀，我有點太心急了」" 

# 【稀咲】
# display as 稀咲
# JP: 「あははっ、お上手ですね」
2431 = "「啊哈哈，您可真會開玩笑」" 

# monologue
# JP: “特別”を感じさせるための、社交辞令とお世辞の応酬。\n和やか親しい雰囲気を演出するためだけの笑い。
3724 = "這是為了讓別人感到“特別”而互相說的社交措辭和禮節話。臉上的笑容也只是為了表演出一種和諧親切的氣氛罷了。" 

# monologue
# JP: インタビューも同じ。つまるところ、不特定多数に対する、\n“特別なサービス”の提供だ。
3446 = "採訪也是一樣。歸根到底，這只是給不特定多數的人提供的一種“特殊服務”而已。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボク以外の候補のみなさんにも、\n同じことをおっしゃってるんではないですか？」
2568 = "「您對我以外的候選人也說過同樣的話吧？」" 

# monologue
# JP: だから、ひねりすぎない言葉を選ぶ。
3439 = "所以，我選擇了不會太拐彎抹角的說法。" 

# monologue
# JP: “わかる”と感じてもらえないなら、\n共感を得ることも不可能になる。
3128 = "不能讓別人感到“理解”的話，要和那個人獲得共感也是不可能的。" 

# 【記者Ａ】
# display as 市川
# JP: 「そこまでのことはしませんよ。\nインタビュー予定の候補者さん、他にお一方だけですし」
2254 = "「不會不會。我預定要採訪的其他候選人也只有一位而已」" 

# 【稀咲】
# display as 稀咲
# JP: 「一人だけ」
2239 = "「一位？」" 

# monologue
# JP: なら対立構図が、マスコミのいかにも好む絵になる……\n煽ったときに盛り上がる、その相手しかありえない。
3732 = "那肯定是媒體虎視眈眈地逮著我和她針鋒相對的場面的……一被撩撥就情緒上頭的那個人。" 

# 【稀咲】
# display as 稀咲
# JP: 「――右田日々姫候補ですか」
1908 = "「——是右田日日姬小姐嗎」" 

# 【記者Ａ】
# display as 市川
# JP: 「ご明察です。やはり、気になる存在ですか？」
2569 = "「您猜中了。果然她讓您特別在意嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「ええ。\n学園で、同じクラブの先輩後輩の仲ですから」
2456 = "「嗯。我們在學校裡可是同一個俱樂部的前輩後輩的關係呢」" 

# 【記者Ａ】
# display as 市川
# JP: 「おっと、その辺の話は少し待ってくださいね。\nテープ、回してよろしいですか？」
2484 = "「噢，接下來的話請暫停一下。我可以用錄音機嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「ご自由に」
2793 = "「請您自便」" 

# monologue
# JP: テープといいつつ、取り出されるのはＩＣレコーダー。\n大雑把かつ古い人間だな、と感じてしまう。
3171 = "他雖然嘴上說錄音機，可拿出來的卻是錄音筆。不由得讓人覺得他是個又毛躁又守舊的人。" 

# monologue
# JP: こういう男に、日々姫のことを論評されたいとは思わない。\n流れを、一度切ってしまおう。
3393 = "我可不想讓這種人來評述日日姬怎麼樣。我先轉換話題吧。" 

# 【稀咲】
# display as 稀咲
# JP: 「それで――今日のインタビューでは、\nどのようなお話をさせていただけば？」
2893 = "「那麼——今天的採訪您想問我些什麼問題呢？」" 

# 【記者Ａ】
# display as 市川
# JP: 「まず、立候補会見の際に打ち出してらした都市計画、\n『エアクラシティ御一夜』についてお伺いできればと」
2938 = "「首先，我想問您一下您在宣布參選的時候打出的都市計劃“空凝機之城御一夜”的有關情報」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうですか。\nでしたら、こちらから御覧ください」
2652 = "「是嗎，那請看這裡」" 

# monologue
# JP: 1/1000スケールの都市モデル――\n現在の御一夜ではなく、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致後の。
3774 = "１/１０００比例的城市模型——不是現在的御一夜，而是引進\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠之後的。" 

# monologue
# JP: 精密にかつ美麗に作りこまれたそれは、\n仮住まいである支店長室を殆ど埋め尽くすほどに大きい。
3680 = "製造得精密又漂亮的整個模型大得幾乎把我暫住的整個支行長室都占滿了。" 

# 【記者Ａ】
# display as 市川
# JP: 「ああ、これは……いや、\n立候補会見のときにも遠目では拝見しましたが」
2489 = "「噢，這可真……哎呀呀，雖然在您在宣布參選的時候也遠遠地拜見過，不過走近一看果然很壯觀」" 

# 【稀咲】
# display as 稀咲
# JP: 「今日は市川さんの独り占めですから。\n細部まで、お気の済むまでじっくりどうぞ」
2293 = "「今天是市川先生您獨享眼福了。您可以自由地欣賞它的每一處角落」" 

# 【記者Ａ】
# display as 市川
# JP: 「見れば見るほど……いや、じつに見事なものですねぇ」
2807 = "「越看越覺得這模型做得真是好啊」" 

# monologue
# JP: エアロ＝クラフテック社の専門部署の製作だ。\n工場誘致を推進する――その目的のためだけの。
3725 = "這是由空凝科技公司裡的專業部門製作的。而目的只有一個——推進引進工廠計劃。" 

# monologue
# JP: 見事でなければ意味が無い。\n見事であるに留まらず、魅力的なものでなければ。
3684 = "要是做得不好就沒有意義了。而且還不能只是“好”，還得有魅力。" 

# 【記者Ａ】
# display as 市川
# JP: 「発船所の東にドン、と工場が出来るわけですか」
2272 = "「也就是說，工廠將會在漂流發船點的東邊建立是嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「ええ。エアロ＝クラフテック機関の心臓部である、\nキルクイティウムの精製には豊富な真水が必要ですから」
2458 = "「嗯。要精煉空凝機引擎的心臟“鐶”必須要用到大量淡水」" 

# 【記者Ａ】
# display as 市川
# JP: 「承知してます。\n実際、既存の\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の全ては――」
2848 = "「這個我知道。實際上，所有已建成的\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠裡——」" 

# monologue
# JP: 記者は、ポケットから手帳を取り出す。
3695 = "記者從口袋中拿出筆記本。" 

# 【記者Ａ】
# display as 市川
# JP: 「[イシカリ,1]石借川、[キタカミ,1]北神川、[モガミ,1]最紙川、[シナノ,1]品野川、[ジンツウ,1]陣痛川、[キソ,1]基礎川、\n[クズリュウ,1]葛龍川、[カコ,1]過去川、[キノ,1]木ノ川、[イビ,1]伊日川、[シマント,2]四万斗川、[チクゴ,1]築後川」
2733 = "「石狩河、北上河、最上河、信濃河、神通河、木曾河、九頭龍河、加古河、紀之河、揖斐河、四萬十河、筑後河」" 

# monologue
# JP: よく調べてある。\nこの全ては、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場が取水していて、なおかつ――
3169 = "他還調查得真仔細。這些河流全部都是\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠在取水的，並且——" 

# 【記者Ａ】
# display as 市川
# JP: 「一級水系――国が重要と認めている水系だけでも、\nこれだけの川が\x%lエアクラ;#00ffc040;エアクラ%l;#;工場と共存している」
2323 = "「光是在一級水系——國家認定為重要級別的水系的範圍內，都有如此多的河流與\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠共存」" 

# monologue
# JP: その通り。\nとなれば次は――答えたくない質問が来る。
3533 = "沒錯。那接下來——他估計就會問我不想回答的那個問題。" 

# 【記者Ａ】
# display as 市川
# JP: 「つまり、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場からの排水の安全性は、\n国が保障していると考えても差し支えないわけですね？」
2271 = "「也就是說，\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠的排水安全性可以認為有國家在保證，沒錯吧？」" 

# monologue
# JP: 質問の形をした事実確認――いや、世論誘導。
3172 = "以提問形式來進行事實確認——不，輿論誘導。" 

# monologue
# JP: そこに平然と乗れるほど、\nボクは大人に、なりきれてない。
3436 = "我還沒有成熟到能夠冷靜地對此做出應對。" 

# 【稀咲】
# display as 稀咲
# JP: 「それについては、浦上から。\n浦上は」
2842 = "「這一點就請浦上來說明吧。浦上是……」" 

# 【記者Ａ】
# display as 市川
# JP: 「ああ、既にお名刺をいただいたことが。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社からの出向社員の方ですよね」
2440 = "「啊，我已經拿到了他的名片。他是\\x%lエアクラ;#00ffc040;空凝機%l;#;公司的外派社員吧」" 

# 【浦上】
# display as 浦上
# JP: 「ご質問の件については、それでは自分から。\nエアロ＝クラフテック工場からの排水は、全て……」
2571 = "「您的問題就由我來說明吧，空凝科技公司工廠的排水，全部是……」" 

# monologue
# JP: 滔々と、浦上が排水の安全性を説明していく。\nいちいち、ご説ごもっとも。ボクだって十分理解している。
3563 = "浦上滔滔不絕地說明著排水的安全性。每一個論點都條理清晰。連我都能十分理解。" 

# monologue
# JP: いや…………九分九厘は理解し、納得できている。\nけど――
3120 = "不…………應該說九分九厘我是能理解接受的。但是——" 

# monologue
# JP: （どうしてそれほど安全なら、[タマ,1]多麻川、[アラ]粗川、[トネ]舎川、\n[ヨド,1]余土川――大都市圏の水系に立地しないんだ）
3767 = "（既然這麼安全，那為什麼多摩河、荒河、利根河、淀河——這些大城市周圍的河流旁邊沒有工廠呢）" 

# monologue
# JP: ……答えのわかりきっている、\nあまりに子供じみてる疑問。
1895 = "……這是一個答案很明顯，以至於顯得幼稚的問題。" 

# monologue
# JP: 直視しようとしてしまうなら、\nボクは自分に、言い訳だけしか出来なくなる。
3328 = "如果去直視這個問題，我就只能自己對自己找藉口了。" 

# monologue
# JP: （つまり、リスクはあるんだろうさ。けど――\n何のリスクも取らずに、地方都市の経済を再生なんて）
3756 = "（也是說還是會有一定風險。但是——在毫無風險的情況下要發展地方城市的經濟是不可想像的）" 

# 【記者Ａ】
# display as 市川
# JP: 「わかりやすいご説明で納得できました。\nでは、質問を都市モデルの方に戻しますが――」
2575 = "「感謝您通俗易懂的說明。那麼現在我想把問題回到城市模型上來——」" 

# monologue
# JP: 浦上の説明が、いつの間にやら終わっている。\nだけど慌てて表情を取り繕う必要なんてない。
3567 = "浦上的說明不知什麼時候已經結束了。但是我也沒有必要慌慌張張地掩飾自己的表情。" 

# monologue
# JP: 営業スマイルならば顔面に張り付いている。\n“外そう”と意識をせねば、外せないほど。
1878 = "“營業式微笑”早就牢固地黏在了我的臉上。牢固到只要我不想“撕掉”它，它就絕不會掉的程度。" 

# 【記者Ａ】
# display as 市川
# JP: 「鉄道路線と\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;がこのモデルにもありますね？」
2850 = "「這個模型裡也有鐵路和\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;啊？」" 

# 【稀咲】
# display as 稀咲
# JP: 「御一夜鉄道株式会社様の\x%l8620;#00ffc040;8620%l;#;をイメージしてます。\n工場誘致で住宅圏が広がれば、鉄道の重要性も増します」
2852 = "「這是以御一夜鐵路股份公司的\\x%l8620;#00ffc040;８６２０%l;#;為藍本的。如果引進工廠後住宅圈變大了，鐵路的重要性也會增加的」" 

# 【記者Ａ】
# display as 市川
# JP: 「通勤需要や通学需要」
2245 = "「上班和上學的需要嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうです。ですので\x%lエアクラ;#00ffc040;エアクラ%l;#;と鉄道の共存、\n両立――それは必須のこととなります」
2656 = "「是的。所以\\x%lエアクラ;#00ffc040;空凝機%l;#;與鐵道的共存、兩立——是必須的」" 

# monologue
# JP: 納得顔で記者が頷く。
3696 = "記者露出同意的表情點點頭。" 

# 【記者Ａ】
# display as 市川
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;の作動不能地帯を抱える御一夜ならでは、\nの重要性となりますか」
2854 = "「這是有著許多\\x%lエアクラ;#00ffc040;空凝機%l;#;無法運行地帶的御一夜特有的重要性吧」" 

# 【浦上】
# display as 浦上
# JP: 「あ。その点、念のため補足させてください」
2424 = "「啊。這一點為了保險起見請讓我補充說明」" 

# monologue
# JP: 浦上の視線は、記者にではなくボクに向いてる。\n頷き返せば、すぐさま言葉は重なっていく。
3565 = "浦上的視線沒有看著記者而看著我。我一點頭，他馬上開始說明起來。" 

# 【浦上】
# display as 浦上
# JP: 「エアロ＝クラフテック社は旧来の交通機関との共存を\n目指しています。御一夜に限っての話ではありません」
2753 = "「空凝科技公司一直以與舊有的交通工具共存為目標。並不是僅限於御一夜一個地方」" 

# 【記者Ａ】
# display as 市川
# JP: 「おっと、そうでしたね。理解しています」
2486 = "「噢，說來也是。我也早有耳聞」" 

