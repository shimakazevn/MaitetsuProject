# monologue
# JP: これでいい。\nこれなら、間違いなく広報をしてもらえる。
3722 = "這就好了，這樣就肯定會被宣傳出去了。" 

# 【稀咲】
# display as 稀咲
# JP: 「隈元銀行御一夜支店のロビーで明日から公開しますので。\n『\x%lエアクラ;#00ffc040;エアクラ%l;#;シティ御一夜』を、是非見て頂きたいですね」
2641 = "「明天就會在隈元銀行御一夜支行的大廳裡公開。我想您一定要看一看這座“\\x%lエアクラ;#00ffc040;空凝機%l;#;之城御一夜”」" 

# 【記者Ａ】
# display as 市川
