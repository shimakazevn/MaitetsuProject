# lines: 432 
# 【双鉄】
# display as 雙鐵
# JP: 「ここか。\nここが噂の[ぶんごもり,2]文庫森か」
1757 = "「就是這裡啊。這裡就是傳聞中的豐後森」" 

# 【日々姫】
# display as 日日姬
# JP: 「[せんけい,1]扇形機関庫……すごい！　かわいい」
1831 = "「扇形機車庫……好棒啊！太可愛了」" 

# monologue
# JP: 日々姫はもはやスケッチブックを開いている。\nデートでも視察でもそこは変わらん……ああ、いや。
2432 = "日日姬已經打開了素描簿。她這個習慣不管是去約會還是現場考察都雷打不動……啊，也不一定。" 

# monologue
# JP: （視察のときは、[クロッキー,1]速描で精一杯だものな）
2668 = "（去現場考察時，她最多只來得及使用速寫本記錄）" 

# monologue
# JP: それさえできず、必死で瞳に焼き付けて、\n落ち着き次第でペンを走らせていることさえある。
2552 = "萬一連用速寫本的時間都沒有，她還會極力牢記自己所見，直到有時間慢慢施展筆墨。" 

# monologue
# JP: デートだから、僕を信じて甘えられるから――\nどこまでだって、今日は集中できるのだろう。
2207 = "不過在約會中她可以完全信任和依賴我，所以今天才能把精力盡情投入在作畫上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、椅子代わりに」
1852 = "「日日姬，坐這個吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、うん。ありがと」
1675 = "「啊，嗯。謝謝你」" 

# monologue
# JP: トランクをお尻にあててやれば、\n日々姫は軽く腰を落とす。
2341 = "我把行李箱放在日日姬的屁股下，她便輕輕坐了下來。" 

# monologue
# JP: その仕草さえ、半ば無意識のものなのだろう。\n視線は少しも揺るがずに、手の動きもまた止まらない。
2289 = "她的視線絲毫未動，手上的動作也毫無停滯，我看就連坐下都是她下意識的動作吧。" 

# monologue
# JP: （絵になるものだな。絵を描く日々姫は）
2689 = "（畫畫中的日日姬真是美如畫啊）" 

# monologue
# JP: 思えば、シャッターを切っている。
2325 = "想到這裡，我已按下了快門。" 

# monologue
# JP: 日々姫のデザインをサポートしようと初めたカメラも、\nいつの間に、すっかり手に馴染むようになった。
2191 = "一開始是為了幫助日日姬的設計才拿起的相機，也在不知不覺中用得越來越順手了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……少し、撮るか」
1241 = "「……拍個幾張吧」" 

# monologue
# JP: 資料であれば、視察のときにもいくらも撮れる。\n日々姫のことをひとしきり撮ったあとでも十分だろう。
2560 = "要拍資料的話，考察時機會多得是。就算先拍一會日日姬，時間應該也足夠充裕。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、撮るぞ？」
1853 = "「日日姬，我要拍了哦」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　あ、うん」
1645 = "「哎？哦，嗯」" 

# monologue
# JP: 返事は、かなり上の空。\n逆から見れば、いい感じに集中できているのだろう。
2285 = "她的回答很心不在焉。也可以說她正處於精神高度集中的狀態。" 

# monologue
# JP: 声さえ満足に届かぬほどなら、\nシャッター音が日々姫の邪魔となることもなさそうだ。
2377 = "既然連我說話都不太搭理，那麼快門聲應該不至於干擾到她吧。" 

# monologue
# JP: （パシャっ）
2672 = "（喀嚓）" 

# 【双鉄】
# display as 雙鐵
# JP: 「どれ……ほう」
1811 = "「我看看……哦」" 

# monologue
# JP: バックモニターで確認すれば、\n自分で撮った写真に思わず見惚れてしまう。
2631 = "面對著相機螢幕的畫面，我不禁對自己拍到的照片看得入了神。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は……これほどに綺麗だったのだな」
1850 = "「日日姬……真就這麼漂亮啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　うん、ありがと」
1646 = "「哎？嗯，謝謝誇獎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ははっ。今日の日々姫は随分と素直だ」
1632 = "「哈哈。今天的日日姬好實誠啊」" 

# monologue
# JP: 反応が、ほとんど本能的なレベルだ。\n見栄も照れも、なにもかもが綺麗に削げ落ちている。
2284 = "她的回應近乎本能。不帶一絲虛榮和羞澀。" 

# monologue
# JP: 意識の九割――いや九分九厘、\n絵を描くことにとられているからのことだろう。
2273 = "她九成的注意力……不，應該是九成九的注意力都放在了繪畫之上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「笑っていればありえぬほどに愛らしいのに、\n真剣な顔が――こうも凛々しく美しいとは」
1568 = "「你的笑容已經可愛到天理難容，沒想到認真的表情也這麼清秀」" 

# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 

# monologue
# JP: 造形美といえばハチロクだが、\n日々姫とて全く負けていない。
2625 = "雖然八六的造型之美確是一絕，但日日姬也並不輸給她。" 

# monologue
# JP: いや、むしろ。僕基準では、ハチロク以上。\n――“美形”なのだと、いまさらながらに思い知る。
2214 = "不，以我的標準來說，日日姬反而更勝一籌。這一刻我才後知後覺地感受到她的輪廓有多美。" 

# monologue
# JP: （角度美人、というわけでもないよな？）
2680 = "（應該不是所謂的角度限定美女吧？）" 

# monologue
# JP: 内面ならば、他の誰より知っているという自負がある。
2334 = "我很確信自己比任何人都更了解她的內在美。" 

# monologue
# JP: けれどその分、外観を、\n細かなところまで気にしたことがなかった気がする。
2208 = "不過對於她的外觀，我之前可能沒有注意得那麼細緻入微。" 

# 【双鉄】
# display as 雙鐵
# JP: 「他の角度からも撮っていいか？」
1800 = "「我可以從其他角度拍嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「よかとよー」
1609 = "「可以哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――うむ」
2036 = "「那麼……嗯」" 

# monologue
# JP: 日々姫の視界を塞がずに、\nけれど様々な日々姫を撮りたい。
2336 = "我想在不干擾日日姬的視野的情況下拍攝各種角度的日日姬。" 

# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 

# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 

# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 

# monologue
# JP: 左右側面。それから背面。\n水平、俯瞰、あおりと撮って――。
2356 = "我要從水平、俯瞰、仰視的角度拍她的左右側面以及背面……" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ああ、モニターをチルトさせればいいのか」
1228 = "「……哦，扭一下螢幕就行了」" 

# monologue
# JP: ファインダーの覗きこみ辛い角度の場合は、\nバックモニターを[チルト,3]角度調整して撮影する。
2262 = "在難以使用取景器的角度，就扭轉螢幕來拍。" 

# monologue
# JP: 普段は全く使わぬが、\nたしか、自撮りとやらをするための機能だ。
2594 = "這個功能好像是為了自拍用的，雖然我平時根本用不到。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。180度回転もできるのだな」
1703 = "「嗯，還能旋轉１８０度啊」" 

# monologue
# JP: これならば、日々姫の前に回り込まずに、\n日々姫の顔を撮ることが出来る。
2600 = "這樣的話要拍日日姬的臉也用不著繞到日日姬面前了。" 

# monologue
# JP: 視界の邪魔をしないよう、\nなるべく見下ろすようにして――
2228 = "儘量用俯拍的方式，不要干擾到她的視野……" 

# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、俯瞰でも綺麗なものだ」
1630 = "「哇，俯拍也好美啊」" 

# monologue
# JP: 正面顔は、今は撮れない。
2351 = "我現在拍不了正臉。" 

# monologue
# JP: となると次は俯瞰――あおりだ。\nあおる以上は、地を這うように周りこみ……
2609 = "那下一張就從俯拍切換到仰拍。這麼拍就得趴在地上……" 

# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 

# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 

# 【双鉄】
# display as 雙鐵
# JP: 「これも、かわいい。\nというか、あおりの角度で撮ると……」
2003 = "「這張也很可愛。另外從仰視的角度拍的話……」" 

# monologue
# JP: 控えめなものと感じていた日々姫の体のボリュームも、\nなかなかのものに見えてくる。
2452 = "日日姬那原本感覺並不算豐滿的身體，這會看起來也頗為壯觀。" 

# monologue
# JP: 陰影が与える印象が、どれほど絵作りに影響するか、\n今更ながらに思い知る。
2358 = "我這才知道陰影造成的印象會給畫作帶來多大的影響。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは面白いな」
1998 = "「這些變化的確有趣」" 

# 【日々姫】
# display as 日日姬
# JP: 「……うん、面白い。\n光の当たり方で、表情、くるくる変わる」
1233 = "「……嗯，有趣有趣。在不同的光照條件下，表情會不斷改變」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ、いや――そうか、日々姫は、\n\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;に表情を見るのだな――っと」
1706 = "「嗯？啊，感覺，日日姬這是看出了\\x%l扇形機関庫;#00ffc040;扇形機車庫%l;#;的表情啊」" 

# monologue
# JP: カメラ越しにだけ見ていたせいで、見過ごしていた。
2256 = "因為我一直是透過相機鏡頭在觀察，所以忽略掉了這件事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「汗を拭くぞ？　目に入りかねん」
1802 = "「我幫你擦個汗，不然可能會流進眼睛裡的」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
1690 = "「嗯」" 

# monologue
# JP: いつの間に、陽射しがかなり強まっている。
2622 = "陽光在不知不覺中變得很強烈。" 

# monologue
# JP: モデルとしての日々姫ならば無帽の方が好適だろうが、\n僕の趣味より優先すべきは、無論、日々姫の健康だ。
2551 = "若是要拍照，我當然希望日日姬不戴帽子，不過日日姬的健康肯定比我的興趣更重要。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　帽子……は――ああ、トランクの中か。\nならば――まぁ、無いよりいくらかマシだろう」
1710 = "「嗯？帽子……哎呀，是在行李箱裡啊。好吧，那就退而求其次吧」" 

# monologue
# JP: 日々姫の汗を拭いたばかりのタオルを広げ、\n僕の体もあわせて使って、日陰をつくる。
2340 = "我把剛給她擦過汗的毛巾展開，再配合自己的身體為日日姬創造出一片背陰處。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……」
1685 = "「嗯……」" 

# monologue
# JP: 眩しさにだろう、\n細まっていた日々姫の瞳がいくらか広がる。
2236 = "剛才因炫目陽光而眯起的日日姬的眼睛這會兒又睜大了些許。" 

# monologue
# JP: ならば効果があるのだろうと、\n安心できて嬉しくなる。
2611 = "那就是有效果了。我鬆了一口氣，心中沾沾自喜。" 

# monologue
# JP: （ささっ――さささっ――）
2687 = "（沙沙……沙沙沙……）" 

# monologue
# JP: 日々姫が走らせる鉛筆も、\nこころなし、軽快さを取り戻したように思える。
2199 = "不知道是不是我的錯覺，日日姬手中的鉛筆似乎也找回了之前輕快的節奏。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[せんけい,1]扇形機関庫、か――」
1832 = "「扇形機車庫啊」" 

# monologue
# JP: 実物ではなく、スケッチブックの中を見る。\n日々姫の瞳と、僕の瞳を重ねられるような気がして。
2301 = "將視線從實物上移開，單隻盯著日日姬的素描簿，讓我產生了一種彼此的眼睛重合在一起的錯覺。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凄いものだな。こんなものがまだ現役だとは」
1739 = "「好厲害啊。這樣的東西居然還在服役」" 

# 【日々姫】
# display as 日日姬
# JP: 「[くるだい,1]来大鉄道の廃線で壊されそうになったの――\n地元の人が……一生懸命、守ったって……ん――」
1940 = "「聽說久大鐵路廢線差點讓它遭到破壞，是當地人……拚命保護下來的……嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが日の目を見たのだな。大廃線の更に前から、\n今に至るまでの長きをずっと、生きながらえて」
1860 = "「早在大廢線之前就存在的它，挨過漫長歲月的洗禮之後，如今終於重見天日，再度為世人所知了啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「車両も……その頃からのこが……ん……多い、とか」
1941 = "「聽說車輛也一樣……很多都是……嗯……從那時留到現在的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「キハ07の[ヨンニイ,1]42に[ヨンサン,1]43か――\nれいなの妹にあたる車両たちだな」
1215 = "「\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;的[四二,1]４２和[四三,1]４３啊，這兩輛算是玲奈的妹妹吧」" 

# monologue
# JP: れいなの\x%lキハ07s;#00ffc040;キハ07s%l;#;は、\x%l硬上鉱山鉄道;#00ffc040;硬上鉱山鉄道%l;#;専用に作られた、\n帝鉄キハ07の同形機と聞く。
2544 = "聽說玲奈的\\x%lキハ07s;#00ffc040;Ｋｉｈａ０７Ｓ%l;#;是專為\\x%l硬上鉱山鉄道;#00ffc040;片上礦山鐵路%l;#;生產的與帝國鐵路\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;是同型車。" 

# monologue
# JP: 正確なところを言えば、従姉妹機ということになろうか？\nレイルロオドの方の従姉妹……の姿は残念ながら見えない。
2498 = "準確來說，應該是表姐妹車吧？不過很遺憾……沒能一睹表姐妹們的鐵路人偶的芳容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あとは……[たんすいしゃ,2]炭水車だけが置き去りか。\n機関車の方は、\x%l入換;#00ffc040;入換%l;#;にでも使われているのか？」
1607 = "「另外……怎麼有輛落單的\\x%l炭水車;#00ffc040;煤水車%l;#;。機車開出去\\x%l入換;#00ffc040;調車%l;#;了嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「に――しては……線路」
1519 = "「不過……鐵軌」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ」
1705 = "「嗯？哦」" 

# monologue
# JP: さすがは日々姫の――絵描きの目だ。
2196 = "不愧是日日姬的——畫手的眼睛。" 

# monologue
# JP: 炭水車こそはピカピカに磨き上げられているが、\nそこへとつながる線路は残念、錆びている。
2627 = "雖然煤水車擦得閃閃發光，但從它輪下延伸出來的鐵軌卻是鏽跡斑斑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「生きている……というわけではなさそうだな。\n撮っておいて、あとでハチロクにでも尋ねてみるか」
1923 = "「看起來……不像還在服役的樣子呢。拍下來回去問問八六吧」" 

# monologue
# JP: とはいえ今は、日々姫を陽射しから守らねばならん。\nカメラを構えることも出来ない。
2209 = "不過我現在必須保護日日姬免受烈日的侵害，沒辦法騰出手來拍照。" 

# monologue
# JP: せいぜいが精一杯に目をこらし、\n特徴を見つけ出そうとするくらいだが……
2345 = "我最多只能瞪大眼睛，儘量找出一些車上的特徵……" 

# monologue
# JP: （僕の目では、特徴らしい特徴も見つけられんな。\nということは――8620形か9600形の炭水車なのか？）
2657 = "（以我的眼力根本辨識不出什麼像樣的特徵。也就是說——這是８６２０型或者９６００型的煤水車嗎？）" 

# monologue
# JP: そうと思えばそうとも見える。\nキュウロクはかつて、文庫森にいたとも聞いている。
2601 = "這樣說的話也挑不出什麼毛病。我也聽說九六以前在豐後森待過。" 

# 【双鉄】
# display as 雙鐵
# JP: 「文庫森のキュウロクのことなのだが――」
2049 = "「關於豐後森的九六……」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――ちょっと待って――もうすぐ仕上がるけん」
1679 = "「啊，等一下——馬上要收尾了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお、すまん」
1660 = "「哦，抱歉」" 

# monologue
# JP: （しゃっ――しゃっ――カリカリ、カリカリっ）
2686 = "（沙……沙……喀喀，喀喀喀）" 

# monologue
# JP: 鉛筆を立て、細かな部分を描き込んでいく。\n黒が一か所際立つ度に、絵の中の空気が粒立っていく。
2292 = "她豎起鉛筆，描繪著畫面的細節。隨著對“黑”的深入刻畫，整張畫漸漸鮮活了起來。" 

# monologue
# JP: （凄いな……"仕上げる”とはこのことか）\n2678 = "（好厲害……這就是所謂的“收尾”啊）" \n\n# monologue\n# JP: 要点、要所。\nそんな言葉が頭をよぎる。\n2618 = "關鍵之處，畫龍點睛。我腦中閃過這樣的詞彙。" \n\n# monologue\n# JP: 最も黒く沈む部分を、正しく最も黒くする。\nそうするだけで、他の全てが浮き立っていく――\n2360 = "把最黑的部分塗得最黑。只要準確地做到這一點，畫面的其他部分就會變得栩栩如生。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ん！　こんなもんかなっ」\n1694 = "「嗯！差不多就這樣吧」" \n\n# monologue\n# JP: よほど満足いったのだろう。\n2508 = "看來她相當滿意。" \n\n# monologue\n# JP: スケッチの端に日々姫は小さくサインを書き入れ、\n満面の笑顔で僕を見上げ――？？？\n2431 = "日日姬在畫面的角落簽了個小小的名字，然後笑著抬頭看向我……嗯？？？" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「え？　――え……えっ！？」\n1640 = "「哎？……哎……哎？！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「どうした！？　日々姫っ」\n1592 = "「出什麼事了？！日日姬」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃに、いつからそんな――っ！！\nごめんっ！　ごめんなさいっ！！？」\n2051 = "「阿哥是什麼時候站在那裡的……啊！！對不起！真的很對不起！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なにをそんなに――ああ」\n1764 = "「幹嘛慌成這樣……噢」" \n\n# monologue\n# JP: 汗を拭かれて、\n自分の方もいつの間に汗にまみれていたのだと知る。\n2258 = "在她為我擦了汗之後，我才發現自己在不知不覺中也已經滿頭大汗了。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「日陰……にぃにに作らせちゃって。っていうか私、\n夢中になって、にぃにぃのことほったらかしで」\n1875 = "「是阿哥……幫我擋住了陽光。我怎麼畫得這麼入神，居然把阿哥丟在一邊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ほったらかしになぞ、されていなかったぞ？」\n1561 = "「你沒有把我丟在一邊哦」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「え？」\n1641 = "「哎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「半ば無意識になのだろうな。\n僕の言葉に、日々姫は受け答えしてくれていた」\n1558 = "「你剛才有回我的話，雖然可能是在半無意識的狀態下」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ……」\n1665 = "「啊……」" \n\n# monologue\n# JP: 戸惑ったような、安堵したような。\n2288 = "她的表情像是有些困惑，又像是鬆了一口氣。" \n\n# monologue\n# JP: なんども微妙な表情から、\n日々姫はゆるゆる言葉を紡ぐ。\n2193 = "一陣表情的拉鋸之後，日日姬才慢悠悠地開了口。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん、そうかも。にぃにぃの声聞こえて――\nだからわたし、安心して集中できてたんだと思う」\n1698 = "「嗯，也對。應該是因為聽到了阿哥的聲音……我就放下心來投入到畫畫中去了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「聞くだけでなく、答えてもくれていた。\n夢中になってる日々姫は、いつもより素直だったぞ？」\n1552 = "「你不光聽到了，而且還回答了我。你集中精神的時候比平時要坦誠呢」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「やっ――ええっ！？　な、何ば聞いたと！？」\n1967 = "「討厭……哎？！你、你都問了些什麼啊？！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「大したことは聞いてない。\n主に、『写真を撮っても大丈夫か？』とかその程度だ」\n1807 = "「我沒問什麼啦。基本上就是“可以拍你嗎？”之類的問題」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ、撮っとってくれてたのも、なんとなくわかっとった」\n1678 = "「啊，我也隱隱約約有感覺到你在拍我」" \n\n# monologue\n# JP: あどけないほどに嬉しげな顔。\n2293 = "她開心的表情可以說是天真無邪。" \n\n# monologue\n# JP: 胸がドキンと跳ね上がり、\nだからこそ不安を覚えてしまう。\n2338 = "我感到一陣怦然心動，然而不安也隨之而來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なんとなく、か――\nそれは、いささか危険かもしれんな」\n2055 = "「隱隱約約啊……這樣可能有點危險」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「え？」\n# 1641 = "「哎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「集中しすぎて、周りが見えていないというのは、\nどう考えても、不用心なことだろう」\n1723 = "「因為太專注而忽略周圍的事物，這樣不管怎麼說都太不小心了」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ、それは平気！\n安心して、にぃに？」\n1683 = "「啊，這倒沒事！你放心吧，阿哥」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「！」\n2067 = "「！」" \n\n# monologue\n# JP: 日々姫が僕に身を寄せる。\nナイショ話をしたいのだろうと頭を下げる。\n2441 = "日日姬把身子靠了過來。她低下頭，大概是想跟我說悄悄話。" \n\n# monologue\n# JP: 汗の匂いが鼻をくすぐる。\n日々姫の汗と、僕の汗との混じる匂いが。\n2189 = "一股汗味鑽入鼻腔。那是日日姬的汗和我的汗混合在一起的味道。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃにぃと一緒におらんかったら、\n最初から、こぎゃんと集中できんもん」\n1958 = "「要不是跟阿哥在一起的話，根本就沒辦法兒這麼專注」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ――」\n# 1690 = "「嗯」" \n\n# monologue\n# JP: なるほど、たしかにそうかもしれん。\n家の中、一人で日々姫が描いているとき――\n2519 = "確實，這話倒也沒說錯。日日姬獨自在家裡畫畫的時候……" \n\n# monologue\n# JP: 邪魔しないよう静かに静かに行動しても、\n必ず気づかれビクリとされて、『誰と？』と聞かれる。\n2503 = "無論你再怎麼輕手輕腳，她都一定會被驚擾到並且問“是誰？”。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃにが守ってくれるってわかっとるけん。\nやけん、わたし、こぎゃんと深く――って、あああ」\n1725 = "「因為我知道阿哥在這裡守著我。不然哪能這麼投入……哎呀，哇哇哇」" \n\n# monologue\n# JP: 嬉しげに、恥ずかしげに。\nとろけるようにやわらいでいた顔が再び硬くなる。\n2277 = "她前一刻還又羞又喜的軟糯表情再度嚴肅了起來。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「受け答えばしとったって、それでも――\nせっかくのデートなのに、私、にぃにをほっといて」\n1521 = "「不過就算我有回話……難得的一趟約會，我竟然把阿哥扔在一邊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「違うぞ？　日々姫」\n1571 = "「你說錯了，日日姬」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「違うって、何が？」\n2045 = "「錯？哪裡錯了？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕は日々姫が夢中になってくれることが嬉しいのだ。\n僕をかまうため、日々姫が見るべきを見損ねれば悲しい」\n1804 = "「我很高興看到你能夠這麼專注。要是你為了照顧我而忽略了自己本該注視的景色，我會傷心的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ――」\n# 1665 = "「啊……」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「夜の部屋。ふたりきりのとき。他に見るべきが無い\nときならば、もちろん、最大限にかまってもらいたい」\n1741 = "「如果是晚上在房間裡二人獨處，沒有其他東西可看的話，那我當然希望你能儘量關照我啦」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん」\n# 1690 = "「嗯」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「けれど、これほどに素晴らしい光景を、\n日々姫の瞳が映しているとき――っ！」\n1522 = "「不過當如此美妙的景象映入你的瞳孔中之時……啊！」" \n\n# monologue\n# JP: あたりを見回し、少し驚く。\n2352 = "我環顧四周，有點被驚艷到了。" \n\n# monologue\n# JP: ……夢中になって、周りが全く見えてなかったのは、\n僕も日々姫と、まったく同じであったらしい。\n1196 = "……看來我和日日姬一樣，都因為太過專注而完全忽略了周遭的景色。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「え？　わ――わあっ！！？」\n1644 = "「哎？哇……哇啊？！」" \n\n# monologue\n# JP: ちらほらと、地元の方らしい人たちが、\n僕らのまわりを遠巻きにして、様子を見ている。\n2512 = "看起來像當地人的零星路人們都躲得遠遠的，圍觀著我們。" \n\n# monologue\n# JP: 向こうも、僕らも、戸惑っている。\nならば騒がせた僕らから、まず挨拶をするべきだろう。\n2303 = "對方和我們都呆了。那麼惹出這麼大動靜的我們理當先致歉才對。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「お騒がせ――ではないですね。いや……ああ。\nその、ご不安を与えてしまったならすみません」\n1838 = "「打擾到各位……應該不能這麼說。我想想……嗯，那個，非常抱歉驚嚇到各位了」" \n\n# 【木本】\n# display as 老人\n# JP: 「ああ――いや――なんですかいな、ゆーたら」\n1638 = "「哎呀，那什麼……這怎麼回事啊，說來俺聽聽」" \n\n# monologue\n# JP: 僕を、日々姫を、まわりに集まった人たちを。\n2538 = "老人家皺著眉頭，把我，日日姬，還有聚在周圍的人們打量了一圈。" \n\n# monologue\n# JP: ご老人は困ったように眺めまわして\n――やがて、おずおずと問いかけてくる。\n2470 = "最後才怯生生地發問。" \n\n# 【木本】\n# display as 老人\n# JP: 「……あんたがたぁ。\nいったい、なにしてらっしゃいますかね？」\n1244 = "「……請問，幾位究竟有何貴幹啊？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「……あー、日陰すずしい」\n1230 = "「……啊……背陰的地方好涼快」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ありがとうございます。突然のことですのに、\nまさか、機関庫内にいれていただけるとは」\n2059 = "「非常感謝您。沒想到我們貿然造訪，還能被允許進入機車庫」" \n\n# monologue\n# JP: 頭を下げればご老人――\n木本老技師は、いやいやと軽く笑ってくれる。\n2332 = "我低頭致謝，而老人家——木本老技工則是輕笑著讓我免禮。" \n\n# 【木本】\n# display as 木本\n# JP: 「ヘルメットだけは外さんようにお願いします。\nこん機関庫ば、現役ですけん」\n1744 = "「安全帽可千萬別脫了。畢竟這個機車庫還在正常運作」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それはもちろん」\n2031 = "「那是當然」" \n\n# 【木本】\n# display as 木本\n# JP: 「ゆーても、ま。次ん汽車が戻ってくるんは、\n二時間以上先のことになりますけどの」\n1520 = "「不過嘛，下趟列車至少也要倆小時以後才會回來」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ、キュウロクですか？」\n1662 = "「哦，是九六嗎？」" \n\n# 【木本】\n# display as 木本\n# JP: 「いやいや、今時ん汽車は、気動車いうて――\n蒸気機関車のこととは違うとですよ」\n1508 = "「不不，現在的列車是動車來著——跟蒸汽機車不是一回事」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おっと、そうでしたね」\n1636 = "「哎呀，我給忘了」" \n\n# monologue\n# JP: 失念していた。復線したとはいえ、来大鉄道の路線は、\n大廃線以前からのものを補修し、何とか使っている程度。\n2464 = "是我疏忽了。雖說廢線已經恢復，但久大鐵路的線路是用大廢線之前的線路修補而來，僅僅達到可用標準。" \n\n# monologue\n# JP: 気動車と比べて段違いに線路への負荷が大きい機関車は、\nそもそも、乗り入れ自体が厳しいと教えられていたのに。\n2304 = "對線路的負荷比動車大得多的機車連駛入都很難，這事我明明早已有所耳聞。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「では、あの炭水車は――」\n1824 = "「所以那節煤水車是……」" \n\n# 【木本】\n# display as 木本\n# JP: 「名残？　はぁ……未練の塊ですのぉ。\nあげなもんだけ残しても、何にもならんのですが」\n1773 = "「念想？唉……還不就是那點情結唄。你說光剩它自己個兒，又能怎麼樣呢」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「では、機関車はもう？」\n2037 = "「那麼機車都……」" \n\n# 【木本】\n# display as 木本\n# JP: 「おらんとですねぇ。\x%l8620;#00ffc040;8620%l;#;も、\x%l9600;#00ffc040;9600%l;#;も、\n\x%lC11;#00ffc040;C11%l;#;も\x%lC12;#00ffc040;C12%l;#;も\x%lC58;#00ffc040;C58%l;#;も\x%lD60;#00ffc040;D60%l;#;も、もうだぁれもおらんとですよ」\n2042 = "「都不在了啊。無論是\\x%l8620;#00ffc040;[八六,3]８６２０%l;#;、\\x%l9600;#00ffc040;[九六,3]９６００%l;#;，還是\\x%lC11;#00ffc040;[Ｃ十一,2]Ｃ１１%l;#;、\\x%lC12;#00ffc040;[Ｃ十二,2]Ｃ１２%l;#;、\\x%lC58;#00ffc040;[Ｃ五八,2]Ｃ５８%l;#;、\\x%lD60;#00ffc040;[Ｄ六零,2]Ｄ６０%l;#;，都已經不在了」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「寂しい、すごく」\n1782 = "「感覺好寂寞」" \n\n# monologue\n# JP: ひとりごとのようにつぶやいて\n日々姫の目が、ゆっくり、ぐるりとあたりを見渡す。\n2428 = "日日姬喃喃自語道，同時緩緩地放眼環顧四周。" \n\n# monologue\n# JP: そうしてスケッチブックをひろげ――\n2369 = "接著她翻開素描簿……" \n\n# 【木本】\n# display as 木本\n# JP: 「ああ――」\n1656 = "「哦」" \n\n# monologue\n# JP: 先ほど描いた無数のスケッチの中の一枚に、\nあざやかに――8620の姿を描き加えていく。\n2279 = "她在剛才畫的無數張素描中選出一張，將８６２０的英姿活靈活現地畫入其中。" \n\n# 【木本】\n# display as 木本\n# JP: 「ああ、こん絵ば――まるで――昔のままの景色で」\n1670 = "「啊呀，這張畫……簡直跟過去的光景一模一樣」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「たとえ線路を走れなくても。\n蒸気機関車とこの機関庫は、すごく絵になると思うのに」\n1596 = "「即便無法在線路上奔馳，這座機車庫配上蒸汽機車明明也是美如畫的啊」" \n\n# 【木本】\n# display as 木本\n# JP: 「いや――さすがは絵描きさんですな」\n1634 = "「哎呀……不愧是畫家啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「え！？」\n1650 = "「哎？！」" \n\n# monologue\n# JP: その一言で、なにかのスイッチが切れたのだろう。\n日々姫は急に赤くなる。\n2597 = "這句話就像碰到了什麼開關一樣，日日姬突然變得滿臉通紅。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「いえ、あの、私、絵描きってわけじゃなくて」\n1528 = "「不，那個，我不是什麼畫家」" \n\n# 【木本】\n# display as 木本\n# JP: 「ああ、さっき聞きましたな。市長さんと秘書さんとは。\n美男美女ですけん、撮影かなんかかと思うてました」\n1701 = "「嗯，我剛才聽說了。沒想到是市長和秘書大駕光臨。光看到一對俊男美女，我還當是來拍戲的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「び、美男美女……って――///」\n1576 = "「俊、俊男美女……哎呀……（面紅耳赤）」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「こちらこそまさかでした。\n文庫森機関庫のＯＢの方にお声掛けいただけるとは」\n1794 = "「我們才是受寵若驚，沒想到能受到豐後森機車庫老前輩的邀請」" \n\n# monologue\n# JP: いえば木本老技師は目を細め、\n機関庫隣の大きな施設へ目を走らせる。\n2571 = "說著說著，木本老技工眯起眼睛，朝機車庫隔壁的大型設施望去。" \n\n# 【木本】\n# display as 木本\n# JP: 「車両工場の方ばフル稼働ですけんねぇ。\n人手が足りんで、機関庫の方ば、ボランティアで」\n1981 = "「車輛工廠那邊倒是在滿負荷運轉。由於人手不足，機車庫這邊就靠志願者撐著了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「どこも似たようなものですね」\n1894 = "「每個地方的情況都差不多呢」" \n\n# 【木本】\n# display as 木本\n# JP: 「[おひとよ,2]御一夜もですか」\n1770 = "「御一夜也一樣嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「はい。ある程度の復線がなったとはいえ、\nまだまだ、ボランティアの方々に頼りっぱなしです」\n1871 = "「是的。廢線確實是恢復了一些，不過基本上都還必須仰賴志願者們的幫助」" \n\n# 【木本】\n# display as 木本\n# JP: 「ワシなんぞは力に成れることが嬉しいですがの。\n[くるだい,1]来大鉄道の復活ば、夢ぇでしたけん」\n1796 = "「我倒是挺高興自己這身老骨頭還能派上點用場。復活久大鐵路可是我的夢想啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ」\n1668 = "「啊」" \n\n# monologue\n# JP: その一言を聞いた瞬間、\nゆるみ切ってた日々姫の頬が引き締まる。\n2188 = "一聽到這句話，日日姬原本放鬆的表情瞬間認真了起來。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「[くるだい,1]来大鉄道について――全盛期の来大鉄道についての\nお話、聞かせてもらえませんか？」\n1944 = "「能不能請您給我們講講久大鐵路——全盛期的久大鐵路的事情？」" \n\n# 【木本】\n# display as 木本\n# JP: 「全盛期……ゆーのは、昔の……\n[ていてつ,1]帝鉄以前の来大鉄道についてのことですかの」\n1570 = "「你說的……全盛期……是指帝國鐵路之前的久大鐵路嗎？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はい。それも含めて……もしお差し支えなければ、\n帝鉄時代の思い出とか、廃線後のこととかも」\n1869 = "「是的。也包括那個……如果您不介意的話，我也想聽聽有關帝國鐵路時代的回憶，以及廢線之後的事」" \n\n# 【木本】\n# display as 木本\n# JP: 「そらぁ構いませんが……\nなんでまた、そぎゃん昔話を」\n2002 = "「這倒是無所謂……不過你怎麼會對那種老黃曆感興趣？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ええと――」\n1996 = "「這……」" \n\n# monologue\n# JP: 一瞬キュッと、日々姫の唇が引き絞られる。\n2425 = "日日姬不著痕跡地抿了一下嘴唇。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「リゾート食堂列車の計画……ご存知ですか？」\n1779 = "「您聽過……觀光餐車的計劃嗎？」" \n\n# 【木本】\n# display as 木本\n# JP: 「そらぁ話題になっとりますけん。ある程度――\nおおまかなところは聞いとるふうに思いますがの」\n1997 = "「這事不是大家討論得很熱烈嘛，我自認為也算大致有點了解」" \n\n# monologue\n# JP: ……木本老人が聞かせてくれるのは、\n現在リリースされている情報そのまま、詳細なものだ。\n1194 = "……木本老人說得非常詳盡，跟目前公布的情報分毫不差。" \n\n# monologue\n# JP: ここまで細かく覚えて――つまりは期待してくれている。\nそう感じれば、僕の背筋さえ自然と伸びる。\n2570 = "記得這麼詳細，也就意味著他對此抱有期待。想到這裡，我不由自主地挺直了身板。" \n\n# 【木本】\n# display as 木本\n# JP: 「どこまで需要があるかは正直わからんばってん、\n象徴として、良か計画かと思います」\n2058 = "「雖然我不能確定這種需求到底會有多大，不過作為一種象徵的話，這不失為一個好計劃」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「象徴ですか？」\n1977 = "「象徵？」" \n\n# 【木本】\n# display as 木本\n# JP: 「レールば再び繋がり始めた――\nそいば示すには、長距離列車が一番ですけん」\n2046 = "「鐵軌又再度連接起來了——要體現這項主題的話，長距離列車是最好的選擇」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ですよね！　やっぱり！！」\n1752 = "「對吧！我就說嘛！！」" \n\n# monologue\n# JP: 勢い込んだ日々姫はしかし、\nすぐに姿勢をあらためなおす。\n2423 = "日日姬一時間激動異常，不過她很快就恢復了平靜。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「だから絶対に成功させたい。だけど今――\n私のせいで、計画が止まってしまってるんです」\n1820 = "「所以我非常想讓計劃成功。不過現在，計劃卻因為我的錯而停滯不前」" \n\n# 【木本】\n# display as 木本\n# JP: 「市長さんのせいで？」\n1724 = "「因為市長的錯？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「いいえ、市長としてではなく、デザイナーとしての\n私、右田日々姫のせいです」\n1529 = "「不，錯的不是身為市長的我，而是身為設計者的右田日日姬」" \n\n# monologue\n# JP: 瞬間、老人が動きを止める。\n目を見開いたその頬が、みるみるうちに紅潮していく。\n2536 = "老人一下子愣住了。他瞪大了眼睛，臉頰上也逐漸泛起了紅暈。" \n\n# 【木本】\n# display as 木本\n# JP: 「[みぎたひびき,4]右田日々姫――いうたら、あの！　\nあ、あの、見事な客車デザインばされる右田先生ですか！」\n1614 = "「右田日日姬是指那個！設計出那輛優秀客運車廂的右田老師嗎！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひえ！？　あ――えと、見事かどうかはともかく、\n客車デザインとかしてる、右田日々姫は私、です」\n1629 = "「咦？！那個，優不優秀暫且不論，那位從事客運車廂設計的右田日日姬確實是我」" \n\n# 【木本】\n# display as 木本\n# JP: 「あの右田先生が、市長さんもやっとられますか！\n何とお若い！　天は二物も三物も与えられましたなぁ」\n2024 = "「那位右田老師還兼任了市長嗎！而且還如此年輕！真的是備受上天眷顧的奇才啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「いえ、その……」\n1527 = "「不，那個……」" \n\n# monologue\n# JP: 思わぬところ、完全に予想外のタイミングでの高評価。\n自分の仕事を認められる、それほど嬉しいことは無い。\n2593 = "這一通突如其來的高評價實在令人始料未及。自己的工作得到認同確實令人無比喜悅。" \n\n# monologue\n# JP: が、素直にそれを受け止められるだけの余裕が、\n今の日々姫の内側には、まだまだ育って無いようだ。\n2210 = "不過看來現在的日日姬還缺乏足夠的心理歷練，無法心平氣和地接受這種褒獎。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「[てんよ,1]天与の才なら、[こかつ,1]枯渇もし[がた]難いものでしょう。\nけれども今、そのデザインで苦しんでおりますので」\n1736 = "「天賦之才應該不會枯竭才對。不過她現在卻正為設計而苦惱」" \n\n# 【木本】\n# display as 木本\n# JP: 「ああ……ああはい。\n確かにそぎゃん話でしたの」\n1687 = "「嗯……是啊。現在就是在談這個問題」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そうなんです。正直、デザインが難航していて、\nだから、お話を聞かせて欲しいんです」\n1890 = "「正是如此。其實我在設計上遇到了瓶頸，所以想要聽一聽那些往事」" \n\n# 【木本】\n# display as 木本\n# JP: 「デザインに……ワシんようなものの昔話ば、\nなんぼかでも、役にたちよるもんですかのう？」\n1968 = "「設計的瓶頸……我這老頭子的往事真的能派上用場嗎？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はい。\n私の場合は、想いを、デザインしたいですから」\n1611 = "「可以的，因為我想讓我的設計飽含人們的情感」" \n\n# monologue\n# JP: みんなで作ったレイアウト――\nその経験は、大きく日々姫を成長させた。\n2269 = "大家一起製作設計圖——這樣的經歷讓日日姬得到了很大的成長。" \n\n# monologue\n# JP: 自らが“描く”その源を、\n日々姫は確かに、知ったのだ。\n2437 = "日日姬很清楚自己“下筆”的源泉是什麼。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「だから、聞かせていただきたいんです。\n来大鉄道が、どれほど愛されていた鉄道なのかを」\n1822 = "「所以請講給我聽聽吧。講講人們對久大鐵路有多深厚的感情」" \n\n# monologue\n# JP: 日々姫の瞳が、もう一度、機関庫を中から眺め渡す。\n2427 = "日日姬再次打量起了機車庫的內部。" \n\n# monologue\n# JP: これほどの設備を解体危機から救い続けた――\n無数の想いの痕跡を、探し出そうとするかのように。\n2275 = "她似乎想從中找出，堅持不懈地把這麼多設備從拆解危機中拯救出來的無數感情的痕跡。" \n\n# 【木本】\n# display as 木本\n# JP: 「そぎゃんこつでしたら。\nしかし……どこから話しましょうかのう」\n1841 = "「既然你都這麼說了……不過，該從哪說起呢」" \n\n# monologue\n# JP: 日々姫の想いが、きっと伝わったのだろう。\n木本老人の声が、ぐっと落ち着いたものになる。\n2479 = "木本老人想必是感受到了日日姬的心意。他的聲音一下子平靜了許多。" \n\n# 【木本】\n# display as 木本\n# JP: 「……帝鉄の始まりは、私設鉄道の買収からだった。\nゆー話は、ご存知ですかの」\n1242 = "「……要說帝國鐵路當初，其實是從收購私營鐵路起家的。這事你們都知道吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「その話はざらっと程度に勉強しました。\nだけど、詳しいこととかは全然」\n1813 = "「我粗略地學習過那段歷史，不過對詳細的情況完全是一頭霧水」" \n\n# 【木本】\n# display as 木本\n# JP: 「ほんなら、こん[くるだい,1]来大鉄道を例にあげましょう。\n来大鉄道の始まりは、ふたつの私設鉄道でした」\n2027 = "「那就把這條久大鐵路拿來當例子吧。久大鐵路最開始是兩條私營鐵路」" \n\n# monologue\n# JP: [くるめ,1]来目と[ひた,1]肥田とを結ぶ、[きゅうひ,1]来肥鉄道。\n湯富院-大板を結ぶ、[とうだい,1]湯大鉄道。\n2607 = "連接久留米和日田的久日鐵路，以及連接湯布院和大分的湯大鐵路。" \n\n# monologue\n# JP: ふたつの私設鉄道は、やがてともに文庫森まで延伸。\nのちに合併、ひとつの来大鉄道となる。\n2596 = "這兩條私營鐵路後來都延伸到了豐後森。最後又合併成了久大鐵路。" \n\n# 【木本】\n# display as 木本\n# JP: 「合併した後は、そらあ栄えたもんでした。\n\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;ば、そん頃に作られた代物ですな」\n1617 = "「合併之後的鐵路別提有多繁榮了。\\x%l扇形機関庫;#00ffc040;扇形機車庫%l;#;就是那時建造出來的偉大建築」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ほう。帝鉄発足前――\n私設鉄道の時代からのものだったのですか」\n1655 = "「哦。帝國鐵路成立之前，原來是從私營鐵路的時代一路走來的嗎」" \n\n# 【木本】\n# display as 木本\n# JP: 「ですのう。やけん、[ぶんごもり,2]文庫森の誇りであり、\n何に代えても守るべきものになりよったとですわ」\n1902 = "「沒錯。所以它是豐後森的驕傲，也是我們無論如何都必須保護的寶物」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「栄えて、愛されて……それなのに、どうして」\n1864 = "「明明那麼繁榮，那麼備受喜愛……可為什麼」" \n\n# monologue\n# JP: 夢中になっているからだろう。\n日々姫の質問は率直すぎる。\n2421 = "日日姬一定聽得很入神，她的質問非常直接。" \n\n# monologue\n# JP: が、老人の答えはあくまで――静かなものだ。\n2211 = "不過老人回答的語調依然波瀾不驚。" \n\n# 【木本】\n# display as 木本\n# JP: 「帝鉄に強制買収されて、法に縛られるようになりました。\n経営の[なん]何もかんも自由にできんようなったとですよ」\n1954 = "「被帝國鐵路強制收購後，這裡開始受到法律的束縛。經營在各方各面都遭受了限制」" \n\n# monologue\n# JP: \x%l明智;#00ffc040;明智%l;#;三十九年。鉄道帝有法制定。布告。\n日ノ本帝有鉄道発足。\n60 = "\\x%l明智;#00ffc040;明治%l;#;三十九年。鐵路國有法制定，頒布。帝家日本國鐵路成立。" \n\n# monologue\n# JP: さすがにここは、僕らでも把握している歴史だ。\n2595 = "這個部分就是連我們都知道的歷史了。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「帝有化で……経営の自由度がなくなった、でしたか？」\n1727 = "「國有化……剝奪了經營的自由嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「その辺も、うっすらとですが聞いたことがあります。\n運賃ひとつも、法改正なしには変えられなかったと」\n2001 = "「這個部分我也略有耳聞。聽說改票價都必須先修正法律才行」" \n\n# 【木本】\n# display as 木本\n# JP: 「ですの。そん法改正も帝都の都合だけで行われる。\nやけん、地方は皺寄せで、不合理の塊にされたとです」\n1867 = "「是啊。而那些法律也只會按照帝都的意思來修正。所以受到波及的外地成為了充斥著不合理的泥潭」" \n\n# monologue\n# JP: 幹線でも地方路線でも同じでなければならない料金形態は\n採算路線と不採算路線との極端な二分化を発生させた。\n2504 = "無論幹線還是地方線路都是統一票價，如此形式引發了盈利線路和虧損線路的極端分化。" \n\n# monologue\n# JP: 不採算路線の予算切り詰めはサービスの低下を招き、\n発生した悪循環は、さらに赤字幅を拡大させた――\n2553 = "虧損線路的預算吃緊導致服務質量下降，因此產生的惡性循環又導致了赤字的擴大……" \n\n# 【木本】\n# display as 木本\n# JP: 「特に旧[とうだい,1]湯大鉄道――湯大線は二時間に一本も\n列車の走らんごたるなり、誰も乗らんようなりました」\n1877 = "「最慘的舊湯大鐵路——湯大線淪落到了沒人願意坐，兩個小時都不一定有一班列車的境地」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「それじゃ、みなさんの交通はどうなったんですか？」\n2033 = "「那樣的話大家是怎麼解決交通問題的呢？」" \n\n# 【木本】\n# display as 木本\n# JP: 「モータリゼーション。ガソリン自動車の普及ば\n急速に進みましたの。で、鉄道はますます廃れる」\n2062 = "「靠機動化解決。當時汽車得到了快速的普及。於是鐵路越來越荒廢了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「その結果……\n大廃線のその前に、廃線となったわけですか」\n1878 = "「最終的結果就是……在大廢線之前就已經成為了廢線嗎」" \n\n# 【木本】\n# display as 木本\n# JP: 「[おおいた,1]大板-博太ば、もう[ぶんが,1]豊向本線で結ばれとりましたけん。\nすっぱり、綺麗に切り捨てられましたの」\n1856 = "「日豐本線已經接通了大分到博多的路線。所以說久大鐵路被徹底地捨棄掉了」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そうなってしまったのに――」\n1862 = "「明明情況已經這麼不樂觀……」" \n\n# monologue\n# JP: 日々姫は一瞬、言葉を飲み込む。\n2450 = "日日姬說到這裡停頓了一下。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「それでも、文庫森機関庫を守って――\n大事にし続けたのは、どうしてですか？」\n1909 = "「為什麼你們依然守護著——愛護著豐後森機車庫呢？」" \n\n# monologue\n# JP: 日々姫の疑問に、僕も頷く。\nモータリゼーションに続く、エアクラの台頭。\n2329 = "我也同意日日姬的疑問。機動化不斷進展，空凝機技術嶄露頭角。" \n\n# monologue\n# JP: 鉄道復活を期待できる余地など恐らく、\nどこにもなかったと思われるのに――\n2458 = "明明鐵路復活的夢想，在當時只是痴人說夢……" \n\n# 【木本】\n# display as 木本\n# JP: 「期待はずれな答えかもしれませんがの――\n正直いうたら、“他になーんもなかったけん”ですの」\n1810 = "「我的回答可能會讓你們大失所望吧。老實說，是因為“別的什麼都沒有啊”」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「他になにも」\n1722 = "「因為別的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「無かったから」\n1534 = "「什麼都沒有」" \n\n# 【木本】\n# display as 木本\n# JP: 「[ゆふいん,2]湯富院のごたる温泉があるわけでもなし、\n大板や[ひた,1]肥田のごたる大都市でなし」\n2007 = "「這裡既不像湯布院那樣有溫泉，又不是大分和日田那種大都市」" \n\n# monologue\n# JP: そういう老人の口調から、けれども強い誇りを感じる。\n2248 = "可老人的語氣中卻充滿了強烈的自豪感。" \n\n# 【木本】\n# display as 木本\n# JP: 「[せんけい,1]扇形機関庫ば、文庫森に初めてできた、\n大きな大きなシンボルでしたけん――失くせんですわ」\n1833 = "「扇形機車庫是在豐後森出現的第一個極其重要的標誌——絕不能讓它消失」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「シンボル――\nみなさんのこころを、きっとひとつに重ねた」\n1999 = "「這個標誌，一定凝聚起了人心」" \n\n# 【木本】\n# display as 木本\n# JP: 「かもしれんですの」\n1969 = "「說不定吧」" \n\n# monologue\n# JP: 穏やかに、木本老人は微笑んで、\n励ますように――日々姫を、僕をじゅんじゅんに見る。\n2481 = "木本老人露出了平靜的微笑，用鼓勵的眼神看著日日姬和我。" \n\n# 【木本】\n# display as 木本\n# JP: 「誰かにそぎゃん思われるような列車になれば――\nリゾート食堂列車ば、きっとうまいこと走りますけん」\n1961 = "「要是觀光餐車也能成為這樣的標誌——那它一定會大獲成功的」" \n\n# monologue\n# JP: 大きく、強く、日々姫が頷く。\n2455 = "日日姬重重地點了點頭。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はい――貴重なお話、\n聞かせてもらえて嬉しかったです」\n1873 = "「是的。能聽到這麼寶貴的故事，我實在太高興了」" \n\n# 【木本】\n# display as 木本\n# JP: 「なーんもですわ。こぎゃん話でよければいつでも\n――ああ、そう。貴重な話いうたら」\n1898 = "「沒什麼沒什麼。你要是愛聽這種故事，我隨時都可以講給你聽。啊，對了，要說寶貴的故事啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はい？」\n1775 = "「怎麼了？」" \n\n# 【木本】\n# display as 木本\n# JP: 「『[うんぜん,1]雲仙』いうレストランのシェフが、\nちくと食堂車に詳しい男ですけん。紹介しましょう」\n1881 = "「有家名叫“雲仙”的飯店，那裡的主廚對餐車的事頗為了解。我幫你們介紹一下吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「食堂車――\n食堂車っ！　ハードル高すぎ～～っ！！」\n2065 = "「餐車……餐車！難度太高了～～！！」" \n\n# monologue\n# JP: （ばちゃばちゃっ！）\n2675 = "（嘩啦嘩啦！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おっと」\n1635 = "「哎呀」" \n\n# monologue\n# JP: いくら貸し切り露天とはいえ、\n今のはいささかはしゃぎすぎだ。\n2628 = "雖說是包場的露天溫泉，但剛才的舉動也有點胡鬧過頭了。" \n\n# monologue\n# JP: 恋人としてでも秘書としてでも無く、\n兄として――、一言注意をせねばなるまい。\n2344 = "我是她的戀人和秘書，更是她的哥哥，我有責任提醒她一句。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫、お風呂マナーというものがあるだろう」\n1855 = "「日日姬，澡堂禮儀還是要遵守的吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ、そいば大丈夫。\nちゃんと宿の人に確認したけん」\n1684 = "「啊，這沒事。我都跟旅館的人確認過了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「確認！？」\n1931 = "「確認？！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そうでなきゃ水着で温泉なんて入れんよー。\n私だって、日ノ本人やし」\n1509 = "「不然的話我才不會穿泳衣泡溫泉。我也是個日本人啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ……うむ」\n1653 = "「哦……嗯」" \n\n# monologue\n# JP: 言われてみれば、日々姫は水着だ。\n自分が裸でいることが、急に心細くなってくる。\n2604 = "這麼一說我才發現日日姬穿了泳衣。看著光溜溜的自己，我忽然覺得有點慌。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「何故……\nその、水着なのだ？」\n2019 = "「那……為什麼要穿泳衣呢？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「やっぱり他に使う機会なさそうやけん。\nそれに、このお宿、連泊でしょお？」\n2017 = "「還不是因為沒有其他機會可以穿。而且我們要在這個旅館連續住好幾天吧？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n# 1690 = "「嗯」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「連泊やったら、ちょっとでも変化つけないと。\nわたしだって、にぃにぃに楽しんで欲しかけん」\n1960 = "「要住上好幾天的話，那就得變點花樣才行。我也想讓阿哥開心啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なるほど」\n1597 = "「原來如此」" \n\n# monologue\n# JP: 日々姫の気持ちは素直に嬉しい。\nふつふつと湧いた喜びが――いや、ではなくて。\n2448 = "日日姬的心意真的讓我很高興。喜悅之情不斷湧上心頭……不不，搞錯了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「マナーは水着の件ではない。\n足でバシャバシャ、湯を跳ね上げたことの方だ」\n1816 = "「我說的禮儀不是指泳衣。你不該用腳把溫泉水搗得到處亂濺」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「え！？　あ――ごめんなさい。\nあの、焦っちゃってもやもやして、ついって感じで」\n1652 = "「哎？！啊，對不起。我剛才有點心煩意亂的，一不小心就把勁使大了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「まぁ、気持ちはわかるがな」\n1565 = "「你的心情我也不是不能理解啦」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わかるでしょ？　にぃにも。\n食堂車の話……衝撃的やったもん」\n1753 = "「對吧？阿哥也能理解吧？畢竟餐車的事……聽起來太勁爆了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ」\n# 1690 = "「嗯」" \n\n# monologue\n# JP: 紹介されて話を聞いた『雲仙』のご主人・[とちのき,1]栃木さんは、\n筋金入りの、元食堂車シェフだった。\n2539 = "老技工介紹給我們的“雲仙”餐廳的老闆栃木先生，是位資深的前餐車主廚。" \n\n# monologue\n# JP: 食堂車誕生、ごく初期からの話は全て面白く――\nそれゆえ、あまりに強烈すぎた。\n2222 = "他講的那些最早期的有關餐車誕生的事全都非常有趣，因此給我們帶來了莫大的衝擊。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「まさかレンジに石炭を使っていたとはなぁ。\n料理を仕込む前、朝の三時に、まず火起こしからとは」\n1899 = "「沒想到那時的爐灶用的是煤炭。在開始做菜之前，必須先在早上三點開始生火」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「急停車のたび、油の煮えた鍋を床に置いたとか！\n包丁も全部床におろして、冷蔵庫のドア押さえるとか！」\n1896 = "「每次急剎車都要把燒著滾油的鍋子放到地上！而且菜刀也要全部放到地上，冰箱的門也得按住！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「言われてみれば当然のことではあるし――\n今でも確かに、そうした対策は必要だろうな」\n1540 = "「仔細想想這些做法也是挺正常的。就算到了現在，類似的應對措施也必不可少」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「厨房内の事故防止とかそこまで頭まわってなくて！\n広さ、もっと余裕持たせないと絶対危ない」\n1805 = "「我根本沒想到防止廚房事故還有那麼多細節！沒有足夠大的空間的話絕對會很危險的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……実際、かなり厳しいことも言われてしまったな」\n1236 = "「……對方確實也說了些很不客氣的話啊」" \n\n# monologue\n# JP: 栃木さんはおしゃべりで親切だったが――\nいかにも九洲の男らしく、言葉を飾りはしなかった。\n2486 = "栃木先生雖然很熱心，不過這位純正的九州男兒說起話來真的是直來直去不加掩飾。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「『そぎゃんこつも知らんと、こん大廃線の時代に、\n食堂車を復活させる、いいよるか！』」\n1217 = "「“連這種竅門都不知道，居然還想在這個大廢線時代讓餐車復活嗎！”」" \n\n# monologue\n# JP: 驚きと、呆れと、笑いと、応援とが混じったような口調を、\n日々姫は、かなり正確に真似て見せる。\n2443 = "日日姬把那種混雜著驚訝、無奈、嘲笑、鼓勵的口氣模仿得相當到位。" \n\n# monologue\n# JP: ……それだけ、印象に強く残ったということだろう。\n確かに、あれは強烈だった。\n1203 = "……這也說明那句話給她留下了多深刻的印象。說實話，對方確實用了很重的口氣。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あげにいわれても、仕方なかとよ。\n私達、ぜーんぜん調べが足りとらんかったけん」\n1956 = "「被那樣說也沒辦法啊。誰讓我們自己調查得一點都不充分」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「仕方なかろう。食堂車関連の文献は乏しかったし……\n頼みの永山夫人も、ここまでの話は知らなかったゆえ」\n1900 = "「沒辦法啊，有關餐車的文獻太少了……我們之前請教的永山夫人也沒有這麼詳盡的知識」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ううん、気をつければわたしたちでも気づけてた。\n――永山夫人も、食堂車の話は聞かせてくれてたし」\n1523 = "「不，細心一點的話我們也能察覺到的。永山夫人也跟我們講過有關餐車的事」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ？」\n1704 = "「嗯？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「覚えとらんと？　食事ばテーブルに乗ってるとき、\n圧縮空気の抜ける音したら――」\n1553 = "「你不記得了嗎？桌子上放著食物時聽到了壓縮空氣的洩氣聲的話」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ！　『すぐにお皿を押さえてください！』か。\nあれは確かに勉強になった」\n1671 = "「啊！她說的“必須馬上按住盤子”是吧。那個確實是受教了」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そうしなければ料理も何も床に落ちるって――\n理解したのに、厨房内まで私、想像できてなくって」\n1510 = "「不然的話碗筷飯菜全會掉到地上。到這裡我都懂了，但我沒能舉一反三，聯想到廚房內的狀況」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「む」\n1663 = "「唔」" \n\n# monologue\n# JP: 必要以上に自らを責める、悪い日々姫が出ようとしている。\nそう感じるから、無理には弱音を封じ込めない。\n2446 = "日日姬沒有把喪氣話憋在心裡。因為她察覺到，如果過分自責，自己就要暴露出軟弱的一面了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「想像できなかったのは僕も同じだ。\nだが、それはさほど大きな問題ではあるまいよ」\n1788 = "「我也一樣沒有想到。但這並不是什麼大問題」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「え？」\n# 1641 = "「哎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なんのため、チェックや会議が存在するのだ。\n見落としがあっても、どこかできっと、潰してもらえた」\n1556 = "「你以為檢查和會議的作用是什麼啊。就算一開始有所疏漏，往後也一定會得到彌補的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ――」\n# 1665 = "「啊……」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いまはまだ、デザインの最初期の段階だ。\n見落としや不備が無い方がおかしいだろう」\n1564 = "「你現在還處於設計的最初階段。要是沒有任何疏漏的話才叫奇怪呢」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「……うん」\n1231 = "「……嗯」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「むしろ、これほどに早く、重大な見落としを発見できた。\nそれだけでも、今回の視察の大きな成果と考えられる」\n1949 = "「能夠這麼早就發現重大的疏漏，單憑這一點，這趟考察就已經取得了巨大的成果」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ！」\n1692 = "「嗯！」" \n\n# monologue\n# JP: 納得をして切り替えることができたのだろう。\n日々姫がほわっと、やわらかになる。\n2511 = "看樣子日日姬是接受了這個說法，走出陰霾的她一下子放鬆了下來。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「でも……やっぱり時間、もっと上手に使わないと。\nデザインの下調べ、全然足りてなかったのは確かだし」\n1518 = "「不過……我還是必須更好地利用時間才行。畢竟設計前的調查工作確實做得太不到位了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「かもしれんな。だが――」\n1559 = "「你可能說的沒錯。不過……」" \n\n# monologue\n# JP: 日々姫は既に、種を見つけた。\nならばここから考えるべきは、その育て方の問題だ。\n2433 = "日日姬已經找到了種子。那麼接下來該考慮的就是怎麼讓種子生根發芽。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「今回の旅行で、視察で、きっと方針も見いだせるさ。\n限られた時間で、必要なことをよりよく学ぶための」\n1550 = "「你一定會在這趟旅程、這次考察中找到自己的方針。因為你需要在有限的時間中掌握更多所需的知識」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そう――かな」\n1925 = "「真的嗎」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ。そのためにも、必要となるのはメリハリだ。\n休むべきときは休み、遊ぶべきときにはしっかり遊べ」\n1689 = "「嗯。所以張弛有度是必不可少的。該休息的時候休息，該玩的時候就好好玩耍」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「遊び――」\n1914 = "「玩耍——」" \n\n# monologue\n# JP: 僕の言葉に、日々姫は残念そうな顔になる。\n2543 = "聽到我這麼說，日日姬的表情顯得有些遺憾。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「遊ぶチャンス……\nフリーな旅行日、今日だけだったのに」\n1918 = "「玩耍的機會……這趟旅程中明明只有今天能夠自由行動啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「さっきもいったが、僕は十分楽しんだ。\n遊べていないのは、日々姫だけだぞ？」\n1798 = "「我剛才也說了，我今天已經很盡興了。只有你一個人沒有玩到」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「遊び……今からでも出来る遊び――\nにぃにと、遊ぶ――あっ！」\n1916 = "「玩耍……我要跟阿哥玩現在就能玩的遊戲……啊！」" \n\n# monologue\n# JP: 日々姫が笑う。あどけなく。\n小さな頃の日々姫が笑顔に混じってる。\n2456 = "日日姬露出了純真的笑容。這笑容中似乎帶著幾分兒時的影子。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あのね？　にぃに。\nこどもっぽいって笑わんといてね？」\n1817 = "「我說阿哥，你千萬不可以取笑我太幼稚哦」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕は笑わん。\n日々姫の遊びを笑ったことなど、一度とて無い」\n1786 = "「我不會笑你的。我從來沒有取笑過你的遊戲」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ！」\n# 1692 = "「嗯！」" \n\n# monologue\n# JP: （じゃぶん）\n2676 = "（嘩啦）" \n\n# monologue\n# JP: 湯船の中、\nいきなり日々姫は僕に背中を向けてくる。\n2438 = "日日姬忽然在浴池裡轉身背對著我。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あのねあのね、私ずうっと\nにぃにといっしょにお絵かきしたくて」\n1939 = "「聽我說，我一直很想跟阿哥一起畫畫」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いっしょに……は、どうだ、楽しめるのか？\nあまりにも技量が違いすぎよう」\n1506 = "「一起畫畫……會好玩嗎？功底差太多了吧」" \n\n# monologue\n# JP: プロとアマチュア。\n余りに格差が大きすぎては“共に遊ぶ”は成立しない。\n2302 = "專家和業餘人士，兩者間的差距太大的話根本不能叫作“一起玩”。" \n\n# monologue\n# JP: “遊ばせてやる”も性格次第では楽しかろうが、\n日々姫がそれを楽しめるとは思えない。\n2472 = "有些人可能會覺得陪菜鳥玩玩挺有趣的，不過我覺得日日姬並不是那種性格的人。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「やけん。やけんね。\nお絵かき、背中あてっこで遊んでみたいの」\n1827 = "「所以，所以呢，是用畫畫的方式來玩背後猜字的遊戲」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「背中あてっこ――文字を書いて当てあうやつか。\nあれを、なるほど。お絵かきでする」\n1755 = "「就是在背後寫字讓對方猜的那個遊戲啊。明白了，那個可以用畫畫的方式玩」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん！」\n# 1692 = "「嗯！」" \n\n# monologue\n# JP: ――心が完全に凍りついてた、あのころに、\nそれでも日々姫にせがまれるたび、付き合っていた。\n1182 = "——即便是在我心如死灰的那段日子裡，每當日日姬央求我，我都會陪她玩這個遊戲。" \n\n# monologue\n# JP: （楽しかった……という記憶は無いが）\n2702 = "（雖然在我的記憶中……並沒有多少樂趣可言）" \n\n# monologue\n# JP: それでもこうして思い返せば、指先に、\n感じていたろうぬくもりが、ふんわり宿るような気もする。\n2243 = "即便如此，像這樣回憶之後，就會覺得指尖上似乎還保留著一絲當時所感受到的溫暖。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「何点を目指す？」\n1567 = "「你的目標是幾分？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「もちろん十点！！」\n1921 = "「當然是十分！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「心得た」\n1532 = "「了解了」" \n\n# monologue\n# JP: 点数計算は簡単だ。\n当てたら一点、間違えたのなら０点となる。\n2602 = "這遊戲的分數很好算。猜中了就得一分，猜錯的話就是零分。" \n\n# monologue\n# JP: ふたりで合計十点いけば、遊びはおしまい。\n勝ち負けもない、ごくごくたわいない遊び。\n2231 = "兩個人的總分到達十分之後，遊戲就結束了。這是個無所謂勝負的、極其單純的遊戲。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「では、僕から描くぞ？」\n2029 = "「那我先畫了哦」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん」\n# 1690 = "「嗯」" \n\n# monologue\n# JP: （くにゅんっ）\n2681 = "（戳）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んふふっ」\n1691 = "「嗯呵呵」" \n\n# monologue\n# JP: くすぐったそうな、幸せそうな、\n笑いごえさえあどけない。\n2530 = "經不住癢的日日姬咯咯直笑，那笑聲聽起來是那麼幸福，那麼純真。" \n\n# monologue\n# JP: 指を動かす一ミリごとに、\n時計の針が戻る気がする。\n2624 = "隨著指尖的移動，時間彷彿在不斷回溯。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫せんせーを画用紙にするとは、\nなかなか恐れ多いことだが」\n1948 = "「能夠把日日姬老師當作畫紙，我實在是誠惶誠恐啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うふふっ、めいっぱい描いてよかとよ？」\n1627 = "「呵呵，你可以盡情地畫哦」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「慣れてきたなら、そうしよう」\n1935 = "「等我上手了再那樣畫吧」" \n\n# monologue\n# JP: だけれどこれは最初の一枚。\n文字のときなら、一文字で済ませる範囲のものだ。\n2212 = "不過這是最開始的第一張畫。如果換作猜字的話，寫個單字就差不多了。" \n\n# monologue\n# JP: できるだけ簡単に、簡単に――\n2354 = "我要儘可能畫得簡單一些……" \n\n# monologue\n# JP: （くっ――くくっ）\n2666 = "（劃）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「これでどうだ？」\n2006 = "「這樣猜得出嗎？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「え？　直線に――半円？？　ええ？\nなんだろ？　かまぼこ？」\n1648 = "「哎？直線加半圓？？嗯？到底是什麼呢？魚板？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「確かに、形はかまぼこに近い。\nだが、今日の旅行のその後で、かまぼこは無かろう」\n1767 = "「形狀確實和魚板很像。不過在經歷了今天的旅程之後，猜魚板也太不著調了吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「今日の旅行？\n…………あっ！！　わかった！　トンネル！！」\n1537 = "「今天的旅程？……啊！！我知道了！是隧道！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「正解だ」\n1717 = "「回答正確」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「じゃ、私の番ね！　にぃに、背中～」\n2034 = "「那該我了！阿哥，背對我～」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n1740 = "「好的」" \n\n# monologue\n# JP: （こしゅっ）\n# 2681 = "（戳）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ――にぃに、背中、凝ってる？」\n1667 = "「啊……阿哥的後背是不是有點僵硬？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「自覚は無いが――\n多少は凝っているかもしれんな」\n1814 = "「我自己感覺不出，可能是有點僵吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そっか。じゃ、ちょっと強めにいくね？」\n2005 = "「這樣啊。那我就用力點畫」" \n\n# monologue\n# JP: （しゅーっ――しゅーっ――ぐい、ぐい、ぐい、ぐい）\n2664 = "（划——划——戳、戳、戳、戳）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「簡単だな。線路――線路と枕木だ」\n2000 = "「這個簡單。是鐵路——鐵軌和枕木」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ！　にぃにだけ描こうと思ったのに、\nうっかりねぇねも描いちゃった！」\n1673 = "「啊！本來只想畫阿哥的，一不小心把阿姐也畫出來了！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「双鉄だけでは正解は難しかったろう。\n枕木のおかげで、線路だとわかったようなものだ」\n1585 = "「光只有兩條鐵軌的話很難猜中啊。多虧了枕木，我才能猜到是鐵路」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「むぅ～～っ」\n1664 = "「唔～～」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なにをむくれる。\nそら、背中を貸せ」\n1574 = "「你賭什麼氣啊。來，後背轉過來」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はぁい」\n1926 = "「知道啦」" \n\n# monologue\n# JP: この流れなら、次に描くべきは決まっているが、\nさていったい、どのように絵にするべきなのか……\n2367 = "按這種勢頭，我已經決定好了下個要畫什麼了。不過該怎麼畫出來呢……" \n\n# monologue\n# JP: （くるっ――ぐーーっ、ちょんちょん）\n2697 = "（轉——戳——戳戳）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「え？　なに？　ちっちゃな丸に、ヒモに――矢印？\nあ！　わかった！　『汽笛！！！』」\n1643 = "「哎？什麼？小小的圓圈和繩子……還有箭頭？啊！我知道了！是“汽笛！！！”」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうだ。汽笛が響くその瞬間だ」\n1901 = "「沒錯。我畫的是汽笛響起的瞬間」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「えへ～っ！ えへへ～っ！　\n“ひびき”ば、描いてくれたとねっ！！」\n1713 = "「嘿嘿～！嘿嘿嘿～～！阿哥畫的是“響”，是日日姬啊！！」" \n\n# monologue\n# JP: 『蛍光灯を消すところ』と誤認されても仕方ない。\nそんな拙い絵ではあるが、日々姫は理解してくれた。\n2562 = "要是被誤認為“關燈的瞬間”也是很正常的。多虧日日姬能夠理解我這幅拙劣的畫作。" \n\n# monologue\n# JP: これは――楽しい。\nお互いを思いあうことで、技術の未熟をおぎなえる。\n2603 = "這遊戲還真是挺有意思的。對彼此的關心能夠彌補技術的不足。" \n\n# monologue\n# JP: （ああ……ひょっとしたら、\n幼い日々姫は無意識に……あるいは、本能的に）\n2673 = "（嗯……說不定，小時候的日日姬在無意識中……或者說是出於本能）" \n\n# monologue\n# JP: 心を閉ざす僕とこうして遊ぶことで、\n少しでも、寄り添おうとしてくれていたのか。\n2282 = "她想用這種遊戲方式，來儘量陪伴封閉心靈的我。" \n\n# monologue\n# JP: そうと思えば、愛しさはさらにふくれあがる。\nもっと日々姫と近づきたいと、心底思う。\n2326 = "想到這裡，我心中又湧起了對她的愛意。我真的好想跟她更親近一些。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「じゃ、今度はわたしの番～」\n2038 = "「那麼這次換我了～」" \n\n# monologue\n# JP: ……蒸気機関車。\n寄り添う小さな女の子。\n1201 = "……蒸汽機車。靠在一旁的小女孩。" \n\n# monologue\n# JP: これでわからないわけがない。\n2598 = "這就不可能猜不出了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ハチロク、だ」\n1865 = "「是八六」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「大正解～！！」\n1748 = "「完全正確～！！」" \n\n# monologue\n# JP: れいな。ポーレット。凪。ふかみ。稀咲。\n九点目。僕が描いた絵は当然――\n2506 = "玲奈、波萊特、凪、深美、稀咲。到了第九分，我畫的當然是……" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ナビ！」\n2072 = "「Ｎａｖｉ！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「正解。次がラストの一問だな」\n1716 = "「回答正確。接下來是最後一問」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃに、背中～」\n2053 = "「阿哥，背對我～」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n# 1740 = "「好的」" \n\n# monologue\n# JP: 少し、緊張してしまう。\n2348 = "我有點緊張。" \n\n# monologue\n# JP: ここまでは、\n流れで正解できていたようなものではあるが――\n2220 = "之前基本都是靠慣性思維猜對的——" \n\n# monologue\n# JP: （ここに来て何が出て来るか……\n全く予想もつかなくなってしまったからな）\n2701 = "（那麼最後一題到底會出什麼呢……我已經完全預料不到了）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ちょこっと、ややこしか絵になるばってん」\n2004 = "「這張畫可能會有一點點複雜哦」" \n\n# monologue\n# JP: （クルッ――す、すっ。くるっ――す――す）\n2696 = "（轉——划、划。轉——划——劃）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「お、おお？」\n1699 = "「嗯，噢噢？」" \n\n# monologue\n# JP: 線が多い。今までとまるで比較にならない。\n円を描いて、たくさんの線。\n2473 = "有很多線。跟之前的畫沒辦法比。她畫了很多條圓形的線。" \n\n# monologue\n# JP: それがなんども繰り返される。\n2542 = "而且她畫了一圈又一圈。" \n\n# monologue\n# JP: （パターン、か？　いち、に、さん、し――）\n2682 = "（有規律嗎？１、２、３、４）" \n\n# monologue\n# JP: ひとつひとつは大きくない。\nパターンは確かに見られるようだ。\n2312 = "弧線一圈大過一圈。我好像真的找到規律了。" \n\n# monologue\n# JP: ひとつひとつ、細かな部分の差はあれど――\n2626 = "雖然每個圓都有細節上的差別……" \n\n# monologue\n# JP: （ご――ろく――なな――はち――きゅう――む？）\n2707 = "（５——６——７——８——９——嗯？）" \n\n# monologue\n# JP: ここでひとつ、大きくはずれたものがくる。\nいままでの規則的なパターンを離れ、少し上へと。\n2599 = "這時卻出現了一個明顯的離群分子。它脫離了之前的規律，飄在了上方。" \n\n# monologue\n# JP: （飛行機――なら、これはナビか。\nそして、いままでの九は、恐らく――）\n2703 = "（飛機——那這個就是Ｎａｖｉ吧。而之前的９個圈應該是——）" \n\n# monologue\n# JP: 僕も含めて、九人の人。\nそれを見守るようなナビ。\n2239 = "包括我在內的九個人。再加上默默注視我們的Ｎａｖｉ。" \n\n# monologue\n# JP: （しゅーーーーーーーーっ――ぐるーーーーーっ）\n2662 = "（划————————轉——————）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ！」\n1658 = "「哦哦！」" \n\n# monologue\n# JP: つながる。全てが。\n長い一本の輪によって。\n2186 = "一條長長的圓弧把所有人都連在了一起。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕らの全てが、つながっている。\nならばこれは――御一夜――そして、御一夜鉄道だ」\n1792 = "「我們全部連接在了一起。那這就是……御一夜，也就是御一夜鐵路」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「大正解！　これで十点――わっ！？」\n1747 = "「完全正確！這樣就得到十分了——哇？！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おっと」\n1659 = "「哦喲」" \n\n# monologue\n# JP: 立ち上がり振り向きかけたところで、\n日々姫がよろめく。\n2444 = "日日姬本想站起來轉向我，不過卻有些站不太穩。" \n\n# monologue\n# JP: 抱き止めた肌は、ぽかぽかだ。\nのぼせる寸前なのかもしれない。\n2559 = "被我一把抱住的她身上熱呼呼的，我看她已經快泡暈了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あがるか。おかげで楽しく遊べた」\n1793 = "「我們出去吧。多虧了你，我玩得很開心」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん！　私も楽しかったぁ」\n1696 = "「嗯！我也很開心」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なによりだ」\n2025 = "「那太好了」" \n\n# monologue\n# JP: その上、二人で未来を描けた。\n2217 = "並且我們還透過這些畫展望了一番未來。" \n\n# monologue\n# JP: トンネルを抜け、僕らみんなで力を合わせて、\n更に先へと、笑顔で進む未来図を。\n2259 = "在暢想未來的藍圖裡，穿過隧道的我們都面帶笑容，大家一起齊心協力向前出發。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……出来るさ、必ず。\n日々姫と僕と、みんななら」\n1883 = "「有日日姬、有我，還有大家。我們一起努力……一定可以的」" \n