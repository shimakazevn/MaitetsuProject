# lines: 432 
# 【双鉄】
# display as 雙鐵
# JP: 「ここか。\nここが噂の[ぶんごもり,2]文庫森か」
1757 = "「Là đây sao.\nĐây chính là Bungomori trong lời đồn sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「[せんけい,1]扇形機関庫……すごい！　かわいい」
1831 = "「\\x%l扇形機関庫;#00ffc040;Gara đầu máy hình ngành%l;#;……Tuyệt quá! Dễ thương quá đi.」"
# monologue
# JP: 日々姫はもはやスケッチブックを開いている。\nデートでも視察でもそこは変わらん……ああ、いや。
2432 = "Hibiki đã mở cuốn sổ phác thảo ra từ lúc nào.\nDù là hẹn hò hay đi thị sát thì điểm này vẫn không đổi... a, không."
# monologue
# JP: （視察のときは、[クロッキー,1]速描で精一杯だものな）
2668 = "（Lúc đi thị sát thì chỉ vẽ phác thảo nhanh là cùng thôi mà.）"
# monologue
# JP: それさえできず、必死で瞳に焼き付けて、\n落ち着き次第でペンを走らせていることさえある。
2552 = "Thậm chí có lúc không làm được cả việc đó, chỉ biết cố gắng khắc sâu vào trong mắt,\nrồi khi bình tĩnh lại mới bắt đầu múa bút."
# monologue
# JP: デートだから、僕を信じて甘えられるから――\nどこまでだって、今日は集中できるのだろう。
2207 = "Vì là hẹn hò, vì tin tưởng và có thể nũng nịu với tôi——\nNên hôm nay con bé mới có thể tập trung cao độ đến vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、椅子代わりに」
1852 = "「Hibiki, ngồi tạm lên đây đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、うん。ありがと」
1675 = "「A, vâng. Cảm ơn anh.」"
# monologue
# JP: トランクをお尻にあててやれば、\n日々姫は軽く腰を落とす。
2341 = "Tôi kê chiếc vali dưới mông con bé,\nHibiki liền nhẹ nhàng ngồi xuống."
# monologue
# JP: その仕草さえ、半ば無意識のものなのだろう。\n視線は少しも揺るがずに、手の動きもまた止まらない。
2289 = "Ngay cả hành động đó chắc cũng chỉ là vô thức.\nÁnh mắt không hề dao động, tay cũng không ngừng đưa nét."
# monologue
# JP: （絵になるものだな。絵を描く日々姫は）
2689 = "（Đẹp như tranh vẽ vậy. Hibiki lúc vẽ tranh ấy.）"
# monologue
# JP: 思えば、シャッターを切っている。
2325 = "Vừa nghĩ vậy, tôi đã bấm máy ảnh."
# monologue
# JP: 日々姫のデザインをサポートしようと初めたカメラも、\nいつの間に、すっかり手に馴染むようになった。
2191 = "Chiếc máy ảnh ban đầu tôi cầm lên để hỗ trợ Hibiki thiết kế,\ntừ lúc nào đã trở nên vô cùng quen tay."
# 【双鉄】
# display as 雙鐵
# JP: 「……少し、撮るか」
1241 = "「……Chụp một chút vậy.」"
# monologue
# JP: 資料であれば、視察のときにもいくらも撮れる。\n日々姫のことをひとしきり撮ったあとでも十分だろう。
2560 = "Nếu là tư liệu thì lúc thị sát chụp bao nhiêu chẳng được.\nĐợi chụp Hibiki một hồi xong rồi chụp cũng dư dả chán."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、撮るぞ？」
1853 = "「Hibiki, anh chụp nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　あ、うん」
1645 = "「Hả? A, vâng.」"
# monologue
# JP: 返事は、かなり上の空。\n逆から見れば、いい感じに集中できているのだろう。
2285 = "Câu trả lời nghe rất lơ đãng.\nNhìn theo hướng ngược lại thì có vẻ con bé đang tập trung rất tốt."
# monologue
# JP: 声さえ満足に届かぬほどなら、\nシャッター音が日々姫の邪魔となることもなさそうだ。
2377 = "Nếu đến cả giọng nói cũng không lọt tai,\nthì chắc tiếng màn trập cũng chẳng làm phiền được Hibiki đâu."
# monologue
# JP: （パシャっ）
2672 = "（Tách）"
# 【双鉄】
# display as 雙鐵
# JP: 「どれ……ほう」
1811 = "「Để xem nào... chà.」"
# monologue
# JP: バックモニターで確認すれば、\n自分で撮った写真に思わず見惚れてしまう。
2631 = "Kiểm tra lại trên màn hình LCD,\ntôi bất giác say sưa ngắm nhìn bức ảnh do chính mình chụp."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は……これほどに綺麗だったのだな」
1850 = "「Hibiki... lại xinh đẹp đến mức này sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　うん、ありがと」
1646 = "「Hả? Vâng, cảm ơn anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ははっ。今日の日々姫は随分と素直だ」
1632 = "「Haha. Hibiki hôm nay ngoan ngoãn thật đấy.」"
# monologue
# JP: 反応が、ほとんど本能的なレベルだ。\n見栄も照れも、なにもかもが綺麗に削げ落ちている。
2284 = "Phản ứng gần như ở mức bản năng.\nBao nhiêu sĩ diện hay ngượng ngùng đều bay sạch."
# monologue
# JP: 意識の九割――いや九分九厘、\n絵を描くことにとられているからのことだろう。
2273 = "Chắc là do chín mươi phần trăm——à không, chín mươi chín phần trăm ý thức\nđã dồn hết vào việc vẽ tranh rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「笑っていればありえぬほどに愛らしいのに、\n真剣な顔が――こうも凛々しく美しいとは」
1568 = "「Lúc cười thì đáng yêu đến mức không tưởng,\nvậy mà lúc nghiêm túc——lại mang vẻ đẹp sắc sảo thế này.」"
# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 
# monologue
# JP: 造形美といえばハチロクだが、\n日々姫とて全く負けていない。
2625 = "Nhắc đến vẻ đẹp tạo hình thì phải kể đến Hachiroku,\nnhưng Hibiki cũng không hề kém cạnh chút nào."
# monologue
# JP: いや、むしろ。僕基準では、ハチロク以上。\n――“美形”なのだと、いまさらながらに思い知る。
2214 = "Không, đúng hơn là. Theo tiêu chuẩn của tôi, còn hơn cả Hachiroku.\n——Đến tận bây giờ tôi mới nhận ra, con bé thực sự là một \"mỹ nhân\"."
# monologue
# JP: （角度美人、というわけでもないよな？）
2680 = "（Chắc không phải là người đẹp góc chết đâu nhỉ?）"
# monologue
# JP: 内面ならば、他の誰より知っているという自負がある。
2334 = "Về nội tâm thì tôi tự tin là mình hiểu con bé hơn bất cứ ai."
# monologue
# JP: けれどその分、外観を、\n細かなところまで気にしたことがなかった気がする。
2208 = "Nhưng bù lại, về vẻ bề ngoài,\nhình như tôi chưa từng để ý đến từng chi tiết nhỏ."
# 【双鉄】
# display as 雙鐵
# JP: 「他の角度からも撮っていいか？」
1800 = "「Anh chụp từ góc khác được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「よかとよー」
1609 = "「Được chứ ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――うむ」
2036 = "「Vậy thì——ừm.」"
# monologue
# JP: 日々姫の視界を塞がずに、\nけれど様々な日々姫を撮りたい。
2336 = "Tôi muốn chụp Hibiki ở nhiều góc độ khác nhau\nmà không che khuất tầm nhìn của con bé."
# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 
# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 
# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 
# monologue
# JP: 左右側面。それから背面。\n水平、俯瞰、あおりと撮って――。
2356 = "Góc nghiêng trái phải. Rồi đến từ phía sau.\nGóc ngang, góc từ trên xuống, góc từ dưới lên——."
# 【双鉄】
# display as 雙鐵
# JP: 「……ああ、モニターをチルトさせればいいのか」
1228 = "「……A, xoay màn hình lại là được chứ gì.」"
# monologue
# JP: ファインダーの覗きこみ辛い角度の場合は、\nバックモニターを[チルト,3]角度調整して撮影する。
2262 = "Trong trường hợp góc chụp khó nhìn qua kính ngắm,\nthì tôi sẽ điều chỉnh góc màn hình LCD để chụp."
# monologue
# JP: 普段は全く使わぬが、\nたしか、自撮りとやらをするための機能だ。
2594 = "Bình thường tôi chẳng bao giờ dùng đến,\nnhưng hình như đây là chức năng dùng để chụp selfie thì phải."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。180度回転もできるのだな」
1703 = "「Hừm. Xoay được 180 độ luôn à.」"
# monologue
# JP: これならば、日々姫の前に回り込まずに、\n日々姫の顔を撮ることが出来る。
2600 = "Như vậy thì tôi có thể chụp được khuôn mặt của Hibiki\nmà không cần vòng ra trước mặt con bé."
# monologue
# JP: 視界の邪魔をしないよう、\nなるべく見下ろすようにして――
2228 = "Để không cản trở tầm nhìn của con bé,\ntôi cố gắng chụp từ trên xuống hết mức có thể——"
# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、俯瞰でも綺麗なものだ」
1630 = "「Chà, góc chụp từ trên xuống cũng đẹp đấy chứ.」"
# monologue
# JP: 正面顔は、今は撮れない。
2351 = "Bây giờ thì không chụp chính diện được."
# monologue
# JP: となると次は俯瞰――あおりだ。\nあおる以上は、地を這うように周りこみ……
2609 = "Vậy thì tiếp theo là góc chụp từ dưới lên.\nĐã chụp từ dưới lên thì phải bò lăn lộn xung quanh..."
# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 
# monologue
# JP: （パシャっ）
# 2672 = "（喀嚓）" 
# 【双鉄】
# display as 雙鐵
# JP: 「これも、かわいい。\nというか、あおりの角度で撮ると……」
2003 = "「Góc này, cũng đáng yêu.\nMà khoan, nếu chụp từ dưới lên thì...」"
# monologue
# JP: 控えめなものと感じていた日々姫の体のボリュームも、\nなかなかのものに見えてくる。
2452 = "Thân hình của Hibiki vốn tôi luôn nghĩ là khiêm tốn,\ngiờ nhìn cũng ra gì phết."
# monologue
# JP: 陰影が与える印象が、どれほど絵作りに影響するか、\n今更ながらに思い知る。
2358 = "Ấn tượng do bóng tối mang lại ảnh hưởng đến bố cục bức ảnh đến nhường nào,\nđến giờ tôi mới nhận ra."
# 【双鉄】
# display as 雙鐵
# JP: 「これは面白いな」
1998 = "「Cái này thú vị thật.」"
# 【日々姫】
# display as 日日姬
# JP: 「……うん、面白い。\n光の当たり方で、表情、くるくる変わる」
1233 = "「……Vâng, thú vị lắm.\nTùy vào góc chiếu của ánh sáng mà biểu cảm sẽ thay đổi liên tục.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ、いや――そうか、日々姫は、\n\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;に表情を見るのだな――っと」
1706 = "「Hửm? A, không——ra vậy, Hibiki\nđang nhìn biểu cảm của \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#; nhỉ——」"
# monologue
# JP: カメラ越しにだけ見ていたせいで、見過ごしていた。
2256 = "Chỉ mải nhìn qua ống kính máy ảnh nên tôi đã không nhận ra."
# 【双鉄】
# display as 雙鐵
# JP: 「汗を拭くぞ？　目に入りかねん」
1802 = "「Anh lau mồ hôi cho em nhé? Kẻo lại chảy vào mắt.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
1690 = "「Vâng.」"
# monologue
# JP: いつの間に、陽射しがかなり強まっている。
2622 = "Từ lúc nào, ánh nắng đã trở nên khá gay gắt."
# monologue
# JP: モデルとしての日々姫ならば無帽の方が好適だろうが、\n僕の趣味より優先すべきは、無論、日々姫の健康だ。
2551 = "Nếu lấy Hibiki làm người mẫu thì không đội mũ sẽ đẹp hơn,\nnhưng tất nhiên, sức khỏe của con bé phải được ưu tiên hơn sở thích của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　帽子……は――ああ、トランクの中か。\nならば――まぁ、無いよりいくらかマシだろう」
1710 = "「Hửm? Mũ... thì——a, ở trong vali à.\nVậy thì——thôi, có còn hơn không.」"
# monologue
# JP: 日々姫の汗を拭いたばかりのタオルを広げ、\n僕の体もあわせて使って、日陰をつくる。
2340 = "Tôi giăng chiếc khăn vừa lau mồ hôi cho Hibiki ra,\nkết hợp với cơ thể mình để tạo bóng râm."
# 【日々姫】
# display as 日日姬
# JP: 「ん……」
1685 = "「Ưm……」"
# monologue
# JP: 眩しさにだろう、\n細まっていた日々姫の瞳がいくらか広がる。
2236 = "Chắc do chói mắt,\nđôi mắt đang nheo lại của Hibiki đã mở to ra đôi chút."
# monologue
# JP: ならば効果があるのだろうと、\n安心できて嬉しくなる。
2611 = "Có vẻ như đã có tác dụng,\ntôi thấy yên tâm và vui mừng."
# monologue
# JP: （ささっ――さささっ――）
2687 = "（Sột soạt——sột soạt——）"
# monologue
# JP: 日々姫が走らせる鉛筆も、\nこころなし、軽快さを取り戻したように思える。
2199 = "Tiếng bút chì của Hibiki lướt trên giấy,\ndường như cũng đã lấy lại được sự nhẹ nhàng."
# 【双鉄】
# display as 雙鐵
# JP: 「[せんけい,1]扇形機関庫、か――」
1832 = "「\\x%l扇形機関庫;#00ffc040;Gara đầu máy hình ngành%l;#;, sao——」"
# monologue
# JP: 実物ではなく、スケッチブックの中を見る。\n日々姫の瞳と、僕の瞳を重ねられるような気がして。
2301 = "Tôi không nhìn vật thật mà nhìn vào cuốn sổ phác thảo.\nCảm giác như ánh mắt của Hibiki và ánh mắt của tôi đang hòa làm một."
# 【双鉄】
# display as 雙鐵
# JP: 「凄いものだな。こんなものがまだ現役だとは」
1739 = "「Tuyệt thật đấy. Không ngờ thứ này vẫn còn đang hoạt động.」"
# 【日々姫】
# display as 日日姬
# JP: 「[くるだい,1]来大鉄道の廃線で壊されそうになったの――\n地元の人が……一生懸命、守ったって……ん――」
1940 = "「Lúc tuyến đường sắt Kyudai bị bỏ hoang, nó suýt chút nữa đã bị phá hủy——\nNgười dân địa phương đã... liều mạng bảo vệ nó... ưm——」"
# 【双鉄】
# display as 雙鐵
# JP: 「それが日の目を見たのだな。大廃線の更に前から、\n今に至るまでの長きをずっと、生きながらえて」
1860 = "「Và thế là nó lại được thấy ánh mặt trời. Sống sót qua quãng thời gian đằng đẵng\ntừ tận trước cuộc Đại bãi bỏ cho đến tận bây giờ.」"
# 【日々姫】
# display as 日日姬
# JP: 「車両も……その頃からのこが……ん……多い、とか」
1941 = "「Nghe nói toa xe... từ thời đó... ưm... cũng còn nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「キハ07の[ヨンニイ,1]42に[ヨンサン,1]43か――\nれいなの妹にあたる車両たちだな」
1215 = "「KiHa 07 số 42 và số 43 sao——\nLà những toa xe đóng vai trò em gái của Reina nhỉ.」"
# monologue
# JP: れいなの\x%lキハ07s;#00ffc040;キハ07s%l;#;は、\x%l硬上鉱山鉄道;#00ffc040;硬上鉱山鉄道%l;#;専用に作られた、\n帝鉄キハ07の同形機と聞く。
2544 = "Nghe nói \\x%lキハ07s;#00ffc040;KiHa 07S%l;#; của Reina là mẫu xe cùng kiểu với KiHa 07 của Đường sắt Hoàng gia,\nđược chế tạo riêng cho \\x%l硬上鉱山鉄道;#00ffc040;Đường sắt mỏ Katakami%l;#;."
# monologue
# JP: 正確なところを言えば、従姉妹機ということになろうか？\nレイルロオドの方の従姉妹……の姿は残念ながら見えない。
2498 = "Nói chính xác thì, phải gọi là xe họ hàng nhỉ?\nĐáng tiếc là không thấy bóng dáng cô em họ Railord đâu."
# 【双鉄】
# display as 雙鐵
# JP: 「あとは……[たんすいしゃ,2]炭水車だけが置き去りか。\n機関車の方は、\x%l入換;#00ffc040;入換%l;#;にでも使われているのか？」
1607 = "「Còn lại thì... chỉ có \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#; bị bỏ lại thôi sao.\nPhần đầu máy đang được dùng để \\x%l入換;#00ffc040;dồn toa%l;#; à?」"
# 【日々姫】
# display as 日日姬
# JP: 「に――しては……線路」
1519 = "「Nhưng——mà... đường ray.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ」
1705 = "「Hửm? A.」"
# monologue
# JP: さすがは日々姫の――絵描きの目だ。
2196 = "Quả không hổ danh là ánh mắt của họa sĩ——Hibiki."
# monologue
# JP: 炭水車こそはピカピカに磨き上げられているが、\nそこへとつながる線路は残念、錆びている。
2627 = "Toa tiếp than nước tuy được đánh bóng loáng,\nnhưng đường ray nối đến đó lại rỉ sét."
# 【双鉄】
# display as 雙鐵
# JP: 「生きている……というわけではなさそうだな。\n撮っておいて、あとでハチロクにでも尋ねてみるか」
1923 = "「Có vẻ như không còn hoạt động nữa.\nChụp lại rồi lát nữa hỏi Hachiroku thử xem.」"
# monologue
# JP: とはいえ今は、日々姫を陽射しから守らねばならん。\nカメラを構えることも出来ない。
2209 = "Dù vậy thì bây giờ tôi vẫn phải che nắng cho Hibiki.\nKhông thể cầm máy ảnh lên được."
# monologue
# JP: せいぜいが精一杯に目をこらし、\n特徴を見つけ出そうとするくらいだが……
2345 = "Cùng lắm cũng chỉ có thể căng mắt ra nhìn,\ncố gắng tìm kiếm đặc điểm nhận dạng..."
# monologue
# JP: （僕の目では、特徴らしい特徴も見つけられんな。\nということは――8620形か9600形の炭水車なのか？）
2657 = "（Với con mắt của tôi thì chẳng tìm thấy đặc điểm nào ra hồn cả.\nĐiều đó có nghĩa là——đây là toa tiếp than nước của dòng 8620 hay 9600 sao?）"
# monologue
# JP: そうと思えばそうとも見える。\nキュウロクはかつて、文庫森にいたとも聞いている。
2601 = "Càng nghĩ lại càng thấy giống.\nNghe nói Kyuroku từng ở Bungomori."
# 【双鉄】
# display as 雙鐵
# JP: 「文庫森のキュウロクのことなのだが――」
2049 = "「Về chuyện Kyuroku ở Bungomori ấy——」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――ちょっと待って――もうすぐ仕上がるけん」
1679 = "「A——đợi một chút——sắp xong rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、すまん」
1660 = "「A, xin lỗi.」"
# monologue
# JP: （しゃっ――しゃっ――カリカリ、カリカリっ）
2686 = "（Xoẹt——xoẹt——loẹt xoẹt, loẹt xoẹt）"
# monologue
# JP: 鉛筆を立て、細かな部分を描き込んでいく。\n黒が一か所際立つ度に、絵の中の空気が粒立っていく。
2292 = "Con bé dựng thẳng bút chì, vẽ vào những chi tiết nhỏ.\nMỗi khi một điểm đen nổi bật lên, không khí trong bức tranh lại trở nên sống động."
# monologue
# JP: （凄いな……"仕上げる”とはこのことか）
2678 = "（Đỉnh thật...\"Hoàn thiện\" là thế này sao.）"
# monologue
# JP: 要点、要所。\nそんな言葉が頭をよぎる。
2618 = "Điểm mấu chốt, vị trí quan trọng.\nNhững từ ngữ đó xẹt qua đầu tôi."
# monologue
# JP: 最も黒く沈む部分を、正しく最も黒くする。\nそうするだけで、他の全てが浮き立っていく――
2360 = "Làm cho phần tối nhất trở nên đen nhất một cách chính xác.\nChỉ cần như vậy, mọi thứ khác sẽ nổi bật lên——"
# 【日々姫】
# display as 日日姬
# JP: 「ん！　こんなもんかなっ」
1694 = "「Ưm! Tầm này là được rồi nhỉ.」"
# monologue
# JP: よほど満足いったのだろう。
2508 = "Có vẻ con bé rất hài lòng."
# monologue
# JP: スケッチの端に日々姫は小さくサインを書き入れ、\n満面の笑顔で僕を見上げ――？？？
2431 = "Hibiki ký một chữ ký nhỏ ở góc bức phác thảo,\nngước nhìn tôi với nụ cười rạng rỡ——???"
# 【日々姫】
# display as 日日姬
# JP: 「え？　――え……えっ！？」
1640 = "「Hả? ——Hả... Hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした！？　日々姫っ」
1592 = "「Sao vậy!? Hibiki!」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、いつからそんな――っ！！\nごめんっ！　ごめんなさいっ！！？」
2051 = "「Anh hai, từ lúc nào mà anh lại——!!\nXin lỗi! Em xin lỗi!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにをそんなに――ああ」
1764 = "「Có gì đâu mà em phải——a.」"
# monologue
# JP: 汗を拭かれて、\n自分の方もいつの間に汗にまみれていたのだと知る。
2258 = "Bị con bé lau mồ hôi,\ntôi mới nhận ra mình cũng đã đầm đìa mồ hôi từ lúc nào."
# 【日々姫】
# display as 日日姬
# JP: 「日陰……にぃにに作らせちゃって。っていうか私、\n夢中になって、にぃにぃのことほったらかしで」
1875 = "「Bóng râm... lại bắt anh hai phải che cho. Mà em,\nmải mê quá nên bỏ mặc anh hai luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほったらかしになぞ、されていなかったぞ？」
1561 = "「Anh có bị bỏ mặc đâu?」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
1641 = "「Hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「半ば無意識になのだろうな。\n僕の言葉に、日々姫は受け答えしてくれていた」
1558 = "「Chắc là trong vô thức nhỉ.\nHibiki vẫn trả lời những lời anh nói mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……」
1665 = "「A……」"
# monologue
# JP: 戸惑ったような、安堵したような。
2288 = "Trông vừa như bối rối, lại vừa như nhẹ nhõm."
# monologue
# JP: なんども微妙な表情から、\n日々姫はゆるゆる言葉を紡ぐ。
2193 = "Sau nhiều lần thay đổi biểu cảm khó tả,\nHibiki mới từ từ cất lời."
# 【日々姫】
# display as 日日姬
# JP: 「うん、そうかも。にぃにぃの声聞こえて――\nだからわたし、安心して集中できてたんだと思う」
1698 = "「Vâng, chắc là vậy. Nghe thấy giọng anh hai——\nnên em mới có thể yên tâm tập trung.」"
# 【双鉄】
# display as 雙鐵
# JP: 「聞くだけでなく、答えてもくれていた。\n夢中になってる日々姫は、いつもより素直だったぞ？」
1552 = "「Không chỉ nghe mà em còn trả lời nữa.\nHibiki lúc mải mê trông ngoan ngoãn hơn bình thường đấy nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「やっ――ええっ！？　な、何ば聞いたと！？」
1967 = "「Á——Hả!? A-Anh đã hỏi gì vậy!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「大したことは聞いてない。\n主に、『写真を撮っても大丈夫か？』とかその程度だ」
1807 = "「Anh không hỏi gì to tát đâu.\nChủ yếu là mấy câu cỡ như 『Anh chụp ảnh được không?』 thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、撮っとってくれてたのも、なんとなくわかっとった」
1678 = "「A, em cũng mang máng biết là anh đang chụp ảnh cho em.」"
# monologue
# JP: あどけないほどに嬉しげな顔。
2293 = "Khuôn mặt vui sướng đến ngây thơ."
# monologue
# JP: 胸がドキンと跳ね上がり、\nだからこそ不安を覚えてしまう。
2338 = "Tim tôi đập thót một nhịp,\nvà chính vì thế mà tôi cảm thấy bất an."
# 【双鉄】
# display as 雙鐵
# JP: 「なんとなく、か――\nそれは、いささか危険かもしれんな」
2055 = "「Mang máng, sao——\nThế thì có hơi nguy hiểm đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 1641 = "「哎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「集中しすぎて、周りが見えていないというのは、\nどう考えても、不用心なことだろう」
1723 = "「Tập trung quá mức mà không nhìn thấy xung quanh,\ndù nghĩ thế nào cũng thấy thật bất cẩn.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、それは平気！\n安心して、にぃに？」
1683 = "「A, chuyện đó thì không sao!\nYên tâm đi anh hai?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2067 = "「!」"
# monologue
# JP: 日々姫が僕に身を寄せる。\nナイショ話をしたいのだろうと頭を下げる。
2441 = "Hibiki xích lại gần tôi.\nChắc là muốn nói nhỏ nên tôi cúi đầu xuống."
# monologue
# JP: 汗の匂いが鼻をくすぐる。\n日々姫の汗と、僕の汗との混じる匂いが。
2189 = "Mùi mồ hôi xộc vào mũi.\nMùi mồ hôi của Hibiki hòa quyện với mồ hôi của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃと一緒におらんかったら、\n最初から、こぎゃんと集中できんもん」
1958 = "「Nếu không ở cùng anh hai,\nthì từ đầu em đã không thể tập trung thế này rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1690 = "「嗯」" 
# monologue
# JP: なるほど、たしかにそうかもしれん。\n家の中、一人で日々姫が描いているとき――
2519 = "Ra là vậy, quả thực có thể là như thế.\nKhi Hibiki vẽ một mình trong nhà——"
# monologue
# JP: 邪魔しないよう静かに静かに行動しても、\n必ず気づかれビクリとされて、『誰と？』と聞かれる。
2503 = "Dù tôi có đi lại rón rén đến đâu để không làm phiền,\nthì con bé vẫn luôn nhận ra, giật mình và hỏi 『Ai đó?』."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにが守ってくれるってわかっとるけん。\nやけん、わたし、こぎゃんと深く――って、あああ」
1725 = "「Vì em biết anh hai sẽ bảo vệ em.\nNên em mới có thể sâu sắc——á, a a a.」"
# monologue
# JP: 嬉しげに、恥ずかしげに。\nとろけるようにやわらいでいた顔が再び硬くなる。
2277 = "Trông vừa vui vẻ, vừa ngượng ngùng.\nKhuôn mặt đang mềm ra như muốn tan chảy lại cứng đờ lại."
# 【日々姫】
# display as 日日姬
# JP: 「受け答えばしとったって、それでも――\nせっかくのデートなのに、私、にぃにをほっといて」
1521 = "「Dù có trả lời đi nữa, thì vẫn——\nKhó khăn lắm mới được hẹn hò, vậy mà em lại bỏ mặc anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「違うぞ？　日々姫」
1571 = "「Không phải đâu? Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「違うって、何が？」
2045 = "「Không phải, là sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は日々姫が夢中になってくれることが嬉しいのだ。\n僕をかまうため、日々姫が見るべきを見損ねれば悲しい」
1804 = "「Anh rất vui khi thấy Hibiki mải mê như vậy.\nAnh sẽ rất buồn nếu vì bận tâm đến anh mà Hibiki bỏ lỡ những thứ cần xem.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1665 = "「啊……」" 
# 【双鉄】
# display as 雙鐵
# JP: 「夜の部屋。ふたりきりのとき。他に見るべきが無い\nときならば、もちろん、最大限にかまってもらいたい」
1741 = "「Vào buổi tối trong phòng. Khi chỉ có hai đứa mình. Khi không còn gì khác để xem,\nthì tất nhiên, anh muốn em quan tâm đến anh nhiều nhất có thể.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1690 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「けれど、これほどに素晴らしい光景を、\n日々姫の瞳が映しているとき――っ！」
1522 = "「Nhưng, khi một khung cảnh tuyệt vời đến thế này,\ndang phản chiếu trong đôi mắt của Hibiki——!」"
# monologue
# JP: あたりを見回し、少し驚く。
2352 = "Nhìn xung quanh, tôi hơi ngạc nhiên."
# monologue
# JP: ……夢中になって、周りが全く見えてなかったのは、\n僕も日々姫と、まったく同じであったらしい。
1196 = "……Hóa ra tôi cũng giống hệt Hibiki,\nmải mê đến mức không nhìn thấy xung quanh."
# 【日々姫】
# display as 日日姬
# JP: 「え？　わ――わあっ！！？」
1644 = "「Hả? Oa——oá!!?」"
# monologue
# JP: ちらほらと、地元の方らしい人たちが、\n僕らのまわりを遠巻きにして、様子を見ている。
2512 = "Lác đác vài người có vẻ là người dân địa phương,\ndang đứng thành vòng tròn quanh chúng tôi để theo dõi."
# monologue
# JP: 向こうも、僕らも、戸惑っている。\nならば騒がせた僕らから、まず挨拶をするべきだろう。
2303 = "Cả hai bên đều đang bối rối.\nVậy thì những người gây ồn ào như chúng tôi nên chào hỏi trước mới phải."
# 【双鉄】
# display as 雙鐵
# JP: 「お騒がせ――ではないですね。いや……ああ。\nその、ご不安を与えてしまったならすみません」
1838 = "「Làm ồn——thì không phải nhỉ. À... vâng.\nCái đó, xin lỗi vì đã làm mọi người lo lắng.」"
# 【木本】
# display as 老人
# JP: 「ああ――いや――なんですかいな、ゆーたら」
1638 = "「A——không——chuyện là, nói sao nhỉ.」"
# monologue
# JP: 僕を、日々姫を、まわりに集まった人たちを。
2538 = "Nhìn tôi, nhìn Hibiki, nhìn những người tụ tập xung quanh."
# monologue
# JP: ご老人は困ったように眺めまわして\n――やがて、おずおずと問いかけてくる。
2470 = "Ông lão bối rối nhìn quanh\n——rồi rụt rè lên tiếng hỏi."
# 【木本】
# display as 老人
# JP: 「……あんたがたぁ。\nいったい、なにしてらっしゃいますかね？」
1244 = "「……Các vị đây.\nRốt cuộc là đang làm gì vậy?」"
# 【日々姫】
# display as 日日姬
# JP: 「……あー、日陰すずしい」
1230 = "「……A, trong bóng râm mát quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。突然のことですのに、\nまさか、機関庫内にいれていただけるとは」
2059 = "「Cảm ơn ông. Đột nhiên đến đây,\nkhông ngờ lại được cho vào trong gara đầu máy.」"
# monologue
# JP: 頭を下げればご老人――\n木本老技師は、いやいやと軽く笑ってくれる。
2332 = "Tôi cúi đầu, ông lão——\nLão kỹ sư Kimoto cười nhẹ xua tay."
# 【木本】
# display as 木本
# JP: 「ヘルメットだけは外さんようにお願いします。\nこん機関庫ば、現役ですけん」
1744 = "「Xin đừng tháo mũ bảo hiểm ra nhé.\nGara đầu máy này vẫn còn đang hoạt động mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはもちろん」
2031 = "「Tất nhiên rồi ạ.」"
# 【木本】
# display as 木本
# JP: 「ゆーても、ま。次ん汽車が戻ってくるんは、\n二時間以上先のことになりますけどの」
1520 = "「Nói vậy thôi, chứ. Phải hơn hai tiếng nữa\nchuyến tàu tiếp theo mới về tới.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、キュウロクですか？」
1662 = "「A, là Kyuroku sao ạ?」"
# 【木本】
# display as 木本
# JP: 「いやいや、今時ん汽車は、気動車いうて――\n蒸気機関車のこととは違うとですよ」
1508 = "「Không không, tàu hỏa thời nay gọi là toa xe tự hành——\nKhông giống với đầu máy hơi nước đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと、そうでしたね」
1636 = "「Ây da, đúng là vậy nhỉ.」"
# monologue
# JP: 失念していた。復線したとはいえ、来大鉄道の路線は、\n大廃線以前からのものを補修し、何とか使っている程度。
2464 = "Tôi quên khuấy mất. Dù đã khôi phục tuyến, nhưng tuyến đường sắt Kyudai\nchỉ là sửa chữa lại những gì còn sót lại từ trước cuộc Đại bãi bỏ để dùng tạm."
# monologue
# JP: 気動車と比べて段違いに線路への負荷が大きい機関車は、\nそもそも、乗り入れ自体が厳しいと教えられていたのに。
2304 = "Tôi đã được dạy rằng đầu máy tạo ra tải trọng lên đường ray lớn hơn rất nhiều so với toa xe tự hành,\nnên vốn dĩ việc đưa vào hoạt động đã rất khó khăn rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「では、あの炭水車は――」
1824 = "「Vậy, toa tiếp than nước đó là——」"
# 【木本】
# display as 木本
# JP: 「名残？　はぁ……未練の塊ですのぉ。\nあげなもんだけ残しても、何にもならんのですが」
1773 = "「Tàn tích? Hầy... Là một khối lưu luyến thôi.\nGiữ lại thứ đó thì cũng chẳng để làm gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、機関車はもう？」
2037 = "「Vậy, đầu máy thì đã?」"
# 【木本】
# display as 木本
# JP: 「おらんとですねぇ。\x%l8620;#00ffc040;8620%l;#;も、\x%l9600;#00ffc040;9600%l;#;も、\n\x%lC11;#00ffc040;C11%l;#;も\x%lC12;#00ffc040;C12%l;#;も\x%lC58;#00ffc040;C58%l;#;も\x%lD60;#00ffc040;D60%l;#;も、もうだぁれもおらんとですよ」
2042 = "「Không còn nữa rồi. Cả \\x%l8620;#00ffc040;8620%l;#;, cả \\x%l9600;#00ffc040;9600%l;#;,\ncả \\x%lC11;#00ffc040;C11%l;#;, \\x%lC12;#00ffc040;C12%l;#;, \\x%lC58;#00ffc040;C58%l;#; lẫn \\x%lD60;#00ffc040;D60%l;#;, chẳng còn ai nữa đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「寂しい、すごく」
1782 = "「Buồn thật đấy.」"
# monologue
# JP: ひとりごとのようにつぶやいて\n日々姫の目が、ゆっくり、ぐるりとあたりを見渡す。
2428 = "Lẩm bẩm như đang nói một mình,\nHibiki từ từ đảo mắt nhìn quanh."
# monologue
# JP: そうしてスケッチブックをひろげ――
2369 = "Rồi con bé mở sổ phác thảo ra——"
# 【木本】
# display as 木本
# JP: 「ああ――」
1656 = "「A——」"
# monologue
# JP: 先ほど描いた無数のスケッチの中の一枚に、\nあざやかに――8620の姿を描き加えていく。
2279 = "Trên một trong vô số bức phác thảo vừa vẽ,\ncon bé vẽ thêm bóng dáng của 8620 một cách sống động."
# 【木本】
# display as 木本
# JP: 「ああ、こん絵ば――まるで――昔のままの景色で」
1670 = "「A, bức tranh này——cứ như——khung cảnh ngày xưa vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「たとえ線路を走れなくても。\n蒸気機関車とこの機関庫は、すごく絵になると思うのに」
1596 = "「Dù không thể chạy trên đường ray nữa.\nNhưng đầu máy hơi nước và gara đầu máy này lên tranh rất đẹp mà.」"
# 【木本】
# display as 木本
# JP: 「いや――さすがは絵描きさんですな」
1634 = "「Chà——Quả không hổ danh họa sĩ.」"
# 【日々姫】
# display as 日日姬
# JP: 「え！？」
1650 = "「Hả!?」"
# monologue
# JP: その一言で、なにかのスイッチが切れたのだろう。\n日々姫は急に赤くなる。
2597 = "Chắc là câu nói đó đã chạm vào công tắc nào đó.\nHibiki đột nhiên đỏ mặt."
# 【日々姫】
# display as 日日姬
# JP: 「いえ、あの、私、絵描きってわけじゃなくて」
1528 = "「Không, dạ, cháu không phải là họa sĩ gì đâu ạ.」"
# 【木本】
# display as 木本
# JP: 「ああ、さっき聞きましたな。市長さんと秘書さんとは。\n美男美女ですけん、撮影かなんかかと思うてました」
1701 = "「À, lúc nãy tôi có nghe nói rồi. Là thị trưởng và thư ký nhỉ.\nTrai tài gái sắc thế này, tôi cứ tưởng là đang quay phim hay gì đó cơ.」"
# 【日々姫】
# display as 日日姬
# JP: 「び、美男美女……って――///」
1576 = "「Tr, trai tài gái sắc... sao——///」"
# 【双鉄】
# display as 雙鐵
# JP: 「こちらこそまさかでした。\n文庫森機関庫のＯＢの方にお声掛けいただけるとは」
1794 = "「Bọn cháu mới không ngờ tới đấy ạ.\nKhông ngờ lại được một cựu nhân viên của Gara đầu máy Bungomori bắt chuyện.」"
# monologue
# JP: いえば木本老技師は目を細め、\n機関庫隣の大きな施設へ目を走らせる。
2571 = "Vừa nói, lão kỹ sư Kimoto vừa nheo mắt lại,\nđưa mắt nhìn về phía cơ sở lớn cạnh gara đầu máy."
# 【木本】
# display as 木本
# JP: 「車両工場の方ばフル稼働ですけんねぇ。\n人手が足りんで、機関庫の方ば、ボランティアで」
1981 = "「Bên nhà máy chế tạo toa xe đang hoạt động hết công suất mà.\nThiếu nhân lực nên bên gara đầu máy này toàn là tình nguyện viên thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どこも似たようなものですね」
1894 = "「Ở đâu cũng giống nhau nhỉ.」"
# 【木本】
# display as 木本
# JP: 「[おひとよ,2]御一夜もですか」
1770 = "「Ohimitera cũng vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。ある程度の復線がなったとはいえ、\nまだまだ、ボランティアの方々に頼りっぱなしです」
1871 = "「Vâng. Tuy đã khôi phục tuyến được phần nào,\nnhưng vẫn phải phụ thuộc vào các tình nguyện viên rất nhiều ạ.」"
# 【木本】
# display as 木本
# JP: 「ワシなんぞは力に成れることが嬉しいですがの。\n[くるだい,1]来大鉄道の復活ば、夢ぇでしたけん」
1796 = "「Tôi thì rất vui vì có thể góp chút sức lực.\nSự hồi sinh của Đường sắt Kyudai là ước mơ của tôi mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
1668 = "「A.」"
# monologue
# JP: その一言を聞いた瞬間、\nゆるみ切ってた日々姫の頬が引き締まる。
2188 = "Khoảnh khắc nghe thấy câu nói đó,\nđôi má đang thả lỏng của Hibiki chợt căng lại."
# 【日々姫】
# display as 日日姬
# JP: 「[くるだい,1]来大鉄道について――全盛期の来大鉄道についての\nお話、聞かせてもらえませんか？」
1944 = "「Về Đường sắt Kyudai——Ông có thể kể cho cháu nghe\nvề thời kỳ hoàng kim của Đường sắt Kyudai được không ạ?」"
# 【木本】
# display as 木本
# JP: 「全盛期……ゆーのは、昔の……\n[ていてつ,1]帝鉄以前の来大鉄道についてのことですかの」
1570 = "「Thời kỳ hoàng kim... ý cô là, ngày xưa...\nLà về Đường sắt Kyudai thời trước \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい。それも含めて……もしお差し支えなければ、\n帝鉄時代の思い出とか、廃線後のこととかも」
1869 = "「Vâng. Bao gồm cả khoảng thời gian đó... nếu ông không phiền,\ncả những kỷ niệm thời Đường sắt Hoàng gia, hay sau khi bãi bỏ tuyến nữa ạ.」"
# 【木本】
# display as 木本
# JP: 「そらぁ構いませんが……\nなんでまた、そぎゃん昔話を」
2002 = "「Thì cũng không sao... nhưng mà\nsao tự dưng cô lại muốn nghe mấy chuyện cũ kỹ đó?」"
# 【日々姫】
# display as 日日姬
# JP: 「ええと――」
1996 = "「Dạ thì——」"
# monologue
# JP: 一瞬キュッと、日々姫の唇が引き絞られる。
2425 = "Trong một khoảnh khắc, Hibiki mím chặt môi lại."
# 【日々姫】
# display as 日日姬
# JP: 「リゾート食堂列車の計画……ご存知ですか？」
1779 = "「Kế hoạch tàu ăn uống nghỉ dưỡng... ông có biết không ạ?」"
# 【木本】
# display as 木本
# JP: 「そらぁ話題になっとりますけん。ある程度――\nおおまかなところは聞いとるふうに思いますがの」
1997 = "「Chuyện đó đang là chủ đề bàn tán mà. Ở một mức độ nào đó——\ntôi nghĩ là mình cũng đã nghe qua những nét chính rồi.」"
# monologue
# JP: ……木本老人が聞かせてくれるのは、\n現在リリースされている情報そのまま、詳細なものだ。
1194 = "……Những gì ông lão Kimoto kể lại,\nchi tiết y hệt như những thông tin đang được công bố hiện tại."
# monologue
# JP: ここまで細かく覚えて――つまりは期待してくれている。\nそう感じれば、僕の背筋さえ自然と伸びる。
2570 = "Nhớ chi tiết đến mức này——nghĩa là ông ấy đang rất kỳ vọng.\nCảm nhận được điều đó, sống lưng tôi cũng tự nhiên vươn thẳng."
# 【木本】
# display as 木本
# JP: 「どこまで需要があるかは正直わからんばってん、\n象徴として、良か計画かと思います」
2058 = "「Thành thật mà nói thì tôi không biết nhu cầu đến đâu,\nnhưng với tư cách là một biểu tượng, tôi nghĩ đây là một kế hoạch hay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「象徴ですか？」
1977 = "「Biểu tượng ạ?」"
# 【木本】
# display as 木本
# JP: 「レールば再び繋がり始めた――\nそいば示すには、長距離列車が一番ですけん」
2046 = "「Đường ray đã bắt đầu nối liền trở lại——\nĐể chứng minh điều đó, tàu chạy đường dài là thích hợp nhất.」"
# 【日々姫】
# display as 日日姬
# JP: 「ですよね！　やっぱり！！」
1752 = "「Đúng không ạ! Quả nhiên là vậy!!」"
# monologue
# JP: 勢い込んだ日々姫はしかし、\nすぐに姿勢をあらためなおす。
2423 = "Hibiki phấn khích thốt lên, nhưng\nngay lập tức điều chỉnh lại tư thế."
# 【日々姫】
# display as 日日姬
# JP: 「だから絶対に成功させたい。だけど今――\n私のせいで、計画が止まってしまってるんです」
1820 = "「Thế nên cháu nhất định muốn nó thành công. Nhưng bây giờ——\nVì cháu mà kế hoạch đang bị đình trệ.」"
# 【木本】
# display as 木本
# JP: 「市長さんのせいで？」
1724 = "「Vì thị trưởng sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「いいえ、市長としてではなく、デザイナーとしての\n私、右田日々姫のせいです」
1529 = "「Không, không phải với tư cách thị trưởng, mà là với tư cách nhà thiết kế\ncủa cháu, Migita Hibiki.」"
# monologue
# JP: 瞬間、老人が動きを止める。\n目を見開いたその頬が、みるみるうちに紅潮していく。
2536 = "Trong khoảnh khắc, ông lão khựng lại.\nĐôi mắt mở to, gò má ông nhanh chóng ửng đỏ."
# 【木本】
# display as 木本
# JP: 「[みぎたひびき,4]右田日々姫――いうたら、あの！　\nあ、あの、見事な客車デザインばされる右田先生ですか！」
1614 = "「Migita Hibiki——vậy là, cái đó! \nA, cái người đã thiết kế toa hành khách tuyệt đẹp đó, cô Migita sao!」"
# 【日々姫】
# display as 日日姬
# JP: 「ひえ！？　あ――えと、見事かどうかはともかく、\n客車デザインとかしてる、右田日々姫は私、です」
1629 = "「Hí!? A——ưm, tuyệt đẹp hay không thì cháu không dám nhận,\nnhưng người thiết kế toa hành khách, Migita Hibiki chính là cháu ạ.」"
# 【木本】
# display as 木本
# JP: 「あの右田先生が、市長さんもやっとられますか！\n何とお若い！　天は二物も三物も与えられましたなぁ」
2024 = "「Cô Migita đó mà lại còn làm cả thị trưởng nữa sao!\nTrẻ tuổi thế này! Ông trời đúng là ban cho cô hai ba tài năng cùng lúc nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「いえ、その……」
1527 = "「Dạ không, chuyện đó...」"
# monologue
# JP: 思わぬところ、完全に予想外のタイミングでの高評価。\n自分の仕事を認められる、それほど嬉しいことは無い。
2593 = "Một đánh giá cao đến từ nơi không ngờ tới, vào thời điểm hoàn toàn bất ngờ.\nĐược công nhận công việc của mình, không có gì vui sướng hơn thế."
# monologue
# JP: が、素直にそれを受け止められるだけの余裕が、\n今の日々姫の内側には、まだまだ育って無いようだ。
2210 = "Nhưng có vẻ như trong thâm tâm Hibiki hiện tại,\nvẫn chưa đủ chín chắn để có thể ngoan ngoãn đón nhận điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「[てんよ,1]天与の才なら、[こかつ,1]枯渇もし[がた]難いものでしょう。\nけれども今、そのデザインで苦しんでおりますので」
1736 = "「Nếu là tài năng trời ban thì chắc cũng khó mà cạn kiệt được.\nTuy nhiên hiện tại, cô ấy đang phải vật lộn với thiết kế đó ạ.」"
# 【木本】
# display as 木本
# JP: 「ああ……ああはい。\n確かにそぎゃん話でしたの」
1687 = "「A... à vâng.\nĐúng là lúc nãy đang nói chuyện đó nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうなんです。正直、デザインが難航していて、\nだから、お話を聞かせて欲しいんです」
1890 = "「Đúng vậy ạ. Thành thật mà nói thì việc thiết kế đang gặp khó khăn,\nthế nên cháu mới muốn nghe chuyện của ông.」"
# 【木本】
# display as 木本
# JP: 「デザインに……ワシんようなものの昔話ば、\nなんぼかでも、役にたちよるもんですかのう？」
1968 = "「Để thiết kế... chuyện xưa của một lão già như tôi,\nliệu có giúp ích được gì không đây?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい。\n私の場合は、想いを、デザインしたいですから」
1611 = "「Có ạ.\nVì cháu muốn thiết kế dựa trên những cảm xúc.」"
# monologue
# JP: みんなで作ったレイアウト――\nその経験は、大きく日々姫を成長させた。
2269 = "Sa bàn do mọi người cùng nhau làm ra——\nKinh nghiệm đó đã giúp Hibiki trưởng thành rất nhiều."
# monologue
# JP: 自らが“描く”その源を、\n日々姫は確かに、知ったのだ。
2437 = "Cội nguồn để bản thân \"vẽ\" ra,\nHibiki chắc chắn đã hiểu được."
# 【日々姫】
# display as 日日姬
# JP: 「だから、聞かせていただきたいんです。\n来大鉄道が、どれほど愛されていた鉄道なのかを」
1822 = "「Thế nên, cháu muốn nghe ông kể.\nRằng Đường sắt Kyudai đã từng là một tuyến đường sắt được yêu mến đến nhường nào.」"
# monologue
# JP: 日々姫の瞳が、もう一度、機関庫を中から眺め渡す。
2427 = "Đôi mắt của Hibiki, một lần nữa, đưa nhìn khắp bên trong gara đầu máy."
# monologue
# JP: これほどの設備を解体危機から救い続けた――\n無数の想いの痕跡を、探し出そうとするかのように。
2275 = "Như thể đang cố gắng tìm kiếm những dấu vết của vô số tâm tư——\nđã liên tục cứu vớt cơ sở đồ sộ này khỏi nguy cơ bị tháo dỡ."
# 【木本】
# display as 木本
# JP: 「そぎゃんこつでしたら。\nしかし……どこから話しましょうかのう」
1841 = "「Nếu là chuyện đó thì.\nNhưng mà... nên bắt đầu kể từ đâu đây nhỉ.」"
# monologue
# JP: 日々姫の想いが、きっと伝わったのだろう。\n木本老人の声が、ぐっと落ち着いたものになる。
2479 = "Tâm tư của Hibiki chắc chắn đã truyền đạt được rồi.\nGiọng của ông lão Kimoto trở nên trầm tĩnh hơn hẳn."
# 【木本】
# display as 木本
# JP: 「……帝鉄の始まりは、私設鉄道の買収からだった。\nゆー話は、ご存知ですかの」
1242 = "「...Sự khởi đầu của Đường sắt Hoàng gia là từ việc thu mua các tuyến đường sắt tư nhân.\nChuyện này, hai người có biết không?」"
# 【日々姫】
# display as 日日姬
# JP: 「その話はざらっと程度に勉強しました。\nだけど、詳しいこととかは全然」
1813 = "「Chuyện đó thì cháu có học qua loa rồi ạ.\nNhưng mà chi tiết thì cháu hoàn toàn không biết.」"
# 【木本】
# display as 木本
# JP: 「ほんなら、こん[くるだい,1]来大鉄道を例にあげましょう。\n来大鉄道の始まりは、ふたつの私設鉄道でした」
2027 = "「Vậy thì, hãy lấy tuyến Đường sắt Kyudai này làm ví dụ nhé.\nKhởi đầu của Đường sắt Kyudai là hai tuyến đường sắt tư nhân.」"
# monologue
# JP: [くるめ,1]来目と[ひた,1]肥田とを結ぶ、[きゅうひ,1]来肥鉄道。\n湯富院-大板を結ぶ、[とうだい,1]湯大鉄道。
2607 = "Đường sắt Kyuhi nối liền Kurume và Hita.\nĐường sắt Yudai nối liền Yufuin và Oita."
# monologue
# JP: ふたつの私設鉄道は、やがてともに文庫森まで延伸。\nのちに合併、ひとつの来大鉄道となる。
2596 = "Hai tuyến đường sắt tư nhân này sau đó cùng kéo dài đến Bungomori.\nRồi hợp nhất lại, trở thành một tuyến Đường sắt Kyudai."
# 【木本】
# display as 木本
# JP: 「合併した後は、そらあ栄えたもんでした。\n\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;ば、そん頃に作られた代物ですな」
1617 = "「Sau khi hợp nhất thì nó phát triển rực rỡ lắm.\n\\x%l扇形機関庫;#00ffc040;Gara đầu máy hình ngành%l;#; này cũng là thứ được xây dựng vào thời điểm đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。帝鉄発足前――\n私設鉄道の時代からのものだったのですか」
1655 = "「Chà. Từ trước khi Đường sắt Hoàng gia ra đời——\nTừ thời đại đường sắt tư nhân sao.」"
# 【木本】
# display as 木本
# JP: 「ですのう。やけん、[ぶんごもり,2]文庫森の誇りであり、\n何に代えても守るべきものになりよったとですわ」
1902 = "「Đúng vậy. Thế nên, nó là niềm tự hào của Bungomori,\nlà thứ mà chúng tôi phải bảo vệ bằng mọi giá.」"
# 【日々姫】
# display as 日日姬
# JP: 「栄えて、愛されて……それなのに、どうして」
1864 = "「Phát triển rực rỡ, được yêu mến... vậy mà, tại sao.」"
# monologue
# JP: 夢中になっているからだろう。\n日々姫の質問は率直すぎる。
2421 = "Chắc là do quá mải mê.\nCâu hỏi của Hibiki quá đỗi thẳng thắn."
# monologue
# JP: が、老人の答えはあくまで――静かなものだ。
2211 = "Nhưng, câu trả lời của ông lão vẫn vô cùng——bình thản."
# 【木本】
# display as 木本
# JP: 「帝鉄に強制買収されて、法に縛られるようになりました。\n経営の[なん]何もかんも自由にできんようなったとですよ」
1954 = "「Bị Đường sắt Hoàng gia cưỡng chế thu mua, và bị ràng buộc bởi pháp luật.\nMọi thứ trong kinh doanh đều không thể tự do làm theo ý mình nữa.」"
# monologue
# JP: \x%l明智;#00ffc040;明智%l;#;三十九年。鉄道帝有法制定。布告。\n日ノ本帝有鉄道発足。
60 = "Năm \\x%l明智;#00ffc040;Meiji%l;#; thứ ba mươi chín. Đạo luật Đường sắt Hoàng gia được ban hành. Công bố.\nĐường sắt Hoàng gia Hinomoto chính thức ra đời."
# monologue
# JP: さすがにここは、僕らでも把握している歴史だ。
2595 = "Quả thực đến đây thì ngay cả chúng tôi cũng nắm được lịch sử này."
# 【日々姫】
# display as 日日姬
# JP: 「帝有化で……経営の自由度がなくなった、でしたか？」
1727 = "「Quốc hữu hóa... làm mất đi sự tự do trong kinh doanh sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「その辺も、うっすらとですが聞いたことがあります。\n運賃ひとつも、法改正なしには変えられなかったと」
2001 = "「Chuyện đó cháu cũng có nghe loáng thoáng rồi.\nNgay cả giá vé cũng không thể thay đổi nếu không sửa đổi luật.」"
# 【木本】
# display as 木本
# JP: 「ですの。そん法改正も帝都の都合だけで行われる。\nやけん、地方は皺寄せで、不合理の塊にされたとです」
1867 = "「Đúng vậy. Mà việc sửa đổi luật đó cũng chỉ được thực hiện theo sự thuận tiện của Đế đô.\nThế nên, địa phương phải gánh chịu hậu quả, biến thành một mớ hỗn độn bất hợp lý.」"
# monologue
# JP: 幹線でも地方路線でも同じでなければならない料金形態は\n採算路線と不採算路線との極端な二分化を発生させた。
2504 = "Cơ cấu giá vé bắt buộc phải giống nhau ở cả tuyến đường chính lẫn tuyến đường địa phương\nđã gây ra sự phân hóa cực đoan giữa tuyến đường có lãi và tuyến đường không có lãi."
# monologue
# JP: 不採算路線の予算切り詰めはサービスの低下を招き、\n発生した悪循環は、さらに赤字幅を拡大させた――
2553 = "Việc cắt giảm ngân sách của tuyến đường không có lãi dẫn đến chất lượng dịch vụ đi xuống,\nvòng luẩn quẩn xảy ra càng làm tăng thêm mức độ thâm hụt——"
# 【木本】
# display as 木本
# JP: 「特に旧[とうだい,1]湯大鉄道――湯大線は二時間に一本も\n列車の走らんごたるなり、誰も乗らんようなりました」
1877 = "「Đặc biệt là tuyến Đường sắt Yudai cũ——tuyến Yudai hai tiếng đồng hồ\ncũng không có nổi một chuyến tàu chạy, chẳng còn ai đi nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「それじゃ、みなさんの交通はどうなったんですか？」
2033 = "「Vậy thì, giao thông của mọi người tính sao ạ?」"
# 【木本】
# display as 木本
# JP: 「モータリゼーション。ガソリン自動車の普及ば\n急速に進みましたの。で、鉄道はますます廃れる」
2062 = "「Cơ giới hóa. Sự phổ biến của ô tô chạy xăng\nđã diễn ra nhanh chóng. Thế là, đường sắt ngày càng lụi tàn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その結果……\n大廃線のその前に、廃線となったわけですか」
1878 = "「Kết quả là...\nNó đã bị bãi bỏ tuyến ngay từ trước cuộc Đại bãi bỏ sao ạ?」"
# 【木本】
# display as 木本
# JP: 「[おおいた,1]大板-博太ば、もう[ぶんが,1]豊向本線で結ばれとりましたけん。\nすっぱり、綺麗に切り捨てられましたの」
1856 = "「Oita và Hakata đã được nối liền bởi Tuyến chính Hoko rồi mà.\nThế nên nó bị vứt bỏ một cách gọn gàng, dứt khoát.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうなってしまったのに――」
1862 = "「Đã trở nên như vậy rồi mà——」"
# monologue
# JP: 日々姫は一瞬、言葉を飲み込む。
2450 = "Hibiki nuốt lời vào trong một thoáng."
# 【日々姫】
# display as 日日姬
# JP: 「それでも、文庫森機関庫を守って――\n大事にし続けたのは、どうしてですか？」
1909 = "「Dù vậy, tại sao mọi người vẫn bảo vệ Gara đầu máy Bungomori——\nvà tiếp tục trân trọng nó ạ?」"
# monologue
# JP: 日々姫の疑問に、僕も頷く。\nモータリゼーションに続く、エアクラの台頭。
2329 = "Tôi cũng gật gù trước thắc mắc của Hibiki.\nTiếp nối cơ giới hóa là sự trỗi dậy của Aircra."
# monologue
# JP: 鉄道復活を期待できる余地など恐らく、\nどこにもなかったと思われるのに――
2458 = "Có lẽ chẳng còn nơi nào có thể kỳ vọng vào sự hồi sinh của đường sắt nữa,\nvậy mà——"
# 【木本】
# display as 木本
# JP: 「期待はずれな答えかもしれませんがの――\n正直いうたら、“他になーんもなかったけん”ですの」
1810 = "「Có thể câu trả lời này sẽ làm cô thất vọng đấy——\nNói thật thì, là vì \"chẳng còn gì khác nữa\".」"
# 【日々姫】
# display as 日日姬
# JP: 「他になにも」
1722 = "「Chẳng còn gì khác.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無かったから」
1534 = "「Vì không có gì.」"
# 【木本】
# display as 木本
# JP: 「[ゆふいん,2]湯富院のごたる温泉があるわけでもなし、\n大板や[ひた,1]肥田のごたる大都市でなし」
2007 = "「Không có suối nước nóng như Yufuin,\ncũng chẳng phải đô thị lớn như Oita hay Hita.」"
# monologue
# JP: そういう老人の口調から、けれども強い誇りを感じる。
2248 = "Từ giọng điệu đó của ông lão, tôi cảm nhận được một niềm tự hào mãnh liệt."
# 【木本】
# display as 木本
# JP: 「[せんけい,1]扇形機関庫ば、文庫森に初めてできた、\n大きな大きなシンボルでしたけん――失くせんですわ」
1833 = "「\\x%l扇形機関庫;#00ffc040;Gara đầu máy hình ngành%l;#; là biểu tượng vô cùng lớn lao\nlần đầu tiên xuất hiện ở Bungomori——không thể để mất được.」"
# 【日々姫】
# display as 日日姬
# JP: 「シンボル――\nみなさんのこころを、きっとひとつに重ねた」
1999 = "「Biểu tượng——\nChắc chắn đã gắn kết trái tim của mọi người lại với nhau.」"
# 【木本】
# display as 木本
# JP: 「かもしれんですの」
1969 = "「Có lẽ là vậy.」"
# monologue
# JP: 穏やかに、木本老人は微笑んで、\n励ますように――日々姫を、僕をじゅんじゅんに見る。
2481 = "Ông lão Kimoto mỉm cười hiền từ,\nnhìn Hibiki, rồi nhìn tôi một cách ân cần——như để khích lệ."
# 【木本】
# display as 木本
# JP: 「誰かにそぎゃん思われるような列車になれば――\nリゾート食堂列車ば、きっとうまいこと走りますけん」
1961 = "「Nếu nó trở thành một chuyến tàu khiến ai đó nghĩ như vậy——\nTàu ăn uống nghỉ dưỡng chắc chắn sẽ hoạt động trơn tru thôi.」"
# monologue
# JP: 大きく、強く、日々姫が頷く。
2455 = "Hibiki gật đầu thật mạnh, thật dứt khoát."
# 【日々姫】
# display as 日日姬
# JP: 「はい――貴重なお話、\n聞かせてもらえて嬉しかったです」
1873 = "「Vâng——cháu rất vui vì đã được nghe\ncâu chuyện quý giá này ạ.」"
# 【木本】
# display as 木本
# JP: 「なーんもですわ。こぎゃん話でよければいつでも\n――ああ、そう。貴重な話いうたら」
1898 = "「Không có gì đâu. Nếu cô thích mấy chuyện này thì lúc nào cũng được\n——À, phải rồi. Nhắc đến chuyện quý giá.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい？」
1775 = "「Dạ?」"
# 【木本】
# display as 木本
# JP: 「『[うんぜん,1]雲仙』いうレストランのシェフが、\nちくと食堂車に詳しい男ですけん。紹介しましょう」
1881 = "「Đầu bếp của nhà hàng tên là 『Unzen』\nlà một người khá am hiểu về toa ăn đấy. Để tôi giới thiệu cho nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「食堂車――\n食堂車っ！　ハードル高すぎ～～っ！！」
2065 = "「Toa ăn——\nToa ăn á! Rào cản cao quá đi mất~~!!」"
# monologue
# JP: （ばちゃばちゃっ！）
2675 = "（Bì bõm!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1635 = "「Ây da.」"
# monologue
# JP: いくら貸し切り露天とはいえ、\n今のはいささかはしゃぎすぎだ。
2628 = "Dù là suối nước nóng lộ thiên bao trọn gói đi chăng nữa,\nthì lúc nãy cũng hơi phấn khích quá đà rồi."
# monologue
# JP: 恋人としてでも秘書としてでも無く、\n兄として――、一言注意をせねばなるまい。
2344 = "Không phải với tư cách người yêu hay thư ký,\nmà là với tư cách anh trai——tôi phải nhắc nhở một câu mới được."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、お風呂マナーというものがあるだろう」
1855 = "「Hibiki, đi tắm cũng phải có phép tắc chứ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そいば大丈夫。\nちゃんと宿の人に確認したけん」
1684 = "「A, chuyện đó thì không sao đâu.\nEm đã xác nhận kỹ với người của nhà trọ rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確認！？」
1931 = "「Xác nhận!?」"
# 【日々姫】
# display as 日日姬
# JP: 「そうでなきゃ水着で温泉なんて入れんよー。\n私だって、日ノ本人やし」
1509 = "「Nếu không thì em đâu dám mặc đồ bơi vào suối nước nóng chứ.\nEm cũng là người Hinomoto mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うむ」
1653 = "「A... ừm.」"
# monologue
# JP: 言われてみれば、日々姫は水着だ。\n自分が裸でいることが、急に心細くなってくる。
2604 = "Nhắc mới nhớ, Hibiki đang mặc đồ bơi.\nViệc mình đang trần truồng bỗng nhiên khiến tôi cảm thấy bất an."
# 【双鉄】
# display as 雙鐵
# JP: 「何故……\nその、水着なのだ？」
2019 = "「Tại sao...\nừm, em lại mặc đồ bơi?」"
# 【日々姫】
# display as 日日姬
# JP: 「やっぱり他に使う機会なさそうやけん。\nそれに、このお宿、連泊でしょお？」
2017 = "「Quả nhiên là không có cơ hội nào khác để mặc.\nHơn nữa, chúng ta ở nhà trọ này mấy đêm liền đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1690 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「連泊やったら、ちょっとでも変化つけないと。\nわたしだって、にぃにぃに楽しんで欲しかけん」
1960 = "「Ở lại mấy đêm thì cũng phải thay đổi một chút chứ.\nEm cũng muốn anh hai được vui mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1597 = "「Ra là vậy.」"
# monologue
# JP: 日々姫の気持ちは素直に嬉しい。\nふつふつと湧いた喜びが――いや、ではなくて。
2448 = "Tôi thực sự rất vui trước tấm lòng của Hibiki.\nNiềm vui sướng trào dâng sùng sục——à không, không phải thế."
# 【双鉄】
# display as 雙鐵
# JP: 「マナーは水着の件ではない。\n足でバシャバシャ、湯を跳ね上げたことの方だ」
1816 = "「Phép tắc không phải là chuyện đồ bơi.\nMà là chuyện em dùng chân đập nước bì bõm, làm nước bắn tung tóe ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「え！？　あ――ごめんなさい。\nあの、焦っちゃってもやもやして、ついって感じで」
1652 = "「Hả!? A——em xin lỗi.\nChỉ là, em thấy sốt ruột và bồn chồn quá, nên lỡ...」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、気持ちはわかるがな」
1565 = "「Mà, anh cũng hiểu cảm giác đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「わかるでしょ？　にぃにも。\n食堂車の話……衝撃的やったもん」
1753 = "「Anh hai cũng hiểu đúng không?\nChuyện về toa ăn... thật sự quá sốc mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1690 = "「嗯」" 
# monologue
# JP: 紹介されて話を聞いた『雲仙』のご主人・[とちのき,1]栃木さんは、\n筋金入りの、元食堂車シェフだった。
2539 = "Người mà chúng tôi được giới thiệu và nghe chuyện là ông Tochigi, chủ nhà hàng 『Unzen』,\nmột cựu đầu bếp toa ăn chính hiệu."
# monologue
# JP: 食堂車誕生、ごく初期からの話は全て面白く――\nそれゆえ、あまりに強烈すぎた。
2222 = "Những câu chuyện từ những ngày đầu tiên toa ăn ra đời đều rất thú vị——\nChính vì thế mà nó lại càng gây ấn tượng mạnh mẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「まさかレンジに石炭を使っていたとはなぁ。\n料理を仕込む前、朝の三時に、まず火起こしからとは」
1899 = "「Không ngờ bếp lò lại dùng than đá đấy.\nTrước khi chuẩn bị nấu ăn, ba giờ sáng đã phải bắt đầu nhóm lửa rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「急停車のたび、油の煮えた鍋を床に置いたとか！\n包丁も全部床におろして、冷蔵庫のドア押さえるとか！」
1896 = "「Mỗi lần phanh gấp là phải đặt chảo dầu đang sôi xuống sàn nhà!\nDao cũng phải để hết xuống sàn, rồi còn phải giữ chặt cửa tủ lạnh nữa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば当然のことではあるし――\n今でも確かに、そうした対策は必要だろうな」
1540 = "「Nghe kể thì cũng thấy hiển nhiên——\nNgay cả bây giờ, những biện pháp phòng ngừa đó chắc chắn vẫn cần thiết nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「厨房内の事故防止とかそこまで頭まわってなくて！\n広さ、もっと余裕持たせないと絶対危ない」
1805 = "「Em chưa nghĩ đến việc phòng chống tai nạn trong nhà bếp đến mức đó!\nPhải chừa thêm không gian rộng rãi hơn, nếu không thì nguy hiểm lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……実際、かなり厳しいことも言われてしまったな」
1236 = "「……Thực tế thì, ông ấy cũng nói những lời khá gay gắt nhỉ.」"
# monologue
# JP: 栃木さんはおしゃべりで親切だったが――\nいかにも九洲の男らしく、言葉を飾りはしなかった。
2486 = "Ông Tochigi là người hay nói và tốt bụng——\nNhưng đúng chất đàn ông Kyushu, ông ấy không hề vòng vo."
# 【日々姫】
# display as 日日姬
# JP: 「『そぎゃんこつも知らんと、こん大廃線の時代に、\n食堂車を復活させる、いいよるか！』」
1217 = "「『Đến mấy chuyện đó còn không biết, mà lại đòi hồi sinh toa ăn\ntrong cái thời đại Đại bãi bỏ này sao!』」"
# monologue
# JP: 驚きと、呆れと、笑いと、応援とが混じったような口調を、\n日々姫は、かなり正確に真似て見せる。
2443 = "Hibiki bắt chước lại giọng điệu pha trộn giữa sự ngạc nhiên, cạn lời,\nbuồn cười và khích lệ đó một cách khá chính xác."
# monologue
# JP: ……それだけ、印象に強く残ったということだろう。\n確かに、あれは強烈だった。
1203 = "……Chắc hẳn điều đó đã để lại ấn tượng rất sâu sắc.\nQuả thực, lời nói đó rất mạnh mẽ."
# 【日々姫】
# display as 日日姬
# JP: 「あげにいわれても、仕方なかとよ。\n私達、ぜーんぜん調べが足りとらんかったけん」
1956 = "「Bị nói thế cũng đành chịu thôi.\nVì chúng ta tìm hiểu chưa hề đủ chút nào mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「仕方なかろう。食堂車関連の文献は乏しかったし……\n頼みの永山夫人も、ここまでの話は知らなかったゆえ」
1900 = "「Đành chịu thôi. Tài liệu liên quan đến toa ăn rất khan hiếm...\nMà phu nhân Nagayama mà chúng ta trông cậy cũng không biết đến mức này.」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん、気をつければわたしたちでも気づけてた。\n――永山夫人も、食堂車の話は聞かせてくれてたし」
1523 = "「Không đâu, nếu cẩn thận thì chúng ta cũng có thể nhận ra.\n——Phu nhân Nagayama cũng đã kể cho chúng ta nghe chuyện về toa ăn mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1704 = "「Hửm?」"
# 【日々姫】
# display as 日日姬
# JP: 「覚えとらんと？　食事ばテーブルに乗ってるとき、\n圧縮空気の抜ける音したら――」
1553 = "「Anh không nhớ sao? Khi đồ ăn đang dọn trên bàn,\nmà nghe thấy tiếng khí nén xì ra thì——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　『すぐにお皿を押さえてください！』か。\nあれは確かに勉強になった」
1671 = "「A! 『Hãy giữ đĩa lại ngay lập tức!』 đúng không.\nCái đó đúng là một bài học bổ ích.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうしなければ料理も何も床に落ちるって――\n理解したのに、厨房内まで私、想像できてなくって」
1510 = "「Nếu không làm vậy thì thức ăn sẽ rơi hết xuống sàn——\nEm đã hiểu điều đó, vậy mà lại không tưởng tượng ra được tình hình bên trong nhà bếp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1663 = "「Hừm.」"
# monologue
# JP: 必要以上に自らを責める、悪い日々姫が出ようとしている。\nそう感じるから、無理には弱音を封じ込めない。
2446 = "Một Hibiki tồi tệ, tự trách mình quá mức cần thiết, sắp xuất hiện rồi.\nCảm nhận được điều đó, tôi không ép con bé phải kìm nén sự yếu đuối."
# 【双鉄】
# display as 雙鐵
# JP: 「想像できなかったのは僕も同じだ。\nだが、それはさほど大きな問題ではあるまいよ」
1788 = "「Anh cũng đâu có tưởng tượng ra được.\nNhưng mà, đó đâu phải là vấn đề gì to tát lắm đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 1641 = "「哎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「なんのため、チェックや会議が存在するのだ。\n見落としがあっても、どこかできっと、潰してもらえた」
1556 = "「Kiểm tra và họp hành tồn tại để làm gì chứ.\nDù có sai sót, chắc chắn sẽ có người chỉ ra và khắc phục được ở đâu đó thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1665 = "「啊……」" 
# 【双鉄】
# display as 雙鐵
# JP: 「いまはまだ、デザインの最初期の段階だ。\n見落としや不備が無い方がおかしいだろう」
1564 = "「Bây giờ vẫn chỉ là giai đoạn đầu tiên của việc thiết kế.\nKhông có sai sót hay thiếu sót mới là lạ đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「……うん」
1231 = "「……Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「むしろ、これほどに早く、重大な見落としを発見できた。\nそれだけでも、今回の視察の大きな成果と考えられる」
1949 = "「Ngược lại, phát hiện ra sai sót nghiêm trọng sớm như vậy.\nChỉ riêng điều đó thôi cũng có thể coi là thành quả lớn của chuyến thị sát lần này rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
1692 = "「Vâng!」"
# monologue
# JP: 納得をして切り替えることができたのだろう。\n日々姫がほわっと、やわらかになる。
2511 = "Có lẽ con bé đã hiểu và thay đổi suy nghĩ.\nHibiki trở nên mềm mỏng, nhẹ nhõm hơn."
# 【日々姫】
# display as 日日姬
# JP: 「でも……やっぱり時間、もっと上手に使わないと。\nデザインの下調べ、全然足りてなかったのは確かだし」
1518 = "「Nhưng mà... quả nhiên là phải sử dụng thời gian khéo léo hơn mới được.\nViệc tìm hiểu trước để thiết kế rõ ràng là chưa đủ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな。だが――」
1559 = "「Có thể là vậy. Nhưng——」"
# monologue
# JP: 日々姫は既に、種を見つけた。\nならばここから考えるべきは、その育て方の問題だ。
2433 = "Hibiki đã tìm thấy hạt giống rồi.\nVậy thì từ giờ trở đi, điều cần suy nghĩ là vấn đề nuôi dưỡng nó."
# 【双鉄】
# display as 雙鐵
# JP: 「今回の旅行で、視察で、きっと方針も見いだせるさ。\n限られた時間で、必要なことをよりよく学ぶための」
1550 = "「Chuyến du lịch này, chuyến thị sát này, chắc chắn sẽ giúp em tìm ra phương hướng thôi.\nĐể học hỏi những điều cần thiết một cách tốt hơn trong khoảng thời gian có hạn.」"
# 【日々姫】
# display as 日日姬
# JP: 「そう――かな」
1925 = "「Vậy——sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そのためにも、必要となるのはメリハリだ。\n休むべきときは休み、遊ぶべきときにはしっかり遊べ」
1689 = "「Ừ. Để làm được điều đó, sự phân minh là rất cần thiết.\nLúc nào cần nghỉ thì nghỉ, lúc nào cần chơi thì phải chơi cho đã.」"
# 【日々姫】
# display as 日日姬
# JP: 「遊び――」
1914 = "「Chơi——」"
# monologue
# JP: 僕の言葉に、日々姫は残念そうな顔になる。
2543 = "Nghe tôi nói, khuôn mặt Hibiki lộ vẻ tiếc nuối."
# 【日々姫】
# display as 日日姬
# JP: 「遊ぶチャンス……\nフリーな旅行日、今日だけだったのに」
1918 = "「Cơ hội đi chơi...\nNgày du lịch tự do, chỉ có mỗi hôm nay thôi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さっきもいったが、僕は十分楽しんだ。\n遊べていないのは、日々姫だけだぞ？」
1798 = "「Lúc nãy anh cũng nói rồi, anh đã chơi rất vui.\nNgười chưa được chơi chỉ có mỗi Hibiki thôi đấy?」"
# 【日々姫】
# display as 日日姬
# JP: 「遊び……今からでも出来る遊び――\nにぃにと、遊ぶ――あっ！」
1916 = "「Trò chơi... trò chơi có thể chơi ngay bây giờ——\nChơi với anh hai——a!」"
# monologue
# JP: 日々姫が笑う。あどけなく。\n小さな頃の日々姫が笑顔に混じってる。
2456 = "Hibiki mỉm cười. Thật ngây thơ.\nNụ cười ấy mang theo bóng dáng của Hibiki lúc còn nhỏ."
# 【日々姫】
# display as 日日姬
# JP: 「あのね？　にぃに。\nこどもっぽいって笑わんといてね？」
1817 = "「Này nhé? Anh hai.\nĐừng có cười chê là trẻ con đấy nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は笑わん。\n日々姫の遊びを笑ったことなど、一度とて無い」
1786 = "「Anh không cười đâu.\nAnh chưa từng cười nhạo trò chơi của Hibiki bao giờ cả.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1692 = "「嗯！」" 
# monologue
# JP: （じゃぶん）
2676 = "（Ào）"
# monologue
# JP: 湯船の中、\nいきなり日々姫は僕に背中を向けてくる。
2438 = "Trong bồn tắm,\nHibiki đột nhiên quay lưng lại với tôi."
# 【日々姫】
# display as 日日姬
# JP: 「あのねあのね、私ずうっと\nにぃにといっしょにお絵かきしたくて」
1939 = "「Chuyện là chuyện là, em vẫn luôn\nmuốn cùng anh hai vẽ tranh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いっしょに……は、どうだ、楽しめるのか？\nあまりにも技量が違いすぎよう」
1506 = "「Cùng nhau... sao, có vui được không đây?\nTrình độ của hai đứa khác biệt quá lớn mà.」"
# monologue
# JP: プロとアマチュア。\n余りに格差が大きすぎては“共に遊ぶ”は成立しない。
2302 = "Chuyên nghiệp và nghiệp dư.\nSự chênh lệch quá lớn thì không thể gọi là \"cùng chơi\" được."
# monologue
# JP: “遊ばせてやる”も性格次第では楽しかろうが、\n日々姫がそれを楽しめるとは思えない。
2472 = "\"Cho chơi cùng\" thì tùy tính cách cũng có thể thấy vui,\nnhưng tôi không nghĩ Hibiki sẽ thích thú với điều đó."
# 【日々姫】
# display as 日日姬
# JP: 「やけん。やけんね。\nお絵かき、背中あてっこで遊んでみたいの」
1827 = "「Thế nên. Thế nên nhé.\nEm muốn chơi trò vẽ tranh đoán chữ trên lưng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「背中あてっこ――文字を書いて当てあうやつか。\nあれを、なるほど。お絵かきでする」
1755 = "「Đoán chữ trên lưng——cái trò viết chữ rồi đoán ấy à.\nRa là vậy. Chơi bằng cách vẽ tranh.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 1692 = "「嗯！」" 
# monologue
# JP: ――心が完全に凍りついてた、あのころに、\nそれでも日々姫にせがまれるたび、付き合っていた。
1182 = "——Hồi đó, khi trái tim tôi hoàn toàn đóng băng,\ntôi vẫn chơi cùng Hibiki mỗi khi con bé nài nỉ."
# monologue
# JP: （楽しかった……という記憶は無いが）
2702 = "（Tuy không có ký ức gì gọi là... vui vẻ cả）"
# monologue
# JP: それでもこうして思い返せば、指先に、\n感じていたろうぬくもりが、ふんわり宿るような気もする。
2243 = "Nhưng khi nhớ lại thế này, tôi có cảm giác hơi ấm\nmà mình từng cảm nhận trên đầu ngón tay lại mơn man hiện về."
# 【双鉄】
# display as 雙鐵
# JP: 「何点を目指す？」
1567 = "「Mục tiêu là mấy điểm?」"
# 【日々姫】
# display as 日日姬
# JP: 「もちろん十点！！」
1921 = "「Tất nhiên là mười điểm!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
1532 = "「Đã rõ.」"
# monologue
# JP: 点数計算は簡単だ。\n当てたら一点、間違えたのなら０点となる。
2602 = "Tính điểm rất đơn giản.\nĐoán trúng được một điểm, đoán sai thì 0 điểm."
# monologue
# JP: ふたりで合計十点いけば、遊びはおしまい。\n勝ち負けもない、ごくごくたわいない遊び。
2231 = "Tổng điểm hai đứa đạt mười điểm là kết thúc trò chơi.\nMột trò chơi vô cùng đơn giản, chẳng có thắng thua."
# 【双鉄】
# display as 雙鐵
# JP: 「では、僕から描くぞ？」
2029 = "「Vậy, anh vẽ trước nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1690 = "「嗯」" 
# monologue
# JP: （くにゅんっ）
2681 = "（Nhoáy）"
# 【日々姫】
# display as 日日姬
# JP: 「んふふっ」
1691 = "「Ưm fufu.」"
# monologue
# JP: くすぐったそうな、幸せそうな、\n笑いごえさえあどけない。
2530 = "Nghe như đang nhột, lại có vẻ hạnh phúc,\nđến cả tiếng cười cũng thật ngây thơ."
# monologue
# JP: 指を動かす一ミリごとに、\n時計の針が戻る気がする。
2624 = "Mỗi một milimet ngón tay di chuyển,\ntôi lại có cảm giác kim đồng hồ đang quay ngược lại."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫せんせーを画用紙にするとは、\nなかなか恐れ多いことだが」
1948 = "「Lấy cô giáo Hibiki làm giấy vẽ thế này,\nđúng là thật mạo phạm quá.」"
# 【日々姫】
# display as 日日姬
# JP: 「うふふっ、めいっぱい描いてよかとよ？」
1627 = "「Ufufu, anh cứ vẽ thỏa thích đi nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「慣れてきたなら、そうしよう」
1935 = "「Khi nào quen rồi thì anh sẽ làm thế.」"
# monologue
# JP: だけれどこれは最初の一枚。\n文字のときなら、一文字で済ませる範囲のものだ。
2212 = "Nhưng đây mới là bức đầu tiên.\nNếu là chữ thì chỉ cần một chữ là xong."
# monologue
# JP: できるだけ簡単に、簡単に――
2354 = "Phải cố gắng vẽ thật đơn giản, thật đơn giản——"
# monologue
# JP: （くっ――くくっ）
2666 = "（Xoẹt——xoẹt xoẹt）"
# 【双鉄】
# display as 雙鐵
# JP: 「これでどうだ？」
2006 = "「Thế này thì sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　直線に――半円？？　ええ？\nなんだろ？　かまぼこ？」
1648 = "「Hả? Đường thẳng——nửa hình tròn?? Ể?\nGì vậy nhỉ? Chả cá kamaboko à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、形はかまぼこに近い。\nだが、今日の旅行のその後で、かまぼこは無かろう」
1767 = "「Đúng là hình dạng giống chả cá kamaboko thật.\nNhưng mà, sau chuyến du lịch hôm nay thì làm gì có chuyện là chả cá chứ.」"
# 【日々姫】
# display as 日日姬
# JP: 「今日の旅行？\n…………あっ！！　わかった！　トンネル！！」
1537 = "「Chuyến du lịch hôm nay?\n…………A!! Em biết rồi! Đường hầm!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「正解だ」
1717 = "「Chính xác.」"
# 【日々姫】
# display as 日日姬
# JP: 「じゃ、私の番ね！　にぃに、背中～」
2034 = "「Vậy, đến lượt em nhé! Anh hai, đưa lưng đây~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1740 = "「Ừ.」"
# monologue
# JP: （こしゅっ）
# 2681 = "（戳）" 
# 【日々姫】
# display as 日日姬
# JP: 「あ――にぃに、背中、凝ってる？」
1667 = "「A——anh hai, lưng anh bị cứng à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「自覚は無いが――\n多少は凝っているかもしれんな」
1814 = "「Anh không nhận ra——\nNhưng có thể là hơi cứng một chút.」"
# 【日々姫】
# display as 日日姬
# JP: 「そっか。じゃ、ちょっと強めにいくね？」
2005 = "「Vậy à. Vậy em ấn mạnh một chút nhé?」"
# monologue
# JP: （しゅーっ――しゅーっ――ぐい、ぐい、ぐい、ぐい）
2664 = "（Xoẹt——xoẹt——ấn, ấn, ấn, ấn）"
# 【双鉄】
# display as 雙鐵
# JP: 「簡単だな。線路――線路と枕木だ」
2000 = "「Dễ quá. Đường ray——đường ray và tà vẹt.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　にぃにだけ描こうと思ったのに、\nうっかりねぇねも描いちゃった！」
1673 = "「A! Em định chỉ vẽ anh hai thôi,\nai dè lỡ tay vẽ luôn cả chị hai rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「双鉄だけでは正解は難しかったろう。\n枕木のおかげで、線路だとわかったようなものだ」
1585 = "「Nếu chỉ có mỗi Soutetsu thì khó mà đoán đúng được.\nNhờ có tà vẹt nên anh mới nhận ra là đường ray đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「むぅ～～っ」
1664 = "「Ưm~~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにをむくれる。\nそら、背中を貸せ」
1574 = "「Phồng má cái gì chứ.\nNào, đưa lưng đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「はぁい」
1926 = "「Vâng ạ.」"
# monologue
# JP: この流れなら、次に描くべきは決まっているが、\nさていったい、どのように絵にするべきなのか……
2367 = "Theo đà này thì tôi đã quyết định được hình tiếp theo sẽ vẽ gì rồi,\nnhưng rốt cuộc nên vẽ thế nào đây..."
# monologue
# JP: （くるっ――ぐーーっ、ちょんちょん）
2697 = "（Xoay——kéo——chấm chấm）"
# 【日々姫】
# display as 日日姬
# JP: 「え？　なに？　ちっちゃな丸に、ヒモに――矢印？\nあ！　わかった！　『汽笛！！！』」
1643 = "「Hả? Gì vậy? Một vòng tròn nhỏ, sợi dây——mũi tên?\nA! Em biết rồi! 『Còi hơi nước!!!』」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。汽笛が響くその瞬間だ」
1901 = "「Đúng vậy. Khoảnh khắc tiếng còi hơi nước vang lên.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへ～っ！ えへへ～っ！　\n“ひびき”ば、描いてくれたとねっ！！」
1713 = "「Ê he~! Ê he he~!\nAnh vẽ \"âm vang\" (Hibiki) cho em đó hả!!」"
# monologue
# JP: 『蛍光灯を消すところ』と誤認されても仕方ない。\nそんな拙い絵ではあるが、日々姫は理解してくれた。
2562 = "Bị hiểu nhầm thành 『Lúc tắt đèn huỳnh quang』 cũng là chuyện bình thường.\nBức tranh vụng về đến thế mà Hibiki vẫn hiểu được."
# monologue
# JP: これは――楽しい。\nお互いを思いあうことで、技術の未熟をおぎなえる。
2603 = "Trò này——vui thật.\nChỉ cần nghĩ về nhau, là có thể bù đắp được sự yếu kém về kỹ năng."
# monologue
# JP: （ああ……ひょっとしたら、\n幼い日々姫は無意識に……あるいは、本能的に）
2673 = "（A... biết đâu,\nHibiki hồi nhỏ trong vô thức... hoặc theo bản năng）"
# monologue
# JP: 心を閉ざす僕とこうして遊ぶことで、\n少しでも、寄り添おうとしてくれていたのか。
2282 = "Đã cố gắng sát cánh bên tôi dù chỉ một chút,\nbằng cách chơi đùa với một kẻ khép kín trái tim như tôi."
# monologue
# JP: そうと思えば、愛しさはさらにふくれあがる。\nもっと日々姫と近づきたいと、心底思う。
2326 = "Nghĩ vậy, tình cảm tôi dành cho con bé càng thêm dâng trào.\nTự đáy lòng, tôi muốn được gần gũi với Hibiki hơn nữa."
# 【日々姫】
# display as 日日姬
# JP: 「じゃ、今度はわたしの番～」
2038 = "「Vậy, lần này đến lượt em~」"
# monologue
# JP: ……蒸気機関車。\n寄り添う小さな女の子。
1201 = "……Đầu máy hơi nước.\nMột cô bé nhỏ nhắn đang nép mình bên cạnh."
# monologue
# JP: これでわからないわけがない。
2598 = "Thế này thì không thể nào không biết được."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、だ」
1865 = "「Là Hachiroku.」"
# 【日々姫】
# display as 日日姬
# JP: 「大正解～！！」
1748 = "「Chính xác~!!」"
# monologue
# JP: れいな。ポーレット。凪。ふかみ。稀咲。\n九点目。僕が描いた絵は当然――
2506 = "Reina. Paulette. Nagi. Fukami. Kisaki.\nĐiểm thứ chín. Bức tranh tôi vẽ tất nhiên là——"
# 【日々姫】
# display as 日日姬
# JP: 「ナビ！」
2072 = "「Navi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「正解。次がラストの一問だな」
1716 = "「Chính xác. Tiếp theo là câu hỏi cuối cùng rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、背中～」
2053 = "「Anh hai, đưa lưng đây~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1740 = "「好的」" 
# monologue
# JP: 少し、緊張してしまう。
2348 = "Tôi cảm thấy hơi hồi hộp."
# monologue
# JP: ここまでは、\n流れで正解できていたようなものではあるが――
2220 = "Đến đây thì,\nnhờ vào đà mà tôi đã có thể đoán đúng, nhưng——"
# monologue
# JP: （ここに来て何が出て来るか……\n全く予想もつかなくなってしまったからな）
2701 = "（Đến nước này thì không biết sẽ ra hình gì...\nHoàn toàn không thể đoán trước được nữa.）"
# 【日々姫】
# display as 日日姬
# JP: 「ちょこっと、ややこしか絵になるばってん」
2004 = "「Bức này sẽ hơi phức tạp một chút nha.」"
# monologue
# JP: （クルッ――す、すっ。くるっ――す――す）
2696 = "（Xoay——vẽ, vẽ. Xoay——vẽ——vẽ）"
# 【双鉄】
# display as 雙鐵
# JP: 「お、おお？」
1699 = "「Ô, ồ?」"
# monologue
# JP: 線が多い。今までとまるで比較にならない。\n円を描いて、たくさんの線。
2473 = "Nhiều nét quá. Không thể so sánh với từ trước đến giờ.\nVẽ vòng tròn, rồi rất nhiều nét."
# monologue
# JP: それがなんども繰り返される。
2542 = "Và cứ lặp đi lặp lại như vậy."
# monologue
# JP: （パターン、か？　いち、に、さん、し――）
2682 = "（Là một khuôn mẫu sao? Một, hai, ba, bốn——）"
# monologue
# JP: ひとつひとつは大きくない。\nパターンは確かに見られるようだ。
2312 = "Từng hình một không lớn lắm.\nQuả thực có vẻ như là một khuôn mẫu."
# monologue
# JP: ひとつひとつ、細かな部分の差はあれど――
2626 = "Từng hình một, dù có sự khác biệt ở những chi tiết nhỏ——"
# monologue
# JP: （ご――ろく――なな――はち――きゅう――む？）
2707 = "（Năm——sáu——bảy——tám——chín——hửm?）"
# monologue
# JP: ここでひとつ、大きくはずれたものがくる。\nいままでの規則的なパターンを離れ、少し上へと。
2599 = "Đến đây có một hình lệch hẳn ra.\nThoát khỏi khuôn mẫu có quy tắc từ trước đến giờ, nằm hơi chếch lên trên."
# monologue
# JP: （飛行機――なら、これはナビか。\nそして、いままでの九は、恐らく――）
2703 = "（Máy bay——vậy thì đây là Navi sao.\nVà chín hình từ nãy đến giờ, có lẽ là——）"
# monologue
# JP: 僕も含めて、九人の人。\nそれを見守るようなナビ。
2239 = "Bao gồm cả tôi, là chín người.\nVà Navi như đang dõi theo."
# monologue
# JP: （しゅーーーーーーーーっ――ぐるーーーーーっ）
2662 = "（Xoẹtーーーーーーーー——xoayーーーーー）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1658 = "「A!」"
# monologue
# JP: つながる。全てが。\n長い一本の輪によって。
2186 = "Kết nối lại. Tất cả mọi thứ.\nBằng một vòng tròn dài."
# 【双鉄】
# display as 雙鐵
# JP: 「僕らの全てが、つながっている。\nならばこれは――御一夜――そして、御一夜鉄道だ」
1792 = "「Tất cả chúng ta, đều được kết nối với nhau.\nVậy thì đây là——Ohimitera——và, Đường sắt Ohimitera.」"
# 【日々姫】
# display as 日日姬
# JP: 「大正解！　これで十点――わっ！？」
1747 = "「Chính xác! Vậy là được mười điểm——oá!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1659 = "「Ây da.」"
# monologue
# JP: 立ち上がり振り向きかけたところで、\n日々姫がよろめく。
2444 = "Vừa đứng lên định quay lại,\nthì Hibiki lảo đảo."
# monologue
# JP: 抱き止めた肌は、ぽかぽかだ。\nのぼせる寸前なのかもしれない。
2559 = "Làn da tôi ôm lấy đang nóng bừng.\nCó lẽ con bé sắp bị say nắng đến nơi rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「あがるか。おかげで楽しく遊べた」
1793 = "「Lên thôi. Nhờ em mà anh đã chơi rất vui.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　私も楽しかったぁ」
1696 = "「Vâng! Em cũng thấy vui lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なによりだ」
2025 = "「Vậy là tốt rồi.」"
# monologue
# JP: その上、二人で未来を描けた。
2217 = "Hơn nữa, hai đứa còn vẽ nên được tương lai."
# monologue
# JP: トンネルを抜け、僕らみんなで力を合わせて、\n更に先へと、笑顔で進む未来図を。
2259 = "Bức tranh tương lai nơi chúng tôi cùng nhau chung sức vượt qua đường hầm,\nvà mỉm cười tiến xa hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「……出来るさ、必ず。\n日々姫と僕と、みんななら」
1883 = "「……Sẽ làm được thôi, chắc chắn.\nNếu là Hibiki, tôi, và mọi người.」"
