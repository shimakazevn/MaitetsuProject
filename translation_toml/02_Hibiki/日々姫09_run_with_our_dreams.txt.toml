# monologue
# JP: 日々姫の言葉が、日々姫剥き出しの誓いなのだと、\n突き刺さるほどに伝わってくる。
2519 = "我非常清楚地感受到，日日姬現在所說的，就是她最直接的誓言。" 

# 【日々姫】
# display as 日日姬
