[script]
# lines: 394 
# 【れいな】
# display as 玲奈
# JP: 「ポーレットぉ。\nじんぜんしき、ってなんですかぁ？」
1999 = "「Chị Paulette ơi.\nJinzen-shiki, là gì vậy\nạ~?」"

# 【ポーレット】
# display as 波萊特
# JP: 「それはね？　れいな。神様じゃなくて、\n立会いの人たちに誓う、結婚式のこと」
2013 = "「Cái đó hả? Reina. Không phải thề trước\nthần linh,\nmà là lễ cưới thề trước những\nngười chứng kiến.」"

# 【ハチロク】
# display as 八六
# JP: 「人間の前、なので[じんぜんしき,2]人前式。神様に誓う結婚式は、\n[しんぜんしき,2]神前式、とよばれるようですね」
1825 = "「Vì thề trước mặt con người, nên gọi là lễ\ncưới [nhân tiền,2]trước mặt mọi người. Lễ\ncưới thề trước thần linh,\ncó vẻ được gọi\nlà lễ cưới [thần tiền,2]trước mặt thần\nlinh ạ.」"

# 【れいな】
# display as 玲奈
# JP: 「れいな、わかりましたぁ！\nだから、ガマダスで結婚式なんですねぇ」
2016 = "「Reina, hiểu rồi ạ~!\nVì thế nên mới tổ\nchức lễ cưới ở GAMADUS nhỉ~」"

# monologue
# JP: れいなの解釈は大正解だ。\n日々姫のたっての希望によっての人前式。
2645 = "Cách giải thích của Reina hoàn toàn chính\nxác.\nLễ cưới trước mặt mọi người là theo\nnguyện vọng tha thiết của Hibiki."

# monologue
# JP: ならば会場は、日々姫デザインの初めての建造物\n――このガマダス以外にはありえなかった。
2522 = "Nếu vậy thì địa điểm tổ chức, là công\ntrình kiến trúc đầu tiên do Hibiki thiết\nkế\n――Không thể là nơi nào khác ngoài\nGAMADUS này được."

# 【稀咲】
# display as 稀咲
# JP: 「少し意外だ。\nハチロクは、随分と結婚式に詳しいんだね？」
1921 = "「Hơi bất ngờ đấy.\nHachiroku lại rành về lễ\ncưới đến vậy sao?」"

# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄様と日々姫の晴れの日のことですから。\nわたくし、大いに勉強いたしました」
1793 = "「Vâng ạ. Vì đây là ngày trọng đại của ngài\nSoutetsu và Hibiki mà.\nNên em đã học hỏi\nrất nhiều ạ.」"

# monologue
# JP: 少し芝居がかった仕草で、ハチロクは小さく胸を張る。
2370 = "Với một cử chỉ hơi kịch một chút,\nHachiroku khẽ ưỡn ngực."

# 【ハチロク】
# display as 八六
# JP: 「ジューンブライド。サムシングフォー。うふふっ、\n素敵な縁起を詰め込んだ。今日はまことに佳き日ですね」
1695 = "「Cô dâu tháng Sáu. Something Four. Ư fufu,\nGói gọn những điềm lành tuyệt vời nhất.\nHôm nay quả thực là một ngày tốt lành ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1975 = "「Ừ.」"

# monologue
# JP: ……が、だ。\nしかし、だ。
2347 = "……Nhưng, mà.\nTuy nhiên, là."

# monologue
# JP: 小さなことかもしれないが、どうも気になる。
2600 = "Có thể chỉ là một chuyện nhỏ thôi, nhưng\ntôi cứ thấy bận tâm thế nào ấy."

# 【凪】
# display as 凪
# JP: 「ガマダスでやる結婚式ばおもしろそーばい！\n凪様も、真似してみてもよさそーばい！」
1831 = "「Tổ chức lễ cưới ở GAMADUS nghe có vẻ thú\nvị đó nha!\nNagi-sama đây có lẽ cũng nên\nbắt chước thử xem sao!」"

# 【ふかみ】
# display as 深美
# JP: 「ええっ！？　凪ちゃん相手いるの！？」
1756 = "「Hả!? Nagi có đối tượng rồi sao!?」"

# 【凪】
# display as 凪
# JP: 「そりゃあこれから見つけるとばーい」
2018 = "「Thì từ giờ sẽ đi tìm chứ sao nè~」"

# 【ふかみ】
# display as 深美
# JP: 「だよねぇ、よかったぁ」
1902 = "「Đúng vậy nhỉ, may quá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……なぁ、君たち」
1786 = "「A……Này, các em.」"

# monologue
# JP: 一声で、全員の視線が一挙に集まる。\n少し、なにか、気圧されるものを感じてしまう。
2511 = "Chỉ một tiếng gọi, ánh mắt của tất cả mọi\nngười lập tức đổ dồn về phía tôi.\nTôi cảm\nthấy hơi có chút gì đó áp lực."

# 【双鉄】
# display as 雙鐵
# JP: 「なぜ、こんなところにいるのだ」
1669 = "「Tại sao, mọi người lại ở đây.」"

# 【凪】
# display as 凪
# JP: 「そりゃ、みんながここにいるからばい」
1823 = "「Thì tại mọi người đều ở đây mà nè.」"

# 【れいな】
# display as 玲奈
# JP: 「みんながいるのは、\nそうてつさんがいるからですねぇ」
2061 = "「Mọi người ở đây,\nlà vì có anh Soutetsu ở\nđây đó ạ~」"

# 【ハチロク】
# display as 八六
# JP: 「と、いうことらしいですよ？　双鉄様」
1881 = "「Có vẻ là vậy đấy ạ? Ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや。うん――それは光栄であるのだが。\nしかし……」
1777 = "「A, không. Ừm――Anh rất vinh hạnh.\nNhưng\nmà……」"

# monologue
# JP: しかし、これから結婚式だ。\n式の主役は、僕ではなかろう。
2317 = "Nhưng mà, sắp tới là lễ cưới rồi.\nNhân vật\nchính của buổi lễ, đâu phải là tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしたちも、本当は日々姫ちゃんのところに\n行きたいんですけど」
1697 = "「Thực ra bọn em cũng muốn đến chỗ Hibiki\nlắm chứ ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だよな、それが普通――」
1978 = "「Đúng vậy nhỉ, thế mới là bình thường――」"

# monologue
# JP: 僕の気持ちを汲んでくれての一言に、\nけれども不安を感じてしまう。
2437 = "Chỉ một lời thấu hiểu tâm trạng của tôi,\nnhưng lại khiến tôi cảm thấy bất an."

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、何かあるのか？\n日々姫のところにいけない理由が」
1874 = "「Sao vậy, có chuyện gì à?\nLý do không thể\nđến chỗ Hibiki ấy.」"

# 【稀咲】
# display as 稀咲
# JP: 「双鉄は、新婦の控室を見てないのかい？」
2133 = "「Soutetsu chưa xem qua phòng chờ của cô\ndâu sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。挙式の前に見てしまうのも\nもったいないような気がしてな」
1790 = "「Ừ. Anh cảm thấy nếu xem trước khi cử hành\nhôn lễ\nthì hơi phí.」"

# 【ふかみ】
# display as 深美
# JP: 「わぁぁ」
1739 = "「Oa.」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、おしあわせですねぇ」
1738 = "「Ư fufu, hạnh phúc quá nhỉ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。幸せだ。が――それだけに大いに心配だ。\nいったいなにが――新婦の――日々姫の控室に」
1789 = "「Ừm. Hạnh phúc lắm. Nhưng――cũng chính vì\nthế mà anh đang cực kỳ lo lắng đây.\nRốt\ncuộc có chuyện gì――trong phòng chờ của cô\ndâu――của Hibiki vậy.」"

# 【ハチロク】
# display as 八六
# JP: 「日々姫の控室には――」
1957 = "「Trong phòng chờ của Hibiki có――」"

# monologue
# JP: ふわり、ハチロクが笑ってくれる。\n安心しろといわんばかりに。
2381 = "Hachiroku nở một nụ cười nhẹ nhàng.\nNhư\nmuốn nói với tôi rằng hãy yên tâm đi."

# 【ハチロク】
# display as 八六
# JP: 「日々姫と、真闇様とがいらっしゃるのです。\n他には、あのぬいぐるみ――くまくまだけで」
1960 = "「Có Hibiki và chị Mayami ạ.\nNgoài ra, chỉ\ncó con thú bông――Gấu Kuma thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1764 = "「A.」"

# monologue
# JP: 頷いている。
2475 = "Tôi gật gù."

# monologue
# JP: 部屋の様子を少し想像しただけで、\nこころに尊いなにかが満ちる。
2489 = "Chỉ mới tưởng tượng qua khung cảnh trong\nphòng thôi,\nmột cảm giác thiêng liêng nào\nđó đã dâng trào trong tim tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「……それは、[なんぴと,1]何人も立ち入れんな」
1393 = "「……Vậy thì, đúng là không ai có thể bước\nvào được rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「っていうか、双鉄くんこそ……\nなんで、ずっとこんなところで立ってるんです？」
1676 = "「Mà phải nói là, anh Soutetsu mới đúng\nấy……\nSao anh cứ đứng mãi ở chỗ này vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「単純に、控室的な居場所が無いから――だな。\nガマダスは、極端に閉鎖空間が少ない構造であるがゆえ」
1895 = "「Đơn giản là vì anh không có chỗ nào giống\nnhư phòng chờ để ở――thôi.\nBởi vì cấu trúc\ncủa GAMADUS có cực kỳ ít không gian khép\nkín.」"

# 【ふかみ】
# display as 深美
# JP: 「ああ、いわれてみたら……結婚式場として\n作られてるわけじゃないんですよね。です」
1815 = "「A, nghe anh nói mới để ý……Nơi này đâu\nphải được xây dựng\nđể làm nơi tổ chức lễ\ncưới đâu nhỉ. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なのだ。控室と使えそうなのは二箇所。で、一か所が日々姫の控室で、もう一か所が親族の控室となっている」
1974 = "「Là vậy đó. Chỉ có hai chỗ có thể dùng làm\nphòng chờ. Một chỗ là phòng chờ của\nHibiki, chỗ còn lại thì dùng làm phòng chờ\ncho người nhà rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
1761 = "「A……」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1796 = "「Ừm.」"

# monologue
# JP: ポーレットが想起したのは恐らくは、あの事故のこと――\n僕側に、式に招待できるような親族が殆ど無いことだろう。
2622 = "Điều mà Paulette nhớ lại có lẽ là, vụ tai\nnạn đó――\nVề phía tôi, hầu như không có\nngười thân nào có thể mời đến dự lễ cưới."

# monologue
# JP: そうした気遣いも嬉しいが、晴れの席だ、\nそこには触れずにこのまま話を進めてしまおう。
2496 = "Sự quan tâm đó cũng khiến tôi rất vui,\nnhưng đây là ngày trọng đại,\nthôi thì cứ\ntiếp tục câu chuyện mà không đả động đến\nchuyện đó vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「皆が知っているとおり、僕は右田の養子だ。\n[たいと,1]汰斗さんが僕を引き取ることに、親族は猛反対した」
1836 = "「Như mọi người đã biết, anh là con nuôi\ncủa nhà Migita.\nViệc ông Taito nhận nuôi\nanh, đã bị họ hàng phản đối kịch liệt.」"

# 【凪】
# display as 凪
# JP: 「そっか、にーさんの親族も日々ねーちゃんの親族も、\nおんなじ人たちとねー」
1854 = "「Ra vậy, họ hàng của anh hai và họ hàng\ncủa chị Hibiki,\nđều là cùng một nhóm người\nnhỉ~」"

# 【ふかみ】
# display as 深美
# JP: 「っ！！？」
1778 = "「!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのだ」
# 1975 = "「是啊」" 

# monologue
# JP: 『ちょ、凪ちゃん』と、ふかみが言えぬほどの発言。\nが、その率直さがありがたい。
2628 = "「Trong số những người đó, đến giờ vẫn có\nngười tránh mặt anh.\nVì vậy, việc anh ở\ntrong phòng chờ……cũng khiến anh cảm thấy\náy náy với họ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「その人達の中には、今も僕を避ける者もいる。\nゆえ、僕が控室に居るのも……彼らに悪い気がしてな」
2096 = "「Chẳng việc gì phải nể nang mấy người đó\nđâu nha!\nTất cả chúng ta cứ kéo nhau vào\nphòng chờ là xong chứ gì!!」"

# 【凪】
# display as 凪
# JP: 「そぎゃん奴らに遠慮するこたなかとばい！\nみんなで控室いってやりゃええばい！！」
2036 = "「Này! Nagi!!」"

# 【ふかみ】
# display as 深美
# JP: 「ちょっ！　凪ちゃん！！」
1781 = "「Không――Tạm gác lại chuyện tất cả cùng\nvào,\nchị cũng tán thành ý kiến của Nagi.」"

# 【稀咲】
# display as 稀咲
# JP: 「いや――みんなで、という点は置いておき、\nボクも、凪くんに賛成だ」
1633 = "「Hảảả!? Đợi đã, Kisaki.\nLàm vậy thì, anh\nSoutetsu――Đã cất công tổ chức lễ cưới mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「えええ！？　待って、稀咲。\nそんなの、双鉄くん――せっかくの結婚式なのに」
1752 = "「Chính vì là lễ cưới đấy. Những họ hàng\nđến dự hôm nay,\nnói cách khác, cậu nên xác\nđịnh rõ họ là những đối tác làm ăn không\nthể dứt bỏ.」"

# 【稀咲】
# display as 稀咲
# JP: 「結婚式だからこそだよ。ここに来るような親族は、\nいわば、切っても切れない取引先だと割り切るべきだ」
1993 = "「A!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1768 = "「A!」"

# monologue
# JP: 言われた瞬間、頷いている。
2303 = "Khoảnh khắc nghe những lời đó, tôi gật gù\nđồng tình."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……そうか、取引先か」
1966 = "「Ra là vậy……Thì ra, là đối tác làm ăn\nsao.」"

# monologue
# JP: 『貰われてきた子である僕の、貰い先の親族』という\nややこしい関係ゆえに、付き合い方に迷っていた。が――
2412 = "「Ra là vậy……Thì ra, là đối tác làm ăn\nsao.」"

# monologue
# JP: 稀咲の言葉で、整頓できた。\nこれから彼らは、『妻の親族』に変わるのだ。
2319 = "Với mối quan hệ rắc rối 『Tôi là con nuôi,\ncòn họ là họ hàng của gia đình nhận nuôi\ntôi』,\ntôi đã từng phân vân không biết nên\ncư xử thế nào. Nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「……彼らと良好な関係を築けたのなら、\n将来的なリスクを、日々姫の負担を軽減できるのか」
1391 = "「……Nếu có thể xây dựng mối quan hệ tốt đẹp\nvới họ,\nthì có thể giảm thiểu những rủi ro\ntrong tương lai, cũng như gánh nặng cho\nHibiki sao.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。例えそこまでが無理だとしても、\n双鉄がきちんと筋を通すことの意味は小さくない」
1853 = "「Đúng vậy. Cho dù không thể làm đến mức\nđó,\nnhưng việc Soutetsu cư xử đúng mực\ncũng mang ý nghĩa không hề nhỏ đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。『あの若者は礼儀正しい』という印象を\n周囲に与えれば、それもまたひとつの防壁となるわけか」
1969 = "「Ra là vậy. Nếu tạo được ấn tượng 『Cậu\nthanh niên đó rất lễ phép』\nvới những người\nxung quanh, thì đó cũng sẽ trở thành một\ntấm khiên bảo vệ nhỉ.」"

# 【凪】
# display as 凪
# JP: 「防壁、ってなにばい？」
2118 = "「Tấm khiên bảo vệ, là sao vậy nè?」"

# 【ふかみ】
# display as 深美
# JP: 「守るための壁のこと。双鉄おにいさん。\n日々姫さんのこと、守ろうっていま相談してるの」
1860 = "「Là bức tường để bảo vệ ấy. Anh Soutetsu.\nĐang bàn cách để bảo vệ chị Hibiki đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだが――\n僕が守ろうとしているのは、日々姫一人だけではない」
1681 = "「Đúng là vậy nhưng――\nNgười mà anh muốn bảo\nvệ, không chỉ có một mình Hibiki.」"

# monologue
# JP: 近すぎて。あまりに長く一緒にいすぎて、\nどこかボヤけてしまってた。
2719 = "Vì quá gần gũi. Vì ở bên nhau quá lâu,\nnên\nranh giới ở đâu đó đã trở nên mờ nhạt."

# monologue
# JP: だが、そうなのだ。\n結婚するということは――
2315 = "Nhưng, sự thật là vậy.\nKết hôn có nghĩa\nlà――"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫を守ることは即ち、僕自身を守ることだ。\n僕らはこれから、家庭を持つのだから」
1685 = "「Bảo vệ Hibiki cũng chính là bảo vệ bản\nthân anh.\nBởi vì từ nay về sau, chúng ta\nsẽ có một gia đình.」"

# 【ポーレット】
# display as 波萊特
# JP: 「家庭」
1631 = "「Gia đình.」"

# 【双鉄】
# display as 雙鐵
# JP: 「避けられてるのなんのと言っている場合ではない。\nやるべきと確信できたことゆえ、すぐにもやろう」
2017 = "「Bây giờ không phải lúc để bận tâm chuyện\nbị tránh mặt hay gì nữa.\nVì đã tin chắc đó\nlà việc cần làm, nên anh sẽ đi làm ngay.」"

# monologue
# JP: 仕事であれば、当然のこと。\nまして家族のことであるなら、仕事以上に大切だ。
2550 = "Nếu là công việc, thì đó là điều đương\nnhiên.\nHuống hồ là chuyện gia đình, thì\nlại càng quan trọng hơn cả công việc."

# 【れいな】
# display as 玲奈
# JP: 「ふわぁ。そうてつさん、かーっこいいですぅ」
1741 = "「Oa. Anh Soutetsu, ngầu quá đi ạ~」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。どうぞ、ご武運を」
2130 = "「Ngài Soutetsu. Chúc ngài may mắn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああいや。行くには行くが、まだ早い。\nここでこうして立っているのには、もうひとつ理由が」
1635 = "「A không. Đi thì anh sẽ đi, nhưng vẫn còn\nsớm.\nAnh đứng đây thế này, là vì còn một\nlý do nữa.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「大変おまたせいたしました、双鉄様」
2131 = "「Xin lỗi vì đã để ngài phải đợi lâu, ngài\nSoutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ナビ」
2145 = "「Navi.」"

# monologue
# JP: 上空を見る。\nナビがゆったりと旋回している。
2512 = "Tôi nhìn lên bầu trời.\nNavi đang thong thả\nbay lượn."

# monologue
# JP: その直下には――
2413 = "Ngay bên dưới nó là――"

# 【ふかみ】
# display as 深美
# JP: 「おじいちゃんのトラック！？」
2010 = "「Xe tải của ông nội!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、早瀬さんたちに運んでいただいたのか」
1811 = "「A, là ông Hayase và mọi người đã vận\nchuyển đến giúp sao.」"

# 【ハチロク】
# display as 八六
# JP: 「運ぶ……何をでございますか？」
2103 = "「Vận chuyển……thứ gì vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「人前式になった理由さ。日々姫の強い希望はふたつ。\nウェディングドレスを着ることと」
1862 = "「Đó là lý do chọn lễ cưới trước mặt mọi\nngười. Hibiki có hai nguyện vọng tha\nthiết.\nMột là được mặc váy cưới, và hai\nlà.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様。それ以上は、どうぞ式場で、実際に」
2128 = "「Ngài Soutetsu. Phần còn lại, xin hãy để\nmọi người tận mắt chứng kiến tại hội\ntrường ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと、そうだな。ならば控室に――\n妻の親族に、挨拶をしてくるとしよう」
1746 = "「Ây da, đúng vậy nhỉ. Vậy thì anh sẽ đến\nphòng chờ――\nđể chào hỏi họ hàng của vợ\nđây.」"

# 【凪】
# display as 凪
# JP: 「ならふかみちゃん、うちらは中で遊んどるばい！」
2111 = "「Vậy thì Fukami, chúng ta vào trong chơi\nđi nha!」"

# 【ふかみ】
# display as 深美
# JP: 「えええ？　凪ちゃん、遊ぶっていっても」
1749 = "「Hảảả? Nagi, cậu bảo là chơi nhưng mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはいい。ガマダス号は動かせるぞ。\n運転方法は、ポーレットが既に習熟済みだ」
1804 = "「A, chuyện đó thì được. Tàu GAMADUS có thể\nchạy được đấy.\nCách điều khiển thì\nPaulette đã nắm rõ rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄君っ！？　それ、ないしょって」
2127 = "「Anh Soutetsu!? Chuyện đó, đáng lẽ phải\ngiữ bí mật chứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ。行く前にあとひとつだけ」
1775 = "「A, đúng rồi. Trước khi đi còn một chuyện\nnữa.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！？」
2132 = "「Ngài Soutetsu!?」"

# monologue
# JP: 頭を下げる。\n心ごと。僕の感謝の全てを込めて。
2500 = "Tôi cúi đầu.\nBằng cả tấm lòng. Bằng tất cả\nsự biết ơn của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「今のこともそうだが、思い返せば、いつでもそうだ。\nいくつもいくつも、大事なことを教えてもらった」
1858 = "「Chuyện vừa rồi cũng vậy, ngẫm lại thì,\nlúc nào cũng vậy.\nMọi người đã dạy cho anh\nhết điều quan trọng này đến điều quan\ntrọng khác.」"

# 【稀咲】
# display as 稀咲
# JP: 「双鉄……」
2126 = "「Soutetsu……」"

# 【双鉄】
# display as 雙鐵
# JP: 「君たちがいてくれたから。僕は僕になれた。\n日々姫と一緒に、ここまで歩んでくることができた」
1824 = "「Chính vì có mọi người. Anh mới được là\nchính mình.\nMới có thể cùng Hibiki bước đi\nđến tận đây.」"

# 【ポーレット】
# display as 波萊特
# JP: 「何言ってるんですか、双鉄くん。\nそんなの、お互い様すぎますよ」
1672 = "「Anh nói gì vậy, anh Soutetsu.\nChuyện đó,\nlà chúng ta giúp đỡ lẫn nhau mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
# 1778 = "「啊？！」" 

# monologue
# JP: 思わぬ言葉に顔をあげれば、\n笑顔が、僕を囲んでくれてる。
2491 = "Nghe những lời không ngờ tới đó, tôi ngẩng\nmặt lên,\nvà thấy những nụ cười đang vây\nquanh mình."

# 【稀咲】
# display as 稀咲
# JP: 「だね。本当にお互い様だ。キミたちがいなければ、\nそもそもボクはこの場にいない」
1971 = "「Đúng vậy. Thực sự là giúp đỡ lẫn nhau\nđấy. Nếu không có các cậu,\nthì vốn dĩ tôi\nđã chẳng có mặt ở đây rồi.」"

# 【ふかみ】
# display as 深美
# JP: 「クマ川くだり、それからわたしも。\nどうなってたか、わからないです」
2070 = "「Dịch vụ chèo thuyền trên sông Kuma, và cả\nem nữa.\nKhông biết giờ đã ra sao rồi.」"

# 【凪】
# display as 凪
# JP: 「凪様も、汽車ぽっぽば動かしたり、食堂列車で\n働いたりとか、夢にも思うとらんかったばい！」
1989 = "「Nagi-sama đây cũng vậy, chuyện lái tàu\nhỏa xình xịch, hay làm việc trên tàu nhà\nhàng,\ncó nằm mơ cũng không nghĩ tới đâu\nnha!」"

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんとひびきさんのおかげで、\nレールショップ、とーってもにぎやかになったですぅ」
1833 = "「Nhờ có anh Soutetsu và chị Hibiki,\nmà cửa\nhàng đường sắt đã trở nên vô cùng nhộn\nnhịp đó ạ~」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしと8620の正機関士と正機関助士は、\nいつでも、双鉄様と日々姫とです」
1897 = "「Người lái tàu chính và phụ lái tàu chính\ncủa em và 8620,\nlúc nào cũng là ngài\nSoutetsu và Hibiki ạ.」"

# 【凪】
# display as 凪
# JP: 「って！？　凪様、立場なかとばい！！」
1783 = "「Này!? Vậy Nagi-sama để đâu cho vừa đây!!」"

# 【ハチロク】
# display as 八六
# JP: 「とんでもないことです。凪の立場はとても重要。\n双鉄様がご欠員のときの、正機関士ではないですか」
1758 = "「Làm gì có chuyện đó. Vị trí của Nagi rất\nquan trọng.\nChẳng phải em là người lái tàu\nchính khi ngài Soutetsu vắng mặt sao.」"

# 【凪】
# display as 凪
# JP: 「確かにとっても重要ばい！\n凪様、納得！　大納得ばい！！」
2067 = "「Công nhận là vô cùng quan trọng luôn!\nNagi-sama, đồng ý! Hoàn toàn đồng ý nha!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ははっ」
1742 = "「Haha.」"

# monologue
# JP: 笑わせようとしてくれている。\n面白いのに、笑いたいのに――泣きそうだ。
2416 = "Họ đang cố làm tôi cười.\nRõ ràng là rất\nthú vị, rõ ràng là rất muốn cười――nhưng\ntôi lại sắp khóc đến nơi rồi."

# monologue
# JP: ごまかすために見上げれば、\nいつもと同じく、ナビは僕らを見守っている。
2507 = "Tôi ngước nhìn lên để che giấu cảm xúc,\nnhư thường lệ, Navi vẫn đang dõi theo\nchúng tôi."

# monologue
# JP: （ああ――そうなのだ。右田の家を出、\n新しい家を作っても、何を失うわけでも無いのだ）
2778 = "（A――Đúng vậy. Dù có rời khỏi nhà Migita,\nvà lập một gia đình mới, thì tôi cũng\nchẳng đánh mất thứ gì cả.）"

# monologue
# JP: 気が楽になる。力みが抜ける。\nそれで初めて、自分が酷く力んでいたのだと気づく。
2473 = "Tâm trạng tôi nhẹ nhõm hẳn. Sự căng thẳng\ntan biến.\nĐến lúc đó tôi mới nhận ra, bản\nthân mình đã căng thẳng đến nhường nào."

# monologue
# JP: （僕らは単に、新しい駅をつくるだけ――\n今までのレールを、そこから更に伸ばすだけなのだ）
2781 = "（Chúng tôi đơn giản chỉ là đang xây dựng\nmột nhà ga mới――\nvà tiếp tục kéo dài đoạn\nđường ray từ trước đến nay mà thôi.）"

# 【ポーレット】
# display as 波萊特
# JP: 「だからどうか、胸を張って進んでください。\n今日のこの日も、そこから先も！」
1927 = "「Vì vậy, xin anh hãy ưỡn cao ngực mà bước\ntiếp nhé.\nCả ngày hôm nay, và cả chặng\nđường phía trước nữa!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
1797 = "「Ừm!」"

# monologue
# JP: であるのならば、何も恐れる必要はない。
2548 = "Nếu đã vậy, thì chẳng có gì phải sợ hãi\ncả."

# monologue
# JP: 今まで重ねてきたことを、\nもう何度でも、繰り返すだけのことなのだから。
2318 = "Chỉ là lặp đi lặp lại không biết bao nhiêu\nlần nữa,\nnhững điều chúng tôi đã tích lũy\ntừ trước đến nay mà thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「――話してみれば、何ほどのこともなかったな」
2101 = "「――Nói chuyện xong mới thấy, cũng chẳng có\ngì to tát nhỉ.」"

# monologue
# JP: 真闇姉と争ってまで、\n右田の家から僕を排除しようとしていた親戚たち。
2734 = "Những người họ hàng đã từng cố gắng loại\nbỏ tôi khỏi nhà Migita,\nthậm chí không\ntiếc tranh cãi với chị Mayami."

# monologue
# JP: が、この晴れの席で挨拶をすれば、\n敵意をぶつけてくるような者は、誰一人とていなかった。
2316 = "Nhưng, khi tôi đến chào hỏi trong ngày\ntrọng đại này,\nchẳng có lấy một ai tỏ thái\nđộ thù địch cả."

# 【双鉄】
# display as 雙鐵
# JP: 「『切っても切れない取引先』……か」
1380 = "「『Đối tác làm ăn không thể dứt bỏ』……sao.」"

# monologue
# JP: 彼らも大人で、商売人だ。\n稀咲が指摘してくれたように、利害を第一に考えて――
2340 = "Họ cũng là người lớn, là những người làm\năn.\nĐúng như Kisaki đã chỉ ra, đặt lợi ích\nlên hàng đầu――"

# monologue
# JP: 完全に右田の一員、家族となった、\n僕との関係改善を図っただけかもしれないが……
2445 = "Có thể họ chỉ đang cố gắng cải thiện mối\nquan hệ với tôi,\nngười giờ đây đã hoàn\ntoàn trở thành một thành viên, một người\nnhà của gia đình Migita……"

# 【ハチロク】
# display as 八六
# JP: 「きっと、お取引だけのことではないように――\nそう、わたくしは思います」
1913 = "「Chắc chắn không chỉ đơn thuần là chuyện\nlàm ăn đâu ạ――\nEm nghĩ là vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1691 = "「Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「日々姫様と真闇様とを大事に思う、守ろうとする。\n当初はそれが行き過ぎて、排除の形をとったものかとも」
1660 = "「Họ coi trọng và muốn bảo vệ Hibiki cùng\nchị Mayami.\nCó lẽ ban đầu suy nghĩ đó đã\nđi quá giới hạn, nên mới dẫn đến hành động\nloại bỏ ngài.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――かもしれん。\nそうであってほしいと、僕も願った」
1725 = "「――Có lẽ vậy.\nAnh cũng mong là như thế.」"

# monologue
# JP: 親戚たちが口にした、日々姫を祝福する気持ち。\nそれは確かなものと感じた。
2710 = "Những lời chúc phúc dành cho Hibiki mà họ\nhàng đã nói ra.\nTôi cảm nhận được sự chân\nthành trong đó."

# monologue
# JP: 交わした握手から伝わる力は、\n“日々姫を頼む”と、念押ししているものとも感じた。
2418 = "Lực truyền từ những cái bắt tay,\ntôi cũng\ncảm nhận được sự dặn dò “Nhờ cậu chăm sóc\nHibiki”."

# 【ハチロク】
# display as 八六
# JP: 「まぁ、左様でございましたか」
1748 = "「Chà, ra là vậy sao ạ.」"

# monologue
# JP: ふふ、と口元だけで小さく笑う。\n背中を支えてもらえたと、その微笑みにじんわり感じる。
2364 = "Fufu, em ấy khẽ mỉm cười.\nTôi cảm nhận\nđược sự ấm áp từ nụ cười ấy, như thể đang\nnâng đỡ bóng lưng tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「というかハチロク。お前一人か？\nみんなはどこへ？」
1914 = "「Mà này Hachiroku. Chỉ có một mình em thôi\nà?\nMọi người đi đâu hết rồi?」"

# 【ハチロク】
# display as 八六
# JP: 「真闇様が、呼びに来てくださったのです。\n『ひーちゃんが退屈しとるよ』と」
2028 = "「Chị Mayami đã đến gọi mọi người đi rồi ạ.\nBảo là 『Hi-chan đang chán kìa』.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、日々姫の控室にいったのか。\n――いや、それならば何故、お前は？」
1820 = "「Ra vậy, mọi người đến phòng chờ của\nHibiki à.\n――Không, nếu vậy thì tại sao em\nlại ở đây?」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様がここに戻ってこられたときに、\n皆様がどこへいったのか、不安になられてしまうかと」
1908 = "「Vì em sợ khi ngài Soutetsu quay lại đây,\nsẽ cảm thấy bất an không biết mọi người đã\nđi đâu mất ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1986 = "「A――」"

# 【ハチロク】
# display as 八六
# JP: 「それに」
2051 = "「Với lại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それに？」
2059 = "「Với lại?」"

# monologue
# JP: ハチロクがじっと、僕を見上げる。\nとても綺麗な――澄んだ笑顔で。
2373 = "Hachiroku lặng lẽ ngước nhìn tôi.\nVới một\nnụ cười vô cùng xinh đẹp――và trong trẻo."

# monologue
# JP: 透明なほどの笑顔であるのに……\nなぜだろう、どこか、泣き出そうにも見える瞳で。
2740 = "Một nụ cười trong suốt đến nhường ấy……\nNhưng không hiểu sao, đôi mắt ấy lại có vẻ\nnhư sắp khóc đến nơi."

# 【双鉄】
# display as 雙鐵
# JP: 「『それに』――なんだ？」
2053 = "「『Với lại』――là sao?」"

# 【ハチロク】
# display as 八六
# JP: 「それに、わたくし――」
2054 = "「Với lại, em――」"

# monologue
# JP: ハチロクの唇が軽く閉じられ、開かれる。\n一度、二度――もう一度。
2378 = "Đôi môi Hachiroku khẽ khép lại, rồi mở ra.\nMột lần, hai lần――rồi lại một lần nữa."

# monologue
# JP: ……言葉を発しようとして、けれどもそれがどうしても、\n喉から先に出てこないようにも見えてくる。
1369 = "……Trông em ấy như muốn nói điều gì đó,\nnhưng dù cố gắng thế nào,\nlời nói vẫn\nkhông thể thốt ra khỏi cổ họng."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ハチロク」
1875 = "「Sao vậy? Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「それに、わたくしは――双鉄様、の――」
2058 = "「Với lại, em――là của ngài Soutetsu――」"

# monologue
# JP: きゅっと。唇が結ばれる。\n瞳も、同時に閉じられる。
2368 = "Bặm lại. Đôi môi mím chặt.\nĐôi mắt cũng\nđồng thời nhắm lại."

# monologue
# JP: そうして、ぱぁっとハチロクは、\n花の咲くような笑顔を僕に、注いでくれる。
2638 = "Và rồi, Hachiroku bừng sáng,\ntrao cho tôi\nmột nụ cười rạng rỡ như hoa nở."

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、双鉄様と日々姫の！\nレイルロオドでございますから」
2056 = "「Em là Railord của ngài Soutetsu và Hibiki\nmà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ありがとう。\nいつも本当に助けられている」
1794 = "「Ừm. Cảm ơn em.\nLúc nào em cũng giúp đỡ\nanh rất nhiều.」"

# 【ハチロク】
# display as 八六
# JP: 「左様でしたらなによりです――あらっ！？」
2115 = "「Được vậy thì còn gì bằng ạ――Ây da!?」"

# monologue
# JP: ぱちくり、ハチロクが瞬きをする。\nなにかを探し求めるように、あたりをぐるり見渡して――
2376 = "Hachiroku chớp chớp mắt.\nĐảo mắt nhìn\nquanh như đang tìm kiếm thứ gì đó――"

# 【みくろ】
# display as ？？？
# JP: 「ガマダス、うれしい！\nみくろ、やーっと中まで入れます」
2143 = "「GAMADUS, vui quá đi!\nCuối cùng Mikuro\ncũng được vào bên trong rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお、みくろ」
1818 = "「Ồ, Mikuro.」"

# 【みくろ】
# display as 美玖路
# JP: 「右田機関士！　お久しぶりです。\n今日は、結婚式へのご招待をありがとうございます」
1727 = "「Người lái tàu Migita! Lâu rồi không gặp\nạ.\nCảm ơn anh hôm nay đã mời Mikuro đến dự\nlễ cưới.」"

# 【双鉄】
# display as 雙鐵
# JP: 「よく来てくれた。とても嬉しい」
1679 = "「Cảm ơn em đã đến. Anh rất vui.」"

# 【ハチロク】
# display as 八六
# JP: 「みくろ――」
2044 = "「Mikuro――」"

# monologue
# JP: ハチロクの視線が、穏やかにみくろに注がれる。\n声が、ひときわ柔らかになる。
2377 = "Ánh mắt Hachiroku dịu dàng hướng về phía\nMikuro.\nGiọng nói cũng trở nên mềm mỏng\nhơn hẳn."

# 【ハチロク】
# display as 八六
# JP: 「あなたが――みくろなのですね」
1674 = "「Em――chính là Mikuro nhỉ.」"

# 【みくろ】
# display as 美玖路
# JP: 「はい、はじめまして。ハチロクお姉さま。\nご挨拶が遅れてしまいました」
1983 = "「Vâng, lần đầu gặp mặt ạ. Chị Hachiroku.\nEm xin lỗi vì đã chào hỏi chậm trễ.」"

# monologue
# JP: 指先をぴしりとそろえた敬礼をする。\nハチロクの名だけで動揺していたは思えぬほどに、堂々と。
2422 = "Em ấy chụm khít các đầu ngón tay lại và\ngiơ lên chào theo kiểu quân đội.\nĐường\nhoàng đến mức khó mà tin được trước đây em\nấy từng bối rối chỉ vì nghe đến tên\nHachiroku."

# 【みくろ】
# display as 美玖路
# JP: 「旧帝鉄8620形38696号蒸気機関車レイルロオド、\nみくろです」
2046 = "「Railord của đầu máy hơi nước 38696 thuộc\ndòng 8620 Đường sắt Hoàng gia cũ,\nMikuro\nạ.」"

# monologue
# JP: みくろに応え、\nハチロクも、優雅極まる答礼をする。
2359 = "Đáp lại Mikuro,\nHachiroku cũng thực hiện\nmột nghi thức chào lại vô cùng tao nhã."

# 【ハチロク】
# display as 八六
# JP: 「旧帝鉄8620形蒸気機関車トップナンバーレイルロオド。\n現、御一夜鉄道の、ハチロクです」
1906 = "「Railord của đầu máy hơi nước số 1 thuộc\ndòng 8620 Đường sắt Hoàng gia cũ.\nHiện tại\nthuộc Đường sắt Ohimitera, Hachiroku ạ.」"

# monologue
# JP: ハチロクが先に礼を解けば、\nみくろもほっとしたようにそれに従う。
2362 = "Khi Hachiroku bỏ tay xuống trước,\nMikuro\ncũng làm theo với vẻ nhẹ nhõm."

# monologue
# JP: そんな様子に、ハチロクはまた、\n幸せそうな笑みを浮かべる。
2659 = "Thấy bộ dạng đó của em ấy, Hachiroku lại\nnở một nụ cười hạnh phúc."

# 【ハチロク】
# display as 八六
# JP: 「みくろのことは、双鉄様と日々姫から聞いております。\nわたくし、会ったらお礼を伝えたいと思っていました」
1900 = "「Chị đã nghe chuyện của Mikuro từ ngài\nSoutetsu và Hibiki rồi.\nChị vẫn luôn muốn\nnói lời cảm ơn khi gặp em.」"

# 【みくろ】
# display as 美玖路
# JP: 「ハチロクお姉さまが、みくろにお礼――ですか？」
1692 = "「Chị Hachiroku, cảm ơn Mikuro――sao ạ?」"

# 【ハチロク】
# display as 八六
# JP: 「はい。『トレインホステル[たらぎ,1]鱈木』。\n大変に、素晴らしいホテルでした。ことに、あの[デゴイチ,2]d51」
1981 = "「Đúng vậy. 『Khách sạn tàu hỏa Taragi』.\nLà\nmột khách sạn vô cùng tuyệt vời. Đặc biệt\nlà chiếc D51 đó.」"

# 【みくろ】
# display as 美玖路
# JP: 「あ――ハチロクお姉さまも泊まってくれたんですね！\nみくろも初めて！　昨日の夜に泊まったんです！！」
1763 = "「A――Chị Hachiroku cũng đã ở đó rồi sao!\nMikuro cũng lần đầu tiên! Tối qua em vừa\nmới ở đó xong!!」"

# 【ハチロク】
# display as 八六
# JP: 「うふふ、みくろはどう感じましたか？」
1736 = "「Ư fufu, Mikuro thấy thế nào?」"

# 【みくろ】
# display as 美玖路
# JP: 「感激しました！　D51 1031、まだまだ整備途中だけど、\nパテで穴も埋めてもらってて――あと、ホームとホテル」
2048 = "「Cảm động lắm ạ! D51 1031, tuy vẫn đang\ntrong quá trình bảo dưỡng,\nnhưng những lỗ\nhổng đã được lấp đầy bằng bột trét\nrồi――còn cả sân ga và khách sạn nữa.」"

# monologue
# JP: （おっと）
2775 = "（Ây da）"

# monologue
# JP: 栃木さんと、木本さんだ。\n栃木さんがあげた右手を、木本さんがぱっと抑える。
2614 = "Là anh Tochigi và anh Kimoto.\nAnh Kimoto\nvội vàng giữ chặt lấy cánh tay phải đang\ngiơ lên của anh Tochigi."

# monologue
# JP: みくろとハチロクの会話の邪魔をしないようにと、\n配慮してくれてのことだろう。
2342 = "Chắc là để tránh làm phiền cuộc trò chuyện\ngiữa Mikuro và Hachiroku,\nanh ấy đã tinh ý\nlàm vậy."

# 【みくろ】
# display as 美玖路
# JP: 「なんにもない、帝鉄時代の最末期みたいなホームと、\nわざと古ぼけさせてるホテルと、すごくマッチしてて」
1687 = "「Một sân ga trống trơn giống hệt như thời\nkỳ cuối của Đường sắt Hoàng gia,\nkết hợp\nvới một khách sạn được cố tình làm cho cũ\nkỹ, thật sự rất ăn khớp với nhau.」"

# monologue
# JP: 熱のこもったみくろの声に、ハチロクが大きく頷く。\n無言のままに、栃木さんと木本さんまで頷いている。
2702 = "Nghe giọng nói đầy nhiệt huyết của Mikuro,\nHachiroku gật đầu mạnh.\nTrong sự im lặng,\ncả anh Tochigi và anh Kimoto cũng gật gù\nđồng tình."

# monologue
# JP: なるほどだ。到着時刻が近いのは、\nお二人もトレインホステルに宿泊くださっていたからか。
2657 = "Ra là vậy. Giờ đến của họ sát nhau như\nthế,\nchắc là do hai người họ cũng nghỉ qua\nđêm ở khách sạn tàu hỏa sao."

# 【みくろ】
# display as 美玖路
# JP: 「温泉が、少し離れたところにあるのもすっごく素敵で。\nD51をみながらつかる温泉最高でしたし、それに、湯気」
2085 = "「Suối nước nóng nằm cách đó một chút cũng\nrất tuyệt.\nVừa ngâm mình trong suối nước\nnóng vừa ngắm D51 là tuyệt nhất, với lại,\nhơi nước nữa.」"

# monologue
# JP: （ああ――）
2784 = "（A――）"

# monologue
# JP: 思い出したなら、自然と顔がほころんでしまう。
2297 = "Nhớ lại chuyện đó, khuôn mặt tôi tự nhiên\ncũng giãn ra."

# monologue
# JP: そこは日々姫も、意図したデザインではないと驚き、\nとても喜んでいたところであった。
2432 = "Đó cũng là điểm mà Hibiki đã rất ngạc\nnhiên vì không phải là thiết kế có chủ\nđích,\nvà em ấy đã vô cùng vui sướng."

# 【みくろ】
# display as 美玖路
# JP: 「温泉の湯気越しに見るD51が、蒸気を吐いてるみたいで。\nまるで、帝鉄時代からずっと走り続けてきたみたいで」
2095 = "「D51 nhìn qua làn hơi nước của suối nước\nnóng, trông cứ như đang nhả hơi nước vậy.\nCứ như thể nó vẫn luôn chạy không ngừng\nnghỉ từ thời Đường sắt Hoàng gia đến giờ.」"

# monologue
# JP: 湯医か鱈木か――トレインホステルの設置場所では、\n御一夜鉄道を二分しての大激論がかわされた。
2708 = "Yui hay Taragi――Về địa điểm đặt khách sạn\ntàu hỏa,\nđã có một cuộc tranh luận nảy lửa\nchia rẽ cả Đường sắt Ohimitera."

# monologue
# JP: 鱈木を強行に主張したのは、日々姫と真闇姉――\nそれぞれが、まったく別の理由からの、論陣を張った。
2458 = "Những người kiên quyết chọn Taragi là\nHibiki và chị Mayami――\nMỗi người đều đưa\nra lập luận dựa trên những lý do hoàn toàn\nkhác nhau."

# 【みくろ】
# display as 美玖路
# JP: 「だから、みくろ。トレインホステルにいる間ずっと、\nD51 1031が、今でも生きているみたいに見えて」
1934 = "「Vì vậy, Mikuro. Trong suốt thời gian ở\nkhách sạn tàu hỏa,\nD51 1031 trông như thể\nvẫn còn sống cho đến tận bây giờ vậy.」"

# 【ハチロク】
# display as 八六
# JP: 「みたいに、ではありませんよ？　みくろ」
1638 = "「Không phải là trông như thể đâu nhé?\nMikuro.」"

# 【みくろ】
# display as 美玖路
# JP: 「あっ！　そうでした！！」
1771 = "「A! Đúng rồi nhỉ!!」"

# monologue
# JP: ハチロクの静かな一言に、\nみくろはぶんぶん、何度も頷く。
2356 = "Trước câu nói nhẹ nhàng của Hachiroku,\nMikuro gật đầu lia lịa."

# 【みくろ】
# display as 美玖路
# JP: 「D51 1031は――ここで、また走り出した！」
2142 = "「D51 1031――đã bắt đầu chạy lại từ đây!」"

# 【ハチロク】
# display as 八六
# JP: 「左様です。わたくしの、みくろの――そうしてきっと。ご宿泊くださった全ての方の、こころの中で、元気よく」
1995 = "「Chính xác là vậy. Trong tim chị, trong\ntim Mikuro――và chắc chắn là. Trong tim tất\ncả những người đã nghỉ lại đó, nó đang\nchạy rất khỏe mạnh.」"

# monologue
# JP: 頷いている。僕もまた。\n栃木さんも、木本さんも――っ！！
2478 = "Tôi gật đầu. Tôi cũng vậy.\nCả anh Tochigi,\ncả anh Kimoto cũng vậy――!!"

# monologue
# JP: （湯富院市長……\nそれに、各地のレストランのオーナーたちも）
2789 = "（Thị trưởng Yufuin……\nVà cả những người chủ\nnhà hàng ở các nơi nữa.）"

# monologue
# JP: 招待をしたみながご出席下さった。\nそれだけでもこの上なくありがたいことというのに――
2486 = "Tất cả những người được mời đều đã đến dự.\nChỉ riêng điều đó thôi đã là một điều vô\ncùng đáng quý rồi――"

# monologue
# JP: その中の多くが、御一夜と離れているにも関わらず、\nトレインホステルを宿泊先に、わざわざ選んで下さった。
2400 = "Vậy mà trong số đó, dù ở cách xa\nOhimitera,\nnhưng nhiều người đã cất công\nchọn khách sạn tàu hỏa làm nơi lưu trú."

# monologue
# JP: （凄いな、日々姫は――真闇姉は）
2783 = "（Giỏi thật đấy, Hibiki――và cả chị Mayami\nnữa.）"

# monologue
# JP: 思った瞬間、そうかと気づく。\n当たって当然のことだったのだと。
2302 = "Khoảnh khắc nghĩ vậy, tôi chợt nhận ra.\nThành công là điều hiển nhiên."

# monologue
# JP: （トレインホステルは、ふたりの初めての合作だものな）
2790 = "（Khách sạn tàu hỏa là tác phẩm hợp tác đầu\ntiên của hai người họ mà.）"

# monologue
# JP: 経営者としての真闇姉が、デザイナーとしての日々姫が。
2721 = "Chị Mayami với tư cách là người kinh\ndoanh, Hibiki với tư cách là nhà thiết kế."

# monologue
# JP: それぞれの視点で描いた絵が、見事に重なり合ったゆえ、\nD51 1031は、僕らのこころに、走る存在となったのだ。
2653 = "Những bức tranh được vẽ từ những góc nhìn\nkhác nhau đã hòa quyện vào nhau một cách\nhoàn hảo,\nnhờ đó, D51 1031 đã trở thành\nmột sự tồn tại đang chạy trong tim chúng\ntôi."

# 【ハチロク】
# display as 八六
# JP: 「みくろ。あのこに――D51 1031に。\nふたたび走る力をくれて、ありがとう」
2049 = "「Mikuro. Cảm ơn em đã mang đến cho đứa trẻ\nđó――D51 1031.\nSức mạnh để chạy thêm một\nlần nữa.」"

# 【みくろ】
# display as 美玖路
# JP: 「ふあっ」
# 1764 = "「啊」" 

# monologue
# JP: （！）
2779 = "（!）"

# monologue
# JP: ハチロクの声に思い出す。\nそうだ、この成功を遡るなら、起点はみくろだ。
2371 = "Giọng nói của Hachiroku khiến tôi nhớ lại.\nĐúng vậy, nếu truy tìm nguồn gốc của thành\ncông này, thì khởi điểm chính là Mikuro."

# monologue
# JP: たったひとりの、無謀とも思える清掃案が、\nここまでレールを、見事につなげてくれたのだ。
2294 = "Phương án dọn dẹp tưởng chừng như liều\nlĩnh của một người duy nhất,\nđã kết nối\nnhững đoạn đường ray đến tận đây một cách\nngoạn mục."

# 【みくろ】
# display as 美玖路
# JP: 「あのっ――みくろ、そんな」
1757 = "「Dạ――Mikuro, đâu có.」"

# 【ハチロク】
# display as 八六
# JP: 「会えたときにはどうしても、そのことを、\nわたくし、お礼したかったのです」
1922 = "「Khi nào gặp được em, chị nhất định phải\nnói lời cảm ơn về chuyện đó.」"

# 【みくろ】
# display as 美玖路
# JP: 「あ――」
# 1761 = "「啊……」" 

# monologue
# JP: 頬を真っ赤に――耳まで染めて。\nそれでもみくろは、しっかり頷く。
2697 = "Đôi má đỏ bừng――đỏ lan tới tận mang tai.\nNhưng Mikuro vẫn gật đầu mạnh."

# monologue
# JP: “結果を出すまで会えない”、とまで敬愛している、\nハチロクの――長姉の声を、逃げずにきちんと受け止める。
2426 = "「Mikuro, được chị Hachiroku khen ngợi,\nem\nthực sự, thực sự rất vui ạ!」"

# 【みくろ】
# display as 美玖路
# JP: 「みくろ、ハチロクお姉さまに褒めてもらえて、\nとってもとっても、嬉しいです！」
2063 = "「38696 của Mikuro――đứa trẻ đó cũng sắp\nsửa,\nbắt đầu 『bảo tồn bằng hình thức trải\nnghiệm bảo dưỡng』 rồi đúng không?」"

# 【ハチロク】
# display as 八六
# JP: 「みくろの38696――あのこでももうすぐ、\n『体験型整備保存』が、はじまるのですよね？」
1678 = "「Vâng, đúng vậy ạ! Vì đã thành công ở\nBungomori và Taragi.\nNên cuối cùng cũng\nchuẩn bị xong xuôi rồi ạ!」"

# 【みくろ】
# display as 美玖路
# JP: 「はい、そうです！　[ぶんごもり,2]文庫森と[たらぎ,1]鱈木で成功したから。\nだから、やっと準備がととのって！」
1810 = "「Khi nào trải nghiệm bảo dưỡng bắt đầu,\nchắc chắn chị cũng sẽ đến.\nMikuro――Để gặp\ngỡ một nửa của em, 38696.」"

# 【ハチロク】
# display as 八六
# JP: 「整備体験が始まったら、きっと、わたくしもまいります。\nみくろ――あなたの半身に、38696に会うために」
1942 = "「Vâng, Mikuro sẽ đợi ạ!!!」"

# 【みくろ】
# display as 美玖路
# JP: 「はい、みくろ、待ってます！！！」
1845 = "「A! Vẫn còn ở chỗ này nữa!!\nAnh Soutetsu!\nMọi người ở hội trường đang đợi kìa!!」"

# 【ポーレット】
# display as 波萊特
# JP: 「あー！　まだこんなところに！！\n双鉄くん！　式場の方、待ってますよー！！」
1770 = "「A! Vẫn còn ở chỗ này nữa!!\nAnh Soutetsu!\nMọi người ở hội trường đang đợi kìa!!」"

# monologue
# JP: ポーレットが僕に手招きをする。\n時計を見れば――いかん、いささか話しすぎたか。
2623 = "Paulette vẫy tay gọi tôi.\nTôi nhìn đồng\nhồ――Chết thật, mải nói chuyện quá rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん」
1808 = "「A, xin lỗi.」"

# monologue
# JP: ハチロクが笑う。みくろが手を振る。\n木本さんは会釈をし、栃木さんは指を立てる。
2366 = "Hachiroku cười. Mikuro vẫy tay.\nAnh Kimoto\ncúi chào, còn anh Tochigi thì giơ ngón tay\ncái lên."

# monologue
# JP: 湯富院市長が、シェフたちが、駆け出す僕をそれぞれに、\nそれぞれの笑顔で見送ってくれる――
2634 = "Thị trưởng Yufuin, các đầu bếp, mỗi người\nđều nở một nụ cười\ntiễn tôi chạy vội đi――"

# 【双鉄】
# display as 雙鐵
# JP: 「今すぐに行くっ！」
1920 = "「Anh đến ngay đây!」"

# 【双鉄】
# display as 雙鐵
# JP: 「――綺麗だ」
1847 = "「――Đẹp quá.」"

# monologue
# JP: それしか、言葉が出てこない。
2509 = "Tôi chỉ thốt lên được mỗi câu đó."

# monologue
# JP: ウェデングドレスに包まれた日々姫は、\nまるっきり、物語に出てくるお姫様だ。
2723 = "Hibiki trong bộ váy cưới,\ntrông hệt như\nmột nàng công chúa bước ra từ truyện cổ\ntích vậy."

# 【日々姫】
# display as 日日姬
# JP: 「にぃにも――にぃにぃも――」
2121 = "「Anh hai cũng――anh hai cũng――」"

# monologue
# JP: 日々姫もやはり、言葉を出せない。
2587 = "Hibiki quả nhiên cũng không thốt nên lời."

# monologue
# JP: けれど潤んで僕を見つめる瞳が、\nなにより雄弁に伝えてくれる。
2345 = "Nhưng đôi mắt ngấn lệ đang nhìn tôi,\nđã\nnói lên tất cả những gì em ấy muốn nói."

# 【双鉄】
# display as 雙鐵
# JP: 「……まったく着慣れぬタキシードだがな。\n日々姫が喜んでくれているなら、僕も嬉しい」
1394 = "「……Tuy là bộ tuxedo anh hoàn toàn không\nquen mặc.\nNhưng nếu Hibiki thích thì anh\ncũng vui.」"

# 【日々姫】
# display as 日日姬
# JP: 「んっ！！！」
1801 = "「Ưm!!!」"

# monologue
# JP: ぶんぶん、何度も大きく頷く。\n涙が、それだけで飛んでしまう。
2429 = "Em ấy gật đầu lia lịa.\nNước mắt cứ thế mà\ntuôn rơi."

# monologue
# JP: これほど美しく育っても、\nやはり日々姫は、小さな泣き虫の日々姫でもある。
2407 = "Dù đã trưởng thành xinh đẹp đến nhường\nnày,\nnhưng Hibiki quả nhiên vẫn là một cô\nbé Hibiki hay khóc nhè."

# 【双鉄】
# display as 雙鐵
# JP: 「――っ、っと。\nほら」
2040 = "「――Ây, da.\nĐây này.」"

# monologue
# JP: いつもは尻ポケットにあるハンカチが、\n今日のタキシードでは存在しない。
2454 = "Chiếc khăn tay lúc nào cũng nằm trong túi\nquần sau,\nhôm nay mặc tuxedo lại không có."

# monologue
# JP: ならばと代わりに、\n胸ポケットのチーフを差し出してやる。
2546 = "Thế nên thay vào đó,\ntôi đưa cho em ấy\nchiếc khăn cài túi ngực."

# 【双鉄】
# display as 雙鐵
# JP: 「泣くな泣くな。泣いてるお前も綺麗だが、\n笑顔の方が、やはり何倍も美しい」
1700 = "「Đừng khóc đừng khóc. Em khóc cũng đẹp\nlắm,\nnhưng nụ cười của em vẫn đẹp hơn gấp\ntrăm lần.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 1797 = "「嗯！」" 

# monologue
# JP: 涙をそっと拭いてやる。\nそれだけで、日々姫は落ち着きを取り戻す。
2516 = "Tôi nhẹ nhàng lau nước mắt cho em ấy.\nChỉ\nvậy thôi, Hibiki đã lấy lại được bình\ntĩnh."

# monologue
# JP: ……ポケットチーフの扱い方のマナーは知らんが、\nこれが適っていないのならば、僕は喜んで違反しよう。
1367 = "……Tôi không biết phép tắc sử dụng khăn cài\ntúi ngực là thế nào,\nnhưng nếu làm thế này\nlà sai, thì tôi cũng sẵn lòng vi phạm."

# 【赤井】
# display as 赤井
# JP: 「よろしいですか？」
1723 = "「Hai người xong chưa ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ええ――もちろん」
1813 = "「Vâng――tất nhiên rồi ạ.」"

# monologue
# JP: 赤井宮司の落ち着いた声。\nおかげで、すんなり我に返れる。
2699 = "Giọng nói điềm tĩnh của cha xứ Akai.\nNhờ\nvậy, tôi mới dễ dàng bừng tỉnh."

# monologue
# JP: 新郎新婦入場を終え、日々姫と向き合ったその瞬間に、\n今が式だということさえも、完全に頭から飛んでいた。
2543 = "Ngay khoảnh khắc cô dâu chú rể bước vào và\nđối mặt với Hibiki,\ntôi đã hoàn toàn quên\nmất rằng mình đang trong lễ cưới."

# 【双鉄】
# display as 雙鐵
# JP: 「おまたせしてしまいました」
2077 = "「Xin lỗi vì đã để mọi người phải đợi.」"

# 【赤井】
# display as 赤井
# JP: 「いえいえ、[じんぜんしき,2]人前式に相応しい。\nとてもあたたかなやりとりだったかと」
1637 = "「Không đâu, rất phù hợp với lễ cưới trước\nmặt mọi người đấy chứ.\nĐó là một khoảnh\nkhắc rất ấm áp mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「恐縮です」
1879 = "「Cảm ơn ngài ạ.」"

# 【赤井】
# display as 赤井
# JP: 「さて」
1839 = "「Vậy thì.」"

# monologue
# JP: その一言と、わずかな表情の変化とで、\n空気がキリリと引き締まる。
2343 = "Chỉ với một lời nói đó, cùng sự thay đổi\nbiểu cảm tinh tế,\nbầu không khí lập tức\ntrở nên trang nghiêm."

# monologue
# JP: 人前式の司会は初めてとのことであったが、\nさすがは赤井阿蘇神社の宮司なのだと思い知る。
2751 = "Dù nghe nói đây là lần đầu tiên ngài ấy\nchủ trì một lễ cưới trước mặt mọi người,\nnhưng quả không hổ danh là cha xứ của đền\nAkai Aso."

# 【赤井】
# display as 赤井
# JP: 「今日の佳き日に、新郎・右田双鉄さんと、\n新婦・右田[ひびき,2]日々姫さんとは夫婦となられます」
1827 = "「Trong ngày lành hôm nay, tân lang Migita\nSoutetsu,\nvà tân nương Migita Hibiki sẽ\nchính thức nên duyên vợ chồng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1970 = "「Vâng.」"

# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1970 = "「是」" 

# 【赤井】
# display as 赤井
# JP: 「おふたりが夫婦になることを、お互いに向け、\n私たち立会人に向け、どうぞご誓約ください」
2074 = "「Xin hai người hãy hướng về phía nhau,\nvà\nhướng về những người làm chứng chúng tôi,\nđọc lời thề nguyện kết thành phu thê.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1970 = "「是」" 

# monologue
# JP: 原稿は、何度も何度も書き直しながらしたためた。
2396 = "Bản thảo đã được viết đi viết lại không\nbiết bao nhiêu lần."

# monologue
# JP: けれどもこうしてこの場に立てば、\n言葉は、勝手に溢れ出してくる。
2314 = "Thế nhưng khi đứng ở đây,\nnhững lời nói cứ\nthế tự nhiên tuôn trào."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――日々姫を愛しています」
1924 = "「Anh――yêu Hibiki.」"

# monologue
# JP: こころの底から。\n一番深く、傷ついていたところから。
2737 = "Từ tận đáy lòng.\nTừ nơi sâu thẳm nhất,\ntừng bị tổn thương nhất."

# 【双鉄】
# display as 雙鐵
# JP: 「人を愛することなど決してできないと――\n幼い頃に双子の妹を亡くしてずっと、思っていました」
2065 = "「Anh từng nghĩ mình sẽ chẳng bao giờ có\nthể yêu một ai nữa――\nKể từ khi mất đi đứa\nem gái sinh đôi hồi còn nhỏ, anh vẫn luôn\nnghĩ vậy.」"

# monologue
# JP: 愛するどころか、心を動かすことさえも。\nそれが路子に対する贖罪なのだと、感じてさえいた。
2390 = "Đừng nói là yêu, ngay cả việc rung động\nanh cũng không thể.\nAnh thậm chí còn cảm\nthấy đó là sự chuộc tội dành cho Michiko."

# 【双鉄】
# display as 雙鐵
# JP: 「けれど日々姫は、僕に見せてくれました。\n世界がどんなに綺麗かを、笑顔に満ちているのかを」
1664 = "「Nhưng Hibiki đã cho anh thấy.\nThế giới\nnày tươi đẹp biết bao, ngập tràn những nụ\ncười biết bao.」"

# monologue
# JP: 描き出すことで笑顔を生んで、\nその笑顔をまた、鮮やかに描き出して。
2739 = "Vẽ nên những bức tranh để tạo ra nụ cười,\nrồi lại vẽ nên nụ cười ấy một cách sống\nđộng."

# monologue
# JP: その繰り返しは、僕にも笑顔を与えてくれた。\n僕の世界を、日々姫は笑顔で、色づけてくれた。
2735 = "Sự lặp lại đó, cũng đã mang đến cho anh nụ\ncười.\nHibiki đã dùng nụ cười của mình, tô\nđiểm cho thế giới của anh."

# 【双鉄】
# display as 雙鐵
# JP: 「綺麗な世界の中心には、鮮やかな笑顔の中心には、\nそこには、いつでも日々姫が居て。だから、僕は」
1829 = "「Ở trung tâm của thế giới tươi đẹp đó, ở\ntrung tâm của nụ cười rạng rỡ đó,\nlúc nào\ncũng có Hibiki. Vì thế, anh」"

# monologue
# JP: 想いが胸にいっぱいになる。\n抱きしめたいし、キスしたい。
2471 = "Tình cảm dâng trào trong lồng ngực.\nTôi\nmuốn ôm em ấy, muốn hôn em ấy."

# monologue
# JP: 溢れ出してくる衝動を、半ば無理やり、言葉に落とす。
2487 = "Tôi nửa cưỡng ép, biến những xung động\nđang trào dâng thành lời nói."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が好きで。日々姫の笑顔と共に居たくて。\nだから、日々姫――」
1899 = "「Anh yêu Hibiki. Anh muốn được ở bên cạnh\nnụ cười của Hibiki.\nVì thế, Hibiki――」"

# monologue
# JP: ああ、段取りが違ってる。\nけれども、気持ちが止まらない。
2409 = "A, sai kịch bản mất rồi.\nNhưng mà, cảm xúc\nkhông thể dừng lại được."

# 【ポーレット】
# display as 波萊特
# JP: 「！？　れいな、行って」
1817 = "「!? Reina, đi đi.」"

# 【れいな】
# display as 玲奈
# JP: 「あわわ、はいですよぉ」
1766 = "「A wa wa, vâng ạ~」"

# monologue
# JP: れいなが慌て、半ば小走りにかけてくる。\n両手に捧げたトレーの上には、金に輝く指輪がふたつ。
2647 = "Reina cuống cuồng, chạy chậm về phía chúng\ntôi.\nTrên chiếc khay dâng bằng hai tay, là\nhai chiếc nhẫn lấp lánh ánh vàng."

# 【双鉄】
# display as 雙鐵
# JP: 「僕と――結婚してください」
2072 = "「Xin em――hãy lấy anh.」"

# 【日々姫】
# display as 日日姬
# JP: 「はい――はいっ！　喜んで！！！！」
1844 = "「Vâng――Vâng! Em rất sẵn lòng!!!!」"

# monologue
# JP: 僕が指輪を取ると同時に、\n日々姫も指輪を握りしめる。
2506 = "Cùng lúc tôi lấy chiếc nhẫn,\nHibiki cũng\nnắm chặt lấy chiếc nhẫn còn lại."

# monologue
# JP: 両手でぎゅっと、大事に大事に。
2656 = "Bằng cả hai tay, nâng niu, trân trọng."

# 【日々姫】
# display as 日日姬
# JP: 「描いて、伝えるそのことが、私はずっと怖くって。\nだけど、にぃにが――そうしていいって認めてくれて」
1885 = "「Việc vẽ ra, truyền đạt điều đó, em đã\nluôn rất sợ hãi.\nNhưng, anh hai đã――công\nnhận và cho phép em làm vậy.」"

# monologue
# JP: にぃにになってる。いつもの日々姫でいてくれている。\nそれがうれしい。とても、うれしい。
2684 = "Lại gọi là anh hai rồi. Em ấy vẫn luôn là\nHibiki của ngày thường.\nĐiều đó khiến tôi\nvui lắm. Rất, rất vui."

# 【日々姫】
# display as 日日姬
# JP: 「世界を開いて広げてくれて。広がることの怖さから、\nやっぱりにぃには、いつでも私を守ってくれて」
1644 = "「Mở ra và mở rộng thế giới cho em. Khỏi\nnỗi sợ hãi khi thế giới mở rộng,\nanh hai\nquả nhiên, lúc nào cũng bảo vệ em.」"

# monologue
# JP: 日々姫の言葉が、日々姫剥き出しの誓いなのだと、\n突き刺さるほどに伝わってくる。
2519 = "Lời nói của Hibiki, chính là lời thề chân\nthành nhất của em ấy,\ntruyền đến tôi mạnh\nmẽ như xuyên thấu tâm can."

# 【日々姫】
# display as 日日姬
# JP: 「だからにぃにの誓いの言葉が、嬉しくて――\nにぃにと私の世界とが、響き合ってるってわかって」
1931 = "「Vì thế, lời thề của anh hai khiến em rất\nvui――\nEm nhận ra rằng, thế giới của anh\nhai và em, đang cộng hưởng với nhau.」"

# monologue
# JP: 確かに、響きあっている。
2385 = "Chắc chắn là, đang cộng hưởng."

# monologue
# JP: 日々姫の言葉は僕の全てを震わせて、\n喜びの鐘を打ち鳴らしてる。
2595 = "Lời nói của Hibiki khiến mọi thứ trong tôi\nrung động,\ngióng lên hồi chuông của niềm\nvui sướng."

# 【日々姫】
# display as 日日姬
# JP: 「ふたりなら、きっとどこまでも広げられるから。\n世界の綺麗を、ふたりで全部、見れるから」
1892 = "「Nếu là hai chúng ta, chắc chắn có thể mở\nrộng đến bất cứ đâu.\nCó thể cùng nhau,\nnhìn ngắm trọn vẹn vẻ đẹp của thế giới\nnày.」"

# monologue
# JP: 日々姫の瞳に、僕の笑顔が写ってる。
2594 = "Trong đôi mắt Hibiki, phản chiếu nụ cười\ncủa tôi."

# 【日々姫】
# display as 日日姬
# JP: 「そうじゃなくても、そうできなくても。他の全てを\n失くしても。にぃにと一緒に、ずっと一生いたいから」
1864 = "「Dù không phải vậy, dù không thể làm vậy.\nDù có đánh mất\ntất cả những thứ khác. Em\nvẫn muốn ở bên anh hai, mãi mãi trọn đời.」"

# monologue
# JP: 笑ってしまう。幸せすぎて。\n日々姫も僕も、笑み崩れている。
2494 = "Tôi bật cười. Vì quá đỗi hạnh phúc.\nCả\nHibiki và tôi, đều đang cười không khép\nđược miệng."

# monologue
# JP: 晴れの舞台と、引き締めようと思うのだけれど――\nとても、出来ない。
2605 = "Đây là ngày trọng đại, tôi muốn nghiêm túc\nmột chút nhưng――\nthật sự, không thể làm\nđược."

# 【日々姫】
# display as 日日姬
# JP: 「だからにぃに――右田、双鉄さん。\n私と、日々姫と――どうか、結婚してください！」
1933 = "「Vì thế anh hai――Anh Migita Soutetsu.\nXin\nanh――hãy lấy em, lấy Hibiki nhé!」"

# 【双鉄】
# display as 雙鐵
# JP: 「喜んで。何に変えても、僕は日々姫と結婚しよう」
1909 = "「Anh rất sẵn lòng. Dù có phải đánh đổi bất\ncứ thứ gì, anh cũng sẽ lấy Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！」
2122 = "「Anh hai!」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！」
1961 = "「Hibiki!」"

# 【赤井】
# display as 赤井
# JP: 「ご誓約、確かに聞き届けさせていただきました。\nそれでは、指輪の交換を」
1911 = "「Tôi đã lắng nghe rõ lời thề nguyện của\nhai người.\nVậy thì, xin mời trao nhẫn.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1764 = "「啊」" 

# monologue
# JP: 抱きつこうとしていた動きを止めて、\n日々姫がゆっくり手を開く。
2606 = "Dừng lại hành động định lao vào ôm chầm\nlấy tôi,\nHibiki từ từ mở tay ra."

# monologue
# JP: 右手はいまも、指輪ひとつを握ったままで、\n花開かせた左手を、そうっと僕に差し伸べてくる。
2431 = "Bàn tay phải vẫn đang nắm chặt một chiếc\nnhẫn,\nem ấy nhẹ nhàng đưa bàn tay trái\nđang xòe ra như một đóa hoa về phía tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「これで、お前は僕の妻だ」
2098 = "「Với chiếc nhẫn này, em đã là vợ của anh.」"

# monologue
# JP: 日々姫の細い薬指。\nそこにぴったりのリングをはめる。
2520 = "Ngón áp út thon thả của Hibiki.\nTôi đeo\nchiếc nhẫn vừa vặn vào đó."

# 【日々姫】
# display as 日日姬
# JP: 「はい。私は、あなたの妻です」
1814 = "「Vâng. Em là vợ của anh.」"

# monologue
# JP: 嬉しげに。\n軽く左手をにぎり、ひろげて。
2434 = "Đầy vẻ vui sướng.\nEm ấy khẽ nắm bàn tay\ntrái lại, rồi lại xòe ra."

# monologue
# JP: そして今度は、日々姫が僕の左手を取り、\nリングをはめる。
2533 = "Và lần này, Hibiki nắm lấy bàn tay trái\ncủa tôi,\nđeo nhẫn vào."

# 【日々姫】
# display as 日日姬
# JP: 「これで、にぃにば――\nにぃにば、私の旦那様」
2100 = "「Với chiếc nhẫn này, anh hai――\nanh hai đã\nlà chồng của em.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、僕はお前の夫となった」
1976 = "「Đúng vậy, anh đã trở thành chồng của em\nrồi.」"

# 【赤井】
# display as 赤井
# JP: 「さて、ここで[みぎたいちしゅぞうもと,5]右田一酒造元。[とうじ,1]杜氏・右田[まくら,1]真闇様。\n[くらびとがしら,2]蔵人頭・斎藤[ほのか,1]穂香様からのご[しんもつ,1]進物です」
1840 = "「Vậy thì, tiếp theo đây là món quà chúc\nmừng từ Xưởng rượu Migita.\nTrưởng hầm rượu\nMigita Mayami và Thợ ủ rượu chính Saito\nHonoka.」"

# 【日々姫】
# display as 日日姬
# JP: 「ねぇねから！？」
2125 = "「Từ chị Mayami sao!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「何を驚く。お前が望んだことだろう」
1671 = "「Có gì mà ngạc nhiên. Chẳng phải đó là\nđiều em mong muốn sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1764 = "「啊」" 

# monologue
# JP: 日々姫がどうしても臨んだふたつ。\nウエディングドレスと、三三九度。
2589 = "Hai điều mà Hibiki nhất quyết mong muốn.\nVáy cưới và nghi thức uống rượu giao bôi\nSan-san-kudo."

# monologue
# JP: それを両立させるため、赤井宮司と相談の上、\n僕らは僕らの結婚式に、人前式を選んだのだ。
2636 = "Để dung hòa cả hai điều đó, sau khi bàn\nbạc với cha xứ Akai,\nchúng tôi đã chọn tổ\nchức lễ cưới trước mặt mọi người."

# 【赤井】
# display as 赤井
# JP: 「右田真闇様。ご進物の説明をいただけますか？」
1731 = "「Cô Migita Mayami. Xin cô giải thích đôi\nchút về món quà này được không ạ?」"

# monologue
# JP: 真闇姉へと、スポットライトが当てられる。\nその傍らには、大きな[かめ]瓶が。
2701 = "Ánh đèn sân khấu chiếu thẳng vào chị\nMayami.\nBên cạnh chị ấy là một vại rượu\nlớn."

# 【真闇】
# display as 真闇
# JP: 「こん[かめ]瓶ん中の焼酎ば、日々姫が産まれたその年に、\nうちの先代の右田の[とうじ,1]杜氏が[じょうぞう,1]醸造したものです」
2097 = "「Rượu shochu trong vại này, được ủ bởi\nTrưởng hầm rượu đời trước của nhà Migita,\nvào chính năm Hibiki chào đời.」"

# 【日々姫】
# display as 日日姬
# JP: 「おかあさん、が」
1980 = "「Mẹ, sao.」"

# 【真闇】
# display as 真闇
# JP: 「そいば、斎藤さんが大事に寝かせとってくれました。\n日々姫がお嫁にいくときに、持たせるようにって」
2137 = "「Phu nhân Saito đã cẩn thận ủ nó suốt thời\ngian qua.\nĐể dành cho ngày Hibiki đi lấy\nchồng.」"

# 【日々姫】
# display as 日日姬
# JP: 「あっ」
# 1764 = "「啊」" 

# 【真闇】
# display as 真闇
# JP: 「やけん。ひーちゃんの三三九度は。\nひーちゃんがよければ――こん焼酎で」
1930 = "「Thế nên. Nghi thức uống rượu giao bôi của\nHi-chan.\nNếu Hi-chan đồng ý――hãy dùng loại\nrượu shochu này nhé.」"

# 【日々姫】
# display as 日日姬
# JP: 「もちろん――もちろんっ！　喜んでっ！！！」
2023 = "「Tất nhiên――Tất nhiên rồi ạ! Em rất sẵn\nlòng!!!」"

# 【真闇】
# display as 真闇
# JP: 「ほんなら」
2113 = "「Vậy thì.」"

# monologue
# JP: 瓶の蓋が外される。\n米焼酎の澄んだ香りが、ふわり広がる。
2652 = "Nắp vại được mở ra.\nHương thơm thanh khiết\ncủa rượu shochu gạo thoang thoảng lan tỏa."

# 【日々姫】
# display as 日日姬
# JP: 「あ、もしよかったら――\n飲める方は、是非、ご一緒ください」
1773 = "「A, nếu được――\nNhững ai uống được, xin hãy\ncùng chung vui với chúng tôi ạ.」"

# 【真闇】
# display as 真闇
# JP: 「蒸気ラムネもご用意してありますけん。\n焼酎ば飲めん方は、ぜひぜひラムネで乾杯を」
1893 = "「Chúng tôi cũng có chuẩn bị cả soda hơi\nnước nữa.\nAi không uống được rượu shochu\nthì xin hãy cạn ly bằng soda nhé.」"

# 【斎藤】
# display as 齋藤
# JP: 「焼酎んグラスば、こっちへ」
2073 = "「Ai dùng ly rượu shochu thì xin mời qua\nbên này.」"

# 【山崎】
# display as 山崎
# JP: 「ラムネは、こちらでお注ぎします」
1869 = "「Soda sẽ được rót ở bên này ạ.」"

# monologue
# JP: 斎藤さんと山崎さんとの手によって、\nグラスが次々、満たされていく。
2764 = "Dưới bàn tay của phu nhân Saito và anh\nYamazaki,\ncác ly rượu lần lượt được rót\nđầy."

# 【真闇】
# display as 真闇
# JP: 「はぁい。ひーちゃんと双ちゃんは、これ」
1683 = "「Đây. Của Hi-chan và Sou-chan đây.」"

# monologue
# JP: 朱塗りの盃。とても小さな。\nそれになみなみ、真闇姉は焼酎を満たしてくれる。
2743 = "Một chén rượu sơn son. Rất nhỏ.\nChị Mayami\nrót rượu shochu đầy ắp vào đó."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
1956 = "「Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1970 = "「是」" 

# monologue
# JP: 小の盃は、僕、日々姫、僕。\n中の盃は、日々姫、僕、日々姫。
2450 = "Chén nhỏ, tôi, Hibiki, tôi.\nChén vừa,\nHibiki, tôi, Hibiki."

# 【日々姫】
# display as 日日姬
# JP: 「――おいし」
1842 = "「――Ngon quá.」"

# 【真闇】
# display as 真闇
# JP: 「あらまぁ。新婦さんはいける口とや」
1744 = "「Ây chà. Tân nương tử cũng uống được phết\nnhỉ.」"

# monologue
# JP: 軽く笑いをさざめかせ。\n真闇姉はすっと、日々姫の耳元に唇を寄せる。
2648 = "Chị Mayami khẽ bật cười khúc khích.\nRồi\nchị ghé sát môi vào tai Hibiki."

# 【真闇】
# display as 真闇
# JP: 「ありがとうね。うちん蔵のお酒ば、認めてくれて」
2075 = "「Cảm ơn em nhé. Vì đã công nhận rượu của\nxưởng nhà mình.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1764 = "「啊」" 

# monologue
# JP: 日々姫の瞳が、大きく揺れる。\nその頬に、真闇姉はそっと手を添える。
2592 = "Đôi mắt Hibiki rung động mạnh mẽ.\nChị\nMayami nhẹ nhàng đặt tay lên má em ấy."

# monologue
# JP: ――日々姫の羽はもう固まったと、\nどこまでも翔んでいけると、その手で保証するかのように。
2425 = "――Như thể dùng bàn tay ấy để bảo chứng\nrằng,\nđôi cánh của Hibiki đã cứng cáp, đã\ncó thể bay đến bất cứ nơi đâu."

# 【真闇】
# display as 真闇
# JP: 「ほんなら、ねぇ。双ちゃん、大の盃ば」
1937 = "「Vậy thì, tiếp nhé. Sou-chan, chén lớn\nnày.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1796 = "「嗯」" 

# monologue
# JP: 大の盃。僕、日々姫――僕。
2420 = "Chén lớn. Tôi, Hibiki――tôi."

# monologue
# JP: 三三九度の九度目をぐいと大きくあけて、\n口の中、しばし、焼酎の豊かを味わう。
2692 = "Lần thứ chín của nghi thức San-san-kudo,\ntôi uống cạn một ngụm lớn,\nđể hương vị đậm\nđà của rượu shochu lan tỏa trong miệng một\nlúc."

# monologue
# JP: （ああ――\n本当に、澄み切り、旨いな）
2776 = "（A――\nThực sự, rất thanh khiết, rất ngon.）"

# monologue
# JP: 例えるならば、無色透明。\n日々姫の結婚を祝うのに、これほど適した酒はない。
2673 = "Nếu phải ví von, thì đó là sự vô sắc trong\nsuốt.\nKhông có loại rượu nào thích hợp hơn\nđể chúc mừng đám cưới của Hibiki."

# 【真闇】
# display as 真闇
# JP: 「ん。ええ飲みっぷり。ほーたらみなさん。\n双ちゃんとひーちゃんの結婚ば祝して」
1806 = "「Ừm. Uống sảng khoái lắm. Vậy thì mọi\nngười.\nCùng nâng ly chúc mừng đám cưới của\nSou-chan và Hi-chan nào.」"

# monologue
# JP: 真闇姉がグラスを掲げる。\n列席しているみなも、揃って。
2671 = "Chị Mayami nâng ly.\nTất cả những người có\nmặt cũng đồng loạt làm theo."

# monologue
# JP: いつもの仲間だけではなく、\n来賓も、親戚一同も、ガマダススタッフの皆さんも。
2703 = "Không chỉ có những người bạn thân thiết,\nmà cả khách mời, họ hàng, và toàn thể nhân\nviên GAMADUS."

# 【真闇】
# display as 真闇
# JP: 「乾杯」
1645 = "「Cạn ly.」"

# 【ポーレット】
# display as 一同
# JP: 「乾杯」
# 1645 = "「乾杯」" 

# monologue
# JP: ……乾杯し、みながそれぞれグラスを空ける。\nざわめき、にぎわい。“人”だと思う。
1364 = "……Sau tiếng cạn ly, mọi người lần lượt\nuống cạn ly của mình.\nTiếng xôn xao, náo\nnhiệt. Tôi nghĩ đó chính là “Con người”."

# monologue
# JP: 人前式でよかったと、\nこころの底から、しみじみ思う。
2501 = "Tôi thầm nghĩ từ tận đáy lòng,\nthật may vì\nđã chọn lễ cưới trước mặt mọi người."

# 【赤井】
# display as 赤井
# JP: 「それでは、新郎新婦は\n婚姻届にご署名ください」
2116 = "「Vậy thì, xin mời cô dâu chú rể\nký tên vào\ngiấy đăng ký kết hôn.」"

# monologue
# JP: 今度のトレーはハチロクが。\n署名欄以外、全て記入・捺印が済ませてある婚姻届。
2736 = "Lần này chiếc khay do Hachiroku bưng tới.\nMột tờ giấy đăng ký kết hôn đã được điền\nvà đóng dấu đầy đủ, chỉ trừ phần chữ ký."

# monologue
# JP: 銀のペンをとり、代わる代わるに。\n右田双鉄。右田日々姫と記入する。
2485 = "Chúng tôi cầm lấy chiếc bút bạc, lần lượt\nký tên.\nMigita Soutetsu. Migita Hibiki."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、日々姫。\nご結婚、おめでとうございます」
2129 = "「Ngài Soutetsu, Hibiki.\nChúc mừng hai\nngười đã kết hôn.」"

# monologue
# JP: そっと囁き、微笑んで。
2383 = "Hachiroku khẽ thì thầm, mỉm cười."

# monologue
# JP: ハチロクは銀のトレーごと、婚姻届を副市長――\n宝生稀咲女史へと届ける。
2439 = "Hachiroku bưng cả chiếc khay bạc đựng giấy\nđăng ký kết hôn đến cho Phó thị trưởng――\nBà Houshou Kisaki."

# monologue
# JP: しかつめらしく、稀咲は書類を眺めまわして――\nやがて、にこりと大きく頷く。
2682 = "Với vẻ mặt nghiêm nghị, Kisaki lướt nhìn\nqua tờ giấy――\nRồi mỉm cười và gật đầu thật\nmạnh."

# 【稀咲】
# display as 稀咲
# JP: 「確かに、受領いたしました」
1903 = "「Tôi đã tiếp nhận giấy đăng ký kết hôn.」"

# 【赤井】
# display as 赤井
# JP: 「これで、お二人の婚姻は整いました。\n式の結びに、誓いのキスを」
2099 = "「Vậy là, hôn lễ của hai người đã hoàn tất.\nĐể kết thúc buổi lễ, xin mời trao nhau nụ\nhôn thề nguyện.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
# 1956 = "「日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに」
2120 = "「Anh hai」"

# monologue
# JP: 互いの名を呼ぶ。それだけでいい。
2484 = "Gọi tên nhau. Chỉ cần vậy là đủ."

# monologue
# JP: 引き合うように、重なるように。\n僕と日々姫は――くちづけをする。
2354 = "Như thu hút lẫn nhau, như hòa làm một.\nTôi và Hibiki——trao nhau nụ hôn."

# 【凪】
# display as 凪
# JP: 「おめでとうばーい！！！」
1877 = "「Chúc mừng nha!!!」"

# 【ふかみ】
# display as 深美
# JP: 「素敵です！　本当におめでとうございます！」
1838 = "「Tuyệt vời quá! Thực sự chúc mừng hai\nngười ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう！　すまんが僕らは、これからこのまま、\n新婚旅行へむかわせてもらう」
2076 = "「Cảm ơn mọi người! Xin lỗi nhé, chúng tôi\nsẽ cứ thế này,\nlên đường đi tuần trăng mật luôn đây.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あれ！？　\n明日のとれいん食堂に乗るって」
1753 = "「Hả? Ơ!? \nRõ ràng bảo ngày mai sẽ đi nhà ăn trên tàu\nmà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり。そうするために、今から出るのさ。\nナビ！」
1996 = "「Đúng vậy. Để làm được điều đó, chúng tôi\nphải đi ngay bây giờ.\nNavi!」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい、双鉄様。屋上に」
1988 = "「Vâng, ngài Soutetsu. Lên sân thượng thôi\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　いくぞ、日々姫」
1799 = "「Ừm! Đi thôi, Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！　にぃに！！」
1800 = "「Vâng! Anh hai!!」"

# monologue
# JP: ガマダス屋上へと駆け上がる。\n日々姫とならんで、二人一緒に、それぞれの足で。
2483 = "Chúng tôi chạy lên sân thượng Gamadas.\nSánh bước cùng Hibiki, cả hai cùng nhau,\ntrên chính đôi chân của mình."

# 【日々姫】
# display as 日日姬
# JP: 「でもにぃに、どうしてナビで遠回りしてまで\n[ゆのい,1]湯医に行くと？　どうせ、一泊してからの乗車なのに」
1640 = "「Nhưng mà anh hai, sao phải đi Navi vòng\nvèo thế để\nđến Yui làm gì? Đằng nào cũng phải nghỉ\nlại một đêm rồi mới lên tàu mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「理由は二つ。一つ目は至極単純。\nせっかくの新婚初夜だ。二人っきりで過ごしたい」
2022 = "「Có hai lý do. Lý do thứ nhất cực kỳ đơn\ngiản.\nHiếm hoi mới có đêm tân hôn. Anh muốn chỉ\ncó hai người chúng ta bên nhau.」"

# 【日々姫】
# display as 日日姬
# JP: 「はうっ」
1767 = "「Hauu」"

# 【双鉄】
# display as 雙鐵
# JP: 「そして、二つ目」
2108 = "「Và, lý do thứ hai.」"

# 【日々姫】
# display as 日日姬
# JP: 「きゃっ」
1735 = "「Á」"

# monologue
# JP: 日々姫を持ち上げるようにしてキャノピーへ。\nすぐさま、ナビに命令をする。
2504 = "Tôi bế bổng Hibiki lên khoang lái.\nNgay lập tức, ra lệnh cho Navi."

# 【双鉄】
# display as 雙鐵
# JP: 「飛ぶぞ、ナビ」
2135 = "「Bay thôi, Navi.」"

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい、双鉄様」
2105 = "「Vâng, ngài Soutetsu.」"

# monologue
# JP: 空高くへと、滑るようにして駆け上がる。
2794 = "Vút bay lên bầu trời cao, mượt mà như đang\nlướt đi."

# 【双鉄】
# display as 雙鐵
# JP: 「いつだったか、言っていただろう？\n『ナビに送られるようになりたい』と」
1912 = "「Trước đây, em từng nói rồi đúng không?\n『Muốn được Navi đưa đi』 ấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「！！？　覚えとってくれたと！？」
1780 = "「!!? Anh vẫn còn nhớ sao!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。ゆえに、叶えた。\n随分と待たせてしまったが――」
2024 = "「Tất nhiên rồi. Vì thế, anh đã biến nó\nthành hiện thực.\nDù đã để em phải chờ khá lâu——」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！」
# 2122 = "「阿哥！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1743 = "「Ây da.」"

# monologue
# JP: ようやく、日々姫を抱きしめる。\nあたたかで、甘く、柔らかい。
2514 = "Cuối cùng, tôi cũng được ôm Hibiki vào\nlòng.\nThật ấm áp, ngọt ngào và mềm mại."

# monologue
# JP: しあわせで、ただしあわせで、\n愛しい気持ちで、いっぱいになる。
2497 = "Hạnh phúc, chỉ toàn là hạnh phúc,\ntrái tim tôi ngập tràn cảm giác yêu\nthương."

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、だぁいすき」
2124 = "「Anh hai, em yêu anh nhất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、日々姫が大好きだ」
1888 = "「Anh cũng vậy, anh yêu Hibiki nhất.」"

# monologue
# JP: そして僕らは、\n誰も見ていない上空で。
2532 = "Và rồi chúng tôi,\ntrên bầu trời cao không một ai nhìn thấy."

# 【日々姫】
# display as 日日姬
# JP: 「んっ――」
1785 = "「Ưm——」"

# monologue
# JP: 夫婦になって初めての、焼酎の味のキスをする。
2748 = "Trao nhau nụ hôn mang hương vị rượu\nshochu, nụ hôn đầu tiên kể từ khi trở\nthành vợ chồng."
