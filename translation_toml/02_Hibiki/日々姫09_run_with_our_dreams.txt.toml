1844 = "「好的……好的！我願意！！！！」" 

# monologue
# JP: 僕が指輪を取ると同時に、\n日々姫も指輪を握りしめる。
2506 = "我拿起戒指的同時，日日姬也抓緊了戒指。" 

# monologue
# JP: 両手でぎゅっと、大事に大事に。
2656 = "用兩隻手，無比珍重地緊緊握住。" 

# 【日々姫】
# display as 日日姬
