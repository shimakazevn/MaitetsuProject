# monologue
# JP: 真闇姉がグラスを掲げる。\n列席しているみなも、揃って。
2671 = "真闇姐舉起酒杯。在座的各位也跟著舉了起來。" 

# monologue
# JP: いつもの仲間だけではなく、\n来賓も、親戚一同も、ガマダススタッフの皆さんも。
2703 = "舉杯的不僅有平時的同伴，還有各位來賓、親屬，以及ＧＡＭＡＤＵＳ的工作人員們。" 

# 【真闇】
# display as 真闇
# JP: 「乾杯」
1645 = "「乾杯」" 

# 【ポーレット】
# display as 一同
# JP: 「乾杯」
# 1645 = "「乾杯」" 

# monologue
# JP: ……乾杯し、みながそれぞれグラスを空ける。\nざわめき、にぎわい。“人”だと思う。
1364 = "……乾杯之後，大家都喝乾了自己的酒杯。現場隨即喧鬧起來。這就是“人”。" 

# monologue
# JP: 人前式でよかったと、\nこころの底から、しみじみ思う。
2501 = "我打從心底慶幸自己選擇了人前式。" 

# 【赤井】
# display as 赤井
# JP: 「それでは、新郎新婦は\n婚姻届にご署名ください」
2116 = "「那麼，請新郎新娘在結婚申請書上簽名」" 

# monologue
# JP: 今度のトレーはハチロクが。\n署名欄以外、全て記入・捺印が済ませてある婚姻届。
2736 = "這次由八六呈上了托盤。上面放著的是除了署名欄之外，所有登記蓋章都已經完成的結婚申請書。" 

# monologue
# JP: 銀のペンをとり、代わる代わるに。\n右田双鉄。右田日々姫と記入する。
2485 = "我們輪流使用銀色的鋼筆，在上面寫上了右田雙鐵以及右田日日姬的名字。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、日々姫。\nご結婚、おめでとうございます」
2129 = "「雙鐵少爺，日日姬。恭喜二位結為連理」" 

# monologue
# JP: そっと囁き、微笑んで。
2383 = "八六面帶微笑，輕聲說道。" 

# monologue
# JP: ハチロクは銀のトレーごと、婚姻届を副市長――\n宝生稀咲女史へと届ける。
2439 = "她隨後把銀色托盤和結婚申請書一起，交給了副市長——寶生稀咲女士。" 

# monologue
# JP: しかつめらしく、稀咲は書類を眺めまわして――\nやがて、にこりと大きく頷く。
2682 = "稀咲故作嚴肅地掃了一通申請書，然後笑嘻嘻地用力點了點頭。" 

# 【稀咲】
# display as 稀咲
# JP: 「確かに、受領いたしました」
1903 = "「我收到申請書了」" 

# 【赤井】
# display as 赤井
# JP: 「これで、お二人の婚姻は整いました。\n式の結びに、誓いのキスを」
2099 = "「這樣一來，兩位的婚姻就成立了。請以誓言之吻為儀式畫上圓滿的句號」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
# 1956 = "「日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに」
2120 = "「阿哥」" 

# monologue
# JP: 互いの名を呼ぶ。それだけでいい。
2484 = "我們呼喚彼此的名字，這便足矣。" 

# monologue
# JP: 引き合うように、重なるように。\n僕と日々姫は――くちづけをする。
2354 = "兩人就像被彼此吸引過去一樣，我和日日姬吻在了一起。" 

# 【凪】
# display as 凪
# JP: 「おめでとうばーい！！！」
1877 = "「恭喜咧！！！」" 

# 【ふかみ】
# display as 深美
# JP: 「素敵です！　本当におめでとうございます！」
1838 = "「太棒了！真的恭喜兩位！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう！　すまんが僕らは、これからこのまま、\n新婚旅行へむかわせてもらう」
2076 = "「謝謝！很抱歉，我們接下來，將直接展開蜜月旅行」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あれ！？　\n明日のとれいん食堂に乗るって」
1753 = "「哎？咦？！你不是說要坐明天的列車食堂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり。そうするために、今から出るのさ。\nナビ！」
1996 = "「沒錯。為了這麼做，我們今天就要出發。Ｎａｖｉ！」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい、双鉄様。屋上に」
1988 = "「是，雙鐵少爺。請上屋頂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　いくぞ、日々姫」
1799 = "「嗯！我們走，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　にぃに！！」
1800 = "「嗯！阿哥！！」" 

# monologue
# JP: ガマダス屋上へと駆け上がる。\n日々姫とならんで、二人一緒に、それぞれの足で。
2483 = "我們一起跑上了ＧＡＭＡＤＵＳ的屋頂。我和日日姬肩並肩，齊頭並進。" 

# 【日々姫】
# display as 日日姬
# JP: 「でもにぃに、どうしてナビで遠回りしてまで\n[ゆのい,1]湯医に行くと？　どうせ、一泊してからの乗車なのに」
1640 = "「不過阿哥，為什麼要乘Ｎａｖｉ繞遠路去湯醫呢？反正都要過一晚才能上車啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「理由は二つ。一つ目は至極単純。\nせっかくの新婚初夜だ。二人っきりで過ごしたい」
2022 = "「理由有兩個。第一個理由非常單純。難得的新婚之夜我想要兩個人獨處」" 

# 【日々姫】
# display as 日日姬
# JP: 「はうっ」
1767 = "「啊嗚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そして、二つ目」
2108 = "「還有第二個理由」" 

# 【日々姫】
# display as 日日姬
# JP: 「きゃっ」
1735 = "「呀」" 

# monologue
# JP: 日々姫を持ち上げるようにしてキャノピーへ。\nすぐさま、ナビに命令をする。
2504 = "我抱著日日姬進入了座艙，然後馬上對Ｎａｖｉ下令。" 

# 【双鉄】
# display as 雙鐵
# JP: 「飛ぶぞ、ナビ」
2135 = "「飛吧，Ｎａｖｉ」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「はい、双鉄様」
2105 = "「遵命，雙鐵少爺」" 

# monologue
# JP: 空高くへと、滑るようにして駆け上がる。
2794 = "Ｎａｖｉ一路滑翔攀升，飛向高空。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いつだったか、言っていただろう？\n『ナビに送られるようになりたい』と」
1912 = "「我記得你以前好像說過來著，想要讓Ｎａｖｉ載著你飛」" 

# 【日々姫】
# display as 日日姬
# JP: 「！！？　覚えとってくれたと！？」
1780 = "「啊？！你還記得嗎？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。ゆえに、叶えた。\n随分と待たせてしまったが――」
2024 = "「當然了，現在我為你實現了，雖然讓你等了很久」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！」
# 2122 = "「阿哥！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1743 = "「哎呀」" 

# monologue
# JP: ようやく、日々姫を抱きしめる。\nあたたかで、甘く、柔らかい。
2514 = "我終於把日日姬緊緊抱進懷裡。她的身子柔軟又溫暖，還很香甜。" 

# monologue
# JP: しあわせで、ただしあわせで、\n愛しい気持ちで、いっぱいになる。
2497 = "我心中只剩下最純粹的幸福感和滿滿的愛意。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、だぁいすき」
2124 = "「阿哥，我最喜歡你了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、日々姫が大好きだ」
1888 = "「我也最喜歡你了」" 

# monologue
# JP: そして僕らは、\n誰も見ていない上空で。
2532 = "接著我們就在無人注目的藍天之上……" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ――」
1785 = "「嗯……」" 

# monologue
# JP: 夫婦になって初めての、焼酎の味のキスをする。
2748 = "開始了帶著燒酒味的、成為夫妻後的初吻。" 
