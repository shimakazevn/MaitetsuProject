1892 = "「我們倆在一起的話，一定能把世界無限拓展出去。我們能夠一起領略到世界的所有美好」" 

# monologue
# JP: 日々姫の瞳に、僕の笑顔が写ってる。
2594 = "日日姬的眼中映襯著我的笑容。" 

# 【日々姫】
# display as 日日姬
