# monologue
# JP: にぃにになってる。いつもの日々姫でいてくれている。\nそれがうれしい。とても、うれしい。
2684 = "稱呼變回了阿哥。她還是原來的日日姬。這讓我很高興，非常高興。" 

# 【日々姫】
# display as 日日姬
