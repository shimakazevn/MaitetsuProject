# JP: その直下には――
2413 = "在它的正下方……" 

# 【ふかみ】
# display as 深美
# JP: 「おじいちゃんのトラック！？」
2010 = "「爺爺的卡車？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、早瀬さんたちに運んでいただいたのか」
1811 = "「嗯，是讓早瀨先生他們運來的嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「運ぶ……何をでございますか？」
2103 = "「運來……這是運了什麼來啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「人前式になった理由さ。日々姫の強い希望はふたつ。\nウェディングドレスを着ることと」
1862 = "「就是選擇舉行人前式的理由啊。日日姬的願望有兩個。一是穿西式婚紗，二是……」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様。それ以上は、どうぞ式場で、実際に」
2128 = "「雙鐵少爺，後面的話就在婚禮現場直接揭曉吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと、そうだな。ならば控室に――\n妻の親族に、挨拶をしてくるとしよう」
1746 = "「哎呀，差點說漏嘴。那我現在就去休息室……去跟妻子的家屬們打招呼吧」" 

# 【凪】
# display as 凪
# JP: 「ならふかみちゃん、うちらは中で遊んどるばい！」
2111 = "「那小深，我們也去裡面玩玩吧！」" 

# 【ふかみ】
# display as 深美
# JP: 「えええ？　凪ちゃん、遊ぶっていっても」
1749 = "「哎哎哎？小凪，那裡哪是玩的地方」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはいい。ガマダス号は動かせるぞ。\n運転方法は、ポーレットが既に習熟済みだ」
1804 = "「嗯，去玩玩也無妨。也可以開動ＧＡＭＡＤＵＳ號哦。駕駛方法波萊特已經練得很熟了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄君っ！？　それ、ないしょって」
2127 = "「雙鐵君？！這事不是要保密嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ。行く前にあとひとつだけ」
1775 = "「啊，對了。去之前再容我說一句」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！？」
2132 = "「雙鐵少爺？！」" 

# monologue
# JP: 頭を下げる。\n心ごと。僕の感謝の全てを込めて。
2500 = "我懷著全心全意的感謝向大家彎下了腰。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今のこともそうだが、思い返せば、いつでもそうだ。\nいくつもいくつも、大事なことを教えてもらった」
1858 = "「就好比剛才的狀況，我回望過去之後，才發現這樣的事比比皆是。一直以來大家教會了我很多重要的事」" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄……」
2126 = "「雙鐵……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「君たちがいてくれたから。僕は僕になれた。\n日々姫と一緒に、ここまで歩んでくることができた」
1824 = "「因為有你們在，我才有今天，我才能跟日日姬一起走到這一步」" 

# 【ポーレット】
# display as 波萊特
# JP: 「何言ってるんですか、双鉄くん。\nそんなの、お互い様すぎますよ」
1672 = "「你在說什麼啊，雙鐵君。你也教會了我們很多啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
# 1778 = "「啊？！」" 

# monologue
# JP: 思わぬ言葉に顔をあげれば、\n笑顔が、僕を囲んでくれてる。
2491 = "我因出乎意料的話語而抬起頭，這才發現一個個笑容簇擁著我。" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。本当にお互い様だ。キミたちがいなければ、\nそもそもボクはこの場にいない」
1971 = "「是啊。大家彼此彼此啊。沒有你們的話，我也不會站在這裡」" 

# 【ふかみ】
# display as 深美
# JP: 「クマ川くだり、それからわたしも。\nどうなってたか、わからないです」
2070 = "「要是沒有你們的話，我都不知道自己會怎麼樣，更別說隈河漂流的事了」" 

# 【凪】
# display as 凪
# JP: 「凪様も、汽車ぽっぽば動かしたり、食堂列車で\n働いたりとか、夢にも思うとらんかったばい！」
1989 = "「本小姐也做夢都沒想到，自己居然會開上列車，還在餐車上工作呢！」" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさんとひびきさんのおかげで、\nレールショップ、とーってもにぎやかになったですぅ」
1833 = "「多虧了雙鐵先生和日日姬小姐，鐵路商店才能辦得紅紅火火的」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしと8620の正機関士と正機関助士は、\nいつでも、双鉄様と日々姫とです」
1897 = "「我和８６２０的司機和司爐，永遠都是雙鐵少爺和日日姬」" 

# 【凪】
# display as 凪
# JP: 「って！？　凪様、立場なかとばい！！」
1783 = "「喂？！你把本小姐往哪擱啊！！」" 

# 【ハチロク】
# display as 八六
# JP: 「とんでもないことです。凪の立場はとても重要。\n双鉄様がご欠員のときの、正機関士ではないですか」
1758 = "「哪裡的話。凪的位置是至關重要的。您可是在雙鐵少爺缺員時的司機」" 

# 【凪】
# display as 凪
# JP: 「確かにとっても重要ばい！\n凪様、納得！　大納得ばい！！」
2067 = "「至關重要就對了！本小姐贊同！非常之贊同啊！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ははっ」
1742 = "「哈哈」" 

# monologue
# JP: 笑わせようとしてくれている。\n面白いのに、笑いたいのに――泣きそうだ。
2416 = "大家想讓我露出笑容。雖然的確逗得我想笑——但眼淚卻快掉下來了。" 

# monologue
# JP: ごまかすために見上げれば、\nいつもと同じく、ナビは僕らを見守っている。
2507 = "我為了掩飾而抬頭往上看，Ｎａｖｉ一如既往地在天上望著我們所有人。" 

# monologue
# JP: （ああ――そうなのだ。右田の家を出、\n新しい家を作っても、何を失うわけでも無いのだ）
2778 = "（嗯，是啊。哪怕是離開右田家，組建新的家庭，我也並不會失去什麼）" 

# monologue
# JP: 気が楽になる。力みが抜ける。\nそれで初めて、自分が酷く力んでいたのだと気づく。
2473 = "我不再緊張，精神放鬆了下來。這才發現剛才自己的神經繃得有多緊。" 

# monologue
# JP: （僕らは単に、新しい駅をつくるだけ――\n今までのレールを、そこから更に伸ばすだけなのだ）
2781 = "（我們只不過建造了一個新的車站，從前走過的鐵軌還是會從那裡繼續向前延伸）" 

# 【ポーレット】
# display as 波萊特
# JP: 「だからどうか、胸を張って進んでください。\n今日のこの日も、そこから先も！」
1927 = "「所以你完全可以昂首挺胸往前走，無論是今天，還是從今以後！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
1797 = "「嗯！」" 

# monologue
# JP: であるのならば、何も恐れる必要はない。
2548 = "既然如此，那就什麼都不用怕了。" 

# monologue
# JP: 今まで重ねてきたことを、\nもう何度でも、繰り返すだけのことなのだから。
2318 = "不過是把以前做過無數次的事情，繼續再堅持做下去而已。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――話してみれば、何ほどのこともなかったな」
2101 = "「這樣攤開來一說，我發現這事也沒什麼大不了的嘛」" 

# monologue
# JP: 真闇姉と争ってまで、\n右田の家から僕を排除しようとしていた親戚たち。
2734 = "這些親屬們為了把我踢出右田家甚至不惜與真闇姐起爭執。" 

# monologue
# JP: が、この晴れの席で挨拶をすれば、\n敵意をぶつけてくるような者は、誰一人とていなかった。
2316 = "不過在今天這個大喜日子上，沒有一個人在與我寒暄時顯露出敵意來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『切っても切れない取引先』……か」
1380 = "「“必須面對一輩子的客戶”啊……」" 

# monologue
# JP: 彼らも大人で、商売人だ。\n稀咲が指摘してくれたように、利害を第一に考えて――
2340 = "他們也是成熟的人，是商人。如果像稀咲指出的那樣，把得失放在首位的話……" 

# monologue
# JP: 完全に右田の一員、家族となった、\n僕との関係改善を図っただけかもしれないが……
2445 = "對方說不定會尋求跟我改善關係的機會，畢竟我已完全成為了右田家的一員，家族的一份子。" 

# 【ハチロク】
# display as 八六
# JP: 「きっと、お取引だけのことではないように――\nそう、わたくしは思います」
1913 = "「我認為大家之間絕對不是只存在冷冰冰的交易」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1691 = "「八六」" 

# 【ハチロク】
# display as 八六
# JP: 「日々姫様と真闇様とを大事に思う、守ろうとする。\n当初はそれが行き過ぎて、排除の形をとったものかとも」
1660 = "「他們很珍惜日日姬小姐和真闇小姐，想要保護她們。只是當初大家選擇了把你逐出家門這種過於激烈的方式」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――かもしれん。\nそうであってほしいと、僕も願った」
1725 = "「可能是吧。我也希望是這樣」" 

# monologue
# JP: 親戚たちが口にした、日々姫を祝福する気持ち。\nそれは確かなものと感じた。
2710 = "親屬們口中對日日姬的祝福應該是發自內心的。" 

# monologue
# JP: 交わした握手から伝わる力は、\n“日々姫を頼む”と、念押ししているものとも感じた。
2418 = "大家與我握手時所傳遞過來的力道似乎也表達了要我照顧好日日姬的囑託。" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、左様でございましたか」
1748 = "「哎呀，是嗎」" 

# monologue
# JP: ふふ、と口元だけで小さく笑う。\n背中を支えてもらえたと、その微笑みにじんわり感じる。
2364 = "八六嘴角上揚，向我微微一笑。而她的這個微笑給我帶來了莫大的鼓舞。" 

# 【双鉄】
# display as 雙鐵
# JP: 「というかハチロク。お前一人か？\nみんなはどこへ？」
1914 = "「我說八六，怎麼就剩你自己了？大家都到哪去了？」" 

# 【ハチロク】
# display as 八六
# JP: 「真闇様が、呼びに来てくださったのです。\n『ひーちゃんが退屈しとるよ』と」
2028 = "「真闇小姐來叫人了。她說“小日在那邊很無聊”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、日々姫の控室にいったのか。\n――いや、それならば何故、お前は？」
1820 = "「噢，去了日日姬的休息室啊。不對，那你怎麼留下來了？」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様がここに戻ってこられたときに、\n皆様がどこへいったのか、不安になられてしまうかと」
1908 = "「我是怕雙鐵少爺回來之後找不到人會擔心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1986 = "「是這樣啊」" 

# 【ハチロク】
# display as 八六
# JP: 「それに」
2051 = "「而且」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それに？」
2059 = "「而且？」" 

# monologue
# JP: ハチロクがじっと、僕を見上げる。\nとても綺麗な――澄んだ笑顔で。
2373 = "八六目不轉睛地仰望著我。臉上帶著清澈美麗的笑容。" 

# monologue
# JP: 透明なほどの笑顔であるのに……\nなぜだろう、どこか、泣き出そうにも見える瞳で。
2740 = "那明明是一副晶瑩剔透的笑容……然而不知為何，我覺得她的眼角似乎隨時都會有淚珠滑落。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『それに』――なんだ？」
2053 = "「而且什麼？」" 

# 【ハチロク】
# display as 八六
# JP: 「それに、わたくし――」
2054 = "「而且我……」" 

# monologue
# JP: ハチロクの唇が軽く閉じられ、開かれる。\n一度、二度――もう一度。
2378 = "八六輕輕合上雙唇，隨後又張開。動作重複了一遍又一遍。" 

# monologue
# JP: ……言葉を発しようとして、けれどもそれがどうしても、\n喉から先に出てこないようにも見えてくる。
1369 = "……看起來她很想說些什麼，但喉嚨無論如何都發不出聲音來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ハチロク」
1875 = "「怎麼了？八六」" 

# 【ハチロク】
# display as 八六
# JP: 「それに、わたくしは――双鉄様、の――」
2058 = "「而且，我……是雙鐵少爺的……」" 

# monologue
# JP: きゅっと。唇が結ばれる。\n瞳も、同時に閉じられる。
2368 = "八六抿起嘴唇，同時也閉上了雙眼。" 

# monologue
# JP: そうして、ぱぁっとハチロクは、\n花の咲くような笑顔を僕に、注いでくれる。
2638 = "然後在下一刻，她就對我綻放出了盛放鮮花般的笑容。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、双鉄様と日々姫の！\nレイルロオドでございますから」
2056 = "「而且！我是雙鐵少爺和日日姬的鐵路人偶啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ありがとう。\nいつも本当に助けられている」
1794 = "「嗯。謝謝你。你一直以來真的幫了我很多」" 

# 【ハチロク】
# display as 八六
# JP: 「左様でしたらなによりです――あらっ！？」
2115 = "「那樣的話就太好了……哎呀？！」" 

# monologue
# JP: ぱちくり、ハチロクが瞬きをする。\nなにかを探し求めるように、あたりをぐるり見渡して――
2376 = "八六眨了眨眼睛。她像是在找什麼東西一樣四處打量。" 

# 【みくろ】
# display as ？？？
# JP: 「ガマダス、うれしい！\nみくろ、やーっと中まで入れます」
2143 = "「ＧＡＭＡＤＵＳ，太棒了！美玖路終於進到裡面來了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお、みくろ」
1818 = "「噢噢，美玖路」" 

# 【みくろ】
# display as 美玖路
# JP: 「右田機関士！　お久しぶりです。\n今日は、結婚式へのご招待をありがとうございます」
1727 = "「右田司機！好久不見。謝謝您今天邀請美玖路來參加婚禮」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よく来てくれた。とても嬉しい」
1679 = "「你能來我很高興」" 

# 【ハチロク】
# display as 八六
# JP: 「みくろ――」
2044 = "「美玖路」" 

# monologue
# JP: ハチロクの視線が、穏やかにみくろに注がれる。\n声が、ひときわ柔らかになる。
2377 = "八六親切地看著美玖路。聲音也變得格外溫柔。" 

# 【ハチロク】
# display as 八六
# JP: 「あなたが――みくろなのですね」
1674 = "「你就是美玖路啊」" 

# 【みくろ】
# display as 美玖路
# JP: 「はい、はじめまして。ハチロクお姉さま。\nご挨拶が遅れてしまいました」
1983 = "「是的，初次見面。八六姐姐大人。問候來遲，十分抱歉」" 

# monologue
# JP: 指先をぴしりとそろえた敬礼をする。\nハチロクの名だけで動揺していたは思えぬほどに、堂々と。
2422 = "她五指併攏，向八六敬禮。她的動作落落大方，跟之前一聽到八六的名號就慌了神的時候完全不同。" 

# 【みくろ】
# display as 美玖路
# JP: 「旧帝鉄8620形38696号蒸気機関車レイルロオド、\nみくろです」
2046 = "「美玖路是前帝國鐵路８６２０型３８６９６號蒸汽機車鐵路人偶，名叫美玖路」" 

# monologue
# JP: みくろに応え、\nハチロクも、優雅極まる答礼をする。
2359 = "八六也極其優雅地回禮道。" 

# 【ハチロク】
# display as 八六
# JP: 「旧帝鉄8620形蒸気機関車トップナンバーレイルロオド。\n現、御一夜鉄道の、ハチロクです」
1906 = "「我是前帝國鐵路８６２０型蒸汽機車首車鐵路人偶。現隸屬於御一夜鐵路，名叫八六」" 

# monologue
# JP: ハチロクが先に礼を解けば、\nみくろもほっとしたようにそれに従う。
2362 = "八六先行撤禮之後，美玖路也像鬆了一口氣一樣把手放下。" 

# monologue
# JP: そんな様子に、ハチロクはまた、\n幸せそうな笑みを浮かべる。
2659 = "看到她這樣的動作，八六又露出了幸福的笑容。" 

# 【ハチロク】
# display as 八六
# JP: 「みくろのことは、双鉄様と日々姫から聞いております。\nわたくし、会ったらお礼を伝えたいと思っていました」
1900 = "「我從雙鐵少爺和日日姬那裡聽說過你的事。我一直都想要當面向你致謝」" 

# 【みくろ】
# display as 美玖路
# JP: 「ハチロクお姉さまが、みくろにお礼――ですか？」
1692 = "「八六姐姐大人，要跟美玖路道謝嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。『トレインホステル[たらぎ,1]鱈木』。\n大変に、素晴らしいホテルでした。ことに、あの[デゴイチ,2]d51」
1981 = "「是的。列車旅館“多良木”真是一座非常出色的旅館。特別是那輛Ｄ５１」" 

# 【みくろ】
# display as 美玖路
# JP: 「あ――ハチロクお姉さまも泊まってくれたんですね！\nみくろも初めて！　昨日の夜に泊まったんです！！」
1763 = "「啊……八六姐姐大人也去住過了啊！美玖路昨天晚上也第一次去住了一回！！」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふ、みくろはどう感じましたか？」
1736 = "「呵呵，你感覺怎麼樣？」" 

# 【みくろ】
# display as 美玖路
# JP: 「感激しました！　D51 1031、まだまだ整備途中だけど、\nパテで穴も埋めてもらってて――あと、ホームとホテル」
2048 = "「美玖路非常激動！Ｄ５１　１０３１雖然還沒整備好，不過身上的坑坑窪窪已經被補平了。還有站台跟旅館」" 

# monologue
# JP: （おっと）
2775 = "（哎呀）" 

# monologue
# JP: 栃木さんと、木本さんだ。\n栃木さんがあげた右手を、木本さんがぱっと抑える。
2614 = "櫪木先生和木本先生到了。木本先生用力拉下櫪木先生舉起的右手。" 

# monologue
# JP: みくろとハチロクの会話の邪魔をしないようにと、\n配慮してくれてのことだろう。
2342 = "他是怕打擾到美玖路和八六的交談吧。" 

# 【みくろ】
# display as 美玖路
# JP: 「なんにもない、帝鉄時代の最末期みたいなホームと、\nわざと古ぼけさせてるホテルと、すごくマッチしてて」
1687 = "「像帝國鐵路時代最末期一樣空空如也的站台，與古樸森然的旅館非常搭調」" 

# monologue
# JP: 熱のこもったみくろの声に、ハチロクが大きく頷く。\n無言のままに、栃木さんと木本さんまで頷いている。
2702 = "聽著美玖路熱情洋溢的聲音，八六用力點著頭。結果連櫪木先生和木本先生也默默地點起頭來。" 

# monologue
# JP: なるほどだ。到着時刻が近いのは、\nお二人もトレインホステルに宿泊くださっていたからか。
2657 = "看來，他們倆也在列車旅館住了一晚，所以才會來得這麼早。" 

# 【みくろ】
# display as 美玖路
# JP: 「温泉が、少し離れたところにあるのもすっごく素敵で。\nD51をみながらつかる温泉最高でしたし、それに、湯気」
2085 = "「距離溫泉稍微有一點距離這一點也很棒。一邊欣賞Ｄ５１一邊泡溫泉太棒了，而且看那水氣裊裊」" 

# monologue
# JP: （ああ――）
2784 = "（是啊……）" 

# monologue
# JP: 思い出したなら、自然と顔がほころんでしまう。
2297 = "一回想起來，臉上自然而然就掛上了笑容。" 

# monologue
# JP: そこは日々姫も、意図したデザインではないと驚き、\nとても喜んでいたところであった。
2432 = "她說的這個當初也讓日日姬驚喜異常，我甚至懷疑是有意設計成這樣的。" 

# 【みくろ】
# display as 美玖路
# JP: 「温泉の湯気越しに見るD51が、蒸気を吐いてるみたいで。\nまるで、帝鉄時代からずっと走り続けてきたみたいで」
2095 = "「透過溫泉的水氣所看到的Ｄ５１彷彿在噴吐著蒸汽。整輛列車就像從帝國鐵路時代一路行駛到了現在」" 

# monologue
# JP: 湯医か鱈木か――トレインホステルの設置場所では、\n御一夜鉄道を二分しての大激論がかわされた。
2708 = "要把列車旅館放在湯醫還是多良木，這個問題讓御一夜鐵路內部分為兩派，引發了激烈的爭論。" 

# monologue
# JP: 鱈木を強行に主張したのは、日々姫と真闇姉――\nそれぞれが、まったく別の理由からの、論陣を張った。
2458 = "強烈主張設在多良木的是日日姬和真闇姐。她們各自以完全不同的理由據理力爭。" 

# 【みくろ】
# display as 美玖路
# JP: 「だから、みくろ。トレインホステルにいる間ずっと、\nD51 1031が、今でも生きているみたいに見えて」
1934 = "「所以，在住在列車旅館的時候，美玖路一直都覺得Ｄ５１　１０３１好像從來沒有失去過生機」" 

# 【ハチロク】
# display as 八六
# JP: 「みたいに、ではありませんよ？　みくろ」
1638 = "「不是“好像”吧？美玖路」" 

# 【みくろ】
# display as 美玖路
# JP: 「あっ！　そうでした！！」
1771 = "「啊！是啊！！」" 

# monologue
# JP: ハチロクの静かな一言に、\nみくろはぶんぶん、何度も頷く。
2356 = "八六不急不躁的回答，讓美玖路拚命地點頭。" 

# 【みくろ】
# display as 美玖路
# JP: 「D51 1031は――ここで、また走り出した！」
2142 = "「Ｄ５１　１０３１，從現在起再度發車了！」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です。わたくしの、みくろの――そうしてきっと。ご宿泊くださった全ての方の、こころの中で、元気よく」
1995 = "「正是如此。它一定會精神十足地行駛在我的、你的——當然還有所有住在那裡的客人的心中」" 

# monologue
# JP: 頷いている。僕もまた。\n栃木さんも、木本さんも――っ！！
2478 = "我也深有同感。櫪木先生和木本先生一定也一樣——！！" 

# monologue
# JP: （湯富院市長……\nそれに、各地のレストランのオーナーたちも）
2789 = "（湯布院市長……還有各地的餐廳老闆們）" 

# monologue
# JP: 招待をしたみながご出席下さった。\nそれだけでもこの上なくありがたいことというのに――
2486 = "我們邀請的各位賓客都出席了婚禮。他們能來我們就很感激了。" 

# monologue
# JP: その中の多くが、御一夜と離れているにも関わらず、\nトレインホステルを宿泊先に、わざわざ選んで下さった。
2400 = "可其中有很多人，還是特地在離御一夜比較遠的列車旅館訂了房。" 

# monologue
# JP: （凄いな、日々姫は――真闇姉は）
2783 = "（日日姬還有真闇姐太厲害了）" 

# monologue
# JP: 思った瞬間、そうかと気づく。\n当たって当然のことだったのだと。
2302 = "一想到這個，我就恍然大悟。能成功是理所當然的。" 

# monologue
# JP: （トレインホステルは、ふたりの初めての合作だものな）
2790 = "（畢竟列車旅館是兩人的第一次合作啊）" 

# monologue
# JP: 経営者としての真闇姉が、デザイナーとしての日々姫が。
2721 = "身為經營者的真闇姐，以及身為設計者的日日姬。" 

# monologue
# JP: それぞれの視点で描いた絵が、見事に重なり合ったゆえ、\nD51 1031は、僕らのこころに、走る存在となったのだ。
2653 = "用不同的觀點描繪出來的藍圖，巧妙地重合在了一起，所以Ｄ５１　１０３１成為了行駛在我們心中的存在。" 

# 【ハチロク】
# display as 八六
# JP: 「みくろ。あのこに――D51 1031に。\nふたたび走る力をくれて、ありがとう」
2049 = "「美玖路，感謝你給了那孩子——給了Ｄ５１　１０３１再度開動起來的力量」" 

# 【みくろ】
# display as 美玖路
# JP: 「ふあっ」
# 1764 = "「啊」" 

# monologue
# JP: （！）
2779 = "（噢！）" 

# monologue
# JP: ハチロクの声に思い出す。\nそうだ、この成功を遡るなら、起点はみくろだ。
2371 = "八六的話讓我回想了起來。沒錯，如果要追溯這次的成功，那麼美玖路就是起點。" 

# monologue
# JP: たったひとりの、無謀とも思える清掃案が、\nここまでレールを、見事につなげてくれたのだ。
2294 = "一個人策劃出來的，近乎魯莽的清掃方案，讓鐵軌成功延伸到了這裡。" 

# 【みくろ】
# display as 美玖路
# JP: 「あのっ――みくろ、そんな」
1757 = "「哪裡……美玖路才沒有」" 

# 【ハチロク】
# display as 八六
# JP: 「会えたときにはどうしても、そのことを、\nわたくし、お礼したかったのです」
1922 = "「我非常想在見到你的時候，為這件事向你道謝」" 

# 【みくろ】
# display as 美玖路
# JP: 「あ――」
# 1761 = "「啊……」" 

# monologue
# JP: 頬を真っ赤に――耳まで染めて。\nそれでもみくろは、しっかり頷く。
2697 = "美玖路的臉一直紅到了耳朵根。但她還是重重地點了點頭。" 

# monologue
# JP: “結果を出すまで会えない”、とまで敬愛している、\nハチロクの――長姉の声を、逃げずにきちんと受け止める。
2426 = "她沒有逃避，而是接受了這位自己敬愛到“必須幹出一番成績才能見”的長姐——八六的感謝。" 

# 【みくろ】
# display as 美玖路
# JP: 「みくろ、ハチロクお姉さまに褒めてもらえて、\nとってもとっても、嬉しいです！」
2063 = "「能夠受到八六姐姐大人的表揚，美玖路非常非常高興！」" 

# 【ハチロク】
# display as 八六
# JP: 「みくろの38696――あのこでももうすぐ、\n『体験型整備保存』が、はじまるのですよね？」
1678 = "「你的３８６９６——那孩子的“體驗型整備保存”也很快要開始了吧？」" 

# 【みくろ】
# display as 美玖路
# JP: 「はい、そうです！　[ぶんごもり,2]文庫森と[たらぎ,1]鱈木で成功したから。\nだから、やっと準備がととのって！」
1810 = "「嗯，是的！豐後森和多良木都取得了成功。所以那邊的準備也終於就緒了！」" 

# 【ハチロク】
# display as 八六
# JP: 「整備体験が始まったら、きっと、わたくしもまいります。\nみくろ――あなたの半身に、38696に会うために」
1942 = "「整備體驗開始之後，我也一定會去的。去看看美玖路你的分身——３８６９６」" 

# 【みくろ】
# display as 美玖路
# JP: 「はい、みくろ、待ってます！！！」
1845 = "「好的，美玖路期待您的到來！！！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あー！　まだこんなところに！！\n双鉄くん！　式場の方、待ってますよー！！」
1770 = "「啊！你怎麼還在這裡！！雙鐵君！會場那邊已經在等了哦！！」" 

# monologue
# JP: ポーレットが僕に手招きをする。\n時計を見れば――いかん、いささか話しすぎたか。
2623 = "波萊特朝我招手。我看了看手錶——不好，有點聊過頭了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん」
1808 = "「嗯，抱歉」" 

# monologue
# JP: ハチロクが笑う。みくろが手を振る。\n木本さんは会釈をし、栃木さんは指を立てる。
2366 = "八六微笑致意。美玖路招手回應。木本先生微微欠身，而櫪木先生則豎起了手指。" 

# monologue
# JP: 湯富院市長が、シェフたちが、駆け出す僕をそれぞれに、\nそれぞれの笑顔で見送ってくれる――
2634 = "湯布院市長還有主廚們都用笑容目送著開始大步飛奔的我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今すぐに行くっ！」
1920 = "「我這就來！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――綺麗だ」
1847 = "「好美」" 

# monologue
# JP: それしか、言葉が出てこない。
2509 = "我的口中只能冒出這兩個字。" 

# monologue
# JP: ウェデングドレスに包まれた日々姫は、\nまるっきり、物語に出てくるお姫様だ。
2723 = "身著西式婚紗的日日姬根本就是從童話裡走出來的公主。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにも――にぃにぃも――」
2121 = "「阿哥也……阿哥也……」" 

# monologue
# JP: 日々姫もやはり、言葉を出せない。
2587 = "日日姬也已經說不出話來了。" 

# monologue
# JP: けれど潤んで僕を見つめる瞳が、\nなにより雄弁に伝えてくれる。
2345 = "但她注視著我，眼中帶著淚花，此情此景已勝過一切話語。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……まったく着慣れぬタキシードだがな。\n日々姫が喜んでくれているなら、僕も嬉しい」
1394 = "「……雖然這無尾禮服穿著實在彆扭，不過你喜歡的話我也開心」" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ！！！」
1801 = "「嗯！！！」" 

# monologue
# JP: ぶんぶん、何度も大きく頷く。\n涙が、それだけで飛んでしまう。
2429 = "她用力地反覆點頭。淚水也一次又一次被甩了出來。" 

# monologue
# JP: これほど美しく育っても、\nやはり日々姫は、小さな泣き虫の日々姫でもある。
2407 = "哪怕出色成了這樣的美人，日日姬也還是從前的那個小小的愛哭鬼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――っ、っと。\nほら」
2040 = "「給」" 

# monologue
# JP: いつもは尻ポケットにあるハンカチが、\n今日のタキシードでは存在しない。
2454 = "平時放在褲子後袋裡的手帕，穿上無尾禮服之後便無處可放了。" 

# monologue
# JP: ならばと代わりに、\n胸ポケットのチーフを差し出してやる。
2546 = "於是我便把胸前口袋裡的袋巾遞給了她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「泣くな泣くな。泣いてるお前も綺麗だが、\n笑顔の方が、やはり何倍も美しい」
1700 = "「別哭別哭。雖然你哭的時候也很美，但笑起來更是加倍美麗」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 1797 = "「嗯！」" 

# monologue
# JP: 涙をそっと拭いてやる。\nそれだけで、日々姫は落ち着きを取り戻す。
2516 = "我輕輕幫她拭去眼淚。這個小小的動作就讓日日姬恢復了平靜。" 

# monologue
# JP: ……ポケットチーフの扱い方のマナーは知らんが、\nこれが適っていないのならば、僕は喜んで違反しよう。
1367 = "……我雖然不知道使用袋巾的禮儀，不過只要能安撫日日姬，哪怕不合禮儀我也心甘情願。" 

# 【赤井】
# display as 赤井
# JP: 「よろしいですか？」
1723 = "「可以了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ええ――もちろん」
1813 = "「嗯，當然」" 

# monologue
# JP: 赤井宮司の落ち着いた声。\nおかげで、すんなり我に返れる。
2699 = "耳邊傳來赤井宮司平靜的聲音。這讓我一下子回過神來。" 

# monologue
# JP: 新郎新婦入場を終え、日々姫と向き合ったその瞬間に、\n今が式だということさえも、完全に頭から飛んでいた。
2543 = "新郎新娘完成入場，我和日日姬四目相對的那一刻起，婚禮還在進行的事已經完全被我拋在了腦後。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おまたせしてしまいました」
2077 = "「讓您久等了」" 

# 【赤井】
# display as 赤井
# JP: 「いえいえ、[じんぜんしき,2]人前式に相応しい。\nとてもあたたかなやりとりだったかと」
1637 = "「不不，這才叫人前式。我認為剛才兩位的互動很溫馨」" 

# 【双鉄】
# display as 雙鐵
# JP: 「恐縮です」
1879 = "「您過獎了」" 

# 【赤井】
# display as 赤井
# JP: 「さて」
1839 = "「好了」" 

# monologue
# JP: その一言と、わずかな表情の変化とで、\n空気がキリリと引き締まる。
2343 = "他的一句話，再加上細微的表情變化，就讓氣氛一下子緊張了起來。" 

# monologue
# JP: 人前式の司会は初めてとのことであったが、\nさすがは赤井阿蘇神社の宮司なのだと思い知る。
2751 = "雖然是第一次擔任人前式的主持，但我只能說赤井阿蘇神社的宮司還是有實力的。" 

# 【赤井】
# display as 赤井
# JP: 「今日の佳き日に、新郎・右田双鉄さんと、\n新婦・右田[ひびき,2]日々姫さんとは夫婦となられます」
1827 = "「在今天這個喜慶的日子裡，新郎右田雙鐵先生，以及新娘右田日日姬小姐將結為夫婦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1970 = "「是」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1970 = "「是」" 

# 【赤井】
# display as 赤井
# JP: 「おふたりが夫婦になることを、お互いに向け、\n私たち立会人に向け、どうぞご誓約ください」
2074 = "「請兩位向著彼此、向著我們見證人，說出結為夫婦的誓言」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1970 = "「是」" 

# monologue
# JP: 原稿は、何度も何度も書き直しながらしたためた。
2396 = "原稿是在一次次的重寫中整理出來的。" 

# monologue
# JP: けれどもこうしてこの場に立てば、\n言葉は、勝手に溢れ出してくる。
2314 = "不過一旦真的站在了台上，話語就自然而然地脫口而出。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――日々姫を愛しています」
1924 = "「我，愛著日日姬」" 

# monologue
# JP: こころの底から。\n一番深く、傷ついていたところから。
2737 = "這番話發自內心。出自於我受傷最深的地方。" 

