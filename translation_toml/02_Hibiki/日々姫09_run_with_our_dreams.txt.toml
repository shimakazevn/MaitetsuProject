2735 = "這個不斷重複的過程也給我帶來了笑容。日日姬用笑容給我的世界刷上了色彩。" 

# 【双鉄】
# display as 雙鐵
# JP: 「綺麗な世界の中心には、鮮やかな笑顔の中心には、\nそこには、いつでも日々姫が居て。だから、僕は」
1829 = "「在這美麗世界的中心，在這燦爛笑容的中心，永遠都有日日姬的存在。所以我……」" 

# monologue
# JP: 想いが胸にいっぱいになる。\n抱きしめたいし、キスしたい。
2471 = "愛意填滿了我的整個內心。我想抱緊她，想親吻她。" 

# monologue
# JP: 溢れ出してくる衝動を、半ば無理やり、言葉に落とす。
2487 = "我半強迫地把洶湧的衝動轉化為話語。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が好きで。日々姫の笑顔と共に居たくて。\nだから、日々姫――」
1899 = "「我喜歡日日姬。想陪伴日日姬的笑容。所以，日日姬……」" 

# monologue
# JP: ああ、段取りが違ってる。\nけれども、気持ちが止まらない。
2409 = "啊，順序錯了。但是我的感情已無法抑制。" 

# 【ポーレット】
# display as 波萊特
# JP: 「！？　れいな、行って」
