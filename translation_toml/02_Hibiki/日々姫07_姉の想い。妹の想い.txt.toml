[script]
# lines: 454 
# 【ハチロク】
# display as 八六
# JP: 「……電力面では、収まっておりますね」
1429 = "「……Về mặt điện lực thì có vẻ ổn định rồi\nnhỉ」"

# 【れいな】
# display as 玲奈
# JP: 「重量強度計算よしですぅ。\nこの設計なら、安全基準満たしますねぇ」
2245 = "「Tính toán cường độ trọng lượng xong rồi\nạ.\nThiết kế này thì đáp ứng được tiêu chuẩn\nan toàn nha」"

# 【日々姫】
# display as 日日姬
# JP: 「あ」
1829 = "「A」"

# monologue
# JP: 日々姫の頬がようやく緩む。
2765 = "Gương mặt Hibiki cuối cùng cũng giãn ra."

# 【凪】
# display as 凪
# JP: 「メニューもばっちりイケとるばい！」
2159 = "「Thực đơn cũng hoàn hảo luôn nè!」"

# 【ふかみ】
# display as 深美
# JP: 「ほんと。どれもおいしそうだし、朝もお昼も、\nスイーツも晩ごはんも、待ち遠しくなっちゃいそう」
2021 = "「Đúng vậy. Món nào trông cũng ngon, dù là\nbữa sáng hay bữa trưa,\nđồ ngọt hay bữa tối, đều làm người ta mong\nđợi」"

# 【稀咲】
# display as 稀咲
# JP: 「コストも良く考えてあるね。\n仮に人件費が40になっても、これなら利益を出せる」
1872 = "「Chi phí cũng được cân nhắc kỹ lưỡng nhỉ.\nGiả sử chi phí nhân sự có lên 40 thì thế\nnày vẫn sinh lời được」"

# 【ふかみ】
# display as 深美
# JP: 「え？　人件費が40って――\n40万円ってことですか？」
1809 = "「Hả? Chi phí nhân sự 40 là——\n400 nghìn yên sao ạ?」"

# monologue
# JP: クマ川下り経営サイドの人間として、\nやはり気になるところなのだろう。
2972 = "Với tư cách là người bên phía kinh doanh\ndu thuyền trên sông Kuma,\nchắc hẳn em ấy sẽ để tâm đến điều này."

# monologue
# JP: ふかみの踏み込んだ質問に、稀咲は笑って――\n試す視線を日々姫へ送る。
2562 = "Trước câu hỏi đi thẳng vào vấn đề của\nFukami, Kisaki mỉm cười——\nvà đưa ánh mắt dò xét về phía Hibiki."

# 【日々姫】
# display as 日日姬
# JP: 「40は40\%のこと。\nふかみちゃん、[エフエル,1]ＦＬコスト、って言葉、知ってる？」
2280 = "「40 là 40%.\nFukami, em có biết từ 'chi phí FL' không?」"

# 【ふかみ】
# display as 深美
# JP: 「あう……聞いたこと、ない。です」
1831 = "「A ư……em chưa từng nghe, ạ」"

# 【日々姫】
# display as 日日姬
# JP: 「私も勉強したばっかりの、飲食店用語なの。\nFが[フード,3]foodで原材料費。Lは[レイバー,4]laborで人件費」
1938 = "「Đó là thuật ngữ ngành nhà hàng mà chị\ncũng vừa mới học.\nF là Food, tức chi phí nguyên vật liệu. L\nlà Labor, tức chi phí nhân sự」"

# 【ふかみ】
# display as 深美
# JP: 「そうなんですか」
2054 = "「Vậy sao ạ」"

# monologue
# JP: ふかみにシンクロするように、\n稀咲までもが頷いている。
2870 = "Như đồng điệu với Fukami,\nngay cả Kisaki cũng gật đầu."

# monologue
# JP: 抜き打ち試験に日々姫はどうやら、\n合格点を示せているようだ。
2738 = "Có vẻ như Hibiki đã đạt điểm chuẩn\ntrong bài kiểm tra đột xuất này."

# 【日々姫】
# display as 日日姬
# JP: 「で、FとLの合計が、FLコスト。\nこれが売上高の60\%以内なら、経営的には安全圏って」
2281 = "「Và tổng của F và L chính là chi phí FL.\nNếu nó nằm trong mức 60% doanh thu thì về\nmặt kinh doanh được coi là vùng an toàn」"

# 【ふかみ】
# display as 深美
# JP: 「へぇえ、勉強になります。です！」
1798 = "「Hê, em học hỏi được nhiều điều quá. Ạ!」"

# monologue
# JP: 力強く頷いて、ふかみはスマホをいじり始める。\n多分、メモ的な何かを取っているのだろう。
2824 = "Gật đầu mạnh mẽ, Fukami bắt đầu thao tác\ntrên điện thoại.\nCó lẽ em ấy đang ghi chú lại thứ gì đó."

# 【ポーレット】
# display as 波萊特
# JP: 「固定型の飲食店より、食堂列車の方が、人件費も、\n文字通りのランニングコストも、かかるんですよ」
2068 = "「So với nhà hàng cố định, toa ăn trên tàu\nsẽ tốn kém chi phí nhân sự\nvà chi phí vận hành đúng nghĩa đen hơn\nnhiều đấy」"

# 【凪】
# display as 凪
# JP: 「どうしてばい？」
2092 = "「Tại sao vậy?」"

# 【ふかみ】
# display as 深美
# JP: 「あ、それはわかるかも。車掌さんとか運転士さんも\n必要だし、水とか電気とかのこと考えたって」
1841 = "「A, chuyện đó thì em có thể hiểu được. Vì\ncần có trưởng tàu và lái tàu,\nrồi còn phải lo chuyện điện nước nữa」"

# 【凪】
# display as 凪
# JP: 「ああ、水道ひねってジャーってはいかなかと――あ！」
1845 = "「A, không thể cứ vặn vòi nước là chảy ào\nào được——a!」"

# monologue
# JP: 凪の表情がパっと輝く。
2457 = "Vẻ mặt Nagi bừng sáng."

# 【凪】
# display as 凪
# JP: 「凪さま、よかアイディア思いついたばい！」
2061 = "「Nagi đại nhân vừa nghĩ ra một ý tưởng hay\nlắm nè!」"

# 【双鉄】
# display as 雙鐵
# JP: 「念のためだが――炭水車の水は使えんぞ？」
1943 = "「Nhắc để phòng hờ thôi——không dùng nước\ntrong toa tiếp than nước được đâu nhé?」"

# 【凪】
# display as 凪
# JP: 「！！？　にーさん、凪さまの心よみよったと！？」
1868 = "「!!? Anh hai, anh đọc được suy nghĩ của\nNagi đại nhân sao!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「よまずともわかる。\n機関士ならば、一瞬はこころに浮かぼうからな」
1729 = "「Không cần đọc cũng biết.\nVì nếu là lái tàu thì ai cũng sẽ nghĩ đến\nđiều đó trong giây lát thôi」"

# 【凪】
# display as 凪
# JP: 「にーさんも考えよったと？\nどぎゃん理由で炭水車の水ばいけんと？」
1877 = "「Anh hai cũng từng nghĩ vậy hả?\nLý do gì mà nước trong toa tiếp than nước\nlại không được?」"

# 【双鉄】
# display as 雙鐵
# JP: 「水タンクには無濾過の井戸水をがんがん入れる。\n飲用に必要な水質検査などをまったく受けていない」
2075 = "「Nước giếng chưa qua lọc được bơm ầm ầm\nvào bồn chứa nước.\nHoàn toàn chưa được kiểm tra chất lượng\nnước cần thiết để uống」"

# 【凪】
# display as 凪
# JP: 「あー、そりゃいけんばい」
1848 = "「A, thế thì không được rồi」"

# monologue
# JP: でなくとも、水タンク自体がそう清潔なわけではないし、\n第一、イメージがよろしくない。
2564 = "Dù không phải vậy thì bản thân bồn chứa\nnước cũng chẳng sạch sẽ gì,\nquan trọng nhất là ấn tượng không tốt."

# 【双鉄】
# display as 雙鐵
# JP: 「食は水。そこを間に合わせですませるように思われては、\n観光リゾート食堂車としての根底が成立しなくなる」
2273 = "「Ẩm thực là nước. Nếu để người ta nghĩ\nrằng chúng ta dùng nước tạm bợ,\nthì nền tảng của một toa ăn du lịch nghỉ\ndưỡng sẽ không thể tồn tại được」"

# 【凪】
# display as 凪
# JP: 「じゃ、そこにはきっちりお金かけんといけんねー」
2238 = "「Vậy thì chỗ đó phải chi tiền đàng hoàng\nrồi ha」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。食堂列車で食事をおろそかにはできん。\nが、走るたび赤字になっては、運行を継続できない」
2018 = "「Đúng vậy. Đã là toa ăn thì không thể làm\nqua loa chuyện ăn uống được.\nNhưng cứ chạy là lỗ thì không thể duy trì\nvận hành được」"

# 【凪】
# display as 凪
# JP: 「そりゃそうばい！　ばってん、今の話だと――\n削れるとこって、少なそうばい」
2028 = "「Đúng là vậy nè! Nhưng mà, theo như câu\nchuyện vừa rồi——\nthì có vẻ ít chỗ có thể cắt giảm chi phí\nlắm á」"

# 【ふかみ】
# display as 深美
# JP: 「それにこのメニュー……凄く原価率高そう――です。\n馬肉とか、鮎とか――あ！　スポンサー！！？」
2149 = "「Hơn nữa thực đơn này……tỷ lệ giá vốn có vẻ\nrất cao——ạ.\nThịt ngựa này, cá hương này——A! Nhà tài\ntrợ!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それもある。メニューに店名とお取り寄せの案内とを\n併記し、広告費相殺でコストを抑える」
2207 = "「Cũng có chuyện đó. Ghi tên quán và thông\ntin đặt hàng\nlên thực đơn để lấy chi phí quảng cáo bù\nđắp chi phí」"

# 【稀咲】
# display as 稀咲
# JP: 「へぇ」
2037 = "「Hê」"

# monologue
# JP: 稀咲が漏らすのは感心の声。
2871 = "Kisaki thốt lên tiếng cảm thán."

# 【稀咲】
# display as 稀咲
# JP: 「スポンサーは予測していたけれど――\n『それもある』、なら、他にも工夫が？」
2059 = "「Tài trợ thì em đã đoán trước được rồi——\nnhưng 'cũng có chuyện đó' nghĩa là còn\ncách nào khác sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「そうなんです！　稀咲先輩！」
2047 = "「Đúng vậy đó! Chị Kisaki!」"

# monologue
# JP: 厨房で、山崎さんから学んだこと。\n日々姫はそれを、パズルのピースとしてみせた。
2749 = "Những điều học được từ cô Yamazaki trong\nbếp.\nHibiki đã đưa nó ra như một mảnh ghép."

# 【日々姫】
# display as 日日姬
# JP: 「原価率を抑えるためには、廃棄食材を極力減らす。\nそのためには、１食材を複数の形で使えるようにする」
2167 = "「Để giảm tỷ lệ giá vốn, phải hạn chế tối\nđa thực phẩm bỏ đi.\nĐể làm được điều đó, phải sử dụng một\nnguyên liệu dưới nhiều hình thức khác\nnhau」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ……なるほどね。\n確かにメニューをよく見るとそうなっているか」
1828 = "「A……ra là vậy.\nQuả thật nhìn kỹ thực đơn thì thấy đúng là\nnhư vậy」"

# 【日々姫】
# display as 日日姬
# JP: 「けど、選ぶ楽しさも必要だって思うんです。\nだから、事前にコースを選択してもらって――」
1749 = "「Nhưng em nghĩ niềm vui khi được lựa chọn\ncũng cần thiết.\nVì vậy, em sẽ để họ chọn set ăn từ\ntrước——」"

# monologue
# JP: たとえば、鮎。\n塩焼きは、朝の和定食のみで提供する。
2802 = "Ví dụ như cá hương.\nMón nướng muối chỉ phục vụ trong suất ăn\nkiểu Nhật buổi sáng."

# monologue
# JP: 同時に、鮎つみれも仕込みしておき、\n昼は吸い物、夜には揚げ物。骨も骨揚か骨酒とする。
2497 = "Đồng thời, chuẩn bị sẵn chả cá hương,\ntrưa nấu canh trong, tối làm món chiên.\nXương cũng đem chiên hoặc ngâm rượu."

# 【稀咲】
# display as 稀咲
# JP: 「なるほど、全席指定で、コースも事前選択ならば、\n食材ロスは、究極的に減らせるんだね」
2014 = "「Ra vậy, nếu toàn bộ là ghế đặt trước và\nset ăn cũng chọn từ trước,\nthì có thể giảm thiểu tối đa sự lãng phí\nnguyên liệu nhỉ」"

# 【日々姫】
# display as 日日姬
# JP: 「そうなんです。で、調理方法も限定できますから、\n厨房設備から、コンロをひとつ削ることも出来ました」
2044 = "「Đúng vậy. Và vì có thể giới hạn phương\npháp chế biến,\nnên em cũng có thể bớt đi một cái bếp ga\ntrong thiết bị nhà bếp」"

# monologue
# JP: 山崎さんと、山崎さんが紹介してくれた厨房設備士さんと\n相談し、徹底的な検討をした。
2632 = "Tôi đã thảo luận với cô Yamazaki và chuyên\ngia thiết bị nhà bếp\nmà cô ấy giới thiệu, và đã xem xét một\ncách triệt để."

# monologue
# JP: コンロを二個から一個に。たったそれだけの削減で、\n全てのピースを、ギリギリでだが収めきれた。
2561 = "Giảm từ hai bếp ga xuống còn một cái. Chỉ\nvới sự cắt giảm đó,\nđã có thể lắp ráp tất cả các mảnh ghép lại\nvới nhau một cách vừa vặn."

# 【日々姫】
# display as 日日姬
# JP: 「メニューについては、御一夜ステーションカフェでの\nアンケートと、モニター調査もしています」
2247 = "「Về thực đơn, em cũng đã làm khảo sát và\nđiều tra thử nghiệm\ntại quán cà phê ga Ohimitera」"

# monologue
# JP: より適正な満足度を図るための有料モニター調査でも、\n試食希望者の抽選が発生するほどだった。
2828 = "Ngay cả trong cuộc điều tra thử nghiệm có\nthu phí để đo lường mức độ hài lòng chính\nxác hơn,\ncũng phải tổ chức bốc thăm vì có quá nhiều\nngười muốn dùng thử."

# monologue
# JP: 食後のアンケートの満足度も92\%が五つ星。\n残りも四つ星という高アベレージに収まった。
2981 = "Mức độ hài lòng trong khảo sát sau bữa ăn\ncũng đạt 92% đánh giá 5 sao.\nPhần còn lại cũng đạt điểm trung bình cao\nlà 4 sao."

# 【稀咲】
# display as 稀咲
# JP: 「……ふぅん。ポジションを取っていることを加味しても、\nこの成績なら、メニュー面での不満も出なさそうだね」
1424 = "「……Hừm. Dù có tính đến yếu tố chủ quan đi\nnữa,\nthì với thành tích này, có vẻ sẽ không có\nsự bất mãn nào về mặt thực đơn đâu」"

# 【凪】
# display as 凪
# JP: 「おいしそーばい！\nどっちのコースも食べて見たかと！！」
2111 = "「Trông ngon quá nè!\nSet nào em cũng muốn ăn thử hết!!」"

# 【ふかみ】
# display as 深美
# JP: 「うん、わたしも。朝は和定食で。お昼と夜は洋風で、\n帰りには逆で食べてみたい」
1859 = "「Ừm, chị cũng vậy. Sáng ăn suất kiểu Nhật.\nTrưa và tối ăn kiểu Tây,\nlúc về chị muốn ăn ngược lại」"

# 【ポーレット】
# display as 波萊特
# JP: 「安全面、設備面、メニューのことまで考えられてる、\nすごく素敵な厨房デザインだって思います」
1721 = "「Em nghĩ đây là một thiết kế nhà bếp rất\ntuyệt vời,\nđã cân nhắc đến cả mặt an toàn, thiết bị\nvà thực đơn」"

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1825 = "「A——」"

# monologue
# JP: 日々姫が僕を振り返り見る。\n笑顔で強く、頷き返す。
2745 = "Hibiki ngoảnh lại nhìn tôi.\nTôi mỉm cười và gật đầu mạnh mẽ đáp lại."

# 【日々姫】
# display as 日日姬
# JP: 「――ありがとうございます！」
1874 = "「——Cảm ơn chị!」"

# monologue
# JP: 努力が実った。認められた。\nじわじわと、日々姫の頬の赤みが増してく。
2466 = "Nỗ lực đã đơm hoa kết trái. Đã được công\nnhận.\nGương mặt Hibiki dần ửng đỏ lên."

# monologue
# JP: 社長であるポーレットの決裁が貰えたのなら、\n厨房設備は、これで確定として構わない。
2675 = "Nếu đã nhận được sự phê duyệt của giám đốc\nPaulette,\nthì thiết bị nhà bếp coi như đã được chốt."

# 【ポーレット】
# display as 波萊特
# JP: 「それで、棚あげになってた列車全体の名前、\n及び、コンセプトと外装デザインなんですけれど」
2240 = "「Vậy, về cái tên của toàn bộ đoàn tàu đang\nbị trì hoãn,\ncũng như ý tưởng và thiết kế ngoại thất\nthì sao」"

# 【日々姫】
# display as 日日姬
# JP: 「それ、まだひとつだけなんですけど、\nアイディアはあります」
2248 = "「Chuyện đó, dù chỉ mới có một thôi,\nnhưng em đã có ý tưởng rồi」"

# monologue
# JP: 日々姫がすぐさま資料を取り出す。\n資料といっても、いつものスケッチブックだが。
2782 = "Hibiki ngay lập tức lấy tài liệu ra.\nGọi là tài liệu, nhưng thực chất là cuốn\nsổ phác thảo như mọi khi."

# 【日々姫】
# display as 日日姬
# JP: 「湯富院市長のお話やステーションカフェの経験から、\n私、すごく思ったんです」
2065 = "「Từ câu chuyện của thị trưởng Yufuin và\nkinh nghiệm ở quán cà phê ga,\nem đã suy nghĩ rất nhiều」"

# 【凪】
# display as 凪
# JP: 「わ！　綺麗ばい！　深ーか青ばい！\n朝はやくの、山の色ばい！！」
1800 = "「Oa! Đẹp quá nè! Xanh thẳm luôn á!\nLà màu của ngọn núi lúc sáng sớm nè!!」"

# 【ふかみ】
# display as 深美
# JP: 「クマ川の水の色みたい」
1905 = "「Giống như màu nước sông Kuma vậy」"

# 【稀咲】
# display as 稀咲
# JP: 「日の出の、ほんの一瞬前。\nブルー・モーメントの空の蒼だね」
2040 = "「Là màu xanh của bầu trời vào khoảnh khắc\n'Blue Moment',\nngay trước lúc mặt trời mọc nhỉ」"

# monologue
# JP: 日々姫が車両を彩った青を、それぞれの言葉が、\nそれぞれの綺麗を示して、讃えてくれる。
2800 = "Mỗi người dùng những lời lẽ khác nhau,\nđể ca ngợi vẻ đẹp của màu xanh mà Hibiki\nđã tô điểm cho toa xe."

# monologue
# JP: レールショップを、\n広がる笑顔が色づけていく。
2395 = "Những nụ cười lan tỏa,\ntô điểm thêm màu sắc cho Cửa hàng đường\nsắt."

# 【日々姫】
# display as 日日姬
# JP: 「ありがとうございます。だから、青にしたんです。\n山の、水の、空の、全ての色だから」
2182 = "「Cảm ơn mọi người. Vì thế nên em mới chọn\nmàu xanh.\nVì nó là màu của núi, của nước, của bầu\ntrời, của tất cả mọi thứ」"

# monologue
# JP: 言って、日々姫の指が動く。
2779 = "Vừa nói, ngón tay Hibiki vừa chuyển động."

# monologue
# JP: 列車イラストのその下に、\nしゅ、しゅと、線が伸ばされる。
2880 = "Dưới hình minh họa đoàn tàu,\nnhững đường nét được kéo dài ra, xoẹt,\nxoẹt."

# 【日々姫】
# display as 日日姬
# JP: 「レールが繋がったその先と――\n駅と駅とは、お隣同士になれる」
2101 = "「Nơi những đường ray nối tiếp nhau——\ncác nhà ga có thể trở thành hàng xóm của\nnhau」"

# 【ハチロク】
# display as 八六
# JP: 「お隣同士……確かに、ですね。\n例え、駅間がどれほど離れておりましょうとも」
2242 = "「Hàng xóm của nhau……Quả đúng là vậy nhỉ.\nCho dù khoảng cách giữa các nhà ga có xa\nđến đâu đi chăng nữa」"

# 【れいな】
# display as 玲奈
# JP: 「ふたつ先の駅は、おとなりさんのおとなりさんですねぇ。うふふぅ、どこまでもご近所さんですぅ」
1980 = "「Nhà ga cách hai bến là hàng xóm của hàng\nxóm nha. Ufufu, dù ở đâu cũng là láng\ngiềng hết đó ạ」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうね、れいな。本当に」
2034 = "「Đúng vậy, Reina. Thật sự là thế」"

# 【日々姫】
# display as 日日姬
# JP: 「この列車は、九州全土をつなぐための最初の一両。\nだから、名前は――」
2216 = "「Đoàn tàu này là toa xe đầu tiên để kết\nnối toàn bộ Kyushu.\nVì vậy, tên của nó là——」"

# monologue
# JP: 『つなげる食堂』
1360 = "『Toa ăn Kết nối』"

# monologue
# JP: スケッチの上に日々姫が書く。\n照れくさそうに、それでも、隠すことなしに。
2747 = "Hibiki viết lên bản phác thảo.\nTrông có vẻ ngượng ngùng, nhưng vẫn không\nhề giấu giếm."

# 【ハチロク】
# display as 八六
# JP: 「つなげるための、食堂列車。\n簡潔にして明瞭。よいお名前かと存じます」
2100 = "「Toa ăn, để kết nối.\nNgắn gọn và rõ ràng. Tôi nghĩ đó là một\ncái tên hay ạ」"

# 【れいな】
# display as 玲奈
# JP: 「お空を、お山を、お水を――つなげるための\n食堂車さんなんですねぇ」
1884 = "「Là toa ăn dùng để kết nối——bầu trời, ngọn\nnúi,\nvà dòng nước đúng không ạ」"

# 【凪】
# display as 凪
# JP: 「覚えやすいばい！　つな[しょく]食ばい！！」
1878 = "「Dễ nhớ nè! Gọi tắt là Tsunashoku đi!!」"

# 【ふかみ】
# display as 深美
# JP: 「って、凪ちゃん！　その略称じゃ、ツナ缶ばっかり、\n出てくるみたいに聞こえちゃうよ～」
1899 = "「Gì vậy, Nagi! Gọi tắt thế nghe như thể\nchỉ phục vụ toàn cá ngừ đóng hộp thôi á~」"

# 【稀咲】
# display as 稀咲
# JP: 「略称はともかくいいんじゃないかな。\n妙に気取った横文字よりも、よほどボクたちらしい」
2137 = "「Khoan bàn đến tên viết tắt thì cái tên\nnày cũng hay mà.\nSo với mấy từ ngoại lai làm điệu kỳ quặc\nthì nó hợp với chúng ta hơn nhiều」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、賛成です。名前にも、デザインにも。\nそれからもちろん、コンセプトにも」
1941 = "「Em cũng tán thành. Cả tên gọi, thiết kế.\nVà dĩ nhiên là cả ý tưởng nữa」"

# monologue
# JP: 九洲全土をいつかつなげるそのための――\nひとつにつながり、世界と向き合うそのための――
2837 = "Để một ngày nào đó kết nối toàn bộ\nKyushu——\nĐể hòa làm một, và đối mặt với thế giới——"

# monologue
# JP: たったの二両編成の、\n今の僕らの精一杯の、食堂気動車。
2858 = "Chỉ với hai toa tàu ghép lại,\nlà toa ăn tự hành chứa đựng tất cả tâm\nhuyết của chúng tôi lúc này."

# 【双鉄】
# display as 雙鐵
# JP: 「つなげる食堂」
2138 = "「Toa ăn Kết nối」"

# monologue
# JP: 舌に乗せても、悪くない。\n自然と、大きく頷いている。
2935 = "Đọc lên nghe cũng không tệ.\nTôi tự nhiên gật đầu thật mạnh."

# 【双鉄】
# display as 雙鐵
# JP: 「決まりだな。なら、この件はこの件として――\n湯富院のD51の件だが、湯富院市長からの内諾は得た」
2230 = "「Quyết định vậy đi. Vậy thì, chuyện này\ncoi như xong——\nVề chuyện đầu máy D51 ở Yufuin, tôi đã\nnhận được sự đồng ý nội bộ từ thị trưởng\nYufuin rồi」"

# 【日々姫】
# display as 日日姬
# JP: 「内諾って、観光体験型整備清掃の！？」
1986 = "「Đồng ý nội bộ là sao, về việc dọn dẹp bảo\ndưỡng trải nghiệm du lịch ấy ạ!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そちらは拒まれた。得られたのは無償譲渡の内諾だ。\n移送費が移送先負担なら、どこへ持っていってもいいと」
2210 = "「Chuyện đó bị từ chối rồi. Cái nhận được\nlà sự đồng ý nội bộ về việc chuyển nhượng\nmiễn phí.\nÔng ấy bảo nếu bên nhận chịu chi phí vận\nchuyển thì muốn mang đi đâu cũng được」"

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1825 = "「啊……」" 

# monologue
# JP: 失望と安堵とが等分に混じったような長い息。\n移送費は当然巨額になろうゆえ、そう簡単な話ではない。
2553 = "Một tiếng thở dài pha trộn đồng đều giữa\nthất vọng và nhẹ nhõm.\nChi phí vận chuyển dĩ nhiên sẽ rất khổng\nlồ, nên đây không phải là chuyện đơn giản."

# 【双鉄】
# display as 雙鐵
# JP: 「で、だ」
1977 = "「Và, chuyện là thế này」"

# monologue
# JP: ポーレットへと視線を向ければ、すぐに頷きが帰ってくる。
2646 = "Khi tôi hướng ánh mắt về phía Paulette, cô\nấy lập tức gật đầu đáp lại."

# 【ポーレット】
# display as 波萊特
# JP: 「その条件で、御一夜鉄道として、引受先を探します。\n第一候補は、もちろん[くるだい,1]来大鉄道――文庫森機関庫で」
1962 = "「Với điều kiện đó, Đường sắt Ohito sẽ tìm\nkiếm nơi tiếp nhận.\nỨng cử viên số một, dĩ nhiên là Đường sắt\nKurudai——tại xưởng đầu máy Bungomori」"

# 【日々姫】
# display as 日日姬
# JP: 「え！？　それって、任せちゃってよかとですか？」
1814 = "「Hả!? Chuyện đó, giao cho chị có được\nkhông ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「もちろん、任せてもらえるなら、ですけど」
2109 = "「Dĩ nhiên rồi, nếu mọi người tin tưởng\ngiao cho chị」"

# 【日々姫】
# display as 日日姬
# JP: 「おまかせします！　甘えます！\nポーレットさんの鉄道人脈に、頼りまくります！！」
1741 = "「Trăm sự nhờ chị! Tụi em ỷ lại vào chị đó!\nTụi em sẽ hoàn toàn dựa dẫm vào mạng lưới\nquan hệ đường sắt của chị Paulette!!」"

# 【ポーレット】
# display as 波萊特
# JP: 「なら、責任をもってお引き受けしちゃいますね」
2231 = "「Vậy thì chị sẽ nhận lấy trách nhiệm này\nnhé」"

# monologue
# JP: 市長と社長。その両方の負荷を一心に背負っていたがゆえ、\n今もってなおポーレットにしか出来ないことは数多あり。
2814 = "Thị trưởng và giám đốc. Vì đã một lòng\ngánh vác cả hai trọng trách đó,\nnên đến tận bây giờ vẫn có rất nhiều việc\nchỉ Paulette mới có thể làm được."

# monologue
# JP: であるがゆえ、デザイナーと市長との兼務の負担を、\nポーレットは、軽減させようとしてくれている。
2413 = "Chính vì vậy, Paulette đang cố gắng giảm\nbớt gánh nặng\ncho người kiêm nhiệm cả vai trò nhà thiết\nkế và thị trưởng."

# 【双鉄】
# display as 雙鐵
# JP: 「本当に心強いし、大いに助かる。\nいつもながらだが――ありがとう」
2058 = "「Thật sự rất vững tâm, và giúp ích được\nrất nhiều.\nDù là chuyện thường ngày nhưng——cảm ơn cô」"

# 【ポーレット】
# display as 波萊特
# JP: 「いえいえ、わたしたちの仲じゃ」
1717 = "「Không có chi, quan hệ giữa chúng ta mà」"

# 【日々姫】
# display as 日日姬
# JP: 「あのっ！」
2226 = "「Cái đó!」"

# monologue
# JP: 切羽詰まったような声。\nポーレットの声がぎくりと止まる。
2751 = "Giọng nói như thể bị dồn vào đường cùng.\nGiọng Paulette giật mình im bặt."

# 【日々姫】
# display as 日日姬
# JP: 「あの――甘えついでっていったらアレですけど。\nもうひとつだけ、一人にだけ――私、確認、取りたくて」
2225 = "「Cái đó——nhân tiện ỷ lại thì nói ra hơi\nkỳ.\nNhưng em muốn xin xác nhận, thêm một điều\nnữa, từ một người duy nhất——」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1855 = "「Ừ」"

# monologue
# JP: 確かにそれは、甘えであって、わがままだ。
2965 = "Đó quả thực là sự ỷ lại, và là sự ích kỷ."

# monologue
# JP: 『御一夜鉄道の案件』に、御一夜鉄道の部外者の、\n意見を求め、判断基準にしようとするなら。
2840 = "Bởi vì em ấy muốn lấy ý kiến của một người\nngoài Đường sắt Ohito\nlàm tiêu chuẩn phán đoán cho 'dự án của\nĐường sắt Ohito'."

# 【日々姫】
# display as 日日姬
# JP: 「真闇姉にも――私、\nつなげる食堂の図面。見せて、オーケーもらいたかけん」
1954 = "「Em muốn——cho chị Mayami xem bản vẽ của\nToa ăn Kết nối.\nVà nhận được sự đồng ý từ chị ấy」"

# monologue
# JP: が――
2425 = "Nhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1740 = "「Cũng phải」"

# monologue
# JP: 僕はもちろん、日々姫の味方だ。\n日々姫の想い。真闇姉の想い。ゆえの、距離感。
2644 = "Tôi dĩ nhiên là đồng minh của Hibiki.\nTâm tư của Hibiki. Tâm tư của chị Mayami.\nTừ đó sinh ra khoảng cách."

# monologue
# JP: そこを埋めていくための、\nこれはきっと、最良の機会であると思うから。
2920 = "Để lấp đầy khoảng cách đó,\ntôi nghĩ đây chắc chắn là cơ hội tốt nhất."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、見てもらったほうがいいと思います。\n真闇さんなら、乗客代表の目で、見てくれそうですし」
1939 = "「Chị cũng nghĩ là nên cho chị ấy xem.\nNếu là chị Mayami, chị ấy sẽ nhìn nhận\nbằng con mắt đại diện cho hành khách」"

# 【稀咲】
# display as 稀咲
# JP: 「確かに。それに、ボクとは違う、現場の経営者としての\n目線でも、チェックをしてくれようし」
2126 = "「Đúng vậy. Hơn nữa, chị ấy cũng sẽ kiểm\ntra dưới góc nhìn\ncủa một nhà quản lý hiện trường, khác với\ntôi」"

# 【ふかみ】
# display as 深美
# JP: 「真闇さんがお墨付きをくれたら、つなげる食堂に\n興味をもってくれる人、きっと、もっと増えます。です」
2169 = "「Nếu chị Mayami đã đảm bảo, thì số người\nquan tâm\nđến Toa ăn Kết nối chắc chắn sẽ tăng lên\nnhiều hơn. Ạ」"

# monologue
# JP: ポーレットが、稀咲が、ふかみが――\nそれぞれの立場から、日々姫の希望を支えてくれる。
2813 = "Paulette, Kisaki, Fukami——\ntừ lập trường của mỗi người, họ đều ủng hộ\nnguyện vọng của Hibiki."

# monologue
# JP: 『単なる感傷ではない』と。確かな理由を与えてくれる。
2526 = "「Ừm. Nếu vậy thì」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ならば」
1824 = "「Nhưng mà, lỡ không được đảm bảo thì sao\nnè?」"

# 【凪】
# display as 凪
# JP: 「ばってん、もしお墨付きばもらえんかったら、\nどぎゃんすっと？」
1751 = "「Chờ đã, Nagi!?」\n「!?」"

# 【ふかみ】
# display as 深美＆日日姬
# JP: 「ちょ、凪ちゃん！？」\n「っ！？」
1900 = "「Không——không sao đâu」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――構わん」
1733 = "「Không——không sao đâu」"

# monologue
# JP: その可能性は、ゼロではない。\nゆえに、考えておく必要がある。
2959 = "Khả năng đó không phải là con số không.\nVì vậy, cần phải suy nghĩ trước."

# monologue
# JP: 決裁者であるポーレットの内諾を受けたこの状態で、\n単なる身内、姉の意見を、どれほど重く捉えるのかを。
2606 = "Trong tình trạng đã nhận được sự đồng ý\nnội bộ từ người ra quyết định là Paulette,\nviệc coi trọng ý kiến của một người thân,\nmột người chị gái đến mức nào."

# 【日々姫】
# display as 日日姬
# JP: 「心配なかとよ！　きっと、わかってもらえるし。\nそうならなくても、わかりあえるとこ、見つけるけん！」
1724 = "「Không phải lo đâu! Chắc chắn chị ấy sẽ\nhiểu thôi.\nDù không được thì em cũng sẽ tìm ra điểm\nchung để thấu hiểu nhau!」"

# monologue
# JP: けれども軽く、そして明るく、日々姫は笑う。
2773 = "Nhưng Hibiki lại mỉm cười nhẹ nhàng và\nrạng rỡ."

# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇ。私のねぇねぇやけんね！」
2104 = "「Chị gái mà. Là chị gái của em mà!」"

# 【真闇】
# display as 真闇
# JP: 「ん～……」
1822 = "「Ưm~……」"

# monologue
