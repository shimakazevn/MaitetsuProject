1991 = "「Vì chúng ta không có được điều đó.\nNên chúng ta hãy kết nối rộng rãi hơn」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
1856 = "「Vâng!」"

# monologue
# JP: 沿線全ての瞳ともしも繋がれるなら、\nそれは真闇姉よりさらに、必ず広くを見渡せる。
2556 = "Nếu có thể kết nối với mọi ánh mắt dọc\ntheo tuyến đường,\nthì chắc chắn sẽ nhìn xa trông rộng hơn cả\nchị Mayami."

# 【双鉄】
# display as 雙鐵
