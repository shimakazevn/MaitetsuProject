1930 = "「Bác khen quá lời rồi——nhưng cháu rất vui\nạ.\nThật sự cảm ơn bác rất nhiều」"

# 【木本】
# display as 木本
# JP: 「いやいや、これでも言葉がたりんくらいです」
1719 = "「Không không, nhiêu đây lời khen vẫn chưa\nđủ đâu」"

