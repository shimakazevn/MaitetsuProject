# monologue
# JP: ささやかゆえにかけがえのない繋がりが、\nふたり、こころを合わせたのなら、蘇ってくる。
2451 = "Mối liên kết nhỏ bé nhưng không thể thay\nthế,\nsẽ hồi sinh nếu hai người đồng lòng."

# 【双鉄】
# display as 雙鐵
