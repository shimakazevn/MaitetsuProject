2398 = "Không thể lên tàu, có lẽ không chỉ có một\nmình chị Mayami."

# monologue
# JP: 僕らが見落とした全てのひとたち――\n彼らの抱く感想も、恐らく同じものとなろう。
2607 = "Tất cả những người mà chúng tôi đã bỏ\nsót——\nCảm nghĩ của họ có lẽ cũng sẽ giống như\nvậy."

# 【双鉄】
# display as 雙鐵
