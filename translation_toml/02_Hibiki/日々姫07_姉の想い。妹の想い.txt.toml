# 【双鉄】
# display as 雙鐵
# JP: 「ならば、落ち着いて考えてみよう」
2229 = "「Nếu vậy, hãy bình tĩnh suy nghĩ xem nào」"

# monologue
# JP: だが、情けなくとも頼りなくとも、\nそれでも出来ることはある。
2423 = "Tuy nhiên, dù có thảm hại hay không đáng\ntin cậy,\ntôi vẫn có những việc có thể làm."

# monologue
# JP: 泣きだして、閉じてしまった日々姫の瞳を、\nうっすらとでも、開く手助けはしてやれる。
2654 = "Tôi có thể giúp em ấy mở lại đôi mắt\nđã nhắm nghiền vì khóc, dù chỉ là hé mở."

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉が見たものは何か。\n僕らが見落としてしまったものは、何なのか」
2122 = "「Thứ chị Mayami nhìn thấy là gì.\nThứ chúng ta đã bỏ sót, là gì」"

# 【日々姫】
# display as 日日姬
# JP: 「わからんけん――それが、私にはわからんけんっ」
1726 = "「Em không biết——chuyện đó, em không biết\nmà」"

# 【双鉄】
# display as 雙鐵
# JP: 「だが、僕もいる。\nふたりでならば、見えるかもしれん」
1757 = "「Nhưng, có anh ở đây.\nNếu là hai người, có lẽ sẽ nhìn thấy」"

# monologue
# JP: （こつっ）
2995 = "（Cộc）"

# monologue
# JP: おでこを日々姫にくっつける。\n体温ごと、僕の気持ちを声へと乗せる。
2640 = "Tôi chạm trán mình vào trán Hibiki.\nTruyền tải cảm xúc của mình vào giọng nói,\ncùng với hơi ấm cơ thể."

# 【双鉄】
# display as 雙鐵
# JP: 「僕ひとりでは、見えんのだ。\nだから、日々姫と見つけたい」
1934 = "「Một mình anh thì không thể nhìn thấy.\nNên anh muốn cùng Hibiki tìm ra nó」"

# 【日々姫】
# display as 日日姬
# JP: 「んっ――」
# 1855 = "「嗯」" 

# monologue
# JP: ずずずと鼻をすすりあげ、\n日々姫が小さく咳をする。
2743 = "Hít mũi sụt sịt,\nHibiki ho nhẹ một tiếng."

# monologue
# JP: 呼吸を大きく、二度、三度。\nそれでも声は、まだ震えているし、かすれてる。
2552 = "Hít thở thật sâu, hai lần, ba lần.\nDù vậy, giọng nói vẫn còn run rẩy và khàn\nđặc."

# 【日々姫】
# display as 日日姬
# JP: 「ねぇ、ね――言ってた。\n『こん列車、よー乗らん』って」
2257 = "「Chị ấy, đã——nói.\n'Chị, không thể lên đoàn tàu này được'」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。言っていたな」
1854 = "「Ừ. Chị ấy đã nói vậy nhỉ」"

# 【日々姫】
# display as 日日姬
# JP: 「よー乗らんって――\nねぇねに、乗ってほしかったとに」
1909 = "「Không thể lên được——\nEm đã rất muốn chị ấy lên tàu vậy mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは誰より、真闇姉が一番強くわかっていよう」
2209 = "「Điều đó, chị Mayami là người hiểu rõ hơn\nai hết」"

# 【日々姫】
# display as 日日姬
# JP: 「わかって――くれて、て？」
2056 = "「Chị ấy——hiểu, sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうありながら、それでも乗れんというのなら。\n乗ること。受け入れることが、どうしても出来んのだ」
1852 = "「Ừ. Dù hiểu như vậy nhưng vẫn nói không\nthể lên.\nNghĩa là việc lên tàu, việc chấp nhận nó,\ndù thế nào chị ấy cũng không thể làm được」"

# 【日々姫】
# display as 日日姬
# JP: 「どぎゃんして！」
2091 = "「Tại sao chứ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「過保護なのだ。真闇姉は。\nだから、日々姫が傷つくことを、極度に恐れる」
2214 = "「Chị Mayami bảo bọc em quá mức.\nNên chị ấy cực kỳ sợ việc Hibiki bị tổn\nthương」"

# 【日々姫】
# display as 日日姬
# JP: 「だって！　私いま傷ついて」
1786 = "「Nhưng mà! Bây giờ em đang bị tổn thương\nnè」"

# 【双鉄】
# display as 雙鐵
# JP: 「致命傷から、日々姫を守るためだろう」
2213 = "「Chắc là để bảo vệ Hibiki khỏi vết thương\nchí mạng đấy」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
# 1850 = "「啊？！」" 

# monologue
# JP: 断言できる。\n路子がそれをしてくれたから。
2617 = "Tôi có thể khẳng định.\nBởi vì Michiko đã làm điều đó cho tôi."

# monologue
# JP: 僕を突き放すそのことで、\n僕の命を、僕に渡してくれたのだから。
2536 = "Bằng cách đẩy tôi ra xa,\nem ấy đã trao lại mạng sống của tôi cho\nchính tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「……日々姫が、一番深く。どうしようもなく\n傷つくとしたら、それは、どんなときだ？」
1421 = "「……Nếu Hibiki bị tổn thương sâu sắc nhất,\nmột cách vô phương cứu chữa,\nthì đó là khi nào?」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにが。おらんように、なるときっ。\nねぇね、が。おらんように、なる、とき」
2250 = "「Là khi. Anh hai không còn nữa.\nLà khi. Chị Mayami, không còn nữa」"

# monologue
# JP: 即答されて、嬉しくなる。\nが、この場合は……そこへの不安視ではないだろう。
2532 = "Được trả lời ngay lập tức, tôi cảm thấy\nvui sướng.\nNhưng, trong trường hợp này……có lẽ không\nphải là lo lắng về điều đó."

# 【双鉄】
# display as 雙鐵
# JP: 「その次は？　日々姫は何を失いたくない」
1770 = "「Tiếp theo thì sao? Hibiki không muốn mất\nđi thứ gì」"

# 【日々姫】
# display as 日日姬
# JP: 「絵ば、書くこと。デザイン、すること。\n――絵で、デザインで、お仕事、する、こと」
2143 = "「Việc vẽ tranh. Việc thiết kế.\n——Việc làm việc, bằng hội họa, bằng thiết\nkế」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1816 = "「Ừ」"

# monologue
# JP: それは……あるのかもしれん。\n慎重に、言葉を日々姫に寄せていく。
2957 = "Điều đó……có lẽ là vậy.\nTôi cẩn trọng, hướng lời nói về phía\nHibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「どうなれば、絵やデザインの仕事を失う？」
1927 = "「Thế nào thì em sẽ mất đi công việc hội\nhọa và thiết kế?」"

# 【日々姫】
# display as 日日姬
# JP: 「誰も、頼んでくれんよーに、なっ、たら……\nそしたら、お仕事、できん、けん」
2080 = "「Nếu không ai, nhờ vả nữa……\nThì em, sẽ không thể làm việc được」"

# 【双鉄】
# display as 雙鐵
# JP: 「つまり、信頼を失ってしまえば――か」
1738 = "「Nói cách khác, nếu đánh mất niềm\ntin——sao」"

# 【日々姫】
# display as 日日姬
# JP: 「んっ――」
# 1855 = "「嗯」" 

# monologue
# JP: 日々姫も呼吸が落ち着き始める。\nいつの間に涙も止まってる。
2755 = "Nhịp thở của Hibiki cũng bắt đầu bình tĩnh\nlại.\nNước mắt cũng đã ngừng rơi từ lúc nào."

# monologue
# JP: 心配ゆえの拒絶であったと――\n日々姫も、わかってくれたと感じる。
2655 = "Sự từ chối đó xuất phát từ sự lo lắng——\nTôi cảm thấy Hibiki cũng đã hiểu được điều\nđó."

# 【双鉄】
# display as 雙鐵
# JP: 「……あるいは、どこかにそうした要素が」
1410 = "「……Hoặc là, ở đâu đó có yếu tố như vậy」"

# 【日々姫】
# display as 日日姬
# JP: 「どこにあると？　そうならんよう、\n一生懸命、勉強ばして、準備したとにっ」
2088 = "「Nằm ở đâu chứ? Để không trở thành như\nvậy,\nem đã cố gắng hết sức, học tập và chuẩn bị\nrồi mà」"

# monologue
# JP: ぶわぶわと、\n日々姫の瞳に、またも涙が浮かんでしまう。
2856 = "Nước mắt lại rơm rớm\ntrên đôi mắt Hibiki."

# monologue
# JP: 焦りすぎたか――\n思うより先、悲痛な声に鼓膜を打たれる。
2784 = "Mình vội vàng quá chăng——\nTrước khi kịp suy nghĩ, màng nhĩ tôi đã bị\nchấn động bởi giọng nói bi thương."

# 【日々姫】
# display as 日日姬
# JP: 「なのに――私――いっぱい見たのに、勉強したのに、\nわからんけんっ！　まだまだ全然、足りんけんっ」
1753 = "「Vậy mà——em——đã xem rất nhiều, đã học rất\nnhiều,\nvậy mà vẫn không hiểu! Vẫn còn hoàn toàn\nthiếu sót」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな――足りない。\n足りてないのだ。僕らは、無力なのだから」
2081 = "「Đúng vậy——thiếu sót.\nCòn thiếu sót. Bởi vì chúng ta, thật vô\nlực」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
# 1850 = "「啊？！」" 

# monologue
# JP: 泣かせてしまい、情けなくなり、思い出す。\n自分自身が無力だと――
2938 = "Làm em ấy khóc, tôi cảm thấy thảm hại và\nchợt nhớ ra.\nRằng bản thân mình thật vô lực——"

# monologue
# JP: 日々姫が近くにいてくれたから、\n隣で笑ってくれていたから、ずっと忘れていたことを。
2506 = "Bởi vì Hibiki luôn ở bên cạnh,\nluôn mỉm cười bên cạnh, nên tôi đã quên\nmất điều đó từ lâu."

# 【双鉄】
# display as 雙鐵
# JP: 「僕の手は、路子をつかめなかった手だ。\n日々姫のことを今はまだ、守り導ききれぬ手だ」
1963 = "「Bàn tay của anh, là bàn tay đã không thể\nnắm lấy Michiko.\nLà bàn tay hiện tại vẫn chưa thể bảo vệ và\ndẫn dắt Hibiki trọn vẹn」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにっ！？」
2256 = "「Anh hai!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だがな、日々姫」
1755 = "「Nhưng mà, Hibiki này」"

# monologue
# JP: 泣いているのに、僕を心配してくれる。
2538 = "Dù đang khóc, em ấy vẫn lo lắng cho tôi."

# monologue
# JP: 日々姫のことが愛おしい。\nその思いだけで、いっぱいになる。
2752 = "Tôi yêu Hibiki.\nChỉ với suy nghĩ đó thôi, lòng tôi đã tràn\nngập."

# 【双鉄】
# display as 雙鐵
# JP: 「僕はこうして――お前の涙をぬぐってやれる」
1968 = "「Anh có thể thế này——lau nước mắt cho em」"

# monologue
# JP: つながること。つなぐこと。つながってること。\n日々姫がそばに、いてくれること。
2771 = "Sự kết nối. Việc kết nối. Việc đang kết\nnối.\nViệc Hibiki ở bên cạnh tôi."

# monologue
# JP: 自分自身がひとりぼっちと思い出せれば、\nその価値が、くっきり浮き上がってみえる。
2486 = "Nếu nhớ lại bản thân mình đã từng đơn độc,\ngiá trị của điều đó sẽ hiện lên rõ nét."

# 【双鉄】
# display as 雙鐵
# JP: 「そうして、涙を拭うことしかできない手でも――」
2262 = "「Và, dù là đôi bàn tay chỉ có thể lau nước\nmắt——」"

# 【日々姫】
# display as 日日姬
# JP: 「あっ」
# 1829 = "「啊」" 

# monologue
# JP: 両手で、日々姫の手をつかむ。\n向かい合わせで、恋人つなぎに指を絡めて――
2639 = "Tôi nắm lấy tay Hibiki bằng cả hai tay.\nĐối diện nhau, đan mười ngón tay vào nhau\nnhư những người yêu nhau——"

# 【日々姫】
# display as 日日姬
# JP: 「わ」
1796 = "「Oa」"

# monologue
# JP: めいっぱい広げる。
2832 = "Mở rộng ra hết cỡ."

# monologue
# JP: 僕と日々姫がつなぐ手と手で、\n大きな、ひとつの輪を描く。
2621 = "Bằng đôi bàn tay đang đan vào nhau của tôi\nvà Hibiki,\nvẽ nên một vòng tròn lớn duy nhất."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫とつなぎ合うだけで、\nこんなに広くを受け止められるようになる」
2098 = "「Chỉ cần nắm tay Hibiki,\nanh đã có thể đón nhận được một không gian\nrộng lớn đến thế này」"

# 【日々姫】
# display as 日日姬
# JP: 「ああ――」
2026 = "「A——」"

# monologue
# JP: 日々姫が小さく首を振る。\n恥ずかしそうに僕を見つめて、問いかけてくる。
2772 = "Hibiki khẽ lắc đầu.\nNgượng ngùng nhìn tôi, em ấy hỏi."

# 【日々姫】
# display as 日日姬
# JP: 「つなぐ手の数――足りておらんと？」
1784 = "「Số lượng bàn tay kết nối——vẫn chưa đủ\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1832 = "「啊！」" 

# monologue
# JP: そうかもしれん。\nその単純な答えこそ、真闇姉が見た不足なのかも。
2522 = "Có lẽ là vậy.\nCâu trả lời đơn giản đó, có lẽ chính là sự\nthiếu sót mà chị Mayami đã nhìn thấy."

# monologue
# JP: ――姉妹なのだなと、つくづく思う。\n嬉しく、愛しく。ほんのすこしだけ寂しく思う。
2637 = "——Tôi thực sự cảm thấy, họ đúng là chị em.\nVui sướng, yêu thương. Và cũng cảm thấy\nmột chút cô đơn."

# 【双鉄】
# display as 雙鐵
# JP: 「それはわからん。僕はただお前のことを愛しく思い。\nお前の言葉を思い出していただけだった」
2212 = "「Anh không biết. Anh chỉ cảm thấy yêu em.\nVà nhớ lại những lời em đã nói thôi」"

# 【日々姫】
# display as 日日姬
# JP: 「私の――言葉？」
1965 = "「Lời nói——của em?」"

# 【双鉄】
# display as 雙鐵
# JP: 「『線路は線路とだけじゃない。\n人の心も、人の笑顔も、きっとつなげてくれるから』」
1392 = "「『Đường ray không chỉ kết nối với đường\nray.\nMà chắc chắn còn kết nối cả trái tim con\nngười, nụ cười con người nữa』」"

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1829 = "「啊」" 

# monologue
# JP: 稀咲との討論会での、日々姫の言葉。\n稀咲と僕らを、僕らと街を。僕らみんなを。
2963 = "Đó là lời Hibiki nói trong buổi thảo luận\nvới Kisaki.\nKisaki và chúng tôi, chúng tôi và thành\nphố. Tất cả chúng tôi."

# monologue
# JP: 僕と日々姫を――真に繋いでくれた言葉だ。
2663 = "Là lời nói đã thực sự kết nối——tôi và\nHibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「僕らは立場と力を得、きっと、そのことを忘れてた。\nつながることの本質を、いつか利害に埋もれさせてた」
1948 = "「Chúng ta có được vị thế và sức mạnh, nên\nchắc chắn đã quên mất điều đó.\nBản chất của sự kết nối, từ lúc nào đã bị\nvùi lấp bởi lợi ích」"

# 【日々姫】
# display as 日日姬
# JP: 「つながることは、ひろげること。\nたくさんを、受け入れられるようになること」
2154 = "「Kết nối là mở rộng.\nLà có thể đón nhận được nhiều thứ hơn」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうなのだ」
1864 = "「Ừ, đúng là vậy」"

# monologue
# JP: ひびきあってる。\n僕と日々姫が、言葉で気持ちでひとつになってる。
2618 = "Đang vang vọng.\nTôi và Hibiki, đang hòa làm một bằng ngôn\ntừ, bằng cảm xúc."

# monologue
# JP: 肌を重ね合うひとときよりも、\nはるかに強い一体感を――心の底から感じてる。
2643 = "So với những giây phút da thịt kề nhau,\ntôi cảm nhận được một sự đồng nhất mãnh\nliệt hơn nhiều——từ tận đáy lòng."

# 【双鉄】
# display as 雙鐵
# JP: 「……[ぶんごもり,2]文庫森のボランティアさんが言っていた。\n[せんけい,1]扇形機関庫は、シンボルなのだと」
1428 = "「……Tình nguyện viên ở Bungomori đã nói.\n\\x%l扇形機関庫;#00ffc040;Gara đầu máy hình ngành%l;#; là một biểu tượng」"

# 【日々姫】
# display as 日日姬
# JP: 「言ってた！　だから、リゾート食堂列車も。\n象徴になれれば、きっと上手くいくだろうって」
2031 = "「Họ có nói! Vì vậy, toa ăn du lịch nghỉ\ndưỡng cũng vậy.\nNếu trở thành biểu tượng, chắc chắn sẽ\nthành công」"

# monologue
