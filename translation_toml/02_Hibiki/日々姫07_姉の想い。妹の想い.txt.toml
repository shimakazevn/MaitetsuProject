2605 = "Chúng tôi đã không nhìn thấy. Chỉ\nOhimitera. Chỉ những thứ xung quanh.\nHơn nữa, chỉ những phần nổi bật."

# monologue
# JP: それでは象徴になどなれない。\n九洲全土をつなぐなど、果たせるはずも無かったろう。
2964 = "Như vậy thì không thể trở thành biểu tượng\nđược.\nViệc kết nối toàn bộ Kyushu cũng chẳng thể\nnào thực hiện được."

# 【日々姫】
# display as 日日姬
# JP: 「……ねぇね。『こん列車、よー乗らん』って」
2259 = "「……Chị Mayami. Chị ấy nói 'Chị, không thể\nlên đoàn tàu này được'」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1855 = "「嗯」" 

# monologue
