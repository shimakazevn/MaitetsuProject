2166 = "「Để trở thành biểu tượng, để được yêu\nmến——\nChỉ với bàn tay của Ohimitera, của Yufuin\nlà chưa đủ」"

# monologue
# JP: 振り返る。\n僕らの浅さが、メニューに現れてしまっていた。
2835 = "Nghĩ lại thì.\nSự nông cạn của chúng tôi đã thể hiện rõ\ntrên thực đơn."

# monologue
