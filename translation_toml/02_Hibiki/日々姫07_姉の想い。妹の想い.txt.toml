1426 = "「……Đúng như Hibiki vừa nói,\nđôi mắt của chị Mayami chắc chắn là đôi\nmắt nhìn xa trông rộng」"

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1855 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
