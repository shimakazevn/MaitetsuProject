2609 = "Khi chúng tôi ghé thăm \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;\nở Bungomori,\nkỹ sư lão thành Kimoto lại nồng nhiệt chào\nđón chúng tôi một lần nữa."

# 【日々姫】
# display as 日日姬
