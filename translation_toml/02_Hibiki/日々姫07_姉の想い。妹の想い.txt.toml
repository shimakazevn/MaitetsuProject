2009 = "「Cô Hibiki——không chỉ thiết kế cách thức\ntồn tại hay hình dáng của sự vật……\nmà còn thiết kế trọn vẹn cả tương lai của\nnó nữa nhỉ」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！！！」
1833 = "「!!!」"

