# monologue
# JP: 日々姫が何も求めなくとも、\n真闇姉は理由を語りは、しなかったろう。
2475 = "即便日日姬沒有開口央求，真闇姐也不會說出理由吧。" 

# 【真闇】
# display as 真闇
# JP: 「がまだせ。ひーちゃん」
1383 = "「[ＧＡＭＡＤＵＳ,2]加把勁。小日」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！！！！」
1834 = "「啊！！！！」" 

# monologue
# JP: 頑張れと、そう、隈元弁で――\n日々姫と真闇姉との言葉で、一番生の言葉で伝え。
2849 = "真闇姐用隈元話——用日日姬與真闇姐最熟悉的話語說了聲“加油”。" 

# monologue
# JP: ……そうして静かに\n真闇姉の足音が遠ざかりやがて、消えていく。
1374 = "……然後，真闇姐的腳步聲越來越遠，最後消失了。" 

# 【日々姫】
# display as 日日姬
# JP: 「……ぁ――ぁっ」
1412 = "「……啊……啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2005 = "「日日姬」" 

# monologue
# JP: 名を呼び、そして抱き寄せる。\n途端に、胸が熱くなる。
2615 = "我叫著她的名字，然後把她抱進懷裡。這一瞬間，我的胸口變得一片濕熱。" 

# monologue
# JP: シャツに涙が染み通り、\nそれでも、声は聞こえない。
2543 = "她的眼淚滲透了襯衫，儘管如此我還是沒聽見她的哭聲。" 

# 【日々姫】
# display as 日日姬
# JP: 「――っっ――っ――」
1431 = "「……（抽泣）……（抽泣）」" 

# monologue
# JP: 声が漏れれば、真闇姉をきっと、傷つけるから。\nだから日々姫は必死になって、無言で涙を流し続ける。
2511 = "因為如果哭出聲的話肯定會傷害到真闇姐的。所以日日姬拚命壓著喉嚨，默默地流著眼淚。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……日々姫」
1420 = "「……日日姬」" 

# monologue
# JP: 名を呼んで、ただ髪を撫でて、落ち着くのを待つ。
2623 = "我喚著她的名字，並不停撫摸她的頭髮等待她冷靜下來。" 

# monologue
# JP: 肩の震えが、徐々に小さくなってくる。\n息が、リズムを戻し始める。
2547 = "她的肩膀開始慢慢停止顫抖。呼吸也不再紊亂。" 

# 【双鉄】
# display as 雙鐵
# JP: 「行こう。日々姫。僕の部屋だ」
2191 = "「走吧，日日姬，去我的房間」" 

# 【日々姫】
# display as 日日姬
# JP: 「……んっ」
1413 = "「……嗯」" 

# monologue
# JP: 居間から部屋までの短い距離を、\n日々姫をぎゅっと抱いたまま、ゆっくり歩く。
2650 = "我緊抱著日日姬，慢慢走過從起居室到房間的短短距離。" 

# monologue
# JP: 半ば以上は抱きかかえ、\n冷えた体を、少しでも温めてやれるよう。
2626 = "我幾乎是將她抱了起來，以便儘可能溫暖她那冰冷的身體。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ついたぞ、日々姫」
1949 = "「我們到了，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「ふっ」
1789 = "「呼」" 

# monologue
# JP: 途端、震えが大きくなる。\n日々姫の喉から――か細い声がこぼれ始める。
2546 = "她的肩膀這才猛烈地顫抖起來。日日姬的喉嚨開始發出細微的聲音。" 

# 【日々姫】
# display as 日日姬
# JP: 「がまだしたけん――\n一生懸命がまだした――がまだしたのにっ」
1950 = "「我很努力了。我明明已經……已經很努力了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな。日々姫も僕も、頑張った」
1863 = "「嗯，是啊。我們倆都很努力了」" 

# monologue
# JP: 事実、ポーレットやみんなは認めてくれた。\n市民モニターの結果も良かった。
2417 = "事實上，波萊特和大家也都認同了。市民試吃調查的結果也很理想。" 

# monologue
# JP: 何故、という気持ちは僕の中にも強くある。\nだから、どうしても思ってしまう。
2596 = "我也很奇怪這到底是為什麼，納悶的感覺在我心中揮之不去。" 

# 【日々姫】
# display as 日日姬
# JP: 「なのに、わたし、届かんかった！！\nどころか――どころか悪かとこだって――」
1745 = "「但我就是沒辦法讓她明白！！不僅如此，我連錯在哪都不知道」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わからないのは、僕も同じだ。\nが――事態は恐らく、それほど悲観的ではなかろうさ」
1936 = "「我也一樣不明白。但是，或許不用這麼悲觀」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！？」
# 1850 = "「啊？！」" 

# monologue
# JP: 不用意な言葉ととられるかもしれないが。\nそれでも、僕の実感だ。
2528 = "她可能會覺得我這麼說有點想當然了。但這是我的真心話。" 

# monologue
# JP: 日々姫であればわかってくれると確信し――\nただただ、正直な言葉を重ねる。
2648 = "我確信日日姬肯定能夠理解，所以我老老實實地說出了心裡話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲に[なら]倣えば、90\%以上の賛同は得ている案だ。\n極論すれば、10\%未満の異論への対処を考えればいい」
1989 = "「按稀咲的看法，這是個能獲得９０％以上贊同的方案。簡單來說，只要想辦法解決那不足１０％的反對就行了」" 

# monologue
# JP: それに、真闇姉は『がまだせ』とハッキリいった。\nあれほど過保護で慎重な人が、だ。
2897 = "而且，真闇姐明確說了“加把勁”。她可是個極其慎重，而且對日日姬過度保護的人。" 

# monologue
# JP: ならば問題はどの程度の大きさであろうとも、\n解消可能な範囲に収まっている筈なのだ――が。
2969 = "那麼，不管問題有多嚴重，也應該在能夠解決的範圍內。但是……" 

# 【日々姫】
# display as 日日姬
# JP: 「……………………」
1395 = "「……………………」" 

# monologue
# JP: 日々姫は、静かに泣いている。\n僕の言葉を、泣き声を抑え、待ってくれている。
2778 = "日日姬還在默默地哭泣。她控制著哭聲，等待著我說下去。" 

# monologue
# JP: その弱々しい姿を見れば僕まで押すことが不安になる。\n真闇姉が押すのなら、僕は支えるべきではないか、と。
2842 = "看她這無力的樣子，連我都產生了不安。看到真闇姐的反對如此堅決，我都開始懷疑自己支持這套方案的選擇是否正確了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、万人に受け入れられるプランなど、\n所詮は作り得ないものなのかもしれん」
2110 = "「當然，能讓所有人接受的方案或許是根本不存在的」" 

# 【日々姫】
# display as 日日姬
# JP: 「それは、そう！」
2055 = "「是這樣沒錯！」" 

# monologue
# JP: 勢い込んで、日々姫が答える。
2741 = "日日姬充滿氣勢地回答。" 

# monologue
# JP: ヒュっと息を吸う喉がなり、\n抑え込まれていた涙がボロボロ、こぼれ始める。
2530 = "她喉嚨裡發出一陣吸氣聲，之前一直在壓抑的眼淚開始決堤。" 

# 【日々姫】
# display as 日日姬
# JP: 「どぎゃん、と――凄、か――デザイン、だって――\n気にいらん人は――いよる――けど。――けどっ！」
1773 = "「再怎麼……厲害的……設計，也肯定會有人……不喜歡——但是！」" 

# monologue
# JP: しゃくりあげつつ、\n日々姫は、ようやく顔をあげる。
2736 = "日日姬一邊抽泣，一邊總算抬起了頭。" 

# monologue
# JP: 涙でぐちゃぐちゃに揺れた瞳で――\nそれでも、まっすぐに僕を見上げる。
2548 = "她的雙眸噙滿了淚水，但還是筆直地仰視著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇの、目、やけん――\n私、より――ずっと遠くを――広く、見る、けんっ」
2236 = "「那畢竟是阿姐……她的眼光，總是……比我要……長遠」" 

# monologue
# JP: （ああ――）
# 2993 = "（是啊）" 

# monologue
# JP: 絆を思う。\nつながりを。
2962 = "這是她們兩人之間的紐帶。" 

# monologue
# JP: 路子のことを想い出し、\n痛みを感じて……懐かしくなる。
2625 = "我回想起路子，不禁感到一陣心痛……以及深深的懷念。" 

# 【日々姫】
# display as 日日姬
# JP: 「やけん――超えんと。わたし、も――きっと――\n見つけん、と――」
1983 = "「所以，我要超越阿姐。我也……我必須要……去發現」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1855 = "「嗯」" 

# monologue
# JP: 誰より深く、真闇姉のことを知っているから。\nそれだけを、ずうっと願ってきたことだから。
2510 = "因為她比任何人都了解真闇姐。因為這是她一直以來的唯一的願望。" 

# monologue
# JP: 叶えてやりたいと強く思うし、\n自分の無力が、ほとほと情けなくもなる。
2627 = "我強烈地想要實現她的願望，也對自己的軟弱無力感到無地自容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、落ち着いて考えてみよう」
2229 = "「那就冷靜下來仔細想想吧」" 

# monologue
# JP: だが、情けなくとも頼りなくとも、\nそれでも出来ることはある。
2423 = "但就算是丟臉，就算不夠可靠，也不是什麼事都做不到的。" 

# monologue
# JP: 泣きだして、閉じてしまった日々姫の瞳を、\nうっすらとでも、開く手助けはしてやれる。
2654 = "我至少能幫助日日姬稍稍睜開她那因為流淚而閉上的雙眼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉が見たものは何か。\n僕らが見落としてしまったものは、何なのか」
2122 = "「真闇姐看到的是什麼，我們所忽視的是什麼」" 

# 【日々姫】
# display as 日日姬
# JP: 「わからんけん――それが、私にはわからんけんっ」
1726 = "「不知道……我不知道啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、僕もいる。\nふたりでならば、見えるかもしれん」
1757 = "「但還有我在。我們兩個人一起就有可能發現」" 

# monologue
# JP: （こつっ）
2995 = "（緊貼）" 

# monologue
# JP: おでこを日々姫にくっつける。\n体温ごと、僕の気持ちを声へと乗せる。
2640 = "我用額頭貼向日日姬。把我的體溫，我的感情和聲音全都傳達給她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕ひとりでは、見えんのだ。\nだから、日々姫と見つけたい」
1934 = "「我一個人看不見。所以，我想和你一起去發現」" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ――」
# 1855 = "「嗯」" 

# monologue
# JP: ずずずと鼻をすすりあげ、\n日々姫が小さく咳をする。
2743 = "日日姬吸了吸鼻子，然後輕輕咳嗽了幾聲。" 

# monologue
# JP: 呼吸を大きく、二度、三度。\nそれでも声は、まだ震えているし、かすれてる。
2552 = "她連著做了三次深呼吸。儘管如此，她嘶啞的聲音依舊在顫抖。" 

# 【日々姫】
# display as 日日姬
# JP: 「ねぇ、ね――言ってた。\n『こん列車、よー乗らん』って」
2257 = "「阿姐——跟我說“咱不會上這輛列車”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。言っていたな」
1854 = "「嗯。她是這麼說的」" 

# 【日々姫】
# display as 日日姬
# JP: 「よー乗らんって――\nねぇねに、乗ってほしかったとに」
1909 = "「就算阿姐這麼說，但我還是很想讓她上那輛列車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは誰より、真闇姉が一番強くわかっていよう」
2209 = "「這個真闇姐是最清楚的」" 

# 【日々姫】
# display as 日日姬
# JP: 「わかって――くれて、て？」
2056 = "「最清楚？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうありながら、それでも乗れんというのなら。\n乗ること。受け入れることが、どうしても出来んのだ」
1852 = "「嗯。可即便如此她還是不願意的話，那就是說她無論如何都不會上車。也不會認可」" 

# 【日々姫】
# display as 日日姬
# JP: 「どぎゃんして！」
2091 = "「為什麼啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「過保護なのだ。真闇姉は。\nだから、日々姫が傷つくことを、極度に恐れる」
2214 = "「這是真闇姐對你的過度保護。所以，她特別害怕你受傷」" 

# 【日々姫】
# display as 日日姬
# JP: 「だって！　私いま傷ついて」
1786 = "「可是，我現在就受傷了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「致命傷から、日々姫を守るためだろう」
2213 = "「這是為了保護你遠離真正致命的傷害」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
# 1850 = "「啊？！」" 

# monologue
# JP: 断言できる。\n路子がそれをしてくれたから。
2617 = "我可以斷言。因為路子也做過一樣的事。" 

# monologue
# JP: 僕を突き放すそのことで、\n僕の命を、僕に渡してくれたのだから。
2536 = "她把我推開，將我的生命交給了我自己。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……日々姫が、一番深く。どうしようもなく\n傷つくとしたら、それは、どんなときだ？」
1421 = "「……日日姬，你認為自己在什麼情況下會受傷最深？」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにが。おらんように、なるときっ。\nねぇね、が。おらんように、なる、とき」
2250 = "「阿哥不在的時候，阿姐不在的時候」" 

# monologue
# JP: 即答されて、嬉しくなる。\nが、この場合は……そこへの不安視ではないだろう。
2532 = "她回答得這麼快，我很開心。但在這種情況下……我不應該糾結這個問題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その次は？　日々姫は何を失いたくない」
1770 = "「其次呢？你不想失去什麼」" 

# 【日々姫】
# display as 日日姬
# JP: 「絵ば、書くこと。デザイン、すること。\n――絵で、デザインで、お仕事、する、こと」
2143 = "「繪畫，還有設計。利用繪畫和設計去工作」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1816 = "「哦」" 

# monologue
# JP: それは……あるのかもしれん。\n慎重に、言葉を日々姫に寄せていく。
2957 = "這……可能真的存在問題。我慎重地進一步試探道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうなれば、絵やデザインの仕事を失う？」
1927 = "「怎麼樣才會失去繪畫和設計的工作呢？」" 

# 【日々姫】
# display as 日日姬
# JP: 「誰も、頼んでくれんよーに、なっ、たら……\nそしたら、お仕事、できん、けん」
2080 = "「沒有委託的話……這樣一來，我就不能工作了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまり、信頼を失ってしまえば――か」
1738 = "「也就是失去信賴，是嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ――」
# 1855 = "「嗯」" 

# monologue
# JP: 日々姫も呼吸が落ち着き始める。\nいつの間に涙も止まってる。
2755 = "日日姬的呼吸開始恢復平靜，不知不覺間眼角也不再有淚珠滑落。" 

# monologue
# JP: 心配ゆえの拒絶であったと――\n日々姫も、わかってくれたと感じる。
2655 = "我覺得日日姬也想明白了。真闇姐是因為擔心才拒絕她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……あるいは、どこかにそうした要素が」
1410 = "「……也就是說，失去信賴的潛在因素是存在的」" 

# 【日々姫】
# display as 日日姬
# JP: 「どこにあると？　そうならんよう、\n一生懸命、勉強ばして、準備したとにっ」
2088 = "「潛在因素？我就是為了避免這種事發生，才努力學習，做足了各種準備啊」" 

# monologue
# JP: ぶわぶわと、\n日々姫の瞳に、またも涙が浮かんでしまう。
2856 = "眼淚又開始從日日姬的眼角涓涓滲出。" 

# monologue
# JP: 焦りすぎたか――\n思うより先、悲痛な声に鼓膜を打たれる。
2784 = "是我太著急了。還沒等到我這樣去想，悲痛的聲音就扎在了我的鼓膜上。" 

# 【日々姫】
# display as 日日姬
# JP: 「なのに――私――いっぱい見たのに、勉強したのに、\nわからんけんっ！　まだまだ全然、足りんけんっ」
1753 = "「但是，我明明見識了這麼多，學習了這麼多，但還是完全搞不懂！完全不夠」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな――足りない。\n足りてないのだ。僕らは、無力なのだから」
