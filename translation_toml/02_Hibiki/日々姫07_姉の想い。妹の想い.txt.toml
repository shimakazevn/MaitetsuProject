2275 = "「Chúng cháu muốn lắng nghe ý kiến của mọi\nngười ở tất cả các khu vực dọc theo tuyến\nđường toa ăn chạy——\nnhững người sử dụng tất cả các nhà ga」"

# 【木本】
# display as 木本
# JP: 「そぎゃんでしたか」
2053 = "「Ra là vậy」"

# monologue
# JP: 木本老技師の声に安堵が交じる。\n深い皺の刻まれている口元が、ゆっくり笑う。
2791 = "Giọng kỹ sư lão thành Kimoto xen lẫn sự\nnhẹ nhõm.\nKhóe miệng hằn sâu những nếp nhăn từ từ\nmỉm cười."

# 【木本】
# display as 木本
# JP: 「日々姫先生は、リゾート食堂列車ば、\nみんなの象徴に育てようとしておられるとですな」
2011 = "「Cô Hibiki định biến toa ăn du lịch nghỉ\ndưỡng\nthành biểu tượng của mọi người nhỉ」"

# 【日々姫】
# display as 日日姬
# JP: 「はい。沿線のみんなの。\n――そして、いつかは九洲のみんなの」
2048 = "「Vâng. Của mọi người dọc theo tuyến đường.\n——Và, một ngày nào đó là của mọi người ở\nKyushu」"

# 【木本】
# display as 木本
# JP: 「若者らしか、よか夢ですなぁ。\nじゃっどん、そいば――難しかとでしょう」
2113 = "「Quả là một giấc mơ đẹp của người trẻ.\nNhưng mà, chuyện đó——chắc sẽ khó khăn lắm\nđây」"

# 【日々姫】
# display as 日日姬
# JP: 「あ……」
# 1825 = "「啊……」" 

# monologue
# JP: 日々姫が一瞬、僕を見る。\n言いづらいなら、僕が言葉にするまでだ。
2769 = "Hibiki nhìn tôi trong chốc lát.\nNếu em ấy khó nói, thì để tôi nói thay\nvậy."

# 【双鉄】
# display as 雙鐵
# JP: 「正直、それはそうですね。\nあちらを立てれば、こちらが立たない」
2147 = "「Thành thật mà nói, đúng là vậy ạ.\nĐược lòng người này thì mất lòng người\nkia」"

# 【木本】
# display as 木本
# JP: 「でしょうなぁ。\nどこんもんも、縄張り意識の強かですけん」
2023 = "「Chắc là vậy rồi.\nỞ đâu người ta cũng có ý thức lãnh thổ\nmạnh mẽ mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「はは」
1803 = "「Haha」"

# monologue
# JP: 笑って濁すしか出来ない。\n僕ら自身も、無意識にそうしてしまっていた――
2612 = "Tôi chỉ có thể cười trừ.\nBản thân chúng tôi cũng đã vô thức làm như\nvậy——"

# monologue
# JP: 御一夜の特産、名産で、\nメニューを固めようとしていたのだから。
2512 = "Bởi vì chúng tôi đã định cố định thực đơn\nbằng những đặc sản, danh sản của\nOhimitera."

# 【日々姫】
# display as 日日姬
# JP: 「縄張り意識、っていっちゃえば悪く聞こえますけど、\nそれは、郷土愛の強さの現れだとも思います」
2261 = "「Ý thức lãnh thổ, nói ra thì nghe có vẻ\nxấu,\nnhưng cháu nghĩ đó cũng là biểu hiện của\ntình yêu quê hương mạnh mẽ」"

# monologue
# JP: 日々姫の声に、木本老技師は深く頷き返す。\n政治家としても、やはり日々姫は成長している。
2766 = "Trước lời của Hibiki, kỹ sư lão thành\nKimoto gật đầu sâu sắc đáp lại.\nVới tư cách là một chính trị gia, quả\nnhiên Hibiki đang trưởng thành."

# 【日々姫】
# display as 日日姬
# JP: 「だから、お聞かせいただきたいんです。木本さんの、\n文庫森の縄張り意識、むしろ全開、バリバリで」
1982 = "「Vì vậy, cháu muốn nghe ý kiến của bác. Về\ný thức lãnh thổ\ncủa Bungomori từ bác Kimoto, hãy cứ bộc lộ\nhết ra đi ạ」"

# 【木本】
# display as 木本
# JP: 「はっはははは」
# 1803 = "「哈哈」" 

# 【日々姫】
# display as 日日姬
# JP: 「聞かせてください。文庫森をよく知るあなたが、\nリゾート食堂列車に望む物を」
2180 = "「Xin hãy cho cháu biết. Bác là người rất\nhiểu Bungomori,\nbác mong muốn điều gì ở toa ăn du lịch\nnghỉ dưỡng này」"

# 【木本】
# display as 木本
# JP: 「――まぁ、ここまで年ぃ取りますとの。\n外への興味ば、だいぶん薄れてしまいましたがの」
2103 = "「——Chà, già đến chừng này rồi.\nSự quan tâm đến bên ngoài cũng phai nhạt\nđi nhiều rồi」"

# monologue
# JP: 木本老技師が、ゆったりと――\nどこか懐かしげな眼差しで、周囲を見渡す。
2792 = "Kỹ sư lão thành Kimoto chậm rãi——\nnhìn quanh với ánh mắt có phần hoài niệm."

# 【木本】
# display as 木本
# JP: 「強いていうなら――旅行中に、リゾート食堂列車ば、\n[せんけい,1]扇形機関庫に入れてやって欲しかと思いますの」
2263 = "「Nếu phải nói thì——trong chuyến du lịch,\ntôi muốn toa ăn du lịch nghỉ dưỡng\nđược đưa vào \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1817 = "「Ồ」"

# 【日々姫】
# display as 日日姬
# JP: 「それ！　すごく面白いです！！！」
2208 = "「Chuyện đó! Thú vị lắm ạ!!!」"

# monologue
# JP: 文庫森機関庫は現役だ。本線とも当然、繋がっている。\n本線から機関庫側へとポイントし、そのまま中へ。
2943 = "Gara đầu máy Bungomori vẫn đang hoạt động.\nDĩ nhiên là được kết nối với tuyến chính.\nChuyển ghi từ tuyến chính sang phía gara\nđầu máy, và cứ thế đi vào trong."

# monologue
# JP: \x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;を内側からみて、後進、\nターンテーブルを経て、また本線へと舞い戻る――
2575 = "Ngắm nhìn \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#; từ bên\ntrong, lùi lại,\nqua \\x%l転車台;#00ffc040;bàn quay đầu máy%l;#;, rồi lại quay về\ntuyến chính——"

# 【双鉄】
# display as 雙鐵
# JP: 「貴重で他にない体験に……世界的にも、恐らくは\n類を見ない貴重な体験の提供になるかと思います」
2215 = "「Một trải nghiệm quý giá không nơi nào\ncó……Trên thế giới, có lẽ\nđây sẽ là việc cung cấp một trải nghiệm\nquý giá hiếm có」"

# 【日々姫】
# display as 日日姬
# JP: 「誰だって、鉄道に興味なくったって嬉しいですよ。\nこんな素敵な建物に、列車に乗って入っていくの」
1821 = "「Bất cứ ai, dù không có hứng thú với đường\nsắt cũng sẽ rất vui.\nĐược ngồi trên tàu đi vào một tòa nhà\ntuyệt vời như thế này」"

# 【木本】
# display as 木本
# JP: 「そげですか。いや、いうてみるもんですのぉ。\nそぎゃん面白がってもらえるだけでも嬉しかとです」
2038 = "「Vậy sao. Chà, đúng là cứ thử nói ra xem\nsao nhỉ.\nChỉ cần được mọi người thấy thú vị như vậy\nlà tôi vui rồi」"

# 【日々姫】
# display as 日日姬
# JP: 「こちらこそ、本当に嬉しくてありがたいです。\n他にも、なにかもしもご希望があれば――」
1956 = "「Cháu mới là người thực sự vui và biết ơn\nbác ạ.\nNgoài ra, nếu bác còn mong muốn gì khác\nnữa thì——」"

# monologue
# JP: （ウウウウウウウウーーー）
2992 = "（Uuuuuuuuuuuuuuuuuu———）"

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1811 = "「Hả!?」"

# 【木本】
# display as 木本
# JP: 「ああ、[ひる,1]正午のサイレンですのぉ。\nちくと待っててつかぁさい」
1849 = "「A, còi báo hiệu giữa trưa đó mà.\nHai người chờ một chút nhé」"

# monologue
# JP: ひょいひょいと老人が歩き出し――ああ。
2891 = "Ông lão thoăn thoắt bước đi——a."

# 【日々姫】
# display as 日日姬
# JP: 「わ……奥様？」
1795 = "「Oa……là phu nhân ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。弁当でも届けにきたの――か」
1932 = "「Chắc vậy. Đến đưa cơm hộp chăng——」"

# monologue
# JP: 言うと同時に、思考が閃く。\n余りに強く閃きすぎて、整頓できない。
2931 = "Vừa nói, một ý nghĩ lóe lên trong đầu tôi.\nNó lóe lên quá mạnh mẽ khiến tôi không thể\nsắp xếp lại được."

# monologue
# JP: 老人がにこにこと戻ってくる。\n手には弁当箱と、保温タイプの水筒とだ。
2888 = "Ông lão tươi cười quay lại.\nTrên tay là hộp cơm và một bình nước giữ\nnhiệt."

# 【日々姫】
# display as 日日姬
# JP: 「お弁当！\n届けに来てくれるなんて素敵ですね」
1759 = "「Cơm hộp!\nBác gái cất công mang đến tận nơi tuyệt\nquá nhỉ」"

# 【木本】
# display as 木本
# JP: 「いやぁまぁ。\n冷めたら旨くなかといいよってですね」
1802 = "「À thì.\nBà ấy cứ bảo nguội rồi ăn mất ngon」"

# 【日々姫】
# display as 日日姬
# JP: 「うふふふふ、アツアツですね」
1787 = "「Ufufufu, tình cảm nóng hổi quá nha」"

# monologue
# JP: 老人は照れくさそうにはにかんで、\nよかったらひとつつままんですかと弁当箱を開ける。
2887 = "Ông lão ngượng ngùng cười bẽn lẽn,\nrồi mở hộp cơm ra mời chúng tôi ăn thử một\nmiếng nếu thích."

# monologue
# JP: おにぎりは――ああ、高菜めしのだ。\n水筒からはお茶ではなくて――
2982 = "Cơm nắm là——a, cơm trộn mù tạt.\nTrong bình nước không phải là trà mà là——"

# 【日々姫】
# display as 日日姬
# JP: 「あ、だご汁。この辺のってどんなのですか？」
1843 = "「A, súp Dago. Súp ở vùng này thì thế nào\nạ?」"

# 【木本】
# display as 木本
# JP: 「ああ、右田先生には珍しくもなかとですよ。\nうちんヤツば、クマ村出身ですけん」
1836 = "「A, với cô Migita thì chắc không lạ gì\nđâu.\nVì bà nhà tôi xuất thân từ làng Kuma mà」"

# 【日々姫】
# display as 日日姬
# JP: 「あらら、お隣！　すごい偶然。\nけど、地元の味を食べ損なって、ちょっとだけ残念」
1805 = "「Ái chà, hàng xóm! Thật là trùng hợp.\nNhưng lỡ mất cơ hội nếm thử hương vị địa\nphương, hơi tiếc một chút」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1398 = "「…………」" 

# monologue
# JP: 地元の味を食べ損なう。\n御一夜に囚われたゆえ、僕らはその愚を犯しかけた。
2402 = "Lỡ mất cơ hội nếm thử hương vị địa phương.\nVì bị bó hẹp trong Ohimitera, chúng tôi\nsuýt nữa đã phạm phải sai lầm đó."

# monologue
# JP: だが、まだ足りない。\n別の何かが、僕らを縛っていると感じる。
2429 = "Nhưng, vẫn chưa đủ.\nTôi cảm thấy có một thứ gì đó khác đang\ntrói buộc chúng tôi."

# 【木本】
# display as 木本
# JP: 「そぎゃんと興味あるとでしたら、頼みましょうか。\n『雲仙』の店長に頼めば、届けてくれますけん」
2218 = "「Nếu hai người hứng thú đến vậy thì để tôi\nnhờ thử nhé.\nNhờ quản lý quán 'Unzen' thì cậu ấy sẽ\nmang đến cho」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、[とちのき,1]栃木さんですね。\nわたしたちも、またお伺いしに行きたいって思ってて」
1838 = "「A, là bác Tochigi nhỉ.\nChúng cháu cũng đang định đến thăm bác ấy\nmột chuyến」"

# 【木本】
# display as 木本
# JP: 「ああ、そりゃあちょうどよかとですなぁ。\n[とちのき,1]栃木も、『食堂車復活させるいう話ばどうなった』と」
1867 = "「A, thế thì đúng lúc quá.\nTochigi cũng hay hỏi 'Chuyện phục sinh toa\năn thế nào rồi'」"

# 【双鉄】
# display as 雙鐵
# JP: 「食堂車の、復活――」
2274 = "「Sự phục sinh, của toa ăn——」"

# monologue
# JP: その一言が、鍵と感じる。\nカチリと思考が回転し、僕を縛っていた鎖が外れる。
2656 = "Tôi cảm giác từ đó chính là chìa khóa.\nCạch một tiếng, suy nghĩ bắt đầu xoay\nchuyển, xiềng xích trói buộc tôi đã được\ntháo bỏ."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。僕らはそこに囚われていた。\nゆえに自ら、デザインに枠をはめてしまっていた」
1897 = "「Đúng rồi. Chúng ta đã bị trói buộc ở đó.\nNên tự chúng ta đã đóng khung thiết kế của\nmình lại」"

# 【木本】
# display as 木本
# JP: 「え？」
1808 = "「Hả?」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに？」
2255 = "「Anh hai?」"

# monologue
# JP: とても単純なことだった。
2967 = "Đó là một điều rất đơn giản."

# monologue
# JP: 『食堂車』という先入観に、\n調べ、積み重ねた知識自体に、邪魔されていた。
2608 = "「Chỉ cần tháo bỏ cái khung đó là được. Nếu\nvậy thì sẽ ổn.\nCách để mang đến bữa ăn tuyệt vời nhất\nkhông chỉ có mỗi việc nấu nướng」"

# 【双鉄】
# display as 雙鐵
# JP: 「その枠を外してしまえばいい。ならば、いける。\n最高の食事を届ける手段は、調理だけではない」
1782 = "「Anh hai——anh nghĩ ra gì rồi sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに――なんか、思いついたと？」
2252 = "「Dĩ nhiên là phương án cho toa ăn của\nchúng ta rồi. Nếu làm thế này——\nnó sẽ trở thành 'toa ăn ai cũng muốn lên'.\nĐối với bất kỳ ai」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論、僕らの食堂列車の案をだ。これならば――\n『よー乗る食堂列車』になれる。誰にとっても」
2107 = "「Tất cả là nhờ Hibiki đã mong muốn đến\nđây.\nNhờ em đã tha thiết muốn gặp và lắng nghe\nmọi người nói」"

# 【日々姫】
# display as 日日姬
# JP: 「えっ！！？」
# 1811 = "「哎？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が来たいと望んだから。\n会って話を聞きたいと、強く望んでくれたからだ」
2217 = "「Tất cả là nhờ Hibiki đã mong muốn đến\nđây.\nNhờ em đã tha thiết muốn gặp và lắng nghe\nmọi người nói」"

# monologue
# JP: 地元地元の強い要望。\nあちらを立てればこちらが立たぬと諦めたこと。
2801 = "Những yêu cầu mạnh mẽ của từng địa phương.\nNhững điều chúng tôi đã từ bỏ vì nghĩ rằng\nđược lòng người này thì mất lòng người\nkia."

# monologue
# JP: けれどもそれを、全て拾える。\n今の厨房設備さえ、過剰なものに換えてしまえる。
2433 = "Nhưng giờ đây, chúng tôi có thể đáp ứng\ntất cả.\nThậm chí có thể biến thiết bị nhà bếp hiện\ntại thành những thứ dư thừa."

# 【日々姫】
# display as 日日姬
# JP: 「まって、にぃに。何？　何ば？\n何ば、私のおかげとや？」
2135 = "「Khoan đã, anh hai. Gì cơ? Gì vậy?\nCái gì mà nhờ có em chứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ。日々姫はまだ気づいてないのか」
1928 = "「Gì chứ. Hibiki vẫn chưa nhận ra sao」"

# monologue
# JP: それも、嬉しい。
2958 = "Điều đó cũng khiến tôi vui."

# monologue
# JP: 僕が日々姫の目になれて。\n日々姫が見落としかけたことに、先に気づけて。
2651 = "Vì tôi có thể trở thành đôi mắt của\nHibiki.\nCó thể nhận ra trước những điều mà Hibiki\nsuýt bỏ sót."

# 【双鉄】
# display as 雙鐵
# JP: 「たくさんの人達と会って話してきたこと自体がだ。\nその声を乗せる食堂列車を、僕らは走らせられるから」
1960 = "「Chính là việc em đã gặp gỡ và trò chuyện\nvới rất nhiều người đấy.\nBởi vì chúng ta có thể vận hành một toa ăn\nchở theo những tiếng nói đó」"

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　えええ！？　なんで、どぎゃんして」
1813 = "「Hả!? Hảảả!? Sao cơ, bằng cách nào chứ」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはじっくり説明するが――\nさしあたって、今、ひとつだけかまわんか？」
2211 = "「Anh sẽ giải thích kỹ càng sau——\nNhưng trước mắt, bây giờ anh làm một việc\nđược không?」"

# monologue
# JP: 言えばぶんぶん、日々姫が頷く。
2932 = "Vừa nói xong, Hibiki đã gật đầu lia lịa."

# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　なんでんかまわんけん！\nいうて――どぎゃんことでもいうてみて」
2108 = "「Dĩ nhiên rồi! Việc gì cũng được hết!\nAnh nói đi——có chuyện gì cứ nói thử xem」"

# 【双鉄】
# display as 雙鐵
# JP: 「列車の名前だ。『つなげる食堂』。\n素晴らしい名ではあるのだが――」
1906 = "「Là tên của đoàn tàu. 'Toa ăn Kết nối'.\nDù đó là một cái tên tuyệt vời nhưng——」"

# 【日々姫】
# display as 日日姬
# JP: 「もっとよかとがあるなら！」
1882 = "「Nếu có cái tên nào hay hơn thì!」"

# monologue
# JP: スケッチブックがひらかれる。\n『つなげる食堂』の文字に二本の線が引かれて――
2550 = "Cuốn sổ phác thảo được mở ra.\nHai đường gạch chéo gạch ngang dòng chữ\n'Toa ăn Kết nối'——"

# 【日々姫】
# display as 日日姬
# JP: 「聞かせて？　にぃに」
2253 = "「Nói cho em nghe đi? Anh hai」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、書こう。日々姫とともに」
1732 = "「Không, hãy viết ra nào. Cùng với Hibiki」"

# monologue
# JP: 日々姫の手からペンを取らずに、\nそのまま指を絡め重ねる。
2634 = "Tôi không lấy cây bút khỏi tay Hibiki,\nmà cứ thế đan những ngón tay của mình lên\ntay em ấy."

# monologue
# JP: 日々姫が腕の力を抜いて、僕に全てを委ねてくれる。\nその気持ちごと――一緒にペンを走らせる。
2758 = "Hibiki thả lỏng cánh tay, giao phó mọi thứ\ncho tôi.\nCùng với cảm xúc đó——chúng tôi cùng nhau\nđưa bút."

# 【双鉄】
# display as 雙鐵
# JP: 「つくるのではなく、運びこむのだ。\nとれたてを、車内にインする食堂だ。ゆえに――」
1725 = "「Không phải là chế biến, mà là mang vào.\nLà một toa ăn đưa những nguyên liệu tươi\nngon nhất vào trong xe (In). Vì vậy——」"

# monologue
# JP: 『とれいん食堂』
1358 = "『Toa ăn Train (Toa ăn Tàu hỏa)』"

# monologue
# JP: 記せば日々姫がぱっと輝く！
2392 = "Vừa viết xong, nét mặt Hibiki bừng sáng!"

# 【日々姫】
# display as 日日姬
# JP: 「そっか！　それなら！！！」
1896 = "「Ra vậy! Nếu là thế thì!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、できるとも！」
1857 = "「Ừ, làm được chứ!」"

# monologue
# JP: 伝わった。日々姫も賛成してくれている！\nならば、『雲仙』。まず栃木さんからお願いしよう。
2780 = "Đã truyền đạt được rồi. Hibiki cũng tán\nthành!\nVậy thì, 'Unzen'. Trước tiên hãy đi nhờ\nbác Tochigi thôi."

# monologue
# JP: 僕らの『とれいん食堂』と繋がっていく、\n最初のレールとなってもらおう。
2572 = "Hãy nhờ bác ấy trở thành thanh ray đầu\ntiên,\nkết nối với 'Toa ăn Train' của chúng tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「走ろう、日々姫。今度こそ」
2013 = "「Chạy thôi, Hibiki. Lần này nhất định」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 1856 = "「嗯！」" 

# monologue
# JP: そして必ず、真闇姉にも。\n僕らと一緒に、最高の旅をしてもらおう。
2786 = "Và chắc chắn, cả chị Mayami nữa.\nHãy để chị ấy cùng chúng tôi trải nghiệm\nchuyến đi tuyệt vời nhất."
