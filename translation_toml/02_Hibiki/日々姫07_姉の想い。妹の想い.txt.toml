1892 = "「Thực ra, chúng tôi cũng nghĩ vậy.\n\\x%l扇形機関庫;#00ffc040;Gara đầu máy hình ngành%l;#; mà không có \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#;\nthì thật sự không ra thể thống gì」"

# 【日々姫】
