2135 = "「等等，阿哥，你這說什麼呢？多虧了我什麼呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ。日々姫はまだ気づいてないのか」
1928 = "「怎麼，你還沒發現嗎？」" 

# monologue
# JP: それも、嬉しい。
2958 = "這一點也很讓我開心。" 

# monologue
# JP: 僕が日々姫の目になれて。\n日々姫が見落としかけたことに、先に気づけて。
2651 = "我能勝任日日姬的雙眼。我先一步發現了日日姬所忽視的事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「たくさんの人達と会って話してきたこと自体がだ。\nその声を乗せる食堂列車を、僕らは走らせられるから」
1960 = "「我是說多虧了你的四處尋訪，我們才能夠讓承載著大家意見的餐車開動起來」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　えええ！？　なんで、どぎゃんして」
1813 = "「哎？！哎哎哎？！為什麼，要怎麼開動呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはじっくり説明するが――\nさしあたって、今、ひとつだけかまわんか？」
2211 = "「這個需要花上一段時間來說明。現在先告訴你其中一個想法，可以嗎？」" 

# monologue
# JP: 言えばぶんぶん、日々姫が頷く。
2932 = "話音剛落，日日姬就拚命點起了頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　なんでんかまわんけん！\nいうて――どぎゃんことでもいうてみて」
2108 = "「當然！什麼都成！不——有好主意的話千萬要告訴我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「列車の名前だ。『つなげる食堂』。\n素晴らしい名ではあるのだが――」
1906 = "「就是列車的名字。“紐帶食堂”。雖然這個名字很棒……」" 

# 【日々姫】
# display as 日日姬
# JP: 「もっとよかとがあるなら！」
1882 = "「如果有更好的話也可以！」" 

# monologue
# JP: スケッチブックがひらかれる。\n『つなげる食堂』の文字に二本の線が引かれて――
2550 = "她翻開了素描簿。然後在“紐帶食堂”四個字上畫了兩條線。" 

# 【日々姫】
# display as 日日姬
# JP: 「聞かせて？　にぃに」
2253 = "「阿哥，快告訴我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、書こう。日々姫とともに」
1732 = "「不，我要和你一起寫」" 

# monologue
# JP: 日々姫の手からペンを取らずに、\nそのまま指を絡め重ねる。
2634 = "我沒有從日日姬的手中拿走筆，而是直接用手握住了她的手。" 

# monologue
# JP: 日々姫が腕の力を抜いて、僕に全てを委ねてくれる。\nその気持ちごと――一緒にペンを走らせる。
2758 = "日日姬的手上沒有用力，將一切交給了我。我順著她的這份心意，一起在紙上開始書寫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つくるのではなく、運びこむのだ。\nとれたてを、車内にインする食堂だ。ゆえに――」
1725 = "「不用製作菜餚，而是直接送入。將新鮮的食物送入列車內，供旅客享用的食堂。所以就叫……」" 

# monologue
# JP: 『とれいん食堂』
1358 = "“列車食堂”" 

# monologue
# JP: 記せば日々姫がぱっと輝く！
2392 = "一下筆，日日姬就恍然大悟！" 

# 【日々姫】
# display as 日日姬
# JP: 「そっか！　それなら！！！」
1896 = "「對啊！如果是這樣的話！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、できるとも！」
1857 = "「嗯，可以！」" 

# monologue
# JP: 伝わった。日々姫も賛成してくれている！\nならば、『雲仙』。まず栃木さんからお願いしよう。
2780 = "日日姬領會到了。她也非常贊同！那就先從“雲仙”開始。向櫪木先生說出我們的請求吧。" 

# monologue
# JP: 僕らの『とれいん食堂』と繋がっていく、\n最初のレールとなってもらおう。
2572 = "希望他願意成為與我們的“列車食堂”相連的第一根鐵軌。" 

# 【双鉄】
# display as 雙鐵
# JP: 「走ろう、日々姫。今度こそ」
2013 = "「日日姬，這次我們一定要讓它開動起來」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 1856 = "「嗯！」" 

# monologue
# JP: そして必ず、真闇姉にも。\n僕らと一緒に、最高の旅をしてもらおう。
2786 = "最後我們一定要讓真闇姐跟我們一起享受最完美的旅程。" 
