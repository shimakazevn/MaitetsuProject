1819 = "「Dù rắc rối cũng làm thôi, anh hai! Lấy\nđược sự chấp thuận của hội đồng,\nnhờ chị Kisaki——và cả chị Paulette giúp đỡ\nnữa」"

# 【双鉄】
# display as 雙鐵
