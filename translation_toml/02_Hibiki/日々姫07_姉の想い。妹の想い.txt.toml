2604 = "Chúng tôi đã nghĩ đến việc chỉ lấy đặc sản\ncủa Ohimitera làm nhân vật chính.\nThậm chí khảo sát cũng chỉ được thực hiện\nở Ohimitera."

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1855 = "「嗯」" 

# monologue
