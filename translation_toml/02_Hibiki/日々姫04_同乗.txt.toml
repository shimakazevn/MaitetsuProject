# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1904 = "「啊」" 

# monologue
# JP: 驚いたような小さな声。
2568 = "她驚訝地輕聲叫了出來。" 

# monologue
# JP: ポーレットの薄い唇は、\n言葉を探しているかのように、もごもご動く。
2741 = "波萊特蠕動著薄唇，彷彿在尋找接下來的話。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ここまで、みんなでこれたから。ここから先へも、\n双鉄くん。どうか、みんなを連れて行ってください」
2051 = "「是大家一起走到了這一步的。雙鐵君，接下來也拜託你帶領大家前進」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうできるよう、最善の努力を重ねよう」
1994 = "「我一定盡力」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、期待してますね」
1880 = "「呵呵，看你的了」" 

# monologue
# JP: 笑顔がきゅっと引き締まる。
2740 = "波萊特突然收起笑容。" 

# monologue
# JP: 持ち上げた手の肘をたたんで、\n指を揃えて、額へと。
2561 = "她抬起手，彎起手肘，把手指並起伸向額頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「良い乗務を」
2127 = "「祝你乘務順利」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2155 = "「謝謝」" 

# monologue
# JP: 見よう見真似の答礼をして、\n僕も意識し、背筋を伸ばす。
2653 = "我見樣學樣回了一禮。一想到之後的事，我也有意識地挺直身板。" 

# monologue
# JP: さて――本当にいよいよだ。\n\x%l8620;#00ffc040;8620%l;#;のキャブへとあがり、日々姫の手を引きあがらせる。
2571 = "好了——這個時刻終於到了。我登入\\x%l8620;#00ffc040;８６２０%l;#;的駕駛室，握住日日姬的手把她拉上來。" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがと、にぃに」
2156 = "「謝謝你，阿哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「硬くなるなよ。訓練通りにやればいいんだ」
1845 = "「別緊張，和訓練時一樣就行了」" 

# monologue
# JP: 手に汗をかく日々姫をなだめつつ、\n自分自身にも言い聞かせる。
2643 = "我安撫著手心出汗的日日姬，並在心裡把相同的話說給自己聽。" 

# 【ハチロク】
# display as 八六
# JP: 「そのとおりです。双鉄様、日々姫。\n決して焦らず、わたくしの指示を信じてください」
2073 = "「沒錯。雙鐵少爺、日日姬。請一定不要著急，相信我的指示」" 

# monologue
# JP: \x%lタブレット;#00ffc040;タブレット%l;#;を換え、小さな運転ボディとなれば、\nハチロクはますます、頼もしくなる。
2432 = "八六交換\\x%lタブレット;#00ffc040;操作板%l;#;，換上小小的駕駛體，看起來越來越可靠。" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。ハチロク、よろしく頼む」
2191 = "「這是當然。八六，拜託你了」" 

# 【ハチロク】
# display as 八六
# JP: 「こちらこそです。双鉄様。日々姫。\nどうぞ、よろしくお願いします」
2002 = "「我才是。雙鐵少爺、日日姬，也拜託你們了」" 

# monologue
# JP: ハチロクが、小さな小さな手を伸ばす。
2434 = "八六伸出她那小之又小的手。" 

# monologue
# JP: 出発信号を確認し、\n堂々、晴れやかな声を張る。
2791 = "確認到出發信號，她威風凜凜地放出澄澈的聲音。" 

# 【ハチロク】
# display as 八六＆雙鐵
# JP: 「出発、進行！」
1844 = "「出發，前進！」" 

# monologue
# JP: （がくんっ！！）
2910 = "（鐺！！）" 

# 【ふかみ】
# display as 深美
# JP: 「きゃあっ！？」
1873 = "「呀！？」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、危なかばいっ！」
1964 = "「小深，危險！」" 

# monologue
# JP: なぎさんが、ふかみさんをふわっとだきとめます。
2463 = "凪小姐抱住失去平衡的深美小姐。" 

# monologue
# JP: 今、ガクってなってゆれたからです。\nゆれた理由は、たぶん、きっと――
2474 = "剛才鐺地一聲搖晃了一下。我想搖晃的原因一定是——" 

# 【おじいさん】
# display as 爺爺
# JP: 「……\x%l連結器;#00ffc040;連結器%l;#;を伸ばしきらんうち、\n速度をつけすぎてしもうたの」
1585 = "「……\\x%l連結器;#00ffc040;車鉤%l;#;還沒有鉤緊就把速度抬得太高了」" 

# monologue
# JP: ――わぁ、すごいです！
1532 = "——哇，好厲害！" 

# monologue
# JP: さすが、ポーレットが、『事情がわかってる人だけ』って、\n念押しをしたひとたちです！
2858 = "這些人不愧是波萊特選出的“了解情況的人”！" 

# 【凪】
# display as 凪
# JP: 「\x%l連結器;#00ffc040;連結器%l;#;が、何ばい？」
1577 = "「\\x%l連結器;#00ffc040;車鉤%l;#;是什麼？」" 

# 【ふかみ】
# display as 深美
# JP: 「え？　のびきってないうちに……とか、なんとか」
1894 = "「哎？好像是說還沒有鉤緊什麼的」" 

# 【れいな】
# display as 玲奈
# JP: 「あのですね、それはですねぇ」
2185 = "「這個啊，是這樣的」" 

# monologue
# JP: なぎさんとふかみさんは、\n鉄道のこと、まだまだくわしくありません。
2462 = "凪小姐和深美小姐對鐵路方面的知識還不是很熟悉。" 

# monologue
# JP: だかられいなが、ちゃあんとおしえてあげるのです！
2606 = "就讓玲奈來教她們吧！" 

# 【れいな】
# display as 玲奈
# JP: 「れんけつしたとき、れんけつきはがしゃあんてなって、\n一番おくまで行っちゃうのです」
2161 = "「車鉤連起來的時候，會嘎恰一聲撞到最深的位置」" 

# monologue
# JP: 右手のおやゆびとひとさしゆび。\n左手のおやゆびとひとさしゆび。
2417 = "伸出左右手的拇指和食指。" 

# monologue
# JP: ゆびのわっかをふたつつくって、\nいきおいよくがちゃあんてやって、くっつけてみせます。
2758 = "然後用手指做出兩個環，嘎恰一聲碰到一起。" 

# 【凪】
# display as 凪
# JP: 「なんね？　そん指が\x%l連結器;#00ffc040;連結器%l;#;と？」
1814 = "「什麼？你是說把手指當作\\x%l連結器;#00ffc040;車鉤%l;#;？」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、そうだよ凪ちゃん。勢い良く連結すると、\n指のわっかが両方とも、重なるみたいになっちゃうんだ」
1960 = "「對啊，小凪。猛地撞在一起後，手指的兩個環就扣在一起了」" 

# monologue
# JP: そうなのです。
2726 = "沒錯。" 

# monologue
# JP: そのじょうたいが、\n『れんけつきがちぢんだ』じょうたいなのです。
2859 = "這就是“車鉤縮緊”的狀態。" 

# 【れいな】
# display as 玲奈
# JP: 「ほんとは、ちぢんでるのをゆっくり伸ばして、\nそれで出発が、いい出発です」
2057 = "「本來應該把縮緊的車鉤慢慢拉直再出發，這樣才好」" 

# monologue
# JP: 重なりあってる指のわっかの、\n右だけそろそろうごかします。
2661 = "手指做的環合在一起，左手不動，右手緩緩地移動。" 

# monologue
# JP: 指はしずかに、つなぎ目の部分同士がくっつくまでのび、\nそしたら左手のわっかも、右手にひっぱられていきます。
2598 = "將手指慢慢移動，直到兩者連接的部分互相緊碰為止，然後做出左手的環被右手拉過去的動作。" 

# 【ふかみ】
# display as 深美
# JP: 「そっか……それなら、ガクンてならない」
1899 = "「哦……這樣就不會鐺地一下了」" 

# 【れいな】
# display as 玲奈
# JP: 「でも、れんけつきがちぢんでるのに、\nスピードを出して出発しちゃうと――」
1827 = "「但是，要是車鉤縮緊的時候一下子提高速度——」" 

# monologue
# JP: もう一度、指のわっかを重ねあわせて、\n右手の方だけ早くうごかしてひっぱります。
2454 = "再次合起手指做的環，右手迅速一拉。" 

# monologue
# JP: がちゃんって！　わっかのつなぎめ同士が、\n今度は強くぶつかって、れいな、ちょっとだけいたいです。
2523 = "嘎恰！環的介面狠狠相撞。玲奈稍微有點痛。" 

# 【ふかみ】
# display as 深美
# JP: 「ああ、うん。わかった。\n\x%l連結器;#00ffc040;連結器%l;#;が伸びきってないと、それで衝撃がきちゃうんだ」
1913 = "「啊，嗯。我懂了。\\x%l連結器;#00ffc040;車鉤%l;#;沒拉緊的話會產生衝擊」" 

# 【凪】
# display as 凪
# JP: 「けど、\x%l連結器;#00ffc040;連結器%l;#;同士がぶつかるくらいで、\nガクンっ！　ってあれほど、揺れよっと？」
1862 = "「可是，只不過是\\x%l連結器;#00ffc040;車鉤%l;#;撞在一起為什麼會鐺地一下發生這麼大的搖晃？」" 

# 【れいな】
# display as 玲奈
# JP: 「それはですねぇ。れんけつきの向こうには、\nれいなたちみんなが乗ってる\x%l客車;#00ffc040;客車%l;#;があるからですよぉ」
2189 = "「這是因為啊，車鉤後面有我們乘著的這節\\x%l客車;#00ffc040;客運車廂%l;#;」" 

# 【凪】
# display as 凪
# JP: 「ああ！　わかったばい！\n人と\x%l客車;#00ffc040;客車%l;#;とで、合計、すっごく重かとばいっ！」
1909 = "「啊！咱懂咧！因為人和\\x%l客車;#00ffc040;客運車廂%l;#;加起來很重！」" 

# 【れいな】
# display as 玲奈
# JP: 「そうなのです。だから、そろそろそろ～って\n出発しないと、がちゃんでガクンになるのです」
2072 = "「沒錯。所以說要慢慢、慢慢～啟動，不然就會嘎恰一聲再鐺地一下了」" 

# 【ふかみ】
# display as 深美＆凪
# JP: 「なるほど～」
1851 = "「原來是這樣～」" 

# monologue
# JP: よかったぁ。\nふたりとも、ちゃんとわかってくれましたぁ。
2547 = "太好了，她們懂了。" 

# monologue
# JP: あ……うん！　それよりももっとずうっとよかったです！\nそうてつさん、最初以外は、ちゃあんと運転できてます！
2513 = "啊……嗯！還有件更值得高興的事。在開頭的那下失誤之後，雙鐵先生一直駕駛得很好！" 

# 【凪】
# display as 凪
# JP: 「あああ！？\n話してるうち、駅をとっくに出ちゃっとるばい」
1906 = "「啊啊啊！？在咱們說話的時候車早就開出車站咧」" 

# 【ふかみ】
# display as 深美
# JP: 「ほんと。っていうか、気にならないで話せるくらい、\nこの\x%l客車;#00ffc040;客車%l;#;、揺れないで走ってくれてるんだね」
2107 = "「真的。說話的時候都沒注意到，這輛\\x%l客車;#00ffc040;客運車廂%l;#;跑得好穩」" 

# monologue
# JP: えへへ、そうですよぉ、ふかみさん。
2508 = "呵呵，沒錯，深美小姐。" 

# monologue
# JP: ハチロクさんも、そうてつさんも、ひびきさんも、\nすごく上手に運転してます。
2438 = "八六小姐、雙鐵先生還有日日姬小姐，大家都做得很好。" 

# 【凪】
# display as 凪
# JP: 「え？」
1892 = "「哎？」" 

# monologue
# JP: きょろきょろ、凪さんがいきなりあたりを見回します。\nだれかのこと、探してるみたいなかんじです。
2465 = "凪小姐突然開始東張西望。好像在找人。" 

# 【凪】
# display as 凪
# JP: 「あれっ？　っていうか、れいな一人と？\nポーレットさん、どこにもいなかとよ」
1930 = "「嗯？就玲奈一個人？波萊特小姐呢，怎麼不在」" 

# 【ふかみ】
# display as 深美
# JP: 「ええ？　れいなちゃん、はぐれちゃったの？」
1897 = "「哎？玲奈走散了嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「はぐれてないです。れいな、ポーレットと、\n今日は別々のおしごとなんです」
2071 = "「沒走散。今天玲奈和波萊特各自分頭工作」" 

# 【凪】
# display as 凪
# JP: 「ふぅん？」
1900 = "「唔？」" 

# monologue
# JP: れいな、ちゃあんと説明しました。
2777 = "玲奈詳細地解釋了一番。" 

# monologue
# JP: なのに凪さんが、まだポーレットを探すみたいに\nきょろきょろって――して、だだって窓にかけよります！
2489 = "可是，凪小姐東張西望，似乎仍在尋找波萊特——她突然衝到了窗邊！" 

# 【凪】
# display as 凪
# JP: 「これっ！　来て来て見て見てふかみちゃん」
1982 = "「快來看，快來看看這個！小深」" 

# 【ふかみ】
# display as 深美
# JP: 「この鉄橋！　\nだね、凪ちゃん。この下、わたしたちいつも通ってる！」
2054 = "「是那座鐵橋！是吧，小凪。我們經常從它下面穿過！」" 

# 【凪】
# display as 凪
# JP: 「舟から見上げてもみたかばいねぇ、汽車ぽっぽ」
1950 = "「好想有機會能坐在船上看火車呀」" 

# 【ふかみ】
# display as 深美
# JP: 「そうだね、下から見ると、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、\nどんな感じになってるのかなぁ？」
2048 = "「是啊，從下面看上來，\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;到底是什麼樣的呢？」" 

# monologue
# JP: うふふ、おふたり、たのしそおです。
2525 = "嘿嘿，兩位看起來很高興。" 

# 【おじいさん】
# display as 爺爺
# JP: 「うん、良かたい。\n煙ん色も、どうやら落ち着いてきよったばい」
1925 = "「嗯，太好了。煙的顏色也穩定下來了」" 

# 【おばあさん】
# display as 老奶奶
# JP: 「ほんと、良かですねぇ。シュッポ、シュッポと。\n蒸気の音ば、昔ば思い出させますねぇ」
2114 = "「真的穩定下來了，太好了。蒸汽的聲音讓人想起從前啊」" 

# monologue
# JP: なぎさんとふかみさんだけでなく、\n\x%l客車;#00ffc040;客車%l;#;のみんな、すごくにこにこでわくわくです。
2390 = "不止是凪小姐和深美小姐，\\x%l客車;#00ffc040;客運車廂%l;#;中的人們個個興高采烈。" 

# monologue
# JP: れいなもうれしくなっちゃいます。\nハチロクさん、さすがれいなのセンパイさんです！
2768 = "玲奈也高興起來了。八六小姐不愧是玲奈的前輩！" 

# monologue
# JP: （ガタンゴトン、ガタンゴトン）
2901 = "（哐璫哐璫、哐璫哐璫）" 

# monologue
# JP: 線路のリズム、すごくいいです。\n\x%l保線;#00ffc040;保線%l;#;の人が、きれいにきれいにしてくれたって、思います。
2810 = "線路上聲音的節奏非常棒。\\x%l保線;#00ffc040;巡線%l;#;的人之前一定把線路清理得很乾淨很乾淨。" 

# monologue
# JP: 小石とか、木の枝とか葉っぱとかそういうのがあると、\n線路、こんなに気持ちよさそうに歌ってくれないですから。
2829 = "要是有小石頭、樹枝和樹葉這些東西，線路是不會唱得這麼開心的。" 

# 【おばあさん】
# display as 老奶奶
# JP: 「緑の、深なってきましたねぇ」
2063 = "「植物越來越多了」" 

# 【おじいさん】
# display as 爺爺
# JP: 「じゃのう。空ば、隠されてしまいよる」
2047 = "「是啊，天都被遮住了」" 

# monologue
# JP: ほんとだ、お空、かくれちゃいました。\nれいな、ちょっとびっくりです。
2784 = "真的耶，天空躲起來了。玲奈稍微嚇了一跳。" 

# monologue
# JP: 運転室のまどからだと、線路の上に、\nいっつもお空が見えてますから。
2783 = "畢竟之前待在駕駛室裡的時候，窗外總是能看見天空。" 

# 【れいな】
# display as 玲奈
# JP: 「あ、でも――お空、無いのに、\n雲がもくもくでおもしろいです！」
1912 = "「啊，但是——雖然看不見天空，卻能看到白雲滾滾，好好玩！」" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;のえんとつから流れてくるけむり。
2617 = "從\\x%l8620;#00ffc040;８６２０%l;#;的煙囪不斷飄出白煙。" 

# monologue
# JP: お空の見えない森の中でも、\n真っ白い雲みたいにふわふわしてます。
2541 = "在這看不見天空的森林裡，它們像白雲一般飄蕩著。" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、今どの辺と？」
1966 = "「小深，咱們現在開到哪了？」" 

# 【ふかみ】
# display as 深美
# JP: 「え？　ええ、っと」
1893 = "「哎？呃」" 

# monologue
# JP: あ、ふかみさん困っちゃってます。
2517 = "啊，深美小姐好像很為難。" 

# monologue
# JP: れいな、ちゃあんとわかりますから、\nおふたりに教えてあげるのです！
2775 = "玲奈知道，就讓玲奈來告訴她們吧！" 

# 【れいな】
