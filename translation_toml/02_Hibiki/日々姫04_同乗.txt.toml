# 【ポーレット】
# display as 波萊特
# JP: 「話がどんどん広まっちゃって。それで、鉄道債……\n買って下さった方は、どうしても断れなくて」
2092 = "「消息越傳越開。那些……買了鐵路債券的人實在不好拒絕」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはそうだな。\nスポンサーの意向、ということになるものな」
1808 = "「也是。畢竟是出資人的要求」" 

# 【ポーレット】
# display as 波萊特
