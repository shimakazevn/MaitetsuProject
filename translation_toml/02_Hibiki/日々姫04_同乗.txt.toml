# monologue
# JP: 感情の起伏を抑えたその声は、\n怒っているようにも、呆れているようにも響く。
2566 = "她說話時壓抑著感情的起伏，似是憤怒又似是無奈。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あは、は――そうですよね」
1884 = "「哈、哈——真的」" 

# monologue
# JP: 言いつつ、ぺこり。\nポーレットは申し訳無さそうに頭を下げる。
2842 = "說著，波萊特不好意思地低下頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの……ちょっと、耳、いいですか？」
2203 = "「那個……我能跟大家說幾句悄悄話嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1926 = "「嗯？」" 

# monologue
# JP: ポーレットの口元に、僕と日々姫とハチロクの耳。\nひそひそばなしの輪が出来上がる。
