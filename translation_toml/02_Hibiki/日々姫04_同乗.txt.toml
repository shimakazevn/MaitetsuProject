2165 = "「辛苦了」" 

# 【凪】
# display as 凪
# JP: 「来たばい！　汽車ばい！　汽車ぽっぽばい！」
1834 = "「來了！是火車！火車耶！」" 

# 【ふかみ】
# display as 深美
# JP: 「ちょっ！？　凪ちゃん、ツバとんだよぉ」
1877 = "「呀！？小凪，你的口水都噴出來啦」" 

# monologue
# JP: 見慣れた顔と、\nはるかに多くの、見知らぬ顔達。
2719 = "有熟悉的面孔，但更多的是沒見過的人。" 

# 【おじいさん】
# display as 站台上的老人
# JP: 「ほう……ここまで走るようになったか」
1931 = "「嚯……已經能開到這來了啊」" 

# 【おばあさん】
# display as 站台上的老太太
# JP: 「生きてるうちに、\nまた動く蒸気を見れるとは思いませんでしたねぇ」
2070 = "「沒想到還能活著看到會動的蒸汽機車啊」" 

# monologue
# JP: がやつき、ざわめき。\nそうして、熱気。
