# 【日々姫】
# display as 日日姬
# JP: 「そっか。そしたら、\x%l8620;#00ffc040;8620%l;#;をバックさせて\x%l客車;#00ffc040;客車%l;#;と再連結で。\n\x%l客車;#00ffc040;客車%l;#;には、前も後ろもないから――」
1999 = "「我懂了。之後再讓\\x%l8620;#00ffc040;８６２０%l;#;倒車，重新連上\\x%l客車;#00ffc040;客運車廂%l;#;。因為\\x%l客車;#00ffc040;客運車廂%l;#;是沒有前後的——」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。そのまま\x%l8620;#00ffc040;8620%l;#;を前進させれば、\n\x%l列車;#00ffc040;列車%l;#;は、御一夜温泉駅へと向かうこととなります」
2067 = "「正是如此。這時讓\\x%l8620;#00ffc040;８６２０%l;#;前進，\\x%l列車;#00ffc040;列車%l;#;就開向御一夜溫泉站了」" 

# monologue
