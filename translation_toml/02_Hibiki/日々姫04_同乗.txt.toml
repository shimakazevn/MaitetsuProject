1971 = "「就是現在。\\x%l自弁;#00ffc040;自剎%l;#;，“行駛”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l自弁;#00ffc040;自弁%l;#;、“運転”」
1575 = "「\\x%l自弁;#00ffc040;自剎%l;#;，“行駛”」" 

