# display as 稀咲
# JP: 「“イエスセット”、という古典的な話法。\n『はい』と答えさせる質問を続け、断りづらくさせる」
1971 = "「這是一種經典的發言技巧，叫做“ＹＥＳ　ＳＥＴ”。不斷提出對方只能回答“沒錯”的問題，讓對方難以反駁」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、日々姫とて稀咲に普段から鍛えられてる。\nこの程度の話法で、紛らわされなどはしないだろう」
1536 = "「但是，日日姬可是在你日復一日的鍛鍊下過來的。相信她不會被這種發言技巧給難住」" 

# 【稀咲】
# display as 稀咲
# JP: 「確かに、日々姫は成長してる。けどね？　双鉄。\n成長して――初めて見えてくることもある」
1792 = "「日日姬確實有很大的進步。不過雙鐵，有些問題是在進步之後才能發現的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
1604 = "「唔？」" 

# monologue
# JP: 問い返す前に口をつぐむ。\n新津議員の声のトーンが、落ちたゆえ。
2255 = "我還沒來得及反問，新津議員的聲調卻突然一沉，讓我不由地合上了嘴。" 

# 【新津】
# display as 新津
# JP: 「現在は他市が受けている恩恵を、御一夜市へ呼ぶ。\nそれが、『リゾート食堂列車』構想の骨子ですね？」
1680 = "「將其他市獲得的利益引至御一夜市。這就是“觀光餐車”方案的核心吧？」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1830 = "「是的」" 

# monologue
# JP: 確かにそれこそ、この計画の大目標のひとつだ。\n御一夜から大板へ。大板から御一夜へ。
2473 = "這確實是計劃的大目標之一。從御一夜到大分，再從大分到御一夜。" 

# monologue
# JP: 豪華食堂列車での最高の夕食を楽しんでの夜半着なら、\n終着駅近辺での宿泊が、最有力の選択肢となる。
2435 = "若要在豪華餐車享受完最舒適的晚餐體驗後在半夜下車的話，終點站附近的旅店便是住宿的最佳選擇。" 

# 【新津】
# display as 新津
# JP: 「他の全てが上手く運ぶ一方、御一夜市への直接の\n恩恵を運んでくれるこの列車だけが、滞っている」
1561 = "「其他方面都在順利運作，唯有這列能為御一夜市帶來直接利益的列車遲遲沒有進展」" 

# 【日々姫】
# display as 日日姬
# JP: 「……はい」
1261 = "「……是的」" 

# 【新津】
# display as 新津
# JP: 「市長。優先順位をお間違えではありませんか？\nあるいは、ご負担が大きすぎるのでは？」
1697 = "「市長，您是不是搞錯優先順序了？或者說，您的負擔是不是太大了？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1605 = "「啊……」" 

# monologue
# JP: なるほど――これはキツい一手だ。\n聞いた誰もが、同じ疑念を抱いてしまうその上に……
2397 = "確實，他問到弱點上了。每一個人聽到他的話都會產生同樣的疑問，而且……" 

# 【日々姫】
# display as 日日姬
# JP: 「それは……\nそのご指摘は――」
1966 = "「這個……您的指摘……」" 

# monologue
# JP: 責任という二文字の意味を深く知るようになったからこそ、\n日々姫は決して、この質問を否定できぬゆえ。
2359 = "正因為日日姬深刻理解了“責任”二字的含義，她才無法反駁這樣的質問。" 

# 【新津】
# display as 新津
# JP: 「計画遅延の原因は、市長――いえ、デザイナー、\n右田日々姫さんのデザイン提出の遅延ですよね？」
1916 = "「而計劃之所以延遲，是因為市長——不，是設計師右田日日姬小姐遲遲交不出設計稿吧？」" 

# 【日々姫】
# display as 日日姬
# JP: 「そう……です。それは、間違いのない事実です」
1807 = "「是……的。這是無法否定的事實」" 

# 【新津】
# display as 新津
# JP: 「一期目で市長退任のご予定だったとも聞いています。\n今からでも、そのご判断をされても遅くないのでは？」
1752 = "「我聽說您原本並不打算繼續連任市長。我認為，即便您現在重拾當初的決定仍然為時未晚」" 

# 【日々姫】
# display as 日日姬
# JP: 「二期目への出馬も、自分で決断したことです。\n鉄道と行政のシナジーへのご期待をいただいたから」
1574 = "「參加第二屆市長的競選是我自己的決定。因為大家都期待我的任職能讓鐵路與政務產生協同效應」" 

# 【新津】
# display as 新津
# JP: 「ですので、現状。そのシナジーの発現が、市長。\nあなたの多忙によって遅らされているのでは？」
1579 = "「可看看目前的現狀，由於市長您過於忙碌，您所謂的協同效應一直未能體現，難道不是嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「それは……\nそれも、ご指摘のとおりの一面があるかと思います」
1967 = "「這個……您說得確實有一些道理」" 

# monologue
# JP: 歯切れが悪い。\n認めるのなら、すぱっと認めた方がいい。
2192 = "她開始有些含糊其辭了。既然要承認，那索性就乾脆地承認。" 

# monologue
# JP: だが、プライドが――デザイナーとして重ねたものが、\n恐らく日々姫の内側で、抵抗をしてしまっているのだ。
2127 = "但是，或許自尊心——日日姬身為設計師的經歷正在她的心中抵抗。" 

# 【稀咲】
# display as 稀咲
# JP: 「……残念。今はここまでかな」
1263 = "「……真可惜，看來到此為止了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1495 = "「不」" 

# monologue
# JP: 助けに出ようとした稀咲を止め、\n大急ぎでメモをしたためる。
2257 = "我阻止了想出手相助的稀咲，急忙寫起了紙條。" 

# monologue
# JP: 見えるがゆえに、日々姫に越えがたい谷があるなら。\n例え丸木であろうとも、橋をかけるのが僕の役目だ。
2194 = "如果有些難關是日日姬看得太過清楚才難以克服的話。那我就該想盡辦法為她鋪路搭橋。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、これを」
1799 = "「日日姬，看一下」" 

# 【日々姫】
# display as 日日姬
# JP: 「――」
# 1242 = "「……」" 

# monologue
# JP: 演壇ににじりより手渡したメモに、\nほんの一瞬、日々姫が目を走らせる。
2236 = "我偷偷地靠近講台，將紙條遞了過去。日日姬只是掃了一眼。" 

# monologue
# JP: 一瞬。それだけで十分だ。\n日々姫の目が一番深く見るのは常に、僕なのだから。
2124 = "但一眼就夠了。因為日日姬是最了解我的那個人。" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
1623 = "「嗯」" 

# monologue
# JP: 声に出し、メモをぎゅうっと握りしめる。
2186 = "她輕應了一聲，而後將紙條緊緊攥在了手裡。" 

# 【日々姫】
# display as 日日姬
# JP: 「ご指摘の通り、ガマダス、そして客車新造関連と、\n大規模なデザイン依頼が、立て続けに重なりました」
1853 = "「正如您所說，我現在要應付ＧＡＭＡＤＵＳ和新造客運車廂的相關工作，同時還肩負著大規模的設計委託」" 

# monologue
# JP: 多忙の二文字ではとても足りぬほどの混乱状況。\n全力をつぎ込んでのデザインの連続。
2375 = "用繁忙一詞都不足以形容這種混亂的狀況。日日姬必須全心全意投入接連不斷的設計工作之中。" 

# monologue
# JP: その上更に、デザインを活用しつくすための政治活動。\n――日々姫は確かに、疲弊し、消耗しつつある。
2428 = "而且在政務上也需要她將設計能力發揮得淋漓盡致。日日姬最近可謂是過著嘔心瀝血，身心交瘁的日子。" 

# 【日々姫】
# display as 日日姬
# JP: 「……私の、デザイナーとしての引き出しの中が、\n今は一時的に空っぽに近い状態なんだと思います」
1268 = "「……這段時間裡，身為設計師的我確實處於“靈感抽屜”枯竭的狀態」" 

# 【新津】
# display as 新津
# JP: 「そこです！　それを私も懸念している。\nデザイナーとしてのあなたには代わりはいない。が」
1686 = "「就是這一點！我正是擔心這一點。身為設計師，您是無可替代的。但是」" 

# monologue
# JP: 一拍。二拍。十分すぎる間。\n新津議員の問いかけを、議場の全員が反芻している。
2286 = "新津議員特地留了幾息的空檔，以便會場內的所有人有充分時間仔細回味他的問題。" 

# 【新津】
# display as 新津
# JP: 「市長職であれば代われるものはいくらもいましょう。\n分業からこそ生まれるシナジーも、またありましょう」
1915 = "「而能替您當市長的人卻不在少數。而且分工合作之後說不定更能引發協同效應」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1830 = "「是的」" 

# 【新津】
# display as 新津
# JP: 「しかし、そこを求めすぎ、[ひない,1]雛衣前市長が犯した失敗――\n消耗による停滞を、繰り返すのは、許されません」
1506 = "「不過我們不能為了過於追求那種效應，重蹈雛衣前市長的覆轍——　最後因消耗過大而停滯不前」" 

# 【日々姫】
# display as 日日姬
# JP: 「まさしく、おっしゃる通りです。\n反面、こうも言える筈です」
1721 = "「您說得很有道理。那麼反過來也可以這麼說」" 

# monologue
# JP: 畳み掛けられた日々姫も、また、たっぷりとした間を置く。\n胸を張り、堂々とした声をそこから響かせる。
2475 = "遭遇接連猛攻的日日姬也停頓了好一段時間。她挺起胸膛，以洪亮的聲音繼續回應道。" 

# 【日々姫】
# display as 日日姬
# JP: 「代わりの居ないデザイナーが市長を兼務するからこそ。\nそうすることでしか生めないメリットも、無視出来ない」
1874 = "「用無可代替的設計者來兼任市長，此舉也擁有難以忽視的獨特優勢」" 

# 【新津】
# display as 新津
# JP: 「まぁ、それは――確かですな」
1968 = "「這個……確實沒錯」" 

# monologue
# JP: 自分でさきほど認めたことだ。\n新津議員に、ここを否定する余地は無い。
2471 = "這是剛才新津議員自己都承認過的事，如今由不得他再回頭否定。" 

# monologue
# JP: 実際、ガマダス等の立案から実現までの速度など、\n日々姫が市長ならではの圧倒的なものだった。
2202 = "實際上，正因為日日姬是市長，ＧＡＭＡＤＵＳ等計劃從立案到實現才能如此迅速。" 

# 【日々姫】
# display as 日日姬
# JP: 「ご理解ありがとうございます。ですので、そこを\nもう一度活用していくべく、基本に立ち返ります」
1729 = "「感謝您的理解。因此，為了再一次利用這種優勢，我打算回歸初心」" 

# 【新津】
# display as 新津
# JP: 「と、いうと？」
1720 = "「您是指？」" 

# 【日々姫】
# display as 日日姬
# JP: 「政治をデザインに、デザインを政治に活かす。\nそのための絵を描くことが、私の基本姿勢です」
1681 = "「將政治活用於設計，將設計活用於政治上。為此而執筆是我的基本方針」" 

# monologue
# JP: 渡したメモに書いたのは、旅程変更のその内容。
2254 = "我遞給她的紙條上寫的是行程安排的變更。" 

# monologue
# JP: ＜　週明け　→　今週末から　＞\nたったそれだけの文字にすぎない。
1220 = "“星期一　→　從這週末開始”，就只有這麼幾個字。" 

# 【日々姫】
# display as 日日姬
# JP: 「週明けから予定されている湯富院市視察。\nその日程に前乗りし、私的な取材旅行を行います」
1737 = "「我原本計劃從週一開始到湯布院市考察。現在我要將日程提前，進行私人的尋訪之旅」" 

# 【新津】
# display as 新津
# JP: 「私的な……公費を使わず、ということですか」
1900 = "「私人……也就是不使用公費嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい、私費で前乗り滞在し、\n湯富院と文庫森とを丁寧に見学します」
1831 = "「是的，我打算自費提前趕赴目的地，仔細參觀湯布院與豐後森」" 

# 【新津】
# display as 新津
# JP: 「ふぅむ――それは」
1602 = "「唔……這……」" 

# 【議長】
# display as 議長
# JP: 「新津議員。時間です。質問を終えてください」
1774 = "「新津議員，時間已到，請結束提問」" 

# 【新津】
# display as 新津
# JP: 「ああ――はい、議長」
1618 = "「啊，是，議長」" 

# monologue
# JP: ほんの束の間、きつく結ばれた新津議員の口元が、\n次の瞬間、見事なまでの笑みの形に開かれる。
2135 = "前一秒還在皺眉抿嘴的新津議員，馬上就露出了堪稱完美的笑容。" 

# 【新津】
# display as 新津
# JP: 「よいご視察となることを期待しています。\n御一夜市の未来のために、あなたのデザインが必要だ」
1895 = "「祝願您的考察之旅能有所收穫。為了御一夜市的未來，我們需要您的設計」" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがとうございます。ご期待を励みとし、\n今後ともデザインを市政に活かしてまいります」
2022 = "「非常感謝。我一定不負您的期待，今後也將設計活用於市政之上」" 

# 【議長】
# display as 議長
# JP: 「これにて、新津議員の質問を終わります。\n続きまして、『御一夜市民の会』、[ふせ,1]布施議員――」
1773 = "「新津議員的提問就此結束。接下來是“御一夜市民會”的布施議員――」" 

# 【日々姫】
# display as 日日姬
# JP: 「あああ～～　やすらぐ～」
1611 = "「啊啊啊～～渾身舒暢了～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お疲れ、日々姫」
1549 = "「你辛苦了，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに～　なでなで～」
2012 = "「阿哥～我要摸頭～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1623 = "「嗯」" 

# monologue
# JP: ぐったり机に倒れ伏す日々姫の髪をなでてやる。\n少し汗を含んでいる。指に柔らかにまとわってくる。
2345 = "日日姬精疲力盡地趴在桌上，任由我撫摸她的秀髮。她微微汗濕的髮絲溫柔地纏繞著我的指尖。" 

# 【稀咲】
# display as 稀咲
# JP: 「よくがんばったね、日々姫。\n終盤は大幅に持ち直した。あれなら評価は五分五分だ」
1795 = "「日日姬，你做得很好。在最後階段成功扳回了頹勢。憑你最後的表現，評價算是旗鼓相當吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのあたりが妥当な採点か」
1969 = "「這個評價很妥當」" 

# monologue
# JP: 新津議員の指摘はもっともなものであり、\n日々姫はそれを受け入れた上で、善後策を示した。
2287 = "新津議員的指摘確實有一番道理，而日日姬不僅接納了他的觀點，而且還提出了善後方案。" 

# monologue
# JP: 日々姫市政に対する評価は、継続、換え時――\n恐らくは、どちら側にも大きな変化を見せないだろう。
2206 = "對於日日姬的施政評價，是連任，還是換人——兩種呼聲應該都不會產生太大的變化。" 

# 【日々姫】
# display as 日日姬
# JP: 「専業の議員さんと五分五分か～！\nえへへ、私、頑張っとるよねー」
1920 = "「與專業的議員打平了啊～！嘿嘿，我做得還不賴呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1814 = "「是啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「なら？　ね？　にぃに。ご褒美ご褒美～」
1762 = "「所以阿哥，我要獎勵～」" 

# monologue
# JP: ちょんちょんと、\n日々姫の指がそのつややかな頬を指す。
2335 = "日日姬用手指指著自己光滑的臉頰。" 

# monologue
# JP: あまりに可愛いキスのおねだり。\n僕に応じない理由など――
2181 = "她索要親吻的方式太可愛了。我根本沒有理由拒絕。" 

# 【稀咲】
# display as 稀咲
# JP: 「んんっ！」
# 1586 = "「咳咳！」" 

# monologue
# JP: おっと、あった。\n稀咲の存在が一瞬、頭から飛んでいた。
2147 = "哎喲，理由還是有的。我一下子忘了稀咲還在。" 

# 【稀咲】
