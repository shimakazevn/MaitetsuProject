2014 = "「Tại đây, không chỉ dừng lại ở việc sửa chữa, phục hồi, mà việc nhận đơn đặt hàng và chế tạo toa hành khách mới cũng đã được bắt đầu.」"
# 【新津】
# display as 新津
# JP: 「右田市長のデザインによる車両たちですな。\n鉄道デザインに関する市長の成果は、目覚ましい」
