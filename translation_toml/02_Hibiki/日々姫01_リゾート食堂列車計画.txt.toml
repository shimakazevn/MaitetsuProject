2327 = "日日姬慢慢地翻開從不離手的素描簿。" 

# monologue
# JP: 真闇姉がいる。ハチロクがいる。僕がいる。\n蔵の皆……斉藤さん――日々姫を蔵から追った人さえ。
2115 = "上面有真闇姐，有八六，還有我。酒廠的大伙都在……就連把日日姬趕出酒廠的齋藤也在上面。" 

# 【双鉄】
# display as 雙鐵
# JP: 「笑っている。あたたかだな」
1654 = "「大家都在笑。好溫馨啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。あったか。にぃにが言ってくれたから。\n私、また――見れるように、描けるようになったけん」
1628 = "「嗯，好溫馨。因為聽到了哥哥的話，我……才能重新看清，並且畫出這樣的景象」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1623 = "「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「そしたら、もーっとこの家が、蔵が、みんなが。\n好きに、大好きになったけん。やけん――」
1877 = "「畫下來之後，我發現自己更加喜歡這個家，喜歡酒廠，喜歡大家了。所以——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
1790 = "「日日姬」" 

# monologue
# JP: くっつきあってる日々姫の体が、\nほんのすこしだけ硬くなる。
2426 = "緊貼著我的日日姬身體一僵。" 

# monologue
# JP: 泣きそうなのか、どこか緊張してるのか――\nどちらにしても、僕のすることは変わらない。
2170 = "她或許是想哭，又或許是在緊張——但不論如何，我要做的事情都是一樣的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう力むな」
1769 = "「放鬆點」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1623 = "「嗯」" 

# monologue
# JP: 抱き寄せる。\n腕をまわして、日々姫の全部を包み込む。
2245 = "我把日日姬抱在懷中。手臂環在她身後，包容她的一切。" 

# monologue
# JP: さっきよりもっとくっついて、\n僕の体の熱を与える。
2234 = "我們比剛才貼得更緊，我將身體的熱度分享給她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「認められるというのは、難しいことだ。\nだが、真闇姉となら――わかりあえる」
1727 = "「想得到認可並不容易。但你和真闇姐一定能互相理解的」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1623 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だからきっと、いつか自然と訪れるはずだ。\n真闇姉が僕らのことを、一人前と認めてくれる瞬間が」
1758 = "「所以總有一天，真闇姐認可我們的那一刻一定會到來的」" 

# monologue
# JP: 今この時も、僕らをさりげなく守り続けてくれる手を。
2387 = "真闇姐至今仍在暗地裡保護著我們。" 

# monologue
# JP: 真闇姉がいつか、そうっと離し――\n安心して、真闇姉自身のために、使ってくれる瞬間が。
2429 = "而讓她能夠安心放手，多花點心思在自己身上的那一刻一定會到來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これだけ努力を重ねているのだ。\nこの積み重ねの先には必ず、その日が待ってる」
1735 = "「我們都已經努力這麼久了。遲早有一天，我們一定會收穫努力的果實」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 1624 = "「嗯！」" 

# monologue
# JP: 日々姫の目が細まって、\nやわらかに頭がすりつけられる。
2343 = "日日姬眯著眼睛，用腦袋在我的胸口輕輕地磨蹭。" 

# monologue
# JP: 子猫のようだと、ふいに感じる。
2190 = "她這種樣子突然讓我聯想到小貓。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
# 1790 = "「日日姬」" 

# monologue
# JP: だから、撫でる。\n髪を、首筋を、耳の裏を。
2261 = "所以，我撫摸著她的頭髮、脖頸和耳背。" 

# monologue
# JP: そのたび日々姫はくすぐったがり、\nイヤイヤ体をくねらせつつも、嬉しげな声をだす。
2229 = "我一摸上去，日日姬就癢得扭起身子躲閃，但還是發出了高興的呻吟聲。" 

# 【日々姫】
# display as 日日姬
# JP: 「もー、赤ちゃん扱いせんといてー」
1885 = "「真是的，別把人家當小寶寶啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなつもりはなかったのだが」
1732 = "「我並沒有那個意思」" 

# 【日々姫】
# display as 日日姬
# JP: 「いつまでも赤ちゃんじゃおられんけん」
1585 = "「咱又不能一直都是小寶寶嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1613 = "「啊！」" 

# monologue
# JP: 瞳が、まっすぐ僕を捉える。
2175 = "她的雙眼牢牢地盯著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「……わたし、大人になりたいけん。\n大人に、なるけん」
1259 = "「……我想長大嘛。想變成大人嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1623 = "「嗯」" 

# monologue
# JP: 未だ自分を大人だと認められない唇は、\nけれど静かに――子供には決していえない言葉を紡ぎ出す。
2477 = "雖然她尚未認可自己是大人，但卻平靜地說出了小孩子絕對說不出的話。" 

# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇのこと。\nそうして――自由にしてあげるけん」
1748 = "「我想長大——讓阿姐獲得自由」" 
