2238 = "Tôi không hiểu ý đồ của nghị viên Niitsu khi cố tình nhắc đến nó ở đây, và giống như Hibiki, tôi cũng không khỏi bối rối."
# 【日々姫】
# display as 日日姬
# JP: 「それは……ご評価、痛み入ります」
1962 = "「Chuyện đó......rất cảm ơn ngài đã đánh giá cao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
1613 = "「!」"
# monologue
# JP: 語尾がはねた。なまりが出ている。\nせっかく戻った落ち着きが、思わぬ形で崩された。
2451 = "Âm cuối bị vút lên. Giọng địa phương lại lòi ra rồi. Sự bình tĩnh khó khăn lắm mới lấy lại được, đã bị phá vỡ theo một cách không ngờ tới."
# 【新津】
# display as 新津
# JP: 「復線の効果は確かに大きい。車両輸送のコストは\n劇的に軽減され、市長のおっしゃる需要も生まれた」
1702 = "「Hiệu quả của việc khôi phục tuyến đường quả thực rất lớn. Chi phí vận chuyển phương tiện đã giảm đáng kể, và nhu cầu như lời thị trưởng nói cũng đã được sinh ra.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい」
1830 = "「Vâng.」"
# 【新津】
# display as 新津
# JP: 「貨物の需要も、右肩上がりに伸びている。\nエアクラ工場が[せんだい,1]千内にできたおかげでもありますな」
1944 = "「Nhu cầu vận chuyển hàng hóa cũng đang tăng lên đều đặn. Đó cũng là nhờ nhà máy Aircra được xây dựng ở Sendai.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1830 = "「是的」" 
# 【稀咲】
# display as 稀咲
# JP: 「ああ――そうくるのか。\n新津議員も成長したね」
1592 = "「A——ra là dùng chiêu đó sao. Nghị viên Niitsu cũng tiến bộ rồi đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「宝生副市長？」
1674 = "「Phó thị trưởng Houshou?」"
# 【稀咲】
# display as 稀咲
# JP: 「聞いていればわかるよ、右田秘書。\n日々姫の成長も、これは試されることになるね」
1542 = "「Cứ nghe tiếp đi rồi sẽ hiểu, thư ký Migita. Lần này, sự trưởng thành của Hibiki cũng sẽ bị thử thách đấy.」"
# 【新津】
# display as 新津
# JP: 「……しかしながら、客車受注は未だ乏しく、\n[ぶつりゅうぞう,2]物流増の恩恵も極めて限定的――ですよね？　市長」
1256 = "「......Tuy nhiên, lượng đơn đặt hàng toa hành khách vẫn còn khan hiếm, và lợi ích từ việc tăng cường hậu cần cũng vô cùng hạn chế——đúng không thưa thị trưởng?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい。ご指摘の通りです」
1833 = "「Vâng. Đúng như ngài đã chỉ ra.」"
# 【新津】
# display as 新津
# JP: 「御一夜市が最も多くの資金を出し汗を流しての\n路線延伸が、御一夜市以外の土地だけを潤している」
1714 = "「Thành phố Ohimitera đã bỏ ra nhiều tiền bạc và mồ hôi công sức nhất để mở rộng tuyến đường, nhưng lại chỉ làm giàu cho những vùng đất ngoài Ohimitera.」"
# monologue
# JP: この指摘にも、日々姫はごくごく自然と頷く。\nというかこれは――この流れは――
2205 = "Trước sự chỉ trích này, Hibiki cũng gật đầu một cách vô cùng tự nhiên. Hay nói đúng hơn, cái này——mạch diễn biến này——"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲もしばしば使うよな。この流れ――\n相手に『はい』と返事をさせ続ける流れを」
1905 = "「Kisaki cũng thường dùng chiêu này nhỉ. Mạch diễn biến này—— Mạch diễn biến khiến đối phương liên tục phải trả lời 『Vâng』 ấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「気づいていたのか。まぁ、当然かな？\nボクたちも、いい加減長い付き合いだしね」
1541 = "「Anh nhận ra rồi sao. Mà, cũng là đương nhiên nhỉ? Chúng ta cũng quen biết nhau khá lâu rồi mà.」"
# monologue
# JP: 小声の会話を交わしながらも、\n視線は決して混じらない。
2478 = "Dù đang trao đổi bằng giọng nhỏ, nhưng ánh mắt chúng tôi tuyệt đối không chạm nhau."
# monologue
# JP: 日々姫の一言一句、一挙手一投足を注視して、\nいつでも動ける姿勢を維持し続けるから。
2235 = "Bởi vì chúng tôi đang dán chặt mắt vào từng lời nói, từng cử chỉ của Hibiki, luôn duy trì tư thế sẵn sàng hành động bất cứ lúc nào."
# 【稀咲】
# display as 稀咲
# JP: 「“イエスセット”、という古典的な話法。\n『はい』と答えさせる質問を続け、断りづらくさせる」
1971 = "「\"Yes Set\", một thủ pháp đàm phán cổ điển. Liên tục đưa ra những câu hỏi khiến đối phương phải trả lời 『Vâng』, từ đó làm cho họ khó lòng từ chối.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だが、日々姫とて稀咲に普段から鍛えられてる。\nこの程度の話法で、紛らわされなどはしないだろう」
1536 = "「Nhưng Hibiki cũng thường xuyên được Kisaki rèn luyện mà. Với thủ pháp đàm phán cỡ này, con bé sẽ không bị lừa đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「確かに、日々姫は成長してる。けどね？　双鉄。\n成長して――初めて見えてくることもある」
1792 = "「Đúng là Hibiki đang trưởng thành. Nhưng mà này? Soutetsu. Có những thứ——chỉ khi trưởng thành mới có thể nhìn thấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
1604 = "「Hửm?」"
# monologue
# JP: 問い返す前に口をつぐむ。\n新津議員の声のトーンが、落ちたゆえ。
2255 = "Tôi im bặt trước khi kịp hỏi lại. Bởi vì giọng điệu của nghị viên Niitsu đã trầm xuống."
# 【新津】
# display as 新津
# JP: 「現在は他市が受けている恩恵を、御一夜市へ呼ぶ。\nそれが、『リゾート食堂列車』構想の骨子ですね？」
1680 = "「Kéo những lợi ích mà các thành phố khác đang được hưởng về Ohimitera. Đó chính là cốt lõi của ý tưởng 『Tàu ăn uống nghỉ dưỡng』 đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1830 = "「是的」" 
# monologue
# JP: 確かにそれこそ、この計画の大目標のひとつだ。\n御一夜から大板へ。大板から御一夜へ。
2473 = "Đó quả thực là một trong những mục tiêu lớn của dự án này. Từ Ohimitera đến Oita. Từ Oita về Ohimitera."
# monologue
# JP: 豪華食堂列車での最高の夕食を楽しんでの夜半着なら、\n終着駅近辺での宿泊が、最有力の選択肢となる。
2435 = "Nếu tận hưởng bữa tối tuyệt hảo trên chuyến tàu ăn uống sang trọng và đến nơi vào lúc nửa đêm, thì việc nghỉ qua đêm ở gần ga cuối sẽ là lựa chọn hàng đầu."
# 【新津】
# display as 新津
# JP: 「他の全てが上手く運ぶ一方、御一夜市への直接の\n恩恵を運んでくれるこの列車だけが、滞っている」
1561 = "「Trong khi mọi thứ khác đều đang tiến triển thuận lợi, thì chỉ có chuyến tàu này - thứ mang lại lợi ích trực tiếp cho thành phố Ohimitera - lại đang bị đình trệ.」"
# 【日々姫】
# display as 日日姬
# JP: 「……はい」
1261 = "「......Vâng.」"
# 【新津】
# display as 新津
# JP: 「市長。優先順位をお間違えではありませんか？\nあるいは、ご負担が大きすぎるのでは？」
1697 = "「Thưa thị trưởng. Có phải ngài đang nhầm lẫn về thứ tự ưu tiên không? Hay là, gánh nặng của ngài quá lớn?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1605 = "「A——」"
# monologue
# JP: なるほど――これはキツい一手だ。\n聞いた誰もが、同じ疑念を抱いてしまうその上に……
2397 = "Ra là vậy——đây là một nước đi chí mạng. Bất cứ ai nghe xong cũng sẽ nảy sinh cùng một mối nghi ngờ, chưa kể......"
# 【日々姫】
# display as 日日姬
# JP: 「それは……\nそのご指摘は――」
1966 = "「Chuyện đó...... Sự chỉ trích đó——」"
# monologue
# JP: 責任という二文字の意味を深く知るようになったからこそ、\n日々姫は決して、この質問を否定できぬゆえ。
2359 = "Chính vì đã hiểu sâu sắc ý nghĩa của hai chữ \"trách nhiệm\", nên Hibiki tuyệt đối không thể phủ nhận câu hỏi này."
# 【新津】
# display as 新津
# JP: 「計画遅延の原因は、市長――いえ、デザイナー、\n右田日々姫さんのデザイン提出の遅延ですよね？」
1916 = "「Nguyên nhân của việc dự án bị chậm trễ là do thị trưởng——không, là do nhà thiết kế Migita Hibiki đã nộp bản thiết kế muộn, đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「そう……です。それは、間違いのない事実です」
1807 = "「Đúng......vậy. Đó là một sự thật không thể chối cãi.」"
# 【新津】
# display as 新津
# JP: 「一期目で市長退任のご予定だったとも聞いています。\n今からでも、そのご判断をされても遅くないのでは？」
1752 = "「Tôi cũng nghe nói ngài dự định sẽ từ chức thị trưởng sau nhiệm kỳ đầu tiên. Ngay cả bây giờ, đưa ra quyết định đó vẫn chưa muộn đâu nhỉ?」"
# 【日々姫】
# display as 日日姬
# JP: 「二期目への出馬も、自分で決断したことです。\n鉄道と行政のシナジーへのご期待をいただいたから」
1574 = "「Việc tái tranh cử nhiệm kỳ hai cũng là quyết định của chính tôi. Bởi vì tôi đã nhận được sự kỳ vọng về sức mạnh tổng hợp giữa đường sắt và hành chính.」"
# 【新津】
# display as 新津
# JP: 「ですので、現状。そのシナジーの発現が、市長。\nあなたの多忙によって遅らされているのでは？」
1579 = "「Thế nên, hiện trạng là vậy. Việc thể hiện sức mạnh tổng hợp đó, thưa thị trưởng. Chẳng phải đang bị trì hoãn do sự bận rộn của ngài sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「それは……\nそれも、ご指摘のとおりの一面があるかと思います」
1967 = "「Chuyện đó...... Tôi nghĩ điều ngài chỉ ra cũng đúng một phần.」"
# monologue
# JP: 歯切れが悪い。\n認めるのなら、すぱっと認めた方がいい。
2192 = "Cách nói không dứt khoát. Nếu đã thừa nhận thì nên thừa nhận một cách thẳng thắn."
# monologue
# JP: だが、プライドが――デザイナーとして重ねたものが、\n恐らく日々姫の内側で、抵抗をしてしまっているのだ。
2127 = "Thế nhưng, lòng kiêu hãnh——những gì tích lũy được với tư cách là một nhà thiết kế, có lẽ đang phản kháng bên trong Hibiki."
# 【稀咲】
# display as 稀咲
# JP: 「……残念。今はここまでかな」
1263 = "「......Đáng tiếc thật. Bây giờ chắc chỉ đến đây thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1495 = "「Không.」"
# monologue
# JP: 助けに出ようとした稀咲を止め、\n大急ぎでメモをしたためる。
2257 = "Tôi ngăn Kisaki đang định ra tay giúp đỡ lại, và vội vàng viết một tờ giấy nhớ."
# monologue
# JP: 見えるがゆえに、日々姫に越えがたい谷があるなら。\n例え丸木であろうとも、橋をかけるのが僕の役目だ。
2194 = "Nếu vì nhìn thấy rõ mà có một vực thẳm khó vượt qua đối với Hibiki. Thì dù chỉ là một khúc gỗ tròn, việc bắc cầu cũng là nhiệm vụ của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、これを」
1799 = "「Hibiki, cái này.」"
# 【日々姫】
# display as 日日姬
# JP: 「――」
# 1242 = "「……」" 
# monologue
# JP: 演壇ににじりより手渡したメモに、\nほんの一瞬、日々姫が目を走らせる。
2236 = "Tôi lén lút tiến đến bục phát biểu và đưa tờ giấy nhớ, Hibiki lướt mắt qua trong tích tắc."
# monologue
# JP: 一瞬。それだけで十分だ。\n日々姫の目が一番深く見るのは常に、僕なのだから。
2124 = "Chỉ một khoảnh khắc. Vậy là đủ rồi. Bởi vì ánh mắt Hibiki luôn nhìn tôi sâu thẳm nhất mà."
# 【日々姫】
# display as 日日姬
# JP: 「うん」
1623 = "「Vâng.」"
# monologue
# JP: 声に出し、メモをぎゅうっと握りしめる。
2186 = "Em ấy cất tiếng, rồi nắm chặt tờ giấy nhớ."
# 【日々姫】
# display as 日日姬
# JP: 「ご指摘の通り、ガマダス、そして客車新造関連と、\n大規模なデザイン依頼が、立て続けに重なりました」
1853 = "「Đúng như ngài đã chỉ ra, Gamadus và các công việc liên quan đến chế tạo toa hành khách mới, những yêu cầu thiết kế quy mô lớn đã liên tục chồng chất lên nhau.」"
# monologue
# JP: 多忙の二文字ではとても足りぬほどの混乱状況。\n全力をつぎ込んでのデザインの連続。
2375 = "Một tình trạng hỗn loạn mà hai chữ \"bận rộn\" hoàn toàn không đủ để diễn tả. Những thiết kế liên tiếp đòi hỏi phải dồn toàn bộ tâm huyết."
# monologue
# JP: その上更に、デザインを活用しつくすための政治活動。\n――日々姫は確かに、疲弊し、消耗しつつある。
2428 = "Thêm vào đó, còn là các hoạt động chính trị để tận dụng tối đa những thiết kế đó. ——Hibiki quả thực đang mệt mỏi và kiệt sức."
# 【日々姫】
# display as 日日姬
# JP: 「……私の、デザイナーとしての引き出しの中が、\n今は一時的に空っぽに近い状態なんだと思います」
1268 = "「......Ngăn kéo ý tưởng của tôi với tư cách là một nhà thiết kế, hiện tại có lẽ đang tạm thời rơi vào trạng thái gần như trống rỗng.」"
# 【新津】
# display as 新津
# JP: 「そこです！　それを私も懸念している。\nデザイナーとしてのあなたには代わりはいない。が」
1686 = "「Chính là chỗ đó! Đó cũng là điều tôi đang lo ngại. Với tư cách là một nhà thiết kế, ngài là không thể thay thế. Nhưng」"
# monologue
# JP: 一拍。二拍。十分すぎる間。\n新津議員の問いかけを、議場の全員が反芻している。
2286 = "Một nhịp. Hai nhịp. Một khoảng lặng quá đủ. Tất cả mọi người trong hội trường đang ngẫm nghĩ lại câu hỏi của nghị viên Niitsu."
# 【新津】
# display as 新津
# JP: 「市長職であれば代われるものはいくらもいましょう。\n分業からこそ生まれるシナジーも、またありましょう」
1915 = "「Nếu là chức vụ thị trưởng thì có bao nhiêu người thay thế cũng được. Và sự phân công lao động cũng có thể tạo ra sức mạnh tổng hợp cơ mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1830 = "「是的」" 
# 【新津】
# display as 新津
# JP: 「しかし、そこを求めすぎ、[ひない,1]雛衣前市長が犯した失敗――\n消耗による停滞を、繰り返すのは、許されません」
1506 = "「Tuy nhiên, việc quá theo đuổi điều đó và lặp lại sai lầm mà cựu thị trưởng Hinai đã mắc phải—— sự đình trệ do kiệt sức, là điều không thể chấp nhận được.」"
# 【日々姫】
# display as 日日姬
# JP: 「まさしく、おっしゃる通りです。\n反面、こうも言える筈です」
1721 = "「Chính xác, đúng như ngài nói. Nhưng mặt khác, cũng có thể nói thế này.」"
# monologue
# JP: 畳み掛けられた日々姫も、また、たっぷりとした間を置く。\n胸を張り、堂々とした声をそこから響かせる。
2475 = "Bị dồn ép liên tục, Hibiki cũng tạo ra một khoảng lặng khá dài. Ưỡn ngực lên, một giọng nói dõng dạc vang lên từ đó."
# 【日々姫】
# display as 日日姬
# JP: 「代わりの居ないデザイナーが市長を兼務するからこそ。\nそうすることでしか生めないメリットも、無視出来ない」
1874 = "「Chính vì một nhà thiết kế không thể thay thế kiêm nhiệm chức thị trưởng. Những lợi ích chỉ có thể sinh ra từ việc làm như vậy cũng không thể bỏ qua.」"
# 【新津】
# display as 新津
# JP: 「まぁ、それは――確かですな」
1968 = "「Chà, chuyện đó thì——đúng là vậy.」"
# monologue
# JP: 自分でさきほど認めたことだ。\n新津議員に、ここを否定する余地は無い。
2471 = "Đó là điều mà ông ta vừa mới tự mình thừa nhận lúc nãy. Nghị viên Niitsu không có chỗ nào để phủ nhận điều này."
# monologue
# JP: 実際、ガマダス等の立案から実現までの速度など、\n日々姫が市長ならではの圧倒的なものだった。
2202 = "Thực tế, tốc độ từ khi lập kế hoạch đến khi hiện thực hóa các dự án như Gamadus, là một điều áp đảo chỉ có Hibiki trên cương vị thị trưởng mới làm được."
# 【日々姫】
# display as 日日姬
# JP: 「ご理解ありがとうございます。ですので、そこを\nもう一度活用していくべく、基本に立ち返ります」
1729 = "「Cảm ơn ngài đã thấu hiểu. Do đó, để tận dụng lại điểm mạnh ấy một lần nữa, tôi sẽ quay trở lại với những điều cơ bản.」"
# 【新津】
# display as 新津
# JP: 「と、いうと？」
1720 = "「Nghĩa là sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「政治をデザインに、デザインを政治に活かす。\nそのための絵を描くことが、私の基本姿勢です」
1681 = "「Áp dụng chính trị vào thiết kế, và thiết kế vào chính trị. Vẽ những bức tranh vì mục đích đó chính là lập trường cơ bản của tôi.」"
# monologue
# JP: 渡したメモに書いたのは、旅程変更のその内容。
2254 = "Những gì tôi viết trên tờ giấy nhớ đưa cho em ấy, là nội dung thay đổi lịch trình."
# monologue
# JP: ＜　週明け　→　今週末から　＞\nたったそれだけの文字にすぎない。
1220 = "＜ Đầu tuần → Từ cuối tuần này ＞ Chỉ vỏn vẹn vài dòng chữ như vậy."
# 【日々姫】
# display as 日日姬
# JP: 「週明けから予定されている湯富院市視察。\nその日程に前乗りし、私的な取材旅行を行います」
1737 = "「Chuyến khảo sát thành phố Yufuin dự kiến diễn ra vào đầu tuần. Tôi sẽ đi trước lịch trình đó, và thực hiện một chuyến đi lấy tư liệu cá nhân.」"
# 【新津】
# display as 新津
# JP: 「私的な……公費を使わず、ということですか」
1900 = "「Cá nhân......ý ngài là không sử dụng công quỹ sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、私費で前乗り滞在し、\n湯富院と文庫森とを丁寧に見学します」
1831 = "「Vâng, tôi sẽ tự túc chi phí để đi trước và lưu lại, thăm quan kỹ lưỡng Yufuin và Bungomori.」"
# 【新津】
# display as 新津
# JP: 「ふぅむ――それは」
1602 = "「Hừm——Chuyện đó...」"
# 【議長】
# display as 議長
# JP: 「新津議員。時間です。質問を終えてください」
1774 = "「Nghị viên Niitsu. Đã hết thời gian. Xin hãy kết thúc phần chất vấn.」"
# 【新津】
# display as 新津
# JP: 「ああ――はい、議長」
1618 = "「A——vâng, thưa chủ tọa.」"
# monologue
# JP: ほんの束の間、きつく結ばれた新津議員の口元が、\n次の瞬間、見事なまでの笑みの形に開かれる。
2135 = "Chỉ trong chốc lát, khóe miệng mím chặt của nghị viên Niitsu, ngay khoảnh khắc tiếp theo, đã nở một nụ cười hoàn hảo."
# 【新津】
# display as 新津
# JP: 「よいご視察となることを期待しています。\n御一夜市の未来のために、あなたのデザインが必要だ」
1895 = "「Tôi rất mong chờ chuyến khảo sát tốt đẹp của ngài. Vì tương lai của thành phố Ohimitera, chúng tôi cần thiết kế của ngài.」"
# 【日々姫】
# display as 日日姬
# JP: 「ありがとうございます。ご期待を励みとし、\n今後ともデザインを市政に活かしてまいります」
2022 = "「Xin cảm ơn. Lấy sự kỳ vọng của ngài làm động lực, từ nay về sau tôi sẽ tiếp tục đưa thiết kế vào ứng dụng trong chính quyền thành phố.」"
# 【議長】
# display as 議長
# JP: 「これにて、新津議員の質問を終わります。\n続きまして、『御一夜市民の会』、[ふせ,1]布施議員――」
1773 = "「Đến đây, phần chất vấn của nghị viên Niitsu xin được kết thúc. Tiếp theo, nghị viên Fuse thuộc 『Hội Công dân Ohimitera』——」"
# 【日々姫】
# display as 日日姬
# JP: 「あああ～～　やすらぐ～」
1611 = "「Aaaa~~ Thư giãn quá~」"
# 【双鉄】
# display as 雙鐵
# JP: 「お疲れ、日々姫」
1549 = "「Vất vả cho em rồi, Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに～　なでなで～」
2012 = "「Anh hai~ xoa đầu đi~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1623 = "「嗯」" 
# monologue
# JP: ぐったり机に倒れ伏す日々姫の髪をなでてやる。\n少し汗を含んでいる。指に柔らかにまとわってくる。
2345 = "Tôi xoa đầu Hibiki đang nằm gục trên bàn mệt mỏi. Mái tóc hơi đẫm mồ hôi. Quấn lấy ngón tay tôi thật mềm mại."
# 【稀咲】
# display as 稀咲
# JP: 「よくがんばったね、日々姫。\n終盤は大幅に持ち直した。あれなら評価は五分五分だ」
1795 = "「Em đã làm rất tốt, Hibiki. Giai đoạn cuối em đã gỡ gạc lại đáng kể đấy. Thế thì đánh giá sẽ là 50-50 thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのあたりが妥当な採点か」
1969 = "「Chấm điểm cỡ đó là hợp lý nhỉ.」"
# monologue
# JP: 新津議員の指摘はもっともなものであり、\n日々姫はそれを受け入れた上で、善後策を示した。
2287 = "Sự chỉ trích của nghị viên Niitsu là hoàn toàn có lý, và Hibiki sau khi chấp nhận điều đó, đã đưa ra được phương án giải quyết."
# monologue
# JP: 日々姫市政に対する評価は、継続、換え時――\n恐らくは、どちら側にも大きな変化を見せないだろう。
2206 = "Đánh giá về chính quyền của Hibiki, dù là tiếp tục hay đến lúc phải thay thế—— có lẽ sẽ không có sự thay đổi lớn nghiêng về bên nào cả."
# 【日々姫】
# display as 日日姬
# JP: 「専業の議員さんと五分五分か～！\nえへへ、私、頑張っとるよねー」
1920 = "「Ngang ngửa với một nghị viên chuyên nghiệp sao~! Ehehe, em đã cố gắng lắm rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1814 = "「是啊」" 
# 【日々姫】
# display as 日日姬
# JP: 「なら？　ね？　にぃに。ご褒美ご褒美～」
1762 = "「Thế thì? Nhé? Anh hai. Thưởng đi thưởng đi~」"
# monologue
# JP: ちょんちょんと、\n日々姫の指がそのつややかな頬を指す。
2335 = "Chọt chọt, Hibiki dùng ngón tay chỉ vào gò má căng bóng của mình."
# monologue
# JP: あまりに可愛いキスのおねだり。\n僕に応じない理由など――
2181 = "Cách em ấy vòi hôn quá đỗi dễ thương. Tôi chẳng có lý do gì để từ chối cả——"
# 【稀咲】
# display as 稀咲
# JP: 「んんっ！」
# 1586 = "「咳咳！」" 
# monologue
# JP: おっと、あった。\n稀咲の存在が一瞬、頭から飛んでいた。
2147 = "Ái chà, có đấy. Sự hiện diện của Kisaki trong thoáng chốc đã bay sạch khỏi đầu tôi."
# 【稀咲】
# display as 稀咲
# JP: 「日々姫？　ちょっと崩れすぎだよ？\nいくらこの時間帯のカフェスペースがほぼ無人でも」
1798 = "「Hibiki? Em hơi buông thả quá rồi đấy? Dù không gian quán cà phê vào giờ này gần như không có người đi chăng nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「ほぼじゃなかとよー、無人よ、無人。\nそれがわかるように設計、私したけんね」
1497 = "「Không phải gần như đâu, là không có người, không có ai cả. Em đã thiết kế để có thể nhìn bao quát được mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「え？」
# 1589 = "「哎？」" 
# monologue
# JP: 稀咲の瞳がぐるりと周囲を見渡していく。\n半円形の、落ち着きのある木のカフェを。
2409 = "Ánh mắt Kisaki đưa một vòng quan sát xung quanh. Một quán cà phê hình bán nguyệt, mang lại cảm giác bình yên với chất liệu gỗ."
# 【日々姫】
# display as 日日姬
# JP: 「死角、出来づらいようになっとっとー。\nカフェスペース内だけじゃなく、全体、なるべく」
1736 = "「Em đã thiết kế sao cho khó tạo ra điểm mù nhất có thể. Không chỉ trong không gian quán cà phê, mà là toàn bộ khu vực, cố gắng hết mức.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ……そうか。\n親子連れのための施設だからかい？」
1591 = "「À......ra vậy. Vì đây là cơ sở dành cho gia đình có trẻ nhỏ sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そ。プライバシーより安全性。机とかイスの角も、\nやけん、みぃんなまあるいでしょう」
1682 = "「Vâng. An toàn hơn là sự riêng tư. Góc bàn hay ghế cũng vậy, thế nên, tất cả đều bo tròn đúng không?」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね」
1571 = "「Ra là vậy.」"
# 【山崎】
# display as 店員
# JP: 「おまたせしました」
1935 = "「Để quý khách phải đợi lâu.」"
# monologue
# JP: そのタイミングで、紅茶とコーヒーとが運ばれてくる。
2361 = "Đúng lúc đó, hồng trà và cà phê được mang ra."
# monologue
# JP: 稀咲はすぐさまブラックのコーヒーに手を伸ばす。\n日々姫はゆるゆる、紅茶にミルクと砂糖を溶かす。
2415 = "Kisaki ngay lập tức đưa tay lấy ly cà phê đen. Còn Hibiki thì thong thả khuấy sữa và đường vào hồng trà."
# 【双鉄】
# display as 雙鐵
# JP: 「……まぁ、その工夫がこの時間帯には、\n僕らのプライバシーを守るために役立つわけだ」
1253 = "「......Chà, sự công phu đó vào thời điểm này, lại có tác dụng bảo vệ sự riêng tư của chúng ta nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほど。空席ばかりなのは走行時間だからか。\n親子連れがみんな集まる、あの赤くてかわいい――」
1804 = "「Ra là vậy. Toàn ghế trống là vì đang trong giờ tàu chạy sao. Các gia đình có trẻ nhỏ đều tập trung ở chiếc tàu màu đỏ dễ thương kia——」"
# 【日々姫】
# display as 日日姬
# JP: 「ガマダス号！　\n『電気式スチーム機関車、ガマダス[ハチロクニイマル,3]8620号』！」
2035 = "「Tàu Gamadus! 『Đầu máy hơi nước chạy điện, Gamadus số 8620』!」"
# monologue
# JP: 日々姫の自慢げな一声に、\n稀咲がクスリ、いたずらっぽい笑いを漏らす。
2350 = "Trước tiếng hô đầy tự hào của Hibiki, Kisaki khẽ bật cười tinh nghịch."
# 【稀咲】
# display as 稀咲
# JP: 「電気式スチーム機関車？\nそれだけ聞くと、加湿器みたいな機関車に聞こえるね」
2018 = "「Đầu máy hơi nước chạy điện? Nghe vậy thôi cứ tưởng là cái đầu máy giống máy phun sương ấy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、加湿器としても役にたとうな。\n電熱で水蒸気を起こせるモーター車だから」
1731 = "「Chà, dùng làm máy phun sương cũng được đấy chứ. Vì nó là xe điện có thể tạo ra hơi nước bằng nhiệt điện mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「なんでまた水蒸気を？」
1865 = "「Sao lại phải tạo ra hơi nước?」"
# 【日々姫】
# display as 日日姬
# JP: 「だって！　蒸気機関車のかたちやけん！\n煙ば出んかったら、さみしかろーもん」
1642 = "「Bởi vì! Nó có hình dáng của đầu máy hơi nước mà! Nếu không nhả khói thì buồn tẻ lắm.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどなるほど」
1844 = "「Ra là vậy, ra là vậy.」"
# monologue
# JP: しかつめらしく頷いて、稀咲は瞳を和らげる。
2417 = "Gật gù ra vẻ nghiêm túc, ánh mắt Kisaki trở nên dịu dàng."
# 【稀咲】
# display as 稀咲
# JP: 「たいしたものだね。素敵な工夫にみちている。\nデザイン面のことを手伝えないのが残念なほど――」
1884 = "「Tuyệt thật đấy. Tràn ngập những thiết kế công phu tuyệt vời. Đến mức chị thấy tiếc vì không thể giúp gì được về mặt thiết kế——」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんこつっ！　――んんっ――\nそんなことありません」
1725 = "「Làm gì có chuyện đó! ——Ưm—— Không có chuyện đó đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「日々姫？　いや――だけれど実際」
1789 = "「Hibiki? Không——nhưng thực tế thì.」"
# 【日々姫】
# display as 日日姬
# JP: 「実際、この上ないくらいに手伝ってもらえてます。\n稀咲先輩の助けなしじゃ、とても無理です！」
1673 = "「Thực tế là, em đã được chị giúp đỡ hết mức có thể rồi. Không có sự giúp đỡ của chị Kisaki thì em hoàn toàn không làm được đâu!」"
# monologue
# JP: 気持ちが強すぎ、言葉がいささか追いついてない。\nだけれど、事実だ。
2173 = "Cảm xúc quá mạnh mẽ, khiến lời nói có phần theo không kịp. Nhưng đó là sự thật."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫がデザインと政治を両立できるのは、\n稀咲が時間と余裕を絞り出してくれるおかげだ」
1793 = "「Hibiki có thể cân bằng giữa thiết kế và chính trị, là nhờ Kisaki đã cố gắng vắt kiệt thời gian và tâm sức để hỗ trợ đấy.」"
# monologue
# JP: 言い切れば、日々姫も改めて強く頷く。
2249 = "Khi tôi khẳng định điều đó, Hibiki cũng gật đầu thật mạnh một lần nữa."
# 【日々姫】
# display as 日日姬
# JP: 「そうです！　っていうか今回、\n急に旅程を前倒しできることになったのだって」
1863 = "「Đúng vậy! Hay nói đúng hơn là lần này, việc đột nhiên có thể đẩy lịch trình lên sớm cũng là nhờ...」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ。それなら双鉄の」
1598 = "「À. Cái đó thì là do Soutetsu...」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 1589 = "「哎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「宝生副市長？」
# 1674 = "「寶生副市長？」" 
# 【稀咲】
# display as 稀咲
# JP: 「おっと、いけないいけない。うっかりしてるね。\n双鉄とあの人の名前を間違えてしまうだなんて」
1587 = "「Ái chà, không được không được. Bất cẩn quá nhỉ. Lại đi nhầm tên Soutetsu với người đó mất rồi.」"
# monologue
# JP: いかにもわざとらしくそう言って、\n肩まで大げさにすくめてみせる。
2191 = "Nói một cách vô cùng cố ý, chị ấy còn cường điệu nhún vai một cái."
# 【稀咲】
# display as 稀咲
# JP: 「それは――そうだね。単なる、頭取の気まぐれさ。\nあの人が急に、僕のスケジュールを横取りしたから」
1996 = "「Đó là——đúng rồi. Chỉ đơn giản là sự bốc đồng của giám đốc ngân hàng thôi. Vì người đó đột nhiên cướp mất lịch trình của tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1818 = "「Hô.」"
# 【稀咲】
# display as 稀咲
# JP: 「銀行まわりの懇親会に、あの人が出ると言い出して。\nボクの時間に浮きが出来た。というだけの話さ」
1531 = "「Ông ấy tự dưng bảo sẽ tham gia buổi tiệc giao lưu của giới ngân hàng. Thế là tôi có thời gian rảnh rỗi. Chỉ vậy thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「だったらそれも、やっぱり先輩のおかげです」
1983 = "「Nếu vậy thì, quả nhiên cũng là nhờ đàn chị.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふぅん？」
1633 = "「Hửm?」"
# 【日々姫】
# display as 日日姬
# JP: 「その時間、稀咲先輩の浮いた時間を使ってもらえて。\nそうでなければ、視察を前倒しなんてできないですし」
1650 = "「Khoảng thời gian đó, em đã được sử dụng thời gian rảnh rỗi của chị Kisaki. Nếu không thì làm sao có thể đẩy lịch khảo sát lên sớm được.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、\n日々姫がそう思ってくれるなら、そうしておこう」
1583 = "「Fufu, nếu Hibiki đã nghĩ vậy thì cứ cho là thế đi.」"
# monologue
# JP: 静かにひとくちコーヒーを飲み、\n稀咲はゆるやかな笑みを浮かべる。
2411 = "Lặng lẽ nhấp một ngụm cà phê, Kisaki nở một nụ cười nhẹ nhõm."
# 【稀咲】
# display as 稀咲
# JP: 「その分しっかり、引き出しを満たしてくるんだよ？\nデザイン遅れ。ボクだってもちろん、心配だしね」
1760 = "「Đổi lại em phải lấp đầy ngăn kéo ý tưởng của mình đấy nhé? Thiết kế bị chậm trễ. Đương nhiên là chị cũng lo lắng mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「あぅ」
1612 = "「Auu.」"
# monologue
# JP: またも机に突っ伏しかけて、\nけれど日々姫は持ちこたえる。
2329 = "Lại định gục mặt xuống bàn, nhưng Hibiki đã cố gắng gượng lại."
# monologue
# JP: 木の机の上、スケッチブックをやにわに広げ、\nさささ、と線を書き連ねていく。
2177 = "Trên chiếc bàn gỗ, em ấy vội vã mở cuốn sổ phác thảo ra, và sột soạt vẽ những đường nét liên tiếp."
# 【稀咲】
# display as 稀咲
# JP: 「これは……ああ、列車の車内図？」
1970 = "「Đây là......à, sơ đồ bên trong tàu sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「です。いわゆる『食堂車』では、このくらいの\n厨房設備が必要とされるそうなんですよ」
1822 = "「Vâng. Ở cái gọi là 『toa ăn』, người ta bảo cần khoảng chừng này thiết bị nhà bếp đấy ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「……一両のまるまる半分くらいか。\nこの車両のサイズは？」
1257 = "「......Gần như chiếm trọn một nửa toa xe luôn à. Kích thước của toa xe này là bao nhiêu?」"
# 【日々姫】
# display as 日日姬
# JP: 「20メートル級の[こうせい,1]鋼製客車ですね。\nで、わたしが今内装デザインにかかってるのが――」
1972 = "「Là toa hành khách bằng thép cỡ 20 mét ạ. Và thứ em đang thiết kế nội thất bây giờ là——」"
# monologue
# JP: すらすらと、また新しい図。\n車体サイズそのものが、一回り小さくなっている。
2169 = "Vẽ thoăn thoắt một bản đồ mới. Kích thước thân xe nhỏ hơn hẳn một vòng."
# 【日々姫】
# display as 日日姬
# JP: 「全長18500mm――つまりは18メートル級で、\nしかも、気動車なんですよ」
1557 = "「Tổng chiều dài 18500mm——tức là cỡ 18 mét, hơn nữa, lại còn là toa xe tự hành đấy ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「気動車……れいなの\\x%lキハ07s;#00ffc040;キハ07s%l;#;と同じ種類のものだね。\n確か――」
1569 = "「Toa xe tự hành......cùng loại với \\x%lキハ07s;#00ffc040;KiHa 07S%l;#; của Reina nhỉ. Hình như là——」"
# 【双鉄】
# display as 雙鐵
# JP: 「今のところは、車両内に運転席と客席とを有し、\nディーゼルエンジンで走る車両と理解してくれ」
1872 = "「Tạm thời thì, cứ hiểu đó là một toa xe có cả ghế lái và ghế hành khách bên trong, và chạy bằng động cơ diesel là được.」"
# 【稀咲】
# display as 稀咲
# JP: 「了解。ということは、だ……単純に考えて、\n運転席の分、使える面積が狭くなるわけだ」
1801 = "「Đã hiểu. Nghĩa là......nghĩ một cách đơn giản, thì diện tích sử dụng sẽ bị thu hẹp lại do có thêm phần ghế lái.」"
# monologue
# JP: 言って、稀咲が首を傾げる。
2452 = "Nói rồi, Kisaki nghiêng đầu."
# 【稀咲】
# display as 稀咲
# JP: 「それなら、気動車を使わなくてもいいのでは？\nそれこそ、機関車に客車を引かせれば」
1778 = "「Nếu vậy thì, không dùng toa xe tự hành cũng được mà? Cứ để đầu máy kéo toa hành khách là xong.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その案も当然出たが、まず、機関車の空きが無い。\n現役機は、すでに自分の路線を持っているから」
1878 = "「Phương án đó đương nhiên cũng đã được đưa ra, nhưng trước tiên là không có đầu máy nào rảnh rỗi cả. Các đầu máy đang hoạt động đều đã có tuyến đường riêng của mình rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「なら、現役機同士で客車を受け渡していけば？」
1997 = "「Vậy thì, để các đầu máy đang hoạt động chuyển giao toa hành khách cho nhau thì sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「来大鉄道には、そもそも機関車がいないんです。\n全部の車両が気動車で」
1515 = "「Đường sắt Kurudai vốn dĩ không có đầu máy nào cả. Tất cả các phương tiện đều là toa xe tự hành.」"
# 【稀咲】
# display as 稀咲
# JP: 「その気動車に客車を[ひ]牽かせることは？\nれいなの\\x%lキハ07s;#00ffc040;キハ07s%l;#;は、客車を引くこともあるじゃないか」
1989 = "「Thế để toa xe tự hành đó kéo toa hành khách thì sao? \\x%lキハ07s;#00ffc040;KiHa 07S%l;#; của Reina cũng có lúc kéo toa hành khách mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいなはもともと炭鉱で混合列車を[ひ]牽くための車両――\nつまり、重いものを牽く前提で作られた気動車だ。が」
1869 = "「Reina vốn là phương tiện dùng để kéo tàu hỗn hợp ở mỏ than—— tức là toa xe tự hành được chế tạo với tiền đề là kéo vật nặng. Nhưng」"
# 【日々姫】
# display as 日日姬
# JP: 「来大鉄道には、\nそれだけのパワーをもった車両はいないんです」
1514 = "「Đường sắt Kurudai, không có phương tiện nào có sức mạnh như vậy cả.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうなんだ」
1835 = "「Vậy sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「もし幸運に機関車を手配できたとしても、\n今度は来大鉄道の線路が重い車両には耐えられません」
1600 = "「Kể cả may mắn sắp xếp được đầu máy đi nữa, thì đường ray của Đường sắt Kurudai hiện tại cũng không chịu nổi phương tiện nặng đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、線路が軽い、というヤツだね？」
1593 = "「À, là cái vụ đường ray nhẹ đó hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな、それに設備面でも問題が多い」
1816 = "「Đúng vậy, ngoài ra về mặt thiết bị cũng có nhiều vấn đề.」"
# 【稀咲】
# display as 稀咲
# JP: 「設備？」
1929 = "「Thiết bị?」"
# 【双鉄】
# display as 雙鐵
# JP: 「大廃線以前に廃止されていた路線だそうだからな。\n給水塔や給炭設備などもことごとく失われている」
1641 = "「Hình như đó là tuyến đường đã bị bãi bỏ từ trước Đại bãi bỏ tuyến cơ. Tháp cấp nước hay thiết bị cấp than đều đã mất sạch rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね」
# 1818 = "「是嗎」" 
# monologue
# JP: 納得したのか、\n稀咲がゆっくり頷いてみせる。
2413 = "Như đã hiểu ra, Kisaki chậm rãi gật đầu."
# 【稀咲】
# display as 稀咲
# JP: 「つまり――そこを含めての全線をクルーズするには、\n専用の気動車を仕立てる以外の選択肢は無いわけか」
1518 = "「Nói cách khác——để thực hiện chuyến du ngoạn trên toàn tuyến bao gồm cả đoạn đó, thì không còn lựa chọn nào khác ngoài việc chế tạo một toa xe tự hành chuyên dụng sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうなんです。で、改造の\\x%l種車;#00ffc040;種車%l;#;を入手できたまでは\nよかったんですけど――」
1828 = "「Đúng vậy ạ. Và, việc có được \\x%l種車;#00ffc040;toa xe nguyên bản%l;#; để cải tạo thì tốt rồi, nhưng mà——」"
# 【稀咲】
# display as 稀咲
# JP: 「気動車ゆえの狭さと、元々のサイズの小ささとが、\n日々姫のデザインの幅をも狭めているんだね？」
1505 = "「Sự chật hẹp của toa xe tự hành, cùng với kích thước vốn đã nhỏ, cũng đang thu hẹp phạm vi thiết kế của Hibiki nhỉ?」"
# 【日々姫】
# display as 日日姬
# JP: 「なんですなんです」
1815 = "「Chính là vậy đó ạ.」"
# monologue
# JP: ぶんぶんと大きく頷いて、\n日々姫が再びペンを走らす。
2333 = "Gật đầu liên tục thật mạnh, Hibiki lại tiếp tục đưa bút."
# 【日々姫】
# display as 日日姬
# JP: 「長距離のクルーズをするから、座席にも余裕がいる。\nトイレだって絶対必要になってくるし――」
1643 = "「Vì là chuyến du ngoạn đường dài, nên chỗ ngồi cũng cần phải rộng rãi. Nhà vệ sinh thì tuyệt đối không thể thiếu được——」"
# monologue
# JP: 手洗い設備に排水タンク。\n車内設備を動かすための発電機もいる。
2370 = "Thiết bị rửa tay và bể chứa nước thải. Cũng cần cả máy phát điện để chạy các thiết bị trong xe nữa."
# monologue
# JP: その上、これほどに長い乗車時間だ。\n乗務員の控室も、絶対に削れない設備になってくる。
2143 = "Thêm vào đó, thời gian ngồi trên xe lại dài như vậy. Phòng nghỉ của tổ bay cũng trở thành thiết bị tuyệt đối không thể cắt giảm."
# 【日々姫】
# display as 日日姬
# JP: 「そういうのを考えると……\nキープできる厨房のスペースって、このくらいなんです」
1974 = "「Nghĩ đến những thứ đó thì...... không gian nhà bếp có thể giữ lại chỉ cỡ này thôi ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「18メートル車両の四分の一も無いのかい？\nこれなら……いっそ客席をもっと減らせ――ないか」
1976 = "「Chưa bằng một phần tư của toa xe 18 mét sao? Thế này thì......hay là giảm bớt chỗ ngồi của khách đi——không được à.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。客席を減らすことは、そのまま収入を、\nそして、宿泊見込み客を減らしてしまうことだから」
1813 = "「Ừ. Giảm chỗ ngồi của khách đồng nghĩa với việc giảm doanh thu, và cũng làm giảm luôn lượng khách có khả năng lưu trú qua đêm.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほど。これは難問だ。\nこの厨房で、朝昼晩の三食を[まかな]賄うとなると……」
1893 = "「Ra là vậy. Đúng là một bài toán khó. Với căn bếp này mà phải lo cả ba bữa sáng trưa tối thì......」"
# 【日々姫】
# display as 日日姬
# JP: 「ですから！　今回稀咲先輩がくれた時間、\nデザインのために、ほんとにほんとに役立つんです」
1764 = "「Thế nên! Khoảng thời gian mà chị Kisaki cho em lần này, thực sự, thực sự rất có ích cho việc thiết kế đấy ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「そこまでのものなのかい？」
1843 = "「Đến mức đó luôn sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい。湯富院は観光で大成功を収めてますし、\n文庫森はいうまでもなく、車両工場ですから」
1825 = "「Vâng. Yufuin đã gặt hái thành công lớn về mặt du lịch, còn Bungomori thì khỏi phải nói rồi, là nhà máy phương tiện mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ――\n知識や技術をもっている人がいるかもしれない？」
1630 = "「À—— Có thể sẽ có người có kiến thức và kỹ thuật sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうことだ」
1687 = "「Là vậy đấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどなるほど？　双鉄の頼み――じゃないね、\n頭取の気まぐれが、偶然にも良く機能したわけだ」
1805 = "「Ra là vậy, ra là vậy? Lời nhờ vả của Soutetsu——không phải nhỉ, sự bốc đồng của giám đốc ngân hàng tình cờ lại mang đến kết quả tốt đẹp.」"
# monologue
# JP: クスクス笑い、コーヒーをぐいと飲み干して、\n稀咲は席を外そうとする。
2145 = "Cười khúc khích, uống cạn ly cà phê trong một hơi, Kisaki chuẩn bị rời khỏi chỗ ngồi."
# monologue
# JP: その手が取ろうとした伝票を、\nあわてて僕が押さえ込む。
2162 = "Tôi vội vàng đè tờ hóa đơn mà tay cô ấy đang định lấy lại."
# 【双鉄】
# display as 雙鐵
# JP: 「この位は持たせてくれ。\n今回の礼にはとても足りんが」
1975 = "「Chút này cứ để tôi trả. Dù chẳng bõ bèn gì so với lời cảm ơn lần này.」"
# 【稀咲】
# display as 稀咲
# JP: 「お互い様だよ？　双鉄。貸し借りなしでいこう。\n――だから、安心してご馳走になる」
1709 = "「Có qua có lại thôi mà? Soutetsu. Chúng ta không nợ nần gì nhau nhé. ——Nên là, tôi sẽ yên tâm nhận lời mời này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1623 = "「嗯」" 
# 【稀咲】
# display as 稀咲
# JP: 「それじゃ、これから銀行だから。\nああ、そうだ。一つだけいいかな？　日々姫」
1994 = "「Vậy nhé, giờ tôi phải đến ngân hàng đây. A, đúng rồi. Chị nói một câu được không? Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、なんでしょう、稀咲先輩」
1546 = "「Vâng, chuyện gì vậy ạ, chị Kisaki.」"
# monologue
# JP: 稀咲が笑う。\n包み込むようにあたたかに。
2419 = "Kisaki mỉm cười. Một nụ cười ấm áp như bao bọc lấy tất cả."
# 【稀咲】
# display as 稀咲
# JP: 「勉強を、取材をしようと意識しすぎて、\n一番大事なものを見逃さないように注意するといい」
1501 = "「Đừng quá để tâm vào việc học hỏi hay thu thập tài liệu, mà bỏ lỡ mất điều quan trọng nhất đấy nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「一番、大事なもの」
1841 = "「Điều quan trọng nhất.」"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄の笑顔が。双鉄と共に過ごす時間が――\n空っぽの日々姫を満たすには、一番のものだろうから」
2017 = "「Nụ cười của Soutetsu. Khoảng thời gian dành cho Soutetsu—— Đó mới là thứ tốt nhất để lấp đầy sự trống rỗng của Hibiki lúc này.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、にぃに～。ちょこっと、よかと？」
2007 = "「Anh hai, anh hai~. Cho em vào một chút được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、無論だ」
1632 = "「Ừ, tất nhiên rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへっ」
1635 = "「Ehehe.」"
# monologue
# JP: 部屋へと入るその足取りも、表情も声も弾んでる。
2185 = "Bước chân em ấy tiến vào phòng, cùng với biểu cảm và giọng nói đều đang nhảy múa."
# 【日々姫】
# display as 日日姬
# JP: 「荷物！　何ば持ってったらよかかなぁって」
1923 = "「Hành lý! Em đang nghĩ xem nên mang theo những gì đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「絵の道具の分、荷物がかさむか？\n僕が持てるものなら、無論、持つが」
1644 = "「Tại phải mang theo dụng cụ vẽ nên hành lý cồng kềnh sao? Nếu là thứ anh mang được thì tất nhiên anh sẽ xách giúp em.」"
# 【日々姫】
# display as 日日姬
# JP: 「じゃなくて！　トランプとかゲームとかお菓子とか\n……水着とか？　そういうのも、必要かなぁって」
1499 = "「Không phải vậy! Ý em là bài tây, trò chơi, bánh kẹo ......hay đồ bơi chẳng hạn? Những thứ đó có cần thiết không nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか。\n視察の前は、“旅行”だものな」
1617 = "「À——ra vậy. Trước khi khảo sát, thì đây là một chuyến \"du lịch\" mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！」
1624 = "「Vâng!」"
# monologue
# JP: ぱっと、笑顔をほころばせ。\nけれどもすぐに、日々姫はもじもじしてしまう。
2349 = "Nở một nụ cười rạng rỡ. Nhưng ngay sau đó, Hibiki lại bẽn lẽn."
# 【日々姫】
# display as 日日姬
# JP: 「けど――文庫森と湯富院やけん。\n水着は……無くてもよかとかなぁって気もするけど」
1507 = "「Nhưng mà——đi Bungomori và Yufuin cơ mà. Em nghĩ đồ bơi......chắc không có cũng được nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、温水プール的なものがあるかもしれん。\n仮にそうした物が無くとも、大した荷物でもなし」
1511 = "「Không, biết đâu lại có kiểu như bể bơi nước nóng thì sao. Giả sử không có đi nữa, thì nó cũng đâu tốn nhiều chỗ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
1608 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「問題なければ持っていって欲しい」
1744 = "「Nếu không phiền thì anh muốn em mang theo.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1624 = "「嗯！」" 
# monologue
# JP: 元気な声で答える頬が、ぽっと可愛い朱を灯す。
2179 = "Gò má em ấy ửng lên sắc đỏ đáng yêu khi đáp lại bằng giọng tràn đầy năng lượng."
# monologue
# JP: 恋人――婚約者のそんな反応を見逃すほどの野暮天からは、\n僕もどうやら、卒業できた。
2379 = "Có vẻ tôi cũng đã tốt nghiệp khỏi cái thói ngốc nghếch đến mức bỏ lỡ phản ứng đó của người yêu——vị hôn thê của mình rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「どんな水着を持っていくつもりなのだ？」
1540 = "「Em định mang theo bộ đồ bơi như thế nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　ちょっとだけ待ってて！」
1614 = "「A! Đợi em một chút nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、おい」
1615 = "「A, này.」"
# 【日々姫】
# display as 日日姬
# JP: 「おまたせっ！　にぃに」
2008 = "「Để anh đợi lâu! Anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、新しいものか」
1595 = "「Ồ, đồ mới à.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！\nいつまでも学園指定の着てられんけんねー」
1626 = "「Vâng! Đâu thể mặc đồ bơi của trường mãi được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、それはそうだろうな」
1965 = "「Chà, cũng đúng nhỉ.」"
# monologue
# JP: ……見れば見るほど可愛らしい。\nどんどん嬉しくなってくる。
1227 = "......Càng nhìn càng thấy dễ thương. Niềm vui trong tôi cứ thế dâng trào."
# monologue
# JP: 日々姫もまた。僕の視線を嬉しく感じているのだろう。\nくるりと可愛く、ターンを決めて見せてくれる。
2340 = "Cả Hibiki cũng vậy. Có lẽ em ấy đang cảm thấy vui sướng trước ánh nhìn của tôi. Em ấy xoay một vòng thật dễ thương cho tôi xem."
# 【日々姫】
# display as 日日姬
# JP: 「どぎゃんと？　にぃに」
2010 = "「Sao nào? Anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「良く似合っている。可愛らしい」
1711 = "「Hợp với em lắm. Rất dễ thương.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっへへー！」
1636 = "「Ehehe!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1634 = "「Ái chà.」"
# monologue
# JP: はしゃぐ日々姫を抱きとめる。
2247 = "Tôi ôm trọn lấy Hibiki đang nhảy nhót vui sướng."
# 【日々姫】
# display as 日日姬
# JP: 「嬉しかと！　にぃにぃにだけ見てほしくって、\n頑張って買った水着やけん」
1662 = "「Vui lắm đó! Bộ đồ bơi này em đã cất công mua, chỉ để cho mình anh hai xem thôi đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕にだけ――か」
1936 = "「Chỉ cho mình anh——sao.」"
# monologue
# JP: 嬉しいことだ。
2472 = "Thật là một điều đáng mừng."
# monologue
# JP: こうまで間近に見ていると、\n不安も、ふつふつ感じてくるから。
2117 = "Nhìn ở khoảng cách gần thế này, những lo lắng cũng bắt đầu sục sôi trong tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、実際にそうして欲しい。\nいささか露出が……目立つような気がするのでな」
1984 = "「Nếu vậy, anh thực sự mong em làm thế. Vì anh thấy có hơi......lộ liễu quá.」"
# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　水に入ってないときは、\nパーカーとか上から羽織るけん」
1880 = "「Tất nhiên rồi! Khi nào không xuống nước, em sẽ khoác thêm áo hoodie ở ngoài mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それなら嬉しい。安心できる」
1986 = "「Thế thì tốt quá. Anh yên tâm rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「嬉しい？　安心？\nえっへへー、にぃに。ね、ね？　それって――」
1987 = "「Tốt quá? Yên tâm? Ehehe, anh hai. Này, này? Cái đó có phải là——」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1603 = "「!」"
# monologue
# JP: ほとんどぴったりくっついたまま、\n日々姫が僕をじいっと見上げる。
2346 = "Trong tư thế gần như dính chặt vào nhau, Hibiki ngước nhìn tôi chằm chằm."
# 【日々姫】
# display as 日日姬
# JP: 「他の人に、私を見られるのイヤだから？\n独占欲――にぃに、感じてくれとーと？」
1821 = "「Vì anh không muốn người khác nhìn thấy em sao? Tính chiếm hữu——anh hai, đang cảm thấy vậy à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。僕はいつでも、お前を独占していたい」
1879 = "「Đương nhiên rồi. Lúc nào anh cũng muốn chiếm lấy em làm của riêng.」"
# 【日々姫】
# display as 日日姬
# JP: 「うれしかっ――（ちゅっ！）」
1661 = "「Vui quá——（Chụt!）」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1613 = "「啊！」" 
# monologue
# JP: 短いキス。\nごくごく軽い――けれどもハッキリした意味のキス。
2440 = "Một nụ hôn ngắn ngủi. Rất nhẹ nhàng——nhưng lại mang một ý nghĩa vô cùng rõ ràng."
# 【双鉄】
# display as 雙鐵
# JP: 「（ちゅっ！）」
2031 = "「（Chụt!）」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
# 1613 = "「啊！」" 
# monologue
# JP: だから、僕からもお返しをする。
2259 = "Thế nên, tôi cũng đáp trả lại."
# monologue
# JP: 僕は日々姫のものであり、日々姫は僕のものである。\nお互いにそうと確認し合う、マーキングの意味の口づけを。
2243 = "Tôi là của Hibiki, và Hibiki là của tôi. Một nụ hôn mang ý nghĩa đánh dấu, để xác nhận điều đó với nhau."
# 【日々姫】
# display as 日日姬
# JP: 「ご褒美――さっきの。\nうれしい――覚えててくれたんですね」
1963 = "「Phần thưởng——lúc nãy. Vui quá——anh vẫn nhớ sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、これは日々姫へのお返しだ。\nご褒美は、別途で用意させてもらおう」
1509 = "「Không, đây là lời đáp lễ dành cho Hibiki. Phần thưởng thì để anh chuẩn bị riêng nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうなんですか？\nだったら、もっとうれしいです」
1819 = "「Vậy sao? Nếu thế thì em còn vui hơn nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、日々姫を嬉しさで満たしたい。独占したい。\n日々姫のために、出来ることなら全部やりたい」
1746 = "「Anh muốn lấp đầy Hibiki bằng niềm vui. Muốn độc chiếm em. Vì Hibiki, nếu có thể anh muốn làm tất cả mọi thứ.」"
# 【日々姫】
# display as 日日姬
# JP: 「わたしも、です。にぃにと――\n兄さんと一緒に、どこまでだって幸せになりたい」
1733 = "「Em cũng vậy. Em muốn cùng anh hai—— cùng anh trai đi đến bến bờ hạnh phúc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫……」
1787 = "「Hibiki......」"
# monologue
# JP: 愛おしい。一瞬たりとも手放したくない。\nそうと感じた瞬間に、喉から気持ちが滑り出ている。
2163 = "Thật đáng yêu. Một khoảnh khắc cũng không muốn buông tay. Ngay khoảnh khắc cảm nhận được điều đó, cảm xúc đã trượt khỏi cổ họng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、結婚を――\n入籍と、挙式もできるだけ、早めたいのだがな」
1757 = "「Thế nên, việc kết hôn—— Anh muốn đăng ký kết hôn và tổ chức hôn lễ càng sớm càng tốt.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……うん。待たせちゃって。\nこんなに長く待たせることになっちゃって――」
1606 = "「A......vâng. Bắt anh phải chờ rồi. Để anh phải chờ lâu thế này——」"
# 【双鉄】
# display as 雙鐵
# JP: 「謝らなくていい。僕も同意したことだ。\n誰もに、こころからの祝福をしてもらえるようにと」
1538 = "「Không cần phải xin lỗi đâu. Anh cũng đã đồng ý rồi mà. Để có thể nhận được lời chúc phúc từ tận đáy lòng của tất cả mọi người.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。\n……ありがと、にぃに」
1621 = "「Vâng. ......Cảm ơn anh, anh hai.」"
# monologue
# JP: 真剣な顔は、まなざしは、\nやはり、似ている。
2182 = "Khuôn mặt nghiêm túc, ánh mắt ấy, quả nhiên, rất giống."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉に認められる大人になれたら――か」
1881 = "「Khi nào trở thành người lớn được chị Mayami công nhận——sao.」"
# monologue
# JP: それまで、結婚は待ってほしいと。
2166 = "Em ấy muốn đợi đến lúc đó mới kết hôn."
# monologue
# JP: 日々姫の願ってくれたことは、\nそのまま、僕の願いでもある。
2339 = "Những gì Hibiki mong muốn, cũng chính là mong muốn của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「未熟なふたりの勢い任せの結婚ではなく。\n一人前の大人同士の――新しい家庭を築く、結婚」
1648 = "「Không phải là cuộc hôn nhân bồng bột của hai đứa trẻ chưa trưởng thành. Mà là cuộc hôn nhân giữa những người lớn thực thụ——để xây dựng một gia đình mới.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。そうしたい。新しい家を作るから。\n右田の蔵を。うちをあとにするなら、その理由がいい」
1688 = "「Vâng. Em muốn vậy. Vì chúng ta sẽ tạo nên một gia đình mới. Nếu phải rời khỏi xưởng rượu Migita, rời khỏi ngôi nhà này, thì đó là một lý do tuyệt vời.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1545 = "「Đúng vậy.」"
# monologue
# JP: それが日々姫の、目指し続けてきた駅なのだと。\n終着駅で、始発駅にもなる場所なのだと感じる。
2248 = "Đó chính là nhà ga mà Hibiki luôn hướng tới. Tôi cảm thấy đó vừa là ga cuối, vừa là nơi bắt đầu một chuyến đi mới."
# monologue
# JP: そこを超えずにもしも旅立ってしまったら、\n一生、きっと。悔いを残してしまうのだろうと。
2195 = "Nếu chưa vượt qua nơi đó mà đã vội vã khởi hành, thì chắc chắn sẽ để lại sự hối tiếc cả đời."
# 【日々姫】
# display as 日日姬
# JP: 「私、大好きやけん。\nこん蔵も、ねぇねぇも、蔵のみんなも」
1751 = "「Em thích lắm. Cả xưởng rượu này, cả chị hai, và mọi người trong xưởng nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1623 = "「嗯」" 
# monologue
# JP: こんなときさえ持ってきているスケッチブックを、\n日々姫はゆるゆる広げてくれる。
2327 = "Hibiki từ từ mở cuốn sổ phác thảo mà em ấy mang theo ngay cả trong lúc này ra."
# monologue
# JP: 真闇姉がいる。ハチロクがいる。僕がいる。\n蔵の皆……斉藤さん――日々姫を蔵から追った人さえ。
2115 = "Có chị Mayami. Có Hachiroku. Có tôi. Mọi người trong xưởng......cả anh Saito——người đã đuổi Hibiki khỏi xưởng cũng có mặt."
# 【双鉄】
# display as 雙鐵
# JP: 「笑っている。あたたかだな」
1654 = "「Đang cười kìa. Thật ấm áp.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。あったか。にぃにが言ってくれたから。\n私、また――見れるように、描けるようになったけん」
1628 = "「Vâng. Ấm áp lắm. Vì anh hai đã nói cho em biết. Nên em lại có thể——nhìn thấy, và vẽ ra được như thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1623 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「そしたら、もーっとこの家が、蔵が、みんなが。\n好きに、大好きになったけん。やけん――」
1877 = "「Và rồi, em lại càng thích ngôi nhà này, xưởng rượu này, và mọi người hơn nữa. Trở nên cực kỳ yêu thích. Thế nên——」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
1790 = "「Hibiki.」"
# monologue
# JP: くっつきあってる日々姫の体が、\nほんのすこしだけ硬くなる。
2426 = "Cơ thể Hibiki đang áp sát vào tôi, hơi cứng lại một chút."
# monologue
# JP: 泣きそうなのか、どこか緊張してるのか――\nどちらにしても、僕のすることは変わらない。
2170 = "Là sắp khóc, hay đang căng thẳng vì điều gì đó—— Dù là thế nào đi nữa, thì việc tôi cần làm vẫn không thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「そう力むな」
1769 = "「Đừng căng thẳng thế.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1623 = "「嗯」" 
# monologue
# JP: 抱き寄せる。\n腕をまわして、日々姫の全部を包み込む。
2245 = "Tôi ôm em ấy vào lòng. Vòng tay qua, ôm trọn lấy toàn bộ con người Hibiki."
# monologue
# JP: さっきよりもっとくっついて、\n僕の体の熱を与える。
2234 = "Sát gần hơn cả lúc nãy, truyền hơi ấm từ cơ thể tôi sang."
# 【双鉄】
# display as 雙鐵
# JP: 「認められるというのは、難しいことだ。\nだが、真闇姉となら――わかりあえる」
1727 = "「Để được công nhận là một điều khó khăn. Nhưng, nếu là chị Mayami thì——chắc chắn sẽ hiểu nhau thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1623 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「だからきっと、いつか自然と訪れるはずだ。\n真闇姉が僕らのことを、一人前と認めてくれる瞬間が」
1758 = "「Thế nên chắc chắn, khoảnh khắc ấy rồi sẽ tự nhiên đến. Khoảnh khắc chị Mayami công nhận chúng ta đã thực sự trưởng thành.」"
# monologue
# JP: 今この時も、僕らをさりげなく守り続けてくれる手を。
2387 = "Ngay cả lúc này, đôi bàn tay ấy vẫn luôn âm thầm che chở cho chúng tôi."
# monologue
# JP: 真闇姉がいつか、そうっと離し――\n安心して、真闇姉自身のために、使ってくれる瞬間が。
2429 = "Sẽ có một ngày chị Mayami nhẹ nhàng buông tay ra—— Khoảnh khắc chị ấy có thể an tâm, sử dụng đôi bàn tay đó vì chính bản thân mình."
# 【双鉄】
# display as 雙鐵
# JP: 「これだけ努力を重ねているのだ。\nこの積み重ねの先には必ず、その日が待ってる」
1735 = "「Chúng ta đã nỗ lực nhiều đến vậy mà. Phía trước những nỗ lực không ngừng nghỉ này chắc chắn sẽ là ngày đó đang chờ đợi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 1624 = "「嗯！」" 
# monologue
# JP: 日々姫の目が細まって、\nやわらかに頭がすりつけられる。
2343 = "Đôi mắt Hibiki nheo lại, em ấy cọ cọ đầu vào tôi thật mềm mại."
# monologue
# JP: 子猫のようだと、ふいに感じる。
2190 = "Bất chợt tôi cảm thấy em ấy như một chú mèo con."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
# 1790 = "「日日姬」" 
# monologue
# JP: だから、撫でる。\n髪を、首筋を、耳の裏を。
2261 = "Vì thế, tôi vuốt ve em ấy. Mái tóc, gáy, và phía sau tai."
# monologue
# JP: そのたび日々姫はくすぐったがり、\nイヤイヤ体をくねらせつつも、嬉しげな声をだす。
2229 = "Mỗi lần như thế, Hibiki lại nhột, em ấy vặn vẹo cơ thể như muốn tránh đi, nhưng lại phát ra giọng nói đầy vui sướng."
# 【日々姫】
# display as 日日姬
# JP: 「もー、赤ちゃん扱いせんといてー」
1885 = "「Mồ, đừng có đối xử với em như em bé nữa đi mờ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなつもりはなかったのだが」
1732 = "「Anh đâu có ý đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「いつまでも赤ちゃんじゃおられんけん」
1585 = "「Đâu thể cứ làm em bé mãi được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1613 = "「啊！」" 
# monologue
# JP: 瞳が、まっすぐ僕を捉える。
2175 = "Ánh mắt em ấy bắt trúng lấy tôi."
# 【日々姫】
# display as 日日姬
# JP: 「……わたし、大人になりたいけん。\n大人に、なるけん」
1259 = "「......Em, muốn trở thành người lớn. Em sẽ, trở thành người lớn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1623 = "「嗯」" 
# monologue
# JP: 未だ自分を大人だと認められない唇は、\nけれど静かに――子供には決していえない言葉を紡ぎ出す。
2477 = "Đôi môi vẫn chưa thể thừa nhận bản thân là người lớn ấy, lại lặng lẽ——thốt ra những lời mà một đứa trẻ tuyệt đối không thể nói."
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇのこと。\nそうして――自由にしてあげるけん」
1748 = "「Chuyện của chị hai. Em sẽ——trả lại tự do cho chị ấy.」"
