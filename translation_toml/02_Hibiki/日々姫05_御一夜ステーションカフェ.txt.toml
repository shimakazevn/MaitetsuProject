# display as 真闇
# JP: 「そーね。まっとう。\nまっとうやけん――」
2356 = "「是啊。是很明智。不過……」" 

# monologue
# JP: ――さみしくなかとよ――
3423 = "還是很寂寞啊。" 

# monologue
# JP: 声なき声が、聞こえた気がする。\n口にせぬまま、伝えてもらえたような気がする。
