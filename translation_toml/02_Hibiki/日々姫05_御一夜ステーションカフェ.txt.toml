# monologue
# JP: が――気づいてしまえば、\nそれこそ最善手であるようにさえ思えてくる。
1446 = "——頓悟之後，我越想越覺得這才是最好的辦法。" 

# monologue
# JP: （ととととと）
3504 = "（咚咚咚咚咚）" 

