3123 = "操作的時候必須跟正式營業時一樣，不然就算不上試驗了。想到這裡，我又重新握緊了手上的菜刀。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて、たまねぎだ」
2206 = "「好了，來切洋蔥吧」" 

# monologue
# JP: （ザクっ、ザクッ、ザクっ、ザクっ――\nトントントントントンっ）
3501 = "（切、切、切、切……咚咚咚咚咚咚）" 

# 【日々姫】
# display as 日日姬
# JP: 「わ、ちょ、にぃに、目、染みるかも――\nって――あ」
2027 = "「哇、等等，阿哥，眼、眼睛感覺好辣……啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。実際の仕込みはお客様ご乗車前とはなろうが――\n匂いと換気……空気の流れも重要になってくるな」
2362 = "「是啊。雖然切菜配菜的作業實際上應該是在旅客上車前完成的，不過味道和換氣……空氣流通也是一大問題啊」" 

# monologue
# JP: 普通のレストランよりも遥かに狭い室内となる。
3386 = "車廂內的空間可比普通餐廳狹窄得多。" 

# monologue
# JP: 匂いの強いメニューは避けたいが、食堂車のド定番は、\nカレーとビーフシチューであるとも教わった。
3231 = "本來應該儘量避免製作味道強烈的菜品才對，不過聽說咖哩和燉牛肉是餐車必備的特色菜。" 

# 【双鉄】
# display as 雙鐵
