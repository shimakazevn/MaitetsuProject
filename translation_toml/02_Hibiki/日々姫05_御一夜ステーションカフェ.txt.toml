2441 = "「由於旅客座位和廚房之間應該不太可能做隔斷……所以最好別用那些味道沖的食材」" 

# 【日々姫】
# display as 日日姬
# JP: 「窓ば開けれん車両だし……\nそーね、その辺も考えんと」
2443 = "「畢竟車廂沒辦法開窗……是啊，這個問題也得好好考慮一下」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あるいは、換気を強力にするなどはできんのか？」
2302 = "「或者裝個更強大的換氣系統，也不知道能不能實現」" 

# 【日々姫】
