2142 = "「嗯，一開始就學到了不少東西啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。この段階では出来るだけ失敗した方がいい。\n怪我だけはしないよう気をつけ、進めていこう」
2361 = "「是啊。這個階段要儘可能去試錯才行。只要小心別讓自己受傷就好」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
2135 = "「嗯！」" 

