# 【真闇】
# display as 真闇
# JP: 「あ、こっち変わって？\n白菜と油揚げの煮物、パパってこしらえてしまうけん」
2095 = "「啊，把這個換掉。趕緊把白菜和炸豆腐煮了」" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました」
2346 = "「明白了」" 

