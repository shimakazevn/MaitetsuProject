3077 = "我本打算像平時對八六那樣用手指幫她擦掉，想想還是算了，改用聲音和視線去提醒她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お客様。お連れ様が」
2553 = "「這位客人。您的朋友」" 

# 【ハチロク】
# display as 八六
# JP: 「あら――れいな？　あごを少しだけもちあげて？」
2046 = "「哎呀，玲奈，你稍微抬一下下巴」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい――んっ」
2412 = "「沒問題。嗯」" 

# monologue
# JP: かわいらしくも優しい景色に心が和むが、\n一息ついてもいられない。
3407 = "這可愛的景象令人倍感溫馨，然而我根本無暇理會。" 

# monologue
# JP: ここから先はお昼時――\nピークタイムに突入するゆえ。
2945 = "因為接下來將迎來午餐時段，也就是用餐的高峰期。" 

# 【凪】
# display as ？？？
# JP: 「来たばーーい！」
1981 = "「來囉！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いらっしゃいませ。お二人様ですか？」
2395 = "「歡迎光臨。請問是兩位嗎？」" 

# 【凪】
# display as 凪
