# 【日々姫】
# display as 日日姬
# JP: 「いく前よりもしあわせになるため、カフェにいく。\n食堂列車で旅をするのも、根っこでは絶対おんなじ」
1942 = "「人們前往咖啡廳是為了獲得更多的幸福。從根本上來說，選擇餐車之旅的目的也是一樣的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな。ただ、幸せになるために。\n美味しい食事も、安全も、そのための要素にすぎない」
2155 = "「嗯，是啊。大家的目的就是為了獲得幸福。無論是美味的食物還是安全，全都是達成目的的要素罷了」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2130 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「全てが等しく最重要で、必ず満たすべき要素だが\n――それらは決して、お客様の目的そのものではない」
2596 = "「雖然所有的要素全都很重要，全都必須達成，但顧客們的目的終究不在於此」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。私もそう思う」
2121 = "「嗯。我也是這麼想的」" 

# monologue
# JP: 安全が一番欲しいなら、旅に出ていく必要はない。
2978 = "如果特別注重安全的話，那根本沒必要去旅行。" 

# monologue
# JP: 食事を何より楽しみたいなら、\nレストランへと運ぶだろう。
2976 = "如果只是想好好吃一頓，那麼下館子就行了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのだな」
# 2363 = "「是啊」" 

# monologue
# JP: 手段が、目的になっていた。\n使い良く安全な厨房が、何故必要とされるのか――
3040 = "我們把手段當成了目的。打造一間安全便利的廚房究竟是為了什麼？" 

# monologue
# JP: その根本を、僕も日々姫も、\nいつの間にすっかり見失ってた。
3053 = "我和日日姬都在不知不覺中迷失了最根本的理由。" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、聞かせて？　私に見せて？\nにぃにが今日、見つけた全部のしあわせを」
2305 = "「所以把阿哥今天找到的所有幸福都說給我聽吧？展示給我看吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、何度だって聞かせよう」
2163 = "「嗯，要我講多少遍都行」" 

# monologue
# JP: ハチロク、れいな。凪、ふかみ。\nポーレットに稀咲。永山夫人。
2877 = "八六、玲奈、凪、深美，波萊特和稀咲，還有永山夫人。" 

# monologue
# JP: そうして、たくさんのお客さんたち。\n――話せばにっこり、日々姫は笑う。
2839 = "以及無數的客人們。——我把這些一一說完後，日日姬莞爾一笑。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃは、どう？\nなにかあった？　にぃにぃ自身のしあわせなこと」
2581 = "「那阿哥呢？有遇到什麼事嗎？跟我說說你自己的幸福吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あったとも」
2444 = "「當然有」" 

# monologue
# JP: 厨房とフロア、離れ離れで。\nオーダーを通す相手も、山崎さんで。
3005 = "廚房和用餐區是分開的。而負責接單的人也是山崎小姐。" 

# monologue
# JP: だからこそ、ときどきの、ほんの一瞬の触れ合いが、\nほんの一言のやりとりが、ただ嬉しくて。
3237 = "正因為如此，轉瞬即逝的偶然碰面，隻言片語的短暫交談。都讓我感到格外高興。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それから、日々姫がスタッフを離れ、\nお客さんになったときもだ」
2568 = "「還有，當日日姬走下崗位充當客人的時候，我也很幸福」" 

# monologue
# JP: 永山夫人を見習って、\n少しはマシになった姿を、日々姫に見てもらえたこと。
3207 = "日日姬看到了我效仿永山夫人，業務能力有所長進的樣子。" 

# monologue
# JP: 日々姫が嬉しげに誇らしげに注ぎ続けてくれた視線を、\n背中でも、はっきり感じられたこと。
3056 = "我哪怕背對著日日姬，也能感受到她那既欣喜又自豪的目光。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……仕事中さえ、普段はふたり、べったりだからな。\n一緒にいられることの嬉しさを、見失いかけていたが」
1525 = "「……畢竟平時就算在工作中，我們倆也都一直黏在一起。都快把兩人在一起的可貴和快樂給忘了」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2076 = "「啊」" 

# monologue
# JP: おでこをこつんとくっつける。\n一番近くで、日々姫の甘い匂いを楽しむ。
3072 = "我把自己的額頭貼在日日姬的額頭上。在極近距離享受她的甜美氣息。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は日々姫といっしょにいるのが、しあわせだ。\nそれをあらためて強く感じて――とても嬉しい」
2232 = "「對我來說跟日日姬在一起就是幸福。能夠重新認識到這種幸福感有多強烈——我非常高興」" 

# 【日々姫】
# display as 日日姬
# JP: 「わたしも、おんなじ――（ちゅっ）」
2268 = "「我也一樣（啾）」" 

# monologue
# JP: 今度のキスは、日々姫から。\nごくごく軽く――小鳥が、しあわせをついばむように。
3411 = "這次是日日姬主動吻的我。她吻得非常輕，就像一隻小鳥在啄食幸福一樣。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにが好きって、何度も思った。\n一緒にいられてしあわせだって、おなかで感じた」
2262 = "「我一次次感受到自己對阿哥的愛。兩人在一起的幸福讓肚子裡暖暖的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。体の底で感じた」
2267 = "「我也一樣。這是一種發自體內深處的感覺」" 

# 【日々姫】
# display as 日日姬
# JP: 「だけどね？　にぃに」
1919 = "「不過啊，阿哥」" 

# monologue
# JP: （きゅうっ）
3526 = "（握緊）" 

# monologue
# JP: 日々姫が指にちからをこめる。\nお互いの肌が湿り気を増し、溶け合っていく。
3198 = "日日姬的手指使上了勁。彼此的肌膚變得有些濕潤，兩隻手越貼越緊。" 

# monologue
# JP: 握り返せば、熱を感じる。\n日々姫の声が、密やかになる。
3082 = "我用手回握，感覺熱呼呼的。日日姬的聲音變得越來越細不可聞。" 

# 【日々姫】
# display as 日日姬
# JP: 「ほんの[ひとかけ,1]一片だけ、足りなかと。\nしあわせが――私自身の、しあわせが」
2246 = "「幸福——我自己的幸福，卻還是缺了一小片，就那一小片」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2130 = "「嗯」" 

# monologue
# JP: 小さなころから今までずっと、\n日々姫が一番待ち望んでいる、その人が。
3007 = "從小到大，日日姬最最期待的那個人。" 

# monologue
# JP: 今日もやっぱり来店をしてくれなかった。\nおそらくは、変わらず“過保護”であるがゆえ。
2824 = "今天果然還是沒有來捧場。原因大概還是她的“過度保護”。" 

# monologue
# JP: （ああ――だからなのだな）
3510 = "（嗯——所以啊）" 

# monologue
# JP: 真闇姉が来ても危なくない。動じたりしない。\nそれを形に示すため、日々姫は努力を重ねている。
2994 = "就算真闇姐來了也不會出差錯。不會軍心大亂。日日姬的所有努力都是為了向她表現這一切。" 

# monologue
# JP: 思春期のころにしていたような、背伸びではなく。\n今の自分を育てることで、少しずつでも、大人になろうと。
2957 = "她不再像青春期那會兒一樣，努力讓自己長高。而是慢慢培養現在的自我，一點一滴成熟起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのひとかけは、必ず日々姫を待ってくれてる。\nゆえに僕らは焦らずに、今いく[みち]路をいけばいい」
2572 = "「那一片幸福一定會等著你的。所以我們不用著急，沿著現在的路走下去就行了」" 

# 【日々姫】
# display as 日日姬
# JP: 「――うん」
1486 = "「——嗯」" 

# monologue
# JP: 必ずできる。\nそうしたい。
2799 = "一定可以的。我暗暗期許著。" 

# monologue
# JP: こころの底から湧き出る願いを、\nもうこれ以上、言葉にはせず。
3000 = "已經不必再用話語來表達從內心深處湧起的心願。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん――」
# 2130 = "「嗯」" 

# monologue
# JP: ただ重ね合う唇で。\n僕と日々姫は、伝えあう。
2845 = "依靠彼此重合在一起的雙唇，我倆便能知心知底。" 
