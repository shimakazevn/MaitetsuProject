2350 = "「是兩位！一看不就知道了！」" 

# 【ふかみ】
# display as 深美
# JP: 「だめだよ凪ちゃん、お仕事のお邪魔しちゃったら」
1907 = "「不可以啦，小凪，別妨礙人家工作」" 

# 【双鉄】
# display as 雙鐵
# JP: 「こちらへどうぞ」
2562 = "「這邊請」" 

# monologue
# JP: いつもと変わらぬやり取りを聞け、ほっとする。\nその上ありがたいことに、凪もふかみも普段着だ。
3335 = "聽到她倆這熟悉的對話，我鬆了一口氣。而且謝天謝地的是，凪和深美都是日常穿著。" 

# 【凪】
# display as 凪
# JP: 「あ！　こん写真！！　見て、ほら！\n凪さま！　キャブから手ぇ振ってあげとるとこばい！」
2091 = "「啊！這張照片！！快看啊！本小姐在駕駛室揮手耶！」" 

# 【ふかみ】
# display as 深美
# JP: 「ほんとだ。凪ちゃんにっこにこー！　\nいいなぁ、これ、クマ川下りでもやって欲しいなぁ」
2455 = "「真的耶。小凪笑得好開心！真好啊，真希望隈河漂流也搞搞這個」" 

# 【凪】
# display as 凪
# JP: 「振っとるよ？　ホテルの人にも釣りの人にも\nラフティングしとる人らにも」
2190 = "「大家都有揮手哦。無論是旅館員工還是釣魚的人，玩漂流的客人們也揮過啊」" 

# 【ふかみ】
# display as 深美
# JP: 「手を振る方じゃなくて写真展示！\nクマ川下りの記念写真でもして欲しいな、って」
2279 = "「我是指照片展示而不是揮手啦！我就是希望隈河漂流也能拍些紀念照」" 

# 【凪】
# display as 凪
# JP: 「よかとね！　鉄道駅だけが駅じゃなかとばい！」
