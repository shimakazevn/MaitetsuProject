# monologue
# JP: 考え、記憶に刻みつつ、\n体も正しく動かし続ける。
3096 = "我邊想邊記，同時身體也要做出正確的動作。" 

# monologue
# JP: ちらちらとふかみが送ってくる、\n念のこもった視線にも、今は応じていられない。
3259 = "深美三不五時朝這邊送來的，含有深意的視線，我現在也無暇回應。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご注文はお決まりでしょうか？」
2516 = "「請問兩位決定要點什麼了嗎？」" 

# 【凪】
# display as 凪
# JP: 「ＳＬカレー！　凪さま、楽しみにしとったばい！」
2489 = "「蒸汽機車咖哩！本小姐可期待這個了！」" 

# 【ふかみ】
# display as 深美
# JP: 「む～……わたしは、高菜めしと石炭からあげ、\nお願いします――です」
