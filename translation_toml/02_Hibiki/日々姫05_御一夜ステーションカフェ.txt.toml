[script]
# lines: 605 
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……さすがは稀咲の推薦だな」
1918 = "「Nhưng mà……quả không hổ danh là người Kisaki tiến cử.」"
# 【日々姫】
# display as 日日姬
# JP: 「まっことねー」
2363 = "「Đúng vậy nhỉ.」"
# monologue
# JP: みんなで出したメニュー案。\n山崎さんは、わずか三日で全てをレシピ化してくれた。
2998 = "Những ý tưởng thực đơn mà mọi người đưa ra.\nCô Yamazaki đã biến tất cả thành công thức chỉ trong vỏn vẹn ba ngày."
# 【双鉄】
# display as 雙鐵
# JP: 「その上、言うことも理に叶っている。\n『キッチンは、使うことでしか覚えられない』か」
2475 = "「Hơn nữa, những gì cô ấy nói cũng rất hợp lý.\n'Nhà bếp thì chỉ có bắt tay vào làm mới quen được' sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「言われてみたらそのとーりやけん。\nメニュー、少しずつでも覚えていかんと」
1955 = "「Nghe xong mới thấy đúng là vậy.\nThực đơn cũng phải nhớ dần dần mới được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2130 = "「Ừ.」"
# monologue
# JP: そのために、深夜のキッチンを借りている。\nふたりきり、僕らだけのためのキッチン、カフェだ。
3262 = "Vì thế, chúng tôi đã mượn nhà bếp vào đêm khuya.\nChỉ có hai người, một nhà bếp, một quán cà phê dành riêng cho chúng tôi."
# monologue
# JP: （だというのに……）
3529 = "(Thế mà……)"
# monologue
# JP: もう狭い。調理器具と食材とを出し、\n食器の準備もしてみると、この厨房は本当に狭い。
3252 = "Đã thấy chật chội rồi. Lấy dụng cụ nấu ăn và nguyên liệu ra,\nrồi chuẩn bị cả chén dĩa nữa thì nhà bếp này quả thật rất hẹp."
# 【双鉄】
# display as 雙鐵
# JP: 「……フル規格の食堂車厨房で働くのは、確か――」
2293 = "「……Làm việc trong nhà bếp toa ăn đúng chuẩn, hình như là——」"
# 【日々姫】
# display as 日日姬
# JP: 「チーフとスケさんとパンさん！　つまり――\n調理責任者さんと調理助手さんと配膳係さんの三人」
1931 = "「Bếp trưởng, phụ bếp và người phụ trách bánh mì! Tức là——\nBa người: người chịu trách nhiệm nấu nướng, phụ bếp và người phục vụ thức ăn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「加えて、会計係やテーブル係の女性達だったか。\n女性たちは厨房に入らなかったとは聞くが……」
2570 = "「Thêm cả các nhân viên nữ phụ trách thu ngân và bưng bê nữa nhỉ.\nNghe nói các cô gái không được vào bếp, nhưng mà……」"
# monologue
# JP: あらためて、ぐるり見渡す。\n圧迫感さえ感じる狭さであるものの――
3048 = "Tôi lại nhìn quanh một vòng.\nMặc dù chật chội đến mức có cảm giác ngột ngạt——"
# 【双鉄】
# display as 雙鐵
# JP: 「これでも、日々姫が最初に引いた図面より――」
1920 = "「Dù vậy, so với bản vẽ ban đầu của Hibiki thì——」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。広い。\nだって、これだけスペース取っちゃったら」
2147 = "「Vâng. Rộng hơn.\nBởi vì, nếu đã lấy chừng này không gian thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな、18メートル級気動車の半分以上を\nゆうゆう専有してしまう」
2366 = "「Đúng nhỉ, nó sẽ chiếm trọn\nhơn một nửa toa xe tự hành hạng 18 mét.」"
# monologue
# JP: \x%l種車;#00ffc040;種車%l;#;は二両、片側運転台の気動車だ。
3041 = "\\x%l種車;#00ffc040;Toa xe nguyên bản%l;#; là hai toa xe tự hành có buồng lái một đầu."
# monologue
# JP: 運転台のスペースに、ドアスペース、通路スペース。\nそしてもちろん、客席たち。
3456 = "Không gian buồng lái, không gian cửa, không gian lối đi.\nVà tất nhiên, cả khu vực ghế hành khách nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「……論より証拠とはこのことだ。\nこの感覚を、もっと早くに体験しておけばよかったな」
1535 = "「……Đúng là trăm nghe không bằng một thấy.\nGiá mà được trải nghiệm cảm giác này sớm hơn thì tốt biết mấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「今からでも遅くなかけん！」
2438 = "「Bây giờ cũng chưa muộn đâu!」"
# monologue
# JP: 思わず漏れてしまった声を、\n日々姫の笑顔が吹き飛ばす。
3193 = "Nụ cười của Hibiki đã thổi bay đi\nlời nói vô tình buột miệng của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「やろ？　にぃに」
2591 = "「Làm thôi nhỉ? Anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　僕は何を手伝えばいい？」
2212 = "「Ừm! Anh nên giúp gì đây?」"
# 【日々姫】
# display as 日日姬
# JP: 「キッチンに二人おらんと意味のなかけん。\nにぃには、野菜ばカットしてくれる？」
2502 = "「Phải có hai người trong bếp mới có ý nghĩa chứ.\nAnh hai cắt rau củ giúp em được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。何を切る？」
2345 = "「Đã rõ. Cắt gì nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「ナスとトマトとオクラ。それから玉ねぎみじん切り。\nあとはちくわー」
2483 = "「Cà tím, cà chua và đậu bắp. Sau đó là hành tây băm nhỏ.\nCòn lại là chikuwa~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、鉱山鉄道……改め、ＳＬカレーからか。\n何人前だ？」
2058 = "「À, Đường sắt mỏ quặng……đổi lại là, bắt đầu từ cà ri SL sao.\nMấy suất vậy?」"
# monologue
# JP: ＳＬカレーは、煮込むのではなく炒めるカレー。
3346 = "Cà ri SL không phải là loại ninh nhừ mà là cà ri xào."
# monologue
# JP: 冷蔵庫の容量的に、傷みの恐れが強くなる故、\nその場その場でオーダーに応じ作る物となっている。
2942 = "Do dung tích tủ lạnh có hạn, nguy cơ ôi thiu cao,\nnên món này được chế biến ngay tại chỗ theo từng đơn đặt hàng."
# 【日々姫】
# display as 日日姬
# JP: 「んー、三人前？　家族だと……あーそか、\nフードのこどもサイズのことも提案しないとだ」
2070 = "「Ưm, ba suất chăng? Nếu là gia đình thì……à đúng rồi,\ncũng phải đề xuất kích cỡ món ăn dành cho trẻ em nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、だなぁ。山崎さんのレシピには……\nうむ、その辺、まったく触れられてない」
2156 = "「Ừ, đúng vậy nhỉ. Trong công thức của cô Yamazaki thì……\nừm, hoàn toàn không đề cập đến chuyện đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「じゃ、その練習も兼ねて、２．５人前でよか？」
2574 = "「Vậy thì, nhân tiện luyện tập luôn, làm 2.5 suất nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2413 = "「Đã rõ.」"
# monologue
# JP: ピーラーもあるし、包丁は無論、蓑笠印だ。\nこの程度、何の苦もなく進められる。
3105 = "Có dao bào, và dao phay tất nhiên là hiệu Minokasa.\nCỡ này thì cứ tiến hành mà chẳng có chút khó khăn nào."
# monologue
# JP: （シャー、シャー、シャっ）
3533 = "(Xoẹt, xoẹt, xoẹt)"
# 【日々姫】
# display as 日日姬
# JP: 「わたしはその間にプリンの仕込み――きゃっ！？」
2529 = "「Trong lúc đó em sẽ chuẩn bị bánh pudding——kya!?」"
# monologue
# JP: （どんっ！）
3505 = "(Rầm!)"
# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！！？」
2174 = "「Uô!!?」"
# 【日々姫】
# display as 日日姬
# JP: 「大丈夫！！？　にぃに、ごめんっ！」
2587 = "「Không sao chứ!!? Anh hai, em xin lỗi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「何程もない。ピーラーを使っていたし……\nが――ああ、そうか、冷蔵庫か」
2411 = "「Không sao đâu. Anh đang dùng dao bào mà……\nnhưng——à, ra vậy, tủ lạnh à.」"
# 【日々姫】
# display as 日日姬
# JP: 「牛乳と卵取ろうと思って……ほんと、ごめんなさい」
2280 = "「Em định lấy sữa và trứng……thật sự, xin lỗi anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まったくもって問題無い――が……そうか。\n冷蔵庫の位置も、動線を考えないといかんのだな」
2220 = "「Hoàn toàn không có vấn đề gì——nhưng……ra vậy.\nVị trí tủ lạnh cũng phải tính đến luồng di chuyển nữa nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「冷蔵庫のドアを開ける方向も考えないと。\nっていうか、上蓋式のヤツがよかとよね、絶対」
2000 = "「Hướng mở cửa tủ lạnh cũng phải tính toán.\nMà đúng hơn là, loại mở nắp trên chắc chắn sẽ tốt hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、確かに。\nその方がスペースを確保できるな」
2162 = "「Ra là vậy, quả thực.\nNhư thế sẽ tiết kiệm được không gian hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「むー、いきなり勉強になるなぁ」
2142 = "「Ưm, mới vào đã học được bao nhiêu thứ rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。この段階では出来るだけ失敗した方がいい。\n怪我だけはしないよう気をつけ、進めていこう」
2361 = "「Đúng vậy. Ở giai đoạn này thì nên thất bại càng nhiều càng tốt.\nChỉ cần cẩn thận đừng để bị thương, rồi cứ thế mà làm thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！」
2135 = "「Vâng!」"
# monologue
# JP: 営業をする時と同じ様に作業をせねば、試験にならん。\n改めてそう意識して、包丁をしっかり持ち直す。
3123 = "Phải làm việc giống hệt như lúc kinh doanh thật thì mới gọi là thử nghiệm được.\nNhận thức lại điều đó, tôi nắm chặt lại con dao."
# 【双鉄】
# display as 雙鐵
# JP: 「さて、たまねぎだ」
2206 = "「Rồi, đến hành tây nào.」"
# monologue
# JP: （ザクっ、ザクッ、ザクっ、ザクっ――\nトントントントントンっ）
3501 = "(Xoẹt, xoẹt, xoẹt, xoẹt——\nCộc cộc cộc cộc cộc)"
# 【日々姫】
# display as 日日姬
# JP: 「わ、ちょ、にぃに、目、染みるかも――\nって――あ」
2027 = "「Oái, khoan đã, anh hai, chắc cay mắt lắm——\ná——a.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。実際の仕込みはお客様ご乗車前とはなろうが――\n匂いと換気……空気の流れも重要になってくるな」
2362 = "「Đúng nhỉ. Dù thực tế việc sơ chế sẽ được làm trước khi hành khách lên tàu——\nnhưng mùi và hệ thống thông gió……luồng không khí cũng rất quan trọng.」"
# monologue
# JP: 普通のレストランよりも遥かに狭い室内となる。
3386 = "Không gian bên trong sẽ hẹp hơn nhà hàng bình thường rất nhiều."
# monologue
# JP: 匂いの強いメニューは避けたいが、食堂車のド定番は、\nカレーとビーフシチューであるとも教わった。
3231 = "Mặc dù muốn tránh những món có mùi nồng, nhưng tôi được dạy rằng món kinh điển của toa ăn\nlà cà ri và bò hầm."
# 【双鉄】
# display as 雙鐵
# JP: 「客席と厨房の間には仕切りを作れんだろうから……\n匂いや刺激のある食材は使えんかもしれんな」
2441 = "「Chắc là không thể làm vách ngăn giữa khu vực ghế ngồi và nhà bếp được nên……\ncó lẽ sẽ không dùng được những nguyên liệu có mùi hoặc gây kích thích đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「窓ば開けれん車両だし……\nそーね、その辺も考えんと」
2443 = "「Toa xe lại không mở cửa sổ được nữa……\nĐúng nhỉ, cũng phải tính đến chuyện đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あるいは、換気を強力にするなどはできんのか？」
2302 = "「Hoặc là, có thể làm cho hệ thống thông gió mạnh lên được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「ん……工夫すれば出来ると思うけど、\n強力にすると、その分、電力がいるでしょお」
2107 = "「Ưm……Em nghĩ nếu chịu khó tìm tòi thì sẽ làm được,\nnhưng nếu làm mạnh lên thì sẽ cần thêm điện năng đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか。空間だけでなく、\nそちらも、やりくりしなくてはいけなかったか」
2152 = "「A——ra vậy. Không chỉ không gian,\nmà cả khoản đó cũng phải tính toán xoay xở nữa sao.」"
# monologue
# JP: \x%l種車;#00ffc040;種車%l;#;の\x%lディーゼル気動車;#00ffc040;ディーゼル気動車%l;#;の確保だけでも精一杯。\n連結できる電源車など、どう探しても見つからない。
2854 = "Chỉ riêng việc đảm bảo có đủ \\x%lディーゼル気動車;#00ffc040;toa xe diesel tự hành%l;#; làm \\x%l種車;#00ffc040;toa xe nguyên bản%l;#; đã là dốc hết sức rồi.\nLàm sao tìm được xe cấp điện có thể nối vào chứ."
# monologue
# JP: となると頼れる電源供給元は、\n各車両一基、合計二基の、床下発電機だけとなる。
3409 = "Nếu vậy thì nguồn cung cấp điện duy nhất có thể dựa vào\nlà máy phát điện dưới gầm xe, mỗi toa một cái, tổng cộng là hai cái."
# 【双鉄】
# display as 雙鐵
# JP: 「……まるでパズルだな」
1527 = "「……Giống hệt như chơi xếp hình vậy.」"
# monologue
# JP: 電力、空間、動線、換気。\nひとつを解決しようとすれば、他の要素に影響する。
3448 = "Điện năng, không gian, luồng di chuyển, thông gió.\nGiải quyết được một thứ thì sẽ ảnh hưởng đến các yếu tố khác."
# monologue
# JP: 全てを満たす正解が、果たして存在するのか否か――\n想像すれば、途方に暮れる気持ちにさえなる。
3338 = "Liệu có tồn tại một đáp án chính xác thỏa mãn tất cả hay không——\nChỉ cần tưởng tượng thôi cũng đủ khiến tôi cảm thấy bế tắc."
# 【日々姫】
# display as 日日姬
# JP: 「うん、パズル。\nデザインば、パズルやけん」
2151 = "「Vâng, xếp hình.\nThiết kế chính là xếp hình mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
2067 = "「Hừm.」"
# monologue
# JP: なのに、日々姫の声は明るい。\nまるでパズルを楽しんでいるかのように――
3269 = "Thế nhưng, giọng của Hibiki lại rất tươi sáng.\nNhư thể con bé đang tận hưởng trò xếp hình vậy——"
# monologue
# JP: （いや、まるでではない。日々姫はパズルが……\n正解を探すその事自体が、恐らく楽しいのだ）
3493 = "(Không, không phải như thể. Hibiki có lẽ……\nthực sự tận hưởng việc tìm kiếm đáp án chính xác.)"
# monologue
# JP: 苦しみからこそ、達成したときの喜びは大きい。\nその感覚を、僕とて多少は理解している。
2861 = "Vượt qua gian khổ thì niềm vui khi đạt được mới lớn lao.\nCảm giác đó, tôi cũng phần nào hiểu được."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに？　お野菜」
2595 = "「Anh hai? Rau củ kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまぬ」
2149 = "「À, xin lỗi.」"
# monologue
# JP: ならば僕の為すべきことは、ヒントを探し出すことだ。
3434 = "Nếu vậy, việc tôi cần làm là tìm ra gợi ý."
# monologue
# JP: どんなに小さな行動からでも、\n日々姫の目なら、必ずなにかを掴んでくれる。
3265 = "Dù là từ những hành động nhỏ nhặt nhất,\nvới đôi mắt của Hibiki, chắc chắn con bé sẽ nắm bắt được điều gì đó."
# monologue
# JP: （まずは野菜を下ごしらえして）
3497 = "(Trước tiên là sơ chế rau củ đã.)"
# monologue
# JP: 日々姫が今日、覚えてしまいたいレシピ。\nそれを一通り作り終えたら――
3108 = "Những công thức mà hôm nay Hibiki muốn học thuộc.\nSau khi làm xong một lượt——"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、調理が全て終わったら、\n僕はすぐに、客席の方に移ろうと思う」
2334 = "「Hibiki, khi nấu nướng xong xuôi,\nanh nghĩ mình nên chuyển sang khu vực ghế ngồi ngay.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　そうしてもらえたら嬉しかと！\nお給仕も、わたししたかけん！！」
2139 = "「Vâng! Được vậy thì vui quá!\nEm cũng muốn thử phục vụ nữa!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2130 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「おまたせいたしました」
2520 = "「Đã để quý khách phải đợi lâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2172 = "「Ồ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これは……かなり豪華になったな」
2557 = "「Thế này……trông hoành tráng quá nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「お褒めにあずかり、光栄です」
2481 = "「Được quý khách khen ngợi, quả là vinh hạnh.」"
# monologue
# JP: 二人前半の鉱山カレーに、\nプリンとパンケーキとがひとつずつ。
2873 = "2.5 suất cà ri mỏ quặng,\ncùng với một phần pudding và một chiếc bánh pancake."
# monologue
# JP: れいなのそれを思わせる軽油ドリンクと、\nハチロクをイメージした黒いソーダのアイスフロート。
3424 = "Thức uống dầu diesel gợi nhớ đến món của Reina,\nvà món kem nổi soda đen lấy hình tượng từ Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「試作とは思えぬほどに見事なものだ。\nマスターすべきメニューは、まだまだ盛り沢山か」
2552 = "「Tuyệt vời đến mức không nghĩ đây là làm thử luôn đấy.\nThực đơn cần phải thành thạo vẫn còn nhiều lắm sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「当店には大人の方からお子様まで、どなたにも\nお楽しみいただけるメニューを揃えておりますので」
2442 = "「Vì quán chúng tôi có đầy đủ các món ăn\nmà bất cứ ai từ người lớn đến trẻ em đều có thể thưởng thức ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ……焼き菓子は予め焼いておくものだそうだし\n――次にマスターしておくべきはどの辺になる？」
2109 = "「Hừm……nghe nói bánh nướng thì được nướng sẵn rồi\n——vậy tiếp theo nên thành thạo món nào đây?」"
# 【日々姫】
# display as 日日姬
# JP: 「……揚げ物、ですね。\n明日は、揚げ物にチャレンジしようと思っています」
1528 = "「……Đồ chiên, nhỉ.\nNgày mai, em định sẽ thử sức với đồ chiên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、石炭唐揚げか。食用炭……というものは、\n果たして、どんな味がするのか――」
2055 = "「À, gà rán than đá sao. Than ăn được……cái đó,\nrốt cuộc thì, có vị như thế nào nhỉ——」"
# 【日々姫】
# display as 日日姬
# JP: 「ねー、そこば気になる！\nあっ！　そこのところが、気になりますよね」
1968 = "「Đúng hông, em cũng tò mò lắm!\nA! Điểm đó, cũng khiến người ta tò mò nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ははっ」
2039 = "「Haha.」"
# monologue
# JP: 標準語への言い直し。
2968 = "Con bé lại sửa sang giọng phổ thông rồi."
# monologue
# JP: 昔は頻繁に聞いたものだが――\n今はなんだか、いくらか懐かしい気さえする。
2836 = "Ngày xưa thì thường xuyên nghe thấy——\nnhưng bây giờ không hiểu sao lại cảm thấy có chút hoài niệm."
# 【双鉄】
# display as 雙鐵
# JP: 「ウェイトレスな日々姫も無論素敵だが、\nいつもの日々姫の方がいい」
1985 = "「Hibiki trong vai nữ phục vụ tất nhiên cũng rất tuyệt,\nnhưng anh vẫn thích Hibiki của ngày thường hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「ええっ！？」
2047 = "「Ểể!?」"
# monologue
# JP: うん、やっぱりだ。標準語より隈元弁。\nすまし顔より、嬉しさに崩れる顔の方がかわいい。
2936 = "Ừm, quả nhiên là vậy. Giọng Kumamoto vẫn hơn giọng phổ thông.\nKhuôn mặt vỡ òa vì vui sướng vẫn đáng yêu hơn là khuôn mặt nghiêm nghị."
# 【双鉄】
# display as 雙鐵
# JP: 「今は妹――いや、僕の恋人に戻ってくれ。\n日々姫と一緒に、僕は食事を楽しみたい」
2437 = "「Bây giờ hãy trở lại làm em gái——không, người yêu của anh đi.\nAnh muốn cùng Hibiki thưởng thức bữa ăn này.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 2135 = "「嗯！」" 
# monologue
# JP: 日々姫がいそいそと席に着く。\n着くやいなやで、僕へと満面の笑顔を向ける。
3210 = "Hibiki hớn hở ngồi vào chỗ.\nVừa ngồi xuống, con bé đã hướng về phía tôi với nụ cười rạng rỡ."
# 【日々姫】
# display as 日日姬
# JP: 「ね？　にぃに。やったら、ね？　冷めないうちに」
1980 = "「Này? Anh hai. Mình ăn thôi, nhé? Kẻo nguội mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、ひとまずは『いただきます』だ」
2369 = "「Đúng vậy nhỉ, trước tiên là 'Mời mọi người xơi cơm' đã.」"
# 【日々姫】
# display as 日日姬
# JP: 「いただきます――（ぱくっ）――んっ～！！」
2264 = "「Em xin phép——(Ngoạm)——Ưm~!!」"
# monologue
# JP: 言うなりカレーを一口たべて、\n日々姫は実に幸せそうな顔になる。
3214 = "Vừa nói dứt lời, Hibiki ăn một miếng cà ri,\nrồi làm ra vẻ mặt thực sự hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「それほどか？　どれ――（あむっ）――おお！」
2563 = "「Ngon đến thế cơ à? Để xem nào——(Ngoạm)——Ồ!」"
# monologue
# JP: これは……美味い。
3415 = "Món này……ngon thật."
# monologue
# JP: 日々姫はいわゆる[イムド,1]忌度カレーを、\n初めて作った筈なのだが――
3412 = "Món cà ri Ấn Độ này,\nđáng lẽ đây là lần đầu tiên Hibiki làm mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ……うむ……うまいな。\nトマトがほどよい酸味を与えて……これは、深いな」
2132 = "「Ưm……ưm……ngon quá.\nCà chua tạo ra vị chua vừa phải……hương vị này, đậm đà thật.」"
# 【日々姫】
# display as 日日姬
# JP: 「レシピ……細かに――あむっ――書いてあったけん。\n『野菜はひとつずつ水気を飛ばす』――ん――とか」
2484 = "「Công thức……ghi rất chi tiết——ngoạm——mà.\nVí dụ như 'Làm ráo nước từng loại rau củ một'——ưm——đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「レシピ通りでここまで上手くなるものか――\nやはり……山崎さんも本物だな」
2428 = "「Làm theo công thức mà ngon được đến mức này sao——\nQuả nhiên……cô Yamazaki cũng là người có thực lực.」"
# 【日々姫】
# display as 日日姬
# JP: 「山崎さんって。\nふたりきりのときに別のひとの名前――あああっ！？」
1949 = "「Cái gì mà cô Yamazaki chứ.\nĐang lúc chỉ có hai người mà lại nhắc tên người khác——á á á!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
2068 = "「Ưm!?」"
# monologue
# JP: いきなりすぎる大声に、\n喉が一瞬、つまりそうになる。
2972 = "Tiếng hét quá đột ngột,\nkhiến cổ họng tôi nghẹn lại trong chốc lát."
# 【双鉄】
# display as 雙鐵
# JP: 「なん……だ、どうした」
1947 = "「Chuyện……gì vậy, sao thế?」"
# 【日々姫】
# display as 日日姬
# JP: 「カレー！　わたし、こうして食べようって\n思うとったのに！！」
2025 = "「Cà ri! Em, rõ ràng đã định\năn như thế này cơ mà!!」"
# monologue
# JP: 言うやいなやで、日々姫はカレーを\nひとさじすくって――
3370 = "Vừa nói xong, Hibiki liền xúc một thìa cà ri——"
# 【日々姫】
# display as 日日姬
# JP: 「はい、あーーーん」
1982 = "「Này, a——」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、む――（ぱくり）」
2072 = "「Ư, ừm——(Ngoạm)」"
# monologue
# JP: 瞬間、にこにこー、\n日々姫の顔が笑みに崩れる。
3203 = "Trong khoảnh khắc, cười hì hì,\nkhuôn mặt Hibiki vỡ òa trong nụ cười."
# monologue
# JP: ああ、この顔を見れるのならば、\n気恥ずかしさなど、あまりに安い代償だ。
2933 = "A, nếu được nhìn thấy khuôn mặt này,\nthì chút ngượng ngùng cũng chỉ là cái giá quá rẻ."
# 【双鉄】
# display as 雙鐵
# JP: 「お返しだ、日々姫。\nほら、あーーん」
2318 = "「Trả lễ đây, Hibiki.\nNào, a——」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 2135 = "「嗯！」" 
# monologue
# JP: ぱくりと、一口。\n日々姫はますます、溶けてしまいそうな顔になる。
3443 = "Một ngụm, ngon lành.\nKhuôn mặt Hibiki ngày càng trở nên như sắp tan chảy."
# 【日々姫】
# display as 日日姬
# JP: 「あああ、しあわせ。\n私ずうっと、にぃにとこうして食べたかったけん」
2084 = "「Aaa, hạnh phúc quá.\nEm vẫn luôn, muốn được ăn cùng anh hai như thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ずうっと――とは」
1904 = "「Vẫn luôn——là từ khi nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「ちいちゃかころ！\nにぃにと、喫茶店ごっこしとったころから」
2252 = "「Từ hồi còn nhỏ xíu!\nTừ lúc chơi trò quán cà phê với anh hai cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2073 = "「À——」"
# monologue
# JP: 僕を見つめる日々姫の瞳のわくわくとしたきらめきは、\nあのころと、恐らく少しも変わっていないのだろう。
3190 = "Ánh sáng lấp lánh đầy háo hức trong đôi mắt Hibiki khi nhìn tôi,\ncó lẽ chẳng khác chút nào so với hồi đó."
# monologue
# JP: けれども、僕は変化した。\n愛しい気持ちが胸に溢れて、言葉がつかえる程度には。
2841 = "Thế nhưng, tôi đã thay đổi.\nTình yêu tràn ngập trong lồng ngực, đến mức khiến tôi nghẹn lời."
# 【双鉄】
# display as 雙鐵
# JP: 「――それほど前からか」
2564 = "「——Từ tận lúc đó sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。あのころは恥ずかしくてとっても言えなくて。\n今も……ドキドキ。やっぱりちょっと恥ずかしいけど」
2128 = "「Vâng. Hồi đó em xấu hổ nên chẳng dám nói.\nBây giờ cũng……tim đập thình thịch. Dù vẫn hơi xấu hổ một chút.」"
# monologue
# JP: 無言で、日々姫が僕にスプーンを差し出してくる。\n無言で食べて。また僕も日々姫にスプーンを差し出す。
3217 = "Trong im lặng, Hibiki đưa thìa cho tôi.\nTôi lặng lẽ ăn. Rồi tôi cũng đưa thìa cho Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「……すごぉく、嬉しか」
1515 = "「……Vui, lắm luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。嬉しい」
2358 = "「Đúng vậy. Vui thật.」"
# monologue
# JP: 口数少なく、けれども甘く。\n会話しながら、食べていく。
3043 = "Ít lời, nhưng lại ngọt ngào.\nChúng tôi vừa trò chuyện, vừa ăn."
# monologue
# JP: いや、お互いに――\n言葉を、カレーを。そして想いを食べさせていく。
2813 = "Không, cả hai cùng——\nmớm cho nhau những lời nói, những thìa cà ri. Và cả những tâm tư tình cảm."
# 【日々姫】
# display as 日日姬
# JP: 「ん……おいしかった」
2110 = "「Ưm……ngon quá.」"
# monologue
# JP: カレー皿はぺろりと空になり、\nお次は――
2928 = "Đĩa cà ri đã sạch bách,\ntiếp theo là——"
# 【日々姫】
# display as 日日姬
# JP: 「はい、にぃにー。プリン。あーーーん」
1983 = "「Này, anh hai. Pudding nè. A——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。あーん（ぱくっ）。\nむ……おお――これは、甘いな。コクがあって美味い」
2115 = "「Ừm. A——(Ngoạm).\nƯm……ồ——ngọt đấy. Đậm đà và ngon miệng.」"
# 【日々姫】
# display as 日日姬
# JP: 「まっこと？　私も食べたかとー」
2453 = "「Thật ạ? Em cũng muốn ăn~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、もちろんだ――ほーら？　あーん」
2160 = "「Ừ, tất nhiên rồi——này? A——」"
# 【日々姫】
# display as 日日姬
# JP: 「あーーん！　（はむっ！）――\nん～おいひいいいい～」
2075 = "「A——! (Ngoạm!)——\nƯm~ ngonn quáaaa~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふふっ」
2019 = "「Fufufu.」"
# monologue
# JP: 甘さにとろける日々姫の顔は、\nびっくりするほどあどけない。
3216 = "Khuôn mặt tan chảy trong sự ngọt ngào của Hibiki,\nngây thơ đến ngạc nhiên."
# monologue
# JP: 遠いあの頃――喫茶店ごっこをしていたころに、\n一瞬、時が巻き戻ったかと、錯覚しかねないほどに。
3080 = "Cứ như thể thời gian chợt quay ngược lại\nnhững ngày xa xưa ấy——khi chúng tôi chơi trò quán cà phê vậy."
# 【日々姫】
# display as 日日姬
# JP: 「あ～！　嬉しかぁ～\n昔っからの夢のひとつば、叶っちゃったばい！」
2103 = "「A~! Vui quá đi~\nMột trong những ước mơ từ ngày xưa, đã thành hiện thực rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「他にもあるのか？\n昔からの……未だ叶ってない夢が」
1979 = "「Còn ước mơ nào khác sao?\nNhững ước mơ từ ngày xưa……mà vẫn chưa thành hiện thực ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。ある。\nゆーか、にぃにも知っとると思うけど？」
2159 = "「Vâng. Có ạ.\nMà, em nghĩ anh hai cũng biết chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2130 = "「嗯」" 
# monologue
# JP: 日々姫の顔が、引き締まる。\nだからたっぷりの蜜をパンケーキにかけてやる。
3205 = "Khuôn mặt Hibiki trở nên nghiêm túc.\nNên tôi đã rưới thật nhiều mật ong lên chiếc bánh pancake cho con bé."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫？　あーんだ」
2332 = "「Hibiki? A——nào.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。あーーーん」
2113 = "「Vâng. A——」"
# monologue
# JP: 甘さに、ひそまりかけていた眉根が緩む。\nゆるゆると――他の何かも、やわらいでいく。
3279 = "Vị ngọt làm cho đôi lông mày đang cau lại giãn ra.\nTừ từ——những thứ khác cũng dần trở nên mềm mại."
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇ、あのあと……\n結局一度も、お客さんになってくれんかったけん」
2470 = "「Này này, sau lần đó……\nRốt cuộc chị ấy chẳng làm khách hàng của em thêm lần nào nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――――（ぱくっ）」
2140 = "「À――――(Ngoạm)」"
# monologue
# JP: お返しに日々姫がくれたパンケーキが、\n僕の記憶をもほぐしてくれる。
3177 = "Miếng bánh pancake Hibiki đút lại cho tôi,\ncũng làm dịu đi những ký ức trong tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「あのころは……\n僕にも理解できてなかったが」
2577 = "「Hồi đó……\nAnh cũng không hiểu được, nhưng mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
2050 = "「Hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉は、恐らく過保護だったのだ」
2460 = "「Chị Mayami, có lẽ đã bảo bọc em quá mức đấy.」"
# monologue
# JP: 今なら、僕にもわかる気がする。
2819 = "Giờ thì, tôi có cảm giác mình đã hiểu ra."
# monologue
# JP: 他の誰よりも日々姫が大事。\nその思いを、僕もこころから持てているから。
2943 = "Hibiki quan trọng hơn bất kỳ ai khác.\nBởi vì tôi cũng có được suy nghĩ đó từ tận đáy lòng."
# 【日々姫】
# display as 日日姬
# JP: 「過保護って……それなら、側にいてくれた方が」
2203 = "「Bảo bọc quá mức sao……Nếu vậy thì, chị ấy nên ở bên cạnh em chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それでは日々姫は成長できん。\n真闇姉が近くにいれば――僕らは、甘える」
2559 = "「Như thế thì Hibiki sẽ không trưởng thành được.\nNếu chị Mayami ở gần——chúng ta sẽ ỷ lại mất.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
2076 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「けれど、日々姫が喫茶店ごっこをするときには、\n日々姫の近くには、必ず僕がいた――だろう？」
2016 = "「Nhưng mà, khi Hibiki chơi trò quán cà phê,\nthì chắc chắn luôn có anh ở gần Hibiki——đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　だって、くまくまとふたりだったら、\nお絵描きばしとるほーがずうっと楽しかけん」
2137 = "「Vâng! Bởi vì, nếu chỉ có em và gấu bông,\nthì thà ngồi vẽ vời còn vui hơn nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
2272 = "「Chắc là vậy rồi.」"
# monologue
# JP: 真闇姉は、それを重々承知していた。\n喫茶店ごっこは、ゆえに安全。
3297 = "Chị Mayami đã biết rất rõ điều đó.\nChính vì vậy trò chơi quán cà phê mới an toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕とふたりの喫茶店ごっこであれば、\n日々姫は見守られつつ、安全に成長を遂げられる」
2217 = "「Nếu là chơi trò quán cà phê với anh,\nHibiki vừa được trông nom, vừa có thể trưởng thành một cách an toàn.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2130 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「もし仮に、そこに危険が混じるのならば――」
2478 = "「Giả sử như, có nguy hiểm xen lẫn vào đó thì——」"
# 【日々姫】
# display as 日日姬
# JP: 「あああ！」
2082 = "「Aaa!」"
# monologue
# JP: 日々姫が驚きの声を出す。
3194 = "Hibiki thốt lên kinh ngạc."
# monologue
# JP: そうして、やがて――\nあきれたような、愛おしそうな声をだす。
2903 = "Và rồi, cuối cùng——\ncon bé cất giọng nghe như vừa ngạc nhiên, vừa trìu mến."
# 【日々姫】
# display as 日日姬
# JP: 「たった一回。\n私が、張り切りすぎちゃったから」
2469 = "「Chỉ đúng một lần.\nVì em đã hăng hái quá mức.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なのではないかな」
2259 = "「Có lẽ là vậy đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「あはは、過保護」
2080 = "「Ahaha, bảo bọc quá mức.」"
# monologue
# JP: あたたかな声。\n真闇姉に、ほんのわずかな嫉妬心さえ感じるほどに。
2964 = "Một giọng nói ấm áp.\nĐến mức khiến tôi cảm thấy đôi chút ghen tị với chị Mayami."
# 【日々姫】
# display as 日日姬
# JP: 「……ほんとに、私。早く大人にならんとね」
1516 = "「……Thật sự, em. Phải mau chóng trưởng thành thôi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2363 = "「是啊」" 
# monologue
# JP: 日々姫がハチロクイメージのフロートのグラスを掲げる。\nふたつ用意のあるストローをあえて使わずに。
3208 = "Hibiki nâng ly kem nổi mang hình ảnh Hachiroku lên.\nCố tình không dùng hai chiếc ống hút đã chuẩn bị sẵn."
# monologue
# JP: ならば乾杯をしたいのだろう。\n僕も、れいなイメージの軽油のカップを手に取る。
3286 = "Nếu vậy thì chắc là muốn nâng ly đây.\nTôi cũng cầm lấy chiếc cốc dầu diesel mang hình ảnh Reina lên."
# 【日々姫】
# display as 日日姬
# JP: 「食堂列車を完成させて。\n私が、ちゃんと、一人前になれるよう」
2462 = "「Hoàn thành chuyến tàu ăn uống.\nĐể em, có thể thực sự trở thành một người độc lập.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうして僕が、お前を堂々と[めと]娶れるように」
1936 = "「Và để anh, có thể đường hoàng cưới em làm vợ.」"
# 【日々姫】
# display as 日日姬
# JP: 「乾杯」
1937 = "「Cạn ly.」"
# 【双鉄】
# display as 雙鐵
# JP: 「乾杯」
# 1937 = "「乾杯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ん…………」
2104 = "「Ưm…………」"
# 【日々姫】
# display as 日日姬
# JP: 「すぅ……すぅ……すぅ……」
2024 = "「Khò……khò……khò……」"
# 【双鉄】
# display as 雙鐵
# JP: 「む――ん……う、む？」
2105 = "「Ưm——n……ư, hửm?」"
# monologue
# JP: ……居間だ。日々姫だ。\n日々姫が寝ている。
1478 = "……Là phòng khách. Là Hibiki.\nHibiki đang ngủ."
# monologue
# JP: 開かれたままのスケッチブックには、\n絵ではなく、たくさんのたくさんの文字達が――
3124 = "Trên cuốn sổ phác thảo đang mở,\nkhông phải là hình vẽ, mà là rất nhiều, rất nhiều những dòng chữ——"
# 【双鉄】
# display as 雙鐵
# JP: 「……ああ、そうか。\n愛称の相談をしながら寝てしまったか」
1537 = "「……À, ra vậy.\nMình đã ngủ thiếp đi trong lúc bàn về biệt danh sao.」"
# monologue
# JP: 寝ぼける頭を軽く振り、昨夜のことを思い出す。
3092 = "Tôi khẽ lắc cái đầu còn đang ngái ngủ, nhớ lại chuyện tối qua."
# 【双鉄】
# display as 雙鐵
# JP: 「しっくり来るものは、浮かんでこなかったなぁ」
2414 = "「Vẫn chưa nghĩ ra được cái tên nào ưng ý nhỉ.」"
# monologue
# JP: 間近に迫った、\nガマダスカフェのリニューアルオープン。
3551 = "Ngày mở cửa lại của quán cà phê Gamadas\nđang đến rất gần."
# monologue
# JP: 他は準備万端なのに、レールショップの会議を経ても\nリニューアルを印象づける愛称だけが決まっていない。
2881 = "Mọi thứ khác đã chuẩn bị xong xuôi, nhưng dù đã qua cuộc họp ở cửa hàng đường sắt,\nbiệt danh để tạo ấn tượng cho việc mở cửa lại vẫn chưa được quyết định."
# 【双鉄】
# display as 雙鐵
# JP: 「『名前は、最大のキャッチコピー』か」
1497 = "「'Tên gọi, chính là khẩu hiệu quảng cáo lớn nhất' sao.」"
# monologue
# JP: 言われてみれば、そのとおりだ。\nガマダスのカフェだから、ガマダスカフェ。
2830 = "Nghe thì đúng là vậy.\nVì là quán cà phê của Gamadas, nên gọi là quán cà phê Gamadas."
# monologue
# JP: それでは、キャッチとして弱い。\nこどもたちとおかあさんが集える場所と、伝えたい。
3410 = "Như thế thì, sức hút quảng cáo quá yếu.\nTôi muốn truyền tải rằng đây là nơi các bà mẹ và trẻ em có thể tụ tập."
# 【双鉄】
# display as 雙鐵
# JP: 「みんなで考えても出て来ぬものを、\nここで一人で考えたとて――ん？」
2187 = "「Cái mà mọi người cùng nghĩ cũng không ra,\nthì mình có nghĩ một mình ở đây cũng——hửm?」"
# monologue
# JP: 毛布だ。僕を包んでる。\n僕だけではなく、日々姫のことも――
3090 = "Là chăn. Đang đắp cho tôi.\nKhông chỉ mình tôi, mà cả Hibiki nữa——"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、おはようございます。双鉄様」
2097 = "「Chà, chào buổi sáng. Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おはようハチロク」
2339 = "「Chào buổi sáng Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「こんなところで寝ていらしたのですか。\n申し訳ございません、気付かずに」
1996 = "「Ngài ngủ ở chỗ này sao ạ.\nThành thật xin lỗi, em không nhận ra.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕ら自身、まさか寝込むとは思わなかった」
1926 = "「Không, chính chúng tôi cũng không ngờ mình lại ngủ quên mất.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん？　……ん――」
2165 = "「Ưm? ……Ưm——」"
# monologue
# JP: 起きるか？　と見つめてみるが、寝たままだ。
3356 = "Sắp tỉnh sao? Tôi thử nhìn con bé, nhưng vẫn đang ngủ."
# 【双鉄】
# display as 雙鐵
# JP: 「まだ一時間は寝ていられるか」
2569 = "「Chắc vẫn ngủ thêm được một tiếng nữa nhỉ.」"
# monologue
# JP: ならば少しでも、しっかり休ませた方がいい。
3432 = "Vậy thì nên để con bé nghỉ ngơi tử tế thêm chút nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「少しだけ待っていてくれ。\n日々姫を部屋で寝かせてくる」
1977 = "「Đợi tôi một chút nhé.\nTôi đưa Hibiki về phòng ngủ đã.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。お手伝いは――不要ですよね？」
2210 = "「Vâng. Chắc là——không cần em giúp đâu nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まあな。自分の恋人を寝かしつけるのに、\n他の誰かの手を借りたとあっては、男がすたろう」
2123 = "「Chắc vậy. Nếu đưa người yêu của mình đi ngủ\nmà còn phải nhờ tay người khác thì mất mặt đàn ông quá.」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。どうぞお気をつけて」
2276 = "「Đã rõ ạ. Xin ngài hãy cẩn thận.」"
# 【ハチロク】
# display as 八六
# JP: 「…………ふぅ」
1509 = "「…………Phù.」"
# 【ハチロク】
# display as 八六
# JP: 「“他の誰か”――でございますか。\n“物”でもなく、‘他の女”でもなく」
1495 = "「\"Người khác\"——sao ạ.\nKhông phải \"đồ vật\", cũng không phải \"người phụ nữ khác\".」"
# 【ハチロク】
# display as 八六
# JP: 「あらいやだ。わたくしとしたことが、\n何を今さら、未練がましいことなど――っ！」
2040 = "「Ôi chao. Thật không giống mình chút nào,\nđến nước này rồi còn vương vấn cái gì chứ——!」"
# 【ハチロク】
# display as 八六
# JP: 「……未練、ですか。そうなのでしょうね。\nただの一度も、女として見ていただけなくとも」
2260 = "「……Vương vấn, sao. Chắc là vậy rồi.\nDù chưa một lần nào, được ngài ấy nhìn nhận như một người phụ nữ.」"
# 【ハチロク】
# display as 八六
# JP: 「物であるわたくしでさえ、これなのですから。\n[まくら,1]真闇様は……どれほど切ないお気持ちを」
2565 = "「Ngay cả một món đồ vật như em mà còn thế này.\nChị Mayami……chắc hẳn phải đau lòng đến nhường nào.」"
# monologue
# JP: （とん、とん、とん）
3503 = "(Bịch, bịch, bịch)"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
2069 = "「!」"
# monologue
# JP: （すっ――）
3502 = "(Phù——)"
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。待たせてしまったな」
2313 = "「Xin lỗi. Đã để cô phải đợi rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ？　何の問題もございませんよ。\nわたくしは、双鉄様のレイルロオドなのですから」
2059 = "「Không đâu ạ? Không có vấn đề gì cả.\nBởi vì em là Railord của ngài Soutetsu mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「レイルロオドだからこそ、朝の時間は貴重だろう。\n待たせてまで聞きたかったのも小さなことで申し訳ない」
2338 = "「Chính vì là Railord nên thời gian buổi sáng mới quý giá chứ.\nBắt cô phải đợi chỉ để hỏi một chuyện nhỏ nhặt, thật ngại quá.」"
# 【ハチロク】
# display as 八六
# JP: 「小さなこと――いったいなんでございましょうか？」
2235 = "「Chuyện nhỏ nhặt——rốt cuộc là chuyện gì vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「毛布だ。一応の確認だが――\nお前がかけてくれたのではない、のだよな？」
2377 = "「Là cái chăn. Chỉ để xác nhận thôi——\nkhông phải cô đắp cho chúng tôi, đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしでしたら、\n気づいたときに、そっと起こしてさしあげたかと」
2374 = "「Vâng. Nếu là em,\nkhi nhận ra, em sẽ nhẹ nhàng đánh thức hai người dậy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば、毛布をかけてくれたのは」
2372 = "「Vậy sao. Nếu thế thì, người đắp chăn cho chúng tôi là」"
# 【真闇】
# display as 真闇
# JP: 「あら、おはよぉ」
2043 = "「Ô kìa, chào buổi sáng~」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉」
2458 = "「Chị Mayami.」"
# monologue
# JP: 丁度考えていたところだったせいか、妙に気まずい。\nが、尋ねずいるにもおかしな話だ。
3375 = "Có lẽ vì vừa mới nghĩ đến nên tôi thấy hơi ngượng ngùng.\nNhưng không hỏi thì cũng kỳ lạ."
# 【双鉄】
# display as 雙鐵
# JP: 「毛布、真闇姉がかけてくれたのだよな。\nありがとう。おかげで風邪も引かずに済んだ」
2407 = "「Cái chăn, là chị Mayami đắp cho em đúng không.\nCảm ơn chị. Nhờ vậy mà em không bị cảm.」"
# 【真闇】
# display as 真闇
# JP: 「ううん、そんなん。\n余計なことかとも思うたけど――」
2061 = "「Không có gì đâu.\nChị còn tưởng mình làm chuyện thừa thãi cơ——」"
# 【双鉄】
# display as 雙鐵
# JP: 「余計なことなどであるはずもない」
2555 = "「Làm sao mà thừa thãi được chứ.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃんにはね。けど、ひーちゃんには……\nひーちゃん、ずーっと……がんばっとるでしょお」
2231 = "「Với Sou-chan thì vậy thôi. Nhưng với Hii-chan thì……\nHii-chan, vẫn luôn……rất cố gắng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 2076 = "「啊」" 
# 【ハチロク】
# display as 八六
# JP: 「あ」
# 2076 = "「啊」" 
# monologue
# JP: こぼれた声がハチロクと重なり、目を見合わせる。
3336 = "Giọng nói buột ra cùng lúc với Hachiroku, chúng tôi đưa mắt nhìn nhau."
# monologue
# JP: ……ハチロクも気づいていたことならば、\n真闇姉が気付いていないはずもない。
1475 = "……Nếu Hachiroku cũng đã nhận ra,\nthì không có lý nào chị Mayami lại không nhận ra."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は――」
2329 = "「Hibiki thì——」"
# monologue
# JP: 自分自身を思い出す。\n真闇姉に甘えることを、自ら禁じていた過去を。
3057 = "Tôi nhớ lại chính mình.\nQuá khứ mà tôi đã tự cấm bản thân làm nũng với chị Mayami."
# monologue
# JP: そうした態度がここ数日、日々姫にもハッキリ見えている。\nまるで、思春期だった頃に戻ってしまったかのよう――
3413 = "Vài ngày nay, thái độ đó cũng thể hiện rõ ở Hibiki.\nCứ như thể con bé đã trở lại thời kỳ dậy thì vậy——"
# monologue
# JP: （ああいや、違うな。ハッキリ違う）
3509 = "(À không, khác chứ. Hoàn toàn khác.)"
# monologue
# JP: 思春期のころの日々姫が、真闇姉を拒んでいたのは、\nライバル心もあってだったと、今ならわかる。
3274 = "Bây giờ tôi mới hiểu, lý do Hibiki từ chối chị Mayami hồi dậy thì,\nmột phần là do tâm lý ganh đua."
# monologue
# JP: けれど、今の日々姫の、自分で立とうとしている姿勢は、\nそうしたツンケンしたものではない。
2807 = "Thế nhưng, thái độ tự lập của Hibiki hiện tại,\nkhông phải là kiểu bướng bỉnh như vậy."
# monologue
# JP: （大人になろうと――きっと日々姫は、本当の意味で、\n真闇姉と、大人同士として向き合いたいと――）
3527 = "(Muốn trở thành người lớn——chắc chắn Hibiki muốn đối diện với chị Mayami,\nnhư hai người lớn với nhau, theo đúng nghĩa đen——)"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は今――」
2331 = "「Hibiki hiện giờ——」"
# monologue
# JP: けれども、うまく言葉にできない。
3369 = "Thế nhưng, tôi không thể diễn đạt thành lời một cách trọn vẹn."
# monologue
# JP: 日々姫の想いをわかっていると感じるからこそ、\n僕がそれを語っていいのか、迷ってしまう。
3196 = "Chính vì cảm thấy mình hiểu được tâm tư của Hibiki,\ntôi mới phân vân không biết mình có nên nói ra hay không."
# monologue
# JP: （しかし……\n真闇姉にここまで気を使わせているというのも）
3491 = "(Nhưng mà……\nViệc để chị Mayami phải bận tâm đến mức này cũng)"
# 【真闇】
# display as 真闇
# JP: 「蝶々が、羽化しとるとこ――見たことあると？」
2493 = "「Quá trình bướm lột xác——em đã từng thấy chưa?」"
# 【ハチロク】
# display as 八六
# JP: 「え？　蝶々って――\nあのひらひらと飛ぶ蝶々、ですか？」
2051 = "「Hả? Bướm sao——\nLà những con bướm bay lượn tung tăng ấy ạ?」"
# 【真闇】
# display as 真闇
# JP: 「うん。その蝶々」
2119 = "「Ừ. Chính là con bướm đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「直接は無いが――映像でなら何度か見たな」
2284 = "「Trực tiếp thì chưa——nhưng trên phim ảnh thì anh từng thấy vài lần rồi.」"
# 【真闇】
# display as 真闇
# JP: 「私は、あるとよ。\n何度も何度も、蝶々が羽化する、その瞬間を」
2290 = "「Chị thì, thấy rồi đấy.\nRất nhiều lần, khoảnh khắc con bướm lột xác.」"
# monologue
# JP: あまりに唐突な話だが、\nごくごく自然に頷いている。
3372 = "Dù câu chuyện quá đỗi đột ngột,\nnhưng tôi lại gật đầu một cách vô cùng tự nhiên."
# monologue
# JP: 御一夜にはまだ、田舎の匂いも色濃いし。\nその上、真闇姉は常に早起きをしてもいるゆえ。
3285 = "Ở Ohimitera, hương vị đồng quê vẫn còn rất đậm nét.\nHơn nữa, chị Mayami lại luôn dậy sớm."
# 【真闇】
# display as 真闇
# JP: 「何度もあって――なーんも知らんかったころには、\nじりじりして、待ちきれんで、触っちゃったと」
2180 = "「Thấy nhiều lần rồi——hồi còn chẳng biết gì ấy,\nchị sốt ruột, không chờ nổi nên đã chạm vào nó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ」
2081 = "「A.」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
# 2050 = "「哎？」" 
# monologue
# JP: よほど悲痛な声をこぼしてしまったのだろう。\nハチロクの顔がみるみる不安げになっていく。
2922 = "Chắc hẳn chị ấy đã thốt ra một giọng nói vô cùng bi thương.\nKhuôn mặt Hachiroku dần trở nên bất an."
# 【ハチロク】
# display as 八六
# JP: 「それは……いけないことなのですか？\n触ると、どうなってしまうのですか？」
1914 = "「Chuyện đó……không được phép sao ạ?\nChạm vào thì sẽ thế nào ạ?」"
# 【真闇】
# display as 真闇
# JP: 「羽ば、歪んでしまうとよ。歪んだままに固まって。\n悪ぅすると、そのまま飛べんようになる」
2219 = "「Cánh sẽ bị biến dạng. Cứ thế mà cứng lại.\nTệ hơn nữa, nó sẽ vĩnh viễn không thể bay được.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！\n……かわいそうなこと」
2086 = "「Ôi!\n……Thật đáng thương.」"
# 【真闇】
# display as 真闇
# JP: 「そーね。悪気はのーても……善意でも。\nそいば、かわいそうなことで、したらいけんこと」
2353 = "「Đúng vậy. Dù không có ác ý……hay có thiện ý đi nữa.\nThì đó vẫn là một việc đáng thương, không được phép làm.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2130 = "「嗯」" 
# monologue
# JP: いや、これは……\n“蝶”の話ではないのかもしれん。
2811 = "Không, chuyện này……\ncó lẽ không phải đang nói về \"bướm\"."
# monologue
# JP: 蝶に例えた――\n人の……僕らの話なのかも。
3332 = "Ví von như bướm——\ncó lẽ là chuyện của con người……của chúng tôi."
# 【真闇】
# display as 真闇
# JP: 「やけん、羽化の最中の蝶には、決して触れんと。\nそいば、ウチ自身が後悔せんためでもあるけん」
2307 = "「Vì thế, tuyệt đối không được chạm vào bướm đang lột xác.\nĐó cũng là để bản thân mình không phải hối hận.」"
# 【ハチロク】
# display as 八六
# JP: 「それはまっとうなご判断かと」
2294 = "「Em nghĩ đó là một quyết định sáng suốt ạ.」"
# 【真闇】
# display as 真闇
# JP: 「そーね。まっとう。\nまっとうやけん――」
2356 = "「Đúng vậy. Sáng suốt.\nVì sáng suốt nên——」"
# monologue
# JP: ――さみしくなかとよ――
3423 = "——Cô đơn lắm đấy——"
# monologue
# JP: 声なき声が、聞こえた気がする。\n口にせぬまま、伝えてもらえたような気がする。
3039 = "Tôi có cảm giác như nghe thấy một âm thanh không lời.\nNhư thể dù không nói ra, tôi vẫn được truyền đạt điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「伝えたいことが日々姫の中にあるのなら。\nそれは日々姫が、日々姫自身で伝えるべき、か」
1513 = "「Nếu Hibiki có điều muốn nói.\nThì điều đó, nên để tự Hibiki nói ra, nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「なーにそーちゃん？　うれしかお話？？」
2255 = "「Gì vậy Sou-chan? Chuyện vui hả??」"
# monologue
# JP: 微笑んで。真闇姉はそのヘソの上で手を動かして、\n妙なゼスチャーを見せてくる。
3299 = "Mỉm cười. Chị Mayami đưa tay lên rốn,\nlàm một cử chỉ kỳ lạ."
# monologue
# JP: 風船のようにまぁるく、丸く、\nまるでお腹がふくらんだような――っ！！？
2967 = "Tròn xoe như quả bóng bay,\ncứ như thể bụng đang to ra vậy——!!?"
# 【双鉄】
# display as 雙鐵
# JP: 「なっ！　あっ！　違っ！」
1950 = "「Gì! A! Không phải!」"
# 【真闇】
# display as 真闇
# JP: 「あはは！　じょーだん。\nさぁて！　朝ごはんこしらえんとね」
2078 = "「Ahaha! Đùa thôi.\nNào! Phải chuẩn bị bữa sáng thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくし、お手伝いいたします」
2269 = "「Em sẽ giúp một tay ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ、うむっ！　ならばっ、僕も」
2364 = "「A, ừm! Nếu vậy, anh cũng.」"
# 【真闇】
# display as 真闇
# JP: 「よかけん。双ちゃんはどーんと構えて、\nひーちゃんのこと待っとってあげて？」
2415 = "「Không sao đâu. Sou-chan cứ bình tĩnh ngồi đó,\nvà đợi Hii-chan đi nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そ、そうか――わかった」
2550 = "「V-vậy sao——anh hiểu rồi.」"
# monologue
# JP: ハチロクが持ってきていた新聞を広げてみるが、\nどうにも文字が目を滑る。
3075 = "Tôi thử mở tờ báo mà Hachiroku mang đến,\nnhưng chữ nghĩa cứ trôi tuột đi đâu mất."
# monologue
# JP: （落ち着こう……まさか、真闇姉があんな冗談――\nではなくて！　今は新聞――新聞だ）
3524 = "(Bình tĩnh nào……không ngờ chị Mayami lại đùa kiểu đó——\nKhông phải! Bây giờ là báo——đọc báo.)"
# monologue
# JP: ……呼吸が落ち着き始めれば、\nようやく文字も意味を為す。
1466 = "……Khi nhịp thở bắt đầu bình tĩnh lại,\ncuối cùng những dòng chữ cũng mang ý nghĩa."
# monologue
# JP: 日々姫が市長になってからは、地域欄を\n一番最初にチェックするようになってしまった。
3342 = "Kể từ khi Hibiki trở thành thị trưởng, tôi đã bắt đầu\ncó thói quen kiểm tra mục tin địa phương đầu tiên."
# 【ハチロク】
# display as 八六
# JP: 「二番だしは、どうなさいますか？」
1939 = "「Nước dùng lần hai, chị định làm thế nào ạ?」"
# 【真闇】
# display as 真闇
# JP: 「あ、こっち変わって？\n白菜と油揚げの煮物、パパってこしらえてしまうけん」
2095 = "「A, đổi sang bên này nhé?\nChị sẽ nấu nhanh món bắp cải hầm đậu hũ chiên.」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました」
2346 = "「Đã rõ ạ.」"
# monologue
# JP: ……台所からは、穏やかなやりとり。\n日々姫と真闇姉とが、普段かわしていたような。
1472 = "……Từ trong bếp vọng ra những cuộc trò chuyện êm đềm.\nGiống như những gì Hibiki và chị Mayami vẫn thường trao đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「認められることが苦しいものと知ってはいたが――」
2270 = "「Dù biết rằng được công nhận là một điều gian khổ——」"
# monologue
# JP: 認めることも、そのために待つこともまた苦しいと、\n真闇姉は、その身をもって教えてくれている。
3334 = "Nhưng chị Mayami đã dùng chính bản thân mình để dạy cho tôi biết rằng,\ncông nhận và chờ đợi vì điều đó cũng đau khổ không kém."
# 【双鉄】
# display as 雙鐵
# JP: 「……だからこそ、応えねばな」
1518 = "「……Chính vì vậy, tôi phải đáp lại.」"
# monologue
# JP: いま伸びかけている日々姫の羽を、\n誰にも決して弄らせまい。
3189 = "Đôi cánh của Hibiki đang dần vươn ra,\ntuyệt đối không để bất kỳ ai chạm vào."
# monologue
# JP: 空気を入れ換えたくなって、\n縁側へ続く戸を開く。
3071 = "Muốn thay đổi không khí,\ntôi mở cánh cửa dẫn ra hiên nhà."
# monologue
# JP: （さあっ）
3545 = "(Vùù)"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2130 = "「嗯」" 
# monologue
# JP: そうして僕は、風を吹かそう。\nいつか日々姫が羽ばたくときには――っ！
3330 = "Và rồi tôi, sẽ tạo ra một cơn gió.\nĐể một ngày nào đó khi Hibiki vỗ cánh——!"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか……風だ。民意だ」
2230 = "「Ra vậy……là gió. Là ý dân.」"
# monologue
# JP: 民意を強く意識する日常を送っているからこそ、\n非日常であるカフェまわりとは繋がらなかった。
3441 = "Chính vì trải qua những ngày tháng luôn ý thức mạnh mẽ về ý dân,\nnên tôi mới không liên kết được với những chuyện khác thường xung quanh quán cà phê."
# monologue
# JP: が――気づいてしまえば、\nそれこそ最善手であるようにさえ思えてくる。
1446 = "Nhưng——khi đã nhận ra,\ntôi thậm chí còn nghĩ đó chính là nước đi tốt nhất."
# monologue
# JP: （ととととと）
3504 = "(Bịch bịch bịch bịch bịch)"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ごめん！　寝かせてくれたと？」
2593 = "「Anh hai, xin lỗi nha! Anh đưa em đi ngủ đấy à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「何事もない。\nそれより日々姫、カフェの愛称についてだが」
2410 = "「Không có gì đâu.\nQuan trọng hơn, Hibiki này, về biệt danh của quán cà phê.」"
# 【日々姫】
# display as 日日姬
# JP: 「思いついたと！？」
1972 = "「Anh nghĩ ra rồi sao!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのものではなく、手段をだがな。\nコンテスト――公募をかけてはどうだろう？」
2283 = "「Không phải là tên, mà là phương pháp.\nCuộc thi——hay là chúng ta kêu gọi đóng góp công khai đi?」"
# 【ハチロク】
# display as 八六
# JP: 「ここが、ガマダスカフェ――\nあらため、御一夜ステーションカフェですか」
2560 = "「Đây là quán cà phê Gamadas——\nà không, là quán cà phê ga Ohimitera sao.」"
# 【れいな】
# display as 玲奈
# JP: 「にぎやかですねぇ！」
2449 = "「Nhộn nhịp quá nhỉ!」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、もう満席に近いのですね。\n広々としているので圧迫感は感じませんが」
2036 = "「Chà, gần như kín chỗ rồi nhỉ.\nVì không gian rộng rãi nên không cảm thấy ngột ngạt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いらっしゃいませ。おまたせいたしまし――た」
2396 = "「Kính chào quý khách. Đã để quý khách phải đợi lâu——a.」"
# monologue
# JP: 驚かされる。
3052 = "Thật đáng ngạc nhiên."
# monologue
# JP: みなが来てくれるであろうことなら、\n当然予想していた、が――
3084 = "Việc mọi người sẽ đến,\ntất nhiên là tôi đã đoán trước được, nhưng——"
# 【れいな】
# display as 玲奈
# JP: 「わぁあ、双鉄さんかーっこいいですぅ！」
2037 = "「Woa, anh Soutetsu trông ngầu quá đi!」"
# 【ハチロク】
# display as 八六
# JP: 「うふふ、休憩時間にお邪魔してしまいました」
2021 = "「Fufu, chúng em đến làm phiền trong giờ nghỉ rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、うむ。歓迎だ。\n大歓迎だが――その恰好は」
1924 = "「Không, ừm. Hoan nghênh.\nRất hoan nghênh, nhưng——trang phục đó là sao?」"
# monologue
# JP: ハチロクはブレザー。\nれいなはセーラー服。
2879 = "Hachiroku mặc áo blazer.\nReina thì mặc đồng phục thủy thủ."
# monologue
# JP: どちらも、学園指定のものとは違う制服だ。
2960 = "Cả hai đều không phải là đồng phục được học viện chỉ định."
# 【れいな】
# display as 玲奈
# JP: 「えっへへ～　れいなたち、\n変装をして来たんですよぉ」
2169 = "「Ehehe~ Bọn Reina,\nđã hóa trang để đến đây đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「変装」
2007 = "「Hóa trang.」"
# 【ハチロク】
# display as 八六
# JP: 「その……わたくしは軽油、れいなは石炭のメニウを、\nそれぞれ食してみたいのですが」
1998 = "「Chuyện là……em muốn thử món dầu diesel, còn Reina thì muốn thử thực đơn than đá,\nmỗi người một món ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「レイルロオドだってわかる恰好のままだと、\n本物をカフェで食べてるって思われちゃうかもですぅ」
2215 = "「Nếu cứ mặc đồ để lộ thân phận Railord,\nngười ta có khi lại tưởng bọn Reina đang ăn đồ thật trong quán cà phê mất ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「ですので、\n人間の方に混じっても目立たぬようにと、変装を」
2304 = "「Chính vì vậy,\nđể trà trộn vào con người mà không bị chú ý, chúng em đã hóa trang ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな――ではなくて！」
2008 = "「Ra là vậy——không phải thế!」"
# monologue
# JP: うっかり職務を失念していた。\nふたりは今は、レイルロオドではなく“お客様”だ。
3060 = "Suýt nữa thì tôi quên mất nhiệm vụ.\nHai người họ bây giờ không phải Railord, mà là \"khách hàng\"."
# 【双鉄】
# display as 雙鐵
# JP: 「失礼いたしました。『二名様ですか？』」
2199 = "「Thật thất lễ. 'Hai vị phải không ạ?'」"
# 【ハチロク】
# display as 八六
# JP: 「うふふっ」
2018 = "「Fufu.」"
# 【れいな】
# display as 玲奈
# JP: 「ふわぁ」
2029 = "「Oa.」"
# monologue
# JP: 小さなこどものお店屋さんごっこを見守るような――\nあるいは、純粋な羨望の――視線。
2961 = "Ánh mắt như đang theo dõi những đứa trẻ chơi trò bán hàng——\nhoặc là, một sự ngưỡng mộ thuần túy."
# monologue
# JP: 感じ始めた気恥ずかしさを、静かな声が洗ってくれる。
3050 = "Giọng nói tĩnh lặng đã gột rửa đi sự ngượng ngùng vừa nhen nhóm trong tôi."
# 【ハチロク】
# display as 八六
# JP: 「はい、二名です」
2376 = "「Vâng, hai người ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレットは一緒じゃないんですよぉ」
2423 = "「Chị Paulette không đi cùng đâu nha~」"
# monologue
# JP: 残念そうだが、当然だろう。
3444 = "Có vẻ hơi tiếc, nhưng đó là điều đương nhiên."
# monologue
# JP: 鉄道を深く理解するものが、\n全員揃って駅を空けることは、望ましくない。
2914 = "Những người am hiểu sâu sắc về đường sắt,\nchắc chắn không mong muốn việc tất cả mọi người cùng rời khỏi nhà ga."
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、こちらのお席へどうぞ」
2582 = "「Vậy thì, xin mời quý khách ngồi ở đây.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　キハ[れいななえす,2]07sの絵がありますよぉ」
2033 = "「Oa! Có tranh của KiHa 07S kìa nha~」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、[あのこ,3]8620の写真も」
2143 = "「Chà, có cả ảnh của [đứa bé đó,3]8620 nữa.」"
# monologue
# JP: 席へ案内し、水とお絞りを出し、オーダーを取る。\nプレミアム軽油に、石炭ピロージナエカルトーシカ。
3393 = "Hướng dẫn vào chỗ ngồi, dọn nước và khăn ướt, nhận order.\nDầu diesel cao cấp và bánh Pirozhnoe Kartoshka than đá."
# monologue
# JP: オーダーをキッチンへと伝えれば、\nすぐさまに、山崎さんの声が飛ぶ。
3110 = "Vừa truyền order vào bếp,\ngiọng của cô Yamazaki đã vang lên ngay lập tức."
# 【山崎】
# display as 山崎
# JP: 「日々姫さんは軽油お願いします」
2602 = "「Hibiki phụ trách món dầu diesel nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい！」
2378 = "「Vâng!」"
# monologue
# JP: （おお）
3514 = "(Ồ)"
# monologue
# JP: 狭いキッチン、多くの工数。\nなのに二人はぶつかっていない。
3004 = "Căn bếp chật hẹp, nhiều công đoạn.\nVậy mà hai người họ không hề va chạm vào nhau."
# monologue
# JP: 動作のひとつひとつを最小限にすることを、\n日々姫は、身につけ初めているのだ。
3180 = "Hibiki đã bắt đầu học được cách\ngiảm thiểu tối đa từng động tác một."
# monologue
# JP: （これなら――経験は必ず活きよう）
3519 = "(Thế này thì——kinh nghiệm chắc chắn sẽ phát huy tác dụng.)"
# monologue
# JP: 僕も気持ちを引き締め直す。
3032 = "Tôi cũng chấn chỉnh lại tinh thần."
# monologue
# JP: ウェイターとして得る気づきもまた、\n必ずや日々姫の設計の役に立つ。
2947 = "Những nhận thức có được khi làm phục vụ,\nchắc chắn sẽ giúp ích cho việc thiết kế của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「おまたせいたしました」
1932 = "「Đã để quý khách phải đợi lâu.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁい！　すごぉい！\nこれ、石炭にそっくりですよぉ」
2031 = "「Oa! Tuyệt quá đi!\nCái này, giống hệt than đá luôn đó nha~」"
# 【ハチロク】
# display as 八六
# JP: 「この軽油も……軽油、ですね。\n飲むのを、ためらってしまうほどです」
2556 = "「Món dầu diesel này cũng……đúng là dầu diesel nhỉ.\nGiống đến mức em còn phải do dự không biết có nên uống hay không.」"
# monologue
# JP: そうはいいつつ、ハチロクは軽油をこくり。\nれいなは石炭をカリポリだ。
3371 = "Nói thì nói vậy, Hachiroku vẫn nhấp một ngụm dầu diesel.\nReina thì nhai than đá rôm rốp."
# monologue
# JP: 普段と真逆の光景に微笑ましいような気持ちになるが、\nぼんやり見ているヒマは無い。
3385 = "Khung cảnh trái ngược hoàn toàn với ngày thường khiến tôi cảm thấy buồn cười,\nnhưng không có thời gian để đứng nhìn ngẩn ngơ đâu."
# 【双鉄】
# display as 雙鐵
# JP: 「ごゆっくりお楽しみください」
2517 = "「Chúc quý khách ngon miệng.」"
# 【ご婦人】
# display as 婦人
# JP: 「あ、お冷いただけますか？」
2101 = "「A, cho tôi xin ly nước lạnh được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「かしこまりました」
2208 = "「Đã rõ ạ.」"
# monologue
# JP: ……とにかく来客が途切れない。\n何かをしている途中にもどんどん声をかけられ――！
1476 = "……Tóm lại là khách đến không ngớt.\nĐang dở tay làm việc này thì lại liên tục bị gọi——!"
# 【ちびっこ】
# display as 小孩
# JP: 「ごめんなさぁい」
2229 = "「Cháu xin lỗiiii.」"
# monologue
# JP: ――走り回られぶつかりかけて、お盆が一瞬、傾いた。\n冷や汗を抑え、落ち着き払った態度を装う。
1445 = "——Bị bọn trẻ chạy lăng xăng va vào, cái khay nghiêng đi trong tích tắc.\nTôi kìm mồ hôi lạnh, cố tỏ ra bình tĩnh."
# 【双鉄】
# display as 雙鐵
# JP: 「いえ、こちらこそ失礼しました」
1928 = "「Không, là chú thất lễ mới đúng.」"
# monologue
# JP: ……食堂列車となると家族連れも多いだろうし、\n子供のテンションも跳ねあがろう。
1481 = "……Nếu là chuyến tàu ăn uống thì chắc sẽ có nhiều gia đình đi cùng,\nvà sự phấn khích của trẻ con cũng sẽ tăng vọt."
# monologue
# JP: （事故防止、この面でも対策をする必要があるな）
3515 = "(Ngăn ngừa tai nạn, mặt này cũng cần phải có biện pháp đối phó.)"
# monologue
# JP: ……働くほどに学びは増える。
1470 = "……Càng làm việc càng học hỏi được nhiều."
# monologue
# JP: メモ帳を開く余裕も無いから、\nとにかく記憶に焼き付ける。
3079 = "Không có cả thời gian để mở sổ tay,\nnên tôi cứ khắc sâu tất cả vào trí nhớ."
# 【ハチロク】
# display as 八六
# JP: 「ご馳走さまでした。会計をお願いいたします」
2183 = "「Cảm ơn vì bữa ăn. Phiền anh thanh toán giúp ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「ごちそーさまでした！\nとーってもおいしかったですよぉ」
2182 = "「Cảm ơn vì bữa ănnn!\nRấttt là ngon luôn đó nha~」"
# monologue
# JP: （おっと）
3507 = "(Ái chà)"
# monologue
# JP: 口の端に石炭クズ――としか見えない\nピロージナエカルトーシカクズ。
2963 = "Bên mép dính vụn than đá——chỉ có thể nhìn ra như vậy\ndù đó là vụn bánh Pirozhnoe Kartoshka."
# monologue
# JP: ハチロクにしてやるように取りそうになった指を止め、\n声と視線とで促してみる。
3077 = "Tôi định đưa tay lau đi như vẫn làm với Hachiroku, nhưng kịp dừng lại,\nthử nhắc nhở bằng giọng nói và ánh mắt."
# 【双鉄】
# display as 雙鐵
# JP: 「お客様。お連れ様が」
2553 = "「Thưa quý khách. Bạn đi cùng của ngài.」"
# 【ハチロク】
# display as 八六
# JP: 「あら――れいな？　あごを少しだけもちあげて？」
2046 = "「Ô kìa——Reina? Nâng cằm lên một chút nào?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい――んっ」
2412 = "「Vâng ạ——ưm.」"
# monologue
# JP: かわいらしくも優しい景色に心が和むが、\n一息ついてもいられない。
3407 = "Khung cảnh đáng yêu và dịu dàng khiến lòng tôi nhẹ nhõm,\nnhưng cũng không rảnh để mà thở phào."
# monologue
# JP: ここから先はお昼時――\nピークタイムに突入するゆえ。
2945 = "Vì từ giờ trở đi là giờ ăn trưa——\nsẽ bước vào thời gian cao điểm."
# 【凪】
# display as ？？？
# JP: 「来たばーーい！」
1981 = "「Đến rồi đâyyyy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いらっしゃいませ。お二人様ですか？」
2395 = "「Kính chào quý khách. Hai vị phải không ạ?」"
# 【凪】
# display as 凪
# JP: 「お二人様ばい！　見りゃわかるばい！」
2350 = "「Hai người nè! Nhìn là biết rồi mà!」"
# 【ふかみ】
# display as 深美
# JP: 「だめだよ凪ちゃん、お仕事のお邪魔しちゃったら」
1907 = "「Không được đâu Nagi, đừng làm phiền công việc của người ta chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「こちらへどうぞ」
2562 = "「Mời đi hướng này.」"
# monologue
# JP: いつもと変わらぬやり取りを聞け、ほっとする。\nその上ありがたいことに、凪もふかみも普段着だ。
3335 = "Nghe cuộc trò chuyện không đổi khác so với thường ngày, tôi thấy nhẹ nhõm.\nHơn nữa, thật may là cả Nagi và Fukami đều mặc đồ thường ngày."
# 【凪】
# display as 凪
# JP: 「あ！　こん写真！！　見て、ほら！\n凪さま！　キャブから手ぇ振ってあげとるとこばい！」
2091 = "「A! Bức ảnh này!! Nhìn nè, thấy chưa!\nNagi đại nhân! Đang vẫy tay từ trong buồng lái đó nha!」"
# 【ふかみ】
# display as 深美
# JP: 「ほんとだ。凪ちゃんにっこにこー！　\nいいなぁ、これ、クマ川下りでもやって欲しいなぁ」
2455 = "「Thật nè. Nagi cười tươi rói luôn!\nThích ghê, cái này, tớ cũng muốn làm ở chuyến xuôi dòng sông Kuma nữa.」"
# 【凪】
# display as 凪
# JP: 「振っとるよ？　ホテルの人にも釣りの人にも\nラフティングしとる人らにも」
2190 = "「Có vẫy tay mà? Cả với người ở khách sạn, người câu cá\nvà cả những người đang chèo thuyền vượt thác nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「手を振る方じゃなくて写真展示！\nクマ川下りの記念写真でもして欲しいな、って」
2279 = "「Không phải vẫy tay mà là triển lãm ảnh cơ!\nTớ muốn có cả ảnh kỷ niệm xuôi dòng sông Kuma nữa.」"
# 【凪】
# display as 凪
# JP: 「よかとね！　鉄道駅だけが駅じゃなかとばい！」
2551 = "「Được đó! Đâu phải chỉ có ga đường sắt mới là ga đâu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2087 = "「!」"
# 【ふかみ】
# display as 深美
# JP: 「だよね、クマ川下りの発船所だって、駅だよね～\n写真とお絵描き、募集展示して欲しいな～　ちらっ」
2371 = "「Đúng vậy, bến thuyền xuôi dòng sông Kuma cũng là ga mà~\nTriển lãm tranh ảnh, tớ cũng muốn được kêu gọi đóng góp quá~ Liếc.」"
# monologue
# JP: ……凪にはときどき驚かされる。\n駅は、驛。
1460 = "……Thỉnh thoảng Nagi lại làm tôi ngạc nhiên.\nGa, chính là dịch trạm."
# monologue
# JP: 旅する者が馬をつないで、足を止め、\nひととき休み、集う場所。
3430 = "Nơi những người lữ hành buộc ngựa, dừng chân,\nnghỉ ngơi trong chốc lát và tụ họp."
# monologue
# JP: （公募して、人気投票で選ばれた名前――）
3500 = "(Tên được chọn qua kêu gọi đóng góp và bình chọn——)"
# monologue
# JP: 『御一夜ステーションカフェ』\n御一夜の、驛たる、茶店。
3223 = "『Quán cà phê ga Ohimitera』\nQuán trà, dịch trạm của Ohimitera."
# monologue
# JP: それこそまさにこの場を、ふさわしく表す名であるのだと、\nあらためて教わったような気になる。
3046 = "Tôi có cảm giác như vừa được dạy lại một lần nữa rằng,\nđó mới chính là cái tên thể hiện đúng nhất nơi này."
# 【双鉄】
# display as 雙鐵
# JP: 「――どうぞ、こちらのお席へ」
1487 = "「——Mời, hai vị ngồi ở đây.」"
# monologue
# JP: 考え、記憶に刻みつつ、\n体も正しく動かし続ける。
3096 = "Vừa suy nghĩ, vừa khắc ghi vào trí nhớ,\ncơ thể tôi vẫn tiếp tục di chuyển chuẩn xác."
# monologue
# JP: ちらちらとふかみが送ってくる、\n念のこもった視線にも、今は応じていられない。
3259 = "Những ánh mắt đầy ẩn ý mà Fukami liên tục gửi đến,\nbây giờ tôi cũng không thể đáp lại."
# 【双鉄】
# display as 雙鐵
# JP: 「ご注文はお決まりでしょうか？」
2516 = "「Hai vị đã chọn xong món chưa ạ?」"
# 【凪】
# display as 凪
# JP: 「ＳＬカレー！　凪さま、楽しみにしとったばい！」
2489 = "「Cà ri SL! Nagi đại nhân đã mong chờ lắm đó nha!」"
# 【ふかみ】
# display as 深美
# JP: 「む～……わたしは、高菜めしと石炭からあげ、\nお願いします――です」
2066 = "「Ưm~……tớ thì, cơm rang dưa cải và gà rán than đá,\nlàm phiền cậu——nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「かしこまりました。\n……オーダーです！　SL、タカナ、セキカラ」
2341 = "「Đã rõ ạ.\n……Có order! SL, Takana, Sekikara.」"
# 【山崎】
# display as 山崎
# JP: 「SL、タカナ、セキカラ、了解」
2487 = "「SL, Takana, Sekikara, đã nhận.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、にぃに――こほんっ！　右田さん。\n整理券お願いしますって」
2098 = "「A, anh hai——e hèm! Anh Migita.\nNhờ anh phát vé chờ nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。時間は？」
2205 = "「Vâng. Thời gian?」"
# 【日々姫】
# display as 日日姬
# JP: 「最初のお三組は30分後。\nその次のお一組は、60分後だそうです」
2383 = "「Ba nhóm đầu tiên là 30 phút sau.\nNhóm tiếp theo là 60 phút sau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「かしこまりました」
# 2346 = "「明白了」" 
# monologue
# JP: リニューアルオープン初日ということで用意していた\n整理券。
3324 = "Vé chờ đã được chuẩn bị sẵn cho ngày đầu tiên\nmở cửa trở lại."
# monologue
# JP: 活用できる状況となり、日々姫の声も弾んでいる。
2975 = "Tình hình đã đến mức phải dùng đến vé chờ, giọng Hibiki cũng trở nên phấn khích."
# 【双鉄】
# display as 雙鐵
# JP: 「大繁盛だな。無理はするなよ？」
2446 = "「Khách đông thật đấy. Đừng có cố quá nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 2135 = "「嗯！」" 
# monologue
# JP: ほんの一瞬だけの会話で疲労が吹き飛ぶ。\nごく単純な自分がとても誇らしい。
3303 = "Cuộc trò chuyện chỉ trong chớp mắt đã xua tan đi mệt mỏi.\nTôi thấy rất tự hào về bản thân đơn giản của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「ただいま満席でございます。申し訳ありません。\nよろしければ整理券を発券いたしますが」
2386 = "「Hiện tại quán đã kín chỗ. Thành thật xin lỗi quý khách.\nNếu được, tôi sẽ phát vé chờ cho quý khách.」"
# 【おかあさん】
# display as 媽媽
# JP: 「３０分後だって。どうする？　しょうちゃん」
2515 = "「30 phút sau mới có chỗ. Tính sao đây? Shou-chan.」"
# 【しょうちゃん】
# display as 小正
# JP: 「せきたんたべたいー！」
2273 = "「Con muốn ăn than đá cơ!」"
# 【おかあさん】
# display as 媽媽
# JP: 「そっかぁ。じゃ、\nガマダス号にのってからもどってこようか？」
2558 = "「Vậy à. Thế thì,\nmình đi tàu Gamadas rồi quay lại nhé?」"
# 【しょうちゃん】
# display as 小正
# JP: 「のるー！　もどってくるー！」
2291 = "「Đi tàu! Quay lại!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、こちらの整理券を」
2578 = "「Vậy thì, gửi quý khách vé chờ này.」"
# monologue
# JP: さらに一組。もう一組。\n30分後の整理券は、全ての組が受け取ってくれ――！
3116 = "Thêm một nhóm. Lại một nhóm nữa.\nVé chờ 30 phút sau, tất cả các nhóm đều đã nhận——!"
# 【双鉄】
# display as 雙鐵
# JP: 「おまたせ致しましたお客様。\nただいま、申し訳ないことに満席でございまして」
2554 = "「Đã để quý khách phải đợi.\nHiện tại, thật xin lỗi nhưng quán đã kín chỗ rồi ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「整理券だね。もちろん貰うよ。\nおや、60分後か。どうする、ポーレット？」
2468 = "「Vé chờ nhỉ. Tất nhiên là tôi sẽ lấy rồi.\nÔ, 60 phút sau sao. Tính sao đây, Paulette?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あー、じゃあいったん仕事に戻っちゃう」
2074 = "「A——, vậy thì tôi sẽ quay lại làm việc một lát.」"
# monologue
# JP: ふたりはさすがに、状況をすぐに分かってくれる。
2872 = "Quả nhiên là hai người họ, hiểu ngay tình hình."
# 【稀咲】
# display as 稀咲
# JP: 「わかった。それなら、一時間後に再集合しよう。\n整理券は？　どっちが持っておく？」
2343 = "「Hiểu rồi. Vậy thì, một tiếng nữa tập trung lại nhé.\nVé chờ thì sao? Ai giữ đây?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしが。きっぷケースにいれておけば、\n絶対になくしたりしないから」
2275 = "「Tôi giữ cho. Nếu bỏ vào hộp đựng vé,\nthì chắc chắn sẽ không làm mất đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「オーケー。それは頼もしい」
2606 = "「Okay. Đáng tin cậy đấy.」"
# monologue
# JP: 稀咲がさっ、と、ウィンクを残し立ち去っていく、\n続いてすぐにポーレットも。
3308 = "Kisaki nháy mắt một cái rồi rời đi,\nngay sau đó Paulette cũng vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「またあとで来ます。\n大繁盛、おめでとうございます」
1903 = "「Lát nữa tôi sẽ quay lại.\nChúc mừng quán làm ăn phát đạt nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2518 = "「Cảm ơn cô.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃ――右田さん、お願いします！」
2583 = "「Anh——Anh Migita, nhờ anh nhé!」"
# 【双鉄】
# display as 雙鐵
# JP: 「かしこまりました」
# 2346 = "「明白了」" 
# monologue
# JP: 料理を受取り、客席へと。\nトレーの上が多くなれば、足取りもやはり慎重になる。
3088 = "Nhận món ăn, tiến về phía bàn khách.\nTrên khay càng nhiều đồ, bước chân càng phải thận trọng hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「おまたせいたしました」
# 2520 = "「讓您久等了」" 
# monologue
# JP: パネル展示、テーブル展示のおかげだろう。\n遅いという苦情は聞かれない。
2924 = "Có lẽ nhờ vào triển lãm bảng và triển lãm trên bàn.\nMà không hề nghe thấy lời phàn nàn nào về việc lên món chậm."
# monologue
# JP: が、回転もその分、低下している。
2809 = "Nhưng vòng quay bàn cũng vì thế mà giảm xuống."
# monologue
# JP: （それに……知り合いのお母さん同士の合流、\nという形の相席がかなり多い）
3541 = "(Hơn nữa……có khá nhiều trường hợp ghép bàn\ndo các bà mẹ quen biết nhau hội quân lại.)"
# monologue
# JP: 先に一組が入店していて、あとから別組が入ってくる。
2874 = "Một nhóm vào quán trước, sau đó một nhóm khác mới vào."
# monologue
# JP: 出ていくのは同時となるので滞留時間は長くなり、\n順番待ちのお客さんたちには、ご負担がかかる。
2918 = "Nhưng vì ra về cùng lúc nên thời gian lưu lại quán sẽ dài hơn,\ngây áp lực cho những khách hàng đang xếp hàng chờ."
# monologue
# JP: （席待ち中のストレスを少しでも減らせるように、\nなにか、ここも工夫をしておきたいところだな）
3534 = "(Để giảm bớt phần nào căng thẳng trong lúc chờ bàn,\ncũng cần phải nghĩ ra cách gì đó ở đây.)"
# 【ご婦人】
# display as 婦人
# JP: 「すいません、追加で」
1971 = "「Xin lỗi, cho tôi gọi thêm món.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、ただいま」
2380 = "「Vâng, tôi đến ngay.」"
# monologue
# JP: だから、急ぐ。
3099 = "Vì vậy, phải nhanh lên."
# monologue
# JP: 決して焦ることなしに、断じて急かすことなしに、\n少しでも回転を早めるために。
3261 = "Tuyệt đối không được vội vã, dứt khoát không được hối thúc,\nđể đẩy nhanh vòng quay bàn dù chỉ một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「お会計ですね、少々お待ちください」
2505 = "「Quý khách muốn thanh toán ạ, xin đợi một lát.」"
# monologue
# JP: それでも、タスクの増加に負ける。
2916 = "Dù vậy, tôi vẫn bị đánh bại bởi sự gia tăng nhiệm vụ."
# monologue
# JP: やるべきことが積み重ねれば、\n気持ちの制御が難しくなる。
3354 = "Những việc cần làm cứ chất đống lên,\nviệc kiểm soát cảm xúc cũng trở nên khó khăn hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「お冷、かしこまりました。すぐにお持ちいたします」
2503 = "「Nước lạnh, đã rõ ạ. Tôi sẽ mang ra ngay.」"
# monologue
# JP: ……ピークタイムは、ここまで忙しいものか。
1484 = "……Thời gian cao điểm, lại bận rộn đến mức này sao."
# monologue
# JP: プロがいるため、厨房は回せているようだが、\nこのまま行くと、フロアが崩壊しかねない――
3006 = "Nhờ có chuyên gia nên nhà bếp có vẻ vẫn xoay xở được,\nnhưng nếu cứ thế này, khu vực phục vụ có thể sẽ sụp đổ mất——"
# monologue
# JP: （どんっ）
3535 = "(Bịch)"
# 【双鉄】
# display as 雙鐵
# JP: 「おわっ！？　っ――あ。すみません」
2038 = "「Oái!? ——A. Xin lỗi.」"
# 【永山】
# display as ？？？
# JP: 「失格よ～？　お客様にぶつかるなんて、\n下の下の下の下。[ゲゲゲ,2]下下下の[ゲ]下だわ」
1909 = "「Mất tư cách rồi nha~? Va phải khách hàng thế này,\ntệ của tệ của tệ của tệ. Tệ của tệ của tệ của tệ đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「永山さん」
2409 = "「Cô Nagayama.」"
# monologue
# JP: 顔を見るだけで気が楽になる。\n食堂車勤務の大先輩――ああ、ではなく！
2859 = "Chỉ cần nhìn thấy khuôn mặt đó là tôi thấy nhẹ nhõm.\nĐại tiền bối làm việc trên toa ăn——a, không phải!"
# 【双鉄】
# display as 雙鐵
# JP: 「失礼いたしました。お客様」
2222 = "「Thật thất lễ. Thưa quý khách.」"
# 【永山】
# display as 永山
# JP: 「ううん、助っ人。\nここからがキツイところだし」
1905 = "「Không đâu, là người đến giúp.\nTừ giờ trở đi mới là lúc gay go mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「え！？　いや、今は確かに大賑わいですが、\nここからはおそらく、空いてくるかと」
2053 = "「Hả!? Không, bây giờ đúng là đang rất đông,\nnhưng có lẽ từ giờ trở đi sẽ vắng bớt.」"
# monologue
# JP: 時間は、既に一時に近い。
3225 = "Đã gần một giờ rồi."
# monologue
# JP: ３０分の整理券だったお客さんたちも着席し、\n空席も、この感じなら――ああ、いま丁度。
3112 = "Những vị khách có vé chờ 30 phút cũng đã ngồi vào bàn,\nvà ghế trống, với tình hình này thì——a, vừa vặn lúc này."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん。また来ちゃいました。\nちょっと早すぎましたか？」
2598 = "「Anh Soutetsu. Chúng tôi lại đến rồi.\nCó hơi sớm quá không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いえ、空席が出たところですので」
1922 = "「Không đâu, vừa có bàn trống rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「おや、永山夫人。\n助かります。ありがとうございます」
2044 = "「Ô, phu nhân Nagayama.\nGiúp được nhiều lắm. Cảm ơn phu nhân.」"
# 【永山】
# display as 永山
# JP: 「ううん、呼んでくれてありがと。\n理解してないみたいだから、このままじゃ危なかった」
2060 = "「Không có gì, cảm ơn vì đã gọi tôi.\nCó vẻ cậu ấy vẫn chưa hiểu tình hình, cứ thế này thì nguy hiểm lắm.」"
# monologue
# JP: ならば、稀咲が夫人を助っ人に呼んでくれていたのか。\nしかし――
3428 = "Ra vậy, Kisaki đã gọi phu nhân đến giúp sao.\nNhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「理解、とは何を」
2434 = "「Chưa hiểu, là hiểu cái gì cơ.」"
# 【永山】
# display as 永山
# JP: 「質問の前に――やることない？」
2178 = "「Trước khi đặt câu hỏi——cậu không có việc gì để làm sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！　――失礼しました。お席へ御案内いたします」
2089 = "「! ——Thất lễ rồi. Tôi sẽ hướng dẫn hai vị đến bàn.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふ、なかなか板についてるね」
2023 = "「Fufu, khá là ra dáng đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ほんと！　いつもと違ったかっこよさ」
2452 = "「Thật sự! Một vẻ ngầu rất khác so với bình thường.」"
# monologue
# JP: ふたりを席へと案内し、オーダーを取り、\n厨房へと通す――と。
3064 = "Dẫn hai người đến bàn, nhận order,\nvà chuyển vào bếp——thì."
# 【永山】
# display as 永山
# JP: 「失礼します。ご注文の品をお持ちしました」
2312 = "「Xin phép ạ. Tôi mang món quý khách đã gọi đến rồi đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
# 2172 = "「噢噢」" 
# monologue
# JP: エプロンを着けた永山夫人が、給仕している。
3319 = "Phu nhân Nagayama mặc tạp dề, đang phục vụ thức ăn."
# monologue
# JP: 動きを眺めるそれだけで、\n多くが、頭に飛び込んでくる。
2912 = "Chỉ cần nhìn những chuyển động đó thôi,\nđã có rất nhiều điều in vào tâm trí tôi."
# monologue
# JP: （なるほど――なるほど――そうなのか）
3532 = "(Ra là vậy——Ra là vậy——Thì ra là thế.)"
# monologue
# JP: 失礼しますの声掛けで、お客様の注意をひきつけ、\nテーブルに皿を並べるときの事故を防止している。
3406 = "Bằng câu nói xin phép, cô thu hút sự chú ý của khách hàng,\nngăn ngừa tai nạn khi bày đĩa lên bàn."
# 【永山】
# display as 永山
# JP: 「こちら、おさげ致します」
2561 = "「Tôi xin phép dọn dĩa này ạ.」"
# monologue
# JP: 空いた食器をすぐさげるのも、事故防止になる。\nトレーは五本の指先で持ち――
3322 = "Dọn ngay những chén dĩa trống cũng là một cách phòng ngừa tai nạn.\nKhay được giữ bằng năm đầu ngón tay——"
# 【男の子】
# display as 男生
# JP: 「わーい」
# 2029 = "「哇」" 
# monologue
# JP: （すっ）
3506 = "(Vút)"
# 【双鉄】
# display as 雙鐵
# JP: 「おおお」
2173 = "「Ồ ồ.」"
# monologue
# JP: 体を躱したその瞬間にも、トレーの上は平行だ。\nすぐに戻った姿勢から、周りを広く見渡している。
2930 = "Ngay cả khoảnh khắc né người, khay vẫn giữ được thăng bằng.\nNgay khi trở lại tư thế cũ, cô ấy đã đưa mắt nhìn bao quát xung quanh."
# 【双鉄】
# display as 雙鐵
# JP: 「……足も、すり足に近い運びだ。\n列車がどのように揺れてもあれなら、対応できよう」
1510 = "「……Bước chân cũng gần giống như đi lướt.\nNhư thế thì dù tàu có lắc lư thế nào cũng ứng phó được.」"
# monologue
# JP: 手本があるなら、すぐ真似る。
3229 = "Có hình mẫu thì phải bắt chước ngay."
# monologue
# JP: 真似てみたなら、永山さんの動作の全てが、\nどれほどに理にかなっているか、体でわかる。
2987 = "Khi thử làm theo, cơ thể tôi mới hiểu được\nmọi động tác của cô Nagayama hợp lý đến mức nào."
# 【双鉄】
# display as 雙鐵
# JP: 「いらっしゃいませ」
2397 = "「Kính chào quý khách.」"
# monologue
# JP: おかげで、どんどんと増えるお客様にも、\nさきほどよりも余裕をもって――――
3366 = "Nhờ vậy, dù khách hàng ngày càng đông,\ntôi cũng đã có thể ứng phó thong thả hơn lúc nãy――――"
# monologue
# JP: （ん？）
3513 = "(Hửm?)"
# monologue
# JP: 違和感を覚え時計を見れば、午後の三時を過ぎている。
3029 = "Cảm thấy có gì đó không ổn, tôi nhìn đồng hồ, đã quá ba giờ chiều."
# monologue
# JP: だというのに、ピークタイムが終わるどころか――
2920 = "Thế mà, thời gian cao điểm không những chưa kết thúc——"
# 【児童a】
# display as 兒童a
# JP: 「ようちぶたのしかったー」
2177 = "「Trường mẫu giáo vui lắm~」"
# 【児童b】
# display as 兒童b
# JP: 「ばあちゃん、ぼくのおえかきどことー？」
2201 = "「Bà ơi, bức tranh của cháu đâu rồi~?」"
# 【おばあちゃん】
# display as 老奶奶
# JP: 「さぁて、どこかねぇ？\nいっしょに探してごらんなさいな」
2003 = "「Nào, ở đâu nhỉ?\nCùng nhau tìm thử xem sao.」"
# 【児童a】
# display as 兒童
# JP: 「はーい！」
2211 = "「Dạ~!」"
# monologue
# JP: （……そうか、幼稚部――学園が終わる時間か）
3461 = "(……Ra vậy, bộ phận mẫu giáo——giờ tan học sao.)"
# monologue
# JP: 通学路線の、始発駅近く。\n立地条件は、最高だ。
3414 = "Gần ga khởi hành của tuyến đường đi học.\nĐiều kiện vị trí, thật tuyệt vời."
# monologue
# JP: この先どんどん時間差で、\n各部ごとの学園生たちが、来店をしてくるのだろう。
3113 = "Từ giờ trở đi, với sự chênh lệch thời gian,\nhọc sinh các cấp sẽ lần lượt đến quán."
# monologue
# JP: （稀咲はこれを理解していて、\nだから、永山夫人を助っ人に呼んでくれたのか）
3539 = "(Kisaki đã hiểu được điều này,\nnên mới gọi phu nhân Nagayama đến giúp sao.)"
# 【双鉄】
# display as 雙鐵
# JP: 「おまたせいたしました。三名様ですか？」
2519 = "「Đã để quý khách phải đợi. Ba người phải không ạ?」"
# monologue
# JP: ならば、学ぼう。この機会から、学べる限りを。\nそうして見よう、たくさんを。
3427 = "Nếu vậy, hãy học hỏi. Học được bao nhiêu hay bấy nhiêu từ cơ hội này.\nVà hãy quan sát thật nhiều."
# monologue
# JP: その一片が、日々姫の瞳が見落とすものを、\n補えるかもしれんのだから。
2944 = "Bởi vì những mảnh ghép đó,\ncó thể sẽ bù đắp được những gì đôi mắt Hibiki bỏ sót."
# 【日々姫】
# display as 日日姬
# JP: 「うんうん、それで――\n稀咲先輩とポーレットさんのオーダーは？」
2134 = "「Ừm ừm, vậy——\nTiền bối Kisaki và chị Paulette gọi món gì?」"
# monologue
# JP: （ごろんっ）
3544 = "(Nằm phịch xuống)"
# monologue
# JP: 敷いた布団に寝転んで、日々姫が無邪気に聞いてくる。\n過酷なまでに忙しかった今日一日の締めくくり。
3211 = "Nằm lăn ra tấm nệm đã trải sẵn, Hibiki ngây thơ hỏi.\nKết thúc một ngày bận rộn đến mức khắc nghiệt."
# monologue
# JP: 思いっきりにゆるんでほしくて、\n日々姫の隣に僕ももぐって、頭を撫でる。
3062 = "Muốn con bé được thả lỏng hết mức,\ntôi cũng chui vào cạnh Hibiki và xoa đầu con bé."
# 【日々姫】
# display as 日日姬
# JP: 「えへへ～」
2170 = "「Ehehe~」"
# 【双鉄】
# display as 雙鐵
# JP: 「洋風ハチクマとお絵描きパンケーキ。\nそれに[れいな,4]キハ07sプリンとマカロンだったな」
2495 = "「Cơm Hachikuma kiểu Tây và bánh pancake vẽ tranh.\nThêm cả pudding KiHa 07S và bánh macaron nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！\nドリンクばアイスレモンティーとアイスラテの！」
2092 = "「A!\nĐồ uống là trà chanh đá và latte đá!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのオーダーだ」
2241 = "「Chính là order đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああん！　あと30分遅く来てくれてたら\n一緒にお茶ばできたとにー！」
2049 = "「Aan! Giá mà họ đến muộn hơn 30 phút\nthì đã có thể cùng nhau uống trà rồi!」"
# monologue
# JP: 足をじたばた。\n行儀は悪いが、かわいらしい。
2971 = "Hai chân vung vẩy.\nDù không được lịch sự cho lắm, nhưng lại rất đáng yêu."
# 【双鉄】
# display as 雙鐵
# JP: 「残念だったが、食堂列車のことだけを考えるなら、\n一緒でない方がよかったのではないか？」
2597 = "「Tuy đáng tiếc, nhưng nếu chỉ nghĩ đến chuyện chuyến tàu ăn uống,\nthì không đi cùng nhau lại tốt hơn chứ nhỉ?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2076 = "「啊」" 
# monologue
# JP: いえばすぐ、日々姫は理解してくれる。
2801 = "Vừa nói xong, Hibiki liền hiểu ngay."
# 【日々姫】
# display as 日日姬
# JP: 「うん。そしたら私、稀咲先輩とポーレットさんと、\nお話とお食事するのに夢中になって、見逃した」
2116 = "「Vâng. Nếu vậy thì em sẽ chỉ mải mê trò chuyện và ăn uống\ncùng tiền bối Kisaki và chị Paulette, rồi sẽ bỏ sót mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ならば――」
2129 = "「Ừ. Nếu vậy thì——」"
# monologue
# JP: ピークタイムのヤマを超え、永山夫人が厨房に入り、\n日々姫が一人、客席に座ったあの時間帯に――
3120 = "Vượt qua đỉnh điểm của giờ cao điểm, phu nhân Nagayama vào bếp,\nvà Hibiki ngồi một mình ở khu vực ghế khách trong khoảng thời gian đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「見えたのか？　何か役に立つものが」
1975 = "「Em đã nhìn thấy sao? Thứ gì đó có ích ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「役に立つっていうか――\n一番基本で、一番忘れちゃいやすいもの、見直せた」
1934 = "「Nói là có ích thì cũng không hẳn——\nEm đã nhìn nhận lại được điều cơ bản nhất, và cũng dễ bị lãng quên nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　なんだそれは」
2167 = "「Hửm? Đó là gì vậy?」"
# 【日々姫】
# display as 日日姬
# JP: 「ふふっ」
# 2018 = "「呵呵」" 
# monologue
# JP: あどけなさと、おんならしさと、いたずらっぽさ。\nそれらが綺麗に混じる笑いに、日々姫を感じる。
3185 = "Sự ngây thơ, nét nữ tính và vẻ tinh nghịch.\nTất cả hòa quyện tuyệt đẹp trong nụ cười, mang đậm chất Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「ね？　にぃに、こっちきて？\nわたしと、お顔近づけて？」
2295 = "「Này? Anh hai, lại đây đi?\nGhé sát mặt vào em đi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。これでいいか？」
2125 = "「Ừ. Thế này được chưa?」"
# 【日々姫】
# display as 日日姬
# JP: 「まだだめ。もーっと。ね？　そうしたら、\n私のこと、いいこいいこって、たぁくさんして？」
2567 = "「Vẫn chưa được. Gần hơnnn nữa. Nhé? Xong rồi,\nxoa đầu khen em là bé ngoan, thật nhiềùu vào nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おやすい御用だ。いいこ、いいこ、いいこ、いいこ。\n日々姫はいいこ。可愛いかわいい、とてもいいこだ」
2237 = "「Chuyện nhỏ thôi. Bé ngoan, bé ngoan, bé ngoan, bé ngoan.\nHibiki là bé ngoan. Bé ngoan vô cùng đáng yêu.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへっ――えへ――えへへへへ～」
2171 = "「Ehe——ehe——ehehehehe~」"
# monologue
# JP: とてもたやすく、日々姫の顔が笑みにくずれる。\nただただ、可愛い。
3091 = "Khuôn mặt Hibiki dễ dàng vỡ òa trong nụ cười.\nChỉ có thể nói là, rất đáng yêu."
# monologue
# JP: もっと満たしてやりたくなる。\nもっと、甘やかしてやりたくなる。
3066 = "Tôi muốn làm con bé thỏa mãn hơn nữa.\nMuốn nuông chiều con bé nhiều hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の日々姫は最高だ。いつでも一生懸命で、\n世界で一番素敵な絵をかく、最高にいいこだ」
2288 = "「Hibiki của anh là tuyệt nhất. Lúc nào cũng cố gắng hết mình,\nvẽ ra những bức tranh tuyệt vời nhất thế giới, là một bé ngoan tuyệt vời nhất.」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん？　最高にいいこは、にぃに」
1912 = "「Hông phải đâu? Bé ngoan tuyệt vời nhất là anh hai cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2604 = "「!」"
# monologue
# JP: 日々姫の腕が伸びてくる。
3186 = "Vòng tay Hibiki vươn tới."
# monologue
# JP: いいこいいこと、僕の頬を耳の後ろを、\n額を、髪を、撫でさする。
2955 = "Vừa cưng nựng, con bé vừa xoa nắn má, sau tai,\ntrán và cả mái tóc của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにはいいこ。がんばりやさん。\nなんでもすぐに勉強できちゃう、かしこい、いいこ」
2590 = "「Anh hai là bé ngoan. Rất nỗ lực.\nCái gì cũng học được ngay, một bé ngoan rất thông minh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2328 = "「Hibiki.」"
# monologue
# JP: 大事にされてる。尊敬されてる――愛されている。\n感覚として、日々姫がいつも与え続けてくれるもの。
3182 = "Được trân trọng. Được kính trọng——được yêu thương.\nĐó là cảm giác mà Hibiki vẫn luôn mang đến cho tôi."
# monologue
# JP: けれどもこうして言葉にされると、\n幸福感が、心で体で膨れ上がって、いっぱいになる。
3267 = "Thế nhưng khi được thốt thành lời như thế này,\ncảm giác hạnh phúc trào dâng trong cả trái tim và cơ thể, lấp đầy mọi khoảng trống."
# 【日々姫】
# display as 日日姬
# JP: 「あのね？　にぃに？」
2479 = "「Này nhé? Anh hai?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、日々姫」
1948 = "「Sao vậy, Hibiki.」"
# monologue
# JP: だから僕も、いいこいいこをし続ける。\nこの幸福をいくらでも、日々姫に感じて欲しいから。
3097 = "Vì thế tôi cũng tiếp tục xoa đầu con bé.\nBởi vì tôi muốn Hibiki cảm nhận được niềm hạnh phúc này bao nhiêu cũng được."
# 【日々姫】
# display as 日日姬
# JP: 「見直せたのは、今見てるもの。\nにぃにも、私も、それぞれの目に映してるもの」
2299 = "「Thứ em nhìn nhận lại được, chính là những gì em đang thấy bây giờ.\nNhững thứ phản chiếu trong mắt anh hai, và cả trong mắt em nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕と日々姫が、それぞれ見てる？」
2348 = "「Những thứ phản chiếu trong mắt anh và Hibiki sao?」"
# monologue
# JP: なんだろう。\n今僕が見ているものなら、もちろん日々姫だ。
3313 = "Là gì nhỉ.\nNếu là thứ tôi đang nhìn thấy lúc này, thì tất nhiên là Hibiki rồi."
# monologue
# JP: 話す間も休めぬこの手を動かす度に、\nくすぐったそうに幸せそうに笑み崩れる――
3179 = "Mỗi lần bàn tay không ngừng nghỉ này khẽ vuốt ve trong lúc trò chuyện,\ncon bé lại cười rạng rỡ, trông vừa buồn buồn buồn buồn vừa hạnh phúc——"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2130 = "「嗯」" 
# monologue
# JP: わかる。\n僕もおんなじだから。
3069 = "Tôi hiểu.\nBởi vì tôi cũng giống như vậy."
# monologue
# JP: 日々姫の指にくすぐられるたび、\nそれが溢れて、とまらないから。
3240 = "Mỗi lần bị những ngón tay của Hibiki cù lét,\ncảm xúc ấy lại trào dâng, không thể nào dừng lại được."
# 【双鉄】
# display as 雙鐵
# JP: 「しあわせ、か」
1973 = "「Hạnh phúc, sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。しあわせ。おいしい。うれしい。たのしい。\nいとしい。えがお。ぬくもり。やさしさ――つながり」
2112 = "「Vâng. Hạnh phúc. Ngon miệng. Vui vẻ. Thú vị.\nYêu thương. Nụ cười. Hơi ấm. Dịu dàng——Sự gắn kết.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2130 = "「嗯」" 
# monologue
# JP: 日々姫の指の動きが止まる。\n求められていることはそのまま、僕の望みだ。
3200 = "Chuyển động ngón tay của Hibiki dừng lại.\nĐiều con bé mong mỏi cũng chính là ước muốn của tôi."
# monologue
# JP: 日々姫の指と指を絡めて、\n恋人繋ぎに重ね合わせて――そのまま顔を寄せていく。
3044 = "Đan những ngón tay vào tay Hibiki,\nchúng tôi nắm lấy nhau kiểu tình nhân——và cứ thế tiến sát mặt lại gần."
# 【日々姫】
# display as 日日姬
# JP: 「んっ――」
# 2130 = "「嗯」" 
# monologue
# JP: 軽い、キス。\n唇を重ねあわせるだけの。
3389 = "Một nụ hôn, thật nhẹ.\nChỉ đơn thuần là chạm môi vào nhau."
# monologue
# JP: それでも多くが――言葉にできない、とても多くが、\n日々姫から伝わってきたような気になれる。
2808 = "Dù vậy, tôi có cảm giác như vô vàn điều——không thể nói thành lời, rất rất nhiều điều,\nđã được truyền đạt từ Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「ね？　見ゆるや？　にぃにぃにも、\nわたしがどーんなにしあわせか」
2585 = "「Này? Anh thấy chứ? Cả anh hai nữa,\nthấy được em đang hạnh phúc đến nhường nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……」
1499 = "「……」"
# monologue
# JP: 日々姫の瞳に、僕が映ってる。\n僕の瞳には、ゆえに、日々姫が。
3201 = "Trong đôi mắt Hibiki, có hình bóng của tôi.\nVà trong mắt tôi, dĩ nhiên, là Hibiki."
# monologue
# JP: そうして、不意に理解する。\nいつかほのかに感じた問いの、その解を。
3408 = "Và rồi, tôi bất chợt nhận ra.\nLời giải cho câu hỏi mà tôi từng lờ mờ cảm nhận được ngày nào."
# monologue
# JP: （ああ、そうか――僕の瞳は――）
3512 = "(À, ra vậy——đôi mắt của tôi——)"
# monologue
# JP: 僕の瞳は、日々姫の素敵を誰より鮮やかに捉える瞳。
3086 = "Đôi mắt của tôi, là đôi mắt nắm bắt được sự tuyệt vời của Hibiki sống động hơn bất kỳ ai."
# monologue
# JP: だからこそ――\n僕は、日々姫に恋をしている。
3236 = "Chính vì thế——\nTôi mới yêu Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「いく前よりもしあわせになるため、カフェにいく。\n食堂列車で旅をするのも、根っこでは絶対おんなじ」
1942 = "「Đến quán cà phê là để được hạnh phúc hơn trước khi đi.\nChuyến du lịch bằng tàu ăn uống, về căn bản cũng hoàn toàn giống như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな。ただ、幸せになるために。\n美味しい食事も、安全も、そのための要素にすぎない」
2155 = "「Ừ. Đúng vậy. Chỉ là để được hạnh phúc.\nCả bữa ăn ngon, hay sự an toàn, cũng chỉ là yếu tố cho điều đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2130 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「全てが等しく最重要で、必ず満たすべき要素だが\n――それらは決して、お客様の目的そのものではない」
2596 = "「Tất cả đều quan trọng như nhau, là những yếu tố bắt buộc phải thỏa mãn\n——nhưng chúng tuyệt đối không phải là mục đích của khách hàng.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。私もそう思う」
2121 = "「Vâng. Em cũng nghĩ vậy.」"
# monologue
# JP: 安全が一番欲しいなら、旅に出ていく必要はない。
2978 = "Nếu chỉ cần sự an toàn nhất, thì chẳng cần phải đi du lịch làm gì."
# monologue
# JP: 食事を何より楽しみたいなら、\nレストランへと運ぶだろう。
2976 = "Nếu muốn thưởng thức bữa ăn hơn bất cứ thứ gì,\nthì người ta đã đến nhà hàng rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのだな」
# 2363 = "「是啊」" 
# monologue
# JP: 手段が、目的になっていた。\n使い良く安全な厨房が、何故必要とされるのか――
3040 = "Phương tiện, đã trở thành mục đích.\nTại sao lại cần một nhà bếp an toàn và dễ sử dụng——"
# monologue
# JP: その根本を、僕も日々姫も、\nいつの間にすっかり見失ってた。
3053 = "Cái gốc rễ đó, cả tôi và Hibiki,\nđã hoàn toàn đánh mất từ lúc nào không hay."
# 【日々姫】
# display as 日日姬
# JP: 「だから、聞かせて？　私に見せて？\nにぃにが今日、見つけた全部のしあわせを」
2305 = "「Vậy nên, hãy kể cho em nghe đi? Cho em thấy đi?\nTất cả những hạnh phúc mà hôm nay anh hai đã tìm thấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、何度だって聞かせよう」
2163 = "「Ừ, anh sẽ kể cho em nghe bao nhiêu lần cũng được.」"
# monologue
# JP: ハチロク、れいな。凪、ふかみ。\nポーレットに稀咲。永山夫人。
2877 = "Hachiroku, Reina. Nagi, Fukami.\nPaulette và Kisaki. Phu nhân Nagayama."
# monologue
# JP: そうして、たくさんのお客さんたち。\n――話せばにっこり、日々姫は笑う。
2839 = "Và rồi, rất nhiều khách hàng nữa.\n——Mỗi khi kể đến, Hibiki lại mỉm cười rạng rỡ."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃは、どう？\nなにかあった？　にぃにぃ自身のしあわせなこと」
2581 = "「Còn anh hai thì sao?\nCó chuyện gì không? Chuyện hạnh phúc của chính anh hai ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あったとも」
2444 = "「Có chứ.」"
# monologue
# JP: 厨房とフロア、離れ離れで。\nオーダーを通す相手も、山崎さんで。
3005 = "Nhà bếp và khu vực phục vụ cách xa nhau.\nNgười truyền order cũng là cô Yamazaki."
# monologue
# JP: だからこそ、ときどきの、ほんの一瞬の触れ合いが、\nほんの一言のやりとりが、ただ嬉しくて。
3237 = "Chính vì vậy, đôi khi, chỉ một cái chạm khẽ trong chốc lát,\nhay chỉ một câu trao đổi ngắn ngủi, cũng đủ khiến tôi thấy vui."
# 【双鉄】
# display as 雙鐵
# JP: 「それから、日々姫がスタッフを離れ、\nお客さんになったときもだ」
2568 = "「Hơn nữa, là khi Hibiki rời khỏi vị trí nhân viên,\nvà trở thành một vị khách.」"
# monologue
# JP: 永山夫人を見習って、\n少しはマシになった姿を、日々姫に見てもらえたこと。
3207 = "Được Hibiki nhìn thấy bộ dạng có phần khá khẩm hơn của tôi\nsau khi học hỏi phu nhân Nagayama."
# monologue
# JP: 日々姫が嬉しげに誇らしげに注ぎ続けてくれた視線を、\n背中でも、はっきり感じられたこと。
3056 = "Dù chỉ là bóng lưng, tôi vẫn cảm nhận rõ ràng\nánh mắt đầy vui sướng và tự hào mà Hibiki không ngừng hướng về phía mình."
# 【双鉄】
# display as 雙鐵
# JP: 「……仕事中さえ、普段はふたり、べったりだからな。\n一緒にいられることの嬉しさを、見失いかけていたが」
1525 = "「……Ngay cả trong lúc làm việc, bình thường hai đứa vẫn luôn dính lấy nhau mà.\nAnh suýt nữa đã đánh mất đi niềm vui khi được ở bên cạnh em.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2076 = "「啊」" 
# monologue
# JP: おでこをこつんとくっつける。\n一番近くで、日々姫の甘い匂いを楽しむ。
3072 = "Tôi cụng trán mình vào trán con bé.\nTận hưởng mùi hương ngọt ngào của Hibiki ở cự ly gần nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は日々姫といっしょにいるのが、しあわせだ。\nそれをあらためて強く感じて――とても嬉しい」
2232 = "「Được ở bên cạnh Hibiki, anh rất hạnh phúc.\nMột lần nữa cảm nhận được điều đó một cách mạnh mẽ——anh thực sự rất vui.」"
# 【日々姫】
# display as 日日姬
# JP: 「わたしも、おんなじ――（ちゅっ）」
2268 = "「Em cũng, giống vậy——(Chụt)」"
# monologue
# JP: 今度のキスは、日々姫から。\nごくごく軽く――小鳥が、しあわせをついばむように。
3411 = "Lần này là nụ hôn từ Hibiki.\nThật khẽ khàng——như một chú chim nhỏ đang rỉa lấy niềm hạnh phúc."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにが好きって、何度も思った。\n一緒にいられてしあわせだって、おなかで感じた」
2262 = "「Đã không biết bao nhiêu lần em nghĩ rằng em yêu anh hai.\nCảm giác hạnh phúc khi được ở bên nhau lan tỏa từ tận trong bụng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。体の底で感じた」
2267 = "「Anh cũng vậy. Anh cảm nhận được từ tận sâu trong cơ thể.」"
# 【日々姫】
# display as 日日姬
# JP: 「だけどね？　にぃに」
1919 = "「Nhưng mà này? Anh hai.」"
# monologue
# JP: （きゅうっ）
3526 = "(Nắm chặt)"
# monologue
# JP: 日々姫が指にちからをこめる。\nお互いの肌が湿り気を増し、溶け合っていく。
3198 = "Hibiki dồn lực vào những ngón tay.\nDa thịt của cả hai thêm phần ẩm ướt, hòa quyện vào nhau."
# monologue
# JP: 握り返せば、熱を感じる。\n日々姫の声が、密やかになる。
3082 = "Nắm chặt lại, tôi cảm nhận được hơi nóng.\nGiọng của Hibiki trở nên thầm kín."
# 【日々姫】
# display as 日日姬
# JP: 「ほんの[ひとかけ,1]一片だけ、足りなかと。\nしあわせが――私自身の、しあわせが」
2246 = "「Chỉ còn thiếu đúng một mảnh ghép nữa thôi.\nHạnh phúc——hạnh phúc của chính bản thân em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2130 = "「嗯」" 
# monologue
# JP: 小さなころから今までずっと、\n日々姫が一番待ち望んでいる、その人が。
3007 = "Từ thuở ấu thơ cho đến tận bây giờ,\nngười mà Hibiki luôn mong chờ nhất."
# monologue
# JP: 今日もやっぱり来店をしてくれなかった。\nおそらくは、変わらず“過保護”であるがゆえ。
2824 = "Hôm nay quả nhiên người đó vẫn không đến quán.\nCó lẽ là do sự \"bảo bọc quá mức\" không hề thay đổi."
# monologue
# JP: （ああ――だからなのだな）
3510 = "(À——ra là vì thế.)"
# monologue
# JP: 真闇姉が来ても危なくない。動じたりしない。\nそれを形に示すため、日々姫は努力を重ねている。
2994 = "Dù chị Mayami có đến cũng không sao. Sẽ không hề bối rối.\nĐể thể hiện điều đó bằng hành động, Hibiki đang không ngừng nỗ lực."
# monologue
# JP: 思春期のころにしていたような、背伸びではなく。\n今の自分を育てることで、少しずつでも、大人になろうと。
2957 = "Không phải là cố rướn người lên như hồi dậy thì.\nMà là nuôi dưỡng bản thân hiện tại, để dần trở thành người lớn."
# 【双鉄】
# display as 雙鐵
# JP: 「そのひとかけは、必ず日々姫を待ってくれてる。\nゆえに僕らは焦らずに、今いく[みち]路をいけばいい」
2572 = "「Mảnh ghép đó chắc chắn đang đợi Hibiki.\nVì vậy chúng ta không cần vội vàng, cứ bước đi trên con đường hiện tại là được.」"
# 【日々姫】
# display as 日日姬
# JP: 「――うん」
1486 = "「——Vâng.」"
# monologue
# JP: 必ずできる。\nそうしたい。
2799 = "Chắc chắn sẽ làm được.\nTôi muốn như vậy."
# monologue
# JP: こころの底から湧き出る願いを、\nもうこれ以上、言葉にはせず。
3000 = "Những nguyện vọng tuôn trào từ tận đáy lòng,\nkhông cần phải thốt thành lời thêm nữa."
# 【日々姫】
# display as 日日姬
# JP: 「ん――」
# 2130 = "「嗯」" 
# monologue
# JP: ただ重ね合う唇で。\n僕と日々姫は、伝えあう。
2845 = "Chỉ bằng đôi môi chạm nhau.\nTôi và Hibiki, truyền đạt cho nhau."
