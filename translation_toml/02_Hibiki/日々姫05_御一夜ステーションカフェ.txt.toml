2371 = "「是啊，隈河漂流的發船點也是站台啊。真希望我們也能搞一些照片和圖畫的募集展示～（偷瞄）」" 

# monologue
# JP: ……凪にはときどき驚かされる。\n駅は、驛。
1460 = "……凪還真是偶爾能給人帶來點驚喜呢。站台即是驛站。" 

# monologue
# JP: 旅する者が馬をつないで、足を止め、\nひととき休み、集う場所。
3430 = "那是旅人栓上馬匹，停下腳步休息片刻的聚集地。" 

# monologue
# JP: （公募して、人気投票で選ばれた名前――）
3500 = "（公開徵集並且通過人氣投票選出的名字……）" 

# monologue
# JP: 『御一夜ステーションカフェ』\n御一夜の、驛たる、茶店。
3223 = "是“御一夜站咖啡廳”，也就是御一夜的驛站茶館。" 

# monologue
# JP: それこそまさにこの場を、ふさわしく表す名であるのだと、\nあらためて教わったような気になる。
3046 = "我再度感受到，這就是這個地方最最貼切的名字。" 

# 【双鉄】
# display as 雙鐵
