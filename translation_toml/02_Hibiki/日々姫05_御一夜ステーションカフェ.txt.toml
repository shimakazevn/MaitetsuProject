2152 = "「嗯，是啊。不光是空間，電力方面也必須斤斤計較才行」" 

# monologue
# JP: \x%l種車;#00ffc040;種車%l;#;の\x%lディーゼル気動車;#00ffc040;ディーゼル気動車%l;#;の確保だけでも精一杯。\n連結できる電源車など、どう探しても見つからない。
2854 = "光是找來幾節\\x%lディーゼル気動車;#00ffc040;柴油動車%l;#;當\\x%l種車;#00ffc040;原車%l;#;就已經很費勁了。還想找到能夠掛接動車的電源車，那是根本不可能的。" 

# monologue
