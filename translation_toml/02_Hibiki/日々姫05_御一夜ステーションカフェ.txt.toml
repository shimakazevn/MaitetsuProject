# 【日々姫】
# display as 日日姬
# JP: 「まっことねー」
2363 = "「是啊」" 

# monologue
# JP: みんなで出したメニュー案。\n山崎さんは、わずか三日で全てをレシピ化してくれた。
2998 = "山崎小姐只用了短短三天，就把大家想出來的菜品全部做成了菜譜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その上、言うことも理に叶っている。\n『キッチンは、使うことでしか覚えられない』か」
2475 = "「而且她說的話也很有道理。“想用好一個廚房就必須親身實踐”」" 

# 【日々姫】
# display as 日日姬
# JP: 「言われてみたらそのとーりやけん。\nメニュー、少しずつでも覚えていかんと」
1955 = "「仔細想想確實是這麼個道理。得趕緊把菜單背起來了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2130 = "「嗯」" 

# monologue
# JP: そのために、深夜のキッチンを借りている。\nふたりきり、僕らだけのためのキッチン、カフェだ。
3262 = "為此我們借用了深夜的廚房。這時的廚房和咖啡廳成了只屬於我倆的空間。" 

# monologue
# JP: （だというのに……）
3529 = "（明明只容納了兩個人……）" 

# monologue
# JP: もう狭い。調理器具と食材とを出し、\n食器の準備もしてみると、この厨房は本当に狭い。
3252 = "沒剩多少空間了。我們拿出廚具和食材，再準備起餐具，就發現這個廚房是真的很小。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……フル規格の食堂車厨房で働くのは、確か――」
2293 = "「我記得全尺寸的餐車廚房的工作人員好像有……」" 

# 【日々姫】
# display as 日日姬
# JP: 「チーフとスケさんとパンさん！　つまり――\n調理責任者さんと調理助手さんと配膳係さんの三人」
1931 = "「主廚和幫廚先生和麵包先生！也就是料理負責人和料理助手以及配菜員這三個人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「加えて、会計係やテーブル係の女性達だったか。\n女性たちは厨房に入らなかったとは聞くが……」
2570 = "「還要加上負責結帳和傳菜的女性員工們。我聽說女員工不會進廚房……」" 

# monologue
# JP: あらためて、ぐるり見渡す。\n圧迫感さえ感じる狭さであるものの――
3048 = "我再次環顧四周。這塊空間雖然狹窄到令人感到有些壓抑……" 

# 【双鉄】
# display as 雙鐵
# JP: 「これでも、日々姫が最初に引いた図面より――」
1920 = "「不過這樣已經比日日姬一開始畫的設計圖……」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。広い。\nだって、これだけスペース取っちゃったら」
2147 = "「嗯，寬闊多了。畢竟需要這麼多空間的話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だよな、18メートル級気動車の半分以上を\nゆうゆう専有してしまう」
2366 = "「是啊，至少得占去１８公尺級動車的大半截車廂」" 

# monologue
# JP: \x%l種車;#00ffc040;種車%l;#;は二両、片側運転台の気動車だ。
3041 = "我們採用的\\x%l種車;#00ffc040;原車%l;#;是兩節單向駕駛台的動車。" 

