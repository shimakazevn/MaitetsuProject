[script]
# lines: 447 
# monologue
# JP: 掃き清める。\nただそれだけのことを一から、やり直している。
2754 = "仔細清掃。我從這一單純的工作重新開始。" 

# monologue
# JP: （……これも、御一夜をより深く知るため、だ）
3290 = "（……這也是為了能更進一步加深對御一夜的了解啊）" 

# monologue
# JP: 日々姫の言葉は、僕の心にまっすぐ落ちた。
3111 = "日日姬的話說到了我的心坎上。" 

# monologue
# JP: 確かに、地に足をつけ落ち着いてこそ、\nその土地の人と暮らしとが、初めて見えてくるものだろう。
3171 = "確實，只有一步步踏踏實實地去行動才能了解這塊土地上的居民們以及他們的生活吧。" 

# monologue
# JP: （とはいえ、この掃除が、\n直接的な成果につながるわけでもなかろうが）
3314 = "（不過話說回來，我現在做的清掃工作也不會直接獲得什麼實際成果）" 

# monologue
# JP: ともかく、焦らずひとつひとつだ。\nすでに、ハチロクを巻き込んでもいる。
3186 = "總而言之，不要著急，一步一步來。我已經把八六也捲進來了。" 

# monologue
# JP: ハチロクも、僕の説明に納得し、\n“左様でしたらわたくしも”と、申し出てまでくれたのだ。
2792 = "八六也接受了我的解釋，還對我說“要是這樣的話我也參加”。" 

# monologue
# JP: （しかし……一応は蔵育ちの僕が掃除番で、\nハチロクは、見習いとはいえいきなり\x%lもろみ;#00ffc040;もろみ%l;#;番か）
3319 = "（但是……勉強算得上從小在酒窖長大的我被派來打掃，而八六雖說是見習，但卻一上來就去管理\\x%lもろみ;#00ffc040;酒醪%l;#;）" 

# monologue
# JP: 掃除をひたすら行うだけの掃除番に対し、\n\x%lもろみ;#00ffc040;もろみ%l;#;番の仕事は、温度管理という複雑で精妙なものだ。
3131 = "比起單純掃地的工作來，管理\\x%lもろみ;#00ffc040;酒醪%l;#;可是要做溫度管理這種複雜又精細的事。" 

# monologue
# JP: （まぁ、真闇姉の指示だからな。ハチロクの能力と適正が、\nおそらくは職人に近いレベルにあるということだろう）
3328 = "（好吧，畢竟這是真闇姐的指示。那也就是說八六的能力和資質已經接近專業水平了吧）" 

# monologue
# JP: ならば心配をすることもあるまい。\nあれはあれで、僕は僕。
3254 = "那就不用擔心什麼了。她是她，我是我。" 

# monologue
# JP: 酒蔵内では、お互いの仕事を\nそれぞれ懸命に果たせば良い――それだけのことだ。
2839 = "只要在酒窖內各自努力完成分配的工作就好了——就是這樣。" 

# monologue
# JP: （サッ、サッ、サッ）
3334 = "（沙，沙，沙）" 

# monologue
# JP: 箒は細かく、丁寧に。\n雑に使えば、汚れを散らしてしまうだけ――
2966 = "我仔細地輕輕揮動著掃帚。如果胡亂用力的話，那就反而只會讓塵土飛揚而已——" 

# monologue
# JP: そして、少しでも汚れたところを残してしまえば、\n酒蔵全てが緩んでいると見なされてしまう。
3193 = "而如果地上殘留一點塵土的話，就會讓整個酒窖看起來顯得疏於管理。" 

# monologue
# JP: （ああ、このことを教えてくれたのは――\n日々姫だったな）
3323 = "（啊，說起來這還是日日姬教我的——）" 

# monologue
# JP: ……引き取られてきて間も無い頃のことは、\n正直、あまり覚えていない。
1736 = "……剛被收養時的那段時間的記憶，說實話對我來說已經有些模糊了。" 

# monologue
# JP: 掃除を任され――機械的に竹箒を動かすだけだった僕に、\n幼い日々姫は震える声で注意したのだ。
3208 = "被派去掃地——只是機械性地揮動著掃帚的我被小時候的日日姬以顫抖的聲音提醒了。" 

# monologue
# JP: （今にも泣き出しそうに怯えていたのに……\nそれでも日々姫は、ほとんど初対面の僕を見上げて――）
3331 = "（明明害怕得都快哭出來了……但是日日姬還是抬起頭對幾乎是第一次見面的我——）" 

# monologue
# JP: 必死で涙をこらえる瞳が、少しも似ていないのに何故か、\n路子の瞳のように思えて……罪悪感が、痛かった。
3266 = "雖然她和路子一點都不像，但她強忍著淚珠的雙眼讓我莫名聯想到路子的眼睛，使我的內心充滿罪惡感。" 

# monologue
# JP: だからこそ、あの時の僕の心にさえも言葉は響き、\nいまもってなお、忘れぬままにいられるのだろう。が――
2740 = "不過也正是因為這樣，那些話才能觸動那時候的我，並讓我至今難忘。但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「強い痛みほど忘れぬものなら……\n記憶というのも、随分と酷なものだ」
2517 = "「越是痛苦的記憶越不容易忘記……記憶還真是殘酷啊」" 

# 【凪】
# display as ？？？
# JP: 「んなこたなかばい」
2333 = "「才沒這種事咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2589 = "「！？」" 

# monologue
# JP: ふところからの思わぬ声に、\n体が反射し、飛び退る。
3197 = "聽到突然從身前傳來的聲音，我的身體條件反射性地往後跳去。" 

# monologue
# JP: 飛びざま向けた目の先で、\n凪がにこにこ――いや、ニヤニヤと笑っている。
2984 = "我把目光轉向剛才站著的地方，凪正站在那裡對我微笑著——不，應該說是壞笑著。" 

# 【凪】
# display as 凪
# JP: 「ふっふーん、上手いこといったばい！\nやっとにーさんから一本決めてやったけんね！」
2230 = "「嘿嘿，成功啦！終於算計了大哥哥你一次！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「一本……ああ、うん。\n今のは完全に、一本決められていたな」
2486 = "「算計……啊，唔。這次我真的是徹徹底底被算計了一次」" 

# monologue
# JP: こうまで不意をつかれたことなど、\nほとんど経験したことがない。
2772 = "像這樣子被人嚇到，我還真的沒經歷過幾次。" 

# 【凪】
# display as 凪
# JP: 「にーさん、掃除に集中しとるよーに見えよったけん、\nふところ、入り込めるかと思うたばい」
2148 = "「咱看大哥哥掃地掃得那麼認真，就想著應該能偷偷接近大哥哥咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「不意を打とうとして打ったのか――」
2096 = "「你是故意想嚇我，結果還成功了嗎——」" 

# monologue
# JP: それは凄い。\n凪の能力に対する評価を、さらに上方修正せざるを得ない。
3240 = "這可真是厲害。我對凪的能力評價必須進一步提高了。" 

# monologue
# JP: 不意を打とうという意志などは、ほとんど害意に近いもの。\nそれを持った上で隠すなど、まさしく至難に違いない。
2870 = "嚇人的行為基本和惡意很近似。在這種情況下還能把惡意隱藏起來確實是很有難度。" 

# 【双鉄】
# display as 雙鐵
# JP: 「恐れいったな。\nわかってはいたが、僕もまだまだ修行が足りぬ」
2531 = "「這次我可真服了。我的修行真的還遠遠不夠，雖然我自己也早就知道了」" 

# 【凪】
# display as 凪
# JP: 「修行の前に、心構えたい」
2237 = "「在談及修行之前，應該先調整好心態」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
2166 = "「唔？」" 

# monologue
# JP: 凪の顔から、にやにや笑いが消えている。
2813 = "凪臉上笑眯眯的表情消失了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、急に」
2290 = "「怎麼突然這麼正經？」" 

# 【凪】
# display as 凪
# JP: 「痛かことば忘れんのは、生き延びるためたい」
2046 = "「不忘痛苦是為了讓自己活下去啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2587 = "「！」" 

# monologue
# JP: 聞かれていたのか。\nいや、それ以前――僕は口にしてしまっていたのか。
2820 = "剛才我的話被聽到了嗎。不，更重要的是——難道我不小心說出口了嗎？" 

# 【凪】
# display as 凪
# JP: 「痛かことから先に忘れよったら、人は簡単に死ぬばい。\nそぎゃんこつばわからんのは、心構えが悪かとよ」
2507 = "「要是輕易地就忘記痛苦，人就會輕易地死掉。要是連這一點都不知道，就說明你心態沒有擺正」" 

# monologue
# JP: 凪の言葉は、凪らしくもなく、水平だ。\n感じさせられた驚きは、すぐさま静かな納得に変わる。
2902 = "她的聲音沒有了她以往的那種樣子，很平靜。我先是驚訝了一會，隨之馬上就理解和接受了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。そうだな。考えて見れば当然だ」
2378 = "「是嗎。也是啊。仔細一想，確實是這麼回事」" 

# monologue
# JP: 強い痛みは、危険と隣り合わせのものだ。
2940 = "強烈的痛楚常常伴隨著危險。" 

# monologue
# JP: ストーブで尻尾を焼いた記憶をすぐに忘れるならば、\n世の中の全てのネコは黒焦げの尻尾をぶら下げている。
3212 = "要是貓很快就忘記自己曾在暖爐邊烤焦了尾巴，恐怕世上所有的貓都要拖著一條燒焦的尾巴了。" 

# 【凪】
# display as 凪
# JP: 「そぎゃんこつ、考えてみんとわからんと？\nにーさん、頭でっかちすぎたい」
2534 = "「連這種事情都要想一想才知道，大哥哥的腦袋太不好使啦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「面目ない」
2463 = "「真是羞愧」" 

# monologue
# JP: 頭で考えねばわからぬほどに、\n僕はまだ生を軽視しているのか。
2971 = "我依舊輕視生命到需要仔細思考才能想通這個道理嗎。" 

# monologue
# JP: 過去の傷を言い訳に、いつまでも甘えようとする――\nそうした心根を僕はまだ、きっと祓えていないのだ。
3001 = "我肯定是還沒真正改掉這種總是用過去的傷痛當作藉口，藉此逃避的根性。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今日は凪に、いろいろと教えられる日のようだな」
2445 = "「看來今天被凪好好地上了一課啊」" 

# 【凪】
# display as 凪
# JP: 「そぎゃんと？\nやったら、授業料たい！　オマケするばいっ！」
2399 = "「是這樣嗎？那就快交學費吧！多給咱點酒！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2232 = "「噢」" 

# monologue
# JP: 何故、右田一酒造元に凪が……と、\n疑問を感じるより先に、凪の右手が答えを示す。
2973 = "我剛還在好奇為什麼凪會在右田一釀酒廠這裡，她已經用右手回答了我這個問題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「量り売りか」
2124 = "「原來是來買散裝酒啊」" 

# monologue
# JP: 凪が持つのは、“右田一酒造元”の六文字が\n白地に紺で染付られた、年季の入った[かよ]通い徳利。
2807 = "凪拿著一個白色瓷底上印著“右田一釀酒廠”六個藍字的酒壺。酒壺看起來有些年頭了。" 

# monologue
# JP: 無論、今では貸出も払い下げもしていない、\nどころか、いくつ現存するのかも怪しいような代物だ。
3153 = "當然，這酒壺現在既沒地方出租也沒地方出售，不僅如此，都不知道這東西現在還有幾個現存於世。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それを見せられては、何もなくともオマケしたくなる。\n授業料なら、僕から別に支払おう」
2450 = "「看到這個酒壺就不自覺想多加點酒。學費我會另外付的」" 

# 【凪】
# display as 凪
# JP: 「おどろいたばい！\nにーさん、案外話がわかるとねぇ」
2460 = "「真想不到！大哥哥還挺好說話的呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「話のわかる男と評されることはほぼ無いぞ。\nオマケは純粋に長年の常連さんへの感謝の気持ちで――」
2276 = "「幾乎沒幾個人這麼說過我呢。這些送的酒純粹算是對常年的老顧客的一點謝意——」" 

# monologue
# JP: 量り売り用の[かめ]甕から、凪の通い徳利へ、\n口ギリギリまで、まさになみなみクマ焼酎を注ぎ込む。
2979 = "我從裝著散裝酒的大甕裡頭舀出隈燒酒，緩緩注入凪的酒壺裡，一直灌到壺口，直到快要溢出來為止。" 

# monologue
# JP: コルクのフタを閉めれば中身があふれ出すから、\n床へと落ちてしまう前、手早く布巾で拭い取る。
3199 = "蓋上橡木塞後酒多少會溢出來一點，在那些酒落到地上之前，我趕忙用毛巾擦掉。" 

# 【凪】
# display as 凪
# JP: 「おおお、みっちみちたい。\nこらぁ、景気よかおまけばい！」
2234 = "「噢噢噢，真滿啊。這可送得真多呀！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「授業料も単に、良い気付きを与えてもらえた、\nその謝礼に過ぎん」
2529 = "「這學費也單純算是你給我上了一課的謝禮吧」" 

# monologue
# JP: 小瓶をひとつ。\n代金は、無論、自分のふところから出す。
2987 = "我拿出一個小瓶。錢當然是從我自己的腰包裡掏。" 

# 【凪】
# display as 凪
# JP: 「やったぁ、蒸気ラムネばい！」
2243 = "「太棒了，是蒸汽彈珠汽水！」" 

# monologue
# JP: すぐに飲むかと思いきや、\n凪はシャツの裾で瓶を拭き、そのまま腕に抱え込む。
2969 = "我以為她會馬上喝掉，但她卻用襯衫的下擺擦了擦瓶子，抱進了懷裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「持ち帰るのか？」
2104 = "「你要拿回去喝嗎？」" 

# 【凪】
# display as 凪
# JP: 「汽車ぽっぽの絵ばかわゆかけん、\n瓶もおとっときするばい」
2504 = "「蒸汽機車的畫很可愛，咱想把瓶子珍藏起來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2380 = "「是嗎」" 

# monologue
# JP: 嬉しいことを聞かせてもらった。\n日々姫に伝えてやればさぞかし喜ぶだろう。
3245 = "這話說得真是中聽。要是告訴日日姬的話，她肯定也會很高興的。" 

# 【凪】
# display as 凪
# JP: 「こんラムネなら、授業料にはお釣りがでるけん、\nもひとつオマケにおしえたげるばい」
2532 = "「這瓶彈珠汽水當學費的話還有得找呢。咱就再多告訴你一件事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2166 = "「唔？」" 

# monologue
# JP: 手招き。
2896 = "她揮手叫我過去。" 

# monologue
# JP: 応じて耳を寄せれば、\n耳を寄せているというのに、凪はいつもの大声だ。
3014 = "我順從地把耳朵湊了過去。就算我的耳朵湊得很近，可凪還是和平時一樣大聲。" 

# 【凪】
# display as 凪
# JP: 「掃除に集中するのはよかことばってん、\n人に挨拶もせんのはイケンことばい！」
2259 = "「專心掃地是好事，不過忘了跟人打招呼可不行！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、まさしくだな。\nそのとおりだ」
2186 = "「啊，沒錯，確實是這樣」" 

# monologue
# JP: 凪は凪ゆえ、奇妙な形で僕にちょっかいをかけてくれたが、\nこれがただの通りすがりの人であったらどうだったろう。
2811 = "凪畢竟是凪，她用一種奇特的方式打斷了我，可要是一個普通的路人經過會怎麼想？" 

# monologue
# JP: 掃除をしている若者を見て、会釈する――\nそれに返事のひとつもなければ、印象は即ち“最悪”だ。
2757 = "他看到一個正在掃地的年輕人，便點頭打招呼——可對方沒有任何回應，那麼他對那個年輕人的印象肯定不會好。" 

# 【双鉄】
# display as 雙鐵
# JP: 「良いことを教えていただいてばかりだ。\n凪先生には、感謝の言葉もない」
2094 = "「你教了我這麼多深刻的道理。真不知道應該怎麼感謝凪老師才好」" 

# 【凪】
# display as 凪
# JP: 「キモかぁ！　先生とか呼ばれるん、よー好かん」
2247 = "「好噁心！咱才不喜歡被叫老師什麼的」" 

# monologue
