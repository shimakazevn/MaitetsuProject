[script]
# lines: 447 
# monologue
# JP: 掃き清める。\nただそれだけのことを一から、やり直している。
2754 = "Quét dọn sạch sẽ.\nChỉ có việc đó thôi mà tôi đang làm lại từ đầu."
# monologue
# JP: （……これも、御一夜をより深く知るため、だ）
3290 = "（……Đây cũng là để hiểu sâu hơn về Ohimitera mà.）"
# monologue
# JP: 日々姫の言葉は、僕の心にまっすぐ落ちた。
3111 = "Những lời của Hibiki đã đi thẳng vào tim tôi."
# monologue
# JP: 確かに、地に足をつけ落ち着いてこそ、\nその土地の人と暮らしとが、初めて見えてくるものだろう。
3171 = "Quả thực, chỉ khi đứng vững trên mặt đất và bình tâm lại,\nta mới có thể lần đầu tiên nhìn thấy con người và cuộc sống của vùng đất đó."
# monologue
# JP: （とはいえ、この掃除が、\n直接的な成果につながるわけでもなかろうが）
3314 = "（Tuy nói vậy, nhưng việc dọn dẹp này,\ncũng đâu mang lại thành quả trực tiếp nào đâu chứ.）"
# monologue
# JP: ともかく、焦らずひとつひとつだ。\nすでに、ハチロクを巻き込んでもいる。
3186 = "Dù sao thì, cũng không được nóng vội mà phải giải quyết từng việc một.\nHơn nữa, tôi đã kéo cả Hachiroku vào chuyện này rồi."
# monologue
# JP: ハチロクも、僕の説明に納得し、\n“左様でしたらわたくしも”と、申し出てまでくれたのだ。
2792 = "Hachiroku cũng đã đồng ý với lời giải thích của tôi,\nthậm chí còn chủ động đề nghị \"Nếu vậy thì tôi cũng xin được giúp một tay\"."
# monologue
# JP: （しかし……一応は蔵育ちの僕が掃除番で、\nハチロクは、見習いとはいえいきなり\x%lもろみ;#00ffc040;もろみ%l;#;番か）
3319 = "（Nhưng mà……tôi, người ít nhiều lớn lên ở xưởng rượu, lại làm người quét dọn,\ncòn Hachiroku, dù là học việc nhưng lại làm người trông \\x%lもろみ;#00ffc040;cơm rượu%l;#; ngay từ đầu sao.）"
# monologue
# JP: 掃除をひたすら行うだけの掃除番に対し、\n\x%lもろみ;#00ffc040;もろみ%l;#;番の仕事は、温度管理という複雑で精妙なものだ。
3131 = "Trái ngược với người quét dọn chỉ việc cắm cúi quét dọn,\ncông việc của người trông \\x%lもろみ;#00ffc040;cơm rượu%l;#; lại là một công việc phức tạp và tinh tế mang tên quản lý nhiệt độ."
# monologue
# JP: （まぁ、真闇姉の指示だからな。ハチロクの能力と適正が、\nおそらくは職人に近いレベルにあるということだろう）
3328 = "（Mà, vì đó là chỉ thị của chị Mayami mà. Năng lực và sự phù hợp của Hachiroku,\ncó lẽ đã ở mức độ gần với một người thợ lành nghề rồi.）"
# monologue
# JP: ならば心配をすることもあるまい。\nあれはあれで、僕は僕。
3254 = "Vậy thì cũng chẳng có gì phải lo lắng.\nViệc ai nấy làm, tôi là tôi."
# monologue
# JP: 酒蔵内では、お互いの仕事を\nそれぞれ懸命に果たせば良い――それだけのことだ。
2839 = "Trong xưởng rượu, chỉ cần mỗi người\ncố gắng hoàn thành tốt công việc của mình là được——chỉ vậy thôi."
# monologue
# JP: （サッ、サッ、サッ）
3334 = "（Xoẹt, xoẹt, xoẹt）"
# monologue
# JP: 箒は細かく、丁寧に。\n雑に使えば、汚れを散らしてしまうだけ――
2966 = "Quét chổi phải thật tỉ mỉ, cẩn thận.\nNếu quét cẩu thả, thì chỉ làm bụi bẩn bay tứ tung thôi——"
# monologue
# JP: そして、少しでも汚れたところを残してしまえば、\n酒蔵全てが緩んでいると見なされてしまう。
3193 = "Và, nếu để sót lại dù chỉ một chút chỗ bẩn,\nthì sẽ bị coi là toàn bộ xưởng rượu đang lơ là quản lý."
# monologue
# JP: （ああ、このことを教えてくれたのは――\n日々姫だったな）
3323 = "（A, người đã dạy tôi điều này——\nlà Hibiki nhỉ.）"
# monologue
# JP: ……引き取られてきて間も無い頃のことは、\n正直、あまり覚えていない。
1736 = "……Chuyện hồi mới được nhận nuôi,\nthú thực, tôi không nhớ rõ lắm."
# monologue
# JP: 掃除を任され――機械的に竹箒を動かすだけだった僕に、\n幼い日々姫は震える声で注意したのだ。
3208 = "Khi được giao nhiệm vụ quét dọn——tôi chỉ biết di chuyển cây chổi tre một cách máy móc,\nvà Hibiki hồi nhỏ đã nhắc nhở tôi bằng giọng run rẩy."
# monologue
# JP: （今にも泣き出しそうに怯えていたのに……\nそれでも日々姫は、ほとんど初対面の僕を見上げて――）
3331 = "（Rõ ràng là đang sợ hãi đến mức như sắp khóc……\nVậy mà Hibiki vẫn ngước nhìn tôi, một người gần như mới gặp lần đầu——）"
# monologue
# JP: 必死で涙をこらえる瞳が、少しも似ていないのに何故か、\n路子の瞳のように思えて……罪悪感が、痛かった。
3266 = "Đôi mắt tuyệt vọng kìm nén những giọt nước mắt ấy, dù chẳng giống chút nào, nhưng không hiểu sao,\nlại khiến tôi nhớ đến đôi mắt của Michiko……Cảm giác tội lỗi, thật đau đớn."
# monologue
# JP: だからこそ、あの時の僕の心にさえも言葉は響き、\nいまもってなお、忘れぬままにいられるのだろう。が――
2740 = "Chính vì thế, những lời nói ấy mới có thể chạm đến trái tim tôi lúc bấy giờ,\nvà có lẽ đó là lý do đến tận bây giờ tôi vẫn không thể nào quên. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「強い痛みほど忘れぬものなら……\n記憶というのも、随分と酷なものだ」
2517 = "「Nếu nỗi đau càng lớn càng khó quên……\nthì ký ức cũng thật tàn nhẫn.」"
# 【凪】
# display as ？？？
# JP: 「んなこたなかばい」
2333 = "「Làm gì có chuyện đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2589 = "「!?」"
# monologue
# JP: ふところからの思わぬ声に、\n体が反射し、飛び退る。
3197 = "Trước giọng nói bất ngờ phát ra ngay sát bên,\ncơ thể tôi phản xạ tự nhiên, nhảy lùi lại."
# monologue
# JP: 飛びざま向けた目の先で、\n凪がにこにこ――いや、ニヤニヤと笑っている。
2984 = "Đưa mắt nhìn về phía vừa nhảy ra,\nNagi đang tủm tỉm——không, là cười toe toét."
# 【凪】
# display as 凪
# JP: 「ふっふーん、上手いこといったばい！\nやっとにーさんから一本決めてやったけんね！」
2230 = "「Hứ hừm, ngon lành cành đào!\nCuối cùng cũng lừa được anh hai một vố rồi nhé!」"
# 【双鉄】
# display as 雙鐵
# JP: 「一本……ああ、うん。\n今のは完全に、一本決められていたな」
2486 = "「Một vố……à, ừ.\nVừa rồi hoàn toàn là, bị lừa một vố thật.」"
# monologue
# JP: こうまで不意をつかれたことなど、\nほとんど経験したことがない。
2772 = "Bị đánh úp bất ngờ đến mức này,\ntôi hầu như chưa từng trải qua."
# 【凪】
# display as 凪
# JP: 「にーさん、掃除に集中しとるよーに見えよったけん、\nふところ、入り込めるかと思うたばい」
2148 = "「Thấy anh hai có vẻ đang tập trung quét dọn,\nnên em nghĩ chắc là lẻn vào sát bên được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「不意を打とうとして打ったのか――」
2096 = "「Định đánh úp và đã đánh úp thành công sao——」"
# monologue
# JP: それは凄い。\n凪の能力に対する評価を、さらに上方修正せざるを得ない。
3240 = "Thật đáng nể.\nTôi đành phải đánh giá lại năng lực của Nagi lên một mức cao hơn nữa."
# monologue
# JP: 不意を打とうという意志などは、ほとんど害意に近いもの。\nそれを持った上で隠すなど、まさしく至難に違いない。
2870 = "Ý định đánh úp gần như tương đương với ác ý.\nGiữ ý định đó trong lòng mà vẫn che giấu được, quả thực là vô cùng khó khăn."
# 【双鉄】
# display as 雙鐵
# JP: 「恐れいったな。\nわかってはいたが、僕もまだまだ修行が足りぬ」
2531 = "「Bái phục thật đấy.\nDù biết là vậy, nhưng anh cũng vẫn còn tu luyện chưa đủ.」"
# 【凪】
# display as 凪
# JP: 「修行の前に、心構えたい」
2237 = "「Trước khi tu luyện, phải có tâm thế đã.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
2166 = "「Hửm?」"
# monologue
# JP: 凪の顔から、にやにや笑いが消えている。
2813 = "Nụ cười toe toét đã biến mất trên khuôn mặt Nagi."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、急に」
2290 = "「Sao thế, tự dưng lại.」"
# 【凪】
# display as 凪
# JP: 「痛かことば忘れんのは、生き延びるためたい」
2046 = "「Không quên những điều đau đớn, là để sống sót đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2587 = "「!」"
# monologue
# JP: 聞かれていたのか。\nいや、それ以前――僕は口にしてしまっていたのか。
2820 = "Bị nghe thấy rồi sao.\nKhông, trước đó——tôi đã nói thành lời rồi à."
# 【凪】
# display as 凪
# JP: 「痛かことから先に忘れよったら、人は簡単に死ぬばい。\nそぎゃんこつばわからんのは、心構えが悪かとよ」
2507 = "「Nếu quên những điều đau đớn trước, thì con người sẽ chết dễ dàng lắm.\nKhông hiểu được điều đó, là tâm thế không tốt đâu.」"
# monologue
# JP: 凪の言葉は、凪らしくもなく、水平だ。\n感じさせられた驚きは、すぐさま静かな納得に変わる。
2902 = "Lời nói của Nagi không giống em ấy chút nào, rất điềm tĩnh.\nSự ngạc nhiên thoáng qua ngay lập tức chuyển thành sự thấu hiểu tĩnh lặng."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。そうだな。考えて見れば当然だ」
2378 = "「Vậy sao. Đúng vậy nhỉ. Nghĩ kỹ thì đó là điều hiển nhiên.」"
# monologue
# JP: 強い痛みは、危険と隣り合わせのものだ。
2940 = "Nỗi đau tột cùng luôn song hành với nguy hiểm."
# monologue
# JP: ストーブで尻尾を焼いた記憶をすぐに忘れるならば、\n世の中の全てのネコは黒焦げの尻尾をぶら下げている。
3212 = "Nếu lũ mèo nhanh chóng quên đi ký ức bị cháy đuôi ở lò sưởi,\nthì tất cả mèo trên đời này đều sẽ lủng lẳng cái đuôi cháy đen thui."
# 【凪】
# display as 凪
# JP: 「そぎゃんこつ、考えてみんとわからんと？\nにーさん、頭でっかちすぎたい」
2534 = "「Chuyện đó, không nghĩ thì không biết sao?\nAnh hai, cứng đầu quá đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「面目ない」
2463 = "「Xấu hổ thật.」"
# monologue
# JP: 頭で考えねばわからぬほどに、\n僕はまだ生を軽視しているのか。
2971 = "Đến mức phải dùng đầu suy nghĩ mới hiểu được,\ntôi vẫn còn coi nhẹ mạng sống đến thế sao."
# monologue
# JP: 過去の傷を言い訳に、いつまでも甘えようとする――\nそうした心根を僕はまだ、きっと祓えていないのだ。
3001 = "Lấy vết thương quá khứ làm cái cớ để mãi dựa dẫm——\nTâm tính đó, chắc chắn tôi vẫn chưa gột rửa được."
# 【双鉄】
# display as 雙鐵
# JP: 「今日は凪に、いろいろと教えられる日のようだな」
2445 = "「Hôm nay có vẻ là ngày anh được Nagi dạy bảo nhiều điều nhỉ.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんと？\nやったら、授業料たい！　オマケするばいっ！」
2399 = "「Vậy sao?\nThế thì, đóng học phí đi! Nhớ khuyến mãi thêm đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2232 = "「À.」"
# monologue
# JP: 何故、右田一酒造元に凪が……と、\n疑問を感じるより先に、凪の右手が答えを示す。
2973 = "Tại sao Nagi lại ở Xưởng rượu Migita Ichishuzou……\nCòn chưa kịp thắc mắc, tay phải của Nagi đã đưa ra câu trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「量り売りか」
2124 = "「Mua rượu rót lẻ à.」"
# monologue
# JP: 凪が持つのは、“右田一酒造元”の六文字が\n白地に紺で染付られた、年季の入った[かよ]通い徳利。
2807 = "Thứ Nagi đang cầm là một chiếc bình đựng rượu lâu năm,\ncó in sáu chữ \"Xưởng rượu Migita Ichishuzou\" màu xanh đen trên nền trắng."
# monologue
# JP: 無論、今では貸出も払い下げもしていない、\nどころか、いくつ現存するのかも怪しいような代物だ。
3153 = "Tất nhiên, bây giờ không còn cho thuê hay bán thanh lý nữa,\nthậm chí số lượng còn tồn tại e là cũng chẳng được bao nhiêu."
# 【双鉄】
# display as 雙鐵
# JP: 「それを見せられては、何もなくともオマケしたくなる。\n授業料なら、僕から別に支払おう」
2450 = "「Cho anh xem cái đó thì dù không có gì anh cũng muốn khuyến mãi thêm.\nHọc phí thì để anh trả riêng.」"
# 【凪】
# display as 凪
# JP: 「おどろいたばい！\nにーさん、案外話がわかるとねぇ」
2460 = "「Bất ngờ ghê!\nAnh hai, không ngờ cũng hiểu chuyện phết nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「話のわかる男と評されることはほぼ無いぞ。\nオマケは純粋に長年の常連さんへの感謝の気持ちで――」
2276 = "「Hầu như chẳng ai đánh giá anh là người hiểu chuyện đâu.\nKhuyến mãi chỉ đơn thuần là tấm lòng biết ơn dành cho khách quen lâu năm thôi——」"
# monologue
# JP: 量り売り用の[かめ]甕から、凪の通い徳利へ、\n口ギリギリまで、まさになみなみクマ焼酎を注ぎ込む。
2979 = "Từ vại đựng rượu rót lẻ, tôi rót shochu Kuma vào bình của Nagi,\ntràn trề lên tận miệng bình."
# monologue
# JP: コルクのフタを閉めれば中身があふれ出すから、\n床へと落ちてしまう前、手早く布巾で拭い取る。
3199 = "Đóng nắp bần lại thì rượu bên trong sẽ trào ra,\nnên trước khi nó rớt xuống sàn, tôi nhanh tay dùng khăn lau sạch."
# 【凪】
# display as 凪
# JP: 「おおお、みっちみちたい。\nこらぁ、景気よかおまけばい！」
2234 = "「Oaaa, đầy ắp luôn kìa.\nĐúng là khuyến mãi sộp quá nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「授業料も単に、良い気付きを与えてもらえた、\nその謝礼に過ぎん」
2529 = "「Học phí cũng chỉ đơn giản là,\nlời cảm ơn vì em đã cho anh nhận ra điều hay thôi.」"
# monologue
# JP: 小瓶をひとつ。\n代金は、無論、自分のふところから出す。
2987 = "Một chai nhỏ.\nTiền thì tất nhiên tôi tự bỏ tiền túi ra."
# 【凪】
# display as 凪
# JP: 「やったぁ、蒸気ラムネばい！」
2243 = "「Tuyệt quá, nước ngọt có ga hơi nước này!」"
# monologue
# JP: すぐに飲むかと思いきや、\n凪はシャツの裾で瓶を拭き、そのまま腕に抱え込む。
2969 = "Tưởng em ấy sẽ uống ngay,\nnhưng Nagi lại dùng vạt áo lau chai, rồi ôm chặt vào lòng."
# 【双鉄】
# display as 雙鐵
# JP: 「持ち帰るのか？」
2104 = "「Em mang về à?」"
# 【凪】
# display as 凪
# JP: 「汽車ぽっぽの絵ばかわゆかけん、\n瓶もおとっときするばい」
2504 = "「Hình vẽ tàu hỏa xình xịch dễ thương lắm,\nnên em sẽ giữ lại cả cái chai luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2380 = "「Vậy sao.」"
# monologue
# JP: 嬉しいことを聞かせてもらった。\n日々姫に伝えてやればさぞかし喜ぶだろう。
3245 = "Nghe được một điều thật đáng mừng.\nKể lại cho Hibiki chắc em ấy sẽ vui lắm đây."
# 【凪】
# display as 凪
# JP: 「こんラムネなら、授業料にはお釣りがでるけん、\nもひとつオマケにおしえたげるばい」
2532 = "「Chai nước này thì học phí vẫn còn dư đấy,\nnên em sẽ dạy thêm cho anh một bài học khuyến mãi nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2166 = "「唔？」" 
# monologue
# JP: 手招き。
2896 = "Vẫy tay gọi lại."
# monologue
# JP: 応じて耳を寄せれば、\n耳を寄せているというのに、凪はいつもの大声だ。
3014 = "Tôi chiều ý ghé sát tai vào,\nvậy mà Nagi vẫn nói lớn tiếng như mọi khi."
# 【凪】
# display as 凪
# JP: 「掃除に集中するのはよかことばってん、\n人に挨拶もせんのはイケンことばい！」
2259 = "「Tập trung quét dọn thì tốt đấy,\nnhưng không thèm chào hỏi ai thì không được đâu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、まさしくだな。\nそのとおりだ」
2186 = "「À, đúng là vậy thật.\nEm nói chí lý.」"
# monologue
# JP: 凪は凪ゆえ、奇妙な形で僕にちょっかいをかけてくれたが、\nこれがただの通りすがりの人であったらどうだったろう。
2811 = "Vì là Nagi, nên em ấy mới trêu chọc tôi theo một cách kỳ quặc như vậy,\nnhưng nếu đó chỉ là một người qua đường thì sao."
# monologue
# JP: 掃除をしている若者を見て、会釈する――\nそれに返事のひとつもなければ、印象は即ち“最悪”だ。
2757 = "Thấy một thanh niên đang quét dọn, bèn gật đầu chào——\nMà không nhận được lấy một lời đáp lại, thì ấn tượng sẽ là \"tồi tệ nhất\"."
# 【双鉄】
# display as 雙鐵
# JP: 「良いことを教えていただいてばかりだ。\n凪先生には、感謝の言葉もない」
2094 = "「Toàn được chỉ dạy những điều hay lẽ phải thôi.\nThật không biết dùng lời nào để cảm ơn cô giáo Nagi đây.」"
# 【凪】
# display as 凪
# JP: 「キモかぁ！　先生とか呼ばれるん、よー好かん」
2247 = "「Gớm quá đi! Bị gọi là cô giáo này nọ, em không thích đâu.」"
# monologue
# JP: 凪は大げさに首を振り、\nそれからトっと、軽い足取りで僕から離れる。
2809 = "Nagi lắc đầu một cách cường điệu,\nrồi nhẹ nhàng cất bước rời khỏi tôi."
# 【凪】
# display as 凪
# JP: 「にーさんにも色々教わっとるけん、オアイコばい！\nカシカリなしばい！　ゴブゴブばいっ！！」
2146 = "「Em cũng được anh hai dạy nhiều thứ rồi, nên hòa nhé!\nKhông ai nợ ai! Huề nhau nha!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2214 = "「Ừm.」"
# monologue
# JP: 徳利を提げ、ラムネ瓶を抱き、凪が去る。
2895 = "Xách bình rượu, ôm chai nước ngọt, Nagi rời đi."
# monologue
# JP: あれだけ揺らしてラムネが果たして吹きはしないかと\n不安を感じる、勢いのよい駆け足で。
3251 = "Bằng những bước chạy vội vã,\nđến mức khiến tôi lo lắng không biết chai nước ngọt bị lắc cỡ đó liệu có trào bọt ra không."
# 【双鉄】
# display as 雙鐵
# JP: 「過ちを改むるに[はばか]憚ってはならん。\nならば、むしろこちらから挨拶するようにしてみよう」
2254 = "「Có lỗi thì không được ngần ngại sửa chữa.\nVậy thì, thà rằng mình chủ động chào hỏi trước xem sao.」"
# monologue
# JP: ……竹箒が地を掃く音に混じって、やがて、\nゆったりとした足音が近づいてくる。
1740 = "……Lẫn trong tiếng chổi tre quét trên mặt đất, chẳng mấy chốc,\nmột tiếng bước chân thong thả tiến lại gần."
# 【双鉄】
# display as 雙鐵
# JP: 「おはようございます。まだ暑いですね」
2366 = "「Chào buổi sáng. Trời vẫn còn nóng nhỉ.」"
# 【おじさん】
# display as 大叔
# JP: 「こらぁ、右田の坊っちゃん。おはようさんです。\n真闇さんはおられますかね」
2236 = "「Ô, cậu ấm nhà Migita. Chào buổi sáng.\nCô Mayami có nhà không?」"
# monologue
# JP: 見覚えあるような無いような――という相手だったが、\nごくごく自然に挨拶をかわし、会話をできた。
2963 = "Tuy là một người trông quen quen mà lại không nhớ rõ——\nnhưng chúng tôi đã chào hỏi và trò chuyện vô cùng tự nhiên."
# monologue
# JP: これは、うん。なかなかいい。\nどんどん試そう。
3241 = "Cái này, ừm. Khá là tốt đấy.\nCứ tiếp tục thử xem sao."
# 【双鉄】
# display as 雙鐵
# JP: 「おはようございます。まだ暑いですね」
# 2366 = "「早安。現在天氣還是好熱啊」" 
# monologue
# JP: 全く見知らぬ人にも怖じずに声をかける。
2858 = "Dù là người hoàn toàn không quen biết, tôi cũng không ngần ngại bắt chuyện."
# monologue
# JP: 店に用事は無いようで、ただただ通り過ぎて行く――\nが、通りざま、軽い会釈を返してくれる。
3249 = "Có vẻ không có việc gì ở cửa hàng, họ chỉ đi ngang qua thôi——\nNhưng khi đi lướt qua, họ vẫn khẽ gật đầu đáp lễ."
# 【双鉄】
# display as 雙鐵
# JP: 「おはようございます。まだ暑いですね」
# 2366 = "「早安。現在天氣還是好熱啊」" 
# 【れいな】
# display as 玲奈
# JP: 「はぁい、あついですぅ。って、わ！　そうてつさん。\nおそうじですか？　れいなもおそうじ大好きですよぉ」
2222 = "「Vâng, nóng lắm ạ. Ơ, oa! Anh Soutetsu.\nAnh đang dọn dẹp ạ? Reina cũng thích dọn dẹp lắm đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「おはようございます。まだ暑いですね」
# 2366 = "「早安。現在天氣還是好熱啊」" 
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ、双鉄君。おはようございます。\n掃除とは感心ですね。暑さに気をつけがんばって下さい」
2198 = "「A, cậu Soutetsu. Chào buổi sáng.\nChăm chỉ dọn dẹp đáng khen thật. Cẩn thận trời nóng nhé, cố gắng lên.」"
# monologue
# JP: 知り合い相手の挨拶からも、笑顔やねぎらい、\nさまざまなものを返してもらえる。
2981 = "Từ những lời chào hỏi với người quen, tôi cũng nhận lại được\nnụ cười, lời động viên và nhiều thứ khác."
# monologue
# JP: （掃除をしながら、周囲に少し気を配る。\nただそれだけで、世界がいくらか広がるようだな）
3310 = "（Vừa dọn dẹp, vừa để tâm một chút đến xung quanh.\nChỉ vậy thôi mà thế giới dường như rộng mở hơn phần nào.）"
# monologue
# JP: が――\nその面白さも程なく尽きる。
2739 = "Nhưng——\nSự thú vị đó cũng chẳng mấy chốc mà cạn kiệt."
# monologue
# JP: 掃除と挨拶、それだけをただひたすらに繰り返した結果、\n掃くべきものが、何も無くなってしまうから。
2873 = "Kết quả của việc cứ mải miết lặp đi lặp lại việc dọn dẹp và chào hỏi,\nlà chẳng còn gì để quét nữa."
# monologue
# JP: （さくっ）
3333 = "（Xột）"
# monologue
# JP: が、足音だ。\nここで背を向け店に入っては、やはり印象が悪かろう。
2844 = "Lại có tiếng bước chân.\nNếu giờ quay lưng đi vào cửa hàng thì ấn tượng sẽ xấu lắm đây."
# 【双鉄】
# display as 雙鐵
# JP: 「おはようございます。まだ暑いですね」
# 2366 = "「早安。現在天氣還是好熱啊」" 
# 【永山】
# display as 阿姨
# JP: 「暑いねぇ。ね、真闇ちゃんいる？\n駅弁のこと、打ち合わせたいんだけど」
2469 = "「Nóng quá đi. Này, Mayami có nhà không?\nCô muốn bàn bạc chút chuyện về cơm hộp ga tàu.」"
# monologue
# JP: 在宅してます、と返事をしつつ、\n掃除に区切りがついたこともあり、つい尋ねてしまう。
2974 = "Vừa trả lời là có ở nhà,\nsẵn tiện việc dọn dẹp cũng đã xong, tôi buột miệng hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「駅弁、のお話ですか？」
2509 = "「Chuyện về cơm hộp ga tàu ạ?」"
# 【永山】
# display as 阿姨
# JP: 「うん、駅弁――って、あら、キミ！\nハチロクの\x%l機関士;#00ffc040;機関士%l;#;さんやってた子よね？」
2223 = "「Ừ, cơm hộp ga tàu——mà, ơ, cậu!\nCậu là người làm \\x%l機関士;#00ffc040;lái tàu%l;#; cho Hachiroku đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、自分はハチロクの\x%l機関士;#00ffc040;機関士%l;#;、右田双鉄です」
2389 = "「Vâng, cháu là \\x%l機関士;#00ffc040;lái tàu%l;#; của Hachiroku, Migita Soutetsu.」"
# 【永山】
# display as 永山
# JP: 「そう。あたしは永山――\n[ゆうれいでら,2]幽霊寺の住職の女房で、[のりこ,1]典子といいます」
2398 = "「Vậy sao. Cô là Nagayama——\nvợ của trụ trì chùa Yurei, tên là Noriko.」"
# 【双鉄】
# display as 雙鐵
# JP: 「幽霊寺の」
2275 = "「Chùa Yurei ạ.」"
# monologue
# JP: ここまで流暢な標準語なら、\nおそらくは帝都近郊の育ちであろう。
2897 = "Nói tiếng phổ thông trôi chảy đến mức này,\ncó lẽ cô ấy lớn lên ở vùng ngoại ô Đế đô."
# monologue
# JP: 幽霊寺にお嫁入り、とは、\nなかなかに剛気な人物であるのかもしれぬ。
2742 = "Lấy chồng về chùa Yurei,\nchắc hẳn cô ấy là một người khá mạnh mẽ."
# 【永山】
# display as 永山
# JP: 「ね？　双鉄君。丁度良いところで会ったし、\nすこし、お話いいかな」
2154 = "「Này? Cậu Soutetsu. Vừa khéo gặp nhau ở đây,\ncô trò chuyện một chút được không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「丁度良いとこ、とおっしゃいますと」
2412 = "「Cô bảo vừa khéo là sao ạ?」"
# 【永山】
# display as 永山
# JP: 「いやね？　こないだの展示会での駅弁、\nいまひとつ評判がよくなかったの」
2265 = "「Thế này nhé? Cơm hộp ga tàu ở buổi triển lãm hôm nọ,\nđánh giá không được tốt cho lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「展示会――？\n展示会で、駅弁を販売していたのですか？」
2269 = "「Triển lãm——?\nỞ triển lãm có bán cơm hộp ga tàu sao?」"
# monologue
# JP: 初耳だ。\n驚かされた僕を見て、永山夫人も驚いたような顔になる。
3010 = "Lần đầu tiên tôi nghe nói đấy.\nThấy vẻ mặt ngạc nhiên của tôi, phu nhân Nagayama cũng tỏ ra ngạc nhiên."
# 【永山】
# display as 永山
# JP: 「あらやだ。聞いてなかったの？」
2151 = "「Trời đất. Cậu chưa nghe nói sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、まったく」
2217 = "「Vâng, hoàn toàn chưa ạ.」"
# 【永山】
# display as 永山
# JP: 「わ、ヤバっ。\nナイショにしなくちゃな話だったらどうしよう」
2150 = "「Oa, tiêu rồi.\nLỡ đây là chuyện phải giữ bí mật thì sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは無いのではないかと思います。\nあの場には僕も、ほとんどの時間いたわけですし――」
2316 = "「Cháu nghĩ là không có chuyện đó đâu.\nVì cháu cũng có mặt ở đó gần như toàn bộ thời gian mà——」"
# monologue
# JP: ああ、そうだ。\n僕が外していたのなど、長くて30分度程度だった。
2863 = "À, đúng rồi.\nTôi chỉ vắng mặt lâu nhất cũng tầm 30 phút thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり駅弁は、相当な勢いで売れたわけですね？」
2069 = "「Nói cách khác, cơm hộp ga tàu đã bán hết với tốc độ chóng mặt đúng không ạ?」"
# 【永山】
# display as 永山
# JP: 「ん。売れたのは売れたのよ。瞬殺ってやつ、即完売。\nSL効果、[ハチロク,3]8620さまさま――なんだけどね」
2208 = "「Ừ. Bán thì bán hết đấy. Hết sạch sành sanh trong chớp mắt.\nHiệu ứng SL, nhờ ơn \\x%l8620;#00ffc040;8620%l;#; cả đấy——nhưng mà nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……即完売にしては、冴えない口調ですが」
1785 = "「……Bán hết ngay lập tức mà giọng điệu của cô có vẻ không vui lắm nhỉ.」"
# monologue
# JP: 問えば、永山夫人の顔がハッキリとした苦笑に歪む。
3008 = "Khi tôi hỏi vậy, khuôn mặt phu nhân Nagayama méo xệch thành một nụ cười khổ."
# 【永山】
# display as 永山
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;仕込みのハチクマライス。\n駅弁に仕立ててみたんだけどね」
2312 = "「Là suất cơm Hachikuma đặc chế của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;.\nCô đã thử làm thành cơm hộp ga tàu đấy.」"
# monologue
# JP: ……ハチクマライスとは、\nご飯の上にきゃべつの千切り、その上にベーコンエッグ。
1749 = "……Cơm Hachikuma là món,\ncơm trắng phủ bắp cải thái sợi, bên trên là trứng ốp la thịt xông khói."
# monologue
# JP: さらにくわえて、そのときそのとき、\nありあわせの食材を載せ添える、というものだそうだ。
3146 = "Hơn nữa, tùy từng lúc,\nsẽ có thêm các nguyên liệu sẵn có kèm theo."
# 【双鉄】
# display as 雙鐵
# JP: 「ありあわせの食材とは――\nなんだか、[まかな]賄い[めし]飯のようですね」
2439 = "「Nguyên liệu sẵn có sao——\nCứ như suất ăn cho nhân viên vậy.」"
# 【永山】
# display as 永山
# JP: 「いい勘ね。大正解。ハチクマライスは、\n旧\x%l帝鉄;#00ffc040;帝鉄%l;#;の食堂車厨房の[まかな]賄い[めし]飯が元祖なの」
2097 = "「Trực giác tốt đấy. Hoàn toàn chính xác. Cơm Hachikuma,\nvốn có nguồn gốc từ suất ăn cho nhân viên trong nhà bếp toa ăn của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; cũ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「旧\x%l帝鉄;#00ffc040;帝鉄%l;#;の食堂車」
2119 = "「Toa ăn của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; cũ ạ.」"
# monologue
# JP: ならばもしや、と気になってくる。
1730 = "Nếu vậy thì không lẽ nào, tôi bắt đầu tò mò."
# 【双鉄】
# display as 雙鐵
# JP: 「永山さんも、それでは元は\x%l帝鉄;#00ffc040;帝鉄%l;#;に、\nそれも、食堂車にいらしたのですか？」
2500 = "「Cô Nagayama, vậy ra trước đây cô cũng làm việc cho \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;,\nmà lại còn ở toa ăn sao?」"
# 【永山】
# display as 永山
# JP: 「また大正解。食堂車勤務の頃の話を聞かせたらね？\n社長、ハチクマライス食べてみたいって乗り気になって」
2131 = "「Lại đoán đúng rồi. Kể chuyện hồi làm ở toa ăn xong ấy mà?\nGiám đốc cứ hào hứng bảo muốn ăn thử cơm Hachikuma.」"
# 【双鉄】
# display as 雙鐵
# JP: 「社長とは、御一夜鉄道のですか？\n雛衣――」
2294 = "「Giám đốc là của Đường sắt Ohimitera ạ?\nHinai——」"
# 【永山】
# display as 永山
# JP: 「そう。ポーレットちゃん」
2423 = "「Đúng rồi. Cô bé Paulette.」"
# monologue
# JP: ポーレットのことをよほど気に入っているのだろう。\nそう思わせる、やわらかな笑み。
3156 = "Chắc hẳn cô ấy rất quý Paulette.\nNụ cười dịu dàng ấy khiến tôi nghĩ vậy."
# 【永山】
# display as 永山
# JP: 「あの娘が大絶賛してくれたから。\n駅弁でもイケるような気になっちゃったんだけど」
2448 = "「Con bé khen ngợi hết lời luôn.\nNên cô mới nghĩ làm thành cơm hộp ga tàu chắc cũng ổn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったんですか」
2125 = "「Thì ra là vậy.」"
# monologue
# JP: メニュー内容を聞く限り、\nどう間違ってもマズくなるとは思えない。
3172 = "Nghe thực đơn thôi,\ntôi đã thấy món này dù có làm sai cách nào cũng không thể dở được."
# monologue
# JP: まして、元食堂車乗員じきじきのお手製ならば、\nプラスアルファのうまさも期待できるのだろう。
3128 = "Huống hồ, nếu do chính tay cựu nhân viên toa ăn làm,\nthì chắc chắn độ ngon sẽ còn tăng lên gấp bội."
# 【永山】
# display as 永山
# JP: 「確かに、一部のお客さんは泣いて喜んでくれたのよ？\nけど、肝心の一般のお客さんが……こう……微妙？」
2474 = "「Đúng là có một số khách hàng vui đến phát khóc luôn đấy?\nNhưng mà, những vị khách thông thường thì lại……kiểu……hơi tế nhị?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――」
2160 = "「Ừm——」"
# monologue
# JP: ポーレットは確かに鉄道を愛している。が、\n市政や経営と絡む場合の判断は、僕以上にシビアで的確だ。
3138 = "Paulette quả thực rất yêu đường sắt. Nhưng,\nnhững phán đoán liên quan đến chính quyền thành phố hay kinh doanh của cô ấy còn khắt khe và chính xác hơn cả tôi."
# monologue
# JP: 駅弁がらみのことであるなら、まさかヤジなどに、\nその判断が狂わされることもあるまいし……
2879 = "Nếu là chuyện liên quan đến cơm hộp ga tàu, thì chắc chắn cô ấy\nsẽ không để những lời bàn tán làm lu mờ phán đoán của mình……"
# 【永山】
# display as 永山
# JP: 「双鉄くん、冷静で賢いって評判を聞くのよ。あちこちで。\nだから、その辺の理由、推理してもらえないかな」
2580 = "「Cậu Soutetsu, cô nghe đồn cậu bình tĩnh và thông minh lắm. Ở khắp nơi luôn.\nNên là, cậu có thể suy luận lý do giúp cô được không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「推理ですか？」
2115 = "「Suy luận ạ?」"
# 【永山】
# display as 永山
# JP: 「それか案出し。別にハチクマに[こだわ]拘るだけじゃないし。\n要は、売りのある駅弁作りのヒントが欲しいの」
2321 = "「Hoặc là đưa ra ý tưởng. Cũng không nhất thiết phải bám vào món Hachikuma.\nTóm lại là cô muốn có gợi ý để làm ra một hộp cơm ga tàu đắt khách.」"
# 【双鉄】
# display as 雙鐵
# JP: 「難しいですね。まずはハチクマ駅弁の実物を見て、試食。\nその上でないと、推理も案も、空虚なものとなりそうで」
2528 = "「Khó thật đấy. Trước tiên phải nhìn thấy hộp cơm Hachikuma thực tế, rồi ăn thử đã.\nNếu không thì cả suy luận lẫn ý tưởng đều sẽ trở nên sáo rỗng mất.」"
# monologue
# JP: 思うところを素直に言えば、\n永山夫人は、感心したように頷き、笑う。
2982 = "Tôi thành thật nói ra suy nghĩ của mình,\nPhu nhân Nagayama gật đầu như thán phục, rồi cười."
# 【永山】
# display as 永山
# JP: 「さすがは[まくら,1]真闇ちゃんの弟くんね……って、あ、ごめん。\n養子なんだったよね、キミ」
2455 = "「Quả không hổ danh là em trai của Mayami……à, ơ, xin lỗi.\nCậu là con nuôi mà nhỉ.」"
# monologue
# JP: ごめん、ともさほど思ってなさそうなサバけた口調。\nこうこられると、こちらも率直な返事が出来る。
2762 = "Một giọng điệu sảng khoái chẳng có vẻ gì là đang xin lỗi.\nĐã thế này thì tôi cũng có thể trả lời một cách thẳng thắn."
# 【双鉄】
# display as 雙鐵
# JP: 「はい。ですが、真闇姉の[くんとう,1]薫陶は受けていると思います。\nこの家で、僕も育ててもらった者ですから」
2386 = "「Vâng. Nhưng cháu nghĩ mình cũng được thụ hưởng sự chỉ dạy của chị Mayami.\nVì cháu cũng là người được nuôi nấng trong ngôi nhà này mà.」"
# 【永山】
# display as 永山
# JP: 「そ？　なら、今度ほんとに時間頂戴よ。\nハチロクちゃんと一緒に。駅弁のこと、いろいろ話そ？」
2382 = "「Vậy sao? Thế thì hôm nào dành thời gian cho cô nhé.\nCùng với bé Hachiroku nữa. Chúng ta sẽ bàn nhiều chuyện về cơm hộp ga tàu nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、僕らでよければ喜んで。\nというか、真闇姉は？」
2216 = "「Vâng, nếu bọn cháu giúp được thì rất sẵn lòng.\nMà, chị Mayami thì sao ạ?」"
# 【永山】
# display as 永山
# JP: 「キミらの案でダメだったときにとっとく。\nあの子はさ、抜かずの宝刀でいてもらえた方が安心」
2252 = "「Để dành khi nào ý tưởng của mấy đứa không xài được.\nCon bé đó ấy à, cứ để làm bảo bối giấu kín thì yên tâm hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2123 = "「À.」"
# monologue
# JP: 問答無用で頼りになる。\n頼れるが故、容易に頼りたくはない。
3161 = "Đáng tin cậy không cần bàn cãi.\nNhưng chính vì đáng tin cậy, nên không muốn dễ dàng dựa dẫm."
# monologue
# JP: 僕のものと似たりよったりな真闇姉評を聞かされて、\n永山夫人への親近感が湧いてくる。というか、そうだ。
2944 = "Nghe nhận xét về chị Mayami gần giống hệt mình,\ntôi bỗng thấy có chút thân thiết với phu nhân Nagayama. À mà, đúng rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば日々姫はどうでしょう？　\nあれは、御一夜の」
2555 = "「Vậy thì Hibiki thì sao ạ?\nCon bé là... của Ohimitera.」"
# 【永山】
# display as 永山
# JP: 「ああ、そうよね。あのイラストマップ」
2180 = "「À, đúng rồi nhỉ. Cái bản đồ minh họa đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2387 = "「Vâng.」"
# monologue
# JP: 知っているなら話が早い。\nあのイラストマップが伝える御一夜に対する知識と愛。
3034 = "Biết rồi thì dễ nói chuyện thôi.\nKiến thức và tình yêu dành cho Ohimitera được truyền tải qua tấm bản đồ minh họa đó."
# monologue
# JP: “売りのある駅弁”を作るというなら、\nそれが何らかの形で役立ちそうに思える。
3036 = "Nếu muốn làm ra một \"hộp cơm ga tàu đắt khách\",\nthì có vẻ nó sẽ giúp ích được phần nào đó."
# 【双鉄】
# display as 雙鐵
# JP: 「それに、絵そのものも達者ですから。\n駅弁のパッケージなども」
2492 = "「Hơn nữa, bản thân nét vẽ cũng rất xuất sắc.\nVí dụ như bao bì của cơm hộp ga tàu chẳng hạn.」"
# 【永山】
# display as 永山
# JP: 「\x%l掛け紙;#00ffc040;[かけがみ,2]掛け紙%l;#;」
1756 = "「\\x%l掛け紙;#00ffc040;Giấy gói cơm hộp%l;#;」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
2155 = "「Dạ?」"
# 【永山】
# display as 永山
# JP: 「駅弁の紙外装は、\x%l掛け紙;#00ffc040;掛け紙%l;#;っていうの。\n\x%l機関士;#00ffc040;機関士%l;#;さんなのに知らないと、モグリっぽいわよ？」
2567 = "「Giấy bọc bên ngoài cơm hộp ga tàu gọi là \\x%l掛け紙;#00ffc040;giấy gói cơm hộp%l;#;.\nLà \\x%l機関士;#00ffc040;lái tàu%l;#; mà không biết thì có vẻ hơi thiếu chuyên nghiệp đấy nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はぁ」
2159 = "「À vâng.」"
# monologue
# JP: それも、いわゆる鉄道用語というヤツなのか。
3238 = "Đó cũng là cái gọi là thuật ngữ đường sắt sao."
# monologue
# JP: 弁当の包みひとつのことでも、\n鉄道知識の深さが量られるなら、軽視は出来ない。
2920 = "Dù chỉ là giấy gói cơm hộp,\nnhưng nếu nó thể hiện mức độ am hiểu về đường sắt thì không thể coi thường được."
# 【双鉄】
# display as 雙鐵
# JP: 「ご教示、痛み入ります」
2296 = "「Cảm ơn cô đã chỉ giáo.」"
# 【永山】
# display as 永山
# JP: 「ううん、別に――って、お掃除の邪魔しちゃったわね。\nごめん。時間とか、今度社長と打ち合わせといてね？」
2057 = "「Không có gì đâu——à, cô làm phiền cậu dọn dẹp rồi nhỉ.\nXin lỗi nhé. Về thời gian, lần tới cậu bàn bạc với giám đốc nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとですね？　わかりました」
2144 = "「Với Paulette ạ? Cháu hiểu rồi.」"
# 【永山】
# display as 永山
# JP: 「あたしそっちに合わせるからさ。\nじゃ、そういうことで。まったね～」
2308 = "「Cô sẽ theo lịch của bên cậu.\nVậy nhé. Gặp lại sau nha~」"
# monologue
# JP: 言うなり、振り返りもせず立ち去っていく。
2909 = "Nói xong, cô ấy bỏ đi mà không thèm ngoảnh lại."
# monologue
# JP: なんとも強気で強引な――\nしかし、妙に小気味の良い人だ。
3160 = "Một người thật mạnh mẽ và quyết đoán——\nNhưng lại mang đến cảm giác khá dễ chịu."
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　いや――冷静になれば、\n僕は勝手に日々姫を巻き込んでしまったのか？」
2229 = "「Hửm? Khoan đã——bình tĩnh nghĩ lại thì,\ncó phải mình đã tự ý kéo Hibiki vào chuyện này không?」"
# monologue
# JP: それはいかん。\n日々姫はハチロクとは違い、僕の所有物ではない。
3239 = "Thế thì không được.\nHibiki khác với Hachiroku, con bé không phải là sở hữu của tôi."
# monologue
# JP: それに、工場誘致の賛成反対うんぬんで、\nいろいろ複雑で繊細な部分を抱えていそうでもある。
3191 = "Hơn nữa, với chuyện ủng hộ hay phản đối việc mời nhà máy về,\ncó vẻ con bé cũng đang mang trong mình nhiều tâm tư phức tạp và nhạy cảm."
# 【双鉄】
# display as 雙鐵
# JP: 「うっかりしたな。日々姫に確認をとっておかねば」
2461 = "「Bất cẩn quá. Phải xác nhận lại với Hibiki mới được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな。随分と遅くなってしまった」
2458 = "「Xin lỗi nhé. Anh đến trễ quá.」"
# 【日々姫】
# display as 日日姬
# JP: 「何を言ってるんですか、兄さん。\nお仕事を優先して下さいとお願いしたのは、私ですよ？」
2089 = "「Anh nói gì vậy, anh trai.\nNgười nhờ anh ưu tiên công việc là em mà?」"
# 【日々姫】
# display as 日日姬
# JP: 「その……人前で話されたら――\n恥ずかしいかな？　っても思いましたし」
2490 = "「Với lại……nói chuyện trước mặt người khác——\nEm nghĩ chắc sẽ xấu hổ lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ。そんなものか？」
2165 = "「Hừm. Vậy sao?」"
# monologue
# JP: とはいえ、日々姫の照れ屋に、正直なところ助けられた。\n凪や永山夫人との立ち話なら、まぁ接客の範疇だ。
2743 = "Tuy nhiên, thú thực là sự bẽn lẽn của Hibiki đã cứu tôi một bàn thua trông thấy.\nViệc đứng nói chuyện với Nagi hay phu nhân Nagayama thì, chà, cũng nằm trong phạm vi tiếp khách."
# monologue
# JP: が、掃除を中止し日々姫と話し、もし長引いてしまったら\n――私語による職務放棄を犯してしまうこととなったから。
2744 = "Nhưng, nếu dừng việc dọn dẹp lại để nói chuyện với Hibiki, và lỡ kéo dài\n——thì tôi sẽ phạm phải lỗi bỏ bê công việc vì việc riêng mất."
# 【日々姫】
# display as 日日姬
# JP: 「掃除が終わったあとすぐ、ハチロクと出たの――\nレールショップだったんですか？」
2092 = "「Ngay sau khi dọn dẹp xong, anh đi cùng Hachiroku——\nlà đến cửa hàng đường sắt sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。\n名推理……というほど難しい謎でもないか」
2424 = "「Đúng vậy.\nDanh thám tử……cũng không phải bí ẩn gì khó đoán lắm nhỉ.」"
# monologue
# JP: まぁそうですね、と軽く笑って、\n日々姫は少し上目を使い――スネた感じで僕を見る。
3120 = "Cười nhẹ một cái như thể nói \"Vâng, đúng vậy\",\nHibiki hơi ngước mắt lên——nhìn tôi với vẻ hờn dỗi."
# 【日々姫】
# display as 日日姬
# JP: 「ポーレットさん、\n兄さんに何のご用事だったんですか？」
2429 = "「Chị Paulette,\ntìm anh trai có việc gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;の乗務訓練についての細かなツメだ」
2392 = "「Là bàn bạc chi tiết về việc huấn luyện nghiệp vụ trên tàu \\x%l8620;#00ffc040;8620%l;#;.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そのことですか。何か、決まりましたか？」
2183 = "「A, chuyện đó sao. Có quyết định được gì chưa ạ?」"
# monologue
# JP: 『\x%l機関助士;#00ffc040;機関助士%l;#;としての仕事は、全て兄さんの指示に従う』\n日々姫はそういい、委細を僕に完全に任せてくれている。
3075 = "『Công việc với tư cách là \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;, em sẽ hoàn toàn tuân theo chỉ thị của anh trai』\nHibiki đã nói vậy, và hoàn toàn giao phó mọi chi tiết cho tôi."
# monologue
# JP: その信頼を裏切らんためにも、\nいいかげんなことは決してしたくない――のだが。
3141 = "Để không phụ sự tin tưởng đó,\ntôi tuyệt đối không muốn làm việc cẩu thả——tuy nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「決まったのは、乗務訓練の時間を夜。\n[しゅぞう,1]酒蔵の閉まった後の時間にということぐらいだ」
2305 = "「Điều đã quyết định là, thời gian huấn luyện sẽ vào buổi tối.\nChỉ là vào khoảng thời gian sau khi xưởng rượu đóng cửa thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、それは助かります。[しゅぞう,1]酒蔵のことにも支障が出ないし、\n夜からの訓練の方が、お風呂だって便利――」
2197 = "「A, vậy thì đỡ quá. Sẽ không ảnh hưởng đến việc của xưởng rượu,\nmà huấn luyện từ tối thì tắm rửa cũng tiện hơn——」"
# monologue
# JP: 言って、言葉を飲み込んで、日々姫はぽぽぽと赤くなる。
3102 = "Nói đến đó, Hibiki nuốt lời vào trong, mặt đỏ bừng lên."
# monologue
# JP: 年頃の兄妹だから照れると以前に聞いてはいたが――\n最近は、慣れてきたのかと思っていた。
2887 = "Trước đây tôi có nghe nói vì là anh em đang tuổi lớn nên sẽ thấy ngại ngùng——\nNhưng dạo gần đây, tôi cứ tưởng em ấy đã quen rồi chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「それ以上は、こう――\nどんどんと話が専門的になってしまって」
2432 = "「Hơn thế nữa thì, kiểu——\nCâu chuyện ngày càng trở nên chuyên môn hóa.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ」
2530 = "「À.」"
# monologue
# JP: 日々姫の“ああ”、に、兄妹ふたり頷き合う。\nただそれだけで、説明は十二分に足りてしまう。
3100 = "Trước tiếng \"À\" của Hibiki, hai anh em cùng gật đầu với nhau.\nChỉ cần vậy thôi, cũng đã quá đủ để giải thích rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「手持ち無沙汰でいたら、ハチロクが言ってくれたのだ。\n『話はまだまだ長引きます。先に戻って下さいまし』と」
2262 = "「Lúc anh đang rảnh rỗi không biết làm gì, thì Hachiroku đã nói.\n『Chuyện này sẽ còn kéo dài lắm. Ngài hãy về trước đi ạ』.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうなんですか？」
2381 = "「Vậy sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「酒蔵内で、僕が日々姫に話しかけたのを覚えていたのだ。\n『日々姫を待たせては気の毒です』とも言っていた」
2244 = "「Cô ấy nhớ lúc trong xưởng rượu, anh đã bắt chuyện với Hibiki.\nCô ấy còn bảo 『Để Hibiki phải đợi thì tội nghiệp lắm』.」"
# 【日々姫】
# display as 日日姬
# JP: 「に、にぃ――んんっ、兄さんが、大声を出すからですよ。\nいきなり……そのっ、『大事な話がある』だなんて」
2557 = "「L, là do anh ha——ưm, do anh trai nói to quá đấy.\nTự nhiên lại……bảo là, 『Anh có chuyện quan trọng muốn nói』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだった。まずはその大事な話からだな」
2261 = "「Đúng rồi. Trước tiên phải bắt đầu từ chuyện quan trọng đó đã.」"
# 【日々姫】
# display as 日日姬
# JP: 「は、はひっ！」
2246 = "「V, vâng!」"
# monologue
# JP: 日々姫がピンと背筋を伸ばす。
3106 = "Hibiki thẳng lưng lên cái rụp."
# 【日々姫】
# display as 日日姬
# JP: 「にゃ、な、なんでしょう。\nにぃに――んんっ、兄さんの、だ、大事な話。って」
2559 = "「N-n-nhưng mà có chuyện gì thế ạ.\nAnh hai——ưm, ý em là chuyện q-quan trọng mà anh trai nói, là gì vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。駅弁のことなのだが」
2162 = "「Ừm. Về chuyện cơm hộp nhà ga ấy mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「えきべんっ！」
2569 = "「Cơm hộp nhà ga!」"
# monologue
# JP: 日々姫が突っ伏す。\n畳の上に、豪快に。
3072 = "Hibiki gục mặt xuống.\nNgã cái rầm xuống chiếu tatami."
# monologue
# JP: わかってました、わかってました、わかってましたと\n三度言い、それからゆっくり、体を起こす。
2910 = "Con bé nói ba lần \"Em biết ngay mà, em biết ngay mà, em biết ngay mà\",\nrồi từ từ ngồi dậy."
# 【日々姫】
# display as 日日姬
# JP: 「……ゆぅれぇでらの奥さんからのお話ですかぁ～」
1778 = "「……Là chuyện của phu nhân chùa Yuurei đúng không ạ~」"
# monologue
# JP: どろどろと幽霊を呼べそうな――恨めしそうなその口調。\nなかなかどうして、日々姫も雰囲気に凝るものだ。
2905 = "Giọng điệu oán trách——nghe như đang gọi hồn ma vất vưởng ấy.\nRa là vậy, Hibiki cũng biết cách tạo bầu không khí gớm nhỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「知り合いか？　ならば話が早い」
2088 = "「Em quen phu nhân ấy à? Vậy thì nói chuyện nhanh thôi.」"
# monologue
# JP: パッケージ、いやさ\x%l掛け紙;#00ffc040;掛け紙%l;#;のことを含めた\n駅弁まわりの話を全て、日々姫は素直に聞いてくれる。
3118 = "Hibiki ngoan ngoãn lắng nghe toàn bộ câu chuyện về cơm hộp nhà ga,\nbao gồm cả chuyện bao bì, à không, \\x%l掛け紙;#00ffc040;giấy gói cơm hộp%l;#;."
# 【日々姫】
# display as 日日姬
# JP: 「……そういうお話でしたら、ちょうどいい気がします。\n私も、ハチロクたちのこと――」
1784 = "「……Nếu là chuyện đó thì em thấy cũng hợp lý đấy ạ.\nEm cũng đối với chị Hachiroku và mọi người——」"
# monologue
# JP: いいかけ、急に日々姫は視線を窓の外へと向ける。
3223 = "Đang nói dở, Hibiki chợt hướng ánh mắt ra ngoài cửa sổ."
# 【日々姫】
# display as 日日姬
# JP: 「ハチロク、あの子帰りは？　迎えにとか」
2109 = "「Hachiroku lúc về thì sao ạ? Anh không đi đón sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「不要だ。ナビが送ってくれる」
2051 = "「Không cần đâu. Navi sẽ đưa cô ấy về.」"
# 【日々姫】
# display as 日日姬
# JP: 「ナビが？　え、でも」
2593 = "「Navi ạ? Ơ, nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「判断したのだろう。ハチロクに何か不幸があれば、\n僕が、ナビの認める僕ではなくなると」
2590 = "「Chắc cô ấy đã đánh giá tình hình rồi. Nếu Hachiroku gặp chuyện không may,\ntôi sẽ không còn là người mà Navi công nhận nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ、それで――それで？」
2189 = "「A, ra là vậy——rồi sao nữa ạ?」"
# monologue
# JP: ほっとした顔。\nそれからすぐさまじとっと僕を責めるような目。
3123 = "Khuôn mặt con bé lộ vẻ nhẹ nhõm.\nNhưng ngay sau đó lại lườm tôi với ánh mắt như đang trách móc."
# monologue
# JP: 今日の日々姫も、絶好調の百面相だ。
2890 = "Hibiki hôm nay cũng bộc lộ vô vàn biểu cảm xuất sắc."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　まだ何か心配なのか？」
2288 = "「Sao vậy? Em vẫn còn lo lắng chuyện gì à?」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ……いえ、そうじゃなくって――」
2203 = "「A……không, không phải chuyện đó——」"
# monologue
# JP: 今度は、少し甘えた目。
3242 = "Lần này, ánh mắt con bé có chút nũng nịu."
# 【日々姫】
# display as 日日姬
# JP: 「……なりたいなぁ、って思っただけです。\n私も、ナビに――送ってもらえるような存在に」
1782 = "「……Em chỉ nghĩ là, em cũng muốn được như thế thôi.\nMuốn trở thành người——được Navi đưa về.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2530 = "「這樣啊」" 
# monologue
# JP: なるほど、そういう理由もあったか。
2825 = "Ra là vậy, còn có lý do đó nữa sao."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は、\x%lエアクラ;#00ffc040;エアクラ%l;#;そのものも好きなのだな」
2357 = "「Hibiki cũng thích bản thân \\x%lエアクラ;#00ffc040;Aircra%l;#; nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「んにゃっ！？　な、なんでそぎゃんと結論にっ！？」
2201 = "「Nya!? S-Sao anh lại rút ra kết luận như thế chứ!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんでもなにも、以前に言っていただろう、\n『ナビのことはあまり好かん』と」
2079 = "「Sao với trăng gì, trước đây em từng nói mà,\n『Em không thích Navi cho lắm』.」"
# monologue
# JP: にも関わらず、飛行\x%lエアクラ;#00ffc040;エアクラ%l;#;に乗りたいのなら、\nそれはつまりは、\x%lエアクラ;#00ffc040;エアクラ%l;#;好きという結論になる。
2760 = "Mặc dù vậy mà em vẫn muốn ngồi \\x%lエアクラ;#00ffc040;Aircra%l;#; loại bay được,\nđiều đó có nghĩa là em thích \\x%lエアクラ;#00ffc040;Aircra%l;#;, kết luận là vậy."
# monologue
# JP: 理屈の路をきっちり整え――\nなのに日々姫は、今度はうんざり顔を見せる。
2992 = "Tôi sắp xếp logic một cách rành mạch——\nThế nhưng lần này, Hibiki lại tỏ vẻ chán nản."
# 【日々姫】
# display as 日日姬
# JP: 「……にぃにって、どこまで――」
1787 = "「……Anh hai rốt cuộc đến mức nào——」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、随分と不満そうだな。\nああ、そうだな。なら、僕が乗せてやろう」
2287 = "「Gì chứ, trông em có vẻ bất mãn quá nhỉ.\nA, đúng rồi. Vậy thì để anh chở em nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「だからそういう話じゃなか――え？　なっ！？\nの、乗せてくれると？　にぃにと、一緒に？」
2562 = "「Đã bảo không phải chuyện đó——Hả? Gì cơ!?\nA-Anh sẽ chở em á? Cùng với anh hai á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。多少は窮屈になるかもしれんが」
2213 = "「Ừm. Dù có thể sẽ hơi chật chội một chút.」"
# 【日々姫】
# display as 日日姬
# JP: 「歓迎！　窮屈歓迎ばいっ！　っていうか、\n約束！　ゆびきりすっと！！」
2249 = "「Hoan nghênh! Chật chội cũng hoan nghênh luôn!\nMà phải hứa nhé! Ngoắc tay đi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「構わんぞ。それ、\n『ゆーびきーりげーんまん』」
2135 = "「Được thôi. Nào,\n『Ngoắc tay thề ước』」"
# 【日々姫】
# display as 日日姬
# JP: 「『うーそつーいたら\nはーりせんぼんのーます』」
2043 = "「『Ai nói dối\nsẽ phải nuốt một nghìn cây kim』」"
# 【双鉄】
# display as 雙鐵＆日日姬
# JP: 「『ゆびきった』」
2053 = "「『Đã ngoắc tay』」"
# monologue
# JP: ……日々姫と指切りげんまんするなど、\n何年ぶりのことになろうか。
1733 = "……Đã bao nhiêu năm rồi tôi mới lại\nngoắc tay thề ước với Hibiki thế này nhỉ."
# monologue
# JP: 日々姫もそれを思い出そうとしてるのか、\n小指をしきりに、大切そうにさすっている。
3096 = "Chắc Hibiki cũng đang cố nhớ lại điều đó,\ncon bé cứ liên tục xoa xoa ngón út một cách đầy trân trọng."
# 【日々姫】
# display as 日日姬
# JP: 「そ、それでっ！　にぃに――んんっ、兄さん」
2434 = "「S-Sau đó thì! Anh hai——ưm, anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
2227 = "「Hửm?」"
# monologue
# JP: 真っ赤な顔をぶんぶん振って深呼吸して、\n日々姫はやがて――僕をまっすぐ、まっすぐ見つめる。
3104 = "Lắc mạnh khuôn mặt đang đỏ bừng rồi hít một hơi thật sâu,\nHibiki cuối cùng——nhìn thẳng, nhìn chằm chằm vào tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ええと。ちょうどいい機会だと思うから、\n聞いてもいいですか？　改めて、担保のこと」
2140 = "「Ưm. Em nghĩ đây là cơ hội tốt,\nem hỏi được không ạ? Một lần nữa, về chuyện thế chấp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
2440 = "「Tất nhiên rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あのっ――\n…………………………………………」
2547 = "「Chuyện là——\n…………………………………………」"
# monologue
# JP: そこまでで、日々姫は言葉を見失ってしまったようだ。\n待てど暮らせど続かぬ言葉を、ならばと僕が補ってみる。
3097 = "Đến đó, Hibiki dường như không biết phải nói gì tiếp theo.\nĐợi mãi mà con bé vẫn không nói tiếp, vậy nên tôi đành nói đỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「担保というのは、借金を返せぬときに、\nその代替として処分され補填にあてられる物件のことだ」
2347 = "「Thế chấp là vật phẩm sẽ bị mang đi xử lý để bù đắp thay thế\nkhi không thể trả được nợ.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　あ、はい」
2156 = "「Hả? A, vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「故に、返済期限以前に担保が処分されることは無い。\nナビならいつでも、僕とお前とを乗せてくれるぞ？」
2327 = "「Do đó, vật thế chấp sẽ không bị xử lý trước thời hạn trả nợ.\nNavi lúc nào cũng có thể chở anh và em mà?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――いえ、あの……それは安心で嬉しいです。\nけど、その」
2168 = "「A——không, chuyện đó... nghe vậy em cũng yên tâm và vui lắm.\nNhưng mà, chuyện đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2227 = "「嗯？」" 
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――兄さんも……その――\n担保、なりかかったじゃないですか」
2576 = "「Anh hai——anh trai cũng... ừm——\nsuýt chút nữa đã trở thành vật thế chấp rồi còn gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだったな」
2191 = "「A, đúng là vậy nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「その、担保うんぬんの話のとき――\n兄さんが、銀行の跡取り候補になりかかったとき」
2551 = "「Lúc nói về chuyện thế chấp ấy——\nlúc anh trai suýt trở thành ứng cử viên thừa kế ngân hàng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……」
1769 = "「……」"
# monologue
# JP: 跡取り候補、と、そこまで言われてはいなかった。
3210 = "Ứng cử viên thừa kế, chưa ai nói đến mức đó cả."
# monologue
# JP: ただ、銀行に入行し、\n経営の勉強をというだけの話だったはずだが。
3258 = "Lẽ ra chỉ là chuyện vào ngân hàng làm việc,\nvà học hỏi về quản lý kinh doanh thôi chứ."
# 【日々姫】
# display as 日日姬
# JP: 「『何もいわなかった』んですよね？　稀咲センパイ」
2483 = "「Chị Kisaki 『không nói gì cả』 đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲か？　ああ、全く。\nそのことに関しては一言も発していなかったように思う」
2481 = "「Kisaki á? À, hoàn toàn không.\nAnh nhớ là cô ấy không hề nói một lời nào về chuyện đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「つまり、反対も拒絶もしなかった」
2070 = "「Nói cách khác, chị ấy không phản đối cũng không từ chối.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。賛意も示してはいなかったが」
2375 = "「Đúng vậy. Dù cô ấy cũng không tỏ ý tán thành.」"
# 【日々姫】
# display as 日日姬
# JP: 「いいえ、それだけで十分です」
2060 = "「Không, chỉ vậy là đủ rồi.」"
# monologue
# JP: ふふふと、日々姫の腹の底からの笑いが響く。
3108 = "Fufufu, tiếng cười phát ra từ tận đáy lòng của Hibiki vang lên."
# monologue
# JP: 義理とはいえど兄の僕さえ、\n初めて耳にする笑いが。
3244 = "Dù là anh trai nuôi, nhưng đây là lần đầu tiên\ntôi nghe thấy tiếng cười như vậy."
# 【日々姫】
# display as 日日姬
# JP: 「理解しました。出来ました。\n私少しも――有利になんてなってない」
2315 = "「Em hiểu rồi. Em làm được rồi.\nEm chẳng hề——chiếm ưu thế chút nào cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2380 = "「是嗎」" 
# monologue
# JP: 何に対してかはわからんが、\n日々姫は気迫に満ち満ちている。
3267 = "Không biết là đối với chuyện gì,\nnhưng Hibiki đang tràn đầy khí thế."
# 【日々姫】
# display as 日日姬
# JP: 「ですから兄さん。\n少し、手伝って欲しいんですけど」
2323 = "「Vì vậy anh trai này.\nEm muốn anh giúp một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「任せておけ」
2075 = "「Cứ giao cho anh.」"
# monologue
# JP: 内容も聞かぬうちから、即応している。
3011 = "Dù chưa nghe nội dung là gì, tôi đã đáp ứng ngay lập tức."
# monologue
# JP: 僕は[あに,1]義兄、日々姫は[いもうと,1]義妹。\nその手が救いを求めるのなら、拒むことなどありえない。
2990 = "Tôi là anh trai nuôi, Hibiki là em gái nuôi.\nNếu bàn tay ấy cầu cứu, tôi không có lý do gì để từ chối cả."
# 【日々姫】
# display as 日日姬
# JP: 「でしたら、私を――\n[つぎ]次の[ま]間……あの部屋に通してください」
2560 = "「Nếu vậy, xin hãy cho em——\nvào phòng gian kế tiếp... căn phòng đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「目当てのものはありそうか？」
2533 = "「Em nghĩ trong đó có thứ em đang tìm sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「ありそうっていうか……\n多分、しらみつぶしにしたら多くて困りますよね、これ」
2496 = "「Nói là có thì……\nChắc là nếu tìm kiếm kỹ lưỡng thì sẽ nhiều đến mức đau đầu luôn nhỉ.」"
# monologue
# JP: 僕の私室の“次の間”は、\n汰斗さんの遺品を押しこみまくった――実質的には物置だ。
3012 = "\"Gian kế tiếp\" trong phòng riêng của tôi,\nlà nơi nhồi nhét di vật của ông Taito——thực chất là một cái nhà kho."
# monologue
# JP: 探索を何度かしているとはいえ、\n整理するには及んでいない。
3270 = "Mặc dù đã lục lọi vài lần,\nnhưng tôi vẫn chưa dọn dẹp lại."
# 【双鉄】
# display as 雙鐵
# JP: 「手伝おう。探すのは、[ハチロクニイマル,3]8620とハチロク関係のもの。\nで間違いないか？」
2303 = "「Anh sẽ giúp. Thứ cần tìm là những món liên quan đến 8620 và Hachiroku.\nKhông sai chứ?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい。それはもちろんです。それと――」
2212 = "「Vâng. Tất nhiên là vậy rồi. Với lại——」"
# monologue
# JP: 日々姫の指が、その唇に当てられる。
3107 = "Hibiki đặt ngón tay lên môi."
# monologue
# JP: 思いの外に、長く、細く、\nさすが絵描きの指であるなと、妙に感心してしまう。
2901 = "Ngón tay dài và thon thả đến bất ngờ,\ntôi chợt cảm thán quả không hổ danh là ngón tay của họa sĩ."
# 【日々姫】
# display as 日日姬
# JP: 「――\x%l掛け紙;#00ffc040;掛け紙%l;#;のデザインだけじゃなくて、\nお弁当の中身もですよね？　頼まれてるのって」
1760 = "「——Không chỉ thiết kế \\x%l掛け紙;#00ffc040;giấy gói cơm hộp%l;#;,\nmà còn cả phần nhân bên trong cơm hộp nữa đúng không? Chuyện anh được nhờ ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、そうだな。\nゼロから作るのも考えているという話であった」
2192 = "「À, đúng vậy.\nCô ấy nói là đang cân nhắc việc làm lại từ đầu.」"
# 【日々姫】
# display as 日日姬
# JP: 「でしたら、もっとたくさん、画像資料が欲しいですね」
2552 = "「Nếu vậy thì em muốn có thêm thật nhiều tư liệu hình ảnh nữa.」"
# monologue
# JP: 言いながら、\n日々姫はメモとペンとを取り出し、書き付け始める。
2886 = "Vừa nói,\nHibiki vừa lấy giấy bút ra và bắt đầu ghi chép."
# 【日々姫】
# display as 日日姬
# JP: 「ハチロクちゃんたち、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;全般に関するもの。\nそれから、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;全盛の頃の町並みとか食べ物とか」
2573 = "「Những thứ liên quan đến chị Hachiroku và \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; nói chung.\nSau đó là cảnh phố xá, đồ ăn thức uống thời kỳ hoàng kim của \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2214 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「その当時の人達の部屋とか服装の資料も欲しいし、\n駅とか鉄道関係のも、全般あったら嬉しいです」
2074 = "「Em cũng muốn có tư liệu về phòng ốc, trang phục của người thời đó,\nnếu có toàn bộ những thứ liên quan đến nhà ga hay đường sắt thì tốt quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「つまり\x%l8620;#00ffc040;8620%l;#;とハチロク関係のものは、時間を絞らず。\nハチロク達の時代のものは、範囲を狭めず探せばよいか」
2067 = "「Tóm lại, những thứ liên quan đến \\x%l8620;#00ffc040;8620%l;#; và Hachiroku thì không giới hạn thời gian.\nCòn những thứ thuộc thời đại của Hachiroku thì cứ tìm kiếm không giới hạn phạm vi là được chứ gì.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そげそげ！　そぎゃんこったい！\nにぃにぃ、凄か――っと、んっ――兄さん、凄いですね」
2181 = "「A, đúng rồi! Chính là vậy đó!\nAnh hai, giỏi qu—á, ưm——anh trai, giỏi quá đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。凄いのはお前のほうだ」
2056 = "「Không. Người giỏi là em mới đúng.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 2155 = "「哎？」" 
# monologue
# JP: それ以上、言葉で説明するつもりはなく。\nけれど日々姫は、僕から視線を外してくれない。
2964 = "Tôi không định giải thích thêm bằng lời.\nNhưng Hibiki vẫn không chịu rời mắt khỏi tôi."
# monologue
# JP: なら仕方がない。\n誤解を招いたりはせぬよう、言葉を選んで伝えてみよう。
3255 = "Vậy thì đành chịu.\nĐể tránh gây hiểu lầm, tôi sẽ cẩn thận chọn lọc từ ngữ để truyền đạt."
# 【双鉄】
# display as 雙鐵
# JP: 「その――たかだか\x%l掛け紙;#00ffc040;掛け紙%l;#;一枚、弁当ひとつといっては\nあまりに申し訳ないのだが――」
2545 = "「Chuyện đó——chỉ vì một tờ \\x%l掛け紙;#00ffc040;giấy gói cơm hộp%l;#;, một hộp cơm\nmà phải làm đến mức này thì anh thấy thật có lỗi——」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ、そんなことですか」
2185 = "「A, ra là chuyện đó sao.」"
# monologue
# JP: あっさりと。\n日々姫は僕の言葉を受け止め、不意に表情を引き締める。
3117 = "Một cách dứt khoát.\nHibiki đón nhận lời nói của tôi, rồi bất ngờ thay đổi sắc mặt nghiêm túc."
# 【日々姫】
# display as 日日姬
# JP: 「『僕には、どの道が正解なのかがわからんのだ』」
1765 = "「『Anh không biết con đường nào mới là chính xác』」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 2589 = "「！？」" 
# 【日々姫】
# display as 日日姬
# JP: 「『だから、その道が間違いであると決まるまで。\n　今進む道が正しいと信じ、懸命に歩く他は知らない』」
1766 = "「『Thế nên, cho đến khi con đường đó được chứng minh là sai lầm.\n　Anh không còn cách nào khác ngoài việc tin rằng con đường mình đang đi là đúng và dốc sức bước tiếp』」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1768 = "「…………」"
# monologue
# JP: 僕の言葉だ。\n紛れも無い。
3243 = "Đó là lời của tôi.\nKhông thể lẫn vào đâu được."
# monologue
# JP: いつ、どこでどのように日々姫に伝えたか、\nまるで思い出せないけれども――
3268 = "Tôi hoàn toàn không nhớ đã nói với Hibiki\nvào lúc nào, ở đâu và như thế nào——"
# 【日々姫】
# display as 日日姬
# JP: 「同じことをしているだけです。\nわたし、兄さんの妹ですから」
2325 = "「Em cũng chỉ đang làm điều tương tự thôi.\nVì em là em gái của anh trai mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――\nそうか。そうなのか」
2172 = "「A——\nVậy sao. Ra là vậy.」"
# monologue
# JP: 日々姫にも、いつかたどり着きたい場所がある。\nそしてそこへたどり着くため、絵を描いている。
3082 = "Hibiki cũng có một nơi mà con bé muốn đến vào một ngày nào đó.\nVà để đến được đó, con bé đang vẽ tranh."
# monologue
# JP: どの絵がそこへの鍵であるのか、そこへの扉を開くのか――\nわからぬゆえ、全ての絵へとその全力を注ぐのだ。
2874 = "Bức tranh nào mới là chiếc chìa khóa, bức tranh nào sẽ mở ra cánh cửa dẫn đến đó——\nVì không biết, nên con bé mới dốc toàn lực vào mọi bức tranh."
# 【双鉄】
# display as 雙鐵
# JP: 「バカなことを言ってしまった。自分がひどく恥ずかしい。\n日々姫の気持ちも理解せず――」
2383 = "「Anh lại nói lời ngớ ngẩn rồi. Anh thấy thật xấu hổ về bản thân.\nĐã không hiểu được cảm xúc của Hibiki——」"
# 【日々姫】
# display as 日日姬
# JP: 「理解、してくれてますか？　\n私の気持ち」
2102 = "「Anh có, hiểu được không? \nCảm xúc của em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 2166 = "「唔？」" 
# monologue
# JP: 何を、日々姫は問うているのか。
3083 = "Hibiki đang hỏi điều gì cơ chứ."
# monologue
# JP: 尋ね返そうとするより早く、\n日々姫は、穏やかに問いを重ねる。
2993 = "Nhanh hơn cả lúc tôi định hỏi lại,\nHibiki đã nhẹ nhàng bồi thêm câu hỏi."
# 【日々姫】
# display as 日日姬
# JP: 「いつか、正しい道に当たって、歩き切ったとして。\n目指したゴールの――その先、兄さんにはありますか？」
2484 = "「Giả sử một ngày nào đó, anh đi đúng đường và đi đến tận cùng.\nPhía sau đích đến đó——anh trai có dự định gì không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
2588 = "「!!」"
# monologue
# JP: 答え、られない。
2998 = "Tôi, không thể trả lời."
# monologue
# JP: 問われてはっきりわかったのは、日々姫にとっては、\nゴールは終わりではないということだけだ。
3196 = "Bị hỏi như vậy, điều duy nhất tôi nhận ra rõ ràng là đối với Hibiki,\nđích đến không phải là sự kết thúc."
# monologue
# JP: （終着駅に……着いて。\n――それから）
3287 = "（Đến... ga cuối.\n——Rồi sao nữa）"
# monologue
# JP: “それから”のことなど一度も、\n今までただの一度たりとも、考えてみたことがなかった。
1726 = "Về chuyện \"rồi sao nữa\", tôi chưa từng,\ncho đến tận bây giờ, dù chỉ một lần, nghĩ đến."
# monologue
# JP: であるのならば、僕は恐らくこの点で、\n日々姫を“理解”し得ないだろう。
3038 = "Nếu vậy thì có lẽ ở điểm này,\ntôi không thể nào \"hiểu\" được Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「ごめん、にぃに。\n私、少ぉし意地悪なこといっちゃったばい」
2260 = "「Xin lỗi anh hai.\nEm lỡ nói mấy lời hơi xấu tính mất rồi.」"
# monologue
# JP: わざと、だろう。
3125 = "Chắc chắn là cố tình rồi."
# monologue
# JP: いつもの怒涛の、流れるようなものとは違い、\nいささかギクシャク、日々姫が隈元弁を繰る。
3115 = "Khác với sự tuôn trào trôi chảy như mọi khi,\nHibiki nói tiếng Kumamoto có phần gượng gạo."
# 【日々姫】
# display as 日日姬
# JP: 「本、探そ？\n早よせんと、ハチロクちゃんも帰ってくるけんね」
2304 = "「Tìm sách thôi nào?\nKhông nhanh lên là chị Hachiroku về tới bây giờ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そうだな」
2163 = "「Ừm. Đúng vậy.」"
# monologue
# JP: 悩んでも答えが見つからぬなら、\n今できることをするべきだ。
3032 = "Nếu có suy nghĩ mãi cũng không tìm ra câu trả lời,\nthì nên làm những việc có thể làm lúc này."
# monologue
# JP: その割り切りは、苦手ではない。\n体を愚直に動かせば、すぐに頭も追いついてくる。
2959 = "Tôi không hề kém cỏi trong việc dứt khoát như vậy.\nChỉ cần chăm chỉ vận động tay chân, đầu óc sẽ nhanh chóng bắt kịp thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「この辺は――ざらっといけるな。\nこちらは……ああ、当時の学園の制服か」
2527 = "「Chỗ này——có thể lướt qua nhanh được.\nCòn bên này... a, đồng phục học sinh thời đó sao.」"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;形の稼働期間は驚くほどの長きにわたるが、\nその全盛なら、やはり\x%l大戦;#00ffc040;大戦%l;#;の直前のようだ。
77 = "Thời gian hoạt động của dòng \\x%l8620;#00ffc040;8620%l;#; dài đến kinh ngạc,\nnhưng thời kỳ hoàng kim của nó, quả nhiên là ngay trước \\x%l大戦;#00ffc040;Đại chiến%l;#;."
# monologue
# JP: \x%l大戦;#00ffc040;大戦%l;#;前の人や景色は、\n今とは大きく異なって、それでもどこか共通している。
2884 = "Con người và cảnh vật trước \\x%l大戦;#00ffc040;Đại chiến%l;#;,\ntuy khác xa bây giờ, nhưng vẫn có nét gì đó tương đồng."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。時代を輪切りにすれば、\n様々な物が見えてくるのだな」
2122 = "「Ra là vậy. Nếu chia cắt từng thời đại,\nsẽ thấy được rất nhiều thứ.」"
# monologue
# JP: 事物という縦軸と、時代という横軸と。
2854 = "Trục tung là sự vật, trục hoành là thời đại."
# monologue
# JP: そのどちらにも目を配るから、\n日々姫の絵は、平板なものにならぬのだろう。
2928 = "Chính vì chú ý đến cả hai điều đó,\nnên tranh của Hibiki mới không bị đơn điệu."
# monologue
# JP: （ならば全ての絵を……\n日々姫は、そうして描いてきたのか――）
3340 = "（Vậy ra tất cả các bức tranh...\nHibiki đều vẽ theo cách đó sao——）"
# monologue
# JP: 絵一枚、線一本の向こうにどれほどの景色があるのか――\n産まれて初めて想像し、平伏したい気持ちにさえなる。
2876 = "Phía sau một bức tranh, một nét vẽ chứa đựng biết bao cảnh sắc——\nLần đầu tiên trong đời tôi tưởng tượng ra điều đó, và thậm chí còn muốn cúi rạp mình thán phục."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに。\nね、にぃにぃ！」
2577 = "「Anh hai.\nNày, anh hai!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2227 = "「嗯？」" 
# monologue
# JP: 日々姫だ。
3126 = "Là Hibiki."
# monologue
# JP: あれほど大人びたことをいい僕を感心させておき、\n今は一転、子供のような声を出す。
2819 = "Mới vừa nói những lời chín chắn khiến tôi nể phục,\ngiờ lại quay ngoắt sang giọng điệu trẻ con."
# 【日々姫】
# display as 日日姬
# JP: 「ね？　あれ、読めっと？\nあの、一番上の、青か本の背表紙」
2318 = "「Này? Anh đọc được chữ kia không?\nCái gáy sách màu xanh, ở trên cùng ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「一番上の、青い――あれか」
2403 = "「Cuốn màu xanh, ở trên cùng——cuốn đó sao.」"
# monologue
# JP: 細かい文字と大きな文字とが並んでいる。
3182 = "Những dòng chữ nhỏ và chữ lớn nằm san sát nhau."
# monologue
# JP: 細かい方が厳しいが、\n目を細めれば――ああ、うむ、いける。
3271 = "Chữ nhỏ thì hơi khó nhìn,\nnhưng nếu nheo mắt lại——a, ừm, đọc được."
# 【双鉄】
# display as 雙鐵
# JP: 「『日ノ本帝有鐵道、蒸気機関車設計図面集』」
1789 = "「『Đường sắt Hoàng gia Hinomoto, Tập bản vẽ thiết kế đầu máy hơi nước』」"
# 【日々姫】
# display as 日日姬
# JP: 「大当たりーーーっ！\nね？　にぃにぃ、この本、超一級の資料っぽいばい？」
2064 = "「Trúng phóc rồi---!\nThấy chưa? Anh hai, cuốn sách này, có vẻ là tư liệu siêu cấp đấy nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――うん。そうだな。設計図面集、だものな」
2170 = "「A——ừm. Đúng vậy. Tập bản vẽ thiết kế cơ mà.」"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;改修前に、これを見つけていられたならば――
2917 = "Nếu tìm thấy cuốn này trước khi cải tạo \\x%l8620;#00ffc040;8620%l;#; thì tốt biết mấy——"
# monologue
# JP: いや、今からだって、整備点検保守等々の役にも必ず、\n立つはずだ。
2746 = "Không, kể cả bây giờ, chắc chắn nó vẫn sẽ có ích\ncho việc bảo dưỡng, kiểm tra, sửa chữa các thứ."
# 【日々姫】
# display as 日日姬
# JP: 「[きゃたつ,1]脚立脚立」
2406 = "「Thang xếp, thang xếp đâu rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、おい」
2177 = "「A, này.」"
# monologue
# JP: 危ないから僕が取る、\nと、いうより先に、日々姫が脚立に登ってしまう。
2995 = "Nguy hiểm lắm để anh lấy cho,\ntôi chưa kịp nói xong thì Hibiki đã trèo lên thang mất rồi."
# monologue
# JP: そうなればもう、下から支える他にない。
3042 = "Đã vậy thì tôi chỉ còn cách đỡ từ bên dưới."
# 【日々姫】
# display as 日日姬
# JP: 「ね。にぃに。足、すべらせたら受け止めれるよー、\nう……う――上っ！　上ば、ちゃんと見とって、ねっ？」
2549 = "「Này. Anh hai. Nếu em trượt chân thì phải đỡ lấy em đó,\nư... ư——bên trên! Nhớ nhìn kỹ bên trên, nha?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2214 = "「嗯」" 
# monologue
# JP: 上を見る。
2997 = "Tôi nhìn lên trên."
# monologue
# JP: ああ――ポーレットのときと同じく、\nほとんど下着が見えそうだ。
2861 = "A——giống như hồi Paulette,\ngần như có thể nhìn thấy cả đồ lót."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。落ちないように、しっかり見ている」
2422 = "「Không sao đâu. Anh đang nhìn kỹ để em không bị ngã đây.」"
# monologue
# JP: だが、幸い。\n驚いて大声をあげてしまうれいなは、ここにはいない。
2741 = "Nhưng, may thay.\nỞ đây không có Reina, người sẽ hét toáng lên vì ngạc nhiên."
# monologue
# JP: 僕がうかつなことを言わねば、\n日々姫がパニックを起こすようなことも無い。
2842 = "Chỉ cần tôi không nói hớ điều gì,\nthì Hibiki cũng sẽ không hoảng loạn."
# 【日々姫】
# display as 日日姬
# JP: 「そ……そう、なんだ。\nにぃに――しっかり……見て、るんだ」
2368 = "「V... Vậy, sao.\nAnh hai——đang nhìn... rất kỹ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2214 = "「嗯」" 
# monologue
# JP: もぞもぞ、日々姫の内股が微妙に動く。
3109 = "Cựa quậy, đùi trong của Hibiki cử động một cách tinh tế."
# monologue
# JP: 尿意に耐える仕草のようで、何かが違うような気もする。\nが、いずれにせよ――
2914 = "Trông giống như điệu bộ nhịn tiểu, nhưng tôi có cảm giác gì đó khác biệt.\nNhưng, dù sao đi nữa——"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、足をいたずらに動かすな。\n三点保持をしっかりせねば、危ないぞ」
2359 = "「Hibiki, đừng có cử động chân lung tung.\nKhông giữ chắc ba điểm là nguy hiểm lắm đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、足？　私、足――あの、動いてっ――」
2495 = "「Ch, chân á? Em, chân——ưm, đang cử động——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。今もだ。\nひどくそわそわ……うずうずという感じに動いている」
2220 = "「Ừm. Ngay lúc này đây.\nĐang cử động với vẻ vô cùng bồn chồn... rạo rực.」"
# 【日々姫】
# display as 日日姬
# JP: 「そ、それば、見て――足とか、を、見てっ……\nにぃにぃ、は」
2454 = "「C, cái đó, nhìn——nhìn chân, các thứ...\nAnh hai, thì sao.」"
# monologue
# JP: ぽたりと、額に何かが落ちる。\n汗か――と思えば異変に気づく。
3174 = "Tí tách, có thứ gì đó rơi xuống trán tôi.\nLà mồ hôi sao——vừa nghĩ vậy tôi đã nhận ra sự bất thường."
# monologue
# JP: 日々姫は何故か真っ赤になって汗を掻き、\n呼吸を、ひどく荒らげている。
3074 = "Không hiểu sao mặt Hibiki lại đỏ bừng, mồ hôi nhễ nhại,\nvà thở dốc rất mạnh."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫？　どうかしたのか？」
2362 = "「Hibiki? Em sao vậy?」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃ――は、どうにか、ならない？\nそわそわ、とか……うずうず……とか、そのっ」
2579 = "「Anh hai——thì, không thấy sao sao à?\nBồn chồn, hay là... rạo rực... hay là, cái đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕がか？」
2307 = "「Anh á?」"
# monologue
# JP: 問われた以上は呼吸を整え、自身の体に意識を這わす。
3040 = "Đã bị hỏi như vậy, tôi liền điều hòa nhịp thở, tập trung ý thức vào cơ thể mình."
# monologue
# JP: ――うむ、正常だ。\n呼吸脈拍体温汗腺、どこにも特段の異常はない。
1719 = "——Ừm, bình thường.\nHô hấp, nhịp tim, thân nhiệt, tuyến mồ hôi, không có gì bất thường cả."
# 【双鉄】
# display as 雙鐵
# JP: 「してないようだ。そわそわもうずうずも、発汗も」
2446 = "「Có vẻ như không. Không bồn chồn, không rạo rực, cũng không đổ mồ hôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「そっか。やっぱり」
2379 = "「Vậy sao. Quả nhiên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 2166 = "「唔？」" 
# monologue
# JP: 一瞬前の硬直状態が錯覚であったかのように、\n日々姫はひょいっと体を伸ばす。
3113 = "Như thể trạng thái cứng đờ lúc nãy chỉ là ảo giác,\nHibiki thoăn thoắt vươn người lên."
# monologue
# JP: いともたやすく青背表紙の本を抜き取り、\n胸に抱えて、そして――真下の僕を見る。
2891 = "Con bé dễ dàng rút cuốn sách gáy xanh ra,\nôm vào ngực, và rồi——nhìn thẳng xuống tôi."
# 【日々姫】
# display as 日日姬
# JP: 「あのね――んんっ、\nあのですね、兄さん」
2550 = "「Chuyện là——ưm,\nChuyện là thế này, anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おう」
# 2227 = "「嗯？」" 
# monologue
# JP: 言葉が、標準語になっている。\nどうやら、落ち着いてくれた様子だ。
2907 = "Lời nói đã chuyển sang giọng phổ thông.\nCó vẻ như con bé đã bình tĩnh lại rồi."
# 【日々姫】
# display as 日日姬
# JP: 「しっかり、受け止めてくださいね？\n私――落ちます」
2505 = "「Nhớ đỡ cho chắc nhé?\nEm——rơi xuống đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？　おっ――おおおっ！！！？」
2080 = "「Cái gì!? Oa——oáaa!!!?」"
# monologue
# JP: （ドサッ）
3326 = "（Phịch）"
# monologue
# JP: 日々姫と本と。
3092 = "Hibiki và cuốn sách."
# monologue
# JP: 合計しても大した重さではないが、\nそれでも、ぶわりと冷や汗が出る。
3265 = "Cộng lại cũng chẳng nặng bao nhiêu,\nnhưng tôi vẫn toát mồ hôi lạnh."
# 【双鉄】
# display as 雙鐵
# JP: 「お、お前っ！　日々姫――なにをっ！？」
2200 = "「E-Em! Hibiki——làm trò gì vậy!?」"
# 【日々姫】
# display as 日日姬
# JP: 「どうです？\n今度はドキドキくらいはしてくれましたか？」
2289 = "「Thế nào?\nLần này anh đã thấy tim đập thình thịch chưa?」"
# monologue
# JP: ぶんぶんぶん、\n言葉にするのももどかしく、頷きだけで答えを返す。
3009 = "Gật gật gật,\ntôi chỉ biết gật đầu trả lời thay vì nói ra lời vì quá luống cuống."
# 【日々姫】
# display as 日日姬
# JP: 「ほんとに？\nちょっと、確かめさせてくださいね」
2467 = "「Thật không?\nĐể em kiểm tra một chút nhé.」"
# monologue
# JP: （ふにっ）
3337 = "（Mềm xèo）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2587 = "「！」" 
# monologue
# JP: 僕の腕に抱きかかえられたそのままに、\n日々姫が胸を、僕の胸へと押し当ててくる。
3094 = "Cứ thế trong vòng tay tôi,\nHibiki ép bầu ngực vào ngực tôi."
# monologue
# JP: 熱く、柔らかく、けれども確かに押し返す。\nドっ、ドっ、ドっ、ドと、激しい鼓動が伝わってくる。
3140 = "Nóng hổi, mềm mại, nhưng chắc chắn đang đẩy ngược lại.\nThình thịch, thình thịch, thình thịch, nhịp đập dữ dội truyền đến."
# monologue
# JP: （いや……これは、僕の鼓動か？）
3312 = "（Không... đây là, nhịp tim của tôi sao?）"
# 【日々姫】
# display as 日日姬
# JP: 「残念。あまりわかりませんね。\n私も、ドキドキしすぎてますから」
2465 = "「Tiếc thật. Em không cảm nhận được mấy.\nVì tim em cũng đang đập thình thịch mà.」"
# monologue
# JP: ……気付く。\n日々姫は冷静などでは、全くない。
1742 = "……Tôi nhận ra.\nHibiki hoàn toàn, không hề bình tĩnh chút nào."
# monologue
# JP: 顔はゆであがったタコのように赤く、\n汗で濡れそぼる全身は、タコのごとくにぬらついている。
2904 = "Khuôn mặt đỏ bừng như con bạch tuộc luộc,\ntoàn thân ướt đẫm mồ hôi, trơn tuột như bạch tuộc vậy."
# monologue
# JP: （いや、僕がタコだ！\nもっとマシな例えのひとつも浮かんで来んのか）
3315 = "（Không, tôi mới là bạch tuộc!\nKhông nghĩ ra được cái ví von nào tử tế hơn sao）"
# monologue
# JP: 自分を叱咤し、跳ね返ってくる答えから知る。
2945 = "Tôi tự trách mình, và nhận ra từ câu trả lời dội lại."
# monologue
# JP: もっとマシな例えのひとつも浮かべられない。\n僕も……全く冷静ではない。
3246 = "Chẳng thể nghĩ ra được một cái ví von nào tử tế hơn.\nTôi cũng... hoàn toàn không hề bình tĩnh."
# monologue
# JP: （ドっ、ドっ、ドっ、ドっ）
3325 = "（Thình thịch, thình thịch, thình thịch, thình thịch）"
# monologue
# JP: 僕のものか、日々姫のものか、\n鼓動はますます速くなる。
2732 = "Của tôi, hay của Hibiki,\nnhịp tim ngày càng đập nhanh hơn."
# monologue
# JP: 計れていないと認めながらも、\n日々姫は胸を――僕の胸に当て離さぬままだ。
3269 = "Dù thừa nhận là không thể đo lường được,\nnhưng Hibiki vẫn ép ngực——vào ngực tôi không chịu rời."
# 【日々姫】
# display as 日日姬
# JP: 「あの、ですね。兄さん」
2195 = "「Chuyện là, thế này. Anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お。おう」
2173 = "「Ờ. Ờ.」"
# 【日々姫】
# display as 日日姬
# JP: 「私――限界です。下ろしてください」
2298 = "「Em——tới giới hạn rồi. Cho em xuống đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。そうか。そうなのか」
2377 = "「Đúng vậy. Vậy sao. Ra là vậy.」"
# monologue
# JP: 乞われるままに日々姫を下ろす。
2988 = "Tôi đặt Hibiki xuống theo lời yêu cầu."
# monologue
# JP: 体が離れた瞬間どおっと汗が出て、\n体温が一気に、何度も下がった気になる。
2790 = "Khoảnh khắc cơ thể rời nhau, mồ hôi tuôn ra đầm đìa,\ntôi có cảm giác thân nhiệt giảm xuống mấy độ liền."
# 【日々姫】
# display as 日日姬
# JP: 「ふぅっ」
2142 = "「Phù.」"
# monologue
# JP: 日々姫も、僕と同じなのだろうか？\n大きく肩で息をして、両手で顔の汗をぬぐって――
3080 = "Hibiki cũng giống tôi sao?\nCon bé thở dốc, dùng hai tay lau mồ hôi trên mặt——"
# monologue
# JP: それから凛、と背筋を伸ばし、\nまだ赤い顔で僕を真っ直ぐ見据えてくる。
3147 = "Rồi ưỡn thẳng lưng lên,\nnhìn chằm chằm vào tôi với khuôn mặt vẫn còn ửng đỏ."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、さっき言いましたよね？\nそわそわもうずうずもしないって」
2158 = "「Anh trai, lúc nãy anh nói rồi nhỉ?\nKhông bồn chồn cũng không rạo rực.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2214 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「あの……いつまでに、とか、そういう約束……\n約束までは、ちょっと、あの、無理なんですけど」
2548 = "「Cái đó... bảo là đến bao giờ, hay là hứa hẹn gì đó...\nViệc hứa hẹn thì, cái đó, hơi khó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2214 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「でも、私、わからせますから。兄さんに。\nそわそわって、うずうずって、こういうのかって、絶対」
2084 = "「Nhưng mà, em nhất định sẽ làm cho anh trai hiểu.\nThế nào là bồn chồn, thế nào là rạo rực, chắc chắn luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2380 = "「是嗎」" 
# 【日々姫】
# display as 日日姬
# JP: 「それだけです！　それじゃ――って！」
2267 = "「Chỉ vậy thôi! Vậy thì——á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな」
2175 = "「A. Đúng rồi.」"
# monologue
# JP: 駆け出そうとして急に止まった日々姫の手へと、\n抜き出しておいた本をいくつか持たせる。
2978 = "Tôi dúi mấy cuốn sách vừa rút ra vào tay Hibiki,\nkhi con bé định chạy đi nhưng chợt khựng lại."
# monologue
# JP: 僕も、両手にいっぱいに。
3003 = "Cả hai tay tôi cũng ôm đầy sách."
# 【双鉄】
# display as 雙鐵
# JP: 「必要だから探したのだろう？\nともかく、資料を運んでしまおう」
2049 = "「Vì cần nên mới tìm đúng không?\nTrước tiên cứ mang đống tư liệu này ra ngoài đã.」"
# 【日々姫】
# display as 日日姬
# JP: 「……うん」
1780 = "「……Vâng.」"
# monologue
# JP: さきほどまでの、\n熱に浮かされたような何かはどうやら抜け落ちた。
2821 = "Cảm giác như bị sốt ruột lúc nãy\ncó vẻ như đã tan biến mất rồi."
# monologue
# JP: いつもの日々姫と、いつもの僕だ。\nいつもどおりに、日々姫の[あに,1]義兄を努めよう。
3091 = "Lại là Hibiki thường ngày, và tôi thường ngày.\nTôi sẽ cố gắng làm một người anh trai nuôi của Hibiki như mọi khi."
# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、日々姫」
2512 = "「Này, Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2214 = "「嗯」" 
# monologue
# JP: 気の利いたことなどまるで言えない。\n何を言うのが正解か、僕にわかり得る筈もない。
2960 = "Tôi chẳng thể nói được lời nào tinh tế cả.\nTôi cũng chẳng thể nào biết được nói gì mới là đúng."
# monologue
# JP: だから、ただただ。\nいつもと変わらぬことだけを言う。
3017 = "Thế nên, tôi chỉ đơn giản là.\nNói những lời không khác gì mọi khi."
# 【双鉄】
# display as 雙鐵
# JP: 「ひとつずつ、今できることをすればいいんだ。\n僕らには――結局のところ、それしか出来ん」
2488 = "「Cứ làm từng việc một, những việc có thể làm lúc này là được.\nChúng ta——rốt cuộc cũng chỉ có thể làm thế thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2214 = "「嗯」" 
# monologue
# JP: 日々姫は頷き、\nふりかえらずに言い添える。
3124 = "Hibiki gật đầu,\nvà nói thêm mà không quay lại."
# 【日々姫】
# display as 日日姬
# JP: 「ありがと――にぃに」
2513 = "「Cảm ơn——anh hai.」"
