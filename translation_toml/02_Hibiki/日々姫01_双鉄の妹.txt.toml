2142 = "「呼……」" 

# monologue
# JP: 日々姫も、僕と同じなのだろうか？\n大きく肩で息をして、両手で顔の汗をぬぐって――
3080 = "日日姬也和我一樣嗎？她肩膀起伏著，大口地吸氣，然後用雙手擦去臉上的汗水——" 

# monologue
# JP: それから凛、と背筋を伸ばし、\nまだ赤い顔で僕を真っ直ぐ見据えてくる。
3147 = "然後猛地一挺身，用她還通紅的臉龐直視著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん、さっき言いましたよね？\nそわそわもうずうずもしないって」
2158 = "「哥哥，你剛才不是說過嗎？你沒有心神不定也沒有坐立不安」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2214 = "「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「あの……いつまでに、とか、そういう約束……\n約束までは、ちょっと、あの、無理なんですけど」
2548 = "「那個……我不能向你保證……在多少時間之內……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2214 = "「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「でも、私、わからせますから。兄さんに。\nそわそわって、うずうずって、こういうのかって、絶対」
2084 = "「但是我一定會讓哥哥明白的。“心神不定”和“坐立不安”就是這樣的感覺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2380 = "「是嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「それだけです！　それじゃ――って！」
2267 = "「就這樣！那我走——啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな」
2175 = "「啊。對了」" 

# monologue
# JP: 駆け出そうとして急に止まった日々姫の手へと、\n抜き出しておいた本をいくつか持たせる。
2978 = "我往剛要跑出去又突然止住腳步的日日姬手裡多塞了幾本剛抽出來的書。" 

# monologue
# JP: 僕も、両手にいっぱいに。
3003 = "我自己也兩手都抱滿了書。" 

# 【双鉄】
# display as 雙鐵
# JP: 「必要だから探したのだろう？\nともかく、資料を運んでしまおう」
2049 = "「不是因為需要所以才來找的嗎？總之我們先把資料搬出去吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「……うん」
1780 = "「……嗯」" 

# monologue
# JP: さきほどまでの、\n熱に浮かされたような何かはどうやら抜け落ちた。
2821 = "剛才那種發燒般的暈暈乎乎的感覺似乎總算平靜下來了。" 

# monologue
# JP: いつもの日々姫と、いつもの僕だ。\nいつもどおりに、日々姫の[あに,1]義兄を努めよう。
3091 = "日日姬和我都變回了往常的樣子。那麼我就像平時一樣努力當好日日姬的義兄吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、日々姫」
2512 = "「話說，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2214 = "「嗯」" 

# monologue
# JP: 気の利いたことなどまるで言えない。\n何を言うのが正解か、僕にわかり得る筈もない。
2960 = "我不知該說些什麼才合適。根本就不可能知道說什麼才是正確的。" 

# monologue
# JP: だから、ただただ。\nいつもと変わらぬことだけを言う。
3017 = "所以，那就和往常一樣說話就好。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひとつずつ、今できることをすればいいんだ。\n僕らには――結局のところ、それしか出来ん」
2488 = "「總之就一件件地完成我們現在做得到的事吧。我們——到頭來也只能做到這些」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2214 = "「嗯」" 

# monologue
# JP: 日々姫は頷き、\nふりかえらずに言い添える。
3124 = "日日姬點點頭，不帶回頭地說道：" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがと――にぃに」
2513 = "「謝謝你——阿哥」" 
