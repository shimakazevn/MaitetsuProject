# display as 永山
# JP: 「そ？　なら、今度ほんとに時間頂戴よ。\nハチロクちゃんと一緒に。駅弁のこと、いろいろ話そ？」
2382 = "「是嗎？那下次我們真的碰個面吧。把八六也叫來，我們一起談談鐵路便當的事吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい、僕らでよければ喜んで。\nというか、真闇姉は？」
2216 = "「嗯，我們很榮幸。說起來真闇姐呢？」" 

# 【永山】
# display as 永山
# JP: 「キミらの案でダメだったときにとっとく。\nあの子はさ、抜かずの宝刀でいてもらえた方が安心」
2252 = "「如果你們的點子不行再叫她吧。把她當成最後王牌更令人放心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2123 = "「原來如此」" 

# monologue
# JP: 問答無用で頼りになる。\n頼れるが故、容易に頼りたくはない。
3161 = "真闇姐自然是特別可靠。因為她很可靠，所以才不想輕易去拜託她。" 

# monologue
# JP: 僕のものと似たりよったりな真闇姉評を聞かされて、\n永山夫人への親近感が湧いてくる。というか、そうだ。
2944 = "得知我們二人對真闇姐的評價十分相似，我心中對永山夫人的親近感油然而生。話說回來，對了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば日々姫はどうでしょう？　\nあれは、御一夜の」
2555 = "「那日日姬怎麼樣？她可是御一夜——」" 

# 【永山】
# display as 永山
# JP: 「ああ、そうよね。あのイラストマップ」
2180 = "「啊，對了。那張彩繪地圖」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2387 = "「是的」" 

# monologue
# JP: 知っているなら話が早い。\nあのイラストマップが伝える御一夜に対する知識と愛。
3034 = "既然她知道就好辦了。從那張彩繪地圖中能看出畫手對御一夜的知識與愛。" 

# monologue
# JP: “売りのある駅弁”を作るというなら、\nそれが何らかの形で役立ちそうに思える。
3036 = "既然想要做出“超熱銷的鐵路便當”，她的才能肯定能以某種形式派上用場。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それに、絵そのものも達者ですから。\n駅弁のパッケージなども」
2492 = "「而且她畫畫也很棒。畫鐵路便當的包裝肯定也不在話下」" 

# 【永山】
# display as 永山
# JP: 「\x%l掛け紙;#00ffc040;[かけがみ,2]掛け紙%l;#;」
1756 = "「\\x%l掛け紙;#00ffc040;封紙%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「え？」
2155 = "「哎？」" 

# 【永山】
# display as 永山
# JP: 「駅弁の紙外装は、\x%l掛け紙;#00ffc040;掛け紙%l;#;っていうの。\n\x%l機関士;#00ffc040;機関士%l;#;さんなのに知らないと、モグリっぽいわよ？」
2567 = "「鐵路便當的外包裝用紙叫做\\x%l掛け紙;#00ffc040;封紙%l;#;。你身為\\x%l機関士;#00ffc040;司機%l;#;卻不知道這點，可是會被懷疑是假冒的哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はぁ」
2159 = "「哦……」" 

# monologue
# JP: それも、いわゆる鉄道用語というヤツなのか。
3238 = "這個詞大概也是所謂的鐵路術語吧。" 

# monologue
# JP: 弁当の包みひとつのことでも、\n鉄道知識の深さが量られるなら、軽視は出来ない。
2920 = "如果通過便當的包裝都能夠看出一個人掌握了多少的鐵路知識，那可真不能小看。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご教示、痛み入ります」
2296 = "「感謝您的指點」" 

# 【永山】
# display as 永山
# JP: 「ううん、別に――って、お掃除の邪魔しちゃったわね。\nごめん。時間とか、今度社長と打ち合わせといてね？」
2057 = "「不，沒關係——啊，我好像妨礙到你打掃。真對不起。具體時間下次和社長商量一下吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとですね？　わかりました」
2144 = "「和波萊特嗎？我知道了」" 

# 【永山】
# display as 永山
# JP: 「あたしそっちに合わせるからさ。\nじゃ、そういうことで。まったね～」
2308 = "「我會根據你們的時間作調整的。那就先這樣吧。再見啦～」" 

# monologue
# JP: 言うなり、振り返りもせず立ち去っていく。
2909 = "她話音剛落，就頭也不回地離開了。" 

# monologue
# JP: なんとも強気で強引な――\nしかし、妙に小気味の良い人だ。
3160 = "真是個既強勢又強硬的人——但是又讓人覺得挺愉快的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　いや――冷静になれば、\n僕は勝手に日々姫を巻き込んでしまったのか？」
2229 = "「嗯？等等——冷靜下來一想，我這不是擅自把日日姬也牽扯進來了嗎？」" 

# monologue
# JP: それはいかん。\n日々姫はハチロクとは違い、僕の所有物ではない。
3239 = "這可不行。日日姬和八六不一樣，她不是我的私有物。" 

# monologue
# JP: それに、工場誘致の賛成反対うんぬんで、\nいろいろ複雑で繊細な部分を抱えていそうでもある。
3191 = "而且她對於工廠落戶的支持或反對，似乎也存在一些複雜而敏感的隱情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うっかりしたな。日々姫に確認をとっておかねば」
2461 = "「真是犯糊塗了啊。得和日日姬確認一下才行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな。随分と遅くなってしまった」
2458 = "「真對不起啊。我遲到了這麼久」" 

# 【日々姫】
# display as 日日姬
# JP: 「何を言ってるんですか、兄さん。\nお仕事を優先して下さいとお願いしたのは、私ですよ？」
2089 = "「你在說什麼呢，哥哥。可是我拜託你要工作優先的呀」" 

# 【日々姫】
# display as 日日姬
# JP: 「その……人前で話されたら――\n恥ずかしいかな？　っても思いましたし」
2490 = "「而且……當著別人的面說話——我也覺得挺難為情的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ。そんなものか？」
2165 = "「唔。是這樣嗎？」" 

# monologue
# JP: とはいえ、日々姫の照れ屋に、正直なところ助けられた。\n凪や永山夫人との立ち話なら、まぁ接客の範疇だ。
2743 = "不過這次日日姬靦腆的性格反而幫了我大忙。之前和凪、永山夫人站著聊天還可以說是接客的範疇內。" 

# monologue
# JP: が、掃除を中止し日々姫と話し、もし長引いてしまったら\n――私語による職務放棄を犯してしまうこととなったから。
2744 = "不過，要是停止掃地和日日姬聊天，聊得太久的話——那就算是犯了因為私事而影響工作的大錯了。" 

# 【日々姫】
# display as 日日姬
# JP: 「掃除が終わったあとすぐ、ハチロクと出たの――\nレールショップだったんですか？」
2092 = "「你打掃完就和八六一起出門了——是去鐵路商店了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。\n名推理……というほど難しい謎でもないか」
2424 = "「沒錯。真是名推理……不過也不是什麼難解之謎」" 

# monologue
# JP: まぁそうですね、と軽く笑って、\n日々姫は少し上目を使い――スネた感じで僕を見る。
3120 = "日日姬輕輕笑了笑，彷彿是在說“啊，確實是這樣”，對我翻了翻眼珠——眼神裡總透著點鬧彆扭的感覺。" 

# 【日々姫】
# display as 日日姬
# JP: 「ポーレットさん、\n兄さんに何のご用事だったんですか？」
2429 = "「波萊特小姐找哥哥有什麼事啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;の乗務訓練についての細かなツメだ」
2392 = "「是討論關於\\x%l8620;#00ffc040;８６２０%l;#;的乘務訓練的細節」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、そのことですか。何か、決まりましたか？」
2183 = "「啊，是那件事啊。那有定下什麼事項嗎？」" 

# monologue
# JP: 『\x%l機関助士;#00ffc040;機関助士%l;#;としての仕事は、全て兄さんの指示に従う』\n日々姫はそういい、委細を僕に完全に任せてくれている。
3075 = "日日姬之前說“\\x%l機関助士;#00ffc040;司爐%l;#;的工作我會完全聽哥哥的指示”，把所有細節都交給我處理了。" 

# monologue
# JP: その信頼を裏切らんためにも、\nいいかげんなことは決してしたくない――のだが。
3141 = "為了不辜負她的信任，我也不想隨隨便便胡亂應付。不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「決まったのは、乗務訓練の時間を夜。\n[しゅぞう,1]酒蔵の閉まった後の時間にということぐらいだ」
2305 = "「我們決定把乘務訓練的時間設在夜裡。在酒窖關門之後的時間段」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、それは助かります。[しゅぞう,1]酒蔵のことにも支障が出ないし、\n夜からの訓練の方が、お風呂だって便利――」
2197 = "「啊，那可太好了。這樣對酒窖的工作沒有影響，而且夜裡開始訓練想要洗澡也很方便——」" 

# monologue
# JP: 言って、言葉を飲み込んで、日々姫はぽぽぽと赤くなる。
3102 = "日日姬欲言又止，整張臉突然漲得通紅。" 

# monologue
# JP: 年頃の兄妹だから照れると以前に聞いてはいたが――\n最近は、慣れてきたのかと思っていた。
2887 = "她之前說過，我們兩兄妹都老大不小的了，所以會覺得害羞——但我最近都以為她已經習慣了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それ以上は、こう――\nどんどんと話が専門的になってしまって」
2432 = "「然後——討論的事情就越來越專業了」" 

# 【日々姫】
# display as 日日姬
# JP: 「ああ」
2530 = "「這樣啊」" 

# monologue
# JP: 日々姫の“ああ”、に、兄妹ふたり頷き合う。\nただそれだけで、説明は十二分に足りてしまう。
3100 = "日日姬應和著，兄妹倆互相點點頭。只需這一個動作就已經說明得很清楚了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「手持ち無沙汰でいたら、ハチロクが言ってくれたのだ。\n『話はまだまだ長引きます。先に戻って下さいまし』と」
2262 = "「就在我覺得沒事可乾的時候，八六對我說：“估計還要討論很久很久呢，請您先回去吧”」" 

# 【日々姫】
# display as 日日姬
# JP: 「そうなんですか？」
2381 = "「是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「酒蔵内で、僕が日々姫に話しかけたのを覚えていたのだ。\n『日々姫を待たせては気の毒です』とも言っていた」
2244 = "「她記得我在酒窖裡和你說的話。她說“讓日日姬久等了可不好啊”」" 

# 【日々姫】
# display as 日日姬
# JP: 「に、にぃ――んんっ、兄さんが、大声を出すからですよ。\nいきなり……そのっ、『大事な話がある』だなんて」
2557 = "「那次都是因為阿哥——不，哥哥你說的這麼大聲。突然就……那個，說什麼“有重要的話要對你說”之類的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだった。まずはその大事な話からだな」
2261 = "「對了。首先就從那件重要的事開始吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「は、はひっ！」
2246 = "「好、好的！」" 

# monologue
# JP: 日々姫がピンと背筋を伸ばす。
3106 = "日日姬猛地挺直了身板。" 

# 【日々姫】
# display as 日日姬
# JP: 「にゃ、な、なんでしょう。\nにぃに――んんっ、兄さんの、だ、大事な話。って」
2559 = "「那，是什、什麼呢。阿哥——不，哥哥說的、重要的事是？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。駅弁のことなのだが」
2162 = "「唔。就是關於鐵路便當的事」" 

# 【日々姫】
# display as 日日姬
# JP: 「えきべんっ！」
2569 = "「鐵路便當！」" 

# monologue
# JP: 日々姫が突っ伏す。\n畳の上に、豪快に。
3072 = "日日姬一下子臉朝下倒在榻榻米上。" 

# monologue
# JP: わかってました、わかってました、わかってましたと\n三度言い、それからゆっくり、体を起こす。
2910 = "她說了三遍“我就知道，我就知道，我就知道”，然後才緩緩站起身。" 

# 【日々姫】
# display as 日日姬
# JP: 「……ゆぅれぇでらの奥さんからのお話ですかぁ～」
1778 = "「……原來是幽靈寺夫人的事啊～」" 

# monologue
# JP: どろどろと幽霊を呼べそうな――恨めしそうなその口調。\nなかなかどうして、日々姫も雰囲気に凝るものだ。
2905 = "她的語氣中略帶著一點怨恨——彷彿是在呼喚幽靈似的。日日姬還挺講究氣氛的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「知り合いか？　ならば話が早い」
2088 = "「你們認識啊？那就好說了」" 

# monologue
# JP: パッケージ、いやさ\x%l掛け紙;#00ffc040;掛け紙%l;#;のことを含めた\n駅弁まわりの話を全て、日々姫は素直に聞いてくれる。
3118 = "日日姬聽我說完了包裝——不，應該說是包括\\x%l掛け紙;#00ffc040;封紙%l;#;在內的所有關於鐵路便當的事情。" 

# 【日々姫】
# display as 日日姬
# JP: 「……そういうお話でしたら、ちょうどいい気がします。\n私も、ハチロクたちのこと――」
1784 = "「……要是這樣的話，我也正好有意。我也對八六小姐她們——」" 

# monologue
# JP: いいかけ、急に日々姫は視線を窓の外へと向ける。
3223 = "話說到一半，日日姬突然把視線轉向窗外。" 

# 【日々姫】
# display as 日日姬
# JP: 「ハチロク、あの子帰りは？　迎えにとか」
2109 = "「八六回來的時候怎麼辦？你不用去接她嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「不要だ。ナビが送ってくれる」
2051 = "「不用。Ｎａｖｉ會送她回來的」" 

# 【日々姫】
# display as 日日姬
# JP: 「ナビが？　え、でも」
2593 = "「Ｎａｖｉ嗎？唔，可是……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「判断したのだろう。ハチロクに何か不幸があれば、\n僕が、ナビの認める僕ではなくなると」
2590 = "「Ｎａｖｉ估計是這麼判斷的。要是八六發生什麼不測，我就不再是Ｎａｖｉ所承認的那個我了」" 

# 【日々姫】
# display as 日日姬
# JP: 「ああ、それで――それで？」
2189 = "「啊，然後呢——沒別的了？」" 

# monologue
# JP: ほっとした顔。\nそれからすぐさまじとっと僕を責めるような目。
3123 = "日日姬露出安心的表情。但很快又露出略帶鄙視和責備的眼神。" 

# monologue
# JP: 今日の日々姫も、絶好調の百面相だ。
2890 = "她今天依舊表情豐富。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　まだ何か心配なのか？」
2288 = "「怎麼了？你還有什麼擔心的嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ああ……いえ、そうじゃなくって――」
2203 = "「嗯……不，不是那樣——」" 

# monologue
# JP: 今度は、少し甘えた目。
3242 = "這次的眼神顯得稍微溫柔了點。" 

# 【日々姫】
# display as 日日姬
# JP: 「……なりたいなぁ、って思っただけです。\n私も、ナビに――送ってもらえるような存在に」
1782 = "「……我只是也有點想那樣。我也想——能讓Ｎａｖｉ天天送我回家」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2530 = "「這樣啊」" 

# monologue
# JP: なるほど、そういう理由もあったか。
2825 = "原來如此，也有這個原因啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は、\x%lエアクラ;#00ffc040;エアクラ%l;#;そのものも好きなのだな」
2357 = "「日日姬對\\x%lエアクラ;#00ffc040;空凝機%l;#;本身也非常喜愛吧？」" 

# 【日々姫】
# display as 日日姬
# JP: 「んにゃっ！？　な、なんでそぎゃんと結論にっ！？」
2201 = "「嗚哇！？啊、阿哥你怎麼會得出這種結論！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんでもなにも、以前に言っていただろう、\n『ナビのことはあまり好かん』と」
