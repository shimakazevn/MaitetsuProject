1345 = "「阿哥……嗯……阿哥――阿哥」" 

# monologue
# JP: ……甘えて、じゃない。\n発情し切って、すりよってくる。
921 = "……她不是在撒嬌。她只是發情過度之後在跟我自然地親近。" 

# monologue
# JP: 自分がかけた精液が、当然肌に移植され。\nそれは特段気にもならんが、疑問は些かふくらんでくる。
1560 = "塗在她身上的精液也蹭到了我身上。雖然我不在意這個，心裡卻浮起了另一個疑問。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　日々姫。\n僕の描いた絵では、不満か？」
1309 = "「日日姬，怎麼了？你對我畫的畫有什麼不滿嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ううん？　満足――でも……塗り残し」
1281 = "「嗯？我沒有不滿――但是……有沒塗到的地方」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1360 = "「！！」" 

# monologue
# JP: 肌、膣、お口。僕の精液絵の具は確かに、\n日々姫のかなりの部分を染めた。
1905 = "肌膚、陰道、嘴裡。我的精液顏料已經塗到了日日姬的大部分。" 

# monologue
# JP: だが――ひとつ。かなり大きな範囲を確かに、\n言われてみれば、塗り残してる。
1479 = "但是還有一個地方。這麼一說的話，確實還有很大一片地方沒有塗到。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すぐに、か？　それとも小休止して」
1356 = "「馬上就要嗎？還是說先休息一會」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに～　にぃに～～っ」
1351 = "「阿哥～阿哥～～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よかろう」
1289 = "「好吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃんっ！！？」
# 1157 = "「呀！！？」" 

# monologue
# JP: 嬉しげに悲鳴をあげる日々姫の足を持ち上げて。
1679 = "我抱起日日姬的雙腿，她便發出了歡快的叫聲。" 

# monologue
# JP: そうして僕は、塗り残した場所。\n日々姫のアナルのその奥に――
1852 = "然後我便朝著還沒塗到的地方，向著日日姬菊蕾的裡面――" 

# monologue
# JP: 残りの絵の具を振り絞るため、\n大胆に筆を走らせる！
1839 = "為了擠出我殘餘的顏料，我大膽地揮舞起了畫筆！" 
