1650 = "我們的視線碰到了一起，互相看著彼此。僅是如此，我們就已經完全理解了對方的意思。" 

# monologue
# JP: 日々姫の大きな喜びが、\n僕の心にも共鳴し、思いと願いが重なりあう。
1782 = "日日姬心中的喜悅跟我起了共鳴，心意和想法重合在了一起。" 

# 【日々姫】
# display as 日日姬
# JP: 「じゅるっ！　じゅぼっ！　ちゅむっ――じゅるっ！\nぐぼっ！　がぼっ！　くちゅっ！　ぶちゅんっ！！」
1229 = "「啾嚕！啾噗！啾噗――啾嚕！咕啾！咕噗！咕啾！啾噗！！」" 

