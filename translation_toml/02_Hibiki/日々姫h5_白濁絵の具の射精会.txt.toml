# monologue
# JP: そして射精の波が過ぎれば、\n思考がゆるゆる追いついてくる。
1606 = "Và khi cơn sóng xuất tinh đi qua,\nlý trí của tôi mới từ từ quay trở lại."

# monologue
# JP: 思いっきりに気持よく、\n膣内へ、子宮内へとひたすら精を注いだが――
1455 = "Tôi đã thỏa thích rót trào tinh dịch vào\nâm đạo,\nvào tận trong tử cung một cách vô cùng\nsảng khoái, nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「しまったな。日々姫に絵を描いてみせると――\nそういう話しであったのに」
1286 = "「Chết thật. Rõ ràng đã hứa là\nsẽ vẽ tranh cho Hibiki xem cơ mà」"

# 【日々姫】
# display as 日日姬
# JP: 「……ふ……ぁ――しまっとらん、よ？　にぃに――っ、\nん……今のは――だって――下塗り――やけん……」
928 = "「……Phù……a――Chưa xong, đâu? Anh hai――,\nưm……Vừa rồi――chỉ là――lớp sơn lót――thôi\nmà……」"

# 【双鉄】
# display as 雙鐵
# JP: 「下塗り」
1285 = "「Sơn lót」"

# 【日々姫】
# display as 日日姬
# JP: 「ん。下地はしっかりしあがったけん。\nやけん、ね？　にぃに――今度は、私の体に、絵の具」
1275 = "「Vâng. Lớp sơn lót đã hoàn thành xuất sắc\nrồi.\nNên là, nhé? Anh hai――Lần này, hãy tô màu,\nlên cơ thể em đi」"

# monologue
# JP: （ずくんっ）
2053 = "（Giật giật）"

# 【日々姫】
# display as 日日姬
# JP: 「あっ」
# 1211 = "「啊」" 

# monologue
# JP: 射精したばかりの勃起が疼き、日々姫は嬉しげな声をだす。
1800 = "Dương vật vừa mới xuất tinh lại râm ran\nnhức nhối, khiến Hibiki khẽ thốt lên một\ntiếng đầy thích thú."

# monologue
# JP: そうして僕に手を差し伸べて――
1849 = "Và rồi, em ấy vươn tay về phía tôi――"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに――座って？」
1342 = "「Anh hai――ngồi xuống đi?」"

# 【双鉄】
# display as 雙鐵
# JP: 「これ……は――」
1335 = "「Thế này……là――」"

# monologue
# JP: 導かれるまま、ベッドを椅子にし腰を下ろせば、\n日々姫は床に[ひざまず]跪き、僕の股間に体をおさめる。
1722 = "Tôi ngoan ngoãn nghe theo sự dẫn dắt, ngồi\nxuống mép giường,\nHibiki quỳ gối trên sàn, áp sát cơ thể vào\nđũng quần tôi."

# 【日々姫】
# display as 日日姬
# JP: 「わたしの絵の具……おまんこ、だけが――\nわたしの持ってる、絵の具じゃないから――」
1302 = "「Màu vẽ của em……âm đạo, không phải là――\nmàu vẽ duy nhất, mà em có đâu――」"

# monologue
# JP: あーんと、口が開かれる。
1573 = "Em ấy há to miệng, phát ra tiếng \"Aaa\"."

# 【双鉄】
# display as 雙鐵
# JP: 「いや……しかし」
1164 = "「Nhưng……thế này thì」"

# monologue
# JP: 突っ込むことに、ためらいがある。\n僕の勃起は、精液と愛液ででろでろだから。
1688 = "Tôi có chút do dự khi đút vào.\nBởi vì dương vật của tôi lúc này đang nhầy\nnhụa tinh dịch và ái dịch."

# 【日々姫】
# display as 日日姬
# JP: 「かまわんけん。そのまま。\nでなきゃ、混色にならんもん」
1293 = "「Không sao đâu. Cứ để vậy đi.\nNếu không thì, làm sao mà pha màu được\nchứ」"

# monologue
# JP: 微笑まじりでそう言って、日々姫ははっと、\n瞬間なにかに気づいたように僕を見上げる。
1781 = "Vừa cười mỉm vừa nói vậy, rồi đột nhiên,\nHibiki ngước lên nhìn tôi như thể vừa nhận\nra điều gì đó."

# 【双鉄】
# display as 雙鐵
# JP: 「なにか、あるのか？」
1295 = "「Có chuyện gì sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「うん。あのね？　さっき、にぃにに腰――\n支えてもらって……うれしかった……けん……やけん」
1280 = "「Vâng. Nè? Lúc nãy, được anh hai――\nđỡ eo cho……em vui lắm……nên là……nên là」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1259 = "「嗯」" 

# monologue
# JP: 髪にそうっと手を添わせれば、\n日々姫はうっとり目を細める。
1682 = "Tôi nhẹ nhàng vuốt ve mái tóc em ấy,\nHibiki nheo mắt lại đầy vẻ say đắm."

# monologue
# JP: そして再び、大きく開かれたその口へ――
1853 = "Và rồi, một lần nữa, hướng về phía chiếc\nmiệng đang há to kia――"

# monologue
# JP: （ぬりっ――ぬりゅんっ――）
# 2093 = "（插入）" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……ふっ――んっ」
1245 = "「Ưm……phù――ưm」"

# monologue
# JP: まずは、唇。\n精液ルージュで、日々姫のつややかな唇を汚してく。
1976 = "Đầu tiên là đôi môi.\nLớp son tinh dịch từ từ bôi bẩn đôi môi\ncăng mọng của Hibiki."

# 【日々姫】
# display as 日日姬
# JP: 「ん……はぁ……ぺろっ」
1248 = "「Ưm……hà……liếm」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1361 = "「！！！」" 

# monologue
# JP: 唇の感触だけでも楽しめていた、\nそこに新たな衝撃がくる。
1497 = "Chỉ riêng xúc cảm từ đôi môi thôi cũng đủ\nkhiến tôi sung sướng,\nnhưng một luồng kích thích mới lại ập đến."

# monologue
# JP: 柔らかにぬれそぼってる日々姫の舌が、\nおずおず伸びて、僕の亀頭にキスしてくれる。
1807 = "Chiếc lưỡi mềm mại ướt át của Hibiki,\nrụt rè vươn ra, đặt một nụ hôn lên quy đầu\ncủa tôi."

# 【日々姫】
# display as 日日姬
# JP: 「ちゅっ――ちゅむっ――ちゅろっ――ちゅろっ――\nれるっ――れろっ――れるうっ！　にゅろんっ！！」
1221 = "「Chụt――chùn chụt――chụt――chụt――\nLiếm――liếm――liếm! Trơn tuột!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぃ――ぁ」
1205 = "「I――a」"

# monologue
# JP: 舌の動きが徐々にためらいを消していく。
1935 = "Chuyển động của chiếc lưỡi dần xóa tan đi\nsự ngần ngại."

# monologue
# JP: 亀頭全部が、\nクリームソーダのチェリーのごとく舐め回される。
1580 = "Toàn bộ quy đầu của tôi,\nbị liếm láp hệt như quả anh đào trên ly\nkem soda."

# 【日々姫】
# display as 日日姬
# JP: 「はむっ――ちゅっ――ちゅろっ――れるっ――るっ――\nれろろっ――はむっ――ぷっ――はむうッ――んっ」
1204 = "「Ngoạm――chụt――chụt――liếm――liếm――\nLiếm liếm――ngoạm――phụt――ngoạm――ưm」"

# monologue
# JP: 唇だけで亀頭を甘く捕まえて、\nけれどもすぐにぷるんと離す。
1576 = "Chỉ dùng môi để ngọt ngào tóm lấy quy đầu,\nnhưng ngay sau đó lại tuột ra."

# monologue
# JP: 二回三回と繰り返されれば、弱火であぶられた欲望は、\nこうもたやすく煮えたぎる。
1598 = "Lặp đi lặp lại hai, ba lần, ngọn lửa dục\nvọng vốn chỉ cháy liu riu\nnay đã dễ dàng sục sôi."

# monologue
# JP: （くっ）
2052 = "（Hự）"

# 【日々姫】
# display as 日日姬
# JP: 「っ！！」
1360 = "「!!」"

# monologue
# JP: 髪に触れてる手へとわずかな力を込めれば、\nそれだけで、日々姫の瞳に期待がきらめく。
1686 = "Chỉ cần tôi khẽ dồn chút lực vào bàn tay\nđang vuốt ve mái tóc,\nbấy nhiêu thôi cũng đủ làm ánh lên sự kỳ\nvọng trong đôi mắt Hibiki."

# monologue
# JP: ならば、遠慮をすることはない。\n僕の本能の求めもままに――
1966 = "Nếu vậy thì, không cần phải khách sáo nữa.\nCứ để bản năng của tôi lên tiếng――"

# monologue
# JP: （じゅぶううううっっっ！！！！）
2058 = "（Phập!!!!）"

# 【日々姫】
# display as 日日姬
# JP: 「んぶうううううっっっっ！！？」
1265 = "「Ưm buuuuu!!!!?」"

# monologue
# JP: 舌を押し下げその上に勃起を滑らせながら、\n日々姫の頭を、僕の股間に押し付けるように導いてみる。
1692 = "Đè chiếc lưỡi xuống và trượt dương vật\ncương cứng lên trên,\ntôi dẫn dắt đầu Hibiki ấn sát vào đũng\nquần mình."

# 【日々姫】
# display as 日日姬
# JP: 「けふっ――えほっ――む、くっ――ふ――んっ！！\nフッ――ちゅろっ、じゅるっ！　じゅろっ！　じゅぶっ」
1171 = "「Kefu――eho――ưm, hự――phù――ưm!!\nPhù――chụt, chùn chụt! Chụt! Chùn chụt」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1359 = "「！」" 

# monologue
# JP: 一瞬、苦しげにえづきかけ。
1771 = "Trong một khoảnh khắc, em ấy có vẻ như sắp\nnôn oẹ vì nghẹn."

# monologue
# JP: けれども日々姫はすぐさまに、自分の意思で、、\n舌を、頭を動かし始める。
1475 = "Thế nhưng ngay lập tức, bằng chính ý chí\ncủa mình,\nHibiki bắt đầu cử động lưỡi và đầu."

# 【日々姫】
# display as 日日姬
# JP: 「ちゅううううっ――ずずっ！　――むっ――えむっ！\nろるっ――れろっ――ぺろっ――じゅっ――じゅるる」
1227 = "「Chùn chụt――zuzu! ――Ưm――emu!\nRoru――liếm――liếm――chụt――chùn chụt」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふ、く――」
1161 = "「Phù, hự――」"

# monologue
# JP: 頬をすぼめて思い切り吸う。\n吸われてるまま、亀頭が舌に弄ばれる。
1575 = "Em ấy hóp má lại và mút lấy mút để.\nTrong lúc bị mút, quy đầu của tôi liên tục\nbị chiếc lưỡi trêu đùa."

# monologue
# JP: 口技も――日々姫は成長させてくれてる。\nそれが嬉しくて愛しくて、そっとそうっと頭を撫ぜる。
1776 = "Kỹ thuật dùng miệng――Hibiki cũng đã trưởng\nthành hơn rất nhiều.\nĐiều đó khiến tôi vừa vui mừng vừa yêu\nthương, khẽ khàng vuốt ve đầu em ấy."

# 【日々姫】
# display as 日日姬
# JP: 「ふ……ぁ……んっ――むぃ――ぃ～」
1191 = "「Phù……a……ưm――anh――hai~」"

# monologue
# JP: 勃起をぱんぱんに含んだままで、\nにぃにと僕を呼んでくれてる。
1568 = "Ngậm trọn dương vật căng cứng trong miệng,\nem ấy vẫn cố gọi tôi là anh hai."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。日々姫。僕は、お前のにいさんだ」
1278 = "「Ừ. Hibiki. Anh là anh trai của em đây」"

# 【日々姫】
# display as 日日姬
# JP: 「ん」
# 1259 = "「嗯」" 

# monologue
# JP: 言葉と同時にわずかに髪を引っ張れば、\n日々姫はごく嬉しげに、綺麗で大きな瞳を細める。
1545 = "Cùng với lời nói, tôi khẽ kéo nhẹ mái tóc\nem ấy,\nHibiki vô cùng thích thú, nheo đôi mắt to\ntròn tuyệt đẹp lại."

# 【日々姫】
# display as 日日姬
# JP: 「ん――ふっ――あっ――んっ――むぃ――ぃ――ん、\nふっ――ひゅひ――んっ――らい――ひゅひ……んむ」
1234 = "「Ưm――phù――a――ưm――anh――hai――ưm,\nphù――thi――ưm――rất――thích……ưm」"

# monologue
# JP: 勃起に圧されくもぐる声で、\nそれでも日々姫が思いを伝える。
1547 = "Bằng một giọng nói nghẹn ngào vì bị dương\nvật chèn ép,\nHibiki vẫn cố gắng truyền đạt tâm tư của\nmình."

# monologue
# JP: 舌が動いて勃起が震えてしまうのならば――
1551 = "Nếu chiếc lưỡi cử động khiến dương vật tôi\nrun rẩy――"

# 【日々姫】
# display as 日日姬
# JP: 「んっ！　ふっ――じゅぼっ！　じゅるっ！　ちゅるっ！\nちゅっ！　じゅぼっ！　じゅぼおっ！　ぞぢゅうう！」
1269 = "「Ưm! Phù――chùn chụt! Chùn chụt! Chùn chụt!\nChụt! Chùn chụt! Chùn chụt! Zojuuu!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん――く――あっ！」
1235 = "「Ưm――hự――a!」"

# monologue
# JP: ―瞬間日々姫は喉奥で喜びの声をあげ。\nそうして僕の肉筆に、唾液絵具を徹底的に塗り込めていく。
1779 = "Khoảnh khắc đó, Hibiki cất lên tiếng reo\nvui từ sâu trong cổ họng.\nVà rồi em ấy bắt đầu thoa triệt để lớp sơn\nnước bọt lên chiếc cọ thịt của tôi."

# 【日々姫】
# display as 日日姬
# JP: 「っろっ――れるうっ――れろっ――じゅぶっ！　じゅ！\nずりゅりゅりゅりゅ！　ん――れろっ――ぬろんっ！」
1226 = "「Rót――liếm――liếm――chụt! Chụt!\nZuryuryuryuryu! Ưm――liếm――trơn tuột!」"

# monologue
# JP: 舌の動きに吸い付きに。唇の輪の甘噛みに。
1934 = "Sự mút mát kết hợp với chuyển động của\nlưỡi. Cùng với những cái cắn yêu từ vành\nmôi."

# 【日々姫】
# display as 日日姬
# JP: 「ん……ぷっ――んっ！　ちゅうっ――ずぢゅ！　ごくっ\n――ふっ――あむっ――れろっ――れるっ――こしゅん」
1253 = "「Ưm……phụt――ưm! Chụt――zuju! Ực\n――phù――ngoạm――liếm――liếm――koshun」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁあ――あっ――」
1206 = "「Aa――a――」"

# monologue
# JP: 尿道口に残る精液が吸いだされ、\n日々姫の喉に――胃の奥までへと飲み込まれていく。
1621 = "Lượng tinh dịch còn sót lại ở lỗ niệu đạo\nbị hút sạch sành sanh,\ntrôi tuột qua cổ họng Hibiki――rồi nuốt\nchửng vào tận sâu trong dạ dày."

# monologue
# JP: 舌は亀頭の先をわろうと細まって、\nそこにどろどろ、唾液を流し込もうとしてくる。
1522 = "Chiếc lưỡi nhọn hoắt như muốn tách đôi\nđỉnh quy đầu,\ncố gắng truyền dòng nước bọt đặc sệt vào\nbên trong."

# 【日々姫】
# display as 日日姬
# JP: 「ん――ちゅるっ――ふっ――れろっ――れろおおっ―ふ、\nじゅぶっ！　じぼっ！　じゅぼおっ！　ぼぢゅんっ！」
1240 = "「Ưm――chùn chụt――phù――liếm――liếm――phù,\nchụt! Chụt! Chùn chụt! Boshun!」"

# 【双鉄】
# display as 雙鐵
# JP: （混色を――日々姫はしてくれているのだ）
2099 = "（Hibiki――đang pha màu cho tôi đấy）"

# monologue
# JP: 僕が日々姫をキャンバスにする。\n日々姫の上に僕の絵を描く。
1674 = "Tôi dùng Hibiki làm bức tranh sơn dầu.\nVẽ bức tranh của tôi lên người Hibiki."

# monologue
# JP: その意味が、懸命な日々姫の姿から、\nおぼろに浮かんで見えた気がする。
1632 = "Từ dáng vẻ nỗ lực hết mình của Hibiki,\ntôi cảm giác như mình đã lờ mờ hiểu được ý\nnghĩa của điều đó."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫を――お前を。\n僕の願いのそのままに、僕で、染めればいいのだな？」
1310 = "「Tô điểm Hibiki――tô điểm em.\nTheo đúng như nguyện vọng của anh, bằng\nchính bản thân anh, là được chứ gì?」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 1359 = "「！」" 

# monologue
# JP: 視線があがって。目と目があって。\nただ、それだけで全てが伝わる。
1650 = "Ánh mắt ngước lên. Hai ánh mắt chạm nhau.\nChỉ bấy nhiêu thôi cũng đủ để truyền tải\ntất cả."

# monologue
# JP: 日々姫の大きな喜びが、\n僕の心にも共鳴し、思いと願いが重なりあう。
1782 = "Niềm vui sướng tột độ của Hibiki,\ncộng hưởng với trái tim tôi, khiến những\ntâm tư và nguyện vọng hòa làm một."

# 【日々姫】
# display as 日日姬
# JP: 「じゅるっ！　じゅぼっ！　ちゅむっ――じゅるっ！\nぐぼっ！　がぼっ！　くちゅっ！　ぶちゅんっ！！」
1229 = "「Chùn chụt! Chùn chụt! Chùn chụt――chùn\nchụt!\nGubo! Gabo! Kuchu! Buchun!!」"

# monologue
# JP: 唇の端からよだれを垂らし、鼻から懸命に息をして、\nそれでも日々姫は、口の動きを休めない。
1541 = "Nước dãi rỏ xuống từ khóe môi, thở dốc\ntừng cơn qua mũi,\nnhưng Hibiki vẫn không hề ngừng lại chuyển\nđộng của khoang miệng."

# monologue
# JP: 僕の想いを、僕の絵の具を、僕の精液を絞り出そうと、\n口だけでなく体の全部で、僕の勃起を愛してくれる。
1566 = "Để vắt kiệt tâm tư của tôi, màu vẽ của\ntôi, tinh dịch của tôi,\nem ấy dùng cả cơ thể chứ không chỉ riêng\nchiếc miệng để yêu thương dương vật của\ntôi."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！　日々姫！　日々姫！　日々姫！」
1307 = "「Hibiki! Hibiki! Hibiki! Hibiki!」"

# monologue
# JP: 愛しい。嬉しい。かわいい。\nだから思い切り僕で染めたい。
1702 = "Đáng yêu. Hạnh phúc. Dễ thương.\nVì thế tôi muốn nhuộm đẫm em ấy bằng chính\nmình."

# monologue
# JP: ふくれあがった、愛情とないまぜの欲望は、\n尿道口にまで駆け上がり、いますぐにでも飛び出しそうで。
1724 = "Dục vọng căng phồng hòa quyện cùng tình\nyêu,\ndâng trào lên tận lỗ niệu đạo, tưởng chừng\nnhư có thể tuôn trào bất cứ lúc nào."

# 【日々姫】
# display as 日日姬
# JP: 「んっ――ちゅっ――むっ――れろ――れるううっ。\nれろっ――ぺろっ――ちゅくっ――ちゅむうっ！」
1238 = "「Ưm――chụt――ưm――liếm――liếm.\nLiếm――liếm――chụt――chùn chụt!」"

# monologue
# JP: そのタイミングで、焦らすかのように――。\nいや恐らくは意識して、動きが舌だけのものへと変わる。
1615 = "Ngay lúc đó, như thể muốn trêu chọc tôi――.\nKhông, có lẽ là cố ý, em ấy chuyển sang\nchỉ dùng mỗi lưỡi để cử động."

# 【双鉄】
# display as 雙鐵
# JP: 「ん……くっ――」
1249 = "「Ưm……hự――」"

# monologue
# JP: 腰が勝手にむずむずしだし――\n髪に添えてた手にも力が――こもってしまうっ！
1666 = "Hông tôi tự động ngứa ngáy――\nBàn tay đang vuốt ve mái tóc cũng――vô thức\ndồn thêm lực!"

# monologue
# JP: （がしいっ！）
2087 = "（Túm lấy!）"

# 【日々姫】
# display as 日日姬
# JP: 「んむううっ！？」
1261 = "「Ưm muuu!?」"

# monologue
# JP: 困惑と、窒息と。\nけれど、声には明らかな強い喜びも混じってて！
1958 = "Sự bối rối, và cảm giác ngạt thở.\nNhưng trong giọng nói ấy rõ ràng còn pha\nlẫn cả niềm vui sướng tột độ!"

# monologue
# JP: （じゅぶっ！　ばちゅっ！　ばじゅんっ！　ぶぢゅっ！）
2057 = "（Phập! Phập! Bạch! Bạch!）"

# 【日々姫】
# display as 日日姬
# JP: 「んむっ！？　ぐっ！　っぶっ！　うっ――うっ――ん！\nれろっ――じゅぶっ！　じゅぼっ！　ぢゅぶるるっ！！」
1273 = "「Ưm mu!? Hự! Phụt! Ư――ư――ưm!\nLiếm――chụt! Chùn chụt! Jubururu!!」"

# monologue
# JP: 自分勝手な僕の動きに、一瞬の困惑を解けばすぐに、\n日々姫は応じてあわせてくれる。
1684 = "Trước những chuyển động ích kỷ của tôi,\nngay khi vừa rũ bỏ sự bối rối thoáng qua,\nHibiki liền lập tức đáp lại và hùa theo."

# monologue
# JP: それが、嬉しい。すごく、嬉しい。\n日々姫は僕の女だと――思えば全身を染め抜きたくなる！
1961 = "Điều đó, khiến tôi thật sự vui mừng. Vui\nsướng tột độ.\nNghĩ đến việc Hibiki là người phụ nữ của\nmình――tôi lại càng muốn nhuộm đẫm toàn\nthân em ấy!"

# 【日々姫】
# display as 日日姬
# JP: 「ん！　ふうっ！　ぢゅぶっ！　じゅるっ！　ぢゅぼっ！\nふ――んっ！　ひぃ、ひ――ひっへ――！　ちゅ、む！」
1271 = "「Ưm! Phù! Chụt! Chùn chụt! Chùn chụt!\nPhù――ưm! Hii, hi――hihe――! Chụt, chùn\nchụt!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、イクぞっ！　日々姫！」
1277 = "「A, anh ra đây! Hibiki!」"

# 【日々姫】
# display as 日日姬
# JP: 「ぢゅっ！　ぢゅるっ！　じゅぼっ！　ぼっ！　ちゅむ！\nじゅるっ！　ずぼっ！　じゅぶっ！　じゅちゅっ！！！」
1231 = "「Chụt! Chùn chụt! Chùn chụt! Bụp! Chùn\nchụt!\nChùn chụt! Phập! Chụt! Juchu!!!」"

# monologue
# JP: 加速していく。\n一直線に加速して、限界まで持っていく――っ！？
1963 = "Đang tăng tốc.\nTăng tốc theo một đường thẳng, đẩy mọi thứ\nđến giới hạn cuối cùng――!?"

# monologue
# JP: その瞬間に吸われ全てが白に弾けるっ！！！
1558 = "Đúng khoảnh khắc đó, một lực hút mạnh mẽ\nkhiến mọi thứ nổ tung thành một màu trắng\nxóa!!!"

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 1214 = "「啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「んぷっ！！！！」
1266 = "「Ưm phụt!!!!」"

# monologue
# JP: 腰を引く！\n完璧に同時に動きはそれでもギリギリすぎてっ！！！
1708 = "Tôi kéo hông lùi lại!\nMột chuyển động hoàn hảo và đồng bộ, nhưng\nvẫn quá đỗi sít sao!!!"

# monologue
# JP: （びゅっ！　びゅるっ！　どびゅっ！　びゅぶう！！）
2081 = "（Phụt! Phụt! Phụt! Phụt!!）"

# 【日々姫】
# display as 日日姬
# JP: 「きゃうっ！！？」
# 1157 = "「呀！！？」" 

# monologue
# JP: （どびゅっ！　びゅるっ！　びゅう！！　ぼびゅっ！）
2075 = "（Phụt! Phụt! Phụt!! Phụt!）"

# 【日々姫】
# display as 日日姬
# JP: 「ふあっ――あっ――あっ――ああ――んっ――\n精……液――あつい――の――にぃにの、せい、えき」
1174 = "「Phù――a――a――a――ưm――\nTinh……dịch――nóng quá――Tinh, dịch, của anh\nhai」"

# 【日々姫】
# display as 日日姬
# JP: 「はぁ……ぁっ――うれし――うれし――ぃ――\nにぃにの――えのぐで――わたし――全部、がっ」
1189 = "「Hà……a――Vui quá――vui quá――đi――\nMàu vẽ――của anh hai――đã bao phủ――toàn bộ,\nngười em」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいや――まだだ」
1126 = "「Không――vẫn chưa xong đâu」"

# 【日々姫】
# display as 日日姬
# JP: 「んっ！？　んむっ！！！」
1274 = "「Ưm!? Ưm mu!!!」"

# monologue
# JP: （がぼっ！）
2092 = "（Ngoạm!）"

# monologue
# JP: 射精したまま口に押し入――っ！！？
1899 = "Vừa xuất tinh tôi vừa ấn sâu vào miệng em\nấy――!!?"

# 【日々姫】
# display as 日日姬
# JP: 「～～～～～～～～～～っ！！！」
1368 = "「~~~~~~~~~~!!!」"

# monologue
# JP: すぐさま意図を察した日々姫が、\n唇だけをギュッとしめ、同時に強く吸引し！
1809 = "Nhận ra ý đồ của tôi ngay lập tức, Hibiki\nchỉ mím chặt môi lại, đồng thời hút thật\nmạnh!"

# 【日々姫】
# display as 日日姬
# JP: 「じゅぞおおおおおおおおおおおおおおおおおっ！！！」
1228 = "「Juzoooooooooooooooooo!!!」"

# monologue
# JP: そして頭を後ろに引いて、\n完全にもう精液だけをを絞り出そうとっ！！
1851 = "Rồi em ấy ngửa đầu ra sau,\nhoàn toàn có ý định vắt kiệt chỉ riêng\ntinh dịch của tôi!!"

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
1165 = "「Kua!!!」"

# monologue
# JP: （びゅっ！　びゅるるっ！　びゅっ！――どびゅっ！）
2080 = "（Phụt! Phụt! Phụt!――Phụt!）"

# monologue
# JP: 一度は勢いを失っていた精液が、\n日々姫に答え、僕に応えて、喉奥にまでぶつかっていく。
1604 = "Tinh dịch vốn đã yếu đà,\nnay lại để đáp lại Hibiki, đáp lại tôi, mà\nbắn thẳng vào tận sâu trong cổ họng em ấy."

# 【日々姫】
# display as 日日姬
# JP: 「ん――ん――くっ！　むっ――あっ――んむ～ん……\nん――んんっ――ふっ――んっ――ん～～～っ」
1241 = "「Ưm――ưm――hự! Ưm――a――ưm mu~n……\nƯm――ưm ưm――phù――ưm――ưm~~~」"

# monologue
# JP: ……そして、射精が終わるまで。\n日々姫は口に、精液を溜め、溜めに溜め――
923 = "……Và rồi, cho đến khi xuất tinh xong.\nHibiki ngậm tinh dịch trong miệng, cứ ngậm\nmãi, ngậm mãi――"

# 【日々姫】
# display as 日日姬
# JP: 「ごくんっ！！！」
1198 = "「Ực!!!」"

# monologue
# JP: 一気に、呑み干す。\n腹の底まで、子宮の上まで、僕の精液を流してくれる。
1848 = "Một hơi, nuốt chửng tất cả.\nĐể tinh dịch của tôi chảy thẳng xuống tận\nđáy bụng, đến tận bên trên tử cung."

# monologue
# JP: そして勃起は、日々姫の口から開放されて――
1855 = "Và rồi dương vật của tôi được giải phóng\nkhỏi miệng Hibiki――"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1211 = "「啊」" 

# monologue
# JP: （どさっ！）
2049 = "（Đổ sập!）"

# monologue
# JP: ――満足感と達成感に、体の全部が気だるく崩れる。\n全身がもうクタクタだけれど、心地いい。
1835 = "――Cảm giác thỏa mãn và thành tựu khiến\ntoàn thân rã rời đổ gục.\nDù cả cơ thể đã mệt lử, nhưng lại vô cùng\nsảng khoái."

# monologue
# JP: 日々姫も僕の隣にくずれ、\nぴたり、甘えて擦り寄って――――？
1768 = "Hibiki cũng đổ gục xuống bên cạnh tôi,\náo sát, cọ cọ làm nũng――――?"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに……ね……にぃに――にぃにぃ」
1345 = "「Anh hai……nè……anh hai――anh hai」"

# monologue
# JP: ……甘えて、じゃない。\n発情し切って、すりよってくる。
921 = "……Không phải làm nũng.\nMà là đang phát tình tột độ, cọ xát vào\nngười tôi."

# monologue
# JP: 自分がかけた精液が、当然肌に移植され。\nそれは特段気にもならんが、疑問は些かふくらんでくる。
1560 = "Tinh dịch do chính tôi bắn ra, tất nhiên\nsẽ dính lên da.\nĐiều đó thì cũng chẳng đáng bận tâm lắm,\nnhưng trong lòng tôi lại dấy lên một sự\nnghi ngờ."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　日々姫。\n僕の描いた絵では、不満か？」
1309 = "「Sao thế? Hibiki.\nEm không hài lòng với bức tranh anh vẽ\nsao?」"

# 【日々姫】
# display as 日日姬
# JP: 「ううん？　満足――でも……塗り残し」
1281 = "「Dạ không? Em rất hài lòng――Nhưng mà……còn\nchỗ chưa tô kìa」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
# 1360 = "「！！」" 

# monologue
# JP: 肌、膣、お口。僕の精液絵の具は確かに、\n日々姫のかなりの部分を染めた。
1905 = "Da, âm đạo, miệng. Màu vẽ tinh dịch của\ntôi quả thực\nđã nhuộm đẫm một phần lớn cơ thể Hibiki."

# monologue
# JP: だが――ひとつ。かなり大きな範囲を確かに、\n言われてみれば、塗り残してる。
1479 = "Nhưng――còn một chỗ. Nghe em ấy nói mới để\ný,\nquả thực còn một vùng khá lớn tôi chưa tô\nđến."

# 【双鉄】
# display as 雙鐵
# JP: 「すぐに、か？　それとも小休止して」
1356 = "「Làm ngay bây giờ sao? Hay là nghỉ ngơi\nmột chút đã」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに～　にぃに～～っ」
1351 = "「Anh hai~ Anh hai~~」"

# 【双鉄】
# display as 雙鐵
# JP: 「よかろう」
1289 = "「Được thôi」"

# 【日々姫】
# display as 日日姬
# JP: 「ひゃんっ！！？」
# 1157 = "「呀！！？」" 

# monologue
# JP: 嬉しげに悲鳴をあげる日々姫の足を持ち上げて。
1679 = "Tôi nâng đôi chân của Hibiki đang khẽ thét\nlên vì sung sướng."

# monologue
# JP: そうして僕は、塗り残した場所。\n日々姫のアナルのその奥に――
1852 = "Và rồi, nhắm vào chỗ còn chưa tô màu.\nTận sâu bên trong hậu môn của Hibiki――"

# monologue
# JP: 残りの絵の具を振り絞るため、\n大胆に筆を走らせる！
1839 = "Để vắt kiệt những giọt màu cuối cùng,\ntôi táo bạo vung cọ vẽ!"
