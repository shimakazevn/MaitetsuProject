1269 = "「嗯！呼――啾嚕！啾嚕！啾嚕！啾！啾嚕！啾嚕嚕！咕啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん――く――あっ！」
1235 = "「嗯――唔――啊！」" 

