2092 = "（插入！）" 

# monologue
# JP: 射精したまま口に押し入――っ！！？
1899 = "肉棒還在射著精，就這麼直接插進她的嘴裡――！" 

# 【日々姫】
# display as 日日姬
# JP: 「～～～～～～～～～～っ！！！」
1368 = "「～～～～～～～～～～！！！」" 

# monologue
# JP: すぐさま意図を察した日々姫が、\n唇だけをギュッとしめ、同時に強く吸引し！
1809 = "日日姬馬上明白了我的意思，緊緊閉上了嘴唇，同時用力一吸！" 

# 【日々姫】
# display as 日日姬
# JP: 「じゅぞおおおおおおおおおおおおおおおおおっ！！！」
1228 = "「啾嚕嚕！！！」" 

# monologue
# JP: そして頭を後ろに引いて、\n完全にもう精液だけをを絞り出そうとっ！！
1851 = "然後她頭往後一仰，完全就是在榨出精液的動作！！" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
1165 = "「呃啊！！！」" 

# monologue
# JP: （びゅっ！　びゅるるっ！　びゅっ！――どびゅっ！）
2080 = "（噗！噗嚕！噗噗！――噗嚕！）" 

