1776 = "日日姬就連口交的技巧都進步了。這真是讓我既欣喜又愛憐，於是我輕輕摸了摸她的頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「ふ……ぁ……んっ――むぃ――ぃ～」
1191 = "「呼……啊……嗯――唔――哥～」" 

