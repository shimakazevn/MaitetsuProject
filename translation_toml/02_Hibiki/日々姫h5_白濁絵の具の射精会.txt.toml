1312 = "「Vậy thì, Hibiki. Hãy hòa quyện chúng vào\nnhau thật thỏa thích nào.\nMàu sắc đậm nhất của anh, và màu\nsắc――tuyệt đẹp nhất của Hibiki」"

# monologue
