1779 = "日日姬從喉嚨深處發出了歡快的叫聲，我的肉棒畫筆現在徹底被唾液顏料塗遍了。" 

# 【日々姫】
# display as 日日姬
# JP: 「っろっ――れるうっ――れろっ――じゅぶっ！　じゅ！\nずりゅりゅりゅりゅ！　ん――れろっ――ぬろんっ！」
1226 = "「啾嚕――啾嚕――啾嚕――啾噗！啾！啾嚕啾嚕！嗯――啾嚕――啾噗！」" 

# monologue
