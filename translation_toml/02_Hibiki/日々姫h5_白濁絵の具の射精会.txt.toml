1266 = "「嗯噗！！！！」" 

# monologue
# JP: 腰を引く！\n完璧に同時に動きはそれでもギリギリすぎてっ！！！
1708 = "我腰往後一抽！雖然我們的動作配合得很完美，但還是千鈞一髮！！！" 

# monologue
# JP: （びゅっ！　びゅるっ！　どびゅっ！　びゅぶう！！）
2081 = "（噗！噗嚕！噗噗！噗嚕！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「きゃうっ！！？」
# 1157 = "「呀！！？」" 

# monologue
