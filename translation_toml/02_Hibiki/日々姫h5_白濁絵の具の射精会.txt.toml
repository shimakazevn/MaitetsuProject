# 【日々姫】
# display as 日日姬
# JP: 「きゅふうううううううっ！！！！？」
1213 = "「啊嗯！！！！？」" 

# monologue
# JP: （ごつっ！）
2106 = "（頂上！）" 

# 【日々姫】
# display as 日日姬
# JP: 「きゃふんんっ！！！！」
1152 = "「呀嗯！！！！」" 

# monologue
# JP: 答えを実地で示すべく、小さな膣を、おまんこを。\nためらうことなく、ガチガチになった勃起で貫く。
1694 = "我用行動回答了她，一口氣用硬到極點的肉棒貫穿了她小巧的蜜穴。" 

# 【日々姫】
# display as 日日姬
# JP: 「か――はっ――ふあっ――あっ――んっ――\nふっ――はぁ――はぁ――はぁ――はぁっ」
1162 = "「呃――呼――呼――啊――嗯――呼――呼――呼――呼――呼」" 

# monologue
# JP: （きゅん！　きゅんっ！　きゅううううううんっ！）
2096 = "（收縮壓迫）" 

# monologue
# JP: ただでさえ体温高めの日々姫のまんこが、\n不意の挿入に驚いて、緊張しさらに熱くなってる。
1793 = "日日姬的小穴裡本來溫度就比較高，我突如其來的插入讓她一陣緊張，導致溫度更高了。" 

# monologue
# JP: その柔肉が隙無くぴったり勃起に張り付き、\n張り付き抱きしめ締め付けながら、蠕動している。
1946 = "裡面的軟肉完美地貼合在了肉棒上，一邊套弄著一邊蠕動。" 

# 【日々姫】
# display as 日日姬
# JP: 「い――きなり――おく――まで――子宮、の――\nドア――の――はっ――とこ、ろ――まで――んっ」
1325 = "「突然――插到――最裡面――到了――子宮的――入口――那裡――嗯」" 

# monologue
# JP: （ざわっ――ざわわっ――ぞろっ――ぞりゅっ――）
2095 = "（搓動套弄）" 

# monologue
# JP: 動かないでも、動かされてる。\n日々姫の膣のヒダは恐らく、かなり深くて――
1617 = "就算我不動，穴肉也在帶著肉棒蠕動。日日姬的蜜道上的褶皺應該算是很深的那種――" 

# 【日々姫】
# display as 日日姬
# JP: 「はっ――だめ――まだ――にぃに――んっ――\nまだ――息……整う――まで――動い、ゃ――あ」
1168 = "「呼――不行――還不行――阿哥――嗯――我還――沒喘過氣――現在――先別動――啊」" 

# monologue
# JP: （ぞわわ――ズズッ――ぞるるっ――もみゅん）
# 2095 = "（搓動套弄）" 

# monologue
# JP: ――細かく深い膣ヒダの、その一つ一つが\n薄くて繊細な舌のごときに蠢いてくる。
1833 = "深深的褶皺就像一條條又薄又細的小舌頭一樣來回蠕動著。" 

# monologue
# JP: 日々姫自身が“動かれてる”と錯覚するほど、\nヒダの動きは、感覚は、明確すぎて肌が粟立つ。
1948 = "褶皺運動的觸感十分鮮明，我感覺就像被日日姬帶著動起來了一樣，這讓我舒服得起了雞皮疙瘩。" 

# 【双鉄】
# display as 雙鐵
# JP: （成長……するのだな。\n膣の中さえ――精を絞ろうとする動きさえ）
2084 = "（她這是……成長了啊。就連陰道中榨取精液的動作顯得成熟了）" 

# monologue
# JP: 初めて挿入したときの、痛みを感じたほどだった、\nただひたすらな狭さとキツさと、温度の高さ。
1881 = "第一次插入的時候，我只能感覺到緊窄到夾得我生疼的通道，還有熱熱的溫度。" 

# monologue
# JP: それがなぜだか思い出されて、\n嬉しいような、寂しいような気持ちがしてくる。
1861 = "現在的感觸讓我回想起了從前，心中有點高興，卻又有點空虛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さすがは――日々姫だ」
1127 = "「不愧是日日姬」" 

# monologue
# JP: （ず――るっ――）
2093 = "（插入）" 

# monologue
# JP: 日々姫はもはや、足にも腰にも力が入らないようだ。
1789 = "日日姬現在好像腿跟腰都用不上力了。" 

# monologue
# JP: から、腰に当ててる手で促して、\n日々姫の体を、じわじわじわじわ持ち上げさせる。
1716 = "所以我動起扶著她腰的手，把日日姬的身體慢慢抬了起來。" 

# monologue
# JP: （ずっ――るっ――ぬっ――ぶっ――）
2064 = "（噗呲）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひきゅっ！？　くはっ――あっ！　やっ！\nまらっ――まだっ――動いちゃ、らめっ、だめっ」
1160 = "「呀！？啊――啊！呀！還不――還不能動、不行」" 

# monologue
# JP: （ずんっ！）
2107 = "（頂入）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひぁぁぁあああああんんっ！！！」
1151 = "「呀嗯！！！」" 

# monologue
# JP: 手のちからを抜き、同時に腰を突き上げたなら、\n日々姫は体を弓とそらせて、大きくあえぐ。
1670 = "我手上一松，同時腰往上一頂，日日姬的身體就彎成了一個弓形，同時發出了大聲的嬌喘。" 

# monologue
# JP: （きゅんっ！　きゅうううううううっ！！）
# 2096 = "（收縮壓迫）" 

# monologue
# JP: 暴力的な膣の収縮。\nただ一瞬の凶悪な波。
1941 = "蜜道的收縮力度簡直稱得上是暴力，不過這一波壓迫轉瞬而逝。" 

# monologue
# JP: 日々姫と肌を重ね始めたあのころだったら、\n超えられず、無様に吐精してただろうが――
1596 = "如果換做剛跟日日姬開始親熱時的我，應該就扛不住這一波攻擊，沒出息地射出來了吧。" 

# 【双鉄】
# display as 雙鐵
# JP: （そうして僕も……それなりに成長したらしい）
2045 = "（但是……我也有所成長了）" 

# monologue
# JP: そう感じれば、余裕が生まれる。
1962 = "這麼一想，心中便多了幾分從容。" 

# monologue
# JP: うわずりそうな声を抑えて、\n低く、甘くと――意識し日々姫に囁きかける。
1676 = "我抑制著不讓自己發出興奮的叫聲，而是刻意用低沉而柔和的聲音對日日姬輕聲低語。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、動かねば――きちんと混色を出来ぬと思うが？」
1132 = "「但是如果不動的話――顏色就混不到一起了啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「う……う、ん。――ふあっ――あ！　した、い――\nまぜ、まぜっ――にぃにの、色、と――私の、と――ぁ」
1250 = "「嗯……嗯――呼――啊！我想――我想讓――阿哥的、顏色――跟我的――混在一起――啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら、日々姫。思いっきりに入り混じらせよう。\n僕の一番濃い色と、日々姫の一番――綺麗な色を」
1312 = "「日日姬，那就讓我盡情地攪一攪吧。讓我把最深的顏色，和你最漂亮的顏色――混在一起」" 

# monologue
# JP: （ずびゅんっ！！！）
2065 = "（噗啾！！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ふあ――あっ！　にぃにっ――にぃにぃ～っ！！！」
1180 = "「呼――啊！阿哥――阿哥！！！」" 

# monologue
# JP: （きゅううううんっ！　きゅきゅんっ！！）
# 2096 = "（收縮壓迫）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くっ――っ！」
1166 = "「呃！」" 

# monologue
# JP: 射精させる気全開で、\n日々姫の膣が僕の勃起を絞りにかかる。
1798 = "日日姬的蜜道狠命地套弄著我的肉棒，一個勁地要讓我射精。" 

# monologue
# JP: 囁き動けば日々姫のかわいいおまんこは、\nこうも素直に甘やかに、激しく反応してくれる。
1659 = "我對日日姬輕語幾句，她的可愛小穴就坦率地做出了強烈的反應。" 

# monologue
# JP: （ずるうううううううううっ！！）
# 2093 = "（插入）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゅっ！　あああああああああんっ！！？」
1153 = "「呀！啊啊啊！！？」" 

# monologue
# JP: （ずぶんっ！　ずりゅっ！　ごちゅっ！　ずりゅううつ）
2056 = "（啾噗！啾噗！噗啾！噗啾！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！　あっ！　あっ！　あっ！！！」
1196 = "「呼！啊！啊！啊！！！」" 

# monologue
# JP: だからこそ、その反応にこたえるために、\n本気まんこを、もっと全力で楽しむために！
1714 = "所以我也要回應她的反應，同時也要全力享用她進入認真模式的小穴！" 

# monologue
# JP: （ぐりゅ！　ずぶんっ！　にゅるむ！　ばちゅんっ！）
# 2056 = "（啾噗！啾噗！噗啾！噗啾！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！　あっ！　あっ！　にぃに――にぃにっ！\nおちん――ぽッ――ふあっ、あっ――すご、すごくて」
1154 = "「呀！啊！啊！阿哥――阿哥！雞雞――呼――啊――好厲害」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どう、　――おちんぽ、が――くっ――\nすごい――ん――だ？」
1353 = "「雞雞――怎麼個――厲害法？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ぁぁぁっ！　その、声っ！　んっ――にぃに――の――\n甘く、て――感じて、るっ――こえぇっ！」
1218 = "「啊！這個聲音！嗯――阿哥――舒服時候――發出的――聲音！」" 

# monologue
# JP: （きゅんっ！　きゅんっ！　ざわわわわわわっ！！）
# 2096 = "（收縮壓迫）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ――くっ！」
1163 = "「呃――！」" 

# monologue
# JP: 膣が抱きしめながら同時に蠢く。
1944 = "蜜道緊緊貼了上來，同時還在蠕動。" 

# monologue
# JP: その強烈な快感に、脳の溶栓がもっていかれかけ、\n思わず体が止まってしまう。
1628 = "強烈的快感直接讓我腦中的溶栓崩開，我不由得停下了動作。" 

# 【日々姫】
# display as 日日姬
# JP: 「はぁ――あの、ね？　おちん、ぽ――にぃに、の――\n大事な――わたし、の、にぃに、お――おちんぽ、ね？」
1185 = "「呼――聽我說雞雞――阿哥的――我最重要的――阿哥的――雞雞」" 

# monologue
# JP: （きゅんっ！　ざわわっ！　きゅううっ！　ぞるるっ）
# 2096 = "（收縮壓迫）" 

# monologue
# JP: おまんこは変わらず凶悪に僕を責め立て続け、\nけれども僕が止まったことで日々姫には余裕が出たらしい。
1612 = "小穴依然兇殘地刺激著我，但是因為我停止了抽插，日日姬有工夫說話了。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……ふっ――あっ――あのね？　いっつも、よりも、\nふとい――みたい、で――くびれ、の――とこ――あっ」
1246 = "「嗯……呼――聽――聽我說。感覺、比平時、更硬了――冠狀溝的――那裡、啊」" 

# monologue
# JP: （きゅうううっ！！）
# 2096 = "（收縮壓迫）" 

# monologue
# JP: 意識し、それゆえ感じてしまったのだろう。\n日々姫は軽く体を震わせ息をのみ。
1773 = "日日姬可能是留意到了那裡，然後湧起了快感吧。她的身子輕輕抖了一下，然後她吞下了一口氣。" 

# monologue
# JP: ややありほうっと長く吐き出し、言葉の続きを、\n実に日々姫に――律儀に真面目に紡ぎ続ける。
1854 = "然後日日姬長長地呼氣，繼續認真地說了下去。" 

# 【日々姫】
# display as 日日姬
# JP: 「くび、れ――の――とこ――が、小刻み、にっ――っ、\nおまんこ――のっ――はっ――かべ――ぐりって、して」
1144 = "「冠狀溝――那裡――一下一下的――刮著――小穴的――裡面」" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ――」
1232 = "「嗯――」" 

# monologue
# JP: 僕が、動かしているわけではない。\nそう思うのだが、一瞬ごとにどんどん自信が失せてくる。
1663 = "我很想相信我不是被她引導著動了起來，但是這份自信隨著時間在一點點消逝。" 

# monologue
# JP: この甘肉に促されつづけ、動かずいるなど、射精せぬなど、\nどれほど強い意思と肉体を持ってしてもなお不可能だろう。
1557 = "在這美妙穴肉的包裹刺激之下，不管有多強的意志、多強的肉體，也只會讓人忍不住抽插起來，在裡面射精。" 

# 【日々姫】
# display as 日日姬
# JP: 「それで――ね？　さきっぽっ――うごい、て――おくっ、\nごちゅん、って――され、ちゃう、と――ね？」
1321 = "「然後就是、龜頭――動起來――頂到――裡面的時候」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ごちゅんとされると？」
1354 = "「頂到裡面的時候？」" 

# monologue
# JP: （ずっっ――ごちゅっ！）
# 2093 = "（插入）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃうううううううううっっっ！！！」
1156 = "「呀！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くっ――」
1202 = "「唔――」" 

# monologue
# JP: 動いた――つもりは全く無かった。\n動こうとさえ、思ってなかった。
1500 = "其實我根本沒打算動，心裡根本就沒有想動的念頭。" 

# monologue
# JP: けれども日々姫の声に体が反応し――\nどうなるのかが知りたいと、恐らく本能で求めてしまった。
1477 = "但是身體自己就對日日姬的聲音起了反應，我的本能恐怕是在主動尋求著答案。" 

# 【日々姫】
# display as 日日姬
# JP: 「ひあ――あっ――ふぁ……ん――はぁっ――いま、ね？\nちゅって――しきゅうと、先っぽ――ちゅう、して、て」
1148 = "「呀――啊――呼……嗯――呼――剛才――親了――龜頭――親了、上來」" 

# monologue
# JP: 確かにしてる。
1585 = "她說的沒錯。" 

# monologue
# JP: 日々姫の最奥、ぽってり厚い子宮のドアと、\n僕の亀頭の先端が、一ミリの隙も無くキスしてる。
1699 = "我的龜頭緊緊親上了日日姬體內最深處，親上了她子宮入口肥厚的肉門，其間連一毫米的縫隙都沒有。" 

# 【日々姫】
# display as 日日姬
# JP: 「それ――を、ね？　にぃに――が、ずりゅっ――て、\nひっぱり――抜いちゃう、とき……に…………んっ」
1320 = "「然後――阿哥――一下子――拔出去的時候…………嗯」" 

# monologue
# JP: 僕が動くと予想して、日々姫が力めば\n膣の素直にきゅん！　とすぼまる。
1765 = "日日姬一用力，可能是估計著我會動起來吧，我就感覺蜜道猛地收緊了一下。" 

# monologue
# JP: うかつに動けば射精する。\nわかっているから、ゆっくりじわり腰を引き下げ――！？
1710 = "我要是胡亂抽插的話可能就要忍不住射了，所以我小心翼翼地慢慢往後抽――" 

# monologue
# JP: （きゅ――ぷっ――）
2060 = "（啾噗）" 

# 【日々姫】
# display as 日日姬
# JP: 「ふあっ――これ――なのっ！　これ――しゅごっ！\nしゅごく――って、きもち――んっ――よく――って！」
1184 = "「呼――就是――這個！這個――特別！特別的――舒服――嗯！」" 

# monologue
# JP: 日々姫の声が聞こえているが、\n脳が意味へと直してくれない。
1697 = "我的耳中雖然聽到了日日姬的聲音，但是大腦沒有理解出話語的意思。" 

# monologue
# JP: 亀頭の先端。密着部分。\n僕の全身全霊が、ただそこだけに集中してる。
1652 = "我全部的意識都集中到了龜頭的前端，集中到了我們結合在一起的地方。" 

# 【双鉄】
# display as 雙鐵
# JP: （なん――だ――これ――は）
2104 = "（這是――什麼啊）" 

# monologue
# JP: 吸い付きあってる。引き寄せあってる。\n子宮のドアの厚ぼったさと、僕の亀頭の最先端とが。
1667 = "我感覺子宮入口厚厚的肉門在吸引著、拉扯著我龜頭的前端。" 

# monologue
# JP: （み――――ちゅっ――）
2051 = "（吸住）" 

# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！　あああっ――はあっ！　んああああっっ」
1195 = "「呼！啊啊啊――呼！嗯啊啊」" 

# monologue
# JP: 0.1ミリ――0.2ミリ。\nおそらくそれほど緩慢に、慎重に慎重に腰をひいてく。
41 = "0.1毫米――0.2毫米。我小心翼翼地向後抽出，動作十分緩慢。" 

# monologue
# JP: それでもまだなお、離れない。\n子宮口か亀頭先端か、その両方かが――
1857 = "然而子宮口跟龜頭前端還是僅僅貼在一起，沒有鬆開。" 

# monologue
# JP: （ちゅっ――みぃ――）
# 2051 = "（吸住）" 

# 【日々姫】
