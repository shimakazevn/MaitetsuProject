1961 = "這真的讓我好開心。一想到日日姬已經是我的女人，我就想讓她全身都染上我的顏色！" 

# 【日々姫】
# display as 日日姬
# JP: 「ん！　ふうっ！　ぢゅぶっ！　じゅるっ！　ぢゅぼっ！\nふ――んっ！　ひぃ、ひ――ひっへ――！　ちゅ、む！」
1271 = "「嗯！呼！啾噗！啾嚕！啾噗！呼――嗯！啊――阿哥――！啾、唔！」" 

# 【双鉄】
# display as 雙鐵
