# JP: 勃起をぱんぱんに含んだままで、\nにぃにと僕を呼んでくれてる。
1568 = "她嘴裡塞滿了肉棒的同時也不忘叫我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。日々姫。僕は、お前のにいさんだ」
1278 = "「嗯，日日姬，我是你哥哥」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん」
# 1259 = "「嗯」" 

# monologue
# JP: 言葉と同時にわずかに髪を引っ張れば、\n日々姫はごく嬉しげに、綺麗で大きな瞳を細める。
1545 = "回答日日姬的同時我稍微拉了一下她的頭髮，她便一臉高興地眯起了漂亮的大眼睛。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん――ふっ――あっ――んっ――むぃ――ぃ――ん、\nふっ――ひゅひ――んっ――らい――ひゅひ……んむ」
1234 = "「嗯――呼――啊――嗯――唔――哥――嗯、呼――最――嗯――最――喜歡……嗯」" 

# monologue
# JP: 勃起に圧されくもぐる声で、\nそれでも日々姫が思いを伝える。
1547 = "因為嘴裡含著肉棒，日日姬的聲音含糊不清，不過她還是訴說著心意。" 

# monologue
# JP: 舌が動いて勃起が震えてしまうのならば――
1551 = "在她動著舌頭的同時肉棒也跟著一抖――" 

# 【日々姫】
# display as 日日姬
