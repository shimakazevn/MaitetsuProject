# 【ふかみ】
# display as 深美
# JP: 「"そういこと”って――セックスでしょ？　日々姫さん。\nおちんちんを、おまんこに挿れること。セックス」\n946 = "「“這種事”——是指做愛吧？日日姬小姐。小雞雞插進小穴裡，就是做愛」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ！！！？」\n1405 = "「唔！！！？」" \n\n# monologue\n# JP: 顔から手から足の裏まで、日々姫の全身が朱に染まる。\n日々姫の部屋で時折感じる甘ったるい匂いが強くなる。\n2155 = "日日姬從臉到手，到腳底全都紅了。三不五時在日日姬的房間能聞到的那股香氣也更濃烈了。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「……憧れをこじらせるのは怖いって。わたしは理屈で、\n凪ちゃんは多分直感で、凄く、強く思ったんです」\n969 = "「……被憧憬之情折磨是很可怕的。我是靠推理，而小凪大概是靠直覺強烈地感受到了」" \n\n# monologue\n# JP: （しゅこっ！！）\n2437 = "（套弄！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「んっ！！！」\n1494 = "「嗯！！！」" \n\n# monologue\n# JP: 何に対する憧れなのか――考えがまとまるより早く、\nふかみの器用な足指が、勃起をしごいて邪魔をする。\n1961 = "她是指對什麼的憧憬——我還沒來得及認真想，深美靈活的腳趾就套弄我的勃起妨礙了我的思考。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぁ――あ――にぃに――そんな、気持ち良さそうな顔」\n1426 = "「啊——啊——阿哥——表情看起來這麼舒服」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「羨ましいなら、足を動かしたらどうですか？\n今日は日々姫さん、『凪ちゃんの代わり』なんですよ？」\n1522 = "「如果羨慕的話，你的腳也動起來吧？今天， 你可是“代替小凪”的呀」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あっ――。\n――――っ――」\n1431 = "「啊——嗚——」" \n\n# monologue\n# JP: 日々姫の足がもう一度、僕の勃起に近づいてくる。\nがたがたブルブル、緊張のせいか、震えてる。\n2182 = "日日姬的腳再一次靠近我的勃起。可能是因為緊張的原因，她的腳在發抖。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々、姫――」\n1624 = "「日日、姬——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あっ」\n# 1443 = "「啊」" \n\n# monologue\n# JP: 日々姫の足が止まってしまう。何も言えなくなってしまう。\n拒絶はできない。無論、催促などできようも\n2181 = "日日姬的腳停下了。她沒辦法出聲。我無法拒絕，自然也無法催促。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「やっちゃえば、簡単なことなんですよ？」\n1312 = "「只要敢於行動，這是很簡單的一件事」" \n\n# monologue\n# JP: （ふみゅっ）\n2479 = "（踩踏）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ！！！！！！」\n1404 = "「唔！！！！！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うっ！！！！」\n1464 = "「嗚！！！！」" \n\n# monologue\n# JP: ふかみが軽く足で押す。\n僕の勃起を、硬直してる日々姫の足裏に押し付ける。\n2243 = "深美輕輕地用腳按壓。讓日日姬僵硬的腳底壓在我的勃起上。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふかみ……」\n1701 = "「深美……」" \n\n# monologue\n# JP: 安堵している。事態が進捗――いや、\nふかみが僕らを恐らくは、助けてくれたそのことに。\n2079 = "我鬆了一口氣。事態終於有了進展——不，這恐怕是多虧了深美的幫助。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「たったこれだけのことなんです。\n普通に誰でもしてること。それなのに……ね？」\n1534 = "「就是這麼簡單。每個人都做得到。可是……對吧？」" \n\n# monologue\n# JP: ふかみが日々姫に視線を送る。\n日々姫は戸惑ったような顔をして、ゆっくり、小さく頷く。\n2242 = "深美看向日日姬。日日姬露出困惑的表情，慢慢地點了點頭。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふつうに、だれでも、してること」\n1682 = "「每個人、都做得到」" \n\n# monologue\n# JP: （しにゅっ）\n2438 = "（套弄）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！」\n# 1401 = "「唔！！！」" \n\n# monologue\n# JP: ふかみからか、日々姫からか――あるいは同時か。\nわからないまま、ふたりの足裏が動き始める。\n1888 = "不知道是深美先動，還是日日姬先動——亦或是同時。兩人的腳底開始動了起來。" \n\n# monologue\n# JP: （ふみゅっ――しにゅっ――こしゅっ――ふきゅっ――）\n2429 = "（套弄——套弄——套弄——套弄）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ですです。やってみたら簡単でしょう？\nこうしてふたりで、あんよで挟んで動かすだけで」\n1665 = "「是的是的。試試看就知道很簡單吧？我們兩人像這樣，用腳來夾住動起來就行啦」" \n\n# monologue\n# JP: （くにっ！）\n2441 = "（擠壓！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！」\n# 1401 = "「唔！！！」" \n\n# monologue\n# JP: ふかみの足がアクセルペダルを踏み込むような動きをする。\nただ不器用に上下するだけの日々姫の足とギャップが生じ。\n2237 = "深美的腳就像踩剎車一樣活動著。但是日日姬的腳動得很不靈活，因此產生了差異。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くふっ――ぁっ――」\n1368 = "「咕呼——啊——」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「普段はあれだけかっこよくて、冷静で頼りになりまくる\n双鉄おにいさんが、こんなだらしないお顔になっちゃう」\n1536 = "「平時那個帥氣的，冷靜又可靠的雙鐵哥哥居然會露出這麼下流的表情」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぁ……にぃに……そぎゃんお顔……」\n1442 = "「啊……阿哥……這種表情……」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「日々姫さんも、もっと好きに動かしてみていいですよ？\n痛くとかならないように、わたし側で調整しますから」\n1640 = "「日日姬小姐，你可以按照自己的想法動的。我會做好調整，不讓他覺得痛的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぁ……」\n1435 = "「啊……」" \n\n# monologue\n# JP: 日々姫は戸惑ったようにふかみを見――\nそれからゆっくり、怖がるような視線を僕へと向け直す。\n2145 = "日日姬不知所措地看著深美——然後用怯生生的眼神重新看向我。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あの……にぃに――」\n1765 = "「那個……阿哥——」" \n\n# monologue\n# JP: 思考がまったくまとまらない。動悸の音ばかりが耳につく。\n冷静に――思った瞬間。最低な発想に取り憑かれてしまう。\n2017 = "思考完全無法集中。只有心跳的聲音扎在耳中。要冷靜——就在我這麼想的瞬間，邪惡的想法支配了我的大腦。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……動かして、ほしい。とにかく一度――\n僕を、射精させてほしい」\n964 = "「……我想要你動。總之，現在我想——讓你幫我射精」" \n\n# monologue\n# JP: 射精をすれば、抜きさえすれば冷静になれる。\n卑怯な逃げでしかないのであろう発想に、けれども僕は\n1920 = "只要射精了，就能冷靜下來。雖然這種想法是卑鄙的逃避，但我還是——" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ！！！」\n# 1494 = "「嗯！！！」" \n\n# monologue\n# JP: ああ――日々姫もだ。\n満面の笑顔をもって、僕の言葉にすがりついてくる。\n1931 = "啊——日日姬也是。她燦爛地笑著，服從了我的話。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「えと……」\n1337 = "「呃……」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「いいですよ？　想像してたこととか、知識とか。\nそれを試してみるくらいの気持ちで、思うままにで」\n1686 = "「沒問題的。就當做是去嘗試自己的想像或是知識，想怎麼做就怎麼做吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はうっっ」\n1384 = "「哈嗚」" \n\n# monologue\n# JP: ふかみの言葉に頬を染め、それでも小さく頷いて。\n2280 = "聽到深美的話，日日姬紅了臉，但還是輕輕地點了點頭。" \n\n# monologue\n# JP: （ふ、みゅ――くにゅっ――しこっ――しにゅっ――）\n2477 = "（踩踏——踩踏——套弄——套弄——）" \n\n# monologue\n# JP: 日々姫は足を、少し大胆に動かし始める。\nふかみは一転、足裏を支え――クッションにする。\n2183 = "日日姬的腳的動作開始慢慢地大膽起來。而深美改變動作，支撐住腳底——進行緩衝。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んっ――」\n1468 = "「嗯——」" \n\n# monologue\n# JP: （しにゅっ――ぐちゅっ――ふみゅっ――もみゅっっ）\n# 2429 = "（套弄——套弄——套弄——套弄）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「――」\n930 = "「——」" \n\n# monologue\n# JP: 日々姫の足がみるみるうちに、柔らかに暖かに変化する。\n赤ん坊の指顔負けのぷりぷり指が、僕の亀頭の先端を。\n2184 = "日日姬的腳變得越來越輕柔，越來越溫暖。肥嫩得不次於小嬰兒的腳趾玩弄著我龜頭的尖端。" \n\n# monologue\n# JP: （ふにゅっ――さすっ――こしゅっ――なでっ――）\n# 2477 = "（踩踏——踩踏——套弄——套弄——）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁっ！」\n# 1448 = "「啊！」" \n\n# monologue\n# JP: いいこいいことナデナデされて思わず声を漏らしてしまう。\n日々姫の顔が、途端にパッと明るく輝く。\n2293 = "被她這麼一玩弄，我忍不住叫出了聲。日日姬的表情頓時豁然開朗。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「今の良かと！？　にぃに、わたし、上手くできとぉ？」\n1306 = "「剛才那樣很舒服嗎！阿哥，我是不是做得很好？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ――」\n# 1468 = "「嗯——」" \n\n# monologue\n# JP: 投炭練習を不意に思い出しなぜか泣きそうな気持ちになる。\n夢中になれば日々姫はいつでもただただ一生懸命――！？\n1932 = "回想起以前的加煤練習，我不知為何突然想要哭出來。當日日姬對一件事投入的時候，她總是會拚盡全力——" \n\n# monologue\n# JP: （ずりゅううううううううううううううううっっっ！）\n2436 = "（套弄！！！！！！！！！！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くはっ！！！！」\n1370 = "「咕哈！！！！」" \n\n# monologue\n# JP: 突然の強烈な快感に驚き見れば――\n2260 = "突然而來的強烈快感讓我禁不住往上一看——" \n\n# monologue\n# JP: （しこっ！　しにゅうっ！　しゅこっ！　ずりゅうっ！）\n2430 = "（套弄！　套弄！　套弄！　套弄！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わ――わわっ――そぎゃん激しくっ！？」\n1375 = "「哇——哇哇——這麼激烈！？」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ですです。竿は亀頭ほど敏感じゃないから、\nこのくらい強くしちゃって、平気なんです」\n1663 = "「是的是的。杆部不如龜頭那麼敏感，所以用力點也是沒問題的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「（ごくっ）」\n1787 = "「（咽口水）」" \n\n# monologue\n# JP: ふかみは親指と他四本とで挟む形で、僕の勃起を包み込み、\nしかも足指を動かしながら、強く優しくしごいてくれる。\n2224 = "深美用拇趾和其他四根腳趾夾住我的勃起，而且還在一邊活動著腳趾一邊用力而溫柔地套弄。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁ――あっ――これ、は――」\n1425 = "「啊——啊——這——」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「船頭は、足の指で船底掴んでなんぼのお仕事ですから。\nこのくらいなら、余裕なんですよ？　実は」\n1598 = "「掌棹就是用腳趾來攀住船底的工作嘛。這種小事還是腳到擒來的」" \n\n# monologue\n# JP: （しゅこおっ！　ずりゅっ！　もみゅうっ！　しゅこ！）\n2431 = "（套弄！套弄！套弄！套弄！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁ――くっ！」\n1432 = "「啊——嗚！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふわ……わわっ」\n1351 = "「呼哇……哇哇」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「分業しましょう？　わたしはわたしの得意なことを。\n日々姫さんは、日々姫さんの得意なことを」\n1558 = "「我們來分工吧？我來幹我擅長的事。日日姬小姐做自己擅長的事」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「私の――得意って、えと――」\n1546 = "「我——擅長的，呃——」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「双鉄おにいさんの、先走り汁のぬるぬる絵の具で、\n亀頭全部を優しく丁寧に塗りつぶしてあげる、とか」\n1684 = "「比如，用黏黏的預射液顏料溫柔地塗抹龜頭」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ――うん！！」\n1433 = "「啊——嗯！！」" \n\n# monologue\n# JP: （ちゅるんっ！）\n2421 = "（啾嚕！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぅぁぁあああああああああっ！！！？」\n1463 = "「嗚啊啊啊啊啊啊啊啊啊啊啊！！！？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃんっ！！！？」\n1333 = "「呀！！！？」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ぁ、やめなくっても平気ですよ？　今の声は、うふふっ、\nめちゃくちゃ気持ちよすぎてびっくりしちゃった声」\n1459 = "「啊，用不著停下來的。剛才的聲音表示，唔呵呵，雙鐵哥哥舒服得嚇了一跳」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そ、そぎゃん――と？」\n1652 = "「是、是這樣——嗎？」" \n\n# monologue\n# JP: 恥ずかしい。なのに頭が勝手にぶんぶん頷いている。\n今の快感をもう一度、もう何度でも味わいたくて。\n2048 = "我感覺好羞恥，但頭卻不由自主地點了幾下。我好想再體驗一次，不，是反覆體驗剛才的快感。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「えへへっ！　そうなんだ」\n1387 = "「哎嘿嘿！是這樣啊」" \n\n# monologue\n# JP: （ちゅるん！　ぬりゅっ！　ぬちゅっ！　りゅちゅっ）\n2428 = "（塗抹！塗抹！塗抹！塗抹）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁ――ぁっ！　あっ！　あっ！！！」\n1430 = "「啊——啊！　啊！　啊！！！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「んふふっ」\n1487 = "「嗯呵呵」" \n\n# monologue\n# JP: （しゅこっ！　ずりゅっ！　ぐちゅっ！　ずりゅん！）\n# 2431 = "（套弄！套弄！套弄！套弄！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁぁぁああああああああっっ！！！！」\n1446 = "「啊啊啊啊啊啊啊啊啊啊啊啊！！！！」" \n\n# monologue\n# JP: ふかみの指示が恐ろしいほど的確すぎる。\n日々姫の柔らかな足指は、ゆっくりやわやわ丁寧に――\n2228 = "深美的指示準確得可怕。日日姬柔軟的腳趾緩慢地，小心翼翼地——" \n\n# monologue\n# JP: （つりゅん！　ちゅるっ！　ちゅこっ！　くりゅんっ）\n# 2428 = "（塗抹！塗抹！塗抹！塗抹）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふっ――あっ――ぁっ――あっ！」\n1350 = "「呼——啊——啊——啊！」" \n\n# monologue\n# JP: 亀頭全部を先走り汁で余すところ無く無理潰していく。\n亀頭の割れ目もカリ首裏も、本当に余すところな――っ！\n2318 = "龜頭的每一處角落都強行被預射液所覆蓋。龜頭的裂縫，冠狀溝背，沒有一處遺漏——！" \n\n# monologue\n# JP: （しゅこっ！　ずりゅん！　くぢゅっ！　ぢゅにゅっ！）\n2435 = "（套弄！滑溜！滑溜！滑溜！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「～～～～～～～～っ！！！！！」\n1412 = "「唔～～～～～～～～！！！！！」" \n\n# monologue\n# JP: その極上の快感を、暴力的に直線的に、\nふかみの足指の強い刺激が上書きしていく塗り込めていく。\n2301 = "這無上的快感粗暴地、直接地將深美的腳趾帶來的強烈刺激所覆蓋。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「うふふっ、双鉄おにいさん。気持ちいいんですね？\n上も下も、おくち、ぱくぱくあえいじゃってますよ」\n1399 = "「唔呵呵，雙鐵哥哥。很舒服吧？上面和下面的嘴巴都在一張一合的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「えっ！？　あっ！　わっ――――はぁっ……はぁっ。\nおちんちんの、われめ――こんなに――くぱ、くぱっ」\n1389 = "「哎！？　啊！　哇——蛤啊……蛤啊。小雞雞的裂縫——張開得——這麼大」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！」\n# 1401 = "「唔！！！」" \n\n# monologue\n# JP: 無自覚に僕を恥辱攻めして。そうする間も、\n日々姫の白い足指は、丁寧に僕の亀頭を塗りつぶしていく。\n2167 = "日日姬毫無自覺地對我進行著羞辱。在這期間，日日姬白皙的腳趾依舊在仔細地塗抹我的龜頭。" \n\n# monologue\n# JP: （くりゅん！　ぬりゅんっ！　ちゅるん！　ちゅくっ！）\n2472 = "（滑溜！滑溜！滑溜！滑溜！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「もう少しかなぁ～？　どうかなぁ～？」\n1654 = "「是不是還差一點了～？　是不是呢～？」" \n\n# monologue\n# JP: （しゅこっ！　くぢゅっ！　しにゅっ！　ずりゅうっ！）\n# 2431 = "（套弄！套弄！套弄！套弄！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふぁっ――あっ――っ――あっ――あっ！！」\n1355 = "「呼啊——啊——啊——啊！！」" \n\n# monologue\n# JP: 不意にふかみの足の動きがゆるく、弱くなる。\nゆえに亀頭に神経が、一層集中させられてっ――\n2263 = "突然，深美腳的動作變慢變輕了。因此神經的感觸越來越集中在龜頭上——" \n\n# monologue\n# JP: （くりゅっ！　ちゅにゅ！　りゅこっ！　ぬりゅっ！）\n# 2431 = "（套弄！套弄！套弄！套弄！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！」\n# 1401 = "「唔！！！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「あ、うふふっ。ビクビクしてきたぁ。\n双鉄おにいさん、射精、もうすぐなんですか？」\n1457 = "「啊，唔呵呵。一抖一抖的。雙鐵哥哥，馬上就要射了嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！？　――あ、あぁ」\n1406 = "「唔！！？　——啊，嗯」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ！！！」\n# 1401 = "「唔！！！」" \n\n# monologue\n# JP: はずかしい。義妹の前で。日々姫の前で。\n自分の射精が間近だと、告白させられてしまっ――っ！？\n1968 = "好羞恥。居然要在妹妹、日日姬的面前坦白自己要射精了——！？" \n\n# monologue\n# JP: （じゅっ！　こんんっっっっっ！！！！！！！）\n2433 = "（套弄！套弄！！！！！！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くああああああっ！！？」\n1371 = "「咕啊啊啊啊啊啊啊！！？」" \n\n# monologue\n# JP: （しゅこっ！　ぢゅこっ！　ふみゅっ！　しゅこっ！！）\n# 2431 = "（套弄！套弄！套弄！套弄！）" \n\n# monologue\n# JP: ふかみが加速し、睾丸にも踏むような刺激を加え――\n2218 = "深美加快速度，並對睪丸施加踩踏般的刺激——" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「かわい――にぃに――にぃに、かわいい」\n1514 = "「好可愛——阿哥——阿哥，好可愛」" \n\n# monologue\n# JP: （くりゅん！　ちゅるっ！　しゅみゅ！　ちゅるん！）\n# 2472 = "（滑溜！滑溜！滑溜！滑溜！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あ――あっ――あっ――あっ！！！」\n1420 = "「啊——啊——啊——啊！！！」" \n\n# monologue\n# JP: 日々姫も煽られより丁寧に、亀頭をひたすら塗りつぶし、\n気持ちよすぎて精液が、ぐんぐん膨らみ濃くなっていく。\n1951 = "在煽動之下，日日姬也更加仔細、更加專注地塗抹龜頭，強烈的快感讓精液越來越膨脹，越來越濃郁。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「日々姫さん？　もうすぐですよ？　わかります？\nおちんちん、こんなにビクビクあえいじゃってる」\n1641 = "「日日姬小姐，很快就要來了，你能感覺到嗎？小雞雞都抖得這麼厲害了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「～～～～っ！！」\n1344 = "「呃～～～～！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はぁっ、はぁっ、はぁっ、はぁっ――もう、すぐっ、\nもうすぐっ――にぃにの――射精っ――」\n1741 = "「蛤啊、蛤啊、蛤啊、蛤啊——很快就要、很快就要——阿哥——要射精了——」" \n\n# monologue\n# JP: （しゅこっ！　ぢゅこっ！　もみゅ！　ぢゅこんっっ！）\n（ちゅるっ！　ぷちゅっ！　ぬりゅん！　ちゅりゅっ！）\n2432 = "（套弄！套弄！套弄！套弄！）（滑溜！滑溜！滑溜！滑溜！）" \n\n# monologue\n# JP: 亀頭を、竿を、タマまでを、丁寧に激しく責められて、\n熱くて暑くてあつくてあつくて、もう全身がドロドロで！\n2315 = "龜頭、杆部、睪丸在她們兩人仔細而激烈的玩弄下變得無比炙熱，我的全身都像要融化了一樣！" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「思いっきり、ん――きもち、よく――\nたくさん、ぴゅっぴゅ――させて――あげます」\n1281 = "「你就盡情地，嗯——痛痛快快地——射好多好多——出來吧」" \n\n# monologue\n# JP: （しこっ！　しゅこんっ！　ぐちゅ！　ずりゅっ！）\n# 2431 = "（套弄！套弄！套弄！套弄！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「[だ,1]射精してっ――精、液――みたい、けん――\nにぃにの射精――わたし――ずうっと、見たかったけん」\n1526 = "「射出來——我想——看看精、液——我一直——想看——阿哥的射精」" \n\n# monologue\n# JP: （ちゅむっ！　ちゅるっ！　ゆるんっ！　ぷりゅっ！）\n# 2431 = "（套弄！套弄！套弄！套弄！）" \n\n# monologue\n# JP: ふかみの足がポンプになって精を吸い上げ、\n日々姫の優しいナデナデが、精をいっそう昂ぶらせっ！\n2236 = "深美的腳化為水泵吸取精液，日日姬溫柔的撫摸則讓精液越來越沸騰！" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ダメ……だっ！　ぁ――くっ――もうっ、イクッ！」\n1265 = "「不行……了！　啊——嗚——要、射了！」" \n\n# monologue\n# JP: 激しい恥辱が更に全身を加熱する。けれど宣言しなければ、\nどろどろに濃い精液を、日々姫に、義妹に、かけてしまう。\n2002 = "強烈的恥辱讓全身越來越燥熱。但若是我不事先聲張的話，黏稠的精液會飛灑在日日姬——在妹妹的身上。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「うふふふっ！　じゃあ、えいっ！」\n1397 = "「唔呵呵呵呵！那麼，嘿！！」" \n\n# monologue\n# JP: （ぎゅむっ！　ぐいいいいいっ！！！！）\n2434 = "（套弄！套弄！！！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふあっ！！！？」\n1364 = "「呼啊！！！？」" \n\n# monologue\n# JP: （びゅっ！　どびゅっ！！　どびゅる！　びゅううう！）\n2416 = "（咻！咻！咻！咻！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「きゃうっ！！！？」\n1329 = "「呀嗚！！！？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！？」\n1342 = "「呃！！！！？」" \n\n# monologue\n# JP: （びゅうっ！　びゅっ！　びゅるうっ！！　びゅぶっ！）\n# 2416 = "（咻！咻！咻！咻！）" \n\n# monologue\n# JP: ふかみの足に、足指に、勃起をがしりと掴まれて――\n2239 = "深美的腳趾緊緊地抓住勃起——" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふぁっ――あっ――あっ――あっ――」\n1354 = "「呼啊——啊——啊——啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふか、み――どう、してっ――く――あっ！！」\n1698 = "「深美——為什麼——嗚——啊！！」" \n\n# monologue\n# JP: （びゅるっ！　びゅう！　ぶびゅっ！　びゅっ！！）\n# 2416 = "（咻！咻！咻！咻！）" \n\n# monologue\n# JP: 精液を、日々姫に。大切な義妹にかけてしまっている。\n妻たるふかみの、その足指に導かれ――\n2272 = "精液在我的妻子，深美的腳趾的引導下，飛灑在日日姬——我重要的妹妹身上。" \n\n# monologue\n# JP: （びゅううっ！　びゅるっ！　ぶっ！　びゅうっ！）\n# 2416 = "（咻！咻！咻！咻！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あついっ――精、液――にぃにの――にぃ、にの――」\n1517 = "「好熱——精液——阿哥的——阿哥的——」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁ――ああっ！」\n1429 = "「啊——啊啊！」" \n\n# monologue\n# JP: 困惑と罪悪感と興奮が、精液の粘度を更にたかめる。\nマヨネーズのごとき濃白濁が、尿道口をびゅるりと抜けて。\n1939 = "困惑、罪惡感與興奮讓精液的黏度變得更重。宛如美乃滋一般的黏稠白灼從尿道口衝出。" \n\n# monologue\n# JP: （びゅっ――びゅうっ！　――ビュッ――ぷっ――）\n2407 = "（咻——咻！——咻——噗——）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁ――あっ――あ……ん――（ごくっ）――\nはぁっ――はあっ――はあっ――はあっ――」\n1422 = "「啊——啊——啊——嗯——（咽口水）——蛤啊——蛤啊——蛤啊——蛤啊——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「精液。精子――これが、にぃにの――（くんっ、くん）\nあつくて――くさい――ゆめに、まで、見たっ――」\n1721 = "「精液。精子——這就是、阿哥的——（嗅、嗅）好熱——好臭——夢想過，無數次的——」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！」\n1402 = "「唔！！！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ……むっ――ん――じゅずっ――ずっ――ずっ――\nじゅるるるるっ――（ごくっ）――んぇ……に、がっ」\n1437 = "「啊……唔——嗯——啾滋——滋——滋——啾嚕嚕嚕嚕——（嚥下）——嘔……好、苦」" \n\n# monologue\n# JP: 日々姫が、僕の精液を舐める。舐めて、すすって、\n喉に落とす。ひどく不味そうに――しあわせそうに。\n2197 = "日日姬舔著我的精液。一邊舔一邊吸，然後嚥下。看起來很難吃——但又很幸福地。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「どう、して――ふかみっ」\n1709 = "「為什麼——深美」" \n\n# monologue\n# JP: 僕の精液全部を日々姫の方へと向けた、かけさせた。\nそれだけは回避したくて――イクと確かに伝えたのに。\n2066 = "我的精液全部射在了日日姬的身上。為了避免這件事發生——我才告訴她我要射了的。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「満足して、納得してもらえないと――\nこじれてるの、いつか再発するから――そのためです」\n1736 = "「若是不讓她滿足，接受的話——她遲早會又鬧起別扭來的——這就是原因」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！」\n1452 = "「啊！！！！」" \n\n# monologue\n# JP: どこか冷たいふかみの声が射精直後で冷静な脳と呼応する。\nそうだ――そういうえば、こういう話であったのだ。\n2312 = "顯得有些冰冷的深美的聲音與剛射完精後變得冷靜的大腦發生呼應。對啊——如此說來確有其事。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫は――」\n1625 = "「日日姬——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ！！！！！」\n1332 = "「呀！！！！！」" \n\n# monologue\n# JP: チュルルを夢中で盗み食いしているところに\n声をかけられた子猫のような、日々姫の反応。\n2172 = "日日姬的反應就像是在入迷地偷吃東西時被人發現的小貓一樣。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ひびきは」\n1628 = "「日日姬」" \n\n# monologue\n# JP: だから優しく、大丈夫だよと思いをこめて、呼び直す。\nどこまでだって可愛くて愛おしい、僕の大事な義妹の名を。\n2083 = "所以我溫柔地，用不讓她產生任何不安的聲音重新叫了一次我那可愛又寶貴的妹妹的名字。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「う……ん」\n1478 = "「嗯……」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「このように僕とセックスをして――\nしたとして――それで、幸せになれるのか？」\n1739 = "「若是像這樣跟我做愛了——你會覺得幸福嗎？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「なれると！　そいば――わたしの…………\n……にぃにに、エッチしてもらうの……夢、やけん」\n1674 = "「會的！　這是——我的…………和阿哥做這種事……是我的夢想嘛」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ」\n# 1393 = "「唔」" \n\n# monologue\n# JP: 過去形ではなく現在形で日々姫はいって。\n伏せていた目を、僕の目にむけ、持ち上げる。\n2169 = "日日姬用的不是過去時，而是現在進行時。她抬起視線，和我四目相交。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「一番に望んだ形と変わっても。それはやっぱり、\nわたしの大事な夢やけん――叶えたかとよ」\n1392 = "「哪怕這不是我最希望的形式，但我還是實現了我重要的夢想」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そう、なのか」\n1659 = "「是嗎」" \n\n# monologue\n# JP: “叶えねば憧れはどんどん膨らみ歪みを増してく――”\nふかみの言葉の真意が僕にも、予言のように伝わってくる。\n926 = "“若是得不到實現，憧憬便會越來越膨脹，越來越扭曲——”深美話中的真意就像預言一般傳達給了我。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「途中で遮らず聞いてくれ。僕は日々姫をとても大事に\n思っている。それを信頼し――僕の言葉を聞いてくれ」\n1277 = "「你不要打斷我，聽我說。你在我心目中的地位很重要。希望你相信這一點——聽我說」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん」\n1484 = "「嗯」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫の気持ちはとても嬉しい。光栄だ。\nこの状況でなかったら、即座に全力で受け入れている」\n1285 = "「你的心意我很高興。我感到很榮幸。如果不是在這種狀況下的話，我一定會誠心誠意地接受的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん」\n# 1484 = "「嗯」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だが僕はすでに、ふかみを、凪を、妻と選んだ。\n僕の腕では、凪とふかみの他にもう何一つ抱えられない」\n1272 = "「但是，我已經選擇了深美和凪為妻。憑我的能力，我已經無法再接納她們兩人以外的人了」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「やけん。わたし！　今夜だけでも凪ちゃんの代わりに」\n1591 = "「所以，只有今晚也好，我想代替小凪」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「凪の代わりには誰もなれない。\n日々姫の代わりに、世界中誰一人なれないのと同様に」\n1688 = "「沒有人可以代替凪。就跟全世界沒有一個人能代替你一樣」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぁっ――」\n# 1414 = "「啊——」" \n\n# monologue\n# JP: 泣き笑い。ひどく苦しげで、綺麗な表情。女の、顔。\n日々姫に僕が求めぬ表情――どれほど魅力的だろうとも。\n2150 = "日日姬又哭又笑。她的臉龐看起來痛苦又美麗，充滿了成熟女性的氣息。這不是我想看到的表情——哪怕它非常誘人。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫に笑っていてほしい。苦しいときは泣いてほしい。\n素顔の日々姫と、兄妹として楽しい日々を過ごしたい」\n1566 = "「我希望你總是面帶笑容，我希望你在難過的時候能痛快哭一場。我希望和最真實的你作為兄妹，一起快快樂樂地度日」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん」\n# 1484 = "「嗯」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だから、日々姫の初恋が。僕に憧れ続けることが――\n日々姫に仮面を被せることを強いてしまっていうのなら」\n1594 = "「所以，若是你的初戀，還有對我的憧憬——強迫你偽裝起自己的話」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ！！！」\n1784 = "「！！！」" \n\n# monologue\n# JP: ――意識して、視線を剥がしてふかみを見つめる。\n恐らく残酷なことだけれども、絶対、必要なことだから。\n916 = "——我下意識地移開視線，注視著深美。這麼做或許很殘酷，但我必須得這麼做。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふかみ。生涯に一度だけ。今夜一晩だけ。ふかみと凪を、\n僕に裏切らせてほしい。僕の浮気を――」\n1706 = "「深美，這輩子就一次也好，就今晚一次也好。希望你允許我背叛你和凪，希望你允許我的出軌」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「共犯ですよ？　わたしは。双鉄おにいさん」\n1560 = "「我可是共犯啊，雙鐵哥哥」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！！！」\n# 1404 = "「唔！！！！！！」" \n\n# monologue\n# JP: ふかみの瞳の最奥に、たゆたう菫に魅入られる。\n暗くて深く、どこまでも濃い――ほとんど黒の、紫に。\n2072 = "我被在深美雙眼的最深處蕩漾的深紫色——那黑暗，深邃，無比濃重的——無限接近於黑色的紫色給魅惑住了。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「こうなる覚悟はしてました。だから、ね？　一緒に。\n今夜だけ。一晩だけ。凪ちゃんのこと、裏切りましょう」\n1529 = "「對這種事態，我早就做好了心理準備。所以就今天一晚，我們一起背叛小凪吧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ――」\n# 1468 = "「嗯——」" \n\n# monologue\n# JP: だから、僕は、ふかみを求め、ふかみを選んだ。\nそれゆえ僕には、凪の明るさ、裏表なさが必要だった。\n2206 = "正因如此，我才會追求深美，選擇了深美。正因如此，我才需要凪的開朗，需要她的表裡如一。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ゆえ、日々姫」\n1592 = "「所以，日日姬」" \n\n# monologue\n# JP: ようやく日々姫に向き直れる。発情している女にではなく、\n僕の大事な――大事な義妹――右田日々姫に。その人に。\n2069 = "我總算重新看向了日日姬。不是將她視為一個發情的女性，而是視為我重要的——重要的妹妹——右田日日姬。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「凪の代わりなどではなく。日々姫を――お前を――\n僕の大事な義妹を――僕は、今宵一晩だけ――」\n1553 = "「我不是將你視為凪的替代品。而是把你——把我重要的妹妹——在今天晚上——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ！！！」\n1451 = "「啊！！！」" \n\n# monologue\n# JP: 残酷なことを言おうと。最低の行為をしようとしている。\nそれでも日々姫は――瞳を、輝かせてくれる。\n2052 = "我接下來要說的話無比殘酷，接下來要做的事簡直是禽獸不如。儘管如此——日日姬還是兩眼放光。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「義妹ではなく、おんなとして。\n妻のある身の一夜限りの――やり捨ての浮気相手として」\n1262 = "「不是視為妹妹，而是視為女人。是我這位有婦之夫的——僅僅一晚的，用完即棄的出軌對象」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん」\n# 1484 = "「嗯」" \n\n# monologue\n# JP: 僕の最低な提案に、日々姫は強く頷いてくれる。\nだから勇気を貰えてしまう。最低であれ、最善なのだと。\n1985 = "對於我這人渣般的提議，日日姬用力地點了點頭。所以我才有勇氣去承認這是最禽獸，但最好的方法。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫を抱きたい。\n抱いて鬱屈した性欲を、思いっきりに発散したい」\n1567 = "「我想和你做愛。想把在我心裡淤積的性慾盡情地發洩在你身上」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わたしも、にいにと――同じ、気持ち、と」\n1576 = "「我的心情——和阿哥是一樣的」" \n\n# monologue\n# JP: 平静を装おうとして、できていない。\n体がガタガタ、小刻みに震えてしまってる。\n1959 = "她想裝作平靜，但是卻做不到。她的身體在微微地發抖。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「この性欲ば、スッキリさせて――こんなもんか、って、\nきっとあっけなく思って、少しがっかりして、泣いて」\n1541 = "「性慾得到發洩後——我肯定會覺得不過如此，會有些失望地哭出來」" \n\n# monologue\n# JP: それでも日々姫は、言葉を止めない。\n僕から瞳を、一瞬たりともそらさない。\n1911 = "儘管如此，日日姬還是繼續說了下去。視線一瞬間都沒有從我身上移開。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ねむって、起きて――顔ば、洗って。そしたら、わたし。\nにぃに、にぃにの、かわゆか妹に戻る――戻れるけん！」\n1275 = "「但等我睡著，醒來——洗漱完之後，我就會變回阿哥、阿哥的可愛的妹妹的！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ、そうしよう。僕もお前を抱いたなら。\n明日の朝には――いつもの頼れるにぃにに戻ろう」\n1497 = "「嗯，就這樣吧。我也在和你做完之後，在明天早上——就變回往常那個可靠的阿哥」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ――あっ！？」\n1473 = "「嗯——啊！？」" \n\n# monologue\n# JP: 思い切り抱き寄せキスをする。ならば日々姫を狂わせたい。\nなに一つ心残りの無いように、徹底的に満足させたい。\n2046 = "我忍不住把她抱過來親吻她。此刻，我想讓日日姬陷入狂亂。我想徹底滿足她，讓她不留任何遺憾。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ん……ぁ――あっ――ふっ――あっ――ん――\nちゅっ――ちゅむっ――ん……フッ――ふぁっ――あ」\n1479 = "「嗯……啊——啊——呼——啊——嗯——啾——啾唔——嗯……呼——呼啊——啊」" \n\n# monologue\n# JP: 日々姫のすすりまくってた精液が、唾液に舌に溶け残り、\n僕の口内へと流れ込んでくる。\n2152 = "日日姬吸走的精液殘留在唾液、舌頭上，流入我的嘴裡。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ん――れるっ――れろっ――ちゅむっ――ちゅっ――\nん……ちゅうっ――じゅるっ――（こくっ）――ぷ、あ」\n1477 = "「嗯——滋溜——滋溜——啾唔——啾——嗯……啾唔——啾嚕——（嚥下）——噗、啊」" \n\n# monologue\n# JP: 苦く、鼻まで青臭さがぬけてくるキス。最低のキス。\n日々姫との、ファーストキスで、ラストキス。\n2290 = "苦澀的，腥臭味直衝鼻腔的接吻。不該發生的接吻。與日日姬的初吻，以及最後一吻。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぁ……うふふっ――わたし――にぃにと――\nにぃにとキスば――しちゃったと！」\n1438 = "「啊……唔呵呵——我——和阿哥——　和阿哥接吻——接吻了！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n1338 = "「呃！」" \n\n# monologue\n# JP: なのに、一瞬で甘くなる。\n日々姫が笑顔の花を咲かせた、それだけで――っ！！？\n1900 = "但是，這個吻一瞬間就變得甜蜜起來。日日姬露出了燦爛的笑容，光是這樣——！！？" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ん――ちゅっ――ちゅむっ――ちゅう――れるっ――\nれりゅううっ――じゅるっ――じゅ――ずりゅ――るっ」\n1475 = "「嗯——啾——啾唔——啾嗚——滋溜——滋溜——啾嚕——啾——滋溜——滋溜」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁ――っ――ぁ――はぁっ――んっ」\n1423 = "「啊——啊——蛤啊——嗯」" \n\n# monologue\n# JP: その甘さを、ふかみの唾液が一瞬にして熱へと変える。\n僕の弱点を知り尽くしている淫靡なキスで――\n2221 = "深美對我的所有弱點了如指掌。她用淫靡的吻，用她的唾液一瞬間將這股甜蜜變成了火熱。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ちゅむ――れりゅっ――れろおおおっ――ずりゅっ――\nちゅむっ――ちゅっ――ずりゅうううっ――（こくっ）」\n1461 = "「啾唔——滋溜——滋溜溜——滋溜——啾唔——啾——滋溜溜——（嚥下）」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぷぁっ――あっ――はぁっ――はあっ――」\n1505 = "「噗啊——啊——蛤啊——蛤啊——」" \n\n# monologue\n# JP: 恋をするなと。錯覚するなと釘をさされる。\nふかみとのキスでバキバキに勃起している、性器をもって。\n1936 = "因為和深美的吻而變得無比堅挺的性器，叮囑著我“別愛上她，別產生錯覺”。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「わかっている。ふかみ。心配するな」\n1570 = "「我明白，深美。你別擔心」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「はい、です。\n双鉄おにいさん……」\n1520 = "「好的，嗯。雙鐵哥哥……」" \n\n# monologue\n# JP: 布団の上へと寝かせればふかみはするする下着を脱いで、\n日々姫も、ためらって赤面しながらそれに従う。\n2073 = "我讓深美躺在被褥上，她脫下了內衣。日日姬也猶猶豫豫地紅著臉，然後跟著做了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……綺麗だ。そうして」\n958 = "「……好美。還有」" \n\n# monologue\n# JP: 瞳がどうしても動いてしまう。ふたりを比べて見てしまう。\n2060 = "我無法自制地對比著兩人。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうして――とても、いやらしい」\n1762 = "「還有——特別下流」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はうっ」\n# 1384 = "「哈嗚」" \n\n# monologue\n# JP: 日々姫にも確かなおっぱいがある。\n小ぶりだが、とても美しいお椀の形の。\n2147 = "日日姬也有胸部。雖然很小，卻呈現漂亮的碗形。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「うふふっ――双鉄おにいさん？\n見ているだけで夜が明けちゃいますよ？」\n1395 = "「唔呵呵——雙鐵哥哥，光看著的話都要天亮了」" \n\n# monologue\n# JP: かわいく僕を誘ってくれるふかみの胸は、僕が吸い、\n弄りまくっているせいだろう。日々姫よりも乳首が目立つ。\n1921 = "可愛地引誘我的深美的胸部因為被我反覆吸吮、玩弄的原因，乳頭比日日姬的要醒目。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「私っ！　私はもうっ――十分に――すごく……\n濡れて、ますし――準備、できてると思います、から」\n1583 = "「我！我已經——足夠——很……濕了——應該是已經、準備好了」" \n\n# monologue\n# JP: 日々姫の緊張を敬語が伝える。年下のふかみと比してなお\nシンプルすぎる縦筋からは、たしかに蜜が溢れているが。\n2175 = "日日姬的敬語將她的緊張傳達給我。她的裂縫確實淌出了蜜汁，而年長的她的那條豎縫看起來居然比深美的更簡潔稚嫩。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「それに、避妊も！　ふかみちゃんと凪ちゃんにＯＫ、\nもらった日からちゃんと――その、稀咲先輩に相談して」\n1729 = "「而且避孕措施也做好了！小深和小凪答應我的請求後，我——有找稀咲學姐談過」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「避妊薬――低容量ピル、日々姫さん、飲んでるんです。\n稀咲さんから、わたしも事情聴取を受けて。知ってます」\n1630 = "「日日姬吃了低劑量避孕藥。稀咲小姐也跟我說過了情況，所以我知道此事」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうか」\n# 1659 = "「是嗎」" \n\n# monologue\n# JP: 稀咲も事情を知っている。\nそう聞かされて、強い安堵がわきおこってくる。\n2256 = "稀咲也知道情況。聽到此事，我安心了下來。" \n\n# monologue\n# JP: （稀咲が止めず、避妊薬まで手配をしてくれたのならば。\nこれは一つの。正解の内の、きっと一つの道なのだろう）\n2448 = "（既然稀咲沒有阻止，還幫她準備了避孕藥的話。那這肯定也是正確答案之中的一個吧）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ならば、生で。ゴムをつけない勃起で僕は――」\n1767 = "「那就不戴套。我直接用我的勃起——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふぁっ？！　あっ――あっ――あっ」\n1367 = "「呼啊？！　啊——啊——啊」" \n\n# monologue\n# JP: （すりっ――すりゅっ――ちゅくっ――じゅぶっ――）\n2440 = "（摩擦——摩擦——摩擦——摩擦——）" \n\n# monologue\n# JP: 綺麗で可憐な縦筋に、試しに勃起を擦り付けたなら、\n日々姫の未使用の膣口は、それでも健気に吸い付いてくる。\n2039 = "我嘗試用勃起去摩擦她那可愛又漂亮的裂縫，日日姬那尚未開墾過的入口努力地吸附著我。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……日々姫の膣に、子宮に。僕の精子を注ぎ込んでも」\n962 = "「……我可以把精液射在你的陰道、子宮裡嗎」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「大丈夫！　っていうか絶対！　そうして欲しかと！！\nでなくっちゃ――わたし、一生――永遠に後悔するけん」\n1687 = "「沒問題！請一定要這麼做！！不然——我會後悔一輩子的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうするさ。僕とてこれほど強烈に、日々姫の膣に\n射精したいと、体でもこころでも望んでいるゆえ」\n1572 = "「我會的。因為，我的身心也是如此強烈地希望在你的裡面射精」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あっ！！」\n1450 = "「啊！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だ、が。だっ」\n1271 = "「但是」" \n\n# monologue\n# JP: （くちいっ）\n2403 = "（刺入）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「んっ！！！！！」\n1495 = "「嗯！！！！！」" \n\n# monologue\n# JP: ふかみの膣口に軽く亀頭を差し込んでみる。\n前戯もなしに潤いまくる膣道が、中へと僕を誘ってくる。\n2075 = "我輕輕地將龜頭刺入深美的入口。還未經前戲就便濕潤的陰道引誘我往裡面深入。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「最初は僕たちのセックスを、お手本として見てほしい。\nできればその間、自分で準備も整えて」\n1259 = "「一開始，你先看我們的性交作為範本吧。可以的話，在這段期間內你也做好準備」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ――あ……あっ――（ごくっ）――うんっ」\n1428 = "「啊——啊……啊——（咽口水）——嗯」" \n\n# monologue\n# JP: こんな時でも、日々姫は素直だ。\n自分の小さなおまんこに、すぐ指先を伸ばし始める。\n1953 = "在這種時候，日日姬也很老實。她很快就將手指伸向自己嬌小的小穴。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふかみ」\n1702 = "「深美」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「はい。いっつもみたいに、たくさん愛してくださいね？\nわたしの、双鉄おにいさん」\n1482 = "「嗯。請你和往常一樣盡情地疼愛我，我的雙鐵哥哥」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n# 1484 = "「嗯」" \n\n# monologue\n# JP: （ずっ――ぶっ――じゅっ――ずっ――）\n2453 = "（滋——噗——啾——滋——）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「はっ――あっ――んっ――ね？　見え、ます？\n日々姫さん――わたしっ――わたしの、おまんこ、に」\n1377 = "「哈——啊——嗯——看啊。你在看嗎？日日姬小姐——我——我的小穴裡」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はあっ――はあっ――はあっ――はあっ――」\n1740 = "「蛤啊——蛤啊——蛤啊——蛤啊——」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「おちんちん――ね？　簡単に――入っちゃうんですっ\n――だれ、でも――みんな――こういう――ふう、にっ」\n1530 = "「小雞雞——很輕鬆就——插進來了——每個人——都是——像這樣」" \n\n# monologue\n# JP: （ずっ――じゅっ――ぐううううっ――こちゅんっ！）\n2452 = "（滋——啾——咕——咕啾！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「んきゅっ！！！！」\n1488 = "「嗯嗚！！！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ！？」\n1390 = "「哎！？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いま、僕の亀頭は、ふかみの膣の最奥、にっ――っ――\n子宮口に、あたって――っ！！！？」\n1305 = "「剛剛，我的龜頭碰到了深美陰道的最深處——碰到子宮口——！！！？」" \n\n# monologue\n# JP: （くちゅっ――つぷっ――ちゅすっ――ぬちっ――）\n2406 = "（咕啾——滋噗——啾嚕——滋溜——）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n# 1448 = "「啊！」" \n\n# monologue\n# JP: 日々姫から慌てて目を逸す。日々姫は自慰を始めてる。\n僕とふかみのセックスを見て、性器にそっと指を這わせて。\n2159 = "日日姬慌忙移開視線開始自慰。她看著我和深美性交，輕輕地讓手指沿著性器游走。" \n\n# monologue\n# JP: （ずりゅううううううううううっっっっ！！！！！！）\n2467 = "（滋溜！！！！！！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ひゃうっ！？　そんな、急、にっ――んくっ！！？」\n1331 = "「呀嗚！？　這麼、突然——嗯嗚！！？」" \n\n# monologue\n# JP: （ずぶうううううううううっっっっっっ！　ごちゅっ！）\n2459 = "（滋噗！！！！　咕啾！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「やっ！？　激しっ――ですっ――ふあっ！　あっ！」\n1334 = "「呀！？　太激——烈了——呼啊！啊！」" \n\n# monologue\n# JP: （じゅっ！　ごちゅっ！　ずりゅっ！　ぶちゅっ！！）\n2422 = "（啾！　咕啾！　滋溜！　噗啾！！）" \n\n# monologue\n# JP: だから、ふかみだけを見つめる。ふかみの体に、ふかみの\n膣に、僕の全てを、思いっきりにぶつけ、預ける。\n2086 = "所以，我只注視著深美一人。將我的一切都交給深美的身體，深美的陰道。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふかみ――ふかみっ――ふかみっ！　ふかみっ！！！」\n1696 = "「深美——深美——深美！深美！！！」" \n\n# monologue\n# JP: （じゅっ！　ばちゅっ！　ずゆっ！　ごちゅっ！！）\n2423 = "（啾！啪啾！滋溜！咕啾！！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「はいっ。へいき、ですっ――んっ！　あ、ふあっ！\nあ――わたし――わかって――わかって、ます、から」\n1499 = "「嗯，我沒問題——嗯！啊，呼啊！啊——我——明白——明白、的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！！」\n1453 = "「啊！！！！！」" \n\n# monologue\n# JP: （ずびゅっ！　ばちゅっ！　ずりゅっ！　どちゅっ！！）\n2455 = "（滋咻！　啪啾！　滋溜！　嘟咻！！）" \n\n# monologue\n# JP: 膣がきゅんきゅんわななく、離すまいとしてしがみつく。\n小さな胸が突く度震え、視覚でも僕を釘づけてくれる。\n1966 = "她的陰道一陣陣地發抖，緊緊夾著我不肯放開。而我每一次挺入，她嬌小的胸部也跟著抖動，讓我的雙眼一刻都無法離開。" \n\n# monologue\n# JP: （ずりゅっ！　じゅぶっ！　ずゆっ！　ごちゅん！！）\n2462 = "（滋溜！啾噗！滋溜！咕啾！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「はぁっ！　はぁっ！　はあっ！　はぁっ！！！！」\n1742 = "「蛤啊！　蛤啊！　蛤啊！　蛤啊！！！！」" \n\n# monologue\n# JP: 言葉のとおり、ふかみは“わかって”くれている。\n僕のぐちゃぐちゃなこの感情を、恐らく、僕より明確に。\n2207 = "正如深美所說，她是“明白”的。或許比我還更加明確地理解我這亂成一團的感情。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「んっ――はっ――あっ！　ねっ！　おねがいっ――\nノックっ――んっ！　おくっ――小刻みに――ぁっっ！」\n1472 = "「嗯——哈——啊！拜、拜託你——一下一下地——敲我的——裡面——啊！」" \n\n# monologue\n# JP: （ずっ！　こちゅっ！　ずっ！　こ！　りゅ！　こっ！）\n2469 = "（滋！咕啾！滋！咕！溜！咕！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ふあっ！　あっ！　これっ！　しゅきっ――ん！！\nきもちいっ――きもちっ――気持ちいいっ！　よぉ！」\n1363 = "「呼啊！啊！好喜歡！這種感覺——！！好舒服——好舒服——好舒服！啊！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「～～～っ！！！」\n1343 = "「呃～～～！！！」" \n\n# monologue\n# JP: 亀頭にぴたり吸い付いてくる子宮口を剥がしてはまた\n吸付けて。繰り返す度快感の波は大きくなって――っ！\n2316 = "龜頭好不容易與子宮口分開，但下一秒它又吸了上來。這種交互每進行一次，快感的波浪就變得更大——！" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふかみっ――ふかみっ！！！」\n1697 = "「深美——深美！！！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「はいっ！　わたしもっ――で、すっ――んうっ！！\nだから――そう、てつっ――おにい、さんっ！！！」\n1493 = "「嗯！我也要——嗯嗚！！所以——雙、鐵——哥、哥！！！」" \n\n# monologue\n# JP: （ずりゅうううううっっっっっっっっ！！！！）\n2468 = "（滋溜！！！！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ふぁふゅぅぅぅぅぅぅぅぅぅぅぅぅぅっんんっ！！」\n1358 = "「呼啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊！！」" \n\n# monologue\n# JP: （ずぶううっ！　ごちゅっ！　ずりゅっ！　ばちゅっ！）\n2458 = "（滋噗！咕溜！滋溜！啪啾！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ふあっ！　あっ！　あ！　あ！！！\nいくっ――いくっ！　いくっ！　いくっ！！！！」\n1360 = "「呼啊！啊！啊！啊！！！丟了——丟了！丟了！丟了！！！！」" \n\n# monologue\n# JP: （ぱんっ！　ぱんっ！　ぱんっ！　ぱんっ！！！）\n2418 = "（啪！啪！啪！啪！！！！）" \n\n# monologue\n# JP: 体全部をバネにして、ひたすら腰を打ち付け離す。\n汗と愛液がどろどろ混じり、いつもより甘い匂いを放つ。\n2031 = "我以整個身體為彈簧，瘋狂地挺動腰部。汗水與愛液混雜在一起，散發著比往常還要香甜的味道。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふかみ――もう少しっ――もう少し、だけっ――\nっ！！　僕もっ――僕もっ――もうすぐ、だからっ――」\n1700 = "「深美——還差一點——還差一點——！！我也要——我也要——很快就要來了——」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ひうっ！？　ふあっ！　あっ！　けど――けど――けどっ\nけどっ――けどおおっ！　わらひっ！　わらひいっ！！」\n1466 = "「嗚！？呼啊！啊！可是——可是——可是——可是！我！我！！」" \n\n# monologue\n# JP: （きゅううううううううううううううっっっっ！！！）\n2442 = "（收縮！！！！！！！！！！！！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ふぁぁぁぁぁぁぁぁぁぁぁぁぁっぁあっぁぁぁんっ！」\n1357 = "「呼啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「んくっ！！！！！」\n1489 = "「嗯嗚！！！！！」" \n\n# monologue\n# JP: 絶頂したのか握りしめにくる膣道を、\nみちみちと剥がすようにして引き下がりっ――――！！\n2044 = "我往後一扯，像是要把因為絕頂而猛地收縮的陰道拉出來一樣——！！" \n\n# monologue\n# JP: （ずぶうううううううううっっっっ――ぶ　ちゅん！！）\n2457 = "（滋噗——噗啾！！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「～～～～～～～っ！！！！」\n1410 = "「唔～～～～～～～！！！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くあっ！！！！！」\n1373 = "「咕啊！！！！！」" \n\n# monologue\n# JP: （びゅぶっ！　ぶっ！　びゅるっ！　どびゅっ！！！）\n2412 = "（咻噗！噗！咻嚕！嘟咻！！！）" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「ぁ――ぁっ――あっ――か――はっ――あっ！」\n1419 = "「啊——啊——啊——啊——啊——啊！」" \n\n# monologue\n# JP: （びゅるぶっ！　ぶっ！　びゅぶっ！　どびゅっ！！）\n2413 = "（咻噗！噗！咻！咻！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「はぁっ！　はあっ！　はあっ！　はあっ！」\n1743 = "「蛤啊！蛤啊！蛤啊！蛤啊！」" \n\n# monologue\n# JP: 精液どころか、汗までべっとり粘ついている。\nどんなわずかな部位だとて、より密に接触したがっている。\n1884 = "不僅是精液，就連汗水都黏在一起了。我們渾身上下的每一處部位都緊密地貼在一起。" \n\n# monologue\n# JP: （びゅ――ぶびゅっ――びゅっ――ぷりゅっ――）\n2408 = "（咻——噗咻——咻——噗溜……）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「～～～～～～～～～～～っ！！！」\n1413 = "「唔～～～～～～～～～～～！！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！？」\n1455 = "「啊！！？」" \n\n# monologue\n# JP: 押し殺した声。同時に濃くなるあまぁい匂い。\n慌てて見れば日々姫は――日々姫は――――\n2070 = "我聽見了被壓低的叫喊聲，同時還散發著濃郁的甜蜜香氣。我慌忙看向日日姬——她——" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ――っ――～～～っ！　――ぁ――はぁっ、はぁっ」\n933 = "「——嗚～～～！　——啊——蛤啊，蛤啊」" \n\n# monologue\n# JP: ピンと力みまくってた体が一気に脱力する。\n日々姫の小さなおまんこは、ぐちゃぐちゃに濡れ乱れ。\n2195 = "日日姬緊繃的身體一口氣鬆垮下去。她嬌小的小穴也濕成了一片。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「双鉄おにいさん。いまなら。力、入らないときの方が」\n1780 = "「雙鐵哥哥，趁現在。趁著她無法用力的時候」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！」\n# 1451 = "「啊！！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃっ！？　まってっ！？　にぃに！\n私、いまっ――いま――そのっ――あの――おまん、こ」\n1336 = "「呀！？等等！？阿哥！我現在——現在——這個——那個——小穴」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「わかっている。だから。だ」\n1569 = "「我明白。所以」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ！！！」\n# 1401 = "「唔！！！」" \n\n# monologue\n# JP: 今度は、日々姫を。日々姫だけを。\nふかみの言葉が、背中を押してくれたのだから。\n2300 = "這次輪到日日姬了。輪到我單獨與日日姬溫存了。是深美的話推動了我。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「大丈夫だ。優しくする。\n僕が、日々姫をリードする」\n1303 = "「別擔心，我會很溫柔的。我會帶領好你的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「――うんっ！！！！」\n935 = "「——嗯！！！！」" \n\n# monologue\n# JP: きゅううううううっと、胸が締め付けられる。\nこころも体も全部がほとんど泣きそうになり、我慢する。\n2284 = "胸口一陣陣地收縮。我的整個身心都幾乎想要哭出來，但我還是忍住了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫」\n# 1628 = "「日日姬」" \n\n# monologue\n# JP: 名を呼ぶ。大事な義妹の名を。\n世界にふたりしかいない。僕の。大切な。いもうとの名を。\n2038 = "我呼叫著我重要的妹妹的名字。我在這個世上僅有兩人的，我重要的妹妹的名字。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃに――あのね？　私――にぃにが――\nにぃにが――好き、なの」\n1774 = "「阿哥——那個啊，我——喜歡——喜歡阿哥」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ、僕も――」\n1498 = "「嗯，我也是——」" \n\n# monologue\n# JP: 日々姫の好きと、僕の好きとの意味が違うと知っている。\n知っているから――この一言しか、口にできない。\n2056 = "我明白日日姬口中的喜歡和我口中的喜歡的意思是不一樣的。因為知道——所以我只能說這一句話。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕も、日々姫が、大好きだ」\n1555 = "「我也最喜歡你了」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ！！！！！！！！！！！」\n1454 = "「啊！！！！！！！！！！！」" \n\n# monologue\n# JP: 泣かないでくれと願ってしまう。\nだから、だろうか――日々姫は、日々姫は。笑ってくれる。\n2081 = "我默默祈求她不要哭泣。可能因為這個原因——日日姬她笑了。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「――ありがと、にぃに」\n937 = "「——謝謝你，阿哥」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！　～～～っ――。いくぞ、日々姫」\n1339 = "「呃！！　我要來了，日日姬」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん。えと――お願い、しま――っ！！！！！！」\n1481 = "「嗯。呃——拜託——！！！！！！」" \n\n# monologue\n# JP: （ずっ――くっ）\n2451 = "（滋——咕）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はうっ！　あっ！　はぁっ――はあっ！！！！」\n1385 = "「哈嗚！啊！蛤啊——蛤啊！！！！」" \n\n# monologue\n# JP: 最初からあれだけ濡れていて。オナニーまでもしてくれて。\nそれでも日々姫の膣口は、凪よりさらに、ずうっと狭い。\n2201 = "明明從一開始就泛濫成一片，而且還自慰了，但日日姬的陰道口比凪還要狹窄許多。" \n\n# monologue\n# JP: （これが――処女というものか）\n2484 = "（這就是——處女的感覺嗎）" \n\n# monologue\n# JP: 凪のときは、ふかみのときは、僕も混乱の中だった。\nその経験が、ふかみが、凪が、僕の手を引き導いてくれる。\n1929 = "和凪與深美做的時候，我都是處於混亂中。我是在深美和凪的帶領下完成的那次體驗。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「痛いよな。日々姫。だから、ゆっくり。\n馴染むまで、ゆっくりゆっくり呼吸するんだ」\n1650 = "「日日姬，你很痛吧。所以，你慢慢地，慢慢地深呼吸，直到適應為止」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん、にぃに――んっ――すーーーーっ、\nはーーーーっ、すーーーーーーっ、はーーーーーーーっ」\n1501 = "「嗯，阿哥——嗯——嘶————哈————嘶————哈————」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！！」\n1341 = "「呃！！！！！」" \n\n# monologue\n# JP: 亀頭の先端。半分ほどしか埋まっていない。\nけれども日々姫の膣口は、快感を僕に流し込んでくる。\n2317 = "龜頭的尖端只插入了一半。但是，日日姬的入口還是為我帶來了快感。" \n\n# monologue\n# JP: （これ――は――これが、体の相性というものなのか）\n2483 = "（這——這就是所謂的身體上的相合度嗎）" \n\n# monologue\n# JP: 義理の家族で、同じ物を食べ、同じ空間で生活し、\nおんなじものを見て笑い、おんなじような失敗をして――\n2033 = "我們是無血緣關係的家人，吃同樣的食物，在同樣的空間中生活，看著同樣的事物歡笑，犯同樣的失敗——" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「すーーーっ、はーーーーっ、すーーーー、はーーーっ」\n1503 = "「嘶————哈————嘶————哈————」" \n\n# monologue\n# JP: 積み重ねてきた全ての時間を、僕の勃起は台無しにする。\nゼロから再びきょうだいに、このセックスで、僕らは戻る。\n2064 = "我的勃起破壞了過去我們所累積下來的這一切回憶。而我們在這次性交後，會再一次從零開始變回兄妹。" \n\n# monologue\n# JP: （ぐっ――ずっ――ぶっ――っぐっ――）\n2404 = "（咕——滋——噗——咕——）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ！！？　ぁっ――んっ――（ごくっ）――\nぁっ――！　――すーー、はーー、すーー、はーーー」\n1408 = "「唔！！？啊——嗯——（咽口水）——啊——！嘶————哈————嘶————哈————」" \n\n# monologue\n# JP: 日々姫は真面目だ。日々姫は律儀だ。日々姫は可愛い。\nそんなあたりまえのことの全てを、知っているから――\n2143 = "日日姬一直都是這麼一本正經，規規矩矩而可愛。這一切我當然都十分清楚——" \n\n# monologue\n# JP: （ずっ――ぷつっ！！！！）\n2454 = "（滋——噗！！！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ああっ！！！！」\n1447 = "「啊啊！！！！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「っ！！」\n1400 = "「唔！！」" \n\n# monologue\n# JP: 糸を切る、貼り付いてたものを破る感覚。\n1988 = "崩斷絲線，突破薄膜的感覺。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「わかるか、日々姫」\n1732 = "「能感覺到嗎，日日姬」" \n\n# monologue\n# JP: 感情がぐちゃぐちゃすぎて、肉の快感が強すぎて。\nいますぐにでも腰を思い切りふりたくて――\n2029 = "感情太過凌亂，肉體的快感過於強烈，以至於我現在就想要瘋狂地甩起腰來——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕が、お前の処女を奪った。僕が、お前を女にした」\n1562 = "「我奪走了你的純潔。我讓你變成了女人」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ううん――まだ――です。まだ――です、にい、さん」\n1261 = "「不——還沒有。還沒有——哥哥」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！」\n# 1452 = "「啊！！！！」" \n\n# monologue\n# JP: 敬語だ。それほど痛むのか――罪悪感さえ、けれども膣の\n必死にあえぐ収縮が、すぐ融かし、肉の快感にしてしまう。\n1962 = "她用的是敬語。她有這麼痛嗎——但是，就連罪惡感都在她陰道的強烈收縮下迅速溶解，化為肉體的快感了。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「だって――私、まだ――んっ――おまんこ、に――\n子宮に、にぃにの――精子、もらって――ない、もん」\n1507 = "「因為——我的小穴——子宮——嗯——還沒有——得到——阿哥的精子——嘛」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫っ！！！」\n1647 = "「日日姬！！！」" \n\n# monologue\n# JP: （ぎゅうううううううううううっっ！　ごちゅっ！！！）\n2473 = "（用力！！！抽插！！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「痛っ――ぐっ～～～～～～～っ！！！！！！」\n1518 = "「好痛——咕～～～～～～～！！！！！！」" \n\n# monologue\n# JP: （ずっ！　こ！　じゅっ！　こっ！　りゅ！　こっ！）\n2470 = "（滋！咕！咻！咕！溜！咕！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃっ――あっつ――あっ――んっ――んっ――」\n1321 = "「呀——好熱——啊——嗯——嗯——」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！？」\n1409 = "「唔！？」" \n\n# monologue\n# JP: ふかみの指が、僕らの繋がる部分に伸びかけ、惑ってる。\n日々姫の苦痛を、恐らく少しでもやわらげようと――\n2163 = "日日姬把手指伸向我們結合的部分，一副不知所措的樣子。她這樣或許是為了儘可能地緩和自己的痛苦——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「平気。平気だ。僕を信じろ」\n1685 = "「沒事、沒事的。相信我」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ！　うんっ！！！！」\n1491 = "「嗯！嗯！！！！」" \n\n# monologue\n# JP: だからふかみに日々姫に同時に呼びかける。\nそれでふかみは――――わかってくれる。\n2089 = "所以，我同時呼叫著深美和日日姬兩人。深美她心領神會。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なにひとつ悔いの残らんように。今このときは――\n僕の全てを、日々姫に、お前に、注ぎ込むゆえ」\n1267 = "「不要留下任何遺憾。現在這個時刻——我會把我的一切全部注入給你」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ！！！」\n# 1494 = "「嗯！！！」" \n\n# monologue\n# JP: 日々姫がやわらぐ。ガチガチのキツキツだった膣内が、\nぬめりとゆるみを得ると同時に、あたたかになる。\n2165 = "日日姬放鬆了下來。她緊緻的陰道在變濕變柔和的同時也變得溫暖起來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「少し、大きく動かすぞ」\n1580 = "「我要稍微加大動作了」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ！」\n1490 = "「嗯！」" \n\n# monologue\n# JP: （ずりゅううっ！　ぐりゅっ！　じゅりゅ――くりゅ！）\n2461 = "（滋溜！咕溜！啾嚕——咕溜！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃぅっ！！？　あっ――あっ――わた、しっ――」\n1330 = "「呀嗚！！？啊——啊——我——」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うん」\n# 1484 = "「嗯」" \n\n# monologue\n# JP: 感じていると、膣が雄弁に語ってくれてる。\n僕の精子を欲しがって、べたべた甘えてきてくれている。\n2186 = "日日姬的陰道在傾訴著無比強烈的快感。並且還在緊緊纏著我撒嬌，以索要我的精子。" \n\n# monologue\n# JP: （ずりゅっ！　ぶちゅ！　ずちゅううっ！　ごちゅっ！）\n2464 = "（滋溜！噗啾！滋啾！咕溜！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふあ！？　あっ――わかる――わかるっ――にぃに、\nにぃにの――おちんちんの、かたちっ――んうっ！！」\n1365 = "「呼啊！？啊——我能感覺到——我能感覺到——阿哥、阿哥的——小雞雞的、形狀——嗚！！」" \n\n# monologue\n# JP: （ずびゅっ！　ばちゅっ！！　ずりゅっ！　ごちゅっ！）\n2456 = "（滋啾！啪啾！滋溜！咕啾！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「覚え、て、いってるっ――わたしの、おまんこ――\nにぃにの――かたちっ――おっきさ――あつ、さっ！！」\n1573 = "「我的、小穴——記住、了——阿哥的——形狀——大小——溫度！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っっ！！」\n# 1400 = "「唔！！」" \n\n# monologue\n# JP: 実際、膣はうねりまくってる。僕の形を覚えよう――いや、\n僕の勃起に合わせた形にフィットしようとするように。\n1967 = "她的陰道也確實在蠕動著試圖記住我的形狀——不，就像是在配合我的勃起而改變形狀一樣。" \n\n# monologue\n# JP: （ずりうゅっ！　ぶちゅっ！　ずみゅっ！　ばちゅっ！）\n2465 = "（滋溜！噗啾！滋溜！啪啾！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「嬉しいっ！　嬉しいっ！　うれしいっ！　うれしい！\nわた、しっ！　にぃにと――セックス――して、るっ！」\n1564 = "「我好高興！好高興！好高興！好高興！我！在和阿哥——做愛——！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああっ！」\n# 1490 = "「嗯！」" \n\n# monologue\n# JP: （ずりゅっ！　ぶちゅん！　じゅぶっ！　ぱちゅんっ！）\n2463 = "（滋溜！噗啾！啾噗！啪啾！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃにの、亀頭っ――おちんちんの、先っ――っ！\nわたしのっ――子宮、にっ――キス、して、くれてっ」\n1777 = "「阿哥的、龜頭——小雞雞的、前面——！在親吻——我的——子宮」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫、のっ――子宮口も、だっ――僕の亀頭に――\nくいつく――ように――熱心な、キスを――繰り返、し」\n1627 = "「日日姬、的——子宮口也——在吸著——我的龜頭——就像在不停——熱情地、親吻一樣」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃっうっ」\n1327 = "「呀嗚」" \n\n# monologue\n# JP: （きゅううううううううううっっ！）\n2444 = "（收縮！！！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くはっ！！！」\n1369 = "「咕哈！！！」" \n\n# monologue\n# JP: 日々姫の膣のわななきに連れ、快感も膨れ上がってく。\n三発目とは思えぬほどの塊が、タマの底から湧き上がる。\n1945 = "在日日姬的陰道的顫抖下，快感也越來越膨脹。幾乎無法想像這是第三波的精液浪潮從睪丸底部湧出。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃに！　にぃに！　にぃに！　にぃにぃ！！！」\n1779 = "「阿哥！阿哥！阿哥！阿哥！！！」" \n\n# monologue\n# JP: （じゅばっ！　ぶちゅっ！　ずりゅっ！　ごちゅっ！！）\n2419 = "（啾啪！噗啾！滋溜！咕啾！！）" \n\n# monologue\n# JP: 日々姫の匂いが、甘い匂いが僕の全身に溶けていく。\nセックスしてる。僕は日々姫と――セックスしてる。\n2189 = "日日姬的香甜氣息溶化了我的全身。我和日日姬——在性交。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫っ！　日々姫っ！！」\n1646 = "「日日姬！日日姬！！」" \n\n# monologue\n# JP: （ばっ！　ごっ！　じゅ！　ぎゅ！　ぶっ！　こちゅ！）\n2417 = "（啪！咕！啾！啾！噗！咕溜！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふやぁぁぁぁああああっ！」\n1359 = "「呼啊啊啊啊啊啊啊啊！」" \n\n# monologue\n# JP: 加速する。こころが体が精液が、\n終わらせたくないこの時を、終わらせるために加速する。\n2061 = "我的內心、肉體、精液在不斷加速，為了結束這一刻而加速，雖然我並不想讓它結束。" \n\n# monologue\n# JP: （ずっ！　ばっ！　ぶっ！　ごっ！　ぢゅっ！　ぎゅ！）\n2471 = "（滋！啪！噗！咕！啾！啾！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫っ！　日々姫っ！　日々姫っ！」\n1645 = "「日日姬！日日姬！日日姬！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふぁっ――あっ――んきゅっ！　うっ！　にぃに！\nまっ！　って――わらっ――わた、しっ――もうっ！」\n1356 = "「呼啊——啊——嗚！嗚！阿哥！等等——我——我——要！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っっ！！！！！！」\n# 1404 = "「唔！！！！！！」" \n\n# monologue\n# JP: 待ってやりたい。けれど待てない。\nなぜなら僕は、ふかみを――凪を――待たせてるから！\n2308 = "雖然我很想等，但是我等不下去。因為深美——凪——還在等我！" \n\n# monologue\n# JP: （ずりゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅっっ！！！）\n2466 = "（滋溜！！！！！！！！！！！！！！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫っ！！！！！！」\n1648 = "「日日姬！！！！！！」" \n\n# monologue\n# JP: （ぶぢゅうううううううううっっっっ！　ごちゅっ！！）\n2425 = "（噗啾！！！！！！　咕啾！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅ～～～んっ！」\n1328 = "「呀嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚～～～！」" \n\n# monologue\n# JP: （ぎゅうううううううううっっっ！）\n2443 = "（收縮！！！！！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くあっ！！！」\n1372 = "「咕啊！！！」" \n\n# monologue\n# JP: （ぶびゅっ！　どびゅっ！　ぶりゅっ！　びゅぶるっ！）\n2424 = "（噗咻！噗咻！噗咻！噗咻！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「～～～～～～～～っ！！！」\n1411 = "「唔～～～～～～～～！！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふぁっ――あっ――あっ――あ――！」\n1353 = "「呼啊——啊——啊——啊——！」" \n\n# monologue\n# JP: （びゅぶっ！　ぶっ！　びゅるっ！　びゅううっ！）\n2411 = "（咻噗！噗！咻嚕！咻！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃっ――あっ――あっ――んっ――（ゴクッ）――\nあっ――せいえき――あつい、の――にぃにの、精、液」\n1319 = "「呀——啊——啊——嗯——（咽口水）——啊——精液——熱熱的——阿哥的、精、液」" \n\n# monologue\n# JP: （ぶっ！　びゅるっ！　びゅううっ！　びゅっつ！！）\n2427 = "（噗！咻嚕！咻！咻！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「きてるっ――染めてるっ――にぃに、にぃにが――\nわたしの、おまんこ――子宮――ぜんぶ、をっ――」\n1776 = "「阿哥、阿哥的——進來了——流進來了——到我的、小穴——子宮裡——全部都——」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n# 1448 = "「啊！」" \n\n# monologue\n# JP: （びゅっ！　びゅるっ――びゅっ――ぷ――――ぴ）\n2415 = "（咻！咻嚕——咻——噗————）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「はあっ――はあっ――はあっ――はあっ――」\n# 1740 = "「蛤啊——蛤啊——蛤啊——蛤啊——」" \n\n# monologue\n# JP: 射精を終えればどっぷりと、ベタつくほどの疲労とそして、\n罪悪感とが僕の頭から\n1983 = "射精結束後，異常強烈的疲勞和罪惡感從我的大腦湧出。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃ、に――射精……おわっちゃった、と？」\n1771 = "「阿、哥——射精……結束、了？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ん？　ああ」\n1502 = "「嗯？嗯」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そか。ざぁんねん。そしたら終わりかー。\nね、にぃに。これ、抜いて？　おちんちん」\n1660 = "「是嗎，真遺憾。就這樣結束了啊——阿哥。能把小雞雞拔出來嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うん」\n# 1484 = "「嗯」" \n\n# monologue\n# JP: 泣きそうになる。『それをとって』と『わかった』と。\n普段の、僕らの、きょうだいの会話の温度。\n2041 = "我強忍著哭泣。“把那個拿掉”——“我知道了”。這就是我們兄妹之間往常的對話的溫度。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んーーーーー！　すっきりしたとー！！！」\n1467 = "「嗯——————！痛快了！！！」" \n\n# monologue\n# JP: 立ち上がり。日々姫が大きく伸びをする。\n裸の胸を隠そうともせず、目のフチに涙を光らせて。\n2193 = "日日姬站起身子，用力地伸了個懶腰。她沒有遮擋赤裸的胸部，眼角還泛著淚光。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「それじゃ、私、先にシャワーば浴びて、\n私のお部屋で、ひとりで寝るけんっ！！」\n1769 = "「那，我先去洗澡，然後回我自己的房間好好睡一覺了！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「――ああ」\n934 = "「——嗯」" \n\n# monologue\n# JP: 日々姫は強い。そして賢く健気で、僕を大事にしてくれる。\nゆえに、約束を守ってくれる。必ず、日々姫は、約束を。\n2154 = "日日姬很堅強，而且又聰明又努力，也很愛護我。因此，日日姬必定會遵守約定。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「――おやすみ、日々姫」\n936 = "「——晚安，日日姬」" \n\n# monologue\n# JP: 日々姫がふ、と小さく笑う。\nおんなの顔で、小さく笑う。\n2191 = "日日姬突然微微笑了。那是成熟女性才會有的微笑。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「おやすみなさい、――――」\n1667 = "「晚安——」" \n\n# monologue\n# JP: おやすみなさいの後に続いた囁きを、\n僕の鼓膜は、僕のこころは、聞き取れない。\n2068 = "我的耳朵，還有內心都沒有聽清她那“晚安”後面的低語。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「日々姫さんがシャワー浴びたら、わたしたちも、ね？\nシャワーを浴びて、眠りましょう？」\n1632 = "「日日姬小姐去洗澡了，那我們也洗個澡睡了吧？」" \n\n# monologue\n# JP: ふかみが悪役を買ってまで全てを正しく収めてくれる。\nあるべきところに、あるべき形に、収めてくれる。\n1943 = "在委屈深美扮演反面角色後，事情才得到圓滿解決。一切都變回原本該有的模樣。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ――そうだな。\nありがとう。そうしよう」\n1469 = "「嗯——也好。謝謝你，就這樣做吧」" \n\n# monologue\n# JP: ふかみの肩をそっと抱く。それがもちろん僕らのあるべき\n――一番しあわせな距離だから。\n2051 = "我慢慢地抱住深美的肩膀。這自然是我們之間該有的——最幸福的距離。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「…………」\n948 = "「……」" \n\n# monologue\n# JP: 微笑んで。\n僕に心配をかけぬよう、微笑みを崩さぬ、そのままに。\n2157 = "日日姬微笑著離開了房間。為了不讓我擔心，她始終面帶微笑。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おやすみ、日々姫」\n1668 = "「晚安，日日姬」" \n\n# monologue\n# JP: だからもう一度呼びかける。\n僕の、大切ないもうとに。\n2084 = "所以，我再一次跟我重要的妹妹說了一句。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん」\n# 1484 = "「嗯」" \n\n# monologue\n# JP: 明日の朝に。笑ってくれると知っているから。\n『おはようにぃに！』と、いつもどおりの日々姫の笑顔で。\n1937 = "因為我知道，到了明天早上，日日姬會面帶一如既往的笑容跟我說“早安，阿哥！”。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「おやすみ、にぃに」\n1669 = "「晚安，阿哥」" \n