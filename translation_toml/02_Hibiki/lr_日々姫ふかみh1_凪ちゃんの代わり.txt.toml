# lines: 532 
# monologue
# JP: ――凪ふかみルートアナザー――
912 = "——Nagi Fukami Route Another——"
# 【双鉄】
# display as 雙鐵
# JP: 「ふたりとも、大変によく似合っている」
1279 = "「Cả hai người mặc đều rất hợp.」"
# monologue
# JP: 鬼の撹乱。\n凪が突然ダウンしたのには驚かされたが――
2281 = "Khỏe như vâm mà cũng đổ bệnh. Việc Nagi đột nhiên gục ngã khiến tôi khá bất ngờ——"
# 【双鉄】
# display as 雙鐵
# JP: 「凪も、もう明日には復帰だよな？」
1298 = "「Nagi ngày mai cũng đi làm lại rồi nhỉ?」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。りんご病って伝染るって聞いたから\n怖かったですけど――凪ちゃんだけに[とど]留まってくれて」
1658 = "「Vâng vâng. Nghe nói bệnh ban đỏ lây nhiễm nên em cũng sợ lắm——nhưng may mà chỉ lây cho mỗi Nagi-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「恐らくは一番頑丈な凪が、一人で病気を全部受け止め、\n流行発生を食い止めてくれたのだろうさ」
1585 = "「Có lẽ Nagi là người khỏe nhất, nên đã một mình gánh hết bệnh tật, và ngăn chặn dịch bệnh bùng phát đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「あはは！　きっとそうですね。さすが凪ちゃん」
1445 = "「Ahaha! Chắc chắn là vậy rồi. Quả không hổ danh Nagi-chan.」"
# monologue
# JP: ――考えうる最小限の影響で済んだのは何よりだった。\nしかも思わぬ、可愛らしい余録までついてきた。
915 = "——Thật tốt vì hậu quả chỉ ở mức tối thiểu có thể tưởng tượng được. Hơn nữa lại còn có thêm một lợi ích phụ đáng yêu không ngờ tới."
# 【双鉄】
# display as 雙鐵
# JP: 「本当に良く似合っている。チャイナドレスというものを\nなかなかじっくりみる機会には恵まれないが――」
1714 = "「Thật sự rất hợp đấy. Sườn xám thì hiếm khi có cơ hội được ngắm kỹ thế này——」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
1443 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1785 = "「!?」"
# monologue
# JP: 日々姫がもじっと体を動かし視線から隠す素振りを見せる。\n普段には無い仕草にドキリとさせられる。
2161 = "Hibiki vặn vẹo cơ thể, tỏ vẻ muốn giấu đi khỏi tầm nhìn của tôi. Cử chỉ khác thường này khiến tôi giật mình."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、日々姫。チャイナドレスが恥ずかしい……」
1283 = "「Sao vậy, Hibiki. Em thấy xấu hổ khi mặc sườn xám à......」"
# monologue
# JP: のか、の言葉が声になるまえ、自分で納得してしまう。\n確かに、これは――一度意識をしてしまったのなら――
2078 = "Chưa kịp nói hết câu, tôi đã tự hiểu ra. Quả thực, bộ đồ này——một khi đã để ý thì——"
# 【日々姫】
# display as 日日姬
# JP: 「あの……ね？　にぃに。今日わたし、レセプション。\n凪ちゃんの代わりにお手伝いするの。条件、出したの」
1581 = "「Chuyện là...... nhé? Anh hai. Hôm nay em làm ở buổi tiệc. Làm thay cho Nagi-chan. Em đã đưa ra điều kiện.」"
# 【双鉄】
# display as 雙鐵
# JP: 「条件」
1680 = "「Điều kiện」"
# monologue
# JP: 日々姫らしくもない言葉だ。\n思ってしまい、いやいやと思い直してフォローする。
2299 = "Đó không giống những lời Hibiki thường nói. Nghĩ vậy, nhưng rồi tôi gạt đi và hùa theo em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、急な話だったからな。稀咲仲介での、\n仲国からの要人たちの、団体での御一夜視察」
1689 = "「Mà, chuyện cũng đột ngột quá mà. Đoàn quan chức cấp cao từ Nakakuni đến thị sát Ohimitera thông qua sự môi giới của Kisaki.」"
# monologue
# JP: 女性ばかりで、相当な高官揃いの団体だったと聞かされた。\n僕ならば、話を聞いた瞬間に胃が痛くなる案件だ。
2282 = "Nghe nói đoàn toàn là nữ, lại toàn những quan chức cấp cao. Nếu là tôi, chắc vừa nghe chuyện đã thấy đau dạ dày rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「案内役はプレッシャーも強く、責任も重い仕事だ。\n条件や報酬の交渉くらい、あって当然。しかるべきだ」
1757 = "「Công việc hướng dẫn viên vừa áp lực lại vừa mang trách nhiệm nặng nề. Việc đàm phán điều kiện hay thù lao là chuyện đương nhiên. Đáng lẽ phải thế.」"
# 【日々姫】
# display as 日日姬
# JP: 「……そぎゃんまっとうな動機じゃなかとよ。\n『凪ちゃんの代わりに』って言われて、私……その……」
966 = "「......Động cơ của em đâu có đàng hoàng như vậy. Nghe bảo 'thay cho bé Nagi', em...... cái đó......」"
# 【双鉄】
# display as 雙鐵
# JP: 「その？」
1766 = "「Cái đó?」"
# monologue
# JP: 促すが、続く言葉が出てこない。\nどうしたものかとふかみを見れば、すぐさま唇が開かれる。
2034 = "Tôi thúc giục, nhưng em ấy không nói tiếp được. Đang tự hỏi không biết phải làm sao thì Fukami liền mở lời."
# 【ふかみ】
# display as 深美
# JP: 「わたしがお願いしたんです。クマ川下り団体乗船後の\nレセプションも手伝ってほしいですって、日々姫さんに」
1662 = "「Là em đã nhờ chị ấy. Em nhờ chị Hibiki giúp đỡ cả buổi tiệc chiêu đãi sau chuyến đi thuyền tập thể trên sông Kuma.」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪の代わりに、と――そう言って、か？」
1286 = "「Bảo là, thay cho Nagi――đúng không?」"
# monologue
# JP: ふかみが頷く。日々姫のもじもじが強くなる。\n考えすぎかもしれないが――しかし、この雰囲気は――
2245 = "Fukami gật đầu. Hibiki càng vặn vẹo lúng túng hơn. Có thể là tôi nghĩ nhiều――nhưng bầu không khí này――"
# 【日々姫】
# display as 日日姬
# JP: 「そう聞いたときわたし『代わりっていうなら』って。\n……その――あの……ええ、と……………………」
1731 = "「Lúc nghe vậy em bảo 'Nếu là thay thế thì'. ......Cái đó――ừm...... ơ, thì........................」"
# monologue
# JP: 開いた口がまた閉ざされる。先を促すこともできない。\n沈黙が――ねっとり重く垂れ下がる。
1957 = "Cái miệng vừa hé ra lại khép lại. Tôi cũng không thể giục em ấy nói tiếp. Sự im lặng――nặng nề bao trùm."
# 【ふかみ】
# display as 深美
# JP: 「……あの、双鉄おにいさん。\nそこに、座ってもらえませんか？」
974 = "「......À này, anh Soutetsu. Anh có thể ngồi xuống đó được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、む」
1393 = "「Ừ, ừm」"
# monologue
# JP: ふかみの瞳が、声が堅い。思いつめてる気さえする。\nならば今は、理由を問うよりまずは従いっ――っ！！？
2230 = "Ánh mắt và giọng nói của Fukami rất kiên định. Thậm chí có cảm giác như em ấy đang rất quyết tâm. Vậy thì bây giờ, thay vì hỏi lý do, tốt nhất là cứ làm the――っ!!?"
# monologue
# JP: （ぎゅむっ）
2480 = "（Dẫm）"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――」
1414 = "「A――」"
# monologue
# JP: ふかみが[にじ]躙る。僕の股間を、その足で。\n日々姫が見ている眼の前――っ！！？
2226 = "Fukami chà đạp. Dùng chân chà đạp lên hạ bộ của tôi. Ngay trước mắt Hibiki――っ!!?"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ、何をっ」
1704 = "「Fukami, em làm gì――」"
# 【ふかみ】
# display as 深美
# JP: 「日々姫さん。言ったんです。凪ちゃんの代わり――\nレセプション終わった後も……朝までずっとなら、って」
1635 = "「Chị Hibiki. Đã nói thế đấy ạ. Thay cho bé Nagi―― Sau khi tiệc chiêu đãi kết thúc...... kéo dài đến tận sáng cũng được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1407 = "「っ!!?」"
# 【日々姫】
# display as 日日姬
# JP: 「言った――っていうか、お願いしたと」
1545 = "「Đã nói――hay đúng hơn là, em đã tự mình yêu cầu.」"
# monologue
# JP: 日々姫の瞳と、視線が合わない。\n日々姫はじっと食い入るように、踏まれる僕の股間を――
2187 = "Ánh mắt của Hibiki không chạm mắt tôi. Em ấy cứ nhìn chằm chằm như muốn ăn tươi nuốt sống hạ bộ đang bị dẫm của tôi――"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
# 1393 = "「唔」" 
# 【ふかみ】
# display as 深美
# JP: 「あっ……うふふっ！\n双鉄おにいさん、おっきくなってきちゃいましたねぇ」
1440 = "「A...... ư fufu! Anh Soutetsu, nó to lên rồi kìa.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――（ごくっ）」
1434 = "「A――（Ực）」"
# monologue
# JP: 日々姫の喉が大きく動く。頬がはっきり紅潮している。\n滴る汗を気にもせず、日々姫はじっと、僕を見ている。
2174 = "Yết hầu của Hibiki chuyển động rõ rệt. Đôi má em ấy đỏ bừng. Mặc kệ những giọt mồ hôi rơi, Hibiki vẫn nhìn tôi chằm chằm."
# 【ふかみ】
# display as 深美
# JP: 「くんくん。すんすん――匂いも、すごく濃くなってきて。\n男の人の、勃起している――セックスのときの、匂いが」
1730 = "「Khịt khịt. Ngửi ngửi――Mùi cũng đậm lên rồi. Mùi của đàn ông khi cương cứng――khi làm tình.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぁ――はっ――」
1417 = "「A――ha――」"
# monologue
# JP: ふかみの言葉に煽られて、日々姫も小鼻をひくひくさせる。\nまずい。いけない――思いをけれど、強くは出せない。
1948 = "Bị những lời của Fukami kích động, cánh mũi Hibiki cũng phập phồng. Không ổn rồi. Không được――nghĩ vậy, nhưng tôi không thể phản kháng mạnh mẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「頼む。日々姫――\n嗅がないで、見ないでほしい」
1596 = "「Anh xin em. Hibiki―― Đừng ngửi, đừng nhìn nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「……それは……いや、\n嗅ぐ、し…………見る。もん――だって……だって、私」
972 = "「......Chuyện đó...... không được, em sẽ ngửi............ sẽ nhìn. Bởi vì...... bởi vì, em」"
# monologue
# JP: （ふわっ）
2402 = "（Nhẹ nhàng）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！」
1448 = "「A!」"
# monologue
# JP: 恐る恐ると伸びてきた日々姫の足を交わせない。\nごくふんわりと、フェザータッチで――けれど、踏まれる。
2059 = "Tôi không thể né tránh bàn chân rụt rè đưa tới của Hibiki. Rất đỗi nhẹ nhàng, tựa như lông vũ chạm vào――nhưng vẫn là bị dẫm lên."
# 【ふかみ】
# display as 深美
# JP: 「レセプションのあと。この格好で。日々姫さんとわたしと\n双鉄おにいさんと、三人になって――それから、朝まで」
1509 = "「Sau tiệc chiêu đãi. Với bộ dạng này. Chị Hibiki, em và anh Soutetsu, ba người chúng ta――sau đó, đến tận sáng.」"
# monologue
# JP: （ふみゅっ――さすっ――こしゅっ――むにっ）
2476 = "（Dẫm――Xoa xoa――Cọ cọ――Nắn bóp）"
# 【日々姫】
# display as 日日姬
# JP: 「！――っ！――っ！！？」
1449 = "「!――っ!――っ!!?」"
# monologue
# JP: ふかみの足の指先が、知り尽くしている僕の性器を、\n形をなぞりふみふみしながら、ますます勃起させていく。
2238 = "Những ngón chân của Fukami, vốn đã quá quen thuộc với dương vật của tôi, vừa lần theo hình dáng vừa dẫm đạp, khiến nó càng lúc càng cương cứng."
# 【ふかみ】
# display as 深美
# JP: 「こうなっちゃうに決まってて。そうわかってて。\n日々姫さんは、『朝までだったら引き受ける』って」
1634 = "「Biết chắc chắn sẽ thành ra thế này. Biết rõ là vậy. Thế mà chị Hibiki vẫn bảo, 'Nếu đến sáng thì chị sẽ nhận'.」"
# 【日々姫】
# display as 日日姬
# JP: 「言うたと。私、お願いしたと。やけん――やけん――\n嗅ぐし、見るし――それだけじゃなく」
1578 = "「Đã nói. Là em đã yêu cầu. Cho nên――cho nên―― Em sẽ ngửi, sẽ nhìn――không chỉ vậy đâu.」"
# monologue
# JP: （ふみゅっ！！！）
2478 = "（Dẫm mạnh!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！！！！」
1465 = "「っ!!!!!!!!!」"
# monologue
# JP: 快感が背徳感と入り混じり背筋から脳に突き抜ける。\n日々姫が――僕の義妹が――小さかったあの日々姫が――
2011 = "Khoái cảm lẫn lộn với cảm giác tội lỗi chạy dọc sống lưng lên tận não. Hibiki――em gái nuôi của tôi――Hibiki bé bỏng ngày nào――"
# 【日々姫】
# display as 日日姬
# JP: 「私……いま……踏んどる、と――\nにぃにの――にぃ、にの――――（ごくっ）」
1549 = "「Em...... bây giờ...... đang dẫm lên―― của anh hai――của anh, hai――――（Ực）」"
# 【ふかみ】
# display as 深美
# JP: 「こういうことをしたいって、日々姫さん、わたしたちに。\nそれで。わたしと凪ちゃんお願いすることにしたんです」
1638 = "「Chị Hibiki nói với bọn em là muốn làm những chuyện như thế này. Vì vậy. Em và bé Nagi mới quyết định nhờ vả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――しかし――いや、つまり」
1756 = "「Chuyện đó――nhưng mà――không, tóm lại là」"
# monologue
# JP: くまくまを抱きしめ泣いてた日々姫。\n赤は赤いとはしゃいだ日々姫。あの日々姫が――
2305 = "Hibiki từng ôm gấu bông khóc nhè. Hibiki từng vui vẻ nói 'Màu đỏ là màu đỏ'. Hibiki ngày đó――"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が、僕と――\n僕とセックスすることを」
1643 = "「Hibiki muốn, với anh―― làm tình với anh.」"
# 【日々姫】
# display as 日日姬
# JP: 「ずっとよ！　そんなん！\nずっと、ずうっとしたかったけん！！！」
1551 = "「Từ lâu rồi! Chuyện đó! Em đã luôn, luôn muốn làm vậy!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！」
1403 = "「っ!!!!!」"
# monologue
# JP: つながる、今更。ありえぬことと盲点にしてしまっていた。\n日々姫の下着姿や、薄着や、胸元――ああした全てが――
2251 = "Đến giờ tôi mới xâu chuỗi lại được. Tôi đã coi đó là điều không thể và biến nó thành điểm mù. Cảnh Hibiki mặc đồ lót, ăn mặc phong phanh, hay vòng ngực――tất cả những thứ đó――"
# 【日々姫】
# display as 日日姬
# JP: 「だけど――だけど。にぃには私を選んでくれなくて。\nそれでもにぃにの望むことなら、応援しようって思って」
1313 = "「Nhưng mà――nhưng mà. Anh hai không chọn em. Dù vậy, nếu đó là điều anh hai muốn, em đã định sẽ ủng hộ.」"
# monologue
# JP: 実際日々姫は、いつでも応援してくれた。\n修学旅行を過ごした日々も、そこから選んだ今への道も。
1977 = "Thực tế, Hibiki luôn ủng hộ tôi. Cả những ngày trong chuyến dã ngoại, và cả con đường tôi đã chọn để đi đến hiện tại."
# 【日々姫】
# display as 日日姬
# JP: 「けど私、最近どんどんおかしくて。ミスばっか増えて。\n嫉妬……抑えられなくなってきてるの、自分でわかって」
1315 = "「Nhưng gần đây em càng ngày càng kỳ lạ. Toàn mắc lỗi. Sự ghen tị...... em tự nhận ra mình không thể kiềm chế được nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「だからいっそ、こうしちゃう方がいいのかもって――\nわたしと凪ちゃん、思ったんです。一生懸命考えて」
1589 = "「Nên thà cứ làm thế này có khi lại tốt hơn―― Em và bé Nagi đã nghĩ vậy. Bọn em đã vắt óc suy nghĩ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「こうした方、とは」
1759 = "「Thế này, là sao」"
# 【ふかみ】
# display as 深美
# JP: 「だから――こういう風に、です」
1588 = "「Thì là――như thế này đây ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1401 = "「っ!!!」"
# monologue
# JP: ふかみの指が――足指が、器用に僕の下着を下ろす。\n意識がいかず、萎えているかと思った性器が――
2240 = "Ngón chân của Fukami――những ngón chân khéo léo kéo quần lót của tôi xuống. Cứ tưởng vì mất tập trung nên nó đã xìu xuống, ai ngờ dương vật của tôi――"
# 【日々姫】
# display as 日日姬
# JP: 「――あっ」
932 = "「――A」"
# monologue
# JP: ふかみの足に導かれるまま、日々姫の眼前に曝される。
1947 = "Dưới sự dẫn dắt của chân Fukami, nó phơi bày ngay trước mắt Hibiki."
# 【ふかみ】
# display as 深美
# JP: 「うっわ……いやらしい――\nなんですか、これ――いつも以上じゃないですか」
1462 = "「Uwa...... dâm đãng quá―― Gì thế này――còn to hơn mọi khi nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「これが……にぃにの――（ごくっ）――あ――う……\nそういうこと、したがってるときの――おちん、ちん」
1758 = "「Đây là...... của anh hai――（Ực）――a――ư...... Khi muốn làm chuyện đó――chim, chim.」"
# 【ふかみ】
# display as 深美
# JP: 「"そういこと”って――セックスでしょ？　日々姫さん。\nおちんちんを、おまんこに挿れること。セックス」
946 = "「'Chuyện đó' là――làm tình đúng không? Chị Hibiki. Cho chim vào bướm. Làm tình.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！？」
1405 = "「っ!!!?」"
# monologue
# JP: 顔から手から足の裏まで、日々姫の全身が朱に染まる。\n日々姫の部屋で時折感じる甘ったるい匂いが強くなる。
2155 = "Từ mặt, tay đến lòng bàn chân, toàn thân Hibiki đỏ bừng. Mùi hương ngọt ngào thi thoảng ngửi thấy trong phòng Hibiki trở nên nồng nặc."
# 【ふかみ】
# display as 深美
# JP: 「……憧れをこじらせるのは怖いって。わたしは理屈で、\n凪ちゃんは多分直感で、凄く、強く思ったんです」
969 = "「......Để sự khao khát trở nên méo mó thì đáng sợ lắm. Em bằng lý trí, còn bé Nagi có lẽ bằng trực giác, đã cảm nhận được điều đó rất rõ ràng, rất mãnh liệt.」"
# monologue
# JP: （しゅこっ！！）
2437 = "（Tuốt!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ！！！」
1494 = "「Ưm!!!」"
# monologue
# JP: 何に対する憧れなのか――考えがまとまるより早く、\nふかみの器用な足指が、勃起をしごいて邪魔をする。
1961 = "Khao khát về điều gì cơ chứ――Chưa kịp sắp xếp lại suy nghĩ, những ngón chân khéo léo của Fukami đã vuốt ve phần cương cứng, cản trở tâm trí tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ぁ――あ――にぃに――そんな、気持ち良さそうな顔」
1426 = "「A――a――anh hai――khuôn mặt trông, sung sướng quá.」"
# 【ふかみ】
# display as 深美
# JP: 「羨ましいなら、足を動かしたらどうですか？\n今日は日々姫さん、『凪ちゃんの代わり』なんですよ？」
1522 = "「Nếu ghen tị thì chị thử cử động chân xem sao? Hôm nay chị Hibiki là 'người thay thế bé Nagi' mà?」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――。\n――――っ――」
1431 = "「A――. ――――っ――」"
# monologue
# JP: 日々姫の足がもう一度、僕の勃起に近づいてくる。\nがたがたブルブル、緊張のせいか、震えてる。
2182 = "Bàn chân Hibiki lại một lần nữa tiến lại gần dương vật đang cương cứng của tôi. Run rẩy lập cập, có lẽ vì căng thẳng."
# 【双鉄】
# display as 雙鐵
# JP: 「日々、姫――」
1624 = "「Hibi, ki――」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
# 1443 = "「啊」" 
# monologue
# JP: 日々姫の足が止まってしまう。何も言えなくなってしまう。\n拒絶はできない。無論、催促などできようも
2181 = "Chân Hibiki khựng lại. Em ấy không nói được lời nào. Tôi không thể từ chối. Dĩ nhiên, cũng chẳng thể thúc giục."
# 【ふかみ】
# display as 深美
# JP: 「やっちゃえば、簡単なことなんですよ？」
1312 = "「Cứ làm đi là thấy đơn giản thôi mà?」"
# monologue
# JP: （ふみゅっ）
2479 = "（Dẫm nhẹ）"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！！！！」
1404 = "「っ!!!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うっ！！！！」
1464 = "「Ư!!!!」"
# monologue
# JP: ふかみが軽く足で押す。\n僕の勃起を、硬直してる日々姫の足裏に押し付ける。
2243 = "Fukami dùng chân ấn nhẹ. Ép dương vật của tôi vào lòng bàn chân đang cứng đờ của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ……」
1701 = "「Fukami......」"
# monologue
# JP: 安堵している。事態が進捗――いや、\nふかみが僕らを恐らくは、助けてくれたそのことに。
2079 = "Tôi thấy nhẹ nhõm. Tình hình đã tiến triển――không, đúng hơn là vì Fukami có lẽ đã giúp đỡ chúng tôi."
# 【ふかみ】
# display as 深美
# JP: 「たったこれだけのことなんです。\n普通に誰でもしてること。それなのに……ね？」
1534 = "「Chỉ có thế này thôi mà. Chuyện mà ai cũng làm bình thường. Vậy mà...... nhỉ?」"
# monologue
# JP: ふかみが日々姫に視線を送る。\n日々姫は戸惑ったような顔をして、ゆっくり、小さく頷く。
2242 = "Fukami đưa mắt nhìn Hibiki. Hibiki lộ vẻ bối rối, chậm rãi, khẽ gật đầu."
# 【日々姫】
# display as 日日姬
# JP: 「ふつうに、だれでも、してること」
1682 = "「Bình thường, ai cũng, làm chuyện này.」"
# monologue
# JP: （しにゅっ）
2438 = "（Vuốt）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1401 = "「唔！！！」" 
# monologue
# JP: ふかみからか、日々姫からか――あるいは同時か。\nわからないまま、ふたりの足裏が動き始める。
1888 = "Là từ Fukami, hay từ Hibiki――hoặc là cùng lúc. Không rõ là ai, lòng bàn chân của hai người bắt đầu di chuyển."
# monologue
# JP: （ふみゅっ――しにゅっ――こしゅっ――ふきゅっ――）
2429 = "（Dẫm――Vuốt――Cọ cọ――Ép chặt――）"
# 【ふかみ】
# display as 深美
# JP: 「ですです。やってみたら簡単でしょう？\nこうしてふたりで、あんよで挟んで動かすだけで」
1665 = "「Đúng rồi, đúng rồi. Thử làm thì thấy đơn giản đúng không? Chỉ cần hai người dùng chân kẹp lại rồi di chuyển thế này thôi.」"
# monologue
# JP: （くにっ！）
2441 = "（Nắn!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1401 = "「唔！！！」" 
# monologue
# JP: ふかみの足がアクセルペダルを踏み込むような動きをする。\nただ不器用に上下するだけの日々姫の足とギャップが生じ。
2237 = "Chân Fukami di chuyển như đang đạp chân ga. Tạo ra sự chênh lệch với bàn chân chỉ biết lên xuống một cách vụng về của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「くふっ――ぁっ――」
1368 = "「Kuhu――a――」"
# 【ふかみ】
# display as 深美
# JP: 「普段はあれだけかっこよくて、冷静で頼りになりまくる\n双鉄おにいさんが、こんなだらしないお顔になっちゃう」
1536 = "「Anh Soutetsu bình thường ngầu thế, điềm tĩnh và đáng tin cậy như thế, mà giờ lại làm ra vẻ mặt dâm đãng thế này.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぁ……にぃに……そぎゃんお顔……」
1442 = "「A...... anh hai...... khuôn mặt đó......」"
# 【ふかみ】
# display as 深美
# JP: 「日々姫さんも、もっと好きに動かしてみていいですよ？\n痛くとかならないように、わたし側で調整しますから」
1640 = "「Chị Hibiki cũng có thể thử cử động theo ý thích mà? Em sẽ điều chỉnh phía em để anh ấy không bị đau đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぁ……」
1435 = "「A......」"
# monologue
# JP: 日々姫は戸惑ったようにふかみを見――\nそれからゆっくり、怖がるような視線を僕へと向け直す。
2145 = "Hibiki bối rối nhìn Fukami―― Sau đó chậm rãi, chuyển ánh mắt có vẻ sợ sệt về phía tôi."
# 【日々姫】
# display as 日日姬
# JP: 「あの……にぃに――」
1765 = "「Ưm...... anh hai――」"
# monologue
# JP: 思考がまったくまとまらない。動悸の音ばかりが耳につく。\n冷静に――思った瞬間。最低な発想に取り憑かれてしまう。
2017 = "Đầu óc tôi hoàn toàn trống rỗng. Chỉ nghe thấy tiếng tim đập thình thịch. Phải bình tĩnh lại――Ngay khoảnh khắc nghĩ vậy. Tôi bị một ý nghĩ tồi tệ ám ảnh."
# 【双鉄】
# display as 雙鐵
# JP: 「……動かして、ほしい。とにかく一度――\n僕を、射精させてほしい」
964 = "「......Cử động đi, anh muốn. Tóm lại là một lần―― Hãy làm anh xuất tinh đi.」"
# monologue
# JP: 射精をすれば、抜きさえすれば冷静になれる。\n卑怯な逃げでしかないのであろう発想に、けれども僕は
1920 = "Chỉ cần xuất tinh, chỉ cần xả ra là tôi sẽ bình tĩnh lại được. Một suy nghĩ chẳng khác nào sự trốn chạy hèn nhát, nhưng tôi lại..."
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！！！」
# 1494 = "「嗯！！！」" 
# monologue
# JP: ああ――日々姫もだ。\n満面の笑顔をもって、僕の言葉にすがりついてくる。
1931 = "A――Hibiki cũng vậy. Với nụ cười rạng rỡ, em ấy bám lấy những lời của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「えと……」
1337 = "「Ưm......」"
# 【ふかみ】
# display as 深美
# JP: 「いいですよ？　想像してたこととか、知識とか。\nそれを試してみるくらいの気持ちで、思うままにで」
1686 = "「Được mà? Những gì chị đã tưởng tượng, hay kiến thức chị biết. Cứ thử làm theo ý mình với tâm thế thử nghiệm xem sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「はうっっ」
1384 = "「Hau」"
# monologue
# JP: ふかみの言葉に頬を染め、それでも小さく頷いて。
2280 = "Nghe Fukami nói, đôi má em ấy ửng hồng, nhưng vẫn khẽ gật đầu."
# monologue
# JP: （ふ、みゅ――くにゅっ――しこっ――しにゅっ――）
2477 = "（Dẫm, nhẹ――Nắn――Tuốt――Vuốt――）"
# monologue
# JP: 日々姫は足を、少し大胆に動かし始める。\nふかみは一転、足裏を支え――クッションにする。
2183 = "Hibiki bắt đầu cử động chân táo bạo hơn một chút. Fukami thì ngược lại, dùng lòng bàn chân nâng đỡ――làm tấm đệm."
# 【日々姫】
# display as 日日姬
# JP: 「んっ――」
1468 = "「Ưm――」"
# monologue
# JP: （しにゅっ――ぐちゅっ――ふみゅっ――もみゅっっ）
# 2429 = "（套弄——套弄——套弄——套弄）" 
# 【双鉄】
# display as 雙鐵
# JP: 「――」
930 = "「――」"
# monologue
# JP: 日々姫の足がみるみるうちに、柔らかに暖かに変化する。\n赤ん坊の指顔負けのぷりぷり指が、僕の亀頭の先端を。
2184 = "Bàn chân Hibiki nhanh chóng trở nên mềm mại và ấm áp. Những ngón chân mũm mĩm không kém gì ngón tay trẻ sơ sinh chạm vào đầu nấc của tôi."
# monologue
# JP: （ふにゅっ――さすっ――こしゅっ――なでっ――）
# 2477 = "（踩踏——踩踏——套弄——套弄——）" 
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！」
# 1448 = "「啊！」" 
# monologue
# JP: いいこいいことナデナデされて思わず声を漏らしてしまう。\n日々姫の顔が、途端にパッと明るく輝く。
2293 = "Được vuốt ve âu yếm như trẻ ngoan, tôi bất giác thốt ra tiếng rên. Khuôn mặt Hibiki bỗng chốc sáng bừng lên."
# 【日々姫】
# display as 日日姬
# JP: 「今の良かと！？　にぃに、わたし、上手くできとぉ？」
1306 = "「Thế này được không!? Anh hai, em làm có giỏi không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1468 = "「嗯——」" 
# monologue
# JP: 投炭練習を不意に思い出しなぜか泣きそうな気持ちになる。\n夢中になれば日々姫はいつでもただただ一生懸命――！？
1932 = "Đột nhiên nhớ lại buổi tập xúc than, không hiểu sao tôi lại có cảm giác muốn khóc. Một khi đã say mê, Hibiki lúc nào cũng chỉ biết cố gắng hết mình――!?"
# monologue
# JP: （ずりゅううううううううううううううううっっっ！）
2436 = "（Tuốtttttttttt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！！！！」
1370 = "「Kuha!!!!」"
# monologue
# JP: 突然の強烈な快感に驚き見れば――
2260 = "Bất ngờ trước khoái cảm mãnh liệt ập đến, tôi nhìn xuống――"
# monologue
# JP: （しこっ！　しにゅうっ！　しゅこっ！　ずりゅうっ！）
2430 = "（Tuốt! Vuốt! Tuốt! Vuốt mạnh!）"
# 【日々姫】
# display as 日日姬
# JP: 「わ――わわっ――そぎゃん激しくっ！？」
1375 = "「Wa――wawa――mãnh liệt vậy sao!?」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。竿は亀頭ほど敏感じゃないから、\nこのくらい強くしちゃって、平気なんです」
1663 = "「Đúng rồi. Thân dương vật không nhạy cảm bằng quy đầu, nên có làm mạnh thế này cũng không sao đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「（ごくっ）」
1787 = "「（Ực）」"
# monologue
# JP: ふかみは親指と他四本とで挟む形で、僕の勃起を包み込み、\nしかも足指を動かしながら、強く優しくしごいてくれる。
2224 = "Fukami dùng ngón cái và bốn ngón còn lại kẹp chặt, bao bọc lấy dương vật đang cương cứng của tôi, hơn nữa còn vừa cử động các ngón chân, vừa vuốt ve mạnh mẽ mà dịu dàng."
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――あっ――これ、は――」
1425 = "「A――a――thế, này――」"
# 【ふかみ】
# display as 深美
# JP: 「船頭は、足の指で船底掴んでなんぼのお仕事ですから。\nこのくらいなら、余裕なんですよ？　実は」
1598 = "「Người lái đò thì phải biết dùng ngón chân bám chặt đáy thuyền mà. Cỡ này thì nhằm nhò gì đâu? Thật đấy.」"
# monologue
# JP: （しゅこおっ！　ずりゅっ！　もみゅうっ！　しゅこ！）
2431 = "（Tuốt! Vuốt! Xoa nắn! Tuốt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――くっ！」
1432 = "「A――ư!」"
# 【日々姫】
# display as 日日姬
# JP: 「ふわ……わわっ」
1351 = "「Fuwa...... wawa」"
# 【ふかみ】
# display as 深美
# JP: 「分業しましょう？　わたしはわたしの得意なことを。\n日々姫さんは、日々姫さんの得意なことを」
1558 = "「Phân công công việc nhé? Em làm việc em giỏi. Còn chị Hibiki thì làm việc chị giỏi.」"
# 【日々姫】
# display as 日日姬
# JP: 「私の――得意って、えと――」
1546 = "「Việc chị――giỏi á, ừm――」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんの、先走り汁のぬるぬる絵の具で、\n亀頭全部を優しく丁寧に塗りつぶしてあげる、とか」
1684 = "「Dùng chất bôi trơn dính dớp của anh Soutetsu làm màu vẽ, tô kín toàn bộ quy đầu một cách nhẹ nhàng và cẩn thận chẳng hạn.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――うん！！」
1433 = "「A――ừ!!」"
# monologue
# JP: （ちゅるんっ！）
2421 = "（Trơn tuột!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅぁぁあああああああああっ！！！？」
1463 = "「Ư a a a a a a a a a a!!!?」"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃんっ！！！？」
1333 = "「Hya!!!?」"
# 【ふかみ】
# display as 深美
# JP: 「ぁ、やめなくっても平気ですよ？　今の声は、うふふっ、\nめちゃくちゃ気持ちよすぎてびっくりしちゃった声」
1459 = "「A, không cần dừng lại đâu. Tiếng vừa rồi, ufufu, là tiếng kêu vì sướng quá nên giật mình đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「そ、そぎゃん――と？」
1652 = "「Thế, thế――á?」"
# monologue
# JP: 恥ずかしい。なのに頭が勝手にぶんぶん頷いている。\n今の快感をもう一度、もう何度でも味わいたくて。
2048 = "Thật xấu hổ. Vậy mà đầu tôi lại tự động gật lia lịa. Muốn được nếm trải khoái cảm lúc nãy một lần nữa, bao nhiêu lần cũng được."
# 【日々姫】
# display as 日日姬
# JP: 「えへへっ！　そうなんだ」
1387 = "「Ehehe! Ra là vậy.」"
# monologue
# JP: （ちゅるん！　ぬりゅっ！　ぬちゅっ！　りゅちゅっ）
2428 = "（Trơn tuột! Nhóp nhép! Nhóp nhép! Nhóp nhép）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ぁっ！　あっ！　あっ！！！」
1430 = "「A――a! A! A!!!」"
# 【ふかみ】
# display as 深美
# JP: 「んふふっ」
1487 = "「Nfufu」"
# monologue
# JP: （しゅこっ！　ずりゅっ！　ぐちゅっ！　ずりゅん！）
# 2431 = "（套弄！套弄！套弄！套弄！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁぁああああああああっっ！！！！」
1446 = "「A a a a a a a a a a a!!!!」"
# monologue
# JP: ふかみの指示が恐ろしいほど的確すぎる。\n日々姫の柔らかな足指は、ゆっくりやわやわ丁寧に――
2228 = "Chỉ dẫn của Fukami chính xác đến đáng sợ. Những ngón chân mềm mại của Hibiki, chậm rãi, êm ái, cẩn thận――"
# monologue
# JP: （つりゅん！　ちゅるっ！　ちゅこっ！　くりゅんっ）
# 2428 = "（塗抹！塗抹！塗抹！塗抹）" 
# 【双鉄】
# display as 雙鐵
# JP: 「ふっ――あっ――ぁっ――あっ！」
1350 = "「Hư――a――a――a!」"
# monologue
# JP: 亀頭全部を先走り汁で余すところ無く無理潰していく。\n亀頭の割れ目もカリ首裏も、本当に余すところな――っ！
2318 = "Tô kín toàn bộ quy đầu bằng chất bôi trơn không chừa chỗ nào. Từ rãnh quy đầu đến mặt dưới, thực sự không chừa một chỗ nà――っ!"
# monologue
# JP: （しゅこっ！　ずりゅん！　くぢゅっ！　ぢゅにゅっ！）
2435 = "（Tuốt! Vuốt! Nhóp nhép! Nhóp nhép!）"
# 【双鉄】
# display as 雙鐵
# JP: 「～～～～～～～～っ！！！！！」
1412 = "「~~~~~~~~っ!!!!!」"
# monologue
# JP: その極上の快感を、暴力的に直線的に、\nふかみの足指の強い刺激が上書きしていく塗り込めていく。
2301 = "Khoái cảm tột đỉnh đó, một cách bạo lực và trực diện, bị kích thích mạnh mẽ từ những ngón chân của Fukami ghi đè và tô đậm thêm."
# 【ふかみ】
# display as 深美
# JP: 「うふふっ、双鉄おにいさん。気持ちいいんですね？\n上も下も、おくち、ぱくぱくあえいじゃってますよ」
1399 = "「Ufufu, anh Soutetsu. Sướng lắm đúng không? Cả trên lẫn dưới, miệng đều đang há ra thở dốc kìa.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　あっ！　わっ――――はぁっ……はぁっ。\nおちんちんの、われめ――こんなに――くぱ、くぱっ」
1389 = "「Hả!? A! Wa――――Hà...... hà. Rãnh của, chim――đang――mở ra, khép lại thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1401 = "「唔！！！」" 
# monologue
# JP: 無自覚に僕を恥辱攻めして。そうする間も、\n日々姫の白い足指は、丁寧に僕の亀頭を塗りつぶしていく。
2167 = "Em ấy vô thức tấn công tôi bằng sự sỉ nhục. Trong lúc đó, những ngón chân trắng nõn của Hibiki vẫn cẩn thận tô kín quy đầu của tôi."
# monologue
# JP: （くりゅん！　ぬりゅんっ！　ちゅるん！　ちゅくっ！）
2472 = "（Vuốt! Nhóp nhép! Trơn tuột! Chụt!）"
# 【ふかみ】
# display as 深美
# JP: 「もう少しかなぁ～？　どうかなぁ～？」
1654 = "「Chắc sắp rồi nhỉ~? Phải không ta~?」"
# monologue
# JP: （しゅこっ！　くぢゅっ！　しにゅっ！　ずりゅうっ！）
# 2431 = "（套弄！套弄！套弄！套弄！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「ふぁっ――あっ――っ――あっ――あっ！！」
1355 = "「Fua――a――っ――a――a!!」"
# monologue
# JP: 不意にふかみの足の動きがゆるく、弱くなる。\nゆえに亀頭に神経が、一層集中させられてっ――
2263 = "Bất chợt cử động chân của Fukami lỏng đi, yếu dần. Do đó thần kinh càng tập trung hơn vào quy đầu――"
# monologue
# JP: （くりゅっ！　ちゅにゅ！　りゅこっ！　ぬりゅっ！）
# 2431 = "（套弄！套弄！套弄！套弄！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1401 = "「唔！！！」" 
# 【ふかみ】
# display as 深美
# JP: 「あ、うふふっ。ビクビクしてきたぁ。\n双鉄おにいさん、射精、もうすぐなんですか？」
1457 = "「A, ufufu. Nó đang giật giật kìa. Anh Soutetsu, sắp xuất tinh rồi sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？　――あ、あぁ」
1406 = "「っ!!? ――A, ừm」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！」
# 1401 = "「唔！！！」" 
# monologue
# JP: はずかしい。義妹の前で。日々姫の前で。\n自分の射精が間近だと、告白させられてしまっ――っ！？
1968 = "Thật xấu hổ. Trước mặt em gái nuôi. Trước mặt Hibiki. Bị ép phải thú nhận rằng mình sắp xuất tinh rồ――っ!?"
# monologue
# JP: （じゅっ！　こんんっっっっっ！！！！！！！）
2433 = "（Phập! Phập!!!!!!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くああああああっ！！？」
1371 = "「Kuaaaaaa!!?」"
# monologue
# JP: （しゅこっ！　ぢゅこっ！　ふみゅっ！　しゅこっ！！）
# 2431 = "（套弄！套弄！套弄！套弄！）" 
# monologue
# JP: ふかみが加速し、睾丸にも踏むような刺激を加え――
2218 = "Fukami tăng tốc, tăng thêm kích thích như dẫm lên cả tinh hoàn――"
# 【日々姫】
# display as 日日姬
# JP: 「かわい――にぃに――にぃに、かわいい」
1514 = "「Đáng yêu――anh hai――anh hai, đáng yêu quá.」"
# monologue
# JP: （くりゅん！　ちゅるっ！　しゅみゅ！　ちゅるん！）
# 2472 = "（滑溜！滑溜！滑溜！滑溜！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「あ――あっ――あっ――あっ！！！」
1420 = "「A――a――a――a!!!」"
# monologue
# JP: 日々姫も煽られより丁寧に、亀頭をひたすら塗りつぶし、\n気持ちよすぎて精液が、ぐんぐん膨らみ濃くなっていく。
1951 = "Hibiki cũng bị kích động, cẩn thận hơn, mải mê tô kín quy đầu, sướng đến mức tinh dịch cuồn cuộn dâng lên và đặc lại."
# 【ふかみ】
# display as 深美
# JP: 「日々姫さん？　もうすぐですよ？　わかります？\nおちんちん、こんなにビクビクあえいじゃってる」
1641 = "「Chị Hibiki? Sắp ra rồi đấy? Chị thấy không? Chim đang giật giật thở dốc thế này cơ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「～～～～っ！！」
1344 = "「~~~~っ!!」"
# 【日々姫】
# display as 日日姬
# JP: 「はぁっ、はぁっ、はぁっ、はぁっ――もう、すぐっ、\nもうすぐっ――にぃにの――射精っ――」
1741 = "「Hà, hà, hà, hà――sắp, rồi, sắp rồi――anh hai sắp――xuất tinh――」"
# monologue
# JP: （しゅこっ！　ぢゅこっ！　もみゅ！　ぢゅこんっっ！）\n（ちゅるっ！　ぷちゅっ！　ぬりゅん！　ちゅりゅっ！）
2432 = "（Tuốt! Tuốt! Xoa nắn! Phập!） （Trơn tuột! Nhóp nhép! Nhóp nhép! Trơn tuột!）"
# monologue
# JP: 亀頭を、竿を、タマまでを、丁寧に激しく責められて、\n熱くて暑くてあつくてあつくて、もう全身がドロドロで！
2315 = "Từ quy đầu, thân, đến cả bi, bị tấn công cẩn thận mà mãnh liệt, nóng quá nóng quá nóng quá nóng quá, toàn thân tôi như tan chảy!"
# 【ふかみ】
# display as 深美
# JP: 「思いっきり、ん――きもち、よく――\nたくさん、ぴゅっぴゅ――させて――あげます」
1281 = "「Cứ thoải mái, ưm――sướng đi―― Em sẽ cho anh――bắn ra――thật nhiều.」"
# monologue
# JP: （しこっ！　しゅこんっ！　ぐちゅ！　ずりゅっ！）
# 2431 = "（套弄！套弄！套弄！套弄！）" 
# 【日々姫】
# display as 日日姬
# JP: 「[だ,1]射精してっ――精、液――みたい、けん――\nにぃにの射精――わたし――ずうっと、見たかったけん」
1526 = "「Xuất tinh đi――Tinh, dịch――em muốn, xem―― Cảnh anh hai xuất tinh――em――từ lâu, đã muốn xem rồi.」"
# monologue
# JP: （ちゅむっ！　ちゅるっ！　ゆるんっ！　ぷりゅっ！）
# 2431 = "（套弄！套弄！套弄！套弄！）" 
# monologue
# JP: ふかみの足がポンプになって精を吸い上げ、\n日々姫の優しいナデナデが、精をいっそう昂ぶらせっ！
2236 = "Bàn chân Fukami biến thành máy bơm hút tinh dịch lên, còn những cái vuốt ve dịu dàng của Hibiki khiến tinh dịch càng thêm sục sôi!"
# 【双鉄】
# display as 雙鐵
# JP: 「ダメ……だっ！　ぁ――くっ――もうっ、イクッ！」
1265 = "「Không...... được! A――ư――anh, ra mất!」"
# monologue
# JP: 激しい恥辱が更に全身を加熱する。けれど宣言しなければ、\nどろどろに濃い精液を、日々姫に、義妹に、かけてしまう。
2002 = "Sự sỉ nhục mãnh liệt càng làm toàn thân tôi nóng rực. Nhưng nếu không báo trước, tôi sẽ bắn tinh dịch đặc sệt lên người Hibiki, lên người em gái nuôi của mình mất."
# 【ふかみ】
# display as 深美
# JP: 「うふふふっ！　じゃあ、えいっ！」
1397 = "「Ufufufu! Vậy thì, hây!」"
# monologue
# JP: （ぎゅむっ！　ぐいいいいいっ！！！！）
2434 = "（Bóp chặt! Tuốt mạnh!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ！！！？」
1364 = "「Fua!!!?」"
# monologue
# JP: （びゅっ！　どびゅっ！！　どびゅる！　びゅううう！）
2416 = "（Phụt! Phụt!! Phụt! Phụtttt!）"
# 【日々姫】
# display as 日日姬
# JP: 「きゃうっ！！！？」
1329 = "「Kyau!!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！？」
1342 = "「っ!!!!?」"
# monologue
# JP: （びゅうっ！　びゅっ！　びゅるうっ！！　びゅぶっ！）
# 2416 = "（咻！咻！咻！咻！）" 
# monologue
# JP: ふかみの足に、足指に、勃起をがしりと掴まれて――
2239 = "Dương vật bị bàn chân, bị ngón chân của Fukami tóm chặt lấy――"
# 【日々姫】
# display as 日日姬
# JP: 「ふぁっ――あっ――あっ――あっ――」
1354 = "「Fua――a――a――a――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふか、み――どう、してっ――く――あっ！！」
1698 = "「Fuka, mi――sao, lại――ư――a!!」"
# monologue
# JP: （びゅるっ！　びゅう！　ぶびゅっ！　びゅっ！！）
# 2416 = "（咻！咻！咻！咻！）" 
# monologue
# JP: 精液を、日々姫に。大切な義妹にかけてしまっている。\n妻たるふかみの、その足指に導かれ――
2272 = "Tinh dịch, bắn lên người Hibiki. Bắn lên người em gái nuôi quan trọng của tôi. Dưới sự dẫn dắt của những ngón chân của người vợ Fukami――"
# monologue
# JP: （びゅううっ！　びゅるっ！　ぶっ！　びゅうっ！）
# 2416 = "（咻！咻！咻！咻！）" 
# 【日々姫】
# display as 日日姬
# JP: 「あついっ――精、液――にぃにの――にぃ、にの――」
1517 = "「Nóng quá――Tinh, dịch――của anh hai――của anh, hai――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ああっ！」
1429 = "「A――aa!」"
# monologue
# JP: 困惑と罪悪感と興奮が、精液の粘度を更にたかめる。\nマヨネーズのごとき濃白濁が、尿道口をびゅるりと抜けて。
1939 = "Sự bối rối, cảm giác tội lỗi và hưng phấn càng làm tăng độ nhớt của tinh dịch. Chất lỏng đục ngầu đặc sệt như mayonnaise phụt ra khỏi lỗ niệu đạo."
# monologue
# JP: （びゅっ――びゅうっ！　――ビュッ――ぷっ――）
2407 = "（Phụt――Phụtt! ――Phụt――Pẹt――）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――あっ――あ……ん――（ごくっ）――\nはぁっ――はあっ――はあっ――はあっ――」
1422 = "「A――a――a...... n――（Ực）―― Hà――hà――hà――hà――」"
# 【日々姫】
# display as 日日姬
# JP: 「精液。精子――これが、にぃにの――（くんっ、くん）\nあつくて――くさい――ゆめに、まで、見たっ――」
1721 = "「Tinh dịch. Tinh trùng――đây là, của anh hai――（Khịt, khịt） Nóng quá――hôi quá――đến cả trong mơ, em cũng muốn thấy――」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1402 = "「っ!!!!」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……むっ――ん――じゅずっ――ずっ――ずっ――\nじゅるるるるっ――（ごくっ）――んぇ……に、がっ」
1437 = "「A...... mư――n――chụt――chụt――chụt―― Chùn chụt――（Ực）――oẹ...... đắng, quá.」"
# monologue
# JP: 日々姫が、僕の精液を舐める。舐めて、すすって、\n喉に落とす。ひどく不味そうに――しあわせそうに。
2197 = "Hibiki liếm tinh dịch của tôi. Liếm, mút, rồi nuốt xuống họng. Trông có vẻ rất khó nuốt――nhưng lại rất hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「どう、して――ふかみっ」
1709 = "「Tại, sao――Fukami」"
# monologue
# JP: 僕の精液全部を日々姫の方へと向けた、かけさせた。\nそれだけは回避したくて――イクと確かに伝えたのに。
2066 = "Em ấy hướng toàn bộ tinh dịch của tôi về phía Hibiki, bắt tôi bắn lên người em ấy. Tôi chỉ muốn tránh điều đó――nên mới nói rõ là mình sắp ra mà."
# 【ふかみ】
# display as 深美
# JP: 「満足して、納得してもらえないと――\nこじれてるの、いつか再発するから――そのためです」
1736 = "「Nếu không làm cho chị ấy thỏa mãn và chấp nhận―― Thì sự méo mó này, một ngày nào đó sẽ tái phát――vì thế nên em mới làm vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1452 = "「っ!!!!」"
# monologue
# JP: どこか冷たいふかみの声が射精直後で冷静な脳と呼応する。\nそうだ――そういうえば、こういう話であったのだ。
2312 = "Giọng nói có phần lạnh lùng của Fukami hô ứng với bộ não vừa bình tĩnh lại sau khi xuất tinh. Đúng rồi――nhắc mới nhớ, câu chuyện vốn là như vậy mà."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は――」
1625 = "「Hibiki thì――」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！！！」
1332 = "「っ!!!!!」"
# monologue
# JP: チュルルを夢中で盗み食いしているところに\n声をかけられた子猫のような、日々姫の反応。
2172 = "Phản ứng của Hibiki giống hệt một chú mèo con bị gọi bất chợt khi đang say sưa ăn vụng Chururu."
# 【双鉄】
# display as 雙鐵
# JP: 「ひびきは」
1628 = "「Hibiki」"
# monologue
# JP: だから優しく、大丈夫だよと思いをこめて、呼び直す。\nどこまでだって可愛くて愛おしい、僕の大事な義妹の名を。
2083 = "Vì thế tôi gọi lại tên em ấy thật dịu dàng, với ý muốn truyền đạt rằng không sao đâu. Tên của cô em gái nuôi quan trọng, vô cùng đáng yêu và đáng mến của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「う……ん」
1478 = "「Ư......m」"
# 【双鉄】
# display as 雙鐵
# JP: 「このように僕とセックスをして――\nしたとして――それで、幸せになれるのか？」
1739 = "「Làm tình với anh như thế này―― Cho dù có làm――như vậy, em có thể hạnh phúc không?」"
# 【日々姫】
# display as 日日姬
# JP: 「なれると！　そいば――わたしの…………\n……にぃにに、エッチしてもらうの……夢、やけん」
1674 = "「Sẽ hạnh phúc mà! Chuyện đó――của em............ ......Được anh hai làm chuyện ấy...... là ước mơ của em mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
# 1393 = "「唔」" 
# monologue
# JP: 過去形ではなく現在形で日々姫はいって。\n伏せていた目を、僕の目にむけ、持ち上げる。
2169 = "Hibiki không dùng thì quá khứ mà là hiện tại. Em ấy ngước đôi mắt đang cụp xuống lên, nhìn thẳng vào mắt tôi."
# 【日々姫】
# display as 日日姬
# JP: 「一番に望んだ形と変わっても。それはやっぱり、\nわたしの大事な夢やけん――叶えたかとよ」
1392 = "「Cho dù hình thức có khác với điều em mong muốn nhất. Thì đó vẫn là, ước mơ quan trọng của em――em muốn biến nó thành hiện thực.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう、なのか」
1659 = "「Vậy, sao.」"
# monologue
# JP: “叶えねば憧れはどんどん膨らみ歪みを増してく――”\nふかみの言葉の真意が僕にも、予言のように伝わってくる。
926 = "“Nếu không thành hiện thực, sự khao khát sẽ ngày càng phình to và trở nên méo mó――” Ý nghĩa thực sự trong lời nói của Fukami cũng truyền đến tôi như một lời tiên tri."
# 【双鉄】
# display as 雙鐵
# JP: 「途中で遮らず聞いてくれ。僕は日々姫をとても大事に\n思っている。それを信頼し――僕の言葉を聞いてくれ」
1277 = "「Đừng ngắt lời, hãy nghe anh nói. Anh coi Hibiki là một người rất quan trọng. Hãy tin điều đó――và lắng nghe anh.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
1484 = "「Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の気持ちはとても嬉しい。光栄だ。\nこの状況でなかったら、即座に全力で受け入れている」
1285 = "「Tình cảm của Hibiki làm anh rất vui. Anh thấy rất vinh dự. Nếu không phải trong tình huống này, anh đã lập tức đón nhận bằng tất cả tấm lòng.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1484 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「だが僕はすでに、ふかみを、凪を、妻と選んだ。\n僕の腕では、凪とふかみの他にもう何一つ抱えられない」
1272 = "「Nhưng anh đã chọn Fukami, chọn Nagi làm vợ rồi. Vòng tay của anh, ngoài Nagi và Fukami ra không thể ôm thêm bất cứ ai nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「やけん。わたし！　今夜だけでも凪ちゃんの代わりに」
1591 = "「Cho nên. Em! Chỉ đêm nay thôi, thay cho bé Nagi cũng được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪の代わりには誰もなれない。\n日々姫の代わりに、世界中誰一人なれないのと同様に」
1688 = "「Không ai có thể thay thế Nagi. Cũng giống như trên thế giới này không ai có thể thay thế Hibiki vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぁっ――」
# 1414 = "「啊——」" 
# monologue
# JP: 泣き笑い。ひどく苦しげで、綺麗な表情。女の、顔。\n日々姫に僕が求めぬ表情――どれほど魅力的だろうとも。
2150 = "Khóc xen lẫn cười. Một biểu cảm vô cùng đau khổ nhưng lại rất đẹp. Khuôn mặt của một người phụ nữ. Biểu cảm mà tôi không hề mong muốn ở Hibiki――dù nó có quyến rũ đến nhường nào."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫に笑っていてほしい。苦しいときは泣いてほしい。\n素顔の日々姫と、兄妹として楽しい日々を過ごしたい」
1566 = "「Anh muốn Hibiki luôn cười. Lúc đau khổ thì hãy khóc. Anh muốn trải qua những ngày tháng vui vẻ với tư cách là anh em, cùng với một Hibiki sống đúng với bản thân mình.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1484 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「だから、日々姫の初恋が。僕に憧れ続けることが――\n日々姫に仮面を被せることを強いてしまっていうのなら」
1594 = "「Vì thế, nếu mối tình đầu của Hibiki. Nếu việc tiếp tục khao khát anh―― lại ép buộc Hibiki phải đeo một chiếc mặt nạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！」
1784 = "「っ!!!」"
# monologue
# JP: ――意識して、視線を剥がしてふかみを見つめる。\n恐らく残酷なことだけれども、絶対、必要なことだから。
916 = "――Tôi cố ý dứt ánh nhìn ra và nhìn chằm chằm vào Fukami. Có lẽ là tàn nhẫn, nhưng điều này tuyệt đối cần thiết."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ。生涯に一度だけ。今夜一晩だけ。ふかみと凪を、\n僕に裏切らせてほしい。僕の浮気を――」
1706 = "「Fukami. Chỉ một lần trong đời thôi. Chỉ đêm nay thôi. Hãy cho phép anh, phản bội em và Nagi. Cho phép anh ngoại tình――」"
# 【ふかみ】
# display as 深美
# JP: 「共犯ですよ？　わたしは。双鉄おにいさん」
1560 = "「Em là đồng phạm mà? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
# 1404 = "「唔！！！！！！」" 
# monologue
# JP: ふかみの瞳の最奥に、たゆたう菫に魅入られる。\n暗くて深く、どこまでも濃い――ほとんど黒の、紫に。
2072 = "Tôi bị mê hoặc bởi sắc hoa violet dập dềnh nơi sâu thẳm nhất trong đôi mắt Fukami. Tối tăm, sâu thẳm và đậm đặc vô cùng――một sắc tím gần như đen kịt."
# 【ふかみ】
# display as 深美
# JP: 「こうなる覚悟はしてました。だから、ね？　一緒に。\n今夜だけ。一晩だけ。凪ちゃんのこと、裏切りましょう」
1529 = "「Em đã chuẩn bị tinh thần cho việc này rồi. Nên là, nhỉ? Cùng nhau. Chỉ đêm nay thôi. Chỉ một đêm thôi. Cùng phản bội bé Nagi nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1468 = "「嗯——」" 
# monologue
# JP: だから、僕は、ふかみを求め、ふかみを選んだ。\nそれゆえ僕には、凪の明るさ、裏表なさが必要だった。
2206 = "Đó là lý do tôi khao khát Fukami, và chọn Fukami. Cũng vì thế mà tôi cần sự tươi sáng, không chút giả tạo của Nagi."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、日々姫」
1592 = "「Do đó, Hibiki.」"
# monologue
# JP: ようやく日々姫に向き直れる。発情している女にではなく、\n僕の大事な――大事な義妹――右田日々姫に。その人に。
2069 = "Cuối cùng tôi cũng có thể đối diện với Hibiki. Không phải với một người phụ nữ đang phát tình, mà là với cô em gái nuôi quan trọng của tôi――Migita Hibiki. Với chính con người em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「凪の代わりなどではなく。日々姫を――お前を――\n僕の大事な義妹を――僕は、今宵一晩だけ――」
1553 = "「Không phải là người thay thế Nagi. Mà là Hibiki――là em―― cô em gái nuôi quan trọng của anh――Anh, chỉ đêm nay thôi――」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！」
1451 = "「っ!!!」"
# monologue
# JP: 残酷なことを言おうと。最低の行為をしようとしている。\nそれでも日々姫は――瞳を、輝かせてくれる。
2052 = "Tôi sắp nói những lời tàn nhẫn. Sắp làm một hành động tồi tệ nhất. Vậy mà Hibiki――đôi mắt em ấy vẫn sáng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「義妹ではなく、おんなとして。\n妻のある身の一夜限りの――やり捨ての浮気相手として」
1262 = "「Không phải tư cách em gái, mà là một người phụ nữ. Là người tình một đêm――một đối tác ngoại tình chơi xong rồi bỏ của một kẻ đã có vợ.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1484 = "「嗯」" 
# monologue
# JP: 僕の最低な提案に、日々姫は強く頷いてくれる。\nだから勇気を貰えてしまう。最低であれ、最善なのだと。
1985 = "Trước lời đề nghị tồi tệ của tôi, Hibiki mạnh mẽ gật đầu. Nhờ đó mà tôi có được dũng khí. Rằng dù tồi tệ, nhưng đó là cách tốt nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫を抱きたい。\n抱いて鬱屈した性欲を、思いっきりに発散したい」
1567 = "「Anh muốn ôm Hibiki. Muốn ôm em và giải tỏa hết mọi dục vọng đang kìm nén.」"
# 【日々姫】
# display as 日日姬
# JP: 「わたしも、にいにと――同じ、気持ち、と」
1576 = "「Em cũng, có cùng――cảm giác, với anh hai.」"
# monologue
# JP: 平静を装おうとして、できていない。\n体がガタガタ、小刻みに震えてしまってる。
1959 = "Cố tỏ ra bình tĩnh, nhưng không được. Cơ thể em ấy cứ run rẩy từng cơn."
# 【日々姫】
# display as 日日姬
# JP: 「この性欲ば、スッキリさせて――こんなもんか、って、\nきっとあっけなく思って、少しがっかりして、泣いて」
1541 = "「Giải tỏa dục vọng này――rồi chắc chắn sẽ nghĩ, 'Chỉ thế này thôi sao', thấy thật hụt hẫng, hơi thất vọng một chút, rồi khóc.」"
# monologue
# JP: それでも日々姫は、言葉を止めない。\n僕から瞳を、一瞬たりともそらさない。
1911 = "Dù vậy, Hibiki vẫn không ngừng nói. Không hề rời mắt khỏi tôi dù chỉ một khoảnh khắc."
# 【日々姫】
# display as 日日姬
# JP: 「ねむって、起きて――顔ば、洗って。そしたら、わたし。\nにぃに、にぃにの、かわゆか妹に戻る――戻れるけん！」
1275 = "「Ngủ, thức dậy――rửa mặt. Sau đó, em. Sẽ trở lại làm cô em gái đáng yêu của anh hai――sẽ trở lại được mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうしよう。僕もお前を抱いたなら。\n明日の朝には――いつもの頼れるにぃにに戻ろう」
1497 = "「Ừ, cứ làm vậy đi. Nếu anh ôm em. Sáng mai――anh sẽ trở lại làm người anh hai đáng tin cậy như mọi khi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ――あっ！？」
1473 = "「Vâng――A!?」"
# monologue
# JP: 思い切り抱き寄せキスをする。ならば日々姫を狂わせたい。\nなに一つ心残りの無いように、徹底的に満足させたい。
2046 = "Tôi ôm chầm lấy em ấy và hôn. Nếu vậy, tôi muốn làm Hibiki phát điên. Muốn làm em ấy thỏa mãn triệt để, không để lại chút nuối tiếc nào."
# 【日々姫】
# display as 日日姬
# JP: 「ん……ぁ――あっ――ふっ――あっ――ん――\nちゅっ――ちゅむっ――ん……フッ――ふぁっ――あ」
1479 = "「Ưm...... a――a――hư――a――ưm―― Chụt――chùn chụt――ưm...... hư――fua――a」"
# monologue
# JP: 日々姫のすすりまくってた精液が、唾液に舌に溶け残り、\n僕の口内へと流れ込んでくる。
2152 = "Tinh dịch mà Hibiki mút lấy mút để vẫn còn hòa lẫn trên lưỡi và trong nước bọt, chảy ngược vào khoang miệng tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ん――れるっ――れろっ――ちゅむっ――ちゅっ――\nん……ちゅうっ――じゅるっ――（こくっ）――ぷ、あ」
1477 = "「Ưm――rê ru――rê rô――chùn chụt――chụt―― Ưm...... chụt――chùn chụt――（Ực）――pu, a」"
# monologue
# JP: 苦く、鼻まで青臭さがぬけてくるキス。最低のキス。\n日々姫との、ファーストキスで、ラストキス。
2290 = "Một nụ hôn đắng ngắt, mùi tanh xộc thẳng lên mũi. Nụ hôn tồi tệ nhất. Nụ hôn đầu tiên, và cũng là nụ hôn cuối cùng với Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「ぁ……うふふっ――わたし――にぃにと――\nにぃにとキスば――しちゃったと！」
1438 = "「A...... ufufu――em――với anh hai―― đã hôn――anh hai rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1338 = "「っ!」"
# monologue
# JP: なのに、一瞬で甘くなる。\n日々姫が笑顔の花を咲かせた、それだけで――っ！！？
1900 = "Thế nhưng, trong nháy mắt nó lại trở nên ngọt ngào. Chỉ vì Hibiki nở một nụ cười rạng rỡ――っ!!?"
# 【ふかみ】
# display as 深美
# JP: 「ん――ちゅっ――ちゅむっ――ちゅう――れるっ――\nれりゅううっ――じゅるっ――じゅ――ずりゅ――るっ」
1475 = "「Ưm――chụt――chùn chụt――chụt――rê ru―― rê ryu――chùn chụt――chu――zuryu――ru」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――っ――ぁ――はぁっ――んっ」
1423 = "「A――っ――a――hà――ưm」"
# monologue
# JP: その甘さを、ふかみの唾液が一瞬にして熱へと変える。\n僕の弱点を知り尽くしている淫靡なキスで――
2221 = "Sự ngọt ngào đó, bị nước bọt của Fukami biến thành sự nóng bỏng trong tích tắc. Bằng một nụ hôn dâm đãng nắm rõ mọi điểm yếu của tôi――"
# 【ふかみ】
# display as 深美
# JP: 「ちゅむ――れりゅっ――れろおおおっ――ずりゅっ――\nちゅむっ――ちゅっ――ずりゅうううっ――（こくっ）」
1461 = "「Chùn chụt――rê ryu――rê roooo――zuryu―― Chùn chụt――chụt――zuryuuu――（Ực）」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぷぁっ――あっ――はぁっ――はあっ――」
1505 = "「Pua――a――hà――hà――」"
# monologue
# JP: 恋をするなと。錯覚するなと釘をさされる。\nふかみとのキスでバキバキに勃起している、性器をもって。
1936 = "Như một lời cảnh báo rằng đừng yêu. Đừng ảo tưởng. Bằng chính dương vật đang cương cứng ngắc vì nụ hôn với Fukami."
# 【双鉄】
# display as 雙鐵
# JP: 「わかっている。ふかみ。心配するな」
1570 = "「Anh biết rồi. Fukami. Đừng lo.」"
# 【ふかみ】
# display as 深美
# JP: 「はい、です。\n双鉄おにいさん……」
1520 = "「Vâng, ạ. Anh Soutetsu......」"
# monologue
# JP: 布団の上へと寝かせればふかみはするする下着を脱いで、\n日々姫も、ためらって赤面しながらそれに従う。
2073 = "Khi tôi đặt Fukami nằm xuống nệm, em ấy trơn tru cởi đồ lót ra, Hibiki cũng đỏ mặt ngập ngừng làm theo."
# 【双鉄】
# display as 雙鐵
# JP: 「……綺麗だ。そうして」
958 = "「......Đẹp lắm. Hơn nữa.」"
# monologue
# JP: 瞳がどうしても動いてしまう。ふたりを比べて見てしまう。
2060 = "Ánh mắt tôi không thể nào ngừng đảo quanh. Tôi cứ so sánh hai người họ."
# 【双鉄】
# display as 雙鐵
# JP: 「そうして――とても、いやらしい」
1762 = "「Hơn nữa――rất dâm đãng.」"
# 【日々姫】
# display as 日日姬
# JP: 「はうっ」
# 1384 = "「哈嗚」" 
# monologue
# JP: 日々姫にも確かなおっぱいがある。\n小ぶりだが、とても美しいお椀の形の。
2147 = "Hibiki cũng có bộ ngực hẳn hoi. Tuy nhỏ nhắn, nhưng lại có hình bát úp rất đẹp."
# 【ふかみ】
# display as 深美
# JP: 「うふふっ――双鉄おにいさん？\n見ているだけで夜が明けちゃいますよ？」
1395 = "「Ufufu――Anh Soutetsu? Chỉ mải nhìn thôi là trời sáng mất đấy?」"
# monologue
# JP: かわいく僕を誘ってくれるふかみの胸は、僕が吸い、\n弄りまくっているせいだろう。日々姫よりも乳首が目立つ。
1921 = "Bầu ngực của Fukami đang dễ thương mời gọi tôi, chắc do tôi đã mút và nghịch ngợm quá nhiều. Đầu vú của em ấy nổi bật hơn hẳn Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「私っ！　私はもうっ――十分に――すごく……\n濡れて、ますし――準備、できてると思います、から」
1583 = "「Em! Em đã――đủ――rất...... ướt rồi――nên em nghĩ, em đã chuẩn bị xong rồi.」"
# monologue
# JP: 日々姫の緊張を敬語が伝える。年下のふかみと比してなお\nシンプルすぎる縦筋からは、たしかに蜜が溢れているが。
2175 = "Sự căng thẳng của Hibiki thể hiện qua cách nói kính ngữ. So với Fukami nhỏ tuổi hơn, rãnh dọc của em ấy trông quá đỗi ngây thơ, dù đúng là mật ngọt đang tràn ra."
# 【日々姫】
# display as 日日姬
# JP: 「それに、避妊も！　ふかみちゃんと凪ちゃんにＯＫ、\nもらった日からちゃんと――その、稀咲先輩に相談して」
1729 = "「Với lại, chuyện tránh thai nữa! Từ ngày được bé Fukami và bé Nagi đồng ý, em đã đàng hoàng――ưm, bàn bạc với đàn chị Kisaki rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「避妊薬――低容量ピル、日々姫さん、飲んでるんです。\n稀咲さんから、わたしも事情聴取を受けて。知ってます」
1630 = "「Thuốc tránh thai――chị Hibiki đang uống thuốc viên liều thấp ạ. Em cũng được chị Kisaki hỏi han tình hình. Em biết chuyện này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 1659 = "「是嗎」" 
# monologue
# JP: 稀咲も事情を知っている。\nそう聞かされて、強い安堵がわきおこってくる。
2256 = "Kisaki cũng biết chuyện. Nghe vậy, một cảm giác an tâm mạnh mẽ trào dâng trong tôi."
# monologue
# JP: （稀咲が止めず、避妊薬まで手配をしてくれたのならば。\nこれは一つの。正解の内の、きっと一つの道なのだろう）
2448 = "（Nếu Kisaki không ngăn cản, lại còn lo liệu cả thuốc tránh thai cho. Thì đây chắc chắn là một trong những con đường đúng đắn.）"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、生で。ゴムをつけない勃起で僕は――」
1767 = "「Nếu vậy, anh sẽ làm trần. Với dương vật cương cứng không đeo bao, anh sẽ――」"
# 【日々姫】
# display as 日日姬
# JP: 「ふぁっ？！　あっ――あっ――あっ」
1367 = "「Fua?! A――a――a」"
# monologue
# JP: （すりっ――すりゅっ――ちゅくっ――じゅぶっ――）
2440 = "（Cọ cọ――Cọ cọ――Chụt――Nhóp nhép――）"
# monologue
# JP: 綺麗で可憐な縦筋に、試しに勃起を擦り付けたなら、\n日々姫の未使用の膣口は、それでも健気に吸い付いてくる。
2039 = "Thử cọ xát phần cương cứng vào rãnh dọc xinh đẹp và đáng yêu ấy, cửa mình chưa từng được sử dụng của Hibiki vẫn kiên cường bám lấy."
# 【双鉄】
# display as 雙鐵
# JP: 「……日々姫の膣に、子宮に。僕の精子を注ぎ込んでも」
962 = "「......Vào âm đạo, vào tử cung của Hibiki. Dù anh có rót tinh trùng của mình vào.」"
# 【日々姫】
# display as 日日姬
# JP: 「大丈夫！　っていうか絶対！　そうして欲しかと！！\nでなくっちゃ――わたし、一生――永遠に後悔するけん」
1687 = "「Không sao! Mà phải nói là tuyệt đối! Em muốn anh làm thế!! Nếu không――em sẽ hối hận cả đời――mãi mãi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうするさ。僕とてこれほど強烈に、日々姫の膣に\n射精したいと、体でもこころでも望んでいるゆえ」
1572 = "「Anh sẽ làm thế. Bởi vì cả cơ thể và trái tim anh cũng đang khao khát mãnh liệt được xuất tinh vào trong âm đạo của Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！！」
1450 = "「A!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だ、が。だっ」
1271 = "「Nhưng, mà.」"
# monologue
# JP: （くちいっ）
2403 = "（Phập）"
# 【ふかみ】
# display as 深美
# JP: 「んっ！！！！！」
1495 = "「Ưm!!!!!」"
# monologue
# JP: ふかみの膣口に軽く亀頭を差し込んでみる。\n前戯もなしに潤いまくる膣道が、中へと僕を誘ってくる。
2075 = "Tôi thử nhẹ nhàng đưa quy đầu vào cửa mình của Fukami. Âm đạo ướt đẫm dù chưa dạo đầu đang mời gọi tôi tiến vào trong."
# 【双鉄】
# display as 雙鐵
# JP: 「最初は僕たちのセックスを、お手本として見てほしい。\nできればその間、自分で準備も整えて」
1259 = "「Đầu tiên, anh muốn em xem bọn anh làm tình để làm mẫu. Nếu được, trong lúc đó hãy tự chuẩn bị sẵn sàng đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――あ……あっ――（ごくっ）――うんっ」
1428 = "「A――a...... a――（Ực）――vâng.」"
# monologue
# JP: こんな時でも、日々姫は素直だ。\n自分の小さなおまんこに、すぐ指先を伸ばし始める。
1953 = "Ngay cả lúc này, Hibiki vẫn rất ngoan ngoãn. Lập tức vươn ngón tay chạm vào cái bướm nhỏ xinh của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ」
1702 = "「Fukami」"
# 【ふかみ】
# display as 深美
# JP: 「はい。いっつもみたいに、たくさん愛してくださいね？\nわたしの、双鉄おにいさん」
1482 = "「Vâng. Hãy yêu thương em thật nhiều như mọi khi nhé? Anh Soutetsu của em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1484 = "「嗯」" 
# monologue
# JP: （ずっ――ぶっ――じゅっ――ずっ――）
2453 = "（Phập――Phập――Nhóp nhép――Phập――）"
# 【ふかみ】
# display as 深美
# JP: 「はっ――あっ――んっ――ね？　見え、ます？\n日々姫さん――わたしっ――わたしの、おまんこ、に」
1377 = "「Hà――a――ưm――Này? Chị thấy, không? Chị Hibiki――em――vào bướm, của em.」"
# 【日々姫】
# display as 日日姬
# JP: 「はあっ――はあっ――はあっ――はあっ――」
1740 = "「Hà――hà――hà――hà――」"
# 【ふかみ】
# display as 深美
# JP: 「おちんちん――ね？　簡単に――入っちゃうんですっ\n――だれ、でも――みんな――こういう――ふう、にっ」
1530 = "「Chim――nhỉ? Rất dễ dàng――đi vào trong ――bất cứ ai, cũng――mọi người――đều như, thế này.」"
# monologue
# JP: （ずっ――じゅっ――ぐううううっ――こちゅんっ！）
2452 = "（Phập――Nhóp nhép――Guuuu――Cộc!）"
# 【ふかみ】
# display as 深美
# JP: 「んきゅっ！！！！」
1488 = "「Nkyu!!!!」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！？」
1390 = "「!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いま、僕の亀頭は、ふかみの膣の最奥、にっ――っ――\n子宮口に、あたって――っ！！！？」
1305 = "「Bây giờ, quy đầu của anh, đang chạm vào nơi sâu nhất trong âm đạo của Fukami―― chạm vào, cổ tử cung――!!!?」"
# monologue
# JP: （くちゅっ――つぷっ――ちゅすっ――ぬちっ――）
2406 = "（Nhóp nhép――Tsupu――Chusu――Nhóp nhép――）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1448 = "「啊！」" 
# monologue
# JP: 日々姫から慌てて目を逸す。日々姫は自慰を始めてる。\n僕とふかみのセックスを見て、性器にそっと指を這わせて。
2159 = "Tôi vội vã quay mặt đi khỏi Hibiki. Em ấy đang bắt đầu tự sướng. Nhìn tôi và Fukami làm tình, rồi nhẹ nhàng đưa ngón tay vuốt ve vùng kín."
# monologue
# JP: （ずりゅううううううううううっっっっ！！！！！！）
2467 = "（Trơn tuột!!!!!!）"
# 【ふかみ】
# display as 深美
# JP: 「ひゃうっ！？　そんな、急、にっ――んくっ！！？」
1331 = "「Hyau!? Sao lại, đột ngột, thế――nku!!?」"
# monologue
# JP: （ずぶうううううううううっっっっっっ！　ごちゅっ！）
2459 = "（Phập! Cộc!）"
# 【ふかみ】
# display as 深美
# JP: 「やっ！？　激しっ――ですっ――ふあっ！　あっ！」
1334 = "「Á!? Mãnh liệt――quá――fua! A!」"
# monologue
# JP: （じゅっ！　ごちゅっ！　ずりゅっ！　ぶちゅっ！！）
2422 = "（Phập! Cộc! Trơn tuột! Nhóp nhép!!）"
# monologue
# JP: だから、ふかみだけを見つめる。ふかみの体に、ふかみの\n膣に、僕の全てを、思いっきりにぶつけ、預ける。
2086 = "Thế nên, tôi chỉ nhìn chằm chằm vào Fukami. Vào cơ thể Fukami, vào âm đạo của Fukami, tôi dồn hết sức lực và gửi gắm tất cả những gì mình có."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ――ふかみっ――ふかみっ！　ふかみっ！！！」
1696 = "「Fukami――Fukami――Fukami! Fukami!!!」"
# monologue
# JP: （じゅっ！　ばちゅっ！　ずゆっ！　ごちゅっ！！）
2423 = "（Phập! Bạch! Trơn tuột! Cộc!!）"
# 【ふかみ】
# display as 深美
# JP: 「はいっ。へいき、ですっ――んっ！　あ、ふあっ！\nあ――わたし――わかって――わかって、ます、から」
1499 = "「Vâng. Không sao, đâu――ưm! A, fua! A――em――hiểu――em hiểu, mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！」
1453 = "「っ!!!!!」"
# monologue
# JP: （ずびゅっ！　ばちゅっ！　ずりゅっ！　どちゅっ！！）
2455 = "（Phập! Bạch! Trơn tuột! Cộc!!）"
# monologue
# JP: 膣がきゅんきゅんわななく、離すまいとしてしがみつく。\n小さな胸が突く度震え、視覚でも僕を釘づけてくれる。
1966 = "Âm đạo co thắt từng cơn, bám chặt lấy như không muốn buông rời. Bộ ngực nhỏ nhắn rung lên sau mỗi cú thúc, thu hút hoàn toàn ánh nhìn của tôi."
# monologue
# JP: （ずりゅっ！　じゅぶっ！　ずゆっ！　ごちゅん！！）
2462 = "（Trơn tuột! Phập! Trơn tuột! Cộc!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「はぁっ！　はぁっ！　はあっ！　はぁっ！！！！」
1742 = "「Hà! Hà! Hà! Hà!!!!」"
# monologue
# JP: 言葉のとおり、ふかみは“わかって”くれている。\n僕のぐちゃぐちゃなこの感情を、恐らく、僕より明確に。
2207 = "Đúng như lời nói, Fukami đang 'hiểu' tôi. Thấu hiểu mớ cảm xúc hỗn độn này, có lẽ còn rõ ràng hơn cả chính tôi."
# 【ふかみ】
# display as 深美
# JP: 「んっ――はっ――あっ！　ねっ！　おねがいっ――\nノックっ――んっ！　おくっ――小刻みに――ぁっっ！」
1472 = "「Ưm――hà――a! Này! Xin anh―― gõ vào――ưm! Bên trong――từng nhịp ngắn――a!」"
# monologue
# JP: （ずっ！　こちゅっ！　ずっ！　こ！　りゅ！　こっ！）
2469 = "（Phập! Cộc! Phập! Cộc! Trơn tuột! Cộc!）"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　あっ！　これっ！　しゅきっ――ん！！\nきもちいっ――きもちっ――気持ちいいっ！　よぉ！」
1363 = "「Fua! A! Thế này! Thích quá――ưm!! Sướng quá――sướng――sướng quá! Anh ơi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「～～～っ！！！」
1343 = "「~~~っ!!!」"
# monologue
# JP: 亀頭にぴたり吸い付いてくる子宮口を剥がしてはまた\n吸付けて。繰り返す度快感の波は大きくなって――っ！
2316 = "Dứt quy đầu ra khỏi cổ tử cung đang bám chặt lấy rồi lại để nó mút vào. Mỗi lần lặp lại, những làn sóng khoái cảm lại càng lớn hơn――!"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみっ――ふかみっ！！！」
1697 = "「Fukami――Fukami!!!」"
# 【ふかみ】
# display as 深美
# JP: 「はいっ！　わたしもっ――で、すっ――んうっ！！\nだから――そう、てつっ――おにい、さんっ！！！」
1493 = "「Vâng! Em cũng――sắp, rồi――ưm!! Cho nên――Sou, tetsu――anh, ơi!!!」"
# monologue
# JP: （ずりゅうううううっっっっっっっっ！！！！）
2468 = "（Trơn tuộtttttttt!!!!）"
# 【ふかみ】
# display as 深美
# JP: 「ふぁふゅぅぅぅぅぅぅぅぅぅぅぅぅぅっんんっ！！」
1358 = "「Fuafyuuuuuuuuuuuuuuuưm!!」"
# monologue
# JP: （ずぶううっ！　ごちゅっ！　ずりゅっ！　ばちゅっ！）
2458 = "（Phập! Cộc! Trơn tuột! Bạch!）"
# 【ふかみ】
# display as 深美
# JP: 「ふあっ！　あっ！　あ！　あ！！！\nいくっ――いくっ！　いくっ！　いくっ！！！！」
1360 = "「Fua! A! A! A!!! Ra mất――ra mất! Em ra mất! Em ra mất!!!!」"
# monologue
# JP: （ぱんっ！　ぱんっ！　ぱんっ！　ぱんっ！！！）
2418 = "（Bạch! Bạch! Bạch! Bạch!!!）"
# monologue
# JP: 体全部をバネにして、ひたすら腰を打ち付け離す。\n汗と愛液がどろどろ混じり、いつもより甘い匂いを放つ。
2031 = "Biến toàn thân thành lò xo, tôi liên tục dập hông rồi lùi lại. Mồ hôi và dâm thủy nhớp nháp hòa quyện, tỏa ra mùi hương ngọt ngào hơn thường lệ."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ――もう少しっ――もう少し、だけっ――\nっ！！　僕もっ――僕もっ――もうすぐ、だからっ――」
1700 = "「Fukami――một chút nữa thôi――chỉ một chút, nữa thôi―― !! Anh cũng――anh cũng――sắp ra, rồi――」"
# 【ふかみ】
# display as 深美
# JP: 「ひうっ！？　ふあっ！　あっ！　けど――けど――けどっ\nけどっ――けどおおっ！　わらひっ！　わらひいっ！！」
1466 = "「Hiu!? Fua! A! Nhưng――nhưng――nhưng Nhưng――nhưng mà! E-Em! E-Emmmm!!」"
# monologue
# JP: （きゅううううううううううううううっっっっ！！！）
2442 = "（Siết chặttttttttttt!!!）"
# 【ふかみ】
# display as 深美
# JP: 「ふぁぁぁぁぁぁぁぁぁぁぁぁぁっぁあっぁぁぁんっ！」
1357 = "「Fuaaaaaaaaaaaaaaaaaaaaaaan!」"
# 【双鉄】
# display as 雙鐵
# JP: 「んくっ！！！！！」
1489 = "「Nku!!!!!」"
# monologue
# JP: 絶頂したのか握りしめにくる膣道を、\nみちみちと剥がすようにして引き下がりっ――――！！
2044 = "Âm đạo co thắt lại vì đạt cực khoái, tôi lùi lại, kéo tuột ra khỏi vách thịt đang bám dính lấy mình――――!!"
# monologue
# JP: （ずぶうううううううううっっっっ――ぶ　ちゅん！！）
2457 = "（Phập――――bạch!!）"
# 【ふかみ】
# display as 深美
# JP: 「～～～～～～～っ！！！！」
1410 = "「~~~~~~~っ!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！！！」
1373 = "「Kua!!!!!」"
# monologue
# JP: （びゅぶっ！　ぶっ！　びゅるっ！　どびゅっ！！！）
2412 = "（Phụt! Phụt! Phụt! Phụtttt!!!）"
# 【ふかみ】
# display as 深美
# JP: 「ぁ――ぁっ――あっ――か――はっ――あっ！」
1419 = "「A――a――a――ka――hà――a!」"
# monologue
# JP: （びゅるぶっ！　ぶっ！　びゅぶっ！　どびゅっ！！）
2413 = "（Phụt! Phụt! Phụt! Phụtttt!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「はぁっ！　はあっ！　はあっ！　はあっ！」
1743 = "「Hà! Hà! Hà! Hà!」"
# monologue
# JP: 精液どころか、汗までべっとり粘ついている。\nどんなわずかな部位だとて、より密に接触したがっている。
1884 = "Đâu chỉ tinh dịch, cả mồ hôi cũng nhớp nháp dính chặt lấy nhau. Dù là bộ phận nhỏ nhất cũng khao khát được tiếp xúc gần gũi hơn."
# monologue
# JP: （びゅ――ぶびゅっ――びゅっ――ぷりゅっ――）
2408 = "（Phụt――Phụt――Phụt――Pẹt――）"
# 【日々姫】
# display as 日日姬
# JP: 「～～～～～～～～～～～っ！！！」
1413 = "「~~~~~~~~~~~っ!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1455 = "「っ!!?」"
# monologue
# JP: 押し殺した声。同時に濃くなるあまぁい匂い。\n慌てて見れば日々姫は――日々姫は――――
2070 = "Tiếng kêu bị kìm nén. Cùng lúc đó, mùi hương ngọt ngào nồng đậm hơn. Tôi vội vàng nhìn sang thì thấy Hibiki――Hibiki――――"
# 【日々姫】
# display as 日日姬
# JP: 「っ――っ――～～～っ！　――ぁ――はぁっ、はぁっ」
933 = "「っ――っ――~~~っ! ――A――hà, hà」"
# monologue
# JP: ピンと力みまくってた体が一気に脱力する。\n日々姫の小さなおまんこは、ぐちゃぐちゃに濡れ乱れ。
2195 = "Cơ thể căng cứng nãy giờ bỗng chốc rã rời. Cái bướm nhỏ xinh của Hibiki ướt đẫm nhầy nhụa."
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさん。いまなら。力、入らないときの方が」
1780 = "「Anh Soutetsu. Ngay bây giờ. Những lúc không dùng sức được thì tốt hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1451 = "「啊！！！」" 
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ！？　まってっ！？　にぃに！\n私、いまっ――いま――そのっ――あの――おまん、こ」
1336 = "「Hya!? Đợi đã!? Anh hai! Em, bây giờ――bây giờ――chuyện đó――cái đó――bướm」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっている。だから。だ」
1569 = "「Anh biết. Vì thế. Nên mới làm.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！」
# 1401 = "「唔！！！」" 
# monologue
# JP: 今度は、日々姫を。日々姫だけを。\nふかみの言葉が、背中を押してくれたのだから。
2300 = "Lần này là Hibiki. Chỉ mình Hibiki thôi. Bởi vì những lời của Fukami đã tiếp thêm động lực cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。優しくする。\n僕が、日々姫をリードする」
1303 = "「Không sao đâu. Anh sẽ làm thật nhẹ nhàng. Anh sẽ dẫn dắt Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「――うんっ！！！！」
935 = "「――Vâng!!!!」"
# monologue
# JP: きゅううううううっと、胸が締め付けられる。\nこころも体も全部がほとんど泣きそうになり、我慢する。
2284 = "Ngực tôi thắt lại. Cả thể xác lẫn tâm hồn đều chực trào nước mắt, nhưng tôi cố kìm nén."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
# 1628 = "「日日姬」" 
# monologue
# JP: 名を呼ぶ。大事な義妹の名を。\n世界にふたりしかいない。僕の。大切な。いもうとの名を。
2038 = "Tôi gọi tên. Tên cô em gái nuôi quan trọng. Chỉ có hai người trên thế giới này. Tên cô em gái. Quan trọng. Của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――あのね？　私――にぃにが――\nにぃにが――好き、なの」
1774 = "「Anh hai――anh biết không? Em――em―― Thích――anh hai lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕も――」
1498 = "「Ừ, anh cũng――」"
# monologue
# JP: 日々姫の好きと、僕の好きとの意味が違うと知っている。\n知っているから――この一言しか、口にできない。
2056 = "Tôi biết chữ 'thích' của Hibiki khác với chữ 'thích' của tôi. Vì biết――nên tôi chỉ có thể nói được câu này."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も、日々姫が、大好きだ」
1555 = "「Anh cũng, rất thích Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！！！！！！！！！」
1454 = "「っ!!!!!!!!!!!」"
# monologue
# JP: 泣かないでくれと願ってしまう。\nだから、だろうか――日々姫は、日々姫は。笑ってくれる。
2081 = "Tôi thầm cầu xin em đừng khóc. Có lẽ vì thế chăng――Hibiki, Hibiki. Em ấy mỉm cười với tôi."
# 【日々姫】
# display as 日日姬
# JP: 「――ありがと、にぃに」
937 = "「――Cảm ơn, anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！　～～～っ――。いくぞ、日々姫」
1339 = "「っ!! ~~~っ――. Bắt đầu nhé, Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。えと――お願い、しま――っ！！！！！！」
1481 = "「Vâng. Ừm――xin anh, hãy――っ!!!!!!」"
# monologue
# JP: （ずっ――くっ）
2451 = "（Phập――Ư）"
# 【日々姫】
# display as 日日姬
# JP: 「はうっ！　あっ！　はぁっ――はあっ！！！！」
1385 = "「Hau! A! Hà――hà!!!!」"
# monologue
# JP: 最初からあれだけ濡れていて。オナニーまでもしてくれて。\nそれでも日々姫の膣口は、凪よりさらに、ずうっと狭い。
2201 = "Ngay từ đầu đã ướt đẫm như thế. Lại còn tự sướng nữa. Vậy mà cửa mình của Hibiki vẫn chật hơn Nagi rất nhiều."
# monologue
# JP: （これが――処女というものか）
2484 = "（Đây là――trinh nữ sao）"
# monologue
# JP: 凪のときは、ふかみのときは、僕も混乱の中だった。\nその経験が、ふかみが、凪が、僕の手を引き導いてくれる。
1929 = "Lúc làm với Nagi, với Fukami, tôi cũng đang trong tình trạng bối rối. Kinh nghiệm đó, Fukami, và Nagi, đang nắm tay dẫn dắt tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「痛いよな。日々姫。だから、ゆっくり。\n馴染むまで、ゆっくりゆっくり呼吸するんだ」
1650 = "「Đau lắm đúng không. Hibiki. Vì vậy, từ từ thôi. Cho đến khi quen, hãy hít thở thật chậm rãi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、にぃに――んっ――すーーーーっ、\nはーーーーっ、すーーーーーーっ、はーーーーーーーっ」
1501 = "「Vâng, anh hai――ưm――hít――, thở――, hít――, thở――」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！」
1341 = "「っ!!!!!」"
# monologue
# JP: 亀頭の先端。半分ほどしか埋まっていない。\nけれども日々姫の膣口は、快感を僕に流し込んでくる。
2317 = "Đầu quy đầu. Mới chỉ chôn vào được một nửa. Thế nhưng cửa mình của Hibiki đã truyền khoái cảm vào người tôi."
# monologue
# JP: （これ――は――これが、体の相性というものなのか）
2483 = "（Cái――này――đây là, sự hòa hợp về thể xác sao）"
# monologue
# JP: 義理の家族で、同じ物を食べ、同じ空間で生活し、\nおんなじものを見て笑い、おんなじような失敗をして――
2033 = "Là gia đình nuôi, cùng ăn một món, sống trong cùng một không gian, cùng nhìn một thứ rồi cười, cùng mắc những sai lầm giống nhau――"
# 【日々姫】
# display as 日日姬
# JP: 「すーーーっ、はーーーーっ、すーーーー、はーーーっ」
1503 = "「Hít――, thở――, hít――, thở――」"
# monologue
# JP: 積み重ねてきた全ての時間を、僕の勃起は台無しにする。\nゼロから再びきょうだいに、このセックスで、僕らは戻る。
2064 = "Sự cương cứng của tôi phá hỏng toàn bộ thời gian mà chúng tôi đã tích lũy. Bắt đầu lại từ con số không, qua lần làm tình này, chúng tôi sẽ trở lại làm anh em."
# monologue
# JP: （ぐっ――ずっ――ぶっ――っぐっ――）
2404 = "（Gu――Phập――Bạch――Gu――）"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！？　ぁっ――んっ――（ごくっ）――\nぁっ――！　――すーー、はーー、すーー、はーーー」
1408 = "「っ!!? A――ưm――（Ực）―― A――! ――Hít, thở, hít, thở――」"
# monologue
# JP: 日々姫は真面目だ。日々姫は律儀だ。日々姫は可愛い。\nそんなあたりまえのことの全てを、知っているから――
2143 = "Hibiki rất nghiêm túc. Hibiki rất quy củ. Hibiki rất đáng yêu. Vì tôi biết tất cả những điều hiển nhiên đó――"
# monologue
# JP: （ずっ――ぷつっ！！！！）
2454 = "（Phập――Bụp!!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ああっ！！！！」
1447 = "「A!!!!」"
# 【ふかみ】
# display as 深美
# JP: 「っ！！」
1400 = "「っ!!」"
# monologue
# JP: 糸を切る、貼り付いてたものを破る感覚。
1988 = "Cảm giác như cắt đứt một sợi chỉ, xé rách thứ gì đó đang dính chặt."
# 【双鉄】
# display as 雙鐵
# JP: 「わかるか、日々姫」
1732 = "「Em hiểu không, Hibiki.」"
# monologue
# JP: 感情がぐちゃぐちゃすぎて、肉の快感が強すぎて。\nいますぐにでも腰を思い切りふりたくて――
2029 = "Cảm xúc quá đỗi hỗn độn, khoái cảm thể xác quá mãnh liệt. Đến mức tôi muốn điên cuồng dập hông ngay lập tức――"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が、お前の処女を奪った。僕が、お前を女にした」
1562 = "「Anh đã cướp đi trinh tiết của em. Anh đã biến em thành đàn bà.」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん――まだ――です。まだ――です、にい、さん」
1261 = "「Không――vẫn chưa――đâu. Vẫn chưa――đâu, anh, trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
# 1452 = "「啊！！！！」" 
# monologue
# JP: 敬語だ。それほど痛むのか――罪悪感さえ、けれども膣の\n必死にあえぐ収縮が、すぐ融かし、肉の快感にしてしまう。
1962 = "Kính ngữ sao. Đau đến mức đó ư――Ngay cả cảm giác tội lỗi, cũng bị sự co thắt như đang tuyệt vọng thở dốc của âm đạo làm tan chảy, biến thành khoái cảm thể xác."
# 【日々姫】
# display as 日日姬
# JP: 「だって――私、まだ――んっ――おまんこ、に――\n子宮に、にぃにの――精子、もらって――ない、もん」
1507 = "「Bởi vì――em, vẫn chưa――ưm――vào bướm―― vào tử cung, nhận được――tinh trùng, của anh hai――mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！！！」
1647 = "「Hibiki!!!」"
# monologue
# JP: （ぎゅうううううううううううっっ！　ごちゅっ！！！）
2473 = "（Phập! Cộc!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「痛っ――ぐっ～～～～～～～っ！！！！！！」
1518 = "「Đau――gu~~~~~~~っ!!!!!!」"
# monologue
# JP: （ずっ！　こ！　じゅっ！　こっ！　りゅ！　こっ！）
2470 = "（Phập! Cộc! Nhóp nhép! Cộc! Trơn tuột! Cộc!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ――あっつ――あっ――んっ――んっ――」
1321 = "「Hya――nóng――a――ưm――ưm――」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1409 = "「っ!?」"
# monologue
# JP: ふかみの指が、僕らの繋がる部分に伸びかけ、惑ってる。\n日々姫の苦痛を、恐らく少しでもやわらげようと――
2163 = "Ngón tay Fukami vươn tới phần kết nối của chúng tôi, rồi lại ngập ngừng. Có lẽ em ấy muốn xoa dịu nỗi đau của Hibiki dù chỉ một chút――"
# 【双鉄】
# display as 雙鐵
# JP: 「平気。平気だ。僕を信じろ」
1685 = "「Không sao. Không sao đâu. Hãy tin anh.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　うんっ！！！！」
1491 = "「Vâng! Vâng!!!!」"
# monologue
# JP: だからふかみに日々姫に同時に呼びかける。\nそれでふかみは――――わかってくれる。
2089 = "Thế nên tôi gọi cả Fukami và Hibiki cùng lúc. Và rồi Fukami――――đã hiểu ý tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「なにひとつ悔いの残らんように。今このときは――\n僕の全てを、日々姫に、お前に、注ぎ込むゆえ」
1267 = "「Để không để lại chút hối tiếc nào. Ngay lúc này đây―― Anh sẽ rót tất cả những gì của mình vào Hibiki, vào em.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！！！」
# 1494 = "「嗯！！！」" 
# monologue
# JP: 日々姫がやわらぐ。ガチガチのキツキツだった膣内が、\nぬめりとゆるみを得ると同時に、あたたかになる。
2165 = "Hibiki dần thả lỏng. Bên trong âm đạo vốn chật chội và cứng đờ, bắt đầu trở nên trơn ướt, nới lỏng ra và ấm dần lên."
# 【双鉄】
# display as 雙鐵
# JP: 「少し、大きく動かすぞ」
1580 = "「Anh sẽ cử động mạnh hơn một chút nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
1490 = "「Vâng!」"
# monologue
# JP: （ずりゅううっ！　ぐりゅっ！　じゅりゅ――くりゅ！）
2461 = "（Trơn tuột! Guryu! Juryu――Kuryu!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃぅっ！！？　あっ――あっ――わた、しっ――」
1330 = "「Hyau!!? A――a――em, em――」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1484 = "「嗯」" 
# monologue
# JP: 感じていると、膣が雄弁に語ってくれてる。\n僕の精子を欲しがって、べたべた甘えてきてくれている。
2186 = "Âm đạo của em ấy đang lên tiếng thay cho những cảm nhận mãnh liệt. Đang khao khát tinh trùng của tôi, đang quấn quýt làm nũng với tôi."
# monologue
# JP: （ずりゅっ！　ぶちゅ！　ずちゅううっ！　ごちゅっ！）
2464 = "（Trơn tuột! Phập! Trơn tuột! Cộc!）"
# 【日々姫】
# display as 日日姬
# JP: 「ふあ！？　あっ――わかる――わかるっ――にぃに、\nにぃにの――おちんちんの、かたちっ――んうっ！！」
1365 = "「Fua!? A――em cảm nhận được――cảm nhận được――anh hai, hình dáng――chim của――anh hai――ưm!!」"
# monologue
# JP: （ずびゅっ！　ばちゅっ！！　ずりゅっ！　ごちゅっ！）
2456 = "（Phập! Bạch!! Trơn tuột! Cộc!）"
# 【日々姫】
# display as 日日姬
# JP: 「覚え、て、いってるっ――わたしの、おまんこ――\nにぃにの――かたちっ――おっきさ――あつ、さっ！！」
1573 = "「Nó đang, nhớ lấy――bướm, của em―― hình dáng――kích cỡ――độ nóng――của anh hai!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っっ！！」
# 1400 = "「唔！！」" 
# monologue
# JP: 実際、膣はうねりまくってる。僕の形を覚えよう――いや、\n僕の勃起に合わせた形にフィットしようとするように。
1967 = "Thực tế, âm đạo của em ấy đang co thắt liên tục. Như thể đang ghi nhớ hình dáng của tôi――không, như thể đang cố gắng điều chỉnh để vừa khít với sự cương cứng của tôi."
# monologue
# JP: （ずりうゅっ！　ぶちゅっ！　ずみゅっ！　ばちゅっ！）
2465 = "（Trơn tuột! Phập! Trơn tuột! Bạch!）"
# 【日々姫】
# display as 日日姬
# JP: 「嬉しいっ！　嬉しいっ！　うれしいっ！　うれしい！\nわた、しっ！　にぃにと――セックス――して、るっ！」
1564 = "「Vui quá! Vui quá! Vui quá! Vui quá! Em! Đang――làm tình――với anh hai!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ！」
# 1490 = "「嗯！」" 
# monologue
# JP: （ずりゅっ！　ぶちゅん！　じゅぶっ！　ぱちゅんっ！）
2463 = "（Trơn tuột! Phập! Nhóp nhép! Bạch!）"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにの、亀頭っ――おちんちんの、先っ――っ！\nわたしのっ――子宮、にっ――キス、して、くれてっ」
1777 = "「Quy đầu của, anh hai――phần đầu của, chim――! Đang――hôn vào――tử cung, của em――」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、のっ――子宮口も、だっ――僕の亀頭に――\nくいつく――ように――熱心な、キスを――繰り返、し」
1627 = "「Cổ tử cung――của Hibiki, cũng vậy――cứ như đang―― bám chặt lấy――quy đầu của anh――liên tục――hôn, say đắm」"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっうっ」
1327 = "「Hyau」"
# monologue
# JP: （きゅううううううううううっっ！）
2444 = "（Co thắtttttttttt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！！！」
1369 = "「Kuha!!!」"
# monologue
# JP: 日々姫の膣のわななきに連れ、快感も膨れ上がってく。\n三発目とは思えぬほどの塊が、タマの底から湧き上がる。
1945 = "Cùng với sự run rẩy trong âm đạo của Hibiki, khoái cảm cũng ngày một dâng trào. Một lượng tinh dịch khổng lồ không thể tin được dù là lần thứ ba, đang trào dâng từ tận đáy tinh hoàn."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　にぃに！　にぃに！　にぃにぃ！！！」
1779 = "「Anh hai! Anh hai! Anh hai! Anh hai!!!」"
# monologue
# JP: （じゅばっ！　ぶちゅっ！　ずりゅっ！　ごちゅっ！！）
2419 = "（Phập! Phập! Trơn tuột! Cộc!!）"
# monologue
# JP: 日々姫の匂いが、甘い匂いが僕の全身に溶けていく。\nセックスしてる。僕は日々姫と――セックスしてる。
2189 = "Mùi hương của Hibiki, mùi hương ngọt ngào đang hòa tan vào toàn thân tôi. Đang làm tình. Tôi đang làm tình――với Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！　日々姫っ！！」
1646 = "「Hibiki! Hibiki!!」"
# monologue
# JP: （ばっ！　ごっ！　じゅ！　ぎゅ！　ぶっ！　こちゅ！）
2417 = "（Bạch! Cộc! Phập! Siết! Phập! Cộc!）"
# 【日々姫】
# display as 日日姬
# JP: 「ふやぁぁぁぁああああっ！」
1359 = "「Fuyaaaaaaaa!」"
# monologue
# JP: 加速する。こころが体が精液が、\n終わらせたくないこの時を、終わらせるために加速する。
2061 = "Tăng tốc. Trái tim, cơ thể và tinh dịch, đang tăng tốc để kết thúc khoảnh khắc mà tôi không hề muốn kết thúc này."
# monologue
# JP: （ずっ！　ばっ！　ぶっ！　ごっ！　ぢゅっ！　ぎゅ！）
2471 = "（Phập! Bạch! Phập! Cộc! Phập! Siết!）"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！　日々姫っ！　日々姫っ！」
1645 = "「Hibiki! Hibiki! Hibiki!」"
# 【日々姫】
# display as 日日姬
# JP: 「ふぁっ――あっ――んきゅっ！　うっ！　にぃに！\nまっ！　って――わらっ――わた、しっ――もうっ！」
1356 = "「Fua――a――nkyu! Ư! Anh hai! Đợi! Đã――em――em, em――sắp!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っっ！！！！！！」
# 1404 = "「唔！！！！！！」" 
# monologue
# JP: 待ってやりたい。けれど待てない。\nなぜなら僕は、ふかみを――凪を――待たせてるから！
2308 = "Tôi muốn đợi em ấy. Nhưng không thể đợi được. Bởi vì tôi đang để Fukami――để Nagi――phải chờ đợi!"
# monologue
# JP: （ずりゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅっっ！！！）
2466 = "（Trơn tuộttttttttttttttt!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！！！！！！」
1648 = "「Hibiki!!!!!!」"
# monologue
# JP: （ぶぢゅうううううううううっっっっ！　ごちゅっ！！）
2425 = "（Phập!!!!!!!! Cộc!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅ～～～んっ！」
1328 = "「Hyauuuuuuuuuuuuuuuu~~~n!」"
# monologue
# JP: （ぎゅうううううううううっっっ！）
2443 = "（Co thắttttttttt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
1372 = "「Kua!!!」"
# monologue
# JP: （ぶびゅっ！　どびゅっ！　ぶりゅっ！　びゅぶるっ！）
2424 = "（Phụt! Phụt! Phụt! Phụtttt!）"
# 【日々姫】
# display as 日日姬
# JP: 「～～～～～～～～っ！！！」
1411 = "「~~~~~~~~っ!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぁっ――あっ――あっ――あ――！」
1353 = "「Fua――a――a――a――!」"
# monologue
# JP: （びゅぶっ！　ぶっ！　びゅるっ！　びゅううっ！）
2411 = "（Phụt! Phụt! Phụt! Phụtttt!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ――あっ――あっ――んっ――（ゴクッ）――\nあっ――せいえき――あつい、の――にぃにの、精、液」
1319 = "「Hya――a――a――ưm――（Ực）―― A――tinh dịch――nóng, quá――Tinh, dịch, của anh hai」"
# monologue
# JP: （ぶっ！　びゅるっ！　びゅううっ！　びゅっつ！！）
2427 = "（Phụt! Phụt! Phụt! Phụtttt!!）"
# 【日々姫】
# display as 日日姬
# JP: 「きてるっ――染めてるっ――にぃに、にぃにが――\nわたしの、おまんこ――子宮――ぜんぶ、をっ――」
1776 = "「Đang vào――đang nhuốm đầy――anh hai, anh hai đang―― bướm của em――tử cung――tất cả mọi thứ――」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1448 = "「啊！」" 
# monologue
# JP: （びゅっ！　びゅるっ――びゅっ――ぷ――――ぴ）
2415 = "（Phụt! Phụt――Phụt――Pẹt――――Pi）"
# 【双鉄】
# display as 雙鐵
# JP: 「はあっ――はあっ――はあっ――はあっ――」
# 1740 = "「蛤啊——蛤啊——蛤啊——蛤啊——」" 
# monologue
# JP: 射精を終えればどっぷりと、ベタつくほどの疲労とそして、\n罪悪感とが僕の頭から
1983 = "Sau khi xuất tinh, một sự mệt mỏi rã rời, nhớp nháp cùng với cảm giác tội lỗi trào dâng trong tâm trí tôi."
# 【日々姫】
# display as 日日姬
# JP: 「にぃ、に――射精……おわっちゃった、と？」
1771 = "「Anh, hai――xuất tinh...... xong rồi, sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ」
1502 = "「Hử? Ừ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そか。ざぁんねん。そしたら終わりかー。\nね、にぃに。これ、抜いて？　おちんちん」
1660 = "「Vậy sao. Tiếc quá nhỉ. Vậy là kết thúc rồi ha. Nè, anh hai. Rút nó ra đi? Chim ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1484 = "「嗯」" 
# monologue
# JP: 泣きそうになる。『それをとって』と『わかった』と。\n普段の、僕らの、きょうだいの会話の温度。
2041 = "Tôi suýt khóc. Giống như 'Lấy giùm anh cái đó' và 'Vâng'. Đó là nhiệt độ trong những cuộc trò chuyện bình thường của anh em chúng tôi."
# 【日々姫】
# display as 日日姬
# JP: 「んーーーーー！　すっきりしたとー！！！」
1467 = "「Ưm~~~~~ ! Thỏa mãn quá đi!!!」"
# monologue
# JP: 立ち上がり。日々姫が大きく伸びをする。\n裸の胸を隠そうともせず、目のフチに涙を光らせて。
2193 = "Đứng dậy. Hibiki vươn vai một cái thật lớn. Không hề che đậy bộ ngực trần, khóe mắt em ấy ngấn lệ."
# 【日々姫】
# display as 日日姬
# JP: 「それじゃ、私、先にシャワーば浴びて、\n私のお部屋で、ひとりで寝るけんっ！！」
1769 = "「Vậy thì, em đi tắm trước đây, rồi sẽ về phòng ngủ một mình!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
934 = "「――Ừ.」"
# monologue
# JP: 日々姫は強い。そして賢く健気で、僕を大事にしてくれる。\nゆえに、約束を守ってくれる。必ず、日々姫は、約束を。
2154 = "Hibiki rất mạnh mẽ. Lại thông minh, dũng cảm và luôn trân trọng tôi. Vì thế, em ấy sẽ giữ lời hứa. Chắc chắn, Hibiki sẽ giữ lời hứa."
# 【双鉄】
# display as 雙鐵
# JP: 「――おやすみ、日々姫」
936 = "「――Ngủ ngon nhé, Hibiki.」"
# monologue
# JP: 日々姫がふ、と小さく笑う。\nおんなの顔で、小さく笑う。
2191 = "Hibiki khẽ bật cười. Cười mỉm với khuôn mặt của một người phụ nữ."
# 【日々姫】
# display as 日日姬
# JP: 「おやすみなさい、――――」
1667 = "「Chúc ngủ ngon, ――――」"
# monologue
# JP: おやすみなさいの後に続いた囁きを、\n僕の鼓膜は、僕のこころは、聞き取れない。
2068 = "Lời thì thầm tiếp theo sau câu chúc ngủ ngon đó, màng nhĩ của tôi, trái tim tôi, không thể nghe rõ."
# 【ふかみ】
# display as 深美
# JP: 「日々姫さんがシャワー浴びたら、わたしたちも、ね？\nシャワーを浴びて、眠りましょう？」
1632 = "「Chị Hibiki tắm xong thì đến lượt chúng ta nhé? Tắm xong rồi đi ngủ thôi.」"
# monologue
# JP: ふかみが悪役を買ってまで全てを正しく収めてくれる。\nあるべきところに、あるべき形に、収めてくれる。
1943 = "Fukami đã chấp nhận đóng vai ác để sắp xếp mọi chuyện đâu vào đấy. Đưa mọi thứ về đúng vị trí, đúng hình dạng của nó."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうだな。\nありがとう。そうしよう」
1469 = "「Ừ――đúng vậy. Cảm ơn em. Cứ làm thế đi.」"
# monologue
# JP: ふかみの肩をそっと抱く。それがもちろん僕らのあるべき\n――一番しあわせな距離だから。
2051 = "Tôi nhẹ nhàng ôm lấy vai Fukami. Vì đó tất nhiên là khoảng cách ――hạnh phúc nhất mà chúng tôi nên có."
# 【日々姫】
# display as 日日姬
# JP: 「…………」
948 = "「............」"
# monologue
# JP: 微笑んで。\n僕に心配をかけぬよう、微笑みを崩さぬ、そのままに。
2157 = "Mỉm cười. Để không làm tôi lo lắng, em ấy vẫn giữ nguyên nụ cười đó."
# 【双鉄】
# display as 雙鐵
# JP: 「おやすみ、日々姫」
1668 = "「Ngủ ngon nhé, Hibiki.」"
# monologue
# JP: だからもう一度呼びかける。\n僕の、大切ないもうとに。
2084 = "Vì thế tôi gọi lại một lần nữa. Cô em gái quan trọng của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1484 = "「嗯」" 
# monologue
# JP: 明日の朝に。笑ってくれると知っているから。\n『おはようにぃに！』と、いつもどおりの日々姫の笑顔で。
1937 = "Bởi vì tôi biết, sáng mai em ấy sẽ lại cười với tôi. Với nụ cười rạng rỡ thường ngày và câu nói 'Chào buổi sáng, anh hai!'."
# 【日々姫】
# display as 日日姬
# JP: 「おやすみ、にぃに」
1669 = "「Ngủ ngon, anh hai.」"
