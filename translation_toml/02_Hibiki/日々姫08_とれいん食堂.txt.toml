2707 = "「還沒安排得這麼詳細……不過我想大致上就是這個流程」" 

# 【栃木】
# display as 櫪木
# JP: 「楽しみじゃのう、腕がなるっちゃ」
2553 = "「真期待啊，我已經手癢了」" 

