3604 = "這次是向木本先生，向櫪木先生。以及他們身後無數與此或多或少存在聯繫的人們。" 

# 【日々姫】
# display as 日日姬
# JP: 「どうか、よろしくおねがいします！！」
2623 = "「請各位多多指教！！」" 

# 【凪】
# display as 凪
# JP: 「じゃんっ。\nにーさん、どぎゃんとどぎゃんと？」
2750 = "「鏘，大哥哥，怎麼樣怎麼樣？」" 

# 【ふかみ】
# display as 深美
# JP: 「あの……どこかおかしくない、ですか？」
2624 = "「請問……看起來會很奇怪嗎？」" 

