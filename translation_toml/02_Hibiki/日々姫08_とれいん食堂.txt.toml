# JP: 添乗である僕らも当然、何かあったら即応の、\n姿勢をとらねばならない。のだが……
3627 = "Những người đi cùng như chúng tôi dĩ nhiên\ncũng phải\ntrong tư thế sẵn sàng ứng phó nếu có\nchuyện gì xảy ra. Nhưng mà……"

# monologue
# JP: （ぽんぽん）
3710 = "（Vỗ vỗ）"

