# monologue
# JP: ……そわそわしている。気持ちはわかる。\nけれどもここは、文庫森の\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;。公共の場だ。
1521 = "……Em ấy đang bồn chồn. Tôi hiểu cảm giác\nđó.\nNhưng đây là \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;\nBungomori. Là nơi công cộng."

# 【双鉄】
# display as 雙鐵
# JP: 「落ち着け、日々姫。\n幼い顔を見せるのは、僕とふたりだけのときにしろ」
2419 = "「Bình tĩnh lại đi, Hibiki.\nChỉ được tỏ vẻ trẻ con khi có hai người\nchúng ta thôi đấy」"

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんこつはわかっとー！\nわかっとーけど」
2689 = "「Chuyện đó thì em biết chứ!\nBiết thì biết nhưng mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2180 = "「Hửm」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
2213 = "「!!?」"

# monologue
# JP: \x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;の奥の方、目隠しにかけられているシートが\nこんもりと、人の形に盛り上がる。
3089 = "Phía trong cùng của \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;\n, tấm bạt che chắn\nnhô lên một khối hình người."

# monologue
# JP: そこをくぐって出てきたのは――
3635 = "Người chui ra từ đó là——"

# 【栃木】
# display as 櫪木
# JP: 「いや、素晴らしいっちゃ！\nこぎゃんと、よーお思いついたっちゃのう！！」
2164 = "「Ây chà, tuyệt vời quá đi!\nLàm sao mà cô cậu nghĩ ra được hay thế!!」"

# 【日々姫】
# display as 日日姬
# JP: 「あ」
2192 = "「A」"

# monologue
# JP: 栃木さん――レストラン『雲仙』のオーナーにして、\n元食堂車のチーフを勤めた、凄腕シェフだ。
3359 = "Bác Tochigi——chủ nhà hàng 'Unzen',\ntừng là bếp trưởng toa ăn, một đầu bếp tài\nba."

# monologue
# JP: その凄腕を、ぴしり、と老技師――\n木本さんがひとはたきする。
3525 = "Vị đầu bếp tài ba ấy vừa bị kỹ sư lão\nthành——\nbác Kimoto vỗ cái bốp."

# 【木本】
# display as 木本
# JP: 「[とちのき,1]栃木！　日々姫先生にお前、\nなんちゅう口ばききよるか」
2496 = "「Tochigi! Cậu ăn nói kiểu gì\nvới cô Hibiki thế hả」"

# 【栃木】
# display as 櫪木
# JP: 「こん嬢ちゃんが先生やったら、\nワシんごときは大先生ちゃよ！　食堂車ののー」
2612 = "「Nếu cô bé này là giáo viên,\nthì cỡ tôi đây phải là đại giáo sư rồi! Về\ntoa ăn ấy」"

# 【日々姫】
# display as 日日姬
# JP: 「本当にそのとおりだと思います。\n[とちのき,1]栃木さんのお話なしではこの列車は産まれませんでした」
2692 = "「Cháu thực sự nghĩ đúng là như vậy ạ.\nNếu không có câu chuyện của bác Tochigi\nthì đoàn tàu này đã không ra đời」"

# monologue
# JP: 日々姫が深く頭をさげれば、栃木さんはカッカと笑う。
3333 = "Khi Hibiki cúi đầu thật sâu, bác Tochigi\ncười ha hả."

# 【栃木】
# display as 櫪木
# JP: 「ワシん話からこん列車ば産みだせるなら、\nいまごろ世の中は食堂車だらけっちゃ」
2610 = "「Nếu chỉ từ câu chuyện của tôi mà tạo ra\nđược đoàn tàu này,\nthì giờ này trên đời đã đầy rẫy toa ăn\nrồi」"

# 【日々姫】
# display as 日日姬
# JP: 「え？」
2169 = "「Hả?」"

# 【木本】
# display as 木本
# JP: 「[ていてつ,1]帝鉄マニアば、栃木んとこにはよー行きよるとですよ。\nこん男は、食堂車の話ばするのが好きですけんのう」
2342 = "「Mấy tay cuồng Đường sắt Hoàng gia hay lui\ntới chỗ Tochigi lắm.\nTên này thích nói chuyện về toa ăn mà lại」"

# 【栃木】
# display as 櫪木
# JP: 「話しとるのは、誰にでも同じような思い出話ちゃ。\nそれを新列車につなげたんは、嬢ちゃんが初めてっちゃ」
2715 = "「Chuyện tôi kể cho ai cũng chỉ là mấy kỷ\nniệm cũ rích thôi.\nCô bé là người đầu tiên kết nối nó với một\nđoàn tàu mới đấy」"

# 【日々姫】
# display as 日日姬
# JP: 「あ……」
2187 = "「A……」"

# monologue
# JP: ……木本さんにご紹介いただき、\n栃木さんに初めてお会いしたときのことを想い出す。
1525 = "……Tôi nhớ lại lần đầu tiên gặp bác Tochigi\nqua sự giới thiệu của bác Kimoto."

# monologue
# JP: 『この程度の知識』さえもなかったところから、\nここにまで――よくぞたどり着いたものだと、僕さえ思う。
3611 = "「Làm sao mà cô nghĩ ra được đoàn tàu như\nthế này chứ.\nCô bảo mình là nhà thiết kế, nhưng tôi\nthấy cô là nhà phát minh thì đúng hơn」"

# 【栃木】
# display as 櫪木
# JP: 「ようこげな列車を思いつくもんっちゃ。\nあんたは――デザイナーいう話じゃが、発明家じゃね」
2557 = "「Cháu rất vui khi được bác khen. Nhưng\nmà——\ncông việc cháu làm vẫn là thiết kế ạ」"

# 【日々姫】
# display as 日日姬
# JP: 「お褒めいただき、うれしいです。けど――\n私のした仕事はやっぱり、デザインです」
2632 = "「Vậy sao」"

# 【木本】
# display as 木本
# JP: 「そげですか」
2685 = "「Thiết kế chính là sắp xếp.\nLà sắp xếp lại các yếu tố cần thiết và thể\nhiện chúng một cách dễ hiểu」"

# 【日々姫】
# display as 日日姬
# JP: 「デザインすることは、整頓すること。\n必要な要素を並べ替え、伝わりやすく示すことですから」
2616 = "「Thiết kế chính là sắp xếp.\nLà sắp xếp lại các yếu tố cần thiết và thể\nhiện chúng một cách dễ hiểu」"

# monologue
# JP: 日々姫の言葉に、木本さんは大きく頷く。\n栃木さんは、興味深そうに顎を撫でる。
3536 = "Trước lời của Hibiki, bác Kimoto gật đầu\nthật mạnh.\nBác Tochigi vuốt cằm với vẻ đầy hứng thú."

# 【日々姫】
# display as 日日姬
# JP: 「だから。木本さんや栃木さん、みなさんからお話を、\n要素をいただけたから、このデザインが出来たんです」
2336 = "「Vì vậy. Nhờ có những câu chuyện, những\nyếu tố\ntừ bác Kimoto, bác Tochigi và mọi người mà\nthiết kế này mới ra đời được ạ」"

# monologue
# JP: みなさん――\nああ、本当に、“みなさん”だ。
3110 = "Mọi người——\nỪ, đúng là 'mọi người'."

# monologue
# JP: “とれいん食堂”のアイディアを気に入った栃木さんは、その人脈を、惜しまず僕らに紹介してくださったから。
3608 = "Vì bác Tochigi rất thích ý tưởng 'Toa ăn\nTrain', nên bác ấy đã không ngần ngại giới\nthiệu các mối quan hệ của mình cho chúng\ntôi."

# 【日々姫】
# display as 日日姬
# JP: 「[おおむた,2]大牟田、“ビストロ・ムティア”の上島さん。\n[くるめ,1]来目、“来目DEグルメ”の永元さん――」
2274 = "「Bác Ueshima của 'Bistro Mutia' ở Omuta.\nBác Nagamoto của 'Kurume DE Gourmet' ở\nKurume——」"

# monologue
# JP: ひとりひとりのお名前を日々姫が呼ぶたび、\nそれぞれの料理の味が思い出される。
3331 = "Mỗi khi Hibiki gọi tên từng người,\nhương vị món ăn của họ lại ùa về trong tâm\ntrí tôi."

# monologue
# JP: 栃木さんのかつてのご同僚、お弟子、ご友人――\nその全員が超一流のシェフで同時に、鉄道を愛する方々だ。
3388 = "Những đồng nghiệp cũ, học trò, bạn bè của\nbác Tochigi——\nTất cả đều là những đầu bếp siêu hạng và\nđồng thời là những người yêu đường sắt."

# 【日々姫】
# display as 日日姬
# JP: 「とれいん食堂全停車駅での、最高の料理と観光。\nそう断言できる要素をいただけたからの、デザインです」
2258 = "「Ẩm thực và du lịch tuyệt vời nhất tại mọi\nga dừng của Toa ăn Train.\nNhờ có được những yếu tố có thể khẳng định\nnhư vậy nên mới có thiết kế này ạ」"

# 【栃木】
# display as 櫪木
# JP: 「そぎゃん言われると……まぁ、なんね」
2062 = "「Bị nói thế thì……chà, sao nhỉ」"

# 【木本】
# display as 木本
# JP: 「なんじゃ栃木。照れよったか」
2353 = "「Gì thế Tochigi. Xấu hổ à」"

# 【栃木】
# display as 櫪木
# JP: 「照れるかあほう！　そぎゃんじゃのーて……\nワシらも――料理も、似たもんかのうと思うたっちゃ」
2058 = "「Xấu hổ cái đồ ngốc! Không phải thế……\nTôi chỉ nghĩ chúng ta——nấu ăn cũng giống\nvậy thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「料理と……デザインが、ですか？」
2354 = "「Nấu ăn và……thiết kế giống nhau sao ạ?」"

# 【栃木】
# display as 櫪木
# JP: 「おうよ。素材がなくちゃあ、どぎゃん料理もできん。\n調理の前の、素材の仕入れも、料理のうちやきのー」
2440 = "「Ừ. Không có nguyên liệu thì chẳng nấu\nđược món gì sất.\nViệc thu mua nguyên liệu trước khi chế\nbiến cũng là một phần của nấu ăn mà」"

# 【木本】
# display as 木本
# JP: 「そいば言うたら、整備も同じよ。修理の始めば部品調達。\n代用品さえ入らんよーなら、応急処置しか出来んけん」
2063 = "「Nói vậy thì bảo dưỡng cũng thế. Bắt đầu\nsửa chữa là phải tìm phụ tùng.\nNếu không có cả đồ thay thế thì chỉ có\nnước sơ cứu thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……あるいは全ての仕事が、\nそうした構造を持つものなのかもしれませんね」
2113 = "「Ra vậy……hoặc có lẽ mọi công việc\nđều có cấu trúc như vậy cũng nên」"

# 【栃木】
# display as 櫪木
# JP: 「かもの。そうして――どぎゃんとすぐれた素材でも、\n仕上げる腕が悪きゃあ台無しになるのも同じっちゃ」
2476 = "「Có thể lắm. Hơn nữa——dù nguyên liệu có\ntuyệt hảo đến đâu,\nmà tay nghề người làm kém thì cũng vứt đi,\nchuyện đó cũng giống nhau thôi」"

# monologue
# JP: 言って、栃木さんはどこかまぶしげに日々姫を見つめる。
3558 = "Nói rồi, bác Tochigi nhìn Hibiki với vẻ có\nchút chói lóa."

# 【栃木】
# display as 櫪木
# JP: 「嬢ちゃんは、若かのによか腕っ節のデザイナーやのー。\nどこで勉強しよったっちゃ？」
2027 = "「Cô bé còn trẻ mà đã là một nhà thiết kế\ncó tay nghề cừ khôi rồi.\nCô học ở đâu vậy?」"

# 【日々姫】
# display as 日日姬
# JP: 「どこで――っていうことはないです。独学で。\n流れでお仕事をいただきはじめて、だんだんって感じで」
2025 = "「Cũng không hẳn là ở đâu ạ. Cháu tự học\nthôi.\nCứ thế nhận được công việc, rồi dần dần\ntiến bộ lên ạ」"

# 【栃木】
# display as 櫪木
# JP: 「独学」
2596 = "「Tự học」"

# monologue
# JP: 日々姫の答えに、栃木さんの目がまんまるになる。\nそうしてクっと喉がなり、柔かな笑みのアーチが描かれる。
3338 = "Trước câu trả lời của Hibiki, mắt bác\nTochigi tròn xoe.\nSau đó bác ấy tằng hắng một cái, rồi nở\nmột nụ cười hiền hậu."

# 【栃木】
# display as 櫪木
# JP: 「ほんなら嬢ちゃんは、良か仕事に身近に触れて――\nそうして、大人になったんじゃろうねー」
2717 = "「Vậy là cô bé đã được tiếp xúc với những\ncông việc tốt từ sớm——\nrồi cứ thế mà trưởng thành nhỉ」"

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2192 = "「啊」" 

# monologue
# JP: 日々姫も明るい笑顔に変わる。\n力いっぱい、大きく頷く。
3313 = "Hibiki cũng chuyển sang nụ cười rạng rỡ.\nEm ấy gật đầu thật mạnh."

# 【日々姫】
# display as 日日姬
# JP: 「はいっ！！！」
2457 = "「Vâng ạ!!!」"

# 【栃木】
# display as 櫪木
# JP: 「じゃったらワシも、一流の仕事ば見せてやらんとのー。\nあん列車――もう数カ月で、走りよるっちゃね？」
2738 = "「Vậy thì tôi cũng phải cho cô xem công\nviệc của một chuyên gia hàng đầu mới được.\nĐoàn tàu đó——chỉ vài tháng nữa là chạy rồi\nnhỉ?」"

# 【日々姫】
# display as 日日姬
# JP: 「はい。[ぎそう,1]艤装もほとんど完了していますから。\n走行面を、次いで、設備を見るための試走を重ねて」
2458 = "「Vâng. \\x%l艤装;#00ffc040;Trang thiết bị nội ngoại thất%l;#; cũng\ngần như hoàn tất rồi ạ.\nTiếp theo là chạy thử nhiều lần để kiểm\ntra mặt vận hành, sau đó là các thiết bị」"

# 【栃木】
# display as 櫪木
# JP: 「そいば済んだら、わしらも含めてのテストっちゃ？」
2573 = "「Xong mấy cái đó là đến bài kiểm tra có cả\nchúng tôi tham gia đúng không?」"

# 【日々姫】
# display as 日日姬
# JP: 「そこまでの詳細はまだ詰めきれていませんが……\n概ね、そうした流れになるかとは思います」
2707 = "「Chi tiết đến mức đó thì cháu vẫn chưa\nchốt được……\nnhưng cháu nghĩ đại khái sẽ theo trình tự\nnhư vậy ạ」"

# 【栃木】
# display as 櫪木
# JP: 「楽しみじゃのう、腕がなるっちゃ」
2553 = "「Đáng mong đợi đây, ngứa tay nghề quá rồi」"

# monologue
# JP: いってパシンと二の腕を叩き、\n栃木さんは、言葉そのまま、腕を鳴らす。
3389 = "Nói rồi bác Tochigi vỗ cái bốp vào bắp\ntay,\nđúng như lời bác ấy nói, khởi động tay\nchân."

# 【栃木】
# display as 櫪木
# JP: 「わしん料理が、また列車と旅ばできるとは、\n夢にも思うとらんかった！　ありがとの、嬢ちゃん」
2380 = "「Món ăn của tôi lại được đi du lịch cùng\ntàu hỏa một lần nữa,\nthật nằm mơ cũng không ngờ tới! Cảm ơn cô\nbé nhé」"

# 【日々姫】
# display as 日日姬
# JP: 「いえ――はいっ！」
2176 = "「Không có gì——vâng ạ!」"

# monologue
# JP: もう一度、日々姫が深々頭を下げる。
3315 = "Một lần nữa, Hibiki cúi đầu thật sâu."

# monologue
# JP: 木本さんに、栃木さんに。その向こう側につながっている、\nたくさんのたくさんの方々に。
3604 = "Gửi đến bác Kimoto, bác Tochigi. Và rất\nrất nhiều người\nđang kết nối ở phía bên kia."

# 【日々姫】
# display as 日日姬
# JP: 「どうか、よろしくおねがいします！！」
2623 = "「Trăm sự nhờ các bác ạ!!」"

# 【凪】
# display as 凪
# JP: 「じゃんっ。\nにーさん、どぎゃんとどぎゃんと？」
2750 = "「Tada.\nAnh hai, thấy sao thấy sao nè?」"

# 【ふかみ】
# display as 深美
# JP: 「あの……どこかおかしくない、ですか？」
2624 = "「Dạ……có chỗ nào kỳ lạ không, ạ?」"

# monologue
# JP: 目に新しい制服姿。
3117 = "Trang phục đồng phục mới mẻ trong mắt tôi."

# monologue
# JP: 普段と違う装いに、改めてしみじみ感じてしまう。\n凪もふかみも、健やかに成長したものだ。
3605 = "Trang phục khác hẳn ngày thường khiến tôi\nmột lần nữa cảm nhận sâu sắc.\nCả Nagi và Fukami đều đã trưởng thành khỏe\nmạnh."

# 【双鉄】
# display as 雙鐵
# JP: 「……おかしいところなぞ何ひとつない。\nよく似合っている。さすが、日々姫デザインの制服だ」
1597 = "「……Chẳng có chỗ nào kỳ lạ cả.\nRất hợp với hai đứa. Quả không hổ danh\nđồng phục do Hibiki thiết kế」"

# 【凪】
# display as 凪
# JP: 「って、そぎゃん言い方好かんばい！！」
2214 = "「Ê, cách nói đó Nagi đại nhân không thích\nđâu nha!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2247 = "「Hửm?」"

# 【ふかみ】
# display as 深美
# JP: 「ですです。日々姫さんデザインの制服じゃなきゃ、\nわたしたち似合わないんです？　みたいな感じで」
2446 = "「Đúng vậy đúng vậy. Cứ như thể anh đang\nbảo\n'Nếu không phải đồng phục do chị Hibiki\nthiết kế thì hai đứa mặc không hợp đâu'\nấy」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2253 = "「Ồ」"

# monologue
# JP: かなり強めに抗議され、\n言葉足らずにもほどがあったと思い知る。
3535 = "Bị phản đối khá gay gắt,\ntôi mới nhận ra mình đã nói thiếu ý đến\nmức nào."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。"[まご,1]馬子にも衣装"的に\n聞こえたなら本意ではない。お詫びして、訂正しよう」
2115 = "「Ra vậy. Nếu nghe giống như 'Người đẹp vì\nlụa'\nthì đó không phải ý của anh. Xin lỗi nhé,\nđể anh sửa lại」"

# monologue
# JP: 二度目の失敗は許されない。
3508 = "Không thể để xảy ra thất bại lần thứ hai."

# monologue
# JP: 視線の強さにいささか気圧されながらも、\n言い落していた言葉を丁寧に継ぎ足していく。
3638 = "Dù hơi bị áp đảo bởi ánh nhìn mạnh mẽ của\nhai người,\nnhưng tôi vẫn cẩn thận bổ sung thêm những\nlời còn thiếu."

# 【双鉄】
# display as 雙鐵
# JP: 「凪の活発さと可愛らしさが素直に出て似合っている。\nその魅力が、いかにも働き者な印象にもなっている」
2693 = "「Sự hoạt bát và đáng yêu của Nagi được bộc\nlộ một cách tự nhiên, rất hợp.\nSức hấp dẫn đó cũng tạo nên ấn tượng về\nmột người chăm chỉ」"

# 【凪】
# display as 凪
# JP: 「わお！」
2159 = "「Oa!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみの静かな美しさも、控えめに引き立っている。\n旅路の傍らにそっと[たたず]佇む、可憐な花の印象だ」
2694 = "「Vẻ đẹp trầm tĩnh của Fukami cũng được tôn\nlên một cách tinh tế.\nMang ấn tượng về một bông hoa đáng yêu,\nkhẽ nép mình bên lề đường du lịch」"

# 【ふかみ】
# display as 深美
# JP: 「こ、今度は、ちょっと――褒めすぎ、です」
2679 = "「Lần, lần này thì, hơi——khen quá lời rồi,\nạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「いうなれば動と静。太陽と月。\nふたりの魅力は正反対であるがゆえに眩しく――」
2401 = "「Có thể nói là động và tĩnh. Mặt trời và\nmặt trăng.\nSức hấp dẫn của hai đứa hoàn toàn trái\nngược nhau, chính vì vậy mà lại tỏa sáng\nrực rỡ——」"

# monologue
# JP: あらためて、頭の先からつま先までを眺め下ろす。
3180 = "Tôi lại nhìn từ đầu đến chân hai người một\nlần nữa."

# monologue
# JP: 初見の衝撃が薄れれば、\nそこに残るのはただただ素直な感慨だ。
3505 = "Khi cú sốc ban đầu phai nhạt đi,\nnhững gì đọng lại chỉ là sự cảm khái chân\nthành."

# 【双鉄】
# display as 雙鐵
# JP: 「その両方の魅力を、曲げることなく損なうことなく、\n日々姫の制服は、膨らませていると感じたのだ」
2064 = "「Anh cảm thấy đồng phục của Hibiki đã tôn\nlên\nsức hấp dẫn của cả hai mà không hề làm sai\nlệch hay suy giảm đi chút nào」"

# 【凪】
# display as 凪＆深美
# JP: 「あ」
# 2192 = "「啊」" 

# monologue
# JP: 凪とふかみの視線がぶつかる。\nお互いがお互いを眺め合い――ゆっくり、頷く。
3015 = "Ánh mắt của Nagi và Fukami chạm nhau.\nHai người nhìn nhau——rồi từ từ gật đầu."

# 【凪】
# display as 凪
# JP: 「納得ばい」
2138 = "「Chấp nhận nè」"

# 【ふかみ】
# display as 深美
# JP: 「なるほど。です」
2114 = "「Ra vậy. Ạ」"

# monologue
# JP: これなら良かろう。\n言葉が足りずに誤解されてしまった部分は埋め終えた。
3603 = "Thế này thì ổn rồi.\nPhần bị hiểu lầm do nói thiếu ý đã được\ngiải quyết xong."

# 【ふかみ】
# display as 深美
# JP: 「だけど、納得できちゃったから――\nそれでちょっとだけ、ヤキモチも感じちゃいましたです」
2019 = "「Nhưng mà, vì đã chấp nhận rồi——\nnên em lại cảm thấy hơi ghen tị một chút\nạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ヤキモチ？」
2129 = "「Ghen tị?」"

# 【ふかみ】
# display as 深美
# JP: 「はい。双鉄おにいさん、本当に、\n日々姫さんのこと、大大大好きなんだなぁ、って」
2438 = "「Vâng. Em nghĩ là anh Soutetsu thực sự,\nrất rất rất thích chị Hibiki nhỉ」"

# 【凪】
# display as 凪
# JP: 「あ！　まっことそぎゃんと！　そうでもなけりゃ、\n服より先に、凪さまたちのことほめとるばい！！」
2199 = "「A! Đúng là vậy đó! Nếu không phải thế,\nthì anh đã khen tụi này trước khi khen\nquần áo rồi!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2180 = "「唔」" 

# monologue
# JP: 確かにだ。凪とふかみの魅力を感じ――\nそれを言葉にするより早く、『理由』を僕は見つけだした。
3494 = "Đúng là vậy. Cảm nhận được sức hấp dẫn của\nNagi và Fukami——\nnhưng trước khi kịp nói thành lời, tôi đã\ntìm ra 'lý do'."

# monologue
# JP: それは日々姫のデザインを、常に意識しているからで――\n意識の根底にあるのは無論、日々姫への愛情に違いない。
3617 = "Đó là vì tôi luôn để tâm đến thiết kế của\nHibiki——\nvà gốc rễ của sự quan tâm đó, dĩ nhiên\nkhông gì khác ngoài tình yêu dành cho em\nấy."

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ、改めて言われてみると、僕は四六時中、\n日々姫に関連する事ばかりを考え続けている気もするな」
2452 = "「Đúng vậy nhỉ, được hai đứa nói lại anh\nmới thấy, có vẻ như\nlúc nào anh cũng nghĩ đến những chuyện\nliên quan đến Hibiki thì phải」"

# 【凪】
# display as 凪
# JP: 「わおわおー！」
2156 = "「Oa oa oa!」"

# 【ふかみ】
# display as 深美
# JP: 「あははーごちそうさまです――てっ」
2193 = "「Ahaha, ăn cẩu lương no luôn rồi ạ——」"

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2182 = "「Hửm?」"

# 【日々姫】
# display as 日日姬
# JP: 「あー、こほん」
2202 = "「A, e hèm」"

# monologue
# JP: ――今の会話が、聞こえてしまっていたらしい。\n首筋までが真っ赤になって、いつも以上に愛らしい。
1469 = "——Có vẻ như em ấy đã nghe thấy cuộc trò\nchuyện vừa rồi.\nĐỏ mặt đến tận cổ, trông em ấy còn đáng\nyêu hơn mọi ngày."

# 【日々姫】
# display as 日日姬
# JP: 「あの、みなさまのご歓談中、\nまことに恐縮ではありますが」
2719 = "「Dạ, trong lúc mọi người đang trò chuyện\nvui vẻ,\nthật sự rất ngại nhưng mà」"

# 【凪】
# display as 凪
# JP: 「ゴカンダンチュー？」
2499 = "「Trò chuyện vui vẻ?」"

# 【ふかみ】
# display as 深美
# JP: 「まことに、恐縮」
2308 = "「Thật sự, rất ngại」"

# monologue
# JP: ……照れ隠しをしようとしてなのか、\n選ぶ言葉の距離感が、完全に狂ってしまっている。
1516 = "……Có lẽ vì muốn che giấu sự ngượng ngùng,\nmà cách chọn từ ngữ của em ấy trở nên hoàn\ntoàn xa lạ."

# 【日々姫】
# display as 日日姬
# JP: 「えと！　出発準備。制服――っていうか、\n身だしなみのチェックが終わったんなら」
2151 = "「À! Chuẩn bị xuất phát. Đồng phục——à\nkhông,\nnếu đã kiểm tra xong diện mạo rồi thì」"

# 【ふかみ】
# display as 深美
# JP: 「わぁあ！　そうでしたそうでした！」
2155 = "「Oa! Đúng rồi đúng rồi!」"

# 【凪】
# display as 凪
# JP: 「栄えある一号列車やけんね！　準備ば、\nいくらしても、しすぎっていうことはなかばーい！」
2680 = "「Đoàn tàu số 1 vinh quang mà lị! Chuẩn bị,\ncó bao nhiêu cũng không thừa đâu nha!」"

# monologue
# JP: 日々姫の指摘をうけるやいなやで、\nふかみと凪は並んでパタパタ、駆け出していく。
3537 = "Vừa nhận được lời nhắc nhở của Hibiki,\nFukami và Nagi đã lạch bạch chạy đi."

# 【ふかみ】
# display as 深美
# JP: 「わたし、車内の確認にかかります！　です！」
2369 = "「Em sẽ đi kiểm tra trong xe! Ạ!」"

# 【凪】
# display as 凪
# JP: 「したら凪さま！　車外、きっちり確認すると！！」
2739 = "「Vậy Nagi đại nhân! Sẽ kiểm tra kỹ lưỡng\nbên ngoài xe!!」"

# monologue
# JP: 走るふたりを日々姫が見守る。\nその横顔に、瞬時、見惚れる。
3327 = "Hibiki dõi theo hai người đang chạy đi.\nKhoảnh khắc đó, tôi đã say đắm nhìn góc\nnghiêng của em ấy."

# monologue
# JP: なんと立派な大人になって、\nなんと綺麗な女になったか。
3120 = "Em ấy đã trở thành một người lớn tuyệt\nvời,\nmột người phụ nữ xinh đẹp biết bao."

# 【双鉄】
# display as 雙鐵
# JP: 「助けられた。ありがとう。自覚もできていなかったが、\n僕らはどこか、浮かれてしまっていたようだ」
2629 = "「Cứu anh một bàn thua trông thấy. Cảm ơn\nem. Anh còn không nhận ra,\ncó vẻ như chúng ta đã hơi phấn khích quá\nđà rồi」"

# 【日々姫】
# display as 日日姬
# JP: 「浮かれてもらうのも嬉しかけどね。\n苦労ば、たーくさんしたこだし」
2545 = "「Mọi người vui vẻ thì em cũng mừng.\nVì đứa bé này đã trải qua rất nhiều vất vả\nmà」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2444 = "「Đúng vậy」"

# monologue
# JP: 右田日々姫デザイン。食堂気動車『とれいん食堂』。\n車籍は肥颯みかん鉄道に置く、\x%lHSMK;#00ffc040;HSMK%l;#;114と\x%lHSMK;#00ffc040;HSMK%l;#;116。
3652 = "Thiết kế bởi Migita Hibiki. Toa ăn tự hành\n'Toa ăn Train'.\nĐăng ký xe thuộc Đường sắt Hisatsu Mikan, \\x%lHSMK;#00ffc040;HSMK%l;#;\n114 và \\x%lHSMK;#00ffc040;HSMK%l;#;116."

# monologue
# JP: あまりの完成度の高さに感激したみかん鉄道側が、\nいつかの\x%l中間車;#00ffc040;中間車%l;#;増備のために、番号を空けた大傑作だ。
3606 = "Cảm kích trước độ hoàn thiện quá cao, phía\nĐường sắt Mikan\nđã để trống một số thứ tự cho việc bổ sung\n\\x%l中間車;#00ffc040;toa giữa%l;#; vào một ngày nào đó, quả là một\nkiệt tác."

# 【双鉄】
# display as 雙鐵
# JP: 「が、常に安全が第一の使命だ。\n浮かれてそれを失念しては、話にもならん」
2018 = "「Nhưng, an toàn luôn là sứ mệnh hàng đầu.\nNếu vì phấn khích mà quên mất điều đó thì\nchẳng còn gì để nói nữa」"

# 【日々姫】
# display as 日日姬
# JP: 「まっことね」
2570 = "「Đúng vậy nhỉ」"

# monologue
# JP: しかつめらしく、日々姫が頷く。
3353 = "Hibiki gật đầu với vẻ mặt nghiêm túc."

# 【日々姫】
# display as 日日姬
# JP: 「初日の今日は、にぃにとわたしも添乗するけど、\n明日からは、ぜぇんぶ任せねばいけんけん」
2757 = "「Ngày đầu tiên hôm nay, anh hai và em cũng\nsẽ đi cùng,\nnhưng từ ngày mai là phải giao phó toàn bộ\ncho hai đứa nó rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「凪とふかみの、『とれいん食堂』Ａチーム。\n思い切った人員配置ではあるが――」
2082 = "「Đội A của 'Toa ăn Train' gồm Nagi và\nFukami.\nDù là một sự bố trí nhân sự táo bạo\nnhưng——」"

# monologue
# JP: レールが繋がった効果によっての好影響で、\n御一夜の観光収入は右肩あがりを続けている。
3106 = "Nhờ hiệu ứng tích cực từ việc kết nối\nđường ray,\ndoanh thu du lịch của Ohimitera vẫn tiếp\ntục tăng trưởng."

# monologue
# JP: クマ川下りの船頭さんたちも復帰をし、\nふかみの定期乗務も可能となった。
3633 = "Những người lái đò trên sông Kuma cũng đã\ntrở lại,\nFukami cũng đã có thể làm việc trên tàu\nđịnh kỳ."

# 【日々姫】
# display as 日日姬
# JP: 「赤井さんが復帰してくれたけん、\n機関士/機関助士は回せるばってん――」
2259 = "「Nhờ anh Akai đã quay lại làm việc,\nnên vị trí Lái tàu/Phụ lái tàu đã có thể\nxoay xở được——」"

# 【双鉄】
# display as 雙鐵
# JP: 「凪は、思い切った選択をしたよな。\n正機関士の資格を取得したばかりというのに」
2081 = "「Nagi đã đưa ra một lựa chọn táo bạo nhỉ.\nDù vừa mới lấy được chứng chỉ Lái tàu\nchính thức xong」"

# monologue
# JP: 『ふかみちゃん一人じゃたよりなかけんね！』\nそう言い切ってあっさりと、凪は\x%lギャレー;#00ffc040;ギャレー%l;#;兼務を選んだ。
1493 = "『Để Fukami một mình thì không yên tâm\nđâu!』\nNói dứt khoát như vậy, Nagi dễ dàng chọn\nkiêm nhiệm luôn công việc ở \\x%lギャレー;#00ffc040;bếp trên tàu%l;#;."

# monologue
# JP: 乗務時間の減少は、機関士としての回り道となりかねんが、\nその選択に、僕らが助けられたこともまた、間違いない。
3417 = "Thời gian làm việc trên tàu giảm đi có thể\nlà một đường vòng đối với một Lái tàu,\nnhưng không thể phủ nhận rằng sự lựa chọn\nđó đã giúp ích cho chúng tôi rất nhiều."

# 【双鉄】
# display as 雙鐵
# JP: 「……全線通しで乗務するのは、レイルロオドを除けば\n\x%lギャレー;#00ffc040;ギャレー%l;#;クルーだけとなる。凪とふかみの責任は重い」
1588 = "「……Làm việc trên tàu xuyên suốt toàn\ntuyến, ngoại trừ Railord ra\nthì chỉ có đội ngũ \\x%lギャレー;#00ffc040;bếp trên tàu%l;#;. Trách\nnhiệm của Nagi và Fukami rất nặng nề」"

# monologue
# JP: とれいん食堂レイルロオドは、\n改装前からの引き継ぎとなる冥国製――
3038 = "Railord của Toa ăn Train,\nđược kế thừa từ trước khi cải tạo, là hàng\ndo Mỹ sản xuất——"

# monologue
# JP: つまりは、汎用性に優れるという特徴を持ち、\nどの運転士、どころか、どの車両とも組める万能型だ。
3222 = "Tóm lại, mang đặc trưng là tính đa dụng\ncao,\nlà kiểu đa năng có thể kết hợp với bất kỳ\nngười lái tàu nào, thậm chí là bất kỳ toa\nxe nào."

# 【双鉄】
# display as 雙鐵
# JP: 「[めいこく,1]冥国式は、汎用性を持つ反面、日ノ本・[えい]詠式より\n車両理解の深さでは及ばないとも聞いている」
