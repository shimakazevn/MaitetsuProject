3534 = "Chỉ cần nghe tiếng cười của hành khách,\ncũng đủ biết Nagi đã làm hướng dẫn viên du\nlịch vui vẻ đến mức nào."

# 【ふかみ】
# display as 深美
# JP: 「あ、お迎えの準備しなきゃ」
2208 = "「A, phải chuẩn bị đón khách thôi」"

# monologue
# JP: 指差し確認。\n二度繰り返して――それで完了。
3211 = "\\x%l指差し確認;#00ffc040;Chỉ tay hô xác nhận%l;#;.\nLặp lại hai lần——vậy là xong."

# monologue
# JP: ふかみの手配と段取りは、\nここまで完璧に機能している。
3403 = "Sự sắp xếp và trình tự của Fukami,\nđến lúc này vẫn đang hoạt động một cách\nhoàn hảo."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみも、凪も、見事なものだ。\nクマ川下りでの経験を、鮮やかに活かしてくれているな」
2053 = "「Cả Fukami và Nagi đều làm rất xuất sắc.\nHai đứa đã tận dụng rất tốt kinh nghiệm\nlàm việc trên thuyền xuôi dòng sông Kuma\nnhỉ」"

# monologue
# JP: ごくごく素直な賞賛に、\nけれどふかみは、きょとんと驚いた顔をする。
3204 = "Trước lời khen ngợi rất đỗi chân thành,\nnhưng Fukami lại tỏ vẻ ngạc nhiên ngơ\nngác."

# 【ふかみ】
# display as 深美
# JP: 「え？　あんまりそこは――です。だってわたしたち、\nマニュアルどおりにやってるだけです。し」
2171 = "「Hả? Cái đó thì không hẳn đâu——ạ. Bởi vì\ntụi em,\nchỉ làm theo sổ tay hướng dẫn thôi. Mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、マニュアル以上をしていよう。\nさきほどの、乗客対応のスイッチだとか」
2022 = "「Không, hai đứa đã làm tốt hơn cả sổ tay\nhướng dẫn đấy.\nChẳng hạn như việc đổi vị trí để phục vụ\nhành khách lúc nãy」"

# 【ふかみ】
# display as 深美
# JP: 「あ……それは――」
2189 = "「A……cái đó thì——」"

# monologue
# JP: ふかみがぐるりと車内を見渡す。\n車内を見渡し――それからじっと、日々姫を見つめる。
3402 = "Fukami nhìn quanh một vòng trong xe.\nNhìn quanh trong xe——rồi nhìn chằm chằm\nvào Hibiki."

# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 2169 = "「哎？」" 

# 【ふかみ】
# display as 深美
# JP: 「それって単に、この列車のおかげ。です。\n列車が自分で、何をできるか教えてくれてるから」
2721 = "「Đó đơn giản là nhờ đoàn tàu này. Ạ.\nBởi vì chính đoàn tàu đã cho tụi em biết\nmình có thể làm gì」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！！！」
2201 = "「!!!」"

# 【ふかみ】
# display as 深美
# JP: 「書棚には絵本からガイド本までそろってますし、\n民芸品とかおもちゃとか、色々配置してありますし」
2470 = "「Trên giá sách có đủ loại từ sách tranh\nđến sách hướng dẫn,\nđồ thủ công mỹ nghệ, đồ chơi, được bài trí\nrất nhiều thứ」"

# monologue
# JP: その上かわいい、食べ放題のお菓子まで！\nと、少しおどけて、ふかみはミニチョコを一粒食べる。
1491 = "Hơn nữa còn có cả bánh kẹo đáng yêu ăn\nthỏa thích nữa!\nNói đùa một chút, Fukami ăn một viên\nsô-cô-la nhỏ."

# 【ふかみ】
# display as 深美
# JP: 「だから、わたしと凪ちゃんのコンビじゃなくても。\nマニュアル通りで同じことできますし、しますよ、絶対」
2390 = "「Vì vậy, dù không phải là cặp đôi em và\nNagi.\nThì chỉ cần làm theo sổ tay hướng dẫn là\ncó thể làm được điều tương tự, và chắc\nchắn sẽ làm được ạ」"

# 【日々姫】
# display as 日日姬
# JP: 「あっ――」
2185 = "「A——」"

# 【斎藤】
# display as 齋藤
