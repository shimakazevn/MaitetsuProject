3410 = "Trong lúc đó, Fukami dọn dẹp bàn, dọn dẹp\ntrong xe.\nKiểm tra lại các bộ phận một lần nữa."

# monologue
# JP: ご乗車くださったみなさまのマナーも素晴らしく、\nここでの作業は、大幅な余裕をもって完了する。
3440 = "Ý thức của các hành khách đi tàu cũng rất\ntuyệt vời,\nnên công việc ở đây được hoàn thành với\nthời gian dư dả."

# 【真闇】
# display as ？？？
# JP: 「わぁー！」
2153 = "「Oa!」"

# monologue
# JP: 真闇姉、の声だったろうか？\n海風に乗り、混じりけのない歓声が遠く聞こえてくる。
2943 = "Là giọng của chị Mayami sao?\nTheo gió biển, tiếng reo hò trong trẻo\nvang đến từ xa."

# 【日々姫】
# display as 日日姬
# JP: 「あ……ねぇねも、ここの景色気に入ってくれたと！」
2191 = "「A……chị Mayami cũng thích cảnh sắc ở đây!」"

# monologue
# JP: 聞こえるやいなやの日々姫の歓声。\nふかみもぶんぶん、大きく頷く。
3311 = "Ngay khi nghe thấy tiếng reo hò của\nHibiki.\nFukami cũng gật đầu lia lịa."

# 【ふかみ】
# display as 深美
# JP: 「ここの見晴らし最高ですよね。わたしと凪ちゃんも\n試運転のときとか、大興奮しちゃいましたから」
2691 = "「Tầm nhìn ở đây tuyệt vời lắm đúng không.\nEm và Nagi\nlúc chạy thử cũng phấn khích lắm luôn」"

# monologue
# JP: そう言いながらもテキパキと体は動き続ける。\n回収したての食器も綺麗に片付けられる。
3412 = "Dù miệng nói vậy nhưng cơ thể vẫn thoăn\nthoắt làm việc.\nBát đĩa vừa thu dọn cũng được rửa sạch sẽ."

# 【特産品売り】
# display as 特產店
# JP: 「[さつまたき,3]颯摩多希のお土産ば、ここじゃよー！\nうるめにしらす。もちろん販売もしちょるよー」
2690 = "「Quà lưu niệm của Satsumataki ở đây nha!\nCá mòi khô, cá cơm trắng. Tất nhiên là\ncũng có bán nha!」"

# 【真闇】
# display as 真闇
# JP: 「あら、おいしそ」
2167 = "「Ôi, trông ngon quá」"

# 【観光客】
# display as 游客
# JP: 「おお、こっちにもひとつ」
2172 = "「Ồ, cho tôi một phần bên này nữa」"

# 【凪】
# display as 凪
# JP: 「慌てんでも平気ばーい！\n売り物やけん、売るほどあるばい！」
2102 = "「Không cần vội đâu nha!\nĐồ bán mà, có đủ để bán luôn á!」"

# 【観光客】
# display as 游客
# JP: 「がっはっは！　そりゃあそうだ」
2161 = "「Gahahaha! Chuyện đó thì đúng rồi」"

# monologue
# JP: ホーム上の特設売店からは、にぎやかな声。
3502 = "Từ quầy hàng đặc biệt trên sân ga vang lên\nnhững tiếng ồn ào náo nhiệt."

# monologue
