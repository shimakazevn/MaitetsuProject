3605 = "這身不同於平時的裝扮讓人再度感慨，凪和深美都已經茁壯成長了啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……おかしいところなぞ何ひとつない。\nよく似合っている。さすが、日々姫デザインの制服だ」
1597 = "「……哪有什麼奇怪的。衣服很合身。不愧是日日姬設計的制服」" 

# 【凪】
# display as 凪
# JP: 「って、そぎゃん言い方好かんばい！！」
2214 = "「喂，誰要聽你扯這個啊！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2247 = "「嗯？」" 

# 【ふかみ】
# display as 深美
# JP: 「ですです。日々姫さんデザインの制服じゃなきゃ、\nわたしたち似合わないんです？　みたいな感じで」
2446 = "「是啊是啊。我們想要的是你對我們的評價，而不是日日姬小姐設計的制服」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2253 = "「噢噢」" 

# monologue
# JP: かなり強めに抗議され、\n言葉足らずにもほどがあったと思い知る。
3535 = "聽到她們這番強烈的抗議，我終於明白自己剛才漏說了多重要的話。" 

# 【双鉄】
# display as 雙鐵
