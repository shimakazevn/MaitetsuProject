3029 = "Không hề để lộ chút nôn nóng nào,\nNagi\nbước những bước cực kỳ hiệu quả hướng về\ntoa xe phía trước."

# monologue
# JP: ダイヤ調整については、レイルロオドに任せればいい。\nが、レイルロオドに料理のことまではわからない。
3559 = "Về việc điều chỉnh biểu đồ chạy tàu, cứ\ngiao cho Railord là được.\nNhưng Railord\nthì không thể rành về chuyện bếp núc."

# 【双鉄】
# display as 雙鐵
# JP: 「本来予定では、1800に文庫森駅着。\n\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;入庫体験と転車台体験を経て、1830発だな」
2117 = "「Theo dự kiến ban đầu, 18:00 sẽ đến ga\nBungomori.\nSau khi trải nghiệm đưa xe vào \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;\nvà trải nghiệm \\x%l転車台;#00ffc040;bàn quay đầu máy%l;#;, 18:30 sẽ\nxuất phát.」"

# 【ふかみ】
# display as 深美
# JP: 「\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;内で、20分間の観光下車があります。\nその間に、\x%lギャレー;#00ffc040;ギャレー%l;#;の準備の予定でした」
2264 = "「Sẽ có 20 phút xuống xe tham quan bên\ntrong \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;.\nTheo dự kiến, chúng ta sẽ chuẩn bị\n\\x%lギャレー;#00ffc040;bếp trên tàu%l;#; trong khoảng thời gian đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「15分遅延となると、\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;観光停車中の\n\x%lギャレー;#00ffc040;ギャレー%l;#;準備はかなり難しくなるな」
2292 = "「Nếu chậm trễ 15 phút, thì việc chuẩn bị \\x%lギャレー;#00ffc040;bếp trên tàu%l;#;\ntrong lúc dừng xe tham quan ở \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;\nsẽ khá là\nkhó khăn đấy.」"

# monologue
# JP: ディナーとなると皿数も料理数も多い。\n20分まるまるを使っての準備となることも考えられる。
3363 = "Bữa tối thì số lượng đĩa và món ăn đều\nnhiều.\nCó khả năng sẽ phải dùng trọn vẹn\n20 phút để chuẩn bị."

# monologue
# JP: 1805\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;入庫、1825\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;出庫が\n本来の予定なのだから……
3052 = "Vì dự kiến ban đầu là 18:05 đưa xe vào \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;\n,\n18:25 đưa xe ra khỏi \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;\nmà……"

# 【双鉄】
# display as 雙鐵
# JP: 「[じゅうはちじにじゅっぷん,3]1820に料理がついたとして、20分の準備で、\n1840\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;出庫――そのまま15分遅延となるか」
2296 = "「Giả sử 18:20 món ăn được đưa đến, mất 20\nphút chuẩn bị,\n18:40 đưa xe ra khỏi \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;\n――vậy\nlà vẫn bị chậm 15 phút à.」"

# 【ふかみ】
# display as 深美
# JP: 「[じゅうはちじよんじゅっぷん,3]1840まで、\n\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;観光停車を延長するってことですね？」
2032 = "「Nghĩa là chúng ta sẽ kéo dài thời gian\ndừng xe tham quan ở \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;\nđến 18:40 đúng không\nạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。文庫森から湯富院までの短い距離に、\nたっぷりと時間を取ってある。回復運転は容易だろう」
2224 = "「Ừm. Quãng đường ngắn từ Bungomori đến\nYufuin,\nchúng ta đã dành ra rất nhiều thời\ngian. Việc chạy bù giờ chắc sẽ dễ dàng\nthôi.」"

# 【ふかみ】
# display as 深美
# JP: 「けど。そのノロノロ運転は、お客様のお食事のためです。\n回復のために急げば、お食事時間が短くなります」
2016 = "「Nhưng mà. Việc chạy chậm rì đó là để phục\nvụ bữa ăn của hành khách ạ.\nNếu tăng tốc\nđể chạy bù giờ, thời gian dùng bữa sẽ bị\nrút ngắn lại.」"

# monologue
# JP: ん……とわずかに考え込み、\n慎重そうな口調でふかみが提案してくる。
3407 = "Ưm…… Fukami hơi trầm ngâm suy nghĩ,\nrồi\nđưa ra đề xuất với giọng điệu có vẻ thận\ntrọng."

# 【ふかみ】
# display as 深美
# JP: 「遅延をそのまま、終点・大板まで持ち越すのが、\n安全といえば一番安全ですけど――」
2399 = "「Việc cứ để nguyên thời gian chậm trễ cho\nđến ga cuối Oita,\nnói về độ an toàn thì đó\nlà cách an toàn nhất, nhưng mà――」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、終点・大板からは船などへの接続もある。\nそれをご利用予定の方がいる可能性も考えねば」
2023 = "「Không được, từ ga cuối Oita còn có các\nchuyến phà kết nối chuyển tàu nữa.\nChúng\nta phải tính đến khả năng có hành khách dự\nđịnh sử dụng chúng.」"

# 【ふかみ】
# display as 深美
# JP: 「あ――そうですね。\n終点までには、ちゃんと回復できないと――」
2205 = "「A――Đúng vậy ạ.\nPhải làm sao để chạy bù\ngiờ đàng hoàng trước khi đến ga cuối mới\nđược――」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、まずい。ので、発が遅れた場合、\nどこかで回復運転を図らねば厳しい」
2236 = "「Ừm, gay go đấy. Cho nên, trong trường hợp\nxuất phát trễ,\nnếu không tìm cách chạy bù\ngiờ ở đâu đó thì sẽ rất khó khăn.」"

# monologue
# JP: 湯富院までは、湯富院下車のお客様が多いことを見込み、\n食事のためののろのろ運転となってはいるが――
3172 = "Cho đến Yufuin, vì dự đoán có nhiều hành\nkhách xuống ga này,\nnên tàu đang chạy chậm\nrì để phục vụ bữa ăn, nhưng mà――"

# monologue
# JP: ディナーが終わって湯富院を出れば、終点の大板までは、\nもはや旅を締めくくるだけの、通常運転だ。
3364 = "Sau khi bữa tối kết thúc và rời khỏi\nYufuin, đoạn đường đến ga cuối Oita,\nchỉ\ncòn là việc khép lại chuyến đi bằng tốc độ\nchạy bình thường."

# 【双鉄】
# display as 雙鐵
# JP: 「……食事時間を縮めることは、高級食堂列車である以上、\n極力避けるべきだよな？」
1616 = "「……Việc rút ngắn thời gian dùng bữa, với\ntư cách là một chuyến tàu nhà hàng cao\ncấp,\nchúng ta phải cố gắng tránh hết mức\ncó thể đúng không?」"

# 【ふかみ】
# display as 深美
# JP: 「はい。主役のディナーで、高級食堂列車ですから。\nそこを急かせば、全部台無しになるって思います」
2513 = "「Vâng ạ. Bữa tối là nhân vật chính, hơn\nnữa đây lại là tàu nhà hàng cao cấp.\nNếu\nhối thúc chuyện đó, em nghĩ mọi thứ sẽ xôi\nhỏng bỏng không mất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そこまでか」
2697 = "「Đến mức đó sao.」"

# 【ふかみ】
# display as 深美
# JP: 「ってわたしは思います、です。それに、\nお子さんやお年を召したお客様も多いですから」
2683 = "「Em nghĩ là vậy, ạ. Hơn nữa,\ncũng có rất\nnhiều hành khách là trẻ em và người lớn\ntuổi nữa ạ.」"

# monologue
# JP: ……観光接客についてのふかみの経験、\nそこからの意見を無視するなどは、ありえない。
1534 = "……Kinh nghiệm của Fukami trong việc tiếp\nđón khách du lịch,\nnhững ý kiến xuất phát\ntừ đó, tôi không thể nào phớt lờ được."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――」
2746 = "「Nếu vậy thì――」"

# 【凪】
# display as 凪
# JP: 「話してきたばい！\n湯富院-大板の間でも、なんとか5分は戻せるそうばい！」
2147 = "「Em đã nói chuyện xong rồi nè!\nGiữa Yufuin\nvà Oita, có vẻ như có thể xoay xở bù lại\nđược 5 phút đó nha!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2252 = "「噢」" 

# monologue
# JP: 何の相談をしなくとも、ふかみと凪の二人が揃って、\n“食事時間を短くする”を、最初から除外して考えている。
3398 = "Chẳng cần bàn bạc gì, cả Fukami và Nagi\nđều đồng lòng,\nngay từ đầu đã loại trừ\nphương án “rút ngắn thời gian dùng bữa”."

# monologue
# JP: であらば僕も、二人の意見と直感とに従おう。
3206 = "Nếu đã vậy, tôi cũng sẽ nghe theo ý kiến\nvà trực giác của hai người họ."

# 【双鉄】
# display as 雙鐵
# JP: 「あと10分。食事の時間を確保しつつ縮めるためには、\n配膳などの時間を詰めていくしかないが」
2706 = "「Còn 10 phút nữa. Để vừa đảm bảo thời gian\ndùng bữa vừa rút ngắn thời gian chậm trễ,\nchỉ còn cách cắt giảm thời gian phục vụ\nmón ăn thôi.」"

# monologue
# JP: 言った途端に、凪が全力で首を振る。
3201 = "Vừa dứt lời, Nagi đã lắc đầu nguầy nguậy."

# 【凪】
# display as 凪
# JP: 「絶対無理ばい！　10分も縮められるわけなかっ！！」
2579 = "「Tuyệt đối không được đâu nha! Làm sao mà\nrút ngắn được tận 10 phút chứ!!」"

# 【ふかみ】
# display as 深美
# JP: 「お客さまが観光下車中の配膳ですから、\n多少バタバタもできますけど、それでも3分程度しか」
2534 = "「Vì chúng ta phục vụ món ăn trong lúc hành\nkhách xuống tàu tham quan,\nnên có thể làm\nnhanh một chút, nhưng dù vậy cũng chỉ tiết\nkiệm được cỡ 3 phút thôi ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「……パレット全部の入換――文庫森駅のホームで、\n二分割して、お客様の前でやっちゃえば」
1609 = "「……Thay toàn bộ khay thức ăn――Trên sân ga\nBungomori,\nnếu chúng ta chia làm hai nhóm,\nrồi làm ngay trước mặt hành khách thì\nsao.」"

# 【ふかみ】
# display as 深美
# JP: 「え？」
# 2169 = "「哎？」" 

# monologue
# JP: 沈思黙考していた日々姫が、\n不意にぼそりと呟いて――
2939 = "Hibiki nãy giờ vẫn đang chìm trong suy tư,\nbất chợt lẩm bẩm――"

# monologue
# JP: （しゃっ！　しゃしゃしゃっ！！）
3714 = "（Xoẹt! Xoẹt xoẹt xoẹt!!）"

# monologue
# JP: 猛然と、日々姫の腕が動き始める。
3341 = "Bàn tay Hibiki bắt đầu thoăn thoắt di\nchuyển."

# monologue
# JP: スケッチブックに――\nああ――そうか、これは――これなら！
3507 = "Trên cuốn sổ phác thảo――\nA――Ra là vậy, cái\nnày――nếu là cách này!"

# 【日々姫】
# display as 日日姬
# JP: 「動線描いてみた。これならやれない？」
2373 = "「Em thử vẽ luồng di chuyển rồi. Như thế\nnày thì làm được đúng không?」"

# 【凪】
# display as 凪
# JP: 「わ！」
# 2160 = "「哇！」" 

# 【ふかみ】
# display as 深美
# JP: 「これ――すごいです」
2681 = "「Cái này――tuyệt quá ạ.」"

# monologue
# JP: 日々姫のスケッチブックには、\n文庫森駅のホーム図と、停車しているとれいん食堂。
3343 = "Trên cuốn sổ phác thảo của Hibiki,\nlà sơ\nđồ sân ga Bungomori, và Tàu nhà hàng đang\ndừng đỗ."

# monologue
# JP: そうして、ホーム上には――
3517 = "Và rồi, trên sân ga――"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、前方後方、\nどちらの車両にもドアがあるのだものな」
2384 = "「Ra vậy, phía trước và phía sau,\ntoa nào\ncũng có cửa ra vào mà.」"

# 【ふかみ】
# display as 深美
# JP: 「だから、配膳準備をホーム上で、\n最初から二分割しておけば」
2388 = "「Cho nên, nếu chúng ta chuẩn bị dọn món\ntrên sân ga,\nvà chia làm hai nhóm ngay từ\nđầu thì.」"

# 【凪】
# display as 凪
# JP: 「二チームで同時に配膳できるばい！\n時間、半分にできるとよ！！」
2331 = "「Hai đội có thể phục vụ món ăn cùng lúc\nluôn nè!\nThời gian sẽ giảm đi một nửa đó\nnha!!」"

# monologue
# JP: 頷くしかない。\nさすがは、日々姫だ。
3540 = "Tôi chỉ biết gật đầu đồng tình.\nQuả không\nhổ danh là Hibiki."

# monologue
# JP: 調理→配膳という旧来型の食堂車から解き放たれた、\n“とれいん食堂”の独自の強みを――
3600 = "Thoát khỏi khuôn mẫu toa ăn truyền thống\ntheo kiểu Nấu nướng → Phục vụ,\nphát huy\nthế mạnh độc đáo của “Tàu nhà hàng”――"

# 【双鉄】
# display as 雙鐵
# JP: 「この食堂、この列車をデザインした日々姫ゆえの……\n知り尽くしていなければ、決して出てこんアイディアだ」
2684 = "「Chính vì Hibiki là người thiết kế ra nhà\nhàng này, chuyến tàu này……\nNếu không hiểu\nrõ tận tường, thì tuyệt đối không thể nảy\nra ý tưởng này được.」"

# 【日々姫】
# display as 日日姬
# JP: 「そんなん、あたりまえのことやけん」
2532 = "「Chuyện đó, là điều đương nhiên mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あたりまえ、か」
2531 = "「Đương nhiên, sao.」"

# monologue
# JP: とれいん食堂が停車する、全ての駅に何度も下りて、\nすみからすみまでこと細やかな確認を繰り返してきた。
3090 = "Ở tất cả các nhà ga mà Tàu nhà hàng dừng\nlại, em ấy đã xuống tàu không biết bao\nnhiêu lần,\nlặp đi lặp lại việc kiểm tra tỉ\nmỉ từ ngóc ngách này đến ngóc ngách khác."

# monologue
# JP: その成果がいま、形となってあらわれている。\n当然のことを当然にする――日々姫は故に、一流なのだ。
3131 = "Thành quả đó giờ đây đang hiện hữu rõ\nràng.\nLàm những việc đương nhiên một cách\nđương nhiên――Đó là lý do vì sao Hibiki là\nngười xuất sắc nhất."

# 【双鉄】
# display as 雙鐵
# JP: 「これならいけるか――。いや――これで行こう。\n一号車は凪ふかみ。二号車は僕らでよいか？」
2686 = "「Cách này thì được chứ――. Không――Cứ làm\ntheo cách này đi.\nToa số 1 là Nagi và\nFukami. Toa số 2 là hai chúng ta, được\nchứ?」"

# 【凪】
# display as 凪
# JP: 「わかったばい！」
2430 = "「Em hiểu rồi nè!」"

# 【ふかみ】
# display as 深美
# JP: 「やれると思います。\nえと、わたし、[ぶんごもり,2]文庫森駅と雲閃さんにも」
2687 = "「Em nghĩ là làm được ạ.\nÀ ừm, em sẽ đi báo\ncho ga Bungomori và quán Unsen biết nữa.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、電話はわたしが」
2209 = "「A, để em gọi điện cho.」"

# monologue
# JP: いいながら、\n日々姫は僕にスケッチブックを預けてくる。
3351 = "Vừa nói,\nHibiki vừa đưa cuốn sổ phác thảo\ncho tôi giữ."

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことだ。凪はすまんが、文庫森――\n\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;に“5分早着”可能かを聞いてきてくれ」
2730 = "「Là vậy đó. Nagi, xin lỗi em nhưng,\nhãy\nhỏi xem Bungomori――\\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;\ncó thể “đến sớm 5\nphút” được không nhé.」"

# 【凪】
# display as 凪
# JP: 「聞いてくるばい！」
2682 = "「Em đi hỏi ngay đây nè!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみには、動線の再確認を頼めるか？\nこの図面に見落としがないかを、チェックしてくれ」
2126 = "「Fukami, nhờ em xác nhận lại luồng di\nchuyển nhé?\nHãy kiểm tra xem bản vẽ này có\nthiếu sót gì không.」"

# 【ふかみ】
# display as 深美
# JP: 「わかりました」
2428 = "「Em hiểu rồi ạ.」"

# 【凪】
# display as 凪
# JP: 「聞いてきたばい！　レイルロオドも運転士も、\n5分の早着は可能って返事してくれたばい！」
2367 = "「Em hỏi xong rồi nha! Cả Railord lẫn người\nlái tàu đều trả lời là,\ncó thể đến sớm 5\nphút đó nè!」"

# 【ふかみ】
# display as 深美
# JP: 「図面――これ、わたしには完璧って思えます」
2262 = "「Bản vẽ――Cái này, em thấy hoàn hảo rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば1755文庫森着。1800から\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;見学。\n1820分に\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;を出庫して、転車台体験」
2734 = "「Vậy thì 17:55 đến Bungomori. Từ 18:00\ntham quan \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;.\n18:20 đưa xe ra khỏi \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;\nvà trải\nnghiệm bàn quay đầu máy.」"

# 【日々姫】
# display as 日日姬
# JP: 「1825に文庫森駅ホーム再入線。\n10分で\x%lギャレー;#00ffc040;ギャレー%l;#;準備で1835に文庫森駅発！」
2777 = "「18:25 tàu vào lại sân ga Bungomori.\nDành\n10 phút chuẩn bị \\x%lギャレー;#00ffc040;bếp trên tàu%l;#; rồi 18:35\nxuất phát từ\nga Bungomori!」"

# 【ふかみ】
# display as 深美
# JP: 「それなら、5分の発車遅延ですみますから！\n湯富院から大板だけで遅延をゼロに回復できますね！」
2688 = "「Nếu vậy, chúng ta sẽ chỉ bị trễ giờ xuất\nphát 5 phút thôi ạ!\nChỉ cần đoạn từ Yufuin\nđến Oita là có thể chạy bù lại toàn bộ\nthời gian chậm trễ rồi nhỉ!」"

# 【凪】
# display as 凪
# JP: 「じゃ、このスケジュールでいけるように、\n凪さまお願いしてくるばい！」
2741 = "「Vậy thì, để có thể chạy theo lịch trình\nnày,\nNagi-sama sẽ đi dặn dò mọi người\nnha!」"

# 【ふかみ】
# display as 深美
# JP: 「わたしも、車内みてきます！」
2360 = "「Em cũng đi xem xét trong xe đây ạ!」"

# monologue
# JP: 頷きあってすぐさまに、凪とふかみは車内へ戻る。
3012 = "Vừa gật đầu đồng ý, Nagi và Fukami lập tức\nquay trở lại trong xe."

# monologue
# JP: 空白時間をなるべく少なく――\nふかみと凪も、プロの振る舞いを見せている。
3423 = "Cố gắng giảm thiểu tối đa thời gian\ntrống――\nFukami và Nagi cũng đang thể hiện\nphong thái chuyên nghiệp."

# 【日々姫】
# display as 日日姬
# JP: 「……はい。そのように。もし人が足りなければ、\nこちらで負担しますので。」
1612 = "「……Vâng. Cứ làm như vậy đi ạ. Nếu thiếu\nngười,\nbên này sẽ chịu trách nhiệm bù\nđắp.」"

# monologue
# JP: そして日々姫も、同様に。
3520 = "Và Hibiki cũng vậy."

# monologue
# JP: 雲仙の栃木さんと、豊後森の木本さんへの連絡を済ませ、\n頷き一つで、了解を得られたことを伝えてくれる。
3567 = "Em ấy đã liên lạc xong với anh Tochigi ở\nUnsen và anh Kimoto ở Bungomori,\nvà báo\ncho tôi biết là đã được sự đồng ý bằng một\ncái gật đầu."

# monologue
# JP: （ならば、僕も僕の仕事を――）
3725 = "（Nếu vậy, mình cũng phải làm công việc của\nmình thôi――）"

# monologue
# JP: 日々姫の目が見落とす何かを、見つけ出す。
3213 = "Tìm ra thứ gì đó mà đôi mắt của Hibiki đã\nbỏ sót."

# monologue
# JP: それこそが僕の仕事なのだと切り替えたなら\nすぐさまに、為すべきひとつが見えてくる。
3160 = "Ngay khi chuyển đổi suy nghĩ rằng đó chính\nlà công việc của mình,\ntôi lập tức nhận ra\nmột điều cần phải làm."

# 【双鉄】
# display as 雙鐵
# JP: 「今回の、[きゃくまえ,1]客前でのパレット搬入を演出にしよう。\nアクシデントと思わせてしまうのではなくて――」
2366 = "「Lần này, hãy biến việc mang khay thức ăn\nra trước mặt hành khách thành một màn\ntrình diễn đi.\nĐừng để họ nghĩ đó là một\nsự cố ngoài ý muốn――」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！　うん！！　\n旅の最後に『とれいん食堂の種明かし！』みたいに」
2198 = "「A! Vâng!!\nGiống như là 『Tiết lộ bí mật\ncủa Tàu nhà hàng!』 vào cuối chuyến đi ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな、その線でいこう。\nそのためには、車内アナウンスの内容変更がいるな」
2451 = "「Đúng vậy, cứ theo hướng đó đi.\nĐể làm\nđược vậy, chúng ta cần thay đổi nội dung\nthông báo trên tàu.」"

# 【斎藤】
# display as 齋藤
# JP: 「……\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;いうんは凄かとですねぇ。\n御一夜では見たこともなかとでしたが」
1619 = "「……\\x%l扇形機関庫;#00ffc040;Gara đầu máy hình ngành%l;#; tuyệt thật đấy\nnhỉ.\nỞ Ohimitera tôi\nchưa từng thấy bao giờ.」"

# 【真闇】
# display as 真闇
# JP: 「んーー。転車台もかわゆかとねぇ。\n思とったより、ずーっとゆっくりまわりよるけん」
2238 = "「Ưm. Bàn quay đầu máy cũng dễ thương ghê.\nNó quay chậm hơn nhiều so với chị nghĩ.」"

# 【斎藤】
# display as 齋藤
# JP: 「キュウロクやらいう機関庫は、ハチロクとくらべて、\n随分と大きゅうみえましたねぇ」
2718 = "「Cái gara đầu máy tên là Kyuroku gì đó, so\nvới Hachiroku,\ntrông có vẻ to hơn hẳn\nnhỉ.」"

# monologue
# JP: 言って、ふふっと斎藤さんは、\nまるで少女に戻ったかのような笑いをこぼす。
3671 = "Nói rồi, phu nhân Saito bật cười khúc\nkhích,\nnhư thể bà đã trở lại thành một\nthiếu nữ."

# 【斎藤】
# display as 齋藤
# JP: 「真闇お嬢。油ばつけて機関車磨くだなんて。\n日々姫お嬢みたいなことまでして」
2565 = "「Cô Mayami. Chuyện tra dầu rồi lau chùi\nđầu máy ấy.\nCô lại đi làm mấy việc giống\nnhư cô Hibiki vậy.」"

# 【真闇】
# display as 真闇
# JP: 「うふふっ、実はやってみたかったとよ。\nひーちゃんが、そーちゃんが、いっつもしとること」
2142 = "「Ư fufu, thực ra chị đã luôn muốn thử làm\nrồi.\nNhững việc mà Hi-chan và Sou-chan vẫn\nhay làm ấy.」"

# 【斎藤】
# display as 齋藤
# JP: 「ずいぶん楽しそうにしておられましたねぇ」
2108 = "「Trông cô có vẻ rất vui nhỉ.」"

# 【真闇】
# display as 真闇
# JP: 「楽しかったと！　ちっちゃかこからお年寄りまで、\n参加しとったひと、みんな笑顔で、夢中になっとったし」
2743 = "「Vui lắm luôn! Từ trẻ nhỏ đến người già,\nnhững người tham gia ai nấy đều tươi cười\nrạng rỡ, say mê làm việc mà.」"

# monologue
# JP: そう語る真闇姉の顔もまた、あどけないように輝いている。\n斎藤さんは、ゆっくり、ゆっくり、やさしく頷く。
2989 = "Khuôn mặt của chị Mayami khi kể lại chuyện\nđó cũng bừng sáng một cách ngây thơ.\nPhu\nnhân Saito chầm chậm, chầm chậm, dịu dàng\ngật đầu."

# 【斎藤】
# display as 齋藤
# JP: 「なら、なによりのことでしたねぇ。\n動いた分、お腹もようけにすきよったでしょう」
2723 = "「Vậy thì còn gì bằng nữa.\nVận động nhiều\nnhư vậy, chắc bụng cô cũng đói meo rồi\nnhỉ.」"

# 【真闇】
# display as 真闇
# JP: 「うん。ぺこぺこ」
2244 = "「Ừm. Đói meo rồi.」"

# 【凪】
# display as 凪
# JP: 「このあとは、お待ちかねのディナータイムばい！」
2404 = "「Sau đây, sẽ là thời gian dùng bữa tối mà\nmọi người hằng mong đợi đó nha!」"

# monologue
# JP: さて、いよいよだ。\n頷けば、日々姫がマイクを手に背を伸ばす。
3137 = "Nào, đến lúc rồi.\nKhi tôi gật đầu, Hibiki\ncầm lấy micro, vươn thẳng lưng."

# 【日々姫】
# display as 日日姬
# JP: 「みなさまここで、ただいまより再入線いたします、\n文庫森駅ホームの上をご覧ください」
2137 = "「Thưa quý hành khách, ngay bây giờ chúng\nta sẽ vào lại sân ga,\nxin quý vị hãy nhìn\nlên sân ga Bungomori.」"

# 【斎藤】
# display as 齋藤
# JP: 「なんぞ――白か服のひとがおりますねぇ」
2043 = "「Gì thế kia――Có người mặc áo trắng kìa.」"

# 【真闇】
# display as 真闇
# JP: 「料理人さん？　あ――あっ！　ああああ！！！」
2456 = "「Là đầu bếp sao? A――Á! A a a a!!!」"

# monologue
# JP: 真闇姉の大きな納得の声。\n日々姫の顔が思わずゆるむ。
3481 = "Giọng nói thể hiện sự vỡ lẽ to tướng của\nchị Mayami.\nKhuôn mặt Hibiki bất giác giãn\nra."

# 【日々姫】
# display as 日日姬
# JP: 「とれいん食堂は、みなさまがご覧になった、\n小さな\x%lギャレー;#00ffc040;ギャレー%l;#;、配膳設備しかもたない食堂列車です」
2501 = "「Tàu nhà hàng, như quý vị đã thấy,\nlà một\nchuyến tàu nhà hàng nhỏ chỉ có \\x%lギャレー;#00ffc040;bếp trên tàu%l;#;\nvà thiết\nbị phục vụ món ăn.」"

# 【斎藤】
# display as 齋藤
# JP: 「ああ――言われてみれば、まことですねぇ。\nあぎゃんと小さか厨房で、どぎゃんしてこれだけの」
2243 = "「A――Nghe cô nói mới để ý, đúng là vậy nhỉ.\nVới cái nhà bếp nhỏ xíu thế kia, làm sao\nmà nấu được ngần này món.」"

# monologue
# JP: 斎藤さんの言葉が止まる。\n目が、ホームへと舞い戻る。
3669 = "Lời nói của phu nhân Saito chợt dừng lại.\nÁnh mắt bà quay trở lại sân ga."

# monologue
# JP: 列車が止まる。停止位置ぴたりだ。一号車二号車の\nドア横すぐに、パレットたちが待っている。
3035 = "Đoàn tàu dừng lại. Vị trí dừng chuẩn xác.\nNgay cạnh cửa ra vào\ncủa toa số 1 và toa\nsố 2, những chiếc khay thức ăn đang chờ\nsẵn."

# 【日々姫】
# display as 日日姬
# JP: 「いまからどうぞ！\nとれいん食堂の秘密をご覧ください」
2405 = "「Bây giờ xin mời!\nHãy cùng chiêm ngưỡng bí\nmật của Tàu nhà hàng.」"

# monologue
# JP: ドアが開く。\n最初のパレットには盛り付け済みのスープとサラダ。
3575 = "Cửa mở ra.\nTrên chiếc khay đầu tiên là súp\nvà salad đã được bày biện sẵn."

# monologue
# JP: 凪ふかみ、僕と日々姫でそれを次々配膳していく。
3024 = "Nagi, Fukami, tôi và Hibiki lần lượt dọn\nchúng lên."

# monologue
# JP: （――よし！）
3673 = "（――Tốt!）"

# monologue
# JP: その間に、調理人たちが\x%lギャレー;#00ffc040;ギャレー%l;#;へと、\n主食、デザートを運び込む。
3096 = "Trong lúc đó, các đầu bếp mang món chính\nvà món tráng miệng\nvào trong \\x%lギャレー;#00ffc040;bếp trên tàu%l;#;."

# monologue
# JP: これなら、いける――\n思った次の瞬間にはもう、調理人たちは下車している。
3601 = "Thế này thì, ổn rồi――\nNgay khoảnh khắc tôi\nnghĩ vậy, các đầu bếp đã xuống tàu."

# monologue
# JP: （ガランガラン！　ガランガラン！！）
3699 = "（Keng keng! Keng keng!!）"

# monologue
# JP: 間髪いれず、レイルロオドが発車の振り鐘。\nとれいん食堂は滑り出す。
2944 = "Ngay lập tức, Railord rung chuông báo hiệu\nxuất phát.\nTàu nhà hàng bắt đầu lăn bánh."

# monologue
# JP: 時計を見る――文庫森駅発1834。延、4分。\n予定より、さらに一分短縮できた！
3192 = "Tôi nhìn đồng hồ――Xuất phát từ ga\nBungomori lúc 18:34. Trễ 4 phút.\nSo với dự\nkiến, chúng tôi đã rút ngắn thêm được một\nphút!"

# 【日々姫】
# display as 日日姬
# JP: 「ご覧いただけましたでしょうか？　とれいん食堂。\nご当地のとれたての食材を、インする食堂の秘密です」
2135 = "「Quý vị đã thấy rồi chứ ạ? Tàu nhà hàng.\nBí mật của nhà hàng đưa những nguyên liệu\ntươi ngon của địa phương vào trong đó ạ.」"

# 【斎藤】
# display as 齋藤
# JP: 「こぎゃんからくりで――\nあん狭くて小さか厨房で、これだけの料理ば」
2116 = "「Thì ra là nhờ cơ chế này――\nMới có thể làm\nra ngần này món ăn trong cái nhà bếp chật\nhẹp nhỏ xíu đó.」"

# 【真闇】
# display as 真闇
# JP: 「すごかとね。よーお考えられとる」
2550 = "「Tuyệt thật đấy. Ý tưởng hay quá đi mất.」"

# monologue
# JP: （パチ、パチ、パチ、パチ）
3702 = "（Bộp, bốp, bốp, bốp）"

# monologue
# JP: 真闇姉の拍手。\nすぐさまそれは、車内全てに伝播する。
3483 = "Tiếng vỗ tay của chị Mayami.\nNgay lập tức,\nnó lan truyền ra khắp trong xe."

# monologue
# JP: （パチパチパチパチパチパチパチ！！）
3728 = "（Bốp bốp bốp bốp bốp bốp bốp!!）"

# 【日々姫】
# display as 日日姬
# JP: 「あ――あっ」
2186 = "「A――A」"

# monologue
# JP: ああ、いかん。\n日々姫を促し、マイクを受け取る。
3075 = "A, không được rồi.\nTôi giục Hibiki, rồi\nnhận lấy micro."

# 【双鉄】
# display as 雙鐵
# JP: 「盛大な拍手をまことにありがとうございます。\nですが、ご賞賛をいただくにはいささか早すぎます」
2758 = "「Xin chân thành cảm ơn tràng pháo tay nồng\nnhiệt của quý vị.\nNhưng mà, để nhận được\nlời khen ngợi thì vẫn còn hơi sớm đấy ạ.」"

# monologue
# JP: １号車から、凪とふかみが舞い戻ってくる。\nすぐさま配膳の準備にかかる。
3016 = "Từ toa số 1, Nagi và Fukami hớt hải chạy\nvề.\nLập tức bắt tay vào chuẩn bị dọn món."

# 【双鉄】
# display as 雙鐵
# JP: 「ディナーはこれからでございます。続きましては、\nメインの一皿。どうぞ、ご堪能くださいませ」
2467 = "「Bữa tối giờ mới thực sự bắt đầu. Tiếp\ntheo đây,\nlà món chính. Xin mời quý vị\nthưởng thức.」"

# 【ふかみ】
# display as 深美
# JP: 「ディナーはお楽しみいただけましたでしょうか？\nまもなく、この列車は[ゆふいん,2]湯富院、湯富院に到着します」
2131 = "「Quý khách có hài lòng với bữa tối không\nạ?\nSắp tới, chuyến tàu này sẽ đến Yufuin,\nga Yufuin ạ.」"

# 【凪】
# display as 凪
# JP: 「[ゆふいん,2]湯富院ば、静かで綺麗な温泉地ばい！\n駅前の観光馬車には、乗らんともったいなかとよー」
2524 = "「Yufuin là một khu suối nước nóng yên tĩnh\nvà xinh đẹp lắm đó nha!\nĐến đây mà không\nđi xe ngựa tham quan trước ga thì phí lắm\nluôn nè~」"

# 【ふかみ】
# display as 深美
# JP: 「っていっても、今はもう営業時間外ですけど。\nどうぞ、明日の朝にお楽しみくださいね。です！」
2017 = "「Nói là vậy, nhưng bây giờ đã hết giờ hoạt\nđộng rồi ạ.\nXin quý khách hãy chờ đến sáng\nmai để trải nghiệm nhé. Ạ!」"

# monologue
# JP: （～♪）
3729 = "（~♪）"

# 【真闇】
# display as 真闇
# JP: 「あー、おいしかったぁ」
2211 = "「A~ Ngon quá đi mất~」"

# 【斎藤】
# display as 齋藤
# JP: 「もう[ゆふいん,2]湯富院、いう気がしますなぁ。\n終わってみれば、あっという間の旅ゆーか」
2479 = "「Cảm giác như mới chớp mắt đã đến Yufuin\nrồi nhỉ.\nChuyến đi kết thúc nhanh như một\ncơn gió vậy.」"

# 【真闇】
# display as 真闇
# JP: 「よねぇ」
2334 = "「Đúng vậy nhỉ.」"

# monologue
# JP: 真闇姉と斎藤さんとが、\n降車の準備をはじめている。
3475 = "Chị Mayami và phu nhân Saito,\nđang bắt đầu\nchuẩn bị xuống tàu."

# monologue
# JP: 周辺客の多くも、だ。\n凪とふかみはそれぞれに、サポートに動き回ってる。
3569 = "Nhiều hành khách xung quanh cũng vậy.\nNagi\nvà Fukami đang chia nhau chạy đôn chạy đáo\nđể hỗ trợ mọi người."

# 【斎藤】
# display as 齋藤
# JP: 「ん……」
2218 = "「Ưm……」"

# monologue
# JP: 斎藤さんが網棚の荷物を下ろそうとして、\n一瞬、戸惑った表情を――
3667 = "Phu nhân Saito định lấy hành lý trên giá\nđể hành lý xuống,\nnhưng trong thoáng chốc,\nbà lộ vẻ lúng túng――"

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 2192 = "「啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「お手伝いいたします」
2364 = "「Để em giúp một tay ạ.」"

# monologue
# JP: 考えるより先に動いた体を、慌てて止める。\n日々姫の方が早かった。
3196 = "Tôi vội vàng cản lại cơ thể đã hành động\ntrước cả suy nghĩ của mình.\nHibiki đã\nnhanh tay hơn."

# monologue
# JP: ならば日々姫にここは任せて――
3619 = "Nếu vậy thì cứ giao chỗ này cho Hibiki――"

# 【観光客】
# display as 游客
# JP: 「にーさん、こいばおろしておーせ」
2317 = "「Cậu thanh niên, lấy cái này xuống giúp\ntôi với.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい、お手伝いいたします」
2287 = "「Vâng, để cháu giúp ạ.」"

# monologue
# JP: 日々姫の徹底したこだわりで、\n網棚も、網ではなくて木製だ。
3439 = "Do sự khăng khăng đòi hỏi triệt để của\nHibiki,\ngiá để hành lý cũng không phải\nbằng lưới mà là bằng gỗ."

# monologue
# JP: その分上が見づらいせいか、ご高齢のお客様から、\n荷降ろしのサポート依頼がたてつづく。
3080 = "Có lẽ vì thế mà khó nhìn thấy bên trên,\nnên những hành khách lớn tuổi\nliên tục nhờ\nhỗ trợ lấy hành lý xuống."

# monologue
# JP: （ふむ。改善検討の点も見つかったな）
3705 = "（Ưm. Mình cũng tìm thấy điểm cần xem xét\ncải thiện rồi.）"

# 【観光客】
# display as 游客
# JP: 「いやあ、おらぁ乗り鉄なんだがよ。\nいままででいっとう楽しかった列車だったわ」
2166 = "「Chà, tôi là một người thích đi tàu.\nĐây\nlà chuyến tàu thú vị nhất mà tôi từng đi\ntừ trước đến nay đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは――それは、まことに光栄です」
2678 = "「Điều đó――Đó quả thực là niềm vinh hạnh\nlớn lao ạ.」"

# 【観光客】
# display as 游客
# JP: 「こんな感じで、九洲一周列車ば走らせーよ。\nの、[たいわん,1]鯛湾一周の、『[ハイシュンジーフォン,3]海巡之風』みてーによ」
2333 = "「Cứ theo đà này, hãy cho chạy một chuyến\ntàu vòng quanh Kyushu đi.\nGiống như chuyến\n『Hải Tuần Chi Phong』 vòng quanh Đài Loan\nấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。勉強させていただきます」
2631 = "「Xin cảm ơn bác. Cháu sẽ học hỏi thêm ạ.」"

# monologue
# JP: 冷静を装い返事をするが、\n驚きと、強い興奮とを感じている。
3171 = "Tôi cố tỏ ra bình tĩnh khi trả lời,\nnhưng\ntrong lòng lại cảm thấy kinh ngạc và vô\ncùng phấn khích."

# monologue
# JP: 鯛湾――海外の観光列車までをも知る方が、\n『いっとう楽しい』とまでご評価をくださったのだ。
3621 = "Đài Loan――Một người biết cả những chuyến\ntàu du lịch ở nước ngoài,\nmà lại đánh giá\nchuyến tàu này là 『thú vị nhất』."

# monologue
# JP: （いや、リップサービスももちろんあろう。\nそれに、快適でも優秀でもなく、“楽しい”だ）
3694 = "（Không, tất nhiên cũng có lời nói khách\nsáo trong đó.\nHơn nữa, không phải là thoải\nmái hay xuất sắc, mà là “thú vị”.）"

# monologue
# JP: 凪とふかみのパーソナリティ。お客様との相性。\nそうした部分にも大きく左右されそうな評価軸だ、が。
3020 = "Tính cách của Nagi và Fukami. Sự tương\nthích với hành khách.\nTiêu chí đánh giá có\nvẻ cũng bị ảnh hưởng nhiều bởi những yếu\ntố đó, nhưng mà."

# monologue
# JP: （やったな――日々姫――いや）
3708 = "（Làm tốt lắm――Hibiki――Không）"

# monologue
# JP: そうだ、日々姫だ。\n慌てて見れば――
3141 = "Đúng rồi, Hibiki.\nTôi vội vàng nhìn sang\nthì――"

# 【日々姫】
# display as 日日姬
# JP: 「ご不用のものがございましたら、どうぞこちらへ」
2294 = "「Nếu quý khách có rác cần vứt, xin vui\nlòng bỏ vào đây ạ.」"

# monologue
# JP: ……斎藤さんのサポートを、プロとして、\n適切迅速に終えたのだろう。
1528 = "……Chắc hẳn em ấy đã hoàn thành việc hỗ trợ\nphu nhân Saito một cách\nthích hợp và nhanh\nchóng với tư cách là một chuyên gia."

# monologue
# JP: 今はゴミ袋を手にもって、\n座席の間を、不要物回収に巡回している。
3129 = "Bây giờ em ấy đang cầm túi rác trên tay,\nđi dọc các lối đi giữa các hàng ghế để thu\ngom rác."

# 【真闇】
# display as 真闇
# JP: 「ああ――車掌、さん？　いま、ちょっとよかと」
2174 = "「A――Cô trưởng tàu ơi? Bây giờ cô rảnh một\nchút không.」"

# 【日々姫】
# display as 日日姬
# JP: 「はい、なんでしょう。お客様」
2463 = "「Vâng, có chuyện gì vậy ạ, thưa quý\nkhách.」"

# monologue
# JP: 真闇姉の呼びかけに日々姫がとまれば、\nすぐさまふかみが袋を受取り、不要物回収を引き継ぐ。
3321 = "Khi Hibiki dừng lại theo tiếng gọi của chị\nMayami,\nFukami lập tức nhận lấy chiếc túi\nvà tiếp quản việc thu gom rác."

# monologue
# JP: 職務上も正しい扱いだ。日々姫は添乗――指導車掌で、\nふかみは\x%lギャレー;#00ffc040;ギャレー%l;#;クルー、客室乗務員なのだから。
3609 = "Đó cũng là cách xử lý đúng đắn về mặt chức\nvụ. Hibiki là người đi kèm――trưởng tàu\nhướng dẫn,\ncòn Fukami là thành viên \\x%lギャレー;#00ffc040;bếp trên tàu%l;#;, là\nnhân viên phục vụ trên tàu mà."

# 【真闇】
# display as 真闇
# JP: 「こん列車のきっぷって、車掌さんからも買えっと？」
2695 = "「Vé của chuyến tàu này, có thể mua từ\ntrưởng tàu không?」"

# 【日々姫】
# display as 日日姬
# JP: 「はい、もちろん販売はできますが――」
2461 = "「Vâng, tất nhiên là có thể bán được ạ,\nnhưng mà――」"

# monologue
# JP: 日々姫が戸惑い、言葉を探してしまっている。\n困惑するもの無理はない。
3325 = "Hibiki lúng túng, cố tìm lời để nói.\nEm ấy\nbối rối cũng là điều đương nhiên."

# monologue
# JP: 真闇姉には、往復切符を渡しているのだ。\nが、それは私情。職務に関係させてはいけない。
3478 = "Chúng tôi đã đưa vé khứ hồi cho chị Mayami\nrồi.\nNhưng đó là chuyện cá nhân. Không\nđược để nó dính dáng đến công việc."

# 【双鉄】
# display as 雙鐵
# JP: 「もちろん販売できますが、\n車内補充券としての発券となってしまいます」
2184 = "「Tất nhiên là có thể bán được ạ,\nnhưng vé\nsẽ được xuất dưới dạng vé bổ sung trên\ntàu.」"

# monologue
# JP: ゆえに、即座に日々姫を支える。
3207 = "Vì vậy, tôi lập tức hỗ trợ Hibiki."

# monologue
# JP: 車内補充券の見本を見せて、\n“日々姫が戸惑った理由”をつくる。
3175 = "Tôi đưa ra mẫu vé bổ sung trên tàu,\ntạo ra\n“lý do khiến Hibiki lúng túng”."

# 【双鉄】
# display as 雙鐵
# JP: 「このように、手書きの簡素なものとなります。\n駅発行の切符とは異なる仕様となりますが」
2338 = "「Nó sẽ là một tờ vé viết tay đơn giản như\nthế này.\nQuy cách sẽ khác với vé được phát\nhành tại ga ạ.」"

# monologue
# JP: ああ、小さな声が聞こえる。\nどうやら周りの乗客たちも、納得をしてくれたらしい。
3197 = "A, tôi nghe thấy những tiếng xì xầm nho\nnhỏ.\nCó vẻ như những hành khách xung quanh\ncũng đã hiểu ra vấn đề."

# monologue
# JP: 駅発行のとれいん食堂きっぷは無論、日々姫デザイン。\n列車に似合う、上品で美しいものなのだから。
3574 = "Vé Tàu nhà hàng phát hành tại ga tất nhiên\nlà do Hibiki thiết kế.\nNó là một thứ trang\nnhã và tuyệt đẹp, rất phù hợp với chuyến\ntàu này."

# 【真闇】
# display as 真闇
# JP: 「うん。それは知っとー。プレゼントでもろうたけん。\nばってん――自分のお金で、こん列車で、買いたいんよ」
2226 = "「Ừm. Chuyện đó thì chị biết. Vì chị được\ntặng làm quà mà.\nNhưng mà――Chị muốn dùng\ntiền của chính mình, để mua vé trên chuyến\ntàu này.」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
2196 = "「!」"

# 【斎藤】
# display as 齋藤
# JP: 「まっことですなぁ」
2371 = "「Đúng là vậy nhỉ.」"

# monologue
# JP: ――斎藤さんも、自分の財布を出している。\nその口元は、微かに、確かに、ほころんでいる。
3665 = "――Phu nhân Saito cũng đang lấy ví của mình\nra.\nKhóe miệng bà hơi mỉm cười, một nụ\ncười thật sự."

# 【斎藤】
# display as 齋藤
# JP: 「良かもん買うなら、仕事で稼いだ、自分のお金で。\nそぎゃんとせんと、かえってもったいなかですけん」
2613 = "「Nếu muốn mua đồ tốt, thì phải dùng tiền\ncủa chính mình kiếm được từ công việc.\nNếu\nkhông làm vậy, ngược lại sẽ lãng phí lắm.」"

# 【日々姫】
# display as 日日姬
# JP: 「～～～～～～～っ」
2785 = "「~~~~~~~」"

# monologue
# JP: （ああ――）
3701 = "（A――）"

# monologue
# JP: 認めて貰えた。対価を払うそのことにより、\n自分の仕事と同等以上と――日々姫の仕事を。
3118 = "Chúng tôi đã được công nhận. Bằng việc trả\nmột mức giá tương xứng,\nhọ coi công việc\ncủa Hibiki――ngang bằng hoặc thậm chí cao\nhơn công việc của chính họ."

# monologue
# JP: 職人として――右田の蔵の杜氏と筆頭蔵人が、\n声を揃えて、形を示して、認めてくれた。
3067 = "Với tư cách là những người thợ――Trưởng hầm\nrượu và Thợ ủ rượu chính của xưởng rượu\nMigita,\nđã đồng thanh, thể hiện bằng hành\nđộng, và công nhận chúng tôi."

# 【真闇】
# display as 真闇
# JP: 「ゆーことやけん、車掌さん。帰りのきっぷ。\nしあさって発のを二枚、もらえると？」
2385 = "「Nên là vậy đó, cô trưởng tàu. Vé chiều\nvề.\nCho tôi hai vé xuất phát vào ngày mốt\nđược không?」"

# monologue
# JP: 日々姫に向かって、満面の笑顔で声をかけ、\n瞬間、真闇姉がしまったという顔になる。
3485 = "Chị Mayami cất tiếng gọi Hibiki với nụ\ncười rạng rỡ trên môi,\nnhưng ngay khoảnh\nkhắc tiếp theo, gương mặt chị lộ rõ vẻ bối\nrối như thể nhận ra mình lỡ lời."

# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
# 2187 = "「啊……」" 

# monologue
# JP: 日々姫は今、話をできる状態ではない。
3354 = "Hibiki lúc này không ở trong trạng thái có\nthể nói chuyện được."

# monologue
# JP: だが、これこそは日々姫の仕事だ。\nならば、僕にできるサポートは――
3059 = "Nhưng mà, đây chính là công việc của\nHibiki.\nNếu vậy, sự hỗ trợ mà tôi có thể\nlàm là――"

# 【双鉄】
# display as 雙鐵
# JP: 「少々、お時間をいただけますか？\n空席を確認いたします」
2628 = "「Quý khách có thể cho chúng tôi xin một\nchút thời gian được không ạ?\nChúng tôi sẽ\nkiểm tra chỗ trống.」"

# monologue
# JP: 連結部から様子を見ていた凪に、頷く。\n凪はしずしず、運転台へと向かっていく。
3189 = "Tôi gật đầu với Nagi, người đang quan sát\ntình hình từ phần nối các toa.\nNagi lặng\nlẽ tiến về phía buồng lái."

# 【ふかみ】
# display as 深美
# JP: 「あ、そか。ここ、山だから」
2206 = "「A, ra vậy. Ở đây là vùng núi mà.」"

# monologue
# JP: 思わずなのか、気を効かせてか、\nふかみが声を漏らしてくれる。
2947 = "Không biết là do buột miệng hay là tinh ý,\nFukami đã cất tiếng nói giúp chúng tôi."

# monologue
# JP: 山間で電波が悪く、ゆえに端末で空席照会をかけられない。\nならば――
3082 = "Vùng núi sóng yếu, nên không thể dùng\nthiết bị để tra cứu chỗ trống được.\nNếu\nvậy thì――"

# 【凪】
# display as 凪
# JP: 「レイルロオドに空席を確認してまいりました」
2374 = "「Tôi đã xác nhận chỗ trống với Railord rồi\nạ.」"

# monologue
# JP: 共感ならば電波状況は関係しない。\nよそ行きの凪から受け取る図面をゆっくり確かめる。
2986 = "Nếu là cộng cảm thì không liên quan gì đến\ntình trạng sóng điện thoại.\nTôi chậm rãi\nkiểm tra bản vẽ nhận được từ Nagi, người\nđang tỏ ra rất khách sáo."

# 【双鉄】
# display as 雙鐵
# JP: 「おまたせいたしました。お席のご用意は可能です」
2634 = "「Xin lỗi vì đã để quý khách phải đợi.\nChúng tôi có thể sắp xếp chỗ ngồi cho quý\nkhách ạ.」"

# monologue
# JP: しあさって――御一夜いきの一番列車ともならない、\nど平日発車の食堂列車。
3111 = "Ngày mốt――Chuyến tàu nhà hàng khởi hành\nvào một ngày trong tuần,\nthậm chí còn\nchẳng phải chuyến tàu đầu tiên đi\nOhimitera."

# monologue
# JP: それでも八割の席が埋まっていることに、\n内心ほっとし、同時にいささか悔しくも思う。
3050 = "Dù vậy, việc 80% số ghế đã được lấp đầy,\nkhiến tôi thầm thở phào nhẹ nhõm, nhưng\nđồng thời cũng cảm thấy đôi chút tiếc\nnuối."

# monologue
# JP: （湯富院・大板いきは、\n予約分全てが即日が満席になるというのに）
3727 = "（Trong khi chuyến đi Yufuin - Oita,\ntoàn\nbộ số vé đặt trước đều bán hết sạch ngay\ntrong ngày.）"

# monologue
# JP: けれども、走り初めたばかりだ。
2952 = "Nhưng mà, chúng tôi chỉ mới bắt đầu chạy\nthôi."

# monologue
# JP: 御一夜の魅力が知られれば、\nすぐにこちらも、満席続きとできるはずだ。
3149 = "Nếu sức hấp dẫn của Ohimitera được nhiều\nngười biết đến,\nchắc chắn tuyến đường này\ncũng sẽ sớm liên tục cháy vé thôi."

# 【真闇】
# display as 真闇
# JP: 「ほんなら――」
2416 = "「Nếu vậy thì――」"

# monologue
# JP: ちらり、と真闇姉が日々姫を伺う。\nどうか――その肩は、いまだ僅かに震えているが――
3473 = "Chị Mayami khẽ liếc nhìn Hibiki.\nLàm sao\nđây――Bờ vai ấy vẫn đang run rẩy nhè nhẹ,\nnhưng mà――"

# 【斎藤】
# display as 齋藤
