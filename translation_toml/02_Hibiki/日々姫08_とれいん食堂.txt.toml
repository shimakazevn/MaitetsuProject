3085 = "Fukami đang chuẩn bị bát đĩa ở \\x%lギャレー;#00ffc040;bếp trên tàu%l;#;\nđột nhiên ngồi xổm xuống."

# 【ふかみ】
# display as 深美
# JP: 「はい。もしもし。とれいん食堂、早瀬です。\nえ？　あ――はい。遅延――ああ、はい。了解です」
2431 = "「Vâng. Alo. Hayase của Toa ăn Train xin\nnghe.\nHả? A——vâng. Chậm trễ——a, vâng. Cháu hiểu\nrồi ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「トラブルか？」
2088 = "「Có rắc rối sao?」"

# monologue
