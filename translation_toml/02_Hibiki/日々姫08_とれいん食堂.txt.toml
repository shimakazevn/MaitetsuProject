[script]
# lines: 626 
# 【日々姫】
# display as 日日姬
# JP: 「ううう～～っ」
2181 = "「Uuu~~」"
# monologue
# JP: ……そわそわしている。気持ちはわかる。\nけれどもここは、文庫森の\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;。公共の場だ。
1521 = "......Em ấy đang bồn chồn. Tôi hiểu cảm giác đó. Nhưng đây là \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#; Bungomori. Là nơi công cộng."
# 【双鉄】
# display as 雙鐵
# JP: 「落ち着け、日々姫。\n幼い顔を見せるのは、僕とふたりだけのときにしろ」
2419 = "「Bình tĩnh lại đi, Hibiki. Chỉ được tỏ vẻ trẻ con khi có hai người chúng ta thôi đấy」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんこつはわかっとー！\nわかっとーけど」
2689 = "「Chuyện đó thì em biết chứ! Biết thì biết nhưng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
2180 = "「Hửm」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
2213 = "「!!?」"
# monologue
# JP: \\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;の奥の方、目隠しにかけられているシートが\nこんもりと、人の形に盛り上がる。
3089 = "Phía trong cùng của \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;, tấm bạt che chắn nhô lên một khối hình người."
# monologue
# JP: そこをくぐって出てきたのは――
3635 = "Người chui ra từ đó là——"
# 【栃木】
# display as 櫪木
# JP: 「いや、素晴らしいっちゃ！\nこぎゃんと、よーお思いついたっちゃのう！！」
2164 = "「Ây chà, tuyệt vời quá đi! Làm sao mà cô cậu nghĩ ra được hay thế!!」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
2192 = "「A」"
# monologue
# JP: 栃木さん――レストラン『雲仙』のオーナーにして、\n元食堂車のチーフを勤めた、凄腕シェフだ。
3359 = "Bác Tochigi——chủ nhà hàng 'Unzen', từng là bếp trưởng toa ăn, một đầu bếp tài ba."
# monologue
# JP: その凄腕を、ぴしり、と老技師――\n木本さんがひとはたきする。
3525 = "Vị đầu bếp tài ba ấy vừa bị kỹ sư lão thành—— bác Kimoto vỗ cái bốp."
# 【木本】
# display as 木本
# JP: 「[とちのき,1]栃木！　日々姫先生にお前、\nなんちゅう口ばききよるか」
2496 = "「Tochigi! Cậu ăn nói kiểu gì với cô Hibiki thế hả」"
# 【栃木】
# display as 櫪木
# JP: 「こん嬢ちゃんが先生やったら、\nワシんごときは大先生ちゃよ！　食堂車ののー」
2612 = "「Nếu cô bé này là giáo viên, thì cỡ tôi đây phải là đại giáo sư rồi! Về toa ăn ấy」"
# 【日々姫】
# display as 日日姬
# JP: 「本当にそのとおりだと思います。\n[とちのき,1]栃木さんのお話なしではこの列車は産まれませんでした」
2692 = "「Cháu thực sự nghĩ đúng là như vậy ạ. Nếu không có câu chuyện của bác Tochigi thì đoàn tàu này đã không ra đời」"
# monologue
# JP: 日々姫が深く頭をさげれば、栃木さんはカッカと笑う。
3333 = "Khi Hibiki cúi đầu thật sâu, bác Tochigi cười ha hả."
# 【栃木】
# display as 櫪木
# JP: 「ワシん話からこん列車ば産みだせるなら、\nいまごろ世の中は食堂車だらけっちゃ」
2610 = "「Nếu chỉ từ câu chuyện của tôi mà tạo ra được đoàn tàu này, thì giờ này trên đời đã đầy rẫy toa ăn rồi」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
2169 = "「Hả?」"
# 【木本】
# display as 木本
# JP: 「[ていてつ,1]帝鉄マニアば、栃木んとこにはよー行きよるとですよ。\nこん男は、食堂車の話ばするのが好きですけんのう」
2342 = "「Mấy tay cuồng Đường sắt Hoàng gia hay lui tới chỗ Tochigi lắm. Tên này thích nói chuyện về toa ăn mà lại」"
# 【栃木】
# display as 櫪木
# JP: 「話しとるのは、誰にでも同じような思い出話ちゃ。\nそれを新列車につなげたんは、嬢ちゃんが初めてっちゃ」
2715 = "「Chuyện tôi kể cho ai cũng chỉ là mấy kỷ niệm cũ rích thôi. Cô bé là người đầu tiên kết nối nó với một đoàn tàu mới đấy」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……」
2187 = "「A......」"
# monologue
# JP: ……木本さんにご紹介いただき、\n栃木さんに初めてお会いしたときのことを想い出す。
1525 = "......Tôi nhớ lại lần đầu tiên gặp bác Tochigi qua sự giới thiệu của bác Kimoto."
# monologue
# JP: 『この程度の知識』さえもなかったところから、\nここにまで――よくぞたどり着いたものだと、僕さえ思う。
3611 = "Từ chỗ thậm chí còn không có 'kiến thức ở mức độ này', đến tận đây——ngay cả tôi cũng thấy chúng tôi đã đi được một chặng đường dài."
# 【栃木】
# display as 櫪木
# JP: 「ようこげな列車を思いつくもんっちゃ。\nあんたは――デザイナーいう話じゃが、発明家じゃね」
2557 = "「Làm sao mà cô nghĩ ra được đoàn tàu như thế này chứ. Cô bảo mình là nhà thiết kế, nhưng tôi thấy cô là nhà phát minh thì đúng hơn」"
# 【日々姫】
# display as 日日姬
# JP: 「お褒めいただき、うれしいです。けど――\n私のした仕事はやっぱり、デザインです」
2632 = "「Cháu rất vui khi được bác khen. Nhưng mà—— công việc cháu làm vẫn là thiết kế ạ」"
# 【木本】
# display as 木本
# JP: 「そげですか」
2685 = "「Vậy sao」"
# 【日々姫】
# display as 日日姬
# JP: 「デザインすることは、整頓すること。\n必要な要素を並べ替え、伝わりやすく示すことですから」
2616 = "「Thiết kế chính là sắp xếp. Là sắp xếp lại các yếu tố cần thiết và thể hiện chúng một cách dễ hiểu」"
# monologue
# JP: 日々姫の言葉に、木本さんは大きく頷く。\n栃木さんは、興味深そうに顎を撫でる。
3536 = "Trước lời của Hibiki, bác Kimoto gật đầu thật mạnh. Bác Tochigi vuốt cằm với vẻ đầy hứng thú."
# 【日々姫】
# display as 日日姬
# JP: 「だから。木本さんや栃木さん、みなさんからお話を、\n要素をいただけたから、このデザインが出来たんです」
2336 = "「Vì vậy. Nhờ có những câu chuyện, những yếu tố từ bác Kimoto, bác Tochigi và mọi người mà thiết kế này mới ra đời được ạ」"
# monologue
# JP: みなさん――\nああ、本当に、“みなさん”だ。
3110 = "Mọi người—— Ừ, đúng là 'mọi người'."
# monologue
# JP: “とれいん食堂”のアイディアを気に入った栃木さんは、その人脈を、惜しまず僕らに紹介してくださったから。
3608 = "Vì bác Tochigi rất thích ý tưởng 'Toa ăn Train', nên bác ấy đã không ngần ngại giới thiệu các mối quan hệ của mình cho chúng tôi."
# 【日々姫】
# display as 日日姬
# JP: 「[おおむた,2]大牟田、“ビストロ・ムティア”の上島さん。\n[くるめ,1]来目、“来目DEグルメ”の永元さん――」
2274 = "「Bác Ueshima của 'Bistro Mutia' ở Omuta. Bác Nagamoto của 'Kurume DE Gourmet' ở Kurume——」"
# monologue
# JP: ひとりひとりのお名前を日々姫が呼ぶたび、\nそれぞれの料理の味が思い出される。
3331 = "Mỗi khi Hibiki gọi tên từng người, hương vị món ăn của họ lại ùa về trong tâm trí tôi."
# monologue
# JP: 栃木さんのかつてのご同僚、お弟子、ご友人――\nその全員が超一流のシェフで同時に、鉄道を愛する方々だ。
3388 = "Những đồng nghiệp cũ, học trò, bạn bè của bác Tochigi—— Tất cả đều là những đầu bếp siêu hạng và đồng thời là những người yêu đường sắt."
# 【日々姫】
# display as 日日姬
# JP: 「とれいん食堂全停車駅での、最高の料理と観光。\nそう断言できる要素をいただけたからの、デザインです」
2258 = "「Ẩm thực và du lịch tuyệt vời nhất tại mọi ga dừng của Toa ăn Train. Nhờ có được những yếu tố có thể khẳng định như vậy nên mới có thiết kế này ạ」"
# 【栃木】
# display as 櫪木
# JP: 「そぎゃん言われると……まぁ、なんね」
2062 = "「Bị nói thế thì......chà, sao nhỉ」"
# 【木本】
# display as 木本
# JP: 「なんじゃ栃木。照れよったか」
2353 = "「Gì thế Tochigi. Xấu hổ à」"
# 【栃木】
# display as 櫪木
# JP: 「照れるかあほう！　そぎゃんじゃのーて……\nワシらも――料理も、似たもんかのうと思うたっちゃ」
2058 = "「Xấu hổ cái đồ ngốc! Không phải thế...... Tôi chỉ nghĩ chúng ta——nấu ăn cũng giống vậy thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「料理と……デザインが、ですか？」
2354 = "「Nấu ăn và......thiết kế giống nhau sao ạ?」"
# 【栃木】
# display as 櫪木
# JP: 「おうよ。素材がなくちゃあ、どぎゃん料理もできん。\n調理の前の、素材の仕入れも、料理のうちやきのー」
2440 = "「Ừ. Không có nguyên liệu thì chẳng nấu được món gì sất. Việc thu mua nguyên liệu trước khi chế biến cũng là một phần của nấu ăn mà」"
# 【木本】
# display as 木本
# JP: 「そいば言うたら、整備も同じよ。修理の始めば部品調達。\n代用品さえ入らんよーなら、応急処置しか出来んけん」
2063 = "「Nói vậy thì bảo dưỡng cũng thế. Bắt đầu sửa chữa là phải tìm phụ tùng. Nếu không có cả đồ thay thế thì chỉ có nước sơ cứu thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……あるいは全ての仕事が、\nそうした構造を持つものなのかもしれませんね」
2113 = "「Ra vậy......hoặc có lẽ mọi công việc đều có cấu trúc như vậy cũng nên」"
# 【栃木】
# display as 櫪木
# JP: 「かもの。そうして――どぎゃんとすぐれた素材でも、\n仕上げる腕が悪きゃあ台無しになるのも同じっちゃ」
2476 = "「Có thể lắm. Hơn nữa——dù nguyên liệu có tuyệt hảo đến đâu, mà tay nghề người làm kém thì cũng vứt đi, chuyện đó cũng giống nhau thôi」"
# monologue
# JP: 言って、栃木さんはどこかまぶしげに日々姫を見つめる。
3558 = "Nói rồi, bác Tochigi nhìn Hibiki với vẻ có chút chói lóa."
# 【栃木】
# display as 櫪木
# JP: 「嬢ちゃんは、若かのによか腕っ節のデザイナーやのー。\nどこで勉強しよったっちゃ？」
2027 = "「Cô bé còn trẻ mà đã là một nhà thiết kế có tay nghề cừ khôi rồi. Cô học ở đâu vậy?」"
# 【日々姫】
# display as 日日姬
# JP: 「どこで――っていうことはないです。独学で。\n流れでお仕事をいただきはじめて、だんだんって感じで」
2025 = "「Cũng không hẳn là ở đâu ạ. Cháu tự học thôi. Cứ thế nhận được công việc, rồi dần dần tiến bộ lên ạ」"
# 【栃木】
# display as 櫪木
# JP: 「独学」
2596 = "「Tự học」"
# monologue
# JP: 日々姫の答えに、栃木さんの目がまんまるになる。\nそうしてクっと喉がなり、柔かな笑みのアーチが描かれる。
3338 = "Trước câu trả lời của Hibiki, mắt bác Tochigi tròn xoe. Sau đó bác ấy tằng hắng một cái, rồi nở một nụ cười hiền hậu."
# 【栃木】
# display as 櫪木
# JP: 「ほんなら嬢ちゃんは、良か仕事に身近に触れて――\nそうして、大人になったんじゃろうねー」
2717 = "「Vậy là cô bé đã được tiếp xúc với những công việc tốt từ sớm—— rồi cứ thế mà trưởng thành nhỉ」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2192 = "「啊」" 
# monologue
# JP: 日々姫も明るい笑顔に変わる。\n力いっぱい、大きく頷く。
3313 = "Hibiki cũng chuyển sang nụ cười rạng rỡ. Em ấy gật đầu thật mạnh."
# 【日々姫】
# display as 日日姬
# JP: 「はいっ！！！」
2457 = "「Vâng ạ!!!」"
# 【栃木】
# display as 櫪木
# JP: 「じゃったらワシも、一流の仕事ば見せてやらんとのー。\nあん列車――もう数カ月で、走りよるっちゃね？」
2738 = "「Vậy thì tôi cũng phải cho cô xem công việc của một chuyên gia hàng đầu mới được. Đoàn tàu đó——chỉ vài tháng nữa là chạy rồi nhỉ?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい。[ぎそう,1]艤装もほとんど完了していますから。\n走行面を、次いで、設備を見るための試走を重ねて」
2458 = "「Vâng. \\x%l艤装;#00ffc040;Trang thiết bị nội ngoại thất%l;#; cũng gần như hoàn tất rồi ạ. Tiếp theo là chạy thử nhiều lần để kiểm tra mặt vận hành, sau đó là các thiết bị」"
# 【栃木】
# display as 櫪木
# JP: 「そいば済んだら、わしらも含めてのテストっちゃ？」
2573 = "「Xong mấy cái đó là đến bài kiểm tra có cả chúng tôi tham gia đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「そこまでの詳細はまだ詰めきれていませんが……\n概ね、そうした流れになるかとは思います」
2707 = "「Chi tiết đến mức đó thì cháu vẫn chưa chốt được...... nhưng cháu nghĩ đại khái sẽ theo trình tự như vậy ạ」"
# 【栃木】
# display as 櫪木
# JP: 「楽しみじゃのう、腕がなるっちゃ」
2553 = "「Đáng mong đợi đây, ngứa tay nghề quá rồi」"
# monologue
# JP: いってパシンと二の腕を叩き、\n栃木さんは、言葉そのまま、腕を鳴らす。
3389 = "Nói rồi bác Tochigi vỗ cái bốp vào bắp tay, đúng như lời bác ấy nói, khởi động tay chân."
# 【栃木】
# display as 櫪木
# JP: 「わしん料理が、また列車と旅ばできるとは、\n夢にも思うとらんかった！　ありがとの、嬢ちゃん」
2380 = "「Món ăn của tôi lại được đi du lịch cùng tàu hỏa một lần nữa, thật nằm mơ cũng không ngờ tới! Cảm ơn cô bé nhé」"
# 【日々姫】
# display as 日日姬
# JP: 「いえ――はいっ！」
2176 = "「Không có gì——vâng ạ!」"
# monologue
# JP: もう一度、日々姫が深々頭を下げる。
3315 = "Một lần nữa, Hibiki cúi đầu thật sâu."
# monologue
# JP: 木本さんに、栃木さんに。その向こう側につながっている、\nたくさんのたくさんの方々に。
3604 = "Gửi đến bác Kimoto, bác Tochigi. Và rất rất nhiều người đang kết nối ở phía bên kia."
# 【日々姫】
# display as 日日姬
# JP: 「どうか、よろしくおねがいします！！」
2623 = "「Trăm sự nhờ các bác ạ!!」"
# 【凪】
# display as 凪
# JP: 「じゃんっ。\nにーさん、どぎゃんとどぎゃんと？」
2750 = "「Tada. Anh hai, thấy sao thấy sao nè?」"
# 【ふかみ】
# display as 深美
# JP: 「あの……どこかおかしくない、ですか？」
2624 = "「Dạ......có chỗ nào kỳ lạ không, ạ?」"
# monologue
# JP: 目に新しい制服姿。
3117 = "Trang phục đồng phục mới mẻ trong mắt tôi."
# monologue
# JP: 普段と違う装いに、改めてしみじみ感じてしまう。\n凪もふかみも、健やかに成長したものだ。
3605 = "Trang phục khác hẳn ngày thường khiến tôi một lần nữa cảm nhận sâu sắc. Cả Nagi và Fukami đều đã trưởng thành khỏe mạnh."
# 【双鉄】
# display as 雙鐵
# JP: 「……おかしいところなぞ何ひとつない。\nよく似合っている。さすが、日々姫デザインの制服だ」
1597 = "「......Chẳng có chỗ nào kỳ lạ cả. Rất hợp với hai đứa. Quả không hổ danh đồng phục do Hibiki thiết kế」"
# 【凪】
# display as 凪
# JP: 「って、そぎゃん言い方好かんばい！！」
2214 = "「Ê, cách nói đó Nagi đại nhân không thích đâu nha!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2247 = "「Hửm?」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。日々姫さんデザインの制服じゃなきゃ、\nわたしたち似合わないんです？　みたいな感じで」
2446 = "「Đúng vậy đúng vậy. Cứ như thể anh đang bảo 'Nếu không phải đồng phục do chị Hibiki thiết kế thì hai đứa mặc không hợp đâu' ấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2253 = "「Ồ」"
# monologue
# JP: かなり強めに抗議され、\n言葉足らずにもほどがあったと思い知る。
3535 = "Bị phản đối khá gay gắt, tôi mới nhận ra mình đã nói thiếu ý đến mức nào."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。"[まご,1]馬子にも衣装"的に\n聞こえたなら本意ではない。お詫びして、訂正しよう」
2115 = "「Ra vậy. Nếu nghe giống như 'Người đẹp vì lụa' thì đó không phải ý của anh. Xin lỗi nhé, để anh sửa lại」"
# monologue
# JP: 二度目の失敗は許されない。
3508 = "Không thể để xảy ra thất bại lần thứ hai."
# monologue
# JP: 視線の強さにいささか気圧されながらも、\n言い落していた言葉を丁寧に継ぎ足していく。
3638 = "Dù hơi bị áp đảo bởi ánh nhìn mạnh mẽ của hai người, nhưng tôi vẫn cẩn thận bổ sung thêm những lời còn thiếu."
# 【双鉄】
# display as 雙鐵
# JP: 「凪の活発さと可愛らしさが素直に出て似合っている。\nその魅力が、いかにも働き者な印象にもなっている」
2693 = "「Sự hoạt bát và đáng yêu của Nagi được bộc lộ một cách tự nhiên, rất hợp. Sức hấp dẫn đó cũng tạo nên ấn tượng về một người chăm chỉ」"
# 【凪】
# display as 凪
# JP: 「わお！」
2159 = "「Oa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみの静かな美しさも、控えめに引き立っている。\n旅路の傍らにそっと[たたず]佇む、可憐な花の印象だ」
2694 = "「Vẻ đẹp trầm tĩnh của Fukami cũng được tôn lên một cách tinh tế. Mang ấn tượng về một bông hoa đáng yêu, khẽ nép mình bên lề đường du lịch」"
# 【ふかみ】
# display as 深美
# JP: 「こ、今度は、ちょっと――褒めすぎ、です」
2679 = "「Lần, lần này thì, hơi——khen quá lời rồi, ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「いうなれば動と静。太陽と月。\nふたりの魅力は正反対であるがゆえに眩しく――」
2401 = "「Có thể nói là động và tĩnh. Mặt trời và mặt trăng. Sức hấp dẫn của hai đứa hoàn toàn trái ngược nhau, chính vì vậy mà lại tỏa sáng rực rỡ——」"
# monologue
# JP: あらためて、頭の先からつま先までを眺め下ろす。
3180 = "Tôi lại nhìn từ đầu đến chân hai người một lần nữa."
# monologue
# JP: 初見の衝撃が薄れれば、\nそこに残るのはただただ素直な感慨だ。
3505 = "Khi cú sốc ban đầu phai nhạt đi, những gì đọng lại chỉ là sự cảm khái chân thành."
# 【双鉄】
# display as 雙鐵
# JP: 「その両方の魅力を、曲げることなく損なうことなく、\n日々姫の制服は、膨らませていると感じたのだ」
2064 = "「Anh cảm thấy đồng phục của Hibiki đã tôn lên sức hấp dẫn của cả hai mà không hề làm sai lệch hay suy giảm đi chút nào」"
# 【凪】
# display as 凪＆深美
# JP: 「あ」
# 2192 = "「啊」" 
# monologue
# JP: 凪とふかみの視線がぶつかる。\nお互いがお互いを眺め合い――ゆっくり、頷く。
3015 = "Ánh mắt của Nagi và Fukami chạm nhau. Hai người nhìn nhau——rồi từ từ gật đầu."
# 【凪】
# display as 凪
# JP: 「納得ばい」
2138 = "「Chấp nhận nè」"
# 【ふかみ】
# display as 深美
# JP: 「なるほど。です」
2114 = "「Ra vậy. Ạ」"
# monologue
# JP: これなら良かろう。\n言葉が足りずに誤解されてしまった部分は埋め終えた。
3603 = "Thế này thì ổn rồi. Phần bị hiểu lầm do nói thiếu ý đã được giải quyết xong."
# 【ふかみ】
# display as 深美
# JP: 「だけど、納得できちゃったから――\nそれでちょっとだけ、ヤキモチも感じちゃいましたです」
2019 = "「Nhưng mà, vì đã chấp nhận rồi—— nên em lại cảm thấy hơi ghen tị một chút ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ヤキモチ？」
2129 = "「Ghen tị?」"
# 【ふかみ】
# display as 深美
# JP: 「はい。双鉄おにいさん、本当に、\n日々姫さんのこと、大大大好きなんだなぁ、って」
2438 = "「Vâng. Em nghĩ là anh Soutetsu thực sự, rất rất rất thích chị Hibiki nhỉ」"
# 【凪】
# display as 凪
# JP: 「あ！　まっことそぎゃんと！　そうでもなけりゃ、\n服より先に、凪さまたちのことほめとるばい！！」
2199 = "「A! Đúng là vậy đó! Nếu không phải thế, thì anh đã khen tụi này trước khi khen quần áo rồi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2180 = "「唔」" 
# monologue
# JP: 確かにだ。凪とふかみの魅力を感じ――\nそれを言葉にするより早く、『理由』を僕は見つけだした。
3494 = "Đúng là vậy. Cảm nhận được sức hấp dẫn của Nagi và Fukami—— nhưng trước khi kịp nói thành lời, tôi đã tìm ra 'lý do'."
# monologue
# JP: それは日々姫のデザインを、常に意識しているからで――\n意識の根底にあるのは無論、日々姫への愛情に違いない。
3617 = "Đó là vì tôi luôn để tâm đến thiết kế của Hibiki—— và gốc rễ của sự quan tâm đó, dĩ nhiên không gì khác ngoài tình yêu dành cho em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ、改めて言われてみると、僕は四六時中、\n日々姫に関連する事ばかりを考え続けている気もするな」
2452 = "「Đúng vậy nhỉ, được hai đứa nói lại anh mới thấy, có vẻ như lúc nào anh cũng nghĩ đến những chuyện liên quan đến Hibiki thì phải」"
# 【凪】
# display as 凪
# JP: 「わおわおー！」
2156 = "「Oa oa oa!」"
# 【ふかみ】
# display as 深美
# JP: 「あははーごちそうさまです――てっ」
2193 = "「Ahaha, ăn cẩu lương no luôn rồi ạ——」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2182 = "「Hửm?」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、こほん」
2202 = "「A, e hèm」"
# monologue
# JP: ――今の会話が、聞こえてしまっていたらしい。\n首筋までが真っ赤になって、いつも以上に愛らしい。
1469 = "——Có vẻ như em ấy đã nghe thấy cuộc trò chuyện vừa rồi. Đỏ mặt đến tận cổ, trông em ấy còn đáng yêu hơn mọi ngày."
# 【日々姫】
# display as 日日姬
# JP: 「あの、みなさまのご歓談中、\nまことに恐縮ではありますが」
2719 = "「Dạ, trong lúc mọi người đang trò chuyện vui vẻ, thật sự rất ngại nhưng mà」"
# 【凪】
# display as 凪
# JP: 「ゴカンダンチュー？」
2499 = "「Trò chuyện vui vẻ?」"
# 【ふかみ】
# display as 深美
# JP: 「まことに、恐縮」
2308 = "「Thật sự, rất ngại」"
# monologue
# JP: ……照れ隠しをしようとしてなのか、\n選ぶ言葉の距離感が、完全に狂ってしまっている。
1516 = "......Có lẽ vì muốn che giấu sự ngượng ngùng, mà cách chọn từ ngữ của em ấy trở nên hoàn toàn xa lạ."
# 【日々姫】
# display as 日日姬
# JP: 「えと！　出発準備。制服――っていうか、\n身だしなみのチェックが終わったんなら」
2151 = "「À! Chuẩn bị xuất phát. Đồng phục——à không, nếu đã kiểm tra xong diện mạo rồi thì」"
# 【ふかみ】
# display as 深美
# JP: 「わぁあ！　そうでしたそうでした！」
2155 = "「Oa! Đúng rồi đúng rồi!」"
# 【凪】
# display as 凪
# JP: 「栄えある一号列車やけんね！　準備ば、\nいくらしても、しすぎっていうことはなかばーい！」
2680 = "「Đoàn tàu số 1 vinh quang mà lị! Chuẩn bị, có bao nhiêu cũng không thừa đâu nha!」"
# monologue
# JP: 日々姫の指摘をうけるやいなやで、\nふかみと凪は並んでパタパタ、駆け出していく。
3537 = "Vừa nhận được lời nhắc nhở của Hibiki, Fukami và Nagi đã lạch bạch chạy đi."
# 【ふかみ】
# display as 深美
# JP: 「わたし、車内の確認にかかります！　です！」
2369 = "「Em sẽ đi kiểm tra trong xe! Ạ!」"
# 【凪】
# display as 凪
# JP: 「したら凪さま！　車外、きっちり確認すると！！」
2739 = "「Vậy Nagi đại nhân! Sẽ kiểm tra kỹ lưỡng bên ngoài xe!!」"
# monologue
# JP: 走るふたりを日々姫が見守る。\nその横顔に、瞬時、見惚れる。
3327 = "Hibiki dõi theo hai người đang chạy đi. Khoảnh khắc đó, tôi đã say đắm nhìn góc nghiêng của em ấy."
# monologue
# JP: なんと立派な大人になって、\nなんと綺麗な女になったか。
3120 = "Em ấy đã trở thành một người lớn tuyệt vời, một người phụ nữ xinh đẹp biết bao."
# 【双鉄】
# display as 雙鐵
# JP: 「助けられた。ありがとう。自覚もできていなかったが、\n僕らはどこか、浮かれてしまっていたようだ」
2629 = "「Cứu anh một bàn thua trông thấy. Cảm ơn em. Anh còn không nhận ra, có vẻ như chúng ta đã hơi phấn khích quá đà rồi」"
# 【日々姫】
# display as 日日姬
# JP: 「浮かれてもらうのも嬉しかけどね。\n苦労ば、たーくさんしたこだし」
2545 = "「Mọi người vui vẻ thì em cũng mừng. Vì đứa bé này đã trải qua rất nhiều vất vả mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2444 = "「Đúng vậy」"
# monologue
# JP: 右田日々姫デザイン。食堂気動車『とれいん食堂』。\n車籍は肥颯みかん鉄道に置く、\\x%lHSMK;#00ffc040;HSMK%l;#;114と\\x%lHSMK;#00ffc040;HSMK%l;#;116。
3652 = "Thiết kế bởi Migita Hibiki. Toa ăn tự hành 'Toa ăn Train'. Đăng ký xe thuộc Đường sắt Hisatsu Mikan, \\x%lHSMK;#00ffc040;HSMK%l;#;114 và \\x%lHSMK;#00ffc040;HSMK%l;#;116."
# monologue
# JP: あまりの完成度の高さに感激したみかん鉄道側が、\nいつかの\\x%l中間車;#00ffc040;中間車%l;#;増備のために、番号を空けた大傑作だ。
3606 = "Cảm kích trước độ hoàn thiện quá cao, phía Đường sắt Mikan đã để trống một số thứ tự cho việc bổ sung \\x%l中間車;#00ffc040;toa giữa%l;#; vào một ngày nào đó, quả là một kiệt tác."
# 【双鉄】
# display as 雙鐵
# JP: 「が、常に安全が第一の使命だ。\n浮かれてそれを失念しては、話にもならん」
2018 = "「Nhưng, an toàn luôn là sứ mệnh hàng đầu. Nếu vì phấn khích mà quên mất điều đó thì chẳng còn gì để nói nữa」"
# 【日々姫】
# display as 日日姬
# JP: 「まっことね」
2570 = "「Đúng vậy nhỉ」"
# monologue
# JP: しかつめらしく、日々姫が頷く。
3353 = "Hibiki gật đầu với vẻ mặt nghiêm túc."
# 【日々姫】
# display as 日日姬
# JP: 「初日の今日は、にぃにとわたしも添乗するけど、\n明日からは、ぜぇんぶ任せねばいけんけん」
2757 = "「Ngày đầu tiên hôm nay, anh hai và em cũng sẽ đi cùng, nhưng từ ngày mai là phải giao phó toàn bộ cho hai đứa nó rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪とふかみの、『とれいん食堂』Ａチーム。\n思い切った人員配置ではあるが――」
2082 = "「Đội A của 'Toa ăn Train' gồm Nagi và Fukami. Dù là một sự bố trí nhân sự táo bạo nhưng——」"
# monologue
# JP: レールが繋がった効果によっての好影響で、\n御一夜の観光収入は右肩あがりを続けている。
3106 = "Nhờ hiệu ứng tích cực từ việc kết nối đường ray, doanh thu du lịch của Ohimitera vẫn tiếp tục tăng trưởng."
# monologue
# JP: クマ川下りの船頭さんたちも復帰をし、\nふかみの定期乗務も可能となった。
3633 = "Những người lái đò trên sông Kuma cũng đã trở lại, Fukami cũng đã có thể làm việc trên tàu định kỳ."
# 【日々姫】
# display as 日日姬
# JP: 「赤井さんが復帰してくれたけん、\n機関士/機関助士は回せるばってん――」
2259 = "「Nhờ anh Akai đã quay lại làm việc, nên vị trí Lái tàu/Phụ lái tàu đã có thể xoay xở được——」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪は、思い切った選択をしたよな。\n正機関士の資格を取得したばかりというのに」
2081 = "「Nagi đã đưa ra một lựa chọn táo bạo nhỉ. Dù vừa mới lấy được chứng chỉ Lái tàu chính thức xong」"
# monologue
# JP: 『ふかみちゃん一人じゃたよりなかけんね！』\nそう言い切ってあっさりと、凪は\\x%lギャレー;#00ffc040;ギャレー%l;#;兼務を選んだ。
1493 = "『Để Fukami một mình thì không yên tâm đâu!』 Nói dứt khoát như vậy, Nagi dễ dàng chọn kiêm nhiệm luôn công việc ở \\x%lギャレー;#00ffc040;bếp trên tàu%l;#;."
# monologue
# JP: 乗務時間の減少は、機関士としての回り道となりかねんが、\nその選択に、僕らが助けられたこともまた、間違いない。
3417 = "Thời gian làm việc trên tàu giảm đi có thể là một đường vòng đối với một Lái tàu, nhưng không thể phủ nhận rằng sự lựa chọn đó đã giúp ích cho chúng tôi rất nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「……全線通しで乗務するのは、レイルロオドを除けば\n\\x%lギャレー;#00ffc040;ギャレー%l;#;クルーだけとなる。凪とふかみの責任は重い」
1588 = "「......Làm việc trên tàu xuyên suốt toàn tuyến, ngoại trừ Railord ra thì chỉ có đội ngũ \\x%lギャレー;#00ffc040;bếp trên tàu%l;#;. Trách nhiệm của Nagi và Fukami rất nặng nề」"
# monologue
# JP: とれいん食堂レイルロオドは、\n改装前からの引き継ぎとなる冥国製――
3038 = "Railord của Toa ăn Train, được kế thừa từ trước khi cải tạo, là hàng do Mỹ sản xuất——"
# monologue
# JP: つまりは、汎用性に優れるという特徴を持ち、\nどの運転士、どころか、どの車両とも組める万能型だ。
3222 = "Tóm lại, mang đặc trưng là tính đa dụng cao, là kiểu đa năng có thể kết hợp với bất kỳ người lái tàu nào, thậm chí là bất kỳ toa xe nào."
# 【双鉄】
# display as 雙鐵
# JP: 「[めいこく,1]冥国式は、汎用性を持つ反面、日ノ本・[えい]詠式より\n車両理解の深さでは及ばないとも聞いている」
2585 = "「Hàng của Mỹ tuy có tính đa dụng cao, nhưng nghe nói về độ hiểu biết toa xe thì không bằng hàng của Hinamoto hay Anh」"
# 【日々姫】
# display as 日日姬
# JP: 「実際のとこそうみたい。改装あわせのデータ追記も\nギリギリだったくらい、容量的な余裕もなかったって」
2309 = "「Thực tế có vẻ là vậy. Việc bổ sung dữ liệu cho phù hợp với cải tạo cũng chỉ vừa sát nút, nghe nói là dung lượng cũng không còn dư dả gì」"
# 【双鉄】
# display as 雙鐵
# JP: 「登呂流湯さんか」
2350 = "「Bà chủ nhà tắm Tororyu-yu nói à」"
# 【日々姫】
# display as 日日姬
# JP: 「登呂流湯さん。ロースペックで単純な分、\n長持ちでがんばってくれるこ、っても聞いたけど」
2515 = "「Vâng. Vì cấu hình thấp và đơn giản, nên đứa bé đó sẽ bền bỉ và cố gắng làm việc, bà ấy cũng nói vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、車両周り以外。サービス部分については、\nなおさら人間だよりになってくるわけだな」
2748 = "「Nếu vậy, ngoài các vấn đề xung quanh toa xe. Về phần dịch vụ, lại càng phải dựa vào con người hơn nữa」"
# monologue
# JP: 保安を含めた基礎部分は改造前の気動車と大差がない。\nここはレイルロオドに頼っていいし、頼るべき点だ。
3047 = "Các phần cơ bản bao gồm cả bảo an không khác biệt nhiều so với toa xe tự hành trước khi cải tạo. Điểm này có thể dựa vào Railord, và cũng là điểm nên dựa vào."
# monologue
# JP: が――
2951 = "Nhưng——"
# 【日々姫】
# display as 日日姬
# JP: 「運転士さんと車掌さんも、\n鉄道会社が変わるごとの交代だもんね」
2765 = "「Lái tàu và Trưởng tàu cũng sẽ thay phiên nhau mỗi khi đổi công ty đường sắt nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2227 = "「Ừ」"
# monologue
# JP: （湯医）-御一夜-早戸間が御一夜鉄道。\n早戸-鹿兒島-千内-八ツ城-隈元までがみかん鉄道。
3719 = "Đoạn (Yui) - Ohimitera - Hayato là của Đường sắt Ohito. Từ Hayato - Kagoshima - Sendai - Yatsushiro - Kumamoto là của Đường sắt Mikan."
# monologue
# JP: 隈元-来目が二四鉄で、\n来目より先、湯富院を経て大板までは来大鉄道。
3630 = "Kumamoto - Kurume là của Đường sắt Nishitetsu, từ Kurume trở đi, qua Yufuin đến Oita là của Đường sắt Kurudai."
# 【日々姫】
# display as 日日姬
# JP: 「普通車としての湯医駅発が0545。御一夜着が0645。\n客扱いののち、食堂列車に変わっての発車が0700」
2051 = "「Khởi hành từ ga Yui với tư cách là tàu thường lúc 05:45. Đến Ohimitera lúc 06:45. Sau khi đón khách, chuyển thành toa ăn và xuất phát lúc 07:00」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこから0830までが朝食時間。[はやと,1]早戸着が0930で、\n乗務員交代。八ツ城着が1215で、発車後の昼食」
2526 = "「Từ đó đến 08:30 là thời gian ăn sáng. Đến Hayato lúc 09:30, đổi tổ lái. Đến Yatsushiro lúc 12:15, ăn trưa sau khi xuất phát」"
# 【日々姫】
# display as 日日姬
# JP: 「[くるめ,1]来目着は、1530でティータイムとスイーツ。\n文庫森1830発でディナー。湯富院2000。[おおいた,1]大板着が2130」
2774 = "「Đến Kurume lúc 15:30 là giờ uống trà và ăn đồ ngọt. Xuất phát từ Bungomori lúc 18:30 là bữa tối. Yufuin lúc 20:00. Đến Oita lúc 21:30」"
# monologue
# JP: 食事三回、ティータイム一回。\n更に\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;入庫まで体験できるフルボリューム。
3392 = "Ba bữa ăn chính, một bữa tiệc trà. Hơn nữa còn được trải nghiệm việc đưa vào \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;, một lịch trình dày đặc."
# monologue
# JP: ……\\x%lギャレー;#00ffc040;ギャレー%l;#;クルーの負担は大きい。\nそれを恐らく、理論で、直感で理解したから――
1499 = "......Gánh nặng của đội ngũ \\x%lギャレー;#00ffc040;bếp trên tàu%l;#; là rất lớn. Có lẽ vì hiểu được điều đó, bằng lý thuyết, bằng trực giác——"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、\\x%lギャレー;#00ffc040;ギャレー%l;#;まわりは全部オッケーだと思う。\nそっち終わったらダブルチェックしてもらえる？」
2319 = "「Nagi, khu vực \\x%lギャレー;#00ffc040;bếp trên tàu%l;#; tớ nghĩ là ổn hết rồi. Cậu xong bên đó thì kiểm tra chéo giúp tớ nhé?」"
# 【凪】
# display as 凪
# JP: 「こっちも今終わったとこばい！\n交代してダブルチェックばい！」
2696 = "「Bên này cũng vừa xong nè! Đổi chỗ rồi kiểm tra chéo nha!」"
# 【ふかみ】
# display as 深美
# JP: 「うん！」
2228 = "「Ừm!」"
# monologue
# JP: ――ふかみは僕らを、凪はふかみを支えるために、\n大きな大きな遠回りをあえて選択したのかもしれん。
1470 = "——Fukami vì muốn hỗ trợ chúng tôi, Nagi vì muốn hỗ trợ Fukami, mà có lẽ đã cố tình chọn một con đường vòng rất lớn."
# monologue
# JP: その決断を、大きな成果に繋げてふたりに返すことこそ、\n大人としての僕らの責任なのだと、改めて強く感じる。
3185 = "Tôi lại một lần nữa cảm nhận sâu sắc rằng, việc biến quyết định đó thành thành quả to lớn và đền đáp lại cho hai đứa, chính là trách nhiệm của những người lớn như chúng tôi."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、来た！」
2755 = "「Anh hai, đến rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――ああ」
2248 = "「Hửm? ——A」"
# 【山崎】
# display as 山崎
# JP: 「お待たせしました。本日分です」
2029 = "「Để mọi người đợi lâu. Phần của ngày hôm nay đây」"
# 【凪】
# display as 凪
# JP: 「わおわお！　来たばい来たばい！」
2157 = "「Oa oa! Đến rồi đến rồi!」"
# 【ふかみ】
# display as 深美
# JP: 「積み込み急ご。\n山崎さん、こっちにお願いします」
2653 = "「Nhanh chóng chất lên thôi. Cô Yamazaki, phiền cô để bên này ạ」"
# 【山崎】
# display as 山崎
# JP: 「はい」
2433 = "「Vâng」"
# monologue
# JP: 感慨にふける間もなく、発車準備が進んでいく。
3441 = "Không có thời gian để chìm đắm trong cảm xúc, công tác chuẩn bị xuất phát vẫn tiếp tục diễn ra."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、こいば冷蔵庫」
2326 = "「Fukami, cái này vào tủ lạnh nha」"
# 【ふかみ】
# display as 深美
# JP: 「冷蔵庫、リストオッケー。\n次、常温保存の方いって平気？」
2068 = "「Tủ lạnh, danh sách ok. Tiếp theo, chuyển sang phần bảo quản nhiệt độ phòng được chứ?」"
# 【凪】
# display as 凪
# JP: 「進めとるばーい！」
2752 = "「Tiến hành luôn nè!」"
# monologue
# JP: ……ずっと変わらぬ抜群のコンビネーションが、\n今は落ち着きをも湛えている。
1518 = "......Sự phối hợp ăn ý không hề thay đổi từ trước đến nay, giờ đây còn mang theo cả sự điềm tĩnh."
# monologue
# JP: 凪もふかみも成長したと――\n健やかな姿に、しみじみ感じる。
3021 = "Cả Nagi và Fukami đều đã trưởng thành—— Nhìn dáng vẻ khỏe mạnh của hai đứa, tôi cảm nhận sâu sắc điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「凪、ふかみ！　なにか手伝うことは」
2085 = "「Nagi, Fukami! Có cần anh giúp gì không」"
# 【凪】
# display as 凪
# JP: 「なかばい！　にーさんたちは、出番が来るまで\nのんびりしてたらそれでよかとよー！」
2010 = "「Không cần đâu! Mấy anh chị cứ thong thả cho đến khi tới lượt mình ra sân là được rồi!」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。もしも手伝ってもらっちゃったら、\nダメなとこあっても見落としちゃうかもですし」
2514 = "「Đúng vậy đúng vậy. Nếu nhờ anh chị giúp, nhỡ có chỗ nào sai sót thì có khi tụi em lại bỏ qua mất」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。しかし――」
2453 = "「Vậy sao. Nhưng mà——」"
# 【日々姫】
# display as 日日姬
# JP: 「任せよ？　にぃに」
2339 = "「Giao cho tụi nhỏ đi? Anh hai」"
# 【双鉄】
# display as 雙鐵
# JP: 「……ああ」
1598 = "「......Ừ」"
# monologue
# JP: 任せて信じて大丈夫。だから信じて任せるべき。\n日々姫の声は、そう言っている。
3254 = "Giao phó và tin tưởng là được. Nên hãy tin tưởng và giao phó. Giọng nói của Hibiki như đang nói vậy."
# monologue
# JP: ならば添乗である今日の僕らは、\nバックアップの乗員としての務めを果たすのみだ。
3618 = "Vậy thì hôm nay, những người đi cùng như chúng tôi, chỉ cần làm tốt nhiệm vụ của những nhân viên dự bị là đủ."
# 【日々姫】
# display as 日日姬
# JP: 「“とれいん食堂”の乗車受付、開始するみたい」
1572 = "「Có vẻ như việc đón khách lên 'Toa ăn Train' bắt đầu rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ざわめいているな、少し急ごう」
2480 = "「Đang xôn xao kìa, nhanh lên một chút nào」"
# monologue
# JP: 今日の御一夜駅改札は、新しい旅への送迎門だ。
2970 = "Cổng soát vé ga Ohimitera hôm nay, là cánh cổng đưa đón đến một hành trình mới."
# monologue
# JP: 旅立つ人を非日常へとお迎えする。\nそれこそが、僕らの今の仕事となる。
3583 = "Chào đón những người bắt đầu chuyến đi bước vào một không gian phi thường. Đó chính là công việc hiện tại của chúng tôi."
# 【日々姫】
# display as 日日姬
# JP: 「あ、待って、にぃに」
2212 = "「A, đợi đã, anh hai」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 2247 = "「嗯？」" 
# monologue
# JP: 駆け出そうとした足を柔らかな声に止められる。\n日々姫はにっこり、笑って僕に向き直る。
3178 = "Đôi chân vừa định chạy đi bị một giọng nói mềm mại gọi lại. Hibiki mỉm cười, quay mặt về phía tôi."
# 【日々姫】
# display as 日日姬
# JP: 「身だしなみ、おかしかとこなか？」
2056 = "「Trang phục, có chỗ nào kỳ lạ không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2252 = "「A——」"
# monologue
# JP: 日々姫デザインの制服を、\nあらためて上から下まで眺め回す。
3174 = "Tôi lại một lần nữa nhìn ngắm từ trên xuống dưới bộ đồng phục do Hibiki thiết kế."
# monologue
# JP: 浮かぶ言葉は、たったひとつだ。
3200 = "Chỉ có một từ duy nhất hiện lên trong đầu tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「美しい。おかしいところなどなにもない。\n世界一、日々姫に似合うし、着こなしているぞ」
2555 = "「Rất đẹp. Không có chỗ nào kỳ lạ cả. Hợp với Hibiki nhất trên thế giới, và em mặc nó cũng rất đẹp」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 2228 = "「嗯！」" 
# monologue
# JP: 日々姫の笑顔。\nこの最高の笑顔に迎えられ旅立つ人が羨ましい、と。
3188 = "Nụ cười của Hibiki. Tôi chợt ghen tị với những người được nụ cười tuyệt vời này chào đón khi bắt đầu chuyến đi."
# monologue
# JP: 愚かなこととはわかっていても――\n僕は僅かに、嫉妬する。
3194 = "Dù biết là một điều ngu ngốc—— nhưng tôi vẫn có chút ghen tị."
# monologue
# JP: （カタン、タタン――カタン、タタン）
3703 = "（Cạch, tạch——Cạch, tạch）"
# 【真闇】
# display as 真闇
# JP: 「ん……おいし」
2220 = "「Ưm......ngon quá」"
# 【斎藤】
# display as 齋藤
# JP: 「良かですねぇ。飲み親しんだ焼酎も、\nこぎゃん列車の中ですと、格別の味ばしますねぇ」
2552 = "「Tuyệt thật đấy. Rượu Shochu uống quen rồi, mà thưởng thức trên tàu hỏa thế này lại có hương vị đặc biệt hẳn」"
# 【真闇】
# display as 真闇
# JP: 「うん。まっこと旨かとねぇ」
2237 = "「Ừm. Thật sự rất ngon」"
# 【日々姫】
# display as 日日姬
# JP: 「…………」
1576 = "「............」"
# monologue
# JP: ほっと、小さな音が聞こえる。\n日々姫の息。
3198 = "Một tiếng thở phào nhẹ nhõm vang lên. Là tiếng thở của Hibiki."
# monologue
# JP: 肩が触れ合う距離にいてさえ、\n聞き逃してしまいそうなほどに、抑え込んだ息。
3143 = "Một tiếng thở bị kìm nén đến mức dù ở khoảng cách vai chạm vai, cũng có thể vô tình nghe sót."
# 【双鉄】
# display as 雙鐵
# JP: 「乗ってくれたな」
2281 = "「Chị ấy đã lên tàu rồi nhỉ」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2227 = "「嗯」" 
# monologue
# JP: 日々姫と僕からプレゼントした、\nとれいん食堂一号列車の往復全線乗車券。
3319 = "Vé trọn gói khứ hồi của Toa ăn Train chuyến số 1, món quà mà tôi và Hibiki đã tặng."
# monologue
# JP: 真闇姉は大喜びで受け取って、\n杜氏になってから初めての休暇をとってまでくれた。
3113 = "Chị Mayami đã vô cùng vui sướng nhận lấy, thậm chí còn xin nghỉ phép lần đầu tiên kể từ khi trở thành \\x%l杜氏;#00ffc040;Trưởng hầm rượu%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「斎藤さんと一緒の乗車とは、意外だったが」
2087 = "「Việc đi cùng với cô Saito thì hơi bất ngờ thật」"
# 【日々姫】
# display as 日日姬
# JP: 「そ？　私は意外とは思わんかったけど」
2454 = "「Vậy sao? Em thì lại không thấy bất ngờ chút nào」"
# 【双鉄】
# display as 雙鐵
# JP: 「――そうか」
2315 = "「——Vậy à」"
# monologue
