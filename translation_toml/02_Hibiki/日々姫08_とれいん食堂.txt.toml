3413 = "Em ấy gật đầu một cái.\nRồi cứ thế tiếp tục trả lời điện thoại."

# 【ふかみ】
# display as 深美
# JP: 「わかりました。その時間でお願いします。\nこちらから何かあれば折り返します。はい。それでは」
2425 = "「Cháu hiểu rồi ạ. Vậy nhờ bác đúng giờ đó\nnhé.\nBên cháu có gì thay đổi sẽ gọi lại ngay ạ.\nVâng. Chào bác」"

# 【双鉄】
# display as 雙鐵
# JP: 「報告を」
2268 = "「Báo cáo đi」"

# 【ふかみ】
# display as 深美
