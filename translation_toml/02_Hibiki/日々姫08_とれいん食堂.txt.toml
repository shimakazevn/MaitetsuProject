2449 = "「Phải đó. Thời tiết cũng tuyệt vời, dễ\nchịu thật đấy」"

# 【ふかみ】
# display as 深美
# JP: 「おかえりなさいませ。おしぼりをどうぞ。\nサービスのドリンクはいかがですか？」
2500 = "「Chào mừng quý khách đã quay lại. Xin mời\ndùng khăn tay.\nQuý khách có muốn dùng đồ uống phục vụ\nmiễn phí không ạ?」"

# monologue
# JP: 最初の乗客が戻るより先、\nふかみは素早くサービス体勢に復帰している。
3100 = "Trước khi hành khách đầu tiên quay lại,\nFukami đã nhanh chóng trở lại tư thế phục\nvụ."

