3471 = "Chị Mayami vươn vai thật lớn.\nNhìn biểu cảm đó, có vẻ như mọi chuyện đều\nsẽ suôn sẻ."

# monologue
# JP: （ブーっ、ブーっ）
3706 = "（Rung, rung）"

# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2192 = "「啊」" 

