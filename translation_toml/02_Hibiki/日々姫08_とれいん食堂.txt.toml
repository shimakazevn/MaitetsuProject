1499 = "……Gánh nặng của đội ngũ \\x%lギャレー;#00ffc040;bếp trên tàu%l;#; là\nrất lớn.\nCó lẽ vì hiểu được điều đó, bằng lý\nthuyết, bằng trực giác——"

