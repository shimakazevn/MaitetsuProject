3666 = "Cô Saito. Người làm rượu đứng đầu của nhà Migita, và là người đã đuổi Hibiki khỏi hầm rượu."
# monologue
# JP: 日々姫はずっと苦手にしていて、\n今でもやはり、変わらぬものかとも思っていたが……
3309 = "Hibiki vẫn luôn không hợp với cô ấy, tôi cứ tưởng đến giờ vẫn không có gì thay đổi, nhưng......"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇと斎藤さんやもん。自分らが抜けても\n蔵ん仕事ばまわるよう、しっかり人も育てとるし」
2725 = "「Vì là chị Mayami và cô Saito mà. Họ đã đào tạo người đàng hoàng, để dù họ có vắng mặt thì công việc trong hầm rượu vẫn trôi chảy」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2227 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「それに、ねぇねぇはねぇねぇやけん。\n私のこと、いつだって一番に考えてくれとるもん」
2589 = "「Hơn nữa, chị Mayami là chị Mayami mà. Lúc nào chị ấy cũng nghĩ cho em đầu tiên」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そうだな」
1611 = "「......Đúng vậy nhỉ」"
# monologue
# JP: 真闇姉が斎藤さんと乗車したのは、\n今の日々姫を、斎藤さんに見せるため。
3487 = "Việc chị Mayami lên tàu cùng cô Saito, là để cho cô Saito thấy được Hibiki của hiện tại."
# monologue
# JP: そこまでは理解していたが、\nそこから先には、考えが及んでいなかった。
2965 = "Tôi đã hiểu được đến đó, nhưng lại không nghĩ xa hơn được nữa."
# monologue
# JP: （お互いを深く信頼しあえる。それゆえの理解か）
3723 = "（Tin tưởng lẫn nhau sâu sắc. Sự thấu hiểu đó là từ đấy mà ra sao）"
# monologue
# JP: ――日々姫もまた、斎藤さんを認めている。\nそうできるだけの、大人になっている。
1473 = "——Hibiki cũng đã công nhận cô Saito. Em ấy đã trưởng thành đủ để làm được điều đó."
# monologue
# JP: 真闇姉は恐らくそこまで見通して……\n故にふたりに、お互いの“今”を見せようとしたのだろう。
3476 = "Có lẽ chị Mayami đã nhìn thấu đến tận đó...... Nên chị ấy mới muốn cho hai người thấy 'hiện tại' của nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「ならばこそ。きちんと仕事を果たさねばな」
2392 = "「Chính vì vậy. Chúng ta càng phải hoàn thành tốt công việc của mình」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2227 = "「嗯」" 
# monologue
# JP: 力みが無い。柔らかな笑顔。\nけれども声は緩まない。
3135 = "Không hề gượng gạo. Một nụ cười dịu dàng. Nhưng giọng nói lại không hề lơi lỏng."
# 【日々姫】
# display as 日日姬
# JP: 「ゆーても私たちは、\n仕事の無かとが、一番良かゆーことになるけど」
2621 = "「Nói thì nói vậy chứ, chúng ta không có việc gì làm mới là tốt nhất đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな」
# 2570 = "「確實是啊」" 
# monologue
# JP: 添乗とは、そういう役割。
3625 = "Đi cùng hỗ trợ, chính là vai trò như vậy."
# monologue
# JP: 最善の準備と注意とで、アクシデントの発生を防ぎ、\n何もせぬまま降車することを目指す仕事だ。
2975 = "Ngăn chặn sự cố xảy ra bằng sự chuẩn bị và chú ý tốt nhất, và hướng tới việc xuống tàu mà không phải làm gì cả."
# 【ふかみ】
# display as 深美
# JP: 「失礼します。\n空いたお皿をお下げしてもよろしいでしょうか？」
2396 = "「Xin lỗi vì đã làm phiền. Cháu có thể dọn đĩa trống đi được không ạ?」"
# 【真闇】
# display as 真闇
# JP: 「ええ、お願いします。とってもおいしかった」
2246 = "「Ừ, nhờ cháu nhé. Rất là ngon」"
# 【ふかみ】
# display as 深美
# JP: 「ありがとうございます。鮎と栗、それからなにより\nクマ焼酎は、御一夜の名物なんですよ」
2633 = "「Cháu cảm ơn ạ. Cá hương, hạt dẻ, và trên hết là rượu Shochu Kuma, đều là đặc sản của Ohimitera đó ạ」"
# 【真闇】
# display as 真闇
# JP: 「うふふっ。よー知っとぉよ」
2140 = "「Ufufu. Chị biết rõ lắm」"
# 【ふかみ】
# display as 深美
# JP: 「そうでしたか」
# 2685 = "「這樣啊」" 
# monologue
# JP: ……ふかみの接客は高いレベルで安定してる。\n車内は満席であるというのに、全くもって危なげない。
1533 = "......Kỹ năng tiếp khách của Fukami luôn ổn định ở mức cao. Dù trong xe đã kín chỗ, nhưng không hề có chút gì gọi là chệch choạc."
# 【凪】
# display as 凪
# JP: 「失礼いたします」
2397 = "「Xin lỗi vì đã làm phiền ạ」"
# monologue
# JP: \\x%l先頭車;#00ffc040;先頭車%l;#;側の給仕担当をしている凪は、\n食器を下げに二号車、\\x%lギャレー;#00ffc040;ギャレー%l;#;へと向かい――
3086 = "Nagi, người phụ trách phục vụ ở phía \\x%l先頭車;#00ffc040;toa dẫn đầu%l;#;, đang mang bát đĩa đi dọn về phía toa số hai, hướng về \\x%lギャレー;#00ffc040;bếp trên tàu%l;#;——"
# 【凪】
# display as 凪
# JP: 「失礼します」
2009 = "「Xin lỗi ạ」"
# 【ふかみ】
# display as 深美
# JP: 「はい、どうぞ」
2285 = "「Vâng, xin mời」"
# monologue
# JP: 凪とふかみだ。アイコンタクトで十分なところを、\nしかしきっちり声掛けし合い。すれ違う。
3018 = "Là Nagi và Fukami. Dù chỉ cần giao tiếp bằng mắt là đủ, nhưng hai đứa vẫn cất tiếng gọi nhau rõ ràng. Lướt qua nhau."
# monologue
# JP: そうすることで、周囲の乗客の注意も喚起し、\n突発事故の発生確率を、未然に低下させている。
3081 = "Bằng cách đó, cũng thu hút sự chú ý của hành khách xung quanh, giảm thiểu xác suất xảy ra sự cố bất ngờ từ trước."
# monologue
# JP: （永山夫人ゆずりのテクニックだ――\n学んだことが、経験が、たしかに受け継がれている）
3724 = "（Là kỹ thuật được thừa hưởng từ phu nhân Nagayama—— Những gì đã học, những kinh nghiệm, chắc chắn đã được truyền lại）"
# 【ふかみ】
# display as 深美
# JP: 「2号車4番テーブルのお子さん、退屈してるみたい。\n絵本もイヤがっちゃって」
2780 = "「Bé ở bàn số 4 toa số 2 có vẻ đang chán. Đưa sách tranh cũng không chịu xem」"
# 【凪】
# display as 凪
# JP: 「1号車A11と12の老夫婦から、\n[さがら,1]相樂氏のお寺のことば聞かれたばい」
2772 = "「Ông bà lão ở ghế A11 và A12 toa số 1, vừa hỏi về ngôi chùa của dòng họ Sagara nè」"
# 【ふかみ】
# display as 深美
# JP: 「にゃんこ寺のこと？　わかった、説明してくる」
2217 = "「Ý cậu là chùa mèo hả? Tớ hiểu rồi, tớ sẽ đi giải thích」"
# 【凪】
# display as 凪
# JP: 「じゃ、こっちは\nけん玉か特別席であやしてくるばい！」
2747 = "「Vậy, bên này tớ sẽ dùng Kendama hoặc ghế đặc biệt để dỗ bé nha!」"
# monologue
# JP: （こつん）
3720 = "（Cạch）"
# monologue
# JP: 軽く拳をぶっつけあって、\n凪とふかみが、一時的に持ち場をスイッチする。
3578 = "Cụm tay vào nhau nhẹ một cái, Nagi và Fukami tạm thời đổi vị trí cho nhau."
# monologue
# JP: 凪は民芸品置き場からけん玉をとり、\nふかみは書棚から御一夜史の冊子をとって。
3027 = "Nagi lấy Kendama từ khu vực đồ thủ công mỹ nghệ, Fukami lấy cuốn sách lịch sử Ohimitera từ giá sách."
# 【双鉄】
# display as 雙鐵
# JP: 「適材適所のスイッチか。\nさすがのコンビネーションだな」
2705 = "「Đổi người đúng người đúng việc sao. Quả là một sự kết hợp tuyệt vời」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2227 = "「嗯」" 
# monologue
# JP: マニュアル化したされたノウハウを、きちんと活かし、\nその上で応用を積み重ねていく。
3119 = "Tận dụng triệt để những bí quyết đã được tiêu chuẩn hóa, và không ngừng tích lũy, ứng dụng chúng."
# monologue
# JP: その繰り返しの上にこそ、\n最高のサービスが産まれるのだと、目の当たりにする。
3522 = "Chính nhờ sự lặp đi lặp lại đó, mà dịch vụ tuyệt vời nhất mới được sinh ra, tôi đã được chứng kiến tận mắt."
# 【日々姫】
# display as 日日姬
# JP: 「タイミング的にも、すごくいい配慮だと思う。\n全体にお客さま、乗り疲れが出始めるころだと思うし」
2381 = "「Về mặt thời điểm, em nghĩ đó cũng là một sự quan tâm rất tinh tế. Em nghĩ đây là lúc hành khách nói chung bắt đầu cảm thấy mệt mỏi vì đi tàu」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――そのようだな」
2233 = "「Ừm——có vẻ là vậy」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2192 = "「啊」" 
# 【真闇】
# display as 真闇
# JP: 「んっ……んーーー」
2219 = "「Ưm......ưm———」"
# monologue
# JP: 真闇姉が大きく伸びをする。
3469 = "Chị Mayami vươn vai thật lớn."
# monologue
# JP: それに釣られたかのように、\n斎藤さんも、ため息じみた声をだす。
3527 = "Như bị cuốn theo, cô Saito cũng phát ra tiếng như thở dài."
# 【斎藤】
# display as 齋藤
# JP: 「……内装ばどぎゃんと凝った列車いうても、\n見慣れてしまえば、飽きよりますなぁ」
1594 = "「......Dù là đoàn tàu có nội thất cầu kỳ đến đâu, nhìn quen rồi thì cũng đâm chán nhỉ」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんと？　なら、前の車両ば見てきたら？」
2455 = "「Vậy sao? Thế thì cô thử sang toa trước xem sao?」"
# 【斎藤】
# display as 齋藤
# JP: 「内装、こん車両と違うとですか？」
2106 = "「Nội thất khác với toa này sao?」"
# 【真闇】
# display as 真闇
# JP: 「うん、こっちの車両ば、厨房のあって、\n棚には九州各地のお菓子とか民芸品とかやけど」
2242 = "「Ừ, toa bên này có nhà bếp, trên kệ thì bày bánh kẹo và đồ thủ công mỹ nghệ của các vùng ở Kyushu」"
# 【斎藤】
# display as 齋藤
# JP: 「そげですねぇ。沿線の名物ば、\n綺麗に散りばめてありますねぇ」
2442 = "「Ra vậy nhỉ. Đặc sản dọc tuyến đường, được bài trí rải rác rất đẹp mắt」"
# 【真闇】
# display as 真闇
# JP: 「前の車両には、本棚とか、郷土のおもちゃとか。\nあと、ちびっこ向けの特別席もしつらえてあるとよ」
2590 = "「Toa phía trước có giá sách, đồ chơi dân gian. Ngoài ra còn có cả ghế đặc biệt dành cho trẻ em nữa đấy」"
# 【日々姫】
# display as 日日姬
# JP: 「わ！」
2160 = "「Oa!」"
# monologue
# JP: 抑えきれずに日々姫から、喜びの声が溢れ出す。
3323 = "Không kìm nén được, Hibiki thốt lên tiếng reo vui."
# monologue
# JP: 無理もない。真闇姉がそこまで細かくを見て、\nその上で楽しげに語ってくれているのだから。
3599 = "Cũng không trách được. Bởi vì chị Mayami đã quan sát chi tiết đến vậy, hơn nữa còn kể lại với vẻ rất thích thú."
# 【斎藤】
# display as 齋藤
# JP: 「……年寄りの足腰ですけん、\n走っとる列車の中ば、動き回りたくもありませんなぁ」
1606 = "「......Chân cẳng người già yếu rồi, tôi cũng không muốn đi lại lung tung trong lúc tàu đang chạy đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ……」
2178 = "「Hừm......」"
# monologue
# JP: 斎藤さんは、相変わらずに率直すぎるほど率直だ。\nが、それゆえに学べること――む！
3672 = "Cô Saito vẫn thẳng thắn đến mức quá mức thẳng thắn như mọi khi. Nhưng, cũng nhờ thế mà chúng tôi học hỏi được nhiều điều——hửm!"
# monologue
# JP: （♪～）
3675 = "（♪~）"
# 【凪】
# display as 凪
# JP: 「みなさま、ご乗車お疲れ様です。\n列車はまもなく、[さつまたき,3]颯摩多希、颯摩多希駅に到着ばい！」
2132 = "「Quý khách đi tàu đã vất vả rồi ạ. Đoàn tàu sắp sửa đến ga Satsumataki, Satsumataki rồi nè!」"
# monologue
# JP: 凪の元気なアナウンス。\nあえての方言放送は、乗客たちの顔を期待に輝かせる。
3357 = "Giọng thông báo tràn đầy năng lượng của Nagi. Việc cố tình dùng phương ngữ để phát thanh khiến khuôn mặt hành khách bừng sáng vẻ mong đợi."
# 【凪】
# display as 凪
# JP: 「颯摩多希駅では、20分の観光停車をするけんね。\nオーシャンビューに御案内、ばい！！」
2486 = "「Tại ga Satsumataki, tàu sẽ dừng 20 phút để tham quan nha. Xin mời quý khách chiêm ngưỡng cảnh biển nè!!」"
# 【ふかみ】
# display as 深美
# JP: 「ご当地の特産品もお土産に差し上げますので、\n是非、みなさま観光停車をお楽しみください。です」
2365 = "「Chúng tôi cũng sẽ dành tặng đặc sản địa phương làm quà lưu niệm, nên mong quý khách hãy tận hưởng khoảng thời gian dừng tàu tham quan này. Ạ」"
# monologue
# JP: (♪～)
25 = "(♪~)"
# 【真闇】
# display as 真闇
# JP: 「観光停車やって。\nオーシャンビュー、旅って感じの言葉よね」
2622 = "「Dừng tàu tham quan kìa. Cảnh biển, nghe là thấy đậm chất du lịch rồi nhỉ」"
# 【斎藤】
# display as 齋藤
# JP: 「御一夜じゃあ、\nどう転んでも見れん景色ですけんねぇ」
2535 = "「Ở Ohimitera thì, có làm thế nào cũng chẳng ngắm được cảnh đó đâu nhỉ」"
# monologue
# JP: 斎藤さんの声に元気が戻っている。\n日々姫が小さく、強く頷く。
3668 = "Giọng cô Saito đã có sinh khí trở lại. Hibiki gật đầu nhè nhẹ nhưng đầy mạnh mẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「最高のタイミングになったようだな。\n視察旅行の成果が、形になった」
2546 = "「Có vẻ như thời điểm tuyệt vời nhất đã đến rồi. Thành quả của chuyến đi khảo sát đã thành hình」"
# monologue
# JP: 乗り疲れからの途中下車。\n教えてもらった観光スポット。
3253 = "Xuống tàu giữa chừng vì mệt mỏi khi đi tàu. Điểm tham quan được mọi người chỉ cho."
# monologue
# JP: この旅程を組んだのもまた、\nたくさんのたくさんの繋がりだ。
3598 = "Việc lên lịch trình này cũng lại là nhờ rất nhiều, rất nhiều sự kết nối."
# 【日々姫】
# display as 日日姬
# JP: 「斎藤さん、元気に歩いていってくれたと！」
2057 = "「Cô Saito, đã đi bộ rất hăng hái đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ご要望があれば、車椅子も準備できたのだがな」
2222 = "「Ừm. Nếu có yêu cầu, chúng ta cũng đã chuẩn bị sẵn xe lăn rồi mà」"
# monologue
# JP: ……みくろとの出会いによって気付かされた、\nお体が不自由なお客様への、こまかな配慮。
1543 = "......Sự quan tâm tỉ mỉ dành cho những hành khách khuyết tật, mà tôi nhận ra được nhờ cuộc gặp gỡ với Mikuro."
# monologue
# JP: 今日はどうやら使わずじまいとなりそうな気配ではあるが、\nやはり準備があるだけで、こころの余裕が変わってくる。
3637 = "Hôm nay có vẻ như sẽ không dùng đến, nhưng quả thực chỉ cần có chuẩn bị sẵn, tâm lý cũng sẽ thoải mái hơn hẳn."
# 【凪】
# display as 凪
# JP: 「じゃ、オーシャンビューば楽しむけんねー！\nみなさん、気を付けてついてきてほしかとばーい！」
2726 = "「Vậy thì, cùng thưởng thức cảnh biển nha! Mọi người nhớ đi theo cẩn thận đó!」"
# 【ふかみ】
# display as 深美
# JP: 「行ってらっしゃいませ。\nどうぞ、お足もとにお気をつけて」
2003 = "「Chúc quý khách đi vui vẻ. Xin hãy chú ý bước chân ạ」"
# monologue
# JP: ……先頭は凪、最後尾をみかん鉄道車掌が固め、\n全乗客が観光停車のショートツアーに出てかけていく。
1539 = "......Dẫn đầu là Nagi, chốt đuôi là Trưởng tàu Đường sắt Mikan, tất cả hành khách bắt đầu chuyến đi ngắn trong thời gian dừng tàu tham quan."
# 【ふかみ】
# display as 深美
# JP: 「さて、と！」
2406 = "「Rồi, bắt đầu nào!」"
# monologue
# JP: その間にふかみはテーブル清掃、車内清掃。\n各部確認をもう一度。
3410 = "Trong lúc đó, Fukami dọn dẹp bàn, dọn dẹp trong xe. Kiểm tra lại các bộ phận một lần nữa."
# monologue
# JP: ご乗車くださったみなさまのマナーも素晴らしく、\nここでの作業は、大幅な余裕をもって完了する。
3440 = "Ý thức của các hành khách đi tàu cũng rất tuyệt vời, nên công việc ở đây được hoàn thành với thời gian dư dả."
# 【真闇】
# display as ？？？
# JP: 「わぁー！」
2153 = "「Oa!」"
# monologue
# JP: 真闇姉、の声だったろうか？\n海風に乗り、混じりけのない歓声が遠く聞こえてくる。
2943 = "Là giọng của chị Mayami sao? Theo gió biển, tiếng reo hò trong trẻo vang đến từ xa."
# 【日々姫】
# display as 日日姬
# JP: 「あ……ねぇねも、ここの景色気に入ってくれたと！」
2191 = "「A......chị Mayami cũng thích cảnh sắc ở đây!」"
# monologue
# JP: 聞こえるやいなやの日々姫の歓声。\nふかみもぶんぶん、大きく頷く。
3311 = "Ngay khi nghe thấy tiếng reo hò của Hibiki. Fukami cũng gật đầu lia lịa."
# 【ふかみ】
# display as 深美
# JP: 「ここの見晴らし最高ですよね。わたしと凪ちゃんも\n試運転のときとか、大興奮しちゃいましたから」
2691 = "「Tầm nhìn ở đây tuyệt vời lắm đúng không. Em và Nagi lúc chạy thử cũng phấn khích lắm luôn」"
# monologue
# JP: そう言いながらもテキパキと体は動き続ける。\n回収したての食器も綺麗に片付けられる。
3412 = "Dù miệng nói vậy nhưng cơ thể vẫn thoăn thoắt làm việc. Bát đĩa vừa thu dọn cũng được rửa sạch sẽ."
# 【特産品売り】
# display as 特產店
# JP: 「[さつまたき,3]颯摩多希のお土産ば、ここじゃよー！\nうるめにしらす。もちろん販売もしちょるよー」
2690 = "「Quà lưu niệm của Satsumataki ở đây nha! Cá mòi khô, cá cơm trắng. Tất nhiên là cũng có bán nha!」"
# 【真闇】
# display as 真闇
# JP: 「あら、おいしそ」
2167 = "「Ôi, trông ngon quá」"
# 【観光客】
# display as 游客
# JP: 「おお、こっちにもひとつ」
2172 = "「Ồ, cho tôi một phần bên này nữa」"
# 【凪】
# display as 凪
# JP: 「慌てんでも平気ばーい！\n売り物やけん、売るほどあるばい！」
2102 = "「Không cần vội đâu nha! Đồ bán mà, có đủ để bán luôn á!」"
# 【観光客】
# display as 游客
# JP: 「がっはっは！　そりゃあそうだ」
2161 = "「Gahahaha! Chuyện đó thì đúng rồi」"
# monologue
# JP: ホーム上の特設売店からは、にぎやかな声。
3502 = "Từ quầy hàng đặc biệt trên sân ga vang lên những tiếng ồn ào náo nhiệt."
# monologue
# JP: 凪がどれほど楽しい観光ガイドをしたのかが、\n乗客たちの笑い声からだけでも伝わってくる。
3534 = "Chỉ cần nghe tiếng cười của hành khách, cũng đủ biết Nagi đã làm hướng dẫn viên du lịch vui vẻ đến mức nào."
# 【ふかみ】
# display as 深美
# JP: 「あ、お迎えの準備しなきゃ」
2208 = "「A, phải chuẩn bị đón khách thôi」"
# monologue
# JP: 指差し確認。\n二度繰り返して――それで完了。
3211 = "\\x%l指差し確認;#00ffc040;Chỉ tay hô xác nhận%l;#;. Lặp lại hai lần——vậy là xong."
# monologue
# JP: ふかみの手配と段取りは、\nここまで完璧に機能している。
3403 = "Sự sắp xếp và trình tự của Fukami, đến lúc này vẫn đang hoạt động một cách hoàn hảo."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみも、凪も、見事なものだ。\nクマ川下りでの経験を、鮮やかに活かしてくれているな」
2053 = "「Cả Fukami và Nagi đều làm rất xuất sắc. Hai đứa đã tận dụng rất tốt kinh nghiệm làm việc trên thuyền xuôi dòng sông Kuma nhỉ」"
# monologue
# JP: ごくごく素直な賞賛に、\nけれどふかみは、きょとんと驚いた顔をする。
3204 = "Trước lời khen ngợi rất đỗi chân thành, nhưng Fukami lại tỏ vẻ ngạc nhiên ngơ ngác."
# 【ふかみ】
# display as 深美
# JP: 「え？　あんまりそこは――です。だってわたしたち、\nマニュアルどおりにやってるだけです。し」
2171 = "「Hả? Cái đó thì không hẳn đâu——ạ. Bởi vì tụi em, chỉ làm theo sổ tay hướng dẫn thôi. Mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、マニュアル以上をしていよう。\nさきほどの、乗客対応のスイッチだとか」
2022 = "「Không, hai đứa đã làm tốt hơn cả sổ tay hướng dẫn đấy. Chẳng hạn như việc đổi vị trí để phục vụ hành khách lúc nãy」"
# 【ふかみ】
# display as 深美
# JP: 「あ……それは――」
2189 = "「A......cái đó thì——」"
# monologue
# JP: ふかみがぐるりと車内を見渡す。\n車内を見渡し――それからじっと、日々姫を見つめる。
3402 = "Fukami nhìn quanh một vòng trong xe. Nhìn quanh trong xe——rồi nhìn chằm chằm vào Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 2169 = "「哎？」" 
# 【ふかみ】
# display as 深美
# JP: 「それって単に、この列車のおかげ。です。\n列車が自分で、何をできるか教えてくれてるから」
2721 = "「Đó đơn giản là nhờ đoàn tàu này. Ạ. Bởi vì chính đoàn tàu đã cho tụi em biết mình có thể làm gì」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！」
2201 = "「!!!」"
# 【ふかみ】
# display as 深美
# JP: 「書棚には絵本からガイド本までそろってますし、\n民芸品とかおもちゃとか、色々配置してありますし」
2470 = "「Trên giá sách có đủ loại từ sách tranh đến sách hướng dẫn, đồ thủ công mỹ nghệ, đồ chơi, được bài trí rất nhiều thứ」"
# monologue
# JP: その上かわいい、食べ放題のお菓子まで！\nと、少しおどけて、ふかみはミニチョコを一粒食べる。
1491 = "Hơn nữa còn có cả bánh kẹo đáng yêu ăn thỏa thích nữa! Nói đùa một chút, Fukami ăn một viên sô-cô-la nhỏ."
# 【ふかみ】
# display as 深美
# JP: 「だから、わたしと凪ちゃんのコンビじゃなくても。\nマニュアル通りで同じことできますし、しますよ、絶対」
2390 = "「Vì vậy, dù không phải là cặp đôi em và Nagi. Thì chỉ cần làm theo sổ tay hướng dẫn là có thể làm được điều tương tự, và chắc chắn sẽ làm được ạ」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――」
2185 = "「A——」"
# 【斎藤】
# display as 齋藤
# JP: 「よか風でしたねぇ」
2109 = "「Gió mát quá nhỉ」"
# 【真闇】
# display as 真闇
# JP: 「ねー。お天気も最高で、気持ちよかったー」
2449 = "「Phải đó. Thời tiết cũng tuyệt vời, dễ chịu thật đấy」"
# 【ふかみ】
# display as 深美
# JP: 「おかえりなさいませ。おしぼりをどうぞ。\nサービスのドリンクはいかがですか？」
2500 = "「Chào mừng quý khách đã quay lại. Xin mời dùng khăn tay. Quý khách có muốn dùng đồ uống phục vụ miễn phí không ạ?」"
# monologue
# JP: 最初の乗客が戻るより先、\nふかみは素早くサービス体勢に復帰している。
3100 = "Trước khi hành khách đầu tiên quay lại, Fukami đã nhanh chóng trở lại tư thế phục vụ."
# monologue
# JP: 添乗である僕らも当然、何かあったら即応の、\n姿勢をとらねばならない。のだが……
3627 = "Những người đi cùng như chúng tôi dĩ nhiên cũng phải trong tư thế sẵn sàng ứng phó nếu có chuyện gì xảy ra. Nhưng mà......"
# monologue
# JP: （ぽんぽん）
3710 = "（Vỗ vỗ）"
# 【双鉄】
# display as 雙鐵
# JP: 「落ち着け日々姫。泣くには早いぞ」
2421 = "「Bình tĩnh nào Hibiki. Giờ khóc là còn sớm đấy」"
# 【日々姫】
# display as 日日姬
# JP: 「ごめっ――にぃに――ちょっ――と。\n嬉し――すぎ、て」
2313 = "「Xin lỗ——anh hai——một chú——t. Vì em vui——quá, thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「気持ちはわかる。ただでさえ、これだけ苦労し、\n思い入れも強い列車だしな」
2377 = "「Anh hiểu cảm giác của em. Vốn dĩ đã vất vả thế này, lại còn là đoàn tàu chứa đựng nhiều tâm huyết nữa mà」"
# 【日々姫】
# display as 日日姬
# JP: 「んっ」
# 2227 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「その上、最高の評価だものな」
2587 = "「Hơn nữa, lại còn nhận được đánh giá cao nhất nữa」"
# 【日々姫】
# display as 日日姬
# JP: 「――うんっ」
1568 = "「——Vâng」"
# monologue
# JP: 『列車が自分で、何をできるか教えてくれる』\n『誰が乗務しても、おんなじことをできるし、する』
1487 = "『Chính đoàn tàu đã cho tụi em biết mình có thể làm gì』 『Dù ai làm việc trên tàu, cũng có thể làm được điều tương tự, và sẽ làm được』"
# monologue
# JP: ――ふかみの素直な感想の意味するところは、\n“形態が機能をそのまま示している”ということだ。
3405 = "——Ý nghĩa đằng sau cảm nhận chân thành của Fukami là, 'Hình thức thể hiện nguyên vẹn chức năng của nó'."
# monologue
# JP: そうしてそれは間違いなく――\n日々姫がデザインで目指す高みの、ひとつなのだから。
3526 = "Và điều đó chắc chắn—— là một trong những đỉnh cao mà Hibiki hướng tới trong thiết kế."
# 【双鉄】
# display as 雙鐵
# JP: 「……発車までには、落ち着くんだぞ」
1600 = "「......Phải bình tĩnh lại trước khi tàu chạy đấy nhé」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2227 = "「嗯」" 
# monologue
# JP: 日々姫を背中にかばってやれば、\nこつん、と額があたってくる。
3545 = "Khi tôi che chắn cho Hibiki ở phía sau lưng, đầu em ấy khẽ cụng vào lưng tôi."
# 【日々姫】
# display as 日日姬
# JP: 「すう～――はぁ～っ――」
2152 = "「Hít~——Hà~——」"
# monologue
# JP: ……やがて、日々姫が小さく頷く。
1511 = "......Một lúc sau, Hibiki khẽ gật đầu."
# 【日々姫】
# display as 日日姬
# JP: 「うんっ」
# 2227 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2180 = "「唔」" 
# monologue
# JP: それだけでいい。
3602 = "Chỉ cần vậy là đủ."
# monologue
# JP: 為すべきことの全てを僕らは、\n既に、尽くしているのだから。
3083 = "Bởi vì tất cả những gì cần làm, chúng tôi đều đã làm hết sức mình rồi."
# monologue
# JP: ――八ツ城を出ての昼食。来目を出てのティータイム。\n好みのお茶を楽しみながらの、ピアニストによる生演奏。
3640 = "——Bữa trưa sau khi rời Yatsushiro. Tiệc trà sau khi rời Kurume. Thưởng thức loại trà yêu thích trong tiếng đàn piano chơi trực tiếp."
# monologue
# JP: 中間駅での観光停車も挟みつつ、\n旅はいよいよ、終盤へと差し掛かってくる。
3102 = "Xen kẽ những lần dừng tàu tham quan ở các ga trung gian, chuyến đi cuối cùng cũng đang dần đi đến hồi kết."
# 【真闇】
# display as 真闇
# JP: 「あとは晩御飯だけになっちゃったとねー。\n列車ばおりるの、少し、さみしか」
2403 = "「Chỉ còn mỗi bữa tối nữa thôi nhỉ. Phải xuống tàu rồi, hơi buồn một chút」"
# 【斎藤】
# display as 齋藤
# JP: 「[まくら,1]真闇さんだけ[おおいた,1]大板まで乗ってくれても良かとですよ。\n私は、[ゆふいん,2]湯富院でのんびりお待ちしますけん」
2563 = "「Cô Mayami cứ đi tiếp đến Oita một mình cũng được mà. Tôi sẽ thong thả đợi cô ở Yufuin」"
# 【真闇】
# display as 真闇
# JP: 「んーん。うちも[ゆふいん,2]湯富院で骨休めばせんと。\nせーっかくもらったお休みやけんね」
2008 = "「Không đâu. Cháu cũng phải nghỉ ngơi thư giãn ở Yufuin chứ. Khó khăn lắm mới được nghỉ phép mà lị」"
# monologue
# JP: 真闇姉が大きく伸びをする。\nその表情を見る限り、全てはうまくいきそうだ。
3471 = "Chị Mayami vươn vai thật lớn. Nhìn biểu cảm đó, có vẻ như mọi chuyện đều sẽ suôn sẻ."
# monologue
# JP: （ブーっ、ブーっ）
3706 = "（Rung, rung）"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2192 = "「啊」" 
# monologue
# JP: \\x%lギャレー;#00ffc040;ギャレー%l;#;で食器を準備していた\nふかみが急にしゃがみ込む。
3085 = "Fukami đang chuẩn bị bát đĩa ở \\x%lギャレー;#00ffc040;bếp trên tàu%l;#; đột nhiên ngồi xổm xuống."
# 【ふかみ】
# display as 深美
# JP: 「はい。もしもし。とれいん食堂、早瀬です。\nえ？　あ――はい。遅延――ああ、はい。了解です」
2431 = "「Vâng. Alo. Hayase của Toa ăn Train xin nghe. Hả? A——vâng. Chậm trễ——a, vâng. Cháu hiểu rồi ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「トラブルか？」
2088 = "「Có rắc rối sao?」"
# monologue
# JP: 頷き、ひとつ。\nふかみはそのまま、電話応対をし続ける。
3413 = "Em ấy gật đầu một cái. Rồi cứ thế tiếp tục trả lời điện thoại."
# 【ふかみ】
# display as 深美
# JP: 「わかりました。その時間でお願いします。\nこちらから何かあれば折り返します。はい。それでは」
2425 = "「Cháu hiểu rồi ạ. Vậy nhờ bác đúng giờ đó nhé. Bên cháu có gì thay đổi sẽ gọi lại ngay ạ. Vâng. Chào bác」"
# 【双鉄】
# display as 雙鐵
# JP: 「報告を」
2268 = "「Báo cáo đi」"
# 【ふかみ】
# display as 深美
# JP: 「レストラン『[うんぜん,1]雲閃』の店主さんからです。\n遅延、最大で15分発生するとのことです」
2465 = "「Điện thoại từ chủ nhà hàng 'Unzen' ạ. Bác ấy báo là sẽ bị trễ, tối đa khoảng 15 phút」"
# 【双鉄】
# display as 雙鐵
# JP: 「！？　[とちのき,1]栃木さんのところで遅延？　原因は」
2250 = "「!? Chỗ bác Tochigi mà bị trễ sao? Nguyên nhân là gì」"
# 【ふかみ】
# display as 深美
# JP: 「食材の到着遅れだそうです。もう確保出来ているって\nいうお話ですけど、予定より遅いって」
2284 = "「Nghe nói là do nguyên liệu đến muộn ạ. Bác ấy bảo là đã có đủ rồi, nhưng sẽ trễ hơn dự kiến」"
# 【日々姫】
# display as 日日姬
# JP: 「了解しました。すぐに対処を――！」
2426 = "「Đã rõ. Sẽ xử lý ngay——!」"
# monologue
# JP: 日々姫の言葉の終わりを待たずに、凪が動く。
3346 = "Không đợi Hibiki nói xong, Nagi đã hành động."
# 【凪】
# display as 凪
# JP: 「発車も15分遅れになる可能性があるってこと、\nすぐにレイルロオドに報告してくるばい！」
2148 = "「Việc xuất phát có khả năng bị trễ 15 phút, em sẽ đi báo cáo cho Railord ngay đây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それでよい。頼む。が、絶対に走るなよ」
2128 = "「Được rồi. Nhờ cậu nhé. Nhưng tuyệt đối không được chạy đâu đấy.」"
# 【凪】
# display as 凪
# JP: 「わかっとるばい」
2429 = "「Em biết rồi nè.」"
# monologue
# JP: 焦りを微塵も見せぬまま、\n無駄の全くない足取りで、凪が前方車両へ向かう。
3029 = "Không hề để lộ chút nôn nóng nào, Nagi bước những bước cực kỳ hiệu quả hướng về toa xe phía trước."
# monologue
# JP: ダイヤ調整については、レイルロオドに任せればいい。\nが、レイルロオドに料理のことまではわからない。
3559 = "Về việc điều chỉnh biểu đồ chạy tàu, cứ giao cho Railord là được. Nhưng Railord thì không thể rành về chuyện bếp núc."
# 【双鉄】
# display as 雙鐵
# JP: 「本来予定では、1800に文庫森駅着。\n\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;入庫体験と転車台体験を経て、1830発だな」
2117 = "「Theo dự kiến ban đầu, 18:00 sẽ đến ga Bungomori. Sau khi trải nghiệm đưa xe vào \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#; và trải nghiệm \\x%l転車台;#00ffc040;bàn quay đầu máy%l;#;, 18:30 sẽ xuất phát.」"
# 【ふかみ】
# display as 深美
# JP: 「\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;内で、20分間の観光下車があります。\nその間に、\\x%lギャレー;#00ffc040;ギャレー%l;#;の準備の予定でした」
2264 = "「Sẽ có 20 phút xuống xe tham quan bên trong \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;. Theo dự kiến, chúng ta sẽ chuẩn bị \\x%lギャレー;#00ffc040;bếp trên tàu%l;#; trong khoảng thời gian đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「15分遅延となると、\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;観光停車中の\n\\x%lギャレー;#00ffc040;ギャレー%l;#;準備はかなり難しくなるな」
2292 = "「Nếu chậm trễ 15 phút, thì việc chuẩn bị \\x%lギャレー;#00ffc040;bếp trên tàu%l;#; trong lúc dừng xe tham quan ở \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#; sẽ khá là khó khăn đấy.」"
# monologue
# JP: ディナーとなると皿数も料理数も多い。\n20分まるまるを使っての準備となることも考えられる。
3363 = "Bữa tối thì số lượng đĩa và món ăn đều nhiều. Có khả năng sẽ phải dùng trọn vẹn 20 phút để chuẩn bị."
# monologue
# JP: 1805\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;入庫、1825\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;出庫が\n本来の予定なのだから……
3052 = "Vì dự kiến ban đầu là 18:05 đưa xe vào \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;, 18:25 đưa xe ra khỏi \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#; mà......"
# 【双鉄】
# display as 雙鐵
# JP: 「[じゅうはちじにじゅっぷん,3]1820に料理がついたとして、20分の準備で、\n1840\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;出庫――そのまま15分遅延となるか」
2296 = "「Giả sử 18:20 món ăn được đưa đến, mất 20 phút chuẩn bị, 18:40 đưa xe ra khỏi \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;――vậy là vẫn bị chậm 15 phút à.」"
# 【ふかみ】
# display as 深美
# JP: 「[じゅうはちじよんじゅっぷん,3]1840まで、\n\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;観光停車を延長するってことですね？」
2032 = "「Nghĩa là chúng ta sẽ kéo dài thời gian dừng xe tham quan ở \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#; đến 18:40 đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。文庫森から湯富院までの短い距離に、\nたっぷりと時間を取ってある。回復運転は容易だろう」
2224 = "「Ừm. Quãng đường ngắn từ Bungomori đến Yufuin, chúng ta đã dành ra rất nhiều thời gian. Việc chạy bù giờ chắc sẽ dễ dàng thôi.」"
# 【ふかみ】
# display as 深美
# JP: 「けど。そのノロノロ運転は、お客様のお食事のためです。\n回復のために急げば、お食事時間が短くなります」
2016 = "「Nhưng mà. Việc chạy chậm rì đó là để phục vụ bữa ăn của hành khách ạ. Nếu tăng tốc để chạy bù giờ, thời gian dùng bữa sẽ bị rút ngắn lại.」"
# monologue
# JP: ん……とわずかに考え込み、\n慎重そうな口調でふかみが提案してくる。
3407 = "Ưm...... Fukami hơi trầm ngâm suy nghĩ, rồi đưa ra đề xuất với giọng điệu có vẻ thận trọng."
# 【ふかみ】
# display as 深美
# JP: 「遅延をそのまま、終点・大板まで持ち越すのが、\n安全といえば一番安全ですけど――」
2399 = "「Việc cứ để nguyên thời gian chậm trễ cho đến ga cuối Oita, nói về độ an toàn thì đó là cách an toàn nhất, nhưng mà――」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、終点・大板からは船などへの接続もある。\nそれをご利用予定の方がいる可能性も考えねば」
2023 = "「Không được, từ ga cuối Oita còn có các chuyến phà kết nối chuyển tàu nữa. Chúng ta phải tính đến khả năng có hành khách dự định sử dụng chúng.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――そうですね。\n終点までには、ちゃんと回復できないと――」
2205 = "「A――Đúng vậy ạ. Phải làm sao để chạy bù giờ đàng hoàng trước khi đến ga cuối mới được――」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、まずい。ので、発が遅れた場合、\nどこかで回復運転を図らねば厳しい」
2236 = "「Ừm, gay go đấy. Cho nên, trong trường hợp xuất phát trễ, nếu không tìm cách chạy bù giờ ở đâu đó thì sẽ rất khó khăn.」"
# monologue
# JP: 湯富院までは、湯富院下車のお客様が多いことを見込み、\n食事のためののろのろ運転となってはいるが――
3172 = "Cho đến Yufuin, vì dự đoán có nhiều hành khách xuống ga này, nên tàu đang chạy chậm rì để phục vụ bữa ăn, nhưng mà――"
# monologue
# JP: ディナーが終わって湯富院を出れば、終点の大板までは、\nもはや旅を締めくくるだけの、通常運転だ。
3364 = "Sau khi bữa tối kết thúc và rời khỏi Yufuin, đoạn đường đến ga cuối Oita, chỉ còn là việc khép lại chuyến đi bằng tốc độ chạy bình thường."
# 【双鉄】
# display as 雙鐵
# JP: 「……食事時間を縮めることは、高級食堂列車である以上、\n極力避けるべきだよな？」
1616 = "「......Việc rút ngắn thời gian dùng bữa, với tư cách là một chuyến tàu nhà hàng cao cấp, chúng ta phải cố gắng tránh hết mức có thể đúng không?」"
# 【ふかみ】
# display as 深美
# JP: 「はい。主役のディナーで、高級食堂列車ですから。\nそこを急かせば、全部台無しになるって思います」
2513 = "「Vâng ạ. Bữa tối là nhân vật chính, hơn nữa đây lại là tàu nhà hàng cao cấp. Nếu hối thúc chuyện đó, em nghĩ mọi thứ sẽ xôi hỏng bỏng không mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこまでか」
2697 = "「Đến mức đó sao.」"
# 【ふかみ】
# display as 深美
# JP: 「ってわたしは思います、です。それに、\nお子さんやお年を召したお客様も多いですから」
2683 = "「Em nghĩ là vậy, ạ. Hơn nữa, cũng có rất nhiều hành khách là trẻ em và người lớn tuổi nữa ạ.」"
# monologue
# JP: ……観光接客についてのふかみの経験、\nそこからの意見を無視するなどは、ありえない。
1534 = "......Kinh nghiệm của Fukami trong việc tiếp đón khách du lịch, những ý kiến xuất phát từ đó, tôi không thể nào phớt lờ được."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――」
2746 = "「Nếu vậy thì――」"
# 【凪】
# display as 凪
# JP: 「話してきたばい！\n湯富院-大板の間でも、なんとか5分は戻せるそうばい！」
2147 = "「Em đã nói chuyện xong rồi nè! Giữa Yufuin và Oita, có vẻ như có thể xoay xở bù lại được 5 phút đó nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2252 = "「噢」" 
# monologue
# JP: 何の相談をしなくとも、ふかみと凪の二人が揃って、\n“食事時間を短くする”を、最初から除外して考えている。
3398 = "Chẳng cần bàn bạc gì, cả Fukami và Nagi đều đồng lòng, ngay từ đầu đã loại trừ phương án “rút ngắn thời gian dùng bữa”."
# monologue
# JP: であらば僕も、二人の意見と直感とに従おう。
3206 = "Nếu đã vậy, tôi cũng sẽ nghe theo ý kiến và trực giác của hai người họ."
# 【双鉄】
# display as 雙鐵
# JP: 「あと10分。食事の時間を確保しつつ縮めるためには、\n配膳などの時間を詰めていくしかないが」
2706 = "「Còn 10 phút nữa. Để vừa đảm bảo thời gian dùng bữa vừa rút ngắn thời gian chậm trễ, chỉ còn cách cắt giảm thời gian phục vụ món ăn thôi.」"
# monologue
# JP: 言った途端に、凪が全力で首を振る。
3201 = "Vừa dứt lời, Nagi đã lắc đầu nguầy nguậy."
# 【凪】
# display as 凪
# JP: 「絶対無理ばい！　10分も縮められるわけなかっ！！」
2579 = "「Tuyệt đối không được đâu nha! Làm sao mà rút ngắn được tận 10 phút chứ!!」"
# 【ふかみ】
# display as 深美
# JP: 「お客さまが観光下車中の配膳ですから、\n多少バタバタもできますけど、それでも3分程度しか」
2534 = "「Vì chúng ta phục vụ món ăn trong lúc hành khách xuống tàu tham quan, nên có thể làm nhanh một chút, nhưng dù vậy cũng chỉ tiết kiệm được cỡ 3 phút thôi ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「……パレット全部の入換――文庫森駅のホームで、\n二分割して、お客様の前でやっちゃえば」
1609 = "「......Thay toàn bộ khay thức ăn――Trên sân ga Bungomori, nếu chúng ta chia làm hai nhóm, rồi làm ngay trước mặt hành khách thì sao.」"
# 【ふかみ】
# display as 深美
# JP: 「え？」
# 2169 = "「哎？」" 
# monologue
# JP: 沈思黙考していた日々姫が、\n不意にぼそりと呟いて――
2939 = "Hibiki nãy giờ vẫn đang chìm trong suy tư, bất chợt lẩm bẩm――"
# monologue
# JP: （しゃっ！　しゃしゃしゃっ！！）
3714 = "（Xoẹt! Xoẹt xoẹt xoẹt!!）"
# monologue
# JP: 猛然と、日々姫の腕が動き始める。
3341 = "Bàn tay Hibiki bắt đầu thoăn thoắt di chuyển."
# monologue
# JP: スケッチブックに――\nああ――そうか、これは――これなら！
3507 = "Trên cuốn sổ phác thảo―― A――Ra là vậy, cái này――nếu là cách này!"
# 【日々姫】
# display as 日日姬
# JP: 「動線描いてみた。これならやれない？」
2373 = "「Em thử vẽ luồng di chuyển rồi. Như thế này thì làm được đúng không?」"
# 【凪】
# display as 凪
# JP: 「わ！」
# 2160 = "「哇！」" 
# 【ふかみ】
# display as 深美
# JP: 「これ――すごいです」
2681 = "「Cái này――tuyệt quá ạ.」"
# monologue
# JP: 日々姫のスケッチブックには、\n文庫森駅のホーム図と、停車しているとれいん食堂。
3343 = "Trên cuốn sổ phác thảo của Hibiki, là sơ đồ sân ga Bungomori, và Tàu nhà hàng đang dừng đỗ."
# monologue
# JP: そうして、ホーム上には――
3517 = "Và rồi, trên sân ga――"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、前方後方、\nどちらの車両にもドアがあるのだものな」
2384 = "「Ra vậy, phía trước và phía sau, toa nào cũng có cửa ra vào mà.」"
# 【ふかみ】
# display as 深美
# JP: 「だから、配膳準備をホーム上で、\n最初から二分割しておけば」
2388 = "「Cho nên, nếu chúng ta chuẩn bị dọn món trên sân ga, và chia làm hai nhóm ngay từ đầu thì.」"
# 【凪】
# display as 凪
# JP: 「二チームで同時に配膳できるばい！\n時間、半分にできるとよ！！」
2331 = "「Hai đội có thể phục vụ món ăn cùng lúc luôn nè! Thời gian sẽ giảm đi một nửa đó nha!!」"
# monologue
# JP: 頷くしかない。\nさすがは、日々姫だ。
3540 = "Tôi chỉ biết gật đầu đồng tình. Quả không hổ danh là Hibiki."
# monologue
# JP: 調理→配膳という旧来型の食堂車から解き放たれた、\n“とれいん食堂”の独自の強みを――
3600 = "Thoát khỏi khuôn mẫu toa ăn truyền thống theo kiểu Nấu nướng → Phục vụ, phát huy thế mạnh độc đáo của “Tàu nhà hàng”――"
# 【双鉄】
# display as 雙鐵
# JP: 「この食堂、この列車をデザインした日々姫ゆえの……\n知り尽くしていなければ、決して出てこんアイディアだ」
2684 = "「Chính vì Hibiki là người thiết kế ra nhà hàng này, chuyến tàu này...... Nếu không hiểu rõ tận tường, thì tuyệt đối không thể nảy ra ý tưởng này được.」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなん、あたりまえのことやけん」
2532 = "「Chuyện đó, là điều đương nhiên mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あたりまえ、か」
2531 = "「Đương nhiên, sao.」"
# monologue
# JP: とれいん食堂が停車する、全ての駅に何度も下りて、\nすみからすみまでこと細やかな確認を繰り返してきた。
3090 = "Ở tất cả các nhà ga mà Tàu nhà hàng dừng lại, em ấy đã xuống tàu không biết bao nhiêu lần, lặp đi lặp lại việc kiểm tra tỉ mỉ từ ngóc ngách này đến ngóc ngách khác."
# monologue
# JP: その成果がいま、形となってあらわれている。\n当然のことを当然にする――日々姫は故に、一流なのだ。
3131 = "Thành quả đó giờ đây đang hiện hữu rõ ràng. Làm những việc đương nhiên một cách đương nhiên――Đó là lý do vì sao Hibiki là người xuất sắc nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「これならいけるか――。いや――これで行こう。\n一号車は凪ふかみ。二号車は僕らでよいか？」
2686 = "「Cách này thì được chứ――. Không――Cứ làm theo cách này đi. Toa số 1 là Nagi và Fukami. Toa số 2 là hai chúng ta, được chứ?」"
# 【凪】
# display as 凪
# JP: 「わかったばい！」
2430 = "「Em hiểu rồi nè!」"
# 【ふかみ】
# display as 深美
# JP: 「やれると思います。\nえと、わたし、[ぶんごもり,2]文庫森駅と雲閃さんにも」
2687 = "「Em nghĩ là làm được ạ. À ừm, em sẽ đi báo cho ga Bungomori và quán Unsen biết nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、電話はわたしが」
2209 = "「A, để em gọi điện cho.」"
# monologue
# JP: いいながら、\n日々姫は僕にスケッチブックを預けてくる。
3351 = "Vừa nói, Hibiki vừa đưa cuốn sổ phác thảo cho tôi giữ."
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことだ。凪はすまんが、文庫森――\n\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;に“5分早着”可能かを聞いてきてくれ」
2730 = "「Là vậy đó. Nagi, xin lỗi em nhưng, hãy hỏi xem Bungomori――\\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#; có thể “đến sớm 5 phút” được không nhé.」"
# 【凪】
# display as 凪
# JP: 「聞いてくるばい！」
2682 = "「Em đi hỏi ngay đây nè!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみには、動線の再確認を頼めるか？\nこの図面に見落としがないかを、チェックしてくれ」
2126 = "「Fukami, nhờ em xác nhận lại luồng di chuyển nhé? Hãy kiểm tra xem bản vẽ này có thiếu sót gì không.」"
# 【ふかみ】
# display as 深美
# JP: 「わかりました」
2428 = "「Em hiểu rồi ạ.」"
# 【凪】
# display as 凪
# JP: 「聞いてきたばい！　レイルロオドも運転士も、\n5分の早着は可能って返事してくれたばい！」
2367 = "「Em hỏi xong rồi nha! Cả Railord lẫn người lái tàu đều trả lời là, có thể đến sớm 5 phút đó nè!」"
# 【ふかみ】
# display as 深美
# JP: 「図面――これ、わたしには完璧って思えます」
2262 = "「Bản vẽ――Cái này, em thấy hoàn hảo rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば1755文庫森着。1800から\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;見学。\n1820分に\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;を出庫して、転車台体験」
2734 = "「Vậy thì 17:55 đến Bungomori. Từ 18:00 tham quan \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;. 18:20 đưa xe ra khỏi \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#; và trải nghiệm bàn quay đầu máy.」"
# 【日々姫】
# display as 日日姬
# JP: 「1825に文庫森駅ホーム再入線。\n10分で\\x%lギャレー;#00ffc040;ギャレー%l;#;準備で1835に文庫森駅発！」
2777 = "「18:25 tàu vào lại sân ga Bungomori. Dành 10 phút chuẩn bị \\x%lギャレー;#00ffc040;bếp trên tàu%l;#; rồi 18:35 xuất phát từ ga Bungomori!」"
# 【ふかみ】
# display as 深美
# JP: 「それなら、5分の発車遅延ですみますから！\n湯富院から大板だけで遅延をゼロに回復できますね！」
2688 = "「Nếu vậy, chúng ta sẽ chỉ bị trễ giờ xuất phát 5 phút thôi ạ! Chỉ cần đoạn từ Yufuin đến Oita là có thể chạy bù lại toàn bộ thời gian chậm trễ rồi nhỉ!」"
# 【凪】
# display as 凪
# JP: 「じゃ、このスケジュールでいけるように、\n凪さまお願いしてくるばい！」
2741 = "「Vậy thì, để có thể chạy theo lịch trình này, Nagi-sama sẽ đi dặn dò mọi người nha!」"
# 【ふかみ】
# display as 深美
# JP: 「わたしも、車内みてきます！」
2360 = "「Em cũng đi xem xét trong xe đây ạ!」"
# monologue
# JP: 頷きあってすぐさまに、凪とふかみは車内へ戻る。
3012 = "Vừa gật đầu đồng ý, Nagi và Fukami lập tức quay trở lại trong xe."
# monologue
# JP: 空白時間をなるべく少なく――\nふかみと凪も、プロの振る舞いを見せている。
3423 = "Cố gắng giảm thiểu tối đa thời gian trống―― Fukami và Nagi cũng đang thể hiện phong thái chuyên nghiệp."
# 【日々姫】
# display as 日日姬
# JP: 「……はい。そのように。もし人が足りなければ、\nこちらで負担しますので。」
1612 = "「......Vâng. Cứ làm như vậy đi ạ. Nếu thiếu người, bên này sẽ chịu trách nhiệm bù đắp.」"
# monologue
# JP: そして日々姫も、同様に。
3520 = "Và Hibiki cũng vậy."
# monologue
# JP: 雲仙の栃木さんと、豊後森の木本さんへの連絡を済ませ、\n頷き一つで、了解を得られたことを伝えてくれる。
3567 = "Em ấy đã liên lạc xong với anh Tochigi ở Unsen và anh Kimoto ở Bungomori, và báo cho tôi biết là đã được sự đồng ý bằng một cái gật đầu."
# monologue
# JP: （ならば、僕も僕の仕事を――）
3725 = "（Nếu vậy, mình cũng phải làm công việc của mình thôi――）"
# monologue
# JP: 日々姫の目が見落とす何かを、見つけ出す。
3213 = "Tìm ra thứ gì đó mà đôi mắt của Hibiki đã bỏ sót."
# monologue
# JP: それこそが僕の仕事なのだと切り替えたなら\nすぐさまに、為すべきひとつが見えてくる。
3160 = "Ngay khi chuyển đổi suy nghĩ rằng đó chính là công việc của mình, tôi lập tức nhận ra một điều cần phải làm."
# 【双鉄】
# display as 雙鐵
# JP: 「今回の、[きゃくまえ,1]客前でのパレット搬入を演出にしよう。\nアクシデントと思わせてしまうのではなくて――」
2366 = "「Lần này, hãy biến việc mang khay thức ăn ra trước mặt hành khách thành một màn trình diễn đi. Đừng để họ nghĩ đó là một sự cố ngoài ý muốn――」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　うん！！　\n旅の最後に『とれいん食堂の種明かし！』みたいに」
2198 = "「A! Vâng!! Giống như là 『Tiết lộ bí mật của Tàu nhà hàng!』 vào cuối chuyến đi ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな、その線でいこう。\nそのためには、車内アナウンスの内容変更がいるな」
2451 = "「Đúng vậy, cứ theo hướng đó đi. Để làm được vậy, chúng ta cần thay đổi nội dung thông báo trên tàu.」"
# 【斎藤】
# display as 齋藤
# JP: 「……\\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;いうんは凄かとですねぇ。\n御一夜では見たこともなかとでしたが」
1619 = "「......\\x%l扇形機関庫;#00ffc040;Gara đầu máy hình ngành%l;#; tuyệt thật đấy nhỉ. Ở Ohimitera tôi chưa từng thấy bao giờ.」"
# 【真闇】
# display as 真闇
# JP: 「んーー。転車台もかわゆかとねぇ。\n思とったより、ずーっとゆっくりまわりよるけん」
2238 = "「Ưm. Bàn quay đầu máy cũng dễ thương ghê. Nó quay chậm hơn nhiều so với chị nghĩ.」"
# 【斎藤】
# display as 齋藤
# JP: 「キュウロクやらいう機関庫は、ハチロクとくらべて、\n随分と大きゅうみえましたねぇ」
2718 = "「Cái gara đầu máy tên là Kyuroku gì đó, so với Hachiroku, trông có vẻ to hơn hẳn nhỉ.」"
# monologue
# JP: 言って、ふふっと斎藤さんは、\nまるで少女に戻ったかのような笑いをこぼす。
3671 = "Nói rồi, phu nhân Saito bật cười khúc khích, như thể bà đã trở lại thành một thiếu nữ."
# 【斎藤】
# display as 齋藤
# JP: 「真闇お嬢。油ばつけて機関車磨くだなんて。\n日々姫お嬢みたいなことまでして」
2565 = "「Cô Mayami. Chuyện tra dầu rồi lau chùi đầu máy ấy. Cô lại đi làm mấy việc giống như cô Hibiki vậy.」"
# 【真闇】
# display as 真闇
# JP: 「うふふっ、実はやってみたかったとよ。\nひーちゃんが、そーちゃんが、いっつもしとること」
2142 = "「Ư fufu, thực ra chị đã luôn muốn thử làm rồi. Những việc mà Hi-chan và Sou-chan vẫn hay làm ấy.」"
# 【斎藤】
# display as 齋藤
# JP: 「ずいぶん楽しそうにしておられましたねぇ」
2108 = "「Trông cô có vẻ rất vui nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「楽しかったと！　ちっちゃかこからお年寄りまで、\n参加しとったひと、みんな笑顔で、夢中になっとったし」
2743 = "「Vui lắm luôn! Từ trẻ nhỏ đến người già, những người tham gia ai nấy đều tươi cười rạng rỡ, say mê làm việc mà.」"
# monologue
# JP: そう語る真闇姉の顔もまた、あどけないように輝いている。\n斎藤さんは、ゆっくり、ゆっくり、やさしく頷く。
2989 = "Khuôn mặt của chị Mayami khi kể lại chuyện đó cũng bừng sáng một cách ngây thơ. Phu nhân Saito chầm chậm, chầm chậm, dịu dàng gật đầu."
# 【斎藤】
# display as 齋藤
# JP: 「なら、なによりのことでしたねぇ。\n動いた分、お腹もようけにすきよったでしょう」
2723 = "「Vậy thì còn gì bằng nữa. Vận động nhiều như vậy, chắc bụng cô cũng đói meo rồi nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「うん。ぺこぺこ」
2244 = "「Ừm. Đói meo rồi.」"
# 【凪】
# display as 凪
# JP: 「このあとは、お待ちかねのディナータイムばい！」
2404 = "「Sau đây, sẽ là thời gian dùng bữa tối mà mọi người hằng mong đợi đó nha!」"
# monologue
# JP: さて、いよいよだ。\n頷けば、日々姫がマイクを手に背を伸ばす。
3137 = "Nào, đến lúc rồi. Khi tôi gật đầu, Hibiki cầm lấy micro, vươn thẳng lưng."
# 【日々姫】
# display as 日日姬
# JP: 「みなさまここで、ただいまより再入線いたします、\n文庫森駅ホームの上をご覧ください」
2137 = "「Thưa quý hành khách, ngay bây giờ chúng ta sẽ vào lại sân ga, xin quý vị hãy nhìn lên sân ga Bungomori.」"
# 【斎藤】
# display as 齋藤
# JP: 「なんぞ――白か服のひとがおりますねぇ」
2043 = "「Gì thế kia――Có người mặc áo trắng kìa.」"
# 【真闇】
# display as 真闇
# JP: 「料理人さん？　あ――あっ！　ああああ！！！」
2456 = "「Là đầu bếp sao? A――Á! A a a a!!!」"
# monologue
# JP: 真闇姉の大きな納得の声。\n日々姫の顔が思わずゆるむ。
3481 = "Giọng nói thể hiện sự vỡ lẽ to tướng của chị Mayami. Khuôn mặt Hibiki bất giác giãn ra."
# 【日々姫】
# display as 日日姬
# JP: 「とれいん食堂は、みなさまがご覧になった、\n小さな\\x%lギャレー;#00ffc040;ギャレー%l;#;、配膳設備しかもたない食堂列車です」
2501 = "「Tàu nhà hàng, như quý vị đã thấy, là một chuyến tàu nhà hàng nhỏ chỉ có \\x%lギャレー;#00ffc040;bếp trên tàu%l;#; và thiết bị phục vụ món ăn.」"
# 【斎藤】
# display as 齋藤
# JP: 「ああ――言われてみれば、まことですねぇ。\nあぎゃんと小さか厨房で、どぎゃんしてこれだけの」
2243 = "「A――Nghe cô nói mới để ý, đúng là vậy nhỉ. Với cái nhà bếp nhỏ xíu thế kia, làm sao mà nấu được ngần này món.」"
# monologue
# JP: 斎藤さんの言葉が止まる。\n目が、ホームへと舞い戻る。
3669 = "Lời nói của phu nhân Saito chợt dừng lại. Ánh mắt bà quay trở lại sân ga."
# monologue
# JP: 列車が止まる。停止位置ぴたりだ。一号車二号車の\nドア横すぐに、パレットたちが待っている。
3035 = "Đoàn tàu dừng lại. Vị trí dừng chuẩn xác. Ngay cạnh cửa ra vào của toa số 1 và toa số 2, những chiếc khay thức ăn đang chờ sẵn."
# 【日々姫】
# display as 日日姬
# JP: 「いまからどうぞ！\nとれいん食堂の秘密をご覧ください」
2405 = "「Bây giờ xin mời! Hãy cùng chiêm ngưỡng bí mật của Tàu nhà hàng.」"
# monologue
# JP: ドアが開く。\n最初のパレットには盛り付け済みのスープとサラダ。
3575 = "Cửa mở ra. Trên chiếc khay đầu tiên là súp và salad đã được bày biện sẵn."
# monologue
# JP: 凪ふかみ、僕と日々姫でそれを次々配膳していく。
3024 = "Nagi, Fukami, tôi và Hibiki lần lượt dọn chúng lên."
# monologue
# JP: （――よし！）
3673 = "（――Tốt!）"
# monologue
# JP: その間に、調理人たちが\\x%lギャレー;#00ffc040;ギャレー%l;#;へと、\n主食、デザートを運び込む。
3096 = "Trong lúc đó, các đầu bếp mang món chính và món tráng miệng vào trong \\x%lギャレー;#00ffc040;bếp trên tàu%l;#;."
# monologue
# JP: これなら、いける――\n思った次の瞬間にはもう、調理人たちは下車している。
3601 = "Thế này thì, ổn rồi―― Ngay khoảnh khắc tôi nghĩ vậy, các đầu bếp đã xuống tàu."
# monologue
# JP: （ガランガラン！　ガランガラン！！）
3699 = "（Keng keng! Keng keng!!）"
# monologue
# JP: 間髪いれず、レイルロオドが発車の振り鐘。\nとれいん食堂は滑り出す。
2944 = "Ngay lập tức, Railord rung chuông báo hiệu xuất phát. Tàu nhà hàng bắt đầu lăn bánh."
# monologue
# JP: 時計を見る――文庫森駅発1834。延、4分。\n予定より、さらに一分短縮できた！
3192 = "Tôi nhìn đồng hồ――Xuất phát từ ga Bungomori lúc 18:34. Trễ 4 phút. So với dự kiến, chúng tôi đã rút ngắn thêm được một phút!"
# 【日々姫】
# display as 日日姬
# JP: 「ご覧いただけましたでしょうか？　とれいん食堂。\nご当地のとれたての食材を、インする食堂の秘密です」
2135 = "「Quý vị đã thấy rồi chứ ạ? Tàu nhà hàng. Bí mật của nhà hàng đưa những nguyên liệu tươi ngon của địa phương vào trong đó ạ.」"
# 【斎藤】
# display as 齋藤
# JP: 「こぎゃんからくりで――\nあん狭くて小さか厨房で、これだけの料理ば」
2116 = "「Thì ra là nhờ cơ chế này―― Mới có thể làm ra ngần này món ăn trong cái nhà bếp chật hẹp nhỏ xíu đó.」"
# 【真闇】
# display as 真闇
# JP: 「すごかとね。よーお考えられとる」
2550 = "「Tuyệt thật đấy. Ý tưởng hay quá đi mất.」"
# monologue
# JP: （パチ、パチ、パチ、パチ）
3702 = "（Bộp, bốp, bốp, bốp）"
# monologue
# JP: 真闇姉の拍手。\nすぐさまそれは、車内全てに伝播する。
3483 = "Tiếng vỗ tay của chị Mayami. Ngay lập tức, nó lan truyền ra khắp trong xe."
# monologue
# JP: （パチパチパチパチパチパチパチ！！）
3728 = "（Bốp bốp bốp bốp bốp bốp bốp!!）"
# 【日々姫】
# display as 日日姬
# JP: 「あ――あっ」
2186 = "「A――A」"
# monologue
# JP: ああ、いかん。\n日々姫を促し、マイクを受け取る。
3075 = "A, không được rồi. Tôi giục Hibiki, rồi nhận lấy micro."
# 【双鉄】
# display as 雙鐵
# JP: 「盛大な拍手をまことにありがとうございます。\nですが、ご賞賛をいただくにはいささか早すぎます」
2758 = "「Xin chân thành cảm ơn tràng pháo tay nồng nhiệt của quý vị. Nhưng mà, để nhận được lời khen ngợi thì vẫn còn hơi sớm đấy ạ.」"
# monologue
# JP: １号車から、凪とふかみが舞い戻ってくる。\nすぐさま配膳の準備にかかる。
3016 = "Từ toa số 1, Nagi và Fukami hớt hải chạy về. Lập tức bắt tay vào chuẩn bị dọn món."
# 【双鉄】
# display as 雙鐵
# JP: 「ディナーはこれからでございます。続きましては、\nメインの一皿。どうぞ、ご堪能くださいませ」
2467 = "「Bữa tối giờ mới thực sự bắt đầu. Tiếp theo đây, là món chính. Xin mời quý vị thưởng thức.」"
# 【ふかみ】
# display as 深美
# JP: 「ディナーはお楽しみいただけましたでしょうか？\nまもなく、この列車は[ゆふいん,2]湯富院、湯富院に到着します」
2131 = "「Quý khách có hài lòng với bữa tối không ạ? Sắp tới, chuyến tàu này sẽ đến Yufuin, ga Yufuin ạ.」"
# 【凪】
# display as 凪
# JP: 「[ゆふいん,2]湯富院ば、静かで綺麗な温泉地ばい！\n駅前の観光馬車には、乗らんともったいなかとよー」
2524 = "「Yufuin là một khu suối nước nóng yên tĩnh và xinh đẹp lắm đó nha! Đến đây mà không đi xe ngựa tham quan trước ga thì phí lắm luôn nè~」"
# 【ふかみ】
# display as 深美
# JP: 「っていっても、今はもう営業時間外ですけど。\nどうぞ、明日の朝にお楽しみくださいね。です！」
2017 = "「Nói là vậy, nhưng bây giờ đã hết giờ hoạt động rồi ạ. Xin quý khách hãy chờ đến sáng mai để trải nghiệm nhé. Ạ!」"
# monologue
# JP: （～♪）
3729 = "（~♪）"
# 【真闇】
# display as 真闇
# JP: 「あー、おいしかったぁ」
2211 = "「A~ Ngon quá đi mất~」"
# 【斎藤】
# display as 齋藤
# JP: 「もう[ゆふいん,2]湯富院、いう気がしますなぁ。\n終わってみれば、あっという間の旅ゆーか」
2479 = "「Cảm giác như mới chớp mắt đã đến Yufuin rồi nhỉ. Chuyến đi kết thúc nhanh như một cơn gió vậy.」"
# 【真闇】
# display as 真闇
# JP: 「よねぇ」
2334 = "「Đúng vậy nhỉ.」"
# monologue
# JP: 真闇姉と斎藤さんとが、\n降車の準備をはじめている。
3475 = "Chị Mayami và phu nhân Saito, đang bắt đầu chuẩn bị xuống tàu."
# monologue
# JP: 周辺客の多くも、だ。\n凪とふかみはそれぞれに、サポートに動き回ってる。
3569 = "Nhiều hành khách xung quanh cũng vậy. Nagi và Fukami đang chia nhau chạy đôn chạy đáo để hỗ trợ mọi người."
# 【斎藤】
# display as 齋藤
# JP: 「ん……」
2218 = "「Ưm......」"
# monologue
# JP: 斎藤さんが網棚の荷物を下ろそうとして、\n一瞬、戸惑った表情を――
3667 = "Phu nhân Saito định lấy hành lý trên giá để hành lý xuống, nhưng trong thoáng chốc, bà lộ vẻ lúng túng――"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 2192 = "「啊」" 
# 【日々姫】
# display as 日日姬
# JP: 「お手伝いいたします」
2364 = "「Để em giúp một tay ạ.」"
# monologue
# JP: 考えるより先に動いた体を、慌てて止める。\n日々姫の方が早かった。
3196 = "Tôi vội vàng cản lại cơ thể đã hành động trước cả suy nghĩ của mình. Hibiki đã nhanh tay hơn."
# monologue
# JP: ならば日々姫にここは任せて――
3619 = "Nếu vậy thì cứ giao chỗ này cho Hibiki――"
# 【観光客】
# display as 游客
# JP: 「にーさん、こいばおろしておーせ」
2317 = "「Cậu thanh niên, lấy cái này xuống giúp tôi với.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、お手伝いいたします」
2287 = "「Vâng, để cháu giúp ạ.」"
# monologue
# JP: 日々姫の徹底したこだわりで、\n網棚も、網ではなくて木製だ。
3439 = "Do sự khăng khăng đòi hỏi triệt để của Hibiki, giá để hành lý cũng không phải bằng lưới mà là bằng gỗ."
# monologue
# JP: その分上が見づらいせいか、ご高齢のお客様から、\n荷降ろしのサポート依頼がたてつづく。
3080 = "Có lẽ vì thế mà khó nhìn thấy bên trên, nên những hành khách lớn tuổi liên tục nhờ hỗ trợ lấy hành lý xuống."
# monologue
# JP: （ふむ。改善検討の点も見つかったな）
3705 = "（Ưm. Mình cũng tìm thấy điểm cần xem xét cải thiện rồi.）"
# 【観光客】
# display as 游客
# JP: 「いやあ、おらぁ乗り鉄なんだがよ。\nいままででいっとう楽しかった列車だったわ」
2166 = "「Chà, tôi là một người thích đi tàu. Đây là chuyến tàu thú vị nhất mà tôi từng đi từ trước đến nay đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――それは、まことに光栄です」
2678 = "「Điều đó――Đó quả thực là niềm vinh hạnh lớn lao ạ.」"
# 【観光客】
# display as 游客
# JP: 「こんな感じで、九洲一周列車ば走らせーよ。\nの、[たいわん,1]鯛湾一周の、『[ハイシュンジーフォン,3]海巡之風』みてーによ」
2333 = "「Cứ theo đà này, hãy cho chạy một chuyến tàu vòng quanh Kyushu đi. Giống như chuyến 『Hải Tuần Chi Phong』 vòng quanh Đài Loan ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。勉強させていただきます」
2631 = "「Xin cảm ơn bác. Cháu sẽ học hỏi thêm ạ.」"
# monologue
# JP: 冷静を装い返事をするが、\n驚きと、強い興奮とを感じている。
3171 = "Tôi cố tỏ ra bình tĩnh khi trả lời, nhưng trong lòng lại cảm thấy kinh ngạc và vô cùng phấn khích."
# monologue
# JP: 鯛湾――海外の観光列車までをも知る方が、\n『いっとう楽しい』とまでご評価をくださったのだ。
3621 = "Đài Loan――Một người biết cả những chuyến tàu du lịch ở nước ngoài, mà lại đánh giá chuyến tàu này là 『thú vị nhất』."
# monologue
# JP: （いや、リップサービスももちろんあろう。\nそれに、快適でも優秀でもなく、“楽しい”だ）
3694 = "（Không, tất nhiên cũng có lời nói khách sáo trong đó. Hơn nữa, không phải là thoải mái hay xuất sắc, mà là “thú vị”.）"
# monologue
# JP: 凪とふかみのパーソナリティ。お客様との相性。\nそうした部分にも大きく左右されそうな評価軸だ、が。
3020 = "Tính cách của Nagi và Fukami. Sự tương thích với hành khách. Tiêu chí đánh giá có vẻ cũng bị ảnh hưởng nhiều bởi những yếu tố đó, nhưng mà."
# monologue
# JP: （やったな――日々姫――いや）
3708 = "（Làm tốt lắm――Hibiki――Không）"
# monologue
# JP: そうだ、日々姫だ。\n慌てて見れば――
3141 = "Đúng rồi, Hibiki. Tôi vội vàng nhìn sang thì――"
# 【日々姫】
# display as 日日姬
# JP: 「ご不用のものがございましたら、どうぞこちらへ」
2294 = "「Nếu quý khách có rác cần vứt, xin vui lòng bỏ vào đây ạ.」"
# monologue
# JP: ……斎藤さんのサポートを、プロとして、\n適切迅速に終えたのだろう。
1528 = "......Chắc hẳn em ấy đã hoàn thành việc hỗ trợ phu nhân Saito một cách thích hợp và nhanh chóng với tư cách là một chuyên gia."
# monologue
# JP: 今はゴミ袋を手にもって、\n座席の間を、不要物回収に巡回している。
3129 = "Bây giờ em ấy đang cầm túi rác trên tay, đi dọc các lối đi giữa các hàng ghế để thu gom rác."
# 【真闇】
# display as 真闇
# JP: 「ああ――車掌、さん？　いま、ちょっとよかと」
2174 = "「A――Cô trưởng tàu ơi? Bây giờ cô rảnh một chút không.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、なんでしょう。お客様」
2463 = "「Vâng, có chuyện gì vậy ạ, thưa quý khách.」"
# monologue
# JP: 真闇姉の呼びかけに日々姫がとまれば、\nすぐさまふかみが袋を受取り、不要物回収を引き継ぐ。
3321 = "Khi Hibiki dừng lại theo tiếng gọi của chị Mayami, Fukami lập tức nhận lấy chiếc túi và tiếp quản việc thu gom rác."
# monologue
# JP: 職務上も正しい扱いだ。日々姫は添乗――指導車掌で、\nふかみは\\x%lギャレー;#00ffc040;ギャレー%l;#;クルー、客室乗務員なのだから。
3609 = "Đó cũng là cách xử lý đúng đắn về mặt chức vụ. Hibiki là người đi kèm――trưởng tàu hướng dẫn, còn Fukami là thành viên \\x%lギャレー;#00ffc040;bếp trên tàu%l;#;, là nhân viên phục vụ trên tàu mà."
# 【真闇】
# display as 真闇
# JP: 「こん列車のきっぷって、車掌さんからも買えっと？」
2695 = "「Vé của chuyến tàu này, có thể mua từ trưởng tàu không?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、もちろん販売はできますが――」
2461 = "「Vâng, tất nhiên là có thể bán được ạ, nhưng mà――」"
# monologue
# JP: 日々姫が戸惑い、言葉を探してしまっている。\n困惑するもの無理はない。
3325 = "Hibiki lúng túng, cố tìm lời để nói. Em ấy bối rối cũng là điều đương nhiên."
# monologue
# JP: 真闇姉には、往復切符を渡しているのだ。\nが、それは私情。職務に関係させてはいけない。
3478 = "Chúng tôi đã đưa vé khứ hồi cho chị Mayami rồi. Nhưng đó là chuyện cá nhân. Không được để nó dính dáng đến công việc."
# 【双鉄】
# display as 雙鐵
# JP: 「もちろん販売できますが、\n車内補充券としての発券となってしまいます」
2184 = "「Tất nhiên là có thể bán được ạ, nhưng vé sẽ được xuất dưới dạng vé bổ sung trên tàu.」"
# monologue
# JP: ゆえに、即座に日々姫を支える。
3207 = "Vì vậy, tôi lập tức hỗ trợ Hibiki."
# monologue
# JP: 車内補充券の見本を見せて、\n“日々姫が戸惑った理由”をつくる。
3175 = "Tôi đưa ra mẫu vé bổ sung trên tàu, tạo ra “lý do khiến Hibiki lúng túng”."
# 【双鉄】
# display as 雙鐵
# JP: 「このように、手書きの簡素なものとなります。\n駅発行の切符とは異なる仕様となりますが」
2338 = "「Nó sẽ là một tờ vé viết tay đơn giản như thế này. Quy cách sẽ khác với vé được phát hành tại ga ạ.」"
# monologue
# JP: ああ、小さな声が聞こえる。\nどうやら周りの乗客たちも、納得をしてくれたらしい。
3197 = "A, tôi nghe thấy những tiếng xì xầm nho nhỏ. Có vẻ như những hành khách xung quanh cũng đã hiểu ra vấn đề."
# monologue
# JP: 駅発行のとれいん食堂きっぷは無論、日々姫デザイン。\n列車に似合う、上品で美しいものなのだから。
3574 = "Vé Tàu nhà hàng phát hành tại ga tất nhiên là do Hibiki thiết kế. Nó là một thứ trang nhã và tuyệt đẹp, rất phù hợp với chuyến tàu này."
# 【真闇】
# display as 真闇
# JP: 「うん。それは知っとー。プレゼントでもろうたけん。\nばってん――自分のお金で、こん列車で、買いたいんよ」
2226 = "「Ừm. Chuyện đó thì chị biết. Vì chị được tặng làm quà mà. Nhưng mà――Chị muốn dùng tiền của chính mình, để mua vé trên chuyến tàu này.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
2196 = "「!」"
# 【斎藤】
# display as 齋藤
# JP: 「まっことですなぁ」
2371 = "「Đúng là vậy nhỉ.」"
# monologue
# JP: ――斎藤さんも、自分の財布を出している。\nその口元は、微かに、確かに、ほころんでいる。
3665 = "――Phu nhân Saito cũng đang lấy ví của mình ra. Khóe miệng bà hơi mỉm cười, một nụ cười thật sự."
# 【斎藤】
# display as 齋藤
# JP: 「良かもん買うなら、仕事で稼いだ、自分のお金で。\nそぎゃんとせんと、かえってもったいなかですけん」
2613 = "「Nếu muốn mua đồ tốt, thì phải dùng tiền của chính mình kiếm được từ công việc. Nếu không làm vậy, ngược lại sẽ lãng phí lắm.」"
# 【日々姫】
# display as 日日姬
# JP: 「～～～～～～～っ」
2785 = "「~~~~~~~」"
# monologue
# JP: （ああ――）
3701 = "（A――）"
# monologue
# JP: 認めて貰えた。対価を払うそのことにより、\n自分の仕事と同等以上と――日々姫の仕事を。
3118 = "Chúng tôi đã được công nhận. Bằng việc trả một mức giá tương xứng, họ coi công việc của Hibiki――ngang bằng hoặc thậm chí cao hơn công việc của chính họ."
# monologue
# JP: 職人として――右田の蔵の杜氏と筆頭蔵人が、\n声を揃えて、形を示して、認めてくれた。
3067 = "Với tư cách là những người thợ――Trưởng hầm rượu và Thợ ủ rượu chính của xưởng rượu Migita, đã đồng thanh, thể hiện bằng hành động, và công nhận chúng tôi."
# 【真闇】
# display as 真闇
# JP: 「ゆーことやけん、車掌さん。帰りのきっぷ。\nしあさって発のを二枚、もらえると？」
2385 = "「Nên là vậy đó, cô trưởng tàu. Vé chiều về. Cho tôi hai vé xuất phát vào ngày mốt được không?」"
# monologue
# JP: 日々姫に向かって、満面の笑顔で声をかけ、\n瞬間、真闇姉がしまったという顔になる。
3485 = "Chị Mayami cất tiếng gọi Hibiki với nụ cười rạng rỡ trên môi, nhưng ngay khoảnh khắc tiếp theo, gương mặt chị lộ rõ vẻ bối rối như thể nhận ra mình lỡ lời."
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
# 2187 = "「啊……」" 
# monologue
# JP: 日々姫は今、話をできる状態ではない。
3354 = "Hibiki lúc này không ở trong trạng thái có thể nói chuyện được."
# monologue
# JP: だが、これこそは日々姫の仕事だ。\nならば、僕にできるサポートは――
3059 = "Nhưng mà, đây chính là công việc của Hibiki. Nếu vậy, sự hỗ trợ mà tôi có thể làm là――"
# 【双鉄】
# display as 雙鐵
# JP: 「少々、お時間をいただけますか？\n空席を確認いたします」
2628 = "「Quý khách có thể cho chúng tôi xin một chút thời gian được không ạ? Chúng tôi sẽ kiểm tra chỗ trống.」"
# monologue
# JP: 連結部から様子を見ていた凪に、頷く。\n凪はしずしず、運転台へと向かっていく。
3189 = "Tôi gật đầu với Nagi, người đang quan sát tình hình từ phần nối các toa. Nagi lặng lẽ tiến về phía buồng lái."
# 【ふかみ】
# display as 深美
# JP: 「あ、そか。ここ、山だから」
2206 = "「A, ra vậy. Ở đây là vùng núi mà.」"
# monologue
# JP: 思わずなのか、気を効かせてか、\nふかみが声を漏らしてくれる。
2947 = "Không biết là do buột miệng hay là tinh ý, Fukami đã cất tiếng nói giúp chúng tôi."
# monologue
# JP: 山間で電波が悪く、ゆえに端末で空席照会をかけられない。\nならば――
3082 = "Vùng núi sóng yếu, nên không thể dùng thiết bị để tra cứu chỗ trống được. Nếu vậy thì――"
# 【凪】
# display as 凪
# JP: 「レイルロオドに空席を確認してまいりました」
2374 = "「Tôi đã xác nhận chỗ trống với Railord rồi ạ.」"
# monologue
# JP: 共感ならば電波状況は関係しない。\nよそ行きの凪から受け取る図面をゆっくり確かめる。
2986 = "Nếu là cộng cảm thì không liên quan gì đến tình trạng sóng điện thoại. Tôi chậm rãi kiểm tra bản vẽ nhận được từ Nagi, người đang tỏ ra rất khách sáo."
# 【双鉄】
# display as 雙鐵
# JP: 「おまたせいたしました。お席のご用意は可能です」
2634 = "「Xin lỗi vì đã để quý khách phải đợi. Chúng tôi có thể sắp xếp chỗ ngồi cho quý khách ạ.」"
# monologue
# JP: しあさって――御一夜いきの一番列車ともならない、\nど平日発車の食堂列車。
3111 = "Ngày mốt――Chuyến tàu nhà hàng khởi hành vào một ngày trong tuần, thậm chí còn chẳng phải chuyến tàu đầu tiên đi Ohimitera."
# monologue
# JP: それでも八割の席が埋まっていることに、\n内心ほっとし、同時にいささか悔しくも思う。
3050 = "Dù vậy, việc 80% số ghế đã được lấp đầy, khiến tôi thầm thở phào nhẹ nhõm, nhưng đồng thời cũng cảm thấy đôi chút tiếc nuối."
# monologue
# JP: （湯富院・大板いきは、\n予約分全てが即日が満席になるというのに）
3727 = "（Trong khi chuyến đi Yufuin - Oita, toàn bộ số vé đặt trước đều bán hết sạch ngay trong ngày.）"
# monologue
# JP: けれども、走り初めたばかりだ。
2952 = "Nhưng mà, chúng tôi chỉ mới bắt đầu chạy thôi."
# monologue
# JP: 御一夜の魅力が知られれば、\nすぐにこちらも、満席続きとできるはずだ。
3149 = "Nếu sức hấp dẫn của Ohimitera được nhiều người biết đến, chắc chắn tuyến đường này cũng sẽ sớm liên tục cháy vé thôi."
# 【真闇】
# display as 真闇
# JP: 「ほんなら――」
2416 = "「Nếu vậy thì――」"
# monologue
# JP: ちらり、と真闇姉が日々姫を伺う。\nどうか――その肩は、いまだ僅かに震えているが――
3473 = "Chị Mayami khẽ liếc nhìn Hibiki. Làm sao đây――Bờ vai ấy vẫn đang run rẩy nhè nhẹ, nhưng mà――"
# 【斎藤】
# display as 齋藤
# JP: 「ああ、料理のメニューば、\nいきと、変わるとですかねぇ？」
2314 = "「A, thực đơn món ăn, có khác so với lúc đi không nhỉ?」"
# monologue
# JP: 愛想のかけらも無い口調で、不器用極まる優しさで、\n斎藤さんが、僕を見ながら訪ねてくれる。
3670 = "Với giọng điệu chẳng có lấy một chút thân thiện, cùng sự dịu dàng vụng về tột độ, phu nhân Saito nhìn tôi và hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「もちろんでございます、お客様」
2536 = "「Tất nhiên là có rồi ạ, thưa quý khách.」"
# monologue
# JP: 日々姫の肩が小さく動く。\n伝わったのだと、素直に感じる。
3345 = "Bờ vai của Hibiki khẽ động đậy. Tôi cảm nhận được một cách rõ ràng rằng, tâm ý đó đã được truyền đạt."
# 【双鉄】
# display as 雙鐵
# JP: 「とれいん食堂はとれたてをインする食堂ですから。\n[ぶんごもり,2]文庫森でご提供する朝食は、文庫森のとれたてです」
2094 = "「Tàu nhà hàng là nơi mang đến những nguyên liệu tươi ngon nhất mà. Bữa sáng phục vụ tại Bungomori, sẽ là những nguyên liệu tươi mới của Bungomori.」"
# 【真闇】
# display as 真闇
# JP: 「うふふ、楽しみ。\nきっぷ、お食事つきのコースでお願いします」
2143 = "「Ư fufu, mong chờ quá đi. Cho tôi vé có kèm theo bữa ăn nhé.」"
# 【斎藤】
# display as 齋藤
# JP: 「良かとですねぇ。ほーたら、同じ切符ば、私にも」
2275 = "「Tốt quá nhỉ. Vậy thì, cho tôi một vé giống vậy luôn nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「かしこまりました」
# 2428 = "「明白了」" 
# 【日々姫】
# display as 日日姬
# JP: 「それでは――発券、させていただきます」
2749 = "「Vậy thì――Tôi xin phép xuất vé ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2196 = "「啊！」" 
# monologue
# JP: 日々姫が声を絞り出す。\n顔をあげ、背筋をピンと伸ばしてる。
3348 = "Hibiki khó nhọc cất tiếng. Em ấy ngẩng mặt lên, vươn thẳng lưng."
# monologue
# JP: 感情の昂ぶりを押さえ込み。\nプロとして、任された仕事を果たそうとする。
3124 = "Cố gắng kìm nén cảm xúc đang trào dâng. Em ấy đang cố gắng hoàn thành công việc được giao với tư cách là một chuyên gia."
# 【日々姫】
# display as 日日姬
# JP: 「乗車区間はどうなさいますか？」
2625 = "「Quý khách muốn đi chặng nào ạ?」"
# 【真闇】
# display as 真闇
# JP: 「湯富院から、御一夜温泉まででお願いします」
2349 = "「Từ Yufuin đến suối nước nóng Ohimitera nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「しあさって、八月二十八日のとれいん食堂指定券。\n食事付き。同日から有効の、湯富院-御一夜の乗車券」
2270 = "「Vé chỉ định Tàu nhà hàng ngày mốt, ngày 28 tháng 8. Có kèm bữa ăn. Vé lên tàu Yufuin - Ohimitera, có hiệu lực từ cùng ngày.」"
# monologue
# JP: 料金表を確かめる。\nその目は潤んでいるものの、声はわずかも奮えない。
3127 = "Em ấy kiểm tra lại bảng giá. Mặc dù đôi mắt đang rơm rớm, nhưng giọng nói không hề run rẩy chút nào."
# 【日々姫】
# display as 日日姬
# JP: 「お一人様、税込みで39000円になります」
2505 = "「Mỗi người là 39.000 yên đã bao gồm thuế ạ.」"
# 【真闇】
# display as 真闇
# JP: 「はぁい、じゃあ、丁度で」
2289 = "「Vâng, vậy thì, vừa đủ nhé.」"
# 【斎藤】
# display as 齋藤
# JP: 「40000円でお願いできますか」
2255 = "「Tôi đưa 40.000 yên có được không.」"
# 【日々姫】
# display as 日日姬
# JP: 「かしこまりました」
# 2428 = "「明白了」" 
# monologue
# JP: まずは斎藤さんへのお釣り。
3656 = "Trước tiên là trả tiền thừa cho phu nhân Saito."
# monologue
# JP: そうして日々姫は細やかな字で丁寧に、\n補充券へときっぷ内容を描き込んでいく。
3221 = "Sau đó, Hibiki cẩn thận nắn nót từng chữ nhỏ, điền nội dung vé vào vé bổ sung."
# monologue
# JP: ＜8月28日から有効　湯富院から御一夜温泉ゆき。\n経由（とれ食）、当日限り。乗車券のみ５日間有効＞
3739 = "＜Có hiệu lực từ ngày 28 tháng 8, từ Yufuin đi suối nước nóng Ohimitera. Chặng (Tàu nhà hàng), chỉ có giá trị trong ngày. Chỉ vé lên tàu có hiệu lực trong 5 ngày＞"
# monologue
# JP: ＜39000円、 大人１。とれ食2号1号車4A。\n8/25　とれ食１号。御一夜車掌区乗務員発行＞
3736 = "＜39.000 yên, 1 Người lớn. Tàu nhà hàng số 2, toa 1, 4A. 25/8 Tàu nhà hàng số 1. Nhân viên phân khu trưởng tàu Ohimitera phát hành＞"
# 【日々姫】
# display as 日日姬
# JP: 「こちらでお間違いないですか？」
2627 = "「Thông tin trên này không có gì sai sót chứ ạ?」"
# 【真闇】
# display as 真闇
# JP: 「はぁい、このきっぷを下さいな」
2512 = "「Vâng, xin hãy cho tôi vé này.」"
# 【日々姫】
# display as 日日姬
# JP: 「かしこまり――ました」
2423 = "「Tôi hiểu――rồi ạ.」"
# monologue
# JP: 震える手で、日々姫がきっぷを手渡していく。
3334 = "Với đôi tay run rẩy, Hibiki đưa từng tấm vé cho họ."
# monologue
# JP: 真闇姉へと。\n斎藤さんへと。
3509 = "Đưa cho chị Mayami. Đưa cho phu nhân Saito."
# 【ふかみ】
# display as 深美
# JP: 「まもなく、湯富院、湯富院駅に到着します。\nお降りのお客様は、お忘れ物の無いようご用意下さい」
2092 = "「Sắp tới, tàu sẽ đến Yufuin, ga Yufuin. Quý khách xuống tàu xin vui lòng chuẩn bị hành lý để tránh bỏ quên ạ.」"
# 【凪】
# display as 凪
# JP: 「列車とホームに段差があるけん！\nお足元には気をつけて！！」
2093 = "「Giữa tàu và sân ga có bậc thềm đó nha! Xin quý khách hãy chú ý bước chân!!」"
# monologue
# JP: （プシューーーーっ）
3707 = "（Phìiiiiiii）"
# monologue
# JP: 列車はホームに滑り込む。\n車掌が全てのドアを開く。
3036 = "Đoàn tàu từ từ tiến vào sân ga. Trưởng tàu mở toàn bộ các cửa."
# 【双鉄】
# display as 雙鐵
# JP: 「ご乗車、まことにありがとうございました」
2356 = "「Xin chân thành cảm ơn quý khách đã sử dụng dịch vụ.」"
# 【日々姫】
# display as 日日姬
# JP: 「どうぞ、お気をつけて。この先も良いご旅行を」
2626 = "「Xin quý khách đi cẩn thận. Chúc quý khách có một chuyến du lịch tốt đẹp ở chặng đường tiếp theo.」"
# monologue
# JP: そうして、乗客が下りていく。みんな、笑顔で。\n一番最後に――斎藤さんも。真闇姉も。
3218 = "Cứ như vậy, hành khách lần lượt xuống tàu. Ai nấy đều tươi cười. Cuối cùng――cả phu nhân Saito và chị Mayami cũng vậy."
# 【真闇】
# display as 真闇
# JP: 「よっと」
2251 = "「Hây dô.」"
# monologue
# JP: おりるや否やで、くるりと振り向く。
2940 = "Vừa bước xuống tàu, chị ấy liền quay ngoắt lại."
# 【真闇】
# display as 真闇
# JP: 「ありがとね、ひーちゃん。\nおねーちゃん、楽しくて、美味しくて、嬉しかった！」
2630 = "「Cảm ơn em nhé, Hi-chan. Chị đã rất vui, rất ngon miệng, và rất hạnh phúc!」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！」
# 2201 = "「啊！！！」" 
# monologue
# JP: 車内へ向けて、まっすぐ右手が伸ばされる。\n車内に残る妹が、姉の差し出した手を受け取る。
3122 = "Bàn tay phải của chị ấy duỗi thẳng hướng vào trong xe. Người em gái còn lại trong xe đón lấy bàn tay mà người chị đưa ra."
# monologue
# JP: 握手。ほんの一瞬だけの。\nけれど、それで十分な。
2983 = "Họ bắt tay nhau. Chỉ trong một khoảnh khắc ngắn ngủi. Nhưng, như vậy là quá đủ rồi."
# 【真闇】
# display as 真闇
# JP: 「そいでね？　双ちゃん。機関車磨きも、楽しかったと。\nあぎゃんこと、湯医線の沿線でもできたらよかとよね」
2327 = "「Với lại nhé? Sou-chan. Việc lau chùi đầu máy cũng vui lắm đó. Nếu có thể làm mấy việc như vậy ở dọc tuyến Yui thì tốt biết mấy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2196 = "「啊！」" 
# monologue
# JP: 『湯医線沿線』だ。御一夜ではなく――8620ではなく。\n機関車保存体験という観光を、湯医線沿線へ持ち込めれば。
3132 = "Là 『Dọc tuyến Yui』. Không phải Ohimitera――Không phải 8620. Nếu có thể mang hoạt động du lịch trải nghiệm bảo tồn đầu máy xe lửa đến dọc tuyến Yui."
# monologue
# JP: なるほど確かに――今は普通列車扱いの、\n湯医-御一夜間さえも、観光列車区間とできるかもしれん。
3495 = "Ra là vậy, quả thực――Ngay cả đoạn Yui - Ohimitera hiện đang chạy tàu thường, cũng có thể trở thành đoạn tàu du lịch."
# 【真闇】
# display as 真闇
# JP: 「ひーちゃんのデザインした車内も素敵だったし。\n今度は、ホテル！　おねーちゃん、泊まってみたかかも」
2323 = "「Nội thất trong xe do Hi-chan thiết kế cũng tuyệt vời lắm. Lần tới, làm khách sạn đi! Chị cũng muốn ở thử xem sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああっ！！」
2195 = "「A á!!」"
# monologue
# JP: 繋がる、同時に。日々姫と僕の理解がまるごと。\nホテルであれば、廃客車を探す必要もない。
3317 = "Đồng thời kết nối. Toàn bộ sự thấu hiểu của tôi và Hibiki. Nếu là khách sạn, thì không cần phải tìm kiếm toa hành khách bỏ đi nữa."
# monologue
# JP: “寝台車風のホテル”を作り、\nその\\x%l先頭車;#00ffc040;先頭車%l;#;として、D51 1031を移設してくる――
3424 = "Tạo ra một “khách sạn mang phong cách toa giường nằm”, và di dời D51 1031 đến làm \\x%l先頭車;#00ffc040;toa dẫn đầu%l;#; của nó――"
# 【斎藤】
# display as 齋藤
# JP: 「真闇お嬢。宿の車ば、迎えにきとりますが」
2566 = "「Cô Mayami. Xe của nhà trọ đã đến đón rồi kìa.」"
# 【真闇】
# display as 真闇
# JP: 「いけんいけん！　それじゃ、ひーちゃん、双ちゃん。\nおねーちゃん旅行、楽しんでくるけんね！」
2576 = "「Tiêu rồi tiêu rồi! Vậy thôi nhé, Hi-chan, Sou-chan. Chị đi tận hưởng chuyến du lịch đây nha!」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　ねぇねぇ、いってらっしゃい！\nそれから、ありがと！」
2229 = "「Vâng! Chị đi chơi vui vẻ nhé! Và, cảm ơn chị!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いってらっしゃい、真闇姉」
2004 = "「Đi đường cẩn thận nhé, chị Mayami.」"
# monologue
# JP: 日々姫とふたり、深々と頭を下げる。
3184 = "Tôi và Hibiki cùng nhau cúi đầu thật sâu."
# 【斎藤】
# display as 齋藤
# JP: 「……[ひびき,2]日々姫お嬢ば、ご自分の蔵。\nよーぉお見つけになられましたねぇ」
1604 = "「......Cô Hibiki đã tìm thấy hầm rượu của riêng mình rồi nhỉ. Thật là tốt quá.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
2179 = "「Hả!?」"
# monologue
# JP: 空耳、ではない。\n日々姫の反応が告げている。
3337 = "Không phải là nghe nhầm. Phản ứng của Hibiki đã chứng minh điều đó."
# 【斎藤】
# display as 齋藤
# JP: 「あん車ば、宿の迎えですけん」
2744 = "「Chiếc xe kia là xe đón của nhà trọ đó.」"
# monologue
# JP: だがしかし、\n斎藤さんの目も足ももう、改札外へと向いている。
2953 = "Nhưng mà, ánh mắt và bước chân của phu nhân Saito đã hướng ra ngoài cổng soát vé mất rồi."
# 【日々姫】
# display as 日日姬
# JP: 「～～っ！　\nご乗車、ありがとう、ございました！」
2783 = "「~~! Xin cảm ơn quý khách đã sử dụng dịch vụ ạ!」"
# monologue
# JP: その小さな背に、もう一度、\n日々姫が深々と頭を下げる。
3329 = "Về phía bóng lưng nhỏ bé ấy, một lần nữa, Hibiki lại cúi đầu thật sâu."
# monologue
# JP: （ガランガラーン！　ガランガラーン！）
3700 = "（Keng keng! Keng keng!）"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、乗務だ」
2422 = "「Hibiki, làm việc thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！！」
2231 = "「Vâng!!」"
# monologue
# JP: 客席の九割方は空になったが、\n責任は少しも変わらない。
3636 = "Mặc dù 90% số ghế hành khách đã trống không, nhưng trách nhiệm thì không hề thay đổi chút nào."
# 【日々姫】
# display as 日日姬
# JP: 「[おおいた,1]大板駅まで」
2753 = "「Đến ga Oita.」"
# 【双鉄】
# display as 雙鐵
# JP: 「終着駅まで」
2754 = "「Đến ga cuối cùng.」"
# monologue
# JP: そしてそこから、僕と日々姫の、\n新しい旅を、始めていこう。
3431 = "Và từ đó, chuyến hành trình mới của tôi và Hibiki, sẽ bắt đầu."
