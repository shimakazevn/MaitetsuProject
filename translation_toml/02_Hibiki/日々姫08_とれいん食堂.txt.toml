2496 = "「櫪木！你對日日姬老師用的什麼口氣！」" 

# 【栃木】
# display as 櫪木
# JP: 「こん嬢ちゃんが先生やったら、\nワシんごときは大先生ちゃよ！　食堂車ののー」
2612 = "「要是這小丫頭稱得上老師的話，那我豈不就是大教授了！餐車方面的教授」" 

# 【日々姫】
# display as 日日姬
