# JP: 「いや、素晴らしいっちゃ！\nこぎゃんと、よーお思いついたっちゃのう！！」
2164 = "「哎呀，太棒了！居然能想出這樣的東西來！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
2192 = "「啊」" 

# monologue
# JP: 栃木さん――レストラン『雲仙』のオーナーにして、\n元食堂車のチーフを勤めた、凄腕シェフだ。
3359 = "是櫪木先生，他是雲仙餐廳的老闆，之前在餐車上工作過的大主廚。" 

# monologue
# JP: その凄腕を、ぴしり、と老技師――\n木本さんがひとはたきする。
3525 = "而這位大主廚卻被老技工——木本先生狠狠拍了一巴掌。" 

# 【木本】
# display as 木本
