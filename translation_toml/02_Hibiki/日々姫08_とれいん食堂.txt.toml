2774 = "「Đến Kurume lúc 15:30 là giờ uống trà và\năn đồ ngọt.\nXuất phát từ Bungomori lúc 18:30 là bữa\ntối. Yufuin lúc 20:00. Đến Oita lúc 21:30」"

