2128 = "「Được rồi. Nhờ cậu nhé. Nhưng tuyệt đối\nkhông được chạy đâu đấy.」"

# 【凪】
# display as 凪
# JP: 「わかっとるばい」
2429 = "「Em biết rồi nè.」"

# monologue
