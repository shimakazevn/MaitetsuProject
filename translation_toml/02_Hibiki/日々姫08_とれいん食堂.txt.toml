3083 = "Bởi vì tất cả những gì cần làm,\nchúng tôi đều đã làm hết sức mình rồi."

# monologue
# JP: ――八ツ城を出ての昼食。来目を出てのティータイム。\n好みのお茶を楽しみながらの、ピアニストによる生演奏。
3640 = "——Bữa trưa sau khi rời Yatsushiro. Tiệc\ntrà sau khi rời Kurume.\nThưởng thức loại trà yêu thích trong tiếng\nđàn piano chơi trực tiếp."

# monologue
# JP: 中間駅での観光停車も挟みつつ、\n旅はいよいよ、終盤へと差し掛かってくる。
3102 = "Xen kẽ những lần dừng tàu tham quan ở các\nga trung gian,\nchuyến đi cuối cùng cũng đang dần đi đến\nhồi kết."

# 【真闇】
# display as 真闇
# JP: 「あとは晩御飯だけになっちゃったとねー。\n列車ばおりるの、少し、さみしか」
2403 = "「Chỉ còn mỗi bữa tối nữa thôi nhỉ.\nPhải xuống tàu rồi, hơi buồn một chút」"

# 【斎藤】
# display as 齋藤
# JP: 「[まくら,1]真闇さんだけ[おおいた,1]大板まで乗ってくれても良かとですよ。\n私は、[ゆふいん,2]湯富院でのんびりお待ちしますけん」
2563 = "「Cô Mayami cứ đi tiếp đến Oita một mình\ncũng được mà.\nTôi sẽ thong thả đợi cô ở Yufuin」"

# 【真闇】
# display as 真闇
# JP: 「んーん。うちも[ゆふいん,2]湯富院で骨休めばせんと。\nせーっかくもらったお休みやけんね」
2008 = "「Không đâu. Cháu cũng phải nghỉ ngơi thư\ngiãn ở Yufuin chứ.\nKhó khăn lắm mới được nghỉ phép mà lị」"

# monologue
