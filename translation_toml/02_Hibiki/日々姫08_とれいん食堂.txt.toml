# 【真闇】
# display as 真闇
# JP: 「はぁい、じゃあ、丁度で」
2289 = "「好的，那我有正好的」" 

# 【斎藤】
# display as 齋藤
# JP: 「40000円でお願いできますか」
2255 = "「四萬日元可以找嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「かしこまりました」
# 2428 = "「明白了」" 

# monologue
# JP: まずは斎藤さんへのお釣り。
3656 = "首先是給齋藤夫人找零。" 

# monologue
# JP: そうして日々姫は細やかな字で丁寧に、\n補充券へときっぷ内容を描き込んでいく。
3221 = "接著日日姬用秀氣的小字在補充票裡寫下車票詳情。" 

# monologue
# JP: ＜8月28日から有効　湯富院から御一夜温泉ゆき。\n経由（とれ食）、当日限り。乗車券のみ５日間有効＞
3739 = "＜８月２８日起生效　湯布院至御一夜溫泉。經由（列車食堂），餐點當日有效。車票５日內有效＞" 

# monologue
# JP: ＜39000円、 大人１。とれ食2号1号車4A。\n8/25　とれ食１号。御一夜車掌区乗務員発行＞
3736 = "＜３９０００日元，成人座一位。列車食堂２號１號車４Ａ。８／２５　列車食堂１號。御一夜列車長管區乘務員出票＞" 

# 【日々姫】
# display as 日日姬
# JP: 「こちらでお間違いないですか？」
2627 = "「請確認一下票面有沒有問題」" 

# 【真闇】
# display as 真闇
# JP: 「はぁい、このきっぷを下さいな」
2512 = "「沒問題，請把這張票給我吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「かしこまり――ました」
2423 = "「明白……了」" 

# monologue
# JP: 震える手で、日々姫がきっぷを手渡していく。
3334 = "日日姬用顫抖的手把票遞了過去。" 

# monologue
# JP: 真闇姉へと。\n斎藤さんへと。
3509 = "給真闇姐一張，再給齋藤夫人一張。" 

# 【ふかみ】
# display as 深美
# JP: 「まもなく、湯富院、湯富院駅に到着します。\nお降りのお客様は、お忘れ物の無いようご用意下さい」
2092 = "「列車即將抵達湯布院，要下車的乘客請不要遺忘隨身行李」" 

# 【凪】
# display as 凪
# JP: 「列車とホームに段差があるけん！\nお足元には気をつけて！！」
2093 = "「列車和站台間有落差！請注意腳下！！」" 

# monologue
# JP: （プシューーーーっ）
3707 = "（噗——）" 

# monologue
# JP: 列車はホームに滑り込む。\n車掌が全てのドアを開く。
3036 = "列車緩緩滑入站台。列車長打開了所有車門。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご乗車、まことにありがとうございました」
2356 = "「感謝各位搭乘本次列車」" 

# 【日々姫】
# display as 日日姬
# JP: 「どうぞ、お気をつけて。この先も良いご旅行を」
2626 = "「請多保重。希望大家接下來的旅途也一路順利」" 

# monologue
# JP: そうして、乗客が下りていく。みんな、笑顔で。\n一番最後に――斎藤さんも。真闇姉も。
3218 = "接下來，乘客們紛紛下車。大家臉上都洋溢著笑容。最後下車的齋藤夫人和真闇姐也不例外。" 

# 【真闇】
# display as 真闇
# JP: 「よっと」
2251 = "「嘿咻」" 

# monologue
# JP: おりるや否やで、くるりと振り向く。
2940 = "一走下列車，她就回過頭來。" 

# 【真闇】
# display as 真闇
# JP: 「ありがとね、ひーちゃん。\nおねーちゃん、楽しくて、美味しくて、嬉しかった！」
2630 = "「謝謝你，小日。姐姐玩得很開心，吃得很盡興，也感到很欣慰！」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！！！」
# 2201 = "「啊！！！」" 

# monologue
# JP: 車内へ向けて、まっすぐ右手が伸ばされる。\n車内に残る妹が、姉の差し出した手を受け取る。
3122 = "她把右手直直伸入車內。而留在裡面的妹妹趕緊握住了姐姐伸出的手。" 

# monologue
# JP: 握手。ほんの一瞬だけの。\nけれど、それで十分な。
2983 = "兩隻手握住的時間只有短短一瞬。但這就足夠了。" 

# 【真闇】
# display as 真闇
# JP: 「そいでね？　双ちゃん。機関車磨きも、楽しかったと。\nあぎゃんこと、湯医線の沿線でもできたらよかとよね」
2327 = "「小雙，還有件事。保養機車的活動也很有趣。如果湯醫線沿線也有這種活動就好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2196 = "「啊！」" 

# monologue
# JP: 『湯医線沿線』だ。御一夜ではなく――8620ではなく。\n機関車保存体験という観光を、湯医線沿線へ持ち込めれば。
3132 = "她說的是“湯醫線沿線”而非御一夜——不是８６２０。她建議把機車保養體驗的觀光活動引入湯醫線沿線。" 

# monologue
# JP: なるほど確かに――今は普通列車扱いの、\n湯医-御一夜間さえも、観光列車区間とできるかもしれん。
3495 = "確實，現在只開行普通列車的湯醫—御一夜段，說不定也可以打造成觀光列車段。" 

# 【真闇】
# display as 真闇
# JP: 「ひーちゃんのデザインした車内も素敵だったし。\n今度は、ホテル！　おねーちゃん、泊まってみたかかも」
2323 = "「小日設計的車廂內部也很棒。不如下次再設計個旅館！姐姐我挺想住住看的呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「ああっ！！」
2195 = "「啊啊！！」" 

# monologue
# JP: 繋がる、同時に。日々姫と僕の理解がまるごと。\nホテルであれば、廃客車を探す必要もない。
3317 = "日日姬和我同時明白了她的所有意圖。如果是旅館的話就不用尋找廢棄客運車廂了。" 

# monologue
# JP: “寝台車風のホテル”を作り、\nその\x%l先頭車;#00ffc040;先頭車%l;#;として、D51 1031を移設してくる――
3424 = "為打造“臥鋪車風格的旅館”，把Ｄ５１　１０３１作為\\x%l先頭車;#00ffc040;車頭%l;#;遷移過來……" 

# 【斎藤】
# display as 齋藤
# JP: 「真闇お嬢。宿の車ば、迎えにきとりますが」
2566 = "「真闇小姐，旅館的車子來接我們了」" 

# 【真闇】
# display as 真闇
# JP: 「いけんいけん！　それじゃ、ひーちゃん、双ちゃん。\nおねーちゃん旅行、楽しんでくるけんね！」
2576 = "「糟了糟了！那就先這樣吧，小日、小雙。姐姐去享受旅行啦！」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　ねぇねぇ、いってらっしゃい！\nそれから、ありがと！」
2229 = "「嗯！阿姐，一路順風！還有就是，謝謝你！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いってらっしゃい、真闇姉」
2004 = "「一路順風，真闇姐」" 

# monologue
# JP: 日々姫とふたり、深々と頭を下げる。
3184 = "我和日日姬一起向她深深低下了頭。" 

# 【斎藤】
# display as 齋藤
# JP: 「……[ひびき,2]日々姫お嬢ば、ご自分の蔵。\nよーぉお見つけになられましたねぇ」
1604 = "「……我很高興看到日日姬小姐能夠找到屬於自己的“酒廠”」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
2179 = "「唉？！」" 

# monologue
# JP: 空耳、ではない。\n日々姫の反応が告げている。
3337 = "日日姬的反應說明我並沒有聽錯。" 

# 【斎藤】
# display as 齋藤
# JP: 「あん車ば、宿の迎えですけん」
2744 = "「那輛就是旅館派來的車」" 

# monologue
# JP: だがしかし、\n斎藤さんの目も足ももう、改札外へと向いている。
2953 = "不過，齋藤夫人依然在往檢票口外走，並沒有回頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「～～っ！　\nご乗車、ありがとう、ございました！」
2783 = "「～～啊！感謝您搭乘本次列車！」" 

# monologue
# JP: その小さな背に、もう一度、\n日々姫が深々と頭を下げる。
3329 = "日日姬朝著那小小的背影再度深鞠一躬。" 

# monologue
# JP: （ガランガラーン！　ガランガラーン！）
3700 = "（哐當哐當！哐當哐當！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、乗務だ」
2422 = "「日日姬，回去工作吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！！」
2231 = "「嗯！！」" 

# monologue
# JP: 客席の九割方は空になったが、\n責任は少しも変わらない。
3636 = "雖然九成的座位都空掉了，不過肩負的責任並沒有絲毫改變。" 

# 【日々姫】
# display as 日日姬
# JP: 「[おおいた,1]大板駅まで」
2753 = "「開往大分站」" 

# 【双鉄】
# display as 雙鐵
# JP: 「終着駅まで」
2754 = "「開往終點站」" 

# monologue
# JP: そしてそこから、僕と日々姫の、\n新しい旅を、始めていこう。
3431 = "然後在那裡，我和日日姬將踏上嶄新的旅程。" 
