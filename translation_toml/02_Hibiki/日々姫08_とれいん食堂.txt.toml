2377 = "「Anh hiểu cảm giác của em. Vốn dĩ đã vất\nvả thế này,\nlại còn là đoàn tàu chứa đựng nhiều tâm\nhuyết nữa mà」"

# 【日々姫】
# display as 日日姬
# JP: 「んっ」
# 2227 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その上、最高の評価だものな」
2587 = "「Hơn nữa, lại còn nhận được đánh giá cao\nnhất nữa」"

# 【日々姫】
# display as 日日姬
# JP: 「――うんっ」
1568 = "「——Vâng」"

# monologue
# JP: 『列車が自分で、何をできるか教えてくれる』\n『誰が乗務しても、おんなじことをできるし、する』
1487 = "『Chính đoàn tàu đã cho tụi em biết mình có\nthể làm gì』\n『Dù ai làm việc trên tàu, cũng có thể làm\nđược điều tương tự, và sẽ làm được』"

# monologue
# JP: ――ふかみの素直な感想の意味するところは、\n“形態が機能をそのまま示している”ということだ。
3405 = "——Ý nghĩa đằng sau cảm nhận chân thành của\nFukami là,\n'Hình thức thể hiện nguyên vẹn chức năng\ncủa nó'."

# monologue
# JP: そうしてそれは間違いなく――\n日々姫がデザインで目指す高みの、ひとつなのだから。
3526 = "Và điều đó chắc chắn——\nlà một trong những đỉnh cao mà Hibiki\nhướng tới trong thiết kế."

# 【双鉄】
# display as 雙鐵
# JP: 「……発車までには、落ち着くんだぞ」
1600 = "「……Phải bình tĩnh lại trước khi tàu chạy\nđấy nhé」"

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2227 = "「嗯」" 

# monologue
# JP: 日々姫を背中にかばってやれば、\nこつん、と額があたってくる。
3545 = "Khi tôi che chắn cho Hibiki ở phía sau\nlưng,\nđầu em ấy khẽ cụng vào lưng tôi."

# 【日々姫】
# display as 日日姬
# JP: 「すう～――はぁ～っ――」
2152 = "「Hít~——Hà~——」"

# monologue
# JP: ……やがて、日々姫が小さく頷く。
1511 = "……Một lúc sau, Hibiki khẽ gật đầu."

# 【日々姫】
# display as 日日姬
# JP: 「うんっ」
# 2227 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2180 = "「唔」" 

# monologue
# JP: それだけでいい。
3602 = "Chỉ cần vậy là đủ."

