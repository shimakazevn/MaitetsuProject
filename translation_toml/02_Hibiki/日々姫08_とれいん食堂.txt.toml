2380 = "「我的料理有朝一日還能跟列車一起周遊各地，真是做夢都沒想到！謝謝你啊，丫頭」" 

# 【日々姫】
# display as 日日姬
# JP: 「いえ――はいっ！」
2176 = "「哪裡……嗯！」" 

# monologue
# JP: もう一度、日々姫が深々頭を下げる。
3315 = "日日姬又一次深深低下了頭。" 

