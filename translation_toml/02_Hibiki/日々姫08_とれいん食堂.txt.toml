2115 = "「原來我的話聽起來有點“人醜靠衣裝”的味道啊。實在抱歉，這不是我的本意，容我糾正一下」" 

# monologue
# JP: 二度目の失敗は許されない。
3508 = "絕對不能再搞砸了。" 

# monologue
