2692 = "「這話還真沒說錯。如果少了櫪木先生的一席話，這輛列車就不會誕生了」" 

# monologue
# JP: 日々姫が深く頭をさげれば、栃木さんはカッカと笑う。
3333 = "日日姬深深地低下頭，櫪木先生哈哈大笑。" 

# 【栃木】
# display as 櫪木
# JP: 「ワシん話からこん列車ば産みだせるなら、\nいまごろ世の中は食堂車だらけっちゃ」
2610 = "「要是我能創造出這種列車的話，那這世界上應該早就到處都是餐車了」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？」
2169 = "「哎？」" 

# 【木本】
# display as 木本
