# monologue
# JP: 早朝のレールショップに響く、\n誇らしそうなポーレットの声。
2864 = "波萊特自豪的聲音在早晨的鐵路商店裡迴響。" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;[にまんにせんけいかい,6]22000系改、御一夜\x%l22形;#00ffc040;[ニイニイ,1]22系%l;#;1号\x%l客車;#00ffc040;客車%l;#;、\n\x%lイロ;#00ffc040;ナイロ[ニイニイイチ,2]221%l;#;改修の全工程は、終了しました」
1276 = "「\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;２２０００型改、御一夜\\x%l22形;#00ffc040;２２型%l;#;１號\\x%l客車;#00ffc040;客運車廂%l;#;、\\x%lナイロ221;#00ffc040;Ｎａｉｒｏ２２１%l;#;的修復工程全部結束了」" 

# monologue
# JP: 聞くと同時に、\nハチロクが顔をほころばす。
2464 = "八六邊聽邊露出笑容。" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、\x%lイロ;#00ffc040;イロ%l;#;ですか。\n\x%l一等二等併設客車;#00ffc040;一等二等[ごうぞうしゃ,2]合造車%l;#;になさるのですね」
1708 = "「唔，是\\x%lイロ;#00ffc040;Ｉｒｏ%l;#;啊。這是改成一等二等\\x%l合造車;#00ffc040;混用車%l;#;了吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。少し待ってくれ」
1922 = "「抱歉，等一等」" 

# monologue
# JP: 投票前日。一刻一秒が惜しいこの日に、\nコアメンバーの全員が、レールショップに集合している。
2745 = "投票的前一天。在這一分一秒都十分寶貴的日子裡，所有的核心成員都聚集到了鐵路商店。" 

# monologue
# JP: 時間は無論、少しも無駄にしたくない。\nないのだが――理解も足りぬままでは余計な遠回りをする。
2714 = "我當然不想浪費哪怕一分一秒。雖然不想——但是如果缺乏理解的話只會走更多的彎路。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、その\x%l22形;#00ffc040;ナイロ[ニイニイイチ,2]221%l;#;というのは？」
2126 = "「這個\\x%lナイロ221;#00ffc040;Ｎａｉｒｏ２２１%l;#;是什麼？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%lキハ07;#00ffc040;キハ07%l;#;sの“キハ”と同じく、\x%l客車;#00ffc040;客車%l;#;にも称号――\n車輌の特徴を表す略称があるんですよ」
1680 = "「和\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;Ｓ的“Ｋｉｈａ”一樣，\\x%l客車;#00ffc040;客運車廂%l;#;也有\\x%l形式称号;#00ffc040;代號%l;#;。也就是表現車輛特徵的簡稱」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1711 = "「唔？」" 

# 【ハチロク】
# display as 八六
# JP: 「旅客を乗せてない状態の重量が27.5t以上32.5t未満の\n\x%l客車;#00ffc040;客車%l;#;につく称号が、『ナ』」
1754 = "「在沒有載客的情況下，重量在２７．５噸以上３２．５噸以下的\\x%l客車;#00ffc040;客運車廂%l;#;的\\x%l形式称号;#00ffc040;代號%l;#;就是“Ｎａ”」" 

# 【ポーレット】
# display as 波萊特
# JP: 「で、一等客車が『イ』、二等客車が『ロ』なんです。\nちなみに、普通車が『ハ』ですね」
2025 = "「然後一等座\\x%l客車;#00ffc040;客運車廂%l;#;是“Ｉ”，二等座\\x%l客車;#00ffc040;客運車廂%l;#;是“Ｒｏ”。順帶一提普通車廂是“Ｈａ”」" 

# monologue
# JP: ふたりがかりの説明は、\n息がぴったりなだけでなく、内容も必要十分だ。
2447 = "兩人的說明不但互相呼應，而且內容也很重要。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。一等二等併設で、空車重量27.6tの\x%l客車;#00ffc040;客車%l;#;であれば、\nそれは『\x%l22形;#00ffc040;ナイロ%l;#;』となるのだな？」
1971 = "「是嗎。那如果是一等二等共用、空車重量２７．６噸的\\x%l客車;#00ffc040;客運車廂%l;#;的話，連起來就是“\\x%l客車;#00ffc040;客運車廂%l;#;Ｎａ\\x%lイロ;#00ffc040;ｉｒｏ%l;#;”了吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大正解です」
1786 = "「完全正確」" 

# monologue
# JP: 理解した。
2719 = "我總算理解了。" 

# monologue
# JP: ならば221の方は、旧\x%l帝鉄;#00ffc040;帝鉄%l;#;22000系改め御一夜22系の22に、\n単純に一号客車の1を付け足しただけのものか。
3030 = "那２２１，就只是單純在舊\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;２２０００型改御一夜２２型的“２２”上加了個表示一號客運車廂的“１”啊。" 

# 【ふかみ】
# display as 深美
# JP: 「っていうか――　\x%l一等二等併設客車;#00ffc040;一等二等[ごうぞうしゃ,2]合造車%l;#;ってどんな。です？」
2098 = "「說起來——一等二等\\x%l合造車;#00ffc040;混用車%l;#;是什麼樣的車廂啊？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「一番簡単にいえば、木製テーブル付きの席を一等扱い。\nそれ以外の席を二等扱いで、切符を販売するってこと」
1988 = "「最簡單地說，就是帶木質桌子的座席作為一等，其他的座席作為二等來賣票」" 

# 【ふかみ】
# display as 深美
# JP: 「え？　えと――」
1697 = "「哎？呃……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまり、同じ\x%l客車;#00ffc040;客車%l;#;、その一輌の中ででも、\n席種を一等、二等とわけて、料金に差をつけるのだな？」
1578 = "「也就是說，雖然是同一輛\\x%l客車;#00ffc040;客運車廂%l;#;，不過座席分為一等和二等，以此來分開票價對吧？」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　わかりました。です」
1721 = "「啊！我懂了」" 

# 【れいな】
# display as 玲奈
# JP: 「でしたらぁ」
2135 = "「那」" 

# monologue
# JP: ふかみの理解と入れ替わり、\nれいなが、ことり、小首をかしげる。
2873 = "深美剛一理解，玲奈就微微歪著頭提問。" 

# 【れいな】
# display as 玲奈
# JP: 「普通席は無しにするんですかぁ？」
1563 = "「不設普通座席了嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん。全席指定でプレミアム感と余裕を出した方が、\n詰めこむよりいいって判断したの」
1731 = "「嗯。我覺得弄成全指定席增加高級感和從容感，比塞滿了人要好得多」" 

# monologue
# JP: すぐさま、ハチロクが深く頷く。
2467 = "八六隨即深深點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「妥当なご判断かと」
1839 = "「您的判斷很妥當」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……確かにそうか。観光\x%l客車;#00ffc040;客車%l;#;がぎゅうぎゅうづめでは、\nたとえ自分が座っていても、楽しめなくなりそうだ」
1306 = "「……確實是那樣。要是觀光\\x%l客車;#00ffc040;客運車廂%l;#;擠得跟下餃子一樣，就算是坐在位子上的人也不會很開心吧」" 

# monologue
# JP: 重なる言葉が、僕の実感を強めてくれる。\n“改修の全工程が完了”という言葉の意味が理解に変わる。
3009 = "這一連串的話讓我更有實感，也理解了“修復工程全部結束了”這句話的意義。" 

# monologue
# JP: 運用についてまでもが、すでに決まっているのなら――
2584 = "如果甚至連運營方面都已經確立了的話——" 

# 【双鉄】
# display as 雙鐵
# JP: 「試運転さえ無事に完了すれば、\nいつでも営業運転に入れるというわけか」
1665 = "「只要試運營平安結束了，就隨時可以開始商業運營了吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「と、わたしは考えてるんですけど――」
1873 = "「我是有在這麼考慮，不過——」" 

# monologue
# JP: ちら、と青い瞳が動く。\n僕からハチロク――再び僕へと。
2573 = "她的藍色眼珠微微動了動。把目光從我身上轉向八六——再轉到我身上。" 

# 【ポーレット】
# display as 波萊特
# JP: 「日程のこととか、\nその他にもいろいろ、相談したくて」
1899 = "「我還想再商討一下日程，以及其他各種細節之類的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1737 = "「嗯」" 

# monologue
# JP: “その他いろいろ”は、\nおそらくハチロクが決定すべき事項だろう。
1240 = "“其他各種細節”估計應該是由八六決定的事項吧。" 

# monologue
# JP: であらば僕は、自分にできることを速やかに行うのみだ。
3026 = "那我就只要迅速做完我該做的就好了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日程面での選択肢はおおまかに二つになるな。\nつまり――投票日前か、投票後か」
1950 = "「日程方面，主要有兩個選擇。也就是——選在投票日前還是投票後」" 

# 【凪】
# display as 凪
# JP: 「そぎゃんこつ、投票前に決まっとるばい！」
2133 = "「這種事肯定要選在投票前的咧！」" 

# 【れいな】
# display as 玲奈
# JP: 「そうですよねぇ。\x%l客車;#00ffc040;客車%l;#;改修プロジェクトの、\nすっごくいい宣伝になると思いますぅ」
1965 = "「是啊。這樣對\\x%l客車;#00ffc040;客運車廂%l;#;修復計劃也是一個很好的宣傳」" 

# 【ふかみ】
# display as 深美
# JP: 「それってそのまま、\n日々姫さんの政策のＰＲにもなるです。よね？」
2069 = "「而且還可以宣傳日日姬小姐的政策，對吧？」" 

# monologue
# JP: ふかみの視線は真闇姉へと。\n真闇姉の唇は、けれどなかなか開かれない。
2874 = "深美把視線轉向真闇姐。可真闇姐的嘴唇卻始終緊閉著。" 

# 【真闇】
# display as 真闇
# JP: 「……試運転が上手く行けば――\nそれは、もちろんそうなるとね。けど」
1295 = "「……如果試運營能夠順利進行，那自然是如此。不過——」" 

# monologue
# JP: 日々姫のことを思いやってか、\n歯切れのあまり良くない答え。
2553 = "她或許是在顧慮日日姬，回答顯得吞吞吐吐的。" 

# monologue
# JP: ポーレットが小さな挙手をして、\n控えめな声で、ごく控えめな言葉をつぎたす。
2863 = "波萊特稍稍舉起手，小聲地、極其謹慎地說道：" 

# 【ポーレット】
# display as 波萊特
# JP: 「もし試運転で重大な不具合を出してしまえば、\n選挙戦にも……良くない影響を出してしまう可能性も」
1776 = "「如果在試運營中發生了重大故障的話，那可能會對選舉戰……產生很大的負面影響」" 

# monologue
# JP: その“可能性”は恐らく百パーセント。
2953 = "而且這種“可能性”恐怕是百分之百。" 

# monologue
# JP: 先日の討論会を有権者が五分と見ていたのなら、\n“良くない影響”は、そのまま致命傷となるだろう。
2586 = "如果選民們認為前幾天的辯論會兩方平分秋色的話，那這“負面影響”就會直接化為致命傷了。" 

# 【ハチロク】
# display as 八六
# JP: 「良い部分同士のニコイチでの改修ですから、\n深刻な不具合は恐らくでないでしょうが……」
2131 = "「這次修復基本是把各自完好的部分組合在一起，應該不會發生什麼重大故障才對……」" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さんは」
1700 = "「哥哥你呢」" 

# monologue
# JP: 日々姫の声。
2807 = "日日姬的聲音。" 

# monologue
# JP: それが合図でもあるかのように、\nみなの視線が僕へと集まる。
2571 = "她的聲音彷彿是一個信號似的，讓大家的視線集中到我的身上。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さんはどう考えますか？」
1702 = "「哥哥你怎麼想？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……リスクを、更に制限してはどうか」
1293 = "「……努力把風險降得更低一點怎麼樣」" 

# 【ハチロク】
# display as 八六
# JP: 「と、おっしゃいますと？」
1840 = "「您的意思是？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「“\x%l客車;#00ffc040;客車%l;#;を引いて走らせるだけ”の試運転はどうかと。\n空車であっても、走ればそれだけで宣伝にはなろうし」
2088 = "「試運營的時候“只牽著\\x%l客車;#00ffc040;客運車廂%l;#;跑”怎麼樣。就算是空車，只要讓它跑起來也能有宣傳效果吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　いわれればそうですよね。煙が入る入らないなら、\n大勢を乗せなくたって確認できるわけですし」
1720 = "「啊！你這麼一說倒也是。車廂會不會進煙這點，反正不用載那麼多人也可以確認嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。まずは煙の流入が無いことを確認。投開票後に、\n試乗してもらっての試運転と段階を踏めばいい気がする」
1736 = "「嗯。首先要確認看看煙有沒有漏進來。然後在投開票後再進入載人試運營的階段就好了」" 

# monologue
# JP: お客様に見立てた土嚢を積んでの乗務訓練にも、\n自分としてはかなり習熟できてきたように思う。
2946 = "經歷過多次載著代替客人的沙袋進行乘務的訓練，我覺得現在自己已經對操作滾瓜爛熟了。" 

# monologue
# JP: 煙の流入さえ無いのなら、\nその次の段階へも、スムーズに移行可能なはずだ。
2497 = "只要沒有漏進煙來，就可以順利地進入下一個階段了。" 

# 【ふかみ】
# display as 深美
# JP: 「わたし、そのやり方に賛成。です。\n一番、おっかなくないやり方だって思います」
1893 = "「我贊成這個方案。嗯。我認為，它是最穩健的」" 

# 【凪】
# display as 凪
# JP: 「むっ」
# 1737 = "「嗯」" 

# 【真闇】
# display as 真闇
# JP: 「討論会の出来がよかったけんねぇ。\nどう考えても、手堅いやり方の方がベターよね」
2087 = "「討論會的結果挺好。不管怎麼想，穩健的方案肯定是最好的」" 

# 【凪】
# display as 凪
# JP: 「むぅぅ～～っ」
1712 = "「唔～～」" 

# monologue
# JP: 唸りをあげる凪の気持ちは想像できる。\nここで一気に勝負をかけて、圧勝にまで運びたいのだ。
2721 = "我能理解凪為何不滿地嘟起了嘴。她是想一口氣賭一把然後順勢取得完勝。" 

# monologue
# JP: が――言われていることも納得できてしまうから、\n不満をグっと、飲み込んでくれているのだろう。
2387 = "不過——她接受了大家的意見，就表示她忍耐住了心中的不滿吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとれいなはどうだ？」
2013 = "「波萊特，玲奈，你們怎麼想？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l8620;#00ffc040;8620%l;#;関連の運用のことは、\n\x%l8620;#00ffc040;8620%l;#;チームに任せたいと思います」
1865 = "「我想把和\\x%l8620;#00ffc040;８６２０%l;#;相關的運營交給\\x%l8620;#00ffc040;８６２０%l;#;小組來處理」" 

