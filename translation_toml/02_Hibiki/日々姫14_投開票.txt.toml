# monologue
# JP: 一度離した頭を日々姫は、\nくちびるとくちびるという一点だけで、密着させる。
2820 = "日日姬縮回了一下頭，然後讓她的嘴唇和我的嘴唇緊密貼合。" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ――っ――んむ」
1727 = "「嗯——唔」" 

# monologue
# JP: キスをしたまま、\n日々姫はもごもご言葉を紡ぐ。
2581 = "她邊吻著我，邊嘰哩咕嚕地嘟囔起來。" 

# monologue
# JP: 『ずっとです』と、\n声はせずとも、確かな想いが伝わってくる。
1248 = "“要永遠”。雖然沒有發聲，但是她的想法確確實實地傳達給了我。" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ……」
1730 = "「嗯……」" 

# monologue
# JP: すひ、すひと、日々姫の鼻から吐かれる息が顔をくすぐる。\nそれが、少しずつ早くなる。
2632 = "從日日姬的鼻孔裡噴出的氣息弄得我臉上很癢。這氣息的速度漸漸變快了。" 

# monologue
# JP: キスをして、想いを伝えて、そこで日々姫は固まって――\nどうすればいいのか、激しく葛藤しているのだろう。
2986 = "親吻我，傳達了心意之後，日日姬就僵住了——她心中肯定在糾結不已地想“接下來該怎麼辦”吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん……」
1704 = "「唔……」" 

# monologue
# JP: だから、僕から唇を離す。
3025 = "那我就先一步收回嘴唇吧。" 

# 【日々姫】
# display as 日日姬
# JP: 「ぁっ」
# 1717 = "「啊」" 

# monologue
# JP: 名残惜しげに開かれかけた、\nその唇に、ほんの一瞬のキスをする。
2552 = "她戀戀不捨地半張著嘴唇。我又輕輕吻了她一下。" 

# monologue
# JP: 驚く顔の顎をつかまえ、\n目線を、僕へと固定させる。
2791 = "日日姬一臉驚訝。我托住她的下巴，讓她的視線固定在我身上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よかろう。ずっとだ」
1775 = "「好，就永遠」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい――ずっと――っ！！」
1729 = "「嗯——永遠——！」" 

# monologue
# JP: （パンっ！）
3084 = "（啪！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2196 = "「！？」" 

# monologue
# JP: いきなり日々姫が、自分の頬を両手で挟むようにして叩く。\n驚いた手が、びくりと顎を離してしまう。
2817 = "日日姬突然用兩手猛地一拍自己的臉頰。我嚇了一跳，手從她的下巴上縮了回來。" 

# monologue
# JP: 赤みの増した頬をあげ、\n自分の意志でまっすぐに、日々姫は僕を見つめてくる。
2559 = "她抬起那微微發紅的臉頰，憑自己的意志直直地注視著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「ずっとでも――\n[いもうと,1]義妹だからって理由じゃ、イヤです」
2183 = "「雖然說是永遠——但我可不想要“因為我是你義妹”這樣的理由」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1737 = "「嗯」" 

# monologue
# JP: そうか。自分の中ではとっくに整理できていた。\n日々姫もそうだと思い込み、僕の方からもキスをした。
2831 = "是嗎。我心中其實早就整理好了。我認為日日姬也是這麼想的，所以主動親吻了她。" 

# monologue
# JP: だがしかし――\n言葉にせねば、何も伝わりはしないのか。
2426 = "但是——如果不說出來就傳達不了任何東西啊。" 

# 【日々姫】
# display as 日日姬
# JP: 「私は、にぃにぃ――右田双鉄さんのことが好きです。\nそれは恋っていう意味の好きで」
1902 = "「我，喜歡阿哥——喜歡右田雙鐵。是戀愛那種意義上的喜歡」" 

# monologue
# JP: 無意識にだろうか？\n少し、日々姫は身を固くする。
2732 = "或許是無意識的反應吧。日日姬的身體顯得有點僵硬。" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、わたしは――あなたの恋人になりたいです」
1908 = "「所以，我——想要成為你的戀人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ありがとう。日々姫」
1316 = "「……謝謝你。日日姬」" 

# monologue
# JP: 伝えてもらって、理解した。\nこれは、確かにホっとする。
3014 = "這次順利地傳達並讓我理解了。這確實讓人感到安心。" 

# monologue
# JP: 胸がぽかぽか暖かくなり、\nなにかとても大事な物を、分けてもらえた気持ちになれる。
2965 = "胸口感覺暖洋洋的。似乎是得到了一份別人分享的她最重要的東西那樣的感覺。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も日々姫が大好きだ。僕は恋愛を良くは知らぬが……\nこれが恋だと思っている。僕にとっての恋とは、これだ」
1844 = "「我也最喜歡日日姬。雖然我不太懂戀愛……不過我覺得這就是愛。對我來說這就是愛」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2193 = "「！」" 

# monologue
# JP: 瞳のふちに、ぶわっと涙が浮き上がる。\n日々姫の頬は涙に洗われ、けれどもバラ色に染まり始める。
2570 = "她的眼睛邊緣忽然積聚起了許多眼淚。日日姬的臉頰接受著淚水的洗禮，卻開始散發出燦爛的光彩。" 

# monologue
# JP: なにも泣くほどのことはなかろう――\n思うが、透き通る涙は僕にまでしみてくる。
3036 = "雖然我覺得沒什麼好哭的——但是透明的淚水也從我眼睛裡開始滲出。" 

# monologue
# JP: （ああ……そうか。これが、恋か。\nだからあれほど、恋が歌われ、物語られるものなのか）
3083 = "（啊……是嗎。這就是愛啊。所以愛情才在千百年來被人們無數次地歌頌、傳頌）" 

# monologue
# JP: 恋をしている。\n恋の相手の日々姫と一緒に、ここにいる。
2696 = "我戀愛了。我戀愛的對象日日姬和我一起在這裡。" 

# monologue
# JP: ただそれだけで、どんどん、心があたたかになる。\n日々姫の涙は僕らを満たして、恋をいっそう鮮やかにする。
2496 = "只是這樣待著，心就開始越來越來越熱。日日姬的眼淚充盈著我們，讓這戀愛顯得越來越鮮明。" 

# 【双鉄】
# display as 雙鐵
# JP: 「一生、僕は日々姫の側にいたい」
1863 = "「我想一生都陪在日日姬的身邊」" 

# monologue
# JP: これは、欲だ。\nエゴそのものだ。
3012 = "這是欲望。這是完完全全的私心。" 

# monologue
# JP: そのエゴを、むしろ喜び、受け入れてくれる人がいる。\n僕の世界が鮮やかになる。世界のありようが変わってく。
2424 = "但卻有人為這份私心感到高興，並接受了它。我的世界變得五彩繽紛起來。世界的樣子也開始變化起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「恋人として。\nそうして、いずれ、日々姫の夫となって、ずうっと」
1880 = "「我現在是你的戀人了。有一天，還會成為你的丈夫，直到永遠」" 

# 【日々姫】
# display as 日日姬
# JP: 「はいっ！」
# 1739 = "「嗯！」" 

# monologue
# JP: 涙まみれの笑顔の上に、もう一度のキス。\n言葉にとても出来ない気持ちを、お互い、キスで届け合う。
2675 = "我再次親吻了那張滿是淚水的笑臉。我們互相用吻來傳達著那用話語無法表達的心情。" 

# monologue
# JP: 日々姫の匂い、日々姫の体温。\nいつまでも浸っていたいが――それは、もう少しお預けだ。
2815 = "日日姬的香味，日日姬的體溫。好想一直都沉浸在這裡面——但還是再等一段時間吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでな、日々姫」
2027 = "「然後呢，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1737 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕には、もうひとつ。\nもうひとつだけ、本当にしたいことがあるのだ」
1900 = "「我還有一件。還有另一件真正想做的事」" 

# monologue
# JP: 小さく頷き、\n僕の言葉の続きを待たず、日々姫はすっくと立ち上がる。
2576 = "她輕輕地點點頭，不等我繼續說下去，就一下子站了起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、私も。にぃにぃ――っ！」
2166 = "「那，我也。阿哥——！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「にぃにぃでいい。恋人になろうと夫になろうと、\n僕は、お前の兄でもあるのだ」
1668 = "「叫阿哥就好了。就算我成為了你的戀人和丈夫，我同時也都是你的哥哥」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1737 = "「嗯」" 

# monologue
# JP: ほっとして、だけれどどこかはちょっと不満。
2582 = "她鬆了口氣，但似乎又有些不滿。" 

# monologue
# JP: そんな表情を浮かべてすぐに、\n日々姫は顔を引き締め直す。
2388 = "不過她很快就收起了這種表情，重新嚴肅起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「私も。にぃにぃと一緒にやります。\nしたいこと――それが、どんなことであっても」
1846 = "「我也要和阿哥一起去做。不管這件想做的事到底是什麼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心強いな」
2157 = "「那我的底氣就更足了」" 

# monologue
# JP: 手を取り合って立ち上がる。
2712 = "我牽著她的手站起身。" 

# monologue
# JP: さきほどの異変が悪い夢でもあったかのように、\n簡単に――僕と日々姫は、キャブへとあがる。
2625 = "彷彿剛才的那些異變是一場過去的噩夢一樣，這次我和日日姬輕易地就爬上了駕駛室。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば日々姫、僕に手を貸せ。\n僕の望みのもう一つは、線路の上でしか果たし得ぬのだ」
2158 = "「那日日姬，請幫我的忙吧。我的另一個願望只有在線路上才能實現」" 

# 【日々姫】
# display as 日日姬
# JP: 「まかせてください」
1586 = "「交給我吧」" 

# monologue
# JP: ワンスコを手に、日々姫が笑う。
2803 = "日日姬拿著公斤鍬笑著說道。" 

# monologue
# JP: 少年のように屈託なく、\nそれゆえ、とても美しく。
2575 = "她笑得像少年一般爽朗，也因此顯得更為美麗。" 

# 【日々姫】
# display as 日日姬
# JP: 「二分で九十からでいいですか？」
1825 = "「從兩分鐘９０鏟的節奏開始可以嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。まずは圧をあげよう」
1745 = "「嗯，首先得增加鍋爐壓力」" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%l投炭;#00ffc040;投炭%l;#;！　二分で九十杯！」
1279 = "「\\x%l投炭;#00ffc040;加煤%l;#;！兩分鐘９０鏟」" 

# monologue
# JP: ザクリ、軽快な音を立て、\nワンスコが石炭の山に食い込む。
2468 = "公斤鍬發出嚓嚓的輕快響聲刺入煤山中。" 

# monologue
# JP: パカンと焚き口の扉が開き、\n石炭は、すぐに\x%l火床;#00ffc040;火床%l;#;へと撒き散らされる。
2891 = "爐口的門啪嗒一下打開了，煤塊立刻被撒入\\x%l火床;#00ffc040;火床%l;#;中。" 

# monologue
# JP: （そうだ、まずは圧をあげるところから。\nひとつひとつを重ねればいい）
3088 = "（沒錯，首先要把壓力提高，然後就一步步按順序做下去就好了）" 

# monologue
# JP: 終着駅に、一気に到達などは出来ない。\n圧を満たして動き出し、\x%l客車;#00ffc040;客車%l;#;と繋がり、三角線。
2902 = "畢竟不可能一下子就到達終點站。接下來有加足壓力發動車輛、與\\x%l客車;#00ffc040;客運車廂%l;#;連接、三角線這幾個難關。" 

# monologue
# JP: それから御一夜に入線し、おそらくそのまま、\nあの乗客を乗せて引くことともなるのだろう。
2888 = "然後就要駛入御一夜，到時候恐怕還會載上剛才那些乘客們吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l空気圧縮機;#00ffc040;空気圧縮機%l;#;良し！　ブレーキテスト――良しっ！」
1283 = "「\\x%l空気圧縮機;#00ffc040;空氣壓縮機%l;#;正常！剎車測試——正常！」" 

# 【日々姫】
# display as 日日姬
# JP: 「水位十分！　蒸気圧良し！」
2005 = "「水位足夠！蒸汽壓力正常！」" 

# monologue
# JP: だが、上手くいく。\n全てが、必ず。
2391 = "不過，我一定要順利突破這些難關。" 

# monologue
# JP: 一番苦しいところを僕は――\n日々姫と共に、もう越えたのだ。
2841 = "最困難的部分，我——已經和日日姬一起突破了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lバイパス弁;#00ffc040;バイパス弁%l;#;開け、シリンダー排水弁開け」
1919 = "「打開\\x%lバイパス弁;#00ffc040;旁路閥%l;#;，打開汽缸排水閥」" 

# 【日々姫】
# display as 日日姬
# JP: 「ブロア[とめべん,1]止弁、閉めます！」
2175 = "「關閉風管止回閥！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l入換信号;#00ffc040;入換信号%l;#;良し！　\x%l自弁;#00ffc040;自弁%l;#;、\x%l単弁;#00ffc040;単弁%l;#;、位置、『運転！』」
1273 = "「\\x%l入換信号;#00ffc040;調車信號燈%l;#;正常！\\x%l自弁;#00ffc040;自剎%l;#;、\\x%l単弁;#00ffc040;單剎%l;#;，“行駛”位置！」" 

# monologue
# JP: 一瞬、日々姫を振り返り、目と目をあわせて頷き合う。\nそのまま、\x%l逆転機;#00ffc040;逆転機%l;#;を前進に！
2688 = "我回頭看向日日姬，我們確認了一下眼神，互相點點頭。然後我把\\x%l逆転機;#00ffc040;回動機%l;#;掛到前進檔上！" 

# 【双鉄】
# display as 雙鐵＆日日姬
# JP: 「出発！　進行っ！」
1636 = "「出發前進！」" 

# monologue
# JP: ゆっくり、僕らは走りだす。
2673 = "我們緩緩地向前駛去。" 

# monologue
# JP: そうして二人で――\n僕と日々姫と二人の力で、御一夜の夜を駆け抜けよう。
2609 = "就這樣憑藉兩個人——我和日日姬兩個人的力量，來穿越御一夜的黑夜吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1290 = "「…………」" 

# monologue
# JP: 右田日々姫。\nその五文字。
2511 = "右田日日姬。這五個字。" 

# monologue
# JP: 書き間違えるはずも無いのに、\n何度も確認してしまう。
2444 = "儘管沒有寫錯的可能，我還是確認了好幾遍。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よし」
1773 = "「好」" 

# monologue
# JP: 二つに折って、投票箱へ。\nトッと、やけに軽い音がする。
2698 = "我把票對摺後投入投票箱。隨後傳來輕輕的落地聲。" 

# monologue
# JP: ……同時に、僕の両肩も、\n一気に軽くなったみたいだ。
1254 = "……同時，我的雙肩好像也突然一口氣變輕了許多。" 

# monologue
# JP: 投票を終えて外へと出れば、\nすぐさま日々姫の姿を捉える。
2945 = "結束投票走到外面後，我很快就發現了日日姬的身影。" 

# monologue
# JP: まぶしく輝く夏の陽の下、\n太陽よりも明るい笑顔で、ハチロク達と話してる。
2540 = "在這炫目耀眼的夏日太陽下，她正帶著比太陽還燦爛的笑容在和八六她們說著什麼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、日々姫。待たせたか？」
1794 = "「對不起啊，日日姬，讓你久等了嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ううん、私も今投票終えたとこ」
2007 = "「沒有，我也是剛剛投完票呢」" 

# 【ふかみ】
# display as 深美＆凪
# JP: 「おおお」
1747 = "「噢噢噢」" 

# monologue
# JP: なんということの無い会話になぜか、\n凪とふかみがどよめき騒ぐ。
3037 = "雖然會話內容並沒有什麼特別的，凪和深美卻開始騷動起來。" 

# 【凪】
# display as 凪
# JP: 「やっぱり、ふかみちゃんの言うとおりみたいばい！」
1992 = "「果然和小深說的一樣咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「でしょでしょ！？　なんか、雰囲気違ったんだもん」
