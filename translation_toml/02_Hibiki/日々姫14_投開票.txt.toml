# 【ふかみ】
# display as 深美
# JP: 「山の方とかが最初に開票されて、\nここらあたりは最後になるってことだよ、凪ちゃん！」
1576 = "「也就是山區那邊的地方會首先開票，我們這邊會最後開，小凪！」" 

# monologue
# JP: ふかみの声が弾んでる。\n理解がぐんぐん、レールショップに広がっている！
2877 = "深美的聲音顯得很興奮。鐵路商店裡的人轉眼間就明白到了這點！" 

# 【凪】
# display as 凪
# JP: 「ゆーことは……ゆーことは！？」
2141 = "「那也就是說……那也就是說！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
1706 = "「唔！」" 

# monologue
# JP: 山に暮らし、都市部までめったに出てこれない方達までに、\n僕らの選挙活動は、残念ながら浸透できなかった。
2630 = "很遺憾，我們的選舉活動的影響力並沒有能夠滲透到居住在山中，不怎麼到市區來的那些民眾。" 

# monologue
# JP: そうした方たちへの影響力は、\n稀咲の――銀行の方が圧倒的に上だろう。が！
2601 = "對那些人的影響力明顯是稀咲——銀行那一方要壓倒性地強。但是！" 

# 【ハチロク】
# display as 八六
# JP: 「苦戦必至の地域でも日々姫は優位に戦い、\n開票が、主戦場とした都市部に移行するのでしたら――」
1759 = "「在這些必然陷入苦戰的地域日日姬都能占到優勢的話，那在開票階段進入到主戰場——市區後」" 

# 【れいな】
# display as 玲奈
# JP: 「やったぁ！　なら、日々姫さん、\nこれからどんどん、もっと有利になるんですねぇ！」
1770 = "「太好了！那日日姬小姐就會越來越有利了！」" 

# monologue
# JP: 都市部の中心、鍛冶屋町での日々姫支持は固まっている。\nつまり、僕らは！
2615 = "市區的中心，鍛冶店街這邊對日日姬的支持非常牢固。也就是說，我們！" 

# 【ＴＶアナウンサー】
# display as 電視主持人
# JP: 「でました、当確。\n宝生稀咲候補、当確です」
1632 = "「出來了，確定當選！寶生稀咲候選人確定當選！」" 

# 【ふかみ】
# display as 深美
# JP: 「ええっ！？」
1695 = "「哎！？」" 

# 【凪】
# display as 凪
# JP: 「なんでばい！　画面と全然ちがってるばいっ！」
2019 = "「為什麼啊！和畫面上放的完全不一樣啊！」" 

# monologue
# JP: 画面の中でも、ざわめきが起こる。\nアナウンサーも、ハっと気付いた表情になる。
3042 = "電視畫面中也發生了一場騷動。主持人一副猛然醒悟的表情。" 

# 【ＴＶアナウンサー】
# display as 電視主持人
# JP: 「失礼しました。当確は右田候補です。\n右田日々姫候補、当選確実です」
2190 = "「非常抱歉，確定當選的是右田候選人。右田日日姬候選人確定當選」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！」
1941 = "「日日姬！」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃっ！！！」
2177 = "「阿哥！！！」" 

# monologue
# JP: 黙りこくって縮こまってた日々姫が一気に！\n一気に弾ける！！
2371 = "一直沉默著縮成一團的日日姬一下子！一下子跳了起來！！" 

# monologue
# JP: 僕の胸へと飛び込んできて、\n全身であまえ、すがりついてくるっ！！
2562 = "她撲進我的懷裡，用全身向我撒嬌、抱住我！！" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、私――私――私っ！！」
2179 = "「阿哥，我——我——我！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よくやったぞ日々姫！　当選だ！\nお前の勝ちだ！　勝ったのだ！！」
1609 = "「做得漂亮日日姬！你當選了！是你贏了！你贏了！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがとうございます！　兄さんっ――\nけどっ」
2104 = "「謝謝你！哥哥——不過」" 

# monologue
# JP: くっついていた体を離し、\n日々姫がみなへと振り返る。
2548 = "她從我懷中離開，轉過頭對大家說道：" 

# 【日々姫】
# display as 日日姬
# JP: 「私の、じゃなく。みんなの――みんなの勝利です！」
1560 = "「不是我一個人的。是大家的——我們大家的勝利！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「おめでとう！」
1837 = "「恭喜你！」" 

# 【真闇】
# display as 真闇
# JP: 「よーがんばったね、ひーちゃん」
1819 = "「幹得真不錯啊，小日」" 

# 【ハチロク】
# display as 八六
# JP: 「お見事です。日々姫、双鉄様」
1602 = "「你們做得很漂亮。日日姬，雙鐵少爺」" 

# 【れいな】
# display as 玲奈
# JP: 「ばんざーい！　ばんざーい！　ばんざーい！　ですぅ」
2076 = "「萬歲！萬歲！萬歲！」" 

# 【凪】
# display as 凪
# JP: 「だるま、だるまに目ぇ入れるばいっ！」
1685 = "「咱要去給不倒翁，給不倒翁畫上眼睛咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんっ！？　それやるの日々姫さんだよぉっ！」
1796 = "「小凪！？那個應該是日日姬小姐去畫呀！」" 

# 【稀咲】
# display as ？？？
# JP: 「ここは賑やかで楽しいね」
1603 = "「你們這裡真熱鬧，真開心呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩っ！？」
2056 = "「稀咲學姐？」" 

# monologue
# JP: 人ごみの向こうの声だけを聞き、\n日々姫は走りだしている。
2631 = "從人群的另一端傳來了稀咲的聲音，但沒見人影。日日姬連忙跑了過去。" 

# monologue
# JP: まさか稀咲がこのタイミングで――\nその考えは、すぐに視界にくつがえされる。
2931 = "稀咲在這種時候怎麼可能會——我的這想法立刻被眼前的景象所顛覆。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わ、本当に稀咲さん」
1687 = "「哇，真的是稀咲小姐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なぜ、今ここに？　自分の選挙事務所は」
2018 = "「為什麼你會在這裡？你自己的選舉事務所那邊呢」" 

# 【稀咲】
# display as 稀咲
# JP: 「当選できないとわかったからね。\n御通夜みたいな状況さ」
1751 = "「因為我們都知道不可能當選了。所以那邊的氣氛現在就和守靈一樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1717 = "「啊」" 

# monologue
# JP: そうだった。\n銀行の情報収集能力は、僕らをはるかに凌駕している。
2833 = "是這樣沒錯。銀行的情報收集能力可遠遠凌駕於我們之上。" 

# monologue
# JP: もっと早くの段階で、\n稀咲は、稀咲の戦いが終わったことを知ったのだろう。
2536 = "在更早的時間點，稀咲就知道她的戰鬥已經結束了吧。" 

# 【稀咲】
# display as 稀咲
# JP: 「お悔やみの言葉を聞いていたって何にもならない。\nそれよりは、次善の策をとるべきであると思ってね」
1630 = "「再聽那些不甘心的抱怨也沒用了。比起那些，我覺得我應該去實行次好的策略才對」" 

# 【双鉄】
# display as 雙鐵
# JP: 「次善の策？」
1998 = "「次好的策略？」" 

# 【稀咲】
# display as 稀咲
# JP: 「当選おめでとう。日々姫」
1836 = "「恭喜你當選，日日姬」" 

# monologue
# JP: 僕の問いには答えないまま、\n稀咲は日々姫へと手を伸ばす。
2564 = "她沒有回答我的問題，徑直向日日姬伸出了手。" 

# monologue
# JP: 固く、握手。\n日々姫の顔が、みるみる安堵に緩んでいく。
2448 = "兩人緊緊地握手。日日姬的表情逐漸安心下來。" 

# 【稀咲】
# display as 稀咲
# JP: 「それでね、日々姫。\nボクは、今日は新市長への売り込みに来たんだよ」
1929 = "「於是呢，日日姬。我今天是想來跟新市長推銷推銷的」" 

# 【日々姫】
# display as 日日姬
# JP: 「売り込み、ですか？\nでも、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の誘致なら」
1924 = "「推銷？不過，如果是關於引進\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠的話」" 

# 【稀咲】
# display as 稀咲
# JP: 「それは、撤回を覚悟している。\n売り込みたいのは、全く別の――ボク自身さ」
2147 = "「那個我已經有被撤回的思想準備了。我今天想推銷的完全是別的東西——就是我自己」" 

# 【日々姫】
# display as 日日姬
# JP: 「ボクって……え？　えと！　稀咲先輩っ！？」
1889 = "「我自己……哎？哎！稀咲學姐！？」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ」
# 1737 = "「嗯」" 

# monologue
# JP: まだつないでいた手をほどき、\n稀咲は、日々姫に問いかける。
2933 = "稀咲鬆開仍然握著的手，然後和日日姬說道：" 

# 【稀咲】
# display as 稀咲
# JP: 「日々姫に、ボクを使ってほしい。\n\x%l客車;#00ffc040;客車%l;#;改修プロジェクトにでも、その他どんな場面にでも」
1868 = "「我想請你僱傭我。不管是派我去輔助\\x%l客車;#00ffc040;客運車廂%l;#;修復計劃也好，還是去幹其他任何事也好」" 

# 【日々姫】
# display as 日日姬
# JP: 「使います！　喜んで使わせてもらいます！\n大歓迎です、稀咲先輩っ！！」
1874 = "「我會的！非常高興能夠請到您！非常歡迎您，稀咲學姐！！」" 

# 【稀咲】
# display as 稀咲
# JP: 「おっと」
1691 = "「哎呀」" 

# monologue
# JP: 抱きついてきた日々姫を受けとめ、\n稀咲は短い息を吐く。
2561 = "她接住一下子抱過來日日姬，輕輕地吐了口氣。" 

# monologue
# JP: とても短い――安堵の息だ。\n稀咲も緊張していたのだろう。
2627 = "很輕的——安心的吐氣。稀咲剛才肯定也很緊張吧。" 

# monologue
# JP: （なるほど……これが日々姫の未来か）
3080 = "（原來如此……這就是日日姬的未來啊）" 

# monologue
# JP: メインビジュアルの笑顔の中に、\n稀咲ももちろん含まれていた。
2533 = "在主視覺圖裡的眾多笑容中，當然也包括了稀咲的笑容。" 

# monologue
# JP: 御一夜の、すべての人達で――\nそれが、日々姫の描いた未来だ。
2637 = "御一夜所有的人面帶歡笑——這就是日日姬所描繪的未來。" 

# monologue
# JP: （とはいえ、だ）
3075 = "（不過）" 

# 【稀咲】
# display as 稀咲
# JP: 「おっと、これは双鉄。おめでとう」
1693 = "「哎呀，這不是雙鐵嗎。恭喜你」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。\nそして――これから、どうかよろしく頼む」
2103 = "「謝謝你。還有——從今天開始就多多指教了」" 

# 【稀咲】
# display as 稀咲
# JP: 「こちらこそ」
1842 = "「我也是」" 

# monologue
# JP: 稀咲に握手と挨拶を。
2724 = "我試圖與稀咲握手並表示問候。" 

# monologue
# JP: 求めつつ、日々姫と稀咲を引き離し、\n僕は体をすべりこませる。
2756 = "於是，我分開日日姬和稀咲，讓自己進入她們中間。" 

# monologue
# JP: （これが、日々姫の描いた未来で、\n僕も望んでいる未来図だ）
3091 = "（這就是日日姬所描繪的未來，也同時是我所想要的未來）" 

# monologue
# JP: 日々姫の隣に、いつでも僕が。
2709 = "我會一直待在日日姬的身邊。" 

# monologue
# JP: そこは誰にも、もう譲らない。
3010 = "這一點我絕不會讓步。" 
