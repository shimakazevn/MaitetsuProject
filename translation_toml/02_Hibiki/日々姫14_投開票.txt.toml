[script]
# lines: 498 
# 【ポーレット】
# display as 波萊特
# JP: 「報告します」
1676 = "「Báo cáo.」"
# monologue
# JP: 早朝のレールショップに響く、\n誇らしそうなポーレットの声。
2864 = "Vang lên trong cửa hàng đường sắt vào sáng sớm, là giọng nói đầy tự hào của Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%l帝鉄;#00ffc040;帝鉄%l;#;[にまんにせんけいかい,6]22000系改、御一夜\\x%l22形;#00ffc040;[ニイニイ,1]22系%l;#;1号\\x%l客車;#00ffc040;客車%l;#;、\n\\x%lイロ;#00ffc040;ナイロ[ニイニイイチ,2]221%l;#;改修の全工程は、終了しました」
1276 = "「Toa \\x%l客車;#00ffc040;hành khách%l;#; số 1 Ohimitera \\x%l22形;#00ffc040;Loại 22%l;#;, cải tạo từ Dòng 22000 của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;, toàn bộ quá trình cải tạo \\x%lイロ;#00ffc040;Nairo 221%l;#; đã hoàn tất.」"
# monologue
# JP: 聞くと同時に、\nハチロクが顔をほころばす。
2464 = "Vừa nghe xong, gương mặt Hachiroku liền rạng rỡ hẳn lên."
# 【ハチロク】
# display as 八六
# JP: 「まぁ、\\x%lイロ;#00ffc040;イロ%l;#;ですか。\n\\x%l一等二等併設客車;#00ffc040;一等二等[ごうぞうしゃ,2]合造車%l;#;になさるのですね」
1708 = "「Chà, là \\x%lイロ;#00ffc040;Iro%l;#; sao. Ra là mọi người định làm thành \\x%l一等二等併設客車;#00ffc040;toa xe ghép hạng nhất hạng hai%l;#; nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。少し待ってくれ」
1922 = "「Xin lỗi. Đợi một chút đã.」"
# monologue
# JP: 投票前日。一刻一秒が惜しいこの日に、\nコアメンバーの全員が、レールショップに集合している。
2745 = "Ngày trước ngày bỏ phiếu. Vào cái ngày mà từng giây từng phút đều quý giá này, tất cả các thành viên cốt cán đều tập trung tại cửa hàng đường sắt."
# monologue
# JP: 時間は無論、少しも無駄にしたくない。\nないのだが――理解も足りぬままでは余計な遠回りをする。
2714 = "Thời gian tất nhiên là không muốn lãng phí một chút nào. Tuy là vậy――nhưng nếu không hiểu rõ thì sẽ lại phải đi đường vòng mất công."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、その\\x%l22形;#00ffc040;ナイロ[ニイニイイチ,2]221%l;#;というのは？」
2126 = "「Cái \\x%l22形;#00ffc040;Nairo 221%l;#; đó là gì vậy?」"
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%lキハ07;#00ffc040;キハ07%l;#;sの“キハ”と同じく、\\x%l客車;#00ffc040;客車%l;#;にも称号――\n車輌の特徴を表す略称があるんですよ」
1680 = "「Giống như chữ \"Kiha\" trong \\x%lキハ07;#00ffc040;KiHa 07%l;#;S, \\x%l客車;#00ffc040;toa hành khách%l;#; cũng có danh xưng―― chính là tên viết tắt thể hiện đặc điểm của phương tiện đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1711 = "「Hửm?」"
# 【ハチロク】
# display as 八六
# JP: 「旅客を乗せてない状態の重量が27.5t以上32.5t未満の\n\\x%l客車;#00ffc040;客車%l;#;につく称号が、『ナ』」
1754 = "「Danh xưng dành cho \\x%l客車;#00ffc040;toa hành khách%l;#; có trọng lượng khi không chở khách từ 27.5 tấn trở lên đến dưới 32.5 tấn là 『Na』.」"
# 【ポーレット】
# display as 波萊特
# JP: 「で、一等客車が『イ』、二等客車が『ロ』なんです。\nちなみに、普通車が『ハ』ですね」
2025 = "「Và, toa hạng nhất là 『I』, toa hạng hai là 『Ro』. Nhân tiện thì, toa thường là 『Ha』 đấy.」"
# monologue
# JP: ふたりがかりの説明は、\n息がぴったりなだけでなく、内容も必要十分だ。
2447 = "Lời giải thích của hai người, không chỉ ăn ý mà nội dung cũng rất đầy đủ và cần thiết."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。一等二等併設で、空車重量27.6tの\\x%l客車;#00ffc040;客車%l;#;であれば、\nそれは『\\x%l22形;#00ffc040;ナイロ%l;#;』となるのだな？」
1971 = "「Ra là vậy. Nếu là \\x%l客車;#00ffc040;toa hành khách%l;#; ghép hạng nhất hạng hai, có trọng lượng không tải là 27.6 tấn, thì nó sẽ là 『\\x%l22形;#00ffc040;Nairo%l;#;』 phải không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「大正解です」
1786 = "「Hoàn toàn chính xác.」"
# monologue
# JP: 理解した。
2719 = "Tôi hiểu rồi."
# monologue
# JP: ならば221の方は、旧\\x%l帝鉄;#00ffc040;帝鉄%l;#;22000系改め御一夜22系の22に、\n単純に一号客車の1を付け足しただけのものか。
3030 = "Vậy thì phần 221, chỉ đơn giản là số 22 của Dòng 22 Ohimitera được đổi từ Dòng 22000 của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; cũ, cộng thêm số 1 của toa hành khách số 1 thôi sao."
# 【ふかみ】
# display as 深美
# JP: 「っていうか――　\\x%l一等二等併設客車;#00ffc040;一等二等[ごうぞうしゃ,2]合造車%l;#;ってどんな。です？」
2098 = "「Nói mới nhớ――\\x%l一等二等併設客車;#00ffc040;toa xe ghép hạng nhất hạng hai%l;#; là như thế nào. Vậy ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「一番簡単にいえば、木製テーブル付きの席を一等扱い。\nそれ以外の席を二等扱いで、切符を販売するってこと」
1988 = "「Nói một cách đơn giản nhất, ghế có kèm bàn gỗ sẽ được coi là hạng nhất. Những ghế còn lại được coi là hạng hai, và bán vé theo đó.」"
# 【ふかみ】
# display as 深美
# JP: 「え？　えと――」
1697 = "「Hả? À ừm――」"
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、同じ\\x%l客車;#00ffc040;客車%l;#;、その一輌の中ででも、\n席種を一等、二等とわけて、料金に差をつけるのだな？」
1578 = "「Tức là, dù trong cùng một \\x%l客車;#00ffc040;toa hành khách%l;#;, cũng chia loại ghế thành hạng nhất, hạng hai, và tạo ra sự chênh lệch về giá vé sao?」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　わかりました。です」
1721 = "「A! Em hiểu rồi. Ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「でしたらぁ」
2135 = "「Nếu vậy thì~」"
# monologue
# JP: ふかみの理解と入れ替わり、\nれいなが、ことり、小首をかしげる。
2873 = "Thay cho sự hiểu ra của Fukami, Reina nghiêng đầu tò mò."
# 【れいな】
# display as 玲奈
# JP: 「普通席は無しにするんですかぁ？」
1563 = "「Sẽ không có ghế thường nữa sao ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん。全席指定でプレミアム感と余裕を出した方が、\n詰めこむよりいいって判断したの」
1731 = "「Ừm. Chị quyết định là toàn bộ là ghế đặt trước để tạo cảm giác cao cấp và thoải mái, như vậy sẽ tốt hơn là nhồi nhét.」"
# monologue
# JP: すぐさま、ハチロクが深く頷く。
2467 = "Ngay lập tức, Hachiroku gật đầu tán thành."
# 【ハチロク】
# display as 八六
# JP: 「妥当なご判断かと」
1839 = "「Đó là một quyết định thỏa đáng ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……確かにそうか。観光\\x%l客車;#00ffc040;客車%l;#;がぎゅうぎゅうづめでは、\nたとえ自分が座っていても、楽しめなくなりそうだ」
1306 = "「......Quả thực là vậy. Nếu \\x%l客車;#00ffc040;toa hành khách%l;#; du lịch mà chật ních người, thì dù mình có đang ngồi cũng chẳng thể nào tận hưởng được.」"
# monologue
# JP: 重なる言葉が、僕の実感を強めてくれる。\n“改修の全工程が完了”という言葉の意味が理解に変わる。
3009 = "Những lời nói liên tiếp giúp tôi củng cố thêm cảm nhận của mình. Ý nghĩa của câu \"toàn bộ quá trình cải tạo đã hoàn tất\" đã chuyển thành sự thấu hiểu."
# monologue
# JP: 運用についてまでもが、すでに決まっているのなら――
2584 = "Nếu ngay cả việc vận hành cũng đã được quyết định――"
# 【双鉄】
# display as 雙鐵
# JP: 「試運転さえ無事に完了すれば、\nいつでも営業運転に入れるというわけか」
1665 = "「Chỉ cần chạy thử nghiệm hoàn tất suôn sẻ, là có thể đưa vào vận hành thương mại bất cứ lúc nào sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「と、わたしは考えてるんですけど――」
1873 = "「Tôi cũng đang nghĩ vậy――」"
# monologue
# JP: ちら、と青い瞳が動く。\n僕からハチロク――再び僕へと。
2573 = "Đôi mắt xanh biếc khẽ đảo. Từ tôi sang Hachiroku――rồi lại về phía tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「日程のこととか、\nその他にもいろいろ、相談したくて」
1899 = "「Về lịch trình, và nhiều thứ khác nữa, tôi muốn bàn bạc thêm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1737 = "「Ừm.」"
# monologue
# JP: “その他いろいろ”は、\nおそらくハチロクが決定すべき事項だろう。
1240 = "\"Nhiều thứ khác nữa\", có lẽ là những vấn đề mà Hachiroku nên quyết định."
# monologue
# JP: であらば僕は、自分にできることを速やかに行うのみだ。
3026 = "Nếu vậy, tôi chỉ cần nhanh chóng làm những gì mình có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「日程面での選択肢はおおまかに二つになるな。\nつまり――投票日前か、投票後か」
1950 = "「Các lựa chọn về mặt lịch trình về cơ bản sẽ là hai. Tức là――trước ngày bỏ phiếu, hay sau ngày bỏ phiếu.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんこつ、投票前に決まっとるばい！」
2133 = "「Chuyện đó, chắc chắn là trước khi bỏ phiếu rồi!」"
# 【れいな】
# display as 玲奈
# JP: 「そうですよねぇ。\\x%l客車;#00ffc040;客車%l;#;改修プロジェクトの、\nすっごくいい宣伝になると思いますぅ」
1965 = "「Đúng vậy nhỉ. Dự án cải tạo \\x%l客車;#00ffc040;toa hành khách%l;#;, em nghĩ sẽ là một sự quảng bá rất tuyệt vời đó ạ~」"
# 【ふかみ】
# display as 深美
# JP: 「それってそのまま、\n日々姫さんの政策のＰＲにもなるです。よね？」
2069 = "「Như vậy thì, cũng sẽ là PR cho chính sách của chị Hibiki luôn. Nhỉ?」"
# monologue
# JP: ふかみの視線は真闇姉へと。\n真闇姉の唇は、けれどなかなか開かれない。
2874 = "Ánh mắt Fukami hướng về phía chị Mayami. Nhưng đôi môi của chị Mayami lại mãi không chịu mở lời."
# 【真闇】
# display as 真闇
# JP: 「……試運転が上手く行けば――\nそれは、もちろんそうなるとね。けど」
1295 = "「......Nếu chạy thử nghiệm diễn ra suôn sẻ―― Thì tất nhiên là vậy rồi. Nhưng mà.」"
# monologue
# JP: 日々姫のことを思いやってか、\n歯切れのあまり良くない答え。
2553 = "Có lẽ vì lo lắng cho Hibiki, nên câu trả lời của chị ấy không được dứt khoát cho lắm."
# monologue
# JP: ポーレットが小さな挙手をして、\n控えめな声で、ごく控えめな言葉をつぎたす。
2863 = "Paulette khẽ giơ tay, và bổ sung bằng một giọng nói, những lời lẽ vô cùng dè dặt."
# 【ポーレット】
# display as 波萊特
# JP: 「もし試運転で重大な不具合を出してしまえば、\n選挙戦にも……良くない影響を出してしまう可能性も」
1776 = "「Nếu xảy ra sự cố nghiêm trọng trong quá trình chạy thử nghiệm, thì có khả năng...... sẽ gây ảnh hưởng xấu đến cuộc bầu cử.」"
# monologue
# JP: その“可能性”は恐らく百パーセント。
2953 = "\"Khả năng\" đó có lẽ là một trăm phần trăm."
# monologue
# JP: 先日の討論会を有権者が五分と見ていたのなら、\n“良くない影響”は、そのまま致命傷となるだろう。
2586 = "Nếu cử tri coi cuộc tranh luận hôm trước là ngang tài ngang sức, thì \"ảnh hưởng xấu\" đó sẽ trực tiếp trở thành đòn chí mạng."
# 【ハチロク】
# display as 八六
# JP: 「良い部分同士のニコイチでの改修ですから、\n深刻な不具合は恐らくでないでしょうが……」
2131 = "「Vì đây là đợt cải tạo kết hợp những phần tốt lại với nhau, nên có lẽ sẽ không có sự cố nghiêm trọng nào đâu, nhưng mà......」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さんは」
1700 = "「Anh trai thì sao.」"
# monologue
# JP: 日々姫の声。
2807 = "Giọng nói của Hibiki."
# monologue
# JP: それが合図でもあるかのように、\nみなの視線が僕へと集まる。
2571 = "Như thể đó là một tín hiệu, ánh mắt của mọi người đổ dồn về phía tôi."
# 【日々姫】
# display as 日日姬
# JP: 「兄さんはどう考えますか？」
1702 = "「Anh nghĩ thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……リスクを、更に制限してはどうか」
1293 = "「......Hay là chúng ta hạn chế rủi ro hơn nữa đi.」"
# 【ハチロク】
# display as 八六
# JP: 「と、おっしゃいますと？」
1840 = "「Ý ngài là sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「“\\x%l客車;#00ffc040;客車%l;#;を引いて走らせるだけ”の試運転はどうかと。\n空車であっても、走ればそれだけで宣伝にはなろうし」
2088 = "「Chỉ chạy thử nghiệm theo kiểu \"chỉ kéo \\x%l客車;#00ffc040;toa hành khách%l;#; chạy thôi\" thì sao. Dù là xe trống, nhưng chỉ cần chạy thôi cũng đủ để quảng bá rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　いわれればそうですよね。煙が入る入らないなら、\n大勢を乗せなくたって確認できるわけですし」
1720 = "「A! Anh nói mới để ý. Nếu chỉ kiểm tra xem khói có lọt vào hay không, thì đâu cần phải chở nhiều người mới xác nhận được chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。まずは煙の流入が無いことを確認。投開票後に、\n試乗してもらっての試運転と段階を踏めばいい気がする」
1736 = "「Ừm. Trước tiên xác nhận xem khói có lọt vào không. Sau khi bỏ phiếu và kiểm phiếu xong, mới tiến hành chạy thử nghiệm cho mọi người đi thử, cứ làm theo từng giai đoạn như vậy là được.」"
# monologue
# JP: お客様に見立てた土嚢を積んでの乗務訓練にも、\n自分としてはかなり習熟できてきたように思う。
2946 = "Việc huấn luyện nghiệp vụ với những bao cát giả làm hành khách, bản thân tôi cũng cảm thấy mình đã khá thành thạo rồi."
# monologue
# JP: 煙の流入さえ無いのなら、\nその次の段階へも、スムーズに移行可能なはずだ。
2497 = "Chỉ cần không có khói lọt vào, thì chắc chắn có thể chuyển sang giai đoạn tiếp theo một cách suôn sẻ."
# 【ふかみ】
# display as 深美
# JP: 「わたし、そのやり方に賛成。です。\n一番、おっかなくないやり方だって思います」
1893 = "「Mình, tán thành cách làm đó. Ạ. Mình nghĩ đó là cách an toàn nhất.」"
# 【凪】
# display as 凪
# JP: 「むっ」
# 1737 = "「嗯」" 
# 【真闇】
# display as 真闇
# JP: 「討論会の出来がよかったけんねぇ。\nどう考えても、手堅いやり方の方がベターよね」
2087 = "「Cuộc tranh luận diễn ra rất tốt mà. Dù nghĩ thế nào thì cách làm chắc chắn vẫn tốt hơn nhỉ.」"
# 【凪】
# display as 凪
# JP: 「むぅぅ～～っ」
1712 = "「Ư ư~~」"
# monologue
# JP: 唸りをあげる凪の気持ちは想像できる。\nここで一気に勝負をかけて、圧勝にまで運びたいのだ。
2721 = "Tôi có thể tưởng tượng được cảm xúc của Nagi khi rên rỉ như vậy. Con bé muốn dốc toàn lực quyết thắng ở đây, và giành chiến thắng áp đảo."
# monologue
# JP: が――言われていることも納得できてしまうから、\n不満をグっと、飲み込んでくれているのだろう。
2387 = "Nhưng――những gì mọi người nói cũng rất thuyết phục, nên con bé đành phải nuốt cục tức vào trong."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとれいなはどうだ？」
2013 = "「Paulette và Reina thấy sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%l8620;#00ffc040;8620%l;#;関連の運用のことは、\n\\x%l8620;#00ffc040;8620%l;#;チームに任せたいと思います」
1865 = "「Những việc liên quan đến vận hành \\x%l8620;#00ffc040;8620%l;#;, tôi muốn giao phó cho đội \\x%l8620;#00ffc040;8620%l;#;.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなは、ポーレットに賛成ですよぉ」
2035 = "「Reina, tán thành với chị Paulette nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク」
2163 = "「Vậy thì, Hachiroku.」"
# monologue
# JP: 視線を向ければ、ハチロクの手がスと上がる。
2680 = "Khi tôi hướng ánh mắt sang, Hachiroku liền giơ tay lên."
# monologue
# JP: 制帽に手を添え、曲がりの無いことを確認し、\nハチロクは僕にまっすぐ体を向ける。
2567 = "Đặt tay lên chiếc mũ đồng phục, xác nhận nó không bị lệch, Hachiroku quay người hướng thẳng về phía tôi."
# 【ハチロク】
# display as 八六
# JP: 「せっかくです。最終試験といたしましょう」
2115 = "「Hiếm có cơ hội này. Hãy coi đây là bài kiểm tra cuối cùng đi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「最終試験？」
1989 = "「Bài kiểm tra cuối cùng?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様と日々姫にとっても最終試験です。\nわたくしは\\x%l客車;#00ffc040;客車%l;#;に乗り、煙の流入の有無を確認します」
1803 = "「Cũng là bài kiểm tra cuối cùng đối với ngài Soutetsu và Hibiki. Em sẽ lên \\x%l客車;#00ffc040;toa hành khách%l;#;, và xác nhận xem có khói lọt vào hay không.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ。っていうことは――」
1715 = "「A. Vậy có nghĩa là――」"
# 【ハチロク】
# display as 八六
# JP: 「ええ、その通りですよ。日々姫」
1742 = "「Vâng, đúng vậy đấy. Hibiki.」"
# monologue
# JP: ハチロクはじっと日々姫を見つめ、ひとつ頷き、\n静かに僕へと視線を戻す。
2458 = "Hachiroku chăm chú nhìn Hibiki, gật đầu một cái, rồi lặng lẽ hướng ánh mắt trở lại phía tôi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様と日々姫と。ふたりだけの運転で湯医まで、\n\\x%l22形;#00ffc040;ナイロ221%l;#;を引いた\\x%l8620;#00ffc040;8620%l;#;を持っていく」
2185 = "「Ngài Soutetsu và Hibiki. Hai người sẽ tự mình lái \\x%l8620;#00ffc040;8620%l;#; kéo theo \\x%l22形;#00ffc040;Nairo 221%l;#; đến tận ga Yui.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それが――僕達の最終試験か」
2129 = "「Đó là――bài kiểm tra cuối cùng của chúng ta sao.」"
# 【ハチロク】
# display as 八六
# JP: 「ふたつの試験をともにクリアしていただけるなら、\nお二人を、正\\x%l機関士;#00ffc040;機関士%l;#;と正\\x%l機関助士;#00ffc040;機関助士%l;#;として認めます」
1782 = "「Nếu cả hai có thể vượt qua hai bài kiểm tra này, em sẽ công nhận hai người là \\x%l機関士;#00ffc040;Lái tàu%l;#; chính thức và \\x%l機関助士;#00ffc040;Phụ lái tàu%l;#; chính thức.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1973 = "「Vậy sao.」"
# monologue
# JP: それはハチロクが、\n僕らの教官役から解放されるということだ。
3021 = "Điều đó có nghĩa là Hachiroku, sẽ được giải phóng khỏi vai trò giáo quan của chúng tôi."
# monologue
# JP: 余計な負荷が減少する分、\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;としての真価をより発揮できるようになろう。
2881 = "Giảm bớt được những gánh nặng không cần thiết, có lẽ em ấy sẽ càng phát huy được giá trị đích thực của một \\x%lレイルロオド;#00ffc040;Railord%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「結果、万全の体勢で営業運転に入れるのであれば、\n成功時のメリットはさらに大きくなるな」
1779 = "「Kết quả là, nếu có thể bước vào vận hành thương mại với tư thế vẹn toàn, thì lợi ích khi thành công sẽ còn lớn hơn nữa.」"
# monologue
# JP: 試験運転の成功を日々姫の当選に、\n日々姫当選を営業運転の成功にと、連鎖できれば理想的だ。
2991 = "Thành công của việc chạy thử nghiệm sẽ dẫn đến việc Hibiki trúng cử, Hibiki trúng cử lại dẫn đến thành công của việc vận hành thương mại, nếu tạo được chuỗi liên kết như vậy thì thật lý tưởng."
# monologue
# JP: しかし、余裕時間は殆ど無い。\nやれるとしても――ぶっつけの一発勝負となる。
2390 = "Tuy nhiên, hầu như không còn thời gian rảnh rỗi nữa. Dù có làm được――cũng sẽ là một ván cược một mất một còn."
# 【双鉄】
# display as 雙鐵
# JP: 「……街頭演説やそれに相当する選挙活動は、\n夜八時までしかできないのだったな？」
1309 = "「......Việc diễn thuyết trên đường phố và các hoạt động bầu cử tương đương, chỉ được phép thực hiện đến tám giờ tối thôi phải không?」"
# 【日々姫】
# display as 日日姬
# JP: 「ですね。\n今日の八時で選挙運動は全部おしまい」
1979 = "「Đúng vậy ạ. Tám giờ tối nay là toàn bộ chiến dịch tranh cử sẽ kết thúc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「名残惜しそうな口調だな？」
1604 = "「Giọng điệu nghe có vẻ luyến tiếc nhỉ?」"
# monologue
# JP: 問えばふふっと、日々姫は笑う。
2731 = "Nghe tôi hỏi, Hibiki khẽ cười khúc khích."
# 【日々姫】
# display as 日日姬
# JP: 「単純に、すごく楽しかったですから。けど……\nこれって、学園祭の準備とかと同じ楽しさだから」
1664 = "「Đơn giản là vì em thấy rất vui. Nhưng mà...... Niềm vui này, giống hệt như lúc chuẩn bị cho lễ hội trường vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1711 = "「唔？」" 
# 【日々姫】
# display as 日日姬
# JP: 「名残惜しくても終わらせるんです。\n明日を、もっと楽しくするため」
1810 = "「Dù có luyến tiếc thì cũng phải kết thúc thôi. Để ngày mai, còn có thể vui vẻ hơn nữa.」"
# monologue
# JP: 日々姫の顔と言葉から、輝くばかりの自信を感じる。
2812 = "Từ khuôn mặt và lời nói của Hibiki, tôi cảm nhận được một sự tự tin ngời sáng."
# monologue
# JP: そうだった。隣に、日々姫が居てくれるのだ。\n万一失敗したとて、それさえきっと、乗り越えられる。
2850 = "Đúng rồi. Bên cạnh tôi, luôn có Hibiki. Ngộ nhỡ có thất bại, thì chắc chắn cũng có thể vượt qua được."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、二十一時からでどうだろう？」
2149 = "「Nếu vậy, bắt đầu từ chín giờ tối thì sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「私なら、二十時半からでも大丈夫ですよ？」
1861 = "「Nếu là em thì, từ tám giờ rưỡi cũng không sao đâu ạ?」"
# monologue
# JP: 日々姫の言葉に、凪も含めたみなが頷く。\nであれば、残る課題はひとつだ。
2959 = "Trước lời nói của Hibiki, mọi người bao gồm cả Nagi đều gật đầu. Nếu vậy, vấn đề còn lại chỉ có một."
# 【双鉄】
# display as 雙鐵
# JP: 「ではまずは、二十時までは悔いのない選挙運動を」
2160 = "「Vậy thì trước tiên, hãy thực hiện chiến dịch tranh cử không hối tiếc cho đến tám giờ tối nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1737 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「僕はこの後蓑笠さんと、堰さん達ご兄弟とに相談にいく。\nそれで、安全確保のための最善の体制を作れるようなら」
2125 = "「Sau đây anh sẽ đi bàn bạc với ông Minokasa và anh em ông Seki. Sau đó, nếu có thể thiết lập được một hệ thống tốt nhất để đảm bảo an toàn,」"
# 【ハチロク】
# display as 八六
# JP: 「試験運転を決行しましょう。\n二十時半集合で、運転開始は、二十二時三十分」
2028 = "「Chúng ta sẽ quyết định chạy thử nghiệm. Tám giờ rưỡi tập trung, bắt đầu chạy lúc mười giờ ba mươi phút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕としては、それで全く異論はない。\nが、安全確保が十分にとれないようなら、試験は延期だ」
1857 = "「Về phần anh, hoàn toàn không có ý kiến gì. Nhưng, nếu không thể đảm bảo an toàn đầy đủ, thì cuộc thử nghiệm sẽ bị hoãn lại.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。でしたら――」
1734 = "「Vâng. Nếu vậy――」"
# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠さんたちのご都合が分かり次第に電話を入れる。\n行ける行けないの判断と人員配置とは、ポーレットが」
1918 = "「Ngay khi biết được lịch trình của ông Minokasa và mọi người, anh sẽ gọi điện thoại. Việc phán đoán xem có thể đi được hay không và bố trí nhân sự, nhờ Paulette nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。任せてください」
1883 = "「Tôi hiểu rồi. Cứ giao cho tôi.」"
# monologue
# JP: ポーレットの目が、僕を促す。\nならばこのまま、今日は僕が音頭を取ろう。
2861 = "Ánh mắt của Paulette thúc giục tôi. Nếu vậy, hôm nay tôi sẽ là người đứng ra dẫn dắt."
# 【双鉄】
# display as 雙鐵
# JP: 「先を見過ぎず、一つ、一つをしっかりこなそう。\nそうすれば結果は自ずとついてくる」
1637 = "「Đừng nhìn quá xa, hãy làm thật tốt từng việc, từng việc một. Như vậy, kết quả sẽ tự nhiên đến thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん」
1740 = "「Vâng, anh trai.」"
# monologue
# JP: 短く答え、日々姫はすぐにペンを取る。
2819 = "Trả lời ngắn gọn, Hibiki lập tức cầm bút lên."
# monologue
# JP: そう、それでいい。\n今はまだ、最後の選挙運動に全力を注ぐべきときだから。
2851 = "Đúng vậy, thế là được rồi. Bởi vì bây giờ vẫn là lúc nên dốc toàn lực cho chiến dịch tranh cử cuối cùng."
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、動こう。良い一日を」
2151 = "「Vậy thì, hành động thôi. Chúc mọi người một ngày tốt lành.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なん、だ――これは」
2130 = "「Cái, gì――thế này.」"
# 【凪】
# display as 凪
# JP: 「ウチじゃなかとよっ！！」
1669 = "「Không phải tại em đâu nha!!」"
# monologue
# JP: 問われる前に凪が答えて。\n口の前、指と指とを合わせてバツ印を作る。
2679 = "Chưa kịp hỏi thì Nagi đã trả lời. Con bé đan chéo hai ngón tay tạo thành hình chữ X trước miệng."
# monologue
# JP: ふかみも隣でコクコク頷く。\nつまり、“誰にも話していない”ということなのだろう。
2869 = "Fukami bên cạnh cũng gật đầu lia lịa. Tóm lại, ý là \"chưa nói với ai cả\" chứ gì."
# monologue
# JP: （が――）
3079 = "（Nhưng mà――）"
# 【学園生Ａ】
# display as 學生Ａ
# JP: 「\\x%lNゲージ;#00ffc040;Nゲージ%l;#;とは、やっぱり迫力が段違いねー」
1789 = "「Đúng là uy lực khác hẳn so với \\x%lNゲージ;#00ffc040;N-gauge%l;#; nhỉ.」"
# 【債権者Ａ】
# display as 債權人Ａ
# JP: 「今度は、上手く走ってもらわんと困るばい」
2132 = "「Lần này mà không chạy đàng hoàng là mệt lắm đấy nha.」"
# 【幼女】
# display as 幼女
# JP: 「パパ、だっこー！」
2029 = "「Ba ơi, bế con~!」"
# monologue
# JP: \\x%l石造機関庫;#00ffc040;石造機関庫%l;#;入り口近く、『関係者以外立ち入り禁止』の\nロープの前には、かなりの人数が集まっている。
2532 = "Gần lối vào \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;, trước sợi dây thừng ghi 『Không phận sự miễn vào』 đang có một đám đông khá lớn tụ tập."
# monologue
# JP: 興奮したのか、駅長・コンまで、\nぐるぐるぐるぐる、群衆を眺めて周回している。
2379 = "Không biết có phải vì phấn khích hay không, mà ngay cả trưởng ga Kon cũng đang chạy vòng quanh ngắm nhìn đám đông."
# 【日々姫】
# display as 日日姬
# JP: 「誰かが話しちゃったんですかね」
1984 = "「Chắc ai đó đã lỡ lời rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「協力依頼のときにはきちんと、\n『乗客を乗せずにやる』と説明したのだが――」
2102 = "「Lúc nhờ giúp đỡ anh đã giải thích rõ ràng là 『Sẽ không chở hành khách』 rồi mà――」"
# monologue
# JP: 安全確保するためには、踏切番や信号番、多くの人出が\n必要となるし、その協力依頼は更なる口づてとなる。
2389 = "Để đảm bảo an toàn, cần phải có rất nhiều người như người gác chắn, người gác tín hiệu, và lời nhờ vả đó lại được truyền miệng xa hơn nữa."
# monologue
# JP: （人の口に戸は立てられん――か）
3078 = "（Đúng là không ai bịt được miệng thế gian――nhỉ）"
# monologue
# JP: 以前の情報漏れもある。
2417 = "Trước đây cũng từng có vụ rò rỉ thông tin rồi."
# monologue
# JP: 情報漏洩を防ぎたいなら、そのために十分な労力と対策を、\nその時点で取っておく必要があったのかもしれん。
2982 = "Nếu muốn ngăn chặn rò rỉ thông tin, có lẽ ngay từ lúc đó đã cần phải dành đủ công sức và biện pháp đối phó."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、日々姫。参りましょう」
2188 = "「Ngài Soutetsu, Hibiki. Chúng ta đi thôi.」"
# monologue
# JP: ハチロクの目は、すでに前だけを見つめている。\nその目を見れば、僕も気持ちを切り替えられる。
2460 = "Đôi mắt của Hachiroku đã chỉ còn nhìn về phía trước. Nhìn vào đôi mắt đó, tôi cũng có thể thay đổi tâm trạng."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。行こう」
1970 = "「Đúng vậy. Đi thôi.」"
# monologue
# JP: ハチロクに続き、\n日々姫を伴い\\x%l石造機関庫;#00ffc040;石造機関庫%l;#;に入り\\x%l8620;#00ffc040;8620%l;#;の元へと向かう。
2684 = "Tiếp bước Hachiroku, tôi cùng Hibiki bước vào \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#; và tiến về phía \\x%l8620;#00ffc040;8620%l;#;."
# monologue
# JP: [キャブ,2]運転台下に着けばすぐ、\nハチロクの声が硬質になる。
2374 = "Ngay khi đến dưới \\x%l運転台;#00ffc040;buồng lái%l;#;, giọng nói của Hachiroku trở nên cứng rắn."
# 【ハチロク】
# display as 八六
# JP: 「試験は、予定通りに行います。\n状況次第では、空車ではなくなるかもしれませんが」
2016 = "「Bài kiểm tra sẽ được tiến hành theo đúng dự định. Tùy thuộc vào tình hình, có thể sẽ không còn là xe trống nữa.」"
# monologue
# JP: 言ってとんとん、\nハチロクは自分の耳を叩いてみせる。
2465 = "Vừa nói, Hachiroku vừa gõ gõ vào tai mình."
# 【ハチロク】
# display as 八六
# JP: 「れいなからの\\x%l共感;#00ffc040;共感%l;#;です。\n駅の方でポーレット様が苦戦しているようですので」
1976 = "「Là \\x%l共感;#00ffc040;cộng cảm%l;#; từ Reina. Có vẻ như phía nhà ga, Paulette đang gặp khó khăn ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「乗せてくれ、という懇願か」
1983 = "「Lại là những lời cầu xin cho đi nhờ sao.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。どうなさいますか？\nこれだけ、人が集まってしまった以上は――」
1981 = "「Vâng. Ngài định thế nào ạ? Một khi đã có chừng này người tụ tập lại đây――」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。乗せても乗せんでも、失敗しても成功しても、\nあっという間に噂は町に広がるだろう」
1961 = "「Cũng phải. Cho lên hay không cho lên, thất bại hay thành công, thì tin đồn cũng sẽ lan truyền khắp thị trấn trong chớp mắt thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「それでは――」
2162 = "「Vậy thì――」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのための訓練は十分つませてもらったつもりだ。\n営業運転では、これ以上の環境激変もザラだろうしな」
1859 = "「Anh đã được huấn luyện đủ cho những tình huống thế này rồi. Trong vận hành thương mại, những thay đổi môi trường đột ngột còn hơn thế này cũng là chuyện thường mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「ですよね！　私も、大丈夫です」
1968 = "「Đúng vậy nhỉ! Em cũng, không sao đâu ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「――良いお言葉と、良いお顔です」
1285 = "「――Một câu trả lời hay, và một biểu cảm rất tốt.」"
# monologue
# JP: ふっとハチロクは微笑んで、\nけれどもすぐに、その顔を教官の物へと切り替える。
2457 = "Hachiroku khẽ mỉm cười, nhưng ngay lập tức, khuôn mặt ấy lại chuyển sang vẻ mặt của một giáo quan."
# 【ハチロク】
# display as 八六
# JP: 「では、れいなにはそう伝えます。\nわたくしは、このまま\\x%l22形;#00ffc040;ナイロ%l;#;221に乗車しましょう」
2154 = "「Vậy, em sẽ chuyển lời lại cho Reina như thế. Em sẽ cứ thế này mà lên \\x%l22形;#00ffc040;Nairo 221%l;#; luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l運転体;#00ffc040;運転体%l;#;へ、\\x%lタブレット;#00ffc040;タブレット%l;#;交換はしないのか？」
1597 = "「Không đổi \\x%lタブレット;#00ffc040;thẻ bảng%l;#; sang \\x%l運転体;#00ffc040;kíp lái%l;#; sao?」"
# 【ハチロク】
# display as 八六
# JP: 「この体の方が[はんようせい,2]汎用性に優れます。\nモニターだけでなく、接客もあるかもしれませんので」
2041 = "「Cơ thể này có tính đa dụng cao hơn. Vì có thể không chỉ là giám sát, mà còn phải tiếp khách nữa ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。ならば、僕からはもう何もない」
1885 = "「Đã rõ. Nếu vậy, anh không còn gì để nói nữa.」"
# monologue
# JP: 背筋を正して敬礼すれば、\n日々姫もすぐに僕に倣う。
2702 = "Tôi thẳng lưng chào kiểu quân đội, Hibiki cũng lập tức làm theo."
# monologue
# JP: 僕らのものより数段整った答礼をして、\nハチロクは、すぐに背中を向けてしまう。
2455 = "Đáp lại bằng một động tác chào chuẩn mực hơn chúng tôi gấp nhiều lần, Hachiroku ngay lập tức quay lưng đi."
# 【ハチロク】
# display as 八六
# JP: 「次に会うのは、湯医でとなることを期待します」
1876 = "「Kỳ vọng rằng lần tới chúng ta gặp nhau sẽ là ở ga Yui.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、湯医で」
2168 = "「Nếu vậy, hẹn gặp ở ga Yui.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、湯医で」
1744 = "「Vâng, hẹn gặp ở ga Yui.」"
# monologue
# JP: “助けを求めれば不合格”――\n実質的にそう言い残し、ハチロクは\\x%l客車;#00ffc040;客車%l;#;へと消えていく。
1243 = "\"Nếu cầu cứu thì sẽ đánh trượt\"―― Thực chất là để lại lời nhắn như vậy, Hachiroku biến mất vào trong \\x%l客車;#00ffc040;toa hành khách%l;#;."
# monologue
# JP: ならば、一刻も無駄には出来ん。
3024 = "Nếu vậy, không thể lãng phí dù chỉ một khắc."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、オイル周りの点検を。\n僕は、\\x%l走行部;#00ffc040;走行部%l;#;周りの点検をする」
1945 = "「Hibiki, kiểm tra hệ thống dầu nhớt nhé. Anh sẽ kiểm tra xung quanh \\x%l走行部;#00ffc040;bộ phận chuyển động%l;#;.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい！」
1739 = "「Vâng!」"
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;の点検を終え、続いて\\x%l22形;#00ffc040;ナイロ%l;#;221を。
2943 = "Hoàn thành kiểm tra \\x%l8620;#00ffc040;8620%l;#;, tiếp theo là \\x%l22形;#00ffc040;Nairo 221%l;#;."
# monologue
# JP: 乗務員用の点検要項もまだ受け取らぬ\\x%l客車;#00ffc040;客車%l;#;ではあるが、\n目視可能な各部に異常がないことは確認しておく。
3015 = "Dù là \\x%l客車;#00ffc040;toa hành khách%l;#; chưa nhận được sổ tay kiểm tra dành cho nhân viên, nhưng tôi vẫn phải xác nhận xem các bộ phận có thể nhìn thấy bằng mắt thường có gì bất thường không."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l8620;#00ffc040;8620%l;#;。\\x%l22形;#00ffc040;ナイロ%l;#;221。\nともに\\x%l走行部;#00ffc040;走行部%l;#;まわり、点検良し！」
1267 = "「\\x%l8620;#00ffc040;8620%l;#;. \\x%l22形;#00ffc040;Nairo 221%l;#;. Kiểm tra xung quanh \\x%l走行部;#00ffc040;bộ phận chuyển động%l;#; của cả hai, tốt!」"
# 【日々姫】
# display as 日日姬
# JP: 「オイル良し！　各部点検良し！」
2017 = "「Dầu nhớt tốt! Kiểm tra các bộ phận tốt!」"
# monologue
# JP: 指差\\x%l喚呼;#00ffc040;喚呼%l;#;で区切りをつける。\n次は、機器類の機能を確認だ。
2707 = "Đánh dấu kết thúc bằng \\x%l喚呼;#00ffc040;chỉ tay hô xác nhận%l;#;. Tiếp theo, là xác nhận chức năng của các thiết bị máy móc."
# monologue
# JP: まずは僕から\\x%l運転台;#00ffc040;運転台%l;#;へ――っ！？
3052 = "Đầu tiên tôi sẽ lên \\x%l運転台;#00ffc040;buồng lái%l;#;――!?"
# monologue
# JP: （ぐらっ）
3087 = "（Lảo đảo）"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにっ！！？」
2178 = "「Anh hai!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1711 = "「唔？」" 
# monologue
# JP: 日々姫の顔が、すぐそこにある。
2811 = "Khuôn mặt của Hibiki, ở ngay sát bên."
# monologue
# JP: 強く日々姫に抱きしめ――\nいいや、抱きとめられている。
2718 = "Tôi ôm chặt lấy Hibiki―― Không đúng, là đang được con bé ôm lấy."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　立ちくらみというヤツか？\nいささか、気合を入れ過ぎたか」
1829 = "「Gì vậy? Cái gọi là chóng mặt khi đứng lên sao? Có vẻ như anh đã dồn quá nhiều sức lực rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぁっ」
1717 = "「A」"
# monologue
# JP: ひとりごと、というよりむしろ、\n不安げな日々姫への言い聞かせだ。
2969 = "Giống như đang tự nhủ với bản thân, hơn là nói cho Hibiki đang lo lắng nghe."
# monologue
# JP: 心身ともに不調は全く感じていない。\n単に、バランスを崩してしまっただけのことだろう。
2729 = "Tôi hoàn toàn không cảm thấy có gì bất ổn về cả thể chất lẫn tinh thần. Đơn giản chỉ là mất thăng bằng một chút thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、無駄な時間を喰った」
2044 = "「Xin lỗi nhé, làm mất thời gian vô ích rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あのっ！　兄さん」
2148 = "「Cái đó! Anh trai」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ待て、話は落ち着いてからだ」
2063 = "「Từ từ đã, để bình tĩnh lại rồi nói chuyện sau.」"
# monologue
# JP: 手すりをつかみ、タラップにしっかりと足を乗せる。
2700 = "Nắm lấy tay vịn, đặt chân vững chắc lên bậc thang."
# monologue
# JP: 問題無い。\nあとは体を持ち上げるだけ――でっ！？
2849 = "Không có vấn đề gì. Chỉ cần nhấc người lên nữa thôi――Hả!?"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにいっ！！」
2176 = "「Anh hai!!」"
# monologue
# JP: （どすっ！）
3085 = "（Bịch!）"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、れ？」
1696 = "「Ủa, lạ nhỉ?」"
# monologue
# JP: 天井が見える。\nと、いうことは僕は倒れて――っ！？
2967 = "Tôi có thể nhìn thấy trần nhà. Nói cách khác là tôi đã ngã xuống――!?"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！！？」
1942 = "「Hibiki!!?」"
# monologue
# JP: 僕の下敷きにしてしまった！
2823 = "Tôi đã đè lên người con bé mất rồi!"
# monologue
# JP: 慌ててずれて振り向こうとしたその瞬間に、\n日々姫は自分の体を起こし、明るい笑顔を浮かべてくれる。
2727 = "Ngay khoảnh khắc tôi vội vàng xê ra và quay lại, Hibiki đã tự ngồi dậy, nở một nụ cười rạng rỡ với tôi."
# 【日々姫】
# display as 日日姬
# JP: 「私は平気、大丈夫です！」
1877 = "「Em không sao, em ổn mà!」"
# monologue
# JP: 言葉と裏腹、みるみる笑顔が曇っていく。
2425 = "Trái ngược với lời nói, nụ cười của con bé nhanh chóng mờ đi."
# 【日々姫】
# display as 日日姬
# JP: 「それより……兄さん…………」
2002 = "「Hơn thế nữa...... anh trai............」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、あ……おかしいな。\n何だ、これは」
1724 = "「A, a...... Lạ thật. Cái gì thế này.」"
# monologue
# JP: 立ち直った日々姫が僕を見下ろしている。\nつまり、僕は倒れたままだ。
2939 = "Hibiki sau khi đứng dậy đang cúi xuống nhìn tôi. Nói cách khác, tôi vẫn đang nằm dưới đất."
# monologue
# JP: すぐに立とうと思うのに――
2703 = "Tôi định đứng dậy ngay lập tức――"
# 【双鉄】
# display as 雙鐵
# JP: 「手足が……なんだ――\nなんでこんなに――」
1882 = "「Tay chân anh...... sao thế này―― Sao lại thế này――」"
# monologue
# JP: 震えている。\n手足だけでなく、全身が震えてしまっている。
2591 = "Đang run rẩy. Không chỉ tay chân, mà cả toàn thân tôi đều đang run lên."
# monologue
# JP: 寒さはまるで感じてないのに――
2829 = "Rõ ràng là không hề cảm thấy lạnh――"
# 【日々姫】
# display as 日日姬
# JP: 「……平気ですよ、兄さん」
1300 = "「......Không sao đâu, anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2193 = "「!」"
# monologue
# JP: ふわりと、日々姫が僕に抱きつく。\nあたたかい。いいにおいがする。柔らかい。
2824 = "Nhẹ nhàng, Hibiki ôm chầm lấy tôi. Thật ấm áp. Có mùi hương thật dễ chịu. Thật mềm mại."
# monologue
# JP: そのまま日々姫は僕の脇の下に腕を入れ、\n抱きしめたまま、ゆっくり僕の上体を起こし座らせる。
2801 = "Cứ thế, Hibiki luồn tay dưới nách tôi, vừa ôm vừa từ từ đỡ nửa thân trên của tôi ngồi dậy."
# 【日々姫】
# display as 日日姬
# JP: 「怖くないです。大丈夫です」
2006 = "「Không có gì đáng sợ cả. Không sao đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、僕は――」
1567 = "「Không đâu, anh――」"
# monologue
# JP: 怖くなどない。\n思っているのに、言葉がべっとり喉に張り付く。
2670 = "Không hề sợ hãi. Tôi nghĩ vậy, nhưng lời nói cứ dính chặt nơi cổ họng."
# monologue
# JP: 舌までこわばり、震えてしまう。\n意志に逆らってしまうほど、ならば、体が怯えているのか。
3018 = "Đến cả lưỡi cũng cứng đờ, run rẩy. Đến mức đi ngược lại ý chí, nếu vậy, là cơ thể đang sợ hãi sao."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん……あまり無理しないでください」
1698 = "「Anh trai...... xin đừng cố quá sức.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なん、だ、泣きそうな顔を、しているぞ？」
1640 = "「Sao, thế, trông em như, sắp khóc vậy?」"
# monologue
# JP: 日々姫を心配させてはいけない。
2380 = "Không được làm Hibiki lo lắng."
# monologue
# JP: その一念で、こわばったままの舌を動かし、\nゆっくりゆっくり、つっかえないよう言葉をつなぐ。
3011 = "Với suy nghĩ đó, tôi cố cử động chiếc lưỡi cứng đờ, từ từ, từ từ, cố gắng ghép các từ lại với nhau cho khỏi vấp."
# 【双鉄】
# display as 雙鐵
# JP: 「それほど、大げさに、心配するな。\n睡眠も休息も、とれている。僕は、無理など」
1562 = "「Đừng, làm quá lên, mà lo lắng như thế. Anh vẫn ngủ nghỉ, đầy đủ. Anh, không hề cố quá sức.」"
# 【日々姫】
# display as 日日姬
# JP: 「しとるもんっ！」
1887 = "「Có mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2195 = "「!!?」"
# monologue
# JP: 幼いころの日々姫のような、泣きそうな声。
2626 = "Một giọng nói như sắp khóc, giống hệt Hibiki hồi còn nhỏ."
# monologue
# JP: 体を小さく震わせながら、\nそれでも日々姫は、睨むように僕を見つめ続ける。
2550 = "Cả cơ thể khẽ run rẩy, nhưng Hibiki vẫn tiếp tục nhìn tôi chằm chằm như đang lườm."
# 【日々姫】
# display as 日日姬
# JP: 「だって、にぃにぃ――事故でっ！\n――だから鉄道のこと、本当は怖くないわけなんてっ」
1753 = "「Tại vì, anh hai――vụ tai nạn đó! ――Thế nên chuyện về đường sắt, làm sao anh có thể không sợ được chứ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2193 = "「！」" 
# monologue
# JP: 鼓膜から脳がぐわん、と激しく揺すられる。\n息が、肚まで。肚の奥底まで落ちてくる。
2377 = "Một chấn động mạnh truyền từ màng nhĩ làm rung chuyển não bộ. Hơi thở, nghẹn lại ở bụng. Rơi tuột xuống tận đáy bụng."
# monologue
# JP: ああ、そうか。\nそうだったのか――
2521 = "A, ra là vậy. Thì ra là vậy sao――"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな……これは、過去の震えか」
1650 = "「Ra là vậy...... Đây là, sự run rẩy của quá khứ sao.」"
# monologue
# JP: 今度の言葉はスムーズに出る。\n心と体が、ようやく重なってくれた気がする。
3013 = "Lần này, lời nói đã tuôn ra trôi chảy. Tôi có cảm giác tâm trí và cơ thể cuối cùng cũng đã đồng nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「あのときのことを思い出し……\n過去の僕が、今に怯えて震えているのか」
1856 = "「Nhớ lại chuyện lúc đó...... Là tôi của quá khứ, đang sợ hãi và run rẩy trước hiện tại sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「ね……にぃに、代わってもらう？」
2146 = "「Nè...... anh hai, để người khác làm thay nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「代わる、とは？」
1928 = "「Làm thay, là sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「例えば――ポーレットさんと凪ちゃんとに、とか」
1999 = "「Ví dụ như――để chị Paulette và bé Nagi làm thay chẳng hạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
2127 = "「Chuyện đó――」"
# monologue
# JP: 思いもよらぬ日々姫の言葉に、声を失う。
3046 = "Tôi á khẩu trước lời nói không ngờ tới của Hibiki."
# monologue
# JP: 日々姫の声は僕とは逆に、\n堰を切りでもしたかのように止まらなくなる。
2955 = "Trái ngược với tôi, giọng nói của Hibiki tuôn ra không ngừng như vỡ đê."
# 【日々姫】
# display as 日日姬
# JP: 「だって、別に！　試験ば合格せんかって……\n当選ばしたら、乗務もどのみち減るばってん」
1752 = "「Vì, có sao đâu! Dù có không qua được bài kiểm tra đi nữa...... Thì nếu trúng cử, công việc chạy tàu đằng nào cũng sẽ giảm bớt mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1649 = "「Ra là vậy.」"
# monologue
# JP: 手が、震えない。\n思った通りに持ち上げられる。
2716 = "Tay tôi, không còn run nữa. Có thể nhấc lên đúng như ý muốn."
# monologue
# JP: だからその手で日々姫の後ろ頭を抱いて、\nいい子いい子となでつける。
2755 = "Vì vậy, tôi dùng bàn tay đó ôm lấy phía sau đầu Hibiki, và vuốt ve vỗ về con bé."
# 【日々姫】
# display as 日日姬
# JP: 「だから、わたしは――にぃに――兄さん、\nそこまで、無理をしなくても」
1905 = "「Nên là, em――anh hai――anh trai, anh không cần phải, cố quá sức như vậy đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1737 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「もう、構わないと思うんです。ここまでで、兄さん、\n十分すぎるほど頑張って、結果も出してるんですから」
1891 = "「Em nghĩ, như vậy là đủ rồi. Cho đến lúc này, anh trai, anh đã cố gắng quá đủ rồi, và cũng đã đạt được kết quả rồi mà.」"
# monologue
# JP: 日々姫が、ぐっと手をつっぱって、\n密着していた体を離す。
2804 = "Hibiki dùng sức đẩy tay ra, tách cơ thể đang áp sát vào nhau ra."
# monologue
# JP: 顔と顔とが、\n真正面、至近距離から見つめ合ってる形になる。
2557 = "Mặt đối mặt, chúng tôi nhìn nhau ở cự ly cực gần."
# 【日々姫】
# display as 日日姬
# JP: 「だから、運転は……\\x%l機関士;#00ffc040;機関士%l;#;はもうおしまいにして。\nそれで、今度こそ――兄さんの本当にしたいことを」
1909 = "「Vì vậy, việc lái tàu...... đừng làm \\x%l機関士;#00ffc040;Lái tàu%l;#; nữa. Và, lần này――hãy làm những gì anh thực sự muốn làm đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が、本当にしたいこと――」
1890 = "「Việc anh, thực sự muốn làm――」"
# monologue
# JP: 責任でもなく、義務でもなく。\n報恩でもなく、贖罪でもなく。
2405 = "Không phải là trách nhiệm, cũng không phải là nghĩa vụ. Không phải là báo ân, cũng không phải là chuộc tội."
# monologue
# JP: それらすべてを洗ったときに何が残るか。\n自分の心と――僕はもう、向かい合えている。
2904 = "Khi gột rửa tất cả những điều đó, thứ gì sẽ còn lại. Với trái tim của chính mình――tôi đã có thể đối mặt được rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「それはな、日々姫。ふたつあるんだ」
1895 = "「Chuyện đó, Hibiki. Có hai việc.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふたつ？」
1627 = "「Hai việc?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ひとつは、日々姫。お前をこの手で支えることだ。\nお前がそれを、僕に求める限り。いや――」
1552 = "「Một là, Hibiki. Dùng đôi bàn tay này để hỗ trợ em. Chừng nào em còn cần anh làm điều đó. Không――」"
# monologue
# JP: 飾るな、僕。\nそれはまだ、本当にしたいことではない。
2477 = "Đừng tô vẽ nữa, tôi ơi. Đó vẫn chưa phải là điều tôi thực sự muốn làm."
# 【双鉄】
# display as 雙鐵
# JP: 「お前がたとえ、僕を不要と拒んだとても。\n僕は、お前を支えたい。お前の力になりたいのだ」
1807 = "「Cho dù em có từ chối, nói là không cần anh đi chăng nữa. Anh vẫn muốn hỗ trợ em. Anh muốn trở thành sức mạnh của em.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！！」
2194 = "「!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 2195 = "「！！？」" 
# monologue
# JP: 日々姫が動いた――\n思った瞬間重なっている。距離がゼロまで縮まっている。
2795 = "Hibiki đã cử động―― Ngay khoảnh khắc tôi vừa nghĩ vậy, hai cơ thể đã đè lên nhau. Khoảng cách thu hẹp về con số không."
# monologue
# JP: 一度離した頭を日々姫は、\nくちびるとくちびるという一点だけで、密着させる。
2820 = "Hibiki, người vừa nãy đã kéo giãn khoảng cách, nay lại áp sát vào tôi, chỉ qua một điểm tiếp xúc duy nhất là đôi môi."
# 【日々姫】
# display as 日日姬
# JP: 「んっ――っ――んむ」
1727 = "「Ưm――――ưm」"
# monologue
# JP: キスをしたまま、\n日々姫はもごもご言葉を紡ぐ。
2581 = "Vẫn đang hôn, Hibiki lúng búng nói ra những lời lẽ."
# monologue
# JP: 『ずっとです』と、\n声はせずとも、確かな想いが伝わってくる。
1248 = "『Sẽ mãi mãi』, dù không thành tiếng, nhưng tôi có thể cảm nhận được rõ ràng tình cảm ấy."
# 【日々姫】
# display as 日日姬
# JP: 「んっ……」
1730 = "「Ưm......」"
# monologue
# JP: すひ、すひと、日々姫の鼻から吐かれる息が顔をくすぐる。\nそれが、少しずつ早くなる。
2632 = "Hơi thở nhè nhẹ phả ra từ mũi Hibiki làm mặt tôi buồn buồn. Nhịp thở ấy, dần dần trở nên gấp gáp hơn."
# monologue
# JP: キスをして、想いを伝えて、そこで日々姫は固まって――\nどうすればいいのか、激しく葛藤しているのだろう。
2986 = "Sau khi hôn và trao gửi tình cảm, Hibiki cứng đờ người―― Chắc hẳn con bé đang đấu tranh dữ dội xem nên làm gì tiếp theo."
# 【双鉄】
# display as 雙鐵
# JP: 「ん……」
1704 = "「Ưm......」"
# monologue
# JP: だから、僕から唇を離す。
3025 = "Vì vậy, tôi chủ động rời môi."
# 【日々姫】
# display as 日日姬
# JP: 「ぁっ」
# 1717 = "「啊」" 
# monologue
# JP: 名残惜しげに開かれかけた、\nその唇に、ほんの一瞬のキスをする。
2552 = "Lên đôi môi đang hé mở đầy vẻ luyến tiếc đó, tôi đặt một nụ hôn chớp nhoáng."
# monologue
# JP: 驚く顔の顎をつかまえ、\n目線を、僕へと固定させる。
2791 = "Giữ lấy chiếc cằm của khuôn mặt đang kinh ngạc đó, và cố định ánh mắt của con bé về phía tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「よかろう。ずっとだ」
1775 = "「Được thôi. Sẽ mãi mãi.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい――ずっと――っ！！」
1729 = "「Vâng――sẽ mãi mãi――!!」"
# monologue
# JP: （パンっ！）
3084 = "（Bốp!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2196 = "「!?」"
# monologue
# JP: いきなり日々姫が、自分の頬を両手で挟むようにして叩く。\n驚いた手が、びくりと顎を離してしまう。
2817 = "Đột nhiên Hibiki dùng hai tay vỗ mạnh vào má mình. Bàn tay tôi giật mình, vội buông cằm con bé ra."
# monologue
# JP: 赤みの増した頬をあげ、\n自分の意志でまっすぐに、日々姫は僕を見つめてくる。
2559 = "Ngẩng khuôn mặt với đôi má càng thêm ửng đỏ lên, bằng chính ý chí của mình, Hibiki nhìn thẳng vào tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ずっとでも――\n[いもうと,1]義妹だからって理由じゃ、イヤです」
2183 = "「Dù có mãi mãi đi nữa―― Nhưng với lý do vì em là em gái nuôi, thì em không chịu đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1737 = "「嗯」" 
# monologue
# JP: そうか。自分の中ではとっくに整理できていた。\n日々姫もそうだと思い込み、僕の方からもキスをした。
2831 = "Ra là vậy. Trong thâm tâm tôi đã sớm sắp xếp ổn thỏa. Tôi cứ đinh ninh Hibiki cũng vậy, nên mới chủ động hôn lại con bé."
# monologue
# JP: だがしかし――\n言葉にせねば、何も伝わりはしないのか。
2426 = "Nhưng mà―― Nếu không nói ra bằng lời, thì chẳng thể truyền đạt được gì sao."
# 【日々姫】
# display as 日日姬
# JP: 「私は、にぃにぃ――右田双鉄さんのことが好きです。\nそれは恋っていう意味の好きで」
1902 = "「Em, thích anh hai――thích anh Migita Soutetsu. Đó là sự yêu thích mang ý nghĩa tình yêu.」"
# monologue
# JP: 無意識にだろうか？\n少し、日々姫は身を固くする。
2732 = "Có lẽ là trong vô thức chăng? Hibiki hơi cứng người lại."
# 【日々姫】
# display as 日日姬
# JP: 「だから、わたしは――あなたの恋人になりたいです」
1908 = "「Vì vậy, em――muốn trở thành người yêu của anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……ありがとう。日々姫」
1316 = "「......Cảm ơn em. Hibiki.」"
# monologue
# JP: 伝えてもらって、理解した。\nこれは、確かにホっとする。
3014 = "Được nghe những lời đó, tôi đã hiểu. Điều này, quả thực khiến tôi thở phào nhẹ nhõm."
# monologue
# JP: 胸がぽかぽか暖かくなり、\nなにかとても大事な物を、分けてもらえた気持ちになれる。
2965 = "Lồng ngực tôi trở nên ấm áp, cảm giác như vừa được sẻ chia một thứ gì đó vô cùng quý giá."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も日々姫が大好きだ。僕は恋愛を良くは知らぬが……\nこれが恋だと思っている。僕にとっての恋とは、これだ」
1844 = "「Anh cũng rất yêu Hibiki. Anh không rành về tình yêu lắm nhưng...... Anh nghĩ đây chính là tình yêu. Đối với anh, tình yêu là thế này đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2193 = "「！」" 
# monologue
# JP: 瞳のふちに、ぶわっと涙が浮き上がる。\n日々姫の頬は涙に洗われ、けれどもバラ色に染まり始める。
2570 = "Nước mắt dâng trào nơi khóe mi. Đôi má Hibiki đẫm lệ, nhưng lại bắt đầu nhuốm màu hồng của hoa hồng."
# monologue
# JP: なにも泣くほどのことはなかろう――\n思うが、透き通る涙は僕にまでしみてくる。
3036 = "Đâu có chuyện gì đáng để khóc đến thế―― Tôi nghĩ vậy, nhưng những giọt nước mắt trong veo ấy cũng lan sang cả tôi."
# monologue
# JP: （ああ……そうか。これが、恋か。\nだからあれほど、恋が歌われ、物語られるものなのか）
3083 = "（A...... ra là vậy. Đây chính là, tình yêu sao. Thảo nào tình yêu lại được ca ngợi và kể lại nhiều đến thế）"
# monologue
# JP: 恋をしている。\n恋の相手の日々姫と一緒に、ここにいる。
2696 = "Tôi đang yêu. Và đang ở đây, cùng với người mình yêu là Hibiki."
# monologue
# JP: ただそれだけで、どんどん、心があたたかになる。\n日々姫の涙は僕らを満たして、恋をいっそう鮮やかにする。
2496 = "Chỉ cần có vậy, trái tim tôi cứ dần trở nên ấm áp. Nước mắt của Hibiki lấp đầy cả hai, khiến cho tình yêu này càng thêm rực rỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「一生、僕は日々姫の側にいたい」
1863 = "「Cả đời này, anh muốn ở bên cạnh Hibiki.」"
# monologue
# JP: これは、欲だ。\nエゴそのものだ。
3012 = "Đây là, dục vọng. Là sự ích kỷ của bản thân."
# monologue
# JP: そのエゴを、むしろ喜び、受け入れてくれる人がいる。\n僕の世界が鮮やかになる。世界のありようが変わってく。
2424 = "Nhưng lại có người vui vẻ chấp nhận sự ích kỷ đó. Thế giới của tôi trở nên rực rỡ. Bản chất của thế giới đang thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「恋人として。\nそうして、いずれ、日々姫の夫となって、ずうっと」
1880 = "「Với tư cách là người yêu. Và rồi, một ngày nào đó, sẽ trở thành chồng của Hibiki, mãi mãi.」"
# 【日々姫】
# display as 日日姬
# JP: 「はいっ！」
# 1739 = "「嗯！」" 
# monologue
# JP: 涙まみれの笑顔の上に、もう一度のキス。\n言葉にとても出来ない気持ちを、お互い、キスで届け合う。
2675 = "Lên nụ cười đẫm nước mắt đó, tôi trao thêm một nụ hôn nữa. Những cảm xúc không thể diễn tả thành lời, chúng tôi trao cho nhau qua những nụ hôn."
# monologue
# JP: 日々姫の匂い、日々姫の体温。\nいつまでも浸っていたいが――それは、もう少しお預けだ。
2815 = "Mùi hương của Hibiki, nhiệt độ cơ thể của Hibiki. Tôi muốn đắm chìm trong đó mãi mãi, nhưng――chuyện đó phải gác lại một chút đã."
# 【双鉄】
# display as 雙鐵
# JP: 「それでな、日々姫」
2027 = "「Và này, Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1737 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「僕には、もうひとつ。\nもうひとつだけ、本当にしたいことがあるのだ」
1900 = "「Anh còn một việc nữa. Chỉ còn một việc nữa thôi, mà anh thực sự muốn làm.」"
# monologue
# JP: 小さく頷き、\n僕の言葉の続きを待たず、日々姫はすっくと立ち上がる。
2576 = "Khẽ gật đầu, không đợi tôi nói hết câu, Hibiki đã đứng phắt dậy."
# 【日々姫】
# display as 日日姬
# JP: 「なら、私も。にぃにぃ――っ！」
2166 = "「Nếu vậy, em cũng thế. Anh hai――!」"
# 【双鉄】
# display as 雙鐵
# JP: 「にぃにぃでいい。恋人になろうと夫になろうと、\n僕は、お前の兄でもあるのだ」
1668 = "「Cứ gọi là anh hai đi. Dù có trở thành người yêu hay làm chồng, anh vẫn là anh trai của em mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1737 = "「嗯」" 
# monologue
# JP: ほっとして、だけれどどこかはちょっと不満。
2582 = "Thở phào nhẹ nhõm, nhưng đâu đó vẫn có chút bất mãn."
# monologue
# JP: そんな表情を浮かべてすぐに、\n日々姫は顔を引き締め直す。
2388 = "Vừa mới lộ ra biểu cảm đó xong, Hibiki ngay lập tức lấy lại vẻ mặt nghiêm túc."
# 【日々姫】
# display as 日日姬
# JP: 「私も。にぃにぃと一緒にやります。\nしたいこと――それが、どんなことであっても」
1846 = "「Em cũng vậy. Sẽ cùng làm với anh hai. Điều anh muốn làm――dù đó là bất cứ chuyện gì đi chăng nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心強いな」
2157 = "「Thật vững tâm.」"
# monologue
# JP: 手を取り合って立ち上がる。
2712 = "Nắm tay nhau đứng dậy."
# monologue
# JP: さきほどの異変が悪い夢でもあったかのように、\n簡単に――僕と日々姫は、キャブへとあがる。
2625 = "Như thể sự bất thường vừa rồi chỉ là một cơn ác mộng, thật dễ dàng――tôi và Hibiki bước lên buồng lái."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば日々姫、僕に手を貸せ。\n僕の望みのもう一つは、線路の上でしか果たし得ぬのだ」
2158 = "「Nếu vậy Hibiki, hãy giúp anh một tay. Mong muốn còn lại của anh, chỉ có thể thực hiện được trên đường ray thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「まかせてください」
1586 = "「Cứ giao cho em.」"
# monologue
# JP: ワンスコを手に、日々姫が笑う。
2803 = "Cầm chiếc xẻng trên tay, Hibiki mỉm cười."
# monologue
# JP: 少年のように屈託なく、\nそれゆえ、とても美しく。
2575 = "Vô tư lự như một thiếu niên, và cũng chính vì thế, trông con bé vô cùng xinh đẹp."
# 【日々姫】
# display as 日日姬
# JP: 「二分で九十からでいいですか？」
1825 = "「Bắt đầu với tốc độ chín mươi xẻng trong hai phút được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。まずは圧をあげよう」
1745 = "「Được đấy. Trước tiên hãy tăng áp suất lên nào.」"
# 【日々姫】
# display as 日日姬
# JP: 「\\x%l投炭;#00ffc040;投炭%l;#;！　二分で九十杯！」
1279 = "「\\x%l投炭;#00ffc040;Tiếp than%l;#;! Hai phút chín mươi xẻng!」"
# monologue
# JP: ザクリ、軽快な音を立て、\nワンスコが石炭の山に食い込む。
2468 = "Xoạt, vang lên một âm thanh nhẹ nhàng, chiếc xẻng xúc sâu vào đống than."
# monologue
# JP: パカンと焚き口の扉が開き、\n石炭は、すぐに\\x%l火床;#00ffc040;火床%l;#;へと撒き散らされる。
2891 = "Cạch một tiếng, cửa buồng đốt mở ra, than lập tức được rải đều vào \\x%l火床;#00ffc040;buồng lửa%l;#;."
# monologue
# JP: （そうだ、まずは圧をあげるところから。\nひとつひとつを重ねればいい）
3088 = "（Đúng vậy, trước tiên là bắt đầu từ việc tăng áp suất. Cứ làm từng việc từng việc một là được）"
# monologue
# JP: 終着駅に、一気に到達などは出来ない。\n圧を満たして動き出し、\\x%l客車;#00ffc040;客車%l;#;と繋がり、三角線。
2902 = "Không thể nào một mạch chạm tới ga cuối được. Tăng đủ áp suất rồi khởi hành, nối với \\x%l客車;#00ffc040;toa hành khách%l;#;, sau đó là đường tam giác."
# monologue
# JP: それから御一夜に入線し、おそらくそのまま、\nあの乗客を乗せて引くことともなるのだろう。
2888 = "Sau đó tiến vào ga Ohimitera, và có lẽ cứ thế, kéo theo những hành khách kia nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l空気圧縮機;#00ffc040;空気圧縮機%l;#;良し！　ブレーキテスト――良しっ！」
1283 = "「\\x%l空気圧縮機;#00ffc040;Máy nén khí%l;#; tốt! Kiểm tra phanh――tốt!」"
# 【日々姫】
# display as 日日姬
# JP: 「水位十分！　蒸気圧良し！」
2005 = "「Mực nước đủ! Áp suất hơi nước tốt!」"
# monologue
# JP: だが、上手くいく。\n全てが、必ず。
2391 = "Nhưng, sẽ suôn sẻ thôi. Tất cả mọi chuyện, nhất định."
# monologue
# JP: 一番苦しいところを僕は――\n日々姫と共に、もう越えたのだ。
2841 = "Phần gian nan nhất, tôi―― cùng với Hibiki, đã vượt qua rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lバイパス弁;#00ffc040;バイパス弁%l;#;開け、シリンダー排水弁開け」
1919 = "「Mở \\x%lバイパス弁;#00ffc040;van bypass%l;#;, mở van xả nước xi-lanh.」"
# 【日々姫】
# display as 日日姬
# JP: 「ブロア[とめべん,1]止弁、閉めます！」
2175 = "「Đóng van chặn thiết bị thổi gió!」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l入換信号;#00ffc040;入換信号%l;#;良し！　\\x%l自弁;#00ffc040;自弁%l;#;、\\x%l単弁;#00ffc040;単弁%l;#;、位置、『運転！』」
1273 = "「\\x%l入換信号;#00ffc040;Tín hiệu dồn toa%l;#; tốt! \\x%l自弁;#00ffc040;Van hãm tự động%l;#;, \\x%l単弁;#00ffc040;van hãm đơn%l;#;, vị trí, 『Chạy tàu!』」"
# monologue
# JP: 一瞬、日々姫を振り返り、目と目をあわせて頷き合う。\nそのまま、\\x%l逆転機;#00ffc040;逆転機%l;#;を前進に！
2688 = "Quay lại nhìn Hibiki một thoáng, chúng tôi nhìn nhau và gật đầu. Cứ thế, gạt \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; về phía trước!"
# 【双鉄】
# display as 雙鐵＆日日姬
# JP: 「出発！　進行っ！」
1636 = "「Xuất phát! Tiến lên!」"
# monologue
# JP: ゆっくり、僕らは走りだす。
2673 = "Chầm chậm, chúng tôi bắt đầu chạy."
# monologue
# JP: そうして二人で――\n僕と日々姫と二人の力で、御一夜の夜を駆け抜けよう。
2609 = "Và rồi hai chúng tôi―― bằng sức mạnh của cả hai, tôi và Hibiki sẽ cùng nhau băng qua màn đêm của Ohimitera."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1290 = "「............」"
# monologue
# JP: 右田日々姫。\nその五文字。
2511 = "Migita Hibiki. Năm chữ đó."
# monologue
# JP: 書き間違えるはずも無いのに、\n何度も確認してしまう。
2444 = "Không thể nào viết sai được, nhưng tôi vẫn kiểm tra đi kiểm tra lại nhiều lần."
# 【双鉄】
# display as 雙鐵
# JP: 「よし」
1773 = "「Tốt rồi.」"
# monologue
# JP: 二つに折って、投票箱へ。\nトッと、やけに軽い音がする。
2698 = "Gấp đôi lại, bỏ vào hòm phiếu. Bịch, một âm thanh vang lên nghe thật nhẹ bẫng."
# monologue
# JP: ……同時に、僕の両肩も、\n一気に軽くなったみたいだ。
1254 = "......Đồng thời, đôi vai của tôi, cũng như nhẹ đi hẳn."
# monologue
# JP: 投票を終えて外へと出れば、\nすぐさま日々姫の姿を捉える。
2945 = "Vừa bỏ phiếu xong bước ra ngoài, tôi lập tức bắt gặp bóng dáng Hibiki."
# monologue
# JP: まぶしく輝く夏の陽の下、\n太陽よりも明るい笑顔で、ハチロク達と話してる。
2540 = "Dưới ánh nắng chói chang của mùa hè, con bé đang nói chuyện với nhóm Hachiroku bằng nụ cười còn rạng rỡ hơn cả mặt trời."
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、日々姫。待たせたか？」
1794 = "「Xin lỗi nhé, Hibiki. Bắt em phải đợi à?」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん、私も今投票終えたとこ」
2007 = "「Không đâu, em cũng vừa mới bỏ phiếu xong.」"
# 【ふかみ】
# display as 深美＆凪
# JP: 「おおお」
1747 = "「Ồ ồ ồ」"
# monologue
# JP: なんということの無い会話になぜか、\n凪とふかみがどよめき騒ぐ。
3037 = "Chẳng hiểu sao trước cuộc đối thoại hết sức bình thường này, Nagi và Fukami lại xôn xao ầm ĩ."
# 【凪】
# display as 凪
# JP: 「やっぱり、ふかみちゃんの言うとおりみたいばい！」
1992 = "「Quả nhiên là giống hệt như bé Fukami nói nè!」"
# 【ふかみ】
# display as 深美
# JP: 「でしょでしょ！？　なんか、雰囲気違ったんだもん」
1960 = "「Đúng không, đúng không!? Cảm giác, bầu không khí khác hẳn mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1717 = "「啊」" 
# monologue
# JP: 日々姫がぽっと赤くなる。\n凪がなにかを言いかけて、慌てたふかみに止められる。
2810 = "Mặt Hibiki bỗng đỏ bừng. Nagi định nói gì đó thì bị Fukami cuống cuồng ngăn lại."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1705 = "「Hửm.」"
# monologue
# JP: わけがわからん。
2595 = "Chẳng hiểu chuyện gì đang xảy ra."
# monologue
# JP: 困ってハチロクとれいなを見れば、\nふたりそろって、羨ましげな上目遣いで僕を見返す。
2669 = "Bối rối nhìn sang Hachiroku và Reina, cả hai cùng đồng loạt ngước mắt nhìn tôi với vẻ ghen tị."
# 【れいな】
# display as 玲奈
# JP: 「はぅう～いいですねぇ。\nれいな、すっごくうらやましいですぅ」
1689 = "「Haa~ Thích quá đi. Reina, vô cùng ghen tị luôn đó ạ~」"
# 【ハチロク】
# display as 八六
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;には縁の無いことではありましょうが――\nそうですね、いささか、憧れるものはあります」
2180 = "「Tuy là chuyện không có duyên với \\x%lレイルロオド;#00ffc040;Railord%l;#; chúng em―― Nhưng đúng là, có chút gì đó đáng để ngưỡng mộ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1717 = "「啊」" 
# monologue
# JP: ホっとする。\nこちらの話ならば僕にも、理解可能だ。
2691 = "Tôi thở phào nhẹ nhõm. Nếu là chuyện này thì tôi cũng có thể hiểu được."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに今は、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に投票権は無いものな。\nが、日々姫が市長になればそのあたりも」
2037 = "「Quả thực hiện tại, \\x%lレイルロオド;#00ffc040;Railord%l;#; không có quyền bầu cử. Nhưng, nếu Hibiki trở thành thị trưởng thì chuyện đó cũng có thể...」"
# 【ハチロク】
# display as 八六
# JP: 「ふっ」
1678 = "「Phụt.」"
# monologue
# JP: 失笑か、微笑か、\n咄嗟には判断がつけられない。
2667 = "Là cười trừ, hay là mỉm cười, tôi không thể phán đoán ngay được."
# monologue
# JP: そんな微妙な笑みを浮かべて、\nハチロクはいたわるような声を出す。
2451 = "Nở một nụ cười tinh tế như vậy, Hachiroku cất giọng như thể đang an ủi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様は変わられませんね。良くも悪しくも」
2187 = "「Ngài Soutetsu không hề thay đổi nhỉ. Dù theo hướng tốt hay xấu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1711 = "「唔？」" 
# 【れいな】
# display as 玲奈
# JP: 「いいええ、れいな、すっごく変わったと思いますよぉ？\nだって、お顔がにこにこですもん」
1557 = "「Không đâu, Reina, lại thấy ngài ấy thay đổi rất nhiều đó ạ~? Tại vì, mặt ngài ấy cứ cười tủm tỉm suốt mà.」"
# monologue
# JP: 言われて、自分の顔に触れてみる。
2978 = "Nghe vậy, tôi thử sờ lên mặt mình."
# monologue
# JP: 今まで重ねた努力の結果が、今日のこの日に現れるのだ。\nにこにこするほど、余裕があるとは思えんが……
2398 = "Kết quả của những nỗ lực tích lũy từ trước đến nay, sẽ được thể hiện vào ngày hôm nay. Tôi không nghĩ mình lại thảnh thơi đến mức cười tủm tỉm được nhưng......"
# 【日々姫】
# display as 日日姬
# JP: 「えへへ、兄さんっ」
1694 = "「E he he, anh trai.」"
# monologue
# JP: ――が。日々姫のこの嬉しげな顔。\n僕も恐らく、同じような顔をしているのだろう。
1234 = "――Nhưng. Khuôn mặt vui vẻ này của Hibiki. Có lẽ tôi cũng đang làm vẻ mặt giống hệt vậy."
# 【日々姫】
# display as 日日姬
# JP: 「戻りましょう？　レールショップに。\nねぇねぇとポーレットさんと交代しなきゃ」
1851 = "「Chúng ta về thôi? Về cửa hàng đường sắt. Phải thay ca cho chị hai và chị Paulette nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1967 = "「Ừ nhỉ.」"
# monologue
# JP: 手をつなぐ。
2713 = "Nắm lấy tay nhau."
# monologue
# JP: 日々姫は少し驚いたような顔をして、\nけれどもきゅっと、つないだ手に力をこめてくる。
2797 = "Hibiki lộ vẻ hơi ngạc nhiên, nhưng ngay sau đó, con bé siết chặt lấy bàn tay đang đan vào nhau."
# 【凪】
# display as 凪
# JP: 「やっぱり！　やっぱりばい！」
1995 = "「Quả nhiên! Quả nhiên là vậy mà!」"
# 【ふかみ】
# display as 深美
# JP: 「でしょでしょ！？　でしょおっ！？」
1959 = "「Đúng không, đúng không!? Đúng không hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1717 = "「啊」" 
# monologue
# JP: そういうことか。\nそれで、この子らはテンション高く騒いでいたのか。
2483 = "Ra là vậy. Thảo nào, mấy đứa nhóc này lại phấn khích ầm ĩ lên như thế."
# 【双鉄】
# display as 雙鐵
# JP: 「報告の必要があるとは思っていなかったが――」
2181 = "「Anh không nghĩ là có cần thiết phải báo cáo đâu, nhưng――」"
# monologue
# JP: いった途端に、凪とふかみが跳ね上がる。
2681 = "Vừa nói dứt lời, Nagi và Fukami liền nhảy cẫng lên."
# monologue
# JP: 期待に輝く瞳と瞳に見つめられ――\nだからといって、気の利いたことなど僕には言えん。
2547 = "Bị hai đôi mắt sáng rực sự kỳ vọng nhìn chằm chằm―― Nhưng dù có vậy, tôi cũng chẳng thể nói được câu nào nghe cho lọt tai."
# 【双鉄】
# display as 雙鐵
# JP: 「僕と日々姫は、昨日から恋人同士になった」
1854 = "「Anh và Hibiki, từ hôm qua đã trở thành người yêu của nhau rồi.」"
# monologue
# JP: 我ながら、味も素っ気もない報告。
2722 = "Tự tôi cũng thấy, đây là một lời thông báo thật nhạt nhẽo và khô khan."
# monologue
# JP: けれどふかみは、目をぐるぐるさせ、\n顔から湯気を噴かんばかりに赤くなる。
2429 = "Thế nhưng Fukami, mắt đảo vòng vòng, mặt đỏ bừng như thể sắp phun ra hơi nước."
# 【ふかみ】
# display as 深美
# JP: 「き、[きのう,1]昨夜から！？　昨夜からって――はうう～っ！」
1824 = "「Từ, từ đêm qua sao!? Từ đêm qua nghĩa là――Hauu~!」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！　鼻血でとるばいっ！」
1798 = "「Bé Fukami! Chảy máu mũi rồi kìa!」"
# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！　そういう、そういう意味じゃないからっ！」
1726 = "「Khoan đã! Không phải, không phải ý đó đâu!」"
# monologue
# JP: 慌てたように、日々姫は僕とつないでた手をほどき、\nト、っと小走りで道の先へと離れてしまう。
2799 = "Có vẻ luống cuống, Hibiki buông tay tôi ra, rồi lạch bạch chạy lon ton về phía trước."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、わたし、先行きますっ！」
1703 = "「Anh trai, em, đi trước đây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、ああ」
1722 = "「A, ừ.」"
# monologue
# JP: 日々姫も真っ赤だ。\n走り去っていくその首筋も、ふくらはぎまで赤くなってる。
2793 = "Mặt Hibiki cũng đỏ bừng. Cả phần gáy và bắp chân của con bé đang chạy xa dần kia cũng đỏ ửng lên."
# 【れいな】
# display as 玲奈
# JP: 「あれあれぇ？\n日々姫さん、どうしちゃったんでしょうかぁ？」
1684 = "「Ủa ủa? Chị Hibiki, bị làm sao vậy ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「わからんな」
1841 = "「Anh cũng không biết nữa.」"
# monologue
# JP: フっと、両方から強い鼻息。\nハチロクと凪とに、僕は、鼻で笑われたらしい。
2935 = "Phụt, tiếng thở hắt ra mạnh mẽ từ hai bên. Có vẻ như tôi vừa bị Hachiroku và Nagi cười khẩy."
# monologue
# JP: ふかみも、そんな顔をしている。\n鼻血を抑えていなければ、鼻息に包囲されてただろう。
2871 = "Fukami cũng đang làm vẻ mặt như vậy. Nếu không phải đang bưng mũi chặn máu, chắc tôi đã bị bao vây bởi tiếng thở hắt ra rồi."
# 【凪】
# display as 凪
# JP: 「日々ねーちゃん、こらぁ苦労しそうばい」
1939 = "「Chị Hibiki, kiểu này chắc là vất vả lắm đây.」"
# 【ふかみ】
# display as 深美
# JP: 「で、でも。日々姫さん。そういう苦労。\nむしろ喜びそう。かも、結構好きそう。教えるの。とか」
1566 = "「Nhưng, nhưng mà. Chị Hibiki. Có khi lại thích sự vất vả đó. Hay đúng hơn là có vẻ sẽ rất vui. Kiểu như, được dạy bảo ấy. Chẳng hạn.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃぁ～ん、教えるって～」
1800 = "「Bé Fukami ơi~, dạy bảo là sao vậy~」"
# 【ふかみ】
# display as 深美
# JP: 「はうあっ！？\nその、別に、そういう意味じゃなくって」
2084 = "「Hau á!? Cái đó, không phải, ý em không phải vậy đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、ふかみも日々姫と同じことを言うのだな。\n『そういう意味』とは」
1830 = "「Gì vậy, Fukami cũng nói giống Hibiki nhỉ. 『Ý đó』 là ý gì?」"
# 【れいな】
# display as 玲奈
# JP: 「どういう意味ですぅ？」
1954 = "「Là ý gì vậy ạ~?」"
# 【ふかみ】
# display as 深美
# JP: 「あっ――あのッ――あうぅうう～っ！」
1714 = "「A――Cái đó――Auuuu~!」"
# monologue
# JP: ふかみが逃げ出し、\n凪がすぐさまそれに追いつき、ふたりそろって走ってく。
2879 = "Fukami bỏ chạy, Nagi lập tức đuổi theo, cả hai cùng chạy đi mất."
# monologue
# JP: 取り残されるは、僕とハチロクとれいなと。\nそれから頭上、高くを飛んでるナビだけだ。
3017 = "Những người bị bỏ lại là tôi, Hachiroku và Reina. Và cả Navi đang bay tít trên cao nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「空からいくか？\nお前たちふたりとならば、同乗できよう」
1852 = "「Bay trên trời về nhé? Nếu là hai em thì có thể đi cùng nhau đấy.」"
# monologue
# JP: れいなが顔を輝かせ、\nけれどもぶん、と大きく首を横に振る。
2895 = "Gương mặt Reina bừng sáng, nhưng con bé lại lắc đầu nguầy nguậy."
# monologue
# JP: それを目にしてハチロクは少し微笑んで、\nそうして静かに、一歩を踏み出す。
2906 = "Thấy vậy, Hachiroku khẽ mỉm cười, rồi nhẹ nhàng bước tới một bước."
# 【ハチロク】
# display as 八六
# JP: 「いいえ、このまま」
1569 = "「Không, cứ thế này đi ạ.」"
# monologue
# JP: 聞いた瞬間、ハっとなる。
2960 = "Khoảnh khắc nghe thấy điều đó, tôi chợt sững sờ."
# monologue
# JP: いつの間にハチロクは、\nこんなにもやわらかな声を出すようになったのだろう？
2453 = "Từ lúc nào mà Hachiroku, lại có thể cất lên một giọng nói dịu dàng đến thế này nhỉ?"
# 【ハチロク】
# display as 八六
# JP: 「この歩幅のまま、ゆるりと歩いてまいりましょう」
1806 = "「Cứ giữ nguyên nhịp bước này, chúng ta hãy cùng thong thả bước đi nào.」"
# monologue
# JP: ……時間が、すぎる。\n……まさしくゆるゆる、かたつむりよりなお遅く。
1260 = "......Thời gian, trôi qua. ......Thật sự rất thong thả, còn chậm hơn cả ốc sên nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
# 1705 = "「唔」" 
# monologue
# JP: ちくちくと、秒針が神経に刺さってくる。
2925 = "Từng tiếng tích tắc của kim giây như đâm vào dây thần kinh."
# monologue
# JP: 昼までの気楽さは消え失せて、\n今は重厚な緊張感が、レールショップを支配している。
2395 = "Sự thoải mái cho đến tận trưa đã tan biến, hiện tại một bầu không khí căng thẳng nặng nề đang bao trùm cửa hàng đường sắt."
# 【ＴＶアナウンサー】
# display as 電視主持人
# JP: 「現在、開票率は64％です」
2039 = "「Hiện tại, tỷ lệ kiểm phiếu là 64%.」"
# monologue
# JP: ＴＶ画面の棒グラフは、\n二本だけが飛びぬけて長い。
3041 = "Trên biểu đồ cột trên màn hình TV, chỉ có hai cột là dài vượt trội."
# monologue
# JP: 右田日々姫と宝生稀咲、\n票差は、わずか40票。まだ当確は打たれない。
2513 = "Migita Hibiki và Houshou Kisaki, khoảng cách chỉ vỏn vẹn 40 phiếu. Vẫn chưa thể xác định người trúng cử."
# 【ハチロク】
# display as 八六
# JP: 「……試験走行に成功しても、\nこれほどの接戦になりますか」
1298 = "「......Ngay cả khi đã chạy thử nghiệm thành công, mà vẫn sát nút đến mức này sao.」"
# 【真闇】
# display as 真闇
# JP: 「試験走行の成功に歓喜した層は、\nもともとひーちゃんの支持層やけんねぇ」
2020 = "「Những người vui mừng trước sự thành công của buổi chạy thử, vốn dĩ đã là những người ủng hộ bé Hi rồi mà.」"
# 【ハチロク】
# display as 八六
# JP: 「それはそうでしょうが――」
2182 = "「Dù là vậy đi chăng nữa――」"
# 【ポーレット】
# display as 波萊特
# JP: 「組織が固いんです。銀行系は。\nその上、今日はお天気、最悪でしたから」
2169 = "「Hệ thống ngân hàng có tổ chức rất vững chắc. Hơn nữa, thời tiết hôm nay lại vô cùng tồi tệ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「天気が最悪？\nいや、爽快に晴れ、暑くもなりすぎなかったろう」
1768 = "「Thời tiết tồi tệ? Không đâu, trời nắng đẹp sảng khoái, lại không quá nóng mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それが、わたしたちの選挙には最悪なんです」
1672 = "「Chính điều đó mới là tồi tệ nhất cho cuộc bầu cử của chúng ta.」"
# 【真闇】
# display as 真闇
# JP: 「今日のお天気、\n『絶好の行楽日和』いうやつやけんねぇ」
1589 = "「Thời tiết hôm nay, chính là kiểu 『thời tiết tuyệt hảo để đi chơi』 đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1718 = "「A!」"
# monologue
# JP: その一言で理解できた。\nなるほど、つまり――
2580 = "Chỉ một câu đó thôi là tôi đã hiểu ra. Ra là vậy, tóm lại là――"
# 【双鉄】
# display as 雙鐵
# JP: 「風を吹かせるような浮動票。その原動力たる、\n特定の支持者を持たない層の投票者は――」
2143 = "「Những lá phiếu dao động có thể tạo ra luồng gió mới. Nguồn động lực đó, những cử tri không có người ủng hộ nhất định――」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうです。お天気良すぎると、投票じゃなく、\nレジャーにいってしまうんです」
2008 = "「Đúng vậy. Nếu thời tiết quá đẹp, họ sẽ không đi bỏ phiếu, mà sẽ đi chơi mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
# 1649 = "「原來如此」" 
# 【真闇】
# display as 真闇
# JP: 「対して、動員をかけられてる層は確実に投票するけんね。\n低投票率は、組織が強い候補の有利と働くとよ」
2071 = "「Ngược lại, những người bị huy động thì chắc chắn sẽ đi bỏ phiếu. Tỷ lệ bỏ phiếu thấp sẽ có lợi cho ứng cử viên có tổ chức mạnh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、太陽が風を止め、\n稀咲の組織は、その実力をフルに発揮したわけか」
1577 = "「Nói cách khác, mặt trời đã cản gió, và tổ chức của Kisaki đã phát huy tối đa thực lực của mình sao.」"
# monologue
# JP: ……不意に、重い沈黙が垂れ込める。\n手応えはある。勝てると思う。だけれど、不安は拭えない。
1255 = "......Bất chợt, một sự im lặng nặng nề bao trùm. Có cảm giác khả quan. Tôi nghĩ là sẽ thắng. Nhưng, vẫn không thể xua tan được sự bất an."
# monologue
# JP: できることを全部やっても、結果をコントロールできない。\n投票とは、選挙とは、これほどまでにままならぬ――
2606 = "Dù đã làm tất cả những gì có thể, cũng không thể kiểm soát được kết quả. Bỏ phiếu, bầu cử, lại là những thứ không thể lường trước được đến thế này――"
# 【ＴＶアナウンサー】
# display as 電視主持人
# JP: 「開票率、81％になりました」
2040 = "「Tỷ lệ kiểm phiếu, đã lên đến 81%.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2193 = "「！」" 
# monologue
# JP: 数字が、大きく変化する。\n日々姫の票がグンと伸び、稀咲との差を三ケタにする！
2754 = "Những con số thay đổi một cách chóng mặt. Số phiếu của Hibiki tăng vọt, tạo ra khoảng cách ba chữ số với Kisaki!"
# 【凪】
# display as 凪
# JP: 「急に勢いがでてきたばいっ！」
1644 = "「Tự nhiên đà tăng vọt lên kìa!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ああ」
1738 = "「Đúng vậy.」"
# monologue
# JP: ポーレットの表情がみるみるうちにゆるんでく。\n声から、緊張が抜け落ちていく。
2862 = "Biểu cảm của Paulette nhanh chóng giãn ra. Sự căng thẳng cũng biến mất khỏi giọng nói của cô ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「開票結果は、票数が少ないところから集計がくるの。\nつまり、御一夜の中心部以外の場所から」
2174 = "「Kết quả kiểm phiếu sẽ được tổng hợp từ những nơi có ít phiếu bầu trước. Nói cách khác, là từ những khu vực ngoài trung tâm Ohimitera.」"
# 【凪】
# display as 凪
# JP: 「それって！！\nつまり――どういうことばい？」
2165 = "「Thế nghĩa là!! Tóm lại――là sao vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「山の方とかが最初に開票されて、\nここらあたりは最後になるってことだよ、凪ちゃん！」
1576 = "「Nghĩa là khu vực trên núi sẽ được kiểm phiếu trước, còn quanh đây sẽ là cuối cùng đó, bé Nagi!」"
# monologue
# JP: ふかみの声が弾んでる。\n理解がぐんぐん、レールショップに広がっている！
2877 = "Giọng Fukami tràn đầy hứng khởi. Sự thấu hiểu nhanh chóng lan tỏa khắp cửa hàng đường sắt!"
# 【凪】
# display as 凪
# JP: 「ゆーことは……ゆーことは！？」
2141 = "「Nghĩa là...... nghĩa là!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
1706 = "「Ừm!」"
# monologue
# JP: 山に暮らし、都市部までめったに出てこれない方達までに、\n僕らの選挙活動は、残念ながら浸透できなかった。
2630 = "Rất tiếc, chiến dịch tranh cử của chúng tôi đã không thể tiếp cận được những người sống trên núi, những người hiếm khi xuống trung tâm thành phố."
# monologue
# JP: そうした方たちへの影響力は、\n稀咲の――銀行の方が圧倒的に上だろう。が！
2601 = "Sức ảnh hưởng đối với những người đó, chắc chắn Kisaki――hay đúng hơn là ngân hàng, áp đảo hơn hẳn. Nhưng!"
# 【ハチロク】
# display as 八六
# JP: 「苦戦必至の地域でも日々姫は優位に戦い、\n開票が、主戦場とした都市部に移行するのでしたら――」
1759 = "「Ngay cả ở những khu vực chắc chắn sẽ gặp khó khăn mà Hibiki vẫn chiếm ưu thế, thì khi việc kiểm phiếu chuyển sang khu vực trung tâm thành phố, chiến trường chính của chúng ta――」"
# 【れいな】
# display as 玲奈
# JP: 「やったぁ！　なら、日々姫さん、\nこれからどんどん、もっと有利になるんですねぇ！」
1770 = "「Tuyệt quá! Vậy thì, chị Hibiki, từ giờ sẽ ngày càng chiếm ưu thế hơn nữa nhỉ~!」"
# monologue
# JP: 都市部の中心、鍛冶屋町での日々姫支持は固まっている。\nつまり、僕らは！
2615 = "Sự ủng hộ dành cho Hibiki ở khu vực Kajiya, trung tâm thành phố, rất vững chắc. Nói cách khác, chúng ta!"
# 【ＴＶアナウンサー】
# display as 電視主持人
# JP: 「でました、当確。\n宝生稀咲候補、当確です」
1632 = "「Đã có kết quả chắc chắn. Ứng cử viên Houshou Kisaki, đã trúng cử.」"
# 【ふかみ】
# display as 深美
# JP: 「ええっ！？」
1695 = "「Hả!?」"
# 【凪】
# display as 凪
# JP: 「なんでばい！　画面と全然ちがってるばいっ！」
2019 = "「Sao lại thế! Hoàn toàn khác với trên màn hình mà!」"
# monologue
# JP: 画面の中でも、ざわめきが起こる。\nアナウンサーも、ハっと気付いた表情になる。
3042 = "Ngay cả trên màn hình cũng xảy ra sự xôn xao. Người dẫn chương trình cũng lộ vẻ mặt giật mình nhận ra."
# 【ＴＶアナウンサー】
# display as 電視主持人
# JP: 「失礼しました。当確は右田候補です。\n右田日々姫候補、当選確実です」
2190 = "「Xin lỗi quý vị. Người trúng cử là ứng cử viên Migita. Ứng cử viên Migita Hibiki, đã chắc chắn trúng cử.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！」
1941 = "「Hibiki!」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃっ！！！」
2177 = "「Anh hai!!!」"
# monologue
# JP: 黙りこくって縮こまってた日々姫が一気に！\n一気に弾ける！！
2371 = "Hibiki, nãy giờ vẫn im lặng thu mình lại, bất ngờ! Bất ngờ bùng nổ!!"
# monologue
# JP: 僕の胸へと飛び込んできて、\n全身であまえ、すがりついてくるっ！！
2562 = "Con bé lao vào ngực tôi, dùng toàn thân để làm nũng, bám chặt lấy tôi!!"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、私――私――私っ！！」
2179 = "「Anh hai, em――em――em!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「よくやったぞ日々姫！　当選だ！\nお前の勝ちだ！　勝ったのだ！！」
1609 = "「Làm tốt lắm Hibiki! Trúng cử rồi! Là chiến thắng của em! Chúng ta thắng rồi!!」"
# 【日々姫】
# display as 日日姬
# JP: 「ありがとうございます！　兄さんっ――\nけどっ」
2104 = "「Cảm ơn anh! Anh trai―― Nhưng mà」"
# monologue
# JP: くっついていた体を離し、\n日々姫がみなへと振り返る。
2548 = "Tách khỏi người tôi, Hibiki quay lại nhìn mọi người."
# 【日々姫】
# display as 日日姬
# JP: 「私の、じゃなく。みんなの――みんなの勝利です！」
1560 = "「Không phải của riêng em. Mà là của mọi người――chiến thắng của tất cả mọi người!」"
# 【ポーレット】
# display as 波萊特
# JP: 「おめでとう！」
1837 = "「Chúc mừng em!」"
# 【真闇】
# display as 真闇
# JP: 「よーがんばったね、ひーちゃん」
1819 = "「Cố gắng lắm rồi, bé Hi.」"
# 【ハチロク】
# display as 八六
# JP: 「お見事です。日々姫、双鉄様」
1602 = "「Tuyệt vời lắm. Hibiki, ngài Soutetsu.」"
# 【れいな】
# display as 玲奈
# JP: 「ばんざーい！　ばんざーい！　ばんざーい！　ですぅ」
2076 = "「Muôn năm! Muôn năm! Muôn năm! Ạ~」"
# 【凪】
# display as 凪
# JP: 「だるま、だるまに目ぇ入れるばいっ！」
1685 = "「Daruma, phải vẽ mắt cho búp bê Daruma thôi!」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんっ！？　それやるの日々姫さんだよぉっ！」
1796 = "「Bé Nagi!? Người làm việc đó là chị Hibiki mà!」"
# 【稀咲】
# display as ？？？
# JP: 「ここは賑やかで楽しいね」
1603 = "「Ở đây náo nhiệt và vui vẻ thật đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩っ！？」
2056 = "「Tiền bối Kisaki!?」"
# monologue
# JP: 人ごみの向こうの声だけを聞き、\n日々姫は走りだしている。
2631 = "Chỉ nghe thấy giọng nói vang lên từ phía sau đám đông, Hibiki đã chạy ùa ra."
# monologue
# JP: まさか稀咲がこのタイミングで――\nその考えは、すぐに視界にくつがえされる。
2931 = "Không lẽ Kisaki lại xuất hiện vào lúc này―― Suy nghĩ đó ngay lập tức bị lật đổ bởi những gì tôi nhìn thấy."
# 【ポーレット】
# display as 波萊特
# JP: 「わ、本当に稀咲さん」
1687 = "「Oa, đúng là Kisaki thật này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なぜ、今ここに？　自分の選挙事務所は」
2018 = "「Sao cô lại ở đây lúc này? Văn phòng tranh cử của cô thì sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「当選できないとわかったからね。\n御通夜みたいな状況さ」
1751 = "「Vì tôi biết mình không thể trúng cử rồi mà. Tình hình bên đó giờ như đám tang vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1717 = "「啊」" 
# monologue
# JP: そうだった。\n銀行の情報収集能力は、僕らをはるかに凌駕している。
2833 = "Đúng vậy. Khả năng thu thập thông tin của ngân hàng vượt xa chúng tôi rất nhiều."
# monologue
# JP: もっと早くの段階で、\n稀咲は、稀咲の戦いが終わったことを知ったのだろう。
2536 = "Có lẽ từ giai đoạn sớm hơn, Kisaki đã biết rằng cuộc chiến của cô ấy đã kết thúc."
# 【稀咲】
# display as 稀咲
# JP: 「お悔やみの言葉を聞いていたって何にもならない。\nそれよりは、次善の策をとるべきであると思ってね」
1630 = "「Cứ nghe những lời chia buồn cũng chẳng giải quyết được gì. Thay vì thế, tôi nghĩ mình nên thực hiện kế sách dự phòng tốt nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「次善の策？」
1998 = "「Kế sách dự phòng tốt nhất?」"
# 【稀咲】
# display as 稀咲
# JP: 「当選おめでとう。日々姫」
1836 = "「Chúc mừng em trúng cử. Hibiki.」"
# monologue
# JP: 僕の問いには答えないまま、\n稀咲は日々姫へと手を伸ばす。
2564 = "Không trả lời câu hỏi của tôi, Kisaki vươn tay về phía Hibiki."
# monologue
# JP: 固く、握手。\n日々姫の顔が、みるみる安堵に緩んでいく。
2448 = "Nắm chặt tay. Khuôn mặt Hibiki nhanh chóng giãn ra trong sự an tâm."
# 【稀咲】
# display as 稀咲
# JP: 「それでね、日々姫。\nボクは、今日は新市長への売り込みに来たんだよ」
1929 = "「Vậy nên, Hibiki. Hôm nay tôi đến đây để tiếp thị với tân thị trưởng đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「売り込み、ですか？\nでも、\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の誘致なら」
1924 = "「Tiếp thị, sao ạ? Nhưng nếu là chuyện thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; thì...」"
# 【稀咲】
# display as 稀咲
# JP: 「それは、撤回を覚悟している。\n売り込みたいのは、全く別の――ボク自身さ」
2147 = "「Chuyện đó, tôi đã chuẩn bị tinh thần rút lui rồi. Thứ tôi muốn tiếp thị, là một thứ hoàn toàn khác――chính bản thân tôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ボクって……え？　えと！　稀咲先輩っ！？」
1889 = "「Bản thân chị...... Hả? À ừm! Tiền bối Kisaki!?」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ」
# 1737 = "「嗯」" 
# monologue
# JP: まだつないでいた手をほどき、\n稀咲は、日々姫に問いかける。
2933 = "Buông bàn tay vẫn đang nắm chặt ra, Kisaki hỏi Hibiki."
# 【稀咲】
# display as 稀咲
# JP: 「日々姫に、ボクを使ってほしい。\n\\x%l客車;#00ffc040;客車%l;#;改修プロジェクトにでも、その他どんな場面にでも」
1868 = "「Tôi muốn Hibiki sử dụng tôi. Cho dự án cải tạo \\x%l客車;#00ffc040;toa hành khách%l;#;, hay bất cứ tình huống nào khác.」"
# 【日々姫】
# display as 日日姬
# JP: 「使います！　喜んで使わせてもらいます！\n大歓迎です、稀咲先輩っ！！」
1874 = "「Em sẽ dùng! Rất sẵn lòng ạ! Cực kỳ hoan nghênh, tiền bối Kisaki!!」"
# 【稀咲】
# display as 稀咲
# JP: 「おっと」
1691 = "「Ôi chà.」"
# monologue
# JP: 抱きついてきた日々姫を受けとめ、\n稀咲は短い息を吐く。
2561 = "Đỡ lấy Hibiki vừa nhào tới ôm chầm lấy mình, Kisaki khẽ thở hắt ra."
# monologue
# JP: とても短い――安堵の息だ。\n稀咲も緊張していたのだろう。
2627 = "Một tiếng thở dài rất ngắn――sự thở phào nhẹ nhõm. Có lẽ Kisaki cũng đã rất căng thẳng."
# monologue
# JP: （なるほど……これが日々姫の未来か）
3080 = "（Ra là vậy...... Đây chính là tương lai của Hibiki sao）"
# monologue
# JP: メインビジュアルの笑顔の中に、\n稀咲ももちろん含まれていた。
2533 = "Trong những nụ cười của hình ảnh chủ đạo, tất nhiên là có cả Kisaki."
# monologue
# JP: 御一夜の、すべての人達で――\nそれが、日々姫の描いた未来だ。
2637 = "Cùng với tất cả mọi người ở Ohimitera―― Đó chính là tương lai mà Hibiki đã vẽ nên."
# monologue
# JP: （とはいえ、だ）
3075 = "（Tuy nhiên）"
# 【稀咲】
# display as 稀咲
# JP: 「おっと、これは双鉄。おめでとう」
1693 = "「Ôi chà, Soutetsu đấy à. Chúc mừng nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。\nそして――これから、どうかよろしく頼む」
2103 = "「Cảm ơn. Và――từ giờ trở đi, mong được cô giúp đỡ nhiều.」"
# 【稀咲】
# display as 稀咲
# JP: 「こちらこそ」
1842 = "「Tôi cũng vậy.」"
# monologue
# JP: 稀咲に握手と挨拶を。
2724 = "Bắt tay và chào hỏi Kisaki."
# monologue
# JP: 求めつつ、日々姫と稀咲を引き離し、\n僕は体をすべりこませる。
2756 = "Vừa làm vậy, tôi vừa tách Hibiki và Kisaki ra, rồi lách người vào giữa."
# monologue
# JP: （これが、日々姫の描いた未来で、\n僕も望んでいる未来図だ）
3091 = "（Đây là tương lai mà Hibiki đã vẽ nên, và cũng là bức tranh tương lai mà tôi mong muốn）"
# monologue
# JP: 日々姫の隣に、いつでも僕が。
2709 = "Bên cạnh Hibiki, lúc nào cũng sẽ có tôi."
# monologue
# JP: そこは誰にも、もう譲らない。
3010 = "Vị trí đó, tôi sẽ không nhường cho bất cứ ai nữa."
