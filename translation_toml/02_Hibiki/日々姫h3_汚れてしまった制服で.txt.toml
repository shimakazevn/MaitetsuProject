# 日々姫h3_汚れてしまった制服で.txt 
[info]

[characters]
1372 = "双鉄H"
1518 = "日々姫"

[character_subs]
1712 = "雙鐵"
1557 = "日日姬"

[script]
# lines: 355 
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫？　入ってもいいか？」
1199 = "「日日姬，我可以進去了嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。お待たせ！　もう良かよ」
1130 = "「嗯，久等了！已經可以了」" 

# monologue
# JP: (かちゃっ）
37 = "(開門）" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ね？　見て見て！」
1258 = "「阿哥，快看快看！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「制服だな。さっきも見たぞ。\nというか、着替えるといってなかったか？」
991 = "「你穿的是校服啊，我剛才也看到了。你不是說要換衣服嗎？」" 

# monologue
# JP: 登園から日々姫が帰ってきて。
1572 = "日日姬從學校回到了家裡。" 

# monologue
# JP: 部屋に来て、と呼ばれてくれば、\n「着替えるけん」と、廊下で待たされていたのだが――
1393 = "她叫我來她房間這邊，然後說要換衣服，讓我在走廊裡等著。" 

# 【日々姫】
# display as 日日姬
# JP: 「やけん、着替えとるでしょお」
1203 = "「是啊，我換衣服了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「着替えた？　どこをだ？？」
1175 = "「換衣服了？哪裡換了？？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ふっふーん」
1136 = "「嘿嘿」" 

# monologue
# JP: いたずらっぽい日々姫の目。
1566 = "日日姬向我投來了狡黠的目光。" 

# monologue
# JP: 着替えたところを当ててみろ、と、\n無言のままに挑戦してくる。
1398 = "她的意思是讓我猜猜哪裡換了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「“着替え”だよな？\n髪留めやアクセサリーの類ではなく」
988 = "「你是換了“衣服”了吧？不是換了髮夾之類的小飾品吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　ちゃあんと、お洋服のお着替え」
1222 = "「當然了！我換的是衣服」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ううむ――」
1107 = "「嗯――」" 

# monologue
# JP: わからん。制服は制服のままだし……\n着替えたとしたらソックスあたりか？　ああ、そうか。
1632 = "看不出來。她依然穿的是校服啊……換的是襪子之類的嗎？原來如此。" 

# 【双鉄H】
# display as 雙鐵
# JP: （スンっ、スンッ）
1856 = "（用力聞）" 

# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！？　にぃに、何ばしよっと！？」
1102 = "「啊！？阿哥，你在幹什麼！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「匂いを嗅いでいる。着替えたものなら、\nそこだけ匂いがしないはずだ」
1161 = "「我在聞味道。如果換了衣服，那上面就應該沒有沾著味道」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　そう？　そう、かなぁ……\n匂いって、体からするような」
1059 = "「哎？啊？是嗎……味道不是身上散發出來的嗎」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「気が散る。少しだけ黙っていてくれ」
1176 = "「搞得我分心了，你先別說話」" 

# 【日々姫】
# display as 日日姬
# JP: 「う、うん」
1063 = "「哦，嗯」" 

# monologue
# JP: （スン、スン）
# 1856 = "（用力聞）" 

# monologue
# JP: ブラウスは違う。\n匂いもするし汗で湿って肌がわずかに透けている。
1335 = "不是襯衫。因為上面沾著味道，汗打濕的地方還能透過看到一點肌膚。" 

# monologue
# JP: スカーフは小物に含まれようし、\nならば、スカートはどうだろう？
1713 = "領巾也不算衣服吧，那裙子呢？" 

# monologue
# JP: （スンっ――スン――っ！）
1855 = "（用力聞！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、スカートだ。\n防虫剤の匂いがする」
1104 = "「啊，是裙子。上面有防蟲劑的味道」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、そっか防虫剤。すごいね、にぃにぃ大正解！\n私、スカートばお着替えしたとよ」
1065 = "「哦，防蟲劑啊。阿哥好厲害，答對了！我換了裙子」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「何故、スカートだけを？」
989 = "「你為什麼換了裙子啊？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ここ見て、ここ」
1226 = "「看這裡、看這裡」" 

# monologue
# JP: （ひょい）
1869 = "（輕轉）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「どこだ？」
1066 = "「哪裡啊？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ここ！　ほら、スカートの一番前側の下」
1244 = "「這裡！看，裙子最前面的下方」" 

# monologue
# JP: （つ――つ――）
1835 = "（掀起）" 

# monologue
# JP: 見やすいようにと、日々姫がスカートを持ち上げてくれる。\n前側の、下――と、ああ、これか？
1574 = "日日姬把裙子掀了起來，讓我看得更清楚。前面的下方是――哦，這個啊。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「汚れがこびりついているな。\n緑色の……これは、絵の具か？」
1243 = "「這裡沾著一片汙漬啊。綠色……這是顏料嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん、[ゆさい,1]油彩のテルベルト。\nめったに使わんけん、キャップが固まっちゃってて」
1135 = "「嗯，這是油彩的灰綠色。因為很少用，當時蓋子很緊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ほう」
1062 = "「哦」" 

# 【日々姫】
# display as 日日姬
# JP: 「むにゅってなって慌ててコスって、このありさま。\n[はくりざい,2]剥離剤使うと布も変色するっていうけん――やけん」
1229 = "「結果一下就擠出來了，我再一擦就這樣了。用剝離劑的話布料也會掉色――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1120 = "「嗯」" 

# monologue
# JP: それで、タンスに仕舞いこんでた。\nそれにわざわざ、着替えてくれた。
1503 = "所以她才把這件收進了衣櫃。然而她專門換上了這件。" 

# monologue
# JP: それは、つまりは――
1339 = "也就是說――" 

# 【日々姫】
# display as 日日姬
# JP: 「これ、にぃにぃと居るとき専用の……\nにぃにぃにだけ、見せるスカートにしようと、思って」
1164 = "「我想把這件當成跟阿哥在一起的時候……用來專門給阿哥看的裙子」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、もっと良く見せてくれ」
1247 = "「那就讓我好好看看吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
1262 = "「！」" 

# monologue
# JP: 少し離れてまじまじ見れば、\n日々姫は僕の視線に気づき、両肩をぴくりと震わせる。
1491 = "我盯著日日姬看，她感受到了我的視線，雙肩抖了一下。" 

# monologue
# JP: ……だが、スカートは降ろさない。\n見えているのをわかった上で、僕の視線を受け止めている。
776 = "……但是她依然掀著裙子。她知道我能看到裡面，這是在接受著我目光的洗禮。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「可愛いパンツだな。\n日々姫に良く似あってる」
1240 = "「這內褲真可愛。日日姬穿起來真漂亮」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……うん。ありがと」
1089 = "「啊……嗯。謝謝」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「似合ってるが……少し、汚れてしまっているな」
1005 = "「可是……上面好像弄髒了一塊啊」" 

# monologue
# JP: （くちゅっ）
1868 = "（輕按）" 

# 【日々姫】
# display as 日日姬
# JP: 「あんっ」
1096 = "「啊」" 

# monologue
# JP: 濡れて張り付き形を透かすスジに沿い、\nわずかに指先を押し込むだけで、重く湿った音がする。
1485 = "我用指尖輕輕按了一下肉縫形狀的濕痕，裡面便傳出了水聲。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「パンツを見せているだけで、\nこれほど濡れるものなのか？」
995 = "「光是內褲被看到就已經濕成這樣了嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「見、見られてるからっていうのもあるけど――\nでも、もっと……あの、その前」
1207 = "「有、有被看到的原因，但是……在這之前」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「その前？」
1138 = "「在這之前？」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにが、お鼻……くんくんってして、それで、\nにぃにに、私の、匂い……嗅がれてるって、思ったら」
1255 = "「阿哥……用鼻子……一想到阿哥在……聞我的味道」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ほう」
# 1062 = "「哦」" 

# monologue
# JP: （くいっ）
1865 = "（貼上）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃっんっ！？」
1034 = "「呀！？」" 

# monologue
# JP: 指を外してその変わり、\n鼻先をおまんこのスジに当てて動かす。
1475 = "我把手指移開，轉而用鼻尖貼上肉縫，上下磨蹭。" 

# monologue
# JP: （くいっ――くっ――くんっ）
1840 = "（摩擦――吸氣――）" 

# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　にぃにっ、へ、変態っぽい――かもっ――\nんっ――お鼻で、おまんこ――すりすり、なん、てっ」
1046 = "「呀！？阿哥，這樣有、有點變態――嗯――用鼻子在小穴上――擦來擦去」" 

# monologue
# JP: （すリ――すり――ぐいっ）
1791 = "（上下磨蹭）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ！？　だめっ――ンッ――ぐいって、\nしたら――あっ――匂い、濃くなるっ――」
1036 = "「呀！？不行――嗯――這樣的話――啊――味道――就會更濃了――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「確かにな」
1212 = "「沒錯」" 

# monologue
# JP: 指で触れてたときよりずっと、\n日々姫の蜜の量は増してる。
1625 = "現在日日姬的蜜汁比剛才用手指摸的時候要多得多。" 

# monologue
# JP: 僕の中心を熱くする、\n日々姫の奥から滴る匂いも、どんどん濃密になってくる。
1438 = "從日日姬體內散發出的味道越來越濃密，撩撥得我也興奮起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「た、確かにって――にぃに」
983 = "「什、什麼沒錯啊――阿哥」" 

# monologue
# JP: すん、と小さな音がする。\n日々姫は自分でも、匂いを嗅いでいるのだろうか。
1601 = "日日姬輕輕吸了一下。她也在聞自己的味道。" 

# 【日々姫】
# display as 日日姬
# JP: 「ど……どんな、匂いば……する、と？\nわた――し――私の――おま、ん、こ」
1201 = "「是……是什麼味道啊……？我――我的、小穴那裡」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「どんな、といえば――そうだな」
1231 = "「要說是什麼味道――我想想」" 

# monologue
# JP: （ぐいっ――こしゅっ）
# 1791 = "（上下磨蹭）" 

# 【日々姫】
# display as 日日姬
# JP: 「んんんうっつ」
1126 = "「嗯嗯」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫の体の匂いとは違い、おまんこの匂いは……」
1149 = "「小穴的氣味跟日日姬的體味不一樣……」" 

# monologue
# JP: （ぐいっ――くんっ――すうっ――すうっ）
1831 = "（抵上――吸氣――）" 

# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　鼻をうずめて――ンッ――おまんこ、でっ\n――すぅはぁっ――しちゃっ――やぁんっ！」
1048 = "「呀！？鼻子整個埋了進去――在小穴那裡――吸氣――不行――哎呀！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……おまんこ自体は、そんなに匂わないのだな。\nヨーグルトドリンクのような、かすかに酸っぱい匂いだ」
789 = "「……小穴本身沒什麼味道。有一點優格飲料一樣的酸味」" 

# 【日々姫】
# display as 日日姬
# JP: 「はうっ」
1106 = "「嗚」" 

# monologue
# JP: （むわっ）
1850 = "（氣味蒸騰）" 

# monologue
# JP: おまんこの匂いがわずかに濃くなり、その何倍も、\n甘くどろりとしたような、日々姫の匂いが強くなる。
1413 = "小穴散發的味道稍微濃郁了一些，而日日姬甜甜的體香更是變濃郁了很多倍。" 

# monologue
# JP: 体臭なのか、俗に言われるフェロモンの匂いなのかは\n僕には判別できないが――
1711 = "雖然我也分不清這是體味還是所謂的荷爾蒙的味道――" 

# 【双鉄H】
# display as 雙鐵
# JP: 「混じり合うから、濃くなるのだな。\n日々姫自身の匂いと、おまんこの匂いと、そして――」
1218 = "「混合起來而變濃了啊。其中有日日姬自身的味道、小穴的味道、還有――」" 

# monologue
# JP: （じゅるるるるるっ！）
1796 = "（咕啾）" 

# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！？　アッ――おまんこ――じゅうって！\nパンツの、上、から――ちゅうちゅう――吸われ――ん」
1100 = "「啊！？啊――小穴――被吸到了！隔著內褲――被吸到了――嗯」" 

# monologue
# JP: パンツに滲む日々姫の汁を思う存分すいまくり、\n代わりに僕の唾液を、なすりつけるように染みさせる。
1483 = "我用力吸著日日姬內褲上滲出的蜜汁，把那裡都替換成我的唾液。" 

# monologue
# JP: 薄布越しにもわかるほど、日々姫のおまんこはヒクついて、\n挿れて欲しいと、舌に吸いつきおねだりしてくる。
1708 = "隔著一層布我也能感覺到日日姬的小穴在顫動，還在吸著我的舌頭，就好像在求我快點插進去。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ん――ぷあっ――それから、僕の唾液や、汗や、\n体液の匂いが、全部、混じって」
1111 = "「嗯――呼――這樣的話，我的唾液、汗水，還有體液的味道，也全部混進去了」" 

# 【日々姫】
# display as 日日姬
# JP: 「好き……\n私も、好き、なの――にぃにの――匂い」
1160 = "「我喜歡……我喜歡――阿哥的――味道」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、もっと染みこませよう」
1250 = "「那我就再多加點」" 

# monologue
# JP: （じゅるるるるるうっっっっ！）
1802 = "（啾嚕）" 

# 【日々姫】
# display as 日日姬
# JP: 「くひゅうううううんっ！！！」
1125 = "「嗯啊！！！」" 

# monologue
# JP: 唾液を熱心に擦り込むほどに、\n日々姫のおまんこは熱を帯びヒクつきを激しくさせる。
1496 = "我越是在上面塗抹唾液，日日姬的小穴溫度就越高、顫動得越劇烈。" 

# monologue
# JP: 匂いもどんどん濃くなって――\nん？
1613 = "氣味也越來越濃郁――嗯？" 

# monologue
# JP: （くんっ）
1862 = "（聞）" 

# monologue
# JP: 鼻をつく、\n今までにはなかった、アンモニア臭。
1492 = "我聞到了刺鼻的氨水味，剛才還沒有這個味道。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぷあっ――ん、む――日々姫。\nお前……ひょっとしておしっこをしたいのか？」
1056 = "「呼――嗯――日日姬。你……是不是想尿尿？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃぁんっ」
1024 = "「呀」" 

# monologue
# JP: ひゃあ、といやぁんの中間のような声を出し。
1600 = "日日姬的驚叫聲中帶著一點羞恥的意思。" 

# monologue
# JP: 日々姫は真っ赤になりつつも、\n素直な答えを聞かせてくれる。
1374 = "只見她雖然小臉通紅，卻還是誠實地做出了回答。" 

# 【日々姫】
# display as 日日姬
# JP: 「だって……だってにぃにが、あんまり熱心に、\nくんくんして、ぺろぺろするから――だからぁ」
1251 = "「都怪……都怪阿哥聞得那麼起勁，舔得那麼用力――所以」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ともかく、漏らしてはコトだ。\n少し待て」
981 = "「不過漏尿了可就麻煩了。你等一下」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　にぃに」
1057 = "「哎！？阿哥」" 

# monologue
# JP: 急いであれこれ整えて、日々姫の部屋へ舞い戻る。
1465 = "我急忙準備好幾件東西，然後回到了日日姬的房間。" 

# monologue
# JP: 日々姫は律儀にスカートの裾を持ち上げたまま、\n僕の帰りを待っててくれる。
1562 = "日日姬依然乖乖地掀著裙子，等著我回來。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「バスタオルを何枚かと、洗面器とを持ってきた」
1167 = "「我拿來了幾條浴巾，還有洗臉盆」" 

# monologue
# JP: 開かれている足の間の床の上へとバスタオルを敷き、\n日々姫の股間の位置を見極め、洗面器を置く。
1460 = "我在她雙腿下方的地上鋪上了浴巾，然後在對準日日姬腿間的位置放好了洗臉盆。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「これで、漏らしても床には染みまい」
1242 = "「這樣漏尿也不會弄髒地板了」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　あの……にぃに――」
1061 = "「哎？那個……阿哥――」" 

# monologue
# JP: はぁはぁと、日々姫の呼吸が荒くなる。\n額に首に汗が浮かんで、瞳が熱っぽく潤んでる。
1584 = "日日姬的喘息越來越急促。她的額頭上浮現出了汗珠，眼眸也濕潤了起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「ここで……漏らすと？\n私、おしっこ――トイレ、行かんで」
1204 = "「是想讓我……在這裡尿嗎？而不是讓我上廁所――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「トイレ？」
1154 = "「廁所？」" 

# monologue
# JP: いや、ああ、そうか。\n興奮しすぎて視野が極限まで狭窄していた。
1383 = "呃，對啊。我實在是興奮過頭了，連帶著思考的視野也變窄了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すまん、日々姫」
1173 = "「抱歉，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「ううん！？　謝らんでよかよ！？」
979 = "「不用！不用道歉的！？」" 

# monologue
# JP: 僕のうっかりをすぐ許し、\nこっくり日々姫は頷いて――！！？
1563 = "日日姬原諒了我的冒失，然後低下頭――！！？" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……ふ……ぁっ」
1112 = "「嗯……呼……啊」" 

# monologue
# JP: うめき声。濃くなるアンモニアの匂い。\nぷるぷる震える日々姫の内股。
1578 = "日日姬發出了一聲呻吟，隨後氨水的味道越來越重。只見她的大腿連連顫抖。" 

# monologue
# JP: ――そしてパンツに、黄色い染みがじゅん、と湧く。
772 = "――然後內褲上就出現了一片黃色的水漬。" 

# 【日々姫】
# display as 日日姬
# JP: 「……にぃにが、見たいって……言ってくれるなら……\nん……私……する、から……おも、らし……する、から」
787 = "「……如果阿哥說……想看……嗯……我就尿……我就漏尿……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 

# monologue
# JP: 僕の、『すまん』を、日々姫は誤解したらしい。
1568 = "日日姬好像誤解了我對她的道歉。" 

# monologue
# JP: 止めようとする声が張り付くその間にももう、\n浮かんだ染みは珠となり、ぼとぼと滲んで落ちていく。
1454 = "我剛想要出聲制止她，水漬上已經聚成了水珠，透過內褲滴了下來。" 

# monologue
# JP: （ぷ……しゃ――じょろ……ろ……ろっ）
1853 = "（滴滴答答）" 

# monologue
# JP: 緊張のせいか、パンツが壁になってるせいか、\nそれとももともとがそうなのか。
1338 = "也不知道是因為她太緊張，是因為內褲擋上了的緣故，還是她尿尿本來就是這樣的。" 

# monologue
# JP: 日々姫の尿には勢いがなく、恥じらうように、\nパンツに染みては黄色く膨らみ垂れ落ちる。
1587 = "日日姬的尿沒有什麼力道，溫溫吞吞地在內褲上的黃色水漬上聚成水滴一點一點滴了下來。" 

# 【日々姫】
# display as 日日姬
# JP: 「や……私……おとな……なの、に……おもらし……\nにぃにに……見られて……しちゃ、って……んっ！」
1023 = "「呀……我……明明是大人了……卻還漏尿……阿哥……還看著我……嗯！」" 

# monologue
# JP: ぴゅっと、勢い良く尿が飛び。\nそのあとはまた、ぼとぼとじょろじょろ垂れ落ちる。
1425 = "尿液噴湧了一下。然後又變回了一滴一滴留下來。" 

# monologue
# JP: 日々姫の太ももをつたったものは、\nソックスにまで滲みそうで――
1614 = "水滴順著日日姬的大腿流下，就快要弄濕襪子了――" 

# monologue
# JP: （ぺろっ）
1863 = "（舔）" 

# 【日々姫】
# display as 日日姬
# JP: 「ふやっ！？　にぃに――舐めてっ――んっ――\nふあっ――あっ――ぺろ、ぺろ――おも――らしっ」
1042 = "「呀！？阿哥――舔了――嗯――呼――啊――舔了――我的尿」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ん……ん……ぷあっ――ソックスに――んっ――\n染み、ては――れるっ――いかん――だろう」
1114 = "「嗯……嗯……噗哈――因為――嗯――不能――把襪子――弄濕啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「や……あっ――にぃにの、ぺろぺろ――んっ――\n登って……きてる――ふっ――あ――あっ――んっ！！」
1021 = "「呀……啊――阿哥的舌頭――嗯――舔上來了……呼――啊――啊――嗯！！」" 

# monologue
# JP: （じゅるるるるうぅぅぅぅぅっ！）
1794 = "（吸溜）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃああんっ！！？」
1033 = "「呀！！？」" 

# monologue
# JP: たっぷり尿の染みたパンツを、\n唇で絞るようにして舐め洗いする。
1489 = "我用雙唇用力吸著吸飽了尿液的內褲。" 

# monologue
# JP: 力をいれればじゅわりと尿が溢れだし、\n味も一気に広がってくる。
1500 = "我這麼用力一吸尿液就溢了出來，讓我嚐到了味道。" 

# 【双鉄H】
# display as 雙鐵
# JP: （しょっぱくて――ぬるくて――えぐい。\nなんとも、尿とはこういう味だという味だなぁ）
1847 = "（有點咸――暖呼呼的――很澀。尿原來是這個味道的啊）" 

# 【日々姫】
# display as 日日姬
# JP: 「やっ――あっ――私の――おもらし――パン、つ――\nにぃにが、ベロで――ちゅう、って――んううっ！！！」
1010 = "「呀――啊――我的尿――內褲――被阿哥的舌頭――被吸到了――嗯啊！！！」" 

# monologue
# JP: （ぷちゅっ！）
1806 = "（噗啾）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 

# monologue
# JP: 日々姫が、軽く達したのだろうか？\n口内に弾けたそれは、尿混じりだが――おまんこの蜜だ。
1577 = "日日姬是不是高潮了？雖然混合著尿液，但是射入我口中的確實是蜜汁。" 

# monologue
# JP: 僕も、イキたい。\n素直に思い――日々姫の股間から唇を離す。
1447 = "我也想達到高潮。於是我便鬆開了嘴。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫？　パンツを脱いでくれるか？\nそれから、上も――」
1196 = "「日日姬，你能把內褲脫下來嗎？還有上面也脫掉――」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……うん――んっ――っと――ぐじゅぐじゅで――\nちょっと――脱ぎづらい……かもっ――ん！」
1088 = "「啊……嗯――嗯――啊――濕成一團――可能有點――不好脫――嗯！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「かわいいな、とても」
1192 = "「日日姬真可愛」" 

# 【日々姫】
# display as 日日姬
# JP: 「はうっ――」
1105 = "「嗚――」" 

# monologue
# JP: 日々姫の乳首は、\n舐めてほしそうに勃起し小さく震えてる。
1582 = "日日姬的乳頭小幅度顫動著，就好像在引誘我去舔舐。" 

# monologue
# JP: そうしたいのは、僕も同じだ。\nだが、今は――
1696 = "這也正中我的心意，但是現在要――" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫の肌も、\nぐじゅぐじゅに濡れてしまっているな」
1191 = "「日日姬的肌膚也都濕成一片了」" 

# monologue
# JP: （ちゅっ）
1864 = "（親吻）" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ――んっ――直、接っ――ふあっ――んっ」
1077 = "「啊――嗯――這樣直接――呼――嗯」" 

# monologue
# JP: （れるっ――れろっ――じゅぶっ――ぢゅうっ）
1793 = "（來回舔舐）" 

# monologue
# JP: おまんこの肉の割れ目を開けば、\n中にたまってた尿が飛び出し口へと入る。
1494 = "我舔開小穴的花瓣，裡面積著的尿就彈入了我口中。" 

# monologue
# JP: 尿道口を、膣口を舐めて綺麗にし、\nそれからいったん、ふとももの付け根を舐めまわす。
1473 = "我把尿道口和陰道口都舔得乾乾淨淨，然後再移動到大腿根部舔舐著。" 

# 【日々姫】
# display as 日日姬
# JP: 「きもち……いっ――んっ――好き……ぺろぺろ……\nにぃにに、ぺろぺろ……されるの――大、好き」
1145 = "「好舒服……嗯――我好喜歡……被舔到……我好喜歡……被阿哥舔到」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ほうは」
1241 = "「這樣啊」" 

# monologue
# JP: （れろおおおおおっっ）
1857 = "（用力舔）" 

# 【日々姫】
# display as 日日姬
# JP: 「くふうううううんっっっ」
1123 = "「嗯啊」" 

# monologue
# JP: 尿をつたって、とどまることなく舌を滑らす。
1423 = "尿液不停地流到我的舌頭上。" 

# monologue
# JP: パンツが覆ってた範囲はすべて、\n余すところなく塩っぽい味に覆われている。
1358 = "內褲所覆蓋的範圍已經全部變成了鹹鹹的味道。" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……にぃ、に――」
1095 = "「啊……阿哥――」" 

# monologue
# JP: 期待と、不安が入り交じる声。
1591 = "日日姬的聲音中既有期待，又有一絲不安。" 

# monologue
# JP: 尿は、尻にまでつたってしまった。\nならば日々姫が止めない限り、僕は綺麗に舐めとるのみだ。
1421 = "尿液一直流到了屁股上。只要日日姬不叫我住手，我就會全部舔乾淨。" 

# monologue
# JP: （ぐいっ）
1828 = "（扒開）" 

# monologue
# JP: 尻肉を掴み大きく割って――
1479 = "我抓上她的屁股，用力分開――" 

# monologue
# JP: （ぺろっ）
# 1863 = "（舔）" 

# 【日々姫】
# display as 日日姬
# JP: 「んひゃううううっ！？　ひあっ――おひっ――\nそこっ――にぃに――おしりっ――ふあ――あっ！！？」
1121 = "「嗯呀！？呀――屁――那裡是――阿哥――屁股――呼――啊！！？」" 

# monologue
# JP: （ぺろっ――れろっ――ちゅぷっ――――にゅるる！）
# 1793 = "（來回舔舐）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！？　あっ！　べろっ――やっ――にゅうって！\nおしり――中、まで――なめてっ――ふあ、あ、あっ！」
1041 = "「呀！？啊！舌頭――呀――進來了！屁股――裡面――都被舔到――呼、啊、啊！」" 

# monologue
# JP: （きゅうううっ！！！）
1844 = "（收縮壓迫）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 

# monologue
# JP: 肛門がキュっと締め付けてきて、\n舌が苦しいほどになる。
1400 = "她的肛門一下子收緊，勒得我的舌頭很難受。" 

# monologue
# JP: 慌てて日々姫から口を外せば、\n日々姫はもう、膝をがくがく震わせている。
1498 = "我趕忙鬆開了嘴，只見日日姬在雙腿打顫。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そんなに、お尻が気持ちいいのか？」
1152 = "「屁股被舔到讓你這麼舒服嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「う、うん。恥ずかし……けど――えと……\n私……私、あの――お尻――ぺろ、ぺろ――され、て」
1117 = "「嗯、嗯。雖然……很害羞――那個……我……我、那個――屁股――被舔到――」" 

# monologue
# JP: （ぐっ）
1867 = "（趴下）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 

# monologue
# JP: ベッドに上体を倒れこませて、\n日々姫がお尻を僕へと突き出す。
1558 = "日日姬上半身趴在床上，向我撅起了屁股。" 

# monologue
# JP: 上体だけを振り返らせて、\n潤んだ瞳で――おねだりしてくる。
1622 = "然後她回過頭來，用濕潤眼眸看著我，然後開口求我。" 

# 【日々姫】
# display as 日日姬
# JP: 「お尻……もっと、して欲しいかな――って」
1150 = "「屁股……請再多舔一舔――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
# 1241 = "「這樣啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……けどその前に、ちゅうも――\nキスも、して欲しい」
1081 = "「啊……但是在這之前，還要親親――還想要一個吻」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ん――」
# 1107 = "「嗯――」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……ちゅっ――んっ――ちゅうっ――\nちゅむ……ん……はっ――ん――大好き……にぃに」
1086 = "「啊……啾――嗯――啾――啾嚕……嗯……呼――嗯――阿哥……我好喜歡你」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ」
1157 = "「我也喜歡你」" 

# monologue
# JP: （れるうっ）
# 1863 = "（舔）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃんっ！」
1026 = "「呀！」" 

# monologue
# JP: キスを解いた舌でそのまま、\n日々姫の体を舐めなぞっていく。
1678 = "親吻結束後，我的舌頭就直接舔上了日日姬的身體。" 

# monologue
# JP: 顎から首筋、鎖骨、おっぱい――\n乳首も軽くついばんで、脇腹――太もも――
1436 = "從下巴到脖子、鎖骨、胸部。輕輕嘬了一下乳頭，再到側腹、大腿――" 

# monologue
# JP: （ちゅうっっ）
1803 = "（啾）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！　は――あっ――これっ――おしりっ――\nんっ――あっ――れろって――される、とぉ――んっ」
1027 = "「呀！呼――啊――那裡――屁股――嗯――啊――被舔到的話――嗯――」" 

# monologue
# JP: （れろっ――ねぶっ――にゅっ――にゅるっ――）
# 1793 = "（來回舔舐）" 

# monologue
# JP: 日々姫のお尻の穴の内側は、苦くて渋い味がする。
1592 = "日日姬的菊花裡面又澀又苦。" 

# monologue
# JP: 舌先が少しひりひりとして、\n唾液がどくどく、口内にとめどなく湧いてくる。
1667 = "舌尖有點刺痛的感覺，導致我口中湧出了不少唾液。" 

# monologue
# JP: （てろおおおおおおおっ）
1852 = "（滴下）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃうっ！？　あっ――なにっ――なんか――\nんっ――おしり――どろっ――って――ふ――あっ」
1039 = "「呀！？啊――有什麼――什麼東西――嗯――滑進了――屁股裡――呼――啊」" 

# monologue
# JP: 舌を使って唾液を押し出し、\n日々姫のお尻に流し込む。
1488 = "我用舌頭把唾液推出來，使其流進日日姬的肛門裡。" 

# monologue
# JP: 肛門がキュウと収縮するが、\n予期できたゆえ、今度はさほど驚かずにすむ。
1401 = "她的肛門猛地收縮了一下，不過這次已經預料到了，就沒有那麼吃驚了。" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ――やっ――おしり――の穴っ――んっ――\n勝手に――くぱ――くぱっ――して――きちゃ、んっ」
1070 = "「啊――呀――屁股――屁眼――嗯――自己就――一張一合的――呀、嗯」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「…………」
782 = "「…………」" 

# monologue
# JP: 生唾を飲む。
1458 = "我嚥下一口唾沫。" 

# monologue
# JP: ひくつき、求めてくれているなら――\nそれはおまんこと変わらない。
1407 = "如果菊花在一張一合地渴求著我――那跟小穴就沒什麼區別了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……日々姫」
792 = "「……日日姬」" 

# monologue
# JP: 言葉に出して聞くのは罪深いような気がして、\nひくつくお尻の穴へと勃起の先をただ押し当てる。
1467 = "我感覺開口問她實在是太有罪惡感。於是只是把龜頭抵在了一張一合的菊花上面。" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……挿れる……と？」
1094 = "「啊……要插進來嗎……？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうしてみたい。\n求められているような気がして――」
1166 = "「我想插進去。感覺這裡就像是在求我插入――」" 

# 【日々姫】
# display as 日日姬
# JP: 「ふあっ――あっ――」
1053 = "「呼――啊――」" 

# monologue
# JP: 頬を赤らめ、口をぱくぱく開いては閉じ。
1571 = "日日姬小臉通紅，嘴也一張一合的。" 

# monologue
# JP: やがて日々姫は、\nさっきの僕と同じく無言のままに――頷く。
1604 = "最後她就跟我剛才一樣，一言不發地――點頭同意。" 

# monologue
# JP: （ずろおおおおおおおおおおおおおおっっ！！）
1854 = "（用力插入）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃはっ！？　あっ――あっ――は――くっ――」
1037 = "「呀！？啊――啊――呼――呃――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぬ――あっ――」
1050 = "「呃――啊――」" 

# monologue
# JP: まずは先端。
1608 = "本來我只想插入龜頭。" 

# monologue
# JP: ただそれだけをと思った勃起はけれど、\n肛門の隘路を抜ければ、一気に奥へと刺さってしまう！
1641 = "結果肉棒穿過了肛門中的小徑，一下子進入了最深處！" 

# monologue
# JP: （ぱちっ――）
1799 = "（啪）" 

# 【日々姫】
# display as 日日姬
# JP: 「深……か――ぁッ――はっ――熱……いっ――ふっ」
1142 = "「好深……好――呼――好熱……呼――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「く――むっ――」
1049 = "「呃――唔――」" 

# monologue
# JP: （ぬろ――ろっ――ろおおっ――）
1860 = "（繼續插入）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひ――あっ！\nお、おしりっ――なかみ――はがれ――るっ――」
1014 = "「呀――啊！屁、屁股――裡面――被剝下來――了――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぉ――むっ――」
# 1049 = "「呃――唔――」" 

# monologue
# JP: 圧倒的な快感情報に塗りつぶされて真っ白だった脳内に、\nようやく酸素が、そして言葉が復活してくる。
1434 = "強烈的快感讓我的腦中一片空白。然後感覺就像氧氣終於又供給上了，我又恢復了思考能力。" 

# 【双鉄H】
# display as 雙鐵
# JP: （これは――すごいな。\nおまんこと、これほど違うのか――）
1873 = "（這個――好厲害。菊花跟小穴差距好大――）" 

# monologue
# JP: ぴっちりしてる。つるつるしてる。
1455 = "我只覺得裡面非常緊緻、非常平滑。" 

# monologue
# JP: 肛門だけが強すぎるほど締め付けて、\n肛門の中は、締めるのではなく張り付いてくる。
1659 = "肛門處緊緊地勒著，肛門裡面不是緊錮著，而是貼合著。" 

# monologue
# JP: （ぬるっ――るっっ――るっ――ぱちゅんっ！）
1795 = "（咕啾咕啾）" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ――ふっ――きゅっ――はあっ」
1109 = "「嗯――呼――啊――呼」" 

# monologue
# JP: 日々姫はぜぇぜぇ、背中で大きく呼吸している。
1589 = "日日姬的後背上下起伏，用力喘息著。" 

# monologue
# JP: それを少しでも和らげたくて、\n密着したまま腕を伸ばして――
1619 = "為了讓她能紓解一下，我在保持緊貼狀態的同時伸出了手臂――" 

# monologue
# JP: （ふにっ――もみゅっ――）
1837 = "（揉搓撫摸）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ――あっ――おっぱい――ンッ――\nにぃに――優、しいっ――ふっ――んっ」
1013 = "「呀――啊――胸部――嗯――阿哥――好溫柔――呼――嗯」" 

# monologue
# JP: 甘い声。\n肛門の強い締め付けも、わずかにながら緩んでくれる。
1397 = "她發出了愉悅的聲音。肛門緊錮的力道也放緩了一點。" 

# monologue
# JP: （ぬるうううううううううううううっっっ！）
1832 = "（抽出）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ――あっ――らめっ――そんな――\nずるって――抜いちゃっ――んっ――おひりっ――」
1009 = "「呀――啊――不行――這麼――一抽出來――嗯――屁股要――」" 

# monologue
# JP: （ずぶうううううううううううっ！）
1804 = "（噗哧）" 

# 【日々姫】
# display as 日日姬
# JP: 「きゃふっ！！　あっ――うごく――のっ――おしりっ、\n穴の――なか――にぃに、に――えぐられ――てっ――」
1031 = "「呀！！啊――屁眼――裡面――動起來――被阿哥――挖到――」" 

# monologue
# JP: （ずぶっ！　ずばっ！　ずぼっ！　ぼちゅっ！）
1851 = "（滋噗！滋啪！滋噗！噗啾！）" 

# 【日々姫】
# display as 日日姬
# JP: 「きゃんっ――っ――うっ――はげ――しっ――んっ――\nおしりっ――めくれて――おされ、て――ふ――あっ」
1018 = "「呀――嗯――唔――好激烈――嗯――屁股裡――被捲起來――捅進去――呼」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々――姫っ――」
1188 = "「日日姬――」" 

# monologue
# JP: （がしっ！）
# 1799 = "（啪）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃんっ！」
# 1026 = "「呀！」" 

# monologue
# JP: 動く。動ける。日々姫も感じてくれている。
1389 = "在我抽插的時候，日日姬也有感覺。" 

# monologue
# JP: その感触が、僕の最後の歯止めを外す。\n日々姫の腰を捕まえて、ただただ射精のために貫く！
1699 = "這讓我無法再抑制住自己。我抓住了日日姬的腰，狠命在裡面貫穿著，一心只想射精！" 

# monologue
# JP: （ずぶっ！　ぶほっ！　ぶっ！　ブチュんっ！！）
1817 = "（噗滋！噗滋！噗啾！噗啾！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「やっ！　音っ――はずかしっ――んっ――えっち――\nえっちな――音――おしりっ――んひゅっ――」
1030 = "「呀！聲音――好羞人――嗯――色色的――色色的――聲音――從屁股――嗯呼――」" 

# monologue
# JP: （ずっ！　ばちゅっ！　じゅぶっ！　ばつんっ！！）
# 1817 = "（噗滋！噗滋！噗啾！噗啾！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに――おっきっ――びくって――なって――んっ\nイクの？　にぃに！　いっしょ！　いっしょにぃっ！」
1254 = "「阿哥――好大――一跳一跳的――嗯――要射了嗎？　阿哥！　一起！　來一起！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、一緒にだ」
1132 = "「嗯，來一起高潮」" 

# monologue
# JP: 精液はもう先端ギリギリまでに来ている。\nならば日々姫に一緒にイってもらうため――
1639 = "精液已經快要擠到龜頭的位置了。為了能跟日日姬一起高潮――" 

# monologue
# JP: （パチンっ！）
1798 = "（啪！）" 

# 【日々姫】
# display as 日日姬
# JP: 「痛っ！？　あっ――んっ――――――\nきゅふうううううううううううううんんっっっ！！！」
1143 = "「好痛！？啊――嗯――嗯啊啊啊！！！」" 

# monologue
# JP: （ぎゅうううっ！）
# 1844 = "（收縮壓迫）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
1097 = "「啊！」" 

# monologue
# JP: （びゅっ！　びゅるっ！　どびゅっ！　びゅぶっ！！）
1819 = "（噗！噗嚕！噗噗！噗嚕！！）" 

# monologue
# JP: 合図のつもりで叩いた尻が、\n防衛反応かなんなのか、強烈すぎる締め付けを呼びっ！
1481 = "我拍了一下她的屁股就當做是信號，卻好像引起了她的防禦性反應，菊穴忽然猛地錮緊！" 

# monologue
# JP: （どびゅっ！　びゅぶっ！　びゅるるっ！　びゅううう）
1814 = "（噗嚕！噗嚕！噗噗！噗噗）" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……あっ――どくどく――してっ――ふあっ――\nおしり――にぃにの――精、液――あ、つい――んっ」
1084 = "「啊……啊――精液――咕嚕咕嚕地――呼――屁股裡面――阿哥的――精液――好燙――嗯」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ――はっ――あっ――あっ――」
1072 = "「啊――呼――啊――啊」" 

# monologue
# JP: 肛門はずっと締め続けてる。
1658 = "肛門一直在收縮。" 

# monologue
# JP: 際限無しに絞られそうで、そうでなければうっ血しそうで、\n少し怖くて、まだ精液を出し切らぬうち引き抜いてしまう。
1466 = "我感覺肉棒會被一直壓迫下去，最後會形成淤血。這讓我有點擔心，於是在精液還沒全射出之前我就拔了出來。" 

# monologue
# JP: （ずるっ――ぴゅっ！）
1816 = "（噗滋――噗嚕！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ゃんっ」
# 1120 = "「嗯」" 

# monologue
# JP: 日々姫の真っ白で丸いお尻を、\n僕の精液がデコレートする。
1580 = "日日姬白皙的圓潤屁股上染上了我的精液。" 

# monologue
# JP: クリームみたいにどろりと垂れる白濁は、\n日々姫のおまんこの割れ目にそって流れて――
1391 = "奶油一樣的白濁液體流到了日日姬小穴的肉縫上――" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々、姫……」
1189 = "「日日姬……」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん、にぃに――せっかくのにぃにの精液なのに、\nお尻じゃ――妊娠、できんけん」
1119 = "「嗯、阿哥――難得有阿哥寶貴的精液，射在屁股裡面――也沒辦法懷孕啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 

# monologue
# JP: 妊娠させたい。
1461 = "我好想讓她懷孕。" 

# monologue
# JP: その想いだけが体に満ちて、\nけれども脳は、少し不安を感じてしまう。
1685 = "身體上下頓時充滿了這個欲望，但是理智卻讓我有些不安。" 

# 【双鉄H】
# display as 雙鐵
# JP: （妊娠セックスをするとして――お尻に挿れたそのままを、\n膣内に入れて、安全なのか？）
1820 = "（如果要讓她懷孕的話――剛插入過肛門，就插入陰道，這樣衛生嗎？）" 

# monologue
# JP: 些か不安だ――消毒を。\n思えばすぐに、床に落ちてるそれが目につく。
1698 = "這讓我有點不安，那就消毒一下。正好地上的一個東西映入我的眼簾。" 

# monologue
# JP: （ぺちょっ）
1843 = "（撿起）" 

# 【日々姫】
# display as 日日姬
# JP: 「やあっ！？　にぃに！！？　なんばしよっと！？\n私の――おも、おも――おもらしパンツでっ」
1044 = "「呀！？阿哥！！？這是要幹什麼啊！？用我的――尿濕的內褲」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「お尻から直に膣内はやや安全では無いかと思って。\nアルコール消毒に、これならば丁度いいかと」
1169 = "「我覺得從肛門抽出就插進陰道不太衛生。正好用這個做一下酒精消毒」" 

# 【日々姫】
# display as 日日姬
# JP: 「ティッシュ！　アルコールティッシュあるけんっ！」
1221 = "「濕巾！不是有酒精濕巾嗎！」" 

# monologue
# JP: 日々姫は僕からパンツを奪い、\n代わりにウェットティッシュをくれる。
1573 = "日日姬從我手中奪過了內褲，然後把濕巾遞給了我。" 

# monologue
# JP: それで丁寧に勃起を拭い、\n今度こそ、日々姫の膣口に押し当てる。
1476 = "我把肉棒認真擦了擦，然後抵在了日日姬的穴口上。" 

# monologue
# JP: （ぬぶっ）
1838 = "（插入）" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……ちょっと――ひんやりしとる、ね」
1092 = "「啊……有點――涼涼的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すぐ、燃えるように熱くなる」
1260 = "「馬上就會變得滾燙了」" 

# monologue
# JP: （じゅぶうううううううううううっ！）
1800 = "（啾噗）" 

# 【日々姫】
# display as 日日姬
# JP: 「んふううううううううううっっ！！！！」
1124 = "「嗯啊啊啊！！！！」" 

# monologue
# JP: （ずばっ！　じゅっっ！　ずばっ！　じゅぼんっ！）
1805 = "（噗啾！噗啾！啾噗！啾噗！）" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ――きもちいっ――きもちいいっ！　\nにぃに――おちんちん――すごい――いい――よぉ」
1078 = "「啊――好舒服――好舒服！阿哥的――雞雞――好厲害――好棒啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕も――だっ――」
1158 = "「我也是――」" 

# monologue
# JP: 日々姫のおまんこはもう完全にとろとろほぐれ、\nうねり張り付き、僕の勃起を迎えてくれる。
1594 = "日日姬的蜜穴裡面已經完全軟化濕透，緊緊地套著我的肉棒。" 

# monologue
# JP: 迎えたが最後離しはしないと、必死で抱きつき、\nきゅんきゅん締めて引き抜く動きに抵抗してくる！
1514 = "插入進去之後蜜穴狠命地套緊了肉棒，就像不想讓肉棒再拔出去一樣，抵抗著拔出的動作！" 

# monologue
# JP: （ずぶっ！　じゅっ！　ずろおおおっ！　じゅぶうう！）
# 1805 = "（噗啾！噗啾！啾噗！啾噗！）" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ――んっ――それ――しゅごっ――んっ――\nぐりって――しながらっ――ゆっくり――んひゅっ！？」
1076 = "「啊――嗯――這樣――好厲害――嗯――一快――然後――一慢――嗯啊！？」" 

# monologue
# JP: （すぱんっ！　ぱんっ！　ぱんっ！　ぱんっ！！）
1797 = "（啪！啪！啪！啪！！）" 

# monologue
# JP: ゆっくり動けば深い繋がり。速く動けば強い快感。
1368 = "動作慢就能連接得更緊密。動作快就能獲得強烈的快感。" 

# monologue
# JP: えぐってもひねってもこすっても、どう動いても、\n日々姫の可愛いおまんこは、最高の快感を与えてくれる。
1620 = "無論怎麼抽插怎麼磨蹭，日日姬的可愛小穴都能帶給我最強的快感。" 

# monologue
# JP: （くりっ！）
1833 = "（捏）" 

# 【日々姫】
# display as 日日姬
# JP: 「やあっ――乳首っ――つねったら――んっ――あっ」
1007 = "「呀――乳頭――被捏到了――嗯――啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！」
# 1097 = "「啊！」" 

# monologue
# JP: 今すぐにでも射精しそうで、緩めたくって乳首をつねれば、\nまたも日々姫はビクビクきゅんと締め付けてくる。
1468 = "我感覺馬上就要射出來了，捏著她的乳頭想讓她放緩一下。日日姬的小穴卻又套了上來。" 

# monologue
# JP: 肉体的な刺激は常に諸刃の剣だ。\nならば――ならば、心の方を――
1650 = "肉體上的刺激是把雙刃劍。那就從心靈上――" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫、リラックスできないか？\nもっと長くを、日々姫と重なっていたいんだ」
1195 = "「日日姬，你放鬆一下。我想跟日日姬多纏綿一段時間」" 

# monologue
# JP: （ふわっ）
1841 = "（撫摸）" 

# monologue
# JP: 出来るかぎりに落ち着けた声。\nゆっくりとした指先で髪をくしけずる。
1450 = "我儘量用冷靜地語調說話。然後緩緩撫摸著她的秀髮。" 

# monologue
# JP: 途端に日々姫は目をうるませて、\nほうっと、熱い息を吐く。
1376 = "只見日日姬眼眶一熱，放心地吐了一口氣。" 

# 【日々姫】
# display as 日日姬
# JP: 「うん……にぃに……\n私も、ずうっと一緒がよかよ」
1115 = "「嗯……阿哥……我也想一直跟你在一起」" 

# monologue
# JP: （きゅんきゅんきゅんっ！）
# 1844 = "（收縮壓迫）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？」
1264 = "「！？」" 

# monologue
# JP: 言葉で気持ちでわかってくれて、\nけれど体は、より一層に僕の精子を求め吸い付く！
1437 = "從她的話語中能聽出我的意思傳達到了，但是蜜穴裡卻套得更緊了，更加用力地渴求著我的精液！" 

# 【双鉄H】
# display as 雙鐵
# JP: （これは――保たない。\nせめて――日々姫と――日々姫と一緒にっ――）
1825 = "（實在是忍不住了。那就至少跟日日姬一起――）" 

# monologue
# JP: 思いは腰の動きに繋がる！
1700 = "這麼一想，我的腰就動了起來！" 

# monologue
# JP: （ずるうううううううっ！！！）
# 1832 = "（抽出）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃうっ！！？」
# 1033 = "「呀！！？」" 

# monologue
# JP: 一度は大きく腰を引き、\n経験が僕に教えてくれた、日々姫の一番弱い部分へ――
1452 = "我先後退抽出，然後憑藉之前的經驗，進攻日日姬最敏感的地方――" 

# monologue
# JP: （ぐりいいいいいっ！！！）
# 1838 = "（插入）" 

# 【日々姫】
# display as 日日姬
# JP: 「ゃふっつ――んっ――ふあっ――そこ――らめっ！\nざらざら――ぐりって、しちゃ、ら――んきゅううっ！」
1016 = "「呀――嗯――呼――那裡――不行！要是頂到――這個地方――嗯啊！」" 

# monologue
# JP: （きゅうううっ！）
# 1844 = "（收縮壓迫）" 

# monologue
# JP: 日々姫は体を大きく震わせ、\n膣を思い切り締め付けてくるっ！
1599 = "日日姬的身子劇烈顫動著，蜜穴裡用力套著我的肉棒！" 

# monologue
# JP: これなら、\nこれなら日々姫と一緒にっ！！
1697 = "這樣的話就能跟日日姬一起高潮了！！" 

# monologue
# JP: （ずぶっ！　ずばっ！　じゅばっ！　じゅぱんっっ！）
# 1805 = "（噗啾！噗啾！啾噗！啾噗！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――くっ――あっ――\n日々姫！　日々姫！　日々姫！！」
1108 = "「嗯――呃――啊――日日姬！日日姬！日日姬！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　にぃに！　イって！\n子宮で、ぴゅっぴゅしてっ！！」
1128 = "「嗯！阿哥！來吧！都射到子宮裡！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
1127 = "「嗯！」" 

# monologue
# JP: お望みどおりおもいっきりに腰を突き出し、\n日々姫の子宮の入り口に、勃起の先端を食い込ませっ！
1517 = "既然日日姬這麼說了，那我就用力挺腰，讓龜頭陷入她的子宮入口！" 

# monologue
# JP: （くぽおっっ）
# 1806 = "（噗啾）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃああうっ！！！？」
1025 = "「呀啊！！！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！？」
1098 = "「啊！？」" 

# monologue
# JP: （びゅうっ！　びゅくっ！　どびゅっ！　どびゅるっ！）
1812 = "（噗嚕！噗噗！噗嚕！噗噗！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「あ……う――っ――」
1082 = "「啊……啊――」" 

# 【日々姫】
# display as 日日姬
# JP: 「はっ――あっ――なに――これっ――ふ――んっ――\n吸って――吸ってる――私の、子宮――っ――んっ」
1055 = "「呼――啊――這是――怎麼回事――呼――嗯――我的子宮――在吸――在吸呢――嗯」" 

# monologue
# JP: 勃起の先端が引っ張られ――\n子宮の口が、僕を吸い込むような感じで――
1626 = "現在的感覺就像龜頭被吸引著，她的子宮口在吸吮著我――" 

# monologue
# JP: （びゅっ！　びゅるっ！　びゅううっ！　びゅっ！）
1813 = "（噗嚕！噗嚕！噗噗！噗噗！）" 

# 【日々姫】
# display as 日日姬
# JP: 「すご――来て、るっ――妊娠――せい、えきっ――\n子宮の――おくに――私の、卵子に――ぴゅっぴゅって」
1147 = "「射了――好多――要懷孕了――精液――射進子宮――深處――打在――我的卵子上」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ――あっ」
1073 = "「啊――啊」" 

# monologue
# JP: （びゅるっ――びゅううっ――びゅっ！　ぷっ！）
1811 = "（噗嚕――噗嚕――噗噗！噗噗！）" 

# monologue
# JP: ……実際、そんな感覚がした。
779 = "……實際上就是這種感覺。" 

# monologue
# JP: 日々姫の膣は、そして子宮は、今まで以上に、最高に、\n僕の精液を必死に求め、余さず絞り尽くしてくれた。
1597 = "日日姬的蜜道、子宮用前所未有的力道渴求著我的精液，要把我所有的精液都榨出來。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぅあ――」
1068 = "「啊――」" 

# monologue
# JP: （どさっ）
1842 = "（撲倒）" 

# monologue
# JP: 日々姫の上に重なるように崩れ落ちれば――
1445 = "我一下子撲倒在日日姬的身子上――" 

# monologue
# JP: （きゅううっ！）
# 1844 = "（收縮壓迫）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「！！？」
1263 = "「！！？」" 

# monologue
# JP: 強烈に膣を締め付けられて、\n慌てて体を起こし直す。
1675 = "蜜道忽然猛烈地收緊了一下，我趕緊起身。" 

# monologue
# JP: 日々姫はじっ――っと、\nまっすぐな目で僕を見ている。
1375 = "只見日日姬直直地盯著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「ね、にぃに――もう――おしまい？」
1246 = "「那個，阿哥――這就――完了嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いいや？　まだだ。まだまだだ」
1211 = "「沒有啊。還沒完，還早著呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1127 = "「嗯！」" 

# monologue
# JP: 発情しきって汗ばむ体。
1395 = "她已經完全進入發情狀態，渾身都是汗水。" 

# monologue
# JP: 完全に女の顔をしながら、\nあどけないほどに純粋な笑み。
1405 = "她的表情雖然已經像個成熟的女性，笑容卻還是那麼天真純粹。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕は、日々姫を。もっともっとと求めてる」
1172 = "「我還想要日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
# 1097 = "「啊！」" 

# monologue
# JP: 心に、体が呼応する。
1686 = "身體的動作呼應著心中的想法。" 

# monologue
# JP: 抜かないままに、このままに――\n僕はもう一度日々姫を求める。
1649 = "肉棒還沒有拔出，我就要再一次跟日日姬纏綿起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ちゅうう、ちゅうしてから、ね？」
1259 = "「阿哥，親親，先要親親，好嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ」
# 1120 = "「嗯」" 

# monologue
# JP: 重なりあって、くっつきあって、\n汗と汗、唾液と唾液を交換しあう、甘いキス。
1449 = "我們的身體重合在一起、緊貼在一起。然後我給了她一個甜蜜的吻，交換著汗水和唾液。" 

# monologue
# JP: そうして僕はキスを解いて――
1328 = "一吻結束之後――" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ――ふあっ――」
1071 = "「啊――呼――」" 

# monologue
# JP: ――もう何度でも、日々姫を求めて動き続ける。
769 = "――我感覺能永遠這樣動下去，跟日日姬纏綿在一起。" 
