[script]
# lines: 355 
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫？　入ってもいいか？」
1199 = "「Hibiki? Anh vào được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。お待たせ！　もう良かよ」
1130 = "「Vâng. Để anh đợi lâu rồi! Xong rồi đó ạ.」"
# monologue
# JP: (かちゃっ）
37 = "(Cạch)"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ね？　見て見て！」
1258 = "「Anh hai, này? Nhìn này nhìn này!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「制服だな。さっきも見たぞ。\nというか、着替えるといってなかったか？」
991 = "「Đồng phục học sinh nhỉ. Lúc nãy anh cũng thấy rồi mà. Mà, chẳng phải em nói là đi thay đồ sao?」"
# monologue
# JP: 登園から日々姫が帰ってきて。
1572 = "Hibiki đi học về."
# monologue
# JP: 部屋に来て、と呼ばれてくれば、\n「着替えるけん」と、廊下で待たされていたのだが――
1393 = "Gọi tôi đến phòng, rồi lại bảo \"Để em thay đồ đã\", bắt tôi đứng đợi ngoài hành lang——"
# 【日々姫】
# display as 日日姬
# JP: 「やけん、着替えとるでしょお」
1203 = "「Thì đó, em thay đồ rồi đây thây.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「着替えた？　どこをだ？？」
1175 = "「Thay đồ rồi? Thay chỗ nào??」"
# 【日々姫】
# display as 日日姬
# JP: 「ふっふーん」
1136 = "「Hừ hừm.」"
# monologue
# JP: いたずらっぽい日々姫の目。
1566 = "Ánh mắt tinh nghịch của Hibiki."
# monologue
# JP: 着替えたところを当ててみろ、と、\n無言のままに挑戦してくる。
1398 = "Thử đoán xem em thay chỗ nào đi, em ấy đang thách thức tôi trong im lặng."
# 【双鉄H】
# display as 雙鐵
# JP: 「“着替え”だよな？\n髪留めやアクセサリーの類ではなく」
988 = "「Là \"thay đồ\" đúng không? Không phải mấy thứ như kẹp tóc hay phụ kiện chứ.」"
# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　ちゃあんと、お洋服のお着替え」
1222 = "「Tất nhiên rồi! Là thay quần áo đàng hoàng luôn.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ううむ――」
1107 = "「Ưm——」"
# monologue
# JP: わからん。制服は制服のままだし……\n着替えたとしたらソックスあたりか？　ああ、そうか。
1632 = "Chịu thôi. Đồng phục thì vẫn là đồng phục... Nếu có thay thì chắc là tất chăng? À, ra vậy."
# 【双鉄H】
# display as 雙鐵
# JP: （スンっ、スンッ）
1856 = "（Khịt khịt）"
# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！？　にぃに、何ばしよっと！？」
1102 = "「Chờ đã!? Anh hai, anh đang làm gì vậy!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「匂いを嗅いでいる。着替えたものなら、\nそこだけ匂いがしないはずだ」
1161 = "「Anh đang ngửi mùi. Nếu là đồ mới thay, thì chỉ chỗ đó là không có mùi thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　そう？　そう、かなぁ……\n匂いって、体からするような」
1059 = "「Hả? Vậy sao? Có phải vậy, không nhỉ... Mùi hương, thường tỏa ra từ cơ thể mà.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「気が散る。少しだけ黙っていてくれ」
1176 = "「Phân tâm quá. Em im lặng một chút đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「う、うん」
1063 = "「Ư, ừm.」"
# monologue
# JP: （スン、スン）
# 1856 = "（用力聞）" 
# monologue
# JP: ブラウスは違う。\n匂いもするし汗で湿って肌がわずかに透けている。
1335 = "Áo sơ mi thì không phải. Vừa có mùi lại còn ẩm mồ hôi, hơi lộ ra làn da bên trong nữa."
# monologue
# JP: スカーフは小物に含まれようし、\nならば、スカートはどうだろう？
1713 = "Khăn quàng cổ thì chắc được tính là phụ kiện rồi, vậy thì, váy thì sao nhỉ?"
# monologue
# JP: （スンっ――スン――っ！）
1855 = "（Khịt khịt——Khịt khịt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、スカートだ。\n防虫剤の匂いがする」
1104 = "「A, là váy. Có mùi băng phiến.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そっか防虫剤。すごいね、にぃにぃ大正解！\n私、スカートばお着替えしたとよ」
1065 = "「A, ra là băng phiến. Tuyệt quá, anh hai đoán đúng phóc rồi! Em, đã thay váy đấy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「何故、スカートだけを？」
989 = "「Tại sao, lại chỉ thay váy thôi?」"
# 【日々姫】
# display as 日日姬
# JP: 「ここ見て、ここ」
1226 = "「Nhìn chỗ này này, chỗ này.」"
# monologue
# JP: （ひょい）
1869 = "（Vén lên）"
# 【双鉄H】
# display as 雙鐵
# JP: 「どこだ？」
1066 = "「Chỗ nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「ここ！　ほら、スカートの一番前側の下」
1244 = "「Chỗ này! Đây này, phần dưới cùng phía trước của váy.」"
# monologue
# JP: （つ――つ――）
1835 = "（Chỉ chỉ）"
# monologue
# JP: 見やすいようにと、日々姫がスカートを持ち上げてくれる。\n前側の、下――と、ああ、これか？
1574 = "Để tôi dễ nhìn hơn, Hibiki vén váy lên. Phía trước, bên dưới——à, cái này sao?"
# 【双鉄H】
# display as 雙鐵
# JP: 「汚れがこびりついているな。\n緑色の……これは、絵の具か？」
1243 = "「Bị dính bẩn rồi này. Màu xanh lá... cái này, là màu vẽ à?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、[ゆさい,1]油彩のテルベルト。\nめったに使わんけん、キャップが固まっちゃってて」
1135 = "「Vâng, là màu sơn dầu Terre Verte.\nVì hiếm khi dùng nên nắp bị cứng lại mất」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ほう」
1062 = "「Ồ」"
# 【日々姫】
# display as 日日姬
# JP: 「むにゅってなって慌ててコスって、このありさま。\n[はくりざい,2]剥離剤使うと布も変色するっていうけん――やけん」
1229 = "「Thế là nó phụt ra, em vội vàng lau đi thì thành ra thế này.\nNghe nói dùng chất tẩy thì vải cũng bị đổi màu theo luôn――cho nên」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1120 = "「Ừ」"
# monologue
# JP: それで、タンスに仕舞いこんでた。\nそれにわざわざ、着替えてくれた。
1503 = "Thế nên em ấy mới cất nó vào trong tủ.\nVậy mà em ấy lại cất công thay bộ đồ này."
# monologue
# JP: それは、つまりは――
1339 = "Đó, nói cách khác là――"
# 【日々姫】
# display as 日日姬
# JP: 「これ、にぃにぃと居るとき専用の……\nにぃにぃにだけ、見せるスカートにしようと、思って」
1164 = "「Cái này, là đồ chuyên dụng khi ở cùng anh hai......\nEm định biến nó thành chiếc váy chỉ để cho một mình anh hai xem thôi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、もっと良く見せてくれ」
1247 = "「Nếu vậy, thì hãy cho anh xem kỹ hơn đi」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
1262 = "「っ!」"
# monologue
# JP: 少し離れてまじまじ見れば、\n日々姫は僕の視線に気づき、両肩をぴくりと震わせる。
1491 = "Khi tôi lùi lại một chút và chăm chú nhìn,\nHibiki nhận ra ánh mắt của tôi, hai vai khẽ run lên."
# monologue
# JP: ……だが、スカートは降ろさない。\n見えているのをわかった上で、僕の視線を受け止めている。
776 = "......Nhưng, em ấy không buông váy xuống.\nDù biết là đang bị nhìn thấy, em ấy vẫn chấp nhận ánh mắt của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「可愛いパンツだな。\n日々姫に良く似あってる」
1240 = "「Quần lót dễ thương thật đấy.\nRất hợp với Hibiki」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……うん。ありがと」
1089 = "「A......vâng. Cảm ơn anh」"
# 【双鉄H】
# display as 雙鐵
# JP: 「似合ってるが……少し、汚れてしまっているな」
1005 = "「Hợp thì hợp thật nhưng......hơi bị bẩn một chút rồi nhỉ」"
# monologue
# JP: （くちゅっ）
1868 = "（Nhóp nhép）"
# 【日々姫】
# display as 日日姬
# JP: 「あんっ」
1096 = "「A」"
# monologue
# JP: 濡れて張り付き形を透かすスジに沿い、\nわずかに指先を押し込むだけで、重く湿った音がする。
1485 = "Dọc theo đường rãnh ướt át hằn rõ qua lớp vải,\nchỉ cần hơi ấn nhẹ đầu ngón tay vào là đã phát ra âm thanh ẩm ướt nặng nề."
# 【双鉄H】
# display as 雙鐵
# JP: 「パンツを見せているだけで、\nこれほど濡れるものなのか？」
995 = "「Chỉ mới cho xem quần lót thôi,\nmà đã ướt đến mức này rồi sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「見、見られてるからっていうのもあるけど――\nでも、もっと……あの、その前」
1207 = "「Cũng, cũng có phần là do bị nhìn――\nNhưng mà, còn hơn thế nữa......ưm, trước đó」"
# 【双鉄H】
# display as 雙鐵
# JP: 「その前？」
1138 = "「Trước đó?」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにが、お鼻……くんくんってして、それで、\nにぃにに、私の、匂い……嗅がれてるって、思ったら」
1255 = "「Anh hai, dùng mũi......ngửi ngửi, thế là,\ncứ nghĩ đến việc, mùi của em......đang bị anh hai ngửi thấy」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ほう」
# 1062 = "「哦」" 
# monologue
# JP: （くいっ）
1865 = "（Áp sát）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっんっ！？」
1034 = "「Hyaa!?」"
# monologue
# JP: 指を外してその変わり、\n鼻先をおまんこのスジに当てて動かす。
1475 = "Tôi rút ngón tay ra, thay vào đó,\náp chóp mũi vào rãnh âm đạo của em ấy rồi cọ xát."
# monologue
# JP: （くいっ――くっ――くんっ）
1840 = "（Áp sát——Hự——Ngửi ngửi）"
# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　にぃにっ、へ、変態っぽい――かもっ――\nんっ――お鼻で、おまんこ――すりすり、なん、てっ」
1046 = "「A!? Anh hai, c-có vẻ hơi biến thái――đấy――\nƯm――Dùng mũi, cọ cọ――vào âm đạo――như thế」"
# monologue
# JP: （すリ――すり――ぐいっ）
1791 = "（Cọ cọ——Cọ cọ——Giật mạnh）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ！？　だめっ――ンッ――ぐいって、\nしたら――あっ――匂い、濃くなるっ――」
1036 = "「Hyaa!? Không được――Ưm――Ấn mạnh vào,\nnhư thế――a――mùi, sẽ đậm hơn mất――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「確かにな」
1212 = "「Đúng thật nhỉ」"
# monologue
# JP: 指で触れてたときよりずっと、\n日々姫の蜜の量は増してる。
1625 = "Lượng mật dịch của Hibiki tiết ra\nnhiều hơn hẳn so với lúc tôi chạm tay vào."
# monologue
# JP: 僕の中心を熱くする、\n日々姫の奥から滴る匂いも、どんどん濃密になってくる。
1438 = "Làm cho trung tâm của tôi nóng bừng lên,\nmùi hương rỉ ra từ sâu bên trong Hibiki cũng ngày càng trở nên nồng đậm."
# 【日々姫】
# display as 日日姬
# JP: 「た、確かにって――にぃに」
983 = "「Đ-Đúng thật là sao chứ――anh hai」"
# monologue
# JP: すん、と小さな音がする。\n日々姫は自分でも、匂いを嗅いでいるのだろうか。
1601 = "Một âm thanh khịt mũi nhỏ vang lên.\nCó lẽ bản thân Hibiki cũng đang ngửi mùi của chính mình."
# 【日々姫】
# display as 日日姬
# JP: 「ど……どんな、匂いば……する、と？\nわた――し――私の――おま、ん、こ」
1201 = "「Có......có mùi......gì, vậy anh?\nÂm――đạo――của――em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「どんな、といえば――そうだな」
1231 = "「Nếu hỏi là mùi gì thì――để xem nào」"
# monologue
# JP: （ぐいっ――こしゅっ）
# 1791 = "（上下磨蹭）" 
# 【日々姫】
# display as 日日姬
# JP: 「んんんうっつ」
1126 = "「Ưm ưm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫の体の匂いとは違い、おまんこの匂いは……」
1149 = "「Khác với mùi cơ thể của Hibiki, mùi âm đạo thì......」"
# monologue
# JP: （ぐいっ――くんっ――すうっ――すうっ）
1831 = "（Áp sát——Ngửi ngửi——Hít——Hít）"
# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　鼻をうずめて――ンッ――おまんこ、でっ\n――すぅはぁっ――しちゃっ――やぁんっ！」
1048 = "「A!? Vùi mũi vào――Ưm――âm đạo,\nrồi――hít hà――như thế――không chịu đâu!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……おまんこ自体は、そんなに匂わないのだな。\nヨーグルトドリンクのような、かすかに酸っぱい匂いだ」
789 = "「......Bản thân âm đạo thì không nặng mùi đến thế.\nCó một chút mùi chua nhè nhẹ giống như sữa chua uống vậy」"
# 【日々姫】
# display as 日日姬
# JP: 「はうっ」
1106 = "「Hau」"
# monologue
# JP: （むわっ）
1850 = "（Nóng hổi）"
# monologue
# JP: おまんこの匂いがわずかに濃くなり、その何倍も、\n甘くどろりとしたような、日々姫の匂いが強くなる。
1413 = "Mùi âm đạo trở nên nồng hơn một chút, và gấp nhiều lần như thế,\nmùi hương của Hibiki lại càng trở nên ngọt ngào và sền sệt hơn."
# monologue
# JP: 体臭なのか、俗に言われるフェロモンの匂いなのかは\n僕には判別できないが――
1711 = "Tôi không thể phân biệt được đây là mùi cơ thể\nhay là mùi pheromone như người ta vẫn thường nói, nhưng――"
# 【双鉄H】
# display as 雙鐵
# JP: 「混じり合うから、濃くなるのだな。\n日々姫自身の匂いと、おまんこの匂いと、そして――」
1218 = "「Hòa quyện vào nhau nên mới nồng như vậy nhỉ.\nMùi của chính Hibiki, mùi âm đạo, và cả――」"
# monologue
# JP: （じゅるるるるるっ！）
1796 = "（Chùn chụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！？　アッ――おまんこ――じゅうって！\nパンツの、上、から――ちゅうちゅう――吸われ――ん」
1100 = "「A!? A――Âm đạo――kêu chụt chụt!\nTừ, bên trên, quần lót――bị hút――chùn chụt――ưm」"
# monologue
# JP: パンツに滲む日々姫の汁を思う存分すいまくり、\n代わりに僕の唾液を、なすりつけるように染みさせる。
1483 = "Tôi thỏa thích hút lấy dòng mật dịch của Hibiki thấm trên quần lót,\nvà thay vào đó là chà xát để nước bọt của tôi thấm đẫm vào."
# monologue
# JP: 薄布越しにもわかるほど、日々姫のおまんこはヒクついて、\n挿れて欲しいと、舌に吸いつきおねだりしてくる。
1708 = "Dù qua lớp vải mỏng cũng có thể nhận ra, âm đạo của Hibiki đang co giật,\nhút chặt lấy lưỡi tôi như thể đang cầu xin được đưa vào."
# 【双鉄H】
# display as 雙鐵
# JP: 「ん――ぷあっ――それから、僕の唾液や、汗や、\n体液の匂いが、全部、混じって」
1111 = "「Ưm――Phù――Sau đó, mùi nước bọt, mồ hôi,\nvà cả thể dịch của anh, tất cả, hòa quyện lại với nhau」"
# 【日々姫】
# display as 日日姬
# JP: 「好き……\n私も、好き、なの――にぃにの――匂い」
1160 = "「Em thích......\nEm cũng, thích, lắm――mùi hương――của anh hai」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、もっと染みこませよう」
1250 = "「Nếu vậy, thì để anh làm cho nó thấm nhiều hơn nữa nhé」"
# monologue
# JP: （じゅるるるるるうっっっっ！）
1802 = "（Chùn chụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「くひゅうううううんっ！！！」
1125 = "「Ưm a!!!」"
# monologue
# JP: 唾液を熱心に擦り込むほどに、\n日々姫のおまんこは熱を帯びヒクつきを激しくさせる。
1496 = "Càng thoa nhiều nước bọt lên,\nâm đạo của Hibiki càng trở nên nóng rực và co giật dữ dội hơn."
# monologue
# JP: 匂いもどんどん濃くなって――\nん？
1613 = "Mùi hương cũng ngày càng nồng hơn――\nHửm?"
# monologue
# JP: （くんっ）
1862 = "（Ngửi ngửi）"
# monologue
# JP: 鼻をつく、\n今までにはなかった、アンモニア臭。
1492 = "Một mùi amoniac xộc thẳng vào mũi,\nmùi hương mà từ nãy đến giờ chưa hề có."
# 【双鉄H】
# display as 雙鐵
# JP: 「ぷあっ――ん、む――日々姫。\nお前……ひょっとしておしっこをしたいのか？」
1056 = "「Phù――ưm, này――Hibiki.\nEm......không lẽ là đang buồn tè sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃぁんっ」
1024 = "「Hyaan」"
# monologue
# JP: ひゃあ、といやぁんの中間のような声を出し。
1600 = "Em ấy phát ra một âm thanh như thể pha trộn giữa tiếng \"Hyaa\" và \"Iyaan\"."
# monologue
# JP: 日々姫は真っ赤になりつつも、\n素直な答えを聞かせてくれる。
1374 = "Mặc dù mặt đỏ bừng,\nHibiki vẫn ngoan ngoãn trả lời tôi."
# 【日々姫】
# display as 日日姬
# JP: 「だって……だってにぃにが、あんまり熱心に、\nくんくんして、ぺろぺろするから――だからぁ」
1251 = "「Tại vì......tại vì anh hai cứ mải mê,\nngửi ngửi rồi liếm láp mãi thôi――nên là」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ともかく、漏らしてはコトだ。\n少し待て」
981 = "「Dù sao thì, tè dầm ra đấy thì rắc rối to.\nĐợi anh một chút」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　にぃに」
1057 = "「Hả!? Anh hai」"
# monologue
# JP: 急いであれこれ整えて、日々姫の部屋へ舞い戻る。
1465 = "Tôi vội vàng chuẩn bị vài thứ rồi quay trở lại phòng của Hibiki."
# monologue
# JP: 日々姫は律儀にスカートの裾を持ち上げたまま、\n僕の帰りを待っててくれる。
1562 = "Hibiki vẫn ngoan ngoãn vén vạt váy lên,\nchờ đợi tôi quay lại."
# 【双鉄H】
# display as 雙鐵
# JP: 「バスタオルを何枚かと、洗面器とを持ってきた」
1167 = "「Anh mang đến vài chiếc khăn tắm với cái chậu rửa mặt đây」"
# monologue
# JP: 開かれている足の間の床の上へとバスタオルを敷き、\n日々姫の股間の位置を見極め、洗面器を置く。
1460 = "Tôi trải khăn tắm xuống sàn giữa hai chân đang mở rộng của em ấy,\ncăn đúng vị trí đũng quần của Hibiki rồi đặt chậu rửa mặt xuống."
# 【双鉄H】
# display as 雙鐵
# JP: 「これで、漏らしても床には染みまい」
1242 = "「Thế này thì, dù có tè dầm ra cũng không thấm xuống sàn đâu」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　あの……にぃに――」
1061 = "「Hả? Dạ......anh hai――」"
# monologue
# JP: はぁはぁと、日々姫の呼吸が荒くなる。\n額に首に汗が浮かんで、瞳が熱っぽく潤んでる。
1584 = "Hibiki thở hổn hển, nhịp thở trở nên gấp gáp.\nMồ hôi rịn trên trán và cổ, đôi mắt ướt át đầy đê mê."
# 【日々姫】
# display as 日日姬
# JP: 「ここで……漏らすと？\n私、おしっこ――トイレ、行かんで」
1204 = "「Tè dầm......ở đây luôn sao?\nEm, đi tè――không vào nhà vệ sinh mà――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「トイレ？」
1154 = "「Nhà vệ sinh?」"
# monologue
# JP: いや、ああ、そうか。\n興奮しすぎて視野が極限まで狭窄していた。
1383 = "À, ra là vậy.\nVì quá hưng phấn nên tầm nhìn của tôi đã bị thu hẹp đến mức cực hạn."
# 【双鉄H】
# display as 雙鐵
# JP: 「すまん、日々姫」
1173 = "「Xin lỗi nhé, Hibiki」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん！？　謝らんでよかよ！？」
979 = "「Không sao đâu!? Anh không cần phải xin lỗi đâu!?」"
# monologue
# JP: 僕のうっかりをすぐ許し、\nこっくり日々姫は頷いて――！！？
1563 = "Em ấy ngay lập tức tha thứ cho sự bất cẩn của tôi,\nvà khẽ gật đầu――!!?"
# 【日々姫】
# display as 日日姬
# JP: 「ん……ふ……ぁっ」
1112 = "「Ưm......phù......a」"
# monologue
# JP: うめき声。濃くなるアンモニアの匂い。\nぷるぷる震える日々姫の内股。
1578 = "Một tiếng rên rỉ. Mùi amoniac trở nên nồng nặc hơn.\nHai đùi trong của Hibiki run rẩy bần bật."
# monologue
# JP: ――そしてパンツに、黄色い染みがじゅん、と湧く。
772 = "――Sau đó, một vết ố vàng từ từ loang ra trên chiếc quần lót."
# 【日々姫】
# display as 日日姬
# JP: 「……にぃにが、見たいって……言ってくれるなら……\nん……私……する、から……おも、らし……する、から」
787 = "「......Nếu anh hai nói......muốn xem......\nƯm......thì em......sẽ làm, mà......sẽ tè, dầm......mà」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 
# monologue
# JP: 僕の、『すまん』を、日々姫は誤解したらしい。
1568 = "Có vẻ như Hibiki đã hiểu lầm lời \"xin lỗi\" của tôi."
# monologue
# JP: 止めようとする声が張り付くその間にももう、\n浮かんだ染みは珠となり、ぼとぼと滲んで落ちていく。
1454 = "Trong lúc tôi còn đang nghẹn lời định cản lại,\nvết ố đã đọng thành giọt, rỏ từng giọt tí tách xuống."
# monologue
# JP: （ぷ……しゃ――じょろ……ろ……ろっ）
1853 = "（Tí......tách——Tí......tách......tách）"
# monologue
# JP: 緊張のせいか、パンツが壁になってるせいか、\nそれとももともとがそうなのか。
1338 = "Không biết là do căng thẳng, do quần lót cản lại,\nhay vốn dĩ đã như vậy."
# monologue
# JP: 日々姫の尿には勢いがなく、恥じらうように、\nパンツに染みては黄色く膨らみ垂れ落ちる。
1587 = "Dòng nước tiểu của Hibiki không có lực, như đang e thẹn,\nthấm vào quần lót, đọng thành giọt màu vàng rồi nhỏ xuống."
# 【日々姫】
# display as 日日姬
# JP: 「や……私……おとな……なの、に……おもらし……\nにぃにに……見られて……しちゃ、って……んっ！」
1023 = "「A......Em......rõ ràng là......người lớn rồi, mà......lại tè dầm......\nBị anh hai......nhìn thấy......đang tè, thế này......ưm!」"
# monologue
# JP: ぴゅっと、勢い良く尿が飛び。\nそのあとはまた、ぼとぼとじょろじょろ垂れ落ちる。
1425 = "Nước tiểu bỗng phun ra mạnh mẽ.\nSau đó lại tiếp tục rỏ xuống từng giọt tí tách."
# monologue
# JP: 日々姫の太ももをつたったものは、\nソックスにまで滲みそうで――
1614 = "Những giọt nước chảy dọc theo đùi của Hibiki,\ncó vẻ như sắp thấm cả vào đôi tất――"
# monologue
# JP: （ぺろっ）
1863 = "（Liếm nhẹ）"
# 【日々姫】
# display as 日日姬
# JP: 「ふやっ！？　にぃに――舐めてっ――んっ――\nふあっ――あっ――ぺろ、ぺろ――おも――らしっ」
1042 = "「Hyaa!? Anh hai――đang liếm――ưm――\nPhù――a――liếm, liếm――nước tiểu――của em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……ん……ぷあっ――ソックスに――んっ――\n染み、ては――れるっ――いかん――だろう」
1114 = "「Ưm......ưm......phù――Để thấm――ưm――\nvào tất――thì――không――được――mà」"
# 【日々姫】
# display as 日日姬
# JP: 「や……あっ――にぃにの、ぺろぺろ――んっ――\n登って……きてる――ふっ――あ――あっ――んっ！！」
1021 = "「A......a――Anh hai, đang liếm――ưm――\nLiếm dần lên......trên――phù――a――a――ưm!!」"
# monologue
# JP: （じゅるるるるうぅぅぅぅぅっ！）
1794 = "（Chùn chụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃああんっ！！？」
1033 = "「Hyaaaan!!?」"
# monologue
# JP: たっぷり尿の染みたパンツを、\n唇で絞るようにして舐め洗いする。
1489 = "Tôi dùng môi mút chặt lấy chiếc quần lót đẫm nước tiểu,\nnhư thể đang vắt kiệt nó."
# monologue
# JP: 力をいれればじゅわりと尿が溢れだし、\n味も一気に広がってくる。
1500 = "Chỉ cần dùng sức một chút là nước tiểu lại trào ra,\nmùi vị cũng lập tức lan tỏa trong khoang miệng."
# 【双鉄H】
# display as 雙鐵
# JP: （しょっぱくて――ぬるくて――えぐい。\nなんとも、尿とはこういう味だという味だなぁ）
1847 = "（Hơi mặn――ấm ấm――và chát chát.\nĐúng là, nước tiểu thì phải có vị như thế này nhỉ）"
# 【日々姫】
# display as 日日姬
# JP: 「やっ――あっ――私の――おもらし――パン、つ――\nにぃにが、ベロで――ちゅう、って――んううっ！！！」
1010 = "「A――a――Quần lót――tè dầm――của em――\nAnh hai, dùng lưỡi――mút, lấy――ưm ưm!!!」"
# monologue
# JP: （ぷちゅっ！）
1806 = "（Phụt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 
# monologue
# JP: 日々姫が、軽く達したのだろうか？\n口内に弾けたそれは、尿混じりだが――おまんこの蜜だ。
1577 = "Có phải Hibiki vừa mới đạt cực khoái nhẹ không?\nThứ bắn vào trong miệng tôi, tuy có lẫn cả nước tiểu――nhưng đó là mật dịch từ âm đạo của em ấy."
# monologue
# JP: 僕も、イキたい。\n素直に思い――日々姫の股間から唇を離す。
1447 = "Tôi cũng, muốn ra.\nNghĩ vậy――tôi liền rời môi khỏi đũng quần của Hibiki."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫？　パンツを脱いでくれるか？\nそれから、上も――」
1196 = "「Hibiki? Em cởi quần lót ra được không?\nSau đó, cả phần trên nữa――」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……うん――んっ――っと――ぐじゅぐじゅで――\nちょっと――脱ぎづらい……かもっ――ん！」
1088 = "「A......vâng――ưm――a――ướt nhẹp hết rồi――\nCó lẽ――hơi khó cởi một chút......ưm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「かわいいな、とても」
1192 = "「Đáng yêu lắm, cực kỳ đáng yêu」"
# 【日々姫】
# display as 日日姬
# JP: 「はうっ――」
1105 = "「Hau――」"
# monologue
# JP: 日々姫の乳首は、\n舐めてほしそうに勃起し小さく震えてる。
1582 = "Hai núm vú của Hibiki,\ncương cứng và khẽ run lên như thể đang mời gọi tôi liếm láp."
# monologue
# JP: そうしたいのは、僕も同じだ。\nだが、今は――
1696 = "Tôi cũng rất muốn làm vậy.\nNhưng mà, bây giờ thì――"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫の肌も、\nぐじゅぐじゅに濡れてしまっているな」
1191 = "「Làn da của Hibiki,\ncũng ướt nhẹp hết cả rồi nhỉ」"
# monologue
# JP: （ちゅっ）
1864 = "（Chụt）"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――んっ――直、接っ――ふあっ――んっ」
1077 = "「A――ưm――Trực, tiếp――phù――ưm」"
# monologue
# JP: （れるっ――れろっ――じゅぶっ――ぢゅうっ）
1793 = "（Liếm——Liếm——Chụt——Chụt）"
# monologue
# JP: おまんこの肉の割れ目を開けば、\n中にたまってた尿が飛び出し口へと入る。
1494 = "Khi tôi tách khe thịt âm đạo ra,\nlượng nước tiểu đọng lại bên trong liền bắn ra và lọt vào miệng tôi."
# monologue
# JP: 尿道口を、膣口を舐めて綺麗にし、\nそれからいったん、ふとももの付け根を舐めまわす。
1473 = "Tôi liếm sạch sẽ lỗ niệu đạo và cửa mình,\nsau đó chuyển sang liếm láp quanh gốc đùi em ấy."
# 【日々姫】
# display as 日日姬
# JP: 「きもち……いっ――んっ――好き……ぺろぺろ……\nにぃにに、ぺろぺろ……されるの――大、好き」
1145 = "「Sướng......quá――ưm――Em thích......liếm liếm......\nĐược anh hai, liếm liếm......thế này――Em thích, lắm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ほうは」
1241 = "「Vậy sao」"
# monologue
# JP: （れろおおおおおっっ）
1857 = "（Liếm láp）"
# 【日々姫】
# display as 日日姬
# JP: 「くふうううううんっっっ」
1123 = "「Ưm a」"
# monologue
# JP: 尿をつたって、とどまることなく舌を滑らす。
1423 = "Tôi trượt lưỡi không ngừng theo dòng nước tiểu."
# monologue
# JP: パンツが覆ってた範囲はすべて、\n余すところなく塩っぽい味に覆われている。
1358 = "Tất cả những vùng da từng bị quần lót che phủ,\nđều đọng lại hương vị mằn mặn không sót chỗ nào."
# 【日々姫】
# display as 日日姬
# JP: 「あ……にぃ、に――」
1095 = "「A......Anh, hai――」"
# monologue
# JP: 期待と、不安が入り交じる声。
1591 = "Một giọng nói đan xen giữa kỳ vọng và bất an."
# monologue
# JP: 尿は、尻にまでつたってしまった。\nならば日々姫が止めない限り、僕は綺麗に舐めとるのみだ。
1421 = "Nước tiểu đã chảy xuống tận mông.\nNếu vậy, chừng nào Hibiki chưa bảo dừng lại, tôi sẽ tiếp tục liếm sạch sành sanh."
# monologue
# JP: （ぐいっ）
1828 = "（Tách ra）"
# monologue
# JP: 尻肉を掴み大きく割って――
1479 = "Tôi bóp lấy hai bầu mông thịt rồi vạch rộng ra――"
# monologue
# JP: （ぺろっ）
# 1863 = "（舔）" 
# 【日々姫】
# display as 日日姬
# JP: 「んひゃううううっ！？　ひあっ――おひっ――\nそこっ――にぃに――おしりっ――ふあ――あっ！！？」
1121 = "「Ưm hyaa!? Hya――Mô――\nChỗ đó――Anh hai――Mông――phù――a!!?」"
# monologue
# JP: （ぺろっ――れろっ――ちゅぷっ――――にゅるる！）
# 1793 = "（來回舔舐）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！？　あっ！　べろっ――やっ――にゅうって！\nおしり――中、まで――なめてっ――ふあ、あ、あっ！」
1041 = "「Hyaa!? A! Lưỡi――a――đang chui vào!\nMông――Bên trong, cũng――bị liếm――phù, a, a!」"
# monologue
# JP: （きゅうううっ！！！）
1844 = "（Thắt chặt!!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 
# monologue
# JP: 肛門がキュっと締め付けてきて、\n舌が苦しいほどになる。
1400 = "Hậu môn bỗng co thắt lại,\nsiết chặt đến mức khiến lưỡi tôi phát đau."
# monologue
# JP: 慌てて日々姫から口を外せば、\n日々姫はもう、膝をがくがく震わせている。
1498 = "Tôi vội vàng rút miệng khỏi người Hibiki,\nthấy hai đầu gối của em ấy đang run rẩy lập cập."
# 【双鉄H】
# display as 雙鐵
# JP: 「そんなに、お尻が気持ちいいのか？」
1152 = "「Mông được liếm sướng đến vậy sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「う、うん。恥ずかし……けど――えと……\n私……私、あの――お尻――ぺろ、ぺろ――され、て」
1117 = "「V-Vâng. Dù xấu hổ......nhưng mà――ưm......\nEm......em, cái đó――mông――được liếm, liếm――」"
# monologue
# JP: （ぐっ）
1867 = "（Nằm sấp）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 
# monologue
# JP: ベッドに上体を倒れこませて、\n日々姫がお尻を僕へと突き出す。
1558 = "Hibiki ngả nửa thân trên xuống giường,\nrồi chổng mông về phía tôi."
# monologue
# JP: 上体だけを振り返らせて、\n潤んだ瞳で――おねだりしてくる。
1622 = "Em ấy chỉ ngoảnh nửa người lại,\nvà dùng đôi mắt ướt át――như đang nài nỉ tôi."
# 【日々姫】
# display as 日日姬
# JP: 「お尻……もっと、して欲しいかな――って」
1150 = "「Mông......Em muốn, được làm nhiều hơn nữa――ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
# 1241 = "「這樣啊」" 
# 【日々姫】
# display as 日日姬
# JP: 「あ……けどその前に、ちゅうも――\nキスも、して欲しい」
1081 = "「A......nhưng trước đó, hôn em――\nEm cũng muốn, được hôn nữa」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん――」
# 1107 = "「嗯――」" 
# 【日々姫】
# display as 日日姬
# JP: 「あ……ちゅっ――んっ――ちゅうっ――\nちゅむ……ん……はっ――ん――大好き……にぃに」
1086 = "「A......chụt――ưm――chụt――\nChùn chụt......ưm......hà――ưm――Em yêu anh lắm......anh hai」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ」
1157 = "「Anh cũng yêu em」"
# monologue
# JP: （れるうっ）
# 1863 = "（舔）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひゃんっ！」
1026 = "「Hyan!」"
# monologue
# JP: キスを解いた舌でそのまま、\n日々姫の体を舐めなぞっていく。
1678 = "Ngay khi vừa dứt nụ hôn, tôi dùng chính chiếc lưỡi ấy,\nliếm láp trượt dọc theo cơ thể của Hibiki."
# monologue
# JP: 顎から首筋、鎖骨、おっぱい――\n乳首も軽くついばんで、脇腹――太もも――
1436 = "Từ cằm xuống gáy, xương quai xanh, bầu ngực――\nTôi khẽ mút lấy núm vú, rồi trượt xuống mạn sườn――bắp đùi――"
# monologue
# JP: （ちゅうっっ）
1803 = "（Chụt）"
# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！　は――あっ――これっ――おしりっ――\nんっ――あっ――れろって――される、とぉ――んっ」
1027 = "「Hyaa! Hà――a――Thế này――mông――\nƯm――a――Bị liếm――thế này, thì――ưm」"
# monologue
# JP: （れろっ――ねぶっ――にゅっ――にゅるっ――）
# 1793 = "（來回舔舐）" 
# monologue
# JP: 日々姫のお尻の穴の内側は、苦くて渋い味がする。
1592 = "Bên trong lỗ hậu môn của Hibiki có vị đắng và chát."
# monologue
# JP: 舌先が少しひりひりとして、\n唾液がどくどく、口内にとめどなく湧いてくる。
1667 = "Đầu lưỡi tôi hơi tê rát,\nnhưng nước bọt vẫn không ngừng ứa ra đầy trong khoang miệng."
# monologue
# JP: （てろおおおおおおおっ）
1852 = "（Chảy xuống）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃうっ！？　あっ――なにっ――なんか――\nんっ――おしり――どろっ――って――ふ――あっ」
1039 = "「Hyaa!? A――Cái gì――thứ gì đó――\nƯm――Mông――nhơm nhớp――vậy――phù――a」"
# monologue
# JP: 舌を使って唾液を押し出し、\n日々姫のお尻に流し込む。
1488 = "Tôi dùng lưỡi đẩy nước bọt ra,\nrồi truyền thẳng vào hậu môn của Hibiki."
# monologue
# JP: 肛門がキュウと収縮するが、\n予期できたゆえ、今度はさほど驚かずにすむ。
1401 = "Hậu môn lại co thắt mạnh một cái,\nnhưng vì đã đoán trước được nên lần này tôi không mấy ngạc nhiên."
# 【日々姫】
# display as 日日姬
# JP: 「あっ――やっ――おしり――の穴っ――んっ――\n勝手に――くぱ――くぱっ――して――きちゃ、んっ」
1070 = "「A――a――Lỗ――hậu môn――ưm――\nTự động――đóng――mở――rồi, ưm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「…………」
782 = "「............」"
# monologue
# JP: 生唾を飲む。
1458 = "Tôi nuốt nước bọt."
# monologue
# JP: ひくつき、求めてくれているなら――\nそれはおまんこと変わらない。
1407 = "Nếu nó đang co giật và khao khát tôi――\nthì cũng chẳng khác gì âm đạo cả."
# 【双鉄H】
# display as 雙鐵
# JP: 「……日々姫」
792 = "「......Hibiki」"
# monologue
# JP: 言葉に出して聞くのは罪深いような気がして、\nひくつくお尻の穴へと勃起の先をただ押し当てる。
1467 = "Cảm thấy nói ra thành lời thì quá đỗi tội lỗi,\ntôi chỉ biết áp đầu dương vật đang cương cứng vào lỗ hậu môn đang co giật ấy."
# 【日々姫】
# display as 日日姬
# JP: 「あ……挿れる……と？」
1094 = "「A......Anh muốn cho vào......sao?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうしてみたい。\n求められているような気がして――」
1166 = "「Anh muốn thử.\nCảm giác như nó đang đòi hỏi anh vậy――」"
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ――あっ――」
1053 = "「Phù――a――」"
# monologue
# JP: 頬を赤らめ、口をぱくぱく開いては閉じ。
1571 = "Đôi má em ấy ửng đỏ, miệng cứ mở ra rồi lại khép vào."
# monologue
# JP: やがて日々姫は、\nさっきの僕と同じく無言のままに――頷く。
1604 = "Cuối cùng, Hibiki cũng giống như tôi lúc nãy,\nim lặng――và khẽ gật đầu."
# monologue
# JP: （ずろおおおおおおおおおおおおおおっっ！！）
1854 = "（Phập!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃはっ！？　あっ――あっ――は――くっ――」
1037 = "「Hyaa!? A――a――Hà――hự――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぬ――あっ――」
1050 = "「Ư――a――」"
# monologue
# JP: まずは先端。
1608 = "Ban đầu tôi chỉ định cho phần đầu vào."
# monologue
# JP: ただそれだけをと思った勃起はけれど、\n肛門の隘路を抜ければ、一気に奥へと刺さってしまう！
1641 = "Tuy nhiên, dương vật đang cương cứng của tôi,\nsau khi xuyên qua đường hầm chật hẹp của hậu môn, đã đâm tọt vào tận sâu bên trong!"
# monologue
# JP: （ぱちっ――）
1799 = "（Bốp——）"
# 【日々姫】
# display as 日日姬
# JP: 「深……か――ぁッ――はっ――熱……いっ――ふっ」
1142 = "「Sâu......quá――a――hà――Nóng......quá――phù」"
# 【双鉄H】
# display as 雙鐵
# JP: 「く――むっ――」
1049 = "「Hự――ưm――」"
# monologue
# JP: （ぬろ――ろっ――ろおおっ――）
1860 = "（Nhóp——nhép——nhóp nhép——）"
# 【日々姫】
# display as 日日姬
# JP: 「ひ――あっ！\nお、おしりっ――なかみ――はがれ――るっ――」
1014 = "「Hi――a!\nM-Mông――bên trong――như bị lột ra――vậy――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぉ――むっ――」
# 1049 = "「呃――唔――」" 
# monologue
# JP: 圧倒的な快感情報に塗りつぶされて真っ白だった脳内に、\nようやく酸素が、そして言葉が復活してくる。
1434 = "Bộ não vốn đang trống rỗng vì bị lấp đầy bởi luồng thông tin khoái cảm áp đảo,\ncuối cùng cũng được cung cấp lại oxy, và ngôn từ cũng dần phục hồi."
# 【双鉄H】
# display as 雙鐵
# JP: （これは――すごいな。\nおまんこと、これほど違うのか――）
1873 = "（Cái này――tuyệt thật.\nKhông ngờ lại khác biệt với âm đạo đến mức này――）"
# monologue
# JP: ぴっちりしてる。つるつるしてる。
1455 = "Vừa khít khao. Lại vừa trơn tuột."
# monologue
# JP: 肛門だけが強すぎるほど締め付けて、\n肛門の中は、締めるのではなく張り付いてくる。
1659 = "Chỉ có phần hậu môn là siết lại cực kỳ chặt,\ncòn bên trong thì không siết mà lại dính chặt lấy."
# monologue
# JP: （ぬるっ――るっっ――るっ――ぱちゅんっ！）
1795 = "（Nhóp——nhép——nhép——phụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「んっ――ふっ――きゅっ――はあっ」
1109 = "「Ưm――phù――ưm――hà」"
# monologue
# JP: 日々姫はぜぇぜぇ、背中で大きく呼吸している。
1589 = "Hibiki thở dốc, tấm lưng nhấp nhô theo từng nhịp thở lớn."
# monologue
# JP: それを少しでも和らげたくて、\n密着したまま腕を伸ばして――
1619 = "Muốn xoa dịu em ấy dù chỉ một chút,\ntôi vừa giữ nguyên tư thế áp sát vừa vươn tay ra――"
# monologue
# JP: （ふにっ――もみゅっ――）
1837 = "（Nắn bóp——Xoa nắn——）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ――あっ――おっぱい――ンッ――\nにぃに――優、しいっ――ふっ――んっ」
1013 = "「Hyaa――a――Ngực――ưm――\nAnh hai――dịu, dàng quá――phù――ưm」"
# monologue
# JP: 甘い声。\n肛門の強い締め付けも、わずかにながら緩んでくれる。
1397 = "Một giọng nói ngọt ngào vang lên.\nSự siết chặt mạnh mẽ của hậu môn cũng dần nới lỏng ra một chút."
# monologue
# JP: （ぬるうううううううううううううっっっ！）
1832 = "（Trượt ra!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ――あっ――らめっ――そんな――\nずるって――抜いちゃっ――んっ――おひりっ――」
1009 = "「Hyaa――a――Không được――làm vậy――\nTuột ra――rút ra mất――ưm――mông em――」"
# monologue
# JP: （ずぶうううううううううううっ！）
1804 = "（Phập!）"
# 【日々姫】
# display as 日日姬
# JP: 「きゃふっ！！　あっ――うごく――のっ――おしりっ、\n穴の――なか――にぃに、に――えぐられ――てっ――」
1031 = "「Kyafu!! A――Đang di chuyển――Mông,\nbên trong――lỗ――Bị anh hai――đào ngoáy――」"
# monologue
# JP: （ずぶっ！　ずばっ！　ずぼっ！　ぼちゅっ！）
1851 = "（Phập! Phập! Phập! Phụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「きゃんっ――っ――うっ――はげ――しっ――んっ――\nおしりっ――めくれて――おされ、て――ふ――あっ」
1018 = "「Kyan――ưm――hự――Mãnh――liệt quá――ưm――\nMông em――bị lộn ngược――bị đẩy, vào――phù――a」"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々――姫っ――」
1188 = "「Hibiki――」"
# monologue
# JP: （がしっ！）
# 1799 = "（啪）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひゃんっ！」
# 1026 = "「呀！」" 
# monologue
# JP: 動く。動ける。日々姫も感じてくれている。
1389 = "Chuyển động. Tôi có thể chuyển động rồi. Hibiki cũng đang cảm nhận được nó."
# monologue
# JP: その感触が、僕の最後の歯止めを外す。\n日々姫の腰を捕まえて、ただただ射精のために貫く！
1699 = "Cảm giác đó đã tháo tung chốt chặn cuối cùng trong tôi.\nTôi tóm lấy eo Hibiki, và cứ thế đâm rút liên tục chỉ để được xuất tinh!"
# monologue
# JP: （ずぶっ！　ぶほっ！　ぶっ！　ブチュんっ！！）
1817 = "（Phập! Phập! Phập! Phụt!!）"
# 【日々姫】
# display as 日日姬
# JP: 「やっ！　音っ――はずかしっ――んっ――えっち――\nえっちな――音――おしりっ――んひゅっ――」
1030 = "「A! Âm thanh――xấu hổ quá――ưm――Gợi tình――\nÂm thanh――gợi tình quá――từ mông――ưm hyu――」"
# monologue
# JP: （ずっ！　ばちゅっ！　じゅぶっ！　ばつんっ！！）
# 1817 = "（噗滋！噗滋！噗啾！噗啾！！）" 
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――おっきっ――びくって――なって――んっ\nイクの？　にぃに！　いっしょ！　いっしょにぃっ！」
1254 = "「Anh hai――to quá――giật giật――rồi――ưm\nAnh ra sao? Anh hai! Cùng nhau! Ra cùng nhau nhé!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、一緒にだ」
1132 = "「Ừ, cùng nhau ra nào」"
# monologue
# JP: 精液はもう先端ギリギリまでに来ている。\nならば日々姫に一緒にイってもらうため――
1639 = "Tinh dịch đã dồn lên đến tận đỉnh quy đầu.\nNếu vậy, để Hibiki có thể cùng lên đỉnh――"
# monologue
# JP: （パチンっ！）
1798 = "（Bốp!）"
# 【日々姫】
# display as 日日姬
# JP: 「痛っ！？　あっ――んっ――――――\nきゅふうううううううううううううんんっっっ！！！」
1143 = "「Đau!? A――ưm――――――\nKyufuuuuuuuuuuuuuun!!!」"
# monologue
# JP: （ぎゅうううっ！）
# 1844 = "（收縮壓迫）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
1097 = "「Kua!」"
# monologue
# JP: （びゅっ！　びゅるっ！　どびゅっ！　びゅぶっ！！）
1819 = "（Phụt! Phụt! Phụt! Phụt!!）"
# monologue
# JP: 合図のつもりで叩いた尻が、\n防衛反応かなんなのか、強烈すぎる締め付けを呼びっ！
1481 = "Cái vỗ mông định làm ám hiệu của tôi,\nchẳng biết là do phản xạ phòng vệ hay gì mà lại khiến lỗ hậu môn co thắt lại dữ dội!"
# monologue
# JP: （どびゅっ！　びゅぶっ！　びゅるるっ！　びゅううう）
1814 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「あ……あっ――どくどく――してっ――ふあっ――\nおしり――にぃにの――精、液――あ、つい――んっ」
1084 = "「A......a――Từng đợt――phù――\nMông em――Tinh, dịch――của anh hai――nóng, quá――ưm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ――はっ――あっ――あっ――」
1072 = "「Kua――hà――a――a――」"
# monologue
# JP: 肛門はずっと締め続けてる。
1658 = "Hậu môn vẫn không ngừng siết chặt lại."
# monologue
# JP: 際限無しに絞られそうで、そうでなければうっ血しそうで、\n少し怖くて、まだ精液を出し切らぬうち引き抜いてしまう。
1466 = "Cảm giác như sẽ bị vắt kiệt không giới hạn, nếu không thì cũng bị tụ máu mất,\ntôi hơi sợ nên đã rút ra khi tinh dịch vẫn chưa bắn hết."
# monologue
# JP: （ずるっ――ぴゅっ！）
1816 = "（Phập——Phụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「ゃんっ」
# 1120 = "「嗯」" 
# monologue
# JP: 日々姫の真っ白で丸いお尻を、\n僕の精液がデコレートする。
1580 = "Tinh dịch của tôi vương vãi,\ntrang trí cho cặp mông tròn trịa trắng muốt của Hibiki."
# monologue
# JP: クリームみたいにどろりと垂れる白濁は、\n日々姫のおまんこの割れ目にそって流れて――
1391 = "Dòng chất lỏng trắng đục sền sệt như kem,\nchảy dọc theo rãnh âm đạo của Hibiki――"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々、姫……」
1189 = "「Hibi, ki......」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、にぃに――せっかくのにぃにの精液なのに、\nお尻じゃ――妊娠、できんけん」
1119 = "「Vâng, anh hai――Hiếm hoi lắm mới có được tinh dịch của anh hai,\nmà bắn vào mông thì――không mang thai, được đâu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 
# monologue
# JP: 妊娠させたい。
1461 = "Tôi muốn làm em ấy mang thai."
# monologue
# JP: その想いだけが体に満ちて、\nけれども脳は、少し不安を感じてしまう。
1685 = "Chỉ một suy nghĩ đó thôi cũng đủ lấp đầy cơ thể,\nnhưng trong đầu tôi lại cảm thấy có chút bất an."
# 【双鉄H】
# display as 雙鐵
# JP: （妊娠セックスをするとして――お尻に挿れたそのままを、\n膣内に入れて、安全なのか？）
1820 = "（Nếu làm tình để mang thai――vừa mới đút vào mông xong,\nmà lại cho ngay vào trong âm đạo thì, có an toàn không nhỉ?）"
# monologue
# JP: 些か不安だ――消毒を。\n思えばすぐに、床に落ちてるそれが目につく。
1698 = "Hơi bất an thật――phải khử trùng thôi.\nVừa nghĩ vậy, tôi liền để mắt tới thứ đang rơi trên sàn."
# monologue
# JP: （ぺちょっ）
1843 = "（Nhặt lên）"
# 【日々姫】
# display as 日日姬
# JP: 「やあっ！？　にぃに！！？　なんばしよっと！？\n私の――おも、おも――おもらしパンツでっ」
1044 = "「A!? Anh hai!!? Anh định làm gì vậy!?\nDùng――quần lót, quần lót――tè dầm của em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「お尻から直に膣内はやや安全では無いかと思って。\nアルコール消毒に、これならば丁度いいかと」
1169 = "「Anh nghĩ từ mông chuyển thẳng sang âm đạo thì hơi không an toàn.\nNên dùng cái này để khử trùng bằng cồn thì vừa khéo」"
# 【日々姫】
# display as 日日姬
# JP: 「ティッシュ！　アルコールティッシュあるけんっ！」
1221 = "「Khăn giấy! Có khăn giấy ướt tẩm cồn mà!」"
# monologue
# JP: 日々姫は僕からパンツを奪い、\n代わりにウェットティッシュをくれる。
1573 = "Hibiki giật lại chiếc quần lót từ tay tôi,\nvà đưa cho tôi tờ khăn giấy ướt để thay thế."
# monologue
# JP: それで丁寧に勃起を拭い、\n今度こそ、日々姫の膣口に押し当てる。
1476 = "Tôi cẩn thận lau sạch dương vật đang cương cứng,\nrồi lần này, áp sát nó vào cửa mình của Hibiki."
# monologue
# JP: （ぬぶっ）
1838 = "（Xuyên vào）"
# 【日々姫】
# display as 日日姬
# JP: 「あ……ちょっと――ひんやりしとる、ね」
1092 = "「A......Hơi――mát lạnh, nhỉ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すぐ、燃えるように熱くなる」
1260 = "「Sẽ nóng bừng lên ngay thôi」"
# monologue
# JP: （じゅぶうううううううううううっ！）
1800 = "（Phập!）"
# 【日々姫】
# display as 日日姬
# JP: 「んふううううううううううっっ！！！！」
1124 = "「Ưm phuuuuuuuuuuu!!!!」"
# monologue
# JP: （ずばっ！　じゅっっ！　ずばっ！　じゅぼんっ！）
1805 = "（Phập! Phập! Phập! Phập!）"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――きもちいっ――きもちいいっ！　\nにぃに――おちんちん――すごい――いい――よぉ」
1078 = "「A――sướng quá――sướng quá!\nAnh hai――chim――tuyệt――lắm――đó」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕も――だっ――」
1158 = "「Anh――cũng vậy――」"
# monologue
# JP: 日々姫のおまんこはもう完全にとろとろほぐれ、\nうねり張り付き、僕の勃起を迎えてくれる。
1594 = "Âm đạo của Hibiki giờ đây đã hoàn toàn ướt sũng và mềm nhũn,\nuốn lượn bám chặt lấy, đón nhận dương vật cương cứng của tôi."
# monologue
# JP: 迎えたが最後離しはしないと、必死で抱きつき、\nきゅんきゅん締めて引き抜く動きに抵抗してくる！
1514 = "Đón nhận rồi thì tuyệt đối không buông ra, em ấy ôm chặt lấy tôi,\nliên tục siết chặt lại, chống cự lại từng nhịp rút ra của tôi!"
# monologue
# JP: （ずぶっ！　じゅっ！　ずろおおおっ！　じゅぶうう！）
# 1805 = "（噗啾！噗啾！啾噗！啾噗！）" 
# 【日々姫】
# display as 日日姬
# JP: 「あっ――んっ――それ――しゅごっ――んっ――\nぐりって――しながらっ――ゆっくり――んひゅっ！？」
1076 = "「A――ưm――Chỗ đó――tuyệt quá――ưm――\nVừa――ngoáy――vừa――chậm lại――ưm hyu!?」"
# monologue
# JP: （すぱんっ！　ぱんっ！　ぱんっ！　ぱんっ！！）
1797 = "（Bạch! Bạch! Bạch! Bạch!!）"
# monologue
# JP: ゆっくり動けば深い繋がり。速く動けば強い快感。
1368 = "Chuyển động chậm thì kết nối sâu sắc. Chuyển động nhanh thì khoái cảm mãnh liệt."
# monologue
# JP: えぐってもひねってもこすっても、どう動いても、\n日々姫の可愛いおまんこは、最高の快感を与えてくれる。
1620 = "Dù là khoét sâu, vặn xoắn hay cọ xát, dù chuyển động thế nào đi chăng nữa,\nâm đạo đáng yêu của Hibiki vẫn mang đến cho tôi khoái cảm tột đỉnh."
# monologue
# JP: （くりっ！）
1833 = "（Vê nhẹ!）"
# 【日々姫】
# display as 日日姬
# JP: 「やあっ――乳首っ――つねったら――んっ――あっ」
1007 = "「A――Núm vú――bị véo――ưm――a」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！」
# 1097 = "「啊！」" 
# monologue
# JP: 今すぐにでも射精しそうで、緩めたくって乳首をつねれば、\nまたも日々姫はビクビクきゅんと締め付けてくる。
1468 = "Cảm giác như có thể xuất tinh bất cứ lúc nào, muốn làm dịu đi nên tôi véo núm vú em ấy,\nnhưng Hibiki lại càng giật giật siết chặt lấy tôi hơn."
# monologue
# JP: 肉体的な刺激は常に諸刃の剣だ。\nならば――ならば、心の方を――
1650 = "Kích thích thể xác luôn là con dao hai lưỡi.\nNếu vậy――nếu vậy, hãy bắt đầu từ tâm hồn――"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫、リラックスできないか？\nもっと長くを、日々姫と重なっていたいんだ」
1195 = "「Hibiki, em thư giãn một chút được không?\nAnh muốn hòa quyện cùng Hibiki lâu hơn nữa」"
# monologue
# JP: （ふわっ）
1841 = "（Vuốt ve）"
# monologue
# JP: 出来るかぎりに落ち着けた声。\nゆっくりとした指先で髪をくしけずる。
1450 = "Bằng một giọng nói bình tĩnh nhất có thể.\nTôi chậm rãi dùng những ngón tay vuốt ve mái tóc em ấy."
# monologue
# JP: 途端に日々姫は目をうるませて、\nほうっと、熱い息を吐く。
1376 = "Ngay lập tức, đôi mắt Hibiki ngấn lệ,\nphả ra một hơi thở nóng bỏng."
# 【日々姫】
# display as 日日姬
# JP: 「うん……にぃに……\n私も、ずうっと一緒がよかよ」
1115 = "「Vâng......anh hai......\nEm cũng, muốn ở bên anh mãi thôi」"
# monologue
# JP: （きゅんきゅんきゅんっ！）
# 1844 = "（收縮壓迫）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？」
1264 = "「!?」"
# monologue
# JP: 言葉で気持ちでわかってくれて、\nけれど体は、より一層に僕の精子を求め吸い付く！
1437 = "Em ấy đã hiểu được tâm ý của tôi qua lời nói,\nnhưng cơ thể em ấy lại càng hút chặt lấy, khao khát tinh trùng của tôi hơn bao giờ hết!"
# 【双鉄H】
# display as 雙鐵
# JP: （これは――保たない。\nせめて――日々姫と――日々姫と一緒にっ――）
1825 = "（Thế này thì――không kìm được mất.\nÍt nhất thì――cùng với Hibiki――cùng với Hibiki――）"
# monologue
# JP: 思いは腰の動きに繋がる！
1700 = "Suy nghĩ ấy liền truyền thẳng đến chuyển động của hông!"
# monologue
# JP: （ずるうううううううっ！！！）
# 1832 = "（抽出）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひゃうっ！！？」
# 1033 = "「呀！！？」" 
# monologue
# JP: 一度は大きく腰を引き、\n経験が僕に教えてくれた、日々姫の一番弱い部分へ――
1452 = "Tôi kéo hông lùi lại một nhịp thật sâu,\nrồi nhắm thẳng vào điểm yếu nhất của Hibiki mà kinh nghiệm đã chỉ cho tôi――"
# monologue
# JP: （ぐりいいいいいっ！！！）
# 1838 = "（插入）" 
# 【日々姫】
# display as 日日姬
# JP: 「ゃふっつ――んっ――ふあっ――そこ――らめっ！\nざらざら――ぐりって、しちゃ、ら――んきゅううっ！」
1016 = "「Yafu――ưm――phù――Chỗ đó――không được!\nRam ráp――mà cọ xát, như thế, thì――ưm kyuu!」"
# monologue
# JP: （きゅうううっ！）
# 1844 = "（收縮壓迫）" 
# monologue
# JP: 日々姫は体を大きく震わせ、\n膣を思い切り締め付けてくるっ！
1599 = "Cơ thể Hibiki run lên bần bật,\nvà âm đạo siết chặt lại hết cỡ!"
# monologue
# JP: これなら、\nこれなら日々姫と一緒にっ！！
1697 = "Nếu là thế này,\nnếu là thế này thì có thể cùng với Hibiki!!"
# monologue
# JP: （ずぶっ！　ずばっ！　じゅばっ！　じゅぱんっっ！）
# 1805 = "（噗啾！噗啾！啾噗！啾噗！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――くっ――あっ――\n日々姫！　日々姫！　日々姫！！」
1108 = "「Ưm――hự――a――\nHibiki! Hibiki! Hibiki!!」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　にぃに！　イって！\n子宮で、ぴゅっぴゅしてっ！！」
1128 = "「Vâng! Anh hai! Ra đi anh!\nHãy bắn, vào tử cung của em đi!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
1127 = "「Ưm!」"
# monologue
# JP: お望みどおりおもいっきりに腰を突き出し、\n日々姫の子宮の入り口に、勃起の先端を食い込ませっ！
1517 = "Đúng như mong muốn, tôi đẩy hông tới tấp,\nấn ngập phần đầu dương vật cương cứng vào miệng tử cung của Hibiki!"
# monologue
# JP: （くぽおっっ）
# 1806 = "（噗啾）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひゃああうっ！！！？」
1025 = "「Hyaaaau!!!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！？」
1098 = "「Kua!?」"
# monologue
# JP: （びゅうっ！　びゅくっ！　どびゅっ！　どびゅるっ！）
1812 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ……う――っ――」
1082 = "「A......ư――」"
# 【日々姫】
# display as 日日姬
# JP: 「はっ――あっ――なに――これっ――ふ――んっ――\n吸って――吸ってる――私の、子宮――っ――んっ」
1055 = "「Hà――a――Cái gì――thế này――phù――ưm――\nĐang hút――Tử cung của em――đang hút lấy――ưm」"
# monologue
# JP: 勃起の先端が引っ張られ――\n子宮の口が、僕を吸い込むような感じで――
1626 = "Phần đầu dương vật bị kéo căng ra――\nCảm giác như miệng tử cung đang hút lấy tôi vậy――"
# monologue
# JP: （びゅっ！　びゅるっ！　びゅううっ！　びゅっ！）
1813 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「すご――来て、るっ――妊娠――せい、えきっ――\n子宮の――おくに――私の、卵子に――ぴゅっぴゅって」
1147 = "「Nhiều quá――đang vào――Mang thai mất――Tinh, dịch――\nVào sâu――trong tử cung――bắn thẳng vào――trứng của em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ――あっ」
1073 = "「A――a」"
# monologue
# JP: （びゅるっ――びゅううっ――びゅっ！　ぷっ！）
1811 = "（Phụt——Phụt——Phụt! Phụt!）"
# monologue
# JP: ……実際、そんな感覚がした。
779 = "......Thực tế, tôi cũng có cảm giác như vậy."
# monologue
# JP: 日々姫の膣は、そして子宮は、今まで以上に、最高に、\n僕の精液を必死に求め、余さず絞り尽くしてくれた。
1597 = "Âm đạo và tử cung của Hibiki, hơn bao giờ hết, đã khao khát tinh dịch của tôi một cách mãnh liệt nhất,\nvà vắt kiệt không còn sót lại một giọt nào."
# 【双鉄H】
# display as 雙鐵
# JP: 「ぅあ――」
1068 = "「Ưa――」"
# monologue
# JP: （どさっ）
1842 = "（Đổ sập）"
# monologue
# JP: 日々姫の上に重なるように崩れ落ちれば――
1445 = "Khi tôi đổ gục xuống đè lên người Hibiki――"
# monologue
# JP: （きゅううっ！）
# 1844 = "（收縮壓迫）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「！！？」
1263 = "「!!?」"
# monologue
# JP: 強烈に膣を締め付けられて、\n慌てて体を起こし直す。
1675 = "Âm đạo siết chặt lại một cách dữ dội,\nkhiến tôi vội vàng ngồi thẳng dậy."
# monologue
# JP: 日々姫はじっ――っと、\nまっすぐな目で僕を見ている。
1375 = "Hibiki chằm chằm,\nnhìn tôi bằng ánh mắt thẳng thắn."
# 【日々姫】
# display as 日日姬
# JP: 「ね、にぃに――もう――おしまい？」
1246 = "「Này, anh hai――đã――xong rồi sao?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いいや？　まだだ。まだまだだ」
1211 = "「Không đâu? Vẫn chưa. Vẫn còn lâu mới xong」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1127 = "「嗯！」" 
# monologue
# JP: 発情しきって汗ばむ体。
1395 = "Cơ thể ướt đẫm mồ hôi vì phát tình."
# monologue
# JP: 完全に女の顔をしながら、\nあどけないほどに純粋な笑み。
1405 = "Mang trọn vẹn khuôn mặt của một người phụ nữ,\nnhưng lại nở một nụ cười thuần khiết đến ngây thơ."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕は、日々姫を。もっともっとと求めてる」
1172 = "「Anh, khao khát Hibiki. Nhiều hơn, nhiều hơn nữa」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
# 1097 = "「啊！」" 
# monologue
# JP: 心に、体が呼応する。
1686 = "Cơ thể đáp lại tiếng gọi của con tim."
# monologue
# JP: 抜かないままに、このままに――\n僕はもう一度日々姫を求める。
1649 = "Cứ giữ nguyên thế này, không rút ra――\nTôi lại khao khát Hibiki thêm một lần nữa."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ちゅうう、ちゅうしてから、ね？」
1259 = "「Anh hai, chụt chụt, hôn em đã, nhé?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ」
# 1120 = "「嗯」" 
# monologue
# JP: 重なりあって、くっつきあって、\n汗と汗、唾液と唾液を交換しあう、甘いキス。
1449 = "Chồng lên nhau, dính sát vào nhau,\ntrao đổi mồ hôi và nước bọt trong một nụ hôn ngọt ngào."
# monologue
# JP: そうして僕はキスを解いて――
1328 = "Và rồi, tôi dứt nụ hôn――"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――ふあっ――」
1071 = "「A――phù――」"
# monologue
# JP: ――もう何度でも、日々姫を求めて動き続ける。
769 = "――Tôi tiếp tục chuyển động, khao khát Hibiki không biết bao nhiêu lần nữa."
