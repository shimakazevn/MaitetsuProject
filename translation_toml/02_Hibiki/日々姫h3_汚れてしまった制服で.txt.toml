# monologue
# JP: その想いだけが体に満ちて、\nけれども脳は、少し不安を感じてしまう。
1685 = "Chỉ một suy nghĩ đó thôi cũng đủ lấp đầy cơ thể, nhưng trong đầu tôi lại cảm thấy có chút bất an."
# 【双鉄H】
# display as 雙鐵
# JP: （妊娠セックスをするとして――お尻に挿れたそのままを、\n膣内に入れて、安全なのか？）
1820 = "（Nếu làm tình để mang thai――vừa mới đút vào mông xong, mà lại cho ngay vào trong âm đạo thì, có an toàn không nhỉ?）"
# monologue
# JP: 些か不安だ――消毒を。\n思えばすぐに、床に落ちてるそれが目につく。
1698 = "Hơi bất an thật――phải khử trùng thôi. Vừa nghĩ vậy, tôi liền để mắt tới thứ đang rơi trên sàn."
# monologue
# JP: （ぺちょっ）
1843 = "（Nhặt lên）"
# 【日々姫】
# display as 日日姬
# JP: 「やあっ！？　にぃに！！？　なんばしよっと！？\n私の――おも、おも――おもらしパンツでっ」
1044 = "「A!? Anh hai!!? Anh định làm gì vậy!? Dùng――quần lót, quần lót――tè dầm của em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「お尻から直に膣内はやや安全では無いかと思って。\nアルコール消毒に、これならば丁度いいかと」
1169 = "「Anh nghĩ từ mông chuyển thẳng sang âm đạo thì hơi không an toàn. Nên dùng cái này để khử trùng bằng cồn thì vừa khéo」"
# 【日々姫】
# display as 日日姬
# JP: 「ティッシュ！　アルコールティッシュあるけんっ！」
1221 = "「Khăn giấy! Có khăn giấy ướt tẩm cồn mà!」"
# monologue
# JP: 日々姫は僕からパンツを奪い、\n代わりにウェットティッシュをくれる。
1573 = "Hibiki giật lại chiếc quần lót từ tay tôi, và đưa cho tôi tờ khăn giấy ướt để thay thế."
# monologue
# JP: それで丁寧に勃起を拭い、\n今度こそ、日々姫の膣口に押し当てる。
1476 = "Tôi cẩn thận lau sạch dương vật đang cương cứng, rồi lần này, áp sát nó vào cửa mình của Hibiki."
# monologue
# JP: （ぬぶっ）
1838 = "（Xuyên vào）"
# 【日々姫】
# display as 日日姬
# JP: 「あ……ちょっと――ひんやりしとる、ね」
1092 = "「A......Hơi――mát lạnh, nhỉ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すぐ、燃えるように熱くなる」
1260 = "「Sẽ nóng bừng lên ngay thôi」"
# monologue
# JP: （じゅぶうううううううううううっ！）
1800 = "（Phập!）"
# 【日々姫】
# display as 日日姬
# JP: 「んふううううううううううっっ！！！！」
1124 = "「Ưm phuuuuuuuuuuu!!!!」"
# monologue
# JP: （ずばっ！　じゅっっ！　ずばっ！　じゅぼんっ！）
1805 = "（Phập! Phập! Phập! Phập!）"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――きもちいっ――きもちいいっ！　\nにぃに――おちんちん――すごい――いい――よぉ」
1078 = "「A――sướng quá――sướng quá! Anh hai――chim――tuyệt――lắm――đó」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕も――だっ――」
1158 = "「Anh――cũng vậy――」"
# monologue
# JP: 日々姫のおまんこはもう完全にとろとろほぐれ、\nうねり張り付き、僕の勃起を迎えてくれる。
1594 = "Âm đạo của Hibiki giờ đây đã hoàn toàn ướt sũng và mềm nhũn, uốn lượn bám chặt lấy, đón nhận dương vật cương cứng của tôi."
# monologue
# JP: 迎えたが最後離しはしないと、必死で抱きつき、\nきゅんきゅん締めて引き抜く動きに抵抗してくる！
1514 = "Đón nhận rồi thì tuyệt đối không buông ra, em ấy ôm chặt lấy tôi, liên tục siết chặt lại, chống cự lại từng nhịp rút ra của tôi!"
# monologue
# JP: （ずぶっ！　じゅっ！　ずろおおおっ！　じゅぶうう！）
# 1805 = "（噗啾！噗啾！啾噗！啾噗！）" 
# 【日々姫】
# display as 日日姬
# JP: 「あっ――んっ――それ――しゅごっ――んっ――\nぐりって――しながらっ――ゆっくり――んひゅっ！？」
1076 = "「A――ưm――Chỗ đó――tuyệt quá――ưm―― Vừa――ngoáy――vừa――chậm lại――ưm hyu!?」"
# monologue
# JP: （すぱんっ！　ぱんっ！　ぱんっ！　ぱんっ！！）
1797 = "（Bạch! Bạch! Bạch! Bạch!!）"
# monologue
# JP: ゆっくり動けば深い繋がり。速く動けば強い快感。
1368 = "Chuyển động chậm thì kết nối sâu sắc. Chuyển động nhanh thì khoái cảm mãnh liệt."
# monologue
# JP: えぐってもひねってもこすっても、どう動いても、\n日々姫の可愛いおまんこは、最高の快感を与えてくれる。
1620 = "Dù là khoét sâu, vặn xoắn hay cọ xát, dù chuyển động thế nào đi chăng nữa, âm đạo đáng yêu của Hibiki vẫn mang đến cho tôi khoái cảm tột đỉnh."
# monologue
# JP: （くりっ！）
1833 = "（Vê nhẹ!）"
# 【日々姫】
# display as 日日姬
# JP: 「やあっ――乳首っ――つねったら――んっ――あっ」
1007 = "「A――Núm vú――bị véo――ưm――a」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！」
# 1097 = "「啊！」" 
# monologue
# JP: 今すぐにでも射精しそうで、緩めたくって乳首をつねれば、\nまたも日々姫はビクビクきゅんと締め付けてくる。
1468 = "Cảm giác như có thể xuất tinh bất cứ lúc nào, muốn làm dịu đi nên tôi véo núm vú em ấy, nhưng Hibiki lại càng giật giật siết chặt lấy tôi hơn."
# monologue
# JP: 肉体的な刺激は常に諸刃の剣だ。\nならば――ならば、心の方を――
1650 = "Kích thích thể xác luôn là con dao hai lưỡi. Nếu vậy――nếu vậy, hãy bắt đầu từ tâm hồn――"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫、リラックスできないか？\nもっと長くを、日々姫と重なっていたいんだ」
1195 = "「Hibiki, em thư giãn một chút được không? Anh muốn hòa quyện cùng Hibiki lâu hơn nữa」"
# monologue
# JP: （ふわっ）
1841 = "（Vuốt ve）"
# monologue
# JP: 出来るかぎりに落ち着けた声。\nゆっくりとした指先で髪をくしけずる。
1450 = "Bằng một giọng nói bình tĩnh nhất có thể. Tôi chậm rãi dùng những ngón tay vuốt ve mái tóc em ấy."
# monologue
# JP: 途端に日々姫は目をうるませて、\nほうっと、熱い息を吐く。
1376 = "Ngay lập tức, đôi mắt Hibiki ngấn lệ, phả ra một hơi thở nóng bỏng."
# 【日々姫】
# display as 日日姬
# JP: 「うん……にぃに……\n私も、ずうっと一緒がよかよ」
1115 = "「Vâng......anh hai...... Em cũng, muốn ở bên anh mãi thôi」"
# monologue
# JP: （きゅんきゅんきゅんっ！）
# 1844 = "（收縮壓迫）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？」
1264 = "「!?」"
# monologue
# JP: 言葉で気持ちでわかってくれて、\nけれど体は、より一層に僕の精子を求め吸い付く！
1437 = "Em ấy đã hiểu được tâm ý của tôi qua lời nói, nhưng cơ thể em ấy lại càng hút chặt lấy, khao khát tinh trùng của tôi hơn bao giờ hết!"
# 【双鉄H】
# display as 雙鐵
# JP: （これは――保たない。\nせめて――日々姫と――日々姫と一緒にっ――）
1825 = "（Thế này thì――không kìm được mất. Ít nhất thì――cùng với Hibiki――cùng với Hibiki――）"
# monologue
# JP: 思いは腰の動きに繋がる！
1700 = "Suy nghĩ ấy liền truyền thẳng đến chuyển động của hông!"
# monologue
# JP: （ずるうううううううっ！！！）
# 1832 = "（抽出）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひゃうっ！！？」
# 1033 = "「呀！！？」" 
# monologue
# JP: 一度は大きく腰を引き、\n経験が僕に教えてくれた、日々姫の一番弱い部分へ――
1452 = "Tôi kéo hông lùi lại một nhịp thật sâu, rồi nhắm thẳng vào điểm yếu nhất của Hibiki mà kinh nghiệm đã chỉ cho tôi――"
# monologue
# JP: （ぐりいいいいいっ！！！）
# 1838 = "（插入）" 
# 【日々姫】
# display as 日日姬
# JP: 「ゃふっつ――んっ――ふあっ――そこ――らめっ！\nざらざら――ぐりって、しちゃ、ら――んきゅううっ！」
1016 = "「Yafu――ưm――phù――Chỗ đó――không được! Ram ráp――mà cọ xát, như thế, thì――ưm kyuu!」"
# monologue
# JP: （きゅうううっ！）
# 1844 = "（收縮壓迫）" 
# monologue
# JP: 日々姫は体を大きく震わせ、\n膣を思い切り締め付けてくるっ！
1599 = "Cơ thể Hibiki run lên bần bật, và âm đạo siết chặt lại hết cỡ!"
# monologue
# JP: これなら、\nこれなら日々姫と一緒にっ！！
1697 = "Nếu là thế này, nếu là thế này thì có thể cùng với Hibiki!!"
# monologue
# JP: （ずぶっ！　ずばっ！　じゅばっ！　じゅぱんっっ！）
# 1805 = "（噗啾！噗啾！啾噗！啾噗！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――くっ――あっ――\n日々姫！　日々姫！　日々姫！！」
1108 = "「Ưm――hự――a―― Hibiki! Hibiki! Hibiki!!」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　にぃに！　イって！\n子宮で、ぴゅっぴゅしてっ！！」
1128 = "「Vâng! Anh hai! Ra đi anh! Hãy bắn, vào tử cung của em đi!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
1127 = "「Ưm!」"
# monologue
# JP: お望みどおりおもいっきりに腰を突き出し、\n日々姫の子宮の入り口に、勃起の先端を食い込ませっ！
1517 = "Đúng như mong muốn, tôi đẩy hông tới tấp, ấn ngập phần đầu dương vật cương cứng vào miệng tử cung của Hibiki!"
# monologue
# JP: （くぽおっっ）
# 1806 = "（噗啾）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひゃああうっ！！！？」
1025 = "「Hyaaaau!!!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！？」
1098 = "「Kua!?」"
# monologue
# JP: （びゅうっ！　びゅくっ！　どびゅっ！　どびゅるっ！）
1812 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ……う――っ――」
1082 = "「A......ư――」"
# 【日々姫】
# display as 日日姬
# JP: 「はっ――あっ――なに――これっ――ふ――んっ――\n吸って――吸ってる――私の、子宮――っ――んっ」
1055 = "「Hà――a――Cái gì――thế này――phù――ưm―― Đang hút――Tử cung của em――đang hút lấy――ưm」"
# monologue
# JP: 勃起の先端が引っ張られ――\n子宮の口が、僕を吸い込むような感じで――
1626 = "Phần đầu dương vật bị kéo căng ra―― Cảm giác như miệng tử cung đang hút lấy tôi vậy――"
# monologue
# JP: （びゅっ！　びゅるっ！　びゅううっ！　びゅっ！）
1813 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「すご――来て、るっ――妊娠――せい、えきっ――\n子宮の――おくに――私の、卵子に――ぴゅっぴゅって」
1147 = "「Nhiều quá――đang vào――Mang thai mất――Tinh, dịch―― Vào sâu――trong tử cung――bắn thẳng vào――trứng của em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ――あっ」
1073 = "「A――a」"
# monologue
# JP: （びゅるっ――びゅううっ――びゅっ！　ぷっ！）
1811 = "（Phụt——Phụt——Phụt! Phụt!）"
# monologue
# JP: ……実際、そんな感覚がした。
779 = "......Thực tế, tôi cũng có cảm giác như vậy."
# monologue
# JP: 日々姫の膣は、そして子宮は、今まで以上に、最高に、\n僕の精液を必死に求め、余さず絞り尽くしてくれた。
1597 = "Âm đạo và tử cung của Hibiki, hơn bao giờ hết, đã khao khát tinh dịch của tôi một cách mãnh liệt nhất, và vắt kiệt không còn sót lại một giọt nào."
# 【双鉄H】
# display as 雙鐵
# JP: 「ぅあ――」
1068 = "「Ưa――」"
# monologue
# JP: （どさっ）
1842 = "（Đổ sập）"
# monologue
# JP: 日々姫の上に重なるように崩れ落ちれば――
1445 = "Khi tôi đổ gục xuống đè lên người Hibiki――"
# monologue
# JP: （きゅううっ！）
# 1844 = "（收縮壓迫）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「！！？」
1263 = "「!!?」"
# monologue
# JP: 強烈に膣を締め付けられて、\n慌てて体を起こし直す。
1675 = "Âm đạo siết chặt lại một cách dữ dội, khiến tôi vội vàng ngồi thẳng dậy."
# monologue
# JP: 日々姫はじっ――っと、\nまっすぐな目で僕を見ている。
1375 = "Hibiki chằm chằm, nhìn tôi bằng ánh mắt thẳng thắn."
# 【日々姫】
# display as 日日姬
# JP: 「ね、にぃに――もう――おしまい？」
1246 = "「Này, anh hai――đã――xong rồi sao?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いいや？　まだだ。まだまだだ」
1211 = "「Không đâu? Vẫn chưa. Vẫn còn lâu mới xong」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1127 = "「嗯！」" 
# monologue
# JP: 発情しきって汗ばむ体。
1395 = "Cơ thể ướt đẫm mồ hôi vì phát tình."
# monologue
# JP: 完全に女の顔をしながら、\nあどけないほどに純粋な笑み。
1405 = "Mang trọn vẹn khuôn mặt của một người phụ nữ, nhưng lại nở một nụ cười thuần khiết đến ngây thơ."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕は、日々姫を。もっともっとと求めてる」
1172 = "「Anh, khao khát Hibiki. Nhiều hơn, nhiều hơn nữa」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
# 1097 = "「啊！」" 
# monologue
# JP: 心に、体が呼応する。
1686 = "Cơ thể đáp lại tiếng gọi của con tim."
# monologue
# JP: 抜かないままに、このままに――\n僕はもう一度日々姫を求める。
1649 = "Cứ giữ nguyên thế này, không rút ra―― Tôi lại khao khát Hibiki thêm một lần nữa."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ちゅうう、ちゅうしてから、ね？」
1259 = "「Anh hai, chụt chụt, hôn em đã, nhé?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ」
# 1120 = "「嗯」" 
# monologue
# JP: 重なりあって、くっつきあって、\n汗と汗、唾液と唾液を交換しあう、甘いキス。
1449 = "Chồng lên nhau, dính sát vào nhau, trao đổi mồ hôi và nước bọt trong một nụ hôn ngọt ngào."
# monologue
# JP: そうして僕はキスを解いて――
1328 = "Và rồi, tôi dứt nụ hôn――"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――ふあっ――」
1071 = "「A――phù――」"
# monologue
# JP: ――もう何度でも、日々姫を求めて動き続ける。
769 = "――Tôi tiếp tục chuyển động, khao khát Hibiki không biết bao nhiêu lần nữa."
