[script]
# lines: 355 
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫？　入ってもいいか？」
1199 = "「Hibiki? Anh vào được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。お待たせ！　もう良かよ」
1130 = "「Vâng. Để anh đợi lâu rồi! Xong rồi đó ạ.」"
# monologue
# JP: (かちゃっ）
37 = "(Cạch)"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ね？　見て見て！」
1258 = "「Anh hai, này? Nhìn này nhìn này!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「制服だな。さっきも見たぞ。\nというか、着替えるといってなかったか？」
991 = "「Đồng phục học sinh nhỉ. Lúc nãy anh cũng thấy rồi mà. Mà, chẳng phải em nói là đi thay đồ sao?」"
# monologue
# JP: 登園から日々姫が帰ってきて。
1572 = "Hibiki đi học về."
# monologue
# JP: 部屋に来て、と呼ばれてくれば、\n「着替えるけん」と、廊下で待たされていたのだが――
1393 = "Gọi tôi đến phòng, rồi lại bảo \"Để em thay đồ đã\", bắt tôi đứng đợi ngoài hành lang——"
# 【日々姫】
# display as 日日姬
# JP: 「やけん、着替えとるでしょお」
1203 = "「Thì đó, em thay đồ rồi đây thây.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「着替えた？　どこをだ？？」
1175 = "「Thay đồ rồi? Thay chỗ nào??」"
# 【日々姫】
# display as 日日姬
# JP: 「ふっふーん」
1136 = "「Hừ hừm.」"
# monologue
# JP: いたずらっぽい日々姫の目。
1566 = "Ánh mắt tinh nghịch của Hibiki."
# monologue
# JP: 着替えたところを当ててみろ、と、\n無言のままに挑戦してくる。
1398 = "Thử đoán xem em thay chỗ nào đi, em ấy đang thách thức tôi trong im lặng."
# 【双鉄H】
# display as 雙鐵
# JP: 「“着替え”だよな？\n髪留めやアクセサリーの類ではなく」
988 = "「Là \"thay đồ\" đúng không? Không phải mấy thứ như kẹp tóc hay phụ kiện chứ.」"
# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　ちゃあんと、お洋服のお着替え」
1222 = "「Tất nhiên rồi! Là thay quần áo đàng hoàng luôn.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ううむ――」
1107 = "「Ưm——」"
# monologue
# JP: わからん。制服は制服のままだし……\n着替えたとしたらソックスあたりか？　ああ、そうか。
1632 = "Chịu thôi. Đồng phục thì vẫn là đồng phục... Nếu có thay thì chắc là tất chăng? À, ra vậy."
# 【双鉄H】
# display as 雙鐵
# JP: （スンっ、スンッ）
1856 = "（Khịt khịt）"
# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！？　にぃに、何ばしよっと！？」
1102 = "「Chờ đã!? Anh hai, anh đang làm gì vậy!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「匂いを嗅いでいる。着替えたものなら、\nそこだけ匂いがしないはずだ」
1161 = "「Anh đang ngửi mùi. Nếu là đồ mới thay, thì chỉ chỗ đó là không có mùi thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　そう？　そう、かなぁ……\n匂いって、体からするような」
1059 = "「Hả? Vậy sao? Có phải vậy, không nhỉ... Mùi hương, thường tỏa ra từ cơ thể mà.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「気が散る。少しだけ黙っていてくれ」
1176 = "「Phân tâm quá. Em im lặng một chút đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「う、うん」
1063 = "「Ư, ừm.」"
# monologue
# JP: （スン、スン）
# 1856 = "（用力聞）" 
# monologue
# JP: ブラウスは違う。\n匂いもするし汗で湿って肌がわずかに透けている。
1335 = "Áo sơ mi thì không phải. Vừa có mùi lại còn ẩm mồ hôi, hơi lộ ra làn da bên trong nữa."
# monologue
# JP: スカーフは小物に含まれようし、\nならば、スカートはどうだろう？
1713 = "Khăn quàng cổ thì chắc được tính là phụ kiện rồi, vậy thì, váy thì sao nhỉ?"
# monologue
# JP: （スンっ――スン――っ！）
1855 = "（Khịt khịt——Khịt khịt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、スカートだ。\n防虫剤の匂いがする」
1104 = "「A, là váy. Có mùi băng phiến.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そっか防虫剤。すごいね、にぃにぃ大正解！\n私、スカートばお着替えしたとよ」
1065 = "「A, ra là băng phiến. Tuyệt quá, anh hai đoán đúng phóc rồi! Em, đã thay váy đấy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「何故、スカートだけを？」
989 = "「Tại sao, lại chỉ thay váy thôi?」"
# 【日々姫】
# display as 日日姬
# JP: 「ここ見て、ここ」
1226 = "「Nhìn chỗ này này, chỗ này.」"
# monologue
# JP: （ひょい）
1869 = "（Vén lên）"
# 【双鉄H】
# display as 雙鐵
# JP: 「どこだ？」
1066 = "「Chỗ nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「ここ！　ほら、スカートの一番前側の下」
1244 = "「Chỗ này! Đây này, phần dưới cùng phía trước của váy.」"
# monologue
# JP: （つ――つ――）
1835 = "（Chỉ chỉ）"
# monologue
# JP: 見やすいようにと、日々姫がスカートを持ち上げてくれる。\n前側の、下――と、ああ、これか？
1574 = "Để tôi dễ nhìn hơn, Hibiki vén váy lên. Phía trước, bên dưới——à, cái này sao?"
# 【双鉄H】
# display as 雙鐵
# JP: 「汚れがこびりついているな。\n緑色の……これは、絵の具か？」
1243 = "「Bị dính bẩn rồi này. Màu xanh lá... cái này, là màu vẽ à?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、[ゆさい,1]油彩のテルベルト。\nめったに使わんけん、キャップが固まっちゃってて」
1135 = "「Vâng, là màu sơn dầu Terre Verte. Vì hiếm khi dùng nên nắp bị cứng lại mất」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ほう」
1062 = "「Ồ」"
# 【日々姫】
# display as 日日姬
# JP: 「むにゅってなって慌ててコスって、このありさま。\n[はくりざい,2]剥離剤使うと布も変色するっていうけん――やけん」
1229 = "「Thế là nó phụt ra, em vội vàng lau đi thì thành ra thế này. Nghe nói dùng chất tẩy thì vải cũng bị đổi màu theo luôn――cho nên」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1120 = "「Ừ」"
# monologue
# JP: それで、タンスに仕舞いこんでた。\nそれにわざわざ、着替えてくれた。
1503 = "Thế nên em ấy mới cất nó vào trong tủ. Vậy mà em ấy lại cất công thay bộ đồ này."
# monologue
# JP: それは、つまりは――
1339 = "Đó, nói cách khác là――"
# 【日々姫】
# display as 日日姬
# JP: 「これ、にぃにぃと居るとき専用の……\nにぃにぃにだけ、見せるスカートにしようと、思って」
1164 = "「Cái này, là đồ chuyên dụng khi ở cùng anh hai...... Em định biến nó thành chiếc váy chỉ để cho một mình anh hai xem thôi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、もっと良く見せてくれ」
1247 = "「Nếu vậy, thì hãy cho anh xem kỹ hơn đi」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
1262 = "「っ!」"
# monologue
# JP: 少し離れてまじまじ見れば、\n日々姫は僕の視線に気づき、両肩をぴくりと震わせる。
1491 = "Khi tôi lùi lại một chút và chăm chú nhìn, Hibiki nhận ra ánh mắt của tôi, hai vai khẽ run lên."
# monologue
# JP: ……だが、スカートは降ろさない。\n見えているのをわかった上で、僕の視線を受け止めている。
776 = "......Nhưng, em ấy không buông váy xuống. Dù biết là đang bị nhìn thấy, em ấy vẫn chấp nhận ánh mắt của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「可愛いパンツだな。\n日々姫に良く似あってる」
1240 = "「Quần lót dễ thương thật đấy. Rất hợp với Hibiki」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……うん。ありがと」
1089 = "「A......vâng. Cảm ơn anh」"
# 【双鉄H】
# display as 雙鐵
# JP: 「似合ってるが……少し、汚れてしまっているな」
1005 = "「Hợp thì hợp thật nhưng......hơi bị bẩn một chút rồi nhỉ」"
# monologue
# JP: （くちゅっ）
1868 = "（Nhóp nhép）"
# 【日々姫】
# display as 日日姬
# JP: 「あんっ」
1096 = "「A」"
# monologue
# JP: 濡れて張り付き形を透かすスジに沿い、\nわずかに指先を押し込むだけで、重く湿った音がする。
1485 = "Dọc theo đường rãnh ướt át hằn rõ qua lớp vải, chỉ cần hơi ấn nhẹ đầu ngón tay vào là đã phát ra âm thanh ẩm ướt nặng nề."
# 【双鉄H】
# display as 雙鐵
# JP: 「パンツを見せているだけで、\nこれほど濡れるものなのか？」
995 = "「Chỉ mới cho xem quần lót thôi, mà đã ướt đến mức này rồi sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「見、見られてるからっていうのもあるけど――\nでも、もっと……あの、その前」
1207 = "「Cũng, cũng có phần là do bị nhìn―― Nhưng mà, còn hơn thế nữa......ưm, trước đó」"
# 【双鉄H】
# display as 雙鐵
# JP: 「その前？」
1138 = "「Trước đó?」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにが、お鼻……くんくんってして、それで、\nにぃにに、私の、匂い……嗅がれてるって、思ったら」
1255 = "「Anh hai, dùng mũi......ngửi ngửi, thế là, cứ nghĩ đến việc, mùi của em......đang bị anh hai ngửi thấy」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ほう」
# 1062 = "「哦」" 
# monologue
# JP: （くいっ）
1865 = "（Áp sát）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっんっ！？」
1034 = "「Hyaa!?」"
# monologue
# JP: 指を外してその変わり、\n鼻先をおまんこのスジに当てて動かす。
1475 = "Tôi rút ngón tay ra, thay vào đó, áp chóp mũi vào rãnh âm đạo của em ấy rồi cọ xát."
# monologue
# JP: （くいっ――くっ――くんっ）
1840 = "（Áp sát——Hự——Ngửi ngửi）"
# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　にぃにっ、へ、変態っぽい――かもっ――\nんっ――お鼻で、おまんこ――すりすり、なん、てっ」
1046 = "「A!? Anh hai, c-có vẻ hơi biến thái――đấy―― Ưm――Dùng mũi, cọ cọ――vào âm đạo――như thế」"
# monologue
# JP: （すリ――すり――ぐいっ）
1791 = "（Cọ cọ——Cọ cọ——Giật mạnh）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ！？　だめっ――ンッ――ぐいって、\nしたら――あっ――匂い、濃くなるっ――」
1036 = "「Hyaa!? Không được――Ưm――Ấn mạnh vào, như thế――a――mùi, sẽ đậm hơn mất――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「確かにな」
1212 = "「Đúng thật nhỉ」"
# monologue
# JP: 指で触れてたときよりずっと、\n日々姫の蜜の量は増してる。
1625 = "Lượng mật dịch của Hibiki tiết ra nhiều hơn hẳn so với lúc tôi chạm tay vào."
# monologue
# JP: 僕の中心を熱くする、\n日々姫の奥から滴る匂いも、どんどん濃密になってくる。
1438 = "Làm cho trung tâm của tôi nóng bừng lên, mùi hương rỉ ra từ sâu bên trong Hibiki cũng ngày càng trở nên nồng đậm."
# 【日々姫】
# display as 日日姬
# JP: 「た、確かにって――にぃに」
983 = "「Đ-Đúng thật là sao chứ――anh hai」"
# monologue
# JP: すん、と小さな音がする。\n日々姫は自分でも、匂いを嗅いでいるのだろうか。
1601 = "Một âm thanh khịt mũi nhỏ vang lên. Có lẽ bản thân Hibiki cũng đang ngửi mùi của chính mình."
# 【日々姫】
# display as 日日姬
# JP: 「ど……どんな、匂いば……する、と？\nわた――し――私の――おま、ん、こ」
1201 = "「Có......có mùi......gì, vậy anh? Âm――đạo――của――em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「どんな、といえば――そうだな」
1231 = "「Nếu hỏi là mùi gì thì――để xem nào」"
# monologue
# JP: （ぐいっ――こしゅっ）
# 1791 = "（上下磨蹭）" 
# 【日々姫】
# display as 日日姬
# JP: 「んんんうっつ」
1126 = "「Ưm ưm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫の体の匂いとは違い、おまんこの匂いは……」
1149 = "「Khác với mùi cơ thể của Hibiki, mùi âm đạo thì......」"
# monologue
# JP: （ぐいっ――くんっ――すうっ――すうっ）
1831 = "（Áp sát——Ngửi ngửi——Hít——Hít）"
# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　鼻をうずめて――ンッ――おまんこ、でっ\n――すぅはぁっ――しちゃっ――やぁんっ！」
1048 = "「A!? Vùi mũi vào――Ưm――âm đạo, rồi――hít hà――như thế――không chịu đâu!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……おまんこ自体は、そんなに匂わないのだな。\nヨーグルトドリンクのような、かすかに酸っぱい匂いだ」
789 = "「......Bản thân âm đạo thì không nặng mùi đến thế. Có một chút mùi chua nhè nhẹ giống như sữa chua uống vậy」"
# 【日々姫】
# display as 日日姬
# JP: 「はうっ」
1106 = "「Hau」"
# monologue
# JP: （むわっ）
1850 = "（Nóng hổi）"
# monologue
# JP: おまんこの匂いがわずかに濃くなり、その何倍も、\n甘くどろりとしたような、日々姫の匂いが強くなる。
1413 = "Mùi âm đạo trở nên nồng hơn một chút, và gấp nhiều lần như thế, mùi hương của Hibiki lại càng trở nên ngọt ngào và sền sệt hơn."
# monologue
# JP: 体臭なのか、俗に言われるフェロモンの匂いなのかは\n僕には判別できないが――
1711 = "Tôi không thể phân biệt được đây là mùi cơ thể hay là mùi pheromone như người ta vẫn thường nói, nhưng――"
# 【双鉄H】
# display as 雙鐵
# JP: 「混じり合うから、濃くなるのだな。\n日々姫自身の匂いと、おまんこの匂いと、そして――」
1218 = "「Hòa quyện vào nhau nên mới nồng như vậy nhỉ. Mùi của chính Hibiki, mùi âm đạo, và cả――」"
# monologue
# JP: （じゅるるるるるっ！）
1796 = "（Chùn chụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！？　アッ――おまんこ――じゅうって！\nパンツの、上、から――ちゅうちゅう――吸われ――ん」
1100 = "「A!? A――Âm đạo――kêu chụt chụt! Từ, bên trên, quần lót――bị hút――chùn chụt――ưm」"
# monologue
# JP: パンツに滲む日々姫の汁を思う存分すいまくり、\n代わりに僕の唾液を、なすりつけるように染みさせる。
1483 = "Tôi thỏa thích hút lấy dòng mật dịch của Hibiki thấm trên quần lót, và thay vào đó là chà xát để nước bọt của tôi thấm đẫm vào."
# monologue
# JP: 薄布越しにもわかるほど、日々姫のおまんこはヒクついて、\n挿れて欲しいと、舌に吸いつきおねだりしてくる。
1708 = "Dù qua lớp vải mỏng cũng có thể nhận ra, âm đạo của Hibiki đang co giật, hút chặt lấy lưỡi tôi như thể đang cầu xin được đưa vào."
# 【双鉄H】
# display as 雙鐵
# JP: 「ん――ぷあっ――それから、僕の唾液や、汗や、\n体液の匂いが、全部、混じって」
1111 = "「Ưm――Phù――Sau đó, mùi nước bọt, mồ hôi, và cả thể dịch của anh, tất cả, hòa quyện lại với nhau」"
# 【日々姫】
# display as 日日姬
# JP: 「好き……\n私も、好き、なの――にぃにの――匂い」
1160 = "「Em thích...... Em cũng, thích, lắm――mùi hương――của anh hai」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、もっと染みこませよう」
1250 = "「Nếu vậy, thì để anh làm cho nó thấm nhiều hơn nữa nhé」"
# monologue
# JP: （じゅるるるるるうっっっっ！）
1802 = "（Chùn chụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「くひゅうううううんっ！！！」
1125 = "「Ưm a!!!」"
# monologue
# JP: 唾液を熱心に擦り込むほどに、\n日々姫のおまんこは熱を帯びヒクつきを激しくさせる。
1496 = "Càng thoa nhiều nước bọt lên, âm đạo của Hibiki càng trở nên nóng rực và co giật dữ dội hơn."
# monologue
# JP: 匂いもどんどん濃くなって――\nん？
1613 = "Mùi hương cũng ngày càng nồng hơn―― Hửm?"
# monologue
# JP: （くんっ）
1862 = "（Ngửi ngửi）"
# monologue
# JP: 鼻をつく、\n今までにはなかった、アンモニア臭。
1492 = "Một mùi amoniac xộc thẳng vào mũi, mùi hương mà từ nãy đến giờ chưa hề có."
# 【双鉄H】
# display as 雙鐵
# JP: 「ぷあっ――ん、む――日々姫。\nお前……ひょっとしておしっこをしたいのか？」
1056 = "「Phù――ưm, này――Hibiki. Em......không lẽ là đang buồn tè sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃぁんっ」
1024 = "「Hyaan」"
# monologue
# JP: ひゃあ、といやぁんの中間のような声を出し。
1600 = "Em ấy phát ra một âm thanh như thể pha trộn giữa tiếng \"Hyaa\" và \"Iyaan\"."
# monologue
# JP: 日々姫は真っ赤になりつつも、\n素直な答えを聞かせてくれる。
1374 = "Mặc dù mặt đỏ bừng, Hibiki vẫn ngoan ngoãn trả lời tôi."
# 【日々姫】
# display as 日日姬
# JP: 「だって……だってにぃにが、あんまり熱心に、\nくんくんして、ぺろぺろするから――だからぁ」
1251 = "「Tại vì......tại vì anh hai cứ mải mê, ngửi ngửi rồi liếm láp mãi thôi――nên là」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ともかく、漏らしてはコトだ。\n少し待て」
981 = "「Dù sao thì, tè dầm ra đấy thì rắc rối to. Đợi anh một chút」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　にぃに」
1057 = "「Hả!? Anh hai」"
# monologue
# JP: 急いであれこれ整えて、日々姫の部屋へ舞い戻る。
1465 = "Tôi vội vàng chuẩn bị vài thứ rồi quay trở lại phòng của Hibiki."
# monologue
# JP: 日々姫は律儀にスカートの裾を持ち上げたまま、\n僕の帰りを待っててくれる。
1562 = "Hibiki vẫn ngoan ngoãn vén vạt váy lên, chờ đợi tôi quay lại."
# 【双鉄H】
# display as 雙鐵
# JP: 「バスタオルを何枚かと、洗面器とを持ってきた」
1167 = "「Anh mang đến vài chiếc khăn tắm với cái chậu rửa mặt đây」"
# monologue
# JP: 開かれている足の間の床の上へとバスタオルを敷き、\n日々姫の股間の位置を見極め、洗面器を置く。
1460 = "Tôi trải khăn tắm xuống sàn giữa hai chân đang mở rộng của em ấy, căn đúng vị trí đũng quần của Hibiki rồi đặt chậu rửa mặt xuống."
# 【双鉄H】
# display as 雙鐵
# JP: 「これで、漏らしても床には染みまい」
1242 = "「Thế này thì, dù có tè dầm ra cũng không thấm xuống sàn đâu」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　あの……にぃに――」
1061 = "「Hả? Dạ......anh hai――」"
# monologue
# JP: はぁはぁと、日々姫の呼吸が荒くなる。\n額に首に汗が浮かんで、瞳が熱っぽく潤んでる。
1584 = "Hibiki thở hổn hển, nhịp thở trở nên gấp gáp. Mồ hôi rịn trên trán và cổ, đôi mắt ướt át đầy đê mê."
# 【日々姫】
# display as 日日姬
# JP: 「ここで……漏らすと？\n私、おしっこ――トイレ、行かんで」
1204 = "「Tè dầm......ở đây luôn sao? Em, đi tè――không vào nhà vệ sinh mà――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「トイレ？」
1154 = "「Nhà vệ sinh?」"
# monologue
# JP: いや、ああ、そうか。\n興奮しすぎて視野が極限まで狭窄していた。
1383 = "À, ra là vậy. Vì quá hưng phấn nên tầm nhìn của tôi đã bị thu hẹp đến mức cực hạn."
# 【双鉄H】
# display as 雙鐵
# JP: 「すまん、日々姫」
1173 = "「Xin lỗi nhé, Hibiki」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん！？　謝らんでよかよ！？」
979 = "「Không sao đâu!? Anh không cần phải xin lỗi đâu!?」"
# monologue
# JP: 僕のうっかりをすぐ許し、\nこっくり日々姫は頷いて――！！？
1563 = "Em ấy ngay lập tức tha thứ cho sự bất cẩn của tôi, và khẽ gật đầu――!!?"
# 【日々姫】
# display as 日日姬
# JP: 「ん……ふ……ぁっ」
1112 = "「Ưm......phù......a」"
# monologue
# JP: うめき声。濃くなるアンモニアの匂い。\nぷるぷる震える日々姫の内股。
1578 = "Một tiếng rên rỉ. Mùi amoniac trở nên nồng nặc hơn. Hai đùi trong của Hibiki run rẩy bần bật."
# monologue
# JP: ――そしてパンツに、黄色い染みがじゅん、と湧く。
772 = "――Sau đó, một vết ố vàng từ từ loang ra trên chiếc quần lót."
# 【日々姫】
# display as 日日姬
# JP: 「……にぃにが、見たいって……言ってくれるなら……\nん……私……する、から……おも、らし……する、から」
787 = "「......Nếu anh hai nói......muốn xem...... Ưm......thì em......sẽ làm, mà......sẽ tè, dầm......mà」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 
# monologue
# JP: 僕の、『すまん』を、日々姫は誤解したらしい。
1568 = "Có vẻ như Hibiki đã hiểu lầm lời \"xin lỗi\" của tôi."
# monologue
# JP: 止めようとする声が張り付くその間にももう、\n浮かんだ染みは珠となり、ぼとぼと滲んで落ちていく。
1454 = "Trong lúc tôi còn đang nghẹn lời định cản lại, vết ố đã đọng thành giọt, rỏ từng giọt tí tách xuống."
# monologue
# JP: （ぷ……しゃ――じょろ……ろ……ろっ）
1853 = "（Tí......tách——Tí......tách......tách）"
# monologue
# JP: 緊張のせいか、パンツが壁になってるせいか、\nそれとももともとがそうなのか。
1338 = "Không biết là do căng thẳng, do quần lót cản lại, hay vốn dĩ đã như vậy."
# monologue
# JP: 日々姫の尿には勢いがなく、恥じらうように、\nパンツに染みては黄色く膨らみ垂れ落ちる。
1587 = "Dòng nước tiểu của Hibiki không có lực, như đang e thẹn, thấm vào quần lót, đọng thành giọt màu vàng rồi nhỏ xuống."
# 【日々姫】
# display as 日日姬
# JP: 「や……私……おとな……なの、に……おもらし……\nにぃにに……見られて……しちゃ、って……んっ！」
1023 = "「A......Em......rõ ràng là......người lớn rồi, mà......lại tè dầm...... Bị anh hai......nhìn thấy......đang tè, thế này......ưm!」"
# monologue
# JP: ぴゅっと、勢い良く尿が飛び。\nそのあとはまた、ぼとぼとじょろじょろ垂れ落ちる。
1425 = "Nước tiểu bỗng phun ra mạnh mẽ. Sau đó lại tiếp tục rỏ xuống từng giọt tí tách."
# monologue
# JP: 日々姫の太ももをつたったものは、\nソックスにまで滲みそうで――
1614 = "Những giọt nước chảy dọc theo đùi của Hibiki, có vẻ như sắp thấm cả vào đôi tất――"
# monologue
# JP: （ぺろっ）
1863 = "（Liếm nhẹ）"
# 【日々姫】
# display as 日日姬
# JP: 「ふやっ！？　にぃに――舐めてっ――んっ――\nふあっ――あっ――ぺろ、ぺろ――おも――らしっ」
1042 = "「Hyaa!? Anh hai――đang liếm――ưm―― Phù――a――liếm, liếm――nước tiểu――của em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……ん……ぷあっ――ソックスに――んっ――\n染み、ては――れるっ――いかん――だろう」
1114 = "「Ưm......ưm......phù――Để thấm――ưm―― vào tất――thì――không――được――mà」"
# 【日々姫】
# display as 日日姬
# JP: 「や……あっ――にぃにの、ぺろぺろ――んっ――\n登って……きてる――ふっ――あ――あっ――んっ！！」
1021 = "「A......a――Anh hai, đang liếm――ưm―― Liếm dần lên......trên――phù――a――a――ưm!!」"
# monologue
# JP: （じゅるるるるうぅぅぅぅぅっ！）
1794 = "（Chùn chụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃああんっ！！？」
1033 = "「Hyaaaan!!?」"
# monologue
# JP: たっぷり尿の染みたパンツを、\n唇で絞るようにして舐め洗いする。
1489 = "Tôi dùng môi mút chặt lấy chiếc quần lót đẫm nước tiểu, như thể đang vắt kiệt nó."
# monologue
# JP: 力をいれればじゅわりと尿が溢れだし、\n味も一気に広がってくる。
1500 = "Chỉ cần dùng sức một chút là nước tiểu lại trào ra, mùi vị cũng lập tức lan tỏa trong khoang miệng."
# 【双鉄H】
# display as 雙鐵
# JP: （しょっぱくて――ぬるくて――えぐい。\nなんとも、尿とはこういう味だという味だなぁ）
1847 = "（Hơi mặn――ấm ấm――và chát chát. Đúng là, nước tiểu thì phải có vị như thế này nhỉ）"
# 【日々姫】
# display as 日日姬
# JP: 「やっ――あっ――私の――おもらし――パン、つ――\nにぃにが、ベロで――ちゅう、って――んううっ！！！」
1010 = "「A――a――Quần lót――tè dầm――của em―― Anh hai, dùng lưỡi――mút, lấy――ưm ưm!!!」"
# monologue
# JP: （ぷちゅっ！）
1806 = "（Phụt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 
# monologue
# JP: 日々姫が、軽く達したのだろうか？\n口内に弾けたそれは、尿混じりだが――おまんこの蜜だ。
1577 = "Có phải Hibiki vừa mới đạt cực khoái nhẹ không? Thứ bắn vào trong miệng tôi, tuy có lẫn cả nước tiểu――nhưng đó là mật dịch từ âm đạo của em ấy."
# monologue
# JP: 僕も、イキたい。\n素直に思い――日々姫の股間から唇を離す。
1447 = "Tôi cũng, muốn ra. Nghĩ vậy――tôi liền rời môi khỏi đũng quần của Hibiki."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫？　パンツを脱いでくれるか？\nそれから、上も――」
1196 = "「Hibiki? Em cởi quần lót ra được không? Sau đó, cả phần trên nữa――」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……うん――んっ――っと――ぐじゅぐじゅで――\nちょっと――脱ぎづらい……かもっ――ん！」
1088 = "「A......vâng――ưm――a――ướt nhẹp hết rồi―― Có lẽ――hơi khó cởi một chút......ưm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「かわいいな、とても」
1192 = "「Đáng yêu lắm, cực kỳ đáng yêu」"
# 【日々姫】
# display as 日日姬
# JP: 「はうっ――」
1105 = "「Hau――」"
# monologue
# JP: 日々姫の乳首は、\n舐めてほしそうに勃起し小さく震えてる。
1582 = "Hai núm vú của Hibiki, cương cứng và khẽ run lên như thể đang mời gọi tôi liếm láp."
# monologue
# JP: そうしたいのは、僕も同じだ。\nだが、今は――
1696 = "Tôi cũng rất muốn làm vậy. Nhưng mà, bây giờ thì――"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫の肌も、\nぐじゅぐじゅに濡れてしまっているな」
1191 = "「Làn da của Hibiki, cũng ướt nhẹp hết cả rồi nhỉ」"
# monologue
# JP: （ちゅっ）
1864 = "（Chụt）"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――んっ――直、接っ――ふあっ――んっ」
1077 = "「A――ưm――Trực, tiếp――phù――ưm」"
# monologue
# JP: （れるっ――れろっ――じゅぶっ――ぢゅうっ）
1793 = "（Liếm——Liếm——Chụt——Chụt）"
# monologue
# JP: おまんこの肉の割れ目を開けば、\n中にたまってた尿が飛び出し口へと入る。
1494 = "Khi tôi tách khe thịt âm đạo ra, lượng nước tiểu đọng lại bên trong liền bắn ra và lọt vào miệng tôi."
# monologue
# JP: 尿道口を、膣口を舐めて綺麗にし、\nそれからいったん、ふとももの付け根を舐めまわす。
1473 = "Tôi liếm sạch sẽ lỗ niệu đạo và cửa mình, sau đó chuyển sang liếm láp quanh gốc đùi em ấy."
# 【日々姫】
# display as 日日姬
# JP: 「きもち……いっ――んっ――好き……ぺろぺろ……\nにぃにに、ぺろぺろ……されるの――大、好き」
1145 = "「Sướng......quá――ưm――Em thích......liếm liếm...... Được anh hai, liếm liếm......thế này――Em thích, lắm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ほうは」
1241 = "「Vậy sao」"
# monologue
# JP: （れろおおおおおっっ）
1857 = "（Liếm láp）"
# 【日々姫】
# display as 日日姬
# JP: 「くふうううううんっっっ」
1123 = "「Ưm a」"
# monologue
# JP: 尿をつたって、とどまることなく舌を滑らす。
1423 = "Tôi trượt lưỡi không ngừng theo dòng nước tiểu."
# monologue
# JP: パンツが覆ってた範囲はすべて、\n余すところなく塩っぽい味に覆われている。
1358 = "Tất cả những vùng da từng bị quần lót che phủ, đều đọng lại hương vị mằn mặn không sót chỗ nào."
# 【日々姫】
# display as 日日姬
# JP: 「あ……にぃ、に――」
1095 = "「A......Anh, hai――」"
# monologue
# JP: 期待と、不安が入り交じる声。
1591 = "Một giọng nói đan xen giữa kỳ vọng và bất an."
# monologue
# JP: 尿は、尻にまでつたってしまった。\nならば日々姫が止めない限り、僕は綺麗に舐めとるのみだ。
1421 = "Nước tiểu đã chảy xuống tận mông. Nếu vậy, chừng nào Hibiki chưa bảo dừng lại, tôi sẽ tiếp tục liếm sạch sành sanh."
# monologue
# JP: （ぐいっ）
1828 = "（Tách ra）"
# monologue
# JP: 尻肉を掴み大きく割って――
1479 = "Tôi bóp lấy hai bầu mông thịt rồi vạch rộng ra――"
# monologue
# JP: （ぺろっ）
# 1863 = "（舔）" 
# 【日々姫】
# display as 日日姬
# JP: 「んひゃううううっ！？　ひあっ――おひっ――\nそこっ――にぃに――おしりっ――ふあ――あっ！！？」
1121 = "「Ưm hyaa!? Hya――Mô―― Chỗ đó――Anh hai――Mông――phù――a!!?」"
# monologue
# JP: （ぺろっ――れろっ――ちゅぷっ――――にゅるる！）
# 1793 = "（來回舔舐）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！？　あっ！　べろっ――やっ――にゅうって！\nおしり――中、まで――なめてっ――ふあ、あ、あっ！」
1041 = "「Hyaa!? A! Lưỡi――a――đang chui vào! Mông――Bên trong, cũng――bị liếm――phù, a, a!」"
# monologue
# JP: （きゅうううっ！！！）
1844 = "（Thắt chặt!!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1262 = "「！」" 
# monologue
# JP: 肛門がキュっと締め付けてきて、\n舌が苦しいほどになる。
1400 = "Hậu môn bỗng co thắt lại, siết chặt đến mức khiến lưỡi tôi phát đau."
# monologue
# JP: 慌てて日々姫から口を外せば、\n日々姫はもう、膝をがくがく震わせている。
1498 = "Tôi vội vàng rút miệng khỏi người Hibiki, thấy hai đầu gối của em ấy đang run rẩy lập cập."
# 【双鉄H】
# display as 雙鐵
# JP: 「そんなに、お尻が気持ちいいのか？」
1152 = "「Mông được liếm sướng đến vậy sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「う、うん。恥ずかし……けど――えと……\n私……私、あの――お尻――ぺろ、ぺろ――され、て」
