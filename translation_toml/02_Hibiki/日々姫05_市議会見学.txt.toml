# lines: 394 
# 【日々姫】
# display as 日日姬
# JP: 「あー、懐かしかー。\nこれまだ書いとーとね」
1930 = "「A, hoài niệm quá.\nBây giờ vẫn còn viết cái này nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ん？」
1949 = "「Hửm?」"
# monologue
# JP: 入り口そばの掲示板。\n目を向けてすぐ、稀咲先輩が笑い出す。
2816 = "Bảng thông báo cạnh lối vào.\nVừa đưa mắt nhìn, tiền bối Kisaki liền bật cười."
# 【稀咲】
# display as 稀咲
# JP: 「あはははは！　なんだこれ！\n『納税義務』って、すごいセンスのコがいるね」
1893 = "「A ha ha ha ha! Cái gì đây!\n『Nghĩa vụ nộp thuế』, có đứa bé nào đó khiếu thẩm mỹ mặn mòi thật đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　稀咲先輩、これ書いたことなかと――んんっ！\n稀咲先輩も、少等部のとき、これ、書きませんでした？」
1911 = "「Hả? Tiền bối Kisaki chưa từng viết cái này sao——ưm!\nTiền bối Kisaki, hồi còn ở trường Tiểu học, không viết cái này sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「少等部の？」
1985 = "「Của trường Tiểu học á?」"
# monologue
# JP: 稀咲先輩が唇の横に指をあて、\nほんの少しだけ首を傾げる。
2801 = "Tiền bối Kisaki đặt ngón tay bên cạnh môi,\nrồi khẽ nghiêng đầu."
# monologue
# JP: 大人っぽいのに、すっごくかわいい！\n今度真似して、にぃにの前でやってみよっと。
2444 = "Trông người lớn thế mà lại siêu dễ thương!\nLần tới mình phải bắt chước làm thử trước mặt anh hai mới được."
# 【稀咲】
# display as 稀咲
# JP: 「少等部の頃は、転校が結構多かったんだ。\n父の仕事の都合でね」
2122 = "「Hồi Tiểu học, tôi chuyển trường khá nhiều.\nVì lý do công việc của bố.」"
# 【日々姫】
# display as 日日姬
# JP: 「そっか。なるほどです」
2095 = "「Ra là vậy. Em hiểu rồi.」"
# monologue
# JP: 言われてみたら、すごく納得。\n稀咲先輩の――私のお手本の、標準語。
2830 = "Nghe chị ấy nói vậy, tôi mới hiểu ra.\nTiếng phổ thông của tiền bối Kisaki——hình mẫu của tôi."
# monologue
# JP: ずっと隈元とか御一夜だったら、きっと、\nこんなに綺麗に響かない。
2434 = "Nếu cứ ở Kumamoto hay Ohimitera mãi, thì chắc chắn,\nsẽ không thể nói hay đến thế."
# 【稀咲】
# display as 稀咲
# JP: 「何が、“なるほど”？」
2025 = "「\"Hiểu rồi\" là sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「この習字、稀咲先輩が知らない理由です」
2123 = "「Lý do tiền bối Kisaki không biết về bài tập viết thư pháp này ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「そんなに有名なものなのかい？」
2240 = "「Nó nổi tiếng đến vậy sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「有名っていうか――」
2177 = "「Cũng không hẳn là nổi tiếng——」"
# monologue
# JP: 稀咲先輩の仕草、早速真似しちゃう。
2884 = "Tôi liền bắt chước ngay cử chỉ của tiền bối Kisaki."
# monologue
# JP: 唇の端、ちょこっと曲げて指をあてて――\nどうかな？　こんな感じかな？
2821 = "Khóe môi hơi cong lên một chút, đặt ngón tay vào——\nThế nào nhỉ? Trông như thế này chăng?"
# 【日々姫】
# display as 日日姬
# JP: 「少等部六年の、仲等部にあがる前の年の書き初めで、\nみんな、必ず書くんです。御一夜市全部の学園で」
1868 = "「Lớp sáu trường Tiểu học, trong buổi khai bút đầu năm trước khi lên Trung học,\nai cũng bắt buộc phải viết nó. Ở tất cả các trường trong thành phố Ohimitera.」"
# monologue
# JP: 標準語とか、帝都とか。それはやっぱり憧れだけど、\n御一夜には御一夜の面白さがある。
2701 = "Tiếng phổ thông, hay thủ đô. Những thứ đó quả thực rất đáng ngưỡng mộ,\nnhưng Ohimitera cũng có những điều thú vị riêng của Ohimitera."
# monologue
# JP: 先輩がそれを経験しそこねてるなら、伝えてあげたい。
2643 = "Nếu tiền bối đã bỏ lỡ trải nghiệm đó, thì tôi muốn kể cho chị ấy nghe."
# 【稀咲】
# display as 稀咲
# JP: 「必ず書くって――まさか」
2259 = "「Bắt buộc phải viết á——không lẽ nào.」"
# 【日々姫】
# display as 日日姬
# JP: 「そのまさかです。『納税義務』。\nちなみに、仲等部三年の書き初めでもみんな書きます」
2113 = "「Chính là cái 'không lẽ nào' đó đấy ạ. 『Nghĩa vụ nộp thuế』.\nNhân tiện thì, buổi khai bút đầu năm lớp ba Trung học mọi người cũng đều viết.」"
# 【稀咲】
# display as 稀咲
# JP: 「驚いたな。ポーレット市長がそんな思い切った人とは\n――ああ、いや、日々姫の頃からなら、その先代が？」
2141 = "「Bất ngờ thật đấy. Không ngờ thị trưởng Paulette lại là người táo bạo như vậy\n——à không, nếu từ thời Hibiki thì là người tiền nhiệm sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、それは違かと――っと、違います。\nもっとずっと前からの……伝統？　って感じみたいです」
1908 = "「A, cái đó thì không phả——à, không phải đâu ạ.\nCó vẻ như nó là một truyền thống……từ rất lâu rồi cơ ạ?」"
# 【稀咲】
# display as 稀咲
# JP: 「ずっと前って」
2006 = "「Rất lâu rồi là từ bao giờ.」"
# 【日々姫】
# display as 日日姬
# JP: 「うちのねぇね――姉も書いてましたし、それどころか、\n登呂流湯のおばあさんも書いたっていってましたから」
2034 = "「Chị hai nhà em——chị gái em cũng đã từng viết, thậm chí,\nbà lão ở Tororyu-yu cũng nói là đã từng viết nữa cơ.」"
# 【稀咲】
# display as 稀咲
# JP: 「登呂流湯の。\nへぇえ、それは本当に伝統だねぇ」
2132 = "「Bà lão ở Tororyu-yu á.\nHể, vậy thì đúng là truyền thống thật rồi nhỉ.」"
# monologue
# JP: ふ、と小さく鼻を鳴らして、\n稀咲先輩の目が細くなる。
2814 = "Tiền bối Kisaki khẽ hừ mũi,\nđôi mắt nheo lại."
# 【稀咲】
# display as 稀咲
# JP: 「だからかな？　御一夜市の市税徴収率は、県下どころか、\n九洲全域でもずば抜けて高い、一位なんだよ」
2050 = "「Có lẽ vì thế chăng? Tỷ lệ thu thuế của thành phố Ohimitera không chỉ trong tỉnh,\nmà còn cao vượt trội trên toàn khu vực Kyushu, đứng vị trí số 1 đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうなんですか？」
2144 = "「Vậy sao ạ?」"
# 【稀咲】
# display as 稀咲
# JP: 「間違いないよ。その背景に、『納税義務』の書き初めが、\nもしもあるなら、ちょっと興味深いことだよね」
1866 = "「Không sai đâu. Đằng sau chuyện đó, nếu thực sự có liên quan đến buổi khai bút 『Nghĩa vụ nộp thuế』,\nthì đúng là một điều khá thú vị nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「どう、かなぁ？\nそんなに単純でもないと思いますけど」
2009 = "「Không biết, có phải vậy không nhỉ?\nEm nghĩ mọi chuyện không đơn giản như thế đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「いやいや」
1795 = "「Không không.」"
# monologue
# JP: 先輩はクスっと笑って首を振り、今度はまっすぐ指をたて、\n私の鼻先を軽ぅくつつく。
2597 = "Tiền bối khẽ cười rồi lắc đầu, lần này chị ấy giơ thẳng ngón tay lên,\nvà gõ nhẹ vào đầu mũi tôi."
# 【稀咲】
# display as 稀咲
# JP: 「覚えて置くといいよ、日々姫。\n人を育てるのは経験、環境、そして教育。それだけだ」
2075 = "「Em nên nhớ kỹ điều này, Hibiki.\nThứ nuôi dưỡng con người là kinh nghiệm, môi trường và giáo dục. Chỉ vậy thôi.」"
# 【女教師】
# display as ？？？
# JP: 「それがわかっているなら、ですね」
2061 = "「Nếu các em đã hiểu được điều đó, thì tốt.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぴゃうっ！？」
1885 = "「Pyau!?」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、先生」
1932 = "「A, thưa cô.」"
# monologue
# JP: あれ？　これ、ちょっとマズいかも。\n周り……いつの間に誰もいなくなっちゃってる。
2544 = "Ủa? Tình hình này, có vẻ hơi gay go rồi.\nXung quanh……chẳng còn ai từ lúc nào không hay."
# 【女教師】
# display as 女教師
# JP: 「あなたがたは何故？　選択授業という学びの機会を」
2256 = "「Tại sao các em lại ở đây? Cơ hội học tập là giờ học tự chọn thì sao」"
# 【稀咲】
# display as 稀咲
# JP: 「はい、一刻も逃さぬように行動したく思います。\nね？　日々姫」
2018 = "「Vâng, em nghĩ là mình phải hành động để không bỏ lỡ một giây phút nào.\nĐúng không? Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぴゃっ！？　あ――はいっ！」
1904 = "「Pya!? A——vâng!」"
# monologue
# JP: 稀咲先輩に手を引かれ、\n市役所内に急いで駆け込――――わっ！？
2811 = "Bị tiền bối Kisaki kéo tay,\ntôi vội vàng chạy vào bên trong tòa thị chính————oái!?"
# 【男性議員】
# display as ？？？
# JP: 「そんな説明では納得できないっ！」
1852 = "「Giải thích như vậy thì không thể chấp nhận được!」"
# 【稀咲】
# display as 稀咲
# JP: 「大きな声だね。何事だろう」
1968 = "「Giọng to thật đấy. Chuyện gì vậy nhỉ.」"
# monologue
# JP: ケンカとかそういうのだったら怖いのに……
2447 = "Nếu là đánh nhau hay gì đó thì đáng sợ lắm……"
# monologue
# JP: 稀咲先輩は声がした方にどんどん進んで――って、\nえ！？　ここって――
2804 = "Tiền bối Kisaki cứ thế tiến về phía có tiếng nói——ơ,\nhả!? Chỗ này là——"
# 【稀咲】
# display as 稀咲
# JP: 「開けっ放しとはね。だから音漏れするんだよ」
1964 = "「Mở toang cửa thế này cơ mà. Thảo nào âm thanh lọt ra ngoài.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
1922 = "「A.」"
# monologue
# JP: 稀咲先輩は私を連れて、慣れきった手つきと足取りで、\n市議会の、議場の傍聴席へ入ってすぐさま、扉を閉める。
2808 = "Tiền bối Kisaki kéo tôi đi, với những cử chỉ và bước chân vô cùng quen thuộc,\nbước vào hàng ghế dự thính của phòng họp hội đồng thành phố, rồi lập tức đóng cửa lại."
# 【男性議員】
# display as 男議員
# JP: 「わかるように説明してもらえませんかね。\n利権関係、明快にっ！」
2198 = "「Cô có thể giải thích cho dễ hiểu được không.\nMối quan hệ lợi ích, phải rõ ràng!」"
# monologue
# JP: 男の人の大きな声。
2740 = "Giọng nói lớn của một người đàn ông."
# monologue
# JP: ほとんど怒鳴ってるみたいに聞こえて、\n関係の無い私でも、体がちょっとびくってなる。
2880 = "Nghe gần như là đang quát tháo,\nngay cả một người không liên quan như tôi, cơ thể cũng hơi giật mình."
# 【稀咲】
# display as 稀咲
# JP: 「荒れてるようだね。\nこういうときこそ、議会見学は面白い」
2137 = "「Có vẻ hỗn loạn nhỉ.\nChính những lúc thế này, việc tham quan hội đồng mới thú vị.」"
# 【日々姫】
# display as 日日姬
# JP: 「あの、でも――」
1891 = "「Ừm, nhưng mà——」"
# monologue
# JP: やだし。怖いし。\nこんなとこ、すぐ出て行きたいし……あ、そうだ！
2632 = "Không thích đâu. Đáng sợ lắm.\nTôi muốn rời khỏi nơi này ngay lập tức……A, đúng rồi!"
# 【日々姫】
# display as 日日姬
# JP: 「ほら、選択授業！　参加しないとダメですし」
1804 = "「Này, giờ học tự chọn! Chúng ta phải tham gia mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「市役所見学の授業だ。全く問題無いよ。\n議場こそ、市政を司る役所の中心たる部分なんだから」
2196 = "「Là giờ học tham quan tòa thị chính. Hoàn toàn không có vấn đề gì đâu.\nPhòng họp chính là trung tâm của cơ quan hành chính quản lý thành phố mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「けど――っ！？」
1878 = "「Nhưng mà——!?」"
# monologue
# JP: 視界の端に、ふわりと動く。
2435 = "Ở khóe mắt tôi, có thứ gì đó khẽ chuyển động."
# monologue
# JP: 金色の髪――\n染めてるやつとは全然違う、とても自然な。
2897 = "Mái tóc màu vàng kim——\nHoàn toàn khác với loại tóc nhuộm, trông rất tự nhiên."
# 【ポーレット】
# display as 波萊特
# JP: 「その点は、\n先程もご説明申し上げましたとおり、先方の」
2234 = "「Về điểm đó,\nnhư tôi đã giải thích lúc nãy, phía đối tác」"
# 【日々姫】
# display as 日日姬
# JP: 「え！？」
1903 = "「Hả!?」"
# 【男性議員】
# display as 男議員
# JP: 「先方の希望での姉妹都市提携とおっしゃいますがねっ！\n\x%l客車;#00ffc040;客車%l;#;譲渡とのバーターでしょ！　それっ！！」
1844 = "「Cô nói là kết nghĩa thành phố kết nghĩa theo nguyện vọng của phía đối tác sao!\nĐó là trao đổi có điều kiện với việc nhượng lại \x%l客車;#00ffc040;toa hành khách%l;#; đúng không! Chuyện đó ấy!!」"
# monologue
# JP: ――怒鳴られてるの、ポーレットさんっ！？
1534 = "——Người đang bị quát tháo, là chị Paulette!?"
# monologue
# JP: 大きな声が怖いとか、授業をちゃんと受けなくちゃとか、\nそんな全部がすっ飛んでいく！
1542 = "Sợ giọng nói lớn, hay phải tham gia giờ học đàng hoàng,\ntất cả những suy nghĩ đó đều bay biến đi mất!"
# 【ポーレット】
# display as 波萊特
# JP: 「バーターという言葉を、\nどう定義するかにもよるかと思いますが――」
2242 = "「Việc định nghĩa từ trao đổi có điều kiện như thế nào,\ntôi nghĩ cũng còn tùy thuộc vào cách hiểu của mỗi người, nhưng——」"
# monologue
# JP: いかつくて意地悪そうなおじさんに、\n大きな声でガナリたてられ。
2891 = "Bị một ông chú trông dữ tợn và xấu tính\nquát tháo ầm ĩ."
# monologue
# JP: なのに、どうしてかポーレットさんは、\n普段よりずっと落ち着いてみえる。
2528 = "Thế nhưng, không hiểu sao chị Paulette,\ntrông lại bình tĩnh hơn ngày thường rất nhiều."
# 【ポーレット】
# display as 波萊特
# JP: 「win-winの取引をバーターと呼ぶのであれば、\n今回の案件は、そのような性質であるかもしれません」
1972 = "「Nếu gọi một cuộc giao dịch đôi bên cùng có lợi là trao đổi có điều kiện,\nthì dự án lần này, có lẽ cũng mang tính chất như vậy.」"
# 【男性議員】
# display as 男議員
# JP: 「バーターだよ、バーター！\n一私企業の利益のために、姉妹都市提携をダシにして！」
2210 = "「Là trao đổi có điều kiện đấy, trao đổi có điều kiện!\nVì lợi ích của một doanh nghiệp tư nhân, mà lấy việc kết nghĩa thành phố làm cái cớ!」"
# 【ポーレット】
# display as 波萊特
# JP: 「だとしても。駿川市との姉妹都市提携が、\n御一夜市に多くのメリットを与えることは変わりません」
1992 = "「Cho dù là vậy. Việc kết nghĩa thành phố với thành phố Surukawa,\nsẽ mang lại nhiều lợi ích cho thành phố Ohimitera là điều không thay đổi.」"
# 【男性議員】
# display as 男議員
# JP: 「そういう問題じゃないだろう！」
2261 = "「Vấn đề không phải là chỗ đó!」"
# monologue
# JP: また怒鳴られて。\nけど、ポーレットさんは顔色ひとつ変えはしない。
2724 = "Lại bị quát tháo.\nNhưng chị Paulette không hề biến sắc."
# 【ポーレット】
# display as 波萊特
# JP: 「私企業の営利活動が、市の発展へと繋がることに、\nどのような問題があるのか、わかりかねます」
2150 = "「Hoạt động kinh doanh của doanh nghiệp tư nhân dẫn đến sự phát triển của thành phố,\ncó vấn đề gì ở đây, tôi không hiểu được.」"
# 【男性議員】
# display as 男議員
# JP: 「っ！」
2280 = "「Hừ!」"
# monologue
# JP: ポーレットさんの言うとおりばい！
2727 = "Chị Paulette nói đúng quá đi!"
# monologue
# JP: 市政は、税収でなりたってるんだから、\n企業の営利活動は、批判されるようなことじゃなかたい！
2703 = "Nền hành chính thành phố được duy trì bằng nguồn thu thuế,\nnên hoạt động kinh doanh của doanh nghiệp không phải là thứ đáng bị chỉ trích!"
# 【稀咲】
# display as 稀咲
# JP: 「へぇ。市長も一皮剥けたのかもね」
1901 = "「Hể. Có vẻ như thị trưởng cũng đã lột xác rồi nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
1909 = "「Hả?」"
# monologue
# JP: あ、いけん――いけない。\n標準語。考えるのも標準語で、だよ。
2550 = "A, không được——không được rồi.\nTiếng phổ thông. Cả lúc suy nghĩ cũng phải dùng tiếng phổ thông chứ."
# monologue
# JP: にぃにと同じに、ちゃんと私もなりたいから。\n兄さんに、もう少しでも追いつきたくて――並びたいから。
2641 = "Vì mình cũng muốn trở nên giống như anh hai.\nMuốn đuổi kịp anh ấy dù chỉ một chút——muốn được đứng ngang hàng với anh ấy."
# 【稀咲】
# display as 稀咲
# JP: 「あんなに怒鳴られたら、確実に動揺してたね、彼女。\nけど今は――強いね。まるで誰かに支えられてるようだ」
2056 = "「Nếu bị quát tháo như thế, chắc chắn cô ấy sẽ dao động.\nNhưng bây giờ——mạnh mẽ thật đấy. Cứ như thể đang được ai đó làm chỗ dựa vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ……」
1917 = "「A……」"
# monologue
# JP: そっかって、思う。\nポーレットさん、強いんじゃなく、頑張ってるんだって。
2638 = "Ra là vậy, tôi thầm nghĩ.\nChị Paulette không phải là người mạnh mẽ, mà là chị ấy đang cố gắng."
# monologue
# JP: （だって、\x%l客車;#00ffc040;客車%l;#;のトラブルのこと――\nポーレットさん、自分の責任って思ってるから）
2944 = "(Tại vì, sự cố của \x%l客車;#00ffc040;toa hành khách%l;#;——\nchị Paulette vẫn nghĩ đó là trách nhiệm của mình mà.)"
# monologue
# JP: だから、今度は結果を出したくて、\nにぃにぃに褒めてもらいたくって――
2658 = "Thế nên, lần này chị ấy muốn tạo ra kết quả,\nmuốn được anh hai khen ngợi——"
# monologue
# JP: 私と同じで、ポーレットさん、\n必死できっと、頑張ってるんだ。
2725 = "Cũng giống như tôi, chị Paulette,\nchắc chắn đang cố gắng hết sức mình."
# 【男性議員】
# display as 男議員
# JP: 「ああっ――ううん、市長」
1915 = "「A——hừm, thưa thị trưởng.」"
# monologue
# JP: やりこめられたおじさんが、\n懲りもしないでまた口先を尖らせる。
2893 = "Ông chú bị vặn lại đến cứng họng,\nvẫn chưa chừa mà lại tiếp tục chu mỏ lên."
# 【男性議員】
# display as 男議員
# JP: 「市の発展につながれば何をしてもいいってんなら、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社の工場誘致反対は、おかしいでしょうが」
2183 = "「Nếu cô nói chỉ cần dẫn đến sự phát triển của thành phố thì làm gì cũng được,\nthì việc phản đối thu hút nhà máy của công ty \x%lエアクラ;#00ffc040;Aircra%l;#; chẳng phải là vô lý sao.」"
# monologue
# JP: あ、この人、それでもやっぱり議員さんなんだ。
2552 = "A, người này, dù sao thì vẫn là một nghị viên nhỉ."
# monologue
# JP: 鋭いな、って私なんかは思う指摘も、\nポーレットさんは涼しい顔で受け流しちゃう。
2530 = "Ngay cả với một lời chỉ trích mà tôi cho là khá sắc bén,\nchị Paulette vẫn có thể dễ dàng bỏ qua với khuôn mặt tỉnh bơ."
# 【ポーレット】
# display as 波萊特
# JP: 「まったく話が違います。エアロ＝クラフテック社の活動と、\n御一夜市の発展とでは、win-winの関係を築けないと」
2239 = "「Hai chuyện hoàn toàn khác nhau. Hoạt động của công ty Aero-Craftech\nvà sự phát triển của thành phố Ohimitera không thể xây dựng được mối quan hệ đôi bên cùng có lợi.」"
# 【ヤジ】
# display as 起哄聲
# JP: 「市長！　早くご結婚されたらどうですかね」
2000 = "「Thị trưởng! Sao cô không mau lấy chồng đi nhỉ.」"
# 【稀咲】
# display as 稀咲＆日日姬
# JP: 「っ！」\n「っ！！？」
2281 = "「!」\n「!!?」"
# 【ヤジ】
# display as 起哄聲
# JP: 「旦那に抱いてもらえりゃねぇ、\nウィンウィンなんていらなくなるでしょ」
1876 = "「Được chồng ôm ấp thì,\nchẳng cần phải đôi bên cùng có lợi làm gì nữa đâu.」"
# monologue
# JP: 下品！　最低！　オヤジギャグ！！！！\n抗議の声と下品な笑いで、議場がざわつく。
1538 = "Thô bỉ! Tồi tệ! Trò đùa của mấy lão già!!!!\nPhòng họp xôn xao bởi những tiếng la ó phản đối và tiếng cười thô bỉ."
# monologue
# JP: けど、ポーレットさんは、\nやっぱり、全然動じてない。
2472 = "Thế nhưng, chị Paulette,\nquả nhiên vẫn không hề nao núng."
# 【ポーレット】
# display as 波萊特
# JP: 「議長。不規則発言に注意を――――っ！？」
2202 = "「Thưa chủ tọa. Xin hãy lưu ý đến những phát ngôn không đúng quy định————!?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1922 = "「啊」" 
# monologue
# JP: ポーレットさんの鼻から、つうって赤い糸。\n一瞬、議場の全部が止まる。
2432 = "Một vệt máu đỏ tươi chảy ra từ mũi chị Paulette.\nTrong chốc lát, cả phòng họp như ngừng đọng lại."
# 【ポーレット】
# display as 波萊特
# JP: 「失礼」
2054 = "「Xin thất lễ.」"
# monologue
# JP: 鼻血。\nけど、慌ててない。慣れてる感じで鼻を押さえる。
2726 = "Máu cam.\nNhưng chị ấy không hề hoảng hốt. Bịt mũi lại với vẻ rất quen thuộc."
# monologue
# JP: それがかえって、怖い感じにみえてしまう。
2878 = "Điều đó ngược lại, càng khiến tôi cảm thấy đáng sợ hơn."
# monologue
# JP: （鼻血慣れって……それって結構マズくない？\n過労、かな。体調かなりギリギリなんじゃないのかな）
2953 = "(Quen với việc chảy máu cam……chuyện đó khá là tồi tệ đấy chứ?\nLàm việc quá sức sao. Tình trạng sức khỏe của chị ấy chắc đang ở mức báo động rồi.)"
# 【稀咲】
# display as 稀咲
# JP: 「最悪のタイミングだな」
2101 = "「Đúng lúc tồi tệ nhất nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 1909 = "「哎？」" 
# 【ヤジ】
# display as 起哄聲
# JP: 「おいおい想像させちゃったかぁ？\n市長、申し訳ございませーんっ！」
1939 = "「Này này, tôi làm cô tưởng tượng ra cảnh đó rồi sao?\nThị trưởng, thành thật xin lỗiii!」"
# 【ポーレット】
# display as 波萊特
# JP: 「～～～～っ！！！」
2284 = "「~~~~!!!」"
# monologue
# JP: 真っ赤な顔。けど、照れてない。\n初めて、みる。ポーレットさん、怒ってる。
2576 = "Khuôn mặt đỏ bừng. Nhưng không phải vì xấu hổ.\nLần đầu tiên tôi thấy. Chị Paulette đang tức giận."
# monologue
# JP: ヤジを飛ばした議員を睨んで、大股で――って！！？
2584 = "Chị ấy trừng mắt nhìn tên nghị viên vừa la ó, rồi sải bước dài——oái!!?"
# 【日々姫】
# display as 日日姬
# JP: 「ポーレットさんっ！！？」
2121 = "「Chị Paulette!!?」"
# monologue
# JP: 力強かった膝がいきなり、ストンて抜ける。\nへなへな、ポーレットさんが崩れ落ちちゃう。
2866 = "Đôi chân đang bước đi mạnh mẽ bỗng nhiên khuỵu xuống.\nChị Paulette mềm nhũn người rồi ngã gục xuống."
# monologue
# JP: 顔色――\n普段から白いのに、蝋みたいな白になっちゃってる。
2571 = "Sắc mặt——\nBình thường đã trắng rồi, giờ lại trắng bệch như sáp."
# 【ヤジ】
# display as 起哄聲
# JP: 「あらぁ～、市長、もしかして」
1912 = "「Chà~, thị trưởng, không lẽ nào.」"
# 【稀咲】
# display as 稀咲
# JP: 「いい加減にしろっ！」
1960 = "「Vừa phải thôi!」"
# monologue
# JP: 一喝。\n稀咲先輩が立ち上がる。
2815 = "Một tiếng quát lớn.\nTiền bối Kisaki đứng bật dậy."
# 【稀咲】
# display as 稀咲
# JP: 「それが議員の発言か！\n御一夜市民の代表者として、恥ずかしくないのかっ！」
2243 = "「Đó là phát ngôn của một nghị viên sao!\nLà đại diện cho người dân Ohimitera, ông không thấy xấu hổ à!」"
# monologue
# JP: 鋭い声での正論に、\n議場がシン――と静まり返る。
2921 = "Lời nói chính nghĩa bằng một giọng điệu đanh thép,\nkhiến cả phòng họp im phăng phắc."
# 【稀咲】
# display as 稀咲
# JP: 「何をしているんだ議長。\n市長の介抱を指示しないのか」
2201 = "「Ông đang làm gì vậy hả chủ tọa.\nSao không chỉ đạo người chăm sóc cho thị trưởng đi.」"
# 【議長】
# display as 議長
# JP: 「あ！？　――あっ、うむっ！」
1925 = "「Hả!? ——A, ừm!」"
# monologue
# JP: （コン、コンッ！）
2941 = "（Cộc, cộc!）"
# monologue
# JP: 木槌。\n映画で見るようなヤツ。
2856 = "Búa gỗ.\nGiống như cái thường thấy trên phim ảnh."
# 【議長】
# display as 議長
# JP: 「休憩します、[ざんじ,1]暫時休憩！\n市長治療のため、暫時休憩とします！」
1831 = "「Chúng ta sẽ nghỉ ngơi, tạm thời nghỉ ngơi!\nĐể thị trưởng được điều trị, chúng ta sẽ tạm thời nghỉ ngơi!」"
# monologue
# JP: その声が、ピンと張り詰めてた何かを切って。
2827 = "Giọng nói đó, như cắt đứt thứ gì đó đang căng như dây đàn."
# monologue
# JP: ヤジを飛ばしてた男が今度は、\nこっちに向かってツバを飛ばす。
2505 = "Gã đàn ông vừa la ó lúc nãy, lần này,\nlại văng nước bọt về phía chúng tôi."
# 【ヤジ】
# display as 起哄聲
# JP: 「おい、傍聴席のガキっ！！　\nお前なぁ、神聖な議会を何だと」
1943 = "「Này, con ranh trên ghế dự thính kia!! \nMày nghĩ cái hội nghị thiêng liêng này là cái gì hả.」"
# 【男性議員】
# display as 男議員
# JP: 「バカ！　あの方は銀行の！　[ほうしょう,1]宝生さんのっ！！」
2162 = "「Đồ ngu! Người đó là của ngân hàng! Là tiểu thư nhà Houshou đó!!」"
# 【ヤジ】
# display as 起哄聲
# JP: 「え……あ――あっ？」
1894 = "「Hả……a——a?」"
# monologue
# JP: 下品な男の下品な顔が、\n下品な赤から、青になる。
2441 = "Khuôn mặt thô bỉ của gã đàn ông thô bỉ,\ntừ màu đỏ thô bỉ, chuyển sang tái mét."
# monologue
# JP: 稀咲先輩は、スマートフォンを取り出して、\nその顔をパチリ、写真に収める。
2803 = "Tiền bối Kisaki lấy điện thoại ra,\nvà tách, chụp lại khuôn mặt đó."
# 【稀咲】
# display as 稀咲
# JP: 「この件は関係各所に連絡させてもらう。\n自身に恥じることがないなら、堂々としていたまえ」
2236 = "「Vụ này tôi sẽ liên lạc với các bên liên quan.\nNếu bản thân không có gì phải xấu hổ, thì cứ đường hoàng mà đứng đó đi.」"
# 【ヤジ】
# display as 起哄聲
# JP: 「あの――各所って、ちょっと、おいっ！」
2257 = "「Ừm——các bên liên quan là sao, khoan đã, này!」"
# 【男性議員】
# display as 男議員
# JP: 「おいじゃないっ！\nお前、自分が何をやったかわかってるのか！！」
1938 = "「Này cái gì mà này!\nÔng có biết mình vừa làm cái quái gì không hả!!」"
# 【ヤジ】
# display as 起哄聲
# JP: 「いやっ――だって、いえ」
1794 = "「Không——nhưng mà, không.」"
# monologue
# JP: 仲間割れ。っていうか手のひら返し。\n見苦しい――思った瞬間、なにかがさっと視界を遮る。
2861 = "Lục đục nội bộ. Hay nói đúng hơn là trở mặt như lật bàn tay.\nThật chướng mắt——ngay khoảnh khắc tôi nghĩ vậy, có thứ gì đó xẹt qua che khuất tầm nhìn."
# 【稀咲】
# display as 稀咲
# JP: 「出よう、日々姫」
2032 = "「Ra ngoài thôi, Hibiki.」"
# monologue
# JP: 稀咲先輩が手を伸ばし、\n落ち着いた声で、誘ってくれる。
2802 = "Tiền bối Kisaki vươn tay ra,\nvà rủ tôi bằng một giọng nói điềm tĩnh."
# 【稀咲】
# display as 稀咲
# JP: 「残念ながら、\nこの方達からはロクなことを学べそうもない」
2008 = "「Thật đáng tiếc,\nchẳng học được điều gì tử tế từ những người này đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。うん。――そうだね。\nその方向で。細かいことは任せるよ」
1947 = "「Ừ. Ừ. ——Đúng vậy.\nCứ theo hướng đó đi. Chi tiết thì tôi giao cho cô.」"
# monologue
# JP: (ぴっ）
32 = "(Bíp)"
# monologue
# JP: 稀咲先輩が電話を切る。\n相手が誰かはわからないけど、内容はわかる。
2812 = "Tiền bối Kisaki cúp máy.\nDù không biết người bên kia là ai, nhưng tôi hiểu nội dung cuộc gọi."
# monologue
# JP: あの下品な男のしたことは、公になる。\nこっそり闇に葬ることなんて、できなくなった。
2895 = "Hành động của gã đàn ông thô bỉ đó, sẽ được công khai.\nSẽ không thể lén lút chôn vùi trong bóng tối được nữa."
# 【稀咲】
# display as 稀咲
# JP: 「ほら、日々姫」
2170 = "「Này, Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぴゃっ！？」
# 1885 = "「呀！？」" 
# monologue
# JP: 首筋、いきなり冷たくなって。
2706 = "Đột nhiên có thứ gì đó lạnh buốt áp vào gáy."
# monologue
# JP: ジュースなんだって気付いた瞬間、強く感じる。\n喉、ものすごく渇いてるって。
2732 = "Ngay khi nhận ra đó là lon nước ép, tôi mới cảm thấy rõ ràng.\nCổ họng mình đang cực kỳ khát."
# 【日々姫】
# display as 日日姬
# JP: 「いただきます」
2029 = "「Em xin phép ạ.」"
# monologue
# JP: 炭酸の、果汁だなんて１％未満しかない、\nオレンジジュース。
2840 = "Nước ép cam có ga,\nchứa chưa đến 1% nước cốt trái cây."
# monologue
# JP: それがしゅわしゅわ、喉からはじけて\nイヤな気持ちを、すうって流してくれるみたいで。
2751 = "Những bọt ga xèo xèo nổ tung trong cổ họng,\nnhư cuốn trôi đi hết mọi cảm giác tồi tệ."
# 【稀咲】
# display as 稀咲
# JP: 「ここまでひどい議会はなかなか見れないね。\nある意味、非常に貴重な経験ではある」
2166 = "「Hiếm khi được chứng kiến một buổi họp hội đồng tệ hại đến mức này đấy.\nỞ một khía cạnh nào đó, đây cũng là một trải nghiệm vô cùng quý giá.」"
# 【日々姫】
# display as 日日姬
# JP: 「ほんとにあるんですね……\nああいう、なんていうのか――セクハラ？　みたいな」
2252 = "「Hóa ra những chuyện như vậy là có thật nhỉ……\nCái đó gọi là gì ta——quấy rối tình dục? Đại loại thế.」"
# 【稀咲】
# display as 稀咲
# JP: 「みたい、ではなくセクシャルハラスメントそのものだ。\nポーレット市長も、試練だね」
1799 = "「Không phải đại loại, mà chính xác là quấy rối tình dục đấy.\nĐây cũng là một thử thách đối với thị trưởng Paulette nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「試練？」
2173 = "「Thử thách ạ?」"
# monologue
# JP: 稀咲先輩はスポーツドリンク。\n青と白との缶がすごく似合って、絵になってる。
2805 = "Tiền bối Kisaki uống nước tăng lực.\nLon nước màu xanh và trắng cực kỳ hợp với chị ấy, trông đẹp như một bức tranh."
# 【稀咲】
# display as 稀咲
# JP: 「男の活躍している場所で、若い女性が頭角を現し始める。\nすると必ず、この手の妨害をしかけるヤツが出てくる」
1955 = "「Ở nơi đàn ông đang làm chủ, một người phụ nữ trẻ bắt đầu bộc lộ tài năng.\nThì chắc chắn, sẽ có kẻ giở trò phá đám kiểu này.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……」
# 1917 = "「啊……」" 
# 【稀咲】
# display as 稀咲
# JP: 「能力を発揮できないうちは、ちやほやお人形扱いさ。\nが、一度自分の立場が脅かされそうになると――ね」
1954 = "「Khi cô chưa thể hiện được năng lực, họ sẽ cưng nựng cô như một con búp bê.\nNhưng một khi vị thế của họ bị đe dọa thì——sẽ khác ngay.」"
# monologue
# JP: ああ、いやだ――と、\n稀咲先輩はつぶやいて缶を傾ける。
2547 = "Thật đáng ghét——\nTiền bối Kisaki lẩm bẩm rồi dốc ngược lon nước."
# monologue
# JP: 苦い薬を飲んでるみたいなその表情に、\n“そうだったんだ”って、感じちゃう。
2623 = "Nhìn biểu cảm như đang uống thuốc đắng của chị ấy,\ntôi bỗng cảm thấy \"Ra là vậy\"."
# monologue
# JP: （稀咲先輩も、銀行で……\nそういう苦労、きっと、経験してるんだ）
2952 = "(Tiền bối Kisaki, ở ngân hàng……\nchắc chắn cũng đã trải qua những khó khăn như thế.)"
# 【稀咲】
# display as 稀咲
# JP: 「もちろん逆の立場であれば、女性が男性に嫌がらせする。\nそうした心理は、どこにでも誰にでも発生する」
2130 = "「Tất nhiên nếu ở lập trường ngược lại, phụ nữ cũng sẽ bắt nạt đàn ông.\nTâm lý đó, có thể xảy ra ở bất cứ đâu và với bất kỳ ai.」"
# monologue
# JP: なのに、ごくりと飲み込んじゃえば、\n稀咲先輩はもうサバサバしてる。
2564 = "Thế nhưng, chỉ cần nuốt ực một cái,\ntiền bối Kisaki lại trở nên điềm nhiên như không."
# 【稀咲】
# display as 稀咲
# JP: 「動物的だよね。群れの濁りを解消する新しい血を歓迎し、\nけれど、群れを変質されそうになってしまえば排除する」
2164 = "「Đúng là bản năng động vật nhỉ. Chào đón dòng máu mới để giải quyết sự trì trệ của bầy đàn,\nnhưng khi bầy đàn có nguy cơ bị biến chất thì lại tìm cách loại bỏ.」"
# monologue
# JP: 理解して、乗り越えて――\nなにか、吹っ切っちゃってるようにも見える。
2578 = "Thấu hiểu, và vượt qua——\ntrông chị ấy như đã rũ bỏ được điều gì đó."
# 【稀咲】
# display as 稀咲
# JP: 「だから。自分の立ち位置を、居場所を作り出すためには。\nきっと誰もが、その試練を越えなくちゃいけない」
2047 = "「Thế nên. Để tạo ra chỗ đứng, tạo ra nơi thuộc về mình.\nChắc chắn ai cũng phải vượt qua thử thách đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……そういわれると、\nなんか、わかるような気がします」
1921 = "「A……nghe chị nói vậy,\nem có cảm giác như mình đã hiểu ra rồi.」"
# monologue
# JP: 絵とか、看板とかのこと。
2647 = "Chuyện về những bức tranh, hay những tấm biển quảng cáo."
# monologue
# JP: 私も……あからさまにじゃないけど、チクって、\n地元の看板屋さんに言われたりしたこともあったし。
2917 = "Tôi cũng……dù không quá lộ liễu, nhưng cũng từng bị\nchủ tiệm làm biển quảng cáo ở địa phương nói xỉa xói vài câu."
# 【稀咲】
# display as 稀咲
# JP: 「だろうね」
2037 = "「Chắc là vậy rồi.」"
# monologue
# JP: 稀咲先輩は、わかってくれてる。\nだって、見ていてくれたから。
2817 = "Tiền bối Kisaki hiểu được điều đó.\nBởi vì chị ấy đã luôn dõi theo tôi."
# monologue
# JP: にぃにぃが居なくて、心細くて。\n動けなかった私に絵筆を、持たせてくれた人だから。
2914 = "Là người đã trao cây cọ vẽ cho tôi, khi tôi đang sợ hãi\nvà không thể tiến bước vì không có anh hai bên cạnh."
# 【稀咲】
# display as 稀咲
# JP: 「しかし市長は……結局は箱入りのお嬢様なのかな。\n頑張っていても、あのタイミングで折れるのは――」
1812 = "「Nhưng mà thị trưởng……rốt cuộc vẫn chỉ là một cô tiểu thư được nuông chiều nhỉ.\nDù có cố gắng đến đâu, nhưng gục ngã vào đúng thời điểm đó thì——」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、それ――違う――違うてっ――\nだって、あぎゃん無理ば重ねとったら、誰だって」
1927 = "「A, chuyện đó——không phải——không phải đâu——\nTại vì, nếu cứ cố sức quá mức như vậy, thì ai mà chẳng」"
# 【稀咲】
# display as 稀咲
# JP: 「無理、か。だろうね」
1861 = "「Cố sức, sao. Chắc là vậy nhỉ.」"
# monologue
# JP: 先輩はまた缶を傾け、\n真っ白な喉をぐびりと鳴らす。
2596 = "Tiền bối lại dốc ngược lon nước,\nnuốt ực một ngụm qua chiếc cổ trắng ngần."
# 【稀咲】
# display as 稀咲
# JP: 「わかるよ。市長だけでも多忙極まる。\nその上、赤字の鉄道会社の社長だものね」
2039 = "「Tôi hiểu mà. Chỉ làm thị trưởng thôi cũng đã bận rộn vô cùng rồi.\nHơn nữa lại còn là giám đốc của một công ty đường sắt đang thua lỗ.」"
# monologue
# JP: 促されてるような気がして、ジュースを飲む。\nそしたらスって、熱くなってた頭が冷える。
2557 = "Cảm giác như đang bị hối thúc, tôi uống một ngụm nước ép.\nNgay lập tức, cái đầu đang nóng bừng của tôi dịu lại."
# 【日々姫】
# display as 日日姬
# JP: 「えと……ポーレットさん。\n今日とか、すごく、キツかったって思うんです」
1890 = "「Ừm……chị Paulette.\nHôm nay, chắc chắn chị ấy đã rất mệt mỏi.」"
# monologue
# JP: だから、改めて言葉を重ねる。
2666 = "Thế nên, tôi lại tiếp tục giải thích."
# 【日々姫】
# display as 日日姬
# JP: 「体とか、時間とかだけのことじゃなく――\n今は、ちょっと、精神的にも」
1797 = "「Không chỉ là vấn đề về thể chất hay thời gian——\nmà hiện tại, tinh thần của chị ấy cũng có chút.」"
# 【稀咲】
# display as 稀咲
# JP: 「\x%l客車;#00ffc040;客車%l;#;のトラブルの件が負担になって、かな？」
2098 = "「Là do sự cố của \x%l客車;#00ffc040;toa hành khách%l;#; trở thành gánh nặng sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1914 = "「A——」"
# monologue
# JP: 驚きはしない。\nだって、稀咲先輩だから。
2818 = "Tôi không hề ngạc nhiên.\nBởi vì, đó là tiền bối Kisaki mà."
# monologue
# JP: その位の情報、銀行に入ってこないのがおかしくて――\nだけど不安は、やっぱりじわじわ湧いてくる。
2881 = "Những thông tin cỡ đó, nếu ngân hàng không biết mới là lạ——\nnhưng sự bất an, quả nhiên vẫn đang từ từ dâng lên trong tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ええと……やっぱり……\n良くないウワサとかになっちゃってますか？」
1888 = "「Ừm……quả nhiên là……\nđã trở thành những lời đồn đại không hay rồi sao ạ?」"
# 【稀咲】
# display as 稀咲
# JP: 「話はいろいろ聞くけどね。良い、良くないはわからない。\nボクも所詮、一次情報を知っているわけではないから」
2235 = "「Tôi cũng nghe nhiều chuyện. Nhưng không biết là tốt hay xấu.\nBởi vì suy cho cùng, tôi cũng không nắm được thông tin từ nguồn trực tiếp.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……そうですよね」
1919 = "「A……đúng vậy nhỉ.」"
# monologue
# JP: ポーレットさんのがんばりのこと、わかって欲しくて。\nクタクタなのもしょうがないって思って欲しくて。
2642 = "Tôi muốn chị ấy hiểu được sự cố gắng của chị Paulette.\nMuốn chị ấy hiểu rằng việc kiệt sức cũng là điều không thể tránh khỏi."
# monologue
# JP: だから、一から話してる。\nあの日、私が経験したこと、残らず全部を。
2660 = "Vì vậy, tôi kể lại mọi chuyện từ đầu.\nTất cả những gì tôi đã trải qua vào ngày hôm đó, không sót một chi tiết nào."
# 【日々姫】
# display as 日日姬
# JP: 「……私達、全然助けてあげられなくて――けど、\nポーレットさんは、私達を助けようとずっとしてて……」
1573 = "「……Bọn em, hoàn toàn không thể giúp gì được cho chị ấy——nhưng,\nchị Paulette thì lại luôn cố gắng giúp đỡ bọn em……」"
# monologue
# JP: やるべきことは他にあって。\nそれをやるだけで精一杯で。
2728 = "Có những việc khác cần phải làm.\nChỉ làm những việc đó thôi cũng đã dốc hết sức rồi."
# monologue
# JP: それは本当にそうだったけど、\nそれでも他に、何か、出来たんじゃないかと思って。
2611 = "Dù sự thật là như vậy,\nnhưng tôi vẫn nghĩ, giá như mình có thể làm thêm được điều gì đó."
# 【日々姫】
# display as 日日姬
# JP: 「やっぱり、今日もポーレットさん。\n一人で議会で頑張って……なのに、私は」
1825 = "「Quả nhiên, hôm nay chị Paulette cũng vậy.\nMột mình cố gắng trong cuộc họp hội đồng……vậy mà, em lại.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね」
1869 = "「Ra là vậy.」"
# monologue
# JP: 言いかけたこと、\n心に浮かんできていたなにか。
2504 = "Lời định nói,\nthứ gì đó vừa hiện lên trong tâm trí tôi."
# monologue
# JP: それをすっぱり、稀咲先輩の言葉が断ち切る。
2877 = "Lời nói của tiền bối Kisaki đã cắt đứt hoàn toàn điều đó."
# 【稀咲】
# display as 稀咲
# JP: 「ありがとう。とても参考になった。\nやはり、当事者の話は違う」
2199 = "「Cảm ơn em. Câu chuyện rất hữu ích.\nQuả nhiên, nghe từ người trong cuộc vẫn khác biệt.」"
# monologue
# JP: 稀咲先輩はまた缶を口につけ、大きく大きく傾ける。
2810 = "Tiền bối Kisaki lại đưa lon nước lên miệng, dốc ngược lên thật cao."
# 【稀咲】
# display as 稀咲
# JP: 「……市長がそこまでギリギリだとは、ね」
1578 = "「……Không ngờ thị trưởng lại kiệt sức đến mức đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「なんですよ。だから」
2090 = "「Là vậy đó ạ. Thế nên.」"
# 【稀咲】
# display as 稀咲
# JP: 「だからといって、倒れていい理由にはならない。\nもっと過酷な状況だったら、リーダー不在は罪悪だ」
1836 = "「Dù vậy, đó cũng không phải là lý do để gục ngã.\nNếu ở trong tình huống khắc nghiệt hơn, việc vắng mặt người lãnh đạo là một tội ác đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「……っ」
1554 = "「……」"
# monologue
# JP: 言い返せない。\n稀咲先輩が言ってることって、正論だ。
2650 = "Không thể cãi lại được.\nNhững lời tiền bối Kisaki nói, đều là lý lẽ chính đáng."
# monologue
# JP: けど、だけど――
2534 = "Nhưng, nhưng mà——"
# 【稀咲】
# display as 稀咲
# JP: 「だけどね、日々姫。最悪に思える状況は、\n得てして、そこから好転していくためのポイントだ」
1811 = "「Nhưng mà này, Hibiki. Tình huống tưởng chừng như tồi tệ nhất,\nthường lại chính là bước ngoặt để mọi chuyện trở nên tốt đẹp hơn.」"
# monologue
# JP: 空っぽになってしまった缶を、稀咲先輩は逆さに振って。
2809 = "Tiền bối Kisaki lắc ngược lon nước đã cạn sạch."
# monologue
# JP: それから、シュン！　ゴミ箱に向け投げられた缶は、\nけど、端っこのとこにぶつかっちゃって、跳ね返る。
2736 = "Sau đó, vút! Lon nước được ném về phía thùng rác,\nnhưng lại va vào mép và nảy ra ngoài."
# 【稀咲】
# display as 稀咲
# JP: 「ああ、惜しい」
1928 = "「A, tiếc thật.」"
# monologue
# JP: それを拾って、今度は普通にゴミ箱に。
2573 = "Chị ấy nhặt nó lên, và lần này bỏ vào thùng rác một cách bình thường."
# monologue
# JP: 先輩は、苦笑しながら私の方へと振り返る。
2598 = "Tiền bối cười khổ rồi quay lại nhìn tôi."
# 【稀咲】
# display as 稀咲
# JP: 「日々姫、これも覚えておくといい。情報も、人も。\nそしてお金も、お金があるところには集まってくる」
2073 = "「Hibiki, em cũng nên nhớ kỹ điều này. Cả thông tin, con người.\nVà cả tiền bạc nữa, tất cả đều sẽ tập trung ở nơi có tiền.」"
# 【日々姫】
# display as 日日姬
# JP: 「お金……」
2262 = "「Tiền bạc……」"
# monologue
# JP: 言われて、不意に思い出す。\nお金が無くて、借りたくて。
2883 = "Nghe vậy, tôi chợt nhớ ra.\nVì không có tiền, nên muốn vay mượn."
# monologue
# JP: 危ういところでにぃにぃが、\n稀咲先輩の担保にされちゃいそうだったこと。
2912 = "Trong lúc nguy cấp, anh hai,\nsuýt chút nữa đã bị mang ra làm tài sản thế chấp cho tiền bối Kisaki."
# monologue
# JP: （稀咲先輩……その話、反対はしなかったって……）
2954 = "(Tiền bối Kisaki……không hề phản đối chuyện đó……)"
# monologue
# JP: もやもやする。\n聞きたいけれど、とても聞けない。
2625 = "Cảm thấy bứt rứt quá.\nMuốn hỏi, nhưng lại không thể hỏi được."
# monologue
# JP: ヤブをつついて蛇を出すのが怖くって……\nはぁって、ため息だけが出る。
2610 = "Sợ 'rút dây động rừng'……\nTôi chỉ biết thở dài một tiếng 'hà'."
# 【日々姫】
# display as 日日姬
# JP: 「……御一夜鉄道もそうだし、御一夜市もそうだし。\nお金があれば、誰も苦しい思いをしないですむのかなぁ」
1570 = "「……Đường sắt Ohimitera cũng vậy, thành phố Ohimitera cũng vậy.\nNếu có tiền, thì có lẽ sẽ không ai phải chịu đựng sự đau khổ nữa nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「もしそうならば、幸いだね。\n銀行が破綻するようなことは、決してなくなる」
2186 = "「Nếu được như vậy thì thật may mắn.\nSẽ không bao giờ có chuyện ngân hàng bị phá sản nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1914 = "「啊——」" 
# monologue
# JP: そうだ。ニュースで見たことがある。
2608 = "Đúng rồi. Tôi từng xem trên tin tức."
# monologue
# JP: 銀行とか、証券会社とか。お金がすごく集まるところが、\nそれなのに破産しちゃうって。
2476 = "Ngân hàng, hay công ty chứng khoán. Nơi tập trung rất nhiều tiền,\nthế mà lại bị phá sản."
# 【稀咲】
# display as 稀咲
# JP: 「良くない情報も、良くない人も、良くないお金も、\nお金は、やっぱり呼び寄せる」
2263 = "「Thông tin không tốt, người không tốt, và cả tiền bạc không tốt,\ntiền bạc, quả nhiên sẽ thu hút tất cả những thứ đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「あるんですか？　良くないお金……とかって」
1859 = "「Có chuyện đó sao ạ? Tiền bạc không tốt……hay gì đó.」"
# 【稀咲】
# display as 稀咲
# JP: 「今日は確かに価値があるのに、明日には無価値。\nそういうお金は、望ましいものとはいえないね」
2103 = "「Hôm nay rõ ràng có giá trị, nhưng ngày mai lại trở nên vô giá trị.\nNhững đồng tiền như vậy, không thể gọi là thứ đáng mong đợi được.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっと……」
1886 = "「Ừm……」"
# 【稀咲】
# display as 稀咲
# JP: 「通貨の価値とは信用力さ。国家が破綻し、\n信用力がガタ落ちすればその国の通貨は紙切れだ」
2209 = "「Giá trị của tiền tệ chính là sự tín nhiệm. Nếu quốc gia phá sản,\nsự tín nhiệm sụt giảm thì tiền tệ của quốc gia đó cũng chỉ là tờ giấy vụn.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ」
2038 = "「À.」"
# monologue
# JP: そっか、そうなんだ。\nお金って、それだけで価値があるように思ってたけど――
2700 = "Ra là vậy, đúng là thế nhỉ.\nTôi cứ tưởng bản thân tiền bạc đã có giá trị rồi cơ——"
# monologue
# JP: わたしが、例えば『日々姫札』を発行しても、\nそれは誰にも、お金としての価値を認めてもらえない。
2513 = "Ví dụ như tôi phát hành 『Tiền giấy Hibiki』,\nthì cũng chẳng ai công nhận giá trị của nó như một loại tiền tệ."
# monologue
# JP: （『これは物やサービスと交換できる』って、その価値を\nみんなが信用することで、初めてお金はお金になるんだ）
2939 = "(『Cái này có thể trao đổi lấy hàng hóa và dịch vụ』, chính sự tin tưởng của mọi người\nvào giá trị đó, mới khiến tiền bạc thực sự trở thành tiền bạc.)"
# 【稀咲】
# display as 稀咲
# JP: 「だからね、日々姫。見極めるべきは質なんだ。\n人も、情報も、お金も、そして――未来さえもね」
2051 = "「Thế nên, Hibiki. Thứ cần nhìn thấu chính là chất lượng.\nCon người, thông tin, tiền bạc, và——ngay cả tương lai cũng vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「未来の、質……」
2106 = "「Chất lượng của, tương lai……」"
# monologue
# JP: 聞きたい。\nきっと、今なら聞ける。
2640 = "Muốn hỏi quá.\nChắc chắn, bây giờ thì có thể hỏi được."
# monologue
# JP: ううん、じゃない。\nこれは今、聞いておかなきゃダメって思う。
2455 = "À không, không phải.\nMình nghĩ bây giờ bắt buộc phải hỏi chuyện này."
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩は、だから工場誘致に賛成なんですか？\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の誘致は、一番、未来の質を高めるって」
2158 = "「Vì vậy nên tiền bối Kisaki mới tán thành việc thu hút nhà máy sao?\nThu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#;, là cách tốt nhất để nâng cao chất lượng của tương lai.」"
# 【稀咲】
# display as 稀咲
# JP: 「そう思っている。そして同時に、もしもあるなら――\nより良い、別の未来図を、見せて欲しいとも願っている」
2042 = "「Tôi nghĩ vậy. Và đồng thời, nếu có thể——\ntôi cũng hy vọng được nhìn thấy một bức tranh tương lai khác, tốt đẹp hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1914 = "「啊——」" 
# monologue
# JP: 隠さずに教えてもらえてる。\n“ベスト”とは、稀咲先輩も思ってないって。
2813 = "Chị ấy đã không giấu giếm mà cho tôi biết.\nRằng tiền bối Kisaki cũng không nghĩ đó là \"tốt nhất\"."
# monologue
# JP: けど……より良いものが見つからないなら、\n現状で一番ベターなものを、選ぶしかない。
2533 = "Nhưng……nếu không tìm thấy thứ tốt hơn,\nthì đành phải chọn thứ khả dĩ nhất trong hoàn cảnh hiện tại thôi."
# 【稀咲】
# display as 稀咲
# JP: 「……ポーレット市長には、\n個人的には期待を高めていたんだけどね」
1566 = "「……Về phía thị trưởng Paulette,\ncá nhân tôi đã từng đặt rất nhiều kỳ vọng.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 1909 = "「哎？」" 
# 【女教師】
# display as 女教師
# JP: 「あ！　居たっ！\nあなたたち、またふたりでこんなところでっ」
1924 = "「A! Đây rồi!\nHai đứa lại trốn ở cái chỗ này.」"
# monologue
# JP: 先生だ。\nなんでこんなときにって思ってしま――って！？
2698 = "Là cô giáo.\nSao lại đúng lúc này chứ——ơ!?"
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩！　時計っ！　っていうか、集合時間っ！」
2160 = "「Tiền bối Kisaki! Đồng hồ! Mà đúng hơn là, giờ tập trung!」"
# 【稀咲】
# display as 稀咲
# JP: 「ん？　ああ――これはいけない。\n話に夢中になってしまった」
1952 = "「Hửm? A——không ổn rồi.\nMải nói chuyện quá.」"
# monologue
# JP: 稀咲先輩は、\n近寄ってくる先生に向け、素直に深く、頭を下げる。
2806 = "Tiền bối Kisaki\nthành khẩn cúi gập đầu trước cô giáo đang tiến lại gần."
# 【稀咲】
# display as 稀咲
# JP: 「集合時間に遅れてしまってすみません。\nすぐ向かいます」
1983 = "「Xin lỗi vì đã trễ giờ tập trung.\nBọn em sẽ đến đó ngay.」"
# 【女教師】
# display as 女教師
# JP: 「そうして。っていうかあなたたち、見学は？\n姿、見かけなかったけど、ここでおしゃべりしてたの？」
2012 = "「Mau lên. Mà này hai đứa, tham quan thì sao?\nCô không thấy hai đứa đâu cả, nãy giờ đứng đây nói chuyện hả?」"
# 【稀咲】
# display as 稀咲
# JP: 「いいえ、先生。きちんと学習していましたよ。\n市政について、財政について、議会について」
1802 = "「Không đâu thưa cô. Bọn em đã học tập rất nghiêm túc.\nVề hành chính, về tài chính, và về hội đồng thành phố.」"
# monologue
# JP: 稀咲先輩の言葉に、頷く。
2654 = "Nghe những lời của tiền bối Kisaki, tôi gật đầu đồng tình."
# monologue
# JP: 役所の人に、去年の予算について教えてもらうより――\n私たちは多分、ずうっと、本質に近い部分を学んだ。
2712 = "So với việc được người của tòa thị chính giảng giải về ngân sách năm ngoái——\nthì có lẽ, chúng tôi đã học được những điều cốt lõi hơn rất nhiều."
# 【女教師】
# display as 女教師
# JP: 「そう？　ならいいけど。\nでもね、集合時間くらいはきちんと守りなさいな」
2091 = "「Vậy sao? Thế thì được.\nNhưng mà, ít nhất cũng phải tuân thủ giờ tập trung chứ.」"
# 【稀咲】
# display as 稀咲
# JP: 「はい。失礼しました」
1969 = "「Vâng. Xin lỗi cô.」"
# 【日々姫】
# display as 日日姬
# JP: 「ごめんなさい」
1981 = "「Bọn em xin lỗi ạ.」"
# 【女教師】
# display as 女教師
# JP: 「わかったんなら、はい、走る！\n他の子たち、あなたたちが待たせてるのよ？」
2065 = "「Biết lỗi rồi thì chạy đi!\nCác bạn khác đang phải đợi hai đứa đấy biết không?」"
# 【稀咲】
# display as 稀咲
# JP: 「はい。行こう、日々姫」
1970 = "「Vâng. Đi thôi, Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
# 1922 = "「啊」" 
# monologue
# JP: 稀咲先輩はもう走りだしてる。
2807 = "Tiền bối Kisaki đã bắt đầu chạy đi."
# monologue
# JP: 速い、速い――\n背中、どんどん遠くなっちゃう。
2587 = "Nhanh quá, nhanh quá——\nBóng lưng chị ấy, ngày càng xa dần."
# 【日々姫】
# display as 日日姬
# JP: 「……もう少し、話せるとよかったんだけど」
1583 = "「……Giá mà có thể nói chuyện thêm một chút nữa thì tốt.」"
# monologue
# JP: けど、しょうがない。\n稀咲先輩だって、ポーレットさんに負けず劣らず忙しい。
2453 = "Nhưng đành chịu thôi.\nTiền bối Kisaki cũng bận rộn chẳng kém gì chị Paulette."
# monologue
# JP: これだけたくさん話せたんだから、\nこれ以上なんて望んじゃうのは、欲張りすぎる。
2585 = "Đã nói chuyện được nhiều thế này rồi,\nmà còn mong muốn hơn nữa thì đúng là tham lam quá."
# 【女教師】
# display as 女教師
# JP: 「右田さん？　何をしてるの？」
1884 = "「Em Migita? Đang làm gì đấy?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、今行きます！」
2031 = "「Vâng, em đến ngay đây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1948 = "「Hừm.」"
# monologue
# JP: 掃除を終えて、朝食を待つ食卓につく。\nけれども、誰の姿もない。
2600 = "Dọn dẹp xong xuôi, tôi ngồi vào bàn ăn đợi bữa sáng.\nNhưng chẳng thấy bóng dáng ai cả."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、たまには僕が作るか」
2063 = "「Vậy thì, thỉnh thoảng để mình nấu cũng được.」"
# monologue
# JP: 厨房は女の城など、\n右田では古くさいことを言われてしまう。
2618 = "Nhà bếp là lâu đài của phụ nữ,\nở nhà Migita, người ta vẫn hay nói những câu cổ hủ như vậy."
# monologue
# JP: が、僕とて料理が嫌いではない。\n帝都で一人暮らしのころは、あれこれと工夫もしたものだ。
2470 = "Nhưng tôi cũng không ghét việc nấu ăn.\nHồi còn sống một mình trên thủ đô, tôi cũng từng mày mò đủ món."
# 【双鉄】
# display as 雙鐵
# JP: 「どれ」
2044 = "「Xem nào.」"
# 【日々姫】
# display as 日日姬
# JP: 「すみません、兄さん、寝坊しました！」
1982 = "「Xin lỗi anh trai, em ngủ quên mất!」"
# monologue
# JP: 腰を浮かした瞬間に、ぱたぱた日々姫が駆け下りてくる。
2634 = "Ngay lúc tôi vừa nhổm người lên, Hibiki lạch cạch chạy xuống lầu."
# 【日々姫】
# display as 日日姬
# JP: 「今、大急ぎで朝食作りますから」
2035 = "「Bây giờ em sẽ làm bữa sáng thật nhanh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやいや、たまにはゆっくり過ごせ。\n今日は、僕が何か用意しよう」
1806 = "「Không không, thỉnh thoảng em cũng nên thong thả chút đi.\nHôm nay, để anh chuẩn bị gì đó cho.」"
# 【日々姫】
# display as 日日姬
# JP: 「え゛っ」
1895 = "「Hả.」"
# monologue
# JP: 日々姫の顔が青ざめる。\n低血圧というやつだろうか。
2696 = "Khuôn mặt Hibiki tái mét.\nCó lẽ là do huyết áp thấp chăng."
# 【日々姫】
# display as 日日姬
# JP: 「いけません、そんな兄さん、男の人が台所とか」
2241 = "「Không được đâu anh trai, đàn ông con trai sao lại vào bếp chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんな時代でもあるまいよ」
2246 = "「Thời đại nào rồi mà còn nghĩ thế.」"
# monologue
# JP: 言っているのに、どうにも日々姫が遠慮する。\nここはひとつ、欲に後押しさせてやろう。
2692 = "Dù đã nói vậy, nhưng Hibiki vẫn có vẻ e ngại.\nChỗ này đành phải dùng lòng ham muốn để thúc đẩy em ấy vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「今日は、日々姫の好物のミニハンバーグを作ってやろう。\nトーストに乗せてそのまま食べると、うまかろう」
1823 = "「Hôm nay, anh sẽ làm món thịt viên hamburger mini mà Hibiki thích.\nKẹp vào bánh mì nướng rồi ăn luôn, chắc sẽ ngon lắm đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「え！？　あの――気持ちっ！　気持ちだけで十分ですっ、\nそれにほら、ひき肉も切らしてますし」
1906 = "「Hả!? Dạ——tấm lòng! Em xin nhận tấm lòng thôi ạ,\nhơn nữa anh xem, thịt băm cũng hết rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば……ああ！　油揚げを使ってみてはどうかな。\nうん、いけるだろう。豆腐ハンバーグというものもある」
2244 = "「Nếu vậy thì……A! Thử dùng đậu hũ chiên xem sao.\nỪm, chắc là được đấy. Cũng có món gọi là hamburger đậu hũ mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「いや、油揚げだとバサバサで……\n細かく刻んでも、ハンバーグ状にまとまらない気が」
1880 = "「Nhưng mà, đậu hũ chiên thì bở lắm……\nDù có băm nhỏ ra, em nghĩ cũng không nặn thành hình hamburger được đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうときには繋ぎを使えばいい――そう……\nパンに乗せるのだから、ジャムを繋ぎにしてみよう」
2245 = "「Những lúc thế này thì dùng chất kết dính là được——đúng rồi……\nĐằng nào cũng kẹp vào bánh mì, hay là dùng mứt trái cây làm chất kết dính đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、油揚げに……ジャム？」
2117 = "「Đậu, đậu hũ chiên……với mứt trái cây á?」"
# 【ハチロク】
# display as 八六
# JP: 「お元気ですねぇ、双鉄様は」
2276 = "「Ngài Soutetsu thật là tràn đầy năng lượng nhỉ.」"
# monologue
# JP: 今度はハチロク。\n生意気なことを言いながら、僕に新聞を手渡してくる。
2879 = "Lần này là Hachiroku.\nCô ấy vừa nói lời trêu chọc, vừa đưa tờ báo cho tôi."
# 【ハチロク】
# display as 八六
# JP: 「新聞でも読み、どんと構えてらしてください。\nそれこそ、わたくしの主たるにふさわしい振る舞いです」
2197 = "「Xin ngài cứ đọc báo và bình tĩnh đợi cơm đi ạ.\nNhư thế mới là phong thái xứng đáng với chủ nhân của em chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかし日々姫がだな」
1881 = "「Không, nhưng mà Hibiki thì……」"
# 【日々姫】
# display as 日日姬
# JP: 「ハンバーグ！　次の楽しみにしておきますねっ」
2125 = "「Hamburger! Em sẽ để dành niềm vui đó cho lần sau nhé!」"
# monologue
# JP: ぴゅんと。\n風の立つような勢いで、日々姫は厨房に入ってしまう。
2694 = "Vù một cái.\nHibiki lao vào bếp với khí thế như tạo ra cả một cơn gió."
# monologue
# JP: ふぅむ……どうにも遠慮がすぎる。\nが、だ。あれだけ元気に動けるのなら――
2554 = "Hừm……Con bé khách sáo quá rồi đấy.\nNhưng mà, nếu con bé có thể hoạt bát được như vậy thì——"
# 【ハチロク】
# display as 八六
# JP: 「日々姫、何か吹っ切ったようですね」
2071 = "「Hibiki có vẻ như đã nghĩ thông suốt rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2087 = "「Ừ.」"
# monologue
# JP: ハチロクの目にもそう映ったのなら、間違いなかろう。
2667 = "Nếu trong mắt Hachiroku cũng thấy vậy, thì chắc chắn là không sai rồi."
# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;トラブルの後の日々姫は、\n青菜に塩の例えの如く、完全にしおれてしまっていた。
66 = "Hibiki sau sự cố \x%l客車;#00ffc040;toa hành khách%l;#;,\nđã hoàn toàn héo rũ như rau xanh bị rắc muối vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「……昨日は登園日だったからな。\n宝生稀咲に、発破でもかけられたのかもしれん」
1575 = "「……Hôm qua là ngày đến trường mà.\nCó lẽ con bé đã được Houshou Kisaki khích lệ cũng nên.」"
# 【ハチロク】
# display as 八六
# JP: 「宝生稀咲……様、ですか？\nあの方、けれど日々姫とは学年が」
1977 = "「Houshou Kisaki……tiểu thư sao ạ?\nNhưng người đó khác khối với Hibiki mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、違う。稀咲の方が先輩だ。\nが、昨日の登園は選択実習というヤツらしくてな」
2089 = "「Ừ, khác. Kisaki là tiền bối.\nNhưng hôm qua đến trường có vẻ là học thực hành tự chọn.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2092 = "「Vâng.」"
# monologue
# JP: 学年ではなく、“どのコースを選択するか”のみにより、\n学習内容が決定される、選択実習。
2887 = "Thực hành tự chọn, nơi nội dung học tập không được quyết định bởi khối lớp,\nmà chỉ dựa vào việc \"chọn khóa học nào\"."
# monologue
# JP: 日々姫と稀咲のことだから、\nほぼ間違いなく、同じコースを選んだのだろう。
2467 = "Với tính cách của Hibiki và Kisaki,\ngần như chắc chắn họ đã chọn cùng một khóa học."
# 【ハチロク】
# display as 八六
# JP: 「そうなのですか？　もしもそうなら……日々姫は随分、\n宝生稀咲――様、にも影響されてしまうのですね」
2096 = "「Vậy sao ạ? Nếu đúng là thế thì……Hibiki cũng\nbị ảnh hưởng khá nhiều từ Houshou Kisaki——tiểu thư nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「の、ようだな」
2138 = "「Có vẻ, là vậy.」"
# monologue
# JP: に、に加わった“も”の一言に、苦笑する。
2427 = "Tôi cười khổ trước chữ \"cũng\" được thêm vào trong câu."
# monologue
# JP: ハチロクは、なかなかどうして日々姫を見ている。\n理解している。
2496 = "Hachiroku quan sát Hibiki khá kỹ.\nCô ấy hiểu con bé."
# 【双鉄】
# display as 雙鐵
# JP: 「……大人になった部分もあれば、なりきれん部分もある。\nそれは恐らく、僕とて同じことだろう」
1562 = "「……Có những điểm con bé đã trưởng thành, cũng có những điểm chưa.\nĐiều đó có lẽ cũng giống như tôi thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「あぁ」
# 2087 = "「是啊」" 
# monologue
# JP: 何かに納得したかのような、ハチロクの声。
2492 = "Giọng nói của Hachiroku như thể đã hiểu ra điều gì đó."
# 【ハチロク】
# display as 八六
# JP: 「確かに。左様かもしれませんね」
2136 = "「Quả thực. Có lẽ là vậy ạ.」"
# monologue
# JP: その目がじっと、僕を見ている。
2582 = "Đôi mắt ấy đang chăm chú nhìn tôi."
# monologue
# JP: ならばあるいは、ハチロクの今の同意の声は、\n“僕も大人になりきれん”に対してなのかもしれない。
2747 = "Nếu vậy thì có lẽ, sự đồng tình vừa rồi của Hachiroku\nlà dành cho câu \"tôi cũng chưa trưởng thành\" cũng nên."
# 【双鉄】
# display as 雙鐵
# JP: 「だからこそ、人は努力するのだ」
2045 = "「Chính vì thế nên con người mới phải nỗ lực.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\nその姿こそ、美しく尊く思います」
2112 = "「Đúng vậy ạ.\nChính hình dáng ấy mới thật đẹp đẽ và đáng trân trọng.」"
# monologue
# JP: いかん。言い訳じみたことを言ってしまった。
2446 = "Chết thật. Lỡ nói ra lời nghe như biện minh mất rồi."
# monologue
# JP: その上なにやらハチロクに、\n母親じみた眼差しを注がれてまでしまった。
2493 = "Hơn nữa lại còn bị Hachiroku\nnhìn bằng ánh mắt hệt như một người mẹ."
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、なんにせよ、\n日々姫に元気が出たのなら、よかった」
1808 = "「Dù sao thì,\nHibiki lấy lại được tinh thần là tốt rồi.」"
# monologue
# JP: その眼差しが気恥ずかしくて、\n受け取った新聞を大きく広げる。
2579 = "Ánh mắt ấy khiến tôi thấy ngượng,\nliền mở rộng tờ báo vừa nhận ra."
# monologue
# JP: ここはハチロクの薦めどおりに、\nどんと構えておくのが一番良さそう――っ！！？
2744 = "Có lẽ tốt nhất là cứ làm theo lời Hachiroku,\nbình tĩnh đợi cơm——っ!!?"
# 【双鉄】
# display as 雙鐵
# JP: 「おい、ハチロク、日々姫だぞ」
1941 = "「Này, Hachiroku, là Hibiki đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「は？　何がですか？」
1936 = "「Hả? Chuyện gì cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「新聞だ。ここに日々姫の写真が出ている」
1958 = "「Báo này. Có ảnh của Hibiki trên này.」"
# 【ハチロク】
# display as 八六
# JP: 「えええっ！？」
1820 = "「Hảảả!?」"
# monologue
# JP: 『セクハラ議員、少女の一喝で議員辞職へ』
1544 = "『Nghị sĩ quấy rối tình dục từ chức sau tiếng quát của thiếu nữ』"
# monologue
# JP: そんな見出しの記事の下、\n写真の中には、日々姫と稀咲との姿がある。
2882 = "Dưới bài báo có tiêu đề như vậy,\ntrong bức ảnh là hình dáng của Hibiki và Kisaki."
# 【ハチロク】
# display as 八六
# JP: 「あらまぁ、本当に日々姫ですね。\n宝生稀咲……様、の影に隠れてしまっていますが」
1897 = "「Trời đất, đúng là Hibiki rồi.\nDù con bé đang núp sau lưng Houshou Kisaki……tiểu thư.」"
# 【双鉄】
# display as 雙鐵
# JP: 「新聞的には、どうやら稀咲がヒロインらしいぞ」
1957 = "「Theo góc độ báo chí thì có vẻ Kisaki là nữ chính đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、それはそれは」
1899 = "「Chà, ra là vậy.」"
# monologue
# JP: 興味深そうなハチロクのため、\n記事を先へと読み進む。
2497 = "Thấy Hachiroku có vẻ hứng thú,\ntôi tiếp tục đọc bài báo."
# 【双鉄】
# display as 雙鐵
# JP: 「……詳細はかかれていないが、\n昨日の議会で、ひどいセクハラ発言があったようだな」
1563 = "「……Không ghi chi tiết,\nnhưng có vẻ trong cuộc họp nghị viện hôm qua đã có phát ngôn quấy rối tình dục nghiêm trọng.」"
# 【ハチロク】
# display as 八六
# JP: 「せくはら？」
2015 = "「Quấy rối tình dục ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「性的な嫌がらせという意味だ。それをぶつけられ、\nポーレットはショックを受けて退席したと書いてある」
2021 = "「Nghĩa là hành vi quấy rối mang tính tình dục. Trên báo viết rằng,\nPaulette đã bị sốc và rời khỏi cuộc họp khi phải hứng chịu điều đó.」"
# 【ハチロク】
# display as 八六
# JP: 「恥知らずな人間がいるものですね」
1814 = "「Thật là có những kẻ không biết xấu hổ nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「セクハラヤジを飛ばした議員はそのまま議場に残った。\nそれを稀咲が、傍聴席から一喝したらしい」
2213 = "「Tên nghị sĩ buông lời quấy rối vẫn ở lại hội trường.\nCó vẻ Kisaki đã từ hàng ghế dự thính quát hắn ta.」"
# 【ハチロク】
# display as 八六
# JP: 「良いことですね」
1848 = "「Làm tốt lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「この記事も、そうした論調で書かれているな」
2247 = "「Bài báo này cũng được viết theo giọng điệu đó.」"
# monologue
# JP: と、いうか……\n報道というにはあまりにも主観的な印象を受ける記事だ。
2452 = "Nói đúng hơn thì……\nBài báo này mang lại cảm giác quá chủ quan đối với một bản tin."
# monologue
# JP: まるで稀咲を祭り上げようとしているかとさえ読める。
2857 = "Thậm chí đọc vào còn thấy như thể đang cố tâng bốc Kisaki vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「結果。\n当該議員は同日中に、議員辞職をしたそうだ」
2169 = "「Kết quả là.\nNghị sĩ đó đã từ chức ngay trong ngày.」"
# 【ハチロク】
# display as 八六
# JP: 「当然で――」
2248 = "「Đương nhiên là——」"
# monologue
# JP: いいかけて、ぽかんとハチロクの口が開く。
2499 = "Đang nói dở, miệng Hachiroku bỗng há hốc ra."
# 【ハチロク】
# display as 八六
# JP: 「は？　……え？　一喝されて――それで、\nそれだけで、その日の内に辞職を？　ですか？」
1934 = "「Hả? ……Ể? Bị quát một tiếng——rồi,\nchỉ vì thế mà từ chức ngay trong ngày luôn sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;推進派の新人議員だったということだからな」
2237 = "「Vì nghe nói đó là một tân nghị sĩ thuộc phe thúc đẩy \x%lエアクラ;#00ffc040;Aircra%l;#; mà.」"
# monologue
# JP: 世論の批判が集まって傷が深くならないうちに、と\n逃げだしたのか。
2559 = "Hắn ta bỏ trốn trước khi sự chỉ trích của dư luận\nđổ dồn vào và khiến vết thương thêm sâu chăng."
# monologue
# JP: そうでなければ、単純に、推進派の中心である。\n宝生親子の逆鱗に触れ、事実上の更迭をされてしまったか。
2655 = "Nếu không thì, đơn giản là hắn đã chạm đến vảy ngược của cha con Houshou,\nnhững nhân vật trung tâm của phe thúc đẩy, và bị cách chức trên thực tế."
# 【双鉄】
# display as 雙鐵
# JP: 「大人の判断というヤツがどこかで働いたのだろう。\nまぁ、そのような議員の退場は、市の益にもなろうが」
2083 = "「Chắc hẳn cái gọi là phán đoán của người lớn đã hoạt động ở đâu đó.\nChà, sự rút lui của một nghị sĩ như vậy cũng là lợi ích cho thành phố.」"
# monologue
# JP: そんなことより、ポーレットだ。
2901 = "Quan trọng hơn chuyện đó là Paulette."
# monologue
# JP: “ショックを受けて退席”、とは、\n随分と曖昧な表現だが……ああ。
1541 = "\"Bị sốc và rời khỏi cuộc họp\",\ncách diễn đạt này khá mơ hồ, nhưng……A."
# 【ハチロク】
# display as 八六
# JP: 「あら？　写真、\n日々姫に見せずにめくってしまわれるのですか？」
1950 = "「Ủa? Ngài định\nlật sang trang mà không cho Hibiki xem ảnh sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。\n『関連記事は三面』とのことだからな――っ！？」
1945 = "「Ừ.\nVì trên này ghi là 'Bài viết liên quan ở trang 3' mà——っ!?」"
# 【ハチロク】
# display as 八六
# JP: 「えっ！！？」
1902 = "「Hả!!?」"
# monologue
# JP: ハチロクとふたり目を見合わせて、\nそれから一度三面を見る。
2636 = "Tôi và Hachiroku nhìn nhau,\nrồi cùng nhìn vào trang 3."
# monologue
# JP: 『雛衣（ポ）市長、辞任へ』\nくろぐろとした太い字で、見出しに確かに記されている。
2520 = "『Thị trưởng Hinai (Paulette) sắp từ chức』\nTiêu đề được in đậm đen rõ ràng."
# 【ハチロク】
# display as 八六
# JP: 「辞任って……そんな、何故こんなにいきなり」
2216 = "「Từ chức sao……chuyện này, sao lại đột ngột thế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「慌てるな。『辞任“へ”』だ。\n確定された事項ではなく、推測を書いた記事にすぎない」
1857 = "「Đừng hoảng. Là 'sắp' từ chức.\nKhông phải là chuyện đã được xác nhận, chỉ là một bài báo suy đoán thôi.」"
# monologue
# JP: だが、だが――だが。
2535 = "Nhưng, nhưng——nhưng mà."
# monologue
# JP: 『トラブル続きの8620号試運転の責任痛感』という、\nその段落に書かれた記事が、どうにも気になる。
2889 = "Đoạn bài viết ghi rằng\n'Cảm nhận sâu sắc trách nhiệm về việc chạy thử đầu máy 8620 liên tục gặp sự cố', khiến tôi không khỏi bận tâm."
# 【ハチロク】
# display as 八六
# JP: 「……随分と悪意に書くものですね」
1587 = "「……Họ viết với ác ý quá nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。それは、そうなのだが――」
2085 = "「Đúng vậy. Quả là như thế, nhưng——」"
# monologue
# JP: 悪意で拡大解釈したようなひどい記事ではあるけれど、\nその解釈の根底にある事実がいちいち、正確だ。
2918 = "Dù đây là một bài báo tồi tệ, cố tình diễn giải phóng đại với ác ý,\nnhưng những sự thật làm nền tảng cho sự diễn giải đó lại hoàn toàn chính xác."
# 【双鉄】
# display as 雙鐵
# JP: 「――この記者、あの日に同乗でもしていたのか？\nいや、しかし、運転室内部の様子などは……」
1551 = "「——Phóng viên này, hôm đó cũng đi cùng trên tàu sao?\nKhông, nhưng mà, tình hình bên trong buồng lái thì……」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――それ、ソース、私、かも」
2272 = "「Anh hai——nguồn tin đó, có khi, là em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！？」
2072 = "「Hibiki!?」"
# monologue
# JP: 醤油を片手にいつの間に、日々姫がすぐそこに立っている。
2449 = "Không biết từ lúc nào, Hibiki đã đứng ngay đó với chai nước tương trên tay."
# monologue
# JP: 僕の手元の新聞をじっと覗き込み、\nそのままがたがた、小さく震え出している。
2574 = "Con bé nhìn chằm chằm vào tờ báo trên tay tôi,\nrồi cứ thế run rẩy nhè nhẹ."
# 【日々姫】
# display as 日日姬
# JP: 「私、だって……\nまさかこんなことになるなんて」
2026 = "「Em, tại vì……\nKhông ngờ chuyện lại thành ra thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「落ち着け、日々姫。\nまだ、どんなことにもなっていない」
2078 = "「Bình tĩnh nào, Hibiki.\nVẫn chưa có chuyện gì xảy ra cả.」"
# monologue
# JP: 厳密には、セクハラヤジを飛ばした議員が、\n元議員へと転職したが、それはどうでもいいことだ。
2555 = "Nói một cách chính xác thì, tên nghị sĩ buông lời quấy rối tình dục\nđã chuyển nghề thành cựu nghị sĩ, nhưng chuyện đó chẳng quan trọng."
# monologue
# JP: 肝心なのは、ポーレット。\n記事に書かれていることが、まさか事実とは思えんが――
2910 = "Quan trọng là Paulette.\nKhông thể ngờ những gì viết trên báo lại là sự thật——"
# 【双鉄】
# display as 雙鐵
# JP: 「とにかく、ポーレットに会おう」
2251 = "「Tóm lại, hãy đi gặp Paulette đã.」"
# monologue
# JP: 約束をして、面会をして、細かな事情を確かめる。
2459 = "Hẹn gặp, nói chuyện trực tiếp và xác nhận chi tiết sự việc."
# monologue
# JP: それだけは早く済ませておかねば、\n何を言うのも、するのもひどく危うくなる。
2622 = "Nếu không nhanh chóng làm điều đó,\nthì bất cứ lời nói hay hành động nào cũng sẽ trở nên vô cùng nguy hiểm."
# 【日々姫】
# display as 日日姬
# JP: 「なら、私もっ！\nにぃに、私も、ね、一緒にっ」
2253 = "「Vậy thì, cả em nữa!\nAnh hai, cho em, đi cùng với.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、もちろんだ」
2129 = "「Ừ, tất nhiên rồi.」"
# monologue
# JP: 髪をくしゃくしゃ撫でてやっても、\n日々姫の震えはとまらない。
2652 = "Dù tôi có xoa đầu vò rối tóc con bé,\nHibiki vẫn không ngừng run rẩy."
# monologue
# JP: だから、知る。\n日々姫も、理解してしまっていると。
2659 = "Vì vậy, tôi biết.\nHibiki cũng đã hiểu ra vấn đề."
# monologue
# JP: （忌々しいが、この記事には――\n事実関係の確かさからくる、説得力が確かにある）
2956 = "(Thật đáng ghét, nhưng bài báo này——\nquả thực có sức thuyết phục nhờ vào tính chính xác của các dữ kiện thực tế.)"
# monologue
# JP: その説得力が、多くの人に届いてしまえば、\n『ポーレット市長が辞任するかも』と思われたなら――
2589 = "Nếu sức thuyết phục đó chạm đến nhiều người,\nvà khiến họ nghĩ rằng 'Thị trưởng Paulette có thể sẽ từ chức' thì——"
# monologue
# JP: ポーレットの辞任を織り込んで、政治が動き出してしまう。\n逆にポーレットの影響力と信頼は、確実に減少させられる。
2665 = "Giới chính trị sẽ bắt đầu rục rịch với giả định Paulette từ chức.\nNgược lại, sức ảnh hưởng và uy tín của Paulette chắc chắn sẽ bị suy giảm."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　お電話つながりました」
2277 = "「Ngài Soutetsu! Điện thoại kết nối được rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「気が利くな、ハチロク。ありがたい」
1854 = "「Cô chu đáo thật đấy, Hachiroku. Cảm ơn nhé.」"
# monologue
# JP: 躊躇している時間などない。
2713 = "Không có thời gian để do dự nữa."
# monologue
# JP: この報道が流れた以上、ポーレットの電話にはすぐにでも、\nパンク状態にまで呼び出しが殺到することだろうから。
2670 = "Khi bản tin này đã lan truyền, điện thoại của Paulette chắc chắn sẽ\nbị gọi dồn dập đến mức nghẽn mạng ngay lập tức."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットか？　僕だ。新聞は――そうか、読んだか」
2120 = "「Paulette à? Tôi đây. Báo thì——vậy à, cô đọc rồi sao.」"
# monologue
# JP: ポーレットは明らかに動揺している。\nならば、迅速に動かねば。
2729 = "Paulette rõ ràng đang dao động.\nNếu vậy, phải hành động nhanh chóng."
# 【双鉄】
# display as 雙鐵
# JP: 「そのまま動くな。僕らがレールショップへ向かう」
1842 = "「Cứ ở yên đó. Chúng tôi sẽ đến cửa hàng đường sắt.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん。わた、わたし――どうしたらっ」
2275 = "「Anh Soutetsu. T-Tôi——phải làm sao đây.」"
# monologue
# JP: パニックが戻ってきてしまっている。\n出会った頃とまるで変わらぬ、怯え戸惑うポーレットが。
2730 = "Sự hoảng loạn đã quay trở lại.\nMột Paulette sợ hãi và bối rối, chẳng khác gì lúc mới quen."
# monologue
# JP: だったら僕は迷えない。\nたとえ間違っていようとも、とにかく即断を下すしかない。
2630 = "Vậy thì tôi không thể chần chừ.\nDù có sai đi chăng nữa, tóm lại vẫn phải đưa ra quyết định ngay lập tức."
# 【双鉄】
# display as 雙鐵
# JP: 「鍵をかけ、誰にも会うな。何も話すな。\nすぐに向かうから、安心して待て」
2271 = "「Khóa cửa lại, đừng gặp ai cả. Đừng nói gì hết.\nChúng tôi sẽ đến ngay, cứ yên tâm mà đợi.」"
