# 【日々姫】
# display as 日日姬
# JP: 「にぃに――それ、ソース、私、かも」
2272 = "「阿哥……消息的提供者……可能……是我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！？」
2072 = "「日日姬！？」" 

# monologue
# JP: 醤油を片手にいつの間に、日々姫がすぐそこに立っている。
2449 = "不知從何時起，日日姬單手拿著醬油瓶站在我們身旁。" 

# monologue
# JP: 僕の手元の新聞をじっと覗き込み、\nそのままがたがた、小さく震え出している。
2574 = "她湊過來認真地看著我手裡的報紙，然後輕輕哆嗦起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「私、だって……\nまさかこんなことになるなんて」
2026 = "「我……沒想到會變成這樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「落ち着け、日々姫。\nまだ、どんなことにもなっていない」
2078 = "「日日姬，冷靜。現在還什麼都沒發生」" 

# monologue
# JP: 厳密には、セクハラヤジを飛ばした議員が、\n元議員へと転職したが、それはどうでもいいことだ。
2555 = "嚴格來說發生的事情只有那個起鬨性騷擾的議員變成了前議員，不過這根本無所謂。" 

# monologue
# JP: 肝心なのは、ポーレット。\n記事に書かれていることが、まさか事実とは思えんが――
2910 = "關鍵是波萊特本人。我想上面寫的應該不是真的——" 

# 【双鉄】
# display as 雙鐵
# JP: 「とにかく、ポーレットに会おう」
2251 = "「還是先去見一見波萊特吧」" 

# monologue
# JP: 約束をして、面会をして、細かな事情を確かめる。
2459 = "事前預約好，然後見面確認詳情。" 

# monologue
# JP: それだけは早く済ませておかねば、\n何を言うのも、するのもひどく危うくなる。
2622 = "得趕快完成這些，否則不管怎麼說怎麼做都只會更危險。" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、私もっ！\nにぃに、私も、ね、一緒にっ」
2253 = "「那……我也去！阿哥，我也一起去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、もちろんだ」
2129 = "「當然了」" 

# monologue
# JP: 髪をくしゃくしゃ撫でてやっても、\n日々姫の震えはとまらない。
2652 = "我用力地摸了摸她的頭。她的哆嗦還是沒有停下。" 

# monologue
# JP: だから、知る。\n日々姫も、理解してしまっていると。
2659 = "所以我知道日日姬肯定也清楚。" 

# monologue
# JP: （忌々しいが、この記事には――\n事実関係の確かさからくる、説得力が確かにある）
2956 = "（這篇報導雖然很可惡，但是依據準確，確實有說服力）" 

# monologue
# JP: その説得力が、多くの人に届いてしまえば、\n『ポーレット市長が辞任するかも』と思われたなら――
2589 = "如果越來越多的人被這種說服力影響，認為“波萊特市長可能要辭職了”——" 

# monologue
# JP: ポーレットの辞任を織り込んで、政治が動き出してしまう。\n逆にポーレットの影響力と信頼は、確実に減少させられる。
2665 = "政治界也會對此作出反應。波萊特的影響力和信譽會因此受損。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　お電話つながりました」
2277 = "「雙鐵少爺！電話通了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「気が利くな、ハチロク。ありがたい」
1854 = "「八六，還好你反應快」" 

# monologue
# JP: 躊躇している時間などない。
2713 = "沒時間猶豫了。" 

# monologue
# JP: この報道が流れた以上、ポーレットの電話にはすぐにでも、\nパンク状態にまで呼び出しが殺到することだろうから。
2670 = "既然這篇報導已經流傳出去了，那波萊特的電話馬上就會被打爆。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットか？　僕だ。新聞は――そうか、読んだか」
2120 = "「波萊特嗎？是我。報紙——你已經看了啊」" 

# monologue
# JP: ポーレットは明らかに動揺している。\nならば、迅速に動かねば。
2729 = "波萊特很明顯在動搖。必須迅速行動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのまま動くな。僕らがレールショップへ向かう」
1842 = "「你待在那別動。我們過去鐵路商店」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん。わた、わたし――どうしたらっ」
2275 = "「雙鐵君，我、我該怎麼辦」" 

# monologue
# JP: パニックが戻ってきてしまっている。\n出会った頃とまるで変わらぬ、怯え戸惑うポーレットが。
2730 = "波萊特陷入了恐慌。她變得像我剛認識她的時候那樣怯弱不安。" 

# monologue
# JP: だったら僕は迷えない。\nたとえ間違っていようとも、とにかく即断を下すしかない。
2630 = "情況容不得我左思右想。就算可能有錯也得立即下決定。" 

# 【双鉄】
# display as 雙鐵
# JP: 「鍵をかけ、誰にも会うな。何も話すな。\nすぐに向かうから、安心して待て」
2271 = "「關門上鎖，誰都不要見，什麼都不要說。等我們來就行了。放心，我們馬上過來」" 
