# JP: かつての、日々姫。\n常に真闇姉と比べられ、できないこだとされていた――
2805 = "日日姬在過去一直被拿來跟真闇姐比較，被當成不中用的孩子。" 

# monologue
# JP: あのころの小さく弱い自分が、\nボロボロのまま放置されている保存機の姿と重なったのか。
2681 = "她是在這些被放著不管的破舊機車身上，看到了那時弱小的自己的影子吧。" 

# 【日々姫】
# display as 日日姬
# JP: 「もちろん、のめり込む気はなかとよ？　デザインと\n市政とが優先やけん。ばってん、それでも、少しは」
2146 = "「我當然不會感情用事，工作重心當然要放在設計和市政上。不過我還是多少想幫點忙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「のめり込んでもいいのではないか？\n出来る限りは、僕も支えるし、手伝おう」
2128 = "「感情用事又如何？我也會盡力支持你的，去幫幫它們吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1945 = "「哎？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ダジャレではないが、まさに、『絵』だ。\n日々姫はいつでも、誰かの気持ちを、絵にするのだから」
1887 = "「別吃驚，你的“畫”就是關鍵。你總是能用畫筆詮釋他人的心情」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1958 = "「啊……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「優先順位やタスク処理。そうしたことに追われるうちに、\n日々姫も僕も、また、見失いかけてしまっていたのかな」
2041 = "「在繁重的工作壓力下不得不講究輕重緩急的我們，是不是漸漸迷失了一些什麼？」" 

# 【日々姫】
# display as 日日姬
# JP: 「見失ったって……なにを？」
2375 = "「迷失……迷失了什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まず一番に見るべきが、僕ら自身のこころということ。\nそこが曇っていたのなら、見える全てもまた曇るのに」
2137 = "「我們最應該關注的是自己的內心。如果內心蒙上了陰影，那麼我們所看到的都將是蒙塵的景象」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー……」
# 1958 = "「啊……」" 

# monologue
# JP: 選挙戦で苦しんだ時期。\n日々姫も僕も、そこを完全に見失ってしまっていた。
2666 = "在選舉的那段艱苦時期，日日姬和我都完全迷失了自己的內心。" 

# monologue
# JP: その愚を危うく僕らは繰り返そうとして――
2944 = "而現在我們又險些重蹈覆轍。" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。あるかも」
1991 = "「嗯。好像是啊」" 

# monologue
# JP: けれども実に危ういところで、偶然出会ったみくろの目。\n色を失い、けれど優しい、あの目に救われたのかもしれん。
2575 = "不過在千鈞一髮之際，我們偶然遇到了美玖路。可能正是她那失去顏色卻依然溫柔的眼神拯救了我們。" 

# 【双鉄】
# display as 雙鐵
# JP: 「市民の目線、利用者目線。それはもちろん、大切だ」
2074 = "「市民的視角，使用者的視角，這些當然都很重要」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1994 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「けれど、そこばかりに目を向けていて、最初の利用者、\n“自分”を見失うのならきっと、一番深くを見損ねる」
1917 = "「可是過於注重他們的視角，如果忽略了最初的使用者——自己，這才是最嚴重的誤判」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
1995 = "「嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、こころの望むままを、無理ない範囲でであれば、\n追って、動いてみるのもよかろう」
2161 = "「所以只要在力所能及的範圍之內，我們完全可以按自己內心的意願來行動」" 

# 【日々姫】
# display as 日日姬
# JP: 「こころ――わたしの、こころの望むまま」
1875 = "「內心——按照我的意願」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だ。単純な気分転換にもなるであろうし――\nそこからなにか、つながってくるものもあるかもしれん」
2216 = "「是的。而且完全把它當成一種轉換心情的手段也行。我們說不定還能從中得到新的啟示」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！！」
1998 = "「嗯！！」" 

# monologue
# JP: にっこりわらって、\n日々姫はゆらり、湯船のお湯に体を任せる。
2835 = "日日姬莞爾一笑，將身子慢慢浸入浴池水中。" 

# 【日々姫】
# display as 日日姬
# JP: 「なんだかすっごくラクになったとー！\n来てよかったー！　文庫森も、湯富院も！！」
2139 = "「我好像輕鬆多了！能來豐後森和湯布院真是太好了！　」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさしくだなぁ」
# 2207 = "「是啊」" 

# monologue
# JP: たくさん歩いて、たくさん出会って、\n話を聞いて、見て、描いた。
2671 = "多走走，多見見，邊聽、邊看、邊畫。" 

# monologue
# JP: そこで吸収したものを、老技師と、元食堂車シェフと、\n湯富院市長と、レイルロオドとまでも、交わしあえた。
2754 = "把過程中吸收到的東西跟大家交流，無論是老技工、前餐車主廚，還是湯布院市長，甚至是鐵路人偶。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これほど学びの多い視察というのも、\nなかなか無かろうという気さえしてくる」
2330 = "「能在一次考察中學到這麼多東西，我都覺得實在太難得了」" 

# 【日々姫】
# display as 日日姬
# JP: 「まっことねー。稀咲先輩に大感謝だなぁ。\nおみやげ、奮発しなくっちゃ」
2070 = "「就是說啊。真是太感謝稀咲學姐了，得好好買些禮物給她了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おみやげ――か」
2307 = "「禮物啊」" 

# monologue
# JP: まったく予想外の一言だ。
2989 = "這話真是出乎我的意料。" 

# monologue
# JP: が、予想もできていなかった自分が、\nこれはおそらく、ズレてしまっているかと思う。
2578 = "不過我竟然沒有預料到她會這麼說，看來我們倆沒想到一塊去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、初日は単なる“旅行”だったのだし、\nそうしたものも、必要となるか」
2304 = "「確實，畢竟第一天的行程僅僅是“旅行”，所以買伴手禮之類的環節也是必備的啊」" 

# monologue
# JP: ゆえに、話ごと寄り添えば、\n日々姫はふふっと、いたずらっぽく笑ってくれる。
2752 = "所以我接著她的話題說了下去，結果日日姬朝我淘氣地笑了笑。" 

# 【日々姫】
# display as 日日姬
# JP: 「大事よー、お土産。お仕事での出張でだって！\nなかと、やっぱり寂しか気ばするけん」
2308 = "「禮物很重要哦，哪怕是因公出差也一樣！不買的話，總覺得有些寂寞」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1994 = "「嗯」" 

# monologue
# JP: 実感が伝わってくるひとことだ。
2985 = "這句話特別一針見血。" 

# monologue
# JP: お土産などを買うという発想自体がもとより無かった\n過去の自分を思い出さざるを得なくなる。
2983 = "這不得不讓我想起過去的自己，那時的我的腦袋裡根本不存在買禮物這種想法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すると過去の僕は、\n日々姫にいつも寂しい思いをさせていたのか」
2396 = "「這麼說過去的我，每每都會讓你感到落寞嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「ううん！　そぎゃんこつなかとよ？」
1819 = "「不！沒這回事哦」" 

# monologue
# JP: けれど日々姫は、優しく笑う。\nこころの深くから湧き出したような笑顔をくれる。
2579 = "不過日日姬溫柔地笑了。那是一副好像發自內心深處的笑容。" 

# 【日々姫】
# display as 日日姬
# JP: 「だって、私はちっちゃかころから、ずうっとずっと。\nにぃにが帰ってきてくれるのが、何よりも嬉しかもん」
2030 = "「因為我從小到大，最高興的事就是看到阿哥回來啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2197 = "「日日姬」" 

# monologue
# JP: なんとかわいい、愛おしい。\n今の日々姫と、幼い日々姫が重なり合ってる。
2676 = "她實在太可愛了。現在的她就像是回到了小時候一樣。" 

# monologue
# JP: ああ、日々姫だと、ごく当然のことを思って――\n当然なのに、今更少し、照れくさくなる。
2858 = "沒錯，天真可愛對日日姬來說再正常不過了。我明明已經司空見慣，怎麼事到如今反而害臊起來了呢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その……だ。土産物選びにはまるで自信が持てない。\nよければ日々姫、明日いっしょに選んでくれ」
1880 = "「其實……是這樣。我對挑選禮物這種事毫無信心，你不介意的話明天陪我一起挑吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 1995 = "「嗯！」" 

# monologue
# JP: いかん。日々姫が可愛すぎる。\nが、貸し切りとはいえ、ここは宿の風呂。公共の場だ。
2565 = "不好。日日姬可愛過頭了。包場歸包場，但這裡是旅館的澡堂，是公共場合啊。" 

# monologue
# JP: 部屋に帰るまでは自重をせねば――\n思った瞬間、そのための方策も浮き上がってくる。
2663 = "在回房之前我必須自重一點。冒出這個念頭的同時，我已經想到了應對方案。" 

# 【双鉄】
# display as 雙鐵
# JP: 「で、持ち帰らなければならない、\n土産話についてなのだが――」
2411 = "「那麼，關於必須買回去的禮物的事……」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー」
# 1959 = "「啊」" 

# monologue
# JP: 困った声。\nだが、旅に出る前の、絶望感にも近い響きは消えている。
2951 = "聽起來她很困擾的樣子。不過這並不是出發前的那種幾近絕望的聲音。" 

# 【日々姫】
# display as 日日姬
# JP: 「たーくさん勉強できたばってん、\n足りんこともその分、見えてきたとよねー」
2423 = "「雖然學到了很多，但也認識到了自己的很多不足啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ。\n日々姫――少し、背中をいいか？」
2204 = "「是啊。日日姬——能借用一下你的後背嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「いくらでもよかとよー、\n私のぜんぶ、まるごとにぃにのものやけん」
2418 = "「隨你怎麼用。因為我的全部都是屬於阿哥的啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「光栄だ」
2391 = "「這是我的榮幸」" 

# monologue
# JP: 抱きしめたくなる気持ちを堪え、背中に指を走らせる。
2740 = "我壓抑住想一把摟住她的衝動，用指尖在她背後游走。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん――」
1979 = "「嗯——」" 

# monologue
# JP: 整頓するには、書くのが一番。\n昨日の流れが、日々姫の背中をメモ帳にする。
2840 = "書寫是整理心情的最佳方式。我以日日姬的後背為筆記本，寫下了昨天的見聞。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……食堂車特有の注意点は学べた。\n……観光地の理想形のひとつも示してもらえた」
1439 = "「……學到了餐車特有的注意點。……見識到了觀光景點的一種理想形式」" 

# 【日々姫】
# display as 日日姬
# JP: 「文庫森の\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;のことも聞けたし……\n長期的なビジョンも、共有できたとよね！」
2177 = "「打聽到了豐後森\\x%l扇形機関庫;#00ffc040;扇形機車庫%l;#;的故事……還能與之共享到一項長遠大計！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。湯富院市長の視野には驚かされた。\n『ライバルはロムドムでありパル＝イス』か」
2301 = "「確實啊。湯布院市長的格局令人驚訝。“競爭對手是倫敦和巴黎”啊」" 

# monologue
# JP: エアクラ技術の発展は、世界を確実に狭くした。
2914 = "空凝機技術的發展確實讓世界變小了。" 

# monologue
# JP: 九州内、国内という枠を超え、海外の著名観光地。\nそこと並ぶような存在に発展せねば生き残れなくなる。
2958 = "要想生存下去，就必須發展到與超越九州或者國內這個範疇的國外觀光勝地平起平坐的水準。" 

# 【日々姫】
# display as 日日姬
# JP: 「――世界の名所と比較される観光地になれるよう、\n“九洲”そのものをまるごとブランディングしていく」
2273 = "「為了成為能跟世界名勝扳手腕的觀光勝地，要逐建立起大“九州”的品牌」" 

# monologue
# JP: “九洲”を選ばせてしまえるのなら、\n狭くなった世界は有利に働く。
2629 = "只要讓人們選中“九州”，變小的世界就會成為助力。" 

# monologue
# JP: 九洲周遊を目一杯楽しんでもらえるように仕掛ければ、\n複数の観光地が、同時に勝ち組となれるのだから。
2628 = "只要讓人們充分體驗到周遊九州的快樂，幾個觀光地就能夠互利共贏。" 

# 【双鉄】
# display as 雙鐵
# JP: 「各所をつなぎ、あるいは巡る観光列車群を走らせる。\n九洲全土を面として、鉄道観光で輝かせていく」
2088 = "「建立連接、巡遊各地的觀光列車群，在整片九州大地上讓鐵路觀光大放異彩」" 

# 【日々姫】
# display as 日日姬
# JP: 「食堂列車だけじゃなく、観光列車をたくさんたくさん。\nさすがにぃにって、私、思った」
1812 = "「不僅有餐車，還有大量的觀光列車。我真的很佩服阿哥啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――僕の案というより、日々姫の目と、\n湯富院市長の経験とが噛み合って浮かんだものだろう」
1831 = "「不，這事跟我沒什麼關係，是你的眼力和湯布院市長的經驗一拍即合，方案才水到渠成的」" 

# 【日々姫】
# display as 日日姬
# JP: 「噛み合わせて、形にしてくれたのにぃにやけん。\nやっぱり、にぃにはすごかー！　って」
2180 = "「把我們串聯在一起，讓方案成型的人是阿哥。所以還是阿哥厲害啦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「～～っ」
2433 = "「～～」" 

# monologue
# JP: その言葉が心の底から溢れ出してるものなのだと、\n日々姫に触れる指先から伝わる熱が教えてくれる。
2837 = "日日姬身上的熱度透過指尖傳來，這讓我意識到她的這番話發自內心。" 

# monologue
# JP: 照れくさく、嬉しく、もどかしい。\n今すぐにでも、日々姫を強く抱きしめたい。
2698 = "害羞、喜悅、焦急湧上心頭，我現在就想把日日姬緊緊摟住。" 

# 【日々姫】
# display as 日日姬
# JP: 「ばってん、そん湯富院にも――\nやっぱり、過去の影はあったと」
1817 = "「不過即使在這樣的湯布院之中，還是留有過去的陰影」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。そこを放置して鉄道によるブランディングは……\nどうも、曇りというか、傷というかを残す気がする」
2205 = "「是啊。要打出鐵路的招牌，卻對那裡不管不顧……難免有種明珠蒙塵，或是白璧微瑕的感覺」" 

# 【日々姫】
# display as 日日姬
# JP: 「よね。やけん――その意味でも、あのこ、\nD51 1031。私、なんとかしてあげたい」
2202 = "「是啊。所以，從這方面來說，我也應該想辦法幫幫那孩子，幫幫Ｄ５１　１０３１」" 

# 【双鉄】
# display as 雙鐵
# JP: 「逆からみれば、D51 1031を“なんとか”すること。\nその試み自体を」
1908 = "「反過來想想，直接把“想辦法”幫助Ｄ５１　１０３１這種嘗試……」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　こん計画の、なんか、シンボルマークみたいに」
1964 = "「啊！你是說把這件事塑造成整個計劃的標誌」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、運べるかもしれん。そうできたなら流れはきっと、\n[おおむた,2]雄武田――みくろの38696へも波及しよう」
2220 = "「是的，或許能往這個方向發展。如果能成功的話，大勢一定能夠影響到大牟田——影響到美玖路的３８６９６」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　そいば、とってもよか考えって思う。\nみくろちゃん自身も、絵になるこやけん」
1996 = "「嗯！我覺得這個想法非常不錯。畢竟美玖路自己也是個美如畫的女孩呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その辺も、一度相談してみてもいいかもしれんな。\nが――」
2148 = "「我看這件事最好也跟她談一次。不過……」" 

# monologue
# JP: まずは一点、最初の筆が決まらぬことには、\nどんな構想も完成しない。
3014 = "首先必須決定最初的下筆之處，不然任何構想都是空談。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その未来図を描き出すためにも、\nまずは、リゾート食堂列車のデザインだ」
2274 = "「為了描繪出這幅未來的藍圖，首先必須完成觀光餐車的設計」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー……よねぇ。\nうーん――そこに戻っちゃう……と――」
1985 = "「嗯……是啊。唔……說回這件事的話……」" 

# monologue
# JP: ちゃぷん、水音。\n日々姫は湯を手ですくい、自分の顔を軽く洗う。
2654 = "嘩啦啦。日日姬用手撩起池水輕輕捋了捋自己的臉。" 

# 【日々姫】
# display as 日日姬
# JP: 「やっぱり、18メートル級気動車二両じゃキツかと。\n20メートル級の鋼製客車の食堂車と電源車ば欲しか」
2149 = "「我覺得兩節１８公尺級動車還是太勉強了。我想要一套２０公尺級的鋼製客運車廂和電源車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、機関車は使えん――ああ、ならば、\n気動車二両で客車と電源車を挟みこむ――とか？」
1847 = "「但是用不了機車……啊，那麼在客運車廂和電源車前後各加一節動車，這樣如何？」" 

# 【日々姫】
# display as 日日姬
# JP: 「そいば出来ると！？」
2387 = "「這個能做到嗎？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて、どうか。今ふっと思い浮かんだだけで、\n細かいところは、専門家に検討を頼まねばだろうが――」
2134 = "「我也不太清楚。這主意是我剛剛想到的，細節上的問題還是要請專家探討一下」" 

# monologue
# JP: しかし、それでも想像はできる。\nここに来るまでの道中で、しっかり視察をしてきたゆえに。
2577 = "不過我已經能夠想像得到。因為一路的考察中我已經做了很紮實的功課。" 

# 【双鉄】
# display as 雙鐵
# JP: 「平坦な[ゆのい,1]湯医線だけを走るなら可能だろう。\nが、[くるだい,1]来大鉄道の――[ひた,1]肥田から先は、無理かと感じる」
2058 = "「如果只走平坦的湯醫線的話應該行得通。不過久大鐵路的話，從日田開始應該就沒辦法走了」" 

# 【日々姫】
# display as 日日姬
# JP: 「ああ、勾配ば超えられんとかー。\nううう……けど、やっぱりどうしてもスペースが～」
2007 = "「嗯，比如坡度的問題。唔唔……不過我還是想要更大的空間啊～」" 

# monologue
# JP: 日々姫のセンスと発想力に、ここまで知識を補強して。\nそれで解決できぬことなら――
2694 = "如果靠日日姬補強後的知識面，再加上她的設計理念和想像力都沒辦法解決的話……" 

# 【双鉄】
# display as 雙鐵
# JP: 「確定してしまおう。18メートル級改造気動車では、\n今の僕らの、理想の食堂車を作るスペースは足りない」
1805 = "「下結論吧。１８公尺級改造動車沒有足夠的空間來打造目前我們理想中的餐車」" 

# 【日々姫】
# display as 日日姬
# JP: 「って！？　それじゃ作れんようになっちゃう」
1978 = "「喂？！這樣的話就沒得談了啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、作る。\nそのために、今度は逆から考えてみよう」
1832 = "「不，還有得談。為此我們必須有逆向思維」" 

# 【日々姫】
# display as 日日姬
# JP: 「逆から？」
2383 = "「逆向思維？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、食堂車のデザインからではなく、機能面から\n――つまり、狭いキッチンの使い方から学ぶのだ」
2000 = "「嗯，不要從設計入手，而是在功能層面動腦筋。也就是說，從狹窄廚房的使用方式來反推」" 

# 【日々姫】
# display as 日日姬
# JP: 「学ぶ……って、なにを？」
1903 = "「反推……反推什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「“新しい、僕らの理想の食堂車の姿”をだ。\n今の僕らの理想は、在りし日の姿の伝聞でしかないが」
1905 = "「反推出“我們理想中的餐車的嶄新樣貌”。我們現在的理想，完全是根據餐車的往日形象而來的」" 

# 【日々姫】
# display as 日日姬
# JP: 「ああああ！」
1962 = "「啊啊啊啊！」" 

# monologue
# JP: （ばちゃんっ！）
3024 = "（嘩啦！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「うおっぷ！」
1956 = "「唔噗！」" 

# monologue
# JP: 派手な飛沫を起こしつつ、\n日々姫が僕へと近寄ってくる。
2707 = "巨大的水花濺起，日日姬朝我衝了過來。" 

# 【日々姫】
# display as 日日姬
# JP: 「ガマダスカフェ！」
2432 = "「ＧＡＭＡＤＵＳ咖啡廳！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうだな、それだ！\nまさにガマダスカフェのキッチンだ！」
2069 = "「對啊！就是這個！就是ＧＡＭＡＤＵＳ咖啡廳的廚房啊！」" 

# monologue
# JP: ガマダスの当初構想――日々姫の初期デザイン案では、\nガマダス全部が子供の遊び場として作られていた。
2668 = "在ＧＡＭＡＤＵＳ的最初構想——日日姬的初期設計方案中，ＧＡＭＡＤＵＳ的所有空間都是孩子們的遊樂場。" 

# monologue
# JP: その案に、母親である市職員たちからの要望が届いた。\n「母親が休めるスペースを絶対に作って下さい」と。
2946 = "而身為母親的政府職員們針對這個方案提出了意見。“請務必留出一塊讓母親休息的空間”。" 

# 【日々姫】
# display as 日日姬
# JP: 「後付けで急遽キッチンば組みこむことになったけん、\n専門業者さんに、そこだけ丸投げになっちゃって」
2192 = "「於是後來又臨時決定要把廚房加進去。而這項頭痛的問題則完全丟給專業人士去處理了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「結果、非常に狭く使い辛そうなキッチンが出来た。\nが、こうなってみると……それも天の配剤かもしれん」
2226 = "「最後，一個非常狹窄、看起來很難使用廚房就完成了。不過現在看來……那也算是上天的安排啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん――うん！　あそこば、狭くても\nきっちり美味しい料理作って出してくれるもんね！」
1984 = "「嗯……嗯！　畢竟那裡雖然很狹窄，但還是能夠做出很好吃的菜品啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのノウハウを学べばあるいは、食堂列車に\nフィードバックできる何かがあるかもしれん」
1912 = "「只要把那方面的知識學到手，說不定就能套用到餐車的設計上」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！！」
# 1998 = "「嗯！！」" 

# monologue
# JP: （ざばあっ！）
# 3024 = "（嘩啦！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1933 = "「哇！！」" 

# monologue
# JP: 日々姫が僕に抱きついてくる。
2814 = "日日姬撲進了我的懷裡。" 

# monologue
# JP: くっつく胸が、鼓動の速度が教えてくれる。\n日々姫は邪気なく――素直に喜び、抱きついてきた。
2819 = "日日姬的心跳透過緊貼的胸部傳遞而來。因此我知道此舉不帶任何邪念。她抱住我純粹是因為高興之情。" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがと！　にぃに！！\n行き詰まってたの、スっとした！！」
2351 = "「謝謝你阿哥！！之前受阻的思路都打通了！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
2013 = "「嗯，那就好」" 

# 【日々姫】
# display as 日日姬
# JP: 「店長の山崎さんば、稀咲先輩の紹介やけん。\n見学も気楽だし、実際、手伝いとかもできるかもだし」
2085 = "「店長山崎小姐是稀咲學姐介紹來的。咱們去參觀應該也不麻煩，說不定還能幫點忙呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、手伝いか。時間に余裕があるときならば、\nいいかもしれんな。実際に、日々姫と僕とでお店――」
2079 = "「幫忙啊。如果時間足夠的話，這確實是個好主意。你和我實際去店裡……」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1963 = "「啊！」" 

# monologue
# JP: ゼロ距離から日々姫が僕を見上げてくる。\n視線が、呼吸が一致する。
2813 = "日日姬抬起頭，從極近距離注視著我。我們視線相會，呼吸節奏都一致了起來。" 

# monologue
# JP: 日々姫の鼓動が急に早まる。\n思い出してる――僕も日々姫も。
2821 = "日日姬的心跳驟然加速。我們倆同時想起了一件事。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに。手、見せて？」
2412 = "「阿哥。給我看看你的手吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2054 = "「好」" 

# monologue
# JP: 右手を差し出す。\n日々姫がそれを受取り広げる。
2737 = "我伸出右手。日日姬把手托住，並將它展開。" 

# monologue
# JP: 親指の付け根に走る傷。\n日々姫の指が、何度も何度も撫でさする。
2684 = "她用手指不斷撫摸我大拇指根部的傷痕。" 

# 【日々姫】
# display as 日日姬
# JP: 「残っちゃったんだ。傷」
2284 = "「留下傷痕了啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「傷ではないさ、勲章だ。\nこころの底から、そう思っている。今も、昔も」
2385 = "「這不是傷痕，是勳章。我一直都是這麼認為的，真的」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに」
2414 = "「阿哥」" 

# monologue
# JP: 日々姫の指が、手から離れる。\n僕の体に残る傷。無数の傷。事故の痕を撫でていく。
2824 = "日日姬的手指離開了我的手。她開始撫摸我身上留下的無數傷痕——我在那場事故中留下的傷痕。" 

# monologue
# JP: 誰一人、なにひとつさえ守れなかった小さな僕を、\nその弱さごと――全て包もうとするかのように。
2702 = "就像是要把曾經的那個弱小的、保護不了任何人的我包容起來一般。" 

# 【日々姫】
# display as 日日姬
# JP: 「わたしもね？　きっと、あのとき――\n傷ば、こころに残したと」
2132 = "「我也一樣哦。那時……我的心裡一定也留下了傷痕」" 
