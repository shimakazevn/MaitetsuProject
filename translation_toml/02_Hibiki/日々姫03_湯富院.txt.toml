[script]
# lines: 457 
# monologue
# JP: （カポっ――カポっ――）
3026 = "（Lộc cộc——Lộc cộc——）"
# 【日々姫】
# display as 日日姬
# JP: 「わわっ！？　歩きよったと！？」
1925 = "「Oa oa!? Đi bộ kìa!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは歩くだろう。馬なのだし」
2287 = "「Thì nó phải đi bộ chứ. Là ngựa mà.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「はは」
1934 = "「Haha」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
1959 = "「A」"
# monologue
# JP: 湯富院市長の笑い声に、\n日々姫は表情を引き締めなおす。
2947 = "Nghe tiếng cười của Thị trưởng Yufuin,\nHibiki vội vàng chỉnh lại biểu cảm."
# 【日々姫】
# display as 日日姬
# JP: 「失礼しました。\nその――少しびっくりしてしまって」
2116 = "「Cháu xin lỗi.\nChỉ là——cháu hơi ngạc nhiên một chút thôi ạ.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「いやいやいや、どうぞ気楽に。そうして欲しくて、\nこの観光馬車にご招待させてもらったんですから」
1810 = "「Không không không, cứ tự nhiên đi cháu. Ta mời hai cháu lên cỗ xe ngựa du lịch này\ncũng là vì muốn hai cháu được thoải mái mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「観光馬車……いいですね、これ。\n私、初めて乗りましたけど――」
2340 = "「Xe ngựa du lịch... tuyệt thật đấy.\nĐây là lần đầu tiên cháu được ngồi——」"
# monologue
# JP: （カポッ！　カポッ！　カポッ！　カポッ！）
3027 = "（Lộc cộc! Lộc cộc! Lộc cộc! Lộc cộc!）"
# 【日々姫】
# display as 日日姬
# JP: 「わあああ！？　走った！？\nにぃに！　走った！　走ったとー！！」
1927 = "「Oa oa oa oa!? Chạy rồi kìa!?\nAnh hai! Chạy rồi! Chạy rồi kìa!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは走るだろう、馬なのだから。\nというか日々っ――いえ、失礼しました。右田市長」
2288 = "「Thì nó phải chạy chứ, là ngựa mà.\nAnh nói này Hibi——à không, thất lễ rồi. Thưa Thị trưởng Migita.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「あああ、秘書さん――じゃないな。\nお兄さんもどうぞ、お気軽に」
1943 = "「Aaa, thư ký——không phải nhỉ.\nCậu anh trai cũng cứ tự nhiên đi nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お気遣いをありがとうございます。ですが――」
2352 = "「Cảm ơn ngài đã quan tâm. Nhưng mà——」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「堅苦しいのは庁舎内だけで十分ですよ。\nこの馬車の中では、地元のおじさんと観光のご兄妹で」
1884 = "「Cứng nhắc thì chỉ cần ở trong tòa thị chính là đủ rồi.\nTrong cỗ xe ngựa này, chúng ta chỉ là một ông chú địa phương và hai anh em đi du lịch thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ならっ！　お言葉に甘えます！」
2404 = "「Nếu vậy! Cháu xin phép không khách sáo nữa ạ!」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「おお」
2022 = "「Ồ」"
# monologue
# JP: いうやいなやで日々姫が出したスケッチブックに、\n湯富院市長が軽い驚きの声を出す。
2902 = "Vừa nói xong, Hibiki đã lấy cuốn sổ phác thảo ra,\nkhiến Thị trưởng Yufuin khẽ thốt lên kinh ngạc."
# monologue
# JP: 普段どおりが許されるなら、日々姫は描く。\n初めて間近に接する馬で、馬車なのだから。
2692 = "Nếu được phép cư xử như bình thường, Hibiki sẽ vẽ.\nBởi vì đây là lần đầu tiên em ấy được tiếp xúc gần gũi với ngựa và xe ngựa đến vậy."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「……いやいやいや、さすがはデザイナーさんだ」
1433 = "「...Ây da, quả không hổ danh là nhà thiết kế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「恐れ入ります。\nめいっぱいに楽しませていただいているおかげです」
2124 = "「Ngài quá khen rồi ạ.\nNhờ ngài mà em ấy mới được tận hưởng hết mình như vậy đấy ạ.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「みたいだねぇ。本当に楽しそうで何よりだ」
2053 = "「Có vẻ là vậy nhỉ. Cháu nó vui vẻ như vậy là tốt nhất rồi.」"
# monologue
# JP: 湯富院市長は、言いながらネクタイを緩めてみせる。\n僕も、同じく。
2890 = "Vừa nói, Thị trưởng Yufuin vừa nới lỏng cà vạt.\nTôi cũng làm theo y như vậy."
# monologue
# JP: ビールがあれば乾杯したい、\nそんな空気が一瞬、流れる。
2723 = "Một khoảnh khắc, dường như có một bầu không khí\nkhiến người ta muốn nâng ly cạn chén nếu có bia ở đây."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「御一夜の皆さんが客車[しんぞう,1]新造を事業化してくれたこと。\n一個人としても市長としても、感謝してましてね」
2279 = "「Việc mọi người ở Ohimitera biến việc đóng mới \\x%l客車;#00ffc040;toa hành khách%l;#; thành một dự án kinh doanh.\nDù là tư cách cá nhân hay Thị trưởng, tôi đều rất biết ơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「光栄です」
2390 = "「Đó là vinh hạnh của chúng cháu ạ.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「あれがなければ復線も無く、[ゆふいん,2]湯富院も[ぶんごもり,2]文庫森も、\nここまでの活性化を見ることは出来なかった」
2258 = "「Nếu không có việc đó thì cũng chẳng có chuyện khôi phục tuyến đường, và cả Yufuin lẫn Bungomori,\ncũng không thể chứng kiến sự hồi sinh mạnh mẽ như hiện tại.」"
# monologue
# JP: とても意外な一言だ。\n文庫森はともかくとして――
2988 = "Một câu nói vô cùng bất ngờ.\nChưa bàn đến Bungomori——"
# 【双鉄】
# display as 雙鐵
# JP: 「復線が成るよりも遥かに前から、湯富院は……\n観光で大成功し続けていらっしゃるものかと」
2151 = "「Cháu tưởng Yufuin... đã gặt hái được những thành công vang dội trong ngành du lịch\ntừ rất lâu trước khi khôi phục tuyến đường rồi chứ ạ.」"
# monologue
# JP: 繁華の別符、静謐の湯富院。\nガラリと違った趣を持つ、大板の二大温泉地。
2921 = "Beppu phồn hoa, Yufuin tĩnh lặng.\nHai khu suối nước nóng lớn của Oita mang những sắc thái hoàn toàn khác biệt."
# monologue
# JP: 並び立ちながら競い合う両温泉地に、実際のところ、\n御一夜は潜在的な顧客を奪われ続けていた感さえある。
2607 = "Thực tế, Ohimitera thậm chí còn có cảm giác như đang liên tục bị cướp mất khách hàng tiềm năng\nbởi hai khu suối nước nóng đang cạnh tranh gay gắt này."
# 【双鉄】
# display as 雙鐵
# JP: 「エアクラ全盛となったことも、\nむしろ湯富院には幸いしたのかと思っていました」
2038 = "「Cháu cứ nghĩ sự bùng nổ của \\x%lエアクラ;#00ffc040;Aircra%l;#;\nngược lại còn là một điều may mắn đối với Yufuin cơ.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「交通はあまり関係せんのですよ。湯富院はね、\n例え歩いてでも来てくださるお客様に支えられている」
1881 = "「Giao thông không liên quan lắm đâu. Yufuin ấy mà,\nđược chống đỡ bởi những vị khách sẵn sàng đi bộ đến đây cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1963 = "「!」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「何世代もかけ、湯富院はそう育ててもらった。\n今風にいうと――ブランディング、になるかな」
2271 = "「Phải mất nhiều thế hệ, Yufuin mới được nuôi dưỡng thành như vậy.\nNói theo ngôn ngữ hiện đại thì——chắc là xây dựng thương hiệu (branding) nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そこ……そこば聞きたい」
2130 = "「Chỗ đó... cháu muốn nghe về chỗ đó.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「！！？」
2019 = "「!!?」"
# monologue
# JP: いきなりの日々姫の声は、慣れぬ市長を驚かせる。
2827 = "Giọng nói đột ngột của Hibiki khiến vị Thị trưởng chưa quen với em ấy phải giật mình."
# monologue
# JP: 日々姫の手は少しも休まず。瞳さえ、\nスケッチブックと馬車とを行き来し続けるままだ。
2832 = "Tay Hibiki không hề dừng lại một chút nào. Thậm chí ánh mắt,\nvẫn cứ di chuyển liên tục giữa cuốn sổ phác thảo và cỗ xe ngựa."
# 【日々姫】
# display as 日日姬
# JP: 「そこ……ブランディング。どうして成功したのか。\nだって、湯富院――合併とか……危機、たくさん――」
2121 = "「Chỗ đó... xây dựng thương hiệu. Tại sao lại thành công ạ.\nBởi vì, Yufuin——sáp nhập này nọ... có rất nhiều khủng hoảng——」"
# 【双鉄】
# display as 雙鐵
# JP: 「すみません。描いているときは夢中になって。\nこういう、上の空の受け答えを」
1814 = "「Cháu xin lỗi. Khi vẽ là em ấy hay bị cuốn vào như vậy.\nNên mới có kiểu hỏi đáp lơ đãng thế này ạ.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「いやいや、へぇえ。集中力と好奇心の両立、かな？\nいや面白い――実際いるんだねぇ、こういうひと」
2256 = "「Không không, ồ. Vừa tập trung vừa tò mò sao?\nThú vị thật đấy——trên đời này thực sự có người như vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いますね、ここに」
2302 = "「Có đấy ạ, ngay tại đây.」"
# monologue
# JP: 『こういうひと』とは愉快ではない言われ方だが、\n日々姫のしていることも実際、相当なレベルの失礼だ。
1396 = "Dù cách gọi \"người như vậy\" không được dễ chịu cho lắm,\nnhưng những gì Hibiki đang làm thực sự cũng khá là thất lễ."
# monologue
# JP: 湯富院市長のおおらかさを、\nここはまるごと、感謝して受け入れるのが妥当だろう。
2598 = "Sự bao dung của Thị trưởng Yufuin,\nlúc này chúng tôi nên biết ơn và đón nhận toàn bộ mới phải."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「質問には、このまま答えても？」
2405 = "「Cứ thế này mà trả lời câu hỏi cũng được chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「届きますね。日々姫が興味を抱く内容ならば」
1915 = "「Vẫn lọt vào tai đấy ạ. Nếu là nội dung mà Hibiki hứng thú.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「あはは、怖いなぁ。\nプレゼン力を試されちゃうわけか」
1961 = "「Ahaha, đáng sợ thật đấy.\nVậy là kỹ năng thuyết trình của ta đang bị thử thách sao.」"
# monologue
# JP: 口調はあくまで、明るく軽い。
2574 = "Giọng điệu của ông ấy vẫn luôn tươi sáng và nhẹ nhàng."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「湯富院はまぁ、そういう歴史の町だね。\n合併もあり、危機も、名称争いも経験してきた」
1860 = "「Yufuin thì, ừm, là một thị trấn có lịch sử như vậy đấy.\nĐã từng trải qua sáp nhập, khủng hoảng, và cả tranh chấp tên gọi nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「名称争い？」
2043 = "「Tranh chấp tên gọi ạ?」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「ゆふ、という地名自体がまず何度となく変遷してる。\n[もめん,1]木綿と書きゆふ、柚子が富むゆふ。そして今と」
1872 = "「Bản thân cái tên Yufu đã thay đổi không biết bao nhiêu lần rồi.\nViết là Momen (mộc miên) đọc là Yufu, Yuzu (quả thanh yên) phong phú cũng là Yufu. Và bây giờ là Yufu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのですか」
2223 = "「Vậy sao ạ.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「もともとの地名の由来は、あの山――\nゆふ岳からだね。それが、時勢に応じ字を変えた」
1899 = "「Nguồn gốc ban đầu của cái tên đó, là từ ngọn núi kia——\nTừ núi Yufudake đấy. Sau đó, tùy theo thời thế mà thay đổi chữ Hán.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのときどきの特産品……などによってですか？」
2212 = "「Tùy theo đặc sản của từng thời kỳ... chẳng hạn vậy sao ạ?」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「まぁ、多分そうかな。で、\x%l正和;#00ffc040;正和%l;#;九年。\n[ゆふいんちょう,3]柚富院町と[ゆのひらむら,4]湯之比良村とが合併した」
2002 = "「Ừm, chắc là vậy. Và rồi, vào năm \\x%l正和;#00ffc040;Showa%l;#; thứ 9.\nThị trấn Yufuin và làng Yunohira đã sáp nhập với nhau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「何故、合併をされたのですか？」
2277 = "「Tại sao lại sáp nhập ạ?」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「お金が全くなくなったから」
2029 = "「Bởi vì hoàn toàn cạn kiệt tiền bạc rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ええ！？」
1944 = "「Cạn kiệt... tiền bạc sao?」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「そういう時期があったの。\n敗戦の影響が大きくてね」
2031 = "「Vào năm \\x%l正和;#00ffc040;Showa%l;#; thứ 5, công trình xây dựng Đường sắt Kyudai đang được tiến hành đã bị dừng lại.\nBởi vì ngân sách quốc gia bị thâm hụt nghiêm trọng.」"
# monologue
# JP: 敗戦――先の\x%l大戦;#00ffc040;大戦%l;#;の敗戦ならば、\nそれは\x%l大詔;#00ffc040;大詔%l;#;三十五年。即ち\x%l正和;#00ffc040;正和%l;#;の元年だ。
2749 = "Đường sắt Kyudai. Tuyến đường sắt kết nối Oita và Kurume.\nLà tuyến đường sắt chạy qua Yufuin."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「敗戦直後の湯富院には、\n[めいぐん,1]冥軍の基地と保養施設とが置かれちゃってね」
2158 = "「Thế là, mọi người đã quyết định tự mình quyên góp tiền để mua đất và tặng lại.\nNếu làm vậy, công trình sẽ được khởi động lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2217 = "「Việc đó... tốn rất nhiều tiền đúng không ạ?」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「敗戦国に置かれる、戦勝国の保養施設だからねぇ。\n治安なんて気にしてもらえない。観光はズタズタだ」
2285 = "「Gấp đôi ngân sách của thị trấn lúc bấy giờ đấy.\nTất nhiên, thị trấn cũng rơi vào tình trạng cạn kiệt ngân sách ngay lập tức.」"
# 【日々姫】
# display as 日日姬
# JP: 「イメージば強いぶん……壊れちゃったら――\nん――ちょっとや、そっとじゃ――」
1896 = "Tặng một số tiền lớn gấp đôi ngân sách của thị trấn.\nNếu là thời nay thì chắc chắn không thể nào tưởng tượng nổi."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「そのとおり。施設が撤去されて[のち]後も客足は回復せず、\nダムの誘致話が起きるほどの経済苦境に陥った」
2244 = "「Tuy nhiên, vì thế mà đường sắt đã được thông tuyến.\nCó ga, có \\x%l列車;#00ffc040;tàu%l;#; chạy qua. Lượng khách du lịch đã tăng lên đáng kể.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その誘致を撤回させるために――合併を？」
2275 = "「Nhưng mà, vẫn không đủ tiền để tự mình vực dậy sao ạ?」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「そういうの全部含めた経済苦境を脱出するためね。\n湯之比良には、ここを離れた観光客さんが行ったから」
2395 = "「Mặc dù lượng khách du lịch tăng lên, nhưng nếu là khách đi về trong ngày thì chẳng thu được bao nhiêu tiền.\nVì vậy, sáp nhập là điều không thể tránh khỏi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それで、名称争いが？」
2183 = "「Lúc đó, tên gọi đã trở thành Yufuin (由布院) ạ?」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「そう。湯之比良[ちょう]町にするべきって意見が向こうから。\n最終的には、新しい名称でイメージ一新で落ち着いて」
2214 = "「Đúng vậy. Tuy nhiên, làng Yunohira lúc bấy giờ\nlà một khu suối nước nóng sầm uất hơn cả Yufuin (柚富院).」"
# 【双鉄】
# display as 雙鐵
# JP: 「今の字の、『湯富院』になったわけですか」
2168 = "「A... em hiểu rồi. Nếu sáp nhập, cái tên Yunohira\nsẽ biến mất sao.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「それにあわせて、まちづくりの方針も一本化した」
2419 = "「Đúng vậy. Dù sáp nhập, nhưng vẫn muốn giữ lại tên gọi của cả hai bên.\nNên đã lấy chữ Yu (湯) của Yunohira (湯平), và chữ Fuin (布院) của Yufuin (由布院).」"
# 【日々姫】
# display as 日日姬
# JP: 「ん」
1994 = "「Thế là trở thành Yufuin (湯布院) sao ạ!」"
# monologue
# JP: ほんの一瞬、日々姫のペンの動きが止まる。
2826 = "Đôi tay đang phác thảo của Hibiki đột ngột dừng lại.\nVới đôi mắt mở to, em ấy ngước nhìn Thị trưởng Yufuin."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「[べっぷ,1]別符の奥座敷としての、相対的な[せいひつ,1]静謐ではなく。\n自然や環境を活かした『てづくりの静謐』へ」
2231 = "「A, anh hai, chuyện này thú vị thật đấy.\nEm muốn nghe thêm nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「てづくり……うん」
2174 = "「Hahaha, được thôi. Cứ hỏi ta bất cứ điều gì cháu muốn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1959 = "「啊」" 
# monologue
# JP: 日々姫の声に視線を上げれば、\n“てづくりの静謐”の意味がひと目でわかる。
2721 = "「Dạ vâng! Vậy thì——」"
# monologue
# JP: 町並みは古い一方ではない。新しい建物――どころか\nネイルサロンなどもあり、けれど全てが馴染んでいる。
2987 = "Thị trưởng Yufuin có vẻ rất vui,\nông ấy híp mắt lại, liên tục gật đầu trước những câu hỏi của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「テーマに沿っての、長期的な都市計画を立てられた。\n……簡単に実現できることではありませんよね」
1854 = "Được nhìn thấy Yufuin, nghe những câu chuyện về Yufuin.\nThật sự là một ngày vô cùng quý giá."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「本当にねぇ。湯富院町時代も、湯富院市になっても、\n財政は常に火の車。市民の暮らしも良くならなかった」
2242 = "（Lộc cộc! Lộc cộc! Lộc cộc! Lộc cộc!）"
# monologue
# JP: 湯富院市長は、変わらぬ笑顔だ。\nが、その目の光はとても強いと、今さら気づく。
2889 = "Nhưng mà, Hibiki này.\nĐừng có nhún nhảy trên xe ngựa như thế chứ."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「リゾート開発。ゴルフ場誘致とかの話はいつでも\n町を割ってきたし、その上に大きな地震まであった」
2076 = "「Đây, ngài Soutetsu. Sổ ghi chép đây ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l正和;#00ffc040;正和%l;#;三十年の、いわゆる大板地震ですね？」
2118 = "「Cảm ơn cô, Hachiroku.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「それ。湯富院は壊滅したって噂まで立って。\n噂を否定するために走らせたのが――まぁ、これ」
2247 = "Tôi nhận lấy cuốn sổ tay, rồi lập tức viết lại\nnhững câu chuyện nghe được từ Thị trưởng Yufuin vào đó."
# 【双鉄】
# display as 雙鐵
# JP: 「これ……」
2386 = "Lịch sử, cũng như những sáng kiến đã giúp Yufuin trở thành Yufuin như ngày nay.\nTất cả đều vô cùng hữu ích cho tương lai của Ohimitera."
# monologue
# JP: いきなり床を指さされ……\n理解を得るまで、数秒かかる。
2595 = "「Chuyến tham quan bằng xe ngựa... cũng rất thú vị đấy chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、馬車ですか？」
1972 = "Tôi vừa lẩm bẩm, Hachiroku vừa mỉm cười gật đầu."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「そう。辻馬車を走らせた。で、それが今も、\nこうして観光馬車として歴史を繋いでいる」
2259 = "「Thật tốt khi có thể từ từ ngắm nhìn cảnh vật xung quanh ạ.\nTốc độ bằng với lúc chạy lên dốc cao của \\x%l8620;#00ffc040;8620%l;#; nhỉ.」"
# monologue
# JP: 古色と新味とが調和する町の中を\n過去から今へと走る馬車。
2624 = "「So sánh kiểu đó đúng là đậm chất \\x%lレイルロオド;#00ffc040;Railord%l;#; đấy.」"
# monologue
# JP: なるほど、これは――
2912 = "Dù là lời nói đùa, nhưng tôi không ghét kiểu đó.\nNghe thấy tiếng cười của tôi, Hachiroku lại càng vui vẻ hơn."
# 【日々姫】
# display as 日日姬
# JP: 「こん馬車ば……やけん……こぎゃんと綺麗……\n馬車も……町の全部が――湯富院の……象徴――」
2228 = "「Chuyến tham quan Yufuin... em ấy có vẻ rất hài lòng nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさにだ。町の全て、隅々までが“湯富院”だから、\nこれ程までにこの町は、落ち着きを湛えているのだな」
2346 = "「À, đúng vậy. Mặc dù là do bên đó mời,\nnhưng đây thực sự là một cơ hội học hỏi tuyệt vời.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「嬉しいなぁ。\n『こころからの賛辞』ってヤツだ。これは」
2095 = "Sau đó, chúng tôi cũng được hướng dẫn tham quan quanh ga Yufuin.\nHibiki cũng đã vẽ được rất nhiều bức phác thảo."
# monologue
# JP: 確かに。\n今の日々姫に、お世辞を言うほどの余力などない。
2857 = "Dù chỉ mới phác thảo bằng bút chì, nhưng nhìn vào đó,\ntôi có thể hiểu được tại sao Thị trưởng Yufuin lại khen ngợi em ấy."
# monologue
# JP: こころから思ったことを――\n日々姫の瞳が捉えたものを、そのまま言葉に――！
2829 = "Đó không chỉ là những bức tranh phong cảnh.\nMà còn chứa đựng cả những ý tưởng thiết kế được lấy cảm hứng từ phong cảnh đó."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
2023 = "「Vâng.\nTôi chắc chắn rằng, những kinh nghiệm này sẽ được tận dụng triệt để.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「お？」
1951 = "「Vậy thì tốt quá. Mặc dù anh không thể giúp gì nhiều cho việc thiết kế,\nnhưng anh cũng muốn hỗ trợ em ấy hết mức có thể.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、繋がったように思えたのです。この光景と、\n先程市長がおっしゃられた、“活性化”とが」
2257 = "Ví dụ như, chuẩn bị môi trường để em ấy có thể tập trung thiết kế.\nHoặc là, giúp em ấy giải tỏa căng thẳng."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「ほほぅ？　どういう感じで？」
2025 = "「Nói mới nhớ, hôm nay Hibiki không có ở đây nhỉ.\nEm ấy đang làm gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「湯富院の静謐は、放置による静謐ではなく。\n言うなれば――活性を調和させた静謐ですよね？」
2272 = "「Em ấy đang ở trong phòng thiết kế ạ. Từ lúc trở về từ Yufuin,\nem ấy đã nhốt mình trong phòng, không ngừng vẽ vời.」"
# monologue
# JP: 何も起こらないゆえの静止ではなく、\n全ての動きがその内側で調和し均衡するゆえの静止。
2984 = "「Vậy sao. Chắc là em ấy đang tràn đầy cảm hứng.\nĐừng làm phiền em ấy thì hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ですので、湯富院は新しい刺激を歓迎する。より\n高いレベルに“てづくりの静謐”を持っていくため」
2166 = "Tôi nói vậy, Hachiroku liền gật đầu đồng tình."
# monologue
# JP: 復線も、文庫森復活も、それにともなう移住者増も、\nそれどころか、リゾート食堂列車計画さえも……
2727 = "「Vâng.\nVậy thì, ngài Soutetsu, chúng ta bắt đầu huấn luyện thôi ạ.」"
# monologue
# JP: 単純な“ブランド維持”を考えるのなら、\nむしろマイナス評価をされかねないものだろう。
2690 = "「Được.\nHôm nay làm gì đây?」"
# 【双鉄】
# display as 雙鐵
# JP: 「つまり湯富院の静謐は、常に更新されて維持される。\n日々、新しく生まれ変わっていく静謐なのだと感じます」
2152 = "「Hôm nay, chúng ta sẽ tiến hành huấn luyện \\x%l機関士;#00ffc040;người lái tàu%l;#; ạ.\nTôi sẽ hướng dẫn ngài cách điều khiển van tiết lưu và cần đảo chiều.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「ほほーぅ」
1839 = "「Hiểu rồi.\nMong cô chỉ giáo.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！」
2415 = "Tôi hít một hơi thật sâu, chuẩn bị tinh thần.\nHuấn luyện \\x%l機関士;#00ffc040;người lái tàu%l;#; của Hachiroku rất nghiêm ngặt."
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ」
2016 = "Nhưng, chính vì thế mà tôi mới có thể tiến bộ.\nĐể có thể điều khiển \\x%l8620;#00ffc040;8620%l;#; một cách thành thạo, tôi phải nỗ lực hết mình."
# monologue
# JP: 日々姫が差し出すスケッチブックを受け取って、\n鞄から出した新しいものと取り替えてやる。
2744 = "「Trước tiên, chúng ta sẽ bắt đầu từ việc kiểm tra các bộ phận.\nNgài Soutetsu, xin hãy xác nhận tình trạng của van tiết lưu và cần đảo chiều.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「お、描き上がりましたか？」
1950 = "「Đã rõ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――いえ」
1980 = "Tôi tiến đến bàn điều khiển, kiểm tra tình trạng của van tiết lưu và cần đảo chiều.\nKhông có gì bất thường. Cả hai đều hoạt động trơn tru."
# monologue
# JP: 描きあがった、という言葉から、\n湯富院市長が誤解してると伝わってくる。
2736 = "「Xác nhận xong. Không có gì bất thường.」"
# monologue
# JP: 一枚の絵を丹念にスケッチしていたと、\nおそらく市長は思っているのだ。
2708 = "「Vâng, tốt lắm ạ.\nTiếp theo, chúng ta sẽ tiến hành thao tác thực tế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、見せてもいいか？」
2198 = "Hachiroku bắt đầu giải thích cách thao tác.\nTôi chăm chú lắng nghe, cố gắng ghi nhớ từng chi tiết nhỏ nhất."
# 【日々姫】
# display as 日日姬
# JP: 「ん？　良かとよー」
2015 = "Cách điều khiển van tiết lưu để điều chỉnh lượng hơi nước.\nCách thao tác cần đảo chiều để thay đổi hướng chạy."
# 【双鉄】
# display as 雙鐵
# JP: 「どうぞ、よろしければ」
2333 = "Cả hai đều là những thao tác vô cùng quan trọng đối với \\x%l機関士;#00ffc040;người lái tàu%l;#;.\nKhông được phép có bất kỳ sai sót nào."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「もちろん見せてもらいます――ん？」
2393 = "「...Như vậy đó ạ.\nNgài Soutetsu, ngài đã hiểu rõ chưa ạ?」"
# monologue
# JP: 馬車に揺られての、流れる景色を捉えつつの速描だ。\nスケッチブックは、簡素な線に満ち満ちている。
3000 = "「Ừm, đại khái là hiểu rồi.\nNhưng mà, thao tác thực tế chắc chắn sẽ khó hơn nhiều.」"
# monologue
# JP: その一枚、一枚ごとをめくるたび、\n湯富院市長の目つきは食い入るものとなる。
2886 = "「Đúng vậy ạ.\nVì thế, chúng ta mới cần phải huấn luyện.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「これは――凄い。この短時間で――\nよくぞこれほど、広く、多くの“湯富院”を」
2394 = "Hachiroku mỉm cười.\nNụ cười đó, dường như đang cổ vũ tôi."
# monologue
# JP: そうして、その目が持ち上がる。\n声が、かすかに震えている。
2906 = "「Vậy thì, ngài Soutetsu.\nXin hãy thử thao tác xem sao.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「いや……実際にいるんですねぇ。\n[こういうひと,1]天才――が」
1937 = "「Được.」"
# monologue
# JP: 湯富院市長が僕を見、\nそして、日々姫を見つめる。
2887 = "Tôi nắm lấy van tiết lưu, từ từ kéo về phía mình.\nTiếng hơi nước rít lên, \\x%l8620;#00ffc040;8620%l;#; bắt đầu di chuyển."
# 【湯富院市長】
# display as 湯布院市長
# JP: 「あなた方となら話せそうだ。\nいや――あなた方にこそ、描いて欲しい」
2143 = "「Tốt lắm ạ.\nTiếp theo, xin hãy thử thao tác cần đảo chiều.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん……なんば、描けば――\nああいえ！？　何を描けば、いいんでしょうか？」
1982 = "Tôi đẩy cần đảo chiều về phía trước.\n\\x%l8620;#00ffc040;8620%l;#; dừng lại, rồi bắt đầu chạy lùi."
# monologue
# JP: 湯富院市長の真剣な口調に、眼差しに、\n日々姫はハっと背筋を伸ばす。
2904 = "「Tuyệt vời ạ.\nNgài Soutetsu, ngài nắm bắt rất nhanh.」"
# 【湯富院市長】
# display as 湯布院市長
# JP: 「この復線をきっかけに、湯富院が夢見はじめている\n――“湯富院の新たな静謐”。その、未来の姿を」
1845 = "「Cảm ơn cô.\nNhưng mà, vẫn còn phải luyện tập nhiều.」"
# 【日々姫】
# display as 日日姬
# JP: 「未来の姿……未来の姿」
2234 = "Tôi nói vậy, Hachiroku lại gật đầu."
# monologue
# JP: 日々姫が 、すっかり入り込んでしまっている。
2806 = "「Vâng.\nChúng ta hãy cùng nhau cố gắng nhé.」"
# monologue
# JP: 『でしたら、少しでも湯富院を知っておきたいです』と、\nあえての徒歩での帰途であるにもかかわらず――
