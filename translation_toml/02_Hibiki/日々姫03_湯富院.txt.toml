# display as 雙鐵
# JP: 「――そのとおりだろうな」
1416 = "Tôi kéo mạnh phanh, \\x%l8620;#00ffc040;8620%l;#; dừng lại một cách êm ái.\nChuyến chạy thử nghiệm đầu tiên đã kết thúc thành công tốt đẹp."
# monologue
# JP: かつて愛した存在が、無残に崩れ去ってしまった。
2996 = "「Ngài Soutetsu, ngài làm rất tốt ạ.\nChuyến chạy thử nghiệm đã thành công mỹ mãn.」"
# monologue
# JP: 記憶を大事にするのであれば、\nむしろそのような現状から、人はその目を背けるだろう。
2974 = "「Cảm ơn cô, Hachiroku.\nNhờ có cô mà tôi mới có thể làm được như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうとわかって――わかっていてなお」
1864 = "Tôi nói vậy, Hachiroku lại mỉm cười dịu dàng."
# monologue
# JP: どうして、みくろは笑顔でいるのか。\n意外の念は、やがて、気づきに、理解につながる。
2891 = "「Không có chi ạ.\nĐó là nhiệm vụ của tôi mà.」"
# monologue
# JP: みくろの手元に、小さな箒。\nならば、みくろは――たった一人で――
2930 = "Chúng tôi cùng nhau bước xuống khỏi buồng lái.\nMọi người đang đứng đợi chúng tôi ở sân ga, với những nụ cười rạng rỡ trên môi."
# 【みくろ】
# display as 美玖路
# JP: 「逆にいえば、綺麗にしたらまたみんなが見てくれます。\nそうしたら、きっとこのこも生き残れます」
1909 = "「Anh hai! Tuyệt vời quá!」"
# 【日々姫】
# display as 日日姬
# JP: 「――生き残れる？」
1414 = "Hibiki chạy đến ôm chầm lấy tôi.\nTôi cũng ôm lấy em ấy, cảm nhận niềm vui sướng đang trào dâng trong lòng."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1976 = "「啊？！」" 
# monologue
# JP: ずっと黙って話を聞いていた日々姫の不意の、硬い声。\nけれどもみくろは、変わらずにこにこ応対する。
2564 = "「Chúc mừng cậu, Soutetsu.\nCậu đã làm rất tốt.」"
# 【みくろ】
# display as 美玖路
# JP: 「解体のうわさがあるんです。このこ。\nそれも、解体のための予算が申請されるってレベルで」
2322 = "Paulette cũng bước đến chúc mừng tôi.\nTôi gật đầu cảm ơn em ấy."
# 【日々姫】
# display as 日日姬
# JP: 「えっ」
1935 = "「Cảm ơn mọi người.\nNhờ có sự giúp đỡ của mọi người mà tôi mới có thể làm được như vậy.」"
# 【みくろ】
# display as 美玖路
# JP: 「みくろの38696も……結構、ボロボロの保存機なんです。\n部品とか、たくさん欠損しちゃってて」
2321 = "Tôi nhìn quanh, thấy mọi người đều đang mỉm cười hạnh phúc.\nĐây chính là khoảnh khắc mà tôi luôn mong đợi."
# monologue
# JP: みくろ自身にも、\n見えている以上の損傷があるのかもしれん。
2936 = "Sự hồi sinh của \\x%l8620;#00ffc040;8620%l;#;.\nVà sự phục hưng của Ohimitera."
# monologue
# JP: 箒を両手で持ってなお、左手は開かれたまま添えられて\n――その柄を掴んではいないから。
2657 = "Tất cả chỉ mới bắt đầu.\nNhưng, tôi tin rằng, chúng tôi sẽ làm được."
# 【双鉄】
# display as 雙鐵
# JP: 「雄武田の動物園で働いている――といっていたよな。\nならば、38696もそこで保存を？」
1890 = "Bởi vì, chúng tôi là một đội.\nVà chúng tôi có những ước mơ chung."
# 【みくろ】
# display as 美玖路
# JP: 「はい、そうですよ」
2006 = "Cùng nhau, chúng tôi sẽ vượt qua mọi khó khăn.\nVà đưa Ohimitera trở lại thời kỳ hoàng kim của nó."
# monologue
# JP: 初見で感じた疑問をだから、\nこのタイミングで口にしてみる。
2611 = "Đó là lời hứa của tôi.\nVà tôi sẽ dùng cả cuộc đời mình để thực hiện lời hứa đó."
# 【双鉄】
# display as 雙鐵
# JP: 「動物園といえば、入場料収入のある施設だろう？\nその中に保存されていて、なぜボロボロの状態に？」
1895 = "「動物園應該是有門票收入的吧？那保存在園中的機車為什麼會變得破破爛爛的呢？」" 
# 【みくろ】
# display as 美玖路
# JP: 「ピカピカでしたよ！　38696も、みくろも。ずっと。\nだけど――ええと――」
2397 = "「過去３８６９６和美玖路一直都是光潔如新的哦！不過，呃……」" 
# monologue
# JP: はじめて、みくろの笑顔が消える。
2934 = "美玖路臉上的笑容頭一回消失了。" 
# monologue
# JP: 影がさした、という感じではない、\nただ単純に、こまってしまったといった風情だ。
2576 = "不過她看起來好像只是有些為難，並沒有露出半點陰鬱的神色。" 
# 【みくろ】
# display as 美玖路
# JP: 「……部品取り。現役機で――ええと、部品の不足が出て、\nそのままだと、走れなくなっちゃうこが、出たんです」
1450 = "「……零件被拿走了。拿給了現役的機車。有些孩子由於零件短缺，面臨著無法繼續行駛下去的狀況」" 
# 【双鉄】
# display as 雙鐵
# JP: 「――部品取り」
2181 = "「拆走零件」" 
# monologue
# JP: 僕らも、日常に行うようになったことだ。\nが、“部品を取られた当事者”の口から聞かされると――
2986 = "這種事我們現在也經常做。不過從“受害當事人”的口中聽到這些話，不免感覺……" 
# 【みくろ】
# display as 美玖路
# JP: 「それで、みくろ、走って欲しいって思ったんです。\n38696はボイラーで引退したから、みくろたちの分も」
2171 = "「所以美玖路想讓那些孩子再行駛下去。３８６９６是由於鍋爐問題而引退的，所以美玖路希望大家能替我們行駛下去」" 
# 【双鉄】
# display as 雙鐵
# JP: 「……」
1425 = "「……」"
# monologue
# JP: ボイラーで引退……その一言は、痛切だ。\nボイラーの劣化・老朽化こそ、蒸気機関車の致命傷ゆえ。
2658 = "因為鍋爐問題而引退……這句話我深有體會。因為鍋爐的磨損和老化才是蒸汽機車的致命傷。" 
# monologue
# JP: ボイラー爆発を招きかねないその事態への対処法は、\nボイラー新造しかないし、それはコストに見合わない。
2731 = "想要解決鍋爐爆炸的隱患，就必須重造鍋爐，可是這麼做成本太高了。" 
# 【日々姫】
# display as 日日姬
# JP: 「……ボイラば元気なこに、\n他の部品、やけん譲ってあげたと？」
1442 = "「……所以要把其他的零件讓給那些鍋爐沒問題的孩子？」" 
# 【みくろ】
# display as 美玖路
# JP: 「はい！　動物のお世話とか園の掃除は、\nマニピュレーターがちょっと不調だってこなせますから」
2219 = "「是的！畢竟照顧動物和打掃園區的工作，哪怕機械臂有點小故障也不礙事的」" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
1958 = "「啊……」" 
# monologue
# JP: 現役機――とは、レイルロオドと\x%l蒸機;#00ffc040;蒸機%l;#;、両方か。\nみくろは、みくろ自身の部品を、マニピュレーターを……
2938 = "美玖路說的現役機車，是把鐵路人偶和\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;一起算進去了啊。她自願把自己的零件，把機械臂……" 
# monologue
# JP: そこが狂った現役機の不良品と、\n覚悟の上で交換――実質、提供したのか。
2954 = "與現役機車的故障品做了交換——實際上就是捐了出去。" 
# 【みくろ】
# display as 美玖路
# JP: 「あ！」
# 1963 = "「啊！」" 
# monologue
# JP: 息を飲んでしまった僕に、みくろの顔がますます困る。\nゆえ、気づく。
2900 = "看到我大吃一驚的反應，美玖路的表情顯得越來越為難。我這才發覺……" 
# monologue
# JP: なるほど、みくろはそのことに触れてほしくはなくて――\n懸命に、“誤解を招くような言葉”を、選んでいたのか。
2616 = "原來，美玖路並不想提及這件事，所以才會拚命避開本題，用了容易招來誤解的說法。" 
# 【双鉄】
# display as 雙鐵
# JP: 「であらば、“結構ボロボロ”の38696こそを優先で、\n“思い出の中を走れる”ように、してやるべきでは？」
2410 = "「那麼是不是應該先讓“相當破舊”的３８６９６“馳騁於回憶”之中呢？」" 
# monologue
# JP: 気づいたゆえに話をずらせば、\nみくろの顔はあっという間に、困り顔から笑顔に戻る。
2898 = "發覺我領會到她的難處並自己岔開了話題，美玖路馬上重新露出了笑容。" 
# 【みくろ】
# display as 美玖路
# JP: 「順番なんです。みくろ、考えたんです。\nどう頑張っても動物園で、38696を見てもらえないから」
2336 = "「要一個一個來才行。美玖路已經考慮過了。３８６９６在動物園裡是無論如何都不可能重獲關注的」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2014 = "「嗯？」" 
# monologue
# JP: ……雄武田の動物園は、入園者そのものの減少に、\nひどく苦しめられているらしい。
1401 = "……大牟田動物園好像原本就因為遊客減少而處境相當困難。" 
# monologue
# JP: 収入がなければ、保存機整備にお金を回す余裕もなく。\nみくろはせめて、周辺清掃を頑張り続けているのだが……
2856 = "沒有收入的話，就沒錢給封存機車做維護保養。雖然美玖路還在盡力把機車的周圍打掃乾淨……" 
# 【みくろ】
# display as 美玖路
# JP: 「このままじゃジリ貧だって、みくろ気づいたんです」
2317 = "「美玖路明白這樣下去情況只會越來越窘迫」" 
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
2303 = "「確實是這樣」" 
# monologue
# JP: ボロボロの機体のまわりをいくら清掃しても、\n機体のボロさが、かえって際立ってしまうだけ――
2705 = "就算把破舊機車的周圍打掃得再乾淨，也只會突顯出機車本身的殘破和蕭瑟——" 
# monologue
# JP: それを目にしたときに感じるであろう罪悪感を、\n動物園を見に来る客が、あえて好むとは到底思えん。
2600 = "來動物園參觀的遊客，應該沒有人會喜歡上目睹那種景象時所產生的罪惡感。" 
# 【みくろ】
# display as 美玖路
# JP: 「だからみくろ、一生懸命考えたんです。\n例えば、観光地のデゴイチだったら、目立つかなって」
2169 = "「所以美玖路就拚命開動腦筋，有了個想法。如果把Ｄ５１變成觀光景點，會不會引起大家的注意呢？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2210 = "「是嗎」" 
# monologue
# JP: みくろは話して聞かせてくれる。“観光地のデゴイチ”\nこの湯富院のD51 1031号機にまずは、注目を集める。
2937 = "美玖路說出了她的想法。“把Ｄ５１變成觀光景點”就是先讓這輛湯布院的Ｄ５１　１０３１號車去吸引大家的目光。" 
# monologue
# JP: 清掃をしてボランティアを募り、\n綺麗な状態に復活させて、観光集客の一拠点とする。
2633 = "召集志願者把這裡打掃乾淨，讓機車煥然一新，成為觀光客們的聚集地。" 
# 【みくろ】
# display as 美玖路
# JP: 「そうできたら、成功したら。雄武田の市役所さんとか\n市民の皆さんも、きっと、38696を見てくれますから」
2060 = "「如果這件事能做成功的話，３８６９６一定會獲得大牟田市政府和市民們的關注的」" 
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2233 = "「有道理」" 
# monologue
# JP: 成功例を旗印として、それを周辺に伝播させていく。\n考えの進め方としては、非常に[わか,1]理解るし、僕好みだ。
2995 = "通過成功案例帶領周邊地區往相同方向發展。這種思路我非常能夠理解，也很合我的胃口。" 
# 【双鉄】
# display as 雙鐵
# JP: 「……考えついても、なかなか実行にはうつせんことだ。\nみくろは、非常に前向きで行動的なのだな」
1441 = "「……就算能想到這個辦法，想要付諸實際也並不容易。你真是個樂觀積極的行動派啊」" 
# 【みくろ】
# display as 美玖路
# JP: 「みくろ、そんなじゃないですよ。動けたのは、ただ、\nあこがれて――お手本にしたいって、思ったからで」
2318 = "「美玖路沒那麼了不起啦，只是想要效仿自己憧憬的對象而已」" 
# 【双鉄】
# display as 雙鐵
# JP: 「お手本？」
2184 = "「效仿？」" 
# 【みくろ】
# display as 美玖路
# JP: 「ハチロクおねえさまを――御一夜鉄道のみなさんをです。\nおねえさまを見て、みくろにもできるかもって、思って」
2314 = "「美玖路想效仿八六姐姐大人——效仿御一夜鐵路的各位。看到了姐姐大人的努力，美玖路覺得自己也可以試一試」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1957 = "「啊——」" 
# monologue
# JP: なるほど、僕好みであるはずだ。
3008 = "難怪會合我的胃口。" 
# monologue
# JP: みくろの示した計画案は、僕らがいままで為してきたこと、\nハチロクを旗印にした復線延伸の、バリエーションだ。
2925 = "美玖路所說的方案，就是我們一直在開展的以八六為案例的廢線恢復與延伸計劃的翻版。" 
# 【双鉄】
# display as 雙鐵
# JP: 「であるのならば、とても光栄なことではあるな。\n僕らとしても、手伝えることがもしもあるなら」
2331 = "「能聽到你這麼說我感到非常榮幸。如果有什麼我們能幫得上忙的事請儘管提出來」" 
# 【日々姫】
# display as 日日姬
# JP: 「どぎゃんして」
2276 = "「為什麼」" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1963 = "「啊！」" 
# monologue
# JP: 日々姫の声は、やはり硬い。\n慌てて見れば、その表情もこわばっている。
2828 = "日日姬的聲音還是冷冰冰的。我連忙回身一看，發現她繃著一張臉。" 
# 【日々姫】
# display as 日日姬
# JP: 「どぎゃん理由で、このこはここに、置き去られたと？\nどぎゃんして、このこを誰も、面倒みんと？」
2389 = "「這孩子為什麼會被遺棄在這裡？為什麼沒有人照料它？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
# 1958 = "「啊……」" 
# monologue
# JP: 言われてみれば、確かに疑問だ。\n“てづくりの静謐”――この湯富院の落ち着きと賑わいを。
2948 = "「Hả!?」"
# monologue
# JP: あれほど考え作り出している湯富院市長が、あえて\nこの機関車を放置するなら、そこには確たる理由があろう。
2888 = "「Đã có một thời kỳ như vậy đấy.\nẢnh hưởng của việc bại trận là rất lớn.」"
# 【みくろ】
# display as 美玖路
# JP: 「お金が無いって聞いてます。\n修復するにも、解体するにも、移転するにも」
2327 = "Bại trận——Nếu là sự thất bại của \\x%l大戦;#00ffc040;Đại chiến%l;#; trước đây,\nthì đó là năm \\x%l大詔;#00ffc040;Taisho%l;#; thứ 35. Tức là năm đầu tiên của thời kỳ \\x%l正和;#00ffc040;Showa%l;#;."
# 【日々姫】
# display as 日日姬
# JP: 「お金……確かに市長さん、ずっと財政は苦しいって\nお話ししとったけど」
2311 = "「Ngay sau khi bại trận, Yufuin đã bị\nbiến thành căn cứ và cơ sở nghỉ dưỡng của quân đội Mỹ.」"
# 【みくろ】
# display as 美玖路
# JP: 「あ！　そうですよね。日々姫さん、御一夜市の市長さん\nなんですもんね。湯富院の市長さんとだって、きっと」
1968 = "「Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、正確な情報は取ろう」
2138 = "「Bởi vì là cơ sở nghỉ dưỡng của nước thắng trận đặt tại nước bại trận mà.\nHọ chẳng thèm bận tâm đến an ninh trật tự đâu. Du lịch coi như nát bét.」"
# monologue
# JP: みくろは、どう見ても楽天的――\nもっというなら、夢見がちな性格なように思えてしまう。
2932 = "「Hình ảnh càng tốt... thì khi bị phá vỡ——\nƯm——sẽ không dễ dàng gì——」"
# monologue
# JP: が、日々姫や僕のキャパシティは現状で限界に近い。\nあまり過大に期待され、日々姫の負担になるのは避けたい。
2634 = "「Chính xác. Ngay cả sau khi cơ sở bị dỡ bỏ, lượng khách vẫn không phục hồi,\nrơi vào tình trạng khó khăn kinh tế đến mức xuất hiện cả kế hoạch xây dựng đập thủy điện.」"
# 【双鉄】
# display as 雙鐵
# JP: 「湯富院市の市政に、まさか御一夜市が干渉も出来ない。\nが、情報共有を持ちかけることくらいは無理なく出来る」
2106 = "「Để khiến họ rút lại kế hoạch đó——mới phải sáp nhập sao ạ?」"
# 【みくろ】
# display as 美玖路
# JP: 「はい」
# 1994 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえまず、このD51 1031に関する情報を提供してもらう。\n湯富院市側の承諾が得られれば、みくろにも伝えよう」
2164 = "「Là để thoát khỏi tình trạng khó khăn kinh tế bao gồm tất cả những điều đó.\nBởi vì những khách du lịch rời bỏ nơi này đã đổ dồn về Yunohira.」"
# 【みくろ】
# display as 美玖路
# JP: 「わ！　そうしてもらえたら助かります。放置の理由が\nわかった方が、手立ても見つけられやすいですよね！」
1932 = "「Và từ đó, dẫn đến tranh chấp tên gọi ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\nでは日々姫、そういう感じでどうかと思うが――」
1993 = "「Đúng vậy. Phía bên kia đưa ra ý kiến là nên lấy tên thị trấn Yunohira.\nCuối cùng, mọi chuyện đã ổn thỏa bằng một cái tên mới để làm mới hình ảnh.」"
# 【日々姫】
# display as 日日姬
# JP: 「……うん」
1437 = "「Vậy là trở thành chữ 'Yufuin' (湯富院) như bây giờ sao ạ.」"
# monologue
# JP: 日々姫は慎重に頷いて。
2810 = "「Cùng với đó, phương hướng xây dựng thị trấn cũng được thống nhất.」"
# monologue
# JP: それからゆっくり、公園のデゴイチを――\nD51 1031を再び見上げる。
2760 = "「Ưm.」"
# 【日々姫】
# display as 日日姬
# JP: 「それでよか――っていうか、\n今できることとか、多分……そのくらいで精一杯、あ！」
1953 = "Chỉ trong chốc lát, nét bút của Hibiki dừng lại."
# monologue
# JP: こわばっていた日々姫の顔が、急にやわらぐ。
2833 = "「Không phải là sự tĩnh lặng tương đối, giống như một khu nhà phụ của Beppu.\nMà hướng tới một 'sự tĩnh lặng thủ công' tận dụng thiên nhiên và môi trường.」"
# 【日々姫】
# display as 日日姬
# JP: 「ね、にぃに。\nこの辺にスーパーとかそういうの、あったと？」
2153 = "「Thủ công... vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ついさっき[せいきょう,1]正協の前をとおりがかったが――」
2018 = "Ngước mắt lên theo giọng nói của Hibiki,\ntôi có thể hiểu ngay ý nghĩa của \"sự tĩnh lặng thủ công\" chỉ trong một cái nhìn."
# 【日々姫】
# display as 日日姬
# JP: 「なら、箒とゴミ袋！\nわたし、すぐ行って買ってくる！」
2407 = "Khu phố không chỉ có những công trình cổ kính. Những tòa nhà mới——thậm chí cả\ntiệm làm móng cũng có, nhưng tất cả đều hòa hợp một cách hoàn hảo."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1994 = "「嗯」" 
# monologue
# JP: なるほど、そうするのは悪くない。\n“掃除をすれば、通りすがる人たちの姿が見える”。
2911 = "「Mọi người đã lập ra một kế hoạch đô thị dài hạn bám sát theo chủ đề.\n...Đây không phải là điều có thể dễ dàng thực hiện được nhỉ.」"
# monologue
# JP: 右田一酒造元での朝の掃除を繰り返すうち、\n日々姫も僕も、それを事実と学んでいるから。
2662 = "「Đúng vậy đấy. Dù là thời thị trấn Yufuin hay khi đã trở thành thành phố Yufuin,\ntài chính lúc nào cũng trong tình trạng báo động. Đời sống của người dân cũng chẳng khá khẩm hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「いい汗かいた～」
2264 = "Thị trưởng Yufuin vẫn giữ nụ cười không đổi.\nNhưng đến giờ tôi mới nhận ra, ánh sáng trong đôi mắt ấy vô cùng mạnh mẽ."
# monologue
# JP: （ちゃぽんっ）
3025 = "「Phát triển khu nghỉ dưỡng. Những câu chuyện như thu hút sân golf lúc nào cũng\nchia rẽ thị trấn, chưa kể còn xảy ra một trận động đất lớn nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「思わぬ収穫――\nいや、収穫になったのかな、あれは」
2125 = "「Là trận động đất lớn Oita vào năm \\x%l正和;#00ffc040;Showa%l;#; thứ 30 đúng không ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「収穫よ、収穫！\nSLホテルのこととか、いろんな情報にも繋がったけん」
2286 = "「Đúng vậy. Thậm chí còn có tin đồn là Yufuin đã bị hủy diệt.\nThứ được cho chạy để bác bỏ tin đồn đó——chính là cái này đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2207 = "「Cái này...」"
# monologue
# JP: ……D51 1031は、大廃線での引退後、\n旧[ゆふ,1]柚富町に、SLホテルとして寝台客車ごと引き取られた。
1409 = "Đột nhiên bị chỉ vào sàn xe...\nTôi mất vài giây mới hiểu được ý của ông ấy."
# monologue
# JP: SLホテルが廃業となり、柚富と湯之比良が合併されると、\n客車は解体――機関車だけが、そのまま放置され続けた。
2956 = "「À, là xe ngựa sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「最初はD51 1031のレイルロオドが面倒みてたのに――」
1804 = "「Đúng vậy. Đã cho chạy xe ngựa dạo. Và nó,\nđến tận bây giờ vẫn tiếp nối lịch sử dưới tư cách là xe ngựa du lịch.」"
# 【双鉄】
# display as 雙鐵
# JP: 「逆に災いしてしまったという話だったな。\nあまりにも愛情を注いで整備をし続けていたがゆえ」
1849 = "Một cỗ xe ngựa chạy từ quá khứ đến hiện tại,\ngiữa một thị trấn nơi nét cổ kính và sự mới mẻ hòa quyện vào nhau."
# 【日々姫】
# display as 日日姬
# JP: 「そのこが機能停止しちゃったあとも――\n誰も、手を触れずに……触れられずにきちゃった、って」
2035 = "Ra vậy, điều này——"
# monologue
# JP: 鉄道を機能させるには、人とレイルロオドとの、\n共同作業が必須と感じる。
2591 = "「Cỗ xe ngựa này... bởi vì... đẹp đến nhường này...\nXe ngựa cũng vậy... tất cả mọi thứ của thị trấn——đều là biểu tượng của... Yufuin——」"
# monologue
# JP: それがたとえ、もはや走れぬ鉄道車両――\n\x%l静態保存;#00ffc040;静態保存%l;#;機の保存に関することであっても。
2646 = "「Chính xác là vậy. Bởi vì mọi thứ của thị trấn, đến từng ngóc ngách đều là \"Yufuin\",\nnên thị trấn này mới có thể toát lên sự tĩnh lặng đến nhường này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……『すぐに解体という話ではない』と、\n湯富院市長はおっしゃっていたな」
1445 = "「Thật đáng mừng.\nĐây chính là cái gọi là 'lời khen ngợi từ tận đáy lòng' đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。でも、何をしようっていう感じでもなかった。\n完全にもてあましているっていうか……」
1987 = "Đúng vậy.\nHibiki hiện tại không còn tâm trí đâu mà nói những lời nịnh nọt nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「率直に言えば、\nやっかいものと見ているような感じは受けたな」
2324 = "Những gì em ấy thực sự nghĩ trong lòng——\nNhững gì lọt vào mắt Hibiki, cứ thế được nói ra thành lời——!"
# 【日々姫】
# display as 日日姬
# JP: 「っ」
1924 = "「A!」"
# monologue
# JP: 日々姫が急にこわばってしまう。\nみくろの話を聞いていたときと、同じ表情。
2807 = "「Ồ?」"
# monologue
# JP: ――というか、そうだ、あのときから、\n随分と想い入れている様子だったが……
2701 = "「À không, cháu cảm thấy mọi thứ dường như đã kết nối với nhau. Cảnh tượng này, và\n\"sự sôi động\" mà Thị trưởng vừa nhắc đến lúc nãy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにか、感じるところがあるのか？」
2230 = "「Hô? Cháu nghĩ thế nào?」"
# monologue
# JP: いって、ゆるゆる髪を撫でれば、\n日々姫はじわり、やわらいでいく。
2746 = "「Sự tĩnh lặng của Yufuin không phải là sự tĩnh lặng do bị bỏ mặc.\nNói cách khác——đó là sự tĩnh lặng hài hòa với sự sôi động, đúng không ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「……ん。ちょっと、思っちゃって」
1436 = "Không phải là sự tĩnh lặng vì không có chuyện gì xảy ra,\nmà là sự tĩnh lặng vì mọi chuyển động đều hài hòa và cân bằng bên trong nó."
# 【双鉄】
# display as 雙鐵
# JP: 「なにを思った？」
1856 = "「Vì vậy, Yufuin luôn hoan nghênh những kích thích mới. Để có thể\nđưa \"sự tĩnh lặng thủ công\" lên một tầm cao mới.」"
# 【日々姫】
# display as 日日姬
# JP: 「みくろちゃんも、みくろちゃんの38696も――\n公園のあのデゴイチ、D51 1031も、妹だなぁ、って」
2280 = "Việc khôi phục tuyến đường, sự hồi sinh của Bungomori, sự gia tăng dân di cư kéo theo đó,\nthậm chí cả kế hoạch toa ăn nghỉ dưỡng..."
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1959 = "「啊」" 
# 【日々姫】
# display as 日日姬
# JP: 「でしょ？　で、おねえちゃんは活躍しとって。\n妹は、いらんこみたいに扱われちゃって」
2067 = "Nếu chỉ nghĩ đến việc \"duy trì thương hiệu\" một cách đơn thuần,\nthì ngược lại có thể sẽ bị đánh giá tiêu cực."
# monologue
# JP: ……確かにだ。ハチロクは言うにおよばず、\n東日本のSL界隈の金看板、レイルロオド・ランのD51 840。
1403 = "「Tức là, sự tĩnh lặng của Yufuin luôn được cập nhật và duy trì.\nCháu cảm nhận được đó là một sự tĩnh lặng luôn được tái sinh mỗi ngày.」"
# monologue
# JP: 通称ハイテクデゴイチも、トップナンバーではないにせよ、\n1031号機から見れば、確実に姉たる存在だ。
2993 = "「Hô hô~」"
# 【日々姫】
# display as 日日姬
# JP: 「やけん……いらんこっておもわれるまま解体されるの。\n――感傷ってはわかってても、辛いなって、思って」
2160 = "「Anh hai!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1897 = "「Hửm? À.」"
# monologue
# JP: かつての、日々姫。\n常に真闇姉と比べられ、できないこだとされていた――
2805 = "Tôi nhận lấy cuốn sổ phác thảo mà Hibiki đưa ra,\nrồi lấy cuốn mới từ trong cặp ra đổi cho em ấy."
# monologue
# JP: あのころの小さく弱い自分が、\nボロボロのまま放置されている保存機の姿と重なったのか。
2681 = "「Ồ, cháu vẽ xong rồi sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「もちろん、のめり込む気はなかとよ？　デザインと\n市政とが優先やけん。ばってん、それでも、少しは」
2146 = "「À——không ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「のめり込んでもいいのではないか？\n出来る限りは、僕も支えるし、手伝おう」
2128 = "Từ câu \"vẽ xong rồi\",\ntôi nhận ra Thị trưởng Yufuin đang hiểu lầm."
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1945 = "Có lẽ Thị trưởng nghĩ rằng\nem ấy đang cẩn thận phác thảo một bức tranh duy nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「ダジャレではないが、まさに、『絵』だ。\n日々姫はいつでも、誰かの気持ちを、絵にするのだから」
1887 = "「Hibiki, cho ông ấy xem được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1958 = "「啊……」" 
# 【双鉄】
# display as 雙鐵
# JP: 「優先順位やタスク処理。そうしたことに追われるうちに、\n日々姫も僕も、また、見失いかけてしまっていたのかな」
2041 = "「Hửm? Được chứ ạ~」"
# 【日々姫】
# display as 日日姬
# JP: 「見失ったって……なにを？」
2375 = "「Xin mời, nếu ngài không phiền.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まず一番に見るべきが、僕ら自身のこころということ。\nそこが曇っていたのなら、見える全てもまた曇るのに」
2137 = "「Tất nhiên là ta phải xem rồi——hửm?」"
# 【日々姫】
# display as 日日姬
# JP: 「あー……」
# 1958 = "「啊……」" 
# monologue
# JP: 選挙戦で苦しんだ時期。\n日々姫も僕も、そこを完全に見失ってしまっていた。
2666 = "Đó là những bức phác họa nhanh bắt trọn những cảnh vật lướt qua\ntrong lúc lắc lư trên xe ngựa. Cuốn sổ phác thảo tràn ngập những đường nét giản dị."
# monologue
# JP: その愚を危うく僕らは繰り返そうとして――
2944 = "Mỗi khi lật qua từng trang, từng trang một,\nánh mắt của Thị trưởng Yufuin lại càng trở nên chăm chú hơn."
# 【日々姫】
# display as 日日姬
# JP: 「うん。あるかも」
1991 = "「Cái này——thật tuyệt vời. Trong khoảng thời gian ngắn như vậy——\nmà cháu có thể vẽ được một \"Yufuin\" rộng lớn và đa dạng đến thế này.」"
# monologue
# JP: けれども実に危ういところで、偶然出会ったみくろの目。\n色を失い、けれど優しい、あの目に救われたのかもしれん。
2575 = "Và rồi, ánh mắt ấy ngước lên.\nGiọng nói khẽ run rẩy."
# 【双鉄】
# display as 雙鐵
# JP: 「市民の目線、利用者目線。それはもちろん、大切だ」
2074 = "「Chà... trên đời này thực sự có tồn tại nhỉ.\n[Một người như vậy, 1]Thiên tài——đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1994 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「けれど、そこばかりに目を向けていて、最初の利用者、\n“自分”を見失うのならきっと、一番深くを見損ねる」
1917 = "Thị trưởng Yufuin nhìn tôi,\nrồi lại chăm chú nhìn Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「うん！」
1995 = "「Nếu là hai cháu thì có thể bàn chuyện được đây.\nKhông——ta muốn chính hai cháu sẽ là người vẽ nó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、こころの望むままを、無理ない範囲でであれば、\n追って、動いてみるのもよかろう」
2161 = "「Ưm... vẽ, cái gì cơ ạ——\nÀ không!? Cháu nên vẽ cái gì đây ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「こころ――わたしの、こころの望むまま」
1875 = "Trước giọng điệu và ánh mắt nghiêm túc của Thị trưởng Yufuin,\nHibiki giật mình ngồi thẳng lưng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「だ。単純な気分転換にもなるであろうし――\nそこからなにか、つながってくるものもあるかもしれん」
2216 = "「Nhân cơ hội khôi phục tuyến đường này, Yufuin đang bắt đầu mơ ước\n——\"sự tĩnh lặng mới của Yufuin\". Về hình dáng tương lai đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！！」
1998 = "「Hình dáng tương lai... Hình dáng tương lai.」"
# monologue
# JP: にっこりわらって、\n日々姫はゆらり、湯船のお湯に体を任せる。
2835 = "Hibiki đã hoàn toàn chìm đắm vào câu chuyện."
# 【日々姫】
# display as 日日姬
# JP: 「なんだかすっごくラクになったとー！\n来てよかったー！　文庫森も、湯富院も！！」
2139 = "『Nếu vậy, em muốn tìm hiểu về Yufuin dù chỉ một chút』,\nmặc dù chúng tôi đã cố tình chọn cách đi bộ để trở về——"
# 【双鉄】
# display as 雙鐵
# JP: 「まさしくだなぁ」
# 2207 = "「是啊」" 
# monologue
# JP: たくさん歩いて、たくさん出会って、\n話を聞いて、見て、描いた。
2671 = "「Cứ đi mà cúi gầm mặt xuống như thế,\nthì sẽ bỏ lỡ những thứ cần xem đấy.」"
# monologue
# JP: そこで吸収したものを、老技師と、元食堂車シェフと、\n湯富院市長と、レイルロオドとまでも、交わしあえた。
2754 = "「Hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「これほど学びの多い視察というのも、\nなかなか無かろうという気さえしてくる」
2330 = "Bị nhắc nhở, Hibiki giật mình ngẩng mặt lên,\nvươn thẳng lưng, nhìn quanh với điệu bộ hơi kịch cỡm——"
# 【日々姫】
# display as 日日姬
# JP: 「まっことねー。稀咲先輩に大感謝だなぁ。\nおみやげ、奮発しなくっちゃ」
2070 = "「Hửm?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おみやげ――か」
2307 = "「Chỗ kia——anh hai, là đầu máy xe lửa kìa!」"
# monologue
# JP: まったく予想外の一言だ。
2989 = "「Không thể nào, đến ga vẫn còn hơn mười phút nữa cơ mà——hửm!?」"
# monologue
# JP: が、予想もできていなかった自分が、\nこれはおそらく、ズレてしまっているかと思う。
2578 = "「Đúng không! Là đầu máy xe lửa đúng không!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、初日は単なる“旅行”だったのだし、\nそうしたものも、必要となるか」
2304 = "「Ừm, không ngờ trong một công viên giữa lòng thành phố thế này lại có——mà nói đúng hơn là...」"
# monologue
# JP: ゆえに、話ごと寄り添えば、\n日々姫はふふっと、いたずらっぽく笑ってくれる。
2752 = "Công viên Thiếu nhi Trung tâm Yufuin.\nMột công viên nằm lệch ra khỏi con đường được gọi là trục đường chính."
# 【日々姫】
# display as 日日姬
# JP: 「大事よー、お土産。お仕事での出張でだって！\nなかと、やっぱり寂しか気ばするけん」
2308 = "Nằm lặng lẽ như một điểm mù giữa khu du lịch sầm uất.\nKhông biết đó có phải là một tai họa hay không——"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1994 = "「嗯」" 
# monologue
# JP: 実感が伝わってくるひとことだ。
2985 = "「Đứa bé này... tơi tả quá.\n[Cửa buồng khói, 2]Cửa buồng khói bị thủng lỗ chỗ luôn rồi.」"
# monologue
# JP: お土産などを買うという発想自体がもとより無かった\n過去の自分を思い出さざるを得なくなる。
2983 = "「——Ừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すると過去の僕は、\n日々姫にいつも寂しい思いをさせていたのか」
2396 = "Với tư cách là một người lái tàu, tôi cũng đã tích lũy được chút ít kinh nghiệm.\nVì vậy, tôi có thể khẳng định chắc chắn."
# 【日々姫】
# display as 日日姬
# JP: 「ううん！　そぎゃんこつなかとよ？」
1819 = "「Cái này——không thể nào chạy lại được nữa đâu.」"
# monologue
# JP: けれど日々姫は、優しく笑う。\nこころの深くから湧き出したような笑顔をくれる。
2579 = "「Ư...m.」"
# 【日々姫】
# display as 日日姬
# JP: 「だって、私はちっちゃかころから、ずうっとずっと。\nにぃにが帰ってきてくれるのが、何よりも嬉しかもん」
2030 = "「Không đâu. Đứa bé này vẫn có thể chạy lại được mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2197 = "「A! Xin lỗi, đã làm hai người giật mình.」"
# monologue
# JP: なんとかわいい、愛おしい。\n今の日々姫と、幼い日々姫が重なり合ってる。
2676 = "Giật mình vì giọng nói, chúng tôi quay lại.\nVà lại thêm một chút ngạc nhiên trước sự hiện diện đang đứng đó."
# monologue
# JP: ああ、日々姫だと、ごく当然のことを思って――\n当然なのに、今更少し、照れくさくなる。
2858 = "「Em là...」"
# 【双鉄】
# display as 雙鐵
# JP: 「その……だ。土産物選びにはまるで自信が持てない。\nよければ日々姫、明日いっしょに選んでくれ」
1880 = "Dù nhìn từ góc độ nào cũng là một Railord. Nhưng có gì đó không đúng.\nNhìn kỹ thì thấy bộ dạng có chút kỳ lạ."
# 【日々姫】
# display as 日日姬
# JP: 「うん！」
# 1995 = "「嗯！」" 
# monologue
# JP: いかん。日々姫が可愛すぎる。\nが、貸し切りとはいえ、ここは宿の風呂。公共の場だ。
2565 = "Đèn pha ở cổ bị thiếu mất,\nmàu mắt hai bên cũng khác nhau rõ rệt——A!"
# monologue
# JP: 部屋に帰るまでは自重をせねば――\n思った瞬間、そのための方策も浮き上がってくる。
2663 = "「Em là, Railord của đầu máy xe lửa này sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「で、持ち帰らなければならない、\n土産話についてなのだが――」
2411 = "「Không phải ạ, Mikuro là,\nRailord của đầu máy hơi nước loại 8620, số hiệu 38696 thuộc [Đường sắt Hoàng gia cũ, 4]Đường sắt Hoàng gia cũ ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー」
# 1959 = "「啊」" 
# monologue
# JP: 困った声。\nだが、旅に出る前の、絶望感にも近い響きは消えている。
2951 = "「Hả!? Hachiroku á——\nVậy là, em gái của Hachiroku sao!!?」"
# 【日々姫】
# display as 日日姬
# JP: 「たーくさん勉強できたばってん、\n足りんこともその分、見えてきたとよねー」
2423 = "「Hachiroku.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ。\n日々姫――少し、背中をいいか？」
2204 = "Railord tự xưng là Mikuro,\ntừ từ nghiêng cái đầu nhỏ nhắn của mình."
# 【日々姫】
# display as 日日姬
# JP: 「いくらでもよかとよー、\n私のぜんぶ、まるごとにぃにのものやけん」
2418 = "Và rồi, \"A\",\ncái miệng nhỏ nhắn há ra vì ngạc nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「光栄だ」
2391 = "「Xin hỏi... Hachiroku mà hai người nhắc đến,\ncó phải là chị Hachiroku, chiếc xe số 1 của loại [8620, 4]8620 không ạ?」"
# monologue
# JP: 抱きしめたくなる気持ちを堪え、背中に指を走らせる。
2740 = "「Quả nhiên là vậy! Giống hệt nhau luôn mà! Nhỉ! Anh hai!」"
# 【日々姫】
# display as 日日姬
# JP: 「ん――」
1979 = "「Ừ, nghe em nói mới để ý——\nRa vậy, các nét trên khuôn mặt rất giống Hachiroku.」"
# monologue
# JP: 整頓するには、書くのが一番。\n昨日の流れが、日々姫の背中をメモ帳にする。
2840 = "Mặc dù khí chất bên ngoài khá khác biệt,\nnhưng khi để ý kỹ, thì chỉ có \"khí chất bên ngoài\" là khác thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……食堂車特有の注意点は学べた。\n……観光地の理想形のひとつも示してもらえた」
1439 = "Ngay cả sự quý phái toát ra từ dáng vẻ nghiêng đầu,\nchắc chắn cũng là được thừa hưởng từ Hachiroku."
# 【日々姫】
# display as 日日姬
# JP: 「文庫森の\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;のことも聞けたし……\n長期的なビジョンも、共有できたとよね！」
2177 = "「Hai người,\nbiết chị Hachiroku sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。湯富院市長の視野には驚かされた。\n『ライバルはロムドムでありパル＝イス』か」
2301 = "「Tôi là chủ sở hữu, Master của Hachiroku,\nvà là người lái tàu.」"
# monologue
# JP: エアクラ技術の発展は、世界を確実に狭くした。
2914 = "「Còn em là phụ lái tàu.\nHôm nay bọn em đến từ thành phố Ohimitera để thị sát đó.」"
# monologue
# JP: 九州内、国内という枠を超え、海外の著名観光地。\nそこと並ぶような存在に発展せねば生き残れなくなる。
2958 = "「Thành phố Ohimitera——Đường sắt Ohimitera!\nPhụ lái tàu của chị Hachiroku, chiếc xe số 1!」"
# 【日々姫】
# display as 日日姬
# JP: 「――世界の名所と比較される観光地になれるよう、\n“九洲”そのものをまるごとブランディングしていく」
2273 = "「Hửm?」"
# monologue
# JP: “九洲”を選ばせてしまえるのなら、\n狭くなった世界は有利に働く。
2629 = "Bỏ mặc tôi, chủ sở hữu, Master kiêm người lái tàu,\nánh mắt của Mikuro hoàn toàn chỉ hướng về phía Hibiki."
# monologue
# JP: 九洲周遊を目一杯楽しんでもらえるように仕掛ければ、\n複数の観光地が、同時に勝ち組となれるのだから。
2628 = "「Nếu vậy chẳng lẽ, chị là——Phụ lái tàu Migita Hibiki\n——đúng không ạ. Vì đây không phải là giọng của Phụ lái tàu Minokasa Nagi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「各所をつなぎ、あるいは巡る観光列車群を走らせる。\n九洲全土を面として、鉄道観光で輝かせていく」
2088 = "「Ừm. Đúng rồi. Chị là Hibiki.\nNhưng mà, \"giọng\" là sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「食堂列車だけじゃなく、観光列車をたくさんたくさん。\nさすがにぃにって、私、思った」
1812 = "「Tuyệt quá! Không ngờ lại được gặp chị ở một nơi như thế này.\nDạ, đài phát thanh Maitetsu, Mikuro lúc nào cũng nghe hết đó ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――僕の案というより、日々姫の目と、\n湯富院市長の経験とが噛み合って浮かんだものだろう」
1831 = "「À.」"
# 【日々姫】
# display as 日日姬
# JP: 「噛み合わせて、形にしてくれたのにぃにやけん。\nやっぱり、にぃにはすごかー！　って」
2180 = "\"Đài phát thanh Maitetsu Đường sắt Ohimitera\" do Paulette bắt đầu phát sóng\nnhằm mục đích quảng bá và thông báo cho Đường sắt Ohimitera."
# 【双鉄】
# display as 雙鐵
# JP: 「～～っ」
2433 = "Vì Hibiki cũng thỉnh thoảng đảm nhận vai trò người dẫn chương trình,\nnên Mikuro mới biết đến em ấy sao."
# monologue
# JP: その言葉が心の底から溢れ出してるものなのだと、\n日々姫に触れる指先から伝わる熱が教えてくれる。
2837 = "「Oa! Chị vui lắm khi biết em có nghe đài đó!\nVậy là, bé Mikuro cũng sống ở quanh khu vực Kumamoto sao?」"
# monologue
# JP: 照れくさく、嬉しく、もどかしい。\n今すぐにでも、日々姫を強く抱きしめたい。
2698 = "「Không ạ, Mikuro ở Omuta.\nTừ lúc nghỉ hưu đến giờ, em làm việc ở sở thú Omuta ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ばってん、そん湯富院にも――\nやっぱり、過去の影はあったと」
1817 = "「Omuta thì thuộc tỉnh Fukuoka nhỉ.\nSóng của đài phát thanh nhỏ mà cũng truyền đi xa thật đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。そこを放置して鉄道によるブランディングは……\nどうも、曇りというか、傷というかを残す気がする」
2205 = "「A, Mikuro nghe trên internet ạ.\nTừ trang web của Đường sắt Ohimitera.」"
# 【日々姫】
# display as 日日姬
# JP: 「よね。やけん――その意味でも、あのこ、\nD51 1031。私、なんとかしてあげたい」
2202 = "「Ra vậy~, thế thì, em cũng biết giọng của Hachiroku nhỉ.\nA! Hay là, hồi còn đương chức hai người từng chạy cùng nhau?」"
# 【双鉄】
# display as 雙鐵
# JP: 「逆からみれば、D51 1031を“なんとか”すること。\nその試み自体を」
1908 = "「Tiếc là, đừng nói đến chuyện chạy cùng nhau,\nem còn chưa từng được gặp mặt chị ấy nữa cơ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　こん計画の、なんか、シンボルマークみたいに」
1964 = "Mặc dù nói là tiếc,\nnhưng Mikuro lại đang mỉm cười vô cùng hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「と、運べるかもしれん。そうできたなら流れはきっと、\n[おおむた,2]雄武田――みくろの38696へも波及しよう」
2220 = "「Nhưng mà, dù là trên đài phát thanh hay trong 『Bản tin buồng lái』,\nnhững hoạt động của chị ấy, em đều theo dõi rất sát sao ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　そいば、とってもよか考えって思う。\nみくろちゃん自身も、絵になるこやけん」
1996 = "A——một nụ cười ấm áp làm sao."
# 【双鉄】
# display as 雙鐵
# JP: 「その辺も、一度相談してみてもいいかもしれんな。\nが――」
2148 = "Cảm nhận được Hachiroku được yêu mến đến nhường nào,\nngay cả tôi cũng cảm thấy tự hào và hạnh phúc lây."
# monologue
# JP: まずは一点、最初の筆が決まらぬことには、\nどんな構想も完成しない。
3014 = "「Mỗi khi tiếp xúc với những tin tức như vậy, Mikuro cũng cảm thấy như,\nmình đang được cùng chị ấy chạy trong tâm trí, vui lắm ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その未来図を描き出すためにも、\nまずは、リゾート食堂列車のデザインだ」
2274 = "「Chạy trong tâm trí, sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー……よねぇ。\nうーん――そこに戻っちゃう……と――」
1985 = "Nghe em ấy nói vậy,\ntôi mới lờ mờ hiểu ra vấn đề."
# monologue
# JP: ちゃぷん、水音。\n日々姫は湯を手ですくい、自分の顔を軽く洗う。
2654 = "「Lúc nãy, em đã——」"
# 【日々姫】
# display as 日日姬
# JP: 「やっぱり、18メートル級気動車二両じゃキツかと。\n20メートル級の鋼製客車の食堂車と電源車ば欲しか」
2149 = "「Cứ gọi em là Mikuro đi ạ. Nếu anh là Master của chị Hachiroku,\nthì đối với Mikuro, anh cũng là một người quan trọng và đáng kính trọng ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、機関車は使えん――ああ、ならば、\n気動車二両で客車と電源車を挟みこむ――とか？」
1847 = "「Vậy thì, tôi sẽ làm thế. Lúc nãy Mikuro,\nđã nói là 『Đứa bé này cũng có thể chạy lại được』 mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「そいば出来ると！？」
2387 = "「A! Vâng, đúng vậy ạ. Đứa bé này cũng vậy, chắc chắn sẽ thêm một lần nữa.\nCó thể chạy trong tâm trí, trong những ký ức.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さて、どうか。今ふっと思い浮かんだだけで、\n細かいところは、専門家に検討を頼まねばだろうが――」
2134 = "「Trong tâm trí, trong những ký ức.」"
# monologue
# JP: しかし、それでも想像はできる。\nここに来るまでの道中で、しっかり視察をしてきたゆえに。
2577 = "Về mặt hình ảnh, không phải là tôi không hiểu em ấy muốn nói gì."
# 【双鉄】
# display as 雙鐵
# JP: 「平坦な[ゆのい,1]湯医線だけを走るなら可能だろう。\nが、[くるだい,1]来大鉄道の――[ひた,1]肥田から先は、無理かと感じる」
2058 = "Nhưng chính vì thế...\ntôi càng cảm thấy tình trạng hiện tại thật khắc nghiệt."
# 【日々姫】
# display as 日日姬
# JP: 「ああ、勾配ば超えられんとかー。\nううう……けど、やっぱりどうしてもスペースが～」
2007 = "「Nếu là một chuyến tàu chạy trong ký ức, thì chắc chắn nó sẽ rất tỏa sáng.\nChính vì thế, ngược lại——」"
# monologue
# JP: 日々姫のセンスと発想力に、ここまで知識を補強して。\nそれで解決できぬことなら――
2694 = "「Đúng vậy ạ! Nếu tơi tả đến mức này,\nthì mọi người sẽ không muốn nhìn nó nữa đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確定してしまおう。18メートル級改造気動車では、\n今の僕らの、理想の食堂車を作るスペースは足りない」
1805 = "「——Chắc là vậy rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「って！？　それじゃ作れんようになっちゃう」
1978 = "Một sự tồn tại từng được yêu mến, nay đã sụp đổ một cách thảm hại."
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、作る。\nそのために、今度は逆から考えてみよう」
1832 = "Nếu trân trọng những ký ức,\nthì có lẽ người ta sẽ ngoảnh mặt đi trước tình trạng hiện tại như vậy."
# 【日々姫】
# display as 日日姬
# JP: 「逆から？」
2383 = "「Dù biết vậy——dù biết vậy mà vẫn」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、食堂車のデザインからではなく、機能面から\n――つまり、狭いキッチンの使い方から学ぶのだ」
2000 = "Tại sao, Mikuro lại có thể mỉm cười như vậy.\nSự ngạc nhiên, cuối cùng cũng dẫn đến nhận thức, và sự thấu hiểu."
# 【日々姫】
# display as 日日姬
# JP: 「学ぶ……って、なにを？」
1903 = "Trong tay Mikuro là một cây chổi nhỏ.\nNếu vậy, Mikuro đã——chỉ có một mình——"
# 【双鉄】
# display as 雙鐵
# JP: 「“新しい、僕らの理想の食堂車の姿”をだ。\n今の僕らの理想は、在りし日の姿の伝聞でしかないが」
1905 = "「Nói ngược lại, nếu dọn dẹp sạch sẽ thì mọi người sẽ lại đến xem.\nNếu làm vậy, chắc chắn đứa bé này cũng có thể sống sót.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああああ！」
1962 = "「——Sống sót?」"
# monologue
# JP: （ばちゃんっ！）
3024 = "Giọng nói cứng đắn bất ngờ của Hibiki, người nãy giờ vẫn im lặng lắng nghe.\nTuy nhiên, Mikuro vẫn mỉm cười đáp lại như không có chuyện gì xảy ra."
# 【双鉄】
# display as 雙鐵
# JP: 「うおっぷ！」
1956 = "「Có tin đồn về việc tháo dỡ ạ. Đứa bé này.\nHơn nữa, còn ở mức độ là ngân sách tháo dỡ sắp được đệ trình rồi.」"
# monologue
# JP: 派手な飛沫を起こしつつ、\n日々姫が僕へと近寄ってくる。
2707 = "「Hả.」"
# 【日々姫】
# display as 日日姬
# JP: 「ガマダスカフェ！」
2432 = "「Chiếc 38696 của Mikuro cũng... là một cỗ máy bảo tồn khá tơi tả ạ.\nPhụ tùng các thứ, bị thiếu hụt nhiều lắm rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうだな、それだ！\nまさにガマダスカフェのキッチンだ！」
2069 = "Bản thân Mikuro,\ncó lẽ cũng có những tổn thương nghiêm trọng hơn những gì nhìn thấy bên ngoài."
# monologue
# JP: ガマダスの当初構想――日々姫の初期デザイン案では、\nガマダス全部が子供の遊び場として作られていた。
2668 = "Dù cầm chổi bằng cả hai tay, nhưng bàn tay trái vẫn mở ra và chỉ đặt hờ lên\n——bởi vì em ấy không hề nắm lấy cán chổi."
# monologue
# JP: その案に、母親である市職員たちからの要望が届いた。\n「母親が休めるスペースを絶対に作って下さい」と。
2946 = "「Em nói là đang làm việc ở sở thú Omuta——đúng không.\nVậy thì, chiếc 38696 cũng được bảo tồn ở đó sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「後付けで急遽キッチンば組みこむことになったけん、\n専門業者さんに、そこだけ丸投げになっちゃって」
2192 = "「Vâng, đúng vậy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「結果、非常に狭く使い辛そうなキッチンが出来た。\nが、こうなってみると……それも天の配剤かもしれん」
2226 = "Những thắc mắc từ cái nhìn đầu tiên,\ntôi quyết định nói ra vào lúc này."
# 【日々姫】
# display as 日日姬
# JP: 「うん――うん！　あそこば、狭くても\nきっちり美味しい料理作って出してくれるもんね！」
1984 = "「Nói đến sở thú, thì đó là cơ sở có thu phí vào cửa đúng không?\nĐược bảo tồn ở trong đó, tại sao lại trở nên tơi tả như vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのノウハウを学べばあるいは、食堂列車に\nフィードバックできる何かがあるかもしれん」
1912 = "「Đã từng bóng loáng lắm đó ạ! Cả 38696 và Mikuro. Luôn luôn.\nNhưng mà——ưm——」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！！」
# 1998 = "「嗯！！」" 
# monologue
# JP: （ざばあっ！）
# 3024 = "（嘩啦！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1933 = "Lần đầu tiên, nụ cười của Mikuro biến mất."
# monologue
# JP: 日々姫が僕に抱きついてくる。
2814 = "Không hẳn là u ám,\nmà chỉ đơn thuần là có vẻ bối rối."
# monologue
# JP: くっつく胸が、鼓動の速度が教えてくれる。\n日々姫は邪気なく――素直に喜び、抱きついてきた。
2819 = "「...Lấy phụ tùng. Ở những cỗ máy đang hoạt động——ưm, có sự thiếu hụt phụ tùng,\nnếu cứ để vậy, sẽ có những đứa trẻ không thể chạy được nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「ありがと！　にぃに！！\n行き詰まってたの、スっとした！！」
2351 = "「——Lấy phụ tùng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
2013 = "Đó cũng là việc mà chúng tôi đã bắt đầu làm thường xuyên.\nNhưng khi nghe từ miệng \"người bị lấy mất phụ tùng\"——"
# 【日々姫】
# display as 日日姬
# JP: 「店長の山崎さんば、稀咲先輩の紹介やけん。\n見学も気楽だし、実際、手伝いとかもできるかもだし」
2085 = "「Vì vậy, Mikuro, muốn chúng chạy tiếp.\nVì 38696 đã nghỉ hưu do hỏng nồi hơi rồi, nên hãy chạy thay cho cả phần của Mikuro nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、手伝いか。時間に余裕があるときならば、\nいいかもしれんな。実際に、日々姫と僕とでお店――」
2079 = "「...」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1963 = "「啊！」" 
# monologue
# JP: ゼロ距離から日々姫が僕を見上げてくる。\n視線が、呼吸が一致する。
2813 = "Nghỉ hưu do hỏng nồi hơi... một câu nói thật xót xa.\nBởi vì sự xuống cấp, lão hóa của nồi hơi chính là vết thương chí mạng của đầu máy hơi nước."
# monologue
# JP: 日々姫の鼓動が急に早まる。\n思い出してる――僕も日々姫も。
2821 = "Cách duy nhất để đối phó với tình trạng có thể dẫn đến nổ nồi hơi đó,\nlà chế tạo một chiếc nồi hơi mới, và điều đó thì không tương xứng với chi phí bỏ ra."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに。手、見せて？」
2412 = "「...Nên em đã nhường những phụ tùng khác,\ncho những đứa trẻ có nồi hơi khỏe mạnh sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2054 = "「Vâng! Việc chăm sóc động vật hay dọn dẹp công viên,\ndù cánh tay máy có hơi trục trặc một chút thì vẫn có thể hoàn thành được ạ.」"
# monologue
# JP: 右手を差し出す。\n日々姫がそれを受取り広げる。
2737 = "「!——」"
# monologue
# JP: 親指の付け根に走る傷。\n日々姫の指が、何度も何度も撫でさする。
2684 = "Cỗ máy đang hoạt động——là cả Railord và \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; sao.\nMikuro đã, lấy phụ tùng của chính mình, cánh tay máy..."
# 【日々姫】
# display as 日日姬
# JP: 「残っちゃったんだ。傷」
2284 = "Tráo đổi với những bộ phận bị hỏng của cỗ máy đang hoạt động, với sự chuẩn bị tâm lý\n——thực chất, là hiến tặng sao."
# 【双鉄】
# display as 雙鐵
# JP: 「傷ではないさ、勲章だ。\nこころの底から、そう思っている。今も、昔も」
2385 = "Thấy tôi nín thở, vẻ mặt Mikuro càng thêm bối rối.\nVì vậy, tôi đã nhận ra."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに」
2414 = "Ra vậy, Mikuro không muốn đề cập đến chuyện đó——\nNên em ấy mới cố gắng lựa chọn những \"từ ngữ dễ gây hiểu lầm\" sao."
# monologue
# JP: 日々姫の指が、手から離れる。\n僕の体に残る傷。無数の傷。事故の痕を撫でていく。
2824 = "「Nếu vậy, chẳng phải nên ưu tiên cho chiếc 38696 \"khá tơi tả\" kia,\nđể nó có thể \"chạy trong ký ức\" sao?」"
# monologue
# JP: 誰一人、なにひとつさえ守れなかった小さな僕を、\nその弱さごと――全て包もうとするかのように。
2702 = "Khi tôi nhận ra điều đó và chuyển hướng câu chuyện,\nvẻ mặt Mikuro nhanh chóng từ bối rối trở lại nụ cười."
# 【日々姫】
# display as 日日姬
# JP: 「わたしもね？　きっと、あのとき――\n傷ば、こころに残したと」
2132 = "「Có thứ tự cả ạ. Mikuro, đã suy nghĩ rồi.\nDù có cố gắng thế nào ở sở thú, thì cũng không ai đến xem 38696 đâu ạ.」"
