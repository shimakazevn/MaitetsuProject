# lines: 457 
# monologue
# JP: （カポっ――カポっ――）
3026 = "（Lộc cộc——Lộc cộc——）"

# 【日々姫】
# display as 日日姬
# JP: 「わわっ！？　歩きよったと！？」
1925 = "「Oa oa!? Đi bộ kìa!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは歩くだろう。馬なのだし」
2287 = "「Thì nó phải đi bộ chứ. Là ngựa mà.」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「はは」
1934 = "「Haha」"

# 【日々姫】
# display as 日日姬
# JP: 「あっ」
1959 = "「A」"

# monologue
# JP: 湯富院市長の笑い声に、\n日々姫は表情を引き締めなおす。
2947 = "Nghe tiếng cười của Thị trưởng Yufuin,\nHibiki vội vàng chỉnh lại biểu cảm."

# 【日々姫】
# display as 日日姬
# JP: 「失礼しました。\nその――少しびっくりしてしまって」
2116 = "「Cháu xin lỗi.\nChỉ là——cháu hơi ngạc nhiên một chút thôi\nạ.」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「いやいやいや、どうぞ気楽に。そうして欲しくて、\nこの観光馬車にご招待させてもらったんですから」
1810 = "「Không không không, cứ tự nhiên đi cháu.\nTa mời hai cháu lên cỗ xe ngựa du lịch này\ncũng là vì muốn hai cháu được thoải mái\nmà.」"

# 【日々姫】
# display as 日日姬
# JP: 「観光馬車……いいですね、これ。\n私、初めて乗りましたけど――」
2340 = "「Xe ngựa du lịch... tuyệt thật đấy.\nĐây là lần đầu tiên cháu được ngồi——」"

# monologue
# JP: （カポッ！　カポッ！　カポッ！　カポッ！）
3027 = "（Lộc cộc! Lộc cộc! Lộc cộc! Lộc cộc!）"

# 【日々姫】
# display as 日日姬
# JP: 「わあああ！？　走った！？\nにぃに！　走った！　走ったとー！！」
1927 = "「Oa oa oa oa!? Chạy rồi kìa!?\nAnh hai! Chạy rồi! Chạy rồi kìa!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは走るだろう、馬なのだから。\nというか日々っ――いえ、失礼しました。右田市長」
2288 = "「Thì nó phải chạy chứ, là ngựa mà.\nAnh nói này Hibi——à không, thất lễ rồi.\nThưa Thị trưởng Migita.」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「あああ、秘書さん――じゃないな。\nお兄さんもどうぞ、お気軽に」
1943 = "「Aaa, thư ký——không phải nhỉ.\nCậu anh trai cũng cứ tự nhiên đi nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お気遣いをありがとうございます。ですが――」
2352 = "「Cảm ơn ngài đã quan tâm. Nhưng mà——」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「堅苦しいのは庁舎内だけで十分ですよ。\nこの馬車の中では、地元のおじさんと観光のご兄妹で」
1884 = "「Cứng nhắc thì chỉ cần ở trong tòa thị\nchính là đủ rồi.\nTrong cỗ xe ngựa này, chúng ta chỉ là một\nông chú địa phương và hai anh em đi du\nlịch thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「ならっ！　お言葉に甘えます！」
2404 = "「Nếu vậy! Cháu xin phép không khách sáo\nnữa ạ!」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「おお」
2022 = "「Ồ」"

# monologue
# JP: いうやいなやで日々姫が出したスケッチブックに、\n湯富院市長が軽い驚きの声を出す。
2902 = "Vừa nói xong, Hibiki đã lấy cuốn sổ phác\nthảo ra,\nkhiến Thị trưởng Yufuin khẽ thốt lên kinh\nngạc."

# monologue
# JP: 普段どおりが許されるなら、日々姫は描く。\n初めて間近に接する馬で、馬車なのだから。
2692 = "Nếu được phép cư xử như bình thường,\nHibiki sẽ vẽ.\nBởi vì đây là lần đầu tiên em ấy được tiếp\nxúc gần gũi với ngựa và xe ngựa đến vậy."

# 【湯富院市長】
# display as 湯布院市長
# JP: 「……いやいやいや、さすがはデザイナーさんだ」
1433 = "「...Ây da, quả không hổ danh là nhà thiết\nkế.」"

# 【双鉄】
# display as 雙鐵
# JP: 「恐れ入ります。\nめいっぱいに楽しませていただいているおかげです」
2124 = "「Ngài quá khen rồi ạ.\nNhờ ngài mà em ấy mới được tận hưởng hết\nmình như vậy đấy ạ.」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「みたいだねぇ。本当に楽しそうで何よりだ」
2053 = "「Có vẻ là vậy nhỉ. Cháu nó vui vẻ như vậy\nlà tốt nhất rồi.」"

# monologue
# JP: 湯富院市長は、言いながらネクタイを緩めてみせる。\n僕も、同じく。
2890 = "Vừa nói, Thị trưởng Yufuin vừa nới lỏng cà\nvạt.\nTôi cũng làm theo y như vậy."

# monologue
# JP: ビールがあれば乾杯したい、\nそんな空気が一瞬、流れる。
2723 = "Một khoảnh khắc, dường như có một bầu\nkhông khí\nkhiến người ta muốn nâng ly cạn chén nếu\ncó bia ở đây."

# 【湯富院市長】
# display as 湯布院市長
# JP: 「御一夜の皆さんが客車[しんぞう,1]新造を事業化してくれたこと。\n一個人としても市長としても、感謝してましてね」
2279 = "「Việc mọi người ở Ohimitera biến việc đóng\nmới \\x%l客車;#00ffc040;toa hành khách%l;#; thành một dự án kinh\ndoanh.\nDù là tư cách cá nhân hay Thị trưởng, tôi\nđều rất biết ơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「光栄です」
2390 = "「Đó là vinh hạnh của chúng cháu ạ.」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「あれがなければ復線も無く、[ゆふいん,2]湯富院も[ぶんごもり,2]文庫森も、\nここまでの活性化を見ることは出来なかった」
2258 = "「Nếu không có việc đó thì cũng chẳng có\nchuyện khôi phục tuyến đường, và cả Yufuin\nlẫn Bungomori,\ncũng không thể chứng kiến sự hồi sinh mạnh\nmẽ như hiện tại.」"

# monologue
# JP: とても意外な一言だ。\n文庫森はともかくとして――
2988 = "Một câu nói vô cùng bất ngờ.\nChưa bàn đến Bungomori——"

# 【双鉄】
# display as 雙鐵
# JP: 「復線が成るよりも遥かに前から、湯富院は……\n観光で大成功し続けていらっしゃるものかと」
2151 = "「Cháu tưởng Yufuin... đã gặt hái được\nnhững thành công vang dội trong ngành du\nlịch\ntừ rất lâu trước khi khôi phục tuyến đường\nrồi chứ ạ.」"

# monologue
# JP: 繁華の別符、静謐の湯富院。\nガラリと違った趣を持つ、大板の二大温泉地。
2921 = "Beppu phồn hoa, Yufuin tĩnh lặng.\nHai khu suối nước nóng lớn của Oita mang\nnhững sắc thái hoàn toàn khác biệt."

# monologue
# JP: 並び立ちながら競い合う両温泉地に、実際のところ、\n御一夜は潜在的な顧客を奪われ続けていた感さえある。
2607 = "Thực tế, Ohimitera thậm chí còn có cảm\ngiác như đang liên tục bị cướp mất khách\nhàng tiềm năng\nbởi hai khu suối nước nóng đang cạnh tranh\ngay gắt này."

# 【双鉄】
# display as 雙鐵
# JP: 「エアクラ全盛となったことも、\nむしろ湯富院には幸いしたのかと思っていました」
2038 = "「Cháu cứ nghĩ sự bùng nổ của \\x%lエアクラ;#00ffc040;Aircra%l;#;\nngược lại còn là một điều may mắn đối với\nYufuin cơ.」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「交通はあまり関係せんのですよ。湯富院はね、\n例え歩いてでも来てくださるお客様に支えられている」
1881 = "「Giao thông không liên quan lắm đâu.\nYufuin ấy mà,\nđược chống đỡ bởi những vị khách sẵn sàng\nđi bộ đến đây cơ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1963 = "「!」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「何世代もかけ、湯富院はそう育ててもらった。\n今風にいうと――ブランディング、になるかな」
2271 = "「Phải mất nhiều thế hệ, Yufuin mới được\nnuôi dưỡng thành như vậy.\nNói theo ngôn ngữ hiện đại thì——chắc là\nxây dựng thương hiệu (branding) nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「そこ……そこば聞きたい」
2130 = "「Chỗ đó... cháu muốn nghe về chỗ đó.」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「！！？」
2019 = "「!!?」"

# monologue
# JP: いきなりの日々姫の声は、慣れぬ市長を驚かせる。
2827 = "Giọng nói đột ngột của Hibiki khiến vị Thị\ntrưởng chưa quen với em ấy phải giật mình."

# monologue
# JP: 日々姫の手は少しも休まず。瞳さえ、\nスケッチブックと馬車とを行き来し続けるままだ。
2832 = "Tay Hibiki không hề dừng lại một chút nào.\nThậm chí ánh mắt,\nvẫn cứ di chuyển liên tục giữa cuốn sổ\nphác thảo và cỗ xe ngựa."

# 【日々姫】
# display as 日日姬
# JP: 「そこ……ブランディング。どうして成功したのか。\nだって、湯富院――合併とか……危機、たくさん――」
2121 = "「Chỗ đó... xây dựng thương hiệu. Tại sao\nlại thành công ạ.\nBởi vì, Yufuin——sáp nhập này nọ... có rất\nnhiều khủng hoảng——」"

# 【双鉄】
# display as 雙鐵
# JP: 「すみません。描いているときは夢中になって。\nこういう、上の空の受け答えを」
1814 = "「Cháu xin lỗi. Khi vẽ là em ấy hay bị cuốn\nvào như vậy.\nNên mới có kiểu hỏi đáp lơ đãng thế này\nạ.」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「いやいや、へぇえ。集中力と好奇心の両立、かな？\nいや面白い――実際いるんだねぇ、こういうひと」
2256 = "「Không không, ồ. Vừa tập trung vừa tò mò\nsao?\nThú vị thật đấy——trên đời này thực sự có\nngười như vậy nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いますね、ここに」
2302 = "「Có đấy ạ, ngay tại đây.」"

# monologue
# JP: 『こういうひと』とは愉快ではない言われ方だが、\n日々姫のしていることも実際、相当なレベルの失礼だ。
1396 = "「Có đấy ạ, ngay tại đây.」"

# monologue
# JP: 湯富院市長のおおらかさを、\nここはまるごと、感謝して受け入れるのが妥当だろう。
2598 = "Dù cách gọi \"người như vậy\" không được dễ\nchịu cho lắm,\nnhưng những gì Hibiki đang làm thực sự\ncũng khá là thất lễ."

# 【湯富院市長】
# display as 湯布院市長
# JP: 「質問には、このまま答えても？」
2405 = "「Cứ thế này mà trả lời câu hỏi cũng được\nchứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「届きますね。日々姫が興味を抱く内容ならば」
1915 = "「Vẫn lọt vào tai đấy ạ. Nếu là nội dung mà\nHibiki hứng thú.」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「あはは、怖いなぁ。\nプレゼン力を試されちゃうわけか」
1961 = "「Ahaha, đáng sợ thật đấy.\nVậy là kỹ năng thuyết trình của ta đang bị\nthử thách sao.」"

# monologue
# JP: 口調はあくまで、明るく軽い。
2574 = "Giọng điệu của ông ấy vẫn luôn tươi sáng\nvà nhẹ nhàng."

# 【湯富院市長】
# display as 湯布院市長
# JP: 「湯富院はまぁ、そういう歴史の町だね。\n合併もあり、危機も、名称争いも経験してきた」
1860 = "「Yufuin thì, ừm, là một thị trấn có lịch\nsử như vậy đấy.\nĐã từng trải qua sáp nhập, khủng hoảng, và\ncả tranh chấp tên gọi nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「名称争い？」
2043 = "「Tranh chấp tên gọi ạ?」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「ゆふ、という地名自体がまず何度となく変遷してる。\n[もめん,1]木綿と書きゆふ、柚子が富むゆふ。そして今と」
1872 = "「Bản thân cái tên Yufu đã thay đổi không\nbiết bao nhiêu lần rồi.\nViết là Momen (mộc miên) đọc là Yufu, Yuzu\n(quả thanh yên) phong phú cũng là Yufu. Và\nbây giờ là Yufu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのですか」
2223 = "「Vậy sao ạ.」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「もともとの地名の由来は、あの山――\nゆふ岳からだね。それが、時勢に応じ字を変えた」
1899 = "「Nguồn gốc ban đầu của cái tên đó, là từ\nngọn núi kia——\nTừ núi Yufudake đấy. Sau đó, tùy theo thời\nthế mà thay đổi chữ Hán.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのときどきの特産品……などによってですか？」
2212 = "「Tùy theo đặc sản của từng thời kỳ...\nchẳng hạn vậy sao ạ?」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「まぁ、多分そうかな。で、\x%l正和;#00ffc040;正和%l;#;九年。\n[ゆふいんちょう,3]柚富院町と[ゆのひらむら,4]湯之比良村とが合併した」
2002 = "「Ừm, chắc là vậy. Và rồi, vào năm \\x%l正和;#00ffc040;Showa%l;#;\nthứ 9.\nThị trấn Yufuin và làng Yunohira đã sáp\nnhập với nhau.」"

# 【双鉄】
# display as 雙鐵
# JP: 「何故、合併をされたのですか？」
2277 = "「Tại sao lại sáp nhập ạ?」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「お金が全くなくなったから」
2029 = "「Bởi vì hoàn toàn cạn kiệt tiền bạc rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ええ！？」
1944 = "「Cạn kiệt... tiền bạc sao?」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「そういう時期があったの。\n敗戦の影響が大きくてね」
2031 = "「Vào năm \\x%l正和;#00ffc040;Showa%l;#; thứ 5, công trình xây dựng\nĐường sắt Kyudai đang được tiến hành đã bị\ndừng lại.\nBởi vì ngân sách quốc gia bị thâm hụt\nnghiêm trọng.」"

# monologue
# JP: 敗戦――先の\x%l大戦;#00ffc040;大戦%l;#;の敗戦ならば、\nそれは\x%l大詔;#00ffc040;大詔%l;#;三十五年。即ち\x%l正和;#00ffc040;正和%l;#;の元年だ。
2749 = "Đường sắt Kyudai. Tuyến đường sắt kết nối\nOita và Kurume.\nLà tuyến đường sắt chạy qua Yufuin."

# 【湯富院市長】
# display as 湯布院市長
# JP: 「敗戦直後の湯富院には、\n[めいぐん,1]冥軍の基地と保養施設とが置かれちゃってね」
2158 = "「Thế là, mọi người đã quyết định tự mình\nquyên góp tiền để mua đất và tặng lại.\nNếu làm vậy, công trình sẽ được khởi động\nlại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2217 = "「Việc đó... tốn rất nhiều tiền đúng không\nạ?」"

# 【湯富院市長】
# display as 湯布院市長
# JP: 「敗戦国に置かれる、戦勝国の保養施設だからねぇ。\n治安なんて気にしてもらえない。観光はズタズタだ」
2285 = "「Gấp đôi ngân sách của thị trấn lúc bấy\ngiờ đấy.\nTất nhiên, thị trấn cũng rơi vào tình\ntrạng cạn kiệt ngân sách ngay lập tức.」"

# 【日々姫】
# display as 日日姬
# JP: 「イメージば強いぶん……壊れちゃったら――\nん――ちょっとや、そっとじゃ――」
