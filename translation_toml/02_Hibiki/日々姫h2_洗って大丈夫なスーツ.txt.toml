1175 = "「Anh cũng sẽ cố gắng tiết kiệm. Và rồi,\nchúng ta hãy cùng nhau xây dựng nhé. Ngôi\nnhà của chúng ta. Gia đình của chúng ta.」"

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　にぃにっ」
1157 = "「Vâng! Anh hai.」"

# monologue
