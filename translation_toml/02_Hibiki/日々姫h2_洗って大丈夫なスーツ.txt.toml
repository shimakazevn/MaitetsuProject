# monologue
# JP: じたばた、日々姫が急にもがくが放さない。
1569 = "Hibiki bỗng vùng vẫy quẫy đạp, nhưng tôi\nkhông buông ra."

# monologue
# JP: と、いうか――\n自分の部屋のことだというのに……
1334 = "Mà, nói sao nhỉ——rõ ràng là chuyện trong\nphòng của chính mình mà..."

# 【双鉄H】
# display as 雙鐵
# JP: （姿見さえ目に入らぬほどに、日々姫は僕を――\n僕だけを見つめ続けてくれていたのか）
1804 = "（Đến mức chẳng thèm để ý đến cái gương\nlớn, Hibiki đã——chỉ luôn nhìn đăm đắm vào\nmỗi mình tôi thôi sao.）"

# monologue
# JP: 可愛い。嬉しい。愛おしい。\n大事にしたくて、おもいっきりに甘やかしたくて。
1414 = "Thật đáng yêu. Thật vui sướng. Thật đáng\nthương. Muốn trân trọng em ấy, muốn cưng\nchiều em ấy hết mực."

# monologue
# JP: なのに言葉と体とは、日々姫の恥ずかしがってる姿を、\nもっともっとと求めてしまう。
1343 = "Vậy mà lời nói và cơ thể, lại cứ muốn đòi\nhỏi nhiều hơn, nhiều hơn nữa vẻ mặt xấu hổ\ncủa Hibiki."

# 【双鉄H】
# display as 雙鐵
# JP: 「見えているなら、わかるよな？\n僕たちが今、どんな状態になっているのか」
1042 = "「Nếu nhìn thấy rồi, thì em hiểu đúng\nkhông? Chúng ta bây giờ, đang ở trong tình\ntrạng như thế nào.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、と――わたし……がっ」
1260 = "「Anh hai, và——em...」"

# monologue
# JP: ごくりと、日々姫の喉が動く。
1561 = "Ưực, cổ họng Hibiki khẽ nuốt nước bọt."

# 【日々姫】
# display as 日日姬
# JP: 「あ……え……ンッ――っと……わたし……おっきく、\nおまた、ひらいて――それで、付け根、が」
1102 = "「A... ơ... Ưm——thì... em... đang dang,\nrộng chân——rồi, ở gốc đùi, nó.」"

# monologue
# JP: 自分の言葉に興奮したのか。
1559 = "Có phải vì hưng phấn với chính lời nói của\nmình không."

# monologue
# JP: 日々姫の言った“付け根”から、\n蜜がこぽりと溢れて腿を伝ってく。
1418 = "Từ \"gốc đùi\" mà Hibiki vừa nói, mật dịch\ntrào ra và chảy dọc xuống đùi."

# 【日々姫】
# display as 日日姬
# JP: 「や……ぁ……わたしっ――あ……私、の、おま、ん、こ――よだれ、垂らして――ひくひく、して――ます」
1060 = "「A... á... em——A... Cô, bé, của, em——đang\nchảy, nước dãi——và giật, giật——ạ.」"

# monologue
# JP: 標準語に戻ってしまうほど、\n日々姫は恐らく、恥ずかしがって緊張してる。
1573 = "Đến mức chuyển lại thành giọng phổ thông,\ncó lẽ Hibiki, đang xấu hổ và căng thẳng\nlắm."

# monologue
# JP: そうであるのに、その目が逸らされることはなく、\n瞼が落ちることもない。
1639 = "Dù vậy, ánh mắt ấy vẫn không hề lảng\ntránh, mí mắt cũng không hề cụp xuống."

# 【双鉄H】
# display as 雙鐵
# JP: 「僕はどうだ？」
1182 = "「Còn anh thì sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「兄さん……は、ちょっと、意地悪な顔、して、て――\nすごく、冷静に……見えます…………けど」
1090 = "「Anh trai... thì, đang làm vẻ mặt, hơi xấu\ntính, một chút——trông, có vẻ... rất bình\ntĩnh......... nhưng mà.」"

# monologue
# JP: （ぐりゅっ！）
# 1782 = "（扭動）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1282 = "「！」" 

# monologue
# JP: 尻が動けば、抑えられてる勃起も甘くこすられる。
1413 = "Mông vừa cựa quậy, phần cương cứng đang bị\nkìm nén cũng được cọ xát một cách ngọt\nngào."

# monologue
# JP: 勝手に悶えビクつく動きに、\n日々姫は嬉しげな顔をする。
1577 = "Cảm nhận được sự quằn quại và giật giật\nkhông tự chủ ấy, khuôn mặt Hibiki lộ vẻ\nvui sướng."

# 【日々姫】
# display as 日日姬
# JP: 「おちんちん、は――私の、おしりに――\nぎゅって――されて……ビクビクってして……苦しそう」
1272 = "「Cậu nhỏ, thì——bị mông, của em——kẹp\nchặt——...đang giật giật... trông có vẻ khổ\nsở.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「苦しくなくしてやるためには、どうすればいい？」
1211 = "「Để làm cho nó bớt khổ sở, thì phải làm\nthế nào?」"

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1114 = "「啊」" 

# monologue
# JP: 日々姫の舌が、\n唇の端をぺろりと舐める。
1592 = "Chiếc lưỡi của Hibiki, khẽ liếm qua khóe\nmôi."

# 【日々姫】
# display as 日日姬
# JP: 「にぃに――兄さんの、おちんちん……私の、おまんこに、入りたくって……それで、ビクビクしてるから」
1261 = "「Anh hai——Cậu nhỏ, của anh trai... đang\nmuốn, đi vào... cô bé, của em... thế nên,\nmới giật giật.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「から？」
1187 = "「Thế nên?」"

# 【日々姫】
# display as 日日姬
# JP: 「おちんちん……おまんこに……入って、もらって――\nそしたらきっと、苦しくなくって……気持ちいい、から」
1273 = "「Cho cậu nhỏ... đi vào... cô bé——như vậy\nchắc chắn, sẽ không còn khổ sở nữa... mà\nsẽ rất sướng, ạ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
1198 = "「Vậy à.」"

# monologue
# JP: （ぶるんっ！）
# 1786 = "（抱起）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃんっ！！」
1069 = "「Hyan!!」"

# monologue
# JP: 腰をずらして、\n反り返りまくる勃起を日々姫のおまんこに食い込ませる。
1457 = "Dịch hông một chút, tôi chèn phần cương\ncứng đang cong vút lên vào cô bé của\nHibiki."

# monologue
# JP: そのままゆっくり動かして、\n日々姫の蜜を、勃起全体にねっとり伸ばし馴染ます。
1637 = "Cứ thế từ từ di chuyển, để mật dịch của\nHibiki thoa đều và thấm đẫm lên toàn bộ\nphần cương cứng."

# 【日々姫】
# display as 日日姬
# JP: 「あ……すごい……兄さんの……おちん、ちん――\nこんな……こんなに……おっきいんだ」
1106 = "「A... Khủng quá... Cậu, nhỏ... của anh\ntrai——Lại... to... đến thế này cơ á.」"

# monologue
# JP: 鏡写しで客観視して、日々姫の言葉の正しさを知る。
1469 = "Nhìn một cách khách quan qua gương, tôi\nmới thấy lời nói của Hibiki là chính xác."

# monologue
# JP: 僕の勃起がそう大きいとも思えんのだが――\n対する日々姫のおまんこが、あまりに可憐で小さすぎる。
1448 = "Tôi không nghĩ phần cương cứng của mình to\nđến vậy——nhưng so với cô bé của Hibiki,\nthì nó lại quá đỗi đáng yêu và nhỏ bé."

# 【日々姫】
# display as 日日姬
# JP: 「私の……おまんこ……がんばってるんだ」
1179 = "「Cô bé... của em... đang cố gắng lắm đấy.」"

# monologue
# JP: （くっ――くんっ）
# 1782 = "（扭動）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1282 = "「！」" 

# monologue
# JP: 僕の勃起の先端を、そこを求めて、\n日々姫が腰を動かし体を甘く震わす。
1580 = "Tìm kiếm phần đỉnh đang cương cứng của\ntôi, Hibiki cựa quậy hông, cơ thể khẽ run\nlên ngọt ngào."

# 【日々姫】
# display as 日日姬
# JP: 「ん……ふっ……ンッ――こんなに……ちっちゃい……\nおまんこで……にぃにの……にぃにの、おちん、ちん」
1133 = "「Ưm... Phù... Ưm——Bằng một cô bé... nhỏ\nxíu... thế này... cậu, nhỏ... của anh\nhai... của anh hai.」"

# monologue
# JP: （すりっ――ちゅるっ――）
1780 = "（Cọ cọ——Trượt——）"

# monologue
# JP: この体勢が、日々姫の意図の邪魔をする。
1648 = "Tư thế này, đang cản trở ý định của\nHibiki."

# monologue
# JP: 膣口までは触れるのだけれど、\nそこで勃起の先端は、つるりと滑って逃げ出してしまう。
1705 = "Dù chạm được đến cửa âm đạo, nhưng phần\nđỉnh đang cương cứng lại trơn tuột và\ntrượt ra ngoài."

# 【日々姫】
# display as 日日姬
# JP: 「やっ――やんっ！　おちんちん――にぃにの、ちんちん、\nおまんこで――ぎゅって――抱きしめたいのにっ」
1055 = "「A——Á! Cậu nhỏ——Cậu nhỏ của anh hai, em\nmuốn dùng cô bé——ôm chặt lấy——cơ mà.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――僕も抱きしめてもらいたい」
1128 = "「Ừ——Anh cũng muốn được em ôm chặt lấy.」"

# monologue
# JP: 涙目になって腰を動かす日々姫は死ぬほど可愛らしいが、\nそれだけにもう、これ以上一秒も我慢できない。
1571 = "Hibiki rơm rớm nước mắt cựa quậy hông\ntrông đáng yêu chết đi được, chính vì thế\nmà tôi, không thể chịu đựng thêm một giây\nnào nữa."

# monologue
# JP: （つ――ぷっ）
1790 = "（Phậ——p）"

# 【日々姫】
# display as 日日姬
# JP: 「ふやんっ！！」
1081 = "「Huyan!!」"

# monologue
# JP: 勃起の先っぽ、くびれのとこまでをねじ込めば、\n日々姫のおまんこはきゅんきゅん僕に張り付いてくる。
1673 = "Vừa ấn phần đỉnh cương cứng vào đến tận\nrãnh khấc, cô bé của Hibiki đã co thắt\nliên hồi bám chặt lấy tôi."

# 【日々姫】
# display as 日日姬
# JP: 「あ――すご……い……おまんこの、とこ……\n入って――伸びて……すごい……キチキチ、に」
1099 = "「A——Khủng... quá... Chỗ, cô bé... Đang đi\nvào——Bị nong ra... Khủng quá... Khít rịt,\nluôn.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「痛くはないか？」
1216 = "「Có đau không em?」"

# 【日々姫】
# display as 日日姬
# JP: 「ん――痛く、なかと、と？　ただ、うずうず――してっ\n――んっ――もっと――ほし、くてっ」
1028 = "「Ưm——Không, đau, đâu? Chỉ là, ngứa\nngáy——quá——Ưm——Em muốn——nữa, cơ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
1249 = "「Vậy à.」"

# monologue
# JP: （ずるっ――ずっ――）
# 1790 = "（插入）" 

# 【日々姫】
# display as 日日姬
# JP: 「んッ――ふあっ――あんっ！」
1123 = "「Ưm——Phù——A!」"

# monologue
# JP: 思いっきりに突きたい気持ちをお腹の底でぐっと抑えて。
1477 = "Kìm nén khao khát muốn đâm mạnh vào từ tận\nđáy lòng."

# monologue
# JP: 勃起の半分――\nそこまでを飲み込ませてまた、動きを止める。
1376 = "Một nửa phần cương cứng——Để em ấy nuốt\ntrọn đến đó, rồi tôi lại dừng chuyển động."

# 【日々姫】
# display as 日日姬
# JP: 「あ……すごい……私、ちゃんと……にぃにの、\nあんなに、おっきいの――」
1107 = "「A... Tuyệt quá... Em, đã thực sự... chứa\nđược thứ to lớn, như thế, của anh hai——」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、受け入れてくれてるな」
1144 = "「Ừ, em đã đón nhận nó rồi đấy.」"

# monologue
# JP: 鏡に映る姿だけにはとどまらず、\n膣の内側は大歓迎をしてくれている。
1646 = "Không chỉ hình ảnh phản chiếu trong gương,\nmà cả bên trong âm đạo cũng đang nồng\nnhiệt chào đón tôi."

# monologue
# JP: 肉ヒダはもう最初から蠢いて、\n奥へ進めと、射精をしろと、熱心に誘ってくれている。
1669 = "Những nếp gấp thịt đã rục rịch ngay từ\nđầu, nhiệt tình mời gọi tôi tiến sâu hơn,\nvà xuất tinh đi."

# 【日々姫】
# display as 日日姬
# JP: 「これ、で……一番……んっ――\n奥まで……入る、と？」
1213 = "「Thế này, là... Ưm——Vào đến... tận cùng,\nchưa ạ?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「さぁ、どうだろう」
1143 = "「Chà, ai biết được.」"

# monologue
# JP: （ずっ――ずるっ――ずぶぶぶぶっ――）
# 1790 = "（插入）" 

# 【日々姫】
# display as 日日姬
# JP: 「はっ！　あっ！　あああああああんっ！！！」
1078 = "「Hơ! A! Aaaaaaaan!!!」"

# monologue
# JP: （こちゅんっ！）
1761 = "（Phập!）"

# 【日々姫】
# display as 日日姬
# JP: 「くひゅんっ！！！」
1070 = "「Kuhyun!!!」"

# monologue
# JP: 最奥にあたった瞬間、\n日々姫は体をのけぞらせ。
1392 = "Khoảnh khắc chạm đến nơi sâu nhất, Hibiki\nngửa ưỡn người ra sau."

# monologue
# JP: そして、汗だくの胸と肩とで大きく呼吸し――\n潤んだ瞳で、姿見の中の自分と僕とをじっと見つめる。
1411 = "Và rồi, với lồng ngực và bờ vai đẫm mồ hôi\nđang thở hổn hển——bằng đôi mắt ướt át, em\nấy nhìn chằm chằm vào tôi và chính mình\ntrong chiếc gương lớn."

# 【日々姫】
# display as 日日姬
# JP: 「ふあ……ぁ……んっ……うれし……\nぴったり――わたし、おまんこ――にぃにの、と」
1076 = "「Phù... a... Ưm... Vui quá... Vừa khít——Cô\nbé, của em——với của, anh hai.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、ぴったりだな。\n根本まで全部、余すところなく収まっている」
1149 = "「Ừ, vừa khít nhỉ. Trọn vẹn đến tận gốc,\nkhông thừa ra một chút nào.」"

# monologue
# JP: （きゅんっ――きゅうううんっ）
1798 = "（Co thắt——Siết chặtttt）"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1282 = "「！」" 

# monologue
# JP: おまんこがわななき喜んでいる。\n子宮の口がくぱくぱと、精子を求めてキスしてくれてる。
1428 = "Cô bé đang run lên vì vui sướng. Cửa tử\ncung cứ mở ra khép lại, hôn lấy tôi đòi\nhỏi tinh trùng."

# 【日々姫】
# display as 日日姬
# JP: 「やっぱり、私――私の、おまんこ――\nにぃにの……専用……に、出来て、る――んっ――はっ」
1205 = "「Quả nhiên, em——cô bé, của em——sinh ra...\nlà để... dành riêng... cho anh\nhai——Ưm——Hơ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな。そして僕の勃起は――\n日々姫のもので――専用だ」
1161 = "「Đúng vậy. Và phần cương cứng của\nanh——cũng là của Hibiki——là đồ dành\nriêng.」"

# monologue
# JP: （ずるうううううっっ！！！）
1787 = "（Trượtttttt!!!）"

# 【日々姫】
# display as 日日姬
# JP: 「ふぅぅぅぅぅぅぅぅんっっ！」
1077 = "「Fuuuuuuun!」"

# monologue
# JP: 呼吸が、完全に一致している。
1453 = "Nhịp thở, hoàn toàn đồng điệu."

# monologue
# JP: 何の合図もしないまま、僕と日々姫は、\n腰の動きを、体のリズムを呼応させてる。
1619 = "Chẳng cần bất kỳ ám hiệu nào, tôi và\nHibiki, chuyển động của hông, nhịp điệu\ncủa cơ thể, đang hô ứng lẫn nhau."

# monologue
# JP: （ずぱんっ！！！）
1808 = "（Bạch!!!）"

# 【日々姫】
# display as 日日姬
# JP: 「きゃふううっ！」
1061 = "「Kyafuuu!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「日々、姫っ――」
1194 = "「Hi, biki——」"

# monologue
# JP: （ずばっ！　ずぶっ！　ぶちゅっ！　ずびゅっ！）
1807 = "（Bạch! Phập! Phập! Phập!）"

# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！　あんっ！　んっ――\nにぃにっ――にぃにぃっ！」
1079 = "「Phù! A! Ưm——Anh hai——Anh hai!」"

# monologue
# JP: （じゅぶっ！　ぶじゅっ！　―――ごりゅっ！！）
1762 = "（Nhóp nhép! Nhóp nhép! ——Ngoáy!!）"

# 【日々姫】
# display as 日日姬
# JP: 「んきゅっ――ふっ――あっ――あかちゃんの――へやっ、\nにぃにの――おちん、ちん――ぐいって――く――はっ」
1126 = "「Ưm kyu——Phù——A——Căn phòng——của em bé, bị\ncậu, nhỏ——của anh hai——thúc mạnh——Ư——Hơ.」"

# monologue
# JP: （ずりゅっ！　――っごんっ！）
1763 = "（Phập! ——Bạch!）"

# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ！　あっ――すごっ――これっ――\nかっ――はっ――あっ――息っ――とまっちゃ――うっ」
1064 = "「Hya! A——Khủng quá——Cái này——Hơ——A——Sắp\ntắt——thở——mất.」"

# monologue
# JP: （ふにゅっ――もみゅっ――こりゅっ――きゅっ！）
1795 = "（Nắn nắn——Xoa xoa——Vê vê——Bóp!）"

# 【日々姫】
# display as 日日姬
# JP: 「やっ！　いまっ――乳首っ――んっ――\nきゅって――されたら――おっぱい――でちゃ、うっ」
1066 = "「Á! Bây giờ——Nhũ hoa——Ưm——Bị véo——thế\nnày——Sữa——sắp chảy ra, mất.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「なってくれ。ほんとに、おっぱいが出るように」
1037 = "「Hãy chảy ra đi. Thật sự, để sữa chảy ra\nđi.」"

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　うんっ！！」
1141 = "「Vâng! Vâng!!」"

# monologue
# JP: （きゅんっ！　きゅうううんっ！）
# 1798 = "（收縮壓迫）" 

# 【日々姫】
# display as 日日姬
# JP: 「なるから！　私っ――妊娠――する、からっ――\nだから――にぃに――私の――おなかでっ――」
1186 = "「Sẽ chảy mà! Em——sẽ mang thai——mà——Thế\nnên——Anh hai——Vào trong bụng——của em——」"

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
1140 = "「Ưm!」"

# monologue
# JP: 膣のうねりが、絞りに変わる！
1686 = "Sự nhấp nhô của âm đạo, chuyển thành sự\nsiết chặt!"

# monologue
# JP: 引きぬく動きに抗い張り付き、奥へ戻れと射精しろと、\n全力で僕に要求してくるっ！
1391 = "Chống lại chuyển động rút ra và bám chặt\nlấy, yêu cầu tôi bằng toàn bộ sức lực hãy\nquay trở lại sâu bên trong và xuất tinh\nđi!"

# 【双鉄H】
# display as 雙鐵
# JP: 「これ――は――日々、姫――\nんっ――僕は――もうっ――」
1246 = "「Thế này——thì——Hi, biki——Ưm——Anh——Sắp——」"

# 【日々姫】
# display as 日日姬
# JP: 「イって！　にいにっ！　んっ――わたしの――なか、で、\nどぴゅどぴゅって――してぇっっっ！！」
1044 = "「Ra đi! Anh hai! Ưm——Ở bên trong——của em,\nhãy bắn thật nhiều——vào đi!!」"

# monologue
# JP: （きゅううううっ！）
1797 = "（Siết chặtttt!）"

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
1073 = "「Kua!」"

# monologue
# JP: （どびゅっ！　びゅびゅ！　びゅるるっ！　びゅぶっ！）
1766 = "（Phụt! Phụt! Phụt! Phụt!）"

# 【日々姫】
# display as 日日姬
# JP: 「んきゅうううううううぅぅぅぅっ！！！」
1138 = "「Ưm kyuuuuuuuu!!!」"

# monologue
# JP: （びゅっ！　びゅるっ！　びゅうっ！　どびゅっ！）
1764 = "（Phụt! Phụt! Phụt! Phụt!）"

# monologue
# JP: 日々姫の子宮に密着しながら、\n思いっきりに射精している。
1489 = "Vừa dính chặt vào tử cung của Hibiki, tôi\nvừa thỏa sức xuất tinh."

# monologue
# JP: 二発目なのに最初より濃い精液が、\nばちゅんばちゅんと日々姫の壁を叩いてる。
1613 = "Dù là phát thứ hai nhưng tinh dịch còn đặc\nhơn cả lần đầu, bắn bành bạch vào vách âm\nđạo của Hibiki."

# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ……あっ――んっ……あっ――\nあつい……にぃに――の……にんしん――精、液っ」
1058 = "「Hya... A——Ưm... A——Nóng quá... Tinh,\ndịch——để mang thai... của... anh hai.」"

# monologue
# JP: （びゅるるっ！）
1772 = "（Phụt!）"

# 【双鉄H】
# display as 雙鐵
# JP: 「くはっ――あっ――」
1074 = "「Kua——A——」"

# monologue
# JP: 精液を、そして力を出しきって、\n日々姫ごと、後ろへごろりと倒れこむ。
1463 = "Vắt kiệt tinh dịch, và cả sức lực, tôi ôm\nlấy Hibiki ngã lăn ra phía sau."

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、にぃにぃ」
1258 = "「Anh hai, anh hai.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1137 = "「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「ちゅっ――んっ――チュむッ――れるっ――\nはっ――あっ――ちゅうっ――ちゅむっ――ちゅっ」
1122 = "「Chụt——Ưm——Chụt——Liếm——Hơ——A——Chụt——Chụt——Chụt.」"

# monologue
# JP: 日々姫とのキス。舌と唾液と唇と。\n下半身から脳髄までが、ただただ甘さに満たされていく。
1460 = "Nụ hôn với Hibiki. Lưỡi, nước bọt và đôi\nmôi. Từ nửa thân dưới cho đến tận não tủy,\nchỉ toàn ngập tràn sự ngọt ngào."

# monologue
# JP: 日々姫と僕と、重なりあってる喜びだけが、\n僕を満たして、豊かな気持ちにしてくれる。
1610 = "Niềm hạnh phúc khi tôi và Hibiki hòa quyện\nvào nhau, lấp đầy trong tôi, mang lại một\ncảm giác thật phong phú."

# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃ」
# 1259 = "「阿哥」" 

# monologue
# JP: （がさっ）
1759 = "（Sột soạt）"

# 【双鉄H】
# display as 雙鐵
# JP: 「っと」
# 1114 = "「啊」" 

# monologue
# JP: 甘えて日々姫が擦りついてくれば、\n肌に異質な感触が来る。
1564 = "Khi Hibiki làm nũng và cọ xát vào tôi, một\ncảm giác khác lạ truyền đến da thịt."

# 【双鉄H】
# display as 雙鐵
# JP: 「……スーツ、皺だらけにしてしまったな」
855 = "「...Bộ vest, nhăn nhúm hết cả rồi.」"

# monologue
# JP: 皺だらけだし、汗と汁とでどろどろだ。
1328 = "Vừa nhăn nhúm, lại còn dính đầy mồ hôi và\ndịch nhờn nhầy nhụa."

# monologue
# JP: 洗ってアイロンをかけてもこれは――\nあるいは染みが、残ってしまうのではなかろうか？
1332 = "Dù có giặt rồi ủi đi chăng nữa——thì liệu\ncó để lại vết ố không đây?"

# 【日々姫】
# display as 日日姬
# JP: 「だ、大丈夫……だと、思う……かな？」
1184 = "「Ch, chắc là... không sao đâu... nhỉ?」"

# monologue
# JP: そういいつつも、\n瞳は不安に揺れている。
1401 = "Vừa nói, ánh mắt em ấy lại ánh lên sự bất\nan."

# monologue
# JP: そんな瞳を見たくはないから、\n一生懸命頭を絞る。
1458 = "Không muốn nhìn thấy ánh mắt ấy, tôi vắt\nóc suy nghĩ."

# 【双鉄H】
# display as 雙鐵
# JP: 「もしもダメなら、そのスーツは、\n僕といるとき専用にしてもらうのはどうだろう？」
1158 = "「Nếu không được thì, bộ vest đó, cứ coi\nnhư là đồ dành riêng khi ở bên anh thì\nsao?」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにといるとき専用？　\n――って、あっ！　わ」
1239 = "「Dành riêng khi ở bên anh hai? ——Á, a!\nOa.」"

# monologue
# JP: ぼふっと、日々姫が赤くなり。\nそうしてゆっくり、ゆっくり頷く。
1599 = "Phụt một cái, mặt Hibiki đỏ bừng lên. Và\nrồi từ từ, từ từ gật đầu."

# 【日々姫】
# display as 日日姬
# JP: 「うん。する。世界でにぃにだけしか見ない、\nエッチのときだけ――着ちゃうスーツに」
1151 = "「Vâng. Cứ làm vậy đi. Sẽ thành bộ\nvest——chỉ mặc khi làm chuyện hư hỏng, trên\nđời này chỉ có anh hai mới được nhìn thấy\nthôi.」"

# monologue
# JP: ちろり、といたずらっぽい上目遣い。
1590 = "Em ấy ngước nhìn tôi với ánh mắt tinh\nnghịch."

# 【日々姫】
# display as 日日姬
# JP: 「ね、にぃに？　それなら、無駄遣いじゃなかとよね？」
1255 = "「Này, anh hai? Nếu vậy thì, không bị coi\nlà lãng phí đâu nhỉ?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。非常に有用な投資だと思う」
1146 = "「Ừ. Anh nghĩ đó là một khoản đầu tư vô\ncùng hữu ích đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「えへへ～っ」
1086 = "「Ê hê hê~」"

# monologue
# JP: 頬ずり。\nまたキス。
1602 = "Cọ má. Lại hôn."

# monologue
# JP: そして日々姫は、僕のおでこにおでこを当てる。
1500 = "Và rồi Hibiki, áp trán mình vào trán tôi."

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ありがと！\nおかげで、お洋服大事にできると！」
1269 = "「Anh hai, cảm ơn anh! Nhờ vậy mà, em có\nthể trân trọng bộ quần áo này rồi!」"
