1239 = "「跟阿哥在一起時專用？呃、啊！　哇」" 

# monologue
# JP: ぼふっと、日々姫が赤くなり。\nそうしてゆっくり、ゆっくり頷く。
1599 = "日日姬的小臉變得通紅，然後她慢慢地點了點頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。する。世界でにぃにだけしか見ない、\nエッチのときだけ――着ちゃうスーツに」
1151 = "「嗯，這麼辦。這件西裝只有阿哥才能看到，只有親熱的時候才穿」" 

# monologue
# JP: ちろり、といたずらっぽい上目遣い。
1590 = "日日姬用嬌滴滴的眼神瞄了我一下。" 

# 【日々姫】
# display as 日日姬
# JP: 「ね、にぃに？　それなら、無駄遣いじゃなかとよね？」
1255 = "「那個、阿哥。這樣的話，就不算浪費了吧」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。非常に有用な投資だと思う」
1146 = "「嗯，我覺得是非常有價值的投資」" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへ～っ」
1086 = "「哎嘿嘿～」" 

# monologue
# JP: 頬ずり。\nまたキス。
1602 = "日日姬磨蹭著我的臉。然後又是一個吻。" 

# monologue
# JP: そして日々姫は、僕のおでこにおでこを当てる。
1500 = "接著日日姬頂上了我的額頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ありがと！\nおかげで、お洋服大事にできると！」
1269 = "「阿哥，謝謝！這樣就能好好利用這件衣服了！」" 
