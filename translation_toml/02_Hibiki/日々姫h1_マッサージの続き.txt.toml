1039 = "「唔――唔～～――嗯――啾――啾噗――啾嚕――呼――唔～～～」" 

# monologue
# JP: （しこ、しこ、もみゅ、もみゅっ）
# 1863 = "（上下套弄）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くぁ――あっ――」
1016 = "「呼――啊――」" 

