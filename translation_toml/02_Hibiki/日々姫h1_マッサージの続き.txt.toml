# lines: 357 
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、起きとぉ？」
1227 = "「Em yêu anh. Anh trai.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1081 = "「Anh hai, còn thức không?」"
# monologue
# JP: 祝勝会は、明日あらためて。\n今日は、体を休めよう。
1420 = "「Ừ.」"
# monologue
# JP: みなでそう決め、\n早めの帰宅を出来たところまでは良かったが……
1536 = "Tiệc mừng chiến thắng, để ngày mai tổ chức lại. Hôm nay, hãy nghỉ ngơi cho khỏe đã."
# 【双鉄H】
# display as 雙鐵
# JP: 「やはり、高ぶっているのだろうな。\nすぐに眠ろうという気にさえならん」
1164 = "Mọi người đã quyết định như vậy, và việc về nhà sớm thì cũng tốt thôi, nhưng mà..."
# 【日々姫】
# display as 日日姬
# JP: 「そうだと思った。私も同じやけん」
1114 = "「Quả nhiên, tinh thần vẫn còn hưng phấn quá nhỉ. Chẳng có chút cảm giác buồn ngủ nào cả.」"
# monologue
# JP: 言って、日々姫が入ってくる。\nパジャマにも着替えず、まだ普段着だ。
1776 = "「Em cũng nghĩ vậy. Em cũng giống hệt anh.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、散歩にでも行くか？」
1210 = "Nói rồi, Hibiki bước vào. Em ấy vẫn chưa thay đồ ngủ, vẫn mặc bộ đồ thường ngày."
# 【日々姫】
# display as 日日姬
# JP: 「それも良かけど――いいです、けど」
1124 = "「Vậy, đi dạo một lát nhé?」"
# monologue
# JP: こほん、と小さく咳払い。\nそして日々姫は、にじり、わずかに近寄ってくる。
1618 = "「Thế cũng được——nhưng mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん。絶対疲れてるから。だから私、兄さんに――\nマッサージ、してあげたいなって思って来たの」
1029 = "Khụ, em ấy hắng giọng nhỏ. Và rồi Hibiki, nhích lại gần tôi một chút."
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1230 = "「Anh trai. Chắc chắn là đang rất mệt rồi. Nên em, muốn đến để——mát xa cho anh trai.」"
# monologue
# JP: マッサージ。その一言が、僕の記憶を呼び覚ます。\nいつぞやの、日々姫の足踏みマッサージ。
1549 = "「!」"
# monologue
# JP: 日々姫の気持ちを聞かせてもらった今ならわかる気がする。\nあの時日々姫は僕にパンツを、意識して見せていたのだと。
1721 = "Mát xa. Một từ đó thôi đã đánh thức ký ức của tôi. Lần mát xa bằng chân của Hibiki dạo nọ."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
1037 = "Bây giờ, khi đã biết được tình cảm của Hibiki, tôi nghĩ mình đã hiểu. Lúc đó Hibiki cố tình để tôi nhìn thấy quần lót của em ấy."
# monologue
# JP: ならば日々姫も、同じことを望んでくれてる。\nそう感じれば、体が動こうとしてしまう。
1730 = "「À——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「頼んでいいのか？」
1208 = "Nếu vậy thì Hibiki, cũng đang mong muốn điều tương tự. Cảm nhận được điều đó, cơ thể tôi vô thức muốn hành động."
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
1082 = "「Anh nhờ em được không?」"
# monologue
# JP: だから、あえて日々姫に全てを任せる。
1363 = "「Vâng!」"
# monologue
# JP: 不慣れな僕が思うがままに動いてしまい、\n日々姫を傷つけてしまわぬように。
1510 = "Thế nên, tôi cố tình giao phó mọi thứ cho Hibiki."
# 【双鉄H】
# display as 雙鐵
# JP: 「また、横になればいいか？」
1118 = "Để một kẻ thiếu kinh nghiệm như tôi không hành động bốc đồng, làm tổn thương Hibiki."
# monologue
# JP: それに、単純な欲望もある。\nもう一度、もう何度でも――日々姫に触れてもらいたい。
1381 = "「Lại nằm xuống là được đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん、今回は。えっと――\n立ったままで、マッサージ」
967 = "Hơn nữa, cũng có cả dục vọng đơn thuần nữa. Một lần nữa, bao nhiêu lần cũng được——tôi muốn được Hibiki chạm vào."
# 【双鉄H】
# display as 雙鐵
# JP: 「立ったままで？」
1179 = "「Không, lần này thì. Ừm——Mát xa, trong lúc đứng cơ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そう……ええと、ね？　こんな感じに」
1098 = "「Đứng á?」"
# monologue
# JP: （さわっ）
1895 = "「Đúng vậy... ừm, nhỉ? Giống như thế này.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1230 = "「！」" 
# monologue
# JP: これは……近い。\n日々姫は、ほとんど僕を抱きしめている。
1668 = "（Chạm nhẹ）"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん――どうですか？\n気持ち、いいですか？」
1035 = "Gần... quá. Hibiki, gần như đang ôm lấy tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……最高だ」
1068 = "「Anh trai——thế nào ạ? Có thoải mái không?」"
# monologue
# JP: さわさわ、さすさす。\n日々姫の手は、揉み込むことなく僕の体を這いまわる。
1639 = "「À... Tuyệt lắm.」"
# monologue
# JP: 日々姫の息と汗と熱、そして匂いが間近から、\n僕の体に染みてくる。
1633 = "Mơn trớn, vuốt ve. Đôi tay của Hibiki không hề nắn bóp mà chỉ lướt quanh cơ thể tôi."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん――背中、おっきい」
1032 = "Hơi thở, mồ hôi, hơi ấm, và cả mùi hương của Hibiki từ khoảng cách rất gần, đang thấm vào cơ thể tôi."
# monologue
# JP: 首筋から肩、胸へと来た手が、\n僕の背中に回される。
1449 = "「Anh trai——tấm lưng, rộng quá.」"
# monologue
# JP: （むにっ）
1906 = "Đôi tay từ gáy xuống vai, rồi ngực, giờ vòng qua ôm lấy lưng tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
792 = "（Áp sát）"
# monologue
# JP: 胸板に、日々姫の胸がおしあたってくる。\n柔らかい。手で、指で思い切り触れてみたい。
1649 = "「——」"
# monologue
# JP: あまりに心地よい感触は、\n手の動きにつれ、段々、段々、下へと下がる。
1759 = "Bộ ngực của Hibiki áp sát vào vòm ngực tôi. Thật mềm mại. Tôi muốn dùng bàn tay, dùng những ngón tay chạm vào nó thỏa thích."
# 【日々姫】
# display as 日日姬
# JP: 「ん……ふっ――」
1067 = "Cảm giác vô cùng dễ chịu ấy, theo chuyển động của đôi tay, dần dần, dần dần, di chuyển xuống dưới."
# monologue
# JP: 日々姫の両手が、僕のお尻の両方をゆるく撫でさする。\n股間は――とっくにガチガチだ。
1652 = "「Ưm... Phù——」"
# monologue
# JP: 気づいているのかいないのか、\n日々姫の息は、その硬直の上を何度も這ってくすぐる。
1354 = "Hai tay của Hibiki nhẹ nhàng vuốt ve hai bên mông tôi. Còn đũng quần thì——đã cứng ngắc từ lâu rồi."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん……マッサージ、\nして欲しいところとかって、無いですか？」
1027 = "Không biết là có nhận ra hay không, hơi thở của Hibiki cứ liên tục phả qua phần đang cứng ngắc ấy, khiến tôi nhột nhạt."
# monologue
# JP: ある。が――直接いってもいいものか、\n僕の勘違いではないのかが急に、不安になる。
1725 = "「Anh trai... Có chỗ nào, muốn em mát xa không?」"
# monologue
# JP: なにせ、この手のことには経験が無い、\nなにか誤解をしてたら、きっと日々姫を傷つける。
1410 = "Có. Nhưng mà——có nên nói thẳng ra không, hay là do tôi hiểu lầm, bỗng dưng tôi cảm thấy bất an."
# 【双鉄H】
# display as 雙鐵
# JP: 「その……だ」
1199 = "Dù sao thì, tôi cũng chẳng có kinh nghiệm trong chuyện này, nếu hiểu lầm gì đó, chắc chắn sẽ làm tổn thương Hibiki mất."
# monologue
# JP: だから、必死に考える。
1537 = "「Chuyện đó... thì.」"
# monologue
# JP: 誤解か、それともそうでないのか――\n日々姫の方から、示してくれるような言葉を。
1498 = "Thế nên, tôi vắt óc suy nghĩ."
# 【双鉄H】
# display as 雙鐵
# JP: 「下半身が気持ちよすぎて、ジンジンと痺れるようなのだ。\nだから、硬くなり、[こわば,1]強張ってしまっている部分を――」
962 = "Là hiểu lầm, hay không phải——những lời nói như thể đang gợi ý từ phía Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「硬いとこ……ここ、とかですか？」
1184 = "「Nửa thân dưới thoải mái quá, cảm giác cứ râm ran tê dại ấy. Nên là, cái phần đang trở nên cứng ngắc, căng cứng ấy——」"
# monologue
# JP: （もみゅっ）
1890 = "「Chỗ cứng ngắc... là chỗ này, ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――」
1057 = "（Nắn bóp）"
# monologue
# JP: ふくらはぎをクっと揉み込まれれば、\nごくごく素直に気持ちいい。
1466 = "「Ưm——」"
# 【日々姫】
# display as 日日姬
# JP: 「それとも――このへん？」
1192 = "Bắp chân bị nắn bóp mạnh, thành thật mà nói thì rất là sướng."
# monologue
# JP: （ぐりっ、ぐりっ）
1889 = "「Hay là——quanh đây?」"
# monologue
# JP: ふとももの脇。
1431 = "（Xoa xoa, xoa xoa）"
# monologue
# JP: そこも確かに、立ちっぱなしの選挙運動で、\n強張りに強張りまくってる――が。
1790 = "Chỗ đó quả thực cũng vì phải đứng suốt trong chiến dịch tranh cử, nên đã căng cứng đến mức không thể cứng hơn được nữa——nhưng mà."
# 【双鉄H】
# display as 雙鐵
# JP: 「そこも、確かに気持ちいいのだが――\nだが……そう、ではなく――」
1215 = "「Chỗ đó, đúng là cũng rất thoải mái——Nhưng mà... không, không phải——」"
# 【日々姫】
# display as 日日姬
# JP: 「じゃあ、どこですか？」
1211 = "「Vậy thì, là chỗ nào ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1230 = "「！」" 
# monologue
# JP: 熱っぽく潤み、けれどもわずかに揺れてる瞳。\nああ、そうなのかと――その瞬間に、理解する。
1732 = "Đôi mắt ươn ướt hơi nóng, nhưng lại thoáng chút dao động. A, ra là vậy——Khoảnh khắc đó, tôi đã hiểu."
# monologue
# JP: もう一歩踏み込んでいいものか、\n日々姫もやはり、わからず、不安に感じているのだ。
1627 = "Có nên tiến thêm một bước nữa hay không, quả nhiên Hibiki cũng không biết, và đang cảm thấy bất an."
# 【双鉄H】
# display as 雙鐵
# JP: 「……勃起を」
800 = "「...Cái chỗ đang cương cứng ấy.」"
# monologue
# JP: ならば、僕から踏み込むしか無い。\n覚悟を決めれば、欲はすぐさま言葉に変わる。
1794 = "Nếu vậy, chỉ còn cách để tôi chủ động bước tới. Khi đã hạ quyết tâm, dục vọng lập tức hóa thành lời nói."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕は、僕のおちんちんを、\n日々姫に、マッサージしてもらいたい」
1115 = "「Anh muốn, Hibiki, mát xa cho cậu nhỏ của anh.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 1230 = "「！」" 
# monologue
# JP: 日々姫が、わずかに息を飲む。\n僕から視線を外してしまう。
1612 = "Hibiki, khẽ nuốt nước bọt. Em ấy ngoảnh mặt đi, không nhìn tôi nữa."
# monologue
# JP: 誤解だったか、マズかったかと、\n一瞬、混乱し硬直し――
1677 = "Là tôi hiểu lầm sao, hay là tôi lỡ lời rồi, trong một thoáng, tôi bối rối và cứng đờ người lại——"
# monologue
# JP: （――――つんっ）
1886 = "（————Chọc）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
1049 = "「A.」"
# monologue
# JP: けれども指が、ほんのわずかに押してくる。
1364 = "Nhưng mà, ngón tay em ấy, lại khẽ ấn vào một chút."
# monologue
# JP: つんつん、つんつん、見知らぬおもちゃを見つけでもした\n子猫のように、慎重に――
1439 = "Chọc chọc, chọc chọc, cứ như một chú mèo con vừa tìm thấy món đồ chơi lạ lẫm, thật cẩn trọng——"
# monologue
# JP: （さすっ）
1910 = "（Vuốt nhẹ）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ンッ――くっ」
1062 = "「Ưm——hự.」"
# monologue
# JP: やがて、手のひら全体で僕をなぞってくれる。
1700 = "Rồi chẳng mấy chốc, em ấy dùng cả lòng bàn tay mơn trớn tôi."
# monologue
# JP: さすさすと、いい子いい子と撫でる手つきで、\n上下にゆったり、僕の勃起を愛撫する。
1440 = "Vuốt ve, với cử chỉ âu yếm như đang dỗ dành một đứa trẻ ngoan, em ấy nhẹ nhàng trượt lên trượt xuống, ái ân phần đang cương cứng của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「どう……ですか？　兄さん」
1102 = "「Thế nào... ạ? Anh trai.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「気持ちいい、もっとして欲しい」
1099 = "「Sướng lắm, anh muốn em làm thêm nữa.」"
# monologue
# JP: 僕の欲を、日々姫が受け止めてくれている。\n受け止め答え、更にと工夫してくれている。
1602 = "Dục vọng của tôi, đã được Hibiki đón nhận. Không chỉ đón nhận và đáp lại, em ấy còn cố gắng chiều chuộng tôi hơn nữa."
# monologue
# JP: 安心感と幸福感とが僕の真ん中で膨れ上がって、\n肉体以上に、心がぞくぞく、気持よくなる。
1517 = "Cảm giác an tâm và hạnh phúc căng tràn trong tôi, hơn cả thể xác, con tim tôi cũng đang rung lên từng hồi đê mê."
# 【日々姫】
# display as 日日姬
# JP: 「もっとって……」
1180 = "「Thêm nữa là...」"
# monologue
# JP: こくり、日々姫の喉が小さく動く。
1611 = "Ưực, cổ họng Hibiki khẽ chuyển động."
# 【日々姫】
# display as 日日姬
# JP: 「でしたら……あの、兄さん――その……そこ、を。\nその、もっとマッサージしやすいようにしてもらっても」
1204 = "「Nếu vậy... à ừm, anh trai——cái đó... chỗ đó, ấy. Anh có thể, để cho em dễ mát xa hơn một chút được không.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
# 1057 = "「嗯――」" 
# monologue
# JP: ドクン、ドクンと、自分の心音が耳につく。
1519 = "Thịch, thịch, tiếng tim đập dội vào màng nhĩ tôi."
# monologue
# JP: 普段であれば意識すらせずこなせることを、\n震える指で、不器用にしか行えなくなる。
1472 = "Một việc mà bình thường tôi có thể làm trong vô thức, giờ đây lại trở nên vụng về với những ngón tay run rẩy."
# monologue
# JP: （ちぃ……ぃっ――）
1869 = "（Xoẹt......）"
# monologue
# JP: ゆっくり、ゆっくりチャックを下げる。\n日々姫は目を逸らさない。嫌がっている素振りもない。
1544 = "Chầm chậm, từ từ kéo khóa quần xuống. Hibiki không hề ngoảnh mặt đi. Cũng chẳng hề tỏ ra ghét bỏ."
# monologue
# JP: ならば――これで正解だろう。\nそうと信じて、心を決して勃起を取り出す。
1800 = "Nếu vậy——thế này là đúng rồi nhỉ. Tin là như vậy, tôi quyết tâm lôi phần đang cương cứng của mình ra."
# monologue
# JP: （ぼろんっ）
1915 = "（Phịch）"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1049 = "「啊」" 
# monologue
# JP: 悲鳴、ではない。ため息でもない。\nそれは、感嘆が漏らした声だ。
1436 = "Không phải tiếng hét. Cũng chẳng phải tiếng thở dài. Đó là, âm thanh rỉ ra từ sự cảm thán."
# 【日々姫】
# display as 日日姬
# JP: 「これが――にぃにの――兄さんの、おちんちん」
1189 = "「Đây là——của anh hai——cậu nhỏ của anh trai.」"
# monologue
# JP: （さわっっ）
1896 = "（Chạm nhẹ）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1230 = "「！」" 
# monologue
# JP: 触れていいか、と尋ねもしない。
1665 = "Chẳng buồn hỏi xem có được chạm vào hay không."
# monologue
# JP: 夢見るようにうっとりと、\n僕の勃起に、日々姫はその手を伸ばしてくれる。
1428 = "Như đang chìm đắm trong một giấc mơ, Hibiki vươn tay chạm vào phần đang cương cứng của tôi."
# monologue
# JP: （さすっ――さわっ――）
1894 = "（Vuốt nhẹ——Chạm nhẹ——）"
# 【日々姫】
# display as 日日姬
# JP: 「硬か……それに、すっごく……熱、か――\nこぎゃんとおっきなものを――私――」
1096 = "「Cứng quá... lại còn, nóng hổi... nữa——Một thứ to lớn thế này——Mình——」"
# monologue
# JP: 隈本弁に戻ってる。\n普段の日々姫が、剥き出しの日々姫がそこにいる。
1424 = "Lại chuyển sang giọng Kumamoto rồi. Một Hibiki của ngày thường, một Hibiki bộc lộ chân thật nhất đang ở ngay đây."
# 【日々姫】
# display as 日日姬
# JP: 「きゃっ！？」
1002 = "「Á!?」"
# monologue
# JP: 感じた瞬間、勃起が激しく震えてしまう。\n日々姫は、戸惑った目で僕を見上げる。
1347 = "Khoảnh khắc cảm nhận được điều đó, phần cương cứng bỗng giật nảy lên dữ dội. Hibiki ngước lên nhìn tôi với đôi mắt bối rối."
# monologue
# JP: よそ行きの日々姫に戻したくない――\n思いはすぐに言葉になって、喉から溢れだしていく。
1485 = "Tôi không muốn em ấy trở lại là một Hibiki khách sáo nữa——suy nghĩ ấy lập tức hóa thành lời nói, tuôn trào khỏi cuống họng."
# 【双鉄H】
# display as 雙鐵
# JP: 「もっと、してくれ。\nすごく――気持ちいいし、幸せなんだ」
989 = "「Làm thêm đi em. Sướng lắm——với lại, anh thấy hạnh phúc lắm.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1082 = "「嗯！」" 
# monologue
# JP: （きゅっ！）
1893 = "（Nắm chặt!）"
# monologue
# JP: 日々姫の指が僕の竿――\n根本に近い部分を優しく捕まえる。
1640 = "Những ngón tay của Hibiki dịu dàng tóm lấy thân gậy của tôi——ở phần gần sát gốc."
# 【日々姫】
# display as 日日姬
# JP: 「あの……どぎゃんしたらよかとか、よぅわからんけん、\n間違っとったら――教えて、ね？」
1201 = "「Cái đó... em không biết phải làm thế nào mới tốt, nên nếu em có làm sai——anh nhớ bảo em, nha?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1081 = "「嗯」" 
# monologue
# JP: 僕もわからん。そんなことは。\nだけれど不安を与えぬように、ともかく頷く。
1383 = "Anh cũng có biết đâu. Mấy chuyện này ấy. Nhưng để em ấy không thấy bất an, tôi cứ gật đầu cái đã."
# monologue
# JP: ただそれだけで、日々姫はホっとした顔をして、\nそうして口を、大きく大きく開いてみせる。
1746 = "Chỉ cần có thế, khuôn mặt Hibiki đã lộ vẻ nhẹ nhõm, và rồi em ấy há miệng, há thật to ra."
# 【日々姫】
# display as 日日姬
# JP: 「んーーーーーっ」
1040 = "「Ưm—————」"
# monologue
# JP: （てろおおおおおおっ）
1903 = "（Liếmmmmmm）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1230 = "「！」" 
# monologue
# JP: 唾液だ。\n日々姫のなまあたたかい、日々姫の口で温まったツバ。
1606 = "Nước bọt. Nước bọt âm ấm của Hibiki, được ủ ấm trong khoang miệng của Hibiki."
# monologue
# JP: それを勃起の先端の部分にかけられて――
1789 = "Nó rỏ xuống phần đỉnh đang cương cứng của tôi——"
# monologue
# JP: （くちゅりっ）
1867 = "（Nhóp nhép）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁっ」
# 1049 = "「啊」" 
# monologue
# JP: 日々姫の手が、勃起の先に唾液をまぶし伸ばしてく。\nすぐに僕から出た汁が、唾液と混じって手を汚す。
1629 = "Bàn tay Hibiki thoa đều nước bọt lên phần đỉnh đang cương cứng. Chẳng mấy chốc, dòng dịch rỉ ra từ tôi đã hòa lẫn với nước bọt, làm ướt đẫm tay em ấy."
# monologue
# JP: （くちっ、くちっ――ちゅるっ――もみゅっ――）
1866 = "（Nhóp nhép, nhóp nhép——Chụt——Nắn nắn——）"
# 【双鉄H】
# display as 雙鐵
# JP: 「うあっ――あっ――気持ち、いいっ――」
1042 = "「Ua——a——sướng, quá——」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。もっと……よーしてあげるけん」
1075 = "「Vâng. Em sẽ làm cho anh... sướng hơn nữa nha.」"
# monologue
# JP: くすりと笑う日々姫の顔にドキリとし、\n日々姫をもっと見たくて……だから、気づいてしまう。
1646 = "Gương mặt cười khúc khích của Hibiki khiến tim tôi lỡ nhịp, tôi muốn nhìn em ấy nhiều hơn nữa... và rồi, tôi chợt nhận ra."
# 【双鉄H】
# display as 雙鐵
# JP: （日々姫、乳首……勃起、してる）
1901 = "（Nhũ hoa của Hibiki... đang cương lên kìa.）"
# monologue
# JP: 服の上から見てわかるほど、はっきり形が浮き上がってる。\n日々姫も、興奮してくれている。
1796 = "Nhìn xuyên qua lớp áo cũng có thể thấy rõ mồn một hình dáng in hằn lên. Hibiki cũng đang hưng phấn rồi."
# monologue
# JP: 体が、更に温度を増して、\n嬉しさともどかしさとが僕をギリギリ締め付けてくる。
1524 = "Cơ thể tôi lại càng nóng rực lên, niềm sung sướng cùng sự cuồng nhiệt siết chặt lấy tôi đến mức nghẹt thở."
# 【日々姫】
# display as 日日姬
# JP: 「こーして、ね？　にぃに」
1171 = "「Thế này, nhỉ? Anh hai.」"
# monologue
# JP: いたずらっぽくそう言って。\nこれみよがしに舌を伸ばして――
1432 = "Em ấy nói với vẻ tinh nghịch. Rồi phô trương thè chiếc lưỡi ra——"
# 【日々姫】
# display as 日日姬
# JP: 「ぺろっ」
1233 = "「Liếm.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ふっ――」
1012 = "「Phù——」"
# monologue
# JP: 日々姫が、舐めた。
1657 = "Hibiki, đã liếm nó."
# monologue
# JP: 夏場は殆ど毎日のようにアイスクリームを舐めてる舌で、\n汚れひとつさえ無い舌で――
1435 = "Bằng chiếc lưỡi mà mùa hè gần như ngày nào cũng liếm kem, bằng chiếc lưỡi không vương một chút vấy bẩn nào——"
# 【日々姫】
# display as 日日姬
# JP: 「ちゅっ――れるっ――ちゅむっ――ちゅるっ――」
1055 = "「Chụt——Liếm——Chụt——Chụt——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫……いい、すごく――素晴らしく気持ちいい」
1147 = "「Hibiki... sướng lắm, thực sự——sướng không tả nổi.」"
# monologue
# JP: 嬉しげに、日々姫の目がアーチを描――っ！？
1670 = "Đôi mắt Hibiki cong lên thành hình vòng cung đầy vẻ vui sướng——!?"
# 【日々姫】
# display as 日日姬
# JP: 「んふっ――ちゅっ――ぺろっ――ちゅるっ――ぺろおっ\n――れろれろ――れるーーーっっ――――――ぱくっ！」
1065 = "「Ưm——Chụt——Liếm——Chụt——Liếm——Liếm liếm——Liếmmm————Ngoạm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！　あっ――」
1051 = "「! A——」"
# monologue
# JP: 舌の動きが加速する。\n快感が、棒状になって頭の先まで抜けていく。
1454 = "Chuyển động của chiếc lưỡi ngày càng nhanh hơn. Khoái cảm tụ lại thành một đường thẳng, đâm xuyên thẳng lên đỉnh đầu."
# monologue
# JP: 鼻血が出てしまったのではないかと、\n一瞬、不安にさせられる。
1484 = "Trong một khoảnh khắc, tôi còn lo sợ không biết mình có bị xịt máu mũi hay không."
# 【日々姫】
# display as 日日姬
# JP: 「あむっ――っ――れるっ――れろっ――むちゅうっ」
1056 = "「Ngoạm——Liếm——Liếm——Mút.」"
# monologue
# JP: （しこ――しこ――しゅこ――しゅこっ――）
1863 = "（Sục——Sục——Sục——Sục——）"
# 【双鉄H】
# display as 雙鐵
# JP: 「～～～～～～っ！！」
1237 = "「~~~~~~!!」"
# monologue
# JP: 勃起の先だけを咥えこみ、\n余った竿を日々姫はその手でしごいてくれる。
1608 = "Chỉ ngậm lấy phần đỉnh đang cương cứng, phần thân gậy còn lại, Hibiki dùng tay sục cho tôi."
# 【日々姫】
# display as 日日姬
# JP: 「んっ――むっ――じゅるっ――むうっ――ンッ――\nれるっ――じゅるるっ――むうっ――はぷっ」
1061 = "「Ưm——Ưm——Chụt——Ưm——Ưm——Liếm——Chụt chụt——Ưm——Ngoạm.」"
# monologue
# JP: さらに奥で、口の全部で、\n僕を包もうとしてくれているのだろう。
1421 = "Em ấy đang cố gắng ngậm sâu hơn nữa, dùng cả khoang miệng để bao bọc lấy tôi đây mà."
# monologue
# JP: 日々姫の口は動こうとして、けれども先へ進めずに、\nもごもごゆるく、前後運動を繰り返す。
1705 = "Khuôn miệng Hibiki cố gắng cử động, nhưng không thể tiến sâu hơn được nữa, cứ ngậm lấy nhả ra, lặp đi lặp lại chuyển động tiến lùi."
# 【日々姫】
# display as 日日姬
# JP: 「むっ――むうう～～っ――んっ――ちゅううっ――\nじゅるるっ――れろっ――ぷはっ――むぅぅ～～～」
1039 = "「Ưm——Ưm~~——Ưm——Chụt——Chụt chụt——Liếm——Phù——Ưm~~~」"
# monologue
# JP: （しこ、しこ、もみゅ、もみゅっ）
# 1863 = "（上下套弄）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「くぁ――あっ――」
1016 = "「Kua——A——」"
# monologue
# JP: 時折触れてくる息や髪さえ\n僕の性感中枢に、尖った針のように突き刺さってくる。
1444 = "Đôi khi, cả hơi thở hay lọn tóc sượt qua, cũng đâm thẳng vào trung khu khoái cảm của tôi như những mũi kim sắc nhọn."
# monologue
# JP: これは、出る。すぐ射精する。\nだが、出すならば――
1507 = "Thế này thì, ra mất. Sẽ xuất tinh ngay mất thôi. Nhưng mà, nếu có ra thì——"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫――待って！　\nちょっと、ちょっとだけ待ってくれっ」
1143 = "「Hibiki——đợi đã! Đợi một chút, đợi anh một chút thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぷえっ！？」
1021 = "「Pue!?」"
# monologue
# JP: 不満と、不安を混じえた顔で、\n口をよだれでべとべとにして、日々姫は僕を見上げる。
1626 = "Với khuôn mặt đan xen giữa sự bất mãn và bất an, khuôn miệng dính đầy nước bọt nhầy nhụa, Hibiki ngước lên nhìn tôi."
# monologue
# JP: 欲望はさらに膨れるけれど――\nここは、はっきりしておきたいし、しなきゃいけない。
1791 = "Dục vọng càng lúc càng phình to——nhưng chỗ này, tôi muốn làm rõ, và bắt buộc phải làm rõ."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫――これは、もうマッサージの域を超えてる。\nこれは……完全に、口を使った、セックスだ」
1146 = "「Hibiki——thế này, đã vượt quá giới hạn của mát xa rồi. Đây là... hoàn toàn là, làm tình bằng miệng rồi.」"
# monologue
# JP: 口をつかったセックス、と。\nその表現が正しいかどうかわからない。
790 = "Làm tình bằng miệng, à. Tôi cũng chẳng biết diễn đạt như thế có đúng hay không."
# monologue
# JP: けれども日々姫は、その表情を固くしつつも、\nゆっくり――深く――頷いてくれる。
1667 = "Thế nhưng, Hibiki dù nét mặt có hơi cứng lại, vẫn chậm rãi——thật sâu——gật đầu với tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「セックスならば……マッサージからの流れのように、\n勢いでやっていいような、軽いことでは無いとも思う」
972 = "「Nếu là làm tình thì... anh nghĩ nó không phải là chuyện có thể thuận theo đà mát xa mà nhắm mắt làm bừa, không phải là chuyện hời hợt như thế đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「う……ん」
1066 = "「V...âng.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だから。\nこの先に進む前に、はっきり日々姫に伝えておきたい」
1121 = "「Thế nên. Trước khi tiến xa hơn, anh muốn nói rõ với Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1049 = "「啊」" 
# monologue
# JP: 安堵と喜びとが混じる息。\nそれを聞くなら、なんの不安も無しに話せる。
1528 = "Tiếng thở phào nhẹ nhõm xen lẫn niềm vui. Nghe được âm thanh ấy, tôi có thể nói ra mà chẳng còn chút bất an nào."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕は日々姫とセックスしたい。勢いでなく、流れでなく。\n日々姫と向き合い、日々姫を大事に、セックスしたい」
1116 = "「Anh muốn làm tình với Hibiki. Không phải vì bốc đồng, không phải vì thuận đà. Anh muốn đối diện với Hibiki, trân trọng Hibiki, và làm tình với em.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1082 = "「嗯！」" 
# monologue
# JP: 日々姫の顔がパっと輝く。\nぶんぶんと、もう全力で頷いている。
1655 = "Khuôn mặt Hibiki bừng sáng rạng rỡ. Em ấy gật đầu lia lịa, bằng tất cả sức lực của mình."
# 【日々姫】
# display as 日日姬
# JP: 「私も！　私もにぃにと、セックスしたかと！\nにぃにが大事で、大好きやけん」
1107 = "「Em cũng thế! Em cũng muốn làm tình với anh hai! Vì anh hai là người quan trọng nhất, là người em yêu nhất mà.」"
# monologue
# JP: 言うやいなやで日々姫の頭が素早く動き、\n僕の勃起をまたくっぷりと――
1661 = "Vừa dứt lời, đầu Hibiki đã chuyển động thoăn thoắt, lại ngậm trọn lấy phần cương cứng của tôi——"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
1026 = "「Ơ?」"
# monologue
# JP: ――くわえ込む、その直前で、指を差し出し押しとどめる。\n無論、気持ちはぐっぷりくわえてもらいたい。
1414 = "——Ngay trước khi em ấy ngậm vào, tôi đưa ngón tay ra cản lại. Tất nhiên, thâm tâm tôi cũng muốn em ấy ngậm trọn lấy nó lắm chứ."
# monologue
# JP: 勃起はひくつき、体全部がうずいてうずいて、\nそうされたくてたまらんのだが――
1521 = "Phần cương cứng cứ giật giật, toàn thân tôi rạo rực ngứa ngáy, khao khát được em ấy làm thế đến phát điên, nhưng mà——"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫、今は――僕は、その……\n射精するなら、日々姫の中で、したいのだ」
1156 = "「Hibiki, bây giờ thì——anh, ừm... nếu xuất tinh, anh muốn xuất vào bên trong Hibiki cơ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1049 = "「啊」" 
# monologue
# JP: 頬をいきなり真っ赤に染めて、\n日々姫が小さく、小さく頷く。
1637 = "Đôi má bỗng chốc đỏ bừng, Hibiki khẽ, gật đầu thật khẽ."
# 【日々姫】
# display as 日日姬
# JP: 「うん。私も――にぃにに――\nセックスで――お腹……おまんこに、射精してほしか」
1073 = "「Vâng. Em cũng——muốn anh hai——khi làm tình——xuất tinh vào trong bụng... vào trong cô bé của em.」"
# monologue
# JP: おまんこ。\n日々姫が言った言葉が、やらしくてまたクラクラする。
1747 = "Cô bé. Từ ngữ mà Hibiki thốt ra, nghe thật gợi tình khiến tôi lại thấy choáng váng."
# monologue
# JP: 小さな頃には、おまんまんと呼ぶと習ったが……\nそうか、おまんこ。おまんこなのか。
1465 = "Hồi nhỏ, tôi được dạy gọi là \"bướm\"... Ra vậy, là cô bé. Gọi là cô bé à."
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、日々姫――」
1220 = "「Nếu vậy thì, Hibiki——」"
# 【日々姫】
# display as 日日姬
# JP: 「あのっ、でもね！　にぃに！\n私、ずうっとしてみたかったけんっ」
1202 = "「À này, nhưng mà nhé! Anh hai! Em, đã luôn muốn thử làm chuyện này từ lâu rồi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
1093 = "「Hửm?」"
# 【日々姫】
# display as 日日姬
# JP: 「次にね？　次におくちで……おくちセックスするときは、\nにぃにの――精液…………飲んでも……よかと？」
957 = "「Lần tới nhé? Lần tới khi dùng miệng... khi làm tình bằng miệng, tinh dịch của anh hai... em uống... có được không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。無論大歓迎だ」
1079 = "「À. Tất nhiên là vô cùng hoan nghênh rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「よかったぁ」
1094 = "「May quá.」"
# monologue
# JP: 素晴らしくいやらしいおねだりを、\n驚くほどにあどけない顔で喜んで。
1452 = "Lời nài nỉ gợi tình đến mức tuyệt vời ấy, lại được em ấy vui vẻ thốt ra bằng một khuôn mặt ngây thơ đến kinh ngạc."
# monologue
# JP: （ころんっ）
1908 = "（Nằm xuống）"
# monologue
# JP: そして日々姫は布団の上に寝転がり、\n足を――大きく――広げてくれる。
1702 = "Và rồi Hibiki ngả người nằm xuống nệm, đôi chân——dang rộng ra."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫」
1148 = "「Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふぁ……あっ――にぃにぃ」
1018 = "「Phù... a——anh hai.」"
# monologue
# JP: キスを、する。\n軽く唇をあわせるだけで、すぐに離れる。
1496 = "Trao nhau, nụ hôn. Chỉ khẽ chạm môi vào nhau, rồi rời ra ngay lập tức."
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 1026 = "「哎？」" 
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫にしてもらって気持ちよかったから。\nしてあげたいんだ」
1149 = "「Vì được Hibiki làm cho sướng quá rồi. Nên anh cũng muốn làm cho em sướng.」"
# monologue
# JP: 指を伸ばして、日々姫の口の中へと入れる。\n可愛い舌を、指先でぷにぷに触って、はさむ。
1491 = "Tôi duỗi ngón tay ra, đưa vào trong miệng Hibiki. Dùng đầu ngón tay mân mê chiếc lưỡi nhỏ xinh, rồi kẹp lại."
# 【双鉄H】
# display as 雙鐵
# JP: 「舌を、伸ばしてくれないか？」
969 = "「Thè lưỡi ra, được không em?」"
# 【日々姫】
# display as 日日姬
# JP: 「ふぇ？　……ほ、ほーはふぁ？」
1025 = "「Hả? ...Th, thế này á?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、それでいい」
1086 = "「Ừ, thế là được rồi.」"
# monologue
# JP: （ぺろっ）
1904 = "（Liếm）"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
1232 = "「!!?」"
# monologue
# JP: （ちゅくっ――れろっ――ちゅるっ――じゅっ）
1872 = "（Chụt——Liếm——Chụt——Mút）"
# monologue
# JP: あかんべえした日々姫の舌を、\n舌で丹念に舐めていく。
1514 = "Chiếc lưỡi đang thè ra làm nũng của Hibiki, tôi dùng lưỡi mình tỉ mỉ liếm láp."
# 【日々姫】
# display as 日日姬
# JP: 「ふえっ――ふっ――やっ――ほれッ――\nふっ――ろふろふ――ひへっ――ひほひ――いひっ」
1015 = "「Hưa——Phù——Á——Kìa——Phù——Lêu lêu——Hihe——Hihohi——Ihi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうなんだ。\n舐められるのは、気持ちいいんだ」
1168 = "「Là vậy đó. Bị liếm, sướng lắm phải không.」"
# monologue
# JP: （ちゅろっ）
1874 = "（Chụt）"
# 【日々姫】
# display as 日日姬
# JP: 「ふやっ！？」
# 1002 = "「呀！？」" 
# monologue
# JP: だから、舐める。\n髪を、耳を、まぶたを、小鼻を、眼球を。
1541 = "Thế nên, tôi liếm. Mái tóc, vành tai, mí mắt, cánh mũi, nhãn cầu."
# 【日々姫】
# display as 日日姬
# JP: 「やっ――あっ――にぃにに――ンッ――\nぺろぺろ――ちゅっちゅ――されて――私っ」
996 = "「Á——A——Bị anh hai——Ưm——Liếm láp——Mút mát——Thế này——Em.」"
# monologue
# JP: 首の線から肩を、鎖骨を。\nそうして、さっきより、さらにはっきり形を浮かせる――
1502 = "Từ đường viền cổ xuống vai, rồi xương quai xanh. Và rồi, nhô lên rõ ràng hơn cả lúc nãy——"
# monologue
# JP: （ぱくっ）
1865 = "（Ngoạm）"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――おっぱいっ！　んっ――私――にぃににっ――\nんっ、おっぱい――ちゅうちゅう――して、もらってっ」
1046 = "「A——Ngực! Ưm——Em——Bị anh hai——Ưm, ngực——Mút mát——Cho.」"
# monologue
# JP: 乳首を舐めれば、\n日々姫の声と匂いの甘みが濃くなる。
1530 = "Vừa liếm nhũ hoa, giọng nói và mùi hương của Hibiki càng trở nên ngọt ngào hơn."
# monologue
# JP: その反応に勇気づけられ、\n舌だけじゃなく、唇の動きもそこに加える。
1442 = "Phản ứng ấy tiếp thêm cho tôi dũng khí, không chỉ dùng lưỡi, tôi còn thêm cả chuyển động của đôi môi vào đó."
# monologue
# JP: （はぷっ）
1909 = "（Ngoạm nhẹ）"
# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　んっ――あっ――もっと――おねがいっ！\nにぃにっ――服っ――じゃまっ――んふ――んっ」
1004 = "「Á!? Ưm——A——Nữa đi——Xin anh! Anh hai——Quần áo——Vướng quá——Ưm——Ưm.」"
# monologue
# JP: 日々姫がもぞもぞ身悶えし、汗ばむ肌を露出していく。\n――大胆に服をはだけてくれる。
1622 = "Hibiki vặn vẹo cơ thể, để lộ ra làn da đẫm mồ hôi. ——Mạnh bạo cởi tung quần áo ra."
# monologue
# JP: （ちゅうっ）
# 1874 = "（啾）" 
# 【日々姫】
# display as 日日姬
# JP: 「きゃっ！？　ベロっ――んっ――ちょく、だと――\nあっ――ぬらって――これっ――すごく――いいっ」
1007 = "「Á!? Lưỡi——Ưm——Chạm trực tiếp, thế này——A——Ướt át quá——Thế này——Sướng——Quá.」"
# monologue
# JP: （ちゅむっ――はむっ――れろっ――れるっ）
1905 = "（Chụt——Ngoạm——Liếm——Liếm）"
# monologue
# JP: 揉みたい気持ちを我慢して、とにかく舌と唇だけで、\n日々姫のおっぱいを刺激していく。
1499 = "Cố nhịn cảm giác muốn nắn bóp, tôi chỉ dùng lưỡi và môi, để kích thích bầu ngực của Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「先っぽ――乳首――ちゅうちゅう、され、て――んっ\nおっぱい、ぺろぺろ――されて――溶け、ちゃうっ」
992 = "「Đầu ngực——Nhũ hoa——Bị mút mát——Ưm, bầu ngực, bị liếm láp——Sắp tan chảy, mất thôi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んむっ」
# 1081 = "「嗯」" 
# monologue
# JP: 溶けては困る。\nそれに、おっぱいだけじゃ足りない。
1735 = "Tan chảy thì gay go lắm. Hơn nữa, chỉ bầu ngực thôi thì chưa đủ."
# monologue
# JP: （ぺろっ――）
1902 = "（Liếm——）"
# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　おへそ――までっ――」
1009 = "「Á!? Cả rốn——Nữa sao——」"
# monologue
# JP: おへそ、脇腹――\nアバラのラインにそって丁寧に舐めていく。
1476 = "Rốn, eo——Tôi tỉ mỉ liếm dọc theo đường xương sườn."
# monologue
# JP: そして腰から腰骨に沿い――
1701 = "Rồi từ eo dọc theo xương chậu——"
# monologue
# JP: （しゅりっ）
# 1867 = "（咕啾）" 
# 【日々姫】
# display as 日日姬
# JP: 「んふっ！！！」
1084 = "「Ưm!!!」"
# monologue
# JP: 舌は、パンツに行き当たる。
1523 = "Lưỡi tôi, chạm đến chiếc quần lót."
# monologue
# JP: 舐めても無いのに、股間の部分はぐっしょりしてる。\n――透けて、張り付き。スジの形が浮いている。
1676 = "Dù chưa hề liếm, phần đũng quần đã ướt đẫm. ——Xuyên thấu, dính chặt. Hằn lên cả hình dáng của khe rãnh."
# 【双鉄H】
# display as 雙鐵
# JP: 「これが……日々姫のおまんこか」
1190 = "「Đây là... cô bé của Hibiki sao.」"
# monologue
# JP: （くぱっ！）
1888 = "（Tách ra!）"
# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　にぃに――パンツの上から――\n広げる、とか――それっ」
1001 = "「Á!? Anh hai——Cách lớp quần lót——Mà vạch ra, thế này——Đó là.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いやか？」
965 = "「Em ghét à?」"
# monologue
# JP: （ぼふっ！）
1877 = "（Bùng!）"
# monologue
# JP: 聞けば日々姫は、耳まで真っ赤にそまってしまう。
1534 = "Nghe hỏi vậy, Hibiki đỏ bừng cả mặt mũi đến tận mang tai."
# 【日々姫】
# display as 日日姬
# JP: 「イヤじゃ……なか、とよ？\nにぃにがじいって――見てくれるの……嬉しか、と」
1105 = "「Không phải là... ghét, đâu. Được anh hai nhìn chằm chằm——như thế... em thấy vui, lắm.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「よかった。\nなにせ、僕はおまんこのことをよく知らんのでな」
1206 = "「May quá. Dù sao thì, anh cũng không rành về cô bé cho lắm.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……そんなら……おまん、こ、の――こと――\n私……教えてあげたら……よか、と？」
1048 = "「A... Nếu vậy... chuyện về, cô, bé——Để em... dạy cho anh... có được, không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、頼めるか？」
1090 = "「Ừ, nhờ em nhé?」"
# monologue
# JP: こくん、と無言で頷いて\nそうして日々姫は、唇の端を素早く舐める。
1674 = "Gật đầu cái rụp trong im lặng, rồi Hibiki nhanh chóng liếm mép môi."
# 【日々姫】
# display as 日日姬
# JP: 「えっと……おまんこの、一番おへそ側のとこ――\nぷっくりしてるとこ、あるでしょお？」
1200 = "「Ừm... Chỗ gần rốn nhất của cô bé——có một chỗ phồng lên, đúng không ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1081 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「そこが……く、くり――クリトリス、ばい。\n女の子……おちん、ちんって……言われてる、とこ」
1213 = "「Chỗ đó là... â, âm——âm vật, đấy ạ. Chỗ được gọi là... cậu, nhỏ... của con gái, ấy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、舐めれば気持ちいいのか？」
1219 = "「Nếu vậy, liếm vào thì sẽ sướng à?」"
# monologue
# JP: （ずちゅっ！　れるうううううっつっ！）
1873 = "（Chụt! Liếmmmmmm!）"
# 【日々姫】
# display as 日日姬
# JP: 「んふうっ！？　ひゃっ！？　んうううっ！！？\nにぃにっ――つよ、すぎっ――くふうんっ！」
1019 = "「Ưm!? Á!? Ưmmm!!? Anh hai——Mạnh, quá——Ưm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「む、すまん――っ！？」
1011 = "「Ơ, xin lỗi——!?」"
# monologue
# JP: 口を離してひろげなおせば、\n日々姫のおまんこの内側は、さっきと様子を変えている。
1512 = "Rời môi ra và vạch lại một lần nữa, bên trong cô bé của Hibiki đã thay đổi so với lúc nãy."
# monologue
# JP: ぷくり、と蜜が、パンツの内から押されたように、\n溢れてきている。
1765 = "Mật dịch ứa ra, như thể bị ép từ bên trong chiếc quần lót, trào ra ngoài."
# 【日々姫】
# display as 日日姬
# JP: 「く……クリトリスの、下、に――ちっちゃな……\nおしっこの、穴ば、あって――それでその、もっと、下」
1228 = "「Bên... dưới âm vật——có một cái lỗ... nhỏ để, đi tiểu——Và rồi, ở dưới đó, nữa.」"
# monologue
# JP: もっと、下。\n僕の視線はさっきから、その一点に釘付けられている。
1384 = "Ở dưới đó, nữa. Ánh mắt tôi từ nãy đến giờ, vẫn dán chặt vào một điểm đó."
# monologue
# JP: 蜜がぷくりと膨れては、\nはじけて、パンツに染みきれずとろり流れ落ちていく。
1797 = "Mật dịch ứa ra phồng lên, rồi vỡ tung, không thấm hết vào quần lót mà chảy dọc xuống sền sệt."
# 【日々姫】
# display as 日日姬
# JP: 「お、おまんこ、の――お、おちんちん、ば――\n受け入れる――穴っ――ち、[ちつこう,1]膣口、が――そのっ」
1214 = "「Của, cô bé——Lỗ——để đón nhận——cậu, nhỏ——là, cửa âm đạo——Cái đó.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……パンツごしだとよくわからんな。\n[じか]直に、見せてもらってもいいか？」
802 = "「...Cách lớp quần lót thì khó nhìn quá. Anh có thể, xem trực tiếp được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「う、うん。――わたしも、にぃにに、見て欲しか」
1070 = "「V, vâng. ——Em cũng, muốn anh hai, nhìn thấy.」"
# monologue
# JP: （べちょっ――）
1879 = "（Nhóp nhép——）"
# monologue
# JP: ぐっしょり濡れてるパンツをもじもじ、\n日々姫は足から抜いていく。
1621 = "Vặn vẹo cơ thể, Hibiki cởi chiếc quần lót ướt đẫm ra khỏi chân."
# 【日々姫】
# display as 日日姬
# JP: 「ぁっ――」
# 1049 = "「啊」" 
# monologue
# JP: （くぱあっ！）
# 1888 = "（扒開！）" 
# monologue
# JP: それももどかしくおまんこを指で広げれば、\n日々姫のかわいい膣口は、ひくひく震え蜜を零して――
1504 = "Mất kiên nhẫn, tôi dùng ngón tay vạch cô bé ra, cửa âm đạo dễ thương của Hibiki run rẩy, nhỏ từng giọt mật dịch——"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々、姫」
# 1148 = "「日日姬」" 
# monologue
# JP: ――僕を待っててくれている。\n思えば頭が白く弾ける。
789 = "——Đang chờ đợi tôi. Vừa nghĩ đến đó, đầu óc tôi như nổ tung trắng xóa."
# monologue
# JP: ただひとつ。\nただそれだけしか、望めなくなる。
1720 = "Chỉ một điều. Tôi chẳng còn khao khát điều gì khác ngoài điều đó nữa."
# 【双鉄H】
# display as 雙鐵
# JP: 「セックス、しよう。\n僕は、日々姫とセックスしたい」
1110 = "「Làm tình, nhé. Anh muốn, làm tình với Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。うん。にぃに」
1072 = "「Vâng. Vâng. Anh hai.」"
# monologue
# JP: 言って、こくりとツバを飲み。
1781 = "Nói rồi, tôi ực một tiếng nuốt nước bọt."
# monologue
# JP: そして日々姫は、まっすぐまっすぐ、僕を見つめる。
1604 = "Còn Hibiki, thì nhìn thẳng, nhìn chằm chằm vào tôi."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、どうか。\n私の、処女を――はじめてを――もらって、ください」
1033 = "「Anh trai, xin anh. Trinh tiết của em——lần đầu tiên của em——hãy nhận lấy, nhé.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。喜んで。\n日々姫もどうか、僕のはじめてを貰って欲しい」
1080 = "「Ừ. Rất sẵn lòng. Hibiki cũng vậy, xin em hãy nhận lấy lần đầu tiên của anh.」"
# 【日々姫】
# display as 日日姬
# JP: 「もらう！　絶対！　にぃにの童貞っ！\nぜったい、誰にも！　他の誰にも、あげんもんっ！」
1119 = "「Em sẽ nhận! Chắc chắn! Đời trai tân của anh hai! Tuyệt đối, không nhường cho ai! Không nhường cho bất kỳ ai khác đâu!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうしよう」
1092 = "「Ừ, cứ làm vậy đi.」"
# monologue
# JP: （ちゅっ――）
1870 = "（Chụt——）"
# monologue
# JP: 軽いキスをし、\nぬらつく肌とぬらつく肌とをこすり合わせる。
1531 = "Trao nhau nụ hôn nhẹ, chà xát những làn da trơn trượt mồ hôi vào nhau."
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ――あっ――んっ――にぃに――にぃにぃっ」
1017 = "「Phù——A——Ưm——Anh hai——Anh hai.」"
# monologue
# JP: 切なげな声。日々姫の匂い。\n熱めの体温。
1724 = "Giọng nói nghe thật não nề. Mùi hương của Hibiki. Nhiệt độ cơ thể nóng rực."
# monologue
# JP: 全てが欲しくて、我慢だなんて出来なくて。\nだから、ゆっくり――勃起を膣口に押し当てる。
1505 = "Muốn có được tất cả, chẳng thể nào kìm nén được nữa. Thế nên, chầm chậm——tôi ấn phần đang cương cứng vào cửa âm đạo."
# monologue
# JP: （みちっ――）
1891 = "（Chèn vào——）"
# 【日々姫】
# display as 日日姬
# JP: 「はっ――あっ――くっ――」
1041 = "「Hơ——A——Ư——」"
# monologue
# JP: 日々姫は、狭い。\nその上、ぎゅうぎゅう締めてくる。
1650 = "Hibiki, chật quá. Hơn nữa, còn siết chặt lấy tôi."
# monologue
# JP: 僕の勃起の先端が、押し潰されてしまうほど。\nはっきりとした痛みを僕が、感じるほどに。
1768 = "Lực siết mạnh đến mức phần đỉnh đang cương cứng của tôi như bị nghiền nát. Đến mức tôi cảm nhận được rõ ràng cơn đau."
# 【日々姫】
# display as 日日姬
# JP: 「かはっ――んっ――ん、くっ――」
1044 = "「A——Ưm——Ưm, hự——」"
# monologue
# JP: だが、僕の感じる痛みなど、\n日々姫のそれの百分の一も無いだろう。
1367 = "Nhưng, nỗi đau mà tôi đang cảm nhận, có lẽ chưa bằng một phần trăm so với những gì Hibiki đang chịu đựng."
# monologue
# JP: 勃起の先さえ全部は入っていないのに、\n日々姫の額には、びっしりと汗が浮かんでる。
1722 = "Dù phần đỉnh vẫn chưa vào hết, trên trán Hibiki đã lấm tấm mồ hôi."
# 【日々姫】
# display as 日日姬
# JP: 「にぃ――に――わた、しっ――っ――\nはっ――あっ――平気――だか、らっ――」
1222 = "「Anh——hai——em——Hơ——A——Không sao——đâu——」"
# monologue
# JP: なのに日々姫は、僕を見、笑う。
1707 = "Vậy mà Hibiki, vẫn nhìn tôi, và mỉm cười."
# monologue
# JP: 少し引きつってしまっているが、\n綺麗な笑顔で、僕を励ましてさえくれる。
1804 = "Dù nụ cười có hơi gượng gạo, nhưng bằng một nụ cười tuyệt đẹp, em ấy vẫn cố gắng khích lệ tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1081 = "「嗯」" 
# monologue
# JP: だから、心を揺るがせずに済む。\n日々姫を僕のものにする。僕が、日々姫のものになる。
1539 = "Nhờ thế, tôi không còn cảm thấy dao động nữa. Biến Hibiki thành của tôi. Và tôi, sẽ trở thành của Hibiki."
# monologue
# JP: その喜びを得るために――\n苦痛があっても、一緒に、越えていく他にない。
1695 = "Để có được niềm hạnh phúc đó——dù có đớn đau, cũng chẳng còn cách nào khác ngoài việc cùng nhau vượt qua."
# monologue
# JP: （みちっ――めりっ――）
# 1891 = "（插入――）" 
# 【日々姫】
# display as 日日姬
# JP: 「ぁっ――んっ――くっ――はっ――んんっ――」
1043 = "「A——Ưm——Hự——Hơ——Ưm——」"
# monologue
# JP: 肉を割ってる感触がある。\nぴったり張り付いてるものを、無理やり剥がす感覚がある。
1526 = "Có cảm giác như đang xé rách da thịt. Cảm giác như đang cưỡng ép lột thứ gì đó dính chặt ra."
# monologue
# JP: 痛い、と日々姫は口にしない。\nそれを口にしてしまったならば、僕が止まると恐れてる。
1368 = "Hibiki không hề thốt lên chữ đau. Em ấy sợ rằng nếu nói ra, tôi sẽ dừng lại mất."
# 【双鉄H】
# display as 雙鐵
# JP: （これは、長引かせては余計に辛さを与えるだけだな）
1914 = "（Thế này, nếu cứ kéo dài thì chỉ càng làm em ấy thêm đau đớn thôi.）"
# monologue
# JP: 一気に、腰を進めるしかない。\nその方法なら、とても簡単に思いつく。
1494 = "Chỉ còn cách, dùng sức đâm thẳng vào. Nếu là cách đó, thì rất dễ nghĩ ra."
# monologue
# JP: 日々姫は日々姫で、とても真面目で、\n僕を完全に、信頼しきってくれているから。
1358 = "Bởi vì Hibiki, em ấy rất nghiêm túc, và hoàn toàn, tin tưởng tuyệt đối vào tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫。これは、一気にいった方がいい」
1157 = "「Hibiki. Chuyện này, làm một mạch luôn thì tốt hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「んっ！　んっ！」
1083 = "「Vâng! Vâng!」"
# monologue
# JP: 目にいっぱいに涙をためて、\n日々姫が声を出さずに頷く。
1642 = "Nước mắt lưng tròng, Hibiki gật đầu không thành tiếng."
# 【双鉄H】
# display as 雙鐵
# JP: 「１、２の３で思い切り突きこむから、\nそのとき、力を入れないでくれ」
1112 = "「Anh đếm một, hai, ba rồi sẽ đâm mạnh vào, lúc đó, em đừng gồng mình nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「んっ！」
# 1082 = "「嗯！」" 
# monologue
# JP: ならば、あとはやるだけだ。
1552 = "Nếu vậy, việc còn lại chỉ là làm thôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「いいか？　いくぞ――いーち、にぃ」
1182 = "「Được chứ? Bắt đầu nhé——Mộttttt, haiiii.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふやっ！？　あっ――んくううううううううっ！！！」
1003 = "「Hya!? A——Ưmmmmmmmm!!!」"
# monologue
# JP: ３に備えて緩んだところを、一気にえぐるっ！\n何かをぷつりと切った感覚。
1412 = "Lợi dụng lúc em ấy thả lỏng chuẩn bị cho tiếng đếm thứ 3, tôi đâm phập vào! Cảm giác như vừa chọc thủng một thứ gì đó."
# monologue
# JP: そして勃起の先端は、肉の扉にこつんとあたり――\n全部を、ぐっぽり収めて止まる。
1703 = "Và rồi phần đỉnh đang cương cứng chạm vào cánh cửa bằng thịt——nằm trọn vẹn bên trong rồi dừng lại."
# 【日々姫】
# display as 日日姬
# JP: 「はっ――ひっ――んっ――ふあっ――あっ――」
1013 = "「Hơ——Hi——Ưm——Phù——A——」"
# monologue
# JP: 日々姫の可愛いおっぱいが、\n呼吸にあわせ激しく動き、震えてる。
1617 = "Bầu ngực đáng yêu của Hibiki, phập phồng dữ dội theo từng nhịp thở, và đang run rẩy."
# 【日々姫】
# display as 日日姬
# JP: 「わ、私――これ、で――にぃにと――ひとつにっ」
1104 = "「E, em——thế, này——đã hòa làm một——với anh hai, rồi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、完全にひとつになった」
1088 = "「Ừ, đã hoàn toàn hòa làm một rồi.」"
# monologue
# JP: 結合部から、日々姫の真っ赤な血が溢れてる。\n日々姫の純潔を僕が奪った。
1671 = "Từ chỗ kết hợp, dòng máu đỏ tươi của Hibiki đang rỉ ra. Tôi đã tước đi sự thuần khiết của Hibiki."
# monologue
# JP: ぞくぞくと、動物的な達成感が、\n圧倒的な所有欲が、腹の底からわきおこってくる。
1767 = "Từng cơn rùng mình, cảm giác thành tựu mang tính bản năng, cùng dục vọng chiếm hữu mãnh liệt, đang trào dâng từ tận đáy lòng."
# 【日々姫】
# display as 日日姬
# JP: 「え……へ、へ」
1020 = "「E... hê, hê.」"
# monologue
# JP: 日々姫が、笑う。
1654 = "Hibiki, mỉm cười."
# monologue
# JP: 汗をびっしりかいてる顔で、それでも、\nとても幸せそうに。
1427 = "Dù khuôn mặt đang đẫm mồ hôi, nhưng em ấy, trông vẫn vô cùng hạnh phúc."
# 【日々姫】
# display as 日日姬
# JP: 「……やったぁ」
799 = "「...Tuyệt quá.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！！」
1231 = "「!!!」"
# monologue
# JP: ささやかな。\nけれど、幸せに満ち満ちた声。
1450 = "Một giọng nói khẽ khàng. Nhưng lại đong đầy niềm hạnh phúc."
# monologue
# JP: それが鼓膜を揺すった瞬間、\n僕の歯止めが外れてしまう！
1748 = "Khoảnh khắc âm thanh ấy rung lên màng nhĩ, tôi hoàn toàn mất kiểm soát!"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫っ！！！」
1154 = "「Hibiki!!!」"
# monologue
# JP: （ずりゅうううううううううっ！！！！）
1892 = "（Phậppppppppp!!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「はっ――んひゅっ！！？　――んっ！」
1014 = "「Hơ——Nhyu!!? ——Ưm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫――好きだっ――大好きだっ！！」
1142 = "「Hibiki——Anh yêu em——Anh yêu em nhiều lắm!!」"
# monologue
# JP: （ばちゅんっ！！！！）
1878 = "（Bạch!!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃうっ！　あっ――にぃにっ――んっ――\n私――私の方が――もっと、好きっ！」
998 = "「Hyau! A——Anh hai——Ưm——Em——Em mới là người——yêu anh nhiều hơn!」"
# monologue
# JP: （きゅんっ！　きゅんっ！！！）
1897 = "（Siết chặt! Siết chặt!!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
1010 = "「Kua!」"
# monologue
# JP: 強ばっていた日々姫の膣の内壁が、\nその瞬間に甘く柔らかく蠢きはじめるっ！！
1660 = "Vách âm đạo đang căng cứng của Hibiki, khoảnh khắc ấy bỗng trở nên ngọt ngào, mềm mại và bắt đầu rục rịch!!"
# 【双鉄H】
# display as 雙鐵
# JP: 「な――これっ――うぁっ――あっ」
1191 = "「Gì——Thế này——Ua——A.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふえっ！？　あっ――んっ――\nなか――ひあっ――めくれ――てっ――んっ！！」
1022 = "「Hưa!? A——Ưm——Bên trong——Hia——Bị cọ xát——Rồi——Ưm!!」"
# monologue
# JP: 日々姫の声にも甘さが混じる。
1614 = "Giọng nói của Hibiki cũng pha lẫn sự ngọt ngào."
# monologue
# JP: それがまたどろどろとした塊となり、\n僕の精巣に流れ込んでは、精液を一気に押し上げる。
1447 = "Nó lại biến thành một khối sền sệt, chảy vào tinh hoàn của tôi, rồi đẩy tinh dịch lên trên cùng một lúc."
# monologue
# JP: （ずぶっ！　ずばっ！　ずぱっ！　ばちゅんっ！！）
1876 = "（Phập! Bạch! Bạch! Bạch!!）"
# 【日々姫】
# display as 日日姬
# JP: 「んっ――ふあっ――やっ――しゅごっ――んっ――\nにいにっ――おちん、ちんっ――なかで――ぷく、って」
1059 = "「Ưm——Phù——Á——Sướng quá——Ưm——Anh hai——Cậu, nhỏ——Bên trong——Đang phình, ra.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫！　日々姫！　日々姫！　日々姫！」
1153 = "「Hibiki! Hibiki! Hibiki! Hibiki!」"
# monologue
# JP: （ずばっ！　じゅぱんっ！　じゅぶっ！　じゅぼぶっ！）
1875 = "（Bạch! Chụt! Chụt! Chụt!）"
# monologue
# JP: 日々姫の膣内が張り付いてくる。\n本当に、何かをめくる感じがしてる。
1645 = "Bên trong âm đạo của Hibiki đang bám chặt lấy tôi. Thật sự, có cảm giác như đang cọ xát vào một thứ gì đó."
# monologue
# JP: 最初からギリギリだった僕の勃起は、\nもう白熱して白熱しきって、一秒だって耐えられなくて！
1501 = "Phần đang cương cứng vốn đã ở giới hạn ngay từ đầu của tôi, giờ đã nóng rực, nóng rực lên, chẳng thể chịu đựng thêm dù chỉ một giây!"
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫！　日々姫！　僕はっ！　もうっ！！」
1151 = "「Hibiki! Hibiki! Anh! Sắp!!」"
# 【日々姫】
# display as 日日姬
# JP: 「イって！　にぃにっ！　わたしの、なか、でっ――\nんっ、おまんこの、なか、で――ぴゅっぴゅ、してぇ！」
971 = "「Ra đi! Anh hai! Ở bên trong, em——Ưm, ở bên trong, cô bé——Bắn tinh, đi anh!」"
# monologue
# JP: （きゅううううううっ！！）
1862 = "（Siết chặttttt!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
1052 = "「Kua!」"
# monologue
# JP: （びゅううっ！　びゅるるっ！　どびゅっ！　びゅう！）
1883 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん――ああ、あっ」
1063 = "「Ưm——A, a.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふあああああああああああんっ！！！」
1050 = "「Fuaaaaaaaaaaan!!!」"
# monologue
# JP: （びゅうっ！　びゅるっ！　びゅぶっ！　びゅっ！）
1881 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「来たっ！　きてるっ――あうっ――んっ――\nあつい、の――精液――おなか――子宮、にっ――」
970 = "「Đến rồi! Đến rồi——A——Ưm——Nóng quá——Tinh dịch——Bụng——Tử cung, đang——」"
# monologue
# JP: 日々姫の声を聞いた瞬間、そうしなければと強く感じて、\n腰を最奥へとみっちり押し込みっ！！！
1664 = "Khoảnh khắc nghe thấy giọng nói của Hibiki, tôi cảm thấy mình phải làm như vậy, và đẩy mạnh hông vào tận sâu bên trong!!!"
# 【双鉄H】
# display as 雙鐵
# JP: 「んくあっ！」
# 1082 = "「嗯！」" 
# monologue
# JP: （びゅるんっ！）
1885 = "（Phụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃうんっ！！！」
999 = "「Hyaun!!!」"
# monologue
# JP: 日々姫が跳ねる。
1624 = "Hibiki giật nảy người."
# monologue
# JP: 出てる――出きった――出しきった。
1460 = "Đang ra——Ra hết rồi——Đã ra hết rồi."
# monologue
# JP: （とさっ）
1868 = "（Bịch）"
# monologue
# JP: 繋がったまま、日々姫の隣にくずれて落ちる。\nすぐさま日々姫は、汗だくの顔を寄せてくる。
1482 = "Vẫn trong tư thế gắn kết, tôi đổ gục xuống bên cạnh Hibiki. Ngay lập tức, Hibiki kề khuôn mặt đẫm mồ hôi lại gần."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに……大好きっ」
1225 = "「Anh hai... Em yêu anh.」"
# monologue
# JP: （ちゅっ）
# 1874 = "（啾）" 
# monologue
# JP: そして、キス。\nキス。キス。キス。キス。
1492 = "Và rồi, nụ hôn. Nụ hôn. Nụ hôn. Nụ hôn. Nụ hôn."
# monologue
# JP: 日々姫の唇と唾液と舌と。それにどろどろ溶かされながら\n――僕は眠りに、落ちていく。
1635 = "Đôi môi, nước bọt và chiếc lưỡi của Hibiki. Vừa bị những thứ đó làm cho tan chảy——tôi chìm dần, vào giấc ngủ."
