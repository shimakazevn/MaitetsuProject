1116 = "「我想跟日日姬做愛。不是一時興起、不是心血來潮。我想堂堂正正地、同時也小心謹慎地，跟日日姬結合」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1082 = "「嗯！」" 

# monologue
# JP: 日々姫の顔がパっと輝く。\nぶんぶんと、もう全力で頷いている。
1655 = "日日姬笑逐顏開。只見她使出了全身的力量點頭同意。" 

# 【日々姫】
# display as 日日姬
# JP: 「私も！　私もにぃにと、セックスしたかと！\nにぃにが大事で、大好きやけん」
1107 = "「我也想！我也想跟阿哥做愛！阿哥是我重要的人，也是我最愛的人」" 

# monologue
# JP: 言うやいなやで日々姫の頭が素早く動き、\n僕の勃起をまたくっぷりと――
1661 = "日日姬說完腦袋就往前一伸，眼看就又要我的肉棒含進去――" 

# 【日々姫】
# display as 日日姬
# JP: 「え？」
1026 = "「哎？」" 

# monologue
