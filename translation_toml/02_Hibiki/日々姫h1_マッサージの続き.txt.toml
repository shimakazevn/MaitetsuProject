1414 = "在那之前，我用手攔住了她。我自然是想讓她繼續用小嘴含著我。" 

# monologue
# JP: 勃起はひくつき、体全部がうずいてうずいて、\nそうされたくてたまらんのだが――
1521 = "我的肉棒在抽搐，我的全身都在興奮地發顫，真的好想讓她用嘴――" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫、今は――僕は、その……\n射精するなら、日々姫の中で、したいのだ」
1156 = "「日日姬，我現在，那個……想在日日姬的體內射精」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1049 = "「啊」" 

# monologue
# JP: 頬をいきなり真っ赤に染めて、\n日々姫が小さく、小さく頷く。
1637 = "日日姬的小臉瞬間變得通紅，然後她輕輕點頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。私も――にぃにに――\nセックスで――お腹……おまんこに、射精してほしか」
1073 = "「嗯。我也想跟阿哥――做愛――然後在我的肚子裡……小穴裡射精」" 

# monologue
# JP: おまんこ。\n日々姫が言った言葉が、やらしくてまたクラクラする。
1747 = "聽到日日姬說“小穴”，我不禁一陣眩暈。" 

# monologue
# JP: 小さな頃には、おまんまんと呼ぶと習ったが……\nそうか、おまんこ。おまんこなのか。
1465 = "小時候學過那裡叫“小妹妹”……對啊，“小穴”。現在叫“小穴”啊。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、日々姫――」
1220 = "「那麼，日日姬――」" 

# 【日々姫】
# display as 日日姬
# JP: 「あのっ、でもね！　にぃに！\n私、ずうっとしてみたかったけんっ」
1202 = "「那個，但是！阿哥！我一直想試一試」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
1093 = "「嗯？」" 

# 【日々姫】
# display as 日日姬
