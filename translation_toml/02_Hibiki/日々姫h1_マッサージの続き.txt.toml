1435 = "她用那夏天時每天都在舔冰淇淋的小舌，那純潔無瑕的小舌舔了我――" 

# 【日々姫】
# display as 日日姬
# JP: 「ちゅっ――れるっ――ちゅむっ――ちゅるっ――」
1055 = "「啾――啾嚕――啾噗――啾噗――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫……いい、すごく――素晴らしく気持ちいい」
1147 = "「日日姬……好棒……好舒服」" 

# monologue
# JP: 嬉しげに、日々姫の目がアーチを描――っ！？
1670 = "日日姬高興得眉毛彎成了一條弧線――" 

# 【日々姫】
# display as 日日姬
# JP: 「んふっ――ちゅっ――ぺろっ――ちゅるっ――ぺろおっ\n――れろれろ――れるーーーっっ――――――ぱくっ！」
1065 = "「嗯――啾――啾嚕――哧溜――吸溜――啾嚕――啾嚕――（咬住）！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！　あっ――」
1051 = "「啊！　啊――」" 

# monologue
# JP: 舌の動きが加速する。\n快感が、棒状になって頭の先まで抜けていく。
1454 = "她舌頭的動作越來越快。強烈的快感好像凝固成了一根棒子，直接捅到了我的腦中。" 

# monologue
# JP: 鼻血が出てしまったのではないかと、\n一瞬、不安にさせられる。
1484 = "我一時間都有點擔心自己會流鼻血了。" 

# 【日々姫】
# display as 日日姬
# JP: 「あむっ――っ――れるっ――れろっ――むちゅうっ」
1056 = "「啾――啾嚕――啾嚕――啾噗」" 

# monologue
# JP: （しこ――しこ――しゅこ――しゅこっ――）
1863 = "（上下套弄）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「～～～～～～っ！！」
1237 = "「～～～～～～！！」" 

# monologue
# JP: 勃起の先だけを咥えこみ、\n余った竿を日々姫はその手でしごいてくれる。
1608 = "日日姬含著我的龜頭，還用手套弄著肉棒的剩餘部分。" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ――むっ――じゅるっ――むうっ――ンッ――\nれるっ――じゅるるっ――むうっ――はぷっ」
1061 = "「嗯――唔――啾噗――唔――嗯――啾嚕――啾噗――嗯――啾噗」" 

# monologue
# JP: さらに奥で、口の全部で、\n僕を包もうとしてくれているのだろう。
1421 = "她一定是想讓肉棒更深入一些、想用上小嘴裡每一寸地方把肉棒容納進去。" 

# monologue
