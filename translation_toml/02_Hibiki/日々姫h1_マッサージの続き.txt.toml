957 = "「下一次，用嘴……用嘴做愛的時候，可以讓我…………喝下阿哥的精液嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。無論大歓迎だ」
1079 = "「嗯。我當然歡迎」" 

# 【日々姫】
# display as 日日姬
# JP: 「よかったぁ」
1094 = "「太好了」" 

# monologue
# JP: 素晴らしくいやらしいおねだりを、\n驚くほどにあどけない顔で喜んで。
1452 = "她的要求是那麼的誘人，聽到我答應後她又顯得那麼開心。" 

# monologue
# JP: （ころんっ）
1908 = "（躺下）" 

# monologue
# JP: そして日々姫は布団の上に寝転がり、\n足を――大きく――広げてくれる。
1702 = "然後日日姬就躺在了被子上，雙腿大張。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫」
1148 = "「日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「ふぁ……あっ――にぃにぃ」
1018 = "「呼……啊――阿哥」" 

# monologue
# JP: キスを、する。\n軽く唇をあわせるだけで、すぐに離れる。
