[script]
# lines: 357 
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、起きとぉ？」
1227 = "「阿哥，你還醒著嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1081 = "「嗯」" 

# monologue
# JP: 祝勝会は、明日あらためて。\n今日は、体を休めよう。
1420 = "大家決定明天再開慶祝會。今天就好好休息一下。" 

# monologue
# JP: みなでそう決め、\n早めの帰宅を出来たところまでは良かったが……
1536 = "所以今天能早點回家，這樣自然是不錯……" 

# 【双鉄H】
# display as 雙鐵
# JP: 「やはり、高ぶっているのだろうな。\nすぐに眠ろうという気にさえならん」
1164 = "「果然精神還是太興奮了。感覺一時半會睡不著」" 

# 【日々姫】
# display as 日日姬
# JP: 「そうだと思った。私も同じやけん」
1114 = "「我想就是，我也一樣」" 

# monologue
# JP: 言って、日々姫が入ってくる。\nパジャマにも着替えず、まだ普段着だ。
1776 = "話音剛落，日日姬就進來了。她還沒換上睡衣，穿的還是白天的衣服。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、散歩にでも行くか？」
1210 = "「那我們就去散步吧？」" 

# 【日々姫】
# display as 日日姬
# JP: 「それも良かけど――いいです、けど」
1124 = "「散步當然是不錯，可是――」" 

# monologue
# JP: こほん、と小さく咳払い。\nそして日々姫は、にじり、わずかに近寄ってくる。
1618 = "日日姬小聲咳了一下。然後她稍微靠近了一些。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん。絶対疲れてるから。だから私、兄さんに――\nマッサージ、してあげたいなって思って来たの」
1029 = "「哥哥一定很累了。所以我想給哥哥――做個按摩」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1230 = "「！」" 

# monologue
# JP: マッサージ。その一言が、僕の記憶を呼び覚ます。\nいつぞやの、日々姫の足踏みマッサージ。
1549 = "按摩。這個詞喚起了我的記憶。記得日日姬給我做過腳踩按摩。" 

# monologue
# JP: 日々姫の気持ちを聞かせてもらった今ならわかる気がする。\nあの時日々姫は僕にパンツを、意識して見せていたのだと。
1721 = "現在我知道日日姬對我懷有好感了，我便明白那時候她是故意露內褲給我看的。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
1037 = "「哦――」" 

# monologue
# JP: ならば日々姫も、同じことを望んでくれてる。\nそう感じれば、体が動こうとしてしまう。
1730 = "看來日日姬也在渴望著同一件事。這麼一想，我就不禁要行動起來。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「頼んでいいのか？」
1208 = "「那就拜託你了」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
1082 = "「嗯！」" 

# monologue
# JP: だから、あえて日々姫に全てを任せる。
1363 = "但也正因如此，我才更要把主動權交給日日姬。" 

# monologue
# JP: 不慣れな僕が思うがままに動いてしまい、\n日々姫を傷つけてしまわぬように。
1510 = "我技巧生疏，動作可能會太粗暴，這樣可以防止不小心把日日姬給弄傷了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「また、横になればいいか？」
1118 = "「我是躺下就可以了吧？」" 

# monologue
# JP: それに、単純な欲望もある。\nもう一度、もう何度でも――日々姫に触れてもらいたい。
1381 = "其中也摻雜著單純的欲望。我想再一次，再無數次，讓日日姬來觸碰我。" 

# 【日々姫】
# display as 日日姬
# JP: 「ううん、今回は。えっと――\n立ったままで、マッサージ」
967 = "「不是，這次是，那個――站著按摩」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「立ったままで？」
1179 = "「站著按摩？」" 

# 【日々姫】
# display as 日日姬
# JP: 「そう……ええと、ね？　こんな感じに」
1098 = "「對……那個……就像這樣」" 

# monologue
# JP: （さわっ）
1895 = "（摸上）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1230 = "「！」" 

# monologue
# JP: これは……近い。\n日々姫は、ほとんど僕を抱きしめている。
1668 = "日日姬離我好近……她幾乎是抱上我了。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん――どうですか？\n気持ち、いいですか？」
1035 = "「哥哥，怎麼樣？感覺舒服嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……最高だ」
1068 = "「嗯……特別舒服」" 

# monologue
# JP: さわさわ、さすさす。\n日々姫の手は、揉み込むことなく僕の体を這いまわる。
1639 = "日日姬的手在我身上遊走。然而她並沒有用力按揉。" 

# monologue
# JP: 日々姫の息と汗と熱、そして匂いが間近から、\n僕の体に染みてくる。
1633 = "日日姬的吐息、汗水、熱量、味道，都穿過了近在咫尺的距離傳到了我的身上。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん――背中、おっきい」
1032 = "「哥哥的後背……好寬」" 

# monologue
# JP: 首筋から肩、胸へと来た手が、\n僕の背中に回される。
1449 = "她的手從脖子移到肩部、胸部，最後來到了我的後背。" 

# monologue
# JP: （むにっ）
1906 = "（貼上）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
792 = "「――」" 

# monologue
# JP: 胸板に、日々姫の胸がおしあたってくる。\n柔らかい。手で、指で思い切り触れてみたい。
1649 = "日日姬的胸部壓到了我的胸口上。真的好軟，我好想上手摸個痛快。" 

# monologue
# JP: あまりに心地よい感触は、\n手の動きにつれ、段々、段々、下へと下がる。
1759 = "舒適的感觸隨著她手的動作一點一點的向下轉移。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……ふっ――」
1067 = "「嗯……呼――」" 

# monologue
# JP: 日々姫の両手が、僕のお尻の両方をゆるく撫でさする。\n股間は――とっくにガチガチだ。
1652 = "日日姬的雙手輕輕摸上了我的兩邊屁股。我腿間的肉棒早已經硬得不行了。" 

# monologue
# JP: 気づいているのかいないのか、\n日々姫の息は、その硬直の上を何度も這ってくすぐる。
1354 = "不知道日日姬有沒有察覺到，其實她的吐息已經數次打在了我的下體。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん……マッサージ、\nして欲しいところとかって、無いですか？」
1027 = "「哥哥……你有沒有想要我按摩的部位？」" 

# monologue
# JP: ある。が――直接いってもいいものか、\n僕の勘違いではないのかが急に、不安になる。
1725 = "當然有。但是我不知道該不該直說，我突然擔心起這是不是我的誤會。" 

# monologue
# JP: なにせ、この手のことには経験が無い、\nなにか誤解をしてたら、きっと日々姫を傷つける。
1410 = "因為我沒有這方面的經驗。如果是我誤會了的話，日日姬一定會為此受傷。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「その……だ」
1199 = "「那個……」" 

# monologue
# JP: だから、必死に考える。
1537 = "所以我在拚命地思考。" 

# monologue
# JP: 誤解か、それともそうでないのか――\n日々姫の方から、示してくれるような言葉を。
1498 = "我在想這到底是不是我的誤會。日日姬有沒有給出了什麼提示呢。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「下半身が気持ちよすぎて、ジンジンと痺れるようなのだ。\nだから、硬くなり、[こわば,1]強張ってしまっている部分を――」
962 = "「下半身感覺特別舒服，感覺就像要麻痺了一樣。所以幫我按摩一下變硬的、變僵的地方――」" 

# 【日々姫】
# display as 日日姬
# JP: 「硬いとこ……ここ、とかですか？」
1184 = "「變硬的地方……是這裡嗎？」" 

# monologue
# JP: （もみゅっ）
1890 = "（揉捏）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――」
1057 = "「嗯――」" 

# monologue
# JP: ふくらはぎをクっと揉み込まれれば、\nごくごく素直に気持ちいい。
1466 = "小腿肚被她一揉，自然是非常舒服。" 

# 【日々姫】
# display as 日日姬
# JP: 「それとも――このへん？」
1192 = "「還是說――這裡嗎？」" 

# monologue
# JP: （ぐりっ、ぐりっ）
1889 = "（按揉）" 

# monologue
# JP: ふとももの脇。
1431 = "她揉的是大腿外側。" 

# monologue
# JP: そこも確かに、立ちっぱなしの選挙運動で、\n強張りに強張りまくってる――が。
1790 = "這裡確實是因為搞選舉宣傳需要長時間站著，所以非常僵硬。但是――" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そこも、確かに気持ちいいのだが――\nだが……そう、ではなく――」
1215 = "「那裡的確很舒服。但是……不是那裡――」" 

# 【日々姫】
# display as 日日姬
# JP: 「じゃあ、どこですか？」
1211 = "「那是哪裡呢？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1230 = "「！」" 

# monologue
# JP: 熱っぽく潤み、けれどもわずかに揺れてる瞳。\nああ、そうなのかと――その瞬間に、理解する。
1732 = "看到她噙著淚水眼眸一閃一閃的，我便恍然大悟。" 

# monologue
# JP: もう一歩踏み込んでいいものか、\n日々姫もやはり、わからず、不安に感じているのだ。
1627 = "日日姬是不知道該不該更進一步，她現在有點忐忑不安。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……勃起を」
800 = "「……我想」" 

# monologue
# JP: ならば、僕から踏み込むしか無い。\n覚悟を決めれば、欲はすぐさま言葉に変わる。
1794 = "那就只好由我來引領了。我下定了決心，把自己的欲望說了出來。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕は、僕のおちんちんを、\n日々姫に、マッサージしてもらいたい」
1115 = "「我想要你按摩我的肉棒」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 1230 = "「！」" 

# monologue
# JP: 日々姫が、わずかに息を飲む。\n僕から視線を外してしまう。
1612 = "日日姬嚥下一口氣，然後移開了視線。" 

# monologue
# JP: 誤解だったか、マズかったかと、\n一瞬、混乱し硬直し――
1677 = "是我誤會了嗎，是我搞砸了嗎？我迷茫起來，身體也僵直不動――" 

# monologue
# JP: （――――つんっ）
1886 = "（戳）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
1049 = "「啊」" 

# monologue
# JP: けれども指が、ほんのわずかに押してくる。
1364 = "但是她輕輕地戳了一下。" 

# monologue
# JP: つんつん、つんつん、見知らぬおもちゃを見つけでもした\n子猫のように、慎重に――
1439 = "她的動作就像找到了新玩具的小貓一樣，是那麼的小心翼翼。" 

# monologue
# JP: （さすっ）
1910 = "（輕撫）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ンッ――くっ」
1062 = "「嗯――唔」" 

# monologue
# JP: やがて、手のひら全体で僕をなぞってくれる。
1700 = "然後她開始用整個手掌輕撫。" 

# monologue
# JP: さすさすと、いい子いい子と撫でる手つきで、\n上下にゆったり、僕の勃起を愛撫する。
1440 = "她的動作很輕柔，就像是在哄小孩子一樣，上下來回愛撫我的陽物。" 

# 【日々姫】
# display as 日日姬
# JP: 「どう……ですか？　兄さん」
1102 = "「怎麼樣……？哥哥」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「気持ちいい、もっとして欲しい」
1099 = "「很舒服，繼續吧」" 

# monologue
# JP: 僕の欲を、日々姫が受け止めてくれている。\n受け止め答え、更にと工夫してくれている。
1602 = "日日姬不僅包容了我的欲望，還願意為我摸索能讓我舒服的方法。" 

# monologue
# JP: 安心感と幸福感とが僕の真ん中で膨れ上がって、\n肉体以上に、心がぞくぞく、気持よくなる。
1517 = "我的心底升起一股安心感和幸福感，這種感覺比肉體上的快感更加舒適。" 

# 【日々姫】
# display as 日日姬
# JP: 「もっとって……」
1180 = "「繼續是……」" 

# monologue
# JP: こくり、日々姫の喉が小さく動く。
1611 = "日日姬嚥下一口唾沫。" 

# 【日々姫】
# display as 日日姬
# JP: 「でしたら……あの、兄さん――その……そこ、を。\nその、もっとマッサージしやすいようにしてもらっても」
1204 = "「那就……那個，哥哥……可以……讓那裡，那個，更方便按摩一點」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
# 1057 = "「嗯――」" 

# monologue
# JP: ドクン、ドクンと、自分の心音が耳につく。
1519 = "我的心臟劇烈地跳動著，心跳聲大到連我自己都能聽到。" 

# monologue
# JP: 普段であれば意識すらせずこなせることを、\n震える指で、不器用にしか行えなくなる。
1472 = "平常拉個拉鏈根本都不用過腦子，現在我卻只能用顫抖的手指動作笨拙地去拉。" 

# monologue
# JP: （ちぃ……ぃっ――）
1869 = "（哧……）" 

# monologue
# JP: ゆっくり、ゆっくりチャックを下げる。\n日々姫は目を逸らさない。嫌がっている素振りもない。
1544 = "拉鏈緩緩拉了下來。日日姬依然緊緊盯著，沒有一點厭惡的意思。" 

# monologue
# JP: ならば――これで正解だろう。\nそうと信じて、心を決して勃起を取り出す。
1800 = "那麼我這麼做便是正確的吧。我一邊這麼想，一邊下定了決心，把肉棒掏了出來。" 

# monologue
# JP: （ぼろんっ）
1915 = "（露出）" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1049 = "「啊」" 

# monologue
# JP: 悲鳴、ではない。ため息でもない。\nそれは、感嘆が漏らした声だ。
1436 = "她發出的不是悲鳴，也不是嘆息，只是單純的感嘆。" 

# 【日々姫】
# display as 日日姬
# JP: 「これが――にぃにの――兄さんの、おちんちん」
1189 = "「這就是――阿哥――哥哥的，雞雞」" 

# monologue
# JP: （さわっっ）
1896 = "（摸）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1230 = "「！」" 

# monologue
# JP: 触れていいか、と尋ねもしない。
1665 = "日日姬都沒有問我可不可以摸。" 

# monologue
# JP: 夢見るようにうっとりと、\n僕の勃起に、日々姫はその手を伸ばしてくれる。
1428 = "她就像是在夢遊一樣，呆呆地伸手摸上了我的陽物。" 

# monologue
# JP: （さすっ――さわっ――）
1894 = "（摩挲――摩擦――）" 

# 【日々姫】
# display as 日日姬
# JP: 「硬か……それに、すっごく……熱、か――\nこぎゃんとおっきなものを――私――」
1096 = "「好硬……而且……好熱……我要把――這麼大的東西――」" 

# monologue
# JP: 隈本弁に戻ってる。\n普段の日々姫が、剥き出しの日々姫がそこにいる。
1424 = "她又開始說隈元話了。這就是平常的日日姬、原原本本的日日姬。" 

# 【日々姫】
# display as 日日姬
# JP: 「きゃっ！？」
1002 = "「呀！？」" 

# monologue
# JP: 感じた瞬間、勃起が激しく震えてしまう。\n日々姫は、戸惑った目で僕を見上げる。
1347 = "一想到這裡，我的肉棒就猛地一跳。日日姬抬頭看著我，顯得有些疑惑。" 

# monologue
# JP: よそ行きの日々姫に戻したくない――\n思いはすぐに言葉になって、喉から溢れだしていく。
1485 = "我不想讓她恢復成給外人看的那個樣子。我馬上說出了這個想法。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「もっと、してくれ。\nすごく――気持ちいいし、幸せなんだ」
989 = "「再繼續摸。我感覺非常舒服、非常幸福」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1082 = "「嗯！」" 

# monologue
# JP: （きゅっ！）
1893 = "（握住）" 

# monologue
# JP: 日々姫の指が僕の竿――\n根本に近い部分を優しく捕まえる。
1640 = "日日姬的手指輕輕握住了我肉棒的根部。" 

# 【日々姫】
# display as 日日姬
# JP: 「あの……どぎゃんしたらよかとか、よぅわからんけん、\n間違っとったら――教えて、ね？」
1201 = "「那個……我不是很懂該怎麼做，如果我做錯了，告訴我，好嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1081 = "「嗯」" 

# monologue
# JP: 僕もわからん。そんなことは。\nだけれど不安を与えぬように、ともかく頷く。
1383 = "其實我也不懂。不過為了不讓她心神不寧，我也要點頭同意。" 

# monologue
# JP: ただそれだけで、日々姫はホっとした顔をして、\nそうして口を、大きく大きく開いてみせる。
1746 = "聽到我這麼說，日日姬露出了如釋重負的表情。然後她稍微離遠了一點，把嘴大大張開。" 

# 【日々姫】
# display as 日日姬
# JP: 「んーーーーーっ」
1040 = "「啊――――」" 

# monologue
# JP: （てろおおおおおおっ）
1903 = "（舔舐）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1230 = "「！」" 

# monologue
# JP: 唾液だ。\n日々姫のなまあたたかい、日々姫の口で温まったツバ。
1606 = "日日姬口中垂下了唾液。暖呼呼的唾液帶著日日姬嘴裡的溫度。" 

# monologue
# JP: それを勃起の先端の部分にかけられて――
1789 = "這唾液垂到了龜頭上――" 

# monologue
