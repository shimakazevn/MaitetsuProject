790 = "“用嘴在做愛”――我都不知道這麼說對不對。" 

# monologue
# JP: けれども日々姫は、その表情を固くしつつも、\nゆっくり――深く――頷いてくれる。
1667 = "日日姬雖然表情依然不悅，她慢慢地――同時深深地――點了點頭。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「セックスならば……マッサージからの流れのように、\n勢いでやっていいような、軽いことでは無いとも思う」
972 = "「做愛的話……就不能像按摩一樣，心血來潮就隨便做了。做愛的意義要更重大」" 

# 【日々姫】
# display as 日日姬
# JP: 「う……ん」
1066 = "「嗯……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「だから。\nこの先に進む前に、はっきり日々姫に伝えておきたい」
1121 = "「所以，在繼續做下去之前，我想跟日日姬說清楚」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1049 = "「啊」" 

# monologue
# JP: 安堵と喜びとが混じる息。\nそれを聞くなら、なんの不安も無しに話せる。
1528 = "我能聽出她的聲音中帶著放心和喜悅。那我就能毫不顧忌地說出來了。" 

# 【双鉄H】
# display as 雙鐵
