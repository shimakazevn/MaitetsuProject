1524 = "我的體溫越來越高了，喜悅和急不可耐的感覺不停刺激著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「こーして、ね？　にぃに」
1171 = "「然後這樣，阿哥」" 

# monologue
# JP: いたずらっぽくそう言って。\nこれみよがしに舌を伸ばして――
1432 = "她狡黠地說道，然後刻意伸長了舌頭――" 

# 【日々姫】
# display as 日日姬
# JP: 「ぺろっ」
1233 = "「（舔）」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ふっ――」
1012 = "「呼――」" 

# monologue
# JP: 日々姫が、舐めた。
1657 = "日日姬舔了我的肉棒。" 

# monologue
