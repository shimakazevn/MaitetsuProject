1015 = "「呼――呼――呀――啊――呼――唔咕――呼――啊――呀」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうなんだ。\n舐められるのは、気持ちいいんだ」
1168 = "「沒錯。被舔到是很舒服的一件事」" 

# monologue
# JP: （ちゅろっ）
1874 = "（啾）" 

# 【日々姫】
# display as 日日姬
# JP: 「ふやっ！？」
# 1002 = "「呀！？」" 

# monologue
# JP: だから、舐める。\n髪を、耳を、まぶたを、小鼻を、眼球を。
1541 = "所以我繼續舔著她。從頭髮到耳朵，從眼瞼到鼻子，連眼睛也不放過。" 

# 【日々姫】
# display as 日日姬
# JP: 「やっ――あっ――にぃにに――ンッ――\nぺろぺろ――ちゅっちゅ――されて――私っ」
996 = "「呀――啊――阿哥――嗯――這麼舔――我」" 

# monologue
# JP: 首の線から肩を、鎖骨を。\nそうして、さっきより、さらにはっきり形を浮かせる――
1502 = "我從脖子舔到肩膀，到了鎖骨。然後來到了跟剛才比起來形狀更加鮮明的那個地方――" 

# monologue
# JP: （ぱくっ）
1865 = "（含住）" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ――おっぱいっ！　んっ――私――にぃににっ――\nんっ、おっぱい――ちゅうちゅう――して、もらってっ」
1046 = "「啊――胸部！嗯――阿哥――嗯，舔著――我的胸部――」" 

# monologue
# JP: 乳首を舐めれば、\n日々姫の声と匂いの甘みが濃くなる。
1530 = "我舔上了日日姬的乳頭，她的嬌喘變得更急促，身上散發的氣息也愈髮香甜。" 

# monologue
# JP: その反応に勇気づけられ、\n舌だけじゃなく、唇の動きもそこに加える。
1442 = "她的反應讓我更進一步，不僅是舌頭，連著嘴唇也一起用上了。" 

# monologue
# JP: （はぷっ）
1909 = "（輕咬）" 

# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　んっ――あっ――もっと――おねがいっ！\nにぃにっ――服っ――じゃまっ――んふ――んっ」
1004 = "「呀！？嗯――啊――繼續――拜託了！阿哥――衣服――好礙事――嗯――嗯」" 

# monologue
# JP: 日々姫がもぞもぞ身悶えし、汗ばむ肌を露出していく。\n――大胆に服をはだけてくれる。
1622 = "日日姬扭動著身子，讓沾滿汗水的肌膚露了出來。她大膽地把衣服掀了起來。" 

# monologue
# JP: （ちゅうっ）
# 1874 = "（啾）" 

# 【日々姫】
# display as 日日姬
# JP: 「きゃっ！？　ベロっ――んっ――ちょく、だと――\nあっ――ぬらって――これっ――すごく――いいっ」
1007 = "「呀！？舌頭――嗯――直接――啊――軟軟的――這樣――好刺激」" 

# monologue
# JP: （ちゅむっ――はむっ――れろっ――れるっ）
1905 = "（親上――咬住――舔舐――舔舐）" 

# monologue
# JP: 揉みたい気持ちを我慢して、とにかく舌と唇だけで、\n日々姫のおっぱいを刺激していく。
1499 = "我強忍住想要用手揉搓的欲望，只用唇舌來刺激著日日姬的胸部。" 

# 【日々姫】
# display as 日日姬
# JP: 「先っぽ――乳首――ちゅうちゅう、され、て――んっ\nおっぱい、ぺろぺろ――されて――溶け、ちゃうっ」
992 = "「前端――乳頭――被親到――嗯――胸部被舔到――要化了――」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んむっ」
# 1081 = "「嗯」" 

# monologue
# JP: 溶けては困る。\nそれに、おっぱいだけじゃ足りない。
1735 = "真要化掉那可就傷腦筋了。而且光親胸部當然是不夠的。" 

# monologue
# JP: （ぺろっ――）
1902 = "（舔――）" 

# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　おへそ――までっ――」
1009 = "「呀！？連肚臍――都舔到――」" 

# monologue
# JP: おへそ、脇腹――\nアバラのラインにそって丁寧に舐めていく。
1476 = "從肚臍到側腹――我沿著肋骨的線條細細舔舐著。" 

# monologue
# JP: そして腰から腰骨に沿い――
1701 = "然後從腰部沿著腰骨向下――" 

# monologue
# JP: （しゅりっ）
# 1867 = "（咕啾）" 

# 【日々姫】
# display as 日日姬
# JP: 「んふっ！！！」
1084 = "「嗯！！！」" 

# monologue
# JP: 舌は、パンツに行き当たる。
1523 = "我的舌頭抵在了她的內褲上。" 

# monologue
# JP: 舐めても無いのに、股間の部分はぐっしょりしてる。\n――透けて、張り付き。スジの形が浮いている。
1676 = "明明還沒有開始舔，可她的私處已經濕透了。透過濕痕能清楚地看到肉縫的形狀。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「これが……日々姫のおまんこか」
1190 = "「這就是……日日姬的小穴啊」" 

# monologue
# JP: （くぱっ！）
1888 = "（扒開！）" 

# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　にぃに――パンツの上から――\n広げる、とか――それっ」
1001 = "「呀！？　阿哥――隔著內褲――扒開――這個」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いやか？」
965 = "「不喜歡嗎？」" 

# monologue
# JP: （ぼふっ！）
1877 = "（嘭！）" 

# monologue
# JP: 聞けば日々姫は、耳まで真っ赤にそまってしまう。
1534 = "我這麼一問，日日姬臉紅到耳朵都變得通紅。" 

# 【日々姫】
# display as 日日姬
# JP: 「イヤじゃ……なか、とよ？\nにぃにがじいって――見てくれるの……嬉しか、と」
1105 = "「我不是……討厭。被阿哥盯著看……我很樂意」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「よかった。\nなにせ、僕はおまんこのことをよく知らんのでな」
1206 = "「那就好。因為我對小穴的構造不太了解」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……そんなら……おまん、こ、の――こと――\n私……教えてあげたら……よか、と？」
1048 = "「啊……這樣的話……我來――……教給阿哥……小穴的構造吧」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、頼めるか？」
1090 = "「嗯，拜託你了」" 

# monologue
# JP: こくん、と無言で頷いて\nそうして日々姫は、唇の端を素早く舐める。
1674 = "日日姬默默點頭，然後快速舔了一下嘴唇。" 

# 【日々姫】
# display as 日日姬
# JP: 「えっと……おまんこの、一番おへそ側のとこ――\nぷっくりしてるとこ、あるでしょお？」
1200 = "「那個……小穴最靠近肚臍的地方，有一塊凸起的地方，看到了吧？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1081 = "「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「そこが……く、くり――クリトリス、ばい。\n女の子……おちん、ちんって……言われてる、とこ」
1213 = "「那裡是……陰、陰蒂。算是女孩子的……雞、雞雞……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、舐めれば気持ちいいのか？」
1219 = "「那麼舔上去你就會舒服吧？」" 

# monologue
# JP: （ずちゅっ！　れるうううううっつっ！）
1873 = "（啾噗！咕啾！）" 

# 【日々姫】
# display as 日日姬
# JP: 「んふうっ！？　ひゃっ！？　んうううっ！！？\nにぃにっ――つよ、すぎっ――くふうんっ！」
1019 = "「呼！？　呀！？　嗯！！？阿哥――力道太大了――啊！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「む、すまん――っ！？」
1011 = "「呃，抱歉！？」" 

# monologue
# JP: 口を離してひろげなおせば、\n日々姫のおまんこの内側は、さっきと様子を変えている。
1512 = "我把嘴巴移開，再次扒開了那裡。日日姬的小穴內側有了一點變化。" 

# monologue
# JP: ぷくり、と蜜が、パンツの内から押されたように、\n溢れてきている。
1765 = "蜜汁大量滿溢出來，就像是從內褲中被擠出來了一樣。" 

# 【日々姫】
# display as 日日姬
# JP: 「く……クリトリスの、下、に――ちっちゃな……\nおしっこの、穴ば、あって――それでその、もっと、下」
1228 = "「陰……陰蒂的下面――那個小洞……是尿尿用的小洞――然後再下面」" 

# monologue
# JP: もっと、下。\n僕の視線はさっきから、その一点に釘付けられている。
1384 = "再下面的地方。我的視線從剛才開始就一直盯著那裡。" 

# monologue
# JP: 蜜がぷくりと膨れては、\nはじけて、パンツに染みきれずとろり流れ落ちていく。
1797 = "那裡的蜜汁溢出之後沒有沾濕內褲，而是直接順著流了下來。" 

# 【日々姫】
# display as 日日姬
# JP: 「お、おまんこ、の――お、おちんちん、ば――\n受け入れる――穴っ――ち、[ちつこう,1]膣口、が――そのっ」
1214 = "「那裡是小穴――容納雞雞的――洞口――是陰道口――那個」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……パンツごしだとよくわからんな。\n[じか]直に、見せてもらってもいいか？」
802 = "「……隔著內褲看不清楚。可以讓我直接看看嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「う、うん。――わたしも、にぃにに、見て欲しか」
1070 = "「嗯、嗯――我也想讓阿哥看」" 

# monologue
# JP: （べちょっ――）
1879 = "（噗啾）" 

# monologue
# JP: ぐっしょり濡れてるパンツをもじもじ、\n日々姫は足から抜いていく。
1621 = "日日姬扭動著身子，把濕透的內褲脫了下來。" 

# 【日々姫】
# display as 日日姬
# JP: 「ぁっ――」
# 1049 = "「啊」" 

# monologue
# JP: （くぱあっ！）
# 1888 = "（扒開！）" 

# monologue
# JP: それももどかしくおまんこを指で広げれば、\n日々姫のかわいい膣口は、ひくひく震え蜜を零して――
1504 = "我急不可耐地用手指扒開日日姬的小穴，只見她那可愛的穴口一顫一顫的，蜜汁正從中淌下――" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々、姫」
# 1148 = "「日日姬」" 

# monologue
# JP: ――僕を待っててくれている。\n思えば頭が白く弾ける。
789 = "――她在等待我的進入。這個想法讓我大腦一片空白。" 

# monologue
# JP: ただひとつ。\nただそれだけしか、望めなくなる。
1720 = "現在我只有一個想法，也只可能剩下了這一個想法。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「セックス、しよう。\n僕は、日々姫とセックスしたい」
1110 = "「我們來做愛吧。我想跟日日做愛」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。うん。にぃに」
1072 = "「嗯。嗯。阿哥」" 

# monologue
# JP: 言って、こくりとツバを飲み。
1781 = "說完，我緊張地嚥下一口唾沫。" 

# monologue
# JP: そして日々姫は、まっすぐまっすぐ、僕を見つめる。
1604 = "日日姬則直直地看著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん、どうか。\n私の、処女を――はじめてを――もらって、ください」
1033 = "「哥哥，來吧。請拿走我的處女――我的第一次吧」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。喜んで。\n日々姫もどうか、僕のはじめてを貰って欲しい」
1080 = "「嗯。我願意。也請你拿走我的第一次吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「もらう！　絶対！　にぃにの童貞っ！\nぜったい、誰にも！　他の誰にも、あげんもんっ！」
1119 = "「我要！一定要！阿哥的貞操！一定要！不會給其他任何人！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうしよう」
1092 = "「嗯，那就這樣」" 

# monologue
# JP: （ちゅっ――）
1870 = "（啾――）" 

# monologue
# JP: 軽いキスをし、\nぬらつく肌とぬらつく肌とをこすり合わせる。
1531 = "我輕輕地吻上她，我們用沾滿汗水的皮膚磨蹭著彼此。" 

# 【日々姫】
# display as 日日姬
# JP: 「ふあっ――あっ――んっ――にぃに――にぃにぃっ」
1017 = "「呼――啊――嗯――阿哥――阿哥」" 

# monologue
# JP: 切なげな声。日々姫の匂い。\n熱めの体温。
1724 = "略帶苦悶的呻吟、日日姬的體香、還有她溫熱的體溫。" 

# monologue
# JP: 全てが欲しくて、我慢だなんて出来なくて。\nだから、ゆっくり――勃起を膣口に押し当てる。
1505 = "我想佔有這一切，我已經無法忍耐下去。我慢慢地把肉棒抵上了穴口。" 

# monologue
# JP: （みちっ――）
1891 = "（插入――）" 

# 【日々姫】
# display as 日日姬
# JP: 「はっ――あっ――くっ――」
1041 = "「啊――啊――呃――」" 

# monologue
# JP: 日々姫は、狭い。\nその上、ぎゅうぎゅう締めてくる。
1650 = "日日姬的裡面非常緊窄，同時還在緊緊夾著我。" 

# monologue
# JP: 僕の勃起の先端が、押し潰されてしまうほど。\nはっきりとした痛みを僕が、感じるほどに。
1768 = "裡面的力度大到快把我的龜頭壓扁了，讓我感受到了鮮明的疼痛。" 

# 【日々姫】
# display as 日日姬
# JP: 「かはっ――んっ――ん、くっ――」
1044 = "「啊――嗯――嗯、呃――」" 

# monologue
# JP: だが、僕の感じる痛みなど、\n日々姫のそれの百分の一も無いだろう。
1367 = "但是我的疼痛恐怕還不如日日姬感受到的百分之一吧。" 

# monologue
# JP: 勃起の先さえ全部は入っていないのに、\n日々姫の額には、びっしりと汗が浮かんでる。
1722 = "現在連龜頭還沒完全進入，日日姬的額頭上已經冒出了不少汗了。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃ――に――わた、しっ――っ――\nはっ――あっ――平気――だか、らっ――」
1222 = "「阿哥――我――呼――啊――沒事――的――」" 

# monologue
# JP: なのに日々姫は、僕を見、笑う。
1707 = "然而日日姬卻對我露出了笑臉。" 

# monologue
# JP: 少し引きつってしまっているが、\n綺麗な笑顔で、僕を励ましてさえくれる。
1804 = "雖然她緊繃著臉上的肌肉，忍受著痛苦，但她還是用美麗的笑臉來鼓勵我。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1081 = "「嗯」" 

# monologue
# JP: だから、心を揺るがせずに済む。\n日々姫を僕のものにする。僕が、日々姫のものになる。
1539 = "所以我才沒有慌亂。要讓日日姬變成我的東西，同時我也變成日日姬的東西。" 

# monologue
# JP: その喜びを得るために――\n苦痛があっても、一緒に、越えていく他にない。
1695 = "為了獲得這份喜悅，我們就必須要克服這份痛苦。" 

# monologue
# JP: （みちっ――めりっ――）
# 1891 = "（插入――）" 

# 【日々姫】
# display as 日日姬
# JP: 「ぁっ――んっ――くっ――はっ――んんっ――」
1043 = "「啊――嗯――呃――呼――嗯――」" 

# monologue
# JP: 肉を割ってる感触がある。\nぴったり張り付いてるものを、無理やり剥がす感覚がある。
1526 = "我能感覺到我在切開一團軟肉，感覺就像是把緊緊貼合的什麼東西生硬地剝下來。" 

# monologue
# JP: 痛い、と日々姫は口にしない。\nそれを口にしてしまったならば、僕が止まると恐れてる。
1368 = "但是日日姬沒有喊痛。她是怕如果喊痛的話，我就會停下來。" 

# 【双鉄H】
# display as 雙鐵
# JP: （これは、長引かせては余計に辛さを与えるだけだな）
1914 = "（這樣越是拖下去只會讓她越痛苦而已）" 

# monologue
# JP: 一気に、腰を進めるしかない。\nその方法なら、とても簡単に思いつく。
1494 = "我只好用力挺腰，一下插到底。這個方法很容易就能想到。" 

# monologue
# JP: 日々姫は日々姫で、とても真面目で、\n僕を完全に、信頼しきってくれているから。
1358 = "也因日日姬是全心全意地、毫無保留地信賴著我。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫。これは、一気にいった方がいい」
1157 = "「日日姬，我覺得一口氣進入比較好」" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ！　んっ！」
1083 = "「嗯！嗯！」" 

# monologue
# JP: 目にいっぱいに涙をためて、\n日々姫が声を出さずに頷く。
1642 = "日日姬的眼眶裡噙滿了淚水，默默地點頭同意。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「１、２の３で思い切り突きこむから、\nそのとき、力を入れないでくれ」
1112 = "「我喊著一二三然後會用力插入，到時請你放鬆力氣」" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ！」
# 1082 = "「嗯！」" 

# monologue
# JP: ならば、あとはやるだけだ。
1552 = "接下來就只剩實施了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いいか？　いくぞ――いーち、にぃ」
1182 = "「聽好了，要來了。一、二」" 

# 【日々姫】
# display as 日日姬
# JP: 「ふやっ！？　あっ――んくううううううううっ！！！」
1003 = "「呀！？啊――嗯啊――！！！」" 

# monologue
# JP: ３に備えて緩んだところを、一気にえぐるっ！\n何かをぷつりと切った感覚。
1412 = "在她放鬆下來準備迎接“三”的時候，我便一口氣深入了進去。其間感覺像是戳破了什麼東西。" 

# monologue
# JP: そして勃起の先端は、肉の扉にこつんとあたり――\n全部を、ぐっぽり収めて止まる。
1703 = "然後肉棒的前端叩上了一扇肉門。我的全部都被她完全接納了。" 

# 【日々姫】
# display as 日日姬
# JP: 「はっ――ひっ――んっ――ふあっ――あっ――」
1013 = "「呼――呀――嗯――呼――啊――」" 

# monologue
# JP: 日々姫の可愛いおっぱいが、\n呼吸にあわせ激しく動き、震えてる。
1617 = "日日姬小巧的胸部隨著她的喘息劇烈地顫動。" 

# 【日々姫】
# display as 日日姬
# JP: 「わ、私――これ、で――にぃにと――ひとつにっ」
1104 = "「我、我――這樣――就跟阿哥――合為一體了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、完全にひとつになった」
1088 = "「嗯，我們完全合為一體了」" 

# monologue
# JP: 結合部から、日々姫の真っ赤な血が溢れてる。\n日々姫の純潔を僕が奪った。
1671 = "日日姬鮮紅的處女血從我們結合的地方流了下來。我奪走了日日姬的純潔。" 

# monologue
# JP: ぞくぞくと、動物的な達成感が、\n圧倒的な所有欲が、腹の底からわきおこってくる。
1767 = "蠢蠢欲動的興奮感、獸慾似的滿足感、還有強烈的佔有慾，紛紛從我的內心深處噴湧而出。" 

# 【日々姫】
# display as 日日姬
# JP: 「え……へ、へ」
1020 = "「哎……嘿嘿」" 

# monologue
# JP: 日々姫が、笑う。
1654 = "日日姬笑了。" 

# monologue
# JP: 汗をびっしりかいてる顔で、それでも、\nとても幸せそうに。
1427 = "她因痛苦而滿臉汗水，卻還是綻放出了幸福的笑容。" 

# 【日々姫】
# display as 日日姬
# JP: 「……やったぁ」
799 = "「……我好高興」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！！」
1231 = "「！！！」" 

# monologue
# JP: ささやかな。\nけれど、幸せに満ち満ちた声。
1450 = "她的聲音不大，但其中卻充滿了幸福的味道。" 

# monologue
# JP: それが鼓膜を揺すった瞬間、\n僕の歯止めが外れてしまう！
1748 = "聽到這句話，我便再也抑制不住自己了！" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫っ！！！」
1154 = "「日日姬！！！」" 

# monologue
# JP: （ずりゅうううううううううっ！！！！）
1892 = "（插入！！！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「はっ――んひゅっ！！？　――んっ！」
1014 = "「呼――呀――！！？　嗯――！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫――好きだっ――大好きだっ！！」
1142 = "「日日姬――我喜歡你――我愛你！！」" 

# monologue
# JP: （ばちゅんっ！！！！）
1878 = "（噗哧！！！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃうっ！　あっ――にぃにっ――んっ――\n私――私の方が――もっと、好きっ！」
998 = "「呀！啊――阿哥――嗯――我――我更喜歡你！」" 

# monologue
# JP: （きゅんっ！　きゅんっ！！！）
1897 = "（收縮壓迫）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
1010 = "「呃！」" 

# monologue
# JP: 強ばっていた日々姫の膣の内壁が、\nその瞬間に甘く柔らかく蠢きはじめるっ！！
1660 = "日日姬蜜道中緊繃的內壁在此刻軟化了下來，開始輕柔地蠕動！！" 

# 【双鉄H】
# display as 雙鐵
# JP: 「な――これっ――うぁっ――あっ」
1191 = "「這是――什麼――呃――啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「ふえっ！？　あっ――んっ――\nなか――ひあっ――めくれ――てっ――んっ！！」
1022 = "「哎！？啊――嗯――裡面――呀――被蹭到――啊――嗯！！」" 

# monologue
# JP: 日々姫の声にも甘さが混じる。
1614 = "日日姬嬌喘起來。" 

# monologue
# JP: それがまたどろどろとした塊となり、\n僕の精巣に流れ込んでは、精液を一気に押し上げる。
1447 = "她的嬌聲就好像化成了實體，一路流進了我的精巢，把精液一口氣擠了出來。" 

# monologue
# JP: （ずぶっ！　ずばっ！　ずぱっ！　ばちゅんっ！！）
1876 = "（嗞噗！嗞啪！嗞啪！噗哧！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ――ふあっ――やっ――しゅごっ――んっ――\nにいにっ――おちん、ちんっ――なかで――ぷく、って」
1059 = "「嗯――呼――呀――好厲害――嗯――阿哥的――雞雞――在裡面――漲了起來」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫！　日々姫！　日々姫！　日々姫！」
1153 = "「日日姬！日日姬！日日姬！日日姬！」" 

# monologue
# JP: （ずばっ！　じゅぱんっ！　じゅぶっ！　じゅぼぶっ！）
1875 = "（嗞噗！啾噗！啾噗！滋噗！）" 

# monologue
# JP: 日々姫の膣内が張り付いてくる。\n本当に、何かをめくる感じがしてる。
1645 = "日日姬的穴肉緊緊黏在了我的肉棒上。讓我感覺像是在攪動著什麼東西。" 

# monologue
# JP: 最初からギリギリだった僕の勃起は、\nもう白熱して白熱しきって、一秒だって耐えられなくて！
1501 = "我從最開始就已經快要接近極限，現在肉棒已經滾燙得不行，已經忍受不到下一秒了！" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫！　日々姫！　僕はっ！　もうっ！！」
1151 = "「日日姬！日日姬！我要！我已經！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「イって！　にぃにっ！　わたしの、なか、でっ――\nんっ、おまんこの、なか、で――ぴゅっぴゅ、してぇ！」
971 = "「來吧！阿哥！射到我裡面――嗯、在我小穴裡面――射出來吧！」" 

# monologue
# JP: （きゅううううううっ！！）
1862 = "（一陣壓迫！！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
1052 = "「啊！」" 

# monologue
# JP: （びゅううっ！　びゅるるっ！　どびゅっ！　びゅう！）
1883 = "（噗噗！噗嚕！噗噗！噗噗！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ん――ああ、あっ」
1063 = "「嗯――啊、啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「ふあああああああああああんっ！！！」
1050 = "「啊啊啊！！！」" 

# monologue
# JP: （びゅうっ！　びゅるっ！　びゅぶっ！　びゅっ！）
1881 = "（噗噗！噗噗！噗嚕！噗噗！）" 

# 【日々姫】
# display as 日日姬
# JP: 「来たっ！　きてるっ――あうっ――んっ――\nあつい、の――精液――おなか――子宮、にっ――」
970 = "「來了！進來了――啊――嗯――熱熱的――精液――進到肚子――子宮的裡面――」" 

# monologue
# JP: 日々姫の声を聞いた瞬間、そうしなければと強く感じて、\n腰を最奥へとみっちり押し込みっ！！！
1664 = "日日姬這麼一叫，我便覺得更要切實地射入她體內，用力挺腰抵在了她的最深處！！！" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んくあっ！」
# 1082 = "「嗯！」" 

# monologue
# JP: （びゅるんっ！）
1885 = "（噗嚕！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃうんっ！！！」
999 = "「呀！！！」" 

# monologue
# JP: 日々姫が跳ねる。
1624 = "日日姬整個身子往上一弓。" 

# monologue
# JP: 出てる――出きった――出しきった。
1460 = "射精――射出來了――全部射出來了。" 

# monologue
# JP: （とさっ）
1868 = "（咚）" 

# monologue
# JP: 繋がったまま、日々姫の隣にくずれて落ちる。\nすぐさま日々姫は、汗だくの顔を寄せてくる。
1482 = "我一下子倒在了日日姬的身邊，我們的身體還連接在一起。滿臉汗水的日日姬馬上湊了過來。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに……大好きっ」
1225 = "「阿哥……我好喜歡你」" 

# monologue
# JP: （ちゅっ）
# 1874 = "（啾）" 

# monologue
# JP: そして、キス。\nキス。キス。キス。キス。
1492 = "我們吻了起來。無數次地吻著。" 

# monologue
# JP: 日々姫の唇と唾液と舌と。それにどろどろ溶かされながら\n――僕は眠りに、落ちていく。
1635 = "日日姬的唇舌、日日姬的唾液，彷彿要把我融化。就這樣，我慢慢墜入了夢鄉。" 
