# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 1026 = "「哎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫にしてもらって気持ちよかったから。\nしてあげたいんだ」
1149 = "「日日姬讓我非常舒服，我也想回報一下」" 

# monologue
# JP: 指を伸ばして、日々姫の口の中へと入れる。\n可愛い舌を、指先でぷにぷに触って、はさむ。
1491 = "我伸出手指，插進了日日姬的小嘴中。然後用指尖按了幾下可愛的小舌，再用手指夾住。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「舌を、伸ばしてくれないか？」
969 = "「你伸一下舌頭」" 

# 【日々姫】
# display as 日日姬
# JP: 「ふぇ？　……ほ、ほーはふぁ？」
1025 = "「哎？……這、這樣嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、それでいい」
1086 = "「嗯，對」" 

# monologue
# JP: （ぺろっ）
1904 = "（舔）" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
1232 = "「！！？」" 

# monologue
# JP: （ちゅくっ――れろっ――ちゅるっ――じゅっ）
1872 = "（啾噗――啾嚕――啾噗――啾）" 

# monologue
# JP: あかんべえした日々姫の舌を、\n舌で丹念に舐めていく。
1514 = "我用自己的舌頭細細地舔著日日姬伸出的小舌。" 

# 【日々姫】
# display as 日日姬
