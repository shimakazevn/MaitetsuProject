# JP: 日々姫の手が、勃起の先に唾液をまぶし伸ばしてく。\nすぐに僕から出た汁が、唾液と混じって手を汚す。
1629 = "日日姬用手把龜頭上的唾液抹勻。她的手很快就染上了我分泌出的黏液和她的唾液的混合液體。" 

# monologue
# JP: （くちっ、くちっ――ちゅるっ――もみゅっ――）
1866 = "（咕啾、咕啾――哧溜――哧溜――）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うあっ――あっ――気持ち、いいっ――」
1042 = "「啊――啊――好舒服――」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。もっと……よーしてあげるけん」
1075 = "「嗯。我來……讓阿哥更舒服」" 

# monologue
# JP: くすりと笑う日々姫の顔にドキリとし、\n日々姫をもっと見たくて……だから、気づいてしまう。
1646 = "日日姬的笑容讓我心動不已。我想好好看看她……然後我就發現了一點。" 

# 【双鉄H】
# display as 雙鐵
# JP: （日々姫、乳首……勃起、してる）
1901 = "（日日姬的乳頭……勃起了）" 

# monologue
# JP: 服の上から見てわかるほど、はっきり形が浮き上がってる。\n日々姫も、興奮してくれている。
1796 = "那裡的形狀很明顯，隔著衣服都能看見。日日姬也興奮起來了。" 

# monologue
