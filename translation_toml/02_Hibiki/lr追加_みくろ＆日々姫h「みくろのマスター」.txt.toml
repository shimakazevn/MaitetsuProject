2804 = "Ngay trước mắt em ấy là bộ phận sinh dục nam và nữ đang ở trạng thái sẵn sàng chiến đấu tột độ.\nCó lẽ bị choáng ngợp trước sức ép của da thịt, Mikuro chỉ biết gật đầu trong im lặng."
# 【双鉄】
