2889 = "Rộn rạo. Ngọ nguậy. Bên trong âm đạo của Mikuro như được tiếp thêm sức sống.\nDù trước đó nó đã rất chật hẹp, cứng nhắc và khít khao──"
# 【双鉄】
# display as 雙鐵
# JP: 「みく、ろ──動く、ぞっ」
2173 = "「Miku, ro── anh cử động, đây」"
# 【みくろ】
# display as 美玖路
# JP: 「はいっ！　はいっ！　みくろ、動いてほしいです──\nんうっ！！！」
1868 = "「Vâng ạ! Vâng ạ! Mikuro, muốn anh cử động ạ──\nƯm u!!!」"
# 【日々姫】
# display as 日日姬
# JP: 「甘か声。かわゆかぁ」
1919 = "「Giọng ngọt ngào quá. Dễ thương quá đi.」"
# 【みくろ】
# display as 美玖路
# JP: 「ふあっ──あっ──あっ──なに、これ──\nなに、これぇっっ！！　きもちい、みくろ、気持ちいい」
1714 = "「Fua── a── a── gì thế, này──\nGì thế, này!! Sướng quá, Mikuro, sướng quá.」"
# monologue
# JP: （くっ──じゅっ──ぐちゅっ──ずぢゅっ──）
3056 = "（Hự──chụt──nhóp nhép──phập──）"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに。やさしく。ゆっくりゆっくり、大事に大事に」
2282 = "「Anh hai. Thật dịu dàng nhé. Chậm rãi, thật chậm rãi, thật nâng niu, thật trân trọng.」"
# monologue
# JP: と、いうか、そうする他に動けない。\nみくろは浅く、強く動けば抜けそうで。その上──
2552 = "Đúng hơn là, tôi không thể cử động theo cách nào khác được.\nMikuro rất nông, nếu cử động mạnh thì có vẻ sẽ tuột ra mất. Hơn nữa──"
# 【みくろ】
# display as 美玖路
# JP: 「ひゃうっ──はっ！　あっ！　きもちいっ！！！\nんっ──ちつの、なか──勃起──ぐりって、うごいて」
1674 = "「Hyau── hà! A! Sướng quá!!!\nƯm── bên trong, âm đạo── dương vật cương cứng── đang, chuyển động」"
# monologue
# JP: 僕に両足を抱きかかえられ、それでもみくろは、\n自分で腰を動かしている。
2630 = "Dù đang bị tôi ôm lấy hai chân, Mikuro vẫn\ntự mình di chuyển vùng hông."
# 【みくろ】
# display as 美玖路
# JP: 「みくろ、これ、好き。セックス。大好きっ。\n日々姫、さんの指、指もっ──双鉄、さんの、勃起も」
2131 = "「Mikuro, thích, chuyện này. Làm tình. Rất thích.\nNgón tay, của chị Hibiki, ngón tay cũng── dương vật cương cứng, của anh Soutetsu, cũng」"
# monologue
# JP: （くりっ──きりゅっ──さすっ──もみゅっ）
3141 = "（Vuốt──miết──xoa──nắn）"
# 【日々姫】
# display as 日日姬
# JP: 「うん。セックスは気持ちよかよね。大好きな人と。\n一番深く、ぜぇんぶむき出しでつながてるけんね」
1876 = "「Ừ. Làm tình sướng lắm nhỉ. Với người mình vô cùng yêu thương.\nKết nối với nhau sâu sắc nhất, phơi bày toàn bộ con người mình.」"
# 【みくろ】
# display as 美玖路
# JP: 「はいっ！　はいっ！　みくろ、うれしいっ──ん。\nきもちよくって──あったかくって──しあわせっ、で」
2047 = "「Vâng ạ! Vâng ạ! Mikuro, vui lắm── ưm.\nSướng quá── ấm áp quá── hạnh phúc quá, ạ」"
# 【日々姫】
# display as 日日姬
# JP: 「ばってん。ね？　みくろ」
1616 = "「Nhưng mà. Này? Mikuro.」"
# monologue
# JP: （とんっ）
3069 = "（Vỗ nhẹ）"
# 【みくろ】
# display as 美玖路
# JP: 「ひゃうっ！！！」
1679 = "「Hyau!!!」"
# monologue
# JP: 日々姫の指がみくろの胎を──\n人間でいうのであれば、子宮のあたりを軽ぅく叩く。
2756 = "Ngón tay của Hibiki khẽ gõ nhẹ vào bụng Mikuro──\nnếu là con người thì đó là vùng tử cung."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにと一緒に。わたしと一緒に。セックスしたら、\nもっとよかとよ？　自分の好きに動くだけじゃなく」
2218 = "「Cùng với anh hai. Cùng với chị. Cùng làm tình,\nthì sẽ sướng hơn nhiều đấy? Không chỉ tự di chuyển theo ý mình đâu.」"
# 【みくろ】
# display as 美玖路
# JP: 「あ」
# 1816 = "「啊」" 
# monologue
# JP: 自覚なく、腰が踊ってしまっていたのであろうか。\nみくろは動きをぴたりととめて、照れくさそうな声を出す。
2865 = "Có lẽ em ấy đã vô thức đung đưa hông.\nMikuro đột ngột dừng chuyển động, phát ra giọng điệu có vẻ xấu hổ."
# 【みくろ】
# display as 美玖路
# JP: 「みくろも──そうしてほしいです。さっきの、セックス。\n見せてもらったセックスみたいに──」
2115 = "「Mikuro cũng── muốn được như vậy ạ. Giống như lúc nãy, làm tình.\nGiống như cuộc làm tình mà Mikuro đã được xem──」"
# monologue
# JP: （きゅうううんっっ）
3106 = "（Siếtttttttttttt）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 2293 = "「！！！」" 
