1754 = "「Hyau! Sâu bên trong! Bụng của, Mikuro──\ntận sâu bên trong── bị chạm vào── bị, hôn──」"
# monologue
# JP: （ずっ！　こちゅっ！　ずりゅっ！　くりゅんっ！）
3137 = "（Trượt! Phập! Trượt! Vuốt ngược!）"
# 【みくろ】
# display as 美玖路
