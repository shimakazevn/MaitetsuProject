# 【日々姫】
# display as 日日姬
# JP: 「ん。私もしたかと。じゃ、今度も最初はお手本から。\nね、にぃに。みくろちゃんが見やすいような体位って」
1885 = "「Ừ. Chị cũng muốn làm. Vậy thì, lần này cũng bắt đầu từ việc làm mẫu trước nhé.\nNày anh hai. Tư thế nào để bé Mikuro dễ nhìn nhất nhỉ.」"
# 【双鉄】
# display as 雙鐵
