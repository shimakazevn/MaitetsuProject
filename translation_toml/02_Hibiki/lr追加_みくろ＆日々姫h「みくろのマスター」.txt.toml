1765 = "「Oa…… bên trong phần cơ thể con gái của chị Hibiki.\nMàu hồng ướt át và đang co bóp giật giật, đẹp quá đi mất.」"
# 【日々姫】
# display as 日日姬
# JP: 「///っ」
2316 = "「///」"
# monologue
# JP: 純真無垢で無知ゆえの、みくろの天然言葉責め。\nあっという間に失われてしまうものだろうゆえ……
2893 = "Những lời khiêu khích ngây ngô tự nhiên của Mikuro bắt nguồn từ sự thuần khiết và thiếu hiểu biết.\nVì đó là thứ sẽ nhanh chóng biến mất trong chớp mắt……"
