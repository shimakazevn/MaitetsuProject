# monologue
# JP: 吸われるっ！　強く！　突如左右から強烈に！\n全く予想せぬ快感に驚き飛び出しかけた精子を慌て止める。
2470 = "Bị mút! Thật mạnh! Đột nhiên bị mút mãnh liệt từ cả hai bên!\nQuá đỗi bất ngờ trước khoái cảm không lường trước được, tôi vội vã kìm lại dòng tinh trùng chực trào ra."
