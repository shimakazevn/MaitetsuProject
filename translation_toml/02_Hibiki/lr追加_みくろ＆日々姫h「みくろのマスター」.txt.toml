2746 = "Bàn tay còn lại không làm nhiệm vụ nâng đỡ và siết chặt, từ bên ngoài lớp da bụng của Mikuro,\nngọt ngào xoa xoa kích thích cả tôi và em ấy."
# 【日々姫】
# display as 日日姬
# JP: 「んふふっ──よかとね？　にぃにも、みくろも」
1702 = "「Ưm fufu── Sướng lắm đúng không? Cả anh hai và Mikuro.」"
