2616 = "Tôi bế thốc cơ thể Hibiki lên và đặt xuống giường.\nNgay lập tức, tôi cũng đè lên người cô ấy──"
# 【双鉄】
# display as 雙鐵
# JP: 「みくろ。よく見たいなら、腰のあたりだ。\n僕の勃起が、これから日々姫の[なか,1]膣内に入っていくゆえ」
2160 = "「Mikuro. Nếu em muốn nhìn rõ thì hãy nhìn vùng hông nhé.\nBởi vì dương vật cương cứng của anh chuẩn bị tiến vào bên trong âm đạo của Hibiki.」"
# 【みくろ】
# display as 美玖路
# JP: 「はい。えと……ええと、この辺でいいですか？」
