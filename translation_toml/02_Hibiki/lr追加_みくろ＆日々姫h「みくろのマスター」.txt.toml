[script]
# lines: 663 
# monologue
# JP: 幾百──という単位ではもう足りなくなった繰り返し。\n御一夜温泉駅ホームへの、8620形での入線。
2595 = "Hàng trăm──đơn vị đó không còn đủ để đếm số lần lặp lại nữa.\nTiến vào sân ga suối nước nóng Ohimitera trên đầu máy 8620."
# 【双鉄】
# display as 雙鐵
# JP: 「自弁、常用」
2195 = "「Van hãm tự động, phanh thường.」"
# monologue
# JP: だけれど今日が、『初めて』だ。\nゆえ、慎重の上に慎重を重ねて、減速加減を見極める。
2488 = "Thế nhưng hôm nay, là 'lần đầu tiên'.\nDo đó, tôi phải thận trọng hơn bao giờ hết, đánh giá kỹ mức độ giảm tốc."
# 【みくろ】
# display as ？？？
# JP: 「制動。良しです。このまま、このまま──\nあと10メートル……5メートル……」
2067 = "「Hãm phanh. Tốt. Cứ thế này, cứ thế này──\nCòn 10 mét…… 5 mét……」"
# 【双鉄】
# display as 雙鐵
# JP: 「──。自弁。運転」
2194 = "「──. Van hãm tự động. Vị trí chạy tàu.」"
# 【みくろ】
# display as 美玖路
# JP: 「にぃ。いち。──。」
2318 = "「Hai. Một. ──.」"
# monologue
# JP: 停車。\n完全に無衝動。
2497 = "Dừng tàu.\nHoàn toàn không có chấn động."
# 【日々姫】
# display as 日日姬
# JP: 「停止位置ぴたり！　お見事、にぃに！」
1618 = "「Vị trí dừng chính xác! Tuyệt lắm, anh hai!」"
# 【双鉄】
# display as 雙鐵
# JP: 「停止位置、よし。単弁、緩ブレーキ。逆転機中立」
1627 = "「Vị trí dừng, tốt. Van hãm đơn, phanh nhẹ. Cần đảo chiều số trung tính.」"
# monologue
# JP: いつもながらのことではあるが、流石に浮き立つ。\nであるからこそ、いつもどおりに。喚呼で動作を追認する。
2959 = "Dù là chuyện thường ngày, nhưng quả thật vẫn thấy lâng lâng.\nChính vì thế, tôi phải làm như mọi khi. Hô xác nhận để kiểm chứng thao tác."
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅ。御一夜温泉駅、着。定刻」
1707 = "「Phù. Đến ga suối nước nóng Ohimitera. Đúng giờ.」"
# 【みくろ】
# display as 美玖路
# JP: 「お疲れ様でした、双鉄さん、日々姫さん。\n安全でミスのない、本当に素敵な運転でした」
2222 = "「Vất vả cho hai người rồi, anh Soutetsu, chị Hibiki.\nMột chuyến đi an toàn, không chút sai sót, thực sự rất tuyệt vời.」"
# 【日々姫】
# display as 日日姬
# JP: 「みくろちゃんもお見事！　綺麗で丁寧でスムーズで！\nまっこと素晴らしか乗務だったと！」
2157 = "「Bé Mikuro cũng tuyệt lắm! Đẹp đẽ, cẩn thận và mượt mà!\nThực sự là một chuyến đi tuyệt vời!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。これならお客様方も大満足してくれるだろう」
2023 = "「Đúng vậy. Thế này thì chắc chắn hành khách cũng sẽ rất hài lòng.」"
# 【みくろ】
# display as 美玖路
# JP: 「あ」
1816 = "「A」"
# monologue
# JP: どこかぼーっと、夢見るようだった色違いの目が、\nみるみるうちに喜色に染まる。
2837 = "Đôi mắt hai màu có phần lơ đãng như đang mơ màng,\nnhanh chóng nhuốm màu vui sướng."
# 【みくろ】
# display as 美玖路
# JP: 「そうですよね──うん。やったんですよね。\nみくろ、38696と──本当にもう一度、お客様を乗せて」
2016 = "「Đúng vậy nhỉ──vâng. Em làm được rồi nhỉ.\nMikuro, cùng với 38696──thực sự đã một lần nữa, chở hành khách.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、走った。本当にな。\nそれが証拠に──ほら」
1882 = "「Ừ, chạy rồi. Thật sự đấy.\nBằng chứng là──nhìn kìa.」"
# monologue
# JP: 運転台の側面窓からホーム側を見る。
2598 = "Nhìn về phía sân ga từ cửa sổ bên hông buồng lái."
# 【みくろ】
# display as 美玖路
# JP: 「っ！！！！！！！！」
1771 = "「っ!!!!!!!!」"
# monologue
# JP: どうやら声にならないようだ。\nそれだけに、車窓外のざわめきがくっきり聞こえる。
2542 = "Có vẻ như em ấy không thốt nên lời.\nChính vì thế, tiếng ồn ào bên ngoài cửa sổ xe nghe càng rõ rệt."
# 【日々姫】
# display as 日日姬
# JP: 「うふふっ、みくろちゃんも38696も大人気とねー。\nみぃんな記念写真撮りたがって、うずうずしとると」
1696 = "「Ufufu, bé Mikuro và 38696 được yêu thích quá nhỉ.\nMọi người đều háo hức muốn chụp ảnh kỷ niệm kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。うずうずで、わくわくで、にこにこだ」
2019 = "「Đúng vậy. Háo hức, phấn khích, cười rạng rỡ.」"
# 【みくろ】
# display as 美玖路
# JP: 「笑顔……こんなにたくさんのお客さまたちが。\nみくろと38696──本当にまた、笑顔を運んで──っ！」
2092 = "「Nụ cười…… bao nhiêu là hành khách.\nMikuro và 38696──thực sự đã lại một lần nữa, mang đến nụ cười──!」"
# 【日々姫】
# display as 日日姬
# JP: 「あはっ」
1818 = "「Aha」"
# monologue
# JP: みくろが抱きつく。日々姫にぎゅうっと、甘えるように。\n思いっきりの笑顔を浮かべて、強く、強く。
2868 = "Mikuro ôm chầm lấy. Ôm chặt lấy Hibiki như làm nũng.\nNở một nụ cười rạng rỡ hết cỡ, thật mạnh, thật chặt."
# 【みくろ】
# display as 美玖路
# JP: 「日々姫さんと双鉄さんのおかげです！\nご一緒してもらった清掃が、体験型整備につながって」
2248 = "「Nhờ có chị Hibiki và anh Soutetsu cả đấy ạ!\nBuổi dọn dẹp cùng nhau đã dẫn đến hoạt động bảo dưỡng trải nghiệm.」"
# 【日々姫】
# display as 日日姬
# JP: 「その体験型整備が、地元の保存機を大事にしたい、\nっていうムーブメントにつながって」
2178 = "「Hoạt động bảo dưỡng trải nghiệm đó lại dẫn đến phong trào\nmuốn trân trọng những cỗ máy được bảo tồn ở địa phương.」"
# 【双鉄】
# display as 雙鐵
# JP: 「『もう一度38696を本線に』という動きにまで繋がった。\nその最も大きな推進力となったのは、やはり、みくろだ」
2048 = "「Dẫn đến cả phong trào 'Đưa 38696 trở lại đường chính một lần nữa'.\nĐộng lực lớn nhất thúc đẩy điều đó, quả nhiên là Mikuro.」"
# monologue
# JP: みくろがいわば“SL復元ブーム”の象徴となったこと。\nそれが雄武田市民に火をつけたこと。それがなければ──
2842 = "Mikuro có thể nói là biểu tượng của 'trào lưu phục dựng SL'.\nĐiều đó đã thắp lửa cho người dân Omuta. Nếu không có nó──"
# 【みくろ】
# display as 美玖路
# JP: 「みくろだけだったら、なんにも起きていなかったです。\n日々姫さんと……双鉄さんがいてくれたから」
2205 = "「Nếu chỉ có mình Mikuro thì đã chẳng có chuyện gì xảy ra.\nVì có chị Hibiki…… và anh Soutetsu ở bên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2291 = "「!」"
# monologue
# JP: まっすぐ僕へと向けられるまなざしの強さにドキリとする。\n左右の色の異なった……なんと美しい瞳だろう。
2844 = "Ánh mắt mạnh mẽ hướng thẳng về phía tôi khiến tôi giật mình.\nĐôi mắt hai màu khác biệt…… thật đẹp làm sao."
# monologue
# JP: （そういえば、いつからだったか──\n“ハチロクお姉さまのマスターさん”ではなく……）
3138 = "（Nhắc mới nhớ, từ lúc nào nhỉ──\nKhông còn gọi là 'Master của chị Hachiroku' nữa……）"
# 【みくろ】
# display as 美玖路
# JP: 「双鉄さんが、淵さんをご紹介くださったから。\nこはるちゃんの58623まで、レールを繫いでくれたから」
1994 = "「Vì anh Soutetsu đã giới thiệu chú Fuchi cho em.\nVì anh đã kết nối đường ray đến tận chiếc 58623 của Koharu-chan.」"
# monologue
# JP: ナインスターズが走り始めてすぐに発覚した8620の\n台枠損傷。そのときにご縁を得た方が、淵さんだ。
2477 = "Ngay sau khi Nine Stars bắt đầu chạy, khung gầm của 8620\nđã bị phát hiện hư hỏng. Chú Fuchi chính là người tôi có duyên gặp gỡ lúc đó."
# 【みくろ】
# display as 美玖路
# JP: 「お姉さまの8620と台枠を交換して下さっただけじゃなく。\nみくろの38696とも、沢山の部品を交換して下さって」
1966 = "「Chú ấy không chỉ đổi khung gầm với 8620 của chị Hachiroku.\nMà còn đổi rất nhiều linh kiện cho chiếc 38696 của Mikuro nữa.」"
# monologue
# JP: 結果、58623のオリジナル部品は殆ど出ていってしまった。\n豊河工場の記念すべき保存車輌であるにも関わらず。
2775 = "Kết quả là, hầu hết các linh kiện gốc của 58623 đã bị tháo dỡ.\nMặc dù đó là toa xe bảo tồn đáng kỷ niệm của xưởng Toyokawa."
# 【みくろ】
# display as 美玖路
# JP: 「58623のレイルロオド。こはるさんの、最後の夢。\n『もう一度だけでも走りたい』、それを淵さんは……」
2319 = "「Railord của 58623. Giấc mơ cuối cùng của chị Koharu.\n'Muốn chạy một lần nữa thôi cũng được', điều đó đã được chú Fuchi……」"
# monologue
# JP: 原型を失った58623を前に、淵さんは聞かせてくれた。\n”こはるの魂を示すこと”再優先すべきはそこなのだと。
2539 = "Đứng trước chiếc 58623 đã mất đi hình dáng ban đầu, chú Fuchi đã nói cho tôi nghe.\n'Thể hiện linh hồn của Koharu', đó mới là điều cần ưu tiên nhất."
# 【日々姫】
# display as 日日姬
# JP: 「淵さんとこはるちゃんの夢を、願いを。\nみくろちゃんと38696！　きっちり叶えきったとね！」
2129 = "「Giấc mơ, ước nguyện của chú Fuchi và Koharu-chan.\nBé Mikuro và 38696! Đã thực hiện trọn vẹn rồi nhỉ!」"
# monologue
# JP: 抱きついたまま頷いて。\nけれどもハっと顔をあげ、みくろは小さく首を振る。
2869 = "Mikuro vẫn ôm chặt và gật đầu.\nNhưng chợt ngẩng mặt lên, em ấy khẽ lắc đầu."
# 【みくろ】
# display as 美玖路
# JP: 「いいえ、まだまだこれからです。これからもっと、\nたくさんのたくさんのお客さんたちの笑顔を乗せて！」
1607 = "「Không đâu, vẫn còn ở phía trước. Từ nay về sau,\nsẽ còn chở nụ cười của rất nhiều, rất nhiều hành khách nữa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1941 = "「Đúng vậy.」"
# monologue
# JP: とうの昔に解体されたこはるさんに、\n感謝を示し伝える術は、それだけしかない。
2560 = "Với Koharu-san đã bị tháo dỡ từ lâu,\nđó là cách duy nhất để bày tỏ và truyền đạt lòng biết ơn."
# 【双鉄】
# display as 雙鐵
# JP: 「いずれ豊河へも──その先までもずっと鉄路を繋ぎ。\nいま一度、全国どこにでも鉄道でいける時代を取り戻す」
2251 = "「Sớm muộn gì cũng sẽ nối đường ray đến Toyokawa──và cả những nơi xa hơn nữa.\nMột lần nữa, lấy lại thời đại mà có thể đi bất cứ đâu trên toàn quốc bằng đường sắt.」"
# 【みくろ】
# display as 美玖路
# JP: 「はい！」
2043 = "「Vâng!」"
# 【双鉄】
# display as 雙鐵
# JP: 「その暁にはきっと記念列車も走るだろう。\nみくろと38696にも、叶うなら豊河を含む区間を」
1953 = "「Đến lúc đó chắc chắn sẽ có chuyến tàu kỷ niệm chạy.\nMikuro và 38696, nếu được, cũng sẽ chạy đoạn đường bao gồm cả Toyokawa.」"
# 【みくろ】
# display as 美玖路
# JP: 「走りたいです！　走ってきっとこはるさんに──\nううん、そのときは、こはるさんと一緒に走りたいです」
1987 = "「Em muốn chạy! Chạy rồi chắc chắn sẽ báo với chị Koharu──\nKhông, lúc đó, em muốn chạy cùng với chị Koharu.」"
# 【日々姫】
# display as 日日姬
# JP: 「きっと走れる。みくろちゃんなら！」
2153 = "「Chắc chắn sẽ chạy được. Nếu là bé Mikuro!」"
# 【みくろ】
# display as 美玖路
# JP: 「一生懸命がんばります！　だから、そのときにもみくろ、\n日々姫さんと双鉄さんに、運転をお願いしたいです！」
1980 = "「Em sẽ cố gắng hết sức! Vì vậy, lúc đó Mikuro,\ncũng muốn nhờ chị Hibiki và anh Soutetsu lái tàu!」"
# 【日々姫】
# display as 日日姬
# JP: 「まーかせて！」
1649 = "「Cứ giao cho chị!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕も任された」
1873 = "「Ừm. Anh cũng nhận lời.」"
# 【みくろ】
# display as 美玖路
# JP: 「ありがとうございます！！」
2213 = "「Cảm ơn hai người!!」"
# 【日々姫】
# display as 日日姬
# JP: 「お礼だなんて、まだまだ早すぎ」
2073 = "「Cảm ơn gì chứ, vẫn còn sớm lắm.」"
# monologue
# JP: （もちっ）
3143 = "（Béo má）"
# 【みくろ】
# display as 美玖路
# JP: 「////っ！？」
2306 = "「////!?」"
# monologue
# JP: 笑顔がいまにも零れんばかりのみくろの頬を、\nふざけたように日々姫が両手で挟み込む。
2717 = "Hibiki dùng hai tay áp chặt vào hai má đang tràn ngập nụ cười của Mikuro,\nnhư đang đùa giỡn."
# 【みくろ】
# display as 美玖路
# JP: 「ひ、日々姫さん」
1999 = "「Ch-Chị Hibiki.」"
# monologue
# JP: じゃれあうような姿勢に似合わず、日々姫の瞳は強い。\n煽られてなのか、みくろがみるみる朱に染まる。
2923 = "Trái ngược với tư thế như đang đùa giỡn, ánh mắt Hibiki lại rất kiên định.\nCó lẽ bị kích động, mặt Mikuro nhanh chóng đỏ bừng."
# 【日々姫】
# display as 日日姬
# JP: 「お礼なら、みくろちゃんの願いが全部叶ったときに。\nそれまでたくさん、もっと一緒にがんばらなくちゃ」
2096 = "「Nếu muốn cảm ơn, thì đợi đến khi tất cả ước nguyện của bé Mikuro thành hiện thực đã.\nCho đến lúc đó, chúng ta phải cùng nhau cố gắng nhiều hơn nữa.」"
# 【みくろ】
# display as 美玖路
# JP: 「もちろんです、日々姫さん。みくろ……みくろ……。\nみくろ、日々姫さんと──。みくろ！　日々姫さんのっ」
2270 = "「Tất nhiên rồi ạ, chị Hibiki. Mikuro…… Mikuro…….\nMikuro, với chị Hibiki──. Mikuro! Của chị Hibiki」"
# 【双鉄】
# display as 雙鐵
# JP: 「！！？」
2324 = "「!!?」"
# 【日々姫】
# display as 日日姬
# JP: 「みくろちゃん！？」
2176 = "「Bé Mikuro!?」"
# monologue
# JP: ブレーカーが落ちた如くに崩れ落ちそうになったみくろを、\n危ういところで日々姫もろとも抱き支える。
2861 = "Mikuro đột nhiên đổ gục xuống như bị sập cầu dao,\ntrong tình huống nguy hiểm đó, tôi đã ôm đỡ lấy cả Hibiki lẫn em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、立ちくらみでもしたか」
1960 = "「Sao vậy, bị chóng mặt à?」"
# 【みくろ】
# display as 美玖路
# JP: 「……いえ……あの……なに、これ……」
1106 = "「……Dạ không…… ưm…… cái gì, thế này……」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに。みくろちゃん、震えちゃってる」
2286 = "「Anh hai. Bé Mikuro, đang run kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1795 = "「Mư.」"
# monologue
# JP: 言われて気づく。\nみくろの体が小刻みに震えはじめている。
2911 = "Nghe nói mới để ý.\nCơ thể Mikuro đang bắt đầu run rẩy từng cơn."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。みくろ。\nすぐに登呂流湯さんに見てもらおう。日々姫。電話を」
