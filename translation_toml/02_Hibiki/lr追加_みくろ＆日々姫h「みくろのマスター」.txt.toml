1824 = "「A, đợi đã. Anh hai, cởi đồ ra đi?\nĐể bé Mikuro dễ nhìn nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな」
1878 = "「À, ừ nhỉ.」"
