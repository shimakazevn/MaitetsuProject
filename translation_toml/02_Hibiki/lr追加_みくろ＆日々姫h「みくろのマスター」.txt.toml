2854 = "Mỗi khi Mikuro nảy lên vì sung sướng, tinh dịch lại bị vắt kiệt không thương tiếc.\nDù bên trong âm đạo chật chội và chưa trưởng thành đến thế này──"
# 【みくろ】
# display as 美玖路
# JP: 「もっと、もっとしてください！　おんなじの、\n今とおんなじのぉ──みくろに、もっと──」
2098 = "「Nữa đi, hãy làm thế nữa đi ạ! Giống hệt như vậy,\ngiống hệt như lúc nãy── cho Mikuro, nhiều hơn nữa──」"
