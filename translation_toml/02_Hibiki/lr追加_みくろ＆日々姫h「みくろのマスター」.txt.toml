2649 = "或許是日日姬在一旁跟著抽插的節奏並愛撫的緣故，美玖路終於高潮了。高潮過後的狹隘的肉壺開始放鬆，感覺更有滋味！" 

# 【双鉄】
# JP: 「っ！」
# 2291 = "「！」" 

# monologue
# JP: （ずちゅっ！　ばちゅっ！　ばぢゅっ！　ぶぢゅっ！）
3154 = "（高歌猛進）" 

# 【みくろ】
# display as 美玖路
# JP: 「ひゅあっ！？　あうっ！　あっ！　きゅううんっ！」
1753 = "「咿呀！啊唔！啊！啊嗚！」" 

# monologue
# JP: みくろの口がぱくぱくあえぐが、もう止まれない。\n日々姫の指も輪となでなでで僕の加速を煽り立てる。
2880 = "美玖路發出陣陣浪叫，可我已經身不由已。日日姬用手指環成的圈也在全力套弄肉棒，不斷激發我的肉慾。" 

# monologue
# JP: （ずびゅっ！　ばぢゅっ！　ぢゅぶっ！　どちゅっ！）
3092 = "（所向披靡）" 

# 【みくろ】
# display as 美玖路
# JP: 「はうっ！　あっ！　あっ！　あああっ！\nふあ──っ──んっ！　んううううっ！！！」
1786 = "「哈嗚！啊！啊！啊啊啊！呼啊——嗯！嗯唔唔！！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「よかよ？　にぃにも思いっきりにイっちゃおう？」
1668 = "「可以的哦，阿哥也盡情地射出來吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いわれずっ──とも──だっ！」
2190 = "「自不用說！」" 

# monologue
# JP: 加速していく。加熱されてる。腰の全部を、勃起の全部を、\n肉の鳴る音を立てながら、タマごとみくろにぶつけてる。
2462 = "一切都在加熱並加速。我的腰間和肉棒彷彿化身無情的打樁機，耳邊不斷迴響起肌膚碰撞的聲音，連睪丸都狠狠地撞向臀肉。" 

# monologue
# JP: （ずごっ！　ばちゅっ！　ずびゅっ！　ごちゅっ！！！）
# 3122 = "（疾風暴雨）" 

# 【みくろ】
# display as 美玖路
# JP: 「ひゃうっ──んっ──ふあっ──あっ──\nあっ──あっ──あっ──ああっ──」
1678 = "「呀啊——嗯——呼啊——啊——　啊——啊——啊——啊啊——」" 

# monologue
# JP: 言葉を失うほどにみくろがどんどん柔らかく、熱くなる。、\n日々姫の匂いも濃くなって、鼻から脳へと染み込んでくる。
2896 = "美玖路的身子越變越軟，體溫也逐漸升高，甚至失去了組織語言的能力。日日姬身上的雌性氣味也開始變得濃厚，直衝我的腦門。" 

# monologue
# JP: （ずっ！　ちゅ！　ずっ！　ぢゅ！　ぱん！　ばちゅ！）
3082 = "（奮力衝刺）" 

# monologue
# JP: 精液がぶわぶわ膨らんで、勃起をみちみち満たしてしまう。\nさっきあれほど濃厚な精を思う存分放っても、なお。
2815 = "精液如泉噴湧般遊走於尿道之中，為肉棒平添了幾分硬度。剛才的濃厚射精就像是沒發生過一樣。" 

# 【みくろ】
# display as 美玖路
# JP: 「ふえっ！？　またっ──みくろっ！　またっ！\nだって！　ぼっきっ！　だってっ！　だってぇっ！！」
1708 = "「呼哎？！又來了——美玖路又要洩了！因為！肉棒！真的！非常舒服！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「いいよ？　もいちど。にぃにと一緒に」
1666 = "「可以的哦，這次和阿哥一起高潮」" 

# 【みくろ】
# display as 美玖路
# JP: 「ふあっ！　あっ！　いっしょ──いっしょにぃっ！」
1735 = "「呼啊！啊！一起，我們一起！」" 

# monologue
# JP: （きゅうううううううんっ！！！）
# 3051 = "（劇烈收縮）" 

# monologue
# JP: みくろの膣が甘くわななき締め付けてくる、\n同時に日々姫が、指の輪っかを締めてゆるめて！！！！
2890 = "美玖路的蜜穴開始痙攣並緊緊包住肉棒，同時日日姬的手指一緊一鬆來回套弄！！！！" 

# monologue
# JP: （きゅぽっ！）
3096 = "（抖動）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！！！」
# 1799 = "「唔啊！！！！！」" 

# monologue
# JP: （びゅううっ！　どびゅるっ！　びゅぶっ！　ぼびゅ！）
# 3077 = "（噴薄而出）" 

# 【みくろ】
# display as 美玖路
# JP: 「んぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅっっ！！！」
1864 = "「嗯嗚嗚！！！」" 

# monologue
# JP: （どびゅっ！　ぶびゅっ！　びゅるっ！　びゅうっ！）
# 3076 = "（噴湧如注）" 

# monologue
# JP: ゆえ、射精する。みくろの膣の最奥に。\n恐らく子宮の存在しない──
2544 = "大量的精液如浪潮般湧進美玖路蜜壺的深處。目的地恐怕就是子宮不存在的位置——" 

# 【みくろ】
# display as 美玖路
# JP: 「ふやっ──なにっ、これっ──あちゅいのっ──\nおなか──おまた──どろって──ふっ──あっ」
1741 = "「呼啊，這是什麼？好熱的東西進到肚子裡面去了，胯部黏糊糊的，呼——啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「そいば、精液。にぃにの精子。みくろがにぃにを、\nいちばぁん気持ちよくしてあげられた、その証拠」
2240 = "「這個叫精液，是阿哥的精子。這是美玖路讓阿哥舒爽到極致的最佳證明」" 

# 【みくろ】
# display as 美玖路
# JP: 「っ！　わあっ」
1767 = "「哇啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くっ！」
# 1800 = "「唔！」" 

# monologue
# JP: （びゅぶっ！　どびゅっ！　びゅうう！　ぶひゅ！）
3053 = "（勢如破竹）" 

# monologue
# JP: 挿入し射精している最中の、不意打ちめいた天使の笑顔に、\n僕の勃起は悦び勇み、さらに射精を強めてしまう。が──
2557 = "射精過程中，美玖路無意間露出天使般甜美的微笑，這讓我的肉棒更加歡呼雀躍，射精的勢頭更是一發不可收拾。但——" 

# monologue
# JP: （びゅっ──びゅるっ──びゅうっ──びゅっ）
3152 = "（餘韻悠長）" 

# 【みくろ】
# display as 美玖路
# JP: 「わ……やだ、もったいない。双鉄さんの、精子、精液。\nみくろの膣から、どろって──零れてきちゃいました」
1761 = "「哇……不要，好浪費。雙鐵先生的精子、精液。都從美玖路的小穴裡漏出來了」" 

# monologue
# JP: 膣そのものの浅さのせいか、それとも僕の想像通り、\nやはり子宮が無いせいか、精子はすぐさま溢れ始める。
2471 = "不出所料，或許是陰道過淺的緣故，亦或是因為最深處沒有子宮，精液很快就從蜜壺裡源源不斷溢了出來。" 

# monologue
# JP: （つううううっ）
# 3106 = "（收緊）" 

# 【みくろ】
# display as 美玖路
# JP: 「あ」
# 1816 = "「啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんね、みくろ。\nにぃにの精液。無駄にしちゃったらもったいなかとね」
2020 = "「是啊，美玖路，阿哥的精液浪費掉確實不太好呢」" 

# monologue
# JP: 溢れた精子を、日々姫は指に絡めてすくい。
2729 = "日日姬將滿溢而出的精液舀在手指上。" 

# 【日々姫】
# display as 日日姬
# JP: 「（あむっ）──んっ──ん～～。\nどぎゃん？　みくろ。おいしかものじゃなかけど」
2311 = "「（啊嗚）——嗯——嗯～～美玖路，要試試看嗎？雖然味道並不怎麼樣」" 

# 【みくろ】
# display as 美玖路
# JP: 「みくろもお相伴したいです！　んっ！！！」
2116 = "「美玖路也想嚐嚐看！嗯！！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「んむっ！？　ん……ふっ──んふふっ──」
1861 = "「嗯唔？！嗯……呼——嗯呼呼——」" 

# monologue
# JP: ちゅくちゅく、とても甘い水音。\nみくろと日々姫が絡める舌に、どろりとした僕の精液が
2910 = "耳畔響起甜美的水聲。美玖路和日日姬唇舌相交，舌尖上掛著不少我的精液。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……というか、日々姫。みくろ。\n僕にもお相伴させてくれ」
1111 = "「……話說，日日姬，美玖路。我也一起來」" 

# monologue
# JP: キスをしたまま、みくろの瞳がにっこり笑う。\n日々姫の目は、少し驚き、あきれてる。
2904 = "美玖路笑盈盈地接著吻，日日姬則露出了些許訝異的眼神，似乎對我的行為感到不可思議。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。気持ちはわかる」
1890 = "「嗯，我能理解你的心情」" 

# monologue
# JP: 自分自身の射精したての精液を、\nいくらキスを交わしつつでも、味わいたいとは思わない。
2518 = "即便是在接吻過程中，正常來說也不會有人會特地去品嘗自己剛射出來的精液。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が。味わわねばならんのだ──」
1614 = "「但我今天必須嘗上一嘗——」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん──はっ──にぃに──にぃに──んっ──ちゅう」
1831 = "「嗯——哈——阿哥——阿哥——嗯——啾」" 

# 【みくろ】
# display as 美玖路
# JP: 「どうぞ、です──双鉄さん──ん……ちゅむ。れるっ」
1596 = "「一起來吧，雙鐵先生——嗯……啾唔，咧溜」" 

# monologue
# JP: 構わず深くキスをする。二人の舌と舌を絡めて、\n自身の精子の味、ともいえぬ味を口中に受け入れる。
2611 = "我想都沒想就與二人激吻。互相纏上彼此的舌頭，香甜的唾液夾雜著少許自身精液的味道在我口中擴散開來。" 

# monologue
# JP: （生臭く、エグく──喉に絡んでくるな、これは──）
3062 = "（味道極其刺激、腥臭——而且還會黏在喉嚨上）" 

# monologue
# JP: 恐らくはこの味こそが。三人でするセックスの。\n──甘さの奥にあるものだろうと、思うがゆえに。
2490 = "但這或許就是我們三人做愛最終所產生的味道。——蘊藏在甘甜之下另一種獨有的奇特味道。" 
