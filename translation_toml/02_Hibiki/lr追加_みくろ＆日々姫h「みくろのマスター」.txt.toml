1731 = "「Fuyaaaaaaan! Mikuro, thích lắm!!\nCái này, thích lắm! Được cọ xát, thích lắmmm」"
# monologue
# JP: （きゅうううううううううっっっ！！）
# 3107 = "（收縮）" 
