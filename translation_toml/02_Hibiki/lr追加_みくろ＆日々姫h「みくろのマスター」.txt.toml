2038 = "「Đúng rồi ạ! Là cái đó! Mikuro cũng, lóe sáng lên!\nỞ một nơi── sâu hơn, cả mạch điện, lóe sáng lên」"
# 【双鉄】
# display as 雙鐵
# JP: 「こうか？」
2042 = "「Thế này sao?」"
# monologue
