# JP: 甘えることを覚えたらしいみくろの膣の締め付けに、\n危うく精が漏れかける。
2899 = "Sự siết chặt từ âm đạo của Mikuro, có vẻ như em ấy đã học được cách làm nũng,\nsuýt chút nữa khiến tôi xuất tinh."
# 【みくろ】
# display as 美玖路
# JP: 「ふたりがまるでひとつの生き物みたいになった──\n一緒のセックス。みくろも、すごく、したいです」
1620 = "「Hai người như thể hòa làm một sinh vật duy nhất──\nCùng nhau làm tình. Mikuro cũng, rất, muốn ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら。しよ？\n今度はもっとぴったり三人重なり合って」
2265 = "「Vậy thì. Cùng làm nhé?\nLần này cả ba người chúng ta sẽ ôm chặt lấy nhau hơn nữa.」"
# monologue
# JP: （きゅっ）
# 3106 = "（收緊）" 
# 【双鉄】
# display as 雙鐵
# JP: 「お──おっ」
1790 = "「O── o」"
# monologue
# JP: 浅くて狭いみくろの膣に入りきらない根元部分を、\n日々姫が指でリングを作り、締め付けながら支えてくれる。
2735 = "Phần gốc không thể nhét vừa vào âm đạo nông và hẹp của Mikuro,\nđược Hibiki dùng ngón tay tạo thành vòng tròn, vừa siết chặt vừa nâng đỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「これなら恐らく……思うがままに動いても」
2244 = "「Thế này thì có lẽ…… dù anh có cử động theo ý muốn thì cũng」"
# monologue
# JP: （ずっ──りゅっ──ずちゅっ！　りゅぶっ！！）
3149 = "（Trượt──liếm──nhóp nhép! Phập!!）"
# 【みくろ】
# display as 美玖路
