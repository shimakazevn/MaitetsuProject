# display as 雙鐵
# JP: 「……。いまのままだと、虚空に射精してしまっていた。\n僕としては、それはあまりに寂しく、避けたい」
1642 = "「……. Nếu cứ tiếp tục như lúc nãy, anh sẽ xuất tinh vào hư không mất.\nĐối với anh, điều đó quá đỗi cô đơn và anh muốn tránh nó.」"
