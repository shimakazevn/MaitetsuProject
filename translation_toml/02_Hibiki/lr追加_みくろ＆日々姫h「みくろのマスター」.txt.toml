# display as 日日姬
# JP: 「いいよ？　もいちど。にぃにと一緒に」
1666 = "「Được mà? Một lần nữa nhé. Cùng với anh hai.」"
# 【みくろ】
# display as 美玖路
# JP: 「ふあっ！　あっ！　いっしょ──いっしょにぃっ！」
1735 = "「Fua! A! Cùng nhau── cùng nhauuu!」"
# monologue
# JP: （きゅうううううううんっ！！！）
# 3051 = "（劇烈收縮）" 
# monologue
# JP: みくろの膣が甘くわななき締め付けてくる、\n同時に日々姫が、指の輪っかを締めてゆるめて！！！！
2890 = "Âm đạo của Mikuro run rẩy ngọt ngào và siết chặt lấy tôi,\nđồng thời Hibiki cũng siết chặt rồi nới lỏng vòng tròn ngón tay!!!!"
# monologue
# JP: （きゅぽっ！）
3096 = "（Bốp!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！！！」
# 1799 = "「唔啊！！！！！」" 
# monologue
# JP: （びゅううっ！　どびゅるっ！　びゅぶっ！　ぼびゅ！）
# 3077 = "（噴薄而出）" 
# 【みくろ】
# display as 美玖路
# JP: 「んぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅっっ！！！」
1864 = "「Ưmuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuu!!!」"
# monologue
# JP: （どびゅっ！　ぶびゅっ！　びゅるっ！　びゅうっ！）
# 3076 = "（噴湧如注）" 
# monologue
# JP: ゆえ、射精する。みくろの膣の最奥に。\n恐らく子宮の存在しない──
2544 = "Vì thế, tôi xuất tinh. Vào tận sâu nhất trong âm đạo của Mikuro.\nNơi có lẽ không tồn tại tử cung──"
# 【みくろ】
# display as 美玖路
# JP: 「ふやっ──なにっ、これっ──あちゅいのっ──\nおなか──おまた──どろって──ふっ──あっ」
1741 = "「Fuya── gì thế, này── nóng quá──\nBụng── vùng kín── nhão nhoét── phu── a」"
# 【日々姫】
# display as 日日姬
# JP: 「そいば、精液。にぃにの精子。みくろがにぃにを、\nいちばぁん気持ちよくしてあげられた、その証拠」
2240 = "「Đó là, tinh dịch. Tinh trùng của anh hai. Là bằng chứng cho thấy Mikuro\nđã làm cho anh hai sướng nhấttt đấy.」"
# 【みくろ】
# display as 美玖路
# JP: 「っ！　わあっ」
1767 = "「っ! Oa」"
# 【双鉄】
# display as 雙鐵
# JP: 「くっ！」
# 1800 = "「唔！」" 
# monologue
# JP: （びゅぶっ！　どびゅっ！　びゅうう！　ぶひゅ！）
3053 = "（Phụt! Phụt! Phụttttt! Phụt!）"
# monologue
# JP: 挿入し射精している最中の、不意打ちめいた天使の笑顔に、\n僕の勃起は悦び勇み、さらに射精を強めてしまう。が──
2557 = "Nụ cười thiên thần như đánh úp bất ngờ trong lúc đang cắm sâu và xuất tinh,\nkhiến dương vật cương cứng của tôi càng thêm sung sướng, xuất tinh càng mạnh bạo hơn. Nhưng──"
# monologue
# JP: （びゅっ──びゅるっ──びゅうっ──びゅっ）
3152 = "（Phụt──phụt──phụttttt──phụt）"
# 【みくろ】
# display as 美玖路
# JP: 「わ……やだ、もったいない。双鉄さんの、精子、精液。\nみくろの膣から、どろって──零れてきちゃいました」
1761 = "「Oa…… không chịu đâu, lãng phí quá. Tinh trùng, tinh dịch của anh Soutetsu.\nTừ âm đạo của Mikuro, nhão nhoét── trào ra ngoài mất rồi ạ.」"
# monologue
# JP: 膣そのものの浅さのせいか、それとも僕の想像通り、\nやはり子宮が無いせいか、精子はすぐさま溢れ始める。
2471 = "Có lẽ do bản thân âm đạo quá nông, hay đúng như tôi tưởng tượng,\nquả nhiên là vì không có tử cung, nên tinh trùng lập tức bắt đầu trào ra."
# monologue
# JP: （つううううっ）
# 3106 = "（收緊）" 
# 【みくろ】
# display as 美玖路
# JP: 「あ」
# 1816 = "「啊」" 
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんね、みくろ。\nにぃにの精液。無駄にしちゃったらもったいなかとね」
2020 = "「Đúng vậy nhỉ, Mikuro.\nTinh dịch của anh hai. Lãng phí thì uổng lắm đấy.」"
# monologue
# JP: 溢れた精子を、日々姫は指に絡めてすくい。
2729 = "Hibiki quấn những giọt tinh dịch trào ra quanh ngón tay rồi hứng lấy."
# 【日々姫】
# display as 日日姬
# JP: 「（あむっ）──んっ──ん～～。\nどぎゃん？　みくろ。おいしかものじゃなかけど」
2311 = "「（Amu）──Ưm──ưm~~.\nThế nào? Mikuro. Dù không phải là thứ ngon lành gì.」"
# 【みくろ】
# display as 美玖路
# JP: 「みくろもお相伴したいです！　んっ！！！」
2116 = "「Mikuro cũng muốn được nếm thử ạ! Ưm!!!」"
# 【日々姫】
# display as 日日姬
# JP: 「んむっ！？　ん……ふっ──んふふっ──」
1861 = "「Ưm!? Ưm……phu──ưm fufu──」"
# monologue
# JP: ちゅくちゅく、とても甘い水音。\nみくろと日々姫が絡める舌に、どろりとした僕の精液が
2910 = "Tiếng nước chóp chép, vô cùng ngọt ngào.\nTrên những chiếc lưỡi đan vào nhau của Mikuro và Hibiki, tinh dịch đặc sệt của tôi"
# 【双鉄】
# display as 雙鐵
# JP: 「……というか、日々姫。みくろ。\n僕にもお相伴させてくれ」
1111 = "「……Đúng hơn là, Hibiki. Mikuro.\nCho anh nếm thử với.」"
# monologue
# JP: キスをしたまま、みくろの瞳がにっこり笑う。\n日々姫の目は、少し驚き、あきれてる。
2904 = "Vẫn đang hôn, ánh mắt Mikuro mỉm cười rạng rỡ.\nÁnh mắt Hibiki thì có chút ngạc nhiên, và cạn lời."
# 【双鉄】
# display as 雙鐵
# JP: 「だな。気持ちはわかる」
1890 = "「Vậy nhỉ. Anh hiểu cảm giác đó.」"
# monologue
# JP: 自分自身の射精したての精液を、\nいくらキスを交わしつつでも、味わいたいとは思わない。
2518 = "Tinh dịch do chính mình vừa mới xuất ra,\ndù là thông qua những nụ hôn, tôi cũng chẳng muốn nếm thử chút nào."
# 【双鉄】
# display as 雙鐵
# JP: 「が。味わわねばならんのだ──」
1614 = "「Nhưng. Anh phải nếm thử mới được──」"
# 【日々姫】
# display as 日日姬
# JP: 「ん──はっ──にぃに──にぃに──んっ──ちゅう」
1831 = "「Ưm── hà── anh hai── anh hai── ưm── chụt」"
# 【みくろ】
# display as 美玖路
# JP: 「どうぞ、です──双鉄さん──ん……ちゅむ。れるっ」
1596 = "「Xin mời, ạ── anh Soutetsu── ưm…… chụt. Liếm」"
# monologue
# JP: 構わず深くキスをする。二人の舌と舌を絡めて、\n自身の精子の味、ともいえぬ味を口中に受け入れる。
2611 = "Mặc kệ điều đó, tôi hôn thật sâu. Quấn lấy lưỡi của cả hai,\ntôi đón nhận hương vị tinh trùng của chính mình, một hương vị không thể gọi tên, vào trong miệng."
# monologue
# JP: （生臭く、エグく──喉に絡んでくるな、これは──）
3062 = "（Tanh tưởi, chát chúa── mắc kẹt nơi cổ họng, cái thứ này──）"
# monologue
# JP: 恐らくはこの味こそが。三人でするセックスの。\n──甘さの奥にあるものだろうと、思うがゆえに。
2490 = "Có lẽ hương vị này chính là. Của cuộc làm tình ba người.\n──Thứ nằm ẩn sâu bên dưới sự ngọt ngào, tôi nghĩ vậy."
