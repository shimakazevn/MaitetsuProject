1840 = "「Ưm…… （Ực） Ưm fu──fufu. Em hiểu chưa? Mikuro.\nĐó chính là làm tình. Cách kết nối sâu sắc nhất giữa đàn ông và phụ nữ.」"
# 【みくろ】
