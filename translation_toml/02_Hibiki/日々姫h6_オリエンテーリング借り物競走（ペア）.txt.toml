# 日々姫h6_オリエンテーリング借り物競走（ペア）.txt 
[info]

[characters]
3280 = "Hibiki"
3005 = "Soutetsu"

[character_subs]
3371 = "Hibiki"
3612 = "Soutetsu"

[script]
# lines: 716 
# 【日々姫】
# display as 日日姬
# JP: 「運動会。商店街の」
2179 = "「Hội thao. Của khu phố thương mại」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――もうそんな季節か」
2161 = "「À――Đã đến mùa đó rồi sao」"
# monologue
# JP: 最近、妙に来客が多いと感じていたが――\nいやはや、すっかり失念していた。
3199 = "Dạo gần đây tôi có cảm giác khách khứa đến đông một cách lạ thường―― Chà chà, tôi hoàn toàn quên khuấy đi mất."
# 【双鉄】
# display as 雙鐵
# JP: 「聞くまでもないことだが」
2433 = "「Chuyện này thì chẳng cần hỏi cũng biết nhưng mà」"
# 【日々姫】
# display as 日日姬
# JP: 「仕切ると。今年も。ねぇねぇが」
2746 = "「Năm nay. Chị cả cũng. Đứng ra tổ chức」"
# monologue
# JP: 尋ねる前に、ズバリの答え。\nまことに正しく、聞くまでもないことだったらしい。
3247 = "Chưa kịp hỏi thì em ấy đã trả lời trúng phóc. Quả thật đúng là chuyện chẳng cần hỏi cũng biết."
# 【双鉄】
# display as 雙鐵
# JP: 「好きなのだなぁ、真闇姉は、運動会が」
2566 = "「Chị Mayami thích hội thao thật đấy nhỉ」"
# 【日々姫】
# display as 日日姬
# JP: 「昔っからとよ。\nねぇねぇ、みんなが頑張っとる姿をみるの好きやけん」
2749 = "「Từ ngày xưa rồi cơ. Chị cả rất thích nhìn thấy dáng vẻ cố gắng hết mình của mọi người mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――確かに思い当たるな」
2246 = "「Ừ――Quả thật là có chuyện đó」"
# monologue
# JP: 常に見守り、けれどもギリギリのギリギリまで、\n自分からは救いの手を差し伸べない。
3058 = "Luôn dõi theo, nhưng phải đến phút chót của phút chót, chị ấy mới tự mình dang tay cứu giúp."
# monologue
# JP: 努力を、そして成長を見守ることが、\nなるほど、真闇姉は、ただ単に“好き”なのか。
3001 = "Dõi theo sự nỗ lực, và sự trưởng thành, ra là vậy, chị Mayami đơn thuần chỉ là \"thích\" điều đó thôi sao."
# 【日々姫】
# display as 日日姬
# JP: 「でしょお。でなきゃこぎゃんこつ引き受けんとよ。\n運動会の幹事だなんて、毎年毎年」
2359 = "「Đúng không. Chứ không thì chị ấy đã chẳng nhận mấy việc này đâu. Năm nào cũng làm cán sự tổ chức hội thao cơ mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかしまぁ、これほど大いに盛り上がるのも、\n真闇姉の手腕があってのことだろう」
2062 = "「Nhưng mà, hội thao náo nhiệt được đến mức này, cũng là nhờ vào tài năng của chị Mayami cả thôi」"
# 【日々姫】
# display as 日日姬
# JP: 「まっことねー！　学園の、[にしきまち,2]二色町のこに話したら、\nびっくりされたもん」
2526 = "「Chuẩn luôn! Em kể chuyện này cho mấy đứa bạn ở thị trấn Nishiki nghe, tụi nó ngạc nhiên lắm luôn」"
# 【双鉄】
# display as 雙鐵
# JP: 「盛り上がりっぷりについてか？」
2495 = "「Về mức độ náo nhiệt à?」"
# 【日々姫】
# display as 日日姬
# JP: 「そ！　『うける～！　ありえ～～ん！』って」
2362 = "「Đúng rồi! Tụi nó bảo là 『Đỉnh thật! Không thể tin được!』」"
# 【双鉄】
# display as 雙鐵
# JP: 「うけるかどうかはともかく、ありえんはわかるな。\n僕の産まれた町でも、帝都でも、これはなかった」
2015 = "「Chưa bàn đến chuyện đỉnh hay không, nhưng không thể tin được thì anh hiểu. Ngay cả ở thị trấn nơi anh sinh ra, hay ở Đế đô, cũng không có chuyện này」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
2151 = "「Hả?」"
# monologue
# JP: ほんのすこし、戸惑った顔。
3482 = "Một khuôn mặt có chút bối rối."
# monologue
# JP: ああ、いかん。\n生家の話を、何も考えずにしてしまったか――
3025 = "A, hỏng rồi. Tôi vô tình nhắc đến chuyện quê nhà mà không hề suy nghĩ――"
# 【日々姫】
# display as 日日姬
# JP: 「ゆーたら、どぎゃんと？\nにぃにのふるさととか、帝都とかの商店会の運動会」
2696 = "「Vậy thì, nó như thế nào? Hội thao khu phố thương mại ở quê hương của anh hai, hay ở Đế đô ấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2180 = "「À――」"
# monologue
# JP: 僕のふるさと。\n日々姫が、力みなくそう話してくれる。
3403 = "Quê hương của tôi. Hibiki nói về điều đó một cách thật tự nhiên."
# monologue
# JP: “近くなった”と、だから、感じる。\n僕と日々姫は、お互いの知らぬ過去さえ重ねあえてる。
3203 = "Vì thế, tôi cảm thấy chúng tôi đã \"gần gũi hơn\". Tôi và Hibiki, giờ đây có thể chia sẻ cả những quá khứ mà đối phương chưa từng biết."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに？」
2745 = "「Anh hai?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや。うむ――\nつまりだな、基本的には、無いのだ」
2286 = "「À, không. Ừm―― Tóm lại là, về cơ bản thì, không có đâu」"
# 【日々姫】
# display as 日日姬
# JP: 「無いって、なにが？」
1971 = "「Không có là, không có cái gì?」"
# 【双鉄】
# display as 雙鐵
# JP: 「商店会主催の、大運動会がだ」
2664 = "「Đại hội thao, do khu phố thương mại tổ chức ấy」"
# 【日々姫】
# display as 日日姬
# JP: 「ええええ～！？　ありえーーーーーん！！」
2156 = "「Hảảảả~!? Không thể tin đượcccc!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。恐らくはそれが、御一夜の商店会主催の\n大運動会に初めて触れた人間の反応と同じものだろう」
2258 = "「Ừm. Có lẽ đó cũng chính là phản ứng của những người lần đầu tiên biết đến Đại hội thao do khu phố thương mại Ohimitera tổ chức đấy」"
# 【日々姫】
# display as 日日姬
# JP: 「え……え？　だって、そしたら他の町、とか。\n大人の人って、運動会ば、どぎゃんしとると？」
2140 = "「Hả......hả? Nhưng mà, nếu vậy thì ở các thị trấn khác, hay gì đó. Người lớn, làm thế nào để tham gia hội thao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、会社などの単位か、あるいは町内会などで\n――あるにしても、もっとごくごく小規模だ」
2284 = "「Chà, theo đơn vị công ty, hoặc là hội đồng khu phố chẳng hạn ――Dù có đi chăng nữa, thì quy mô cũng nhỏ hơn rất rất nhiều」"
# 【日々姫】
# display as 日日姬
# JP: 「あるにしても、って――\n完全になかところもあると！？」
2368 = "「Dù có đi chăng nữa, nghĩa là―― Có những nơi hoàn toàn không có luôn sao!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「というか、ある方が珍しいのではないかと思うぞ。\n地域での、『大人のための運動会』的なイベントが」
2024 = "「Đúng hơn là, anh nghĩ có mới là chuyện hiếm đấy. Một sự kiện mang tính khu vực, kiểu như 『Hội thao dành cho người lớn』 ấy」"
# 【日々姫】
# display as 日日姬
# JP: 「わ……わ――ありえなか……あっ！？　こほん。\nそれは、カルチャーショックですね、にいさん」
2130 = "「Oa......oa――Không thể tin được......A!? E hèm. Đúng là một cú sốc văn hóa nhỉ, anh trai」"
# monologue
# JP: いきなり出てきた標準語。
3072 = "Đột nhiên lại chuyển sang nói giọng chuẩn."
# monologue
# JP: なるほど日々姫は、商店会主催の大運動会を、\n『非・都会的な風習』とでも理解したのか。
3386 = "Ra là vậy, Hibiki đã hiểu Đại hội thao do khu phố thương mại tổ chức như một 『Phong tục phi thành thị』 sao."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は素晴らしい習慣だと思うぞ？\n御一夜の、商店会主催の大運動会」
2442 = "「Anh thấy đó là một tập quán tuyệt vời mà? Đại hội thao do khu phố thương mại Ohimitera tổ chức ấy」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんと？　ううんっ――こほん。そうですか？」
2492 = "「Thật á? Không phải――E hèm. Vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そぎゃんだ。老若男女が力をあわせ、\nこころをあわせて、己の組の勝利のために努力する」
2294 = "「Ừ, thật đấy. Già trẻ gái trai cùng chung sức, đồng lòng, nỗ lực vì chiến thắng của đội nhà」"
# 【日々姫】
# display as 日日姬
# JP: 「うんうん」
2267 = "「Vâng vâng」"
# 【双鉄】
# display as 雙鐵
# JP: 「出店も多く、新しい交流のきっかけにもなっている。\n実際、全国に広まっていって欲しく思うほどだ」
2377 = "「Lại còn có nhiều gian hàng, tạo cơ hội cho những mối giao lưu mới. Thực sự, anh còn mong nó được nhân rộng ra toàn quốc nữa kìa」"
# 【日々姫】
# display as 日日姬
# JP: 「うんうん！」
2268 = "「Vâng vâng!」"
# monologue
# JP: 日々姫の笑顔がふくらんでいく。\nやはり、姉妹だ――複数の意味でそう感じる。
3483 = "Nụ cười của Hibiki ngày càng rạng rỡ. Quả nhiên là chị em――Tôi cảm nhận được điều đó theo nhiều nghĩa."
# 【日々姫】
# display as 日日姬
# JP: 「やったら！　にぃに、今年も出てくれる？」
2694 = "「Vậy thì! Anh hai, năm nay anh cũng tham gia chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、最初からそのつもりだ」
2290 = "「Ừ, ngay từ đầu anh đã định thế rồi」"
# 【日々姫】
# display as 日日姬
# JP: 「やったぁ！」
2325 = "「Tuyệt quá!」"
# monologue
# JP: 小さくガッツポーズして。\n正座の日々姫は、僕へと体を寄せてくる。
3583 = "Làm tư thế ăn mừng nhỏ xíu. Hibiki đang ngồi quỳ, liền xích người lại gần tôi."
# 【日々姫】
# display as 日日姬
# JP: 「やったら、ね？　イヤでなければ、\n私と――新しい競技に出てほしかとよ」
2688 = "「Vậy thì, nhé? Nếu anh không phiền, em muốn anh cùng em――tham gia một môn thi đấu mới」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫と一緒を、イヤなどと思えるはずもない」
2635 = "「Được tham gia cùng Hibiki, làm sao anh có thể thấy phiền được chứ」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへっ！」
2144 = "「Ehehe!」"
# monologue
# JP: 嬉しげな顔。\nほほがパアっと紅色になる。
3484 = "Khuôn mặt vui sướng. Hai má em ấy bừng lên màu đỏ ửng."
# monologue
# JP: それを自覚し、恥ずかしがってうつむいて――\n日々姫の髪の匂いがふっと、鼻をくすぐる。
3477 = "Nhận ra điều đó, em ấy ngượng ngùng cúi gằm mặt xuống―― Mùi hương từ mái tóc Hibiki thoảng qua, làm sống mũi tôi ngưa ngứa."
# 【双鉄】
# display as 雙鐵
# JP: 「で？　新競技とはどんなものだ」
2546 = "「Thế? Môn thi đấu mới là môn gì vậy」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　ええっとね、\n『オリエンテーリング借り物競走（ペア）』！」
2228 = "「A! Dạ là, 『Cuộc thi chạy mượn đồ định hướng (Cặp đôi)』!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おりえんてーりんぐかりものきょうそう\nかっこぺあ」
2630 = "「Cuộc thi chạy mượn đồ định hướng mở ngoặc cặp đôi đóng ngoặc」"
# monologue
# JP: 僕の返事で、『わかってない』と伝わったのか。
3470 = "Câu trả lời của tôi, có lẽ đã truyền đạt rõ thông điệp \"anh không hiểu gì cả\"."
# monologue
# JP: 日々姫はスケッチブックの間から、\n几帳面にたたまれた一枚の紙を取り出し、広げる。
3406 = "Hibiki lấy ra một tờ giấy được gấp gọn gàng từ giữa cuốn sổ phác thảo, rồi mở nó ra."
# 【日々姫】
# display as 日日姬
# JP: 「えと、オリエンテーリングってあるでしょお？\nあの、ヒントを頼りに地図のポイントを探すやつ」
2682 = "「Dạ, anh biết môn chạy định hướng chứ? Cái môn mà dựa vào gợi ý để tìm các điểm đánh dấu trên bản đồ ấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。路子と一緒に、一度か二度は、\n僕も経験したことがある」
2262 = "「Ừm. Cùng với Michiko, một hai lần gì đó, anh cũng từng tham gia rồi」"
# 【日々姫】
# display as 日日姬
# JP: 「そいばして、まずは言葉を集めていくと」
2018 = "「Dựa vào đó, đầu tiên là đi thu thập các từ ngữ」"
# 【双鉄】
# display as 雙鐵
# JP: 「言葉？　ああ――ふむ……一つのポイントクリアで、\n次のポイントの地図と共に、言葉が一つ見つかるのか」
2707 = "「Từ ngữ? À――hừm......Hoàn thành một điểm, thì sẽ nhận được bản đồ của điểm tiếp theo, cùng với một từ ngữ đúng không」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。そん言葉を全ポイントの分集めると、\n借りるものの名前になるって書いてあるとばい」
2264 = "「Vâng. Thu thập đủ từ ngữ ở tất cả các điểm, thì sẽ ghép thành tên của món đồ cần mượn, luật viết thế này đây」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――さすがは真闇姉だな」
2159 = "「Chà――Quả không hổ danh chị Mayami」"
# 【日々姫】
# display as 日日姬
# JP: 「って、なにが、『さすがは』ねぇねぇと？」
2150 = "「Ơ, sao anh lại nói, 『Quả không hổ danh』 chị cả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「この設定なら、ショートカットはギャンブルになる。\n最後までチェックポイントを回る必要が出るからな」
2453 = "「Với luật chơi này, việc đi đường tắt sẽ trở thành một canh bạc. Bởi vì bắt buộc phải đi qua tất cả các điểm kiểm tra cho đến phút cuối」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　っと……それって」
2153 = "「Hả? Dạ......thế nghĩa là」"
# 【双鉄】
# display as 雙鐵
# JP: 「今回、指定されるチェックポイントは三箇所。\n仮に、一文字目が『お』。二文字目が『か』だとする」
2663 = "「Lần này, có ba điểm kiểm tra được chỉ định. Giả sử, chữ cái đầu tiên là 『O』. Chữ cái thứ hai là 『Ka』 đi」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　わかった、お菓子！！」
2214 = "「A! Em biết rồi, Okashi (Bánh kẹo)!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんが、『お釜』かもれんし、\n『おかめ』の面、あるいは『お金』の可能性もある」
2066 = "「Cũng có thể, nhưng cũng có thể là 『Okama (Cái nồi)』, mặt nạ 『Okame』, hoặc cũng có khả năng là 『Okane (Tiền)』」"
# 【日々姫】
# display as 日日姬
# JP: 「あー！　そういう！　\n確かに、そぎゃん引っ掛けあるかもって思ったら――」
2166 = "「A! Ra là vậy! Đúng thật, nếu nghĩ đến việc có thể có cú lừa như thế thì――」"
# 【双鉄】
# display as 雙鐵
# JP: 「参加者は最後のヒントまで確かめねばならん。\nオリエンテーリングも本気でいかねばならんわけだ」
2048 = "「Người tham gia bắt buộc phải xác nhận cho đến gợi ý cuối cùng. Tức là cũng phải tham gia phần chạy định hướng một cách nghiêm túc」"
# 【日々姫】
# display as 日日姬
# JP: 「わー、\nわかったらホント、さすがねぇねばい」
2135 = "「Oa, hiểu ra rồi thì thấy, quả đúng là chị cả thật」"
# 【双鉄】
# display as 雙鐵
# JP: 「ペア競技というところも、\n勝負の分かれ目になりそうだな」
2558 = "「Việc đây là môn thi đấu theo cặp, có vẻ cũng sẽ là yếu tố quyết định thắng thua đấy」"
# monologue
# JP: コンビネーション、役割分担。\nその辺次第で、かなり時間を稼げよう。」
2978 = "Sự phối hợp, phân công nhiệm vụ. Tùy thuộc vào những điều đó mà có thể tiết kiệm được kha khá thời gian đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「念のためだが、\nペアは、別々に行動してもいいのだよな？」
2441 = "「Để chắc chắn thì anh hỏi lại, cặp đôi có thể hành động riêng lẻ được đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、ゴールの時にふたり一緒にいれば良か――\nって！　違っ――違わなっ！　んっ――う～～っ」
2282 = "「Vâng, chỉ cần lúc về đích hai người ở cùng nhau là được―― Á! Không――không phải! Ưm――ư~~」"
# monologue
# JP: 広げられてた、競技ルールの書かれた紙がたたまれる。
3396 = "Tờ giấy ghi luật thi đấu đang mở rộng bỗng bị gấp lại."
# monologue
# JP: たたんだところで、日々姫はぴたりと動きを止めて、\nひどく苦しげに うなってしまう。
3255 = "Gấp lại xong, Hibiki khựng người lại, rồi phát ra một tiếng rên rỉ đầy khổ sở."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした日々姫？　歯でも痛むか？」
2474 = "「Sao thế Hibiki? Em bị đau răng à?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ～～……うん。歯は平気やけど……\nあうぅ～っ、にぃににウソばつきたくなかけん」
2234 = "「A~~......vâng. Răng em không sao nhưng mà...... Auu~, em không muốn nói dối anh hai đâu」"
# monologue
# JP: 日々姫が、紙をまた開く。
3394 = "Hibiki lại mở tờ giấy ra."
# monologue
# JP: ルールを確認してみれば――\nやはり、ペアの別行動は認められている。
3121 = "Thử kiểm tra lại luật lệ xem sao―― Quả nhiên, việc cặp đôi hành động riêng lẻ là được phép."
# 【双鉄】
# display as 雙鐵
# JP: 「『ただし、二人同時にゴールしなければ\nゴールインとは認められない、か』なるほど」
1432 = "「『Tuy nhiên, nếu hai người không về đích cùng lúc thì sẽ không được công nhận là đã về đích, sao』 Ra là vậy」"
# 【日々姫】
# display as 日日姬
# JP: 「やっぱり……別行動の方が、よかと？」
2508 = "「Quả nhiên là......hành động riêng lẻ thì, tốt hơn ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「役割分担をうまくできれば、\n確かにその方が有利――ああ、いや、有利かもしれん」
2342 = "「Nếu phân công nhiệm vụ tốt, thì chắc chắn cách đó sẽ có lợi hơn――À, không, có lẽ là có lợi hơn」"
# monologue
# JP: 僕のことばが重なるごとに、\n落ち込んでいく日々姫の肩が教えてくれる。
3034 = "Mỗi khi tôi thốt ra một lời, đôi vai ngày càng rũ xuống của Hibiki lại cho tôi biết."
# monologue
# JP: 日々姫が何に葛藤し、\nルールを隠そうか隠すまいかと、なぜ迷ったのかを。
3596 = "Rằng Hibiki đang giằng xé điều gì, và tại sao em ấy lại phân vân không biết có nên giấu đi luật chơi hay không."
# 【双鉄】
# display as 雙鐵
# JP: 「が、二人同時に行動することにも、有利な点はある」
1987 = "「Nhưng mà, việc hai người cùng hành động với nhau, cũng có điểm lợi đấy」"
# 【日々姫】
# display as 日日姬
# JP: 「！！！」
2760 = "「!!!」"
# monologue
# JP: 日々姫の顔がパっと輝く。\nやはりか。ならば、他の選択肢などはない。
3372 = "Khuôn mặt Hibiki bừng sáng. Quả nhiên là vậy. Nếu thế thì, chẳng còn lựa chọn nào khác cả."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫さえよければ、競技中ずっと、\n僕は、ペア同士離れぬままに行動したいのだが」
2338 = "「Chỉ cần Hibiki thấy ổn, thì trong suốt cuộc thi, anh muốn hai chúng ta hành động cùng nhau mà không rời nửa bước」"
# 【日々姫】
# display as 日日姬
# JP: 「賛成！　賛成！　大賛成ばい！！」
2067 = "「Tán thành! Tán thành! Hoàn toàn tán thành!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、そうしよう」
2686 = "「Vậy thì, quyết định thế nhé」"
# 【日々姫】
# display as 日日姬
# JP: 「あの？　にぃに？」
2681 = "「Dạ? Anh hai?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2295 = "「Ừm?」"
# 【日々姫】
# display as 日日姬
# JP: 「一緒におるとは――競技中だけ？」
2416 = "「Ở cùng nhau là――chỉ trong lúc thi đấu thôi sao?」"
# monologue
# JP: かしげられた小首。\n甘えた瞳。
3408 = "Cái nghiêng đầu nhè nhẹ. Đôi mắt nũng nịu."
# monologue
# JP: これほど一緒にいるというのに、\n自信に満ちた視線には、けれどわずかな不安も混じる。
3145 = "Rõ ràng là chúng tôi đã ở bên nhau nhiều đến vậy, nhưng trong ánh mắt ngập tràn tự tin ấy, vẫn pha lẫn một chút bất an."
# 【双鉄】
# display as 雙鐵
# JP: 「いいや？　もしも日々姫がイヤでなければ――」
1930 = "「Không đâu? Nếu Hibiki không thấy phiền――」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……」
2191 = "「A......」"
# monologue
# JP: 軽い、キス。\n唇に、鼻に。そしておでこに。
3242 = "Một nụ hôn, nhẹ nhàng. Lên môi, lên mũi. Và rồi lên trán."
# 【双鉄】
# display as 雙鐵
# JP: 「競技前も、競技中も、競技後も。\n僕は、日々姫と一緒にいたい」
1937 = "「Trước khi thi đấu, trong khi thi đấu, và cả sau khi thi đấu. Anh đều muốn ở bên cạnh Hibiki」"
# monologue
# JP: パッ！　と、日々姫の笑顔が輝く。
3452 = "Bừng! Nụ cười của Hibiki tỏa sáng rạng rỡ."
# 【日々姫】
# display as 日日姬
# JP: 「私がにーにと一緒なの！\nイヤがるなんてありえんばい！！」
2431 = "「Được ở cùng với anh hai cơ mà! Làm sao mà em thấy phiền cho được!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ははっ、何処かで聞いたセリフだ」
2137 = "「Haha, câu này nghe quen quen ở đâu rồi thì phải」"
# 【日々姫】
# display as 日日姬
# JP: 「でしょお？　にーにを真似っ子したけんねー」
2361 = "「Đúng không? Em bắt chước anh hai đấy」"
# monologue
# JP: ゆるんだ日々姫が、並んで座る僕のふとももに\n指で“の”の字を書いてくる。
3425 = "Hibiki thư giãn, ngồi cạnh tôi, dùng ngón tay vẽ chữ \"No\" (の) lên đùi tôi."
# monologue
# JP: なかなか、心地よく照れくさい。\nお返しに、日々姫の頭をぽんぽん、撫ぜる。
3607 = "Một cảm giác vừa dễ chịu lại vừa ngượng ngùng. Để đáp lại, tôi xoa xoa, vỗ về đầu Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば一日、ずうっと一緒だ。\n運動会の楽しみがひとつ増えたな」
2690 = "「Vậy thì hôm nay, chúng ta sẽ ở bên nhau suốt cả ngày. Niềm vui của hội thao lại tăng thêm một phần rồi nhỉ」"
# 【日々姫】
# display as 日日姬
# JP: 「増えたと！？\nやったらにぃにも、はじめから運動会楽しみ！？」
2318 = "「Tăng thêm một phần á!? Vậy là ngay từ đầu anh hai cũng đã mong chờ hội thao rồi sao!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁな。体を思い切り動かすのは嫌いではないし、\n御一夜が一体となる、歴史あるイベントでもあるしな」
2589 = "「Cũng có thể nói vậy. Anh không ghét việc vận động cơ thể hết mình, với lại, đây cũng là một sự kiện mang tính lịch sử, gắn kết toàn bộ Ohimitera lại với nhau mà」"
# monologue
# JP: なにせ、近隣の学園までをも巻き込むほどだ。\n商店会主催がゆえの、平日開催。
3518 = "Dù sao thì, nó còn lôi kéo được cả các trường học lân cận tham gia cơ mà. Vì do khu phố thương mại tổ chức, nên nó diễn ra vào ngày thường."
# monologue
# JP: そのために、\n日曜補講と代休が、希望者には用意されるのだから。
3030 = "Cũng chính vì thế, những ai có nguyện vọng sẽ được sắp xếp học bù vào Chủ nhật và nghỉ bù."
# 【日々姫】
# display as 日日姬
# JP: 「ほーんと、一体よねー。\nスポーンサーもたくさんで、賞品も毎年豪華だし！」
2564 = "「Đúng là, gắn kết thật đấy nhỉ. Có rất nhiều nhà tài trợ, nên phần thưởng năm nào cũng hoành tráng cả!」"
# 【双鉄】
# display as 雙鐵
# JP: 「この競技の賞品は決まっているのか？」
2655 = "「Phần thưởng của môn thi đấu này đã được quyết định chưa?」"
# 【日々姫】
# display as 日日姬
# JP: 「決まってるとよー！　なんと！　\nペアでいく！　豪華、[ぢごくおんせん,3]遅刻温泉の旅！」
2348 = "「Đã quyết định rồi đó! Nghe này! Chuyến du lịch sang trọng, dành cho hai người! Tới Suối nước nóng Chikoku!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2164 = "「Ồ」"
# monologue
# JP: 遅刻温泉。\n僕でさえ知る温泉地。
3605 = "Suối nước nóng Chikoku. Một địa điểm suối nước nóng mà ngay cả tôi cũng biết."
# monologue
# JP: 湯の良さに、\n時間さえ忘れてしまうことが、名の由来だと聞いている。
3275 = "Nghe nói nguồn gốc của cái tên này là do nước ở đó quá tuyệt, khiến người ta quên cả thời gian."
# 【双鉄】
# display as 雙鐵
# JP: 「確か、[あそ,1]安蘇だよな。\n比較的近所でいきやすいし――実にいい」
2494 = "「Anh nhớ không lầm thì là ở Aso nhỉ. Khá gần nên cũng dễ đi――Quả thực rất tuyệt」"
# 【日々姫】
# display as 日日姬
# JP: 「やけん、ライバルも多そうやけど～」
2360 = "「Vì thế nên, có vẻ sẽ có nhiều đối thủ cạnh tranh lắm đây~」"
# 【双鉄】
# display as 雙鐵
# JP: 「今年の組分けも地域別か？」
1976 = "「Việc chia đội năm nay cũng theo khu vực à?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、そう！　あんね、こぎゃん感じと」
2288 = "「Vâng, đúng vậy! Nè, kiểu như thế này này」"
# monologue
# JP: スケッチブックにごく大まかな地図が描かれ、\n三色の線で囲われていく。
3010 = "Một tấm bản đồ cực kỳ phác thảo được vẽ trên cuốn sổ, và được khoanh vùng bằng những đường kẻ ba màu."
# 【双鉄】
# display as 雙鐵
# JP: 「ほうとなると……出て来るのなら、\n凪・ふかみは、まずコンビを組んでこような」
2661 = "「Nếu vậy thì......Nếu có tham gia, Nagi và Fukami, chắc chắn sẽ lập thành một cặp rồi」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。凪ちゃんとふかみちゃんはコンビネーション\n抜群やけん、ちょっと怖かと」
2260 = "「Vâng. Sự phối hợp của Nagi và Fukami là tuyệt hảo luôn, nên cũng hơi đáng gờm đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁだが、\n稀咲-凪などと来られるよりは、よほどいい」
1949 = "「Nhưng mà, so với việc Kisaki và Nagi ghép cặp thì vẫn còn tốt chán」"
# 【日々姫】
# display as 日日姬
# JP: 「うわ、考えたくもなかとね、そん組み合わせ。\n稀咲先輩の状況判断に、凪ちゃんの運動能力とか～」
2134 = "「Oa, em còn chẳng dám nghĩ tới, cái sự kết hợp đó. Khả năng phán đoán tình huống của tiền bối Kisaki, cộng với năng lực thể chất của Nagi~」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲自身の運動能力も高いしな。\nまぁ、相性がどうかはわからんが」
2581 = "「Bản thân năng lực thể chất của Kisaki cũng cao mà. Chà, dù không biết độ ăn ý của họ thế nào thôi」"
# 【日々姫】
# display as 日日姬
# JP: 「相性……稀咲先輩とポーレットさんって、\n案外、最近、お話あってる感じ、するとよね？」
2557 = "「Độ ăn ý......Tiền bối Kisaki và chị Paulette, dạo gần đây, có vẻ như nói chuyện khá hợp nhau nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。組まれてしまえば脅威だが――\nしかし、ポーレットはれいなと組むのではないか？」
2577 = "「Đúng là vậy. Nếu họ ghép cặp thì sẽ là một mối đe dọa lớn đấy―― Nhưng mà, chẳng phải Paulette sẽ ghép cặp với Reina sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「でも、そぎゃんしたら、\nハチロクが出場せんことになりそう、って思うけん」
2061 = "「Nhưng mà, nếu thế thì, em nghĩ Hachiroku sẽ không thể tham gia được mất」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2157 = "「À――」"
# monologue
# JP: 幹事である真闇姉は競技にはハナから不参加だ。\n僕も日々姫と組む以上……
3525 = "Chị Mayami là cán sự tổ chức nên ngay từ đầu đã không tham gia thi đấu. Một khi tôi đã ghép cặp với Hibiki thì......"
# monologue
# JP: 他にハチロクが組みそうな相手は、\nれいなだけしか思い当たらん。
2979 = "Người duy nhất mà Hachiroku có thể ghép cặp cùng, tôi chỉ có thể nghĩ đến Reina mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、れいなはその辺の気を――いや、気を使う\nのではなく、ごく自然と、そういう選択をしそうだな」
2363 = "「Đúng thật, Reina sẽ để ý đến chuyện đó――Không, không phải là để ý, mà có lẽ con bé sẽ đưa ra lựa chọn đó một cách rất tự nhiên」"
# 【日々姫】
# display as 日日姬
# JP: 「ま、実際のことは蓋があくまでわからんし、\nどぎゃん相手でも、やることは変わらんけど」
2176 = "「Mà, thực tế thế nào thì phải đến lúc đó mới biết được, và dù đối thủ là ai đi chăng nữa, thì việc chúng ta phải làm cũng không thay đổi」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2524 = "「Đúng vậy」"
# monologue
# JP: 立ち上がる。同時に日々姫も立っている。\n意識せず、僕らの動きが重なったことが地味に嬉しい。
3032 = "Tôi đứng dậy. Đồng thời Hibiki cũng đứng lên. Việc hành động của chúng tôi vô tình trùng khớp với nhau khiến tôi cảm thấy vui vui."
# 【日々姫】
# display as 日日姬
# JP: 「でしたら、兄さん？\nいつおはじめになりますか？」
2697 = "「Vậy thì, anh trai? Khi nào chúng ta sẽ bắt đầu đây?」"
# 【双鉄】
# display as 雙鐵
# JP: 「身支度のことなど考えても、あと一時間は余裕がある。\nはじめるのなら、今がよかろう」
2597 = "「Tính cả thời gian chuẩn bị các thứ, thì vẫn còn dư dả một tiếng đồng hồ. Nếu muốn bắt đầu, thì bây giờ là lúc thích hợp đấy」"
# 【日々姫】
# display as 日日姬
# JP: 「おっけ！　なら私、十分――ううん！\n五分でちゃっちゃと着替えてくると！」
2335 = "「Ok! Vậy em, mười phút――à không! Em sẽ đi thay đồ cái vèo trong năm phút thôi!」"
# monologue
# JP: いうやいなやで、階段からの軽い足音。\nというか、僕も着替えよう。
3049 = "Nói đoạn, tiếng bước chân nhẹ nhàng vang lên từ cầu thang. Mà, tôi cũng phải đi thay đồ thôi."
# monologue
# JP: （しかし……そうか、走るのならば――）
3700 = "（Nhưng mà......ra vậy, nếu chạy thì――）"
# monologue
# JP: うっかりとして気づかなかったが、\n運動会にもうひとつ、大きな楽しみが増えていた。
2988 = "Tôi vô ý không nhận ra, nhưng hội thao lại có thêm một niềm vui lớn nữa rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「……どんな日々姫を、見られるのかな」
1435 = "「......Không biết sẽ được chiêm ngưỡng, một dáng vẻ như thế nào của Hibiki đây」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！」
2724 = "「Anh hai!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！！！」
2277 = "「Ừm!!!」"
# monologue
# JP: スタートピストルを聞くと同時に、\nテーブルの上に並べられてる封筒を――
3036 = "Cùng lúc với tiếng súng báo hiệu xuất phát, những phong bì được xếp ngay ngắn trên bàn――"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、どれが良かと！？」
2742 = "「Anh hai, chọn cái nào đây!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「どれでも構わん！　取れるのを」
2606 = "「Cái nào cũng được! Lấy cái nào lấy được ấy」"
# 【日々姫】
# display as 日日姬
# JP: 「えとっ」
2429 = "「Ơ kìa」"
# monologue
# JP: 性格だ。\n日々姫はそれでも迷ってしまう。
3448 = "Tính cách là vậy. Hibiki vẫn cứ chần chừ."
# monologue
# JP: その間にも他の参加者たちは、次から次へと\n封筒を取っては広げ――っ！！？
2982 = "Trong lúc đó, những người tham gia khác, đã lần lượt lấy phong bì và mở ra――!!?"
# 【日々姫】
# display as 日日姬
# JP: 「わ！？」
2131 = "「Oa!?」"
# monologue
# JP: 風が吹いた――と思えば、凪だ。\nふかみを置いて、一直線に走り去っていく。
2922 = "Một cơn gió vụt qua――thì ra là Nagi. Bỏ lại Fukami phía sau, con bé lao đi như một mũi tên."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、凪が先行しヒントをみつけ、\nふかみに伝える作戦か」
2039 = "「Ra là vậy, chiến thuật là để Nagi đi trước tìm gợi ý, rồi truyền lại cho Fukami sao」"
# 【日々姫】
# display as 日日姬
# JP: 「それなら、ふかみちゃん走る距離少なくて済むとね。\nなかなかに良か作戦ばい」
2660 = "「Nếu vậy, Fukami sẽ không phải chạy nhiều nữa. Một chiến thuật khá là hay đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪が目的地を無事にみつけられればだがな。\nうむ？」
1948 = "「Đó là nếu Nagi có thể bình an vô sự tìm thấy đích đến. Ừm?」"
# monologue
# JP: ポーレットと稀咲。れいなとハチロク。\nそのほかの参加ペアたちも――
3498 = "Paulette và Kisaki. Reina và Hachiroku. Và cả những cặp đôi tham gia khác nữa――"
# 【双鉄】
# display as 雙鐵
# JP: 「バラバラの方向に向かっているな。\nひと組ずつ、目的地が違うのか」
2324 = "「Đang tản ra theo những hướng khác nhau nhỉ. Chẳng lẽ đích đến của mỗi đội là khác nhau sao」"
# 【日々姫】
# display as 日日姬
# JP: 「っていうか！　見とれてる場合じゃ」
2141 = "「Mà khoan đã! Giờ không phải lúc đứng nhìn đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだった」
2169 = "「À, đúng rồi」"
# monologue
# JP: いささか慌てて封筒を取り、開けてみる。\n地図を広げた――瞬間、日々姫と目を見合わせる。
3233 = "Tôi hơi hoảng hốt chộp lấy một chiếc phong bì, rồi mở nó ra. Khoảnh khắc mở bản đồ ra――tôi và Hibiki đưa mắt nhìn nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「隈銀か」
2497 = "「Kumagin à」"
# 【日々姫】
# display as 日日姬
# JP: 「よねぇ」
2265 = "「Chắc vậy rồi」"
# monologue
# JP: 「スタート」からはおおざっぱな道が描かれている。\n「第一チェックポイント」には、￥マーク。
3045 = "Từ điểm \"Xuất phát\" có vẽ một con đường phác thảo sơ sài. Tại \"Điểm kiểm tra thứ nhất\", có ký hiệu ￥."
# monologue
# JP: 位置・方角から考えても、\nまずまず隈銀で間違いなかろう。
3109 = "Xét về vị trí và phương hướng, thì gần như chắc chắn đó là Kumagin (Ngân hàng Kumamoto)."
# 【日々姫】
# display as 日日姬
# JP: 「そしたら、にぃに！　\nぼやぼやしてたら負けちゃうけん！」
2731 = "「Nếu vậy thì, anh hai! Cứ đứng ngẩn ra đó là thua mất đấy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
2271 = "「Ừm!」"
# monologue
# JP: レールショップから隈銀などは、数百メートル。\n汗もかかずに、休まず一気に走りきる。
3110 = "Từ cửa hàng đường sắt đến Kumagin chỉ khoảng vài trăm mét. Chúng tôi chạy một mạch không nghỉ, thậm chí còn chưa kịp đổ mồ hôi."
# 【日々姫】
# display as 日日姬
# JP: 「あれー、地図ばみつからーん」
2128 = "「Ủa, không tìm thấy bản đồ đâu cả」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
2174 = "「Ừm」"
# monologue
# JP: 地図は屋外、\n見えるように置かれているとルールに案内されていた。
3567 = "Trong luật có hướng dẫn rằng, bản đồ được đặt ở ngoài trời, tại những nơi dễ nhìn thấy."
# monologue
# JP: が――ぐるり探してもそれらしきものは見当たらぬ。
3509 = "Nhưng――dù đã đi loanh quanh tìm kiếm, chúng tôi vẫn không thấy thứ gì giống như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「位置も距離も、隈銀としか思えない。\n地図記号まで描かれているし――」
2385 = "「Về vị trí và khoảng cách, anh chỉ có thể nghĩ đến Kumagin thôi. Thậm chí còn vẽ cả ký hiệu bản đồ nữa mà――」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　あれ？　あれれ？\n[えん]￥マークって、違った気がする」
2154 = "「Hả? Ủa? Lạ nhỉ? Ký hiệu ￥, hình như không đúng thì phải」"
# 【双鉄】
# display as 雙鐵
# JP: 「何がだ？」
1968 = "「Không đúng chỗ nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「地図記号。にぃに、背中よかと？」
2312 = "「Ký hiệu bản đồ. Anh hai, cho em mượn lưng một lát nhé?」"
# monologue
# JP: 僕が背負ったディパックからサっと取り出し、\n日々姫はタブレットを操作する。
3405 = "Nhanh chóng lấy ra từ chiếc ba lô tôi đang đeo trên lưng, Hibiki bắt đầu thao tác trên máy tính bảng."
# 【日々姫】
# display as 日日姬
# JP: 「やっぱり！　銀行の地図記号、\n\\マークじゃなかと！！」
2511 = "「Quả nhiên! Ký hiệu bản đồ của ngân hàng, không phải là ký hiệu ￥!!」"
# monologue
# JP: 勢いこんだ日々姫が示す画像検索結果をみれば――
3478 = "Nhìn vào kết quả tìm kiếm hình ảnh mà Hibiki đang hào hứng chỉ cho tôi xem――"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、まるで違う形だ。\nさすが日々姫だ、よく気づいたな」
2380 = "「Chà, hình dáng hoàn toàn khác luôn. Đúng là Hibiki có khác, tinh mắt thật đấy」"
# 【日々姫】
# display as 日日姬
# JP: 「さすが言うなら、最初からすぐに気づかんと～」
1924 = "「Nếu giỏi thì phải nhận ra ngay từ đầu cơ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕などは違和感すらまるで感じなかった。\nしかし、そうなってくると、この“￥”は」
1950 = "「Không, như anh thì thậm chí còn chẳng cảm thấy có gì sai sai. Nhưng mà, nếu vậy thì, chữ \"￥\" này là」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、もっかい地図」
2738 = "「Anh hai, cho em xem lại bản đồ đi」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2265 = "「嗯」" 
# monologue
# JP: 頭と頭を突き合わせたなら、\n日々姫の匂いが鼻をくすぐる。
3147 = "Khi hai cái đầu chụm lại với nhau, mùi hương của Hibiki lại làm mũi tôi ngưa ngứa."
# monologue
# JP: 汗とまじった、日々姫の香り。\n嗅ぐだけで、鼓動を速められてしまう。
3468 = "Hương thơm của Hibiki, thoang thoảng mùi mồ hôi. Chỉ ngửi thôi cũng đủ khiến nhịp tim tôi đập nhanh hơn."
# 【日々姫】
# display as 日日姬
# JP: 「あれ！？　にぃに、これ、道、反対！」
2126 = "「Ủa!? Anh hai, cái này, ở phía bên kia đường!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！？　本当だな。\nしかし、道の反対――おおおお！　日々姫、あれだ！」
2280 = "「Hả!? Đúng thật. Nhưng mà, phía bên kia đường――Ồ ồ ồ! Hibiki, là cái đó!」"
# 【日々姫】
# display as 日日姬
# JP: 「ああああ！」
2203 = "「Aaaaa!」"
# monologue
# JP: 散髪屋さんの回転看板のその上に、\n『￥』と書かれた箱がぽつんと置かれてる。
3012 = "Trên tấm biển xoay của tiệm cắt tóc, có một chiếc hộp in chữ \"￥\" nằm chỏng chơ ở đó."
# 【日々姫】
# display as 日日姬
# JP: 「わかりやすかと！！」
2562 = "「Dễ thấy thật đấy!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くそ、ものの見事に引っ掛けられたな」
2054 = "「Chết tiệt, chúng ta bị lừa một vố ngoạn mục rồi」"
# 【日々姫】
# display as 日日姬
# JP: 「ゆーてる場合じゃなかとよ！　\n信号、かわっちゃうけん！！」
2550 = "「Giờ không phải lúc nói chuyện đó đâu! Đèn tín hiệu, sắp chuyển màu rồi kìa!!」"
# monologue
# JP: 信号を渡り、与えられていた鍵を使って小箱を開く。\n中からは、新しい鍵と地図。
3149 = "Chúng tôi băng qua đường, dùng chiếc chìa khóa được phát để mở chiếc hộp nhỏ. Bên trong là một chiếc chìa khóa mới và một tấm bản đồ."
# monologue
# JP: そして――最初のキーワード\n『は』
3606 = "Và――từ khóa đầu tiên 『Ha』"
# 【日々姫】
# display as 日日姬
# JP: 「『は』って、一文字じゃなんもわからんと！」
2371 = "「『Ha』 á, chỉ có một chữ cái thì làm sao mà hiểu được chứ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「二文字でも同じだ。全部集めて確定せねば、\n真闇姉の落とし穴に落とされるぞ」
2021 = "「Có hai chữ cái thì cũng thế thôi. Nếu không thu thập đủ rồi mới chốt, thì sẽ sập bẫy của chị Mayami mất」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、うん！」
2224 = "「A, vâng!」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、次だ」
2684 = "「Vậy thì, tiếp theo nào」"
# monologue
# JP: 地図を広げて確認すれば――
3158 = "Mở bản đồ ra kiểm tra――"
# 【日々姫】
# display as 日日姬
# JP: 「こん☆マーク！　赤井阿蘇神社！！」
2654 = "「Ký hiệu ☆ này! Đền Akai Aso!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「位置的にはその辺だな。\nしかし、神社で☆、か？」
2451 = "「Về mặt vị trí thì đúng là khu vực đó. Nhưng mà, ở đền thờ lại là ☆, sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　下に注釈がついてると！\n☆＝b1 or b8 or g1 or g8」
2207 = "「A! Có chú thích ở dưới này! ☆＝b1 or b8 or g1 or g8」"
# 【双鉄】
# display as 雙鐵
# JP: 「or　は、もしくは、という意味でいいのかな。\nとしてもb1、b8、g1、g8というのは――」
1430 = "「\"or\" có nghĩa là \"hoặc\" nhỉ. Nhưng mà b1, b8, g1, g8 là sao――」"
# monologue
# JP: bは地下が真っ先に思う浮かぶが、\nその場合の対語となりのは通常、fだ。
803 = "Chữ b khiến tôi nghĩ ngay đến tầng hầm (basement), nhưng trong trường hợp đó, từ trái nghĩa thường sẽ là f (floor)."
# monologue
# JP: 第一、赤井阿蘇神社には、\n地下八階も地上八階も存在しない。
2983 = "Hơn nữa, ở đền Akai Aso, làm gì có tầng hầm thứ tám hay tầng trên mặt đất thứ tám chứ."
# 【日々姫】
# display as 日日姬
# JP: 「考えてみても無駄ばい！\nとにかくいかんと！」
1921 = "「Cứ nghĩ mãi cũng vô ích thôi! Tóm lại là cứ đi đã!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1960 = "「Đúng vậy」"
# monologue
# JP: 日々姫とともに、走る、走る。\n日々姫の走りは、どこまでだって軽やかだ。
3234 = "Cùng với Hibiki, chạy, chạy. Bước chạy của Hibiki, dù đến đâu cũng thật nhẹ nhàng."
# 【日々姫】
# display as 日日姬
# JP: 「とうちゃーく！」
2034 = "「Đến nơiii!」"
# 【双鉄】
# display as 雙鐵
# JP: 「今回も比較的近くで助かった」
2662 = "「May mà lần này cũng khá gần」"
# 【日々姫】
# display as 日日姬
# JP: 「ねっ」
2367 = "「Nhỉ」"
# monologue
# JP: 答えつつ、日々姫はまだ、走るリズムで足を動かす。
3400 = "Vừa trả lời, đôi chân của Hibiki vẫn nhịp nhàng chạy bước nhỏ."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、探そ？」
2743 = "「Anh hai, tìm thôi chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「探すといっても――\nb1、b8、g1、g8――どういう意味だ？」
2395 = "「Dù nói là tìm―― Nhưng b1, b8, g1, g8――có nghĩa là gì cơ chứ?」"
# 【日々姫】
# display as 日日姬
# JP: 「んー……にぃにが考えてもわからんことを、\n私が考えてわかるわけなか――あっ！」
2254 = "「Ưm......Những chuyện mà đến anh hai nghĩ cũng không ra, thì làm sao em nghĩ ra được――A!」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした！？」
2393 = "「Sao thế!?」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　これ、オリエンテーリングで、\nあと、借り物競争！！」
2735 = "「Anh hai! Cái này, là chạy định hướng, và còn là, cuộc thi mượn đồ nữa!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにそうだが――ああっ！」
2656 = "「Đúng là vậy nhưng――A!」"
# 【日々姫】
# display as 日日姬
# JP: 「ね！　やけん、私、借りてくっとー！！」
2358 = "「Đúng không! Nên là, em, đi mượn đây!!」"
# monologue
# JP: 一直線に社殿へと。
3060 = "Em ấy lao thẳng về phía điện thờ."
# monologue
# JP: なるほど、“智慧を借りる”相手なら、\nこの社の主、赤井宮司ほどの適任者は無い。
3002 = "Ra là vậy, nếu là người để \"mượn trí tuệ\", thì không ai thích hợp hơn chủ nhân của ngôi đền này, cha xứ Akai."
# 【日々姫】
# display as 日日姬
# JP: 「聞いてきたと！」
2422 = "「Em hỏi được rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうだった」
2396 = "「Sao rồi」"
# 【日々姫】
# display as 日日姬
# JP: 「あんね、チェスじゃなかとか？　って」
1980 = "「Bác ấy bảo là, có khi nào là cờ vua không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「チェスか。僕はあまり詳しくはないが――\n日々姫はどうだ？」
2615 = "「Cờ vua à. Anh không rành lắm―― Còn Hibiki thì sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「ぜーんぜん。だけど、\n今聞いたのは、わかりやすか説明だったけん」
2346 = "「Không rành một chút nào luôn. Nhưng mà, lời giải thích lúc nãy dễ hiểu lắm」"
# monologue
# JP: 日々姫は小石を一つひろって、\n地面の上に正方形を描き出す。
3423 = "Hibiki nhặt một viên sỏi nhỏ lên, và vẽ một hình vuông trên mặt đất."
# 【日々姫】
# display as 日日姬
# JP: 「チェス盤ば、8かける8のマス目で、\n縦のマスは１～８。横のマスはa～hって」
1981 = "「Bàn cờ vua ấy, là lưới 8 nhân 8, các ô dọc là từ 1~8. Còn các ô ngang là từ a~h」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど！　ではb1、b8、g1、g8には、\n恐らく同じコマが配置されているのだな」
2038 = "「Ra là vậy! Thế thì ở b1, b8, g1, g8, có lẽ đều được đặt cùng một loại quân cờ nhỉ」"
# 【日々姫】
# display as 日日姬
# JP: 「すごか！　なんでわかったと！？」
2334 = "「Tuyệt quá! Sao anh biết vậy!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「日本の将棋も似たようなものだし、\n“or”と表記もあったからな。で？　どんなコマだ」
2486 = "「Thì cờ tướng của Nhật cũng tương tự như vậy mà, với lại còn có ký hiệu \"or\" nữa. Thế? Đó là quân cờ nào」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、うん。見せてもらった。\nえっと、ナイトっていう名前で、こんな感じで」
2222 = "「A, vâng. Bác ấy có cho em xem. Ưm, tên nó là Knight (Hiệp sĩ), trông như thế này này」"
# monologue
# JP: 日々姫がチェスのコマを描く。\nああ――なんとなく見たことがある、馬の形の――
3440 = "Hibiki vẽ hình quân cờ vua. À――Hình như tôi từng thấy rồi, quân cờ hình con ngựa――"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ！　神社で馬といったら」
2658 = "「Gì chứ! Nhắc đến ngựa ở đền thờ thì」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、絵馬っ！？」
2231 = "「A, Ema (Tấm gỗ cầu nguyện)!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。ここには神馬はいないし――\n探そう、日々姫」
2401 = "「Chắc chắn rồi. Ở đây làm gì có ngựa thần (Shinme) chứ―― Tìm thôi, Hibiki」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！！」
2276 = "「Vâng!!」"
# monologue
# JP: かけられている絵馬を探す――と！
3143 = "Chúng tôi tìm kiếm những tấm Ema đang được treo――và rồi!"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　これ！！」
2736 = "「Anh hai! Cái này!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「鍵穴の絵か。裏は――」
2705 = "「Hình ổ khóa sao. Mặt sau là――」"
# 【日々姫】
# display as 日日姬
# JP: 「貼ってある！　地図と――あれ？　地図だけ」
1925 = "「Có dán này! Bản đồ và――Ủa? Chỉ có bản đồ thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、地図を広げてみよう」
2593 = "「Dù sao thì, cứ mở bản đồ ra xem đã」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　あ、キーワードば書いてあると！。\n『な』って。あと（カギは持ち越し）って」
2270 = "「Vâng! A, có ghi từ khóa này! Là 『Na』. Với lại còn ghi là (Giữ lại chìa khóa) nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「はな、か」
1429 = "「Hana, sao」"
# monologue
# JP: 鼻毛、花輪、鼻血、話し、花見――
3625 = "Lông mũi, vòng hoa, máu mũi, câu chuyện, ngắm hoa――"
# monologue
# JP: 言葉がわっと頭に浮かぶが、振り払う。\n山かけするより、正攻法だ。
3231 = "Vô số từ ngữ xẹt qua đầu, nhưng tôi gạt phắt đi. Thay vì đoán mò, cứ dùng chính đạo vẫn hơn."
# 【日々姫】
# display as 日日姬
# JP: 「で、地図は――あ！　これ――市役所！」
2545 = "「Vậy, bản đồ là――A! Đây là――Tòa thị chính!」"
# 【双鉄】
# display as 雙鐵
# JP: 「少し遠いか。ヒントは――む？\n『〒=123→132』」
2505 = "「Hơi xa nhỉ. Gợi ý là――hửm? 『〒=123→132』」"
# 【日々姫】
# display as 日日姬
# JP: 「考えるのあと！　にぃに、走ろ！？」
1957 = "「Để sau hãy nghĩ! Anh hai, chạy thôi!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
# 2271 = "「嗯！」" 
# monologue
# JP: 走る。走る。\n日々姫のポニーテールが元気に踊る。
3139 = "Chạy. Chạy. Mái tóc đuôi ngựa của Hibiki nhảy múa đầy năng lượng."
# monologue
# JP: 一緒に走るのがただ気持ちいい。\n呼吸が、汗が、日々姫と溶け合っていくようだ。
2958 = "Chỉ riêng việc được chạy cùng em ấy thôi cũng đủ khiến tôi thấy sảng khoái. Cảm giác như hơi thở, những giọt mồ hôi, đang hòa quyện cùng với Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「ついたーっ！　はぁっ、はぁっ、はぁっ」
2035 = "「Đến nơi rồiii! Hà, hà, hà」"
# 【双鉄】
# display as 雙鐵
# JP: 「っと」
# 2174 = "「唔」" 
# monologue
# JP: 日々姫がいささかキツそうだ。\n自販機ですぐ水を買い、ほら、と日々姫に投げ渡す。
3471 = "Hibiki có vẻ hơi đuối sức. Tôi liền mua nước ở máy bán hàng tự động, rồi ném cho Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「ありがと、にぃに！　んぐ、んぐ、んぐ――\nはいっ！」
2623 = "「Cảm ơn anh hai! Ực, ực, ực―― Đây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2265 = "「嗯」" 
# monologue
# JP: 汗をふきふき、僕も飲む。
3277 = "Vừa lau mồ hôi, tôi vừa uống."
# monologue
# JP: とはいえ、それほど乾いてないし、\n日々姫は随分、僕のために残してくれている。
2926 = "Tuy nhiên, tôi không khát đến thế, và Hibiki cũng chừa lại khá nhiều cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はもういい。\n日々姫、よければ飲み干してしまってくれ」
2424 = "「Anh uống đủ rồi. Hibiki, nếu được thì em cứ uống hết đi」"
# 【日々姫】
# display as 日日姬
# JP: 「良かと！？　わーい！」
2052 = "「Được ạ!? Yay!」"
# monologue
# JP: またグビグビと。なんとも実に旨そうに。\n喉の白さに、思わず、つかの間見とれてしまう。
3050 = "Em ấy lại uống ừng ực. Trông thật sự rất ngon miệng. Tôi bất giác ngẩn ngơ nhìn vùng cổ trắng ngần ấy trong giây lát."
# 【日々姫】
# display as 日日姬
# JP: 「ぷはっ！　ごちそーさま！　補給完了！」
2298 = "「Phù! Cảm ơn anh! Tiếp nước hoàn tất!」"
# 【双鉄】
# display as 雙鐵
# JP: 「足りたか？　不足ならもう一本」
1932 = "「Đủ chưa? Nếu thiếu thì anh mua thêm chai nữa」"
# 【日々姫】
# display as 日日姬
# JP: 「いらんとよー。たくさんお水飲んで走ったら、\nおなかいたくなっちゃうし」
1935 = "「Không cần đâu ạ. Uống nhiều nước rồi chạy, sẽ bị đau bụng mất」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな――では」
1961 = "「Cũng đúng nhỉ――Vậy thì」"
# monologue
# JP: 出入り口脇、赤ポスト。
3140 = "Bên cạnh lối ra vào, là một thùng thư màu đỏ."
# monologue
# JP: 市役所で〒マークといえば、\nやはりこれがまず気にかかってくる。
3097 = "Nhắc đến ký hiệu 〒 ở Tòa thị chính, thì quả nhiên đây là thứ khiến người ta chú ý đầu tiên."
# 【日々姫】
# display as 日日姬
# JP: 「やっぱり？　けど――」
2510 = "「Quả nhiên là nó ạ? Nhưng mà――」"
# monologue
# JP: 日々姫とふたり、周囲をぐるり、確かめる。
3240 = "Tôi cùng Hibiki đi một vòng quanh đó để kiểm tra."
# 【日々姫】
# display as 日日姬
# JP: 「なかとね、箱も、カギばいれられるような場所も\n――あ」
2523 = "「Không có nhỉ, chẳng có chiếc hộp nào, hay chỗ nào có thể đút chìa khóa vào cả ――A」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、まさか。ポストを勝手にあけてしまったら\nまずかろう」
2097 = "「Không, làm sao có chuyện đó. Tự ý mở thùng thư ra thì rắc rối to đấy」"
# monologue
# JP: 念のため――と思ってカギを確認するが、\nサイズからしてまるで違う。
3156 = "Để cho chắc chắn――tôi thử kiểm tra chìa khóa, nhưng kích thước hoàn toàn không khớp."
# 【日々姫】
# display as 日日姬
# JP: 「そしたら……そしたら？」
2543 = "「Rồi sau đó......sau đó thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「〒の横に数字が書いてあったよな？」
1442 = "「Bên cạnh ký hiệu 〒 có ghi mấy con số đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、えと――」
2291 = "「Vâng, để em xem――」"
# monologue
# JP: 〒=123→132
2768 = "〒=123→132"
# 【日々姫】
# display as 日日姬
# JP: 「[ゆうびんばんごういちにぃさん,3]〒123を――」
2701 = "「Mã bưu điện 123――」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、=が付いている。\n単に郵便番号を示すなら、不要の記号だ」
1953 = "「Không, có dấu = đính kèm kìa. Nếu chỉ đơn thuần là mã bưu điện thì ký hiệu đó đâu cần thiết」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そか。でも……やったら、何がいちにぃさん？\nそれか、ひゃくにじゅうさん？」
2226 = "「A, đúng rồi. Nhưng mà......nếu vậy thì, 1 2 3 là gì? Hay là, một trăm hai mươi ba?」"
# 【双鉄】
# display as 雙鐵
# JP: 「さて、郵便物の取扱を行うのは屋内となるし……\n屋外でこのマークなら、やはり――ああ、ポストか」
2592 = "「Chà, việc xử lý bưu phẩm diễn ra ở trong nhà...... Còn ngoài trời mà có ký hiệu này thì, quả nhiên là――A, thùng thư sao」"
# 【日々姫】
# display as 日日姬
# JP: 「なになに、何かきづいたと！？」
1969 = "「Gì thế gì thế, anh phát hiện ra gì rồi ạ!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポストは三文字。即ち、=123だ」
2700 = "「Thùng thư (Po-su-to) có ba chữ cái. Tức là, =123」"
# 【日々姫】
# display as 日日姬
# JP: 「あ。ポ、ス、ト、で、１、２、３ ？\nなら、えと――132は――！　ポトス！！！」
2162 = "「A. Po, su, to, là 1, 2, 3? Vậy thì, ưm――132 là――! Cây trầu bà (Po-to-su)!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや……違ったか、ポトスでは」
2093 = "「Không......không phải cây trầu bà đâu nhỉ」"
# 【日々姫】
# display as 日日姬
# JP: 「違わんばい！　ポトス！　こっち！！」
2525 = "「Đúng mà! Cây trầu bà! Lối này!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやしかし――あれは、観葉植物だろう？」
2055 = "「Nhưng mà――đó là cây cảnh trồng trong nhà cơ mà?」"
# 【日々姫】
# display as 日日姬
# JP: 「帝都ではそうかもしれんけど、\n御一夜では普通に地植えで――ほら！」
2309 = "「Ở Đế đô có thể là vậy, nhưng ở Ohimitera người ta toàn trồng dưới đất thôi――Nhìn kìa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと――葉が随分とでかいな。というか、\nこんなところにポトスがあると、よく知っていたな」
2302 = "「Chà――Lá to thật đấy. Mà này, sao em biết rõ ở đây có cây trầu bà vậy」"
# 【日々姫】
# display as 日日姬
# JP: 「自分の仕事場のことやもん！」
2306 = "「Nơi làm việc của em mà lị!」"
# monologue
# JP: それを言ったら、僕にも仕事場。\nさすがは日々姫とつくづく思う。
3566 = "Nói vậy thì, đây cũng là nơi làm việc của tôi. Tôi lại một lần nữa thầm thán phục Hibiki."
# monologue
# JP: 描きたい綺麗を探し求め続ける瞳は、\n僕よりきっと何倍も、多く・広くを映すのだろう。
3436 = "Đôi mắt không ngừng tìm kiếm những nét đẹp để vẽ ấy, chắc hẳn đã thu vào tầm nhìn nhiều hơn, rộng hơn tôi gấp bội phần."
# 【日々姫】
# display as 日日姬
# JP: 「ほーら、あった！」
2386 = "「Thấy chưa, có này!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2167 = "「Ồ!」"
# monologue
# JP: やはり日々姫の瞳が見つけた。\nポトスの葉っぱを邪魔せぬように、白い箱。
3430 = "Quả nhiên là đôi mắt của Hibiki đã tìm ra. Một chiếc hộp trắng, được đặt khéo léo để không vướng vào lá cây trầu bà."
# monologue
# JP: カギは――カチリとすぐ回る。
3146 = "Chìa khóa――vừa vặn mở được ngay."
# 【日々姫】
# display as 日日姬
# JP: 「最後のキーワードは……『お』！」
2503 = "「Từ khóa cuối cùng là......『O』!」"
# 【双鉄】
# display as 雙鐵
# JP: 「は、な、お――『鼻緒』か！\n下駄か草履、下駄か草履は――赤井宮司っ！！」
1415 = "「Ha, na, o――『Hanao (Quai dép)』 sao! Guốc mộc hoặc dép rơm, guốc mộc hoặc dép rơm thì――Cha xứ Akai!!」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん、もっと近くで借りれると！！」
1940 = "「Không cần, có chỗ mượn gần hơn nhiều!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、おい！」
2221 = "「A, này!」"
# monologue
# JP: 日々姫が走る、迷いなく。\n駅へとまっすぐ戻る方向――
3433 = "Hibiki chạy đi không chút do dự. Hướng thẳng về phía nhà ga――"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　ここでちょっと待っとって！！」
2728 = "「Anh hai! Chờ em ở đây một chút!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！？」
2278 = "「Ừm!?」"
# 【日々姫】
# display as 日日姬
# JP: 「くぼやさーん！　いますー？」
2585 = "「Bác Kuboya ơi! Bác có nhà không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あぁ」
2235 = "「À」"
# monologue
# JP: 雪駄を示すピクトアイコン。くぼやさん。\n日々姫が看板デザインをした、履物屋さん。
3528 = "Biểu tượng hình đôi dép Setta. Tiệm Kuboya. Tiệm giày dép mà Hibiki đã thiết kế bảng hiệu cho."
# monologue
# JP: （そうか。わざわざ遠回りしなくても、\n看板づくりのころから、ずっと、御一夜の町は――）
3698 = "（Ra vậy. Không cần phải cất công đi đường vòng, từ lúc làm bảng hiệu đến giờ, thị trấn Ohimitera luôn――）"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　おまたせ！　ぞうりば借りてきた\n――きゃっ！？」
2725 = "「Anh hai! Xin lỗi đã để anh đợi! Em mượn được dép rơm rồi này ――Kya!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「行くぞ！　日々姫！！」
2418 = "「Đi thôi! Hibiki!!」"
# monologue
# JP: 日々姫の手を引き、走る、走る。
3186 = "Tôi kéo tay Hibiki, chạy, chạy."
# monologue
# JP: 日々姫のペースを考えて、\n手が伸び切らないギリギリの速度でひた走る。
3228 = "Cân nhắc nhịp độ của Hibiki, tôi chạy với tốc độ vừa đủ để tay em ấy không bị kéo căng quá mức."
# 【日々姫】
# display as 日日姬
# JP: 「はぁっ――はぁっ――はっ――はぁっ」
2098 = "「Hà――hà――hà――hà」"
# monologue
# JP: 日々姫も、必死でついてきている。\n僕に、ついてきてくれている。
3383 = "Hibiki cũng đang cố gắng hết sức chạy theo. Em ấy đang chạy theo tôi."
# monologue
# JP: ゆえに、速い。息が苦しい。足がじわじわ重くなる。\nこれほど速く、長くを走ったことは無い。
3251 = "Vì thế, rất nhanh. Thở rất mệt. Đôi chân dần trở nên nặng trĩu. Tôi chưa từng chạy nhanh và lâu đến thế này bao giờ."
# monologue
# JP: （だが――だからこそ、勝とう、日々姫）
3693 = "（Nhưng――chính vì vậy, hãy giành chiến thắng nào, Hibiki）"
# monologue
# JP: 日々姫のホーム。日々姫の味方がいくらだっている、\n僕らの町で――御一夜で。
3039 = "Sân nhà của Hibiki. Nơi có biết bao nhiêu đồng minh của em ấy, trong thị trấn của chúng tôi――tại Ohimitera."
# 【日々姫】
# display as 日日姬
# JP: 「にぃ――にっ！」
# 2724 = "「阿哥！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
# 2271 = "「嗯！」" 
# monologue
# JP: レールショップが見えてくる。\nゴールテープが張られてる。
3148 = "Cửa hàng đường sắt đã hiện ra trong tầm mắt. Dải băng đích cũng đã được giăng sẵn."
# monologue
# JP: だから切る。\n日々姫と並んで、日々姫と一緒に。
3237 = "Vì thế, chúng tôi sẽ cắt đứt nó. Sánh bước bên Hibiki, cùng với Hibiki."
# monologue
# JP: 走りきった――思った瞬間、力が抜ける。
3040 = "Chạy xong rồi――Vừa nghĩ vậy, toàn thân tôi liền rã rời."
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
2095 = "「Kua!」"
# 【日々姫】
# display as 日日姬
# JP: 「はぁっ！　はぁっ！　はぁっ！　はぁっ！」
2118 = "「Hà! Hà! Hà! Hà!」"
# monologue
# JP: 日々姫を抱いて寝転がる。\nドッドッドッと、日々姫の鼓動。僕の鼓動。
3182 = "Tôi ôm lấy Hibiki rồi nằm vật ra đất. Thịch thịch thịch, nhịp tim của Hibiki. Nhịp tim của tôi."
# monologue
# JP: いまは、ただ、\nもうそれだけしか――聞こえない。
3513 = "Lúc này, tôi chẳng thể nghe thấy gì khác―― ngoài những âm thanh ấy."
# monologue
# JP: シャワーを浴びて、着替えを終える。\n日々姫の部屋へと階段を登る。
3201 = "Tắm rửa và thay đồ xong xuôi. Tôi bước lên cầu thang hướng về phòng Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「えへへー、えへへへへーっ」
2146 = "「Ehehe, ehehehe」"
# monologue
# JP: ご機嫌な日々姫は、着替えもせずにベッドでごろごろ。\n『優勝』と書かれた封筒を透かしみている。
3380 = "Hibiki đang rất vui vẻ, cứ thế lăn lộn trên giường mà chưa thèm thay đồ. Em ấy giơ chiếc phong bì có chữ 『Vô địch』 lên soi dưới ánh sáng."
# monologue
# JP: 無邪気な姿に喜びと、しみじみとした感慨が湧く。
3522 = "Nhìn dáng vẻ ngây thơ ấy, trong tôi trào dâng một niềm vui và sự xúc động sâu sắc."
# 【双鉄】
# display as 雙鐵
# JP: 「実に、よく出来た競技だったな」
2419 = "「Quả thực, là một cuộc thi được thiết kế rất tốt」"
# monologue
# JP: 日々姫のごろごろがぴたりと止まる。\n興味深げに、僕をのぞきこんでくる。
3389 = "Hibiki ngừng lăn lộn. Em ấy tò mò nhìn tôi."
# 【日々姫】
# display as 日日姬
# JP: 「それって、どぎゃん意味と？」
1970 = "「Thế nghĩa là sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ペア平均での運動能力は、恐らく僕らが最高だった。\n単にそれを競ったのなら、僕らの圧勝だったろう」
2417 = "「Năng lực thể chất trung bình của cặp đôi chúng ta có lẽ là cao nhất. Nếu chỉ đơn thuần là thi chạy, thì chắc chắn chúng ta đã áp đảo rồi」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、確かに。……ふかみちゃんとか、\nああ見えて力持ちだし持久力もあるけど――」
2230 = "「A, đúng thật. ......Fukami thì, nhìn vậy thôi chứ khỏe lắm, sức bền cũng tốt nữa――」"
# 【双鉄】
# display as 雙鐵
# JP: 「速く走る、というタイプではないだろう。\n整備体のハチロク、れいなも同様だな」
1985 = "「Nhưng không phải tuýp người chạy nhanh đúng không. Cơ thể bảo trì của Hachiroku và Reina cũng vậy」"
# 【日々姫】
# display as 日日姬
# JP: 「ふたりとも、見た目よりずっと力持ちだし、\n器用だけど――」
2328 = "「Cả hai người họ đều khỏe và khéo léo hơn vẻ bề ngoài nhiều, nhưng mà――」"
# 【双鉄】
# display as 雙鐵
# JP: 「はなから、走ることを目的に作られてはいない。\nポーレットもだ、もとより運動が得意ではない」
2329 = "「Ngay từ đầu, họ đã không được chế tạo ra với mục đích để chạy. Cả Paulette cũng vậy, vốn dĩ cô ấy không giỏi thể thao」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2265 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「にもかかわらず、勝負は本当に僅差だった」
2548 = "「Mặc dù vậy, khoảng cách thắng thua thực sự rất sít sao」"
# monologue
# JP: 日々姫が頷く。\nベッドも揺れる勢いで。
3438 = "Hibiki gật đầu. Mạnh đến mức làm chiếc giường rung lên."
# 【日々姫】
# display as 日日姬
# JP: 「すっごい僅差で、団子でみんなゴールしたから……\nそっか、単純な運動能力じゃないところで」
2322 = "「Rất sít sao luôn, mọi người gần như về đích cùng một lúc...... Ra vậy, không chỉ đơn thuần là thi thố năng lực thể chất」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕らは謎解きに手間取ったからな。\nそこは、稀咲・ポーレット組に劣ったろうし……」
2527 = "「Ừm. Chúng ta đã mất khá nhiều thời gian để giải đố mà. Khoản đó thì chắc chắn kém hơn đội Kisaki và Paulette rồi......」"
# monologue
# JP: ハチロク・れいなはこの程度では消耗しないし、\n凪ふかみは、いわずもがなのコンビネーションだ。
3600 = "Hachiroku và Reina thì không hề bị tiêu hao thể lực với mức độ này, Nagi và Fukami thì khỏi phải bàn về độ ăn ý."
# 【双鉄】
# display as 雙鐵
# JP: 「それぞれが、長所を活かして結果を出した。\nが、それでも僕らが優勝できた理由は――」
2513 = "「Mỗi đội đều phát huy thế mạnh của mình để đạt kết quả tốt. Nhưng, lý do chúng ta giành được chức vô địch là――」"
# 【日々姫】
# display as 日日姬
# JP: 「理由は？」
2552 = "「Lý do là?」"
# 【双鉄】
# display as 雙鐵
# JP: 「借り物部分だ。全くロス無くクリアーできた。\nそれは、全て日々姫のおかげだ」
2000 = "「Là phần mượn đồ. Chúng ta đã hoàn thành mà không mất một chút thời gian nào. Tất cả là nhờ có Hibiki đấy」"
# 【日々姫】
# display as 日日姬
# JP: 「え！？　わ、わたし！？」
2148 = "「Hả!? E-Em á!?」"
# monologue
# JP: ベッドの上で、日々姫がわたわた座り直す。
3410 = "Hibiki cuống cuồng ngồi thẳng dậy trên giường."
# 【日々姫】
# display as 日日姬
# JP: 「だって、あれは偶然……\nいうたら、引きがよかっただけで」
2064 = "「Nhưng mà, đó chỉ là tình cờ...... Nói đúng ra là do bốc thăm may mắn thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「何を借りることとなっても、同じだったさ」
1942 = "「Dù có mượn thứ gì đi chăng nữa, thì kết quả cũng vậy thôi」"
# monologue
# JP: 確信できる。\n誇りに思う。
3164 = "Tôi có thể tin chắc điều đó. Và tôi cảm thấy tự hào."
# 【双鉄】
# display as 雙鐵
# JP: 「看板をつくり、観光マップを描き、今は市政を担い。\n日々姫が築いてきた絆が、必ず助けてくれるから」
2614 = "「Làm bảng hiệu, vẽ bản đồ du lịch, và giờ là đảm đương việc hành chính. Những mối liên kết mà Hibiki đã dày công vun đắp, chắc chắn sẽ giúp ích cho chúng ta」"
# 【日々姫】
# display as 日日姬
# JP: 「はうっ」
2204 = "「Hau」"
# 【双鉄】
# display as 雙鐵
# JP: 「市民の多くが日々姫の味方だ。日々姫が描いてきた\n笑顔を、今はみんなが、本当に浮かべている」
2384 = "「Rất nhiều người dân trong thị trấn là đồng minh của Hibiki. Những nụ cười mà Hibiki đã vẽ, giờ đây mọi người đang thực sự nở nụ cười ấy」"
# 【日々姫】
# display as 日日姬
# JP: 「そ、それはっ！」
2653 = "「C-Chuyện đó!」"
# monologue
# JP: 日々姫がズイと身を乗り出――っ！！？
3421 = "Hibiki rướn người tới trước――!!?"
# 【日々姫】
# display as 日日姬
# JP: 「それは、だって、にぃにのおかげ。\nにぃにが私に、絵を見せる勇気をくれた……か、ら？」
2666 = "「Đó là, tại vì, nhờ có anh hai mà. Anh hai đã cho em, dũng khí để cho mọi người xem tranh......phải, không?」"
# monologue
# JP: ……胸。だ。\n身を乗り出され、初めて気づいた、日々姫の胸元。
1410 = "......Ngực. Là ngực. Khi em ấy rướn người tới, tôi mới lần đầu tiên để ý đến vùng ngực của Hibiki."
# monologue
# JP: これほど、甘く――\n複数の意味で甘かったとは……
3608 = "Không ngờ lại ngọt ngào đến thế―― Ngọt ngào theo nhiều nghĩa......"
# 【日々姫】
# display as 日日姬
# JP: 「にぃ……に。にぃに？\nん～～っと…………ちらっ！」
2744 = "「Anh......hai. Anh hai? Ưm~~............Hé mở!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2761 = "「!!?」"
# monologue
# JP: 日々姫が胸元に指をひっかけ、わずかに下げる。\n薄い谷間とふくらみがそれで丸見えになり――っ！
3414 = "Hibiki móc ngón tay vào cổ áo, kéo nhẹ xuống một chút. Khe ngực mỏng manh và độ phồng của bầu ngực liền phơi bày ra toàn bộ――!"
# 【双鉄】
# display as 雙鐵
# JP: 「っと、と、いうかだな！？　\n日々姫っ、その、ブラ、ブラジャーは」
2657 = "「À, ừm, ý anh là!? Hibiki, cái, áo, áo lót của em đâu rồi」"
# 【日々姫】
# display as 日日姬
# JP: 「走るときはつけんとよ？\nこん服、胸のとこカップになっとるけん」
2633 = "「Lúc chạy em không mặc đâu? Bộ đồ này, phần ngực có sẵn cúp ngực mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「カップ……ああ、パッドのようなものか？」
2604 = "「Cúp ngực......À, giống như miếng đệm ấy hả?」"
# 【日々姫】
# display as 日日姬
# JP: 「パッドじゃなかとっ！　カップ！　ほらっ！！」
1934 = "「Không phải miếng đệm! Là cúp ngực! Đây này!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ」
2170 = "「Ừ, ừm」"
# monologue
# JP: 日々姫が僕の手をとって、\n服の上から、胸へとぺたり、押し当ててくれる。
3419 = "Hibiki nắm lấy tay tôi, áp chặt vào ngực em ấy qua lớp áo."
# monologue
# JP: 胸のものではない感触。\nやわらかではあるが異質。確かな厚みもあるようだ。
3193 = "Một cảm giác không phải là của bầu ngực. Tuy mềm mại nhưng lại có sự khác biệt. Có vẻ như nó cũng có độ dày nhất định."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……\nこれなら、乳首が浮いて見えてしまうなどはないか」
2037 = "「Ra là vậy...... Nếu thế này thì sẽ không lo bị hằn núm vú lên nhỉ」"
# monologue
# JP: 胸元が甘く見えたのも、僕が立ち、日々姫はベッドに\nしゃがんでその上、前かがみになった位置関係でだ。
3124 = "Sở dĩ vùng ngực trông có vẻ hớ hênh như vậy, là do vị trí tương đối giữa việc tôi đang đứng, còn Hibiki thì ngồi xổm trên giường và rướn người tới trước."
# monologue
# JP: 日々姫が姿勢を正してしまえば――いや、\n正してくれれば、胸元は、かなりピシリと引き締まる。
3077 = "Nếu Hibiki ngồi thẳng lưng lại――không, chỉ cần em ấy ngồi thẳng lại, thì vùng ngực sẽ được che chắn khá kín đáo."
# 【日々姫】
# display as 日日姬
# JP: 「えへっ……えへへへへっ」
2143 = "「Ehe......ehehehe」"
# monologue
# JP: 日々姫が笑う。
3475 = "Hibiki bật cười."
# monologue
# JP: 喜びをこらえきれない――\nそんな風情でにやけた口元を抑えてる。
3062 = "Không giấu nổi niềm vui sướng―― Em ấy che miệng cười tủm tủm với vẻ mặt như thế."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　日々姫？」
2482 = "「Sao thế? Hibiki?」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに……ね？　私のおっぱい――\n気にしてくれた……気になっちゃったと？」
2719 = "「Anh hai......nè? Ngực của em―― Anh đã lo lắng......đã để ý đến nó sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「気になった。僕の日々姫のおっぱいが、\n気づかぬうち、目立ってしまっていたのではないかと」
2428 = "「Anh có để ý. Anh sợ ngực của Hibiki của anh, sẽ vô tình bị hớ hênh mà không hay biết」"
# 【日々姫】
# display as 日日姬
# JP: 「そ、そんなん！　め、目立つほどはなかっ――う\n……なか……けん――はううっ」
2522 = "「K-Không có chuyện đó đâu! K-Không đến mức hớ hênh――ư ......đâu......mà――hauu」"
# monologue
# JP: 照れ隠しして自爆する。\n顔を赤くし落ち込む日々姫が、実にかわいい。
3412 = "Cố giấu đi sự ngượng ngùng nhưng lại tự hủy. Dáng vẻ cúi gằm mặt đỏ bừng của Hibiki, quả thực rất đáng yêu."
# 【双鉄】
# display as 雙鐵
# JP: 「大きさうんぬんの話ではあるまい。\n日々姫ほどに可愛く、綺麗な女の子の胸だ」
2444 = "「Đây không phải là chuyện kích cỡ. Đó là ngực của một cô gái đáng yêu và xinh đẹp như Hibiki cơ mà」"
# monologue
# JP: （さすっ）
3728 = "（Vuốt ve）"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
2195 = "「A」"
# monologue
# JP: 日々姫の胸を守ってくれたカップとやらを、\nいいこ、いいこと撫でてやる。
3243 = "Tôi nhẹ nhàng xoa xoa, vỗ về chiếc cúp ngực đã bảo vệ vòng một của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「見えそうになったら、誰だって目を惹かれよう。\nそれが無いようにしてくれていたのは、幸いだ」
2617 = "「Nếu sắp bị nhìn thấy, thì ai mà chẳng chú ý cơ chứ. Thật may là điều đó đã không xảy ra」"
# 【日々姫】
# display as 日日姬
# JP: 「そ、そんなん！　誰にも見られたくなかもん！\n私のおっぱいも体も全部、にぃにひとりのものやけん」
1927 = "「K-Không có chuyện đó đâu! Em không muốn bị ai nhìn thấy hết! Cả ngực và cơ thể em, tất cả đều là của riêng một mình anh hai thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕、ひとりのか」
2050 = "「Của riêng, một mình anh sao」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんとよ？\nちっちゃかころから、ずっと。ずーーっと」
2491 = "「Đúng vậy mà? Từ lúc còn nhỏ xíu, đã luôn luôn. Mãi mảiii là vậy」"
# monologue
# JP: 言って、日々姫は苦笑する。
3377 = "Nói rồi, Hibiki nở một nụ cười gượng gạo."
# 【日々姫】
# display as 日日姬
# JP: 「なのに、何してもぜーんぜん気にもしてくれなくて。\nだけど、やっと……にぃに、見てくれるようになって」
2058 = "「Thế mà, dù em có làm gì anh cũng chẳng hề để ý một chút nào cả. Nhưng mà, cuối cùng thì......anh hai, cũng đã chịu nhìn em rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2759 = "「!」"
# monologue
# JP: 何も、してない。日々姫は何も。\nただただぺたんと、そこに座っているだけだ。
3428 = "Em ấy không làm gì cả. Hibiki chẳng làm gì cả. Chỉ đơn thuần là ngồi bệt ở đó mà thôi."
# monologue
# JP: だというのに、僕の視線は誘導される。\n日々姫の目に、唇に。そして胸へ……股間へと。
3220 = "Dù vậy, ánh mắt của tôi vẫn bị dẫn dắt. Đến đôi mắt, đến bờ môi của Hibiki. Và rồi đến ngực......đến đũng quần em ấy."
# 【日々姫】
# display as 日日姬
# JP: 「うふふふっ、えっちな目」
2296 = "「Ufufufu, ánh mắt dâm đãng kìa」"
# monologue
# JP: 匂いだ。甘い、日々姫の匂い。\n汗とまじって、動物的な……おんなの、匂い。
3485 = "Là mùi hương. Mùi hương ngọt ngào của Hibiki. Hòa quyện cùng mồ hôi, một mùi hương mang tính bản năng......của một người phụ nữ."
# monologue
# JP: 密度が、急に上がった気がする。\n鼓動が、呼吸が、どんどん浅く、速くなる。
3177 = "Tôi có cảm giác mật độ không khí đột ngột tăng lên. Nhịp tim, nhịp thở, ngày càng trở nên nông và nhanh hơn."
# 【日々姫】
# display as 日日姬
# JP: 「そういう目で、わたし、ずうっと。\nにぃにに、にぃにだけに――見て欲しかったけん」
2411 = "「Em đã luôn muốn. Anh hai, chỉ một mình anh hai――nhìn em bằng ánh mắt đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「見る――だけでは、もう物足りん」
2019 = "「Chỉ nhìn――thôi thì, không đủ thỏa mãn nữa rồi」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2265 = "「嗯」" 
# monologue
# JP: 日々姫の舌がかすかに覗き、その唇を湿らせる。
3409 = "Đầu lưỡi Hibiki khẽ thò ra, liếm ướt đôi môi."
# monologue
# JP: こくん、と喉が小さく動き、\n潤いを帯びた息が吐かれる。
3507 = "Cổ họng em ấy khẽ chuyển động đánh \"ực\" một tiếng, rồi phả ra một hơi thở ẩm ướt."
# 【日々姫】
# display as 日日姬
# JP: 「好きにして欲しかと。\nからだもこころも、ぜぇんぶにぃにのものやけん」
2723 = "「Em muốn anh cứ làm theo ý thích. Cả cơ thể và trái tim này, tất cả đều là của anh hai mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の、ものか。\nならばひときわ――大事にせねばな」
2703 = "「Là của, anh sao. Nếu vậy thì anh phải――càng trân trọng hơn nữa mới được」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 2180 = "「啊――」" 
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2469 = "「Hibiki」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに……んっ――ちゅっ――ちゅむ――ちゅっ」
2717 = "「Anh hai......ưm――chụt――chùn chụt――chụt」"
# monologue
# JP: キスをかわせば、匂いはさらに濃密になる。
3153 = "Khi trao nhau nụ hôn, mùi hương càng trở nên nồng đậm hơn."
# monologue
# JP: たまらなくなり、日々姫の唇を舌で割る。\n日々姫の唾液が、喉から僕を焼いてくる。
3168 = "Không thể kìm nén được nữa, tôi dùng lưỡi tách đôi môi Hibiki ra. Nước bọt của Hibiki, thiêu đốt tôi từ tận cổ họng."
# 【日々姫】
# display as 日日姬
# JP: 「は……ちゅ――ンッ――ちゅうっ――ちゅっ」
2107 = "「Hà......chụt――ưm――chụt――chụt」"
# monologue
# JP: 唾液をたっぷり交換すれば、\n今度は日々姫がゆるゆると、僕の口内に侵入してくる。
3144 = "Trao đổi nước bọt thỏa thích xong, lần này đến lượt Hibiki từ từ xâm nhập vào khoang miệng tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ん……れるっ――るちゅっ――ちゅっ――れろっ、\nぬりゅっ――りゅっ、ちゅっ――ちゅずうううっ」
2252 = "「Ưm......liếm――chùn chụt――chụt――liếm, nhóp nhép――chụt, chụt――chùn chụt」"
# monologue
# JP: 鼓動が速すぎ、いささか苦しい。\n徐々に強まる日々姫の鼻息がくすぐったい。
3212 = "Nhịp tim đập quá nhanh, khiến tôi có chút khó thở. Hơi thở từ mũi Hibiki ngày càng mạnh, làm tôi thấy ngưa ngứa."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに……にぃに――」
2720 = "「Anh hai......anh hai――」"
# monologue
# JP: 潤んだ瞳。\n日々姫ははっきり発情している。
3449 = "Đôi mắt ướt át. Rõ ràng là Hibiki đang phát tình."
# monologue
# JP: 僕とて同じだ。\nだからこそ、僕を、日々姫を、焦らし、焦がそう。
3127 = "Tôi cũng vậy. Chính vì thế, tôi sẽ trêu chọc, sẽ thiêu đốt cả tôi và Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「立て続けの激しい運動は、体への負担が大きすぎる」
2669 = "「Vận động mạnh liên tục thế này, gánh nặng cho cơ thể lớn lắm đấy」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 2151 = "「哎？」" 
# monologue
# JP: ベッドが、きしむ。\n日々姫の背中に、まわりこむ。
3226 = "Chiếc giường, cọt kẹt. Tôi vòng ra phía sau lưng Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫――足を開いてごらん？」
2480 = "「Hibiki――thử mở rộng hai chân ra xem nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「う……うん」
2173 = "「Ư......vâng」"
# monologue
# JP: 日々姫が大きく足を広げる。\n太ももの白を眩しく感じる。
3416 = "Hibiki mở rộng hai chân. Sự trắng ngần của bắp đùi khiến tôi cảm thấy chói lóa."
# monologue
# JP: すぐに触れたい。触れたいのだが――
3169 = "Tôi muốn chạm vào ngay lập tức. Rất muốn chạm vào nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「まずは、整理運動だ」
2753 = "「Trước tiên là, vận động thả lỏng đã」"
# 【日々姫】
# display as 日日姬
# JP: 「せいり……うんどう」
2457 = "「Vận động......thả lỏng」"
# monologue
# JP: 密着している体がもぞりと動く。\nそれだけで、快感が脳へ突き抜けていく。
3074 = "Cơ thể đang áp sát vào nhau khẽ cựa quậy. Chỉ bấy nhiêu thôi, khoái cảm đã xuyên thấu lên tận não."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。体をゆっくりほぐそう。\n走って、こわばってしまった部分もあるだろう」
2528 = "「Đúng vậy. Hãy từ từ xoa bóp cơ thể nào. Chạy nhiều thế, chắc hẳn cũng có những chỗ bị căng cứng rồi」"
# 【日々姫】
# display as 日日姬
# JP: 「こわばってる……部分、なら――そのっ」
2014 = "「Chỗ bị......căng cứng, thì――chỗ đó」"
# monologue
# JP: （もぞっ）
3719 = "（Cựa quậy）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 2760 = "「！！！」" 
# monologue
# JP: 日々姫の腰がずらさせる。\n尻で股間を、ぐいぐいぐいと押してくる。
3457 = "Hông của Hibiki trượt đi. Em ấy dùng mông liên tục ấn mạnh vào đũng quần tôi."
# 【日々姫】
# display as 日日姬
# JP: 「一番は――ええと、兄さんの、ここ」
2500 = "「Căng cứng nhất là――ưm, chỗ này, của anh trai」"
# 【双鉄】
# display as 雙鐵
# JP: 「ここ、ではわからん」
2665 = "「Chỗ này, là chỗ nào anh không biết đâu」"
# 【日々姫】
# display as 日日姬
# JP: 「はうっ」
# 2204 = "「啊嗚」" 
# monologue
# JP: これほど大胆に誘惑してきているというのに、\nこれほど些細なことで照れる。
3064 = "Dù đang quyến rũ tôi một cách táo bạo đến vậy, mà em ấy vẫn ngại ngùng vì những chuyện cỏn con này."
# monologue
# JP: 女心とはこうしたものか――\nあるいは日々姫が、特別かわいい生き物なのか……
3223 = "Tâm lý phụ nữ là thế này sao―― Hay là do Hibiki, là một sinh vật đặc biệt đáng yêu nhỉ......"
# 【双鉄】
# display as 雙鐵
# JP: 「聞かせてくれ、日々姫。\n僕の、一番こわばってしまっている部分は、どこだ？」
2478 = "「Nói cho anh nghe đi, Hibiki. Chỗ bị căng cứng nhất của anh, là ở đâu?」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！？　えと……――ん。\nあの……おちん、ちん」
2220 = "「A!? Dạ......――ưm. Cái đó......chim, của anh」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、たしかにこわばっているかな？」
2040 = "「Ra là vậy, quả thực là đang căng cứng nhỉ?」"
# monologue
# JP: （ちいいい）
3723 = "（Kéo khóa）"
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ」
2112 = "「Phù a」"
# monologue
# JP: チャックを開けて、勃起だけをズボンから出す。\nそのまま日々姫の尻の谷間に、割り入り、収める。
3187 = "Mở khóa kéo, tôi chỉ lấy phần dương vật đang cương cứng ra khỏi quần. Cứ thế, chen vào và đặt nó nằm gọn trong khe mông của Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「あ……あっ――私……私の、お尻に――\nにぃにの、にぃにの――おちん、ちん――（ごくっ）」
2192 = "「A......a――Của em......vào mông của em―― Chim của anh hai, của anh hai――đang――（ực）」"
# monologue
# JP: ツバを飲む音が妙に大きく聞こえてくる。\nもぞっと動く日々姫の腰が、僕の形を確かめる。
3398 = "Tiếng nuốt nước bọt nghe lớn một cách kỳ lạ. Hông Hibiki khẽ cựa quậy, xác nhận hình dáng của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「おちん、ちん――にぃに、ほぐしたくなかと？\n私、お手伝い、一生懸命――する――します、から」
2714 = "「Chim――anh hai, anh không muốn xoa bóp sao? Em, sẽ cố gắng hết sức――để giúp anh――mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「どういう風に？」
2394 = "「Bằng cách nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「お口で、ちゅぱちゅぱしたり、とか……\nお手々で、シコシコ、したりもいいし――」
2515 = "「Dùng miệng, mút chùn chụt, chẳng hạn...... Hoặc dùng tay, sục sục, cũng được――」"
# monologue
# JP: 小刻みに、日々姫の尻が蠢き続ける。\nゆるくて甘い快感が、じわじわ腰に沈殿していく。
3444 = "Mông Hibiki không ngừng uốn éo từng nhịp nhỏ. Một khoái cảm nhẹ nhàng, ngọt ngào, từ từ lắng đọng xuống hông tôi."
# 【日々姫】
# display as 日日姬
# JP: 「それから、もちろん、お、おまんこ、だとか――\nそれか……おしり――とか、つかっても」
2544 = "「Sau đó, tất nhiên là, a, âm đạo, hay là―― Hoặc là......mông――anh dùng cũng được」"
# 【双鉄】
# display as 雙鐵
# JP: 「お尻であるなら」
2339 = "「Nếu là mông thì」"
# monologue
# JP: （ぐっ！）
3746 = "（Thúc!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃんっ！？」
2088 = "「Hyan!?」"
# monologue
# JP: 日々姫を押す。\n体をじわじわ前屈させる。
3206 = "Tôi ấn vào Hibiki. Ép cơ thể em ấy từ từ gập về phía trước."
# 【日々姫】
# display as 日日姬
# JP: 「に――にぃにの――ンッ――くい、こんで――\nきて――ふあっ――あっ……くっ――ふぅっ」
2709 = "「A――Của anh hai――ưm――lún sâu, vào―― rồi――phù――a......hự――phù」"
# 【双鉄】
# display as 雙鐵
# JP: 「あててるだけだぞ？\n随分と色っぽい声をだす」
2421 = "「Anh mới chỉ chạm vào thôi mà? Sao em lại phát ra giọng điệu gợi tình thế」"
# 【日々姫】
# display as 日日姬
# JP: 「だって……だってぇ――\nうう……そぎゃん意地悪、いっちゃ、やぁ」
2305 = "「Tại vì......tại vì―― Ư ư......Anh đừng có trêu em, nữa mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「意地悪のつもりはないのだが」
2434 = "「Anh đâu có định trêu em đâu」"
# monologue
# JP: （もにゅ）
3725 = "（Nắn bóp）"
# 【日々姫】
# display as 日日姬
# JP: 「ふぁんっ！！！」
2117 = "「Fuan!!!」"
# monologue
# JP: 日々姫の緊張をほぐそうと、二の腕を軽く揉むだけで、\nまるで性器を責め立てたような声が出る。
3503 = "Định xoa dịu sự căng thẳng của Hibiki, tôi chỉ khẽ nắn bóp bắp tay em ấy, mà em ấy lại phát ra âm thanh như thể đang bị kích thích vào cơ quan sinh dục vậy."
# monologue
# JP: 運動直後のせいなのか、優勝の興奮のせいなのか、\n日々姫は、随分と敏感になっているようだ。
2933 = "Không biết là do vừa mới vận động xong, hay là do sự hưng phấn của việc giành chức vô địch, mà có vẻ như Hibiki đang trở nên cực kỳ nhạy cảm."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫がこれほど、可愛く動いてくれるなら」
2459 = "「Nếu Hibiki cử động đáng yêu đến thế này thì」"
# monologue
# JP: （ぐっ――ぐっ――）
3695 = "（Cọ xát——Cọ xát——）"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――んっ――はっ――汗……ついちゃう\nわたし、にぃに、体、よご、してっ――んっ――」
2188 = "「A――ưm――hà――Mồ hôi......sẽ dính mất Em, sẽ làm bẩn, cơ thể, anh hai, mất――ưm――」"
# 【双鉄】
# display as 雙鐵
# JP: 「こうして、日々姫がほぐれれば――\n僕も、自然とほぐされるさ」
2659 = "「Cứ thế này, nếu Hibiki được xoa bóp thư giãn―― Thì anh, cũng sẽ tự nhiên được xoa bóp theo thôi」"
# 【日々姫】
# display as 日日姬
# JP: 「ふ……きゅっ――ンんッ――」
2104 = "「Phù......kyu――ưm ưm――」"
# monologue
# JP: 中途半端な快感が、恐らく逆にもどかしいのだろう。\n日々姫の腰が、くねりだす。
2923 = "Khoái cảm nửa vời này, có lẽ ngược lại càng khiến em ấy thêm bức bối. Hông của Hibiki bắt đầu uốn éo."
# monologue
# JP: 勃起が直接与えてくれるさらなる刺激を欲しがって、\n甘えるようにすがるようにして身悶える。
3054 = "Khao khát thêm những kích thích trực tiếp từ dương vật cương cứng mang lại, em ấy quằn quại như đang làm nũng, như đang van nài."
# 【双鉄】
# display as 雙鐵
# JP: 「焦るな。日々姫。ゆっくりほぐそう」
1945 = "「Đừng vội. Hibiki. Hãy từ từ xoa bóp nào」"
# monologue
# JP: （ぐぐうっ）
3716 = "（Ép xuống）"
# 【日々姫】
# display as 日日姬
# JP: 「ぇえっ――ゆっくり――ん……くっ――\nは、あっ――ん――ふあっ！」
2138 = "「Ể――từ từ――ưm......hự―― Hà, a――ưm――phù a!」"
# monologue
# JP: 日々姫の背を、足につくまで押していく。
3154 = "Tôi ấn lưng Hibiki xuống, cho đến khi chạm vào chân."
# 【日々姫】
# display as 日日姬
# JP: 「や……んっ――あっ――体、まが、ると――\nにぃに――にぃにの……おちん、ちん――がっ――」
2070 = "「Ya......ưm――a――Cơ thể, gập lại, thì―― Anh hai――Chim......của anh hai――sẽ――」"
# monologue
# JP: 食い込む。尻が、尻肉が。\n力みで筋肉が収縮し、僕を捕まえ締め付けてくる。
3068 = "Lún sâu vào. Mông, phần thịt mông. Cơ bắp co lại do dùng sức, tóm lấy và siết chặt lấy tôi."
# monologue
# JP: （これは――これで……気持ちいい、な）
3744 = "（Thế này――thế này cũng......sướng, thật đấy）"
# 【日々姫】
# display as 日日姬
# JP: 「ふ……ぁ――あっ――にぃ、に――きつっ、ん」
