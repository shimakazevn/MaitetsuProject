2071 = "「Yaaaaa! Chim, đã đút vào rồi cơ mà! Em đã làm đúng như lời anh hai nói rồi cơ mà!」"
# monologue
# JP: 日々姫が泣き声でいやいやをする。
3435 = "Hibiki mếu máo phản đối."
# monologue
# JP: もう、限界だ。僕の我慢が。\nゆえ、尻を支える指の力を、強くする。
3214 = "Sự chịu đựng của tôi, đã đến giới hạn rồi. Vì thế, tôi dồn thêm lực vào những ngón tay đang đỡ lấy mông em ấy."
# monologue
# JP: （ぐっ）
3737 = "（Dùng sức）"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！？――あっ――\nにぃに――にぃに？」
2216 = "「A!?――a―― Anh hai――anh hai?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いもうとに果たせぬことならば、\n兄が助けるのは当然だ」
2344 = "「Những việc mà em gái không làm được, thì người làm anh giúp đỡ là chuyện đương nhiên」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ――うんっ！！」
2244 = "「Vâng――vâng!!」"
# monologue
