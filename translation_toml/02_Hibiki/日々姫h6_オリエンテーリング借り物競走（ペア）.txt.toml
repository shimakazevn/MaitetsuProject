2199 = "「Aaaaa――a! Đến rồi――đang vào rồi, Chim của, anh hai――a――âm đạo, của em」"
# monologue
# JP: だから、じわり、\nじわりと日々姫を導いていく。
3123 = "Vì thế, tôi từ từ, từ từ dẫn dắt Hibiki."
# monologue
