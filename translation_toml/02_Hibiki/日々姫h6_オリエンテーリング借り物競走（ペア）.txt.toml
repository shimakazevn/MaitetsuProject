3560 = "Lực siết của âm đạo, giờ đây đã pha lẫn những cơn run rẩy như co giật."
# monologue
# JP: （ずばっ！　じゅぶっ！　じゅっ！　ばちゅんっ！）
# 3706 = "（啾噗！啾噗！噗啾！噗啾！）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひ、あ――ひと、り、やぁ、なのっ！　ぴゅっぴゅ、\nほし、いのっ、わたし、の、おなか――しきゅう、に」
2405 = "「Hi, a――Một, mình, không chịu, đâu! Bắn tinh, muốn, bắn vào, bụng, của em――vào tử cung」"
# monologue
# JP: だから、もう。僕も日々姫も止まれない。\n既に、崖から落ちている。
3238 = "Vì thế, không thể nào. Cả tôi và Hibiki đều không thể dừng lại được nữa. Chúng tôi đã rơi xuống khỏi vách đá mất rồi."
# 【日々姫】
# display as 日日姬
# JP: 「だして、にぃに！　びゅうびゅうって、してっ！\nせいえき、しきゅう！　しきゅうに、ちょうだいっ」
2356 = "「Bắn ra đi, anh hai! Bắn thật nhiều, vào đi! Tinh dịch, tử cung! Hãy cho em, vào tử cung đi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2236 = "「Ừ――」"
# monologue
# JP: 解き放ちたい。\n快感はとうに振り切れている。
3174 = "Tôi muốn giải phóng tất cả. Khoái cảm đã vượt quá giới hạn từ lâu."
# monologue
# JP: 何一つさえ制御できない。\n腰から下が、性感の飽和で麻痺してる。
3159 = "Tôi không thể kiểm soát được bất cứ thứ gì nữa. Từ hông trở xuống đã tê liệt vì bão hòa nhục cảm."
# 【日々姫】
# display as 日日姬
# JP: 「はっ！　あっ！　あっ！　すごっ！　これっ――\nおなか――きゅうって、おまんこ、きゅうって！」
2120 = "「Hà! A! A! Tuyệt quá! Cái này―― Bụng――thắt lại, âm đạo, thắt lại rồi!」"
# monologue
# JP: （ぐうううっ）
3722 = "（Ôm chặt）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2759 = "「！」" 
# monologue
# JP: 僕を抱く日々姫の腕にちからがこもる。
3205 = "Vòng tay đang ôm lấy tôi của Hibiki siết chặt lại."
# monologue
# JP: 日々姫の胸がつぶれ張り付く。\n鼓動と鼓動が一つに混じる。
3454 = "Bầu ngực của Hibiki bị ép phẳng, dính chặt vào tôi. Nhịp tim và nhịp tim hòa quyện làm một."
# 【双鉄】
# display as 雙鐵
# JP: 「ひび、きっ！」
2470 = "「Hibi, ki!」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　にぃに！　にぃに！　にぃにぃっ！」
2737 = "「Anh hai! Anh hai! Anh hai! Anh hai!」"
# monologue
# JP: 名を呼び合う。\n途端、全てが混じり合う。
3142 = "Chúng tôi gọi tên nhau. Ngay lập tức, mọi thứ hòa quyện vào nhau."
# monologue
# JP: （きゅううううううううううっ！）
# 3729 = "（收縮壓迫）" 
# 【日々姫】
# display as 日日姬
# JP: 「くるっ！　くるっ！　きちゃうっ！　にぃに、\nにぃにぃ！　いっしょ、いっしょにっ！！！」
1996 = "「Đến rồi! Đến rồi! Sắp đến rồi! Anh hai, anh hai! Cùng nhau, cùng nhau nhé!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、日々姫――僕も――僕もだっ」
2292 = "「Ừ, Hibiki――Anh cũng――Anh cũng vậy」"
# monologue
# JP: だから、日々姫を持ち上げる。\nその腰を、抜けそうなところまで持ち上げさせてっ
3252 = "Vì thế, tôi nâng Hibiki lên. Nâng hông em ấy lên đến mức tưởng chừng như sắp tuột ra ngoài"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！？　あっ――そんな、そんなの、されたら、\nおまんこ、わたし――これ、もうっ！！！」
2218 = "「A!? A――Bị làm, bị làm như vậy, âm đạo, của em――cái này, không chịu nổi nữa!!!」"
# monologue
# JP: （じゅぶうううううううううっ！　ごちゅんんっ！！）
# 3736 = "（用力插入）" 
# 【日々姫】
# display as 日日姬
# JP: 「きゅっ！　ふぅぅぅぅぅぅぅぅぅぅぅぅぅんっ！」
2078 = "「Kyu! Fuuuuuuuuuuuuuun!」"
# monologue
# JP: （きゅうううううううううんっ！！！）
# 3729 = "（收縮壓迫）" 
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 2205 = "「啊！」" 
# monologue
# JP: （びゅっ！　びゅぶるっ！　びゅううっ！　びゅっ！）
3712 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！　きたっ！　びゅうって！　あたって！\nせいえき！　せいえき！　あかちゃん、にぃにのっ！」
2208 = "「A! Đến rồi! Bắn ra rồi! Chạm vào rồi! Tinh dịch! Tinh dịch! Em bé, của anh hai!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っっっ」
2201 = "「!!!」"
# monologue
# JP: （びゅぶっ！　びゅるんっ！　びゅっ！　びゅぶっ）
# 3712 = "（噗噗！噗嚕！噗噗！噗嚕！）" 
# monologue
# JP: 精液がドロリとつながっている。\n途切れることなく塊になり子宮の壁に張り付いていく。
3622 = "Tinh dịch sền sệt tuôn ra không dứt. Trở thành những khối đặc quánh bám chặt vào thành tử cung."
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！　あっ！　びゅっびゅ！　あつい、のっ！\nどろって、しきゅう――あたってっ――たまって！」
2124 = "「Phù! A! Bắn rồi! Nóng, quá! Nhơm nhớp, tử cung――bị chạm vào――đọng lại rồi!」"
# monologue
# JP: （どびゅっ！　びゅるっ！　びゅううっっ！　びゅっ）
# 3712 = "（噗噗！噗嚕！噗噗！噗嚕！）" 
# 【日々姫】
# display as 日日姬
# JP: 「もっと、もっと、して！　びゅううって、してっ！\nおまんこ、おなか――ぜんぶ――にぃに、でっ！」
2025 = "「Nữa, nữa đi anh! Bắn ra, nhiều nữa đi! Âm đạo, trong bụng――tất cả――lấp đầy bằng anh hai, đi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うっ――あっ！」
2092 = "「Ư――a!」"
# monologue
# JP: （びゅるるっ！　びゅうっ！　びゅっ！　びゅうう）
# 3712 = "（噗噗！噗嚕！噗噗！噗嚕！）" 
# 【日々姫】
# display as 日日姬
# JP: 「みた、してっ――せいえき――にぃにで、ぜんぶ！\nわた、しっ！　わたしの、ぜんぶ、にぃに、でっ！」
2314 = "「Lấp đầy, em đi――tinh dịch――bằng anh hai, tất cả! Em! Tất cả của em, bằng anh hai, đi!」"
# monologue
# JP: もう、でない。\nはらわたまで全てを射精した。
3160 = "Không còn, ra được nữa. Tôi đã xuất tinh đến cạn kiệt tận ruột gan."
# monologue
# JP: 理性の弱音を、けれども手足が殴りつけ、蹴る。\nまだ絞れると、日々姫の腰をまた持ち上げて――
2949 = "Thế nhưng, tay chân tôi lại đánh đập, đá văng đi những lời than vãn yếu ớt của lý trí. Nghĩ rằng vẫn còn có thể vắt thêm được nữa, tôi lại nâng hông Hibiki lên――"
# monologue
# JP: （ぐちゅううううううううううっっ！　ぶちゅんっ！）
# 3736 = "（用力插入）" 
