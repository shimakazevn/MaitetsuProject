3389 = "日日姬停下了滾來滾去的動作，好奇地看著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「それって、どぎゃん意味と？」
1970 = "「什麼意思啊？」" 

# 【双鉄】
# display as 雙鐵
