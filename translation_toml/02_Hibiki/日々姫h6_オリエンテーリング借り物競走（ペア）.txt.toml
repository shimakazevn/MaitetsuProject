# 日々姫h6_オリエンテーリング借り物競走（ペア）.txt 
[info]

[characters]
3280 = "日々姫"
3005 = "双鉄"

[character_subs]
3371 = "日日姬"
3612 = "雙鐵"

[script]
# lines: 716 
# 【日々姫】
# display as 日日姬
# JP: 「運動会。商店街の」
2179 = "「商店街要辦運動會了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――もうそんな季節か」
2161 = "「哦――都到這個時候了啊」" 

# monologue
# JP: 最近、妙に来客が多いと感じていたが――\nいやはや、すっかり失念していた。
3199 = "我正想最近為什麼客人莫名的多――唉，我完全忘記了這一茬。" 

# 【双鉄】
# display as 雙鐵
# JP: 「聞くまでもないことだが」
2433 = "「我有個多餘的問題――」" 

# 【日々姫】
# display as 日日姬
# JP: 「仕切ると。今年も。ねぇねぇが」
2746 = "「阿姐今年也負責組織」" 

# monologue
# JP: 尋ねる前に、ズバリの答え。\nまことに正しく、聞くまでもないことだったらしい。
3247 = "我還沒問她就果斷地給出了回答，真的是個多餘的問題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「好きなのだなぁ、真闇姉は、運動会が」
2566 = "「真闇姐還真是喜歡運動會啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「昔っからとよ。\nねぇねぇ、みんなが頑張っとる姿をみるの好きやけん」
2749 = "「阿姐從以前就喜歡這個，她最喜歡看大家努力的樣子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――確かに思い当たるな」
2246 = "「嗯――這麼一說我就想起來了」" 

# monologue
# JP: 常に見守り、けれどもギリギリのギリギリまで、\n自分からは救いの手を差し伸べない。
3058 = "她常常是在一旁守著我們。但是除非真的幾乎來不及，她從來不會伸出援手。" 

# monologue
# JP: 努力を、そして成長を見守ることが、\nなるほど、真闇姉は、ただ単に“好き”なのか。
3001 = "原來如此，真闇姐只是“喜歡”看我們努力、看我們成長。" 

# 【日々姫】
# display as 日日姬
# JP: 「でしょお。でなきゃこぎゃんこつ引き受けんとよ。\n運動会の幹事だなんて、毎年毎年」
2359 = "「對吧，不然她也不會接下這份差事，每年都做運動會的組織幹部啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかしまぁ、これほど大いに盛り上がるのも、\n真闇姉の手腕があってのことだろう」
2062 = "「可是運動會能辦得這麼熱鬧，也全是靠了真闇姐的才能」" 

# 【日々姫】
# display as 日日姬
# JP: 「まっことねー！　学園の、[にしきまち,2]二色町のこに話したら、\nびっくりされたもん」
2526 = "「沒錯！我跟住在二色町的同學們一說，他們都很吃驚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「盛り上がりっぷりについてか？」
2495 = "「是說運動會有多熱鬧嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「そ！　『うける～！　ありえ～～ん！』って」
2362 = "「對啊！他們都說“好有意思，不可能吧”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うけるかどうかはともかく、ありえんはわかるな。\n僕の産まれた町でも、帝都でも、これはなかった」
2015 = "「先不說是不是有趣，我知道他們為什麼不相信。不管是我出生的地方，還是在帝都，都沒有這種事情」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？」
2151 = "「哎？」" 

# monologue
# JP: ほんのすこし、戸惑った顔。
3482 = "日日姬露出了疑惑的表情。" 

# monologue
# JP: ああ、いかん。\n生家の話を、何も考えずにしてしまったか――
3025 = "啊，不好。我一不小心就把出生地的事說出來了――" 

# 【日々姫】
# display as 日日姬
# JP: 「ゆーたら、どぎゃんと？\nにぃにのふるさととか、帝都とかの商店会の運動会」
2696 = "「那阿哥的故鄉，還有帝都的商店協會的運動會是什麼樣的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2180 = "「啊――」" 

# monologue
# JP: 僕のふるさと。\n日々姫が、力みなくそう話してくれる。
3403 = "日日姬很自然地說出了“我的故鄉”。" 

# monologue
# JP: “近くなった”と、だから、感じる。\n僕と日々姫は、お互いの知らぬ過去さえ重ねあえてる。
3203 = "我深切體會到，正因為我們之間的距離拉近了，我們現在才可以談起彼此的過去了。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに？」
2745 = "「阿哥？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや。うむ――\nつまりだな、基本的には、無いのだ」
2286 = "「嗯，啊。那個，這種事基本是沒有的」" 

# 【日々姫】
# display as 日日姬
# JP: 「無いって、なにが？」
1971 = "「什麼沒有啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「商店会主催の、大運動会がだ」
2664 = "「這種商店協會主辦的大運動會」" 

# 【日々姫】
# display as 日日姬
# JP: 「ええええ～！？　ありえーーーーーん！！」
2156 = "「哎～！？不可能吧！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。恐らくはそれが、御一夜の商店会主催の\n大運動会に初めて触れた人間の反応と同じものだろう」
2258 = "「嗯。你這個反應，就跟其他人第一次聽說御一夜商店協會辦的大運動會的反應一樣」" 

# 【日々姫】
# display as 日日姬
# JP: 「え……え？　だって、そしたら他の町、とか。\n大人の人って、運動会ば、どぎゃんしとると？」
2140 = "「哎……哎？可是，那其他地方的大人，都是怎麼辦運動會的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、会社などの単位か、あるいは町内会などで\n――あるにしても、もっとごくごく小規模だ」
2284 = "「嗯，可能是以公司為單位，或者是管委會舉辦。就算是有，規模也非常小」" 

# 【日々姫】
# display as 日日姬
# JP: 「あるにしても、って――\n完全になかところもあると！？」
2368 = "「就算是有？也就是說有的地方完全沒有嗎！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「というか、ある方が珍しいのではないかと思うぞ。\n地域での、『大人のための運動会』的なイベントが」
2024 = "「其實有運動會的比較少見，這種整個地區參與的“給大人開的運動會”非常少見」" 

# 【日々姫】
# display as 日日姬
# JP: 「わ……わ――ありえなか……あっ！？　こほん。\nそれは、カルチャーショックですね、にいさん」
2130 = "「哇……哇――不可能……啊！？咳咳。這可真是文化差異啊，哥哥」" 

# monologue
# JP: いきなり出てきた標準語。
3072 = "她突然開始說普通話了。" 

# monologue
# JP: なるほど日々姫は、商店会主催の大運動会を、\n『非・都会的な風習』とでも理解したのか。
3386 = "日日姬估計是明白這種商店協會主辦的大運動會不是一種“城裡的習俗”了吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は素晴らしい習慣だと思うぞ？\n御一夜の、商店会主催の大運動会」
2442 = "「我覺得這個習俗不錯啊，御一夜商店協會主辦的大運動會很棒」" 

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんと？　ううんっ――こほん。そうですか？」
2492 = "「是嗎？不對――咳咳。是這樣嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そぎゃんだ。老若男女が力をあわせ、\nこころをあわせて、己の組の勝利のために努力する」
2294 = "「嗯，是啊。男女老少團結起來，齊心協力為自己的隊伍爭取勝利」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんうん」
2267 = "「嗯嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「出店も多く、新しい交流のきっかけにもなっている。\n実際、全国に広まっていって欲しく思うほどだ」
2377 = "「店鋪也很多，還能創造一個讓人們交流起來的機會。我覺得這個應該推廣到全國」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんうん！」
2268 = "「嗯嗯！」" 

# monologue
# JP: 日々姫の笑顔がふくらんでいく。\nやはり、姉妹だ――複数の意味でそう感じる。
3483 = "日日姬露出了開心的笑容。果然姐妹還是姐妹――她們在很多方面都很像。" 

# 【日々姫】
# display as 日日姬
# JP: 「やったら！　にぃに、今年も出てくれる？」
2694 = "「那阿哥今年也會參加嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、最初からそのつもりだ」
2290 = "「嗯，我一開始就打算參加」" 

# 【日々姫】
# display as 日日姬
# JP: 「やったぁ！」
2325 = "「太好啦！」" 

# monologue
# JP: 小さくガッツポーズして。\n正座の日々姫は、僕へと体を寄せてくる。
3583 = "跪坐在地上的日日姬擺了個勝利的姿勢，然後向我這邊靠了過來。" 

# 【日々姫】
# display as 日日姬
# JP: 「やったら、ね？　イヤでなければ、\n私と――新しい競技に出てほしかとよ」
2688 = "「那就那個，如果阿哥願意的話，來跟我參加新比賽項目吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫と一緒を、イヤなどと思えるはずもない」
2635 = "「跟你一起做的事我肯定願意」" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへっ！」
2144 = "「哎嘿嘿！」" 

# monologue
# JP: 嬉しげな顔。\nほほがパアっと紅色になる。
3484 = "日日姬顯得很高興，小臉也染上了紅暈。" 

# monologue
# JP: それを自覚し、恥ずかしがってうつむいて――\n日々姫の髪の匂いがふっと、鼻をくすぐる。
3477 = "日日姬自己也發現了，害羞地俯下身子――她頭髮散發出的香味便飄進了我的鼻孔。" 

# 【双鉄】
# display as 雙鐵
# JP: 「で？　新競技とはどんなものだ」
2546 = "「然後，新比賽項目是什麼啊？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　ええっとね、\n『オリエンテーリング借り物競走（ペア）』！」
2228 = "「啊，就是那個，“越野借物競走（結對）”！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おりえんてーりんぐかりものきょうそう\nかっこぺあ」
2630 = "「越野借物競走括號結對」" 

# monologue
# JP: 僕の返事で、『わかってない』と伝わったのか。
3470 = "日日姬看我這麼回覆她，大概是明白我不懂什麼意思了。" 

# monologue
# JP: 日々姫はスケッチブックの間から、\n几帳面にたたまれた一枚の紙を取り出し、広げる。
3406 = "日日姬從素描本中拿出一張疊得整整齊齊的紙，然後把它展開。" 

# 【日々姫】
# display as 日日姬
# JP: 「えと、オリエンテーリングってあるでしょお？\nあの、ヒントを頼りに地図のポイントを探すやつ」
2682 = "「那個，首先是定向越野，就是根據提示找地圖上的點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。路子と一緒に、一度か二度は、\n僕も経験したことがある」
2262 = "「嗯。我跟路子一起做過一兩次」" 

# 【日々姫】
# display as 日日姬
# JP: 「そいばして、まずは言葉を集めていくと」
2018 = "「先通過這個收集關鍵字」" 

# 【双鉄】
# display as 雙鐵
# JP: 「言葉？　ああ――ふむ……一つのポイントクリアで、\n次のポイントの地図と共に、言葉が一つ見つかるのか」
2707 = "「關鍵字？我――嗯……到達一個目的點後，除了下一個目的點的地圖，還能得到一個關鍵字對嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。そん言葉を全ポイントの分集めると、\n借りるものの名前になるって書いてあるとばい」
2264 = "「嗯。把所有地點的關鍵字收集起來後，就能知道需要借的是什麼東西」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――さすがは真闇姉だな」
2159 = "「哦――真闇姐真厲害」" 

# 【日々姫】
# display as 日日姬
# JP: 「って、なにが、『さすがは』ねぇねぇと？」
2150 = "「哎，為什麼說阿姐厲害啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「この設定なら、ショートカットはギャンブルになる。\n最後までチェックポイントを回る必要が出るからな」
2453 = "「按照這個規定，抄捷徑就跟賭博一樣了。這樣需要去所有的目的點」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　っと……それって」
2153 = "「哎？什麼意思……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今回、指定されるチェックポイントは三箇所。\n仮に、一文字目が『お』。二文字目が『か』だとする」
2663 = "「這次規定的目的點有三個地方。比如說第一個字是“o”，第二個字是“ka”」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　わかった、お菓子！！」
2214 = "「啊！是“okashi”，點心！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんが、『お釜』かもれんし、\n『おかめ』の面、あるいは『お金』の可能性もある」
2066 = "「可能是點心，也可能是鐵鍋“okama”，面具“okame”，還可能是錢“okane”」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー！　そういう！　\n確かに、そぎゃん引っ掛けあるかもって思ったら――」
2166 = "「哦一！這樣啊！一想到有這樣的陷阱――」" 

# 【双鉄】
# display as 雙鐵
# JP: 「参加者は最後のヒントまで確かめねばならん。\nオリエンテーリングも本気でいかねばならんわけだ」
2048 = "「參加者必須收集所有的提示，定向越野也必須認真做」" 

# 【日々姫】
# display as 日日姬
# JP: 「わー、\nわかったらホント、さすがねぇねばい」
2135 = "「哇，這麼一說，阿姐可真厲害」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ペア競技というところも、\n勝負の分かれ目になりそうだな」
2558 = "「看來結對比賽也是決定勝負的關鍵因素。" 

# monologue
# JP: コンビネーション、役割分担。\nその辺次第で、かなり時間を稼げよう。」
2978 = "兩人的配合、職責分擔。這些工作做好了能節省不少時間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「念のためだが、\nペアは、別々に行動してもいいのだよな？」
2441 = "「我確認一下，兩個人結對可以分頭行動嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん、ゴールの時にふたり一緒にいれば良か――\nって！　違っ――違わなっ！　んっ――う～～っ」
2282 = "「嗯，兩個人一起到終點就可以了――啊！沒――沒錯！嗯――唔～～」" 

# monologue
# JP: 広げられてた、競技ルールの書かれた紙がたたまれる。
3396 = "日日姬又把寫著比賽規則的拿張紙折上了。" 

# monologue
# JP: たたんだところで、日々姫はぴたりと動きを止めて、\nひどく苦しげに うなってしまう。
3255 = "折上之後她整個人動作一僵，發出了苦惱的呻吟。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした日々姫？　歯でも痛むか？」
2474 = "「日日姬，怎麼了？牙痛嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ～～……うん。歯は平気やけど……\nあうぅ～っ、にぃににウソばつきたくなかけん」
2234 = "「啊～～……嗯，我牙不痛……啊嗚～我不想跟阿哥撒謊」" 

# monologue
# JP: 日々姫が、紙をまた開く。
3394 = "日日姬又展開了那張紙。" 

# monologue
# JP: ルールを確認してみれば――\nやはり、ペアの別行動は認められている。
3121 = "我一看規則，結對的兩個人果然是可以分頭行動的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『ただし、二人同時にゴールしなければ\nゴールインとは認められない、か』なるほど」
1432 = "「“但是兩人必須同時到達終點，否則無效”，原來如此」" 

# 【日々姫】
# display as 日日姬
# JP: 「やっぱり……別行動の方が、よかと？」
2508 = "「果然……分頭行動更好嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「役割分担をうまくできれば、\n確かにその方が有利――ああ、いや、有利かもしれん」
2342 = "「如果能分配好各自的任務，這樣的話確實――不，可能會更有利」" 

# monologue
