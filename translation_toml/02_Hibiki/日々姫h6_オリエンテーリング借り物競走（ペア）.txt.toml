# 【日々姫】
# display as 日日姬
# JP: 「にぃ……に。にぃに？\nん～～っと…………ちらっ！」
2744 = "「阿哥，阿哥？嗯～～我拉！」" 

# 【双鉄】
# display as 雙鐵
