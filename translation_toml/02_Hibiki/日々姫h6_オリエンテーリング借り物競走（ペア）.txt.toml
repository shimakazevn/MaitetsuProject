2162 = "「哦。po、su、to是１、２、３ ？那132就是――綠蘿“potosu”！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや……違ったか、ポトスでは」
2093 = "「呃……不是綠蘿吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「違わんばい！　ポトス！　こっち！！」
