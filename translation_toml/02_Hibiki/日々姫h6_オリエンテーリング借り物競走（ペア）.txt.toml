# monologue
# JP: （そうか。わざわざ遠回りしなくても、\n看板づくりのころから、ずっと、御一夜の町は――）
3698 = "（原來如此，不用繞遠也可以。在設計招牌的時候，日日姬就非常熟悉御一夜了）" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　おまたせ！　ぞうりば借りてきた\n――きゃっ！？」
2725 = "「阿哥！久等了！我借來草屐了！――呀！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「行くぞ！　日々姫！！」
2418 = "「我們走！日日姬！！」" 

# monologue
# JP: 日々姫の手を引き、走る、走る。
3186 = "我拉著日日姬的手，跑了起來。" 

# monologue
# JP: 日々姫のペースを考えて、\n手が伸び切らないギリギリの速度でひた走る。
3228 = "我考慮著日日姬的速度，用我們的能保持牽著手的最快速度奔跑著。" 

# 【日々姫】
# display as 日日姬
# JP: 「はぁっ――はぁっ――はっ――はぁっ」
2098 = "「呼――呼――呼――呼」" 

# monologue
# JP: 日々姫も、必死でついてきている。\n僕に、ついてきてくれている。
3383 = "日日姬也用上了全部的力氣在跟著我跑。" 

