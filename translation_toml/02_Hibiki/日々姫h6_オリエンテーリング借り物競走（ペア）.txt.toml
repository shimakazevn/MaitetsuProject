# display as 日日姬
# JP: 「ふやぁぁぁぁぁぁぁぁぁぁんっ！！！！」
2196 = "「Fuyaaaaaaaaaan!!!!」"
# monologue
# JP: （ぎゅううううううっ！）
# 3729 = "（收縮壓迫）" 
# 【双鉄】
# display as 雙鐵
# JP: 「ぎっ！」
2300 = "「Hự!」"
# monologue
# JP: （どびゅるっ！！！！！　びゅううううっ！）
3714 = "（Phụt!!!!! Phụt!）"
# 【日々姫】
# display as 日日姬
# JP: 「きゃふっ！！！　か――はっ――あっっ――――」
2087 = "「Kyafu!!! Hà――hà――a――――」"
# monologue
# JP: （どさっ！）
3740 = "（Đổ sập!）"
# 【日々姫】
# display as 日日姬
# JP: 「――あっ――にぃに」
1424 = "「――A――Anh hai」"
# monologue
# JP: 崩れる日々姫を抱きとめて、\nそのまま、ふたり、ベッドに倒れる。
3179 = "Tôi đỡ lấy Hibiki đang gục xuống, và cứ thế, hai chúng tôi ngã xuống giường."
# 【日々姫】
# display as 日日姬
# JP: 「あ――ふあっ――あっ――キス――ちゅうっ、\nちゅうっ、するのっ――ちゅうううぅ」
2182 = "「A――phù――a――Hôn――chụt, hôn em, đi――chụt」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2265 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「ん……ちゅっ――ちゅむっ――ちゅっ――\nちゅぱっ、ちゅうっ――チュルルっ――ちゅう、む」
2250 = "「Ưm......chụt――chùn chụt――chụt―― Chụt, chụt――chụt――chùn, chụt」"
# monologue
# JP: どろどろだ。\n口内さえも、すでに日々姫は溶け切っている。
3480 = "Ướt nhẹp. Ngay cả bên trong khoang miệng, Hibiki cũng đã tan chảy hoàn toàn."
# monologue
# JP: 密着している口の端から、よだれが落ちる。\n落ちているのに、日々姫の唾液で僕も満ちてる。
3024 = "Từ khóe môi đang áp chặt vào nhau, nước dãi rỏ xuống. Dù đang rỏ xuống, nhưng khoang miệng tôi cũng đã ngập tràn nước bọt của Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「はむっ――ンッ――れるっ――れろっ――ねろっ\n――ねるうううっ――ちゅずずうっ――ず、ごくっ」
2172 = "「Ngoạm――ưm――liếm――liếm――liếm ――liếm――chụt――ực」"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ――くっ――ごくっ――ん――ずううっ――\nちゅっ――ちゅむっ――ごくっ」
2240 = "「Ưm――hự――ực――ưm――chụt―― Chụt――chùn chụt――ực」"
# 【日々姫】
# display as 日日姬
# JP: 「んっ――ちゅううっ――ちゅっ――ちゅむっ――\nひぃ、ひっ――んっ――ちゅき――ちゅきぃ」
2243 = "「Ưm――chụt――chụt――chùn chụt―― Hii, hi――ưm――yêu anh――yêu anh lắm」"
# monologue
# JP: キスをしたまま、直接、愛の言葉をささやき。\nそうして、日々姫はキスを解いて。
3376 = "Vẫn giữ nguyên nụ hôn, em ấy trực tiếp thì thầm những lời yêu thương. Và rồi, Hibiki dứt nụ hôn."
# 【日々姫】
# display as 日日姬
# JP: 「ぷあっ！　あっ！　あっ――ふ、あっ――ああ――\nは――ああ……ふあ――あっ――」
2297 = "「Phù! A! A――phù, a――a―― Hà――a......phù――a――」"
# 【双鉄】
# display as 雙鐵
# JP: 「汗が……ひどいな」
2031 = "「Mồ hôi......nhiều quá nhỉ」"
# monologue
# JP: シャワーを浴びた意味がなかった。\n日々姫も僕も、完走しきった瞬間以上に、どろどろだ。
2989 = "Việc đi tắm lúc nãy chẳng còn ý nghĩa gì nữa. Cả tôi và Hibiki, giờ còn ướt sũng hơn cả khoảnh khắc vừa chạy xong cuộc đua."
# 【日々姫】
# display as 日日姬
# JP: 「あのね？　にぃに。\n私、もう、足ば、がくがくやけん」
2679 = "「Nè? Anh hai. Chân em, giờ run lẩy bẩy rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2265 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 2205 = "「啊！」" 
# monologue
# JP: 僕も、少々ふくらはぎに来ている。\nが、日々姫ひとりを支えられぬほどのことはない。
3211 = "Bắp chân tôi cũng hơi nhức mỏi một chút. Nhưng không đến mức không thể đỡ nổi một mình Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「えへへ、お姫様だっこ～」
2145 = "「Ehehe, bế kiểu công chúa~」"
# monologue
# JP: このまま、ふたり、シャワーを浴びよう。
3141 = "Cứ thế này, hai đứa cùng đi tắm vòi sen thôi."
# monologue
# JP: 今度こそ、\nしっかり汗を、流すのだ。
3599 = "Lần này, phải rửa sạch mồ hôi đàng hoàng mới được."
