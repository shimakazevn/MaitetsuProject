# 【双鉄】
# display as 雙鐵
# JP: 「いやしかし――あれは、観葉植物だろう？」
2055 = "「可是――那不是盆栽觀賞植物嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「帝都ではそうかもしれんけど、\n御一夜では普通に地植えで――ほら！」
2309 = "「在帝都可能是吧，不過在御一夜是長在地上的――看！」" 

# 【双鉄】
# display as 雙鐵
