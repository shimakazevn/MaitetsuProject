# 【双鉄】
# display as 雙鐵
# JP: 「っと、と、いうかだな！？　\n日々姫っ、その、ブラ、ブラジャーは」
2657 = "「這是怎、怎麼回事！？日日姬，你、你的胸罩呢？」" 

# 【日々姫】
