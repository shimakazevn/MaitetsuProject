2302 = "「嚯――葉子還挺大的。不過還真虧你知道這裡有綠蘿啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「自分の仕事場のことやもん！」
2306 = "「因為這是我工作的地方啊！」" 

# monologue
# JP: それを言ったら、僕にも仕事場。\nさすがは日々姫とつくづく思う。
3566 = "要這麼說，其實這也是我工作的地方。我再次佩服起日日姬的細心。" 

