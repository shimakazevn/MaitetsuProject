3579 = "Chính vì là khoảnh khắc đã mong chờ từ lâu nên tôi không hề vội vã. Tôi chỉ đưa phần đỉnh quy đầu xâm nhập vào cửa mình vài centimet."
# monologue
# JP: （くっ――ぷっ）
3705 = "（Hự——Phụt）"
# 【日々姫】
# display as 日日姬
