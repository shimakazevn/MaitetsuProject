2764 = "「~~~~~!! Kua! Aaaaa! Ưm, Chỗ đó, chỗ chỉ dành, cho chim――thích lắm」"
# monologue
# JP: 指では決して触れない、\n日々姫の深くのスイートスポット。
3225 = "Điểm nhạy cảm nằm sâu bên trong Hibiki, nơi mà ngón tay tuyệt đối không thể chạm tới được."
# monologue
# JP: 僕専用の場所だと思えば、\n亀頭でしつこく、しつこくマーキングしたくなる、
2915 = "Nghĩ rằng đó là nơi dành riêng cho tôi, tôi lại càng muốn dùng quy đầu để đánh dấu nó một cách thật dai dẳng, thật dai dẳng."
# monologue
