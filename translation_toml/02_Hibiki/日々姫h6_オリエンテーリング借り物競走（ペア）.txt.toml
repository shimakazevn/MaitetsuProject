# 【日々姫】
# display as 日日姬
# JP: 「ほーら、あった！」
2386 = "「快看，我找到了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
2167 = "「哦！」" 

# monologue
# JP: やはり日々姫の瞳が見つけた。\nポトスの葉っぱを邪魔せぬように、白い箱。
3430 = "日日姬果然很快就找到了。只見一個白色的箱子放在沒有被綠蘿的葉子遮到的位置。" 

# monologue
# JP: カギは――カチリとすぐ回る。
3146 = "我們用鑰匙打開了鎖。" 

# 【日々姫】
# display as 日日姬
# JP: 「最後のキーワードは……『お』！」
2503 = "「最後的關鍵字是……“o”！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「は、な、お――『鼻緒』か！\n下駄か草履、下駄か草履は――赤井宮司っ！！」
1415 = "「ha、na、o――是木屐帶！木屐或者草屐、木屐或者草屐――去找赤井宮司！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「ううん、もっと近くで借りれると！！」
1940 = "「不用，有個地方更近！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ、おい！」
2221 = "「啊，喂！」" 

# monologue
# JP: 日々姫が走る、迷いなく。\n駅へとまっすぐ戻る方向――
3433 = "日日姬毫不猶豫地跑了起來，朝向的是車站的方向――" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　ここでちょっと待っとって！！」
2728 = "「阿哥！你擱這裡等一下！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！？」
2278 = "「嗯！？」" 

# 【日々姫】
# display as 日日姬
# JP: 「くぼやさーん！　いますー？」
2585 = "「窪谷大叔！在嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あぁ」
2235 = "「喔」" 

# monologue
