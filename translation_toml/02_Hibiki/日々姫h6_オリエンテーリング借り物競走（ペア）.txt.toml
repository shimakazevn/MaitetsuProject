# JP: 「理由は？」
2552 = "「理由是？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「借り物部分だ。全くロス無くクリアーできた。\nそれは、全て日々姫のおかげだ」
2000 = "「借物的環節，我們沒浪費一點時間就完成了。這都是日日姬的功勞」" 

# 【日々姫】
# display as 日日姬
# JP: 「え！？　わ、わたし！？」
2148 = "「哎！？我、我嗎！？」" 

# monologue
# JP: ベッドの上で、日々姫がわたわた座り直す。
