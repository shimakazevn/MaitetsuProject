# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
2095 = "「呃！」" 

# 【日々姫】
# display as 日日姬
# JP: 「はぁっ！　はぁっ！　はぁっ！　はぁっ！」
2118 = "「呼！呼！呼！呼！」" 

