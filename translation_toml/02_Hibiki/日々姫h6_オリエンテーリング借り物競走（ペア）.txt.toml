3251 = "所以我們跑得很快，我都喘不上氣來了，邁腿也越來越吃力。我從來沒有跑這麼快、跑這麼多過。" 

# monologue
# JP: （だが――だからこそ、勝とう、日々姫）
3693 = "（但是――正因如此，我們一定要贏啊，日日姬）" 

# monologue
# JP: 日々姫のホーム。日々姫の味方がいくらだっている、\n僕らの町で――御一夜で。
3039 = "在這日日姬的家鄉，在這個日日姬的伙伴們生活的地方，在我們的小鎮――御一夜。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃ――にっ！」
# 2724 = "「阿哥！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
# 2271 = "「嗯！」" 

# monologue
# JP: レールショップが見えてくる。\nゴールテープが張られてる。
