2916 = "Một giọt nước rơi bộp xuống quy đầu. Ngay cả kích thích đó thôi cũng suýt chút nữa khiến tôi xuất tinh."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫――いくぞ？」
2468 = "「Hibiki――anh vào nhé?」"
