3709 = "（Chạm......chụt）"
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ――あっ、あつい、あついよぉ」
2111 = "「Phù――a, nóng quá, nóng quá đi」"
# monologue
# JP: 軽く当たれば、膣口の方から吸い付いてくる。\nぐしょぐしょに潤い、ぬかるんでいる。
3628 = "Chỉ cần chạm nhẹ, cửa mình liền tự động hút chặt lấy. Nó đã ướt đẫm và trơn trượt."
# monologue
# JP: これなら、日々姫のいまだ生硬で未熟な膣でも――
3598 = "Nếu vậy, dù cho âm đạo của Hibiki vẫn còn cứng nhắc và non nớt――"
