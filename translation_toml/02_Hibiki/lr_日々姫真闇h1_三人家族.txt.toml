# monologue
# JP: ――日々姫ルートアナザー――
1032 = "――Hibiki Route Another――"

# 【双鉄】
# display as 雙鐵
# JP: 「う……む――」
1514 = "「Ư……m――」"

# 【日々姫】
# display as 日日姬
# JP: 「どぎゃんしたと？　にぃに。目ば泳いどるけど」
1816 = "「Sao vậy? Anh hai. Mắt anh cứ đảo đi đâu\nthế.」"

# 【真闇】
# display as 真闇
# JP: 「……双ちゃん、やっぱり――\nおねえちゃん、双ちゃんとひーちゃんに迷惑ば」
1076 = "「……Sou-chan, quả nhiên――\nChị lại làm phiền\nSou-chan và Hii-chan rồi.」"

# 【日々姫】
# display as 雙鐵＆日日姬
# JP: 「迷惑などとっ！！」\n「そぎゃんこつっ！！」
1673 = "「Làm phiền gì chứ!!」\n「Không có chuyện đó\nđâu!!」"

# 【真闇】
# display as 真闇
# JP: 「きゃっ！？」
1452 = "「Kya!?」"

# monologue
# JP: 日々姫とふたり大きな声を重ねてしまい、\nあがった悲鳴に視線を思わ……ず――向け、て…………
1974 = "Tôi và Hibiki đồng thanh hét lớn,\nvà ánh\nmắt tôi bất giác…… hướng về――tiếng hét\nđó…………"

# 【双鉄】
# display as 雙鐵
# JP: 「（ごくっ）」
1826 = "「（Ực）」"

# monologue
# JP: おっぱい。日々姫と真闇姉との、水着のおっぱい。\n面積がごく小さいゆえに、ほとんど裸と変わらぬほどの。
2216 = "Ngực. Bộ ngực trong bộ đồ bơi của Hibiki\nvà chị Mayami.\nDiện tích vải quá nhỏ nên\ngần như chẳng khác gì đang khỏa thân."

# 【真闇】
# display as 真闇
# JP: 「ぁ……」
1533 = "「A……」"

# monologue
# JP: 日々姫に水着選びを任せたものを、試着し、見せ合う。\nただそれだけの流れがいまや、氾濫寸前までに来ている。
2232 = "Để Hibiki chọn đồ bơi, rồi mặc thử và cho\nnhau xem.\nChỉ là một chuỗi hành động đơn\ngiản, nhưng giờ đây lại sắp vượt khỏi tầm\nkiểm soát."

# 【双鉄】
# display as 雙鐵
# JP: 「どうして、日々姫は――こんな水着を……」
1741 = "「Tại sao, Hibiki lại――chọn bộ đồ bơi thế\nnày……」"

# 【日々姫】
# display as 日日姬
# JP: 「『こうなった方がいいのかな』って、思うたけん。\n私はもちろん。きっとにぃににも――ねぇねぇにも」
1616 = "「Vì em nghĩ 'như thế này sẽ tốt hơn'.\nKhông chỉ với em. Chắc chắn với cả anh\nhai――và chị hai nữa.」"

# 【真闇】
# display as 真闇
# JP: 「っ！」
1552 = "「っ!」"

# monologue
# JP: 真闇姉が鋭く息を呑む。まじまじ日々姫の顔を見つめる。\n日々姫はふわりと微笑んで――
2205 = "Chị Mayami hít một hơi thật sâu. Nhìn chằm\nchằm vào mặt Hibiki.\nHibiki mỉm cười dịu\ndàng――"

# 【日々姫】
# display as 日日姬
# JP: 「あんね、ねぇね。迷惑なんてことちょっともなかとよ？\nだってにぃにも、こぎゃん食い入るような視線で」
1781 = "「Chị hai này. Không có chuyện làm phiền gì\nđâu nhé?\nBởi vì anh hai cũng đang nhìn\nchằm chằm như muốn ăn tươi nuốt sống thế\nkia mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1562 = "「っ!!!」"

# 【日々姫】
# display as 日日姬
# JP: 「ダメっ、にぃに！　目ばそらさんでっ」
1386 = "「Không được, anh hai! Đừng quay đi chỗ\nkhác.」"

# monologue
# JP: 切羽詰まったするどい声に、体も思考も釘付けられる。\nそこに静かに――穏やかな声が染み込んでくる。
1929 = "Giọng nói sắc bén đầy khẩn thiết khiến cả\ncơ thể lẫn tâm trí tôi như bị đóng đinh.\nSau đó, một giọng nói nhẹ nhàng――điềm tĩnh\nvang lên."

# 【日々姫】
# display as 日日姬
# JP: 「そうして、ね？　わたしのおっぱいも――\nねぇねのと、おんなじくらい、ちゃんと見て？」
1760 = "「Rồi, anh biết không? Ngực của em cũng――\nnhìn cho kỹ vào, giống như nhìn của chị\nhai vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは、無論だ」
1808 = "「Đó là, điều hiển nhiên rồi.」"

# monologue
# JP: 日々姫の声に頷いている。全力で。\n途端鼓膜はもう一度、ひどく甘やかに震わせられる。
2214 = "Tôi gật đầu trước lời của Hibiki. Bằng tất\ncả sức lực.\nNgay lập tức, màng nhĩ tôi lại\nrung lên bởi một âm thanh vô cùng ngọt\nngào."

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんも、ね？　ひーちゃんがそれでよかなら」
1628 = "「Cả chị nữa, nhé? Nếu Hii-chan thấy thế là\nổn.」"

# monologue
# JP: 言葉が止まる。日々姫が頷く。\nほーっと安心したような息。そこに、密やかな声が乗る。
2233 = "Lời nói ngừng lại. Hibiki gật đầu.\nMột\ntiếng thở dài nhẹ nhõm. Theo sau đó là một\ngiọng nói thì thầm."

# 【真闇】
# display as 真闇
# JP: 「おっぱいのことも。おねーちゃんのことも。\n――ひーちゃんとおんなじくらい、見て……ほしかと」
1493 = "「Cả ngực nữa. Cả chị nữa.\n――Chị cũng muốn\nem nhìn…… nhiều như nhìn Hii-chan vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……うん」
1070 = "「……Vâng.」"

# monologue
# JP: ゆえに見る。日々姫と真闇姉――僕の大切な義妹と義姉との、\nおんなじ色で、形の違う、おっぱいを。
2005 = "Thế nên tôi nhìn. Nhìn bộ ngực của Hibiki\nvà chị Mayami――của cô em gái và người chị\nnuôi quan trọng của tôi,\ncùng một màu sắc,\nnhưng lại có hình dáng khác nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1062 = "「…………」"

# monologue
# JP: 興奮しすぎて喉が乾く。汗がぶわぶわ吹き出してくる。\n真闇姉の体臭は、日々姫同様甘やかなのだと今さらに知る。
2128 = "Hưng phấn quá mức khiến cổ họng tôi khô\nkhốc. Mồ hôi vã ra như tắm.\nĐến tận bây\ngiờ tôi mới biết, mùi hương cơ thể của chị\nMayami cũng ngọt ngào giống như Hibiki."

# 【真闇】
# display as 真闇
# JP: 「あっ――」
1526 = "「A――」"

# 【日々姫】
# display as 日日姬
# JP: 「うん。ね。にぃにぃのおちんちん、\n膨らんで――勃起、してきとるとね」
1592 = "「Vâng. Này. Chim của anh hai,\nđang phồng\nlên――đang cương cứng kìa.」"

# 【真闇】
# display as 真闇
# JP: 「ぁっ。ひー、ちゃん」
1544 = "「A. Hii, chan.」"

# monologue
# JP: 日々姫が踏み込む。さっき言ってた――僕らが瞬時に、\n暗黙のうちに理解した――『こうなった方』の内側に。
2075 = "Hibiki tiến tới. Như những gì em ấy vừa\nnói――và chúng tôi đã ngay lập tức\nhiểu\nngầm với nhau――bước vào bên trong 'như thế\nnày sẽ tốt hơn'."

# 【日々姫】
# display as 日日姬
# JP: 「にぃにの、ね？　勃起して射精したくてビクビクしてる。\n水着ごしでも、ねぇねもはっきり、わかるとでしょお」
1814 = "「Của anh hai, này? Đang giật giật vì cương\ncứng và muốn xuất tinh đấy.\nDù qua lớp đồ\nbơi, chị hai cũng nhìn rõ ràng mà đúng\nkhông.」"

# 【真闇】
# display as 真闇
# JP: 「……双ちゃんの……お、ちんちん、の――気持ち、\nうちには、わからんばってん――ビクビクは、見えると」
1075 = "「……Chị không hiểu…… cảm giác, của chim……\nSou-chan\nnhưng mà――chị có thể thấy nó đang\ngiật giật.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1552 = "「啊！」" 

# monologue
# JP: 日々姫がリードしてくれている。一番年下のきょうだいが。\nだからこそ――僕が、決断せねばならない。
2085 = "Hibiki đang dẫn dắt mọi chuyện. Cô em út\ntrong nhà.\nChính vì vậy――tôi phải là người\nđưa ra quyết định."

# 【双鉄】
# display as 雙鐵
# JP: 「……日々姫がこの水着を選んだ意味を。真闇姉が驚き\n戸惑いつつも着替えてくれた理由を、僕は、理解した」
1080 = "「……Ý nghĩa của việc Hibiki chọn bộ đồ bơi\nnày. Lý do chị Mayami ngạc nhiên\nvà bối\nrối nhưng vẫn thay đồ, em đã hiểu rồi.」"

# 【真闇】
# display as 真闇
# JP: 「っ！！！」
# 1562 = "「啊！！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
1595 = "「Vâng.」"

# monologue
# JP: 僕をまっすぐ見つめてくれるふたりの視線が、\nその奥底にちろちろ燃えている火が、僕の血液をも炙る。
2146 = "Ánh mắt của hai người đang nhìn thẳng vào\ntôi,\nngọn lửa âm ỉ cháy tận sâu thẳm trong\nđôi mắt ấy đang thiêu đốt cả dòng máu của\ntôi."

# 【双鉄】
# display as 雙鐵
# JP: 「僕ら――三人でのセックスを。日々姫をはじめて\n抱いたときから――セックスを知った時から、僕は」
1812 = "「Chuyện làm tình――giữa ba chúng ta. Từ lần\nđầu tiên ôm Hibiki\n――từ khi biết đến tình\ndục, anh đã」"

# monologue
# JP: ただの一度も、思い浮かべたことはなかった。\nその理由を今、肌で、匂いで、五感の全てで感じてる。
1977 = "Chưa một lần nào tôi nghĩ đến chuyện đó.\nLý do tại sao, giờ đây tôi đang cảm nhận\nbằng làn da, bằng mùi hương, bằng tất cả\ncác giác quan của mình."

# 【双鉄】
# display as 雙鐵
# JP: 「決して望んではいけないことと、こころに蓋をしていた。\nけれど、もし、三人ともが同じ望みをもっているのなら」
1703 = "「Anh đã đóng chặt trái tim mình, coi đó là\nđiều tuyệt đối không được khao khát.\nNhưng, nếu như, cả ba chúng ta đều có\nchung một ước muốn.」"

# 【日々姫】
# display as 日日姬
# JP: 「私っ！　私は望んどると！　……っ。――――ん！！」
1712 = "「Em! Em khao khát điều đó! ……っ. ――――Ưm!!」"

# monologue
# JP: （ぷるんっ！！！）
2422 = "（Nảy lên!!!）"

# 【真闇】
# display as 真闇
# JP: 「あっ！」
# 1552 = "「啊！」" 

# monologue
# JP: 日々姫が水着をずらしてくれる。\nかわいい胸を、僕に――真闇姉に、晒してくれる。
2094 = "Hibiki kéo lệch bộ đồ bơi.\nPhơi bày bộ\nngực dễ thương cho tôi――và cho cả chị\nMayami xem."

# 【真闇】
# display as 真闇
# JP: 「ぁ…………」
# 1533 = "「啊……」" 

# monologue
# JP: 見せられている真闇姉の呼吸が荒くなる。顔が、肌が、\nみるみるうちに紅潮していく。汗ばんでいく。
2199 = "Nhìn thấy cảnh đó, hơi thở của chị Mayami\ntrở nên gấp gáp. Khuôn mặt, làn da,\nnhanh\nchóng đỏ ửng lên. Mồ hôi lấm tấm."

# 【真闇】
# display as 真闇
# JP: 「…………。…………。…………（ごくっ）――。\n……おねぇ……ちゃん、も………………ね？…………っ」
1061 = "「…………。…………。…………（Ực）――。\n……Chị……cũng………………nhé?…………っ」"

# monologue
# JP: （ばるんっ！）
2425 = "（Nảy mạnh!）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1563 = "「っ!!!!」"

# monologue
# JP: 真闇姉の、おっぱい、乳首だ――全身がかあっと熱くな。
2189 = "Ngực của chị Mayami, đầu vú của chị\nấy――Toàn thân tôi nóng bừng lên."

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！！」
1525 = "「っ!!!!!!!」"

