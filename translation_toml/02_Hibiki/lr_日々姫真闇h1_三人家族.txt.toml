# lines: 482 
# monologue
# JP: ――日々姫ルートアナザー――
1032 = "――Hibiki Route Another――"
# 【双鉄】
# display as 雙鐵
# JP: 「う……む――」
1514 = "「Ư……m――」"
# 【日々姫】
# display as 日日姬
# JP: 「どぎゃんしたと？　にぃに。目ば泳いどるけど」
1816 = "「Sao vậy? Anh hai. Mắt anh cứ đảo đi đâu thế.」"
# 【真闇】
# display as 真闇
# JP: 「……双ちゃん、やっぱり――\nおねえちゃん、双ちゃんとひーちゃんに迷惑ば」
1076 = "「……Sou-chan, quả nhiên―― Chị lại làm phiền Sou-chan và Hii-chan rồi.」"
# 【日々姫】
# display as 雙鐵＆日日姬
# JP: 「迷惑などとっ！！」\n「そぎゃんこつっ！！」
1673 = "「Làm phiền gì chứ!!」\n「Không có chuyện đó đâu!!」"
# 【真闇】
# display as 真闇
# JP: 「きゃっ！？」
1452 = "「Kya!?」"
# monologue
# JP: 日々姫とふたり大きな声を重ねてしまい、\nあがった悲鳴に視線を思わ……ず――向け、て…………
1974 = "Tôi và Hibiki đồng thanh hét lớn, và ánh mắt tôi bất giác…… hướng về――tiếng hét đó…………"
# 【双鉄】
# display as 雙鐵
# JP: 「（ごくっ）」
1826 = "「（Ực）」"
# monologue
# JP: おっぱい。日々姫と真闇姉との、水着のおっぱい。\n面積がごく小さいゆえに、ほとんど裸と変わらぬほどの。
2216 = "Ngực. Bộ ngực trong bộ đồ bơi của Hibiki và chị Mayami. Diện tích vải quá nhỏ nên gần như chẳng khác gì đang khỏa thân."
# 【真闇】
# display as 真闇
# JP: 「ぁ……」
1533 = "「A……」"
# monologue
# JP: 日々姫に水着選びを任せたものを、試着し、見せ合う。\nただそれだけの流れがいまや、氾濫寸前までに来ている。
2232 = "Để Hibiki chọn đồ bơi, rồi mặc thử và cho nhau xem. Chỉ là một chuỗi hành động đơn giản, nhưng giờ đây lại sắp vượt khỏi tầm kiểm soát."
# 【双鉄】
# display as 雙鐵
# JP: 「どうして、日々姫は――こんな水着を……」
1741 = "「Tại sao, Hibiki lại――chọn bộ đồ bơi thế này……」"
# 【日々姫】
# display as 日日姬
# JP: 「『こうなった方がいいのかな』って、思うたけん。\n私はもちろん。きっとにぃににも――ねぇねぇにも」
1616 = "「Vì em nghĩ 'như thế này sẽ tốt hơn'. Không chỉ với em. Chắc chắn với cả anh hai――và chị hai nữa.」"
# 【真闇】
# display as 真闇
# JP: 「っ！」
1552 = "「っ!」"
# monologue
# JP: 真闇姉が鋭く息を呑む。まじまじ日々姫の顔を見つめる。\n日々姫はふわりと微笑んで――
2205 = "Chị Mayami hít một hơi thật sâu. Nhìn chằm chằm vào mặt Hibiki. Hibiki mỉm cười dịu dàng――"
# 【日々姫】
# display as 日日姬
# JP: 「あんね、ねぇね。迷惑なんてことちょっともなかとよ？\nだってにぃにも、こぎゃん食い入るような視線で」
1781 = "「Chị hai này. Không có chuyện làm phiền gì đâu nhé? Bởi vì anh hai cũng đang nhìn chằm chằm như muốn ăn tươi nuốt sống thế kia mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1562 = "「っ!!!」"
# 【日々姫】
# display as 日日姬
# JP: 「ダメっ、にぃに！　目ばそらさんでっ」
1386 = "「Không được, anh hai! Đừng quay đi chỗ khác.」"
# monologue
# JP: 切羽詰まったするどい声に、体も思考も釘付けられる。\nそこに静かに――穏やかな声が染み込んでくる。
1929 = "Giọng nói sắc bén đầy khẩn thiết khiến cả cơ thể lẫn tâm trí tôi như bị đóng đinh. Sau đó, một giọng nói nhẹ nhàng――điềm tĩnh vang lên."
# 【日々姫】
# display as 日日姬
# JP: 「そうして、ね？　わたしのおっぱいも――\nねぇねのと、おんなじくらい、ちゃんと見て？」
1760 = "「Rồi, anh biết không? Ngực của em cũng―― nhìn cho kỹ vào, giống như nhìn của chị hai vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、無論だ」
1808 = "「Đó là, điều hiển nhiên rồi.」"
# monologue
# JP: 日々姫の声に頷いている。全力で。\n途端鼓膜はもう一度、ひどく甘やかに震わせられる。
2214 = "Tôi gật đầu trước lời của Hibiki. Bằng tất cả sức lực. Ngay lập tức, màng nhĩ tôi lại rung lên bởi một âm thanh vô cùng ngọt ngào."
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんも、ね？　ひーちゃんがそれでよかなら」
1628 = "「Cả chị nữa, nhé? Nếu Hii-chan thấy thế là ổn.」"
# monologue
# JP: 言葉が止まる。日々姫が頷く。\nほーっと安心したような息。そこに、密やかな声が乗る。
2233 = "Lời nói ngừng lại. Hibiki gật đầu. Một tiếng thở dài nhẹ nhõm. Theo sau đó là một giọng nói thì thầm."
# 【真闇】
# display as 真闇
# JP: 「おっぱいのことも。おねーちゃんのことも。\n――ひーちゃんとおんなじくらい、見て……ほしかと」
1493 = "「Cả ngực nữa. Cả chị nữa. ――Chị cũng muốn em nhìn…… nhiều như nhìn Hii-chan vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……うん」
1070 = "「……Vâng.」"
# monologue
# JP: ゆえに見る。日々姫と真闇姉――僕の大切な義妹と義姉との、\nおんなじ色で、形の違う、おっぱいを。
2005 = "Thế nên tôi nhìn. Nhìn bộ ngực của Hibiki và chị Mayami――của cô em gái và người chị nuôi quan trọng của tôi, cùng một màu sắc, nhưng lại có hình dáng khác nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1062 = "「…………」"
# monologue
# JP: 興奮しすぎて喉が乾く。汗がぶわぶわ吹き出してくる。\n真闇姉の体臭は、日々姫同様甘やかなのだと今さらに知る。
2128 = "Hưng phấn quá mức khiến cổ họng tôi khô khốc. Mồ hôi vã ra như tắm. Đến tận bây giờ tôi mới biết, mùi hương cơ thể của chị Mayami cũng ngọt ngào giống như Hibiki."
# 【真闇】
# display as 真闇
# JP: 「あっ――」
1526 = "「A――」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。ね。にぃにぃのおちんちん、\n膨らんで――勃起、してきとるとね」
1592 = "「Vâng. Này. Chim của anh hai, đang phồng lên――đang cương cứng kìa.」"
# 【真闇】
# display as 真闇
# JP: 「ぁっ。ひー、ちゃん」
1544 = "「A. Hii, chan.」"
# monologue
# JP: 日々姫が踏み込む。さっき言ってた――僕らが瞬時に、\n暗黙のうちに理解した――『こうなった方』の内側に。
2075 = "Hibiki tiến tới. Như những gì em ấy vừa nói――và chúng tôi đã ngay lập tức hiểu ngầm với nhau――bước vào bên trong 'như thế này sẽ tốt hơn'."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにの、ね？　勃起して射精したくてビクビクしてる。\n水着ごしでも、ねぇねもはっきり、わかるとでしょお」
1814 = "「Của anh hai, này? Đang giật giật vì cương cứng và muốn xuất tinh đấy. Dù qua lớp đồ bơi, chị hai cũng nhìn rõ ràng mà đúng không.」"
# 【真闇】
# display as 真闇
# JP: 「……双ちゃんの……お、ちんちん、の――気持ち、\nうちには、わからんばってん――ビクビクは、見えると」
1075 = "「……Chị không hiểu…… cảm giác, của chim…… Sou-chan nhưng mà――chị có thể thấy nó đang giật giật.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1552 = "「啊！」" 
# monologue
# JP: 日々姫がリードしてくれている。一番年下のきょうだいが。\nだからこそ――僕が、決断せねばならない。
2085 = "Hibiki đang dẫn dắt mọi chuyện. Cô em út trong nhà. Chính vì vậy――tôi phải là người đưa ra quyết định."
# 【双鉄】
# display as 雙鐵
# JP: 「……日々姫がこの水着を選んだ意味を。真闇姉が驚き\n戸惑いつつも着替えてくれた理由を、僕は、理解した」
1080 = "「……Ý nghĩa của việc Hibiki chọn bộ đồ bơi này. Lý do chị Mayami ngạc nhiên và bối rối nhưng vẫn thay đồ, em đã hiểu rồi.」"
# 【真闇】
# display as 真闇
# JP: 「っ！！！」
# 1562 = "「啊！！！」" 
# 【日々姫】
# display as 日日姬
# JP: 「うん」
1595 = "「Vâng.」"
# monologue
# JP: 僕をまっすぐ見つめてくれるふたりの視線が、\nその奥底にちろちろ燃えている火が、僕の血液をも炙る。
2146 = "Ánh mắt của hai người đang nhìn thẳng vào tôi, ngọn lửa âm ỉ cháy tận sâu thẳm trong đôi mắt ấy đang thiêu đốt cả dòng máu của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕ら――三人でのセックスを。日々姫をはじめて\n抱いたときから――セックスを知った時から、僕は」
1812 = "「Chuyện làm tình――giữa ba chúng ta. Từ lần đầu tiên ôm Hibiki ――từ khi biết đến tình dục, anh đã」"
# monologue
# JP: ただの一度も、思い浮かべたことはなかった。\nその理由を今、肌で、匂いで、五感の全てで感じてる。
1977 = "Chưa một lần nào tôi nghĩ đến chuyện đó. Lý do tại sao, giờ đây tôi đang cảm nhận bằng làn da, bằng mùi hương, bằng tất cả các giác quan của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「決して望んではいけないことと、こころに蓋をしていた。\nけれど、もし、三人ともが同じ望みをもっているのなら」
1703 = "「Anh đã đóng chặt trái tim mình, coi đó là điều tuyệt đối không được khao khát. Nhưng, nếu như, cả ba chúng ta đều có chung một ước muốn.」"
# 【日々姫】
# display as 日日姬
# JP: 「私っ！　私は望んどると！　……っ。――――ん！！」
1712 = "「Em! Em khao khát điều đó! ……っ. ――――Ưm!!」"
# monologue
# JP: （ぷるんっ！！！）
2422 = "（Nảy lên!!!）"
# 【真闇】
# display as 真闇
# JP: 「あっ！」
# 1552 = "「啊！」" 
# monologue
# JP: 日々姫が水着をずらしてくれる。\nかわいい胸を、僕に――真闇姉に、晒してくれる。
2094 = "Hibiki kéo lệch bộ đồ bơi. Phơi bày bộ ngực dễ thương cho tôi――và cho cả chị Mayami xem."
# 【真闇】
# display as 真闇
# JP: 「ぁ…………」
# 1533 = "「啊……」" 
# monologue
# JP: 見せられている真闇姉の呼吸が荒くなる。顔が、肌が、\nみるみるうちに紅潮していく。汗ばんでいく。
2199 = "Nhìn thấy cảnh đó, hơi thở của chị Mayami trở nên gấp gáp. Khuôn mặt, làn da, nhanh chóng đỏ ửng lên. Mồ hôi lấm tấm."
# 【真闇】
# display as 真闇
# JP: 「…………。…………。…………（ごくっ）――。\n……おねぇ……ちゃん、も………………ね？…………っ」
1061 = "「…………。…………。…………（Ực）――。\n……Chị……cũng………………nhé?…………っ」"
# monologue
# JP: （ばるんっ！）
2425 = "（Nảy mạnh!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1563 = "「っ!!!!」"
# monologue
# JP: 真闇姉の、おっぱい、乳首だ――全身がかあっと熱くな。
2189 = "Ngực của chị Mayami, đầu vú của chị ấy――Toàn thân tôi nóng bừng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！！」
1525 = "「っ!!!!!!!」"
# 【日々姫】
# display as 日日姬＆真闇
# JP: 「あっ！」\n「っ！！！！！」
1553 = "「A!」\n「っ!!!!!」"
# monologue
# JP: （むぢゅうううううううううっっっっっっっっっ！！）
2459 = "（Áp chặtttttttttt!!）"
# 【日々姫】
# display as 日日姬
# JP: 「わっ」
1494 = "「Wa」"
# 【真闇】
# display as 真闇
# JP: 「っ！？　っ！？　っ！？　っ！！？」
1508 = "「っ!? っ!? っ!? っ!!?」"
# monologue
# JP: 水着を脱ぎ捨て突き立てている。大事な義姉と義妹が、\n裸のおっぱいを合わせつくった、淫猥すぎるその空隙に。
2003 = "Tôi cởi phăng đồ bơi và đâm mạnh vào. Vào khe hở vô cùng dâm đãng được tạo ra khi cô em gái và người chị nuôi quan trọng của tôi ép chặt hai bộ ngực trần vào nhau."
# 【日々姫】
# display as 日日姬
# JP: 「んっ！」
1602 = "「Ưm!」"
# monologue
# JP: （みちゅっ！！！）
2451 = "（Mút chặt!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ！！」
1480 = "「Fua!!」"
# monologue
# JP: すぐに日々姫が応えてくれる。真闇姉へと体を押し出し、\n乳房同士がつぶしあい産まれる密着感を高めてくれる。
2120 = "Hibiki lập tức đáp lại. Ép sát cơ thể vào chị Mayami, làm tăng thêm cảm giác áp sát khi hai bầu ngực ép chặt vào nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「くっ――あっ！　あっ！　あっ！！！」
1513 = "「Ư――a! A! A!!!」"
# monologue
# JP: （ずりゅっ！　ずりっ！　むにゅっ――ずりっっ――）
2462 = "（Trơn tuột! Trơn tuột! Mềm mại――Trơn tuột――）"
# 【真闇】
# display as 真闇
# JP: 「ふぁっ――ぁ……双ちゃん――そうちゃんの……\n（ごくっ）――こぎゃん、あつ、くて――がちがち、で」
1476 = "「Fua――a…… Sou-chan――của Sou-chan…… （Ực）――nóng, thế này――cứng ngắc, thế này.」"
# monologue
# JP: 日々姫の、真闇姉の乳首が勃ってる。\n僕の勃起にこすられるたび、ぷりゅぷりゅ踊り逃げていく。
2081 = "Đầu vú của Hibiki và chị Mayami đều đang cương lên. Mỗi lần cọ xát vào phần cương cứng của tôi, chúng lại nảy lên như đang nhảy múa."
# monologue
# JP: (ずりゅっ！　ずりっ！　こりゅっ！　ずむゅっ！！！）
36 = "(Trơn tuột! Trơn tuột! Cọ xát! Trơn tuột!!!)"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は――僕は――僕は、僕はっ！！！！」
1679 = "「Em――em――em, em!!!!」"
# monologue
# JP: 引き取られた頃、こころが完全に死んでたころを思い出す。\n真闇姉に風呂に入れられ、それを拒んでしまったことを。
1983 = "Tôi nhớ lại hồi mới được nhận nuôi, khi trái tim tôi đã hoàn toàn chết lặng. Khi chị Mayami định tắm cho tôi, nhưng tôi đã từ chối."
# monologue
# JP: （こりゅっ！　むにゅっ！　こしゅっ！　ずりゅんっ！）
2461 = "（Cọ xát! Mềm mại! Cọ xát! Trơn tuột!）"
# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　んっ――ふっ――あっ！　にぃに、激しっ」
1455 = "「Ya!? Ưm――fu――a! Anh hai, mãnh liệt quá.」"
# 【真闇】
# display as 真闇
# JP: 「は……ぁ……そう、ちゃん――ひー、ちゃんっ――っ」
1496 = "「Hà…… a…… Sou, chan――Hii, chan――」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕はっずっと、この欲望をっ、絶対の禁忌と考えていた。\n日々姫と結ばれてからはもちろん、その以前からずっと」
1683 = "「Em đã luôn, coi dục vọng này, là điều tuyệt đối cấm kỵ. Từ sau khi kết đôi với Hibiki thì đương nhiên rồi, nhưng ngay cả trước đó cũng vậy.」"
# 【真闇】
# display as 真闇
# JP: 「ぁっ――」
# 1526 = "「啊——」" 
# monologue
# JP: （みゅにゅっ！！！）
2415 = "（Ép chặt!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「んくっっ！！！！」
1596 = "「Nku!!!!」"
# monologue
# JP: 真闇姉が、真闇姉の方から動いて、おっぱい、乳首を、\nいっそう強く僕の勃起に、日々姫の胸に押し付けてくれる。
2179 = "Chị Mayami, chủ động di chuyển, ép chặt ngực, đầu vú, vào phần cương cứng của tôi, vào ngực của Hibiki mạnh mẽ hơn nữa."
# monologue
# JP: （ずりゅ！　むんにゅっ！！　ずりゅん！　こしゅう！）
2465 = "（Trơn tuột! Ép chặt!! Trơn tuột! Cọ xát!）"
# monologue
# JP: 乳首を、胸を、おっぱいを――真闇姉のことを、穢してる。\n罪悪感がぐるりと変わる。僕は日々姫と、日々姫とふたり。
1986 = "Làm vấy bẩn đầu vú, ngực, bầu vú――làm vấy bẩn chị Mayami. Cảm giác tội lỗi xoay vần. Tôi cùng với Hibiki, hai người cùng với Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「絶対の禁忌とこころを閉ざしていたのは、つまりっ――\n僕が、それだけ、強く望んでしまっていた、から、で」
1706 = "「Việc em đóng chặt trái tim và coi đó là điều cấm kỵ tuyệt đối, có nghĩa là―― Bởi vì, em đã, khao khát nó, quá mãnh liệt.」"
# monologue
# JP: ――日々姫とふたり、一緒になって、真闇姉を抱いている。\nその実感に、日々姫も言葉をかさねてくれる。
1035 = "――Cùng với Hibiki, hai chúng tôi, đang ôm lấy chị Mayami. Trong cảm giác chân thực đó, Hibiki cũng tiếp lời tôi."
# 【日々姫】
# display as 日日姬
# JP: 「わたしも。気づいとったけん。やけん――怖くて――\nにぃにとねぇねが結ばれちゃったら――私、一人にっ」
1684 = "「Em cũng vậy. Em đã nhận ra. Nên――em sợ―― Nếu anh hai và chị hai đến với nhau――em sẽ, chỉ còn một mình.」"
# 【真闇】
# display as 真闇
# JP: 「っ！！！！」
# 1563 = "「啊！！！！」" 
# monologue
# JP: （ふっ――ぐっ！！！！　むにゅんっ！！！）
2483 = "（Fu――Gu!!!! Mềm mại!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！」
# 1552 = "「啊！」" 
# monologue
# JP: 真闇姉のおっぱいが離れかけ、けれど日々姫がすぐさまに\n健気なおっぱいを真闇姉へとより強く早く押し付け返す。
2191 = "Bầu ngực của chị Mayami hơi tách ra, nhưng Hibiki ngay lập tức ép bộ ngực dũng cảm của mình vào chị Mayami mạnh mẽ và nhanh chóng hơn."
# 【日々姫】
# display as 日日姬
# JP: 「おいてけぼりに、されちゃうんじゃないかって、怖くて。\nけど――気づいたら――逆にねぇねを、一人ぼっちに」
1698 = "「Sợ rằng, mình sẽ bị bỏ lại phía sau. Nhưng――khi nhận ra――thì ngược lại, chị hai mới là người cô đơn.」"
# 【真闇】
# display as 真闇
# JP: 「――ひーちゃん。双ちゃん」
1048 = "「――Hii-chan. Sou-chan.」"
# monologue
# JP: （ぎゅううううっ！！）
2452 = "（Ép chặtttt!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！」
# 1552 = "「啊！」" 
# monologue
# JP: 真闇姉が思いきり日々姫へ、自分のおっぱいを押し付ける。\n経験の無いまろやかすぎる密度をもった狭隘に、声が出る。
2197 = "Chị Mayami dùng hết sức ép ngực mình vào Hibiki. Khe hẹp với độ đặc quánh mềm mại chưa từng trải nghiệm khiến tôi bật ra tiếng rên."
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんもね？　ずっと、ずうっと。怖かったと。\nおねえちゃんが、もしも欲望を――表に……出したら」
1631 = "「Chị cũng vậy, biết không? Từ rất, rất lâu rồi. Chị đã rất sợ. Nếu như chị――thể hiện…… dục vọng của mình ra ngoài.」"
# monologue
# JP: （ぎゅっ！　ぎゅううっ！　むにゅっ！　ぎゅうううっ）
# 2465 = "（蹭來！蹭去！！擠來！擠去！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1561 = "「っ!!」"
# monologue
# JP: 真闇姉が、積極的に胸を潰してまたゆるめる。肉体的な\n刺激は弱いが、真闇姉が望んでくれての行為と思えば――
2202 = "Chị Mayami chủ động ép xẹp ngực rồi lại thả lỏng. Dù kích thích thể xác hơi yếu, nhưng nghĩ đến việc đây là hành động mà chị Mayami mong muốn――"
# 【真闇】
# display as 真闇
# JP: 「ひーちゃんと――ンッ――双、ちゃん、の――大事なっ、\n絆、ば――ゆるめて――しまい――そうで、怖、くてっ」
1796 = "「Sẽ làm――ưm――mối liên kết, quan trọng――của Hii-chan, và―― Sou, chan――lỏng lẻo――mất――nên chị, sợ lắm.」"
# 【日々姫】
# display as 日日姬
# JP: 「昔――っん！　昔、だったら――前まで、だったら」
1802 = "「Ngày xưa――ưm! Nếu là ngày xưa――nếu là trước đây.」"
# monologue
# JP: 上ずってしまった声を一度飲み込み、言い直す。日々姫も\n僕と同様――真闇姉とするセックスに、舞い上がってる。
2213 = "Nuốt lại giọng nói đã lạc đi, rồi nói lại. Hibiki cũng giống như tôi――đang vô cùng hưng phấn với việc làm tình cùng chị Mayami."
# 【日々姫】
# display as 日日姬
# JP: 「実際――きっと――そぎゃん、こつ――なっちゃってた、\nかも、しれん――ばってん――ん――ね？　にぃ、に？」
1645 = "「Thực tế――chắc chắn――có lẽ――sẽ thành ra, như vậy――nhưng mà――ưm――nhỉ? Anh, hai?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1746 = "「Ừ.」"
# monologue
# JP: （にゅぶっ――ずりゅっ――ごしゅ――ずりゅん）
# 2465 = "（蹭來！蹭去！！擠來！擠去！）" 
# monologue
# JP: 姉妹の思いが、呼吸が一致し始めている。\nその中央に、僕がいる――ただひたすらに――幸せで。
1946 = "Suy nghĩ và nhịp thở của hai chị em đang bắt đầu đồng điệu. Ở chính giữa họ, là tôi――chỉ đơn giản là――cảm thấy hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「僕と、日々姫は――いくつものいくつもの昼と夜、\nこころを、時間を、肌を重ねて――絆を、深めて、きた」
1694 = "「Anh và, Hibiki――đã trải qua biết bao ngày đêm, cùng nhau chia sẻ tâm hồn, thời gian, thể xác――để thắt chặt, mối quan hệ.」"
# monologue
# JP: 体は強く、猛烈に、初めて抱く真闇姉へと惹かれてる。、\nこの状況でも僕のこころのど真ん中には、日々姫だけだ。
2219 = "Cơ thể tôi bị thu hút mạnh mẽ, mãnh liệt bởi chị Mayami, người tôi ôm lần đầu tiên. Nhưng dù trong hoàn cảnh này, giữa trung tâm trái tim tôi, vẫn chỉ có mình Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「この先例えば何かがあって、日々姫が僕を嫌うとしても\n憎むとしても――僕は、日々姫を愛し続ける。絶対に」
1758 = "「Ví dụ như sau này có chuyện gì xảy ra, dù Hibiki có ghét anh, có hận anh đi chăng nữa――anh vẫn sẽ tiếp tục yêu Hibiki. Tuyệt đối là vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「わたしもっ、わたしもおんなじ――気持ち――\nやけんっ！　んっ！　やけん、ね？」
1691 = "「Em cũng, em cũng có cùng――cảm giác―― Nhưng mà! Ưm! Nhưng mà, này?」"
# monologue
# JP: 日々姫がふっと、動きをとめる。\nおんなじいろの瞳へと、包み込むような視線を注ぐ。
2107 = "Hibiki đột nhiên dừng cử động. Trao ánh nhìn như bao bọc lấy đôi mắt cùng màu với mình."
# 【日々姫】
# display as 日日姬
# JP: 「やけん、ね？　ねぇねぇ。私、もう、死にもの狂いで、\n必死になって、にぃにのこと、独り占めしなくても」
1715 = "「Cho nên, chị hai này. Em, không cần phải điên cuồng, tuyệt vọng, độc chiếm anh hai nữa đâu.」"
# 【真闇】
# display as 真闇
# JP: 「あ……」
# 1533 = "「啊……」" 
# 【日々姫】
# display as 日日姬
# JP: 「ん…………」
1580 = "「Ưm…………」"
# monologue
# JP: 日々姫が唾液を垂らしてくれる。４つの乳房に支えられる、\n僕の亀頭の先端に――恐らくは、キスの代わりに。
1993 = "Hibiki nhỏ nước bọt xuống. Lên đầu quy đầu của tôi, đang được nâng đỡ bởi bốn bầu ngực――có lẽ, thay cho một nụ hôn."
# monologue
# JP: （ぢゅにゅるんっ！！！！）
2431 = "（Trơn tuột!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
1460 = "「Kua!」"
# monologue
# JP: そうして再び動き始める。\n潤滑を増した乳房を揉み動かして、僕の勃起を弄ぶ！
2010 = "Và rồi lại bắt đầu cử động. Nhào nặn những bầu ngực đã thêm phần trơn trượt, đùa giỡn với phần cương cứng của tôi!"
# 【日々姫】
# display as 日日姬
# JP: 「……にぃにと、私。こころとこころが、離れる、なんて\nありえないって、わかった、けん。やけん――平気、で」
1072 = "「……Anh hai và, em. Trái tim và trái tim, rời xa nhau, là điều không thể nào, em đã hiểu rồi. Nên――em ổn, mà.」"
# monologue
# JP: 日々姫がふっと、潤んだ瞳で僕を見上げる。\n頷くより前、視線は真闇姉へと戻る。
2092 = "Hibiki đột nhiên ngước nhìn tôi bằng đôi mắt ướt át. Trước khi gật đầu, ánh mắt em ấy đã quay lại phía chị Mayami."
# 【日々姫】
# display as 日日姬
# JP: 「ねぇね、が――ん――したい、こと、叶えて、くれたら。\nそれが、一番、いい形って、こころ、から、思う、けん」
1625 = "「Nếu chị hai――ưm――có thể thực hiện, điều chị muốn. Thì đó, là hình thức, tốt nhất, từ tận đáy lòng, em nghĩ vậy.」"
# 【真闇】
# display as 真闇
# JP: 「ほんならっ――ね？　ぁっ！　そし、たら、ひーちゃん。\nん…………ん～～～～～～っ」
1723 = "「Nếu vậy――nhé? A! Vậy, thì, Hii-chan.\nƯm………… ưm~~~~~~」"
# monologue
# JP: （ねとおおおぉぉぉぉぉぉぉぉっ）
2484 = "（Nhớp nhápppppppp）"
# 【日々姫】
# display as 日日姬
# JP: 「あ――ん……ぇ～～～～～～～っ」
1530 = "「A――ưm…… e~~~~~~~」"
# monologue
# JP: （とろぉぉぉぉぉぉっぉぉぉぉぉっ）
2433 = "（Sền sệtttttttttt）"
# monologue
# JP: 姉と妹、二人が同時に僕の亀頭に唾液を垂らす。\n勃起全部をぬらぬらにして、姉妹の粘液が一つに混じる。
1945 = "Chị và em, hai người đồng thời nhỏ nước bọt lên quy đầu của tôi. Làm ướt sũng toàn bộ phần cương cứng, dịch nhầy của hai chị em hòa làm một."
# 【真闇】
# display as 真闇
# JP: 「…………。…………。おねえちゃんも、して、よかと？\nひーちゃんと、双ちゃんと――三人でする、セックスば」
1060 = "「…………。…………。Chị cũng, làm, được chứ? Với Hii-chan, với Sou-chan――chuyện làm tình, ba người.」"
# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　私はよかとよ！\nね？　にぃにぃは？」
1762 = "「Tất nhiên rồi! Em đồng ý mà!\nNhỉ? Anh hai thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1746 = "「是啊」" 
# monologue
# JP: 勃起も頭もさっきからずっと白熱しきってる。\n出したいものは精液で、だからこそ必死に言葉を絞る。
1992 = "Cả phần cương cứng lẫn đầu óc tôi từ nãy đến giờ vẫn luôn nóng rực. Thứ muốn xuất ra là tinh dịch, chính vì vậy tôi phải tuyệt vọng vắt óc tìm từ ngữ."
# 【双鉄】
# display as 雙鐵
# JP: 「セックス、したい、日々姫とも、真闇姉とも、物凄く。\n今すぐにでも挿入したい、けれど、けれども。その前に」
1700 = "「Anh muốn, làm tình, với cả Hibiki, và cả chị Mayami, vô cùng muốn. Anh muốn đưa vào ngay lập tức, nhưng, nhưng mà. Trước đó.」"
# monologue
# JP: 見てしまう。僕の勃起を包んでくれてる、\n日々姫の胸を、真闇姉の、おっぱいを。
1996 = "Tôi nhìn chằm chằm. Vào bộ ngực của Hibiki, vào bầu ngực của chị Mayami, đang bao bọc lấy phần cương cứng của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「む"」
1515 = "「Mư」"
# monologue
# JP: 日々姫はときおり、思い出したように果敢にチャレンジ\nしてくれるのだが――やはり、どうにも無理なので――
2098 = "Thỉnh thoảng, như chợt nhớ ra, Hibiki lại dũng cảm thử thách bản thân, nhưng――quả nhiên, vẫn là không thể nào――"
# 【双鉄】
# display as 雙鐵
# JP: 「胸だけで。手コキやお口の助けを借りずおっぱいだけで。\n僕は未だ、一度も射精にいたれたことがない。ゆえに」
1414 = "「Chỉ bằng ngực. Không nhờ đến sự trợ giúp của tay hay miệng, chỉ bằng ngực thôi. Anh vẫn chưa, một lần nào có thể xuất tinh được. Vì vậy.」"
# monologue
# JP: （ずりゅんんんんんんんんっ！！！）
2384 = "（Trơn tuộtttttttt!!!）"
# 【真闇】
# display as 真闇＆雙鐵
# JP: 「ひーちゃんっ！！！？」\n「くはっ！」
1651 = "「Hii-chan!!!?」\n「Kuha!」"
# monologue
# JP: 強烈で甘く、しかも僕を知り尽くしてる動きの刺激。\n日々姫の両手が真闇姉の胸を抑えて寄せて動かしている。
1957 = "Một kích thích mãnh liệt, ngọt ngào, và hơn nữa là từ những chuyển động thấu hiểu tôi. Hai tay Hibiki đang giữ chặt ngực chị Mayami, ép lại gần và di chuyển."
# monologue
# JP: （むにっ！　ずりゅっ！　むにょんっ！　ずりゅんっ！
2464 = "（Mềm mại! Trơn tuột! Mềm mại! Trơn tuột!"
# 【日々姫】
# display as 日日姬
# JP: 「ごめんね？　ねぇねぇ。いきなり、おっぱい――んっ、\nばってん――こぎゃん、しないと――にぃに、きっと」
1820 = "「Xin lỗi nhé? Chị hai. Đột nhiên, lại dùng ngực――ưm, nhưng mà――nếu không làm thế này――chắc chắn, anh hai.」"
# 【真闇】
# display as 真闇
# JP: 「ぁ……んっ――ふっ――あっ！」
1534 = "「A…… ưm――fu――a!」"
# monologue
# JP: （みゅにゅっ！　ずりゅん！　むにゅっ！　みきゅっ！）
# 2465 = "（蹭來！蹭去！！擠來！擠去！）" 
# monologue
# JP: 日々姫の指に操られている自らのおっぱいの淫靡な動きを、\nその圧力に悶え喜ぶ僕の勃起を、真闇姉の眼はじっと見る
2201 = "Ánh mắt chị Mayami nhìn chằm chằm vào những chuyển động dâm đãng của chính bầu ngực mình đang bị ngón tay Hibiki điều khiển, và phần cương cứng của tôi đang quằn quại trong sung sướng trước áp lực đó."
# 【真闇】
# display as 真闇
# JP: 「そーちゃんは……その――おっぱい、で――ンッ――\nむにゅむにゅ、され――て……ええと――精、液――」
1658 = "「Sou-chan…… cái đó――dùng ngực――ưm―― nhào nặn――thì…… ừm――tinh, dịch――」"
# 【日々姫】
# display as 日日姬
# JP: 「だっ、て――んっ――ばってん、私の、おっぱい、じゃ\n……くっ――やっぱり――ちょこっと――無理、やけん」
1615 = "「Bởi, vì――ưm――nhưng mà, ngực của em, thì ……ư――quả nhiên――vẫn hơi――quá sức.」"
# 【真闇】
# display as 真闇
# JP: 「うう、ん？　んっ――そぎゃん、こつ――なか、と、よ\n――ふあっ――あっ――だって、ひー、ちゃんっっ」
1518 = "「Ư, ưm? Ưm――không, có――chuyện đó, đâu―― ――fua――a――bởi vì, Hii, chan」"
# monologue
# JP: （ぷりゅんっ！！！！）
2418 = "（Nảy lên!!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ふぁんっ！？　ね、ねぇねっ」
1481 = "「Fuan!? Chị, chị hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああああああっ！！！」
1550 = "「A a a a a a!!!」"
# monologue
# JP: 真闇姉の手は反対に、日々姫のおっぱいを寄せて揉む！\n姉が妹、妹が姉のおっぱいを！！！
2177 = "Ngược lại, tay chị Mayami cũng gom ngực Hibiki lại và nhào nặn! Chị xoa ngực em, em xoa ngực chị!!!"
# monologue
# JP: （みゅにゅっ！　むにゅっ！　ぬりゅっ！　むにゅっ！）
2407 = "（Mềm mại! Mềm mại! Trơn tuột! Mềm mại!）"
# 【真闇】
# display as 真闇
# JP: 「ふ、ぁ――ンッ――ひーちゃん――お肌――おっぱいっ、\nつる、つるの――ぷりっ、ぷりで――うらやま、しかっ」
1484 = "「Fu, a――ưm――Hii-chan――làn da――ngực, trơn, láng――mềm, mại――chị ghen tị, quá.」"
# monologue
# JP: （ぷりゅん！　くりゅっ！　むにゅっ！　っぷにっ！）
2386 = "（Nảy lên! Cọ xát! Mềm mại! Mềm mại!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！　ぁっ！　ぁっ！　ぁっ！」
1558 = "「A! A! A! A!」"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねの――おっぱい――やわらか――んっ――すごっ\n――ぁ――指――沈むのに――はりつい、て――ふぁっ」
1634 = "「Ngực của――chị hai――mềm quá――ưm――tuyệt quá ――a――ngón tay――lún vào――rồi bám chặt, lấy――fua.」"
# monologue
# JP: （むにいっ！　もみゅっ！　もにゅうっ！　ぐにゅうう）
# 2407 = "（揉來！揉去！搓來！搓去！）" 
# 【双鉄】
# display as 雙鐵
# JP: 「はぁっ！　はぁっ！　はぁっ！　はぁっ！！！」
1789 = "「Hà! Hà! Hà! Hà!!!」"
# monologue
# JP: （ずこっ！　ずりゅっ！　ずにっ！　ずりゅううっ！！）
2463 = "（Cọ xát! Trơn tuột! Cọ xát! Trơn tuộtttt!!）"
# monologue
# JP: 日々姫と真闇姉が、一緒に暮らす大切な義妹と義姉とが、\n僕の射精を促すために、お互いの胸をもみ合っている。
2082 = "Hibiki và chị Mayami, cô em gái và người chị nuôi quan trọng cùng sống chung dưới một mái nhà, đang xoa bóp ngực nhau để thúc giục tôi xuất tinh."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！　真闇姉っ！\n僕はっ――！　僕は――僕はもうっ！！！」
1738 = "「Hibiki! Chị Mayami!\nEm――! Em――em sắp!!!」"
# monologue
# JP: （ずにゅっ！　ずこっ！　みゅにゅ！　ずりゅううっ！）
# 2463 = "（蹭來！蹭去！磨來！磨去！）" 
# monologue
# JP: 事実が、景色が、匂いが、温度が、触感が、声が、\nふたりの全てが僕の性欲中枢に刺さりまくって興奮させる
1880 = "Sự thật, khung cảnh, mùi hương, nhiệt độ, xúc giác, giọng nói, tất cả mọi thứ của hai người đâm thẳng vào trung khu tình dục, khiến tôi hưng phấn tột độ."
# 【日々姫】
# display as 日日姬
# JP: 「だって？　ねぇね」
1780 = "「Nghe thấy không? Chị hai.」"
# 【真闇】
# display as 真闇
# JP: 「え？　えっ！？　えっ！？　それって――ええっ！？\nひーちゃん、そーちゃん、おねえちゃんどぎゃんしたら」
1510 = "「Hả? Hả!? Hả!? Thế là sao――hả!? Hii-chan, Sou-chan, chị phải làm sao đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにもっ――せずっ――とも――そのまま、で――！」
1392 = "「Không cần――làm gì――cả――cứ giữ nguyên, thế――!」"
# monologue
# JP: （ずにゅりゅ！　もにゅっ！　むにゅっ！　ぶみゅっ！）
# 2463 = "（蹭來！蹭去！磨來！磨去！）" 
# monologue
# JP: 勃起の中で精液がぶわぶわ膨らんでいる。\nもはや動かずとも放置されようと射精する他――
2209 = "Tinh dịch đang sục sôi căng phồng bên trong dương vật. Giờ thì dù không cử động, dù có bị bỏ mặc, tôi cũng chỉ còn cách xuất tinh――"
# 【日々姫】
# display as 日日姬
# JP: 「なら、ねぇね？　（こしょこしょっ）」
1811 = "「Vậy thì, chị hai? （Thì thầm）」"
# 【真闇】
# display as 真闇
# JP: 「あ、うん。ひーちゃん。こぎゃん――ね？」
1570 = "「A, ừm. Hii-chan. Thế này――nhỉ?」"
# monologue
# JP: 日々姫と真闇姉とが、ほんの一瞬瞳をかわし。
2079 = "Hibiki và chị Mayami khẽ trao nhau ánh mắt trong tích tắc."
# 【日々姫】
# display as 日日姬＆真闇
# JP: 「えいっ♪」「んっ――」
1503 = "「Ây da♪」\n「Ưm――」"
# monologue
# JP: （こりゅんっ！）（もみゅっ）
2467 = "（Cọ xát!）（Xoa nắn）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！？」
1566 = "「っ!!!!?」"
# monologue
# JP: ふたりがそれぞれ左右のタマを、睾丸を、\n強く、優しく揉んで転がしっ！
1895 = "Mỗi người một bên, mạnh mẽ mà dịu dàng nhào nặn, lăn tròn hai hòn bi, tinh hoàn của tôi!"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぁぁぁぁぁぁぁぁぁっぁぁぁぁあっっ！！！！？」
1479 = "「Fuaaaaaaaaaaaaaaaaa!!!!?」"
# monologue
# JP: （びゅぶっ！！！！　どびゅるっ！　びゅぶっ！　ぶ！）
2378 = "（Phụt!!!! Phụtttt! Phụt! Pẹt!）"
# 【真闇】
# display as 真闇
# JP: 「きゃうっ！！！？」
1449 = "「Kyau!!!?」"
# 【日々姫】
# display as 日日姬
# JP: 「ぷあっ――うっわ――すごか――んっ……[で,1]射精て、る」
1607 = "「Pua――uwa――tuyệt quá――ưm…… xuất tinh, rồi.」"
# monologue
# JP: （ぶびゅ！　びゅるうっ！　ぶぶっ！　びゅうぶっ！）
2375 = "（Phụt! Phụtttt! Phụt! Phụt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！　ぁっ！　ぁっ！　ぁっ！！！」
1560 = "「A! A! A! A!!!」"
# monologue
# JP: 白濁してる。精液も、僕の体も、脳みそ、思考も。\nあまりに快感が強烈で、眼前の景色が背徳的すぎて――
1858 = "Trắng xóa. Tinh dịch, cơ thể tôi, não bộ, suy nghĩ. Khoái cảm quá mãnh liệt, cảnh tượng trước mắt quá đỗi vô luân――"
# monologue
# JP: （ぶびっ！　びゅるっ！　びゅううっ！　どびゅっ！）
2376 = "（Phụt! Phụt! Phụtttt! Phụt!）"
# 【真闇】
# display as 真闇
# JP: 「はぁっ、はぁっ、はぁっ、はぁっ――ん――ぁっ――\nこの――熱かと、が――臭かと、が――双、ちゃんの」
1787 = "「Hà, hà, hà, hà――ưm――a―― Cái này――nóng quá――hôi quá――của Sou, chan.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。精子。精液。このどろどろのねばねばが、\nこれから――ねぇねのおまんこ――子宮にもに入るの」
1594 = "「Vâng. Tinh trùng. Tinh dịch. Thứ dính dớp đặc sệt này, sắp tới――cũng sẽ đi vào bướm――vào tử cung của chị hai đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！」
1564 = "「っ!!!!!」"
# monologue
# JP: （ぶびゅうっ！　びゅっ！　びゅるっ！！　びゅう！）
# 2376 = "（噗咻！嗶嚕！咻嚕嚕！嘟咻！）" 
# 【真闇】
# display as 真闇
# JP: 「きゃっ！？」
# 1452 = "「呀！？」" 
# 【日々姫】
# display as 日日姬
# JP: 「うふふっ、にぃにの精液、勢い強くなったとね？\nきっと――想像しちゃったから。ねぇねに、[なかだし,3]膣内射精」
1517 = "「Ufufu, tinh dịch của anh hai, bắn mạnh hơn rồi nhỉ? Chắc chắn là――do anh tưởng tượng ra rồi. Cảnh xuất tinh vào trong âm đạo, của chị hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「く――ぁっ！」
1459 = "「Ku――a!」"
# monologue
# JP: （ぶっ！　びゅるっ！　ビュッ――――――ぴっ）
2382 = "（Pẹt! Phụt! Phụt――――――Pi）"
# 【双鉄】
# display as 雙鐵
# JP: 「はぁっ――はぁっ――ハァッ――はあっ――」
1786 = "「Hà――hà――hà――hà――」"
# monologue
# JP: 永遠に続くかとさえ思われた射精がけれどぴたりと止まる。\n日々姫の声で――まるでそのために備えるように。
2126 = "Cơn xuất tinh tưởng chừng như kéo dài vô tận bỗng dừng bặt. Bởi giọng nói của Hibiki――như thể để chuẩn bị cho điều đó."
# 【日々姫】
# display as 日日姬
# JP: 「すっごい。これ――ん……。ぺろっ――じゅりゅっ――\nごくっ――。ぷぁ――今までで、一番、濃い、かも」
1621 = "「Tuyệt quá. Cái này――ưm……. Liếm――chùn chụt―― Ực――. Pua――Có lẽ, đặc nhất, từ trước đến nay.」"
# monologue
# JP: 僕の精液を真闇姉のおっぱいの上から指ですくって、\nそのまましゃぶって、日々姫が飲み干す。
2100 = "Hibiki dùng ngón tay quệt tinh dịch của tôi trên ngực chị Mayami, rồi mút lấy và nuốt trọn."
# 【真闇】
# display as 真闇
# JP: 「ぁ……双ちゃんの、精子――精液……」
1540 = "「A…… tinh trùng――tinh dịch, của Sou-chan……」"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねも舐める？」
1817 = "「Chị hai cũng liếm thử không?」"
# 【真闇】
# display as 真闇
# JP: 「よかと？　ひーちゃん」
1489 = "「Được sao? Hii-chan.」"
# 【日々姫】
# display as 日日姬
# JP: 「もちろん。ん……」
1761 = "「Tất nhiên rồi. Ưm……」"
# monologue
# JP: 日々姫が掬う。４つの乳房の狭隘にできた、\nどろどろ溜まる精液の沼から、特に濃厚そうな部分を。
2090 = "Hibiki quệt lấy. Từ vũng tinh dịch đặc sệt đọng lại trong khe hẹp giữa bốn bầu ngực, chọn lấy phần có vẻ đặc nhất."
# 【日々姫】
# display as 日日姬
# JP: 「はぁい。ねぇね。あ、喉、絡むから気をつけてね？\nん……『あーーーーーーん』」
1619 = "「Đây. Chị hai. A, coi chừng vướng ở cổ họng nhé? Ưm…… 'Aaaaaan'」"
# 【真闇】
# display as 真闇
# JP: 「ん……『あーーーーーーーん』　あむっ――っ――\nちゅるっ――れるっ――れるっ――ちゅぶっ――れりゅ」
1579 = "「Ưm…… 'Aaaaaan' Amu――ưm―― Chụt――rê ru――rê ru――chùn chụt――rê ryu」"
# 【日々姫】
# display as 日日姬
# JP: 「はぁ――あっ――」
1785 = "「Hà――a――」"
# monologue
# JP: 真闇姉のおしゃぶり――いいや、指フェラで、\n日々姫ははっきり感じてる。羨ましいし、いやらしすぎる。
2194 = "Hành động mút mát――không, ngậm ngón tay của chị Mayami, khiến Hibiki cảm nhận rõ ràng. Thật đáng ghen tị, và cũng quá đỗi dâm đãng."
# 【真闇】
# display as 真闇
# JP: 「ん……チュッ――ちゅむっ――ちゅるっ――\nちゅるっ――ずじゅううううううっ――ごくっ――ぷぁ」
1583 = "「Ưm…… Chụt――chùn chụt――chụt―― Chụt――zujuuuuuuu――Ực――pua」"
# monologue
# JP: 嚥下。吐息。とろんと潤んでいる瞳。\n真闇姉は濃いピンク色の舌でぺろりと、唇を舐める。
2182 = "Nuốt xuống. Thở ra. Đôi mắt ướt át lờ đờ. Chị Mayami dùng chiếc lưỡi màu hồng đậm liếm môi một cái."
# 【真闇】
# display as 真闇
# JP: 「まっこと、喉に絡むとね――\n苦くて、へんな、知らない味で……ばってん、ね？」
1764 = "「Đúng là, vướng ở cổ họng thật nhỉ―― Đắng đắng, kỳ lạ, một hương vị chưa từng biết…… nhưng mà, nhỉ?」"
# monologue
# JP: そして微笑む。恥ずかしそうに。\n大事な大事な秘密を明かす、少女のように。
1928 = "Rồi chị ấy mỉm cười. Trông có vẻ xấu hổ. Như một thiếu nữ đang tiết lộ một bí mật vô cùng quan trọng."
# 【真闇】
# display as 真闇
# JP: 「ちょこっと、ね？　ちょこっとだけは――\nおいしかったと」
1662 = "「Một chút thôi, nhé? Chỉ một chút thôi―― Cũng ngon đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！！！！」
1565 = "「っ!!!!!!!!!」"
# monologue
# JP: はじけ飛ぶ。ただでさえ残ってなかった知性が全て、\n精液の中に落ちて完全に漬けこまれてく。
1979 = "Nổ tung. Chút lý trí vốn dĩ đã chẳng còn lại bao nhiêu, rơi tõm vào tinh dịch và bị ngâm ngập hoàn toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、真闇姉！　キス、キスしたい。三人で。\nふたりで舌を――舌を伸ばして、くっつけあってほしい」
1743 = "「Hibiki, chị Mayami! Hôn, em muốn hôn. Cả ba người. Hai người hãy thò lưỡi ra――chạm lưỡi vào nhau đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……うん。いーい？　ねぇね」
1536 = "「A…… vâng. Được không? Chị hai.」"
# 【真闇】
# display as 真闇
# JP: 「ん――。よかよ？　ひーちゃん」
1574 = "「Ưm――. Được chứ? Hii-chan.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん……」
# 1580 = "「嗯……」" 
# 【真闇】
# display as 真闇
# JP: 「ぁ……」
# 1533 = "「啊……」" 
# monologue
# JP: ぴとりとくっつく。姉と妹の舌と舌とが。
1950 = "Chạm vào nhau. Lưỡi của chị và em."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
# 1563 = "「啊！！！！」" 
# monologue
# JP: その真中に、舌を伸ばして割り入っていく。\nただひたすらに、夢中になって舌を動かす。
1970 = "Tôi thò lưỡi chen vào giữa. Chỉ mải mê, say sưa cử động lưỡi."
# 【双鉄】
# display as 雙鐵
# JP: 「――――っ――はぁ――んっ！！」
1044 = "「――――っ――Hà――ưm!!」"
# 【日々姫】
# display as 日日姬
# JP: 「ちゅっ――んっ――れるっ――れりゅっ――ちゅりゅっ、\nちゅ――むちゅうっ――れりゅうっ――ちゅ、ちゅずっ」
1573 = "「Chụt――ưm――rê ru――rê ryu――churyu, chu――muchuu――reryuu――chu, chuzu」"
# 【真闇】
# display as 真闇
# JP: 「れりゅうっ――じゅりゅ――ちゅっ――ちゅむっ――\nちゅるっ――ちゅううっ――れりゅっ――れろおおおっ」
1757 = "「Reryuu――juryu――chụt――chùn chụt―― chụt――chuuu――reryu――reroooo」"
# monologue
# JP: ただひたすらに気持ちいい。征服感を達成感を満足感を\n幸福感をそしてなにより一体感を唾液で僕らは満たし合う。
2238 = "Chỉ đơn giản là rất sướng. Cảm giác chinh phục, thành tựu, thỏa mãn, hạnh phúc và trên hết là sự hòa làm một, chúng tôi lấp đầy nhau bằng nước bọt."
# 【日々姫】
# display as 日日姬
# JP: 「ん……ちゅっ――れりゅっ――ちゅるっ――じゅゆうっ\n――れるうっ――れろっ――ちゅっ――ちゅずっ、ずっ」
1585 = "「Ưm…… chụt――reryu――chụt――juyuu ――reruu――rero――chụt――chuzu, zu」"
# 【真闇】
# display as 真闇
# JP: 「むちゅっ――ちゅうっ――ぺろっ――れりゅっ――ちゅ\n――れるううっ――ぬろっ――じゅううっ――む、ちゅ」
1522 = "「Muchu――chuu――pero――reryu――chu ――reruuu――nuro――juuu――mu, chu」"
# 【双鉄】
# display as 雙鐵
# JP: 「！！！！！」
# 1564 = "「啊！！！！！」" 
# monologue
# JP: 舌を吸われてねぶられるたび、勃起と舌を取り替えたいと、\n本能的に願ってしまう。けれど、けれども、今このときは。
2134 = "Mỗi lần lưỡi bị mút mát, liếm láp, tôi lại ước gì có thể tráo đổi phần cương cứng với lưỡi theo bản năng. Nhưng, nhưng mà, ngay lúc này đây."
# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ！　あっ――。っっ！！！！」
1608 = "「Pua! A――. っっ!!!!」"
# 【日々姫】
# display as 日日姬
# JP: 「きゃっ！？」
# 1452 = "「呀！？」" 
# 【真闇】
# display as 真闇
# JP: 「双ちゃんっ！？」
1660 = "「Sou-chan!?」"
# monologue
# JP: 押し倒し、下の水着を引きむしる。
1985 = "Tôi đè xuống, giật tung phần dưới của bộ đồ bơi."
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
1547 = "「A」"
# 【真闇】
# display as 真闇
# JP: 「きゃあっ！？」
# 1452 = "「呀！？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「隠さないで欲しい！　真闇姉の、日々姫の――\n大切な[あね,1]義姉と[いもうと,1]義妹のおまんこを、僕は並べて見てみたい」
1791 = "「Đừng giấu! Của chị Mayami, của Hibiki―― Em muốn nhìn thấy bướm của chị gái nuôi và em gái nuôi quan trọng của em đặt cạnh nhau.」"
# monologue
# JP: 喉から咄嗟に飛び出た言葉は我ながら引くほど最低で。\nけれど日々姫は――すぐにうなずき、応えてくれる。
1999 = "Những lời thốt ra từ miệng tồi tệ đến mức chính tôi cũng phải rùng mình. Nhưng Hibiki――lập tức gật đầu, đáp lại tôi."
# 【日々姫】
# display as 日日姬
# JP: 「わたしは。よかよ。ねぇねぇは、どう？」
1692 = "「Em thì. Được thôi. Chị hai, thì sao?」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃん――そぎゃん、は、恥ずかしか……ばってん\n……ひーちゃんと、双ちゃんが――したい……なら」
1810 = "「Chuyện đó――chuyện đó, xấu hổ lắm…… nhưng mà ……nếu Hii-chan, và Sou-chan――muốn…… thì」"
# 【日々姫】
# display as 日日姬
# JP: 「ありがと。ねぇね。それじゃ、足――閉じないでね？」
1792 = "「Cảm ơn chị. Chị hai. Vậy thì, chân――đừng khép lại nhé?」"
# monologue
# JP: （くぱあああっっ）
2392 = "（Mở raaa）"
# 【真闇】
# display as 真闇
# JP: 「ひーちゃんっ！！？」
1653 = "「Hii-chan!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
1610 = "「Ồ――」"
# monologue
# JP: 日々姫の指が、真闇姉のおまんこを広げてくれる。\nおっぱいとは正反対に、未成熟とさえ思える程に清廉な
2102 = "Ngón tay Hibiki mở rộng bướm của chị Mayami ra. Trái ngược hoàn toàn với bộ ngực, nó trong sáng đến mức tưởng chừng như chưa trưởng thành."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は……ふたりの――\nふたりのおまんこを、並べて眺めて、見比べたい」
1681 = "「Em…… muốn ngắm nhìn―― ngắm nhìn hai cái bướm đặt cạnh nhau, và so sánh.」"
# 【日々姫】
# display as 日日姬
# JP: 「だって。ねぇね。ね？　おねがいしても、よかと？」
1779 = "「Nghe chưa. Chị hai. Nhé? Em xin phép được không?」"
# 【真闇】
# display as 真闇
# JP: 「う……うん。さわる、ね？　ひーちゃん。ん――」
1586 = "「Ư…… ừm. Chạm vào, nhé? Hii-chan. Ưm――」"
# monologue
# JP: 処女膜をいまだ守りつづけている姉の震える指が、\n幾百度と無く僕の精子を受け入れた妹の性器にそっと触れ。
2218 = "Ngón tay run rẩy của người chị vẫn còn giữ màng trinh, khẽ chạm vào vùng kín của cô em gái đã tiếp nhận tinh trùng của tôi không biết bao nhiêu lần."
# monologue
# JP: （くっ――ちぃ――）
2360 = "（Ku――chii――）"
# 【日々姫】
# display as 日日姬
# JP: 「んっ！」
# 1602 = "「嗯！」" 
# 【真闇】
# display as 真闇
# JP: 「あっ！？　ひーちゃんっ！！？」
1567 = "「A!? Hii-chan!!?」"
# 【日々姫】
# display as 日日姬
# JP: 「平気。ただ、気持ちよかっただけやけん。\n……こぎゃん感じに」
1707 = "「Không sao. Chỉ là thấy sướng thôi mà. ……Cảm giác thế này.」"
# monologue
# JP: （さすっ）
2475 = "（Vuốt）"
# 【真闇】
# display as 真闇
# JP: 「きゃうっ！！！？」
# 1449 = "「呀！！！？」" 
# monologue
# JP: 人差し指と薬指とで、大陰唇を広げたままに、\n日々姫の中指がそっと真闇姉のクリトリスを撫ぜる。
2104 = "Dùng ngón trỏ và ngón áp út mở rộng môi lớn, ngón giữa của Hibiki nhẹ nhàng vuốt ve âm vật của chị Mayami."
# monologue
# JP: （さわっ――ふわっ――さすっ――そわっ）
2473 = "（Chạm――Nhẹ nhàng――Vuốt――Mơn trớn）"
# 【真闇】
# display as 真闇
# JP: 「やっ――ふっ――あっ――おねー、ちゃんっ――ぁっ、\nひーちゃんに――ひーちゃんの、指、に――クリトリス」
1426 = "「Ya――fu――a――chị, hai――a, bởi Hii-chan――ngón tay, của Hii-chan――âm vật」"
# 【双鉄】
# display as 雙鐵
# JP: 「丁寧に優しく撫ぜられているな。真闇姉のおまんこは\n鮮やかなサーモンピンクで、いかにも未成熟なのに」
1735 = "「Được vuốt ve cẩn thận và dịu dàng nhỉ. Bướm của chị Mayami có màu hồng cá hồi tươi tắn, trông rất non nớt.」"
# 【真闇】
# display as 真闇
# JP: 「やっ！？　双ちゃん、言わないでっ！！　そぎゃん\n実況、されたら――おねえちゃんっ――恥ずかしすぎて」
1457 = "「Ya!? Sou-chan, đừng nói nữa!! Bị tường thuật trực tiếp như thế――chị――xấu hổ lắm.」"
# monologue
# JP: 姉妹、反応がとても似ている。\nゆえに、安心しきって言葉を続ける。
1944 = "Hai chị em, phản ứng rất giống nhau. Thế nên, tôi hoàn toàn yên tâm tiếp tục nói."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の指に、僕の言葉に興奮してくれてるのだろう。\n小さく控えめな膣口からは、愛液が溢れ出してきている」
1420 = "「Chắc là đang hưng phấn vì ngón tay của Hibiki, và lời nói của em. Từ cửa mình nhỏ nhắn e ấp, dâm thủy đang tràn ra.」"
# 【日々姫】
# display as 日日姬
# JP: 「んふふ。ねぇねぇ、乳首もびんびんに勃起しとると。\n私、ねぇねぇに喜んでもらえて、うれしかと」
1598 = "「Nfufu. Chị hai này, đầu vú cũng đang cương cứng lên rồi kìa. Làm chị hai sung sướng, em vui lắm.」"
# 【真闇】
# display as 真闇
# JP: 「やっ。もう――いじわるっ――んっ――はっ――\nそぎゃん――いじわるな――ひーちゃんは――こうっ」
1429 = "「Ya. Thật là――xấu tính――ưm――hà―― Hii-chan――xấu tính――như thế――phải bị thế này.」"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃきゅんっ！！！！？」
1612 = "「Hyakyun!!!!?」"
# monologue
# JP: 姉妹そろっておんなじ指の使い方をし、\nけれど日々姫の反応は、真闇姉より遥かに激しい。
1948 = "Hai chị em dùng ngón tay y hệt nhau, nhưng phản ứng của Hibiki lại mãnh liệt hơn chị Mayami rất nhiều."
# monologue
# JP: （しにゅっ――しぷっ――つぶっ――こしゅんっ）
2419 = "（Vuốt――Búng――Ấn――Cọ xát）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぉ……おっ――」
1511 = "「Ồ…… ồ――」"
# monologue
# JP: 中指でクリトリスを虐める動き。あるいはこれは、\n真闇姉/日々姫の、それぞれの自慰のときの指使いなのか。
2141 = "Động tác dùng ngón giữa trêu chọc âm vật. Có lẽ đây là, cách dùng ngón tay khi tự sướng của chị Mayami/Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「ふやっ！？　やっ！　ふっ――あっ――ああっっ！！\nねぇね――私――こんな――ふ、ぁっ――上手、すぎっ」
1471 = "「Fuya!? Ya! Fu――a――aa!! Chị hai――em――thế này――fu, a――giỏi, quá.」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃん、ほめられ、かた――ふっ――あっ――\nはずかし――くっ、てっ――んっ――嬉しく、なか、と」
1801 = "「Bị, khen, kiểu đó――fu――a―― Xấu hổ――lắm――ưm――không thấy, vui, đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、実際に上手いのだろう。真闇姉の愛撫で、\n日々姫の膣は、膣口は、ぱくぱく、ひくひく、喘いでる」
1388 = "「Nhưng mà, thực sự là rất giỏi đấy. Dưới sự ái ân của chị Mayami, âm đạo, cửa mình của Hibiki, đang há ra khép lại, giật giật, thở dốc.」"
# 【日々姫】
# display as 日日姬
# JP: 「んっ――ふっ！　ねぇねも――ねぇねぇ、もっ！！」
1575 = "「Ưm――fu! Chị hai cũng――chị hai, cũng!!」"
# 【真闇】
# display as 真闇
# JP: 「ふやぁぁぁっ！？　ひ、ひーちゃっ――あっ！！！？」
1467 = "「Fuyaaa!? H-Hii-chan――a!!!?」"
# monologue
# JP: （つりゅ！　しこっ！　ぷにゅっ！　こしゅっ！！）
2420 = "（Trơn tuột! Tuốt! Ấn! Cọ xát!!）"
# monologue
# JP: 日々姫の指の動きが変わる。あるいは爪で、あるいは潰し。\n僕が日々姫を愛するときに、使うそのままの指使いへと。
2113 = "Chuyển động ngón tay của Hibiki thay đổi. Dùng móng tay, hoặc ấn mạnh. Giống hệt cách tôi dùng ngón tay khi âu yếm Hibiki."
# 【真闇】
# display as 真闇
# JP: 「ひあっつ！？　あっ――やあっ！　こぎゃんっ――\nこぎゃんっ――つよ、かと――おねえちゃん――知らん」
1445 = "「Hiat!? A――ya! Thế này―― Thế này――mạnh, quá――chị――không biết đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「よく見れば、真闇姉の膣口も、小さいながら、ぱくぱく\nひくひく喘いでいるな――たくさんのよだれを垂れ流し」
1393 = "「Nhìn kỹ thì, cửa mình của chị Mayami tuy nhỏ, nhưng cũng đang há ra khép lại giật giật thở dốc kìa――chảy ra rất nhiều nước dãi.」"
# monologue
# JP: 日々姫に効果てきめんなことは、確実に、真闇姉にも効く。\nそうと確信できるゆえ、耳元に口を思い切り寄せ――
1958 = "Những gì có hiệu quả với Hibiki, chắc chắn cũng có tác dụng với chị Mayami. Vì tin chắc điều đó, tôi kề sát miệng vào tai chị ấy――"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の勃起を、僕の精子を、子宮の中に欲しがって。\n導こうとして必死になって、おねだりをしてくれている」
1775 = "「Đang khao khát phần cương cứng của em, tinh trùng của em vào trong tử cung. Đang tuyệt vọng cố gắng dẫn dắt, đang cầu xin em.」"
# 【真闇】
# display as 真闇
# JP: 「やぁんっ！　あっ！？　ふあっ！　あっ！\nんぁっ――あああぁっ！！！」
1436 = "「Yaan! A!? Fua! A!\nNga――aaaa!!!」"
# monologue
# JP: 日々姫は一切指をとめない。ゆるめない。\n真闇姉はもう涙目で、顔もぐちゃぐちゃになりそうで。
2110 = "Hibiki không hề dừng ngón tay lại. Không hề nới lỏng. Chị Mayami đã rơm rớm nước mắt, khuôn mặt như sắp vỡ òa."
# 【真闇】
# display as 真闇
# JP: 「欲しいっ！　欲しかとっ！　ひーちゃ、ひーちゃんが\n許してくれるなら――双ちゃん、双ちゃんのおちんちん」
1677 = "「Chị muốn! Chị muốn! Nếu Hii-chan, Hii-chan cho phép――Sou-chan, chim của Sou-chan.」"
# monologue
# JP: 日々姫の目を見る。視線が重なる。日々姫が頷く。\nまるで日々姫が――姉とも、母とも思える微笑で。
1998 = "Tôi nhìn vào mắt Hibiki. Ánh mắt giao nhau. Hibiki gật đầu. Với một nụ cười――như thể Hibiki là một người chị, hay một người mẹ."
# 【真闇】
# display as 真闇
# JP: 「おねえちゃん！　双ちゃんの精子、精液――\n双ちゃんとの赤ちゃんも――すごく、ほしかとっ！！」
1633 = "「Chị! Tinh trùng, tinh dịch của Sou-chan―― Cả em bé với Sou-chan nữa――chị rất, muốn!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「引き受けた」
1668 = "「Em nhận lời.」"
# monologue
# JP: （ぐぶっ！！）
2361 = "（Gubu!!）"
# 【真闇】
# display as 真闇
# JP: 「ぎゅふっ！！！！！？」
1437 = "「Gyufu!!!!!?」"
# monologue
# JP: 亀頭先端。その半分ほど挿れたところで止まってしまう。\nキツイ――キツイ。噛みつかれるような締め付けだ。
2245 = "Phần đầu quy đầu. Chỉ cắm vào được một nửa thì khựng lại. Chật――quá chật. Một lực siết chặt như bị cắn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、[めと]娶ろう。真闇姉をも。日々姫の隣に。\nそうして、三人で夫婦になって、家族になろう」
1773 = "「Em sẽ, cưới. Cả chị Mayami nữa. Bên cạnh Hibiki. Rồi, ba chúng ta sẽ trở thành vợ chồng, trở thành gia đình.」"
# 【日々姫】
# display as 日日姬
# JP: 「やけんね？　どっちに赤ちゃんばできても――\nねぇねと私。ふたりがそろっておかあさんになると」
1718 = "「Nên là? Dù ai có em bé đi nữa―― Chị hai và em. Cả hai chúng ta sẽ cùng làm mẹ.」"
# 【真闇】
# display as 真闇
# JP: 「ぁ――ぁっ――あっ！！」
1529 = "「A――a――a!!」"
# monologue
# JP: （ふわっ）
2359 = "（Nhẹ nhàng）"
# monologue
# JP: 真闇姉が涙をこぼしてしまう。\nキツすぎる噛みつきがいくらか緩み――絶妙になる。
2187 = "Chị Mayami rơi nước mắt. Cú cắn quá chặt nới lỏng ra đôi chút――trở nên tuyệt diệu."
# 【真闇】
# display as 真闇
# JP: 「なる、なります！　おねえちゃん――んっ――ふっ。\n双ちゃんの、ひーちゃんのお嫁さん――なり、ますっ」
1491 = "「Chị sẽ, làm! Chị――ưm――fu. Chị sẽ làm cô dâu――của Sou-chan, của Hii-chan.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1602 = "「嗯！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
# 1563 = "「啊！！！！」" 
# monologue
# JP: （ずぶううううううっっ！　――ぷつっ！　ずりゅっっ）
2432 = "（Phập! ――Bụp! Trơn tuột）"
# 【真闇】
# display as 真闇
# JP: 「～～～～～～～～～～～～～～～っ！！！！！」
1571 = "「~~~~~~~~~~~~~~~っ!!!!!」"
# monologue
# JP: ぷつりと小さな抵抗を切り、それでも勃起は止まらない。\n真闇姉の処女を奪った興奮で体が喜びきっているっ。
2241 = "Cắt đứt một sức kháng cự nhỏ xíu, nhưng phần cương cứng vẫn không dừng lại. Cơ thể tôi đang vô cùng sung sướng trong sự hưng phấn khi cướp đi trinh tiết của chị Mayami."
# monologue
# JP: （ずりゅうううううううううううっ！！！　ごちゅっ！）
2454 = "（Trơn tuộttttttttttt!!! Cộc!）"
# 【真闇】
# display as 真闇
# JP: 「ふぁぁぁぁぁぁぁぁぁぁぁっぁぁぁあああああっ！！」
1477 = "「Fuaaaaaaaaaaaaaaa!!!!」"
# 【日々姫】
# display as 日日姬
# JP: 「あ。ねぇねぇの子宮口って、このあたりなんだ」
1546 = "「A. Cổ tử cung của chị hai, là ở khoảng này nhỉ.」"
# monologue
# JP: （さすっ！！）
2406 = "（Vuốt!!）"
# 【真闇】
# display as 真闇＆雙鐵
# JP: 「きゃふうううっっ！！？」\n「くあっ！！！！！！」
1434 = "「Kyafuuuu!!?」\n「Kua!!!!!!」"
# monologue
# JP: （ぢゅるっ！　ずぶっ！　ぢゅるううっ！　ずこんっ！）
2400 = "（Trơn tuột! Phập! Trơn tuộtttt! Phập!）"
# 【真闇】
# display as 真闇
# JP: 「ひあっ！？　あっ！　待って――待って――ね、\n双、ちゃん！？　おね、ちゃんっ――いっぱい――すぎ」
1454 = "「Hia!? A! Đợi đã――đợi đã――này, Sou, chan!? Chị, chị――đầy――quá rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっている――がっ――止めら――れんっ！！！」
1709 = "「Em biết――nhưng――không thể――dừng lại được!!!」"
# monologue
# JP: （ぢゅぶっ！　ばちゅっ！！　ずるっ！　こちゅんっ！）
