1553 = "「A!」\n「っ!!!!!」"

# monologue
# JP: （むぢゅうううううううううっっっっっっっっっ！！）
2459 = "（Áp chặtttttttttt!!）"

# 【日々姫】
# display as 日日姬
# JP: 「わっ」
1494 = "「Wa」"

# 【真闇】
# display as 真闇
# JP: 「っ！？　っ！？　っ！？　っ！！？」
1508 = "「っ!? っ!? っ!? っ!!?」"

# monologue
# JP: 水着を脱ぎ捨て突き立てている。大事な義姉と義妹が、\n裸のおっぱいを合わせつくった、淫猥すぎるその空隙に。
2003 = "Tôi cởi phăng đồ bơi và đâm mạnh vào. Vào\nkhe hở vô cùng dâm đãng\nđược tạo ra khi cô\nem gái và người chị nuôi quan trọng của\ntôi ép chặt hai bộ ngực trần vào nhau."

# 【日々姫】
# display as 日日姬
# JP: 「んっ！」
1602 = "「Ưm!」"

# monologue
# JP: （みちゅっ！！！）
2451 = "（Mút chặt!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ！！」
1480 = "「Fua!!」"

# monologue
# JP: すぐに日々姫が応えてくれる。真闇姉へと体を押し出し、\n乳房同士がつぶしあい産まれる密着感を高めてくれる。
2120 = "Hibiki lập tức đáp lại. Ép sát cơ thể vào\nchị Mayami,\nlàm tăng thêm cảm giác áp sát\nkhi hai bầu ngực ép chặt vào nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「くっ――あっ！　あっ！　あっ！！！」
1513 = "「Ư――a! A! A!!!」"

# monologue
# JP: （ずりゅっ！　ずりっ！　むにゅっ――ずりっっ――）
2462 = "（Trơn tuột! Trơn tuột! Mềm mại――Trơn\ntuột――）"

# 【真闇】
# display as 真闇
# JP: 「ふぁっ――ぁ……双ちゃん――そうちゃんの……\n（ごくっ）――こぎゃん、あつ、くて――がちがち、で」
1476 = "「Fua――a…… Sou-chan――của Sou-chan……\n（Ực）――nóng, thế này――cứng ngắc, thế này.」"

# monologue
# JP: 日々姫の、真闇姉の乳首が勃ってる。\n僕の勃起にこすられるたび、ぷりゅぷりゅ踊り逃げていく。
2081 = "Đầu vú của Hibiki và chị Mayami đều đang\ncương lên.\nMỗi lần cọ xát vào phần cương\ncứng của tôi, chúng lại nảy lên như đang\nnhảy múa."

# monologue
# JP: (ずりゅっ！　ずりっ！　こりゅっ！　ずむゅっ！！！）
36 = "(Trơn tuột! Trơn tuột! Cọ xát! Trơn\ntuột!!!)"

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――僕は――僕は、僕はっ！！！！」
1679 = "「Em――em――em, em!!!!」"

# monologue
# JP: 引き取られた頃、こころが完全に死んでたころを思い出す。\n真闇姉に風呂に入れられ、それを拒んでしまったことを。
1983 = "Tôi nhớ lại hồi mới được nhận nuôi, khi\ntrái tim tôi đã hoàn toàn chết lặng.\nKhi\nchị Mayami định tắm cho tôi, nhưng tôi đã\ntừ chối."

# monologue
# JP: （こりゅっ！　むにゅっ！　こしゅっ！　ずりゅんっ！）
2461 = "（Cọ xát! Mềm mại! Cọ xát! Trơn tuột!）"

# 【日々姫】
# display as 日日姬
# JP: 「やっ！？　んっ――ふっ――あっ！　にぃに、激しっ」
1455 = "「Ya!? Ưm――fu――a! Anh hai, mãnh liệt quá.」"

# 【真闇】
# display as 真闇
# JP: 「は……ぁ……そう、ちゃん――ひー、ちゃんっ――っ」
1496 = "「Hà…… a…… Sou, chan――Hii, chan――」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕はっずっと、この欲望をっ、絶対の禁忌と考えていた。\n日々姫と結ばれてからはもちろん、その以前からずっと」
1683 = "「Em đã luôn, coi dục vọng này, là điều\ntuyệt đối cấm kỵ.\nTừ sau khi kết đôi với\nHibiki thì đương nhiên rồi, nhưng ngay cả\ntrước đó cũng vậy.」"

# 【真闇】
# display as 真闇
# JP: 「ぁっ――」
# 1526 = "「啊——」" 

# monologue
# JP: （みゅにゅっ！！！）
2415 = "（Ép chặt!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「んくっっ！！！！」
1596 = "「Nku!!!!」"

# monologue
# JP: 真闇姉が、真闇姉の方から動いて、おっぱい、乳首を、\nいっそう強く僕の勃起に、日々姫の胸に押し付けてくれる。
2179 = "Chị Mayami, chủ động di chuyển, ép chặt\nngực, đầu vú,\nvào phần cương cứng của tôi,\nvào ngực của Hibiki mạnh mẽ hơn nữa."

# monologue
# JP: （ずりゅ！　むんにゅっ！！　ずりゅん！　こしゅう！）
2465 = "（Trơn tuột! Ép chặt!! Trơn tuột! Cọ xát!）"

# monologue
# JP: 乳首を、胸を、おっぱいを――真闇姉のことを、穢してる。\n罪悪感がぐるりと変わる。僕は日々姫と、日々姫とふたり。
1986 = "Làm vấy bẩn đầu vú, ngực, bầu vú――làm vấy\nbẩn chị Mayami.\nCảm giác tội lỗi xoay vần.\nTôi cùng với Hibiki, hai người cùng với\nHibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「絶対の禁忌とこころを閉ざしていたのは、つまりっ――\n僕が、それだけ、強く望んでしまっていた、から、で」
1706 = "「Việc em đóng chặt trái tim và coi đó là\nđiều cấm kỵ tuyệt đối, có nghĩa là――\nBởi\nvì, em đã, khao khát nó, quá mãnh liệt.」"

# monologue
# JP: ――日々姫とふたり、一緒になって、真闇姉を抱いている。\nその実感に、日々姫も言葉をかさねてくれる。
1035 = "――Cùng với Hibiki, hai chúng tôi, đang ôm\nlấy chị Mayami.\nTrong cảm giác chân thực\nđó, Hibiki cũng tiếp lời tôi."

# 【日々姫】
# display as 日日姬
# JP: 「わたしも。気づいとったけん。やけん――怖くて――\nにぃにとねぇねが結ばれちゃったら――私、一人にっ」
1684 = "「Em cũng vậy. Em đã nhận ra. Nên――em sợ――\nNếu anh hai và chị hai đến với nhau――em\nsẽ, chỉ còn một mình.」"

# 【真闇】
# display as 真闇
# JP: 「っ！！！！」
# 1563 = "「啊！！！！」" 

# monologue
# JP: （ふっ――ぐっ！！！！　むにゅんっ！！！）
2483 = "（Fu――Gu!!!! Mềm mại!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！」
# 1552 = "「啊！」" 

# monologue
# JP: 真闇姉のおっぱいが離れかけ、けれど日々姫がすぐさまに\n健気なおっぱいを真闇姉へとより強く早く押し付け返す。
2191 = "Bầu ngực của chị Mayami hơi tách ra, nhưng\nHibiki ngay lập tức\nép bộ ngực dũng cảm\ncủa mình vào chị Mayami mạnh mẽ và nhanh\nchóng hơn."

# 【日々姫】
# display as 日日姬
# JP: 「おいてけぼりに、されちゃうんじゃないかって、怖くて。\nけど――気づいたら――逆にねぇねを、一人ぼっちに」
1698 = "「Sợ rằng, mình sẽ bị bỏ lại phía sau.\nNhưng――khi nhận ra――thì ngược lại, chị hai\nmới là người cô đơn.」"

# 【真闇】
# display as 真闇
# JP: 「――ひーちゃん。双ちゃん」
1048 = "「――Hii-chan. Sou-chan.」"

# monologue
# JP: （ぎゅううううっ！！）
2452 = "（Ép chặtttt!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！」
# 1552 = "「啊！」" 

# monologue
# JP: 真闇姉が思いきり日々姫へ、自分のおっぱいを押し付ける。\n経験の無いまろやかすぎる密度をもった狭隘に、声が出る。
2197 = "Chị Mayami dùng hết sức ép ngực mình vào\nHibiki.\nKhe hẹp với độ đặc quánh mềm mại\nchưa từng trải nghiệm khiến tôi bật ra\ntiếng rên."

# 【真闇】
# display as 真闇
# JP: 「おねーちゃんもね？　ずっと、ずうっと。怖かったと。\nおねえちゃんが、もしも欲望を――表に……出したら」
1631 = "「Chị cũng vậy, biết không? Từ rất, rất lâu\nrồi. Chị đã rất sợ.\nNếu như chị――thể\nhiện…… dục vọng của mình ra ngoài.」"

# monologue
# JP: （ぎゅっ！　ぎゅううっ！　むにゅっ！　ぎゅうううっ）
# 2465 = "（蹭來！蹭去！！擠來！擠去！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1561 = "「っ!!」"

# monologue
# JP: 真闇姉が、積極的に胸を潰してまたゆるめる。肉体的な\n刺激は弱いが、真闇姉が望んでくれての行為と思えば――
2202 = "Chị Mayami chủ động ép xẹp ngực rồi lại\nthả lỏng. Dù kích thích thể xác\nhơi yếu,\nnhưng nghĩ đến việc đây là hành động mà\nchị Mayami mong muốn――"

# 【真闇】
# display as 真闇
# JP: 「ひーちゃんと――ンッ――双、ちゃん、の――大事なっ、\n絆、ば――ゆるめて――しまい――そうで、怖、くてっ」
1796 = "「Sẽ làm――ưm――mối liên kết, quan trọng――của\nHii-chan, và――\nSou, chan――lỏng\nlẻo――mất――nên chị, sợ lắm.」"

# 【日々姫】
# display as 日日姬
# JP: 「昔――っん！　昔、だったら――前まで、だったら」
1802 = "「Ngày xưa――ưm! Nếu là ngày xưa――nếu là\ntrước đây.」"

# monologue
# JP: 上ずってしまった声を一度飲み込み、言い直す。日々姫も\n僕と同様――真闇姉とするセックスに、舞い上がってる。
2213 = "Nuốt lại giọng nói đã lạc đi, rồi nói lại.\nHibiki cũng\ngiống như tôi――đang vô cùng\nhưng phấn với việc làm tình cùng chị\nMayami."

# 【日々姫】
# display as 日日姬
# JP: 「実際――きっと――そぎゃん、こつ――なっちゃってた、\nかも、しれん――ばってん――ん――ね？　にぃ、に？」
1645 = "「Thực tế――chắc chắn――có lẽ――sẽ thành ra,\nnhư vậy――nhưng mà――ưm――nhỉ? Anh, hai?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1746 = "「Ừ.」"

# monologue
# JP: （にゅぶっ――ずりゅっ――ごしゅ――ずりゅん）
# 2465 = "（蹭來！蹭去！！擠來！擠去！）" 

# monologue
# JP: 姉妹の思いが、呼吸が一致し始めている。\nその中央に、僕がいる――ただひたすらに――幸せで。
1946 = "Suy nghĩ và nhịp thở của hai chị em đang\nbắt đầu đồng điệu.\nỞ chính giữa họ, là\ntôi――chỉ đơn giản là――cảm thấy hạnh phúc."

# 【双鉄】
# display as 雙鐵
# JP: 「僕と、日々姫は――いくつものいくつもの昼と夜、\nこころを、時間を、肌を重ねて――絆を、深めて、きた」
1694 = "「Anh và, Hibiki――đã trải qua biết bao ngày\nđêm,\ncùng nhau chia sẻ tâm hồn, thời gian,\nthể xác――để thắt chặt, mối quan hệ.」"

# monologue
# JP: 体は強く、猛烈に、初めて抱く真闇姉へと惹かれてる。、\nこの状況でも僕のこころのど真ん中には、日々姫だけだ。
2219 = "Cơ thể tôi bị thu hút mạnh mẽ, mãnh liệt\nbởi chị Mayami, người tôi ôm lần đầu tiên.\nNhưng dù trong hoàn cảnh này, giữa trung\ntâm trái tim tôi, vẫn chỉ có mình Hibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「この先例えば何かがあって、日々姫が僕を嫌うとしても\n憎むとしても――僕は、日々姫を愛し続ける。絶対に」
1758 = "「Ví dụ như sau này có chuyện gì xảy ra, dù\nHibiki có ghét anh,\ncó hận anh đi chăng\nnữa――anh vẫn sẽ tiếp tục yêu Hibiki. Tuyệt\nđối là vậy.」"

# 【日々姫】
# display as 日日姬
# JP: 「わたしもっ、わたしもおんなじ――気持ち――\nやけんっ！　んっ！　やけん、ね？」
1691 = "「Em cũng, em cũng có cùng――cảm giác――\nNhưng mà! Ưm! Nhưng mà, này?」"

# monologue
# JP: 日々姫がふっと、動きをとめる。\nおんなじいろの瞳へと、包み込むような視線を注ぐ。
2107 = "Hibiki đột nhiên dừng cử động.\nTrao ánh\nnhìn như bao bọc lấy đôi mắt cùng màu với\nmình."

# 【日々姫】
# display as 日日姬
# JP: 「やけん、ね？　ねぇねぇ。私、もう、死にもの狂いで、\n必死になって、にぃにのこと、独り占めしなくても」
1715 = "「Cho nên, chị hai này. Em, không cần phải\nđiên cuồng,\ntuyệt vọng, độc chiếm anh hai\nnữa đâu.」"

# 【真闇】
# display as 真闇
# JP: 「あ……」
# 1533 = "「啊……」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん…………」
1580 = "「Ưm…………」"

# monologue
# JP: 日々姫が唾液を垂らしてくれる。４つの乳房に支えられる、\n僕の亀頭の先端に――恐らくは、キスの代わりに。
1993 = "Hibiki nhỏ nước bọt xuống. Lên đầu quy đầu\ncủa tôi,\nđang được nâng đỡ bởi bốn bầu\nngực――có lẽ, thay cho một nụ hôn."

# monologue
# JP: （ぢゅにゅるんっ！！！！）
2431 = "（Trơn tuột!!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
1460 = "「Kua!」"

# monologue
# JP: そうして再び動き始める。\n潤滑を増した乳房を揉み動かして、僕の勃起を弄ぶ！
2010 = "Và rồi lại bắt đầu cử động.\nNhào nặn những\nbầu ngực đã thêm phần trơn trượt, đùa giỡn\nvới phần cương cứng của tôi!"

# 【日々姫】
# display as 日日姬
# JP: 「……にぃにと、私。こころとこころが、離れる、なんて\nありえないって、わかった、けん。やけん――平気、で」
1072 = "「……Anh hai và, em. Trái tim và trái tim,\nrời xa nhau,\nlà điều không thể nào, em đã\nhiểu rồi. Nên――em ổn, mà.」"

# monologue
# JP: 日々姫がふっと、潤んだ瞳で僕を見上げる。\n頷くより前、視線は真闇姉へと戻る。
2092 = "Hibiki đột nhiên ngước nhìn tôi bằng đôi\nmắt ướt át.\nTrước khi gật đầu, ánh mắt em\nấy đã quay lại phía chị Mayami."

# 【日々姫】
# display as 日日姬
# JP: 「ねぇね、が――ん――したい、こと、叶えて、くれたら。\nそれが、一番、いい形って、こころ、から、思う、けん」
1625 = "「Nếu chị hai――ưm――có thể thực hiện, điều\nchị muốn.\nThì đó, là hình thức, tốt nhất,\ntừ tận đáy lòng, em nghĩ vậy.」"

# 【真闇】
# display as 真闇
# JP: 「ほんならっ――ね？　ぁっ！　そし、たら、ひーちゃん。\nん…………ん～～～～～～っ」
1723 = "「Nếu vậy――nhé? A! Vậy, thì, Hii-chan.\nƯm………… ưm~~~~~~」"

# monologue
# JP: （ねとおおおぉぉぉぉぉぉぉぉっ）
2484 = "（Nhớp nhápppppppp）"

# 【日々姫】
# display as 日日姬
# JP: 「あ――ん……ぇ～～～～～～～っ」
1530 = "「A――ưm…… e~~~~~~~」"

# monologue
# JP: （とろぉぉぉぉぉぉっぉぉぉぉぉっ）
2433 = "（Sền sệtttttttttt）"

# monologue
# JP: 姉と妹、二人が同時に僕の亀頭に唾液を垂らす。\n勃起全部をぬらぬらにして、姉妹の粘液が一つに混じる。
1945 = "Chị và em, hai người đồng thời nhỏ nước\nbọt lên quy đầu của tôi.\nLàm ướt sũng toàn\nbộ phần cương cứng, dịch nhầy của hai chị\nem hòa làm một."

# 【真闇】
# display as 真闇
# JP: 「…………。…………。おねえちゃんも、して、よかと？\nひーちゃんと、双ちゃんと――三人でする、セックスば」
1060 = "「…………。…………。Chị cũng, làm, được chứ?\nVới\nHii-chan, với Sou-chan――chuyện làm tình,\nba người.」"

# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　私はよかとよ！\nね？　にぃにぃは？」
1762 = "「Tất nhiên rồi! Em đồng ý mà!\nNhỉ? Anh hai\nthì sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1746 = "「是啊」" 

# monologue
# JP: 勃起も頭もさっきからずっと白熱しきってる。\n出したいものは精液で、だからこそ必死に言葉を絞る。
1992 = "Cả phần cương cứng lẫn đầu óc tôi từ nãy\nđến giờ vẫn luôn nóng rực.\nThứ muốn xuất\nra là tinh dịch, chính vì vậy tôi phải\ntuyệt vọng vắt óc tìm từ ngữ."

# 【双鉄】
# display as 雙鐵
# JP: 「セックス、したい、日々姫とも、真闇姉とも、物凄く。\n今すぐにでも挿入したい、けれど、けれども。その前に」
1700 = "「Anh muốn, làm tình, với cả Hibiki, và cả\nchị Mayami, vô cùng muốn.\nAnh muốn đưa vào\nngay lập tức, nhưng, nhưng mà. Trước đó.」"

# monologue
# JP: 見てしまう。僕の勃起を包んでくれてる、\n日々姫の胸を、真闇姉の、おっぱいを。
1996 = "Tôi nhìn chằm chằm. Vào bộ ngực của\nHibiki, vào bầu ngực của chị Mayami,\nđang\nbao bọc lấy phần cương cứng của tôi."

# 【日々姫】
# display as 日日姬
# JP: 「む"」\n1515 = "「唔」" \n\n# monologue\n# JP: 日々姫はときおり、思い出したように果敢にチャレンジ\nしてくれるのだが――やはり、どうにも無理なので――\n2098 = "日日姬有時候會突發奇想，然後果敢地發起挑戰，但果然——實在是有些勉強——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「胸だけで。手コキやお口の助けを借りずおっぱいだけで。\n僕は未だ、一度も射精にいたれたことがない。ゆえに」\n1414 = "「光靠胸部，不借助手或者口交，只用胸部。我至今還從來沒有那樣射出來過。所以」" \n\n# monologue\n# JP: （ずりゅんんんんんんんんっ！！！）\n2384 = "（夾緊！！！）" \n\n# 【真闇】\n# display as 真闇＆雙鐵\n# JP: 「ひーちゃんっ！！！？」\n「くはっ！」\n1651 = "「小日！！！？」\\n「咕啊！！」" \n\n# monologue\n# JP: 強烈で甘く、しかも僕を知り尽くしてる動きの刺激。\n日々姫の両手が真闇姉の胸を抑えて寄せて動かしている。\n1957 = "對我知根知底的動作帶來的刺激既強烈而甜美。日日姬用雙手把真闇姐的雙乳往中間推，搓弄著我。" \n\n# monologue\n# JP: （むにっ！　ずりゅっ！　むにょんっ！　ずりゅんっ！\n2464 = "（蹭來！蹭去！！擠來！擠去！" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ごめんね？　ねぇねぇ。いきなり、おっぱい――んっ、\nばってん――こぎゃん、しないと――にぃに、きっと」\n1820 = "「阿姐，對不起。突然把弄起你的胸部——嗯，可是——不這樣，的話——阿哥肯定沒辦法」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ぁ……んっ――ふっ――あっ！」\n1534 = "「啊……嗯——呼——啊！」" \n\n# monologue\n# JP: （みゅにゅっ！　ずりゅん！　むにゅっ！　みきゅっ！）\n# 2465 = "（蹭來！蹭去！！擠來！擠去！）" \n\n# monologue\n# JP: 日々姫の指に操られている自らのおっぱいの淫靡な動きを、\nその圧力に悶え喜ぶ僕の勃起を、真闇姉の眼はじっと見る\n2201 = "真闇姐眼睜睜地看著自己的胸部在日日姬手指的操控下做出淫靡的動作，看著我的硬物在雙乳的夾擊下又爽又苦悶的樣子。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「そーちゃんは……その――おっぱい、で――ンッ――\nむにゅむにゅ、され――て……ええと――精、液――」\n1658 = "「小雙……那個——在胸部的——嗯——擠弄一下——呃——精液——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「だっ、て――んっ――ばってん、私の、おっぱい、じゃ\n……くっ――やっぱり――ちょこっと――無理、やけん」\n1615 = "「因為——嗯——因為靠我的，胸部……咕——還是——有點——勉強」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「うう、ん？　んっ――そぎゃん、こつ――なか、と、よ\n――ふあっ――あっ――だって、ひー、ちゃんっっ」\n1518 = "「唔唔，嗯？嗯——沒有——那回事哦——呼啊——啊——因為，小日」" \n\n# monologue\n# JP: （ぷりゅんっ！！！！）\n2418 = "（擠壓！！！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふぁんっ！？　ね、ねぇねっ」\n1481 = "「呼啊！？啊、阿姐」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああああああっ！！！」\n1550 = "「啊啊啊啊啊啊！！！」" \n\n# monologue\n# JP: 真闇姉の手は反対に、日々姫のおっぱいを寄せて揉む！\n姉が妹、妹が姉のおっぱいを！！！\n2177 = "真闇姐一個反手，也把日日姬的胸部往中間擠，接著搓揉起來！姐姐在揉妹妹，而妹妹在搓姐姐的奶子！！！" \n\n# monologue\n# JP: （みゅにゅっ！　むにゅっ！　ぬりゅっ！　むにゅっ！）\n2407 = "（揉來！揉去！搓來！搓去！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ふ、ぁ――ンッ――ひーちゃん――お肌――おっぱいっ、\nつる、つるの――ぷりっ、ぷりで――うらやま、しかっ」\n1484 = "「呼，啊——嗯——小日的——皮膚和胸部，滑滑的——彈彈的——咱，好羨慕咧」" \n\n# monologue\n# JP: （ぷりゅん！　くりゅっ！　むにゅっ！　っぷにっ！）\n2386 = "（彈來！彈去！晃來！晃去！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁっ！　ぁっ！　ぁっ！　ぁっ！」\n1558 = "「啊！啊！啊！啊！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ねぇねの――おっぱい――やわらか――んっ――すごっ\n――ぁ――指――沈むのに――はりつい、て――ふぁっ」\n1634 = "「姐姐的——胸部——好柔軟——嗯——好驚人——啊——手指——陷進去——肉都纏上來了——呼啊」" \n\n# monologue\n# JP: （むにいっ！　もみゅっ！　もにゅうっ！　ぐにゅうう）\n# 2407 = "（揉來！揉去！搓來！搓去！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「はぁっ！　はぁっ！　はぁっ！　はぁっ！！！」\n1789 = "「蛤啊！蛤啊！蛤啊！蛤啊！！！」" \n\n# monologue\n# JP: （ずこっ！　ずりゅっ！　ずにっ！　ずりゅううっ！！）\n2463 = "（蹭來！蹭去！磨來！磨去！）" \n\n# monologue\n# JP: 日々姫と真闇姉が、一緒に暮らす大切な義妹と義姉とが、\n僕の射精を促すために、お互いの胸をもみ合っている。\n2082 = "日日姬和真闇姐，跟我一起生活，我最心愛的繼妹繼姐，為了讓我射精，互相搓揉著對方的胸脯。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫っ！　真闇姉っ！\n僕はっ――！　僕は――僕はもうっ！！！」\n1738 = "「日日姬！真闇姐！我——！我——我已經！！！」" \n\n# monologue\n# JP: （ずにゅっ！　ずこっ！　みゅにゅ！　ずりゅううっ！）\n# 2463 = "（蹭來！蹭去！磨來！磨去！）" \n\n# monologue\n# JP: 事実が、景色が、匂いが、温度が、触感が、声が、\nふたりの全てが僕の性欲中枢に刺さりまくって興奮させる\n1880 = "事實、景象、氣味、溫度、觸感、聲音，兩人的一切都猛烈刺激著我的性慾中樞，讓我越來越興奮。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「だって？　ねぇね」\n1780 = "「聽到了嗎？阿姐」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「え？　えっ！？　えっ！？　それって――ええっ！？\nひーちゃん、そーちゃん、おねえちゃんどぎゃんしたら」\n1510 = "「哎？哎！？哎！？那是指——哎哎！？小日，小雙，姐姐該怎麼辦咧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なにもっ――せずっ――とも――そのまま、で――！」\n1392 = "「什麼都——不用——做——就保持這樣——！」" \n\n# monologue\n# JP: （ずにゅりゅ！　もにゅっ！　むにゅっ！　ぶみゅっ！）\n# 2463 = "（蹭來！蹭去！磨來！磨去！）" \n\n# monologue\n# JP: 勃起の中で精液がぶわぶわ膨らんでいる。\nもはや動かずとも放置されようと射精する他――\n2209 = "硬物中的精液不斷鼓脹起來。已經到了就算什麼都不做也不得不射的地步——" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「なら、ねぇね？　（こしょこしょっ）」\n1811 = "「那，阿姐（搓弄搓弄）」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あ、うん。ひーちゃん。こぎゃん――ね？」\n1570 = "「啊，嗯。小日。這樣——嗎？」" \n\n# monologue\n# JP: 日々姫と真闇姉とが、ほんの一瞬瞳をかわし。\n2079 = "日日姬和真闇姐交換了一下眼神。" \n\n# 【日々姫】\n# display as 日日姬＆真闇\n# JP: 「えいっ♪」「んっ――」\n1503 = "「哎咿♪」\\n「嗯——」" \n\n# monologue\n# JP: （こりゅんっ！）（もみゅっ）\n2467 = "（蹭動！）（搓揉）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！？」\n1566 = "「啊！！！！？」" \n\n# monologue\n# JP: ふたりがそれぞれ左右のタマを、睾丸を、\n強く、優しく揉んで転がしっ！\n1895 = "兩人分別把拿住我左右的卵蛋，賣力地、溫柔地搓揉滾動睪丸！" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふぁぁぁぁぁぁぁぁぁっぁぁぁぁあっっ！！！！？」\n1479 = "「呼啊啊啊啊啊啊啊啊啊啊！！！！？」" \n\n# monologue\n# JP: （びゅぶっ！！！！　どびゅるっ！　びゅぶっ！　ぶ！）\n2378 = "（噗咻！！！！咕咻！咻噗！噗！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「きゃうっ！！！？」\n1449 = "「呀！！！？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぷあっ――うっわ――すごか――んっ……[で,1]射精て、る」\n1607 = "「噗啊——嗚哇——好厲害——嗯……射出來了」" \n\n# monologue\n# JP: （ぶびゅ！　びゅるうっ！　ぶぶっ！　びゅうぶっ！）\n2375 = "（噗咻！嗶咻！噗噗！嗶咻！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁっ！　ぁっ！　ぁっ！　ぁっ！！！」\n1560 = "「啊！啊！啊！啊！！！」" \n\n# monologue\n# JP: 白濁してる。精液も、僕の体も、脳みそ、思考も。\nあまりに快感が強烈で、眼前の景色が背徳的すぎて――\n1858 = "一切都化為了白濁。無論是我的精液和身體、大腦還是思考。快感太過強烈，眼前的景象太違背常倫——" \n\n# monologue\n# JP: （ぶびっ！　びゅるっ！　びゅううっ！　どびゅっ！）\n2376 = "（噗咻！嗶嚕！咻嚕嚕！嘟咻！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「はぁっ、はぁっ、はぁっ、はぁっ――ん――ぁっ――\nこの――熱かと、が――臭かと、が――双、ちゃんの」\n1787 = "「蛤啊、蛤啊、蛤啊、蛤啊——嗯——啊——好燙——味道好重——這就是，小雙的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん。精子。精液。このどろどろのねばねばが、\nこれから――ねぇねのおまんこ――子宮にもに入るの」\n1594 = "「嗯。精子。精液。這稠乎乎的黏液，接下來——也會射進阿姐的小穴——射進子宮裡咧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！！」\n1564 = "「啊！！！！！」" \n\n# monologue\n# JP: （ぶびゅうっ！　びゅっ！　びゅるっ！！　びゅう！）\n# 2376 = "（噗咻！嗶嚕！咻嚕嚕！嘟咻！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「きゃっ！？」\n# 1452 = "「呀！？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うふふっ、にぃにの精液、勢い強くなったとね？\nきっと――想像しちゃったから。ねぇねに、[なかだし,3]膣内射精」\n1517 = "「唔呵呵，阿哥的射精勢頭變強了呢？阿哥剛才肯定——想像了一番內射阿姐的景象」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「く――ぁっ！」\n1459 = "「呃——啊！」" \n\n# monologue\n# JP: （ぶっ！　びゅるっ！　ビュッ――――――ぴっ）\n2382 = "（噗！噗咻！咻——嗶）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「はぁっ――はぁっ――ハァッ――はあっ――」\n1786 = "「蛤啊——蛤啊——蛤啊——蛤啊——」" \n\n# monologue\n# JP: 永遠に続くかとさえ思われた射精がけれどぴたりと止まる。\n日々姫の声で――まるでそのために備えるように。\n2126 = "本以為會永遠持續下去的射精戛然而止。日日姬的聲音隨之響起——好像她就在等待這一刻似的。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「すっごい。これ――ん……。ぺろっ――じゅりゅっ――\nごくっ――。ぷぁ――今までで、一番、濃い、かも」\n1621 = "「好厲害。這個——嗯……（舔）——（含入）——（吞下）——噗啊——這可能是，至今為止最濃的一次」" \n\n# monologue\n# JP: 僕の精液を真闇姉のおっぱいの上から指ですくって、\nそのまましゃぶって、日々姫が飲み干す。\n2100 = "日日姬用手指從真闇姐的乳房上刮起我的精液，然後直接放入口中吞了個精光。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ぁ……双ちゃんの、精子――精液……」\n1540 = "「啊……小雙的，精子——精液……」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ねぇねも舐める？」\n1817 = "「阿姐也要舔舔看？」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「よかと？　ひーちゃん」\n1489 = "「咱可以嗎？小日」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「もちろん。ん……」\n1761 = "「當然可以。嗯……」" \n\n# monologue\n# JP: 日々姫が掬う。４つの乳房の狭隘にできた、\nどろどろ溜まる精液の沼から、特に濃厚そうな部分を。\n2090 = "日日姬從四個乳房的夾縫中積攢起來的精液沼澤中，挑了看起來特別濃厚黏稠的部分，用手指刮了起來。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はぁい。ねぇね。あ、喉、絡むから気をつけてね？\nん……『あーーーーーーん』」\n1619 = "「好了，阿姐。啊，會有些黏喉嚨，要注意一點哦？嗯……“啊————嗯”」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ん……『あーーーーーーーん』　あむっ――っ――\nちゅるっ――れるっ――れるっ――ちゅぶっ――れりゅ」\n1579 = "「嗯……“啊————嗯”啊嗯——唔——啾嚕——滋溜——滋溜——啾噗——滋溜」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はぁ――あっ――」\n1785 = "「蛤啊——啊——」" \n\n# monologue\n# JP: 真闇姉のおしゃぶり――いいや、指フェラで、\n日々姫ははっきり感じてる。羨ましいし、いやらしすぎる。\n2194 = "真闇姐的吞精——不，她的舔指，讓日日姬產生了明確的快感。這淫靡過頭的場面讓我羨慕不已。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ん……チュッ――ちゅむっ――ちゅるっ――\nちゅるっ――ずじゅううううううっ――ごくっ――ぷぁ」\n1583 = "「嗯……啾——啾唔——啾溜——啾嚕——滋唔唔唔唔唔——咕嘟——噗啊」" \n\n# monologue\n# JP: 嚥下。吐息。とろんと潤んでいる瞳。\n真闇姉は濃いピンク色の舌でぺろりと、唇を舐める。\n2182 = "真闇姐嚥下精液，呼出一口氣，雙眸蒙上一層水霧。接著她用深粉色的舌頭舔了舔嘴唇。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「まっこと、喉に絡むとね――\n苦くて、へんな、知らない味で……ばってん、ね？」\n1764 = "「真的很黏喉嚨咧——味道苦苦的，怪怪的，我從來沒嚐過……不過呀」" \n\n# monologue\n# JP: そして微笑む。恥ずかしそうに。\n大事な大事な秘密を明かす、少女のように。\n1928 = "她似乎有些害羞地莞爾一笑。就像個坦白寶貴秘密的少女一般。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ちょこっと、ね？　ちょこっとだけは――\nおいしかったと」\n1662 = "「就只有那麼一點點哦？有那麼一點點——好吃咧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！！！！！！」\n1565 = "「啊！！！！！！！！！」" \n\n# monologue\n# JP: はじけ飛ぶ。ただでさえ残ってなかった知性が全て、\n精液の中に落ちて完全に漬けこまれてく。\n1979 = "我心中本就所剩無幾的理智瞬間炸裂開來，碎屑紛紛掉進精液之中，化於無形。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫、真闇姉！　キス、キスしたい。三人で。\nふたりで舌を――舌を伸ばして、くっつけあってほしい」\n1743 = "「日日姬，真闇姐！我想要三個人一起接吻。請你們把舌頭——把舌頭伸出來，然後舌頭貼著舌頭」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ……うん。いーい？　ねぇね」\n1536 = "「啊……嗯。可以嗎？阿姐」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ん――。よかよ？　ひーちゃん」\n1574 = "「嗯——可以哦？小日」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ん……」\n# 1580 = "「嗯……」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ぁ……」\n# 1533 = "「啊……」" \n\n# monologue\n# JP: ぴとりとくっつく。姉と妹の舌と舌とが。\n1950 = "姐姐和妹妹的兩根香舌貼在了一起。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！」\n# 1563 = "「啊！！！！」" \n\n# monologue\n# JP: その真中に、舌を伸ばして割り入っていく。\nただひたすらに、夢中になって舌を動かす。\n1970 = "我也讓自己的舌頭也插入兩者之間。我拚命舔動，沉浸在三舌相戲之中。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「――――っ――はぁ――んっ！！」\n1044 = "「——呃——蛤啊——嗯！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ちゅっ――んっ――れるっ――れりゅっ――ちゅりゅっ、\nちゅ――むちゅうっ――れりゅうっ――ちゅ、ちゅずっ」\n1573 = "「啾——嗯——滋溜——滋咧——啾溜，啾——唔啾——滋溜——啾，啾茲」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「れりゅうっ――じゅりゅ――ちゅっ――ちゅむっ――\nちゅるっ――ちゅううっ――れりゅっ――れろおおおっ」\n1757 = "「滋溜——啾啾——啾——啾唔——滋溜——滋唔唔——滋溜——滋嚕嚕嚕」" \n\n# monologue\n# JP: ただひたすらに気持ちいい。征服感を達成感を満足感を\n幸福感をそしてなにより一体感を唾液で僕らは満たし合う。\n2238 = "這感覺只能用舒服來形容。征服感、成就感、滿足感、幸福感油然而生，而最令人心滿意足的是分享唾液帶來的融合感。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ん……ちゅっ――れりゅっ――ちゅるっ――じゅゆうっ\n――れるうっ――れろっ――ちゅっ――ちゅずっ、ずっ」\n1585 = "「嗯……啾——滋溜——啾嚕——啾唔唔——滋溜——滋溜——啾——啾滋、滋」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「むちゅっ――ちゅうっ――ぺろっ――れりゅっ――ちゅ\n――れるううっ――ぬろっ――じゅううっ――む、ちゅ」\n1522 = "「唔啾——啾唔——滋溜——滋嚕——啾——滋嚕嚕——嚕唔——滋嚕嚕——唔、啾」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「！！！！！」\n# 1564 = "「啊！！！！！」" \n\n# monologue\n# JP: 舌を吸われてねぶられるたび、勃起と舌を取り替えたいと、\n本能的に願ってしまう。けれど、けれども、今このときは。\n2134 = "每每舌頭被吸吮的時候，我都本能地渴望此刻被舔舐的是我的硬物。然而在此時此刻——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぷあっ！　あっ――。っっ！！！！」\n1608 = "「噗啊！啊——哎！！！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「きゃっ！？」\n# 1452 = "「呀！？」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「双ちゃんっ！？」\n1660 = "「小雙！？」" \n\n# monologue\n# JP: 押し倒し、下の水着を引きむしる。\n1985 = "我把她們雙雙推倒，一把扯掉她們下身的泳裝。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あっ」\n1547 = "「啊」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「きゃあっ！？」\n# 1452 = "「呀！？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「隠さないで欲しい！　真闇姉の、日々姫の――\n大切な[あね,1]義姉と[いもうと,1]義妹のおまんこを、僕は並べて見てみたい」\n1791 = "「請不要遮掩！我想讓真闇姐和日日姬的——我想讓我心愛的繼姐繼妹的小穴並排呈現在眼前」" \n\n# monologue\n# JP: 喉から咄嗟に飛び出た言葉は我ながら引くほど最低で。\nけれど日々姫は――すぐにうなずき、応えてくれる。\n1999 = "我自己都覺得我脫口而出的這句話實在不堪入耳。但日日姬——她很快點了點頭，答應了我的請求。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わたしは。よかよ。ねぇねぇは、どう？」\n1692 = "「我可以哦。阿姐呢？」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「そぎゃん――そぎゃん、は、恥ずかしか……ばってん\n……ひーちゃんと、双ちゃんが――したい……なら」\n1810 = "「那種事——那種事，好難為情咧——不過……如果小日和小雙——想做的話……」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ありがと。ねぇね。それじゃ、足――閉じないでね？」\n1792 = "「謝謝你，阿姐。那你的雙腿——可別閉得這麼緊呀」" \n\n# monologue\n# JP: （くぱあああっっ）\n2392 = "（扒開）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひーちゃんっ！！？」\n1653 = "「小日！！？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おお――」\n1610 = "「噢噢——」" \n\n# monologue\n# JP: 日々姫の指が、真闇姉のおまんこを広げてくれる。\nおっぱいとは正反対に、未成熟とさえ思える程に清廉な\n2102 = "日日姬用手指扒開了真闇姐的小穴。跟那對熟美的奶子不同，她的肉縫居然分外清秀，甚至透著一絲青澀之氣。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕は……ふたりの――\nふたりのおまんこを、並べて眺めて、見比べたい」\n1681 = "「我……想要把兩人的——把兩個小穴排在一起細細評判比對一番」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「だって。ねぇね。ね？　おねがいしても、よかと？」\n1779 = "「聽到了吧？那可以麻煩阿姐嗎？」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「う……うん。さわる、ね？　ひーちゃん。ん――」\n1586 = "「嗯……嗯。那姐姐要摸了哦？小日。嗯——」" \n\n# monologue\n# JP: 処女膜をいまだ守りつづけている姉の震える指が、\n幾百度と無く僕の精子を受け入れた妹の性器にそっと触れ。\n2218 = "至今仍守著處女膜的姐姐用顫動的手指，輕輕搭在了已經被我的精子反覆洗禮過數百遍的妹妹的性器之上。" \n\n# monologue\n# JP: （くっ――ちぃ――）\n2360 = "（咕——滋——）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んっ！」\n# 1602 = "「嗯！」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あっ！？　ひーちゃんっ！！？」\n1567 = "「啊！？小日！！？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「平気。ただ、気持ちよかっただけやけん。\n……こぎゃん感じに」\n1707 = "「我沒事。只是太舒服了咧。……就像這種感覺」" \n\n# monologue\n# JP: （さすっ）\n2475 = "（輕蹭）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「きゃうっ！！！？」\n# 1449 = "「呀！！！？」" \n\n# monologue\n# JP: 人差し指と薬指とで、大陰唇を広げたままに、\n日々姫の中指がそっと真闇姉のクリトリスを撫ぜる。\n2104 = "日日姬用食指和無名指分開大陰唇，再用中指輕輕愛撫真闇姐的蜜豆。" \n\n# monologue\n# JP: （さわっ――ふわっ――さすっ――そわっ）\n2473 = "（輕撫——輕蹭——輕撫——輕蹭——）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「やっ――ふっ――あっ――おねー、ちゃんっ――ぁっ、\nひーちゃんに――ひーちゃんの、指、に――クリトリス」\n1426 = "「呀——呼——啊——姐姐——啊，被小日——小日的手指——小豆豆」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「丁寧に優しく撫ぜられているな。真闇姉のおまんこは\n鮮やかなサーモンピンクで、いかにも未成熟なのに」\n1735 = "「日日姬的動作真是細緻溫柔。而真闇姐的小穴是鮮嫩的鮭肉色，看起來特別青澀」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「やっ！？　双ちゃん、言わないでっ！！　そぎゃん\n実況、されたら――おねえちゃんっ――恥ずかしすぎて」\n1457 = "「呀！？小雙你別說了！！被這樣即時解說的話，姐姐——太難為情了」" \n\n# monologue\n# JP: 姉妹、反応がとても似ている。\nゆえに、安心しきって言葉を続ける。\n1944 = "姐妹倆的反應非常相似。所以我就特別放心地繼續往下說。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫の指に、僕の言葉に興奮してくれてるのだろう。\n小さく控えめな膣口からは、愛液が溢れ出してきている」\n1420 = "「可能是被日日姬的手指和我的話語挑起了情慾。真闇姐小巧的穴口已經開始冒出愛液了」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んふふ。ねぇねぇ、乳首もびんびんに勃起しとると。\n私、ねぇねぇに喜んでもらえて、うれしかと」\n1598 = "「嗯呵呵。阿姐的乳頭也變得又硬又翹嚕。看到阿姐這麼享受，我也很開心」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「やっ。もう――いじわるっ――んっ――はっ――\nそぎゃん――いじわるな――ひーちゃんは――こうっ」\n1429 = "「呀。真是的——壞心眼——嗯——哈——像這樣——捉弄姐姐——小日——必須教訓一下」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃきゅんっ！！！！？」\n1612 = "「噫呀！！！！？」" \n\n# monologue\n# JP: 姉妹そろっておんなじ指の使い方をし、\nけれど日々姫の反応は、真闇姉より遥かに激しい。\n1948 = "姐妹的指法一模一樣，但是日日姬的反應遠比真闇姐來的激烈。" \n\n# monologue\n# JP: （しにゅっ――しぷっ――つぶっ――こしゅんっ）\n2419 = "（擺弄——彈動——輕按——刮蹭）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぉ……おっ――」\n1511 = "「哦……哦——」" \n\n# monologue\n# JP: 中指でクリトリスを虐める動き。あるいはこれは、\n真闇姉/日々姫の、それぞれの自慰のときの指使いなのか。\n2141 = "用中指戲弄肉豆的動作。這說不定就是，真闇姐／日日姬平日自慰時各自使用的指法。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふやっ！？　やっ！　ふっ――あっ――ああっっ！！\nねぇね――私――こんな――ふ、ぁっ――上手、すぎっ」\n1471 = "「呼呀！？呀！呼——啊——啊啊！！阿姐——我——這樣弄——呼、啊——太厲害了」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「そぎゃん、ほめられ、かた――ふっ――あっ――\nはずかし――くっ、てっ――んっ――嬉しく、なか、と」\n1801 = "「這樣，誇人——呼——啊——聽著——好羞人——根本——開心不起來」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「しかし、実際に上手いのだろう。真闇姉の愛撫で、\n日々姫の膣は、膣口は、ぱくぱく、ひくひく、喘いでる」\n1388 = "「不過實際上應該真的很厲害吧。真闇姐的愛撫，讓日日姬的肉穴和穴口不斷抽搐，一張一閉地喘息著」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んっ――ふっ！　ねぇねも――ねぇねぇ、もっ！！」\n1575 = "「嗯——呼！阿姐也——阿姐也必須懲罰！！」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ふやぁぁぁっ！？　ひ、ひーちゃっ――あっ！！！？」\n1467 = "「呼呀啊啊啊！？小、小日——啊！！！？」" \n\n# monologue\n# JP: （つりゅ！　しこっ！　ぷにゅっ！　こしゅっ！！）\n2420 = "（擺弄！套動！按壓！刮蹭！）" \n\n# monologue\n# JP: 日々姫の指の動きが変わる。あるいは爪で、あるいは潰し。\n僕が日々姫を愛するときに、使うそのままの指使いへと。\n2113 = "日日姬的手指動作發生了變化。她時而用指甲摳弄，時而用力按壓。這指法越來越接近我愛撫她時的動作。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひあっつ！？　あっ――やあっ！　こぎゃんっ――\nこぎゃんっ――つよ、かと――おねえちゃん――知らん」\n1445 = "「呀啊！？啊——呀啊！這樣弄——這樣弄——太強烈了——姐姐可——不管了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「よく見れば、真闇姉の膣口も、小さいながら、ぱくぱく\nひくひく喘いでいるな――たくさんのよだれを垂れ流し」\n1393 = "「仔細一看，真闇姐的穴口雖然小巧玲瓏，但也在顫抖著一張一合，喘個不停呢——好多口水從裡面流出來了」" \n\n# monologue\n# JP: 日々姫に効果てきめんなことは、確実に、真闇姉にも効く。\nそうと確信できるゆえ、耳元に口を思い切り寄せ――\n1958 = "對日日姬效果顯著的動作，對真闇姐也確實有效。我得到了這個結論之後，便把嘴緊貼在真闇姐的耳邊——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕の勃起を、僕の精子を、子宮の中に欲しがって。\n導こうとして必死になって、おねだりをしてくれている」\n1775 = "「真闇姐的子宮在渴求我的硬物和精子。它正在拚命央求著，想邀請我進入其中」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「やぁんっ！　あっ！？　ふあっ！　あっ！\nんぁっ――あああぁっ！！！」\n1436 = "「呀唔！啊！？呼啊！啊！嗯啊——啊啊啊啊！！！」" \n\n# monologue\n# JP: 日々姫は一切指をとめない。ゆるめない。\n真闇姉はもう涙目で、顔もぐちゃぐちゃになりそうで。\n2110 = "日日姬的手指一刻不停，毫不留情。真闇姐已經是梨花帶雨，臉都要哭花了。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「欲しいっ！　欲しかとっ！　ひーちゃ、ひーちゃんが\n許してくれるなら――双ちゃん、双ちゃんのおちんちん」\n1677 = "「想要！咱想要！小、小日，你不介意的話——小雙，小雙的肉棒」" \n\n# monologue\n# JP: 日々姫の目を見る。視線が重なる。日々姫が頷く。\nまるで日々姫が――姉とも、母とも思える微笑で。\n1998 = "我看向日日姬，我們的視線重合在一起。日日姬點了點頭，臉上帶著微笑——就像一位慈祥的姐姐或母親一樣。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「おねえちゃん！　双ちゃんの精子、精液――\n双ちゃんとの赤ちゃんも――すごく、ほしかとっ！！」\n1633 = "「姐姐好想要小雙的精子和精液——也好想要——生出小雙的寶寶咧！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「引き受けた」\n1668 = "「得令」" \n\n# monologue\n# JP: （ぐぶっ！！）\n2361 = "（咕噗！！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ぎゅふっ！！！！！？」\n1437 = "「呀唔！！！！！？」" \n\n# monologue\n# JP: 亀頭先端。その半分ほど挿れたところで止まってしまう。\nキツイ――キツイ。噛みつかれるような締め付けだ。\n2245 = "龜頭的前端剛插入一半就停了下來。好緊——太緊了。緊得好像被她咬住了一樣。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕は、[めと]娶ろう。真闇姉をも。日々姫の隣に。\nそうして、三人で夫婦になって、家族になろう」\n1773 = "「真闇姐也成為我的妻子吧。跟日日姬一起。然後三個人結為夫婦，組建家庭」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「やけんね？　どっちに赤ちゃんばできても――\nねぇねと私。ふたりがそろっておかあさんになると」\n1718 = "「所以啊，無論誰懷上了寶寶——阿姐和我都會一起成為媽媽的咧」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ぁ――ぁっ――あっ！！」\n1529 = "「啊——啊——啊！！」" \n\n# monologue\n# JP: （ふわっ）\n2359 = "（呼哇）" \n\n# monologue\n# JP: 真闇姉が涙をこぼしてしまう。\nキツすぎる噛みつきがいくらか緩み――絶妙になる。\n2187 = "真闇姐留下了眼淚。而死死咬住我的小穴也放鬆了幾分——這種緊度絕妙無比。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「なる、なります！　おねえちゃん――んっ――ふっ。\n双ちゃんの、ひーちゃんのお嫁さん――なり、ますっ」\n1491 = "「咱要、咱要當媽媽！姐姐——嗯——呼。要當小雙和小日的新娘——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ！」\n# 1602 = "「嗯！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！」\n# 1563 = "「啊！！！！」" \n\n# monologue\n# JP: （ずぶううううううっっ！　――ぷつっ！　ずりゅっっ）\n2432 = "（漸漸擠入！——頂破！滑入）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「～～～～～～～～～～～～～～～っ！！！！！」\n1571 = "「啊～～～～～～～～！！！！！」" \n\n# monologue\n# JP: ぷつりと小さな抵抗を切り、それでも勃起は止まらない。\n真闇姉の処女を奪った興奮で体が喜びきっているっ。\n2241 = "頂破一層小小的抵抗之後，硬物依然沒有停下。我的身體因為奪走了真闇姐的處女而陷入了狂喜狀態。" \n\n# monologue\n# JP: （ずりゅうううううううううううっ！！！　ごちゅっ！）\n2454 = "（繼續擠入！！！頂住！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ふぁぁぁぁぁぁぁぁぁぁぁっぁぁぁあああああっ！！」\n1477 = "「呼啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊啊！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ。ねぇねぇの子宮口って、このあたりなんだ」\n1546 = "「啊。阿姐的子宮口原來在這個位置啊」" \n\n# monologue\n# JP: （さすっ！！）\n2406 = "（捅入！！）" \n\n# 【真闇】\n# display as 真闇＆雙鐵\n# JP: 「きゃふうううっっ！！？」\n「くあっ！！！！！！」\n1434 = "「呀唔唔唔唔！！？」\\n「咕啊！！！！！」" \n\n# monologue\n# JP: （ぢゅるっ！　ずぶっ！　ぢゅるううっ！　ずこんっ！）\n2400 = "（抽出！擠入！抽出！頂入！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひあっ！？　あっ！　待って――待って――ね、\n双、ちゃん！？　おね、ちゃんっ――いっぱい――すぎ」\n1454 = "「呀！？啊！等等——等等——姐、小、小雙！？姐、姐姐裡面——塞得太滿」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「わかっている――がっ――止めら――れんっ！！！」\n1709 = "「我知道——可是——我——停不下來了！！！」" \n\n# monologue\n# JP: （ぢゅぶっ！　ばちゅっ！！　ずるっ！　こちゅんっ！）\n# 2400 = "（抽出！擠入！抽出！頂入！）" \n\n# monologue\n# JP: 日々姫の皮膚越しの一撫ぜで、ブレーキを完全に壊された。\n射精したい、射精する、妊娠させると、ただそれだけでっ。\n2119 = "日日姬隔著肚皮的一通愛撫，讓我完全剎不住車了。我想射精，射在裡面讓她懷孕，腦袋裡只剩下這個念頭。" \n\n# monologue\n# JP: （ずりゅ！　ごちゅっ！　ずりゅうっ！　ばちゅんっ！）\n2445 = "（磨蹭！抽插！磨蹭！抽插！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひ、ひーちゃん、――なら――ひーちゃんが、指――\n休、めてっ――っんっ！　おね、ちゃんっ、はじ、めて」\n1647 = "「小、小日——那麼——小日的手指——緩一下——！姐姐、畢竟是、第一次」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん。知っとった。にぃにぃ以外の男の人に、\nねぇねぇが、こころを、肌を、絶対許すわけがないけん」\n1603 = "「嗯，我知道。除了阿哥，阿姐是絕對不可能讓其他男人碰的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！！」\n# 1564 = "「啊！！！！！」" \n\n# monologue\n# JP: （ずにゅううっ！　ばちゅ！　ずぼっ！　ごちゅんっ！）\n# 2445 = "（磨蹭！抽插！磨蹭！抽插！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ほんならっ！　ほんならっ！　ふあっ！　やす、ませっ\n――あ！　もっと――おまんこ――処女、やけんっ！！」\n1805 = "「那就！那就！呼啊！讓咱，歇歇——啊！畢竟——我的小穴——是第一次啊！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ううん。休んだら、落ち着いちゃったら、痛み来るけん。\nねぇねには、最高に気持ちいい初体験ば、あげたいけん」\n1383 = "「不行。休息的話，緩過來的話，就會感到疼痛了。而我想讓阿姐獲得一次最最舒服的初體驗」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！！」\n# 1564 = "「啊！！！！！」" \n\n# monologue\n# JP: （ずぼっ！　ぶちゅんっ！　ずりゅっ！　ぢゅぶうっ！）\n2405 = "（捅入！抽插！磨蹭！抽插！）" \n\n# monologue\n# JP: 日々姫に処女を捧げてもらった、あの夜のことを思い出す。\nあのときは――ああ――日々姫を痛がらせてしまった、が。\n1981 = "我想起了日日姬把處女獻給我的那一夜。那時——是啊——我弄痛了日日姬啊。" \n\n# monologue\n# JP: （ぬりゅうううううううううううっ――くっ――くっ）\n2426 = "（深入——蹭——蹭）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひゃきゅっ！！！！？」\n1438 = "「呀唔！！！！？」" \n\n# monologue\n# JP: ああ、やっぱりだ。日々姫とそっくり同じ部分が。\nおまんこの天井浅いところが、粒立っている。\n1913 = "啊，果然如此。這個部分跟日日姬一模一樣。在肉穴前部的頂上有塊顆粒狀的部位。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あはっ、うれし。ねぇねぇもここ、感じるとね？」\n1549 = "「啊哈，真開心。阿姐的這裡也很敏感呀」" \n\n# monologue\n# JP: （さわっ――さすっっ――こしゅっ――なぜぇ――）\n2474 = "（輕觸——戳弄——磨蹭——撫摸——）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひゃっ！！？　そこっ！　しらないっ！？　ふ、あっ、\nらめっ！　らめっ！　おねえひゃ――おねえちゃっ！！」\n1450 = "「呀！！？那裡！不是的！？呼、啊、不行！不可以！姐姐——姐姐要！！」" \n\n# monologue\n# JP: （きゅうううううううううううううっっっ！！！！）\n2356 = "（劇烈收縮！！！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くあっ！！！！」\n1520 = "「唔啊！！！！」" \n\n# monologue\n# JP: 日々姫の撫ぜで、真闇姉の膣が完全に女のものと開花する。\n僕の精子を絞りとるため、不器用ながらも蠢きはじめっ。\n2115 = "日日姬的撫觸，讓真闇姐的小穴完全蛻變成了女人的嬌艷之物。它為了榨取我的精液，開始笨拙地蠕動起來" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くっ！」\n1464 = "「呃！」" \n\n# monologue\n# JP: （ずりゅっ！　じゅぶううううううっっ！　ごちゅっ！）\n2446 = "（磨蹭！長驅而入！頂住！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひゃあああっ！？　そうちゃ、ひーちゃんっ！　あ！\nふっ！　ん！　おねえちゃ！　イク！　いっちゃうけん」\n1443 = "「呀啊啊啊！？小雙，小日！啊！呼！嗯！姐姐！要去了！要去了咧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「大丈夫。にぃにも、ほとんどイキかけとるけん」\n1754 = "「沒關係。阿哥也基本快要憋不住了」" \n\n# monologue\n# JP: （さすっ――さわっ――くりゅっ――さわっ）\n2389 = "（戳弄——輕觸——磨蹭——撫摸——）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「そぎゃん！？　そぎゃんと！？\nそれっ――ならっ――それ、ならぁっ！！！！」\n1747 = "「是嗎！？真的嗎！？那——就——那就！！！！」" \n\n# monologue\n# JP: （きゅんっ！　きゅきゅっ！！！）\n2453 = "（縮緊！劇烈收縮！！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くあっ！！」\n1461 = "「呃啊！！」" \n\n# monologue\n# JP: （ずりゅっ！　ばちゅっ！　ずりゅう！ごちゅっ！！）\n2399 = "（抽出！插入！抽出！插入！）" \n\n# monologue\n# JP: 日々姫の指が、囁きが、真闇姉を女へと調律していく。\n不自然に離れあってた時間を、距離を、こころを埋めて。\n2211 = "經過日日姬的手指和低聲細語的調律，真闇姐慢慢向女人進行轉變。彼此間若即若離的時間、空間以及內心也漸漸拉近。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん。ね？　聞かせて？　ねぇね。にぃにの精液。\nおまんこのなかの、どこに、ほしかと？」\n1589 = "「嗯。來，說給我聽吧，阿姐。你小穴的哪裡渴望著阿哥的精液咧？」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「子宮！　子宮、にっ！　一番、奥っ！　にっ！　ん！\n精子――双ちゃっ――のっ！　精液、ほし、かとっ！！」\n1641 = "「子宮！子宮想要！想要被射進！最深處！精子——小雙的！想要他的精液咧！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！！！！！！！」\n# 1565 = "「啊！！！！！！！！！」" \n\n# monologue\n# JP: （ずびゅうっ！　ばちゅ！　ずりゅびゅ！　ごちゅっ！）\n# 2399 = "（抽出！插入！抽出！插入！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あっ！　あっ！　あっ！　あっ！\nあっ！　あっ！　あっ！　ああっ！！！！！」\n1559 = "「啊！啊！啊！啊！啊！啊！啊！啊啊！！！！！」" \n\n# monologue\n# JP: 一突きごとに、隙間が埋まる。僕らは家族に――\nとっくのとうに在るべだった、ほんとの形に戻ってく。\n2132 = "每插入一次，彼此的距離就更近一分。我們漸漸變回了一家人——變回了原本該有的形態。" \n\n# monologue\n# JP: （ずぶっ！　ごちゅうっ！　ずびゅっ！！　ぐりゅっ！）\n# 2399 = "（抽出！插入！抽出！插入！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ♪」\n1543 = "「啊♪」" \n\n# monologue\n# JP: 日々姫の嬉しそうな声。\n視線をかわす、ことばをかわす、その必要さえもう無くて。\n2105 = "日日姬發出欣喜的聲音。我們甚至已經不需要用眼神，用話語來交流了。" \n\n# monologue\n# JP: （ずりゅううううううううううううううっっっっ！！）\n2481 = "（長驅直入！！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひゃっ――ぁっ！　あっ！　ああああっ！！！」\n1427 = "「呀——啊！啊！啊啊啊啊！！！」" \n\n# monologue\n# JP: （ぶりゅううううううううううっっ！　ごぢゅううっ！）\n2428 = "（深深滑入！擠壓！）" \n\n# monologue\n# JP: （とんっ！）\n2458 = "（觸底！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひゅあああああああああああああああああああんっ！」\n1440 = "「呀啊啊啊啊啊啊啊啊！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「んぎゅっ！！！！」\n1601 = "「嗯噶！！！！」" \n\n# monologue\n# JP: （ぶびゅうっ！　びゅるっ！　びゅぶっ！　ぶゅっ！）\n2372 = "（噗咻！咻嚕！咻噗！噗咻！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「～～～～～～～～っ！！！」\n1458 = "「呀～～～～～～～！！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んふふふふっ。たくさん精液出しとーと？\nいいこ、いいこ、いいこ、いいこ」\n1599 = "「嗯呵呵呵呵。射了很多精液出來吧？乖孩子，乖孩子，乖孩子，乖孩子」" \n\n# monologue\n# JP: （なぜ、なぜ、さす、さすうっ）\n2476 = "（輕輕撫摸，慢慢戳弄）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぉぉぉぉぉぉおぉぉぉっっ！！！」\n1611 = "「噢噢噢噢噢噢噢噢！！！」" \n\n# monologue\n# JP: （びゅりゅっ！　ぶうっ！　びゅりゅっ！　どびゅっ！）\n2377 = "（噗咻！噗唔！噗咻！嘟咻！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ふあっ――あっ――（ごきゅっ）――んっ――これ、\nが――せい、えきっ――そう、ちゃん――のっ――！」\n1474 = "「呼啊——啊——（舔舌頭）——嗯——這就是，小雙的——精液——！」" \n\n# monologue\n# JP: （びゅううっ！　ぶっ！　びゅるるっ！　びゅううっ！）\n2366 = "（咻嚕嚕！噗！咻嚕嚕！咻嚕嚕！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「はぁっ！　はあっ！　はあっ！　はあっ――」\n1788 = "「蛤啊！蛤啊！蛤啊！蛤啊——」" \n\n# monologue\n# JP: （びゅっ――びゅるるっ――ぶびゅっ――――ぴ……）\n2363 = "（咻——咻嚕嚕——噗咻——咻……）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「――ん？　あ……。\nにぃにの射精、おわっちゃったと？」\n1045 = "「——嗯？啊……阿哥的射精結束了嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いいや。まだだ。まだ、半分だ」\n1382 = "「不。還沒有。還差一半」" \n\n# monologue\n# JP: （ずりゅううううううっ！！　すぽっ！　ぐちゅんっ！）\n2346 = "（不斷擠入！！滑入！插入！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃぐっ！！！！！？」\n1431 = "「呀咕！！！！！？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕は、ふたりをっ、妊娠、させるっ――絶対、必ず、\n日々姫も――真闇――姉にも――僕の、こどもをっ――」\n1714 = "「我，會讓你們倆，懷孕——一定會無論是日日姬——還是真闇姐——都會懷上，我的孩子——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぁっ――ぁっ――あっ――あっ！！！」\n1528 = "「啊——啊——啊——啊！！！」" \n\n# monologue\n# JP: （きゅううううううううううううううんんっっっ！！）\n2358 = "（劇烈收縮！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くはっ！！」\n1485 = "「咕哈！！」" \n\n# monologue\n# JP: 真闇姉と僕とのセックスによほど興奮していたのだろう。\nどろどろだった日々姫の膣が急にぴちぴち締め付けてくる。\n2144 = "目睹了真闇姐和我做愛的日日姬似乎已經異常興奮，她原本軟嫩的小穴忽然一陣一陣的收縮起來。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「嬉しっ――うれしいっ！　うれしいっ！　うれしいっ！\nにぃにっ！　そうしてっ！　ぜったい！　そう、してっ」\n1696 = "「我好高興——太高興了！太高興了！太高興了！阿哥！請這麼做吧！一定要這麼做」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それがっ、日々姫の、願い、で、あれば、僕は、叶える。\n今まで、だって、これから、だって、かわりっ、なく」\n1627 = "「如果，是日日姬的，願望，我必定會實現它。過去如此，往後也不會改變」" \n\n# monologue\n# JP: （ずりゅっ！　ごちゅっ！　ずぼっ！！　ぶちゅっっ！）\n2409 = "（插入！抽出！插入！！抽出！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うれしい！　うれしぃい！！　しゅき！　好きっ！\n好きっ！　好きっ！　にぃに！　大好き！　大好きぃ！」\n1623 = "「好開心！太開心了！！我喜歡！喜歡你！我愛！愛！愛阿哥！最最愛你了！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕も、日々姫が大好きだ――愛してる。\nその上で――っ――ここから――先、には――」\n1689 = "「我也最喜歡日日姬了——我愛你。並且——從今以後——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あっ！！」\n# 1561 = "「啊！！」" \n\n# monologue\n# JP: 貫かれながら、腰の動きにゆすられながら、日々姫が頷く。\n1925 = "在我挺腰衝刺的劇烈晃動之中，日日姬點了點頭。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「真闇姉、の――力も――必要、だっ――くっ！　僕らは\n――三人で――セックスをして――家族に、なる、ゆえ」\n1390 = "「也需要——真闇姐的，幫助——呃！因為我們——要三個人——一起做愛——一起成為，家人」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「う、うん。するっ！　セックス、おねえちゃんも――\nばってん――ついさっきまで……処女やった、けん――」\n1588 = "「嗯、嗯。我會的！做愛的事，姐姐也會幫忙——不過——姐姐直到剛剛……還是處女——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あの、ね？　ねぇ、ね」\n1782 = "「聽我說，阿姐」" \n\n# monologue\n# JP: （きゅううううううんっ！！）\n# 2358 = "（劇烈收縮！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！」\n# 1562 = "「啊！！！」" \n\n# monologue\n# JP: 甘い囁きが零れると同時、日々姫の膣も甘くわななく。\n1885 = "伴隨著日日姬的甘甜低吟，她的小穴也美美地顫抖了起來。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わたしが――さっき――ねぇねに、した、こと――\nおんなじ、こと、ば――して――ほしか」\n1686 = "「我也想試試——剛才——我對姐姐——做過的事咧」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あ……うん。ええと――たしか――」\n1538 = "「啊……嗯。呃——應該是這樣——」" \n\n# monologue\n# JP: （ずりゅうううううううっ！　ごりゅんっっっっ！！）\n2416 = "（擠壓！磨蹭！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふきゅっ！！！？」\n1469 = "「呼呀！！！？」" \n\n# monologue\n# JP: 亀頭の位置を伝えたくって、いままで経験ないほどに、\n深く強く思い切り、日々姫の膣内をえぐりあげればっ。\n1988 = "我為了表明龜頭所在的位置，用日日姬從未體驗過的力度，又深又猛烈地刮蹭起日日姬的穴壁。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あ――ここ？　こお？」\n1532 = "「啊——是這裡？這樣嗎？」" \n\n# monologue\n# JP: （さすうううううっ――なでええええええええっっ）\n2388 = "（戳弄——撫摸——）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふやっ！？　あっ？　あっ――あっ！！！？」\n1472 = "「呼呀！？啊？啊——啊！！！？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くあっ！！！！？」\n1463 = "「呃啊！！！！？」" \n\n# monologue\n# JP: 日々姫の腹ごし膣壁ごしでも、手の感触はまるで違う。\n成熟しきった真闇姉の女の肌は、吸い付くようで――\n1905 = "即便是隔著日日姬的肚皮和穴壁，我依然感受到了截然不同的手的觸感。真闇姐那成熟女人的肌膚有種魔性的吸附感——" \n\n# monologue\n# JP: （ずりゅうううううううっ！！！　んごきゅつううう！）\n（さすっ――さわっ――なぜっ――さしゅっ）\n2417 = "（擠壓！磨蹭！！）（輕觸——戳弄——磨蹭——撫摸——）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃうううううう～～～っ！？　んっ！！　しょれっ\n――それっ――やっぱり――ちょっ――まっ――っ！？」\n1432 = "「呀唔唔唔唔唔～～～！？嗯！！那裡——那裡——還是——先——緩緩——！？」" \n\n# monologue\n# JP: （ぞにゅううううううう！！　ごっぢゅううううん！！）\n2440 = "（用力擠壓！！用力刮蹭！！）" \n\n# monologue\n# JP: （なぜぇええええっ――さすっ！　もみゅっ！　すりっ）\n2443 = "（磨蹭——戳弄！搓揉！輕觸）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃあああああっ！？　ふ！　ひゃっ！？　ん――\nふあっ！　あっ！　あああああっ！　らめっ、なのっ」\n1441 = "「呀啊啊啊啊啊！？呼！呀！？嗯——呼啊！啊！啊啊啊啊啊！我不行了」" \n\n# monologue\n# JP: 日々姫の匂いが部屋いっぱいに充満してる。\n甘い匂いと汗の匂いと女の匂いが、僕を一層駆り立てる。\n2109 = "日日姬的味道充滿了整個房間。甜味、汗味、女人味，讓我越來越興奮起來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「真闇姉。今度は、こっちを手伝ってくれ」\n1770 = "「真闇姐。這次來這邊弄」" \n\n# monologue\n# JP: （ずりゅうううううううっ！！　ぐしゅっ！　ぐりゅっ）\n2439 = "（用力擠壓！！刮蹭！刮蹭）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひっ！？　やっ！？　しょこっ！　やらっっ！！？」\n1486 = "「咦！？呀！？好強烈！討厭！！？」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひーちゃん、ここば、そぎゃんよかと？」\n1657 = "「小日，這裡就這麼舒服咧？」" \n\n# monologue\n# JP: （ぐいっ！　なぜえええええっ！！）\n2435 = "（用力按壓！撫摸——！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゅっ！！！？　～～～～～～～～～～っ！！！！」\n1439 = "「呀唔！！！？哇～～～～～～！！！！」" \n\n# monologue\n# JP: （きゅううううううううううううっっっっっっっ！）\n2353 = "（劇烈收縮——！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くっ！　あ！！！！！！」\n1466 = "「呃！啊！！！！！！」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「えっ！？　えっ！？　えっ！？　いまのでっ！！？」\n1507 = "「哎！？哎！？哎！？剛才那是！！？」" \n\n# monologue\n# JP: 日々姫がイった。膣道は精液を搾り取ろうと締め付ける。\nがっ！\n2123 = "日日姬高潮了。她的小穴陣陣收縮，想要榨取精液。不過！" \n\n# monologue\n# JP: （ずりゅっ――ぶぢちゅううううううっ！　ごぢゅっ！）\n2396 = "（抽出——深深擠入！擠滿！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひっ！　あっ――かはっ！　こほっ！　ふあっ――\nに――にぃに――まっ――れっ――あっ！！！！」\n1447 = "「呀！啊——噶哈！咳咳！呼啊——啊——阿哥——等——等等——啊！！！！」" \n\n# monologue\n# JP: （ずりゅうっ！　ごちゅっ！　ずぶうっ！　ぶぢゅっ！）\n2398 = "（抽出！插入！抽出！捅入！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「えとっ！？　ええと――えと！　――これでよかっ？」\n1804 = "「那個！？呃——那個！——這樣就行了咧？」" \n\n# monologue\n# JP: （なぜっ！　さすっ！　もみゅっ！　なぜっ）\n2414 = "（撫摸！戳弄！搓揉！撫摸）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふあぁぁぁっぁぁぁぁぁぁぁぁぁぁぁぁぁぁん！！！」\n1478 = "「呼啊啊啊啊啊啊啊啊啊啊！！！」" \n\n# monologue\n# JP: （きゅううううううんっ！　きゅんっ！　きゅきゅっ！）\n2354 = "（劇烈收縮！收緊！收緊！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くっ！　あっ！！！！！」\n1465 = "「呃！啊！！！！！」" \n\n# monologue\n# JP: （ずりゅうっ！　ごちゅ！　づびゅうっ！　ごりゅっ！）\n# 2398 = "（抽出！插入！抽出！捅入！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ！　――ぁっ――ひあっ！　あっ――はっ！！」\n1551 = "「啊！——啊——呀啊！啊——哈！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫！　日々姫！　もう少し――だからっ！　っ！\nちゃんと――日々姫の――子宮に――全部っ！　精液を」\n1736 = "「日日姬！日日姬！馬上——就好了！呃！我會吧——日日姬的——子宮——全部灌滿精液的！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「――っ」\n1042 = "「——」" \n\n# monologue\n# JP: （ずりゅうっ！　ごちゅっ！　ずびゅう！　ごちゅっ！）\n# 2398 = "（抽出！插入！抽出！捅入！）" \n\n# monologue\n# JP: 日々姫はもうガクガクゆすられ頷くばかりだ。けれども\n膣はピチピチぎゅうぎゅうはしゃぎ喜び抱きついてくる。\n2086 = "日日姬已經被插得無法自己，任憑身體晃動的她只剩下點頭回應的力氣。然而她的小穴卻在一陣陣收縮中纏了上來。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ひーちゃん、がぁんばれ。そーちゃん、がぁんばれ」\n1655 = "「小日，加油。小雙，加油」" \n\n# monologue\n# JP: （なぜぇっ――さすうううっ――なぜぇ――そわあっ）\n2413 = "（撫摸——戳弄——撫摸——輕觸）" \n\n# monologue\n# JP: 真闇姉の皮膚越し亀頭なぜなぜが、攻めるものから\n癒やし慰める動きに変わる。それがあまりに気持ちよくっ。\n2204 = "真闇姐隔著肚皮的龜頭按摩不再具有攻擊性，而是轉變為安撫療癒的輕柔動作。她的手實在太舒服了。" \n\n# monologue\n# JP: （ずびゅううっ！　ごちゅっ！　ずぶう！　ごりゅっ！）\n# 2398 = "（抽出！插入！抽出！捅入！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「はぁっ！　はあっ！　はあっ！　はあっ！！！！」\n1790 = "「蛤啊！蛤啊！蛤啊！蛤啊！！！！」" \n\n# monologue\n# JP: 姉のなぜなぜに励まさて、妹の締め付けに煽られて、\n精液たちが亀頭から睾丸全部に、みちみち詰まる。\n1923 = "在姐姐的手部按摩的鼓勵下，在妹妹的緊緻小穴的挑動下，從龜頭到睪丸已經被精液擠得滿滿當當。" \n\n# monologue\n# JP: （ずびゅう！　ごちゅ！　ずにゅぶっ！　ごりゅん！）\n# 2398 = "（抽出！插入！抽出！捅入！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あっ！　ふあっ！　あっ！！！　んウゥゥぅ～っ！！」\n1555 = "「啊！呼啊！啊！！！嗯唔唔唔唔～！！」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「がーんばれ、がーんばれ、\nたくさん射精、受精、がーんばれ」\n1418 = "「加油，加油，多射一點出來，努力受精吧」" \n\n# monologue\n# JP: （ずりゅっ！　ごちゅっ！　ぢゅぼっ！　ばちゅっ！！）\n# 2398 = "（抽出！插入！抽出！捅入！）" \n\n# monologue\n# JP: 鼓膜から脳に精液に、真闇姉の応援が浸透していく。\n絶対に妊娠させるさせられる――精液たちが沸き立って！\n2193 = "真闇姐的助威聲從鼓膜沁入了我的大腦和精液之中。精液們都躊躇滿志——不讓日日姬懷上就決不罷休！" \n\n# monologue\n# JP: （ずりゅうううううううううううううううううっっ！！）\n2344 = "（一捅到底！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふきゅっ！！！」\n1468 = "「呼呀！！！」" \n\n# monologue\n# JP: （きゅううううううっっ！！！）\n2357 = "（劇烈收縮！！！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あっ！？　イクとねっ！！？」\n1568 = "「啊！？要射了吧！！？」" \n\n# monologue\n# JP: （ぶぢゅうううううううううううっ！！！　ごりゅっ！）\n2441 = "（用力頂入！！！磨蹭！）" \n\n# 【真闇】\n# display as 真闇\n# JP: 「えいっ！」\n1505 = "「哎！」" \n\n# monologue\n# JP: （もみゅんっ！！！）\n2438 = "（用力搓揉！！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「きゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅうううううん！！」\n1446 = "「呀嗚嗚嗚嗚嗚嗚嗚嗚！！」" \n\n# monologue\n# JP: （ぎちゅううううううううううううっ！！！！！！！）\n2355 = "（劇烈收縮！！！！！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くあっ！！！！」\n1462 = "「呃啊！！！！」" \n\n# monologue\n# JP: （びゅぶっ！　どびゅうっ！！　びゅぶっ！　ぶびゅ！）\n2364 = "（咻噗！嘟咻！！咻噗！噗咻！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぁっ――ぁっ――ぁっ――ぁっ――」\n1527 = "「啊——啊——啊——啊——」" \n\n# monologue\n# JP: 日々姫がトンでる。放心してる。\nまなこがうつろで、半開きの口からよだれが垂れてる。\n2117 = "日日姬進入了放空的狀態。她的瞳孔失去神采，口水從半開的櫻唇直直流下。" \n\n# monologue\n# JP: （ぶううっ！　びゅるっ！　びゅぶっ！　ぶぢゅっ！！）\n2368 = "（噗咕咕！咻嚕！咻噗！噗咻！！）" \n\n# monologue\n# JP: その子宮へと、思いっきりに種つけている。\n子宮口に亀頭を密着させたそのままいても――\n1976 = "我則盡情地往她的子宮裡播種。哪怕在龜頭緊貼著子宮口的這個當口——" \n\n# 【真闇】\n# display as 真闇\n# JP: 「がぁんばれ、がぁんばれ」\n1416 = "「加油，加油」" \n\n# monologue\n# JP: （もみっ――もみっ――さすっ――さすっ――）\n2410 = "（搓揉——搓揉——戳弄——戳弄——）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぅっ――あっ――」\n1512 = "「唔——啊——」" \n\n# monologue\n# JP: （びゅるっ！　びゅうっ！　ぶっ！　びゅうっ！）\n2380 = "（噗嚕！噗咻！噗！咻咻！）" \n\n# monologue\n# JP: 真闇姉の献身的すぎるサポートが、\n僕の精液、尿道口に残ろうとするひとしずくまで――\n2196 = "真闇姐盡心盡力的支援，把我殘存在尿道口的最後一滴精液也——" \n\n# monologue\n# JP: （びゅっ――ぶびゅっ――びゅる…………ぴゅ……）\n2370 = "（噗咻——嘟咻——咻嚕……咻……）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぶはあっ！！！」\n1609 = "「噗啊！！！」" \n\n# monologue\n# JP: 射精しつくした瞬間に、僕も完全に脱力しきり。\n真闇姉と日々姫の間に、崩れ落ちるしかできなくな――\n1953 = "射完精的一瞬間，我也徹底耗盡了體力。我只能無力地躺倒在真闇姐和日日姬之間——" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あ……まって、双ちゃん。\nもーちょっとだけ――がんばれると？」\n1542 = "「啊……等等，小雙。你能夠——再努力一下嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむっ！？」\n1523 = "「唔嗯！？」" \n\n# monologue\n# JP: 全身全霊の残る力を振り絞りきってなんとか耐える。\n最愛の姉で、いま女にした、その人の頼みなのだから。\n1990 = "我用盡全身上下所剩無幾的力量總算是穩住了身體。畢竟是剛剛被我變為女人的，最愛的姐姐的請求。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なんだ、どうした、真闇姉」\n1672 = "「怎麼了？真闇姐」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「どっか、痛むと！？　それか、なんか、いやなこと」\n1749 = "「是有什麼地方痛嗎！？還是說有什麼不開心的事」" \n\n# monologue\n# JP: 正気を取り戻した日々姫のひどく慌てた声に、\n真闇姉はごくごく穏やかに首をふる。\n1919 = "回過神來的日日姬的聲音非常慌張，而真闇姐只是非常平靜地搖了搖頭。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ううん。うれしいことしかなかとよー。\nやけん、やけんね？　よくばりだけど、おねえちゃん」\n1380 = "「不。咱高興還來不及呢——可是，可是啊。姐姐是個很貪心的人」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむ？」\n1605 = "「嗯？」" \n\n# monologue\n# JP: 真闇姉の手招きに応じ、耳を近づける。\n2149 = "看到真闇姐招了招手，我便把耳朵湊了過去。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「そーちゃんとひーちゃんの、ね？\nお嫁さんにしてもらう誓いのキスば、ほしくって」\n1659 = "「小雙和小日呀。我想得到你們要娶我當新娘的誓約之吻」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ねぇねっ！　にぃにっ！\nんーーーーちゅっ！！！　ちゅううううっ！！！！」\n1818 = "「阿姐！阿哥！嗯————啾！！！啾唔唔唔唔！！！！」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「あっ！」\n# 1552 = "「啊！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「むっ！！！」\n1524 = "「唔！！！」" \n\n# monologue\n# JP: 全開笑顔で日々姫がキスする。真闇姉へと、次いで僕へと。\n2089 = "日日姬帶著滿面的笑容依次親了過來。先是真闇姐，再來是我。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ん――れるっ――ぷあっ」\n1577 = "「嗯——滋溜——噗啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n# 1552 = "「啊！」" \n\n# monologue\n# JP: 日々姫の舌が僕の舌先をほんの一瞬、舐めて甘える。\n2096 = "日日姬撒嬌地在我的舌尖上舔了一口。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そしたら今度は。にぃに、ねぇねに、誓いのキスば」\n1719 = "「接下來呢。該阿哥和阿姐進行誓約之吻了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うん」\n# 1595 = "「嗯」" \n\n# monologue\n# JP: 教会でもなく、神社でもなく。神父も牧師も神主もなく。\nけれども僕たち三人は、それぞれ最高の証人だから。\n1864 = "不在教會，不在神社。沒有神父、牧師，也沒有神主在場。但是我們三人就是彼此最完美的見證人。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「真闇姉」\n1771 = "「真闇姐」" \n\n# monologue\n# JP: 言葉は、こころのままに任せる。\n考えないよう、飾らないよう。ただそれだけを意識する。\n2002 = "我選擇說出心聲。不加思考，不做掩飾。完全平心而言。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫と並んで、僕の妻となってほしい。\n日々姫と僕ともう一度――三人家族に、なってほしい」\n1702 = "「我懇請你能跟日日姬一起，成為我的妻子。懇請你能跟日日姬和我——重新組成三人的家庭」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「っ！　～～～～～………………。\n…………………………………………………はいっ！！！」\n1557 = "「啊！唔～～～～～………我願意！！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「おめでとにぃに！　おめでとねぇね！　\nおめでとっ！　私っ！！！」\n1676 = "「恭喜阿哥！恭喜阿姐！還有恭喜我自己！！！」" \n\n# monologue\n# JP: 世界最高の祝福の声に包まれて。\n僕たちは――キスを交わして――\n1921 = "在世界上最棒的祝福聲的簇擁下，我們——吻在了一起——" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ん……あ……んっ――ちゅっ――……ぷぁっ」\n1581 = "「嗯……啊……嗯——啾——噗啊」" \n\n# monologue\n# JP: ――そうして再び、三人家族を組み直す。\n1037 = "——於是我們再一次組成了三口之家。" \n