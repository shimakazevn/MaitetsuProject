# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1314 = "「哦，這個啊」" 

# monologue
# JP: 確かに、義父と約束をした。\nなんだか随分、遠い昔のことに思えるが。
2088 = "我確實和義父做過約定。總感覺好像是很久以前的事了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういえばそんな話もあったな」
1612 = "「說起來是有這麼一回事」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1307 = "「哎！？」" 

# monologue
# JP: 日々姫の目がまんまるくなる。\nよほど驚かせてしまったようだが――
2177 = "日日姬睜圓了眼睛，看起來非常吃驚。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。\n完全に失念してしまっていたのでな」
1378 = "「對不起，我完全忘記了」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　あの……」
1309 = "「哎？那……」" 

# monologue
# JP: わたわた、手までが動いている。
2155 = "日日姬手足無措。" 

# monologue
# JP: 動揺という文字を形になおせば、\nそれはまさしく、今の日々姫に違いない。
