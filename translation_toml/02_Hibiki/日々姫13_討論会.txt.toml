1527 = "「由我來打電話，我和小凪分頭打電話聯繫同行。我去問媽媽借名冊」" 

# 【凪】
# display as 凪
# JP: 「そう決まったら、いそぐばいっ！」
1470 = "「既然決定咧，那咱們走吧！」" 

# 【ふかみ】
# display as 深美
# JP: 「わ、あ！　う、うんっ！\n双鉄さん――行ってきます、です！」
