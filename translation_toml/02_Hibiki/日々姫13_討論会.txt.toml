# lines: 421 
# 【ポーレット】
# display as 波萊特
# JP: 「……いいですね。\n日々姫ちゃん、すごく落ち着いてる」
994 = "「……Tốt quá rồi.\nEm Hibiki đang rất bình tĩnh.」"

# monologue
# JP: 討論会の第一部となる、個別演説。
2447 = "Phần đầu tiên của cuộc tranh luận, diễn\nthuyết cá nhân."

# monologue
# JP: 生年月日の遅いものからということで、\n日々姫は一番最初の演説順となってしまった。
2245 = "Vì thứ tự diễn thuyết được xếp theo ngày\ntháng năm sinh từ muộn nhất trở đi,\nnên Hibiki đã trở thành người diễn thuyết\nđầu tiên."

# 【日々姫】
# display as 日日姬
# JP: 「政治について、今まで深くは考えていませんでした。\nけど、御一夜の町を私はずっと、見続けて来ました」
1596 = "「Về chính trị, từ trước đến nay tôi chưa\ntừng suy nghĩ sâu sắc.\nNhưng, tôi vẫn luôn dõi theo thị trấn\nOhimitera này.」"

# monologue
# JP: が、トップバッターの重圧に負けず、\n等身大の日々姫の言葉で、日々姫は演説を重ねていく。
1872 = "Tuy nhiên, không chịu khuất phục trước áp\nlực của người mở màn,\nHibiki tiếp tục bài diễn thuyết bằng những\nlời lẽ chân thật nhất của bản thân."

# 【日々姫】
# display as 日日姬
# JP: 「――このレイアウトは、みなさんの手によって作られた、\nみなさんが描いてくれた、御一夜の未来図です」
955 = "「――Sa bàn này được tạo ra bởi chính bàn\ntay của mọi người,\nlà bức tranh tương lai của Ohimitera do\nmọi người vẽ nên.」"

# monologue
# JP: 演壇前には、レールショップから運搬してきたレイアウト。\n通電の許可も、無事にもらえた。
2243 = "Trước bục diễn thuyết là sa bàn được vận\nchuyển từ cửa hàng đường sắt tới.\nChúng tôi cũng đã thuận lợi xin được giấy\nphép cấp điện."

# monologue
# JP: レイアウト内では、環状線となった湯医線上を、\n\x%l8620;#00ffc040;8620%l;#;と\x%lキハ07;#00ffc040;キハ07%l;#;sとが、それぞれに新\x%l客車;#00ffc040;客車%l;#;を引いている。
1964 = "Bên trong sa bàn, trên tuyến Yui đã trở\nthành tuyến vòng,\n\\x%l8620;#00ffc040;8620%l;#; và \\x%lキハ07;#00ffc040;KiHa 07%l;#;S đang lần lượt kéo theo \\x%l客車;#00ffc040;toa hành khách%l;#;\nmới."

# 【凪】
# display as 凪
# JP: 「お客さんたち、めちゃくちゃレイアウト見とるばい」
1346 = "「Khán giả đang nhìn sa bàn chăm chú lắm\nnè.」"

# monologue
# JP: 日々姫の演説が終わり次第に、\nレイアウトを素早く分割・撤収しなければならない。
2170 = "Ngay khi bài diễn thuyết của Hibiki kết\nthúc,\nchúng tôi phải nhanh chóng tháo dỡ và dọn\ndẹp sa bàn."

# monologue
# JP: ゆえに僕らは控え通路でスタンバイしている。
2093 = "Do đó, chúng tôi đang đứng chờ sẵn ở lối\nđi hậu trường."

# 【凪】
# display as 凪
# JP: 「こぎゃん食い付きなら！」
1401 = "「Với sự chú ý cỡ này thì!」"

# 【双鉄】
# display as 雙鐵
# JP: 「凪、声」
1266 = "「Nagi, nhỏ tiếng thôi.」"

# 【凪】
# display as 凪
# JP: 「ゎうっ！？　すまんばいっ」
1320 = "「Oái!? Xin lỗi nha.」"

# monologue
# JP: 控えに誰かがいることを悟られ気にされてしまっては、\n聴衆の気を、日々姫の演説から散らしてしまいかねない。
2411 = "Nếu để khán giả nhận ra và bận tâm đến\nviệc có người ở hậu trường,\nthì có thể sẽ làm họ phân tâm khỏi bài\ndiễn thuyết của Hibiki."

# monologue
# JP: （――なにせ、相手は宝生稀咲だ）
2491 = "（――Dù sao thì, đối thủ cũng là Houshou\nKisaki）"

# monologue
# JP: 僕らに向けて吹いてる風を、変えようとしての討論会。\n必勝の体勢を、既に整えているに違いない。
2347 = "Một cuộc tranh luận nhằm thay đổi chiều\ngió đang thổi về phía chúng tôi.\nChắc chắn cô ấy đã chuẩn bị sẵn sàng tư\nthế tất thắng rồi."

# monologue
# JP: 付け込む隙をほんの僅かにでも見せてしまえば、\n必ず稀咲は、そこに食い付き、喰い破ってくる。
1931 = "Chỉ cần để lộ ra một chút sơ hở nhỏ nhoi\nthôi,\nchắc chắn Kisaki sẽ bám lấy và xé toạc nó\nra."

# monologue
# JP: （小手先の技でどうこう出来る相手ではない。\n万全を尽くし全力で臨む。その他に出来ることはない）
2512 = "（Đó không phải là đối thủ có thể đối phó\nbằng những mánh khóe nhỏ.\nPhải dốc hết toàn lực để đối mặt. Ngoài ra\nkhông còn cách nào khác）"

# monologue
# JP: 真闇姉の授けてくれた作戦は、ただ、\n『普段と同じひーちゃんで』と、それだけだった。
2297 = "Chiến thuật mà chị Mayami truyền đạt lại\nchỉ đơn giản là,\n『Cứ để bé Hi thể hiện như bình thường』,\nchỉ vậy thôi."

# monologue
# JP: 確かに、付け焼き刃の討論対策などはそれこそ、\n絵に描いたような生兵法、怪我の元にしかならんだろう。
2272 = "Quả thực, những biện pháp đối phó tranh\nluận học vẹt như vậy,\nchẳng khác nào binh pháp trên giấy, chỉ tổ\nrước họa vào thân."

# monologue
# JP: （……日々姫のベストは、いつもの日々姫。\nここでどれだけ共感を作れるかが、日々姫の勝負だ）
2498 = "（……Trạng thái tốt nhất của Hibiki chính là\nHibiki thường ngày.\nViệc có thể tạo ra bao nhiêu sự đồng cảm ở\nđây, chính là ván cược của Hibiki）"

# 【日々姫】
# display as 日日姬
# JP: 「――いろんな思いがあって、いろんな建物があって、\nそれで、今の御一夜が出来上がっている――」
947 = "「――Có rất nhiều tâm tư, có rất nhiều tòa\nnhà,\nvà nhờ đó, mới tạo nên Ohimitera của hiện\ntại――」"

# 【ふかみ】
# display as 深美
# JP: 「……うなずいていてくれてる人、多い。です。\nすごく、熱心に聞いてくれてる感じで」
998 = "「……Có rất nhiều người đang gật đầu. Ạ.\nCảm giác như họ đang lắng nghe rất chăm\nchú.」"

# 【れいな】
# display as 玲奈
# JP: 「あの子、すっごくレイアウトさわりたそうですぅ。\n手、いっぱいにのばしてますよぉ」
1658 = "「Đứa bé kia có vẻ rất muốn chạm vào sa bàn\nnha.\nĐang vươn tay ra hết cỡ luôn đó ạ~」"

# monologue
# JP: だから、いい。\nこれでいい。
2462 = "Vậy nên, tốt rồi.\nThế này là tốt rồi."

# monologue
# JP: 日々姫の作りたい未来を心に描いてもらうことこそ、\n日々姫に出来る、最良の演説に他ならないから。
2434 = "Việc để mọi người vẽ nên tương lai mà\nHibiki muốn tạo ra trong tâm trí họ,\nchính là bài diễn thuyết tốt nhất mà\nHibiki có thể làm."

# 【日々姫】
# display as 日日姬
# JP: 「――鉄道を中心とした観光と産業の振興。\nそれは、ゆるやかな発展しか産めないかもしれません」
951 = "「――Chấn hưng du lịch và công nghiệp với\ntrung tâm là đường sắt.\nĐiều đó có lẽ chỉ mang lại sự phát triển\nchậm rãi.」"

# monologue
# JP: 日々姫の目が、レイアウトの上、\nクマ川沿いの線路と\x%l列車;#00ffc040;列車%l;#;とに注がれる。
2164 = "Ánh mắt của Hibiki hướng lên sa bàn,\nnhìn vào tuyến đường sắt dọc sông Kuma và \\x%l列車;#00ffc040;đoàn tàu%l;#;\n."

# monologue
# JP: 終点、湯医駅間近。\nよどむところなく日々姫の言葉も終わりに向かう。
60 = "Điểm cuối, ga Yui đang đến gần.\nLời nói của Hibiki cũng trôi chảy đi đến\nhồi kết."

# 【日々姫】
# display as 日日姬
# JP: 「けど緩やかな変化だからこそ――そこに描かれる未来は、\n御一夜の今と、歪むことなくつながります」
1236 = "「Nhưng chính vì là sự thay đổi chậm\nrãi――tương lai được vẽ ra ở đó,\nsẽ kết nối với Ohimitera hiện tại mà không\nhề bị bóp méo.」"

# monologue
# JP: 沈黙とまなざし。
2403 = "Sự im lặng và những ánh nhìn."

# monologue
# JP: 聴衆の視線も日々姫につられ、\nレイアウトの上へと移動していく。
1864 = "Ánh mắt của khán giả cũng bị Hibiki thu\nhút,\nvà di chuyển lên trên sa bàn."

# 【日々姫】
# display as 日日姬
# JP: 「だから、そうした変化こそを、\n私は、市政で、描いていきたいと願っています」
1426 = "「Vì vậy, chính những thay đổi đó,\ntôi mong muốn được vẽ nên trong chính\nquyền thành phố này.」"

# monologue
# JP: 深く一礼。\n大きな拍手。
2169 = "Một cái cúi đầu thật sâu.\nNhững tràng pháo tay lớn vang lên."

# 【ポーレット】
# display as 波萊特
# JP: 「うん！」
1334 = "「Tuyệt quá!」"

# monologue
# JP: ポーレットの明るい声は、そのまま僕らの手応えだ。\nが、満足に足を止めてはいけない。
2219 = "Giọng nói tươi sáng của Paulette chính là\nthành quả của chúng tôi.\nNhưng, không được phép dừng bước trong sự\nthỏa mãn."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が退場したら、すぐに撤収に」
1482 = "「Ngay khi Hibiki rời sân khấu, lập tức dọn\ndẹp sa bàn.」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ、その必要はないよ」
1218 = "「À, không cần thiết đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1704 = "「Hả!?」"

# monologue
# JP: 宝生稀咲だ。
2187 = "Là Houshou Kisaki."

# monologue
# JP: 清潔感のある白のスーツは、\n稀咲の聡明なイメージをさらに強調している。
2099 = "Bộ vest trắng toát lên vẻ sạch sẽ,\ncàng làm tôn thêm hình ảnh thông minh của\nKisaki."

# 【稀咲】
# display as 稀咲
# JP: 「日々姫と入れ替わって登壇したい。\nなに、ちょっとした演出さ」
1422 = "「Tôi muốn lên sân khấu đổi chỗ cho Hibiki.\nKhông có gì đâu, chỉ là một chút diễn xuất\nthôi.」"

# 【真闇】
# display as 真闇
# JP: 「それはっ！」
1566 = "「Khoan đã!」"

# 【稀咲】
# display as 稀咲
# JP: 「ごめん。もう行く」
1212 = "「Xin lỗi. Tôi đi đây.」"

# monologue
# JP: 真闇姉の制止を無視し、\n稀咲が演壇へと向かう。
2330 = "Phớt lờ sự can ngăn của chị Mayami,\nKisaki tiến về phía bục diễn thuyết."

# monologue
# JP: 演壇から降りる日々姫に向けて手をさし延べて、\n日々姫もすぐ、それに答える。
2002 = "Cô ấy đưa tay ra hướng về phía Hibiki đang\nbước xuống bục,\nvà Hibiki cũng ngay lập tức đáp lại."

# monologue
# JP: （パシャ、パシャ、パシャ、パシャっ！）
2518 = "（Tách, tách, tách, tách!）"

# monologue
# JP: 記者たちのカメラフラッシュが一斉に煌めく。\nなるほど、確かに演出だ。
2301 = "Ánh đèn flash từ máy ảnh của các phóng\nviên đồng loạt lóe sáng.\nRa là vậy, quả thực là một màn diễn xuất."

# monologue
# JP: 稀咲と日々姫の絵になる握手は、\n他の候補とふたりを確実に差別化しよう。
2339 = "Cái bắt tay đẹp như tranh vẽ của Kisaki và\nHibiki,\nchắc chắn sẽ tạo ra sự khác biệt rõ rệt\ngiữa hai người họ và các ứng cử viên khác."

# monologue
# JP: （……が、今さらそれに意味があるのか？\n事実上の一騎打ちと、誰もが承知しているではないか）
2496 = "（……Nhưng, đến giờ phút này làm vậy còn ý\nnghĩa gì chứ?\nChẳng phải ai cũng thừa biết đây thực chất\nlà một cuộc đấu tay đôi sao）"

# 【真闇】
# display as 真闇
# JP: 「まずかとね」
1211 = "「Không ổn rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1308 = "「Hả?」"

# 【稀咲】
# display as 稀咲
# JP: 「多くの市民の皆様とは、はじめましてになりますね。\nボクの名前は宝生稀咲。御一夜市長選の立候補者です」
1390 = "「Với nhiều công dân ở đây, có lẽ đây là\nlần đầu tiên chúng ta gặp mặt.\nTên tôi là Houshou Kisaki. Là ứng cử viên\ncho chức thị trưởng Ohimitera.」"

# monologue
# JP: すぐに始まった演説が、\n真闇姉のつぶやきを飲み込んでしまう。
2244 = "Bài diễn thuyết ngay lập tức bắt đầu,\nnuốt chửng lấy tiếng lầm bầm của chị\nMayami."

# monologue
# JP: ……稀咲は、まったく力んでいない。\n僕らと会話するように、自然な言葉を重ねていく。
933 = "……Kisaki hoàn toàn không hề gồng mình.\nCô ấy tuôn ra những lời lẽ tự nhiên, hệt\nnhư đang trò chuyện với chúng tôi."

# 【稀咲】
# display as 稀咲
# JP: 「先に登壇された右田候補とは、学園の、\n先輩・後輩の仲になります。部活も一緒なんですよ」
1413 = "「Với ứng cử viên Migita vừa lên bục trước\nđó, chúng tôi là\ntiền bối - hậu bối trong trường. Cả hai\ncũng tham gia cùng một câu lạc bộ nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1703 = "「!」"

# monologue
# JP: ほう、という声が会場のそちこちから漏れる。\n稀咲は、巧い。やはり巧い。
2192 = "Những tiếng ồ lên vang khắp hội trường.\nKisaki, thật khéo léo. Quả nhiên là rất\nkhéo léo."

# monologue
# JP: 日々姫が育てた親近感の輪の中に、\nただ一言で、自分を組み入れてしまった。
2000 = "Chỉ bằng một câu nói, cô ấy đã tự đưa mình\nvào\nvòng tròn gần gũi mà Hibiki đã dày công\nvun đắp."

# 【稀咲】
# display as 稀咲
# JP: 「とはいっても、理想とする市政まで同じではありません。\nですので、ボクは、ボクの理想を論じさせてもらいます」
1689 = "「Mặc dù vậy, lý tưởng về chính quyền thành\nphố của chúng tôi không hề giống nhau.\nVì vậy, tôi xin phép được trình bày về lý\ntưởng của mình.」"

# 【ポーレット】
# display as 波萊特
# JP: 「都市モデル、使わないんですね」
1355 = "「Cô ấy không sử dụng mô hình đô thị nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
1316 = "「Ừm.」"

# monologue
# JP: ポーレットの声に気付かされる。\nあの都市モデルが、影も形も見当たらない。
2391 = "Giọng nói của Paulette làm tôi nhận ra.\nBóng dáng của mô hình đô thị đó hoàn toàn\nkhông thấy đâu."

# monologue
# JP: 僕らの据え付けたレイアウトだけが、\n演壇前に、置き去るようにされている。
2070 = "Chỉ có mỗi sa bàn mà chúng tôi lắp đặt,\nđang bị bỏ lại trước bục diễn thuyết."

# monologue
# JP: （ああ……そうか）
2510 = "（A…… Ra là vậy）"

# monologue
# JP: 真闇姉が漏らした呟き。\nその意味を、今さらながらに理解する。
2084 = "Tiếng lầm bầm mà chị Mayami thốt ra.\nĐến tận bây giờ tôi mới hiểu được ý nghĩa\ncủa nó."

# 【稀咲】
# display as 稀咲
# JP: 「いま日ノ本国内にある\x%lエアクラ;#00ffc040;エアクラ%l;#;工場は、二十二箇所。\nそのうち十二が、一級水系に隣接しています」
1488 = "「Hiện tại, có hai mươi hai nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;\nở Hinomoto.\nTrong số đó, có mười hai nhà máy nằm liền\nkề với hệ thống sông ngòi cấp một.」"

# monologue
# JP: スーツスタイルと演説内容。
2355 = "Phong cách mặc vest và nội dung diễn\nthuyết."

# monologue
# JP: その両方がマッチして、稀咲は普段以上に大人びて――\n非常に有能、かつ頼もしい存在に見えている。
1895 = "Cả hai điều đó kết hợp lại, khiến Kisaki\ntrông trưởng thành hơn thường ngày――\nTrông cô ấy như một sự tồn tại vô cùng tài\nnăng và đáng tin cậy."

# 【稀咲】
# display as 稀咲
# JP: 「……次に、三年前に\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を誘致した、\n[シマント,2]四万斗市のデータを御覧ください」
1013 = "「……Tiếp theo, xin hãy xem dữ liệu của\nthành phố Shimanto,\nnơi đã thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; vào ba năm\ntrước.」"

# monologue
# JP: 川下り船の観光客数、天然うなぎの漁獲高、人口推移、\n税収推移、経済指標、水質検査で出た数値――
2234 = "Số lượng khách du lịch đi thuyền trên\nsông, sản lượng đánh bắt lươn tự nhiên,\nbiến động dân số,\nbiến động doanh thu thuế, chỉ số kinh tế,\nsố liệu từ các cuộc kiểm tra chất lượng\nnước――"

# monologue
# JP: 稀咲はただただ、\n客観的な事実群だけを積み重ねていく。
2363 = "Kisaki chỉ đơn thuần,\nchất đống những sự thật khách quan lên\nnhau."

# 【稀咲】
# display as 稀咲
# JP: 「このように、[シマント,2]四万斗市においても、\n観光客減の影響から、二年目には回復を遂げています」
1208 = "「Như quý vị thấy, ngay cả ở thành phố\nShimanto,\ntừ ảnh hưởng của việc giảm sút khách du\nlịch, họ đã đạt được sự phục hồi vào năm\nthứ hai.」"

# monologue
# JP: 『だから』と主張は展開しない。\n“歪み”と日々姫が示した懸念に、直接的には反論しない。
2332 = "「Như quý vị thấy, ngay cả ở thành phố\nShimanto,\ntừ ảnh hưởng của việc giảm sút khách du\nlịch, họ đã đạt được sự phục hồi vào năm\nthứ hai.」"

# monologue
# JP: それがじわじわ……\n日々姫の味方に僕にでさえも、効いてくる。
2443 = "Cô ấy không triển khai lập luận kiểu 『Vì\nvậy』.\nCũng không trực tiếp phản bác lại nỗi lo\nngại về \"sự bóp méo\" mà Hibiki đã chỉ ra."

# 【真闇】
# display as 真闇
# JP: 「まっこと、あの娘は上手かとねぇ。\n結論ば、あえて口にせんけん」
1662 = "「Quả thực, con bé đó giỏi thật đấy.\nCố tình không nói ra kết luận mà.」"

# 【ハチロク】
# display as 八六
# JP: 「――だから、こちらが考えさせられてしまうのですね。\n誘導された結論を、あたかも、自分の考えのように」
949 = "「――Vì vậy, người nghe sẽ buộc phải tự suy\nnghĩ.\nVà coi cái kết luận bị dẫn dắt đó, cứ như\nthể là suy nghĩ của chính mình vậy.」"

# monologue
# JP: そう、まさしく結論を誘導されている。
2338 = "Đúng vậy, chính xác là kết luận đang bị\ndẫn dắt."

# monologue
# JP: 稀咲があげている数字は当然、\n全て、稀咲にとって都合の良いものばかりなのだから。
1958 = "Những con số mà Kisaki đưa ra, tất nhiên,\ntất cả đều là những con số có lợi cho cô\nấy."

# monologue
# JP: （だが――）
2509 = "（Nhưng――）"

# monologue
# JP: 討論会場を埋め尽くす聴衆の全てが、\nその誘導に気付くことなどありえない。
2230 = "Toàn bộ khán giả lấp đầy hội trường tranh\nluận này,\nkhông thể nào nhận ra sự dẫn dắt đó."

# monologue
# JP: 直近の世論調査では日々姫が有利に立っているとはいえ、\n３％が稀咲に転べば、それで逆転を許してしまう。
2190 = "Mặc dù trong cuộc thăm dò dư luận gần đây\nnhất, Hibiki đang chiếm ưu thế,\nnhưng chỉ cần 3% nghiêng về phía Kisaki,\ntình thế sẽ bị đảo ngược."

# 【ふかみ】
# display as 深美
# JP: 「レイアウト……せっかく持ってきたのに。です」
1358 = "「Sa bàn…… cất công mang đến tận đây vậy\nmà. Ạ.」"

# monologue
# JP: ふかみが、弱気になっている。
2226 = "Fukami đang trở nên yếu đuối."

# 【ポーレット】
# display as 波萊特
# JP: 「稀咲さん、どけなくていいって言ったの――\nこういう風に持っていこうと思っていたからなんですね」
1558 = "「Việc Kisaki nói không cần dọn đi――\nlà vì cô ấy đã định dẫn dắt theo hướng này\nnhỉ.」"

# monologue
# JP: 対して、ポーレットは冷静だ。
2215 = "Trái lại, Paulette rất bình tĩnh."

# monologue
# JP: が、ふたりがそれぞれの表現方法で示しているのは、\n同じ懸念だ。
1991 = "Nhưng, điều mà cả hai đang thể hiện theo\nnhững cách khác nhau,\nlại cùng chung một nỗi lo ngại."

# 【双鉄】
# display as 雙鐵
# JP: 「……残念なことに、こうした話を展開されると、\nレイアウトが子供じみたものに見えてしまうな」
993 = "「……Thật đáng tiếc, khi những câu chuyện\nnhư thế này được triển khai,\nsa bàn trông có vẻ trẻ con quá.」"

# monologue
# JP: それも恐らく稀咲の計算なのではあろうが、\n都市模型という対象物が無いのが非常に災いしている。
2059 = "Có lẽ đó cũng nằm trong tính toán của\nKisaki,\nnhưng việc không có đối tượng so sánh là\nmô hình đô thị đang gây ra tai họa rất\nlớn."

# monologue
# JP: レイアウトも\x%lNゲージ;#00ffc040;Nゲージ%l;#;も、稀咲の作った空気によって、\n完全に浮いた存在にされてしまった。
1974 = "Cả sa bàn lẫn \\x%lNゲージ;#00ffc040;N-gauge%l;#;, bởi bầu không khí\nmà Kisaki tạo ra,\nđã hoàn toàn trở thành một sự tồn tại lạc\nlõng."

# 【ふかみ】
# display as 深美
# JP: 「このあと……ええと、直接討論、でしたっけ？」
1638 = "「Sau chuyện này…… à ừm, là tranh luận trực\ntiếp, phải không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1377 = "「Ừ.」"

# monologue
# JP: 演説を終えた日々姫は、\n演壇裾に並べられている椅子に着席している。
2390 = "Sau khi kết thúc bài diễn thuyết, Hibiki\nđang ngồi trên chiếc ghế được xếp ở góc\nbục."

# monologue
# JP: 内心はどうだかわからんが、\n表情は落ち着いているように見え、ホっとする。
2063 = "Không biết trong lòng con bé thế nào,\nnhưng nét mặt trông có vẻ bình tĩnh, khiến\ntôi cũng thở phào nhẹ nhõm."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の演説。稀咲の演説。他の候補者二人の演説。\nそれが終わり次第、討論と質疑応答という流れと」
1339 = "「Bài diễn thuyết của Hibiki. Bài diễn\nthuyết của Kisaki. Bài diễn thuyết của hai\nứng cử viên khác.\nNgay khi những phần đó kết thúc, sẽ chuyển\nsang phần tranh luận và hỏi đáp.」"

# 【凪】
# display as 凪
# JP: 「なら！」
1472 = "「Vậy thì!」"

# monologue
# JP: 僕の説明を横から断ち切る、焦ったような凪の声。
1911 = "Giọng nói có vẻ nôn nóng của Nagi cắt\nngang lời giải thích của tôi."

# 【凪】
# display as 凪
# JP: 「直接討論やらの前に、\nあのレイアウトば、どけた方が良かとよ」
1341 = "「Trước khi bắt đầu tranh luận trực tiếp,\ntốt nhất là dọn cái sa bàn kia đi thì\nhơn.」"

# 【ふかみ】
# display as 深美
# JP: 「う、うん。わたしも。\nそうかもって思う。です」
1326 = "「Ư, ừm. Mình cũng.\nNghĩ là như vậy. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。\n一度はどける必要があるだろう」
1546 = "「Quả thực là vậy.\nCó lẽ cần phải dọn nó đi một lần.」"

# monologue
# JP: 稀咲以外の候補者の演説が続く間も放置をしては、\nあのレイアウトは目障りそのものにまで堕してしまう。
2417 = "Nếu cứ để mặc nó trong lúc các ứng cử viên\nkhác ngoài Kisaki tiếp tục diễn thuyết,\nthì cái sa bàn đó sẽ trở thành thứ chướng\nmắt mất."

# monologue
# JP: この状況での撤去は“逃げ”と確実に受け取られようが、\nそうあってもまだ、やらないよりは遥かにマシだ。
1889 = "Việc dọn dẹp trong tình huống này chắc\nchắn sẽ bị coi là \"bỏ chạy\",\nnhưng dù có vậy thì vẫn còn tốt hơn nhiều\nso với việc không làm gì cả."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、どけただけでは状況の改善には繋がらん。\n押されているときに守りに入れば、そのまま負けるぞ」
1229 = "「Nhưng mà, chỉ dọn đi thôi thì không giúp\ncải thiện tình hình đâu.\nNếu cứ phòng thủ khi đang bị ép sân, thì\nsẽ thua mất đấy.」"

# 【凪】
# display as 凪
# JP: 「だったら！　どぎゃんとして逆転するばいっ」
1660 = "「Vậy thì! Làm sao để lật ngược tình thế\nđây!」"

# 【日々姫】
# display as 日日姬
# JP: 「うん。それなんだけどね」
1332 = "「Vâng. Về chuyện đó thì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお、何かアイディアがあるな――ら……」
1337 = "「Ồ, em có ý tưởng gì sao――thì……」"

# 【真闇】
# display as 真闇＆八六
# JP: 「ひーちゃん！？」\n「日々姫っ！？」
1381 = "「Bé Hi!?」\n「Hibiki!?」"

# monologue
# JP: 真闇姉までが驚いている。\n僕も、とっさには言葉が出ない。
2040 = "Ngay cả chị Mayami cũng phải ngạc nhiên.\nTôi cũng bất chợt không thốt nên lời."

# 【れいな】
# display as 玲奈
# JP: 「あれぇ、\nどーして日々姫さんがここにいるんですかぁ？」
1303 = "「Ủa,\nsao chị Hibiki lại ở đây vậy ạ~?」"

# monologue
# JP: 全員が感じている疑問を、\n自分のペースを崩さぬれいなが、言葉に直す。
2202 = "Reina, người không hề đánh mất nhịp độ của\nriêng mình,\nđã nói ra thắc mắc mà tất cả mọi người đều\nđang cảm thấy."

# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩の持ち時間、あと十分あるし。候補者さんも、\nまだ二人いるでしょ？」
1557 = "「Thời gian của tiền bối Kisaki còn tận\nmười phút nữa. Các ứng cử viên khác,\ncũng vẫn còn hai người nữa mà?」"

# monologue
# JP: 日々姫がちら、と演壇を見る。
2178 = "Hibiki liếc nhìn về phía bục diễn thuyết."

# monologue
# JP: 日々姫の退出に気づいているのかいないのか――\n稀咲の演説は変わらず見事に聴衆の意識をリードしている。
2356 = "Không biết cô ấy có nhận ra sự rời đi của\nHibiki hay không――\nbài diễn thuyết của Kisaki vẫn đang dẫn\ndắt tâm trí khán giả một cách ngoạn mục."

# 【日々姫】
# display as 日日姬
# JP: 「それで、言って出てきたの。\n『個別討論の準備をしたい』って」
1440 = "「Thế nên, em đã nói rồi mới ra đây.\nRằng 『Tôi muốn chuẩn bị cho phần tranh\nluận cá nhân』.」"

# 【ハチロク】
# display as 八六
# JP: 「準備、ですか」
1514 = "「Chuẩn bị, sao ạ?」"

# 【日々姫】
# display as 日日姬
# JP: 「うん。\n今なら抜けても気づかれないって思ったし――」
1330 = "「Ừm.\nChị nghĩ nếu bây giờ rút lui thì cũng\nkhông ai nhận ra đâu――」"

# monologue
# JP: 壇上、日々姫のいた椅子はぽっかり空席となっている。\nが、聴衆がその空白に気付いているような気配は無い。
1938 = "Trên bục, chiếc ghế mà Hibiki từng ngồi\nđang trống không.\nNhưng, có vẻ như khán giả không hề nhận ra\nkhoảng trống đó."

# monologue
# JP: （なるほど……\n稀咲の見事な演説が、僕らに味方してくれているのか）
2507 = "（Ra là vậy……\nBài diễn thuyết xuất sắc của Kisaki lại\nđang đứng về phía chúng ta sao）"

# 【日々姫】
# display as 日日姬
# JP: 「――できることを全部やっておかないと、\n後悔するって思ったから」
953 = "「――Bởi vì em nghĩ nếu không làm hết những\ngì có thể,\nthì sau này sẽ hối hận mất.」"

# monologue
# JP: 冷静で大胆な判断に、深く感心させられる。\nならば貴重なこの時間、いささかも無駄には使わせまい。
2022 = "Tôi thực sự khâm phục trước sự phán đoán\nbình tĩnh và táo bạo đó.\nNếu vậy thì khoảng thời gian quý báu này,\ntôi sẽ không để lãng phí dù chỉ một chút."

# 【双鉄】
# display as 雙鐵
# JP: 「手伝えることを言ってくれ。\nすぐにも動く」
1504 = "「Có gì cần giúp thì cứ nói đi.\nAnh sẽ làm ngay.」"

# 【日々姫】
# display as 日日姬
# JP: 「兄さん。ありがとうございます」
1311 = "「Anh trai. Cảm ơn anh.」"

# monologue
# JP: いいざま、日々姫はしゃがみ込む。
2432 = "Nói xong, Hibiki liền ngồi xổm xuống."

# monologue
# JP: 僕の足元のバッグから、\nなにやらごそごそ取り出している。
2006 = "Từ trong chiếc túi dưới chân tôi,\ncon bé đang lục lọi lấy ra thứ gì đó."

# 【双鉄】
# display as 雙鐵
# JP: 「スケッチブックと絵の具箱か」
1572 = "「Sổ phác thảo và hộp màu à.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん」
1333 = "「Vâng.」"

# monologue
# JP: 頷きながら、いつもどおりの仕草のままに、\n日々姫はスケッチブックを開く。
2184 = "Vừa gật đầu, Hibiki vừa mở cuốn sổ phác\nthảo ra\nvới những cử chỉ quen thuộc như mọi khi."

# monologue
# JP: そしてさらさら何かを――っ！！
2251 = "Và rồi con bé thoăn thoắt vẽ thứ gì đó――!!"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――これを作るのか」
1278 = "「Ra là vậy――Em định làm cái này sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「……あの都市モデルば、\n私の目にもやきついとるけん」
1018 = "「……Cái mô hình đô thị đó,\nnó in đậm trong tâm trí em rồi mà.」"

# monologue
# JP: 隈元弁がこぼれ出すほど、\n日々姫はもう、製作に集中しはじめている。
2146 = "Đến mức thốt ra cả tiếng Kumamoto,\nHibiki đã bắt đầu tập trung vào việc chế\ntác rồi."

# monologue
# JP: であれば、僕は任されたのだ。\nそう確信し、全速で思考を走らせる。
1853 = "Nếu vậy, tôi đã được giao phó rồi.\nTin chắc như vậy, tôi bắt đầu suy nghĩ với\ntốc độ tối đa."

# monologue
# JP: （日々姫の意図は明確だ。\nどうやれば、それを最大限に表現できる？）
2522 = "（Ý đồ của Hibiki đã rõ ràng.\nLàm thế nào để có thể thể hiện nó một cách\ntối đa đây?）"

# monologue
# JP: 答えならすでに見つけ出してる。
2046 = "Nếu là câu trả lời thì tôi đã tìm ra rồi."

# monologue
# JP: 今までやってきたことを、\nここでも同じく行えばいい。
1933 = "Những việc tôi đã làm từ trước đến nay,\nchỉ cần lặp lại ở đây là được."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。ポーレットの鉄道仲間に、\nいわゆる[と]撮り[テツ]鉄という方はどのくらいいる？」
1512 = "「Paulette. Trong số những người bạn đường\nsắt của cô,\ncó bao nhiêu người được gọi là \\x%l撮り鉄;#00ffc040;Tori-tetsu%l;#;\n?」"

# 【ポーレット】
# display as 波萊特
# JP: 「直接の方はそんなに……けど、全国の\x%lまいてつ;#00ffc040;まいてつ%l;#;さん達の\nお仲間には、確実に何人ずつかいらっしゃる筈です」
1438 = "「Trực tiếp thì không nhiều lắm…… nhưng\ntrong số bạn bè của các \\x%lまいてつ;#00ffc040;chủ tàu%l;#; trên toàn\nquốc,\nchắc chắn mỗi người đều có vài người đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その方達に頼めないだろうか」
1592 = "「Nếu vậy, cô có thể nhờ họ được không?」"

# monologue
# JP: 依頼内容を説明すれば、\nポーレットはすぐ頷いてくれる。
2402 = "Khi tôi giải thích nội dung yêu cầu,\nPaulette lập tức gật đầu."

# 【ポーレット】
# display as 波萊特
# JP: 「頼めます。\x%l撮り鉄;#00ffc040;撮り鉄%l;#;さんたちは写真上手いし、\nフットワーク軽いですし、それに、なにより」
1290 = "「Được chứ. Các \\x%l撮り鉄;#00ffc040;Tori-tetsu%l;#; chụp ảnh rất\ngiỏi,\nlại còn nhanh nhẹn nữa, và hơn hết là,」"

# monologue
# JP: レールショップに、いったん戻るつもりだろうか。
2216 = "Chắc cô ấy định quay lại cửa hàng đường\nsắt một lát."

# monologue
# JP: ポーレットはれいなを手招きし、\n自らももう立ち上がってる。
2016 = "Paulette vẫy tay gọi Reina,\nvà bản thân cô ấy cũng đã đứng dậy."

# 【ポーレット】
# display as 波萊特
# JP: 「同じ、鉄道を愛する仲間ですから。\n御一夜鉄道のためにも、きっと力を貸してくれます」
1347 = "「Vì chúng tôi đều là những người bạn cùng\nyêu đường sắt mà.\nVì Đường sắt Ohito, chắc chắn họ sẽ cho\nchúng ta mượn sức mạnh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、であれば頼む」
1649 = "「Vậy sao, thế thì nhờ cô nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「頼まれなくても」
1648 = "「Không cần anh nhờ đâu.」"

# monologue
# JP: いたずらっぽく――
2218 = "Một cách tinh nghịch――"

# monologue
# JP: ポーレットは実にらしくない、\nけれど魅力的な笑みを浮かべる。
2024 = "Paulette nở một nụ cười không giống cô ấy\nthường ngày chút nào,\nnhưng lại vô cùng quyến rũ."

# 【ポーレット】
# display as 波萊特
# JP: 「これ、私の戦いでもあるんですよ？」
1644 = "「Đây cũng là cuộc chiến của tôi mà?」"

# monologue
# JP: 爽やかな風をさあっと吹かせ、\nポーレットがれいなを伴い、議場から出る。
2217 = "Để lại một làn gió sảng khoái,\nPaulette cùng Reina rời khỏi hội trường."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、\n飛行\x%lエアクラ;#00ffc040;エアクラ%l;#;を使わせていただいて構いませんか？」
1690 = "「Ngài Soutetsu,\nem có thể mượn \\x%lエアクラ;#00ffc040;Aircra%l;#; bay của ngài được\nkhông ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。近くに着水させよう。\nナビも状況を把握している」
1530 = "「Tất nhiên rồi. Anh sẽ cho nó hạ cánh trên\nmặt nước gần đây.\nNavi cũng đã nắm bắt được tình hình rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら、わたくしたちも一度戻ります」
1666 = "「Nếu vậy, chúng em cũng sẽ quay về một\nchuyến.」"

# monologue
# JP: ハチロクの後ろには真闇姉。\n事情は、すぐに把握できる。
2280 = "Phía sau Hachiroku là chị Mayami.\nTôi lập tức hiểu được tình hình."

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉も同乗してもらえれば助かる。\nナビには、帰宅とだけ伝えてくれればそれで済む」
1540 = "「Chị Mayami cũng đi cùng thì tốt quá.\nChỉ cần bảo Navi là về nhà là được rồi.」"

# 【真闇】
# display as 真闇
# JP: 「ん。ならそうさせてもらうと。\n関連資料、うちもそれなりには集めとったけん」
1329 = "「Ừm. Vậy thì chị sẽ làm thế.\nChị cũng đã thu thập được kha khá tài liệu\nliên quan rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「助かる」
1615 = "「Cảm ơn chị.」"

# 【ハチロク】
# display as 八六
# JP: 「商店会の方々にもご協力をお願いします」
1411 = "「Chúng em cũng sẽ nhờ các thành viên trong\nhiệp hội thương mại giúp đỡ ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。工場誘致の可否を、それぞれに\nご検討されていただろうからな」
1276 = "「Ra là vậy. Chắc hẳn mỗi người trong số họ\nđều đã cân nhắc về việc có nên thu hút nhà\nmáy hay không rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。資料をお持ちの方も恐らく、\nお一方お二方ではないのではないか、と」
1496 = "「Vâng. Có lẽ số người có tài liệu\nkhông chỉ dừng lại ở một hay hai người đâu\nạ.」"

# monologue
# JP: 良い考えだ。
2457 = "Ý kiến hay đấy."

# monologue
# JP: 看板描きを通じて日々姫は、\n商店会の人たちの信頼を得ていることでもあるし。
2392 = "Hơn nữa, thông qua việc vẽ biển hiệu,\nHibiki cũng đã nhận được sự tin tưởng của\nnhững người trong hiệp hội thương mại."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そのように頼む」
1664 = "「Nếu vậy, nhờ hai người nhé.」"

# 【真闇】
# display as 真闇
# JP: 「ん、頼まれてあげるけんねぇ」
1321 = "「Ừm, cứ giao cho chị.」"

# monologue
# JP: ひらひら手を振り、真闇姉とハチロクも去る。
2296 = "Vẫy vẫy tay, chị Mayami và Hachiroku cũng\nrời đi."

# 【凪】
# display as 凪
# JP: 「ふかみちゃん！」
1383 = "「Bé Fukami!」"

# 【ふかみ】
# display as 深美
# JP: 「う、うんっ！」
1315 = "「Ư, ừm!」"

# monologue
# JP: それを待っていたかのように、\n凪がふかみと連れ立って、ずずいと僕に近寄ってくる。
1990 = "Như thể chỉ chờ có thế,\nNagi cùng Fukami tiến sát lại gần tôi."

# 【凪】
# display as 凪
# JP: 「みどりおばちゃんが名簿、持っとるばい！\n全国の川下り船の業者さんの」
1582 = "「Dì Midori có giữ danh sách đó nha!\nDanh sách các chủ thuyền xuôi dòng trên\ntoàn quốc á.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1318 = "「A!」"

# monologue
# JP: それは、全くの盲点だった。
2075 = "Đó hoàn toàn là một điểm mù."

# monologue
# JP: 川下り船の業者さんなら、直近だ。\n写真撮影は大変容易なことだろう――が――
2233 = "Nếu là chủ thuyền xuôi dòng thì họ ở ngay\nsát bên.\nViệc chụp ảnh chắc chắn sẽ rất dễ\ndàng――nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「みどりさん……\nふかみのお母様のお加減はいかがなのだ？」
1580 = "「Cô Midori……\nTình trạng sức khỏe của mẹ Fukami thế nào\nrồi?」"

# 【ふかみ】
# display as 深美
# JP: 「あの――正直、良くなくって。\n長い時間話してたら、咳、止まらなくなるです。から」
1300 = "「Dạ――thành thật mà nói thì, không được tốt\nlắm ạ.\nNếu nói chuyện lâu, mẹ sẽ ho không ngừng\nđược. Nên là.」"

# monologue
# JP: 凪がわずかに顔をしかめる。その手の色が変わってる。\nふかみはそれほど強く、凪の手を握り――すがってる。
1913 = "Nagi hơi nhăn mặt. Bàn tay con bé đổi màu.\nFukami đang nắm tay Nagi chặt đến mức\nđó――đang bám víu lấy."

# 【ふかみ】
# display as 深美
# JP: 「だから」
1447 = "「Vì vậy.」"

# monologue
# JP: けれどもやがて、\nさまよっていたふかみの視線が、まっすぐ僕へ向けられる。
2224 = "Nhưng rồi chẳng bao lâu,\nánh mắt đang lang thang của Fukami hướng\nthẳng về phía tôi."

# 【ふかみ】
# display as 深美
# JP: 「わたし、電話かけます。です。凪ちゃんと手分けして。\nおかあさんから、名簿借りて、お願いしてみます。です」
1527 = "「Em sẽ, gọi điện thoại. Ạ. Chia nhau ra\ngọi cùng với Nagi.\nEm sẽ mượn danh sách từ mẹ, rồi nhờ họ thử\nxem. Ạ.」"

# 【凪】
# display as 凪
# JP: 「そう決まったら、いそぐばいっ！」
1470 = "「Đã quyết vậy rồi thì nhanh lên thôi!」"

# 【ふかみ】
# display as 深美
# JP: 「わ、あ！　う、うんっ！\n双鉄さん――行ってきます、です！」
1306 = "「O, a! Ư, ừm!\nAnh Soutetsu――chúng em đi đây, ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「焦らなくていい。気をつけてな」
1268 = "「Không cần vội đâu. Cẩn thận nhé.」"

# monologue
# JP: 凪とふかみが行ってしまえば、\n音風景が一気に変わる。
1909 = "Nagi và Fukami vừa rời đi,\nâm thanh xung quanh liền thay đổi hoàn\ntoàn."

# monologue
# JP: 候補者の演説の声をバックに、日々姫が鉛筆を走らせる音、\nただそれだけしか聞こえなくなる。
2479 = "Trên nền giọng diễn thuyết của các ứng cử\nviên, chỉ còn nghe thấy\nmỗi tiếng bút chì lướt trên giấy của\nHibiki."

# monologue
# JP: （さて、僕も動かねば）
2515 = "（Giờ thì, mình cũng phải hành động thôi）"

# monologue
# JP: 素材は、みなが集めてくれる。\nならばそれをどう見せるかを、準備しておく必要がある。
2387 = "Mọi người sẽ thu thập tài liệu cho tôi.\nNếu vậy thì tôi cần phải chuẩn bị cách để\ntrình bày chúng."

# monologue
# JP: プロジェクターを借りられるかをまずは確かめ――
1890 = "Trước tiên phải kiểm tra xem có mượn được\nmáy chiếu không đã――"

# 【日々姫】
# display as 日日姬
# JP: 「兄さん」
1310 = "「Anh trai.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1335 = "「Hửm?」"

# monologue
# JP: 鉛筆の音が止まっている。\n日々姫が僕を見つめてる。
2470 = "Tiếng bút chì đã dừng lại.\nHibiki đang nhìn chằm chằm vào tôi."

# 【日々姫】
# display as 日日姬
# JP: 「ひとつだけ、質問してもいいですか？」
1431 = "「Em hỏi một câu thôi, được không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。ひとつといわず、いくつでも」
1529 = "「Tất nhiên rồi. Đừng nói một câu, bao\nnhiêu câu cũng được.」"

# 【日々姫】
# display as 日日姬
# JP: 「いいえ、ひとつだけでいいんです」
1220 = "「Không, một câu là đủ rồi.」"

# monologue
# JP: ス、と短く息が吸われる。
2150 = "Con bé khẽ hít vào một hơi ngắn."

# monologue
# JP: まばたきさえも忘れてしまったかのように、\n日々姫の瞳は一瞬たりとも僕の上から離れない。
2010 = "Như thể đã quên cả chớp mắt,\nánh mắt của Hibiki không rời khỏi tôi dù\nchỉ một khoảnh khắc."

# 【日々姫】
# display as 日日姬
# JP: 「選挙に負けて、工場誘致の阻止に失敗しちゃったら\n――兄さん、結婚、させられますよね？」
1602 = "「Nếu thua trong cuộc bầu cử, và thất bại\ntrong việc ngăn chặn thu hút nhà máy\n――Anh trai sẽ bị ép kết hôn, phải không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1314 = "「À.」"

# monologue
# JP: 確かに、義父と約束をした。\nなんだか随分、遠い昔のことに思えるが。
2088 = "Quả thực, tôi đã hứa với cha nuôi.\nCảm giác như chuyện đó đã xảy ra từ rất\nlâu rồi vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「そういえばそんな話もあったな」
1612 = "「Nhắc mới nhớ, đúng là có chuyện đó thật.」"

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1307 = "「Hả!?」"

# monologue
# JP: 日々姫の目がまんまるくなる。\nよほど驚かせてしまったようだが――
2177 = "Mắt Hibiki mở to tròn.\nCó vẻ như tôi đã làm con bé ngạc nhiên\nlắm――"

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。\n完全に失念してしまっていたのでな」
1378 = "「Xin lỗi.\nAnh hoàn toàn quên bẵng đi mất.」"

# 【日々姫】
# display as 日日姬
# JP: 「え？　あの……」
1309 = "「Hả? Dạ……」"

# monologue
# JP: わたわた、手までが動いている。
2155 = "Con bé luống cuống, tay chân khua loạn xạ."

# monologue
# JP: 動揺という文字を形になおせば、\nそれはまさしく、今の日々姫に違いない。
2029 = "Nếu phải dùng một từ để hình dung sự bối\nrối,\nthì chắc chắn đó chính là Hibiki lúc này."

# 【日々姫】
# display as 日日姬
# JP: 「じゃあ、どうして――えと、もちろん、\n御一夜の水を守るためって……けど、それだけで？」
1669 = "「Vậy thì tại sao――à ừm, tất nhiên là\nđể bảo vệ nguồn nước của Ohimitera rồi……\nnhưng, chỉ vì thế thôi sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1316 = "「唔」" 

# monologue
# JP: 日々姫の質問はまとまっていない。\nが、問われていることが何かは、わかる。
2182 = "Câu hỏi của Hibiki không được mạch lạc cho\nlắm.\nNhưng tôi hiểu con bé đang muốn hỏi điều\ngì."

# monologue
# JP: 水資源を守るというぼんやりとした目標だけでは――\n恐らく僕は、ここまで必死に戦えてこなかっただろうから。
2028 = "Nếu chỉ với một mục tiêu mơ hồ là bảo vệ\ntài nguyên nước――\nCó lẽ tôi đã không thể chiến đấu tuyệt\nvọng đến mức này."

# 【双鉄】
# display as 雙鐵
# JP: 「そう……だな。\n最初は、御一夜への、右田への恩返しのためだけだった」
1642 = "「Đúng…… vậy nhỉ.\nBan đầu, anh chỉ muốn báo đáp công ơn của\nOhimitera, của nhà Migita.」"

# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1333 = "「嗯」" 

# monologue
# JP: いや……恩返しというより、贖罪か。
1844 = "Không…… Thay vì báo ân, phải gọi là chuộc\ntội mới đúng."

# monologue
# JP: 路子を守れなかったその分、誰かを、何かを、守ろうと\n――ただそれだけしか、僕の頭の中には無かった。
2081 = "Phần vì không thể bảo vệ được Michiko, nên\ntôi muốn bảo vệ một ai đó, một điều gì đó\n――Trong đầu tôi lúc đó chỉ có duy nhất suy\nnghĩ ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「だが、ハチロクと出会い、ポーレットと出会い……\n目的が、少しずつ変わっていったのかもしれないな」
1233 = "「Nhưng, sau khi gặp Hachiroku, gặp\nPaulette……\nCó lẽ mục đích của anh đã dần dần thay\nđổi.」"

# monologue
# JP: その都度、その都度。\nすぐに取り組まなければならないことが、発生したから。
1856 = "Hết lần này đến lần khác.\nBởi vì những chuyện cần phải giải quyết\nngay lập tức cứ liên tục phát sinh."

# monologue
# JP: 目の前のそれに取り組むうちに、\nいつの間にか、僕は恐らく……
1967 = "Trong lúc giải quyết những vấn đề trước\nmắt,\ntừ lúc nào không hay, có lẽ tôi đã……"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……いや、違うか？\n変化、ではなく――」
1215 = "「À…… Không, không phải sao?\nKhông phải là thay đổi, mà là――」"

# monologue
# JP: 路子のことを、事故のことを。\n忘れるなどは、一生できない。
2080 = "Về Michiko, về vụ tai nạn đó.\nCả đời này tôi không thể nào quên được."

# monologue
# JP: けれども、僕は、一瞬一瞬に夢中になって。夢中になれて。\nそうした時間を重ねる内に――ああ、そうなのだ。
2253 = "Nhưng mà, tôi đã đắm chìm vào từng khoảnh\nkhắc. Có thể đắm chìm vào nó.\nTrong lúc tích lũy những khoảng thời gian\nnhư thế――A, ra là vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「見つけただけだ。\nただ、それだけだ」
1289 = "「Anh chỉ tìm thấy thôi.\nChỉ vậy thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「見つけた？　何をですか？」
1451 = "「Tìm thấy? Tìm thấy gì cơ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「“しなくてはならない”や“するべき”ではなく、\n“そうしたい”をだ」
1224 = "「Không phải là \"phải làm\" hay \"nên làm\",\nmà là \"muốn làm\".」"

# 【日々姫】
# display as 日日姬
# JP: 「え……っと」
1246 = "「Dạ…… ừm.」"

# monologue
# JP: いつからだったか、理由はなぜか、\n考えてみてもまるでハッキリしてこない。
2482 = "Từ lúc nào, lý do là gì,\ndù có nghĩ thế nào cũng không thể hiểu rõ\nđược."

# monologue
# JP: であるというのに――\n揺るがぬ気持ちを確かに感じる。
1870 = "Mặc dù vậy――\nTôi vẫn cảm nhận được một thứ cảm xúc vững\nvàng không hề lay chuyển."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、日々姫を支えたいのだ。\n選挙の勝ち負けや、工場云々のことを全て置いても」
1424 = "「Anh, muốn hỗ trợ Hibiki.\nDù cho có gạt bỏ hết chuyện thắng thua\ntrong bầu cử hay chuyện nhà máy đi chăng\nnữa.」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 1703 = "「！」" 

# monologue
# JP: 日々姫が再び息を呑む。
2145 = "Hibiki lại một lần nữa nín thở."

# monologue
# JP: 息だけではなくツバまで飲んで、パチパチパチと、\n今までの分を取り返すように、何度もまばたきを繰り返す。
2005 = "Không chỉ nín thở mà con bé còn nuốt nước\nbọt cái ực, rồi chớp mắt liên tục,\nnhư thể để bù lại cho khoảng thời gian\nkhông chớp mắt vừa nãy."

# 【日々姫】
# display as 日日姬
# JP: 「それは――」
1647 = "「Đó là vì――」"

# monologue
# JP: 日々姫の頬が赤くなる。\n日々姫の息が荒くなる。
2175 = "Đôi má Hibiki ửng đỏ.\nHơi thở của con bé trở nên gấp gáp."

# monologue
# JP: それを感じただけで何故だか、\n僕の鼓動もうるさいくらいに強くなる。
2282 = "Chỉ cần cảm nhận được điều đó, không hiểu\nsao,\nnhịp tim của tôi cũng đập mạnh đến mức ồn\nào."

# 【日々姫】
# display as 日日姬
# JP: 「わたしが、兄さんの、いもうとだからですか？」
1425 = "「Có phải vì, em là, em gái của anh không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「妹……僕の――」
1427 = "「Em gái…… của anh――」"

# monologue
# JP: 考えようとした途端、ガタン、ゴトンと――\n記憶の奥の\x%l列車;#00ffc040;列車%l;#;が僕の心を揺する。
2073 = "Vừa định suy nghĩ, thì xình xịch, xình\nxịch――\n\\x%l列車;#00ffc040;đoàn tàu%l;#; trong ký ức sâu thẳm lại làm tâm\ntrí tôi rung chuyển."

# monologue
# JP: ガタン、ゴトン。ガタン、ゴトン。\n罪悪感が、つま先から喉へと染み透ってくる。
1951 = "Xình xịch, xình xịch. Xình xịch, xình\nxịch.\nCảm giác tội lỗi thấm dần từ đầu ngón chân\nlên tận cổ họng."

# 【日々姫】
# display as 日日姬
# JP: 「にぃにっ！？」
1682 = "「Anh hai!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「すまん――すまん。\n大丈夫だ。何事もない」
1456 = "「Xin lỗi――xin lỗi.\nAnh không sao. Không có chuyện gì đâu.」"

# monologue
# JP: 自分の顔から血の気が引いているのがわかる。\nねばつく汗が吹き出してきたのを感じてる。
2089 = "Tôi có thể nhận ra mặt mình đang tái mét.\nTôi cảm nhận được mồ hôi nhễ nhại đang túa\nra."

# monologue
# JP: だから、せめて。震えを筋力で抑えこむ。\n討論前に、日々姫に余計な心配をかけてはいけない。
2086 = "Vì vậy, ít nhất. Tôi dùng sức mạnh cơ bắp\nđể kìm nén cơn run rẩy.\nTrước cuộc tranh luận, không được để\nHibiki phải lo lắng thừa thãi."

# 【双鉄】
# display as 雙鐵
# JP: 「答えは、少しだけ待ってくれ」
1252 = "「Câu trả lời, hãy đợi anh một chút nhé.」"

# 【日々姫】
# display as 日日姬
# JP: 「……投票が終わるときまで、ですか？」
1004 = "「……Đến khi cuộc bỏ phiếu kết thúc, phải\nkhông ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。悪いが、そのときまでは」
1325 = "「Đúng vậy. Xin lỗi em, cho đến lúc đó\nnhé.」"

# 【日々姫】
# display as 日日姬
# JP: 「わかりました！\n時間、とっちゃってごめんなさい」
1360 = "「Em hiểu rồi!\nXin lỗi vì đã làm mất thời gian của anh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1507 = "「Không đâu――」"

# monologue
# JP: 僕の言葉の続きをまたず、\n日々姫は自分のスケッチブックと向き合い直す。
1847 = "Không đợi tôi nói hết câu,\nHibiki đã quay lại với cuốn sổ phác thảo\ncủa mình."

# monologue
# JP: 僕も、準備だ。残り時間に余裕などない。\nわかっていながら、それでも、話し足りない気がして――
2188 = "Tôi cũng phải chuẩn bị thôi. Không còn\nnhiều thời gian nữa.\nDù biết vậy, nhưng tôi vẫn có cảm giác\nchưa nói đủ――"

# 【日々姫】
# display as 日日姬
# JP: 「兄さん」
# 1310 = "「哥哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1703 = "「！」" 

# monologue
# JP: スケッチブックを見つめたまま、手も動かし続けるままに\n日々姫はそれでも、僕を捉える。
2009 = "Vẫn nhìn chằm chằm vào sổ phác thảo, tay\nvẫn tiếp tục di chuyển\nnhưng Hibiki vẫn nắm bắt được suy nghĩ của\ntôi."

# 【日々姫】
# display as 日日姬
# JP: 「安心して迷ってください。\n大丈夫です。私、絶対に負けませんから」
1245 = "「Anh cứ yên tâm mà phân vân đi ạ.\nKhông sao đâu. Vì em, tuyệt đối sẽ không\nthua đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1333 = "「嗯」" 

# monologue
# JP: そうだった。\n負けてしまえば、悩む自由さえなくなるし――
2203 = "Đúng vậy.\nNếu thua cuộc, thì ngay cả tự do để phân\nvân cũng chẳng còn――"

# monologue
# JP: 日々姫を支える、\nそれも出来なくなってしまう。
2419 = "Việc hỗ trợ Hibiki,\ncũng sẽ không thể làm được nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「勝とう」
1410 = "「Cùng giành chiến thắng nào.」"

# 【日々姫】
# display as 日日姬
# JP: 「はいっ！」
# 1334 = "「嗯！」" 

# monologue
# JP: そのため、今は迷わず動こう。\n迷うなど――勝ったその後で十分だ。
2249 = "Vì vậy, bây giờ không được do dự mà phải\nhành động thôi.\nDo dự ư――để sau khi chiến thắng rồi hẵng\ntính."

# monologue
# JP: ゥィン――と、\n低いモーター音が議場に響く。
1955 = "O o――\nTiếng động cơ trầm thấp vang lên trong hội\ntrường."

# monologue
# JP: 直接討論。再びの演壇。\nその前に、僕らはレイアウトをセットし直す。
2260 = "Tranh luận trực tiếp. Lại một lần nữa bước\nlên bục.\nTrước đó, chúng tôi thiết lập lại sa bàn."

# 【稀咲】
# display as 稀咲
# JP: 「それが――日々姫の望む未来図かい？」
1485 = "「Đó là――bức tranh tương lai mà Hibiki mong\nmuốn sao?」"

# monologue
# JP: セットが終わりハケた途端に、司会者の言葉も待たず、\n稀咲が日々姫に問いかける。
1973 = "Ngay khi vừa thiết lập xong và lui xuống,\nkhông đợi người dẫn chương trình lên\ntiếng,\nKisaki đã đặt câu hỏi cho Hibiki."

# monologue
# JP: 問いかけて――\n討論の火蓋を切って落とす。
2014 = "Đặt câu hỏi――\nvà châm ngòi cho cuộc tranh luận."

# 【日々姫】
# display as 日日姬
# JP: 「はい、そうです。稀咲先輩」
1499 = "「Vâng, đúng vậy. Tiền bối Kisaki.」"

# monologue
# JP: 日々姫に対し、稀咲先輩。
1992 = "Đáp lại Hibiki, là tiền bối Kisaki."

# monologue
# JP: 右田候補と宝生候補は、等身大の自分たちで。\n飾らぬ言葉で、真正面からぶつかりあおうと宣言しあう。
1894 = "Ứng cử viên Migita và ứng cử viên Houshou,\nvới chính con người thật của mình.\nHọ tuyên bố sẽ đối đầu trực diện bằng\nnhững lời lẽ không hề tô vẽ."

# 【稀咲】
# display as 稀咲
# JP: 「鉄道が\x%l客車;#00ffc040;客車%l;#;を引く以外、\n今と大きくは変わらないのかい？」
1683 = "「Ngoài việc đường sắt kéo theo \\x%l客車;#00ffc040;toa hành khách%l;#;\nra,\nthì không có gì thay đổi lớn so với hiện\ntại sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「私は、変えようとは思いません。\nだけど自然に、変わっていくと思います」
1403 = "「Tôi không nghĩ là mình sẽ thay đổi nó.\nNhưng tôi tin nó sẽ thay đổi một cách tự\nnhiên.」"

# 【稀咲】
# display as 稀咲
# JP: 「その鉄道と、\x%l客車;#00ffc040;客車%l;#;改修の事業とで？」
1694 = "「Bằng tuyến đường sắt đó và dự án cải tạo \\x%l客車;#00ffc040;toa hành khách%l;#;\nsao?」"

# 【日々姫】
# display as 日日姬
# JP: 「そこからも、もちろん変わっていくと思います」
1639 = "「Tất nhiên, tôi nghĩ sự thay đổi cũng sẽ\nbắt nguồn từ đó.」"

# 【稀咲】
# display as 稀咲
# JP: 「けれどね、日々姫」
1294 = "「Nhưng mà này, Hibiki.」"

# monologue
# JP: 暖かささえ感じさせられる、稀咲の口調。
2353 = "Giọng điệu của Kisaki thậm chí còn mang\nlại cảm giác ấm áp."

# monologue
# JP: 演技だとしたら大した物だし、\nこの状況下で素であるのなら、一層のこと大したものだ。
2032 = "Nếu là diễn kịch thì quả là đáng gờm,\ncòn nếu là bản chất thật trong tình huống\nnày, thì lại càng đáng nể hơn."

# 【稀咲】
# display as 稀咲
# JP: 「\x%l客車;#00ffc040;客車%l;#;改修事業の採算は、正直、厳しいと見ているよ？\n今は、ボランティア的な\x%l客車;#00ffc040;客車%l;#;提供があるようだけれど」
1687 = "「Thành thật mà nói, lợi nhuận của dự án\ncải tạo \\x%l客車;#00ffc040;toa hành khách%l;#; rất khó khăn đấy?\nHiện tại, có vẻ như các \\x%l客車;#00ffc040;toa hành khách%l;#;\nđang được cung cấp theo hình thức tình\nnguyện.」"

# monologue
# JP: 稀咲は淡々と数字を示す。\n示された数字に、ポーレットの目が丸くなる。
2342 = "Kisaki điềm tĩnh đưa ra những con số.\nNhìn những con số đó, mắt Paulette tròn\nxoe."

# monologue
# JP: 銀行の情報収集能力の、\nその凄まじさを――僕らは、痛感させられる。
2069 = "Khả năng thu thập thông tin của ngân hàng,\nsự khủng khiếp đó――chúng tôi đã được cảm\nnhận sâu sắc."

# 【稀咲】
# display as 稀咲
# JP: 「近場の\x%l客車;#00ffc040;客車%l;#;が尽きてしまえば、輸送コストは莫大となる。\n供給に関しても同じだよね？　納品先も遠方になるから」
1564 = "「Nếu nguồn \\x%l客車;#00ffc040;toa hành khách%l;#; ở gần cạn kiệt,\nchi phí vận chuyển sẽ trở nên khổng lồ.\nVề nguồn cung cũng vậy phải không? Vì điểm\ngiao hàng cũng sẽ ở xa hơn.」"

# monologue
# JP: なるほど。確かに指摘の通りだ。\n\x%l客車;#00ffc040;客車%l;#;寿命は、改修すれば当然その分延伸される。
2366 = "Ra là vậy. Quả thực đúng như lời chỉ\ntrích.\nTuổi thọ của \\x%l客車;#00ffc040;toa hành khách%l;#;, nếu được cải\ntạo, đương nhiên sẽ được kéo dài thêm."

# monologue
# JP: 近場の鉄道会社の\x%l客車;#00ffc040;客車%l;#;ニーズが満たされてしまえば、\n輸送コストが提供価格を跳ね上げてしまう。
2474 = "Nếu nhu cầu về \\x%l客車;#00ffc040;toa hành khách%l;#; của các công\nty đường sắt lân cận được đáp ứng,\nchi phí vận chuyển sẽ làm giá cung cấp\ntăng vọt."

# 【稀咲】
# display as 稀咲
# JP: 「それに、独占がいつまで続くかも不明だ。\n事業が成立するのなら、必ず各地にフォロアーが出る」
1584 = "「Hơn nữa, sự độc quyền sẽ kéo dài bao lâu\ncũng không rõ.\nNếu dự án thành công, chắc chắn sẽ có\nnhững người theo đuổi ở khắp nơi.」"

# 【日々姫】
# display as 日日姬
# JP: 「それならそれで、すごくいいことだと思います」
1433 = "「Nếu vậy thì tôi nghĩ đó là một điều rất\ntuyệt vời.」"

# 【稀咲】
# display as 稀咲
# JP: 「え？」
# 1308 = "「哎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「だってそれ、各地の鉄道会社が元気になるってことで。\nその地方の人たちも元気になるってことですから」
1668 = "「Bởi vì điều đó có nghĩa là các công ty\nđường sắt ở khắp nơi sẽ trở nên sôi động.\nVà người dân ở những địa phương đó cũng sẽ\ntrở nên tràn đầy sức sống.」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ、それはそうだよね」
1495 = "「À, đúng là vậy nhỉ.」"

# monologue
# JP: 大きくうなずき、\nけれど、と稀咲は一拍を置く。
2351 = "Gật đầu mạnh một cái,\nnhưng rồi, Kisaki dừng lại một nhịp."

# 【稀咲】
# display as 稀咲
# JP: 「各地の繁栄を支えるために、\n御一夜が犠牲になるのは、おかしな話だ」
1234 = "「Để hỗ trợ sự phồn vinh của các địa phương\nkhác,\nmà Ohimitera phải hy sinh thì thật là nực\ncười.」"

# 【日々姫】
# display as 日日姬
# JP: 「犠牲になんてなりませんよ。\n鉄道は、だって、繋がりますから」
1393 = "「Không hề hy sinh đâu.\nBởi vì đường sắt, sẽ được kết nối mà.」"

# 【稀咲】
# display as 稀咲
# JP: 「繋がる？」
1536 = "「Kết nối?」"

# 【日々姫】
# display as 日日姬
# JP: 「そうですよ？　歌ったことありませんか？\n線路は、どこまでだって繋がるんです」
1508 = "「Đúng vậy? Cô chưa từng hát bài đó sao?\nĐường ray, sẽ kết nối đến tận chân trời.」"

# monologue
# JP: そこで、日々姫は黙りこむ。\n響く軽やかなモーター音と、爽快に走る\x%lNゲージ;#00ffc040;Nゲージ%l;#;。
2160 = "Nói đến đó, Hibiki im lặng.\nTiếng động cơ nhẹ nhàng vang lên, và \\x%lNゲージ;#00ffc040;N-gauge%l;#;\nchạy một cách sảng khoái."

# monologue
# JP: つられたような、凪の鼻歌。\nふかみがあわてて、それを止める。
1915 = "Tiếng ngâm nga của Nagi như bị cuốn theo.\nFukami vội vàng ngăn lại."

# 【日々姫】
# display as 日日姬
# JP: 「鉄道にとって致命的だったのは\x%lエアクラ;#00ffc040;エアクラ%l;#;の誕生じゃなく、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;の発展のため、鉄道網が分断されたことです」
1379 = "「Điều chí mạng đối với đường sắt không\nphải là sự ra đời của \\x%lエアクラ;#00ffc040;Aircra%l;#;,\nmà là vì sự phát triển của \\x%lエアクラ;#00ffc040;Aircra%l;#;, mạng\nlưới đường sắt đã bị chia cắt.」"

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね」
1277 = "「Ra là vậy.」"

# monologue
# JP: 稀咲が頷く。\n拍子抜けするほどにあっさりと。
2377 = "Kisaki gật đầu.\nMột cách nhẹ nhàng đến mức khiến người ta\nhụt hẫng."

# 【稀咲】
# display as 稀咲
# JP: 「今は、地上型\x%lエアクラ;#00ffc040;エアクラ%l;#;の踏破性も格段に進歩している。\nもし鉄道が、趣味の粋を超えた実用性を再び示せば――」
1523 = "「Hiện nay, khả năng vượt địa hình của \\x%lエアクラ;#00ffc040;Aircra%l;#;\nmặt đất cũng đã tiến bộ vượt bậc.\nNếu đường sắt lại một lần nữa thể hiện\nđược tính thực dụng vượt ra ngoài ranh\ngiới của một sở thích――」"

# 【日々姫】
# display as 日日姬
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;の交通路として流用された鉄道路線が復活して。\nそうしたら線路はどんどん、もう一度繋がりはじめます」
1363 = "「Các tuyến đường sắt bị trưng dụng làm\nđường giao thông cho \\x%lエアクラ;#00ffc040;Aircra%l;#; sẽ hồi sinh.\nKhi đó, đường ray sẽ dần dần, bắt đầu kết\nnối lại một lần nữa.」"

# 【稀咲】
# display as 稀咲
# JP: 「そうなれば鉄道車輌のニーズも格段に増大し、\n縮小したパイを奪い合う必要はなくなる――だね？」
1271 = "「Nếu vậy, nhu cầu về phương tiện đường sắt\ncũng sẽ tăng lên đáng kể,\nvà không cần phải tranh giành miếng bánh\nđã bị thu hẹp nữa――đúng không?」"

# monologue
# JP: そこまで言われ、遅ればせながら理解する。\n稀咲は、さっきの自分の戦術の逆をやっているのだ。
2401 = "Nghe đến đó, tôi mới muộn màng nhận ra.\nKisaki đang làm ngược lại chiến thuật vừa\nnãy của mình."

# monologue
# JP: “聞き手が自分で答えを見つける"――\nそこから生まれる納得感を、説明によって潰している。\n1997 = "她利用說明去否定“聽眾自己得出答案”所產生的認同感。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「上手く運べば、確かに素晴らしい事業になるね。\nしかし……それはあくまで、空論だ」\n1698 = "「順利的話，確實能發展出一個旺盛的產業。但是……這只是紙上談兵」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ですね。そうできるなんて見通し、\n少なくとも私は立てられないです」\n1490 = "「是啊。至少我沒辦法預測到底能不能實現」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「対して、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致は確実な実業だ。\n先ほど例示したように、いくつもの土地で成功している」\n1589 = "「而引進\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠則是很切實際的實業。就像我剛才所舉的例子，這已經在好幾個城市獲得了成功」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「観光客の落ち込みからも、一年ほどで回復するし、\n水質汚染も観測できない――でしたっけ？」\n1650 = "「過了一年左右，遊客數量恢復了，沒有發現水質汙染，是嗎？」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「ボクの話を良く聞いてくれていたんだね。\n光栄だ」\n1250 = "「你聽得很仔細啊，這是我的榮幸」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「けど、ですね。稀咲先輩」\n# 1294 = "「可是啊」" \n\n# monologue\n# JP: 日々姫はぱっと両手をひろげ、\nそれを、自分のお腹にあてる。\n2181 = "日日姬突然張開雙手，然後把手貼在自己腹部。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「私、いつか――大好きな人と結ばれて、\nおかあさんになりたいなって、思うんですよ」\n1430 = "「我總有一天想和喜歡的人結合，當一名媽媽」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「うん」\n# 1333 = "「嗯」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「その子が大人になったときも――\n観光は上向きで、水質汚染は無いままですか？」\n1569 = "「等那孩子長大之後，遊客數量還能呈現漲勢嗎？水還能這麼清澈嗎？」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「それは――」\n1637 = "「這——」" \n\n# monologue\n# JP: 初めて、稀咲が言葉につまる。\n2461 = "這是稀咲第一次語塞。" \n\n# monologue\n# JP: ほんの一瞬――\n誰かの姿を求めるように、目が泳ぐ。\n2196 = "有那麼一瞬間，她的視線飄忽不定，就像是在找什麼人一樣。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「そこまで未来のことはボクには、わからないかな」\n1674 = "「那麼久以後的事情，我不清楚」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「だったら、やめましょうよ。\nわからないまま、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を誘致するのは」\n1672 = "「那還是算了吧。不清楚的情況下，還是別引進\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠了」" \n\n# monologue\n# JP: 日々姫がすっくと立ち上がり、\nまっすぐ僕に近寄ってくる。\n2151 = "日日姬忽然站了起來，然後徑直朝我這邊走了過來。" \n\n# monologue\n# JP: 預かっていた紙建築を手渡せば、\n日々姫はそれを丁寧に、レイアウトの上に配置する。\n2078 = "我將日日姬之前交給我的紙模建築遞給她，她小心地把它布置在場景模型上。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「それは――」\n1646 = "「這是——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「先輩の都市モデルを見て真似してつくった、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の模型です」\n1640 = "「這個\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠模型是我看了學姐的城市模型之後仿造出來的」" \n\n# monologue\n# JP: ざわ、と聴衆がどよめきを漏らす。\n1944 = "台下響起一片驚呼聲。" \n\n# monologue\n# JP: これは確かに……\n予想以上のインパクトが有る。\n2307 = "確實極具衝擊力……效果比預想的還要好。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「おっきすぎます。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場。\n町を大きく、変えすぎちゃいます」\n1350 = "「太大了。把\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠加進去之後，城市的改變實在是太大了」" \n\n# monologue\n# JP: 都市モデルでは、御一夜の町そのものも、\n未来図として描かれていた。\n1963 = "在城市模型中，整個御一夜也被一同規劃了。" \n\n# monologue\n# JP: 色調も美しく調和を取られ、\nだから、異物感を感じなかった。――が。\n2198 = "模型整體的色調非常協調，所以人們感覺不到異樣感。可是——。" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「あんなのできたら……\n景観もなにもなくなっちゃう。です」\n1601 = "「要是建了那種工廠……城市的風貌就全沒了」" \n\n# 【凪】\n# display as 凪\n# JP: 「デカすぎばい――\n宇宙船がボンって降りてきよったみたいばい」\n1354 = "「太大咧。簡直就像是飛來了一艘宇宙飛船」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「いや、待ってくれ。\nこれは日々姫、縮尺が正確とはいえないだろう？」\n1568 = "「等等，日日姬。這大小比例未必就是正確的吧？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そこはわたしも、わからなくって困ってて。\nだから、写真とか集めてみました」\n1405 = "「我也很擔心這一點，所以找來了一些照片」" \n\n# monologue\n# JP: プロジェクターの使用許可なら既に得ている。\nスイッチを押し、スクリーンへと投射する。\n2068 = "我們已經得到了投影機的使用許可。我按下開關，螢幕上顯示出畫面。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「……[シマント,2]四万斗川の工場だね、これは」\n1015 = "「……這是四萬十河那邊的工廠吧」" \n\n# monologue\n# JP: ホっとしたような稀咲の声。\n2376 = "稀咲鬆了一口氣。" \n\n# monologue\n# JP: 写真の中の風景と工場とは、\nそう違和感無く、馴染んでいるように見えるから。\n2255 = "照片中，工廠與周圍的風景融合在了一起，並沒有什麼不協調。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「で、次のが[キタカミ,1]北神川の\x%lエアクラ;#00ffc040;エアクラ%l;#;工場」\n1458 = "「接下來請看這張照片，這座是北上河旁邊的\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「っ！」\n# 1703 = "「！」" \n\n# monologue\n# JP: ざわっと、議場が大きくどよめく。\n1943 = "台下響起一片喧譁聲。" \n\n# monologue\n# JP: あまりに、似ている。\n川と\x%lエアクラ;#00ffc040;エアクラ%l;#;工場と、その両方の併存している光景が。\n2458 = "這兩張照片上顯示的河川和\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠並存的景象簡直如出一轍。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「[キソ,1]基礎川、[イビ,1]伊日川、[チクゴ,1]築後川」\n1506 = "「木曾河、揖斐河、筑後河」" \n\n# monologue\n# JP: ……写真を変えれば変えるほど、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場のある景色の画一性が際立っていく。\n936 = "……隨著一張張照片被展示出來，這些包含了\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠的景象的共同點越來越明顯。" \n\n# monologue\n# JP: 『目に見せる』ことの説得力が、\n稀咲の重ねてきた説明を、一枚ごとに色褪せさせる。\n1969 = "在這些照片面前，稀咲之前所作的說明黯然失色。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「おっきすぎるって思うんです。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の影響力は」\n1435 = "「我認為\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠產生的影響實在太大了」" \n\n# monologue\n# JP: ポーレットが、真闇姉が、凪とふかみが、\nそれぞれの絆をたどり、たくさんの力を集めてくれた。\n2214 = "波萊特、真闇姐、凪和深美動用了各自的人脈，求得了許多人的幫助。" \n\n# monologue\n# JP: そうした力がこの短時間に、これだけ写真を揃えてくれた。\nその全ての手が――壇上に立つ日々姫を支えてくれている。\n2465 = "那些人在這麼短的時間內為我們提供了這麼多照片。是他們的努力在支撐著台上的日日姬。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「景色さえ、ひとつの色で塗りつぶしてしまうくらいに」\n1387 = "「就連周圍的景色都被它同化了」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「……川沿いの景色が単調になり、仮にそれが長期的には、\n観光への悪影響になってしまうのだとしても」\n989 = "「……就算這會讓河周圍的景色變得單調，長此以往會對旅遊業造成負面影響」" \n\n# monologue\n# JP: 恐らく、稀咲の後ろにも、\n稀咲を支えるたくさんの手があるのだろう。\n2057 = "恐怕稀咲的背後同樣有許多人在幫助她。" \n\n# monologue\n# JP: 稀咲はあくまで数字と言葉で、稀咲の武器で、\n劣勢を打開しようと打ち込んでくる。\n2018 = "她繼續使用著她的武器——數字和說明，想靠它們來扭轉劣勢。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「観光減少を補って余りある経済的な恩恵を、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場は確実に生み出し、与えてくれる」\n942 = "「\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠催生出的經濟效應也足以彌補遊客減少所帶來的損失，甚至還有富餘」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「それはそうだと思います」\n1501 = "「是這樣」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「日々姫の示す未来には、なんの確実性も無い。\n改修事業が失敗したら、観光の方もジリ貧だ」\n1585 = "「而你所提出的未來根本沒有成功的保障。修復事業一旦失敗，旅遊業也會每況日下」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「それも、そうかもしれないですね」\n1295 = "「可能吧」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「その場合のケアはどう行うんだい？\nプランが無いなら、それは政治の責任放棄だよ」\n1366 = "「如果真的變成了那種情況，你準備如何善後？沒有計劃就是不負政治責任」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「口を開けて待ってる人にご飯を突っ込んであげるのは、\nそんなの政治の責任なんかじゃないです。過保護ですよ」\n1454 = "「把飯餵給張口等飯的人，這不叫政治責任，叫慣縱」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「だったら、日々姫にとっての、\n『政治の責任』はどのような形か教えて欲しい」\n1656 = "「那你能告訴我嗎，對你來說政治責任是什麼」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「それは――」\n1641 = "「這個——」" \n\n# monologue\n# JP: 今度は日々姫が言葉につまる。\n僕を見るから、大きく頷く。\n2463 = "這次輪到日日姬語塞了。她看了看我，然後用力點頭。" \n\n# monologue\n# JP: 日々姫は日々姫の信じる言葉を――\nそれだけが、唯一最善の戦い方だ。\n2431 = "說出她自己所堅信的想法。這就是最好的辦法。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「自分で努力して頑張る人を支えたり、\n失敗して転んだときの杖になったり――」\n1464 = "「支持那些努力的人，在他們跌倒時成為他們的支柱——」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「そうするために必要なのは税収だ。\nその税収を、どう確保するかこそが責任だろう」\n1692 = "「需要有稅收才能這麼做。想辦法保障稅收收入才是市長應負的責任吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「だから、それは！\nたとえ改修事業が、観光振興が失敗しても――」\n1429 = "「我的意思是！即便修復事業失敗了，即便沒能振興旅遊業——」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「しても？」\n1274 = "「即便失敗了？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そこから得られる経験で、必ず、次のアイディアが、\n次の一歩が、踏み出されてくるはずだから」\n1402 = "「憑藉由此獲得的經驗，大家一定能想出下一個主意，邁出下一步」" \n\n# monologue\n# JP: ふ、と稀咲が小さく笑う。\n2372 = "稀咲輕輕笑了。" \n\n# monologue\n# JP: 勝ち誇ったような笑いではなく、\nどこかつらそうに、淋しげに。\n2025 = "她露出的並不是得意的笑容，她的表情顯得有些憂傷而寂寞。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「住人の自主性まかせということかい？\nそれこそ、政治の責任放棄そのものじゃないか」\n1243 = "「你想把這些全交給市民自己去做？這才是不負責任吧」" \n\n# monologue\n# JP: そうだ、と客席から声が聴こえる。\n1941 = "台下有人表示贊同。" \n\n# monologue\n# JP: 下品なヤジとはまるで違う――\nそれは恐らく、追い詰められてこぼれた悲鳴に近い声だ。\n2406 = "與低俗的起鬨不同——它更接近於走投無路時發出的悲鳴。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そう……取られても。\n無責任って批判されても」\n1385 = "「就算……會被人指責不負責任」" \n\n# monologue\n# JP: けれど、日々姫は怯まない。\n1935 = "可日日姬卻沒有退縮。" \n\n# monologue\n# JP: 声を受け止め、\n受け止めた上で自分の声を発し続ける。\n2007 = "她承受住了這種聲音，並繼續表達自己的想法。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「それでも私は。そうしたいって思います。\n御一夜の人たちを、信じるべきだって思っています」\n1407 = "「我也還是想這麼做。我認為應該相信御一夜的人們」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「現状の御一夜の経済は低迷している。\nそれが、つまりは信じた結果――」\n1396 = "「御一夜的經濟目前陷入了低迷。這就是相信他們的後果——」" \n\n# monologue\n# JP: 言ってしまって、稀咲はクっと、\n一瞬の動揺を顔に浮かべる。\n2359 = "稀咲的臉上頓時浮現出一絲驚慌。" \n\n# monologue\n# JP: 今の言葉は、御一夜市民への侮辱とも、\n銀行自体の能力不足への吐露ともとられかねない失言だ。\n1999 = "她剛才那句話既可以理解為是對御一夜市民的侮辱，也可以理解為是承認銀行自身能力不足。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「……少し前までは、みんなが下をむいちゃってた。\n笑顔を、ちょっと忘れちゃってた――それだけですよ」\n982 = "「……不久之前，大家都有點消極，暫時忘記了笑容。不過也僅僅只是這樣而已」" \n\n# monologue\n# JP: けれど日々姫は、稀咲の失言を捉えない。\n言葉の代わり、さっ――と鉛筆を走らせる。\n2144 = "日日姬並沒有揪住稀咲的失言。她沒有說話，而是拿起鉛筆畫了起來。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「私、稀咲先輩の笑顔、知ってます」\n1419 = "「我很熟悉稀咲學姐的笑容」" \n\n# monologue\n# JP: スケッチブックの上には稀咲の笑顔。\n輝くような――多分、日々姫にしかみせない笑顔。\n2383 = "素描簿上畫著稀咲燦爛的笑容——大概只有日日姬才會看到那種笑容。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「レイアウトを一緒に作って、\nたくさんの笑顔、教えてもらいました」\n1415 = "「我和大家一起製作了場景模型，見到了許多笑容」" \n\n# monologue\n# JP: スケッチブックがめくられる。\n笑顔、笑顔、笑顔、笑顔。\n2142 = "日日姬一頁頁地翻著素描簿，上面畫著各式各樣的笑容。" \n\n# monologue\n# JP: 男性も女性も、老人も子供も赤ちゃんも。\nみんなの笑顔を、日々姫は紙に閉じ込めている。\n1845 = "不分男女老少。形形色色的人的笑容都被她定格在了紙上。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「線路は線路とだけじゃない。\n人の心も、人の笑顔も、きっとつなげてくれるから――」\n1680 = "「鐵路連接的不只是各條線路，它一定還連接了人們的心，人們的笑容——」" \n\n# monologue\n# JP: スケッチブックがまためくられる。\n一枚の色鮮やかな絵が現れる。\n1994 = "她再次翻頁，展示出一張色彩鮮艷的畫。" \n\n# monologue\n# JP: 笑顔と、笑顔と、笑顔の中を、笑顔にあふれた御一夜を。\n\x%l8620;#00ffc040;8620%l;#;が\x%lキハ07;#00ffc040;キハ07%l;#;sが新しい\x%l客車;#00ffc040;客車%l;#;が、僕らをのせて走ってる。\n2269 = "畫上，\\x%l8620;#00ffc040;８６２０%l;#;和\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;Ｓ以及全新的\\x%l客車;#00ffc040;客運車廂%l;#;正載著我們，跑在充滿笑容的御一夜中。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「ふわわわわぁ～っ」\n1304 = "「哇啊啊啊～」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「素敵な絵ですね。\nとても暖かで、日々姫らしい絵」\n1645 = "「這張畫畫得真好。它讓人覺得非常溫暖，很有日日姬的風格」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ、本当だな」\n1492 = "「是啊，你說得沒錯」" \n\n# monologue\n# JP: これが、日々姫の夢見る未来図。\n2460 = "這就是日日姬所夢想的未來。" \n\n# monologue\n# JP: 子供じみていると笑うものには、もう笑わせておけばいい。\nその笑いさえ、日々姫はきっと未来図の一部にしてしまう。\n2193 = "有人想笑它幼稚的話，就讓他們去笑吧。日日姬一定會把這些笑容也加到未來圖景中去。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「――だから、御一夜は大丈夫です。\n工場になんて頼らなくても、もっと素敵な町になります」\n945 = "「——不用擔心御一夜。就算沒有工廠，它也會變成一座更加美好的城市」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「……素敵な絵だね。とても、素敵だ」\n1012 = "「……這張畫畫得真好。真的很好」" \n\n# monologue\n# JP: 稀咲も笑う。\n笑って、けれども――すぐに表情を引き締める。\n2334 = "稀咲也笑了——不過她馬上又恢復了嚴肅的表情。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「しかし、絵だ。\n絵は、現実とは違うものだよ」\n1231 = "「但是畫終究只是畫，和現實是不同的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「いいえ、先輩。わたしは、見たものしか描けません。\nこれが、現実の御一夜なんです」\n1222 = "「不，學姐。我只會畫我看到的東西。這就是真實的御一夜」" \n\n# monologue\n# JP: スケッチブックを、日々姫は稀咲に渡してしまう。\n2157 = "日日姬把素描簿遞給了稀咲。" \n\n# monologue\n# JP: 稀咲は受け取り、じっと眺めて――\nそれからゆっくり、大事に大事に日々姫に返す。\n2365 = "稀咲認真地看了一會，然後鄭重地把素描簿還給了日日姬。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「日々姫の絵は、とても素敵だ。\nけど、ね？　日々姫」\n1249 = "「你的畫很棒。可是啊」" \n\n# monologue\n# JP: 認めて、それでも、その上に。\n稀咲もまた、自分の言葉を静かに重ねる。\n2364 = "稀咲認可了日日姬的畫，不過她還是繼續說出自己的想法。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「誰もが上手く、自分の絵を描けるとは限らない。\n描きたい絵すら、見つけられない人もいる」\n1217 = "「不是每個人都有能力去追求自己的夢想的。有些人甚至連夢想都找不到」" \n\n# monologue\n# JP: 稀咲が浮かべた淋しげな目の、\nその奥にあるものが見えた気がする。\n2375 = "稀咲露出了憂傷的眼神。我似乎明白她在想什麼。" \n\n# monologue\n# JP: 環境により、教育により、夢さえ見れなくなった人を――\n銀行家である稀咲は恐らく、数多く知っているのだろう。\n1989 = "她作為一名銀行家，大概接觸過許多因環境或教育而看不到夢想的人。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「政治とは、そんな人達こそを助けるものだとボクは思う。\n描ける者の理想をではなく、描けない者の現実こそを」\n1436 = "「我認為政治是為了幫助那些人而存在的。它處理的是那些找不到夢想的人的現實問題，而不是擁有理想的人的理想」" \n\n# monologue\n# JP: 塗りつぶされた景色の中でも、確実に食を得られる生活。\n2483 = "雖然環境會變得單調，但基本的生活確實能夠得到保障。" \n\n# monologue\n# JP: その味気無さを僕は知ってる。\n知っていて――だからこそ否定しきれない。\n2091 = "我體會過那種無力感。正因為我了解那種感受，所以才沒辦法徹底否定。" \n\n# monologue\n# JP: けれど日々姫は揺るがない。\n1873 = "但這卻撼動不了日日姬。" \n\n# monologue\n# JP: 日々姫とて、誰からも認められない時間を知ってる。\n知っていてなお、その中で絵を描き続けてきた。\n1959 = "因為過去，她也在不被任何人認可的情況下仍然堅持畫畫。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「思いませんか？\n現実は――今の御一夜は、綺麗って」\n1239 = "「你不覺得現在的御一夜很美嗎？」" \n\n# monologue\n# JP: 日々姫の目は、いとおしそうにレイアウトへと注がれる。\n2153 = "日日姬愛憐地注視著場景模型。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「それは、今の御一夜に生きるみんなが、\nそれぞれに、それぞれの大好きを形にしたから」\n1395 = "「御一夜會這麼美麗，是因為生活在這裡的人們把各自的想法化為了現實」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「…………」\n971 = "「…………」" \n\n# monologue\n# JP: 稀咲の視線も、レイアウトへと。\n唇を固く結んだままに。\n2361 = "稀咲緊閉雙唇，看向場景模型。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「[か]描きたい絵、本当は誰にだってあるんです。\nそれを表現しやすい世界を、私はみんなと[えが]描きたいです」\n1262 = "「其實每個人心裡都有想實現的夢想。我想和大家一起創造一個使人們更容易實現夢想的世界」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「……なるほどね」\n983 = "「……原來如此」" \n\n# monologue\n# JP: ふっと、稀咲が笑顔を浮かべる。\nあきれたような、疲れたような――\n2344 = "稀咲忽然笑了起來。她似乎是放棄了，又像是已經疲倦了。" \n\n# monologue\n# JP: いつものそれほど整っていない、\nけれどもずっと、稀咲の体温を感じる笑顔を。\n2013 = "她的笑容雖然並不像平時那般瀟灑，但卻使人感到溫暖。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「ありがとう、日々姫。\n本音を聞けて、嬉しかったよ」\n1616 = "「謝謝你，日日姬。我很高興能聽到你真正的想法」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わたしこそです、稀咲先輩。\nお話ししてくれて、ありがとうございます」\n1611 = "「該說謝謝的是我，稀咲學姐。謝謝你和我說了這麼多」" \n\n# monologue\n# JP: 握手。まばらな拍手が起きる。\nそしてすぐさま拍手が会場を埋め尽くす。\n1993 = "她們握手。台下先是響起稀疏的掌聲，很快掌聲響成一片。" \n\n# monologue\n# JP: かやの外へと置かれた候補者ふたりさえ、\n惜しみなく、日々姫と稀咲に拍手を送ってくれている。\n2039 = "就連另外兩名被晾在一邊的候選人也熱烈地為日日姬和稀咲鼓掌。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……あと、もう一仕事だ」\n1016 = "「……還有一件事要做」" \n\n# monologue\n# JP: 日々姫は日々姫のベストを示した。\n僕は、それに応えたい。\n2159 = "日日姬拿出了她最好的表現。我不想讓她失望。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あの日々姫の絵を、ポスターに」\n1453 = "「把日日姬的畫做成海報」" \n\n# monologue\n# JP: あれこそが、メインビジュアルだ。\n1921 = "剛才那張畫正是主視覺圖。" \n\n# monologue\n# JP: 御一夜の未来を示すあの絵をもっと、\n多くの人に見てもらい――\n2050 = "得讓更多的人看到那張指示著御一夜未來方向的畫——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そして必ず、御一夜の今と重ねていこう」\n1206 = "「一定要將御一夜引向那個未來」" \n