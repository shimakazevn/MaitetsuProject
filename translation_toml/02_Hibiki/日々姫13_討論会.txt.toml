[script]
# lines: 421 
# 【ポーレット】
# display as 波萊特
# JP: 「……いいですね。\n日々姫ちゃん、すごく落ち着いてる」
994 = "「......Tốt quá rồi. Em Hibiki đang rất bình tĩnh.」"
# monologue
# JP: 討論会の第一部となる、個別演説。
2447 = "Phần đầu tiên của cuộc tranh luận, diễn thuyết cá nhân."
# monologue
# JP: 生年月日の遅いものからということで、\n日々姫は一番最初の演説順となってしまった。
2245 = "Vì thứ tự diễn thuyết được xếp theo ngày tháng năm sinh từ muộn nhất trở đi, nên Hibiki đã trở thành người diễn thuyết đầu tiên."
# 【日々姫】
# display as 日日姬
# JP: 「政治について、今まで深くは考えていませんでした。\nけど、御一夜の町を私はずっと、見続けて来ました」
1596 = "「Về chính trị, từ trước đến nay tôi chưa từng suy nghĩ sâu sắc. Nhưng, tôi vẫn luôn dõi theo thị trấn Ohimitera này.」"
# monologue
# JP: が、トップバッターの重圧に負けず、\n等身大の日々姫の言葉で、日々姫は演説を重ねていく。
1872 = "Tuy nhiên, không chịu khuất phục trước áp lực của người mở màn, Hibiki tiếp tục bài diễn thuyết bằng những lời lẽ chân thật nhất của bản thân."
# 【日々姫】
# display as 日日姬
# JP: 「――このレイアウトは、みなさんの手によって作られた、\nみなさんが描いてくれた、御一夜の未来図です」
955 = "「――Sa bàn này được tạo ra bởi chính bàn tay của mọi người, là bức tranh tương lai của Ohimitera do mọi người vẽ nên.」"
# monologue
# JP: 演壇前には、レールショップから運搬してきたレイアウト。\n通電の許可も、無事にもらえた。
2243 = "Trước bục diễn thuyết là sa bàn được vận chuyển từ cửa hàng đường sắt tới. Chúng tôi cũng đã thuận lợi xin được giấy phép cấp điện."
# monologue
# JP: レイアウト内では、環状線となった湯医線上を、\n\\x%l8620;#00ffc040;8620%l;#;と\\x%lキハ07;#00ffc040;キハ07%l;#;sとが、それぞれに新\\x%l客車;#00ffc040;客車%l;#;を引いている。
1964 = "Bên trong sa bàn, trên tuyến Yui đã trở thành tuyến vòng, \\x%l8620;#00ffc040;8620%l;#; và \\x%lキハ07;#00ffc040;KiHa 07%l;#;S đang lần lượt kéo theo \\x%l客車;#00ffc040;toa hành khách%l;#; mới."
# 【凪】
# display as 凪
# JP: 「お客さんたち、めちゃくちゃレイアウト見とるばい」
1346 = "「Khán giả đang nhìn sa bàn chăm chú lắm nè.」"
# monologue
# JP: 日々姫の演説が終わり次第に、\nレイアウトを素早く分割・撤収しなければならない。
2170 = "Ngay khi bài diễn thuyết của Hibiki kết thúc, chúng tôi phải nhanh chóng tháo dỡ và dọn dẹp sa bàn."
# monologue
# JP: ゆえに僕らは控え通路でスタンバイしている。
2093 = "Do đó, chúng tôi đang đứng chờ sẵn ở lối đi hậu trường."
# 【凪】
# display as 凪
# JP: 「こぎゃん食い付きなら！」
1401 = "「Với sự chú ý cỡ này thì!」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪、声」
1266 = "「Nagi, nhỏ tiếng thôi.」"
# 【凪】
# display as 凪
# JP: 「ゎうっ！？　すまんばいっ」
1320 = "「Oái!? Xin lỗi nha.」"
# monologue
# JP: 控えに誰かがいることを悟られ気にされてしまっては、\n聴衆の気を、日々姫の演説から散らしてしまいかねない。
2411 = "Nếu để khán giả nhận ra và bận tâm đến việc có người ở hậu trường, thì có thể sẽ làm họ phân tâm khỏi bài diễn thuyết của Hibiki."
# monologue
# JP: （――なにせ、相手は宝生稀咲だ）
2491 = "（――Dù sao thì, đối thủ cũng là Houshou Kisaki）"
# monologue
# JP: 僕らに向けて吹いてる風を、変えようとしての討論会。\n必勝の体勢を、既に整えているに違いない。
2347 = "Một cuộc tranh luận nhằm thay đổi chiều gió đang thổi về phía chúng tôi. Chắc chắn cô ấy đã chuẩn bị sẵn sàng tư thế tất thắng rồi."
# monologue
# JP: 付け込む隙をほんの僅かにでも見せてしまえば、\n必ず稀咲は、そこに食い付き、喰い破ってくる。
1931 = "Chỉ cần để lộ ra một chút sơ hở nhỏ nhoi thôi, chắc chắn Kisaki sẽ bám lấy và xé toạc nó ra."
# monologue
# JP: （小手先の技でどうこう出来る相手ではない。\n万全を尽くし全力で臨む。その他に出来ることはない）
2512 = "（Đó không phải là đối thủ có thể đối phó bằng những mánh khóe nhỏ. Phải dốc hết toàn lực để đối mặt. Ngoài ra không còn cách nào khác）"
# monologue
# JP: 真闇姉の授けてくれた作戦は、ただ、\n『普段と同じひーちゃんで』と、それだけだった。
2297 = "Chiến thuật mà chị Mayami truyền đạt lại chỉ đơn giản là, 『Cứ để bé Hi thể hiện như bình thường』, chỉ vậy thôi."
# monologue
# JP: 確かに、付け焼き刃の討論対策などはそれこそ、\n絵に描いたような生兵法、怪我の元にしかならんだろう。
2272 = "Quả thực, những biện pháp đối phó tranh luận học vẹt như vậy, chẳng khác nào binh pháp trên giấy, chỉ tổ rước họa vào thân."
# monologue
# JP: （……日々姫のベストは、いつもの日々姫。\nここでどれだけ共感を作れるかが、日々姫の勝負だ）
2498 = "（......Trạng thái tốt nhất của Hibiki chính là Hibiki thường ngày. Việc có thể tạo ra bao nhiêu sự đồng cảm ở đây, chính là ván cược của Hibiki）"
# 【日々姫】
# display as 日日姬
# JP: 「――いろんな思いがあって、いろんな建物があって、\nそれで、今の御一夜が出来上がっている――」
947 = "「――Có rất nhiều tâm tư, có rất nhiều tòa nhà, và nhờ đó, mới tạo nên Ohimitera của hiện tại――」"
# 【ふかみ】
# display as 深美
# JP: 「……うなずいていてくれてる人、多い。です。\nすごく、熱心に聞いてくれてる感じで」
998 = "「......Có rất nhiều người đang gật đầu. Ạ. Cảm giác như họ đang lắng nghe rất chăm chú.」"
# 【れいな】
# display as 玲奈
# JP: 「あの子、すっごくレイアウトさわりたそうですぅ。\n手、いっぱいにのばしてますよぉ」
1658 = "「Đứa bé kia có vẻ rất muốn chạm vào sa bàn nha. Đang vươn tay ra hết cỡ luôn đó ạ~」"
# monologue
# JP: だから、いい。\nこれでいい。
2462 = "Vậy nên, tốt rồi. Thế này là tốt rồi."
# monologue
# JP: 日々姫の作りたい未来を心に描いてもらうことこそ、\n日々姫に出来る、最良の演説に他ならないから。
2434 = "Việc để mọi người vẽ nên tương lai mà Hibiki muốn tạo ra trong tâm trí họ, chính là bài diễn thuyết tốt nhất mà Hibiki có thể làm."
# 【日々姫】
# display as 日日姬
# JP: 「――鉄道を中心とした観光と産業の振興。\nそれは、ゆるやかな発展しか産めないかもしれません」
951 = "「――Chấn hưng du lịch và công nghiệp với trung tâm là đường sắt. Điều đó có lẽ chỉ mang lại sự phát triển chậm rãi.」"
# monologue
# JP: 日々姫の目が、レイアウトの上、\nクマ川沿いの線路と\\x%l列車;#00ffc040;列車%l;#;とに注がれる。
2164 = "Ánh mắt của Hibiki hướng lên sa bàn, nhìn vào tuyến đường sắt dọc sông Kuma và \\x%l列車;#00ffc040;đoàn tàu%l;#;."
# monologue
# JP: 終点、湯医駅間近。\nよどむところなく日々姫の言葉も終わりに向かう。
60 = "Điểm cuối, ga Yui đang đến gần. Lời nói của Hibiki cũng trôi chảy đi đến hồi kết."
# 【日々姫】
# display as 日日姬
# JP: 「けど緩やかな変化だからこそ――そこに描かれる未来は、\n御一夜の今と、歪むことなくつながります」
1236 = "「Nhưng chính vì là sự thay đổi chậm rãi――tương lai được vẽ ra ở đó, sẽ kết nối với Ohimitera hiện tại mà không hề bị bóp méo.」"
# monologue
# JP: 沈黙とまなざし。
2403 = "Sự im lặng và những ánh nhìn."
# monologue
# JP: 聴衆の視線も日々姫につられ、\nレイアウトの上へと移動していく。
1864 = "Ánh mắt của khán giả cũng bị Hibiki thu hút, và di chuyển lên trên sa bàn."
# 【日々姫】
# display as 日日姬
# JP: 「だから、そうした変化こそを、\n私は、市政で、描いていきたいと願っています」
1426 = "「Vì vậy, chính những thay đổi đó, tôi mong muốn được vẽ nên trong chính quyền thành phố này.」"
# monologue
# JP: 深く一礼。\n大きな拍手。
2169 = "Một cái cúi đầu thật sâu. Những tràng pháo tay lớn vang lên."
# 【ポーレット】
# display as 波萊特
# JP: 「うん！」
1334 = "「Tuyệt quá!」"
# monologue
# JP: ポーレットの明るい声は、そのまま僕らの手応えだ。\nが、満足に足を止めてはいけない。
2219 = "Giọng nói tươi sáng của Paulette chính là thành quả của chúng tôi. Nhưng, không được phép dừng bước trong sự thỏa mãn."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が退場したら、すぐに撤収に」
1482 = "「Ngay khi Hibiki rời sân khấu, lập tức dọn dẹp sa bàn.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、その必要はないよ」
1218 = "「À, không cần thiết đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1704 = "「Hả!?」"
# monologue
# JP: 宝生稀咲だ。
2187 = "Là Houshou Kisaki."
# monologue
# JP: 清潔感のある白のスーツは、\n稀咲の聡明なイメージをさらに強調している。
2099 = "Bộ vest trắng toát lên vẻ sạch sẽ, càng làm tôn thêm hình ảnh thông minh của Kisaki."
# 【稀咲】
# display as 稀咲
# JP: 「日々姫と入れ替わって登壇したい。\nなに、ちょっとした演出さ」
1422 = "「Tôi muốn lên sân khấu đổi chỗ cho Hibiki. Không có gì đâu, chỉ là một chút diễn xuất thôi.」"
# 【真闇】
# display as 真闇
# JP: 「それはっ！」
1566 = "「Khoan đã!」"
# 【稀咲】
# display as 稀咲
# JP: 「ごめん。もう行く」
1212 = "「Xin lỗi. Tôi đi đây.」"
# monologue
# JP: 真闇姉の制止を無視し、\n稀咲が演壇へと向かう。
2330 = "Phớt lờ sự can ngăn của chị Mayami, Kisaki tiến về phía bục diễn thuyết."
# monologue
# JP: 演壇から降りる日々姫に向けて手をさし延べて、\n日々姫もすぐ、それに答える。
2002 = "Cô ấy đưa tay ra hướng về phía Hibiki đang bước xuống bục, và Hibiki cũng ngay lập tức đáp lại."
# monologue
# JP: （パシャ、パシャ、パシャ、パシャっ！）
2518 = "（Tách, tách, tách, tách!）"
# monologue
# JP: 記者たちのカメラフラッシュが一斉に煌めく。\nなるほど、確かに演出だ。
2301 = "Ánh đèn flash từ máy ảnh của các phóng viên đồng loạt lóe sáng. Ra là vậy, quả thực là một màn diễn xuất."
# monologue
# JP: 稀咲と日々姫の絵になる握手は、\n他の候補とふたりを確実に差別化しよう。
2339 = "Cái bắt tay đẹp như tranh vẽ của Kisaki và Hibiki, chắc chắn sẽ tạo ra sự khác biệt rõ rệt giữa hai người họ và các ứng cử viên khác."
# monologue
# JP: （……が、今さらそれに意味があるのか？\n事実上の一騎打ちと、誰もが承知しているではないか）
2496 = "（......Nhưng, đến giờ phút này làm vậy còn ý nghĩa gì chứ? Chẳng phải ai cũng thừa biết đây thực chất là một cuộc đấu tay đôi sao）"
# 【真闇】
# display as 真闇
# JP: 「まずかとね」
1211 = "「Không ổn rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1308 = "「Hả?」"
# 【稀咲】
# display as 稀咲
# JP: 「多くの市民の皆様とは、はじめましてになりますね。\nボクの名前は宝生稀咲。御一夜市長選の立候補者です」
1390 = "「Với nhiều công dân ở đây, có lẽ đây là lần đầu tiên chúng ta gặp mặt. Tên tôi là Houshou Kisaki. Là ứng cử viên cho chức thị trưởng Ohimitera.」"
# monologue
# JP: すぐに始まった演説が、\n真闇姉のつぶやきを飲み込んでしまう。
2244 = "Bài diễn thuyết ngay lập tức bắt đầu, nuốt chửng lấy tiếng lầm bầm của chị Mayami."
# monologue
# JP: ……稀咲は、まったく力んでいない。\n僕らと会話するように、自然な言葉を重ねていく。
933 = "......Kisaki hoàn toàn không hề gồng mình. Cô ấy tuôn ra những lời lẽ tự nhiên, hệt như đang trò chuyện với chúng tôi."
# 【稀咲】
# display as 稀咲
# JP: 「先に登壇された右田候補とは、学園の、\n先輩・後輩の仲になります。部活も一緒なんですよ」
1413 = "「Với ứng cử viên Migita vừa lên bục trước đó, chúng tôi là tiền bối - hậu bối trong trường. Cả hai cũng tham gia cùng một câu lạc bộ nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1703 = "「!」"
# monologue
# JP: ほう、という声が会場のそちこちから漏れる。\n稀咲は、巧い。やはり巧い。
2192 = "Những tiếng ồ lên vang khắp hội trường. Kisaki, thật khéo léo. Quả nhiên là rất khéo léo."
# monologue
# JP: 日々姫が育てた親近感の輪の中に、\nただ一言で、自分を組み入れてしまった。
2000 = "Chỉ bằng một câu nói, cô ấy đã tự đưa mình vào vòng tròn gần gũi mà Hibiki đã dày công vun đắp."
# 【稀咲】
# display as 稀咲
# JP: 「とはいっても、理想とする市政まで同じではありません。\nですので、ボクは、ボクの理想を論じさせてもらいます」
1689 = "「Mặc dù vậy, lý tưởng về chính quyền thành phố của chúng tôi không hề giống nhau. Vì vậy, tôi xin phép được trình bày về lý tưởng của mình.」"
# 【ポーレット】
# display as 波萊特
# JP: 「都市モデル、使わないんですね」
1355 = "「Cô ấy không sử dụng mô hình đô thị nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1316 = "「Ừm.」"
# monologue
# JP: ポーレットの声に気付かされる。\nあの都市モデルが、影も形も見当たらない。
2391 = "Giọng nói của Paulette làm tôi nhận ra. Bóng dáng của mô hình đô thị đó hoàn toàn không thấy đâu."
# monologue
# JP: 僕らの据え付けたレイアウトだけが、\n演壇前に、置き去るようにされている。
2070 = "Chỉ có mỗi sa bàn mà chúng tôi lắp đặt, đang bị bỏ lại trước bục diễn thuyết."
# monologue
# JP: （ああ……そうか）
2510 = "（A...... Ra là vậy）"
# monologue
# JP: 真闇姉が漏らした呟き。\nその意味を、今さらながらに理解する。
2084 = "Tiếng lầm bầm mà chị Mayami thốt ra. Đến tận bây giờ tôi mới hiểu được ý nghĩa của nó."
# 【稀咲】
# display as 稀咲
# JP: 「いま日ノ本国内にある\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場は、二十二箇所。\nそのうち十二が、一級水系に隣接しています」
1488 = "「Hiện tại, có hai mươi hai nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; ở Hinomoto. Trong số đó, có mười hai nhà máy nằm liền kề với hệ thống sông ngòi cấp một.」"
# monologue
# JP: スーツスタイルと演説内容。
2355 = "Phong cách mặc vest và nội dung diễn thuyết."
# monologue
# JP: その両方がマッチして、稀咲は普段以上に大人びて――\n非常に有能、かつ頼もしい存在に見えている。
1895 = "Cả hai điều đó kết hợp lại, khiến Kisaki trông trưởng thành hơn thường ngày―― Trông cô ấy như một sự tồn tại vô cùng tài năng và đáng tin cậy."
# 【稀咲】
# display as 稀咲
# JP: 「……次に、三年前に\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を誘致した、\n[シマント,2]四万斗市のデータを御覧ください」
1013 = "「......Tiếp theo, xin hãy xem dữ liệu của thành phố Shimanto, nơi đã thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; vào ba năm trước.」"
# monologue
# JP: 川下り船の観光客数、天然うなぎの漁獲高、人口推移、\n税収推移、経済指標、水質検査で出た数値――
2234 = "Số lượng khách du lịch đi thuyền trên sông, sản lượng đánh bắt lươn tự nhiên, biến động dân số, biến động doanh thu thuế, chỉ số kinh tế, số liệu từ các cuộc kiểm tra chất lượng nước――"
# monologue
# JP: 稀咲はただただ、\n客観的な事実群だけを積み重ねていく。
2363 = "Kisaki chỉ đơn thuần, chất đống những sự thật khách quan lên nhau."
# 【稀咲】
# display as 稀咲
# JP: 「このように、[シマント,2]四万斗市においても、\n観光客減の影響から、二年目には回復を遂げています」
1208 = "「Như quý vị thấy, ngay cả ở thành phố Shimanto, từ ảnh hưởng của việc giảm sút khách du lịch, họ đã đạt được sự phục hồi vào năm thứ hai.」"
# monologue
# JP: 『だから』と主張は展開しない。\n“歪み”と日々姫が示した懸念に、直接的には反論しない。
2332 = "Cô ấy không triển khai lập luận kiểu 『Vì vậy』. Cũng không trực tiếp phản bác lại nỗi lo ngại về \"sự bóp méo\" mà Hibiki đã chỉ ra."
# monologue
# JP: それがじわじわ……\n日々姫の味方に僕にでさえも、効いてくる。
2443 = "Điều đó cứ từ từ... tác động đến cả tôi, một người đứng về phía Hibiki."
# 【真闇】
# display as 真闇
# JP: 「まっこと、あの娘は上手かとねぇ。\n結論ば、あえて口にせんけん」
1662 = "「Quả thực, con bé đó giỏi thật đấy. Cố tình không nói ra kết luận mà.」"
# 【ハチロク】
# display as 八六
# JP: 「――だから、こちらが考えさせられてしまうのですね。\n誘導された結論を、あたかも、自分の考えのように」
949 = "「――Vì vậy, người nghe sẽ buộc phải tự suy nghĩ. Và coi cái kết luận bị dẫn dắt đó, cứ như thể là suy nghĩ của chính mình vậy.」"
# monologue
# JP: そう、まさしく結論を誘導されている。
2338 = "Đúng vậy, chính xác là kết luận đang bị dẫn dắt."
# monologue
# JP: 稀咲があげている数字は当然、\n全て、稀咲にとって都合の良いものばかりなのだから。
1958 = "Những con số mà Kisaki đưa ra, tất nhiên, tất cả đều là những con số có lợi cho cô ấy."
# monologue
# JP: （だが――）
2509 = "（Nhưng――）"
# monologue
# JP: 討論会場を埋め尽くす聴衆の全てが、\nその誘導に気付くことなどありえない。
2230 = "Toàn bộ khán giả lấp đầy hội trường tranh luận này, không thể nào nhận ra sự dẫn dắt đó."
# monologue
# JP: 直近の世論調査では日々姫が有利に立っているとはいえ、\n３％が稀咲に転べば、それで逆転を許してしまう。
2190 = "Mặc dù trong cuộc thăm dò dư luận gần đây nhất, Hibiki đang chiếm ưu thế, nhưng chỉ cần 3% nghiêng về phía Kisaki, tình thế sẽ bị đảo ngược."
# 【ふかみ】
# display as 深美
# JP: 「レイアウト……せっかく持ってきたのに。です」
1358 = "「Sa bàn...... cất công mang đến tận đây vậy mà. Ạ.」"
# monologue
# JP: ふかみが、弱気になっている。
2226 = "Fukami đang trở nên yếu đuối."
# 【ポーレット】
# display as 波萊特
# JP: 「稀咲さん、どけなくていいって言ったの――\nこういう風に持っていこうと思っていたからなんですね」
1558 = "「Việc Kisaki nói không cần dọn đi―― là vì cô ấy đã định dẫn dắt theo hướng này nhỉ.」"
# monologue
# JP: 対して、ポーレットは冷静だ。
2215 = "Trái lại, Paulette rất bình tĩnh."
# monologue
# JP: が、ふたりがそれぞれの表現方法で示しているのは、\n同じ懸念だ。
1991 = "Nhưng, điều mà cả hai đang thể hiện theo những cách khác nhau, lại cùng chung một nỗi lo ngại."
# 【双鉄】
# display as 雙鐵
# JP: 「……残念なことに、こうした話を展開されると、\nレイアウトが子供じみたものに見えてしまうな」
993 = "「......Thật đáng tiếc, khi những câu chuyện như thế này được triển khai, sa bàn trông có vẻ trẻ con quá.」"
# monologue
# JP: それも恐らく稀咲の計算なのではあろうが、\n都市模型という対象物が無いのが非常に災いしている。
2059 = "Có lẽ đó cũng nằm trong tính toán của Kisaki, nhưng việc không có đối tượng so sánh là mô hình đô thị đang gây ra tai họa rất lớn."
# monologue
# JP: レイアウトも\\x%lNゲージ;#00ffc040;Nゲージ%l;#;も、稀咲の作った空気によって、\n完全に浮いた存在にされてしまった。
1974 = "Cả sa bàn lẫn \\x%lNゲージ;#00ffc040;N-gauge%l;#;, bởi bầu không khí mà Kisaki tạo ra, đã hoàn toàn trở thành một sự tồn tại lạc lõng."
# 【ふかみ】
# display as 深美
# JP: 「このあと……ええと、直接討論、でしたっけ？」
1638 = "「Sau chuyện này...... à ừm, là tranh luận trực tiếp, phải không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1377 = "「Ừ.」"
# monologue
# JP: 演説を終えた日々姫は、\n演壇裾に並べられている椅子に着席している。
2390 = "Sau khi kết thúc bài diễn thuyết, Hibiki đang ngồi trên chiếc ghế được xếp ở góc bục."
# monologue
# JP: 内心はどうだかわからんが、\n表情は落ち着いているように見え、ホっとする。
2063 = "Không biết trong lòng con bé thế nào, nhưng nét mặt trông có vẻ bình tĩnh, khiến tôi cũng thở phào nhẹ nhõm."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の演説。稀咲の演説。他の候補者二人の演説。\nそれが終わり次第、討論と質疑応答という流れと」
1339 = "「Bài diễn thuyết của Hibiki. Bài diễn thuyết của Kisaki. Bài diễn thuyết của hai ứng cử viên khác. Ngay khi những phần đó kết thúc, sẽ chuyển sang phần tranh luận và hỏi đáp.」"
# 【凪】
# display as 凪
# JP: 「なら！」
1472 = "「Vậy thì!」"
# monologue
# JP: 僕の説明を横から断ち切る、焦ったような凪の声。
1911 = "Giọng nói có vẻ nôn nóng của Nagi cắt ngang lời giải thích của tôi."
# 【凪】
# display as 凪
# JP: 「直接討論やらの前に、\nあのレイアウトば、どけた方が良かとよ」
1341 = "「Trước khi bắt đầu tranh luận trực tiếp, tốt nhất là dọn cái sa bàn kia đi thì hơn.」"
# 【ふかみ】
# display as 深美
# JP: 「う、うん。わたしも。\nそうかもって思う。です」
1326 = "「Ư, ừm. Mình cũng. Nghĩ là như vậy. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。\n一度はどける必要があるだろう」
1546 = "「Quả thực là vậy. Có lẽ cần phải dọn nó đi một lần.」"
# monologue
# JP: 稀咲以外の候補者の演説が続く間も放置をしては、\nあのレイアウトは目障りそのものにまで堕してしまう。
2417 = "Nếu cứ để mặc nó trong lúc các ứng cử viên khác ngoài Kisaki tiếp tục diễn thuyết, thì cái sa bàn đó sẽ trở thành thứ chướng mắt mất."
# monologue
# JP: この状況での撤去は“逃げ”と確実に受け取られようが、\nそうあってもまだ、やらないよりは遥かにマシだ。
1889 = "Việc dọn dẹp trong tình huống này chắc chắn sẽ bị coi là \"bỏ chạy\", nhưng dù có vậy thì vẫn còn tốt hơn nhiều so với việc không làm gì cả."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、どけただけでは状況の改善には繋がらん。\n押されているときに守りに入れば、そのまま負けるぞ」
1229 = "「Nhưng mà, chỉ dọn đi thôi thì không giúp cải thiện tình hình đâu. Nếu cứ phòng thủ khi đang bị ép sân, thì sẽ thua mất đấy.」"
# 【凪】
# display as 凪
# JP: 「だったら！　どぎゃんとして逆転するばいっ」
1660 = "「Vậy thì! Làm sao để lật ngược tình thế đây!」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。それなんだけどね」
1332 = "「Vâng. Về chuyện đó thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、何かアイディアがあるな――ら……」
1337 = "「Ồ, em có ý tưởng gì sao――thì......」"
# 【真闇】
# display as 真闇＆八六
# JP: 「ひーちゃん！？」\n「日々姫っ！？」
1381 = "「Bé Hi!?」 「Hibiki!?」"
# monologue
# JP: 真闇姉までが驚いている。\n僕も、とっさには言葉が出ない。
2040 = "Ngay cả chị Mayami cũng phải ngạc nhiên. Tôi cũng bất chợt không thốt nên lời."
# 【れいな】
# display as 玲奈
# JP: 「あれぇ、\nどーして日々姫さんがここにいるんですかぁ？」
1303 = "「Ủa, sao chị Hibiki lại ở đây vậy ạ~?」"
# monologue
# JP: 全員が感じている疑問を、\n自分のペースを崩さぬれいなが、言葉に直す。
2202 = "Reina, người không hề đánh mất nhịp độ của riêng mình, đã nói ra thắc mắc mà tất cả mọi người đều đang cảm thấy."
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩の持ち時間、あと十分あるし。候補者さんも、\nまだ二人いるでしょ？」
1557 = "「Thời gian của tiền bối Kisaki còn tận mười phút nữa. Các ứng cử viên khác, cũng vẫn còn hai người nữa mà?」"
# monologue
# JP: 日々姫がちら、と演壇を見る。
2178 = "Hibiki liếc nhìn về phía bục diễn thuyết."
# monologue
# JP: 日々姫の退出に気づいているのかいないのか――\n稀咲の演説は変わらず見事に聴衆の意識をリードしている。
2356 = "Không biết cô ấy có nhận ra sự rời đi của Hibiki hay không―― bài diễn thuyết của Kisaki vẫn đang dẫn dắt tâm trí khán giả một cách ngoạn mục."
# 【日々姫】
# display as 日日姬
# JP: 「それで、言って出てきたの。\n『個別討論の準備をしたい』って」
1440 = "「Thế nên, em đã nói rồi mới ra đây. Rằng 『Tôi muốn chuẩn bị cho phần tranh luận cá nhân』.」"
# 【ハチロク】
# display as 八六
# JP: 「準備、ですか」
1514 = "「Chuẩn bị, sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。\n今なら抜けても気づかれないって思ったし――」
1330 = "「Ừm. Chị nghĩ nếu bây giờ rút lui thì cũng không ai nhận ra đâu――」"
# monologue
# JP: 壇上、日々姫のいた椅子はぽっかり空席となっている。\nが、聴衆がその空白に気付いているような気配は無い。
1938 = "Trên bục, chiếc ghế mà Hibiki từng ngồi đang trống không. Nhưng, có vẻ như khán giả không hề nhận ra khoảng trống đó."
# monologue
# JP: （なるほど……\n稀咲の見事な演説が、僕らに味方してくれているのか）
2507 = "（Ra là vậy...... Bài diễn thuyết xuất sắc của Kisaki lại đang đứng về phía chúng ta sao）"
# 【日々姫】
# display as 日日姬
# JP: 「――できることを全部やっておかないと、\n後悔するって思ったから」
953 = "「――Bởi vì em nghĩ nếu không làm hết những gì có thể, thì sau này sẽ hối hận mất.」"
# monologue
# JP: 冷静で大胆な判断に、深く感心させられる。\nならば貴重なこの時間、いささかも無駄には使わせまい。
2022 = "Tôi thực sự khâm phục trước sự phán đoán bình tĩnh và táo bạo đó. Nếu vậy thì khoảng thời gian quý báu này, tôi sẽ không để lãng phí dù chỉ một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「手伝えることを言ってくれ。\nすぐにも動く」
1504 = "「Có gì cần giúp thì cứ nói đi. Anh sẽ làm ngay.」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん。ありがとうございます」
1311 = "「Anh trai. Cảm ơn anh.」"
# monologue
# JP: いいざま、日々姫はしゃがみ込む。
2432 = "Nói xong, Hibiki liền ngồi xổm xuống."
# monologue
# JP: 僕の足元のバッグから、\nなにやらごそごそ取り出している。
2006 = "Từ trong chiếc túi dưới chân tôi, con bé đang lục lọi lấy ra thứ gì đó."
# 【双鉄】
# display as 雙鐵
# JP: 「スケッチブックと絵の具箱か」
1572 = "「Sổ phác thảo và hộp màu à.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
1333 = "「Vâng.」"
# monologue
# JP: 頷きながら、いつもどおりの仕草のままに、\n日々姫はスケッチブックを開く。
2184 = "Vừa gật đầu, Hibiki vừa mở cuốn sổ phác thảo ra với những cử chỉ quen thuộc như mọi khi."
# monologue
# JP: そしてさらさら何かを――っ！！
2251 = "Và rồi con bé thoăn thoắt vẽ thứ gì đó――!!"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――これを作るのか」
1278 = "「Ra là vậy――Em định làm cái này sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「……あの都市モデルば、\n私の目にもやきついとるけん」
1018 = "「......Cái mô hình đô thị đó, nó in đậm trong tâm trí em rồi mà.」"
# monologue
# JP: 隈元弁がこぼれ出すほど、\n日々姫はもう、製作に集中しはじめている。
2146 = "Đến mức thốt ra cả tiếng Kumamoto, Hibiki đã bắt đầu tập trung vào việc chế tác rồi."
# monologue
# JP: であれば、僕は任されたのだ。\nそう確信し、全速で思考を走らせる。
1853 = "Nếu vậy, tôi đã được giao phó rồi. Tin chắc như vậy, tôi bắt đầu suy nghĩ với tốc độ tối đa."
# monologue
# JP: （日々姫の意図は明確だ。\nどうやれば、それを最大限に表現できる？）
2522 = "（Ý đồ của Hibiki đã rõ ràng. Làm thế nào để có thể thể hiện nó một cách tối đa đây?）"
# monologue
# JP: 答えならすでに見つけ出してる。
2046 = "Nếu là câu trả lời thì tôi đã tìm ra rồi."
# monologue
# JP: 今までやってきたことを、\nここでも同じく行えばいい。
1933 = "Những việc tôi đã làm từ trước đến nay, chỉ cần lặp lại ở đây là được."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。ポーレットの鉄道仲間に、\nいわゆる[と]撮り[テツ]鉄という方はどのくらいいる？」
1512 = "「Paulette. Trong số những người bạn đường sắt của cô, có bao nhiêu người được gọi là \\x%l撮り鉄;#00ffc040;Tori-tetsu%l;#;?」"
# 【ポーレット】
# display as 波萊特
# JP: 「直接の方はそんなに……けど、全国の\\x%lまいてつ;#00ffc040;まいてつ%l;#;さん達の\nお仲間には、確実に何人ずつかいらっしゃる筈です」
1438 = "「Trực tiếp thì không nhiều lắm...... nhưng trong số bạn bè của các \\x%lまいてつ;#00ffc040;chủ tàu%l;#; trên toàn quốc, chắc chắn mỗi người đều có vài người đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その方達に頼めないだろうか」
1592 = "「Nếu vậy, cô có thể nhờ họ được không?」"
# monologue
# JP: 依頼内容を説明すれば、\nポーレットはすぐ頷いてくれる。
2402 = "Khi tôi giải thích nội dung yêu cầu, Paulette lập tức gật đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「頼めます。\\x%l撮り鉄;#00ffc040;撮り鉄%l;#;さんたちは写真上手いし、\nフットワーク軽いですし、それに、なにより」
1290 = "「Được chứ. Các \\x%l撮り鉄;#00ffc040;Tori-tetsu%l;#; chụp ảnh rất giỏi, lại còn nhanh nhẹn nữa, và hơn hết là,」"
# monologue
# JP: レールショップに、いったん戻るつもりだろうか。
2216 = "Chắc cô ấy định quay lại cửa hàng đường sắt một lát."
# monologue
# JP: ポーレットはれいなを手招きし、\n自らももう立ち上がってる。
2016 = "Paulette vẫy tay gọi Reina, và bản thân cô ấy cũng đã đứng dậy."
# 【ポーレット】
# display as 波萊特
# JP: 「同じ、鉄道を愛する仲間ですから。\n御一夜鉄道のためにも、きっと力を貸してくれます」
1347 = "「Vì chúng tôi đều là những người bạn cùng yêu đường sắt mà. Vì Đường sắt Ohito, chắc chắn họ sẽ cho chúng ta mượn sức mạnh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、であれば頼む」
1649 = "「Vậy sao, thế thì nhờ cô nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「頼まれなくても」
1648 = "「Không cần anh nhờ đâu.」"
# monologue
# JP: いたずらっぽく――
2218 = "Một cách tinh nghịch――"
# monologue
# JP: ポーレットは実にらしくない、\nけれど魅力的な笑みを浮かべる。
2024 = "Paulette nở một nụ cười không giống cô ấy thường ngày chút nào, nhưng lại vô cùng quyến rũ."
# 【ポーレット】
# display as 波萊特
# JP: 「これ、私の戦いでもあるんですよ？」
1644 = "「Đây cũng là cuộc chiến của tôi mà?」"
# monologue
# JP: 爽やかな風をさあっと吹かせ、\nポーレットがれいなを伴い、議場から出る。
2217 = "Để lại một làn gió sảng khoái, Paulette cùng Reina rời khỏi hội trường."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、\n飛行\\x%lエアクラ;#00ffc040;エアクラ%l;#;を使わせていただいて構いませんか？」
1690 = "「Ngài Soutetsu, em có thể mượn \\x%lエアクラ;#00ffc040;Aircra%l;#; bay của ngài được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。近くに着水させよう。\nナビも状況を把握している」
1530 = "「Tất nhiên rồi. Anh sẽ cho nó hạ cánh trên mặt nước gần đây. Navi cũng đã nắm bắt được tình hình rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、わたくしたちも一度戻ります」
1666 = "「Nếu vậy, chúng em cũng sẽ quay về một chuyến.」"
# monologue
# JP: ハチロクの後ろには真闇姉。\n事情は、すぐに把握できる。
2280 = "Phía sau Hachiroku là chị Mayami. Tôi lập tức hiểu được tình hình."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉も同乗してもらえれば助かる。\nナビには、帰宅とだけ伝えてくれればそれで済む」
1540 = "「Chị Mayami cũng đi cùng thì tốt quá. Chỉ cần bảo Navi là về nhà là được rồi.」"
# 【真闇】
# display as 真闇
# JP: 「ん。ならそうさせてもらうと。\n関連資料、うちもそれなりには集めとったけん」
1329 = "「Ừm. Vậy thì chị sẽ làm thế. Chị cũng đã thu thập được kha khá tài liệu liên quan rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「助かる」
1615 = "「Cảm ơn chị.」"
# 【ハチロク】
# display as 八六
# JP: 「商店会の方々にもご協力をお願いします」
1411 = "「Chúng em cũng sẽ nhờ các thành viên trong hiệp hội thương mại giúp đỡ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。工場誘致の可否を、それぞれに\nご検討されていただろうからな」
1276 = "「Ra là vậy. Chắc hẳn mỗi người trong số họ đều đã cân nhắc về việc có nên thu hút nhà máy hay không rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。資料をお持ちの方も恐らく、\nお一方お二方ではないのではないか、と」
1496 = "「Vâng. Có lẽ số người có tài liệu không chỉ dừng lại ở một hay hai người đâu ạ.」"
# monologue
# JP: 良い考えだ。
2457 = "Ý kiến hay đấy."
# monologue
# JP: 看板描きを通じて日々姫は、\n商店会の人たちの信頼を得ていることでもあるし。
2392 = "Hơn nữa, thông qua việc vẽ biển hiệu, Hibiki cũng đã nhận được sự tin tưởng của những người trong hiệp hội thương mại."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そのように頼む」
1664 = "「Nếu vậy, nhờ hai người nhé.」"
# 【真闇】
# display as 真闇
# JP: 「ん、頼まれてあげるけんねぇ」
1321 = "「Ừm, cứ giao cho chị.」"
# monologue
# JP: ひらひら手を振り、真闇姉とハチロクも去る。
2296 = "Vẫy vẫy tay, chị Mayami và Hachiroku cũng rời đi."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！」
1383 = "「Bé Fukami!」"
# 【ふかみ】
# display as 深美
# JP: 「う、うんっ！」
1315 = "「Ư, ừm!」"
# monologue
# JP: それを待っていたかのように、\n凪がふかみと連れ立って、ずずいと僕に近寄ってくる。
1990 = "Như thể chỉ chờ có thế, Nagi cùng Fukami tiến sát lại gần tôi."
# 【凪】
# display as 凪
# JP: 「みどりおばちゃんが名簿、持っとるばい！\n全国の川下り船の業者さんの」
1582 = "「Dì Midori có giữ danh sách đó nha! Danh sách các chủ thuyền xuôi dòng trên toàn quốc á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1318 = "「A!」"
# monologue
# JP: それは、全くの盲点だった。
2075 = "Đó hoàn toàn là một điểm mù."
# monologue
# JP: 川下り船の業者さんなら、直近だ。\n写真撮影は大変容易なことだろう――が――
2233 = "Nếu là chủ thuyền xuôi dòng thì họ ở ngay sát bên. Việc chụp ảnh chắc chắn sẽ rất dễ dàng――nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「みどりさん……\nふかみのお母様のお加減はいかがなのだ？」
1580 = "「Cô Midori...... Tình trạng sức khỏe của mẹ Fukami thế nào rồi?」"
# 【ふかみ】
# display as 深美
# JP: 「あの――正直、良くなくって。\n長い時間話してたら、咳、止まらなくなるです。から」
1300 = "「Dạ――thành thật mà nói thì, không được tốt lắm ạ. Nếu nói chuyện lâu, mẹ sẽ ho không ngừng được. Nên là.」"
# monologue
# JP: 凪がわずかに顔をしかめる。その手の色が変わってる。\nふかみはそれほど強く、凪の手を握り――すがってる。
1913 = "Nagi hơi nhăn mặt. Bàn tay con bé đổi màu. Fukami đang nắm tay Nagi chặt đến mức đó――đang bám víu lấy."
# 【ふかみ】
# display as 深美
# JP: 「だから」
1447 = "「Vì vậy.」"
# monologue
# JP: けれどもやがて、\nさまよっていたふかみの視線が、まっすぐ僕へ向けられる。
2224 = "Nhưng rồi chẳng bao lâu, ánh mắt đang lang thang của Fukami hướng thẳng về phía tôi."
# 【ふかみ】
# display as 深美
# JP: 「わたし、電話かけます。です。凪ちゃんと手分けして。\nおかあさんから、名簿借りて、お願いしてみます。です」
1527 = "「Em sẽ, gọi điện thoại. Ạ. Chia nhau ra gọi cùng với Nagi. Em sẽ mượn danh sách từ mẹ, rồi nhờ họ thử xem. Ạ.」"
# 【凪】
# display as 凪
# JP: 「そう決まったら、いそぐばいっ！」
1470 = "「Đã quyết vậy rồi thì nhanh lên thôi!」"
# 【ふかみ】
# display as 深美
# JP: 「わ、あ！　う、うんっ！\n双鉄さん――行ってきます、です！」
1306 = "「O, a! Ư, ừm! Anh Soutetsu――chúng em đi đây, ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「焦らなくていい。気をつけてな」
1268 = "「Không cần vội đâu. Cẩn thận nhé.」"
# monologue
# JP: 凪とふかみが行ってしまえば、\n音風景が一気に変わる。
1909 = "Nagi và Fukami vừa rời đi, âm thanh xung quanh liền thay đổi hoàn toàn."
# monologue
# JP: 候補者の演説の声をバックに、日々姫が鉛筆を走らせる音、\nただそれだけしか聞こえなくなる。
2479 = "Trên nền giọng diễn thuyết của các ứng cử viên, chỉ còn nghe thấy mỗi tiếng bút chì lướt trên giấy của Hibiki."
# monologue
# JP: （さて、僕も動かねば）
2515 = "（Giờ thì, mình cũng phải hành động thôi）"
# monologue
# JP: 素材は、みなが集めてくれる。\nならばそれをどう見せるかを、準備しておく必要がある。
2387 = "Mọi người sẽ thu thập tài liệu cho tôi. Nếu vậy thì tôi cần phải chuẩn bị cách để trình bày chúng."
# monologue
# JP: プロジェクターを借りられるかをまずは確かめ――
1890 = "Trước tiên phải kiểm tra xem có mượn được máy chiếu không đã――"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん」
1310 = "「Anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1335 = "「Hửm?」"
# monologue
# JP: 鉛筆の音が止まっている。\n日々姫が僕を見つめてる。
2470 = "Tiếng bút chì đã dừng lại. Hibiki đang nhìn chằm chằm vào tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ひとつだけ、質問してもいいですか？」
1431 = "「Em hỏi một câu thôi, được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。ひとつといわず、いくつでも」
1529 = "「Tất nhiên rồi. Đừng nói một câu, bao nhiêu câu cũng được.」"
# 【日々姫】
# display as 日日姬
# JP: 「いいえ、ひとつだけでいいんです」
1220 = "「Không, một câu là đủ rồi.」"
# monologue
# JP: ス、と短く息が吸われる。
2150 = "Con bé khẽ hít vào một hơi ngắn."
# monologue
# JP: まばたきさえも忘れてしまったかのように、\n日々姫の瞳は一瞬たりとも僕の上から離れない。
2010 = "Như thể đã quên cả chớp mắt, ánh mắt của Hibiki không rời khỏi tôi dù chỉ một khoảnh khắc."
# 【日々姫】
# display as 日日姬
# JP: 「選挙に負けて、工場誘致の阻止に失敗しちゃったら\n――兄さん、結婚、させられますよね？」
1602 = "「Nếu thua trong cuộc bầu cử, và thất bại trong việc ngăn chặn thu hút nhà máy ――Anh trai sẽ bị ép kết hôn, phải không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1314 = "「À.」"
# monologue
# JP: 確かに、義父と約束をした。\nなんだか随分、遠い昔のことに思えるが。
2088 = "Quả thực, tôi đã hứa với cha nuôi. Cảm giác như chuyện đó đã xảy ra từ rất lâu rồi vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「そういえばそんな話もあったな」
1612 = "「Nhắc mới nhớ, đúng là có chuyện đó thật.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1307 = "「Hả!?」"
# monologue
# JP: 日々姫の目がまんまるくなる。\nよほど驚かせてしまったようだが――
2177 = "Mắt Hibiki mở to tròn. Có vẻ như tôi đã làm con bé ngạc nhiên lắm――"
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。\n完全に失念してしまっていたのでな」
1378 = "「Xin lỗi. Anh hoàn toàn quên bẵng đi mất.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　あの……」
1309 = "「Hả? Dạ......」"
# monologue
# JP: わたわた、手までが動いている。
2155 = "Con bé luống cuống, tay chân khua loạn xạ."
# monologue
# JP: 動揺という文字を形になおせば、\nそれはまさしく、今の日々姫に違いない。
2029 = "Nếu phải dùng một từ để hình dung sự bối rối, thì chắc chắn đó chính là Hibiki lúc này."
# 【日々姫】
# display as 日日姬
# JP: 「じゃあ、どうして――えと、もちろん、\n御一夜の水を守るためって……けど、それだけで？」
1669 = "「Vậy thì tại sao――à ừm, tất nhiên là để bảo vệ nguồn nước của Ohimitera rồi...... nhưng, chỉ vì thế thôi sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1316 = "「唔」" 
# monologue
# JP: 日々姫の質問はまとまっていない。\nが、問われていることが何かは、わかる。
2182 = "Câu hỏi của Hibiki không được mạch lạc cho lắm. Nhưng tôi hiểu con bé đang muốn hỏi điều gì."
# monologue
# JP: 水資源を守るというぼんやりとした目標だけでは――\n恐らく僕は、ここまで必死に戦えてこなかっただろうから。
2028 = "Nếu chỉ với một mục tiêu mơ hồ là bảo vệ tài nguyên nước―― Có lẽ tôi đã không thể chiến đấu tuyệt vọng đến mức này."
# 【双鉄】
# display as 雙鐵
# JP: 「そう……だな。\n最初は、御一夜への、右田への恩返しのためだけだった」
1642 = "「Đúng...... vậy nhỉ. Ban đầu, anh chỉ muốn báo đáp công ơn của Ohimitera, của nhà Migita.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1333 = "「嗯」" 
# monologue
# JP: いや……恩返しというより、贖罪か。
1844 = "Không...... Thay vì báo ân, phải gọi là chuộc tội mới đúng."
# monologue
# JP: 路子を守れなかったその分、誰かを、何かを、守ろうと\n――ただそれだけしか、僕の頭の中には無かった。
2081 = "Phần vì không thể bảo vệ được Michiko, nên tôi muốn bảo vệ một ai đó, một điều gì đó ――Trong đầu tôi lúc đó chỉ có duy nhất suy nghĩ ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、ハチロクと出会い、ポーレットと出会い……\n目的が、少しずつ変わっていったのかもしれないな」
1233 = "「Nhưng, sau khi gặp Hachiroku, gặp Paulette...... Có lẽ mục đích của anh đã dần dần thay đổi.」"
# monologue
# JP: その都度、その都度。\nすぐに取り組まなければならないことが、発生したから。
1856 = "Hết lần này đến lần khác. Bởi vì những chuyện cần phải giải quyết ngay lập tức cứ liên tục phát sinh."
# monologue
# JP: 目の前のそれに取り組むうちに、\nいつの間にか、僕は恐らく……
1967 = "Trong lúc giải quyết những vấn đề trước mắt, từ lúc nào không hay, có lẽ tôi đã......"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……いや、違うか？\n変化、ではなく――」
1215 = "「À...... Không, không phải sao? Không phải là thay đổi, mà là――」"
# monologue
# JP: 路子のことを、事故のことを。\n忘れるなどは、一生できない。
2080 = "Về Michiko, về vụ tai nạn đó. Cả đời này tôi không thể nào quên được."
# monologue
# JP: けれども、僕は、一瞬一瞬に夢中になって。夢中になれて。\nそうした時間を重ねる内に――ああ、そうなのだ。
2253 = "Nhưng mà, tôi đã đắm chìm vào từng khoảnh khắc. Có thể đắm chìm vào nó. Trong lúc tích lũy những khoảng thời gian như thế――A, ra là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「見つけただけだ。\nただ、それだけだ」
1289 = "「Anh chỉ tìm thấy thôi. Chỉ vậy thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「見つけた？　何をですか？」
1451 = "「Tìm thấy? Tìm thấy gì cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「“しなくてはならない”や“するべき”ではなく、\n“そうしたい”をだ」
1224 = "「Không phải là \"phải làm\" hay \"nên làm\", mà là \"muốn làm\".」"
# 【日々姫】
# display as 日日姬
# JP: 「え……っと」
1246 = "「Dạ...... ừm.」"
# monologue
# JP: いつからだったか、理由はなぜか、\n考えてみてもまるでハッキリしてこない。
2482 = "Từ lúc nào, lý do là gì, dù có nghĩ thế nào cũng không thể hiểu rõ được."
# monologue
# JP: であるというのに――\n揺るがぬ気持ちを確かに感じる。
1870 = "Mặc dù vậy―― Tôi vẫn cảm nhận được một thứ cảm xúc vững vàng không hề lay chuyển."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、日々姫を支えたいのだ。\n選挙の勝ち負けや、工場云々のことを全て置いても」
1424 = "「Anh, muốn hỗ trợ Hibiki. Dù cho có gạt bỏ hết chuyện thắng thua trong bầu cử hay chuyện nhà máy đi chăng nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 1703 = "「！」" 
# monologue
# JP: 日々姫が再び息を呑む。
2145 = "Hibiki lại một lần nữa nín thở."
# monologue
# JP: 息だけではなくツバまで飲んで、パチパチパチと、\n今までの分を取り返すように、何度もまばたきを繰り返す。
2005 = "Không chỉ nín thở mà con bé còn nuốt nước bọt cái ực, rồi chớp mắt liên tục, như thể để bù lại cho khoảng thời gian không chớp mắt vừa nãy."
# 【日々姫】
# display as 日日姬
# JP: 「それは――」
1647 = "「Đó là vì――」"
# monologue
# JP: 日々姫の頬が赤くなる。\n日々姫の息が荒くなる。
2175 = "Đôi má Hibiki ửng đỏ. Hơi thở của con bé trở nên gấp gáp."
# monologue
# JP: それを感じただけで何故だか、\n僕の鼓動もうるさいくらいに強くなる。
2282 = "Chỉ cần cảm nhận được điều đó, không hiểu sao, nhịp tim của tôi cũng đập mạnh đến mức ồn ào."
# 【日々姫】
# display as 日日姬
# JP: 「わたしが、兄さんの、いもうとだからですか？」
1425 = "「Có phải vì, em là, em gái của anh không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「妹……僕の――」
1427 = "「Em gái...... của anh――」"
# monologue
# JP: 考えようとした途端、ガタン、ゴトンと――\n記憶の奥の\\x%l列車;#00ffc040;列車%l;#;が僕の心を揺する。
2073 = "Vừa định suy nghĩ, thì xình xịch, xình xịch―― \\x%l列車;#00ffc040;đoàn tàu%l;#; trong ký ức sâu thẳm lại làm tâm trí tôi rung chuyển."
# monologue
# JP: ガタン、ゴトン。ガタン、ゴトン。\n罪悪感が、つま先から喉へと染み透ってくる。
1951 = "Xình xịch, xình xịch. Xình xịch, xình xịch. Cảm giác tội lỗi thấm dần từ đầu ngón chân lên tận cổ họng."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにっ！？」
1682 = "「Anh hai!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまん――すまん。\n大丈夫だ。何事もない」
1456 = "「Xin lỗi――xin lỗi. Anh không sao. Không có chuyện gì đâu.」"
# monologue
# JP: 自分の顔から血の気が引いているのがわかる。\nねばつく汗が吹き出してきたのを感じてる。
2089 = "Tôi có thể nhận ra mặt mình đang tái mét. Tôi cảm nhận được mồ hôi nhễ nhại đang túa ra."
# monologue
# JP: だから、せめて。震えを筋力で抑えこむ。\n討論前に、日々姫に余計な心配をかけてはいけない。
2086 = "Vì vậy, ít nhất. Tôi dùng sức mạnh cơ bắp để kìm nén cơn run rẩy. Trước cuộc tranh luận, không được để Hibiki phải lo lắng thừa thãi."
# 【双鉄】
# display as 雙鐵
# JP: 「答えは、少しだけ待ってくれ」
1252 = "「Câu trả lời, hãy đợi anh một chút nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「……投票が終わるときまで、ですか？」
1004 = "「......Đến khi cuộc bỏ phiếu kết thúc, phải không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。悪いが、そのときまでは」
1325 = "「Đúng vậy. Xin lỗi em, cho đến lúc đó nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「わかりました！\n時間、とっちゃってごめんなさい」
1360 = "「Em hiểu rồi! Xin lỗi vì đã làm mất thời gian của anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1507 = "「Không đâu――」"
# monologue
# JP: 僕の言葉の続きをまたず、\n日々姫は自分のスケッチブックと向き合い直す。
1847 = "Không đợi tôi nói hết câu, Hibiki đã quay lại với cuốn sổ phác thảo của mình."
# monologue
# JP: 僕も、準備だ。残り時間に余裕などない。\nわかっていながら、それでも、話し足りない気がして――
2188 = "Tôi cũng phải chuẩn bị thôi. Không còn nhiều thời gian nữa. Dù biết vậy, nhưng tôi vẫn có cảm giác chưa nói đủ――"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん」
# 1310 = "「哥哥」" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1703 = "「！」" 
# monologue
# JP: スケッチブックを見つめたまま、手も動かし続けるままに\n日々姫はそれでも、僕を捉える。
2009 = "Vẫn nhìn chằm chằm vào sổ phác thảo, tay vẫn tiếp tục di chuyển nhưng Hibiki vẫn nắm bắt được suy nghĩ của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「安心して迷ってください。\n大丈夫です。私、絶対に負けませんから」
1245 = "「Anh cứ yên tâm mà phân vân đi ạ. Không sao đâu. Vì em, tuyệt đối sẽ không thua đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1333 = "「嗯」" 
# monologue
# JP: そうだった。\n負けてしまえば、悩む自由さえなくなるし――
2203 = "Đúng vậy. Nếu thua cuộc, thì ngay cả tự do để phân vân cũng chẳng còn――"
# monologue
# JP: 日々姫を支える、\nそれも出来なくなってしまう。
2419 = "Việc hỗ trợ Hibiki, cũng sẽ không thể làm được nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「勝とう」
1410 = "「Cùng giành chiến thắng nào.」"
# 【日々姫】
# display as 日日姬
# JP: 「はいっ！」
# 1334 = "「嗯！」" 
# monologue
# JP: そのため、今は迷わず動こう。\n迷うなど――勝ったその後で十分だ。
2249 = "Vì vậy, bây giờ không được do dự mà phải hành động thôi. Do dự ư――để sau khi chiến thắng rồi hẵng tính."
# monologue
# JP: ゥィン――と、\n低いモーター音が議場に響く。
1955 = "O o―― Tiếng động cơ trầm thấp vang lên trong hội trường."
# monologue
# JP: 直接討論。再びの演壇。\nその前に、僕らはレイアウトをセットし直す。
2260 = "Tranh luận trực tiếp. Lại một lần nữa bước lên bục. Trước đó, chúng tôi thiết lập lại sa bàn."
# 【稀咲】
# display as 稀咲
# JP: 「それが――日々姫の望む未来図かい？」
1485 = "「Đó là――bức tranh tương lai mà Hibiki mong muốn sao?」"
# monologue
# JP: セットが終わりハケた途端に、司会者の言葉も待たず、\n稀咲が日々姫に問いかける。
1973 = "Ngay khi vừa thiết lập xong và lui xuống, không đợi người dẫn chương trình lên tiếng, Kisaki đã đặt câu hỏi cho Hibiki."
# monologue
# JP: 問いかけて――\n討論の火蓋を切って落とす。
2014 = "Đặt câu hỏi―― và châm ngòi cho cuộc tranh luận."
# 【日々姫】
# display as 日日姬
# JP: 「はい、そうです。稀咲先輩」
1499 = "「Vâng, đúng vậy. Tiền bối Kisaki.」"
# monologue
# JP: 日々姫に対し、稀咲先輩。
1992 = "Đáp lại Hibiki, là tiền bối Kisaki."
# monologue
# JP: 右田候補と宝生候補は、等身大の自分たちで。\n飾らぬ言葉で、真正面からぶつかりあおうと宣言しあう。
1894 = "Ứng cử viên Migita và ứng cử viên Houshou, với chính con người thật của mình. Họ tuyên bố sẽ đối đầu trực diện bằng những lời lẽ không hề tô vẽ."
# 【稀咲】
# display as 稀咲
# JP: 「鉄道が\\x%l客車;#00ffc040;客車%l;#;を引く以外、\n今と大きくは変わらないのかい？」
1683 = "「Ngoài việc đường sắt kéo theo \\x%l客車;#00ffc040;toa hành khách%l;#; ra, thì không có gì thay đổi lớn so với hiện tại sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「私は、変えようとは思いません。\nだけど自然に、変わっていくと思います」
1403 = "「Tôi không nghĩ là mình sẽ thay đổi nó. Nhưng tôi tin nó sẽ thay đổi một cách tự nhiên.」"
# 【稀咲】
# display as 稀咲
# JP: 「その鉄道と、\\x%l客車;#00ffc040;客車%l;#;改修の事業とで？」
1694 = "「Bằng tuyến đường sắt đó và dự án cải tạo \\x%l客車;#00ffc040;toa hành khách%l;#; sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そこからも、もちろん変わっていくと思います」
1639 = "「Tất nhiên, tôi nghĩ sự thay đổi cũng sẽ bắt nguồn từ đó.」"
# 【稀咲】
# display as 稀咲
# JP: 「けれどね、日々姫」
1294 = "「Nhưng mà này, Hibiki.」"
# monologue
# JP: 暖かささえ感じさせられる、稀咲の口調。
2353 = "Giọng điệu của Kisaki thậm chí còn mang lại cảm giác ấm áp."
# monologue
# JP: 演技だとしたら大した物だし、\nこの状況下で素であるのなら、一層のこと大したものだ。
2032 = "Nếu là diễn kịch thì quả là đáng gờm, còn nếu là bản chất thật trong tình huống này, thì lại càng đáng nể hơn."
# 【稀咲】
# display as 稀咲
# JP: 「\\x%l客車;#00ffc040;客車%l;#;改修事業の採算は、正直、厳しいと見ているよ？\n今は、ボランティア的な\\x%l客車;#00ffc040;客車%l;#;提供があるようだけれど」
1687 = "「Thành thật mà nói, lợi nhuận của dự án cải tạo \\x%l客車;#00ffc040;toa hành khách%l;#; rất khó khăn đấy? Hiện tại, có vẻ như các \\x%l客車;#00ffc040;toa hành khách%l;#; đang được cung cấp theo hình thức tình nguyện.」"
# monologue
# JP: 稀咲は淡々と数字を示す。\n示された数字に、ポーレットの目が丸くなる。
2342 = "Kisaki điềm tĩnh đưa ra những con số. Nhìn những con số đó, mắt Paulette tròn xoe."
# monologue
# JP: 銀行の情報収集能力の、\nその凄まじさを――僕らは、痛感させられる。
2069 = "Khả năng thu thập thông tin của ngân hàng, sự khủng khiếp đó――chúng tôi đã được cảm nhận sâu sắc."
# 【稀咲】
# display as 稀咲
# JP: 「近場の\\x%l客車;#00ffc040;客車%l;#;が尽きてしまえば、輸送コストは莫大となる。\n供給に関しても同じだよね？　納品先も遠方になるから」
1564 = "「Nếu nguồn \\x%l客車;#00ffc040;toa hành khách%l;#; ở gần cạn kiệt, chi phí vận chuyển sẽ trở nên khổng lồ. Về nguồn cung cũng vậy phải không? Vì điểm giao hàng cũng sẽ ở xa hơn.」"
# monologue
# JP: なるほど。確かに指摘の通りだ。\n\\x%l客車;#00ffc040;客車%l;#;寿命は、改修すれば当然その分延伸される。
2366 = "Ra là vậy. Quả thực đúng như lời chỉ trích. Tuổi thọ của \\x%l客車;#00ffc040;toa hành khách%l;#;, nếu được cải tạo, đương nhiên sẽ được kéo dài thêm."
# monologue
# JP: 近場の鉄道会社の\\x%l客車;#00ffc040;客車%l;#;ニーズが満たされてしまえば、\n輸送コストが提供価格を跳ね上げてしまう。
2474 = "Nếu nhu cầu về \\x%l客車;#00ffc040;toa hành khách%l;#; của các công ty đường sắt lân cận được đáp ứng, chi phí vận chuyển sẽ làm giá cung cấp tăng vọt."
# 【稀咲】
# display as 稀咲
# JP: 「それに、独占がいつまで続くかも不明だ。\n事業が成立するのなら、必ず各地にフォロアーが出る」
1584 = "「Hơn nữa, sự độc quyền sẽ kéo dài bao lâu cũng không rõ. Nếu dự án thành công, chắc chắn sẽ có những người theo đuổi ở khắp nơi.」"
# 【日々姫】
# display as 日日姬
# JP: 「それならそれで、すごくいいことだと思います」
1433 = "「Nếu vậy thì tôi nghĩ đó là một điều rất tuyệt vời.」"
# 【稀咲】
# display as 稀咲
# JP: 「え？」
# 1308 = "「哎？」" 
# 【日々姫】
# display as 日日姬
# JP: 「だってそれ、各地の鉄道会社が元気になるってことで。\nその地方の人たちも元気になるってことですから」
1668 = "「Bởi vì điều đó có nghĩa là các công ty đường sắt ở khắp nơi sẽ trở nên sôi động. Và người dân ở những địa phương đó cũng sẽ trở nên tràn đầy sức sống.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、それはそうだよね」
1495 = "「À, đúng là vậy nhỉ.」"
# monologue
# JP: 大きくうなずき、\nけれど、と稀咲は一拍を置く。
2351 = "Gật đầu mạnh một cái, nhưng rồi, Kisaki dừng lại một nhịp."
# 【稀咲】
# display as 稀咲
# JP: 「各地の繁栄を支えるために、\n御一夜が犠牲になるのは、おかしな話だ」
1234 = "「Để hỗ trợ sự phồn vinh của các địa phương khác, mà Ohimitera phải hy sinh thì thật là nực cười.」"
# 【日々姫】
# display as 日日姬
# JP: 「犠牲になんてなりませんよ。\n鉄道は、だって、繋がりますから」
1393 = "「Không hề hy sinh đâu. Bởi vì đường sắt, sẽ được kết nối mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「繋がる？」
1536 = "「Kết nối?」"
# 【日々姫】
# display as 日日姬
# JP: 「そうですよ？　歌ったことありませんか？\n線路は、どこまでだって繋がるんです」
1508 = "「Đúng vậy? Cô chưa từng hát bài đó sao? Đường ray, sẽ kết nối đến tận chân trời.」"
# monologue
# JP: そこで、日々姫は黙りこむ。\n響く軽やかなモーター音と、爽快に走る\\x%lNゲージ;#00ffc040;Nゲージ%l;#;。
2160 = "Nói đến đó, Hibiki im lặng. Tiếng động cơ nhẹ nhàng vang lên, và \\x%lNゲージ;#00ffc040;N-gauge%l;#; chạy một cách sảng khoái."
# monologue
# JP: つられたような、凪の鼻歌。\nふかみがあわてて、それを止める。
1915 = "Tiếng ngâm nga của Nagi như bị cuốn theo. Fukami vội vàng ngăn lại."
# 【日々姫】
# display as 日日姬
# JP: 「鉄道にとって致命的だったのは\\x%lエアクラ;#00ffc040;エアクラ%l;#;の誕生じゃなく、\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;の発展のため、鉄道網が分断されたことです」
1379 = "「Điều chí mạng đối với đường sắt không phải là sự ra đời của \\x%lエアクラ;#00ffc040;Aircra%l;#;, mà là vì sự phát triển của \\x%lエアクラ;#00ffc040;Aircra%l;#;, mạng lưới đường sắt đã bị chia cắt.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね」
1277 = "「Ra là vậy.」"
# monologue
# JP: 稀咲が頷く。\n拍子抜けするほどにあっさりと。
2377 = "Kisaki gật đầu. Một cách nhẹ nhàng đến mức khiến người ta hụt hẫng."
# 【稀咲】
# display as 稀咲
# JP: 「今は、地上型\\x%lエアクラ;#00ffc040;エアクラ%l;#;の踏破性も格段に進歩している。\nもし鉄道が、趣味の粋を超えた実用性を再び示せば――」
1523 = "「Hiện nay, khả năng vượt địa hình của \\x%lエアクラ;#00ffc040;Aircra%l;#; mặt đất cũng đã tiến bộ vượt bậc. Nếu đường sắt lại một lần nữa thể hiện được tính thực dụng vượt ra ngoài ranh giới của một sở thích――」"
# 【日々姫】
# display as 日日姬
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;の交通路として流用された鉄道路線が復活して。\nそうしたら線路はどんどん、もう一度繋がりはじめます」
1363 = "「Các tuyến đường sắt bị trưng dụng làm đường giao thông cho \\x%lエアクラ;#00ffc040;Aircra%l;#; sẽ hồi sinh. Khi đó, đường ray sẽ dần dần, bắt đầu kết nối lại một lần nữa.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうなれば鉄道車輌のニーズも格段に増大し、\n縮小したパイを奪い合う必要はなくなる――だね？」
1271 = "「Nếu vậy, nhu cầu về phương tiện đường sắt cũng sẽ tăng lên đáng kể, và không cần phải tranh giành miếng bánh đã bị thu hẹp nữa――đúng không?」"
# monologue
# JP: そこまで言われ、遅ればせながら理解する。\n稀咲は、さっきの自分の戦術の逆をやっているのだ。
2401 = "Nghe đến đó, tôi mới muộn màng nhận ra. Kisaki đang làm ngược lại chiến thuật vừa nãy của mình."
# monologue
# JP: “聞き手が自分で答えを見つける"――\nそこから生まれる納得感を、説明によって潰している。
1997 = "\"Người nghe tự tìm ra câu trả lời\"―― Cảm giác thuyết phục sinh ra từ đó, đang bị phá vỡ bởi những lời giải thích."
# 【稀咲】
# display as 稀咲
# JP: 「上手く運べば、確かに素晴らしい事業になるね。\nしかし……それはあくまで、空論だ」
1698 = "「Nếu tiến hành thuận lợi, thì chắc chắn sẽ trở thành một dự án tuyệt vời. Tuy nhiên...... đó suy cho cùng, chỉ là lý thuyết suông.」"
# 【日々姫】
# display as 日日姬
# JP: 「ですね。そうできるなんて見通し、\n少なくとも私は立てられないです」
1490 = "「Đúng vậy. Triển vọng có thể làm được như vậy, ít nhất là tôi không thể lập ra được.」"
# 【稀咲】
# display as 稀咲
# JP: 「対して、\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致は確実な実業だ。\n先ほど例示したように、いくつもの土地で成功している」
1589 = "「Trái lại, thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; là một ngành kinh doanh chắc chắn. Như tôi đã lấy ví dụ vừa nãy, nó đã thành công ở rất nhiều vùng đất.」"
# 【日々姫】
# display as 日日姬
# JP: 「観光客の落ち込みからも、一年ほどで回復するし、\n水質汚染も観測できない――でしたっけ？」
1650 = "「Từ việc sụt giảm khách du lịch, cũng sẽ phục hồi trong khoảng một năm, và ô nhiễm nguồn nước cũng không quan sát thấy――phải không?」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクの話を良く聞いてくれていたんだね。\n光栄だ」
1250 = "「Cô đã lắng nghe rất kỹ bài nói của tôi nhỉ. Thật vinh hạnh.」"
# 【日々姫】
# display as 日日姬
# JP: 「けど、ですね。稀咲先輩」
# 1294 = "「可是啊」" 
# monologue
# JP: 日々姫はぱっと両手をひろげ、\nそれを、自分のお腹にあてる。
2181 = "Hibiki đột nhiên dang rộng hai tay, rồi đặt chúng lên bụng mình."
# 【日々姫】
# display as 日日姬
# JP: 「私、いつか――大好きな人と結ばれて、\nおかあさんになりたいなって、思うんですよ」
1430 = "「Tôi, luôn nghĩ rằng một ngày nào đó――sẽ kết hôn với người mình yêu thương nhất, và trở thành một người mẹ.」"
# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 1333 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「その子が大人になったときも――\n観光は上向きで、水質汚染は無いままですか？」
1569 = "「Đến khi đứa trẻ đó lớn lên―― ngành du lịch vẫn sẽ phát triển, và vẫn sẽ không có ô nhiễm nguồn nước chứ?」"
# 【稀咲】
# display as 稀咲
# JP: 「それは――」
1637 = "「Chuyện đó thì――」"
# monologue
# JP: 初めて、稀咲が言葉につまる。
2461 = "Lần đầu tiên, Kisaki cứng họng."
# monologue
# JP: ほんの一瞬――\n誰かの姿を求めるように、目が泳ぐ。
2196 = "Chỉ trong một khoảnh khắc ngắn ngủi―― ánh mắt cô ấy dao động như đang tìm kiếm bóng dáng ai đó."
# 【稀咲】
# display as 稀咲
# JP: 「そこまで未来のことはボクには、わからないかな」
1674 = "「Tương lai xa đến vậy thì, có lẽ tôi cũng không biết được.」"
# 【日々姫】
# display as 日日姬
# JP: 「だったら、やめましょうよ。\nわからないまま、\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を誘致するのは」
1672 = "「Nếu vậy thì hãy dừng lại đi. Việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; trong khi vẫn chưa biết rõ mọi chuyện ấy.」"
# monologue
# JP: 日々姫がすっくと立ち上がり、\nまっすぐ僕に近寄ってくる。
2151 = "Hibiki đột ngột đứng dậy, và đi thẳng về phía tôi."
# monologue
# JP: 預かっていた紙建築を手渡せば、\n日々姫はそれを丁寧に、レイアウトの上に配置する。
2078 = "Khi tôi đưa lại mô hình kiến trúc bằng giấy đang giữ, Hibiki cẩn thận đặt nó lên trên sa bàn."
# 【稀咲】
# display as 稀咲
# JP: 「それは――」
1646 = "「Đó là――」"
# 【日々姫】
# display as 日日姬
# JP: 「先輩の都市モデルを見て真似してつくった、\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の模型です」
1640 = "「Đây là mô hình nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, mà tôi đã làm mô phỏng theo mô hình đô thị của tiền bối.」"
# monologue
# JP: ざわ、と聴衆がどよめきを漏らす。
1944 = "Khán giả bên dưới xôn xao bàn tán."
# monologue
# JP: これは確かに……\n予想以上のインパクトが有る。
2307 = "Cái này quả thực...... có sức tác động vượt ngoài dự đoán."
# 【日々姫】
# display as 日日姬
# JP: 「おっきすぎます。\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場。\n町を大きく、変えすぎちゃいます」
1350 = "「Nó quá lớn. Nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; ấy. Nó sẽ làm thị trấn thay đổi quá nhiều.」"
# monologue
# JP: 都市モデルでは、御一夜の町そのものも、\n未来図として描かれていた。
1963 = "Trong mô hình đô thị, bản thân thị trấn Ohimitera cũng được khắc họa như một bức tranh tương lai."
# monologue
# JP: 色調も美しく調和を取られ、\nだから、異物感を感じなかった。――が。
2198 = "Tông màu cũng được phối hợp hài hòa và đẹp mắt, cho nên, không hề mang lại cảm giác dị hợm.――Tuy nhiên."
# 【ふかみ】
# display as 深美
# JP: 「あんなのできたら……\n景観もなにもなくなっちゃう。です」
1601 = "「Nếu thứ đó được xây lên thì...... cảnh quan hay gì đó cũng sẽ biến mất hết. Ạ.」"
# 【凪】
# display as 凪
# JP: 「デカすぎばい――\n宇宙船がボンって降りてきよったみたいばい」
1354 = "「Bự quá đi mất―― Cứ như thể một chiếc phi thuyền vũ trụ vừa đáp rầm xuống vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「いや、待ってくれ。\nこれは日々姫、縮尺が正確とはいえないだろう？」
1568 = "「Không, khoan đã. Cái này Hibiki, tỷ lệ thu nhỏ chưa chắc đã chính xác đâu nhỉ?」"
# 【日々姫】
# display as 日日姬
# JP: 「そこはわたしも、わからなくって困ってて。\nだから、写真とか集めてみました」
1405 = "「Chỗ đó tôi cũng không rõ nên khá đau đầu. Vì vậy, tôi đã thử thu thập một vài bức ảnh.」"
# monologue
# JP: プロジェクターの使用許可なら既に得ている。\nスイッチを押し、スクリーンへと投射する。
2068 = "Giấy phép sử dụng máy chiếu thì chúng tôi đã có sẵn. Tôi nhấn công tắc, và chiếu hình ảnh lên màn hình."
# 【稀咲】
# display as 稀咲
# JP: 「……[シマント,2]四万斗川の工場だね、これは」
1015 = "「......Đây là nhà máy bên sông Shimanto nhỉ.」"
# monologue
# JP: ホっとしたような稀咲の声。
2376 = "Giọng Kisaki nghe như vừa thở phào nhẹ nhõm."
# monologue
# JP: 写真の中の風景と工場とは、\nそう違和感無く、馴染んでいるように見えるから。
2255 = "Bởi vì cảnh sắc và nhà máy trong bức ảnh, trông rất hài hòa với nhau mà không có cảm giác lạc lõng."
# 【日々姫】
# display as 日日姬
# JP: 「で、次のが[キタカミ,1]北神川の\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場」
1458 = "「Và, tiếp theo là nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; bên sông Kitakami.」"
# 【稀咲】
# display as 稀咲
# JP: 「っ！」
# 1703 = "「！」" 
# monologue
# JP: ざわっと、議場が大きくどよめく。
1943 = "Cả hội trường ồ lên xôn xao."
# monologue
# JP: あまりに、似ている。\n川と\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場と、その両方の併存している光景が。
2458 = "Quá đỗi, giống nhau. Khung cảnh dòng sông và nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; cùng tồn tại song song."
# 【日々姫】
# display as 日日姬
# JP: 「[キソ,1]基礎川、[イビ,1]伊日川、[チクゴ,1]築後川」
1506 = "「Sông Kiso, sông Ibi, sông Chikugo.」"
# monologue
# JP: ……写真を変えれば変えるほど、\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場のある景色の画一性が際立っていく。
936 = "......Càng chuyển ảnh, sự rập khuôn của những khung cảnh có nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; càng trở nên nổi bật."
# monologue
# JP: 『目に見せる』ことの説得力が、\n稀咲の重ねてきた説明を、一枚ごとに色褪せさせる。
1969 = "Sức thuyết phục của việc 『cho tận mắt chứng kiến』, đã làm phai nhạt đi những lời giải thích mà Kisaki cất công xây dựng qua từng bức ảnh."
# 【日々姫】
# display as 日日姬
# JP: 「おっきすぎるって思うんです。\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の影響力は」
1435 = "「Tôi nghĩ nó quá lớn. Sức ảnh hưởng của nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; ấy.」"
# monologue
# JP: ポーレットが、真闇姉が、凪とふかみが、\nそれぞれの絆をたどり、たくさんの力を集めてくれた。
2214 = "Paulette, chị Mayami, Nagi và Fukami, thông qua những mối quan hệ của mình, đã tập hợp được rất nhiều sức mạnh."
# monologue
# JP: そうした力がこの短時間に、これだけ写真を揃えてくれた。\nその全ての手が――壇上に立つ日々姫を支えてくれている。
2465 = "Những sức mạnh đó đã giúp chuẩn bị được chừng này bức ảnh trong một thời gian ngắn. Tất cả những bàn tay đó――đang nâng đỡ Hibiki đứng trên bục."
# 【日々姫】
# display as 日日姬
# JP: 「景色さえ、ひとつの色で塗りつぶしてしまうくらいに」
1387 = "「Đến mức có thể bôi xóa cả cảnh quan chỉ bằng một màu duy nhất.」"
# 【稀咲】
# display as 稀咲
# JP: 「……川沿いの景色が単調になり、仮にそれが長期的には、\n観光への悪影響になってしまうのだとしても」
989 = "「......Cảnh quan ven sông sẽ trở nên đơn điệu, và giả sử về lâu dài, điều đó sẽ gây ảnh hưởng xấu đến du lịch đi chăng nữa.」"
# monologue
# JP: 恐らく、稀咲の後ろにも、\n稀咲を支えるたくさんの手があるのだろう。
2057 = "Có lẽ, đằng sau Kisaki, cũng có rất nhiều bàn tay đang nâng đỡ cô ấy."
# monologue
# JP: 稀咲はあくまで数字と言葉で、稀咲の武器で、\n劣勢を打開しようと打ち込んでくる。
2018 = "Kisaki vẫn kiên trì dùng những con số và lời nói, dùng vũ khí của riêng mình, để cố gắng phá vỡ thế hạ phong."
# 【稀咲】
# display as 稀咲
# JP: 「観光減少を補って余りある経済的な恩恵を、\n\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場は確実に生み出し、与えてくれる」
942 = "「Nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; chắc chắn sẽ tạo ra và mang lại những lợi ích kinh tế thừa sức bù đắp cho sự sụt giảm của du lịch.」"
# 【日々姫】
# display as 日日姬
# JP: 「それはそうだと思います」
1501 = "「Tôi nghĩ điều đó là đúng.」"
# 【稀咲】
# display as 稀咲
# JP: 「日々姫の示す未来には、なんの確実性も無い。\n改修事業が失敗したら、観光の方もジリ貧だ」
1585 = "「Tương lai mà Hibiki chỉ ra không có gì là chắc chắn cả. Nếu dự án cải tạo thất bại, thì du lịch cũng sẽ ngày càng lụi tàn.」"
# 【日々姫】
# display as 日日姬
# JP: 「それも、そうかもしれないですね」
1295 = "「Điều đó, cũng có thể là vậy nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「その場合のケアはどう行うんだい？\nプランが無いなら、それは政治の責任放棄だよ」
1366 = "「Trong trường hợp đó cô sẽ xử lý thế nào? Nếu không có kế hoạch, thì đó chính là chối bỏ trách nhiệm chính trị đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「口を開けて待ってる人にご飯を突っ込んであげるのは、\nそんなの政治の責任なんかじゃないです。過保護ですよ」
1454 = "「Việc nhét cơm vào miệng những người chỉ biết há miệng chờ sung, không phải là trách nhiệm của chính trị đâu. Đó là bao bọc quá mức đấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「だったら、日々姫にとっての、\n『政治の責任』はどのような形か教えて欲しい」
1656 = "「Nếu vậy, xin hãy cho tôi biết, 『trách nhiệm chính trị』 đối với Hibiki có hình dạng như thế nào.」"
# 【日々姫】
# display as 日日姬
# JP: 「それは――」
1641 = "「Đó là――」"
# monologue
# JP: 今度は日々姫が言葉につまる。\n僕を見るから、大きく頷く。
2463 = "Lần này đến lượt Hibiki cứng họng. Con bé nhìn tôi, nên tôi gật đầu thật mạnh."
# monologue
# JP: 日々姫は日々姫の信じる言葉を――\nそれだけが、唯一最善の戦い方だ。
2431 = "Hibiki hãy dùng những lời lẽ mà bản thân tin tưởng―― Đó là cách chiến đấu duy nhất và tốt nhất."
# 【日々姫】
# display as 日日姬
# JP: 「自分で努力して頑張る人を支えたり、\n失敗して転んだときの杖になったり――」
1464 = "「Là hỗ trợ những người tự mình nỗ lực cố gắng, hay trở thành chiếc gậy chống đỡ khi họ vấp ngã thất bại――」"
# 【稀咲】
# display as 稀咲
# JP: 「そうするために必要なのは税収だ。\nその税収を、どう確保するかこそが責任だろう」
1692 = "「Để làm được điều đó thì cần phải có doanh thu thuế. Làm thế nào để đảm bảo nguồn thu đó mới chính là trách nhiệm chứ.」"
# 【日々姫】
# display as 日日姬
# JP: 「だから、それは！\nたとえ改修事業が、観光振興が失敗しても――」
1429 = "「Vì vậy, chuyện đó! Cho dù dự án cải tạo, hay chấn hưng du lịch có thất bại đi chăng nữa――」"
# 【稀咲】
# display as 稀咲
# JP: 「しても？」
1274 = "「Thì sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そこから得られる経験で、必ず、次のアイディアが、\n次の一歩が、踏み出されてくるはずだから」
1402 = "「Với những kinh nghiệm rút ra được từ đó, chắc chắn những ý tưởng tiếp theo, những bước tiến tiếp theo, sẽ được mở ra.」"
# monologue
# JP: ふ、と稀咲が小さく笑う。
2372 = "Hừm, Kisaki khẽ cười."
# monologue
# JP: 勝ち誇ったような笑いではなく、\nどこかつらそうに、淋しげに。
2025 = "Không phải là nụ cười đắc thắng, mà có vẻ gì đó đau khổ, và cô đơn."
# 【稀咲】
# display as 稀咲
# JP: 「住人の自主性まかせということかい？\nそれこそ、政治の責任放棄そのものじゃないか」
1243 = "「Ý cô là phó mặc cho sự tự chủ của người dân sao? Đó chẳng phải chính là chối bỏ trách nhiệm chính trị hay sao.」"
# monologue
# JP: そうだ、と客席から声が聴こえる。
1941 = "Đúng vậy, một giọng nói vang lên từ phía khán đài."
# monologue
# JP: 下品なヤジとはまるで違う――\nそれは恐らく、追い詰められてこぼれた悲鳴に近い声だ。
2406 = "Hoàn toàn khác với những lời la ó thô tục―― Đó có lẽ là một giọng nói gần giống với tiếng hét của một người bị dồn vào đường cùng."
# 【日々姫】
# display as 日日姬
# JP: 「そう……取られても。\n無責任って批判されても」
1385 = "「Dù...... có bị coi là vậy. Dù có bị chỉ trích là vô trách nhiệm đi chăng nữa.」"
# monologue
# JP: けれど、日々姫は怯まない。
1935 = "Nhưng, Hibiki không hề nao núng."
# monologue
# JP: 声を受け止め、\n受け止めた上で自分の声を発し続ける。
2007 = "Con bé đón nhận những âm thanh đó, và sau khi đón nhận, con bé tiếp tục cất lên tiếng nói của riêng mình."
# 【日々姫】
# display as 日日姬
# JP: 「それでも私は。そうしたいって思います。\n御一夜の人たちを、信じるべきだって思っています」
1407 = "「Dù vậy, tôi. Vẫn muốn làm như thế. Tôi nghĩ rằng, chúng ta nên tin tưởng vào người dân Ohimitera.」"
# 【稀咲】
# display as 稀咲
# JP: 「現状の御一夜の経済は低迷している。\nそれが、つまりは信じた結果――」
1396 = "「Nền kinh tế hiện tại của Ohimitera đang trì trệ. Đó, tóm lại chính là kết quả của việc tin tưởng――」"
# monologue
# JP: 言ってしまって、稀咲はクっと、\n一瞬の動揺を顔に浮かべる。
2359 = "Lỡ lời thốt ra, Kisaki khựng lại, một thoáng bối rối hiện lên trên khuôn mặt cô ấy."
# monologue
# JP: 今の言葉は、御一夜市民への侮辱とも、\n銀行自体の能力不足への吐露ともとられかねない失言だ。
1999 = "Lời nói vừa rồi là một sự lỡ lời, có thể bị coi là sự xúc phạm đối với công dân Ohimitera, cũng như là sự thừa nhận về sự yếu kém của chính ngân hàng."
# 【日々姫】
# display as 日日姬
# JP: 「……少し前までは、みんなが下をむいちゃってた。\n笑顔を、ちょっと忘れちゃってた――それだけですよ」
982 = "「......Cho đến cách đây không lâu, mọi người đều cúi gằm mặt xuống. Chỉ là hơi quên mất nụ cười một chút thôi――chỉ vậy thôi.」"
# monologue
# JP: けれど日々姫は、稀咲の失言を捉えない。\n言葉の代わり、さっ――と鉛筆を走らせる。
2144 = "Nhưng Hibiki không hề bắt bẻ sự lỡ lời của Kisaki. Thay vì dùng lời nói, con bé nhanh thoăn thoắt――lướt bút chì trên giấy."
# 【日々姫】
# display as 日日姬
# JP: 「私、稀咲先輩の笑顔、知ってます」
1419 = "「Tôi, biết nụ cười của tiền bối Kisaki.」"
# monologue
# JP: スケッチブックの上には稀咲の笑顔。\n輝くような――多分、日々姫にしかみせない笑顔。
2383 = "Trên cuốn sổ phác thảo là nụ cười của Kisaki. Một nụ cười rạng rỡ――có lẽ, là nụ cười cô ấy chỉ dành cho Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「レイアウトを一緒に作って、\nたくさんの笑顔、教えてもらいました」
1415 = "「Cùng nhau làm sa bàn, tôi đã được chỉ cho thấy rất nhiều nụ cười.」"
# monologue
# JP: スケッチブックがめくられる。\n笑顔、笑顔、笑顔、笑顔。
2142 = "Cuốn sổ phác thảo được lật sang trang. Nụ cười, nụ cười, nụ cười, nụ cười."
# monologue
# JP: 男性も女性も、老人も子供も赤ちゃんも。\nみんなの笑顔を、日々姫は紙に閉じ込めている。
1845 = "Đàn ông cũng như phụ nữ, người già, trẻ em hay em bé. Hibiki đã lưu giữ nụ cười của tất cả mọi người trên những trang giấy."
# 【日々姫】
# display as 日日姬
# JP: 「線路は線路とだけじゃない。\n人の心も、人の笑顔も、きっとつなげてくれるから――」
1680 = "「Đường ray không chỉ nối liền với đường ray. Mà chắc chắn nó còn kết nối cả trái tim, cả nụ cười của con người nữa――」"
# monologue
# JP: スケッチブックがまためくられる。\n一枚の色鮮やかな絵が現れる。
1994 = "Cuốn sổ phác thảo lại được lật sang trang. Một bức tranh đầy màu sắc rực rỡ hiện ra."
# monologue
# JP: 笑顔と、笑顔と、笑顔の中を、笑顔にあふれた御一夜を。\n\\x%l8620;#00ffc040;8620%l;#;が\\x%lキハ07;#00ffc040;キハ07%l;#;sが新しい\\x%l客車;#00ffc040;客車%l;#;が、僕らをのせて走ってる。
2269 = "Giữa những nụ cười, nụ cười và nụ cười, một Ohimitera tràn ngập tiếng cười. \\x%l8620;#00ffc040;8620%l;#; và \\x%lキハ07;#00ffc040;KiHa 07%l;#;S cùng \\x%l客車;#00ffc040;toa hành khách%l;#; mới, đang chở chúng tôi băng băng chạy."
# 【れいな】
# display as 玲奈
# JP: 「ふわわわわぁ～っ」
1304 = "「Oa a a a a~」"
# 【ハチロク】
# display as 八六
# JP: 「素敵な絵ですね。\nとても暖かで、日々姫らしい絵」
1645 = "「Một bức tranh thật tuyệt vời. Rất ấm áp, và mang đậm phong cách của Hibiki.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、本当だな」
1492 = "「À, đúng vậy nhỉ.」"
# monologue
# JP: これが、日々姫の夢見る未来図。
2460 = "Đây chính là, bức tranh tương lai mà Hibiki hằng mơ ước."
# monologue
# JP: 子供じみていると笑うものには、もう笑わせておけばいい。\nその笑いさえ、日々姫はきっと未来図の一部にしてしまう。
2193 = "Kẻ nào cười nhạo nó là trẻ con, thì cứ mặc kệ cho chúng cười. Bởi vì ngay cả tiếng cười đó, Hibiki chắc chắn cũng sẽ biến thành một phần của bức tranh tương lai."
# 【日々姫】
# display as 日日姬
# JP: 「――だから、御一夜は大丈夫です。\n工場になんて頼らなくても、もっと素敵な町になります」
945 = "「――Vì vậy, Ohimitera sẽ ổn thôi. Không cần dựa dẫm vào nhà máy, nó sẽ trở thành một thị trấn tuyệt vời hơn nữa.」"
# 【稀咲】
# display as 稀咲
# JP: 「……素敵な絵だね。とても、素敵だ」
1012 = "「......Một bức tranh tuyệt đẹp. Thực sự, rất tuyệt.」"
# monologue
# JP: 稀咲も笑う。\n笑って、けれども――すぐに表情を引き締める。
2334 = "Kisaki cũng mỉm cười. Cười, nhưng――ngay lập tức cô ấy lại thu lại vẻ mặt nghiêm túc."
# 【稀咲】
# display as 稀咲
# JP: 「しかし、絵だ。\n絵は、現実とは違うものだよ」
1231 = "「Nhưng, đó chỉ là một bức tranh. Tranh vẽ, khác xa với hiện thực đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「いいえ、先輩。わたしは、見たものしか描けません。\nこれが、現実の御一夜なんです」
1222 = "「Không đâu, tiền bối. Tôi chỉ có thể vẽ những gì mình nhìn thấy. Đây chính là Ohimitera của hiện thực.」"
# monologue
# JP: スケッチブックを、日々姫は稀咲に渡してしまう。
2157 = "Hibiki trao cuốn sổ phác thảo cho Kisaki."
# monologue
# JP: 稀咲は受け取り、じっと眺めて――\nそれからゆっくり、大事に大事に日々姫に返す。
2365 = "Kisaki nhận lấy, chăm chú ngắm nhìn―― rồi từ từ, cẩn thận trả lại cho Hibiki."
# 【稀咲】
# display as 稀咲
# JP: 「日々姫の絵は、とても素敵だ。\nけど、ね？　日々姫」
1249 = "「Bức tranh của Hibiki, thực sự rất tuyệt. Nhưng mà, này? Hibiki.」"
# monologue
# JP: 認めて、それでも、その上に。\n稀咲もまた、自分の言葉を静かに重ねる。
2364 = "Dù công nhận, nhưng cô ấy vẫn đặt lên trên nó. Kisaki lại một lần nữa nhẹ nhàng đưa ra những lời lẽ của riêng mình."
# 【稀咲】
# display as 稀咲
# JP: 「誰もが上手く、自分の絵を描けるとは限らない。\n描きたい絵すら、見つけられない人もいる」
1217 = "「Không phải ai cũng có thể vẽ nên bức tranh của riêng mình một cách hoàn hảo. Thậm chí có những người còn không tìm thấy bức tranh mà mình muốn vẽ.」"
# monologue
# JP: 稀咲が浮かべた淋しげな目の、\nその奥にあるものが見えた気がする。
2375 = "Đôi mắt thoáng buồn của Kisaki, tôi có cảm giác như nhìn thấy được những gì ẩn giấu sâu bên trong đó."
# monologue
# JP: 環境により、教育により、夢さえ見れなくなった人を――\n銀行家である稀咲は恐らく、数多く知っているのだろう。
1989 = "Những người vì hoàn cảnh, vì giáo dục mà đến cả việc mơ ước cũng không thể làm được―― Là một nhân viên ngân hàng, có lẽ Kisaki đã biết rất nhiều người như vậy."
# 【稀咲】
# display as 稀咲
# JP: 「政治とは、そんな人達こそを助けるものだとボクは思う。\n描ける者の理想をではなく、描けない者の現実こそを」
1436 = "「Tôi nghĩ rằng, chính trị là thứ dùng để giúp đỡ những người như vậy. Không phải là lý tưởng của những người có thể vẽ, mà chính là hiện thực của những người không thể vẽ.」"
# monologue
# JP: 塗りつぶされた景色の中でも、確実に食を得られる生活。
2483 = "Một cuộc sống đảm bảo cái ăn cái mặc, dù là giữa một cảnh quan bị bôi xóa."
# monologue
# JP: その味気無さを僕は知ってる。\n知っていて――だからこそ否定しきれない。
2091 = "Tôi biết sự tẻ nhạt đó. Biết――và chính vì thế nên tôi không thể phủ nhận hoàn toàn."
# monologue
# JP: けれど日々姫は揺るがない。
1873 = "Nhưng Hibiki không hề dao động."
# monologue
# JP: 日々姫とて、誰からも認められない時間を知ってる。\n知っていてなお、その中で絵を描き続けてきた。
1959 = "Bản thân Hibiki cũng biết đến những khoảng thời gian không được ai công nhận. Dù biết vậy, con bé vẫn tiếp tục vẽ tranh trong suốt quãng thời gian đó."
# 【日々姫】
# display as 日日姬
# JP: 「思いませんか？\n現実は――今の御一夜は、綺麗って」
1239 = "「Cô không nghĩ vậy sao? Hiện thực――Ohimitera hiện tại, rất đẹp.」"
# monologue
# JP: 日々姫の目は、いとおしそうにレイアウトへと注がれる。
2153 = "Ánh mắt Hibiki hướng về phía sa bàn với vẻ đầy trìu mến."
# 【日々姫】
# display as 日日姬
# JP: 「それは、今の御一夜に生きるみんなが、\nそれぞれに、それぞれの大好きを形にしたから」
1395 = "「Đó là bởi vì, tất cả những người đang sống ở Ohimitera hiện tại, mỗi người đều đã biến những điều mình yêu thích nhất thành hiện thực.」"
# 【稀咲】
# display as 稀咲
# JP: 「…………」
971 = "「............」"
# monologue
# JP: 稀咲の視線も、レイアウトへと。\n唇を固く結んだままに。
2361 = "Ánh mắt Kisaki cũng hướng về phía sa bàn. Đôi môi cô ấy mím chặt."
# 【日々姫】
# display as 日日姬
# JP: 「[か]描きたい絵、本当は誰にだってあるんです。\nそれを表現しやすい世界を、私はみんなと[えが]描きたいです」
1262 = "「Bức tranh muốn vẽ, thực ra ai cũng có cả. Tôi muốn cùng mọi người vẽ nên một thế giới nơi mà những bức tranh đó dễ dàng được thể hiện.」"
# 【稀咲】
# display as 稀咲
# JP: 「……なるほどね」
983 = "「......Ra là vậy.」"
# monologue
# JP: ふっと、稀咲が笑顔を浮かべる。\nあきれたような、疲れたような――
2344 = "Phụt, Kisaki nở một nụ cười. Như thể đã cạn lời, lại như thể đã mệt mỏi――"
# monologue
# JP: いつものそれほど整っていない、\nけれどもずっと、稀咲の体温を感じる笑顔を。
2013 = "Không được chỉn chu như mọi khi, nhưng lại là một nụ cười khiến người ta cảm nhận được hơi ấm của Kisaki."
# 【稀咲】
# display as 稀咲
# JP: 「ありがとう、日々姫。\n本音を聞けて、嬉しかったよ」
1616 = "「Cảm ơn cô, Hibiki. Được nghe những lời thật lòng này, tôi rất vui.」"
# 【日々姫】
# display as 日日姬
# JP: 「わたしこそです、稀咲先輩。\nお話ししてくれて、ありがとうございます」
1611 = "「Tôi mới là người phải cảm ơn, tiền bối Kisaki. Cảm ơn cô vì đã trò chuyện cùng tôi.」"
# monologue
# JP: 握手。まばらな拍手が起きる。\nそしてすぐさま拍手が会場を埋め尽くす。
1993 = "Bắt tay. Những tràng vỗ tay lác đác vang lên. Và ngay sau đó, tiếng vỗ tay lấp đầy cả hội trường."
# monologue
# JP: かやの外へと置かれた候補者ふたりさえ、\n惜しみなく、日々姫と稀咲に拍手を送ってくれている。
2039 = "Ngay cả hai ứng cử viên bị gạt ra rìa, cũng không tiếc lời vỗ tay tán thưởng Hibiki và Kisaki."
# 【双鉄】
# display as 雙鐵
# JP: 「……あと、もう一仕事だ」
1016 = "「......Còn một việc nữa phải làm.」"
# monologue
# JP: 日々姫は日々姫のベストを示した。\n僕は、それに応えたい。
2159 = "Hibiki đã thể hiện những gì tốt nhất của bản thân. Tôi muốn đáp lại điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「あの日々姫の絵を、ポスターに」
1453 = "「Làm bức tranh đó của Hibiki thành áp phích.」"
# monologue
# JP: あれこそが、メインビジュアルだ。
1921 = "Đó mới chính là hình ảnh chủ đạo."
# monologue
# JP: 御一夜の未来を示すあの絵をもっと、\n多くの人に見てもらい――
2050 = "Để bức tranh thể hiện tương lai của Ohimitera đó, được nhiều người nhìn thấy hơn nữa――"
# 【双鉄】
# display as 雙鐵
# JP: 「そして必ず、御一夜の今と重ねていこう」
1206 = "「Và nhất định, phải kết nối nó với Ohimitera hiện tại.」"
