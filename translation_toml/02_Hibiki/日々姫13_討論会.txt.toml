1529 = "「當然可以。別說一個了，問多少個都行」" 

# 【日々姫】
# display as 日日姬
# JP: 「いいえ、ひとつだけでいいんです」
1220 = "「不，一個就好」" 

# monologue
# JP: ス、と短く息が吸われる。
2150 = "日日姬微微吸了口氣。" 

# monologue
