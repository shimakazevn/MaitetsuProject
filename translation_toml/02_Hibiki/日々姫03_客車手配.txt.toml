[script]
# lines: 513 
# 【日々姫】
# display as 日日姬
# JP: 「サドー、ドエスー、サドー」
2464 = "「嗜虐……施虐狂……嗜虐……」" 

# 【れいな】
# display as 玲奈
# JP: 「？？？」
2919 = "「？？？」" 

# monologue
# JP: 突っ伏している。\nレールショップの机に、日々姫が。
3493 = "日日姬整個人趴倒在鐵路商店的桌子上。" 

# monologue
# JP: 突っ伏しながらいくどもいくども、\n同じ言葉を繰り返している。
3301 = "她趴在桌子上反覆嘟囔著同樣的幾句話。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにのサドー、ドエスー、サドー」
2902 = "「阿哥是施虐狂……嗜虐……」" 

# 【れいな】
# display as 玲奈
# JP: 「あのお、そうてつさん」
2852 = "「那個，雙鐵先生……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
2479 = "「嗯」" 

# monologue
# JP: きょとんと、れいなが首を傾げる。\nあどけない目で僕を見上げる。
3599 = "玲奈不解地歪著頭。她用天真的眼神抬頭望著我。" 

# 【れいな】
# display as 玲奈
# JP: 「“さどー”“どえすー”ってなんですかぁ？」
1925 = "「“施虐狂”和“嗜虐”到底是什麼呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そのことか」
2454 = "「啊，是這個問題嗎」" 

# monologue
# JP: 予想通りにすぎる質問。\nが、答えはなかなか、難しい。
3534 = "極其不出所料的疑問。但是，還真是很難回答。" 

# monologue
# JP: 「日々姫が僕を、加虐性性的倒錯者であると罵っている」\nなど、まさかそのまま、説明するわけにもいかん。
3656 = "總不能真的說“日日姬在罵我是一個施虐狂性變態”吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「サドー、とは即ち茶道」
1926 = "「“石鎳筐”就是指茶道中可能會用的工具吧」" 

# 【れいな】
# display as 玲奈
# JP: 「さどう？」
2781 = "「茶道的工具？」" 

# monologue
# JP: さりとて、ウソを吐きたくも無い。\nだから、可能性のみを論じる。
3153 = "但我也不想去撒謊。所以就只討論一下可能性吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう。\nつまりは、お茶の道――のことではあるまいか」
2671 = "「是的。也就是茶的藝道——可能是這樣吧？」" 

# monologue
# JP: ぱ、とれいなの顔が輝く。
3603 = "玲奈的臉上唰地放出了光芒。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、わかりましたぁ！　そうてつさんのさどう。\nそうてつさんのお茶の道が、どえすなんですねぇ」
2722 = "「玲奈知道啦！“石鎳筐”是雙鐵先生的茶道工具。而雙鐵先生的茶的藝道名叫“施虐”是吧？」" 

# monologue
# JP: 言って、\nふたたび小首がきょとん。
3296 = "她說完又不解地歪著她的腦袋。" 

# 【れいな】
# display as 玲奈
# JP: 「それで、どえすってなんですかぁ？」
2890 = "「那，“嗜虐”又是什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[きょうと,1]京塗の方の……\nいわゆる、[まいこ,1]舞妓言葉というものであるかもしれんな」
2373 = "「可能是京都地方的舞妓們的慣用詞“是也”吧」" 

# 【れいな】
# display as 玲奈
# JP: 「あああ！　\nれいな、聞いたことあるような気がしますよお」
2442 = "「啊！玲奈好像有聽說過哦」" 

# monologue
# JP: れいながぴょっこり椅子から降りる。
3601 = "玲奈咻地從椅子上跳下來。" 

# 【れいな】
# display as 玲奈
# JP: 「しゃなり、しゃなり」
2778 = "「舉止優雅，舉止優雅……」" 

# monologue
# JP: 口で言いつつ、ゆったり歩く。\nそれから僕をみあげて、にっこり。
3273 = "她口中念念有詞並緩緩踱步起來。然後又抬頭望向我嫣然一笑。" 

# 【れいな】
# display as 玲奈
# JP: 「ウチ、れいなどえすー、\nよろしくどえすー」
2534 = "「小妾閨名玲奈“是也”，請多多指教“是也”！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ。\nそういう感じだった気がしないこともないな」
2378 = "「呃、嗯。好像就是這種感覺吧」" 

# monologue
# JP: いかん、ちょっとこれは面白い。
3113 = "不好，這還挺好玩的。" 

# monologue
# JP: が、これを他人に披露してしまった日には、\nれいながよほどのアホだと誤解されかねない。
3221 = "可要是哪天在別人面前表演的話，別人說不定會誤會玲奈是個無可救藥的大傻瓜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ただ、舞妓言葉を舞妓以外が使うのは、危ういかもな。\n舞妓と誤解されてしまえば、京塗に連れて行かれかねん」
2313 = "「但是，不是舞妓的人說舞妓用語可能會有點危險啊。要是被誤當成是舞妓的話，說不定會被強行帶到京都去哦」" 

# 【れいな】
# display as 玲奈
# JP: 「はわわ！　れいな、御一夜鉄道の子だから、\nきょうとにいかないのです。どえす、言わないのです」
2463 = "「嗚哇哇！玲奈是御一夜鐵路的人，才不想去京都呢。玲奈不說“是也”了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、それが一番だ」
2666 = "「是啊，那樣最好」" 

# monologue
# JP: 頭を撫でれば、ふにゃんと笑う。
3399 = "我摸摸她的頭，她又笑了起來。" 

# monologue
# JP: そしてれいなは、帽子の形を整えながら、\n納得しきりな声を出す。
3592 = "然後整整帽子，似乎完全理解了一般地說道：" 

# 【れいな】
# display as 玲奈
# JP: 「にぃに、さどう、どえすですからぁ――ひびきさんは、\nそうてつさんの、みどりのお茶がのみたいんですねぇ」
2651 = "「日日姬小姐既然說“阿哥……石鎳筐……是也……”，那她是不是想喝雙鐵先生的綠茶呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……かもしれんな」
2434 = "「啊……說不定是吧」" 

# monologue
# JP: あの日から、連日連夜の乗務訓練。\n初日以降は、ハチロクも加わってより密度もあがった。
3343 = "從那天開始就一直在連日連夜地進行乘務訓練。第一天過後八六也加入了進來，訓練強度也進一步提高了。" 

# monologue
# JP: 僕でさえ、重なる疲労に体が悲鳴をあげかけている。\n日々姫においては、僕より数段苦しいはずだ。
3758 = "連我的身體都因為過度的疲勞而快要散架了。日日姬肯定比我還要痛苦好幾倍。" 

# 【れいな】
# display as 玲奈
# JP: 「あの？　そうてつさん？」
2853 = "「那個，雙鐵先生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よし。\n久しぶりだが、点ててみるとするか」
2515 = "「好。雖然很久沒泡了，今天就來泡一次吧」" 

# monologue
# JP: 路子と一緒に、茶道も一応、習ってはいた。\n正式な茶席でもなし、亭主の真似事くらいはできよう。
3319 = "小時候我跟路子還是學過一點茶道的。反正這也不是正式的茶席，今天我就充當一回東道主吧。" 

# monologue
# JP: それに……僕を加虐性性的倒錯者よばわりする日々姫の、\n心の荒みを癒やす茶ならば、やはり僕が点てるべきだろう。
3657 = "而且……若想用茶來安慰一直叫我施虐狂性變態的日日姬失落的內心，那壺茶果然還是得由我親自來泡才行。" 

# 【双鉄】
# display as 雙鐵
# JP: 「茶器はあるかな。\nそれに、できれば抹茶も欲しい」
2836 = "「這裡有茶具嗎？還有，最好也有抹茶」" 

# 【れいな】
# display as 玲奈
# JP: 「みどりのお茶をいれるやつなら、\n給湯室のステンのたなの中ですよぉ」
2788 = "「要是說裝綠茶的容器的話，開水房裡的不鏽鋼櫃子裡就有哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2756 = "「知道了」" 

# monologue
# JP: 言われたとおりの棚を開けば、\nその中には……ああ、それらしき桐箱がある。
3391 = "我打開她說的那扇櫃子的門，裡面——啊，有一個似乎是放著茶葉的桐箱。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[おうす,1]薄茶か。助かるな。\nれいなもいるし、その方がよかろう」
2708 = "「淡茶啊，正好。玲奈也在，還是這種茶比較好」" 

# monologue
# JP: 湯を沸かし、適当な茶碗二つを選び、\n薄茶と湯とを淹れて茶筅で泡立てる。
3407 = "我燒開水，然後隨便選了兩隻茶碗，用開水把淡茶泡開再用竹刷打起泡沫。" 

# monologue
# JP: （さっ、さっ、さっ、さっ）
3841 = "（唰、唰、唰、唰）" 

# monologue
# JP: 見苦しい泡は滑らかにして――\n略式もここに極まれりだが、ともかく、点った。
3317 = "將難看的泡沫給打潤滑——雖然過程很簡單，但總之泡好了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「待たせたな」
2804 = "「讓你們久等了」" 

# monologue
# JP: 盆の上には、茶碗が二つ。\n茶菓子もないが、れいなは嬉しげに目を丸くする。
3395 = "我把兩隻茶碗放在盆上。雖然沒有準備茶點心，玲奈卻開心地瞪圓了眼睛。" 

# 【れいな】
# display as 玲奈
# JP: 「わぁ！　お客さまのお茶ですぅ」
2393 = "「哇！這是給客人準備的茶啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と――そうなのか？　勝手に点ててはまずかったか？」
2419 = "「唔——是這樣嗎？我是不是不應該隨便拿來泡？」" 

# 【れいな】
# display as 玲奈
# JP: 「まずくないですぅ。\nおいしいってみんないってますよぉ」
2703 = "「沒關係的。大家都說很好喝呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2667 = "「是嗎」" 

# monologue
# JP: にこにこと、笑うれいなに茶碗をひとつ。
3393 = "我把一隻茶碗遞給喜笑顏開的玲奈。" 

# 【れいな】
# display as 玲奈
# JP: 「わああ！？\nれいな、お茶をもらっていいんですかぁ？」
2391 = "「哇啊啊！？玲奈真的可以喝這碗茶嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。せっかくだ、口に合うようなら飲んでみてくれ」
2474 = "「嗯。機會難得，要是合你口味就喝喝看吧」" 

# 【れいな】
# display as 玲奈
# JP: 「でもでも、れいな。さどうの――お茶の道のこと、\nぜんぜんわかりませんよぉ？」
2312 = "「但是但是，玲奈可完全不懂茶道——不懂茶的藝道哦？」" 

# monologue
# JP: 飲みたげに、ちらちら茶碗を見てくれている。
3292 = "她看起來挺想喝的樣子，眼睛三不五時瞅向茶碗。" 

# monologue
# JP: その気持ちを汲まぬようなら、\nそれこそ道もへったくれもあるまい。
3312 = "如果體察不到她的想法，那還談什麼“道”呢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「畳ではなく、テーブルの上に出すお茶だ。\n畏まっても仕方ない。気軽に飲んでくれれば嬉しい」
2829 = "「這又不是放在榻榻米上的茶，而是放在桌子上的茶。別畏畏縮縮的了。隨便喝就好啦」" 

# 【れいな】
# display as 玲奈
# JP: 「それなら、えんりょなくいただきますねぇ。\nれいな、おつき合いていどには飲めるのです」
2875 = "「那玲奈就不客氣啦。玲奈還是能陪人喝喝茶的」" 

# monologue
# JP: 言って、こく、こく。\n両手で茶碗を抱えて少しずつ飲み下していく。
3297 = "她說完用兩手抱起茶碗，緩緩地喝了下去。咕嘟，咕嘟。" 

# 【れいな】
# display as 玲奈
# JP: 「ぷはぁ、おいしかったです。軽油よりコクがあります。\nごちそうさまでしたぁ」
2386 = "「呼哈，真好喝。比柴油要醇厚多了。謝謝款待」" 

# monologue
# JP: じっと見られる。\n返事を――せずにはいられなくなる。
3589 = "然後她目不轉睛地盯著我看。這樣——我就不得不回答些什麼才行了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お粗末さまでした」
2630 = "「招待不周，請多擔待」" 

# monologue
# JP: これではご飯だ。\nそう思いつつ、次客の日々姫の前へと進む。
3750 = "這不就變成請吃飯了嗎。我一邊胡思亂想著，一邊朝次客日日姬走去。" 

# monologue
# JP: まだ突っ伏している日々姫は気配に軽く目をあげ――
3761 = "還趴在桌上的日日姬聽見聲音，微微地睜開眼睛——" 

# 【日々姫】
# display as 日日姬
# JP: 「！」
2914 = "「！」" 

# monologue
# JP: ――たかと思えば、いきなりピン、と背筋を伸ばす。
1873 = "——然後突然挺直了身子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……」
1932 = "「……」" 

# monologue
# JP: 茶碗を出せば、すぐに一礼。\nそしてれいなへ軽く礼して、視線を茶碗の上へと注ぐ。
3428 = "我遞出茶碗，她很快行了一個禮。然後又向玲奈輕輕行禮致意，隨即把視線移到茶碗上。" 

# 【日々姫】
# display as 日日姬
# JP: 「お点前、頂戴いたします」
2575 = "「您泡的茶，我拜領了」" 

# monologue
# JP: 深く一礼。\n茶碗を取って左手に載せ、押しいただく。
3280 = "她深深行了個禮。然後把茶碗放在左手上，恭敬地舉起茶碗。" 

# monologue
# JP: す、す、と回し茶碗の正面を自分から避け、\n静かに、唇を茶碗につける。
3722 = "轉動茶碗讓自己避開茶碗的正面，然後用嘴唇輕觸茶碗。" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁぁ」
2389 = "「哇啊……」" 

# 【日々姫】
# display as 日日姬
# JP: 「……」
# 1932 = "「……」" 

# monologue
# JP: 最後の一口は音を立て吸い、\n飲み口を指で清めて、その指をハンカチで軽く拭う。
3525 = "最後的一口特地發出吸茶的聲響，然後用指頭擦拭乾淨剛才嘴唇接觸的地方，再用手絹輕輕地擦拭指頭。" 

# monologue
# JP: 茶碗はテーブルの上に置かれて、\n日々姫はそれを丁寧に、上から、そして手に取り、眺める。
3591 = "然後把茶碗放在桌子上，仔細地從上方用手拿起鑑賞起來。" 

# 【れいな】
# display as 玲奈
# JP: 「かぁっこいいですぅ！\nひびきさん、いつもとぜんぜん違いますぅ」
2517 = "「好帥氣！和平時的日日姬小姐大不一樣呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「ええっ！？」
2400 = "「哎！？」" 

# monologue
# JP: れいなの声にずっこける。いつもの日々姫に安心したのか、\nれいながころころ笑い転げる。
3502 = "日日姬聽到玲奈的話不由得一個趔趄。看到她還是一如往常，似乎安心了下來的玲奈捧腹大笑。" 

# monologue
# JP: いやしかし……実際、今の日々姫は凛としていた。\n僕の習ったものとは違うが、整った所作で落ち着いていた。
3117 = "不過……剛才的日日姬確實充滿了高雅的氣質啊。雖然和我之前學習過的禮儀有點不一樣，不過她端莊的舉止確實很穩重。" 

# 【日々姫】
# display as 日日姬
# JP: 「こほん」
2388 = "「咳咳」" 

# monologue
# JP: 咳払いをし、姿勢をもう一度正し直して、僕へと一礼。
3278 = "她故意咳嗽了一下，然後再次端整姿勢，對我行了一個禮。" 

# monologue
# JP: さきほどまでの怨嗟の声が空耳だったかと疑うほどに、\nその表情は和らいでいる。
3290 = "她的表情柔和了很多，讓人懷疑剛才的那些埋怨聲其實是幻聽。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さんのお心づかい、美味しく頂戴いたしました」
2410 = "「哥哥您用心泡的茶，我感激地拜領了」" 

# 【ハチロク】
# display as 八六
# JP: 「あら、お茶ですか」
2395 = "「哎呀，你們在喝茶嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが点てたんですか？\n羨ましいです。わたしにも、いただけませんか？」
2686 = "「是雙鐵君泡的嗎？真是讓人羨慕。能給我也泡一碗嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「とても本式には点てられぬが、それで良ければ」
2585 = "「我不能泡得很正式，如果你不介意的話」" 

# monologue
# JP: ポーレットは市長、公式行事なども数多あろうし、\nハチロクは、言うまでも無くハチロクだ。
3566 = "波萊特是市長，肯定參加過很多官方活動等等，八六則自不用說了。" 

# monologue
# JP: 予防線を張り、頷きを得て、\nならばとさくさく、茶を点てる。
3375 = "我先給她們設立心理防線，見她們點頭了，我就俐落地開始泡茶。" 

# 【ハチロク】
# display as 八六
# JP: 「……双鉄様らしいお茶ですね。\n大変おいしゅうございます」
1950 = "「……真是一碗獨具雙鐵少爺風格的茶。非常好喝」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……落ち着くお茶をいただきました。\nおいしかったです。ありがとうございます」
1952 = "「……真是一碗靜心凝神的好茶。非常好喝。謝謝您的招待」" 

# monologue
# JP: （うむ？）
3840 = "（唔？）" 

# monologue
# JP: 正客のハチロクと、次客のポーレット。\n口にした言葉こそ違えども、所作が驚くほど似通っていた。
3543 = "正客八六和次客波萊特。雖然她們所說的話不同，但舉止卻驚人地相似。" 

# monologue
# JP: （同じ流派か？\n上品だが、一風変わった所作であるように思えたが……）
3877 = "（難道是同一個流派的嗎？雖然都很高雅，但總讓人覺得舉止有些奇特……）" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、大事なお話の前に、\n唇をなめらかにしてもらえちゃいました」
2382 = "「呵呵呵，在說重要的事情之前，先讓嘴唇得到了一些滋潤」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2479 = "「嗯」" 

# monologue
# JP: 本題らしい。
3148 = "似乎要進入正題了。" 

# monologue
# JP: 余計な考えを振り払い、\n顔と意識をポーレットへと正対させる。
3397 = "我拋掉腦中那些多餘的想法，把目光和意識集中在波萊特身上。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんから、乗務訓練の評価シートをいただいて、\n報告を受けた上でお話し合いをしたんですけど」
2601 = "「我從八六那裡拿到了乘務訓練的評價小票，在聽了報告之後討論了一下」" 

# monologue
# JP: ポーレットの言葉を受けて、\nハチロクが小さな笑みを浮かべる。
3663 = "聽到波萊特的話，八六臉上浮現出淡淡的微笑。" 

# 【ハチロク】
# display as 八六
# JP: 「日々姫は、この短期間に大きくスキルを伸ばしています。\n\x%l機関助士;#00ffc040;機関助士%l;#;とし、乗務につける域に到達したと判断します」
2649 = "「日日姬在這麼短的時間裡極大提高了自己的技能。我認為她已經到達能勝任\\x%l機関助士;#00ffc040;司爐%l;#;乘務工作的水準了」" 

# 【日々姫】
# display as 日日姬
# JP: 「乗務につける？」
2838 = "「進行乘務工作？」" 

# monologue
# JP: 鬼教官の優しいことばに、\nけれども日々姫は困惑顔しか浮かべられない。
3790 = "面對魔鬼教官難得的溫柔話語，日日姬卻只是滿臉的困惑。" 

# 【日々姫】
# display as 日日姬
# JP: 「そんなん、訓練三日目から乗務させられて、\n石炭ばガンガン投げ込んどるばい」
2802 = "「說起來，從訓練第三天就開始讓我做乘務，一直都在鏟啊鏟地把煤鏟進爐子」" 

# 【ハチロク】
# display as 八六
# JP: 「訓練としてですよね？　それは」
2854 = "「那可是訓練哦」" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、乗務訓練――えっ？　ええっ！？」
2619 = "「所以說乘務訓練——哎？哎哎！？」" 

# monologue
# JP: 驚いた目がハチロクを見て、僕へ向く。
3285 = "她用吃驚的眼神看向八六，然後轉向我。" 

# monologue
# JP: 誤解、ということも最早あるまい。\nハチロクのうなずきを受け、僕から日々姫に保証を与える。
3686 = "要說有什麼誤解也早不翼而飛了吧。八六對她點點頭，我也對日日姬保證道：" 

# 【双鉄】
# display as 雙鐵
# JP: 「訓練のつかぬ“乗務”。\nつまりは、営業運転のことだろう」
2912 = "「非訓練的“乘務工作”。也就是商業運營了吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　だって――営業運転って――だって、にぃにっ！\nんんっ――ですけど、兄さん」
2402 = "「哎？可是——商業運營不是——阿哥！不——可是，哥哥」" 

# monologue
# JP: 頬を興奮に染めたまま、\n日々姫はなんとか落ち着こうとする。
3508 = "日日姬雙頰由於興奮而微微發紅，她嘗試著讓自己冷靜下來。" 

# 【日々姫】
# display as 日日姬
# JP: 「その評価は凄く嬉しいんですけど――でも、\n営業運転って……まだいろいろ不足してませんか？」
2903 = "「雖然我很高興能得到這個評價——但是，要商業運營的話——我應該還有很多不足之處吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;の再整備は完了した。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、\x%l機関士;#00ffc040;機関士%l;#;、\x%l機関助士;#00ffc040;機関助士%l;#;は揃った」
1897 = "「\\x%l8620;#00ffc040;８６２０%l;#;的再檢修結束了。\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;、\\x%l機関士;#00ffc040;司機%l;#;、\\x%l機関助士;#00ffc040;司爐%l;#;也都到齊了」" 

# monologue
# JP: 日々姫の言葉を受けて数えていけば、\nハチロクも声を重ねてくる。
3431 = "我順著日日姬的話點著人數，這時八六也接話道：" 

# 【ハチロク】
# display as 八六
# JP: 「二駅間往復のみの路線ですから、\x%l車掌;#00ffc040;車掌%l;#;不在でも……\n望ましくはありませんが、当面の問題はございません」
2501 = "「因為只是單純來回兩個車站間的路線，就算沒有\\x%l車掌;#00ffc040;列車長%l;#;……雖然最好是有，不過當前來說基本沒有問題」" 

# 【れいな】
# display as 玲奈
# JP: 「\x%l保線;#00ffc040;保線%l;#;の方もばっちりですよぉ！\nぼらんてぃあさん、たくさんがんばってくれましたぁ」
1903 = "「\\x%l保線;#00ffc040;巡線%l;#;的人選也找好了！志願者們可努力了！」" 

# 【日々姫】
# display as 日日姬
# JP: 「なら……ええと、他の不足、は――\nあっ！　そう、だって、営業運転っていうなら！」
2884 = "「那麼……哎，其他的不足點……啊！對了，如果要開始商業運營的話——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。\nそれが今日、みなさんに集まってもらった理由です」
2683 = "「是的。這就是今天把大家集合在一起的原因了」" 

# monologue
# JP: ポーレットの声に、一同そろって深く頷く。
3269 = "大家聽了波萊特的話都重重地點了點頭。" 

# monologue
# JP: 機関車、乗員、線路がひとまず揃っても、\nまだあまりに大きな欠けがあるのは、明白だから。
3785 = "雖然機車、乘務員、線路暫且都算湊齊了，但誰都知道明顯還有一個巨大的欠缺。" 

# 【ポーレット】
# display as 波萊特
# JP: 「営業運転を開始するには、\n\x%l客車;#00ffc040;客車%l;#;が、どうしても必要になります」
2581 = "「想要開始商業運營，就必須要有\\x%l客車;#00ffc040;客運車廂%l;#;才行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lキハ07;#00ffc040;キハ07%l;#;を\x%l客車;#00ffc040;客車%l;#;代わりにはできんのか？」
2775 = "「能不能用\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;代替\\x%l客車;#00ffc040;客運車廂%l;#;呢？」" 

# monologue
# JP: もっともシンプルな解決法を提案してみる。\nが、ポーレットはもうしわけなさそうに首を振る。
3420 = "我試著提議了一個最簡單的解決方法。但波萊特卻滿臉歉意地搖著頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「足回り不安があるコですから、\n今以上に負荷を増やすのは」
2880 = "「那輛車畢竟行駛系統不太穩定，不能再增加它的負擔了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。それはそうだな」
2452 = "「啊，是嗎。那倒也是啊」" 

# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;の足回りがもし破損してしまえば、\n\x%l8620;#00ffc040;8620%l;#;、\x%lキハ07;#00ffc040;キハ07%l;#;、ともに営業運転不能になってしまう。
85 = "\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;的行駛系統要是損壞了，那\\x%l8620;#00ffc040;８６２０%l;#;和\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;就都無法進行商業運營了。" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の\x%l客車;#00ffc040;客車%l;#;を手配するということは、即ち、\n\x%lキハ07;#00ffc040;キハ07%l;#;にとっての予備\x%l編成;#00ffc040;編成%l;#;を確保するということにもなる。
3648 = "籌備\\x%l8620;#00ffc040;８６２０%l;#;的\\x%l客車;#00ffc040;客運車廂%l;#;也算得上是建立\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;的預備\\x%l編成;#00ffc040;編組%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、どこからか手配するしかないか。\nポーレットの方で、アテはないのか？」
2885 = "「那麼就只能從別的地方調度過來了。波萊特有什麼頭緒嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「交流のある\x%lまいてつ;#00ffc040;まいてつ%l;#;の人たち、\n何人かには聞いたんですけど……」
2591 = "「我也試著問過認識的幾個\\x%lまいてつ;#00ffc040;掌車人%l;#;的人，但是……」" 

# monologue
# JP: \x%lまいてつ;#00ffc040;まいてつ%l;#;が所有するのは、その殆どが、\n客室と運転室とが一体となっている\x%l気動車;#00ffc040;気動車%l;#;らしい。
81 = "\\x%lまいてつ;#00ffc040;掌車人%l;#;所持有的似乎基本都是客室和駕駛室連接為一體的\\x%l気動車;#00ffc040;動車%l;#;。" 

# monologue
# JP: そして機関車を所有するような\x%lまいてつ;#00ffc040;まいてつ%l;#;は、\n無論、自分の機関車のための\x%l客車;#00ffc040;客車%l;#;を手放しはしない。
3443 = "擁有機車的\\x%lまいてつ;#00ffc040;掌車人%l;#;當然不可能借出為自己的機車而準備的\\x%l客車;#00ffc040;客運車廂%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば……そうなるか。\nなら、\x%l客車;#00ffc040;客車%l;#;の手配は困難なのだな？」
2323 = "「你這麼一說……倒也確實是。那就是說目前很難籌備\\x%l客車;#00ffc040;客運車廂%l;#;是嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。だから、\nその辺のこと、相談したいな、って思いまして」
2677 = "「是的。所以我才想和大家商量一下這件事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
2426 = "「唔」" 

# monologue
# JP: 僕と日々姫は、所詮は鉄道素人だ。\nポーレットが頼れないなら、ハチロクを頼る他にない。
3381 = "我和日日姬在鐵路方面只是外行人。波萊特既然指望不上，那就只有拜託八六了。" 

# monologue
# JP: が、ハチロクもまた、困った顔を浮かべるばかりだ。
3152 = "但八六卻也一臉難色。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;末期には、機関車を失った\x%l客車;#00ffc040;客車%l;#;など、\nごろごろ転がっておりましたのに――」
2505 = "「在\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;時代的末期可是有一大堆沒了機車的\\x%l客車;#00ffc040;客運車廂%l;#;的呢——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ここでも同じだったって聞いてます。\nでも、スクラップ業者さんに買い取られていったって」
2609 = "「我聽說這裡也是一樣。但是它們似乎都被廢鐵回收商給買去了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ」
2298 = "「什麼」" 

# monologue
# JP: やはり話は聞くべきだ。\n当たり外れはわからんが、糸口がひとつ、見つかった。
3531 = "果然多了解總沒錯。雖然不知道結果會怎麼樣，但是至少找到了一個突破口。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、スクラップ業者を片っ端からあたってみよう。\n使えそうなものが、一両くらいは残っているかもしれん」
2866 = "「那我們就去找那些廢鐵回收商，一家一家找過來。說不定還會剩下一節能用的車廂」" 

# monologue
# JP: 鉄道関係のツテもなく、\x%l客車;#00ffc040;客車%l;#;に関する知識もない。
3400 = "我既沒有鐵路關係的人脈也沒有任何\\x%l客車;#00ffc040;客運車廂%l;#;知識。" 

# monologue
# JP: が――これならば僕にも、間違いなく出来ることだ。\nなのにポーレットは、困ったような顔になる。
3150 = "但——這一點我也完全可以辦到。然而波萊特卻面露難色。" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど……スクラップ業者さんに引き取られたのなんて、\nもうずうっと前のことですから」
2309 = "「但是……那些車廂被廢品回收商收走已經是很久很久以前的事了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;とて、その時期に事故車両として引き取られ、\nそのまま放置されていたが、見事に復活した」
1895 = "「\\x%l8620;#00ffc040;８６２０%l;#;當時也是作為事故車輛被收走並閒置，而現在卻已經華麗復活」" 

# monologue
# JP: 僕ら全員が知っている事実を、ただ口にする。
3421 = "我說出這個大家都已經知道的事實。" 

# 【双鉄】
# display as 雙鐵
# JP: 「同じように放置され、修復可能な\x%l客車;#00ffc040;客車%l;#;があるかもしれぬ。\nあたってみても、損ということはあるまいよ」
2876 = "「那說不定也會有同樣被閒置而又可修復的\\x%l客車;#00ffc040;客運車廂%l;#;。總之去碰碰運氣吧，不會吃虧的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……そう、ですよね。\nわたし、やる前から諦めるみたいなこと言って」
2436 = "「啊……那也是啊。我竟然試都沒去試就說了洩氣話」" 

# monologue
# JP: ぽかりと、芝居がかった仕草で、\nポーレットは自分の頭を叩く。
3562 = "波萊特半作戲地敲了敲自己的頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「こっちも、もう一回あたりなおしてみます。\n知り合いだけじゃなく、紹介とかもお願いしてみて」
2588 = "「我也去再問一遍那些認識的人吧。不光是那些認識的人，也試著拜託他們能不能介紹點人脈給我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、それは心強い」
2493 = "「嗯，那我就安心多了」" 

# monologue
# JP: さきほどまでの頼りなげなものから一転、\nポーレットの目が燃えている。
3188 = "剛才還讓人覺得靠不住的波萊特轉眼間目光如炬。" 

# monologue
# JP: 瞳の強さが、肌の白さを際立てるようで、\n凄みに近いものさえ感じる。
3287 = "她的堅定眼神似乎又更襯托出了她皮膚的白皙，甚至隱隱讓人覺得有威壓感。" 

# 【れいな】
# display as 玲奈
# JP: 「れいなも、ポーレットをおてつだいしますぅ」
2721 = "「玲奈也去幫波萊特的忙」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしも、ポーレット様をお手伝いしましょう。\nもしかして、旧知の名などに行き当たるかもしれません」
2587 = "「我也來幫波萊特小姐吧。說不定還能找到舊知」" 

