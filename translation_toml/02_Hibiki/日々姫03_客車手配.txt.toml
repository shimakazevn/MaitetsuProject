3341 = "從發動機故障的\\x%l気動車;#00ffc040;動車%l;#;裡拆掉發動機和操縱部分，然後再翻新為\\x%l客車;#00ffc040;客運車廂%l;#;——" 

# monologue
# JP: それが、“\x%l気動車;#00ffc040;気動車%l;#;改造の\x%l客車;#00ffc040;客車%l;#;”だそうだ。
3751 = "這就是“\\x%l気動車;#00ffc040;動車%l;#;改造成的\\x%l客車;#00ffc040;客運車廂%l;#;”了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……で、二週間ほど前、靜岡の別の鉄道会社、\n『[しょういがわてつどう,4]小井川鐵道』の、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の一体が寿命を迎えて」
