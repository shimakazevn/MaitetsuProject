# lines: 513 
# 【日々姫】
# display as 日日姬
# JP: 「サドー、ドエスー、サドー」
2464 = "「Sadou, doesuu, sadou」"

# 【れいな】
# display as 玲奈
# JP: 「？？？」
2919 = "「???」"

# monologue
# JP: 突っ伏している。\nレールショップの机に、日々姫が。
3493 = "Nằm gục xuống.\nHibiki đang nằm gục trên bàn của cửa hàng\nđường sắt."

# monologue
# JP: 突っ伏しながらいくどもいくども、\n同じ言葉を繰り返している。
3301 = "Vừa nằm gục, vừa lẩm bẩm lặp đi lặp lại\ncùng một câu nói."

# 【日々姫】
# display as 日日姬
# JP: 「にぃにのサドー、ドエスー、サドー」
2902 = "「Sadou của anh hai, doesuu, sadou」"

# 【れいな】
# display as 玲奈
# JP: 「あのお、そうてつさん」
2852 = "「Dạ, anh Soutetsu ơi」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
2479 = "「Ừm」"

# monologue
# JP: きょとんと、れいなが首を傾げる。\nあどけない目で僕を見上げる。
3599 = "Reina nghiêng đầu khó hiểu.\nNgước nhìn tôi bằng ánh mắt ngây thơ."

# 【れいな】
# display as 玲奈
# JP: 「“さどー”“どえすー”ってなんですかぁ？」
1925 = "「“Sadou” “doesuu” là gì vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そのことか」
2454 = "「À, chuyện đó sao」"

# monologue
# JP: 予想通りにすぎる質問。\nが、答えはなかなか、難しい。
3534 = "Một câu hỏi quá đỗi dễ đoán.\nNhưng câu trả lời lại khá là... khó nhằn."

# monologue
# JP: 「日々姫が僕を、加虐性性的倒錯者であると罵っている」\nなど、まさかそのまま、説明するわけにもいかん。
3656 = "「Sadou, tức là trà đạo」"

# 【双鉄】
# display as 雙鐵
# JP: 「サドー、とは即ち茶道」
1926 = "「Sadou?」"

# 【れいな】
# display as 玲奈
# JP: 「さどう？」
2781 = "「Sadou?」"

# monologue
# JP: さりとて、ウソを吐きたくも無い。\nだから、可能性のみを論じる。
3153 = "Nhưng tôi cũng không muốn nói dối.\nNên tôi chỉ bàn luận về khả năng thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「そう。\nつまりは、お茶の道――のことではあるまいか」
2671 = "「Đúng vậy.\nTức là, con đường của trà——chắc là vậy\nnhỉ」"

# monologue
# JP: ぱ、とれいなの顔が輝く。
3603 = "Gương mặt Reina bừng sáng."

# 【れいな】
# display as 玲奈
# JP: 「れいな、わかりましたぁ！　そうてつさんのさどう。\nそうてつさんのお茶の道が、どえすなんですねぇ」
2722 = "「Reina hiểu rồi ạ! Sadou của anh Soutetsu.\nCon đường của trà của anh Soutetsu, tên là\ndoesu đúng không ạ」"

# monologue
# JP: 言って、\nふたたび小首がきょとん。
3296 = "Nói xong,\nReina lại nghiêng đầu khó hiểu."

# 【れいな】
# display as 玲奈
# JP: 「それで、どえすってなんですかぁ？」
2890 = "「Vậy, doesu là gì vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「[きょうと,1]京塗の方の……\nいわゆる、[まいこ,1]舞妓言葉というものであるかもしれんな」
2373 = "「Chắc là từ của vùng Kyoto...\ncái gọi là ngôn ngữ của Maiko chăng」"

# 【れいな】
# display as 玲奈
# JP: 「あああ！　\nれいな、聞いたことあるような気がしますよお」
2442 = "「Aaa! \nReina hình như từng nghe qua rồi đó nha」"

# monologue
# JP: れいながぴょっこり椅子から降りる。
3601 = "Reina nhẹ nhàng nhảy xuống khỏi ghế."

# 【れいな】
# display as 玲奈
# JP: 「しゃなり、しゃなり」
2778 = "「Uyển chuyển, uyển chuyển」"

# monologue
# JP: 口で言いつつ、ゆったり歩く。\nそれから僕をみあげて、にっこり。
3273 = "Vừa nói, cô bé vừa thong thả bước đi.\nSau đó ngước nhìn tôi, mỉm cười rạng rỡ."

# 【れいな】
# display as 玲奈
# JP: 「ウチ、れいなどえすー、\nよろしくどえすー」
2534 = "「Thiếp là, Reina doesuu,\nmong được chiếu cố doesuu」"

# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ。\nそういう感じだった気がしないこともないな」
2378 = "「Ừ, ừm.\nCũng có cảm giác giống như vậy nhỉ」"

# monologue
# JP: いかん、ちょっとこれは面白い。
3113 = "Không ổn rồi, trò này hơi bị thú vị đấy."

# monologue
# JP: が、これを他人に披露してしまった日には、\nれいながよほどのアホだと誤解されかねない。
3221 = "Nhưng nếu đem diễn trò này trước mặt người\nkhác,\nReina có thể bị hiểu lầm là một đứa ngốc\nnghếch hết thuốc chữa mất."

# 【双鉄】
# display as 雙鐵
# JP: 「ただ、舞妓言葉を舞妓以外が使うのは、危ういかもな。\n舞妓と誤解されてしまえば、京塗に連れて行かれかねん」
2313 = "「Chỉ là, người không phải Maiko mà dùng\nngôn ngữ Maiko thì hơi nguy hiểm đấy.\nNếu bị hiểu lầm là Maiko, có khi sẽ bị đưa\nđến Kyoto luôn đó」"

# 【れいな】
# display as 玲奈
# JP: 「はわわ！　れいな、御一夜鉄道の子だから、\nきょうとにいかないのです。どえす、言わないのです」
2463 = "「Oa oa! Reina là con của Đường sắt\nOhimitera,\nnên sẽ không đi Kyoto đâu. Sẽ không nói\ndoesu nữa đâu」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、それが一番だ」
2666 = "「Đúng vậy, thế là tốt nhất.」"

# monologue
# JP: 頭を撫でれば、ふにゃんと笑う。
3399 = "Được xoa đầu, cô bé mỉm cười rạng rỡ."

# monologue
# JP: そしてれいなは、帽子の形を整えながら、\n納得しきりな声を出す。
3592 = "Và rồi Reina vừa chỉnh lại hình dáng chiếc\nmũ,\nvừa thốt lên một giọng điệu đầy vẻ thấu\nhiểu."

# 【れいな】
# display as 玲奈
# JP: 「にぃに、さどう、どえすですからぁ――ひびきさんは、\nそうてつさんの、みどりのお茶がのみたいんですねぇ」
2651 = "「Anh hai, sadou, doesuu nên là——chị\nHibiki,\nchắc là muốn uống trà xanh của anh\nSoutetsu nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……かもしれんな」
2434 = "「À... chắc là vậy rồi」"

# monologue
# JP: あの日から、連日連夜の乗務訓練。\n初日以降は、ハチロクも加わってより密度もあがった。
3343 = "Kể từ ngày hôm đó, chúng tôi tiến hành\nhuấn luyện nghiệp vụ liên tục ngày đêm.\nTừ ngày thứ hai trở đi, có thêm sự tham\ngia của Hachiroku nên cường độ càng tăng\ncao."

# monologue
# JP: 僕でさえ、重なる疲労に体が悲鳴をあげかけている。\n日々姫においては、僕より数段苦しいはずだ。
3758 = "Ngay cả tôi cũng cảm thấy cơ thể như muốn\ngào thét vì mệt mỏi tích tụ.\nHibiki chắc chắn còn khổ sở hơn tôi gấp\nbội phần."

# 【れいな】
# display as 玲奈
# JP: 「あの？　そうてつさん？」
2853 = "「Dạ? Anh Soutetsu ơi?」"

# 【双鉄】
# display as 雙鐵
# JP: 「よし。\n久しぶりだが、点ててみるとするか」
2515 = "「Được rồi.\nLâu lắm rồi không pha, hôm nay thử pha một\nấm xem sao.」"

# monologue
# JP: 路子と一緒に、茶道も一応、習ってはいた。\n正式な茶席でもなし、亭主の真似事くらいはできよう。
3319 = "Tôi từng học qua trà đạo cùng với Michiko.\nDù không phải là buổi tiệc trà chính thức,\nnhưng tôi vẫn có thể đóng vai chủ nhà\nđược."

# monologue
# JP: それに……僕を加虐性性的倒錯者よばわりする日々姫の、\n心の荒みを癒やす茶ならば、やはり僕が点てるべきだろう。
3657 = "Hơn nữa... nếu là tách trà để xoa dịu tâm\nhồn đang rối bời của Hibiki,\nngười đã gọi tôi là kẻ bạo dâm biến thái,\nthì quả nhiên tôi nên là người pha."

# 【双鉄】
# display as 雙鐵
# JP: 「茶器はあるかな。\nそれに、できれば抹茶も欲しい」
2836 = "「Có trà cụ không nhỉ.\nVới lại, nếu được thì anh cũng muốn có cả\nmatcha nữa.」"

# 【れいな】
# display as 玲奈
# JP: 「みどりのお茶をいれるやつなら、\n給湯室のステンのたなの中ですよぉ」
2788 = "「Nếu là loại dùng để pha trà xanh,\nthì có ở trong tủ inox của phòng pha trà\nđó ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2756 = "「Anh biết rồi.」"

# monologue
# JP: 言われたとおりの棚を開けば、\nその中には……ああ、それらしき桐箱がある。
3391 = "Mở ngăn tủ đúng như lời chỉ dẫn,\nbên trong có... à, một chiếc hộp gỗ hòm có\nvẻ là đựng trà."

# 【双鉄】
# display as 雙鐵
# JP: 「[おうす,1]薄茶か。助かるな。\nれいなもいるし、その方がよかろう」
2708 = "「Trà nhạt sao. May quá.\nCó cả Reina ở đây, dùng loại này là hợp lý\nnhất.」"

# monologue
# JP: 湯を沸かし、適当な茶碗二つを選び、\n薄茶と湯とを淹れて茶筅で泡立てる。
3407 = "Đun sôi nước, chọn bừa hai cái chén trà,\ncho trà nhạt và nước sôi vào rồi dùng chổi\nchasen đánh bọt."

# monologue
# JP: （さっ、さっ、さっ、さっ）
3841 = "（Xoẹt, xoẹt, xoẹt, xoẹt）"

# monologue
# JP: 見苦しい泡は滑らかにして――\n略式もここに極まれりだが、ともかく、点った。
3317 = "Làm mịn lớp bọt khó coi——\ndù là làm cho có lệ nhưng tóm lại là cũng\npha xong rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「待たせたな」
2804 = "「Để mọi người đợi lâu rồi.」"

# monologue
# JP: 盆の上には、茶碗が二つ。\n茶菓子もないが、れいなは嬉しげに目を丸くする。
3395 = "Trên khay có hai chén trà.\nDù không có bánh trà, nhưng Reina vẫn vui\nvẻ tròn xoe mắt."

# 【れいな】
# display as 玲奈
# JP: 「わぁ！　お客さまのお茶ですぅ」
2393 = "「Oa! Trà dành cho khách kìa」"

# 【双鉄】
# display as 雙鐵
# JP: 「と――そうなのか？　勝手に点ててはまずかったか？」
2419 = "「Ừm——vậy sao? Anh tự tiện pha có sao\nkhông?」"

# 【れいな】
# display as 玲奈
# JP: 「まずくないですぅ。\nおいしいってみんないってますよぉ」
2703 = "「Không sao đâu ạ.\nMọi người đều khen ngon đó nha」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2667 = "「Vậy sao.」"

# monologue
# JP: にこにこと、笑うれいなに茶碗をひとつ。
3393 = "Tôi đưa một chén trà cho Reina đang cười\ntủm tỉm."

# 【れいな】
# display as 玲奈
# JP: 「わああ！？\nれいな、お茶をもらっていいんですかぁ？」
2391 = "「Oa aa!?\nReina, được uống trà sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。せっかくだ、口に合うようなら飲んでみてくれ」
2474 = "「Ừm. Hiếm khi có dịp, nếu hợp khẩu vị thì\nem cứ uống thử xem.」"

# 【れいな】
# display as 玲奈
# JP: 「でもでも、れいな。さどうの――お茶の道のこと、\nぜんぜんわかりませんよぉ？」
2312 = "「Nhưng mà nhưng mà, Reina. Về sadou——con\nđường của trà,\nhoàn toàn không biết gì đâu ạ?」"

# monologue
# JP: 飲みたげに、ちらちら茶碗を見てくれている。
3292 = "Cô bé cứ lén nhìn chén trà với vẻ thèm\nthuồng."

# monologue
# JP: その気持ちを汲まぬようなら、\nそれこそ道もへったくれもあるまい。
3312 = "Nếu không hiểu được tâm ý đó,\nthì còn gọi gì là đạo nữa chứ."

# 【双鉄】
# display as 雙鐵
# JP: 「畳ではなく、テーブルの上に出すお茶だ。\n畏まっても仕方ない。気軽に飲んでくれれば嬉しい」
2829 = "「Đây không phải là trà đặt trên chiếu\nTatami, mà là trà đặt trên bàn.\nKhông cần phải quá câu nệ đâu. Em cứ thoải\nmái uống là anh vui rồi.」"

# 【れいな】
# display as 玲奈
# JP: 「それなら、えんりょなくいただきますねぇ。\nれいな、おつき合いていどには飲めるのです」
2875 = "「Nếu vậy, Reina không khách sáo đâu nha.\nReina, cũng có thể uống được một chút để\ntiếp khách đó ạ」"

# monologue
# JP: 言って、こく、こく。\n両手で茶碗を抱えて少しずつ飲み下していく。
3297 = "Nói xong, cô bé ực, ực.\nHai tay bưng chén trà, từ từ uống từng\nngụm nhỏ."

# 【れいな】
# display as 玲奈
# JP: 「ぷはぁ、おいしかったです。軽油よりコクがあります。\nごちそうさまでしたぁ」
2386 = "「Phù, ngon quá ạ. Đậm đà hơn cả dầu diesel\nnữa.\nCảm ơn anh đã chiêu đãi ạ」"

# monologue
# JP: じっと見られる。\n返事を――せずにはいられなくなる。
3589 = "Bị nhìn chằm chằm.\nLàm tôi không thể không lên tiếng đáp lại."

# 【双鉄】
# display as 雙鐵
# JP: 「お粗末さまでした」
2630 = "「Mời em dùng.」"

# monologue
# JP: これではご飯だ。\nそう思いつつ、次客の日々姫の前へと進む。
3750 = "Thế này thì thành ra mời cơm mất rồi.\nVừa nghĩ vậy, tôi vừa tiến đến trước mặt\nvị khách tiếp theo là Hibiki."

# monologue
# JP: まだ突っ伏している日々姫は気配に軽く目をあげ――
3761 = "Hibiki vẫn đang nằm gục trên bàn, khẽ mở\nmắt khi nghe thấy tiếng động——"

# 【日々姫】
# display as 日日姬
# JP: 「！」
2914 = "「!」"

# monologue
# JP: ――たかと思えば、いきなりピン、と背筋を伸ばす。
1873 = "——Ngay sau đó, em ấy đột ngột ngồi thẳng\nlưng lên."

# 【双鉄】
# display as 雙鐵
# JP: 「……」
1932 = "「...」"

# monologue
# JP: 茶碗を出せば、すぐに一礼。\nそしてれいなへ軽く礼して、視線を茶碗の上へと注ぐ。
3428 = "Khi tôi đưa chén trà ra, em ấy liền cúi\nchào.\nSau đó khẽ cúi chào Reina, rồi dán mắt vào\nchén trà."

# 【日々姫】
# display as 日日姬
# JP: 「お点前、頂戴いたします」
2575 = "「Em xin phép nhận lấy chén trà này.」"

# monologue
# JP: 深く一礼。\n茶碗を取って左手に載せ、押しいただく。
3280 = "Cúi chào thật sâu.\nNhận lấy chén trà đặt lên tay trái, rồi\nnâng lên ngang trán."

# monologue
# JP: す、す、と回し茶碗の正面を自分から避け、\n静かに、唇を茶碗につける。
3722 = "Nhẹ nhàng xoay chén trà để tránh mặt chính\ndiện,\nrồi khẽ khàng đưa lên môi."

# 【れいな】
# display as 玲奈
# JP: 「ふぁぁ」
2389 = "「Oaaa」"

# 【日々姫】
# display as 日日姬
# JP: 「……」
# 1932 = "「……」" 

# monologue
# JP: 最後の一口は音を立て吸い、\n飲み口を指で清めて、その指をハンカチで軽く拭う。
3525 = "Ngụm cuối cùng em ấy cố tình tạo ra tiếng\nhút trà,\ndùng ngón tay lau sạch chỗ môi vừa chạm\nvào, rồi dùng khăn tay lau nhẹ ngón tay\nđó."

# monologue
# JP: 茶碗はテーブルの上に置かれて、\n日々姫はそれを丁寧に、上から、そして手に取り、眺める。
3591 = "Chén trà được đặt lên bàn,\nHibiki cẩn thận nâng nó lên từ phía trên,\ncầm lấy và ngắm nhìn."

# 【れいな】
# display as 玲奈
# JP: 「かぁっこいいですぅ！\nひびきさん、いつもとぜんぜん違いますぅ」
2517 = "「Ngầu quá đi ạ!\nChị Hibiki, khác hẳn mọi khi luôn đó nha」"

# 【日々姫】
# display as 日日姬
# JP: 「ええっ！？」
2400 = "「Hả!?」"

# monologue
# JP: れいなの声にずっこける。いつもの日々姫に安心したのか、\nれいながころころ笑い転げる。
3502 = "Giọng nói của Reina làm em ấy giật mình.\nCó lẽ vì thấy Hibiki vẫn như mọi khi,\nnên Reina ôm bụng cười lăn lộn."

# monologue
# JP: いやしかし……実際、今の日々姫は凛としていた。\n僕の習ったものとは違うが、整った所作で落ち着いていた。
3117 = "Không, nhưng mà... thực sự thì, Hibiki lúc\nnãy trông rất thanh tao.\nDù khác với những gì tôi từng học, nhưng\nphong thái rất chỉnh chu và điềm tĩnh."

# 【日々姫】
# display as 日日姬
# JP: 「こほん」
2388 = "「Khụ khụ」"

# monologue
# JP: 咳払いをし、姿勢をもう一度正し直して、僕へと一礼。
3278 = "Hắng giọng, chỉnh đốn lại tư thế một lần\nnữa, rồi cúi chào tôi."

# monologue
# JP: さきほどまでの怨嗟の声が空耳だったかと疑うほどに、\nその表情は和らいでいる。
3290 = "Biểu cảm của em ấy dịu dàng đến mức,\nlàm tôi nghi ngờ không biết những lời oán\ntrách lúc nãy có phải là ảo giác hay\nkhông."

# 【日々姫】
# display as 日日姬
# JP: 「兄さんのお心づかい、美味しく頂戴いたしました」
2410 = "「Em xin nhận tấm lòng của anh trai, trà\nrất ngon ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「あら、お茶ですか」
2395 = "「Ara, uống trà sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが点てたんですか？\n羨ましいです。わたしにも、いただけませんか？」
2686 = "「Là anh Soutetsu pha sao ạ?\nGhen tị quá đi. Có thể cho em một chén\nđược không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「とても本式には点てられぬが、それで良ければ」
2585 = "「Anh không thể pha đúng chuẩn được, nhưng\nnếu em không phiền thì.」"

# monologue
# JP: ポーレットは市長、公式行事なども数多あろうし、\nハチロクは、言うまでも無くハチロクだ。
3566 = "Paulette là Thị trưởng, chắc hẳn đã tham\ngia vô số sự kiện chính thức,\ncòn Hachiroku thì, khỏi phải nói cũng biết\nlà Hachiroku rồi."

# monologue
# JP: 予防線を張り、頷きを得て、\nならばとさくさく、茶を点てる。
3375 = "Tôi rào trước đón sau, nhận được cái gật\nđầu đồng ý,\nthế là tôi thoăn thoắt pha trà."

# 【ハチロク】
# display as 八六
# JP: 「……双鉄様らしいお茶ですね。\n大変おいしゅうございます」
1950 = "「...Một tách trà mang đậm phong cách của\nngài Soutetsu nhỉ.\nRất là ngon ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「……落ち着くお茶をいただきました。\nおいしかったです。ありがとうございます」
1952 = "「...Em đã được thưởng thức một tách trà\ngiúp tĩnh tâm.\nRất ngon ạ. Cảm ơn anh.」"

# monologue
# JP: （うむ？）
3840 = "（Hửm?）"

# monologue
# JP: 正客のハチロクと、次客のポーレット。\n口にした言葉こそ違えども、所作が驚くほど似通っていた。
3543 = "Chính khách Hachiroku và thứ khách\nPaulette.\nDù lời nói thốt ra có khác nhau, nhưng\nphong thái lại giống nhau đến kinh ngạc."

# monologue
# JP: （同じ流派か？\n上品だが、一風変わった所作であるように思えたが……）
3877 = "（Cùng một lưu phái sao?\nTuy thanh tao, nhưng lại có cảm giác hơi\nkhác thường...）"

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、大事なお話の前に、\n唇をなめらかにしてもらえちゃいました」
2382 = "「Fufufu, trước khi bàn chuyện quan trọng,\nmôi em đã được làm mềm rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2479 = "「嗯」" 

# monologue
# JP: 本題らしい。
3148 = "Có vẻ như sắp vào chủ đề chính rồi."

# monologue
# JP: 余計な考えを振り払い、\n顔と意識をポーレットへと正対させる。
3397 = "Tôi gạt bỏ những suy nghĩ thừa thãi,\nhướng ánh mắt và tâm trí về phía Paulette."

# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんから、乗務訓練の評価シートをいただいて、\n報告を受けた上でお話し合いをしたんですけど」
2601 = "「Em đã nhận được phiếu đánh giá huấn luyện\nnghiệp vụ từ Hachiroku,\nvà sau khi nghe báo cáo, chúng ta đã có\nmột cuộc thảo luận.」"

# monologue
# JP: ポーレットの言葉を受けて、\nハチロクが小さな笑みを浮かべる。
3663 = "Nghe Paulette nói,\nHachiroku khẽ mỉm cười."

# 【ハチロク】
# display as 八六
# JP: 「日々姫は、この短期間に大きくスキルを伸ばしています。\n\x%l機関助士;#00ffc040;機関助士%l;#;とし、乗務につける域に到達したと判断します」
2649 = "「Hibiki đã có sự tiến bộ vượt bậc về kỹ\nnăng trong khoảng thời gian ngắn này.\nTôi đánh giá rằng cô ấy đã đạt đến trình\nđộ có thể đảm nhận vai trò \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; và\ntham gia vào đội ngũ vận hành.」"

# 【日々姫】
# display as 日日姬
# JP: 「乗務につける？」
2838 = "「Tham gia đội ngũ vận hành?」"

# monologue
# JP: 鬼教官の優しいことばに、\nけれども日々姫は困惑顔しか浮かべられない。
3790 = "Trước những lời nói dịu dàng của vị huấn\nluyện viên ác quỷ,\nHibiki chỉ biết lộ ra vẻ mặt bối rối."

# 【日々姫】
# display as 日日姬
# JP: 「そんなん、訓練三日目から乗務させられて、\n石炭ばガンガン投げ込んどるばい」
2802 = "「Nói gì thì nói, từ ngày thứ ba huấn luyện\nđã bắt em phải thực hành rồi,\nem cứ thế mà xúc than ném vào ầm ầm đấy\nchứ.」"

# 【ハチロク】
# display as 八六
# JP: 「訓練としてですよね？　それは」
2854 = "「Đó là huấn luyện mà, đúng không?」"

# 【日々姫】
# display as 日日姬
# JP: 「だから、乗務訓練――えっ？　ええっ！？」
2619 = "「Thì đó, huấn luyện nghiệp vụ——hả? Hảả!?」"

# monologue
# JP: 驚いた目がハチロクを見て、僕へ向く。
3285 = "Đôi mắt ngạc nhiên nhìn Hachiroku, rồi\nhướng về phía tôi."

# monologue
# JP: 誤解、ということも最早あるまい。\nハチロクのうなずきを受け、僕から日々姫に保証を与える。
3686 = "Có lẽ không còn sự hiểu lầm nào nữa.\nNhận được cái gật đầu của Hachiroku, tôi\nđưa ra lời đảm bảo với Hibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「訓練のつかぬ“乗務”。\nつまりは、営業運転のことだろう」
2912 = "「Không phải huấn luyện mà là \"nghiệp vụ\".\nTức là, chạy tàu thương mại đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「え？　だって――営業運転って――だって、にぃにっ！\nんんっ――ですけど、兄さん」
2402 = "「Hả? Nhưng mà——chạy tàu thương mại\nthì——nhưng mà, anh hai!\nƯm——nhưng mà, anh trai.」"

# monologue
# JP: 頬を興奮に染めたまま、\n日々姫はなんとか落ち着こうとする。
3508 = "Với đôi gò má ửng hồng vì phấn khích,\nHibiki cố gắng bình tĩnh lại."

# 【日々姫】
# display as 日日姬
# JP: 「その評価は凄く嬉しいんですけど――でも、\n営業運転って……まだいろいろ不足してませんか？」
2903 = "「Em rất vui khi nhận được đánh giá\nđó——nhưng mà,\nchạy tàu thương mại thì... chẳng phải vẫn\ncòn thiếu sót nhiều thứ sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;の再整備は完了した。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、\x%l機関士;#00ffc040;機関士%l;#;、\x%l機関助士;#00ffc040;機関助士%l;#;は揃った」
1897 = "「Việc đại tu \\x%l8620;#00ffc040;8620%l;#; đã hoàn tất.\n\\x%lレイルロオド;#00ffc040;Railord%l;#;, \\x%l機関士;#00ffc040;người lái tàu%l;#;, \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; đều đã\ntập hợp đủ.」"

# monologue
# JP: 日々姫の言葉を受けて数えていけば、\nハチロクも声を重ねてくる。
3431 = "Tiếp nối lời nói của Hibiki,\nHachiroku cũng lên tiếng đồng tình."

# 【ハチロク】
# display as 八六
# JP: 「二駅間往復のみの路線ですから、\x%l車掌;#00ffc040;車掌%l;#;不在でも……\n望ましくはありませんが、当面の問題はございません」
2501 = "「Vì đây là tuyến đường chỉ chạy khứ hồi\ngiữa hai ga, nên dù không có \\x%l車掌;#00ffc040;trưởng tàu%l;#;...\ntuy không được mong đợi lắm, nhưng trước\nmắt thì không có vấn đề gì ạ.」"

# 【れいな】
# display as 玲奈
# JP: 「\x%l保線;#00ffc040;保線%l;#;の方もばっちりですよぉ！\nぼらんてぃあさん、たくさんがんばってくれましたぁ」
1903 = "「Bên \\x%l保線;#00ffc040;bảo trì đường ray%l;#; cũng hoàn hảo rồi\nnha!\nCác tình nguyện viên đã cố gắng rất nhiều\nđó ạ」"

# 【日々姫】
# display as 日日姬
# JP: 「なら……ええと、他の不足、は――\nあっ！　そう、だって、営業運転っていうなら！」
2884 = "「Vậy thì... ừm, những thiếu sót khác, là——\nA! Đúng rồi, vì là chạy tàu thương mại\nmà!」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。\nそれが今日、みなさんに集まってもらった理由です」
2683 = "「Vâng.\nĐó chính là lý do hôm nay em tập hợp mọi\nngười lại.」"

# monologue
# JP: ポーレットの声に、一同そろって深く頷く。
3269 = "Trước giọng nói của Paulette, tất cả đều\nđồng loạt gật đầu sâu."

# monologue
# JP: 機関車、乗員、線路がひとまず揃っても、\nまだあまりに大きな欠けがあるのは、明白だから。
3785 = "Bởi vì ai cũng hiểu rõ, dù đầu máy, nhân\nviên và đường ray đã tạm đủ,\nnhưng vẫn còn một thiếu sót quá lớn."

# 【ポーレット】
# display as 波萊特
# JP: 「営業運転を開始するには、\n\x%l客車;#00ffc040;客車%l;#;が、どうしても必要になります」
2581 = "「Để bắt đầu chạy tàu thương mại,\nchúng ta nhất định phải có \\x%l客車;#00ffc040;toa hành khách%l;#;\n.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lキハ07;#00ffc040;キハ07%l;#;を\x%l客車;#00ffc040;客車%l;#;代わりにはできんのか？」
2775 = "「Không thể dùng \\x%lキハ07;#00ffc040;KiHa 07%l;#; thay cho \\x%l客車;#00ffc040;toa hành khách%l;#;\nđược sao?」"

# monologue
# JP: もっともシンプルな解決法を提案してみる。\nが、ポーレットはもうしわけなさそうに首を振る。
3420 = "Tôi thử đề xuất một giải pháp đơn giản\nnhất.\nNhưng Paulette lắc đầu vẻ áy náy."

# 【ポーレット】
# display as 波萊特
# JP: 「足回り不安があるコですから、\n今以上に負荷を増やすのは」
2880 = "「Chiếc xe đó có bộ phận chuyển động không\nđược ổn định,\nnên không thể tăng thêm tải trọng cho nó\nđược nữa đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。それはそうだな」
2452 = "「À, ra vậy. Cũng đúng nhỉ.」"

# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;の足回りがもし破損してしまえば、\n\x%l8620;#00ffc040;8620%l;#;、\x%lキハ07;#00ffc040;キハ07%l;#;、ともに営業運転不能になってしまう。
85 = "Nếu bộ phận chuyển động của \\x%lキハ07;#00ffc040;KiHa 07%l;#; bị\nhỏng,\nthì cả \\x%l8620;#00ffc040;8620%l;#; và \\x%lキハ07;#00ffc040;KiHa 07%l;#; đều sẽ không thể\nchạy tàu thương mại được nữa."

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の\x%l客車;#00ffc040;客車%l;#;を手配するということは、即ち、\n\x%lキハ07;#00ffc040;キハ07%l;#;にとっての予備\x%l編成;#00ffc040;編成%l;#;を確保するということにもなる。
3648 = "Việc chuẩn bị \\x%l客車;#00ffc040;toa hành khách%l;#; cho \\x%l8620;#00ffc040;8620%l;#;,\nđồng nghĩa với việc,\nđảm bảo một \\x%l編成;#00ffc040;đoàn tàu%l;#; dự phòng cho \\x%lキハ07;#00ffc040;KiHa 07%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、どこからか手配するしかないか。\nポーレットの方で、アテはないのか？」
2885 = "「Nếu vậy, chỉ còn cách tìm mua từ nơi khác\nthôi.\nPaulette có manh mối nào không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「交流のある\x%lまいてつ;#00ffc040;まいてつ%l;#;の人たち、\n何人かには聞いたんですけど……」
2591 = "「Em cũng đã hỏi thăm vài người \\x%lまいてつ;#00ffc040;chủ tàu%l;#;\nquen biết\nrồi...」"

# monologue
# JP: \x%lまいてつ;#00ffc040;まいてつ%l;#;が所有するのは、その殆どが、\n客室と運転室とが一体となっている\x%l気動車;#00ffc040;気動車%l;#;らしい。
81 = "Hầu hết những chiếc xe mà các \\x%lまいてつ;#00ffc040;chủ tàu%l;#; sở\nhữu,\ncó vẻ đều là loại \\x%l気動車;#00ffc040;toa xe tự hành%l;#; tích hợp\nkhoang hành khách và buồng lái."

# monologue
# JP: そして機関車を所有するような\x%lまいてつ;#00ffc040;まいてつ%l;#;は、\n無論、自分の機関車のための\x%l客車;#00ffc040;客車%l;#;を手放しはしない。
3443 = "Và tất nhiên, những \\x%lまいてつ;#00ffc040;chủ tàu%l;#; sở hữu đầu máy\nxe lửa,\nsẽ không đời nào nhượng lại \\x%l客車;#00ffc040;toa hành khách%l;#;\ndành riêng cho đầu máy của họ."

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば……そうなるか。\nなら、\x%l客車;#00ffc040;客車%l;#;の手配は困難なのだな？」
2323 = "「Nghe em nói vậy thì... đúng là thế thật.\nVậy việc tìm mua \\x%l客車;#00ffc040;toa hành khách%l;#; đang gặp\nkhó khăn sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。だから、\nその辺のこと、相談したいな、って思いまして」
2677 = "「Vâng. Vì vậy,\nem muốn thảo luận với mọi người về vấn đề\nnày.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
2426 = "「Hừm」"

# monologue
# JP: 僕と日々姫は、所詮は鉄道素人だ。\nポーレットが頼れないなら、ハチロクを頼る他にない。
3381 = "Tôi và Hibiki, suy cho cùng cũng chỉ là\ndân nghiệp dư về đường sắt.\nNếu Paulette không thể dựa dẫm được, thì\nchỉ còn cách nhờ cậy Hachiroku thôi."

# monologue
# JP: が、ハチロクもまた、困った顔を浮かべるばかりだ。
3152 = "Nhưng Hachiroku cũng chỉ biết trưng ra vẻ\nmặt khó xử."

# 【ハチロク】
# display as 八六
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;末期には、機関車を失った\x%l客車;#00ffc040;客車%l;#;など、\nごろごろ転がっておりましたのに――」
2505 = "「Vào cuối thời kỳ \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;,\nnhững \\x%l客車;#00ffc040;toa hành khách%l;#; mất đi đầu máy,\nđã nằm lăn lóc khắp nơi vậy mà——」"

# 【ポーレット】
# display as 波萊特
# JP: 「ここでも同じだったって聞いてます。\nでも、スクラップ業者さんに買い取られていったって」
2609 = "「Em nghe nói ở đây cũng từng như vậy.\nNhưng chúng đã bị các cơ sở thu mua phế\nliệu mua lại hết rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ」
2298 = "「Gì chứ」"

# monologue
# JP: やはり話は聞くべきだ。\n当たり外れはわからんが、糸口がひとつ、見つかった。
3531 = "Quả nhiên vẫn nên hỏi thăm xem sao.\nDù chưa biết kết quả thế nào, nhưng ít ra\ncũng tìm được một manh mối."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、スクラップ業者を片っ端からあたってみよう。\n使えそうなものが、一両くらいは残っているかもしれん」
2866 = "「Nếu vậy, hãy thử liên hệ với tất cả các\ncơ sở thu mua phế liệu xem sao.\nBiết đâu vẫn còn sót lại một toa xe nào đó\ncó thể dùng được.」"

# monologue
# JP: 鉄道関係のツテもなく、\x%l客車;#00ffc040;客車%l;#;に関する知識もない。
3400 = "Không có mối quan hệ nào trong ngành đường\nsắt, cũng chẳng có kiến thức gì về \\x%l客車;#00ffc040;toa hành khách%l;#;\n."

# monologue
# JP: が――これならば僕にも、間違いなく出来ることだ。\nなのにポーレットは、困ったような顔になる。
3150 = "Nhưng——nếu là việc này thì tôi chắc chắn\ncó thể làm được.\nThế mà Paulette lại lộ vẻ mặt khó xử."

# 【ポーレット】
# display as 波萊特
# JP: 「けど……スクラップ業者さんに引き取られたのなんて、\nもうずうっと前のことですから」
2309 = "「Nhưng mà... việc chúng bị các cơ sở thu\nmua phế liệu thu gom,\nđã là chuyện từ rất lâu rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;とて、その時期に事故車両として引き取られ、\nそのまま放置されていたが、見事に復活した」
1895 = "「\\x%l8620;#00ffc040;8620%l;#; cũng từng bị thu hồi như một phương\ntiện tai nạn trong thời kỳ đó,\nvà bị bỏ xó cho đến tận bây giờ, nhưng nó\nđã hồi sinh một cách ngoạn mục đấy thôi.」"

# monologue
# JP: 僕ら全員が知っている事実を、ただ口にする。
3421 = "Tôi chỉ đơn giản nói ra sự thật mà tất cả\nchúng tôi đều biết."

# 【双鉄】
# display as 雙鐵
# JP: 「同じように放置され、修復可能な\x%l客車;#00ffc040;客車%l;#;があるかもしれぬ。\nあたってみても、損ということはあるまいよ」
2876 = "「Có thể vẫn còn những \\x%l客車;#00ffc040;toa hành khách%l;#; bị bỏ\nxó tương tự và có thể sửa chữa được.\nThử tìm kiếm cũng chẳng mất mát gì đâu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ……そう、ですよね。\nわたし、やる前から諦めるみたいなこと言って」
2436 = "「À... đúng, đúng vậy nhỉ.\nEm chưa gì đã nói những lời như bỏ cuộc\nrồi.」"

# monologue
# JP: ぽかりと、芝居がかった仕草で、\nポーレットは自分の頭を叩く。
3562 = "Paulette tự gõ nhẹ vào đầu mình,\nvới một điệu bộ hơi kịch cỡm."

# 【ポーレット】
# display as 波萊特
# JP: 「こっちも、もう一回あたりなおしてみます。\n知り合いだけじゃなく、紹介とかもお願いしてみて」
2588 = "「Bên em cũng sẽ thử tìm kiếm lại một lần\nnữa.\nKhông chỉ hỏi người quen, mà em sẽ nhờ họ\ngiới thiệu thêm các mối quan hệ khác nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、それは心強い」
2493 = "「Ừm, thế thì yên tâm rồi.」"

# monologue
# JP: さきほどまでの頼りなげなものから一転、\nポーレットの目が燃えている。
3188 = "Khác hẳn với vẻ yếu đuối lúc nãy,\nánh mắt Paulette giờ đây đang rực cháy."

# monologue
# JP: 瞳の強さが、肌の白さを際立てるようで、\n凄みに近いものさえ感じる。
3287 = "Sự mạnh mẽ trong đôi mắt ấy dường như càng\nlàm nổi bật làn da trắng ngần của em ấy,\nthậm chí còn toát lên một chút uy nghiêm."

# 【れいな】
# display as 玲奈
# JP: 「れいなも、ポーレットをおてつだいしますぅ」
2721 = "「Reina cũng sẽ giúp Paulette một tay nha」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしも、ポーレット様をお手伝いしましょう。\nもしかして、旧知の名などに行き当たるかもしれません」
2587 = "「Tôi cũng sẽ giúp cô Paulette một tay.\nBiết đâu tôi lại tình cờ gặp lại một cái\ntên quen thuộc nào đó.」"

# 【日々姫】
# display as 日日姬
# JP: 「ほんなら、私はにぃにの――こほんっ――\n私は、兄さんのお手伝いをさせていただきますね」
2869 = "「Vậy thì, em sẽ giúp anh hai——khụ khụ——\nEm sẽ giúp anh trai một tay nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ならば、あとはやるだけだな」
2478 = "「Ừm. Vậy thì, phần còn lại chỉ là hành\nđộng thôi.」"

# monologue
# JP: みなが頷く。\n動き始める。
3628 = "Mọi người đều gật đầu.\nBắt đầu hành động."

# monologue
# JP: 悩んで止まるくらいなら、動いてダメならやり直す。\nただそれを、結果がでるまで繰り返せばいい。
3668 = "Thay vì dừng lại để suy nghĩ, hãy hành\nđộng, nếu thất bại thì làm lại.\nChỉ cần lặp lại điều đó cho đến khi có kết\nquả là được."

# monologue
# JP: （スクラップ業者に電話をかけて総ハズレでも、\n命を取られるわけではないのだ――）
3830 = "（Dù có gọi cho tất cả các cơ sở thu mua\nphế liệu mà không có kết quả,\nthì cũng chẳng mất mạng đâu mà——）"

# 【日々姫】
# display as 日日姬
# JP: 「兄さん、お待たせしました。電話帳です」
2414 = "「Anh trai, để anh đợi lâu rồi. Danh bạ\nđiện thoại đây ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2479 = "「嗯」" 

# monologue
# JP: まずはあ行、“青木エコワークス”。\n電話をかければ、３コールもせず出てくれる。
3798 = "Đầu tiên là vần A, \"Aoki ECO WORKS\".\nGọi điện thoại, chưa đến 3 hồi chuông đã\ncó người bắt máy."

# 【双鉄】
# display as 雙鐵
# JP: 「お忙しいところすみません。こちら、\n御一夜市の御一夜鉄道株式会社のものですが――」
2626 = "「Xin lỗi đã làm phiền lúc anh đang bận\nrộn. Đây là\nCông ty Đường sắt Ohimitera của thành phố\nOhimitera——」"

# monologue
# JP: ……いささか、疲れた。精神的にも、肉体的にも。\n電話が全て空振ったあとの乗務訓練。
1884 = "...Có chút mệt mỏi. Cả về tinh thần lẫn\nthể xác.\nHuấn luyện nghiệp vụ ngay sau khi gọi điện\nthoại mà không thu được kết quả gì."

# monologue
# JP: 日程的には予定通りの訓練ゆえ、\nハチロクに無論、手加減などない。
3253 = "Vì đây là buổi huấn luyện theo đúng lịch\ntrình,\nnên tất nhiên Hachiroku sẽ không nương\ntay."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし……このままでは風邪をひく」
2308 = "「Nhưng mà... cứ thế này thì cảm lạnh mất.」"

# monologue
# JP: 畳の上に突っ伏していた体を、\n半ば無理やり引きずり起こす。
3385 = "Tôi nửa miễn cưỡng kéo cơ thể đang nằm gục\ntrên chiếu Tatami dậy."

# monologue
# JP: だるいというか、ゆだる感じだ。\n肉の疲労が熱となり、冷めることなく居残っている。
3669 = "Cảm giác không phải là uể oải, mà là rã\nrời.\nSự mệt mỏi của cơ bắp hóa thành nhiệt\nlượng, đọng lại mà không hề hạ nhiệt."

# 【双鉄】
# display as 雙鐵
# JP: 「僕で、これだ」
2837 = "「Ngay cả mình mà cũng thế này」"

# monologue
# JP: 今朝の段階であれだけ怨嗟の声をあげていた\n日々姫のことが気にかかる。
3388 = "Tôi thấy lo lắng cho Hibiki,\nngười đã buông lời oán trách không ngớt\nvào sáng nay."

# monologue
# JP: 体は確かに鈍く重いが、\n様子のひとつも見ねばどうにも、安心できん。
3636 = "Cơ thể quả thực nặng nề và chậm chạp,\nnhưng nếu không nhìn xem tình hình em ấy\nthế nào thì không thể an tâm được."

# 【日々姫】
# display as 日日姬
# JP: 「兄さん、まだ起きてらっしゃいますか？」
2413 = "「Anh trai, anh còn thức không ạ?」"

# monologue
# JP: ふすまの向こうから日々姫の声。\n普段通りだ――特段、疲れた感じも受けない。
3437 = "Giọng nói của Hibiki vang lên từ bên kia\ntấm cửa kéo.\nVẫn như mọi khi——không có vẻ gì là đặc\nbiệt mệt mỏi."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、入ってくれ。\nちょうど日々姫のことを考えていた」
2492 = "「Ừ, em vào đi.\nAnh cũng vừa đang nghĩ đến Hibiki đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「わっ、わたっ！？　わた、私のことっ！？」
2612 = "「Oái, oái!? Nghĩ, nghĩ đến em á!?」"

# monologue
# JP: 声のとおりにわたわたと、\n日々姫が部屋に飛び込んでくる。
3503 = "Đúng như giọng nói luống cuống,\nHibiki vội vã lao vào phòng."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、少し心配していたのだ」
2490 = "「Ừ, anh hơi lo lắng một chút.」"

# 【日々姫】
# display as 日日姬
# JP: 「心配って――何をですか？」
2632 = "「Lo lắng——chuyện gì ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「疲労と……ある種、ストレスか？\n今朝方、僕をサドだドエスだと罵っていただろう」
2737 = "「Sự mệt mỏi và... có thể gọi là căng thẳng\nchăng?\nSáng nay em đã mắng anh là sadou, doesu\ncác kiểu mà.」"

# 【日々姫】
# display as 日日姬
# JP: 「あら、兄さんにはあれが罵りに聞こえましたか？」
2396 = "「Ơ kìa, anh trai nghe mấy lời đó giống như\nđang mắng mỏ sao ạ?」"

# monologue
# JP: くすくすと、さも愉快そうに日々姫が笑う。\nしかし僕には、なにが愉快かわからない。
3504 = "Hibiki cười khúc khích, có vẻ rất vui vẻ.\nNhưng tôi thì chẳng hiểu có gì đáng vui."

# 【双鉄】
# display as 雙鐵
# JP: 「罵りでなければなんなのだ？」
2786 = "「Không phải mắng mỏ thì là gì?」"

# 【日々姫】
# display as 日日姬
# JP: 「甘えですよ、甘え。\n妹が兄さんに甘えただけの話です」
2669 = "「Là làm nũng đó, làm nũng.\nChỉ là em gái làm nũng anh trai thôi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2417 = "「À」"

# monologue
# JP: なるほど、言われれば合点がいく。
3191 = "Ra vậy, nghe em ấy nói thế thì cũng hợp\nlý."

# monologue
# JP: 路子もかまって欲しいとき、\n“そーちゃんのバーカ”などと言ったりしたものだった。
3720 = "Michiko lúc muốn được quan tâm,\ncũng từng nói những câu như \"Sou-chan ngốc\nnghếch\"."

# 【日々姫】
# display as 日日姬
# JP: 「てっきり、兄さんその辺のことわかってくれたのかと。\nお茶とか、点ててくれたじゃないですか」
2611 = "「Em cứ tưởng anh trai hiểu chuyện đó rồi\nchứ.\nAnh còn pha trà cho em uống nữa mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あれは、まぁ……なんだ？　偶然の産物だ」
2850 = "「Chuyện đó thì, ừm... sao nhỉ? Chỉ là sản\nphẩm của sự tình cờ thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「偶然の？」
2332 = "「Sự tình cờ ạ?」"

# monologue
# JP: れいなとのやりとりを伝えてやれば、\n日々姫はけらけら笑い出す。
3424 = "Kể lại cuộc trò chuyện với Reina,\nHibiki liền cười phá lên."

# 【日々姫】
# display as 日日姬
# JP: 「やだ、私も聞きたかったと！\nれいなちゃんの『れいなどえす～』」
2399 = "「Trời ơi, em cũng muốn nghe quá đi mất!\nCâu 『Reina doesuu~』 của bé Reina ấy」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは良かったが、その後の口止めに苦心した。\nれいなの前では、おかしな言葉を使わぬ方がよい」
2733 = "「Thì cũng vui đấy, nhưng sau đó anh phải\nvất vả lắm mới bắt em ấy giữ im lặng được.\nTrước mặt Reina, tốt nhất là không nên\ndùng những từ ngữ kỳ lạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、そうですね。\nそこは、反省しなくちゃですね」
2451 = "「A, đúng vậy nhỉ.\nĐiểm này em phải kiểm điểm lại mới được.」"

# monologue
# JP: 笑いが一転、神妙な顔。
3288 = "Nụ cười vụt tắt, thay vào đó là vẻ mặt\nngoan ngoãn."

# monologue
# JP: なぜだか僕が申し訳ないような気にさせられて、\n空気をどうにか動かしたくなる。
3757 = "Không hiểu sao tôi lại có cảm giác như\nmình có lỗi,\nmuốn làm gì đó để thay đổi bầu không khí\nnày."

# 【双鉄】
# display as 雙鐵
# JP: 「それで、どうした？\n何か、用事で来たのではないのか？」
2716 = "「Vậy, có chuyện gì sao?\nEm đến tìm anh vì có việc gì đúng không?」"

# 【日々姫】
# display as 日日姬
# JP: 「用事がなくちゃ来ちゃダメみたいな言い方～～っ」
2322 = "「Anh nói cứ như thể không có việc gì thì\nkhông được đến tìm anh vậy á~~」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そういうわけではない」
2271 = "「Không, ý anh không phải vậy.」"

# monologue
# JP: 今度はふくれさせてしまった。
3754 = "Lần này lại làm em ấy phồng má giận dỗi\nrồi."

# monologue
# JP: いやはや、日々姫の扱いと来たら、\n\x%l投炭;#00ffc040;投炭%l;#;なみに難しい。
3244 = "Chà chà, đối phó với Hibiki,\nkhó nhằn chẳng kém gì \\x%l投炭;#00ffc040;xúc than%l;#; vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「用事がなくても、無論、いつでも来て構わん。\nここは、右田の家なのだからな」
2551 = "「Không có việc gì thì đương nhiên lúc nào\nem đến cũng được.\nVì đây là nhà Migita mà.」"

# monologue
# JP: 言った瞬間、日々姫は弱々しい笑顔を浮かべる。
3378 = "Ngay khoảnh khắc tôi vừa dứt lời, Hibiki\nnở một nụ cười yếu ớt."

# monologue
# JP: いや、違う。\nこんな表情をさせるつもりは全く無かった。
3119 = "Không, không phải.\nTôi hoàn toàn không có ý định khiến em ấy\nlộ ra biểu cảm như vậy."

# 【日々姫】
# display as 日日姬
# JP: 「兄さん。同じ意味なら、言い方を変えてくれませんか？\n“右田の家”じゃなくて、“僕らの家”に」
2407 = "「Anh trai. Cùng một ý nghĩa, anh có thể\nđổi cách nói khác được không?\nKhông phải là \"nhà Migita\", mà là \"nhà của\nchúng ta\".」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が望むならそうしよう。\n『ここは僕らの家だ。いつ部屋に来てくれても構わん』」
2520 = "「Nếu Hibiki muốn thì cứ làm vậy đi.\n『Đây là nhà của chúng ta. Em đến phòng anh\nlúc nào cũng được』」"

# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん！　\nそれなら私、そうしちゃいますね」
2486 = "「Vâng, thưa anh! \nVậy thì em sẽ làm thế nhé.」"

# monologue
# JP: ようやく、日々姫らしい笑顔。
3501 = "Cuối cùng cũng thấy lại nụ cười mang đậm\nchất Hibiki."

# monologue
# JP: 見た瞬間にホっとして、\nホっとした自分にギョっとする。
3621 = "Khoảnh khắc nhìn thấy nó, tôi thở phào nhẹ\nnhõm,\nrồi lại giật mình với chính sự nhẹ nhõm\ncủa bản thân."

# monologue
# JP: （なんだ、僕は――何が、どうした）
3852 = "（Gì thế này, mình——chuyện gì đang xảy ra\nvậy）"

# monologue
# JP: 人の顔色で自分が左右されるなど、\n無意味を通り越し、愚かしくさえある。
3667 = "Việc bản thân bị chi phối bởi sắc mặt của\nngười khác,\nkhông chỉ vô nghĩa, mà còn có phần ngu\nngốc."

# monologue
# JP: そうと信じて、正しいと思うことのみ、\n周りを気にせず試行し続けて来たつもりなのだが――
3384 = "Tôi luôn tin tưởng vào điều đó, và chỉ làm\nnhững gì mình cho là đúng,\nkhông bận tâm đến xung quanh mà cứ thế thử\nnghiệm——"

# 【日々姫】
# display as 日日姬
# JP: 「ところで、ハチロクはどうしたんです？」
2800 = "「Mà này, Hachiroku đâu rồi ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、真闇姉のところだ」
2447 = "「Mà này, Hachiroku đâu rồi ạ?」"

# monologue
# JP: 日々姫の声に、またホっとする。
3662 = "Giọng nói của Hibiki lại khiến tôi thở\nphào một lần nữa."

# monologue
# JP: が、理由を思えばどうどうめぐりだ。\n意識せぬよう、とにかく言葉を続けてしまう。
3220 = "Nhưng nếu cứ nghĩ về lý do thì sẽ lại luẩn\nquẩn mất.\nĐể không phải bận tâm đến nó, tôi đành\ntiếp tục câu chuyện."

# 【双鉄】
# display as 雙鐵
# JP: 「経営面で、よりいろいろと学びたいらしくてな。\n毎日遅くまで習い、そのまま戻らぬことさえある」
2773 = "「À, cô ấy đang ở chỗ chị Mayami.」"

# 【日々姫】
# display as 日日姬
# JP: 「戻らんって……\nねぇねぇの部屋にお泊りしとーと？」
2634 = "「Có vẻ như cô ấy muốn học hỏi thêm nhiều\nđiều về mặt kinh doanh.\nNgày nào cũng học đến khuya, thậm chí có\nkhi không về luôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\n朝方、\x%l醸造蔵;#00ffc040;醸造蔵%l;#;に一緒にくることが最近あるだろう？」
2471 = "「Không về á...\nVậy là ngủ lại phòng chị Mayami luôn sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「ああ、あれって、そういう――」
2445 = "「Ừm.\nDạo này buổi sáng hai người họ hay cùng\nnhau đến \\x%l醸造蔵;#00ffc040;nhà xưởng ủ rượu%l;#; đúng không?」"

# monologue
# JP: 言って、日々姫がぴたりと止まる。
3494 = "Đang nói dở, Hibiki bỗng dừng bặt."

# monologue
# JP: 部屋をぐるりと見渡して、それから僕を見、\n慌てたように視線を逸らす。
3283 = "Em ấy đảo mắt nhìn quanh phòng, rồi nhìn\ntôi,\nsau đó vội vàng quay đi như đang bối rối."

# 【日々姫】
# display as 日日姬
# JP: 「これって……そういう？」
2783 = "「Chuyện này... là kiểu như vậy sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「これとは何で、それとは何だ？」
1929 = "「Chuyện này là chuyện gì, mà kiểu như vậy\nlà kiểu như thế nào?」"

# 【日々姫】
# display as 日日姬
# JP: 「ううん、にぃにっ！　なんでんなかっ！」
2251 = "「Không, không có gì đâu anh hai! Không có\ngì hết á!」"

# monologue
# JP: そう言いながら、小さなガッツポーズを一つ。
3305 = "Vừa nói, em ấy vừa làm một động tác cổ vũ\nnhỏ."

# monologue
# JP: そして日々姫は赤らんだ頬で咳払い。\n姿勢を正し深呼吸して、再び僕へと向き直る。
3588 = "Rồi Hibiki hắng giọng với đôi gò má ửng\nđỏ.\nChỉnh đốn lại tư thế, hít một hơi thật\nsâu, rồi lại quay mặt về phía tôi."

# 【日々姫】
# display as 日日姬
# JP: 「ええと……兄さん。だけどですね。\n今日のところは、私、用事があって来たんです」
2465 = "「Ừm... anh trai. Nhưng mà nhé.\nHôm nay, em đến đây là có việc.」"

# monologue
# JP: なにが、“だけど”かわからない。\nわからないまま、頷けば、日々姫の声は勢いを増す。
3370 = "Tôi không hiểu \"nhưng mà\" là có ý gì.\nDù không hiểu, nhưng khi tôi gật đầu,\ngiọng nói của Hibiki càng thêm mạnh mẽ."

# 【日々姫】
# display as 日日姬
# JP: 「\x%l客車;#00ffc040;客車%l;#;のこと、結局、全然ダメだったじゃないですか」
1910 = "「Chuyện \\x%l客車;#00ffc040;toa hành khách%l;#; ấy, rốt cuộc là\nhoàn toàn không\ncó tiến triển gì đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに。少なくとも僕らの方は、\n空振り続きで結果を出せなかった」
2761 = "「Đúng vậy. Ít nhất là phía chúng ta,\nđã liên tục thất bại và không mang lại kết\nquả gì.」"

# monologue
# JP: 言えば日々姫は、戸惑ったような顔になる。
3664 = "Nghe tôi nói vậy, Hibiki lộ vẻ bối rối."

# 【日々姫】
# display as 日日姬
# JP: 「“僕らの方は”って……\nポーレットさんも、議会に向かっちゃったでしょう？」
1923 = "「\"Phía chúng ta\" là sao ạ...\nChị Paulette cũng đã đến hội đồng thành\nphố rồi mà?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だが、紹介をあちこち頼んでいたようだったからな。\nすぐには無理でも、遅れて朗報が来るかもしれん」
2265 = "「Nhưng mà, có vẻ như em ấy đã nhờ vả khắp\nnơi để tìm người giới thiệu.\nDù không thể có ngay lập tức, nhưng biết\nđâu sẽ có tin vui đến muộn thì sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「そうなるといいんですけどね」
2791 = "「Nếu được vậy thì tốt quá nhỉ.」"

# monologue
# JP: 日々姫は気休めと取ったようだが、\n僕は案外、有望なのではと思っている。
3487 = "Hibiki có vẻ coi đó chỉ là lời an ủi,\nnhưng tôi lại nghĩ rằng chuyện này khá là\ncó triển vọng."

# monologue
# JP: マニア同士のつながりの範囲や深さは底知れぬし、\n思わぬ縁が、思わぬ知らせに繋がることは、珍しくない。
3610 = "Mạng lưới kết nối giữa những người đam mê\nđường sắt có phạm vi và độ sâu không thể\nlường trước được,\nnhững mối duyên bất ngờ dẫn đến những tin\ntức bất ngờ, không phải là chuyện hiếm."

# 【日々姫】
# display as 日日姬
# JP: 「だとしても。ポーレットさん任せだけにしちゃうの、\nちょっと、悪いかなって気が私、して」
2550 = "「Dù vậy đi nữa. Nếu chỉ giao phó hết cho\nchị Paulette,\nem cảm thấy... hơi áy náy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2664 = "「Cũng phải.」"

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の営業運転の実施に向け、\nポーレットの負荷は全方向に膨らんでいる。
3782 = "Để tiến tới việc chạy tàu thương mại cho \\x%l8620;#00ffc040;8620%l;#;\n,\ngánh nặng của Paulette đang phình to về\nmọi mặt."

# monologue
# JP: 市政はもちろん、鉄道関係のことにおいても、\n僕らがポーレットに代わってやれることはあまりに少ない。
3332 = "Không chỉ về mặt hành chính, mà ngay cả\nnhững vấn đề liên quan đến đường sắt,\nnhững gì chúng ta có thể làm thay Paulette\nlà quá ít ỏi."

# 【日々姫】
# display as 日日姬
# JP: 「だから、\x%l客車;#00ffc040;客車%l;#;について勉強しとこうと思ったんです。\n知識があれば、フォローできる範囲も増えると思って」
2623 = "「Vì vậy, em định sẽ học thêm về \\x%l客車;#00ffc040;toa hành khách%l;#;\n.\nEm nghĩ nếu có kiến thức, phạm vi có thể\nhỗ trợ sẽ tăng lên.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは素晴らしい考えだな。言われてみると、\n部屋でだらだら休息していた自分が恥ずかしい」
2444 = "「À, đó là một ý tưởng tuyệt vời đấy. Nghe\nem nói vậy,\nanh thấy xấu hổ vì bản thân cứ nằm ườn ra\nnghỉ ngơi trong phòng.」"

# 【日々姫】
# display as 日日姬
# JP: 「休息も大事ですよ、もちろん。\nただ私、なにも出来なかったのが悔しくて」
2304 = "「Tất nhiên là nghỉ ngơi cũng quan trọng\nmà.\nChỉ là em cảm thấy ấm ức vì bản thân chẳng\nlàm được gì thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2667 = "「是嗎」" 

# monologue
# JP: 頭を、なでてやりたい気になる。
3409 = "Tôi bỗng có cảm giác muốn xoa đầu em ấy."

# monologue
# JP: が――何故か、\n伸ばそうと思ったはずの手が止まってしまう。
3156 = "Nhưng——không hiểu sao,\nbàn tay vừa định đưa ra lại khựng lại."

# 【日々姫】
# display as 日日姬
# JP: 「兄さん？」
2416 = "「Anh trai?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――\nその、なんだ。勉強なら僕も一緒にしよう」
2248 = "「Không——\nỪm, sao nhỉ. Nếu là học tập thì anh cũng\nsẽ học cùng.」"

# 【日々姫】
# display as 日日姬
# JP: 「うふふ、兄さんならそう言ってくれると思ってました」
2496 = "「Fufufu, em biết ngay là anh trai sẽ nói\nvậy mà.」"

# monologue
# JP: それ以上は何も言わず、\n日々姫とふたり、次の間へ入る。
3590 = "Không nói thêm lời nào nữa,\nhai chúng tôi cùng nhau bước sang phòng\nbên cạnh."

# monologue
# JP: 例の如くに資料を漁れば、\n日々姫はちょこんと床に座ってそれを広げる。
3240 = "Vẫn như mọi khi, sau khi lục lọi tìm kiếm\ntài liệu,\nHibiki ngồi bệt xuống sàn và mở chúng ra."

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、ここで読むのか？」
2574 = "「Sao thế, em định đọc ở đây à?」"

# 【日々姫】
# display as 日日姬
# JP: 「私、気付いたんです。部屋に全部を持っていくより、\n使えそうなもの、ここでチョイスした方がいいって」
2503 = "「Em chợt nhận ra. Thay vì mang tất cả về\nphòng,\nthì chọn những thứ có vẻ dùng được ở ngay\nđây sẽ tốt hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、道理だ」
2357 = "「Ra vậy, có lý đấy.」"

# monologue
# JP: ならば僕の役割は、“\x%l客車;#00ffc040;客車%l;#;”がらみの目につく全てを、\n日々姫のもとへ、せっせと運ぶことだろう。
3767 = "Nếu vậy, nhiệm vụ của tôi sẽ là cặm cụi\nmang tất cả những tài liệu\nliên quan đến \"\\x%l客車;#00ffc040;toa hành khách%l;#;\" đến cho\nHibiki."

# monologue
# JP: （意識してみると、\n\x%l客車;#00ffc040;客車%l;#;の映っている写真は随分多いのだな）
3866 = "（Khi để ý kỹ mới thấy,\nnhững bức ảnh chụp \\x%l客車;#00ffc040;toa hành khách%l;#; thực sự\nrất nhiều.）"

# monologue
# JP: 機関車単体、などというものが少ないのだ。\n貨物\x%l列車;#00ffc040;列車%l;#;でないのなら、当然に\x%l客車;#00ffc040;客車%l;#;が引かれている。
3213 = "Rất hiếm khi có ảnh chụp riêng một đầu máy\nxe lửa.\nNếu không phải là \\x%l貨物列車;#00ffc040;đoàn tàu chở hàng%l;#;, thì\nđương nhiên nó sẽ kéo theo \\x%l客車;#00ffc040;toa hành khách%l;#;."

# monologue
# JP: ざらざらそれらを集めて行けば、\n今度は中身――\x%l客車;#00ffc040;客車%l;#;内部の資料が少ないとも気付く。
3260 = "Trong quá trình thu thập một cách thô sơ\nnhững tài liệu đó,\ntôi lại nhận ra rằng tài liệu về bên\ntrong——nội thất của \\x%l客車;#00ffc040;toa hành khách%l;#; khá ít\nỏi."

# monologue
# JP: （これは困るな。いや――ああ、そうか。\n鉄道本より、観光\x%l列車;#00ffc040;列車%l;#;のパンフレットなどの方が――）
3874 = "（Thế này thì rắc rối rồi. Không——à, ra\nvậy.\nThay vì sách về đường sắt, những tờ rơi\nquảng cáo \\x%l観光列車;#00ffc040;tàu du lịch%l;#; có lẽ sẽ——）"

# monologue
# JP: 意識を変えれば、求めるものが見つかり始める。\nしかし……ポーレットが感動したわけだ。
3107 = "Khi thay đổi cách nhìn, những thứ cần tìm\nbắt đầu xuất hiện.\nNhưng mà... hèn gì Paulette lại cảm động\nđến vậy."

# monologue
# JP: 少しは知識を重ねてこれた今ならば、\n汰斗さんの蔵書の価値の高さがわかる。
3748 = "Bây giờ, khi đã tích lũy được một chút\nkiến thức,\ntôi mới hiểu được giá trị to lớn của bộ\nsưu tập sách của ông Taito."

# 【日々姫】
# display as 日日姬
# JP: 「あ……そか、窓の大きさも重要なのか」
2433 = "「A... ra vậy, kích thước của cửa sổ cũng\nquan trọng sao.」"

# monologue
# JP: 僕が運びこむ資料を次々眺め、\n休むこと無く日々姫はメモし、スケッチしていく。
3272 = "Lần lượt xem qua những tài liệu tôi mang\nđến,\nHibiki không ngừng ghi chép và phác thảo."

# 【日々姫】
# display as 日日姬
# JP: 「あれ？　これ、肘掛けがなんか変わった形？\nここ……別角度の写真欲しいなぁ」
2405 = "「Ủa? Cái này, tay vịn có hình dáng hơi lạ\nnhỉ?\nChỗ này... mình muốn xem ảnh chụp từ góc\nđộ khác quá.」"

# monologue
# JP: 興が乗ってきているらしく、体育座りの両膝が、\n弾むようにして開かれ閉じられを繰り返す。
3146 = "Có vẻ như đang rất hứng thú, hai đầu gối\ncủa em ấy trong tư thế ngồi bó gối,\ncứ liên tục mở ra rồi khép lại như đang\nnhún nhảy."

# monologue
# JP: （うむ？　日々姫のショートパンツから、\n下着が見えてしまいそうだな）
3839 = "（Hửm? Từ chiếc quần short của Hibiki,\nhình như có thể nhìn thấy đồ lót thì\nphải.）"

# monologue
# JP: れいなの大声が発端となったパンツ騒動からこちら、\nどうにも妙に、その辺を意識してしまうようになった。
3344 = "Kể từ vụ náo động về đồ lót bắt nguồn từ\ntiếng hét lớn của Reina,\nkhông hiểu sao tôi lại trở nên để ý đến\nchuyện đó một cách kỳ lạ."

# monologue
# JP: が、せっかくの集中を削いでしまうのも気の毒だ。\n見ぬことにして、僕は資料を集め続けよう。
3158 = "Nhưng, thật tội nghiệp nếu làm gián đoạn\nsự tập trung khó khăn lắm mới có được này.\nTôi sẽ vờ như không thấy và tiếp tục thu\nthập tài liệu vậy."

# monologue
# JP: （……どうした、僕。\n今すべきことは、資料集めだ）
3809 = "（...Mình bị sao thế này.\nViệc cần làm bây giờ là thu thập tài liệu\ncơ mà.）"

# monologue
# JP: わかっている。が、なぜかは知らねど動けない。\n日々姫のショートパンツの裾から――
3430 = "Tôi biết điều đó. Nhưng, chẳng hiểu sao cơ\nthể lại không thể cử động được.\nTừ gấu quần short của Hibiki——"

# monologue
# JP: 足の閉じ、開きにつれて、ひらひら動くその姿から、\nどうにも視線を外せなくなる。
3760 = "Tôi hoàn toàn không thể rời mắt khỏi cảnh\ntượng\nnó cứ đung đưa mỗi khi em ấy khép và mở\nchân."

# monologue
# JP: （少しおかしいぞ。しっかりするんだ。\n下着が例え見えたとて、なにほどのこともないだろう）
3862 = "（Hơi kỳ lạ rồi đấy. Phải tỉnh táo lại\nthôi.\nCho dù có nhìn thấy đồ lót đi chăng nữa,\nthì cũng chẳng có chuyện gì to tát đâu.）"

# monologue
# JP: 右田家で、レールショップで。\n多くの女性と仕事を、生活を共にしている。
3256 = "Ở nhà Migita, hay ở cửa hàng đường sắt.\nTôi đang cùng làm việc, cùng chung sống\nvới rất nhiều phụ nữ."

# monologue
# JP: スカートの奥など、隠されている場所が見えてしまうのも、\n長い時間を過ごすうちには、そう珍しくも無いことだ。
3255 = "Việc nhìn thấy những nơi bị che khuất như\nbên trong váy,\ncũng không phải là chuyện hiếm gặp khi\ndành nhiều thời gian bên nhau."

# monologue
# JP: （誰の、どこが見えようと、今まで一度も……\n目を離せなくなることなどは、なかったのに――）
3829 = "（Dù có nhìn thấy chỗ nào của ai đi chăng\nnữa, thì từ trước đến nay chưa từng có lần\nnào...\nmình không thể rời mắt được như thế này cơ\nmà——）"

# monologue
# JP: だから、探す。\n目を離せなくなった理由を。
3436 = "Vì vậy, tôi bắt đầu tìm kiếm.\nLý do khiến tôi không thể rời mắt."

# monologue
# JP: 原因をつきとめることができれば、\n問題は必ず、解決出来る。
3217 = "Nếu có thể tìm ra nguyên nhân,\nthì chắc chắn vấn đề sẽ được giải quyết."

# monologue
# JP: （今までと、何が違うんだ。\n――日々姫、だからか？）
3837 = "（Có gì khác biệt so với trước đây sao.\n——Vì đó là Hibiki ư?）"

# monologue
# JP: 意識をすれば、気付いてしまう。\n日々姫の寝間着は、ひどく、薄い。
3104 = "Khi ý thức được điều đó, tôi mới nhận ra.\nĐồ ngủ của Hibiki, thực sự rất mỏng."

# monologue
# JP: いや……これは、キャミソールとかネグリジェとかいう、\nそんな類の、下着に近いものではないのか。
3111 = "Không... cái này, gọi là áo hai dây hay\nváy ngủ gì đó,\nchẳng phải là loại trang phục gần giống\nvới đồ lót sao."

# monologue
# JP: （だから、それがなんだというんだ）
3855 = "（Vậy thì, thế thì đã sao chứ.）"

# monologue
# JP: 僕らは一緒に風呂にも何度も入っている。\n日々姫の肌も、当然何度も目にしている。
3374 = "Chúng tôi cũng đã tắm chung với nhau nhiều\nlần rồi.\nLàn da của Hibiki, đương nhiên tôi cũng đã\nnhìn thấy nhiều lần."

# monologue
# JP: それなのに、なぜ――
3771 = "Vậy mà, tại sao——"

# 【日々姫】
# display as 日日姬
# JP: 「ね？　にぃに、ちょっとここ見て？」
2801 = "「Này? Anh hai, nhìn chỗ này một chút đi?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2494 = "「Hửm?」"

# monologue
# JP: 声をかけられ、ホっとする。\nようやく、目線を動かせる。
3276 = "Được gọi tên, tôi thở phào nhẹ nhõm.\nCuối cùng cũng có thể di chuyển ánh mắt."

# 【日々姫】
# display as 日日姬
# JP: 「\x%l客車;#00ffc040;客車%l;#;って、大きく分けると、\nこの長い座席のと、箱型の座席のとだけど――」
1909 = "「\\x%l客車;#00ffc040;Toa hành khách%l;#; ấy, chia ra làm hai loại\nlớn,\nlà loại có dãy ghế dài này và loại có ghế\nhình hộp, nhưng mà——」"

# monologue
# JP: （んっ――くっ）
3842 = "（Ưm——hự）"

# monologue
# JP: 日々姫の声が聞こえなくなる。
3405 = "Tôi dần không còn nghe thấy giọng nói của\nHibiki nữa."

# monologue
# JP: 鼓膜は震えているのだが、\nその意味が全くわからなくなる。
3786 = "Màng nhĩ vẫn đang rung động,\nnhưng tôi hoàn toàn không hiểu được ý\nnghĩa của nó nữa."

# monologue
# JP: （胸元も――なんと危ういのだ）
3864 = "（Ngay cả vòng một cũng——thật là nguy\nhiểm.）"

# monologue
# JP: 薄いだけでなく、日々姫の寝間着は緩いらしい。
3500 = "Không chỉ mỏng, đồ ngủ của Hibiki có vẻ\ncòn khá rộng."

# monologue
# JP: 大きく開いた胸元からは、\nそのささやかな膨らみが、今にものぞいてしまいそうだ。
3295 = "Từ phần ngực áo mở rộng,\nnhững đường cong bé nhỏ ấy dường như sắp\nlộ ra đến nơi rồi."

# monologue
# JP: （日々姫の肌……桃色に染まって汗ばんでいるな。\n暑いのか？　いや……確かに、暑い）
3860 = "（Làn da của Hibiki... đang nhuộm màu hồng\nđào và lấm tấm mồ hôi kìa.\nNóng lắm sao? Không... công nhận là, nóng\nthật.）"

# monologue
# JP: 気温など、全く気にもならなかったが、\n今夜は、ひどく蒸すようだ。
3123 = "Trước đó tôi hoàn toàn không để ý đến\nnhiệt độ,\nnhưng đêm nay, có vẻ như trời rất oi bức."

# monologue
# JP: いや――僕も汗ばみ、肌には熱を感じているのに、\n喉は、不思議と乾いている。
3109 = "Không——tôi cũng đang đổ mồ hôi, da dẻ cũng\ncảm thấy nóng ran,\nnhưng cổ họng lại khô khốc một cách kỳ lạ."

# 【日々姫】
# display as 日日姬
# JP: 「――――兄さん」
1912 = "「————Anh trai」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2914 = "「！」" 

# monologue
# JP: 日々姫は手元のスケッチブックを見ていない。\n僕をまっすぐ、ただまっすぐに見つめている。
3495 = "Hibiki không nhìn vào cuốn sổ phác thảo\ntrên tay nữa.\nEm ấy đang nhìn thẳng, chằm chằm vào tôi."

# monologue
# JP: どきん、どきんと――日々姫に触れられていないのに、\n日々姫の胸から伝わってきた、あの時と同じ鼓動を感じる。
3250 = "Thình thịch, thình thịch——Dù Hibiki không\nhề chạm vào tôi,\nnhưng tôi lại cảm nhận được nhịp đập giống\nhệt như lúc đó truyền đến từ ngực em ấy."

# 【日々姫】
# display as 日日姬
# JP: 「兄さん。\n今度は…………どう――ですか？」
2409 = "「Anh trai.\nLần này…………thế nào——ạ?」"

# monologue
# JP: 日々姫も喉が乾いているのか、\nぺろり、その舌が唇を舐める。
3486 = "Có lẽ Hibiki cũng đang khô cổ họng,\nem ấy khẽ liếm môi."

# monologue
# JP: 唾液で濡れて、唇がその赤みを増す。\nそうしてゆっくり、また唇が開かれ――
3249 = "Được làm ướt bằng nước bọt, đôi môi càng\nthêm đỏ mọng.\nVà rồi, đôi môi ấy lại từ từ hé mở——"

# 【双鉄】
# display as 雙鐵
# JP: 「どう、とは――何が、だ」
2297 = "「Thế nào, là——chuyện gì, cơ」"

# 【日々姫】
# display as 日日姬
# JP: 「ですから……その……\nそわそわ、とか――うずうず、と、か」
2540 = "「Thì là... cái đó...\nkiểu như bồn chồn——hay là, rạo rực, chẳng\nhạn.」"

# monologue
# JP: （ジリリリリ！　ジリリリリ！）
3832 = "（Reng reng reng reng! Reng reng reng\nreng!）"

# 【日々姫】
# display as 日日姬＆雙鐵
# JP: 「ひゃうんっ！！？」\n「っ！！」
2427 = "「Á á!!?」\n「!!」"

# monologue
# JP: 電話だ。
3521 = "Là tiếng điện thoại."

# monologue
# JP: 居間で響いているはずなのに、\nまるで耳元のように感じた。
3515 = "Rõ ràng là nó vang lên ở phòng khách,\nnhưng tôi lại cảm thấy như nó reo ngay bên\ntai mình vậy."

# 【日々姫】
# display as 日日姬
# JP: 「あの……えとっ――」
2849 = "「Dạ... ừm——」"

# monologue
# JP: 日々姫が、真っ赤になっている。
3498 = "Hibiki đỏ bừng cả mặt."

# monologue
# JP: さきほどまでの、酒によったような朱ではなく、\n見慣れた、照れているときの真っ赤に。
3115 = "Không phải là màu đỏ hồng như say rượu lúc\nnãy,\nmà là màu đỏ chót quen thuộc mỗi khi em ấy\nxấu hổ."

# 【双鉄】
# display as 雙鐵
# JP: 「電話だな」
2690 = "「Là điện thoại kìa.」"

# monologue
# JP: 何をいうべきかわからない。\n何をいいたいかわからない。
3371 = "Tôi không biết mình nên nói gì.\nCũng không biết mình muốn nói gì."

# monologue
# JP: だからただ、思いつくままを言葉にすれば、\n日々姫はほう――っと、長い、長い長い息を吐く。
3434 = "Vì vậy, tôi chỉ buột miệng nói ra những gì\nmình nghĩ đến,\nHibiki liền thở hắt ra một hơi thật dài,\nthật dài."

# 【日々姫】
# display as 日日姬
# JP: 「電話ですね、こんな時間に――っ！？」
2894 = "「Là điện thoại nhỉ, giờ này mà còn——!?」"

# monologue
# JP: 日々姫が気づいた顔になる。\nと、いうか、そうだ。
3480 = "Hibiki lộ vẻ mặt như vừa nhận ra điều gì\nđó.\nĐúng hơn là, đúng vậy."

# monologue
# JP: こんな時間にかかってくるのは、\n悪い知らせか、それとも逆に――
3756 = "Gọi đến vào giờ này,\nkhông là tin xấu thì ngược lại——"

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、双ちゃん、\nポーちゃんから電話と」
2536 = "「Sou-chan, Sou-chan,\nPo-chan gọi điện thoại đến này.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　早く、早くお出になってください！」
2904 = "「Ngài Soutetsu! Nhanh lên, xin ngài hãy\nnghe máy nhanh lên ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「今行く！」
2603 = "「Tôi ra ngay!」"

# monologue
# JP: やはりだ。
3533 = "Quả nhiên là vậy."

# monologue
# JP: ポーレットがこの時間にかけてきたなら、\n思いあたる用件は、ひとつしか無い。
3563 = "Nếu Paulette gọi đến vào giờ này,\nthì chỉ có một lý do duy nhất mà tôi có\nthể nghĩ đến."

# 【双鉄】
# display as 雙鐵
# JP: 「――っと？　どうした、日々姫」
1914 = "「——Hửm? Sao thế, Hibiki.」"

# monologue
# JP: 僕に続こうと浮いた踵が、\nけれどもぴたり、下りている。
3545 = "Gót chân vừa nhấc lên định đi theo tôi,\nlại khựng lại, đặt xuống sàn."

# 【日々姫】
# display as 日日姬
# JP: 「わ、私――あの――こんな格好やけんっ！！」
2584 = "「E, em——cái đó——đang mặc bộ dạng này mà!!」"

# monologue
# JP: 逃げた。日々姫が。\nそうとしかいいようの無い、脱兎ぶり。
3507 = "Chạy mất rồi. Hibiki đã chạy mất rồi.\nMột sự tẩu thoát nhanh như thỏ rừng, không\nthể diễn tả bằng lời nào khác."

# 【ハチロク】
# display as 八六
# JP: 「なにをなさってらっしゃるのです？　双鉄様！\n早く！　お早くっ！！」
2578 = "「Ngài đang làm gì vậy ạ? Ngài Soutetsu!\nNhanh lên! Nhanh lên ạ!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「すまんすまん、今すぐだ」
2530 = "「Xin lỗi xin lỗi, tôi ra ngay đây.」"

# monologue
# JP: 日々姫のことは気になるが、\nそれよりも今は、僕の為すべきことを為す。
3784 = "Tuy cũng bận tâm về Hibiki,\nnhưng quan trọng hơn, bây giờ tôi phải làm\nviệc mình cần làm."

# monologue
# JP: （そうだ、\x%l客車;#00ffc040;客車%l;#;の手配をしたら、観光振興。\nそうして流れを、工場誘致反対へとつなげていくのだ）
3845 = "（Đúng rồi, sau khi sắp xếp được \\x%l客車;#00ffc040;toa hành khách%l;#;\n, sẽ tiến hành chấn hưng du lịch.\nSau đó, sẽ xoay chuyển tình thế sang phản\nđối việc thu hút nhà máy.）"

# monologue
# JP: それが目的。\n僕が帰ってきた理由。
3753 = "Đó là mục đích.\nLà lý do tôi trở về."

# monologue
# JP: 思いなおせば、胸がすうっと軽くなる。
3775 = "Nghĩ lại như vậy, cõi lòng tôi bỗng chốc\nnhẹ nhõm hẳn đi."

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
2518 = "「Được rồi!」"

# monologue
# JP: その足取りで居間へと向かい、\nハチロクが差し出す受話器を受けとる。
3429 = "Tôi sải bước hướng về phòng khách,\nnhận lấy ống nghe từ tay Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「もしもし、僕だ、双鉄だ。\n\x%l客車;#00ffc040;客車%l;#;か？　――やはりか！ 見つかったのか！！」
2458 = "「Alo, tôi đây, Soutetsu đây.\n\\x%l客車;#00ffc040;Toa hành khách%l;#; sao? ——Quả nhiên là vậy!\nTìm thấy rồi sao!!」"

# monologue
# JP: 明けて、朝。
3270 = "Trời sáng, buổi sáng đã đến."

# monologue
# JP: 改札さえまだ開けぬうち、\nレールショップにはもはや熱気が満ちている。
3759 = "Ngay cả khi cửa soát vé còn chưa mở,\ncửa hàng đường sắt đã ngập tràn không khí\nnáo nhiệt."

# 【双鉄】
# display as 雙鐵
# JP: 「靜岡[すんたい,1]駿袋鉄道？」
2911 = "「Đường sắt Shizuoka Suntay?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。靜岡県は[するが,1]駿川から、[ふくろい,1]袋衣までをつなぐ、\n[はんかんはんみん,3]半官半民の鉄道会社です」
2679 = "「Vâng. Là một công ty đường sắt \\x%l半官半民;#00ffc040;bán công bán tư%l;#;\n, kết nối\ntừ Surukawa đến Fukuroi thuộc tỉnh\nShizuoka ạ.」"

# monologue
# JP: ポーレットの頬が紅潮している。
3567 = "Hai má Paulette ửng hồng."

# 【ポーレット】
# display as 波萊特
# JP: 「そこに、あさってに廃棄予定だった車輌があって。\nそれを譲ってもらえるって話なんです」
2883 = "「Ở đó có một toa xe dự định sẽ bị phế thải\nvào ngày mốt.\nHọ nói là có thể nhượng lại cho chúng ta.」"

# 【双鉄】
# display as 雙鐵
# JP: 「廃棄予定とは、どんな状態なのだ？\n粗大ごみを引き取る事にならねば良いが」
2796 = "「Dự định phế thải, tức là tình trạng nó\nnhư thế nào?\nĐừng nói là chúng ta phải rước về một đống\nrác cồng kềnh nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「その点ももちろん確認済みです。\nついこの間まで使ってて、故障や破損は無いそうです」
2827 = "「Tất nhiên là em đã xác nhận điểm đó rồi.\nHọ nói là nó vẫn được sử dụng cho đến tận\ngần đây, không có hỏng hóc hay nứt vỡ gì\ncả.」"

# monologue
# JP: 言いながら、ポーレットはプリントアウトを配布する。
3572 = "Vừa nói, Paulette vừa phân phát các bản\nin."

# 【双鉄】
# display as 雙鐵
# JP: 「これが、その\x%l客車;#00ffc040;客車%l;#;か？」
2830 = "「Đây là, \\x%l客車;#00ffc040;toa hành khách%l;#; đó sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。写真のデータも送ってくれて」
2673 = "「Vâng. Họ cũng đã gửi cả dữ liệu hình ảnh\ncho em.」"

# 【日々姫】
# display as 日日姬
# JP: 「結構……いい、っぽい？　\nそんなに、汚れてもないみたいだし」
2752 = "「Có vẻ... cũng được, nhỉ?\nTrông cũng không đến nỗi bẩn lắm.」"

# 【ポーレット】
# display as 波萊特
# JP: 「清掃、写真撮る前にわざわざしてくれたそうなんです」
2306 = "「Họ nói là đã cất công dọn dẹp sạch sẽ\ntrước khi chụp ảnh cho chúng ta đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2497 = "「Hô.」"

# monologue
# JP: 廃棄予定というものに、\nそこまでを何故してくれるのか。
3517 = "Đối với một thứ dự định sẽ bị phế thải,\ntại sao họ lại làm đến mức đó chứ."

# monologue
# JP: わからぬ理由を探してみれば、\nついつい、視線はハチロクへ向く。
3416 = "Tôi thử tìm kiếm lý do mà mình không biết,\nbất giác, ánh mắt tôi hướng về phía\nHachiroku."

# 【ハチロク】
# display as 八六
# JP: 「ロングシートは今ひとつ観光\x%l列車;#00ffc040;列車%l;#;らしくありませんが、\nそれを割り引いても、願ったり叶ったりのお話ですね」
2897 = "「Mặc dù ghế băng dài không mang đậm phong\ncách \\x%l観光列車;#00ffc040;tàu du lịch%l;#; cho lắm,\nnhưng bù trừ qua lại thì đây quả là một cơ\nhội cầu được ước thấy nhỉ.」"

# 【凪】
# display as 凪
# JP: 「けど、なんで故障も壊れもしとらんものを、\n捨ててしまう予定だったと？」
2267 = "「Nhưng mà, tại sao họ lại dự định vứt bỏ\nmột thứ không hề hỏng hóc hay nứt vỡ gì\nchứ?」"

# monologue
# JP: ごくまっとうな凪の疑問に、すぐさまふかみが頷き返す。\n今日の会議には、このふたりも参加するようだ。
3665 = "Trước thắc mắc rất đỗi hợp lý của Nagi,\nFukami ngay lập tức gật đầu đồng tình.\nCó vẻ như hôm nay hai người họ cũng tham\ngia cuộc họp này."

# 【ポーレット】
# display as 波萊特
# JP: 「理由の一つは、いわゆるトコロテンです。\n譲ってもらえるの、\x%l気動車;#00ffc040;気動車%l;#;改造の\x%l客車;#00ffc040;客車%l;#;なんですけど……」
2347 = "「Một trong những lý do là cái gọi là \"nâng\ncấp dần dần\" ạ.\nChiếc xe họ nhượng lại cho chúng ta là \\x%l客車;#00ffc040;toa hành khách%l;#;\nđược cải tạo từ \\x%l気動車;#00ffc040;toa xe tự hành%l;#;, nhưng\nmà...」"

# monologue
# JP: エンジン故障の\x%l気動車;#00ffc040;気動車%l;#;から、エンジンと運転機器とを外し、\n\x%l客車;#00ffc040;客車%l;#;として再生したもの――
3341 = "Từ một chiếc \\x%l気動車;#00ffc040;toa xe tự hành%l;#; bị hỏng động\ncơ, họ tháo động cơ và thiết bị lái ra,\nrồi tái chế nó thành \\x%l客車;#00ffc040;toa hành khách%l;#;——"

# monologue
# JP: それが、“\x%l気動車;#00ffc040;気動車%l;#;改造の\x%l客車;#00ffc040;客車%l;#;”だそうだ。
3751 = "Đó chính là, \"\\x%l客車;#00ffc040;toa hành khách%l;#; được cải tạo\ntừ \\x%l気動車;#00ffc040;toa xe tự hành%l;#;\"."

# 【ポーレット】
# display as 波萊特
# JP: 「……で、二週間ほど前、靜岡の別の鉄道会社、\n『[しょういがわてつどう,4]小井川鐵道』の、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の一体が寿命を迎えて」
1947 = "「...Và, khoảng hai tuần trước, tại một\ncông ty đường sắt khác ở Shizuoka,\n\"Đường sắt Oigawa\", có một \\x%lレイルロオド;#00ffc040;Railord%l;#; đã đi\nđến cuối tuổi thọ của mình.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の寿命」
1900 = "「Tuổi thọ của \\x%lレイルロオド;#00ffc040;Railord%l;#;?」"

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、もちろん、物だ。\n寿命があるのは当然だ、が――
88 = "\\x%lレイルロオド;#00ffc040;Railord%l;#;, tất nhiên, là một vật vô tri.\nViệc có tuổi thọ là điều hiển nhiên,\nnhưng——"

# 【ハチロク】
# display as 八六
# JP: 「なら、その子の機関車が廃棄になったのですね？\nそれで浮いた\x%l客車;#00ffc040;客車%l;#;を、[すんたい,1]駿袋鉄道が購入した」
2886 = "「Vậy thì, đầu máy của đứa bé đó cũng bị\nphế thải luôn sao?\nSau đó \\x%l客車;#00ffc040;toa hành khách%l;#; dư ra được Đường sắt\nSuntay mua lại...」"

# 【れいな】
# display as 玲奈
# JP: 「新しいのが来て、\x%l気動車;#00ffc040;気動車%l;#;改造\x%l客車;#00ffc040;客車%l;#;があまって――\nわぁ、だからトコロテン！　押し出されて、にゅ～っ」
2328 = "「Có xe mới đến, \\x%l客車;#00ffc040;toa hành khách%l;#; được cải\ntạo từ \\x%l気動車;#00ffc040;toa xe tự hành%l;#; bị thừa ra——\nOa, thì ra là Tokoroten (thạch ép)! Bị đẩy\nra ngoài, phụt~」"

# monologue
# JP: ――やや動揺を覚えてしまった僕を尻目に、\n当の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;たちは平然と話をすすめる。
1874 = "——Bỏ mặc tôi đang có chút bối rối,\ncác \\x%lレイルロオド;#00ffc040;Railord%l;#; vẫn thản nhiên tiếp tục câu\nchuyện."

# 【ポーレット】
# display as 波萊特
# JP: 「そう。\nで、理由のもうひとつは、不思議な縁」
2476 = "「Đúng vậy.\nVà một lý do nữa, là một mối duyên kỳ lạ.」"

# 【れいな】
# display as 玲奈
# JP: 「不思議なえん、ってなんですかぁ？」
1918 = "「Mối duyên kỳ lạ là gì vậy ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん、あのね？　この話、わたしの\x%lまいてつ;#00ffc040;まいてつ%l;#;仲間さんの\nさらに\x%lまいてつ;#00ffc040;まいてつ%l;#;仲間さんからの紹介なんだけど」
2482 = "「Ừm, em nghe này? Chuyện này, là do bạn \\x%lまいてつ;#00ffc040;chủ tàu%l;#;\ncủa chị,\nđược bạn \\x%lまいてつ;#00ffc040;chủ tàu%l;#; của người đó giới thiệu\ncho đấy.」"

# monologue
# JP: れいなの問いに説明を重ねる。\nポーレットの声が弾んでいく。
3568 = "Paulette giải thích thêm cho câu hỏi của\nReina.\nGiọng điệu của em ấy ngày càng hào hứng."

# monologue
# JP: ここまで高揚したポーレットを見るのも、\n久々な気がして少し嬉しく、感じた動揺もすぐに紛れる。
3623 = "Lâu lắm rồi mới thấy Paulette phấn khích\nđến vậy,\ntôi cũng cảm thấy vui lây, và sự bối rối\nvừa nãy cũng nhanh chóng tan biến."

# 【日々姫】
# display as 日日姬
# JP: 「そのお仲間さんのお仲間さんと、\n御一夜の誰かとに縁が？」
2327 = "「Bạn của bạn chị,\ncó mối liên hệ nào với ai đó ở Ohimitera\nsao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ううん、人じゃなくって、場所の縁です。\n御一夜市と駿川市とには、旧縁があるらしくって」
2249 = "「Không, không phải con người, mà là mối\nduyên về địa lý.\nThành phố Ohimitera và thành phố Surukawa\ndường như có một mối duyên từ xưa.」"

# monologue
# JP: そこまで言って、\nポーレットはもったいぶるような一拍を置く。
3569 = "Nói đến đây,\nPaulette cố tình dừng lại một nhịp như\nmuốn tỏ vẻ bí ẩn."

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜城の異名……別名って知っていますか？」
2317 = "「Biệt danh của thành cổ Ohimitera... mọi\nngười có biết tên gọi khác của nó không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。確か[まゆづき,1]眉月城だな」
2468 = "「Ừm. Hình như là thành Mayuzuki nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「[まゆづき,1]眉月とは、三日月の異名ですよね？\nまるで眉のように、細い月」
2746 = "「Mayuzuki là tên gọi khác của trăng lưỡi\nliềm đúng không ạ?\nVầng trăng khuyết mỏng như lông mày.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そう。眉月は、御一夜市の市章のモチーフで、\nその元をたどると、[さがら,1]相樂氏の旗印なんです」
2529 = "「Đúng vậy. Mayuzuki là họa tiết trên huy\nhiệu của thành phố Ohimitera,\nnếu truy tìm nguồn gốc thì đó là cờ hiệu\ncủa gia tộc Sagara.」"

# 【双鉄】
# display as 雙鐵
# JP: 「[さがら,1]相樂氏？」
2742 = "「Gia tộc Sagara?」"

# 【日々姫】
# display as 日日姬
# JP: 「旧藩主ですよ、兄さん。御一夜はもともと御一夜藩。\n鎌倉時代からずっと[さがら,1]相樂氏の領地なんです」
2542 = "「Là cựu lãnh chúa đấy, anh trai. Ohimitera\nvốn dĩ là phiên Ohimitera.\nTừ thời Kamakura đã luôn là lãnh địa của\ngia tộc Sagara rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫も随分と詳しいんだな」
2325 = "「Hibiki cũng rành rẽ quá nhỉ.」"

# monologue
# JP: 驚いた。\nポーレットは市長という役職に加え、あの生真面目さだ。
3380 = "Tôi hơi ngạc nhiên.\nPaulette là Thị trưởng, cộng thêm tính\ncách nghiêm túc của em ấy."

# monologue
# JP: 市の歴史などに詳しいのも、\n当然だろうという気がするが――
3418 = "Việc am hiểu lịch sử thành phố cũng là\nđiều đương nhiên,\nnhưng mà——"

# 【日々姫】
# display as 日日姬
# JP: 「少等部の時に結構みっちり習うんですよ。\n郷土史っていったら大げさですけど、地元の歴史」
2507 = "「Hồi tiểu học em được học khá kỹ đấy.\nNói là lịch sử địa phương thì hơi quá,\nnhưng đại loại là lịch sử vùng miền.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2497 = "「嚯」" 

# monologue
# JP: 日々姫の言葉に、ふかみがこっくり頷いて、\n凪はげんなりした顔になる。
3661 = "Nghe Hibiki nói vậy, Fukami gật đầu cái\nrụp,\ncòn Nagi thì lộ vẻ mặt chán nản."

# monologue
# JP: なるほど、確かに、\n“結構みっちり”やるようだ。
3192 = "Ra vậy, quả nhiên là,\nđược học \"khá kỹ\" thật."

# 【日々姫】
# display as 日日姬
# JP: 「そもそも、相樂氏の旧領地は靜岡にあって、\n今でもそこは相樂町っていう名前で――」
2350 = "「Vốn dĩ, lãnh địa cũ của gia tộc Sagara\nnằm ở Shizuoka,\nđến bây giờ nơi đó vẫn mang tên là thị\ntrấn Sagara——」"

# monologue
# JP: 言うと同時に、ハっとした顔。\n日々姫の向けた視線を、ポーレットは笑みで受け止める。
3707 = "Vừa nói, em ấy vừa lộ vẻ mặt chợt nhận ra\nđiều gì đó.\nÁnh mắt Hibiki hướng về phía Paulette, và\nnhận lại một nụ cười."

# 【ポーレット】
# display as 波萊特
# JP: 「相樂町、[すんたい,1]駿袋鉄道の沿線なんです」
2743 = "「Thị trấn Sagara, nằm dọc theo tuyến Đường\nsắt Suntay đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。つまり、相樂氏の縁で、\n御一夜と駿袋鉄道とは繋がっているのか」
2356 = "「Ra vậy. Tức là, nhờ mối duyên của gia tộc\nSagara,\nmà Ohimitera và Đường sắt Suntay được kết\nnối với nhau sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです。相樂町の町長さんが駿袋鉄道の\n大株主さんだそうで、その辺の歴史にお詳しくて」
2680 = "「Đúng vậy. Nghe nói Thị trưởng thị trấn\nSagara là\ncổ đông lớn của Đường sắt Suntay, và ông\nấy rất am hiểu lịch sử khu vực đó.」"

# monologue
# JP: 御一夜と相樂町との姉妹都市提携の話までもが出てくる、\n極めて良好な話し合い。
3706 = "Cuộc trò chuyện diễn ra vô cùng tốt đẹp,\nthậm chí còn đề cập đến việc kết nghĩa\nthành phố kết nghĩa giữa Ohimitera và thị\ntrấn Sagara."

# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;譲渡の話もそれゆえ、\nとんとん拍子に進んだらしい。
3723 = "Chuyện nhượng lại \\x%l客車;#00ffc040;toa hành khách%l;#; vì thế,\ncũng diễn ra vô cùng suôn sẻ."

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。ならば移送を考えねばな。\n\x%l客車;#00ffc040;客車%l;#;を譲渡してもらうとして、靜岡からどう運ぶ？」
2422 = "「Hừm. Vậy thì phải tính đến chuyện vận\nchuyển thôi.\nCho dù được nhượng lại \\x%l客車;#00ffc040;toa hành khách%l;#;, thì\nlàm sao để chuyển từ Shizuoka về đây?」"

# 【ポーレット】
# display as 波萊特
# JP: 「その辺も、すごく便宜をはかってもらえて――」
2832 = "「Về mặt đó, họ cũng đã tạo điều kiện rất\nnhiều cho chúng ta——」"

# monologue
# JP: 譲渡される\x%l客車;#00ffc040;客車%l;#;は当然、引いてもらえれば走行できる。\nそれでそのまま、駿袋鉄道駿袋線の相樂駅へと。
3724 = "\\x%l客車;#00ffc040;Toa hành khách%l;#; được nhượng lại đương nhiên\ncó thể chạy được nếu có đầu máy kéo.\nCứ thế, nó sẽ được kéo đến ga Sagara của\ntuyến Surukawa thuộc Đường sắt Suntay."

# monologue
# JP: 相樂駅にほど近くには相樂港があり、\nそこから海路で、一気に[みやざき,1]宮嵜港へと運ぶ。
3619 = "Gần ga Sagara có cảng Sagara,\ntừ đó sẽ đi bằng đường biển, vận chuyển\nmột mạch đến cảng Miyazaki."

# 【ポーレット】
# display as 波萊特
# JP: 「[こくら,1]粉蔵にはまだ、車輌陸送用のトレーラーがあるそうです。\nそれを、[みやざき,1]宮嵜にまで回してもらって――」
2532 = "「Nghe nói ở Kokura vẫn còn xe kéo chuyên\ndụng để vận chuyển toa xe bằng đường bộ.\nChúng ta sẽ điều nó đến Miyazaki——」"

# 【双鉄】
# display as 雙鐵
# JP: 「トレーラー……ディーゼルエンジン自動車で\n陸送する、ということか」
2628 = "「Xe kéo... vận chuyển đường bộ\nbằng ô tô động cơ diesel sao.」"

# monologue
# JP: 粉蔵から宮嵜まで自動車でなど、\n気が遠くなるような行程だ。
3608 = "Đi ô tô từ Kokura đến Miyazaki,\nnghĩ đến quãng đường thôi cũng đủ thấy\nchoáng váng rồi."

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;というものの便利さを、\n逆説的に痛感させられてしまう。
3339 = "Nghịch lý thay, điều này lại khiến tôi cảm\nnhận sâu sắc\nsự tiện lợi của cái gọi là \\x%lエアクラ;#00ffc040;Aircra%l;#;."

# 【日々姫】
# display as 日日姬
# JP: 「それって、お金ものすごくかかるんじゃ」
2833 = "「Như vậy chẳng phải tốn rất nhiều tiền\nsao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「かかります。けど、もちろん、\n車輌を特注で新造するより、圧倒的に安くすみます」
2762 = "「Tốn chứ. Nhưng mà, tất nhiên,\nso với việc đặt làm mới một toa xe thì rẻ\nhơn rất rất nhiều.」"

# 【双鉄】
# display as 雙鐵
# JP: 「特注で新造？　そんなことが出来るのか？」
2717 = "「Đặt làm mới? Có thể làm được chuyện đó\nsao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「財政的なことを考えなければ、できますよ。\n赤道直下は、\x%lエアクラ;#00ffc040;エアクラ%l;#;運用できない地域、多いですから」
2256 = "「Nếu không phải bận tâm về mặt tài chính\nthì hoàn toàn có thể.\nBởi vì khu vực ngay dưới xích đạo, có rất\nnhiều nơi không thể sử dụng \\x%lエアクラ;#00ffc040;Aircra%l;#; mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――ならば、そういう地域では、ひょっとして」
2431 = "「À——vậy thì, ở những khu vực đó, biết đâu」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、鉄道産業が生き延びてるとこも多くて。\nブラディルなんかは、車輌輸送もやってます」
2487 = "「Vâng, có rất nhiều nơi ngành công nghiệp\nđường sắt vẫn còn tồn tại.\nVí dụ như ở Brazil, họ vẫn đang sản xuất\nphương tiện đường sắt đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ブラディルか。日ノ本のまるまる、反対側だな」
2561 = "「Brazil sao. Nằm ở phía đối diện hoàn toàn\ncủa Hinomoto nhỉ.」"

# monologue
# JP: 理解した。\n特注で新造し、それをブラディルから移送。
3410 = "Tôi hiểu rồi.\nĐặt làm mới, rồi vận chuyển từ Brazil về."

# monologue
# JP: かかるコストは、靜岡-御一夜間の何十倍――\nいや、何百倍にも達してしまうかもしれん。
3755 = "Chi phí phải bỏ ra, gấp mấy chục lần đoạn\nShizuoka - Ohimitera——\nkhông, có khi lên đến mấy trăm lần cũng\nnên."

# 【ポーレット】
# display as 波萊特
# JP: 「ですから、この金額でも安いんです。\nもうものすごく」
2616 = "「Vì vậy, mức giá này vẫn còn rẻ chán.\nThực sự rất rẻ luôn.」"

# monologue
# JP: 言って、ポーレットが見積もりを出す。\n八桁――つまりは千万円代。
3571 = "Vừa nói, Paulette vừa đưa ra bảng báo giá.\nTám chữ số——tức là hàng chục triệu yên."

# monologue
# JP: 特注新造よりは安いと、理解できても……\nやはり、どうしても思ってしまう。
3323 = "Dù biết là rẻ hơn so với đặt làm mới...\nnhưng quả thực vẫn khiến người ta phải\nchùn bước."

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ。\n本当に金を失うのだな、鉄道というものは」
2424 = "「Ưm.\nNgành đường sắt này, quả thực là một cỗ\nmáy ngốn tiền nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「けれど、\x%l8620;#00ffc040;8620%l;#;活用のために絶対必要な投資です。\nこの程度の経費で済むのなら、御の字すぎます」
2268 = "「Nhưng, đây là khoản đầu tư tuyệt đối cần\nthiết để đưa \\x%l8620;#00ffc040;8620%l;#; vào hoạt động.\nNếu chỉ tốn chừng này kinh phí thì đã là\nquá may mắn rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな」
2467 = "「Ừ. Đúng vậy.」"

# monologue
# JP: その点に異論があるはずもない。
3749 = "Về điểm đó thì chắc chắn không ai phản\nđối."

# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;を入手し損ねるなら、\x%l8620;#00ffc040;8620%l;#;の復活と、\n御一夜の観光復権とをつなげ損なうのは明白だ。
3307 = "Nếu không thể có được \\x%l客車;#00ffc040;toa hành khách%l;#;, thì\nrõ ràng sự hồi sinh của \\x%l8620;#00ffc040;8620%l;#;\nvà sự phục hưng du lịch của Ohimitera sẽ\nbị đứt đoạn."

# 【双鉄】
# display as 雙鐵
# JP: 「となれば残る問題は資金調達」
2891 = "「Vậy thì vấn đề còn lại là huy động vốn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それについても、アドバイスを貰いました。\n[しゃさい,1]社債として、[てつどうさい,2]鉄道債を発行しようかと考えてます」
2828 = "「Về chuyện đó, em cũng đã nhận được lời\nkhuyên.\nEm đang tính phát hành \\x%l鉄道債;#00ffc040;trái phiếu đường sắt%l;#;\ndưới dạng trái phiếu doanh nghiệp.」"

# 【凪】
# display as 凪
# JP: 「てつどーさい？　汽車ぽっぽのお祭りやるばいっ！？」
1930 = "「Tetsudo-sai? Lễ hội của xe lửa xình xịch\ná!?」"

# 【ハチロク】
# display as 八六
# JP: 「お祭りの[さい]祭ではなく、\n債券――つまりは、ある種の借金の証券のことです」
2255 = "「Không phải là lễ hội (matsuri/sai),\nmà là trái phiếu (saiken)——tức là một loại\nchứng khoán ghi nhận khoản nợ ạ.」"

# 【凪】
# display as 凪
# JP: 「？？？」
# 2919 = "「？？？」" 

# 【ハチロク】
# display as 八六
# JP: 「みなからお金を借り、それで事業を行う。\n利益が出ればお金を返し、利益も分配する」
2569 = "「Vay tiền từ mọi người để tiến hành dự án.\nNếu có lợi nhuận thì sẽ trả lại tiền, và\nchia cả lợi nhuận nữa.」"

# monologue
# JP: 日々姫に続いてハチロクが、思わぬ知識を披露していく。
3184 = "Tiếp lời Hibiki, Hachiroku phô diễn những\nkiến thức nằm ngoài dự đoán."

# 【ハチロク】
# display as 八六
# JP: 「そうしたシステムにおいて、“お金を借りましたよ”と\n証明する証文が、つまりは債券です」
2511 = "「Trong hệ thống đó, tờ giấy chứng nhận\n\"Tôi đã mượn tiền của bạn\"\nchính là trái phiếu ạ.」"

# 【凪】
# display as 凪
# JP: 「はぁ～」
2379 = "「Hả~」"

# 【ふかみ】
# display as 深美
# JP: 「ええとね？　凪ちゃん」
2543 = "「Ừm, em hiểu chưa? Bé Nagi.」"

# monologue
# JP: わかったようなわからぬような凪に向かって、\nふかみがフォローの説明を足す。
3577 = "Nhìn Nagi có vẻ như hiểu mà lại không\nhiểu,\nFukami liền bổ sung thêm lời giải thích."

# monologue
# JP: あちらはあちらで大丈夫そうだが――
3620 = "Bên đó có vẻ ổn rồi, nhưng mà——"

# 【ハチロク】
# display as 八六
# JP: 「乱発していたのです。末期の\x%l帝鉄;#00ffc040;帝鉄%l;#;が、鉄道債を。\nなんとしても、電化を推進しようとして」
2694 = "「Họ đã phát hành bừa bãi đấy ạ. Vào thời\nkỳ cuối của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;, họ đã\nphát hành trái phiếu đường sắt một cách vô\ntội vạ.\nĐể bằng mọi giá thúc đẩy quá trình điện\nkhí hóa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2438 = "「À」"

# monologue
# JP: よほど驚いた顔でもしてしまったのだろう。\nハチロクは問うより先に答えてくれる。
3412 = "Chắc hẳn tôi đã lộ ra vẻ mặt vô cùng ngạc\nnhiên.\nHachiroku trả lời trước cả khi tôi kịp đặt\ncâu hỏi."

# 【ハチロク】
# display as 八六
# JP: 「あの時期の\x%l帝鉄;#00ffc040;帝鉄%l;#;の[てつどうさい,2]鉄道債でも、飛ぶように売れました。\n大赤字を垂れ流していたにもかかわらず、です」
2354 = "「Ngay cả \\x%l鉄道債;#00ffc040;trái phiếu đường sắt%l;#; của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;\nthời kỳ đó cũng bán đắt như tôm tươi.\nMặc dù họ đang gánh chịu những khoản lỗ\nkhổng lồ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「何故だ？　よほど利率が良かった――ああ、いや」
2714 = "「Tại sao vậy? Lãi suất quá tốt sao——à,\nkhông phải.」"

# monologue
# JP: \x%l帝鉄;#00ffc040;帝鉄%l;#;が破綻をしてしまえば、\n約束された利率も全ては反故になる。
3683 = "Nếu \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; phá sản,\nthì mọi mức lãi suất đã cam kết đều sẽ trở\nthành giấy lộn."

# monologue
# JP: そして破綻はほとんど誰の目にも見えていた、なら……
3660 = "Và việc phá sản thì hầu như ai cũng có thể\nnhìn thấy trước, vậy thì..."

# 【双鉄】
# display as 雙鐵
# JP: 「見越していたのか。\x%l帝鉄;#00ffc040;帝鉄%l;#;が破綻してしまっても、\n国が、その債権を保障してくれると」
2748 = "「Là họ đã lường trước được sao. Cho dù \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;\ncó phá sản,\nthì nhà nước vẫn sẽ bảo lãnh cho những\nkhoản nợ đó.」"

# 【ハチロク】
# display as 八六
# JP: 「と、清美機関士はわたくしに説明してくださいました。\n説明、というより……グチ、だったのかもしれませんが」
2711 = "「Người lái tàu Kiyomi đã giải thích cho\ntôi như vậy ạ.\nThay vì nói là giải thích... có lẽ giống\nnhư lời than vãn hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2479 = "「嗯」" 

# monologue
# JP: “そういう形の信用力”にも、人は乗っかる。\n“ポーレット市長”も同じ信用を持っているだろうし――
3325 = "「Người lái tàu Kiyomi đã giải thích cho\ntôi như vậy ạ.\nThay vì nói là giải thích... có lẽ giống\nnhư lời than vãn hơn.」"

# monologue
# JP: （そんなことが無くても、この規模ならば金は集まる。\n一万円が千人、それだけで一千万なのだから）
3849 = "Mọi người cũng sẽ bị thu hút bởi \"sự uy\ntín dưới hình thức đó\".\n\"Thị trưởng Paulette\" chắc chắn cũng có sự\nuy tín tương tự——"

# monologue
# JP: ボランティアの規模、利害関係者の範囲。考えればすぐ、\nこの案がいかに優れた資金調達策かがわかる。
3215 = "（Dù không có chuyện đó, với quy mô này thì\nvẫn có thể huy động được vốn.\nChỉ cần một nghìn người, mỗi người mười\nnghìn yên, là đã có mười triệu yên rồi.）"

# monologue
# JP: そして同時に、それだけに――\n期待を、そして信頼を、決して裏切ってはならぬとも。
3233 = "Quy mô của các tình nguyện viên, phạm vi\ncủa các bên liên quan. Chỉ cần suy nghĩ\nmột chút,\nlà có thể thấy ngay đây là một phương án\nhuy động vốn xuất sắc đến mức nào."

# 【双鉄】
# display as 雙鐵
# JP: 「僕としては、全面賛成だ。\x%l客車;#00ffc040;客車%l;#;についても、\n移送についても、資金調達法についても」
2596 = "「Về phần anh, anh hoàn toàn tán thành. Cả\nvề \\x%l客車;#00ffc040;toa hành khách%l;#;,\ncả về việc vận chuyển, và cả về phương\npháp huy động vốn.」"

# 【日々姫】
# display as 日日姬
# JP: 「私も、兄さんと同意見です」
2604 = "「Em cũng đồng ý với anh trai.」"

# monologue
# JP: すぐに日々姫が、そして次々、みなが賛意を示してくれる。
3483 = "Ngay sau Hibiki, mọi người lần lượt bày tỏ\nsự tán thành."

# monologue
# JP: ポーレットはほっとしたような息を吐き、\n一度僕らへと頭をさげて、すぐ勢い良くあげ直す。
3570 = "Paulette thở phào nhẹ nhõm,\ncúi đầu chào chúng tôi một cái, rồi lập\ntức ngẩng đầu lên với vẻ tràn đầy năng\nlượng."

# 【ポーレット】
# display as 波萊特
# JP: 「でしたら、この案ですぐにでもお話進めます」
2868 = "「Nếu vậy, em sẽ tiến hành phương án này\nngay lập tức.」"

# 【凪】
# display as 凪
# JP: 「決まったと？\nそしたら、汽車ぽっぽに\x%l客車;#00ffc040;客車%l;#;がつくと？」
2555 = "「Quyết định rồi sao?\nVậy là, xe lửa xình xịch sắp có \\x%l客車;#00ffc040;toa hành khách%l;#;\nrồi hả?」"

# 【ふかみ】
# display as 深美
# JP: 「そうだよ、凪ちゃん」
2663 = "「Đúng vậy đó, bé Nagi.」"

# 【凪】
# display as 凪
# JP: 「なら、乗りたか！　\nそん\x%l客車;#00ffc040;客車%l;#;、いっとう最初に乗りたかばい！」
2858 = "「Nếu vậy, em muốn đi! \nEm muốn là người đầu tiên ngồi lên \\x%l客車;#00ffc040;toa hành khách%l;#;\nđó nha!」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　そう。\nその話で、ふかみちゃんにも来てもらったの」
2440 = "「A! Đúng rồi.\nVề chuyện đó, chị cũng có việc cần nhờ\nFukami đấy.」"

# 【ふかみ】
# display as 深美
# JP: 「え？　どの話で――です？」
2403 = "「Dạ? Việc gì——cơ ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「湯医から先の\x%l客車;#00ffc040;客車%l;#;の話。\n御一夜まで、ひとまずは\x%l8620;#00ffc040;8620%l;#;に引いてもらって戻るから」
2659 = "「Chuyện về \\x%l客車;#00ffc040;toa hành khách%l;#; sau khi đến ga\nYui.\nTrước mắt, chúng ta sẽ nhờ \\x%l8620;#00ffc040;8620%l;#; kéo nó về\nOhimitera.」"

# 【ふかみ】
# display as 深美
# JP: 「ああ」
# 2417 = "「哦哦」" 

# monologue
# JP: 納得顔でふかみが頷く。\n同時に、僕も理解する。
3306 = "Fukami gật đầu vẻ đã hiểu.\nĐồng thời, tôi cũng nhận ra."

# monologue
# JP: ポーレットが会議参加を求めた相手はふかみ一人で、\n恐らく凪は、それにつきそってきたのだろうと。
3565 = "Người mà Paulette yêu cầu tham gia cuộc\nhọp chỉ có một mình Fukami,\ncó lẽ Nagi chỉ là đi theo cùng thôi."

# 【ふかみ】
# display as 深美
# JP: 「おじいちゃんたちに、\n\x%l保線;#00ffc040;保線%l;#;のことをお願いすればいいんですか？」
2368 = "「Có phải là nhờ ông nội và mọi người,\nlo việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#; đúng không ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなの。なかなか電話のタイミングがあわなくて。\n一度、レールショップでご相談できれば、って」
2675 = "「Đúng vậy. Chị mãi không tìm được lúc nào\ngọi điện thoại cho tiện.\nNên chị nghĩ, hay là bàn bạc một lần ở cửa\nhàng đường sắt luôn.」"

# 【ふかみ】
# display as 深美
# JP: 「わかりました。おじいちゃんたちに伝えておきます」
2607 = "「Em hiểu rồi. Em sẽ chuyển lời lại cho ông\nnội và mọi người ạ.」"

# monologue
# JP: ふかみの曽祖父、早瀬堰さんとそのご兄弟とは、\n水と土とのエキスパートだ。
3579 = "Ông cố của Fukami, ông Hayase Seki và các\nanh em của ông,\nlà những chuyên gia về nước và đất."

# monologue
# JP: その能力を活かし、\n御一夜鉄道の\x%l保線;#00ffc040;保線%l;#;ボランティアも務めてくれている。
3142 = "Tận dụng khả năng đó,\nhọ cũng đang làm tình nguyện viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#;\ncho Đường sắt Ohimitera."

# 【凪】
# display as 凪
# JP: 「なら決まりとね！　湯医から御一夜の最初の\x%l列車;#00ffc040;列車%l;#;、\n予約一番はウチとふかみちゃんとばい！」
2862 = "「Vậy là quyết định rồi nhé! Chuyến \\x%l列車;#00ffc040;tàu%l;#; đầu\ntiên từ Yui về Ohimitera,\nngười đặt chỗ số 1 là em và Fukami nha!」"

# 【ポーレット】
# display as 波萊特
# JP: 「って、いう希望が入ってるんですけど――\nどうでしょうか？　双鉄くん」
2637 = "「Có người đưa ra nguyện vọng như vậy đấy——\nCậu thấy sao? Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕か？　ああ、いや――そうだな、僕だ」
2455 = "「Anh sao? À, không——đúng rồi, là anh.」"

# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;として認められた今、\n僕はハチロクのオーナーであり、マスターだ。
3604 = "Bây giờ, khi đã được công nhận là một \\x%l機関士;#00ffc040;người lái tàu%l;#;\n,\ntôi là chủ sở hữu và cũng là Master của\nHachiroku."

# monologue
# JP: ならばオーナー兼マスターとして、\n僕からハチロクに意見を求めるのが筋だ。
3770 = "Nếu vậy, với tư cách là chủ sở hữu kiêm\nMaster,\ntheo lẽ thường, tôi phải hỏi ý kiến của\nHachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことなのだが、\nハチロクの意見はどうだ？」
2547 = "「Là như vậy đấy,\nHachiroku có ý kiến gì không?」"

# 【ハチロク】
# display as 八六
# JP: 「……事情を理解している者を同乗させるくらいなら、\n双鉄様と日々姫にとっても、よい練習になる気がします」
1944 = "「...Nếu cho những người hiểu rõ tình hình\nđi cùng,\nthì tôi nghĩ đây cũng sẽ là một buổi luyện\ntập tốt cho ngài Soutetsu và Hibiki ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「事情を理解している者、とは？」
2286 = "「Người hiểu rõ tình hình, nghĩa là sao?」"

# 【ハチロク】
# display as 八六
# JP: 「あくまで移送中の\x%l客車;#00ffc040;客車%l;#;への同乗であり、\n“乗客ではない”と了解しているということです」
2277 = "「Nghĩa là họ phải hiểu rõ rằng mình chỉ\nđang đi cùng trên \\x%l客車;#00ffc040;toa hành khách%l;#; đang được\nvận chuyển,\nvà \"không phải là hành khách\" ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「移送中に、トラブルがあるかもしれないってこと？」
2279 = "「Ý chị là, có thể sẽ xảy ra sự cố trong\nquá trình vận chuyển sao?」"

# 【ハチロク】
# display as 八六
# JP: 「あるでしょう、それは、確実に」
2689 = "「Chắc chắn là sẽ có ạ.」"

# monologue
# JP: ハチロクの声は静かだ。\nそれがかえって、強い説得力を感じさせる。
3182 = "Giọng nói của Hachiroku rất bình tĩnh.\nĐiều đó lại càng làm tăng thêm sức thuyết\nphục mạnh mẽ."

# 【ハチロク】
# display as 八六
# JP: 「フィッティングもしていない、しかも改造\x%l客車;#00ffc040;客車%l;#;で、\n乗員の練度も全く足りていないのですから」
2834 = "「Bởi vì chúng ta chưa hề chạy thử, hơn nữa\nđây lại là \\x%l客車;#00ffc040;toa hành khách%l;#; cải tạo,\nvà trình độ của phi hành đoàn cũng hoàn\ntoàn chưa đủ ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「う……\nなら、移送だけでやった方が」
2462 = "「Ư...\nVậy thì, chỉ vận chuyển thôi thì tốt hơn\nnhỉ.」"

# monologue
# JP: 僕より更に経験が浅いせいだろう。\n日々姫が弱気な顔を見せる。
3519 = "Có lẽ do kinh nghiệm còn non nớt hơn cả\ntôi.\nHibiki lộ vẻ yếu đuối."

# monologue
# JP: ならば義兄として、先輩として、\nその背を支えてやらねばならぬ。
3764 = "Nếu vậy, với tư cách là anh trai nuôi, là\ntiền bối,\ntôi phải làm chỗ dựa cho em ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「だから、“事情を理解しているもの”なのだな。\n同乗という扱いで、無論、料金は徴収せずに」
2618 = "「Vì vậy mới cần \"những người hiểu rõ tình\nhình\" mà.\nChỉ coi như đi cùng thôi, tất nhiên là sẽ\nkhông thu phí.」"

# 【ハチロク】
# display as 八六
# JP: 「左様です、双鉄様」
2685 = "「Đúng vậy ạ, ngài Soutetsu.」"

# monologue
# JP: どこかの時点で、“人を乗せた\x%l客車;#00ffc040;客車%l;#;を引く”\nその初めてを僕らは経験せねばならない。
3207 = "Đến một lúc nào đó, chúng tôi bắt buộc\nphải trải qua lần đầu tiên\n\"kéo một \\x%l客車;#00ffc040;toa hành khách%l;#; chở người\"."

# monologue
# JP: で、あるのなら、はじめからそうと了解している者に、\nありていに言えば練習台になってもらうのは上策だろう。
3448 = "Nếu vậy, để những người đã hiểu rõ tình\nhình từ đầu đi cùng,\nnói trắng ra là làm vật thí nghiệm, chẳng\nphải là thượng sách sao."

# 【双鉄】
# display as 雙鐵
# JP: 「そういうことだが、どうする？　凪、ふかみ。\n乗り心地は恐らく悪く、トラブルも不可避の同乗だ」
2548 = "「Là vậy đó, hai đứa thấy sao? Nagi,\nFukami.\nCảm giác ngồi chắc chắn sẽ rất tệ, và\nnhững sự cố là điều không thể tránh khỏi\nđâu.」"

# 【凪】
# display as 凪
# JP: 「望むとこばい！　どーじょーはいつでん、\n修行に一番良かとこばいっ！」
2700 = "「Đúng ý em luôn! Đi cùng lúc nào cũng là\ncách tốt nhất để tu hành mà!」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんが乗るなら、わたしも、いっしょに」
2638 = "「Nếu bé Nagi đi, thì em cũng đi cùng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。ならばポーレット、\n“事情を理解した者の同乗はＯＫ”として扱ってくれ」
2755 = "「Đã rõ. Vậy thì Paulette,\nhãy coi như \"Đồng ý cho những người hiểu\nrõ tình hình đi cùng\" nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
2608 = "「Mình hiểu rồi.」"

# monologue
# JP: メモを取りつつ立ち上がり、\nポーレットはちらり、壁の時計に視線を送る。
3304 = "Paulette vừa ghi chép vừa đứng dậy,\nliếc nhìn đồng hồ trên tường."

# 【ポーレット】
# display as 波萊特
# JP: 「じゃ、わたしこれから役所に行きます。姉妹都市の話、\n先方に、少しでも報告できること作りたいですし」
2873 = "「Vậy, bây giờ mình sẽ đến tòa thị chính.\nVề chuyện thành phố kết nghĩa,\nmình cũng muốn tạo ra một chút gì đó để có\nthể báo cáo với phía bên kia.」"

# 【双鉄】
# display as 雙鐵
# JP: 「大変だな。\n手伝えることがあったらいつでも言ってくれ」
2371 = "「Vất vả cho em rồi.\nNếu có gì cần giúp đỡ thì cứ nói với anh\nbất cứ lúc nào nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、ありがとう、双鉄くん」
2384 = "「Fufufu, cảm ơn cậu, Soutetsu.」"

# monologue
# JP: 微笑んで、\nポーレットの青い瞳は、僕からすっと外れてしまう。
3564 = "Mỉm cười,\nđôi mắt xanh biếc của Paulette khẽ lảng\ntránh tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「けど、今はわたしより、\nもっと双鉄くんの手伝いを必要な人が、きっといるから」
2266 = "「Nhưng mà, bây giờ chắc chắn có người\ncần sự giúp đỡ của Soutetsu hơn mình đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
2429 = "「A——」"

# 【双鉄】
# display as 雙鐵
# JP: 「……僕は、僕にしかできんことを、というわけか」
1936 = "「...Ý em là, anh hãy làm những việc mà chỉ\ncó anh mới làm được sao.」"

# monologue
# JP: 確かに、だ。\n僕に、僕らに、人の面倒を見ているほどの余裕などない。
3635 = "Quả thực là vậy.\nTôi, và cả chúng tôi, không có đủ thời\ngian rảnh rỗi để lo chuyện bao đồng."

# monologue
# JP: 移送を確実に終えるためにも、為すべきこと、\n準備しておけることならば、数えきれぬほどあるだろう。
3582 = "Để hoàn thành việc vận chuyển một cách\nchắc chắn, những việc cần làm,\nnhững việc có thể chuẩn bị trước, chắc\nchắn là nhiều không đếm xuể."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、ハチロク」
2653 = "「Hibiki, Hachiroku.」"

# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん」
2484 = "「Vâng, thưa anh.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら今日からは、\nもう少し訓練の密度をあげてまいりましょう」
2867 = "「Nếu vậy, từ hôm nay,\nchúng ta hãy tăng cường độ huấn luyện lên\nmột chút nhé.」"

# monologue
# JP: 強い頷き。迷わぬ言葉。\n言うまでもなく、通じ合えている。
3527 = "Những cái gật đầu mạnh mẽ. Những lời nói\nkhông chút do dự.\nKhông cần phải nói, chúng tôi đã hoàn toàn\nthấu hiểu nhau."

# 【れいな】
# display as 玲奈
# JP: 「ポーレットのおてつだいなら、\nれいながちゃあんとするのです！」
2706 = "「Nếu là giúp đỡ Paulette,\nthì Reina sẽ làm thật tốt ạ!」"

# 【ふかみ】
# display as 深美
# JP: 「あの、わたしも。\n出来ることあったら。やります。です」
2851 = "「Dạ, em cũng vậy.\nNếu có việc gì em có thể làm. Em sẽ làm.\nVâng.」"

# 【凪】
# display as 凪
# JP: 「人助けも修行のうちばい！」
2564 = "「Giúp đỡ người khác cũng là một phần của\nviệc tu hành mà!」"

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう、みんな」
2803 = "「Cảm ơn mọi người.」"

# monologue
# JP: 感じる。確かに。\n僕らはチームで、着実に育っていっていると。
3414 = "Tôi có thể cảm nhận được. Một cách rõ\nràng.\nChúng tôi là một đội, và đang trưởng thành\nmột cách vững chắc."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、動こう。\nそれぞれが、それぞれに出来ることを」
2888 = "「Vậy thì, hành động thôi.\nMỗi người hãy làm những gì mình có thể.」"
