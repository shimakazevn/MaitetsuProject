2347 = "「其中一個理由就是所謂的“漸進式升級”了。這次他們轉讓給我們的是\\x%l気動車;#00ffc040;動車%l;#;改造的\\x%l客車;#00ffc040;客運車廂%l;#;……」" 

# monologue
