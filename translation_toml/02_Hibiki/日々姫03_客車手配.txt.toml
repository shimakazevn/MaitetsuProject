# monologue
# JP: 市政はもちろん、鉄道関係のことにおいても、\n僕らがポーレットに代わってやれることはあまりに少ない。
3332 = "市政自不用說，就算在與鐵路方面相關的地方，我能代替波萊特做的事也實在是太少了。" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、\x%l客車;#00ffc040;客車%l;#;について勉強しとこうと思ったんです。\n知識があれば、フォローできる範囲も増えると思って」
2623 = "「所以，我才想要多學習一點\\x%l客車;#00ffc040;客運車廂%l;#;的知識。只要掌握了知識，我想就能多幫一點忙了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは素晴らしい考えだな。言われてみると、\n部屋でだらだら休息していた自分が恥ずかしい」
2444 = "「啊，你這個想法真值得讚賞。聽你這麼一說，我真為在房間裡懶散休息的自己感到羞愧」" 

# 【日々姫】
# display as 日日姬
# JP: 「休息も大事ですよ、もちろん。\nただ私、なにも出来なかったのが悔しくて」
2304 = "「休息當然也是很重要的。我只是為自己幫不上忙而感到不甘」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2667 = "「是嗎」" 

# monologue
# JP: 頭を、なでてやりたい気になる。
3409 = "我突然想去摸摸她的頭。" 

# monologue
# JP: が――何故か、\n伸ばそうと思ったはずの手が止まってしまう。
3156 = "但是——不知為什麼我想伸出的那隻手又停住了。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん？」
2416 = "「哥哥？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――\nその、なんだ。勉強なら僕も一緒にしよう」
2248 = "「不——那，對了。要學習的話我也一起學吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「うふふ、兄さんならそう言ってくれると思ってました」
2496 = "「嘿嘿嘿，我就知道哥哥會這麼說的」" 

# monologue
# JP: それ以上は何も言わず、\n日々姫とふたり、次の間へ入る。
3590 = "然後我不再說什麼，和日日姬兩個人一起進入了隔壁那間房間。" 

# monologue
# JP: 例の如くに資料を漁れば、\n日々姫はちょこんと床に座ってそれを広げる。
3240 = "和先前一樣翻找了一番資料後，日日姬輕輕地坐到地板上攤開那些資料。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、ここで読むのか？」
2574 = "「怎麼，你要在這裡看嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「私、気付いたんです。部屋に全部を持っていくより、\n使えそうなもの、ここでチョイスした方がいいって」
2503 = "「因為我發覺呀，比起把資料全部拿回房間裡去，還不如在這裡就選好哪些是有用的呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、道理だ」
2357 = "「原來如此，有道理」" 

# monologue
# JP: ならば僕の役割は、“\x%l客車;#00ffc040;客車%l;#;”がらみの目につく全てを、\n日々姫のもとへ、せっせと運ぶことだろう。
3767 = "那我的職責就是將所有有關“\\x%l客車;#00ffc040;客運車廂%l;#;”的資料迅速拿給日日姬。" 

# monologue
# JP: （意識してみると、\n\x%l客車;#00ffc040;客車%l;#;の映っている写真は随分多いのだな）
3866 = "（認真一看，拍到\\x%l客車;#00ffc040;客運車廂%l;#;的照片還真是多啊）" 

# monologue
# JP: 機関車単体、などというものが少ないのだ。\n貨物\x%l列車;#00ffc040;列車%l;#;でないのなら、当然に\x%l客車;#00ffc040;客車%l;#;が引かれている。
3213 = "只拍機車單體的照片挺少的。只要不是拖著\\x%l貨車;#00ffc040;貨運車廂%l;#;的話，當然就是拖著\\x%l客車;#00ffc040;客運車廂%l;#;了。" 

# monologue
# JP: ざらざらそれらを集めて行けば、\n今度は中身――\x%l客車;#00ffc040;客車%l;#;内部の資料が少ないとも気付く。
3260 = "在粗略地收集這些照片的過程中，又發現它的裡面——\\x%l客車;#00ffc040;客運車廂%l;#;內部的資料也很少。" 

# monologue
# JP: （これは困るな。いや――ああ、そうか。\n鉄道本より、観光\x%l列車;#00ffc040;列車%l;#;のパンフレットなどの方が――）
3874 = "（這可麻煩了。不——啊，對了。比起鐵路的書來，觀光\\x%l列車;#00ffc040;列車%l;#;的小冊子應該更有希望——）" 

# monologue
# JP: 意識を変えれば、求めるものが見つかり始める。\nしかし……ポーレットが感動したわけだ。
3107 = "一改變認識，所想找的東西就開始自己出來了。不過……怪不得波萊特會那麼感動。" 

# monologue
# JP: 少しは知識を重ねてこれた今ならば、\n汰斗さんの蔵書の価値の高さがわかる。
3748 = "逐漸積累了不少知識的我現在終於開始理解汰斗老爺的藏書有多麼高的價值了。" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……そか、窓の大きさも重要なのか」
2433 = "「啊……是這樣啊，窗體的大小也很重要啊」" 

# monologue
# JP: 僕が運びこむ資料を次々眺め、\n休むこと無く日々姫はメモし、スケッチしていく。
3272 = "她一本本翻看著我拿來的資料，然後不停地記著筆記，畫著素描。" 

# 【日々姫】
# display as 日日姬
# JP: 「あれ？　これ、肘掛けがなんか変わった形？\nここ……別角度の写真欲しいなぁ」
2405 = "「哎？這個扶手的形狀是不是有點怪啊？我想看一下……別的角度的照片」" 

# monologue
# JP: 興が乗ってきているらしく、体育座りの両膝が、\n弾むようにして開かれ閉じられを繰り返す。
3146 = "似乎是呼應她逐漸高漲的興致，她擺成體育坐姿的雙膝也開始隨之一開一合。" 

# monologue
# JP: （うむ？　日々姫のショートパンツから、\n下着が見えてしまいそうだな）
3839 = "（唔？從日日姬的短褲縫裡似乎能看到她的內褲……）" 

# monologue
# JP: れいなの大声が発端となったパンツ騒動からこちら、\nどうにも妙に、その辺を意識してしまうようになった。
3344 = "從那次玲奈的大聲喊叫引發的內褲騷動開始，總覺得注意力會不由自主地往這邊集中。" 

# monologue
# JP: が、せっかくの集中を削いでしまうのも気の毒だ。\n見ぬことにして、僕は資料を集め続けよう。
3158 = "但難得日日姬那麼認真，要是去分散她的集中力那就太可惜了。我就當作沒看見，繼續尋找資料吧。" 

# monologue
# JP: （……どうした、僕。\n今すべきことは、資料集めだ）
3809 = "（……我到底怎麼了。現在應該做的是收集資料啊）" 

# monologue
# JP: わかっている。が、なぜかは知らねど動けない。\n日々姫のショートパンツの裾から――
3430 = "我雖然明明知道。但不知怎麼的，身體就是動不了。視線完全無法從日日姬的短褲的褲腿間——" 

# monologue
# JP: 足の閉じ、開きにつれて、ひらひら動くその姿から、\nどうにも視線を外せなくなる。
3760 = "還有她不停把腿張開又合上的樣子上移開。" 

# monologue
# JP: （少しおかしいぞ。しっかりするんだ。\n下着が例え見えたとて、なにほどのこともないだろう）
3862 = "（有點奇怪了。要專注一點才行。就算看到了內褲也沒什麼大不了的吧）" 

# monologue
# JP: 右田家で、レールショップで。\n多くの女性と仕事を、生活を共にしている。
3256 = "在右田家也好，在鐵路商店也好。和這麼多的女性在一起工作、生活。" 

# monologue
# JP: スカートの奥など、隠されている場所が見えてしまうのも、\n長い時間を過ごすうちには、そう珍しくも無いことだ。
3255 = "在一起度過了這麼長時間，看見裙子裡面這種隱秘的地方都習以為常了。" 

# monologue
# JP: （誰の、どこが見えようと、今まで一度も……\n目を離せなくなることなどは、なかったのに――）
3829 = "（但是，不管之前看到過誰的什麼地方，還沒有一次像現在這樣……連視線都無法移開——）" 

# monologue
# JP: だから、探す。\n目を離せなくなった理由を。
3436 = "所以我開始尋找無法移開視線的原因。" 

# monologue
# JP: 原因をつきとめることができれば、\n問題は必ず、解決出来る。
3217 = "只要能找到原因的話，那就一定能解決問題。" 

# monologue
# JP: （今までと、何が違うんだ。\n――日々姫、だからか？）
3837 = "（和之前到底有什麼不同的地方。——還是因為是日日姬的緣故嗎？）" 

# monologue
# JP: 意識をすれば、気付いてしまう。\n日々姫の寝間着は、ひどく、薄い。
3104 = "一意識這個問題，我才注意到。日日姬的睡衣特別薄。" 

# monologue
# JP: いや……これは、キャミソールとかネグリジェとかいう、\nそんな類の、下着に近いものではないのか。
3111 = "不……這應該是細吊帶小背心或者是吊帶睡袍那種接近內衣的衣服吧。" 

# monologue
# JP: （だから、それがなんだというんだ）
3855 = "（所以說，就算是又怎麼樣）" 

# monologue
# JP: 僕らは一緒に風呂にも何度も入っている。\n日々姫の肌も、当然何度も目にしている。
3374 = "我們在一起洗過好幾次澡。日日姬的身體當然也看過好幾次了。" 

# monologue
# JP: それなのに、なぜ――
3771 = "那為什麼——" 

# 【日々姫】
# display as 日日姬
# JP: 「ね？　にぃに、ちょっとここ見て？」
2801 = "「話說阿哥，你看看這裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2494 = "「嗯？」" 

# monologue
# JP: 声をかけられ、ホっとする。\nようやく、目線を動かせる。
3276 = "她喊了我一聲之後我終於鬆了口氣。視線終於能移動了。" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%l客車;#00ffc040;客車%l;#;って、大きく分けると、\nこの長い座席のと、箱型の座席のとだけど――」
1909 = "「\\x%l客車;#00ffc040;客運車廂%l;#;可以大體分為這種長座位的和箱型座位的——」" 

# monologue
# JP: （んっ――くっ）
3842 = "（嗯——唔）" 

# monologue
# JP: 日々姫の声が聞こえなくなる。
3405 = "我漸漸開始聽不見日日姬的聲音。" 

# monologue
# JP: 鼓膜は震えているのだが、\nその意味が全くわからなくなる。
3786 = "雖然鼓膜還在震動，可大腦根本不能理解它傳來的意思。" 

# monologue
# JP: （胸元も――なんと危ういのだ）
3864 = "（胸口也——快要露出來了……）" 

# monologue
# JP: 薄いだけでなく、日々姫の寝間着は緩いらしい。
3500 = "日日姬的睡衣不但薄，而且還顯得鬆鬆垮垮的。" 

# monologue
# JP: 大きく開いた胸元からは、\nそのささやかな膨らみが、今にものぞいてしまいそうだ。
3295 = "她胸前衣襟大開的地方幾乎都能窺見那裡面微微的隆起了。" 

# monologue
# JP: （日々姫の肌……桃色に染まって汗ばんでいるな。\n暑いのか？　いや……確かに、暑い）
3860 = "（日日姬的皮膚……不僅染成了桃紅色，而且還微微冒汗了。是太熱的緣故嗎？不……確實是很熱）" 

# monologue
# JP: 気温など、全く気にもならなかったが、\n今夜は、ひどく蒸すようだ。
3123 = "之前一直沒有在意過氣溫，但今晚卻真的像蒸籠一樣熱。" 

# monologue
# JP: いや――僕も汗ばみ、肌には熱を感じているのに、\n喉は、不思議と乾いている。
3109 = "不——我也渾身沁著汗濕淋淋的，皮膚表面也很燙，但喉嚨卻莫名覺得很乾。" 

# 【日々姫】
# display as 日日姬
# JP: 「――――兄さん」
1912 = "「————哥哥！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2914 = "「！」" 

# monologue
# JP: 日々姫は手元のスケッチブックを見ていない。\n僕をまっすぐ、ただまっすぐに見つめている。
3495 = "日日姬沒有在看手邊的素描本。她只是直勾勾地盯著我。" 

# monologue
# JP: どきん、どきんと――日々姫に触れられていないのに、\n日々姫の胸から伝わってきた、あの時と同じ鼓動を感じる。
3250 = "噗通，噗通——明明日日姬沒有碰到我，卻好像感覺到了從她胸口傳來的，和那時候一樣的心跳。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん。\n今度は…………どう――ですか？」
2409 = "「哥哥。現在…………怎麼樣呢？」" 

# monologue
# JP: 日々姫も喉が乾いているのか、\nぺろり、その舌が唇を舐める。
3486 = "日日姬似乎也很渴的樣子，她用舌頭舔了一下嘴唇。" 

# monologue
# JP: 唾液で濡れて、唇がその赤みを増す。\nそうしてゆっくり、また唇が開かれ――
3249 = "嘴唇被唾液潤濕後又增加了幾分紅艷。然後兩片嘴唇又緩緩張開——" 

# 【双鉄】
# display as 雙鐵
# JP: 「どう、とは――何が、だ」
2297 = "「什麼——怎麼，辦」" 

# 【日々姫】
# display as 日日姬
# JP: 「ですから……その……\nそわそわ、とか――うずうず、と、か」
2540 = "「就是……那個……比如心神不定啊……坐立不安……之類的」" 

# monologue
# JP: （ジリリリリ！　ジリリリリ！）
3832 = "（叮鈴鈴鈴鈴！叮鈴鈴鈴鈴！）" 

# 【日々姫】
# display as 日日姬＆雙鐵
# JP: 「ひゃうんっ！！？」\n「っ！！」
2427 = "「唔哇！！？」\\n「！！」" 

# monologue
# JP: 電話だ。
3521 = "是電話響了。" 

# monologue
# JP: 居間で響いているはずなのに、\nまるで耳元のように感じた。
3515 = "明明是在客廳裡響的，我卻感覺就在耳邊一樣。" 

# 【日々姫】
# display as 日日姬
# JP: 「あの……えとっ――」
2849 = "「那個……呃——」" 

# monologue
# JP: 日々姫が、真っ赤になっている。
3498 = "日日姬滿臉通紅。" 

# monologue
# JP: さきほどまでの、酒によったような朱ではなく、\n見慣れた、照れているときの真っ赤に。
3115 = "不是剛才那種酒紅色，而是我很熟悉的那種害羞時顯現出來的通紅的顏色。" 

# 【双鉄】
# display as 雙鐵
# JP: 「電話だな」
2690 = "「有電話來了」" 

# monologue
# JP: 何をいうべきかわからない。\n何をいいたいかわからない。
3371 = "我不知道該說什麼。也不知道自己想說什麼。" 

# monologue
# JP: だからただ、思いつくままを言葉にすれば、\n日々姫はほう――っと、長い、長い長い息を吐く。
3434 = "所以我只能單純把心裡想到的表達出來。於是日日姬呼——地長吐了一口氣。" 

# 【日々姫】
# display as 日日姬
# JP: 「電話ですね、こんな時間に――っ！？」
2894 = "「都這麼晚了還有電話呀——啊！？」" 

# monologue
# JP: 日々姫が気づいた顔になる。\nと、いうか、そうだ。
3480 = "日日姬一副終於反應過來的表情。對，對了。" 

# monologue
# JP: こんな時間にかかってくるのは、\n悪い知らせか、それとも逆に――
3756 = "這種時候還有電話打來，不是有壞消息，就是剛好相反——" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、双ちゃん、\nポーちゃんから電話と」
2536 = "「小雙，小雙，小波來電話了！」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　早く、早くお出になってください！」
2904 = "「雙鐵少爺！請快點，快點去接！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今行く！」
2603 = "「我現在就去！」" 

# monologue
# JP: やはりだ。
3533 = "果然是這樣。" 

# monologue
# JP: ポーレットがこの時間にかけてきたなら、\n思いあたる用件は、ひとつしか無い。
3563 = "波萊特在這個時候打電話來，能想到的事只有一件。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――っと？　どうした、日々姫」
1914 = "「——嗯？怎麼了，日日姬？」" 

# monologue
# JP: 僕に続こうと浮いた踵が、\nけれどもぴたり、下りている。
3545 = "正打算跟我一起邁開腳步的日日姬又退了回去。" 

# 【日々姫】
# display as 日日姬
# JP: 「わ、私――あの――こんな格好やけんっ！！」
2584 = "「我——那個——穿這身衣服見不了人啦！！」" 

# monologue
# JP: 逃げた。日々姫が。\nそうとしかいいようの無い、脱兎ぶり。
3507 = "日日姬逃走了。她一溜煙跑走的樣子只能用“逃”來形容。" 

# 【ハチロク】
# display as 八六
# JP: 「なにをなさってらっしゃるのです？　双鉄様！\n早く！　お早くっ！！」
