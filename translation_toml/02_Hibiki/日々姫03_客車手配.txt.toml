# 【ハチロク】
# display as 八六
# JP: 「あくまで移送中の\x%l客車;#00ffc040;客車%l;#;への同乗であり、\n“乗客ではない”と了解しているということです」
2277 = "「也就是知道自己只是運送中的\\x%l客車;#00ffc040;客運車廂%l;#;的試乘者，而“不是乘客”的人」" 

# 【日々姫】
# display as 日日姬
# JP: 「移送中に、トラブルがあるかもしれないってこと？」
2279 = "「也就是說在運送中途可能會遇到什麼麻煩嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「あるでしょう、それは、確実に」
2689 = "「有的吧，肯定會有」" 

# monologue
# JP: ハチロクの声は静かだ。\nそれがかえって、強い説得力を感じさせる。
3182 = "八六平靜地說道。不過這反而讓人覺得有強大的說服力。" 

# 【ハチロク】
# display as 八六
# JP: 「フィッティングもしていない、しかも改造\x%l客車;#00ffc040;客車%l;#;で、\n乗員の練度も全く足りていないのですから」
2834 = "「這節改造而成的\\x%l客車;#00ffc040;客運車廂%l;#;既沒有進行磨合運行，其乘務組的熟練度也還完全不夠」" 

# 【日々姫】
# display as 日日姬
# JP: 「う……\nなら、移送だけでやった方が」
2462 = "「嗚……那隻執行運送任務不是更好嗎？」" 

# monologue
# JP: 僕より更に経験が浅いせいだろう。\n日々姫が弱気な顔を見せる。
3519 = "是因為她的經驗比我還少的緣故吧。日日姬露出了怯弱的表情。" 

# monologue
# JP: ならば義兄として、先輩として、\nその背を支えてやらねばならぬ。
3764 = "那我作為她的義兄和前輩，就必須要當好她的靠山才行。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、“事情を理解しているもの”なのだな。\n同乗という扱いで、無論、料金は徴収せずに」
2618 = "「所以才要“了解情況的伙伴”對吧。只視為試乘者，當然也不收車費」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です、双鉄様」
2685 = "「是的，雙鐵少爺」" 

# monologue
# JP: どこかの時点で、“人を乗せた\x%l客車;#00ffc040;客車%l;#;を引く”\nその初めてを僕らは経験せねばならない。
3207 = "反正我遲早要第一次“牽引載有乘客的\\x%l客車;#00ffc040;客運車廂%l;#;”。" 

# monologue
# JP: で、あるのなら、はじめからそうと了解している者に、\nありていに言えば練習台になってもらうのは上策だろう。
3448 = "既然如此，還不如一開始就讓了解情況的人去坐，或者說白了，用他們當實驗品才是上策。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういうことだが、どうする？　凪、ふかみ。\n乗り心地は恐らく悪く、トラブルも不可避の同乗だ」
2548 = "「就是這麼回事了，你們怎麼想呢？凪，深美。恐怕你們的搭車體驗會很差，而且路上肯定會遇到麻煩」" 

# 【凪】
# display as 凪
# JP: 「望むとこばい！　どーじょーはいつでん、\n修行に一番良かとこばいっ！」
2700 = "「正合咱意啦！管它是屍城還是試乘，一聽就感覺特適合修行！」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんが乗るなら、わたしも、いっしょに」
2638 = "「既然小凪要乘，那我也一起乘」" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。ならばポーレット、\n“事情を理解した者の同乗はＯＫ”として扱ってくれ」
2755 = "「知道了。那麼波萊特，你就認為是“同意了解情況的人員試乘”吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
2608 = "「我知道了」" 

# monologue
# JP: メモを取りつつ立ち上がり、\nポーレットはちらり、壁の時計に視線を送る。
3304 = "她邊記著筆記邊站起身，然後用視線瞥了一眼牆上的時鐘。" 

# 【ポーレット】
# display as 波萊特
# JP: 「じゃ、わたしこれから役所に行きます。姉妹都市の話、\n先方に、少しでも報告できること作りたいですし」
2873 = "「那我現在就到市政府去了。關於姐妹城市那方面，我也想至少先做一點能向對方報告的事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大変だな。\n手伝えることがあったらいつでも言ってくれ」
2371 = "「可真辛苦啊。要是有我能幫上忙的事請隨時跟我說」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、ありがとう、双鉄くん」
2384 = "「呵呵呵，謝謝你，雙鐵君」" 

# monologue
# JP: 微笑んで、\nポーレットの青い瞳は、僕からすっと外れてしまう。
3564 = "波萊特微笑著，將她那雙藍色的眼睛從我身上移開。" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど、今はわたしより、\nもっと双鉄くんの手伝いを必要な人が、きっといるから」
2266 = "「不過比起我來，現在應該有更需要雙鐵君幫忙的人吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
2429 = "「啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕は、僕にしかできんことを、というわけか」
1936 = "「……也就是說讓我去做只有我才能做到的事嗎」" 

# monologue
# JP: 確かに、だ。\n僕に、僕らに、人の面倒を見ているほどの余裕などない。
3635 = "確實。我，我們當前還沒有幫別人解決麻煩的餘力。" 

# monologue
# JP: 移送を確実に終えるためにも、為すべきこと、\n準備しておけることならば、数えきれぬほどあるだろう。
3582 = "為了能夠順利完成運送工作，我們還有很多必須要做的事，有很多需要準備的事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、ハチロク」
2653 = "「日日姬，八六」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん」
2484 = "「嗯，哥哥！」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら今日からは、\nもう少し訓練の密度をあげてまいりましょう」
2867 = "「那我們從今天開始就再加大一點訓練的強度吧！」" 

# monologue
# JP: 強い頷き。迷わぬ言葉。\n言うまでもなく、通じ合えている。
3527 = "有力的點頭。毫不猶豫的回答。毫無疑問，我們是心有靈犀的。" 

# 【れいな】
# display as 玲奈
# JP: 「ポーレットのおてつだいなら、\nれいながちゃあんとするのです！」
2706 = "「波萊特那邊玲奈會好好幫忙的！」" 

# 【ふかみ】
# display as 深美
# JP: 「あの、わたしも。\n出来ることあったら。やります。です」
2851 = "「那個，只要是我能做得到的。我也願意幫忙。嗯」" 

# 【凪】
# display as 凪
# JP: 「人助けも修行のうちばい！」
2564 = "「幫助別人也是修行的一部分嘛！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう、みんな」
2803 = "「謝謝大家」" 

# monologue
# JP: 感じる。確かに。\n僕らはチームで、着実に育っていっていると。
3414 = "我能切身感受得到。我們整個隊伍都在扎紮實實地成長著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、動こう。\nそれぞれが、それぞれに出来ることを」
2888 = "「那麼，開始行動吧！大家各自去做自己力所能及的事！」" 
