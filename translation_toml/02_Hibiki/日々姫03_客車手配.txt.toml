3184 = "八六接著日日姬的話頭說道，講述起出乎我意料之外的知識。" 

# 【ハチロク】
# display as 八六
# JP: 「そうしたシステムにおいて、“お金を借りましたよ”と\n証明する証文が、つまりは債券です」
2511 = "「在這種體系裡用來證明“我們借了你的錢”的字據就是債券」" 

# 【凪】
# display as 凪
# JP: 「はぁ～」
2379 = "「呃哦～」" 

# 【ふかみ】
# display as 深美
# JP: 「ええとね？　凪ちゃん」
2543 = "「就是說，小凪」" 

# monologue
# JP: わかったようなわからぬような凪に向かって、\nふかみがフォローの説明を足す。
3577 = "深美對仍然半知半解的凪進一步說明起來。" 

# monologue
# JP: あちらはあちらで大丈夫そうだが――
3620 = "看來那邊應該不要緊了——" 

# 【ハチロク】
# display as 八六
# JP: 「乱発していたのです。末期の\x%l帝鉄;#00ffc040;帝鉄%l;#;が、鉄道債を。\nなんとしても、電化を推進しようとして」
2694 = "「末期的\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;，可是在完全濫發鐵路債券。聽說他們那時激進地想推進鐵路電氣化來著」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2438 = "「啊」" 

