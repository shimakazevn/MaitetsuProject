# monologue
# JP: わからぬ理由を探してみれば、\nついつい、視線はハチロクへ向く。
3416 = "我腦海中思索著其中的緣由，視線則不自覺投向了八六。" 

# 【ハチロク】
# display as 八六
# JP: 「ロングシートは今ひとつ観光\x%l列車;#00ffc040;列車%l;#;らしくありませんが、\nそれを割り引いても、願ったり叶ったりのお話ですね」
2897 = "「長座型雖然不太符合觀光\\x%l列車;#00ffc040;列車%l;#;的風格，但即使如此這仍是我們求之不得的」" 

# 【凪】
# display as 凪
