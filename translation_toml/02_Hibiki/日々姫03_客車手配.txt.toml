# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、もちろん、物だ。\n寿命があるのは当然だ、が――
88 = "\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;當然是物品。所以有壽命也是理所當然的，不過——" 

