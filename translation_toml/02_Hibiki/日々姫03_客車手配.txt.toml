2717 = "「特別訂製新造？這也能辦得到嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「財政的なことを考えなければ、できますよ。\n赤道直下は、\x%lエアクラ;#00ffc040;エアクラ%l;#;運用できない地域、多いですから」
2256 = "「不考慮財政方面的因素的話，當然可以了。赤道正下方的區域可是有很多地域不能使用\\x%lエアクラ;#00ffc040;空凝機%l;#;的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――ならば、そういう地域では、ひょっとして」
2431 = "「啊——那這些地域難不成……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、鉄道産業が生き延びてるとこも多くて。\nブラディルなんかは、車輌輸送もやってます」
2487 = "「嗯，很多地方的鐵路產業還繼續存活著。巴西那邊還在做車輛運送呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ブラディルか。日ノ本のまるまる、反対側だな」
2561 = "「巴西嗎。它可是正好處在日本的正對面啊」" 

# monologue
# JP: 理解した。\n特注で新造し、それをブラディルから移送。
3410 = "我總算理解了。特別訂製新造一輛，然後從巴西運送過來。" 

# monologue
