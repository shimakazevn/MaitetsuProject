# 【双鉄】
# display as 雙鐵
# JP: 「靜岡[すんたい,1]駿袋鉄道？」
2911 = "「靜岡駿袋鐵路？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。靜岡県は[するが,1]駿川から、[ふくろい,1]袋衣までをつなぐ、\n[はんかんはんみん,3]半官半民の鉄道会社です」
