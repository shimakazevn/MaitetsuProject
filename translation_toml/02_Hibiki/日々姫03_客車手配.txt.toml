# 【ハチロク】
# display as 八六
# JP: 「お祭りの[さい]祭ではなく、\n債券――つまりは、ある種の借金の証券のことです」
2255 = "「不是“仔犬”，是“債券”——也就是一種表示借款的憑據」" 

# 【凪】
# display as 凪
# JP: 「？？？」
# 2919 = "「？？？」" 

# 【ハチロク】
# display as 八六
# JP: 「みなからお金を借り、それで事業を行う。\n利益が出ればお金を返し、利益も分配する」
2569 = "「從大家那裡借錢然後運營事業。要是有利益的話就歸還本金，還會分配利益」" 

# monologue
