# display as 雙鐵
# JP: 「もしもし、僕だ、双鉄だ。\n\x%l客車;#00ffc040;客車%l;#;か？　――やはりか！ 見つかったのか！！」
2458 = "「喂，是我，雙鐵。\\x%l客車;#00ffc040;客運車廂%l;#;嗎？——果然嗎！找到了啊！！」" 

# monologue
# JP: 明けて、朝。
