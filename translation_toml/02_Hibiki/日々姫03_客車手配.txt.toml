2328 = "「來了新的車輛，\\x%l気動車;#00ffc040;動車%l;#;改造成的\\x%l客車;#00ffc040;客運車廂%l;#;就空出來了——哇，所以叫“漸進式升級”啊！就像瓊脂一樣被擠出來，吱溜地」" 

# monologue
