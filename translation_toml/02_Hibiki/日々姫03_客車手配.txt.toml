2268 = "「不過，這對要活用\\x%l8620;#00ffc040;８６２０%l;#;來說是絕對必要的投資。用這麼點經費就能解決問題簡直就是天上掉餡餅了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな」
2467 = "「嗯。也是」" 

# monologue
# JP: その点に異論があるはずもない。
3749 = "這一點我倒是沒什麼異議。" 

# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;を入手し損ねるなら、\x%l8620;#00ffc040;8620%l;#;の復活と、\n御一夜の観光復権とをつなげ損なうのは明白だ。
3307 = "如果不能順利拿到\\x%l客車;#00ffc040;客運車廂%l;#;的話，\\x%l8620;#00ffc040;８６２０%l;#;的復活和御一夜的觀光復興也就連帶著命懸一線了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「となれば残る問題は資金調達」
2891 = "「那，接下來的問題就是籌措資金了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それについても、アドバイスを貰いました。\n[しゃさい,1]社債として、[てつどうさい,2]鉄道債を発行しようかと考えてます」
