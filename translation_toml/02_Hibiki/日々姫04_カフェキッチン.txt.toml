# display as 雙鐵
# JP: 「ああ、レイアウトや飾り物を楽しそうに見て――\n僕のことなどまるで気にせぬ」
1941 = "「嗯，來的小孩子總是在開心地看著店內的設計和裝飾，完全不把我放在眼裡」" 

# 【ポーレット】
# display as 波萊特
# JP: 「知らなかった、そんなの」
2080 = "「我還真不知道有這回事」" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、ポーレットさんに聞きたくて。\nレールショップ、どういう風にインテリアしたかとか」
2090 = "「所以我們想問你，鐵路商店是怎麼做內裝的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えええ！？」
1849 = "「哎哎哎？！」" 

# monologue
# JP: 日々姫の頼みに、けれどポーレットの眉は、\nますますへちょんと下がってしまう。
2460 = "但對於日日姬的請求，波萊特的眉頭皺得更誇張了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「別に……あの――わたし、インテリアとか――\nただ、小さいときから、鉄道廃品とか好きで、その」
1734 = "「也沒什麼……其實，我才不懂什麼內裝。只不過，我從小就喜歡鐵路廢品，所以……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道廃品」
2298 = "「鐵路廢品」" 

# monologue
# JP: 外見だけを見るならば、これほどポーレットに\n似合わぬ言葉もなかろうが。
2522 = "如果光看外表的話，確實沒有比波萊特說的這個詞更加貼切的了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「大廃線で、いくらでも手に入る感じになって。\nでも、お部屋――その、置き場所に限界があるから」
1969 = "「因為大廢線，鐵路廢品變得怎麼拿都拿不完。但是，房間裡能放的地方有限」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、ではレールショップは……\nこういってはなんだがコレクションの余剰の」
2035 = "「居然還有這回事，聽你這麼一說……那鐵路商店好像就是給你存放剩餘收藏品的地方了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「違います、逆です！　人がたくさん来る場所だから、\nええと……自慢のものばかりのコレクションケースに」
1707 = "「不不不，正好相反！因為鐵路商店有很多人來，呃……所以我把它當成是炫耀自己藏品的收藏櫃了」" 

# 【日々姫】
# display as 日日姬
# JP: 「コレクションケース！」
2096 = "「收藏櫃！」" 

# monologue
# JP: 日々姫のスイッチが入ったらしい。\nスケッチブックに、何かを猛然と描き込み始める。
2652 = "日日姬似乎進入狀態了。她氣勢磅礴地開始在素描簿上揮起筆來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、よかったぁ。\nわたし、お役にたてたみたいで」
1896 = "「啊，太好了。我似乎幫上忙了」" 

# 【れいな】
# display as 玲奈
# JP: 「ポーレットぉ！　ポーレットぉ！　凪さんたち」
2170 = "「波萊特！波萊特！凪小姐，你們也在」" 

# 【凪】
# display as 凪
# JP: 「マカロンいうの、どぎゃんお菓子とー！？」
2317 = "「馬卡龍是什麼樣的點心啊？！」" 

# 【ふかみ】
# display as 深美
# JP: 「あの、私、も。ポーレットさんの手作りマカロン。\n食べてみたい、です」
1769 = "「其實，我也是。我想吃波萊特小姐親手做的馬卡龍，嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええ？　すぐに作るのは無理だけど――\nあ、ちょっと、いってきていいですか？」
1858 = "「哎？現在沒辦法馬上做啦。啊，我可以過去一下嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。\nメニュー面でも、ポーレットには期待している」
2188 = "「當然。在菜單方面我對你也抱有很大期待哦」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あはは、ありがとうございます！　それならわたし、\n期待に応えられるように、がんばっちゃいますね！」
1847 = "「哈哈，謝謝！　我會努力不辜負你的期待！」" 

# monologue
# JP: ポーレットがぱたぱたとキッチンへ。
2661 = "波萊特往廚房跑去。" 

# monologue
# JP: 日々姫を見れば――ああ……。そうか、なるほど。\nコレクションケースという言葉を、日々姫は――
2601 = "我轉身看向日日姬，啊……對，日日姬是對“收藏櫃”這個詞——" 

# 【双鉄】
# display as 雙鐵
# JP: 「『みんなにとってのコレクションケース』に\nするのだな？」
2141 = "「是要弄成“大家的收藏櫃”對嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。写真とか絵。[ハチロク,3]8620とか、[レイナナ,4]キハ07sとか、\nみかん鉄道から乗り入れてきてくれるこたちとかの」
1918 = "「嗯。像[八六,3]８６２０啊，[０７,6]Ｋｉｈａ０７Ｓ啊，還有從橙鐵路開進來的火車，店要貼上這些孩子的照片和畫」" 

# monologue
# JP: 日々姫のスケッチブックの中では、\nたくさんの絵や写真たちが店内を囲み見守っている。
2503 = "在日日姬的素描簿中，無數的繪畫與照片包圍、注視著店內。" 

# 【日々姫】
# display as 日日姬
# JP: 「月替りでテーマを決めて、募集して。\n来た作品を、みぃんな飾れるようにするの」
1703 = "「一個月決定一次主題，並徵集作品。將徵集來的作品都裝飾在裡面」" 

# 【双鉄】
# display as 雙鐵
# JP: 「みんなか？　スペース的に無理がでるのでは」
1767 = "「全部？地方可能會不夠吧？」" 

# 【日々姫】
# display as 日日姬
# JP: 「もしそんなにたくさんの作品が来たら、\n第一週はこの作品たち、第二週はこの作品たちって」
1986 = "「如果真的收到了這麼多的作品，就分兩批來，一週換一批」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。そのテーマの期間内で、\nさらに時間制限をつけて、入れ換えすればいいわけか」
1865 = "「哦，對。在對應主題的期間再設定時間限制，一批一批地換就行了」" 

# monologue
# JP: これは……なかなか、\nいや、相当にうまいやり方かもしれん。
2745 = "這……或許是個很不錯，不，是相當高明的方法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「自分の絵や写真が飾られていたら、\nそれはやはり、見に行きたくなるものだろうしな」
1989 = "「如果自己的繪畫和照片被裝飾在店內，那本人肯定也會想去看的吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「ね！　それに、例えば自分の描いた[ハチロク,3]8620の絵が\n飾ってあるときに、石炭のお菓子がメニューにあったら」
2012 = "「對吧！而且比如說，當自己畫的[八六,3]８６２０的畫被裝飾起來時，菜單上正好有煤炭點心的話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「食べたくなるな。そしてあの価格と味を両立できる\n山崎さんのメニューだ」
2210 = "「肯定就會想吃了。而且山崎小姐的菜單可是兼顧了低價格與好味道的」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　きっと、一回でも食べてもらえたら、\nそのあとは、『また食べたい』ってなると思う」
1936 = "「嗯！吃了一次，下次肯定會想再吃的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。山崎さんがよければこの案で行こう。\nあとは、メニュー候補の方だが」
1924 = "「嗯。如果山崎小姐不介意的話，就採用這個方案吧。接下來就剩挑選菜品了」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2309 = "「雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。ああ――まとまったのか」
2110 = "「是八六啊。噢，你整理好了啊」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。こちらに記しておきました」
2138 = "「是的，都記錄在這邊了」" 

# monologue
# JP: 僕も持ってる乗務手帳のメモ欄には、\nいかにもハチロクな、几帳面な文字がずらり――おお。
2499 = "在我也有一本的乘務筆記的備忘錄一欄，留下了八六那工整的字跡。啊……" 

# 【双鉄】
# display as 雙鐵
# JP: 「すごいな、これは。\nこんなにもアイディアが出たか」
1978 = "「太棒了。居然收集了這麼多點子啊」" 

# 【ふかみ】
# display as 深美
# JP: 「アイディア……なの、かな？\nなんか、凪ちゃんの食べたいものばっかりかも、です」
2260 = "「這算點子嗎？感覺都是小凪自己想吃的東西，嗯」" 

# 【凪】
# display as 凪
# JP: 「仕方なかばい！　フランク料理も炭鉱料理も、\nおいしそうなものばっかりやけん！」
2161 = "「沒辦法咧！法國菜和煤礦料理好像都很好吃！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「凪ちゃんとふかみちゃんが教えてくれた、\n御一夜・クマの、古くからの季節の料理もおいしそうで」
2017 = "「小凪和小深跟我講的御一夜、隈元一帶祖傳的當季料理好像也很好吃」" 

# 【凪】
# display as 凪
# JP: 「つぼん[じる]汁！\nお祭りの時のほかにも、食べたかとー！」
2311 = "「雞肉雜煮！咱可不願意只能在祭典時吃到，咱想隨時都能吃到！」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、『骨かじり』というものをかじってみたく\n感じました」
2060 = "「我想嚐嚐一種名叫“熬大骨”的菜」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。だからこーんなに、\nメニュー案、たくさんたくさんになっちゃいましたぁ」
1836 = "「呵呵，所以菜品的方案才會多出這麼多」" 

# monologue
# JP: みんなの笑顔に見守られ、\nハチロクがス――と、メニューを僕に捧げてくれる。
2497 = "在大家的笑容和注目下，八六將菜單向我遞來。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。どうぞ。\n日々姫のため、御一夜のため。お役立てください」
2310 = "「雙鐵少爺，請收下它，並用它幫助日日姬，幫助御一夜吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、ハチロク。ありがとう、みんな」
2320 = "「麻煩了，八六。謝謝大家」" 

# 【凪】
# display as 凪
# JP: 「別に、にーさんらのためだけじゃなかとよ～\n御一夜鉄道の、自分らのためでもあるけん！」
1788 = "「又不單單是為了大哥哥你們啦。這也是為了御一夜鐵路，為了我們自己！」" 

# 【ふかみ】
# display as 深美
# JP: 「ですです。クマ川くだりのビラも入り口に置かせて\nもらってますし、お客さん増えるの、大歓迎。です」
2123 = "「是啊是啊。你們也在入口處幫我們放了隈河漂流的傳單，我們很樂意看到來客增加，嗯」" 

# 【れいな】
# display as 玲奈
# JP: 「鉄道のこと、もーっと好きになってもらえたら\nうれしいですしねぇ、ポーレットぉ」
1987 = "「如果能讓大家更加喜歡鐵路的話就好了，是不是呀波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうね。れいな」
2126 = "「是啊，玲奈」" 

# monologue
# JP: いいこいいこといつものようにれいなを撫でて、\nポーレットの目が僕を向く。
2660 = "波萊特像往常一樣，一邊摸玲奈的腦袋一邊說“好乖好乖”，眼睛卻看著我這邊。" 

# 【ポーレット】
# display as 波萊特
# JP: 「いつでも、なんでも言って下さい。\nきっと、力になりますから」
1984 = "「如果有困難的話隨時跟我說。我一定會幫忙的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、助かる。\nその言葉に甘えすぎぬよう、頼らせてもらう」
1708 = "「不好意思，那就先謝謝你了。我會儘量不給你多添麻煩的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あら？　いいんですよ、甘えてくれて」
2052 = "「怎麼這麼見外？儘管來依賴我嘛」" 

# monologue
# JP: ぽおんと軽く、いたずらっぽく、\nポーレットは自分の胸を叩いて見せる。
2662 = "波萊特有些調皮地輕拍自己的胸口。" 

# 【ポーレット】
# display as 波萊特
# JP: 「[わたしたちのなか,3]仲間同士じゃないですか」
2057 = "「我們是同伴，不是嗎？」" 
