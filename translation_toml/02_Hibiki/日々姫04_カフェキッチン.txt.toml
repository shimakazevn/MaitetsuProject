# lines: 413 
# 【日々姫】
# display as 日日姬
# JP: 「おさら、よかと。クッキー、よかと」
2191 = "...Sở thú Omuta, có vẻ như đang vô cùng chật vật\nvì lượng khách tham quan sụt giảm."
# 【日々姫】
# display as 日日姬
# JP: 「きれいく　かざりつけ　できたとばい！\nね？　くまくま」
1726 = "Nếu không có doanh thu, thì cũng không có dư dả tiền bạc để bảo dưỡng cỗ máy bảo tồn.\nMikuro ít nhất vẫn đang cố gắng dọn dẹp xung quanh, nhưng..."
# monologue
# JP: ざたくのむかいのざぶとんの上、\nくまくまが『できたね！』ってにこにこしとる。
2668 = "「Mikuro nhận ra rằng, nếu cứ thế này thì sẽ dần lụi tàn mất thôi.」"
# monologue
# JP: 本当は、テーブルと おいすが よかばってん、\nうちにはなかけん、しかたなかとよ。
2480 = "「Chắc là vậy rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あとは、にぃにを　まてばよかとねー。\nえ？　なぁに？　くまくま？」
2093 = "Dù có dọn dẹp xung quanh cỗ máy tơi tả sạch sẽ đến đâu,\nthì sự tơi tả của cỗ máy lại càng trở nên nổi bật hơn——"
# monologue
# JP: くまくまの目、なにか言っとー\n『ひびきちゃんの　みだしなみは？』って――！
2670 = "Cảm giác tội lỗi mà người ta có thể cảm nhận được khi nhìn thấy cảnh tượng đó,\ntôi không nghĩ những vị khách đến xem sở thú lại muốn trải qua."
# 【日々姫】
# display as 日日姬
# JP: 「そうだ！　みだしなみ！　きれいくしないと！\nせっかくにぃにが、おきゃくさんやけん！！」
2011 = "「Vì vậy Mikuro, đã suy nghĩ rất nhiều.\nVí dụ như, nếu là D51 ở một khu du lịch, thì có lẽ sẽ thu hút sự chú ý chăng.」"
# monologue
# JP: ばってん、かがみん前まで走らんでよか。\nだって、わたしには　こいばあるけん。
2469 = "「Hô.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへー」
1956 = "Mikuro đang kể cho chúng tôi nghe. \"D51 ở một khu du lịch\"\nTrước tiên, phải thu hút sự chú ý vào chiếc D51 số 1031 ở Yufuin này."
# monologue
# JP: ねぇねぇにもらったコンパクト！\nおもちゃのじゃなか、おねーさんば使うやつ！
2781 = "Dọn dẹp, kêu gọi tình nguyện viên,\nphục hồi nó trở lại trạng thái sạch đẹp, biến nó thành một điểm thu hút khách du lịch."
# 【日々姫】
# display as 日日姬
# JP: 「ひびきちゃん……えへへ～！　とってもよかと！\nウェイトレスさん、におーとるばい！！」
2101 = "「Nếu làm được như vậy, nếu thành công. Thì tòa thị chính Omuta\nvà người dân thành phố, chắc chắn cũng sẽ đến xem 38696 ạ.」"
# monologue
# JP: あかいじんじゃさんのお祭りで、\nこども会のみんなでだした、おみせやさん。
2505 = "「Ra vậy.」"
# monologue
# JP: 帰りにバザーで　かってもらったこんふくば、\nわたしには かわゆかすぎかもって思うとったけど。
2746 = "Lấy ví dụ thành công làm ngọn cờ đầu, rồi lan truyền nó ra xung quanh.\nCách tư duy này, tôi rất [hiểu, 1]hiểu, và cũng rất hợp ý tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇの ゆってくれた とおりとー！\nおあつらえしてもろーたみたいに、ぴったりばい！」
2240 = "「...Dù có nghĩ ra, thì cũng rất khó để bắt tay vào thực hiện.\nMikuro, em thực sự rất tích cực và chủ động đấy.」"
# monologue
# JP: やけん、ウェイトレスさん　してみたくって、\nきっさてんば、じぶんでひらいてみたくって。
2603 = "「Mikuro, không được như vậy đâu ạ. Có thể hành động, chỉ là vì,\nem ngưỡng mộ——và muốn lấy làm gương thôi ạ.」"
# monologue
# JP: おきゃくさん……でも、\nだれもこないと、さみしすぎってこわかったけど。
2464 = "「Làm gương?」"
# 【日々姫】
# display as 日日姬
# JP: 「『ぼくでよければ、かまわんぞ』って！\nにぃに、やさしかよねー？　くまくま！」
1720 = "「Là chị Hachiroku——là mọi người ở Đường sắt Ohimitera ạ.\nNhìn thấy chị ấy, Mikuro nghĩ rằng, biết đâu mình cũng có thể làm được.」"
# monologue
# JP: 『そうてつくんは　やさしいよね』って、\nくまくまもゆーてくれてる！
2665 = "「À——」"
# monologue
# JP: でも……うーん、ちょっとにぃにぃおそくない？\nまほうびんのお湯、さめちゃうかも。
2461 = "Ra vậy, thảo nào lại hợp ý tôi đến thế."
# 【日々姫】
# display as 日日姬
# JP: 「ひとりでお湯ばわかしたらダメって、ねぇねぇに\nいわれてるし……ううう……早くきてほしかとよぉ」
2305 = "Kế hoạch mà Mikuro đưa ra, chính là một biến thể của những gì chúng tôi đã làm cho đến nay,\ncủa việc khôi phục và mở rộng tuyến đường với Hachiroku làm ngọn cờ đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫？　僕だ。入ってもいいのか？」
2106 = "「Nếu vậy thì, thật là một điều vô cùng vinh dự.\nVề phía chúng tôi, nếu có việc gì có thể giúp được」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　あ、じゃなくて、ええとね！\n『いらっしゃいませー！』」
2303 = "「Tại sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。僕はお客さんなのだよな」
1894 = "Giọng nói của Hibiki, quả nhiên vẫn rất cứng rắn.\nKhi tôi vội vàng nhìn sang, biểu cảm của em ấy cũng đang căng cứng."
# monologue
# JP: ふすまばあけて、にいにがはいってくる。
2763 = "「Vì lý do gì, mà đứa bé này lại bị bỏ lại ở đây?\nTại sao, lại không có ai chăm sóc cho đứa bé này?」"
# monologue
# JP: おかお、いつもとおんなじばってん、\nいつもみたいに、自分の席ばすわらんで――あ！
2456 = "(Hibiki) Khuôn mặt anh ấy vẫn giống như mọi khi,\nnhưng lại không ngồi vào chỗ của mình như mọi khi mà——a!"
# 【日々姫】
# display as 日日姬
# JP: 「おひとりさまですか？」
2222 = "「Quý khách đi một mình ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ。ひとりだ」
1892 = "「À, ừm. Tôi đi một mình.」"
# 【日々姫】
# display as 日日姬
# JP: 「では、こちらのおせきへどうぞ！」
2286 = "「Vậy thì, xin mời quý khách ngồi bên này!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。っと――失礼」
1923 = "「Ừm. Á——xin thất lễ.」"
# monologue
# JP: にいに、くまくまにあいさつしてくれとー！\nうれしか、うれしか！
2766 = "(Hibiki) Anh hai, chào hỏi Kumakuma kìa!\nVui quá, vui quá đi!"
# monologue
# JP: ちゃあんとおきゃくさんになってくれとー！
2457 = "Anh ấy đang đàng hoàng đóng vai khách hàng luôn!"
# 【日々姫】
# display as 日日姬
# JP: 「ごちうもんは、こちらのメニューから\nえらぶとよか――あう――おえらぶ――おえらべ？」
2224 = "「Quý khách có thể chọn món từ menu này,\nchọn đi ạ——a——xin hãy chọn——chọn?」"
# 【双鉄】
# display as 雙鐵
# JP: 「お選びください」
2142 = "「Xin hãy lựa chọn.」"
# 【日々姫】
# display as 日日姬
# JP: 「おえらびください！」
2223 = "「Xin hãy lựa chọn ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。では、選ぶとしよう。\nああ、これは――すごいな、日々姫がひとりで？」
2279 = "「Ừm. Vậy thì, để tôi chọn.\nÀ, cái này——tuyệt thật đấy, Hibiki tự làm một mình sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへー、がんばったけん！　あ、ちがくて、\n『とうてん、ごじまんのメニューです！』」
1959 = "「Hì hì~, em đã cố gắng lắm đó! A, không phải,\n『Đây là menu đáng tự hào của quán chúng tôi!』」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに自慢に[あたい]値する。……ふうむ、\n厚紙と折り紙も使い方なのだなぁ」
2202 = "「Đúng là đáng để tự hào thật. ……Hừm,\ncách sử dụng giấy bìa cứng và giấy gấp origami cũng khéo léo quá nhỉ.」"
# monologue
# JP: にぃに、ほめすぎ！　でもうれしかとー！
2764 = "Anh hai, khen quá lời rồi! Nhưng mà em vui lắm!"
# monologue
# JP: あ……でも、メニューのなかみは……\nわたし、まだちいさかけん……しかたなかとばい。
2493 = "A……nhưng mà, nội dung menu thì……\nmình vẫn còn nhỏ nên……cũng hết cách thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「チョコクッキーとどうぶつクッキーが選べるのか。\n飲みものも、ミルクとミルクティーを選べる」
2048 = "「Có thể chọn bánh quy socola và bánh quy hình động vật sao.\nĐồ uống cũng có thể chọn sữa và trà sữa.」"
# monologue
# JP: あ、にぃに、メニューのすくなさ、\nおこったりわらったりしてなかー。
2495 = "A, anh hai, không hề tức giận hay cười nhạo\nvì menu có ít món."
# monologue
# JP: よかったぁ、すくなすぎっていわれたら、\nわたし、きっとないちゃってたけん。
2508 = "May quá, nếu bị chê là quá ít,\nchắc mình đã khóc mất rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「クッキーは……\n日々姫……ではないな、ウェイトレスさん」
2315 = "「Bánh quy thì……\nHibiki……không đúng, cô bồi bàn.」"
# 【日々姫】
# display as 日日姬
# JP: 「なぁににぃに！　じゃなくて、ええと――ええと」
2051 = "「Gì vậy anh hai! Không phải, ừm——ừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「『おまたせいたしましたお客様』」
1311 = "「『Xin lỗi đã để quý khách phải đợi.』」"
# 【日々姫】
# display as 日日姬
# JP: 「おま、おま――\nおまたせいたちまちた、おきゃくさま――あうっ」
2254 = "「Xin lỗi, xin lỗi——\nXin lỗi đã để quý khách phải đợi——au.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。ちょっとおしえてほしいのだが」
1862 = "「À, xin lỗi. Tôi có chuyện muốn hỏi một chút.」"
# monologue
# JP: べろばこんがらがって、あかちゃんみたいに\nなっちゃったの、にぃに、きづいてないみたい！
2583 = "Lưỡi mình xoắn hết cả lên, giống hệt như em bé vậy,\nhình như anh hai không nhận ra!"
# monologue
# JP: よかったぁ。\nこんどはちゃあんとお話ししなくちゃ！
2511 = "May quá.\nLần này phải nói chuyện đàng hoàng mới được!"
# 【日々姫】
# display as 日日姬
# JP: 「はい。なにをおしえたらいいですか？」
1927 = "「Vâng. Quý khách muốn hỏi gì ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「この店の……ああいや、開店したてか。――その、\nこのあたりで良く見かける、おねえさんがいるだろう」
2258 = "「Của quán này……à không, mới khai trương nhỉ. ——Ừm,\ncó một người chị gái thường hay xuất hiện ở quanh đây đúng không.」"
# 【日々姫】
# display as 日日姬
# JP: 「おねえさん――ねぇねぇのこと――あ、ええと、\nみぎたまくらさんのことですか？」
1992 = "「Chị gái——là chị hai sao——a, ừm,\nquý khách đang nói đến chị Migita Mayami ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「確か……そんなお名前だったな。\nあの方はどちらが好きなのだ？　チョコとどうぶつ」
1980 = "「Hình như……đúng là tên đó.\nCô ấy thích loại nào hơn? Socola hay hình động vật?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、ねぇねぇはね、どうぶつクッキー！\nにゃあにゃあ、とか、ぱおーんとかいうて　たべると！」
1908 = "「A, chị hai á, thích bánh quy hình động vật!\nChị ấy hay kêu meo meo, hay pa-ô-n rồi mới ăn đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、そうなのか」
1964 = "「Ồ, vậy sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「やけん、ねぇねえにもってってあげるなら、\nどうぶつクッキーのほうが　よかとよ」
2086 = "「Thế nên, nếu anh mang đến cho chị hai,\nthì bánh quy hình động vật sẽ tốt hơn đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、もっていかんでも構わんのだ、\nウエイトレスさん」
1723 = "「Không, không mang đến cũng không sao đâu,\ncô bồi bàn.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　どぎゃんして――あああ、ちがかと、\nウエイトレスさんやけん――『どうしてですか？』」
1860 = "「Hả? Tại sao chứ——a a, không phải,\nmình là bồi bàn cơ mà——『Tại sao vậy ạ?』」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのお客さんはもうすぐ来るそうだからな。\nぜひ、どうぶつクッキーをおだししてあげてくれ」
2270 = "「Vì vị khách đó sắp đến rồi.\nNhất định hãy dọn bánh quy hình động vật cho cô ấy nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1861 = "「Hả!?」"
# monologue
# JP: 『ねぇねぇば来る』って、\nにぃに、今いうたと思うばってん――
2760 = "『Chị hai sắp đến』,\nhình như anh hai vừa mới nói vậy thì phải——"
# monologue
# JP: ききまちがえでガッカリするとイヤやけん、\nききなおしちゃう。
2525 = "Nghe nhầm rồi lại thất vọng thì chán lắm,\nnên mình sẽ hỏi lại cho chắc."
# 【日々姫】
# display as 日日姬
# JP: 「くる？　きよると！？　ねぇね、ねぇねぇが！」
2152 = "「Đến sao? Sắp đến sao!? Chị hai, chị hai á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。さっきそういっていた。\n蔵の仕事が、ちょうどぽっかり空くらしい」
1943 = "「Ừ. Lúc nãy cô ấy nói vậy.\nHình như công việc ở xưởng rượu vừa hay có chút thời gian rảnh.」"
# 【日々姫】
# display as 日日姬
# JP: 「わ――わわっ！」
1843 = "「Oa——oái!」"
# monologue
# JP: うれしか！　うれしか！　うれしか！　うれしか！\nくらのしごとば、ぽっかりあくなんてなかけん！
2521 = "Vui quá! Vui quá! Vui quá! Vui quá!\nCông việc ở xưởng rượu, làm gì có chuyện rảnh rỗi chứ!"
# monologue
# JP: ねぇねぇわざわざ、時間ばつくって、\nおきゃくさんになりに来てくれるとばい！！
2777 = "Chị hai cất công dành thời gian,\nđến làm khách hàng của mình luôn đó!!"
# 【日々姫】
# display as 日日姬
# JP: 「あ、あんね！　にぃに！\nおねがい、おねがいばしてよかと？？」
2054 = "「A, anh nghe này! Anh hai!\nEm có chuyện, có chuyện muốn nhờ được không??」"
# 【双鉄】
# display as 雙鐵
# JP: 「にぃに。か？　うん、もちろんだ。\n僕は、日々姫の[あに,1]義兄だからな」
1801 = "「Anh hai. sao? Ừm, tất nhiên rồi.\nVì anh là anh trai nuôi của Hibiki mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら、ね？　メニュー、たして！\n『レモンティー』って、たして、かいて！」
2280 = "「Vậy thì, nhé? Thêm vào menu đi!\nThêm vào, viết thêm 『Trà chanh』 đi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいぞ。ペンはあるのか――っと、日々姫？\n……聞こえていないか。なら仕方ない。取りに戻ろう」
1807 = "「Được thôi. Em có bút không——ơ, Hibiki?\n……Không nghe thấy sao. Vậy đành chịu thôi. Quay lại lấy vậy.」"
# monologue
# JP: ねぇねぇ、レモンティーばすきやけん、\nきてくれるなら、レモン、きらんと。
2776 = "Chị hai thích trà chanh lắm,\nnếu chị ấy đến, mình phải thái chanh mới được."
# monologue
# JP: ねぇねぇにダメっていわれてるのは、お湯わかすこと――\n火ば使うことやけん、レモンきるのは　だいじょうぶ。
2772 = "Chị hai chỉ cấm mình đun nước——\nkhông được dùng lửa thôi, thái chanh thì chắc không sao đâu."
# 【日々姫】
# display as 日日姬
# JP: 「ん……と、ふみだい。\nほうちょう、それと、レモン――まないた」
1915 = "「Ưm……để xem, ghế đẩu.\nDao bếp, với cả, chanh——thớt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これで良し。レモンティーはミルクティーの下に\nそのまま書いても良いのか？　――うむ？　日々姫？」
2207 = "「Thế này là được rồi. Trà chanh viết luôn xuống dưới\ntrà sữa có được không? ——Hửm? Hibiki?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、まっとって、にぃに。\nいま、レモンばきっちゃうけん」
1906 = "「A, đợi em một chút, anh hai.\nEm đang thái chanh đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？　日々姫、ひとりで包丁を使ってるのか？」
1742 = "「Gì cơ!? Hibiki, em đang dùng dao một mình sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　だってねぇねに」
1938 = "「Vâng! Tại vì chị hai bảo」"
# 【真闇】
# display as 真闇
# JP: 「ここば、噂の喫茶店？\nんー、雰囲気よさそうなお店やねぇ」
2261 = "「Đây là quán giải khát trong lời đồn sao?\nHừm, quán có vẻ có bầu không khí tốt nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　ねぇねぇ！　\nまっとって、いまっ――きゃっ！！！？」
1886 = "「A! Chị hai! \nĐợi em chút, bây giờ——á!!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！　危ないっ！！！」
2104 = "「Hibiki! Nguy hiểm!!!」"
# 【真闇】
# display as 真闇
# JP: 「ひーちゃんっっ！！！？」
2028 = "「Bé Hii!!!?」"
# monologue
# JP: （ざくっ！！！！！）
2808 = "（Phập!!!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひ――あっ――にぃに！　にぃにぃ」
1910 = "「Hi——á——anh hai! Anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん――くっ……あ。日々姫。\nだいじょうぶか？　けがはないか？」
1912 = "「Ưm——hự……a. Hibiki.\nEm không sao chứ? Có bị thương ở đâu không?」"
# 【日々姫】
# display as 日日姬
# JP: 「ない。なかと！\nけどっ――にぃに、にぃにい！」
2160 = "「Không. Không có!\nNhưng mà——anh hai, anh hai!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、なによりだ」
2275 = "「Vậy thì tốt rồi.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃんっ！？　そん手っ！！！」
2029 = "「Sou-chan!? Tay em!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん、まくらねぇ。すまんが――」
1951 = "「Vâng, chị Mayami. Xin lỗi nhưng——」"
# monologue
# JP: （ピーポー　ピーポー）
2814 = "（Tiếng còi xe cứu thương）"
# 【日々姫】
# display as 日日姬
# JP: 「やだっ――やだっ！　にぃに、にぃにいっ！！」
1716 = "「Không chịu——không chịu đâu! Anh hai, anh hai!!」"
# 【真闇】
# display as 真闇
# JP: 「ひーちゃん！　ひーちゃん！！」
2021 = "「Bé Hii! Bé Hii!!」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！？」
1909 = "「!!!?」"
# monologue
# JP: ……ねぇね。ねぇねぇ――っ！？
1306 = "……Chị. Chị hai——!?"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇね！　にぃには！？　兄さんは！！？」
2306 = "「Chị hai! Anh hai đâu!? Anh trai đâu!!?」"
# 【真闇】
# display as 真闇
# JP: 「どぎゃんしたと？　ひーちゃん。\n怖か夢でも、みよったと？」
2025 = "「Sao thế? Bé Hii.\nEm gặp ác mộng à?」"
# 【日々姫】
# display as 日日姬
# JP: 「夢って！　――あ。\n……あ」
1974 = "「Ác mộng á! ——A.\n……A.」"
# monologue
# JP: 違う。そう。\nああ――そう。ねぇねの言ってるとおりだ。
2445 = "Không phải. Đúng rồi.\nA——đúng vậy. Đúng như chị hai nói."
# monologue
# JP: 私、小さなわたしじゃない。\nにぃには……そっか。そうだった。
2584 = "Mình, không còn là mình hồi nhỏ nữa.\nAnh hai thì……ra là vậy. Đúng rồi."
# 【日々姫】
# display as 日日姬
# JP: 「私だけ、着替えがあるけん――\n一人でいったん帰って来て」
1968 = "「Chỉ có em là có đồ để thay——\nnên em đã về một mình.」"
# 【真闇】
# display as 真闇
# JP: 「ひーちゃん、うたたねしちゃったと？」
2023 = "「Bé Hii, em ngủ gật đấy à?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん……そうみたい」
1916 = "「Vâng……có vẻ là vậy.」"
# monologue
# JP: 着替えて、ハンパに時間ばあって――\nやけん、少しだけって思うて……
2612 = "Thay đồ xong, vẫn còn một chút thời gian——\nnên mình định chỉ chợp mắt một lát……"
# 【真闇】
# display as 真闇
# JP: 「時間、大丈夫？」
2147 = "「Thời gian, có kịp không?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1877 = "「A——」"
# monologue
# JP: ねぇねの手。柔らかくって、あったかい手。\n優しく、髪ば撫でてくれとる。
2779 = "Bàn tay chị hai. Mềm mại và ấm áp.\nĐang nhẹ nhàng vuốt tóc mình."
# monologue
# JP: ほっとする。子供あつかいみたいにされるの、\nちょっと前まで、すごく、物凄くイヤだったのに……
2590 = "Thật nhẹ nhõm. Việc bị đối xử như trẻ con,\ncho đến lúc nãy, mình vẫn còn rất, vô cùng ghét, vậy mà……"
# 【日々姫】
# display as 日日姬
# JP: 「ありがと。大丈夫。スマホでアラームかけてあるけん。\nえと……あと１５分、のんびりできる」
2225 = "「Cảm ơn chị. Không sao đâu. Em có đặt báo thức trên điện thoại rồi.\nỪm……vẫn còn 15 phút nữa, có thể thong thả.」"
# 【真闇】
# display as 真闇
# JP: 「なら、もう１５分。\nうふふ、おねえちゃんも臨時休憩」
2273 = "「Vậy thì, 15 phút nữa.\nƯ hư hư, chị cũng tạm thời nghỉ ngơi một chút.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぴゃうっ！？」
1820 = "「Pyau!?」"
# 【真闇】
# display as 真闇
# JP: 「逃げんでよかけん。こんまま、こんまま。\nほんのちょこーっとの間やけんねぇ」
1717 = "「Đừng chạy trốn chứ. Cứ thế này, cứ thế này đi.\nChỉ một chút xíu thôi mà.」"
# monologue
# JP: ……ひざまくら。されちゃった。\nねぇね、すごくいい匂いがする。
1307 = "……Bị gối đầu lên đùi mất rồi.\nChị hai, có mùi thơm quá."
# monologue
# JP: 米焼酎の香りが少しと、\nねぇねの、ふんわりした匂い。
2757 = "Một chút hương thơm của rượu shochu gạo,\nvà mùi hương dịu nhẹ của chị hai."
# 【真闇】
# display as 真闇
# JP: 「うふふ……何年ぶりかねぇ。\nひーちゃんを、こぎゃんとしてあげるとは」
1828 = "「Ư hư hư……Mấy năm rồi nhỉ.\nMới lại làm thế này với bé Hii.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー……んと、十年以上、たってると思う。\nばってん――私、覚えとるとよ」
1879 = "「A……ừm, em nghĩ là hơn mười năm rồi.\nNhưng mà——em vẫn nhớ đấy.」"
# 【真闇】
# display as 真闇
# JP: 「覚えとるって？」
2218 = "「Nhớ á?」"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねに、こぎゃんとしてもらったこと。\nスズメのひなば……食べられちゃったときとか」
2075 = "「Chuyện chị hai đã làm thế này với em.\nLúc mà con chim sẻ non……bị ăn thịt ấy.」"
# 【真闇】
# display as 真闇
# JP: 「ああ、そぎゃんこともあったとねぇ」
1904 = "「A, cũng có chuyện đó nữa nhỉ.」"
# monologue
# JP: ひな。巣からおっこっとったと。
2758 = "Chim non. Bị rơi khỏi tổ."
# monologue
# JP: 『くらには絶対近づけない』って約束ばして、\nにぃににも手伝ってもらって、飛べるとこまで育てて。
2579 = "Mình đã hứa là 『Tuyệt đối không được đến gần xưởng rượu』,\ncũng nhờ anh hai giúp đỡ, nuôi nó cho đến lúc biết bay."
# 【日々姫】
# display as 日日姬
# JP: 「お外で飛ばす練習しようって――ぱたぱたぱたって、\nへろへろだけど、飛べた……ばってん」
2062 = "「Bọn em định cho nó tập bay ở ngoài——nó đập cánh phành phạch,\ndù lảo đảo nhưng đã bay được……vậy mà.」"
# monologue
# JP: 近所の猫ば、いきなり走ってきて、\nスズメのこ、ガブって――くわえて、そのまんま――
2784 = "Con mèo nhà hàng xóm, đột nhiên chạy đến,\nngoạm lấy con chim sẻ——ngậm vào miệng, cứ thế——"
# 【日々姫】
# display as 日日姬
# JP: 「あのとき……泣いて、すごく泣いて。\nそしたら、ねぇねが――ひざまくら、してくれて」
2285 = "「Lúc đó……em đã khóc, khóc rất nhiều.\nThế là, chị hai đã——cho em gối đầu lên đùi.」"
# 【真闇】
# display as 真闇
# JP: 「うん。あった。\nおねーちゃん、忘れてしもうとったけど」
1946 = "「Ừ. Có chuyện đó.\nChị đã quên mất tiêu rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「……」
1312 = "「……」"
# monologue
# JP: 私も、完全に忘れちゃってた。\nあぎゃんと悲しかったのに――
2577 = "Mình cũng đã quên sạch.\nDù lúc đó buồn đến vậy——"
# 【真闇】
# display as 真闇
# JP: 「……ばってん、今、思い出してあげられたけん。\nあんスズメも、きっと、ちょこっとは喜んでくれとるよ」
1322 = "「……Nhưng mà, bây giờ em đã nhớ lại rồi.\nChắc con chim sẻ đó, cũng sẽ vui một chút đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1877 = "「啊……」" 
# monologue
# JP: そうだった。そのときも、ねぇね、教えてくれた。
2536 = "(Hibiki) Đúng rồi. Lúc đó, chị hai cũng đã dạy mình."
# monologue
# JP: 『やさしく大事にしてもらえた、その時間の分。きっと、\n巣から落ちたまま食べられるより、しあわせだった』って。
1295 = "『Khoảng thời gian được đối xử dịu dàng và trân trọng đó. Chắc chắn,\nnó đã hạnh phúc hơn là bị ăn thịt ngay khi rơi khỏi tổ』."
# 【日々姫】
# display as 日日姬
# JP: 「あんね？　ねぇね」
2077 = "「Này nhé? Chị hai.」"
# 【真闇】
# display as 真闇
# JP: 「うん」
1931 = "「Ừ.」"
# monologue
# JP: 想い出す。\n記憶がどんどん、数珠つなぎみたいに引き出されてく。
2730 = "Nhớ lại rồi.\nKý ức cứ thế, liên tục ùa về như một chuỗi hạt."
# monologue
# JP: ねぇねが私に、\nこぎゃんとやさしくしてくれるとは、いつだって――
2774 = "Chị hai đối xử dịu dàng với mình như thế này,\nlúc nào cũng là——"
# 【日々姫】
# display as 日日姬
# JP: 「今日は……それほど、しんどくなかとよ？\nしんどくもないし、悲しくも、なか」
1804 = "「Hôm nay……em không mệt mỏi đến vậy đâu?\nKhông mệt mỏi, cũng không buồn.」"
# 【真闇】
# display as 真闇
# JP: 「そ？」
2129 = "「Vậy sao?」"
# monologue
# JP: そうだった。ねぇねはいっつも、私が一番しんどい時、\n泣いちゃう位に悲しい時、こうしてひざまくらしてくれた。
2535 = "Đúng rồi. Chị hai lúc nào cũng vậy, khi mình mệt mỏi nhất,\nkhi buồn đến phát khóc, chị luôn cho mình gối đầu lên đùi như thế này."
# monologue
# JP: ばってん、にぃにぃが帰ってきてくれて、支えてくれて――\nああ、だから、私はこの匂い、忘れてたんだ。
2473 = "Nhưng mà, anh hai đã trở về, và làm chỗ dựa cho mình——\nA, ra là vậy, nên mình mới quên mất mùi hương này."
# 【日々姫】
# display as 日日姬
# JP: 「うん。やけん、もう立てる。行ける。大丈夫！\nばってん――ありがと。すごく嬉しくて、癒された」
1929 = "「Vâng. Nên là, em có thể đứng dậy rồi. Đi được rồi. Không sao đâu!\nNhưng mà——cảm ơn chị. Em vui lắm, cảm thấy được chữa lành.」"
# 【真闇】
# display as 真闇
# JP: 「そ」
2128 = "「Vậy à.」"
# monologue
# JP: 言って、ねぇねがやさしく髪ば、撫ぜてくれる。\nゆっくり、ゆっくり、ゆっくりと。
2733 = "Nói rồi, chị hai dịu dàng vuốt tóc mình.\nChậm rãi, chậm rãi, chậm rãi."
# monologue
# JP: このままもう一度ねむったら、しあわせなゆめ、\n絶対、見れるってわかってる――けど！
2592 = "Cứ thế này mà ngủ thêm lần nữa, chắc chắn sẽ mơ thấy giấc mơ hạnh phúc,\nmình biết rõ điều đó——nhưng mà!"
# 【日々姫】
# display as 日日姬
# JP: 「時間やけん、もう起きる！　行くっ！！」
1779 = "「Đến giờ rồi, em phải dậy thôi! Đi đây!!」"
# monologue
# JP: 言って、未練をえいやってして、立ち上がる。\nねぇねの匂いが、そしたらフって遠くなる。
2732 = "Nói rồi, mình dứt bỏ sự lưu luyến và đứng dậy.\nMùi hương của chị hai, bỗng chốc trở nên xa vời."
# 【真闇】
# display as 真闇
# JP: 「そか。じゃ、おねーちゃんも休憩終わり！」
2127 = "「Vậy sao. Vậy, chị cũng nghỉ ngơi xong rồi!」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1874 = "「A——」"
# monologue
# JP: ねぇねぇが――いつもみたいに、立ち上がる。\nたったひとりで――わたし、手、伸ばそうともしないで。
2769 = "Chị hai——đứng dậy giống như mọi khi.\nChỉ một mình——mình, không hề định vươn tay ra."
# monologue
# JP: ねぇねぇが一人でたつの、あたりまえって。\nねぇねだったら、絶対に大丈夫って、普通に思って。
2768 = "Chị hai tự mình đứng dậy là chuyện đương nhiên.\nNếu là chị hai, thì chắc chắn không sao, mình nghĩ vậy là điều bình thường."
# 【真闇】
# display as 真闇
# JP: 「んん？　『あ』って、どぎゃんしたと？\nおねーちゃんの顔に、なんかついとる？」
1953 = "「Hửm? 『A』 là sao thế?\nTrên mặt chị có dính gì à?」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん、ついてない。\nついてなかとよ。なんにもなかと」
1724 = "「Không, không dính gì đâu.\nKhông dính gì cả. Không có gì đâu.」"
# 【真闇】
# display as 真闇
# JP: 「そ？　ほんなら、よかけど」
2130 = "「Thế à? Vậy thì tốt.」"
# monologue
# JP: ……お父さんもお母さんも、ずうっと殆ど家に居らんで。\nにぃにぃは――にぃには、わたしが取っちゃって。
1305 = "……Bố mẹ, hầu như không bao giờ ở nhà.\nAnh hai thì——anh hai, đã bị mình chiếm mất."
# monologue
# JP: やけん、思う。ねぇねぇは、真闇おねえちゃんは――\n誰かに、ひざまくらして、いいこいいこ、とか……
2606 = "Nên mình nghĩ. Chị hai, chị Mayami——\nđược ai đó cho gối đầu lên đùi, rồi vỗ về ngoan nào ngoan nào, hay gì đó……"
# monologue
# JP: （ピピピピッ、ピピピピッ）
2807 = "（Bíp bíp bíp, bíp bíp bíp）"
# 【真闇】
# display as 真闇
# JP: 「ひーちゃん！」
2020 = "「Bé Hii!」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！！！」
1887 = "「A!!!」"
# monologue
# JP: ばってん、言えん。そぎゃんこつ。
2472 = "Nhưng mà, không thể nói được. Những lời như thế."
# monologue
# JP: 少なくとも、今の私、こんなに未熟な私じゃまだまだ、\n全然いえないし、なんにもできない。
2718 = "Ít nhất, mình của hiện tại, một đứa chưa trưởng thành như mình thì vẫn chưa,\nhoàn toàn không thể nói được, cũng không thể làm gì được."
# monologue
# JP: (大人にならんと――今より、もっと。\n仕事とか、そういうところでだけじゃなく）
32 = "(Phải trở thành người lớn thôi——hơn bây giờ, nhiều hơn nữa.\nKhông chỉ trong công việc, hay những thứ tương tự)"
# 【真闇】
# display as 真闇
# JP: 「ひーちゃん、時間、大丈夫と？\n疲れ、そぎゃんとたまっとるなら――」
2027 = "「Bé Hii, thời gian, có kịp không?\nNếu em mệt mỏi tích tụ nhiều đến thế——」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ、違うの！　えと、スケジュール！\nスケジュールば頭の中で確認しなおしとっただけ」
1889 = "「A, không phải đâu! Ừm, lịch trình!\nEm chỉ đang kiểm tra lại lịch trình trong đầu thôi.」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんと？」
2118 = "「Vậy sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんそぎゃん！\nっていうか、もういく！　もういかないと！」
2117 = "「Đúng vậy đúng vậy!\nMà này, em đi đây! Em phải đi rồi!」"
# 【真闇】
# display as 真闇
# JP: 「うん。いってらっしゃい、ひーちゃん」
1930 = "「Ừ. Đi đường cẩn thận nhé, bé Hii.」"
# monologue
# JP: やけん。言う。
2607 = "Nên là. Mình sẽ nói."
# monologue
# JP: 今の私に言えること。今の私でも言えること。\n精一杯に大きな声で、何度でも。
2610 = "Điều mà mình của hiện tại có thể nói. Điều mà ngay cả mình của hiện tại cũng có thể nói.\nBằng giọng nói lớn nhất có thể, dù bao nhiêu lần đi nữa."
# 【日々姫】
# display as 日日姬
# JP: 「ありがと、ねぇね！　いってきます！！」
2226 = "「Cảm ơn chị hai! Em đi đây!!」"
# 【稀咲】
# display as 稀咲
# JP: 「……改めまして、ということになるね。\nもう一度それぞれ、自己紹介があった方がいいかな？」
1340 = "「……Xin chào lại lần nữa nhé.\nChắc là nên tự giới thiệu lại một lần nữa nhỉ?」"
# monologue
# JP: 稀咲の言葉に、向き合うふたりがうなずき合う。\nためらうこと無く、先に口を開くのは日々姫だ。
2714 = "(Soutetsu) Nghe những lời của Kisaki, hai người đối diện gật đầu với nhau.\nKhông chút do dự, người mở lời trước là Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「右田日々姫です。稀咲先輩の後輩で、御一夜市長で、\nデザイナーで。今も、臨時では機関助士です」
2067 = "「Tôi là Migita Hibiki. Là hậu bối của tiền bối Kisaki, thị trưởng thành phố Ohimitera,\nlà nhà thiết kế. Và hiện tại, cũng là phụ lái tàu tạm thời.」"
# monologue
# JP: 日々姫の言葉に、自分でも思いがけぬほど嬉しくなる。\n“今も”の、ほんのひとことから――。
2599 = "Lời nói của Hibiki khiến tôi vui mừng ngoài dự kiến.\nChỉ từ một chữ \"hiện tại\" đó thôi——."
# monologue
# JP: 日々姫の中での機関助士は、これほど多忙を極めてなお、\n大切な役割なのだと伝えて貰えたような気がして。
2501 = "Cảm giác như Hibiki đang muốn truyền đạt rằng, đối với em ấy,\nvai trò phụ lái tàu vẫn luôn quan trọng dù cho có bận rộn đến mức nào đi chăng nữa."
# 【山崎】
# display as 山崎
# JP: 「山崎[ようこ,1]葉子です。ええと……山崎屋の娘――\nっていうのが、一番わかりやすいと」
2069 = "「Tôi là Yamazaki Youko. Ừm……là con gái của nhà Yamazaki——\nnói vậy là dễ hiểu nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「山崎屋？」
2038 = "「Nhà Yamazaki?」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、双鉄は買わないか。和菓子屋さんだよ。\nほら、[うえいし,1]上石さんの向かいにある」
1868 = "「À, Soutetsu không mua bao giờ nhỉ. Là tiệm bánh kẹo Nhật Bản đấy.\nNày, nằm đối diện nhà Kamiishi đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、[うなぎ]鰻屋さんの向かいのか」
1869 = "「À, đối diện quán lươn sao.」"
# 【山崎】
# display as 山崎
# JP: 「はい。帝都の製菓学校で勉強してホテルの厨房で働いて。\nそれから[ほうしょう,1]宝生先輩にひっぱられて、ここに」
2134 = "「Vâng. Tôi đã học ở trường làm bánh kẹo trên thủ đô, rồi làm việc trong bếp của khách sạn.\nSau đó bị tiền bối Houshou kéo đến đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「ホテルの厨房！　なら、あれだけ料理おいしいのも\n納得です！　こんなに狭いキッチンなのに」
2236 = "「Bếp của khách sạn! Vậy thì thức ăn ngon như thế\ncũng là điều dễ hiểu! Dù cho bếp chật hẹp thế này.」"
# 【山崎】
# display as 山崎
# JP: 「あ」
1880 = "「A.」"
# monologue
# JP: 山崎さんがちらり、不安げに稀咲を見る。\n稀咲は静かに頷きを返す。
2549 = "Cô Yamazaki liếc nhìn Kisaki với vẻ bất an.\nKisaki lặng lẽ gật đầu đáp lại."
# 【山崎】
# display as 山崎
# JP: 「宝生先輩から、お話は。\n狭いキッチンの使い方を、勉強したいとかって」
2074 = "「Tôi đã nghe tiền bối Houshou nói rồi.\nCô muốn học cách sử dụng nhà bếp chật hẹp sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうなんです。\n私の口から、改めてご説明させて下さい」
2133 = "「Đúng vậy.\nXin hãy để tôi đích thân giải thích lại.」"
# monologue
# JP: 食堂車デザインのこと、長期目標のこと、\nスケジュールのこと――日々姫の説明は簡潔だ。
2731 = "Về thiết kế toa ăn, mục tiêu dài hạn,\nlịch trình——lời giải thích của Hibiki rất súc tích."
# monologue
# JP: 市長としての経験が、こんなに小さなところにも\nハッキリ出ていることを感じて、頼もしくなる。
2519 = "Kinh nghiệm làm thị trưởng của em ấy đã thể hiện rõ ràng\nngay cả ở những chi tiết nhỏ nhặt thế này, thật đáng tin cậy."
# 【日々姫】
# display as 日日姬
# JP: 「ですので、不定期にはなってしまいますが、可能なら、\n実際にカフェでボランティアをさせてほしくて」
2084 = "「Vì vậy, dù thời gian có thể không cố định, nhưng nếu được,\ntôi muốn thực sự được làm tình nguyện viên ở quán.」"
# 【山崎】
# display as 山崎
# JP: 「それも聞いてます。大歓迎で――\n大歓迎は大歓迎なんですけど……」
2255 = "「Tôi cũng nghe chuyện đó rồi. Rất hoan nghênh——\nRất hoan nghênh thì đúng là rất hoan nghênh, nhưng mà……」"
# monologue
# JP: またもチラリ、\n困った視線が稀咲へと向く。
2513 = "Lại một cái liếc mắt,\nánh nhìn bối rối hướng về phía Kisaki."
# monologue
# JP: 稀咲は小さく肩をすくめて、\nため息に笑いを交えたような声をだす。
2701 = "Kisaki khẽ nhún vai,\ncất tiếng thở dài xen lẫn tiếng cười."
# 【稀咲】
# display as 稀咲
# JP: 「まぁ、実際に確認してもらうのが一番かな？\n明日のお昼休みとか――日々姫、大丈夫かな？」
2217 = "「Chà, chắc để tận mắt chứng kiến là tốt nhất nhỉ?\nGiờ nghỉ trưa ngày mai chẳng hạn——Hibiki, có được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「昼休みくらいはさすがに自由になるが――\n一番混雑する時間帯だろう？　そこにいきなりは」
1782 = "「Giờ nghỉ trưa thì đúng là rảnh rỗi thật nhưng——\nđó là khoảng thời gian đông đúc nhất đúng không? Đột nhiên đến đó thì.」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふっ、相変わらず過保護だ。双鉄は」
1839 = "「Fufu, vẫn bao bọc quá mức như mọi khi nhỉ. Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
1873 = "「Hửm?」"
# monologue
# JP: 思いもかけぬ評価に我が耳を疑ってしまう。
2747 = "Lời nhận xét bất ngờ khiến tôi không khỏi nghi ngờ tai mình."
# monologue
# JP: 過保護……とは、\n僕とはかけはなれた言葉な気がして。
2531 = "Bao bọc quá mức……sao,\ncảm giác từ đó hoàn toàn xa lạ với tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕はむしろ――」
1721 = "「Không, tôi ngược lại còn——」"
# 【稀咲】
# display as 稀咲
# JP: 「けど、過保護な双鉄にもきっと納得してもらえるさ。\n明日のお昼。ここに二人で来てもらえれば、ね」
1755 = "「Nhưng mà, Soutetsu bao bọc quá mức chắc chắn cũng sẽ hiểu thôi.\nTrưa mai. Nếu hai người đến đây, nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ……」
1871 = "「Ừm……」"
# monologue
# JP: 過保護を撤回してもらえずに、\n繰り返されまでしてしまった。
2595 = "Không những không rút lại từ bao bọc quá mức,\nmà cô ấy còn lặp lại nó nữa chứ."
# monologue
# JP: 稀咲の評価だ。\nそれを疑うつもりはないが――
2614 = "Lời nhận xét của Kisaki.\nTôi không định nghi ngờ điều đó, nhưng mà——"
# 【日々姫】
# display as 日日姬
# JP: 「わかりました！　稀咲先輩」
2073 = "「Em hiểu rồi! Tiền bối Kisaki.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……ふむ」
1323 = "「……Hừm.」"
# monologue
# JP: 稀咲の保証がある上に、日々姫が納得しているのなら、\n試してみるのが一番だろう。
2699 = "Đã có lời đảm bảo của Kisaki, hơn nữa Hibiki cũng đã đồng ý,\nthì thử xem sao là tốt nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「了解した。それでは、明日の昼休み。\n山崎さん――どうか、ご指導をお願いします」
2065 = "「Đã rõ. Vậy thì, giờ nghỉ trưa ngày mai.\nCô Yamazaki——xin hãy chỉ giáo.」"
# 【山崎】
# display as 山崎
# JP: 「ええ……はい。こちらこそ」
1823 = "「Vâng……vâng. Tôi cũng mong được giúp đỡ.」"
# 【稀咲】
# display as 稀咲
# JP: 「じゃ、山崎。また明日来るから、よろしく」
2292 = "「Vậy, Yamazaki. Ngày mai tôi lại đến, nhờ cô nhé.」"
# 【山崎】
# display as 山崎
# JP: 「はい、宝生先輩。\nなんとか……よろしくお願いできたら嬉しいです」
1982 = "「Vâng, tiền bối Houshou.\nDù sao thì……tôi rất vui nếu được chị giúp đỡ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1873 = "「唔？」" 
# monologue
# JP: どうにも暗い。覇気がない。
2517 = "Trông ủ rũ thế nào ấy. Chẳng có chút sinh khí nào."
# monologue
# JP: その原因を確かめるためにも、明日、お昼に――\nピークタイムに来るのは確かに、良さそうだ。
2664 = "Để tìm hiểu nguyên nhân, trưa ngày mai——\nđến vào giờ cao điểm quả là một ý kiến hay."
# 【双鉄】
# display as 雙鐵
# JP: 「おお――これは」
1867 = "「Ồ——cái này.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？……これ、なんで！！？」
1851 = "「Hả? ……Thế này, là sao!!?」"
# monologue
# JP: ガランとしている。\n誰もいない。
2705 = "Vắng tanh.\nKhông có một ai."
# monologue
# JP: いや、正確には僕ら――\n日々姫と僕と、稀咲と山崎さんしかいない。
2447 = "À không, chính xác thì là chúng tôi——\nchỉ có Hibiki, tôi, Kisaki và cô Yamazaki thôi."
# 【日々姫】
# display as 日日姬
# JP: 「え？　あれ？？　だって、今日もたくさん、\nお母さんとこどもさんいて――いま、お昼時で」
1825 = "「Hả? Ơ?? Tại vì, hôm nay cũng có rất nhiều,\ncác bà mẹ và trẻ em mà——bây giờ, đang là giờ nghỉ trưa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……帰宅して、家でお食事をされているのか？」
1333 = "「……Họ về nhà, dùng bữa ở nhà rồi sao?」"
# monologue
# JP: に、しては空気がざわついている。\nそのざわつきの発生源を気にしてみれば――
2467 = "Thế thì, không khí có vẻ ồn ào quá.\nThử để ý xem nguồn gốc của sự ồn ào đó từ đâu——"
# 【双鉄】
# display as 雙鐵
# JP: 「上？　か？」
1704 = "「Bên trên? Sao?」"
# 【山崎】
# display as 山崎
# JP: 「ですね。上です」
2162 = "「Đúng vậy. Ở bên trên.」"
# 【日々姫】
# display as 日日姬
# JP: 「！！？　私、見てくる！！」
1955 = "「!!? Em, lên xem thử!!」"
# monologue
# JP: （たたたたたっ！）
2809 = "（Tiếng bước chân lạch cạch lạch cạch!）"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1872 = "「Hửm.」"
# monologue
# JP: （とととととっ！）
2802 = "（Tiếng bước chân lộp cộp lộp cộp!）"
# 【日々姫】
# display as 日日姬
# JP: 「見てきた！　上！　休憩室！！」
2058 = "「Em xem rồi! Bên trên! Phòng nghỉ!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「休憩室？」
1749 = "「Phòng nghỉ?」"
# 【日々姫】
# display as 日日姬
# JP: 「だから、ええと――これ――」
2032 = "「Vì thế, ừm——cái này——」"
# monologue
# JP: 申し訳なさそうに日々姫の視線が左右する。
2648 = "Ánh mắt Hibiki liếc ngang liếc dọc vẻ áy náy."
# 【日々姫】
# display as 日日姬
# JP: 「……設計ミス――かなぁ。\nでも、厨房そのものが、後付けで要望されたものだし」
1339 = "「……Là lỗi thiết kế——sao.\nNhưng mà, bản thân nhà bếp cũng là thứ được yêu cầu thêm vào sau mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1931 = "「嗯」" 
# monologue
# JP: なるほど、ようやく繋がった。
2598 = "Ra là vậy, cuối cùng cũng hiểu rồi."
# monologue
# JP: 日々姫の立場では口に出せぬことであろうが――\nこれは、明らかな“発注ミス”だ。
2708 = "Đứng trên lập trường của Hibiki thì có lẽ không thể nói ra được nhưng——\nđây rõ ràng là \"lỗi đặt hàng\"."
# 【双鉄】
# display as 雙鐵
# JP: 「休憩室は飲食可能――どころかむしろ、\n飲食しやすいスペースと作ってあるせいか」
1785 = "「Phòng nghỉ có thể ăn uống——hay nói đúng hơn là,\nvì được thiết kế thành một không gian dễ ăn uống sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「だって！　いっとう最初は\nカフェもキッチンも計画なかったけん」
1970 = "「Tại vì! Ban đầu\nhoàn toàn không có kế hoạch làm quán giải khát hay nhà bếp mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな。だからこそ日々姫は、\n飲食し易い、親子でお昼を取れる、休憩室を設けた」
2120 = "「Đúng vậy nhỉ. Chính vì thế nên Hibiki mới\nthiết kế một phòng nghỉ dễ ăn uống, để phụ huynh và trẻ em có thể dùng bữa trưa.」"
# 【稀咲】
# display as 稀咲
# JP: 「……だね。もっとも、最初から計画があったとして。\nこれは断じて、日々姫の設計ミスにはならない」
1329 = "「……Đúng vậy. Dù cho ngay từ đầu đã có kế hoạch đi chăng nữa.\nThì đây tuyệt đối không phải là lỗi thiết kế của Hibiki.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1873 = "「唔？」" 
# monologue
# JP: 庇っているような口調ではない。\nむしろ、怒りを交えたような――
2515 = "Giọng điệu không giống như đang bênh vực.\nMà giống như đang pha lẫn sự tức giận——"
# monologue
# JP: 稀咲の言葉に山崎さんは、ひどく、力なく頷く。
2537 = "Nghe những lời của Kisaki, cô Yamazaki gật đầu một cách vô cùng yếu ớt."
# 【山崎】
# display as 山崎
# JP: 「……宝生先輩の言う通りです。例えば、ホテル――\n快適で無料のロビーが併設されてて、それでも」
1327 = "「……Đúng như tiền bối Houshou nói. Ví dụ như khách sạn——\ndù có sảnh chờ thoải mái và miễn phí đi kèm, thì vẫn vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、確かに。\nホテルのカフェには、それでも人が入っているな」
1903 = "「À, đúng thật.\nQuán giải khát của khách sạn vẫn có người vào mà.」"
# 【山崎】
# display as 山崎
# JP: 「です。ホテルクオリティで、ぐっと抑えた価格帯。\nそれで集客は問題なく……って考えてて、けど」
2137 = "「Vâng. Chất lượng khách sạn, với mức giá cực kỳ phải chăng.\nNghĩ là sẽ không có vấn đề gì trong việc thu hút khách hàng……vậy mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「事実、僕と日々姫はここを贔屓にしてるしな――\nああ……いや――」
1811 = "「Thực tế thì tôi và Hibiki cũng hay lui tới đây mà——\nA……không——」"
# monologue
# JP: 自分の言葉に気付かされる。\n市長と秘書で、恋人同士だ。
2597 = "Tôi nhận ra lời nói của chính mình.\nThị trưởng và thư ký, lại còn là người yêu của nhau."
# monologue
# JP: くつろげるカフェを選ぶなら、\n選択基準の一番最初に来るのは、やはり――
2527 = "Nếu phải chọn một quán giải khát để thư giãn,\nthì tiêu chí lựa chọn đầu tiên, quả nhiên là——"
# 【稀咲】
# display as 稀咲
# JP: 「だよね？　双鉄。無人だと確認できるから、\n君たちはここを愛用している」
2308 = "「Đúng chứ? Soutetsu. Vì có thể xác nhận là không có ai,\nnên hai người mới thích đến đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「ええと……つまりそれって――\nどの時間帯でも……こんな感じ、ってことですか？」
1821 = "「Ừm……nói tóm lại là——\nvào bất kỳ thời điểm nào……cũng vắng vẻ thế này, đúng không ạ?」"
# 【山崎】
# display as 山崎
# JP: 「……です。恥ずかしいことに」
1320 = "「……Vâng. Thật đáng xấu hổ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「恥ずかしくはない」
2159 = "「Không có gì đáng xấu hổ cả.」"
# monologue
# JP: 思わず言えば、山崎さんが疑わしそうな顔になる。\nが、もとより世辞を言えるほど器用な性質でもない。
2575 = "Tôi bất giác buột miệng, khiến cô Yamazaki lộ vẻ mặt nghi ngờ.\nNhưng vốn dĩ tôi cũng không phải là người khéo léo đến mức biết nói lời nịnh nọt."
# 【双鉄】
# display as 雙鐵
# JP: 「ホテルクオリティで低価格。\nその両立が実現できているのは、間違いない」
2237 = "「Chất lượng khách sạn với mức giá thấp.\nViệc cô có thể thực hiện được cả hai điều đó là không thể chối cãi.」"
# 【稀咲】
# display as 稀咲
# JP: 「だね。それを叶えられる手腕があるから、\nボクは山崎をここの店長に推薦したんだ」
2015 = "「Đúng vậy. Vì có tài năng để thực hiện điều đó,\nnên tôi mới tiến cử Yamazaki làm cửa hàng trưởng ở đây.」"
# 【山崎】
# display as 山崎
# JP: 「あ……」
# 1877 = "「啊……」" 
# monologue
# JP: 安堵した声の山崎さんが、\n視線を日々姫へと向ける。
2551 = "Bằng giọng nói an tâm, cô Yamazaki\nhướng ánh mắt về phía Hibiki."
# monologue
# JP: が、日々姫の瞳は閉じられて――\n恐らくは、日々姫の内へ向いている。
2465 = "Nhưng, đôi mắt Hibiki nhắm lại——\ncó lẽ, em ấy đang tập trung suy nghĩ."
# 【日々姫】
# display as 日日姬
# JP: 「低価格高品質ができているのに需要が無い……\nなら、理由は――ニーズにあってない？」
2109 = "「Giá thấp chất lượng cao mà lại không có nhu cầu……\nVậy thì, lý do là——không phù hợp với nhu cầu sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「かもしれないね」
2081 = "「Cũng có thể.」"
# 【日々姫】
# display as 日日姬
# JP: 「やったら！　私見てくるけんっ！！」
2283 = "「Vậy thì! Em đi xem thử đây!!」"
# 【山崎】
# display as 山崎
# JP: 「へ？」
1852 = "「Hả?」"
# monologue
# JP: （たたたたたっ！）
# 2809 = "（噠噠噠噠噠！）" 
# 【山崎】
# display as 山崎
# JP: 「え？　見てくる――って、何を」
1854 = "「Hả? Đi xem thử——là xem cái gì cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはもちろん、『ニーズを』だろう」
2189 = "「Tất nhiên là, xem 『nhu cầu』 rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「だね。だから僕らも見直しておこう。\n山崎？　メニューを」
1733 = "「Đúng vậy. Thế nên chúng ta cũng xem lại đi.\nYamazaki? Menu ấy.」"
# 【山崎】
# display as 山崎
# JP: 「あ、はい」
1899 = "「A, vâng.」"
# 【稀咲】
# display as 稀咲
# JP: 「日々姫の瞳は、いつだって、\nボクたちには見えないものを見つけ出す」
1713 = "「Đôi mắt của Hibiki, lúc nào cũng\ntìm ra được những thứ mà chúng ta không thể nhìn thấy.」"
# monologue
# JP: 山崎さんがメニューを開く。\n稀咲の瞳が、すっと細まる。
2553 = "Cô Yamazaki mở menu ra.\nĐôi mắt Kisaki khẽ nheo lại."
# 【稀咲】
# display as 稀咲
# JP: 「けど、日々姫の瞳に見えないものをボクは捉える。\nそしてそれは双鉄、山崎。君たちも必ず、同様に」
1759 = "「Nhưng, tôi sẽ nắm bắt được những thứ mà đôi mắt Hibiki không nhìn thấy.\nVà Soutetsu, Yamazaki. Các cậu chắc chắn cũng vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1931 = "「嗯」" 
# monologue
# JP: 絵描きの目、銀行家の目、調理師の目。\n頼もしさを感じると同時に、ふと思う。
2677 = "Con mắt của họa sĩ, con mắt của chủ ngân hàng, con mắt của đầu bếp.\nCảm thấy đáng tin cậy, đồng thời tôi cũng chợt nghĩ."
# monologue
# JP: （僕の目は……\n一体何を、見つけることが出来るのだろう？）
2813 = "(Con mắt của tôi……\nrốt cuộc có thể tìm ra được thứ gì đây?)"
# 【ハチロク】
# display as 八六
# JP: 「それで、わたくしたちが」
2091 = "「Vậy nên, chúng em mới」"
# 【れいな】
# display as 玲奈
# JP: 「呼ばれたですかぁ？」
2213 = "「bị gọi đến đây ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、そう。\nごめんね？　夜に呼び出して」
1949 = "「Ừ, đúng vậy.\nXin lỗi nhé? Vì gọi mọi người ra vào buổi tối thế này.」"
# 【ハチロク】
# display as 八六
# JP: 「構いません。日々姫のために働くことは、\n双鉄様のために働くことと、同じ意味でしょうから」
2163 = "「Không sao đâu ạ. Vì làm việc cho Hibiki,\ncũng có nghĩa là làm việc cho ngài Soutetsu mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2121 = "「Đúng vậy nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1911 = "「Chà.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、おあついですねぇ」
1831 = "「Ư hư hư~, hai người nồng nhiệt quá nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「暑いか？　ああいや、\nれいなは気動車レイルロオドだものな」
2047 = "「Nóng sao? À không,\nvì Reina là Railord toa xe tự hành mà.」"
# monologue
# JP: 蒸気機関車のキャブに慣れた僕や日々姫やハチロクの、\n暑さに対する感覚が狂っているのは自覚している。
2587 = "Những người đã quen với buồng lái của đầu máy hơi nước như tôi, Hibiki và Hachiroku,\ntôi nhận thức được rằng cảm giác về cái nóng của chúng tôi có hơi bất thường."
# 【双鉄】
# display as 雙鐵
# JP: 「困ったな。クーラーを強めるには」
2312 = "「Rắc rối rồi đây. Để bật máy lạnh mạnh hơn thì.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、平気ですよぉ。\nそういう暑さじゃないですからぁ」
1837 = "「Ư hư hư~, không sao đâu ạ.\nKhông phải nóng kiểu đó đâu ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1952 = "「Hửm?」"
# 【日々姫】
# display as 日日姬
# JP: 「あーあーあー！　とにかく！\nそういうわけでレシピを考えなくちゃいけないの」
1876 = "「A a a! Tóm lại là!\nVì vậy nên chúng ta phải suy nghĩ công thức nấu ăn.」"
# monologue
# JP: なんと、日々姫まで赤い。\nやはりクーラーのリモコンを探したほうがよいだろう。
2541 = "Không ngờ, đến cả mặt Hibiki cũng đỏ ửng.\nQuả nhiên vẫn nên đi tìm điều khiển máy lạnh thì hơn."
# 【ハチロク】
# display as 八六
# JP: 「主たるお客様である、お子様連れのお母様層。\nそうした方々を引きつけるためには――」
1730 = "「Tầng lớp khách hàng chính là các bà mẹ có con nhỏ.\nĐể thu hút những người đó thì——」"
# 【れいな】
# display as 玲奈
# JP: 「おちびちゃんたちが食べたがるメニューを提供するのが\n一番、ですかぁ」
2150 = "「Cung cấp những món ăn mà các bé muốn ăn\nlà tốt nhất, đúng không ạ~」"
# 【日々姫】
# display as 日日姬
# JP: 「そうなの。それが私達の結論」
2008 = "「Đúng vậy. Đó là kết luận của bọn chị.」"
# monologue
# JP: が、話がどんどん進んでいる。
2729 = "Nhưng, câu chuyện đang tiến triển rất nhanh."
# monologue
# JP: 中座してこの雰囲気を壊したくなく、\n浮かした腰を落ち着け直す。
2443 = "Không muốn rời đi giữa chừng để phá vỡ bầu không khí này,\ntôi lại ngồi xuống."
# 【日々姫】
# display as 日日姬
# JP: 「れいなちゃんは、鉱山鉄道時代、鉱山で働く人達の\n暮らしを間近でたくさん見ていたっていう話でしょ？」
2182 = "「Bé Reina, hồi còn ở đường sắt khai thác mỏ, em đã được nhìn thấy\nrất nhiều về cuộc sống của những người làm việc ở mỏ từ khoảng cách gần đúng không?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、仲良しのおちびちゃんたくさんですよぉ。\nみんなもう、れいなよりおっきくなりましたけど」
2186 = "「Reina có rất nhiều bạn nhỏ thân thiết đó nha.\nDù mọi người bây giờ đều đã lớn hơn Reina rồi.」"
# monologue
# JP: 現在形でれいなは言って、思い出すように目を閉じる。
2673 = "Reina nói ở thì hiện tại, nhắm mắt lại như đang hồi tưởng."
# 【れいな】
# display as 玲奈
# JP: 「おちびちゃんたち、みぃんなが大好きだったのは、\n鉱山鉄道カレーですねぇ」
2221 = "「Món mà tất cả các bé đều rất thích,\nlà cà ri đường sắt khai thác mỏ đó nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「鉱山鉄道カレー？」
2203 = "「Cà ri đường sắt khai thác mỏ?」"
# 【日々姫】
# display as 日日姬
# JP: 「名前だけでも美味しそう！\nなにそれ、どんなの！？」
1765 = "「Chỉ nghe tên thôi đã thấy ngon rồi!\nLà món gì vậy, trông như thế nào!?」"
# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ。ちくわが、いっぽん立ってて、\nそれが鉱山の、[たてこうやぐら,2]竪坑櫓なんですよぉ」
2031 = "「Chuyện là thế này nha. Có một cây chả cá chikuwa cắm thẳng đứng,\nđó là tháp giếng đứng của khu mỏ đó ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんうん」
1934 = "「Ừ ừ.」"
# 【れいな】
# display as 玲奈
# JP: 「それでぇご飯が[おやま,1]鉱山で、\nカレーが[した,1]地面で、半分にきった卵が[ちんでんいけ,2]沈殿池で」
1770 = "「Rồi cơm là khu mỏ,\ncà ri là mặt đất, trứng cắt đôi là hồ lắng.」"
# monologue
# JP: ……れいなの言葉を、日々姫が鮮やかに絵に起こしていく。
1303 = "……Hibiki phác họa lại lời nói của Reina thành một bức tranh sống động."
# 【ハチロク】
# display as 八六
# JP: 「なるほど、鉱山に見立てたカレエライスなのですね」
1783 = "「Ra là vậy, cơm cà ri được mô phỏng theo khu mỏ nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、これは子供に受けそうだし、美味しそうだ。\n素晴らしいレシピをありがとう、れいな」
2208 = "「Đúng thật, món này có vẻ sẽ được trẻ em yêu thích, và trông cũng ngon nữa.\nCảm ơn em vì công thức tuyệt vời này nhé, Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「えへへ～、どういたしましてですよぉ」
1958 = "「Hì hì~, không có gì đâu ạ~」"
# 【ハチロク】
# display as 八六
# JP: 「しかし、御一夜の子供たちが鉱山に馴染んでいる\nとは思えません。ほんの少しだけ見立てを変えて――」
1757 = "「Nhưng mà, em không nghĩ trẻ em ở Ohimitera\nlại quen thuộc với khu mỏ đâu ạ. Chỉ cần thay đổi cách mô phỏng một chút——」"
# 【れいな】
# display as 玲奈
# JP: 「ああ！　そおですねぇ、ＳＬカレーにしたほうが、\n御一夜のおちびちゃんたち、もっと嬉しいかもですぅ」
1882 = "「A! Đúng vậy nha, làm thành cà ri SL,\nchắc các bé ở Ohimitera sẽ vui hơn đó ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そっか！　そうだね。ライスが機関車、ちくわが煙突。\nあ、でもライスが少なすぎになる？」
2016 = "「Đúng rồi! Cơm là đầu máy, chả cá chikuwa là ống khói.\nA, nhưng mà như thế thì ít cơm quá nhỉ?」"
# 【ハチロク】
# display as 八六
# JP: 「炭水車もお米でこしらえまして、\nそこにカレエを流し込んではいかがでしょうか？」
2179 = "「Toa tiếp than nước cũng làm bằng cơm,\nrồi đổ cà ri vào đó thì sao ạ?」"
# 【れいな】
# display as 玲奈
# JP: 「わぁあ！　おもしろそうですぅ！\nれいな、食べてみたいですぅ」
1844 = "「Oa! Nghe có vẻ thú vị quá!\nReina cũng muốn ăn thử nha.」"
# 【日々姫】
# display as 日日姬
# JP: 「けど、造形が複雑になりすぎない？\nあと、炭水車からカレーが滲んできちゃいそうな気も」
1761 = "「Nhưng mà, tạo hình có phức tạp quá không?\nVới lại, có vẻ cà ri sẽ bị rỉ ra từ toa tiếp than nước ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その辺はプロ――山崎さんの手腕と判断に任せよう。\nとにかく僕らがやるべきことは、アイディア出しだ」
2257 = "「Về phần đó thì cứ giao cho dân chuyên nghiệp——tài năng và phán đoán của cô Yamazaki đi.\nTóm lại việc chúng ta cần làm là đưa ra ý tưởng.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そうだね。わかった！」
1891 = "「A, đúng rồi. Em hiểu rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうわけで――ハチロクはどうだ？\nこども受けしそうなメニューの心あたりは」
2290 = "「Vậy nên——Hachiroku thì sao?\nCó ý tưởng nào về món ăn mà trẻ em thích không.」"
# 【ハチロク】
# display as 八六
# JP: 「左様、ですね……\n実現可能性を専門の方にゆだねていいのでしたら」
2256 = "「Đúng vậy nhỉ……\nNếu có thể giao tính khả thi cho người có chuyên môn thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。どんなアイディアでもかまわない」
2187 = "「Tất nhiên rồi. Bất kỳ ý tưởng nào cũng được.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたらわたくし――お子さまたちに、\n『石炭を食べてみたい』としばしばせがまれます」
2277 = "「Vậy thì em——thường bị các bé nài nỉ là\n『Muốn ăn thử than đá』 ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ！　うん、だよね！　ハチロク、\nまっことおいしそーに石炭ばかじるけん！」
1884 = "「A! Ừ, đúng vậy nhỉ! Hachiroku,\nnhai than đá trông ngon lành thế cơ mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむふむ。石炭を模したメニューか……\nならば、クッキーとか、焼き菓子の類、か？」
1932 = "「Hừm hừm. Món ăn mô phỏng than đá sao……\nNếu vậy thì, bánh quy, hay các loại bánh nướng chăng?」"
# 【日々姫】
# display as 日日姬
# JP: 「あと、カチ割り！　カチ割り[ごおり]氷も黒くできたら、\nきっと石炭みたいになるとよ」
2266 = "「Còn nữa, đá bào! Nếu có thể làm cho đá bào có màu đen,\nthì chắc chắn sẽ giống than đá lắm đó.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、真っ黒焦げの唐揚げさんみて、\n『石炭みたい』って思ったことありますよぉ」
2071 = "「Reina, từng nhìn thấy món gà rán cháy đen thui,\nvà nghĩ là 『Giống than đá』 đó nha.」"
# 【日々姫】
# display as 日日姬
# JP: 「焼き菓子、カチ割り、唐揚げ、っと」
2174 = "「Bánh nướng, đá bào, gà rán.」"
# monologue
# JP: 日々姫は次々、メモとスケッチとを描き連ねていく。
2650 = "Hibiki liên tục vẽ phác thảo và ghi chú."
# monologue
# JP: その反応に安心したのか、\nハチロクの声もはずみ始める。
2679 = "Có lẽ an tâm trước phản ứng đó,\ngiọng Hachiroku cũng bắt đầu trở nên phấn khích."
# 【ハチロク】
# display as 八六
# JP: 「それとれいなの飲んでる軽油。\nあれも、飲んでみたいという声を聞きます」
1797 = "「Với lại dầu diesel mà Reina uống nữa.\nEm cũng nghe nhiều bé nói muốn uống thử ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、確かに飲めたら面白そうだ」
1944 = "「À, đúng là nếu uống được thì thú vị thật.」"
# 【れいな】
# display as 玲奈
# JP: 「それからそれから、れいな、れいなのプリンを\nつくってもらったことあるですよぉ」
2267 = "「Còn nữa còn nữa, Reina, từng được làm cho\nmón bánh flan của Reina đó nha.」"
# 【日々姫】
# display as 日日姬
# JP: 「れいなのプリン！？　え、それってなぁに？\nどんなの！？」
2184 = "「Bánh flan của Reina!? Ơ, đó là món gì vậy?\nTrông như thế nào!?」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへ～！　あのですねぇ、プリンが、\n上と下、ふたつの色にわかれてるプリンなんですぅ」
1962 = "「Hì hì~! Chuyện là thế này nha, bánh flan đó,\nđược chia thành hai màu trên và dưới đó ạ.」"
# monologue
# JP: 瞬間、ハチロクがああ、と微笑む。
2790 = "Ngay khoảnh khắc đó, Hachiroku \"A\" lên một tiếng rồi mỉm cười."
# 【ハチロク】
# display as 八六
# JP: 「ひょっとして――ベージュと柿色。\n\x%lキハ07s;#00ffc040;キハ07s%l;#;の二色の塗り分けに、ですか？」
2219 = "「Có khi nào là——màu be và màu hồng vàng.\nĐược sơn thành hai màu của \\x%lキハ07s;#00ffc040;Kiha 07S%l;#; sao ạ?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、そおですよぉ。ベージュが普通のプリンで、\n柿色のとこはイチゴ味ってききましたぁ」
2125 = "「Vâng, đúng rồi nha. Màu be là bánh flan bình thường,\ncòn phần màu hồng vàng là vị dâu tây đó ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「なにそれ可愛い！\nそれにおいしそう！　食べてみたい！」
1845 = "「Gì vậy dễ thương quá!\nHơn nữa trông còn ngon nữa! Chị muốn ăn thử!」"
# monologue
# JP: （ふむ）
2806 = "（Hừm）"
# monologue
# JP: ハチロクとれいな。
2478 = "Hachiroku và Reina."
# monologue
# JP: 人間のメニューを考案するのに、この人選、\nいや、レイルロオド選は正直どうかと思ったが――
2593 = "Để nghĩ ra menu cho con người, mà lại chọn người này,\nà không, chọn Railord này, thú thật tôi cũng thấy hơi e ngại nhưng——"
# monologue
# JP: （なかなかどうして、面白い案が出て来るな。\nしかし……他のメンツは、随分遅い――）
2811 = "（Không ngờ lại đưa ra được những ý tưởng thú vị đến vậy.\nNhưng mà……những người khác, đến muộn quá——）"
# 【凪】
# display as 凪
# JP: 「おーまたーせば～いっ！」
1731 = "「Xin lỗi vì đã để mọi người đợi nha~!」"
# 【ふかみ】
# display as 深美
# JP: 「ごめんなさい。団体客さんに忘れ物がでちゃって、\n長引いて」
2009 = "「Xin lỗi mọi người. Có khách đoàn để quên đồ,\nnên bị kéo dài thời gian ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「遅くなってごめんなさい！\nまだ会議って間に合いますか？」
2010 = "「Xin lỗi vì đã đến muộn!\nBây giờ vẫn còn kịp họp chứ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「間に合うとも。よく来てくれた、大歓迎だ」
2239 = "「Vẫn kịp mà. Cảm ơn mọi người đã đến, rất hoan nghênh.」"
# monologue
# JP: これで、スケジュールが空いていた全員がそろった。
2748 = "Vậy là, tất cả những người có lịch trình trống đều đã có mặt."
# monologue
# JP: そろったのだが、さてどうするか。\nキッチンはあまりに狭く、この人数では動けなくなる。
2785 = "Có mặt đông đủ rồi, nhưng giờ tính sao đây.\nNhà bếp quá hẹp, với số lượng người này thì không thể nhúc nhích được."
# 【凪】
# display as 凪
# JP: 「あっちの方が面白そうばい！」
2289 = "「Bên kia có vẻ thú vị hơn kìa!」"
# 【ふかみ】
# display as 深美
# JP: 「あ、凪ちゃん！」
1900 = "「A, Nagi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ちょうどいい。ハチロク、\nメニュー側の取りまとめを頼めるか？」
2259 = "「Vừa hay. Hachiroku,\nem có thể phụ trách tổng hợp phần menu được không?」"
# 【ハチロク】
# display as 八六
# JP: 「うふふ、責任重大でございますね。\nどうぞご安心しておまかせください、双鉄様」
1833 = "「Ư hư hư, trách nhiệm nặng nề quá nhỉ.\nXin ngài Soutetsu cứ yên tâm giao cho em ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「助かる。日々姫、こちらへ来てくれ」
2271 = "「Giúp được anh nhiều lắm. Hibiki, qua đây một lát.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、うん。わかった！」
1893 = "「A, vâng. Em hiểu rồi!」"
# 【ポーレット】
# display as 波萊特
# JP: 「あれ？　あの、こっち、\n双鉄くんたちとわたしだけ――ですか？」
1842 = "「Ủa? Ừm, bên này,\nchỉ có Soutetsu và tôi thôi——sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、メニュー以外でも、\nポーレットには聞いてみたいことがあってな」
1940 = "「Ừ, ngoài menu ra,\ntôi cũng có chuyện muốn hỏi Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。なんでしょう？　鉄道のこと？」
1898 = "「A, vâng. Chuyện gì vậy? Về đường sắt sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうとも言えるし、そうでないとも言える。\n話したとおり、このカフェの集客についてなのだが」
1808 = "「Nói vậy cũng đúng, mà không phải cũng đúng.\nNhư đã nói, là về việc thu hút khách hàng cho quán giải khát này.」"
# 【日々姫】
# display as 日日姬
# JP: 「子供たちを惹きつけないとお母さんも来てくれない。\nそれがわかったから、内装をアレンジしたいかなって」
1714 = "「Nếu không thu hút được trẻ em thì các bà mẹ cũng sẽ không đến.\nVì đã hiểu được điều đó, nên bọn em muốn sắp xếp lại nội thất.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それで？　わたし？？\n……え？　でも、わたしデザインのことなんて」
2083 = "「Vì thế nên? Tôi á??\n……Ơ? Nhưng mà, tôi đâu biết gì về thiết kế đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「デザインではなく、インテリアだ。レールショップ。\nあれは実際、こどもたちが自然と集う場所ではないか」
1710 = "「Không phải thiết kế, mà là nội thất. Cửa hàng đường sắt.\nChỗ đó thực tế không phải là nơi trẻ em tụ tập một cách tự nhiên sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「レールショップは……だって、れいながいるから。\nれいなが、こどもたちに大人気だからでしょう？」
2297 = "「Cửa hàng đường sắt là……tại vì, có Reina mà.\nVì Reina rất được trẻ em yêu thích đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットたちがいるときはそうだろうが、\nいないときにもだ。僕ひとりの時さえ入ってくるぞ」
1813 = "「Lúc có Paulette và mọi người thì đúng là vậy,\nnhưng cả lúc không có mọi người cũng thế. Ngay cả khi chỉ có một mình tôi, bọn trẻ vẫn vào đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　そうなんですか？」
1856 = "「Ơ? Vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、レイアウトや飾り物を楽しそうに見て――\n僕のことなどまるで気にせぬ」
1941 = "「Ừ, chúng ngắm nghía cách bài trí và đồ trang trí một cách thích thú——\nchẳng thèm để ý gì đến tôi cả.」"
# 【ポーレット】
# display as 波萊特
# JP: 「知らなかった、そんなの」
2080 = "「Tôi không biết chuyện đó đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「だから、ポーレットさんに聞きたくて。\nレールショップ、どういう風にインテリアしたかとか」
2090 = "「Thế nên, bọn em muốn hỏi chị Paulette.\nCách chị trang trí nội thất cho cửa hàng đường sắt như thế nào.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えええ！？」
1849 = "「Hả!?」"
# monologue
# JP: 日々姫の頼みに、けれどポーレットの眉は、\nますますへちょんと下がってしまう。
2460 = "Trước lời nhờ vả của Hibiki, lông mày Paulette\nlại càng rũ xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「別に……あの――わたし、インテリアとか――\nただ、小さいときから、鉄道廃品とか好きで、その」
1734 = "「Không hẳn……ừm——tôi, về nội thất thì——\nchỉ là, từ nhỏ tôi đã thích đồ phế liệu đường sắt, nên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道廃品」
2298 = "「Đồ phế liệu đường sắt.」"
# monologue
# JP: 外見だけを見るならば、これほどポーレットに\n似合わぬ言葉もなかろうが。
2522 = "Nếu chỉ nhìn vẻ bề ngoài, thì không có từ nào\nkhông hợp với Paulette bằng từ này."
# 【ポーレット】
# display as 波萊特
# JP: 「大廃線で、いくらでも手に入る感じになって。\nでも、お部屋――その、置き場所に限界があるから」
1969 = "「Vì cuộc Đại bãi bỏ các tuyến, nên cảm giác như có thể kiếm được bao nhiêu tùy thích.\nNhưng mà, phòng——ừm, chỗ để cũng có giới hạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、ではレールショップは……\nこういってはなんだがコレクションの余剰の」
2035 = "「Trời ạ, vậy cửa hàng đường sắt là……\nnói thế này thì hơi quá nhưng, là chỗ chứa đồ dư thừa của bộ sưu tập sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「違います、逆です！　人がたくさん来る場所だから、\nええと……自慢のものばかりのコレクションケースに」
1707 = "「Không phải, ngược lại mới đúng! Vì là nơi có nhiều người đến,\nừm……nên tôi biến nó thành tủ trưng bày những món đồ tự hào nhất.」"
# 【日々姫】
# display as 日日姬
# JP: 「コレクションケース！」
2096 = "「Tủ trưng bày!」"
# monologue
# JP: 日々姫のスイッチが入ったらしい。\nスケッチブックに、何かを猛然と描き込み始める。
2652 = "Hình như công tắc của Hibiki đã được bật.\nEm ấy bắt đầu cắm cúi vẽ gì đó vào sổ phác thảo."
# 【ポーレット】
# display as 波萊特
# JP: 「あ、よかったぁ。\nわたし、お役にたてたみたいで」
1896 = "「A, may quá.\nCó vẻ như tôi đã giúp được gì đó rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレットぉ！　ポーレットぉ！　凪さんたち」
2170 = "「Chị Paulette! Chị Paulette! Nagi và mọi người.」"
# 【凪】
# display as 凪
# JP: 「マカロンいうの、どぎゃんお菓子とー！？」
2317 = "「Cái gọi là Macaron ấy, là loại bánh kẹo gì vậy!?」"
# 【ふかみ】
# display as 深美
# JP: 「あの、私、も。ポーレットさんの手作りマカロン。\n食べてみたい、です」
1769 = "「Ừm, em, cũng vậy. Macaron tự làm của chị Paulette.\nEm muốn ăn thử, ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええ？　すぐに作るのは無理だけど――\nあ、ちょっと、いってきていいですか？」
1858 = "「Hả? Làm ngay bây giờ thì không được đâu nhưng——\na, tôi qua đó một lát được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。\nメニュー面でも、ポーレットには期待している」
2188 = "「Tất nhiên rồi.\nVề mặt menu, tôi cũng rất mong đợi ở Paulette đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あはは、ありがとうございます！　それならわたし、\n期待に応えられるように、がんばっちゃいますね！」
1847 = "「A ha ha, cảm ơn cậu! Nếu vậy thì tôi,\nsẽ cố gắng hết sức để đáp lại sự mong đợi đó!」"
# monologue
# JP: ポーレットがぱたぱたとキッチンへ。
2661 = "Paulette lạch cạch chạy vào bếp."
# monologue
# JP: 日々姫を見れば――ああ……。そうか、なるほど。\nコレクションケースという言葉を、日々姫は――
2601 = "Nhìn Hibiki——a……. Ra là vậy, hiểu rồi.\nTừ \"tủ trưng bày\", Hibiki đã——"
# 【双鉄】
# display as 雙鐵
# JP: 「『みんなにとってのコレクションケース』に\nするのだな？」
2141 = "「Biến nó thành 『Tủ trưng bày của tất cả mọi người』\nsao?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。写真とか絵。[ハチロク,3]8620とか、[レイナナ,4]キハ07sとか、\nみかん鉄道から乗り入れてきてくれるこたちとかの」
1918 = "「Vâng. Ảnh chụp hay tranh vẽ. Như 8620, Kiha 07S,\nhay những toa xe chạy từ Đường sắt Mikan sang chẳng hạn.」"
# monologue
# JP: 日々姫のスケッチブックの中では、\nたくさんの絵や写真たちが店内を囲み見守っている。
2503 = "Trong cuốn sổ phác thảo của Hibiki,\nrất nhiều bức tranh và ảnh chụp đang bao quanh và theo dõi bên trong quán."
# 【日々姫】
# display as 日日姬
# JP: 「月替りでテーマを決めて、募集して。\n来た作品を、みぃんな飾れるようにするの」
1703 = "「Mỗi tháng sẽ chọn một chủ đề, rồi kêu gọi mọi người gửi tác phẩm.\nNhững tác phẩm gửi đến, sẽ được trưng bày tất cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「みんなか？　スペース的に無理がでるのでは」
1767 = "「Tất cả sao? Về mặt không gian thì e là không thể.」"
# 【日々姫】
# display as 日日姬
# JP: 「もしそんなにたくさんの作品が来たら、\n第一週はこの作品たち、第二週はこの作品たちって」
1986 = "「Nếu có nhiều tác phẩm gửi đến như vậy,\nthì tuần đầu tiên sẽ trưng bày những tác phẩm này, tuần thứ hai là những tác phẩm này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。そのテーマの期間内で、\nさらに時間制限をつけて、入れ換えすればいいわけか」
1865 = "「À, ra vậy. Trong thời gian diễn ra chủ đề đó,\nchỉ cần giới hạn thời gian rồi thay phiên nhau trưng bày là được sao.」"
# monologue
# JP: これは……なかなか、\nいや、相当にうまいやり方かもしれん。
2745 = "Cách này……cũng khá đấy,\nà không, có thể nói là một cách làm rất tuyệt vời."
# 【双鉄】
# display as 雙鐵
# JP: 「自分の絵や写真が飾られていたら、\nそれはやはり、見に行きたくなるものだろうしな」
1989 = "「Nếu tranh hay ảnh của mình được trưng bày,\nthì chắc chắn sẽ muốn đến xem rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ね！　それに、例えば自分の描いた[ハチロク,3]8620の絵が\n飾ってあるときに、石炭のお菓子がメニューにあったら」
2012 = "「Đúng không! Hơn nữa, ví dụ như khi bức tranh 8620 do mình vẽ\nđang được trưng bày, mà trong menu lại có món bánh kẹo than đá thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「食べたくなるな。そしてあの価格と味を両立できる\n山崎さんのメニューだ」
2210 = "「Chắc chắn sẽ muốn ăn thử. Hơn nữa lại là menu của cô Yamazaki,\nngười có thể đảm bảo cả giá cả lẫn hương vị.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　きっと、一回でも食べてもらえたら、\nそのあとは、『また食べたい』ってなると思う」
1936 = "「Vâng! Chắc chắn, chỉ cần họ ăn thử một lần,\nsau đó sẽ nghĩ là 『Muốn ăn lại lần nữa』 cho xem.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。山崎さんがよければこの案で行こう。\nあとは、メニュー候補の方だが」
1924 = "「Ừ. Nếu cô Yamazaki đồng ý thì chúng ta sẽ làm theo phương án này.\nCòn lại là phần đề xuất menu.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2309 = "「Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。ああ――まとまったのか」
2110 = "「Hachiroku. À——em tổng hợp xong rồi sao.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。こちらに記しておきました」
2138 = "「Vâng. Em đã ghi chép lại ở đây ạ.」"
# monologue
# JP: 僕も持ってる乗務手帳のメモ欄には、\nいかにもハチロクな、几帳面な文字がずらり――おお。
2499 = "Trong phần ghi chú của cuốn sổ tay tổ lái giống như cuốn tôi đang có,\nnhững dòng chữ nắn nót mang đậm phong cách Hachiroku được xếp thành hàng dài——ồ."
# 【双鉄】
# display as 雙鐵
# JP: 「すごいな、これは。\nこんなにもアイディアが出たか」
1978 = "「Tuyệt thật đấy.\nKhông ngờ lại có nhiều ý tưởng thế này.」"
# 【ふかみ】
# display as 深美
# JP: 「アイディア……なの、かな？\nなんか、凪ちゃんの食べたいものばっかりかも、です」
2260 = "「Ý tưởng……sao, ạ?\nHình như, toàn là những món Nagi muốn ăn thôi, ạ.」"
# 【凪】
# display as 凪
# JP: 「仕方なかばい！　フランク料理も炭鉱料理も、\nおいしそうなものばっかりやけん！」
2161 = "「Hết cách thôi! Món ăn Pháp hay món ăn vùng mỏ than,\ntoàn là những món trông có vẻ ngon mà!」"
# 【ポーレット】
# display as 波萊特
# JP: 「凪ちゃんとふかみちゃんが教えてくれた、\n御一夜・クマの、古くからの季節の料理もおいしそうで」
2017 = "「Những món ăn theo mùa từ xa xưa của Ohimitera và Kuma\nmà Nagi và Fukami chỉ cho cũng có vẻ ngon lắm.」"
# 【凪】
# display as 凪
# JP: 「つぼん[じる]汁！\nお祭りの時のほかにも、食べたかとー！」
2311 = "「Súp Tsubon!\nNgoài lúc lễ hội ra, em cũng muốn ăn nữa!」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、『骨かじり』というものをかじってみたく\n感じました」
2060 = "「Em thì, cảm thấy muốn gặm thử món\n『Gặm xương』 ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。だからこーんなに、\nメニュー案、たくさんたくさんになっちゃいましたぁ」
1836 = "「Ư hư hư~. Thế nên mới có nhiều,\nthật nhiều đề xuất menu như thế này đó ạ~」"
# monologue
# JP: みんなの笑顔に見守られ、\nハチロクがス――と、メニューを僕に捧げてくれる。
2497 = "Được dõi theo bởi nụ cười của mọi người,\nHachiroku nhẹ nhàng đưa menu cho tôi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。どうぞ。\n日々姫のため、御一夜のため。お役立てください」
2310 = "「Ngài Soutetsu. Xin mời ạ.\nVì Hibiki, vì Ohimitera. Xin ngài hãy sử dụng nó cho hiệu quả ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、ハチロク。ありがとう、みんな」
2320 = "「Làm phiền em rồi, Hachiroku. Cảm ơn mọi người.」"
# 【凪】
# display as 凪
# JP: 「別に、にーさんらのためだけじゃなかとよ～\n御一夜鉄道の、自分らのためでもあるけん！」
1788 = "「Cũng không hẳn là chỉ vì anh Soutetsu đâu~\nMà còn vì Đường sắt Ohimitera, vì chính bản thân bọn em nữa mà!」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。クマ川くだりのビラも入り口に置かせて\nもらってますし、お客さん増えるの、大歓迎。です」
2123 = "「Đúng vậy ạ. Bọn em cũng được đặt tờ rơi xuôi dòng sông Kuma ở lối vào,\nnên khách hàng tăng lên thì, rất hoan nghênh, ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「鉄道のこと、もーっと好きになってもらえたら\nうれしいですしねぇ、ポーレットぉ」
1987 = "「Nếu mọi người thích đường sắt hơn nữa\nthì thật là vui nhỉ, chị Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうね。れいな」
2126 = "「Đúng vậy nhỉ. Reina.」"
# monologue
# JP: いいこいいこといつものようにれいなを撫でて、\nポーレットの目が僕を向く。
2660 = "Paulette vỗ về ngoan nào ngoan nào Reina như mọi khi,\nrồi hướng ánh mắt về phía tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「いつでも、なんでも言って下さい。\nきっと、力になりますから」
1984 = "「Bất cứ lúc nào, có chuyện gì cứ nói với tôi nhé.\nChắc chắn, tôi sẽ giúp sức mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、助かる。\nその言葉に甘えすぎぬよう、頼らせてもらう」
1708 = "「Cảm ơn cô, giúp được tôi nhiều lắm.\nTôi sẽ nhờ vả cô, nhưng sẽ cố gắng không ỷ lại quá nhiều vào lời nói đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あら？　いいんですよ、甘えてくれて」
2052 = "「Ủa? Cứ ỷ lại vào tôi cũng được mà.」"
# monologue
# JP: ぽおんと軽く、いたずらっぽく、\nポーレットは自分の胸を叩いて見せる。
2662 = "Paulette khẽ vỗ ngực cái \"bộp\",\nvới vẻ mặt tinh nghịch."
# 【ポーレット】
# display as 波萊特
# JP: 「[わたしたちのなか,3]仲間同士じゃないですか」
2057 = "「Chúng ta là đồng đội của nhau mà.」"
