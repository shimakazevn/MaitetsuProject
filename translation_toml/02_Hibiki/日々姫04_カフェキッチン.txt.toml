# lines: 413 
# 【日々姫】
# display as 日日姬
# JP: 「おさら、よかと。クッキー、よかと」
2191 = "「盤子，準備好嘞。餅乾，準備好嘞」" 

# 【日々姫】
# display as 日日姬
# JP: 「きれいく　かざりつけ　できたとばい！\nね？　くまくま」
1726 = "「並且～裝點得～漂漂亮亮的！對吧，熊熊？」" 

# monologue
# JP: ざたくのむかいのざぶとんの上、\nくまくまが『できたね！』ってにこにこしとる。
2668 = "熊熊在在矮桌另一頭的坐墊上微笑著說“你做得太棒了！”。" 

# monologue
# JP: 本当は、テーブルと おいすが よかばってん、\nうちにはなかけん、しかたなかとよ。
2480 = "其實，如果家裡有餐桌和椅子的話就好了，但咱家沒有，所以沒辦法。" 

# 【日々姫】
# display as 日日姬
# JP: 「あとは、にぃにを　まてばよかとねー。\nえ？　なぁに？　くまくま？」
2093 = "「接下來，等阿哥來就好囉。哎？怎麼啦？熊熊」" 

# monologue
# JP: くまくまの目、なにか言っとー\n『ひびきちゃんの　みだしなみは？』って――！
2670 = "熊熊的雙眼似乎在說——“日日姬，你不用打扮一下嗎？”！" 

# 【日々姫】
# display as 日日姬
# JP: 「そうだ！　みだしなみ！　きれいくしないと！\nせっかくにぃにが、おきゃくさんやけん！！」
2011 = "「對了！打扮！得打扮得漂亮點才行！難得阿哥要來當客人！！」" 

# monologue
# JP: ばってん、かがみん前まで走らんでよか。\nだって、わたしには　こいばあるけん。
2469 = "但是，我沒有必要跑到鏡子前。因為，我還有這個東西。" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへー」
1956 = "「嘿嘿嘿」" 

# monologue
# JP: ねぇねぇにもらったコンパクト！\nおもちゃのじゃなか、おねーさんば使うやつ！
2781 = "阿姐給我的帶鏡粉盒！不是玩具，而是姐姐用過的！" 

# 【日々姫】
# display as 日日姬
# JP: 「ひびきちゃん……えへへ～！　とってもよかと！\nウェイトレスさん、におーとるばい！！」
2101 = "「日日姬……嘿嘿嘿～！老好看了！特別像女服務員！！」" 

# monologue
# JP: あかいじんじゃさんのお祭りで、\nこども会のみんなでだした、おみせやさん。
2505 = "在赤井神社的祭典上，兒童會的小伙伴們曾經一起玩過開店遊戲。" 

# monologue
# JP: 帰りにバザーで　かってもらったこんふくば、\nわたしには かわゆかすぎかもって思うとったけど。
2746 = "這件在回家路上路過義賣會上買的衣服，對我來說似乎有點太過可愛了。" 

# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇの ゆってくれた とおりとー！\nおあつらえしてもろーたみたいに、ぴったりばい！」
2240 = "「跟阿姐說得一樣！就像是為我量身訂製的一樣，老合適啦！」" 

# monologue
# JP: やけん、ウェイトレスさん　してみたくって、\nきっさてんば、じぶんでひらいてみたくって。
2603 = "所以我想試著當一當女服務員，想試著自己開一間咖啡廳。" 

# monologue
# JP: おきゃくさん……でも、\nだれもこないと、さみしすぎってこわかったけど。
2464 = "但是……如果一個客人都沒有的話就太冷清了，我有點害怕。" 

# 【日々姫】
# display as 日日姬
# JP: 「『ぼくでよければ、かまわんぞ』って！\nにぃに、やさしかよねー？　くまくま！」
1720 = "「不過阿哥跟我說“你不介意的話，我可以當客人哦”！他很溫柔吧，熊熊！」" 

# monologue
# JP: 『そうてつくんは　やさしいよね』って、\nくまくまもゆーてくれてる！
2665 = "熊熊也說“雙鐵好溫柔”！" 

# monologue
# JP: でも……うーん、ちょっとにぃにぃおそくない？\nまほうびんのお湯、さめちゃうかも。
2461 = "但是……嗯，阿哥來得是不是有點晚啊？保溫瓶裡的熱水可能會冷掉的。" 

# 【日々姫】
# display as 日日姬
# JP: 「ひとりでお湯ばわかしたらダメって、ねぇねぇに\nいわれてるし……ううう……早くきてほしかとよぉ」
2305 = "「阿姐也吩咐過我不要一個人燒熱水……嗚嗚嗚……阿哥趕緊來啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫？　僕だ。入ってもいいのか？」
2106 = "「日日姬，是我。我可以進來嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　あ、じゃなくて、ええとね！\n『いらっしゃいませー！』」
2303 = "「阿哥！啊，不對，搞錯了！歡迎光臨！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。僕はお客さんなのだよな」
1894 = "「啊，嗯，我是客人啊」" 

# monologue
# JP: ふすまばあけて、にいにがはいってくる。
2763 = "阿哥拉開拉門進來了。" 

# monologue
# JP: おかお、いつもとおんなじばってん、\nいつもみたいに、自分の席ばすわらんで――あ！
2456 = "他帶著一如既往的表情，坐在了平時坐的座位上……啊！" 

# 【日々姫】
# display as 日日姬
# JP: 「おひとりさまですか？」
2222 = "「請問是一位嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ。ひとりだ」
1892 = "「啊，嗯。一位」" 

# 【日々姫】
# display as 日日姬
# JP: 「では、こちらのおせきへどうぞ！」
2286 = "「那請到這邊的座位來！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。っと――失礼」
1923 = "「嗯。啊，不好意思」" 

# monologue
# JP: にいに、くまくまにあいさつしてくれとー！\nうれしか、うれしか！
2766 = "阿哥跟熊熊打招呼了！好開心，好開心！" 

# monologue
# JP: ちゃあんとおきゃくさんになってくれとー！
2457 = "他很認真在當一位客人！" 

# 【日々姫】
# display as 日日姬
# JP: 「ごちうもんは、こちらのメニューから\nえらぶとよか――あう――おえらぶ――おえらべ？」
2224 = "「請用這邊的菜單上菜……啊嗚，上菜——選菜？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お選びください」
2142 = "「是點菜」" 

# 【日々姫】
# display as 日日姬
# JP: 「おえらびください！」
2223 = "「請您點菜！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。では、選ぶとしよう。\nああ、これは――すごいな、日々姫がひとりで？」
2279 = "「那我就點吧。啊，這……真厲害，這個菜單是你一個人做的？」" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへー、がんばったけん！　あ、ちがくて、\n『とうてん、ごじまんのメニューです！』」
1959 = "「嘿嘿嘿，我很努力設計的哦！啊，不對，這是本店引以為傲的菜單！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに自慢に[あたい]値する。……ふうむ、\n厚紙と折り紙も使い方なのだなぁ」
2202 = "「確實值得自豪一下。……唔，厚紙和摺紙也用得很好」" 

# monologue
# JP: にぃに、ほめすぎ！　でもうれしかとー！
2764 = "阿哥誇得太過頭了！但是我好開心！" 

# monologue
# JP: あ……でも、メニューのなかみは……\nわたし、まだちいさかけん……しかたなかとばい。
2493 = "啊……不過菜單的內容……我還不會做多少菜……所以實在沒辦法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「チョコクッキーとどうぶつクッキーが選べるのか。\n飲みものも、ミルクとミルクティーを選べる」
2048 = "「從巧克力餅乾和動物餅乾裡選啊。飲料也是在牛奶和奶茶中選」" 

# monologue
# JP: あ、にぃに、メニューのすくなさ、\nおこったりわらったりしてなかー。
2495 = "啊，看到菜單上的品項這麼少，阿哥沒有生氣也沒有笑。" 

# monologue
# JP: よかったぁ、すくなすぎっていわれたら、\nわたし、きっとないちゃってたけん。
2508 = "太好了，如果他批評說東西太少的話，我肯定會哭出來的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「クッキーは……\n日々姫……ではないな、ウェイトレスさん」
2315 = "「餅乾的話……日日姬……不對，服務員小姐」" 

# 【日々姫】
# display as 日日姬
# JP: 「なぁににぃに！　じゃなくて、ええと――ええと」
2051 = "「怎麼了，阿哥！不對，呃……呃」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『おまたせいたしましたお客様』」
1311 = "「“這位客人，讓您久等了”」" 

# 【日々姫】
# display as 日日姬
# JP: 「おま、おま――\nおまたせいたちまちた、おきゃくさま――あうっ」
2254 = "「這、這——周位客人，讓您久等——啊嗚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。ちょっとおしえてほしいのだが」
1862 = "「哦，不好意思，有件事我想了解一下」" 

# monologue
# JP: べろばこんがらがって、あかちゃんみたいに\nなっちゃったの、にぃに、きづいてないみたい！
2583 = "我因為舌頭打結，說話變得跟小嬰兒一樣吐字不清，不過阿哥好像沒發現！" 

# monologue
# JP: よかったぁ。\nこんどはちゃあんとお話ししなくちゃ！
2511 = "太好了，這次得把話說清楚才行！" 

# 【日々姫】
# display as 日日姬
# JP: 「はい。なにをおしえたらいいですか？」
1927 = "「嗯。您想要了解什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「この店の……ああいや、開店したてか。――その、\nこのあたりで良く見かける、おねえさんがいるだろう」
2258 = "「這家店的……不，現在算是剛開業吧。就是那個，經常會在這裡露面的那位姐姐」" 

# 【日々姫】
# display as 日日姬
# JP: 「おねえさん――ねぇねぇのこと――あ、ええと、\nみぎたまくらさんのことですか？」
1992 = "「姐姐，是指阿姐……啊，呃，右田真闇小姐嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確か……そんなお名前だったな。\nあの方はどちらが好きなのだ？　チョコとどうぶつ」
1980 = "「好像……是這個名字。她更喜歡巧克力還是動物呢？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、ねぇねぇはね、どうぶつクッキー！\nにゃあにゃあ、とか、ぱおーんとかいうて　たべると！」
1908 = "「啊，阿姐喜歡動物餅乾！她吃餅乾的時候還會發出“喵喵”，“嘎嗚”之類的聲音！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、そうなのか」
1964 = "「嚯，是嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「やけん、ねぇねえにもってってあげるなら、\nどうぶつクッキーのほうが　よかとよ」
2086 = "「所以如果要給阿姐外帶的話，我更推薦動物餅乾哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、もっていかんでも構わんのだ、\nウエイトレスさん」
1723 = "「不，服務員小姐，我不是打算帶給她吃」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　どぎゃんして――あああ、ちがかと、\nウエイトレスさんやけん――『どうしてですか？』」
1860 = "「哎？這是怎麼——啊，不對，我現在可是服務員。這是為什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのお客さんはもうすぐ来るそうだからな。\nぜひ、どうぶつクッキーをおだししてあげてくれ」
2270 = "「那位客人應該很快就要來了。所以請給我上動物餅乾吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1861 = "「哎？！」" 

# monologue
# JP: 『ねぇねぇば来る』って、\nにぃに、今いうたと思うばってん――
2760 = "阿哥剛才好像說“阿姐會來”。" 

# monologue
# JP: ききまちがえでガッカリするとイヤやけん、\nききなおしちゃう。
2525 = "如果聽錯的話我會很失望的，所以還是確認一下吧。" 

# 【日々姫】
# display as 日日姬
# JP: 「くる？　きよると！？　ねぇね、ねぇねぇが！」
2152 = "「會來？啊、阿姐真要來唄？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。さっきそういっていた。\n蔵の仕事が、ちょうどぽっかり空くらしい」
1943 = "「嗯，剛才她是這麼說的。酒窖那邊的工作似乎正好忙完了」" 

# 【日々姫】
# display as 日日姬
# JP: 「わ――わわっ！」
1843 = "「哇——哇哇！」" 

# monologue
# JP: うれしか！　うれしか！　うれしか！　うれしか！\nくらのしごとば、ぽっかりあくなんてなかけん！
2521 = "好開心！好開心！好開心！好開心！酒窖那邊是不可能閒下來的！" 

# monologue
# JP: ねぇねぇわざわざ、時間ばつくって、\nおきゃくさんになりに来てくれるとばい！！
2777 = "阿姐是特地騰出時間，作為客人來光顧的！！" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、あんね！　にぃに！\nおねがい、おねがいばしてよかと？？」
2054 = "「我、我說！阿哥！可、可以拜託你一件事嗎？？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「にぃに。か？　うん、もちろんだ。\n僕は、日々姫の[あに,1]義兄だからな」
1801 = "「叫我阿哥嗎？嗯，當然可以。畢竟我可是你的[哥哥,1]繼兄啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、ね？　メニュー、たして！\n『レモンティー』って、たして、かいて！」
2280 = "「那我說囉。幫我補充菜單！在菜單上加一個“檸檬茶”！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいぞ。ペンはあるのか――っと、日々姫？\n……聞こえていないか。なら仕方ない。取りに戻ろう」
1807 = "「可以。有筆嗎？喂，日日姬！……沒在聽啊。沒辦法，我回去拿筆吧」" 

# monologue
# JP: ねぇねぇ、レモンティーばすきやけん、\nきてくれるなら、レモン、きらんと。
2776 = "阿姐喜歡喝檸檬茶，所以她要來的話，得準備好檸檬茶才行。" 

# monologue
# JP: ねぇねぇにダメっていわれてるのは、お湯わかすこと――\n火ば使うことやけん、レモンきるのは　だいじょうぶ。
2772 = "阿姐不准我燒熱水，也就是不准用火，所以切檸檬還是可以的。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……と、ふみだい。\nほうちょう、それと、レモン――まないた」
1915 = "「嗯……嘿咻，墊腳凳。菜刀，還有檸檬……砧板」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これで良し。レモンティーはミルクティーの下に\nそのまま書いても良いのか？　――うむ？　日々姫？」
2207 = "「筆拿來了。檸檬茶寫在奶茶下面就可以了吧？——唔？　日日姬？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、まっとって、にぃに。\nいま、レモンばきっちゃうけん」
1906 = "「啊，阿哥，等我一下。我在切檸檬」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？　日々姫、ひとりで包丁を使ってるのか？」
1742 = "「什麼？！日日姬，你在一個人用菜刀嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　だってねぇねに」
1938 = "「嗯！我想親手給阿姐泡檸檬茶」" 

# 【真闇】
# display as 真闇
# JP: 「ここば、噂の喫茶店？\nんー、雰囲気よさそうなお店やねぇ」
2261 = "「這裡就是傳聞中的咖啡廳？嗯，氣氛還不錯嘛」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　ねぇねぇ！　\nまっとって、いまっ――きゃっ！！！？」
1886 = "「啊！阿姐！先等會，我現在……呀？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！　危ないっ！！！」
2104 = "「日日姬！危險！！！」" 

# 【真闇】
# display as 真闇
# JP: 「ひーちゃんっっ！！！？」
2028 = "「小日？！」" 

# monologue
# JP: （ざくっ！！！！！）
2808 = "（嘩啦！！！！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひ――あっ――にぃに！　にぃにぃ」
1910 = "「嗚——啊——阿哥！阿哥」" 

