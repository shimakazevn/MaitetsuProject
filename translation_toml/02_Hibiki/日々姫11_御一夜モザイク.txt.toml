[script]
# lines: 425 
# 【蓑笠】
# display as 蓑笠
# JP: 「これが、今日の時点での名簿とです」
2262 = "「Đây là danh sách tính đến thời điểm hôm\nnay.」"

# 【双鉄】
# display as 雙鐵
# JP: 「頂戴いたします」
2213 = "「Cháu xin nhận ạ.」"

# monologue
# JP: 人と、金と、風。\n真闇姉が言っていた言葉はそのまま優先順位だと痛感する。
2856 = "Con người, tiền bạc và luồng gió dư luận.\\\nTôi thấm thía rằng những lời chị Mayami\nnói chính là thứ tự ưu tiên trong bầu cử."

# monologue
# JP: どんなに風が吹いたとて、どんなに金があったとて、\n人の手と言葉がなければ、決してそれを活かしきれない。
2446 = "Dù luồng gió dư luận có thổi mạnh đến đâu,\ndù có bao nhiêu tiền đi chăng nữa,\\\nnếu không có bàn tay và lời nói của con\nngười, thì tuyệt đối không thể tận dụng\ntriệt để những lợi thế đó."

# 【双鉄】
# display as 雙鐵
# JP: 「……現時点での明確な支持は四割弱、\nという感じですか」
1491 = "「……Tỉ lệ ủng hộ rõ ràng ở thời điểm hiện\ntại chưa tới 40%,\\\nđúng không ạ?」"

# monologue
# JP: この選挙戦は、\n実質的には日々姫と稀咲との一騎打ちだ。
2970 = "Cuộc bầu cử này,\\\nthực chất là trận quyết đấu một mất một\ncòn giữa Hibiki và Kisaki."

# monologue
# JP: その状況下で四割弱――\n三割八分は悪くない。悪くはない、が……
2588 = "Trong tình hình đó mà được chưa tới 40%——\\\n38% cũng không phải là tệ. Không tệ,\nnhưng……"

# 【蓑笠】
# display as 蓑笠
# JP: 「銀行さんの切り崩しば激しかとですけん、\n残りのほとんどは、様子見しゆう状況です」
2300 = "「Vì bên ngân hàng đang ra sức chia rẽ rất\ndữ dội,\\\nnên phần lớn những người còn lại đều đang\ntrong tình trạng chờ xem sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l客車;#00ffc040;客車%l;#;改修プロジェクトの丸呑みを表明されたのが、\nやはり、響いてしまっていますか」
2101 = "「Việc họ tuyên bố sao chép toàn bộ dự án\nphục hồi \\\\x%l客車;#00ffc040;toa hành khách%l;#;,\\\nquả nhiên đã gây ra ảnh hưởng lớn sao ạ?」"

# 【蓑笠】
# display as 蓑笠
# JP: 「正直、そうなっておりますなぁ。\n双鉄くんば候補なら、みなも揺れやせんと思うですが」
2162 = "「Nói thật thì đúng là như vậy.\\\nNếu Sou-chan là ứng cử viên, thì chắc mọi\nngười đã không lung lay đến thế.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いやいや、僕では広い支持が得られませんから」
1753 = "「Không không, cháu thì làm sao giành được\nsự ủng hộ rộng rãi chứ.」"

# monologue
# JP: とはいえ、蓑笠老人の評価は素直に嬉しくありがたい。\nここ、鍛冶屋町の世帯主たちは、そのほとんどが職人だ。
2453 = "Dù vậy, tôi vẫn cảm thấy rất vui và biết\nơn trước lời đánh giá của ông Minokasa.\\\nPhần lớn các chủ hộ ở khu phố thợ rèn này\nđều là những người thợ thủ công."

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;改修のときの交流で、僕の努力を認めてくれた――\n蓑笠老人は、そう伝えてくれているのに等しいと思うから。
2981 = "Qua quá trình giao lưu lúc phục hồi \\\\x%l8620;#00ffc040;8620%l;#;,\nhọ đã công nhận sự nỗ lực của tôi——\\\nLời của ông Minokasa chẳng khác nào đang\ntruyền đạt lại điều đó."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は僕以上の努力家で、\n僕より遥かに豊かな政治的才能を持っています」
2070 = "「Hibiki là một người nỗ lực hơn cháu rất\nnhiều,\\\nvà con bé sở hữu tài năng chính trị phong\nphú hơn cháu gấp bội.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「それが目に見えてこんと、ちくと厳しいかもですな。\nここの住人ば、保守的なもんが多かとですからねぇ」
2214 = "「Nếu không thể hiện điều đó ra ngoài cho\nmọi người thấy thì e là hơi khó đấy.\\\nVì cư dân ở đây đa phần đều rất bảo thủ\nmà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1926 = "「Vâng.」"

# monologue
# JP: 基本的には御一夜の変化を求めない彼らが、\n参入余地も無い\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に積極的である筈がない。
2464 = "Về cơ bản, họ không mong muốn Ohimitera\nthay đổi,\\\nnên chắc chắn họ không thể nào tích cực\nủng hộ việc thu hút nhà máy \\\\x%lエアクラ;#00ffc040;Aircra%l;#; mà họ\nchẳng có chút cơ hội nào chen chân vào."

# monologue
# JP: にも関わらず、三割八分の票しか固まっていないのは、\n日々姫のリーダーシップを不安視しているからだろう。
2479 = "Mặc dù vậy, số phiếu bầu chắc chắn chỉ\ndừng lại ở mức 38%,\\\ncó lẽ là do họ vẫn còn e ngại về khả năng\nlãnh đạo của Hibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「その辺のご懸念を解消いただきたく、\n日々姫主導の新しい試みをレールショップで始めました」
2126 = "「Để xóa bỏ những e ngại đó,\\\nchúng cháu đã bắt đầu một thử nghiệm mới\ndo Hibiki chủ đạo tại Rail Shop.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、\n汽車のおもちゃば、みんなで作るいうお話ですな」
1786 = "「À,\\\nlà chuyện mọi người cùng nhau làm đồ chơi\ntàu hỏa đó hả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「凪からはそう伝わりましたか？」
1814 = "「Nagi đã truyền đạt lại như vậy sao ạ?」"

# 【蓑笠】
# display as 蓑笠
# JP: 「違かとですかね？\nなんせあれの話は、あちこちに飛びよりますけん」
2312 = "「Không phải vậy sao?\\\nDù sao thì chuyện đó cũng đang được bàn\ntán rôm rả khắp nơi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いえ、基本的にはあっています。骨の部分は」
2172 = "「Dạ không, về cơ bản thì đúng là vậy ạ.\nPhần cốt lõi là thế.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「なら、肉と皮と筋ば、落としよったとですか」
2282 = "「Vậy là phần thịt, phần da và phần gân đã\nbị lược bỏ bớt rồi hả.」"

# monologue
# JP: くっくと、蓑笠老人は愛情たっぷりに苦笑する。
2914 = "Ông Minokasa cười khổ đầy trìu mến."

# 【蓑笠】
# display as 蓑笠
# JP: 「そいなら、双鉄くんから教えてもらえませんかのう。\nレールショップで、一体なんばしよっとですか」
2311 = "「Nếu vậy, Sou-chan có thể kể cho lão nghe\nđược không.\\\nRốt cuộc mọi người đang làm gì ở Rail Shop\nthế?」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい。御一夜の未来図を、みんなで、\n模型で作りあげよう――ということをしています」
2143 = "「Vâng. Chúng cháu đang cùng nhau tạo ra\\\nbản đồ tương lai của Ohimitera bằng mô\nhình——là như vậy ạ.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「ほう？」
1943 = "「Ồ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「具体的には……ああ、いや」
1832 = "「Cụ thể là……à, không.」"

# monologue
# JP: お約束をいただいた時間は、まだ随分と残っている。\n店番は、奥様がされているようだし――
2878 = "Thời gian ông ấy dành cho tôi vẫn còn khá\nnhiều.\\\nCửa hàng thì có vẻ như phu nhân đang trông\ncoi——"

# 【双鉄】
# display as 雙鐵
# JP: 「もしよろしければ、\nこれからご一緒にいかがですか？」
1994 = "「Nếu ông không phiền,\\\nông có muốn cùng cháu đến đó xem thử không\nạ?」"

# 【蓑笠】
# display as 蓑笠
# JP: 「百聞は一見に如かずいうことですか。\nそれでは、ちくとお邪魔しますか」
2212 = "「Trăm nghe không bằng một thấy đúng\nkhông.\\\nVậy thì, lão xin phép làm phiền một chút\nnhé.」"

# monologue
# JP: 蓑笠老人と連れ立って店を出る。
2671 = "Tôi cùng ông Minokasa rời khỏi cửa hàng."

# monologue
# JP: 鍛冶屋橋を渡り、隈元銀行の脇を抜ければ、\nレールショップまではもうひと息だ。
2508 = "Băng qua cầu Kajiya, đi ngang qua ngân\nhàng Kumamoto,\\\nlà chỉ còn một đoạn ngắn nữa là đến Rail\nShop."

# 【蓑笠】
# display as 蓑笠
# JP: 「おお、人だかりばしておりますな」
1942 = "「Ồ, đông người tụ tập quá nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「これは……まさか、もうこんなに反応が？」
2114 = "「Đây là……không lẽ, phản ứng lại tốt đến\nmức này sao?」"

# monologue
# JP: 凪とふかみがよほど頑張ってくれたのだろうか？\n集まっているほとんどが、学園生のように見える。
2803 = "Chắc Nagi và Fukami đã cố gắng hết sức rồi\nnhỉ?\\\nPhần lớn những người đang tụ tập ở đây\ntrông có vẻ là học sinh trong trường."

# 【学園生Ａ】
# display as 學生Ａ
# JP: 「ね、何つくってもらうつもりと？」
1793 = "「Này, cậu định nhờ làm cái gì thế?」"

# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「おばあちゃんのお店」
2011 = "「Cửa hàng của bà tớ.」"

# 【学園生Ａ】
# display as 學生Ａ
# JP: 「懐かしかねー、ちっちゃいころ、\nあそこのコロッケ、良く御馳走になったねぇ」
1961 = "「Hoài niệm thật đấy, hồi nhỏ,\\\ntớ hay được thiết đãi món croquette ở đó\nlắm.」"

# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「模型の中なら、閉店せんとずーっと残せるばい。\nわたし、写真持ってきたとよ」
2048 = "「Nếu ở trong mô hình thì có thể giữ lại\nmãi mãi mà không phải đóng cửa.\\\nTớ có mang theo ảnh chụp đây này.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ……こぎゃん催しですか」
1893 = "「À……thì ra là sự kiện như vậy.」"

# monologue
# JP: “まさか”が現実であるらしい。\nしかし――この行列では――
2841 = "\"Không lẽ\" dường như đã trở thành hiện\nthực.\\\nNhưng——với cái hàng người này thì——"

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。ちょっと通してくれ」
2050 = "「Xin lỗi. Cho tôi qua một chút.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ、双鉄様！\nお手伝いいただけますか」
1904 = "「A, ngài Soutetsu!\\\nNgài có thể giúp một tay không ạ?」"

# monologue
# JP: 日々姫の手元に、スケッチブックと画材一式。
2783 = "Trong tay Hibiki là cuốn sổ phác thảo và\ntrọn bộ họa cụ."

# monologue
# JP: その向こうには、塗装が済んだ厚紙が、\nすでに何枚も溜まってしまっている。
2563 = "Xa hơn một chút, những tấm bìa cứng đã\nđược sơn màu\\\nđã chất thành một đống."

# 【双鉄】
# display as 雙鐵
# JP: 「驚いたな。\n組み立てよりも部材作成の方が早いのか？」
2157 = "「Ngạc nhiên thật đấy.\\\nViệc tạo ra các bộ phận còn nhanh hơn cả\nviệc lắp ráp sao?」"

# 【ハチロク】
# display as 八六
# JP: 「わたくし、紙のようなか弱いものを組み立てるのは、\nどうにも、余り得意ではないようで」
2032 = "「Tôi dường như không giỏi lắm\\\ntrong việc lắp ráp những thứ mỏng manh như\ngiấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\n車輌整備で厚紙を細工する機会などないものな」
1844 = "「Ra là vậy.\\\nTrong bảo dưỡng toa xe thì làm gì có cơ\nhội chế tác bìa cứng đâu.」"

# monologue
# JP: 手伝いたいのはやまやまだ。\nが、今は僕は――
2664 = "Tôi rất muốn giúp một tay.\\\nNhưng hiện tại tôi đang——"

# 【蓑笠】
# display as 蓑笠
# JP: 「そぎゃんこつなら、私もお手伝いしましょうか。\n手ば動かしながらでも、話はできますけんねぇ」
2004 = "「Nếu vậy thì để lão phụ một tay nhé.\\\nVừa làm vừa nói chuyện cũng được mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます、蓑笠さん。\n助かります」
1948 = "「Cháu cảm ơn ông Minokasa.\\\nĐược vậy thì tốt quá ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「はい、次の出来た――って、わ！？\nにぃに！　蓑笠さんっ」
1834 = "「Xong cái tiếp theo rồi đây——ơ, oa!?\\\nAnh hai! Ông Minokasa!」"

# monologue
# JP: 塗装の済んだ新しい紙をテーブルに置いたその瞬間、\n僕らに気付いた日々姫はパっと笑顔をほころばせる。
2768 = "Ngay khoảnh khắc đặt tấm bìa mới sơn lên\nbàn,\\\nHibiki nhận ra chúng tôi và nở một nụ cười\nrạng rỡ."

# 【日々姫】
# display as 日日姬
# JP: 「蓑笠さん、いらっしゃいませ。\nそれから、兄さん。おかえりなさい」
2197 = "「Cháu chào ông Minokasa.\\\nVà, anh trai. Mừng anh đã về.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ただいま。\nこちらのことは気にせず、続けてくれ」
1918 = "「Ừm. Anh về rồi đây.\\\nĐừng bận tâm đến anh, em cứ tiếp tục đi.」"

# 【日々姫】
# display as 日日姬
# JP: 「はい、そうさせてもらいますね。\n――すみません、お待たせしました」
1965 = "「Vâng, vậy em xin phép nhé.\\\n――Xin lỗi vì đã để quý khách phải chờ.」"

# monologue
# JP: 学園生の保護者だろうか？\n賑わいに引かれてやってきてくれた方だろうか？
2988 = "Là phụ huynh của học sinh sao?\\\nHay là người bị thu hút bởi sự náo nhiệt\nnày mà đến?"

# 【日々姫】
# display as 日日姬
# JP: 「『みんなでつくろう御一夜未来レイアウト』が\nどういうものか、もうご存知ですか？」
1996 = "「Quý khách đã biết 『Cùng nhau tạo nên sa\nbàn tương lai Ohimitera』\\\nlà như thế nào chưa ạ?」"

# monologue
# JP: 目の前に座った中年女性と向き合うやいなやで、\n日々姫はもう、完全にスイッチを切り替えている。
2790 = "Vừa đối mặt với người phụ nữ trung niên\nngồi trước mặt,\\\nHibiki đã hoàn toàn chuyển sang trạng thái\ntập trung."

# 【蓑笠】
# display as 蓑笠
# JP: 「私たちが入ってきたとに気づかんでしたか。\nいや、大した集中力ですなぁ」
1950 = "「Con bé không hề nhận ra chúng ta bước vào\nluôn sao.\\\nChà, sự tập trung đáng nể thật đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の取り柄の一つです。\nと、いうか……いや、蓑笠さんも素晴らしい」
2261 = "「Đó là một trong những điểm mạnh của\nHibiki đấy ạ.\\\nHay nói đúng hơn là……không, ông Minokasa\ncũng tuyệt vời không kém.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ。\nこぎゃんとは、単なる技術ですけんねぇ」
1912 = "「À.\\\nCái này chỉ là kỹ thuật đơn thuần thôi\nmà.」"

# monologue
# JP: 僕と普通に会話しながら、\n蓑笠さんの指はもう、素早く正確に紙を切り抜いている。
2907 = "Vừa nói chuyện bình thường với tôi,\\\nnhững ngón tay của ông Minokasa đã nhanh\nnhẹn và chuẩn xác cắt rời những mảnh giấy."

# monologue
# JP: 紙細工など普段は全くしないだろうに……\nその手指がいかに鍛え抜かれたものかを、痛感する。
2467 = "Bình thường chắc hẳn ông ấy chẳng bao giờ\nlàm đồ thủ công bằng giấy……\\\nTôi thấu hiểu sâu sắc những ngón tay ấy đã\nđược rèn luyện đến nhường nào."

# 【蓑笠】
# display as 蓑笠
# JP: 「こん模型ば、みなの注文を聞きながら、\n仕上げていくいうことですか」
2253 = "「Những mô hình này, là vừa nghe yêu cầu\ncủa mọi người,\\\nvừa hoàn thiện dần sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい、御一夜の町に重点を置き、そこから湯医線沿線の\n光景を、簡略化してジオラマでつくり上げる計画です」
2095 = "「Vâng, chúng cháu dự định tập trung vào\nkhu vực thị trấn Ohimitera, từ đó\\\nsẽ đơn giản hóa và dựng thành sa bàn quang\ncảnh dọc tuyến Yui ạ.」"

# monologue
# JP: 御一夜市内だけでは、足りない。\n線路は続き、線路は繋ぐものだから。
2483 = "Nếu chỉ có khu vực nội thành Ohimitera thì\nkhông đủ.\\\nBởi vì đường ray là thứ kéo dài và kết nối\nmọi thứ lại với nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「そうしてみんなで作った御一夜からの立体未来図上に、\n僕らの\x%l列車;#00ffc040;列車%l;#;を、一足早く走らせよう――と考えています」
2136 = "「Và trên bản đồ tương lai 3D của Ohimitera\ndo mọi người cùng nhau tạo ra đó,\\\nchúng cháu dự định sẽ cho \\\\x%l列車;#00ffc040;đoàn tàu%l;#; của\nchúng ta chạy thử một bước trước——là như\nvậy ạ.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「走らせる？」
2231 = "「Cho chạy thử?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ええ、この模型の中の線路は通電しているそうなのです。\nそこに、モーターのついた模型の\x%l列車;#00ffc040;列車%l;#;を走らせる」
2115 = "「Vâng, đường ray trong mô hình này dường\nnhư có thể dẫn điện.\\\nChúng cháu sẽ cho \\\\x%l列車;#00ffc040;đoàn tàu%l;#; mô hình có gắn\nđộng cơ chạy trên đó.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「はぁぁ、そぎゃんかこつが出来っとですか」
1935 = "「Chà, thì ra là có thể làm được như vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lNゲージ;#00ffc040;Nゲージ%l;#;というものだそうです。鉄道マニ――\nファンのみなさんにとっては、有名なものだそうで」
2256 = "「Người ta gọi nó là \\\\x%lNゲージ;#00ffc040;N-gauge%l;#; ạ. Đối với\nnhững người đam mê——\\\nnhững người hâm mộ đường sắt thì nó rất\nnổi tiếng đấy ạ.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「ほぉお。大廃線がもしもなければ、\nそこらのおもちゃ屋でも売られておったとですかねぇ」
1937 = "「Hô. Nếu không có cuộc Đại bãi bỏ các\ntuyến đường sắt,\\\nthì chắc nó cũng được bán ở mấy cửa hàng\nđồ chơi quanh đây rồi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれませんね。鉄道は、どうやらこんな状況下でも、\n子供の心を、強く刺激するもののようですから」
2100 = "「Có lẽ vậy ạ. Đường sắt, dù trong hoàn\ncảnh như thế này,\\\ndường như vẫn kích thích mạnh mẽ trí tưởng\ntượng của trẻ nhỏ.」"

# monologue
# JP: 日々姫の前には、今度は小さな姉と弟。
2773 = "Trước mặt Hibiki lúc này là một cặp chị em\nnhỏ tuổi."

# monologue
# JP: 弟がわたわた話す言葉を、\nおねえちゃんが、日々姫に通訳して伝えている。
2572 = "Cậu em trai đang líu ríu nói,\\\ncòn cô chị thì dịch lại cho Hibiki nghe."

# 【蓑笠】
# display as 蓑笠
# JP: 「……ターンテーブル。\nまた渋かリクエストとですなぁ」
1494 = "「……Bàn quay đầu máy.\\\nLại là một yêu cầu khó nhằn đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「見学会に来てくれたお子さんなんだと思います。\nよほど、印象が強かったんでしょう」
1772 = "「Cháu nghĩ đó là những đứa trẻ đã đến buổi\ntham quan.\\\nChắc hẳn chúng đã có ấn tượng rất mạnh.」"

# monologue
# JP: じつに、嬉しい。\n見知らぬ誰かの描く“夢の御一夜”のその中に。
2531 = "Thực sự rất vui.\\\nTrong \"Ohimitera mơ ước\" do một người xa\nlạ nào đó vẽ nên."

# monologue
# JP: 鉄道が、\n\x%l8620;#00ffc040;8620%l;#;がより活躍する景色があると、教えてもらえて。
2614 = "Có hình ảnh đường sắt,\\\ncó hình ảnh \\\\x%l8620;#00ffc040;8620%l;#; đang hoạt động sôi nổi,\nđược nghe họ kể lại như vậy."

# 【蓑笠】
# display as 蓑笠
# JP: 「その――走らせる、“僕らの\x%l列車;#00ffc040;列車%l;#;”おっしゃるのは、\n\x%l8620;#00ffc040;8620%l;#;に、改修をした\x%l客車;#00ffc040;客車%l;#;ば引かせた模型とですか？」
1823 = "「Cái——\"đoàn tàu của chúng ta\" mà cậu nhắc\nđến,\\\ncó phải là mô hình \\\\x%l8620;#00ffc040;8620%l;#; kéo theo \\\\x%l客車;#00ffc040;toa hành khách%l;#;\nđã được phục hồi không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい、そのとおりです」
2097 = "「Vâng, đúng vậy ạ.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「しかし」
1845 = "「Nhưng mà」"

# monologue
# JP: 蓑笠老人のしわだらけの手は、\nすでにみっつの紙建築を完成させている。
2917 = "Đôi bàn tay nhăn nheo của ông Minokasa\\\nđã hoàn thành xong ba mô hình kiến trúc\nbằng giấy."

# monologue
# JP: 僕はまだ、一つ目の糊付けの途中というのに――
2885 = "Trong khi tôi vẫn đang loay hoay bôi hồ\ndán cho cái đầu tiên——"

# 【蓑笠】
# display as 蓑笠
# JP: 「これから作る\x%l客車;#00ffc040;客車%l;#;の模型ば、\nどぎゃんして手配するとですか」
1476 = "「Mô hình \\\\x%l客車;#00ffc040;toa hành khách%l;#; sắp tới,\\\ncậu định chuẩn bị như thế nào?」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lNゲージ;#00ffc040;Nゲージ%l;#;の車輌も、実車輌と構造が似ているのです。\n車輪つきのシャーシの上に、車体が乗る」
1471 = "「Toa xe \\\\x%lNゲージ;#00ffc040;N-gauge%l;#; cũng có cấu trúc tương tự\ntoa xe thật ạ.\\\nThân xe được đặt trên khung gầm có bánh\nxe.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「ええ」
# 1926 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「シャーシは流用可能だそうなので、\n車輌部分を自作すれば、それで済むと聞きました」
2035 = "「Cháu nghe nói khung gầm có thể tái sử\ndụng,\\\nnên chỉ cần tự làm phần thân xe là được\nạ.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「そん自作ば、どぎゃん方法で」
1993 = "「Tự làm bằng cách nào?」"

# 【双鉄】
# display as 雙鐵
# JP: 「詳しくは、ポーレットにしかまだわかりませんが、\nプラ[バン]板を切ってどうのこうのと――」
1811 = "「Chi tiết thì hiện tại chỉ có Paulette mới\nbiết rõ,\\\nnhưng nghe nói là cắt tấm nhựa rồi làm gì\nđó——」"

# monologue
# JP: 言いながら、少しまずいなと今更気づく。
2707 = "Vừa nói, tôi chợt nhận ra có điều không\nổn."

# monologue
# JP: ポーレットは今、車輌改修プロジェクトにほぼ掛りきりだ。\n\x%lNゲージ;#00ffc040;Nゲージ%l;#;車輌の製作に集中できる状態ではない。
2820 = "Hiện tại Paulette gần như dành trọn thời\ngian cho dự án phục hồi toa xe.\\\nKhông có tâm trí đâu mà tập trung vào việc\nchế tạo toa xe \\\\x%lNゲージ;#00ffc040;N-gauge%l;#;."

# 【蓑笠】
# display as 蓑笠
# JP: 「……プラで作れるもんなら、\n鉄でも代替できるとですかね？」
1493 = "「……Nếu làm bằng nhựa được,\\\nthì chắc thay bằng sắt cũng được nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2321 = "「A!」"

# monologue
# JP: そうか。\nその手が――その手があったか。
2586 = "Phải rồi.\\\nCách đó——vẫn còn cách đó."

# monologue
# JP: 思えば同時に思い出す。\n凪が全開で回したモーターの、あの素晴らしいスピードを。
2683 = "Nghĩ đến đó, tôi chợt nhớ lại.\\\nTốc độ tuyệt vời của động cơ khi Nagi vặn\nhết cỡ."

# 【双鉄】
# display as 雙鐵
# JP: 「出来る筈です。多少重量が増加したとて、\nモーターの余力は十分すぎるほどある筈ですから」
2039 = "「Chắc chắn là được ạ. Dù trọng lượng có\ntăng lên một chút,\\\nnhưng sức mạnh của động cơ vẫn thừa sức\nkéo được.」"

# monologue
# JP: 蓑笠老人のおだやかな目が、\nゆっくりと、レールショップの賑わいを見渡す。
2913 = "Đôi mắt hiền từ của ông Minokasa\\\nchậm rãi đưa mắt nhìn quanh sự náo nhiệt\ncủa Rail Shop."

# 【蓑笠】
# display as 蓑笠
# JP: 「皆がわいわいやっとるところにポンと混じるゆーんのは、\n私らのような者には、なかなかハードルが高かとですよ」
1977 = "「Việc tự dưng chen ngang vào chỗ mọi người\nđang vui vẻ ồn ào,\\\nđối với những người như lão thì quả là một\nrào cản lớn đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのですか」
2088 = "「Vậy sao ạ?」"

# 【蓑笠】
# display as 蓑笠
# JP: 「ですけん、『手伝って欲しい』いうきっかけば貰えれば、\nこん輪の中に、職人連中ば、引き込めそうに思います」
1780 = "「Thế nên, nếu có cớ là 『muốn nhờ giúp\nđỡ』,\\\nthì lão nghĩ có thể kéo bọn thợ thủ công\nvào vòng tròn này được đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論、手伝っていただきたく思っております。\nそういただけたら、これほど心強いことはありません」
2029 = "「Tất nhiên là cháu rất muốn nhờ mọi người\ngiúp đỡ rồi ạ.\\\nĐược như vậy thì không còn gì vững tâm\nbằng.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「でしたら、双鉄くんの頼みば言うて誘うてみますか」
2290 = "「Nếu vậy, để lão lấy danh nghĩa là\nSou-chan nhờ vả để mời họ xem sao nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おねがいします。ありがとうございます！」
2320 = "「Trăm sự nhờ ông ạ. Cháu cảm ơn ông rất\nnhiều!」"

# monologue
# JP: 頭を下げた拍子にふっと日々姫の姿が目に入ってくる。
2667 = "Vừa cúi đầu xuống, hình ảnh Hibiki chợt\nlọt vào tầm mắt tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「が――すみません。実際のお手伝いをいただくまで、\n数日の猶予をいただけますか？」
1778 = "「Nhưng mà——xin lỗi ông. Trước khi bắt tay\nvào làm thực tế,\\\nông có thể cho cháu thư thả vài ngày được\nkhông ạ?」"

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ。ですねぇ。模型ばつくりよるにも、\n\x%l客車;#00ffc040;客車%l;#;の図面とデザインと、必要になりますけんねぇ」
1766 = "「À. Đúng rồi nhỉ. Dù là làm mô hình,\\\nthì cũng cần phải có bản vẽ và thiết kế\ncủa \\\\x%l客車;#00ffc040;toa hành khách%l;#; chứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい。なのですが、日々姫がこの状態なので、\nいつになるかは、当人に相談してみんことには」
2081 = "「Vâng. Nhưng mà, Hibiki đang trong tình\ntrạng này,\\\nnên khi nào xong thì phải bàn bạc với\nchính em ấy mới biết được ạ.」"

# monologue
# JP: とはいえ、投票日という時間制限もあることだ。
2883 = "Mặc dù vậy, cũng có giới hạn thời gian là\nngày bỏ phiếu."

# 【双鉄】
# display as 雙鐵
# JP: 「そう長くはお待たせしません。最悪は仮のものとし、\n既存\x%l客車;#00ffc040;客車%l;#;のデザインで――ということも検討しますので」
1759 = "「Cháu sẽ không để mọi người phải chờ lâu\nđâu ạ. Tệ nhất thì cứ làm tạm thời,\\\nvới thiết kế của \\\\x%l客車;#00ffc040;toa hành khách%l;#; hiện\ncó——cháu sẽ cân nhắc cả phương án đó nữa.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「わかったとです。そんなら、根回しばしておきますけん、\nいつでん、声ばかけてください」
2022 = "「Lão hiểu rồi. Vậy thì lão sẽ đi dọn đường\ntrước,\\\nkhi nào cần cứ gọi lão một tiếng nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい、ありがとうございます」
1962 = "「Vâng, cháu cảm ơn ông.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「と、ほいっ」
1955 = "「Rồi, xong.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あっ！」
1897 = "「A!」"

# monologue
# JP: 滞っていた全ての紙が、見事な建物に変わっている。\n紙細工とは思えぬ出来に、息を呑む。
2872 = "Tất cả những mảnh giấy còn dang dở đã biến\nthành những tòa nhà tuyệt đẹp.\\\nSự hoàn thiện khó tin đối với đồ thủ công\nbằng giấy khiến tôi nín thở."

# monologue
# JP: この短期間にこの仕事……\nまさしく、これこそが職人技だ。
2975 = "Hoàn thành công việc này trong thời gian\nngắn như vậy……\\\nQuả thực, đây chính là kỹ năng của một\nnghệ nhân."

# 【蓑笠】
# display as 蓑笠
# JP: 「でしたら、私はひとまずこいで」
2013 = "「Vậy thì, lão xin phép về trước.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お時間とお知恵とお力添えを、\n本当にありがとうございます」
1998 = "「Thực sự cảm ơn ông rất nhiều vì đã dành\nthời gian,\\\ntrí tuệ và sự giúp đỡ cho chúng cháu.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「いやいや」
2111 = "「Không có gì đâu.」"

# monologue
# JP: 蓑笠老人が軽く手を振る。
2916 = "Ông Minokasa khẽ vẫy tay."

# monologue
# JP: シワだらけで、節くれだって焼けていて、\n精緻に動くなどとはまるで、思えない手を。
2469 = "Đôi bàn tay đầy nếp nhăn, chai sạn và rám\nnắng,\\\ntrông không có vẻ gì là có thể cử động\ntinh xảo đến thế."

# 【蓑笠】
# display as 蓑笠
# JP: 「私なんぞ、孫可愛さでやっておるいうだけのことです。\nクマ川の水ば汚して、渡すわけにはいきませんけんねぇ」
2045 = "「Lão làm thế này cũng chỉ vì thương cháu\ngái thôi.\\\nLão không thể nào để dòng sông Kuma bị ô\nnhiễm rồi trao lại cho con cháu được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――お言葉、胸に刻みます」
1477 = "「——Cháu sẽ khắc ghi những lời này trong\nlòng.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「双鉄くんは、時代がかっておられますなぁ」
1798 = "「Sou-chan nói chuyện nghe có vẻ xưa cũ quá\nnhỉ.」"

# monologue
# JP: カッカと笑い、蓑笠老人はレールショップをあとにする。
2915 = "Cười ha hả, ông Minokasa rời khỏi Rail\nShop."

# monologue
# JP: が、僕としては、時代がかったことを言ったつもりも、\n大げさなことを言ったつもりも、全くない。
2674 = "Nhưng với tôi, tôi hoàn toàn không có ý\nnói những lời xưa cũ,\\\nhay nói quá lời chút nào."

# monologue
