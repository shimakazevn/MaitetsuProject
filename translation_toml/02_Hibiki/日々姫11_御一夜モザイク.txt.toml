[script]
# lines: 425 
# 【蓑笠】
# display as 蓑笠
# JP: 「これが、今日の時点での名簿とです」
2262 = "「這是最新的名單」" 

# 【双鉄】
# display as 雙鐵
# JP: 「頂戴いたします」
2213 = "「謝謝」" 

# monologue
# JP: 人と、金と、風。\n真闇姉が言っていた言葉はそのまま優先順位だと痛感する。
2856 = "真闇姐說過選舉取決於人、錢、風向這三大要素。我深感它們的主次順序也正如同她所說。" 

# monologue
# JP: どんなに風が吹いたとて、どんなに金があったとて、\n人の手と言葉がなければ、決してそれを活かしきれない。
2446 = "不管多有錢，不管風向多麼有利，如果沒有人的力量，錢和風向的優勢便無法得到充分發揮。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……現時点での明確な支持は四割弱、\nという感じですか」
1491 = "「……現階段可以確定的支持者占四成不到啊」" 

# monologue
# JP: この選挙戦は、\n実質的には日々姫と稀咲との一騎打ちだ。
2970 = "這場選舉戰實質上是日日姬和稀咲的一對一對決。" 

# monologue
# JP: その状況下で四割弱――\n三割八分は悪くない。悪くはない、が……
2588 = "就這種情況來說，四成不到——百分之三十八的支持率不算糟糕。可是……" 

# 【蓑笠】
# display as 蓑笠
# JP: 「銀行さんの切り崩しば激しかとですけん、\n残りのほとんどは、様子見しゆう状況です」
2300 = "「銀行那邊的分化策略很有效，剩下的那部分人幾乎都在觀望形勢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l客車;#00ffc040;客車%l;#;改修プロジェクトの丸呑みを表明されたのが、\nやはり、響いてしまっていますか」
2101 = "「果然是受銀行宣稱要照搬\\x%l客車;#00ffc040;客運車廂%l;#;修復計劃的影響啊」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「正直、そうなっておりますなぁ。\n双鉄くんば候補なら、みなも揺れやせんと思うですが」
2162 = "「確實是這樣。如果參選人是雙鐵小弟，我想大家就不會這麼動搖咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いやいや、僕では広い支持が得られませんから」
1753 = "「不不不，我上的話肯定得不到這麼多支持」" 

# monologue
# JP: とはいえ、蓑笠老人の評価は素直に嬉しくありがたい。\nここ、鍛冶屋町の世帯主たちは、そのほとんどが職人だ。
2453 = "不過說實話，蓑笠爺爺的話讓我非常高興。鍛冶店街的住戶絕大部分是工匠。" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;改修のときの交流で、僕の努力を認めてくれた――\n蓑笠老人は、そう伝えてくれているのに等しいと思うから。
2981 = "通過\\x%l8620;#00ffc040;８６２０%l;#;修復工作時的交流接觸，那些人都認可了我的努力——蓑笠爺爺這話等於是在這麼說。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は僕以上の努力家で、\n僕より遥かに豊かな政治的才能を持っています」
2070 = "「日日姬比我更努力，她在政治方面的天分也遠高於我」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「それが目に見えてこんと、ちくと厳しいかもですな。\nここの住人ば、保守的なもんが多かとですからねぇ」
2214 = "「讓他們去相信看不見的東西，這有點難啊。這裡很多人都挺保守的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1926 = "「嗯」" 

# monologue
# JP: 基本的には御一夜の変化を求めない彼らが、\n参入余地も無い\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に積極的である筈がない。
2464 = "他們傾向於不改變御一夜，根本不會積極支持他們參與不了的\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠引進計劃。" 

# monologue
# JP: にも関わらず、三割八分の票しか固まっていないのは、\n日々姫のリーダーシップを不安視しているからだろう。
2479 = "儘管如此，目前的支持率卻仍只有百分之三十八，這正說明了他們對日日姬的領導能力抱有不安。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その辺のご懸念を解消いただきたく、\n日々姫主導の新しい試みをレールショップで始めました」
2126 = "「為了消除他們的疑慮，我們在鐵路商店開展了由日日姬主導的新嘗試」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、\n汽車のおもちゃば、みんなで作るいうお話ですな」
1786 = "「你是說那個大家一起製作火車玩具的活動吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪からはそう伝わりましたか？」
1814 = "「凪是這麼說的嗎？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「違かとですかね？\nなんせあれの話は、あちこちに飛びよりますけん」
2312 = "「難道不對嗎？那件事正到處傳來傳去啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いえ、基本的にはあっています。骨の部分は」
2172 = "「簡單來說是這樣」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「なら、肉と皮と筋ば、落としよったとですか」
2282 = "「那就是說其實不只是這樣嘍」" 

# monologue
# JP: くっくと、蓑笠老人は愛情たっぷりに苦笑する。
2914 = "蓑笠爺爺發出苦笑。他的笑聲中充滿了慈愛。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「そいなら、双鉄くんから教えてもらえませんかのう。\nレールショップで、一体なんばしよっとですか」
2311 = "「雙鐵小弟，你能給我講一講嗎，鐵路商店到底想做什麼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい。御一夜の未来図を、みんなで、\n模型で作りあげよう――ということをしています」
2143 = "「當然沒問題。我們是想讓大家用模型來製作御一夜的未來圖景」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ほう？」
1943 = "「噢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「具体的には……ああ、いや」
1832 = "「參加者將會……啊，等等」" 

# monologue
# JP: お約束をいただいた時間は、まだ随分と残っている。\n店番は、奥様がされているようだし――
2878 = "約好的時間還剩下很多。店面似乎是他的夫人在看著——" 

# 【双鉄】
# display as 雙鐵
# JP: 「もしよろしければ、\nこれからご一緒にいかがですか？」
1994 = "「您方便的話，不如我們現在一起去看看吧？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「百聞は一見に如かずいうことですか。\nそれでは、ちくとお邪魔しますか」
2212 = "「說得也是，百聞不如一見。那就去稍微打擾一下吧」" 

# monologue
# JP: 蓑笠老人と連れ立って店を出る。
2671 = "我和蓑笠爺爺一起走出店外。" 

# monologue
# JP: 鍛冶屋橋を渡り、隈元銀行の脇を抜ければ、\nレールショップまではもうひと息だ。
2508 = "只要穿過鍛冶店橋，走過隈元銀行，就離鐵路商店不遠了。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「おお、人だかりばしておりますな」
1942 = "「噢，聚了好多人啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは……まさか、もうこんなに反応が？」
2114 = "「沒想到……反響居然這麼強烈？」" 

# monologue
# JP: 凪とふかみがよほど頑張ってくれたのだろうか？\n集まっているほとんどが、学園生のように見える。
2803 = "是凪和深美的功勞吧？大部分參加者看起來像是學生。" 

# 【学園生Ａ】
# display as 學生Ａ
# JP: 「ね、何つくってもらうつもりと？」
1793 = "「你準備製作什麼？」" 

# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「おばあちゃんのお店」
2011 = "「我奶奶的店」" 

# 【学園生Ａ】
# display as 學生Ａ
# JP: 「懐かしかねー、ちっちゃいころ、\nあそこのコロッケ、良く御馳走になったねぇ」
1961 = "「好懷念啊，我小時候經常去那裡吃可樂餅」" 

# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「模型の中なら、閉店せんとずーっと残せるばい。\nわたし、写真持ってきたとよ」
2048 = "「把店做成模型就可以不用歇業一直留著咧。我把照片也帶來咧」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ……こぎゃん催しですか」
1893 = "「啊……是這種活動啊」" 

# monologue
# JP: “まさか”が現実であるらしい。\nしかし――この行列では――
2841 = "看來反響真的很強烈。不過這個隊列——" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。ちょっと通してくれ」
2050 = "「抱歉，借過一下」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ、双鉄様！\nお手伝いいただけますか」
1904 = "「啊，雙鐵少爺！能請您幫一下忙嗎」" 

# monologue
# JP: 日々姫の手元に、スケッチブックと画材一式。
2783 = "日日姬的手邊放著素描簿和整套畫具。" 

# monologue
# JP: その向こうには、塗装が済んだ厚紙が、\nすでに何枚も溜まってしまっている。
2563 = "她的旁邊有好幾張上了色的紙板。" 

# 【双鉄】
# display as 雙鐵
# JP: 「驚いたな。\n組み立てよりも部材作成の方が早いのか？」
2157 = "「真是沒想到。畫制零件竟然比組裝還要快嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし、紙のようなか弱いものを組み立てるのは、\nどうにも、余り得意ではないようで」
2032 = "「我真的是不太會組裝紙這種單薄的東西」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\n車輌整備で厚紙を細工する機会などないものな」
1844 = "「可以理解。畢竟車輛整備工作用不到這種紙板手工」" 

# monologue
# JP: 手伝いたいのはやまやまだ。\nが、今は僕は――
2664 = "我也非常想幫忙。但是我現在——" 

# 【蓑笠】
# display as 蓑笠
# JP: 「そぎゃんこつなら、私もお手伝いしましょうか。\n手ば動かしながらでも、話はできますけんねぇ」
2004 = "「我也來幫忙吧。邊動手邊談話就行咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます、蓑笠さん。\n助かります」
1948 = "「太感謝您了，蓑笠先生。還好您肯幫忙」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい、次の出来た――って、わ！？\nにぃに！　蓑笠さんっ」
1834 = "「又畫好一個——哇！？阿哥！蓑笠先生」" 

# monologue
# JP: 塗装の済んだ新しい紙をテーブルに置いたその瞬間、\n僕らに気付いた日々姫はパっと笑顔をほころばせる。
2768 = "日日姬把剛上完色的紙板放到桌上時注意到了我們。她開心地笑了起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「蓑笠さん、いらっしゃいませ。\nそれから、兄さん。おかえりなさい」
2197 = "「蓑笠先生，歡迎光臨。哥哥，歡迎回來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ただいま。\nこちらのことは気にせず、続けてくれ」
1918 = "「嗯。我回來了。不用在意我們，你繼續做自己的事吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい、そうさせてもらいますね。\n――すみません、お待たせしました」
1965 = "「好，我知道了。——不好意思，讓您久等了」" 

# monologue
# JP: 学園生の保護者だろうか？\n賑わいに引かれてやってきてくれた方だろうか？
2988 = "那人是學生的監護人？或者是被熱鬧吸引過來的人？" 

# 【日々姫】
# display as 日日姬
# JP: 「『みんなでつくろう御一夜未来レイアウト』が\nどういうものか、もうご存知ですか？」
1996 = "「您是否已經了解“大家一起來設計·御一夜未來場景模型”是個怎樣的活動？」" 

# monologue
# JP: 目の前に座った中年女性と向き合うやいなやで、\n日々姫はもう、完全にスイッチを切り替えている。
2790 = "日日姬與那位中年女性相面而坐，一下子切換到了工作狀態。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「私たちが入ってきたとに気づかんでしたか。\nいや、大した集中力ですなぁ」
1950 = "「她都沒注意到我們進來。真是了不起的集中力」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の取り柄の一つです。\nと、いうか……いや、蓑笠さんも素晴らしい」
2261 = "「這是日日姬的優點之一。噢……蓑笠先生也很厲害啊」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ。\nこぎゃんとは、単なる技術ですけんねぇ」
1912 = "「嗯。但這只不過是技巧罷咧」" 

# monologue
# JP: 僕と普通に会話しながら、\n蓑笠さんの指はもう、素早く正確に紙を切り抜いている。
2907 = "蓑笠先生一邊和我對話，一邊又快又准地進行著剪裁。" 

# monologue
# JP: 紙細工など普段は全くしないだろうに……\nその手指がいかに鍛え抜かれたものかを、痛感する。
2467 = "他平時應該從來不做這種剪紙手工……不愧是經歷了千錘百鍊的手指。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「こん模型ば、みなの注文を聞きながら、\n仕上げていくいうことですか」
2253 = "「這些模型是聽取大家的想法一點點做出來的嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい、御一夜の町に重点を置き、そこから湯医線沿線の\n光景を、簡略化してジオラマでつくり上げる計画です」
2095 = "「是的。我們計劃以御一夜城區為重點，把御一夜城區和湯醫線的沿線風景簡化成微縮景觀模型」" 

# monologue
# JP: 御一夜市内だけでは、足りない。\n線路は続き、線路は繋ぐものだから。
2483 = "光有御一夜市區是不夠的。鐵路是延續的，是相連的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしてみんなで作った御一夜からの立体未来図上に、\n僕らの\x%l列車;#00ffc040;列車%l;#;を、一足早く走らせよう――と考えています」
2136 = "「然後儘可能快地讓我們的\\x%l列車;#00ffc040;列車%l;#;跑在大家一起創作出的立體未來圖景上」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「走らせる？」
2231 = "「跑在上面？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ええ、この模型の中の線路は通電しているそうなのです。\nそこに、モーターのついた模型の\x%l列車;#00ffc040;列車%l;#;を走らせる」
2115 = "「沒錯。這個模型中的鐵路是通電的。我們想讓帶馬達的\\x%l列車;#00ffc040;列車%l;#;模型在這上面跑起來」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「はぁぁ、そぎゃんかこつが出来っとですか」
1935 = "「嘿，還能這麼搞啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lNゲージ;#00ffc040;Nゲージ%l;#;というものだそうです。鉄道マニ――\nファンのみなさんにとっては、有名なものだそうで」
2256 = "「這個東西叫\\x%lNゲージ;#00ffc040;ＮＧａｕｇｅ%l;#;。在鐵路迷——鐵路愛好者之間好像相當有名」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ほぉお。大廃線がもしもなければ、\nそこらのおもちゃ屋でも売られておったとですかねぇ」
1937 = "「噢。要是沒有發生大廢線，是不是一般的玩具店也會賣這種東西啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれませんね。鉄道は、どうやらこんな状況下でも、\n子供の心を、強く刺激するもののようですから」
2100 = "「有可能。畢竟在這種情況下，鐵路也依舊吸引著孩子們的心」" 

# monologue
# JP: 日々姫の前には、今度は小さな姉と弟。
2773 = "日日姬正在和一對年幼的姐弟對話。" 

# monologue
# JP: 弟がわたわた話す言葉を、\nおねえちゃんが、日々姫に通訳して伝えている。
2572 = "姐姐在幫弟弟翻譯他凌亂的語言。" 

# 【蓑笠】
