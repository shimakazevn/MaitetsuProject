2564 = "她的雙腳變熱，踩踏的力度也變得更強。" 

# 【日々姫】
# display as 日日姬
# JP: 「――そのモザイクは絶対に、\nすごく素敵な、御一夜の未来図になるから」
1480 = "「——這張鑲嵌畫肯定會成為一張非常精彩的御一夜未來圖景」" 

# 【双鉄】
# display as 雙鐵
# JP: 「モザイクか」
2302 = "「鑲嵌畫啊」" 

