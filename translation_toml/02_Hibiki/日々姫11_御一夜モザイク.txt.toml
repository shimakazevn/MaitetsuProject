2877 = "等等，現在可不是顧著享受按摩的時候。" 

# monologue
# JP: 日々姫をこの部屋に呼んだ目的を果たさねば。
2669 = "我叫日日姬到這裡來是有事情的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうと――日々姫――っんっ――\n少し――相談が――あるのだが」
1976 = "「對了……日日姬……嗯……我想……和你……商量件事」" 

# 【日々姫】
# display as 日日姬
# JP: 「相談って――なんです？　――兄さん――んんっ！\nって！　これじゃ、息があがって会話になりませんよ！」
1887 = "「商量……什麼事？哥哥……呃！哎！喘得這麼厲害根本沒辦法談話！」" 

# monologue
# JP: 言って僕から体を離し、\n日々姫はパパパと、手早く布団を敷いてしまう。
2568 = "她離開我身旁，迅速鋪起了被褥。" 

# 【日々姫】
# display as 日日姬
# JP: 「足でやります。\n兄さん、布団にうつぶせでごろんてしてください」
2028 = "「我用腳給你按摩。哥哥，趴在被褥上吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1926 = "「嗯」" 

# monologue
# JP: 布団の上に、言われるがまま寝転がる。\nと、日々姫が僕の腰のあたりに、おずおず足を乗せてくる。
2696 = "我照她說的臥在了被褥上。然後日日姬戰戰兢兢地把腳放上我的腰部。" 

# 【日々姫】
# display as 日日姬
# JP: 「ええと、いいですか？　痛かったり重かったり……\nイヤだったりしたらすぐに言ってくださいね」
1853 = "「呃，先說好了，要是覺得痛覺得重……想停下來的話要馬上說出來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無いとは思うが、万一のときにはそうしよう」
2016 = "「我想應該不會。不過要是真的這樣，我會說的」" 

# monologue
# JP: ほっと、安心したような息。\nそして日々姫は、体重をじわじわかけてくる。
2799 = "日日姬鬆了一口氣。接著，她開始一點點站了上來。" 

# 【日々姫】
# display as 日日姬
# JP: 「それじゃ、失礼します」
2288 = "「那我上了」" 

# monologue
# JP: （ふみゅっ）
3050 = "（踩）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1939 = "「噢」" 

# monologue
# JP: これは――\nなん……とも。
2968 = "這……真是……" 

# 【日々姫】
# display as 日日姬
# JP: 「気持ちいいですか？」
2193 = "「舒服嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ――ああ。じつに……悪くない」
1905 = "「嗯……啊。真……不錯」" 

# monologue
# JP: くつしたを脱いでいるのだろうか？
2770 = "日日姬把襪子脫了嗎？" 

# monologue
# JP: 日々姫の足の感触は、驚くほどに柔らかで、\n実に心地よく温かい。
2565 = "她的雙腳非常柔軟，又舒服又溫暖。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん……腰もこれ、バリバリですよ。\nしばらく、ふみふみしておきますね」
1877 = "「哥哥……你的腰部也很僵硬。我給你踩一會吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。頼む」
1925 = "「嗯。麻煩你了」" 

# monologue
# JP: （ふみっ、ふにゅっ――もにゅっ――こりゅっ）
3049 = "（踩、踩）" 

# monologue
# JP: 柔らかな足が時折、\n腰骨のあたりの硬い何かを踏み揉みずらす。
2808 = "柔軟的腳偶爾會揉到腰椎骨附近的硬包。" 

# monologue
# JP: 鼻息がフっ、と抜けるほど心地よく、\nいっそ、このまま眠ってしまいたくなる。が――
2703 = "我舒服得愜意地呼了一口氣。真想就這樣睡過去。可是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「それで日々姫。相談というのはだな」
2072 = "「日日姬，關於我剛才說的商量」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1926 = "「嗯」" 

# monologue
# JP: 蓑笠老人と話し合ったことをそのまま伝える。\nぴた、と日々姫の足が止まる。
2690 = "我把我和蓑笠爺爺之間的對話告訴了日日姬。她的腳突然停了下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
# 1939 = "「噢」" 

# monologue
# JP: じわじわ、ぽかぽか。\n踏まれる腰の温度が高くなってくる。
2794 = "日日姬踩到的位置溫度正一點點升高。" 

# monologue
# JP: 日々姫の体温が、足裏からでも伝わるほどに高くなってる。\nそれほど、喜んでくれている。
2982 = "通過她的腳掌，我能感覺到她的體溫正在上升。看來她非常高興。" 

# 【日々姫】
# display as 日日姬
# JP: 「やります。デザイン。三日――ううん、二日で。\nラフは、いくつも描いてあるんです」
2198 = "「行，我來設計。三天……不，兩天就行了。我已經畫過好幾幅草稿了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
2264 = "「這樣啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「絵の調子もすごく戻ってきたし、\nいけます、絶対。やらせてください」
2140 = "「畫畫的感覺也找回來了，絕對沒問題。讓我來做吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。無理がないのなら。\nこれは、日々姫にしか任せられんことだからな」
2254 = "「這件事只有你能做，你覺得能行當然希望你來做」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい！」
1927 = "「嗯！」" 

# monologue
# JP: 見えないけれど、声から見える。\n日々姫の笑みは、満面だ。
2997 = "雖然我看不到她的表情，但通過聲音，我也知道她現在正一臉笑容。" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――でも。大丈夫なら。\n職人さんたちに、もし手伝ってもらえるんなら」
1889 = "「啊……不過，要是工匠們願意來幫忙的話就好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1926 = "「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「お話聞いて、イメージ画起こして……そのあと、\n図面にするのが私、結構手間取ってるから」
2181 = "「聽取意見，畫出概念圖……這之後由我來製作圖紙的話會很費時間」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、その辺は分業でお願いできる――\nするべきだろうな」
2265 = "「這部分可以請他們幫忙——也確實應該這麼做」" 

# monologue
# JP: 僕は詳しくはないのだが……
2971 = "這方面我也不太清楚……" 

# monologue
# JP: 工業系の職人さんなら、図面起こしは、\nほとんど必須のスキルなのではなかろうか？
2451 = "不過對那些工業專業的工匠來說，製圖幾乎是必備技能吧？" 

# 【双鉄】
# display as 雙鐵
# JP: 「明日にでも蓑笠さんに、\n出来そうな方をご紹介いただこう」
2019 = "「我明天去請蓑笠先生幫忙介紹一下合適的人」" 

# 【日々姫】
# display as 日日姬
# JP: 「そうしてもらえたら、助かります！」
2281 = "「那就太好了！」" 

# monologue
# JP: トコトコと、\n再開された足踏みのリズムまでもが嬉しげだ。
2785 = "日日姬的腳重新動了起來。她的腳步踏著歡快的節奏。" 

# monologue
