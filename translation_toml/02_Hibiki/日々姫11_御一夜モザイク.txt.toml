2037 = "「我能從大家的話中感覺到大家擁有怎樣的回憶，怎樣的期望。我能感覺到其中的美好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2088 = "「是嗎」" 

# 【日々姫】
# display as 日日姬
