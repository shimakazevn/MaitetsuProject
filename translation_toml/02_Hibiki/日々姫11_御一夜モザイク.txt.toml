2291 = "「那我就拭目以待吧。我很期待看到車廂設計和主視覺圖」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　期待しとって！！」
1928 = "「嗯！敬請期待！！」" 

# monologue
# JP: （どんっ！）
3036 = "（咚！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おうっ！？」
