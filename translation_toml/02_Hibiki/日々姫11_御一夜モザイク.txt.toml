[script]
# lines: 425 
# 【蓑笠】
# display as 蓑笠
# JP: 「これが、今日の時点での名簿とです」
2262 = "「Đây là danh sách tính đến thời điểm hôm nay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「頂戴いたします」
2213 = "「Cháu xin nhận ạ.」"
# monologue
# JP: 人と、金と、風。\n真闇姉が言っていた言葉はそのまま優先順位だと痛感する。
2856 = "Con người, tiền bạc và luồng gió dư luận.\\ Tôi thấm thía rằng những lời chị Mayami nói chính là thứ tự ưu tiên trong bầu cử."
# monologue
# JP: どんなに風が吹いたとて、どんなに金があったとて、\n人の手と言葉がなければ、決してそれを活かしきれない。
2446 = "Dù luồng gió dư luận có thổi mạnh đến đâu, dù có bao nhiêu tiền đi chăng nữa,\\ nếu không có bàn tay và lời nói của con người, thì tuyệt đối không thể tận dụng triệt để những lợi thế đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……現時点での明確な支持は四割弱、\nという感じですか」
1491 = "「……Tỉ lệ ủng hộ rõ ràng ở thời điểm hiện tại chưa tới 40%,\\ đúng không ạ?」"
# monologue
# JP: この選挙戦は、\n実質的には日々姫と稀咲との一騎打ちだ。
2970 = "Cuộc bầu cử này,\\ thực chất là trận quyết đấu một mất một còn giữa Hibiki và Kisaki."
# monologue
# JP: その状況下で四割弱――\n三割八分は悪くない。悪くはない、が……
2588 = "Trong tình hình đó mà được chưa tới 40%——\\ 38% cũng không phải là tệ. Không tệ, nhưng……"
# 【蓑笠】
# display as 蓑笠
# JP: 「銀行さんの切り崩しば激しかとですけん、\n残りのほとんどは、様子見しゆう状況です」
2300 = "「Vì bên ngân hàng đang ra sức chia rẽ rất dữ dội,\\ nên phần lớn những người còn lại đều đang trong tình trạng chờ xem sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l客車;#00ffc040;客車%l;#;改修プロジェクトの丸呑みを表明されたのが、\nやはり、響いてしまっていますか」
2101 = "「Việc họ tuyên bố sao chép toàn bộ dự án phục hồi \\\\x%l客車;#00ffc040;toa hành khách%l;#;,\\ quả nhiên đã gây ra ảnh hưởng lớn sao ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「正直、そうなっておりますなぁ。\n双鉄くんば候補なら、みなも揺れやせんと思うですが」
2162 = "「Nói thật thì đúng là như vậy.\\ Nếu Sou-chan là ứng cử viên, thì chắc mọi người đã không lung lay đến thế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやいや、僕では広い支持が得られませんから」
1753 = "「Không không, cháu thì làm sao giành được sự ủng hộ rộng rãi chứ.」"
# monologue
# JP: とはいえ、蓑笠老人の評価は素直に嬉しくありがたい。\nここ、鍛冶屋町の世帯主たちは、そのほとんどが職人だ。
2453 = "Dù vậy, tôi vẫn cảm thấy rất vui và biết ơn trước lời đánh giá của ông Minokasa.\\ Phần lớn các chủ hộ ở khu phố thợ rèn này đều là những người thợ thủ công."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;改修のときの交流で、僕の努力を認めてくれた――\n蓑笠老人は、そう伝えてくれているのに等しいと思うから。
2981 = "Qua quá trình giao lưu lúc phục hồi \\\\x%l8620;#00ffc040;8620%l;#;, họ đã công nhận sự nỗ lực của tôi——\\ Lời của ông Minokasa chẳng khác nào đang truyền đạt lại điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は僕以上の努力家で、\n僕より遥かに豊かな政治的才能を持っています」
2070 = "「Hibiki là một người nỗ lực hơn cháu rất nhiều,\\ và con bé sở hữu tài năng chính trị phong phú hơn cháu gấp bội.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「それが目に見えてこんと、ちくと厳しいかもですな。\nここの住人ば、保守的なもんが多かとですからねぇ」
2214 = "「Nếu không thể hiện điều đó ra ngoài cho mọi người thấy thì e là hơi khó đấy.\\ Vì cư dân ở đây đa phần đều rất bảo thủ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1926 = "「Vâng.」"
# monologue
# JP: 基本的には御一夜の変化を求めない彼らが、\n参入余地も無い\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に積極的である筈がない。
2464 = "Về cơ bản, họ không mong muốn Ohimitera thay đổi,\\ nên chắc chắn họ không thể nào tích cực ủng hộ việc thu hút nhà máy \\\\x%lエアクラ;#00ffc040;Aircra%l;#; mà họ chẳng có chút cơ hội nào chen chân vào."
# monologue
# JP: にも関わらず、三割八分の票しか固まっていないのは、\n日々姫のリーダーシップを不安視しているからだろう。
2479 = "Mặc dù vậy, số phiếu bầu chắc chắn chỉ dừng lại ở mức 38%,\\ có lẽ là do họ vẫn còn e ngại về khả năng lãnh đạo của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「その辺のご懸念を解消いただきたく、\n日々姫主導の新しい試みをレールショップで始めました」
2126 = "「Để xóa bỏ những e ngại đó,\\ chúng cháu đã bắt đầu một thử nghiệm mới do Hibiki chủ đạo tại Rail Shop.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、\n汽車のおもちゃば、みんなで作るいうお話ですな」
1786 = "「À,\\ là chuyện mọi người cùng nhau làm đồ chơi tàu hỏa đó hả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪からはそう伝わりましたか？」
1814 = "「Nagi đã truyền đạt lại như vậy sao ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「違かとですかね？\nなんせあれの話は、あちこちに飛びよりますけん」
2312 = "「Không phải vậy sao?\\ Dù sao thì chuyện đó cũng đang được bàn tán rôm rả khắp nơi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いえ、基本的にはあっています。骨の部分は」
2172 = "「Dạ không, về cơ bản thì đúng là vậy ạ. Phần cốt lõi là thế.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「なら、肉と皮と筋ば、落としよったとですか」
2282 = "「Vậy là phần thịt, phần da và phần gân đã bị lược bỏ bớt rồi hả.」"
# monologue
# JP: くっくと、蓑笠老人は愛情たっぷりに苦笑する。
2914 = "Ông Minokasa cười khổ đầy trìu mến."
# 【蓑笠】
# display as 蓑笠
# JP: 「そいなら、双鉄くんから教えてもらえませんかのう。\nレールショップで、一体なんばしよっとですか」
2311 = "「Nếu vậy, Sou-chan có thể kể cho lão nghe được không.\\ Rốt cuộc mọi người đang làm gì ở Rail Shop thế?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。御一夜の未来図を、みんなで、\n模型で作りあげよう――ということをしています」
2143 = "「Vâng. Chúng cháu đang cùng nhau tạo ra\\ bản đồ tương lai của Ohimitera bằng mô hình——là như vậy ạ.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ほう？」
1943 = "「Ồ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「具体的には……ああ、いや」
1832 = "「Cụ thể là……à, không.」"
# monologue
# JP: お約束をいただいた時間は、まだ随分と残っている。\n店番は、奥様がされているようだし――
2878 = "Thời gian ông ấy dành cho tôi vẫn còn khá nhiều.\\ Cửa hàng thì có vẻ như phu nhân đang trông coi——"
# 【双鉄】
# display as 雙鐵
# JP: 「もしよろしければ、\nこれからご一緒にいかがですか？」
1994 = "「Nếu ông không phiền,\\ ông có muốn cùng cháu đến đó xem thử không ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「百聞は一見に如かずいうことですか。\nそれでは、ちくとお邪魔しますか」
2212 = "「Trăm nghe không bằng một thấy đúng không.\\ Vậy thì, lão xin phép làm phiền một chút nhé.」"
# monologue
# JP: 蓑笠老人と連れ立って店を出る。
2671 = "Tôi cùng ông Minokasa rời khỏi cửa hàng."
# monologue
# JP: 鍛冶屋橋を渡り、隈元銀行の脇を抜ければ、\nレールショップまではもうひと息だ。
2508 = "Băng qua cầu Kajiya, đi ngang qua ngân hàng Kumamoto,\\ là chỉ còn một đoạn ngắn nữa là đến Rail Shop."
# 【蓑笠】
# display as 蓑笠
# JP: 「おお、人だかりばしておりますな」
1942 = "「Ồ, đông người tụ tập quá nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これは……まさか、もうこんなに反応が？」
2114 = "「Đây là……không lẽ, phản ứng lại tốt đến mức này sao?」"
# monologue
# JP: 凪とふかみがよほど頑張ってくれたのだろうか？\n集まっているほとんどが、学園生のように見える。
2803 = "Chắc Nagi và Fukami đã cố gắng hết sức rồi nhỉ?\\ Phần lớn những người đang tụ tập ở đây trông có vẻ là học sinh trong trường."
# 【学園生Ａ】
# display as 學生Ａ
# JP: 「ね、何つくってもらうつもりと？」
1793 = "「Này, cậu định nhờ làm cái gì thế?」"
# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「おばあちゃんのお店」
2011 = "「Cửa hàng của bà tớ.」"
# 【学園生Ａ】
# display as 學生Ａ
# JP: 「懐かしかねー、ちっちゃいころ、\nあそこのコロッケ、良く御馳走になったねぇ」
1961 = "「Hoài niệm thật đấy, hồi nhỏ,\\ tớ hay được thiết đãi món croquette ở đó lắm.」"
# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「模型の中なら、閉店せんとずーっと残せるばい。\nわたし、写真持ってきたとよ」
2048 = "「Nếu ở trong mô hình thì có thể giữ lại mãi mãi mà không phải đóng cửa.\\ Tớ có mang theo ảnh chụp đây này.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ……こぎゃん催しですか」
1893 = "「À……thì ra là sự kiện như vậy.」"
# monologue
# JP: “まさか”が現実であるらしい。\nしかし――この行列では――
2841 = "\"Không lẽ\" dường như đã trở thành hiện thực.\\ Nhưng——với cái hàng người này thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。ちょっと通してくれ」
2050 = "「Xin lỗi. Cho tôi qua một chút.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ、双鉄様！\nお手伝いいただけますか」
1904 = "「A, ngài Soutetsu!\\ Ngài có thể giúp một tay không ạ?」"
# monologue
# JP: 日々姫の手元に、スケッチブックと画材一式。
2783 = "Trong tay Hibiki là cuốn sổ phác thảo và trọn bộ họa cụ."
# monologue
# JP: その向こうには、塗装が済んだ厚紙が、\nすでに何枚も溜まってしまっている。
2563 = "Xa hơn một chút, những tấm bìa cứng đã được sơn màu\\ đã chất thành một đống."
# 【双鉄】
# display as 雙鐵
# JP: 「驚いたな。\n組み立てよりも部材作成の方が早いのか？」
2157 = "「Ngạc nhiên thật đấy.\\ Việc tạo ra các bộ phận còn nhanh hơn cả việc lắp ráp sao?」"
# 【ハチロク】
# display as 八六
# JP: 「わたくし、紙のようなか弱いものを組み立てるのは、\nどうにも、余り得意ではないようで」
2032 = "「Tôi dường như không giỏi lắm\\ trong việc lắp ráp những thứ mỏng manh như giấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\n車輌整備で厚紙を細工する機会などないものな」
1844 = "「Ra là vậy.\\ Trong bảo dưỡng toa xe thì làm gì có cơ hội chế tác bìa cứng đâu.」"
# monologue
# JP: 手伝いたいのはやまやまだ。\nが、今は僕は――
2664 = "Tôi rất muốn giúp một tay.\\\nNhưng hiện tại tôi đang——"
# 【蓑笠】
# display as 蓑笠
# JP: 「そぎゃんこつなら、私もお手伝いしましょうか。\n手ば動かしながらでも、話はできますけんねぇ」
2004 = "「Nếu vậy thì để lão phụ một tay nhé.\\ Vừa làm vừa nói chuyện cũng được mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます、蓑笠さん。\n助かります」
1948 = "「Cháu cảm ơn ông Minokasa.\\\nĐược vậy thì tốt quá ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、次の出来た――って、わ！？\nにぃに！　蓑笠さんっ」
1834 = "「Xong cái tiếp theo rồi đây——ơ, oa!?\\ Anh hai! Ông Minokasa!」"
# monologue
# JP: 塗装の済んだ新しい紙をテーブルに置いたその瞬間、\n僕らに気付いた日々姫はパっと笑顔をほころばせる。
2768 = "Ngay khoảnh khắc đặt tấm bìa mới sơn lên bàn,\\ Hibiki nhận ra chúng tôi và nở một nụ cười rạng rỡ."
# 【日々姫】
# display as 日日姬
# JP: 「蓑笠さん、いらっしゃいませ。\nそれから、兄さん。おかえりなさい」
2197 = "「Cháu chào ông Minokasa.\\ Và, anh trai. Mừng anh đã về.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ただいま。\nこちらのことは気にせず、続けてくれ」
1918 = "「Ừm. Anh về rồi đây.\\ Đừng bận tâm đến anh, em cứ tiếp tục đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、そうさせてもらいますね。\n――すみません、お待たせしました」
1965 = "「Vâng, vậy em xin phép nhé.\\ ――Xin lỗi vì đã để quý khách phải chờ.」"
# monologue
# JP: 学園生の保護者だろうか？\n賑わいに引かれてやってきてくれた方だろうか？
2988 = "Là phụ huynh của học sinh sao?\\ Hay là người bị thu hút bởi sự náo nhiệt này mà đến?"
# 【日々姫】
# display as 日日姬
# JP: 「『みんなでつくろう御一夜未来レイアウト』が\nどういうものか、もうご存知ですか？」
1996 = "「Quý khách đã biết 『Cùng nhau tạo nên sa bàn tương lai Ohimitera』\\ là như thế nào chưa ạ?」"
# monologue
# JP: 目の前に座った中年女性と向き合うやいなやで、\n日々姫はもう、完全にスイッチを切り替えている。
2790 = "Vừa đối mặt với người phụ nữ trung niên ngồi trước mặt,\\ Hibiki đã hoàn toàn chuyển sang trạng thái tập trung."
# 【蓑笠】
# display as 蓑笠
# JP: 「私たちが入ってきたとに気づかんでしたか。\nいや、大した集中力ですなぁ」
1950 = "「Con bé không hề nhận ra chúng ta bước vào luôn sao.\\ Chà, sự tập trung đáng nể thật đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の取り柄の一つです。\nと、いうか……いや、蓑笠さんも素晴らしい」
2261 = "「Đó là một trong những điểm mạnh của Hibiki đấy ạ.\\ Hay nói đúng hơn là……không, ông Minokasa cũng tuyệt vời không kém.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ。\nこぎゃんとは、単なる技術ですけんねぇ」
1912 = "「À.\\\nCái này chỉ là kỹ thuật đơn thuần thôi mà.」"
# monologue
# JP: 僕と普通に会話しながら、\n蓑笠さんの指はもう、素早く正確に紙を切り抜いている。
2907 = "Vừa nói chuyện bình thường với tôi,\\ những ngón tay của ông Minokasa đã nhanh nhẹn và chuẩn xác cắt rời những mảnh giấy."
# monologue
# JP: 紙細工など普段は全くしないだろうに……\nその手指がいかに鍛え抜かれたものかを、痛感する。
2467 = "Bình thường chắc hẳn ông ấy chẳng bao giờ làm đồ thủ công bằng giấy……\\ Tôi thấu hiểu sâu sắc những ngón tay ấy đã được rèn luyện đến nhường nào."
# 【蓑笠】
# display as 蓑笠
# JP: 「こん模型ば、みなの注文を聞きながら、\n仕上げていくいうことですか」
2253 = "「Những mô hình này, là vừa nghe yêu cầu của mọi người,\\ vừa hoàn thiện dần sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、御一夜の町に重点を置き、そこから湯医線沿線の\n光景を、簡略化してジオラマでつくり上げる計画です」
2095 = "「Vâng, chúng cháu dự định tập trung vào khu vực thị trấn Ohimitera, từ đó\\ sẽ đơn giản hóa và dựng thành sa bàn quang cảnh dọc tuyến Yui ạ.」"
# monologue
# JP: 御一夜市内だけでは、足りない。\n線路は続き、線路は繋ぐものだから。
2483 = "Nếu chỉ có khu vực nội thành Ohimitera thì không đủ.\\ Bởi vì đường ray là thứ kéo dài và kết nối mọi thứ lại với nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「そうしてみんなで作った御一夜からの立体未来図上に、\n僕らの\x%l列車;#00ffc040;列車%l;#;を、一足早く走らせよう――と考えています」
2136 = "「Và trên bản đồ tương lai 3D của Ohimitera do mọi người cùng nhau tạo ra đó,\\ chúng cháu dự định sẽ cho \\\\x%l列車;#00ffc040;đoàn tàu%l;#; của chúng ta chạy thử một bước trước——là như vậy ạ.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「走らせる？」
2231 = "「Cho chạy thử?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ええ、この模型の中の線路は通電しているそうなのです。\nそこに、モーターのついた模型の\x%l列車;#00ffc040;列車%l;#;を走らせる」
2115 = "「Vâng, đường ray trong mô hình này dường như có thể dẫn điện.\\ Chúng cháu sẽ cho \\\\x%l列車;#00ffc040;đoàn tàu%l;#; mô hình có gắn động cơ chạy trên đó.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「はぁぁ、そぎゃんかこつが出来っとですか」
1935 = "「Chà, thì ra là có thể làm được như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lNゲージ;#00ffc040;Nゲージ%l;#;というものだそうです。鉄道マニ――\nファンのみなさんにとっては、有名なものだそうで」
2256 = "「Người ta gọi nó là \\\\x%lNゲージ;#00ffc040;N-gauge%l;#; ạ. Đối với những người đam mê——\\ những người hâm mộ đường sắt thì nó rất nổi tiếng đấy ạ.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ほぉお。大廃線がもしもなければ、\nそこらのおもちゃ屋でも売られておったとですかねぇ」
1937 = "「Hô. Nếu không có cuộc Đại bãi bỏ các tuyến đường sắt,\\ thì chắc nó cũng được bán ở mấy cửa hàng đồ chơi quanh đây rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「かもしれませんね。鉄道は、どうやらこんな状況下でも、\n子供の心を、強く刺激するもののようですから」
2100 = "「Có lẽ vậy ạ. Đường sắt, dù trong hoàn cảnh như thế này,\\ dường như vẫn kích thích mạnh mẽ trí tưởng tượng của trẻ nhỏ.」"
# monologue
# JP: 日々姫の前には、今度は小さな姉と弟。
2773 = "Trước mặt Hibiki lúc này là một cặp chị em nhỏ tuổi."
# monologue
# JP: 弟がわたわた話す言葉を、\nおねえちゃんが、日々姫に通訳して伝えている。
2572 = "Cậu em trai đang líu ríu nói,\\ còn cô chị thì dịch lại cho Hibiki nghe."
# 【蓑笠】
# display as 蓑笠
# JP: 「……ターンテーブル。\nまた渋かリクエストとですなぁ」
1494 = "「……Bàn quay đầu máy.\\ Lại là một yêu cầu khó nhằn đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「見学会に来てくれたお子さんなんだと思います。\nよほど、印象が強かったんでしょう」
1772 = "「Cháu nghĩ đó là những đứa trẻ đã đến buổi tham quan.\\ Chắc hẳn chúng đã có ấn tượng rất mạnh.」"
# monologue
# JP: じつに、嬉しい。\n見知らぬ誰かの描く“夢の御一夜”のその中に。
2531 = "Thực sự rất vui.\\ Trong \"Ohimitera mơ ước\" do một người xa lạ nào đó vẽ nên."
# monologue
# JP: 鉄道が、\n\x%l8620;#00ffc040;8620%l;#;がより活躍する景色があると、教えてもらえて。
2614 = "Có hình ảnh đường sắt,\\ có hình ảnh \\\\x%l8620;#00ffc040;8620%l;#; đang hoạt động sôi nổi, được nghe họ kể lại như vậy."
# 【蓑笠】
# display as 蓑笠
# JP: 「その――走らせる、“僕らの\x%l列車;#00ffc040;列車%l;#;”おっしゃるのは、\n\x%l8620;#00ffc040;8620%l;#;に、改修をした\x%l客車;#00ffc040;客車%l;#;ば引かせた模型とですか？」
1823 = "「Cái——\"đoàn tàu của chúng ta\" mà cậu nhắc đến,\\ có phải là mô hình \\\\x%l8620;#00ffc040;8620%l;#; kéo theo \\\\x%l客車;#00ffc040;toa hành khách%l;#; đã được phục hồi không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、そのとおりです」
2097 = "「Vâng, đúng vậy ạ.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「しかし」
1845 = "「Nhưng mà」"
# monologue
# JP: 蓑笠老人のしわだらけの手は、\nすでにみっつの紙建築を完成させている。
2917 = "Đôi bàn tay nhăn nheo của ông Minokasa\\ đã hoàn thành xong ba mô hình kiến trúc bằng giấy."
# monologue
# JP: 僕はまだ、一つ目の糊付けの途中というのに――
2885 = "Trong khi tôi vẫn đang loay hoay bôi hồ dán cho cái đầu tiên——"
# 【蓑笠】
# display as 蓑笠
# JP: 「これから作る\x%l客車;#00ffc040;客車%l;#;の模型ば、\nどぎゃんして手配するとですか」
1476 = "「Mô hình \\\\x%l客車;#00ffc040;toa hành khách%l;#; sắp tới,\\ cậu định chuẩn bị như thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lNゲージ;#00ffc040;Nゲージ%l;#;の車輌も、実車輌と構造が似ているのです。\n車輪つきのシャーシの上に、車体が乗る」
1471 = "「Toa xe \\\\x%lNゲージ;#00ffc040;N-gauge%l;#; cũng có cấu trúc tương tự toa xe thật ạ.\\ Thân xe được đặt trên khung gầm có bánh xe.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ええ」
# 1926 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「シャーシは流用可能だそうなので、\n車輌部分を自作すれば、それで済むと聞きました」
2035 = "「Cháu nghe nói khung gầm có thể tái sử dụng,\\ nên chỉ cần tự làm phần thân xe là được ạ.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「そん自作ば、どぎゃん方法で」
1993 = "「Tự làm bằng cách nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「詳しくは、ポーレットにしかまだわかりませんが、\nプラ[バン]板を切ってどうのこうのと――」
1811 = "「Chi tiết thì hiện tại chỉ có Paulette mới biết rõ,\\ nhưng nghe nói là cắt tấm nhựa rồi làm gì đó——」"
# monologue
# JP: 言いながら、少しまずいなと今更気づく。
2707 = "Vừa nói, tôi chợt nhận ra có điều không ổn."
# monologue
# JP: ポーレットは今、車輌改修プロジェクトにほぼ掛りきりだ。\n\x%lNゲージ;#00ffc040;Nゲージ%l;#;車輌の製作に集中できる状態ではない。
2820 = "Hiện tại Paulette gần như dành trọn thời gian cho dự án phục hồi toa xe.\\ Không có tâm trí đâu mà tập trung vào việc chế tạo toa xe \\\\x%lNゲージ;#00ffc040;N-gauge%l;#;."
# 【蓑笠】
# display as 蓑笠
# JP: 「……プラで作れるもんなら、\n鉄でも代替できるとですかね？」
1493 = "「……Nếu làm bằng nhựa được,\\ thì chắc thay bằng sắt cũng được nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2321 = "「A!」"
# monologue
# JP: そうか。\nその手が――その手があったか。
2586 = "Phải rồi.\\\nCách đó——vẫn còn cách đó."
# monologue
# JP: 思えば同時に思い出す。\n凪が全開で回したモーターの、あの素晴らしいスピードを。
2683 = "Nghĩ đến đó, tôi chợt nhớ lại.\\ Tốc độ tuyệt vời của động cơ khi Nagi vặn hết cỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「出来る筈です。多少重量が増加したとて、\nモーターの余力は十分すぎるほどある筈ですから」
2039 = "「Chắc chắn là được ạ. Dù trọng lượng có tăng lên một chút,\\ nhưng sức mạnh của động cơ vẫn thừa sức kéo được.」"
# monologue
# JP: 蓑笠老人のおだやかな目が、\nゆっくりと、レールショップの賑わいを見渡す。
2913 = "Đôi mắt hiền từ của ông Minokasa\\ chậm rãi đưa mắt nhìn quanh sự náo nhiệt của Rail Shop."
# 【蓑笠】
# display as 蓑笠
# JP: 「皆がわいわいやっとるところにポンと混じるゆーんのは、\n私らのような者には、なかなかハードルが高かとですよ」
1977 = "「Việc tự dưng chen ngang vào chỗ mọi người đang vui vẻ ồn ào,\\ đối với những người như lão thì quả là một rào cản lớn đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのですか」
2088 = "「Vậy sao ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ですけん、『手伝って欲しい』いうきっかけば貰えれば、\nこん輪の中に、職人連中ば、引き込めそうに思います」
1780 = "「Thế nên, nếu có cớ là 『muốn nhờ giúp đỡ』,\\ thì lão nghĩ có thể kéo bọn thợ thủ công vào vòng tròn này được đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、手伝っていただきたく思っております。\nそういただけたら、これほど心強いことはありません」
2029 = "「Tất nhiên là cháu rất muốn nhờ mọi người giúp đỡ rồi ạ.\\ Được như vậy thì không còn gì vững tâm bằng.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「でしたら、双鉄くんの頼みば言うて誘うてみますか」
2290 = "「Nếu vậy, để lão lấy danh nghĩa là Sou-chan nhờ vả để mời họ xem sao nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おねがいします。ありがとうございます！」
2320 = "「Trăm sự nhờ ông ạ. Cháu cảm ơn ông rất nhiều!」"
# monologue
# JP: 頭を下げた拍子にふっと日々姫の姿が目に入ってくる。
2667 = "Vừa cúi đầu xuống, hình ảnh Hibiki chợt lọt vào tầm mắt tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「が――すみません。実際のお手伝いをいただくまで、\n数日の猶予をいただけますか？」
1778 = "「Nhưng mà——xin lỗi ông. Trước khi bắt tay vào làm thực tế,\\ ông có thể cho cháu thư thả vài ngày được không ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ。ですねぇ。模型ばつくりよるにも、\n\x%l客車;#00ffc040;客車%l;#;の図面とデザインと、必要になりますけんねぇ」
1766 = "「À. Đúng rồi nhỉ. Dù là làm mô hình,\\ thì cũng cần phải có bản vẽ và thiết kế của \\\\x%l客車;#00ffc040;toa hành khách%l;#; chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。なのですが、日々姫がこの状態なので、\nいつになるかは、当人に相談してみんことには」
2081 = "「Vâng. Nhưng mà, Hibiki đang trong tình trạng này,\\ nên khi nào xong thì phải bàn bạc với chính em ấy mới biết được ạ.」"
# monologue
# JP: とはいえ、投票日という時間制限もあることだ。
2883 = "Mặc dù vậy, cũng có giới hạn thời gian là ngày bỏ phiếu."
# 【双鉄】
# display as 雙鐵
# JP: 「そう長くはお待たせしません。最悪は仮のものとし、\n既存\x%l客車;#00ffc040;客車%l;#;のデザインで――ということも検討しますので」
1759 = "「Cháu sẽ không để mọi người phải chờ lâu đâu ạ. Tệ nhất thì cứ làm tạm thời,\\ với thiết kế của \\\\x%l客車;#00ffc040;toa hành khách%l;#; hiện có——cháu sẽ cân nhắc cả phương án đó nữa.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「わかったとです。そんなら、根回しばしておきますけん、\nいつでん、声ばかけてください」
2022 = "「Lão hiểu rồi. Vậy thì lão sẽ đi dọn đường trước,\\ khi nào cần cứ gọi lão một tiếng nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、ありがとうございます」
1962 = "「Vâng, cháu cảm ơn ông.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「と、ほいっ」
1955 = "「Rồi, xong.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ！」
1897 = "「A!」"
# monologue
# JP: 滞っていた全ての紙が、見事な建物に変わっている。\n紙細工とは思えぬ出来に、息を呑む。
2872 = "Tất cả những mảnh giấy còn dang dở đã biến thành những tòa nhà tuyệt đẹp.\\ Sự hoàn thiện khó tin đối với đồ thủ công bằng giấy khiến tôi nín thở."
# monologue
# JP: この短期間にこの仕事……\nまさしく、これこそが職人技だ。
2975 = "Hoàn thành công việc này trong thời gian ngắn như vậy……\\ Quả thực, đây chính là kỹ năng của một nghệ nhân."
# 【蓑笠】
# display as 蓑笠
# JP: 「でしたら、私はひとまずこいで」
2013 = "「Vậy thì, lão xin phép về trước.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お時間とお知恵とお力添えを、\n本当にありがとうございます」
1998 = "「Thực sự cảm ơn ông rất nhiều vì đã dành thời gian,\\ trí tuệ và sự giúp đỡ cho chúng cháu.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「いやいや」
2111 = "「Không có gì đâu.」"
# monologue
# JP: 蓑笠老人が軽く手を振る。
2916 = "Ông Minokasa khẽ vẫy tay."
# monologue
# JP: シワだらけで、節くれだって焼けていて、\n精緻に動くなどとはまるで、思えない手を。
2469 = "Đôi bàn tay đầy nếp nhăn, chai sạn và rám nắng,\\ trông không có vẻ gì là có thể cử động tinh xảo đến thế."
# 【蓑笠】
# display as 蓑笠
# JP: 「私なんぞ、孫可愛さでやっておるいうだけのことです。\nクマ川の水ば汚して、渡すわけにはいきませんけんねぇ」
2045 = "「Lão làm thế này cũng chỉ vì thương cháu gái thôi.\\ Lão không thể nào để dòng sông Kuma bị ô nhiễm rồi trao lại cho con cháu được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――お言葉、胸に刻みます」
1477 = "「——Cháu sẽ khắc ghi những lời này trong lòng.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「双鉄くんは、時代がかっておられますなぁ」
1798 = "「Sou-chan nói chuyện nghe có vẻ xưa cũ quá nhỉ.」"
# monologue
# JP: カッカと笑い、蓑笠老人はレールショップをあとにする。
2915 = "Cười ha hả, ông Minokasa rời khỏi Rail Shop."
# monologue
# JP: が、僕としては、時代がかったことを言ったつもりも、\n大げさなことを言ったつもりも、全くない。
2674 = "Nhưng với tôi, tôi hoàn toàn không có ý nói những lời xưa cũ,\\ hay nói quá lời chút nào."
# monologue
# JP: （まさしくだ。敗戦するようなことになったら、\nその影響は、子々孫々にまで及んでしまう）
3040 = "（Chính xác là vậy. Nếu chúng ta thua cuộc,\\ ảnh hưởng của nó sẽ lan đến tận con cháu đời sau.）"
# monologue
# JP: “子々孫々”など、今まで考えたことも無かった。
2901 = "\"Con cháu đời sau\", trước giờ tôi chưa từng nghĩ đến."
# monologue
# JP: その考えに僕を及ばせてくれたのもまた、\n今の御一夜を愛し、そこに暮らしている人たちだ。
2804 = "Và những người đã khiến tôi có suy nghĩ đó,\\ chính là những người yêu mến Ohimitera hiện tại, và đang sống ở nơi đây."
# monologue
# JP: （今のここにある御一夜を、クマ川を守るということは、\n歴史を守ると同時に、未来を作ることにもなる）
3032 = "（Bảo vệ Ohimitera hiện tại, bảo vệ sông Kuma,\\ không chỉ là bảo vệ lịch sử, mà còn là kiến tạo tương lai.）"
# monologue
# JP: そうするために、僕に、僕らに出来ること。\nそれは無数にあるだろう。
2828 = "Để làm được điều đó, những gì tôi và chúng ta có thể làm.\\ Chắc chắn là vô số."
# monologue
# JP: 一つでも多くをこなすためには、\n今この瞬間、できる一つに取り組むしかない。
2827 = "Để hoàn thành được càng nhiều càng tốt,\\ thì ngay lúc này, chỉ còn cách bắt tay vào làm những gì có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
1964 = "「Tốt!」"
# monologue
# JP: レールショップの閉店時刻まであと少し。
2488 = "Chỉ còn một chút nữa là đến giờ đóng cửa Rail Shop."
# monologue
# JP: 日々姫のペースに遅れないよう、\n一つでも、紙建築を進めていこう。
2704 = "Để không bị tụt lại so với tiến độ của Hibiki,\\ tôi sẽ tiếp tục hoàn thành thêm nhiều công trình giấy nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕は疲労していない」
1761 = "「Không, anh không thấy mệt.」"
# 【日々姫】
# display as 日日姬
# JP: 「鈍感なだけです。兄さんが」
1839 = "「Chỉ là do anh trai quá vô cảm thôi.」"
# monologue
# JP: 僕がほぐしてやった手を、\n日々姫は僕に、ビシリ鋭く突き立てる。
2779 = "Bàn tay vừa được tôi xoa bóp,\\ Hibiki dùng nó chọc mạnh vào tôi."
# 【日々姫】
# display as 日日姬
# JP: 「これだけ連日動き回って、今日は慣れない工作までして。\nいくら兄さんだって、疲労が溜まらないわけが無いです」
2266 = "「Anh đã chạy ngược chạy xuôi suốt mấy ngày liền, hôm nay lại còn làm công việc thủ công không quen thuộc nữa.\\ Dù là anh trai thì cũng không thể nào không tích tụ mệt mỏi được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うーむ」
1885 = "「Ưm.」"
# monologue
# JP: 疲労している感じは本当に無いのだが……
2700 = "Tôi thực sự không cảm thấy mệt mỏi chút nào nhưng……"
# monologue
# JP: 日々姫がこうまで主張するのだ、\nここは譲ってやるべきだろう。
2452 = "Hibiki đã khăng khăng như vậy,\\ thì tôi cũng nên nhượng bộ một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。\nならば僕はどうすればいい？」
1953 = "「Anh hiểu rồi.\\\nVậy anh phải làm sao đây?」"
# 【日々姫】
# display as 日日姬
# JP: 「それじゃ、背中を向けて座ってください」
2189 = "「Vậy thì, anh quay lưng lại rồi ngồi xuống đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1926 = "「嗯」" 
# monologue
# JP: 座った途端、日々姫の指が僕の肩へと触れてくる。\n親指が、くっくと軽く押し込まれてくる。
2653 = "Vừa ngồi xuống, những ngón tay của Hibiki đã chạm vào vai tôi.\\ Ngón tay cái ấn nhẹ vào."
# 【日々姫】
# display as 日日姬
# JP: 「うわ、兄さん、鉄板入ってるみたいですよ？\nこれ、凝ってるなんてもんじゃないです」
1867 = "「Oa, anh trai, vai anh cứng như tấm sắt vậy?\\ Thế này thì không chỉ là mỏi bình thường đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　自分ではよくわからん」
2089 = "「Vậy sao? Bản thân anh cũng không rõ nữa.」"
# monologue
# JP: いや、わかるわからんの話ではない。\n鉄板が入っているほど硬い肩なら――
2455 = "Không, đây không phải chuyện rõ hay không rõ.\\ Nếu vai cứng như tấm sắt thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の指は大丈夫なのか。\n絵描きが、鉄板を指で押していいわけがない」
1795 = "「Ngón tay của Hibiki có sao không?\\ Họa sĩ thì không nên dùng ngón tay ấn vào tấm sắt đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー……そうかもですね。\n全力でも、兄さん全然感じてくれないみたいですし」
1890 = "「A……chắc là vậy rồi.\\ Dù em có dùng hết sức thì có vẻ anh trai cũng chẳng cảm thấy gì cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや……」
1869 = "「Không……」"
# monologue
# JP: あれで全力というのなら、\n日々姫の指にはよほど力が無い――っと、おお？
2570 = "Nếu như vậy mà đã là hết sức,\\ thì ngón tay của Hibiki yếu quá——ơ, ồ?"
# monologue
# JP: （ぐいっ）
3048 = "（Nhấn）"
# monologue
# JP: 肘で来た。\n肘を尖らせ肩に乗せ、そこに体重をかけてきた。
2557 = "Em ấy dùng cùi chỏ.\\ Dùng cùi chỏ nhọn tì lên vai tôi, rồi dồn trọng lượng cơ thể vào đó."
# monologue
# JP: （ぐっ、ぐっ）
3045 = "（Nhấn, nhấn）"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、本当に鉄板入れてたりしません？\nこれ」
1879 = "「Anh trai, anh không nhét tấm sắt vào thật chứ?\\ Cái này cứng quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「何をバカな。少し待て」
1992 = "「Nói ngốc nghếch gì thế. Đợi chút.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　――わっ！　ひゃっ！？」
1875 = "「Hả? ――Oái! Hya!?」"
# monologue
# JP: 論より証拠で上を脱ぐ。
2862 = "Trăm nghe không bằng một thấy, tôi cởi áo ra."
# monologue
# JP: 日々姫は一瞬息を呑み。\nけれどもすぐに、先ほどまでより強く体重をかけてくる。
2766 = "Hibiki nín thở một nhịp.\\ Nhưng ngay sau đó, em ấy dồn trọng lượng mạnh hơn lúc nãy."
# monologue
# JP: （ぐいっ――ぐうっ――）
3046 = "（Nhấn——mạnh——）"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……お――\n少し――これは、気持ちいい……かな？」
1909 = "「Ưm……ồ——\\\nMột chút——cái này, cũng dễ chịu……nhỉ?」"
# 【日々姫】
# display as 日日姬
# JP: 「ならっ……んっ……\nほぐれ始めて……来てるんですっ――よっ！」
2156 = "「Vậy thì……ưm……\\\nBắt đầu mềm ra……rồi đấy——nhá!」"
# monologue
# JP: （ぐうううううっ！）
3047 = "（Nhấn mạnh!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おおっ……お――くっ！\nなるほど――日々姫も――やるものだ――なっ――と」
1936 = "「Ồ……ồ——ư!\\\nRa là vậy——Hibiki cũng——khá đấy——nhỉ.」"
# monologue
# JP: いや、違う。\nほぐしてもらう快感を、堪能している場合ではない。
2877 = "Không, không đúng.\\ Giờ không phải lúc để tận hưởng cảm giác sảng khoái khi được xoa bóp."
# monologue
# JP: 日々姫をこの部屋に呼んだ目的を果たさねば。
2669 = "Phải hoàn thành mục đích gọi Hibiki đến phòng này mới được."
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうと――日々姫――っんっ――\n少し――相談が――あるのだが」
1976 = "「Nhân tiện——Hibiki——ưm——\\ Anh có chuyện——muốn bàn——với em.」"
# 【日々姫】
# display as 日日姬
# JP: 「相談って――なんです？　――兄さん――んんっ！\nって！　これじゃ、息があがって会話になりませんよ！」
1887 = "「Bàn chuyện——gì vậy ạ? ——Anh trai——ưm!\\ Trời ạ! Cứ thế này thì thở không ra hơi, làm sao mà nói chuyện được!」"
# monologue
# JP: 言って僕から体を離し、\n日々姫はパパパと、手早く布団を敷いてしまう。
2568 = "Nói rồi em ấy lùi ra xa tôi,\\ nhanh nhẹn trải chăn đệm ra."
# 【日々姫】
# display as 日日姬
# JP: 「足でやります。\n兄さん、布団にうつぶせでごろんてしてください」
2028 = "「Em sẽ dùng chân.\\ Anh trai, hãy nằm sấp xuống chăn đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1926 = "「嗯」" 
# monologue
# JP: 布団の上に、言われるがまま寝転がる。\nと、日々姫が僕の腰のあたりに、おずおず足を乗せてくる。
2696 = "Tôi ngoan ngoãn nằm sấp xuống chăn.\\ Rồi Hibiki rụt rè đặt chân lên quanh eo tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ええと、いいですか？　痛かったり重かったり……\nイヤだったりしたらすぐに言ってくださいね」
1853 = "「Ừm, được chưa ạ? Nếu thấy đau hay nặng……\\ hoặc khó chịu thì anh phải nói ngay nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無いとは思うが、万一のときにはそうしよう」
2016 = "「Anh nghĩ là không sao đâu, nhưng phòng khi vạn nhất anh sẽ làm thế.」"
# monologue
# JP: ほっと、安心したような息。\nそして日々姫は、体重をじわじわかけてくる。
2799 = "Một tiếng thở phào nhẹ nhõm.\\ Rồi Hibiki từ từ dồn trọng lượng lên người tôi."
# 【日々姫】
# display as 日日姬
# JP: 「それじゃ、失礼します」
2288 = "「Vậy, em xin phép nhé.」"
# monologue
# JP: （ふみゅっ）
3050 = "（Dẫm）"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1939 = "「Ồ.」"
# monologue
# JP: これは――\nなん……とも。
2968 = "Cái này——\\\nthật là……biết nói sao đây."
# 【日々姫】
# display as 日日姬
# JP: 「気持ちいいですか？」
2193 = "「Anh thấy dễ chịu không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――ああ。じつに……悪くない」
1905 = "「Ừm——à. Quả thực……không tệ chút nào.」"
# monologue
# JP: くつしたを脱いでいるのだろうか？
2770 = "Có phải em ấy đã cởi tất ra rồi không?"
# monologue
# JP: 日々姫の足の感触は、驚くほどに柔らかで、\n実に心地よく温かい。
2565 = "Xúc cảm từ bàn chân Hibiki mềm mại đến kinh ngạc,\\ thực sự rất dễ chịu và ấm áp."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん……腰もこれ、バリバリですよ。\nしばらく、ふみふみしておきますね」
1877 = "「Anh trai……eo anh cũng cứng ngắc này.\\ Em sẽ giẫm lên đây một lúc nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。頼む」
1925 = "「Ừm. Nhờ em vậy.」"
# monologue
# JP: （ふみっ、ふにゅっ――もにゅっ――こりゅっ）
3049 = "（Dẫm, xoa——nhấn——nắn）"
# monologue
# JP: 柔らかな足が時折、\n腰骨のあたりの硬い何かを踏み揉みずらす。
2808 = "Bàn chân mềm mại thỉnh thoảng\\ lại giẫm và day vào thứ gì đó cứng cứng quanh xương chậu."
# monologue
# JP: 鼻息がフっ、と抜けるほど心地よく、\nいっそ、このまま眠ってしまいたくなる。が――
2703 = "Thoải mái đến mức tôi bất giác thở hắt ra,\\ thậm chí muốn cứ thế này mà ngủ thiếp đi. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「それで日々姫。相談というのはだな」
2072 = "「Vậy nên Hibiki này. Chuyện anh muốn bàn là thế này.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1926 = "「嗯」" 
# monologue
# JP: 蓑笠老人と話し合ったことをそのまま伝える。\nぴた、と日々姫の足が止まる。
2690 = "Tôi kể lại y nguyên cuộc trò chuyện với ông Minokasa.\\ Bàn chân Hibiki khựng lại."
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
# 1939 = "「噢」" 
# monologue
# JP: じわじわ、ぽかぽか。\n踏まれる腰の温度が高くなってくる。
2794 = "Râm ran, ấm áp.\\ Nhiệt độ ở phần eo đang được giẫm lên dần tăng cao."
# monologue
# JP: 日々姫の体温が、足裏からでも伝わるほどに高くなってる。\nそれほど、喜んでくれている。
2982 = "Thân nhiệt của Hibiki tăng cao đến mức có thể truyền qua cả lòng bàn chân.\\ Điều đó cho thấy em ấy đang vui mừng đến nhường nào."
# 【日々姫】
# display as 日日姬
# JP: 「やります。デザイン。三日――ううん、二日で。\nラフは、いくつも描いてあるんです」
2198 = "「Em sẽ làm. Thiết kế. Ba ngày——không, hai ngày thôi.\\ Em đã vẽ sẵn vài bản phác thảo rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
2264 = "「Vậy sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「絵の調子もすごく戻ってきたし、\nいけます、絶対。やらせてください」
2140 = "「Cảm giác vẽ của em cũng đã quay lại rồi,\\ chắc chắn sẽ làm được. Hãy để em làm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。無理がないのなら。\nこれは、日々姫にしか任せられんことだからな」
2254 = "「Tất nhiên rồi. Nếu em không thấy quá sức.\\ Vì chuyện này chỉ có thể giao cho Hibiki thôi mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい！」
1927 = "「Vâng!」"
# monologue
# JP: 見えないけれど、声から見える。\n日々姫の笑みは、満面だ。
2997 = "Dù không nhìn thấy, nhưng tôi có thể mường tượng qua giọng nói.\\ Nụ cười rạng rỡ đang hiện trên khuôn mặt Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「あ――でも。大丈夫なら。\n職人さんたちに、もし手伝ってもらえるんなら」
1889 = "「A——nhưng mà. Nếu được.\\ Nếu các nghệ nhân có thể giúp đỡ thì tốt quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1926 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「お話聞いて、イメージ画起こして……そのあと、\n図面にするのが私、結構手間取ってるから」
2181 = "「Nghe ý tưởng, vẽ phác thảo……sau đó,\\ việc dựng thành bản vẽ với em khá là tốn thời gian.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、その辺は分業でお願いできる――\nするべきだろうな」
2265 = "「À, phần đó có thể chia ra nhờ họ làm——\\ Chắc là nên làm thế nhỉ.」"
# monologue
# JP: 僕は詳しくはないのだが……
2971 = "Tôi thì không rành lắm nhưng……"
# monologue
# JP: 工業系の職人さんなら、図面起こしは、\nほとんど必須のスキルなのではなかろうか？
2451 = "Nếu là nghệ nhân trong ngành công nghiệp,\\ thì việc dựng bản vẽ gần như là kỹ năng bắt buộc phải không nhỉ?"
# 【双鉄】
# display as 雙鐵
# JP: 「明日にでも蓑笠さんに、\n出来そうな方をご紹介いただこう」
2019 = "「Ngay ngày mai anh sẽ nhờ ông Minokasa\\ giới thiệu người có khả năng làm việc đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうしてもらえたら、助かります！」
2281 = "「Được vậy thì tốt quá ạ!」"
# monologue
# JP: トコトコと、\n再開された足踏みのリズムまでもが嬉しげだ。
2785 = "Lộp cộp,\\ ngay cả nhịp điệu giẫm chân được tiếp tục cũng ngập tràn niềm vui."
# monologue
# JP: 日々姫は腰をはみ出して、\n背中の方へ、じわじわふみふみ進出してくる。
2554 = "Hibiki vượt qua eo,\\\ntừ từ giẫm lên phía lưng tôi."
# 【日々姫】
# display as 日日姬
# JP: 「痛かったら言ってくださいよ？　兄さん」
1881 = "「Nếu đau thì anh phải nói đấy nhé? Anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――全くもって痛くない。\n心地よいばかりだ――というか」
2112 = "「Không——hoàn toàn không đau chút nào.\\ Chỉ thấy dễ chịu thôi——nói đúng hơn là.」"
# monologue
# JP: 背中は完全にむき出しだから、\n日々姫の足裏の感触を、いっそう生生しく感じる。
2661 = "Vì lưng tôi đang hoàn toàn để trần,\\ nên xúc cảm từ lòng bàn chân Hibiki càng trở nên chân thực hơn."
# monologue
# JP: 日々姫の汗か、僕の汗――\nいや、その両方が恐らくまじり、ぬらついている。
2445 = "Mồ hôi của Hibiki, hay mồ hôi của tôi——\\ Không, có lẽ là mồ hôi của cả hai đang hòa quyện vào nhau, trơn ướt."
# 【双鉄】
# display as 雙鐵
# JP: 「絵の調子、戻ってきたのか」
1785 = "「Cảm giác vẽ của em, đã trở lại rồi sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「描けない！　っていうぐじゃぐじゃしたのは、\nなくなりました」
2294 = "「Cái cảm giác rối bời kiểu 『Không vẽ được!』,\\ đã biến mất rồi ạ.」"
# monologue
# JP: 即座の答えと裏腹に、足は、背中をゆっくり進む。\n恐らく、肩を目指している。
2789 = "Trái ngược với câu trả lời dứt khoát, bàn chân em ấy chậm rãi tiến lên lưng.\\ Có lẽ là đang nhắm tới bờ vai."
# 【日々姫】
# display as 日日姬
# JP: 「みんなの思い出を聞かせてもらって――、\nそしたら私、見えてくるから描けるんだって、わかって」
2180 = "「Được nghe những kỷ niệm của mọi người——,\\ nhờ đó em nhận ra rằng, chỉ cần nhìn thấy là em có thể vẽ được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「見えてくる？　何がだ」
2190 = "「Nhìn thấy? Thấy cái gì cơ?」"
# 【日々姫】
# display as 日日姬
# JP: 「伝えてもらってる思い出の形。希望の形。\nその綺麗さが、見えてくるんです」
2037 = "「Hình dáng của những kỷ niệm được truyền đạt. Hình dáng của những hy vọng.\\ Em có thể nhìn thấy được vẻ đẹp của chúng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2088 = "「是嗎」" 
# 【日々姫】
# display as 日日姬
# JP: 「メインビジュアルのときは、めいっぱいに混ぜようって、\nぐじゃぐじゃ考えすぎちゃったみたいで」
2025 = "「Hồi vẽ hình ảnh chủ đạo, em muốn nhồi nhét tất cả vào,\\ nên có vẻ đã suy nghĩ quá nhiều đâm ra rối bời.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2264 = "「這樣啊」" 
# monologue
# JP: 一人ひとりの希望や思い出。\nその綺麗さなら、日々姫は間違いなく見て取れる。
2775 = "Hy vọng và kỷ niệm của từng người.\\ Nếu là vẻ đẹp đó, Hibiki chắc chắn có thể nhìn thấu được."
# monologue
# JP: （しかし……そうか、メインビジュアルのときは――\n僕らの希望が、詳細すぎて、近すぎて……）
3035 = "（Nhưng mà……ra là vậy, lúc vẽ hình ảnh chủ đạo thì——\\ Hy vọng của chúng tôi quá chi tiết, quá gần gũi……）"
# monologue
# JP: 処理しきれない情報が、混乱のままに入り混じり――\n日々姫は恐らく、綺麗さを見失ってしまったのだろう。
2524 = "Những thông tin không thể xử lý hết cứ thế hòa trộn trong sự hỗn loạn——\\ Có lẽ Hibiki đã đánh mất đi cái nhìn về vẻ đẹp."
# 【日々姫】
# display as 日日姬
# JP: 「考えすぎて、見えなくなって。\n見えないものは、描けなくて」
2033 = "「Suy nghĩ quá nhiều, dẫn đến không còn nhìn thấy gì nữa.\\ Mà không nhìn thấy, thì không thể vẽ được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな。日々姫が描くのは昔から、\n日々姫が綺麗と感じたそのまま――それだけだった」
2086 = "「Đúng vậy nhỉ. Từ xưa đến nay, Hibiki luôn vẽ,\\ chính xác những gì Hibiki cảm thấy đẹp——chỉ vậy thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1927 = "「嗯！」" 
# monologue
# JP: わかってもらえた！\n言わんばかりの、幼さを感じるほどに素直な返事。
2780 = "Anh hiểu em rồi!\\ Câu trả lời chân thật đến mức có thể cảm nhận được sự trẻ con như muốn nói vậy."
# 【日々姫】
# display as 日日姬
# JP: 「それで私、ひらめいたんです。メインビジュアル――\n全部の綺麗を、ひとつにまとめるんじゃなくって」
2138 = "「Thế là em chợt nảy ra ý tưởng. Hình ảnh chủ đạo——\\ Không cần phải gom tất cả những vẻ đẹp vào làm một.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1926 = "「嗯」" 
# monologue
# JP: きゅっと、日々姫の足が踏む。\n肩甲骨の裏の柔らかになってるところ。
2759 = "Bàn chân Hibiki giẫm mạnh một cái.\\ Vào chỗ mềm mại phía sau xương bả vai."
# monologue
# JP: そこまで、日々姫は到達している。
2551 = "Hibiki đã chạm đến tận đó rồi."
# 【日々姫】
# display as 日日姬
# JP: 「みんなの綺麗、みんなの笑顔、ひとつひとつを。\nそれぞれ描いて、集めてモザイクにすればいいって」
1842 = "「Vẻ đẹp của mọi người, nụ cười của mọi người, từng cái một.\\ Chỉ cần vẽ riêng từng cái, rồi tập hợp lại thành bức khảm là được.」"
# monologue
# JP: 足の温度が高くなる。\n踏み込む力が強くなる。
2564 = "Nhiệt độ bàn chân tăng lên.\\ Lực giẫm xuống cũng mạnh hơn."
# 【日々姫】
# display as 日日姬
# JP: 「――そのモザイクは絶対に、\nすごく素敵な、御一夜の未来図になるから」
1480 = "「——Bức khảm đó tuyệt đối,\\ sẽ trở thành một bản đồ tương lai vô cùng tuyệt vời của Ohimitera.」"
# 【双鉄】
# display as 雙鐵
# JP: 「モザイクか」
2302 = "「Bức khảm sao.」"
# monologue
# JP: 確か、たくさんの断片がつなぎ合わされ、\nそれがひとつの絵として浮かび上がってくる手法だ。
2706 = "Nếu nhớ không lầm, đó là kỹ thuật ghép nhiều mảnh vỡ lại với nhau,\\ để tạo nên một bức tranh hoàn chỉnh."
# monologue
# JP: 思った瞬間、おにぎりを手に放浪する画家の作品が。\n[ながおか,1]長丘の花火が描かれた情景が、パっと頭に浮かんでくる。
2972 = "Vừa nghĩ đến đó, tác phẩm của người họa sĩ lang thang cầm nắm cơm nắm trên tay.\\ Khung cảnh pháo hoa Nagaoka chợt lóe lên trong đầu tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜モザイク――\nみんなの希望をつなぎあわせた未来図か」
1989 = "「Bức khảm Ohimitera——\\ Bản đồ tương lai kết nối hy vọng của mọi người sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ」
# 1926 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、仕上がりを楽しみに待とう。\nデザインも、メインビジュアルも両方だ」
2291 = "「Vậy thì, anh sẽ mong chờ xem thành phẩm thế nào.\\ Cả thiết kế và hình ảnh chủ đạo.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　期待しとって！！」
1928 = "「Vâng! Anh cứ mong đợi đi!!」"
# monologue
# JP: （どんっ！）
3036 = "（Bịch!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おうっ！？」
1941 = "「Oái!?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　ゴメンっ！　痛かったと！？」
1899 = "「A! Em xin lỗi! Anh có đau không!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「い、や――」
2110 = "「Kh-Không——」"
# monologue
# JP: 喜びの、強い足踏みに踏み抜かれ、\n肩が――確かに痛んだが、その何倍もほぐれた気がした。
2550 = "Bị giẫm mạnh bởi niềm vui sướng,\\ vai tôi——quả thực có đau, nhưng tôi cảm thấy nó được nới lỏng gấp nhiều lần."
# 【双鉄】
# display as 雙鐵
# JP: 「肩……だがな、肩甲骨というよりも、前側――\n鎖骨の下のあたりが、一番疲れているのかもしれん」
2187 = "「Vai……nhưng mà, thay vì xương bả vai, thì phía trước——\\ khu vực dưới xương quai xanh, có lẽ là mỏi nhất.」"
# 【日々姫】
# display as 日日姬
# JP: 「前……側？」
1822 = "「Phía……trước ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――今、刺激がそこに抜けたような感じがしてな。\nあまりにも心地よく、それで声が出てしまったのだ」
1914 = "「Ừm——vừa rồi, anh có cảm giác như sự kích thích đã xuyên qua đó.\\ Vì quá dễ chịu, nên anh mới buột miệng kêu lên.」"
# 【日々姫】
# display as 日日姬
# JP: 「そ、そっか――そうなんだ。\nそう――なん、です……か」
1827 = "「Ra, ra là vậy——là vậy sao.\\\nRa——là, vậy……ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1933 = "「Hử?」"
# monologue
# JP: にちゃり、と感触。\n日々姫の足裏からはっきりと、新たな汗が染みだしている。
2893 = "Cảm giác nhóp nhép.\\ Lòng bàn chân Hibiki rõ ràng đang rịn thêm mồ hôi mới."
# 【日々姫】
# display as 日日姬
# JP: 「なら――あの、兄さん。私、前側……その……\n踏んで――あげたいかなぁ、って、思う、かも」
2276 = "「Vậy thì——ưm, anh trai. Em, phía trước……ừm……\\ muốn——giẫm cho anh, chắc, là vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　であればお願いしよう」
2160 = "「Thế à? Vậy nhờ em nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「う、うん。じゃあ、ごろんって、仰向けになって？」
1923 = "「Ư, vâng. Vậy, anh lật người lại, nằm ngửa ra đi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。\n――っ！！？」
1952 = "「Ừ.\\\n——!!?」"
# monologue
# JP: これは――\n日々姫は、そうか、スカートだったか。
2967 = "Cái này——\\\nHibiki, đúng rồi, đang mặc váy mà."
# 【日々姫】
# display as 日日姬
# JP: 「踏むから、リラックスしてて？」
2026 = "「Em giẫm đây, anh thả lỏng nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「お、おう」
1883 = "「Ồ, ồ.」"
# monologue
# JP: 前肩、鎖骨の下をぐっぐと、\n日々姫の両足が踏みほぐしてくる。
2764 = "Phía trước vai, dưới xương quai xanh,\\ hai chân Hibiki đang giẫm ấn xoa bóp."
# monologue
# JP: 強制的に息を呑まされる、\nそれは刺激で、強い快感。
2609 = "Bị ép phải nín thở,\\ đó là sự kích thích, một khoái cảm mãnh liệt."
# 【日々姫】
# display as 日日姬
# JP: 「お、終わって欲しいときは言ってね？\n私、それまで――いくらでも踏むから」
2023 = "「K-Khi nào muốn dừng thì anh bảo nhé?\\ Em, cho đến lúc đó——sẽ giẫm bao lâu cũng được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、ああ」
# 1926 = "「嗯」" 
# monologue
# JP: 日々姫は僕の両肩を踏み――\nつまりはほとんど、僕の顔をまたいでいる。
2796 = "Hibiki giẫm lên hai vai tôi——\\ nói cách khác, gần như đang sải chân qua mặt tôi."
# monologue
# JP: 太ももの付け根が、ひどくあやうげなスカートが、\n日々姫の動きにつれ揺れ動き、僕の視線を釘付けにする。\n（これ……は）
2561 = "Gốc đùi, chiếc váy cực kỳ hớ hênh,\\ rung rinh theo từng chuyển động của Hibiki, khiến ánh mắt tôi dán chặt vào đó.\\ （Cái này……là）"
# 【日々姫】
# display as 日日姬
# JP: 「ん……はっ……はうっ」
1907 = "「Ưm……ha……hấu」"
# monologue
# JP: 体が焼ける。
2699 = "Cơ thể tôi như bốc cháy."
# monologue
# JP: 熱くなったと感じぬほどの一瞬に、\n僕の全てが狂おしいまでに焦げている。
2529 = "Chỉ trong một khoảnh khắc thậm chí không kịp cảm thấy nóng,\\ toàn bộ con người tôi đã bị thiêu đốt đến điên cuồng."
# 【双鉄】
# display as 雙鐵
# JP: （ああ……\nそうか、そうだったのか）
3044 = "（A……\\\nRa là vậy, thì ra là thế.）"
# monologue
# JP: 意識を少しも離せない。
2695 = "Ý thức không thể rời đi dù chỉ một chút."
# monologue
# JP: 日々姫のスカート――\nいやその奥に隠されているであろう部分から。
2787 = "Chiếc váy của Hibiki——\\ Không, từ phần được giấu kín bên trong đó."
# monologue
# JP: （下着が見えそうなくらいで何故にと思っていたが――\n僕を釘付けているのは、下着ではなく……）
3037 = "（Chỉ sắp nhìn thấy đồ lót thôi mà sao lại thế này chứ——\\ Thứ ghim chặt ánh nhìn của tôi, không phải đồ lót mà là……）"
# monologue
# JP: 理解が、体を――\n同時に脳を、焦がしていく。
2648 = "Sự thấu hiểu, đang thiêu đốt cơ thể——\\ đồng thời thiêu đốt cả tâm trí tôi."
# monologue
# JP: （僕は……日々姫と、結ばれたいと思っているのか）
3041 = "（Mình……đang muốn kết hợp với Hibiki sao.）"
# monologue
# JP: 心を窒息させようとする、\n体の奥の、凄まじい欲。
2615 = "Nỗi khao khát mãnh liệt từ sâu thẳm cơ thể,\\ như muốn làm trái tim tôi nghẹt thở."
# monologue
# JP: 自分とは縁の無いものだと思っていた、\nそれがどろどろと、指の先、髪の先までに染みていく。
2656 = "Thứ mà tôi từng nghĩ chẳng liên quan gì đến mình,\\ đang sền sệt ngấm vào từng đầu ngón tay, từng ngọn tóc."
# 【双鉄】
# display as 雙鐵
# JP: 「日々……姫」
2067 = "「Hibi……ki」"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃいっ！？　あっ――うん、なに？」
1852 = "「Hya!? A——vâng, sao thế anh?」"
# monologue
# JP: 聞いてしまった。日々姫の声を。\nそれだけで、欲が何倍にも膨れ上がる。
2439 = "Lỡ nghe thấy rồi. Giọng nói của Hibiki.\\ Chỉ vậy thôi, dục vọng đã phình to lên gấp bội."
# monologue
# JP: 触れたい。日々姫に。\n抱きたい。日々姫を。
2682 = "Muốn chạm vào. Hibiki.\\\nMuốn ôm lấy. Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「その……だ――日々姫」
2042 = "「Cái đó……thì——Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「う、うんっ！」
1855 = "「V-Vâng!」"
# monologue
# JP: だけれど、僕にはわからない。\n何もかも、初めてすぎる経験だから。
2470 = "Thế nhưng, tôi không hiểu.\\ Vì tất cả đều là trải nghiệm quá đỗi mới mẻ."
# monologue
# JP: 日々姫の気持ちはもちろんのこと、\n自分自身の気持ちさえ。
2443 = "Cảm xúc của Hibiki thì đã đành,\\ ngay cả cảm xúc của chính bản thân tôi nữa."
# monologue
# JP: （これは……体だけの欲なのか。\nそれとも、心でも欲しているのか)
3052 = "（Đây là……dục vọng của thể xác sao.\\ Hay là, con tim cũng đang khao khát)"
# monologue
# JP: それすらわからないうちに、\n日々姫に欲をぶつけるなど――
2984 = "Trong khi còn chưa rõ điều đó,\\ mà lại trút dục vọng lên Hibiki thì——"
# monologue
# JP: 判断を、日々姫に投げてしまうことなど、\n断じて、許されるはずがない。
2716 = "Việc ném quyền quyết định cho Hibiki,\\ tuyệt đối không thể chấp nhận được."
# 【双鉄】
# display as 雙鐵
# JP: 「今は……これだけで十分だ」
1769 = "「Bây giờ……chỉ thế này là đủ rồi.」"
# monologue
# JP: だから、カラカラの喉を動かして言葉を絞る。
2680 = "Vì thế, tôi cử động cái cổ họng khô khốc để nặn ra từng chữ."
# monologue
# JP: もっともっとと望む体を、\n崩れてしまいそうな理性でなんとか、縛り付ける。
2825 = "Dùng chút lý trí sắp vỡ vụn,\\ cố gắng kìm hãm cơ thể đang khao khát nhiều hơn nữa."
# 【日々姫】
# display as 日日姬
# JP: 「え？　あ……うん」
1876 = "「Hả? A……vâng.」"
# monologue
# JP: しょぼんとした顔。\nそれが嬉しい。
2798 = "Khuôn mặt xịu xuống.\\\nĐiều đó làm tôi vui."
# monologue
# JP: 日々姫も、僕と触れ合いたいと――\nそう望んでくれているような気がして。
2528 = "Hibiki cũng muốn tiếp xúc với tôi——\\ Tôi có cảm giác em ấy cũng đang mong muốn như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、日々姫」
2046 = "「Vì vậy, Hibiki.」"
# monologue
# JP: 言葉が、怖い。\n自分が、怖い。
2678 = "Lời nói, thật đáng sợ.\\\nBản thân mình, thật đáng sợ."
# monologue
# JP: 変ろうとすることが怖いし。\n許されることか、わからない。けど――
2677 = "Sợ hãi việc cố gắng thay đổi.\\ Không biết có được tha thứ hay không. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「選挙が終わったら――\nそのときにまた、頼めるか」
2169 = "「Sau khi cuộc bầu cử kết thúc——\\ Đến lúc đó, anh có thể nhờ em nữa không.」"
# monologue
# JP: ――時間を置けば、考えたなら。\nきっと怖れを解消できる。自分の心を見つめなおせる。
1459 = "――Nếu dành thời gian, suy nghĩ thấu đáo.\\ Chắc chắn sẽ xua tan được nỗi sợ hãi. Có thể nhìn nhận lại trái tim mình."
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　あっ――あうっ――えっ！？」
1874 = "「Hả!? A——Á——Hả!?」"
# monologue
# JP: そうと信じて、言葉を重ねる。
2692 = "Tin là vậy, tôi tiếp tục nói."
# 【双鉄】
# display as 雙鐵
# JP: 「イヤでなければ、今日の続きを。\n――マッサージをだ」
2201 = "「Nếu em không phiền, hãy tiếp tục việc hôm nay.\\ ――Ý anh là xoa bóp ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、うん！　マッサージ！　マッサージをねっ！\nわかったばい――あ、わかりましたっ！！」
1894 = "「A, vâng! Xoa bóp! Là xoa bóp nhỉ!\\ Em hiểu rồi——A, em hiểu rồi ạ!!」"
# monologue
# JP: 真っ赤になってしどろもどろでそう言って、\n日々姫はぱっと、逃げ出すように僕から降りる。
2777 = "Đỏ bừng mặt và nói lắp bắp như vậy,\\ Hibiki vội vã leo xuống khỏi người tôi như muốn chạy trốn."
# 【日々姫】
# display as 日日姬
# JP: 「選挙、終わったらですね？\nそのときに」
2170 = "「Sau khi bầu cử kết thúc đúng không ạ?\\\nĐến lúc đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。それまでにきちんと考えておく」
1917 = "「Ừ. Từ giờ đến lúc đó anh sẽ suy nghĩ thật kỹ.」"
# 【日々姫】
# display as 日日姬
# JP: 「///////っ！！！」
1466 = "「///////!!!」"
# monologue
# JP: 物も言わずに、文字通り日々姫は逃げ出していく。\n裸足で……靴下を置き忘れたまま。
2762 = "Không nói một lời, Hibiki đúng nghĩa là bỏ chạy.\\ Chân trần……bỏ quên luôn cả tất."
# 【双鉄】
# display as 雙鐵
# JP: 「むう……」
1884 = "「Ưm……」"
# monologue
# JP: 触れられない。
2865 = "Không thể chạm vào."
# monologue
# JP: わずかでも日々姫の靴下に触れてしまえば、\n迷いがさらに深まりそうで。
2687 = "Dù chỉ chạm nhẹ vào đôi tất của Hibiki thôi,\\ có lẽ sự bối rối sẽ càng hằn sâu thêm."
# 【双鉄】
# display as 雙鐵
# JP: 「ええい、今はとにかく、眠ってしまおう」
1819 = "「Thôi, bây giờ cứ đi ngủ cái đã.」"
# monologue
# JP: わからない。\nだから、気になる。
2719 = "Không hiểu.\\\nNên mới bận tâm."
# monologue
# JP: 自分でも整理しきれぬままに零した僕の言葉を、\n日々姫が果たして、どう受け取ったか――
2672 = "Những lời tôi thốt ra khi bản thân còn chưa sắp xếp xong,\\ rốt cuộc Hibiki đã tiếp nhận nó như thế nào——"
# 【双鉄】
# display as 雙鐵
# JP: 「とにかく、寝るんだ。\n何も考えず、寝てしまうんだ」
2228 = "「Dù sao thì cũng phải ngủ.\\ Không nghĩ ngợi gì nữa, ngủ thôi.」"
# monologue
# JP: 夢も見ないで、眠れるように――
2600 = "Để có thể ngủ mà không mộng mị——"
# monologue
# JP: そう祈りつつ、\n僕はすっぽり、布団をかぶる。
2660 = "Vừa cầu nguyện như vậy,\\\ntôi vừa trùm chăn kín mít."
# 【れいな】
# display as 玲奈
# JP: 「がちゃり。カギをかけましたー！」
2301 = "「Cạch. Đã khóa cửa rồi nha!」"
# 【日々姫】
# display as 日日姬
# JP: 「うぁー、疲れたーっ！」
1903 = "「Oa, mệt quá đi mất!」"
# monologue
# JP: 夜八時。
2835 = "Tám giờ tối."
# monologue
# JP: 通常よりも二時間延ばしたレールショップの営業時間が、\nようやく終わる。
2994 = "Thời gian hoạt động của Rail Shop, vốn được kéo dài thêm hai tiếng so với thường lệ,\\ cuối cùng cũng kết thúc."
# 【ハチロク】
# display as 八六
# JP: 「お疲れ様です、日々姫。何か飲みますか？」
2234 = "「Em vất vả rồi, Hibiki. Em có muốn uống gì không?」"
# 【真闇】
# display as 真闇
# JP: 「ああ、ほんならウチが」
1859 = "「A, vậy thì để chị.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕がお茶を淹れよう」
2273 = "「Không, để anh pha trà cho.」"
# monologue
# JP: 真闇姉は、選対本部長。
2852 = "Chị Mayami là Trưởng ban Bầu cử."
# monologue
# JP: 肉体的な疲労はともかく、\n精神・頭脳を僕らの誰より激しく使っている筈だ。
2480 = "Bỏ qua sự mệt mỏi về thể xác,\\ chắc chắn chị ấy đang phải vận dụng tinh thần và trí não căng thẳng hơn bất kỳ ai trong chúng tôi."
# 【真闇】
# display as 真闇
# JP: 「そ？　じゃあ、お言葉に甘えちゃうねぇ」
1782 = "「Thế à? Vậy chị không khách sáo đâu nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。たまには甘えてくれ」
1921 = "「Ừm. Thỉnh thoảng chị cũng nên dựa dẫm vào người khác đi.」"
# monologue
# JP: 寝苦しくともとにかく眠り。\n目覚めた朝は、昨日と変わらぬ――昨日以上の戦場だ。
2801 = "Dù khó ngủ nhưng vẫn cố ngủ.\\ Sáng thức dậy, vẫn là chiến trường không khác gì hôm qua——thậm chí còn hơn cả hôm qua."
# monologue
# JP: 選挙戦を勝ち抜くためのひとつひとつに追われる内に、\n肉欲など、どこかに追いやられてしまっている。
2826 = "Bị cuốn vào từng việc một để giành chiến thắng trong cuộc bầu cử,\\ những dục vọng thể xác đã bị đẩy lùi vào một góc nào đó."
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇ、\nにぃにぃの淹れる抹茶って飲んだことあったっけ？」
2307 = "「Này này,\\ chị đã uống matcha anh hai pha bao giờ chưa?」"
# 【真闇】
# display as 真闇
# JP: 「お抹茶は無かと」
2051 = "「Matcha thì chưa.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら！　期待しちゃっていいと思うよ？」
2038 = "「Vậy thì! Chị cứ kỳ vọng đi!」"
# monologue
# JP: （……日々姫も、変わらぬ様子のようだ）
3006 = "（……Hibiki có vẻ cũng không thay đổi gì.）"
# monologue
# JP: 大きな安堵と。\nそこに混じってきてしまう、なにか物足りない感じ。
2711 = "Sự nhẹ nhõm to lớn.\\ Lẫn lộn trong đó là cảm giác thiếu vắng điều gì đó."
# monologue
# JP: それが何か、あるいは何故かを追求するのは、\n帰宅して、一人になってからにしよう。
2874 = "Nó là gì, hay tại sao lại như vậy,\\ để về nhà, khi chỉ còn một mình rồi hẵng tìm hiểu."
# 【ポーレット】
# display as 波萊特
# JP: 「お待たせしましたー！　って、あれ？\n双鉄くんと凪ちゃんとふかみちゃんは？」
2215 = "「Để mọi người đợi lâu rồi! Ơ kìa?\\ Sou-chan, Nagi-chan và Fukami-chan đâu rồi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕はここだ」
2010 = "「Anh ở đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「明日、朝イチで川下りの団体予約が入ってるって。\nふかみちゃんと凪ちゃん。３０分くらい前までいたけど」
1979 = "「Fukami-chan và Nagi-chan nói ngày mai có đoàn khách đặt thuyền xuôi dòng từ sáng sớm.\\ Hai em ấy mới về khoảng 30 phút trước.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あー、遅くなりすぎちゃったかー。大ニュースだから、\nふたりにも一番に報告したかったんだけど」
1864 = "「A, em đến muộn quá rồi sao. Tin tức sốt dẻo mà,\\ em muốn báo cho hai người đó biết đầu tiên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、電話をもらってから、\nみんなそわそわとしていたぞ」
1932 = "「Ừm, từ lúc nhận được điện thoại,\\ ai nấy đều đứng ngồi không yên đấy.」"
# monologue
# JP: なにせ、ポーレットだ。\n慎重居士で控えめで、自己評価も不当なまでに低い。
2818 = "Dù sao thì, đó là Paulette.\\ Một người thận trọng, khiêm tốn và luôn đánh giá bản thân thấp đến mức bất công."
# monologue
# JP: そのポーレットが『大ニュースがあるから待っていて』\nなどと電話をしてきて、期待が高まらぬはずもない。
2973 = "Một Paulette như vậy lại gọi điện bảo 『Có tin tức sốt dẻo nên hãy đợi em nhé』,\\ thì làm sao mà không kỳ vọng cho được."
# 【日々姫】
# display as 日日姬
# JP: 「なんなんですかポーレットさん？\nその、大ニュースって」
2125 = "「Chuyện gì vậy chị Paulette?\\\nTin tức sốt dẻo đó ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええと、わたし、そういうの得意じゃないので、\nもったいぶらないで言いますね」
1857 = "「Ừm, chị không giỏi mấy chuyện này,\\ nên chị sẽ nói luôn không úp mở nữa nhé.」"
# monologue
# JP: 言って。ポーレットは大きく大きく息を吸う。\n結果としては、実にいい『もったいぶり』になっている。
2952 = "Nói xong. Paulette hít một hơi thật sâu.\\ Kết quả là, lại thành một màn 『úp mở』 cực kỳ hiệu quả."
# 【ポーレット】
# display as 波萊特
# JP: 「発注と、スポンサードの申し出をいただきました。\n毛利電鉄の――毛利の、電車姫様から」
2018 = "「Chúng ta đã nhận được đơn đặt hàng và lời đề nghị tài trợ.\\ Từ Đường sắt điện Mouri――Denshahime của Mouri.」"
# 【日々姫】
# display as 日日姬
# JP: 「発注って、\x%l客車;#00ffc040;客車%l;#;改修プロジェクトに？」
1787 = "「Đơn đặt hàng, cho dự án phục hồi \\\\x%l客車;#00ffc040;toa hành khách%l;#; sao?」"
# 【ハチロク】
# display as 八六
# JP: 「スポンサードとは、\x%l客車;#00ffc040;客車%l;#;改修プロジェクトの！？」
2221 = "「Tài trợ là, cho dự án phục hồi \\\\x%l客車;#00ffc040;toa hành khách%l;#; ạ!?」"
# monologue
# JP: 左右から同時にぶつかる問いかけに、\nポーレットは、晴れやかな笑顔で頷き返す。
3000 = "Trước những câu hỏi dồn dập từ cả hai phía,\\ Paulette gật đầu đáp lại với nụ cười rạng rỡ."
# 【ポーレット】
# display as 波萊特
# JP: 「はい！」
2096 = "「Vâng!」"
# 【れいな】
# display as 玲奈
# JP: 「ふわわ、すごいです！　やりましたぁ！」
1868 = "「Fuwawa, tuyệt quá! Thành công rồi nha!」"
# 【真闇】
# display as 真闇
# JP: 「受注規模と、スポンサードの内容は？」
2208 = "「Quy mô đơn hàng và nội dung tài trợ là gì?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。ここにまとめてあります」
2173 = "「A, vâng. Em đã tổng hợp lại ở đây.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん。チェックば、一緒にお願い」
1981 = "「Sou-chan. Cùng chị kiểm tra nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1926 = "「嗯」" 
# monologue
# JP: 真闇姉へと渡された書類へと目を――\n落とした瞬間、指が勝手に紙の上へと伸びている。
2658 = "Tôi đưa mắt nhìn vào tập tài liệu được đưa cho chị Mayami——\\ Ngay khoảnh khắc đó, ngón tay tôi bất giác đưa lên mặt giấy."
# monologue
# JP: 指差し確認しなければとても信じられない。\nゼロの数、これ……
2903 = "Nếu không chỉ tay xác nhận thì thật khó mà tin được.\\ Số lượng số 0 này, đây là……"
# 【真闇】
# display as 真闇
# JP: 「随分と太か金額たいねぇ。\nこれ、間違いじゃなかと？」
2295 = "「Số tiền lớn quá nhỉ.\\ Cái này, không nhầm lẫn gì chứ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それで間違い無いんです。\n条件、わたしも何度も確認しました」
2113 = "「Không có sự nhầm lẫn nào đâu ạ.\\ Điều kiện, em cũng đã xác nhận đi xác nhận lại nhiều lần rồi.」"
# monologue
# JP: 記載されているスポンサードの条件は、ただひとつ。\n『２０年以内にアルミ製車輌の新造に挑戦すること』。
2440 = "Điều kiện tài trợ được ghi chép chỉ có một.\\ 『Thử thách chế tạo toa xe bằng nhôm mới trong vòng 20 năm tới』."
# monologue
# JP: その他に書かれているのは単なる数字――\n日ノ本円で八桁にのぼる金額だけだ。
2498 = "Những thứ khác được viết chỉ là những con số đơn thuần——\\ Một số tiền lên đến tám chữ số bằng đồng Yên Hinamoto."
# 【ポーレット】
# display as 波萊特
# JP: 「それだけじゃなく改修ベースとしての車輌の提供を、\n全国に呼びかけてもくれたみたいで、その中に」
1758 = "「Không chỉ vậy, có vẻ như họ còn kêu gọi trên toàn quốc\\ để cung cấp toa xe làm nền tảng phục hồi, và trong số đó.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ」
1896 = "「A.」"
# monologue
# JP: ポーレットがめくったページを飾る写真を見た瞬間に、\n感嘆の声。
2486 = "Khoảnh khắc nhìn thấy bức ảnh trang trí trên trang giấy mà Paulette vừa lật,\\ một tiếng cảm thán thốt lên."
# 【ハチロク】
# display as 八六
# JP: 「懐かしい。22000系\x%l客車;#00ffc040;客車%l;#;ではないですか」
1959 = "「Hoài niệm quá. Đây chẳng phải là \\\\x%l客車;#00ffc040;toa hành khách%l;#; dòng 22000 sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなの。\nこの前まで[ちちぶ,2]知知武鉄道で\x%lC58;#00ffc040;C58%l;#;に引かれてたコなんだって」
2082 = "「Đúng vậy.\\ Nghe nói trước đây nó từng được \\\\x%lC58;#00ffc040;C58%l;#; kéo trên tuyến Đường sắt Chichibu đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクも引いていたのか？」
1808 = "「Hachiroku cũng từng kéo nó sao?」"
# 【ハチロク】
# display as 八六
# JP: 「もちろんです。\x%l大詔;#00ffc040;大詔%l;#;時代の\x%l帝鉄;#00ffc040;帝鉄%l;#;を駆け抜けた、\n代表的な\x%l客車;#00ffc040;客車%l;#;ですから」
2141 = "「Tất nhiên rồi ạ. Nó là \\\\x%l客車;#00ffc040;toa hành khách%l;#; tiêu biểu\\ từng rong ruổi trên tuyến \\\\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; thời \\\\x%l大詔;#00ffc040;Đại Chiếu%l;#; mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;との相性もいいのか？」
2278 = "「Vậy thì, nó cũng rất hợp với \\\\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; đúng không?」"
# monologue
# JP: 待ってましたと言わんばかりに、\nポーレットが大きく胸を張る。
2817 = "Như chỉ chờ có thế,\\\nPaulette ưỡn ngực đầy tự hào."
# 【ポーレット】
# display as 波萊特
# JP: 「\x%l台車;#00ffc040;台車%l;#;老朽化で営業運転引退しちゃったコだそうです。\nでもまだまだ煙一つ入ってこないってお墨付きで」
2182 = "「Nghe nói nó đã phải ngừng vận hành thương mại do \\\\x%l台車;#00ffc040;giá chuyển hướng%l;#; bị lão hóa.\\ Nhưng đã được đảm bảo là vẫn kín bưng, không để lọt một chút khói nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1940 = "「Ồ!」"
# 【れいな】
# display as 玲奈
# JP: 「だったら、うちのコとニコイチすれば、\nすぐ、元気一杯の\x%l客車;#00ffc040;客車%l;#;に産まれ変わりそうですぅ」
2283 = "「Nếu vậy, chỉ cần chắp vá với toa xe của chúng ta,\\ thì sẽ nhanh chóng tái sinh thành một \\\\x%l客車;#00ffc040;toa hành khách%l;#; tràn đầy sức sống nha.」"
# 【日々姫】
# display as 日日姬
# JP: 「わ、わ――なにそれ、すごくないっ！？」
1862 = "「Oa, oa——Cái gì vậy, chẳng phải quá tuyệt vời sao!?」"
# monologue
# JP: 確かに凄い。\n話が実現するのなら、事態は一気に大きく動く。
2870 = "Quả thực rất tuyệt vời.\\ Nếu chuyện này trở thành hiện thực, tình hình sẽ thay đổi một cách chóng mặt."
# 【ポーレット】
# display as 波萊特
# JP: 「すごいのはそれだけじゃないんです。鋼製\x%l客車;#00ffc040;客車%l;#;も二つ。\nこれは、毛利電鉄向けの改修素材っていうことで」
1829 = "「Sự tuyệt vời không chỉ dừng lại ở đó đâu. Còn có hai \\\\x%l客車;#00ffc040;toa hành khách%l;#; bằng thép nữa.\\ Đây là vật liệu phục hồi dành cho Đường sắt điện Mouri.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それが受注か」
2259 = "「Đó là đơn đặt hàng sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。そっちは、\nこの金額でやってほしいっていうお話で」
2091 = "「Vâng. Phía họ bảo rằng,\\ muốn chúng ta thực hiện với mức giá này.」"
# 【日々姫】
# display as 日日姬
# JP: 「わ」
1863 = "「Oa.」"
# monologue
# JP: スポンサードの金額を、さらに上回る提示額。\nあまりに気前良い提示すぎ、すぐには言葉が出てこない。
2996 = "Mức giá được đưa ra còn cao hơn cả số tiền tài trợ.\\ Sự hào phóng quá đỗi khiến tôi không thốt nên lời."
# 【真闇】
# display as 真闇
# JP: 「どぎゃんして、ここまで良か話を？」
2127 = "「Làm thế nào mà lại có được một lời đề nghị tốt đến vậy?」"
# monologue
# JP: 心の隅にあった疑問を、真闇姉が言葉にしてくれる。\n\x%lまいてつ;#00ffc040;まいてつ%l;#;同士の互助ということもあるのかもだが……
2853 = "Chị Mayami đã nói lên thắc mắc trong góc khuất trái tim tôi.\\ Có thể là do sự tương trợ giữa những người \\\\x%lまいてつ;#00ffc040;chủ tàu%l;#; với nhau, nhưng mà……"
# monologue
# JP: それでもこれは――詐欺ではないかと不安になるほど――\n採算を、完全に度外視している申し出だとしか思えない。
2471 = "Dù vậy thì lời đề nghị này——đến mức khiến tôi lo lắng không biết có phải lừa đảo hay không——\\ chỉ có thể nghĩ rằng họ hoàn toàn không màng đến lợi nhuận."
# 【ポーレット】
# display as 波萊特
# JP: 「それはですね、わたしたちの――\n御一夜のみんなの力の結晶なんです」
2260 = "「Đó là vì, đây là kết tinh sức mạnh của chúng ta——\\ của tất cả mọi người ở Ohimitera.」"
# monologue
# JP: ポーレットがパソコンを立ち上げる。
2819 = "Paulette khởi động máy tính."
# monologue
# JP: ブラウザを開き、ブックマークしてあるらしい、\n鉄道ブログのページを僕らに指し示す。
2567 = "Mở trình duyệt lên, cô ấy chỉ cho chúng tôi xem\\ một trang blog về đường sắt có vẻ như đã được đánh dấu trang."
# 【日々姫】
# display as 日日姬
# JP: 「あ！？　この写真」
1901 = "「A!? Bức ảnh này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。ここだ」
1983 = "「Đúng vậy. Là ở đây.」"
# monologue
# JP: みなの希望を模型に変えて、日々充実していくレイアウト。\nその様子が、毎日毎日、写真と記事とで綴られている。
2538 = "Biến hy vọng của mọi người thành mô hình, sa bàn ngày càng trở nên phong phú.\\ Quá trình đó được ghi lại từng ngày bằng những bức ảnh và bài viết."
# 【れいな】
# display as 玲奈
# JP: 「こうしてみると、町が育ってるみたいですぅ」
1944 = "「Nhìn thế này, cứ như thị trấn đang lớn lên vậy nha.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だけじゃなくって、これも」
2274 = "「Không chỉ thế đâu, còn có cái này nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「あら、\x%l8620;#00ffc040;8620%l;#;の見学会の様子ではないですか」
1872 = "「Ô kìa, đây chẳng phải là hình ảnh buổi tham quan \\\\x%l8620;#00ffc040;8620%l;#; sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「見事な写真だ。ハチロクがひときわ綺麗に写っているな。\n\x%l8620;#00ffc040;8620%l;#;も、実物以上に格好良い」
2055 = "「Bức ảnh tuyệt thật. Hachiroku lên hình đẹp nổi bật luôn.\\ \\\\x%l8620;#00ffc040;8620%l;#; cũng trông oai phong hơn cả thực tế nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「実物通りです。\nですが、一番見栄えのする角度ではありますね、確かに」
1973 = "「Đúng như thực tế thôi ạ.\\ Nhưng quả thực, đây là góc chụp đẹp nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「一体誰がこんなブログを――」
2258 = "「Rốt cuộc là ai đã làm cái blog này——」"
# monologue
# JP: ブログ右端のプロフィールには、\n“　名前；A SHELL　”と記載されている。
2989 = "Ở phần hồ sơ cá nhân bên góc phải blog,\\ có ghi \"Tên: A SHELL\"."
# 【双鉄】
# display as 雙鐵
# JP: 「エー・シェル――と読むのか？　これは」
2323 = "「A SHELL——đọc là vậy sao? Cái này.」"
# 【日々姫】
# display as 日日姬
# JP: 「シェルって、英語で貝、ってことですか？」
2326 = "「SHELL trong tiếng Anh nghĩa là con sò đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――貝。――ああ、いや！\nわかった、エーではなく、アだ！　ア・貝だ！！」
1910 = "「Ừm——con sò. ——A, không!\\ Anh hiểu rồi, không phải chữ A (ê), mà là A (a)! A-Kai!!」"
# 【日々姫】
# display as 日日姬
# JP: 「赤井宮司のブログなの！？　これ！！」
2263 = "「Là blog của Đền chủ Akai sao!? Cái này ấy!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「さぁ、どうなんでしょう。\nご本人はウィともノンともおっしゃいませんでした」
2255 = "「Chà, ai biết được.\\ Chính chủ cũng chẳng thừa nhận hay phủ nhận.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、あの方ならそうだろうな。\nが――そうか、毛利の姫も、このブログを見て？」
1774 = "「À, nếu là ông ấy thì chắc là vậy rồi.\\ Nhưng——ra là thế, Denshahime của Mouri cũng đã xem blog này sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。\nわたし達の計画をすごく気に入ってくださったみたいで」
2093 = "「Vâng.\\ Có vẻ như cô ấy rất thích kế hoạch của chúng ta.」"
# 【真闇】
# display as 真闇
# JP: 「風ば――吹き出してきよったね」
2315 = "「Gió——đã bắt đầu thổi rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2087 = "「Ừ.」"
# monologue
# JP: 真闇姉の言葉が教えてくれる。\n風、とは、つまり――
2855 = "Lời nói của chị Mayami đã cho tôi biết.\\ Gió, có nghĩa là——"
# 【双鉄】
# display as 雙鐵
# JP: 「僕ら一人一人の呼びかけが、声が――\n集まり呼応し、やがて即ち、風となるのか」
1947 = "「Tiếng gọi, tiếng nói của từng người chúng ta——\\ tập hợp lại, hô ứng lẫn nhau, và cuối cùng trở thành luồng gió sao.」"
# monologue
# JP: ならばもはや、それが止むことはないだろう。
2974 = "Nếu vậy thì, nó sẽ không bao giờ dừng lại nữa."
# monologue
# JP: このニュースなら、間違いなく、\n人から人へ、次から次に、留まることなく伝えられていく。
2969 = "Nếu là tin tức này, chắc chắn,\\ sẽ được truyền từ người này sang người khác, không ngừng nghỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2068 = "「Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん」
1930 = "「Vâng, anh trai.」"
# monologue
# JP: 日々姫の手を取る。\nとても自然に。
2710 = "Nắm lấy tay Hibiki.\\\nMột cách rất tự nhiên."
# monologue
# JP: 感じる澄み切った興奮は、\n肉体ではなく、[こころ,1]精神のものだ。
2685 = "Sự phấn khích trong trẻo mà tôi cảm nhận được,\\ không phải của thể xác, mà là của tinh thần."
# 【双鉄】
# display as 雙鐵
# JP: 「この風を、お前の瞳は、捉えているか？」
1797 = "「Đôi mắt em, có bắt được luồng gió này không?」"
# 【日々姫】
# display as 日日姬
# JP: 「見えます。はっきり」
2030 = "「Em thấy. Rất rõ ràng.」"
# monologue
# JP: 言って日々姫は僕の手をぎゅっと握り返して。\n解いたその手で、ペンを取る。
2791 = "Nói rồi, Hibiki siết chặt lấy tay tôi.\\ Rồi buông tay ra, cầm lấy cây bút."
# 【日々姫】
# display as 日日姬
# JP: 「だから、描きます。今度こそ」
2252 = "「Vì vậy, em sẽ vẽ. Lần này chắc chắn sẽ vẽ được.」"
