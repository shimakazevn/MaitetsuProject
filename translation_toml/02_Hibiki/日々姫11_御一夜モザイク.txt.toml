2524 = "各種訊息超出了她的處理能力，亂成了一堆——日日姬恐怕迷失了那些美好。" 

# 【日々姫】
# display as 日日姬
# JP: 「考えすぎて、見えなくなって。\n見えないものは、描けなくて」
2033 = "「我考慮得太多，漸漸感覺不到東西。感覺不到的東西也就畫不出來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな。日々姫が描くのは昔から、\n日々姫が綺麗と感じたそのまま――それだけだった」
