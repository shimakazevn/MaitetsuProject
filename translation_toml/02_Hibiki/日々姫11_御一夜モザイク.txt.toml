# display as 日日姬
# JP: 「みんなの思い出を聞かせてもらって――、\nそしたら私、見えてくるから描けるんだって、わかって」
2180 = "「聽了大家的回憶以後，我能感覺到一些東西，所以我畫得出來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「見えてくる？　何がだ」
