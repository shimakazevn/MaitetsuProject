# monologue
# JP: 日々姫は腰をはみ出して、\n背中の方へ、じわじわふみふみ進出してくる。
2554 = "Hibiki vượt qua eo,\\\ntừ từ giẫm lên phía lưng tôi."

# 【日々姫】
# display as 日日姬
# JP: 「痛かったら言ってくださいよ？　兄さん」
1881 = "「Nếu đau thì anh phải nói đấy nhé? Anh\ntrai.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――全くもって痛くない。\n心地よいばかりだ――というか」
2112 = "「Không——hoàn toàn không đau chút nào.\\\nChỉ thấy dễ chịu thôi——nói đúng hơn là.」"

# monologue
# JP: 背中は完全にむき出しだから、\n日々姫の足裏の感触を、いっそう生生しく感じる。
2661 = "Vì lưng tôi đang hoàn toàn để trần,\\\nnên xúc cảm từ lòng bàn chân Hibiki càng\ntrở nên chân thực hơn."

# monologue
# JP: 日々姫の汗か、僕の汗――\nいや、その両方が恐らくまじり、ぬらついている。
2445 = "Mồ hôi của Hibiki, hay mồ hôi của tôi——\\\nKhông, có lẽ là mồ hôi của cả hai đang hòa\nquyện vào nhau, trơn ướt."

# 【双鉄】
# display as 雙鐵
# JP: 「絵の調子、戻ってきたのか」
1785 = "「Cảm giác vẽ của em, đã trở lại rồi sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「描けない！　っていうぐじゃぐじゃしたのは、\nなくなりました」
2294 = "「Cái cảm giác rối bời kiểu 『Không vẽ\nđược!』,\\\nđã biến mất rồi ạ.」"

# monologue
# JP: 即座の答えと裏腹に、足は、背中をゆっくり進む。\n恐らく、肩を目指している。
2789 = "Trái ngược với câu trả lời dứt khoát, bàn\nchân em ấy chậm rãi tiến lên lưng.\\\nCó lẽ là đang nhắm tới bờ vai."

# 【日々姫】
# display as 日日姬
# JP: 「みんなの思い出を聞かせてもらって――、\nそしたら私、見えてくるから描けるんだって、わかって」
2180 = "「Được nghe những kỷ niệm của mọi người——,\\\nnhờ đó em nhận ra rằng, chỉ cần nhìn thấy\nlà em có thể vẽ được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「見えてくる？　何がだ」
2190 = "「Nhìn thấy? Thấy cái gì cơ?」"

# 【日々姫】
# display as 日日姬
# JP: 「伝えてもらってる思い出の形。希望の形。\nその綺麗さが、見えてくるんです」
2037 = "「Hình dáng của những kỷ niệm được truyền\nđạt. Hình dáng của những hy vọng.\\\nEm có thể nhìn thấy được vẻ đẹp của\nchúng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2088 = "「是嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「メインビジュアルのときは、めいっぱいに混ぜようって、\nぐじゃぐじゃ考えすぎちゃったみたいで」
2025 = "「Hồi vẽ hình ảnh chủ đạo, em muốn nhồi\nnhét tất cả vào,\\\nnên có vẻ đã suy nghĩ quá nhiều đâm ra rối\nbời.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2264 = "「這樣啊」" 

# monologue
# JP: 一人ひとりの希望や思い出。\nその綺麗さなら、日々姫は間違いなく見て取れる。
2775 = "Hy vọng và kỷ niệm của từng người.\\\nNếu là vẻ đẹp đó, Hibiki chắc chắn có thể\nnhìn thấu được."

# monologue
# JP: （しかし……そうか、メインビジュアルのときは――\n僕らの希望が、詳細すぎて、近すぎて……）
3035 = "（Nhưng mà……ra là vậy, lúc vẽ hình ảnh chủ\nđạo thì——\\\nHy vọng của chúng tôi quá chi tiết, quá\ngần gũi……）"

# monologue
# JP: 処理しきれない情報が、混乱のままに入り混じり――\n日々姫は恐らく、綺麗さを見失ってしまったのだろう。
2524 = "Những thông tin không thể xử lý hết cứ thế\nhòa trộn trong sự hỗn loạn——\\\nCó lẽ Hibiki đã đánh mất đi cái nhìn về vẻ\nđẹp."

# 【日々姫】
# display as 日日姬
# JP: 「考えすぎて、見えなくなって。\n見えないものは、描けなくて」
2033 = "「Suy nghĩ quá nhiều, dẫn đến không còn\nnhìn thấy gì nữa.\\\nMà không nhìn thấy, thì không thể vẽ\nđược.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな。日々姫が描くのは昔から、\n日々姫が綺麗と感じたそのまま――それだけだった」
2086 = "「Đúng vậy nhỉ. Từ xưa đến nay, Hibiki luôn\nvẽ,\\\nchính xác những gì Hibiki cảm thấy\nđẹp——chỉ vậy thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 1927 = "「嗯！」" 

# monologue
# JP: わかってもらえた！\n言わんばかりの、幼さを感じるほどに素直な返事。
2780 = "Anh hiểu em rồi!\\\nCâu trả lời chân thật đến mức có thể cảm\nnhận được sự trẻ con như muốn nói vậy."

# 【日々姫】
# display as 日日姬
# JP: 「それで私、ひらめいたんです。メインビジュアル――\n全部の綺麗を、ひとつにまとめるんじゃなくって」
2138 = "「Thế là em chợt nảy ra ý tưởng. Hình ảnh\nchủ đạo——\\\nKhông cần phải gom tất cả những vẻ đẹp vào\nlàm một.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1926 = "「嗯」" 

# monologue
# JP: きゅっと、日々姫の足が踏む。\n肩甲骨の裏の柔らかになってるところ。
2759 = "Bàn chân Hibiki giẫm mạnh một cái.\\\nVào chỗ mềm mại phía sau xương bả vai."

# monologue
# JP: そこまで、日々姫は到達している。
2551 = "Hibiki đã chạm đến tận đó rồi."

# 【日々姫】
# display as 日日姬
# JP: 「みんなの綺麗、みんなの笑顔、ひとつひとつを。\nそれぞれ描いて、集めてモザイクにすればいいって」
1842 = "「Vẻ đẹp của mọi người, nụ cười của mọi\nngười, từng cái một.\\\nChỉ cần vẽ riêng từng cái, rồi tập hợp lại\nthành bức khảm là được.」"

# monologue
# JP: 足の温度が高くなる。\n踏み込む力が強くなる。
2564 = "Nhiệt độ bàn chân tăng lên.\\\nLực giẫm xuống cũng mạnh hơn."

# 【日々姫】
# display as 日日姬
# JP: 「――そのモザイクは絶対に、\nすごく素敵な、御一夜の未来図になるから」
1480 = "「——Bức khảm đó tuyệt đối,\\\nsẽ trở thành một bản đồ tương lai vô cùng\ntuyệt vời của Ohimitera.」"

# 【双鉄】
# display as 雙鐵
# JP: 「モザイクか」
2302 = "「Bức khảm sao.」"

# monologue
# JP: 確か、たくさんの断片がつなぎ合わされ、\nそれがひとつの絵として浮かび上がってくる手法だ。
2706 = "Nếu nhớ không lầm, đó là kỹ thuật ghép\nnhiều mảnh vỡ lại với nhau,\\\nđể tạo nên một bức tranh hoàn chỉnh."

# monologue
# JP: 思った瞬間、おにぎりを手に放浪する画家の作品が。\n[ながおか,1]長丘の花火が描かれた情景が、パっと頭に浮かんでくる。
2972 = "Vừa nghĩ đến đó, tác phẩm của người họa sĩ\nlang thang cầm nắm cơm nắm trên tay.\\\nKhung cảnh pháo hoa Nagaoka chợt lóe lên\ntrong đầu tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜モザイク――\nみんなの希望をつなぎあわせた未来図か」
1989 = "「Bức khảm Ohimitera——\\\nBản đồ tương lai kết nối hy vọng của mọi\nngười sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「うんっ」
# 1926 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、仕上がりを楽しみに待とう。\nデザインも、メインビジュアルも両方だ」
2291 = "「Vậy thì, anh sẽ mong chờ xem thành phẩm\nthế nào.\\\nCả thiết kế và hình ảnh chủ đạo.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！　期待しとって！！」
1928 = "「Vâng! Anh cứ mong đợi đi!!」"

# monologue
# JP: （どんっ！）
3036 = "（Bịch!）"

# 【双鉄】
# display as 雙鐵
# JP: 「おうっ！？」
1941 = "「Oái!?」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！　ゴメンっ！　痛かったと！？」
1899 = "「A! Em xin lỗi! Anh có đau không!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「い、や――」
2110 = "「Kh-Không——」"

# monologue
# JP: 喜びの、強い足踏みに踏み抜かれ、\n肩が――確かに痛んだが、その何倍もほぐれた気がした。
2550 = "Bị giẫm mạnh bởi niềm vui sướng,\\\nvai tôi——quả thực có đau, nhưng tôi cảm\nthấy nó được nới lỏng gấp nhiều lần."

# 【双鉄】
# display as 雙鐵
# JP: 「肩……だがな、肩甲骨というよりも、前側――\n鎖骨の下のあたりが、一番疲れているのかもしれん」
2187 = "「Vai……nhưng mà, thay vì xương bả vai, thì\nphía trước——\\\nkhu vực dưới xương quai xanh, có lẽ là mỏi\nnhất.」"

# 【日々姫】
# display as 日日姬
# JP: 「前……側？」
1822 = "「Phía……trước ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ――今、刺激がそこに抜けたような感じがしてな。\nあまりにも心地よく、それで声が出てしまったのだ」
1914 = "「Ừm——vừa rồi, anh có cảm giác như sự kích\nthích đã xuyên qua đó.\\\nVì quá dễ chịu, nên anh mới buột miệng kêu\nlên.」"

# 【日々姫】
# display as 日日姬
# JP: 「そ、そっか――そうなんだ。\nそう――なん、です……か」
1827 = "「Ra, ra là vậy——là vậy sao.\\\nRa——là, vậy……ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1933 = "「Hử?」"

# monologue
# JP: にちゃり、と感触。\n日々姫の足裏からはっきりと、新たな汗が染みだしている。
2893 = "Cảm giác nhóp nhép.\\\nLòng bàn chân Hibiki rõ ràng đang rịn thêm\nmồ hôi mới."

# 【日々姫】
# display as 日日姬
# JP: 「なら――あの、兄さん。私、前側……その……\n踏んで――あげたいかなぁ、って、思う、かも」
2276 = "「Vậy thì——ưm, anh trai. Em, phía\ntrước……ừm……\\\nmuốn——giẫm cho anh, chắc, là vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　であればお願いしよう」
2160 = "「Thế à? Vậy nhờ em nhé.」"

# 【日々姫】
# display as 日日姬
# JP: 「う、うん。じゃあ、ごろんって、仰向けになって？」
1923 = "「Ư, vâng. Vậy, anh lật người lại, nằm ngửa\nra đi?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。\n――っ！！？」
1952 = "「Ừ.\\\n——!!?」"

# monologue
# JP: これは――\n日々姫は、そうか、スカートだったか。
2967 = "Cái này——\\\nHibiki, đúng rồi, đang mặc váy mà."

# 【日々姫】
# display as 日日姬
# JP: 「踏むから、リラックスしてて？」
2026 = "「Em giẫm đây, anh thả lỏng nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「お、おう」
1883 = "「Ồ, ồ.」"

# monologue
# JP: 前肩、鎖骨の下をぐっぐと、\n日々姫の両足が踏みほぐしてくる。
2764 = "Phía trước vai, dưới xương quai xanh,\\\nhai chân Hibiki đang giẫm ấn xoa bóp."

# monologue
# JP: 強制的に息を呑まされる、\nそれは刺激で、強い快感。
2609 = "Bị ép phải nín thở,\\\nđó là sự kích thích, một khoái cảm mãnh\nliệt."

# 【日々姫】
# display as 日日姬
# JP: 「お、終わって欲しいときは言ってね？\n私、それまで――いくらでも踏むから」
2023 = "「K-Khi nào muốn dừng thì anh bảo nhé?\\\nEm, cho đến lúc đó——sẽ giẫm bao lâu cũng\nđược.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ、ああ」
# 1926 = "「嗯」" 

# monologue
# JP: 日々姫は僕の両肩を踏み――\nつまりはほとんど、僕の顔をまたいでいる。
2796 = "Hibiki giẫm lên hai vai tôi——\\\nnói cách khác, gần như đang sải chân qua\nmặt tôi."

# monologue
# JP: 太ももの付け根が、ひどくあやうげなスカートが、\n日々姫の動きにつれ揺れ動き、僕の視線を釘付けにする。\n（これ……は）
2561 = "Gốc đùi, chiếc váy cực kỳ hớ hênh,\\\nrung rinh theo từng chuyển động của\nHibiki, khiến ánh mắt tôi dán chặt vào\nđó.\\\n（Cái này……là）"

# 【日々姫】
# display as 日日姬
# JP: 「ん……はっ……はうっ」
1907 = "「Ưm……ha……hấu」"

# monologue
# JP: 体が焼ける。
2699 = "Cơ thể tôi như bốc cháy."

# monologue
# JP: 熱くなったと感じぬほどの一瞬に、\n僕の全てが狂おしいまでに焦げている。
2529 = "Chỉ trong một khoảnh khắc thậm chí không\nkịp cảm thấy nóng,\\\ntoàn bộ con người tôi đã bị thiêu đốt đến\nđiên cuồng."

# 【双鉄】
# display as 雙鐵
# JP: （ああ……\nそうか、そうだったのか）
3044 = "（A……\\\nRa là vậy, thì ra là thế.）"

# monologue
# JP: 意識を少しも離せない。
2695 = "Ý thức không thể rời đi dù chỉ một chút."

# monologue
# JP: 日々姫のスカート――\nいやその奥に隠されているであろう部分から。
2787 = "Chiếc váy của Hibiki——\\\nKhông, từ phần được giấu kín bên trong đó."

# monologue
# JP: （下着が見えそうなくらいで何故にと思っていたが――\n僕を釘付けているのは、下着ではなく……）
3037 = "（Chỉ sắp nhìn thấy đồ lót thôi mà sao lại\nthế này chứ——\\\nThứ ghim chặt ánh nhìn của tôi, không phải\nđồ lót mà là……）"

# monologue
# JP: 理解が、体を――\n同時に脳を、焦がしていく。
2648 = "Sự thấu hiểu, đang thiêu đốt cơ thể——\\\nđồng thời thiêu đốt cả tâm trí tôi."

# monologue
# JP: （僕は……日々姫と、結ばれたいと思っているのか）
3041 = "（Mình……đang muốn kết hợp với Hibiki sao.）"

# monologue
# JP: 心を窒息させようとする、\n体の奥の、凄まじい欲。
2615 = "Nỗi khao khát mãnh liệt từ sâu thẳm cơ\nthể,\\\nnhư muốn làm trái tim tôi nghẹt thở."

# monologue
# JP: 自分とは縁の無いものだと思っていた、\nそれがどろどろと、指の先、髪の先までに染みていく。
2656 = "Thứ mà tôi từng nghĩ chẳng liên quan gì\nđến mình,\\\nđang sền sệt ngấm vào từng đầu ngón tay,\ntừng ngọn tóc."

# 【双鉄】
# display as 雙鐵
# JP: 「日々……姫」
2067 = "「Hibi……ki」"

# 【日々姫】
# display as 日日姬
# JP: 「ひゃいっ！？　あっ――うん、なに？」
1852 = "「Hya!? A——vâng, sao thế anh?」"

# monologue
# JP: 聞いてしまった。日々姫の声を。\nそれだけで、欲が何倍にも膨れ上がる。
2439 = "Lỡ nghe thấy rồi. Giọng nói của Hibiki.\\\nChỉ vậy thôi, dục vọng đã phình to lên gấp\nbội."

# monologue
# JP: 触れたい。日々姫に。\n抱きたい。日々姫を。
2682 = "Muốn chạm vào. Hibiki.\\\nMuốn ôm lấy. Hibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「その……だ――日々姫」
2042 = "「Cái đó……thì——Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「う、うんっ！」
1855 = "「V-Vâng!」"

# monologue
# JP: だけれど、僕にはわからない。\n何もかも、初めてすぎる経験だから。
2470 = "Thế nhưng, tôi không hiểu.\\\nVì tất cả đều là trải nghiệm quá đỗi mới\nmẻ."

# monologue
# JP: 日々姫の気持ちはもちろんのこと、\n自分自身の気持ちさえ。
2443 = "Cảm xúc của Hibiki thì đã đành,\\\nngay cả cảm xúc của chính bản thân tôi\nnữa."

# monologue
# JP: （これは……体だけの欲なのか。\nそれとも、心でも欲しているのか)
3052 = "（Đây là……dục vọng của thể xác sao.\\\nHay là, con tim cũng đang khao khát）"

# monologue
# JP: それすらわからないうちに、\n日々姫に欲をぶつけるなど――
2984 = "Trong khi còn chưa rõ điều đó,\\\nmà lại trút dục vọng lên Hibiki thì——"

# monologue
# JP: 判断を、日々姫に投げてしまうことなど、\n断じて、許されるはずがない。
2716 = "Việc ném quyền quyết định cho Hibiki,\\\ntuyệt đối không thể chấp nhận được."

# 【双鉄】
# display as 雙鐵
# JP: 「今は……これだけで十分だ」
1769 = "「Bây giờ……chỉ thế này là đủ rồi.」"

# monologue
# JP: だから、カラカラの喉を動かして言葉を絞る。
2680 = "Vì thế, tôi cử động cái cổ họng khô khốc\nđể nặn ra từng chữ."

# monologue
# JP: もっともっとと望む体を、\n崩れてしまいそうな理性でなんとか、縛り付ける。
2825 = "Dùng chút lý trí sắp vỡ vụn,\\\ncố gắng kìm hãm cơ thể đang khao khát\nnhiều hơn nữa."

# 【日々姫】
# display as 日日姬
# JP: 「え？　あ……うん」
1876 = "「Hả? A……vâng.」"

# monologue
# JP: しょぼんとした顔。\nそれが嬉しい。
2798 = "Khuôn mặt xịu xuống.\\\nĐiều đó làm tôi vui."

# monologue
# JP: 日々姫も、僕と触れ合いたいと――\nそう望んでくれているような気がして。
2528 = "Hibiki cũng muốn tiếp xúc với tôi——\\\nTôi có cảm giác em ấy cũng đang mong muốn\nnhư vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「だから、日々姫」
2046 = "「Vì vậy, Hibiki.」"

# monologue
# JP: 言葉が、怖い。\n自分が、怖い。
2678 = "Lời nói, thật đáng sợ.\\\nBản thân mình, thật đáng sợ."

# monologue
# JP: 変ろうとすることが怖いし。\n許されることか、わからない。けど――
2677 = "Sợ hãi việc cố gắng thay đổi.\\\nKhông biết có được tha thứ hay không.\nNhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「選挙が終わったら――\nそのときにまた、頼めるか」
2169 = "「Sau khi cuộc bầu cử kết thúc——\\\nĐến lúc đó, anh có thể nhờ em nữa không.」"

# monologue
# JP: ――時間を置けば、考えたなら。\nきっと怖れを解消できる。自分の心を見つめなおせる。
1459 = "――Nếu dành thời gian, suy nghĩ thấu đáo.\\\nChắc chắn sẽ xua tan được nỗi sợ hãi. Có\nthể nhìn nhận lại trái tim mình."

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　あっ――あうっ――えっ！？」
1874 = "「Hả!? A——Á——Hả!?」"

# monologue
# JP: そうと信じて、言葉を重ねる。
2692 = "Tin là vậy, tôi tiếp tục nói."

# 【双鉄】
# display as 雙鐵
# JP: 「イヤでなければ、今日の続きを。\n――マッサージをだ」
2201 = "「Nếu em không phiền, hãy tiếp tục việc hôm\nnay.\\\n――Ý anh là xoa bóp ấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、うん！　マッサージ！　マッサージをねっ！\nわかったばい――あ、わかりましたっ！！」
1894 = "「A, vâng! Xoa bóp! Là xoa bóp nhỉ!\\\nEm hiểu rồi——A, em hiểu rồi ạ!!」"

# monologue
# JP: 真っ赤になってしどろもどろでそう言って、\n日々姫はぱっと、逃げ出すように僕から降りる。
2777 = "Đỏ bừng mặt và nói lắp bắp như vậy,\\\nHibiki vội vã leo xuống khỏi người tôi như\nmuốn chạy trốn."

# 【日々姫】
# display as 日日姬
# JP: 「選挙、終わったらですね？\nそのときに」
2170 = "「Sau khi bầu cử kết thúc đúng không ạ?\\\nĐến lúc đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。それまでにきちんと考えておく」
1917 = "「Ừ. Từ giờ đến lúc đó anh sẽ suy nghĩ thật\nkỹ.」"

# 【日々姫】
# display as 日日姬
# JP: 「///////っ！！！」
1466 = "「///////!!!」"

# monologue
# JP: 物も言わずに、文字通り日々姫は逃げ出していく。\n裸足で……靴下を置き忘れたまま。
2762 = "Không nói một lời, Hibiki đúng nghĩa là bỏ\nchạy.\\\nChân trần……bỏ quên luôn cả tất."

# 【双鉄】
# display as 雙鐵
# JP: 「むう……」
1884 = "「Ưm……」"

# monologue
# JP: 触れられない。
2865 = "Không thể chạm vào."

# monologue
# JP: わずかでも日々姫の靴下に触れてしまえば、\n迷いがさらに深まりそうで。
2687 = "Dù chỉ chạm nhẹ vào đôi tất của Hibiki\nthôi,\\\ncó lẽ sự bối rối sẽ càng hằn sâu thêm."

# 【双鉄】
# display as 雙鐵
# JP: 「ええい、今はとにかく、眠ってしまおう」
1819 = "「Thôi, bây giờ cứ đi ngủ cái đã.」"

# monologue
# JP: わからない。\nだから、気になる。
2719 = "Không hiểu.\\\nNên mới bận tâm."

# monologue
# JP: 自分でも整理しきれぬままに零した僕の言葉を、\n日々姫が果たして、どう受け取ったか――
2672 = "Những lời tôi thốt ra khi bản thân còn\nchưa sắp xếp xong,\\\nrốt cuộc Hibiki đã tiếp nhận nó như thế\nnào——"

# 【双鉄】
# display as 雙鐵
# JP: 「とにかく、寝るんだ。\n何も考えず、寝てしまうんだ」
2228 = "「Dù sao thì cũng phải ngủ.\\\nKhông nghĩ ngợi gì nữa, ngủ thôi.」"

# monologue
# JP: 夢も見ないで、眠れるように――
2600 = "Để có thể ngủ mà không mộng mị——"

# monologue
# JP: そう祈りつつ、\n僕はすっぽり、布団をかぶる。
2660 = "Vừa cầu nguyện như vậy,\\\ntôi vừa trùm chăn kín mít."

# 【れいな】
# display as 玲奈
# JP: 「がちゃり。カギをかけましたー！」
2301 = "「Cạch. Đã khóa cửa rồi nha!」"

# 【日々姫】
# display as 日日姬
# JP: 「うぁー、疲れたーっ！」
1903 = "「Oa, mệt quá đi mất!」"

# monologue
# JP: 夜八時。
2835 = "Tám giờ tối."

# monologue
# JP: 通常よりも二時間延ばしたレールショップの営業時間が、\nようやく終わる。
2994 = "Thời gian hoạt động của Rail Shop, vốn\nđược kéo dài thêm hai tiếng so với thường\nlệ,\\\ncuối cùng cũng kết thúc."

# 【ハチロク】
# display as 八六
# JP: 「お疲れ様です、日々姫。何か飲みますか？」
2234 = "「Em vất vả rồi, Hibiki. Em có muốn uống gì\nkhông?」"

# 【真闇】
# display as 真闇
# JP: 「ああ、ほんならウチが」
1859 = "「A, vậy thì để chị.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕がお茶を淹れよう」
2273 = "「Không, để anh pha trà cho.」"

# monologue
# JP: 真闇姉は、選対本部長。
2852 = "Chị Mayami là Trưởng ban Bầu cử."

# monologue
# JP: 肉体的な疲労はともかく、\n精神・頭脳を僕らの誰より激しく使っている筈だ。
2480 = "Bỏ qua sự mệt mỏi về thể xác,\\\nchắc chắn chị ấy đang phải vận dụng tinh\nthần và trí não căng thẳng hơn bất kỳ ai\ntrong chúng tôi."

# 【真闇】
# display as 真闇
# JP: 「そ？　じゃあ、お言葉に甘えちゃうねぇ」
1782 = "「Thế à? Vậy chị không khách sáo đâu nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。たまには甘えてくれ」
1921 = "「Ừm. Thỉnh thoảng chị cũng nên dựa dẫm vào\nngười khác đi.」"

# monologue
# JP: 寝苦しくともとにかく眠り。\n目覚めた朝は、昨日と変わらぬ――昨日以上の戦場だ。
2801 = "Dù khó ngủ nhưng vẫn cố ngủ.\\\nSáng thức dậy, vẫn là chiến trường không\nkhác gì hôm qua——thậm chí còn hơn cả hôm\nqua."

# monologue
# JP: 選挙戦を勝ち抜くためのひとつひとつに追われる内に、\n肉欲など、どこかに追いやられてしまっている。
2826 = "Bị cuốn vào từng việc một để giành chiến\nthắng trong cuộc bầu cử,\\\nnhững dục vọng thể xác đã bị đẩy lùi vào\nmột góc nào đó."

# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇ、\nにぃにぃの淹れる抹茶って飲んだことあったっけ？」
2307 = "「Này này,\\\nchị đã uống matcha anh hai pha bao giờ\nchưa?」"

# 【真闇】
# display as 真闇
# JP: 「お抹茶は無かと」
2051 = "「Matcha thì chưa.」"

# 【日々姫】
# display as 日日姬
# JP: 「なら！　期待しちゃっていいと思うよ？」
2038 = "「Vậy thì! Chị cứ kỳ vọng đi!」"

# monologue
# JP: （……日々姫も、変わらぬ様子のようだ）
3006 = "（……Hibiki có vẻ cũng không thay đổi gì.）"

# monologue
# JP: 大きな安堵と。\nそこに混じってきてしまう、なにか物足りない感じ。
2711 = "Sự nhẹ nhõm to lớn.\\\nLẫn lộn trong đó là cảm giác thiếu vắng\nđiều gì đó."

# monologue
# JP: それが何か、あるいは何故かを追求するのは、\n帰宅して、一人になってからにしよう。
2874 = "Nó là gì, hay tại sao lại như vậy,\\\nđể về nhà, khi chỉ còn một mình rồi hẵng\ntìm hiểu."

# 【ポーレット】
# display as 波萊特
# JP: 「お待たせしましたー！　って、あれ？\n双鉄くんと凪ちゃんとふかみちゃんは？」
2215 = "「Để mọi người đợi lâu rồi! Ơ kìa?\\\nSou-chan, Nagi-chan và Fukami-chan đâu\nrồi?」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕はここだ」
2010 = "「Anh ở đây.」"

# 【日々姫】
# display as 日日姬
# JP: 「明日、朝イチで川下りの団体予約が入ってるって。\nふかみちゃんと凪ちゃん。３０分くらい前までいたけど」
1979 = "「Fukami-chan và Nagi-chan nói ngày mai có\nđoàn khách đặt thuyền xuôi dòng từ sáng\nsớm.\\\nHai em ấy mới về khoảng 30 phút trước.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あー、遅くなりすぎちゃったかー。大ニュースだから、\nふたりにも一番に報告したかったんだけど」
1864 = "「A, em đến muộn quá rồi sao. Tin tức sốt\ndẻo mà,\\\nem muốn báo cho hai người đó biết đầu\ntiên.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、電話をもらってから、\nみんなそわそわとしていたぞ」
1932 = "「Ừm, từ lúc nhận được điện thoại,\\\nai nấy đều đứng ngồi không yên đấy.」"

# monologue
# JP: なにせ、ポーレットだ。\n慎重居士で控えめで、自己評価も不当なまでに低い。
2818 = "Dù sao thì, đó là Paulette.\\\nMột người thận trọng, khiêm tốn và luôn\nđánh giá bản thân thấp đến mức bất công."

# monologue
# JP: そのポーレットが『大ニュースがあるから待っていて』\nなどと電話をしてきて、期待が高まらぬはずもない。
2973 = "Một Paulette như vậy lại gọi điện bảo 『Có\ntin tức sốt dẻo nên hãy đợi em nhé』,\\\nthì làm sao mà không kỳ vọng cho được."

# 【日々姫】
# display as 日日姬
# JP: 「なんなんですかポーレットさん？\nその、大ニュースって」
2125 = "「Chuyện gì vậy chị Paulette?\\\nTin tức sốt dẻo đó ấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ええと、わたし、そういうの得意じゃないので、\nもったいぶらないで言いますね」
1857 = "「Ừm, chị không giỏi mấy chuyện này,\\\nnên chị sẽ nói luôn không úp mở nữa nhé.」"

# monologue
# JP: 言って。ポーレットは大きく大きく息を吸う。\n結果としては、実にいい『もったいぶり』になっている。
2952 = "Nói xong. Paulette hít một hơi thật sâu.\\\nKết quả là, lại thành một màn 『úp mở』 cực\nkỳ hiệu quả."

# 【ポーレット】
# display as 波萊特
# JP: 「発注と、スポンサードの申し出をいただきました。\n毛利電鉄の――毛利の、電車姫様から」
2018 = "「Chúng ta đã nhận được đơn đặt hàng và lời\nđề nghị tài trợ.\\\nTừ Đường sắt điện Mouri――Denshahime của\nMouri.」"

# 【日々姫】
# display as 日日姬
# JP: 「発注って、\x%l客車;#00ffc040;客車%l;#;改修プロジェクトに？」
1787 = "「Đơn đặt hàng, cho dự án phục hồi \\\\x%l客車;#00ffc040;toa hành khách%l;#;\nsao?」"

# 【ハチロク】
# display as 八六
# JP: 「スポンサードとは、\x%l客車;#00ffc040;客車%l;#;改修プロジェクトの！？」
2221 = "「Tài trợ là, cho dự án phục hồi \\\\x%l客車;#00ffc040;toa hành khách%l;#;\nạ!?」"

# monologue
# JP: 左右から同時にぶつかる問いかけに、\nポーレットは、晴れやかな笑顔で頷き返す。
3000 = "Trước những câu hỏi dồn dập từ cả hai\nphía,\\\nPaulette gật đầu đáp lại với nụ cười rạng\nrỡ."

# 【ポーレット】
# display as 波萊特
# JP: 「はい！」
2096 = "「Vâng!」"

# 【れいな】
# display as 玲奈
# JP: 「ふわわ、すごいです！　やりましたぁ！」
1868 = "「Fuwawa, tuyệt quá! Thành công rồi nha!」"

# 【真闇】
# display as 真闇
# JP: 「受注規模と、スポンサードの内容は？」
2208 = "「Quy mô đơn hàng và nội dung tài trợ là\ngì?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。ここにまとめてあります」
2173 = "「A, vâng. Em đã tổng hợp lại ở đây.」"

# 【真闇】
# display as 真闇
# JP: 「双ちゃん。チェックば、一緒にお願い」
1981 = "「Sou-chan. Cùng chị kiểm tra nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1926 = "「嗯」" 

# monologue
# JP: 真闇姉へと渡された書類へと目を――\n落とした瞬間、指が勝手に紙の上へと伸びている。
2658 = "Tôi đưa mắt nhìn vào tập tài liệu được đưa\ncho chị Mayami——\\\nNgay khoảnh khắc đó, ngón tay tôi bất giác\nđưa lên mặt giấy."

# monologue
# JP: 指差し確認しなければとても信じられない。\nゼロの数、これ……
2903 = "Nếu không chỉ tay xác nhận thì thật khó mà\ntin được.\\\nSố lượng số 0 này, đây là……"

# 【真闇】
# display as 真闇
# JP: 「随分と太か金額たいねぇ。\nこれ、間違いじゃなかと？」
2295 = "「Số tiền lớn quá nhỉ.\\\nCái này, không nhầm lẫn gì chứ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「それで間違い無いんです。\n条件、わたしも何度も確認しました」
2113 = "「Không có sự nhầm lẫn nào đâu ạ.\\\nĐiều kiện, em cũng đã xác nhận đi xác nhận\nlại nhiều lần rồi.」"

# monologue
# JP: 記載されているスポンサードの条件は、ただひとつ。\n『２０年以内にアルミ製車輌の新造に挑戦すること』。
2440 = "Điều kiện tài trợ được ghi chép chỉ có\nmột.\\\n『Thử thách chế tạo toa xe bằng nhôm mới\ntrong vòng 20 năm tới』."

# monologue
# JP: その他に書かれているのは単なる数字――\n日ノ本円で八桁にのぼる金額だけだ。
2498 = "Những thứ khác được viết chỉ là những con\nsố đơn thuần——\\\nMột số tiền lên đến tám chữ số bằng đồng\nYên Hinamoto."

# 【ポーレット】
# display as 波萊特
# JP: 「それだけじゃなく改修ベースとしての車輌の提供を、\n全国に呼びかけてもくれたみたいで、その中に」
1758 = "「Không chỉ vậy, có vẻ như họ còn kêu gọi\ntrên toàn quốc\\\nđể cung cấp toa xe làm nền tảng phục hồi,\nvà trong số đó.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ」
1896 = "「A.」"

# monologue
# JP: ポーレットがめくったページを飾る写真を見た瞬間に、\n感嘆の声。
2486 = "Khoảnh khắc nhìn thấy bức ảnh trang trí\ntrên trang giấy mà Paulette vừa lật,\\\nmột tiếng cảm thán thốt lên."

# 【ハチロク】
# display as 八六
# JP: 「懐かしい。22000系\x%l客車;#00ffc040;客車%l;#;ではないですか」
1959 = "「Hoài niệm quá. Đây chẳng phải là \\\\x%l客車;#00ffc040;toa hành khách%l;#;\ndòng\n22000 sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなの。\nこの前まで[ちちぶ,2]知知武鉄道で\x%lC58;#00ffc040;C58%l;#;に引かれてたコなんだって」
2082 = "「Đúng vậy.\\\nNghe nói trước đây nó từng được \\\\x%lC58;#00ffc040;C58%l;#; kéo\ntrên tuyến Đường sắt Chichibu đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクも引いていたのか？」
1808 = "「Hachiroku cũng từng kéo nó sao?」"

# 【ハチロク】
# display as 八六
# JP: 「もちろんです。\x%l大詔;#00ffc040;大詔%l;#;時代の\x%l帝鉄;#00ffc040;帝鉄%l;#;を駆け抜けた、\n代表的な\x%l客車;#00ffc040;客車%l;#;ですから」
2141 = "「Tất nhiên rồi ạ. Nó là \\\\x%l客車;#00ffc040;toa hành khách%l;#;\ntiêu biểu\\\ntừng rong ruổi trên tuyến \\\\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;\nthời \\\\x%l大詔;#00ffc040;Đại Chiếu%l;#; mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;との相性もいいのか？」
2278 = "「Vậy thì, nó cũng rất hợp với \\\\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;\nđúng\nkhông?」"

# monologue
# JP: 待ってましたと言わんばかりに、\nポーレットが大きく胸を張る。
2817 = "Như chỉ chờ có thế,\\\nPaulette ưỡn ngực đầy tự hào."

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l台車;#00ffc040;台車%l;#;老朽化で営業運転引退しちゃったコだそうです。\nでもまだまだ煙一つ入ってこないってお墨付きで」
2182 = "「Nghe nói nó đã phải ngừng vận hành thương\nmại do \\\\x%l台車;#00ffc040;giá chuyển hướng%l;#; bị lão hóa.\\\nNhưng đã được đảm bảo là vẫn kín bưng,\nkhông để lọt một chút khói nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1940 = "「Ồ!」"

# 【れいな】
# display as 玲奈
# JP: 「だったら、うちのコとニコイチすれば、\nすぐ、元気一杯の\x%l客車;#00ffc040;客車%l;#;に産まれ変わりそうですぅ」
2283 = "「Nếu vậy, chỉ cần chắp vá với toa xe của\nchúng ta,\\\nthì sẽ nhanh chóng tái sinh thành một \\\\x%l客車;#00ffc040;toa hành khách%l;#;\ntràn đầy sức sống nha.」"

# 【日々姫】
# display as 日日姬
# JP: 「わ、わ――なにそれ、すごくないっ！？」
1862 = "「Oa, oa——Cái gì vậy, chẳng phải quá tuyệt\nvời sao!?」"

# monologue
# JP: 確かに凄い。\n話が実現するのなら、事態は一気に大きく動く。
2870 = "Quả thực rất tuyệt vời.\\\nNếu chuyện này trở thành hiện thực, tình\nhình sẽ thay đổi một cách chóng mặt."

# 【ポーレット】
# display as 波萊特
# JP: 「すごいのはそれだけじゃないんです。鋼製\x%l客車;#00ffc040;客車%l;#;も二つ。\nこれは、毛利電鉄向けの改修素材っていうことで」
1829 = "「Sự tuyệt vời không chỉ dừng lại ở đó đâu.\nCòn có hai \\\\x%l客車;#00ffc040;toa hành khách%l;#; bằng thép nữa.\\\nĐây là vật liệu phục hồi dành cho Đường\nsắt điện Mouri.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それが受注か」
2259 = "「Đó là đơn đặt hàng sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。そっちは、\nこの金額でやってほしいっていうお話で」
2091 = "「Vâng. Phía họ bảo rằng,\\\nmuốn chúng ta thực hiện với mức giá này.」"

# 【日々姫】
# display as 日日姬
# JP: 「わ」
1863 = "「Oa.」"

# monologue
# JP: スポンサードの金額を、さらに上回る提示額。\nあまりに気前良い提示すぎ、すぐには言葉が出てこない。
2996 = "Mức giá được đưa ra còn cao hơn cả số tiền\ntài trợ.\\\nSự hào phóng quá đỗi khiến tôi không thốt\nnên lời."

# 【真闇】
# display as 真闇
# JP: 「どぎゃんして、ここまで良か話を？」
2127 = "「Làm thế nào mà lại có được một lời đề\nnghị tốt đến vậy?」"

# monologue
# JP: 心の隅にあった疑問を、真闇姉が言葉にしてくれる。\n\x%lまいてつ;#00ffc040;まいてつ%l;#;同士の互助ということもあるのかもだが……
2853 = "Chị Mayami đã nói lên thắc mắc trong góc\nkhuất trái tim tôi.\\\nCó thể là do sự tương trợ giữa những người\n\\\\x%lまいてつ;#00ffc040;chủ tàu%l;#; với nhau, nhưng mà……"

# monologue
# JP: それでもこれは――詐欺ではないかと不安になるほど――\n採算を、完全に度外視している申し出だとしか思えない。
2471 = "Dù vậy thì lời đề nghị này——đến mức khiến\ntôi lo lắng không biết có phải lừa đảo hay\nkhông——\\\nchỉ có thể nghĩ rằng họ hoàn toàn không\nmàng đến lợi nhuận."

# 【ポーレット】
# display as 波萊特
# JP: 「それはですね、わたしたちの――\n御一夜のみんなの力の結晶なんです」
2260 = "「Đó là vì, đây là kết tinh sức mạnh của\nchúng ta——\\\ncủa tất cả mọi người ở Ohimitera.」"

# monologue
# JP: ポーレットがパソコンを立ち上げる。
2819 = "Paulette khởi động máy tính."

# monologue
# JP: ブラウザを開き、ブックマークしてあるらしい、\n鉄道ブログのページを僕らに指し示す。
2567 = "Mở trình duyệt lên, cô ấy chỉ cho chúng\ntôi xem\\\nmột trang blog về đường sắt có vẻ như đã\nđược đánh dấu trang."

# 【日々姫】
# display as 日日姬
# JP: 「あ！？　この写真」
1901 = "「A!? Bức ảnh này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。ここだ」
1983 = "「Đúng vậy. Là ở đây.」"

# monologue
# JP: みなの希望を模型に変えて、日々充実していくレイアウト。\nその様子が、毎日毎日、写真と記事とで綴られている。
2538 = "Biến hy vọng của mọi người thành mô hình,\nsa bàn ngày càng trở nên phong phú.\\\nQuá trình đó được ghi lại từng ngày bằng\nnhững bức ảnh và bài viết."

# 【れいな】
# display as 玲奈
# JP: 「こうしてみると、町が育ってるみたいですぅ」
1944 = "「Nhìn thế này, cứ như thị trấn đang lớn\nlên vậy nha.」"

# 【ポーレット】
# display as 波萊特
# JP: 「だけじゃなくって、これも」
2274 = "「Không chỉ thế đâu, còn có cái này nữa.」"

# 【ハチロク】
# display as 八六
# JP: 「あら、\x%l8620;#00ffc040;8620%l;#;の見学会の様子ではないですか」
1872 = "「Ô kìa, đây chẳng phải là hình ảnh buổi\ntham quan \\\\x%l8620;#00ffc040;8620%l;#; sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「見事な写真だ。ハチロクがひときわ綺麗に写っているな。\n\x%l8620;#00ffc040;8620%l;#;も、実物以上に格好良い」
2055 = "「Bức ảnh tuyệt thật. Hachiroku lên hình\nđẹp nổi bật luôn.\\\n\\\\x%l8620;#00ffc040;8620%l;#; cũng trông oai phong hơn cả thực tế nữa.」"

# 【ハチロク】
# display as 八六
# JP: 「実物通りです。\nですが、一番見栄えのする角度ではありますね、確かに」
1973 = "「Đúng như thực tế thôi ạ.\\\nNhưng quả thực, đây là góc chụp đẹp nhất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「一体誰がこんなブログを――」
2258 = "「Rốt cuộc là ai đã làm cái blog này——」"

# monologue
# JP: ブログ右端のプロフィールには、\n“　名前；A SHELL　”と記載されている。
2989 = "Ở phần hồ sơ cá nhân bên góc phải blog,\\\ncó ghi \"Tên: A SHELL\"."

# 【双鉄】
# display as 雙鐵
# JP: 「エー・シェル――と読むのか？　これは」
2323 = "「A SHELL——đọc là vậy sao? Cái này.」"

# 【日々姫】
# display as 日日姬
# JP: 「シェルって、英語で貝、ってことですか？」
2326 = "「SHELL trong tiếng Anh nghĩa là con sò\nđúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――貝。――ああ、いや！\nわかった、エーではなく、アだ！　ア・貝だ！！」
1910 = "「Ừm——con sò. ——A, không!\\\nAnh hiểu rồi, không phải chữ A (ê), mà là\nA (a)! A-Kai!!」"

# 【日々姫】
# display as 日日姬
# JP: 「赤井宮司のブログなの！？　これ！！」
2263 = "「Là blog của Đền chủ Akai sao!? Cái này\nấy!!」"

# 【ポーレット】
# display as 波萊特
# JP: 「さぁ、どうなんでしょう。\nご本人はウィともノンともおっしゃいませんでした」
2255 = "「Chà, ai biết được.\\\nChính chủ cũng chẳng thừa nhận hay phủ\nnhận.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、あの方ならそうだろうな。\nが――そうか、毛利の姫も、このブログを見て？」
1774 = "「À, nếu là ông ấy thì chắc là vậy rồi.\\\nNhưng——ra là thế, Denshahime của Mouri\ncũng đã xem blog này sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。\nわたし達の計画をすごく気に入ってくださったみたいで」
2093 = "「Vâng.\\\nCó vẻ như cô ấy rất thích kế hoạch của\nchúng ta.」"

# 【真闇】
# display as 真闇
# JP: 「風ば――吹き出してきよったね」
2315 = "「Gió——đã bắt đầu thổi rồi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2087 = "「Ừ.」"

# monologue
# JP: 真闇姉の言葉が教えてくれる。\n風、とは、つまり――
2855 = "Lời nói của chị Mayami đã cho tôi biết.\\\nGió, có nghĩa là——"

# 【双鉄】
# display as 雙鐵
# JP: 「僕ら一人一人の呼びかけが、声が――\n集まり呼応し、やがて即ち、風となるのか」
1947 = "「Tiếng gọi, tiếng nói của từng người chúng\nta——\\\ntập hợp lại, hô ứng lẫn nhau, và cuối cùng\ntrở thành luồng gió sao.」"

# monologue
# JP: ならばもはや、それが止むことはないだろう。
2974 = "Nếu vậy thì, nó sẽ không bao giờ dừng lại\nnữa."

# monologue
# JP: このニュースなら、間違いなく、\n人から人へ、次から次に、留まることなく伝えられていく。
2969 = "Nếu là tin tức này, chắc chắn,\\\nsẽ được truyền từ người này sang người\nkhác, không ngừng nghỉ."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2068 = "「Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん」
1930 = "「Vâng, anh trai.」"

# monologue
# JP: 日々姫の手を取る。\nとても自然に。
2710 = "Nắm lấy tay Hibiki.\\\nMột cách rất tự nhiên."

# monologue
# JP: 感じる澄み切った興奮は、\n肉体ではなく、[こころ,1]精神のものだ。
2685 = "Sự phấn khích trong trẻo mà tôi cảm nhận\nđược,\\\nkhông phải của thể xác, mà là của tinh\nthần."

# 【双鉄】
# display as 雙鐵
# JP: 「この風を、お前の瞳は、捉えているか？」
1797 = "「Đôi mắt em, có bắt được luồng gió này\nkhông?」"

# 【日々姫】
# display as 日日姬
# JP: 「見えます。はっきり」
2030 = "「Em thấy. Rất rõ ràng.」"

# monologue
# JP: 言って日々姫は僕の手をぎゅっと握り返して。\n解いたその手で、ペンを取る。
2791 = "Nói rồi, Hibiki siết chặt lấy tay tôi.\\\nRồi buông tay ra, cầm lấy cây bút."

# 【日々姫】
# display as 日日姬
# JP: 「だから、描きます。今度こそ」
2252 = "「Vì vậy, em sẽ vẽ. Lần này chắc chắn sẽ vẽ\nđược.」"
