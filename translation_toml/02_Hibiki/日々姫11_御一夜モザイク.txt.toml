1881 = "「哥哥，痛的話就說啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――全くもって痛くない。\n心地よいばかりだ――というか」
2112 = "「沒事，完全不痛，非常舒服——對了」" 

