1785 = "「你找回畫畫的感覺了嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「描けない！　っていうぐじゃぐじゃしたのは、\nなくなりました」
2294 = "「那種“畫不出來！”的感覺已經消失了」" 

# monologue
# JP: 即座の答えと裏腹に、足は、背中をゆっくり進む。\n恐らく、肩を目指している。
2789 = "日日姬立刻回答道。而她的腳則在我的背上慢慢前進，恐怕最終目的地是我的肩膀。" 

