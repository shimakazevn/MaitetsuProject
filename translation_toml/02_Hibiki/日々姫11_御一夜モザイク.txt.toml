# JP: 指差し確認しなければとても信じられない。\nゼロの数、これ……
2903 = "若不用手指點著數，我根本不敢相信這零的個數……" 

# 【真闇】
# display as 真闇
# JP: 「随分と太か金額たいねぇ。\nこれ、間違いじゃなかと？」
2295 = "「金額相當大啊。沒弄錯吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで間違い無いんです。\n条件、わたしも何度も確認しました」
2113 = "「沒弄錯。條件我也確認過好幾遍了」" 

# monologue
# JP: 記載されているスポンサードの条件は、ただひとつ。\n『２０年以内にアルミ製車輌の新造に挑戦すること』。
2440 = "上面只記載了一項贊助條件——“挑戰在２０年內製造全新的鋁製車輛”。" 

# monologue
# JP: その他に書かれているのは単なる数字――\n日ノ本円で八桁にのぼる金額だけだ。
2498 = "剩下的都是數字——高達八位數日元的金額。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それだけじゃなく改修ベースとしての車輌の提供を、\n全国に呼びかけてもくれたみたいで、その中に」
1758 = "「不只是這樣，他們好像還聯絡了全國各方，呼籲他們為我們提供用來修復的車輛。其中——」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ」
1896 = "「啊」" 

# monologue
# JP: ポーレットがめくったページを飾る写真を見た瞬間に、\n感嘆の声。
2486 = "八六看到波萊特翻開的那一頁上的照片後發出了感嘆。" 

# 【ハチロク】
# display as 八六
# JP: 「懐かしい。22000系\x%l客車;#00ffc040;客車%l;#;ではないですか」
1959 = "「好懷念啊。這不是２２０００系\\x%l客車;#00ffc040;客運車廂%l;#;嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうなの。\nこの前まで[ちちぶ,2]知知武鉄道で\x%lC58;#00ffc040;C58%l;#;に引かれてたコなんだって」
2082 = "「是啊。它之前在秩父鐵路由\\x%lC58;#00ffc040;Ｃ５８%l;#;牽引」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクも引いていたのか？」
1808 = "「八六也拉過這種車廂嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「もちろんです。\x%l大詔;#00ffc040;大詔%l;#;時代の\x%l帝鉄;#00ffc040;帝鉄%l;#;を駆け抜けた、\n代表的な\x%l客車;#00ffc040;客車%l;#;ですから」
2141 = "「當然了。它是在大正時代縱橫於\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;的代表性\\x%l客車;#00ffc040;客運車廂%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;との相性もいいのか？」
2278 = "「那它是不是和\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;很合得來？」" 

# monologue
# JP: 待ってましたと言わんばかりに、\nポーレットが大きく胸を張る。
2817 = "波萊特似乎對這個問題已經久候多時，她顯得信心十足。" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l台車;#00ffc040;台車%l;#;老朽化で営業運転引退しちゃったコだそうです。\nでもまだまだ煙一つ入ってこないってお墨付きで」
2182 = "「聽說它由於\\x%l台車;#00ffc040;轉向架%l;#;老化，從商業運營中退了下來。但他們保證它決不會進煙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1940 = "「噢！」" 

# 【れいな】
# display as 玲奈
# JP: 「だったら、うちのコとニコイチすれば、\nすぐ、元気一杯の\x%l客車;#00ffc040;客車%l;#;に産まれ変わりそうですぅ」
2283 = "「那就是說，只要把它和我們的車廂拼起來，它立刻就能重生為健康的\\x%l客車;#00ffc040;客運車廂%l;#;」" 

# 【日々姫】
# display as 日日姬
# JP: 「わ、わ――なにそれ、すごくないっ！？」
1862 = "「哇——這也太厲害了吧！？」" 

# monologue
# JP: 確かに凄い。\n話が実現するのなら、事態は一気に大きく動く。
2870 = "確實厲害。若真的能夠實現，形勢將會大幅好轉。" 

# 【ポーレット】
# display as 波萊特
# JP: 「すごいのはそれだけじゃないんです。鋼製\x%l客車;#00ffc040;客車%l;#;も二つ。\nこれは、毛利電鉄向けの改修素材っていうことで」
1829 = "「厲害的不只是這些。我們還會收到兩輛鋼製的\\x%l客車;#00ffc040;客運車廂%l;#;。這兩輛是為毛利電鐵準備的修復材料」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが受注か」
2259 = "「這就是我們接到的工作嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。そっちは、\nこの金額でやってほしいっていうお話で」
2091 = "「是的。他們希望以這個金額來做這件事」" 

# 【日々姫】
# display as 日日姬
# JP: 「わ」
1863 = "「哇」" 

# monologue
# JP: スポンサードの金額を、さらに上回る提示額。\nあまりに気前良い提示すぎ、すぐには言葉が出てこない。
2996 = "開出的金額比贊助金額還要高。他們出手實在太闊氣，我一時說不出話來。" 

# 【真闇】
# display as 真闇
# JP: 「どぎゃんして、ここまで良か話を？」
2127 = "「為什麼會有這麼好的事？」" 

# monologue
# JP: 心の隅にあった疑問を、真闇姉が言葉にしてくれる。\n\x%lまいてつ;#00ffc040;まいてつ%l;#;同士の互助ということもあるのかもだが……
2853 = "真闇姐說出了我心中的疑問。就算部分原因是他們想幫助\\x%lまいてつ;#00ffc040;掌車人%l;#;同伴——" 

# monologue
# JP: それでもこれは――詐欺ではないかと不安になるほど――\n採算を、完全に度外視している申し出だとしか思えない。
2471 = "但這種不計盈虧的提議實在是讓人擔心這是否是詐騙。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それはですね、わたしたちの――\n御一夜のみんなの力の結晶なんです」
2260 = "「這是我們的——御一夜眾人的功勞」" 

# monologue
# JP: ポーレットがパソコンを立ち上げる。
2819 = "波萊特打開電腦。" 

# monologue
# JP: ブラウザを開き、ブックマークしてあるらしい、\n鉄道ブログのページを僕らに指し示す。
2567 = "她開啟了瀏覽器，向我們指了指一個被添加成書籤的頁面。上面顯示的是一個鐵路部落格。" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！？　この写真」
1901 = "「啊！？這張照片」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。ここだ」
1983 = "「就是這裡吧」" 

# monologue
# JP: みなの希望を模型に変えて、日々充実していくレイアウト。\nその様子が、毎日毎日、写真と記事とで綴られている。
2538 = "場景模型不斷收入大家的期望，一天天豐富起來。它每一天的變化以圖文並茂的形式登在部落格上。" 

# 【れいな】
# display as 玲奈
# JP: 「こうしてみると、町が育ってるみたいですぅ」
1944 = "「城市就好像在成長一樣」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だけじゃなくって、これも」
2274 = "「還有這些」" 

# 【ハチロク】
# display as 八六
# JP: 「あら、\x%l8620;#00ffc040;8620%l;#;の見学会の様子ではないですか」
1872 = "「哎呀，這不是\\x%l8620;#00ffc040;８６２０%l;#;參觀會的照片嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「見事な写真だ。ハチロクがひときわ綺麗に写っているな。\n\x%l8620;#00ffc040;8620%l;#;も、実物以上に格好良い」
2055 = "「拍得真好。八六顯得特別漂亮，\\x%l8620;#00ffc040;８６２０%l;#;比實車還要帥氣」" 

# 【ハチロク】
# display as 八六
# JP: 「実物通りです。\nですが、一番見栄えのする角度ではありますね、確かに」
1973 = "「實車就這麼帥氣。不過這人確實選了一個最好看的角度」" 

# 【双鉄】
# display as 雙鐵
# JP: 「一体誰がこんなブログを――」
2258 = "「這個部落格到底是誰——」" 

# monologue
# JP: ブログ右端のプロフィールには、\n“　名前；A SHELL　”と記載されている。
2989 = "部落格右側的個人資料欄上寫著“暱稱： Ａ ＳＨＥＬＬ”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「エー・シェル――と読むのか？　これは」
2323 = "「Ａ ＳＨＥＬＬ——是這麼念嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「シェルって、英語で貝、ってことですか？」
2326 = "「ＳＨＥＬＬ在英語裡是貝殼的意思嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――貝。――ああ、いや！\nわかった、エーではなく、アだ！　ア・貝だ！！」
1910 = "「嗯……貝殼。——啊！我懂了，貝讀作ＫＡＩ，所以Ａ貝就是ＡＫＡＩ，而赤井的讀音也是ＡＫＡＩ！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「赤井宮司のブログなの！？　これ！！」
2263 = "「這是赤井宮司的部落格！？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「さぁ、どうなんでしょう。\nご本人はウィともノンともおっしゃいませんでした」
2255 = "「這個不知道啊。他既沒有肯定也沒有否定」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、あの方ならそうだろうな。\nが――そうか、毛利の姫も、このブログを見て？」
1774 = "「他確實是這樣的人。對了，毛利公主是因為看了這個部落格才這麼做的？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。\nわたし達の計画をすごく気に入ってくださったみたいで」
2093 = "「是的。她好像對我們的計劃非常感興趣」" 

# 【真闇】
# display as 真闇
# JP: 「風ば――吹き出してきよったね」
2315 = "「風開始吹起來咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2087 = "「是啊」" 

# monologue
# JP: 真闇姉の言葉が教えてくれる。\n風、とは、つまり――
2855 = "真闇姐說的風即是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕ら一人一人の呼びかけが、声が――\n集まり呼応し、やがて即ち、風となるのか」
1947 = "「大家的一聲聲號召相互呼應，最終形成一陣風」" 

# monologue
# JP: ならばもはや、それが止むことはないだろう。
2974 = "這陣風已經停不下了。" 

# monologue
# JP: このニュースなら、間違いなく、\n人から人へ、次から次に、留まることなく伝えられていく。
2969 = "這個消息一定會一傳十十傳百，越傳越開。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2068 = "「日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん」
1930 = "「嗯，哥哥」" 

# monologue
# JP: 日々姫の手を取る。\nとても自然に。
2710 = "我非常自然地握住了日日姬的手。" 

# monologue
# JP: 感じる澄み切った興奮は、\n肉体ではなく、[こころ,1]精神のものだ。
2685 = "我感受到的並不是肉慾，而是一種精神上的純潔的興奮。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この風を、お前の瞳は、捉えているか？」
1797 = "「你的眼睛能捕捉到這陣風嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「見えます。はっきり」
2030 = "「我看得很清楚」" 

# monologue
# JP: 言って日々姫は僕の手をぎゅっと握り返して。\n解いたその手で、ペンを取る。
2791 = "日日姬說完緊緊回握住我的手，然後把手鬆開。她用這枝手拿起了畫筆。" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、描きます。今度こそ」
2252 = "「這一次我一定能畫出來」" 
