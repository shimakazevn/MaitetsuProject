# JP: 「ＳＬの掃除かな。\n地元の方たちが頑張ってらっしゃるね」
2314 = "「Chắc là đang dọn dẹp đầu máy hơi nước\nnhỉ.\nNgười dân địa phương đang nỗ lực làm việc\nkìa.」"

# 【観光の老夫人】
# display as 游客老夫人
# JP: 「あら、『参加歓迎』ですって、おじいさん」
