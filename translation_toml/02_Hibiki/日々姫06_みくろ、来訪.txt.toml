# display as 日日姬
# JP: 「うん。ほら、ハチロクって――ラジオと通信以外にも、\nTVニュースとか、新聞とかに出ること、多いから」
2064 = "「Vâng. Anh thấy đó, chị Hachiroku——ngoài\nđài phát thanh và thông tin liên lạc ra,\nchị ấy còn xuất hiện trên bản tin truyền\nhình, hay trên báo chí rất nhiều mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。それで――ある意味ハチロクが実際以上の、\n偉大な存在の様に、『見えすぎて』しまっているわけか」
1929 = "「Ra là vậy. Vì thế——theo một khía cạnh nào\nđó, Hachiroku lại\n『trông có vẻ』 như một sự tồn tại vĩ đại\nhơn cả thực tế sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「かなーって。けどね？　みくろちゃん見てたら……\nそれも、悪いことじゃないかなぁ、っても」
1955 = "「Chắc là vậy rồi. Nhưng mà anh biết không?\nNhìn bé Mikuro……\nem lại thấy chuyện đó cũng không hẳn là\nxấu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\nそこは完全に僕も同意だ」
2013 = "「Ừm.\nĐiểm đó thì anh hoàn toàn đồng ý.」"

# monologue
# JP: 真闇姉に対してのコンプレックス。\nハチロクに対しての美化と憧れ。
2837 = "Sự tự ti đối với chị Mayami.\nSự lý tưởng hóa và lòng ngưỡng mộ dành cho\nHachiroku."

# monologue
# JP: それらはある種の歪みであろうが――\n歪みがバネになった部分も、絶対にあろう。
2833 = "Đó có thể là một kiểu suy nghĩ méo mó——\nnhưng chắc chắn cũng có những lúc sự méo\nmó đó lại trở thành động lực."

# 【双鉄】
# display as 雙鐵
# JP: 「悪いことになってしまうのは、結果を出せず――\n歪みが、歪みのままに残ってしまう場合だ」
2149 = "「Nó chỉ trở thành chuyện xấu khi không\nmang lại kết quả gì——\nvà sự méo mó đó cứ mãi là sự méo mó mà\nthôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「あー」
# 2020 = "「啊……」" 

# monologue
# JP: また、あの脱力したような深い息。
2759 = "Lại là tiếng thở dài thườn thượt đó."

# monologue
# JP: 日々姫が共感してくれている――\nそう感じれば、僕のやる気もさらに高まる。
2952 = "Hibiki đang đồng cảm với tôi——\nCảm nhận được điều đó, ý chí của tôi lại\ncàng dâng cao."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、結果を出そう。D51 1031を整備保存し、\nそれをみくろの、38696の整備保存につなげる結果を」
2244 = "「Thế nên, hãy cùng nhau tạo ra thành quả\nnào. Bảo dưỡng và bảo tồn D51 1031,\ntừ đó dẫn đến việc bảo dưỡng và bảo tồn\n38696 của Mikuro.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん！　そうしたい！！」
2071 = "「Vâng! Em cũng muốn vậy!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「今日一日でも、\n大きな実りと、[あまた,1]数多の学びがあったのだ」
1916 = "「Dù chỉ mới một ngày hôm nay thôi,\nnhưng chúng ta đã gặt hái được thành quả\nlớn và học hỏi được rất nhiều điều.」"

# 【日々姫】
# display as 日日姬
# JP: 「ちょこっと待ってー」
2402 = "「Đợi em một chút~」"

# monologue
# JP: 日々姫が大きく手を伸ばし、\n布団の上へとスケッチブックを引き寄せる。
2941 = "Hibiki vươn dài cánh tay,\nkéo cuốn sổ phác thảo lại gần trên tấm\nnệm."

# 【双鉄】
# display as 雙鐵
# JP: 「さきほどまでに出た以外だと、サッカー少年たち。\n彼らはまた、参加したがっていた」
2516 = "「Ngoài những người đã nhắc đến lúc nãy,\ncòn có mấy cậu bé chơi bóng đá nữa.\nBọn nhóc đó cũng muốn tham gia lại.」"

# 【日々姫】
# display as 日日姬
# JP: 「あのカップルも、またやったら、\nやってるのを知ってくれたら、来てくれるかなって思う」
2521 = "「Cả cặp đôi kia nữa, nếu chúng ta tổ chức\nlại,\nvà họ biết được thì em nghĩ họ cũng sẽ đến\nthôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。地元告知は本当に大切だ。\n特に湯富院では、ポスターは観光客にも見られようから」
2299 = "「Đúng vậy. Thông báo cho người dân địa\nphương thực sự rất quan trọng.\nĐặc biệt là ở Yufuin, vì du khách cũng có\nthể nhìn thấy poster mà.」"

# 【日々姫】
# display as 日日姬
# JP: 「ご夫婦も参加してくれたとね！　ばってん――\n観光客の人は、告知のターゲットにしづらくなかと？」
2386 = "「Đôi vợ chồng kia cũng tham gia nữa nhỉ!\nNhưng mà——\nDu khách thì khó mà trở thành đối tượng\nnhắm đến của thông báo được đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「なぜだ？」
2366 = "「Tại sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「だって汚れられんけん、簡単なことしかしてもらえんし。\n旅の思い出にはなるかもだけど、リピーターには」
2091 = "「Tại vì họ không thể để quần áo bị bẩn\nđược, nên chỉ có thể làm mấy việc đơn giản\nthôi.\nCó thể sẽ trở thành kỷ niệm cho chuyến đi,\nnhưng để làm khách quen thì...」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか――故に、湯富院市の\n『手作りの静謐』の長期計画からD51は―――――――」
2038 = "「À, ra là vậy——Thế nên, trong kế hoạch dài\nhạn\n『Sự tĩnh lặng thủ công』 của thành phố\nYufuin, D51 mới―――――――」"

# 【日々姫】
# display as 日日姬
# JP: 「え？　どぎゃんしたと？　にぃに」
1988 = "「Ể? Sao vậy anh hai?」"

# monologue
# JP: 突如ひらめく。\n猛然とうずまく考えが、一つの形にまとまって。
2811 = "Chợt lóe lên một tia sáng.\nNhững luồng suy nghĩ cuộn trào mãnh liệt\nbỗng chốc hội tụ lại thành một."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。お前は僕を自慢にしてもいいかもしれん」
2285 = "「Hibiki. Có lẽ em nên tự hào về anh đi là\nvừa.」"

# 【日々姫】
# display as 日日姬
# JP: 「え？　そんなの前からしとる――\nっていうか、それほどいい考えば浮かんだと？」
1997 = "「Ể? Chuyện đó em làm từ lâu rồi mà——\nÝ em là, anh nghĩ ra ý tưởng gì hay lắm\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いい考えかどうか、自分では冷静に評価できんが――\n『観光客が整備できる』そうした保存法はどうだろう」
2229 = "「Anh cũng không thể bình tĩnh mà tự đánh\ngiá xem ý tưởng đó có hay hay không,\nnhưng——\nPhương pháp bảo tồn kiểu 『Cho phép du\nkhách tham gia bảo dưỡng』 thì sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「へ？　って、やけん――\n観光のひとたちは通りすがりやし」
1989 = "「Hả? Ý anh là sao——\nDu khách thì cũng chỉ là những người qua\nđường thôi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「通りすがりゆえ、『思い出づくり』に気軽に参加できる。\nそこには、なんの責任も発生しないのだから」
2090 = "「Chính vì là người qua đường, nên họ mới\ncó thể thoải mái tham gia để 『tạo kỷ\nniệm』.\nBởi vì ở đó, họ không phải chịu bất cứ\ntrách nhiệm nào cả.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2021 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「汚れについては、服を貸し出す。\n『ナッパ服を着る』は、僕らにはもう当然のことだが」
2146 = "「Về chuyện sợ bẩn thì chúng ta sẽ cho thuê\nquần áo.\nViệc 『Mặc đồng phục màu』 đối với chúng ta\nđã là chuyện đương nhiên, nhưng mà...」"

# 【日々姫】
# display as 日日姬
# JP: 「そっか！　うれしかった！　始めて着た時！\n『機関士さんになったみたい』って、興奮したと！」
2161 = "「Đúng rồi! Em đã rất vui! Hồi lần đầu tiên\nđược mặc ấy!\nEm đã rất phấn khích vì cảm thấy 『Giống\nnhư mình đã trở thành lái tàu vậy』!」"

# monologue
# JP: 日々姫のはずんだ声に、僕の思考も加速する。\nこれは、いける――
2960 = "Giọng nói đầy hứng khởi của Hibiki khiến\ndòng suy nghĩ của tôi càng thêm tăng tốc.\nCách này, khả thi đấy——"

# monologue
# JP: その手応えが、発想を連鎖させていく。
3118 = "Cảm giác chắc chắn đó khiến những ý tưởng\ncứ thế tuôn trào."

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。その喜びと、整備清掃体験は、\n観光資源として、活用できるような気がする」
2297 = "「Đúng chứ. Anh cảm thấy niềm vui đó, cùng\nvới trải nghiệm bảo dưỡng và dọn dẹp,\ncó thể được tận dụng như một nguồn tài\nnguyên du lịch đấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「御一夜でだったら成立すると！\n御一夜は、だってSLの町やけん」
2099 = "「Nếu ở Ohimitera thì chắc chắn sẽ thành\ncông!\nBởi vì Ohimitera là thành phố của đầu máy\nhơi nước mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、御一夜では人員的にも場所的にも厳しい。\n\x%l石造機関庫;#00ffc040;石造機関庫%l;#;はすでに満杯。ガマダス前にも場所はない」
1890 = "「Nhưng ở Ohimitera thì cả nhân lực lẫn địa\nđiểm đều rất khó khăn.\n\\x%l石造機関庫;#00ffc040;Xưởng đầu máy bằng đá%l;#; đã kín chỗ rồi.\nTrước Gamadasu cũng không còn không gian.」"

# 【日々姫】
# display as 日日姬
# JP: 「え？　そんなん――例えばクラフト公園とか」
1995 = "「Ể? Sao lại thế——Ví dụ như công viên Craft\nthì sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道拠点から遠すぎる。誰か一人、交代ででも随時。\n『整備清掃を監督指導できる人間』の常駐が必要――」
2563 = "「Quá xa các cứ điểm đường sắt. Cần phải có\nít nhất một người, dù là thay ca thì cũng\nphải luôn có mặt.\nCần có 『người có khả năng giám sát và\nhướng dẫn bảo dưỡng, dọn dẹp』 thường\ntrực——」"

# 【日々姫】
# display as 日日姬
# JP: 「なら！」
2539 = "「Vậy thì!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2069 = "「嗯」" 

# monologue
# JP: 日々姫と目を見合わせる。\nこころが思考が、完全に重なり合ったと感じる。
2890 = "Tôi và Hibiki nhìn nhau.\nTôi cảm nhận được trái tim và suy nghĩ của\nchúng tôi đã hoàn toàn hòa làm một."

# 【日々姫】
# display as 日日姬
# JP: 「文庫森機関庫！　車両工場！！」
2489 = "「Xưởng đầu máy Bunkomori! Nhà máy chế tạo\ntoa xe!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな、あそこであれば理想的だ」
2307 = "「Đúng vậy, nếu là ở đó thì quá lý tưởng.」"

# monologue
# JP: 蒸気機関車と組み合わされば、\n\x%l扇形機関庫;#00ffc040;扇形機関庫%l;#;の観光価値も更にあがろう。
3059 = "Nếu kết hợp với đầu máy hơi nước,\ngiá trị du lịch của \\x%l扇形機関庫;#00ffc040;gara đầu máy hình ngành%l;#;\nsẽ càng tăng cao hơn nữa."

# 【日々姫】
# display as 日日姬
# JP: 「あそこでだったら、それ自体を観光資源にできると！\n『ボロボロの保存機が、みんなの手で直っていく』の」
2443 = "「Nếu ở đó, bản thân việc này đã có thể trở\nthành tài nguyên du lịch rồi!\nKiểu 『Cỗ máy bảo tồn tồi tàn đang được sửa\nchữa nhờ bàn tay của mọi người』 ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「通りすがりの観光客たちが、鉄道員の服装での清掃や\n軽整備などを実際に体験していく」
2476 = "「Những du khách qua đường sẽ được trải\nnghiệm thực tế\nviệc dọn dẹp và bảo dưỡng nhẹ nhàng trong\ntrang phục của nhân viên đường sắt.」"

# 【日々姫】
# display as 日日姬
# JP: 「絶対記念写真とかとるし、SNSで拡散してもらえたら、\n『やってみたい』って人に届くかも！」
1887 = "「Chắc chắn họ sẽ chụp ảnh kỷ niệm, và nếu\nđược lan truyền trên mạng xã hội,\nthì biết đâu sẽ tiếp cận được những người\n『muốn làm thử』!」"

# 【双鉄】
# display as 雙鐵
# JP: 「整備ノート的なものを作って、\n希望者からは連絡先をもらうようにできれば更に良いな」
2152 = "「Nếu chúng ta làm một cuốn sổ tay bảo\ndưỡng,\nvà xin thông tin liên lạc của những người\ncó nguyện vọng thì càng tốt.」"

# 【日々姫】
# display as 日日姬
# JP: 「そん中からはリピーターさんも生まれてきそう！」
1919 = "「Từ trong số đó có khi lại xuất hiện những\nkhách hàng thân thiết nữa!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうした者たちを集め、数ヶ月に一回の重整備をする。\nケレンや、パテでの穴埋めや、塗装なおしなどの」
2373 = "「Tập hợp những người đó lại, và tiến hành\nbảo dưỡng hạng nặng vài tháng một lần.\nNhư là đánh rỉ, trám lỗ bằng matit, hay\nsơn lại chẳng hạn.」"

# 【日々姫】
# display as 日日姬
# JP: 「技術ばつけた人が、実際に鉄道整備を\n仕事にしていったりとか、そういうのも出てくるかも！」
2465 = "「Biết đâu lại có những người học được kỹ\nthuật\nrồi biến việc bảo dưỡng đường sắt thành\ncông việc thực sự luôn cũng nên!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうしたサイクルを作り上げれば、個人に頼らず、\nかつ、観光活用をしながらの\x%l静態保存;#00ffc040;静態保存%l;#;が叶うかもしれん」
2458 = "「Nếu tạo ra được một chu trình như vậy,\nthì không cần phải phụ thuộc vào cá nhân,\nmà vẫn có thể vừa tận dụng du lịch vừa\nthực hiện \\x%l静態保存;#00ffc040;lưu tĩnh%l;#; được.」"

# 【日々姫】
# display as 日日姬
# JP: 「そん記録ば振り返れると、きっと、もっとよかとよ！\nガマダスみたいな、みんなのギャラリーみたく――――」
2157 = "「Nếu có thể nhìn lại những ghi chép đó thì\nchắc chắn sẽ tuyệt hơn nhiều!\nGiống như Gamadasu, giống như phòng trưng\nbày của mọi người vậy――――」"

# monologue
# JP: いきなり、日々姫が固まってしまう。
3012 = "Đột nhiên, Hibiki cứng đờ người lại."

# 【双鉄】
# display as 雙鐵
# JP: 「どうかしたか？」
2192 = "「Có chuyện gì sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「そっか――みんなでちょっとずつ。\n力ば集めて――逆に、分散できるとこば、分散して」
2305 = "「Ra là vậy——Mọi người cùng nhau làm từng\nchút một.\nTập hợp sức mạnh lại——Ngược lại, chỗ nào\nphân tán được thì phân tán.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2022 = "「啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「見えた、ようやく！\n私の列車！！　私の理想の、食堂列車！！」
2227 = "「Thấy rồi, cuối cùng cũng thấy rồi!\nĐoàn tàu của em!! Đoàn tàu ăn uống lý\ntưởng của em!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2310 = "「Ồ.」"

# monologue
# JP: 言うやいなやで猛然と、\n日々姫はスケッチブックの上に、無数の線を走らせ始める。
3094 = "Nói xong, Hibiki lập tức hùng hục\nvẽ vô số những đường nét lên cuốn sổ phác\nthảo."

