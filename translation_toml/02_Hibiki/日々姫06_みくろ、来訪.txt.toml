1413 = "……Là cặp đôi tôi phát tờ rơi cho đầu tiên.\nCứ tưởng họ đã bỏ đi rồi, hóa ra là đi\nthay đồ rồi quay lại giúp sao."

# 【双鉄】
# display as 雙鐵
# JP: 「……よかったな。\n地元の人も本当は、お前を気にしてくれていたのだな」
1447 = "「……Tốt quá rồi.\nNgười dân địa phương thực ra cũng rất quan\ntâm đến em đấy.」"

