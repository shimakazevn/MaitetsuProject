2971 = "Cảm giác thành tựu khiến chúng tôi muốn\nlàm như vậy——\nChắc chắn chúng tôi đã nắm bắt được rồi."

# 【日々姫】
# display as 日日姬
# JP: 「あー！　つかれたーーー！　けど楽しかったー！」
2026 = "「Aaa! Mệt quá đi mất! Nhưng mà vui thật\nđấy!」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2300 = "「是啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「ね？　にぃに。わたし、オイル臭かったり、\nホコリ臭かったりしなかと？」
2236 = "「Này anh hai? Người em có bị ám mùi dầu,\nhay mùi bụi bặm gì không vậy?」"

# 【双鉄】
# display as 雙鐵
