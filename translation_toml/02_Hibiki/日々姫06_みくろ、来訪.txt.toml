# display as 雙鐵
# JP: 「だなぁ」
2300 = "「Đúng vậy nhỉ.」"

# monologue
# JP: 塗装整備を許されなくとも、油を塗布して磨き上げれば、\n外観の印象は相当変わる。
2782 = "Dù không được phép bảo dưỡng lớp sơn,\nnhưng nếu bôi dầu và đánh bóng,\nthì ấn tượng về ngoại quan sẽ thay đổi\nđáng kể."

# monologue
# JP: そして外観の印象が変わってくれば、\n再びみんなに見てもらう――その可能性をあげられよう。
2765 = "Và khi ấn tượng về ngoại quan thay đổi,\nkhả năng mọi người chú ý đến nó một lần\nnữa——sẽ tăng lên."

# 【みくろ】
# display as 美玖路
# JP: 「それで、だから、さっきの話なんです」
2252 = "「Chính vì vậy, nên mới có chuyện lúc nãy\nạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにとわたしに、清掃に参加してほしいって！」
2117 = "「Cô ấy muốn anh hai và em tham gia dọn dẹp\nđó!」"

# 【みくろ】
# display as 美玖路
# JP: 「土曜か日曜。ふつうの人が参加しやすい日程で。\nおふたりのご都合にあわせて、調整しますから」
2287 = "「Vào thứ Bảy hoặc Chủ nhật. Lịch trình mà\nngười bình thường dễ tham gia ạ.\nMikuro sẽ điều chỉnh theo lịch trình của\nhai người.」"

# 【日々姫】
# display as 日日姬
# JP: 「『御一夜鉄道の現役蒸気機関士と御一夜市長も、\n[デゴイチ,2]d51の清掃に参加します』って！　そしたら出来るし」
2374 = "「Thế là có thể tuyên truyền rằng 'Lái tàu\nhơi nước đương nhiệm của Đường sắt\nOhimitera và Thị trưởng Ohimitera\ncũng tham gia dọn dẹp D51'! Như vậy thì\nlàm được rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。僕らを看板につかうのか」
2291 = "「Ra là vậy. Dùng chúng tôi làm bảng hiệu\nsao.」"

# monologue
# JP: ……僕らの手法を参考にしたと言っていたが、\nよほど熱心に学んでくれたのだろう。
1403 = "……Cô ấy bảo là đã tham khảo phương pháp\ncủa chúng tôi,\nchắc hẳn đã học hỏi rất nhiệt tình."

# monologue
# JP: 意図が非常に明快に見えてくるがゆえ、\nレールの先も、容易に想像できてくる。
2792 = "Ý đồ hiện ra vô cùng rõ ràng,\nnên cũng dễ dàng hình dung được con đường\nphía trước."

# 【双鉄】
# display as 雙鐵
# JP: 「そうして地元参加者を増やし、\n整備に繋げ、保存に繋げる」
2375 = "「Như vậy sẽ tăng số lượng người tham gia ở\nđịa phương,\ndẫn đến việc bảo dưỡng, và dẫn đến việc\nbảo tồn.」"

# 【日々姫】
# display as 日日姬
# JP: 「そしたら、みくろちゃんのハチロクのとこでも、\nおんなじ手段で、きっと整備再生できると！」
2506 = "「Đến lúc đó, ở chỗ chiếc 8620 của Mikuro,\nchắc chắn cũng có thể bảo dưỡng và phục\nhồi bằng phương pháp tương tự!」"

# 【双鉄】
# display as 雙鐵
# JP: 「良いプランだと、第一印象では感じる。\n無論、日々姫の負担をこれ以上増やしたくはないが――」
1838 = "「Ấn tượng đầu tiên là một kế hoạch tốt.\nTất nhiên, anh không muốn tăng thêm gánh\nnặng cho Hibiki nữa, nhưng——」"

# 【日々姫】
# display as 日日姬
# JP: 「やってみたかと！　あぎゃんボロボロの機関車、\nわたし、今までいじったことないし」
2210 = "「Em muốn làm thử! Một chiếc đầu máy tồi\ntàn như vậy,\ntừ trước đến giờ em chưa từng đụng tay\nvào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2014 = "「唔」" 

# 【日々姫】
# display as 日日姬
# JP: 「それに、ヒント――なにか、デザインにつながるヒント。\nそこから、見つけられるかもしれんし」
2445 = "「Hơn nữa, gợi ý——một gợi ý nào đó liên\nquan đến thiết kế.\nBiết đâu em có thể tìm thấy từ việc đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。ならば参加しよう」
2396 = "「Hiểu rồi. Vậy thì tham gia thôi.」"

# 【みくろ】
# display as 美玖路
# JP: 「わぁ、よかったぁ！」
1977 = "「Oa, tốt quá rồi!」"

# monologue
# JP: 言ってみくろは、プリンをぺろりと平らげる。
3041 = "Nói rồi, Mikuro ăn sạch phần pudding."

# 【みくろ】
# display as 美玖路
# JP: 「候補日、\nもし大丈夫ならいくつかもらえたら嬉しいです」
2138 = "「Về ngày dự kiến,\nnếu được thì anh cho Mikuro xin vài ngày\nnhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。関係各所と調整の上、\n今日明日にも渡せるように善処する。連絡先は」
2009 = "「Ừm. Sau khi điều chỉnh với các bên liên\nquan,\ntôi sẽ cố gắng đưa cho cô trong hôm nay\nhoặc ngày mai. Thông tin liên lạc thì\nsao.」"

# 【みくろ】
# display as 美玖路
# JP: 「みくろのスマホにおねがいします！」
2470 = "「Xin gửi vào điện thoại của Mikuro ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「了解だ」
2289 = "「Đã rõ.」"

# monologue
# JP: 秘書業務用のスマホと連絡先を交換すれば、\n日々姫の声が、待ちわびたかのように飛び込んでくる。
2886 = "Khi tôi trao đổi thông tin liên lạc bằng\nđiện thoại dùng cho công việc thư ký,\ngiọng của Hibiki xen vào như thể đã chờ\nđợi từ lâu."

# 【日々姫】
# display as 日日姬
# JP: 「で、みくろちゃん。これからの予定は？」
2533 = "「Vậy, Mikuro. Dự định tiếp theo của em là\ngì?」"

# 【みくろ】
# display as 美玖路
# JP: 「えと――あ！　この時間なら次のエアクラバスに\n間に合いますから、それを使って帰ります」
1961 = "「À thì——a! Giờ này thì vẫn kịp bắt\nchuyến xe buýt Aircra tiếp theo, nên\nMikuro sẽ về bằng xe đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、日帰りか？　バスで直接隈元なら……\nまぁ雄武田まで余裕で今日中には帰れようが――」
2193 = "「Gì chứ, về trong ngày sao? Nếu đi xe buýt\nthẳng đến Kumamoto thì……\nchà, dư sức về đến Omuta trong hôm nay,\nnhưng mà——」"

# 【日々姫】
# display as 日日姬
# JP: 「温泉も入らないで帰っちゃうと？\nちょこっと、もったいなかとじゃない？」
1951 = "「Em không tắm suối nước nóng mà về luôn\nsao?\nHơi bị phí đó nha?」"

# 【みくろ】
# display as 美玖路
# JP: 「御一夜の温泉、みくろも入ってみたいですけど、\n帰れなくなったら、園に迷惑かけちゃいますし」
2439 = "「Mikuro cũng muốn thử tắm suối nước nóng ở\nOhimitera lắm,\nnhưng nếu không về được thì sẽ làm phiền\nmọi người trong sở thú mất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。そう言われては引き止められんな」
2011 = "「Hừm. Nghe vậy thì không thể giữ cô lại\nđược rồi.」"

# 【みくろ】
# display as 美玖路
# JP: 「清掃のときはまた土日のどっちかお休みとるから、\nそこでの分も、普段はしっかりしておきたいなって」
2361 = "「Khi nào đi dọn dẹp Mikuro sẽ xin nghỉ vào\nThứ Bảy hoặc Chủ Nhật,\nnên bình thường Mikuro muốn làm việc chăm\nchỉ để bù vào phần đó.」"

# monologue
# JP: 言ってみくろは、申し訳なさそうな声をだす。
3097 = "Nói xong, Mikuro cất giọng có vẻ áy náy."

# 【みくろ】
# display as 美玖路
# JP: 「本当は、御一夜鉄道にも乗りたかったんですけど」
1922 = "「Thật ra, Mikuro cũng muốn đi thử Đường\nsắt Ohimitera nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
2022 = "「A!」"

# monologue
# JP: うっかりしていた――というか、気が利かなかった。\nまだ1300にもなる前だ、この時間なら――
2711 = "Tôi vô ý quá——hay nói đúng hơn là không\nđược tinh tế.\nBây giờ vẫn chưa đến 13 giờ, giờ này thì——"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロクにだけでも会っていくといい」
2507 = "「Nếu vậy, cô có thể đi gặp Hachiroku cũng\nđược.」"

# 【みくろ】
# display as 美玖路
# JP: 「いえいえいえいえっ！」
1842 = "「Không không không không!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1986 = "「!!?」"

# monologue
# JP: いままでで一番大きな声で、強い拒絶だ。\n僕だけでなく、日々姫も――店中が驚き、固まっている。
2821 = "Bằng giọng nói lớn nhất từ trước đến nay,\nmột sự từ chối mạnh mẽ.\nKhông chỉ tôi, mà cả Hibiki——và cả quán\nđều ngạc nhiên, cứng đờ người."

# 【みくろ】
# display as 美玖路
# JP: 「あのっ、みくろ、まだ何にもできてないっていうか\n――ハチロクおねえさまに会うなら、その、実績とか」
2466 = "「Dạ, Mikuro, vẫn chưa làm được gì cả\n——nếu muốn gặp chị Hachiroku, thì phải có\nthành tích gì đó chứ ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「わかるっ！」
2212 = "「Chị hiểu!」"

# 【みくろ】
# display as 美玖路
# JP: 「ひゃっ！？」
1959 = "「Hya!?」"

# monologue
# JP: 日々姫の硬直が瞬時に溶ける。\n溶けたと同時に、みくろの両手をがっしり握りしめている。
2996 = "Sự cứng đờ của Hibiki tan biến trong chớp\nmắt.\nĐồng thời, con bé nắm chặt lấy hai tay\nMikuro."

# 【日々姫】
# display as 日日姬
# JP: 「『自分はこれだけのことをしましたって――』\n認めてもらえるようなこと、ちゃんと自分のものにして」
2131 = "「'Mình đã làm được chừng này việc rồi\nnè——'\nPhải có một thành tựu gì đó của riêng mình\nđể được công nhận chứ.」"

# 【みくろ】
# display as 美玖路
# JP: 「そうですそうです！　そうしないと――\nハチロクおねえさまに、私、会えない」
2352 = "「Đúng vậy đúng vậy! Nếu không làm thế——\nMikuro, không thể gặp mặt chị Hachiroku\nđược.」"

# 【日々姫】
# display as 日日姬
# JP: 「大好きだから、憧れるから、そう思っちゃう」
2092 = "「Vì rất yêu quý, vì rất ngưỡng mộ, nên mới\nnghĩ như vậy.」"

# 【みくろ】
# display as 美玖路
# JP: 「なんです！　だからみくろ――今のみくろだと、\nやっぱり――今は、会えないかなって、思います」
2321 = "「Đúng vậy ạ! Cho nên Mikuro——với Mikuro\nhiện tại,\nquả nhiên——bây giờ, vẫn chưa thể gặp được\nđâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2014 = "「唔」" 

# monologue
# JP: ……日々姫のコンプレックスと、完全に響き合うほどに。\nみくろにもまた、強く強く、思うところがあるのだろう。
1422 = "……Hoàn toàn đồng điệu với sự tự ti của\nHibiki.\nChắc hẳn Mikuro cũng có những tâm sự vô\ncùng sâu sắc."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば実績。このデゴイチや、みくろ自身のハチロクを、\n見事に復活させることで、作り、示すと良いだろう」
2524 = "「Nếu cần thành tích. Thì cứ tạo ra và\nchứng minh nó\nbằng cách hồi sinh ngoạn mục chiếc\nDegoichi này, hay chính chiếc 8620 của\nMikuro là được.」"

# 【みくろ】
# display as 美玖路
# JP: 「そうですね！　みくろも、すごく、そうしたいです」
2323 = "「Đúng vậy nhỉ! Mikuro cũng, rất muốn làm\nnhư vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「できることならば手伝おう。\n帰途も、道中気をつけて」
2219 = "「Trong khả năng của mình, tôi sẽ giúp đỡ.\nTrên đường về nhớ cẩn thận nhé.」"

# 【みくろ】
# display as 美玖路
# JP: 「気をつけます！\nお忙しいなか、本当にありがとうございます」
2431 = "「Mikuro sẽ cẩn thận ạ!\nThật sự cảm ơn hai người đã dành thời gian\ndù đang rất bận rộn.」"

# monologue
# JP: 言って立ち上がってお辞儀して、\nみくろは自分のポーチから――
3038 = "Nói rồi đứng dậy cúi chào,\nMikuro lấy từ trong túi của mình ra——"

# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、ここの会計は、僕が持つ」
2036 = "「À không, bữa này tôi mời.」"

# monologue
# JP: 右手だけでお財布を出そうとしているゆえ、\n伝票をもって立ち上がる。
3076 = "Thấy cô ấy chỉ dùng tay phải để lấy ví,\ntôi liền cầm hóa đơn đứng lên."

# 【みくろ】
# display as 美玖路
# JP: 「でも、悪いです」
1895 = "「Nhưng mà, ngại lắm ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「もう数少ないハチロクの妹が訪ねてきてくれたのだ。\nハチロクのマスターとして、格好をつけさせて欲しい」
2168 = "「Một trong số ít những người em gái của\nHachiroku đã đến thăm mà.\nVới tư cách là Master của Hachiroku, hãy\nđể tôi thể hiện chút phong độ chứ.」"

# 【みくろ】
# display as 美玖路
# JP: 「あ――」
2020 = "「A——」"

# monologue
# JP: みくろの表情から笑顔が消える。\nぎくりとする。
3015 = "Nụ cười biến mất khỏi khuôn mặt Mikuro.\nTôi giật mình."

# monologue
# JP: あるいは僕は、僕のうかつな発言は、\nみくろのかつてのマスターのことを。
2897 = "Có lẽ, lời nói bất cẩn của tôi,\nđã gợi nhớ đến Master cũ của Mikuro."

# 【みくろ】
# display as 美玖路
# JP: 「ありがとうございます。右田機関士」
2473 = "「Cảm ơn anh. Lái tàu Migita.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2015 = "「!」"

# monologue
# JP: けれどもみくろの口元には、\nすぐに穏やかな――幸せそうな笑みが浮く。
2714 = "Nhưng trên môi Mikuro,\nngay lập tức hiện lên một nụ cười dịu\ndàng——trông rất hạnh phúc."

# monologue
# JP: そうしてぴしり――ハチロクのものとそっくりな、\n敬礼が僕に送られる。
2904 = "Rồi cô ấy đứng nghiêm——và dành cho tôi một\ncái chào,\ngiống hệt như của Hachiroku."

# 【みくろ】
# display as 美玖路
# JP: 「みくろ、お言葉に甘えます！」
2536 = "「Mikuro, xin phép nhận tấm lòng của anh\nạ!」"

# 【日々姫】
# display as 日日姬
# JP: 「…………時間と場所、間違って無かとよねー」
1433 = "「…………Không nhầm thời gian và địa điểm đâu\nnhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。地元告知がうまくいかなかったケースかな」
2068 = "「Hừm. Chắc là do việc thông báo ở địa\nphương không được suôn sẻ rồi.」"

# monologue
# JP: ……僕ら以外には、誰もいない。\nというか、肝心のみくろもいない。
1424 = "……Ngoài chúng tôi ra, chẳng có ai cả.\nMà quan trọng hơn là, Mikuro cũng không có\nở đây."

# monologue
# JP: が、清掃道具は各種しっかり揃い、\nD51のそばのフェンスにたてかけられている。
2734 = "Nhưng, các loại dụng cụ dọn dẹp đã được\nchuẩn bị đầy đủ,\ndựng dựa vào hàng rào bên cạnh D51."

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく電話をかけてみるか――む」
1914 = "「Dù sao cũng thử gọi điện xem sao——hửm.」"

# 【みくろ】
# display as 美玖路
# JP: 「ごめんなさい。ウェスとかは用意できたんですけど、\nオイル、雄武田からもってこれなくて」
1848 = "「Xin lỗi hai người. Mikuro đã chuẩn bị\nđược giẻ lau các thứ rồi,\nnhưng không thể mang dầu từ Omuta đến đây\nđược.」"

# monologue
# JP: みくろが右手に大きな買い物袋を下げてこちらによたよた\n――っと！
3027 = "Mikuro xách một túi mua sắm lớn bằng tay\nphải, lảo đảo đi về phía này\n——á!"

# 【双鉄】
# display as 雙鐵
# JP: 「無理をするな。僕が持とう」
1852 = "「Đừng cố quá. Để tôi xách cho.」"

# 【みくろ】
# display as 美玖路
# JP: 「わ、ありがとうございます」
1978 = "「Oa, cảm ơn anh.」"

# monologue
# JP: 袋の中には４リットルのオイル缶。ずっしり重い。\n掃除道具の前へと運べば、みくろは軍手を手渡してくる。
3072 = "Trong túi là can dầu 4 lít. Nặng trĩu.\nSau khi tôi mang đến chỗ dụng cụ dọn dẹp,\nMikuro đưa cho tôi đôi găng tay lao động."

# 【みくろ】
# display as 美玖路
# JP: 「清掃、すぐに始めても大丈夫ですか？」
1949 = "「Chúng ta bắt đầu dọn dẹp ngay được không\nạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕らはまったく問題ないが――」
2207 = "「Chúng tôi thì hoàn toàn không có vấn đề\ngì, nhưng——」"

# 【日々姫】
# display as 日日姬
# JP: 「わたしたち三人だけと？\n地元のひと、ひとりもいなかと？」
1945 = "「Chỉ có ba người chúng ta thôi sao?\nKhông có người dân địa phương nào đến à?」"

# 【みくろ】
# display as 美玖路
# JP: 「いたらいいなって思ってたんですけど。\nごめんなさい、ぜんぜん来てくれませんでしたね」
2204 = "「Mikuro cũng mong là có người đến.\nXin lỗi nhé, chẳng có ai đến cả.」"

# monologue
# JP: ……有効な告知をしてなお０人なのか、\n有効な告知ができずに０人なのか。そこが気になる。
1411 = "……Đã thông báo hiệu quả mà vẫn không có\nai,\nhay là do không thể thông báo hiệu quả nên\nmới không có ai. Tôi đang băn khoăn điểm\nđó."

# monologue
# JP: 日々姫も同じ気持ちなのだろう、\n表情がいくらかこわばっている。
2953 = "Có lẽ Hibiki cũng có cùng suy nghĩ,\nnên vẻ mặt con bé hơi cứng lại."

# 【双鉄】
# display as 雙鐵
# JP: 「地元告知は、どのようなものを行ったのだ？」
2545 = "「Cô đã tiến hành thông báo ở địa phương\nnhư thế nào vậy?」"

# monologue
# JP: 確認すればその途端、\nみくろはとても申し訳なさそうな顔になる。
2708 = "Vừa mới xác nhận,\nMikuro liền lộ vẻ mặt vô cùng áy náy."

# 【みくろ】
# display as 美玖路
# JP: 「園内にポスターを貼って、ビラ配りもしたんですけど。\nだけど、普通の人には雄武田から湯富院は遠いみたいで」
2419 = "「Mikuro đã dán áp phích trong sở thú, cũng\ncó phát tờ rơi nữa.\nNhưng mà, với người bình thường thì từ\nOmuta đến Yufuin có vẻ xa quá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、雄武田での地元告知ではなく、ここでの――\nD51 1031の地元、湯富院での告知の話だ」
1860 = "「Không, không phải thông báo ở Omuta, mà\nlà ở đây cơ——\nTôi đang hỏi về việc thông báo ở Yufuin,\nquê hương của chiếc D51 1031 này.」"

# 【みくろ】
# display as 美玖路
# JP: 「そこまでは、みくろ出来なかったから、\n市役所の人に『できればお願いします』って頼んで」
2509 = "「Chuyện đó thì, Mikuro không làm được,\nnên đã nhờ người ở tòa thị chính là 'Nếu\nđược thì xin hãy giúp tôi'.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 2022 = "「啊！」" 

# monologue
# JP: その一言を聞いた途端に、\n日々姫の表情がほうっとゆるむ。
2707 = "Vừa nghe câu đó,\nvẻ mặt Hibiki liền dịu đi."

# 【日々姫】
# display as 日日姬
# JP: 「よかった。それなら望み、ゼロじゃなかとね」
2113 = "「May quá. Vậy thì hy vọng không phải là\ncon số không rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2300 = "「是啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「やったら私！　いま簡単なポスター描いちゃう！」
2532 = "「Nếu vậy để em! Em sẽ vẽ một tấm áp phích\nđơn giản ngay bây giờ!」"

# 【みくろ】
# display as 美玖路
# JP: 「え？　え？　え？」
1991 = "「Hả? Hả? Hả?」"

# monologue
# JP: みくろはきょとんとした顔になり、\n日々姫と僕を交互に見渡し――僕で視線を落ち着ける。
3020 = "Mikuro lộ vẻ ngơ ngác,\nnhìn luân phiên giữa tôi và Hibiki——rồi\ndừng ánh mắt ở tôi."

# 【みくろ】
# display as 美玖路
# JP: 「あの、それって、どういうことですか？」
2468 = "「À ừm, thế nghĩa là sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まず、湯富院での地元告知はまったくされていない。\nこれは、市の対応としては、ごくごく当然のことだ」
2569 = "「Đầu tiên, việc thông báo ở địa phương\nYufuin hoàn toàn chưa được thực hiện.\nĐây là phản ứng hết sức hiển nhiên của\nthành phố.」"

# 【みくろ】
# display as 美玖路
# JP: 「えっ！　そうなんですか？」
1999 = "「Hả! Vậy sao ạ?」"

# monologue
# JP: 湯富院市が主催・共催でもないかぎり、それがどれほど\n一般的に有意な催しであろうとも、告知協力は得られない。
2764 = "Trừ khi thành phố Yufuin đứng ra tổ chức\nhoặc đồng tổ chức, còn không thì dù sự\nkiện đó\ncó ý nghĩa chung đến đâu, cũng sẽ không\nnhận được sự hỗ trợ thông báo."

# monologue
# JP: 『有意・無為』を市が主体として判断をし得ない以上、\n一律全てを例外なく、断わる他に無いからだ。
2791 = "Bởi vì thành phố không thể tự mình đánh\ngiá xem nó 'Có ý nghĩa hay vô nghĩa',\nnên không còn cách nào khác ngoài việc từ\nchối tất cả mà không có ngoại lệ."

# 【双鉄】
# display as 雙鐵
# JP: 「市は、市民に対して平等でなければならん。\nそして全ての告知に協力すれば、それを悪用されかねん」
2174 = "「Thành phố phải bình đẳng với mọi người\ndân.\nVà nếu hỗ trợ mọi thông báo, thì có thể sẽ\nbị kẻ xấu lợi dụng.」"

# monologue
# JP: 告知を市が行った場合、\n『ＸＸ市が協力してくれた』という実績を与えてしまう。
3062 = "Trong trường hợp thành phố đứng ra thông\nbáo,\nsẽ tạo ra một thành tích là 'Thành phố XX\nđã hỗ trợ'."

# monologue
# JP: その実績は信頼となるゆえ、悪意あるものに扱われれば、\n詐欺的行為の担保とされてしまう危険も考えられる。
2795 = "Thành tích đó sẽ trở thành sự tín nhiệm,\nnên nếu bị kẻ có ác ý lợi dụng,\nthì có nguy cơ nó sẽ bị biến thành vật bảo\nđảm cho hành vi lừa đảo."

# 【みくろ】
# display as 美玖路
# JP: 「みくろ……そんなこと全然知らなくて。\nだから、いいことだから、手伝ってもらえるかなぁって」
2411 = "「Mikuro……hoàn toàn không biết chuyện đó.\nNên mới nghĩ, vì đây là việc tốt, chắc sẽ\nđược giúp đỡ thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「最初は誰でもそんなものだ。\nひとつひとつ覚えていけば、それでいい」
2108 = "「Ban đầu ai cũng vậy thôi.\nCứ học hỏi từng chút một là được.」"

# 【みくろ】
# display as 美玖路
# JP: 「はい」
# 2132 = "「好的」" 

# monologue
# JP: というか僕らも、今回はまるで手がまわらずに、\nレイルロオドのみくろに任せっぱなしにしてしまっていた。
3099 = "Mà nói đúng hơn thì, lần này chúng tôi\ncũng hoàn toàn không xoay xở kịp,\nnên đã phó mặc hết cho Railord Mikuro."

# monologue
# JP: 知識を共有していれば容易にふせげた事態ゆえ、\n日々姫が描いている間に、今からでも補完しておきたい。
2794 = "Vì đây là tình huống có thể dễ dàng phòng\ntránh nếu chia sẻ kiến thức,\nnên tôi muốn bổ sung ngay bây giờ trong\nlúc Hibiki đang vẽ."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫と僕が安心したのは『告知が為されてなかった』\nからだ。その方が、状況はよほどマシだろうからな」
2282 = "「Lý do Hibiki và tôi yên tâm là vì 'chưa\ncó thông báo nào được đưa ra'.\nBởi vì như thế thì tình hình vẫn còn khá\nhơn nhiều.」"

# 【みくろ】
# display as 美玖路
# JP: 「告知がダメだったから――\nあ！　そっか、告知してても全然人がきてくれないなら」
2155 = "「Vì thông báo không hiệu quả——\nA! Ra vậy, nếu đã thông báo mà vẫn không\ncó ai đến thì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう。このD51 1031は完全に、『見たくも無いもの』と\n地元の方に捉えられてしまっている可能性がある。が」
2351 = "「Đúng vậy. Có khả năng chiếc D51 1031 này\nđã hoàn toàn\nbị người dân địa phương coi là 'thứ không\nmuốn nhìn thấy'. Nhưng mà.」"

# 【日々姫】
# display as 日日姬
# JP: 「描けたーー！！」
2387 = "「Vẽ xong rồi!!」"

# 【みくろ】
# display as 美玖路
# JP: 「わ！　見たいです、見せてください」
1975 = "「Oa! Mikuro muốn xem, cho Mikuro xem với.」"

# 【日々姫】
# display as 日日姬
# JP: 「大急ぎやけん、荒いけど」
2093 = "「Vì vội quá nên hơi nháp chút xíu nha.」"

# 【みくろ】
# display as 美玖路
# JP: 「わぁあ」
1969 = "「Oa aa.」"

# monologue
# JP: 簡素な線で描かれたD51 1031と、\n並んでそれを磨くひとたち。
2710 = "Chiếc D51 1031 được vẽ bằng những nét đơn\ngiản,\nvà những người đang đứng xếp hàng đánh\nbóng nó."

# 【みくろ】
# display as 美玖路
# JP: 「かわいい！　やっぱりすごいですねぇ」
2128 = "「Dễ thương quá! Quả nhiên là giỏi thật\nđấy.」"

# monologue
# JP: みくろの言葉に強く頷く。\n『D51 1031　只今、ボランティア清掃中です。』
2884 = "Tôi gật đầu mạnh mẽ trước lời của Mikuro.\n'D51 1031 Hiện đang được tình nguyện viên\ndọn dẹp.'"

# monologue
# JP: 一番大きなキャッチコピーは、\n絵を邪魔せずに、よく目立っている。
2968 = "Khẩu hiệu quảng cáo lớn nhất,\nkhông hề che khuất bức tranh mà lại rất\nnổi bật."

# 【双鉄】
# display as 雙鐵
# JP: 「これは拡大コピーして、\n作業する近くに貼っておくのだな？」
2329 = "「Cái này sẽ được phóng to ra,\nvà dán ở gần chỗ làm việc đúng không?」"

# 【日々姫】
# display as 日日姬
# JP: 「そ！　あとは等倍でコピーしてビラにして、\n『ご自由におとりください』ってしてもいいと思う」
2163 = "「Đúng rồi! Còn lại thì photo nguyên bản\nlàm tờ rơi,\nđể dòng chữ 'Xin cứ lấy tự nhiên' cũng\nđược.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1930 = "「Ra là vậy.」"

# monologue
# JP: +どなたでもご参加いただけます。\n（とても簡単な作業です。軍手も貸出いたします）
32 = "+Bất cứ ai cũng có thể tham gia.\n(Công việc rất đơn giản. Chúng tôi cũng\ncho mượn găng tay lao động)"

# monologue
# JP: +お気軽にお声かけください。\n――添え書きされた注記を見、みくろが大きくひとつ頷く。
34 = "+Xin đừng ngại lên tiếng.\n——Nhìn thấy phần ghi chú được viết thêm,\nMikuro gật đầu thật mạnh."

# 【みくろ】
# display as 美玖路
# JP: 「そっか！　清掃に参加したいっていう人がもしいたら、\nその人が参加しやすくするためのポスターなんですね」
2302 = "「Ra vậy! Nếu có ai đó muốn tham gia dọn\ndẹp,\nthì tấm áp phích này sẽ giúp họ dễ dàng\ntham gia hơn nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「そ！　あるとないとじゃ、大違いだって思うから」
2162 = "「Đúng rồi! Có hay không khác nhau một trời\nmột vực luôn đó.」"

# 【みくろ】
# display as 美玖路
# JP: 「みくろもそう思います！\nだからこれ――いますぐコピーして来ます！」
2415 = "「Mikuro cũng nghĩ vậy!\nNên cái này——Mikuro sẽ đi photo ngay bây\ngiờ!」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、わたしもいく。にぃには荷物見てて！」
2045 = "「A, em cũng đi. Anh hai trông đồ nhé!」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
# 2226 = "「我知道了」" 

# monologue
# JP: 残念ながらこの公園は、メインストリートとは一本違いだ。\n観光客が通りすがってくる可能性は低い。
3120 = "Đáng tiếc là công viên này nằm cách con\nphố chính một con đường.\nKhả năng khách du lịch đi ngang qua đây là\nrất thấp."

# monologue
# JP: ポスターを掲出する側のメリットも少なかろうが、\nそれでも日々姫と、日々姫の絵とであるのなら――
2801 = "Việc dán áp phích ở đây chắc cũng chẳng\nmang lại lợi ích gì nhiều,\nnhưng nếu là Hibiki và bức tranh của con\nbé thì——"

# 【日々姫】
# display as 日日姬
# JP: 「おまたせ！　大通り沿いのお店もいくつか、\nポスター貼らせて、ビラおかせてくれた！」
1869 = "「Để anh đợi lâu! Có vài cửa hàng dọc theo\ncon phố lớn\nđã cho phép dán áp phích và đặt tờ rơi\nrồi!」"

# 【みくろ】
# display as 美玖路
# JP: 「日々姫さん、おねがい上手ですごいです。\nみんなにこにこ、喜んで貼らせてくれて」
2284 = "「Chị Hibiki nhờ vả giỏi quá đi mất.\nMọi người đều cười tươi và vui vẻ cho dán\nluôn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2300 = "「是啊」" 

# monologue
# JP: 日々姫が僕を置いていった理由がわかった。\n日々姫とみくろ、ともにルックスは抜群だ。
2882 = "Tôi đã hiểu lý do Hibiki để tôi lại đây.\nCả Hibiki và Mikuro đều có ngoại hình xuất\nchúng."

# monologue
# JP: そのふたりが並び、この完成度のポスターとビラ――\n断わる理由を見つける方が、むつかしかろう。
2751 = "Hai người họ đi cùng nhau, cộng thêm tấm\náp phích và tờ rơi có độ hoàn thiện cao\nthế này——\nViệc tìm ra lý do để từ chối e là còn khó\nhơn."

# 【双鉄】
# display as 雙鐵
# JP: 「では、今度こそはじめよう。\nとはいえ僕らも、ここまで傷んだものの清掃は初めてだ」
2543 = "「Vậy thì, lần này chúng ta bắt đầu thật\nthôi.\nMặc dù vậy, đây cũng là lần đầu tiên chúng\ntôi dọn dẹp một thứ hư hỏng đến mức này.」"

# 【みくろ】
# display as 美玖路
# JP: 「どっちにしても、整備の許可はもらえてないですから。\nまずは、ごくあたりまえの掃除からやっていきましょう」
1940 = "「Dù sao thì chúng ta cũng chưa được cấp\nphép bảo dưỡng mà.\nTrước tiên, cứ bắt đầu bằng việc dọn dẹp\ncơ bản đã.」"

# 【双鉄】
# display as 雙鐵
# JP: 「では僕は、掃き掃除からはじめよう。\n日々姫は、煙室戸の中を頼めるか？」
2530 = "「Vậy tôi sẽ bắt đầu bằng việc quét dọn.\nHibiki, bên trong cửa buồng khói nhờ em\nđược không?」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！　にぃに、あったまいい！！」
2034 = "「A! Anh hai, thông minh quá!!」"

# monologue
# JP: 言うと同時に日々姫は慣れた足取りでハシゴにとりつき、\nランボードから、煙室戸前へとたどりつく。
3095 = "Vừa nói dứt lời, Hibiki đã trèo lên thang\nbằng những bước chân quen thuộc,\ntừ bệ bước chân hành lang tiến đến trước\ncửa buồng khói."

# 【日々姫】
# display as 日日姬
# JP: 「開く……かな――ハンドルばきっ、とか\nいっちゃったらどうしよう」
2449 = "「Không biết……có mở được không đây——lỡ tay\nnắm\nmà gãy cái rắc thì làm sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「渋いようなら、回りからオイルを浸透させよう。\nともかく、無理をして破損させることだけは避けてくれ」
2147 = "「Nếu thấy rít thì nhỏ dầu xung quanh cho\nthấm vào.\nTóm lại, hãy tránh việc cố quá làm hỏng\nnó.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん、怖いようだったら、にぃにに変わってもらう\n――っと！」
2073 = "「Vâng, nếu thấy sợ thì em sẽ nhờ anh hai\nthay\n——hự!」"

# monologue
# JP: （ぐっ――ぐ――ぐるっ――）
3155 = "(Cạch——cạch——két——)"

# 【日々姫】
# display as 日日姬
