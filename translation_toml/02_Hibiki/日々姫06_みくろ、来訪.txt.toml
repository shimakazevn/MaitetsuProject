2877 = "Tôi ghé mũi lại gần Hibiki vừa mới tắm\nxong."

# 【日々姫】
# display as 日日姬
# JP: 「（ちゅっ！）」
2571 = "「（Chụt!）」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
2035 = "「っ!!」"

# 【日々姫】
# display as 日日姬
# JP: 「えへへ～。今日のご褒美、もらっちゃった」
2080 = "「He he~. Nhận được phần thưởng của ngày\nhôm nay rồi nha.」"

# 【双鉄】
