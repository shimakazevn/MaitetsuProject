1943 = "「Chú ơi, cọ xong chỗ này rồi,\ncháu tiếp tục làm chỗ khác có được không\nạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「よかっちゃだ。が、\n移動のときには、十分に気をつけるようにな」
1947 = "「Được chứ. Nhưng mà,\nkhi di chuyển nhớ cẩn thận nhé.」"

# 【サッカー少年Ｃ】
# display as 踢足球的小孩Ｃ
# JP: 「はーい」
# 2124 = "「好」" 

# 【観光の老夫人】
