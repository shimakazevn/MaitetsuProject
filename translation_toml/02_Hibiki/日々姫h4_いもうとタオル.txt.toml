[script]
# lines: 321 
# 【双鉄H】
# display as 雙鐵
# JP: 「[すす]煤けたなぁ」
1104 = "「Dính đầy nhọ nồi rồi nhỉ」"
# 【日々姫】
# display as 日日姬
# JP: 「ううう～っ……ごめんね、にぃに」
1025 = "「Ư ư ư~……Em xin lỗi nhé, anh hai」"
# monologue
# JP: （ちゃぽんっ）
1793 = "（Tùm）"
# monologue
# JP: 力無く、日々姫が視線を落としてしまう。\nその先、すなわち湯船の底には、真っ黒なスス。
1530 = "Hibiki rũ rượi, ánh mắt buồn bã nhìn xuống. Ở đó, tức là dưới đáy bồn tắm, đọng lại một lớp nhọ nồi đen sì."
# 【日々姫】
# display as 日日姬
# JP: 「あぅぅ～お風呂まで汚しちゃってぇ」
1026 = "「Auu~ Làm bẩn cả bồn tắm mất rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「掃除をするのはどのみち僕らだ。\n磨きに磨いて返せばいいさ」
957 = "「Dù sao thì người dọn dẹp cũng là chúng ta mà. Chỉ cần cọ rửa thật sạch rồi trả lại là được」"
# monologue
# JP: 登呂流湯のご主人は、最近は夜が早くなったということで、\n僕らの乗務後入浴を、締めまで待ってはくれなくなった。
1602 = "Chủ nhân của nhà tắm Tororyu-yu dạo này nghỉ sớm, nên không còn đợi chúng tôi tắm xong sau ca trực để đóng cửa nữa."
# monologue
# JP: 清掃して締めて翌朝に鍵を返して――\n慣れればそれは、非常に気楽な貸し切り入浴方法だ。
1425 = "Dọn dẹp, khóa cửa rồi sáng hôm sau trả chìa khóa―― Khi đã quen thì đây quả là một cách tắm bao trọn gói cực kỳ thoải mái."
# 【日々姫】
# display as 日日姬
# JP: 「それはもちろん、がんばってピカピカに掃除ばするけど。\nでも……あああ、投げ込みすぎとか素人みたいに～」
949 = "「Tất nhiên là em sẽ cố gắng dọn dẹp cho sáng bóng rồi. Nhưng mà……Aaa, xúc than vào nhiều quá, cứ như dân nghiệp dư ấy~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「集中審議の関係で、少し[ま]間が空いてしまったからな。\nいくらか、勘が狂ったのだろう」
1068 = "「Do bận phiên họp thẩm định tập trung nên cũng cách một khoảng thời gian rồi mà. Chắc là cảm giác bị lệch đi một chút thôi」"
# monologue
# JP: 市長職と機関助士と、もちろん絵描きと。
1397 = "Chức thị trưởng, phụ lái tàu, và tất nhiên là cả việc vẽ tranh nữa."
# monologue
# JP: 周囲の多大な助けもあり、日々姫は自分のペースを作り、\n上手にこなしていたのだが……
1686 = "Nhờ sự giúp đỡ to lớn từ mọi người xung quanh, Hibiki đã tạo được nhịp độ cho riêng mình, và xử lý mọi việc rất tốt, nhưng mà……"
# 【日々姫】
# display as 日日姬
# JP: 「[ま]間が空いたのもあるし。\nあと……いいとこ見せようとして、張り切りすぎたかも」
1140 = "「Cũng có phần là do lâu không làm. Với lại……có lẽ do em muốn thể hiện cho anh thấy nên đã hơi quá sức」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いいところを？」
1082 = "「Thể hiện cho anh thấy?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。こないだにぃに、褒めとったでしょお。\n凪ちゃんのこと、めきめき腕を上げてきた――って」
1049 = "「Vâng. Lần trước anh hai có khen Nagi mà. Bảo là con bé tiến bộ lên trông thấy――đó」"
# monologue
# JP: ライバル心――というよりは、\nもっと単純な独占欲と嫉妬だろう。
1637 = "Thay vì gọi là lòng ganh đua―― thì có lẽ đúng hơn là sự ghen tị và tính chiếm hữu đơn thuần."
# monologue
# JP: そこまで想ってもらえることに、\n男としては、嬉しい気持ちを感じはするが――
1364 = "Được em ấy nghĩ đến mức đó, là một thằng đàn ông, tôi cảm thấy rất vui nhưng――"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば気持ちが、少し良くない形で出てしまったな。\n乗務は常に安全第一――技量を張り合うものではない」
1162 = "「Nếu vậy thì cảm xúc của em đã bộc lộ ra theo cách không được tốt cho lắm rồi. Trực lái luôn đặt an toàn lên hàng đầu――không phải là nơi để thi thố tài năng đâu」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。ごめんなさい。反省してる」
1047 = "「Vâng. Em xin lỗi. Em đang kiểm điểm lại bản thân đây」"
# 【双鉄H】
# display as 雙鐵
# JP: 「それに、だ」
1158 = "「Hơn nữa, là thế này」"
# monologue
# JP: （くいっ）
1780 = "（Ôm lấy）"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
1017 = "「A」"
# monologue
# JP: うなだれてしまった日々姫の頭を抱き寄せる。\n顎を持ち上げ、目近で視線を交わし合う。
1609 = "Tôi ôm đầu Hibiki đang ủ rũ sát vào người. Nâng cằm em ấy lên, nhìn thẳng vào mắt nhau ở khoảng cách gần."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫は、僕にとってはいつでも一番の機関助士だ。\n一緒に乗務をしていて楽しい――という点においては」
1083 = "「Đối với anh, Hibiki lúc nào cũng là người phụ lái số một. Xét về mặt mang lại niềm vui khi cùng nhau trực lái――」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに」
1170 = "「Anh hai」"
# monologue
# JP: 素直な気持ちが、まっすぐ伝わってくれたのだろう。
1524 = "Chắc hẳn những cảm xúc chân thành của tôi đã được truyền đạt trọn vẹn."
# monologue
# JP: 日々姫は嬉しげに微笑んで、\nそして静かに、瞳を閉じる。
1382 = "Hibiki mỉm cười rạng rỡ,\nrồi lặng lẽ nhắm đôi mắt lại."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫」
1122 = "「Hibiki」"
# monologue
# JP: 答えの代わり、甘い息を吐く可憐な唇にキスをする。
1450 = "Thay cho câu trả lời, tôi đặt một nụ hôn lên đôi môi đáng yêu đang phả ra hơi thở ngọt ngào."
# 【日々姫】
# display as 日日姬
# JP: 「ん……ちゅっ――ちゅっ――ちゅむっ――――れるっ」
1038 = "「Ưm……chụt――chụt――chùn chụt――――liếm」"
# monologue
# JP: 唇だけでついばみあって、\n吐息が熱くなったところに、日々姫の舌が割り込んでくる。
1421 = "Chúng tôi nhấm nháp đôi môi của nhau, đến khi hơi thở dần trở nên nóng bỏng, chiếc lưỡi của Hibiki liền len lỏi vào."
# 【日々姫】
# display as 日日姬
# JP: 「ちゅうっ――んっ――れるっ――じゅるっ――――\n（じゃりっ！）　っ！！？」
1024 = "「Chụt――ưm――liếm――chùn chụt――――\n（Rắc!） !!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「むっ！」
977 = "「Ưm!」"
# monologue
# JP: 歯の裏側を優しくやらしく這ってた舌が、\nそこから何か――硬質なものを掻きだして来る。
1376 = "Chiếc lưỡi vốn đang trườn bò đầy dịu dàng và gợi tình ở mặt trong răng tôi, bỗng móc ra một thứ gì đó――cưng cứng từ chỗ ấy."
# 【日々姫】
# display as 日日姬
# JP: 「んぺっ！　んえっ、あっ――やだ――\nにぃにのお口の中にまでススのかたまりっ」
984 = "「Phụt! Oẹ, a――Ghét ghê―― Trong miệng anh hai cũng có cả cục nhọ nồi này」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……湯に浸かる前、髪も体も口も目も。\n徹底的に洗ったつもりだったのだがなぁ」
788 = "「……Trước khi ngâm mình, tóc, cơ thể, miệng, mắt. Anh cứ nghĩ là đã rửa sạch sẽ triệt để rồi cơ đấy」"
# monologue
# JP: しかし実際、“つもり”の力不足なら、\n湯船に沈む真っ黒なススが既にして証明している。
1591 = "Tuy nhiên thực tế, lớp nhọ nồi đen sì chìm dưới đáy bồn tắm đã chứng minh cho sự thiếu sót của cái gọi là \"cứ nghĩ là\" đó."
# monologue
# JP: とはいえ、まさか口内にまで\nススの侵入を許していたとは――
1592 = "Dẫu vậy, không ngờ nhọ nồi lại xâm nhập vào tận trong miệng thế này――"
# monologue
# JP: （ざばあっ！）
1755 = "（Rào!）"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　洗おう、もういっぺんっ！」
1171 = "「Anh hai! Rửa lại đi, thêm một lần nữa!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
1050 = "「Ừm」"
# 【日々姫】
# display as 日日姬
# JP: 「じゃ、はいっ！　ごろーんって」
1062 = "「Vậy thì, đây! Nằm ườn ra nào」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ！　ごろーんっ――ごろーんっ？」
1059 = "「Ừm! Nằm ườn――nằm ườn sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「よくできました！」
1078 = "「Làm tốt lắm!」"
# monologue
# JP: （ぷりゅんっ！）
1746 = "（Bịch!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1182 = "「!」"
# monologue
# JP: 僕を仰向けに寝転がらせて、\n日々姫は自分の体をその上に乗せてくる。
1551 = "Sau khi bắt tôi nằm ngửa ra, Hibiki liền cưỡi hẳn lên người tôi."
# monologue
# JP: （とろぉ……ろ――）
1756 = "（Chảy xuống——）"
# monologue
# JP: そして勃起に、ボディーソープがかけられる。
1587 = "Và rồi, em ấy đổ sữa tắm lên dương vật đang cương cứng của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ん～～――――ンム～っ」
1065 = "「Ưm~~――――Ưm~」"
# monologue
# JP: （ねとおおおっ）
1747 = "（Nhớt nháp）"
# monologue
# JP: その上に、唾液をたっぷり垂らしまぶして――
1349 = "Trên lớp sữa tắm đó, em ấy nhỏ thêm thật nhiều nước bọt lên――"
# 【日々姫】
# display as 日日姬
# JP: 「いもうとタオルも、\nきっとにぃにの一番になれると思うけん」
1097 = "「Khăn tắm em gái này, chắc chắn cũng sẽ trở thành số một của anh hai cho xem」"
# monologue
# JP: （にゅるううううっ！）
1788 = "（Trượt dài!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「――っ！」
# 1182 = "「！」" 
# monologue
# JP: 背筋にぞくぞく来る快感。
1405 = "Khoái cảm chạy dọc sống lưng khiến tôi rùng mình."
# monologue
# JP: 日々姫の体はあわあわ滑り、\n滑りながらもしっとり張り付き摩擦してくる。
1548 = "Cơ thể Hibiki trượt đi trên lớp bọt xà phòng, vừa trượt vừa dính chặt và cọ xát vào người tôi."
# monologue
# JP: （しにゅっ――ずるうううっ――しゅるぅっ――）
1768 = "（Trơn tuột——Trượt dài——Trơn láng——）"
# 【日々姫】
# display as 日日姬
# JP: 「あ……これ……ん……タオルな……私、も……\n気持ち……い……んっ――ふっ――」
1014 = "「A……Cái này……ưm……Khăn tắm là……em, cũng…… Sướng……quá……ưm――phù――」"
# monologue
# JP: ぽかぽかと、日々姫曰くの、\nいもうとタオルが温まってくる。
1525 = "Hơi ấm tỏa ra từ chiếc khăn tắm em gái, đúng như lời Hibiki nói, ngày càng ấm dần lên."
# monologue
# JP: あっという間に導きだされた先走り汁が、\nかすかな胸の谷間に挟まれ、泡と唾液と交じり合う。
1648 = "Dịch nhờn tiết ra trong nháy mắt, bị kẹp giữa khe ngực nông của em ấy, hòa quyện cùng bọt xà phòng và nước bọt."
# 【日々姫】
# display as 日日姬
# JP: 「ん……ふっ――あっ――んっ……ん……\nどぉお？　にぃにも……気持ち……いい？」
1034 = "「Ưm……phù――a――ưm……ưm…… Sao hả? Anh hai cũng……sướng……chứ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1050 = "「嗯」" 
# monologue
# JP: この体勢で射精をもしもしてしまうなら、\n自分の顔に精液を受けることとなりかねない。
1599 = "Nếu xuất tinh trong tư thế này, rất có thể tinh dịch sẽ bắn thẳng vào mặt tôi mất."
# monologue
# JP: そう理解しても射精衝動に負けそうな程、日々姫のタオル、\nいもうとタオルは僕を絶妙にコスって包む。
1595 = "Dù biết vậy nhưng tôi vẫn gần như gục ngã trước xung động xuất tinh, chiếc khăn tắm Hibiki, chiếc khăn tắm em gái này đang cọ xát và bao bọc lấy tôi một cách quá đỗi tuyệt vời."
# 【日々姫】
# display as 日日姬
# JP: 「ね？　にぃに――んっ……聞かせ、て？　にぃにの――\n声で――あっ――どんな、風に――気持ち、いい、のか」
1163 = "「Nè? Anh hai――ưm……Cho em nghe, đi? Bằng giọng―― của anh hai――a――sướng, như thế, nào――」"
# monologue
# JP: 言わされるのか――そんな戸惑いを感じるけれど、\n日々姫の望むことならば、もちろん叶えてやるだけだ。
1675 = "Bắt tôi phải nói ra sao――Tuy có chút bối rối, nhưng nếu đó là điều Hibiki muốn, tất nhiên tôi sẽ chiều theo ý em ấy."
# 【双鉄H】
# display as 雙鐵
# JP: 「泡と……肌とが、絶妙にすべり、摩擦して、んっ……\n日々姫の胸――の、谷間の骨が……こりこり、してて」
1135 = "「Bọt xà phòng và……làn da, trượt đi và cọ xát vào nhau một cách tuyệt diệu, ưm…… Phần xương giữa khe ngực――của Hibiki……cưng cứng, chạm vào」"
# 【日々姫】
# display as 日日姬
# JP: 「骨っ！？」
1181 = "「Xương á!?」"
# monologue
# JP: 日々姫がぴたりと止まってしまう。\n頬もぷっくり、可愛く膨れる。
1559 = "Hibiki khựng lại ngay lập tức. Hai má phồng lên, trông hờn dỗi thật đáng yêu."
# 【日々姫】
# display as 日日姬
# JP: 「骨って、骨ば気持ちよくなかとでしょーよ？\nぷりぷりおっぱいに挟まれて、それが最高とかでしょお」
951 = "「Xương là sao, chạm vào xương thì làm sao mà sướng được chứ? Phải là bị kẹp giữa bộ ngực mềm mại, thế mới là tuyệt nhất chứ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「おっぱい。挟まれて」
1150 = "「Ngực. Bị kẹp giữa」"
# monologue
# JP: 自分の漏らした呟きを、\n検索ワードのようだと感じる。
1439 = "Tôi cảm thấy lời lẩm bẩm vừa thốt ra của mình, nghe cứ như một từ khóa tìm kiếm vậy."
# monologue
# JP: そう感じざるを得ないほど――ほんの一瞬だけれども、\n行為と言葉が直結してはくれてなかった。
1598 = "Chỉ là trong một khoảnh khắc ngắn ngủi――nhưng tôi không thể không cảm thấy như vậy, hành động và lời nói không hề ăn nhập với nhau."
# 【日々姫】
# display as 日日姬
# JP: 「ど、どぎゃんしてオウムがえしばしよっと！？」
943 = "「S-Sao anh lại nhại lại lời em thế hả!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、いや――」
981 = "「À, không――」"
# monologue
# JP: 言われて見れば、僕の胸板をこしゅこしゅと、\n日々姫の乳首は硬さをもってコスってくれてた。
1621 = "Nhắc mới nhớ, hai núm vú cứng cáp của Hibiki vẫn đang cọ xát nhè nhẹ vào vòm ngực tôi."
# monologue
# JP: だが、おっぱいと言われても……\n日々姫の胸には、挟めるほどのボリュームがない。
1291 = "Nhưng mà, bảo là ngực thì…… Ngực của Hibiki làm gì có đủ kích cỡ để mà kẹp chứ."
# 【双鉄H】
# display as 雙鐵
# JP: 「挟む、というなら――」
1151 = "「Nếu gọi là kẹp thì――」"
# monologue
# JP: （むにいいいっ）
1781 = "（Bóp nhẹ）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃんっ！？」
965 = "「Hyan!?」"
# monologue
# JP: 触れて触れてと勃起し震える、\n日々姫の乳首をそうっとつまむ。
1539 = "Tôi nhẹ nhàng véo lấy núm vú đang cương cứng và run rẩy, như thể đang đòi hỏi được chạm vào của Hibiki."
# monologue
# JP: つまんだままにいくらか引っ張り、\n控えめすぎるおっぱいに仮初めのボリュームを与えてみる。
1447 = "Vừa véo tôi vừa kéo nhẹ ra một chút, thử tạo thêm chút kích cỡ giả tạo cho bộ ngực quá đỗi khiêm tốn này."
# 【双鉄H】
# display as 雙鐵
# JP: 「この位には大きくないと、\nいささかの無理が[しょう]生じんか？」
1148 = "「Ít nhất cũng phải to cỡ này, chứ không thì chẳng phải là hơi quá sức sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「いっ、いささかの無理も[しょう]生じんもんっ！」
1098 = "「K-Không hề quá sức một chút nào luôn!」"
# monologue
# JP: （きゅううっ）
1773 = "（Kẹp chặt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1182 = "「！」" 
# monologue
# JP: 腕の力を強くして、日々姫が無理やり、\n僕の勃起をおっぱいで……
1558 = "Hibiki dồn sức vào hai cánh tay, cố tình dùng ngực kẹp lấy dương vật cương cứng của tôi……"
# monologue
# JP: まぁ、これならば“挟んでいる”と言えなくもない\n密着度合いで、左右から圧し刺激してくる。
1341 = "Chà, nếu thế này thì với mức độ bám sát này, cũng không thể không gọi là \"đang kẹp\" được, em ấy đang ép chặt và kích thích từ hai bên."
# monologue
# JP: （しにゅっ――しゅっ――もみゅっ――きゅむっ）
1787 = "（Trơn láng——Trượt——Mềm mại——Khít khao）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ」
# 1050 = "「嗯」" 
# monologue
# JP: そうして、動く。
1586 = "Và rồi, em ấy bắt đầu di chuyển."
# monologue
# JP: さっきのように単調な前後運動だけでなく、\n挟む強さやこする角度を、細かく変化させながら。
1670 = "Không chỉ là những chuyển động tới lui đơn điệu như lúc nãy, mà em ấy còn tinh tế thay đổi lực kẹp và góc độ cọ xát."
# monologue
# JP: （こしゅっ――むにゅっ――しゅにゅっ――こりゅっ）
# 1787 = "（搓動套弄）" 
# 【日々姫】
# display as 日日姬
# JP: 「ん……どう……かな？　にぃに――\nわたし――おっぱいで、ちゃんと――出来、てる？」
1043 = "「Ưm……sao……nào? Anh hai―― Em――dùng ngực, làm――tốt, chứ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……そうだな……さっきよりも――っ――\nもう一段階……気持ち、いい」
1045 = "「Ừ……đúng rồi……So với lúc nãy―― Lại tăng thêm một bậc……sướng, lắm」"
# 【日々姫】
# display as 日日姬
# JP: 「よかった！　なら、もっと頑張るけん」
1073 = "「May quá! Vậy thì, em sẽ cố gắng hơn nữa」"
# monologue
# JP: （むにっ――みゅにゅっ――しゅっ――むにゅん）
# 1787 = "（搓動套弄）" 
# monologue
# JP: 日々姫の動きにさらなる熱と速度が加わる。
1540 = "Chuyển động của Hibiki càng lúc càng nhanh và cuồng nhiệt hơn."
# monologue
# JP: 額からぽたりこぼれる汗も、\n潤滑油となり刺激となって、僕の快感を強めてくれる。
1403 = "Những giọt mồ hôi rỏ xuống từ trán em ấy, cũng trở thành chất bôi trơn và kích thích, làm tăng thêm khoái cảm cho tôi."
# 【双鉄H】
# display as 雙鐵
# JP: （……が）
1694 = "（……Nhưng mà）"
# monologue
# JP: 行き当たる部分が存在しない。\n熱がこもればこもる程、それがどうにも焦れったくなる。
1623 = "Không có điểm chạm đến cuối cùng. Càng hưng phấn, điều đó lại càng khiến tôi cảm thấy bức bối khó chịu."
# monologue
# JP: （しゅるっ――むにゅっ――こりゅっ――こしゅんっ）
# 1787 = "（搓動套弄）" 
# 【日々姫】
# display as 日日姬
# JP: 「ん……ふぁ――乳首……いい――ふ、ぁっ」
1032 = "「Ưm……phù――Núm vú……sướng quá――phù, a」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
1027 = "「Ừ――」"
# monologue
# JP: 気持ちよさそうに開いた口からちらちら覗く真っ赤な舌が、\n僕に答えを、与えてくれる。
1607 = "Chiếc lưỡi đỏ chót lấp ló qua khuôn miệng đang hé mở đầy sung sướng, đã mang đến cho tôi câu trả lời."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫、このまま――挟んだままで、\n口でも……してはもらえんか？」
1124 = "「Hibiki, cứ thế này――cứ kẹp như thế, em dùng cả miệng……làm cho anh được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
1057 = "「Vâng!」"
# monologue
# JP: 嬉しげな日々姫の声と同時に、\n手桶で掬った湯でボディーソープを流してしまう。
1532 = "Cùng với giọng nói vui vẻ của Hibiki, tôi dùng gáo múc nước nóng dội sạch lớp sữa tắm."
# 【日々姫】
# display as 日日姬
# JP: 「きれいにしても、すぐにとろとろになっちゃうとねぇ。\n仕方なかおちんちんばい」
1080 = "「Dù có rửa sạch thì cũng sẽ ướt nhẹp lại ngay thôi mà. Đúng là cậu nhóc hết cách chữa rồi」"
# monologue
# JP: くすりと笑って、先走りにまみれる僕の勃起の先端に――
1553 = "Cười khúc khích, em ấy đưa phần đầu dương vật đang rỉ dịch của tôi――"
# 【日々姫】
# display as 日日姬
# JP: 「ん……むっ――んぇっ――」
1035 = "「Ưm……ưm――ưm――」"
# monologue
# JP: （てろおっ）
1750 = "（Liếm láp）"
# monologue
# JP: 日々姫はまたも唾液をまぶし、\nそして唾液の垂れたラインをなぞるようにして唇が――
1513 = "Hibiki lại thoa nước bọt lên, rồi lướt đôi môi dọc theo đường nước bọt vừa rỏ xuống――"
# 【日々姫】
# display as 日日姬
# JP: 「ちゅっ――ちゅっ――ちゅむっ――ぺろっ」
1022 = "「Chụt――chụt――chùn chụt――liếm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁあ――」
1005 = "「A――」"
# monologue
# JP: 日々姫の口の熱さと舌の動きとが、\n物足りなかった胸の刺激を、ゆるゆると補填してくれる。
1521 = "Sức nóng từ khoang miệng và chuyển động lưỡi của Hibiki, từ từ bù đắp cho sự thiếu hụt kích thích từ bộ ngực."
# 【日々姫】
# display as 日日姬
# JP: 「くぽっ」
997 = "「Kupo」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1182 = "「！」" 
# monologue
# JP: 先端全部を、日々姫の口が迎えてくれる。\n舌がぺっとり張り付いて、にゅるにゅる蠢き汁を舐めとる。
1528 = "Miệng Hibiki đón trọn toàn bộ phần quy đầu. Lưỡi em ấy dán chặt lấy, uốn lượn mơn trớn và liếm sạch những giọt mật dịch."
# 【日々姫】
# display as 日日姬
# JP: 「はっ――むっ――んっ――ちゅっ――ちゅううっ！\nずぞおおおおおおっっっ！！！」
987 = "「Hà――ưm――ưm――chụt――chùn chụt!\nZuzooooooo!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
1020 = "「Ưm!」"
# monologue
# JP: ほっぺたが凹むほどに強い吸引と――
1359 = "Sức hút mạnh mẽ đến mức hai má em ấy lõm cả vào――"
# monologue
# JP: （むにいいいっ）
1774 = "（Kẹp chặt）"
# monologue
# JP: 同時に竿の左右から、\n押し付けられる胸の柔肉の圧力がくる。
1334 = "Đồng thời từ hai bên thân dương vật, áp lực từ những phần thịt mềm mại của bầu ngực ép chặt lấy."
# monologue
# JP: 気持ちよくって射精したくて、\n背筋がピンと伸びきって、お尻の穴も勝手に締まる。
1468 = "Sướng đến mức muốn xuất tinh ngay lập tức, cơ lưng tôi căng cứng, và lỗ hậu môn cũng tự động siết lại."
# 【日々姫】
# display as 日日姬
# JP: 「んふふっ――れろおおおっ」
1052 = "「Ưm fufu――liếm láp」"
# monologue
# JP: このまま吸われ続けたら――\n思った矢先に唇の力はゆるんでしまう。
1650 = "Cứ tiếp tục bị mút thế này thì―― Ngay khi tôi vừa nghĩ vậy, lực hút từ đôi môi em ấy liền nới lỏng ra."
# monologue
# JP: 吸い疲れたといわんばかりに、口の力は弱くなり、\nそれでも舌はてろてろと、一心に先をねぶりつづける。
1363 = "Lực mút ở miệng yếu đi như thể em ấy đã mút đến mỏi cả miệng, nhưng chiếc lưỡi thì vẫn uốn lượn, một lòng một dạ liếm láp phần đầu dương vật."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫……」
1121 = "「Hibiki……」"
# monologue
# JP: 可愛い。と。\n素直に思えば、腕が動く。
1377 = "Đáng yêu quá. Và rồi, nghĩ một cách tự nhiên, cánh tay tôi bắt đầu cử động."
# monologue
# JP: 僕の勃起を咥えて包む、大人の女になった日々姫を、\n出会った頃にしたように、ゆっくりゆっくり撫でている。
1556 = "Hibiki, người phụ nữ trưởng thành đang ngậm lấy dương vật cương cứng của tôi, tôi chậm rãi, chậm rãi vuốt ve em ấy, hệt như cái thuở chúng tôi mới gặp nhau."
# 【日々姫】
# display as 日日姬
# JP: 「ん……」
1030 = "「Ưm……」"
# monologue
# JP: 嬉しげに、気持ちよさそうに目を細め、\n日々姫はそれでも、わずかも動きを止めはしない。
1557 = "Đôi mắt em ấy nheo lại đầy vẻ sung sướng và hạnh phúc, nhưng dù vậy, Hibiki vẫn không hề dừng lại chuyển động dù chỉ một chút."
# 【日々姫】
# display as 日日姬
# JP: 「はむっ――れろっ――ちゅっ、ちゅううっ――\nあむっ――んっ――じゅるっ――じゅううっ」
1004 = "「Ngoạm――liếm――chụt, chùn chụt―― Ngoạm――ưm――chụt――chùn chụt」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……あっ――」
1036 = "「Ưm……a――」"
# monologue
# JP: ゆったりと動く口唇は、僕の性感を高めつつ、\n焦った気持ちを抑えてくれる。
1357 = "Chuyển động nhịp nhàng của đôi môi em ấy, vừa làm tăng thêm khoái cảm cho tôi, vừa giúp xoa dịu đi cảm giác nôn nóng."
# monologue
# JP: （とくんっ――とくんっ――）
1789 = "（Thịch——Thịch——）"
# 【双鉄H】
# display as 雙鐵
# JP: （ああ……鼓動だ）
1751 = "（A……nhịp đập）"
# monologue
# JP: 舌の動きに連動し、押し付けられる日々姫のおっぱい。\nそこからゆるく伝わる鼓動に、じわり精液の水位が高まる。
1544 = "Đồng điệu với chuyển động của lưỡi là bộ ngực của Hibiki đang ép chặt lấy. Nhịp tim truyền đến khe khẽ từ nơi đó, khiến mức tinh dịch trong tôi dần dần dâng cao."
# 【日々姫】
# display as 日日姬
# JP: 「はむっ――ふっ――ちゅっ――ちゅむっ」
1002 = "「Ngoạm――phù――chụt――chùn chụt」"
# monologue
# JP: 乳をむさぼる赤子のように、日々姫の動きは一心不乱だ。\n膣や肛門と比べてしまえば、それでも刺激はやはり弱い。
1519 = "Giống như một đứa trẻ thèm khát bầu sữa mẹ, chuyển động của Hibiki vô cùng say sưa và tập trung. Tuy nhiên, nếu so với âm đạo hay hậu môn, thì sự kích thích này vẫn có phần yếu hơn."
# monologue
# JP: 胸のボリューム不足はやはりたたってしまい、\n口いっぱいに咥え込まれる――そのときほどの刺激も無い。
1274 = "Sự khiêm tốn về kích cỡ vòng một quả nhiên là một bất lợi, nó không mang lại kích thích mãnh liệt như khi bị ngậm trọn trong khoang miệng."
# 【日々姫】
# display as 日日姬
# JP: 「ん……ちゅうっ……ちゅっ――あむっっ――んっ――\nちゅき――にぃに……れるっ……ん……ふ……んくっ」
1040 = "「Ưm……chụt……chụt――ngoạm――ưm―― Yêu――anh hai……liếm……ưm……phù……ưm」"
# 【双鉄H】
# display as 雙鐵
# JP: （だ……が――これは――これで）
1742 = "（Nhưng……mà――Thế này――cũng có cái hay của nó）"
# monologue
# JP: 性器に対する刺激の強さ。\nそれだけが快感の源じゃないと教えてもらう。
1449 = "Cường độ kích thích lên cơ quan sinh dục. Tôi đã nhận ra rằng đó không phải là nguồn gốc duy nhất của khoái cảm."
# monologue
# JP: ゆるやかに高まる快感は、\n刺激以上の幸福なのだと――頭の後ろでちりちり感じる。
1438 = "Khoái cảm từ từ dâng trào, là một niềm hạnh phúc vượt lên trên cả sự kích thích――tôi cảm nhận được sự râm ran ở phía sau đầu."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々……姫…………イキそう――このまま――\nゆっくり――」
1117 = "「Hibi……ki…………Anh sắp ra rồi――Cứ thế này―― Từ từ thôi――」"
# 【日々姫】
# display as 日日姬
# JP: 「んっ――んー……ん、ふっ――あむっ――れろっ――\nちゅくっ――ちゅむっ――じゅうっ――ちゅぶっ」
1029 = "「Ưm――ưm……ưm, phù――ngoạm――liếm―― Chụt――chùn chụt――chụt――chụt」"
# monologue
# JP: ゆっくりと、ねっとりと。
1380 = "Chậm rãi, và ướt át."
# monologue
# JP: 愛を感じる丁寧すぎる舌の動きが、\nじわじわじわじわ、僕を射精へと近づけていく。
1309 = "Chuyển động lưỡi vô cùng tinh tế và ngập tràn tình yêu, từ từ, từ từ đưa tôi đến gần hơn với khoảnh khắc xuất tinh."
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――くっ」
1028 = "「Ưm――hự」"
# monologue
# JP: （ぶるっ）
1766 = "（Run rẩy）"
# 【日々姫】
# display as 日日姬
# JP: 「んぷっ――んっ――こくっ――んぐっ」
1056 = "「Ưm phụt――ưm――ực――ực」"
# monologue
# JP: 弾ける、ではなくにじみ出るような、スローな射精。
1671 = "Không phải là bắn ra mãnh liệt, mà là một lần xuất tinh chậm rãi, như thể rỉ ra từng chút một."
# monologue
# JP: どくんどくんと震える勃起の動きにつれて、\nぞくぞくとした快感が、背中から脳へ抜けていく。
1459 = "Cùng với nhịp giật giật của dương vật, một luồng khoái cảm râm ran chạy dọc từ lưng lên đến tận não."
# 【日々姫】
# display as 日日姬
# JP: 「ん……ぷっ……ぷぁ――あ～」
1041 = "「Ưm……phụt……phù――A~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1182 = "「！」" 
# monologue
# JP: 口を大きくぽかんとあけて、\n全部飲んだと教えてくれる。
1361 = "Em ấy há to miệng, cho tôi thấy em ấy đã nuốt hết toàn bộ."
# monologue
# JP: 上唇と下唇をつなぐ、細く白濁した糸が、\nはぁ、と吐かれた息にぷっつり断ち切られる。
1370 = "Sợi chỉ trắng đục mỏng manh nối liền môi trên và môi dưới, đứt phựt khi em ấy phả ra một hơi thở \"hà\"."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫……」
# 1121 = "「日日姬……」" 
# monologue
# JP: 体を起こし、日々姫をそっと抱き寄せる。
1434 = "Tôi ngồi dậy, nhẹ nhàng ôm Hibiki vào lòng."
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　にぃに――まって、お口、ゆすぐ――んっ、\nあっ――チュッ――ちゅむっ――んっ――ふあっ――」
1001 = "「Hả!? Anh hai――đợi đã, để em súc miệng――ưm, a――chụt――chùn chụt――ưm――phù――」"
# monologue
# JP: キスを交わして舌を混ぜれば、\nむわりと青臭い味が、僕の口内へも移動してくる。
1433 = "Trao nhau nụ hôn và quấn lấy đầu lưỡi, một hương vị ngai ngái nồng nặc cũng truyền sang khoang miệng tôi."
# monologue
# JP: ……こんなものを良く、少しも残さず幸せそうに……\n思えば、ただただ愛おしさだけがふくらんでいく。
778 = "……Thứ như thế này mà em ấy lại có thể nuốt trọn không chừa một giọt với vẻ mặt hạnh phúc đến vậy…… Nghĩ đến đó, tình yêu thương trong tôi lại càng thêm dâng trào."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫――今度は、一緒に気持ちよくなろう」
1120 = "「Hibiki――Lần này, chúng ta hãy cùng nhau sung sướng nhé」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！\nって、え！？　きゃ、きゃあっ！？」
1058 = "「Vâng!\nƠ, hả!? Kya, kyaa!?」"
# monologue
# JP: （ぐいいっ！）
1779 = "（Nhấc bổng!）"
# monologue
# JP: 日々姫の体を抱え上げ、足を大きく開かせる。
1445 = "Tôi bế thốc Hibiki lên, để hai chân em ấy mở rộng ra."
# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！？　にぃにっ、こんな格好っ」
979 = "「Khoan đã!? Anh hai, tư thế này」"
# 【双鉄H】
# display as 雙鐵
# JP: 「心配するな。\n僕とてワンスコで鍛えた腕だ」
947 = "「Đừng lo. Tay anh cũng được rèn luyện bằng việc xúc than đấy」"
# 【日々姫】
# display as 日日姬
# JP: 「た、体力的な心配じゃなくてっ！\nわたっ、私っ――恥ずかしかっ！」
1089 = "「K-Không phải là em lo về thể lực của anh! M-Mà là em――xấu hổ quá!」"
# monologue
# JP: 日々姫の視線は僕でなく、\n僕の足元――洗い場の大きな鏡に注がれている。
1533 = "Ánh mắt của Hibiki không hướng về phía tôi, mà đang dán chặt vào phía dưới chân tôi――chiếc gương lớn ở khu vực tắm rửa."
# monologue
# JP: やはり、と思えば嬉しくなって、\n気持ちがそのまま言葉に変わる。
1566 = "Quả nhiên là vậy, nghĩ đến đó tôi lại thấy vui vui, và cảm xúc ấy cứ thế bật ra thành lời."
# 【双鉄H】
# display as 雙鐵
# JP: 「しかし。好きだろう？\n鏡越しに、繋がっている姿を見るのが」
959 = "「Nhưng mà. Em thích thế mà đúng không? Được nhìn thấy cảnh chúng ta hòa quyện vào nhau qua tấm gương」"
# 【日々姫】
# display as 日日姬
# JP: 「はうっ！！」
1019 = "「Hau!!」"
# monologue
# JP: 一瞬にして、日々姫がそまる。
1542 = "Khuôn mặt Hibiki đỏ bừng lên chỉ trong tích tắc."
# monologue
# JP: とっくに濡れてたおまんこからは、\n新たな蜜が溢れとろとろと腿をつたって落ちていく。
1564 = "Từ nơi âm đạo vốn đã ướt đẫm từ lâu, một dòng mật dịch mới lại trào ra, sền sệt chảy dọc theo đùi em ấy."
# 【双鉄H】
# display as 雙鐵
# JP: 「だと思ったのだ。\n制服でセックスしたときの日々姫は」
1141 = "「Anh đoán đúng mà. Nhớ lúc chúng ta làm tình khi em mặc đồng phục」"
# 【日々姫】
# display as 日日姬
# JP: 「やぁあん、にぃに、それ以上いじわる言わないで～」
974 = "「Yaaan, anh hai, đừng có trêu em nữa mà~」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いじわるのつもりは無かったのだが」
1092 = "「Anh đâu có định trêu em đâu」"
# monologue
# JP: （すりっ）
1795 = "（Cọ xát）"
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！」
# 1020 = "「啊！」" 
# monologue
# JP: 勃起の背中で日々姫のおまんこをなぞってやれば、\n途端に甘い声が出る。
1455 = "Khi tôi dùng phần sống của dương vật cương cứng lướt qua âm đạo của Hibiki, em ấy liền phát ra một tiếng rên ngọt ngào."
# monologue
# JP: 膣肉はもうぽかぽかに蕩けてて、\nこすっただけでも、貼りつき甘えて掴まえに来る。
1373 = "Thịt âm đạo giờ đây đã ấm nóng và tan chảy, chỉ cần cọ xát nhẹ thôi là nó đã bám chặt lấy, như đang làm nũng và muốn tóm lấy tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「……言われてしまえば、多少のいじわるもしたくなる」
785 = "「……Nghe em nói vậy, anh lại muốn trêu em một chút rồi đấy」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
999 = "「Hả!?」"
# monologue
# JP: うずうずヒクつく勃起を日々姫の尻で抑えて、\nおまんこからは離してしまう。
1453 = "Tôi dùng mông Hibiki chặn lại dương vật đang giật giật râm ran của mình, tách nó ra khỏi âm đạo của em ấy."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに……どうして？」
1169 = "「Anh hai……sao vậy?」"
# monologue
# JP: さっき、日々姫に教えてもらった。
1316 = "Lúc nãy, Hibiki đã cho tôi biết."
# monologue
# JP: 言わせること、言わされること――\n言葉がどれほど、興奮を高めてくれるのかを。
1664 = "Bắt đối phương nói ra, bị bắt phải nói ra―― Những lời nói ấy có thể làm tăng sự hưng phấn lên đến nhường nào."
# 【双鉄H】
# display as 雙鐵
# JP: 「聞かせて欲しい、日々姫の言葉で。\nどれほど僕を、欲しがってくれているのかを」
1091 = "「Anh muốn nghe, bằng chính lời nói của Hibiki. Rằng em khao khát anh đến mức nào」"
# 【日々姫】
# display as 日日姬
# JP: 「……ぁ」
786 = "「……A」"
# monologue
# JP: 風呂でか、それとも発情してか、\nピンクに染まった喉がゆっくり、生唾を飲む。
1272 = "Không biết là do hơi nóng trong phòng tắm hay do phát tình, chiếc cổ họng nhuốm màu hồng phấn của em ấy từ từ nuốt nước bọt."
# monologue
# JP: そうして日々姫は、自分の股間に指を運んで――
1588 = "Và rồi, Hibiki đưa những ngón tay xuống đũng quần của mình――"
# monologue
# JP: （くぱあっ）
1778 = "（Vạch ra）"
# monologue
# JP: ――大きく、鮮やかに広げてみせて、\n一言一言、絞りだすようにして伝えてくれる。
1366 = "――Em ấy vạch rộng ra một cách sống động, và truyền đạt cho tôi từng lời, từng lời như vắt kiệt từ tận đáy lòng."
# 【日々姫】
# display as 日日姬
# JP: 「わた――し、の……とろとろ、おまんこ、に――\nにぃにぃの――ガチガチの……おちん、ちんっ」
1153 = "「Vào――trong……âm đạo, ướt sũng……của em―― Chiếc――chim……cứng ngắc――của anh hai」"
# monologue
# JP: （つっ）
1775 = "（Chạm vào）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1182 = "「！」" 
# monologue
# JP: 日々姫の指が、僕を導く。
1536 = "Những ngón tay của Hibiki dẫn lối cho tôi."
# monologue
# JP: わななく膣の入り口に、\n再び勃起を導き、くりくりとこすり動かす。
1663 = "Đưa dương vật đang cương cứng trở lại cửa mình đang run rẩy, và cọ xát mơn trớn."
# 【日々姫】
# display as 日日姬
# JP: 「あっ――んっ――ぐって――して――\n挿入……して――それで、ずんずん――子宮、をっ」
1007 = "「A――ưm――mạnh――lên―― Đưa vào……đi――rồi, thúc mạnh――vào tử cung, của em」"
# monologue
# JP: （ぐっ）
1785 = "（Đâm vào）"
# 【日々姫】
# display as 日日姬
# JP: 「んふうううっ！」
1053 = "「Ưm phuuu!」"
# monologue
# JP: お望みどおりに腰を押しこみ、\n勃起の先のくびれまで、日々姫のおまんこの中へと挿れる。
1478 = "Đúng như mong muốn, tôi đẩy hông tới, đưa dương vật vào sâu trong âm đạo của Hibiki cho đến tận phần rãnh quy đầu."
# monologue
# JP: （きゅっ――きゅうううっ）
1790 = "（Siết——Siết chặt）"
# 【双鉄H】
# display as 雙鐵
# JP: （ああ……やはり、おまんこの中は最高だ――）
1752 = "（A……Quả nhiên, bên trong âm đạo vẫn là tuyệt nhất――）"
# monologue
# JP: 求めてくれる、抱きしめ蠢き誘ってくれる。\n日々姫の肉は僕の勃起を、奥へ奥へと引きこもうとする。
1465 = "Nó khao khát tôi, ôm trọn, uốn lượn và mời gọi tôi. Lớp thịt của Hibiki như muốn kéo dương vật của tôi vào sâu, sâu hơn nữa."
# monologue
# JP: その誘惑に耐えてただただ動かぬだけで――\n無数のヒダのざわめきが、僕を絶え間なく刺激してくる。
1443 = "Chỉ cần cố kìm nén sự cám dỗ đó và giữ nguyên không cử động―― Sự rung động của vô số nếp gấp đã không ngừng kích thích tôi."
# 【日々姫】
# display as 日日姬
# JP: 「おまんこの、奥――ずんずんって、してっ――\nそれで、精液――たくさん、ぴゅっぴゅって射精してっ」
1071 = "「Sâu bên trong, âm đạo――hãy thúc thật mạnh, đi anh―― Sau đó, tinh dịch――hãy bắn thật nhiều, tinh dịch vào trong em đi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「わかった」
1076 = "「Anh hiểu rồi」"
# monologue
# JP: （ずんっっっっっ！！！）
1782 = "（Thúc mạnh!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「きゃひっ！？　あっ――んうううううううっっ！！」
967 = "「Kyahi!? A――ưm ư ư ư ư ư ư ư ư ư!!」"
# monologue
# JP: 腰を突き上げ、同時に、日々姫の体を下へと持ってくる！
1427 = "Tôi đẩy hông lên, đồng thời kéo cơ thể Hibiki xuống!"
# 【日々姫】
# display as 日日姬
# JP: 「深っ――コレッ――んあっ！　違うとこ――ぐりって！\nひぁっ――あっ――えぐれ――って――んきゅっっ！！」
1075 = "「Sâu quá――Thế này――ưm a! Chỗ khác――bị ngoáy rồi! Hyaa――a――Bị khoét sâu――vào trong――ưm kyu!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ――んっ――」
976 = "「Kua――ưm――」"
# monologue
# JP: 確かに、これはいつもと違う。\n深いし――日々姫の中を思うまま堪能できる。
1412 = "Quả thực, lần này khác với mọi khi. Sâu quá――Tôi có thể tận hưởng trọn vẹn bên trong Hibiki theo ý muốn."
# monologue
# JP: （ぐりっ――ぐいっ――ずろおおおっ！　ずんっ！！）
1743 = "（Ngoáy——Thúc——Phập! Phập!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃあっ！？　んっ――ふあっ――おちんちん――\nおして、るっ――おなかっ――までっ――ひうっ」
972 = "「Hyaa!? Ưm――phù――Chim của anh―― Đang thúc, vào――tận trong bụng――em rồi――hyuu」"
# monologue
# JP: はっきり押せる。子宮をぐいと押し込める。
1467 = "Tôi có thể cảm nhận rõ lực ép. Có thể đẩy mạnh vào tử cung em ấy."
# monologue
# JP: 凄まじいまでの肉感がムリリと反発してきて、\n今まで知らない快感を、僕の勃起へと突き通してくる。
1400 = "Cảm giác nhục dục mãnh liệt phản hồi lại một cách mạnh mẽ, xuyên thấu qua dương vật tôi bằng một khoái cảm chưa từng có."
# 【双鉄H】
# display as 雙鐵
# JP: 「ここまで――ふか、くっ――入る、の――か――」
1166 = "「Có thể vào――sâu, đến mức――này――sao――」"
# monologue
# JP: 気持ち良すぎて、背中が滝になっている、\nだらだら汗が溢れて落ちて、腰のくぼみにたまってく。
1391 = "Vì quá sướng nên mồ hôi tuôn như thác trên lưng tôi, chảy ròng ròng rồi đọng lại ở hõm lưng."
# monologue
# JP: （ずっ――ぐううっ！　ずるっ！　ずこんっ！）
# 1743 = "（來回抽插）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！　にぃに――ふかっ――すぎっ――んうっ！」
962 = "「Hyaa! Anh hai――Sâu――quá rồi――ưm!」"
# monologue
# JP: けれども日々姫はいやがってない。\n少しも苦しがってない。
1289 = "Nhưng Hibiki không hề tỏ ra ghét bỏ. Cũng không hề tỏ ra đau đớn một chút nào."
# monologue
# JP: 鏡の中のおまんこはぴっちり僕を咥えて、\n捕食者さながらの喜びに、だらだらよだれをこぼしてる。
1682 = "Hình ảnh âm đạo ngậm chặt lấy tôi phản chiếu trong gương, đang rỏ dãi ròng ròng trong niềm vui sướng hệt như một kẻ săn mồi."
# 【双鉄H】
# display as 雙鐵
# JP: 「深さ……だけじゃない――多分、太さも――」
945 = "「Không chỉ……sâu đâu――Có lẽ, còn do độ to nữa――」"
# 【日々姫】
# display as 日日姬
# JP: 「ぁ……やっ……にぃに――おちんちん――おっきすぎ」
1009 = "「A……ya……Anh hai――chim――to quá đi」"
# monologue
# JP: 鏡に映る、自分の姿に、\nいっそ無残とさえ見える、男に貫かれている姿に――
1550 = "Nhìn vào hình bóng của chính mình phản chiếu trong gương, một hình bóng đang bị người đàn ông xuyên thấu, trông đến là thê thảm――"
# monologue
# JP: けれど日々姫は目を潤ませて、脳へ染みてくる声を出す。
1287 = "Nhưng đôi mắt Hibiki lại ướt đẫm, phát ra những âm thanh ngấm sâu vào tận não tủy."
# 【日々姫】
# display as 日日姬
# JP: 「私の、おまん、こ……伸びき……って――んっ――\nにぃに、で――ぜん、ぶ――いっぱい――すぎ、てっ」
1095 = "「Âm, đạo……của em……bị kéo giãn……hết cỡ rồi――ưm―― Bởi anh hai――tất, cả――đã bị lấp đầy――quá mức, rồi」"
# monologue
# JP: （きゅううううっ！）
# 1790 = "（收縮壓迫）" 
# monologue
# JP: 言葉で更に興奮したのか、\n日々姫の膣がさらにわななく。
1516 = "Có lẽ những lời nói đó càng làm em ấy hưng phấn hơn, âm đạo của Hibiki lại càng co giật mạnh."
# monologue
# JP: いや、体全部に力が入り、\n全身が、小さくふるふる震えだしてる。
1276 = "Không, em ấy đang gồng cả cơ thể, toàn thân khẽ run lên bần bật."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫？　どうした？」
1128 = "「Hibiki? Em sao thế?」"
# 【日々姫】
# display as 日日姬
# JP: 「だって、えっち……えっちだから……\n私……だって……見て、欲しい、からっ」
1069 = "「Tại vì, dâm đãng……dâm đãng quá mà…… Em……cũng……muốn anh, nhìn thấy, em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1050 = "「嗯」" 
# monologue
# JP: 何をするのか、してくれるのか。\n言葉にせずとも、伝わってくる。
1354 = "Em ấy định làm gì, sẽ làm gì cho tôi. Dù không nói thành lời, tôi vẫn có thể cảm nhận được."
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな、僕も見てみたい」
1130 = "「Ừ, anh cũng muốn xem」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにっ」
# 1170 = "「阿哥」" 
# monologue
# JP: 言葉で、日々姫を押してやる。\nそして当然、勃起でも――
1460 = "Bằng lời nói, tôi thúc đẩy Hibiki. Và tất nhiên, bằng cả dương vật đang cương cứng nữa――"
# monologue
# JP: （ぐううっ！）
# 1785 = "（插入）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ！？　あっ！　[なか,1]膣内からっ――んううっ！？」
971 = "「Hyaa!? A! Từ bên trong――ưm ư!?」"
# monologue
# JP: （ぷっ――ちょろっ――ちょっおおおおおおおおっ！！）
1758 = "（Phụt——Tí tách——Phụt!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「おお」
998 = "「Ồ」"
# monologue
# JP: 思わず、声が出てしまう。\nそれほど見事に、日々姫は尿のアーチを描く。
1415 = "Tôi bất giác thốt lên. Dòng nước tiểu của Hibiki vẽ nên một đường cung hoàn mỹ đến nhường nào."
# 【日々姫】
# display as 日日姬
# JP: 「あ……あっ――してる――私っ――おもらし――\nして、るっ――にぃにに――にぃにの、おちん、ちんっ」
1011 = "「A……a――Đang tè――em――đang tè dầm―― Tè ra――anh hai――trên chiếc chim, của anh hai」"
# monologue
# JP: （ぐりりゅっ！）
1784 = "（Đâm mạnh!）"
# 【日々姫】
# display as 日日姬
# JP: 「んひいいっ！？」
1051 = "「Ưm hii!?」"
# monologue
# JP: 腰を回して膣内をえぐれば、日々姫の腰も当然まわり、\nおしっこの線も大きく揺れる。
1470 = "Khi tôi xoay hông ngoáy sâu vào trong âm đạo, hông của Hibiki tất nhiên cũng xoay theo, khiến dòng nước tiểu cũng đung đưa dữ dội."
# monologue
# JP: だが、止まらない。\nそれでも日々姫は、尿道口から黄色い雨を降らせ続ける。
1285 = "Nhưng, nó không dừng lại. Hibiki vẫn tiếp tục tuôn ra cơn mưa màu vàng từ lỗ niệu đạo."
# 【日々姫】
# display as 日日姬
# JP: 「わた、しっ――おちんちん、いれて、もらって――\nつながった――ままっ――おもらし――してる、のぉっ」
1087 = "「Em――đang được đút chim, vào―― Vẫn đang――gắn kết――mà lại――tè dầm――mất rồi」"
# monologue
# JP: 髪にキスして、\n震える耳に、唇を軽く押し当て、囁く。
1431 = "Tôi hôn lên mái tóc em ấy, áp nhẹ môi vào vành tai đang run rẩy, thì thầm."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。そうだな。\nとてもかわいく、とてもやらしい」
1063 = "「Ừ. Đúng vậy.\nRất đáng yêu, và cũng rất dâm đãng」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――ふあっ――ふあああああああああんっ！！！」
1006 = "「A――phù――phuaaaaaaaan!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1182 = "「！」" 
# monologue
# JP: 日々姫が震える。
1512 = "Hibiki run rẩy."
# monologue
# JP: 全身ビクビク震わせて、\n尿はぴっぴと、断続的に変わって――――止まる。
1368 = "Toàn thân giật nảy lên bần bật, dòng nước tiểu cũng chuyển sang ngắt quãng nhỏ giọt――――rồi dừng hẳn."
# 【日々姫】
# display as 日日姬
# JP: 「ふぇ……ぁ……わた……私、おしっこ――おもらし――\n全部……全部して……イっちゃっ――きゅふっ！！？」
991 = "「Hức……a……em……Em, đi tè――tè dầm―― Hết……hết sạch rồi……Lên đỉnh mất――kyufu!!?」"
# monologue
# JP: （ずろおおぽおおおおおおおおおおっ！！）
1783 = "（Phập!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「今度は、僕に。\n僕にも全部、出させて欲しい」
1157 = "「Lần này, đến lượt anh. Anh cũng muốn, được bắn hết ra ngoài」"
# monologue
# JP: （ずぶうううううううううっ！！！）
1757 = "（Phập!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「くひゅううううううううんっ！！！」
1054 = "「Ưm hyuuuuuuuun!!!」"
# monologue
# JP: 大きく腰を引いて突き。
1429 = "Tôi kéo hông ra thật xa rồi thúc mạnh."
# monologue
# JP: そうして日々姫を、\nぎゅっと抱き寄せ、僕の体で閉じ込める！
1589 = "Và rồi ôm chặt lấy Hibiki, dùng cơ thể mình bao bọc lấy em ấy!"
# monologue
# JP: （すぱんっ！　ぱんっ！　ずぶっ！　ずぱんっ！）
1760 = "（Bạch! Bạch! Phập! Phập!）"
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！　あっ！　にぃにっ！　してっ！\n全部！　わた、しにっ――私に――[だ,1]射精してっ！！」
995 = "「Phù! A! Anh hai! Làm đi anh! Tất cả! Vào, trong em――Vào trong em――hãy xuất tinh đi!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1050 = "「嗯」" 
# monologue
# JP: （ずばっ！　じゅぶっ！　ずぶっ！　すぱんっ！！）
1759 = "（Bạch! Phập! Phập! Bạch!!）"
# monologue
# JP: 素早く小さく腰を動かし、\n日々姫の膣の、おんなじところを何度も味わう。
1437 = "Tôi chuyển động hông thật nhanh với biên độ nhỏ, liên tục nhấm nháp cùng một điểm bên trong âm đạo của Hibiki."
# monologue
# JP: ざらつくところに勃起の先端を当てては引いて、\n日々姫と一緒に、慣れ親しんだ快感を重ね高めてく。
1456 = "Ấn đầu dương vật vào chỗ thô ráp rồi lại rút ra, cùng với Hibiki, đẩy những khoái cảm quen thuộc này lên đến tột đỉnh."
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ――好きっ！　そこっ――しゅきっ！\nおちん、ちんにっ！　ずりって――される――んっ！！」
988 = "「Phù――Thích quá! Chỗ đó――Thích lắm! Bởi chim, của anh! Bị cọ xát――như thế――ưm!!」"
# monologue
# JP: 膣と勃起が、融け合っている。
1641 = "Âm đạo và dương vật, đang hòa quyện vào nhau."
# monologue
# JP: 融け合い引っ付き合いながら、けれど互いを刺激しあって、\n射精を、絶頂を導こうとする。
1295 = "Vừa hòa quyện dính chặt lấy nhau, lại vừa kích thích lẫn nhau, dẫn dắt nhau đến khoảnh khắc xuất tinh, đến tột đỉnh thăng hoa."
# monologue
# JP: （じゅぶっ！　じゅっっ！　じゅばっっ！　じゅぼっ！）
1754 = "（Phập! Phập! Phập! Phập!）"
# monologue
# JP: 接合部が摩擦と蜜だけで泡立っている。\n日々姫と僕の匂いが石鹸の匂いさえをも覆う。
1423 = "Chỗ giao hợp nổi đầy bọt trắng chỉ từ ma sát và mật dịch. Mùi hương của Hibiki và tôi lấn át cả mùi xà phòng."
# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫――日々姫っ！」
1118 = "「Hibiki――Hibiki!」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　にぃにっ！　来てっ！　来てぇっ！！！」
1060 = "「Vâng! Anh hai! Tới đi anh! Tới đi!!!」"
# monologue
# JP: 日々姫の膣は震えっぱなしだ。\n僕とて、ギリギリに追い込まれてる。
1545 = "Âm đạo của Hibiki cứ run rẩy không ngừng. Tôi cũng đã bị dồn đến giới hạn cuối cùng rồi."
# monologue
# JP: けど、だからこそ、さっきのあれを――\n一番深くを抉って押した快感をっ！！！！
1294 = "Nhưng, chính vì vậy, phải làm giống như lúc nãy―― Khoái cảm khi khoét sâu và nhấn mạnh vào tận cùng đó!!!!"
# monologue
# JP: （ずるうううううううううううっっっ！！）
# 1783 = "（插入！！）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！？　あっ――あっ！」
966 = "「Hyaa!? A――a!」"
# monologue
# JP: 鏡越し、視線もひとつに交じり合う。\n日々姫も、わかって、求めてくれる。
1350 = "Qua tấm gương, ánh mắt chúng tôi cũng giao nhau làm một. Hibiki cũng hiểu, và khao khát điều đó."
# monologue
# JP: （ずっっっっっ――――ごりゅううううっつ！！！）
1794 = "（Thúc mạnh!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「いうっ！？　――かっ――ふやっ――\nあぁぁぁぁぁああああああああんっ！！！」
964 = "「Iu!? ――A――Hyaa――\nAaaaaaaaaaaan!!!」"
# monologue
# JP: （ぎゅううううううううううんっ！）
# 1790 = "（收縮壓迫）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 977 = "「呃！」" 
# monologue
# JP: （びゅううううううううううっっ！！！）
1765 = "（Phụt!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！！？」
963 = "「Hyaa!!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
1183 = "「!!?」"
# monologue
# JP: ばちゅん！　子宮の扉の奥へと、\n精液が叩き当った感触が亀頭に伝わってくる。
1462 = "Bạch! Cảm giác tinh dịch bắn đập vào sâu bên trong cánh cửa tử cung truyền thẳng đến quy đầu."
# monologue
# JP: 二度目の射精は一度めよりも濃く強く、\n鞭の如くに、日々姫の子宮を叩いて満たす。
1616 = "Lần xuất tinh thứ hai còn đặc và mạnh hơn cả lần đầu, như một chiếc roi quất vào và lấp đầy tử cung của Hibiki."
# monologue
# JP: （びゅううっ！　びゅるうっ！　びゅっ！　びゅう！！）
1762 = "（Phụt! Phụt! Phụt! Phụt!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！？　あっ！　あっ！　あっ！　あっ！\nわた、し――なか、に――だされっ、だされてえぇっ！」
969 = "「Hyaa!? A! A! A! A! Em――bên trong, em――bị bắn, bị bắn đầy rồi!」"
# monologue
# JP: 体全部をピンと張り、\n日々姫が再びの絶頂をする！
1510 = "Toàn thân căng cứng, Hibiki lại một lần nữa đạt cực khoái!"
# monologue
# JP: 子宮は思い切り収縮し！　\nこれほど出てる精液を、さらに強烈に絞り取るっ！
1372 = "Tử cung co thắt dữ dội! Vắt kiệt một cách mãnh liệt hơn nữa lượng tinh dịch đang tuôn trào!"
# monologue
# JP: （びゅっ！　びゅううっ！　びゅるっ――びゅっ――）
1770 = "（Phụt! Phụt! Phụt——Phụt——）"
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ……あっ……あっ――ふえっ――あっ――あ」
990 = "「Phù……a……a――fue――a――a」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っと」
993 = "「Phù」"
# monologue
# JP: 崩れそうになる日々姫を支えなおした弾みに、\n勃起が膣から飛び出てしまう。
1473 = "Theo đà đỡ lấy cơ thể Hibiki sắp đổ gục xuống, dương vật của tôi vô tình tuột ra khỏi âm đạo."
# 【日々姫】
# display as 日日姬
# JP: 「やっ――あっ――こぼれ、る……やぁ……あっ」
960 = "「A――a――Trào ra, mất……ya……a」"
# monologue
# JP: （とろおおおおおっ）
1796 = "（Chảy xuống）"
# 【双鉄H】
# display as 雙鐵
# JP: 「…………」
782 = "「…………」"
# monologue
# JP: 生唾が、わく。
1610 = "Tôi nuốt nước bọt."
# monologue
# JP: 日々姫のぽっかりまだ開いてるおまんこから、\n僕の精液が溢れだす――その淫猥な光景に。
1327 = "Từ cửa âm đạo vẫn còn mở toang của Hibiki, tinh dịch của tôi trào ra ngoài――một cảnh tượng thật dâm đãng."
# 【日々姫】
# display as 日日姬
# JP: 「あ……にぃに――また……」
1016 = "「A……Anh hai――lại nữa……」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
# 1050 = "「嗯」" 
# monologue
# JP: あまりの射精にしおれてしまっていたちんちんが、\n再び勢いを取り戻してる。
1315 = "Cậu nhóc vốn đã ỉu xìu vì xuất tinh quá nhiều, nay lại lấy lại phong độ một lần nữa."
# 【日々姫】
# display as 日日姬
# JP: 「ね？　にぃに」
1164 = "「Nè? Anh hai」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1050 = "「嗯」" 
# monologue
# JP: キス。キス。キス。
1422 = "Hôn. Hôn. Hôn."
# monologue
# JP: 唇同士だけでなく、鼻を、ほっぺたをくっつけあって、\n僕と日々姫は、ゼロ距離よりも更に近づく。
1339 = "Không chỉ đôi môi, mà cả mũi, cả má đều dán chặt vào nhau, tôi và Hibiki xích lại gần nhau hơn cả khoảng cách số không."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに。大好き」
1172 = "「Anh hai. Em yêu anh lắm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕も、日々姫が大好きだ」
1125 = "「Anh cũng rất yêu Hibiki」"
# monologue
# JP: わかりきってる、単純なこと。\nそれをお互いの唇に乗せ――
1424 = "Một điều giản đơn mà cả hai đều hiểu rõ. Chúng tôi trao nó cho nhau qua đôi môi――"
# monologue
# JP: （ずぶうううううっ！！！）
# 1782 = "（插入！！！）" 
# 【日々姫】
# display as 日日姬
# JP: 「ふああああああっ！！！！」
994 = "「Fuaaaaaa!!!!」"
# monologue
# JP: そうして深く、繋がって。\n僕と日々姫は掴まえあう。
1585 = "Và rồi, chúng tôi lại kết nối sâu thẳm. Tôi và Hibiki ôm chặt lấy nhau."
# monologue
# JP: もう一秒も――\n離れずずっと、過ごせるように。
1394 = "Dù chỉ một giây thôi―― cũng mong được mãi bên nhau không rời."
