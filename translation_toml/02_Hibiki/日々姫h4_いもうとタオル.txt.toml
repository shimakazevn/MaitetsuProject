# monologue
# JP: さっき、日々姫に教えてもらった。
1316 = "剛才日日姬讓我認識到一點。" 

# monologue
# JP: 言わせること、言わされること――\n言葉がどれほど、興奮を高めてくれるのかを。
1664 = "讓對方說，被強迫說――語言可以有效地讓人更興奮。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「聞かせて欲しい、日々姫の言葉で。\nどれほど僕を、欲しがってくれているのかを」
1091 = "「我想聽日日姬親口說。我想聽你說你有多想要我」" 

# 【日々姫】
# display as 日日姬
# JP: 「……ぁ」
786 = "「……啊」" 

# monologue
# JP: 風呂でか、それとも発情してか、\nピンクに染まった喉がゆっくり、生唾を飲む。
1272 = "不知道是因為在浴室裡，還是因為發情的緣故，日日姬連喉嚨都變成了一片粉色。她吞了口唾沫。" 

# monologue
# JP: そうして日々姫は、自分の股間に指を運んで――
1588 = "然後日日姬把手移到了自己的腿間――" 

# monologue
# JP: （くぱあっ）
1778 = "（扒開）" 

# monologue
# JP: ――大きく、鮮やかに広げてみせて、\n一言一言、絞りだすようにして伝えてくれる。
1366 = "她用力扒開了自己的小穴。然後她一個詞一個詞地蹦著說――" 

# 【日々姫】
# display as 日日姬
# JP: 「わた――し、の……とろとろ、おまんこ、に――\nにぃにぃの――ガチガチの……おちん、ちんっ」
1153 = "「請阿哥……把硬硬的肉棒――插進我的――濕透的……小穴裡」" 

# monologue
# JP: （つっ）
1775 = "（戳）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1182 = "「！」" 

# monologue
# JP: 日々姫の指が、僕を導く。
1536 = "日日姬用手指引導著我的肉棒。" 

# monologue
# JP: わななく膣の入り口に、\n再び勃起を導き、くりくりとこすり動かす。
1663 = "讓它再次回到小穴的入口，在上面來回磨蹭。" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ――んっ――ぐって――して――\n挿入……して――それで、ずんずん――子宮、をっ」
1007 = "「啊――嗯――唔――來吧――插進來吧……用這個――頂著――子宮」" 

# monologue
# JP: （ぐっ）
1785 = "（插入）" 

# 【日々姫】
# display as 日日姬
# JP: 「んふうううっ！」
1053 = "「嗯呼！」" 

# monologue
# JP: お望みどおりに腰を押しこみ、\n勃起の先のくびれまで、日々姫のおまんこの中へと挿れる。
1478 = "於是我就遵循她的意願向上一頂，讓龜頭插入了日日姬的小穴。" 

# monologue
# JP: （きゅっ――きゅうううっ）
1790 = "（收縮壓迫）" 

# 【双鉄H】
# display as 雙鐵
# JP: （ああ……やはり、おまんこの中は最高だ――）
1752 = "（啊……果然小穴裡面最舒服――）" 

# monologue
# JP: 求めてくれる、抱きしめ蠢き誘ってくれる。\n日々姫の肉は僕の勃起を、奥へ奥へと引きこもうとする。
1465 = "我能感覺到裡面在渴求著我，緊緊包裹著我。日日姬的穴肉在誘導著我往更深處插入。" 

# monologue
# JP: その誘惑に耐えてただただ動かぬだけで――\n無数のヒダのざわめきが、僕を絶え間なく刺激してくる。
1443 = "我抗拒著誘惑，沒有進一步動作，但是無數褶皺的蠕動已經帶給了我源源不斷的刺激。" 

# 【日々姫】
# display as 日日姬
# JP: 「おまんこの、奥――ずんずんって、してっ――\nそれで、精液――たくさん、ぴゅっぴゅって射精してっ」
1071 = "「在我的小穴深處――用力頂――然後再射出――好多精液」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「わかった」
1076 = "「好的」" 

# monologue
# JP: （ずんっっっっっ！！！）
1782 = "（插入！！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「きゃひっ！？　あっ――んうううううううっっ！！」
967 = "「呀！？啊――嗯啊！！」" 

# monologue
# JP: 腰を突き上げ、同時に、日々姫の体を下へと持ってくる！
1427 = "我向上挺腰，同時把日日姬的身體往下一按！" 

# 【日々姫】
# display as 日日姬
# JP: 「深っ――コレッ――んあっ！　違うとこ――ぐりって！\nひぁっ――あっ――えぐれ――って――んきゅっっ！！」
1075 = "「好深――這樣――嗯！頂的地方――不對！呀――啊――插到了――嗯哼！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ――んっ――」
976 = "「呃――嗯――」" 

# monologue
# JP: 確かに、これはいつもと違う。\n深いし――日々姫の中を思うまま堪能できる。
1412 = "感覺確實跟平常不一樣。插入的很深，這樣我能盡情享用日日姬的蜜穴。" 

# monologue
# JP: （ぐりっ――ぐいっ――ずろおおおっ！　ずんっ！！）
1743 = "（來回抽插）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃあっ！？　んっ――ふあっ――おちんちん――\nおして、るっ――おなかっ――までっ――ひうっ」
972 = "「呀！？嗯――呼――雞雞――頂了進來――頂到了肚子裡面――呀」" 

# monologue
# JP: はっきり押せる。子宮をぐいと押し込める。
1467 = "我能盡情地插到最裡面，能用力頂在子宮上。" 

# monologue
# JP: 凄まじいまでの肉感がムリリと反発してきて、\n今まで知らない快感を、僕の勃起へと突き通してくる。
1400 = "強烈的快感席捲而來，一種我從未體驗過的快感貫穿了我的肉棒。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ここまで――ふか、くっ――入る、の――か――」
1166 = "「都插進――這麼深了嗎――」" 

# monologue
# JP: 気持ち良すぎて、背中が滝になっている、\nだらだら汗が溢れて落ちて、腰のくぼみにたまってく。
1391 = "實在是太舒服了，我已經汗流浹背。汗水一個勁地流下，積在了腰上面的凹陷處。" 

# monologue
# JP: （ずっ――ぐううっ！　ずるっ！　ずこんっ！）
# 1743 = "（來回抽插）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！　にぃに――ふかっ――すぎっ――んうっ！」
962 = "「呀！阿哥――好深――太深了――嗯！」" 

# monologue
# JP: けれども日々姫はいやがってない。\n少しも苦しがってない。
1289 = "但是日日姬沒有表現出厭惡，也沒有表現出難受。" 

# monologue
# JP: 鏡の中のおまんこはぴっちり僕を咥えて、\n捕食者さながらの喜びに、だらだらよだれをこぼしてる。
1682 = "鏡面中映出的小穴緊緊含著我的肉棒，就像是捕食者咬到了獵物一樣興奮地流著口水。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「深さ……だけじゃない――多分、太さも――」
945 = "「不僅是……好深――大概也因為很粗――」" 

# 【日々姫】
# display as 日日姬
# JP: 「ぁ……やっ……にぃに――おちんちん――おっきすぎ」
1009 = "「啊……呀……阿哥的雞雞――好大」" 

# monologue
# JP: 鏡に映る、自分の姿に、\nいっそ無残とさえ見える、男に貫かれている姿に――
1550 = "日日姬看著鏡面中映出的自己的樣子，看著自己被男人無情地貫穿的樣子――" 

# monologue
# JP: けれど日々姫は目を潤ませて、脳へ染みてくる声を出す。
1287 = "但是她卻興奮得眼眸濕潤，發出了讓人心神蕩漾的嬌聲。" 

# 【日々姫】
# display as 日日姬
# JP: 「私の、おまん、こ……伸びき……って――んっ――\nにぃに、で――ぜん、ぶ――いっぱい――すぎ、てっ」
1095 = "「我的小穴……被拉得……這麼長――嗯――阿哥的――全力――填得好滿――」" 

# monologue
# JP: （きゅううううっ！）
# 1790 = "（收縮壓迫）" 

# monologue
# JP: 言葉で更に興奮したのか、\n日々姫の膣がさらにわななく。
1516 = "日日姬可能是被自己的話挑逗地更興奮了，她的蜜道裡抖動得更厲害了。" 

# monologue
# JP: いや、体全部に力が入り、\n全身が、小さくふるふる震えだしてる。
1276 = "不，她是全身都在用力，整個人都在小幅度顫抖。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫？　どうした？」
1128 = "「日日姬？怎麼了？」" 

# 【日々姫】
# display as 日日姬
# JP: 「だって、えっち……えっちだから……\n私……だって……見て、欲しい、からっ」
1069 = "「因為那樣色色……色色的……我……我也想讓你看……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1050 = "「嗯」" 

# monologue
# JP: 何をするのか、してくれるのか。\n言葉にせずとも、伝わってくる。
1354 = "她不用明確地說出來，我就知道她想做什麼了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな、僕も見てみたい」
1130 = "「沒錯，我也想看」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにっ」
# 1170 = "「阿哥」" 

# monologue
# JP: 言葉で、日々姫を押してやる。\nそして当然、勃起でも――
1460 = "我的語言推了日日姬一把。然後肉棒當然也跟著――" 

# monologue
# JP: （ぐううっ！）
# 1785 = "（插入）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ！？　あっ！　[なか,1]膣内からっ――んううっ！？」
971 = "「呀！？啊！從裡面――嗯！？」" 

# monologue
# JP: （ぷっ――ちょろっ――ちょっおおおおおおおおっ！！）
1758 = "（噗哧――噗呲――！！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「おお」
998 = "「哇」" 

# monologue
# JP: 思わず、声が出てしまう。\nそれほど見事に、日々姫は尿のアーチを描く。
1415 = "我不由得感嘆出聲。日日姬的尿液畫出了一道完美的弧線。" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……あっ――してる――私っ――おもらし――\nして、るっ――にぃにに――にぃにの、おちん、ちんっ」
1011 = "「啊……尿了――我尿出來了――阿哥的――雞雞」" 

# monologue
# JP: （ぐりりゅっ！）
1784 = "（插入！）" 

# 【日々姫】
# display as 日日姬
# JP: 「んひいいっ！？」
1051 = "「嗯呀！？」" 

# monologue
# JP: 腰を回して膣内をえぐれば、日々姫の腰も当然まわり、\nおしっこの線も大きく揺れる。
1470 = "我轉動著腰頂著她的蜜道，日日姬的腰也跟著轉動，尿液畫出的線也跟著搖擺。" 

# monologue
# JP: だが、止まらない。\nそれでも日々姫は、尿道口から黄色い雨を降らせ続ける。
1285 = "但是她並沒有停下。日日姬的尿道口中還在源源不絕地噴出黃色的尿液。" 

# 【日々姫】
# display as 日日姬
# JP: 「わた、しっ――おちんちん、いれて、もらって――\nつながった――ままっ――おもらし――してる、のぉっ」
1087 = "「我――一邊――被雞雞插著――一邊漏尿――」" 

# monologue
# JP: 髪にキスして、\n震える耳に、唇を軽く押し当て、囁く。
1431 = "我吻上了她的秀髮，然後抵在她顫抖的耳朵旁邊，喃喃輕語。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。そうだな。\nとてもかわいく、とてもやらしい」
1063 = "「嗯，沒錯。真的是太可愛，太淫蕩了」" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ――ふあっ――ふあああああああああんっ！！！」
1006 = "「啊――呼――呼啊――！！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1182 = "「！」" 

# monologue
# JP: 日々姫が震える。
1512 = "日日姬又抖動起來。" 

# monologue
# JP: 全身ビクビク震わせて、\n尿はぴっぴと、断続的に変わって――――止まる。
1368 = "她的全身都在顫抖，尿液也變得斷斷續續，最後停止了。" 

# 【日々姫】
# display as 日日姬
# JP: 「ふぇ……ぁ……わた……私、おしっこ――おもらし――\n全部……全部して……イっちゃっ――きゅふっ！！？」
991 = "「呼……啊……我……尿出來了――全部……尿出來了……要去了――呀！！？」" 

# monologue
# JP: （ずろおおぽおおおおおおおおおおっ！！）
1783 = "（插入！！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「今度は、僕に。\n僕にも全部、出させて欲しい」
1157 = "「這次換我。我也想全部射出來」" 

# monologue
# JP: （ずぶうううううううううっ！！！）
1757 = "（噗呲！！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「くひゅううううううううんっ！！！」
1054 = "「嗯啊！！！」" 

# monologue
# JP: 大きく腰を引いて突き。
1429 = "我向後一抽身。" 

# monologue
# JP: そうして日々姫を、\nぎゅっと抱き寄せ、僕の体で閉じ込める！
1589 = "然後緊緊地抱住日日姬，把她整個身子包了起來！" 

# monologue
# JP: （すぱんっ！　ぱんっ！　ずぶっ！　ずぱんっ！）
1760 = "（噗啾！噗啾！啾噗！啾噗！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！　あっ！　にぃにっ！　してっ！\n全部！　わた、しにっ――私に――[だ,1]射精してっ！！」
995 = "「呼！啊！阿哥！來吧！全射出來！在我裡面――射出來！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1050 = "「嗯」" 

# monologue
# JP: （ずばっ！　じゅぶっ！　ずぶっ！　すぱんっ！！）
1759 = "（噗啾！噗啾！啾噗！啾噗！！）" 

# monologue
# JP: 素早く小さく腰を動かし、\n日々姫の膣の、おんなじところを何度も味わう。
1437 = "我小幅度地抽動著腰，不斷頂著日日姬蜜道中的同一個地方。" 

# monologue
# JP: ざらつくところに勃起の先端を当てては引いて、\n日々姫と一緒に、慣れ親しんだ快感を重ね高めてく。
1456 = "我用龜頭頂著粗糙的那一部分，跟日日姬一起積累著快感。" 

# 【日々姫】
# display as 日日姬
# JP: 「ふあっ――好きっ！　そこっ――しゅきっ！\nおちん、ちんにっ！　ずりって――される――んっ！！」
988 = "「呼――那裡！我喜歡――那裡！喜歡――被雞雞擦到――嗯！！」" 

# monologue
# JP: 膣と勃起が、融け合っている。
1641 = "蜜道和肉棒已經融合成了一體。" 

# monologue
# JP: 融け合い引っ付き合いながら、けれど互いを刺激しあって、\n射精を、絶頂を導こうとする。
1295 = "但與此同時，它們也在互相刺激著對方。這讓我離高潮、離射精越來越近。" 

# monologue
# JP: （じゅぶっ！　じゅっっ！　じゅばっっ！　じゅぼっ！）
1754 = "（啾噗！啾噗！噗啾！噗啾！）" 

# monologue
# JP: 接合部が摩擦と蜜だけで泡立っている。\n日々姫と僕の匂いが石鹸の匂いさえをも覆う。
1423 = "我們結合部分的愛液摩擦出了白沫。日日姬和我體液的氣味甚至蓋過了香皂的氣味。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫――日々姫っ！」
1118 = "「日日姬――日日姬！」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　にぃにっ！　来てっ！　来てぇっ！！！」
1060 = "「嗯！阿哥！來吧！來吧！！！」" 

# monologue
# JP: 日々姫の膣は震えっぱなしだ。\n僕とて、ギリギリに追い込まれてる。
1545 = "日日姬的蜜道顫抖個不停。這讓我越來越接近極限。" 

# monologue
# JP: けど、だからこそ、さっきのあれを――\n一番深くを抉って押した快感をっ！！！！
1294 = "但是這時更需要剛才那種插入到了最深處的快感！！！！" 

# monologue
# JP: （ずるうううううううううううっっっ！！）
# 1783 = "（插入！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！？　あっ――あっ！」
966 = "「呀！？啊――啊！」" 

# monologue
# JP: 鏡越し、視線もひとつに交じり合う。\n日々姫も、わかって、求めてくれる。
1350 = "在鏡面中，我們的視線碰撞到了一起。日日姬明白我的意思，她也在渴求著我。" 

# monologue
# JP: （ずっっっっっ――――ごりゅううううっつ！！！）
1794 = "（用力插入！！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「いうっ！？　――かっ――ふやっ――\nあぁぁぁぁぁああああああああんっ！！！」
964 = "「呀！？――唔――呀――啊啊啊啊啊！！！」" 

# monologue
# JP: （ぎゅううううううううううんっ！）
# 1790 = "（收縮壓迫）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 977 = "「呃！」" 

# monologue
# JP: （びゅううううううううううっっ！！！）
1765 = "（噗嚕嚕！！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！！？」
963 = "「呀！！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
1183 = "「！！？」" 

# monologue
# JP: ばちゅん！　子宮の扉の奥へと、\n精液が叩き当った感触が亀頭に伝わってくる。
1462 = "我的龜頭能感受到精液射進了子宮入口的裡面。" 

# monologue
# JP: 二度目の射精は一度めよりも濃く強く、\n鞭の如くに、日々姫の子宮を叩いて満たす。
1616 = "第二次射精比第一次更濃厚、力道更強，就像鞭子一樣強力地抽打著日日姬的子宮，把裡面灌滿。" 

# monologue
# JP: （びゅううっ！　びゅるうっ！　びゅっ！　びゅう！！）
1762 = "（噗噗！噗嚕！噗噗！噗噗！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！？　あっ！　あっ！　あっ！　あっ！\nわた、し――なか、に――だされっ、だされてえぇっ！」
969 = "「呀！？啊！啊！啊！啊！我的――裡面――被填滿了！」" 

# monologue
# JP: 体全部をピンと張り、\n日々姫が再びの絶頂をする！
1510 = "日日姬全身猛地一挺，再次達到了高潮！" 

# monologue
# JP: 子宮は思い切り収縮し！　\nこれほど出てる精液を、さらに強烈に絞り取るっ！
1372 = "她的子宮劇烈地收縮著，繼續榨取著我的精液！" 

# monologue
# JP: （びゅっ！　びゅううっ！　びゅるっ――びゅっ――）
1770 = "（噗！噗噗！噗嚕――噗嚕――）" 

# 【日々姫】
# display as 日日姬
# JP: 「ふあっ……あっ……あっ――ふえっ――あっ――あ」
990 = "「呼……啊……啊――呼――啊――啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っと」
993 = "「呼」" 

# monologue
# JP: 崩れそうになる日々姫を支えなおした弾みに、\n勃起が膣から飛び出てしまう。
1473 = "我重新抱好整個人都脫力癱軟的日日姬，這個動作讓肉棒從小穴中拔了出來。" 

# 【日々姫】
# display as 日日姬
# JP: 「やっ――あっ――こぼれ、る……やぁ……あっ」
960 = "「呀――啊――流出來了……呀……啊」" 

# monologue
# JP: （とろおおおおおっ）
1796 = "（精液滴下）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「…………」
782 = "「…………」" 

# monologue
# JP: 生唾が、わく。
1610 = "眼前淫靡的光景讓我嚥下一口唾沫。" 

# monologue
# JP: 日々姫のぽっかりまだ開いてるおまんこから、\n僕の精液が溢れだす――その淫猥な光景に。
1327 = "只見日日姬的穴口大開，我的精液從其中溢了出來。" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……にぃに――また……」
1016 = "「啊……阿哥――又這樣……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
# 1050 = "「嗯」" 

# monologue
# JP: あまりの射精にしおれてしまっていたちんちんが、\n再び勢いを取り戻してる。
1315 = "剛才因為射精而萎靡下去的肉棒，又恢復了堅挺的態勢。" 

# 【日々姫】
# display as 日日姬
# JP: 「ね？　にぃに」
1164 = "「那個，阿哥」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1050 = "「嗯」" 

# monologue
# JP: キス。キス。キス。
1422 = "我們吻了起來。" 

# monologue
# JP: 唇同士だけでなく、鼻を、ほっぺたをくっつけあって、\n僕と日々姫は、ゼロ距離よりも更に近づく。
1339 = "吻的不僅是嘴唇，連鼻子、臉頰都緊緊黏在一起。我和日日姬之間的距離已經小於零了。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに。大好き」
1172 = "「阿哥，我好愛你」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕も、日々姫が大好きだ」
1125 = "「日日姬，我也好愛你」" 

# monologue
# JP: わかりきってる、単純なこと。\nそれをお互いの唇に乗せ――
1424 = "我們都很清楚這份單純的感情。我們互相道出了自己的心聲――" 

# monologue
# JP: （ずぶうううううっ！！！）
# 1782 = "（插入！！！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ふああああああっ！！！！」
994 = "「呼啊！！！！」" 

# monologue
# JP: そうして深く、繋がって。\n僕と日々姫は掴まえあう。
1585 = "然後再一起緊密地連在了一起。我和日日姬用力抱著彼此。" 

# monologue
# JP: もう一秒も――\n離れずずっと、過ごせるように。
1394 = "就像是為了以後每一秒鐘都會在一起一般。" 
