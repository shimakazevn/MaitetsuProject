[script]
# lines: 321 
# 【双鉄H】
# display as 雙鐵
# JP: 「[すす]煤けたなぁ」
1104 = "「整個都弄黑了」" 

# 【日々姫】
# display as 日日姬
# JP: 「ううう～っ……ごめんね、にぃに」
1025 = "「嗚嗚嗚～……對不起，阿哥」" 

# monologue
# JP: （ちゃぽんっ）
1793 = "（消沉）" 

# monologue
# JP: 力無く、日々姫が視線を落としてしまう。\nその先、すなわち湯船の底には、真っ黒なスス。
1530 = "日日姬有氣無力地看向下方。浴池的底部已經積了一層煤灰。" 

# 【日々姫】
# display as 日日姬
# JP: 「あぅぅ～お風呂まで汚しちゃってぇ」
1026 = "「嗚～把浴池都弄髒了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「掃除をするのはどのみち僕らだ。\n磨きに磨いて返せばいいさ」
957 = "「反正最後還是我們打掃。只要好好擦乾淨就可以了」" 

# monologue
# JP: 登呂流湯のご主人は、最近は夜が早くなったということで、\n僕らの乗務後入浴を、締めまで待ってはくれなくなった。
1602 = "登呂流浴場的老闆娘最近晚上會提早回去，我們完成乘務工作來洗澡的時候，她不會等我們洗完再鎖門。" 

# monologue
# JP: 清掃して締めて翌朝に鍵を返して――\n慣れればそれは、非常に気楽な貸し切り入浴方法だ。
1425 = "我們需要打掃之後鎖上門，第二天早上再交還鑰匙。習慣了之後這不失為一個能把浴室包場的好辦法。" 

# 【日々姫】
# display as 日日姬
# JP: 「それはもちろん、がんばってピカピカに掃除ばするけど。\nでも……あああ、投げ込みすぎとか素人みたいに～」
949 = "「之後當然會努力打掃乾淨。可是……唉，煤竟然會投多，簡直跟個新手一樣～」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「集中審議の関係で、少し[ま]間が空いてしまったからな。\nいくらか、勘が狂ったのだろう」
1068 = "「因為有集中審議會，你有一段時間沒做乘務工作了，所以直覺沒那麼準確了吧」" 

# monologue
# JP: 市長職と機関助士と、もちろん絵描きと。
1397 = "市長加上司爐，還有繪畫工作。" 

# monologue
# JP: 周囲の多大な助けもあり、日々姫は自分のペースを作り、\n上手にこなしていたのだが……
1686 = "靠著身邊眾人的幫助，日日姬也把握好了自己的節奏，把這些工作都統統做好了……" 

# 【日々姫】
# display as 日日姬
# JP: 「[ま]間が空いたのもあるし。\nあと……いいとこ見せようとして、張り切りすぎたかも」
1140 = "「畢竟隔了一段時間。還有……可能因為我想展現一下自己，就有點努力過度了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いいところを？」
1082 = "「展現一下自己？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。こないだにぃに、褒めとったでしょお。\n凪ちゃんのこと、めきめき腕を上げてきた――って」
1049 = "「嗯。這之前阿哥不是夸小凪來著，說她水平提高了很多」" 

# monologue
# JP: ライバル心――というよりは、\nもっと単純な独占欲と嫉妬だろう。
1637 = "與其說這是對抗心理，不如說是單純的獨占欲和嫉妒更貼切。" 

# monologue
# JP: そこまで想ってもらえることに、\n男としては、嬉しい気持ちを感じはするが――
1364 = "她會為我心生嫉妒，我作為男人雖然是很高興――" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば気持ちが、少し良くない形で出てしまったな。\n乗務は常に安全第一――技量を張り合うものではない」
1162 = "「那你的感情就是以不恰當的方式表現出來了。乘務工作安全第一，不是在比拼技術」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。ごめんなさい。反省してる」
1047 = "「嗯。對不起。我在反省」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「それに、だ」
1158 = "「還有」" 

# monologue
# JP: （くいっ）
1780 = "（抱）" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
1017 = "「啊」" 

# monologue
# JP: うなだれてしまった日々姫の頭を抱き寄せる。\n顎を持ち上げ、目近で視線を交わし合う。
1609 = "看日日姬垂頭喪氣的，我便抱過她的頭。然後抬起了她的下巴，直視著她。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫は、僕にとってはいつでも一番の機関助士だ。\n一緒に乗務をしていて楽しい――という点においては」
1083 = "「從跟誰一起做乘務工作最開心這一點來說，日日姬對我來說一直都是最棒的司爐」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに」
1170 = "「阿哥」" 

# monologue
# JP: 素直な気持ちが、まっすぐ伝わってくれたのだろう。
1524 = "日日姬應該是理解了我毫不掩飾的心意。" 

# monologue
# JP: 日々姫は嬉しげに微笑んで、\nそして静かに、瞳を閉じる。
1382 = "她露出了欣喜的笑容，然後默默閉上了眼睛。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫」
1122 = "「日日姬」" 

# monologue
# JP: 答えの代わり、甘い息を吐く可憐な唇にキスをする。
1450 = "我沒有回答她，而是吻上了她吐氣如蘭的可愛小嘴。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……ちゅっ――ちゅっ――ちゅむっ――――れるっ」
1038 = "「嗯……啾――啾――啾噗――啾嚕」" 

# monologue
# JP: 唇だけでついばみあって、\n吐息が熱くなったところに、日々姫の舌が割り込んでくる。
1421 = "我們互相含著對方的舌頭，就在兩人的氣息逐漸升溫的時候，日日姬把舌頭伸了進來。" 

# 【日々姫】
# display as 日日姬
# JP: 「ちゅうっ――んっ――れるっ――じゅるっ――――\n（じゃりっ！）　っ！！？」
1024 = "「啾――嗯――啾嚕――啾嚕――（嘎嘣！）嗯！！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「むっ！」
977 = "「呃！」" 

# monologue
# JP: 歯の裏側を優しくやらしく這ってた舌が、\nそこから何か――硬質なものを掻きだして来る。
1376 = "她的舌頭輕輕刮著我的牙齒內側，從那裡刮出來了一塊硬硬的東西。" 

# 【日々姫】
# display as 日日姬
# JP: 「んぺっ！　んえっ、あっ――やだ――\nにぃにのお口の中にまでススのかたまりっ」
984 = "「呸！　哎，啊――真討厭――阿哥連嘴裡都有煤塊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……湯に浸かる前、髪も体も口も目も。\n徹底的に洗ったつもりだったのだがなぁ」
788 = "「……在開始泡澡之前，我本來打算把頭髮、身上、嘴裡和眼睛都洗乾淨來著啊」" 

# monologue
# JP: しかし実際、“つもり”の力不足なら、\n湯船に沈む真っ黒なススが既にして証明している。
1591 = "然而實際沒有達到預期的目標。浴池裡面沉著的一層黑色煤灰就是證據。" 

# monologue
# JP: とはいえ、まさか口内にまで\nススの侵入を許していたとは――
1592 = "然而我可真沒想到嘴裡也進了煤塊――" 

# monologue
# JP: （ざばあっ！）
1755 = "（嘩啦！）" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　洗おう、もういっぺんっ！」
1171 = "「阿哥！那就再洗一遍！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
1050 = "「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「じゃ、はいっ！　ごろーんって」
1062 = "「嗯，好！你翻一下身」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ！　ごろーんっ――ごろーんっ？」
1059 = "「嗯！我翻――我翻」" 

# 【日々姫】
# display as 日日姬
# JP: 「よくできました！」
1078 = "「就是這樣！」" 

# monologue
# JP: （ぷりゅんっ！）
1746 = "（咕嚕！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1182 = "「！」" 

# monologue
# JP: 僕を仰向けに寝転がらせて、\n日々姫は自分の体をその上に乗せてくる。
1551 = "日日姬讓我面朝上躺著，然後跨到了我的身體上方。" 

# monologue
# JP: （とろぉ……ろ――）
1756 = "（嘩啦）" 

# monologue
# JP: そして勃起に、ボディーソープがかけられる。
1587 = "然後她把沐浴液淋在了我的肉棒上。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん～～――――ンム～っ」
1065 = "「嗯～～――――嗯～」" 

# monologue
# JP: （ねとおおおっ）
1747 = "（咕嚕）" 

# monologue
# JP: その上に、唾液をたっぷり垂らしまぶして――
1349 = "在此之上還淋上了一層唾液――" 

# 【日々姫】
# display as 日日姬
# JP: 「いもうとタオルも、\nきっとにぃにの一番になれると思うけん」
1097 = "「我這條妹妹毛巾，一定會成為阿哥的最愛」" 

# monologue
# JP: （にゅるううううっ！）
1788 = "（摩擦）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「――っ！」
# 1182 = "「！」" 

# monologue
# JP: 背筋にぞくぞく来る快感。
1405 = "快感源源不斷地傳來，讓我舒服得顫動起來。" 

# monologue
# JP: 日々姫の体はあわあわ滑り、\n滑りながらもしっとり張り付き摩擦してくる。
1548 = "日日姬的身體在我身上滑動著，同時還緊緊貼合著我。" 

# monologue
# JP: （しにゅっ――ずるうううっ――しゅるぅっ――）
1768 = "（噗滋――噗嚕――）" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……これ……ん……タオルな……私、も……\n気持ち……い……んっ――ふっ――」
1014 = "「啊……這樣……嗯……我這條……毛巾也……好舒服……嗯――呼――」" 

# monologue
# JP: ぽかぽかと、日々姫曰くの、\nいもうとタオルが温まってくる。
1525 = "日日姬所說的妹妹毛巾也越來越暖和了。" 

# monologue
# JP: あっという間に導きだされた先走り汁が、\nかすかな胸の谷間に挟まれ、泡と唾液と交じり合う。
1648 = "被她這麼一刺激，我的肉棒馬上分泌出了黏液，在她不深的乳溝中跟泡沫和唾液混合在了一起。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……ふっ――あっ――んっ……ん……\nどぉお？　にぃにも……気持ち……いい？」
1034 = "「嗯……呼――啊――嗯……嗯……怎麼樣？阿哥也……舒服嗎……？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1050 = "「嗯」" 

# monologue
# JP: この体勢で射精をもしもしてしまうなら、\n自分の顔に精液を受けることとなりかねない。
1599 = "現在這個姿勢如果射精的話，可能會射到自己的臉上。" 

# monologue
# JP: そう理解しても射精衝動に負けそうな程、日々姫のタオル、\nいもうとタオルは僕を絶妙にコスって包む。
1595 = "然而日日姬化成的這條妹妹毛巾恰到好處地磨蹭著、包裹著我，讓我即使明白會射到自己臉上也忍不住射精衝動。" 

# 【日々姫】
# display as 日日姬
# JP: 「ね？　にぃに――んっ……聞かせ、て？　にぃにの――\n声で――あっ――どんな、風に――気持ち、いい、のか」
1163 = "「那個，阿哥――嗯……我想聽、阿哥的――說出來――啊――具體是――怎麼樣的舒服」" 

# monologue
# JP: 言わされるのか――そんな戸惑いを感じるけれど、\n日々姫の望むことならば、もちろん叶えてやるだけだ。
1675 = "還想要我說出來啊――我雖然有些迷惑，不過既然日日姬想聽，那我就自然要說。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「泡と……肌とが、絶妙にすべり、摩擦して、んっ……\n日々姫の胸――の、谷間の骨が……こりこり、してて」
1135 = "「泡沫和……肌膚的滑動跟摩擦恰到好處，嗯……日日姬的胸部――乳溝下的骨頭……硬硬的」" 

# 【日々姫】
# display as 日日姬
# JP: 「骨っ！？」
1181 = "「骨頭！？」" 

# monologue
# JP: 日々姫がぴたりと止まってしまう。\n頬もぷっくり、可愛く膨れる。
1559 = "日日姬馬上停止了動作，然後氣得鼓起了腮幫。" 

# 【日々姫】
# display as 日日姬
# JP: 「骨って、骨ば気持ちよくなかとでしょーよ？\nぷりぷりおっぱいに挟まれて、それが最高とかでしょお」
951 = "「什麼骨頭，不應該說是骨頭舒服吧。應該說是被軟軟的乳房夾住感覺最棒了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「おっぱい。挟まれて」
1150 = "「被乳房夾住」" 

# monologue
# JP: 自分の漏らした呟きを、\n検索ワードのようだと感じる。
1439 = "我感覺自己嘀咕的這句話裡包含了幾個關鍵字。" 

# monologue
# JP: そう感じざるを得ないほど――ほんの一瞬だけれども、\n行為と言葉が直結してはくれてなかった。
1598 = "現在我只能想到這個。我暫時沒能把行為跟語言聯繫在一起。" 

# 【日々姫】
# display as 日日姬
# JP: 「ど、どぎゃんしてオウムがえしばしよっと！？」
943 = "「不、不然還要怎麼辦！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、いや――」
981 = "「呃，這個――」" 

# monologue
# JP: 言われて見れば、僕の胸板をこしゅこしゅと、\n日々姫の乳首は硬さをもってコスってくれてた。
1621 = "聽日日姬這麼一說，她確實是在用硬硬的乳頭摩擦著我的胸。" 

# monologue
# JP: だが、おっぱいと言われても……\n日々姫の胸には、挟めるほどのボリュームがない。
1291 = "但是要說是乳房……日日姬的胸部還沒大到能夾住東西。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「挟む、というなら――」
1151 = "「要說夾起來的話」" 

# monologue
# JP: （むにいいいっ）
1781 = "（揉搓）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃんっ！？」
965 = "「呀！？」" 

# monologue
# JP: 触れて触れてと勃起し震える、\n日々姫の乳首をそうっとつまむ。
1539 = "日日姬的勃起的乳頭不住顫抖著，就好像在引誘我去揪住。" 

# monologue
# JP: つまんだままにいくらか引っ張り、\n控えめすぎるおっぱいに仮初めのボリュームを与えてみる。
1447 = "我揪住她的乳頭一拉，給平坦的胸部比出了一個假想的大小。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「この位には大きくないと、\nいささかの無理が[しょう]生じんか？」
1148 = "「至少要這麼大吧，不然就太勉強了」" 

# 【日々姫】
# display as 日日姬
# JP: 「いっ、いささかの無理も[しょう]生じんもんっ！」
1098 = "「才、才不勉強」" 

# monologue
# JP: （きゅううっ）
1773 = "（夾住）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1182 = "「！」" 

# monologue
# JP: 腕の力を強くして、日々姫が無理やり、\n僕の勃起をおっぱいで……
1558 = "日日姬雙臂用力，生生用胸部夾住了我的肉棒……" 

# monologue
# JP: まぁ、これならば“挟んでいる”と言えなくもない\n密着度合いで、左右から圧し刺激してくる。
1341 = "呃，這樣的話也可以說叫“夾住了”。她把握著我們身體相貼的距離，從左右兩邊向內擠著。" 

# monologue
# JP: （しにゅっ――しゅっ――もみゅっ――きゅむっ）
1787 = "（搓動套弄）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ」
# 1050 = "「嗯」" 

# monologue
# JP: そうして、動く。
1586 = "然後她動了起來。" 

# monologue
# JP: さっきのように単調な前後運動だけでなく、\n挟む強さやこする角度を、細かく変化させながら。
1670 = "這次不是剛才那樣單調的前後運動，而是在夾的力度上還有摩擦的角度上都有些許的變化。" 

# monologue
# JP: （こしゅっ――むにゅっ――しゅにゅっ――こりゅっ）
# 1787 = "（搓動套弄）" 

# 【日々姫】
