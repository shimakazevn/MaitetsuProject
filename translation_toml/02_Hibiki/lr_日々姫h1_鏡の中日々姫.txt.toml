# monologue
# JP: 滴る汗が背中に落ちて、日々姫の汗と混じり合う。\n溶け合うしずくは背中をつたい、結合部へと滴り落ちる。
1629 = "Những giọt mồ hôi rơi xuống lưng, hòa lẫn với mồ hôi của Hibiki.\nNhững giọt nước hòa quyện lăn dọc theo lưng, nhỏ xuống nơi chúng tôi đang kết nối."
