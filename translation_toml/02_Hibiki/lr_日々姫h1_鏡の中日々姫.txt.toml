# lines: 339 
# 【日々姫】
# display as 日日姬
# JP: 「に・ぃ・に」
1314 = "「阿·哥」" 

# monologue
# JP: 日々姫の声だ。とても機嫌が良いときの。
1624 = "是日日姬的聲音。她的聲音聽起來特別高興。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした」
1186 = "「怎麼了？」" 

# monologue
# JP: 言った瞬間、記憶とつながる。
1488 = "我剛說完就想起來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さっき宅配便を受け取っていたようだが――\nなにか、いいものでも届いたか？」
1000 = "「你剛剛好像收到了快遞——收到什麼好東西了嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　思ってたよりずうっといいもの。\nしかもね？　にぃににとっても多分、すっごく」
1151 = "「嗯！比想像中要好得多的好東西。而且啊，對你來說也是特別好的東西」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、それは楽しみだ。ぜひ見せてくれ」
1157 = "「嚯，那我真是很期待。請務必讓我看看」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
1149 = "「嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！？」
1123 = "「啊！！！？」" 

# 【日々姫】
# display as 日日姬
# JP: 「って！　にぃに、おおげさ！\nけど――えへへっ！　声もでないくらいにかわゆかと？」
1125 = "「喂！阿哥你太誇張啦！可是——哎嘿嘿！可愛到都讓你叫出來了咧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いやっ」
985 = "「不」" 

# 【日々姫】
# display as 日日姬
# JP: 「きゃんっ！！？」
1041 = "「呀！！？」" 

# monologue
# JP: 日々姫を引き込み鏡の前に座らせる。\n足を――大きく開かせる。
1503 = "我將日日姬拉過來在鏡子前坐下。然後——分開她的雙腿。" 

# 【双鉄】
# display as 雙鐵
# JP: 「声が出ぬほど驚かされたが――\nかわいいから、が一番強い理由ではない」
1328 = "「雖然確實是驚訝得叫出聲了——但可愛不是最大的理由」" 

# 【日々姫】
# display as 日日姬
# JP: 「えー、かわゆくなかとー？」
1089 = "「哎，不可愛嘛？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、それは二番目だ。正直凄まじく可愛いが、\nそれでも、一番おおきな衝撃にはとても及ばない」
1305 = "「這是第二大的理由。雖然確實是特別可愛，但完全比不上最大的衝擊」" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへっ！　やっぱりかわゆかとよね～\nにゃんにゃんにゃんこ。お耳もおしっぽもついてるし～」
1086 = "「哎嘿嘿！　果然很可愛對吧～貓咪貓咪小貓咪，耳朵尾巴毛茸茸咧～」" 

# monologue
# JP: 僕をじいっと見上げるままに微笑めば、首元の鈴も\nちりん、と揺れる。確かに、可愛い。可愛いのだが――
1438 = "她抬頭看著我微笑，脖子上的鈴鐺也“叮鈴”地晃動。確實很可愛。雖然很可愛——" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。僕を見上げるのではなく、正面を、鏡を――\nより厳密には、鏡に写る自分の姿を見てほしい」
1245 = "「日日姬，你不要抬頭看我，而是看正面的鏡子——準確來說是鏡子裡的自己」" 

# 【日々姫】
# display as 日日姬
# JP: 「正面の鏡？　っっっっっっ！！？」
1266 = "「正面的鏡子？　啊啊啊啊啊啊！！？」" 

# monologue
# JP: 絶句する。そうして顔が全身が、一気にボっと赤くなる。\n――これは、たまらん。もっと照れさせたくなってくる。
1431 = "她啞口無言，然後臉和全身一口氣變紅。——這真讓人把持不住。讓人想看她更害羞的樣子了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「な？　素晴らしく可愛らしくはあるのだが――\nもっと強く、感じてしまう気持ちがあるよな？」
1177 = "「對吧？雖然很可愛很漂亮——但應該還有另外的更強烈的感想吧？」" 

# 【日々姫】
# display as 日日姬
# JP: 「はぅっ……だって、私――普通に立って、\n姿見で確かめたときには、こぎゃん――こぎゃん――」
1082 = "「哈嗚……可是我——在站著看自己的樣子的時候都沒有感覺——感覺——」" 

# monologue
# JP: 唇だけがあえかに動き、言葉が出なくなってしまう。\nゆえに、促す。やさしく、静かに――
1428 = "她只有嘴唇勉強在動，聲音卻發不出來。因此，我溫柔地、平靜地催促她——" 

# 【双鉄】
# display as 雙鐵
# JP: 「こぎゃん、なんだ？」
1194 = "「感覺什麼？」" 

# monologue
# JP: （さわっ）
1794 = "（撫摸）" 

# 【日々姫】
# display as 日日姬
# JP: 「ひゃうんっっ！！」
1035 = "「呀嗚！！」" 

# monologue
# JP: ほんの一瞬胸に触れれば、日々姫が照れてもぞもぞ動く。\nパンツの股間にじわじわと染みが滲み始める。
1492 = "我只是摸了一下胸部，日日姬就羞澀地扭動。內褲的中間也開始滲出斑點。" 

# 【日々姫】
# display as 日日姬
# JP: 「こぎゃん――ここまでエッチな感じになるなんて……\nわたし、全然、思ってなくって――」
1193 = "「感覺——那麼下流……我完全沒想到——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――うむ。デザイナーとしていかがなものかな。\n想像力が、欠如しすぎと言わざるを得ない」
1304 = "「這——唔，我覺得身為設計師說這種話可不好。這不得不說是欠缺想像力的表現」" 

# 【日々姫】
# display as 日日姬
# JP: 「うぅ～～っ」
1126 = "「嗚嗚～～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「実際、ほんの少し考えるだけで――\n想像力を、飛躍させる必要さえなく」
1173 = "「實際上只要稍微想想——甚至根本不用多麼浮想聯翩」" 

# monologue
# JP: （さすっ）
# 1794 = "（撫摸）" 

# 【日々姫】
# display as 日日姬
# JP: 「んくんっ！！」
1142 = "「嗯嗚！！」" 

# monologue
# JP: 乳首を親指の腹で撫ぜる。\n日々姫の汗がじわじわと増し、甘い匂いが徐々に濃くなる。
1526 = "我用食指撫摸隔著胸罩都能很明顯地看出來的乳頭。日日姬的汗越流越多，甘甜的香氣也越來越濃郁。" 

# 【日々姫】
# display as 日日姬
# JP: 「ぁ――やぁだっ」
1101 = "「啊——呀」" 

# monologue
# JP: 甘えた声が、嫌がるフリが、鼓膜から脳を麻痺させる。\nもうガチガチになってる勃起をズボンごと強く押し付ける。
1442 = "她的嬌喘，她不甘願的姿態從鼓膜麻痺了我的大腦。已經變得堅硬的勃起往上頂著褲子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これほどいやらしく愛らしく、僕の視線を釘付けにする、\n小ぶりで可憐なおっぱいが、露出するともすぐに解ろう」
1184 = "「很容易就能想到，這麼可愛又下流的，深深吸引著我的視線的嬌小胸部會露出來的吧」" 

# monologue
# JP: （さわっ――さすっ――もみゅっ――くにっ――）
1793 = "（撫摸——撫摸——揉捏——滾動——）" 

# 【日々姫】
# display as 日日姬
# JP: 「小ぶり、って――ん……ぁ――にぃにっ――\nにぃに――にぃにぃ」
1169 = "「嬌小——嗯……啊——阿哥——阿哥——阿哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん？」
1156 = "「嗯？」" 

# monologue
# JP: いつもより上ずる『にぃに』が可愛い子猫の声に聞こえる。\nどこまでだって、甘やかしたくなってしまう。
1409 = "叫得比平常要更尖銳的“阿哥”聽起來就像是可愛的小貓叫聲。讓我想要好好地疼愛她一番。" 

# 【日々姫】
# display as 日日姬
# JP: 「おっぱい。おっぱい――このまま小ぶりじゃいややけん。\nもっと、おっきくなるように――ね？　お願い、にぃに」
1287 = "「胸部，胸部——我不想讓它這麼小。我想讓它更大——好嗎？拜託你，阿哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「こういうことか？」
1004 = "「你是指這樣？」" 

# monologue
# JP: （くにゅっ――つっ――ぱっ！）
1785 = "（揉捏——拉——扯！）" 

# 【日々姫】
# display as 日日姬
# JP: 「ぁっ！　うっ――んっ――」
1122 = "「啊！嗚——嗯……」" 

# monologue
# JP: 軽く乳首を引っ張り離す。ほんの一瞬、みかけは膨らんだ\nおっぱいに――けれど日々姫は、その頬までも膨らます。
1533 = "我輕輕地拉扯乳頭然後放開。雖然胸部膨脹了一瞬間——但日日姬鼓起了臉頰。" 

# 【日々姫】
# display as 日日姬
# JP: 「そういうことじゃなかとよぉ。\nもっと――ね？　もっと――おっぱい、全体を――ん！」
990 = "「不是這樣。而是範圍再大——胸部的整體——嗯！」" 

# monologue
# JP: （さわっ――さすっ――もみゅっ――ふにゅん）
1792 = "（撫摸——撫摸——揉捏——揉捏）" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　ふっ――あっ……にぃにの、おてて――\nきもち……よか――んっ――もっと、ね？　おっぱい」
1118 = "「啊！　呼——啊……阿哥、的手——好……舒服——嗯——繼續揉胸部」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……『おっぱいを欲しがる子猫ちゃん』か。\n字面だけなら、まるで童話のようでもあるが」
757 = "「……“想要吃奶的小貓咪”嗎。光看字面的話就像是童話一樣」" 

# monologue
# JP: （さわっ――さすっ――くりゅっ――もみゅっ）
# 1792 = "（撫摸——撫摸——揉捏——揉捏）" 

# 【日々姫】
# display as 日日姬
# JP: 「やぁん――そぎゃんこと――言われたら、ん――\nはずかしく――なっちゃう、けんっ」
1036 = "「呀嗯——你說這種話——嗯——我會——害羞的咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「絵面は完全に18禁だ。見えるか？　日々姫。\n――自分の腰が、股間がどうなってるいるのかを」
1164 = "「場面已經完全是十八禁了。你能看到嗎？日日姬。——自己的腰，股間變成什麼樣了」" 

# 【日々姫】
# display as 日日姬
# JP: 「ふぁ――はっ――あ――見える、と、見え、ます。\n私の、おまた――うずうず、勝手に、動い、ちゃってる」
1057 = "「呼啊——哈——啊——能看見，能、看見。我的、下面——自己在、一下一下地、動」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その中心は、おまんこは一体どうなっている？」
993 = "「中心，小穴那裡怎麼樣了？」" 

# 【日々姫】
# display as 日日姬
# JP: 「おまんこ――私の、おまんこ――は――（ごくっ）」
1180 = "「小穴——我的、小穴——（咽口水）」" 

# monologue
# JP: はぁはぁ、ひどく荒い息。\nくっついている部分の全てが、ふたりの汗で貼り付きあう。
1433 = "她在急促地喘氣。我們緊貼著的地方已經被兩人的汗水給黏住了。" 

# 【日々姫】
# display as 日日姬
# JP: 「愛液……しみ、て――ぐしょぐしょ……で――\nん……ショーツ……べったり――貼り付い、ちゃって」
1019 = "「全是……愛液——不停地流……嗯……內褲……貼在——上面」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに気持ち悪そうだな。脱がせたほうがいいだろう。\nん――」
1268 = "「看起來確實似乎很不舒服啊。脫掉比較好吧。嗯——」" 

# monologue
# JP: サイドが紐になっている。\nならば、これをほどけば恐らく――
1400 = "內褲邊上是細繩綁著的。那麼只要解開它的話，或許——" 

# monologue
# JP: （するっ――ぺりっっ）
1833 = "（解開——滑落）" 

# 【日々姫】
# display as 日日姬
# JP: 「やぁん」
1038 = "「呀嗯」" 

# monologue
# JP: 愛液で、布地がびたりと貼り付いている。\nゆえ、そこをゆっくり。わざとゆっくり剥がしてく――
1476 = "布料因為愛液而緊緊貼在上面。因此我故意慢慢地將布料剝下——" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……」
1110 = "「啊……」" 

# monologue
# JP: 片紐を解いただけで、露出する。\n日々姫の可愛いおまんこも、控えめに震えるアナルも。
1408 = "只是解開一邊的繩索就露了出來。日日姬可愛的小穴，還有微微發抖的後庭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……いやらしいな。凄まじく強いかわいいを、\nその何倍も色濃いいやらしさが、覆い隠してる」
772 = "「……真下流。居然把這麼可愛，但要更加下流好幾倍的東西隱藏在下面」" 

# 【日々姫】
# display as 日日姬
# JP: 「う……ん――エッチ。\nわたしも、にぃにも、すごく、エッチ」
1132 = "「嗯……好下流。我和阿哥都好下流」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　僕もか？」
1099 = "「唔？我也是？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん、だって。にぃにのお手手――ひゃんっ！」
1154 = "「嗯，因為阿哥的手——呀嗯！」" 

# monologue
# JP: （もみゅっ――さすっ――こしゅっ――もゆんっ）
1788 = "（揉捏——撫摸——按壓——揉捏）" 

# monologue
# JP: 健気なおねだりをされてたことを思い出す。\n遅ればせながらゆっくり大事に、日々姫の胸を揉みしだく。
1518 = "我想起她方才在懇求我。於是我緩慢地，小心翼翼地撫摸日日姬的胸部。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の手が、どうした？」
1212 = "「我的手怎麼了？」" 

# 【日々姫】
# display as 日日姬
# JP: 「鏡の中でも――んっ――おっき、くって――硬そう、で\n――すごく、男の――人な、感じ――私と――比、べて」
1161 = "「在鏡子裡也能看出——嗯——很大——很硬——很有、男人——氣息——和我——相比」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1023 = "「原來如此」" 

# monologue
# JP: 僕という色気もなにもないキャンバスが対比物となり、\nいっそう日々姫を、その可憐な色香を引き立てている。
1419 = "和“我”這幅毫無誘惑可言的畫布作對比，更加突顯了日日姬那清純的色香味。" 

# monologue
# JP: （もみゅ――くりゅっ――こにゅん――ふにゅう）
1787 = "（揉捏——按壓——刺激——揉捏）" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……はっ――やけ、ん――やけん、ね？　にぃに。\n私――私。私っ――見たかとっ――んっ！」
1111 = "「啊……哈——所以——所以啊，阿哥。我——我。我——想看——嗯！」" 

# monologue
# JP: （こしゅっ――もみゅっ――くりゅっ――むみゅっ）
# 1787 = "（揉捏——按壓——刺激——揉捏）" 

# 【双鉄】
# display as 雙鐵
# JP: 「見たい。何をだ？」
1188 = "「想看什麼？」" 

# 【日々姫】
# display as 日日姬
# JP: 「おちん、ちん――にぃにの――かっこよか、おちんちん。\n鏡の、中、で、も――んっ――わたし、みた、かとっ」
1181 = "「小雞、雞——阿哥的——帥氣的、小雞雞。就算是、鏡子、裡的——嗯——我也、想看」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1056 = "「呼唔」" 

# monologue
# JP: （ちぃぃぃぃぃぃぃっぃっ）
1749 = "（吱——————————）" 

# monologue
# JP: ジッパーを下ろし、勃起を取り出してから気づく。\nこの体勢では、勃起は下敷きになるだけか――なら――
1519 = "我拉下拉鏈，掏出勃起之後才發現。這個姿勢的話勃起會被壓在下面——那麼——" 

# monologue
# JP: （ぐいっ）
1783 = "（拉扯）" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ――熱っ――にぃに――こんなに――\nわたしで、おっきく――して、くれてっ――はぁっ」
1107 = "「啊——好熱——阿哥——都這麼——因為我、變這麼——大了——蛤啊」" 

# monologue
# JP: 背中にべったり勃起を押し付けそのままゆるく上下する。\n日々姫は見えない勃起にも、満足したような息を吐く。
1502 = "我將勃起緊緊地壓在她的背上，開始慢慢地上下活動。雖然日日姬看不見勃起，但她還是在滿足地吐氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「背中にあたる勃起の長さで――日々姫。\nお前の膣のどのあたりまでいくか、教えてほしい」
1217 = "「我貼在你背上的勃起的長度——能夠頂到你裡面多深的位置？日日姬，希望你告訴我」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――（ごくり）」
1109 = "「啊——（咽口水）」" 

# monologue
# JP: 日々姫は目を閉じ、唾を飲み込む。\n背中を強く勃起に押し付け、長さを正しく測ろうとする。
1619 = "日日姬閉上眼睛，咽了口唾沫。她將背後用力地往勃起上壓，試圖測量正確的長度。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにの、おちんちん――\nわたしの……膣、の――」
1322 = "「阿哥的、小雞雞——我的……裡面的——」" 

# monologue
# JP: 日々姫の目が下腹に向く。真白い指がゆっくりと、\n下腹部と臍の中間よりも、臍よりのあたりに当てられる。
1618 = "日日姬的雙眼看向下腹部。她白皙的手指緩慢地從下腹部和肚臍的中間，摸向肚臍的附近。" 

# 【日々姫】
# display as 日日姬
# JP: 「きっと、ね？　この、へん。にぃにのおちんちん、\nいっつもね？　私のおなかのこの辺まで、えぐっとぉと」
1284 = "「肯定是、這附近。阿哥的小雞雞總是能頂到我肚子的這附近」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなに深くか。\nならば、その奥あたりが子宮になるのか？」
1264 = "「有這麼深嗎。那麼，這邊附近就是子宮了嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……あ、うん。わかんない、けど――\nきっと、そう。だって――」
1113 = "「啊……啊，嗯。雖然我不太清楚——但肯定是的。因為——」" 

# monologue
# JP: （とんっ）
1758 = "（咚）" 

# monologue
# JP: 日々姫の指が、その下腹をかるぅくつつく。\n振動が、薄く柔らかな体越し、押し当てている勃起に響く。
1606 = "日日姬的手指輕輕地戳了戳下腹部。振動隔著她又薄又柔軟的肌膚，傳達到我壓在她背後的勃起上。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにの、おちんちん、押し当てられて――\n私――この辺、うずうず、きゅんきゅん、しとるけん」
1323 = "「阿哥的、小雞雞、壓在這裡——我這個地方、癢癢的、緊緊的咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1331 = "「！！」" 

# monologue
# JP: 解説が、予想以上にいやらしくってすばらしい。\nもっと聞きたく――日々姫をもっと――融かしたくなる。
1445 = "她的解說比我想像中的要下流得多，我相當受用。我想繼續聽——讓日日姬的興致——越來越強烈。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、日々姫。今一度、僕に教えて欲しいのだけれど」
1248 = "「日日姬，我希望你再說一遍」" 

# monologue
# JP: （さわっ――もにゅっ――もみゅっ――くりゅんっ）
1790 = "（摩挲——按壓——按壓——滑溜）" 

# 【日々姫】
# display as 日日姬
# JP: 「んふっ――あっ――にぃ、にっ――なに、をっ？」
1139 = "「嗯呼——啊——啊、哥——說、什麼？」" 

# monologue
# JP: 日々姫の処女を捧げてもらった、あの甘い夜を思い出す。\nあの夜も、日々姫は僕に、教えてくれた。
1516 = "我想起了日日姬將初夜奉獻給我的那甜蜜的一晚。那一晚，日日姬告訴過我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の勃起は、どこから日々姫を貫いて――\nそんな深くまで、亀頭を届かせるのだろう」
1210 = "「我的勃起能從哪裡把你頂穿——龜頭能碰到多深的地方呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
1114 = "「啊」" 

# monologue
# JP: 小さな声。驚いたような――嬉しげな。
1449 = "她驚訝——但又欣喜地輕輕叫了一聲。" 

# 【日々姫】
# display as 日日姬
# JP: 「あの、ね？　にぃに」
1282 = "「聽我說哦，阿哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1094 = "「唔！！！」" 

# monologue
# JP: 日々姫がおまんこを拡げてくれる。\n処女だったときと、おんなじように――
1588 = "日日姬將小穴分開。和她還是處子時的那個時候一樣——" 

# 【日々姫】
# display as 日日姬
# JP: 「ここ、が――膣口――ん……\nにぃにの、おちんちん、を、ね？　――こぎゃん、して」
1306 = "「這裡——陰道口——嗯……阿哥的、小雞雞、就像這樣」" 

# monologue
# JP: （つっ――ぷっ――くっ――ぐ――）
1807 = "（滋——噗——咕——咕——）" 

# monologue
# JP: いや違う。僕の勃起を僕の精子を何百度となく受け止めて。\nそれでも綺麗な桃色をした膣の中へと、指が、沈む。
1377 = "不對。日日姬的肉穴雖然已經容納了我的勃起、我的精子好幾百次，但依舊保持著漂亮的桃紅色。她將手指沉入其中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「改めてみると凄いな――こうして拡がり入っていくのか。\n……綺麗だ、信じられないくらいに――綺麗で、淫靡で」
1013 = "「像這樣細細一看真的覺得很驚人——是像這樣子分開這個地方進入的啊。……漂亮得令人難以置信——又漂亮又下流」" 

# monologue
# JP: 見入ってしまう。中指と人差し指を揃えて並べ、\n小さな膣口を拡げつつ、日々姫は膣奥へ挿入していく。
1482 = "我不禁看得入神。日日姬一邊用中指和食指分開小小的入口，一邊慢慢地插入內部。" 

# 【日々姫】
# display as 日日姬
# JP: 「私の――お指、は――にぃにの、おちんちん、より――\nずっと――ずうっと、短い、けん――ここ、まで、しか」
1205 = "「我的——手指——比阿哥的、小雞雞要——短很多——只能到這裡」" 

# monologue
# JP: （こりっ――ぞりっっ）
1755 = "（咕溜——咕溜）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
1097 = "「唔！！！！！！」" 

# monologue
# JP: 日々姫が指を折り曲げて、膣壁内をぞりぞりひっかく。\nその振動が背中を通じ、僕の勃起にぞわぞわ届く。
1591 = "日日姬彎曲手指撓著肉壁。產生的振動通過後背傳達到了我的勃起。" 

# monologue
# JP: （すごい、な――これは――日々姫の膣内の構造を、\n日々姫が僕に――懸命に伝えようとしてくれている――）
1779 = "（太刺激了——日日姬是努力地想將她內部的構造傳達給我——）" 

# monologue
# JP: その健気さが、勃起を硬く、熱くする。\n勃起の熱が、膣内で蠢く日々姫の指にも、恐らく伝わる。
1444 = "她的積極讓我的勃起變得更硬更熱。勃起的炙熱或許也傳達給了在陰道內蠢動的日日姬的手指。" 

# 【日々姫】
# display as 日日姬
# JP: 「一番、奥、まで――私の、お指じゃ……たりない、けん。\nだから――ね？　――にぃ、ん……。ん…………………」
1213 = "「我的手指——碰不到最裡面。所以啊……阿哥……嗯…………………」" 

# monologue
# JP: すうはぁすうはぁと、荒い呼吸が数秒続く。\n待ちたい。けれど、ほんの数秒足らずで僕は焦れてしまう。
1447 = "她粗暴的呼吸持續了數秒鐘。雖然我很想等待，但沒過幾秒我就忍不住了。" 

# monologue
# JP: （さわっ――さすっ――もみゅっ――くにゅっ）
1791 = "（摩挲——摩挲——揉捏——咕溜）" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ！　やっ――いま、いたずら、しちゃっ」
1148 = "「嗯！　呀——現在，逗弄的話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。僕に、おしえてほしい」
1250 = "「日日姬，我想讓你告訴我」" 

# monologue
# JP: 耳元で、可能なかぎりに低く優しくささやきながら、\n汗ばむ乳首をおっぱいを、ゆるゆると揉む。
1486 = "我儘可能低聲在她的耳邊低語，並來回揉捏她布滿汗水的胸部，乳頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の指では足りないと――どうなるん――っ！！」
1005 = "「你發現自己的手指不夠長時——會怎麼辦——！！」" 

# monologue
# JP: （くっ――ちぃぃぃぃ）
1750 = "（咕——吱）" 

# 【双鉄】
# display as 雙鐵
# JP: 「……日々、姫」
768 = "「……日日、姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「はぅ……ぁ…………ぁっ……」
1083 = "「哈嗚……啊…………啊……」" 

# monologue
# JP: ピースサインを、膣内で。\n日々姫は膣口を大きく拡げ、その奥を僕に見せようとする。
1589 = "日日姬將食指，中指分成Ｖ字形，分開入口，想要讓我看清楚她的裡面。" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
758 = "「…………」" 

# monologue
# JP: 見とれてしまう。見入ってしまう。\n奥は暗がりであるけれど、入り口付近ははっきり見える。
1530 = "我看入了神。雖然裡面一片黑暗，但入口附近能看得清清楚楚。" 

# monologue
# JP: （蠕動、している。ひくついている――\nこんなにも濃いピンク色で――濡れて、ぬらつき――）
1777 = "（在蠕動、而且在抽動——這麼深的粉紅色——又濕又滑——）" 

# 【日々姫】
# display as 日日姬
# JP: 「お指の届く……とこより、先、は――ぁ――はあっ――\nにぃに――にぃに、が――にぃにの、おめめ、で――」
1219 = "「手指能碰到的地方……更裡面——啊——蛤啊——阿哥——阿哥的視線——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
1239 = "「日日姬」" 

# monologue
# JP: 何かライトを――瞬間浮かんだ思考をけれど、すぐに消す。\n一瞬たりと、鏡の中の日々姫から目を逸らしたくない。
1512 = "我想找個東西照亮——我一瞬間產生了這個想法，但很快就抹去了。我一瞬間都不想從鏡子裡的日日姬身上移開視線。" 

# 【日々姫】
# display as 日日姬
# JP: 「はぁ……はぁっ……はぁっ……はぁっ――」
1292 = "「蛤啊……蛤啊……蛤啊……蛤啊——」" 

# monologue
# JP: 呼吸の度に、膣壁も呼応し縮まり広がる。\n中にあるのが勃起なら――思えば、全身がぞわぞわとする。
1440 = "她每呼吸一次，肉壁也跟著陣陣收縮。若是我的勃起插進裡面——我光是想就忍不住渾身打寒戰。" 

# 【双鉄】
# display as 雙鐵
# JP: 「とても、綺麗だ。日々姫は――」
1002 = "「你好美」" 

# monologue
# JP: 処女だった日を、また思い出す。\n外観は、ほとんどなにも変化していない気がするけれど
1490 = "我又想起了她還是處子的時候。雖然外表上似乎沒什麼變化——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……日々姫は、これほど美しい――\n女に、なったのだな」
769 = "「……日日姬成長成這麼美麗的女性了啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、に、私――」
1321 = "「阿哥、我——」" 

# monologue
# JP: （さすっ）
# 1794 = "（撫摸）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
# 1097 = "「唔！！！！！！」" 

# monologue
# JP: 日々姫の指が正確に、\nその膣内から僕の亀頭の付け根をさする。
1605 = "日日姬的手指準確地從陰道內撫摸我的龜頭的根部。" 

# 【日々姫】
# display as 日日姬
# JP: 「女に。して、もらったけん」
1254 = "「是你讓我成為女人的」" 

# monologue
# JP: ――日々姫は僕を知ってくれてる。\n目に見えずとも解るほど、僕を覚えてくれている。
753 = "——日日姬了解我的形狀。哪怕眼睛沒有在看，她也徹底記住了我的身體。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
# 1239 = "「日日姬」" 

# monologue
# JP: 胸が、股間が熱くなる。\n苦しいほどに、狂おしいほど、切なくなって、愛しくなる。
1527 = "我的胸口，股間開始發燙。我對她的憐愛之情甚至令我痛苦、令我幾乎要發狂。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。好きだ。愛している」
1247 = "「日日姬，我喜歡你，我愛你」" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ――」
1100 = "「啊——」" 

# monologue
# JP: きゅん、と日々姫の膣がときめく。\n鏡の中の日々姫の瞳が、体が、とろける。
1616 = "日日姬的陰道猛地抽動了一下。鏡子裡的日日姬的眼神、身體開始迷離。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに――わたしも――わたしもにぃにを――\n世界で一番大好きですし――愛して、います」
1316 = "「阿哥——我也是——阿哥是——我這世界上最喜歡的人——我愛你」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。知っている」
1155 = "「嗯，我知道」" 

# monologue
# JP: だから抱きしめ、キスをする。\n日々姫をもっと深く知るため――体を導く。
1538 = "所以，我抱緊並親吻著日日姬。引導著她的身體——為了更加了解她。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……ぁ……にぃに。\n今日は、後ろから……セックス、すると？」
1131 = "「嗯……啊……阿哥。今天要從後面……做嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「せっかく可愛いネコなのだ。\nふさわしい姿勢と思うが、イヤか？」
1330 = "「難得有一隻可愛的貓咪。我覺得這個姿勢很合適，不願意嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「イヤじゃ、なか、けど……その。\n私の、おねだり」
1009 = "「倒不是不願意……那個。我的請求」" 

# 【双鉄】
# display as 雙鐵
# JP: 「見えるぞ？　僕の勃起なら」
1207 = "「我的勃起的話，是可以看見的」" 

# monologue
# JP: 首を大きく動かして、日々姫の視線を誘導する。\n同時に体もわずかに動かし、細かな角度を調整する。
1495 = "我大幅度轉動脖子引導日日姬的視線。同時身體微微一偏，細緻地調整角度。" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
1120 = "「啊！」" 

# monologue
# JP: 視線の先には、姿見がある。\nつながろうとする僕と日々姫を映す、鏡が。
1662 = "視線的前方有一面鏡子，倒映著準備合為一體的我和日日姬。" 

# 【双鉄】
# display as 雙鐵
# JP: 「見えるか？　日々姫。僕の勃起が」
1252 = "「日日姬，能看見我的勃起嗎？」" 

# monologue
# JP: （ぴとっ）
1829 = "（緊貼）" 

# 【日々姫】
# display as 日日姬
# JP: 「は……うっ――ふぁ――ん……。\n見え、る……見える、と――」
1077 = "「哈……嗚——呼啊——嗯……。能看見……能看見」" 

# monologue
# JP: （すりっ――すにゅっ――くち――ちぷっ）
1819 = "（滋溜——滋溜——咕啾——啾噗）" 

# monologue
# JP: 僕は一切動いていない。けれど日々姫の尻尾は揺れる。\n日々姫はかわいくお尻を振って、僕の勃起を催促してる。
1497 = "我完全沒有動。但日日姬的尾巴卻在搖動。日日姬可愛地搖著屁股，催促著我的勃起。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにの、かっこいいおちんちん――んっ――ぐって、\nそりかえって、わたしの、なか、に――おまんこ、に」
1320 = "「阿哥、帥氣的小雞雞——嗯——往上面挺著、想要進入、我的、裡面——小穴、裡面」" 

# monologue
# JP: （つ、ぷっ――）
1811 = "（滋、噗——）" 

# 【日々姫】
# display as 日日姬
# JP: 「ふ、ぁ――さきっぽ――亀頭、はいって――んっ――\nあっ――すごい――見てると、もっと、ぞわ、ぞわ」
1047 = "「呼、啊——尖端——龜頭，進來——嗯——啊——好厲害——看著、感覺越來越興奮了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。僕も、だ」
1259 = "「是啊，我也是」" 

# monologue
# JP: 客観視とは、このことか。普段見えてるものとは別の、\n鏡像による視覚がさらに、セックスの実感を強めてくれる。
1674 = "這就是所謂的客觀角度嗎？鏡像視角不同於普通視角，它所帶來的視覺讓我更加深刻地感受到性交的細節。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こうして見ると――んっ――動物的、だなーっ――\n日々姫を、抱く――セックスすると、いう、こと、は」
