# JP: 満足しきって力が抜けてしまったらしい日々姫と、\nふたり、布団にもつれ倒れる。
1494 = "Cùng với Hibiki có vẻ đã hoàn toàn thỏa mãn và kiệt sức,\ncả hai chúng tôi ngã nhào xuống nệm."
# 【日々姫】
# display as 日日姬
# JP: 「えへへっ！　にぃに～♪」
1088 = "「Ehehe! Anh hai~♪」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 1156 = "「嗯？」" 
# monologue
# JP: 至近距離から、日々姫が見つめる。\nじっと、じいっと、まっすぐに。
1510 = "Từ cự ly rất gần, Hibiki nhìn tôi chằm chằm.\nChằm chằm, không chớp mắt, nhìn thẳng vào tôi."
# 【日々姫】
# display as 日日姬
# JP: 「鏡の中のにぃにも格好よかったばってん。\nえへへへへ～、やっぱり本物が、世界で一番かっこよか」
1329 = "「Anh hai trong gương cũng ngầu lắm.\nEhehehe~, nhưng quả nhiên người thật vẫn là ngầu nhất thế giới.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。日々姫も、鏡の中よりこうして直に見るほうが、\n何百倍も何千倍も、かわいらしくて、美しい」
1257 = "「Đúng vậy. Hibiki cũng thế, nhìn trực tiếp thế này,\nxinh đẹp và đáng yêu hơn trong gương gấp trăm, ngàn lần.」"
# 【日々姫】
# display as 日日姬
# JP: 「んふふっ、ありがと、にぃに」
1137 = "「Nfufu, cảm ơn anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どういたしまして」
987 = "「Không có gì.」"
# monologue
# JP: そうして僕らが、それが当然であるゆえに。\nお互いにお互い専用の、唇を、舌を、絡め合う。
1636 = "Và rồi chúng tôi, như một lẽ đương nhiên.\nQuấn lấy đôi môi, chiếc lưỡi dành riêng cho nhau."
