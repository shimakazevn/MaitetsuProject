# lines: 339 
# 【日々姫】
# display as 日日姬
# JP: 「に・ぃ・に」
1314 = "「Anh・hai.」"
# monologue
# JP: 日々姫の声だ。とても機嫌が良いときの。
1624 = "Là giọng của Hibiki. Lúc em ấy đang rất vui vẻ."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした」
1186 = "「Sao vậy?」"
# monologue
# JP: 言った瞬間、記憶とつながる。
1488 = "Ngay khi vừa cất tiếng, ký ức của tôi liền kết nối lại."
# 【双鉄】
# display as 雙鐵
# JP: 「さっき宅配便を受け取っていたようだが――\nなにか、いいものでも届いたか？」
1000 = "「Lúc nãy thấy em nhận bưu kiện——\nCó món đồ gì hay ho được gửi đến à?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　思ってたよりずうっといいもの。\nしかもね？　にぃににとっても多分、すっごく」
1151 = "「Vâng! Một món đồ tốt hơn em nghĩ rất nhiều.\nHơn nữa nhé? Với anh hai chắc cũng cực kỳ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、それは楽しみだ。ぜひ見せてくれ」
1157 = "「Ồ, đáng mong đợi đấy. Cho anh xem với.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！」
1149 = "「Vâng!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！？」
1123 = "「!!!?」"
# 【日々姫】
# display as 日日姬
# JP: 「って！　にぃに、おおげさ！\nけど――えへへっ！　声もでないくらいにかわゆかと？」
1125 = "「Ơ kìa! Anh hai làm quá rồi đấy!\nNhưng mà——ehehe! Dễ thương đến mức anh không nói nên lời luôn đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやっ」
985 = "「Không.」"
# 【日々姫】
# display as 日日姬
# JP: 「きゃんっ！！？」
1041 = "「Á!!?」"
# monologue
# JP: 日々姫を引き込み鏡の前に座らせる。\n足を――大きく開かせる。
1503 = "Tôi kéo Hibiki ngồi xuống trước gương.\nBắt em ấy——mở rộng hai chân ra."
# 【双鉄】
# display as 雙鐵
# JP: 「声が出ぬほど驚かされたが――\nかわいいから、が一番強い理由ではない」
1328 = "「Anh đúng là đã ngạc nhiên đến không thốt nên lời——\nNhưng lý do lớn nhất không phải vì dễ thương đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「えー、かわゆくなかとー？」
1089 = "「Ể, không dễ thương sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、それは二番目だ。正直凄まじく可愛いが、\nそれでも、一番おおきな衝撃にはとても及ばない」
1305 = "「Anh bảo đó là lý do thứ hai rồi mà. Thành thật mà nói thì vô cùng dễ thương,\nnhưng vẫn không thể sánh bằng cú sốc lớn nhất kia được.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへっ！　やっぱりかわゆかとよね～\nにゃんにゃんにゃんこ。お耳もおしっぽもついてるし～」
1086 = "「Ehehe! Quả nhiên là dễ thương đúng không~\nMeo meo meo. Có cả tai và đuôi nữa nè~」"
# monologue
# JP: 僕をじいっと見上げるままに微笑めば、首元の鈴も\nちりん、と揺れる。確かに、可愛い。可愛いのだが――
1438 = "Em ấy mỉm cười trong khi ngước nhìn tôi chằm chằm, chiếc chuông trên cổ cũng\nrung lên leng keng. Quả thực là rất dễ thương. Dễ thương thì có dễ thương nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。僕を見上げるのではなく、正面を、鏡を――\nより厳密には、鏡に写る自分の姿を見てほしい」
1245 = "「Hibiki. Đừng ngước nhìn anh, hãy nhìn thẳng vào gương——\nNói chính xác hơn là, anh muốn em nhìn hình ảnh phản chiếu của mình trong gương.」"
# 【日々姫】
# display as 日日姬
# JP: 「正面の鏡？　っっっっっっ！！？」
1266 = "「Gương trước mặt á? !!?」"
# monologue
# JP: 絶句する。そうして顔が全身が、一気にボっと赤くなる。\n――これは、たまらん。もっと照れさせたくなってくる。
1431 = "Em ấy cạn lời. Sau đó khuôn mặt và toàn thân bỗng chốc đỏ bừng lên.\n——Thế này thì chịu sao nổi. Lại càng muốn trêu cho em ấy xấu hổ hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「な？　素晴らしく可愛らしくはあるのだが――\nもっと強く、感じてしまう気持ちがあるよな？」
1177 = "「Thấy chưa? Tuyệt vời và dễ thương thật đấy——\nNhưng còn có một cảm giác khác mạnh mẽ hơn thế đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「はぅっ……だって、私――普通に立って、\n姿見で確かめたときには、こぎゃん――こぎゃん――」
1082 = "「Hau...... tại vì, em——lúc đứng bình thường,\nvà kiểm tra bằng gương toàn thân thì, thế này——thế này——」"
# monologue
# JP: 唇だけがあえかに動き、言葉が出なくなってしまう。\nゆえに、促す。やさしく、静かに――
1428 = "Đôi môi em ấy mấp máy yếu ớt, không thể thốt nên lời.\nVì vậy, tôi thúc giục. Một cách nhẹ nhàng và tĩnh lặng——"
# 【双鉄】
# display as 雙鐵
# JP: 「こぎゃん、なんだ？」
1194 = "「Thế này, thì sao nào?」"
# monologue
# JP: （さわっ）
1794 = "（Chạm nhẹ）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃうんっっ！！」
1035 = "「Hyaun!!」"
# monologue
# JP: ほんの一瞬胸に触れれば、日々姫が照れてもぞもぞ動く。\nパンツの股間にじわじわと染みが滲み始める。
1492 = "Chỉ chạm nhẹ vào ngực một thoáng, Hibiki đã ngượng ngùng cựa quậy.\nGiữa đũng quần lót bắt đầu rỉ ra một vệt ẩm ướt."
# 【日々姫】
# display as 日日姬
# JP: 「こぎゃん――ここまでエッチな感じになるなんて……\nわたし、全然、思ってなくって――」
1193 = "「Thế này——trở nên dâm đãng đến mức này......\nEm hoàn toàn, không ngờ tới——」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――うむ。デザイナーとしていかがなものかな。\n想像力が、欠如しすぎと言わざるを得ない」
1304 = "「Cái đó thì——ừm. Với tư cách là một nhà thiết kế thì sao nhỉ.\nPhải nói là em quá thiếu trí tưởng tượng đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「うぅ～～っ」
1126 = "「Ưư~~」"
# 【双鉄】
# display as 雙鐵
# JP: 「実際、ほんの少し考えるだけで――\n想像力を、飛躍させる必要さえなく」
1173 = "「Thực tế thì, chỉ cần suy nghĩ một chút thôi——\nThậm chí chẳng cần trí tưởng tượng bay bổng gì」"
# monologue
# JP: （さすっ）
# 1794 = "（撫摸）" 
# 【日々姫】
# display as 日日姬
# JP: 「んくんっ！！」
1142 = "「Ưn!!」"
# monologue
# JP: 乳首を親指の腹で撫ぜる。\n日々姫の汗がじわじわと増し、甘い匂いが徐々に濃くなる。
1526 = "Tôi dùng phần thịt của ngón cái vuốt ve đầu ngực em ấy.\nMồ hôi của Hibiki dần rịn ra nhiều hơn, và mùi hương ngọt ngào cũng dần trở nên nồng đậm."
# 【日々姫】
# display as 日日姬
# JP: 「ぁ――やぁだっ」
1101 = "「A——không chịu đâu.」"
# monologue
# JP: 甘えた声が、嫌がるフリが、鼓膜から脳を麻痺させる。\nもうガチガチになってる勃起をズボンごと強く押し付ける。
1442 = "Giọng nói nũng nịu, vẻ giả vờ phản đối ấy truyền từ màng nhĩ làm tê liệt não bộ của tôi.\nTôi ấn mạnh phần dưới đã cứng ngắc của mình qua lớp quần vào người em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「これほどいやらしく愛らしく、僕の視線を釘付けにする、\n小ぶりで可憐なおっぱいが、露出するともすぐに解ろう」
1184 = "「Anh có thể dễ dàng hiểu được, bầu ngực nhỏ nhắn đáng yêu này,\nkhi lộ ra sẽ dâm đãng và thu hút ánh nhìn của anh đến nhường nào.」"
# monologue
# JP: （さわっ――さすっ――もみゅっ――くにっ――）
1793 = "（Chạm nhẹ——vuốt ve——xoa nắn——véo nhẹ——）"
# 【日々姫】
# display as 日日姬
# JP: 「小ぶり、って――ん……ぁ――にぃにっ――\nにぃに――にぃにぃ」
1169 = "「Nhỏ nhắn, là sao chứ——ưm...... a——anh hai——\nAnh hai——anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん？」
1156 = "「Hửm?」"
# monologue
# JP: いつもより上ずる『にぃに』が可愛い子猫の声に聞こえる。\nどこまでだって、甘やかしたくなってしまう。
1409 = "Tiếng gọi \"anh hai\" cao hơn bình thường nghe như tiếng mèo con đáng yêu.\nKhiến tôi muốn chiều chuộng em ấy đến tận cùng."
# 【日々姫】
# display as 日日姬
# JP: 「おっぱい。おっぱい――このまま小ぶりじゃいややけん。\nもっと、おっきくなるように――ね？　お願い、にぃに」
1287 = "「Ngực. Ngực——em không muốn cứ nhỏ mãi thế này đâu.\nĐể nó lớn hơn nữa——nhé? Xin anh đó, anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「こういうことか？」
1004 = "「Như thế này sao?」"
# monologue
# JP: （くにゅっ――つっ――ぱっ！）
1785 = "（Bóp nhẹ——kéo——thả!）"
# 【日々姫】
# display as 日日姬
# JP: 「ぁっ！　うっ――んっ――」
1122 = "「A! Ư——ưm——」"
# monologue
# JP: 軽く乳首を引っ張り離す。ほんの一瞬、みかけは膨らんだ\nおっぱいに――けれど日々姫は、その頬までも膨らます。
1533 = "Tôi kéo nhẹ đầu ngực rồi buông ra. Bầu ngực trông có vẻ phồng lên\ntrong một khoảnh khắc——nhưng Hibiki lại phồng cả má lên dỗi."
# 【日々姫】
# display as 日日姬
# JP: 「そういうことじゃなかとよぉ。\nもっと――ね？　もっと――おっぱい、全体を――ん！」
990 = "「Không phải như vậy đâu.\nHơn nữa——nhé? Hơn nữa——cả bầu ngực——ưm!」"
# monologue
# JP: （さわっ――さすっ――もみゅっ――ふにゅん）
1792 = "（Chạm nhẹ——vuốt ve——xoa nắn——nắn bóp）"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　ふっ――あっ……にぃにの、おてて――\nきもち……よか――んっ――もっと、ね？　おっぱい」
1118 = "「A! Fu——a...... Bàn tay của, anh hai——\nDễ chịu...... quá——ưm——hơn nữa, nhé? Ngực em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……『おっぱいを欲しがる子猫ちゃん』か。\n字面だけなら、まるで童話のようでもあるが」
757 = "「......『Cô mèo con thèm sữa』 sao.\nNếu chỉ nhìn mặt chữ thì cứ như truyện cổ tích ấy nhỉ.」"
# monologue
# JP: （さわっ――さすっ――くりゅっ――もみゅっ）
# 1792 = "（撫摸——撫摸——揉捏——揉捏）" 
# 【日々姫】
# display as 日日姬
# JP: 「やぁん――そぎゃんこと――言われたら、ん――\nはずかしく――なっちゃう、けんっ」
1036 = "「Đừng mà——bị nói——như vậy, ưm——\nEm thấy——xấu hổ lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「絵面は完全に18禁だ。見えるか？　日々姫。\n――自分の腰が、股間がどうなってるいるのかを」
1164 = "「Hình ảnh thì hoàn toàn là 18+ đấy. Em có thấy không? Hibiki.\n——Eo và giữa hai chân của mình đang như thế nào.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふぁ――はっ――あ――見える、と、見え、ます。\n私の、おまた――うずうず、勝手に、動い、ちゃってる」
1057 = "「Fa——ha——a——Thấy, em thấy, ạ.\nChỗ đó của em——đang râm ran, tự động, cử động, mất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その中心は、おまんこは一体どうなっている？」
993 = "「Còn ở giữa, chỗ đó thì đang thế nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「おまんこ――私の、おまんこ――は――（ごくっ）」
1180 = "「Chỗ đó——của em——thì——（Ực）」"
# monologue
# JP: はぁはぁ、ひどく荒い息。\nくっついている部分の全てが、ふたりの汗で貼り付きあう。
1433 = "Ha ha, hơi thở vô cùng dốc.\nTất cả những chỗ tiếp xúc đều dính chặt lấy nhau bởi mồ hôi của cả hai."
# 【日々姫】
# display as 日日姬
# JP: 「愛液……しみ、て――ぐしょぐしょ……で――\nん……ショーツ……べったり――貼り付い、ちゃって」
1019 = "「Dịch...... thấm ra——ướt sũng...... rồi——\nƯm...... quần lót...... dính chặt——vào luôn, rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに気持ち悪そうだな。脱がせたほうがいいだろう。\nん――」
1268 = "「Đúng là có vẻ khó chịu nhỉ. Chắc là nên cởi ra thì hơn.\nƯm——」"
# monologue
# JP: サイドが紐になっている。\nならば、これをほどけば恐らく――
1400 = "Hai bên hông là dây buộc.\nVậy thì, nếu cởi cái này ra có lẽ——"
# monologue
# JP: （するっ――ぺりっっ）
1833 = "（Tuột——roạt!）"
# 【日々姫】
# display as 日日姬
# JP: 「やぁん」
1038 = "「Aaa.」"
# monologue
# JP: 愛液で、布地がびたりと貼り付いている。\nゆえ、そこをゆっくり。わざとゆっくり剥がしてく――
1476 = "Vì dịch nhờn mà lớp vải dính chặt lấy cơ thể.\nNên tôi chậm rãi. Cố tình lột nó ra thật chậm rãi——"
# 【日々姫】
# display as 日日姬
# JP: 「あ……」
1110 = "「A......」"
# monologue
# JP: 片紐を解いただけで、露出する。\n日々姫の可愛いおまんこも、控えめに震えるアナルも。
1408 = "Chỉ cần cởi một bên dây là lộ ra hết.\nCả chỗ đó đáng yêu của Hibiki, và cả lỗ hậu đang run rẩy e dè."
# 【双鉄】
# display as 雙鐵
# JP: 「……いやらしいな。凄まじく強いかわいいを、\nその何倍も色濃いいやらしさが、覆い隠してる」
772 = "「......Dâm đãng thật đấy. Sự dễ thương vô cùng mãnh liệt,\nđang bị che lấp bởi sự dâm đãng đậm đặc gấp mấy lần.」"
# 【日々姫】
# display as 日日姬
# JP: 「う……ん――エッチ。\nわたしも、にぃにも、すごく、エッチ」
1132 = "「Ư...... ưm——Dâm đãng.\nCả em, và cả anh hai, đều rất, dâm đãng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　僕もか？」
1099 = "「Hửm? Cả anh sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、だって。にぃにのお手手――ひゃんっ！」
1154 = "「Vâng, tại vì. Bàn tay của anh hai——hyan!」"
# monologue
# JP: （もみゅっ――さすっ――こしゅっ――もゆんっ）
1788 = "（Xoa nắn——vuốt ve——cọ xát——nắn bóp）"
# monologue
# JP: 健気なおねだりをされてたことを思い出す。\n遅ればせながらゆっくり大事に、日々姫の胸を揉みしだく。
1518 = "Tôi nhớ lại lời vòi vĩnh đáng yêu của em ấy.\nDù hơi muộn nhưng tôi vẫn chậm rãi, trân trọng xoa bóp ngực Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の手が、どうした？」
1212 = "「Tay anh, thì sao nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「鏡の中でも――んっ――おっき、くって――硬そう、で\n――すごく、男の――人な、感じ――私と――比、べて」
1161 = "「Ngay cả trong gương——ưm——cũng rất to——và có vẻ cứng\n——rất ra dáng, đàn ông——so với——em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1023 = "「Ra là vậy.」"
# monologue
# JP: 僕という色気もなにもないキャンバスが対比物となり、\nいっそう日々姫を、その可憐な色香を引き立てている。
1419 = "Một bức tranh không chút gợi cảm nào như tôi trở thành vật đối chiếu,\ncàng làm tôn lên vẻ đẹp và sự gợi cảm đáng yêu của Hibiki."
# monologue
# JP: （もみゅ――くりゅっ――こにゅん――ふにゅう）
1787 = "（Xoa nắn——xoa tròn——nắn nhẹ——bóp mềm）"
# 【日々姫】
# display as 日日姬
# JP: 「あ……はっ――やけ、ん――やけん、ね？　にぃに。\n私――私。私っ――見たかとっ――んっ！」
1111 = "「A...... ha——cho nên——cho nên, nhé? Anh hai.\nEm——em. Em——muốn nhìn——ưm!」"
# monologue
# JP: （こしゅっ――もみゅっ――くりゅっ――むみゅっ）
# 1787 = "（揉捏——按壓——刺激——揉捏）" 
# 【双鉄】
# display as 雙鐵
# JP: 「見たい。何をだ？」
1188 = "「Muốn nhìn. Nhìn cái gì?」"
# 【日々姫】
# display as 日日姬
# JP: 「おちん、ちん――にぃにの――かっこよか、おちんちん。\n鏡の、中、で、も――んっ――わたし、みた、かとっ」
1181 = "「Chỗ đó——của anh hai——chỗ đó, rất ngầu.\nNgay cả, trong, gương——ưm——em, cũng muốn, nhìn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1056 = "「Hừm.」"
# monologue
# JP: （ちぃぃぃぃぃぃぃっぃっ）
1749 = "（Xoètttt）"
# monologue
# JP: ジッパーを下ろし、勃起を取り出してから気づく。\nこの体勢では、勃起は下敷きになるだけか――なら――
1519 = "Kéo khóa quần xuống, lôi phần đang cương cứng ra tôi mới nhận ra.\nỞ tư thế này thì nó chỉ bị đè lên thôi——nếu vậy thì——"
# monologue
# JP: （ぐいっ）
1783 = "（Giật mạnh）"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――熱っ――にぃに――こんなに――\nわたしで、おっきく――して、くれてっ――はぁっ」
1107 = "「A——Nóng quá——Anh hai——thế này——\nVì em, mà trở nên to lớn——thế này——ha.」"
# monologue
# JP: 背中にべったり勃起を押し付けそのままゆるく上下する。\n日々姫は見えない勃起にも、満足したような息を吐く。
1502 = "Tôi áp sát phần dưới đang cương cứng vào lưng em ấy rồi nhẹ nhàng cọ xát lên xuống.\nDù không nhìn thấy nhưng Hibiki vẫn thở hắt ra vẻ mãn nguyện."
# 【双鉄】
# display as 雙鐵
# JP: 「背中にあたる勃起の長さで――日々姫。\nお前の膣のどのあたりまでいくか、教えてほしい」
1217 = "「Với chiều dài của thứ đang chạm vào lưng em——Hibiki.\nAnh muốn em cho anh biết nó sẽ vào sâu đến đâu trong cơ thể em.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――（ごくり）」
1109 = "「A——（Nuốt nước bọt）」"
# monologue
# JP: 日々姫は目を閉じ、唾を飲み込む。\n背中を強く勃起に押し付け、長さを正しく測ろうとする。
1619 = "Hibiki nhắm mắt lại, nuốt nước bọt.\nEm ấy ấn mạnh lưng vào tôi, cố gắng ước lượng chính xác chiều dài."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにの、おちんちん――\nわたしの……膣、の――」
1322 = "「Chỗ đó, của anh hai——\nCủa...... bên trong, em——」"
# monologue
# JP: 日々姫の目が下腹に向く。真白い指がゆっくりと、\n下腹部と臍の中間よりも、臍よりのあたりに当てられる。
1618 = "Ánh mắt Hibiki hướng xuống bụng dưới. Ngón tay trắng ngần chậm rãi,\nđặt vào vị trí gần rốn hơn là điểm giữa bụng dưới và rốn."
# 【日々姫】
# display as 日日姬
# JP: 「きっと、ね？　この、へん。にぃにのおちんちん、\nいっつもね？　私のおなかのこの辺まで、えぐっとぉと」
1284 = "「Chắc là, nhé? Khoảng, này. Chỗ đó của anh hai,\nlúc nào cũng vậy nhỉ? Xuyên sâu đến tận chỗ này trong bụng em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなに深くか。\nならば、その奥あたりが子宮になるのか？」
1264 = "「Sâu đến thế sao.\nVậy thì, phần sâu bên trong đó là tử cung à?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……あ、うん。わかんない、けど――\nきっと、そう。だって――」
1113 = "「A...... a, vâng. Em không rõ, nhưng mà——\nChắc là, vậy. Tại vì——」"
# monologue
# JP: （とんっ）
1758 = "（Vỗ nhẹ）"
# monologue
# JP: 日々姫の指が、その下腹をかるぅくつつく。\n振動が、薄く柔らかな体越し、押し当てている勃起に響く。
1606 = "Ngón tay Hibiki khẽ chạm vào phần bụng dưới đó.\nSự rung động truyền qua cơ thể mỏng manh mềm mại, chạm đến phần đang cương cứng của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにの、おちんちん、押し当てられて――\n私――この辺、うずうず、きゅんきゅん、しとるけん」
1323 = "「Chỗ đó của anh hai, đang ấn vào——\nEm——chỗ này, đang râm ran, rung động, lắm rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1331 = "「!!」"
# monologue
# JP: 解説が、予想以上にいやらしくってすばらしい。\nもっと聞きたく――日々姫をもっと――融かしたくなる。
1445 = "Lời giải thích dâm đãng và tuyệt vời hơn tôi tưởng.\nKhiến tôi muốn nghe thêm——muốn làm Hibiki——tan chảy nhiều hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、日々姫。今一度、僕に教えて欲しいのだけれど」
1248 = "「Này, Hibiki. Anh muốn em chỉ cho anh một lần nữa.」"
# monologue
# JP: （さわっ――もにゅっ――もみゅっ――くりゅんっ）
1790 = "（Chạm nhẹ——nắn bóp——xoa nắn——xoa tròn）"
# 【日々姫】
# display as 日日姬
# JP: 「んふっ――あっ――にぃ、にっ――なに、をっ？」
1139 = "「Nnfu——a——anh, hai——chuyện, gì cơ?」"
# monologue
# JP: 日々姫の処女を捧げてもらった、あの甘い夜を思い出す。\nあの夜も、日々姫は僕に、教えてくれた。
1516 = "Tôi nhớ lại đêm ngọt ngào khi Hibiki trao cho tôi sự trinh trắng của em ấy.\nĐêm đó, Hibiki cũng đã chỉ cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の勃起は、どこから日々姫を貫いて――\nそんな深くまで、亀頭を届かせるのだろう」
1210 = "「Anh đâm vào Hibiki từ đâu——\nMà có thể đưa phần đầu vào sâu đến thế.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
1114 = "「A.」"
# monologue
# JP: 小さな声。驚いたような――嬉しげな。
1449 = "Một giọng nói nhỏ bé. Có vẻ ngạc nhiên——nhưng cũng đầy vui sướng."
# 【日々姫】
# display as 日日姬
# JP: 「あの、ね？　にぃに」
1282 = "「Chuyện là, nhé? Anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1094 = "「!!!」"
# monologue
# JP: 日々姫がおまんこを拡げてくれる。\n処女だったときと、おんなじように――
1588 = "Hibiki mở rộng chỗ đó ra cho tôi xem.\nGiống hệt như hồi em ấy vẫn còn là một cô gái trinh trắng——"
# 【日々姫】
# display as 日日姬
# JP: 「ここ、が――膣口――ん……\nにぃにの、おちんちん、を、ね？　――こぎゃん、して」
1306 = "「Đây, là——cửa mình——ưm......\nChỗ đó, của anh hai, nhé? ——như thế này, này.」"
# monologue
# JP: （つっ――ぷっ――くっ――ぐ――）
1807 = "（Chạm——ấn——nhét——vào——）"
# monologue
# JP: いや違う。僕の勃起を僕の精子を何百度となく受け止めて。\nそれでも綺麗な桃色をした膣の中へと、指が、沈む。
1377 = "Không, khác chứ. Nó đã tiếp nhận tôi và tinh dịch của tôi không biết bao nhiêu lần rồi.\nVậy mà những ngón tay vẫn chìm vào bên trong lối đi màu hồng đào tuyệt đẹp ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「改めてみると凄いな――こうして拡がり入っていくのか。\n……綺麗だ、信じられないくらいに――綺麗で、淫靡で」
1013 = "「Nhìn lại mới thấy tuyệt thật——nó mở rộng và tiến vào như thế này sao.\n......Đẹp quá, đẹp đến khó tin——vừa đẹp, lại vừa dâm đãng.」"
# monologue
# JP: 見入ってしまう。中指と人差し指を揃えて並べ、\n小さな膣口を拡げつつ、日々姫は膣奥へ挿入していく。
1482 = "Tôi nhìn chằm chằm không chớp mắt. Hibiki khép ngón giữa và ngón trỏ lại,\nvừa mở rộng cửa mình nhỏ bé vừa đưa tay sâu vào bên trong."
# 【日々姫】
# display as 日日姬
# JP: 「私の――お指、は――にぃにの、おちんちん、より――\nずっと――ずうっと、短い、けん――ここ、まで、しか」
1205 = "「Ngón tay——của em——so với chỗ đó, của anh hai——\nNgắn hơn——rất nhiều, nên——chỉ vào được, đến đây, thôi.」"
# monologue
# JP: （こりっ――ぞりっっ）
1755 = "（Lạo xạo——sột soạt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
1097 = "「!!!!!!」"
# monologue
# JP: 日々姫が指を折り曲げて、膣壁内をぞりぞりひっかく。\nその振動が背中を通じ、僕の勃起にぞわぞわ届く。
1591 = "Hibiki gập ngón tay lại, cào cào vào vách bên trong.\nSự rung động đó truyền qua lưng, chạm đến phần đang cương cứng của tôi khiến nó râm ran."
# monologue
# JP: （すごい、な――これは――日々姫の膣内の構造を、\n日々姫が僕に――懸命に伝えようとしてくれている――）
1779 = "（Tuyệt thật——cái này——cấu trúc bên trong của Hibiki,\nHibiki đang——cố gắng truyền đạt cho tôi hiểu——）"
# monologue
# JP: その健気さが、勃起を硬く、熱くする。\n勃起の熱が、膣内で蠢く日々姫の指にも、恐らく伝わる。
1444 = "Sự đáng yêu đó khiến phần dưới của tôi càng thêm cứng và nóng rực.\nSức nóng ấy có lẽ cũng truyền đến những ngón tay đang cựa quậy bên trong của Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「一番、奥、まで――私の、お指じゃ……たりない、けん。\nだから――ね？　――にぃ、ん……。ん…………………」
1213 = "「Đến tận, sâu, bên trong——ngón tay của em...... không đủ, đâu.\nCho nên——nhé? ——anh, ưm...... Ưm.....................」"
# monologue
# JP: すうはぁすうはぁと、荒い呼吸が数秒続く。\n待ちたい。けれど、ほんの数秒足らずで僕は焦れてしまう。
1447 = "Từng nhịp thở gấp gáp kéo dài vài giây.\nTôi muốn đợi. Nhưng chỉ vài giây ngắn ngủi cũng khiến tôi sốt ruột."
# monologue
# JP: （さわっ――さすっ――もみゅっ――くにゅっ）
1791 = "（Chạm nhẹ——vuốt ve——xoa nắn——bóp nhẹ）"
# 【日々姫】
# display as 日日姬
# JP: 「んっ！　やっ――いま、いたずら、しちゃっ」
1148 = "「Ưm! Đừng——bây giờ, mà trêu chọc, là——」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。僕に、おしえてほしい」
1250 = "「Hibiki. Anh muốn em, chỉ cho anh.」"
# monologue
# JP: 耳元で、可能なかぎりに低く優しくささやきながら、\n汗ばむ乳首をおっぱいを、ゆるゆると揉む。
1486 = "Tôi thì thầm vào tai em ấy bằng giọng trầm và dịu dàng nhất có thể,\ntrong khi từ từ xoa bóp bầu ngực và đầu ngực đang rịn mồ hôi."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の指では足りないと――どうなるん――っ！！」
1005 = "「Nếu ngón tay của Hibiki không đủ——thì sẽ thế nào——!!」"
# monologue
# JP: （くっ――ちぃぃぃぃ）
1750 = "（Hự——xoètttt）"
# 【双鉄】
# display as 雙鐵
# JP: 「……日々、姫」
768 = "「......Hibi, ki.」"
# 【日々姫】
# display as 日日姬
# JP: 「はぅ……ぁ…………ぁっ……」
1083 = "「Hau...... a............ a......」"
# monologue
# JP: ピースサインを、膣内で。\n日々姫は膣口を大きく拡げ、その奥を僕に見せようとする。
1589 = "Tạo dáng chữ V, ở ngay bên trong.\nHibiki mở rộng cửa mình, cố gắng cho tôi thấy phần sâu bên trong."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
758 = "「............」"
# monologue
# JP: 見とれてしまう。見入ってしまう。\n奥は暗がりであるけれど、入り口付近ははっきり見える。
1530 = "Tôi mải mê ngắm nhìn. Không thể rời mắt.\nDù bên trong tối tăm, nhưng phần gần lối vào lại hiện rõ mồn một."
# monologue
# JP: （蠕動、している。ひくついている――\nこんなにも濃いピンク色で――濡れて、ぬらつき――）
1777 = "（Đang co bóp. Đang giật giật——\nMột màu hồng đậm đến thế——ướt át, nhầy nhụa——）"
# 【日々姫】
# display as 日日姬
# JP: 「お指の届く……とこより、先、は――ぁ――はあっ――\nにぃに――にぃに、が――にぃにの、おめめ、で――」
1219 = "「Phía sâu hơn...... nơi ngón tay chạm tới, thì——a——ha——\nAnh hai——anh hai, phải——dùng mắt của anh hai, để——」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
1239 = "「Hibiki.」"
# monologue
# JP: 何かライトを――瞬間浮かんだ思考をけれど、すぐに消す。\n一瞬たりと、鏡の中の日々姫から目を逸らしたくない。
1512 = "Lấy cái đèn nào đó——suy nghĩ vừa lóe lên trong đầu ngay lập tức bị tôi gạt bỏ.\nTôi không muốn rời mắt khỏi Hibiki trong gương dù chỉ một giây."
# 【日々姫】
# display as 日日姬
# JP: 「はぁ……はぁっ……はぁっ……はぁっ――」
1292 = "「Ha...... ha...... ha...... ha——」"
# monologue
# JP: 呼吸の度に、膣壁も呼応し縮まり広がる。\n中にあるのが勃起なら――思えば、全身がぞわぞわとする。
1440 = "Mỗi nhịp thở, vách bên trong cũng co bóp theo.\nNếu thứ ở bên trong là của tôi——chỉ nghĩ đến thôi cũng khiến toàn thân tôi râm ran."
# 【双鉄】
# display as 雙鐵
# JP: 「とても、綺麗だ。日々姫は――」
1002 = "「Rất, đẹp. Hibiki à——」"
# monologue
# JP: 処女だった日を、また思い出す。\n外観は、ほとんどなにも変化していない気がするけれど
1490 = "Tôi lại nhớ về cái ngày em ấy vẫn còn là một cô gái trinh trắng.\nVẻ bề ngoài hầu như không có gì thay đổi, nhưng"
# 【双鉄】
# display as 雙鐵
# JP: 「……日々姫は、これほど美しい――\n女に、なったのだな」
769 = "「......Hibiki đã trở thành một người phụ nữ——\nxinh đẹp đến nhường này rồi sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、に、私――」
1321 = "「Anh hai, đã khiến, em——」"
# monologue
# JP: （さすっ）
# 1794 = "（撫摸）" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
# 1097 = "「唔！！！！！！」" 
# monologue
# JP: 日々姫の指が正確に、\nその膣内から僕の亀頭の付け根をさする。
1605 = "Những ngón tay của Hibiki một cách chuẩn xác,\ntừ bên trong vuốt ve phần gốc của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「女に。して、もらったけん」
1254 = "「Trở thành phụ nữ. Là nhờ anh đó.」"
# monologue
# JP: ――日々姫は僕を知ってくれてる。\n目に見えずとも解るほど、僕を覚えてくれている。
753 = "——Hibiki rất hiểu tôi.\nEm ấy nhớ rõ tôi đến mức dù không nhìn thấy cũng vẫn nhận ra."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
# 1239 = "「日日姬」" 
# monologue
# JP: 胸が、股間が熱くなる。\n苦しいほどに、狂おしいほど、切なくなって、愛しくなる。
1527 = "Lồng ngực, và cả phần dưới của tôi đều nóng rực.\nTrở nên đau nhói, điên cuồng, xót xa, và tràn ngập tình yêu thương."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。好きだ。愛している」
1247 = "「Hibiki. Anh thích em. Anh yêu em.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ――」
1100 = "「A——」"
# monologue
# JP: きゅん、と日々姫の膣がときめく。\n鏡の中の日々姫の瞳が、体が、とろける。
1616 = "Chỗ đó của Hibiki thắt lại vì rung động.\nĐôi mắt, cơ thể của Hibiki trong gương như tan chảy ra."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――わたしも――わたしもにぃにを――\n世界で一番大好きですし――愛して、います」
1316 = "「Anh hai——em cũng——em cũng thích anh hai——\nNhất trên đời——và yêu anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。知っている」
1155 = "「Ừ. Anh biết.」"
# monologue
# JP: だから抱きしめ、キスをする。\n日々姫をもっと深く知るため――体を導く。
1538 = "Vì vậy tôi ôm lấy em ấy, và trao một nụ hôn.\nĐể hiểu rõ Hibiki hơn nữa——tôi dẫn dắt cơ thể em ấy."
# 【日々姫】
# display as 日日姬
# JP: 「ん……ぁ……にぃに。\n今日は、後ろから……セックス、すると？」
1131 = "「Ưm...... a...... anh hai.\nHôm nay, chúng ta sẽ làm...... từ đằng sau sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「せっかく可愛いネコなのだ。\nふさわしい姿勢と思うが、イヤか？」
1330 = "「Hiếm khi mới thấy em làm một cô mèo đáng yêu thế này.\nAnh nghĩ tư thế này là phù hợp nhất, em không thích à?」"
# 【日々姫】
# display as 日日姬
# JP: 「イヤじゃ、なか、けど……その。\n私の、おねだり」
1009 = "「Không, phải, là không thích, nhưng mà...... cái đó.\nLời vòi vĩnh, của em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「見えるぞ？　僕の勃起なら」
1207 = "「Thấy được mà? Nếu là của anh thì.」"
# monologue
# JP: 首を大きく動かして、日々姫の視線を誘導する。\n同時に体もわずかに動かし、細かな角度を調整する。
1495 = "Tôi quay đầu, dẫn dắt ánh nhìn của Hibiki.\nĐồng thời cũng khẽ cử động cơ thể, điều chỉnh lại góc độ một chút."
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
1120 = "「A!」"
# monologue
# JP: 視線の先には、姿見がある。\nつながろうとする僕と日々姫を映す、鏡が。
1662 = "Phía cuối tầm nhìn là chiếc gương toàn thân.\nChiếc gương phản chiếu hình ảnh tôi và Hibiki đang chuẩn bị hòa làm một."
# 【双鉄】
# display as 雙鐵
# JP: 「見えるか？　日々姫。僕の勃起が」
1252 = "「Thấy không? Hibiki. Của anh đấy.」"
# monologue
# JP: （ぴとっ）
1829 = "（Chạm nhẹ）"
# 【日々姫】
# display as 日日姬
# JP: 「は……うっ――ふぁ――ん……。\n見え、る……見える、と――」
1077 = "「Ha...... ư——fa——ưm.......\nThấy, rồi...... em thấy, rồi——」"
# monologue
# JP: （すりっ――すにゅっ――くち――ちぷっ）
1819 = "（Cọ xát——chèn vào——nhóp nhép——chụt）"
# monologue
# JP: 僕は一切動いていない。けれど日々姫の尻尾は揺れる。\n日々姫はかわいくお尻を振って、僕の勃起を催促してる。
1497 = "Tôi hoàn toàn không nhúc nhích. Nhưng cái đuôi của Hibiki lại đung đưa.\nHibiki đang đáng yêu lắc lư mông, hối thúc tôi tiến vào."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにの、かっこいいおちんちん――んっ――ぐって、\nそりかえって、わたしの、なか、に――おまんこ、に」
1320 = "「Chỗ đó ngầu quá, của anh hai——ưm——đang,\nngóc lên, vào bên trong, em——vào trong, em.」"
# monologue
# JP: （つ、ぷっ――）
1811 = "（Chạm, vào——）"
# 【日々姫】
# display as 日日姬
# JP: 「ふ、ぁ――さきっぽ――亀頭、はいって――んっ――\nあっ――すごい――見てると、もっと、ぞわ、ぞわ」
1047 = "「Fu, a——phần đầu——đang vào——ưm——\nA——tuyệt quá——nhìn thế này, càng thấy, râm ran, râm ran.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。僕も、だ」
1259 = "「Đúng vậy. Anh cũng, thế.」"
# monologue
# JP: 客観視とは、このことか。普段見えてるものとは別の、\n鏡像による視覚がさらに、セックスの実感を強めてくれる。
1674 = "Nhìn từ góc nhìn khách quan là thế này sao. Khác với những gì thường thấy,\nhình ảnh phản chiếu trong gương càng làm tăng thêm cảm giác chân thực khi làm tình."
# 【双鉄】
# display as 雙鐵
# JP: 「こうして見ると――んっ――動物的、だなーっ――\n日々姫を、抱く――セックスすると、いう、こと、は」
1012 = "「Nhìn thế này——ưm——đúng là mang tính bản năng động vật, nhỉ——\nViệc ôm lấy——làm tình với, Hibiki, ấy.」"
# monologue
# JP: （ずぶっっ――ぐっ――こしゅっ――ずりゅっ――）
1813 = "（Phập——hự——cọ xát——trượt——）"
# 【日々姫】
# display as 日日姬
# JP: 「ふっ――あっ！　しょこっ――そこ――上から、\nぐって――押しつぶされる、の――気持ち、いいっ」
1045 = "「Fu——a! Chỗ đó——chỗ đó——từ trên xuống,\nbị đè ép——cảm giác, thích quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば――もっと、しよう」
1260 = "「Vậy sao. Thế thì——anh sẽ làm, nhiều hơn nữa.」"
# monologue
# JP: （ずりゅっ――こしゅっ――ぐぐっ――ぷりゅんっ）
1817 = "（Trượt——cọ xát——ấn mạnh——bật ra）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ！　んっ――ふあっ！　あっ！！！　にぃに、\nおちん、ちん――まだ、半分も――入って、ない、のに」
1039 = "「Hya! Ưm——fa! A!!! Anh hai,\nchỗ đó——mới vào, chưa được một nửa——vậy mà.」"
# monologue
# JP: 膣の浅くのお腹側、粒立つ部分を甘やかされていじめられ、\nあえぎながらも、日々姫の目は鏡へと向く。
1682 = "Phần nông phía bụng, nơi có những hạt sần sùi đang được chiều chuộng và trêu chọc,\ndù đang rên rỉ nhưng ánh mắt Hibiki vẫn hướng về phía chiếc gương."
# 【日々姫】
# display as 日日姬
# JP: 「わたし――こぎゃん――ふっ――あっ！　こぎゃん、\nきもちよく、なって――ん、くっ――これ、で――奥っ」
1197 = "「Em——thế này——fu——a! Thế này,\nthấy thích, quá——ưm, hự——thế này, mà vào——sâu bên trong.」"
# monologue
# JP: （きゅんっ！　きゅううううんっ！！）
1796 = "（Thắt lại! Thắt chặt lại!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くっ！！！」
1075 = "「Hự!!!」"
# monologue
# JP: 子宮を突かれる、そのイメージを日々姫は抱いたのだろう。\n膣は忠実に反応し、うねり蠢き僕を奥へと誘おうとする。
1592 = "Chắc hẳn Hibiki đang tưởng tượng đến cảnh tử cung bị đâm trúng.\nBên trong em ấy phản ứng một cách trung thực, uốn lượn cựa quậy cố gắng mời gọi tôi vào sâu hơn."
# 【日々姫】
# display as 日日姬
# JP: 「おく――まで――子宮の――ドア、まで――ずぶずぶ、\nされ――たら――私っ――私っ――きっと、きっと――」
1261 = "「Vào sâu——tận bên trong——đến tận cửa——tử cung——nếu bị,\nđâm sâu——vào đó——em——em——chắc chắn, chắc chắn——」"
# 【双鉄】
# display as 雙鐵
# JP: 「乱れ狂っても、ダメになっても、溶けてもかまわん。\nというかむしろ――」
998 = "「Dù em có phát điên, có hỏng mất, hay tan chảy ra cũng không sao.\nHay nói đúng hơn là——」"
# monologue
# JP: （グッ――ずずっ――ぷりゅんっ――こしゅんっ）
1753 = "（Hự——trượt——bật ra——cọ xát）"
# 【日々姫】
# display as 日日姬
# JP: 「ふやっ！　あっ――しょこっ――そこっ――っ！！」
1049 = "「Fuya! A——chỗ đó——chỗ đó——!!」"
# monologue
# JP: 鏡の中の日々姫が踊る。かわいい耳と尻尾が揺れて、\n汗の匂いがどんどん濃くなり、つながる部分が熱く蕩ける。
1679 = "Hibiki trong gương đang nhảy múa. Đôi tai và cái đuôi dễ thương rung rinh,\nmùi mồ hôi ngày càng nồng đậm, và phần kết nối giữa chúng tôi nóng rực như tan chảy."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は日々姫を、どこまでだって乱れさせたい。\n僕にしか見ることのできぬ、日々姫の女の顔を、姿を」
1201 = "「Anh muốn khiến Hibiki phát điên đến tận cùng.\nKhuôn mặt, dáng vẻ của một người phụ nữ nơi Hibiki, mà chỉ mình anh mới có thể nhìn thấy.」"
# monologue
# JP: （ずぶううううううううううううううううっっっ！！）
1815 = "（Phập!!!!!!!!!!!!!!!!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「んきゅううううううううううううっっっっっ！！！」
1145 = "「Nkyuuuuuuuuuuuuuuu!!!」"
# monologue
# JP: （きゅぅぅぅぅっぅぅぅぅぅぅぅぅぅぅぅんんっ！！）
1797 = "（Thắt chặt lạiiiiiiiiiiiiii!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！！！」
1072 = "「Kuha!!!」"
# monologue
# JP: 最奥へ、一気に突き入れ届いた瞬間、待ち伏せされる。\n子宮口に甘く吸い付かれ、連動した膣壁全部に絞られる。
1427 = "Ngay khoảnh khắc đâm mạnh vào tận sâu bên trong, tôi như bị phục kích.\nCửa tử cung ngọt ngào mút chặt lấy, kéo theo toàn bộ vách bên trong siết chặt lấy tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ――あっ――にぃにっ――にぃにぃっ――」
1063 = "「Fa——a——anh hai——anh hai——」"
# monologue
# JP: 射精寸前、であるというのに甘えた声でおねだりされる。
1506 = "Dù sắp sửa xuất tinh, nhưng em ấy vẫn cất giọng nũng nịu vòi vĩnh tôi."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにっ――しょこっ――そこっ――赤ちゃんの、\nお部屋の、ドア――もっと――ごちゅごちゅ、ノック」
1317 = "「Anh hai——chỗ đó——chỗ đó——cánh cửa, căn phòng,\ncủa em bé——hãy gõ——thật mạnh, thêm nữa đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1094 = "「唔！！！」" 
# monologue
# JP: （ずぬっ！　ごちゅっ！！　ずぶっ！　ぶちゅっ！！）
1824 = "（Phập! Hự!! Phập! Phập!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひあっ！　あっ！　いいっ！　いいっ！　しゅきっ！\n好きっ！　んっ！　ごちゅ、ごちゅっ、される、のっ」
1032 = "「Hia! A! Thích! Thích lắm! Thích!\nThích lắm! Ưm! Bị đâm, thật mạnh, thế này.」"
# monologue
# JP: 日々姫の匂い。甘い匂い。日々姫の声。甘い声。\n嗅覚聴覚触覚視覚、全てが日々姫に染められていく。
1622 = "Mùi hương của Hibiki. Mùi hương ngọt ngào. Giọng nói của Hibiki. Giọng nói ngọt ngào.\nKhứu giác, thính giác, xúc giác, thị giác, tất cả đều bị nhuốm màu bởi Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「（はむっ）」
1334 = "「（Cắn）」"
# 【日々姫】
# display as 日日姬
# JP: 「んひゅんっ！！！！」
1141 = "「Nhyun!!!!」"
# monologue
# JP: ならば味覚もみたしたくって、\n体を折り曲げ日々姫の肩を軽く噛む。
1675 = "Nếu vậy thì tôi cũng muốn thỏa mãn cả vị giác,\ntôi cúi người xuống và cắn nhẹ vào vai Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「もっと――もっと――もっと食べてぇっ――ん――\nわたしっ――全部、最初から――にぃにのものやけんっ」
1280 = "「Hơn nữa——hơn nữa——hãy ăn em nhiều hơn nữa đi——ưm——\nEm——tất cả, ngay từ đầu——đều là của anh hai mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1095 = "「!!!!」"
# monologue
# JP: （ずばっ！　ごちゅっ！　ずぶっ！！　じゅちゅっ！）
1812 = "（Phập! Hự! Phập!! Nhóp nhép!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃうっ！　あっ！　ふあっ！　あっ！！！\nしゅごっ――んっ！　にぃに――の――あつ、くてっ」
1033 = "「Hyau! A! Fa! A!!!\nTuyệt quá——ưm! Của anh hai——nóng, quá.」"
# monologue
# JP: 日々姫の全てを貪っている。その実感が満足感が、\n僕を加熱し、加速させてく。
1522 = "Tôi đang ngấu nghiến tất cả mọi thứ của Hibiki. Cảm giác chân thực và sự thỏa mãn đó,\ncàng làm tôi nóng rực và tăng tốc độ hơn nữa."
# monologue
# JP: （じゅぶっ！　ずこっ！！　ぬじゅ！　ばちゅっ！！）
1771 = "（Nhóp nhép! Phập!! Nhóp nhép! Bạch!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃうっ！　あっ！　いいっ！　いいよぉっ！　っ！\nおまんこっ！　おなかっ――にぃに、えぐ、って――」
1034 = "「Hyau! A! Thích! Thích lắm! !\nChỗ đó! Bụng em——anh hai, đâm sâu, quá——」"
# monologue
# JP: 日々姫が喘ぎ乱れる度に、可憐なアナルがひきつき震える。\nその光景も、まさしく絶景であるのだが――
1596 = "Mỗi lần Hibiki rên rỉ điên cuồng, lỗ hậu nhỏ bé đáng yêu lại co giật run rẩy.\nCảnh tượng đó quả thực là một tuyệt tác, nhưng mà——"
# monologue
# JP: （じゅぶっ！　ばちゅっ！　づぢゅっ！　ごちゅっ！！）
1770 = "（Nhóp nhép! Bạch! Phập! Hự!!）"
# 【日々姫】
# display as 日日姬
# JP: 「んきゅんっ！！！！」
1144 = "「Nkyun!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ひび、きっ――日々、姫――っ――鏡を――\n見て、みろっ――」
1235 = "「Hibi, ki——Hibi, ki——nhìn——\nvào gương, đi——」"
# 【日々姫】
# display as 日日姬
# JP: 「ふぇ？　かが、み――っ――あ――鏡――\nっ！！！！！！！？」
1054 = "「Hể? Gương——a——gương——\n!!!!!!!?」"
# monologue
# JP: （きゅううううううううううううっっ！！！！）
1798 = "（Thắt chặt lạiiiiiiiiii!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くっ！　あっ！！！！」
1074 = "「Hự! A!!!!」"
# monologue
# JP: 急激な甘い締め付け――否や、絞り込みに、\nあやうく精液全部を搾り取られかける。
1641 = "Một sự siết chặt ngọt ngào đột ngột——không, phải nói là bóp nghẹt,\nsuýt chút nữa đã vắt kiệt toàn bộ tinh dịch của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「見えるだろう――日々姫と、僕が、セックスしている」
1006 = "「Thấy rồi chứ——Hibiki và anh, đang làm tình với nhau.」"
# monologue
# JP: （ずっ――りゅっ――うううううううううううううっ）
1818 = "（Trượt——rút raaaaaaaaaa）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃぐっ！　あっ――ふあっ――あっ――やっ――\nおちん、ちん――わたしの、おまんこ――ぬけ、ちゃう」
1029 = "「Hyagu! A——fa——a——không——\nChỗ đó——của em——sắp tuột, ra mất rồi.」"
# monologue
# JP: （くっ）
1757 = "（Hự）"
# monologue
# JP: 抜けるぎりぎり、そこでもちろん、腰を止める。\nわかりきってる結末だろうに、日々姫は心底嬉しげに笑う。
1425 = "Ngay sát mép tuột ra, tất nhiên tôi dừng hông lại.\nDù biết thừa kết cục sẽ như vậy, nhưng Hibiki vẫn cười vui sướng từ tận đáy lòng."
# 【日々姫】
# display as 日日姬
# JP: 「ふやっ――あっ――よかったぁ――おちんちん――んっ、\nにぃにの、おちんちん――いっちゃわ、ないで――」
1059 = "「Fuya——a——may quá——chỗ đó——ưm,\ncủa anh hai——đừng tuột ra, mất nhé——」"
# monologue
# JP: （きゅっ！　きゅきゅ！　きゅううっ！　きゅるんっ！）
1773 = "（Siết! Siết chặt! Siết lạiiii! Xoắn lại!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1093 = "「!!」"
# monologue
# JP: 日々姫の膣の入り口も、いかないで、帰ってきてと、\n締め付け蠢き、僕を奥へと健気に懸命に誘ってくれる。
1614 = "Lối vào của Hibiki cũng như đang níu kéo, xin tôi đừng đi, hãy quay lại,\nnó siết chặt và cựa quậy, ngoan ngoãn và cố gắng mời gọi tôi vào sâu bên trong."
# 【双鉄】
# display as 雙鐵
# JP: 「いいか――日々姫。これが、僕の勃起の長さで」
1297 = "「Nghe này——Hibiki. Đây là, chiều dài của anh, và」"
# 【日々姫】
# display as 日日姬
# JP: 「ぁ――あっ――あっ！　あっ！！」
1105 = "「A——a——a! A!!」"
# monologue
# JP: 以心伝心。僕の意図が、もう日々姫には伝わっている。\n顔で、頷きで、おまんこで、日々姫はもう、喜んでいる。
1383 = "Thần giao cách cảm. Ý định của tôi đã truyền đến Hibiki.\nQua khuôn mặt, cái gật đầu, và cả nơi đó, Hibiki đang rất sung sướng."
# 【双鉄】
# display as 雙鐵
# JP: 「そうして、これ、が――」
1309 = "「Và sau đó, cái này, là——」"
# monologue
# JP: （ずっ――ぶっ――ずるううっ――ぐっ――ぐっ――）
1808 = "（Phập——trượt vàooooo——hự——hự——）"
# 【日々姫】
# display as 日日姬
# JP: 「ふぁっ！　あっ！　あっ！　あっ！！――っ――\n～～～っ！　ひっ――あっ――あっ！　あああっ！！」
1066 = "「Fa! A! A! A!!——\n~~~! Hi——a——a! Aaa!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1092 = "「!」"
# monologue
# JP: 日々姫の膣が全身が、僕を歓迎しまくっている。\n蠢き震えきゅうきゅうすぼむ膣道を、亀頭で抉り進んでく。
1617 = "Bên trong và toàn thân Hibiki đang chào đón tôi cuồng nhiệt.\nTôi đâm sâu vào lối đi đang cựa quậy, run rẩy và co thắt liên hồi."
# 【日々姫】
# display as 日日姬
# JP: 「ぁ――ふあっ――あっ――んっ――ハァッ――\nもうすぐ――もうす、ぐっ――おまんこ――私、のっ」
1103 = "「A——fa——a——ưm——ha——\nSắp rồi——sắp, rồi——chỗ đó——của, em.」"
# monologue
# JP: （ぐっ――こちゅんっ！！――ぐぐっ！！！）
1751 = "（Hự——phập!!——hự hự!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ふぁぁぁああああああんっ！！！！」
1064 = "「Faaaaaaannnnnn!!!!」"
# monologue
# JP: （きゅうううううううううううんっ！！！！）
1799 = "（Thắt chặt lạiiiiiiiiii!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くっ――ぁっ――んっ――（ごくっ）。\nこれ、が――日々姫の――おまんこの、深さ、だ」
1071 = "「Hự——a——ưm——（Ực）.\nĐây, là——chiều sâu, bên trong——của Hibiki.」"
# monologue
# JP: 最奥に亀頭をぴたり押し付け、そこから更に押し込んで。\n僕の付け根と日々姫の入り口が――ゼロ距離になる。
1504 = "Tôi ấn chặt phần đầu vào tận cùng bên trong, rồi từ đó đẩy sâu thêm nữa.\nPhần gốc của tôi và lối vào của Hibiki——không còn khoảng cách nào."
# 【日々姫】
# display as 日日姬
# JP: 「うれ、しい――嬉しい――嬉しいっ！　嬉しい！！！」
1200 = "「Vui, quá——vui quá——vui quá! Vui quá!!!」"
# monologue
# JP: 日々姫の体全部が紅潮し、鏡の中の瞳は潤み揺れている。
1609 = "Toàn thân Hibiki ửng đỏ, đôi mắt trong gương ngấn lệ rung rinh."
# 【日々姫】
# display as 日日姬
# JP: 「わたし――おまんこ――にぃに――専用。にぃにの、\n長さ……深さも、形も――全部、専用、ぴったり、で」
1204 = "「Chỗ đó——của em——dành riêng——cho anh hai. Chiều dài,\ncủa anh hai...... chiều sâu, hình dáng——tất cả, đều dành riêng, vừa khít.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。僕の勃起も、日々姫のおまんこ専用だ」
1176 = "「Đúng vậy. Của anh cũng dành riêng cho chỗ đó của Hibiki.」"
# monologue
# JP: （きゅん！　きゅううううっ！　くきゅっ！　きゅっ！）
1795 = "（Siết! Siết chặt lạiiii! Co thắt! Siết!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1094 = "「唔！！！」" 
# monologue
# JP: 日々姫の膣が子宮口が、言質をとったと言わんばかりに、\n貪欲に精子を要求してくる。無論応えるが、すぐではない。
1615 = "Bên trong và cửa tử cung của Hibiki như thể vừa nắm được điểm yếu,\ntham lam đòi hỏi tinh dịch. Đương nhiên tôi sẽ đáp ứng, nhưng chưa phải lúc này."
# 【双鉄】
# display as 雙鐵
# JP: 「……運命だの、宿命だのという言葉、を――っ――\nあまり――好ましいとは、思わん――の、だがっ――」
763 = "「......Những từ như vận mệnh, hay định mệnh——\nAnh không——thích cho lắm——nhưng mà——」"
# monologue
# JP: （ず――ゆっ――ずりゅうううううううううっっ！！！）
1810 = "（Trượt——rút raaaaaaaaaa!!!）"
# 【日々姫】
# display as 日日姬
# JP: 「んっ！　はっ！　あっ！にぃに――にぃにぃっ！！！」
1150 = "「Ưm! Ha! A! Anh hai——anh hai!!!」"
# monologue
# JP: 体の相性。こころの相性。仕事の相性。\n全てがあまりに、怖いほど、日々姫と僕は合致している。
1485 = "Sự hòa hợp về thể xác. Sự hòa hợp về tâm hồn. Sự hòa hợp trong công việc.\nTất cả mọi thứ giữa tôi và Hibiki đều ăn khớp với nhau đến đáng sợ."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫と僕が、ここまで、深く――重なり、あえて、\nいること、には――っ――運命を、感じない、ことも」
1240 = "「Việc Hibiki và anh, có thể hòa quyện, sâu sắc——đến mức này,\n——anh không thể, không cảm nhận được, sự sắp đặt của vận mệnh.」"
# 【日々姫】
# display as 日日姬
# JP: 「ううんっ、違うっ――んっ――\nそれっ、ば――違うっ、と――にぃ、に」
992 = "「Không, sai rồi——ưm——\nCái đó——sai rồi——anh, hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1098 = "「Hửm?」"
# monologue
# JP: 体も顔もぐずぐずに溶けてる日々姫が、\n僕の勃起に貫かれたまま、珍しく異論を挟んでくる。
1670 = "Dù cơ thể và khuôn mặt đã tan chảy nhũn ra,\nnhưng Hibiki vẫn hiếm hoi phản bác lại trong khi đang bị tôi đâm sâu."
# 【双鉄】
# display as 雙鐵
# JP: 「違うとは――」
988 = "「Sai là sao——」"
# monologue
# JP: （ぐっ――じゅっ――ぐりゅ！　こしゅっ！！）
1752 = "（Hự——nhóp nhép——ngoáy! Cọ xát!!）"
# 【日々姫】
# display as 日日姬
# JP: 「んひゅんっ！！！」
1143 = "「Nhyun!!!」"
# monologue
# JP: それがなんだか嬉しくて、けれども少しだけは不安で。\n日々姫の弱いところを擦る。
1462 = "Điều đó khiến tôi vừa vui, lại vừa có chút bất an.\nTôi cọ xát vào điểm nhạy cảm của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「どういう、意味だ？　――っっ――\n僕に、どうか――聞かせて――ほし、いっ――」
1022 = "「Ý em, là sao? ——\nXin em——hãy nói——cho anh biết, đi——」"
# monologue
# JP: （ぐっ！　ずりゅっ！　ぷりゅんっ！　にゅずっ！）
1756 = "（Hự! Trượt! Bật ra! Phập!）"
# monologue
# JP: おまんこの腹側浅く、粒立つ部分を徹底的に潰して擦る。\nお前は僕のものなのだと、何度でも刻印したくって。
1524 = "Tôi triệt để chà xát, nghiền ép phần hạt sần sùi ở mặt nông phía bụng.\nMuốn khắc sâu vào em ấy vô số lần rằng, em là của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「だって――ふ、ぁっ――ひー、ちゃんっ――ちっちゃか、\nころ、からっ――がんば、て――がんば、った――けん」
1160 = "「Tại vì——fu, a——Hi-chan——từ lúc, còn nhỏ——\nđã cố gắng——cố gắng, rất nhiều——mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！！！！！」
1096 = "「!!!!!」"
# monologue
# JP: 射抜かれる。僕の全てを、魂を。\nああ、そうだ――小さなころから、ずうっと日々姫は――
1435 = "Tôi như bị bắn xuyên qua. Toàn bộ con người tôi, tâm hồn tôi.\nA, đúng rồi——từ khi còn nhỏ, Hibiki đã luôn——"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、専用――にぃにの、およめさん、なりたく、て、\nおべん、きょうも――うんどう、も――おしゃれ、も」
1190 = "「Dành riêng cho anh hai——muốn trở thành, cô dâu, của anh hai,\nnên học hành——thể thao——hay làm điệu, cũng.」"
# monologue
# JP: 小さな日々姫を思い出す。出会ったころから、今日までを。\n日々姫の全てを――思い出す。胸が、とても、苦しくなる。
1514 = "Tôi nhớ lại hình ảnh Hibiki hồi nhỏ. Từ lúc gặp gỡ, cho đến tận hôm nay.\nTôi nhớ lại——tất cả mọi thứ về Hibiki. Lồng ngực tôi, trở nên, rất đau nhói."
# 【双鉄】
# display as 雙鐵
# JP: 「日々、姫」
1238 = "「Hibi, ki.」"
# 【日々姫】
# display as 日日姬
# JP: 「お料理、とか、も――ね？　それから、それから――\nにぃにを、誘惑――できるようにって、Hな、こと、も」
1308 = "「Cả nấu ăn, nữa——nhé? Rồi thì, rồi thì——\nCả những chuyện dâm đãng, để có thể——quyến rũ, anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫っ！！！」
1243 = "「Hibiki!!!」"
# monologue
# JP: （ズッ――ぶうううううううううううっ！　ごりゅっ！）
1809 = "（Phập——vào sâuuuuuuuuuuu! Ngoáy!）"
# 【日々姫】
# display as 日日姬
# JP: 「～～～～～～～っ！！！！　かっ！　――はっ――あ！\nにぃにっ！　にぃに！　にぃに！　にぃにぃっ！！！」
1337 = "「~~~~~~~!!!! Ka! ——ha——a!\nAnh hai! Anh hai! Anh hai! Anh hai!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！　日々姫っ！　日々姫っ！　日々姫！！！」
1242 = "「Hibiki! Hibiki! Hibiki! Hibiki!!!」"
# monologue
# JP: 僕専用になるために、日々姫は日々姫の時間を積んだ。\nその健気さを、まるごと僕は、抱いて犯して貪っている。
1598 = "Để trở thành người dành riêng cho tôi, Hibiki đã dành trọn thời gian của mình.\nTôi đang ôm ấp, chiếm đoạt và ngấu nghiến toàn bộ sự đáng yêu đó."
# monologue
# JP: （ずぶっ！　ばちゅっ！　ずにゅっ！　じゅばっ！！）
1814 = "（Phập! Bạch! Phập! Nhóp nhép!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ふきゅっ！　んっ！　ふあっ！　あっっ！　～～っ！\nはっ　あっ！　にぃっ――にぃ、に――もっ、とっ！」
1069 = "「Fukyu! Ưm! Fa! A! ~~!\nHa a! Anh——anh, hai——hơn, nữa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！！！」
# 1094 = "「唔！！！」" 
# monologue
# JP: （ずっ！　ばっ！　ずりゅっ！　ばちゅっ！　ず！　ぶ）
1827 = "（Phập! Bạch! Trượt! Bạch! Phập! Phập!）"
# 【日々姫】
# display as 日日姬
# JP: 「んんんん～～～っ！！！」
1146 = "「Ưmmmm~~~!!!」"
# monologue
# JP: ゆえに、応える。僕の全てで。\n日々姫の求めてくれる全部に、僕の全身全霊でっ。
1422 = "Vì vậy, tôi đáp lại. Bằng tất cả những gì tôi có.\nBằng cả thể xác lẫn tâm hồn, đáp lại mọi thứ mà Hibiki mong muốn."
# monologue
# JP: （ずりゅうううううっ！　ごちゅっ！ズッ！　ごっ！）
1823 = "（Trượt vàooooo! Hự! Phập! Hự!）"
# monologue
# JP: リズムを作らず、思いがままに緩急をつけ腰を動かす。\nどんなわがままな動きにも、膣も子宮も喜び応える。
1507 = "Không cần giữ nhịp, tôi cứ tùy ý chuyển động hông lúc nhanh lúc chậm.\nDù là những chuyển động ích kỷ đến đâu, bên trong và tử cung em ấy đều vui sướng đáp lại."
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！　あっ！　んっ――ふやっ――んっ――あっ！\nにぃにっ！　にぃにっ！　奥っ！　奥っ！　もっとぉ！」
1067 = "「Fa! A! Ưm——fuya——ưm——a!\nAnh hai! Anh hai! Sâu nữa! Sâu nữa! Nữa đi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
# 1092 = "「唔！」" 
# monologue
# JP: （ずりゅ、ごっ！　ぐりゅっ！　ず、ぐ！　ごりゅっ！）
1826 = "（Trượt, hự! Ngoáy! Phập, hự! Ngoáy!）"
# 【日々姫】
# display as 日日姬
# JP: 「ああああああっ！　おまんこっ！　子宮！　はずか、し、\nはしゃい、でっ！　にぃいの、亀頭！　ちゅって、して」
1117 = "「Aaaaaa! Chỗ đó! Tử cung! Xấu hổ, quá,\nđang hưng phấn, quá! Phần đầu, của anh hai! Mút chặt lấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「んっっ――ぐっ！！！」
1128 = "「Ưm——hự!!!」"
# monologue
# JP: 子宮は僕の勃起をさらに伸ばしたいのか、食いつくように\n貼り付いてきては、さらに内へと吸い込もうとする。
1455 = "Tử cung như muốn kéo dài tôi ra thêm, nó dính chặt lấy như cắn nuốt,\nrồi cố gắng hút sâu vào bên trong hơn nữa."
# monologue
# JP: （ぐぷっ――ずっ！　ぐっ！　ぐりゅっ――ごっ！！）
1754 = "（Phập——phập! Hự! Ngoáy——hự!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ふやっ！　あっ！　あっ！　ひっぱら、れ、ちゃうっ！\nあかちゃんっ！　おへやっ！　にぃに、にぃに、にっ」
1052 = "「Fuya! A! A! Bị kéo, ra, mất!\nCăn phòng! Của em bé! Anh hai, anh hai.」"
# monologue
# JP: 貼り付いてくる子宮を剥がせば、亀頭先端は甘噛される。\n射精したくて射精したくて射精したくて汗だくになる。
1531 = "Khi dứt khỏi tử cung đang dính chặt lấy, phần đầu lại bị cắn nhẹ.\nTôi muốn xuất tinh, muốn xuất tinh, muốn xuất tinh đến mức mồ hôi đầm đìa."
# monologue
# JP: （ずりゅっ！　じゅごっ！　ずにゅっ！　ばちゅっ！！）
1820 = "（Trượt! Nhóp nhép! Phập! Bạch!!）"
# 【日々姫】
# display as 日日姬
# JP: 「はっ！　あっ！　んっ！　ふううううううっ！！！！」
1085 = "「Ha! A! Ưm! Fuuuuuuu!!!!」"
# monologue
# JP: だからリズムを取り直す。僕の/日々姫の好きなリズムを。\n一番自分に素直な動きで、日々姫の膣の求めに応える。
1536 = "Nên tôi lấy lại nhịp độ. Nhịp điệu mà tôi/Hibiki yêu thích.\nBằng những chuyển động thành thật với bản thân nhất, đáp lại sự khao khát bên trong Hibiki."
# monologue
# JP: （ずにゅっ！　ばちゅっ！　ずりゅうう！　ごちゅっ！）
1822 = "（Phập! Bạch! Trượt vàooo! Hự!）"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　にぃにっ！　にぃにっ！　にぃにっ！\nおまんこっ！　わたしっ！　わたしっ！　もうっ！！」
1326 = "「Anh hai! Anh hai! Anh hai! Anh hai!\nChỗ đó! Em! Em! Sắp!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ――日々姫っ――僕もっ――僕もだっ！！！」
1129 = "「Aa——Hibiki——anh cũng——anh cũng vậy!!!」"
# monologue
# JP: （ずりゅっ！　ばちゅっ！　ずぶっ！　ごちゅっ！！）
