3641 = "Đắng chát quá."

# monologue
# JP: 茶葉の入れ過ぎか、抽出し過ぎか。\nいや、恐らくはその両方の複合だろう。
3129 = "Là do cho quá nhiều trà, hay là ngâm quá\nlâu nhỉ.\nKhông, có lẽ là do cả hai nguyên nhân kết\nhợp lại."

# 【ポーレット】
# display as 波萊特
# JP: 「…………」
2062 = "「…………」"

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 2062 = "「……」" 

# monologue
# JP: ティーカップを前に、\nポーレットも日々姫も、厳しい顔で黙りこんでいる。
3675 = "Đứng trước tách trà,\ncả Paulette và Hibiki đều im lặng với vẻ\nmặt nghiêm trọng."

# monologue
# JP: もっともそれは、\nポーレットが紅茶を淹れてくれる前からだったが。
3135 = "Dù rằng tình trạng này đã diễn ra\ntừ trước khi Paulette pha trà cho chúng\ntôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
2779 = "「Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「は、はい！　何でしょう双鉄くん」
2514 = "「V-vâng! Có chuyện gì vậy anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「この茶だが、\n淹れ損なってしまったのではないかと、僕は感じる」
2666 = "「Trà này,\nanh cảm thấy hình như em pha hỏng mất rồi\nthì phải.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？！」
2488 = "「Ể?!」"

# monologue
# JP: ポーレットが驚いた顔でカップを口に。\n日々姫は、全く動かない。
3533 = "Paulette với vẻ mặt ngạc nhiên đưa tách\ntrà lên miệng.\nHibiki thì hoàn toàn bất động."

# 【ポーレット】
# display as 波萊特
# JP: 「わ――ぅわっ、これ――ごめんなさい。\nわたし、すぐに淹れなおして」
2481 = "「Oa——ư oa, cái này——em xin lỗi.\nĐể em đi pha lại ngay.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや。僕にまかせてはくれんか。\nこの前の[おうす,1]薄茶は好評をいただいたようだしな」
2363 = "「Không sao. Cứ giao cho anh đi.\nTrà nhạt lần trước anh pha có vẻ được đánh\ngiá cao mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ……はい。それじゃ、お言葉に甘えちゃいますね。\nありがとうございます」
2505 = "「À……vâng. Vậy thì, em xin phép nhận ý tốt\ncủa anh nhé.\nEm cảm ơn anh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なら、少し待っていてくれ」
2907 = "「Vậy thì đợi anh một chút nhé.」"

# monologue
# JP: ……ポーレットは明らかに動揺している。\n日々姫は恐らく、自責に苛まれている。
2050 = "……Paulette rõ ràng đang rất bối rối.\nHibiki thì có lẽ đang bị dằn vặt bởi sự tự\ntrách."

# monologue
# JP: これではまともに話もできない。\nならば、どうする？　――動く場所から動かすしかない。
3688 = "Thế này thì không thể nói chuyện tử tế\nđược.\nVậy phải làm sao đây? ——Chỉ còn cách bắt\nđầu từ những nơi có thể hành động thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「待たせたな」
2834 = "「Để mọi người phải đợi rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、わたくし達もいただけるのですね」
2485 = "「Oa, chúng em cũng được uống nữa ạ.」"

# 【れいな】
# display as 玲奈
# JP: 「そうてつさん、ありがとうございますぅ」
2930 = "「Anh Soutetsu, em cảm ơn anh nha~」"

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;組はそのままこくこく茶を飲み始める。
3685 = "Nhóm \\x%lレイルロオド;#00ffc040;Railord%l;#; cứ thế bắt đầu ừng ực uống\ntrà."

# monologue
# JP: 人間組は……\n茶碗を前にしてもまだ、手を伸ばそうとすらしない。
3625 = "Nhóm con người thì……\nDù tách trà đã ở ngay trước mặt nhưng vẫn\nkhông hề có ý định vươn tay ra."

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。ポーレット」
2497 = "「Hừm. Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「は、はい！　な、なんでしょう、双鉄くん」
# 2514 = "「啊，嗯！有什麼事嗎？雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「少し、れいなに話を聞いても良いだろうか」
2668 = "「Anh có thể hỏi chuyện Reina một chút được\nkhông?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
2503 = "「À……」"

# monologue
# JP: あからさまにホっとした声。
3690 = "Một giọng nói bộc lộ rõ sự nhẹ nhõm."

# monologue
# JP: ポーレットの顔が持ち上がり、\n今日はじめて、まともに僕と視線が合う。
3528 = "Paulette ngẩng mặt lên,\nvà đây là lần đầu tiên trong ngày hôm nay,\nánh mắt chúng tôi thực sự chạm nhau."

# 【ポーレット】
# display as 波萊特
# JP: 「そうして下さい。その方が、わたしも……\nわたしが話すより、きっと正しく伝わります」
2830 = "「Anh cứ tự nhiên. Như vậy thì, em cũng……\nChắc chắn con bé sẽ truyền đạt chính xác\nhơn là em kể lại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そうさせてもらおう。\nれいなも、構わないか？」
2904 = "「Nếu vậy thì, anh xin phép nhé.\nReina cũng không phiền chứ?」"

# 【れいな】
# display as 玲奈
# JP: 「ふぇ？　あ、はい。\nれいな、なんのお話をすればいいですかぁ？」
2486 = "「Hể? À, vâng.\nReina nên kể chuyện gì đây ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん、あのね？」
2528 = "「Ừm, chuyện là thế này.」"

# monologue
# JP: 今までのこわばりは何だったのかと感じるほどに、\nやわらかな声。
3689 = "Giọng nói của cô ấy mềm mỏng đến mức,\nkhiến tôi tự hỏi sự căng thẳng từ nãy đến\ngiờ rốt cuộc là vì cái gì."

# monologue
# JP: ポーレットはれいなと目の高さを合わせ、\n鼻と鼻とをくっつけるように話して聞かせる。
3527 = "Paulette cúi xuống ngang tầm mắt với\nReina,\nghé sát đến mức mũi chạm mũi để trò chuyện\nvới con bé."

# 【ポーレット】
# display as 波萊特
# JP: 「昨日、お客様が来たでしょう？　\nあのときのこと、れいなが見たままに話して欲しいの」
2710 = "「Hôm qua có khách đến đúng không nào?\nChị muốn Reina kể lại y như những gì em\nthấy lúc đó nhé.」"

# 【れいな】
# display as 玲奈
# JP: 「わかりましたぁ！　\nれいな、そうてつさんにお客さんのことお話しますねぇ」
2801 = "「Dạ vâng ạ!\nReina sẽ kể cho anh Soutetsu nghe về người\nkhách đó nha~」"

# monologue
# JP: 茶碗のお茶の残りを一気に飲みきり。
3564 = "Con bé uống cạn một hơi phần trà còn lại\ntrong tách."

# monologue
# JP: れいなは自分のスキットルを出し、\nテーブルの上においてから、ゆるりゆるりと話し始める。
3556 = "Reina lấy bình tông của mình ra,\nđặt lên bàn rồi từ tốn bắt đầu kể."

# 【れいな】
# display as 玲奈
# JP: 「昨日は、銀行のとおどりさん。\nほうしょうさんが、ポーレットに会いにきたんです」
2712 = "「Hôm qua là giám đốc ngân hàng.\nChú Houshou đã đến gặp chị Paulette đó ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
2942 = "「っ!」"

# monologue
# JP: 宝生の名を聞いた瞬間、日々姫がビクリと身を硬くする。
3632 = "Khoảnh khắc nghe thấy cái tên Houshou, cơ\nthể Hibiki giật nảy lên và cứng đờ."

# 【れいな】
# display as 玲奈
# JP: 「ほうしょうさんは、ポーレットにお話をしました。\nむつかしくて、れいなにはよくわからないお話です」
2576 = "「Chú Houshou đã nói chuyện với chị\nPaulette.\nChuyện khó hiểu lắm, Reina không hiểu gì\nhết á.」"

# 【ポーレット】
# display as 波萊特
# JP: 「……スポンサードの申し出でした」
2075 = "「……Là lời đề nghị tài trợ.」"

# monologue
# JP: れいなの話が、呼び水となってくれたのだろう。\nポーレットの静かな声が響き始める。
3567 = "Lời kể của Reina có lẽ đã trở thành mồi\nnhử.\nGiọng nói điềm tĩnh của Paulette bắt đầu\ncất lên."

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l列車;#00ffc040;列車%l;#;内広告や駅広告、路線広告などをフルパッケージで、\n隈元銀行として契約を結びたい――というお話です」
2398 = "「Đó là lời đề nghị muốn ký hợp đồng trọn\ngói cho quảng cáo trong \\x%l列車;#00ffc040;tàu%l;#;,\nquảng cáo tại ga, quảng cáo trên tuyến\nđường... với tư cách là Ngân hàng\nKumamoto.」"

# 【双鉄】
# display as 雙鐵
# JP: 「隈銀が御一夜で？　何の広告をするというんだ？」
2926 = "「Ngân hàng Kumamoto mà lại quảng cáo ở\nOhimitera sao? Bọn họ định quảng cáo cái\ngì cơ chứ?」"

# monologue
# JP: 隈銀は言うまでもなく御一夜唯一の銀行だ。
3506 = "Không cần phải nói, Kumagin là ngân hàng\nduy nhất ở Ohimitera."

# monologue
# JP: 認知度も影響力も絶大で、\n広告の必要があるとはとても思えない。
3132 = "Mức độ nhận diện và tầm ảnh hưởng đều cực\nkỳ lớn,\nthật khó mà tin được là họ lại cần phải\nquảng cáo."

# 【双鉄】
# display as 雙鐵
# JP: 「まして、御一夜鉄道において――ああ、いや、\n好意的に見れば、観光振興を見込んで……ではないか」
2749 = "「Huống hồ lại là trên Đường sắt\nOhimitera——À, không,\nnếu nhìn nhận một cách tích cực thì có lẽ\nhọ đang kỳ vọng vào việc chấn hưng du\nlịch... chăng?」"

# monologue
# JP: 全国展開しているわけでもない隈銀が、\n観光客を相手の広告を強化する意味は薄いだろう。
3712 = "Kumagin không phải là ngân hàng mở rộng\nquy mô trên toàn quốc,\nnên việc tăng cường quảng cáo nhắm vào du\nkhách cũng chẳng có mấy ý nghĩa."

# monologue
# JP: で、あるのなら――
3699 = "Nếu đã như vậy thì——"

# 【日々姫】
# display as 日日姬
# JP: 「バーター、ですか？」
2719 = "「Là trao đổi lợi ích sao?」"

# monologue
# JP: 消え入りそうな日々姫の声。\nポーレットは、力ない頷きでもって答える。
3482 = "Giọng nói của Hibiki nhỏ như sắp tan biến.\nPaulette gật đầu một cách yếu ớt để đáp\nlại."

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。申し出られているのは、事実上の利益供与。\n二十年の長期に渡り、年、一千万の広告料ですから」
2738 = "「Đúng vậy. Lời đề nghị đó thực chất là\ncung cấp lợi ích.\nMột hợp đồng dài hạn 20 năm, với phí quảng\ncáo 10 triệu yên mỗi năm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……なんというか、絶妙な金額ではあるな」
2093 = "「……Nói sao nhỉ, quả là một con số quá sức\ntuyệt diệu.」"

# monologue
# JP: 広告効果が乏しいであろう沿線なことを考慮してなお、\nフルパッケージで一千万なら、不自然な額とは思われない。
3620 = "Dù xét đến việc tuyến đường này có hiệu\nquả quảng cáo kém,\nnhưng với hợp đồng trọn gói 10 triệu yên\nthì con số này cũng không có vẻ gì là bất\nthường."

# monologue
# JP: その上、総額二億というのは……
3623 = "Hơn nữa, tổng số tiền lên đến 200 triệu\nyên thì……"

# 【ハチロク】
# display as 八六
# JP: 「\x%l8620;#00ffc040;8620%l;#;関係で使ったお金を全て埋め、\nいくらか余りが出る金額――という感じですね」
2598 = "「Đủ để bù đắp toàn bộ số tiền đã chi cho \\x%l8620;#00ffc040;8620%l;#;\n,\nvà còn dư ra một chút——kiểu như vậy nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2498 = "「Ừm.」"

# monologue
# JP: 御一夜鉄道株式会社から見れば、\n投資のリスクをゼロにできてしまう、魅力的な額。
3326 = "Đứng từ góc độ của Công ty Cổ phần Đường\nsắt Ohimitera,\nđây là một con số hấp dẫn có thể đưa rủi\nro đầu tư về mức 0."

# monologue
# JP: ああ、ということは――
3246 = "À, điều đó có nghĩa là——"

# 【双鉄】
# display as 雙鐵
# JP: 「バーターであるのなら、\n広告以外の要求もあったわけだな？」
2699 = "「Nếu là trao đổi lợi ích,\nthì chắc chắn phải có yêu cầu nào khác\nngoài quảng cáo đúng không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
2741 = "「Vâng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「工場誘致反対を撤回しろと要求されたのか？」
2397 = "「Bọn họ yêu cầu em rút lại việc phản đối\nthu hút nhà máy sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「いいえ、そうではなくて――」
2359 = "「Không, không phải vậy——」"

# 【日々姫】
# display as 日日姬
# JP: 「市長の辞任……が、要求ですか？」
2401 = "「Từ chức Thị trưởng……đó là yêu cầu sao?」"

# 【ポーレット】
# display as 波萊特＆雙鐵
# JP: 「えっ！？」\n「日々姫？　――っ！！」
2489 = "「Ể!?」\n「Hibiki? ——っ!!」"

# monologue
# JP: うなだれていた日々姫の顔が持ち上がってる。
3348 = "Hibiki nãy giờ vẫn cúi gầm mặt bỗng ngẩng\nlên."

# monologue
# JP: 目が、赤い。\n泣きはらし、涙が乾いてしまった瞳だ。
3281 = "Đôi mắt con bé đỏ hoe.\nĐôi mắt đã khóc cạn nước mắt, đến mức nước\nmắt cũng đã khô đi."

# 【日々姫】
# display as 日日姬
# JP: 「辞任さえすれば、それだけでいいって。\n多分……そういうような要求」
2476 = "「Chỉ cần từ chức là được.\nChắc là……yêu cầu kiểu như vậy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「……そうです」
2085 = "「……Đúng vậy.」"

# monologue
# JP: よほどびっくりしたのだろう。
3531 = "Có lẽ cô ấy đã rất ngạc nhiên."

# monologue
# JP: ポーレットはツバを小さく飲み込んでから、\n声をいくらか潜めて、話す。
3296 = "Paulette nuốt nước bọt một cái,\nrồi hạ giọng xuống một chút và nói."

# 【ポーレット】
# display as 波萊特
# JP: 「市長を辞任することだけが条件で。\n辞任さえすれば……広告の話はすぐ契約すると」
2400 = "「Điều kiện duy nhất là từ chức Thị trưởng.\nChỉ cần từ chức……thì họ sẽ ký hợp đồng\nquảng cáo ngay lập tức.」"

# monologue
# JP: そこまで言って、ポーレットはまじまじと日々姫を見る。
3302 = "Nói đến đó, Paulette nhìn chằm chằm vào\nHibiki."

# 【ポーレット】
# display as 波萊特
# JP: 「けど――\nどうして日々姫ちゃんが、そのこと」
2406 = "「Nhưng mà——\nSao Hibiki lại biết chuyện đó?」"

# monologue
# JP: 問われて、大きく日々姫が震える。
3649 = "Bị hỏi, cơ thể Hibiki run lên bần bật."

# monologue
# JP: 目にいっぱいに、また湧きだした涙をこぼさないように、\n必死に、力を込めている。
3272 = "Đôi mắt con bé lại ngập nước, và để ngăn\nkhông cho những giọt nước mắt ấy tuôn rơi,\ncon bé đang tuyệt vọng kìm nén."

# 【日々姫】
# display as 日日姬
# JP: 「そう思わせたの……そう思わせてしまったの……\n私、だから」
2539 = "「Người khiến họ nghĩ vậy……Người khiến họ\nnghĩ ra chuyện đó……\nLà em.」"

# 【双鉄】
# display as 雙鐵
# JP: 「思わせた？」
2833 = "「Khiến họ nghĩ vậy?」"

# monologue
# JP: 繋がる、すぐに。\nだから、質問をするまでもなく、断定している。
3409 = "Tôi lập tức xâu chuỗi lại mọi thứ.\nThế nên, không cần phải hỏi, tôi đã có thể\nkhẳng định."

# 【双鉄】
# display as 雙鐵
# JP: 「宝生稀咲にか」
2835 = "「Là Houshou Kisaki sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「私……だって……わかって欲しくて。\nポーレットさん、負担、大変で、頑張ってること」
2626 = "「Tại vì……em……chỉ muốn chị ấy hiểu.\nRằng chị Paulette đang phải gánh vác rất\nnhiều thứ, rất vất vả, và đang cố gắng đến\nnhường nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
# 2503 = "「啊……」" 

# monologue
# JP: セクハラ発言で市長が退場――\n新聞記事と日々姫の言葉が、繋がったように思える。
3315 = "Thị trưởng rời khỏi hội trường vì phát\nngôn quấy rối tình dục——\nBài báo và những lời của Hibiki dường như\nđã được kết nối với nhau."

# monologue
# JP: 恐らく稀咲は、ポーレットのことを軽んじて。\nだから日々姫は、懸命に弁護したのだろう。
3346 = "Có lẽ Kisaki đã xem thường Paulette.\nNên Hibiki mới tuyệt vọng bênh vực cô ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は、ポーレットを思いやった」
2705 = "「Hibiki đã rất quan tâm đến Paulette.」"

# monologue
# JP: ぐすんと、日々姫は鼻を鳴らす。
3465 = "Hibiki sụt sịt mũi."

# monologue
# JP: それが同意であることくらいは、\n義理でも兄な僕にもわかる。
3676 = "Dù chỉ là anh trai nuôi,\nnhưng tôi vẫn có thể hiểu được đó là sự\nđồng tình."

# 【双鉄】
# display as 雙鐵
# JP: 「それは間違いなく良いことだ。\nだというのに、バカだな、日々姫は。そんなに震えて」
2871 = "「Đó chắc chắn là một việc tốt.\nVậy mà em ngốc thật đấy, Hibiki. Tự nhiên\nlại run lẩy bẩy thế kia.」"

# monologue
# JP: 近寄り、日々姫の肩を支える。\nそれでも震えがとまらないから、腕を回して、そっと抱く。
3391 = "Tôi bước đến gần, giữ lấy vai Hibiki.\nNhưng con bé vẫn không ngừng run rẩy, nên\ntôi vòng tay ôm nhẹ lấy con bé."

# monologue
# JP: 僕の服へと顔をうずめて、\nもうこれ以上、涙をこらえずに済むように。
3367 = "Để con bé vùi mặt vào áo tôi,\nvà không cần phải kìm nén những giọt nước\nmắt thêm nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「怯える必要などはない。何に震えることもない。\n日々姫は少しも、間違ったことなどしていない」
2766 = "「Không cần phải sợ hãi. Cũng chẳng có gì\nphải run rẩy cả.\nHibiki không làm sai bất cứ điều gì hết.」"

# 【日々姫】
# display as 日日姬
# JP: 「だってっ！」
2479 = "「Nhưng mà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「事実を話しただけなのだろう？\n気心のしれている先輩に」
2420 = "「Em chỉ nói ra sự thật thôi đúng không?\nVới một người đàn chị thân thiết.」"

# 【日々姫】
# display as 日日姬
# JP: 「それは……そう、だけど。\nでも、稀咲先輩、隈元銀行の人なのに」
2892 = "「Đúng là……vậy, nhưng mà.\nNhưng chị Kisaki là người của Ngân hàng\nKumamoto cơ mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。日々姫は、学園の先輩に話しただけだ」
2768 = "「Đúng vậy. Hibiki chỉ nói chuyện với đàn\nchị ở trường thôi.」"

# monologue
# JP: 断言していい。\n稀咲と直接の接触は、数える程しか経験していないが。
3360 = "Tôi có thể khẳng định điều đó.\nDù số lần tiếp xúc trực tiếp với Kisaki\nchỉ đếm trên đầu ngón tay."

# 【双鉄】
# display as 雙鐵
# JP: 「隈元銀行御一夜支店長としての宝生稀咲は、決して、\n一学園生の情報だけで行動を起こしたりはしない」
2416 = "「Với tư cách là Giám đốc chi nhánh\nOhimitera của Ngân hàng Kumamoto, Houshou\nKisaki\ntuyệt đối sẽ không hành động chỉ dựa trên\nthông tin từ một học sinh đâu.」"

# monologue
# JP: しかし稀咲と、ただ一度でも会話をすれば、\n”そういう種類の人間だ”と、恐らく誰でも、確信できる。
3227 = "Nhưng chỉ cần nói chuyện với Kisaki một\nlần thôi,\ncó lẽ bất cứ ai cũng sẽ tin chắc rằng cô\nta là \"loại người như vậy\"."

# 【双鉄】
# display as 雙鐵
# JP: 「あれは、必ず事実関係の裏を取る。\nそして事実は、隠そうとしてさえ、明らかになる」
2554 = "「Cô ta nhất định sẽ điều tra tính xác thực\ncủa thông tin.\nVà sự thật thì dù có cố giấu đi chăng nữa\ncũng sẽ bị phơi bày thôi.」"

# monologue
# JP: いや、ひょっとして――\n稀咲はすでに、その方向で検討をしていたのかもしれない。
3138 = "Không, biết đâu chừng——\nKisaki đã cân nhắc theo hướng đó từ trước\nrồi cũng nên."

# monologue
# JP: いずれにしても、日々姫が話して聞かせたことなど、\n稀咲にとっては、材料のひとつに過ぎないだろう。
3131 = "Dù sao đi nữa, những gì Hibiki đã kể,\nđối với Kisaki có lẽ cũng chỉ là một trong\nnhững tư liệu mà thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「事態は、既に動いていたのだ。\n日々姫が何を話そうが、黙っていようが関係なしに、な」
2374 = "「Mọi chuyện vốn đã được định sẵn rồi.\nCho dù Hibiki có nói gì, hay có giữ im\nlặng thì cũng chẳng liên quan đâu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そう。そうなの、日々姫ちゃん」
2742 = "「Đúng vậy. Đúng là thế đó, Hibiki.」"

# monologue
# JP: れいなに押されて流れ始めて、\nそれでもなおも弱々しかったポーレットの声に力がこもる。
3146 = "Giọng nói vốn yếu ớt của Paulette, dù đã\nđược Reina thúc đẩy để cất lên,\nnay bỗng trở nên đầy nội lực."

# monologue
# JP: 日々姫を励ますそのために、\nくたくただろう心を声を、絞ってくれている。
3542 = "Để động viên Hibiki,\ncô ấy đang vắt kiệt chút sức lực cuối cùng\ntừ trái tim và giọng nói đã mệt nhoài của\nmình."

# 【ポーレット】
# display as 波萊特
# JP: 「辞任云々の報道が出たのは、\nただ、わたしの答えが……心が、揺らいでたせいだから」
2366 = "「Việc báo chí đưa tin về chuyện từ chức,\nchỉ là do câu trả lời của chị……do trái tim\nchị đã dao động thôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2942 = "「！」" 

# monologue
# JP: ポーレットの言葉に、吐露に、日々姫の顔が跳ね上がる。
3485 = "Nghe những lời bộc bạch của Paulette,\nHibiki giật bắn mình ngẩng mặt lên."

# monologue
# JP: “そこまで言わせてしまった”と、\n恐らく日々姫は、自責を更に深めてしまった。
2029 = "\"Mình lại ép chị ấy phải nói ra những lời\nnhư vậy\"——\nCó lẽ sự tự trách của Hibiki lại càng sâu\nsắc hơn."

# 【日々姫】
# display as 日日姬
# JP: 「ありがと、にぃに」
2831 = "「Cảm ơn anh hai.」"

# monologue
# JP: だからこそ。日々姫は、僕の義妹は――\nもう大丈夫というように、僕からそうっと体を離す。
3406 = "Chính vì vậy. Hibiki, cô em gái nuôi của\ntôi——\nđã nhẹ nhàng rời khỏi vòng tay tôi như\nmuốn nói rằng mình không sao."

# monologue
# JP: それが日々姫の望みであるなら、平気なものと扱おう。\nポーレットへと向き直り、聞いた言葉を繰り返す。
3418 = "Nếu đó là mong muốn của Hibiki, tôi sẽ cư\nxử như thể con bé vẫn ổn.\nTôi quay lại nhìn Paulette, và lặp lại\nnhững lời vừa nghe."

# 【双鉄】
# display as 雙鐵
# JP: 「揺らいだか」
2418 = "「Đã dao động sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「です、ね。\n……正直、揺らいじゃいました」
2735 = "「Đúng, vậy.\n……Thành thật mà nói, em đã dao động.」"

# monologue
# JP: 日々姫のために絞ってくれた力が、\nみるみる萎えていくのが端から見てわかる。
3543 = "Sức lực mà cô ấy vừa vắt kiệt vì Hibiki,\nđang xẹp đi trông thấy, ai nhìn từ bên\nngoài cũng nhận ra."

# monologue
# JP: それほどまでに――\nポーレットは疲れ、消耗しきってしまっている。
3525 = "Đến mức đó cơ à——\nPaulette đã mệt mỏi và kiệt sức hoàn toàn\nrồi."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしが、すぐにきっぱり断っていれば、\nそんな報道、絶対に出るはずもないんです」
2828 = "「Nếu lúc đó em dứt khoát từ chối ngay lập\ntức,\nthì tuyệt đối đã không có bài báo nào như\nvậy xuất hiện.」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、それはそうだろうな」
2531 = "「Chà, đúng là vậy thật.」"

# monologue
# JP: 万一出ても、全く根拠が無いのであれば、\n法的手段に訴えればいい。
3314 = "Giả sử bài báo đó có được tung ra đi nữa,\nnếu hoàn toàn không có căn cứ,\nthì chỉ cần dùng đến các biện pháp pháp lý\nlà được."

# monologue
# JP: そうした姿勢を取ること自体が、\n辞任観測を否定する強い力ともなる筈だ。
3627 = "Bản thân việc thể hiện thái độ đó\ncũng sẽ trở thành một sức mạnh to lớn để\nphủ nhận tin đồn từ chức."

# 【ポーレット】
# display as 波萊特
# JP: 「けど、わたし……揺らいで……迷って――\n『検討します』って……答えちゃったんです」
2410 = "「Nhưng mà, em……đã dao động……đã do dự——\nvà em đã trả lời rằng……『Tôi sẽ cân nhắc』.」"

# 【双鉄】
# display as 雙鐵
# JP: 「検討、か――」
2814 = "「Cân nhắc, sao——」"

# monologue
# JP: どう言おうかと言葉を探しあぐねるうちに、\nハチロクがスっと踏み込んでいく。
3504 = "Trong lúc tôi đang mải mê tìm từ ngữ để\nnói,\nHachiroku đã nhẹ nhàng bước tới."

# 【ハチロク】
# display as 八六
# JP: 「『市長辞任を検討します』と――\nそう捉えられても仕方の無い発言ですね、それは」
2870 = "「『Sẽ cân nhắc việc từ chức Thị trưởng』——\nNếu bị hiểu như vậy thì cũng hết cách,\nphát ngôn đó quả thật là vậy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「……はい」
# 2085 = "「……是的」" 

# 【れいな】
# display as 玲奈
# JP: 「え！？\nポーレット、市長さんやめちゃうんですかぁ？」
2492 = "「Ể!?\nChị Paulette sẽ nghỉ làm Thị trưởng sao\nạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「……さぁ……れいな。どうなのかしらね」
2082 = "「……Ai biết được……Reina. Sẽ thế nào đây\nnhỉ.」"

# monologue
# JP: れいなの疑問は、否定されない。\nれいなはますます不思議そうな顔になる。
3276 = "Thắc mắc của Reina không bị phủ nhận.\nKhuôn mặt con bé ngày càng lộ rõ vẻ khó\nhiểu."

# 【れいな】
# display as 玲奈
# JP: 「？？？　わからないのですか？\nポーレットのことなのに」
2946 = "「??? Chị không biết sao ạ?\nChuyện của chị Paulette cơ mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そう……ね、ほんと。\n自分のこともわからないとか、おかしいわよね」
2726 = "「Đúng……nhỉ, thật sự.\nĐến chuyện của bản thân mình mà cũng không\nbiết, kỳ lạ quá nhỉ.」"

# monologue
# JP: 力無い言葉を心配したのか、\nれいながぽてぽてポーレットへと歩み寄る。
3155 = "Chắc là vì lo lắng cho những lời nói yếu\nớt đó,\nReina lạch bạch chạy đến chỗ Paulette."

# monologue
# JP: ポーレットは真白い手を伸ばし、\nれいなの小さな体を抱きしめ、胸に収める。
3523 = "Paulette vươn đôi tay trắng ngần ra,\nôm lấy cơ thể bé nhỏ của Reina vào lòng."

# 【れいな】
# display as 玲奈
# JP: 「ひゃうう」
2482 = "「Hyaa.」"

# monologue
# JP: （これは……これほどまでに、だったか。\nこれほどまでに、ポーレットは磨り減りきっていたのか）
3759 = "（Chuyện này……đã đến mức này rồi sao.\nPaulette đã bị bào mòn đến mức này rồi\nsao.）"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2933 = "「Ngài Soutetsu.」"

# monologue
# JP: ハチロクが、それだけ言って僕を見る。\n促すように、僕を見つめる。
3188 = "Hachiroku chỉ nói vậy rồi nhìn tôi.\nÁnh mắt như đang hối thúc tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。結論はすでに出ている」
2532 = "「Ừ. Kết luận đã có rồi.」"

# monologue
# JP: だから、僕もそれだけを言う。
3401 = "Thế nên, tôi cũng chỉ nói vậy."

# monologue
# JP: 無言のうちに、全員が共有させられた――\nするしか無かった認識としても、声に出さねば、進めない。
3177 = "Trong sự im lặng, tất cả đều đã chia sẻ\ncùng một suy nghĩ——\nDù là nhận thức bắt buộc phải có, nhưng\nnếu không nói ra thì sẽ không thể tiến lên\nđược."

# 【双鉄】
# display as 雙鐵
# JP: 「僕達は、この辞任観測報道を否定できず、\n撤回させることも出来ない」
2640 = "「Chúng ta không thể phủ nhận bản tin dự\nđoán từ chức này,\ncũng không thể bắt họ rút lại được.」"

# 【ポーレット】
# display as 波萊特
# JP: 「…………」
# 2062 = "「……」" 

# monologue
# JP: 頷く。ごくごくわずかに、力なく。\nしかし、ポーレットが確かに、頷く。
3719 = "Cô ấy gật đầu. Vô cùng yếu ớt, chẳng chút\nsức lực.\nNhưng Paulette thực sự đã gật đầu."

# monologue
# JP: 次の瞬間、そうした自分に驚いたように顔をあげ、\n泣きそうな目で、僕を見る。
3125 = "Ngay khoảnh khắc tiếp theo, cô ấy ngẩng\nmặt lên như thể ngạc nhiên với chính bản\nthân mình,\nvà nhìn tôi bằng đôi mắt như chực trào\nnước mắt."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットへの負荷が大きすぎたのだ。\nこれ以上の市長と社長の兼務は――」
2423 = "「Gánh nặng đối với Paulette đã quá lớn\nrồi.\nViệc tiếp tục kiêm nhiệm cả chức Thị\ntrưởng và Giám đốc thì——」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
2931 = "「Anh Soutetsu.」"

# monologue
# JP: まばたきをして、ツバを飲み。
3291 = "Cô ấy chớp mắt, rồi nuốt nước bọt."

# monologue
# JP: そうして大きく息を吸い、\nポーレットはゆっくりと立ち上がる。
3557 = "Sau đó hít một hơi thật sâu,\nPaulette từ từ đứng dậy."

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう。でも、自分で言います。\n自分で言わなきゃ――ダメなことです、絶対に」
2832 = "「Cảm ơn anh. Nhưng mà, em sẽ tự mình nói\nra.\nEm phải tự mình nói ra——Chắc chắn là vậy.」"

# monologue
# JP: 僕は知っている。\nいや、ここにいる全員が間違いなく知っている。
3364 = "Tôi biết.\nKhông, tất cả mọi người ở đây chắc chắn\nđều biết."

# monologue
# JP: ポーレットの責任感が、\n必要十分を更に上回る強さであるということを。
3529 = "Rằng tinh thần trách nhiệm của Paulette,\nmạnh mẽ đến mức vượt xa cả mức cần thiết."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしの能力で、御一夜市長と御一夜鉄道社長とを、\nこれ以上兼務することは、とても困難だと感じています」
2673 = "「Với năng lực của em, việc tiếp tục kiêm\nnhiệm cả chức Thị trưởng Ohimitera và Giám\nđốc Đường sắt Ohimitera,\nem cảm thấy là vô cùng khó khăn.」"

# monologue
# JP: ――そのポーレットの決断ならば、\n無論、支持する。
2021 = "——Nếu đó là quyết định của Paulette,\nthì tất nhiên, tôi sẽ ủng hộ."

# monologue
# JP: うなだれていた日々姫も今は顔をあげ、\nしっかとポーレットを見つめている。
3208 = "Hibiki nãy giờ vẫn cúi gầm mặt, giờ cũng\nđã ngẩng lên,\nvà nhìn Paulette một cách kiên định."

# 【ポーレット】
# display as 波萊特
# JP: 「ですので――最善の形を作って。\nそうして市長を辞任したいと、今、決断しました」
2681 = "「Chính vì vậy——Em muốn tạo ra một hình\nthức tốt nhất.\nRồi sau đó từ chức Thị trưởng, em đã quyết\nđịnh như vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2732 = "「Vậy sao.」"

# 【ハチロク】
# display as 八六
# JP: 「最善の形とは、誰に、あるいは何にとっての、\n最善という意味でしょうか？」
2753 = "「Hình thức tốt nhất, ý cô là tốt nhất cho\nai,\nhay tốt nhất cho cái gì ạ?」"

# monologue
# JP: ハチロクはポーレットを振り返らせない。\n立ち止まることさえ、今はさせない。
3182 = "Hachiroku không để Paulette ngoảnh lại.\nLúc này, cô ấy thậm chí không cho phép\nPaulette dừng bước."

# monologue
# JP: その決断を未来へと――\nつなげるために、問いかける。
3280 = "Để kết nối quyết định đó với tương lai——\ncô ấy đã đặt câu hỏi."

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜市と、御一夜鉄道。\nそして、わたし達みんなにとっての、最善です」
2582 = "「Là tốt nhất cho thành phố Ohimitera và\nĐường sắt Ohimitera.\nVà cũng là tốt nhất cho tất cả chúng ta.」"

# 【ハチロク】
# display as 八六
# JP: 「具体的には？」
2442 = "「Cụ thể là sao ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたしが市議会議長に辞職を申し出れば、\nその日から５プラス５０日以内に市長選が行われます」
2473 = "「Nếu em đệ đơn từ chức lên Chủ tịch Hội\nđồng thành phố,\nthì trong vòng 5 cộng 50 ngày kể từ ngày\nđó, cuộc bầu cử Thị trưởng sẽ được tổ\nchức.」"

# monologue
# JP: ポーレットの目が、僕を捉える。
3526 = "Ánh mắt của Paulette hướng về phía tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「その市長選で\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対派の候補が勝てば、\n民意を改めて示せることになります」
2556 = "「Trong cuộc bầu cử đó, nếu ứng cử viên\nthuộc phe phản đối thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;\ngiành chiến thắng,\nthì chúng ta có thể một lần nữa chứng minh\nđược ý nguyện của người dân.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――そうなれば一挙両得という形に」
2450 = "「Ra là vậy——Nếu được như thế thì đúng là\nnhất cử lưỡng tiện.」"

# 【ポーレット】
# display as 波萊特
# JP: 「いえ。隈元銀行からの広告の話は断ります。\n受けてしまえば、市長選で負けてしまいますから」
2337 = "「Không đâu. Em sẽ từ chối lời đề nghị\nquảng cáo từ Ngân hàng Kumamoto.\nBởi vì nếu nhận lời, chúng ta sẽ thua\ntrong cuộc bầu cử Thị trưởng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2502 = "「À——」"

# monologue
# JP: 確かにだ。\nもし、広告の話を受けてしまったのなら――
3610 = "Đúng là vậy.\nNếu nhận lời đề nghị quảng cáo đó thì——"

# monologue
# JP: 『市長職を、広告費を得るための質草にした』\n――そうした批判に、全く抗えなくなってしまう。
2031 = "『Đem chức Thị trưởng ra làm vật thế chấp\nđể lấy tiền quảng cáo』\n——Chúng ta sẽ hoàn toàn không thể phản bác\nlại những lời chỉ trích như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「……となると、広告云々の話は、\nある種の罠、とも考えられるか」
2090 = "「……Vậy thì, chuyện quảng cáo các thứ,\ncũng có thể coi là một loại cạm bẫy nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね」
# 2741 = "「是的」" 

# monologue
# JP: 言葉は、もはや竦んでいない。\n目にも力が戻っている。
3287 = "Lời nói của cô ấy không còn rụt rè nữa.\nÁnh mắt cũng đã lấy lại được sức mạnh."

# 【ポーレット】
# display as 波萊特
# JP: 「選挙戦。\n選挙は――つまり、戦争ですから」
2884 = "「Cuộc chiến bầu cử.\nBầu cử——nói cách khác, chính là chiến\ntranh.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら、最善――勝利のための戦略を、\nすでにポーレット様はお考えなのですか？」
2916 = "「Nếu vậy, chiến lược tốt nhất——chiến lược\nđể giành chiến thắng,\nThị trưởng Paulette đã suy nghĩ xong rồi\nsao?」"

# monologue
# JP: こくり、ポーレットは頷いて。\n持ち上げなおした瞳はなおも、僕から全く離れない。
3532 = "Paulette khẽ gật đầu.\nĐôi mắt vừa ngước lên vẫn không hề rời\nkhỏi tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、考えたんです。私が揺らいでしまったのは、\n逆にいうと、揺らげるだけの余裕があったからだって」
2660 = "「Em đã suy nghĩ rồi. Việc em dao động,\nnói ngược lại, là vì em có đủ sự dư dả để\ndao động.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2498 = "「唔」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その余裕は、双鉄くんが、わたしに与えてくれたもの。\n双鉄くんが居てくれるって思ったから、わたし――」
2872 = "「Sự dư dả đó, là do anh Soutetsu đã mang\nđến cho em.\nVì nghĩ rằng có anh Soutetsu ở bên, nên\nem——」"

# 【ハチロク】
# display as 八六
# JP: 「なるほど。つまり」
2451 = "「Ra là vậy. Tóm lại là.」"

# monologue
# JP: ハチロクの視線までもが、\nポーレットから外れ、僕へと。
3195 = "Ngay cả ánh mắt của Hachiroku,\ncũng rời khỏi Paulette và hướng về phía\ntôi."

# 【ハチロク】
# display as 八六
# JP: 「後継候補を双鉄様に――\nそれが、ポーレット様の戦略ですか？」
2836 = "「Để ngài Soutetsu làm ứng cử viên kế\nnhiệm——\nĐó là chiến lược của Thị trưởng Paulette\nsao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん。\nもちろん、双鉄くんがよければ、だけど」
2524 = "「Ừm.\nTất nhiên là nếu anh Soutetsu đồng ý.」"

# 【双鉄】
# display as 雙鐵
# JP: 「もとより、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致撤回を果たすため、\n僕はこの町に戻ってきた。候補になるのは構わん。が」
2643 = "「Vốn dĩ, để hủy bỏ việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;\n,\nanh mới quay lại thành phố này. Trở thành\nứng cử viên cũng không sao. Nhưng mà.」"

# monologue
# JP: 見る。\nポーレットでもハチロクでもない、その人を。
3377 = "Tôi nhìn.\nKhông phải Paulette, cũng không phải\nHachiroku, mà là người đó."

# monologue
# JP: 御一夜に産まれ、御一夜に育ち、\n僕に御一夜を教えてくれた、[いもうと,1]義妹を。
3628 = "Sinh ra ở Ohimitera, lớn lên ở Ohimitera,\nvà là người đã dạy tôi về Ohimitera, em\ngái nuôi của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「僕という実質的な[よそもの,2]余所者が候補になって、\n御一夜の選挙で――勝てるのか？」
2589 = "「Một kẻ thực chất là người ngoài như anh\nmà trở thành ứng cử viên,\nthì liệu có thể chiến thắng trong cuộc bầu\ncử ở Ohimitera không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫です。\nわたしだって同じようなものでしたし」
2351 = "「Không sao đâu.\nBởi vì em cũng giống vậy mà.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様を上回る能力の候補など、\n御一夜中をどう探しても見つからないでしょう」
2817 = "「Một ứng cử viên có năng lực vượt trội hơn\nngài Soutetsu,\ndù có tìm khắp Ohimitera cũng không thấy\nđâu.」"

# monologue
# JP: ポーレットとハチロクとの言葉と信頼とは嬉しい。\nが――ことはそんなに単純ではない。
3718 = "Những lời nói và sự tin tưởng của Paulette\nvà Hachiroku khiến tôi rất vui.\nNhưng mà——mọi chuyện không hề đơn giản như\nvậy."

# monologue
# JP: （ポーレットも確かに余所者同然ではある。\nが――任期途中に逝去した前市長の、実の娘だ）
3756 = "（Paulette đúng là cũng chẳng khác gì người\nngoài.\nNhưng——cô ấy là con gái ruột của cựu Thị\ntrưởng đã qua đời khi đang đương nhiệm.）"

# monologue
# JP: 対し、ポーレットは。自己都合での途中辞任。\n僕と血縁があるわけでもないし、無論、弔い合戦でもない。
3631 = "Trái lại, Paulette thì sao. Từ chức giữa\nchừng vì lý do cá nhân.\nCô ấy không có quan hệ huyết thống với\ntôi, và tất nhiên, đây cũng không phải là\nmột cuộc chiến tang tóc."

# monologue
# JP: 後継候補になることが、\n果たしてどれだけ有利に働くものか、まるで読めない。
3372 = "Việc trở thành ứng cử viên kế nhiệm,\nrốt cuộc sẽ mang lại bao nhiêu lợi thế,\ntôi hoàn toàn không thể đoán trước được."

# monologue
# JP: （まして、ハチロクの言は単なる身びいきだ。\n僕より有能なものなど、ごくごく身近にさえも）
3748 = "（Hơn nữa, lời nói của Hachiroku chỉ đơn\nthuần là thiên vị mà thôi.\nNhững người tài giỏi hơn tôi, ngay cả ở\nxung quanh tôi cũng có đầy）"

# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇに――」
2923 = "「Anh hai——」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2942 = "「！」" 

# monologue
# JP: 心を読まれたような気がして、驚かされる。\nけれど日々姫は、僕を見てない。
3354 = "Có cảm giác như bị đọc thấu tâm can, tôi\ngiật mình ngạc nhiên.\nNhưng Hibiki lại không nhìn tôi."

# monologue
# JP: 視線はじっと床へ落ち、\n釘付けられでもしたかのように、動かない。
3283 = "Ánh mắt con bé dán chặt xuống sàn nhà,\nkhông hề nhúc nhích như thể bị đóng đinh ở\nđó."

# 【日々姫】
# display as 日日姬
# JP: 「真闇姉さんに聞いてみるのが、一番いいと思います。\n御一夜の選挙のこと……多分、誰よりも詳しいですから」
2669 = "「Em nghĩ hỏi chị Mayami là tốt nhất.\nChuyện bầu cử ở Ohimitera……có lẽ chị ấy là\nngười rành hơn bất cứ ai.」"

# 【ポーレット】
# display as 波萊特＆八六
# JP: 「あっ！　そうですよね」\n「そうなのでしょうね」
2509 = "「A! Đúng vậy nhỉ.」\n「Chắc là vậy rồi.」"

# monologue
# JP: ――左右から、即時の同意。\nけれども僕は、即答できない。
2022 = "——Sự đồng tình ngay lập tức từ hai bên.\nNhưng tôi lại không thể trả lời ngay được."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は、それで――」
2706 = "「Hibiki, em thấy thế——」"

# monologue
# JP: いいかけ、すぐさま言葉を呑み込む。
3358 = "Vừa định nói, tôi lập tức nuốt lại lời."

# monologue
# JP: （馬鹿か、僕は）
3752 = "（Mình bị ngốc à）"

# monologue
# JP: 日々姫が提案してくれたことであるというのに、\n“それでいいのか”と確認するなど、愚弄に等しい。
3493 = "Rõ ràng là do Hibiki đề xuất,\nvậy mà tôi lại đi xác nhận xem \"thế có\nđược không\", chẳng khác nào đang chế nhạo\ncon bé."

# monologue
# JP: 同意か、反対。答えはそのいずれかのみであるべきだし、\nであるのなら、僕の答えはひとつしか無い。
3242 = "Đồng ý, hoặc phản đối. Câu trả lời chỉ nên\nlà một trong hai,\nvà nếu đã vậy, thì câu trả lời của tôi chỉ\ncó một."

# 【双鉄】
# display as 雙鐵
# JP: 「――とてもいい案だ。そうしよう」
2058 = "「——Một ý kiến rất hay. Quyết định vậy đi.」"

# 【真闇】
# display as 真闇
# JP: 「双ちゃんでは勝てんね」
2586 = "「Sou-chan thì không thắng nổi đâu.」"

# monologue
# JP: あっさりと、\n真闇姉はただ、結論だけを口にする。
3597 = "Rất dứt khoát,\nchị Mayami chỉ nói ra kết luận."

# 【ハチロク】
# display as 八六
# JP: 「どうしてですか！？」
2782 = "「Tại sao chứ ạ!?」"

# monologue
# JP: 問いかけに、\n真闇姉は逆に質問を投げかける。
3599 = "Đáp lại câu hỏi đó,\nchị Mayami lại đặt ngược lại một câu hỏi."

# 【真闇】
# display as 真闇
# JP: 「選挙結果を決める言われとる三要素。\n何と何と何だか、知っとる？」
2477 = "「Ba yếu tố được cho là quyết định kết quả\nbầu cử.\nMọi người có biết là những cái gì không?」"

# 【ハチロク】
# display as 八六
# JP: 「存じ上げません」
2631 = "「Em không biết ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「地盤、看板、鞄――と言われていますよね」
2543 = "「Địa bàn, bảng hiệu, cặp táp——người ta\nthường nói vậy đúng không.」"

# 【れいな】
# display as 玲奈
# JP: 「“ばん”ばっかりですぅ」
2886 = "「Toàn là chữ \"bản\" không thôi nha~」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうね、れいな」
2731 = "「Đúng vậy nhỉ, Reina.」"

# monologue
# JP: 面白がったれいなに向かい――\nいや、れいなに向けるフリをして。
3297 = "Hướng về phía Reina đang tỏ ra thích thú——\nKhông, là giả vờ hướng về phía Reina."

# monologue
# JP: 地盤は組織、看板は知名度、鞄はお金のことである、と、\nポーレットはさりげなく教えてくれる。
3264 = "Địa bàn là tổ chức, bảng hiệu là độ nổi\ntiếng, cặp táp là tiền bạc,\nPaulette đã khéo léo giải thích cho mọi\nngười hiểu."

# 【ポーレット】
# display as 波萊特
# JP: 「けど、今どきの選挙はむしろ、\n“人、金、風で決まる”なんていう風にも言われてるの」
2355 = "「Nhưng mà, các cuộc bầu cử thời nay lại\nthường được cho là\n“quyết định bởi con người, tiền bạc và\nngọn gió”.」"

# 【れいな】
# display as 玲奈
# JP: 「風って、びゅーって吹くアレですかぁ？」
2938 = "「Gió là cái thổi vù vù đó hả chị?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうね。つまりは、その場の流れや、雰囲気のこと。\n今どきは、浮動票の影響力がとても大きいから」
2499 = "「Ừm. Tóm lại là xu hướng và bầu không khí\nlúc đó.\nThời nay, sức ảnh hưởng của những lá phiếu\nchưa quyết định là rất lớn.」"

# 【れいな】
# display as 玲奈
# JP: 「ふどうひょう」
2781 = "「Lá phiếu chưa quyết định?」"

# 【真闇】
# display as 真闇
# JP: 「地盤に乗らない……特定の候補を応援してない票のこと。\nゆーか、ポーちゃんは、さすが現職の市長さんやねぇ」
2340 = "「Là những lá phiếu không nằm trong địa\nbàn……không ủng hộ một ứng cử viên cụ thể\nnào cả.\nCơ mà, Pou-chan quả không hổ danh là Thị\ntrưởng đương nhiệm nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、そんな」
2362 = "「Không, đâu có ạ.」"

# 【真闇】
# display as 真闇
# JP: 「ほんならね。今度は、ひーちゃんに質問」
2912 = "「Vậy thì. Lần này đến lượt câu hỏi cho\nHii-chan nhé.」"

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 2062 = "「……」" 

# monologue
# JP: いきなり話を振られてけれど、日々姫は少しも慌てない。\n無言のままに頷くのみだ。
3720 = "Dù bất ngờ bị gọi tên, nhưng Hibiki không\nhề tỏ ra luống cuống.\nCon bé chỉ lặng lẽ gật đầu."

# monologue
# JP: 真闇姉はそんな日々姫を満足そうに眺めて、\nおもむろに問いを重ねる。
3602 = "Chị Mayami hài lòng nhìn Hibiki như vậy,\nrồi từ tốn đặt câu hỏi."

# 【真闇】
# display as 真闇
# JP: 「人、金、風で――前回の市長選、\nポーちゃんに味方したのは、どれやったかねぇ」
2378 = "「Con người, tiền bạc, ngọn gió——Trong cuộc\nbầu cử Thị trưởng lần trước,\ncái nào đã đứng về phía Pou-chan nhỉ.」"

# 【日々姫】
# display as 日日姬
# JP: 「お金がどうかは知らないけど――\n人と風とは、確実に」
2754 = "「Tiền bạc thế nào thì em không biết,\nnhưng——\ncon người và ngọn gió thì chắc chắn là\ncó.」"

# 【真闇】
# display as 真闇
# JP: 「そーね。前市長の地盤をそっくり受け継いで、\nその上、弔い選挙いう強か追い風ば吹いたけんねぇ」
2721 = "「Đúng vậy. Kế thừa trọn vẹn địa bàn của\ncựu Thị trưởng,\nhơn nữa lại còn có luồng gió thuận mạnh mẽ\nmang tên cuộc bầu cử tang tóc thổi tới nữa\nchứ.」"

# monologue
# JP: 満足そうに日々姫を見、確認するようにポーレットを見て。\n真闇姉の視線は今度は、僕へ向く。
3279 = "Chị Mayami nhìn Hibiki một cách hài lòng,\nrồi nhìn Paulette như để xác nhận.\nSau đó, ánh mắt chị ấy hướng về phía tôi."

# 【真闇】
# display as 真闇
# JP: 「ポーちゃんが辞任して市長選になった場合、\n誘致賛成派が担ぐ候補は、稀咲ちゃんたい」
2561 = "「Trong trường hợp Pou-chan từ chức và tổ\nchức bầu cử Thị trưởng,\nứng cử viên mà phe ủng hộ thu hút nhà máy\nđề cử sẽ là bé Kisaki đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
2507 = "「A!」"

# 【れいな】
# display as 玲奈
# JP: 「そおなんですかぁ？」
2747 = "「Vậy sao ạ?」"

# monologue
# JP: 驚き顔のポーレットたち。\n対して日々姫は、顔色ひとつも変えずに頷く。
3524 = "Paulette và những người khác đều tỏ ra\nngạc nhiên.\nNgược lại, Hibiki chỉ gật đầu mà không hề\nbiến sắc."

# monologue
# JP: そしてゆっくり……\n表情を消そう消そうとしている顔で、僕を見る。
3559 = "Rồi chầm chậm……\ncon bé nhìn tôi với khuôn mặt đang cố gắng\nxóa đi mọi biểu cảm."

# 【日々姫】
# display as 日日姬
# JP: 「やっぱり――だよね。だから、にぃにぃ。\n――兄さんじゃ、今回の選挙には、勝てない」
2760 = "「Quả nhiên——là vậy nhỉ. Thế nên, anh hai.\n——Anh trai sẽ không thể thắng trong cuộc\nbầu cử lần này đâu.」"

# 【ハチロク】
# display as 八六
# JP: 「なっ！？」
2385 = "「Cái gì!?」"

# 【真闇】
# display as 真闇
# JP: 「そーよね。ウチもそう思うたい。\nゆーか、双ちゃんを立てれば、向こうさんの思うツボ」
2729 = "「Đúng vậy. Chị cũng nghĩ thế.\nĐúng hơn là, nếu để Sou-chan ra tranh cử,\nthì sẽ trúng đúng ý đồ của bên kia.」"

# 【ハチロク】
# display as 八六
# JP: 「思うツボとはなんですか！\n双鉄様なら、そんなツボは叩き割ってくださいます！」
2383 = "「Trúng đúng ý đồ là sao chứ!\nNếu là ngài Soutetsu, ngài ấy sẽ đập nát\ncái ý đồ đó cho xem!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク」
2915 = "「Nếu vậy thì, Hachiroku.」"

# monologue
# JP: 気持ちは嬉しい。
3717 = "Dù cảm thấy vui vì tấm lòng của em ấy."

# monologue
# JP: が――日々姫の見立ては確かだろうと、\n僕自身はっきり感じている。
3229 = "Nhưng——bản thân tôi cũng cảm nhận rõ ràng\nrằng\nnhận định của Hibiki là chính xác."

# 【双鉄】
# display as 雙鐵
# JP: 「比較してみよう。まずは金。\n稀咲と僕とで、これはどうだ？」
2764 = "「Thử so sánh xem nào. Đầu tiên là tiền\nbạc.\nGiữa anh và Kisaki thì cái này thế nào?」"

# 【ハチロク】
# display as 八六
# JP: 「それは……さすがに、向こうです」
2888 = "「Cái đó thì……quả nhiên là bên kia rồi ạ.」"

# 【真闇】
# display as 真闇
# JP: 「双ちゃんやポーちゃんにお金を出してくれる層は、\n今回の鉄道がらみで、かなりお財布軽ぅにしたけんねぇ」
2820 = "「Những tầng lớp sẵn sàng bỏ tiền ra cho\nSou-chan hay Pou-chan,\nthì trong vụ việc liên quan đến đường sắt\nlần này, hầu bao cũng đã vơi đi kha khá\nrồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ」
2078 = "「……Ừm.」"

# monologue
# JP: 僕には頷くだけしか出来ない。
3371 = "Tôi chỉ có thể gật đầu."

# monologue
# JP: 申し訳ない、などと言ってしまえば、\n真闇姉に、出資してくださった皆様に対し、失礼になる。
3386 = "Nếu nói ra những lời như \"Xin lỗi\" các\nthứ,\nthì sẽ là một sự thất lễ đối với chị\nMayami và tất cả những người đã góp vốn."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様――」
2932 = "「Ngài Soutetsu——」"

# monologue
# JP: なにかを言いかけた唇を、しかしハチロクはそのまま結び。\nそして大きく頭を振って、その顔を真っ直ぐ持ち上げ直す。
3185 = "Hachiroku hé môi định nói điều gì đó,\nnhưng rồi lại mím chặt.\nSau đó em ấy lắc đầu thật mạnh, rồi ngẩng\nmặt lên nhìn thẳng."

# 【ハチロク】
# display as 八六
# JP: 「ですが、人。これはこちらが勝っていましょう」
2414 = "「Nhưng mà, về con người. Cái này thì chúng\nta thắng chắc rồi.」"

# 【真闇】
# display as 真闇
# JP: 「それはそーとね。稀咲ちゃんと双ちゃんが互角として、\n頭取の宝生さんとウチとが、互角」
2897 = "「Cái đó thì cũng phải xem đã. Cho là bé\nKisaki và Sou-chan ngang tài ngang sức đi,\nthì Giám đốc Houshou và chị cũng ngang\nngửa nhau.」"

# monologue
# JP: ハチロクは少し不満そうだが、黙って話を聞いている。
3201 = "Hachiroku có vẻ hơi bất mãn, nhưng vẫn im\nlặng lắng nghe."

# monologue
# JP: 日々姫は……やはり、泣き出しそうな顔を必死で、\n無表情へと修正しようとし続けている。
3456 = "Hibiki thì……quả nhiên vẫn đang tuyệt vọng\ncố gắng\nđiều chỉnh khuôn mặt chực khóc của mình\ntrở về trạng thái vô cảm."

# 【真闇】
# display as 真闇
# JP: 「そう考えたら、残ったコマの質でも量でも、\nこっちの陣営が勝るたい」
2873 = "「Nghĩ theo hướng đó thì, dù là chất hay\nlượng của những quân cờ còn lại,\nphe ta vẫn nhỉnh hơn đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら！　これで一対一です」
2911 = "「Nếu vậy! Thế này là hòa một đều rồi.」"

# 【真闇】
# display as 真闇
# JP: 「ほんなら勝負の三本目。\n“風”はどっちに吹くとやろおねぇ？」
2905 = "「Vậy thì đến hiệp thứ ba.\n“Ngọn gió” sẽ thổi về phía bên nào đây\nnhỉ?」"

# 【ハチロク】
# display as 八六
# JP: 「それこそ、勝負は時の運です」
2902 = "「Chuyện đó thì, thắng bại là do vận may\nthôi ạ.」"

# 【真闇】
# display as 真闇
# JP: 「そぎゃん風に考えてしまうようなら、\n選挙には決して勝てんけん」
2565 = "「Nếu mà suy nghĩ theo kiểu đó,\nthì tuyệt đối không thể thắng được trong\ncuộc bầu cử đâu.」"

# 【ハチロク】
# display as 八六
# JP: 「なっ！？　何故ですかっ」
2518 = "「Sao cơ!? Tại sao chứ ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「選挙に勝てる人間は、風を吹かせる人間だから。\n自分にとっての順風も、相手にとっての逆風も」
2819 = "「Bởi vì người có thể chiến thắng trong bầu\ncử, là người có thể tạo ra gió.\nDù là gió thuận cho bản thân, hay gió\nngược cho đối thủ.」"

# monologue
# JP: 日々姫の、どこか悲しげな声。
3481 = "Giọng nói của Hibiki nghe có chút gì đó\nbuồn bã."

# 【日々姫】
# display as 日日姬
# JP: 「無理矢理にでも、風を吹かせる。\n稀咲先輩は、そうできるよう――準備してるから」
2493 = "「Dù có phải dùng vũ lực cũng phải tạo ra\ngió.\nChị Kisaki đã chuẩn bị sẵn sàng——để có thể\nlàm được điều đó rồi.」"

# 【真闇】
# display as 真闇
# JP: 「……双ちゃんが、ポーちゃんの後継、いうんは、\nいくらでも下世話に解釈できる構図やけんねぇ」
2080 = "「……Việc Sou-chan trở thành người kế nhiệm\ncủa Pou-chan,\nlà một cục diện có thể bị thêu dệt thành\nđủ thứ chuyện tầm phào đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ！！？」
2483 = "「Hả!!?」"

# monologue
# JP: 僕の顔を見、ポーレットがいきなり真っ赤になる。
3530 = "Nhìn vào mặt tôi, Paulette bỗng nhiên đỏ\nbừng mặt."

# monologue
# JP: ああ、なるほど――\nおかげで、僕にも理解できた。
3244 = "À, ra là vậy——\nNhờ thế mà tôi cũng đã hiểu được vấn đề."

# 【双鉄】
# display as 雙鐵
# JP: 「僕が市長の座につくため、ポーレットと恋仲になり、\n辞職を強いた……そのような筋書きを作れるのだな」
2664 = "「Vì muốn ngồi lên chiếc ghế Thị trưởng,\nanh đã trở thành người yêu của Paulette,\nrồi ép buộc cô ấy từ chức……Họ có thể dựng\nlên một kịch bản như vậy sao.」"

# 【ハチロク】
# display as 八六
# JP: 「そのようなこと！　全くの事実無根――」
2868 = "「Chuyện như vậy! Hoàn toàn vô căn cứ——」"

# monologue
# JP: そこまで言いかけ、言葉を呑んで、\nハチロクは苦虫を噛む顔になる。
3293 = "Vừa nói đến đó, Hachiroku liền nuốt lại\nlời,\nvà nhăn nhó mặt mày như thể vừa nhai phải\ncon bọ đắng."

# monologue
# JP: 視線の先には、今朝の朝刊。\nつまりは、そういうことなのだ。
3284 = "Nơi ánh mắt em ấy hướng đến, là tờ báo\nsáng nay.\nTóm lại, mọi chuyện là như vậy đó."

# 【双鉄】
# display as 雙鐵
# JP: 「宝生元忠は報道に対しての影響力を有している。そして、\n下世話な噂というのは、流れてしまえばその時点で――」
2575 = "「Houshou Mototada có sức ảnh hưởng đối với\ngiới truyền thông. Hơn nữa,\nnhững tin đồn tầm phào một khi đã lan\ntruyền ra ngoài thì ngay tại thời điểm\nđó——」"

# 【ハチロク】
# display as 八六
# JP: 「存じております。\n否定は常に逆効果、無視をするしか無いもの、と」
2662 = "「Em hiểu ạ.\nViệc phủ nhận luôn mang lại tác dụng\nngược, chỉ còn cách phớt lờ nó đi thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2535 = "「Hô.」"

# monologue
# JP: 意外と感じ、感じた瞬間、思い出す。\nそういえばハチロクの前\x%l機関士;#00ffc040;機関士%l;#;は、女性とのことだった。
3259 = "Cảm thấy bất ngờ, và ngay khoảnh khắc đó,\ntôi chợt nhớ ra.\nNhắc mới nhớ, \\x%l機関士;#00ffc040;người lái tàu%l;#; trước đây của\nHachiroku là phụ nữ."

# monologue
# JP: あるいは件の女性\x%l機関士;#00ffc040;機関士%l;#;が、\nそうした噂に、辟易させられていたのかもしれん。
3394 = "Hoặc cũng có thể \\x%l機関士;#00ffc040;nữ lái tàu%l;#; đó,\nđã từng bị những tin đồn như vậy làm cho\nkhốn đốn cũng nên."

# 【日々姫】
# display as 日日姬
# JP: 「だから、にぃに――兄さんでは、決して勝てません。\nというか……稀咲先輩たちは」
2684 = "「Thế nên, anh hai——anh trai tuyệt đối sẽ\nkhông thể thắng được đâu.\nĐúng hơn là……phe của chị Kisaki」"

# monologue
# JP: 目を閉じ、開く。\n喉をごくりと大きく鳴らす。
3304 = "Con bé nhắm mắt lại, rồi mở ra.\nNuốt nước bọt một cái thật mạnh."

# monologue
# JP: そして唇を舐めてしめらせ、\nようやく日々姫は――続く言葉を吐き出せる。
3558 = "Sau đó liếm ướt môi,\ncuối cùng Hibiki cũng——có thể thốt ra\nnhững lời tiếp theo."

# 【日々姫】
# display as 日日姬
# JP: 「兄さんを候補に立てさせるよう、\n誘導、してるんだと思います」
2670 = "「Đang dụ dỗ,\nđể anh trở thành ứng cử viên đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「だから……向こうの、思うツボ」
2676 = "「Thế nên……mới trúng đúng ý đồ của bên\nkia.」"

# 【ハチロク】
# display as 八六
# JP: 「そこまで準備し、\nそこまで仕掛けるものですか」
2552 = "「Bọn họ chuẩn bị đến mức đó,\nvà giăng bẫy đến mức đó luôn sao.」"

# monologue
# JP: ハチロクの呆れたような口調には、\nいっそ感心したような響きも交じる。
3194 = "Trong giọng điệu kinh ngạc của Hachiroku,\ncó xen lẫn cả sự thán phục."

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。ポーレットも言っていたが、\n僕たちは、すでにして選挙戦の中に在るのだ」
2402 = "「Chắc là vậy rồi. Paulette cũng đã nói,\nchúng ta vốn đã nằm trong cuộc chiến bầu\ncử rồi mà.」"

# 【ハチロク】
# display as 八六
# JP: 「勝てる環境を整えて、こちらに開戦を強いてきた。\nこちらはそれでは、いかに応戦するのでしょうか？」
2551 = "「Bọn họ đã chuẩn bị sẵn một môi trường để\ngiành chiến thắng, rồi ép chúng ta phải\nkhai chiến.\nVậy thì chúng ta phải ứng chiến như thế\nnào đây?」"

# monologue
# JP: ポーレットにでも僕にでもない、\nハチロクの問い。
3199 = "Câu hỏi của Hachiroku,\nkhông dành cho Paulette, cũng chẳng dành\ncho tôi."

# monologue
# JP: 問われた相手は、いつもと同じ、\n全く力まぬ声で答える。
3647 = "Người được hỏi vẫn giữ nguyên phong thái\nthường ngày,\ntrả lời bằng một giọng điệu vô cùng nhẹ\nnhàng."

# 【真闇】
# display as 真闇
# JP: 「油断があるなら、突くのが定石。\n『勝てる環境が整った』思うとるなら、そらぁ油断よね」
2690 = "「Nếu đối phương lơ là, thì tấn công vào\nđiểm đó là sách lược cơ bản.\nNếu họ nghĩ rằng 『Môi trường để chiến\nthắng đã được chuẩn bị xong』, thì đó chính\nlà sự lơ là đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2501 = "「Hửm?」"

# monologue
# JP: 真闇姉だ。\n思わせぶりなだけの言葉など発しない。
3594 = "Là chị Mayami mà.\nChị ấy sẽ không nói những lời chỉ mang\ntính chất gợi ý suông đâu."

# monologue
# JP: で、あるのなら――\nその油断を、いかにして突くかの話だ、が……
3700 = "Nếu đã như vậy thì——\nVấn đề là phải tấn công vào sự lơ là đó\nnhư thế nào, nhưng mà……"

# 【ポーレット】
# display as 波萊特
# JP: 「辞任撤回……っていうのは」
2687 = "「Hay là……rút lại quyết định từ chức.」"

# 【双鉄】
# display as 雙鐵
# JP: 「無理だろう。それこそ、ジリ貧になるだけだ」
2349 = "「Không được đâu. Làm thế chỉ càng khiến\ntình thế thêm tồi tệ thôi.」"

# 【真闇】
# display as 真闇
# JP: 「典型的なレームダックに陥ってしまうだけやけんねぇ」
2913 = "「Chỉ tổ rơi vào tình trạng vịt què điển\nhình thôi.」"

# 【れいな】
# display as 玲奈
# JP: 「れーむだっくって、なんですかぁ？」
2846 = "「Vịt què là gì vậy ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「政治的な影響力を失ってなお在位している政治家のこと。\n議会の混乱を生んでしまう原因になって、良くないの」
2734 = "「Là những chính trị gia dù đã mất đi sức\nảnh hưởng chính trị nhưng vẫn tại vị.\nĐiều đó sẽ trở thành nguyên nhân gây ra sự\nhỗn loạn trong hội đồng, không tốt chút\nnào đâu.」"

# 【れいな】
# display as 玲奈
# JP: 「良くないんなら、\nポーレット、れーむだっくになっちゃダメですね」
2694 = "「Nếu không tốt thì,\nchị Paulette không được trở thành vịt què\nđâu nha.」"

# monologue
# JP: ごく単純に、れいなは物事を理解する。
3565 = "Reina hiểu vấn đề một cách vô cùng đơn\ngiản."

# 【れいな】
# display as 玲奈
# JP: 「ならなら、赤井宮司さんはどうですかぁ？\nあの人、鉄道の味方ですよぉ？」
2914 = "「Vậy thì, ngài Đền chủ Akai thì sao ạ?\nNgười đó là đồng minh của đường sắt mà?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2535 = "「嚯」" 

# monologue
# JP: その平明さが、僕らの盲点を明かしてくれる。
3290 = "Sự rõ ràng đó đã khai sáng điểm mù của\nchúng tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「面白いな。影響力を行使するのを嫌う人のようだが……\nもし、出馬さえしてもらえたなら」
2757 = "「Thú vị đấy. Mặc dù ông ấy có vẻ là người\nkhông thích sử dụng sức ảnh hưởng của\nmình……\nnhưng nếu ông ấy chịu ra tranh cử thì.」"

# 【真闇】
# display as 真闇
# JP: 「だめだめ、それでも風は向こうに吹きよるやろうね。\n大人の男と小娘のケンカの形にされてしまいよるけん」
2347 = "「Không được đâu, làm thế thì gió vẫn sẽ\nthổi về phía bên kia thôi.\nSẽ bị biến thành cuộc cãi vã giữa một\nngười đàn ông trưởng thành và một cô bé\nmất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2527 = "「À.」"

# monologue
# JP: 真闇姉の言葉に教えてもらう。
3216 = "Lời nói của chị Mayami đã chỉ cho tôi\nthấy."

# monologue
# JP: 風、とは言い換えてしまうのならば、\n極めて無責任な、その場限りの判断ということになるのか。
2035 = "Ngọn gió, nói cách khác,\nchính là những phán đoán cực kỳ vô trách\nnhiệm, chỉ mang tính nhất thời sao."

# 【双鉄】
# display as 雙鐵
# JP: 「金は向こう、人はこちらの、一対一。\nであるというのに……」
2919 = "「Tiền bạc thuộc về bên kia, con người\nthuộc về bên này, tỷ số là một đều.\nĐã vậy rồi mà……」"

# monologue
# JP: 風を吹かせる、答えがどうにも見つからぬ。
3206 = "Làm thế nào để tạo ra gió, tôi hoàn toàn\nkhông tìm ra câu trả lời."

# 【日々姫】
# display as 日日姬
# JP: 「私」
2627 = "「Em.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん？」
2534 = "「Hửm?」"

# monologue
# JP: 日々姫が、顔を持ち上げている。\nまっすぐに、真闇姉のことを見つめている。
3464 = "Hibiki ngẩng mặt lên.\nNhìn thẳng vào chị Mayami."

# 【日々姫】
# display as 日日姬
# JP: 「私――\n私が、立候補したらっ」
2623 = "「Em——\nNếu em ra ứng cử thì sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 2507 = "「啊！」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、すごくいいと思いますぅ！\nひびきさんが市長さんなら、安心ですよぉ」
2791 = "「Reina thấy ý kiến đó rất tuyệt nha!\nNếu chị Hibiki làm Thị trưởng thì yên tâm\nlắm luôn á.」"

# 【ハチロク】
# display as 八六
# JP: 「けれど――」
2404 = "「Nhưng mà——」"

# monologue
# JP: 思わずこぼれた。\nそんな調子のハチロクの声。
3183 = "Lời nói buột miệng.\nGiọng của Hachiroku mang theo điệu bộ như\nvậy."

# monologue
# JP: そのまま黙ってしまうゆえ、\n僕から続きを促してみる。
3156 = "Thấy em ấy cứ thế im lặng,\ntôi bèn thử giục em ấy nói tiếp."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、ハチロク。気になることがあるのであれば、\n伝えて貰えた方が助かる」
2613 = "「Sao vậy Hachiroku. Nếu em có điều gì bận\ntâm,\nthì cứ nói ra sẽ giúp ích nhiều hơn đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「はい――その、\n学園生が政治家を務めるというのは」
2520 = "「Vâng——chuyện đó,\nviệc một học sinh đảm nhận vai trò chính\ntrị gia thì...」"

# 【ポーレット】
# display as 波萊特
# JP: 「法的な面だったら大丈夫。被選挙権は、選挙権と同じく、\n満15歳になった時点で認められるから」
2775 = "「Về mặt pháp lý thì không sao đâu. Quyền\nứng cử cũng giống như quyền bầu cử,\nsẽ được công nhận khi đủ 15 tuổi.」"

# 【ハチロク】
# display as 八六
# JP: 「その点でしたら、わたくしも存じあげております。\nけれど――学業との両立が難しいのではないかと」
2867 = "「Điểm đó thì em cũng có biết ạ.\nNhưng mà——em e là sẽ khó mà cân bằng được\nvới việc học.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2506 = "「À.」"

# monologue
# JP: ハチロクの、ごく当然であろう疑問は、\n逆説的に、眠りつづけていた時間の長さを思わせる。
3200 = "Thắc mắc hết sức đương nhiên của\nHachiroku,\nngược lại, lại khiến tôi nhận ra khoảng\nthời gian em ấy chìm trong giấc ngủ dài\nđến nhường nào."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ハチロクが現役だった時代には、\nワーキング・スタディの制度がなかったのだな」
2580 = "「Ra vậy. Thời Hachiroku còn đang hoạt\nđộng,\nvẫn chưa có chế độ vừa học vừa làm nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「わあきんぐ・すたでぃ――で、ございますか？」
2448 = "「Vừa học vừa làm——sao ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「日ノ本の学園は、もともと、職業適性を見出すことと、\nそれを見出すための学習と訓練に特化してますよね？」
2709 = "「Trường học ở Hinamoto vốn dĩ chuyên về\nviệc tìm ra năng lực nghề nghiệp,\nvà những bài học, huấn luyện để tìm ra\nđiều đó đúng không?」"

# monologue
# JP: ポーレットのおだやかな問いかけに、\nハチロクもまた、ごくおだやかにうなずき返す。
3723 = "Trước câu hỏi nhẹ nhàng của Paulette,\nHachiroku cũng nhẹ nhàng gật đầu đáp lại."

# 【ハチロク】
# display as 八六
# JP: 「他の国がどうであるかは存じませんが、日ノ本における\n学問は、確かにそうしたものと認識しております」
2628 = "「Em không rõ ở các quốc gia khác thì thế\nnào, nhưng nền giáo dục ở Hinamoto\nquả thực được nhận thức như vậy ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「逆にいったら、もう適職を見つけて働き始めてる人が、\n卒業資格を得るためだけに学園に通うの、ムダでしょ？」
2468 = "「Nói ngược lại thì, những người đã tìm\nđược công việc phù hợp và bắt đầu đi làm,\nmà vẫn phải đến trường chỉ để lấy bằng tốt\nnghiệp thì thật lãng phí đúng không?」"

# 【ハチロク】
# display as 八六
# JP: 「ああ」
# 2506 = "「啊」" 

# monologue
# JP: 合点がいった、とハチロクは大きく頷く。
3190 = "Hachiroku gật đầu thật mạnh như đã hiểu ra\nvấn đề."

# 【ハチロク】
# display as 八六
# JP: 「つまり、適職と認められた職につき仕事をするなら、\n仕事をするそのことで、学園卒業の資格を得られる？」
2367 = "「Nghĩa là, nếu làm một công việc được công\nnhận là phù hợp,\nthì thông qua công việc đó, sẽ nhận được\nbằng tốt nghiệp sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「そ。申請して認められれば、仕事で単位がもらえるの。\n稀咲先輩とかも、その制度をフル活用してる」
2739 = "「Đúng vậy. Chỉ cần nộp đơn và được chấp\nthuận thì sẽ nhận được tín chỉ từ công\nviệc.\nChị Kisaki cũng đang tận dụng triệt để chế\nđộ đó đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「左様でございましたか」
2746 = "「Thì ra là vậy ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「もっとも稀咲先輩は、勉強も、学園自体も好きだから、\nできるだけ通学もするようにしてるみたいだけど」
2354 = "「Tuy nhiên chị Kisaki lại thích học, và\ncũng thích trường học,\nnên có vẻ chị ấy vẫn cố gắng đến trường\nnhiều nhất có thể.」"

# monologue
# JP: ……直接的なライバルになるかもしれん稀咲のことを、\nそれでも日々姫は、どこか誇らしげに語る。
2041 = "……Dù nói về Kisaki, người có thể sẽ trở\nthành đối thủ trực tiếp của mình,\nnhưng Hibiki vẫn mang một vẻ gì đó đầy tự\nhào."

# monologue
# JP: 甘さと仮に断じられれば、反論することは難しかろうが、\nそうした点も、やはり日々姫の美徳であると僕は感じる。
3381 = "Nếu bị phán xét là ngây thơ thì chắc khó\nmà phản bác được,\nnhưng tôi cảm thấy đó cũng chính là một\nnét đẹp trong phẩm chất của Hibiki."

# 【ハチロク】
# display as 八六
# JP: 「左様でしたら、わたくしも賛成です。日々姫であれば、\nよりよい御一夜を描いてくれると、確信できます」
2696 = "「Nếu vậy thì em cũng tán thành ạ. Nếu là\nHibiki,\nem tin chắc rằng cô ấy sẽ vẽ nên một\nOhimitera tốt đẹp hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕ももちろん、日々姫を支持する。\n日々姫を担ぐのであれば、僕らは必ず一丸となれる」
2665 = "「Tất nhiên anh cũng ủng hộ Hibiki.\nNếu đề cử Hibiki, chúng ta nhất định sẽ\ntrở thành một khối thống nhất.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃに……」
2921 = "「Anh hai……」"

# monologue
# JP: ほっとしたような日々姫のつぶやき。\nけれどもその目はゆるまない。
3474 = "Hibiki lẩm bẩm như trút được gánh nặng.\nNhưng ánh mắt con bé không hề lơ là."

# monologue
# JP: 視線はぐるりと大きく動き、\n真闇姉へと――まっすぐまっすぐ向けられる。
3307 = "Ánh mắt đảo quanh một vòng lớn,\nrồi hướng thẳng——nhìn chằm chằm vào chị\nMayami."

# 【真闇】
# display as 真闇
# JP: 「風は互角」
2939 = "「Gió đang cân bằng.」"

# monologue
# JP: 真闇姉もまた、まっすぐ日々姫を見つめ返す。
3596 = "Chị Mayami cũng nhìn thẳng vào Hibiki."

# monologue
# JP: いつもの柔和な笑みは消え、\n怖いほど真剣な表情で。
3271 = "Nụ cười dịu dàng thường ngày đã biến mất,\nthay vào đó là một vẻ mặt nghiêm túc đến\nđáng sợ."

# 【真闇】
# display as 真闇
# JP: 「つまり。がっぷり四つの選挙になるけん――\n覚悟の強さが、勝負の分かれ目になるやろおねぇ」
2869 = "「Nghĩa là, đây sẽ là một cuộc bầu cử giằng\nco quyết liệt đấy——\nSự quyết tâm mạnh mẽ đến đâu sẽ là yếu tố\nquyết định thắng bại nhỉ.」"

# monologue
# JP: そして、問う。\nいつもと同じに、日々姫へと。
3555 = "Sau đó, chị ấy đặt câu hỏi.\nVẫn giống như mọi khi, hướng về phía\nHibiki."

# monologue
# JP: 本当は知っているはずの答えに、\n自ら気づくヒントを与える――そのために。
3204 = "Đưa ra gợi ý để con bé tự nhận ra\ncâu trả lời mà đáng lẽ ra con bé đã\nbiết——Vì mục đích đó."

# 【真闇】
# display as 真闇
# JP: 「市長になるため、絵筆を置くほど強い覚悟を、\n今、ひーちゃんは持ちゆるや？」
2585 = "「Để trở thành Thị trưởng, liệu Hii-chan\nbây giờ\ncó đủ quyết tâm để đặt bút vẽ xuống\nkhông?」"

# 【ハチロク】
# display as 八六
# JP: 「……鉄……様…………\nブレーキ……まだ…………まだ……」
2929 = "「……Ngài……Soutetsu…………\nPhanh……vẫn chưa…………vẫn chưa……」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
2061 = "「…………」"

# monologue
# JP: ハチロクはもう眠っている。\n僕は、全く眠れない。
3191 = "Hachiroku đã ngủ say.\nCòn tôi thì hoàn toàn không ngủ được."

# monologue
# JP: いや、眠らずに――\n時を、いたずらに費やしている。
3137 = "Không, tôi không ngủ——\nmà đang lãng phí thời gian một cách vô\ních."

# monologue
# JP: （…………日々姫は、こないか）
3737 = "（…………Hibiki, không đến sao）"

# monologue
# JP: ならば――ならば。\nどうして、決断できないものか。
3701 = "Nếu vậy——nếu vậy.\nTại sao tôi lại không thể đưa ra quyết\nđịnh cơ chứ."

# monologue
# JP: 普段の僕ならとっくに動き、\n答えを出して、今頃ぐっすり寝ている筈だ。
3412 = "Nếu là tôi bình thường thì đã hành động từ\nlâu,\nđưa ra câu trả lời, và giờ này đáng lẽ đã\nngủ say sưa rồi."

# 【ハチロク】
# display as 八六
# JP: 「……です。双鉄様……\n思い切り……よく……る……他は――」
2087 = "「……ạ. Ngài Soutetsu……\nHãy dứt khoát……lên……những thứ khác thì——」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2942 = "「！」" 

# monologue
# JP: 訓練の夢を見ているのだろう。
3274 = "Chắc em ấy đang mơ thấy cảnh huấn luyện."

# monologue
# JP: ……もしも\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が夢を、\n僕らのように見るのであれば。
2042 = "……Nếu như \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng có thể\nnằm mơ giống như chúng ta."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。ハチロク」
2727 = "「Đúng vậy nhỉ. Hachiroku.」"

# monologue
# JP: 動き出すときが一番重い。一番怖い。
3672 = "Lúc bắt đầu hành động là lúc nặng nề nhất.\nĐáng sợ nhất."

# monologue
# JP: しかし、恐れて止まっていては、\n蒸気を無駄にしてしまう。
3161 = "Nhưng nếu cứ sợ hãi mà dừng lại,\nthì sẽ làm lãng phí hơi nước mất."

# 【双鉄】
# display as 雙鐵
# JP: 「思い切り良く行くしか無い。\n急加速など、しようと思ってもできんのだから」
2472 = "「Chỉ còn cách dứt khoát tiến lên thôi.\nDù có muốn tăng tốc đột ngột thì cũng đâu\ncó được.」"

# monologue
# JP: 言葉にすれば、力みが消える。
3120 = "Khi nói ra thành lời, sự căng thẳng cũng\ntan biến."

# monologue
# JP: 何を今までグズグズしてたか不思議になるほど、\n全てがスッキリ、軽くなる。
3117 = "Mọi thứ trở nên sảng khoái, nhẹ nhõm đến\nmức\ntôi tự hỏi tại sao nãy giờ mình lại cứ\nchần chừ mãi như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「良し」
2555 = "「Được rồi.」"

# monologue
# JP: 階段を上り、ノックする。\n――何年ぶりのことだろう。
3375 = "Tôi bước lên cầu thang và gõ cửa.\n——Đã bao nhiêu năm rồi nhỉ."

# 【日々姫】
# display as 日日姬
# JP: 「にぃに？」
2922 = "「Anh hai?」"

# 【双鉄】
# display as 雙鐵
# JP: 「よくわかったな。僕だと」
2827 = "「Giỏi đấy. Sao em biết là anh?」"

# 【日々姫】
# display as 日日姬
# JP: 「わかってない。待っとっただけ」
2630 = "「Em không biết. Chỉ là em đang đợi thôi.」"

# monologue
# JP: ドアが開く。\n日々姫の部屋は――昔と、同じ匂いがする。
3703 = "Cánh cửa mở ra.\nPhòng của Hibiki——vẫn có mùi hương giống\nnhư ngày xưa."

# 【日々姫】
# display as 日日姬
# JP: 「にぃにと、話したかったけん」
2653 = "「Tại em muốn nói chuyện với anh hai mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ」
2637 = "「Anh cũng vậy.」"

# monologue
# JP: クッション。\nずっと昔に座っていたもの。
3266 = "Chiếc gối tựa.\nThứ mà tôi đã từng ngồi từ rất lâu rồi."

# monologue
# JP: それを日々姫は、当然のように差し出してくれる。
3468 = "Hibiki đưa nó cho tôi như một lẽ đương\nnhiên."

# 【双鉄】
# display as 雙鐵
# JP: 「立候補うんぬんの話だが」
2621 = "「Về chuyện ứng cử các thứ ấy mà.」"

# monologue
# JP: だから話せる。\n力まず構えず――小さな日々姫にしていたように。
3403 = "Chính vì vậy mà tôi mới có thể nói ra.\nKhông căng thẳng, không gượng gạo——giống\nnhư cách tôi từng đối xử với Hibiki hồi\ncòn nhỏ."

# 【双鉄】
# display as 雙鐵
# JP: 「無理をしているのではないかと、思ってな」
2538 = "「Anh đang nghĩ, liệu em có đang ép buộc\nbản thân quá không.」"

# 【日々姫】
# display as 日日姬
# JP: 「選挙は戦争。ポーレットさんも言うとったけんね。\nそんなん、無理せんと勝てんと思うし」
2883 = "「Bầu cử là chiến tranh. Chị Paulette cũng\nđã nói vậy mà.\nChuyện đó, em nghĩ nếu không cố gắng thì\nsẽ không thể thắng được đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「前にも言ったが、今回の件」
2635 = "「Anh đã nói trước đó rồi, vụ việc lần\nnày...」"

# 【日々姫】
# display as 日日姬
# JP: 「責任を取ろうなんて思うとらんよ？」
2648 = "「Em không định nhận trách nhiệm đâu nhé?」"

# monologue
# JP: 先回り。\nされてふと、ああ、そうだったかと思い出す。
3614 = "Bị chặn họng.\nTôi chợt nhớ ra, à, ra là vậy."

# monologue
# JP: （最初から……\n日々姫は覚悟を示していたのだな）
3750 = "（Từ ngay lúc đầu……\nHibiki đã thể hiện sự quyết tâm rồi nhỉ）"

# monologue
# JP: 真闇姉に頼ろうと、\nそう言い出したのは日々姫だった。
3716 = "Việc nhờ vả chị Mayami,\nchính Hibiki là người đã mở lời."

# monologue
# JP: だからこそ――\n覚悟を知って、その上で問わずにはいられない。
3399 = "Chính vì vậy——\nDù đã biết rõ quyết tâm của em ấy, tôi vẫn\nkhông thể không hỏi."

# 【双鉄】
# display as 雙鐵
# JP: 「本当に、日々姫は絵筆を置けるのか？」
2426 = "「Hibiki, em thực sự có thể đặt bút vẽ\nxuống sao?」"

# monologue
# JP: 真闇姉と比較されることを嫌がって――\n“真闇さんの妹”と、そう呼ばれるのを何より嫌って。
3292 = "Ghét bị đem ra so sánh với chị Mayami——\nGhét bị gọi là \"Em gái của Mayami\" hơn bất\ncứ điều gì."

# monologue
# JP: だから、日々姫は絵を描いた。\n絵を描くことで、日々姫はそこから、抜け出せた。
3408 = "Vì vậy, Hibiki đã vẽ tranh.\nNhờ vẽ tranh, Hibiki đã có thể thoát khỏi\nđiều đó."

# 【日々姫】
# display as 日日姬
# JP: 「たった一期。たった四年のことやもん」
2470 = "「Chỉ một nhiệm kỳ thôi. Chỉ vỏn vẹn bốn\nnăm thôi mà.」"

# monologue
# JP: 一日休めば、三日遅れる――\nそういって、毎日毎日絵を描き続けてきた日々姫だ。
3153 = "Nghỉ một ngày là chậm mất ba ngày——\nLuôn miệng nói vậy, Hibiki đã liên tục vẽ\ntranh mỗi ngày."

# monologue
# JP: 四年が、いかに長い時間か、\nわからぬ筈のあるわけもない。
3256 = "Bốn năm là một khoảng thời gian dài đến\nnhường nào,\nkhông có lý do gì mà con bé lại không\nbiết."

# 【日々姫】
# display as 日日姬
# JP: 「その間、目と心とを磨けばよかとよ」
2541 = "「Trong thời gian đó, em chỉ cần mài giũa\nđôi mắt và trái tim mình là được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「目と心？」
2799 = "「Đôi mắt và trái tim?」"

# 【日々姫】
# display as 日日姬
# JP: 「市長にならなきゃ見えない景色や、\n市長にならなきゃしれんこと――きっと、あるもん」
2345 = "「Những khung cảnh chỉ khi làm Thị trưởng\nmới có thể nhìn thấy,\nnhững điều chỉ khi làm Thị trưởng mới có\nthể biết——Chắc chắn là có mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは確かに……そうではあろうが」
2866 = "「Điều đó thì đúng là……như vậy thật, nhưng\nmà.」"

# 【日々姫】
# display as 日日姬
# JP: 「そいやけん、四年と一日したら。\nその日の私、今の私にはぜーったい描けん絵ば描くけん」
2790 = "「Vì thế, sau bốn năm và một ngày.\nEm của ngày hôm đó, nhất định sẽ vẽ được\nbức tranh mà em của hiện tại không thể nào\nvẽ được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……そうか」
2084 = "「……Vậy sao.」"

# monologue
# JP: 繋ぎになると、日々姫は言ってくれている。\nそのため、自分の四年を使うと、覚悟を示してくれている。
3486 = "Hibiki đang nói rằng điều này sẽ là một\nbước đệm.\nCon bé đang thể hiện quyết tâm sẽ dành bốn\nnăm của mình cho việc đó."

# monologue
# JP: 無論、ありがたく尊く思う。\n思うが故に――疑問も、次々湧きだしてくる。
3373 = "Tất nhiên, tôi cảm thấy rất biết ơn và\ntrân trọng điều đó.\nChính vì thế——những thắc mắc cũng liên\ntiếp nảy sinh."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、何故だ。何故そこまでを――\n日々姫は、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に賛成していただろう」
2411 = "「Nhưng tại sao chứ. Tại sao em lại phải\nlàm đến mức đó——\nHibiki, chẳng phải em đã từng ủng hộ việc\nthu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「あれは……\nあんなん、アヒルの赤ちゃんと同じばい」
2890 = "「Chuyện đó……\nChuyện đó giống hệt như một chú vịt con\nvậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2501 = "「唔？」" 

# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩のお尻ばぁ見て、\nひょこひょこ、ついとっただけのことやもん」
2794 = "「Chỉ là cứ nhìn chằm chằm vào cái mông của\nchị Kisaki,\nrồi lạch bạch bám theo thôi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2506 = "「啊」" 

# monologue
# JP: 甘えて、ある意味、依存していた。\n昔の日々姫が、僕にそうしていたように。
3269 = "Làm nũng, và theo một ý nghĩa nào đó, là\nphụ thuộc.\nGiống như cách mà Hibiki ngày xưa đã từng\nlàm với tôi."

# monologue
# JP: それを、認めて。\nならば日々姫は――
3415 = "Em ấy đã thừa nhận điều đó.\nVậy thì Hibiki——"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃのお尻、\nまたおっかけよーゆーのとも違うよ？」
2645 = "「Cũng không phải là em lại định chạy theo\ncái mông của anh hai đâu nhé?」"

# monologue
# JP: 懸念が、顔に出たのだろうか。
3393 = "Nỗi băn khoăn của tôi đã hiện rõ trên\nkhuôn mặt rồi sao."

# monologue
# JP: 日々姫は少しふざけた口調で、\nけれどもきっぱり伝えてくれる。
3470 = "Hibiki dùng giọng điệu có chút đùa giỡn,\nnhưng lại truyền đạt một cách vô cùng dứt\nkhoát."

# 【日々姫】
# display as 日日姬
# JP: 「自分の足で。\n立って歩けるように、私、早ようなりたいけん」
2656 = "「Bằng chính đôi chân của mình.\nEm muốn có thể tự đứng lên và bước đi càng\nsớm càng tốt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――日々姫」
2333 = "「Không——Hibiki.」"

# monologue
# JP: 自分自身が未熟であると。
3637 = "Tự nhận thức được bản thân vẫn còn non\nnớt."

# monologue
# JP: そのことを自覚できるのならば、\n少なくとも、自身を客観視はできている。
3635 = "Nếu có thể nhận thức được điều đó,\nthì ít nhất con bé cũng đã có thể nhìn\nnhận bản thân một cách khách quan."

# 【双鉄】
# display as 雙鐵
# JP: 「お前はすでに、一人で立って歩いているさ」
2422 = "「Em đã tự mình đứng lên và bước đi được\nrồi đấy.」"

# monologue
# JP: 小さく笑い。\nそして、日々姫は、大きく大きく息を吸い込む。
3488 = "Mỉm cười nhẹ nhàng.\nSau đó, Hibiki hít một hơi thật sâu."

# 【日々姫】
# display as 日日姬
# JP: 「だとしても――\nこんな、頼りない歩みじゃなくて」
2591 = "「Dù là vậy——\nEm cũng không muốn những bước đi thiếu\nvững chắc như thế này.」"

# monologue
# JP: 言って、日々姫は立ち上がる。
3303 = "Nói rồi, Hibiki đứng dậy."

# monologue
# JP: クッションに座る僕の目の前、\n日々姫は立って、僕へとその手を差し出してくる。
3459 = "Đứng trước mặt tôi, người đang ngồi trên\nchiếc gối tựa,\nHibiki đưa tay về phía tôi."

# 【日々姫】
# display as 日日姬
# JP: 「なりたいんです。兄さんと同じ歩幅で歩けるように。\nそして時には、兄さんの手だってひける――大人の女に」
2658 = "「Em muốn trở thành một người có thể bước\nđi với cùng một sải bước như anh trai.\nVà đôi khi, còn có thể nắm lấy tay anh\ntrai——một người phụ nữ trưởng thành.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2942 = "「！」" 

# monologue
# JP: 不意に、目眩するほど強く感じる。\n日々姫の部屋の、日々姫の匂いを。
3340 = "Đột nhiên, tôi cảm nhận được một cách mãnh\nliệt đến chóng mặt.\nMùi hương của Hibiki, trong căn phòng của\nHibiki."

# monologue
# JP: 昔と同じ……\nなどではなかった。
3140 = "Giống như ngày xưa……\nHoàn toàn không phải."

# monologue
# JP: （甘さは……昔と変わらぬが――）
3761 = "（Sự ngọt ngào……vẫn không thay đổi so với\ntrước đây, nhưng——）"

# monologue
# JP: こんなに切なく、狂おしいような匂いじゃなかった。
3141 = "Không phải là một mùi hương đau đáu, cuồng\ndại đến thế này."

# monologue
# JP: こんなに胸がざわざわとする、\n濃く熱く、むせ返るような匂いじゃなかった。
3142 = "Không phải là một mùi hương nồng nàn, nóng\nbỏng,\nngột ngạt đến mức khiến lồng ngực tôi xốn\nxang thế này."

# 【日々姫】
# display as 日日姬
# JP: 「私は、良い子の妹ですから。\n兄さんの目的を叶えるために、力になって当然です」
2650 = "「Vì em là một cô em gái ngoan mà.\nNên việc trở thành sức mạnh để giúp anh\ntrai đạt được mục đích là chuyện đương\nnhiên.」"

# monologue
# JP: 日々姫の声に救われる。\n涼しい風が、熱気を払ってくれたみたいで。
3383 = "Giọng nói của Hibiki đã cứu rỗi tôi.\nGiống như một làn gió mát xua tan đi bầu\nkhông khí nóng bức."

# 【双鉄】
# display as 雙鐵
# JP: 「いや……僕の目的のためというのなら」
2335 = "「Không……Nếu nói là vì mục đích của anh.」"

# 【日々姫】
# display as 日日姬
# JP: 「そういう風に思ってたんです。\nでも、稀咲先輩も恩人で、私の居場所を作ってくれて」
2634 = "「Em đã từng nghĩ như vậy.\nNhưng chị Kisaki cũng là ân nhân, người đã\ntạo ra chốn dung thân cho em.」"

# monologue
# JP: 過去形で。\n日々姫は日々姫を語っている。
3472 = "Bằng thì quá khứ.\nHibiki đang kể về chính bản thân mình."

# 【日々姫】
# display as 日日姬
# JP: 「それで私。兄さんと稀咲先輩の板挟みで。\n立ち位置が難しくて、だから、フラフラしちゃってて」
2789 = "「Thế là em bị kẹp giữa anh trai và chị\nKisaki.\nVị trí đứng của em rất khó khăn, vì vậy em\nmới trở nên do dự.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2527 = "「嗯」" 

# monologue
# JP: ようやくわかる。\n“立って歩く”と、日々姫が言っている意味が。
3379 = "Cuối cùng tôi cũng hiểu.\nÝ nghĩa của câu \"Đứng lên và bước đi\" mà\nHibiki đã nói."

# 【日々姫】
# display as 日日姬
# JP: 「だから、いったんゼロにして。\n賛成でも反対でもなく――私、自分で考えます」
2683 = "「Vì thế, em sẽ đưa mọi thứ về con số\nkhông.\nKhông tán thành cũng không phản đối——Em sẽ\ntự mình suy nghĩ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「教わるではなく、知りたいのだな」
2341 = "「Không phải là được dạy bảo, mà là muốn tự\nmình tìm hiểu nhỉ.」"

# monologue
# JP: ようやく、わかる。
3378 = "Cuối cùng, tôi cũng đã hiểu."

# monologue
# JP: “目と心とを磨く”と日々姫が、\nどんな覚悟で、僕に聞かせてくれたのか。
3350 = "「Đúng vậy, anh trai. Em sẽ tự mình làm\nđiều đó.\nKhông phải là câu trả lời do ai đó tìm ra,\nmà chắc chắn sẽ là câu trả lời của chính\nem.」"

# 【日々姫】
# display as 日日姬
# JP: 「そうです、兄さん。私は、自分で。\n誰かの見つけた答えじゃなく、自分自身の答えをきっと」
2767 = "「Quyết tâm tốt lắm.\nAnh sẽ đứng về phía em, Hibiki.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いい覚悟だ。\n僕は、日々姫に味方する」
2356 = "「Quyết tâm tốt lắm.\nAnh sẽ đứng về phía em, Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ……」
# 2503 = "「啊……」" 

# monologue
# JP: 日々姫の手を取る。立ち上がる。\n身長差がある。日々姫を見下ろす形となる。
3368 = "Nắm lấy tay Hibiki. Đứng dậy.\nGiữa chúng tôi có sự chênh lệch chiều cao.\nTôi đang ở tư thế nhìn xuống Hibiki."

# monologue
# JP: けれども今日は、\n日々姫を少し――いつもより大きく、大人に感じる。
3159 = "Nhưng hôm nay,\ntôi cảm thấy Hibiki có chút gì đó——to lớn\nhơn, trưởng thành hơn mọi khi."

# 【双鉄】
# display as 雙鐵
# JP: 「選挙戦は厳しくなるぞ」
2885 = "「Cuộc chiến bầu cử sẽ khắc nghiệt lắm\nđấy.」"

# 【日々姫】
# display as 日日姬
# JP: 「そう……ですよね。ポーレットさんの支持者さん、\nみんな、工場誘致反対で結束してますもんね」
2724 = "「Đúng……vậy nhỉ. Những người ủng hộ chị\nPaulette,\ntất cả đều đang đoàn kết lại vì phản đối\nviệc thu hút nhà máy mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2730 = "「Ừ.」"

# monologue
# JP: ならば、風を。\nいっそう激しく吹かせればいい。
3702 = "Nếu vậy thì, ngọn gió.\nChỉ cần thổi mạnh hơn nữa là được."

# monologue
# JP: 日々姫にならそれが出来ると――\n日々姫となら、それが出来ると確信している。
3457 = "Nếu là Hibiki thì con bé có thể làm được——\nNếu là cùng với Hibiki, tôi tin chắc rằng\nchúng tôi có thể làm được."

# 【日々姫】
# display as 日日姬
# JP: 「だから私は、隠さずみんなに伝えます。\n自分の迷いを、悩みを、学びを。全部、そのまま」
2679 = "「Vì vậy, em sẽ không giấu giếm mà truyền\nđạt cho mọi người.\nNhững băn khoăn, trăn trở và cả những điều\nem đã học được. Tất cả, y như những gì em\nnghĩ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
# 2730 = "「是啊」" 

# monologue
# JP: それでいい。\n日々姫も、僕と同じところを見ている。
3687 = "Vậy là được rồi.\nHibiki cũng đang nhìn về cùng một hướng\nvới tôi."

# monologue
# JP: 無党派層を、賛成でも反対でもない人々の――\n彼らの判断を促すことが、御一夜の未来に繋がると。
3167 = "Thúc đẩy sự phán đoán của những người\nkhông thuộc đảng phái nào, những người\nkhông tán thành cũng không phản đối——\nđiều đó sẽ kết nối với tương lai của\nOhimitera."

# 【双鉄】
# display as 雙鐵
# JP: 「そうして日々姫が得る結論が、工場誘致賛成であるなら、\nそのときは、堂々と僕と戦おう」
2563 = "「Và nếu kết luận mà Hibiki rút ra là tán\nthành việc thu hút nhà máy,\nthì khi đó, hãy đường đường chính chính\nchiến đấu với anh nhé.」"

# 【日々姫】
# display as 日日姬
# JP: 「そっか……\nそれも、兄さんと対等になれる道ですね」
2581 = "「Ra là vậy……\nĐó cũng là con đường để có thể bình đẳng\nvới anh trai nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それでも僕は日々姫の味方だ。\n全力でお前を叩き潰して、泣き出すお前を慰めてやろう」
2522 = "「Ừm. Dù vậy thì anh vẫn là đồng minh của\nHibiki.\nAnh sẽ dốc toàn lực để đánh bại em, rồi sẽ\nan ủi em khi em khóc.」"

# 【日々姫】
# display as 日日姬
# JP: 「じゃあ、兄さんを泣かせちゃったら、\n私が慰めてあげますね？」
2900 = "「Vậy thì, nếu lỡ làm anh trai khóc,\nthì em sẽ an ủi anh nhé?」"

# monologue
# JP: 言って、くすくす笑って日々姫は、\n「あ」と呟き、だんだんと頬を赤くする。
3491 = "Nói rồi, Hibiki cười khúc khích,\nrồi thốt lên \"A\", hai má dần ửng đỏ."

# 【日々姫】
# display as 日日姬
# JP: 「兄さんのこと……なぐさめ、て――」
2569 = "「An ủi……anh trai, sao——」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ」
# 2942 = "「！」" 

# monologue
# JP: 日々姫の匂いが、いっそう濃くなる。\nどくん、どくんと、自分の心音が耳につく。
3479 = "Mùi hương của Hibiki ngày càng nồng đậm\nhơn.\nTiếng tim đập thình thịch, thình thịch\nvang vọng bên tai tôi."

# 【日々姫】
# display as 日日姬
# JP: 「あの……ですね、兄さん」
2516 = "「À……anh trai này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2527 = "「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「私、一人で歩きますけど。\nちゃんと、大人になりますけど」
2663 = "「Em, sẽ tự mình bước đi.\nSẽ trở thành một người lớn đàng hoàng.」"

# monologue
# JP: 日々姫が、さらに身を寄せてくる。\n体が、熱くなった気がする。
3462 = "Hibiki lại nép sát vào tôi hơn nữa.\nTôi cảm thấy cơ thể mình nóng ran lên."

# monologue
# JP: あるいは日々姫の体温が、触れるギリギリのところから、\n僕にまで、伝わってきているのかもしれない。
3214 = "Hoặc có lẽ là do thân nhiệt của Hibiki,\ntừ khoảng cách sát rạt này, đang truyền\nsang tôi."

# 【日々姫】
# display as 日日姬
# JP: 「今日はまだ、私、甘えっ子の日々姫ですから。\nだから、勇気――勇気の出るおまじない、欲しいんです」
2387 = "「Nhưng hôm nay, em vẫn là một Hibiki thích\nlàm nũng.\nThế nên, em muốn xin một câu thần chú——một\ncâu thần chú tiếp thêm dũng khí.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ。本当に甘えっ子だな」
2384 = "「Gì vậy chứ. Đúng là đồ trẻ con thích làm\nnũng mà.」"

# monologue
# JP: 何を言い出すものかと思えば、\nおまじないとは可愛らしい。
3390 = "Đang nghĩ không biết con bé sẽ nói gì,\nnhưng xin \"câu thần chú\" thì đáng yêu thật\nđấy."

# monologue
# JP: 髪をくしゃくしゃ撫でてやろうと――\n差し出した手を、日々姫は両手で捕まえる。
3387 = "Vừa định đưa tay ra xoa rối mái tóc con bé\nthì——\nHibiki đã dùng cả hai tay bắt lấy tay tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2534 = "「嗯？」" 

# 【日々姫】
# display as 日日姬
# JP: 「これじゃないです。\n兄さん、少ししゃがんでください」
2344 = "「Không phải cái này đâu.\nAnh trai, ngồi thấp xuống một chút đi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。こうか？」
2526 = "「Ừm. Thế này sao?」"

# monologue
# JP: （ちゅっ！）
3749 = "（Chụt!）"

# monologue
# JP: 日々姫の顔が大写しになり、\n唇をさっとかすめる感触。
3484 = "Khuôn mặt của Hibiki phóng to ngay trước\nmắt,\ncùng với cảm giác lướt nhẹ qua môi."

# monologue
# JP: 柔らかな熱――遅れて、少しだけ湿った感じ。
3541 = "Hơi ấm mềm mại——một lúc sau, là một chút\nẩm ướt."

# 【日々姫】
# display as 日日姬
# JP: 「わた、わたっ！　私もう寝るけんっ！\nおや、おやっ！　おやすみ、にぃにっ！」
2675 = "「Em, em! Em đi ngủ đây!\nChúc, chúc! Chúc anh hai ngủ ngon!」"

# 【双鉄】
# display as 雙鐵
# JP: 「お、おう」
2512 = "「À, ừ.」"

# monologue
# JP: ……部屋を追い出されてしまった。
2048 = "……Tôi bị đuổi ra khỏi phòng mất rồi."

# monologue
# JP: 廊下に一人。\nだけれど――唇にはまだ残っている。
3561 = "Đứng một mình ngoài hành lang.\nNhưng mà——trên môi vẫn còn lưu lại cảm\ngiác ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「……確かにこれは、勇気が出るかもしれないな」
2094 = "「……Đúng là cái này có thể tiếp thêm dũng\nkhí thật đấy.」"

# monologue
# JP: ならば、この感触を抱いて眠ろう。
3698 = "Nếu vậy, hãy mang theo cảm giác này vào\ngiấc ngủ thôi."

# monologue
# JP: 眠って起きれば、その先は――\n選挙戦という戦場に、僕らは望んで、向かうのだから。
3606 = "Ngủ một giấc rồi tỉnh dậy, phía trước sẽ\nlà——\nChiến trường mang tên bầu cử, nơi mà chúng\ntôi đã tự nguyện bước vào."
