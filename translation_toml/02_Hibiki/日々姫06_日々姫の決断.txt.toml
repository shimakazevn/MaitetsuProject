# display as 日日姬
# JP: 「だから私は、隠さずみんなに伝えます。\n自分の迷いを、悩みを、学びを。全部、そのまま」
2679 = "「所以我會不加任何掩飾地對大家全部坦白。不管是自己的迷茫也好，煩惱也好，還是經驗也好，全部都照原樣說出來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
# 2730 = "「是啊」" 

# monologue
# JP: それでいい。\n日々姫も、僕と同じところを見ている。
3687 = "這樣就好了。日日姬也和我的著眼點一樣。" 

# monologue
# JP: 無党派層を、賛成でも反対でもない人々の――\n彼らの判断を促すことが、御一夜の未来に繋がると。
3167 = "促使無黨派階層——那些既不贊成也不反對的人們做出決定，會直接聯繫到御一夜的未來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうして日々姫が得る結論が、工場誘致賛成であるなら、\nそのときは、堂々と僕と戦おう」
2563 = "「如果日日姬最後得出的結論是贊成引進工廠的話，到時候就堂堂正正地和我對決吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「そっか……\nそれも、兄さんと対等になれる道ですね」
2581 = "「對啊……這也是一種和哥哥平等的方法」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それでも僕は日々姫の味方だ。\n全力でお前を叩き潰して、泣き出すお前を慰めてやろう」
2522 = "「嗯。但就算這樣我也還會是你的伙伴。我會全力擊潰你，然後安慰痛哭的你」" 

# 【日々姫】
# display as 日日姬
# JP: 「じゃあ、兄さんを泣かせちゃったら、\n私が慰めてあげますね？」
2900 = "「那如果我把哥哥弄哭了，我也會安慰你的哦」" 

# monologue
# JP: 言って、くすくす笑って日々姫は、\n「あ」と呟き、だんだんと頬を赤くする。
3491 = "日日姬邊說著邊輕聲笑了。她又“啊”了一聲，臉開始變得通紅。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さんのこと……なぐさめ、て――」
2569 = "「安慰……哥哥……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ」
# 2942 = "「！」" 

# monologue
# JP: 日々姫の匂いが、いっそう濃くなる。\nどくん、どくんと、自分の心音が耳につく。
3479 = "日日姬的氣味顯得更濃了。我能聽見自己“噗通，噗通”的心跳聲。" 

# 【日々姫】
# display as 日日姬
# JP: 「あの……ですね、兄さん」
2516 = "「啊，那個……哥哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2527 = "「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「私、一人で歩きますけど。\nちゃんと、大人になりますけど」
2663 = "「我會一個人前進的，我會長大成人的」" 

# monologue
# JP: 日々姫が、さらに身を寄せてくる。\n体が、熱くなった気がする。
3462 = "日日姬把她的身體靠得更近。我感覺自己的身體變得很熱。" 

# monologue
# JP: あるいは日々姫の体温が、触れるギリギリのところから、\n僕にまで、伝わってきているのかもしれない。
3214 = "又或許是日日姬的體溫從極其靠近我的地方傳到了我身上。" 

# 【日々姫】
# display as 日日姬
# JP: 「今日はまだ、私、甘えっ子の日々姫ですから。\nだから、勇気――勇気の出るおまじない、欲しいんです」
2387 = "「今天的我還是那個愛撒嬌的日日姬。所以——請給我施一個能讓我鼓起勇氣的魔法」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ。本当に甘えっ子だな」
2384 = "「什麼嘛。真是個愛撒嬌的孩子」" 

# monologue
# JP: 何を言い出すものかと思えば、\nおまじないとは可愛らしい。
3390 = "我還以為她會說什麼呢。“魔法”——還真是可愛。" 

# monologue
# JP: 髪をくしゃくしゃ撫でてやろうと――\n差し出した手を、日々姫は両手で捕まえる。
3387 = "我試圖亂揉一通她的頭髮——但日日姬卻用雙手抓住了我伸出的手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2534 = "「嗯？」" 

# 【日々姫】
# display as 日日姬
# JP: 「これじゃないです。\n兄さん、少ししゃがんでください」
2344 = "「不是這個。哥哥你先蹲下吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。こうか？」
2526 = "「嗯。這樣嗎」" 

# monologue
# JP: （ちゅっ！）
3749 = "（啾！）" 

# monologue
# JP: 日々姫の顔が大写しになり、\n唇をさっとかすめる感触。
3484 = "日日姬的臉部變成了特寫畫面，嘴唇似乎被輕輕擦了一下。" 

# monologue
# JP: 柔らかな熱――遅れて、少しだけ湿った感じ。
3541 = "溫柔的熱度——稍過了一會又有點濕潤的感覺。" 

# 【日々姫】
# display as 日日姬
# JP: 「わた、わたっ！　私もう寝るけんっ！\nおや、おやっ！　おやすみ、にぃにっ！」
2675 = "「我，我！我要睡了！晚、晚！晚安，阿哥！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お、おう」
2512 = "「啊，嗯」" 

# monologue
# JP: ……部屋を追い出されてしまった。
2048 = "……我被趕出了房間。" 

# monologue
# JP: 廊下に一人。\nだけれど――唇にはまだ残っている。
3561 = "獨自站在走廊上。不過——嘴唇上仍舊殘留著溫度。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……確かにこれは、勇気が出るかもしれないな」
2094 = "「……這確實能讓人鼓起勇氣啊」" 

# monologue
# JP: ならば、この感触を抱いて眠ろう。
3698 = "那我就回味著這份觸感入眠吧。" 

# monologue
# JP: 眠って起きれば、その先は――\n選挙戦という戦場に、僕らは望んで、向かうのだから。
3606 = "睡醒後，接下來就是——名為選舉戰的戰場。我們主動踏入的戰場。" 
