# monologue
# JP: 近寄り、日々姫の肩を支える。\nそれでも震えがとまらないから、腕を回して、そっと抱く。
3391 = "我靠近日日姬，支撐起她的肩膀。但她還是一直在發抖，所以我又彎起手臂輕輕地抱住她。" 

# monologue
# JP: 僕の服へと顔をうずめて、\nもうこれ以上、涙をこらえずに済むように。
3367 = "我把她的頭埋進我的懷裡。這也是為了讓她不用再強忍眼淚。" 

# 【双鉄】
# display as 雙鐵
# JP: 「怯える必要などはない。何に震えることもない。\n日々姫は少しも、間違ったことなどしていない」
2766 = "「沒有必要害怕。也不用發抖。日日姬沒有做錯任何事」" 

# 【日々姫】
# display as 日日姬
# JP: 「だってっ！」
2479 = "「可是！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「事実を話しただけなのだろう？\n気心のしれている先輩に」
2420 = "「你只是向要好的學姐講出了事實而已吧？」" 

# 【日々姫】
# display as 日日姬
# JP: 「それは……そう、だけど。\nでも、稀咲先輩、隈元銀行の人なのに」
2892 = "「那……雖然是這樣。但是稀咲學姐可是隈元銀行的人啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。日々姫は、学園の先輩に話しただけだ」
2768 = "「沒錯，日日姬只是對學校裡的學姐講了事實而已」" 

# monologue
# JP: 断言していい。\n稀咲と直接の接触は、数える程しか経験していないが。
3360 = "我和稀咲的直接接觸不過數次而已，但我可以斷言。" 

# 【双鉄】
# display as 雙鐵
# JP: 「隈元銀行御一夜支店長としての宝生稀咲は、決して、\n一学園生の情報だけで行動を起こしたりはしない」
2416 = "「作為隈元銀行御一夜支行長的寶生稀咲是絕不會僅憑一個學生提供的訊息就採取行動的」" 

# monologue
# JP: しかし稀咲と、ただ一度でも会話をすれば、\n”そういう種類の人間だ”と、恐らく誰でも、確信できる。
3227 = "只要和稀咲對話過一次，恐怕不論是誰都會確信她就是“那種人”吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あれは、必ず事実関係の裏を取る。\nそして事実は、隠そうとしてさえ、明らかになる」
2554 = "「她肯定會嘗試去證實事實關係。而且就算別人想要隱蔽事實，她也一定能夠挖掘出來」" 

# monologue
# JP: いや、ひょっとして――\n稀咲はすでに、その方向で検討をしていたのかもしれない。
3138 = "不，說不定——稀咲已經考慮過這方面的事了。" 

# monologue
# JP: いずれにしても、日々姫が話して聞かせたことなど、\n稀咲にとっては、材料のひとつに過ぎないだろう。
3131 = "不管怎麼樣，日日姬說的話對稀咲來說也只不過是她的判斷佐證之一吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「事態は、既に動いていたのだ。\n日々姫が何を話そうが、黙っていようが関係なしに、な」
2374 = "「事態早已開始發展了。不管日日姬是說出來還是保持沉默都一樣」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう。そうなの、日々姫ちゃん」
2742 = "「是的，沒錯，日日姬」" 

# monologue
# JP: れいなに押されて流れ始めて、\nそれでもなおも弱々しかったポーレットの声に力がこもる。
3146 = "之前即使受到玲奈的鼓勵也依舊無精打采的波萊特，聲音突然變得有力起來。" 

# monologue
# JP: 日々姫を励ますそのために、\nくたくただろう心を声を、絞ってくれている。
3542 = "為了安慰日日姬，她振作起想必已經疲憊不堪的內心，強迫自己開口道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「辞任云々の報道が出たのは、\nただ、わたしの答えが……心が、揺らいでたせいだから」
2366 = "「之所以會出現關於辭職的報導，只是因為我的回答……是因為我的心動搖了」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2942 = "「！」" 

# monologue
# JP: ポーレットの言葉に、吐露に、日々姫の顔が跳ね上がる。
3485 = "日日姬聽到波萊特吐露的心聲猛地抬起頭。" 

# monologue
# JP: “そこまで言わせてしまった”と、\n恐らく日々姫は、自責を更に深めてしまった。
2029 = "“我竟然讓你不得不說出那樣的話……”恐怕日日姬的自責反而更深了吧。" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがと、にぃに」
2831 = "「謝謝你——阿哥」" 

# monologue
# JP: だからこそ。日々姫は、僕の義妹は――\nもう大丈夫というように、僕からそうっと体を離す。
3406 = "所以日日姬——我的義妹輕輕地放開了我的身體。就好像在說，她已經沒事了。" 

# monologue
# JP: それが日々姫の望みであるなら、平気なものと扱おう。\nポーレットへと向き直り、聞いた言葉を繰り返す。
3418 = "既然這是日日姬所希望的，那我就當是這樣吧。我重新轉向波萊特，重複她剛才的話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「揺らいだか」
2418 = "「你動搖了嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です、ね。\n……正直、揺らいじゃいました」
2735 = "「是的……說實話我真的動搖了」" 

# monologue
# JP: 日々姫のために絞ってくれた力が、\nみるみる萎えていくのが端から見てわかる。
3543 = "為了日日姬而好不容易打起的精神又眼看著萎靡下去。" 

# monologue
# JP: それほどまでに――\nポーレットは疲れ、消耗しきってしまっている。
3525 = "波萊特已經疲憊不堪——她的精力已經消耗到極限了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしが、すぐにきっぱり断っていれば、\nそんな報道、絶対に出るはずもないんです」
2828 = "「要是我乾脆地拒絕的話，就絕對不會出那種報導的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、それはそうだろうな」
2531 = "「嗯，確實啊」" 

# monologue
# JP: 万一出ても、全く根拠が無いのであれば、\n法的手段に訴えればいい。
3314 = "就算真的出了這種報導，如果毫無根據的話，只要動用法律的武器就好。" 

# monologue
# JP: そうした姿勢を取ること自体が、\n辞任観測を否定する強い力ともなる筈だ。
3627 = "而保持這種態度就是強烈否定辭職輿論的力量。" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど、わたし……揺らいで……迷って――\n『検討します』って……答えちゃったんです」
2410 = "「但是我卻……動搖了……猶豫了……還說“我會考慮的”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「検討、か――」
2814 = "「考慮，嗎……」" 

# monologue
# JP: どう言おうかと言葉を探しあぐねるうちに、\nハチロクがスっと踏み込んでいく。
3504 = "正當我絞盡腦汁想著該怎麼接話的時候，八六插話了。" 

# 【ハチロク】
# display as 八六
# JP: 「『市長辞任を検討します』と――\nそう捉えられても仕方の無い発言ですね、それは」
2870 = "「這樣的發言被理解為“我會考慮辭去市長職位”也沒辦法啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……はい」
# 2085 = "「……是的」" 

# 【れいな】
# display as 玲奈
# JP: 「え！？\nポーレット、市長さんやめちゃうんですかぁ？」
2492 = "「哎！？波萊特不當市長了嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……さぁ……れいな。どうなのかしらね」
2082 = "「……怎麼說呢……玲奈。其實我也不知道」" 

# monologue
# JP: れいなの疑問は、否定されない。\nれいなはますます不思議そうな顔になる。
3276 = "她沒有否定玲奈的疑問。玲奈臉上的表情顯得越來越困惑。" 

# 【れいな】
# display as 玲奈
# JP: 「？？？　わからないのですか？\nポーレットのことなのに」
2946 = "「？？？不知道嗎？明明是波萊特自己的事啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう……ね、ほんと。\n自分のこともわからないとか、おかしいわよね」
2726 = "「是啊……真的。我連我自己的想法都不知道，真的很奇怪」" 

# monologue
# JP: 力無い言葉を心配したのか、\nれいながぽてぽてポーレットへと歩み寄る。
3155 = "似乎是擔心她無力的發言，玲奈趕忙跑到波萊特身邊。" 

# monologue
# JP: ポーレットは真白い手を伸ばし、\nれいなの小さな体を抱きしめ、胸に収める。
3523 = "波萊特伸出她白皙的雙臂抱緊玲奈小小的身體，把她擁入懷裡。" 

# 【れいな】
# display as 玲奈
# JP: 「ひゃうう」
2482 = "「哇啊」" 

# monologue
# JP: （これは……これほどまでに、だったか。\nこれほどまでに、ポーレットは磨り減りきっていたのか）
3759 = "（竟然……精神消耗到這個地步了嗎。波萊特的精神被折磨到這個地步了嗎）" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2933 = "「雙鐵少爺」" 

# monologue
# JP: ハチロクが、それだけ言って僕を見る。\n促すように、僕を見つめる。
3188 = "八六喊著我的名字看向我。她的眼神好像是在催促。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。結論はすでに出ている」
2532 = "「嗯，結論已經出來了」" 

# monologue
# JP: だから、僕もそれだけを言う。
3401 = "所以我也只說了這一句。" 

# monologue
# JP: 無言のうちに、全員が共有させられた――\nするしか無かった認識としても、声に出さねば、進めない。
3177 = "全員在無言中達成了這個共識——或者說是只能達成這個共識——但如果沒人發聲的話，就沒辦法繼續下去了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕達は、この辞任観測報道を否定できず、\n撤回させることも出来ない」
2640 = "「我們無法否認這篇辭職猜測的報導，也不能讓他們撤回」" 

# 【ポーレット】
# display as 波萊特
# JP: 「…………」
# 2062 = "「……」" 

# monologue
# JP: 頷く。ごくごくわずかに、力なく。\nしかし、ポーレットが確かに、頷く。
3719 = "雖然略顯無力。但她還是明確地點了點頭。" 

# monologue
# JP: 次の瞬間、そうした自分に驚いたように顔をあげ、\n泣きそうな目で、僕を見る。
3125 = "下一個瞬間，她彷彿是被自己的行為嚇到了一般，抬起頭用淚眼汪汪的眼睛看向我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットへの負荷が大きすぎたのだ。\nこれ以上の市長と社長の兼務は――」
2423 = "「你的負擔實在是太重了。繼續兼任市長和社長——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
2931 = "「雙鐵君」" 

# monologue
# JP: まばたきをして、ツバを飲み。
3291 = "她眨了眨眼睛，又咽了口唾沫。" 

# monologue
# JP: そうして大きく息を吸い、\nポーレットはゆっくりと立ち上がる。
3557 = "然後深吸了一口氣，緩緩地站起身來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう。でも、自分で言います。\n自分で言わなきゃ――ダメなことです、絶対に」
2832 = "「謝謝你。但是我會自己說的。這件事，我必須自己說出口」" 

# monologue
# JP: 僕は知っている。\nいや、ここにいる全員が間違いなく知っている。
3364 = "我很清楚。不，在場的所有人都十分清楚。" 

# monologue
# JP: ポーレットの責任感が、\n必要十分を更に上回る強さであるということを。
3529 = "波萊特的責任感特別強。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしの能力で、御一夜市長と御一夜鉄道社長とを、\nこれ以上兼務することは、とても困難だと感じています」
2673 = "「我認為以我的能力，要繼續兼任御一夜市長和鐵路公司社長會非常困難」" 

# monologue
# JP: ――そのポーレットの決断ならば、\n無論、支持する。
2021 = "——如果這就是波萊特的決斷，我當然支持。" 

# monologue
# JP: うなだれていた日々姫も今は顔をあげ、\nしっかとポーレットを見つめている。
3208 = "剛才還無精打采的日日姬現在也抬起頭，堅定地看向波萊特。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですので――最善の形を作って。\nそうして市長を辞任したいと、今、決断しました」
2681 = "「所以我現在決定——我要以一種最好的形式來辭去市長的職位」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2732 = "「是嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「最善の形とは、誰に、あるいは何にとっての、\n最善という意味でしょうか？」
2753 = "「最好的形式，是對誰或者什麼“最好”呢？」" 

# monologue
# JP: ハチロクはポーレットを振り返らせない。\n立ち止まることさえ、今はさせない。
3182 = "八六不會讓波萊特走回頭路，就連止步不前也不行。" 

# monologue
# JP: その決断を未来へと――\nつなげるために、問いかける。
3280 = "她為了讓波萊特的決斷能和未來緊密聯繫在一起，如此質問道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜市と、御一夜鉄道。\nそして、わたし達みんなにとっての、最善です」
2582 = "「對御一夜市和御一夜鐵路，還有對我們大家“最好”」" 

# 【ハチロク】
# display as 八六
# JP: 「具体的には？」
2442 = "「具體要怎麼做？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしが市議会議長に辞職を申し出れば、\nその日から５プラス５０日以内に市長選が行われます」
2473 = "「只要我向市議會議長提出辭職，５～５５天以內就會舉行市長選舉」" 

# monologue
# JP: ポーレットの目が、僕を捉える。
3526 = "波萊特把視線轉向我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「その市長選で\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対派の候補が勝てば、\n民意を改めて示せることになります」
2556 = "「如果在市長選舉中，\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠引進反對派的候選人當選的話，那就能再一次展現民意」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――そうなれば一挙両得という形に」
2450 = "「原來如此——那就一舉兩得了啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ。隈元銀行からの広告の話は断ります。\n受けてしまえば、市長選で負けてしまいますから」
2337 = "「不。我會拒絕隈元銀行的廣告提議。要是我接受了，我們就會輸掉市長選舉」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2502 = "「啊——」" 

# monologue
# JP: 確かにだ。\nもし、広告の話を受けてしまったのなら――
3610 = "確實。如果接受了廣告提議的話——" 

# monologue
# JP: 『市長職を、広告費を得るための質草にした』\n――そうした批判に、全く抗えなくなってしまう。
2031 = "“把市長職位當成獲得廣告費的抵押品”——我們就完全無法抵擋這種批判了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……となると、広告云々の話は、\nある種の罠、とも考えられるか」
2090 = "「……若是這樣的話，他們的廣告提議或許是一個陷阱啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね」
# 2741 = "「是的」" 

# monologue
# JP: 言葉は、もはや竦んでいない。\n目にも力が戻っている。
3287 = "她的語氣中不再透著竦懼。眼神也變得堅定起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「選挙戦。\n選挙は――つまり、戦争ですから」
2884 = "「選舉戰。選舉——就是戰爭」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、最善――勝利のための戦略を、\nすでにポーレット様はお考えなのですか？」
2916 = "「那麼，波萊特小姐您已經考慮好了最佳的取勝戰略了嗎？」" 

# monologue
# JP: こくり、ポーレットは頷いて。\n持ち上げなおした瞳はなおも、僕から全く離れない。
3532 = "波萊特輕輕點點頭。她的視線依舊沒有從我身上移開。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、考えたんです。私が揺らいでしまったのは、\n逆にいうと、揺らげるだけの余裕があったからだって」
2660 = "「我想過了。我之所以會動搖，其實也說明了我有可以動搖的餘地」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2498 = "「唔」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その余裕は、双鉄くんが、わたしに与えてくれたもの。\n双鉄くんが居てくれるって思ったから、わたし――」
2872 = "「這餘地是雙鐵君給我的。因為我覺得雙鐵君會陪著我，我才——」" 

# 【ハチロク】
# display as 八六
# JP: 「なるほど。つまり」
2451 = "「原來如此。也就是說」" 

# monologue
# JP: ハチロクの視線までもが、\nポーレットから外れ、僕へと。
3195 = "八六的視線也從波萊特身上轉到我身上。" 

# 【ハチロク】
# display as 八六
# JP: 「後継候補を双鉄様に――\nそれが、ポーレット様の戦略ですか？」
2836 = "「讓雙鐵少爺當候選接班人——這就是波萊特小姐您的戰略嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん。\nもちろん、双鉄くんがよければ、だけど」
2524 = "「嗯。當然，前提是雙鐵君同意才行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もとより、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致撤回を果たすため、\n僕はこの町に戻ってきた。候補になるのは構わん。が」
2643 = "「我原本就是為了要求撤回引進\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠的計劃才回到這座城市。讓我去當候選人當然是沒關係，不過——」" 

# monologue
# JP: 見る。\nポーレットでもハチロクでもない、その人を。
3377 = "我看向那個人——既不是波萊特也不是八六。" 

# monologue
# JP: 御一夜に産まれ、御一夜に育ち、\n僕に御一夜を教えてくれた、[いもうと,1]義妹を。
3628 = "而是生在御一夜，長在御一夜，又告訴我何為御一夜的——我的義妹。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕という実質的な[よそもの,2]余所者が候補になって、\n御一夜の選挙で――勝てるのか？」
2589 = "「就算我這個事實上的外鄉人去當候選人，又真的能在御一夜的選舉中取勝嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫です。\nわたしだって同じようなものでしたし」
2351 = "「不要緊的。畢竟我之前也跟你一樣」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様を上回る能力の候補など、\n御一夜中をどう探しても見つからないでしょう」
2817 = "「而且能力在雙鐵少爺之上的候選人，哪怕找遍整個御一夜也找不到吧」" 

# monologue
# JP: ポーレットとハチロクとの言葉と信頼とは嬉しい。\nが――ことはそんなに単純ではない。
3718 = "雖然波萊特和八六的話語與信賴讓我很高興，可是事情真的沒有那麼單純。" 

# monologue
# JP: （ポーレットも確かに余所者同然ではある。\nが――任期途中に逝去した前市長の、実の娘だ）
3756 = "（波萊特確實就相當於外鄉人。但——她也是那位在任期內離世的前市長的女兒）" 

# monologue
# JP: 対し、ポーレットは。自己都合での途中辞任。\n僕と血縁があるわけでもないし、無論、弔い合戦でもない。
3631 = "而波萊特則是因為個人原因在任期內宣布辭職。她和我沒有血緣關係，當然這也不是一場哀悼之戰。" 

# monologue
# JP: 後継候補になることが、\n果たしてどれだけ有利に働くものか、まるで読めない。
3372 = "我當候選接班人到底會對整件事情產生多少有利的影響，完全無法預計。" 

# monologue
# JP: （まして、ハチロクの言は単なる身びいきだ。\n僕より有能なものなど、ごくごく身近にさえも）
3748 = "（何況剛才八六的話也只是單純偏袒我而已。比我更有能力的人在我身邊就有好幾個）" 

# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇに――」
2923 = "「阿姐……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2942 = "「！」" 

# monologue
# JP: 心を読まれたような気がして、驚かされる。\nけれど日々姫は、僕を見てない。
3354 = "感覺自己的內心似乎被看穿了，我不由得嚇了一跳。不過日日姬卻沒有在看我。" 

# monologue
# JP: 視線はじっと床へ落ち、\n釘付けられでもしたかのように、動かない。
3283 = "她的視線落在地板上，彷彿被釘住了似的一動不動。" 

# 【日々姫】
# display as 日日姬
# JP: 「真闇姉さんに聞いてみるのが、一番いいと思います。\n御一夜の選挙のこと……多分、誰よりも詳しいですから」
2669 = "「我覺得去問問真闇姐最好。她大概比任何人都更清楚御一夜選舉的事」" 

# 【ポーレット】
# display as 波萊特＆八六
# JP: 「あっ！　そうですよね」\n「そうなのでしょうね」
2509 = "「啊！那也是啊」\\n「嗯，是這樣」" 

# monologue
# JP: ――左右から、即時の同意。\nけれども僕は、即答できない。
2022 = "——從左右雙方都立刻傳來同意的聲音。可我卻無法馬上做出回答。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は、それで――」
2706 = "「日日姬，你覺得——」" 

# monologue
# JP: いいかけ、すぐさま言葉を呑み込む。
3358 = "我剛說了一半又把話咽回了肚子裡。" 

# monologue
# JP: （馬鹿か、僕は）
3752 = "（我是笨蛋嗎）" 

# monologue
# JP: 日々姫が提案してくれたことであるというのに、\n“それでいいのか”と確認するなど、愚弄に等しい。
3493 = "明明就是日日姬提出的提案，我還問她“你覺得怎麼樣”，這根本就是愚弄人嘛。" 

# monologue
# JP: 同意か、反対。答えはそのいずれかのみであるべきだし、\nであるのなら、僕の答えはひとつしか無い。
3242 = "同意，還是反對。如果答案只能從這兩個裡選一個，而且必須選的話，那我的回答只有一個。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――とてもいい案だ。そうしよう」
2058 = "「——這是個很好的提議，就這麼辦吧」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんでは勝てんね」
2586 = "「小雙是贏不了的」" 

# monologue
# JP: あっさりと、\n真闇姉はただ、結論だけを口にする。
3597 = "真闇姐乾脆地說出了結論。" 

# 【ハチロク】
# display as 八六
# JP: 「どうしてですか！？」
2782 = "「為什麼！？」" 

# monologue
# JP: 問いかけに、\n真闇姉は逆に質問を投げかける。
3599 = "真闇姐對她投來的疑問反問道：" 

# 【真闇】
# display as 真闇
# JP: 「選挙結果を決める言われとる三要素。\n何と何と何だか、知っとる？」
2477 = "「可以說能夠決定選舉結果的三要素。你知道分別是什麼嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「存じ上げません」
2631 = "「我不知道」" 

# 【ポーレット】
# display as 波萊特
# JP: 「地盤、看板、鞄――と言われていますよね」
2543 = "「地盤、招牌、皮包——就是這三樣」" 

# 【れいな】
# display as 玲奈
# JP: 「“ばん”ばっかりですぅ」
2886 = "「還有點押韻啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうね、れいな」
2731 = "「是啊，玲奈」" 

# monologue
# JP: 面白がったれいなに向かい――\nいや、れいなに向けるフリをして。
3297 = "她轉向好奇不已的玲奈——不，是假裝轉向她。" 

# monologue
# JP: 地盤は組織、看板は知名度、鞄はお金のことである、と、\nポーレットはさりげなく教えてくれる。
3264 = "地盤就是組織，招牌就是知名度，皮包就是錢，波萊特波瀾不驚地告訴她。" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど、今どきの選挙はむしろ、\n“人、金、風で決まる”なんていう風にも言われてるの」
2355 = "「不過，現在的選舉據說倒不如是由“人、錢、風”來做主了」" 

# 【れいな】
# display as 玲奈
# JP: 「風って、びゅーって吹くアレですかぁ？」
2938 = "「風就是呼呼吹的那個嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうね。つまりは、その場の流れや、雰囲気のこと。\n今どきは、浮動票の影響力がとても大きいから」
2499 = "「唔，也就是說時下的流勢、氣氛啦。現在這個時代流動票的影響力也是很大的」" 

# 【れいな】
# display as 玲奈
# JP: 「ふどうひょう」
2781 = "「流動票？」" 

# 【真闇】
# display as 真闇
# JP: 「地盤に乗らない……特定の候補を応援してない票のこと。\nゆーか、ポーちゃんは、さすが現職の市長さんやねぇ」
2340 = "「不從屬固定的組織……不支持任何特定候選人的票。不過小波還真不愧是現任市長呢」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、そんな」
2362 = "「不，過獎了」" 

# 【真闇】
# display as 真闇
# JP: 「ほんならね。今度は、ひーちゃんに質問」
2912 = "「那這次咱就來問問小日」" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 2062 = "「……」" 

# monologue
# JP: いきなり話を振られてけれど、日々姫は少しも慌てない。\n無言のままに頷くのみだ。
3720 = "雖然突然被搭話，日日姬倒是一點也不慌張。她默默地點點頭。" 

# monologue
# JP: 真闇姉はそんな日々姫を満足そうに眺めて、\nおもむろに問いを重ねる。
3602 = "真闇姐滿意地看著這樣的日日姬，慢悠悠地問道：" 

# 【真闇】
# display as 真闇
# JP: 「人、金、風で――前回の市長選、\nポーちゃんに味方したのは、どれやったかねぇ」
2378 = "「人、錢、風——在上一次市長選舉中，是哪個幫了小波的忙？」" 

# 【日々姫】
# display as 日日姬
# JP: 「お金がどうかは知らないけど――\n人と風とは、確実に」
2754 = "「有沒有錢的關係我不知道——不過人和風確實是起作用了」" 

# 【真闇】
# display as 真闇
# JP: 「そーね。前市長の地盤をそっくり受け継いで、\nその上、弔い選挙いう強か追い風ば吹いたけんねぇ」
2721 = "「是呢。她完全繼承了前市長的地盤，而且又有“哀悼選舉”這陣順風助陣」" 

# monologue
# JP: 満足そうに日々姫を見、確認するようにポーレットを見て。\n真闇姉の視線は今度は、僕へ向く。
3279 = "她滿意地看著日日姬，然後又轉向波萊特確認一下她的反應，再接著又轉向我。" 

# 【真闇】
# display as 真闇
# JP: 「ポーちゃんが辞任して市長選になった場合、\n誘致賛成派が担ぐ候補は、稀咲ちゃんたい」
2561 = "「如果小波辭職後進行市長選舉的話，引進支持派推舉的候選人可就是稀咲妹妹咧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
2507 = "「啊！」" 

# 【れいな】
# display as 玲奈
# JP: 「そおなんですかぁ？」
2747 = "「是這樣嗎？」" 

# monologue
# JP: 驚き顔のポーレットたち。\n対して日々姫は、顔色ひとつも変えずに頷く。
3524 = "波萊特她們都一臉吃驚的樣子。而日日姬則表情不變地點點頭。" 

# monologue
# JP: そしてゆっくり……\n表情を消そう消そうとしている顔で、僕を見る。
3559 = "然後表情緩緩地……緩緩地從她臉上消失，轉向我。" 

# 【日々姫】
# display as 日日姬
# JP: 「やっぱり――だよね。だから、にぃにぃ。\n――兄さんじゃ、今回の選挙には、勝てない」
2760 = "「果然——是這樣呢。所以，阿哥。——哥哥你是贏不了這場選舉的」" 

# 【ハチロク】
# display as 八六
# JP: 「なっ！？」
2385 = "「什麼！？」" 

# 【真闇】
# display as 真闇
# JP: 「そーよね。ウチもそう思うたい。\nゆーか、双ちゃんを立てれば、向こうさんの思うツボ」
2729 = "「是啊。咱也這麼想。不如說，小雙要參選可正中對方的下懷呢」" 

# 【ハチロク】
# display as 八六
# JP: 「思うツボとはなんですか！\n双鉄様なら、そんなツボは叩き割ってくださいます！」
2383 = "「什麼叫正中下懷啊！雙鐵少爺肯定會把他們的算盤擊得粉碎！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク」
2915 = "「那麼，八六」" 

# monologue
# JP: 気持ちは嬉しい。
3717 = "雖然她的心意讓我很高興。" 

# monologue
# JP: が――日々姫の見立ては確かだろうと、\n僕自身はっきり感じている。
3229 = "可是——我能切身體會到日日姬的推測是正確的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「比較してみよう。まずは金。\n稀咲と僕とで、これはどうだ？」
2764 = "「比較一下吧。首先是錢。稀咲和我誰更有錢？」" 

# 【ハチロク】
# display as 八六
# JP: 「それは……さすがに、向こうです」
2888 = "「那……肯定是對方了」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃんやポーちゃんにお金を出してくれる層は、\n今回の鉄道がらみで、かなりお財布軽ぅにしたけんねぇ」
2820 = "「能給小雙和小波捐錢的階層，在這次關於鐵路的一連串事情中可都是大出血了呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ」
2078 = "「……唔」" 

# monologue
# JP: 僕には頷くだけしか出来ない。
3371 = "我現在只能點頭。" 

# monologue
# JP: 申し訳ない、などと言ってしまえば、\n真闇姉に、出資してくださった皆様に対し、失礼になる。
3386 = "我要是現在道歉，就是對真闇姐和各位出資人莫大的失禮。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様――」
2932 = "「雙鐵少爺——」" 

# monologue
# JP: なにかを言いかけた唇を、しかしハチロクはそのまま結び。\nそして大きく頭を振って、その顔を真っ直ぐ持ち上げ直す。
3185 = "八六似乎想說什麼，可她最後還是閉緊了嘴唇。然後用力搖搖頭，隨後重新抬起頭。" 

# 【ハチロク】
# display as 八六
# JP: 「ですが、人。これはこちらが勝っていましょう」
2414 = "「但是，人呢。這方面是我們贏了吧」" 

# 【真闇】
# display as 真闇
# JP: 「それはそーとね。稀咲ちゃんと双ちゃんが互角として、\n頭取の宝生さんとウチとが、互角」
2897 = "「那倒有得一拼。現在稀咲妹妹和小雙是不相上下，寶生行長和咱也是不相上下」" 

# monologue
# JP: ハチロクは少し不満そうだが、黙って話を聞いている。
3201 = "八六看起來有點不滿，不過她還是默默地聽著。" 

# monologue
# JP: 日々姫は……やはり、泣き出しそうな顔を必死で、\n無表情へと修正しようとし続けている。
3456 = "日日姬……還是在努力用一張撲克臉來掩飾她那快要哭出來的表情。" 

# 【真闇】
# display as 真闇
# JP: 「そう考えたら、残ったコマの質でも量でも、\nこっちの陣営が勝るたい」
2873 = "「這麼一想的話，咱們剩下的棋子不管是質還是量都更勝一籌」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら！　これで一対一です」
2911 = "「那這樣就是一比一了！」" 

# 【真闇】
# display as 真闇
# JP: 「ほんなら勝負の三本目。\n“風”はどっちに吹くとやろおねぇ？」
2905 = "「那第三輪較量。“風”會往哪邊吹呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「それこそ、勝負は時の運です」
2902 = "「那就叫“盡人事聽天命”了」" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃん風に考えてしまうようなら、\n選挙には決して勝てんけん」
2565 = "「如果這樣想的話，咱們是絕對贏不了選舉的」" 

# 【ハチロク】
# display as 八六
# JP: 「なっ！？　何故ですかっ」
2518 = "「啊？為什麼」" 

# 【日々姫】
# display as 日日姬
# JP: 「選挙に勝てる人間は、風を吹かせる人間だから。\n自分にとっての順風も、相手にとっての逆風も」
2819 = "「能在選舉中取勝的人都是能自己“吹風”的人。不管是對自己的順風還是對對手的逆風」" 

# monologue
# JP: 日々姫の、どこか悲しげな声。
3481 = "日日姬的聲音略顯悲傷。" 

# 【日々姫】
# display as 日日姬
# JP: 「無理矢理にでも、風を吹かせる。\n稀咲先輩は、そうできるよう――準備してるから」
2493 = "「哪怕來硬的也要強行讓風吹起來……稀咲學姐會照這樣準備的」" 

# 【真闇】
# display as 真闇
# JP: 「……双ちゃんが、ポーちゃんの後継、いうんは、\nいくらでも下世話に解釈できる構図やけんねぇ」
