# monologue
# JP: が、その瑕疵も、レイアウト全体の中で見るなら、\n不思議と調和し……良いアクセントとさえも感じる。
2580 = "Nhưng, nếu nhìn những khuyết điểm đó trong tổng thể sa bàn,\\nlại thấy hài hòa đến kỳ lạ……thậm chí còn tạo nên điểm nhấn thú vị."
# 【幼女】
# display as 幼女
# JP: 「ほんとだ。きれいでちかくいのだけじゃなくって、\nいろんなおうちがあるんだねぇ」
2307 = "「Thật kìa. Không chỉ có những ngôi nhà đẹp đẽ vuông vức,\\nmà còn có đủ loại nhà khác nhau nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「壊れた所を大事に直して、剥げた塗装にペンキを塗って。\n本当の町や建物も、このミニチュアもおんなじなの」
1981 = "「Trân trọng sửa chữa những chỗ hỏng hóc, sơn lại những chỗ tróc sơn.\\nThị trấn và những tòa nhà thật, cũng giống hệt như mô hình thu nhỏ này vậy.」"
# monologue
# JP: 穏やかな声、包み込むように暖かな瞳。\n日々姫が、とても大人に見える。
2926 = "Giọng nói ôn tồn, ánh mắt ấm áp như bao bọc lấy vạn vật.\\nHibiki trông thật chững chạc."
# 【日々姫】
# display as 日日姬
# JP: 「いろんな人が、いろんな好きをそれぞれの思う形にして。\nそのいろいろが、時間と共に柔らかく暖かく変わってく」
2024 = "「Nhiều người khác nhau, biến những sở thích khác nhau thành hình hài theo suy nghĩ của riêng họ.\\nNhững sự khác biệt đó, cùng với thời gian sẽ trở nên mềm mại và ấm áp hơn.」"
# 【幼女】
# display as 幼女
# JP: 「きれいでちかくいのだけが、いいんじゃないの？\nばらばらなのは、いろいろだから、おもちろいの？」
1955 = "「Không phải chỉ cần đẹp và vuông vức là tốt sao ạ?\\nKhông đồng đều là vì có nhiều loại khác nhau, nên mới thú vị ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「そうだね。バラバラの方がいろんな素敵を見つけられる。\nそうして、そういう素敵がたくさんたくさん集まって」
2254 = "「Đúng vậy. Không đồng đều thì mới có thể tìm thấy nhiều điều tuyệt vời khác nhau.\\nVà rồi, rất nhiều, rất nhiều những điều tuyệt vời đó tụ họp lại.」"
# 【幼女】
# display as 幼女
# JP: 「きゃあ！」
2031 = "「Kyaa!」"
# monologue
# JP: 日々姫が幼女を抱っこする。\n高い高いをしてもらい、こぼれそうな目がキラキラ輝く。
2857 = "Hibiki bế bổng cô bé lên.\\nĐược bế lên cao, đôi mắt to tròn của cô bé sáng long lanh."
# 【日々姫】
# display as 日日姬
# JP: 「だから――町って素敵なんだよ？」
2192 = "「Vì thế——thị trấn mới tuyệt vời đúng không nào?」"
# 【幼女】
# display as 幼女
# JP: 「うんっ！」
# 2084 = "「嗯！」" 
# monologue
# JP: もちもちとした頬がぷっくら、\nさっきより、ずっと鮮やかなバラ色になる。
2735 = "Đôi má phúng phính phồng lên,\\nửng hồng rực rỡ hơn cả lúc nãy."
# 【幼女】
# display as 幼女
# JP: 「あのね、おねえちゃん！　おうちのえんとつ、\nきちゃなくないの、すてきなのっ！！」
2111 = "「Chị ơi! Ống khói nhà em,\\nkhông bẩn đâu, tuyệt vời lắm!!」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　そうだよね、とっても素敵っ」
2087 = "「Ừm! Đúng vậy, rất tuyệt vời.」"
# monologue
# JP: （バンっ！）
3100 = "（Rầm!）"
# 【凪】
# display as 凪
# JP: 「来たばい！　なんか凄かと！\nゴツいの来たばいっ！！」
1994 = "「Đến rồi! Trông hoành tráng lắm!\\nHàng khủng đến rồi!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「来たのね！」
1993 = "「Đến rồi sao!」"
# monologue
# JP: いきなり飛び込んで来た凪に驚くこともなく、\nポーレットはパっと立ち上がる。
2922 = "Không hề tỏ ra ngạc nhiên trước việc Nagi đột ngột xông vào,\\nPaulette đứng bật dậy."
# 【ポーレット】
# display as 波萊特
# JP: 「あの、みなさん。今から、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;で、\n[だいしゃつけかえ,3]台車付替を行います」
2114 = "「À, mọi người ơi. Từ bây giờ, tại \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;,\\nchúng tôi sẽ tiến hành thay \\x%l台車;#00ffc040;giá chuyển hướng%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！！」
2102 = "「Ồ!!」"
# monologue
# JP: \x%l台車;#00ffc040;台車%l;#;付替とは文字通り、\n車体から古い\x%l台車;#00ffc040;台車%l;#;を外し、新しい\x%l台車;#00ffc040;台車%l;#;に付け替える作業だ。
2894 = "Thay \\x%l台車;#00ffc040;giá chuyển hướng%l;#; đúng như tên gọi của nó,\\nlà tháo \\x%l台車;#00ffc040;giá chuyển hướng%l;#; cũ ra khỏi thân xe và lắp \\x%l台車;#00ffc040;giá chuyển hướng%l;#; mới vào."
# monologue
# JP: それは、つまりは――
3056 = "Điều đó, có nghĩa là——"
# 【れいな】
# display as 玲奈
# JP: 「いよいよですねぇ。\x%l客車;#00ffc040;客車%l;#;さんが」
1695 = "「Cuối cùng cũng đến lúc rồi nhỉ. \\x%l客車;#00ffc040;Toa hành khách%l;#; nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、新生へと大きく近づく」
2092 = "「Ừ, tiến một bước lớn tới sự tái sinh.」"
# 【ポーレット】
# display as 波萊特
# JP: 「関係者全員、見学に行きますので、\nレールショップを、三十分ほどの間、閉めます」
2299 = "「Tất cả những người liên quan sẽ đi tham quan,\\nnên Rail Shop sẽ đóng cửa trong khoảng ba mươi phút.」"
# monologue
# JP: 少し前までのポーレットならありえなかった、\n大きな声と、有無をいわせぬ決断と。
2563 = "Một giọng nói dõng dạc và quyết đoán không cho phép từ chối,\\nđiều không thể tưởng tượng được ở Paulette trước đây."
# monologue
# JP: が、締め出されることになったお客様たちは、\nみんなわくわくした表情で、続く言葉を待っている。
2578 = "Nhưng những vị khách bị mời ra ngoài,\\nai nấy đều mang vẻ mặt háo hức, chờ đợi những lời tiếp theo."
# 【ポーレット】
# display as 波萊特
# JP: 「ですので、よろしければ。\nみなさまも、\x%l台車;#00ffc040;台車%l;#;付替を見にいらしてください！」
2196 = "「Vì vậy, nếu mọi người không phiền.\\nXin mời mọi người cũng đến xem quá trình thay \\x%l台車;#00ffc040;giá chuyển hướng%l;#; nhé!」"
# monologue
# JP: わ、っと歓声。\nお客様たちはぞろぞろと、レールショップの外に出て行く。
2586 = "Tiếng reo hò ồ lên.\\nKhách hàng lũ lượt kéo nhau ra khỏi Rail Shop."
# monologue
# JP: さっきの幼女は……ああ、ご家族と一緒なのか。\n日々姫に向かってにこにこ手を振り、外へと向かう。
2636 = "Cô bé lúc nãy……à, đi cùng gia đình sao.\\nCô bé tươi cười vẫy tay với Hibiki rồi hướng ra ngoài."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、行きましょ？」
2044 = "「Anh trai, mình đi thôi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2083 = "「嗯」" 
# monologue
# JP: 日々姫とふたり外に出る。
2775 = "Tôi cùng Hibiki bước ra ngoài."
# 【双鉄】
# display as 雙鐵
# JP: 「おうっ！？」
2048 = "「Ô!?」"
# monologue
# JP: 途端に妙な声が出る。
2638 = "Tôi bất chợt thốt lên một âm thanh kỳ quặc."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、この人の数は」
2153 = "「Gì thế này, đông người quá vậy.」"
# monologue
# JP: 凪が言うところの『ゴツいの』が来た、\nそれに釣られてのことなのだろうか。
3067 = "\"Hàng khủng\" mà Nagi nói đã đến,\\nchắc là bị thu hút bởi cái đó sao."
# monologue
# JP: レールショップをさっき出た人たちをも上回る人だかりが、\n\x%l石造機関庫;#00ffc040;石造機関庫%l;#;目指し、整然と移動している。
2815 = "Một đám đông còn đông hơn cả những người vừa rời khỏi Rail Shop,\\nđang di chuyển một cách trật tự hướng về \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
2216 = "「Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2083 = "「嗯」" 
# monologue
# JP: だから、自然と手をつなぐ。\nはぐれたところで、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;ですぐに再会できようが。
2801 = "Thế nên, tôi tự nhiên nắm lấy tay em ấy.\\nDù có lạc nhau thì cũng sẽ sớm gặp lại ở \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#; thôi."
# monologue
# JP: それでもやっぱり――はぐれないよう。
2593 = "Dù vậy, tôi vẫn không muốn——chúng tôi bị lạc mất nhau."
# 【真闇】
# display as 真闇
# JP: 「ああ、この線より近ぉに寄ったらいけんよぉ」
2065 = "「A, không được tiến lại gần quá vạch này đâu nha.」"
# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;の中央付近。\n二台の\x%l客車;#00ffc040;客車%l;#;が寄り添うように並べられている。
72 = "Gần trung tâm \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;.\\nHai \\x%l客車;#00ffc040;toa hành khách%l;#; được xếp cạnh nhau như đang tựa vào nhau."
# monologue
# JP: 一台は、煙が入ってきてしまうもの。\nもう一台は――
2613 = "Một toa là toa bị lọt khói vào.\\nToa còn lại là——"
# 【日々姫】
# display as 日日姬
# JP: 「うわ……結構――これ、感動」
2074 = "「Oa……khá là——cảm động đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
2249 = "「Đúng vậy nhỉ.」"
# monologue
# JP: [ちちぶ,2]知知武鉄道から譲渡され、\nつい先日まで、塗装だなんだを施されていた\x%l客車;#00ffc040;客車%l;#;。
2897 = "\\x%l客車;#00ffc040;Toa hành khách%l;#; được chuyển nhượng từ Đường sắt Chichibu,\\nvừa mới được sơn phết lại vài ngày trước."
# monologue
# JP: その全容を目のあたりにするのは、\n日々姫も僕も初めてだ。
2850 = "Cả tôi và Hibiki đều là lần đầu tiên\\nđược tận mắt chiêm ngưỡng toàn bộ diện mạo của nó."
# 【双鉄】
# display as 雙鐵
# JP: 「デザイン画でも\x%lNゲージ;#00ffc040;Nゲージ%l;#;でも目にしていたが。\n実車となると……やはり、迫力が段違いだ」
2412 = "「Dù đã thấy trên bản vẽ thiết kế hay \\x%lNゲージ;#00ffc040;N-gauge%l;#;.\\nNhưng khi nhìn toa xe thật……sức hút quả là khác biệt hoàn toàn.」"
# 【日々姫】
# display as 日日姬
# JP: 「……ぴかぴかで、まるで新車みたい。\nここまで綺麗に塗ってもらえるだなんて――」
1728 = "「……Sáng bóng, cứ như xe mới vậy.\\nKhông ngờ lại được sơn đẹp đến thế này——」"
# 【双鉄】
# display as 雙鐵
# JP: 「さすが、御一夜の職人だな。\n鉄道車体の塗装など、恐らくは初めての経験だろうに」
2301 = "「Quả không hổ danh là nghệ nhân của Ohimitera.\\nDù có lẽ đây là lần đầu tiên họ sơn thân xe đường sắt.」"
# monologue
# JP: 日々姫がこだわった金のライン。\n直線部分も曲線部分も、生きているようになめらかだ。
2854 = "Đường viền vàng kim mà Hibiki đã dày công chăm chút.\\nCả phần đường thẳng lẫn đường cong đều mềm mại như đang sống."
# monologue
# JP: 茶色の車体と融け合うようで、\n懐かしい落ち着きと高級感とを、ごく穏やかに伝えてくる。
2720 = "Như hòa quyện vào thân xe màu nâu,\\ntruyền tải một cảm giác hoài niệm, điềm tĩnh và sang trọng một cách vô cùng nhẹ nhàng."
# 【日々姫】
# display as 日日姬
# JP: 「ただ塗ってるんじゃないです、兄さん。\nモール部分、盛り上がってますから」
2379 = "「Không chỉ là sơn đâu anh trai.\\nPhần đường viền còn được đắp nổi lên nữa kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、言われてみれば――確かにだな」
1992 = "「À, em nói mới để ý——đúng thật.」"
# monologue
# JP: 金属か何かで線を引き、その上から塗装をしたか……\nあるいはメッキした金属でライン装飾をしたのだろうか？
2939 = "Dùng kim loại hay thứ gì đó kẻ viền, rồi sơn đè lên sao……\\nHay là dùng kim loại mạ để trang trí đường viền nhỉ?"
# monologue
# JP: 出来ることなら、近くに寄って見てみたいのだが――
2709 = "Nếu được, tôi rất muốn tiến lại gần để xem thử——"
# 【真闇】
# display as 真闇
# JP: 「\x%l客車;#00ffc040;客車%l;#;ばこれからもちあがるけん、\n転がっちゃったらぺしゃんこたい！」
2289 = "「\\x%l客車;#00ffc040;Toa hành khách%l;#; chuẩn bị được nâng lên rồi,\\nnếu lỡ lật thì sẽ bị đè bẹp dí đó!」"
# 【幼女】
# display as 幼女
# JP: 「きゃあ！」
# 2031 = "「哇啊！」" 
# monologue
# JP: ――真闇姉が規制線を敷き、\n子供相手に注意することで、全体に統制をかけている。
1682 = "――Chị Mayami chăng dây cảnh báo,\\nnhắc nhở bọn trẻ để kiểm soát toàn bộ khu vực."
# monologue
# JP: 身内の僕らが、\nその範を崩してしまってはどうしようも無い。
3045 = "Người nhà như chúng tôi,\\nmà lại phá vỡ quy tắc đó thì còn ra thể thống gì nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、あとでじっくり見せてもらおう」
2052 = "「Thôi, để lát nữa xem kỹ lại sau vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「ですね。\n私たち、この\x%l客車;#00ffc040;客車%l;#;ともずっと付き合っていくんですから」
2245 = "「Vâng.\\nVì chúng ta sẽ còn gắn bó với \\x%l客車;#00ffc040;toa hành khách%l;#; này dài dài mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな――っと」
2075 = "「Đúng vậy——ơ.」"
# monologue
# JP: ハチロクが\x%l客車;#00ffc040;客車%l;#;に近づいてくる。
2609 = "Hachiroku tiến lại gần \\x%l客車;#00ffc040;toa hành khách%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「こちらです。取付け、慎重に願います」
2133 = "「Bên này ạ. Xin hãy lắp đặt thật cẩn thận.」"
# monologue
# JP: 目線も声も僕らに向かない。\n何かを先導しているよう――
2690 = "Cả ánh mắt và giọng nói đều không hướng về phía chúng tôi.\\nNhư thể đang dẫn đường cho thứ gì đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「おおっ！」
2101 = "「Ồ!」"
# 【日々姫】
# display as 日日姬
# JP: 「わ――おっきい」
2029 = "「Oa——to quá.」"
# monologue
# JP: なるほど、凪のいったとおりに、\nこれは確かに“凄かと”だ。
2645 = "Ra là vậy, đúng như Nagi nói,\\ncái này quả thực \"rất khủng\"."
# monologue
# JP: ハチロクはおろか、僕の身長よりも大きい油圧ジャッキが、\n旧\x%l客車;#00ffc040;客車%l;#;の左右側面に二台ずつ、手早く取付けられていく。
2604 = "Những chiếc kích thủy lực to hơn cả Hachiroku, thậm chí còn cao hơn cả tôi,\\nđược lắp đặt nhanh chóng vào hai bên hông của \\x%l客車;#00ffc040;toa hành khách%l;#; cũ, mỗi bên hai chiếc."
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ……選挙は……\nいや、選挙のみならず、世の中は概ね、人と金、か」
2050 = "「Ưm……bầu cử là……\\nkhông, không chỉ bầu cử, mà trên đời này nói chung, đều xoay quanh con người và tiền bạc nhỉ.」"
# monologue
# JP: 毛利の姫様からの[バンス,1]前金と、\n赤井宮司とポーレットが持つ、人脈と。
2908 = "Tiền ứng trước từ Denshahime của Mouri,\\nvà mạng lưới quan hệ của Đền chủ Akai cùng Paulette."
# monologue
# JP: そのいずれかが欠けてしまえば、\n準備も作業も、これほどスムーズには進捗しなかったろう。
3022 = "Nếu thiếu đi bất kỳ yếu tố nào,\\nthì quá trình chuẩn bị và thi công chắc chắn sẽ không thể diễn ra suôn sẻ đến thế."
# 【ハチロク】
# display as 八六
# JP: 「全てよしです！　お願いします！！」
2006 = "「Tất cả đã ổn thỏa! Nhờ mọi người ạ!!」"
# monologue
# JP: ジャッキがゆっくり持ち上がり、\nそれにつられて、車体も当然、持ち上がっていく。
2641 = "Những chiếc kích từ từ nâng lên,\\nvà dĩ nhiên, thân xe cũng được nâng lên theo."
# monologue
# JP: 理屈でいえば、本当に当然で単純なのだが――
2648 = "Về mặt lý thuyết thì đúng là hiển nhiên và đơn giản nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「これは……圧巻だな」
2375 = "「Cảnh này……thật choáng ngợp.」"
# monologue
# JP: 鉄道車輌がいかに巨大か、\nこうして見るとまざまざ感じる。
3072 = "Toa xe đường sắt khổng lồ đến nhường nào,\\nnhìn thế này mới cảm nhận được rõ ràng."
# monologue
# JP: これを引っ張り、運転するのだ。\nブレーキ位置だってなんだって、変化をするに決まってる。
2635 = "Kéo theo thứ này và lái đi.\\nVị trí phanh hay bất cứ thứ gì khác chắc chắn cũng sẽ thay đổi."
# 【日々姫】
# display as 日日姬
# JP: 「あの、兄さん！　わたし、別の角度から見てきます！」
2390 = "「À, anh trai! Em ra góc khác xem đây!」"
# monologue
# JP: 絵描きとしての血が騒ぐのか、\n僕の返事を待とうともせず、日々姫は走りだしてしまう。
2796 = "Chắc là máu họa sĩ đang sục sôi,\\nchẳng đợi tôi trả lời, Hibiki đã chạy vọt đi."
# monologue
# JP: が、置き去りにされた寂しさなどは感じない。\nそれよりなにより、今は\x%l台車;#00ffc040;台車%l;#;の更新だ――っと！？
2576 = "Nhưng, tôi không hề cảm thấy cô đơn vì bị bỏ lại.\\nHơn hết thảy, lúc này điều quan trọng nhất là việc thay mới \\x%l台車;#00ffc040;giá chuyển hướng%l;#;——ơ!?"
# 【稀咲】
# display as ？？？
# JP: 「ああ、すみません」
2069 = "「A, xin lỗi.」"
# monologue
# JP: いかん。誰かとぶつかった。
2564 = "Tiêu rồi. Va phải ai đó mất rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「いえ、こちらこそボーっとして――む」
1973 = "「Không, là tôi lơ đễnh mới đúng——ưm.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ」
# 2054 = "「啊」" 
# monologue
# JP: 宝生稀咲だ。
2889 = "Houshou Kisaki."
# monologue
# JP: 何故ここに――
2692 = "Tại sao cô ta lại ở đây——"
# 【稀咲】
# display as 稀咲
# JP: 「やぁ、双鉄。大したものだね」
2027 = "「Chào, Soutetsu. Tuyệt vời lắm.」"
# monologue
# JP: ――疑問が形になるより早く、稀咲に機先を制される。\nが、大したものと言われれば、それは素直に嬉しく感じる。
1681 = "――Trước khi tôi kịp đặt câu hỏi, Kisaki đã lên tiếng trước.\\nNhưng được khen là tuyệt vời, tôi thực sự cảm thấy vui mừng."
# monologue
# JP: 対立候補であるとはいえど……\nいや、そうであるからなおさらなのか。
3075 = "Dù là ứng cử viên đối lập……\\nKhông, chính vì vậy nên tôi mới càng vui chăng."
# 【双鉄】
# display as 雙鐵
# JP: 「良い車輌だろう。\n[ちちぶ,2]知知武鉄道で活躍していたものだそうだ」
2376 = "「Toa xe tốt nhỉ.\\nNghe nói nó từng hoạt động trên tuyến Đường sắt Chichibu đấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああいや、車輌とかそういう話ではなくて」
2060 = "「À không, tôi không nói về toa xe hay mấy chuyện đó.」"
# monologue
# JP: 苦笑して。\n稀咲がくるり、体ごと全部で僕を向く。
2698 = "Cười khổ.\\nKisaki xoay người, quay hẳn về phía tôi."
# 【稀咲】
# display as 稀咲
# JP: 「ボクは、日々姫のことを\n『大したものだ』といったんだよ」
2169 = "「Tôi đang nói Hibiki\\n『tuyệt vời lắm』 kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2046 = "「Ồ.」"
# 【稀咲】
# display as 稀咲
# JP: 「だってそうだろう？　\n鉄道になど、誰も興味をもっていなかったというのに」
2420 = "「Chẳng phải vậy sao? \\nTrong khi trước đây chẳng ai thèm đoái hoài đến đường sắt cả.」"
# monologue
# JP: 稀咲が右手を大きく広げる。\nその向こうには、人、人、人。笑顔と歓声。
2983 = "Kisaki dang rộng tay phải.\\nPhía bên kia là người, người, người. Những nụ cười và tiếng reo hò."
# monologue
# JP: ひと月前と比較するなら、確かに、夢のような大盛況だ。\nそれはもちろん、日々姫一人の力ではないが――
2660 = "Nếu so với một tháng trước, thì quả thực đây là một sự kiện hoành tráng như mơ.\\nTất nhiên, đó không chỉ là công sức của một mình Hibiki——"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2350 = "「Cảm ơn cô.」"
# monologue
# JP: 対立候補の稀咲がそれを、日々姫の力と認めてくれた。\nそれが素直に誇らしく、頭が自然と下がっている。
2989 = "Ứng cử viên đối lập là Kisaki đã công nhận điều đó là sức mạnh của Hibiki.\\nĐiều đó khiến tôi thực sự tự hào, và tự nhiên cúi đầu cảm ơn."
# 【稀咲】
# display as 稀咲
# JP: 「真実を言ったまでのことさ。\nもっとも――」
2160 = "「Tôi chỉ nói sự thật thôi.\\nNhưng mà——」"
# monologue
# JP: 稀咲の目。\nにこやかなのに鋭い瞳が、数秒、僕の上で止まる。
2987 = "Ánh mắt Kisaki.\\nĐôi mắt mỉm cười nhưng đầy sắc sảo dừng lại trên người tôi vài giây."
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
2097 = "「Hử?」"
# 【稀咲】
# display as 稀咲
# JP: 「日々姫の力を伸ばした存在。それをボクは――\n少しばかり安く見積もりすぎてしまったかな」
2223 = "「Người đã giúp Hibiki phát huy sức mạnh. Tôi đã——\\ncó lẽ đã đánh giá người đó hơi thấp thì phải.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは」
2371 = "「Đó là.」"
# 【稀咲】
# display as 稀咲
# JP: 「ああいや、こっちの話。\nそれも、“今さら”っていう類の話さ」
2062 = "「À không, chuyện của tôi thôi.\\nMà cũng là chuyện \"giờ nói cũng muộn\" rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう、なのか」
2251 = "「Vậy, sao.」"
# monologue
# JP: 稀咲でも、後悔をする――\n他人にそれを、覗かせてしまうことさえもある。
2981 = "Ngay cả Kisaki cũng có lúc hối hận——\\nthậm chí còn để người khác nhìn thấu điều đó."
# monologue
# JP: それが意外で。意外と感じたことが失礼なような気もして、\n一瞬、言葉を失くしてしまう。
3050 = "Điều đó thật bất ngờ. Cảm thấy bất ngờ dường như cũng là một sự thất lễ,\\nkhiến tôi thoáng chốc không nói nên lời."
# 【稀咲】
# display as 稀咲
# JP: 「そんなことより、日々姫はどこだい？\n今日は、日々姫に話があってやってきたんだ」
1961 = "「Bỏ qua chuyện đó đi, Hibiki đâu rồi?\\nHôm nay tôi đến đây là có chuyện muốn nói với em ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫なら」
2221 = "「Hibiki thì.」"
# 【稀咲】
# display as 稀咲
# JP: 「なんとまぁ。市長候補とは思えない姿だね」
2303 = "「Trời ạ. Trông chẳng giống dáng vẻ của một ứng cử viên thị trưởng chút nào.」"
# monologue
# JP: べたりと、日々姫は頬をほとんど床につけている。
2872 = "Hibiki gần như áp sát má xuống sàn nhà."
# monologue
# JP: ジャッキが車体を持ち上げている――\nそれを下から見上げる形で、スケッチしているようだ。
2861 = "Kích thủy lực đang nâng thân xe lên——\\nEm ấy đang vẽ phác thảo từ góc nhìn hất lên từ dưới gầm xe."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、日々姫らしい姿ではある」
1972 = "「Nhưng, đó mới đúng là phong cách của Hibiki.」"
# 【稀咲】
# display as 稀咲
# JP: 「確かにね」
2320 = "「Cũng đúng nhỉ.」"
# monologue
# JP: 日々姫に近づき、稀咲を見れば、\n“構わないさ”と言わんばかりの笑顔と頷き。
2791 = "Tiến lại gần Hibiki, nhìn sang Kisaki,\\ncô ấy mỉm cười và gật đầu như muốn nói \"Không sao đâu\"."
# monologue
# JP: だから、待つ。\n日々姫のペンの動きが止まり、満足の息が吐かれるまで。
3061 = "Thế nên, tôi đợi.\\nCho đến khi nét bút của Hibiki dừng lại và em ấy thở ra một hơi mãn nguyện."
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 2084 = "「嗯！」" 
# 【稀咲】
# display as 稀咲
# JP: 「日々姫、少しいいかな」
2226 = "「Hibiki, có rảnh một chút không?」"
# monologue
# JP: 稀咲の声に周囲の視線が集まり、\nそれはすぐさま、ざわめきになって広がっていく。
3015 = "Giọng nói của Kisaki thu hút ánh nhìn của mọi người xung quanh,\\nvà ngay lập tức, tiếng xì xào bàn tán lan rộng."
# monologue
# JP: すぐさま動揺を押し殺し、\n日々姫は慌てず立ち上がる。
2883 = "Nhanh chóng kìm nén sự bối rối,\\nHibiki bình tĩnh đứng dậy."
# monologue
# JP: その様子を見て、ホっとしたような空気が広がる。\nこの“場”ははっきり、日々姫に味方してくれている。
2944 = "Nhìn thấy bộ dạng đó, bầu không khí nhẹ nhõm lan tỏa.\\n\"Nơi này\" rõ ràng đang đứng về phía Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「それで、宝生候補。\n私に、何かご用でしょうか？」
2401 = "「Vậy, ứng cử viên Houshou.\\nCô tìm tôi có việc gì không?」"
# 【稀咲】
# display as 稀咲
# JP: 「討論会のお誘いに来た。\n急な話だが、スケジュールの都合がつけば、どうかな？」
2167 = "「Tôi đến để mời em tham gia buổi tranh luận.\\nTuy hơi gấp, nhưng nếu sắp xếp được lịch trình, em thấy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「討論会？」
2356 = "「Tranh luận?」"
# 【稀咲】
# display as 稀咲
# JP: 「候補者同士、直接に語り合うのも良いかと思って。\nテーマは『御一夜の経済再生への展望』でどうかな？」
2178 = "「Tôi nghĩ các ứng cử viên nên có một buổi trò chuyện trực tiếp với nhau.\\nChủ đề là 『Triển vọng phục hồi kinh tế Ohimitera』 thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは」
2370 = "「Chuyện đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん」
2042 = "「Anh trai.」"
# monologue
# JP: 稀咲の本業そのものとマッチしたテーマ。\nこのまま行けば、日々姫が勝てそうな選挙情勢。
2553 = "Một chủ đề hoàn toàn trùng khớp với chuyên môn của Kisaki.\\nTrong khi tình hình bầu cử hiện tại đang nghiêng phần thắng về phía Hibiki."
# monologue
# JP: 自分の土俵に引きずり込んでの逆転を、\nその意図を隠そうともせず、稀咲は目論み、仕掛けている。
2984 = "Kéo đối thủ vào sân nhà của mình để lật ngược thế cờ,\\nKisaki đang toan tính và giăng bẫy mà chẳng thèm che giấu ý đồ đó."
# 【日々姫】
# display as 日日姬
# JP: 「私は、この討論会のお誘い。\nお受けしたいと思います」
2171 = "「Tôi muốn nhận lời mời tham gia buổi tranh luận này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2251 = "「是嗎」" 
# monologue
# JP: 僕よりよほど、稀咲のことを知っている。\nそれがわからぬ日々姫では無い。
2864 = "Em ấy hiểu rõ Kisaki hơn tôi nhiều.\\nHibiki không thể nào không nhận ra điều đó."
# monologue
# JP: その上で――日々姫は怖じずに即答している。\nならば僕は、日々姫の決断を支えるのみだ。
3013 = "Dù vậy——Hibiki vẫn trả lời ngay lập tức mà không hề sợ hãi.\\nNếu đã thế, tôi chỉ việc ủng hộ quyết định của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「スケジュールの調整を選対本部長に頼んでこよう。\n宝生候補。希望の日時は？」
2227 = "「Tôi sẽ nhờ Trưởng ban Bầu cử sắp xếp lịch trình.\\nỨng cử viên Houshou. Cô muốn tổ chức vào ngày giờ nào?」"
# 【稀咲】
# display as 稀咲
# JP: 「しあさって――投票日の三日前。\n午後五時からでどうだろう」
2116 = "「Ngày kìa——ba ngày trước ngày bỏ phiếu.\\nTừ 5 giờ chiều thì sao?」"
# monologue
# JP: 迷いなく、日々姫が頷く。
2866 = "Không chút do dự, Hibiki gật đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。確認してこよう」
2177 = "「Tôi hiểu rồi. Tôi sẽ đi xác nhận lại.」"
# monologue
# JP: 確認ではなく、説得になる。\n真闇姉は反対すると、半ば以上は覚悟している。
2616 = "Không phải xác nhận, mà là thuyết phục.\\nTôi đã chuẩn bị tinh thần hơn một nửa rằng chị Mayami sẽ phản đối."
# monologue
# JP: この討論会、当選確率の面から見れば、\nデメリットの方が圧倒的に高かろうから。
2761 = "Buổi tranh luận này, nếu xét từ góc độ tỷ lệ trúng cử,\\nthì bất lợi chắc chắn sẽ áp đảo."
# monologue
# JP: （だが――）
3092 = "（Nhưng mà——）"
# monologue
# JP: メリットは、ある。\n僕にははっきり、見えている。
2708 = "Vẫn có lợi ích.\\nTôi có thể nhìn thấy rất rõ ràng."
# monologue
# JP: だから。
2798 = "Chính vì vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、少しいいかな」
2312 = "「Chị Mayami, có rảnh một chút không?」"
# 【真闇】
# display as 真闇
# JP: 「もちろん。\nこっちも話したいことあるけんねぇ」
2292 = "「Tất nhiên rồi.\nChị cũng có chuyện muốn nói với em mà.」"
# monologue
# JP: にこやかに、ごくさりげなく、\n真闇姉が立ち上がり、僕を先導し歩き始める。
2952 = "Mỉm cười, một cách hết sức tự nhiên,\nchị Mayami đứng dậy và bước đi dẫn đường cho tôi."
# monologue
# JP: 他人の耳が及ばぬ場所へ――\nならばやはり、討論会には反対なのだろう。
2810 = "Tới một nơi không có ai nghe thấy――\nNếu vậy thì quả nhiên, chị ấy phản đối cuộc tranh luận này rồi."
# monologue
# JP: （日々姫、待っていてくれ。\n僕もお前に追いつくぞ）
3099 = "（Hibiki, đợi anh nhé.\nAnh cũng sẽ đuổi kịp em thôi）"
# monologue
# JP: だから、初めて反論しよう。\n真闇姉に抗ってでも、日々姫の希望を通してやろう。
3062 = "Vì vậy, tôi sẽ phản bác lần đầu tiên.\nDù có phải chống lại chị Mayami, tôi cũng sẽ để mong muốn của Hibiki được thông qua."
# monologue
# JP: 日々姫の望む未来の姿は、\n僕の目にももう、姿を見せてくれているから。
