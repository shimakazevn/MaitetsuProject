2415 = "「Nếu là Sou-chan thì sẽ ở trên 8620 đúng không?\\nThứ anh nhìn thấy sẽ không phải là khung cảnh ngoài cửa sổ toa tàu, mà là khung cảnh từ buồng lái cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2045 = "「À.」"
# monologue
# JP: 目から鱗が落ちた気がする。
2778 = "Tôi như bừng tỉnh ngộ."
# 【双鉄】
# display as 雙鐵
