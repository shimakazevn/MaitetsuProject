# monologue
# JP: デートとは、\n一体どういう行為なのかと。
3003 = "約會，到底是怎樣的一種行為。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、つまらぬことだ。\nどうでもよいことが引っかかること、あるだろう？」
1971 = "「不過這事挺無聊的。你不也有心裡被一些無所謂的事情給吊著的時候嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「それは……そうですけど」
2369 = "「這……倒是有」" 

# monologue
# JP: “ナイショなんだ”、と呟いて、\n日々姫はプっ、と、わずかに頬をふくらせる。
1691 = "“對我保密啊”——她這麼嘟囔著，臉頰微微氣呼呼地鼓起。" 

# monologue
# JP: が――デート云々などを言ってしまえば、\nきっと日々姫をも、僕の混乱に巻き込んでしまう。
2574 = "不過——要是我老實說出“約會”一類的話，日日姬肯定也會被捲進我現在感到的混亂裡來的。" 

# 【日々姫】
# display as 日日姬
# JP: 「とにかく、考え事して歩くのとか、危ないですよ。\nつまづいちゃいます――ちっちゃな頃の私みたいに」
2327 = "「總之邊想事邊走可是很危險的。會絆倒的——就像我小時候那樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2083 = "「嗯」" 

# monologue
# JP: その一言で、胸がスウっと軽くなる。
2706 = "她這麼一說，我心裡一下子感覺輕鬆多了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな。日々姫とふたりで出かけるのなど、\n珍しくもなんとも無いことだった」
2242 = "「是啊。和日日姬一起出去都不是什麼稀奇事」" 

# 【日々姫】
# display as 日日姬
# JP: 「ちっちゃかったころには、ですけどね？」
1970 = "「不過只限於小時候就是了」" 

# monologue
# JP: 甘えたような、皮肉を交えたような声。
2687 = "她撒嬌的語氣裡略帶點嘲諷。" 

# monologue
# JP: 不意に日々姫は振り返り、とことこと――\n僕の顔を見ながら、歩調を合わせて後ろ歩きする。
2768 = "忽然日日姬回過頭，快步走到我面前——一邊仔細地盯著我的臉，一邊配合著我的步調背身走了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おい、危ないぞ」
2073 = "「喂，這樣很危險的」" 

# 【日々姫】
# display as 日日姬
# JP: 「平気です！\n危なくなったら、兄さんが助けてくれますから」
2276 = "「沒事的！要是遇到危險哥哥你會來救我的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだが」
2414 = "「雖說是那樣」" 

# monologue
# JP: 無論、その場合には即座の対処ができるよう、\n大きく一歩、日々姫に近づく。
2787 = "我為了在遇到危險的時候能馬上做出反應，向日日姬的方向跨了一大步。" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへっ、ちっちゃな頃とおんなじですね」
2035 = "「哎嘿嘿，和小時候一樣呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうだったな」
2079 = "「嗯……是這樣」" 

# monologue
# JP: 思い出す。あの頃から日々姫はおそらく、\n“絵描きの目"をしていたのだろう。\n2776 = "我回想起來，那時候開始日日姬恐怕就有了這種“畫師的雙眼”了吧。" \n\n# monologue\n# JP: あちこちよそ見ばかりして、\n足元ときたら、危なっかしくて仕方なかった。\n3008 = "總是左顧右盼，腳下常常危險得不得了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「今日は、よそ見をしないんだな」\n1978 = "「今天你倒是不左顧右盼了啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「するわけないです。\n一番見たいもの、目の前にあるんですから」\n2201 = "「才不會這樣了呢。因為我最想看的東西就在我眼前了嘛」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうなのか？」\n2252 = "「是嗎？」" \n\n# monologue\n# JP: ならば……必要ないかもしれん。\nが――不要であろうとそうしたいので、聞いてみる。\n3054 = "那……說不定就沒這個必要了。不過——就算沒必要我也想這麼做，還是問問看吧。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「手、つなぐか？\nちっちゃな頃とおんなじに」\n2345 = "「要拉著手嗎？就像小時候那樣」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ！」\n# 2084 = "「嗯！」" \n\n# monologue\n# JP: つないだ瞬間、ほっとする。\n2811 = "拉上手的瞬間，我安心多了。" \n\n# monologue\n# JP: これが一番自然なのだと、\n体と心が一つになって理解する。\n2786 = "我整個身心都深深體會到，這樣才是最自然的。" \n\n# monologue\n# JP: （ああ、そうだな。これでいいんだ）\n3095 = "（啊，就是這樣，這樣就好了）" \n\n# monologue\n# JP: デートだなんだの、つまらんことが、\n夜の空気に溶かされていく。\n3058 = "那些約會之類的無聊的事情漸漸溶散在了黑夜的空氣裡。" \n\n# monologue\n# JP: 遠く、さらさらと川の流れていく音が、\nあの頃と今を、静かに密かにつなげてくれる。\n2762 = "從遠方傳來河水“嘩啦啦”流動的聲音，它靜悄悄地將那個時候和現在聯繫在一起。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「……兄さんの手、おっきく硬くなりましたね」\n1717 = "「……哥哥的手變大了，也變結實了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫の手は、相変わらずやわらかで小さいな」\n2220 = "「日日姬的手和以前一樣，又柔軟又嬌小」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わたしの手だって、\nもちろん大きくなってるんですけど」\n2173 = "「我的手當然也變大了一點啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だな」\n2387 = "「那也是啊」" \n\n# monologue\n# JP: 夜だからなのだろうか？\nそれとも日々姫も、こんな気持ちでいるからだろうか。\n2890 = "是黑夜的緣故嗎？還是因為日日姬的心情也和我一樣？" \n\n# monologue\n# JP: 日々姫の手は汗ばまず、異常な熱を帯びもせず、\nさらさらと、心地よく僕の手のひらと結ばれている。\n2869 = "日日姬的手沒出什麼汗，也沒有散發著異樣的熱度，牽在手裡的感覺很乾爽，令我感覺很舒適。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「市長になったら」\n2120 = "「如果你當了市長」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん」\n# 2083 = "「嗯」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫は御一夜を、どんな町へと育てたいんだ？」\n2218 = "「日日姬想把御一夜發展成一個怎樣的城市呢？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「育てるなんて大それたことは、\nまだ全然考えられないんですけど」\n2189 = "「我還沒想得這麼遠呢」" \n\n# monologue\n# JP: ほんのり、日々姫の口の端がゆるむ。\n2853 = "日日姬微微勾起嘴角。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「“みんな”だなんて考えちゃうとわからなくなるから、\n私にとって、理想の御一夜を作りたいって思います」\n1949 = "「一想到“大家”我就腦袋裡一片空白了，所以我現在只是想把御一夜弄成我理想中的樣子」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それはいいな」\n2386 = "「那也挺好的」" \n\n# monologue\n# JP: 範囲を広く、そして多くと捉え、\nその全てを満足させることができれば、理想的だ。\n3040 = "讓更多的地方，更多的人都感到滿足，這當然是十分理想的。" \n\n# monologue\n# JP: だが、そんな芸当が出来る人間がもしもいるなら、\n世界はもっと、平和で平等になっているのではなかろうか。\n2579 = "不過，要是有能做得到這種事的人，那世界早就應該更和平、更平等了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「では、質問を改めよう。\n日々姫の理想の御一夜は、どんな町なのだ？」\n2396 = "「那我就換個問題吧。日日姬理想中的御一夜是一個怎麼樣的城市呢？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「兄さんが――」\n2041 = "「哥哥——」" \n\n# monologue\n# JP: きゅっと、日々姫の手に力がこもる。\n2876 = "日日姬突然緊緊地握住了我的手。" \n\n# monologue\n# JP: 待っても待っても言葉の続きが出てこないから、\nできるかぎりに静かな声で、問いかけてみる。\n2652 = "可不管怎麼等她都不繼續說下去，於是我便儘量用平靜的聲音問道：" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕が？」\n2190 = "「我？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「……兄さんが、帝都に帰りたくなくなる町。\nずっと暮らしたくなる御一夜が、私の理想の御一夜です」\n1723 = "「……讓哥哥不想再回帝都的城市，讓你想一直住下去的御一夜就是我理想中的御一夜」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうか――」\n2250 = "「是嗎——」" \n\n# monologue\n# JP: そこまで、考えが及んでなかった。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致計画を撤回させたそのとき。\n2794 = "我還沒有想得那麼遠。到了\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠引進計劃成功撤回的時候——" \n\n# monologue\n# JP: 完全に自由になった僕は果たして、\nどんな暮らしを、その先に望んでいくのだろうか？\n2723 = "完全自由了的我接下來到底會想過什麼樣的生活呢？" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕は――」\n2157 = "「我——」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ」\n2054 = "「啊」" \n\n# monologue\n# JP: 気づけば、蓑笠鍛冶店前だ。\nそんなに長く歩いた感じもしなかったが――\n2664 = "回過神來，我們已經走到蓑笠鍛冶店門前了。感覺我們並沒有走了那麼遠的樣子——" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「本当に、あっという間についちゃいましたね」\n2310 = "「真的是一眨眼就到了呢」" \n\n# monologue\n# JP: 少し不満げにそう言って、\n上目遣いで、吐息のような声を出す。\n2694 = "她略帶不滿地說道，然後往上翻了翻眼珠嘆了口氣。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「……ね、兄さん。\nこのまま、もう少し散歩しません？」\n1722 = "「……話說，哥哥。我們要不就這樣繼續散步一會吧？」" \n\n# monologue\n# JP: どくんと、脈動。\nつながっている日々姫の手が、じわりと少し、熱くなる。\n2808 = "手中感到一陣強烈的搏動。我手心裡的日日姬的手感覺開始微微發燙了。" \n\n# monologue\n# JP: いや、どうだ？\n僕の脈動と僕の体温だったような気もする。\n2581 = "不，誰知道呢？又感覺這其實是我的搏動，我的體溫。" \n\n# monologue\n# JP: （が、同じだな。\n鼓動が、熱が――日々姫のものでも、僕のものでも）\n3093 = "（不過，都一樣。這脈動和熱度既是我的也是日日姬的——）" \n\n# monologue\n# JP: だから、ゆっくり。\n繋がっている手をほどく。\n2805 = "所以，我緩緩鬆開了牽著的手。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうもいくまい。もう夜だ。\n遅くなっての来訪は、蓑笠さんにもご迷惑だろう」\n1959 = "「不行，已經是夜裡了。要是再晚的話也會給蓑笠先生添麻煩的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「……そうですね」\n1710 = "「……也是呢」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だからな、日々姫」\n2193 = "「所以啊，日日姬」" \n\n# monologue\n# JP: 俯こうとした額に手をあて、\n少し持ち上げて視線をあわせる。\n2789 = "我用手按住她剛想低下去的額頭，微微抬起，看著她的眼睛。" \n\n# monologue\n# JP: そのままくしゃくしゃ、やわらかな髪を撫ぜ回す。\n2930 = "然後輕輕地揉起她柔軟的頭髮。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「散歩の続きは、用事を済ませてからにしよう」\n1950 = "「一會等辦完事再繼續散步吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ！！」\n2088 = "「嗯！！」" \n\n# 【凪】\n# display as 凪\n# JP: 「自分で組み立てまでやりたい人はこっち並ぶばいっ！」\n2155 = "「想要自己組裝的人就排到這邊來咧！」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「せ、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;では、今走っている\x%l客車;#00ffc040;客車%l;#;の実物。\n組み立ててるとこ、生で見学できます。です」\n2315 = "「石、\\x%l石造機関庫;#00ffc040;石製機車庫%l;#;裡可以親眼看到現在實際運營中的\\x%l客車;#00ffc040;客運車廂%l;#;實物的組裝場面。嗯」" \n\n# 【学園生Ａ】\n# display as 學生Ａ\n# JP: 「え？　実物って、本物ってこと？　\n乗れるヤツ？」\n2040 = "「哎？實物的意思就是真的吧？能坐上去的那種？」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「そう。です。本物。乗れるようになるのは、\n完成して、テストとか終わってから。ですけど」\n2256 = "「是的。真的。雖然要乘上去還得等完成後測試完，才行」" \n\n# 【学園生Ｂ】\n# display as 學生Ｂ\n# JP: 「見たい見たい。どこで見れるって？」\n2163 = "「我想看我想看。在哪裡能看呢？」" \n\n# 【ふかみ】\n# display as 深美\n# JP: 「あ。こっち――。です」\n2067 = "「啊，在這邊。嗯」" \n\n# monologue\n# JP: ふかみの案内にしたがって、\n人波がどっ、と移動していく。\n2584 = "人潮隨著深美的引導開始移動。" \n\n# monologue\n# JP: あとに残るは二十人程。\nそれでも大人数ながら、空気の流れが戻った気になる。\n2758 = "後面還剩２０人左右。不過這個人數依舊算是很多，因此感覺氣氛又開始熱烈起來了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いつにも増しての大賑わいだったな。\n\x%lNゲージ;#00ffc040;Nゲージ%l;#;を走らせると、こんなにも違ってくるものか」\n2373 = "「這可比平時熱鬧得多了啊。讓\\x%lNゲージ;#00ffc040;ＮＧａｕｇｅ%l;#;運行起來後沒想到效果會這麼不一般」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「そうですね、\x%lNゲージ;#00ffc040;Nゲージ%l;#;あってのレイアウトですから」\n2235 = "「是呢，因為場景模型主要就是靠\\x%lNゲージ;#00ffc040;ＮＧａｕｇｅ%l;#;撐起來的嘛」" \n\n# monologue\n# JP: 奥の席から、ポーレットが少し背伸びして、\nレイアウトの全容を眺め渡す。\n2923 = "波萊特稍稍挺身，從後方座席上眺望著場景模型的全貌。" \n\n# monologue\n# JP: 空白部分もいつの間に、\nもう殆どが埋まってきている。\n2992 = "空白的部分也在不知不覺中被幾乎填滿了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「良いデザインだな」\n2372 = "「這個設計真好啊」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ほんと、おしゃれですよね。\nノスタルジックで、だけど古臭くなくて可愛くて」\n2309 = "「真的很漂亮。既能勾起人的鄉愁又不陳腐，而且又可愛」" \n\n# monologue\n# JP: 青い瞳の先には木の色と金との車体。\n2700 = "她藍色的眼睛看向木褐色和金色交織的車體。" \n\n# monologue\n# JP: \x%lNゲージ;#00ffc040;Nゲージ%l;#;の\x%l8620;#00ffc040;8620%l;#;に引かれ、現実よりも一足早く、\n日々姫デザインの新\x%l客車;#00ffc040;客車%l;#;がデビューを果たしている。\n2878 = "日日姬設計的新\\x%l客車;#00ffc040;客運車廂%l;#;被\\x%lNゲージ;#00ffc040;ＮＧａｕｇｅ%l;#;裡的\\x%l8620;#00ffc040;８６２０%l;#;牽引奔跑著，比現實中更早一步地完成了亮相。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「実物にも、早く乗ってみたいものだ」\n2175 = "「我真想早點乘上實物看看啊」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「けど」\n1968 = "「不過」" \n\n# monologue\n# JP: くすっと、ポーレットの微笑。\n2919 = "波萊特微微一笑。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「双鉄くんなら、[ハチロク,3]8620ですよね？\n見えるのは、車窓じゃなくて[キャブ,2]運転席からの景色」\n2415 = "「雙鐵君你不是要開[八六,3]８６２０嗎？到時候你能看見的可不是車窗外的景色而只是駕駛座外的景色了啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n2045 = "「哦哦」" \n\n# monologue\n# JP: 目から鱗が落ちた気がする。\n2778 = "我恍然大悟。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうだったのか……\nそうやって楽しんでいたのか」\n2260 = "「是這樣啊……原來要用這種方式去享受啊」" \n\n# monologue\n# JP: \x%l列車;#00ffc040;列車%l;#;に自分が乗っていると想像する。\nと、レイアウトの景色が、建物たちが立ち上がる。\n2779 = "我想像著自己搭乘\\x%l列車;#00ffc040;列車%l;#;的情景。腦海中，場景模型裡的景色和建築物們在我四周拔地而起。" \n\n# monologue\n# JP: 新\x%l客車;#00ffc040;客車%l;#;を引く\x%l8620;#00ffc040;8620%l;#;の、ゆっくりすぎるほどの速度が、\n見える景色を思ってみれば途端に優しく、心地よくなる。\n2558 = "一想到那樣的景象，就連牽引著新\\x%l客車;#00ffc040;客運車廂%l;#;的\\x%l8620;#00ffc040;８６２０%l;#;那過於緩慢的速度，我也一下子覺得愉快了許多。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……これはいいな。\nなるほど。みんなが夢中になって眺める筈だ」\n1727 = "「……這可真不錯啊。原來如此，怪不得大家都入了迷似地看著」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ですよね。でも、\nみんなが夢中になるのは\x%lNゲージ;#00ffc040;Nゲージ%l;#;だけの力じゃなく」\n2239 = "「是啊。不過，讓大家這麼入迷的也不光是\\x%lNゲージ;#00ffc040;ＮＧａｕｇｅ%l;#;的功勞」" \n\n# monologue\n# JP: ポーレットが優しく向けた視線の先で、\n日々姫はひたすら、絵筆を走らせ続けている。\n2921 = "波萊特溫柔的目光轉向遠方的日日姬。日日姬正一個勁地揮舞著畫筆。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ね？」\n2232 = "「是吧？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n# 2083 = "「嗯」" \n\n# monologue\n# JP: 日々姫のまわりに、少年少女の人だかり。\n2868 = "日日姬的周圍聚集了一圈少年少女們。" \n\n# monologue\n# JP: レイアウトより\x%lNゲージ;#00ffc040;Nゲージ%l;#;より実車両より、\n日々姫が紙に描く世界に、うっとり見とれてくれている。\n2903 = "比起場景模型、\\x%lNゲージ;#00ffc040;ＮＧａｕｇｅ%l;#;以及實車來，他們更沉迷於日日姬在紙上畫出的世界。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「もうちょっとで描けるから。\nそしたら――――あ」\n2380 = "「還有一點點就畫完了，然後——啊」" \n\n# monologue\n# JP: 日々姫の視線の先で、幼女が泣きそうな顔をしている。\nその手の中には、くしゃくしゃの紙――いや、あれは？\n2873 = "日日姬看見一個小女孩好像要哭出來的樣子。她手中握著一張皺巴巴的紙——不，那是？" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ごめん、ちょっとだけ待っててね？」\n2129 = "「對不起，請等我一下」" \n\n# monologue\n# JP: 順番待ちの列へと詫びて、\n日々姫は幼女のもとへと急ぐ。\n2685 = "她向排著隊的人們道了個歉，趕忙跑向那個小女孩身邊。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「どうしたの？　ちょっと難しかったかな？」\n1990 = "「你怎麼了？是不是有點難啊？」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「あっ」\n# 2054 = "「啊」" \n\n# monologue\n# JP: ビクリと、幼女は体をすくめ、\n手の中にあるものを背中に隠そうとする。\n2738 = "小女孩猛地一驚，慌忙把手中的東西藏到背後。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「大丈夫。おねえちゃんと一緒にやろう？\nそうしたら、うまくできるかもしれないよ？」\n2012 = "「別怕。讓大姐姐也來和你一起做吧？這樣說不定就能很快做好了哦」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「ぅ……ん……」\n2047 = "「唔……嗯……」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「あのですね、そうてつさん」\n2352 = "「跟你說哦，雙鐵先生」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n# 2083 = "「嗯」" \n\n# monologue\n# JP: れいながぽてぽて、\n僕に寄ってきて耳打ちをする。\n2933 = "玲奈走到我身邊對我說起了悄悄話。" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「あの子、自分で組み立てたいってがんばったんですぅ。\n自分のおうちだからぁ、って」\n2388 = "「那個孩子想努力自己拼好模型，她說“因為這是我自己的家嘛”」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なるほど、それでか」\n2016 = "「原來如此，是這樣啊」" \n\n# monologue\n# JP: 見るからに不器用そうな、まあるく幼いその指は、\nのり付け部分をぐちゃぐちゃにしてしまったのだろう。\n3016 = "肯定是她那乍看之下就讓人覺得很笨拙的肉嘟嘟而又稚嫩的手指把塗漿糊的部分弄得皺皺巴巴了吧。" \n\n# monologue\n# JP: 日々姫の細く器用な指が、いびつに張り付きあった紙を、\n丁寧に丁寧に剥がしている。\n2862 = "日日姬正用她那纖細又靈巧的手指把貼歪了的紙小心翼翼地撕下來。" \n\n# 【幼女】\n# display as 幼女\n# JP: 「ぁぁっ」\n# 2053 = "「啊……」" \n\n# monologue\n# JP: 幼女の悲鳴。\n2739 = "小女孩發出尖叫。" \n\n# monologue\n# JP: ノリの影響で塗装も剥がれ、白く残ってしまったせいだ。\n2668 = "因為一些被漿糊黏住的油漆也被剝離了下來，留下了一些白色的斑塊。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「平気だよ？\nここ直すのも、一緒にやってみようねー」\n2013 = "「別擔心。我們一起來把這裡也修好吧——」" \n\n# monologue\n# JP: 筆に絵の具を軽く乗せ、日々姫は幼女にそれを持たせて、\n\x%l運転体;#00ffc040;運転体%l;#;のハチロクほどに小さなその手をすっぽりつつむ。\n2701 = "她輕輕在筆上打上顏料，然後讓小女孩拿著，又溫柔地扶住那隻就像\\x%l運転体;#00ffc040;駕駛體%l;#;八六般大小的手。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はい、とーんとーんとんっ」\n1996 = "「來，塗啊塗，塗啊塗」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「ん……とーん、とーん、とん」\n2077 = "「嗯……塗啊塗，塗啊塗」" \n\n# monologue\n# JP: 幼い手と声の、おっかなびっくりだった流れが、\n日々姫の作るリズムに合わせ、徐々に滑らかになっていく。\n2637 = "剛才還怯怯不已的小女孩那稚嫩的聲音和手上的動作隨著日日姬唱出的拍子漸漸變得流暢起來。" \n\n# monologue\n# JP: 筆先で叩くようにして塗装を直し、\n形を整え、またノリをつけ――\n2680 = "她們用筆尖輕輕地補上油漆，又修整好形狀，再次塗上漿糊——" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「こことここをくっつけようね？\n一緒に、ね？　ゆっくり、ゆっくり――」\n1995 = "「來把這裡和這裡貼上吧？我們一起來，慢慢地、慢慢地——」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「うんっ」\n# 2083 = "「嗯」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そしたら――こうして、こうして――ここを――\nどう？　やれるかな？」\n2281 = "「然後——這樣，這樣——這裡——怎麼樣？會自己做嗎？」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「ん……んっ――あ――んっ！　できた！！」\n2076 = "「嗯……唔——啊——嗯！做好了！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「上手上手！\nじゃ、飾ってみよう！　おうちの場所は？」\n2118 = "「好棒好棒！那我們就把它裝飾到模型上吧！你的家在哪裡呢？」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「ここっ！」\n2104 = "「在這裡！」" \n\n# monologue\n# JP: 御一夜市内を遥かに外れ。\n3064 = "那裡是離御一夜市中心很遙遠的郊外。" \n\n# monologue\n# JP: 駅で言うなら、\nおかうえ幸福廃駅のあたりの線路沿いに――\n2936 = "用車站來說的話，大約是丘上幸福廢車站周圍的沿線地區——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ、銀の煙突の建物か」\n2071 = "「啊，是那個有銀色煙囪的建築物嗎」" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「あ！　ぽつーんって一軒あるおうち。\nあれ、目立つから、れいなも目印にしてますよぉ」\n2057 = "「啊！就是那座孤零零的房子。挺引人注目的，所以玲奈也把它當成路標了哦」" \n\n# monologue\n# JP: だからなおさらなのだろう。\n2803 = "所以那就更不用說了。" \n\n# monologue\n# JP: 完成にバラ色になっていた幼女の頬は、\nけれどもすぐさま、悲しげに凹んでいってしまう。\n2741 = "小姑娘的臉上因為完成了作品而浮現出燦爛的笑容，但很快又變得垂頭喪氣的。" \n\n# 【幼女】\n# display as 幼女\n# JP: 「えんとつ、きちゃなくなっちゃった。\nごめんなちゃぁい」\n2166 = "「我把煙囪弄髒了。真對不起」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「汚くないよ？　直した跡は、\n一生懸命がんばった、そのしるしでしょ？」\n1956 = "「不會髒啊。這修復痕跡可是你努力的證明呀。」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「でもね……ほかの、なおちてないもん」\n1983 = "「但是……別人的房子都沒修過啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そんなことないよ？　\n例えば――ほら、このお肉屋さん」\n2152 = "「怎麼會呢？比如說——看吧，那邊的肉鋪」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「わ、くちゃってちてる」\n2033 = "「哇，皺巴巴的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「素敵でしょ？　あなたより少しだけお兄さんな子が\n自分一人で、頑張って全部作ってくれたお肉屋さんなの」\n2146 = "「很不錯吧？那家肉鋪是一個比你大一點點的小哥哥一個人努力完成的」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「くちゃってちても、へいちなの？」\n2297 = "「皺巴巴的也沒關係嗎？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「もちろん！　他にも……ほら、このおうちは」\n2293 = "「當然了！其他還有……看啊，這座房子」" \n\n# monologue\n# JP: 日々姫が指差すひとつひとつの建物には、\n色ムラだったり、歪みだったりの瑕疵がある。\n2859 = "日日姬指著的每一座房子都有色彩斑駁，歪歪扭扭等帶瑕疵的地方。" \n\n# monologue\n# JP: が、その瑕疵も、レイアウト全体の中で見るなら、\n不思議と調和し……良いアクセントとさえも感じる。\n2580 = "不過，這些瑕疵放在場景模型全體裡看的話，卻莫名顯得很和諧——甚至讓人覺得很有獨到之處。" \n\n# 【幼女】\n# display as 幼女\n# JP: 「ほんとだ。きれいでちかくいのだけじゃなくって、\nいろんなおうちがあるんだねぇ」\n2307 = "「真的。不全都是又漂亮又方方正正的房子，還有好多各式各樣的房子呢」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「壊れた所を大事に直して、剥げた塗装にペンキを塗って。\n本当の町や建物も、このミニチュアもおんなじなの」\n1981 = "「仔細地修復損壞的地方，再用油漆補上塗裝脫落的地方。真正的城市和建築物也和這個迷你模型一樣」" \n\n# monologue\n# JP: 穏やかな声、包み込むように暖かな瞳。\n日々姫が、とても大人に見える。\n2926 = "溫和的聲音，彷彿能包容一切般的溫柔的目光。日日姬顯得好成熟。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「いろんな人が、いろんな好きをそれぞれの思う形にして。\nそのいろいろが、時間と共に柔らかく暖かく変わってく」\n2024 = "「各式各樣的人用各自的方式展示著他們各自喜歡的事物。這些“各式各樣”會隨著時間的流逝變得更溫馨、更溫暖」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「きれいでちかくいのだけが、いいんじゃないの？\nばらばらなのは、いろいろだから、おもちろいの？」\n1955 = "「不是光漂亮光方方正正就好嗎？因為有各式各樣的亂糟糟所以才有趣嗎？」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そうだね。バラバラの方がいろんな素敵を見つけられる。\nそうして、そういう素敵がたくさんたくさん集まって」\n2254 = "「是的。亂糟糟的反而能讓人發現各種美妙的東西呢。好多好多美妙的東西集中到一起」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「きゃあ！」\n2031 = "「哇啊！」" \n\n# monologue\n# JP: 日々姫が幼女を抱っこする。\n高い高いをしてもらい、こぼれそうな目がキラキラ輝く。\n2857 = "日日姬抱住了小女孩，把她舉高高。小女孩的眼睛裡放射出光芒。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「だから――町って素敵なんだよ？」\n2192 = "「所以——城市才會漂漂亮亮的，對吧？」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「うんっ！」\n# 2084 = "「嗯！」" \n\n# monologue\n# JP: もちもちとした頬がぷっくら、\nさっきより、ずっと鮮やかなバラ色になる。\n2735 = "小女孩充滿彈力的臉頰又鼓了起來，而且她臉上的笑容比剛才更加燦爛。" \n\n# 【幼女】\n# display as 幼女\n# JP: 「あのね、おねえちゃん！　おうちのえんとつ、\nきちゃなくないの、すてきなのっ！！」\n2111 = "「大姐姐你看！我家的煙囪不髒，很漂亮！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん！　そうだよね、とっても素敵っ」\n2087 = "「嗯！是的，很漂亮」" \n\n# monologue\n# JP: （バンっ！）\n3100 = "（砰！）" \n\n# 【凪】\n# display as 凪\n# JP: 「来たばい！　なんか凄かと！\nゴツいの来たばいっ！！」\n1994 = "「來咧！有個不得了的！大東西來咧！！」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「来たのね！」\n1993 = "「來了啊！」" \n\n# monologue\n# JP: いきなり飛び込んで来た凪に驚くこともなく、\nポーレットはパっと立ち上がる。\n2922 = "波萊特看見突然闖進來的凪並沒有嚇一跳。她一下子站起身。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あの、みなさん。今から、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;で、\n[だいしゃつけかえ,3]台車付替を行います」\n2114 = "「大家，聽我說。我們現在要去\\x%l石造機関庫;#00ffc040;石製機車庫%l;#;進行更換轉向架的工作」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おお！！」\n2102 = "「噢！」" \n\n# monologue\n# JP: \x%l台車;#00ffc040;台車%l;#;付替とは文字通り、\n車体から古い\x%l台車;#00ffc040;台車%l;#;を外し、新しい\x%l台車;#00ffc040;台車%l;#;に付け替える作業だ。\n2894 = "更換\\x%l台車;#00ffc040;轉向架%l;#;正如它的字面意思，是從車體上取下舊的\\x%l台車;#00ffc040;轉向架%l;#;，再換上新的\\x%l台車;#00ffc040;轉向架%l;#;的一道工序。" \n\n# monologue\n# JP: それは、つまりは――\n3056 = "那也就是說——" \n\n# 【れいな】\n# display as 玲奈\n# JP: 「いよいよですねぇ。\x%l客車;#00ffc040;客車%l;#;さんが」\n1695 = "「\\x%l客車;#00ffc040;客運車廂%l;#;終於要來了啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ、新生へと大きく近づく」\n2092 = "「嗯，又向新生邁出了很大的一步」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「関係者全員、見学に行きますので、\nレールショップを、三十分ほどの間、閉めます」\n2299 = "「相關人員都要去參觀，所以鐵路商店要關閉三十分鐘左右的時間」" \n\n# monologue\n# JP: 少し前までのポーレットならありえなかった、\n大きな声と、有無をいわせぬ決断と。\n2563 = "不久前的波萊特還不能發出如此洪亮的聲音，還無法果斷地作出判斷。" \n\n# monologue\n# JP: が、締め出されることになったお客様たちは、\nみんなわくわくした表情で、続く言葉を待っている。\n2578 = "不過被請出店門的客人們卻都一臉興奮地等待著她接下來的話。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ですので、よろしければ。\nみなさまも、\x%l台車;#00ffc040;台車%l;#;付替を見にいらしてください！」\n2196 = "「所以，若是不嫌棄，請大家也一起去參觀更換\\x%l台車;#00ffc040;轉向架%l;#;的場面吧！」" \n\n# monologue\n# JP: わ、っと歓声。\nお客様たちはぞろぞろと、レールショップの外に出て行く。\n2586 = "人群中爆發出歡呼聲。客人們摩肩繼踵地往鐵路商店門外湧去。" \n\n# monologue\n# JP: さっきの幼女は……ああ、ご家族と一緒なのか。\n日々姫に向かってにこにこ手を振り、外へと向かう。\n2636 = "剛才的小女孩……啊，和家人在一起啊。她正笑嘻嘻地和日日姬揮著手往門外走去呢。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「兄さん、行きましょ？」\n2044 = "「哥哥，我們走吧？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n# 2083 = "「嗯」" \n\n# monologue\n# JP: 日々姫とふたり外に出る。\n2775 = "我和日日姬一起走到了外面。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おうっ！？」\n2048 = "「唔哦！？」" \n\n# monologue\n# JP: 途端に妙な声が出る。\n2638 = "剛走到外面我就發出驚嘆聲。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なんだ、この人の数は」\n2153 = "「怎麼會有這麼多人」" \n\n# monologue\n# JP: 凪が言うところの『ゴツいの』が来た、\nそれに釣られてのことなのだろうか。\n3067 = "都是聽到凪說的“大東西來了”被吸引過來的人嗎。" \n\n# monologue\n# JP: レールショップをさっき出た人たちをも上回る人だかりが、\n\x%l石造機関庫;#00ffc040;石造機関庫%l;#;目指し、整然と移動している。\n2815 = "數量比剛才從鐵路商店裡出來的人還多的人群正井然有序地朝\\x%l石造機関庫;#00ffc040;石製機車庫%l;#;移動。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫」\n2216 = "「日日姬」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん」\n# 2083 = "「嗯」" \n\n# monologue\n# JP: だから、自然と手をつなぐ。\nはぐれたところで、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;ですぐに再会できようが。\n2801 = "所以我們又自然地把手牽在了一起。雖然就算我們走散了也可以馬上在\\x%l石造機関庫;#00ffc040;石製機車庫%l;#;碰到就是了。" \n\n# monologue\n# JP: それでもやっぱり――はぐれないよう。\n2593 = "但我們還是選擇——不讓彼此走散。" \n\n# 【真闇】\n# display as 真闇\n# JP: 「ああ、この線より近ぉに寄ったらいけんよぉ」\n2065 = "「啊，你們可不能越過這條線」" \n\n# monologue\n# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;の中央付近。\n二台の\x%l客車;#00ffc040;客車%l;#;が寄り添うように並べられている。\n72 = "\\x%l石造機関庫;#00ffc040;石製機車庫%l;#;的中央附近。兩節\\x%l客車;#00ffc040;客運車廂%l;#;正肩並肩似地排在一起。" \n\n# monologue\n# JP: 一台は、煙が入ってきてしまうもの。\nもう一台は――\n2613 = "其中一節就是那輛會進煙的車廂。另一節則是——" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うわ……結構――これ、感動」\n2074 = "「嗚哇……好壯觀——我好感動」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だなぁ」\n2249 = "「是啊」" \n\n# monologue\n# JP: [ちちぶ,2]知知武鉄道から譲渡され、\nつい先日まで、塗装だなんだを施されていた\x%l客車;#00ffc040;客車%l;#;。\n2897 = "正是秩父鐵路轉讓給我們，前幾天進行了塗裝等工序的那節\\x%l客車;#00ffc040;客運車廂%l;#;。" \n\n# monologue\n# JP: その全容を目のあたりにするのは、\n日々姫も僕も初めてだ。\n2850 = "日日姬和我還是第一次目睹它的全貌。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「デザイン画でも\x%lNゲージ;#00ffc040;Nゲージ%l;#;でも目にしていたが。\n実車となると……やはり、迫力が段違いだ」\n2412 = "「雖然在設計畫和\\x%lNゲージ;#00ffc040;ＮＧａｕｇｅ%l;#;裡都看到過，不過實車——魄力果然還是大不一樣啊」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「……ぴかぴかで、まるで新車みたい。\nここまで綺麗に塗ってもらえるだなんて――」\n1728 = "「……閃閃發光的，就像新車一樣。沒想到竟然會塗裝得這麼漂亮——」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「さすが、御一夜の職人だな。\n鉄道車体の塗装など、恐らくは初めての経験だろうに」\n2301 = "「真不愧是御一夜的工匠們啊。他們明明應該也是第一次給火車的車體塗裝的」" \n\n# monologue\n# JP: 日々姫がこだわった金のライン。\n直線部分も曲線部分も、生きているようになめらかだ。\n2854 = "日日姬所偏愛的金色線條。不管是直線部分還是曲線部分都像活的一樣圓滑自然。" \n\n# monologue\n# JP: 茶色の車体と融け合うようで、\n懐かしい落ち着きと高級感とを、ごく穏やかに伝えてくる。\n2720 = "它們和茶色的車體相融合，平靜地散發著令人懷念的安心感和高級感。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ただ塗ってるんじゃないです、兄さん。\nモール部分、盛り上がってますから」\n2379 = "「還不止是塗裝了一番哦，哥哥。你看飾條的部分是不是鼓起來啦」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ、言われてみれば――確かにだな」\n1992 = "「你這麼一說……確實是啊」" \n\n# monologue\n# JP: 金属か何かで線を引き、その上から塗装をしたか……\nあるいはメッキした金属でライン装飾をしたのだろうか？\n2939 = "用金屬還是什麼東西畫了一條線，然後再在線上塗裝……或者是用了鍍金的金屬進行了線條裝飾？" \n\n# monologue\n# JP: 出来ることなら、近くに寄って見てみたいのだが――\n2709 = "如果可以的話，真想再靠近一點看看——" \n\n# 【真闇】\n# display as 真闇\n# JP: 「\x%l客車;#00ffc040;客車%l;#;ばこれからもちあがるけん、\n転がっちゃったらぺしゃんこたい！」\n2289 = "「現在要吊起\\x%l客車;#00ffc040;客運車廂%l;#;了，要是不小心翻倒的話可就會被壓扁咧！」" \n\n# 【幼女】\n# display as 幼女\n# JP: 「きゃあ！」\n# 2031 = "「哇啊！」" \n\n# monologue\n# JP: ――真闇姉が規制線を敷き、\n子供相手に注意することで、全体に統制をかけている。\n1682 = "——真闇姐透過畫安全線並提醒孩子們注意來把控著人群全體的秩序。" \n\n# monologue\n# JP: 身内の僕らが、\nその範を崩してしまってはどうしようも無い。\n3045 = "身為家人的我們又怎麼能破壞秩序呢。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「まぁ、あとでじっくり見せてもらおう」\n2052 = "「唔，之後再去仔細看吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ですね。\n私たち、この\x%l客車;#00ffc040;客車%l;#;ともずっと付き合っていくんですから」\n2245 = "「是啊。我們之後反正還要一直和這輛\\x%l客車;#00ffc040;客運車廂%l;#;走下去呢」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だな――っと」\n2075 = "「嗯——啊」" \n\n# monologue\n# JP: ハチロクが\x%l客車;#00ffc040;客車%l;#;に近づいてくる。\n2609 = "八六走到\\x%l客車;#00ffc040;客運車廂%l;#;旁邊。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「こちらです。取付け、慎重に願います」\n2133 = "「就是這邊。安裝時請務必小心」" \n\n# monologue\n# JP: 目線も声も僕らに向かない。\n何かを先導しているよう――\n2690 = "她沒有在看我，也沒有在跟我說話。似乎是在引導著什麼——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おおっ！」\n2101 = "「噢噢！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わ――おっきい」\n2029 = "「哇——好大」" \n\n# monologue\n# JP: なるほど、凪のいったとおりに、\nこれは確かに“凄かと”だ。\n2645 = "原來如此，這東西確實如凪所說的那樣是個“大傢伙”。" \n\n# monologue\n# JP: ハチロクはおろか、僕の身長よりも大きい油圧ジャッキが、\n旧\x%l客車;#00ffc040;客車%l;#;の左右側面に二台ずつ、手早く取付けられていく。\n2604 = "八六自不用說，比我的身高都要高的巨大油壓千斤頂正被俐落地以左右兩邊每邊一次兩台的數量安到舊\\x%l客車;#00ffc040;客運車廂%l;#;的身上。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ううむ……選挙は……\nいや、選挙のみならず、世の中は概ね、人と金、か」\n2050 = "「唔唔……選舉……不，不只是選舉，這世上所有的事基本都靠人脈和錢嗎」" \n\n# monologue\n# JP: 毛利の姫様からの[バンス,1]前金と、\n赤井宮司とポーレットが持つ、人脈と。\n2908 = "毛利公主給的定金，還有赤井宮司和波萊特擁有的人脈。" \n\n# monologue\n# JP: そのいずれかが欠けてしまえば、\n準備も作業も、これほどスムーズには進捗しなかったろう。\n3022 = "若是缺了任何一方，不管是準備還是工程都不可能會進展得這麼順利吧。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「全てよしです！　お願いします！！」\n2006 = "「全部都沒問題！拜託了！！」" \n\n# monologue\n# JP: ジャッキがゆっくり持ち上がり、\nそれにつられて、車体も当然、持ち上がっていく。\n2641 = "千斤頂緩緩升起，車體也自然理所當然地被它們頂了起來。" \n\n# monologue\n# JP: 理屈でいえば、本当に当然で単純なのだが――\n2648 = "原理自然是很單純而理所當然，不過——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「これは……圧巻だな」\n2375 = "「這可真是……壯觀啊」" \n\n# monologue\n# JP: 鉄道車輌がいかに巨大か、\nこうして見るとまざまざ感じる。\n3072 = "鐵路車輛到底有多麼巨大，我這麼一看就更加深有體會。" \n\n# monologue\n# JP: これを引っ張り、運転するのだ。\nブレーキ位置だってなんだって、変化をするに決まってる。\n2635 = "到時候就要牽引著這個車廂在鐵路上駕駛。剎車位置之類的肯定會不一樣。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あの、兄さん！　わたし、別の角度から見てきます！」\n2390 = "「那個，哥哥！我去從別的角度來看一看！」" \n\n# monologue\n# JP: 絵描きとしての血が騒ぐのか、\n僕の返事を待とうともせず、日々姫は走りだしてしまう。\n2796 = "或許是日日姬體內的畫家之血又開始沸騰起來了，不等我回答她就跑走了。" \n\n# monologue\n# JP: が、置き去りにされた寂しさなどは感じない。\nそれよりなにより、今は\x%l台車;#00ffc040;台車%l;#;の更新だ――っと！？\n2576 = "不過我倒是沒有那種被拋下的寂寞感。我更在意的是現在進行的\\x%l台車;#00ffc040;轉向架%l;#;的更新工程——啊！？" \n\n# 【稀咲】\n# display as ？？？\n# JP: 「ああ、すみません」\n2069 = "「啊，對不起」" \n\n# monologue\n# JP: いかん。誰かとぶつかった。\n2564 = "不好。撞到人了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いえ、こちらこそボーっとして――む」\n1973 = "「不，我才該說對不起，都怪我在發呆——啊」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「ああ」\n# 2054 = "「啊」" \n\n# monologue\n# JP: 宝生稀咲だ。\n2889 = "是寶生稀咲。" \n\n# monologue\n# JP: 何故ここに――\n2692 = "她為什麼在這裡——" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「やぁ、双鉄。大したものだね」\n2027 = "「呀，雙鐵。真是了不起啊」" \n\n# monologue\n# JP: ――疑問が形になるより早く、稀咲に機先を制される。\nが、大したものと言われれば、それは素直に嬉しく感じる。\n1681 = "——我剛冒出疑問，就被稀咲搶了先。不過她說“了不起”，我還是很高興的。" \n\n# monologue\n# JP: 対立候補であるとはいえど……\nいや、そうであるからなおさらなのか。\n3075 = "雖說她是敵方的候選人——不，正是因為這樣我才更高興。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「良い車輌だろう。\n[ちちぶ,2]知知武鉄道で活躍していたものだそうだ」\n2376 = "「這車不錯吧。聽說它之前一直在秩父鐵路大顯身手哦」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「ああいや、車輌とかそういう話ではなくて」\n2060 = "「啊，不，我不是說車輛」" \n\n# monologue\n# JP: 苦笑して。\n稀咲がくるり、体ごと全部で僕を向く。\n2698 = "她苦笑道。然後轉過身來正面朝向我。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「ボクは、日々姫のことを\n『大したものだ』といったんだよ」\n2169 = "「我是說日日姬“真了不起”」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ほう」\n2046 = "「哦？」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「だってそうだろう？　\n鉄道になど、誰も興味をもっていなかったというのに」\n2420 = "「難道不是嗎？之前根本就沒有什麼人對鐵路有興趣」" \n\n# monologue\n# JP: 稀咲が右手を大きく広げる。\nその向こうには、人、人、人。笑顔と歓声。\n2983 = "稀咲攤開右手。她指向的地方到處都是人。還有笑臉和歡呼聲。" \n\n# monologue\n# JP: ひと月前と比較するなら、確かに、夢のような大盛況だ。\nそれはもちろん、日々姫一人の力ではないが――\n2660 = "和一個月前相比，這確實是如夢幻一般的大盛況。當然這也不只是靠日日姬一個人的能力——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ありがとう」\n2350 = "「謝謝」" \n\n# monologue\n# JP: 対立候補の稀咲がそれを、日々姫の力と認めてくれた。\nそれが素直に誇らしく、頭が自然と下がっている。\n2989 = "稀咲身為敵方候選人，卻承認了這是日日姬的能力。這確實令人自豪，我也自然地低下了頭。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「真実を言ったまでのことさ。\nもっとも――」\n2160 = "「我只是實話實說。而且說到底——」" \n\n# monologue\n# JP: 稀咲の目。\nにこやかなのに鋭い瞳が、数秒、僕の上で止まる。\n2987 = "稀咲的眼神。明明帶著笑意卻又鋒利的眼神在我身上停留了幾秒。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ん？」\n2097 = "「嗯？」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「日々姫の力を伸ばした存在。それをボクは――\n少しばかり安く見積もりすぎてしまったかな」\n2223 = "「日日姬能成長成現在這樣，也是得益於一個人的培養。我——可能有點輕視那個人了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それは」\n2371 = "「這個」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「ああいや、こっちの話。\nそれも、“今さら”っていう類の話さ」\n2062 = "「啊，不，是我自言自語。而且現在說這個也有點“事後諸葛亮”的味道」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そう、なのか」\n2251 = "「是嗎」" \n\n# monologue\n# JP: 稀咲でも、後悔をする――\n他人にそれを、覗かせてしまうことさえもある。\n2981 = "稀咲也會後悔——甚至還讓別人察覺到了她的後悔。" \n\n# monologue\n# JP: それが意外で。意外と感じたことが失礼なような気もして、\n一瞬、言葉を失くしてしまう。\n3050 = "這令人有點意外。不過我隨即又覺得“感到意外”這本身就有點失禮，結果一時說不出話來。" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「そんなことより、日々姫はどこだい？\n今日は、日々姫に話があってやってきたんだ」\n1961 = "「不說這些了，日日姬人呢？我今天是有話想和日日姬說才來的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫なら」\n2221 = "「日日姬的話」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「なんとまぁ。市長候補とは思えない姿だね」\n2303 = "「真不敢相信。這真不像是市長候選人會有的樣子啊」" \n\n# monologue\n# JP: べたりと、日々姫は頬をほとんど床につけている。\n2872 = "日日姬的臉幾乎已經貼在了地板上。" \n\n# monologue\n# JP: ジャッキが車体を持ち上げている――\nそれを下から見上げる形で、スケッチしているようだ。\n2861 = "日日姬正從下方觀察千斤頂舉起車體的情景畫著素描。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「しかし、日々姫らしい姿ではある」\n1972 = "「不過，這樣子才有日日姬的風範啊」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「確かにね」\n2320 = "「確實啊」" \n\n# monologue\n# JP: 日々姫に近づき、稀咲を見れば、\n“構わないさ”と言わんばかりの笑顔と頷き。\n2791 = "我走近日日姬，看了一眼稀咲，她笑了笑點點頭，彷彿在說“沒關係”。" \n\n# monologue\n# JP: だから、待つ。\n日々姫のペンの動きが止まり、満足の息が吐かれるまで。\n3061 = "那我們就等。等到日日姬停下筆，滿意地吐了口氣為止。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ！」\n# 2084 = "「嗯！」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「日々姫、少しいいかな」\n2226 = "「日日姬，可以打擾你一下嗎」" \n\n# monologue\n# JP: 稀咲の声に周囲の視線が集まり、\nそれはすぐさま、ざわめきになって広がっていく。\n3015 = "聽到稀咲的聲音，周圍人的視線都往她身上集中過去。人群很快一下子騷動起來。" \n\n# monologue\n# JP: すぐさま動揺を押し殺し、\n日々姫は慌てず立ち上がる。\n2883 = "日日姬連忙壓下心中的動搖，慌慌張張地站起身。" \n\n# monologue\n# JP: その様子を見て、ホっとしたような空気が広がる。\nこの“場”ははっきり、日々姫に味方してくれている。\n2944 = "看到兩人這樣，人群也漸漸安心了下來。現在的這個“場面”完全是支持日日姬的。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「それで、宝生候補。\n私に、何かご用でしょうか？」\n2401 = "「那麼，寶生候選人，您找我有什麼事呢？」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「討論会のお誘いに来た。\n急な話だが、スケジュールの都合がつけば、どうかな？」\n2167 = "「我是來邀請您參加辯論會的。雖然有點突然，如果您有時間的話，能否前來參加呢？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「討論会？」\n2356 = "「辯論會？」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「候補者同士、直接に語り合うのも良いかと思って。\nテーマは『御一夜の経済再生への展望』でどうかな？」\n2178 = "「我覺得候選人之間或許可以來一次直接對話。主題就定為“對御一夜經濟再興的展望”，怎麼樣？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それは」\n2370 = "「這個……」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「兄さん」\n2042 = "「哥哥」" \n\n# monologue\n# JP: 稀咲の本業そのものとマッチしたテーマ。\nこのまま行けば、日々姫が勝てそうな選挙情勢。\n2553 = "一個極其匹配稀咲本職的主題。畢竟選舉情勢再這樣下去日日姬就會取得勝利了。" \n\n# monologue\n# JP: 自分の土俵に引きずり込んでの逆転を、\nその意図を隠そうともせず、稀咲は目論み、仕掛けている。\n2984 = "稀咲毫不掩飾地策劃、實施著“把對手引入自己的地盤再趁機逆轉”這一目的。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「私は、この討論会のお誘い。\nお受けしたいと思います」\n2171 = "「我決定接受這個辯論會的邀請」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうか」\n# 2251 = "「是嗎」" \n\n# monologue\n# JP: 僕よりよほど、稀咲のことを知っている。\nそれがわからぬ日々姫では無い。\n2864 = "日日姬比我了解稀咲得多。她不可能不知道稀咲的目的。" \n\n# monologue\n# JP: その上で――日々姫は怖じずに即答している。\nならば僕は、日々姫の決断を支えるのみだ。\n3013 = "而——日日姬卻勇敢地立即做出了回答。那我要做的就是支持日日姬的決定。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「スケジュールの調整を選対本部長に頼んでこよう。\n宝生候補。希望の日時は？」\n2227 = "「日程表的調整就拜託選舉對策本部長進行吧。寶生候選人，您希望的時間是？」" \n\n# 【稀咲】\n# display as 稀咲\n# JP: 「しあさって――投票日の三日前。\n午後五時からでどうだろう」\n2116 = "「大後天——投票日的三天前。下午五點開始怎麼樣」" \n\n# monologue\n# JP: 迷いなく、日々姫が頷く。\n2866 = "日日姬毫不猶豫地點點頭。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「わかった。確認してこよう」\n2177 = "「我知道了。我到時候去確認一下」" \n\n# monologue\n# JP: 確認ではなく、説得になる。\n真闇姉は反対すると、半ば以上は覚悟している。\n2616 = "其實不會是確認，而是說服。我幾乎能肯定真闇姐會反對。" \n\n# monologue\n# JP: この討論会、当選確率の面から見れば、\nデメリットの方が圧倒的に高かろうから。\n2761 = "從當選機率方面來看這場辯論會，壞處明顯比好處多得多。" \n\n# monologue\n# JP: （だが――）\n3092 = "（不過——）" \n\n# monologue\n# JP: メリットは、ある。\n僕にははっきり、見えている。\n2708 = "好處也是有的。我清楚地看到了。" \n\n# monologue\n# JP: だから。\n2798 = "所以。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「真闇姉、少しいいかな」\n2312 = "「真闇姐，能和你談談嗎」" \n\n# 【真闇】\n# display as 真闇\n# JP: 「もちろん。\nこっちも話したいことあるけんねぇ」\n2292 = "「當然了。咱這邊也有話想和你說」" \n\n# monologue\n# JP: にこやかに、ごくさりげなく、\n真闇姉が立ち上がり、僕を先導し歩き始める。\n2952 = "真闇姉微笑著，若無其事地站起身，在我的前面帶路。" \n\n# monologue\n# JP: 他人の耳が及ばぬ場所へ――\nならばやはり、討論会には反対なのだろう。\n2810 = "把我帶向別人無法聽到我們談話的地方——那她果然還是反對這個辯論會的吧。" \n\n# monologue\n# JP: （日々姫、待っていてくれ。\n僕もお前に追いつくぞ）\n3099 = "（日日姬，等著我。我也會去追上你的）" \n\n# monologue\n# JP: だから、初めて反論しよう。\n真闇姉に抗ってでも、日々姫の希望を通してやろう。\n3062 = "那我就第一次反駁她吧。這次哪怕要反抗真闇姐，我也要滿足日日姬的希望。" \n\n# monologue\n# JP: 日々姫の望む未来の姿は、\n僕の目にももう、姿を見せてくれているから。\n2669 = "因為我已經清楚地看到了日日姬所希望的未來的樣子。" \n