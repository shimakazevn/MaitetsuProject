# lines: 388 
# 【ハチロク】
# display as 八六＆凪
# JP: 「Ａですね」\n「Ａばいっ！」
2186 = "「Là A nhỉ.」\\n「Là A đó!」"
# monologue
# JP: 見た瞬間の、まさに即断。
2945 = "Quyết định ngay tắp lự, chỉ trong khoảnh khắc vừa nhìn thấy."
# 【れいな】
# display as 玲奈
# JP: 「れいなも、Ａが一番かわいいと思いますぅ」
2285 = "「Reina cũng nghĩ A là dễ thương nhất nha.」"
# 【ふかみ】
# display as 深美
# JP: 「あの、わたしも。Ａに一票。です」
2391 = "「Ừm, mình cũng vậy. Bỏ một phiếu cho A. Ạ.」"
# monologue
# JP: 自分のペースで、やはり直感に従って。
2689 = "Vẫn theo nhịp độ của riêng mình, và làm theo trực giác."
# 【ポーレット】
# display as 波萊特
# JP: 「……Ａがいいです。[ハチロク,3]8620に一番マッチすると思いますし、\nキハ[レイナナ,1]07が引いても可愛くなりそうですし」
1718 = "「……A là tốt nhất. Mình nghĩ nó hợp với 8620 nhất,\\nmà để KiHa 07 kéo trông cũng dễ thương nữa.」"
# 【真闇】
# display as 真闇
# JP: 「ん。Ａがえいねぇ。お年寄りからおチビさんまで、\n誰にでも親しんでもらえそうな色やけん」
2081 = "「Ừ. A là tuyệt nhất. Màu sắc này có vẻ gần gũi với tất cả mọi người,\\ntừ người già cho đến trẻ nhỏ.」"
# monologue
# JP: 他案と比較検討の上、熟考し。
2661 = "Sau khi suy xét kỹ lưỡng và so sánh với các phương án khác."
# monologue
# JP: それぞれが、それぞれの道筋を経て。\nその上で、同じゴールへと辿り着く。
2655 = "Mỗi người, trải qua những con đường suy nghĩ khác nhau.\\nNhưng cuối cùng, đều đi đến cùng một đích."
# 【日々姫】
# display as 日日姬
# JP: 「あ……」
2053 = "「A……」"
# monologue
# JP: 固くなってた日々姫の顔が、\nあからさまなまでに“ほぉっ”と緩む。
2885 = "Khuôn mặt căng cứng của Hibiki,\\ngiãn ra rõ rệt với tiếng thở phào \"Phù\"."
# monologue
# JP: けれどもすぐに緩んだ顔が引き締まり、\n瞳と体がぐるり大きく動いて僕を、まっすぐ捉える。
2575 = "Nhưng khuôn mặt vừa giãn ra ấy ngay lập tức nghiêm nghị lại,\\nđôi mắt và cơ thể em ấy xoay hẳn sang, nhìn thẳng vào tôi."
# 【日々姫】
# display as 日日姬
# JP: 「それで、あの――兄さんは？」
2405 = "「Vậy, ừm——còn anh trai thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……古びた木の色。\n鈍くくすんだ金の振り子」
1731 = "「……Màu gỗ cũ kỹ.\\nCon lắc vàng xỉn màu.」"
# 【日々姫】
# display as 日日姬
# JP: 「わ」
2030 = "「Oa.」"
# monologue
# JP: 感じたままを言葉にすれば、日々姫の顔が笑みに輝く。\nやはり、か。
2783 = "Khi tôi thốt ra những gì mình cảm nhận được, khuôn mặt Hibiki bừng sáng nụ cười.\\nQuả nhiên là vậy sao."
# monologue
# JP: デザイン画を目にしたその瞬間に、\n僕も懐かしく思い出していた。
2561 = "Ngay khoảnh khắc nhìn thấy bản vẽ thiết kế,\\ntôi cũng đã nhớ lại với một cảm giác hoài niệm."
# 【双鉄】
# display as 雙鐵
# JP: 「お前が、良く描いていた古時計。\nＡのデザインからは、それと同じ温かみを感じた」
1985 = "「Chiếc đồng hồ cổ mà em hay vẽ.\\nTừ thiết kế A, anh cũng cảm nhận được sự ấm áp y như vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　あの時計がモチーフなの」
2085 = "「Vâng! Chiếc đồng hồ đó chính là họa tiết chủ đạo đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ」
2083 = "「Ra vậy.」"
# monologue
# JP: ハチロクが、感心したような声を出す。
2603 = "Hachiroku cất giọng thán phục."
# 【ハチロク】
# display as 八六
# JP: 「木造車体に金の、曲線を交えたライン。\n確かにこの外装塗色は、振り子時計の印象ですね」
2261 = "「Thân xe bằng gỗ với những đường viền cong màu vàng.\\nQuả thực màu sơn ngoại thất này mang lại ấn tượng của một chiếc đồng hồ quả lắc.」"
# 【ポーレット】
# display as 波萊特
# JP: 「振り子時計のある洋間……内装もそのイメージなのかな。\nすごくシックで、落ち着きあって大人っぽい」
2205 = "「Căn phòng kiểu Tây có đồng hồ quả lắc……Nội thất cũng mang hình ảnh đó nhỉ.\\nRất sang trọng, điềm tĩnh và chững chạc.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへ、振り子時計に似合うようにって。\nこのデザインなら、落ち着いて乗ってもらえるかなって」
2038 = "「Ehehe, em muốn nó phù hợp với chiếc đồng hồ quả lắc.\\nEm nghĩ thiết kế này sẽ mang lại cảm giác thư thái cho hành khách.」"
# 【れいな】
# display as 玲奈
# JP: 「[ゆのい,1]湯医線は、緑の中と川の上とを走ってますから、\n木のイメージ、すっごーく合うです！　素敵ですぅ」
2279 = "「Tuyến Yui chạy giữa không gian xanh mướt và trên mặt sông,\\nnên hình ảnh gỗ cực kỳ hợp luôn! Tuyệt vời quá nha.」"
# 【凪】
# display as 凪
# JP: 「川下り船から見上げたら、お客さんきっと喜ぶばい！」
2123 = "「Hành khách đi thuyền xuôi dòng ngước nhìn lên chắc chắn sẽ thích lắm!」"
# 【ふかみ】
# display as 深美
# JP: 「舟にも、日々姫さんのデザインと合せた中敷きみたいの。\n敷いたら、きっと、お客さん増えそう。かも、です」
2333 = "「Trên thuyền cũng nên lót đệm,\\ntheo thiết kế của Hibiki. Nếu làm vậy, chắc chắn lượng khách sẽ tăng lên. Nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへっ、えへへへ～」
2036 = "「Ehehe, ehehehe~」"
# monologue
# JP: 素直に照れて、喜んでいる。
2696 = "Em ấy ngượng ngùng và vui sướng một cách thật thà."
# monologue
# JP: Ａ案は日々姫自身の“好き”を一番まっすぐに、\n形にまとめた――そんなデザインであろうから。
2670 = "Phương án A là thiết kế thể hiện rõ nhất,\\ntrực tiếp nhất \"sở thích\" của chính Hibiki mà."
# 【真闇】
# display as 真闇
# JP: 「車体外装に関しては、塗装を変更するだけと？」
2408 = "「Về ngoại thất thân xe, chỉ cần thay đổi màu sơn thôi đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、本当は丸窓にしたかったけど、\nヘタに弄って煙入ってきちゃったらアレだし」
2093 = "「Vâng, thực ra em muốn làm cửa sổ tròn,\\nnhưng lỡ làm hỏng rồi khói lọt vào thì phiền lắm.」"
# 【真闇】
# display as 真闇
# JP: 「やったら。丸窓は次なり、その次なりに\n試せるようにしたらええねぇ」
2324 = "「Vậy thì. Cửa sổ tròn cứ để lần sau, hoặc lần sau nữa\\nthử nghiệm cũng được mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！」
2084 = "「Vâng!」"
# monologue
# JP: 力みなく。ごく対等に。\n日々姫は真闇姉と言葉を、意見を交換していく。
2953 = "Không hề căng thẳng. Vô cùng bình đẳng.\\nHibiki trao đổi ý kiến, trò chuyện cùng chị Mayami."
# 【真闇】
# display as 真闇
# JP: 「で、内装は……\nええと――何てゆーたっけ、椅子の貼り布」
2402 = "「Vậy, nội thất thì……\\nỪm——gọi là gì nhỉ, lớp vải bọc ghế ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「モケットですね」
2257 = "「Là nỉ bọc ghế ạ.」"
# 【真闇】
# display as 真闇
# JP: 「そうそう！　そのモケットば全部取り替えて、\nあとは……」
2130 = "「Đúng đúng! Thay toàn bộ nỉ bọc ghế đó,\\nrồi sau đó là……」"
# 【日々姫】
# display as 日日姬
# JP: 「荷棚とつり革の持ち手を木製に変えたいの。\nあと、座席、できたら一部のを木のベンチにして」
2188 = "「Em muốn đổi giá hành lý và tay cầm của dây đeo thành gỗ.\\nNgoài ra, ghế ngồi, nếu được thì đổi một phần thành ghế băng gỗ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ボックスシートのテーブルも木に、ですね。\nとっても素敵だと思います」
2381 = "「Bàn của ghế hộp cũng đổi thành gỗ nhỉ.\\nChị nghĩ sẽ rất tuyệt đấy.」"
# 【真闇】
# display as 真闇
# JP: 「内装の木やモケットは難燃・防炎にできっと？」
2004 = "「Gỗ và nỉ bọc ghế bên trong có thể làm loại chống cháy, chịu nhiệt được không?」"
# 【ハチロク】
# display as 八六
# JP: 「もちろんです、真闇様。不燃木材、不燃モケットは、\n\x%l帝鉄;#00ffc040;帝鉄%l;#;全盛期の頃に、既に一般化されておりますので」
2294 = "「Tất nhiên rồi ạ, cô Mayami. Gỗ chống cháy và nỉ bọc ghế chống cháy\\nđã được phổ biến từ thời kỳ hoàng kim của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#; rồi ạ.」"
# 【真闇】
# display as 真闇
# JP: 「今も、それは使われとーと？」
2291 = "「Bây giờ, loại đó vẫn được sử dụng sao?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、知ってます！\n木造のおうちの材料とかに使われてますぅ」
2287 = "「Reina biết nè!\\nNó được dùng làm vật liệu cho những ngôi nhà gỗ đó nha.」"
# 【真闇】
# display as 真闇
# JP: 「ああ、ゆーたらどこでも使われそうなものやもんねぇ」
2095 = "「À, nghe vậy thì có vẻ nó được sử dụng ở khắp mọi nơi nhỉ.」"
# monologue
# JP: 言い様、真闇姉の目はポーレットへと。
2955 = "Nói rồi, ánh mắt chị Mayami hướng về phía Paulette."
# 【真闇】
# display as 真闇
# JP: 「ほんなら、コストの方も？」
2208 = "「Vậy thì, chi phí cũng...?」"
# monologue
# JP: ポーレットが引き出したネット情報に目を走らせて、\n真闇姉はようやく、納得顔で深く頷く。
2920 = "Đưa mắt lướt qua thông tin trên mạng mà Paulette vừa tìm được,\\nchị Mayami cuối cùng cũng gật đầu thật sâu với vẻ mặt hài lòng."
# 【真闇】
# display as 真闇
# JP: 「なら、あとは職人さんたちと相談で、\n出来る出来んの検討と、粗見積りば貰わんと」
2399 = "「Vậy thì, việc còn lại là bàn bạc với các nghệ nhân,\\nxem xét khả năng thực hiện và xin báo giá sơ bộ thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！！」
# 2084 = "「嗯！」" 
# monologue
# JP: 弾けるような返答と笑み。
2877 = "Câu trả lời và nụ cười rạng rỡ."
# monologue
# JP: 真闇姉に認められるのは、\nやはり、ひとしおの嬉しさなのだろう。
2759 = "Được chị Mayami công nhận,\\nchắc chắn là một niềm vui sướng tột độ đối với em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、早速蓑笠さんのところに相談に行ってこよう」
2398 = "「Vậy thì, anh sẽ đến gặp ông Minokasa để bàn bạc ngay đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
2055 = "「A!」"
# monologue
# JP: ビシ、と音がしそうな勢いで日々姫の右手が挙げられる。
2852 = "Hibiki giơ tay phải lên mạnh mẽ đến mức như phát ra tiếng \"vút\"."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　日々姫」
2151 = "「Sao thế? Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「あのっ！　一緒――\nわたしも、その……鍛冶屋さん、一緒に」
2389 = "「Dạ! Cùng——\\nEm cũng muốn, ừm……đến lò rèn cùng anh.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あー！　そうですよね。日々姫ちゃん、\nずっとこもって描きっぱなしですし」
2058 = "「A! Đúng rồi nhỉ. Hibiki-chan,\\ntừ bữa tới giờ cứ giam mình trong phòng vẽ suốt mà.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。明日の朝になればまた、\nジオラマのためにたくさん描くこととなりましょうし」
2248 = "「Đúng vậy. Sáng mai lại phải vẽ rất nhiều\\ncho sa bàn nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「お出かけするの。きっと、気分転換とか、\nなるんじゃないかって思う。です」
2161 = "「Ra ngoài đi dạo một chút. Chắc chắn sẽ giúp cậu\\nthay đổi tâm trạng đấy. Nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「運動不足は、病気の原因にもなりよるしねぇ」
2378 = "「Thiếu vận động cũng là nguyên nhân gây bệnh đó nha.」"
# monologue
# JP: 何故なのか。やけに熱心に、\nみなが一気に口をそろえて、日々姫を送りだそうとする。
3051 = "Chẳng hiểu vì sao. Mọi người lại nhiệt tình,\\nđồng thanh giục Hibiki ra ngoài."
# monologue
# JP: 言われてるのはいちいちもっともなことばかりだし、\nもとより僕とて、反対する気などないのだが。
2681 = "Những gì họ nói đều rất có lý,\\nvà bản thân tôi cũng chẳng có ý định phản đối."
# 【双鉄】
# display as 雙鐵
# JP: 「なら、いっしょに行くか」
2394 = "「Vậy thì, cùng đi nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 2084 = "「嗯！」" 
# monologue
# JP: ぴょこん、と小さく飛び跳ね、駆け足――\n日々姫はそのまま、レールショップを出てしまう。
2683 = "Hibiki nhảy cẫng lên, rồi chạy lạch bạch——\\ncứ thế chạy tót ra khỏi Rail Shop."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、挨拶もせんで」
1976 = "「Gì thế, chẳng thèm chào hỏi một tiếng.」"
# 【凪】
# display as 凪
# JP: 「とかゆーて、\n顔がにこにこしとるばい」
1969 = "「Nói vậy thôi,\\nchứ mặt anh đang cười tủm tỉm kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　そうか？」
2099 = "「Hử? Vậy sao?」"
# monologue
# JP: 凪の指摘に顔を触るが、自覚できない。\nが、みなの表情が凪の言葉を本当なのだと認識させる。
3014 = "Nghe Nagi nói vậy, tôi đưa tay lên sờ mặt nhưng không tự nhận thức được.\\nTuy nhiên, biểu cảm của mọi người đã chứng minh lời Nagi nói là thật."
# 【双鉄】
# display as 雙鐵
# JP: 「せっかくだ、僕も楽しんで出かけてくるさ。\n戻りはいつになるかわからん。待たんで解散してくれ」
2418 = "「Sẵn dịp này, anh cũng sẽ ra ngoài dạo chơi một chút.\\nKhông biết bao giờ mới về. Mọi người cứ giải tán trước, đừng đợi anh nhé.」"
# 【凪】
# display as 凪
# JP: 「そんなの言われなくてもばいっ！\n明日の朝まで待つとかアホらしいけんね」
1957 = "「Cái đó không cần anh nhắc đâu!\\nChờ đến tận sáng mai thì đúng là ngốc mà.」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんっ！！？」
2131 = "「Nagi-chan!!?」"
# monologue
# JP: そこまで遅くなるなどありえん話と自明だろうが、\nふかみは何故か真っ赤になって慌てふためく。
3074 = "Việc về muộn đến mức đó là chuyện hiển nhiên không thể xảy ra,\\nnhưng không hiểu sao Fukami lại đỏ bừng mặt và luống cuống."
# 【凪】
# display as 凪
# JP: 「ふっふーん」
2100 = "「Hư hư.」"
# monologue
# JP: 老獪なネコのような目でニヤリと笑い、\n凪はバシっと、かなり強めに僕の背を押す。
2626 = "Cười nhếch mép với đôi mắt như một con mèo ranh mãnh,\\nNagi vỗ bốp một cái khá mạnh vào lưng tôi."
# 【凪】
# display as 凪
# JP: 「せっかくのデートば、楽しんで来るとええばいっ！」
2419 = "「Chuyến hẹn hò hiếm có, anh cứ tận hưởng cho đã đi nhé!」"
# 【ふかみ】
# display as 深美
# JP: 「だから凪ちゃぁぁぁんっ！」
2180 = "「Đã bảo là Nagi-chan mà!!!」"
# 【日々姫】
# display as 日日姬
# JP: 「……で、そのお客さんったら、カーマインと公務員を\n聞き間違え――って兄さん、聞いてます？」
1721 = "「……Rồi, vị khách đó, nghe nhầm Carmine thành công chức\\n——ơ anh trai, anh có đang nghe không đấy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ！？　ああ――すまん。何の話だ？」
2090 = "「Hử!? À——xin lỗi. Chuyện gì cơ?」"
# monologue
# JP: はぁ、っと日々姫が長い息。
2886 = "Haa, Hibiki thở dài thườn thượt."
# 【日々姫】
# display as 日日姬
# JP: 「どうしたんですか？　さっきから。\n急に、考え事ですか？」
1988 = "「Anh bị sao vậy? Từ nãy đến giờ.\\nTự nhiên lại mải suy nghĩ gì à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「――考え事といえば考え事だな」
1697 = "「——Nói là mải suy nghĩ thì đúng là đang mải suy nghĩ thật.」"
# monologue
# JP: 凪に妙なことを言われて、\nどうにも気にかかってしまっている。
2732 = "Bị Nagi nói mấy lời kỳ quặc,\\nkhiến tôi cứ bận tâm mãi không thôi."
# monologue
# JP: デートとは、\n一体どういう行為なのかと。
3003 = "Hẹn hò,\\nrốt cuộc là hành động như thế nào."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、つまらぬことだ。\nどうでもよいことが引っかかること、あるだろう？」
1971 = "「Nhưng mà, chỉ là chuyện vớ vẩn thôi.\\nCũng có những lúc em bận tâm đến những chuyện đâu đâu mà, đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「それは……そうですけど」
2369 = "「Thì……đúng là vậy.」"
# monologue
# JP: “ナイショなんだ”、と呟いて、\n日々姫はプっ、と、わずかに頬をふくらせる。
1691 = "Lẩm bẩm \"Bí mật cơ đấy\",\\nHibiki phụng phịu, hơi phồng má lên."
# monologue
# JP: が――デート云々などを言ってしまえば、\nきっと日々姫をも、僕の混乱に巻き込んでしまう。
2574 = "Nhưng——nếu tôi nói ra chuyện hẹn hò này nọ,\\nchắc chắn sẽ kéo cả Hibiki vào sự bối rối của tôi mất."
# 【日々姫】
# display as 日日姬
# JP: 「とにかく、考え事して歩くのとか、危ないですよ。\nつまづいちゃいます――ちっちゃな頃の私みたいに」
2327 = "「Nói chung, vừa đi vừa suy nghĩ nguy hiểm lắm đấy.\\nSẽ bị vấp ngã mất——giống như em hồi nhỏ ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2083 = "「嗯」" 
# monologue
# JP: その一言で、胸がスウっと軽くなる。
2706 = "Chỉ một câu nói đó, lòng tôi bỗng nhẹ nhõm hẳn."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな。日々姫とふたりで出かけるのなど、\n珍しくもなんとも無いことだった」
2242 = "「Đúng vậy nhỉ. Việc hai anh em mình đi chơi cùng nhau,\\nđâu có gì là lạ lẫm đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「ちっちゃかったころには、ですけどね？」
1970 = "「Nhưng đó là hồi nhỏ thôi mà?」"
# monologue
# JP: 甘えたような、皮肉を交えたような声。
2687 = "Giọng điệu vừa như làm nũng, vừa như pha chút mỉa mai."
# monologue
# JP: 不意に日々姫は振り返り、とことこと――\n僕の顔を見ながら、歩調を合わせて後ろ歩きする。
2768 = "Bất chợt Hibiki quay lại, lạch bạch——\\nvừa nhìn mặt tôi, vừa đi lùi cho bắt nhịp với bước chân của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「おい、危ないぞ」
2073 = "「Này, nguy hiểm đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「平気です！\n危なくなったら、兄さんが助けてくれますから」
2276 = "「Không sao đâu!\\nNếu có nguy hiểm, anh trai sẽ cứu em mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだが」
2414 = "「Thì đúng là vậy nhưng mà.」"
# monologue
# JP: 無論、その場合には即座の対処ができるよう、\n大きく一歩、日々姫に近づく。
2787 = "Tất nhiên, để có thể xử lý ngay lập tức trong trường hợp đó,\\ntôi bước một bước dài, tiến sát lại gần Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「えへへっ、ちっちゃな頃とおんなじですね」
2035 = "「Ehehe, y hệt như hồi nhỏ luôn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうだったな」
2079 = "「Ừ……đúng vậy nhỉ.」"
# monologue
# JP: 思い出す。あの頃から日々姫はおそらく、\n“絵描きの目"をしていたのだろう。
2776 = "Tôi nhớ lại. Có lẽ từ hồi đó Hibiki\\nđã mang \"đôi mắt của họa sĩ\" rồi."
# monologue
# JP: あちこちよそ見ばかりして、\n足元ときたら、危なっかしくて仕方なかった。
3008 = "Cứ mải mê nhìn ngó xung quanh,\\nmà chẳng thèm để ý bước chân, nguy hiểm hết sức."
# 【双鉄】
# display as 雙鐵
# JP: 「今日は、よそ見をしないんだな」
1978 = "「Hôm nay, em không nhìn ngó lung tung nữa nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「するわけないです。\n一番見たいもの、目の前にあるんですから」
2201 = "「Làm sao mà nhìn lung tung được.\\nVì thứ em muốn nhìn nhất, đang ở ngay trước mắt em mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
2252 = "「Vậy sao?」"
# monologue
# JP: ならば……必要ないかもしれん。\nが――不要であろうとそうしたいので、聞いてみる。
3054 = "Nếu vậy……có lẽ không cần thiết.\\nNhưng——dù không cần thiết tôi vẫn muốn làm thế, nên tôi thử hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「手、つなぐか？\nちっちゃな頃とおんなじに」
2345 = "「Có muốn nắm tay không?\\nGiống hệt như hồi nhỏ ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
# 2084 = "「嗯！」" 
# monologue
# JP: つないだ瞬間、ほっとする。
2811 = "Khoảnh khắc hai bàn tay đan vào nhau, tôi cảm thấy nhẹ nhõm."
# monologue
# JP: これが一番自然なのだと、\n体と心が一つになって理解する。
2786 = "Đây mới là điều tự nhiên nhất,\\nthể xác và tâm hồn tôi hòa làm một và thấu hiểu điều đó."
# monologue
# JP: （ああ、そうだな。これでいいんだ）
3095 = "（À, đúng vậy. Thế này là được rồi.）"
# monologue
# JP: デートだなんだの、つまらんことが、\n夜の空気に溶かされていく。
3058 = "Hẹn hò hay gì đó, mấy thứ nhàm chán ấy,\\nđang dần tan biến vào bầu không khí đêm khuya."
# monologue
# JP: 遠く、さらさらと川の流れていく音が、\nあの頃と今を、静かに密かにつなげてくれる。
2762 = "Từ xa, tiếng nước sông róc rách chảy,\\nlặng lẽ và âm thầm kết nối quá khứ với hiện tại."
# 【日々姫】
# display as 日日姬
# JP: 「……兄さんの手、おっきく硬くなりましたね」
1717 = "「……Tay anh trai, to và cứng cáp hơn rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の手は、相変わらずやわらかで小さいな」
2220 = "「Tay Hibiki thì vẫn mềm mại và nhỏ bé như xưa.」"
# 【日々姫】
# display as 日日姬
# JP: 「わたしの手だって、\nもちろん大きくなってるんですけど」
2173 = "「Tay em,\\ntất nhiên là cũng lớn hơn rồi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2387 = "「Đúng vậy nhỉ.」"
# monologue
# JP: 夜だからなのだろうか？\nそれとも日々姫も、こんな気持ちでいるからだろうか。
2890 = "Là vì đang là ban đêm sao?\\nHay là do Hibiki cũng đang có chung cảm xúc này."
# monologue
# JP: 日々姫の手は汗ばまず、異常な熱を帯びもせず、\nさらさらと、心地よく僕の手のひらと結ばれている。
2869 = "Tay Hibiki không hề đổ mồ hôi, cũng không nóng rực bất thường,\\nmà khô ráo, đan vào tay tôi một cách dễ chịu."
# 【双鉄】
# display as 雙鐵
# JP: 「市長になったら」
2120 = "「Nếu trở thành thị trưởng.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2083 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は御一夜を、どんな町へと育てたいんだ？」
2218 = "「Hibiki muốn phát triển Ohimitera thành một thị trấn như thế nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「育てるなんて大それたことは、\nまだ全然考えられないんですけど」
2189 = "「Việc lớn lao như phát triển thị trấn,\\nem vẫn chưa nghĩ tới đâu.」"
# monologue
# JP: ほんのり、日々姫の口の端がゆるむ。
2853 = "Khóe miệng Hibiki khẽ cong lên."
# 【日々姫】
# display as 日日姬
# JP: 「“みんな”だなんて考えちゃうとわからなくなるから、\n私にとって、理想の御一夜を作りたいって思います」
1949 = "「Cứ nghĩ đến \"tất cả mọi người\" là em lại thấy bối rối,\\nnên em muốn tạo ra một Ohimitera lý tưởng đối với bản thân em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはいいな」
2386 = "「Thế cũng tốt.」"
# monologue
# JP: 範囲を広く、そして多くと捉え、\nその全てを満足させることができれば、理想的だ。
3040 = "Mở rộng phạm vi, tiếp nhận nhiều ý kiến,\\nvà làm hài lòng tất cả mọi người, đó là điều lý tưởng."
# monologue
# JP: だが、そんな芸当が出来る人間がもしもいるなら、\n世界はもっと、平和で平等になっているのではなかろうか。
2579 = "Nhưng, nếu có người làm được trò trống đó,\\nthì thế giới này đã hòa bình và bình đẳng hơn rất nhiều rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「では、質問を改めよう。\n日々姫の理想の御一夜は、どんな町なのだ？」
2396 = "「Vậy, anh đổi câu hỏi nhé.\\nOhimitera lý tưởng của Hibiki là một thị trấn như thế nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さんが――」
2041 = "「Là nơi anh trai——」"
# monologue
# JP: きゅっと、日々姫の手に力がこもる。
2876 = "Bàn tay Hibiki khẽ siết chặt."
# monologue
# JP: 待っても待っても言葉の続きが出てこないから、\nできるかぎりに静かな声で、問いかけてみる。
2652 = "Đợi mãi, đợi mãi vẫn không thấy em ấy nói tiếp,\\ntôi cất giọng điềm tĩnh nhất có thể, hỏi lại."
# 【双鉄】
# display as 雙鐵
# JP: 「僕が？」
2190 = "「Anh sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「……兄さんが、帝都に帰りたくなくなる町。\nずっと暮らしたくなる御一夜が、私の理想の御一夜です」
1723 = "「……Là thị trấn khiến anh không còn muốn quay về Đế đô nữa.\\nMột Ohimitera khiến anh muốn sống ở đây mãi mãi, đó là Ohimitera lý tưởng của em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか――」
2250 = "「Vậy sao——」"
# monologue
# JP: そこまで、考えが及んでなかった。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致計画を撤回させたそのとき。
2794 = "Tôi chưa hề nghĩ xa đến mức đó.\\nĐến lúc kế hoạch thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; bị hủy bỏ."
# monologue
# JP: 完全に自由になった僕は果たして、\nどんな暮らしを、その先に望んでいくのだろうか？
2723 = "Khi đã hoàn toàn tự do,\\nrốt cuộc tôi sẽ mong muốn một cuộc sống như thế nào sau này?"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は――」
2157 = "「Anh——」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
2054 = "「A.」"
# monologue
# JP: 気づけば、蓑笠鍛冶店前だ。\nそんなに長く歩いた感じもしなかったが――
2664 = "Chợt nhận ra, chúng tôi đã đứng trước lò rèn Minokasa.\\nTôi không có cảm giác mình đã đi bộ lâu đến thế nhưng——"
# 【日々姫】
# display as 日日姬
# JP: 「本当に、あっという間についちゃいましたね」
2310 = "「Thực sự là, chớp mắt cái đã đến nơi rồi nhỉ.」"
# monologue
# JP: 少し不満げにそう言って、\n上目遣いで、吐息のような声を出す。
2694 = "Nói với vẻ hơi bất mãn,\\nem ấy ngước mắt lên nhìn tôi, cất giọng mỏng như hơi thở."
# 【日々姫】
# display as 日日姬
# JP: 「……ね、兄さん。\nこのまま、もう少し散歩しません？」
1722 = "「……Này, anh trai.\\nCứ thế này, mình đi dạo thêm một chút nữa nhé?」"
# monologue
# JP: どくんと、脈動。\nつながっている日々姫の手が、じわりと少し、熱くなる。
2808 = "Thình thịch, nhịp đập.\\nBàn tay đang nắm lấy tay tôi của Hibiki, dần dần nóng lên một chút."
# monologue
# JP: いや、どうだ？\n僕の脈動と僕の体温だったような気もする。
2581 = "Không, sao nhỉ?\\nTôi có cảm giác đó là nhịp đập và thân nhiệt của chính mình."
# monologue
# JP: （が、同じだな。\n鼓動が、熱が――日々姫のものでも、僕のものでも）
3093 = "（Nhưng mà, cũng giống nhau thôi.\\nNhịp đập này, hơi nóng này——dù là của Hibiki, hay của tôi）"
# monologue
# JP: だから、ゆっくり。\n繋がっている手をほどく。
2805 = "Vì vậy, tôi chầm chậm.\\nBuông bàn tay đang nắm ra."
# 【双鉄】
# display as 雙鐵
# JP: 「そうもいくまい。もう夜だ。\n遅くなっての来訪は、蓑笠さんにもご迷惑だろう」
1959 = "「Không được đâu. Trời tối rồi.\\nĐến thăm muộn quá sẽ làm phiền ông Minokasa đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「……そうですね」
1710 = "「……Cũng phải nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だからな、日々姫」
2193 = "「Vì vậy, Hibiki.」"
# monologue
# JP: 俯こうとした額に手をあて、\n少し持ち上げて視線をあわせる。
2789 = "Tôi đặt tay lên trán em ấy khi em ấy định cúi gằm mặt xuống,\\nnâng nhẹ lên để hai ánh mắt giao nhau."
# monologue
# JP: そのままくしゃくしゃ、やわらかな髪を撫ぜ回す。
2930 = "Cứ thế, tôi vò rối, xoa đầu mái tóc mềm mại của em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「散歩の続きは、用事を済ませてからにしよう」
1950 = "「Việc đi dạo, để giải quyết xong công chuyện rồi hẵng tiếp tục nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！！」
2088 = "「Vâng!!」"
# 【凪】
# display as 凪
# JP: 「自分で組み立てまでやりたい人はこっち並ぶばいっ！」
2155 = "「Ai muốn tự tay lắp ráp thì xếp hàng bên này nha!」"
# 【ふかみ】
# display as 深美
# JP: 「せ、\x%l石造機関庫;#00ffc040;石造機関庫%l;#;では、今走っている\x%l客車;#00ffc040;客車%l;#;の実物。\n組み立ててるとこ、生で見学できます。です」
2315 = "「Ở, \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;, các bạn có thể tận mắt chứng kiến quá trình lắp ráp\\n\\x%l客車;#00ffc040;toa hành khách%l;#; thật đang hoạt động hiện nay. Ạ.」"
# 【学園生Ａ】
# display as 學生Ａ
# JP: 「え？　実物って、本物ってこと？　\n乗れるヤツ？」
2040 = "「Hả? Thực tế, tức là đồ thật luôn á? \\nCái loại ngồi lên được ấy hả?」"
# 【ふかみ】
# display as 深美
# JP: 「そう。です。本物。乗れるようになるのは、\n完成して、テストとか終わってから。ですけど」
2256 = "「Đúng. Vậy ạ. Đồ thật. Nhưng mà phải đợi lắp ráp xong,\\nkiểm tra các kiểu xong xuôi thì mới ngồi lên được. Ạ.」"
# 【学園生Ｂ】
# display as 學生Ｂ
# JP: 「見たい見たい。どこで見れるって？」
2163 = "「Muốn xem muốn xem. Xem ở đâu thế?」"
# 【ふかみ】
# display as 深美
# JP: 「あ。こっち――。です」
2067 = "「A. Bên này——. Ạ.」"
# monologue
# JP: ふかみの案内にしたがって、\n人波がどっ、と移動していく。
2584 = "Theo sự hướng dẫn của Fukami,\\ndòng người ồ ạt di chuyển."
# monologue
# JP: あとに残るは二十人程。\nそれでも大人数ながら、空気の流れが戻った気になる。
2758 = "Còn lại khoảng hai mươi người.\\nDù vẫn là một số lượng lớn, nhưng tôi có cảm giác luồng không khí đã lưu thông trở lại."
# 【双鉄】
# display as 雙鐵
# JP: 「いつにも増しての大賑わいだったな。\n\x%lNゲージ;#00ffc040;Nゲージ%l;#;を走らせると、こんなにも違ってくるものか」
2373 = "「Hôm nay náo nhiệt hơn hẳn mọi khi nhỉ.\\nCho chạy \\x%lNゲージ;#00ffc040;N-gauge%l;#; lại tạo ra sự khác biệt lớn đến thế sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね、\x%lNゲージ;#00ffc040;Nゲージ%l;#;あってのレイアウトですから」
2235 = "「Đúng vậy ạ, sa bàn phải có \\x%lNゲージ;#00ffc040;N-gauge%l;#; mới đúng nghĩa mà.」"
# monologue
# JP: 奥の席から、ポーレットが少し背伸びして、\nレイアウトの全容を眺め渡す。
2923 = "Từ hàng ghế phía trong, Paulette hơi nhón chân lên,\\nđưa mắt nhìn bao quát toàn bộ sa bàn."
# monologue
# JP: 空白部分もいつの間に、\nもう殆どが埋まってきている。
2992 = "Không biết từ lúc nào,\\nphần khoảng trống cũng đã gần như được lấp đầy."
# 【双鉄】
# display as 雙鐵
# JP: 「良いデザインだな」
2372 = "「Thiết kế đẹp thật đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ほんと、おしゃれですよね。\nノスタルジックで、だけど古臭くなくて可愛くて」
2309 = "「Thật sự rất phong cách nhỉ.\\nHoài cổ, nhưng không hề lỗi thời mà lại rất đáng yêu.」"
# monologue
# JP: 青い瞳の先には木の色と金との車体。
2700 = "Nơi ánh mắt xanh biếc hướng đến là thân xe mang màu gỗ và màu vàng kim."
# monologue
# JP: \x%lNゲージ;#00ffc040;Nゲージ%l;#;の\x%l8620;#00ffc040;8620%l;#;に引かれ、現実よりも一足早く、\n日々姫デザインの新\x%l客車;#00ffc040;客車%l;#;がデビューを果たしている。
2878 = "Được kéo bởi \\x%l8620;#00ffc040;8620%l;#; phiên bản \\x%lNゲージ;#00ffc040;N-gauge%l;#;, sớm hơn một bước so với hiện thực,\\n\\x%l客車;#00ffc040;toa hành khách%l;#; mới do Hibiki thiết kế đã chính thức ra mắt."
# 【双鉄】
# display as 雙鐵
# JP: 「実物にも、早く乗ってみたいものだ」
2175 = "「Anh cũng muốn sớm được ngồi thử lên đồ thật quá.」"
# 【ポーレット】
# display as 波萊特
