# JP: （ねぇねぇにも……私、\nいままでずっと、ものっすごく甘やかしてもらって――）
2773 = "（阿姐……我之前也一直很依賴她——）" 

# monologue
# JP: だから。おいしく、残さず、いただく。
2555 = "所以。我要全部吃光，吃乾淨。" 

# monologue
# JP: 『いただきます』の意味をしみじみ噛み締めて、\nそしたら感謝が、自然と慣れた言葉に変わる。
2523 = "我切身體會著“我開動了”這句話的意義，隨之我的感謝之情自然而然地化作了習慣說的那句話。" 

# 【日々姫】
# display as 日日姬
# JP: 「ごちそうさまでした」
1913 = "「我吃飽了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ごちそうさまでした。ああ、美味かった」
1912 = "「我吃飽了。啊，真的是太好吃了」" 

# monologue
# JP: 兄さんの腰が浮きかける。
2434 = "哥哥正打算站起身的樣子。" 

# monologue
# JP: 今言わなくちゃ言えなくなっちゃうような気がして、\n少し慌てて呼び止める。
2549 = "我覺得現在不趁機會說就沒有機會說了。於是慌慌張張地喊住他。" 

# 【日々姫】
# display as 日日姬
# JP: 「あの、兄さん。少しお話が」
2130 = "「那個，哥哥。我有話想和你說」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、何だ？」
1757 = "「唔，什麼呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。片付けはわたくしが」
2157 = "「雙鐵少爺，收拾桌子就交給我吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、ハチロクにも聞いて欲しいの。\nそんなに、長い話じゃないから」
1778 = "「啊，我想請八六也聽聽。話不會很長的」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですか？」
1987 = "「是嗎？」" 

# monologue
# JP: トレーに食器を乗せてた手をとめ、\nハチロクがちょこん、と座る。
2463 = "她停下正要往托盤上放碗碟的手，輕輕地坐了下來。" 

# 【日々姫】
# display as 日日姬
# JP: 「私――今日、銀行に行こうと思います。\n稀咲先輩に、やっぱり、ちゃんと挨拶したくて」
1897 = "「我——今天打算到銀行去一趟。果然還是想和稀咲學姐去打個招呼」" 

# monologue
# JP: だって、そうしなくちゃ失礼すぎる。
2455 = "因為，不這麼做的話就太失禮了。" 

# monologue
# JP: 稀咲先輩が居てくれなければ――\nあの時、声をかけてくれないままだったら――
2349 = "不是有稀咲學姐在的話——那時候如果她沒有跟我搭話的話——" 

# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩は、私を今の私にしてくれた人の一人です。\nだから、決意を。私、伝えてお礼を言いたいんです」
2059 = "「稀咲學姐是成就如今的我的其中一個人。所以我想去向她表達我的決心，還有向她表示感謝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん、いいな。\nそれは、とても良い心がけだと僕は思う」
1812 = "「嗯，不錯啊，我也覺得這份用心很不錯」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　けど――」
1747 = "「哎？但是——」" 

# 【ハチロク】
# display as 八六
# JP: 「けど？」
1660 = "「但是？」" 

# 【日々姫】
# display as 日日姬
# JP: 「だって……私がそうしちゃったら――\n稀咲先輩に、全部、バレちゃうけど――いいのかなって」
1826 = "「因為……我這麼做了以後——稀咲學姐不就全都知道了嗎——這樣真的好嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そんなことを気にして僕らに相談したのか」
1771 = "「啊，你是在意這個才來徵求我們的意見的吧」" 

# monologue
# JP: こくこく、頷く。\nだって、昨夜にねぇねぇが――
2532 = "我小雞啄米似地點著頭。因為，昨天晚上阿姐她——" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃが候補になるって思ってる、\nその油断ば突くって、そぎゃんと話やったから」
1836 = "「她不是說讓我們攻擊“她們預計阿哥會報名當候選人”這個疏忽點來著嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉の戦略だな。\n日々姫の勝率を恐らく、向上させてくれるものでもある」
2113 = "「這是真闇姐的戰略啊。而且這個戰略大概也能讓日日姬的勝率上升許多」" 

# monologue
# JP: 言ってまっすぐ、にぃに――兄さんが、\n私の瞳をじっと見つめる。
2718 = "阿哥——哥哥邊這麼說著，邊堅定地看著我的眼睛。" 

# monologue
# JP: ドキドキする。\nけど、その何倍も、安心できて暖かくなる。
2546 = "我的心跳個不停。但是我又感到比這好幾倍的安心與溫暖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、これは日々姫の選挙で、日々姫の戦いだ。\nだから日々姫が思うがままに行動するのが、一番だ」
1659 = "「但是，這是日日姬的選舉，是日日姬的戰鬥。所以日日姬怎麼想就怎麼去行動是最重要的」" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん……」
1749 = "「哥哥……」" 

# 【ハチロク】
# display as 八六
# JP: 「これで、お話は決まりましたね」
2036 = "「看來已經商量好了呢」" 

# monologue
# JP: 中断してた手を動かして、\nハチロクはトレーに食器を乗せなおしていく。
2466 = "她繼續動起了剛才停住的手，把碗碟往托盤上放。" 

# 【日々姫】
# display as 日日姬
# JP: 「ハチロク、洗い物、私やるから」
1687 = "「八六，洗碗我來做吧」" 

# 【ハチロク】
# display as 八六
# JP: 「いえいえ、今日は結構です。\n日々姫はこれから、宣戦布告の大仕事ではないですか」
1625 = "「不不，今天沒關係的。日日姬一會不是還有前去宣戰這一重要任務嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「せんせん、ふこく――」
1856 = "「宣戰——」" 

# monologue
# JP: 宣戦布告。
2481 = "宣戰。" 

# monologue
# JP: これから戦争を始めるぞって、\n相手に挨拶すること……だと思う。
2465 = "她的意思應該是去跟對手打聲招呼，告知“接下來要開始戰爭了”。" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。そうだね。\nそれって、すごく大仕事。けど――でもね、だからこそ」
1755 = "「唔。是啊，這可是個非常重要的任務。但是——但是呢，所以才要」" 

# monologue
# JP: ハチロクの手に手を添える。
2538 = "我把手放在八六的手上。" 

# monologue
# JP: ハチロクは、ちょっと戸惑った顔をして、\nそれでも素直に、私にトレーを渡してくれる。
2405 = "八六顯得有點迷茫的樣子。但是她還是坦率地把托盤交給了我。" 

# 【日々姫】
# display as 日日姬
# JP: 「いつもの私で。いつもの私の延長で、\n私――稀咲先輩に会いたいの」
1655 = "「以平常的姿態，做最平常的自己——我想以這樣的身份去見稀咲學姐」" 

# monologue
# JP: いつもと同じ、自然な私で。\n感情的でも、感情を抑えた状態でもなく。
2428 = "和平常一樣，自然的我。既不情緒高漲，也不情緒低落。" 

# 【日々姫】
# display as 日日姬
# JP: 「そうする方が、きっと、伝わるって思うから。\nもしも誤解をされちゃっても、後悔がないって思うから」
1947 = "「我覺得這樣能更好地將想法傳達給她。就算被誤解了我也不會後悔」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですか」
1995 = "「是這樣嗎」" 

# monologue
# JP: 言ってハチロクは手を引っ込める。
2404 = "八六這麼說著，放回了手。" 

# monologue
# JP: そうしてその手を腰に置き、\nえへんと、わざとらしく胸を張る。
2606 = "然後她把手叉在腰間，哎嘿一聲，似乎是有點故意地挺起胸膛說道：" 

# 【ハチロク】
# display as 八六
# JP: 「１４：００からは、乗務訓練を行います。\nそれまでに、気がかりが無いようにしておきなさい」
2173 = "「１４：００開始要進行乘務訓練。在此之前請排除掉心中的雜念」" 

# 【日々姫】
# display as 日日姬＆雙鐵
# JP: 「はいっ！」\n「うむっ！」
1806 = "「嗯！」\\n「嗯！」" 

# monologue
# JP: 背筋をのばして張り上げた声が、\nにぃにぃの声と同じタイミングで響く。
2539 = "我挺直身板，和阿哥一起有力地回答。" 

# monologue
# JP: そんな小さなことがふんわり幸せで、\n自分があんまり単純だから、おかしくなってクスって笑う。
2712 = "這樣一個小細節就讓我感到輕飄飄的幸福感。看到如此單純的自己，我不禁噗哧一聲笑了出來。" 

# 【日々姫】
# display as 日日姬
# JP: （これなら平気。\nいつもの私で、稀咲先輩とお話できる！）
2772 = "（這樣就沒問題了。可以用平常的心態和稀咲學姐去說了！）" 

# monologue
# JP: だから、テキパキ片付けられる。
2560 = "所以我收拾碗筷的動作也俐落多了。" 

# monologue
# JP: 片付けをして、歯磨きをして、\n服も髪も、全部を迷わず決められる。
2568 = "收拾完，刷完牙，然後又毫不猶豫地選好了衣服和髮型。" 

# 【日々姫】
# display as 日日姬
# JP: 「行ってきます！」
1906 = "「我出門了！」" 
