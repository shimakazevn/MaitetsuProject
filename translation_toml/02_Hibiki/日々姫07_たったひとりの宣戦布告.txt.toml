# monologue
# JP: さっきのつらそうで泣きそうな顔、\nきっと、私の見間違えやったとね。
2409 = "剛才的那苦悶得似乎馬上要哭出來的表情肯定是我看錯了吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、何故これほど素晴らしいスケッチブックを\n隠そうなどと……いや」
1640 = "「不過，你畫得這麼好，為什麼要藏起來呢……啊，不」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1804 = "「嗯」" 

# monologue
# JP: にぃにぃ、言わんでもわかってくれた。\nやけん、話せる。
2723 = "阿哥就算我不說他也自己理解了。所以我覺得我能說給他聽。" 

# 【日々姫】
# display as 日日姬
# JP: 「くまくまの絵ば一番多かこと、笑われるけん。\n見せるの、私、イヤになったばい」
1827 = "「因為之前被笑話畫太多熊熊了。所以後來我就不太想給別人看了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなぁ」
1696 = "「原來如此啊」" 

# monologue
# JP: にぃにぃのまゆげが、う～ん、って寄る。
2734 = "阿哥的眉毛皺了起來。" 

# monologue
# JP: 形がよかけん、ほんのちょっとしか寄っとらんのに、\nすっごいなやんでるみたいな感じばしよる。
2747 = "雖然形狀還是很好看，而且也就稍微皺了一點點，但總覺得他好煩惱的樣子啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「笑われるのは、いやか？　日々姫」
1632 = "「不喜歡被人笑話嗎？日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1804 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば？　褒められることは？\n日々姫の絵を、『いい』といってもらうことはどうだ？」
2136 = "「那喜歡被誇獎嗎？如果有人說日日姬的畫“很棒”，你會感覺怎麼樣？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ホントにほめてもらえるのは、うれしかと。\nホントじゃないのにほめられっとは、イヤばい」
1847 = "「如果真的被誇獎那當然是很高興啦。但我不喜歡那些假的誇獎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなるほど」
1695 = "「原來如此原來如此」" 

# monologue
# JP: ん……ってにぃにぃはちょっとだまる。
2726 = "阿哥暫時沉默了下來。" 

# monologue
# JP: それからしゃがんで、\nそん顔ば、私のすぐ目の前に持ってくる。
2605 = "然後又蹲了下來，把他的臉湊到我的眼前。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うまい言い方を探したのだが。僕はどうも不器用らしい。\nだから、思うがままに言う」
1899 = "「我一直在想該用什麼更好的方式來表達，但是我真的好笨。那我就心裡想什麼就說什麼了」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1804 = "「嗯」" 

# monologue
# JP: 声が、すっごく真剣やけん、\n私も、つられて真剣になる。
2368 = "他的語氣顯得很認真，我也被他帶得認真了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の絵は魅力的だ。だから、笑われることを恐れて、\n隠してしまうのは少し、もったいないことのように思う」
1671 = "「你的畫真的是太富有魅力了。所以因為害怕被笑話而藏起來，我覺得有點太浪費了」" 

# 【日々姫】
# display as 日日姬
# JP: 「ぅぅ～……でも～。\nやっぱり、笑われるのは、こわくて、いやばい」
1786 = "「嗚嗚……不過～我真的很怕被笑話，特別討厭」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら、もう一歩踏み込んで考えてはみれんか？\n『日々姫の絵を見て笑うのは、どういう人間か』と」
2140 = "「那我們要不要試著進一步去思考一下？“看了日日姬的畫會笑的究竟是什麼樣的人”」" 

# 【日々姫】
# display as 日日姬
# JP: 「んんっ？　えっと……」
1821 = "「嗯？唔……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかりづらいか？　なら、逆側からならどうだろう。\n『日々姫の絵を好きになるのは、どんな人間なのか』」
1885 = "「很難理解嗎？那從反方向想想怎麼樣。“喜歡日日姬的畫的究竟是什麼樣的人”」" 

# monologue
# JP: あ！　そっちだったら、簡単ばい！
2442 = "啊！這個倒是很簡單！" 

# 【日々姫】
# display as 日日姬
# JP: 「私の絵ば好いてくれよる人は……きっと、私と、\n何がきれいかとか、何が楽しかかとかが、似とる人とや」
1998 = "「會喜歡我的畫的人……他們喜歡我喜歡的東西。我覺得有趣的東西，他們也會覺得有意思」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、日々姫の絵を見て笑う者は。\n何が綺麗で何が楽しいかが、日々姫と異なる者だろうさ」
2148 = "「那麼，會笑話日日姬的畫的人，不就是他們的喜好和審美和日日姬不一樣嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
1764 = "「啊！」" 

# monologue
# JP: わたしが、“まっこと！”って思ったの。\nにぃにぃにも多分、伝わった。
2622 = "確實是這樣！估計我的這想法也傳達給阿哥了吧。" 

# monologue
# JP: 真剣だった目がちょこっとやわこくなって、\nぽんぽんって、もう一回頭をなでてもらえる。
2375 = "他認真的眼神又溫柔了起來，再次撫摸起我的頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「笑うような相手がそうした者だと理解して。\nそれでも日々姫は、まだ、笑われることが怖いか？」
2031 = "「理解了那些可能會笑你的人就是這種人以後，日日姬還會怕被人笑話嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん…………うん。それでも、やっぱり」
1790 = "「嗯…………唔。就算這樣也還是討厭」" 

# 【双鉄】
# display as 雙鐵
# JP: 「誰かと分かり合えることは、恐らく尊い。\nもったいないぞ？　そのチャンスを捨ててしまうのは」
1721 = "「和別人互相理解應該是很高尚的一件事。如果放棄這個機會就太浪費了」" 

# 【日々姫】
# display as 日日姬
# JP: 「う……ん」
1334 = "「……嗯……」" 

# monologue
# JP: にぃにぃの教えてくれたことはわかるばってん、\n勇気を出せる気がせんけん、声ば小さくなってしまう。
2748 = "雖然我能理解阿哥的話，但是卻拿不出勇氣，所以只能輕聲回答他。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでも怯えてしまうなら――\nそうだな、僕をいつでも呼ぶがいい」
2088 = "「要是還是怕的話——對了，那就隨時叫我吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃを？」
1784 = "「喊阿哥？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。味方が一人……変わらぬ味方が一人いるだけで、\n不思議と、怖くなくなるものだ」
1794 = "「嗯。只要有一個伙伴……一個永遠的伙伴在，心中的恐懼就會神奇地消失了」" 

# monologue
# JP: あ……\nまたにぃにぃ、つらそうな――さみしそうな顔。
2435 = "啊……阿哥又露出了苦悶的——略帶寂寞的表情。" 

# monologue
# JP: けど、すぐに笑顔がふわって、\nつらそうな顔を消していく。
2381 = "但是他很快又恢復了笑容，那苦悶的表情也消失了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、日々姫が怯えたときには僕を呼べ。\n僕は日々姫に味方する。それで怯えと、戦ってみろ」
1958 = "「所以，當日日姬害怕的時候就叫我吧。我是日日姬的好伙伴，我們一起和膽怯戰鬥吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「味方……にぃにぃが、私の味方？」
1839 = "「好伙伴……阿哥是我的好伙伴嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。\n僕は、日々姫の[あに,1]義兄となったのだから」
2033 = "「當然了。因為我現在是日日姬的義兄了嘛」" 

# 【日々姫】
# display as 日日姬
# JP: 「それって――ずっと？\n私が、大人になってもずうっと？」
2144 = "「那是——一直嗎？就算我長成大人了也一直都是？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ずっとだ。日々姫がそれを望むのならば。\nとはいえ、大人になったときには――」
1811 = "「嗯，一直。只要日日姬這麼希望的話。話說回來，你長成大人的時候——」" 

# monologue
# JP: ぎゅうって、にぃにぃが目を閉じる。\n目を閉じたまま上を見る。
2741 = "阿哥閉上了眼睛。他閉著眼睛向上仰望。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大人になれた。その時には。\n僕の助けなど必要なくなっているだろうがな」
1972 = "「日日姬長成大人的時候。那時候，應該也已經不需要我的幫助了吧」" 

# monologue
# JP: そんなことなか！　って思うけん、\nそう言いたいけど、でも……
2562 = "才不會呢！我這麼想著，剛想說出來，但是……" 

# monologue
# JP: 言っちゃいけない、そんな気がする。\nすごく、する。
2657 = "總覺得，總覺得我不能說出口。" 

# 【日々姫】
# display as 日日姬
# JP: 「……にぃにぃは、私に大人になって欲しかと？」
1339 = "「……阿哥想讓我長成大人嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
2168 = "「！！」" 

# monologue
# JP: ぎくって、なんだかそんな感じに、\nにぃにぃが目をあけて私ば見よる。
2729 = "阿哥猛地一睜眼看向我。" 

# monologue
# JP: それから優しく……\nなんだか、申し訳無さそうな顔して、笑う。
2607 = "然後露出溫柔的表情……但總覺得笑容裡有一些抱歉的顏色。" 

# 【双鉄】
# display as 雙鐵
# JP: 「もちろん、大人になってほしい。\n健やかに、幸せになってほしいと――願っているよ」
1941 = "「我當然希望你長成大人了。希望你能健康幸福地成長」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……」
1791 = "「嗯……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いずれ、そうなる。日々姫は健やかな大人になる。\n僕などいようがいまいが、必ず」
2074 = "「而且總有一天會的。日日姬會茁壯成長。不論有沒有我在，都一定會」" 

# 【日々姫】
# display as 日日姬
# JP: 「ぁっ」
1762 = "「啊」" 

# monologue
# JP: お祈りみたいな口調がイヤで、\nにぃにぃが遠くにいっちゃいそうでっ！
2515 = "我不喜歡這種祝願一般的語氣，好像阿哥會離我遠去似的！" 

# 【日々姫】
# display as 日日姬
# JP: 「いて欲しか！\n私、にぃにぃに味方になって欲しかとよっ！！」
1931 = "「我想讓阿哥在我身邊！我想讓阿哥一直做我的伙伴！！」" 

# monologue
# JP: きょとんって、した顔。\nそれからにぃには、くっくって。
2730 = "阿哥猛地一驚，然後輕輕笑了起來。" 

# monologue
# JP: のどのおくのとこ鳴らすみたいに、\nおかしか感じに――だけどとーっても自然に、笑う。
2484 = "就像是讓喉嚨深處發出聲響似的奇怪的感覺——但又很自然地笑著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならばそうしよう」
1986 = "「是嗎，那就那樣吧」" 

# monologue
# JP: なんか、よかった。\nほっとする。
2714 = "那就太好了。我放心了。" 

# monologue
# JP: ほっとしたんなら、急にまた、\n私、怖くなっちゃう。
2344 = "一放下心來，我又突然開始害怕了。" 

# 【日々姫】
# display as 日日姬
# JP: 「けど……私、おくびょうやけん。\nにぃにぃが、そばにいてくれても、それでも――」
1710 = "「可是……我是個膽小鬼。就算阿哥在我身邊，我也——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、焦らせるつもりはなかった。\nすまん」
1776 = "「啊，我不想讓你著急的，真對不起」" 

# monologue
# JP: おっきな手。\nにぃにぃの手。
2470 = "好大的手。阿哥的手。" 

# monologue
# JP: 頭ばなでてもらうの、これで三回目。\nいままでで、一番あったかで一番うれしい。
2378 = "他這是第三次摸我的頭了。這次是最溫暖最讓人開心的一次。" 

# 【双鉄】
# display as 雙鐵
# JP: 「何一つ焦ることはない。日々姫の時間は日々姫のもの。\n日々姫の好きに使えばそれが、一番だ」
2008 = "「沒有必要著急。日日姬的時間是日日姬自己的，日日姬自己喜歡怎麼用是最重要的」" 

# monologue
# JP: そうして、ゆっくり、ゆっくり笑って。\nにぃにぃがスケッチブックを返してくれ――あっ！！？
2604 = "然後他慢慢地笑了起來。阿哥把素描簿還給了——啊！！？" 

# monologue
# JP: （バサッ！）
2767 = "（啪沙！）" 

# 【稀咲】
# display as 稀咲
# JP: 「おっと、失礼」
1729 = "「哎呀，不好意思」" 

# monologue
# JP: 痛い……っていうか？　ぶつかったっ？\n私また――にぃにぃのこと考えて、ぼーっとしとって――
2471 = "好痛……撞到了？我又……想阿哥的事想出神了——" 

# 【稀咲】
# display as 稀咲
# JP: 「すまない。拾おう。\nっと……へぇ。君が描いたのかい？　見事なものだ」
1869 = "「對不起。我來幫你撿吧。……哎。是你畫的嗎？可真不錯啊」" 

# monologue
# JP: スケッチブック、落として開いちゃったとこ、\nすごくまじまじ見つめられて――って、この人！
2651 = "素描簿掉到地上，翻開的那頁被目不轉睛地打量著——啊，這個人是！" 

# 【日々姫】
# display as 日日姬
# JP: 「宝生、稀咲先輩――」
1865 = "「寶生、稀咲學姐——」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクのことを知ってくれているのかい？　光栄だな」
1672 = "「你認識我嗎？可真是光榮啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「うちの学園で、先輩のこと知らない人なんていなかと\n――いません、と思います」
1905 = "「我們學校裡應該沒什麼人——沒人認識學姐的吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「どうかな？　まぁ、生徒の少ない学園だからね」
1988 = "「是嗎？啊，不過我們學校裡的學生本來就少啊」" 

# monologue
# JP: そう言いながら、\n稀咲先輩の目はスケッチブックをずっと見ている。
2644 = "稀咲學姐邊這麼說著，邊目不轉睛地盯著素描簿看。" 

# 【稀咲】
# display as 稀咲
# JP: 「ええと――君は」
1716 = "「呃——你是」" 

# 【日々姫】
# display as 日日姬
# JP: 「日々姫といいます。右田日々姫。先輩の一年後輩です」
1909 = "「我叫日日姬。右田日日姬。是和學姐差一年的學妹」" 

# 【稀咲】
# display as 稀咲
# JP: 「なら日々姫。その……他のページにも興味があるんだ。\n見てもいいかな、このスケッチブック」
2147 = "「那麼，日日姬。我……對其他的畫也有興趣。我可以看一下這本素描簿嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1758 = "「啊——」" 

# monologue
# JP: うなずきたいけど、怖い、やっぱり。
2537 = "我想點頭，可總覺得好害怕。" 

# monologue
# JP: にぃにぃ――\nだって、帝都に一人で行っちゃったけん。
2454 = "因為阿哥已經不在了，他一個人去帝都了。" 

# 【日々姫】
# display as 日日姬
# JP: 「ずっと……味方してくれるって言ったのに」
1653 = "「他還說一直會陪著我……」" 

# monologue
# JP: それでもやっぱり、\nにぃにぃが教えてくれたこと、私の中に残っとる。
2351 = "不過，阿哥教我的事還一直在我的腦海中留存著。" 

# monologue
# JP: 稀咲先輩が、私の絵ば好きになってくれるなら……\n思うと、勇気。じわじわだけど、湧いてくる。
2504 = "想到稀咲學姐可能會喜歡我的畫……勇氣就開始唰唰地往上湧。" 

# 【稀咲】
# display as 稀咲
# JP: 「ん？」
1820 = "「嗯？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、いえっ！　もちろん見ても良か――んんっ、\nいいです、どうぞ、見てくださいっ！」
1769 = "「啊，不！當然您可以瞅——不，可以看。請隨便看！」" 

# monologue
# JP: 言葉。\n稀咲先輩もにぃにぃと同じで、とても綺麗な標準語。
2696 = "語言。稀咲學姐也和阿哥一樣都操著一口漂亮的標準語。" 

# monologue
# JP: 私も真似する。\nずっと練習してきたことだし――できるはず。
2520 = "我也試著模仿。我一直有在努力練習——應該能說的。" 

# 【日々姫】
# display as 日日姬
# JP: 「見てください。\nその絵、全部――私が描きたいって思った物です」
