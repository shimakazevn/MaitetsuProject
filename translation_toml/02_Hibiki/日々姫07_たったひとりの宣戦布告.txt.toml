# lines: 416 
# 【日々姫】
# display as 日日姬
# JP: 「それでね、くまくま。\nまたうちのお酒、ひんぴょー会で一等取ったばい」
2114 = "「Kể nghe nè, Kuma Kuma.\nRượu nhà mình lại đạt giải nhất trong buổi bình chọn rồi đó nha.」"
# 【くまくま】
# display as 熊熊
# JP: 「…………」
1324 = "「…………」"
# 【日々姫】
# display as 日日姬
# JP: 「すごかとよねー。ばってん、ひんぴょー会のことと、\nわたしのテストの点とは関係なかよねぇ」
1883 = "「Tuyệt thật đó nha. Nhưng mà, chuyện buổi bình chọn\nthì có liên quan gì đến điểm kiểm tra của tớ đâu chứ.」"
# 【くまくま】
# display as 熊熊
# JP: 「…………」
# 1324 = "「…………」" 
# 【日々姫】
# display as 日日姬
# JP: 「だよねぇ。なのに、なんでそぎゃんと言うてくれっと、\nくまくまだけなんか、私、さっぱりわからんばい」
1981 = "「Đúng không. Vậy mà, tại sao chỉ có mỗi Kuma Kuma\nlà nói với tớ như vậy, tớ chả hiểu gì sất.」"
# monologue
# JP: 私は私。\nねぇねぇはねぇねぇ。
2542 = "Mình là mình.\nChị Mayami là chị Mayami."
# monologue
# JP: ねぇねぇが一番とったからって、どうしてわたしも\n一番とらんといけんてなるのか、そこがわからん。
2487 = "Chị Mayami đứng nhất, thì cớ sao mình cũng phải\nđứng nhất theo chứ, chỗ đó là không hiểu nổi luôn á."
# 【日々姫】
# display as 日日姬
# JP: 「学園で二番じゃダメなのかなぁ？\n私――お勉強がんばったんだけどなぁ」
2158 = "「Đứng thứ hai ở trường thì không được sao ta?\nMình——cũng đã cố gắng học lắm rồi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「学園で二番は、無論、大変立派な成績だ」
1684 = "「Đứng thứ hai ở trường, tất nhiên là một thành tích rất đáng tự hào rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぴゃわわわわわっ！？」
1763 = "「Oa oa oa oa oa!?」"
# monologue
# JP: 誰！？　誰っ！！？　いきなり――\nって、あ――そうてつさん。だ。
2699 = "Ai!? Ai vậy!!? Tự nhiên——\nÁ, a——Là anh Soutetsu."
# monologue
# JP: わたしのにぃにぃになるんだって、\nねぇねぇが教えてくれた人。
2592 = "Người mà chị Mayami bảo\nsẽ trở thành anh hai của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「驚かせてしまったならすまない。\n何度もノックしたのだが、全く返事がなかったのでな」
1845 = "「Xin lỗi nếu anh làm em giật mình nhé.\nAnh đã gõ cửa mấy lần rồi, nhưng hoàn toàn không thấy trả lời.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1758 = "「A——」"
# monologue
# JP: 私。くまくまとおしゃべりするのに夢中やったけん。\nゆーか、そっか……
2528 = "Mình. Do mải mê nói chuyện với Kuma Kuma quá.\nÀ mà, đúng rồi ha……"
# 【日々姫】
# display as 日日姬
# JP: 「私とくまくまと、\n今日からおんなじお部屋なんだっけ」
1918 = "「Mình và Kuma Kuma,\ntừ hôm nay sẽ ở chung một phòng nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、くまくまというのか。良い名だな」
1750 = "「Hô, tên là Kuma Kuma à. Tên hay đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
2169 = "「っ!!?」"
# monologue
# JP: 私、口に出しとった！？
2547 = "Mình, lỡ nói ra khỏi miệng rồi sao!?"
# monologue
# JP: イヤばいっ！\nまた、子供扱いされて、たしなめられっと――
2649 = "Tiêu rồi!\nLại sắp bị coi là con nít, rồi bị quở trách cho xem——"
# 【双鉄】
# display as 雙鐵
# JP: 「よろしく。右田くまくま君。僕は双鉄。\n今日から、右田の一員とさせてもらったものだ」
2097 = "「Rất vui được gặp em. Bé Migita Kuma Kuma. Anh là Soutetsu.\nTừ hôm nay, anh sẽ là một thành viên của nhà Migita.」"
# 【日々姫】
# display as 日日姬
# JP: 「……ぁ」
1331 = "「……A.」"
# monologue
# JP: こん人……くまくまに、あいさつばしてくれよったと。\nだけじゃなくって、あく手まで。
2708 = "Người này……đang chào hỏi Kuma Kuma kìa.\nKhông chỉ vậy, còn bắt tay nữa chứ."
# 【日々姫】
# display as 日日姬
# JP: 「……私のこと、笑わんと？」
1329 = "「……Anh không cười em sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「笑う？　何故」
2065 = "「Cười? Tại sao chứ?」"
# 【日々姫】
# display as 日日姬
# JP: 「名前つけよるの、子供っぽいとか――\nぬいぐるみとお話ばするの、おかしかとかって」
2067 = "「Bảo là đặt tên thì trẻ con quá này——\nhay nói chuyện với thú bông thì thật kỳ quặc này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――名前はつけるものだろう？　ぬいぐるみには。\n無論、お話もするものだ」
1623 = "「Không đâu——Thú bông thì phải được đặt tên chứ?\nTất nhiên là cũng phải nói chuyện cùng nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふぁっ」
1759 = "「Oa.」"
# monologue
# JP: 言い方。\n大人がしよるみたいな、調子あわせよるもんじゃなか！
2367 = "Cách nói đó.\nKhông phải là kiểu người lớn đang cố hùa theo đâu!"
# monologue
# JP: 普通に、自然に、そー思うとっとが、\nわたしにも、すーって伝わってくる言い方ばいっ！
2664 = "Một cách nói rất đỗi bình thường, tự nhiên, và nghĩ sao nói vậy,\nđã truyền thẳng đến mình một cách rõ ràng!"
# 【日々姫】
# display as 日日姬
# JP: 「そう、そうよねえ！　私もそぎゃんと思うのに、\nみんな、子供っぽいって、やめろっていいよっとよ」
1997 = "「Đúng, đúng vậy ha! Em cũng nghĩ vậy đó,\nthế mà mọi người cứ bảo là trẻ con, rồi bảo em bỏ đi á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……みんなとは、つまり、この蔵の人々か？」
1760 = "「À……mọi người, ý em là, những người trong xưởng rượu này sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そうばい。[くらびと,1]蔵人さんたち」
1871 = "「Đúng đó. Các thợ ủ rượu á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「やっぱりか」
2002 = "「Quả nhiên là vậy.」"
# monologue
# JP: 苦笑い、っていうんだっけ、こういう顔。\nすごく大人っぽくって、かっこよかばい。
2372 = "Vẻ mặt này, gọi là cười khổ phải không ta.\nTrông rất người lớn, và ngầu nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「僕もやられた。『右田の一員になるのだから、\n真闇さんを見習って、もっと笑顔で人と接しろ』と」
1902 = "「Anh cũng bị nói y chang. 『Vì cậu sẽ trở thành một thành viên của nhà Migita,\nnên hãy học tập Mayami, luôn tươi cười khi tiếp xúc với mọi người đi』.」"
# 【日々姫】
# display as 日日姬
# JP: 「え！？　来ていきなり！？」
1739 = "「Hả!? Mới đến mà đã bị nói vậy rồi á!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう。来ていきなり。\n恐らく、僕の愛想が足りなかったのだろう」
1982 = "「Đúng vậy. Vừa mới đến luôn.\nCó lẽ là do anh thiếu sự thân thiện chăng.」"
# monologue
# JP: どうしよう。\nそうてつさん、言われてること、わたしと似とーと。
2496 = "Làm sao đây.\nNhững gì anh Soutetsu bị nói, nghe giống hệt mình luôn."
# 【双鉄】
# display as 雙鐵
# JP: 「それが指示なら努力したいが、今はまだ見習えるほど、\n真闇さん――いや、真闇姉のことを知らんので少し困る」
1849 = "「Nếu đó là chỉ thị thì anh cũng muốn cố gắng, nhưng hiện tại,\nanh vẫn chưa hiểu rõ về chị Mayami——à không, chị Mayami đủ để học theo, nên hơi khó xử một chút.」"
# 【日々姫】
# display as 日日姬
# JP: 「まくらねぇ？」
2044 = "「Chị Mayami?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは真闇さ――真闇姉に指示された。\n『これからは家族なのだから、さん付けはよせ』と」
1797 = "「À, đó là do chị Mayami——chị Mayami đã chỉ thị cho anh.\n『Từ giờ chúng ta là gia đình rồi, nên đừng thêm chữ \"san\" vào nữa』.」"
# 【日々姫】
# display as 日日姬
# JP: 「わわわ」
1724 = "「Oa oa oa.」"
# monologue
# JP: なんか、ねぇねぇだけズルかっ！\n私も――私も……
2417 = "Sao chị Mayami lại ăn gian thế!\nMình cũng——Mình cũng……"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇ一人でおなかいっぱいだし。\nにぃにぃなんていらん、って思うとったばってん」
1650 = "「Có một mình chị Mayami thôi là em đã no bụng rồi.\nNên em cứ nghĩ là mình chẳng cần anh hai đâu.」"
# monologue
# JP: そうてつさん、すごく優しくてかっこよか。
2385 = "Anh Soutetsu, rất dịu dàng và ngầu nữa."
# monologue
# JP: 私のお話、わらったり、途中でじゃまをしたりしないで、\nぜぇんぶ、ちゃぁんと聞いてくれてる。からっ！
2362 = "Anh ấy không hề cười cợt, hay ngắt lời giữa chừng,\nmà luôn lắng nghe toàn bộ những gì mình nói. Thế nên!"
# 【日々姫】
# display as 日日姬
# JP: 「あの！　ね？　そうてつさん」
2128 = "「Nè! Dạ? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1804 = "「Ừm.」"
# 【日々姫】
# display as 日日姬
# JP: 「な、ねぇねぇと家族ばなるとやったら、\nそのっっ……ねぇねぇの妹の私とも――家族とや？」
2132 = "「N-Nếu anh trở thành gia đình với chị Mayami,\nthì……với em gái của chị ấy là em đây——cũng là gia đình chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「当然だな」
2034 = "「Tất nhiên rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「それやったら――やったら――ね？」
2142 = "「Nếu vậy thì——nếu vậy thì——nhé?」"
# monologue
# JP: 照れくさか！
2620 = "Xấu hổ quá đi!"
# monologue
# JP: けど、そうてつさんにやったら、言える。\nこん人は、絶対、私の言うこと笑ったりせんけん。
2387 = "Nhưng mà, nếu là với anh Soutetsu thì mình có thể nói được.\nNgười này, tuyệt đối sẽ không cười nhạo những gì mình nói đâu."
# 【日々姫】
# display as 日日姬
# JP: 「そうてつさんのこと。\n私――にぃにぃって呼んでもよかと？」
1911 = "「Anh Soutetsu.\nEm——gọi anh là anh hai có được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。というか、むしろ歓迎だ。\n好きなように呼んでもらえれば、それが一番気が楽だ」
2032 = "「Tất nhiên rồi. Đúng hơn là, anh rất hoan nghênh.\nEm cứ gọi theo cách em thích, như vậy là thoải mái nhất.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへ！　にぃにぃ！　ありがと！　にぃにっ♪」
1734 = "「He he! Anh hai! Cảm ơn anh! Anh hai♪」"
# 【双鉄】
# display as 雙鐵
# JP: 「どういたしまして。――っと――」
1634 = "「Không có gì. ——Vậy thì——」"
# 【日々姫】
# display as 日日姬
# JP: 「日々姫でよかよ！　呼び捨てばい！\n私、にぃにの妹やけん」
1708 = "「Cứ gọi em là Hibiki đi! Trống không luôn cũng được!\nVì em là em gái của anh hai mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。ならば日々姫。\nそのスケッチブックを、僕に見せてくれないか？」
1801 = "「Hừm. Vậy thì Hibiki.\nEm có thể cho anh xem cuốn sổ phác thảo đó được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「ぴゃうっ！！？　私、かくすの忘れたっ！？」
1725 = "「Hya!!? Mình, quên giấu đi mất rồi!?」"
# monologue
# JP: スケッチブック！　持ったまま！！\n私、びっくりしてすっかりうっかりしちゃったばいっ！
2655 = "Cuốn sổ phác thảo! Mình vẫn đang cầm trên tay!!\nDo bất ngờ quá nên mình quên khuấy đi mất!"
# 【双鉄】
# display as 雙鐵
# JP: 「隠したいのか？　ならば、すまん。\n僕は見なかったことにするから――」
1668 = "「Em muốn giấu đi sao? Vậy thì, xin lỗi nhé.\nAnh sẽ coi như chưa nhìn thấy gì——」"
# 【日々姫】
# display as 日日姬
# JP: 「ぁっ！？　ううんっ！」
1765 = "「A!? Không phải đâu!」"
# monologue
# JP: にぃにぃになら、隠したくない。\nだって――にぃにぃはきっと、笑わないから。
2517 = "Nếu là anh hai thì mình không muốn giấu.\nBởi vì——anh hai chắc chắn sẽ không cười nhạo mình đâu."
# monologue
# JP: 私のお話、ちゃあんと聞いてくれるから。
2366 = "Bởi vì anh ấy luôn lắng nghe những gì mình nói."
# 【日々姫】
# display as 日日姬
# JP: 「あの……見ていい」
2127 = "「Dạ……anh xem đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば遠慮無く」
1984 = "「Vậy sao. Vậy anh không khách sáo nhé.」"
# monologue
# JP: （ぺらっ）
2768 = "（Lật）"
# monologue
# JP: わ！　わ！　わっ！！　めくられちゃった！　\n中身、じっくり見られちゃってる！！
2431 = "Oa! Oa! Oa!! Bị lật ra rồi!\nBên trong, đang bị nhìn chằm chằm kìa!!"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1822 = "「Hô.」"
# monologue
# JP: ほうって言った！\n今、どこ？　どこ見られてるか、すごく気になる！
2373 = "Anh ấy nói \"Hô\" kìa!\nBây giờ là trang nào rồi? Anh ấy đang xem chỗ nào, tò mò quá đi mất!"
# monologue
# JP: 意識しすぎて息ぐるしくて、\n体がどんどん、ぽっぽって熱くなって来るばい！！
2531 = "Ý thức quá mức khiến mình khó thở,\ncơ thể cũng dần dần nóng bừng lên rồi!!"
# 【双鉄】
# display as 雙鐵
# JP: 「これは……見事だ。\nこの幼さで、よくもここまで――」
2109 = "「Cái này……tuyệt thật đấy.\nỞ độ tuổi này mà đã vẽ được đến mức này——」"
# monologue
# JP: はうぅ！　これ、ダメっっ！\nうずうずぞわぞわ、恥ずかしすぎてムズムズするけんっ！
2430 = "Hya! Thế này, không được đâu!\nCứ bồn chồn râm ran, xấu hổ đến mức ngứa ngáy hết cả người rồi!"
# 【双鉄】
# display as 雙鐵
# JP: 「風景画も静物画も達者だが、それらをかすませるほどに、\nくまくまの絵が素晴らしいな」
2162 = "「Tranh phong cảnh và tranh tĩnh vật đều rất giỏi, nhưng đến mức làm lu mờ cả những bức đó,\nthì bức tranh vẽ Kuma Kuma này thật sự quá xuất sắc.」"
# 【日々姫】
# display as 日日姬
# JP: 「くまくまの？」
2026 = "「Tranh Kuma Kuma ạ?」"
# monologue
# JP: 言われて、ふしぎで、ムズムズしてたのスーって消える。
2667 = "Nghe anh ấy nói vậy, cảm giác ngứa ngáy kỳ lạ bỗng chốc tan biến."
# monologue
# JP: だって、くまくまの絵ばほめられるとか、\nまるきり思うとらんかったけん。
2452 = "Bởi vì, mình hoàn toàn không nghĩ tới việc\nsẽ được khen ngợi về bức tranh vẽ Kuma Kuma."
# 【日々姫】
# display as 日日姬
# JP: 「くまくまの絵は、おしゃべりしながらの落描きとよ？\n他の絵の方が、ずうっと丁寧に描いとるばい」
2025 = "「Bức tranh Kuma Kuma chỉ là em vẽ bậy trong lúc nói chuyện thôi mà?\nNhững bức tranh khác em vẽ cẩn thận hơn nhiều đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはわかる。が、くまくまを描いた絵からは、\n伝わってくるものが多いような気がするのだ」
1943 = "「Anh hiểu chứ. Nhưng mà, từ bức tranh vẽ Kuma Kuma,\nanh có cảm giác như nó truyền tải được rất nhiều điều.」"
# 【日々姫】
# display as 日日姬
# JP: 「つたわってくる？」
1679 = "「Truyền tải được?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1805 = "「Ừ.」"
# monologue
# JP: ぽんぽんぽんって、にぃにぃの手がくまくまの頭をなでる。
2731 = "Tay anh hai xoa xoa đầu Kuma Kuma."
# monologue
# JP: うらやましいなって思ったら、すぐに私もなでてもらえる。\n……にぃにぃの手、おっきかぁ。
2527 = "Vừa mới thấy ghen tị thì ngay lập tức mình cũng được xoa đầu.\n……Tay anh hai, to thật đấy."
# 【双鉄】
# display as 雙鐵
# JP: 「くまくまを大好きだという気持ちが、伝わってくるのだ。\nだからとても暖かで、優しい……懐かしい気持ちになる」
1946 = "「Tình cảm yêu mến Kuma Kuma đã được truyền tải qua bức tranh.\nThế nên anh cảm thấy rất ấm áp, dịu dàng……và mang lại một cảm giác hoài niệm.」"
# monologue
# JP: うれしか！　すごく、こんな風にほめてもらえて――\nって、あれ？　にぃにぃ――なんか、泣きそう？
2473 = "Vui quá! Thật sự, được khen như thế này——\nỦa, ơ? Anh hai——sao trông như sắp khóc vậy?"
# monologue
# JP: あったかくて、優しくて、なつかしい気持ちになって――\nひょっとしてなにか、思い出しとーと？
2492 = "Cảm thấy ấm áp, dịu dàng, và hoài niệm——\nKhông lẽ anh ấy, đang nhớ lại chuyện gì đó sao?"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃ、平気？」
2149 = "「Anh hai, anh không sao chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや――うむ。\n無論、平気だ。なにごともない」
1767 = "「À, không——ừm.\nTất nhiên là không sao rồi. Chẳng có chuyện gì cả.」"
# 【日々姫】
# display as 日日姬
# JP: 「そっか」
1985 = "「Vậy ạ.」"
# monologue
# JP: 安心！　だってにぃに、優しか顔にもどっとるけん。
2475 = "Yên tâm rồi! Vì anh hai đã trở lại với khuôn mặt dịu dàng thường ngày."
# monologue
# JP: さっきのつらそうで泣きそうな顔、\nきっと、私の見間違えやったとね。
2409 = "Khuôn mặt đau khổ như chực khóc lúc nãy,\nchắc chắn là do mình nhìn nhầm rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、何故これほど素晴らしいスケッチブックを\n隠そうなどと……いや」
1640 = "「Nhưng mà, tại sao em lại định giấu đi\nmột cuốn sổ phác thảo tuyệt vời đến thế này……à không.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1804 = "「嗯」" 
# monologue
# JP: にぃにぃ、言わんでもわかってくれた。\nやけん、話せる。
2723 = "Dù mình chưa nói ra nhưng anh hai đã hiểu rồi.\nNên mình có thể kể được."
# 【日々姫】
# display as 日日姬
# JP: 「くまくまの絵ば一番多かこと、笑われるけん。\n見せるの、私、イヤになったばい」
1827 = "「Bởi vì em vẽ Kuma Kuma nhiều nhất nên hay bị cười nhạo.\nNên em mới đâm ra ghét cho người khác xem.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなぁ」
1696 = "「Ra là vậy.」"
# monologue
# JP: にぃにぃのまゆげが、う～ん、って寄る。
2734 = "Lông mày của anh hai nhíu lại, kiểu \"Ừm~\"."
# monologue
# JP: 形がよかけん、ほんのちょっとしか寄っとらんのに、\nすっごいなやんでるみたいな感じばしよる。
2747 = "Hình dáng rất đẹp, dù chỉ nhíu lại một chút xíu thôi,\nnhưng lại mang đến cảm giác như đang rất phiền não vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「笑われるのは、いやか？　日々姫」
1632 = "「Em ghét bị cười nhạo sao? Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1804 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ならば？　褒められることは？\n日々姫の絵を、『いい』といってもらうことはどうだ？」
2136 = "「Vậy thì? Việc được khen ngợi thì sao?\nNếu có người nói tranh của Hibiki 『đẹp』 thì em thấy thế nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「ホントにほめてもらえるのは、うれしかと。\nホントじゃないのにほめられっとは、イヤばい」
1847 = "「Nếu được khen ngợi thật lòng thì em vui lắm.\nNhưng nếu khen ngợi không thật lòng thì em ghét lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなるほど」
1695 = "「Ra là vậy, ra là vậy.」"
# monologue
# JP: ん……ってにぃにぃはちょっとだまる。
2726 = "Ưm……anh hai im lặng một chút."
# monologue
# JP: それからしゃがんで、\nそん顔ば、私のすぐ目の前に持ってくる。
2605 = "Sau đó anh ấy ngồi xổm xuống,\nvà đưa khuôn mặt ấy đến sát ngay trước mắt mình."
# 【双鉄】
# display as 雙鐵
# JP: 「うまい言い方を探したのだが。僕はどうも不器用らしい。\nだから、思うがままに言う」
1899 = "「Anh đã cố tìm cách nói cho hay. Nhưng có vẻ anh khá vụng về.\nNên anh sẽ nói đúng những gì mình nghĩ.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1804 = "「嗯」" 
# monologue
# JP: 声が、すっごく真剣やけん、\n私も、つられて真剣になる。
2368 = "Giọng nói của anh ấy cực kỳ nghiêm túc,\nkhiến mình cũng bị cuốn theo mà trở nên nghiêm túc."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の絵は魅力的だ。だから、笑われることを恐れて、\n隠してしまうのは少し、もったいないことのように思う」
1671 = "「Tranh của Hibiki rất có sức hút. Thế nên, vì sợ bị cười nhạo\nmà giấu chúng đi thì anh thấy hơi uổng phí.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぅぅ～……でも～。\nやっぱり、笑われるのは、こわくて、いやばい」
1786 = "「Ư ư~……Nhưng mà~.\nQuả nhiên, bị cười nhạo vẫn đáng sợ và đáng ghét lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、もう一歩踏み込んで考えてはみれんか？\n『日々姫の絵を見て笑うのは、どういう人間か』と」
2140 = "「Vậy thì, thử suy nghĩ sâu hơn một bước nữa xem sao?\nRằng 『Kẻ nhìn tranh của Hibiki rồi cười nhạo là loại người như thế nào』.」"
# 【日々姫】
# display as 日日姬
# JP: 「んんっ？　えっと……」
1821 = "「Hửm? Dạ thì……」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかりづらいか？　なら、逆側からならどうだろう。\n『日々姫の絵を好きになるのは、どんな人間なのか』」
1885 = "「Khó hiểu quá sao? Vậy thử nhìn từ hướng ngược lại xem.\n『Kẻ thích tranh của Hibiki là loại người như thế nào』.」"
# monologue
# JP: あ！　そっちだったら、簡単ばい！
2442 = "A! Nếu là hướng đó thì đơn giản thôi!"
# 【日々姫】
# display as 日日姬
# JP: 「私の絵ば好いてくれよる人は……きっと、私と、\n何がきれいかとか、何が楽しかかとかが、似とる人とや」
1998 = "「Những người thích tranh của em……chắc chắn là những người có cùng suy nghĩ với em\nvề việc thế nào là đẹp, thế nào là vui.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、日々姫の絵を見て笑う者は。\n何が綺麗で何が楽しいかが、日々姫と異なる者だろうさ」
2148 = "「Nếu vậy thì, những kẻ nhìn tranh của Hibiki rồi cười nhạo.\nLà những kẻ có suy nghĩ khác với Hibiki về việc thế nào là đẹp, thế nào là vui thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
1764 = "「A!」"
# monologue
# JP: わたしが、“まっこと！”って思ったの。\nにぃにぃにも多分、伝わった。
2622 = "Mình đã nghĩ là \"Đúng thật!\".\nChắc hẳn suy nghĩ đó cũng đã truyền đến anh hai rồi."
# monologue
# JP: 真剣だった目がちょこっとやわこくなって、\nぽんぽんって、もう一回頭をなでてもらえる。
2375 = "Đôi mắt nghiêm túc ban nãy đã dịu lại một chút,\nvà mình lại được xoa đầu thêm một lần nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「笑うような相手がそうした者だと理解して。\nそれでも日々姫は、まだ、笑われることが怖いか？」
2031 = "「Hiểu được những kẻ cười nhạo mình là loại người như vậy rồi.\nThì Hibiki có còn sợ bị cười nhạo nữa không?」"
# 【日々姫】
# display as 日日姬
# JP: 「ん…………うん。それでも、やっぱり」
1790 = "「Ưm…………Vâng. Dù vậy thì, quả nhiên là vẫn sợ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「誰かと分かり合えることは、恐らく尊い。\nもったいないぞ？　そのチャンスを捨ててしまうのは」
1721 = "「Việc có thể thấu hiểu một ai đó, có lẽ là một điều rất đáng quý.\nSẽ rất lãng phí đấy? Nếu em vứt bỏ cơ hội đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「う……ん」
1334 = "「Ư……m.」"
# monologue
# JP: にぃにぃの教えてくれたことはわかるばってん、\n勇気を出せる気がせんけん、声ば小さくなってしまう。
2748 = "Dù hiểu những gì anh hai dạy,\nnhưng mình không cảm thấy có dũng khí để làm theo, nên giọng nói cứ nhỏ dần."
# 【双鉄】
# display as 雙鐵
# JP: 「それでも怯えてしまうなら――\nそうだな、僕をいつでも呼ぶがいい」
2088 = "「Nếu em vẫn còn sợ hãi thì——\nĐúng rồi, cứ gọi anh bất cứ lúc nào cũng được.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃを？」
1784 = "「Gọi anh hai ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。味方が一人……変わらぬ味方が一人いるだけで、\n不思議と、怖くなくなるものだ」
1794 = "「Ừ. Chỉ cần có một đồng minh……một đồng minh không bao giờ thay đổi,\nthì thật kỳ lạ, nỗi sợ hãi sẽ tan biến mất.」"
# monologue
# JP: あ……\nまたにぃにぃ、つらそうな――さみしそうな顔。
2435 = "A……\nAnh hai lại làm ra vẻ mặt đau khổ——cô đơn đó nữa rồi."
# monologue
# JP: けど、すぐに笑顔がふわって、\nつらそうな顔を消していく。
2381 = "Nhưng ngay lập tức, một nụ cười nở rộ,\nxóa tan đi vẻ mặt đau khổ ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、日々姫が怯えたときには僕を呼べ。\n僕は日々姫に味方する。それで怯えと、戦ってみろ」
1958 = "「Vì thế, khi nào Hibiki sợ hãi thì hãy gọi anh.\nAnh sẽ đứng về phía Hibiki. Và hãy thử chiến đấu với nỗi sợ hãi đó xem sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「味方……にぃにぃが、私の味方？」
1839 = "「Đồng minh……Anh hai, là đồng minh của em sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。\n僕は、日々姫の[あに,1]義兄となったのだから」
2033 = "「Tất nhiên rồi.\nVì anh đã trở thành anh trai nuôi của Hibiki mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「それって――ずっと？\n私が、大人になってもずうっと？」
2144 = "「Vậy là——mãi mãi sao?\nKể cả khi em trở thành người lớn cũng mãi mãi sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ずっとだ。日々姫がそれを望むのならば。\nとはいえ、大人になったときには――」
1811 = "「Ừ, mãi mãi. Nếu Hibiki mong muốn điều đó.\nTuy nhiên, khi em trở thành người lớn thì——」"
# monologue
# JP: ぎゅうって、にぃにぃが目を閉じる。\n目を閉じたまま上を見る。
2741 = "Anh hai nhắm chặt mắt lại.\nVẫn nhắm mắt và ngước nhìn lên trên."
# 【双鉄】
# display as 雙鐵
# JP: 「大人になれた。その時には。\n僕の助けなど必要なくなっているだろうがな」
1972 = "「Đã trở thành người lớn. Khi đó.\nChắc em cũng chẳng cần đến sự giúp đỡ của anh nữa đâu nhỉ.」"
# monologue
# JP: そんなことなか！　って思うけん、\nそう言いたいけど、でも……
2562 = "Đâu có chuyện đó! Mình nghĩ vậy,\nvà cũng muốn nói ra như vậy, nhưng mà……"
# monologue
# JP: 言っちゃいけない、そんな気がする。\nすごく、する。
2657 = "Mình có cảm giác là không được nói ra.\nCảm giác đó rất mãnh liệt."
# 【日々姫】
# display as 日日姬
# JP: 「……にぃにぃは、私に大人になって欲しかと？」
1339 = "「……Anh hai, muốn em trở thành người lớn sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
2168 = "「っ!!」"
# monologue
# JP: ぎくって、なんだかそんな感じに、\nにぃにぃが目をあけて私ば見よる。
2729 = "Giật nảy mình, với một cảm giác như thế,\nanh hai mở mắt ra và nhìn mình."
# monologue
# JP: それから優しく……\nなんだか、申し訳無さそうな顔して、笑う。
2607 = "Sau đó anh ấy mỉm cười dịu dàng……\nnhưng lại mang một vẻ mặt có chút áy náy."
# 【双鉄】
# display as 雙鐵
# JP: 「もちろん、大人になってほしい。\n健やかに、幸せになってほしいと――願っているよ」
1941 = "「Tất nhiên là anh muốn em trở thành người lớn rồi.\nAnh mong em sẽ lớn lên thật khỏe mạnh và hạnh phúc.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん……」
1791 = "「Vâng……」"
# 【双鉄】
# display as 雙鐵
# JP: 「いずれ、そうなる。日々姫は健やかな大人になる。\n僕などいようがいまいが、必ず」
2074 = "「Rồi sẽ đến lúc như vậy thôi. Hibiki sẽ trở thành một người lớn khỏe mạnh.\nCho dù có anh ở bên hay không, nhất định là vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぁっ」
1762 = "「A.」"
# monologue
# JP: お祈りみたいな口調がイヤで、\nにぃにぃが遠くにいっちゃいそうでっ！
2515 = "Mình ghét cái giọng điệu như đang cầu nguyện đó,\nnó cứ như thể anh hai sắp đi đến một nơi thật xa vậy!"
# 【日々姫】
# display as 日日姬
# JP: 「いて欲しか！\n私、にぃにぃに味方になって欲しかとよっ！！」
1931 = "「Em muốn anh ở bên cạnh em!\nEm muốn anh hai trở thành đồng minh của em cơ!!」"
# monologue
# JP: きょとんって、した顔。\nそれからにぃには、くっくって。
2730 = "Vẻ mặt ngơ ngác.\nSau đó anh hai cười khúc khích."
# monologue
# JP: のどのおくのとこ鳴らすみたいに、\nおかしか感じに――だけどとーっても自然に、笑う。
2484 = "Như thể phát ra âm thanh từ sâu trong cổ họng,\nmột cảm giác thật kỳ lạ——nhưng lại là một nụ cười vô cùng tự nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならばそうしよう」
1986 = "「Vậy sao. Vậy thì quyết định thế đi.」"
# monologue
# JP: なんか、よかった。\nほっとする。
2714 = "Tự nhiên thấy vui ghê.\nNhẹ nhõm cả người."
# monologue
# JP: ほっとしたんなら、急にまた、\n私、怖くなっちゃう。
2344 = "Nhưng vừa mới nhẹ nhõm xong, thì đột nhiên,\nmình lại cảm thấy sợ hãi."
# 【日々姫】
# display as 日日姬
# JP: 「けど……私、おくびょうやけん。\nにぃにぃが、そばにいてくれても、それでも――」
1710 = "「Nhưng mà……em nhát gan lắm.\nCho dù anh hai có ở bên cạnh em, thì em vẫn——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、焦らせるつもりはなかった。\nすまん」
1776 = "「À, anh không định thúc ép em đâu.\nXin lỗi nhé.」"
# monologue
# JP: おっきな手。\nにぃにぃの手。
2470 = "Bàn tay to lớn.\nBàn tay của anh hai."
# monologue
# JP: 頭ばなでてもらうの、これで三回目。\nいままでで、一番あったかで一番うれしい。
2378 = "Đây là lần thứ ba mình được xoa đầu rồi.\nLần này là ấm áp nhất, và cũng là lần mình thấy vui nhất từ trước đến nay."
# 【双鉄】
# display as 雙鐵
# JP: 「何一つ焦ることはない。日々姫の時間は日々姫のもの。\n日々姫の好きに使えばそれが、一番だ」
2008 = "「Không có gì phải vội vàng cả. Thời gian của Hibiki là của Hibiki.\nHibiki cứ sử dụng theo cách mình thích, đó là điều tuyệt vời nhất.」"
# monologue
# JP: そうして、ゆっくり、ゆっくり笑って。\nにぃにぃがスケッチブックを返してくれ――あっ！！？
2604 = "Sau đó, anh ấy mỉm cười thật chậm, thật chậm.\nRồi anh hai trả lại cuốn sổ phác thảo cho mình——Á!!?"
# monologue
# JP: （バサッ！）
2767 = "（Phịch!）"
# 【稀咲】
# display as 稀咲
# JP: 「おっと、失礼」
1729 = "「Ây da, xin lỗi nhé.」"
# monologue
# JP: 痛い……っていうか？　ぶつかったっ？\n私また――にぃにぃのこと考えて、ぼーっとしとって――
2471 = "Đau quá……hay đúng hơn là? Bị đụng trúng rồi?\nMình lại——mải nghĩ về anh hai nên ngẩn người ra mất rồi——"
# 【稀咲】
# display as 稀咲
# JP: 「すまない。拾おう。\nっと……へぇ。君が描いたのかい？　見事なものだ」
1869 = "「Xin lỗi nhé. Để chị nhặt lên cho.\nÂy da……Hê. Em vẽ à? Tuyệt thật đấy.」"
# monologue
# JP: スケッチブック、落として開いちゃったとこ、\nすごくまじまじ見つめられて――って、この人！
2651 = "Cuốn sổ phác thảo bị rơi xuống và mở bung ra,\nđang bị nhìn chằm chằm——Khoan đã, người này!"
# 【日々姫】
# display as 日日姬
# JP: 「宝生、稀咲先輩――」
1865 = "「Houshou, chị Kisaki——」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクのことを知ってくれているのかい？　光栄だな」
1672 = "「Em biết chị sao? Thật vinh hạnh quá.」"
# 【日々姫】
# display as 日日姬
# JP: 「うちの学園で、先輩のこと知らない人なんていなかと\n――いません、と思います」
1905 = "「Trong trường mình, chắc không có ai là không biết đến chị đâu\n——em nghĩ là không có ai đâu ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「どうかな？　まぁ、生徒の少ない学園だからね」
1988 = "「Vậy sao? Chà, trường mình cũng ít học sinh mà.」"
# monologue
# JP: そう言いながら、\n稀咲先輩の目はスケッチブックをずっと見ている。
2644 = "Vừa nói,\nánh mắt của chị Kisaki vẫn luôn dán chặt vào cuốn sổ phác thảo."
# 【稀咲】
# display as 稀咲
# JP: 「ええと――君は」
1716 = "「Ờm——em là.」"
# 【日々姫】
# display as 日日姬
# JP: 「日々姫といいます。右田日々姫。先輩の一年後輩です」
1909 = "「Em tên là Hibiki. Migita Hibiki. Là hậu bối khóa dưới của chị ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「なら日々姫。その……他のページにも興味があるんだ。\n見てもいいかな、このスケッチブック」
2147 = "「Vậy thì Hibiki. Cái đó……chị cũng có hứng thú với những trang khác nữa.\nChị xem cuốn sổ phác thảo này được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
# 1758 = "「啊——」" 
# monologue
# JP: うなずきたいけど、怖い、やっぱり。
2537 = "Tôi muốn gật đầu, nhưng quả nhiên vẫn thấy sợ."
# monologue
# JP: にぃにぃ――\nだって、帝都に一人で行っちゃったけん。
2454 = "Anh hai——\nTại vì, anh ấy đã đi đến Đế đô một mình mất rồi."
# 【日々姫】
# display as 日日姬
# JP: 「ずっと……味方してくれるって言ったのに」
1653 = "「Rõ ràng đã nói là……sẽ mãi mãi đứng về phía em mà.」"
# monologue
# JP: それでもやっぱり、\nにぃにぃが教えてくれたこと、私の中に残っとる。
2351 = "Dù vậy thì quả nhiên,\nnhững gì anh hai đã dạy vẫn luôn ở lại trong tôi."
# monologue
# JP: 稀咲先輩が、私の絵ば好きになってくれるなら……\n思うと、勇気。じわじわだけど、湧いてくる。
2504 = "Nếu chị Kisaki thích những bức tranh của mình……\nNghĩ vậy, dũng khí trong tôi bắt đầu dâng lên từng chút một."
# 【稀咲】
# display as 稀咲
# JP: 「ん？」
1820 = "「Hửm?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、いえっ！　もちろん見ても良か――んんっ、\nいいです、どうぞ、見てくださいっ！」
1769 = "「À, không ạ! Tất nhiên là chị có thể xe——ưm,\nđược ạ, xin mời chị xem!」"
# monologue
# JP: 言葉。\n稀咲先輩もにぃにぃと同じで、とても綺麗な標準語。
2696 = "Ngôn từ.\nChị Kisaki cũng giống như anh hai, nói tiếng phổ thông rất hay."
# monologue
# JP: 私も真似する。\nずっと練習してきたことだし――できるはず。
2520 = "Mình cũng sẽ bắt chước.\nMình đã luyện tập suốt rồi mà——chắc chắn sẽ làm được."
# 【日々姫】
# display as 日日姬
# JP: 「見てください。\nその絵、全部――私が描きたいって思った物です」
2098 = "「Chị xem đi ạ.\nNhững bức tranh đó, tất cả——đều là những thứ mà em muốn vẽ.」"
# 【稀咲】
# display as 稀咲
# JP: 「だろうね。\nでなければ、こんなに生き生きとは感じない気がする」
1891 = "「Chắc là vậy rồi.\nNếu không thì chị nghĩ chúng sẽ không sống động đến thế này đâu.」"
# monologue
# JP: ぺらり、ぺらり、スケッチブックがめくられる。
2653 = "Xoạt, xoạt, cuốn sổ phác thảo được lật qua từng trang."
# 【稀咲】
# display as 稀咲
# JP: 「ああ、この人物画……クロッキーは凄くいい。\nあくびの瞬間だなんて、ボクは描かれたくないけれど」
1783 = "「A, bức chân dung này……bức ký họa này tuyệt thật đấy.\nDù chị không muốn bị vẽ lại trong khoảnh khắc đang ngáp đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「……ぁぅっ」
1333 = "「……A.」"
# monologue
# JP: あああ、そうだ。このスケッチブック、\nにぃにぃを描いたのも、ちょこちょこ入ってるヤツだった。
2440 = "Aaa, đúng rồi. Cuốn sổ phác thảo này,\ncũng có lác đác vài bức mình vẽ anh hai nữa."
# monologue
# JP: 照れくさいけど、すごく嬉しい。\nにぃにぃの絵、自分でも生き生き描けてると思うし。
2746 = "Tuy có hơi ngại, nhưng mình rất vui.\nBởi vì bản thân mình cũng thấy những bức vẽ anh hai rất sống động."
# 【稀咲】
# display as 稀咲
# JP: 「この人は――日々姫のご家族かな？　お兄さん？」
2111 = "「Người này là——người nhà của Hibiki sao? Anh trai à?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ……」
# 1758 = "「啊——」" 
# monologue
# JP: 大正解。\nけど、すぐに正解されちゃったのが、ちょこっと悔しい。
2478 = "Quá chuẩn xác.\nNhưng mà bị đoán trúng ngay tắp lự thế này thì có hơi ấm ức chút xíu."
# 【日々姫】
# display as 日日姬
# JP: 「どうでしょう？　彼氏、とかだと思いませんか？」
1890 = "「Chị nghĩ sao ạ? Chị không nghĩ đây là bạn trai em các thứ sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「彼氏だったら、問題だな」
2083 = "「Nếu là bạn trai thì có vấn đề đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！！？」
1732 = "「Hả!!?」"
# monologue
# JP: どぎゃんして――じゃない、どうしてですかって、\n聞くより早く、稀咲先輩が笑って答えを教えてくれる。
2554 = "Răng lại rứa——à không, tại sao lại vậy ạ,\nchưa kịp hỏi thì chị Kisaki đã cười và cho tôi câu trả lời."
# 【稀咲】
# display as 稀咲
# JP: 「これほどに素顔をさらけだせる相手だよ？\nもし恋人なら、よほどに深い関係だろうと思うから」
2110 = "「Là người có thể phơi bày khuôn mặt mộc mạc đến nhường này cơ mà?\nNếu là người yêu thì chị nghĩ hai người phải có mối quan hệ vô cùng sâu sắc đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！？」
1727 = "「Hả!?」"
# monologue
# JP: ふか、ふかっ、ふかっ、深い関係って、かんけーって！
2681 = "Sâu, sâu, sâu, mối quan hệ sâu sắc á!"
# monologue
# JP: そんなこと、私ぜんっぜん思いもよらんし、\n思っても、こんなにさらっと、絶対いえんしっ！！
2511 = "Chuyện đó, mình hoàn toàn chưa từng nghĩ tới luôn á,\nmà dù có nghĩ tới thì cũng tuyệt đối không thể nói ra nhẹ bẫng như vậy được đâu!!"
# 【日々姫】
# display as 日日姬
# JP: 「大人っぽい……かっこ良かっ――んっ！\nかっこいいです、稀咲先輩っ！」
1840 = "「Người lớn quá……ngầu qu——ưm!\nNgầu quá đi mất, chị Kisaki!」"
# 【稀咲】
# display as 稀咲
# JP: 「いいや、日々姫。格好いいのはキミの方さ」
1642 = "「Không đâu, Hibiki. Ngầu là em mới đúng.」"
# 【日々姫】
# display as 日日姬
# JP: 「ええっ！？」
1733 = "「Ể!?」"
# monologue
# JP: イヤミとか、稀咲先輩が言うなんてとても思えない。\nけど、私なんてちんちくりんだし……
2518 = "Mình không nghĩ chị Kisaki lại nói mỉa mai đâu.\nNhưng mà, mình thì lùn tịt thế này……"
# monologue
# JP: にぃにぃが行っちゃってから、\nずっと、うじうじしちゃってるし――
2666 = "Từ khi anh hai rời đi,\nmình cứ ủ rũ suốt thôi——"
# 【稀咲】
# display as 稀咲
# JP: 「キミには、人を豊かな気持ちにできる才能がある。\n学園祭、キミの絵がどれほど話題になるか楽しみだ」
1667 = "「Em có tài năng làm phong phú thêm tâm hồn người khác đấy.\nThật mong chờ xem tranh của em sẽ trở thành chủ đề bàn tán thế nào trong lễ hội trường.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぇぅっ」
1728 = "「A.」"
# 【稀咲】
# display as 稀咲
# JP: 「いや、待て――君は、右田と言ったな？\nこの町で右田といえば……」
1646 = "「Khoan đã——em nói em họ Migita sao?\nỞ thành phố này, nhắc đến họ Migita thì……」"
# 【日々姫】
# display as 日日姬
# JP: 「は、はい。そうです。\nその……酒蔵の右田で、間違いないです」
1815 = "「V-vâng. Đúng rồi ạ.\nLà……nhà Migita làm xưởng rượu đó ạ.」"
# monologue
# JP: 答えた瞬間、\n稀咲先輩の指が“ふむ”って、形のいい顎に沿わされる。
2526 = "Khoảnh khắc tôi trả lời,\nngón tay của chị Kisaki lướt dọc theo chiếc cằm thanh tú, kiểu \"Hừm\"."
# 【稀咲】
# display as 稀咲
# JP: 「だったら何故――ああいや、最近転校してきたとか？」
2145 = "「Nếu vậy thì tại sao——à không, hay là em mới chuyển trường đến?」"
# 【日々姫】
# display as 日日姬
# JP: 「転校、私したことないです。\nずっと、この学園で」
1938 = "「Em chưa từng chuyển trường bao giờ ạ.\nEm vẫn luôn học ở ngôi trường này.」"
# 【稀咲】
# display as 稀咲
# JP: 「キミがずっとこの学園の生徒なら……\n今までの学園祭で、いったい何をしていたんだい？」
1843 = "「Nếu em vẫn luôn là học sinh của trường này……\nthì trong các kỳ lễ hội trường từ trước đến nay, em đã làm cái gì vậy?」"
# monologue
# JP: うう……言いづらか。\nけど、稀咲先輩――
2447 = "Ư ư……Khó nói quá đi.\nNhưng mà, chị Kisaki——"
# monologue
# JP: きっと、私、と似とるところがどっかあるから――\nだから、私の絵ば気に入ってくれたと思うから……
2669 = "Chắc chắn là vì chị ấy có điểm gì đó giống với mình——\nNên chị ấy mới thích tranh của mình……"
# 【日々姫】
# display as 日日姬
# JP: 「美術部、私……入ってなか――じゃない。\nええと、入って、けど、すぐやめちゃったんです」
1937 = "「Câu lạc bộ Mỹ thuật, em……không có tham——à không.\nỜm, em có tham gia, nhưng rồi nghỉ ngay sau đó ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「何故？」
2016 = "「Tại sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「少等部の一年のとき――入って、お絵描きして。\nそしたら、なんか……みんな、すごく、笑って――」
1922 = "「Hồi năm nhất Tiểu học bộ——em tham gia, rồi vẽ tranh.\nSau đó, kiểu như……mọi người, cười rất nhiều——」"
# monologue
# JP: 単純な絵、って。私、ちいちゃかったのに。
2365 = "Bảo là tranh vẽ đơn giản quá. Dù lúc đó mình còn rất nhỏ."
# monologue
# JP: 深みがないとか、見たままだとか……\nいろんなこと、なんか、いっぱいいっぱい言われて。
2713 = "Nào là không có chiều sâu, nào là thấy sao vẽ vậy……\nĐủ thứ chuyện, bị nói này nói nọ rất nhiều."
# 【稀咲】
# display as 稀咲
# JP: 「くだらない連中だな。いや――別の見方をするなら、\n日々姫の才能は、幼いころから飛び抜けていたのだな」
2039 = "「Đúng là một đám vô bổ. Không——Nếu nhìn từ góc độ khác,\nthì tài năng của Hibiki đã vô cùng xuất chúng từ khi còn nhỏ rồi nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
1745 = "「Hả?」"
# 【稀咲】
# display as 稀咲
# JP: 「覚えておくといい、日々姫。人が他者を攻撃するのは、\n何か奪おうとしているからか、相手を恐れているからだ」
2089 = "「Nhớ kỹ điều này nhé, Hibiki. Khi con người tấn công một ai đó,\nmột là vì họ muốn cướp đoạt thứ gì đó, hai là vì họ đang sợ hãi đối phương.」"
# 【日々姫】
# display as 日日姬
# JP: 「奪おうとするか……恐れてる、から」
1893 = "「Muốn cướp đoạt……hoặc là vì sợ hãi, sao ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「その連中は、日々姫の才能を恐れたのだ。だから、\n攻撃して追い払い、自分達の居場所を守ろうとした」
2125 = "「Đám người đó đã sợ hãi tài năng của Hibiki. Thế nên,\nhọ mới tấn công để xua đuổi em, nhằm bảo vệ chốn dung thân của chính mình.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　なんで、そんな――」
1748 = "「Hả? Tại sao lại phải làm vậy——」"
# 【稀咲】
# display as 稀咲
# JP: 「ビーズの粒を比べ合うのは楽しいことだ。が、そこに\nダイヤの粒が混じってしまえば、その楽しさは色褪せる」
2005 = "「Việc so kè xem hạt cườm nào đẹp hơn thì rất vui. Nhưng nếu\ncó một viên kim cương lọt vào giữa, thì niềm vui đó sẽ phai nhạt mất.」"
# 【日々姫】
# display as 日日姬
# JP: 「…………」
1325 = "「…………」"
# monologue
# JP: 才能……それで、ビーズと、ダイヤ。\n稀咲先輩の例え話は、極端すぎって思うけど――
2566 = "Tài năng……Rồi thì, hạt cườm, và kim cương.\nMình thấy câu chuyện ví von của chị Kisaki hơi quá đà thì phải——"
# monologue
# JP: だけど、なんだか、\n少しわかっちゃうような気がして、黙るしかない。
2384 = "Nhưng mà, không hiểu sao,\nmình lại có cảm giác như hơi hiểu ra vấn đề, nên đành im lặng."
# monologue
# JP: （だって私……\n美術部のこと、ときどき横目で見てたから）
2770 = "（Bởi vì mình……\nthỉnh thoảng vẫn hay liếc nhìn về phía Câu lạc bộ Mỹ thuật mà）"
# monologue
# JP: 全員が全員、そうじゃないけど。\n絵を描くことが好きな人、もちろんいるけど――
2745 = "Không phải tất cả mọi người đều như vậy.\nTất nhiên cũng có những người thực sự thích vẽ tranh——"
# 【稀咲】
# display as 稀咲
# JP: 「絵を描くことより、“絵を描いている自分”の方が好き。\nそうした者が、本物の絵描きに出会えば、それは怯える」
2004 = "「Họ thích \"bản thân mình đang vẽ tranh\" hơn là việc vẽ tranh.\nNhững kẻ như vậy, khi gặp phải một họa sĩ thực thụ, thì sẽ sợ hãi thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！」
# 2168 = "「！！」" 
# monologue
# JP: ああ、そっか。そうだったんだ。\n今ので私、多分――わかった。
2446 = "À, ra là vậy. Thì ra là thế.\nBây giờ thì mình, có lẽ——đã hiểu rồi."
# monologue
# JP: 今までずうっとモヤモヤしてたの、\n違和感みたいなザラっとしてたの……それだったんだ。
2355 = "Cảm giác mơ hồ từ trước đến nay,\ncảm giác lợn cợn như một sự không tự nhiên đó……thì ra là vì vậy."
# 【稀咲】
# display as 稀咲
# JP: 「そんな連中にわずらわされるのは、確かに面倒だろうね。\nが……日々姫はもっと、絵を発表していくべきだよ」
2081 = "「Việc bị đám người đó làm phiền đúng là phiền phức thật.\nNhưng mà……Hibiki nên công bố tranh của mình nhiều hơn nữa đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ぁっ――」
# 1758 = "「啊——」" 
# monologue
# JP: 三人目。\nにぃにぃと、ねぇねぇと……それから、稀咲先輩と。
2711 = "Người thứ ba.\nAnh hai, chị Mayami……và rồi, chị Kisaki."
# monologue
# JP: “絵をもっと人に見せろ”って、\n私に、言ってくれた人。
2596 = "Là những người đã nói với mình rằng,\n\"Hãy cho mọi người xem tranh của em nhiều hơn nữa đi\"."
# 【稀咲】
# display as 稀咲
# JP: 「ならば、うん。\nどうかな日々姫。ボクとふたりで同好会を作らないか？」
2146 = "「Nếu vậy thì, ừm.\nThấy sao hả Hibiki. Em có muốn cùng chị lập một hội đồng hào không?」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　同好会って――」
1737 = "「Hả!? Hội đồng hào là——」"
# 【稀咲】
# display as 稀咲
# JP: 「日々姫の絵を発表できる場を作るのさ。\n二人では部は作れないが、同好会なら設立できる」
1694 = "「Tạo ra một nơi để có thể công bố tranh của Hibiki ấy mà.\nHai người thì không thể lập câu lạc bộ được, nhưng hội đồng hào thì được.」"
# 【日々姫】
# display as 日日姬
# JP: 「なんで……ええと……そんな」
2015 = "「Tại sao……ờm……lại như vậy.」"
# monologue
# JP: だって、知ってる。\n稀咲先輩、銀行でもうお仕事してて、凄く忙しい人だって。
2453 = "Bởi vì, mình biết chứ.\nChị Kisaki đã đi làm ở ngân hàng rồi, là một người vô cùng bận rộn."
# 【日々姫】
# display as 日日姬
# JP: 「私、だって、会ったばっかりで。\n同好会って……お誘い、すごく嬉しいです、けどっ」
1712 = "「Bởi vì, chúng ta mới chỉ vừa gặp nhau thôi mà.\nHội đồng hào thì……lời mời này, em rất vui, nhưng mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクは銀行の人間だ。銀行とは、経済の循環を助け、\n地域の発展を促し、人を豊かにする使命を持つ」
1935 = "「Chị là người của ngân hàng. Ngân hàng có sứ mệnh giúp lưu thông kinh tế,\nthúc đẩy sự phát triển của khu vực, và làm cho con người trở nên giàu có.」"
# monologue
# JP: いきなりすぎて、\n何の話がはじまったかってびっくりしちゃう。
2468 = "Chuyển chủ đề đột ngột quá,\nkhiến mình giật mình không hiểu chị ấy đang nói về chuyện gì."
# 【稀咲】
# display as 稀咲
# JP: 「その観点では、日々姫の絵には、経済的な価値がある。\nだから、流通を助けることは、ボクの使命とも考えられる」
1886 = "「Từ quan điểm đó, tranh của Hibiki có giá trị kinh tế.\nVì vậy, việc giúp nó lưu thông cũng có thể coi là sứ mệnh của chị.」"
# 【日々姫】
# display as 日日姬
# JP: 「は……い」
# 1791 = "「嗯……」" 
# monologue
# JP: それなら、わかる。っていうか、私……\n経済的な価値、だとか、産まれて初めて言ってもらった。
2710 = "Nếu là vậy thì mình hiểu rồi. Đúng hơn là, mình……\nđây là lần đầu tiên từ lúc sinh ra được người khác bảo là có giá trị kinh tế."
# monologue
# JP: 誇らしくって嬉しくて――\n嬉しすぎてちょっと、勇気が出てくる。
2494 = "Vừa tự hào vừa vui sướng——\nVui quá đỗi khiến dũng khí trong mình cũng bắt đầu trỗi dậy."
# 【日々姫】
# display as 日日姬
# JP: 「あの、“その観点では”――って、\nええと、もしも、他にもあるなら、観点」
2129 = "「À, chị nói \"từ quan điểm đó\"——nghĩa là,\nờm, nếu như, vẫn còn quan điểm nào khác nữa thì sao ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「もちろんあるよ？\nもっと単純で――単純だから強いものが」
2035 = "「Tất nhiên là có rồi?\nMột thứ đơn giản hơn——và chính vì đơn giản nên nó rất mạnh mẽ.」"
# monologue
# JP: そっ、って、優しく。\n稀咲先輩の手が、私のスケッチブックに触れる。
2643 = "Nhẹ nhàng, đầy dịu dàng.\nBàn tay của chị Kisaki chạm vào cuốn sổ phác thảo của mình."
# 【稀咲】
# display as 稀咲
# JP: 「ボクは、君の絵を好きになった。\n好きで素敵な物だから、たくさんの人に見てもらいたい」
1920 = "「Chị đã thích tranh của em mất rồi.\nVì thích và thấy nó tuyệt vời, nên chị muốn cho thật nhiều người xem.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
# 1764 = "「啊！」" 
# 【稀咲】
# display as 稀咲
# JP: 「だから――突然の話で、ボクのわがままだとは承知だ。\nそれでも、考えてみて欲しい」
1954 = "「Vì vậy——chị biết chuyện này quá đột ngột, và cũng là sự ích kỷ của chị.\nDù vậy, chị vẫn muốn em suy nghĩ thử xem.」"
# 【日々姫】
# display as 日日姬
# JP: 「あの、私っ！」
2131 = "「Dạ, em!」"
# monologue
# JP: にぃにぃがいなくなっちゃって、稀咲先輩と今、出会えて。\nにぃにぃが教えてくれたこと、本当だって今、わかった。
2740 = "Anh hai không còn ở đây nữa, và giờ mình đã gặp được chị Kisaki.\nBây giờ mình mới nhận ra, những gì anh hai dạy đều là sự thật."
# monologue
# JP: （味方がいると……一人、味方が出来てくれると……\n勇気、どんどん湧いてくるんだ）
2763 = "（Khi có đồng minh……chỉ cần có một đồng minh xuất hiện……\nthì dũng khí sẽ không ngừng tuôn trào）"
# monologue
# JP: だから、言える。\n背筋を伸ばして、お願いできる。
2557 = "Thế nên, mình có thể nói ra.\nCó thể ưỡn thẳng lưng và mở lời nhờ vả."
# 【日々姫】
# display as 日日姬
# JP: 「作りたいです。私、すごく。\n稀咲先輩と一緒に、絵を描いて、発表する同好会を」
1927 = "「Em muốn lập ạ. Em rất muốn.\nMột hội đồng hào để cùng vẽ và công bố tranh với chị Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。じゃあ、そうしよう」
1800 = "「Ừm. Vậy thì quyết định thế nhé.」"
# monologue
# JP: 右手――稀咲先輩が差し出してくれる。
2420 = "Tay phải——chị Kisaki đưa ra."
# monologue
# JP: 鉛筆の粉、つけちゃ悪いって思うから、\nスカートの端でパってはたいて、それから受け取る。
2535 = "Sợ làm dính bụi chì lên tay chị ấy thì không hay,\nnên mình phủi tay vào vạt váy mấy cái rồi mới nắm lấy."
# 【日々姫】
# display as 日日姬
# JP: 「そうします！　\n稀咲先輩、これから、よろしくお願いします！」
1809 = "「Quyết định vậy đi ạ!\nChị Kisaki, từ nay mong chị giúp đỡ nhiều hơn!」"
# 【稀咲】
# display as 稀咲
# JP: 「こちらこそ、よろしく！　日々姫」
1933 = "「Chị cũng vậy, mong em giúp đỡ! Hibiki.」"
# 【ハチロク】
# display as ？？？
# JP: 「日々姫！　日々姫！　朝です、日々姫！」
1974 = "「Hibiki! Hibiki! Sáng rồi, Hibiki!」"
# 【日々姫】
# display as 日日姬
# JP: 「ふぇっ？」
1720 = "「Hả?」"
# 【ハチロク】
# display as 八六
# JP: 「珍しいですね、日々姫が寝坊するなんて」
1971 = "「Hiếm thấy thật đấy, Hibiki mà lại ngủ nướng cơ.」"
# 【日々姫】
# display as 日日姬
# JP: 「私？　寝坊……あ」
1952 = "「Em á? Ngủ nướng……A.」"
# monologue
# JP: ああ、そうだ。\n私、昨夜――
2444 = "À, đúng rồi.\nĐêm qua mình——"
# 【ハチロク】
# display as 八六
# JP: 「あら、日々姫もなのですか？」
1731 = "「Ô kìa, Hibiki cũng vậy sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
# 1745 = "「哎？」" 
# 【ハチロク】
# display as 八六
# JP: 「双鉄様と同じ症状です。\n唇をしきりに撫ぜて気にして」
1690 = "「Giống hệt triệu chứng của ngài Soutetsu.\nCứ liên tục sờ môi và tỏ ra bận tâm.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！！？」
# 2169 = "「！！？」" 
# 【ハチロク】
# display as 八六
# JP: 「空気が乾燥しているのでしょうかね？　この部屋も」
2159 = "「Không lẽ không khí bị khô sao ta? Cả căn phòng này nữa.」"
# monologue
# JP: ハチロクがきょろきょろあたりを見回す。\n乾燥なんてしていない。ここも、多分にぃにぃの部屋も。
2392 = "Hachiroku nhìn ngó xung quanh.\nĐâu có khô hanh gì đâu. Cả phòng này, và chắc là cả phòng anh hai nữa."
# monologue
# JP: にぃにぃ――\nにぃにぃも、唇……唇、気にしとったとか！
2720 = "Anh hai——\nAnh hai cũng, bận tâm đến môi……đến môi sao!"
# 【ハチロク】
# display as 八六
# JP: 「ワセリンを差し上げたいのですけれど――\nわたくしの持っている物には錆止めが入っているのです」
1928 = "「Em rất muốn đưa cho chị một ít vaseline——\nnhưng loại em đang dùng lại có chứa chất chống rỉ sét mất rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うきゃあああああああっっ！」
1785 = "「U kyaaaaaa!」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！？」
# 2169 = "「！！？」" 
# monologue
# JP: 恥ずかしかばいっ！　　\nだけど、嬉しかっ！
2662 = "Xấu hổ quá đi mất!\nNhưng mà, cũng vui lắm!"
# monologue
# JP: 私、昨日――\nだって、なんかもうテンションいっぱいいっぱいでっ！！
2541 = "Hôm qua mình——\nBởi vì, cảm xúc lúc đó cứ như bùng nổ đến nơi ấy!!"
# 【ハチロク】
# display as 八六
# JP: 「ど、どうしたのですか？　布団の上を転がりまわって。\nはっ！？　もしや傷口から寄生虫が入って脳にまでっ！」
1888 = "「S-sao vậy ạ? Chị cứ lăn lộn trên giường thế.\nHả!? Không lẽ ký sinh trùng từ vết thương đã chui vào tận não rồi!」"
# 【日々姫】
# display as 日日姬
# JP: 「ふえっ！？　なにそれっ」
1742 = "「Hả!? Gì vậy chứ.」"
# 【ハチロク】
# display as 八六
# JP: 「あ、受け答えができるなら違いますね。よかった」
1780 = "「À, vẫn trả lời được thì chắc không phải rồi. May quá.」"
# 【日々姫】
# display as 日日姬
# JP: 「寄生虫とかそぎゃん――んんっ、\nそんなこと、あるわけないじゃない」
1860 = "「Ký sinh trùng các thứ——ưm,\nlàm gì có chuyện đó chứ.」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ？　実際あったのです。\nわたくしの\x%l帝鉄;#00ffc040;帝鉄%l;#;時代、帝央\x%l保線;#00ffc040;保線%l;#;区の\x%l保線;#00ffc040;保線%l;#;夫さんが」
1629 = "「Không đâu? Thực tế là có chuyện đó đấy ạ.\nHồi em còn ở \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;, một nhân viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#; ở khu \\x%l保線;#00ffc040;bảo trì%l;#; Teio đã bị...」"
# 【日々姫】
# display as 日日姬
# JP: 「やめてやめてやめて！　\n朝からそげな怖い話で脅かさんでっ！！」
1692 = "「Thôi thôi thôi!\nĐừng có dọa người ta bằng mấy câu chuyện đáng sợ đó ngay từ sáng sớm chứ!!」"
# 【ハチロク】
# display as 八六
# JP: 「脅かしてなどおりません。\n日々姫を心配しているのです」
2007 = "「Em đâu có dọa chị.\nEm đang lo lắng cho Hibiki mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1762 = "「啊」" 
# monologue
# JP: ハチロクの目、本当にすごく心配そう。\n私のこと、包むみたいにじいっと見てる。
2396 = "Ánh mắt của Hachiroku, thực sự trông rất lo lắng.\nNhìn chằm chằm vào mình, như muốn bao bọc lấy mình vậy."
# 【ハチロク】
# display as 八六
# JP: 「寝坊など、日々姫には珍しいことですのに……\nここ数日で、二度もですから」
1828 = "「Ngủ nướng là chuyện hiếm thấy ở Hibiki mà……\nVậy mà trong vài ngày qua, chị đã ngủ nướng tận hai lần rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん……ありがと。ごめん」
1752 = "「Ừm……cảm ơn em. Chị xin lỗi.」"
# monologue
# JP: 寝坊で心配かけちゃったのに、\nその上、奇声でお布団ごろごろ。
2591 = "Đã làm em ấy lo lắng vì ngủ nướng rồi,\nmà mình còn phát ra âm thanh kỳ quái rồi lăn lộn trên giường nữa chứ."
# monologue
# JP: 私、ちょっと浮かれすぎてた。
2544 = "Mình có hơi đắc ý quá đà rồi."
# 【日々姫】
# display as 日日姬
# JP: 「寝坊は、大した理由じゃないの。\n夢……ああ、そう。わたし、夢を、見てて」
2046 = "「Ngủ nướng không phải vì lý do gì to tát đâu.\nGiấc mơ……À, đúng rồi. Chị đã mơ thấy.」"
# 【ハチロク】
# display as 八六
# JP: 「夢、ですか？」
1676 = "「Giấc mơ sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。昔の夢」
1803 = "「Ừm. Một giấc mơ về ngày xưa.」"
# monologue
# JP: 言ったら、少し――少しずつ。\n散りかけていた夢のかけらが、色と形を取り戻してくる。
2510 = "Vừa nói ra, một chút——từng chút một.\nNhững mảnh vỡ giấc mơ tưởng chừng đã tan biến dần lấy lại được màu sắc và hình dáng."
# 【日々姫】
# display as 日日姬
# JP: 「懐かしくって、優しくて。\nだけどちょっぴり、厳しい夢」
1960 = "「Vừa hoài niệm, vừa dịu dàng.\nNhưng cũng có chút nghiêm khắc.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは――夢というものを見ないのですが」
2155 = "「Em thì——không bao giờ nằm mơ cả.」"
# monologue
# JP: 興味深そうなハチロクの声。
2398 = "Giọng nói của Hachiroku nghe có vẻ rất hứng thú."
# 【ハチロク】
# display as 八六
# JP: 「不思議で面白いお話ですね。\n優しいのに、厳しいのですか」
2041 = "「Thật là một câu chuyện kỳ lạ và thú vị.\nDịu dàng mà lại nghiêm khắc sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「そうなの。だって――教えてくれた夢だから。\n私がどんなに甘えっ子で、甘やかしてもらえてるかって」
1991 = "「Đúng vậy. Bởi vì——đó là giấc mơ đã dạy cho chị biết.\nRằng chị là một đứa trẻ thích làm nũng, và đã được nuông chiều đến mức nào.」"
# 【ハチロク】
# display as 八六
# JP: 「夢は、何かを教えてくれるものなのですか」
1675 = "「Giấc mơ là thứ có thể dạy cho chúng ta điều gì đó sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん――ああ。\nそうだね、そう」
1788 = "「Ừm——A.\nĐúng rồi nhỉ, đúng là vậy.」"
# monologue
# JP: 意識せず言った言葉が、気づかせてくれる。
2512 = "Những lời vô thức nói ra đã giúp tôi nhận ra."
# monologue
# JP: あの夢は、私の中の、とっても声の小さな私が、\nきっと、呼びかけて見せてくれたものなんだって。
2709 = "Giấc mơ đó, chắc chắn là do một bản ngã với tiếng nói vô cùng nhỏ bé bên trong tôi,\nđã cất tiếng gọi và cho tôi thấy."
# 【日々姫】
# display as 日日姬
# JP: 「ときどきだけど、そういう大事な夢も見る。かな。\n見落としてたり、目をそらしてたりを、教えてくれる夢」
2000 = "「Dù chỉ thỉnh thoảng thôi, nhưng chắc là chị cũng có những giấc mơ quan trọng như vậy.\nNhững giấc mơ chỉ cho chị biết những điều chị đã bỏ sót, hay những điều chị đang cố tình lảng tránh.」"
# 【ハチロク】
# display as 八六
# JP: 「……日々姫の寝坊は幸せな寝坊だったのですね」
1337 = "「……Việc ngủ nướng của Hibiki quả là một giấc ngủ nướng hạnh phúc nhỉ.」"
# monologue
# JP: ハチロクが笑ってくれる。\nほわんって、すごく安心したみたいに。
2400 = "Hachiroku mỉm cười.\nMột nụ cười nhẹ nhõm, như thể đã rất an tâm."
# 【ハチロク】
# display as 八六
# JP: 「それならば、遠慮をせずに言いますが。\n日々姫は、いつまで寝巻きでいるつもりなのですか？」
2138 = "「Nếu vậy thì, em xin phép nói thẳng nhé.\nHibiki định mặc đồ ngủ đến bao giờ đây ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1738 = "「Hả!?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様もご心配され、朝食も取らず、\n下で待ってらっしゃるのですよ？」
2156 = "「Ngài Soutetsu cũng đang rất lo lắng, ngài ấy còn chưa ăn sáng,\nmà vẫn đang đợi chị ở dưới nhà đấy ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　うそっ！！？　待ってくれてるの！？」
1744 = "「Hả!? Thật á!!? Anh ấy đang đợi chị sao!?」"
# 【ハチロク】
# display as 八六
# JP: 「わたくし、ウソなど申しませんが」
1930 = "「Em không bao giờ nói dối đâu ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、ごめん。そういう意味じゃなくって、\nホントなことはわかってて、えとっ！」
1775 = "「À, xin lỗi. Ý chị không phải vậy,\nchị biết là thật mà, ờm!」"
# monologue
# JP: あわわ、ダメっ！\n慌てたら余計に時間を無駄にしちゃうから！！
2438 = "Awa wa, không được!\nCàng luống cuống thì càng làm lãng phí thời gian thôi!!"
# monologue
# JP: 落ち着くときこそ慌てて――じゃないっ！\n慌ててるときこそ、落ち着いて――うんっ！
2407 = "Lúc bình tĩnh mới cần luống cuống——Không phải!\nLúc luống cuống mới cần bình tĩnh——Đúng rồi!"
# 【日々姫】
# display as 日日姬
# JP: 「ハチロク、兄さんに伝えてくれる？\nあと五分したら伺いますって」
1685 = "「Hachiroku, em chuyển lời cho anh trai giúp chị được không?\nBảo là năm phút nữa chị sẽ xuống.」"
# monologue
# JP: 布団をあげて、着替えて、身なりを整えて。
2552 = "Gấp chăn nệm, thay quần áo, chỉnh đốn lại trang phục."
# monologue
# JP: ――居間に入れば、兄さんがすぐに顔をあげる。
1320 = "——Vừa bước vào phòng khách, anh trai liền ngẩng mặt lên."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクから話は聞いた。\n体調には問題ないのか？」
1944 = "「Anh nghe Hachiroku nói rồi.\nSức khỏe của em không sao chứ?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、元気です。\nご心配かけてすみません」
1818 = "「Vâng, em khỏe ạ.\nXin lỗi vì đã làm anh lo lắng.」"
# monologue
# JP: にぃにぃが笑う。優しくて、なんかいつもどおりだ。\n……唇、全然触ってないし。
2738 = "Anh hai mỉm cười. Dịu dàng, và có vẻ như mọi khi.\n……Anh ấy chẳng sờ môi gì cả."
# monologue
# JP: ちょっと残念な気もしちゃうけど、\nすごく、安心な感じもしてる。
2656 = "Cảm thấy hơi tiếc một chút,\nnhưng cũng cảm thấy rất an tâm."
# 【双鉄】
# display as 雙鐵
# JP: 「良い夢を見たと聞いたが？」
2075 = "「Nghe nói em đã có một giấc mơ đẹp à?」"
# 【日々姫】
# display as 日日姬
# JP: 「は、はいっ！　あのっ、くまくまの、夢とかっ」
1772 = "「V-vâng! Dạ, giấc mơ về Kuma Kuma các thứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「くまくま君か。懐かしいな。\n最近、とんと姿を見ないが」
2023 = "「Kuma Kuma sao. Hoài niệm thật đấy.\nDạo này chẳng thấy bóng dáng đâu cả.」"
# 【日々姫】
# display as 日日姬
# JP: 「あのっ、つぎはぎだらけで、\n結構、くたびれちゃったから」
1817 = "「Dạ, tại vì chắp vá nhiều quá,\nnên trông khá tơi tả rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1804 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「だから今は、クローゼットで、\n私のお洋服の、番人――[ばんくま,1]番熊、してくれてます」
1956 = "「Thế nên bây giờ, em ấy đang ở trong tủ quần áo,\nlàm người canh giữ——gấu canh giữ quần áo cho em rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはいいな。頼もしい。\nくまくま君にも、やりがいのある仕事だろう」
2133 = "「Vậy thì tốt quá. Thật đáng tin cậy.\nĐối với Kuma Kuma, đó cũng là một công việc đáng để làm đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「だといいんですけど」
2087 = "「Được vậy thì tốt quá.」"
# 【ハチロク】
# display as 八六
# JP: 「どなたですか？　くまくま様、とは？」
2027 = "「Ai vậy ạ? Ngài Kuma Kuma là ai thế?」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫のクマだ。ぬいぐるみのな」
1989 = "「Là gấu của Hibiki. Thú nhồi bông ấy mà.」"
# 【ハチロク】
# display as 八六
# JP: 「まあ」
1994 = "「Ra là vậy.」"
# monologue
# JP: ハチロクがゆっくり入ってくる。\n朝食の乗ったトレーを持って――って、わたし！
2401 = "Hachiroku từ từ bước vào.\nTrên tay bưng khay đồ ăn sáng——Á, mình tệ quá!"
# 【日々姫】
# display as 日日姬
# JP: 「ごめんっ！　手伝う」
1870 = "「Xin lỗi nha! Để chị phụ cho.」"
# 【ハチロク】
# display as 八六
# JP: 「いえいえ、むしろ、双鉄様のお話し相手をお願いします。\n随分とご心配の様子でしたから」
1637 = "「Không sao đâu ạ, ngược lại, phiền chị nói chuyện với ngài Soutetsu giúp em.\nNgài ấy có vẻ rất lo lắng cho chị đấy ạ.」"
# 【双鉄】
# display as 雙鐵＆日日姬
# JP: 「っ」\n「っ！」
2166 = "「っ」\n「っ!」"
# monologue
# JP: 変わらない顔。だけどにぃにぃ、首筋がちょっと赤くなる。\nそっか……なぁんだ、そうなんだ。
2735 = "Khuôn mặt không đổi sắc. Nhưng mà gáy của anh hai lại hơi đỏ lên.\nRa là vậy……Gì chứ, thì ra là thế."
# monologue
# JP: にぃにぃも――\nだって、だよね。うん。……キス、しちゃったんだし。
2722 = "Anh hai cũng——\nBởi vì, đúng vậy mà. Ừm. ……Dù sao thì cũng đã hôn rồi mà."
# 【ハチロク】
# display as 八六
# JP: 「はい、どうぞ。\n電子レンジは、とても便利なものですね」
1674 = "「Vâng, xin mời.\nLò vi sóng đúng là một thứ rất tiện lợi nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「わ」
1723 = "「Oa.」"
# monologue
# JP: ほかほかのチーズオムレツにベーコン、サラダ。
2612 = "Trứng cuộn phô mai nóng hổi, thịt xông khói, và salad."
# monologue
# JP: トーストはカリカリに焼きたてで、\n牛乳で作ったココアもマグに入ってる。
2424 = "Bánh mì nướng vừa ra lò giòn rụm,\nvà một cốc ca cao pha sữa nóng."
# 【日々姫】
# display as 日日姬
# JP: 「これ、ハチロクが？　ありがとう」
2112 = "「Cái này, Hachiroku làm sao? Cảm ơn em nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、真闇様です。日々姫がお寝坊でしたから、\nパンなら焼きたてを出してあげられる、とおっしゃって」
1643 = "「Không phải đâu ạ, là chị Mayami làm đấy. Chị ấy bảo vì Hibiki ngủ nướng,\nnên nếu là bánh mì thì có thể dọn ra lúc vừa nướng xong.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー」
# 1758 = "「啊——」" 
# monologue
# JP: ねぇねぇがパンの朝食作るの、すごく珍しい。\n珍しい、けど。
2744 = "Chị Mayami làm bữa sáng bằng bánh mì, hiếm thấy thật đấy.\nTuy là hiếm thấy, nhưng mà."
# 【双鉄】
# display as 雙鐵
# JP: 「いただきます。うむ！　これはすごいな。\n温めなおしたものとは思えぬふわふわ加減だ」
1950 = "「Anh ăn đây. Ừm! Tuyệt quá.\nĐộ mềm xốp này không giống như đồ hâm lại chút nào.」"
# 【ハチロク】
# display as 八六
# JP: 「温めなおしてはいないのです。\n真闇様が仕掛けてくださった作りかけを、レンジで」
2009 = "「Không phải là hâm lại đâu ạ.\nLà đồ làm dở mà chị Mayami đã chuẩn bị sẵn, rồi cho vào lò vi sóng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、レンジで……焼いた？　蒸す？　うむ？？\n――ともかく、なるほど。加熱することで仕上げたのか」
1697 = "「Ra là vậy, cho vào lò vi sóng……nướng? Hấp? Ừm??\n——Nói chung là, hiểu rồi. Hoàn thiện bằng cách gia nhiệt sao.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。そのような料理の作り方、\nわたくし、初めて教えていただきました」
1798 = "「Vâng. Cách nấu ăn như vậy,\nđây là lần đầu tiên em được dạy đấy ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「いただきます――あむっ――っ！！！」
1949 = "「Chị ăn đây——Amu——っ!!!」"
# monologue
# JP: おいしい。すごく。
2658 = "Ngon quá. Rất ngon."
# monologue
# JP: 悔しいくらい美味しくて――\nだから……ほんとに、今さらだけど、思っちゃう。
2659 = "Ngon đến mức đáng ghét——\nThế nên……thật sự, dù giờ mới nhận ra, nhưng mình lại nghĩ."
# monologue
# JP: （ねぇねぇにも……私、\nいままでずっと、ものっすごく甘やかしてもらって――）
2773 = "（Cả chị Mayami nữa……mình,\ntừ trước đến giờ vẫn luôn được nuông chiều hết mực——）"
# monologue
# JP: だから。おいしく、残さず、いただく。
2555 = "Vì vậy. Mình sẽ ăn thật ngon miệng, không để thừa một chút nào."
# monologue
# JP: 『いただきます』の意味をしみじみ噛み締めて、\nそしたら感謝が、自然と慣れた言葉に変わる。
2523 = "Thấm thía sâu sắc ý nghĩa của câu \"Itadakimasu\",\nvà rồi lòng biết ơn, tự nhiên chuyển hóa thành một câu nói quen thuộc."
# 【日々姫】
# display as 日日姬
# JP: 「ごちそうさまでした」
1913 = "「Cảm ơn vì bữa ăn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ごちそうさまでした。ああ、美味かった」
1912 = "「Cảm ơn vì bữa ăn. Chà, ngon thật đấy.」"
# monologue
# JP: 兄さんの腰が浮きかける。
2434 = "Anh trai định đứng dậy."
# monologue
# JP: 今言わなくちゃ言えなくなっちゃうような気がして、\n少し慌てて呼び止める。
2549 = "Cảm thấy nếu bây giờ không nói thì sẽ không còn cơ hội nào nữa,\ntôi hơi hoảng hốt gọi giật lại."
# 【日々姫】
# display as 日日姬
# JP: 「あの、兄さん。少しお話が」
2130 = "「À, anh trai. Em có chuyện muốn nói.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、何だ？」
1757 = "「Ừm, chuyện gì vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。片付けはわたくしが」
2157 = "「Ngài Soutetsu. Việc dọn dẹp cứ để em lo.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、ハチロクにも聞いて欲しいの。\nそんなに、長い話じゃないから」
1778 = "「À, chị cũng muốn Hachiroku nghe nữa.\nChuyện cũng không dài lắm đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですか？」
1987 = "「Vậy sao ạ?」"
# monologue
# JP: トレーに食器を乗せてた手をとめ、\nハチロクがちょこん、と座る。
2463 = "Dừng tay xếp bát đĩa lên khay,\nHachiroku ngoan ngoãn ngồi xuống."
# 【日々姫】
# display as 日日姬
# JP: 「私――今日、銀行に行こうと思います。\n稀咲先輩に、やっぱり、ちゃんと挨拶したくて」
1897 = "「Em——hôm nay, em định sẽ đến ngân hàng.\nQuả nhiên, em vẫn muốn đến chào hỏi chị Kisaki đàng hoàng.」"
# monologue
# JP: だって、そうしなくちゃ失礼すぎる。
2455 = "Bởi vì, nếu không làm vậy thì thất lễ quá."
# monologue
# JP: 稀咲先輩が居てくれなければ――\nあの時、声をかけてくれないままだったら――
2349 = "Nếu không có chị Kisaki——\nNếu lúc đó chị ấy không bắt chuyện với mình——"
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩は、私を今の私にしてくれた人の一人です。\nだから、決意を。私、伝えてお礼を言いたいんです」
2059 = "「Chị Kisaki là một trong những người đã tạo nên em của hiện tại.\nThế nên, quyết tâm này. Em muốn truyền đạt và nói lời cảm ơn đến chị ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん、いいな。\nそれは、とても良い心がけだと僕は思う」
1812 = "「Ừm, được đấy.\nAnh nghĩ đó là một ý định rất tốt.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　けど――」
1747 = "「Hả? Nhưng mà——」"
# 【ハチロク】
# display as 八六
# JP: 「けど？」
1660 = "「Nhưng mà sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「だって……私がそうしちゃったら――\n稀咲先輩に、全部、バレちゃうけど――いいのかなって」
1826 = "「Tại vì……nếu em làm vậy——\nthì chị Kisaki sẽ biết hết mọi chuyện mất——như vậy có ổn không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そんなことを気にして僕らに相談したのか」
1771 = "「À, em bận tâm chuyện đó nên mới bàn với bọn anh sao.」"
# monologue
# JP: こくこく、頷く。\nだって、昨夜にねぇねぇが――
2532 = "Gật gật đầu.\nBởi vì, đêm qua chị Mayami đã——"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃが候補になるって思ってる、\nその油断ば突くって、そぎゃんと話やったから」
1836 = "「Chị ấy nói là chúng ta sẽ tấn công vào điểm sơ hở là 'họ nghĩ anh hai sẽ đăng ký làm ứng cử viên' mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉の戦略だな。\n日々姫の勝率を恐らく、向上させてくれるものでもある」
2113 = "「Đó là chiến lược của chị Mayami.\nVà chiến lược đó có lẽ cũng sẽ giúp nâng cao tỷ lệ chiến thắng của Hibiki lên nhiều đấy」"
# monologue
# JP: 言ってまっすぐ、にぃに――兄さんが、\n私の瞳をじっと見つめる。
2718 = "Vừa nói, anh hai――anh Soutetsu\nnhìn thẳng vào mắt tôi."
# monologue
# JP: ドキドキする。\nけど、その何倍も、安心できて暖かくなる。
2546 = "Tim tôi đập thình thịch.\nNhưng tôi lại cảm thấy an tâm và ấm áp hơn gấp bội."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、これは日々姫の選挙で、日々姫の戦いだ。\nだから日々姫が思うがままに行動するのが、一番だ」
1659 = "「Nhưng đây là cuộc bầu cử của Hibiki, là cuộc chiến của Hibiki.\nNên việc Hibiki hành động theo những gì em nghĩ là quan trọng nhất」"
# 【日々姫】
# display as 日日姬
# JP: 「兄さん……」
1749 = "「Anh trai……」"
# 【ハチロク】
# display as 八六
# JP: 「これで、お話は決まりましたね」
2036 = "「Vậy là câu chuyện đã được quyết định rồi nhỉ」"
# monologue
# JP: 中断してた手を動かして、\nハチロクはトレーに食器を乗せなおしていく。
2466 = "Tiếp tục động tác tay đang dang dở,\nHachiroku lại đặt bát đĩa lên khay."
# 【日々姫】
# display as 日日姬
# JP: 「ハチロク、洗い物、私やるから」
1687 = "「Hachiroku, để em rửa bát cho」"
# 【ハチロク】
# display as 八六
# JP: 「いえいえ、今日は結構です。\n日々姫はこれから、宣戦布告の大仕事ではないですか」
1625 = "「Không không, hôm nay không cần đâu ạ.\nChẳng phải từ giờ Hibiki còn có công việc lớn là tuyên chiến sao」"
# 【日々姫】
# display as 日日姬
# JP: 「せんせん、ふこく――」
1856 = "「Tuyên, chiến——」"
# monologue
# JP: 宣戦布告。
2481 = "Tuyên chiến."
# monologue
# JP: これから戦争を始めるぞって、\n相手に挨拶すること……だと思う。
2465 = "Có lẽ là đi chào hỏi đối phương rằng\ntừ giờ sẽ bắt đầu chiến tranh……"
# 【日々姫】
# display as 日日姬
# JP: 「うん。そうだね。\nそれって、すごく大仕事。けど――でもね、だからこそ」
1755 = "「Ừm. Đúng vậy.\nĐó là một công việc rất lớn. Nhưng——nhưng mà, chính vì thế」"
# monologue
# JP: ハチロクの手に手を添える。
2538 = "Tôi đặt tay lên tay Hachiroku."
# monologue
# JP: ハチロクは、ちょっと戸惑った顔をして、\nそれでも素直に、私にトレーを渡してくれる。
2405 = "Hachiroku làm vẻ mặt hơi bối rối,\nnhưng vẫn ngoan ngoãn đưa khay cho tôi."
# 【日々姫】
# display as 日日姬
# JP: 「いつもの私で。いつもの私の延長で、\n私――稀咲先輩に会いたいの」
1655 = "「Là em như mọi khi. Là sự tiếp nối của em như mọi khi,\nem muốn đi gặp——chị Kisaki」"
# monologue
# JP: いつもと同じ、自然な私で。\n感情的でも、感情を抑えた状態でもなく。
2428 = "Vẫn là tôi tự nhiên như mọi khi.\nKhông quá cảm xúc, cũng không phải trạng thái kìm nén cảm xúc."
# 【日々姫】
# display as 日日姬
# JP: 「そうする方が、きっと、伝わるって思うから。\nもしも誤解をされちゃっても、後悔がないって思うから」
1947 = "「Bởi vì em nghĩ làm như vậy chắc chắn sẽ truyền đạt được.\nDù có bị hiểu lầm đi chăng nữa, em nghĩ mình cũng sẽ không hối hận」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですか」
1995 = "「Vậy sao ạ」"
# monologue
# JP: 言ってハチロクは手を引っ込める。
2404 = "Nói rồi Hachiroku rụt tay lại."
# monologue
# JP: そうしてその手を腰に置き、\nえへんと、わざとらしく胸を張る。
2606 = "Sau đó cô ấy chống tay lên hông,\n'e hèm' một tiếng và ưỡn ngực lên có vẻ hơi cố ý."
# 【ハチロク】
# display as 八六
# JP: 「１４：００からは、乗務訓練を行います。\nそれまでに、気がかりが無いようにしておきなさい」
2173 = "「Từ 14:00 sẽ tiến hành huấn luyện công tác trên tàu.\nCho đến lúc đó, xin hãy giải quyết hết mọi vướng bận trong lòng đi nhé」"
# 【日々姫】
# display as 日日姬＆雙鐵
# JP: 「はいっ！」\n「うむっ！」
1806 = "「Vâng!」\n「Ừm!」"
# monologue
# JP: 背筋をのばして張り上げた声が、\nにぃにぃの声と同じタイミングで響く。
2539 = "Giọng nói cất cao với sống lưng vươn thẳng của tôi,\nvang lên cùng lúc với giọng của anh hai."
# monologue
# JP: そんな小さなことがふんわり幸せで、\n自分があんまり単純だから、おかしくなってクスって笑う。
2712 = "Một điều nhỏ nhặt như vậy cũng khiến tôi cảm thấy hạnh phúc lâng lâng,\nbởi vì bản thân quá đỗi đơn giản nên tôi bật cười khúc khích."
# 【日々姫】
# display as 日日姬
# JP: （これなら平気。\nいつもの私で、稀咲先輩とお話できる！）
2772 = "（Thế này thì ổn rồi.\nMình có thể nói chuyện với chị Kisaki bằng con người thật của mình!）"
# monologue
# JP: だから、テキパキ片付けられる。
2560 = "Vì vậy, tôi có thể dọn dẹp một cách nhanh nhẹn."
# monologue
# JP: 片付けをして、歯磨きをして、\n服も髪も、全部を迷わず決められる。
2568 = "Dọn dẹp xong, đánh răng xong,\ntôi có thể quyết định quần áo và kiểu tóc mà không hề do dự."
# 【日々姫】
# display as 日日姬
# JP: 「行ってきます！」
1906 = "「Em đi đây!」"
