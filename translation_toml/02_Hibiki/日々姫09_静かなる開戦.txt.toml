[script]
# lines: 413 
# 【日々姫】
# display as ？？？
# JP: 「にぃに！　にぃに！！　起きて、起きてっ！！」
1907 = "「阿哥！阿哥！！起來，快起來！！」" 

# monologue
# JP: ……声と、激しく揺する手と。\n僕をにぃにと呼ぶ者なら、たった一人しか存在しない。
1190 = "……耳邊傳來叫喊聲，身體被激烈地搖晃。只有一個人會用“阿哥”來稱呼我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　日々姫――」
1748 = "「日日姬，怎麼了？」" 

# 【日々姫】
# display as 日日姬
# JP: 「これっ！　これっ！！」
1798 = "「看這個！看這個！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「新聞か？　――っ」
1604 = "「報紙——」" 

# monologue
# JP: 『雛衣（ポ）市長辞任確実な情勢』\n『どうなる？　鉄道債。信用力低下は必至』
1192 = "《雛衣（波）市長辭職板上釘釘》《鐵路債券何去何從？信譽下跌不可避免》" 

# monologue
# JP: 隈元新報――\nいつぞやのポーレットの辞任観測をぶちあげた新聞だ。
2674 = "隈元新報——前陣子大肆刊登猜測波萊特辭職新聞的就是這家報紙。" 

# monologue
# JP: その一面トップにデカデカと、\n信用不安を引き起こしかねない記事をトバしている。
2201 = "報紙的頭版高調地登出了可能引發鐵路債券信譽危機的文章。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに……この記事――」
1906 = "「阿哥……這篇報導——」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　居間に！　居間に今すぐお越しください！」
1917 = "「雙鐵少爺！快來客廳！請快點到客廳來！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
1588 = "「嗯！」" 

# monologue
# JP: ハチロクの慌てた声にすぐさま応じる。\n駆け出せば、日々姫も僕の後を追う。
2145 = "八六的聲音很慌張。我連忙做出回應，跑向客廳。日日姬也跟了出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうしたハチロク！」
1531 = "「八六，怎麼了！」" 

# 【ハチロク】
# display as 八六
# JP: 「テレビです！ 宝生稀咲が出ていますっ！！」
1666 = "「快看電視！ 寶生稀咲正在講話！！」" 

# monologue
# JP: “様”をつけることさえ忘れるほどに、\nハチロクが慌てふためいている。
2139 = "八六慌亂到連敬稱也忘了加。" 

# monologue
# JP: その傍らには真闇姉。\nいつものにこにこ笑いを消して、画面をじっと見つめてる。
2567 = "真闇姐在一旁認真地盯著螢幕，她的臉上不見平時的笑容。" 

# monologue
# JP: （となると、\nふたりもすでにこの記事を確認しているのか――）
2737 = "（看來她們已經看過這篇報導了——）" 

# 【稀咲】
# display as 稀咲
# JP: 「――雛衣ポーレット氏は現職の市長であり、\n進退について、一切の言及をされておりません」
1216 = "「——雛衣波萊特現在還是市長，她從未提及去留問題」" 

# monologue
# JP: テレビの中では淡々と、\n稀咲が記者会見を進めている。
2684 = "電視上，稀咲正平靜地召開記者會。" 

# monologue
# JP: チャンネルは隈元放送。\n確か……隈元新報の親会社だか子会社だかの関係だ。
2124 = "內容來自隈元電視台。我記得……它和隈元新報是從屬關係。" 

# 【稀咲】
# display as 稀咲
# JP: 「当行は御一夜鉄道債の信用力に不安を感じておりません。\nが、この報道にあるご懸念は解消すべきかと考えます」
1721 = "「我行仍然相信御一夜鐵路債券。但是，我們認為有必要消除這篇文章提出的後顧之憂」" 

# monologue
# JP: 語る稀咲を飾るのは、\n『隈元銀行御一夜支店長　宝生稀咲』の文字列だ。
2586 = "稀咲下面打出的字幕是“隈元銀行御一夜支行行長寶生稀咲”。" 

# monologue
# JP: 右上には『緊急会見　どうなる鉄道債信用不安』の文字も\n貼りついたように表示され続けている。
2552 = "畫面右上角顯示的是“緊急記者會 鐵路債務信譽危機”。" 

# 【稀咲】
# display as 稀咲
# JP: 「このご懸念を解消するため、隈元銀行といたしましては、\n御一夜鉄道様に対する特別金利にての融資の準備を――」
1777 = "「為了消除後顧之憂，隈元銀行準備以優惠利率向御一夜鐵道發放貸款——」" 

# 【真闇】
# display as 真闇
# JP: 「ああ」
1574 = "「啊」" 

# monologue
# JP: 短い、しかし、強い感情の籠もった声。
2576 = "真闇姐的聲音有些激動。" 

# 【真闇】
# display as 真闇
# JP: 「……[うま]巧かとねぇ」
1244 = "「……手法真巧妙」" 

# monologue
# JP: そうして長い息を吐き、真闇姉はＴＶを消す。
2235 = "她長嘆一口氣，關掉了電視。" 

# monologue
# JP: 沈黙が、しばし垂れ込める。\n日々姫はうつむき、全く言葉を発しない。
2494 = "沉默籠罩了房間。日日姬一聲不吭地低著頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「巧いとは……」
1644 = "「巧妙是指……」" 

# monologue
# JP: だから無理やり、空気を動かす。
2304 = "我強行打破了沉默。" 

# monologue
# JP: 話の糸口を多く作って、\n日々姫がそこに、いつでも指を伸ばせるようにと。
2519 = "為了讓日日姬隨時都能參與進來，我繼續製造話題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕には、普通の会見に思えたが」
1715 = "「我看不出記者會有什麼特別的地方」" 

# 【真闇】
# display as 真闇
# JP: 「中身よ、双ちゃん。\n巧かとは、話の持っていきようばい」
1642 = "「小雙，咱是說背後的意圖。她們很巧妙地引導了事態的走向」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1593 = "「嗯？」" 

# 【真闇】
# display as 真闇
# JP: 「融資ば受けたら、選挙戦の手を縛られるゆーんは、\n前にポーちゃんが言うとったでしょ」
1640 = "「小波之前不是說過嗎，如果接受貸款，選舉中的行動就會受到限制」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ――ああ！」
1581 = "「嗯——啊！」" 

# 【真闇】
# display as 真闇
# JP: 「そーね」
1635 = "「對吧」" 

# monologue
# JP: 僕の理解が追いつくのを待ち、\n真闇姉はこっくり、頷く。
2592 = "等我理解之後，真闇姐點了點頭。" 

# 【真闇】
# display as 真闇
# JP: 「この報道と会見で、融資を受けても受けんでも、\nポーちゃんが追い込まれる構図、作られてしもーたと」
1757 = "「有了這篇文章和記者會，小波不管接不接受貸款都會被逼入不利的局面」" 

# 【ハチロク】
# display as 八六
# JP: 「なるほど……鉄道債の行く末に不安を持つ方たちは、\n融資を受けない判断に対し、反発を覚えるわけですね」
1705 = "「我懂了……如果波萊特小姐不接受貸款，那些對鐵路債券感到不安的人就會不滿」" 

# monologue
# JP: 真闇姉の薫陶の成果だろうか。\nハチロクの理解はほとんど、僕と同等のものに思える。
2199 = "在真闇姐的薰陶之下，八六想到的答案已經不比我差了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「“いざというときは市が補填するに違いない”――\nそう考えて鉄道債を購入した人も少なくなかろうからな」
1230 = "「“要是出了問題，市政府會把錢填上的”——肯定有不少人是抱著這種想法才買了鐵路債券」" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃん人たちにとっては、\nポーちゃんの市政が長く続くことが望ましかとね」
1874 = "「那些人希望小波把市長當下去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、もはやポーレットは限界だ。\n[レームダック,2]死に体の市政を引き伸ばせば、それは停滞しか呼ばん」
1555 = "「可是波萊特已經無法繼續堅持了。跛腳鴨市政再拖下去也只會陷入停滯」" 

# 【ハチロク】
# display as 八六
# JP: 「市政が停滞すれば経済が悪化し、\n経済の悪化は工場誘致歓迎の機運を高める――ですか」
1648 = "「市政一旦停滯，經濟就會惡化。那時正是推進工廠落戶的大好時機——是這樣嗎」" 

# monologue
# JP: 人間めいたため息をつき、\nハチロクはくっと眉を顰める。
2131 = "八六像人類一般嘆了口氣，並皺起了眉。" 

# 【ハチロク】
# display as 八六
# JP: 「全く、厄介な事態に陥ってしまったものですね」
1800 = "「真是陷進了麻煩的局面」" 

# 【真闇】
# display as 真闇
# JP: 「陥ったんと違うよ？　“陥らされた”」
1463 = "「不是陷進哦？是被推進去的」" 

# monologue
# JP: ゆったりとした口調の、鋭い訂正。\n真闇姉は、ため息もつかず眉根を顰めることも無い。
2569 = "真闇姐既沒有嘆氣也沒有皺眉，而是不緊不慢地一針見血指正道。" 

# 【真闇】
# display as 真闇
# JP: 「そん不安ば掻き立てよった、隈元放送も隈元新報も、\n隈元銀行が大株主やけん」
1915 = "「隈元銀行可是挑起不安的隈元電視台和隈元新報的大股東」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――絵に描いたようなマッチポンプというわけか」
1210 = "「——標準的自導自演」" 

# monologue
# JP: マッチに火をつけた当人が、ポンプをつかって消火する。\n舞台裏さえ見えるなら、お笑い草の自作自演だ。
2091 = "他們編排了這齣好戲。對看清幕後的人來說這真是滑稽可笑。" 

# monologue
# JP: が――具体的な証拠を掴み、突きつけでもしない限りは、\nこの単純な小芝居は、有効に機能してしまう。
2527 = "然而，如果拿不出確鑿的證據，就只能眼看著這種簡單的小把戲發揮效果。" 

# 【日々姫】
# display as 日日姬
# JP: 「これが……」
1861 = "「這就是……」" 

# monologue
# JP: 俯き沈黙してた日々姫がやっと、声を出す。
2070 = "一直默默低著頭的日日姬總算開口了。" 

# 【日々姫】
# display as 日日姬
# JP: 「これが、稀咲先輩の“正々堂々”」
1862 = "「這就是稀咲學姐所謂的“堂堂正正”」" 

# monologue
# JP: 自分を、誰を、責めているようには聞こえない。\n恨みも悔みも感じない。
2449 = "日日姬的話聽起來並不像是在責怪自己或他人。從她的話中感覺不到怨恨和後悔。" 

# monologue
# JP: 日々姫は消されたテレビの画面をまっすぐ見つめ――\n多分、その向こうの稀咲を見ている。
2685 = "電視已經關上了，可她仍然盯著螢幕。她心中想著的應該是稀咲。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうだな」
1586 = "「嗯……是啊」" 

# monologue
# JP: 勝利のため、一切の手加減なしに最善だけを尽くし続ける。\n相手の善意を利用することが有効ならば、そのようにする。
2589 = "稀咲會竭盡全力追求勝利，甚至不惜利用對方的善意。" 

# monologue
# JP: そうしないのは、敗北時の言い訳を準備するに等しい――\n卑怯であり、姑息である行為だとも言えるだろう。
2342 = "手軟就相當於是在為失敗準備藉口，可以說是一種懦弱，是一種逃避。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、正々堂々のひとつの形だ。\n僕にもそれは理解できる」
1865 = "「這確實也算是一種堂堂正正。我能理解」" 

# 【日々姫】
# display as 日日姬
# JP: 「でしょうね。\n稀咲先輩と兄さんって、どこか似てるとこありますから」
1701 = "「我想也是。稀咲學姐和哥哥有些地方挺像的」" 

# monologue
# JP: サバサバ言って、日々姫は笑う。\n吹っ切ったような笑顔を見れば、強く感じる。
2428 = "日日姬爽朗地說道。說完她笑了起來。" 

# monologue
# JP: この短期間で、\n日々姫は、もう一歩成長したと。
2230 = "她那清爽的笑容讓我深刻地感受到，短短一段時間裡她又進一步成長了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の正々堂々とは、違っているか？」
1511 = "「你的堂堂正正不是這樣的嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。違う。\nけど――稀咲先輩のが間違っているとも思わない」
1589 = "「嗯，不是。但是……我並不認為稀咲學姐有錯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、何も迷うことはないな」
1886 = "「那就沒什麼可猶豫的了」" 

# monologue
# JP: 僕の言葉に、日々姫が頷く。\n強く。強く。
2431 = "日日姬用力地點頭。" 

# monologue
# JP: そして日々姫は、\n僕の言葉を、自分の言葉で、受け取り、繋ぐ。
2524 = "然後她接著我的話說了下去。" 

# 【日々姫】
# display as 日日姬
# JP: 「私は、私の正々堂々で戦って。\nその上で、稀咲先輩に勝ってみせます」
1711 = "「我會用我堂堂正正的方式打敗稀咲學姐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「具体的にはどう戦う？\n真闇姉が言うには、選挙は」
1509 = "「你想怎麼做？按真闇姐的說法，選舉的成敗取決於」" 

# 【真闇】
# display as 真闇
# JP: 「人、金、風――の三つで決まる」
1486 = "「人、錢、風向這三個要素」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だ、そうだが」
1753 = "「是的」" 

# monologue
# JP: “ああ”と、小さな呟きが耳をくすぐる。\n振り向き見れば、ハチロクがしかつめらしい顔をしている。
2601 = "耳邊傳來“啊”的一聲。我回過頭去，只見八六正板著臉。" 

# 【ハチロク】
# display as 八六
# JP: 「なるほど。そこに立ち返ると、宝生稀咲のこの一手、\n『人』を分断させる効果を狙っているように思えますね」
1542 = "「原來如此。以這種角度來看的話，寶生稀咲這一招想必是為了分裂“人”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その通りだな」
1765 = "「沒錯」" 

# monologue
# JP: 鉄道債の購入者は、ポーレットの支持者層とも、\nある程度以上一致する。
2633 = "買入鐵路債券的人群和波萊特的支持群體十分相近。" 

# monologue
# JP: その数人が転ぶだけでも、結束と信頼が損なわれ、\n我々陣営の“人”の優位はあっけなく喪失するだろう。
2611 = "萬一有人倒戈，整體的團結與穩定就會受損，我方陣營會一下子失去“人”的優勢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「故に、人か金か。そのどちらかで優位を築けねば、\n風を吹かし得たとしてなお、僕らは負ける」
1684 = "「我們至少得在人和錢中取得一項優勢。不然的話，就算我們成功引導了風向，我們還是會輸」" 

# 【日々姫】
# display as 日日姬
# JP: 「ひとつだけ、なんですけど」
1713 = "「我有一個主意」" 

# monologue
# JP: 日々姫の声。
2453 = "日日姬說道。" 

# 【日々姫】
# display as 日日姬
# JP: 「お金はともかく、人に……\n結束に役立つかもしれない、アイディアがあります」
1891 = "「錢那方面可能幫不上忙……但應該會有助於“人”的團結」" 

# monologue
# JP: 自信なさげな声ではあれど、僕らにきちんとそう伝え、\n日々姫は静かに立ち上がる。
2680 = "雖然聲音中缺乏自信，但日日姬吐字清晰地跟我們這麼說完，然後靜靜地站了起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「私、それをみんな――御一夜鉄道がらみのみんな、\n出来るだけ多くに検討して欲しいです」
1694 = "「我希望集合儘可能多的——御一夜鐵路的相關人員共同探討」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そのように手配しよう。\n僕は、ポーレットへと連絡を取る」
1682 = "「我們幫你安排。我去聯繫波萊特」" 

# 【真闇】
# display as 真闇
# JP: 「ほーたらウチは、商店会名簿に載っとる関係者さんに、\n連絡とっておくけんねぇ」
1880 = "「那咱去聯繫商店協會名冊上的有關人士」" 

# 【ハチロク】
# display as 八六
# JP: 「『あの話』でしたら、関連の資料を整理してあります。\n持って行きましょう」
1233 = "「“那件事”的相關材料已經整理就緒，把那些一起拿過去吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがとう。にぃにぃ、ねぇねぇ、ハチロク」
1910 = "「阿哥，阿姐，八六，謝謝你們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫……」
1745 = "「日日姬……」" 

# monologue
# JP: 月並みな言葉ではあるが、\n“立場は人を変える”ものだなと、しみじみ思う。
1176 = "“人會隨著立場的改變而改變”，話雖老套，但還真是這樣。" 

# monologue
# JP: 人に押されねば動けなかったあの日々姫が、\n今はしっかり、軸として立とうとしてくれている。
2668 = "那個處事被動的日日姬現在正主動撐起大梁。" 

# monologue
# JP: （礼を言うのは、僕の方だ）
2742 = "（該說感謝的人是我）" 

# monologue
# JP: 思うが、それは言葉に出さない。
2104 = "但我不會把這些想法說出來。" 

# monologue
# JP: 今僕が伝えるべきは、日々姫を緩める言葉ではなく。\n“ともに戦う”、その意志を示す言葉であろうと思うから。
2314 = "我現在該做的不是讓日日姬鬆懈下來，而是表達出想要與她共同戰鬥的意志。" 

# 【双鉄】
# display as 雙鐵
# JP: 「支度ができ次第すぐに動こう。\n僕らは後手を、強いられてしまっているからな」
1519 = "「做好準備以後馬上就行動吧。我們已經落了後手」" 

# monologue
# JP: レールショップを手狭と感じる。\n初めて経験することだ。
2341 = "我頭一次感到鐵路商店是這麼狹小。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ほんなら、\n市長さんの辞任報道はまっこということになりますか」
1866 = "「這麼說那篇關於市長辭職的新聞都是真的嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「報道内容の細部はともかく、\nわたしが、辞任する意向であるということは本当です」
1525 = "「先不說細節內容，我打算辭職這件事確實是真的」" 

# monologue
# JP: 大きなざわめき。
2476 = "會場一片喧譁。" 

# monologue
# JP: それを収めようとするかのように、\nポーレットは深く、頭をさげる。
2504 = "波萊特似乎是想讓大家冷靜下來，她深深低下了頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですので、この場にお集まりくださったみなさまに、\nまずは、わたしの力不足を心よりお詫び申し上げます」
1726 = "「所以我想先向到場的各位致歉。真的非常抱歉，我已經力不從心了」" 

# monologue
# JP: そしてゆっくり顔を持ちあげ――
2507 = "波萊特慢慢抬起頭——" 

# monologue
# JP: ポーレットは、力と思いのこもる目で、\n周囲をじっ……と、眺め渡す。
2222 = "她用堅定的目光掃視四周。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですが、以降は鉄道業に全力を傾注することにより、\n御一夜鉄道を通じた観光振興を必ずや実現して参ります」
1662 = "「從今以後，我會全心全意投入鐵路事業，力爭透過御一夜鐵路來振興旅遊業」" 

# 【債権者Ｂ】
# display as 債權人Ｂ
# JP: 「いや、そんな努力目標はどうでもよくてな」
1687 = "「我們關心的不是這種奮鬥目標」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「一つ、質問をよろしいでしょうか？」
1720 = "「我能提一個問題嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「もちろんです。赤井宮司、どうぞ」
1790 = "「當然。赤井宮司先生，請您發言」" 

# monologue
# JP: 赤井宮司の静かな挙手に、\n声を荒らげ腰を浮かせていた男が、口を噤んで引き下がる。
2644 = "赤井宮司一舉手，那個正想起身的粗暴男人立刻閉上嘴坐了回去。" 

# monologue
# JP: 確か、御一夜の職人さんたちのお一人だ。\n協力をして頂いたのに不安を与え、素直に申し訳なく思う。
2333 = "我記得他是御一夜的工匠。他幫助了我們，而我們卻讓他感到了不安，我真的覺得很抱歉。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「\x%l8620;#00ffc040;8620%l;#;を観光復興の軸に――という当初プランの実現には、\n現状、ぶ厚い壁が立ち塞がっていますよね？」
1506 = "「你們當初計劃以\\x%l8620;#00ffc040;８６２０%l;#;為中心來振興旅遊業，可現在這個計劃正面臨著巨大的障礙吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その通りです」
1669 = "「您說得沒錯」" 

# monologue
# JP: が、未然にヤジを潰してもらえば、\nポーレットの言は曇らず冴える。
2196 = "在沒人起鬨的情況下，波萊特口齒伶俐。" 

# 【ポーレット】
# display as 波萊特
# JP: 「その問題の解決案の提示。そして、来たる市長選への備え。\nその二つが、今日お集まりいただいた理由となります」
1490 = "「今天召集各位前來有兩件事，一是向大家說明這個問題的解決方案，二是為即將到來的市長選舉做準備」" 

# 【凪】
# display as 凪
# JP: 「\x%l客車;#00ffc040;客車%l;#;の煙ば、のーなったと？」
1204 = "「\\x%l客車;#00ffc040;客運車廂%l;#;還會進煙嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「ちょ、凪ちゃんっ！？」
1638 = "「小凪！？」" 

# monologue
# JP: 控えめなざわめきたちを、ふかみの制止を飛び越えて、\n凪がぽーんと、素朴な問いを投げ込んでくる。
2152 = "凪不顧周圍的小聲議論，不顧深美的制止，提出了一個很直接的問題。" 

# 【凪】
# display as 凪
# JP: 「あぎゃんと煙もくもくじゃ、\n観光だか炭鉱だかよーわからんばい」
1888 = "「那麼大的煙，還談什麼觀光談什麼煤礦」" 

# 【ふかみ】
# display as 深美
# JP: 「ダメだよ、そんな本当のこといっちゃ――って、\nあ！　ごめんなさい。です」
1468 = "「不能把真話說出來——啊！對不起」" 

# monologue
# JP: 自爆しあわてるふかみに向かい、\nポーレットは落ち着き払った、穏やかな笑みを投げ返す。
2513 = "深美自掘墳墓後不知所措。波萊特向她露出了平靜溫和的笑容。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。煙害を防止できずに、\n\x%l8620;#00ffc040;8620%l;#;による観光振興は達成しえません」
1763 = "「沒錯。想用\\x%l8620;#00ffc040;８６２０%l;#;來振興旅遊業的話，必須先解決進煙問題」" 

# monologue
# JP: そして、ツ――と、\n青い瞳が横へ振られる。
2234 = "她那雙碧眼轉向旁邊。" 

# 【ポーレット】
# display as 波萊特
# JP: 「その件については、\x%l8620;#00ffc040;8620%l;#;専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、\nハチロクからご説明させていただきます」
1899 = "「關於這件事，有請\\x%l8620;#00ffc040;８６２０%l;#;專用\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;——八六為大家進行說明」" 

# 【ハチロク】
# display as 八六
# JP: 「ご紹介にあずかりましたハチロクです。\n\x%l客車;#00ffc040;客車%l;#;の問題は、もちろん我がことと感じています」
1729 = "「承蒙介紹，大家好，我是八六。\\x%l客車;#00ffc040;客運車廂%l;#;的問題和我息息相關」" 

# monologue
# JP: 簡潔な挨拶。\n軽い会釈。
2143 = "八六打了個簡單的招呼，向大家點頭致意。" 

# monologue
# JP: ざわめきは、波が引くように静まっていき、\nレールショップにはただ、ハチロクの声だけが響く。
2477 = "會場如退潮般靜了下來。鐵路商店中只剩下八六的聲音。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にとって、車輌とは分身のようなものです。\nそれだけに、寿命に対し、固定的な見方をしていました」
1634 = "「對\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;來說，車輛就等同於是自己的另一半。所以我們才一直走不出壽命方面的思維定勢」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「固定的な見方、とは？」
1667 = "「思維定勢是指？」" 

# 【ハチロク】
# display as 八六
# JP: 「まるでひとつの生き物として見るかのように、\n車輌寿命を車輌全体の寿命として見てしまっていた」
1199 = "「\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;和車輛就像是一個完整的生物。車輛的壽命被視為整體的壽命」" 

# monologue
# JP: 禅問答のような言葉に、小さなざわめきが復活する。
2683 = "難懂的對話讓周圍再度響起小聲議論。" 

# monologue
# JP: それに焦らず、たっぷり間を取り、\nハチロクはゆったりとした手招きをする。
2207 = "她並沒因此亂了陣腳，適當停頓之後不緊不慢地朝旁邊招了招手。" 

# 【ハチロク】
# display as 八六
# JP: 「れいな。あれを」
1788 = "「玲奈，把那個拿出來」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！　れいな、\n\x%lキハ07;#00ffc040;キハ07%l;#;s専用れいるろおどのれいなです。こんにちわぁ」
1622 = "「好的！大家好，玲奈是\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;Ｓ專用鐵路人偶」" 

# monologue
# JP: ぺこりと深く、良い子のおじぎ。\nれいなが声を発しただけで、場の雰囲気は些か和らぐ。
2535 = "玲奈乖巧地向大家深深鞠了一躬。她的聲音令會場的氣氛有所緩和。" 

# monologue
# JP: れいなの手には\x%lキハ07;#00ffc040;キハ07%l;#;sの鉄道模型。\nレールショップにいつも飾られているものだ。
2538 = "玲奈手上拿著平日裡展示在鐵路商店的\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;Ｓ的鐵路模型。" 

# 【れいな】
# display as 玲奈
# JP: 「これは、\x%lNゲージ;#00ffc040;Nゲージ%l;#;っていいます。\nモーターのついたシャーシと、車体とでできてますぅ」
1859 = "「這個東西叫\\x%lNゲージ;#00ffc040;ＮＧａｕｇｅ%l;#;。它由車體和帶馬達的底盤組成」" 

# 【ハチロク】
# display as 八六
# JP: 「シャーシを、\x%l台車;#00ffc040;台車%l;#;プラス\x%l台枠;#00ffc040;台枠%l;#;と考えれば、\nこれは実際の鉄道車輌の構造と類似しています」
1551 = "「可以把它的底盤想成是\\x%l台車;#00ffc040;轉向架%l;#;和\\x%l台枠;#00ffc040;車架%l;#;的組合。它和鐵路車輛的真實構造很像」" 

# monologue
# JP: ハチロクの手にも、いつのまに一台の\x%lNゲージ;#00ffc040;Nゲージ%l;#;。\nこれは、\x%l8620;#00ffc040;8620%l;#;を模している」
2140 = "八六手中也多出一台\\x%lNゲージ;#00ffc040;ＮＧａｕｇｅ%l;#;。那是\\x%l8620;#00ffc040;８６２０%l;#;的模型。" 

# 【れいな】
# display as 玲奈
# JP: 「[れいななえす,4]キハ07sはふるぅくなって、車内に、\nお外の空気がはいってきちゃうようになりましたぁ」
1686 = "「我們這輛Ｋｉｈａ０７Ｓ已經很舊了，車體的氣密性已經不行了」" 

# 【ハチロク】
# display as 八六
# JP: 「しかし、シャーシは健在です。\nあと何万キロも走ることができるでしょう」
1471 = "「不過底盤依舊良好。再跑幾萬公里應該不成問題」" 

# monologue
# JP: れいなが赤い車輌を下げて、\nハチロクが\x%l8620;#00ffc040;8620%l;#;を持ち上げる。
2542 = "玲奈放下紅色車輛，八六舉起\\x%l8620;#00ffc040;８６２０%l;#;。" 

# 【ハチロク】
# display as 八六
# JP: 「かたや、この[ハチロク,3]8620のシャーシはもはや限界です。\nが、車体部分はいぜん壮健。あと何年も使えそうです」
1823 = "「而另一邊，這輛８６２０的底盤已經快要不行了，但是車體部分仍很健壯，可以再用好幾年」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ！」
1575 = "「啊！」" 

# monologue
# JP: 心底、驚いたような声。\n赤井宮司は、その目を大きく見開いている。
2645 = "赤井宮司發出恍然大悟的聲音，睜大了眼睛。" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい。そうなんですよぉ」
1754 = "「是的，沒錯」" 

# 【ハチロク】
# display as 八六
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と車輌とが一対であるとの先入観。\nそれは客貨車までにも及び、視野を狭め続けてきました」
1198 = "「\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;和車輛不可拆分——這種成見限制了思考，人們甚至認為客運車廂和貨運車廂也是這樣」" 

# monologue
# JP: （かぽっ）
2723 = "（啵）" 

# monologue
# JP: ほとんど同時に。\n\x%lキハ07;#00ffc040;キハ07%l;#;sと\x%l8620;#00ffc040;8620%l;#;それぞれの、車輌のシャーシが外される。
2134 = "八六和玲奈幾乎同時動手，分別拆下了\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;Ｓ和\\x%l8620;#00ffc040;８６２０%l;#;的底盤。" 

# monologue
# JP: そしてハチロクとれいなの手は、\n稼働可能なシャーシと車体とを組み合わせる。
2523 = "然後她們把可用的底盤和車體組合在一起。" 

# 【ハチロク】
# display as 八六
# JP: 「このように」
1864 = "「這樣做」" 

# monologue
# JP: （シャーーーッ！）
2724 = "（喀嚓！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1918 = "「！」" 

# monologue
# JP: 息を呑んだのは僕だけではない。\nざわり、大きなどよめきが起こる。
2162 = "包括我在內的許多人都目瞪口呆。緊接著，會場沸騰起來。" 

# monologue
# JP: 据え付けられてる\x%lNゲージ;#00ffc040;Nゲージ%l;#;レールに置かれた瞬間、\n組み替えられた新車両が、勢いも良く走り出すから。
2595 = "組裝而成的新車被放上\\x%lNゲージ;#00ffc040;ＮＧａｕｇｅ%l;#;的軌道，它一下子衝了出去。" 

# 【ハチロク】
# display as 八六
# JP: 「――このように単純、かつ効果的であることを、\nしかし、我々は行っては来ませんでした」
1214 = "「——這樣做既簡單又有效，可之前卻沒人這麼做過」" 

# monologue
# JP: 残されている、\x%l8620;#00ffc040;8620%l;#;のものだったシャーシと、\n\x%lキハ07;#00ffc040;キハ07%l;#;sのものだった車体。
2156 = "剩下的僅為\\x%l8620;#00ffc040;８６２０%l;#;的底盤和\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;Ｓ的車體。" 

# monologue
# JP: それをれいなは左手にのせ、\nいとおしそうに右手で撫ぜる。
2541 = "玲奈把它們放在左手上，用右手小心地撫摸。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、思うんです。れいながもし壊れちゃっても、\nれいなの部品が誰かの役にたつならすごく嬉しいなって」
1786 = "「玲奈希望自己壞了以後自己的零件能幫上別人的忙」" 

# 【ハチロク】
# display as 八六
# JP: 「その思いを、わたくしも同じく抱いています。\nそして全ての廃車両たちも、同様であると信じます」
1674 = "「我也是這麼想的。而且我相信所有報廢的車輛都是這麼想的」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「つまり……端的に言い直すのなら」
1246 = "「……換句話說」" 

# monologue
# JP: 赤井宮司の声にさえ、緊張に近いものを感じる。
2660 = "連赤井宮司的聲音中都帶有一絲緊張的味道。" 

# monologue
# JP: ハチロクとれいなのパフォーマンスは、\nそれほど強いインパクトで、僕らに理解を迫ってきた。
2137 = "八六和玲奈的示範就是這麼震撼，迫使大家都明白了她們的意思。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「他の廃\x%l客車;#00ffc040;客車%l;#;との[パッチワーク,3]継ぎ接ぎで、\n状態の良い\x%l客車;#00ffc040;客車%l;#;を一つ、作り出そうということですか？」
1504 = "「你們想用其他報廢\\x%l客車;#00ffc040;客運車廂%l;#;拼湊出一節狀態良好的\\x%l客車;#00ffc040;客運車廂%l;#;？」" 

# 【ハチロク】
# display as 八六
# JP: 「そのとおりです」
# 1765 = "「沒錯」" 

# monologue
# JP: 余分の全くない返答は、\n多くの疑問を引き起こす。
2147 = "八六那簡潔的回答引來了一片質問。" 

# 【債権者Ａ】
# display as 債權人Ａ
# JP: 「パッチワークいうて、その元となる車輌は\nどこからどう入手すっとよ」
1736 = "「拼湊需要用到的車輛，你們打算從哪裡弄來？」" 

# 【債権者Ｂ】
# display as 債權人Ｂ
# JP: 「車輌移送に大金がかかりよるけん、\n鉄道債を発行したんじゃなかと？」
1843 = "「車輛搬運需要大量的錢，你們發行鐵路債券就是為了這個嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「それは」
1901 = "「關於這個——」" 

# monologue
# JP: すっくと、日々姫が立ち上がる。
2410 = "日日姬一下子站了起來。" 

# monologue
# JP: 僕の隣で、体をわずかに震わせながら――\nけれども、声はまっすぐに出す。
2226 = "她的身體在微微顫抖，可是聲音卻毫無遲疑。" 

# 【日々姫】
# display as 日日姬
# JP: 「複数輌をまとめての移送で、\n大幅なコストダウンを図ろうという計画です」
1685 = "「我們計劃一次搬運複數車輛，這樣就能大幅降低成本」" 

# 【債権者Ａ】
# display as 債權人Ａ
# JP: 「複数輌をまとめてってよ、\n御一夜鉄道にゃそぎゃんと多か車輌の必要――っ！」
1459 = "「一次搬運複數車輛？御一夜鐵路要這麼多車輛——！」" 

# monologue
# JP: 口先をとがらせていたおじさんが、\nぽかんとその口を開けたまま、驚きの目で日々姫を見る。
2666 = "那位怒氣沖沖的中年人張著嘴，用驚訝的眼神看著日日姬。" 

# monologue
# JP: 日々姫はその視線を受け止め、強く、頷く。
2427 = "日日姬正面迎著他的視線有力地點了點頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「廃車両のパッチワークによる再生。それを、\nひとつの新産業に出来るのではないかと思ってます」
1856 = "「透過拼湊讓報廢車輛得到重生，我們覺得這能發展出一個新產業」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうか――確かに」
1248 = "「……的確」" 

# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;不足という現状を、僕らは身をもって思い知らされた。
2293 = "我們親身體會到了\\x%l客車;#00ffc040;客運車廂%l;#;的缺乏。" 

# monologue
# JP: ニーズが例え乏しくあれど、\nシェアを独占できるのならば、確かに事業が成立しよう。
2248 = "就算需求不多，只要壟斷了市場就能把生意做起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この案、真闇姉が」
1857 = "「這個主意是真闇姐想出來的嗎」" 

# 【真闇】
# display as 真闇
# JP: 「違かとよ」
1461 = "「不是」" 

# monologue
# JP: 真闇姉の短い答えと誇らしげな笑み。\nぞくり、背筋が震えてしまう。
2574 = "真闇姐的一聲否定和她那感到自豪的笑容讓我為之一振。" 

# monologue
# JP: ならば日々姫はハチロクとれいなと知恵を出し合い――\n己の力のみにより、この結論に辿り着いたのだと知って。
2168 = "即是說，日日姬與八六、玲奈一起互出主意，在不借助外力的情況下得出了這個方案。" 

# monologue
# JP: （真闇姉が、ポーレットが、僕が……\n与えてきたものだけでは、恐らくそこまで至れまい）
2714 = "（不管是真闇姐、波萊特還是我……只靠之前獲得的那些訊息，恐怕是做不到這一步的）" 

# monologue
# JP: 看板描きの仕事を通じ、数多の商店主から得て来た学びが、\nそして他ならぬ宝生稀咲から学んだものが――
2460 = "日日姬通過招牌設計的工作，從眾多的商店老闆那裡學到的東西，以及從寶生稀咲本人那裡學到的東西——" 

# monologue
# JP: 今、ここに来て、日々姫の中で結ばれて、\n大きな花を、咲かせようとしているのだろう。
2546 = "現在正在開花結果。" 

# 【債権者Ｂ】
# display as 債權人Ｂ
# JP: 「車輌再生ゆーんわよ、どぎゃん技術の集積と？」
1842 = "「車輛再生會用到哪些技術？」" 

# 【ハチロク】
# display as 八六
# JP: 「主として、鉄工と木工と塗装とですね。\n\x%l艤装;#00ffc040;艤装%l;#;部分には、難燃性の布やガラス、樹脂、照明なども」
1481 = "「主要有鐵工、木工和塗裝。\\x%l艤装;#00ffc040;舾裝%l;#;部分需要耐燃的布料、玻璃、樹脂以及照明器材等材料」" 

# monologue
# JP: ハチロクの答えに、おお、という歓声が沸き起こる。\n鉄道債の購入者さんたちの多くは、技術者――
2192 = "周圍響起一片歡呼。鐵道債券的購買者中大多數是技師——" 

# monologue
# JP: ボランティアで\x%l8620;#00ffc040;8620%l;#;改修に力を貸してくれた人達なのだと、\n高まる熱気が教えてくれる。
2474 = "是那些為\\x%l8620;#00ffc040;８６２０%l;#;的修復出過力的志願者。現場高漲的熱情印證了這一點。" 

# 【債権者Ａ】
# display as 債權人Ａ
# JP: 「鉄工と木工のごつ、御一夜で賄える技術ばい」
1892 = "「鐵工和木工在御一夜完全能找齊咧」" 

# 【債権者Ｂ】
# display as 債權人Ｂ
# JP: 「市長、どぎゃんと！\nそん事業ば、廻せる見通しばもっちゅうんかね」
1653 = "「市長，你說句話！你覺得這生意搞得起來嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしが市長と御一夜鉄道社長とを兼務したままでは、\nこれ以上の事業拡大は不可能だと判断しました」
1723 = "「我認為如果我繼續兼任市長和御一夜鐵路的社長的話，事業已經不可能再擴大了」" 

# monologue
# JP: 言って、沈黙。\n五秒、十秒――沈黙の間に、みなの視線が移動する。
2128 = "全場陷入沉默。五秒……十秒過去了，大家的視線從波萊特身上離開後不停游走。" 

# monologue
# JP: ポーレットから、少し彷徨い真闇姉へ、僕へ、赤井宮司へ。\nそしていつしか、たった一人へと集合していく。
2579 = "眾多視線先是有些困惑地飄到真闇姐、我、赤井宮司身上，然後不知不覺間集中到一個人身上。" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ――あっ――あのっ」
1560 = "「呃……那、那個」" 

# monologue
# JP: 声が、上手く出てこないのか。\n視線の集中にさらされて、日々姫は見るからに狼狽する。
2200 = "在眾人的注視下，日日姬緊張得無法出聲。一眼就能看出她很驚慌。" 

# 【双鉄】
# display as 雙鐵
# JP: 「背伸びをするな。\nポーレットのようにやろうと思うな」
1464 = "「不用強撐。不用去學波萊特」" 

# monologue
# JP: だから、小声で。\nほんのわずかな支えを、日々姫に。
2335 = "我輕輕推她一把。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのままのお前でいい。\n僕らは――いや、僕は。そうあることを望んでいる」
1517 = "「做你自己就行了。我們——不，我希望你能這樣」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 1918 = "「！」" 

# monologue
# JP: ぴたりと、日々姫の震えが止まる。
2629 = "話音剛落，日日姬便不再發抖。" 

# monologue
# JP: 息を吸い、吐き。手のひらが僕の方へと少し動いて――\nそのままぎゅっと、拳の形に握られ、止まる。
2211 = "她吸氣吐氣，把手掌稍稍移向我這邊，然後一下子握拳。" 

# 【日々姫】
# display as 日日姬
# JP: 「あの、看板作成などでご縁をいただいた方にも、\nはじめましての方にも、自己紹介させていただきます」
1878 = "「那個，有些人通過招牌製作已經認識我了，有些人還不認識我。請允許我重新做一下自我介紹」" 

# monologue
# JP: 日々姫はもう、僕を見てない。\n僕は日々姫の横顔をじっと見上げてる。
2443 = "日日姬的目光離開了我。我抬頭注視著她的側臉。" 

# 【日々姫】
# display as 日日姬
# JP: 「私、右田日々姫です。右田一酒造元の末娘で、\n御一夜鉄道株式会社の車輌部長で、見習い\x%l機関助士;#00ffc040;機関助士%l;#;で」
1690 = "「我叫右田日日姬，是右田一釀酒廠主人的次女，也是御一夜鐵路股份公司的車輛部長，兼任實習\\x%l機関士;#00ffc040;司機%l;#;」" 

# monologue
# JP: “車輌部長”は、僕の\x%l保線;#00ffc040;保線%l;#;部長と同様、\n急遽で付けられた役職だろう。
1183 = "“車輛部長”應該和我\\x%l保線;#00ffc040;巡線%l;#;部長的工作一樣，都是事前突然安排的職位。" 

# monologue
# JP: “肩書は、思った以上に人に影響を与える”と――\nポーレットは、そのことを痛感しているようであるから。
2508 = "波萊特說“頭銜會對人產生很大的影響”。看來她對此深有體會。" 

# 【日々姫】
# display as 日日姬
# JP: 「それで私。宝生稀咲先輩の――隈元銀行御一夜支店長の、\n後輩――親しくしていただいている、後輩でもあります」
1548 = "「另外，我也是寶生稀咲學姐——隈元銀行御一夜支行行長的學妹，我和她關係非常親近」" 

# monologue
# JP: どおっと、ざわめき。\nけれど、それは怒号にまではつながらない。
2480 = "會場響起一片喧譁。不過這些聲音並沒有演變成咆哮。" 

# monologue
# JP: 日々姫が積み重ねてきた物が抑えてくれてるのだろうか？\n誰もが、日々姫の次の言葉を待ってくれている。
2471 = "是日日姬至今為止積累下的努力發揮了作用吧。大家都等著日日姬說下去。" 

# 【日々姫】
# display as 日日姬
# JP: 「御一夜の衰退を見たくない、発展をしてほしい気持ち、\n私にも、もちろん、すごくあります」
1672 = "「我也不想看到御一夜衰落下去，我也非常希望御一夜變得更好」" 

# monologue
# JP: かたかたと、\nまた日々姫の手が、わずかにだけれど震え始める。
2438 = "日日姬的手又開始輕輕發抖。" 

# monologue
# JP: 値踏みするような視線が日々姫を、怯えさせてる。
2578 = "眾人打量的目光讓她感到害怕。" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、私、稀咲先輩のやってることも、わかります。\nけど、わかる気持ちより強く、守りたいって思います」
1728 = "「所以我能理解稀咲學姐為什麼這麼做。但是，我更加想要保護御一夜」" 

# monologue
# JP: わかっているが、手は伸ばせない。
2328 = "我知道她在發抖，可我卻不能幫助她。" 

# monologue
# JP: ここで一人で頑張れなければ、\n市長職など、決して務まるものではない。
2240 = "如果這都一個人堅持不下去，那她絕對無法勝任市長。" 

# 【日々姫】
# display as 日日姬
# JP: 「クマ川の水がもしも汚れてしまったら――\n失われてしまった物は、取り返せないって思います」
1456 = "「一旦隈河河水被汙染，有些失去的東西將再也無法挽回」" 

# monologue
# JP: レールショップに垂れ込めている沈黙の中、\nほう、と感心したような声。
2242 = "安靜的鐵路商店中冒出一聲欽佩的感嘆。" 

# monologue
# JP: 顔もわからぬ誰かひとりの、あまりにもささやかな同意\n――ただそれだけで、日々姫の背筋が再び伸びる。
2657 = "這一小聲來自於陌生人的肯定讓日日姬重新挺起腰背。" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、環境を守るため。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致無しでも、\n御一夜の経済に、必ず復活してほしくって」
1775 = "「為了保護環境，我想在不引進\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠的情況下重振御一夜的經濟」" 

# 【日々姫】
# display as 日日姬
# JP: 「そのために、\x%l客車;#00ffc040;客車%l;#;を改修して売る事業、\nポーレットさんに成功させて欲しいってすごく思ってて」
1778 = "「為此，我十分希望波萊特小姐能把\\x%l客車;#00ffc040;客運車廂%l;#;的修復銷售生意發展起來」" 

# monologue
# JP: 声に、力がこもり始める。\n言葉から迷いが消えていく。
2224 = "她的聲音越來越有力，越來越堅定。" 

# 【日々姫】
# display as 日日姬
# JP: 「それで、私――今はまだ、力不足ですけど、\n政治のこと、全然勉強足りてないってわかってますけど」
1718 = "「我知道，現在我的能力還不足，對政治也還遠遠說不上了解」" 

# 【日々姫】
# display as 日日姬
# JP: 「それでも、ポーレットさんを助けるために、\n私の好きな御一夜を守るために、私――」
1557 = "「可是，為了幫助波萊特小姐，為了保護我所喜歡的御一夜，我——」" 

# monologue
# JP: 沈黙。\nきゅっと目を閉じ、開く。
2446 = "日日姬的聲音停了下來。她閉上眼，又張開眼。" 

# monologue
# JP: ――日々姫はもう、怯えていない。
1170 = "——日日姬已經不再膽怯。" 

# 【日々姫】
# display as 日日姬
# JP: 「私、市長選に立候補したいって思ってます。\nですので、どうか――みなさん、力を貸してください」
1703 = "「我想參選市長。懇請大家助我一臂之力」" 

# 【ハチロク】
# display as 八六＆玲奈
# JP: 「もちろんです！」\n「れいな、力をかしますよぉ！」
1791 = "「當然沒問題！」\\n「玲奈會幫忙的！」" 

# monologue
# JP: サクラにしては浮きすぎな、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の声と声。
73 = "\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的聲音很激動。光是為了捧場是不會這麼激動的。" 

# monologue
# JP: そこにパチパチ、パチパチと、\nまばらな拍手がまじり始める。
2479 = "會場開始響起零星的拍手聲。" 

# 【日々姫】
# display as 日日姬
# JP: 「……あっ」
1240 = "「……啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よくやった。日々姫らしい言葉だった」
1837 = "「說得好。很有你的風格」" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、よかった」
1610 = "「太好了」" 

# monologue
# JP: 日々姫は椅子に座ると同時に、\n僕の方へと崩れてくる。
2414 = "日日姬坐了下來，她的身體倒向我這邊。" 

# monologue
# JP: 一仕事を終えた後なら、肩を貸すくらい構わんだろう。\n日々姫の重みを受け止めながら、改めて周囲に視線を送る。
2249 = "工作已經結束了，就讓她靠一靠吧。我支撐著日日姬，並再次環顧四周。" 

# monologue
# JP: （まぁ、こんなものか――）
2726 = "（她做得很好了——）" 

# monologue
# JP: 日々姫の言葉は、日々姫らしく。
2441 = "日日姬的發言很有她的風格。" 

# monologue
# JP: それゆえ、迷いと怯えを消してなお、\n絶対的な――信念を持つ者が持つ――強さを持たない。
2077 = "也正因為如此，即使消除了猶豫和膽怯，她的話中還是缺少那種擁有信念的人才有的強烈意志。" 

# 【債権者Ａ】
# display as 債權人Ａ
# JP: 「で、市長――いや、社長っ」
1889 = "「那麼市長——不，社長」" 

# 【債権者Ｂ】
# display as 債權人Ｂ
# JP: 「具体的に、廃車両の手配の目処なんぞは」
1603 = "「報廢車輛的來源有眉目嗎」" 

