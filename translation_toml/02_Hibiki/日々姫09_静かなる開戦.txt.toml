1567 = "「哥哥你在搞什麼——咳咳」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！？」
1746 = "「日日姬！？」" 

# monologue
# JP: 背中を丸め咳き込む日々姫の体をさする。
2214 = "她彎著身子不停地咳嗽。我趕緊幫她順背。" 

# 【双鉄】
# display as 雙鐵
# JP: 「知恵熱ではなかったのか？\n風邪を併発してしまったか？」
1796 = "「發燒不是勞累過度引起的嗎？難道還引出了感冒？」" 

# 【日々姫】
# display as 日日姬
# JP: 「大丈夫、少し、むせただけです」
1760 = "「沒事的，我只是稍微嗆了一下」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかし――」
1553 = "「可是——」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1575 = "「啊！」" 

# monologue
# JP: ぽん、と日々姫が手を鳴らす。
2469 = "日日姬雙手一拍。" 

# monologue
# JP: 咳き込んだのがよほど苦しかったのだろう、\n顔が、さっきよりもよほど赤らんでいる。
2187 = "可能是咳嗽太難受的關係，她的臉比剛才更紅了。" 

# 【日々姫】
# display as 日日姬
# JP: 「あの、兄さん――それなら、薬。\n私に、塗っていただけますか？」
1882 = "「那哥哥……你能幫我塗藥嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「薬か、任せておけ――うむ？　塗る？」
1514 = "「你說藥啊，交給我吧——嗯？塗？」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい！　なら、ええと……\n薬箱の、奥のほうにあると思います――から」
1637 = "「對！呃……我記得藥放在藥箱的深處」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、これだな」
1577 = "「啊，是這個對吧」" 

# monologue
# JP: なるほど。\n塗る風邪薬、というヤツだ。
2170 = "原來如此。是那種外用的感冒藥。" 

# monologue
# JP: まだ新品のその封を切り、\n手のひらにとり、伸ばしてみる。
2312 = "我把還未開封的包裝拆開，抹了一點藥塗到手掌上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお、随分と冷えるものだな。\nこれは、熱さましによさそうだ」
1597 = "「噢，涼涼的。應該對退燒很有幫助」" 

# 【日々姫】
# display as 日日姬
# JP: 「あの……それ……ええと――――」
1876 = "「那個……呃————」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1593 = "「嗯？」" 

# 【日々姫】
# display as 日日姬
# JP: 「むっ――あうっ、背中っ！\nやっぱり、背中にぬってもらえますか？」
1607 = "「塗在胸——唔，後背！還是後背吧。能幫我塗到後背上嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいぞ。背中を向けろ」
1830 = "「行。你把後背轉過來」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい……兄さん、お願いします」
1615 = "「好……哥哥，麻煩你了」" 

# monologue
# JP: 日々姫が上体をゆっくり起こす。
2422 = "日日姬慢慢坐了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1918 = "「！」" 

# monologue
# JP: ぷち、ぷち、ぷちとパジャマのボタンが外されていく。
2216 = "她把睡衣的鈕扣一顆顆解開。" 

# monologue
# JP: まさか――と思うより先に、日々姫は袖を抜ききって、\nパジャマをするりと落としてしまう。
2340 = "我還沒來得及驚訝，她的雙臂已從袖中抽出，睡衣順勢輕盈落下。" 

# 【日々姫】
# display as 日日姬
# JP: 「そ、それじゃあ兄さん――お願い、します」
1885 = "「那就……麻煩哥哥了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ」
1561 = "「呃、嗯」" 

# monologue
# JP: 日々姫の上半身が、さらけだされている。\n肩越し、なだらかな胸のラインを見下ろせる。
2440 = "日日姬的整個上半身都裸露了出來。越過她的肩膀，能看到她那平緩的胸部曲線。" 

# monologue
# JP: 薬効を消してしまうのではないか――\nそんな不安を感じる程に、僕の手のひらが熱くなる。
2319 = "我的手掌越來越熱，甚至讓人擔心這會不會影響藥效。" 

# monologue
# JP: （ぺとっ）
2721 = "（啪嗒）" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ！」
1572 = "「唔！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
# 1918 = "「！」" 

# monologue
# JP: 指先が、日々姫の柔らかな背中に沈む。\n日々姫の肌は、僕の指よりなお熱い。
2303 = "我將藥塗上她柔軟的後背。她的皮膚比我的手指更火熱。" 

# monologue
# JP: （そうだ、日々姫は発熱している。\nこれは治療で、熱さましなんだ）
2733 = "（日日姬在發燒。這是在治病，這是在幫她退燒）" 

# monologue
# JP: そうと自分に言い聞かせ、\n途端に、自覚してしまう。
2301 = "我如此勸說自己後幡然醒悟。" 

# monologue
# JP: 治療を治療と言い聞かせねばならぬほど――\nこの接触を、僕はなにかと誤解することを恐れている。
2296 = "我在害怕把這種行為想成其他事，以至於不得不對自己強調這是在治病。" 

# monologue
# JP: （ぺとっ――ぬりっ――ぬるっ――にゅるんっ――）
2720 = "（啪嗒——）" 

# 【日々姫】
# display as 日日姬
# JP: 「んふっ――んっ――冷たッ――\nあうっ――気持ちっ――いいっ――」
1583 = "「嗯——嗯——好涼——唔——好舒服——」" 

# monologue
# JP: （治療だ、治療だ、治療だ、治療だ）
2745 = "（這是在治病，這是在治病，這是在治病，這是在治病）" 

# monologue
# JP: 日々姫の甘くとろける声が、\n僕の脳髄に染みていく。
2464 = "日日姬那醉人的聲音滲入我的腦髓。" 

# monologue
# JP: ぬかるむ汗と肌の熱とが、\n僕の指先をダメにしていく。
2696 = "黏黏的汗液和肌膚的熱度令我的指尖漸漸麻痺。" 

# monologue
# JP: （もっと……触れたい）
2727 = "（手……不想停下來）" 

# monologue
# JP: 思ってしまう。\nこれが治療と、どれほど自分に言い聞かせても。
2246 = "就算我再怎麼告訴自己這是在治病，我還是忍不住冒出了這種想法。" 

# monologue
# JP: いや、治療であるならなおのこと、\n背中だけでは不足じゃないかと――思ってしまう。
2357 = "既然是在治病，那隻塗後背真的夠嗎——我甚至忍不住這麼想。" 

# 【日々姫】
# display as 日日姬
# JP: 「はぁっ――あっ――はぁッ――はぁっ」
1565 = "「哈——啊——哈——哈」" 

# monologue
# JP: 裸の肩が上下している。\nその向こう、見え隠れする日々姫の控えめな胸も、また。
2233 = "她那赤裸的肩膀上下起伏。在前方若隱若現的玲瓏的胸部也跟著起伏。" 

# monologue
# JP: 風呂で何度も何度も見ている日々姫の胸を、\nけれども今日は、特別な何かと感じてしまう。
2297 = "我多次在浴室裡看過她的胸部，可今天卻有一種不一樣的感覺。" 

# 【日々姫】
# display as 日日姬
# JP: 「あの……兄さん？」
1877 = "「那個……哥哥？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1919 = "「！！！」" 

# monologue
# JP: 振り返りかけた日々姫に酷く慌ててしまい、体が動く。
2324 = "我看到她想要回頭，一下子慌了手腳。" 

# monologue
# JP: （がつっ）
2725 = "（嗒）" 

# monologue
# JP: 何かが、膝にあたってしまい――
2322 = "我的膝蓋碰到了什麼——" 

# 【ポーレット】
# display as 波萊特
# JP: 「経験不足を補える――\nそれだけの力を、彼女は持っているはずです」
1613 = "「她能用其他東西彌補經驗上的不足」" 

# 【双鉄】
# display as 雙鐵＆日日姬
# JP: 「っ！？」\n「っ！！」
1920 = "「！？」\\n「！！」" 

# monologue
# JP: 日々姫が動く。\n慌てる指が、怯えたようにラジオのスイッチを押して消す。
2456 = "日日姬身體一晃。我的手指在慌忙之中關掉了收音機。" 

# monologue
# JP: 日々姫の背と、僕の指とが、それで離れる。\nねばつく何かが――すうっと溶けていった気がする。
2318 = "我的手指和她的後背分了開來。纏繞在我心頭的東西也就此消散。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……なぁ、日々姫。さっきの話の続きだが」
1242 = "「……我說，日日姬。關於剛才那件事」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん」
# 1587 = "「嗯」" 

# monologue
# JP: 肩甲骨の裏側、脇腹。\n塗り残しになってた部分に、薬を塗り足す。
2518 = "為了補上剛才沒塗到的位置，我繼續給她的側腹和肩胛骨中間上藥。" 

# monologue
# JP: 日々姫の肌から、僕の指から、\n異常な熱は、もう消えている。
2553 = "異常的熱度已經從日日姬的肌膚和我的手指上消失。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットもハチロクもれいなも、真闇姉も僕も、\nお前の味方で、ブレーンでありスタッフだ」
1467 = "「不管是波萊特、八六和玲奈，還是真闇姐和我，我們都是你的同伴，是你的智囊團」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1587 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らに出来ることならば、僕らにさせればいいだけだ。\nみんなの長所を残らず身に付ける必要などない」
1683 = "「我們能做的事讓我們來做就行了。你沒有必要樣樣精通」" 

# 【日々姫】
# display as 日日姬
# JP: 「でしたら――兄さん」
1883 = "「那哥哥」" 

# monologue
# JP: 日々姫が、僕へと振り返る。
2457 = "日日姬轉過頭來看向我。" 

# 【日々姫】
# display as 日日姬
# JP: 「私は、何を――\nみんなのために、私には何ができるんですか？」
1706 = "「我應該怎麼做，我有什麼能為大家做的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん」
1858 = "「這個嘛，嗯」" 

# monologue
# JP: 日々姫の目だ。\n信じ切り――まっすぐ、僕を見上げる目。
2433 = "日日姬用堅定不移的眼神看著我。" 

# monologue
# JP: 路子の影が一瞬重なり、\nけれどもすぐに、瞳の光に、光の強さに溶かされる。
2306 = "我從她身上看到了路子的身影。但她眼神中散發出的光芒太強，路子很快就不見了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前の言葉にはまだ、重みとなるほどの積み重ねがない。\nゆえに、今は恐らく、近く、狭くにしか響かない」
1512 = "「你的話語還不夠有力，恐怕現在只能影響一小部分人」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1587 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「けれどお前には、言葉にはならぬ積み重ねがある。\nお前の瞳は、誰より多く、御一夜の綺麗を見つめてきた」
1499 = "「但是你有著其他日積月累的優勢。你對御一夜美好的一面的了解比任何人都深」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1573 = "「啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん、そのとおりだ」
1591 = "「嗯，沒錯」" 

# monologue
# JP: 日々姫になら出来ること。\n日々姫にしか出来ないこと。
2663 = "那件事若是日日姬的話——不，是只有日日姬才能做到。" 

# monologue
# JP: それは本当に小さなころから、\nずっと変わらずいたことだ。
2658 = "這一點不管是在她小時候，還是她長大了之後都從未改變過。" 

# 【双鉄】
# display as 雙鐵
# JP: 「絵を描け、日々姫。\nお前の描く、お前の夢見る御一夜の町の未来図を」
1749 = "「日日姬，把你心中描繪的，你夢想中的御一夜的未來畫出來吧」" 
