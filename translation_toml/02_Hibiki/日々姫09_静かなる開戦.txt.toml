[script]
# lines: 413 
# 【日々姫】
# display as ？？？
# JP: 「にぃに！　にぃに！！　起きて、起きてっ！！」
1907 = "「Anh hai! Anh hai!! Dậy đi, dậy đi!!」"
# monologue
# JP: ……声と、激しく揺する手と。\n僕をにぃにと呼ぶ者なら、たった一人しか存在しない。
1190 = "......Giọng nói, cùng với bàn tay đang lay mạnh.\nNgười gọi tôi là anh hai, trên đời này chỉ có một mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　日々姫――」
1748 = "「Có chuyện gì vậy? Hibiki——」"
# 【日々姫】
# display as 日日姬
# JP: 「これっ！　これっ！！」
1798 = "「Cái này! Cái này nè!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「新聞か？　――っ」
1604 = "「Báo à? ——っ」"
# monologue
# JP: 『雛衣（ポ）市長辞任確実な情勢』\n『どうなる？　鉄道債。信用力低下は必至』
1192 = "『Thị trưởng Hinai (Paulette) chắc chắn sẽ từ chức』\n『Trái phiếu đường sắt sẽ ra sao? Việc giảm sút độ tin cậy là điều tất yếu』"
# monologue
# JP: 隈元新報――\nいつぞやのポーレットの辞任観測をぶちあげた新聞だ。
2674 = "Kumamoto Shimpo——\nTờ báo đã từng đăng tin dự đoán việc Paulette từ chức dạo trước."
# monologue
# JP: その一面トップにデカデカと、\n信用不安を引き起こしかねない記事をトバしている。
2201 = "Ngay trên trang nhất, họ đăng chễm chệ\nmột bài báo có nguy cơ gây ra khủng hoảng tín dụng."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに……この記事――」
1906 = "「Anh hai...... bài báo này——」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　居間に！　居間に今すぐお越しください！」
1917 = "「Ngài Soutetsu! Phòng khách! Xin ngài hãy đến phòng khách ngay lập tức!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
1588 = "「Ừm!」"
# monologue
# JP: ハチロクの慌てた声にすぐさま応じる。\n駆け出せば、日々姫も僕の後を追う。
2145 = "Tôi lập tức đáp lại giọng nói hốt hoảng của Hachiroku.\nKhi tôi lao ra ngoài, Hibiki cũng chạy theo sau."
# 【双鉄】
# display as 雙鐵
# JP: 「どうしたハチロク！」
1531 = "「Có chuyện gì vậy Hachiroku!」"
# 【ハチロク】
# display as 八六
# JP: 「テレビです！ 宝生稀咲が出ていますっ！！」
1666 = "「Tivi ạ! Houshou Kisaki đang xuất hiện trên đó!!」"
# monologue
# JP: “様”をつけることさえ忘れるほどに、\nハチロクが慌てふためいている。
2139 = "Hachiroku hoảng hốt đến mức\nquên cả thêm chữ \"ngài\"."
# monologue
# JP: その傍らには真闇姉。\nいつものにこにこ笑いを消して、画面をじっと見つめてる。
2567 = "Bên cạnh là chị Mayami.\nNụ cười tủm tỉm thường ngày đã biến mất, chị ấy đang chằm chằm nhìn vào màn hình."
# monologue
# JP: （となると、\nふたりもすでにこの記事を確認しているのか――）
2737 = "（Vậy là,\nhai người họ cũng đã xem bài báo này rồi sao——）"
# 【稀咲】
# display as 稀咲
# JP: 「――雛衣ポーレット氏は現職の市長であり、\n進退について、一切の言及をされておりません」
1216 = "「——Cô Hinai Paulette hiện vẫn đang là thị trưởng đương nhiệm,\nvà chưa hề có bất kỳ tuyên bố nào về việc đi hay ở.」"
# monologue
# JP: テレビの中では淡々と、\n稀咲が記者会見を進めている。
2684 = "Trên tivi, Kisaki đang điềm tĩnh\ntiến hành buổi họp báo."
# monologue
# JP: チャンネルは隈元放送。\n確か……隈元新報の親会社だか子会社だかの関係だ。
2124 = "Kênh đang chiếu là Kumamoto Broadcasting.\nHình như...... có quan hệ công ty mẹ con gì đó với Kumamoto Shimpo."
# 【稀咲】
# display as 稀咲
# JP: 「当行は御一夜鉄道債の信用力に不安を感じておりません。\nが、この報道にあるご懸念は解消すべきかと考えます」
1721 = "「Ngân hàng chúng tôi không cảm thấy lo ngại về độ tin cậy của trái phiếu đường sắt Ohimitera.\nTuy nhiên, chúng tôi cho rằng cần phải giải tỏa những lo âu mà bài báo này nêu ra.」"
# monologue
# JP: 語る稀咲を飾るのは、\n『隈元銀行御一夜支店長　宝生稀咲』の文字列だ。
2586 = "Dòng chữ tô điểm cho Kisaki đang phát biểu là\n『Giám đốc chi nhánh Ohimitera của Ngân hàng Kumamoto - Houshou Kisaki』."
# monologue
# JP: 右上には『緊急会見　どうなる鉄道債信用不安』の文字も\n貼りついたように表示され続けている。
2552 = "Ở góc trên bên phải, dòng chữ 『Họp báo khẩn cấp: Khủng hoảng tín dụng trái phiếu đường sắt sẽ ra sao?』\ncũng liên tục hiển thị như được dán chặt vào đó."
# 【稀咲】
# display as 稀咲
# JP: 「このご懸念を解消するため、隈元銀行といたしましては、\n御一夜鉄道様に対する特別金利にての融資の準備を――」
1777 = "「Để giải tỏa mối lo ngại này, Ngân hàng Kumamoto chúng tôi,\nđang chuẩn bị cung cấp khoản vay với lãi suất đặc biệt cho Đường sắt Ohimitera——」"
# 【真闇】
# display as 真闇
# JP: 「ああ」
1574 = "「A」"
# monologue
# JP: 短い、しかし、強い感情の籠もった声。
2576 = "Một tiếng kêu ngắn ngủi, nhưng chứa đựng cảm xúc mãnh liệt."
# 【真闇】
# display as 真闇
# JP: 「……[うま]巧かとねぇ」
1244 = "「......Khéo léo thật đấy.」"
# monologue
# JP: そうして長い息を吐き、真闇姉はＴＶを消す。
2235 = "Thở hắt ra một hơi dài, chị Mayami tắt tivi đi."
# monologue
# JP: 沈黙が、しばし垂れ込める。\n日々姫はうつむき、全く言葉を発しない。
2494 = "Sự im lặng bao trùm trong chốc lát.\nHibiki cúi gầm mặt, không thốt lên lời nào."
# 【双鉄】
# display as 雙鐵
# JP: 「巧いとは……」
1644 = "「Khéo léo là sao......」"
# monologue
# JP: だから無理やり、空気を動かす。
2304 = "Nên tôi đành gượng ép, phá vỡ bầu không khí này."
# monologue
# JP: 話の糸口を多く作って、\n日々姫がそこに、いつでも指を伸ばせるようにと。
2519 = "Tạo ra nhiều manh mối câu chuyện,\nđể Hibiki có thể với tay tới bất cứ lúc nào."
# 【双鉄】
# display as 雙鐵
# JP: 「僕には、普通の会見に思えたが」
1715 = "「Với em thì, đó chỉ là một buổi họp báo bình thường thôi mà.」"
# 【真闇】
# display as 真闇
# JP: 「中身よ、双ちゃん。\n巧かとは、話の持っていきようばい」
1642 = "「Nội dung kìa, Sou-chan.\nKhéo léo ở đây là cách dẫn dắt câu chuyện ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1593 = "「Hửm?」"
# 【真闇】
# display as 真闇
# JP: 「融資ば受けたら、選挙戦の手を縛られるゆーんは、\n前にポーちゃんが言うとったでしょ」
1640 = "「Trước đây bé Pau đã nói rồi mà,\nnếu nhận khoản vay thì sẽ bị trói buộc tay chân trong cuộc bầu cử.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――ああ！」
1581 = "「Ừm——A!」"
# 【真闇】
# display as 真闇
# JP: 「そーね」
1635 = "「Đúng chứ.」"
# monologue
# JP: 僕の理解が追いつくのを待ち、\n真闇姉はこっくり、頷く。
2592 = "Chờ tôi hiểu ra vấn đề,\nchị Mayami khẽ gật đầu."
# 【真闇】
# display as 真闇
# JP: 「この報道と会見で、融資を受けても受けんでも、\nポーちゃんが追い込まれる構図、作られてしもーたと」
1757 = "「Với bài báo và buổi họp báo này, dù có nhận khoản vay hay không,\nbé Pau cũng đã bị dồn vào thế bí rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「なるほど……鉄道債の行く末に不安を持つ方たちは、\n融資を受けない判断に対し、反発を覚えるわけですね」
1705 = "「Ra là vậy...... Những người đang lo lắng về tương lai của trái phiếu đường sắt,\nsẽ cảm thấy bất mãn trước quyết định không nhận khoản vay nhỉ.」"
# monologue
# JP: 真闇姉の薫陶の成果だろうか。\nハチロクの理解はほとんど、僕と同等のものに思える。
2199 = "Có lẽ là nhờ thành quả dạy dỗ của chị Mayami chăng.\nSự thấu hiểu của Hachiroku dường như gần ngang ngửa với tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「“いざというときは市が補填するに違いない”――\nそう考えて鉄道債を購入した人も少なくなかろうからな」
1230 = "「“Nhỡ có chuyện gì thì chắc chắn thành phố sẽ bù đắp”——\nChắc hẳn không ít người đã nghĩ vậy khi mua trái phiếu đường sắt.」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃん人たちにとっては、\nポーちゃんの市政が長く続くことが望ましかとね」
1874 = "「Đối với những người đó,\nhọ luôn mong muốn chính quyền của bé Pau được duy trì lâu dài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、もはやポーレットは限界だ。\n[レームダック,2]死に体の市政を引き伸ばせば、それは停滞しか呼ばん」
1555 = "「Nhưng, Paulette đã đến giới hạn rồi.\nNếu cứ kéo dài chính quyền bù nhìn này, nó sẽ chỉ mang lại sự trì trệ.」"
# 【ハチロク】
# display as 八六
# JP: 「市政が停滞すれば経済が悪化し、\n経済の悪化は工場誘致歓迎の機運を高める――ですか」
1648 = "「Chính quyền trì trệ thì kinh tế sẽ suy thoái,\nkinh tế suy thoái sẽ làm tăng cơ hội chào đón nhà máy——là vậy sao ạ.」"
# monologue
# JP: 人間めいたため息をつき、\nハチロクはくっと眉を顰める。
2131 = "Hachiroku thở dài hệt như con người,\nrồi hơi nhíu mày lại."
# 【ハチロク】
# display as 八六
# JP: 「全く、厄介な事態に陥ってしまったものですね」
1800 = "「Thật tình, chúng ta đã rơi vào một tình thế rắc rối rồi nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「陥ったんと違うよ？　“陥らされた”」
1463 = "「Không phải rơi vào đâu? Mà là “bị đẩy vào”.」"
# monologue
# JP: ゆったりとした口調の、鋭い訂正。\n真闇姉は、ため息もつかず眉根を顰めることも無い。
2569 = "Một lời đính chính sắc bén bằng chất giọng từ tốn.\nChị Mayami không hề thở dài, cũng chẳng nhíu mày."
# 【真闇】
# display as 真闇
# JP: 「そん不安ば掻き立てよった、隈元放送も隈元新報も、\n隈元銀行が大株主やけん」
1915 = "「Cả Kumamoto Broadcasting và Kumamoto Shimpo, những kẻ đã khuấy động sự bất an đó,\nđều có cổ đông lớn là Ngân hàng Kumamoto mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――絵に描いたようなマッチポンプというわけか」
1210 = "「——Quả là một vở kịch tự biên tự diễn hoàn hảo nhỉ.」"
# monologue
# JP: マッチに火をつけた当人が、ポンプをつかって消火する。\n舞台裏さえ見えるなら、お笑い草の自作自演だ。
2091 = "Chính kẻ châm lửa lại dùng vòi rồng để dập lửa.\nNếu nhìn thấu được hậu trường, thì đây chỉ là một trò hề tự biên tự diễn."
# monologue
# JP: が――具体的な証拠を掴み、突きつけでもしない限りは、\nこの単純な小芝居は、有効に機能してしまう。
2527 = "Nhưng——chừng nào chưa nắm được bằng chứng cụ thể và vạch trần,\nthì vở kịch nhỏ đơn giản này vẫn sẽ phát huy tác dụng."
# 【日々姫】
# display as 日日姬
# JP: 「これが……」
1861 = "「Đây là......」"
# monologue
# JP: 俯き沈黙してた日々姫がやっと、声を出す。
2070 = "Hibiki nãy giờ vẫn cúi gầm mặt im lặng, cuối cùng cũng cất tiếng."
# 【日々姫】
# display as 日日姬
# JP: 「これが、稀咲先輩の“正々堂々”」
1862 = "「Đây chính là sự “đường đường chính chính” của đàn chị Kisaki.」"
# monologue
# JP: 自分を、誰を、責めているようには聞こえない。\n恨みも悔みも感じない。
2449 = "Nghe không giống như đang tự trách mình hay trách ai khác.\nCũng chẳng cảm thấy sự oán hận hay tiếc nuối nào."
# monologue
# JP: 日々姫は消されたテレビの画面をまっすぐ見つめ――\n多分、その向こうの稀咲を見ている。
2685 = "Hibiki nhìn chằm chằm vào màn hình tivi đã tắt——\nCó lẽ, em ấy đang nhìn Kisaki ở phía bên kia."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうだな」
1586 = "「À...... đúng vậy.」"
# monologue
# JP: 勝利のため、一切の手加減なしに最善だけを尽くし続ける。\n相手の善意を利用することが有効ならば、そのようにする。
2589 = "Vì chiến thắng, cô ấy sẽ không khoan nhượng mà tiếp tục dốc hết sức mình.\nNếu việc lợi dụng lòng tốt của đối phương là có hiệu quả, cô ấy sẽ làm."
# monologue
# JP: そうしないのは、敗北時の言い訳を準備するに等しい――\n卑怯であり、姑息である行為だとも言えるだろう。
2342 = "Không làm như vậy, chẳng khác nào chuẩn bị sẵn lời bào chữa cho thất bại——\nCũng có thể nói đó là hành vi hèn nhát và tạm bợ."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、正々堂々のひとつの形だ。\n僕にもそれは理解できる」
1865 = "「Quả thực, đó cũng là một hình thức đường đường chính chính.\nAnh cũng có thể hiểu được điều đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「でしょうね。\n稀咲先輩と兄さんって、どこか似てるとこありますから」
1701 = "「Chắc là vậy rồi.\nĐàn chị Kisaki và anh trai, có điểm gì đó khá giống nhau mà.」"
# monologue
# JP: サバサバ言って、日々姫は笑う。\n吹っ切ったような笑顔を見れば、強く感じる。
2428 = "Nói một cách dứt khoát, Hibiki mỉm cười.\nNhìn nụ cười như đã trút bỏ được gánh nặng ấy, tôi cảm nhận được sự mạnh mẽ."
# monologue
# JP: この短期間で、\n日々姫は、もう一歩成長したと。
2230 = "Chỉ trong một thời gian ngắn,\nHibiki đã trưởng thành thêm một bước nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の正々堂々とは、違っているか？」
1511 = "「Có khác với sự đường đường chính chính của Hibiki không?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。違う。\nけど――稀咲先輩のが間違っているとも思わない」
1589 = "「Vâng. Khác ạ.\nNhưng——em cũng không nghĩ cách của đàn chị Kisaki là sai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、何も迷うことはないな」
1886 = "「Nếu vậy, không có gì phải do dự nữa.」"
# monologue
# JP: 僕の言葉に、日々姫が頷く。\n強く。強く。
2431 = "Nghe tôi nói, Hibiki gật đầu.\nThật mạnh mẽ. Thật kiên quyết."
# monologue
# JP: そして日々姫は、\n僕の言葉を、自分の言葉で、受け取り、繋ぐ。
2524 = "Và rồi Hibiki,\ntiếp nhận lời tôi, và tiếp nối bằng chính ngôn từ của mình."
# 【日々姫】
# display as 日日姬
# JP: 「私は、私の正々堂々で戦って。\nその上で、稀咲先輩に勝ってみせます」
1711 = "「Em sẽ chiến đấu bằng sự đường đường chính chính của riêng em.\nVà sau đó, em sẽ chiến thắng đàn chị Kisaki cho xem.」"
# 【双鉄】
# display as 雙鐵
# JP: 「具体的にはどう戦う？\n真闇姉が言うには、選挙は」
1509 = "「Cụ thể thì em định chiến đấu thế nào?\nTheo lời chị Mayami nói thì, bầu cử là」"
# 【真闇】
# display as 真闇
# JP: 「人、金、風――の三つで決まる」
1486 = "「Nhân, Tài, Phong——được quyết định bởi ba yếu tố đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だ、そうだが」
1753 = "「Là, vậy đấy.」"
# monologue
# JP: “ああ”と、小さな呟きが耳をくすぐる。\n振り向き見れば、ハチロクがしかつめらしい顔をしている。
2601 = "Một tiếng lẩm bẩm nhỏ “À” khẽ lọt vào tai.\nNgoảnh lại nhìn, Hachiroku đang làm vẻ mặt nghiêm trọng."
# 【ハチロク】
# display as 八六
# JP: 「なるほど。そこに立ち返ると、宝生稀咲のこの一手、\n『人』を分断させる効果を狙っているように思えますね」
1542 = "「Ra là vậy. Quay lại vấn đề đó, nước cờ này của Houshou Kisaki,\ncó vẻ như đang nhắm đến hiệu quả chia rẽ 『Nhân』 nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その通りだな」
1765 = "「Đúng là vậy.」"
# monologue
# JP: 鉄道債の購入者は、ポーレットの支持者層とも、\nある程度以上一致する。
2633 = "Những người mua trái phiếu đường sắt, ở một mức độ nào đó,\ncũng trùng khớp với tầng lớp ủng hộ Paulette."
# monologue
# JP: その数人が転ぶだけでも、結束と信頼が損なわれ、\n我々陣営の“人”の優位はあっけなく喪失するだろう。
2611 = "Chỉ cần một vài người trong số họ ngã lòng, sự đoàn kết và tin tưởng sẽ bị tổn hại,\nvà ưu thế về “Nhân” của phe ta sẽ dễ dàng bị đánh mất."
# 【双鉄】
# display as 雙鐵
# JP: 「故に、人か金か。そのどちらかで優位を築けねば、\n風を吹かし得たとしてなお、僕らは負ける」
1684 = "「Do đó, Nhân hay Tài. Nếu không tạo được ưu thế ở một trong hai yếu tố đó,\nthì dù có tạo được Phong, chúng ta vẫn sẽ thua.」"
# 【日々姫】
# display as 日日姬
# JP: 「ひとつだけ、なんですけど」
1713 = "「Em có một cách, này thôi.」"
# monologue
# JP: 日々姫の声。
2453 = "Giọng của Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「お金はともかく、人に……\n結束に役立つかもしれない、アイディアがあります」
1891 = "「Tài thì không nói, nhưng về Nhân......\nEm có một ý tưởng, có thể sẽ giúp ích cho sự đoàn kết.」"
# monologue
# JP: 自信なさげな声ではあれど、僕らにきちんとそう伝え、\n日々姫は静かに立ち上がる。
2680 = "Tuy giọng nói có vẻ thiếu tự tin, nhưng em ấy đã truyền đạt rõ ràng cho chúng tôi,\nvà Hibiki lặng lẽ đứng lên."
# 【日々姫】
# display as 日日姬
# JP: 「私、それをみんな――御一夜鉄道がらみのみんな、\n出来るだけ多くに検討して欲しいです」
1694 = "「Em, muốn tất cả mọi người——những người liên quan đến Đường sắt Ohimitera,\ncàng nhiều người cùng xem xét ý tưởng đó càng tốt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そのように手配しよう。\n僕は、ポーレットへと連絡を取る」
1682 = "「Nếu vậy, anh sẽ sắp xếp.\nAnh sẽ liên lạc với Paulette.」"
# 【真闇】
# display as 真闇
# JP: 「ほーたらウチは、商店会名簿に載っとる関係者さんに、\n連絡とっておくけんねぇ」
1880 = "「Thế thì chị sẽ liên lạc với những người có liên quan,\ncó tên trong danh sách hiệp hội thương mại nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「『あの話』でしたら、関連の資料を整理してあります。\n持って行きましょう」
1233 = "「Nếu là 『Chuyện đó』 thì, em đã sắp xếp các tài liệu liên quan rồi.\nChúng ta hãy mang theo nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「ありがとう。にぃにぃ、ねぇねぇ、ハチロク」
1910 = "「Cảm ơn mọi người. Anh hai, chị hai, Hachiroku.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫……」
1745 = "「Hibiki......」"
# monologue
# JP: 月並みな言葉ではあるが、\n“立場は人を変える”ものだなと、しみじみ思う。
1176 = "Dù là một câu nói cũ rích, nhưng tôi sâu sắc cảm nhận được rằng,\n“Lập trường thay đổi con người”."
# monologue
# JP: 人に押されねば動けなかったあの日々姫が、\n今はしっかり、軸として立とうとしてくれている。
2668 = "Một Hibiki từng phải có người thúc đẩy mới chịu hành động,\ngiờ đây đang nỗ lực đứng vững như một trụ cột."
# monologue
# JP: （礼を言うのは、僕の方だ）
2742 = "（Người phải nói lời cảm ơn, là tôi mới đúng.）"
# monologue
# JP: 思うが、それは言葉に出さない。
2104 = "Nghĩ vậy, nhưng tôi không nói ra."
# monologue
# JP: 今僕が伝えるべきは、日々姫を緩める言葉ではなく。\n“ともに戦う”、その意志を示す言葉であろうと思うから。
2314 = "Điều tôi nên nói lúc này, không phải là những lời khiến Hibiki nới lỏng cảnh giác.\nMà là những lời thể hiện ý chí, “cùng nhau chiến đấu”."
# 【双鉄】
# display as 雙鐵
# JP: 「支度ができ次第すぐに動こう。\n僕らは後手を、強いられてしまっているからな」
1519 = "「Chuẩn bị xong là chúng ta hành động ngay thôi.\nBởi vì chúng ta đã bị ép vào thế bị động rồi.」"
# monologue
# JP: レールショップを手狭と感じる。\n初めて経験することだ。
2341 = "Cảm thấy cửa hàng đường sắt thật chật chội.\nĐây là lần đầu tiên tôi trải qua cảm giác này."
# 【蓑笠】
# display as 蓑笠
# JP: 「ほんなら、\n市長さんの辞任報道はまっこということになりますか」
1866 = "「Vậy thì,\ntin tức thị trưởng từ chức là sự thật sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「報道内容の細部はともかく、\nわたしが、辞任する意向であるということは本当です」
1525 = "「Chưa bàn đến chi tiết nội dung bài báo,\nnhưng việc tôi có ý định từ chức là sự thật.」"
# monologue
# JP: 大きなざわめき。
2476 = "Một tiếng xì xào lớn."
# monologue
# JP: それを収めようとするかのように、\nポーレットは深く、頭をさげる。
2504 = "Như để dập tắt sự xì xào đó,\nPaulette cúi đầu thật sâu."
# 【ポーレット】
# display as 波萊特
# JP: 「ですので、この場にお集まりくださったみなさまに、\nまずは、わたしの力不足を心よりお詫び申し上げます」
1726 = "「Vì vậy, với tất cả những người đã tập trung tại đây,\ntrước tiên, tôi xin chân thành xin lỗi vì sự thiếu năng lực của mình.」"
# monologue
# JP: そしてゆっくり顔を持ちあげ――
2507 = "Rồi cô ấy từ từ ngẩng mặt lên——"
# monologue
# JP: ポーレットは、力と思いのこもる目で、\n周囲をじっ……と、眺め渡す。
2222 = "Bằng ánh mắt chứa chan sức mạnh và quyết tâm,\nPaulette lặng lẽ...... đưa mắt nhìn quanh."
# 【ポーレット】
# display as 波萊特
# JP: 「ですが、以降は鉄道業に全力を傾注することにより、\n御一夜鉄道を通じた観光振興を必ずや実現して参ります」
1662 = "「Tuy nhiên, từ nay về sau, bằng cách dốc toàn lực vào ngành đường sắt,\ntôi nhất định sẽ thực hiện được việc chấn hưng du lịch thông qua Đường sắt Ohimitera.」"
# 【債権者Ｂ】
# display as 債權人Ｂ
# JP: 「いや、そんな努力目標はどうでもよくてな」
1687 = "「Không, mấy cái mục tiêu phấn đấu đó sao cũng được.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「一つ、質問をよろしいでしょうか？」
1720 = "「Tôi có thể hỏi một câu được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「もちろんです。赤井宮司、どうぞ」
1790 = "「Tất nhiên rồi ạ. Xin mời thầy cúng Akai.」"
# monologue
# JP: 赤井宮司の静かな挙手に、\n声を荒らげ腰を浮かせていた男が、口を噤んで引き下がる。
2644 = "Trước cái giơ tay điềm tĩnh của thầy cúng Akai,\nngười đàn ông đang lớn tiếng và nhổm dậy liền im bặt và lùi lại."
# monologue
# JP: 確か、御一夜の職人さんたちのお一人だ。\n協力をして頂いたのに不安を与え、素直に申し訳なく思う。
2333 = "Nếu tôi nhớ không lầm, ông ấy là một trong những nghệ nhân của Ohimitera.\nĐã nhờ họ hợp tác mà lại khiến họ bất an, tôi thực sự thấy có lỗi."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「\\x%l8620;#00ffc040;8620%l;#;を観光復興の軸に――という当初プランの実現には、\n現状、ぶ厚い壁が立ち塞がっていますよね？」
1506 = "「Để thực hiện kế hoạch ban đầu là lấy \\x%l8620;#00ffc040;8620%l;#; làm trục chấn hưng du lịch——\nhiện tại, đang có một bức tường dày cản bước đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「その通りです」
1669 = "「Đúng vậy ạ.」"
# monologue
# JP: が、未然にヤジを潰してもらえば、\nポーレットの言は曇らず冴える。
2196 = "Nhưng, nếu dập tắt được những lời chế nhạo từ trước,\nthì lời nói của Paulette sẽ trở nên rõ ràng và sắc bén hơn."
# 【ポーレット】
# display as 波萊特
# JP: 「その問題の解決案の提示。そして、来たる市長選への備え。\nその二つが、今日お集まりいただいた理由となります」
1490 = "「Trình bày giải pháp cho vấn đề đó. Và, chuẩn bị cho cuộc bầu cử thị trưởng sắp tới.\nĐó là hai lý do mà chúng tôi mời mọi người tập trung ngày hôm nay.」"
# 【凪】
# display as 凪
# JP: 「\\x%l客車;#00ffc040;客車%l;#;の煙ば、のーなったと？」
1204 = "「Khói trong \\x%l客車;#00ffc040;toa hành khách%l;#;, hết rồi hả?」"
# 【ふかみ】
# display as 深美
# JP: 「ちょ、凪ちゃんっ！？」
1638 = "「Khoan đã, Nagi!?」"
# monologue
# JP: 控えめなざわめきたちを、ふかみの制止を飛び越えて、\n凪がぽーんと、素朴な問いを投げ込んでくる。
2152 = "Vượt qua những tiếng xì xào khe khẽ, bất chấp sự can ngăn của Fukami,\nNagi buột miệng ném ra một câu hỏi ngây ngô."
# 【凪】
# display as 凪
# JP: 「あぎゃんと煙もくもくじゃ、\n観光だか炭鉱だかよーわからんばい」
1888 = "「Khói mù mịt thế kia thì,\nchẳng biết là đi du lịch hay đi mỏ than nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「ダメだよ、そんな本当のこといっちゃ――って、\nあ！　ごめんなさい。です」
1468 = "「Không được đâu, sao em lại nói sự thật thế chứ——ơ,\na! Xin lỗi ạ.」"
# monologue
# JP: 自爆しあわてるふかみに向かい、\nポーレットは落ち着き払った、穏やかな笑みを投げ返す。
2513 = "Hướng về phía Fukami đang luống cuống vì tự vạch áo cho người xem lưng,\nPaulette bình tĩnh đáp lại bằng một nụ cười dịu dàng."
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。煙害を防止できずに、\n\\x%l8620;#00ffc040;8620%l;#;による観光振興は達成しえません」
1763 = "「Đúng vậy. Nếu không thể ngăn chặn tác hại của khói,\nthì không thể nào đạt được mục tiêu chấn hưng du lịch bằng \\x%l8620;#00ffc040;8620%l;#; được.」"
# monologue
# JP: そして、ツ――と、\n青い瞳が横へ振られる。
2234 = "Rồi, xoẹt——,\nđôi mắt xanh biếc khẽ liếc sang ngang."
# 【ポーレット】
# display as 波萊特
# JP: 「その件については、\\x%l8620;#00ffc040;8620%l;#;専用\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、\nハチロクからご説明させていただきます」
1899 = "「Về vấn đề đó, xin nhường lời giải thích cho \\x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của \\x%l8620;#00ffc040;8620%l;#;,\nHachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「ご紹介にあずかりましたハチロクです。\n\\x%l客車;#00ffc040;客車%l;#;の問題は、もちろん我がことと感じています」
1729 = "「Cảm ơn cô đã giới thiệu, tôi là Hachiroku.\nVấn đề của \\x%l客車;#00ffc040;toa hành khách%l;#;, đương nhiên tôi coi đó như chuyện của chính mình.」"
# monologue
# JP: 簡潔な挨拶。\n軽い会釈。
2143 = "Lời chào ngắn gọn.\nCái cúi đầu nhẹ."
# monologue
# JP: ざわめきは、波が引くように静まっていき、\nレールショップにはただ、ハチロクの声だけが響く。
2477 = "Những tiếng xì xào lắng xuống như sóng rút,\ntrong cửa hàng đường sắt giờ đây chỉ còn vang lên giọng nói của Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にとって、車輌とは分身のようなものです。\nそれだけに、寿命に対し、固定的な見方をしていました」
1634 = "「Đối với \\x%lレイルロオド;#00ffc040;Railord%l;#;, toa xe giống như một phần cơ thể vậy.\nChính vì thế, chúng tôi đã có một cái nhìn rập khuôn về tuổi thọ của chúng.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「固定的な見方、とは？」
1667 = "「Cái nhìn rập khuôn, là sao?」"
# 【ハチロク】
# display as 八六
# JP: 「まるでひとつの生き物として見るかのように、\n車輌寿命を車輌全体の寿命として見てしまっていた」
1199 = "「Chúng tôi đã xem toa xe như một sinh vật nguyên khối,\nvà coi tuổi thọ của toa xe là tuổi thọ của toàn bộ cấu trúc.」"
# monologue
# JP: 禅問答のような言葉に、小さなざわめきが復活する。
2683 = "Những lời như thiền ngữ khiến những tiếng xì xào nhỏ lại nổi lên."
# monologue
# JP: それに焦らず、たっぷり間を取り、\nハチロクはゆったりとした手招きをする。
2207 = "Không hề tỏ ra lúng túng, Hachiroku dừng lại một nhịp dài,\nrồi thong thả vẫy tay."
# 【ハチロク】
# display as 八六
# JP: 「れいな。あれを」
1788 = "「Reina. Lấy thứ đó ra đây.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！　れいな、\n\\x%lキハ07;#00ffc040;キハ07%l;#;s専用れいるろおどのれいなです。こんにちわぁ」
1622 = "「Vâng ạ! Reina,\nlà Railord chuyên dụng của \\x%lキハ07;#00ffc040;KiHa 07%l;#;S. Xin chào mọi người nha~」"
# monologue
# JP: ぺこりと深く、良い子のおじぎ。\nれいなが声を発しただけで、場の雰囲気は些か和らぐ。
2535 = "Một cái cúi chào thật sâu, thật ngoan ngoãn.\nChỉ cần Reina cất tiếng, bầu không khí trong phòng đã dịu đi đôi chút."
# monologue
# JP: れいなの手には\\x%lキハ07;#00ffc040;キハ07%l;#;sの鉄道模型。\nレールショップにいつも飾られているものだ。
2538 = "Trên tay Reina là mô hình đường sắt của \\x%lキハ07;#00ffc040;KiHa 07%l;#;S.\nĐó là thứ vẫn luôn được trưng bày trong cửa hàng đường sắt."
# 【れいな】
# display as 玲奈
# JP: 「これは、\\x%lNゲージ;#00ffc040;Nゲージ%l;#;っていいます。\nモーターのついたシャーシと、車体とでできてますぅ」
1859 = "「Cái này gọi là \\x%lNゲージ;#00ffc040;N-gauge%l;#; đó ạ.\nNó được cấu tạo từ một khung gầm có gắn mô-tơ và phần thân xe nha~」"
# 【ハチロク】
# display as 八六
# JP: 「シャーシを、\\x%l台車;#00ffc040;台車%l;#;プラス\\x%l台枠;#00ffc040;台枠%l;#;と考えれば、\nこれは実際の鉄道車輌の構造と類似しています」
1551 = "「Nếu coi khung gầm là sự kết hợp giữa \\x%l台車;#00ffc040;giá chuyển hướng%l;#; và \\x%l台枠;#00ffc040;khung gầm%l;#;,\nthì cấu trúc này tương tự như cấu trúc của một toa xe đường sắt thực tế.」"
# monologue
# JP: ハチロクの手にも、いつのまに一台の\\x%lNゲージ;#00ffc040;Nゲージ%l;#;。\nこれは、\\x%l8620;#00ffc040;8620%l;#;を模している」
2140 = "Trên tay Hachiroku cũng đã có một chiếc \\x%lNゲージ;#00ffc040;N-gauge%l;#; từ lúc nào.\nĐó là mô hình của \\x%l8620;#00ffc040;8620%l;#;."
# 【れいな】
# display as 玲奈
# JP: 「[れいななえす,4]キハ07sはふるぅくなって、車内に、\nお外の空気がはいってきちゃうようになりましたぁ」
1686 = "「KiHa 07S đã cũ rồi, nên không khí bên ngoài,\ncứ thế ùa vào trong xe luôn đó ạ~」"
# 【ハチロク】
# display as 八六
# JP: 「しかし、シャーシは健在です。\nあと何万キロも走ることができるでしょう」
1471 = "「Tuy nhiên, khung gầm vẫn còn rất tốt.\nNó có thể chạy thêm hàng vạn km nữa.」"
# monologue
# JP: れいなが赤い車輌を下げて、\nハチロクが\\x%l8620;#00ffc040;8620%l;#;を持ち上げる。
2542 = "Reina hạ mô hình toa xe màu đỏ xuống,\nvà Hachiroku nâng mô hình \\x%l8620;#00ffc040;8620%l;#; lên."
# 【ハチロク】
# display as 八六
# JP: 「かたや、この[ハチロク,3]8620のシャーシはもはや限界です。\nが、車体部分はいぜん壮健。あと何年も使えそうです」
1823 = "「Mặt khác, khung gầm của chiếc 8620 này đã đến giới hạn.\nNhưng, phần thân xe vẫn còn rất chắc chắn. Có vẻ như có thể sử dụng thêm nhiều năm nữa.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ！」
1575 = "「A!」"
# monologue
# JP: 心底、驚いたような声。\n赤井宮司は、その目を大きく見開いている。
2645 = "Một giọng nói kinh ngạc từ tận đáy lòng.\nThầy cúng Akai mở to hai mắt."
# 【れいな】
# display as 玲奈
# JP: 「はぁい。そうなんですよぉ」
1754 = "「Vâng ạ. Đúng là vậy đó nha~」"
# 【ハチロク】
# display as 八六
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と車輌とが一対であるとの先入観。\nそれは客貨車までにも及び、視野を狭め続けてきました」
1198 = "「Định kiến cho rằng \\x%lレイルロオド;#00ffc040;Railord%l;#; và toa xe là một cặp không thể tách rời.\nNó lan sang cả toa khách và toa hàng, khiến tầm nhìn của chúng ta bị thu hẹp.」"
# monologue
# JP: （かぽっ）
2723 = "（Cụp）"
# monologue
# JP: ほとんど同時に。\n\\x%lキハ07;#00ffc040;キハ07%l;#;sと\\x%l8620;#00ffc040;8620%l;#;それぞれの、車輌のシャーシが外される。
2134 = "Gần như cùng lúc.\nKhung gầm của \\x%lキハ07;#00ffc040;KiHa 07%l;#;S và \\x%l8620;#00ffc040;8620%l;#; đều được tháo ra."
# monologue
# JP: そしてハチロクとれいなの手は、\n稼働可能なシャーシと車体とを組み合わせる。
2523 = "Và rồi tay của Hachiroku cùng Reina,\nlắp ráp phần khung gầm còn hoạt động được với phần thân xe."
# 【ハチロク】
# display as 八六
# JP: 「このように」
1864 = "「Như thế này.」"
# monologue
# JP: （シャーーーッ！）
2724 = "（Vùuuu!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1918 = "「!」"
# monologue
# JP: 息を呑んだのは僕だけではない。\nざわり、大きなどよめきが起こる。
2162 = "Không chỉ mình tôi nín thở.\nMột tiếng xôn xao lớn nổi lên."
# monologue
# JP: 据え付けられてる\\x%lNゲージ;#00ffc040;Nゲージ%l;#;レールに置かれた瞬間、\n組み替えられた新車両が、勢いも良く走り出すから。
2595 = "Bởi vì ngay khoảnh khắc được đặt lên đường ray \\x%lNゲージ;#00ffc040;N-gauge%l;#;,\ntoa xe mới được lắp ráp lại lao đi với tốc độ đáng kinh ngạc."
# 【ハチロク】
# display as 八六
# JP: 「――このように単純、かつ効果的であることを、\nしかし、我々は行っては来ませんでした」
1214 = "「——Một phương pháp đơn giản và hiệu quả như thế này,\nnhưng chúng ta lại chưa từng thực hiện.」"
# monologue
# JP: 残されている、\\x%l8620;#00ffc040;8620%l;#;のものだったシャーシと、\n\\x%lキハ07;#00ffc040;キハ07%l;#;sのものだった車体。
2156 = "Những gì còn lại là phần khung gầm của \\x%l8620;#00ffc040;8620%l;#;,\nvà phần thân xe của \\x%lキハ07;#00ffc040;KiHa 07%l;#;S."
# monologue
# JP: それをれいなは左手にのせ、\nいとおしそうに右手で撫ぜる。
2541 = "Reina đặt chúng lên tay trái,\nvà âu yếm vuốt ve bằng tay phải."
# 【れいな】
# display as 玲奈
# JP: 「れいな、思うんです。れいながもし壊れちゃっても、\nれいなの部品が誰かの役にたつならすごく嬉しいなって」
1786 = "「Reina nghĩ là. Dù Reina có bị hỏng đi chăng nữa,\nnếu các bộ phận của Reina có thể giúp ích cho ai đó thì Reina sẽ vui lắm ạ~」"
# 【ハチロク】
# display as 八六
# JP: 「その思いを、わたくしも同じく抱いています。\nそして全ての廃車両たちも、同様であると信じます」
1674 = "「Tôi cũng có cùng suy nghĩ đó.\nVà tôi tin rằng tất cả những toa xe đã phế liệu cũng vậy.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「つまり……端的に言い直すのなら」
1246 = "「Tóm lại...... nói một cách thẳng thắn thì.」"
# monologue
# JP: 赤井宮司の声にさえ、緊張に近いものを感じる。
2660 = "Thậm chí trong giọng nói của thầy cúng Akai, tôi cũng cảm nhận được sự căng thẳng."
# monologue
# JP: ハチロクとれいなのパフォーマンスは、\nそれほど強いインパクトで、僕らに理解を迫ってきた。
2137 = "Màn trình diễn của Hachiroku và Reina,\nđã tạo ra một tác động mạnh mẽ, buộc chúng tôi phải thấu hiểu."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「他の廃\\x%l客車;#00ffc040;客車%l;#;との[パッチワーク,3]継ぎ接ぎで、\n状態の良い\\x%l客車;#00ffc040;客車%l;#;を一つ、作り出そうということですか？」
1504 = "「Ý cô là sẽ chắp vá với các \\x%l客車;#00ffc040;toa hành khách%l;#; phế liệu khác,\nđể tạo ra một \\x%l客車;#00ffc040;toa hành khách%l;#; có tình trạng tốt sao?」"
# 【ハチロク】
# display as 八六
# JP: 「そのとおりです」
# 1765 = "「沒錯」" 
# monologue
# JP: 余分の全くない返答は、\n多くの疑問を引き起こす。
2147 = "Câu trả lời không thừa một chữ nào,\nđã dấy lên vô số câu hỏi."
# 【債権者Ａ】
# display as 債權人Ａ
# JP: 「パッチワークいうて、その元となる車輌は\nどこからどう入手すっとよ」
1736 = "「Bảo là chắp vá, thế mấy toa xe làm nguyên liệu đó\nlấy từ đâu và bằng cách nào?」"
# 【債権者Ｂ】
# display as 債權人Ｂ
# JP: 「車輌移送に大金がかかりよるけん、\n鉄道債を発行したんじゃなかと？」
1843 = "「Việc di chuyển toa xe tốn rất nhiều tiền,\nchẳng phải vì thế mới phát hành trái phiếu đường sắt sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「それは」
1901 = "「Đó là」"
# monologue
# JP: すっくと、日々姫が立ち上がる。
2410 = "Hibiki đứng bật dậy."
# monologue
# JP: 僕の隣で、体をわずかに震わせながら――\nけれども、声はまっすぐに出す。
2226 = "Đứng cạnh tôi, cơ thể em ấy hơi run rẩy——\nNhưng, giọng nói lại vô cùng dứt khoát."
# 【日々姫】
# display as 日日姬
# JP: 「複数輌をまとめての移送で、\n大幅なコストダウンを図ろうという計画です」
1685 = "「Kế hoạch của chúng tôi là di chuyển cùng lúc nhiều toa xe,\nnhằm giảm thiểu chi phí một cách tối đa.」"
# 【債権者Ａ】
# display as 債權人Ａ
# JP: 「複数輌をまとめてってよ、\n御一夜鉄道にゃそぎゃんと多か車輌の必要――っ！」
1459 = "「Bảo là di chuyển cùng lúc nhiều toa xe,\nchứ Đường sắt Ohimitera đâu cần nhiều toa xe đến thế——!」"
# monologue
# JP: 口先をとがらせていたおじさんが、\nぽかんとその口を開けたまま、驚きの目で日々姫を見る。
2666 = "Người đàn ông trung niên vừa mới chu mỏ phản bác,\ngiờ há hốc mồm, nhìn Hibiki bằng ánh mắt kinh ngạc."
# monologue
# JP: 日々姫はその視線を受け止め、強く、頷く。
2427 = "Đón nhận ánh nhìn đó, Hibiki mạnh mẽ gật đầu."
# 【日々姫】
# display as 日日姬
# JP: 「廃車両のパッチワークによる再生。それを、\nひとつの新産業に出来るのではないかと思ってます」
1856 = "「Tái sinh toa xe phế liệu bằng cách chắp vá. Chúng tôi nghĩ rằng,\ncó thể biến nó thành một ngành công nghiệp mới.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そうか――確かに」
1248 = "「......Ra là vậy——Quả thực là thế.」"
# monologue
# JP: \\x%l客車;#00ffc040;客車%l;#;不足という現状を、僕らは身をもって思い知らされた。
2293 = "Chúng tôi đã tự mình nếm trải thực trạng thiếu hụt \\x%l客車;#00ffc040;toa hành khách%l;#;."
# monologue
# JP: ニーズが例え乏しくあれど、\nシェアを独占できるのならば、確かに事業が成立しよう。
2248 = "Dù cho nhu cầu có ít ỏi đi chăng nữa,\nnhưng nếu có thể độc chiếm thị phần, thì chắc chắn việc kinh doanh sẽ thành lập."
# 【双鉄】
# display as 雙鐵
# JP: 「この案、真闇姉が」
1857 = "「Ý tưởng này, là của chị Mayami sao?」"
# 【真闇】
# display as 真闇
# JP: 「違かとよ」
1461 = "「Không phải đâu.」"
# monologue
# JP: 真闇姉の短い答えと誇らしげな笑み。\nぞくり、背筋が震えてしまう。
2574 = "Câu trả lời ngắn gọn cùng nụ cười đầy tự hào của chị Mayami.\nKhiến sống lưng tôi bất giác run lên."
# monologue
# JP: ならば日々姫はハチロクとれいなと知恵を出し合い――\n己の力のみにより、この結論に辿り着いたのだと知って。
2168 = "Vậy ra Hibiki đã cùng Hachiroku và Reina vắt óc suy nghĩ——\nvà tự mình đi đến kết luận này chỉ bằng chính sức lực của bản thân."
# monologue
# JP: （真闇姉が、ポーレットが、僕が……\n与えてきたものだけでは、恐らくそこまで至れまい）
2714 = "（Chỉ với những gì chị Mayami, Paulette và tôi......\nđã truyền đạt, có lẽ em ấy sẽ không thể tiến xa đến thế.）"
# monologue
# JP: 看板描きの仕事を通じ、数多の商店主から得て来た学びが、\nそして他ならぬ宝生稀咲から学んだものが――
2460 = "Những bài học em ấy rút ra từ vô số chủ cửa hàng qua công việc vẽ biển hiệu,\nvà đặc biệt là những gì học được từ chính Houshou Kisaki——"
# monologue
# JP: 今、ここに来て、日々姫の中で結ばれて、\n大きな花を、咲かせようとしているのだろう。
2546 = "Giờ đây, tất cả đã hội tụ lại trong Hibiki,\nvà chuẩn bị nở rộ thành một bông hoa rực rỡ."
# 【債権者Ｂ】
# display as 債權人Ｂ
# JP: 「車輌再生ゆーんわよ、どぎゃん技術の集積と？」
1842 = "「Tái sinh toa xe ấy hả, cần tập hợp những kỹ thuật gì?」"
# 【ハチロク】
# display as 八六
# JP: 「主として、鉄工と木工と塗装とですね。\n\\x%l艤装;#00ffc040;艤装%l;#;部分には、難燃性の布やガラス、樹脂、照明なども」
1481 = "「Chủ yếu là thợ sắt, thợ mộc và thợ sơn.\nĐối với phần \\x%l艤装;#00ffc040;trang thiết bị nội ngoại thất%l;#;, còn cần vải chống cháy, kính, nhựa, thiết bị chiếu sáng, v.v.」"
# monologue
# JP: ハチロクの答えに、おお、という歓声が沸き起こる。\n鉄道債の購入者さんたちの多くは、技術者――
2192 = "Câu trả lời của Hachiroku làm dấy lên những tiếng trầm trồ \"Ồ\".\nPhần lớn những người mua trái phiếu đường sắt đều là kỹ thuật viên——"
# monologue
# JP: ボランティアで\\x%l8620;#00ffc040;8620%l;#;改修に力を貸してくれた人達なのだと、\n高まる熱気が教えてくれる。
2474 = "Sức nóng đang dâng cao trong phòng đã cho thấy,\nhọ chính là những người đã tình nguyện góp sức cải tạo \\x%l8620;#00ffc040;8620%l;#;."
# 【債権者Ａ】
# display as 債權人Ａ
# JP: 「鉄工と木工のごつ、御一夜で賄える技術ばい」
1892 = "「Sắt với mộc thì Ohimitera dư sức lo được.」"
# 【債権者Ｂ】
# display as 債權人Ｂ
# JP: 「市長、どぎゃんと！\nそん事業ば、廻せる見通しばもっちゅうんかね」
1653 = "「Thị trưởng, cô thấy sao!\nCô có nắm chắc dự án này sẽ hoạt động trơn tru không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしが市長と御一夜鉄道社長とを兼務したままでは、\nこれ以上の事業拡大は不可能だと判断しました」
1723 = "「Tôi nhận định rằng, nếu tôi vẫn tiếp tục kiêm nhiệm cả chức thị trưởng và giám đốc Đường sắt Ohimitera,\nthì việc mở rộng kinh doanh hơn nữa là điều không thể.」"
# monologue
# JP: 言って、沈黙。\n五秒、十秒――沈黙の間に、みなの視線が移動する。
2128 = "Nói xong, cô ấy im lặng.\nNăm giây, mười giây——trong khoảng lặng đó, ánh mắt của mọi người bắt đầu di chuyển."
# monologue
# JP: ポーレットから、少し彷徨い真闇姉へ、僕へ、赤井宮司へ。\nそしていつしか、たった一人へと集合していく。
2579 = "Từ Paulette, khẽ lướt sang chị Mayami, sang tôi, rồi đến thầy cúng Akai.\nVà rồi chẳng biết từ lúc nào, tất cả đều dồn về một người duy nhất."
# 【日々姫】
# display as 日日姬
# JP: 「えっ――あっ――あのっ」
1560 = "「Ơ——a——cái đó.」"
# monologue
# JP: 声が、上手く出てこないのか。\n視線の集中にさらされて、日々姫は見るからに狼狽する。
2200 = "Không cất nổi thành lời sao.\nBị bao ánh mắt đổ dồn vào, Hibiki trông vô cùng bối rối."
# 【双鉄】
# display as 雙鐵
# JP: 「背伸びをするな。\nポーレットのようにやろうと思うな」
1464 = "「Đừng cố quá sức.\nĐừng nghĩ mình phải làm giống Paulette.」"
# monologue
# JP: だから、小声で。\nほんのわずかな支えを、日々姫に。
2335 = "Thế nên, tôi khẽ nói.\nMột sự ủng hộ nhỏ nhoi dành cho Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「そのままのお前でいい。\n僕らは――いや、僕は。そうあることを望んでいる」
1517 = "「Cứ là chính em là được.\nChúng ta——không, anh. Anh mong em sẽ như vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 1918 = "「！」" 
# monologue
# JP: ぴたりと、日々姫の震えが止まる。
2629 = "Hibiki lập tức ngừng run rẩy."
# monologue
# JP: 息を吸い、吐き。手のひらが僕の方へと少し動いて――\nそのままぎゅっと、拳の形に握られ、止まる。
2211 = "Hít vào, thở ra. Bàn tay em ấy khẽ nhúc nhích về phía tôi——\nRồi cứ thế nắm chặt lại thành nắm đấm, và dừng lại."
# 【日々姫】
# display as 日日姬
# JP: 「あの、看板作成などでご縁をいただいた方にも、\nはじめましての方にも、自己紹介させていただきます」
1878 = "「Dạ, với những người đã từng làm việc cùng cháu qua việc vẽ biển hiệu,\nvà cả những người mới gặp lần đầu, cháu xin phép được tự giới thiệu.」"
# monologue
# JP: 日々姫はもう、僕を見てない。\n僕は日々姫の横顔をじっと見上げてる。
2443 = "Hibiki không còn nhìn tôi nữa.\nTôi cứ thế ngước nhìn góc nghiêng của em ấy."
# 【日々姫】
# display as 日日姬
# JP: 「私、右田日々姫です。右田一酒造元の末娘で、\n御一夜鉄道株式会社の車輌部長で、見習い\\x%l機関助士;#00ffc040;機関助士%l;#;で」
1690 = "「Cháu là Migita Hibiki. Là con gái út của xưởng rượu Migita,\nlà Trưởng phòng Toa xe của Công ty Cổ phần Đường sắt Ohimitera, và là \\x%l機関助士;#00ffc040;Phụ lái tàu%l;#; tập sự.」"
# monologue
# JP: “車輌部長”は、僕の\\x%l保線;#00ffc040;保線%l;#;部長と同様、\n急遽で付けられた役職だろう。
1183 = "“Trưởng phòng Toa xe”, cũng giống như chức Trưởng phòng \\x%l保線;#00ffc040;Bảo trì đường ray%l;#; của tôi,\nchắc hẳn là một chức vụ được gán ghép vội vàng."
# monologue
# JP: “肩書は、思った以上に人に影響を与える”と――\nポーレットは、そのことを痛感しているようであるから。
2508 = "“Chức danh ảnh hưởng đến con người nhiều hơn ta nghĩ”——\nCó vẻ như Paulette đã thấu hiểu sâu sắc điều đó."
# 【日々姫】
# display as 日日姬
# JP: 「それで私。宝生稀咲先輩の――隈元銀行御一夜支店長の、\n後輩――親しくしていただいている、後輩でもあります」
1548 = "「Và cháu. Là hậu bối của đàn chị Houshou Kisaki——Giám đốc chi nhánh Ohimitera của Ngân hàng Kumamoto——\ncháu cũng là một hậu bối khá thân thiết với chị ấy.」"
# monologue
# JP: どおっと、ざわめき。\nけれど、それは怒号にまではつながらない。
2480 = "Một tràng xì xào ồ lên.\nNhưng, nó không biến thành những tiếng la ó tức giận."
# monologue
# JP: 日々姫が積み重ねてきた物が抑えてくれてるのだろうか？\n誰もが、日々姫の次の言葉を待ってくれている。
2471 = "Có phải những gì Hibiki đã dày công vun đắp đang kìm hãm họ lại?\nTất cả mọi người đều đang chờ đợi câu nói tiếp theo của Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「御一夜の衰退を見たくない、発展をしてほしい気持ち、\n私にも、もちろん、すごくあります」
1672 = "「Cháu không muốn thấy Ohimitera suy tàn, cháu muốn nơi này phát triển,\ntất nhiên, bản thân cháu cũng có mong muốn đó rất mãnh liệt.」"
# monologue
# JP: かたかたと、\nまた日々姫の手が、わずかにだけれど震え始める。
2438 = "Lập cập,\nbàn tay Hibiki lại bắt đầu run lên một chút."
# monologue
# JP: 値踏みするような視線が日々姫を、怯えさせてる。
2578 = "Những ánh mắt như đang dò xét, đánh giá khiến Hibiki sợ hãi."
# 【日々姫】
# display as 日日姬
# JP: 「だから、私、稀咲先輩のやってることも、わかります。\nけど、わかる気持ちより強く、守りたいって思います」
1728 = "「Vì vậy, cháu cũng hiểu những gì đàn chị Kisaki đang làm.\nNhưng, hơn cả sự thấu hiểu đó, cháu khao khát muốn bảo vệ nơi này.」"
# monologue
# JP: わかっているが、手は伸ばせない。
2328 = "Dù biết vậy, nhưng tôi không thể đưa tay ra."
# monologue
# JP: ここで一人で頑張れなければ、\n市長職など、決して務まるものではない。
2240 = "Nếu không thể tự mình vượt qua lúc này,\nthì chức thị trưởng, em ấy sẽ không bao giờ đảm đương nổi."
# 【日々姫】
# display as 日日姬
# JP: 「クマ川の水がもしも汚れてしまったら――\n失われてしまった物は、取り返せないって思います」
1456 = "「Nếu như nước sông Kuma bị ô nhiễm——\nnhững thứ đã mất đi, cháu nghĩ sẽ không thể nào lấy lại được.」"
# monologue
# JP: レールショップに垂れ込めている沈黙の中、\nほう、と感心したような声。
2242 = "Giữa sự im lặng đang bao trùm cửa hàng đường sắt,\nmột tiếng \"ồ\" đầy thán phục vang lên."
# monologue
# JP: 顔もわからぬ誰かひとりの、あまりにもささやかな同意\n――ただそれだけで、日々姫の背筋が再び伸びる。
2657 = "Một sự đồng tình quá đỗi nhỏ bé từ một người không rõ mặt\n——chỉ vậy thôi cũng đủ để Hibiki vươn thẳng lưng thêm lần nữa."
# 【日々姫】
# display as 日日姬
# JP: 「だから、環境を守るため。\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致無しでも、\n御一夜の経済に、必ず復活してほしくって」
1775 = "「Vì vậy, để bảo vệ môi trường. Dù không thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;,\ncháu vẫn mong kinh tế Ohimitera nhất định sẽ vực dậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「そのために、\\x%l客車;#00ffc040;客車%l;#;を改修して売る事業、\nポーレットさんに成功させて欲しいってすごく思ってて」
1778 = "「Để làm được điều đó, dự án cải tạo và bán lại \\x%l客車;#00ffc040;toa hành khách%l;#;,\ncháu thực sự rất muốn chị Paulette sẽ thành công.」"
# monologue
# JP: 声に、力がこもり始める。\n言葉から迷いが消えていく。
2224 = "Giọng nói bắt đầu tràn đầy sức mạnh.\nSự do dự dần tan biến trong từng lời nói."
# 【日々姫】
# display as 日日姬
# JP: 「それで、私――今はまだ、力不足ですけど、\n政治のこと、全然勉強足りてないってわかってますけど」
1718 = "「Vì thế, cháu——dù hiện tại năng lực vẫn còn yếu kém,\ndù cháu biết mình học hỏi về chính trị chưa hề đủ.」"
# 【日々姫】
# display as 日日姬
# JP: 「それでも、ポーレットさんを助けるために、\n私の好きな御一夜を守るために、私――」
1557 = "「Nhưng dù vậy, để giúp đỡ chị Paulette,\nđể bảo vệ Ohimitera mà cháu yêu quý, cháu——」"
# monologue
# JP: 沈黙。\nきゅっと目を閉じ、開く。
2446 = "Im lặng.\nNhắm chặt mắt lại, rồi mở ra."
# monologue
# JP: ――日々姫はもう、怯えていない。
1170 = "——Hibiki đã không còn sợ hãi nữa."
# 【日々姫】
# display as 日日姬
# JP: 「私、市長選に立候補したいって思ってます。\nですので、どうか――みなさん、力を貸してください」
1703 = "「Cháu, muốn ứng cử vào cuộc bầu cử thị trưởng.\nVì vậy, xin mọi người——hãy cho cháu mượn sức mạnh.」"
# 【ハチロク】
# display as 八六＆玲奈
# JP: 「もちろんです！」\n「れいな、力をかしますよぉ！」
1791 = "「Tất nhiên rồi ạ!」\n「Reina, sẽ giúp một tay nha~!」"
# monologue
# JP: サクラにしては浮きすぎな、\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の声と声。
73 = "Những tiếng hô hào của các \\x%lレイルロオド;#00ffc040;Railord%l;#;,\nhơi quá khích nếu coi là chim mồi."
# monologue
# JP: そこにパチパチ、パチパチと、\nまばらな拍手がまじり始める。
2479 = "Lẫn vào đó là lác đác những tiếng vỗ tay,\nlách tách, lách tách."
# 【日々姫】
# display as 日日姬
# JP: 「……あっ」
1240 = "「......A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「よくやった。日々姫らしい言葉だった」
1837 = "「Làm tốt lắm. Những lời rất ra dáng Hibiki đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら、よかった」
1610 = "「Vậy thì, tốt quá rồi.」"
# monologue
# JP: 日々姫は椅子に座ると同時に、\n僕の方へと崩れてくる。
2414 = "Ngay khoảnh khắc ngồi xuống ghế,\nHibiki gục người về phía tôi."
# monologue
# JP: 一仕事を終えた後なら、肩を貸すくらい構わんだろう。\n日々姫の重みを受け止めながら、改めて周囲に視線を送る。
2249 = "Sau khi hoàn thành xong một công việc lớn, cho mượn bờ vai một chút cũng chẳng sao.\nĐỡ lấy sức nặng của Hibiki, tôi lại đưa mắt nhìn quanh một lần nữa."
# monologue
# JP: （まぁ、こんなものか――）
2726 = "（Chà, cũng tầm cỡ này thôi sao——）"
# monologue
# JP: 日々姫の言葉は、日々姫らしく。
2441 = "Lời của Hibiki, mang đậm chất Hibiki."
# monologue
# JP: それゆえ、迷いと怯えを消してなお、\n絶対的な――信念を持つ者が持つ――強さを持たない。
2077 = "Chính vì thế, dù đã xóa bỏ được sự do dự và sợ hãi,\nem ấy vẫn chưa có được sự mạnh mẽ tuyệt đối——của một người mang trong mình niềm tin mãnh liệt."
# 【債権者Ａ】
# display as 債權人Ａ
# JP: 「で、市長――いや、社長っ」
1889 = "「Vậy, thưa thị trưởng——à không, thưa giám đốc.」"
# 【債権者Ｂ】
# display as 債權人Ｂ
# JP: 「具体的に、廃車両の手配の目処なんぞは」
1603 = "「Cụ thể thì, nguồn cung cấp toa xe phế liệu đã có manh mối gì chưa?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それに関しては、資料を用意してあります」
1902 = "「Về việc đó, chúng tôi đã chuẩn bị sẵn tài liệu rồi.」"
# 【債権者Ａ】
# display as 債權人Ａ
# JP: 「おお」
1594 = "「Ồ.」"
# monologue
# JP: （だが、そこを評価してくれる方もいるのだ――）
2716 = "（Nhưng, cũng có những người đánh giá cao điều đó——）"
# monologue
# JP: まばらな拍手の主たちが、誰であったかまでは追えない。\nけれども、僕には確信できる。
2287 = "Không thể dò ra những người vỗ tay lác đác kia là ai.\nNhưng, tôi có thể tin chắc."
# monologue
# JP: （日々姫は、きっとその期待を裏切らない。\n誰一人とて、目的のため切り捨てるようなことはない）
2734 = "（Hibiki, nhất định sẽ không phụ sự kỳ vọng đó.\nEm ấy sẽ không bao giờ vứt bỏ bất cứ ai vì mục đích của mình.）"
# monologue
# JP: 全てを抱え込むがゆえ、\n何かを捨てないがゆえの日々姫の弱さはいつか――
2353 = "Vì ôm đồm tất cả,\nvì không vứt bỏ thứ gì nên sự yếu đuối của Hibiki rồi sẽ có một ngày——"
# monologue
# JP: 今の、迷える御一夜の、\n大きな力に、支えへと、きっと育っていく筈だ。
2068 = "Chắc chắn sẽ lớn lên thành một sức mạnh to lớn,\nthành điểm tựa cho một Ohimitera đang lạc lối hiện tại."
# 【日々姫】
# display as 日日姬
# JP: 「ぅ～～ぁ～～っ」
1580 = "「Ư～～a～～」"
# monologue
# JP: 熱っぽい声。\n布団の上に、ごろり横たわり汗ばむ体。
2468 = "Giọng nói mang theo hơi nóng.\nCơ thể đổ mồ hôi nằm ườn trên nệm."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、水――水ば、ちょーだい」
1909 = "「Anh hai, nước――cho em xin, ngụm nước.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1587 = "「Ừm.」"
# monologue
# JP: 水のみの中には、キンと冷やした、\nクマ川源流の上等な水。
2310 = "Trong bình nước là dòng nước thượng hạng từ thượng nguồn sông Kuma,\nđược ướp lạnh buốt."
# monologue
# JP: 焼酎作りに用いるものを、\n真闇姉からわけてもらった代物だ。
2566 = "Thứ nước dùng để ủ rượu shochu,\nđược chị Mayami chia cho."
# 【日々姫】
# display as 日日姬
# JP: 「こく、こく、こくっ――」
1564 = "「Ực, ực, ực――」"
# monologue
# JP: 赤みを帯びた日々姫の喉が上下に動く。\n水気を取り戻した唇を、やがてぺろりと舌がなぞる。
2461 = "Cổ họng ửng đỏ của Hibiki chuyển động lên xuống.\nSau đó, em ấy liếm nhẹ đôi môi đã lấy lại được độ ẩm."
# 【日々姫】
# display as 日日姬
# JP: 「ふぁ～、生き返る～～っ」
1579 = "「Phù~, sống lại rồi~~」"
# 【双鉄】
# display as 雙鐵
# JP: 「おおげさだな、日々姫は。\n死ぬほどの熱ではあるまい」
1611 = "「Làm quá rồi đấy, Hibiki.\nLàm gì đến mức sốt chết người đâu.」"
# monologue
# JP: 言えばぷくっと、日々姫の頬がふくれあがる。
2448 = "Vừa dứt lời, hai má Hibiki liền phồng lên."
# 【日々姫】
# display as 日日姬
# JP: 「八度！　三十八度ばいっ！」
1460 = "「Tám độ! Ba mươi tám độ lận đó!」"
# monologue
# JP: 今どき、少しめずらしい、水銀体温計の針。
2425 = "Kim nhiệt kế thủy ngân, thứ hơi hiếm gặp vào thời buổi này."
# monologue
# JP: わざわざ振らずにおいたのか、\n日々姫はそれを、何故か自慢げな態度で示す。
2218 = "Chẳng biết có phải cố tình không vẩy đi hay không,\nmà Hibiki lại chìa nó ra với vẻ mặt đầy tự hào."
# 【日々姫】
# display as 日日姬
# JP: 「私、普段の体温ば低かけんねぇ、\n三十八度は、大体、他の人の四十度くらいとよ」
1697 = "「Bình thường thân nhiệt em thấp lắm đó,\nba mươi tám độ của em chắc cũng phải ngang ngửa bốn mươi độ của người khác đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうかそうか。\nならほれ、おとなしく寝ておけ、寝ておけ」
1616 = "「Vậy sao, vậy sao.\nThế thì ngoan ngoãn ngủ đi, ngủ đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「むぅー」
1571 = "「Mưー」"
# monologue
# JP: 不満気な声を出しながら、\nそれでも日々姫はやはり日々姫で、つまりは素直だ。
2679 = "Dù phát ra giọng điệu bất mãn,\nnhưng Hibiki vẫn là Hibiki, tức là rất ngoan ngoãn."
# monologue
# JP: 頬をだんだんとしぼませて、\n両手を布団の中にしまって、そのまま軽く目を閉じる。
2238 = "Đôi má dần xẹp xuống,\nem ấy rúc cả hai tay vào trong chăn, rồi cứ thế khẽ nhắm mắt lại."
# 【双鉄】
# display as 雙鐵
# JP: 「タオルを変えるぞ」
1708 = "「Anh thay khăn nhé.」"
# monologue
# JP: （ちゃぽん）
2736 = "（Tí tách）"
# 【日々姫】
# display as 日日姬
# JP: 「ひゃっ」
1558 = "「Hyaっ」"
# monologue
# JP: 濡らして絞ったタオルを乗せれば、\n日々姫の額の温度の高さをはっきり感じる。
2308 = "Đặt chiếc khăn đã thấm nước vắt khô lên,\ntôi cảm nhận rõ được độ nóng trên trán Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「そう簡単には下がってくれぬか。\nしかし……知恵熱を出すとはな」
1762 = "「Không dễ hạ sốt thế sao.\nNhưng mà...... không ngờ lại bị sốt do căng thẳng đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「だって――緊張しちゃったけん」
1761 = "「Tại vì――em căng thẳng quá mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。日々姫は緊張に負けず、良く頑張った」
1751 = "「Đúng vậy. Hibiki đã không đầu hàng trước sự căng thẳng, em làm tốt lắm.」"
# monologue
# JP: まだ少しだけ濡れている手で、\nかまわず、日々姫の髪をなでつける。
2288 = "Với bàn tay vẫn còn hơi ươn ướt,\ntôi mặc kệ, cứ thế vuốt tóc Hibiki."
# monologue
# JP: 日々姫はうっとり目を細め、\n子猫のように、その手に頭をすりつけてくる。
2228 = "Hibiki say sưa nheo mắt lại,\nnhư một chú mèo con cọ đầu vào tay tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「今は、そうして緩むがいいさ。\n僕らの他には、誰もいないのだからな」
1789 = "「Bây giờ, em cứ thư giãn như vậy đi.\nBởi vì ngoài hai chúng ta ra, không còn ai khác đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 1574 = "「啊」" 
# monologue
# JP: 小さく、張り詰めたような声。
2434 = "Một giọng nói nhỏ, như đang căng thẳng."
# monologue
# JP: それから日々姫はぶん、と大きく頭を振って、\n少し早口に問いかけてくる。
2525 = "Sau đó Hibiki lắc đầu thật mạnh,\nrồi hỏi tôi với vẻ hơi vội vàng."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――兄さん。あの――ええと、\nそろそろ会見の時間なのでは？」
1904 = "「Anh hai――anh Soutetsu. Dạ――ờm,\nchắc sắp đến giờ họp báo rồi phải không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと、そうだったな」
1596 = "「Ái chà, đúng rồi nhỉ.」"
# monologue
# JP: 日々姫の発熱がなかったら、\n僕らも当然参席していた、ポーレットの辞任会見だ。
2483 = "Nếu Hibiki không bị sốt,\nthì đương nhiên chúng tôi cũng sẽ có mặt tại buổi họp báo từ chức của Paulette."
# monologue
# JP: よもや、聞き逃すわけにはいかない。
2173 = "Chắc chắn là không thể bỏ lỡ được rồi."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、私、立てますよ？」
1568 = "「Anh ơi, em, đứng dậy được mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理をするな。\n体を冷やしてこじらせでもしたらどうする」
1540 = "「Đừng cố quá.\nNhỡ để cơ thể nhiễm lạnh rồi bệnh nặng thêm thì sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「あう」
# 1571 = "「唔」" 
# monologue
# JP: テレビがある部屋に行こうと上体を起こした日々姫を抑え、\nそのままラジオのスイッチを入れる。
2421 = "Tôi đè Hibiki, người đang định nhỏm dậy đi sang phòng có tivi, xuống,\nrồi cứ thế bật công tắc radio."
# 【ポーレット】
# display as 波萊特
# JP: 「――は、\n会見にお集まりいただきありがとうございます」
1205 = "「――Xin,\ncảm ơn mọi người đã đến dự buổi họp báo.」"
# monologue
# JP: 流れてくるのはポーレットの声。\n丁度、会見が始まるところらしい。
2355 = "Vang lên là giọng của Paulette.\nCó vẻ buổi họp báo vừa mới bắt đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「本日の会見の主題は、\n私、雛衣ポーレットの市長職辞任についてです」
1602 = "「Chủ đề của buổi họp báo hôm nay là,\nvề việc tôi, Hinai Paulette, từ chức thị trưởng.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ」
# 1918 = "「！」" 
# monologue
# JP: 日々姫が息を呑む音に、\nラジオの向こうの、無数のシャッター音が重なる。
2419 = "Tiếng nín thở của Hibiki,\nhòa cùng vô số tiếng bấm máy ảnh từ phía bên kia radio."
# monologue
# JP: 会見場は、どうも相当な密度のようだ。
2554 = "Hội trường có vẻ khá đông đúc."
# monologue
# JP: （あるいは、宝生稀咲も会見場へと\n足を運んでいるのか――）
2717 = "（Hoặc có lẽ, Houshou Kisaki cũng đã\nđặt chân đến hội trường chăng――）"
# monologue
# JP: 真闇姉なら、その辺のことを見逃すようなことはあるまい。
2572 = "Nếu là chị Mayami, chắc chắn chị ấy sẽ không bỏ sót chuyện đó."
# monologue
# JP: 後で確認を取ればいい――と、\nわかっていても妙に気になる。
2282 = "Lát nữa hỏi lại cũng được――nghĩ vậy,\nnhưng tôi vẫn thấy băn khoăn một cách kỳ lạ."
# 【ポーレット】
# display as 波萊特
# JP: 「――事例は、明らかに失敗だったと認識しています。\nですので、市長職と鉄道業の兼務の限界と判断しました」
1213 = "「――Tôi nhận thức rõ rằng đó là một thất bại.\nVì vậy, tôi đánh giá việc kiêm nhiệm chức thị trưởng và ngành đường sắt đã đến giới hạn.」"
# 【日々姫】
# display as 日日姬
# JP: 「…………」
1235 = "「............」"
# monologue
# JP: 日々姫は息を詰めながら、\nポーレットの辞任会見に聴き入っている。
2417 = "Hibiki nín thở,\nchăm chú lắng nghe buổi họp báo từ chức của Paulette."
# monologue
# JP: ポーレットはあくまで冷静に、\n流れるように――言うべき全てを、言葉に落とす。
2506 = "Paulette vẫn giữ thái độ điềm tĩnh,\ntrôi chảy――nói ra tất cả những gì cần nói."
# 【ポーレット】
# display as 波萊特
# JP: 「――以上をもって、私の辞任表明と致します」
1207 = "「――Trên đây là tuyên bố từ chức của tôi.」"
# monologue
# JP: 即座に無数のフラッシュ音とシャッター音。\n質疑応答が開始される。
2478 = "Ngay lập tức, vô số tiếng đèn flash và tiếng bấm máy ảnh vang lên.\nPhần hỏi đáp bắt đầu."
# 【記者Ａ】
# display as 市川
# JP: 「隈元新報、市川です。兼務の限界とのことですが、\n市長を続け、他を辞めるのが公選された者の義務では？」
1709 = "「Tôi là Ichikawa của tờ Kumamoto Shimpo. Cô nói việc kiêm nhiệm đã đến giới hạn,\nnhưng tiếp tục làm thị trưởng và từ bỏ những việc khác chẳng phải là nghĩa vụ của người được bầu cử công khai sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「市長に公選された者の義務は、市に尽くすことです。\nですので私は、そのために最善の人事を考慮しました」
1832 = "「Nghĩa vụ của người được bầu cử công khai làm thị trưởng là cống hiến cho thành phố.\nVì vậy, tôi đã cân nhắc sự sắp xếp nhân sự tốt nhất vì mục đích đó.」"
# monologue
# JP: 悪意を感じる質問にさえ、\nポーレットは、淀まぬ答えを返し続ける。
2687 = "Ngay cả với những câu hỏi đầy ác ý,\nPaulette vẫn tiếp tục đáp lại một cách lưu loát."
# monologue
# JP: ポーレットもまた、成長している。\nそのことを確信できたのならば、これ以上聞く必要も無い。
2208 = "Paulette cũng đang trưởng thành.\nNếu đã chắc chắn điều đó, thì không cần nghe thêm nữa."
# 【日々姫】
# display as 日日姬
# JP: 「はぁ……」
1570 = "「Hơii......」"
# monologue
# JP: ラジオを消せば、\nすぐさま日々姫の長嘆息。
2285 = "Vừa tắt radio,\nliền nghe thấy tiếng thở dài thườn thượt của Hibiki."
# monologue
# JP: どうした？　と聞くより先に、弱音が溢れる。
2339 = "Còn chưa kịp hỏi có chuyện gì, em ấy đã thốt ra những lời yếu đuối."
# 【日々姫】
# display as 日日姬
# JP: 「ポーレットさん、すごいですよね。\nなんていうのか、演説とか応対とかとても流暢で」
1773 = "「Chị Paulette giỏi thật đấy nhỉ.\nPhải nói sao đây, từ diễn thuyết đến ứng đáp đều vô cùng trôi chảy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだろう。ポーレットは、政治と鉄道、\nその両方に等しく努力を重ねてきたのだ」
1863 = "「Chuyện đó là đương nhiên rồi. Paulette đã nỗ lực không ngừng nghỉ,\ncho cả chính trị và đường sắt mà.」"
# monologue
# JP: 努力では越えられぬ場所へと達し、\n政治の道を降りることを決断した。
2505 = "Chạm đến ngưỡng mà sự nỗ lực không thể vượt qua,\ncô ấy đã quyết định từ bỏ con đường chính trị."
# monologue
# JP: だからといって、\nその積み重ねは、決して失われるものではない。
2103 = "Dù vậy,\nnhững gì cô ấy tích lũy được sẽ không bao giờ mất đi."
# 【双鉄】
# display as 雙鐵
# JP: 「仮にポーレットが絵を描いたとて、\n日々姫の足元にも及ばんだろう。その逆も、また然りだ」
1626 = "「Giả sử Paulette có vẽ tranh đi nữa,\ncũng chẳng thể bằng một góc của Hibiki. Ngược lại cũng vậy thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん……けど、私――\n政治のこと、ちゃんとやりたいって思うから」
1584 = "「Vâng...... nhưng mà, em――\nthực sự muốn làm tốt chuyện chính trị.」"
# monologue
# JP: 僕の顔を見てそう言って、\n日々姫はすぐさま、視線を布団へと落としてしまう。
2452 = "Nhìn mặt tôi và nói vậy,\nHibiki liền cụp mắt nhìn xuống chăn."
# 【日々姫】
# display as 日日姬
# JP: 「なのに私、ポーレットさんどころか、\nハチロクとれいなちゃんより――」
1782 = "「Vậy mà em, đừng nói là chị Paulette,\nngay cả so với Hachiroku và bé Reina――」"
# monologue
# JP: \\x%lNゲージ;#00ffc040;Nゲージ%l;#;を使い例を示した、\nあのパフォーマンスのことかとすぐに思い当たる。
2331 = "Tôi lập tức nhận ra em ấy đang nói đến màn trình diễn\nsử dụng \\x%lNゲージ;#00ffc040;N-gauge%l;#; làm ví dụ minh họa kia."
# monologue
# JP: 確かにあれは、鮮やかで効果的だった。
2667 = "Quả thực màn đó rất sống động và hiệu quả."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクとれいなには接客を重ね続けてきた時間がある。\n故に、どうすれば注目を引けるのか知っているのだろう」
1528 = "「Hachiroku và Reina đã có thời gian dài tiếp xúc với khách hàng.\nThế nên, chắc họ biết cách làm thế nào để thu hút sự chú ý.」"
# 【日々姫】
# display as 日日姬
# JP: 「私は……そんなこと知らないし」
1693 = "「Em thì...... đâu biết mấy chuyện đó.」"
# monologue
# JP: はぁっと長い息を吐き、\n日々姫は体を布団の上に崩してしまう。
2465 = "Thở ra một hơi dài,\nHibiki thả người nằm phịch xuống nệm."
# 【日々姫】
# display as 日日姬
# JP: 「もちろん、勉強するつもりですけど――\n投票日すぐに来ちゃうし……時間、絶対足りないし」
1714 = "「Tất nhiên là em định học hỏi rồi――\nNhưng ngày bỏ phiếu sắp đến nơi rồi...... Thời gian, chắc chắn không đủ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「バカか、日々姫は」
1520 = "「Ngốc à, Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「痛っ！？」
1620 = "「Đau!?」"
# monologue
# JP: 軽く、おでこを指で弾く。\nいわゆる、デコピンというヤツだ。
2315 = "Tôi búng nhẹ ngón tay lên trán em ấy.\nĐó gọi là búng trán."
# monologue
# JP: ホントに軽くしたつもりだが、\nあまりに久しぶりすぎて、加減が狂ってしまったようだ。
2325 = "Rõ ràng tôi định búng nhẹ thôi,\nnhưng có vẻ vì lâu quá không làm nên lỡ tay mất rồi."
# 【日々姫】
# display as 日日姬
# JP: 「痛……た、た……\nもう、兄さん、私、そこまでバカですか？」
1619 = "「Đau...... đau quá......\nTrời ạ, anh ơi, em ngốc đến mức đó sao?」"
# monologue
# JP: 日々姫は、涙目になってしまっている。
2444 = "Mắt Hibiki đã rơm rớm nước mắt."
# monologue
# JP: 潤んだ瞳の上目遣いが愛らしいとも感じてしまうが、\n端的にいって、やりすぎた。
2220 = "Dù thấy ánh mắt rơm rớm ngước nhìn lên thật đáng yêu,\nnhưng nói thẳng ra thì, tôi đã làm hơi lố."
# 【双鉄】
# display as 雙鐵
# JP: 「デコピンの加減については、僕の方がバカであったな」
1600 = "「Về chuyện điều chỉnh lực búng trán thì, anh mới là kẻ ngốc.」"
# monologue
# JP: （びしりっ）
2722 = "（Bốp!）"
# 【双鉄】
# display as 雙鐵
# JP: 「んぐっ！」
1562 = "「Ngứ!」"
# monologue
# JP: なるほど、これは確かに痛い。
2659 = "Ra là vậy, đau thật đấy."
# monologue
# JP: 路子にやっていたころよりも、\n僕の指にも、随分と力がついたらしい。
2093 = "Có vẻ như ngón tay của tôi cũng đã mạnh hơn nhiều\nso với hồi còn hay búng trán Michiko."
# 【日々姫】
# display as 日日姬
# JP: 「もう、なにやってるんですか、兄さ――\nこほっ、けほっ」
1567 = "「Trời ạ, anh đang làm cái trò gì vậy, anh――\nKhụ, khụ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！？」
1746 = "「Hibiki!?」"
# monologue
# JP: 背中を丸め咳き込む日々姫の体をさする。
2214 = "Tôi xoa lưng cho Hibiki đang cuộn tròn người ho sặc sụa."
# 【双鉄】
# display as 雙鐵
# JP: 「知恵熱ではなかったのか？\n風邪を併発してしまったか？」
1796 = "「Không phải sốt do căng thẳng sao?\nHay là bị cảm lạnh luôn rồi?」"
# 【日々姫】
# display as 日日姬
# JP: 「大丈夫、少し、むせただけです」
1760 = "「Không sao đâu, em chỉ bị sặc một chút thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかし――」
1553 = "「Không, nhưng mà――」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1575 = "「啊！」" 
# monologue
# JP: ぽん、と日々姫が手を鳴らす。
2469 = "Bốp, Hibiki vỗ tay một cái."
# monologue
# JP: 咳き込んだのがよほど苦しかったのだろう、\n顔が、さっきよりもよほど赤らんでいる。
2187 = "Chắc hẳn trận ho vừa rồi rất khó chịu,\nmặt em ấy còn đỏ hơn lúc nãy nhiều."
# 【日々姫】
# display as 日日姬
# JP: 「あの、兄さん――それなら、薬。\n私に、塗っていただけますか？」
1882 = "「Dạ, anh ơi――vậy thì, thuốc.\nAnh bôi thuốc cho em được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「薬か、任せておけ――うむ？　塗る？」
1514 = "「Thuốc à, cứ để đó cho anh――Hửm? Bôi thuốc?」"
# 【日々姫】
# display as 日日姬
# JP: 「はい！　なら、ええと……\n薬箱の、奥のほうにあると思います――から」
1637 = "「Vâng! Nếu vậy thì, ờm......\nEm nghĩ nó nằm tít bên trong hộp thuốc――ấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、これだな」
1577 = "「À, cái này nhỉ.」"
# monologue
# JP: なるほど。\n塗る風邪薬、というヤツだ。
2170 = "Ra là vậy.\nLà loại thuốc bôi trị cảm lạnh."
# monologue
# JP: まだ新品のその封を切り、\n手のひらにとり、伸ばしてみる。
2312 = "Bóc lớp niêm phong của lọ thuốc mới tinh,\ntôi lấy một ít ra lòng bàn tay rồi thoa đều."
# 【双鉄】
# display as 雙鐵
# JP: 「おお、随分と冷えるものだな。\nこれは、熱さましによさそうだ」
1597 = "「Ồ, lạnh phết nhỉ.\nCái này có vẻ tốt để hạ sốt đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「あの……それ……ええと――――」
1876 = "「Dạ...... cái đó...... ờm――――」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1593 = "「嗯？」" 
# 【日々姫】
# display as 日日姬
# JP: 「むっ――あうっ、背中っ！\nやっぱり、背中にぬってもらえますか？」
1607 = "「Ngực――à không, lưng!\nAnh bôi lên lưng cho em được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいぞ。背中を向けろ」
1830 = "「Được thôi. Quay lưng lại đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい……兄さん、お願いします」
1615 = "「Vâng...... anh giúp em nhé.」"
# monologue
# JP: 日々姫が上体をゆっくり起こす。
2422 = "Hibiki từ từ ngồi dậy."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1918 = "「！」" 
# monologue
# JP: ぷち、ぷち、ぷちとパジャマのボタンが外されていく。
2216 = "Từng chiếc cúc áo ngủ lần lượt được cởi ra."
# monologue
# JP: まさか――と思うより先に、日々姫は袖を抜ききって、\nパジャマをするりと落としてしまう。
2340 = "Còn chưa kịp nghĩ \"Chẳng lẽ――\", Hibiki đã tuột hẳn tay áo ra,\nvà để bộ đồ ngủ rơi tuột xuống."
# 【日々姫】
# display as 日日姬
# JP: 「そ、それじゃあ兄さん――お願い、します」
1885 = "「V-vậy thì anh ơi――làm phiền anh nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ」
1561 = "「Ừ, ừm.」"
# monologue
# JP: 日々姫の上半身が、さらけだされている。\n肩越し、なだらかな胸のラインを見下ろせる。
2440 = "Nửa thân trên của Hibiki hoàn toàn phơi bày.\nQua bờ vai, tôi có thể nhìn xuống đường cong thoai thoải của bầu ngực."
# monologue
# JP: 薬効を消してしまうのではないか――\nそんな不安を感じる程に、僕の手のひらが熱くなる。
2319 = "Lòng bàn tay tôi nóng rực lên,\nđến mức tôi lo sợ không biết nó có làm mất đi tác dụng của thuốc hay không."
# monologue
# JP: （ぺとっ）
2721 = "（Chạm nhẹ）"
# 【日々姫】
# display as 日日姬
# JP: 「んっ！」
1572 = "「Ưm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
# 1918 = "「！」" 
# monologue
# JP: 指先が、日々姫の柔らかな背中に沈む。\n日々姫の肌は、僕の指よりなお熱い。
2303 = "Những đầu ngón tay lún vào tấm lưng mềm mại của Hibiki.\nLàn da của em ấy còn nóng hơn cả ngón tay tôi."
# monologue
# JP: （そうだ、日々姫は発熱している。\nこれは治療で、熱さましなんだ）
2733 = "（Đúng rồi, Hibiki đang bị sốt.\nĐây là trị liệu, là để hạ sốt.）"
# monologue
# JP: そうと自分に言い聞かせ、\n途端に、自覚してしまう。
2301 = "Tôi tự nhủ với bản thân như vậy,\nvà ngay lập tức, tôi nhận ra một điều."
# monologue
# JP: 治療を治療と言い聞かせねばならぬほど――\nこの接触を、僕はなにかと誤解することを恐れている。
2296 = "Đến mức phải tự nhủ trị liệu là trị liệu――\nTôi đang sợ mình sẽ hiểu lầm sự tiếp xúc này thành một điều gì đó khác."
# monologue
# JP: （ぺとっ――ぬりっ――ぬるっ――にゅるんっ――）
2720 = "（Chạm nhẹ――thoa thoa――miết miết――trơn trượt――）"
# 【日々姫】
# display as 日日姬
# JP: 「んふっ――んっ――冷たッ――\nあうっ――気持ちっ――いいっ――」
1583 = "「Ưm――ưm――lạnh quá――\nAuu――cảm giác――thích quá――」"
# monologue
# JP: （治療だ、治療だ、治療だ、治療だ）
2745 = "（Là trị liệu, là trị liệu, là trị liệu, là trị liệu.）"
# monologue
# JP: 日々姫の甘くとろける声が、\n僕の脳髄に染みていく。
2464 = "Giọng nói ngọt ngào, nũng nịu của Hibiki,\ndần thấm sâu vào trong tâm trí tôi."
# monologue
# JP: ぬかるむ汗と肌の熱とが、\n僕の指先をダメにしていく。
2696 = "Mồ hôi nhễ nhại cùng hơi nóng từ làn da,\nđang dần làm tê liệt những đầu ngón tay tôi."
# monologue
# JP: （もっと……触れたい）
2727 = "（Muốn...... chạm vào em ấy nhiều hơn nữa.）"
# monologue
# JP: 思ってしまう。\nこれが治療と、どれほど自分に言い聞かせても。
2246 = "Dù có tự nhủ với bản thân bao nhiêu lần rằng đây là trị liệu,\nnhưng tôi vẫn không kìm được mà nghĩ như vậy."
# monologue
# JP: いや、治療であるならなおのこと、\n背中だけでは不足じゃないかと――思ってしまう。
2357 = "Không, nếu đã là trị liệu,\nthì chỉ bôi lưng thôi chẳng phải là không đủ sao――tôi lại nghĩ vậy."
# 【日々姫】
# display as 日日姬
# JP: 「はぁっ――あっ――はぁッ――はぁっ」
1565 = "「Hà――a――hà――hà.」"
# monologue
# JP: 裸の肩が上下している。\nその向こう、見え隠れする日々姫の控えめな胸も、また。
2233 = "Đôi bờ vai trần đang phập phồng.\nỞ phía bên kia, bầu ngực khiêm tốn lúc ẩn lúc hiện của Hibiki cũng vậy."
# monologue
# JP: 風呂で何度も何度も見ている日々姫の胸を、\nけれども今日は、特別な何かと感じてしまう。
2297 = "Bầu ngực của Hibiki mà tôi đã thấy vô số lần trong nhà tắm,\nthế nhưng hôm nay, tôi lại cảm thấy nó có chút gì đó đặc biệt."
# 【日々姫】
# display as 日日姬
# JP: 「あの……兄さん？」
1877 = "「Dạ...... anh ơi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1919 = "「!!!」"
# monologue
# JP: 振り返りかけた日々姫に酷く慌ててしまい、体が動く。
2324 = "Thấy Hibiki đang định ngoảnh lại, tôi hoảng hốt giật mình, cơ thể tự động phản xạ."
# monologue
# JP: （がつっ）
2725 = "（Cộp）"
# monologue
# JP: 何かが、膝にあたってしまい――
2322 = "Đầu gối tôi va phải thứ gì đó――"
# 【ポーレット】
# display as 波萊特
# JP: 「経験不足を補える――\nそれだけの力を、彼女は持っているはずです」
1613 = "「Cô ấy có đủ khả năng――\nđể bù đắp cho sự thiếu hụt kinh nghiệm của mình.」"
# 【双鉄】
# display as 雙鐵＆日日姬
# JP: 「っ！？」\n「っ！！」
1920 = "「!?」\n「!!」"
# monologue
# JP: 日々姫が動く。\n慌てる指が、怯えたようにラジオのスイッチを押して消す。
2456 = "Hibiki giật nảy mình.\nNhững ngón tay hoảng loạn như sợ hãi vội vàng ấn tắt công tắc radio."
# monologue
# JP: 日々姫の背と、僕の指とが、それで離れる。\nねばつく何かが――すうっと溶けていった気がする。
2318 = "Nhờ vậy mà ngón tay tôi đã rời khỏi lưng Hibiki.\nThứ gì đó nhớp nháp――có cảm giác như vừa tan biến mất."
# 【双鉄】
# display as 雙鐵
# JP: 「……なぁ、日々姫。さっきの話の続きだが」
1242 = "「......Này, Hibiki. Tiếp tục câu chuyện lúc nãy nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん」
# 1587 = "「嗯」" 
# monologue
# JP: 肩甲骨の裏側、脇腹。\n塗り残しになってた部分に、薬を塗り足す。
2518 = "Phía sau xương bả vai, mạn sườn.\nTôi bôi thêm thuốc vào những chỗ còn sót lại."
# monologue
# JP: 日々姫の肌から、僕の指から、\n異常な熱は、もう消えている。
2553 = "Hơi nóng bất thường từ làn da Hibiki, từ ngón tay tôi,\nđã hoàn toàn biến mất."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットもハチロクもれいなも、真闇姉も僕も、\nお前の味方で、ブレーンでありスタッフだ」
1467 = "「Cả Paulette, Hachiroku, Reina, chị Mayami và anh,\ntất cả đều là đồng minh, là quân sư, là nhân viên của em.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい」
# 1587 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「僕らに出来ることならば、僕らにさせればいいだけだ。\nみんなの長所を残らず身に付ける必要などない」
1683 = "「Việc gì bọn anh làm được thì cứ để bọn anh làm.\nEm không cần phải gom hết mọi điểm mạnh của mọi người vào mình đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「でしたら――兄さん」
1883 = "「Nếu vậy thì――anh ơi.」"
# monologue
# JP: 日々姫が、僕へと振り返る。
2457 = "Hibiki ngoảnh lại nhìn tôi."
# 【日々姫】
# display as 日日姬
# JP: 「私は、何を――\nみんなのために、私には何ができるんですか？」
1706 = "「Em phải làm gì――\nEm có thể làm gì vì mọi người đây?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん」
1858 = "「À, ừm.」"
# monologue
# JP: 日々姫の目だ。\n信じ切り――まっすぐ、僕を見上げる目。
2433 = "Ánh mắt của Hibiki.\nMột ánh mắt tràn đầy niềm tin――nhìn thẳng lên tôi."
# monologue
# JP: 路子の影が一瞬重なり、\nけれどもすぐに、瞳の光に、光の強さに溶かされる。
2306 = "Hình bóng của Michiko thoáng hiện lên trong chốc lát,\nnhưng ngay lập tức, nó đã bị hòa tan bởi ánh sáng, bởi sức mạnh từ ánh mắt ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「お前の言葉にはまだ、重みとなるほどの積み重ねがない。\nゆえに、今は恐らく、近く、狭くにしか響かない」
1512 = "「Lời nói của em hiện tại vẫn chưa đủ sức nặng tích lũy.\nDo đó, có lẽ bây giờ nó chỉ có thể vang vọng trong một phạm vi gần và hẹp.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1587 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「けれどお前には、言葉にはならぬ積み重ねがある。\nお前の瞳は、誰より多く、御一夜の綺麗を見つめてきた」
1499 = "「Nhưng em lại có những sự tích lũy không thể diễn tả bằng lời.\nĐôi mắt em đã ngắm nhìn vẻ đẹp của Ohimitera nhiều hơn bất kỳ ai.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1573 = "「A――」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん、そのとおりだ」
1591 = "「Ừm, đúng vậy.」"
# monologue
# JP: 日々姫になら出来ること。\n日々姫にしか出来ないこと。
2663 = "Việc mà nếu là Hibiki thì có thể làm được.\nViệc mà chỉ có Hibiki mới làm được."
# monologue
# JP: それは本当に小さなころから、\nずっと変わらずいたことだ。
2658 = "Đó là điều mà từ khi còn rất nhỏ,\nem ấy vẫn luôn không hề thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「絵を描け、日々姫。\nお前の描く、お前の夢見る御一夜の町の未来図を」
1749 = "「Vẽ tranh đi, Hibiki.\nHãy vẽ bức tranh tương lai về thị trấn Ohimitera mà em hằng mơ ước.」"
