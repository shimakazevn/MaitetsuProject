# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
# 2218 = "「是嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「――うんっ」
1710 = "「——嗯」" 

# monologue
