76 = "\\x%l客車;#00ffc040;客運車廂%l;#;有縫隙會進煙，所以還不能讓乘客上去。" 

# monologue
# JP: が、代替重量の積載により、\n乗務訓練はきっちりこなせる。
2558 = "不過只要用其他配重來替代，一樣可以很好地進行乘務訓練。" 

# monologue
# JP: （慌てるなよ――まだだ、まだだ）
3200 = "（別急——還沒到，還沒到）" 

# monologue
