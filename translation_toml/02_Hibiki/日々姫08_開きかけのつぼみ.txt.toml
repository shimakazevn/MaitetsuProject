# 【ポーレット】
# display as 波萊特
# JP: 「いいと思います。遺恨が残るような選挙戦はのちのち、\n御一夜の発展を損ねる要因になってしまうと思いますし」
2172 = "「我贊成。若是在選舉過程中留下遺憾，也可能對御一夜的發展造成不利」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ……」
2059 = "「啊……」" 

# monologue
# JP: ポーレットのサバサバとした発言に、\n日々姫は安堵の声を漏らす。
3061 = "聽到波萊特這麼說，日日姬鬆了一口氣。" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがとう、ポーレットさん」
2274 = "「波萊特小姐，謝謝您」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いいえ、こちらこそ」
2161 = "「我才要謝謝你」" 

# monologue
# JP: 深く、深く。\nポーレットが日々姫に頭を下げる。
2977 = "波萊特向日日姬深深地低下頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしには重すぎたバトンを、拾ってくれてありがとう。\nどうか、御一夜市を――よろしくお願いいたします」
2369 = "「這擔子對我來說太重了，謝謝你肯把它挑起來。御一夜市就拜託你了」" 

# 【日々姫】
# display as 日日姬
# JP: 「いいえ、そんなっ――」
1994 = "「別這麼說——」" 

# monologue
# JP: 言いかけて、けれども日々姫は唇をキュっと結んで閉める。
2927 = "日日姬說到一半，突然緊閉雙唇。" 

# monologue
# JP: 一呼吸。\nそれから、とても大人びた声。
2711 = "她調整呼吸，然後以成熟的口吻說道。" 

# 【日々姫】
# display as 日日姬
# JP: 「そう出来るよう、なりたいです。\nだから、改めて――ポーレットさんの力を貸して下さい」
2160 = "「我希望能夠做好。所以，請波萊特小姐也助我一臂之力吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「もちろん。わたしに出来ることがあれば、何でも」
2294 = "「當然沒問題。有什麼我能幫上忙的，請儘管開口」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2058 = "「啊——」" 

# monologue
# JP: 言われて、今さら思いあたる。\n『ポーレットに出来ること』は、実は極めて広範なのだと。
2714 = "她這麼一說我才意識到。波萊特在很多方面上真的能幫上許多忙。" 

# monologue
