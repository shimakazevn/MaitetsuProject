3132 = "這樣的話，\\x%l客車;#00ffc040;客運車廂%l;#;肯定會在慣性作用下前衝，導致\\x%l連結器;#00ffc040;車鉤%l;#;緊壓。" 

# 【双鉄】
# display as 雙鐵
