# lines: 419 
# 【ハチロク】
# display as 八六
# JP: 「\x%l投炭;#00ffc040;投炭%l;#;、二分で四十五」
1700 = "「\\x%l投炭;#00ffc040;Thêm than%l;#;, hai phút bốn mươi lăm xẻng.」"

# 【日々姫】
# display as 日日姬
# JP: 「\x%l投炭;#00ffc040;投炭%l;#;！　二分で四十五杯」
1698 = "「\\x%l投炭;#00ffc040;Thêm than%l;#;! Hai phút bốn mươi lăm xẻng.」"

# monologue
# JP: 山場は超えた。\nブレーキまでは、まだ余裕がある。
3156 = "Đã vượt qua được đoạn khó khăn nhất.\nVẫn\ncòn dư dả thời gian trước khi đến lúc\nphanh."

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
2078 = "「Ừm.」"

# monologue
# JP: 横目で一瞬日々姫を見ればそれだけで、\n稀咲との会談が良い物であったのだろうと想像できる。
2812 = "Chỉ cần liếc nhìn Hibiki một cái,\ntôi đã\ncó thể tưởng tượng ra cuộc nói chuyện với\nKisaki diễn ra rất tốt đẹp."

# monologue
# JP: 墨にまみれて真っ黒けでも、\n日々姫の顔は、晴れ晴れとして美しい。
2718 = "Dù cho khuôn mặt có lấm lem nhọ nồi đen\nthui,\nnhưng nét mặt Hibiki vẫn rạng rỡ và\nxinh đẹp."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、\x%l客車;#00ffc040;客車%l;#;総重量」
1988 = "「Hachiroku, tổng trọng lượng \\x%l客車;#00ffc040;toa hành khách%l;#;\n.」"

# 【ハチロク】
# display as 八六
# JP: 「37.3[トン]tです」
2407 = "「37,3 tấn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「37.3[トン]t了解」
2408 = "「Đã rõ 37,3 tấn.」"

# monologue
# JP: 煙害直撃の隙間\x%l客車;#00ffc040;客車%l;#;だ。\n乗客を乗せるなど出来はしない。
76 = "Đó là \\x%l客車;#00ffc040;toa hành khách%l;#; có khe hở khiến khói\nbay thẳng vào.\nKhông thể nào chở hành khách được."

# monologue
# JP: が、代替重量の積載により、\n乗務訓練はきっちりこなせる。
2558 = "Nhưng mà, nhờ chở thêm vật nặng thay thế,\nchúng tôi vẫn có thể hoàn thành tốt buổi\nhuấn luyện nghiệp vụ."

# monologue
# JP: （慌てるなよ――まだだ、まだだ）
3200 = "（Đừng vội――Vẫn chưa đâu, chưa đâu.）"

# monologue
# JP: 今引いている\x%l気動車;#00ffc040;気動車%l;#;改造\x%l客車;#00ffc040;客車%l;#;の車両重量は32.5tジャスト。
3024 = "Trọng lượng của \\x%l客車;#00ffc040;toa hành khách%l;#; được cải\ntạo từ \\x%l気動車;#00ffc040;toa xe diesel tự hành%l;#; mà chúng\ntôi đang kéo chính xác là 32,5 tấn."

# monologue
# JP: 差し引き4.8tは、一人体重60キロと仮定するなら、\n80人の乗客を乗せているという計算になる。
2575 = "Phần chênh lệch 4,8 tấn, nếu giả sử mỗi\nngười nặng 60kg,\nthì tính ra là đang chở\n80 hành khách."

# monologue
# JP: （着席定員が48名。――残り32名は立ち客となる）
3220 = "（Sức chứa ghế ngồi là 48 người.――32 người\ncòn lại sẽ là khách đứng.）"

# monologue
# JP: 32名も立っているなら、空間的な余裕は少ない。
3111 = "Nếu có tới 32 người đứng thì không gian sẽ\nrất chật hẹp."

# monologue
# JP: 不要な揺れを与えてしまえば、\nトラブルを起こしてしまいかねない。
3136 = "Nếu gây ra những rung lắc không cần thiết,\nrất có thể sẽ xảy ra sự cố."

# 【ハチロク】
# display as 八六
# JP: 「手首、疲れても休めない。\n訓練通りにきちんと伏せる」
2182 = "「Dù mỏi cổ tay cũng không được nghỉ.\nPhải\ncúi người đúng như lúc huấn luyện.」"

# 【日々姫】
# display as 日日姬
# JP: 「はいっ！」
2237 = "「Vâng!」"

# monologue
# JP: ――ハチロクは、日々姫の指導に専念している。\nだから、僕への指示が飛ばない。
1653 = "――Hachiroku đang tập trung hướng dẫn\nHibiki.\nThế nên em ấy không hề đưa ra chỉ\nthị nào cho tôi."

# monologue
# JP: 日々姫の指導に専念することで、\n僕をも同時に、極めて厳しく指導している。
2690 = "Bằng việc tập trung hướng dẫn Hibiki,\nem\nấy cũng đồng thời hướng dẫn tôi một cách\nvô cùng nghiêm khắc."

# monologue
# JP: （いつもより、ブレーキ位置は手前になる。\n上り勾配が終わりきらぬうち、\x%l常用;#00ffc040;常用%l;#;をかける）
3204 = "（Vị trí phanh sẽ sớm hơn so với bình\nthường.\nKhi con dốc lên vẫn chưa kết thúc,\nmình sẽ dùng \\x%l常用;#00ffc040;phanh thường%l;#;.）"

# monologue
# JP: ハチロクと共に作った\x%l縦断面図;#00ffc040;縦断面図%l;#;を脳裏に描き確かめ直す。\n勾配、速度、摩擦係数、全車軸重――
2824 = "Tôi mường tượng lại \\x%l縦断面図;#00ffc040;bản đồ mặt cắt dọc%l;#; đã\nlàm cùng Hachiroku\ntrong đầu để xác nhận.\nĐộ dốc, tốc độ, hệ\nsố ma sát, tổng tải trọng trục――"

# monologue
# JP: 普段であればハチロクが平然とこなす計算を、\n今の僕ではこなしきれない。
2613 = "Những phép tính mà bình thường Hachiroku\ncó thể giải quyết một cách dễ dàng,\ntôi\ncủa hiện tại lại không thể nào làm xuể."

# monologue
# JP: （四――いや、五秒か？　早く）
3214 = "（Bốn――Không, năm giây sao? Nhanh lên.）"

# monologue
# JP: 鉄道時計の秒針を、ほとんど睨むように見る。
2818 = "Tôi gần như trừng mắt nhìn kim giây của\nchiếc đồng hồ đường sắt."

# monologue
# JP: 鼓動が速く、呼吸が浅くなっている。\n体感時間に頼ってしまえば、絶対、五秒を待ちきれない。
2769 = "Tim đập nhanh, nhịp thở trở nên nông hơn.\nNếu dựa vào cảm nhận thời gian của bản\nthân, tôi chắc chắn sẽ không thể chờ nổi 5\ngiây."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l逆転機;#00ffc040;逆転機%l;\x%lミッドギア;#;#00ffc040;ミッドギア%l;#;」
1706 = "「\\x%l逆転機;#00ffc040;Cần đảo chiều%l;#; \\x%lミッドギア;#;#00ffc040;tầm trung%l;#;\n.」"

# 【ハチロク】
# display as 八六
# JP: 「[じょし,1]助士。ブロア[トメベン,1]止弁開放」
2039 = "「Phụ lái tàu. Mở van khóa \\x%lブロア;#00ffc040;thiết bị thổi gió%l;#;\n.」"

# 【日々姫】
# display as 日日姬
# JP: 「ブロア[トメベン,1]止弁開放！」
2186 = "「Mở van khóa \\x%lブロア;#00ffc040;thiết bị thổi gió%l;#;!」"

# monologue
# JP: ハチロクの指示と日々姫の応答\x%l喚呼;#00ffc040;喚呼%l;#;。
2893 = "Chỉ thị của Hachiroku và tiếng \\x%l喚呼;#00ffc040;hô xác nhận%l;#;\nđáp lại\ncủa Hibiki."

# monologue
# JP: それを頼もしく聞きながら、ゆるゆる、じわじわ、\n時間をかけて\x%l加減弁;#00ffc040;加減弁%l;#;テコを押し、閉じていく。
2578 = "Vừa nghe âm thanh đáng tin cậy đó, tôi vừa\ntừ từ, chầm chậm,\ndành thời gian đẩy cần \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;\nvà đóng nó lại."

# 【ハチロク】
# display as 八六
# JP: 「助士。ボイラ注水」
2040 = "「Phụ lái tàu. Bơm nước vào lò hơi.」"

# 【日々姫】
# display as 日日姬
# JP: 「ボイラ注水！」
2389 = "「Bơm nước vào lò hơi!」"

# monologue
# JP: シリンダー圧力の低下を確かめ、\n\x%lバイパス弁;#00ffc040;バイパス弁%l;#;を開放する。
2827 = "Xác nhận áp suất xi-lanh đã giảm,\ntôi mở \\x%lバイパス弁;#00ffc040;van bypass%l;#;."

# monologue
# JP: 再び逆転機を\x%l前進フルギア;#00ffc040;前進フルギア%l;#;――\nそして、\x%l自弁;#00ffc040;自弁%l;#;に手をかける。
3009 = "Một lần nữa chuyển cần đảo chiều sang \\x%l前進フルギア;#00ffc040;cài hết số tiến%l;#;\n――\nSau đó, tôi đặt tay lên \\x%l自弁;#00ffc040;van hãm tự động%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「[じべん,1]自弁、\x%l常用;#00ffc040;常用%l;#;」
2335 = "「Van hãm tự động, \\x%l常用;#00ffc040;phanh thường%l;#;.」"

# 【ハチロク】
# display as 八六
# JP: 「…………」
1727 = "「…………」"

# monologue
# JP: ハチロクは何も言わない。\n遅すぎるとも、早すぎるとも。
2614 = "Hachiroku không nói gì cả.\nKhông bảo là\nquá muộn, cũng chẳng bảo là quá sớm."

# monologue
# JP: だからといって、タイミングが合っているかはわからない。\n今日は――そういう訓練だから。
2584 = "Nhưng điều đó không có nghĩa là tôi đã căn\nđúng thời điểm.\nHôm nay――là buổi huấn\nluyện như vậy mà."

# 【双鉄】
# display as 雙鐵
# JP: 「ブレーキ、\x%l重なり位置;#00ffc040;重なり位置%l;#;に」
1998 = "「Phanh, ở \\x%l重なり位置;#00ffc040;vị trí giữ phanh%l;#;.」"

# monologue
# JP: \x%l重なり位置;#00ffc040;重なり位置%l;#;では、\x%l常用;#00ffc040;常用%l;#;でかけたブレーキ力が保持される。\nその状態での速度はどうかを、感覚で見る。
78 = "Ở \\x%l重なり位置;#00ffc040;vị trí giữ phanh%l;#;, lực phanh được áp dụng\nbằng \\x%l常用;#00ffc040;phanh thường%l;#; sẽ được\nduy trì.\nTôi dùng cảm giác để xem tốc độ\ntrong trạng thái đó như thế nào."

# monologue
# JP: 目印にしている信号通過はいつもより……\nわずかに遅い――が、これでいい――のか？
3127 = "Việc đi qua tín hiệu làm cột mốc chậm hơn\nmột chút……\nso với bình thường――nhưng mà,\nthế này là được――đúng không?"

# monologue
# JP: （重量の分、働く慣性は強くなる。\nブレーキ力が同じなら、\x%l制動;#00ffc040;制動%l;#;距離は長くなる）
3247 = "（Tỷ lệ thuận với trọng lượng, lực quán\ntính tác động sẽ mạnh hơn.\nNếu lực phanh\nnhư nhau, khoảng cách \\x%l制動;#00ffc040;hãm phanh%l;#; sẽ dài\nhơn.）"

# monologue
# JP: 当然のことを確認しなおし、必死で計算しなおしながらも\n体は自然と、ハチロクに叩きこまれたとおりに動く。
2649 = "Vừa xác nhận lại những điều hiển nhiên,\nvừa tuyệt vọng tính toán lại,\nnhưng cơ thể\ntôi vẫn tự nhiên di chuyển đúng như những\ngì Hachiroku đã khắc sâu vào tâm trí."

# monologue
# JP: （一ミリでも停止位置を過ぎたら、事故扱いだ。\n迷うようなら安全第一。決して、無理をしてはならない）
3198 = "（Chỉ cần vượt qua vị trí dừng 1 milimet\nthôi cũng bị coi là sự cố.\nNếu cảm thấy\nphân vân thì an toàn là trên hết. Tuyệt\nđối không được cố quá sức.）"

# monologue
# JP: そして思考も、\n教わったことをなぞり始めれば、迷いは消える。
2833 = "Và cả suy nghĩ nữa,\nkhi bắt đầu lần theo\nnhững gì đã được dạy, sự phân vân liền tan\nbiến."

# monologue
# JP: ――追加\x%l減圧;#00ffc040;減圧%l;#;の必要は無い。\n\x%l緩め込め位置;#00ffc040;緩め込め位置%l;#;に戻したブレーキをまた、\x%l重なり位置;#00ffc040;重なり位置%l;#;へ。
1654 = "――Không cần phải \\x%l減圧;#00ffc040;giảm áp%l;#; thêm.\nChuyển phanh từ \\x%l緩め込め位置;#00ffc040;vị trí nhả phanh%l;#;\ntrở lại \\x%l重なり位置;#00ffc040;vị trí giữ phanh%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「停止目標確認」
2295 = "「Đã xác nhận mục tiêu dừng.」"

# monologue
# JP: ここも――いつもより早くを意識し、\nブレーキ位置を運転に。
3138 = "Chỗ này cũng vậy――ý thức phải sớm hơn bình\nthường,\nchuyển vị trí phanh sang chế độ\nchạy."

# monologue
# JP: 摩擦抵抗と空気抵抗だけを頼りに、\n残る慣性が消えるのを……………………待つ。
3011 = "Chỉ dựa vào lực cản ma sát và lực cản\nkhông khí,\nchờ đợi……………………quán tính còn\nlại tiêu tan."

# monologue
# JP: （ゴ――――トっ）
3231 = "（Cạch————）"

# 【双鉄】
# display as 雙鐵
# JP: 「停止確認――」
1982 = "「Xác nhận đã dừng――」"

# 【ハチロク】
# display as 八六
# JP: 「１１センチ、離れています。\nいささか、\x%l制動;#00ffc040;制動%l;#;が早すぎました」
1976 = "「Cách 11 centimet.\n\\x%l制動;#00ffc040;Hãm phanh%l;#; hơi sớm một chút rồi\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
2057 = "「Ưm.」"

# monologue
# JP: やはりピタリは無理だった。\nが、手前であるなら修正できる。
3140 = "Quả nhiên dừng chuẩn xác là điều không\nthể.\nNhưng nếu dừng ở phía trước thì vẫn\ncó thể sửa được."

# monologue
# JP: \x%l加減弁;#00ffc040;加減弁%l;#;テコに手を――
2793 = "Tôi đặt tay lên cần \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;――"

# 【ハチロク】
# display as 八六
# JP: 「いけません」
1934 = "「Không được ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2399 = "「!」"

# monologue
# JP: ――、一瞬動かし、すぐに\x%l制動;#00ffc040;制動%l;#;。
1658 = "――Cho nhích lên một chút, rồi lập tức \\x%l制動;#00ffc040;hãm phanh%l;#;\n."

# monologue
# JP: それでピタリに位置をあわせようとしていた手と心とが、\n鋭い声に止められる。
2801 = "Bàn tay và tâm trí đang định làm vậy để\nkhớp đúng vị trí dừng,\nđã bị chặn lại bởi\nmột giọng nói sắc bén."

# 【ハチロク】
# display as 八六
# JP: 「この距離でしたらお客様に、\n半歩か一歩、ズレていただくべきです」
2087 = "「Với khoảng cách này, chúng ta nên để hành\nkhách\nbước lệch đi nửa bước hoặc một bước\nthì hơn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
2218 = "「Là vậy sao?」"

# 【ハチロク】
# display as 八六
# JP: 「今、\x%l連結器;#00ffc040;連結器%l;#;は伸びきっている状態です。\n発車のショックは、ほとんど発生しません」
2292 = "「Hiện tại, \\x%l連結器;#00ffc040;khớp nối toa xe%l;#; đang ở trạng\nthái giãn hết cỡ.\nChấn động khi xuất phát hầu như sẽ không\nxảy ra.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど！」
2235 = "「Ra là vậy!」"

# monologue
# JP: 一瞬動いてすぐに止めるのは、急\x%l制動;#00ffc040;制動%l;#;だ。
2640 = "Việc nhích lên một chút rồi dừng lại ngay\nlà \\x%l制動;#00ffc040;hãm phanh%l;#; gấp."

# monologue
# JP: 当然、\x%l客車;#00ffc040;客車%l;#;の慣性を殺しきれずに、\n\x%l連結器;#00ffc040;連結器%l;#;はぎゅっと詰まってしまう。
3132 = "Đương nhiên, vì không thể triệt tiêu hết\nquán tính của \\x%l客車;#00ffc040;toa hành khách%l;#;,\nnên \\x%l連結器;#00ffc040;khớp nối toa xe%l;#; sẽ bị ép chặt lại."

# 【双鉄】
# display as 雙鐵
# JP: 「一歩をズレていただくご迷惑の方が、\n急\x%l制動;#00ffc040;制動%l;#;や発車時のショックで与えるご迷惑より、小さい」
2310 = "「Sự phiền toái khi để hành khách bước lệch\nmột bước,\ncòn nhỏ hơn sự phiền toái do\nchấn động khi \\x%l制動;#00ffc040;hãm phanh%l;#; gấp hay lúc xuất\nphát gây\nra.」"

# 【ハチロク】
# display as 八六
# JP: 「左様です、双鉄様。今は、御一夜-湯医だけの二駅。\nこのような心遣いは不要かもしれませんが――」
2260 = "「Chính xác là vậy ạ, ngài Soutetsu. Hiện\ntại, chỉ có hai ga là Ohimitera và Yui.\nCó\nthể sự chu đáo như thế này là không cần\nthiết, nhưng mà――」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。今後、途中駅を復活させられるかもしれんし、\n\x%l三角線;#00ffc040;三角線%l;#;や\x%l転車台;#00ffc040;転車台%l;#;を含む乗車を観光資源とするかもしれん」
2076 = "「Ừm. Sau này, có thể chúng ta sẽ khôi phục\nlại các ga trung gian,\nhoặc biến việc ngồi\ntàu đi qua \\x%l三角線;#00ffc040;đường tam giác%l;#; hay \\x%l転車台;#00ffc040;bàn quay đầu máy%l;#;\nthành tài nguyên du\nlịch.」"

# monologue
# JP: 言えばハチロクは、満足そうに大きく頷く。
2619 = "Nghe tôi nói vậy, Hachiroku gật đầu mạnh\nvẻ hài lòng."

# 【ハチロク】
# display as 八六
# JP: 「はい。そのようにさまざまを想定すれば、\n訓練から、より大きな学びを得られるものかと存じます」
2222 = "「Vâng ạ. Bằng cách giả định nhiều tình\nhuống khác nhau như vậy,\nem nghĩ chúng ta\nsẽ học hỏi được nhiều điều lớn lao hơn từ\nviệc huấn luyện ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2078 = "「嗯」" 

# monologue
# JP: ならば、と停車処理を行い、\n指差し・\x%l喚呼;#00ffc040;喚呼%l;#;で安全確認。
2786 = "Nếu vậy thì, tôi tiến hành xử lý dừng tàu,\nvà xác nhận an toàn bằng cách chỉ tay và \\x%l喚呼;#00ffc040;hô xác nhận%l;#;\n."

# monologue
# JP: そうしてやっと――\n僕は日々姫へと向き直れる。
2609 = "Và rồi cuối cùng――\nTôi cũng có thể quay\nlại đối mặt với Hibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「どうだ？\n日々姫もより大きな学びを得ることは出来たか？」
2131 = "「Thế nào?\nHibiki có học hỏi được điều gì\nlớn lao hơn không?」"

# 【日々姫】
# display as 日日姬
# JP: 「わ、わかったことは――\n今は、一つだけです」
2146 = "「Đ-Điều em nhận ra là――\nBây giờ, chỉ có\nmột điều thôi.」"

# monologue
# JP: 汗だくだ。\n顔が真っ赤で、肩が大きく上下している。
2698 = "Mồ hôi nhễ nhại.\nKhuôn mặt em ấy đỏ bừng,\nhai vai phập phồng mạnh."

# 【日々姫】
# display as 日日姬
# JP: 「たった六十個の[どのう,1]土嚢でも――\n石炭の喰い、結構早くなるものだって」
2025 = "「Dù chỉ là sáu mươi bao cát――\nNhưng lượng\nthan tiêu thụ, cũng nhanh hơn khá nhiều\nđấy.」"

# 【ハチロク】
# display as 八六
# JP: 「[どのう,1]土嚢ではなく、お客様です。\nわたくしたちは、\x%l貨車;#00ffc040;貨車%l;#;ではなく\x%l客車;#00ffc040;客車%l;#;を引くものですから」
1942 = "「Không phải bao cát, mà là hành khách ạ.\nBởi vì chúng ta kéo \\x%l客車;#00ffc040;toa hành khách%l;#;, chứ\nkhông phải \\x%l貨車;#00ffc040;toa chở hàng%l;#; ạ.」"

# monologue
# JP: 心外そうな、ハチロクの声。\n土嚢はあくまで、乗客を想定して乗せた負荷だと指摘する。
2623 = "Giọng Hachiroku nghe có vẻ phật ý.\nEm ấy\nchỉ ra rằng bao cát suy cho cùng cũng chỉ\nlà tải trọng giả định thay cho hành khách\nmà thôi."

# 【日々姫】
# display as 日日姬
# JP: 「そ、そうだね。ごめん――土嚢様は、お客っ、様……\n今日は、転倒……させて、ない――よね？」
2114 = "「Đ-Đúng vậy nhỉ. Chị xin lỗi――Bao\ncát-sama, là hành khách-sama……\nHôm nay,\nkhông làm họ……bị ngã――đúng không?」"

# monologue
# JP: 荒い呼吸で切れ切れに言い、\n日々姫の視線は\x%l客車;#00ffc040;客車%l;#;の方へと。
2910 = "Nói ngắt quãng từng từ với nhịp thở dốc,\nánh mắt Hibiki hướng về phía \\x%l客車;#00ffc040;toa hành khách%l;#;\n."

# monologue
# JP: 土嚢様たちは、ちょっとの衝撃で転んでしまう。\n見かけによらず、乗務訓練に適正の高い方たちなのだ。
2959 = "Các vị bao cát-sama chỉ cần một chấn động\nnhỏ là ngã lăn quay.\nĐừng nhìn vẻ bề\nngoài, họ lại là những vị khách rất thích\nhợp cho việc huấn luyện nghiệp vụ đấy."

# 【ハチロク】
# display as 八六
# JP: 「今日は大丈夫でしょう。停止位置こそズレましたが、\n運転はなめらか。お二人の[いき,1]呼吸も良く合っていました」
1957 = "「Hôm nay chắc là không sao đâu ạ. Dù vị\ntrí dừng có bị lệch,\nnhưng việc điều khiển\nrất trơn tru. Nhịp độ của hai người cũng\nrất ăn ý ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「はぁ――はぁ――ははっ――\nなら、よかったぁ」
2046 = "「Hà――hà――haha――\nVậy thì, tốt quá rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫？」
2209 = "「Hibiki?」"

# monologue
# JP: 日々姫の呼吸が、どうにもなかなか落ち着かない。\n少し不安になってくる。
2912 = "Nhịp thở của Hibiki mãi mà không chịu bình\ntĩnh lại.\nTôi bắt đầu cảm thấy hơi lo\nlắng."

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か？　それほどに負荷が増したのか？」
2253 = "「Em không sao chứ? Tải trọng tăng lên\nnhiều đến thế cơ à?」"

# 【日々姫】
# display as 日日姬
# JP: 「ううん……そぎゃんこつ――ああ、もうっ！\nそうじゃなくって、そういうのじゃ――なく、て」
1945 = "「Không phải……Chuyện đó――A, thiệt tình!\nKhông phải vậy đâu, không phải chuyện\nđó――đâu.」"

# monologue
# JP: 背中を丸め、はーーーーっと大きく息を吐き。\nそして日々姫は姿勢を正し、声と呼吸とも整え直す。
2904 = "Em ấy khom lưng, thở hắt ra một hơi thật\ndài.\nSau đó, Hibiki chỉnh lại tư thế, điều\nchỉnh lại giọng nói và nhịp thở."

# 【日々姫】
# display as 日日姬
# JP: 「走って来て――休まないで。\nそのまま、乗務だったから」
2176 = "「Tại em chạy tới đây――rồi không nghỉ ngơi.\nMà bắt tay vào làm việc luôn ấy mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだったな」
2066 = "「A, ra là vậy.」"

# monologue
# JP: 訓練が終わり次第に聞こうと思っていたはずなのに、\n運転に集中しすぎて、頭から飛んでしまっていた。
2942 = "Rõ ràng tôi định hỏi em ấy ngay sau khi\nhuấn luyện xong,\nnhưng vì quá tập trung\nvào việc lái tàu nên đã quên béng mất."

# 【双鉄】
# display as 雙鐵
# JP: 「時間ぎりぎりになるほどに、\n稀咲との話し合いは充実したものになったのか？」
1970 = "「Đến mức sát giờ như vậy,\nchắc hẳn cuộc\nnói chuyện với Kisaki đã diễn ra rất trọn\nvẹn nhỉ?」"

# 【日々姫】
# display as 日日姬
# JP: 「いいえ、逆です。兄さん」
1946 = "「Không đâu, ngược lại đấy ạ. Anh trai.」"

# 【双鉄】
# display as 雙鐵
# JP: 「逆？」
2132 = "「Ngược lại?」"

# 【日々姫】
# display as 日日姬
# JP: 「アポイント無しに行っちゃったから、\n稀咲先輩を結構待つことになっちゃって」
2149 = "「Tại em đi mà không hẹn trước,\nnên phải\nđợi tiền bối Kisaki khá lâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2060 = "「A.」"

# monologue
# JP: 僕も経験したことだ。
3128 = "Tôi cũng từng trải qua chuyện này rồi."

# monologue
# JP: まして選挙準備にかかっているなら、\n稀咲の多忙さもひとしおだろう。
2941 = "Huống hồ đang trong quá trình chuẩn bị cho\nbầu cử,\nKisaki chắc hẳn lại càng bận rộn\nhơn nữa."

# 【日々姫】
# display as 日日姬
# JP: 「でも、ギリギリで時間作ってもらえて。\nそれで、少しですけど、お話できました」
2084 = "「Nhưng mà, sát giờ chị ấy cũng sắp xếp\nđược thời gian.\nVì thế nên, tuy chỉ một\nchút thôi, nhưng em đã nói chuyện được với\nchị ấy.」"

# monologue
# JP: 日々姫の顔から疲労の色がスウっと薄れ、\nかわりに覗くのは清々しさだ。
2923 = "Vẻ mệt mỏi trên khuôn mặt Hibiki dần tan\nbiến,\nthay vào đó là sự sảng khoái."

# monologue
# JP: 良い話し合いを出来たのだろうと、\nその一瞬でクッキリ感じる。
2755 = "Tôi cảm nhận rõ ràng trong khoảnh khắc đó\nrằng,\nchắc hẳn họ đã có một cuộc nói\nchuyện rất tốt đẹp."

# 【日々姫】
# display as 日日姬
# JP: 「ポーレットさんが辞任すること。\n私が立候補するつもりなこと。話して来ました」
2151 = "「Việc chị Paulette từ chức.\nViệc em định\nứng cử. Em đã nói với chị ấy rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲はなんと？」
2324 = "「Kisaki nói sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「『話してくれてありがとう』って、握手して。\nあとはただ、『正々堂々戦おう』って――」
2090 = "「Chị ấy nói 『Cảm ơn em đã nói cho chị\nbiết』, rồi bắt tay em.\nSau đó chỉ nói là,\n『Hãy chiến đấu một cách đường hoàng\nnhé』――」"

# monologue
# JP: そこまで言って、日々姫は唇をきゅっと結んで、軽く噛む。
3102 = "Nói đến đó, Hibiki mím chặt môi, khẽ cắn\nnhẹ."

# monologue
# JP: そうして、ふうっと、\n長めの息を一つ吐き、途切れた言葉を再びつなぐ。
3152 = "Và rồi, phù,\nem ấy thở ra một hơi dài,\ntiếp nối những lời còn dang dở."

# 【日々姫】
# display as 日日姬
# JP: 「選挙戦でも、もうひとつの戦いでも。\n正々堂々、悔いの無いよう戦おうって――それだけです」
2091 = "「Dù là trong cuộc bầu cử, hay là trong một\ntrận chiến khác.\nHãy chiến đấu một cách\nđường hoàng, không để lại hối tiếc――Chỉ\nvậy thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「選挙戦はともかく――\nもうひとつの戦い、とは何だ？」
2375 = "「Cuộc bầu cử thì không nói làm gì――\nNhưng\nmột trận chiến khác, là gì thế?」"

# 【日々姫】
# display as 日日姬
# JP: 「それは、わたしからは言えません。\n言ってしまえば、勝敗に影響を与えかねないですから」
2368 = "「Chuyện đó, em không thể nói được.\nNếu nói\nra, rất có thể sẽ ảnh hưởng đến kết quả\nthắng bại mất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2370 = "「Vậy sao.」"

# monologue
# JP: 正々堂々。\nその四文字を、日々姫は力強く体現している。
2919 = "Đường đường chính chính.\nHibiki đang thể\nhiện mạnh mẽ bốn chữ đó."

# monologue
# JP: 戦う意志に満ちた姿を目にすれば、\n今回の面会には意味があったと、強く感じる。
3040 = "Nhìn dáng vẻ tràn đầy ý chí chiến đấu ấy,\ntôi cảm nhận sâu sắc rằng, cuộc gặp gỡ lần\nnày thực sự có ý nghĩa."

# monologue
# JP: （相手の虚を突く有利は確かに失った。\nが、日々姫の心の迷いもどうやら、消し去れた）
3223 = "（Đúng là chúng tôi đã đánh mất lợi thế tấn\ncông vào điểm yếu của đối phương.\nNhưng có\nvẻ như sự do dự trong lòng Hibiki cũng đã\nbị xóa bỏ.）"

# monologue
# JP: ならば、僕の為すべきことも絞りこまれる。\n日々姫が進もうとする道を、更に整えてやればいい。
2831 = "Nếu vậy, những việc tôi cần làm cũng đã\nđược thu hẹp lại.\nChỉ cần tiếp tục dọn\nđường cho con đường mà Hibiki định đi là\nđược."

# 【双鉄】
# display as 雙鐵
# JP: 「市長選をよりよく戦うために、\n日々姫の負荷を減らすことを考えねばな」
2279 = "「Để có thể chiến đấu tốt hơn trong cuộc\nbầu cử thị trưởng,\nchúng ta phải nghĩ cách\ngiảm bớt gánh nặng cho Hibiki thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「左様ですね、双鉄様」
2217 = "「Đúng vậy nhỉ, ngài Soutetsu.」"

# 【日々姫】
# display as 日日姬
# JP: 「ええっ！？」
2048 = "「Hả!?」"

# monologue
# JP: ぎょっとした顔。
2895 = "Một khuôn mặt hoảng hốt."

# monologue
# JP: そして日々姫は慌てたように、\nワンスコで石炭を積んでは下ろしをしてみせる。
2695 = "Và rồi Hibiki như thể đang luống cuống,\nem\nấy dùng xẻng xúc than lên rồi lại hạ xuống\ncho chúng tôi xem."

# 【日々姫】
# display as 日日姬
# JP: 「別に、負荷とか！\nだから、さっきのは走ってすぐにだったからで」
2171 = "「Làm gì có gánh nặng nào chứ!\nChỉ là do\nban nãy em vừa mới chạy tới xong thôi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「今このときだけの――\nあるいは、選挙期間だけのことではない」
1933 = "「Không phải chỉ lúc này――\nHoặc là chỉ\ntrong thời gian bầu cử đâu.」"

# 【日々姫】
# display as 日日姬
# JP: 「え？」
2051 = "「Hả?」"

# 【双鉄】
# display as 雙鐵
# JP: 「勝って、市長になった後。\n負荷を軽減しておかねば、ポーレットの二の舞いとなる」
2100 = "「Sau khi giành chiến thắng và trở thành\nthị trưởng.\nNếu không giảm bớt gánh nặng,\nem sẽ đi vào vết xe đổ của Paulette mất.」"

# 【日々姫】
# display as 日日姬
# JP: 「それは――」
2364 = "「Chuyện đó――」"

# monologue
# JP: 言いかけ、一度は口を噤んで。
2926 = "Đang nói dở, em ấy bỗng im bặt."

# monologue
# JP: それでも日々姫は、\nどうしても、という感じの顔で言葉を押し出す。
2688 = "Nhưng dù vậy, Hibiki vẫn\ncố rặn ra từng\nchữ với vẻ mặt kiên quyết không chịu khuất\nphục."

# 【日々姫】
# display as 日日姬
# JP: 「――私の方が！\nポーレットさんより、多分体力あると思うし」
1715 = "「――Em á!\nEm nghĩ chắc chắn em có thể lực\ntốt hơn chị Paulette mà.」"

# monologue
# JP: それは確かに。\n\x%l機関助士;#00ffc040;機関助士%l;#;としての働きぶりを見るだけでわかる。
3034 = "Điều đó thì đúng.\nChỉ cần nhìn cách em ấy\nlàm việc với tư cách là \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; là đủ\nhiểu."

# monologue
# JP: 日々姫の基礎的な体力は、\n運動不足の成人男子をゆうゆう上回っていよう。が――
2676 = "Thể lực cơ bản của Hibiki,\nchắc chắn dư\nsức vượt qua một người đàn ông trưởng\nthành lười vận động. Nhưng mà――"

# 【双鉄】
# display as 雙鐵
# JP: 「体だけが保たれていても仕方ない。\n心・技・体。その全てにおいて、同じことを言えるか？」
2365 = "「Chỉ có thể lực tốt thôi thì chẳng giải\nquyết được gì.\nTâm - Kỹ - Thể. Về tất cả\nnhững khía cạnh đó, em có dám nói như vậy\nkhông?」"

# 【日々姫】
# display as 日日姬
# JP: 「…………それは……」
1730 = "「…………Chuyện đó……」"

# monologue
# JP: 鉄道についても、政治についても、\n現時点では、ポーレットの能力は日々姫を上回っている。
2739 = "Dù là về đường sắt hay chính trị,\nở thời\nđiểm hiện tại, năng lực của Paulette vẫn\nvượt trội hơn Hibiki."

# monologue
# JP: そのことを理解できぬほどに愚かではなく、\nだから日々姫は、ふるふると首を横に振る。
2655 = "Hibiki không hề ngốc đến mức không hiểu\nđược điều đó,\nthế nên em ấy mới lắc đầu\nnguầy nguậy."

# 【日々姫】
# display as 日日姬
# JP: 「言えん。けど――私、甘えっ子なのを止めたくて、\n頑張りたくて――だから、たとえ、にぃにぃにだって」
1938 = "「Không dám ạ. Nhưng mà――Em muốn thôi làm\nmột đứa trẻ hay nhõng nhẽo,\nem muốn cố\ngắng――Vì thế nên, cho dù đó có là anh hai\nđi chăng nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば問おう。日々姫。\n“甘える”とはどういうことだ？」
2384 = "「Vậy thì để anh hỏi em nhé. Hibiki.\n“Nhõng\nnhẽo” nghĩa là sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「そんなん！　人に頼って、人の力を借りることばい」
2376 = "「Cái đó! Là ỷ lại vào người khác, mượn sức\nmạnh của người khác chứ sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは違うぞ、日々姫。\nその考えでは、大きなことなど成し得なくなる」
2207 = "「Sai rồi, Hibiki.\nVới suy nghĩ đó, em sẽ\nchẳng thể làm nên trò trống gì lớn lao\nđâu.」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2399 = "「！」" 

# monologue
# JP: 一人で選挙に勝てはしない。\n一人では\x%l8620;#00ffc040;8620%l;#;を動かすことさえ出来はしない。
2661 = "Một mình em không thể chiến thắng cuộc bầu\ncử.\nMột mình em thậm chí còn chẳng thể\nkhởi động \\x%l8620;#00ffc040;8620%l;#;."

# monologue
# JP: 単純で身近な事実を指摘するだけでその証明となる。
3109 = "Chỉ cần chỉ ra những sự thật đơn giản và\ngần gũi cũng đủ để chứng minh điều đó."

# 【双鉄】
# display as 雙鐵
# JP: 「他人に頼り、力を借りる。それは、人の持つ能力だ。\nその能力を捨ててしまえば、人は、野の獣にも劣る」
2113 = "「Ỷ lại vào người khác, mượn sức mạnh của\nngười khác. Đó là năng lực của con người.\nNếu vứt bỏ năng lực đó đi, con người thậm\nchí còn thua cả dã thú.」"

# 【日々姫】
# display as 日日姬
# JP: 「だけど……頼ってばっかりじゃ」
2028 = "「Nhưng mà……nếu cứ ỷ lại mãi thì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「その通り。頼ってばかりでは成長できない。\n故に、頼り方に良し悪しがあるのではないかと僕は思う」
2258 = "「Đúng vậy. Nếu chỉ biết ỷ lại thì sẽ không\nthể trưởng thành được.\nDo đó, anh nghĩ\ncách nhờ vả cũng có cái tốt cái xấu.」"

# 【日々姫】
# display as 日日姬
# JP: 「頼り方の良し悪し？」
2097 = "「Cách nhờ vả tốt xấu á?」"

# monologue
# JP: 頑なな態度がほぐれ始める。\n少し体を前のめりにし、話を聞こうとしてくれている。
2898 = "Thái độ cứng rắn bắt đầu mềm mỏng hơn.\nEm\nấy hơi rướn người về phía trước, tỏ ý muốn\nlắng nghe."

# monologue
# JP: だからゆっくり――伝わるようにと言葉を重ねる。
2999 = "Thế nên tôi chậm rãi――nói từng lời để em\nấy có thể hiểu được."

# 【双鉄】
# display as 雙鐵
# JP: 「自力で果たすべきことまで、他人に任せてしまうこと。\nそれを“甘え”と呼ぶのではないかと、僕は思う」
2241 = "「Giao phó cho người khác cả những việc bản\nthân phải tự mình hoàn thành.\nAnh nghĩ đó\nmới gọi là “nhõng nhẽo”.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2060 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、稀咲への宣戦布告。\nそれを僕に任せるなら、日々姫は甘えっ子のままだった」
2250 = "「Ví dụ như việc tuyên chiến với Kisaki.\nNếu em giao việc đó cho anh, thì Hibiki\nvẫn chỉ là một đứa trẻ hay nhõng nhẽo\nthôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2078 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、日々姫は果たすべきを一人で果たした。\nそれは極めて立派なことだ」
2029 = "「Nhưng, Hibiki đã tự mình hoàn thành việc\ncần làm.\nĐó là một điều vô cùng đáng tự\nhào.」"

# 【日々姫】
# display as 日日姬
# JP: 「うんっ」
# 2078 = "「嗯」" 

# monologue
# JP: 照れ屋の日々姫が照れもせず、\n僕の言葉を素直に受け取る。
2732 = "Một người hay xấu hổ như Hibiki lại không\nhề tỏ ra ngượng ngùng,\nmà chân thành đón\nnhận những lời của tôi."

# monologue
# JP: 受け取って――\nそして静かに、投げ返してくる。
3012 = "Đón nhận nó――\nVà rồi lặng lẽ, đáp lời lại."

# 【日々姫】
# display as 日日姬
# JP: 「だけど今は。私……一人では出来ないことまで、\n一人でしようとしちゃってるんですね」
2034 = "「Nhưng bây giờ. Em……đang cố gắng tự mình\nlàm cả những việc,\nmà một mình em không\nthể làm được đúng không ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。それは無理でしかない」
2214 = "「Đúng vậy. Đó chỉ là sự cố chấp mà thôi.」"

# monologue
# JP: ポーレットが犯してしまった失敗のことを慮れば、\nこれ以上の言葉を重ねられない。
3055 = "Nghĩ đến thất bại mà Paulette đã mắc phải,\ntôi không thể nói thêm lời nào nữa."

# monologue
# JP: が、無理を重ねた結果がどうなるのかを考えるなら……\nそれもまた、別の形の甘えとなってしまうだろう。
2582 = "Nhưng, nếu nghĩ đến hậu quả của việc cứ cố\nchấp quá sức……\nĐó cũng sẽ trở thành một\nhình thức nhõng nhẽo khác mất thôi."

# 【日々姫】
# display as 日日姬
# JP: 「私、ちょっと張り切りすぎちゃってたみたい。\n兄さん、ハチロク、ごめんなさい」
2313 = "「Có vẻ như em đã hơi quá sức rồi.\nAnh\ntrai, Hachiroku, em xin lỗi.」"

# 【ハチロク】
# display as 八六
# JP: 「謝るようなことなどありません」
1937 = "「Không có gì phải xin lỗi cả.」"

# monologue
# JP: ハチロクの、ひどくあっさりした物言い。
2616 = "Cách nói của Hachiroku vô cùng điềm nhiên."

# 【ハチロク】
# display as 八六
# JP: 「食い違いがあったから話し合った。\nごく当然の行いです」
2141 = "「Có bất đồng ý kiến nên chúng ta mới bàn\nbạc.\nĐó là việc làm hết sức đương nhiên\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2215 = "「Đúng vậy.」"

# 【日々姫】
# display as 日日姬
# JP: 「そっか」
# 2370 = "「這樣啊」" 

# monologue
# JP: 日々姫の顔から力みが消える。\nまっすぐな目が僕を見る。
2917 = "Sự căng thẳng trên khuôn mặt Hibiki tan\nbiến.\nĐôi mắt nhìn thẳng vào tôi."

# 【日々姫】
# display as 日日姬
# JP: 「なら私、もっと話し合いたいです。\n私の負担、どうやって減らせばいいんでしょうか？」
2386 = "「Vậy thì em muốn bàn bạc thêm ạ.\nLàm thế\nnào để giảm bớt gánh nặng cho em đây?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはな、日々姫――」
2366 = "「Chuyện đó ấy mà, Hibiki――」"

# monologue
# JP: 信号機へと視線を送れば、\nハチロクもすぐに声を出す。
2781 = "Khi tôi hướng ánh mắt về phía cột tín\nhiệu,\nHachiroku cũng lập tức lên tiếng."

# 【ハチロク】
# display as 八六
# JP: 「\x%l投炭;#00ffc040;投炭%l;#;。一分で四十五」
1693 = "「\\x%l投炭;#00ffc040;Thêm than%l;#;. Một phút bốn mươi lăm xẻng.」"

# 【日々姫】
# display as 日日姬
# JP: 「\x%l投炭;#00ffc040;投炭%l;#;！　一分で四十五！！」
1695 = "「\\x%l投炭;#00ffc040;Thêm than%l;#;! Một phút bốn mươi lăm xẻng!!」"

# monologue
# JP: 日々姫には不意打ちに近かった指示であろうに、\n体はすぐさま反応している。
2736 = "Mặc dù đó là một chỉ thị gần như bất ngờ\nđối với Hibiki,\nnhưng cơ thể em ấy vẫn lập\ntức phản ứng lại."

# monologue
# JP: 悪くない。\n心身ともに、日々姫は曇りを祓っている。
2561 = "Không tệ.\nCả thể xác lẫn tinh thần của\nHibiki đều đã xua tan được mây mù."

# 【双鉄】
# display as 雙鐵
# JP: 「――機関庫へ戻ってから先の話だ」
1712 = "「――Chuyện tiếp theo đợi về gara đầu máy\nrồi nói.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そんなことがあったんですか」
2296 = "「Đã có chuyện như vậy sao.」"

# 【日々姫】
# display as 日日姬
# JP: 「私、どうしても――\n稀咲先輩と正々堂々と戦いたくて」
2166 = "「Em, dù thế nào đi nữa――\nCũng muốn chiến\nđấu một cách đường hoàng với tiền bối\nKisaki.」"

# monologue
# JP: レールショップにポーレット。\nそしてれいなの、珍しくもない取り合わせ。
3147 = "Paulette ở cửa hàng đường sắt.\nVà Reina,\nmột sự kết hợp chẳng có gì lạ lẫm."

# monologue
# JP: けれども流れる空気が違う。\n緊張感と、開放感――その両方が入り交じっている。
2670 = "Nhưng bầu không khí đang trôi qua lại khác\nhẳn.\nCảm giác căng thẳng và sự giải\nthoát――cả hai hòa quyện vào nhau."

# 【ポーレット】
# display as 波萊特
# JP: 「いいと思います。遺恨が残るような選挙戦はのちのち、\n御一夜の発展を損ねる要因になってしまうと思いますし」
2172 = "「Chị nghĩ như vậy là tốt đấy. Một cuộc bầu\ncử để lại oán hận về sau,\nsẽ trở thành\nnguyên nhân gây tổn hại đến sự phát triển\ncủa Ohimitera.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ……」
2059 = "「A……」"

# monologue
# JP: ポーレットのサバサバとした発言に、\n日々姫は安堵の声を漏らす。
3061 = "Trước câu nói thẳng thắn của Paulette,\nHibiki buông một tiếng thở phào nhẹ nhõm."

# 【日々姫】
# display as 日日姬
# JP: 「ありがとう、ポーレットさん」
2274 = "「Cảm ơn chị, chị Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「いいえ、こちらこそ」
2161 = "「Không đâu, chị mới là người phải cảm ơn.」"

# monologue
# JP: 深く、深く。\nポーレットが日々姫に頭を下げる。
2977 = "Thật sâu, thật sâu.\nPaulette cúi đầu trước\nHibiki."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしには重すぎたバトンを、拾ってくれてありがとう。\nどうか、御一夜市を――よろしくお願いいたします」
2369 = "「Cảm ơn em đã nhặt lấy cây gậy tiếp sức\nquá đỗi nặng nề đối với chị.\nXin hãy chăm\nlo cho thành phố Ohimitera nhé――Trăm sự\nnhờ em.」"

# 【日々姫】
# display as 日日姬
# JP: 「いいえ、そんなっ――」
1994 = "「Không đâu, chuyện đó――」"

# monologue
# JP: 言いかけて、けれども日々姫は唇をキュっと結んで閉める。
2927 = "Đang nói dở, nhưng Hibiki lại mím chặt\nmôi, im bặt."

# monologue
# JP: 一呼吸。\nそれから、とても大人びた声。
2711 = "Hít một hơi.\nSau đó, em ấy cất lên một\ngiọng nói rất chững chạc."

# 【日々姫】
# display as 日日姬
# JP: 「そう出来るよう、なりたいです。\nだから、改めて――ポーレットさんの力を貸して下さい」
2160 = "「Em muốn mình có thể làm được như vậy.\nVì\nthế, một lần nữa――Xin chị Paulette hãy cho\nem mượn sức mạnh của chị.」"

# 【ポーレット】
# display as 波萊特
# JP: 「もちろん。わたしに出来ることがあれば、何でも」
2294 = "「Tất nhiên rồi. Nếu có việc gì chị làm\nđược, bất cứ việc gì chị cũng sẵn lòng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2058 = "「A――」"

# monologue
# JP: 言われて、今さら思いあたる。\n『ポーレットに出来ること』は、実は極めて広範なのだと。
2714 = "Nghe vậy, đến giờ tôi mới chợt nhận ra.\n『Những việc Paulette có thể làm』 thực ra\nvô cùng rộng lớn."

# monologue
# JP: そこに甘える形になっては、負荷の形が変わるだけ――\nその観点に気づければ、自然と思考は整頓できる。
2720 = "Nếu lại ỷ lại vào điều đó, thì gánh nặng\nchỉ thay đổi hình thức mà thôi――\nKhi nhận\nra quan điểm đó, suy nghĩ tự nhiên sẽ được\nsắp xếp gọn gàng."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクとも話し合ったのだが、市長選とその後を睨み、\n日々姫の負担を軽減したいと考えている」
2148 = "「Anh cũng đã bàn bạc với Hachiroku rồi,\nhướng tới cuộc bầu cử thị trưởng và sau\nđó,\nanh đang nghĩ cách để giảm bớt gánh\nnặng cho Hibiki.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 2078 = "「嗯」" 

# monologue
# JP: 余計な言葉の混じらぬ答えが、\nその簡潔な強さが物語っている。
3047 = "Câu trả lời không lẫn những lời thừa thãi,\nsự mạnh mẽ ngắn gọn đó đã nói lên tất cả."

# monologue
# JP: 市長職とは、\n兼職でこなせるようなものではやはり、無いのだと。
2632 = "Chức vụ thị trưởng,\nquả nhiên không phải\nlà thứ có thể kiêm nhiệm được."

# 【双鉄】
# display as 雙鐵
# JP: 「端的に聞くが――\n\x%l8620;#00ffc040;8620%l;#;の\x%l機関士;#00ffc040;機関士%l;#;を僕と交代でやってはもらえないだろうか」
2155 = "「Nói thẳng ra thì――\nEm có thể luân phiên\nlàm \\x%l機関士;#00ffc040;người lái tàu%l;#; \\x%l8620;#00ffc040;8620%l;#; với anh được\nkhông?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ええっ！？」
# 2048 = "「哎！？」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ、その手がありましたか」
2069 = "「A, ra là còn cách đó.」"

# 【ポーレット】
# display as 波萊特
# JP: 「その手、って――」
2367 = "「Cách đó, là sao――」"

# monologue
# JP: 驚き顔のポーレットへと、\nハチロクが言葉をつないで送る。
2974 = "Hachiroku tiếp lời,\nnói với Paulette đang\nlộ vẻ mặt ngạc nhiên."

# 【ハチロク】
# display as 八六
# JP: 「湯医線に関しての、現時点での知識と運転経験は、\nポーレット様が双鉄様に勝る――というだけの話です」
2302 = "「Nói về tuyến Yui, kiến thức và kinh\nnghiệm lái tàu ở thời điểm hiện tại,\ncô\nPaulette vượt trội hơn ngài Soutetsu――Chỉ\nđơn giản là vậy thôi ạ.」"

# monologue
# JP: そう。\x%l8620;#00ffc040;8620%l;#;の運転機器の扱いにも、\nポーレットならすぐに熟達できるだろう。
2936 = "Đúng vậy. Về cách xử lý các thiết bị điều\nkhiển của \\x%l8620;#00ffc040;8620%l;#;,\nnếu là Paulette thì chắc chắn\nsẽ nhanh chóng thành thạo thôi."

# monologue
# JP: 故、ポーレット\x%l機関士;#00ffc040;機関士%l;#;-僕が\x%l機関助士;#00ffc040;機関助士%l;#;という体制の方が、\nその逆よりもよほど楽に、よりよい結果を出せる筈だ。
2838 = "Do đó, với thể chế Paulette làm \\x%l機関士;#00ffc040;người lái tàu%l;#;\n- tôi làm\n\\x%l機関助士;#00ffc040;phụ lái tàu%l;#;,\nchắc chắn sẽ dễ dàng và mang lại kết quả\ntốt hơn so với chiều ngược lại."

# 【ポーレット】
# display as 波萊特
# JP: 「日々姫ちゃんが外れて――ですよね？　\nそれって……ええと……」
1971 = "「Hibiki sẽ rút lui――đúng không ạ? \nChuyện\nđó……ờm……」"

# monologue
# JP: ちらりと、ポーレットの目は日々姫へと。
2979 = "Paulette khẽ liếc mắt nhìn Hibiki."

# monologue
# JP: 日々姫がこくん、と頷き返せば、\nポーレットもまた、力の入った頷きを返す。
2897 = "Khi Hibiki gật đầu đáp lại,\nPaulette cũng\ngật đầu thật mạnh."

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。喜んでお引き受けします。\nただ――」
2164 = "「Em hiểu rồi. Em rất sẵn lòng nhận lời.\nChỉ là――」"

# 【双鉄】
# display as 雙鐵
# JP: 「ただ？」
2026 = "「Chỉ là?」"

# 【ポーレット】
# display as 波萊特
# JP: 「どうせだったら、ダブルチームにするとか、\nローテーションを組む方がいいんじゃないかな、って」
2153 = "「Nếu đã vậy, sao chúng ta không chia thành\nhai đội,\nhoặc là phân ca luân phiên nhau\nthì tốt hơn nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
2079 = "「Ừm?」"

# monologue
# JP: 言葉の意味はわかるのだが、\n具体的にどういうことかが理解できない。
2775 = "Tôi hiểu ý nghĩa của lời nói,\nnhưng không\nthể hiểu cụ thể là như thế nào."

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、どういうチーム分けをするのだ？」
2095 = "「Ví dụ như, sẽ chia đội thế nào?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ええと……Aチームを双鉄くん-日々姫ちゃん。\nBチームをわたし-凪ちゃん、にするみたいな感じとか」
2041 = "「À ừm……Đội A sẽ là anh Soutetsu và Hibiki.\nĐội B sẽ là em và Nagi, kiểu như vậy đó\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ちょっと待て。\n僕が完全に乗務を外れるケースを作るということか？」
2329 = "「Đợi chút đã.\nÝ em là tạo ra một trường\nhợp anh hoàn toàn không tham gia vào tổ\nlái sao?」"

# 【ハチロク】
# display as 八六
# JP: 「そうなりますね」
2234 = "「Sẽ là như vậy đấy ạ.」"

# monologue
# JP: 驚かされた、その上でさらに驚かされる。
2621 = "Đã ngạc nhiên rồi, giờ lại càng ngạc nhiên\nhơn."

# monologue
# JP: ハチロクがいともあっさりと、\nマスターである僕が乗務を外れることを承認するから。
2700 = "Vì Hachiroku lại có thể dễ dàng chấp nhận\nviệc Master là tôi rút khỏi tổ lái."

# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかしだな」
2032 = "「Không, nhưng mà.」"

# 【ハチロク】
# display as 八六
# JP: 「確かに、トップナンバー機であるわたくしの場合、\nマスターのみを\x%l機関士;#00ffc040;機関士%l;#;にしての乗務が、あるべき姿です」
2299 = "「Đúng là với tư cách là đầu máy số 1 như\nem,\nviệc chỉ có Master làm \\x%l機関士;#00ffc040;người lái tàu%l;#; mới\nlà hình\nmẫu chuẩn mực ạ.」"

# monologue
# JP: マスターである清美機関士が風邪でも引けば、\nハチロクと\x%l8620;#00ffc040;8620%l;#;は運用を外れ、清美機関士の回復を待つ。
2626 = "Nếu Master là người lái tàu Kiyomi bị cảm,\nHachiroku và \\x%l8620;#00ffc040;8620%l;#; sẽ bị rút khỏi đội hình\nvận\nhành, chờ người lái tàu Kiyomi bình phục."

# monologue
# JP: トップナンバー機の誇りと質とは、\nそのようにして保たれると、僕も教えてもらった。
3129 = "Tôi cũng đã được dạy rằng, niềm tự hào và\nchất lượng của đầu máy số 1,\nđược duy trì\nbằng cách đó."

# 【ハチロク】
# display as 八六
# JP: 「しかし、トップナンバー機としての誇りより上に、\n『物』としてのわたくしの矜持がございます」
2281 = "「Tuy nhiên, đặt trên cả niềm tự hào của\nmột đầu máy số 1,\nlà lòng kiêu hãnh của em\nvới tư cách là một 『đồ vật』 ạ.」"

# monologue
# JP: 誇り高く、けれど優しく。\nハチロクの声は響き続ける。
2625 = "Đầy tự hào, nhưng cũng rất dịu dàng.\nGiọng\nnói của Hachiroku tiếp tục vang lên."

# 【ハチロク】
# display as 八六
# JP: 「物たるわたくしが、双鉄様を縛るなどあり得ません。\n双鉄様は、目的を果たすための最善を為されてください」
2252 = "「Một đồ vật như em, không đời nào lại đi\ntrói buộc ngài Soutetsu cả.\nXin ngài\nSoutetsu hãy làm những điều tốt nhất để\nđạt được mục đích của mình.」"

# 【双鉄】
# display as 雙鐵
# JP: 「目的」
2305 = "「Mục đích.」"

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;復活による、観光復権。\nそれによる経済活性化と、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致計画の撤回と。
2599 = "Sự phục hưng du lịch thông qua việc hồi\nsinh \\x%l8620;#00ffc040;8620%l;#;.\nKéo theo đó là sự phục hồi kinh tế,\nvà việc hủy bỏ kế hoạch thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;\n."

# monologue
# JP: 工場に関してはゼロから考えたいと日々姫は言っていたが、\n他の点では、この場の全員が目的をひとつに出来ている。
3150 = "Về chuyện nhà máy thì Hibiki đã nói muốn\nsuy nghĩ lại từ con số không,\nnhưng ở\nnhững điểm khác, tất cả mọi người ở đây\nđều chung một mục đích."

# 【ハチロク】
# display as 八六
# JP: 「目的達成まで、\n日々姫の負荷は極めて大きくなるでしょう」
2088 = "「Cho đến khi đạt được mục đích,\ngánh nặng\ncủa Hibiki sẽ vô cùng lớn đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、\n日々姫の負担の軽減案を考えているのではないか」
2180 = "「Vì thế nên,\nchúng ta mới đang nghĩ cách\ngiảm bớt gánh nặng cho Hibiki mà.」"

# monologue
# JP: 僕が乗務を外れるなどとは、まるで繋がってない話だ。
2726 = "Chuyện tôi rút khỏi tổ lái, hoàn toàn\nchẳng liên quan gì cả."

# monologue
# JP: そう指摘しているはずなのに、\nハチロクは頷き、微笑みまでを返してくる。
3158 = "Đáng lẽ tôi đã chỉ ra điều đó rồi,\nnhưng\nHachiroku lại gật đầu, thậm chí còn mỉm\ncười đáp lại."

# 【ハチロク】
# display as 八六
# JP: 「はい。私も――ポーレット様も、\n日々姫の負担の軽減案を申し上げています」
2230 = "「Vâng ạ. Cả em――và cô Paulette,\nđều đang\nđưa ra phương án giảm bớt gánh nặng cho\nHibiki đó ạ.」"

# monologue
# JP: その名につられて視線を移せば、\n青い瞳が穏やかに僕を見つめてそして、日々姫を見つめる。
2810 = "Bị thu hút bởi cái tên đó, tôi chuyển ánh\nnhìn,\nđôi mắt xanh biếc dịu dàng nhìn tôi,\nrồi lại nhìn Hibiki."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが、そばに居て支えてあげること。\nそれがきっと日々姫ちゃんの負担を一番減らす方法です」
2392 = "「Anh Soutetsu ở bên cạnh và hỗ trợ cho em\nấy.\nĐó chắc chắn là cách tốt nhất để giảm\nbớt gánh nặng cho Hibiki.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
# 2218 = "「是嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「――うんっ」
1710 = "「――Vâng.」"

# monologue
# JP: 明るい声。\nけれど籠もった……重ささえあるような力を感じる。
2915 = "Một giọng nói tươi sáng.\nNhưng tôi cảm\nnhận được sức mạnh ẩn chứa bên trong……thậm\nchí là cả sự nặng nề."

# monologue
# JP: すがる手を――日々姫は声で伸ばしている。
2703 = "Hibiki đang vươn đôi tay cầu cứu――thông\nqua giọng nói."

# monologue
# JP: （そうだな……\n日々姫は、甘えっ子なのに甘え下手なのだったな）
3228 = "（Đúng vậy nhỉ……\nHibiki rõ là hay nhõng\nnhẽo nhưng lại rất tệ trong việc đó mà.）"

# monologue
# JP: 身内であり、けれども距離ある存在でもある“義理の兄”。
1673 = "Dù là người nhà, nhưng cũng là một sự tồn\ntại có khoảng cách, “anh trai nuôi”."

# monologue
# JP: 実に微妙なそのポジションにいる僕だけにしか、\n日々姫はストレートには甘えられなかった。
3135 = "Chỉ với một người ở vị trí thực sự tế nhị\nnhư tôi,\nHibiki mới không thể nhõng nhẽo\nmột cách thẳng thắn được."

# monologue
# JP: （今は稀咲にも甘えられるようになったようだが……\n少なくとも選挙が終わるまで、それも果たせぬことだろう）
3218 = "（Bây giờ có vẻ em ấy cũng đã có thể nhõng\nnhẽo với Kisaki rồi……\nNhưng ít nhất là cho\nđến khi bầu cử kết thúc, điều đó cũng khó\nmà thực hiện được.）"

# monologue
# JP: であるのなら。\nいや――そうでなくとも。
3133 = "Nếu đã vậy.\nKhông――Dù không phải vậy đi\nchăng nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「わかった、日々姫」
2094 = "「Anh hiểu rồi, Hibiki.」"

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2399 = "「！」" 

# monologue
# JP: 日々姫の表情が晴れやかになる。\n僕の気持ちも、それを目にすれば晴らされる。
2656 = "Biểu cảm của Hibiki trở nên rạng rỡ.\nTâm\ntrạng của tôi cũng trở nên sáng sủa hơn\nkhi nhìn thấy điều đó."

# monologue
# JP: 日々姫が望んでくれるなら――僕は日々姫を支えるだけだ。
2851 = "Nếu Hibiki mong muốn――tôi sẽ chỉ ở bên hỗ\ntrợ em ấy thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、ハチロク。\nならば、そうさせてもらうとしよう」
2192 = "「Xin lỗi em nhé, Hachiroku.\nNếu vậy thì,\ncho phép anh làm thế nhé.」"

# 【ハチロク】
# display as 八六
# JP: 「『すまんな』などと申されず、\nどうぞ一刻も早く、全ての目的をお果たしください」
2344 = "「Xin ngài đừng nói 『Xin lỗi』,\nmong ngài\nhãy hoàn thành mọi mục đích càng sớm càng\ntốt ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。そうすれば――」
2067 = "「A, ra vậy. Nếu làm thế――」"

# 【ハチロク】
# display as 八六
# JP: 「はい。そのときにはきっと再び。\n全てはあるべき――いえ、より良い姿に収まります」
2224 = "「Vâng ạ. Khi đó chắc chắn một lần nữa.\nMọi\nthứ sẽ trở về đúng vị trí của nó――Không,\nsẽ trở nên tốt đẹp hơn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2078 = "「嗯」" 

# monologue
# JP: 僕と日々姫とハチロクと――\n生まれ変わった御一夜を、\x%l8620;#00ffc040;8620%l;#;で駆け抜ける。
2778 = "Tôi, Hibiki và Hachiroku――\nCùng nhau lái \\x%l8620;#00ffc040;8620%l;#;\nbăng qua Ohimitera đã được tái sinh."

# monologue
# JP: その光景を現実のものとするために、\nならば僕は、さらに前だけを見据えよう。
3000 = "Để biến viễn cảnh đó thành hiện thực,\nvậy\nthì tôi sẽ càng phải hướng mắt về phía\ntrước."

# 【双鉄】
# display as 雙鐵
# JP: 「案は了解。大賛成だ。\nが、現状のままでは、その案は空疎なものとなる」
2193 = "「Anh đã hiểu phương án này. Hoàn toàn tán\nthành.\nNhưng, với tình hình hiện tại,\nphương án đó chỉ là lời nói suông thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ぁぅ」
# 2060 = "「啊」" 

# monologue
# JP: 軽やかだったポーレットの声が寸詰まる。\nハチロクには苦笑が交じる。
2982 = "Giọng nói vốn đang nhẹ nhàng của Paulette\nbỗng nghẹn lại.\nHachiroku thì nở một nụ\ncười gượng gạo."

# 【ハチロク】
# display as 八六
# JP: 「その反応。\n\x%l客車;#00ffc040;客車%l;#;に関して、良いお話は聞けそうもありませんね？」
2125 = "「Phản ứng đó.\nCó vẻ như chúng ta không có\ntin tức tốt đẹp nào về \\x%l客車;#00ffc040;toa hành khách%l;#;\nnhỉ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ぅぅぅ……面目無いです」
2072 = "「Ư ư ư……Thật xấu hổ quá.」"

# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;無しでは、\x%l8620;#00ffc040;8620%l;#;の観光\x%l列車;#00ffc040;列車%l;#;化は果たせない。\nそして現状、煙害直撃の隙間\x%l客車;#00ffc040;客車%l;#;しか僕らは持たない。
3052 = "Không có \\x%l客車;#00ffc040;toa hành khách%l;#;, thì không thể\nbiến \\x%l8620;#00ffc040;8620%l;#; thành \\x%l列車;#00ffc040;tàu%l;#; du\nlịch được.\nVà hiện tại, chúng tôi chỉ có\nduy nhất một \\x%l客車;#00ffc040;toa hành khách%l;#; có khe hở\nkhiến khói bay\nthẳng vào."

# monologue
# JP: ポーレットは、問題発生からずっと、\n何とか事態を打開するべく、動いてくれているのだが――
2570 = "Từ lúc sự cố xảy ra, Paulette vẫn luôn\ncố\ngắng xoay xở để giải quyết tình hình――"

# 【双鉄】
# display as 雙鐵
# JP: 「……改めて聞くが、煙を防ぐ、という方向では\nなんともならんのか？」
1739 = "「……Anh hỏi lại lần nữa, theo hướng ngăn\nkhói vào,\nthì không có cách nào sao?」"

# 【ハチロク】
# display as 八六
# JP: 「補強とは、完成されたバランスを壊す行いです。\nそして壊れたバランスは、安全性を大きく下げます」
2123 = "「Gia cố đồng nghĩa với việc phá vỡ sự cân\nbằng đã hoàn thiện.\nVà sự cân bằng bị phá\nvỡ sẽ làm giảm đáng kể tính an toàn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「う……む」
2073 = "「Ư……m.」"

# 【ポーレット】
# display as 波萊特
# JP: 「この状況でもう一度乗車試験に失敗したら……\n選挙戦の結果も、多分、良くないものになります」
2105 = "「Nếu thất bại trong cuộc chạy thử một lần\nnữa với tình hình này……\nKết quả bầu cử, có\nlẽ cũng sẽ không tốt đẹp đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……だろうな」
1743 = "「……Chắc là vậy rồi.」"

# monologue
# JP: ならば、安全性に疑問符のつく補強改修は行えない。\nかといって、別の\x%l客車;#00ffc040;客車%l;#;の確保は困難。
3130 = "Nếu vậy, không thể tiến hành gia cố sửa\nchữa khi tính an toàn còn là một dấu hỏi.\nNhưng việc tìm kiếm một \\x%l客車;#00ffc040;toa hành khách%l;#;\nkhác cũng rất khó\nkhăn."

# monologue
# JP: その状況から抜け出せない。\n練度をどれほどあげてもこれでは、意味を成さない。
2550 = "Không thể thoát khỏi tình trạng đó.\nCho dù\ncó nâng cao độ thành thạo đến đâu đi chăng\nnữa, thì thế này cũng vô nghĩa."

# 【日々姫】
# display as 日日姬
# JP: 「あの、私――\n\x%l客車;#00ffc040;客車%l;#;について、ちょっと勉強したんだけど」
2382 = "「À ừm, em――\nđã tìm hiểu một chút về \\x%l客車;#00ffc040;toa hành khách%l;#;\nrồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫？」
# 2209 = "「日日姬？」" 

# monologue
# JP: おずおずと、挙手。\n日々姫の目は、ハチロクとれいなとを見る。
2921 = "Em ấy rụt rè giơ tay lên.\nÁnh mắt Hibiki\nhướng về phía Hachiroku và Reina."

# 【日々姫】
# display as 日日姬
# JP: 「\x%l客車;#00ffc040;客車%l;#;って、悪いのは車体の部分だけ？\n\x%l台車;#00ffc040;台車%l;#;とか\x%l台枠;#00ffc040;台枠%l;#;には、安全性の問題とか無いの？」
2244 = "「\\x%l客車;#00ffc040;Toa hành khách%l;#; ấy, chỉ có phần thân xe là\nbị hỏng thôi\nsao?\n\\x%l台車;#00ffc040;Giá chuyển hướng%l;#; hay \\x%l台枠;#00ffc040;khung gầm%l;#; không có\nvấn đề gì về an toàn\nchứ?」"

# monologue
# JP: \x%l台枠;#00ffc040;台枠%l;#;。\x%l台車;#00ffc040;台車%l;#;。ハチロクの講義で習ったことだ。\n\x%l動輪;#00ffc040;動輪%l;#;や車軸が付いている、足回り部分が即ち\x%l台車;#00ffc040;台車%l;#;。
2819 = "\\x%l台枠;#00ffc040;Khung gầm%l;#;. \\x%l台車;#00ffc040;Giá chuyển hướng%l;#;. Đó là những\nthứ tôi đã học trong bài\ngiảng của Hachiroku.\nPhần gầm bệ có gắn \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;\nvà trục xe chính là \\x%l台車;#00ffc040;giá chuyển hướng%l;#;."

# monologue
# JP: そして\x%l台枠;#00ffc040;台枠%l;#;は、車輪と車体とを繋ぎささえる、いわば床下\n――建築物で言うなら土台、基本構造となるものだ。
3057 = "Còn \\x%l台枠;#00ffc040;khung gầm%l;#; là bộ phận kết nối và nâng\nđỡ bánh xe\nvà thân xe, có thể gọi là phần dưới sàn\n――Nếu ví như một công trình kiến trúc thì\nnó là nền móng, là cấu trúc cơ bản."

# 【れいな】
# display as 玲奈
# JP: 「それは、れいな、チェックしました。\n\x%l台車;#00ffc040;台車%l;#;は、ぜぇんぜん大丈夫ですよぉ」
2290 = "「Chuyện đó, Reina đã kiểm tra rồi ạ.\n\\x%l台車;#00ffc040;Giá chuyển hướng%l;#; thì\nhoàn toàn không có vấn đề gì đâu nha~」"

# monologue
# JP: ポーレットに気をつかってか、\n大人しくいい子にしていたれいながホワン、と声を出す。
3022 = "Có lẽ vì để ý đến Paulette,\nnên Reina nãy\ngiờ vẫn ngoan ngoãn im lặng giờ mới cất\ngiọng mềm mỏng."

# 【日々姫】
# display as 日日姬
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;は？」
1689 = "「Còn \\x%l台枠;#00ffc040;khung gầm%l;#; thì sao?」"

# 【れいな】
# display as 玲奈
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;は、組んだままだと精密には検査できないですけど。\n安全に支障が出るような問題は見つけてないですぅ」
2135 = "「\\x%l台枠;#00ffc040;Khung gầm%l;#; thì, nếu để nguyên như vậy sẽ\nkhông thể\nkiểm tra kỹ lưỡng được.\nNhưng Reina không\nphát hiện ra vấn đề gì gây ảnh hưởng đến\nan toàn đâu ạ~」"

# 【日々姫】
# display as 日日姬
# JP: 「なら、さ」
2388 = "「Nếu vậy, thì.」"

# monologue
# JP: ぺろり。日々姫の舌が唇を舐める。
2924 = "Lép nhép. Đầu lưỡi Hibiki liếm môi."

# monologue
# JP: 乾燥を防ぐための動きと理解してなお、\n心の隅が、どきりとざわめく。
2814 = "Dù hiểu rằng hành động đó chỉ là để chống\nkhô môi,\nnhưng một góc trong tim tôi vẫn\nkhẽ đập thình thịch."

# 【日々姫】
# display as 日日姬
# JP: 「――本当に思いつきなんだけど。\nダメモトで、アイディア、ひとつ聞いて欲しいの」
1714 = "「――Chỉ là em chợt nghĩ ra thôi.\nCứ coi như\nlà không được đi, em muốn mọi người nghe\nthử một ý tưởng.」"

# monologue
# JP: (カポーーン)
31 = "(Cộc)"

# monologue
# JP: 湯船に浸かって、少し驚く。\n疲れを、深くは感じていない。
2803 = "Ngâm mình trong bồn tắm, tôi hơi ngạc\nnhiên.\nTôi không cảm thấy quá mệt mỏi."

# monologue
# JP: 無論、凝りや痛みはあるのだが、\nぐったりと沈み込むような感覚がない。
3154 = "Tất nhiên là có ê ẩm và đau nhức,\nnhưng\nkhông có cảm giác rã rời đến mức chìm\nnghỉm."

# monologue
# JP: （体が、少しずつ出来てきたということか）
3240 = "（Có nghĩa là cơ thể mình đã dần dần thích\nnghi rồi sao.）"

# monologue
# JP: 特段、筋肉などがついたようには思わない。\n元からそれなりに鍛えていた故、体が絞れた気もしない。
3062 = "Tôi không nghĩ là cơ bắp của mình có gì\nđặc biệt thay đổi.\nVì vốn dĩ tôi cũng đã\nrèn luyện khá nhiều rồi, nên cũng không có\ncảm giác cơ thể săn chắc hơn."

# monologue
# JP: が――見えない部分で、確かな変化はあるのだろう。\nそう考えれば、自分の体を不思議なもののように感じる。
2663 = "Nhưng――Chắc hẳn ở những phần không nhìn\nthấy được, đã có sự thay đổi rõ rệt.\nNghĩ\nvậy, tôi bỗng cảm thấy cơ thể mình thật kỳ\ndiệu."

# 【日々姫】
# display as 日日姬
# JP: 「なら、\x%l台枠;#00ffc040;台枠%l;#;がダメって可能性もあっと？」
1688 = "「Vậy là, cũng có khả năng \\x%l台枠;#00ffc040;khung gầm%l;#; bị\nhỏng sao?」"

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。\x%l台枠;#00ffc040;台枠%l;#;は頑丈ですから、\n乗り心地とかに影響あんまりでないのですよぉ」
2227 = "「Đúng vậy nha~. Vì \\x%l台枠;#00ffc040;khung gầm%l;#; rất chắc\nchắn,\nnên\ncũng không ảnh hưởng nhiều đến cảm giác\nkhi đi tàu đâu ạ~」"

# 【ハチロク】
# display as 八六
# JP: 「耐えに耐え、ある瞬間にいきなりバキリ。そういう\n故障をするものですから、見てみるまではわかりません」
2108 = "「Nó sẽ chịu đựng cho đến một khoảnh khắc\nnào đó rồi đột nhiên gãy gập.\nĐó là kiểu\nhỏng hóc như vậy, nên phải xem xét kỹ mới\nbiết được ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「そっかぁ」
# 2370 = "「這樣啊」" 

# monologue
# JP: ……湯船の向こう端では、会議。
1675 = "……Ở phía bên kia bồn tắm, một cuộc họp\nđang diễn ra."

# monologue
# JP: 風呂の時間に至ってもまだ、\n風呂に入ってさえもなお、終わる気配は見えないようだ。
2694 = "Đến tận giờ tắm rồi mà,\nthậm chí là đang\nngâm mình trong bồn tắm, vẫn chưa có dấu\nhiệu gì là sẽ kết thúc."

# monologue
# JP: （……日々姫の体も、変化をしてきているのだろうか）
3175 = "（……Cơ thể Hibiki, liệu cũng đang thay đổi\nchăng.）"

# monologue
# JP: 気になる。\nから見る。
2800 = "Tò mò quá.\nNên tôi nhìn thử."

# 【双鉄】
# display as 雙鐵
# JP: 「む……」
# 2073 = "「嗯……」" 

# monologue
# JP: “丸み”と思う。\n真っ先に。
3045 = "“Tròn trịa”.\nĐó là suy nghĩ đầu tiên."

# monologue
# JP: 日々姫はああ見えて文武両道。\n幼い頃は、引き締まった体をしていたものだったが――
2907 = "Hibiki trông thế thôi chứ văn võ song toàn\nđấy.\nHồi nhỏ, cơ thể em ấy rất săn chắc,\nnhưng mà――"

# monologue
# JP: （緩んだのか？　いや――）
3238 = "（Bị nhão ra rồi sao? Không――）"

# monologue
# JP: 話し合いが勢いづけば、\n日々姫の手が大きく動く。
2928 = "Khi cuộc thảo luận trở nên sôi nổi,\ntay\nHibiki vung vẩy liên hồi."

# monologue
# JP: 手首から肩、肩周りまで、肉はわずかも緩んでいない。\n幼いころより、さらに引き絞られた感さえもある。
2702 = "Từ cổ tay đến vai, xung quanh vai, thịt\nkhông hề bị nhão chút nào.\nThậm chí còn có\ncảm giác săn chắc hơn cả hồi nhỏ."

# monologue
# JP: （なのに……丸い……な）
3208 = "（Thế mà……tròn thật……nhỉ.）"

# monologue
# JP: 胸が、丸い。
3072 = "Ngực, tròn."

# monologue
# JP: 丸いというほど大きくはなく、\n曲線は極めて控えめなのだが――それでも丸い。
2723 = "Không to đến mức gọi là tròn,\nđường cong\ncực kỳ khiêm tốn――nhưng vẫn tròn."

# monologue
# JP: （なるほど、これが――\n女の体の丸み……であるのか）
3242 = "（Ra là vậy, đây là――\nsự tròn trịa của cơ\nthể phụ nữ……sao.）"

# monologue
# JP: 妹は、路子は――\nそんなものを帯びるほどには生きれなかった。
2806 = "Em gái tôi, Michiko――\nđã không thể sống\nđến lúc mang trên mình thứ đó."

# monologue
# JP: 母には女の丸みがあった筈だが、\nあまりはっきり覚えていない。
2952 = "Mẹ tôi chắc hẳn cũng có sự tròn trịa của\nphụ nữ,\nnhưng tôi không nhớ rõ lắm."

# monologue
# JP: （……綺麗なものだな）
3178 = "（……Đẹp thật đấy.）"

# monologue
# JP: 日々姫は静かに湯につかっている。\nだから、曲線を正確に追える。
2902 = "Hibiki đang lặng lẽ ngâm mình trong bồn\nnước nóng.\nVì thế, tôi có thể theo dõi\nchính xác từng đường cong."

# monologue
# JP: 体の脇はひらべったいのに、\n胸の形が描き出す影は、ほのかな丸みを帯びてる。
3076 = "Mặc dù hai bên sườn phẳng lì,\nnhưng bóng\ndáng tạo ra từ hình dạng bầu ngực lại mang\nmột vẻ tròn trịa nhàn nhạt."

# 【日々姫】
# display as 日日姬
# JP: 「……っ」
1731 = "「……」"

# monologue
# JP: 胸の上、鎖骨とともに真っ白な喉が上下する。\nまるでツバでも飲んだみたいに――っ！
3073 = "Bên trên bầu ngực, yết hầu trắng ngần cùng\nxương quai xanh chuyển động lên xuống.\nCứ\nnhư thể em ấy vừa nuốt nước bọt vậy――!"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2400 = "「!!?」"

# monologue
# JP: 目が合った。
2680 = "Bốn mắt chạm nhau."

# monologue
# JP: 心臓がばくん！　と跳ね上がり、\nあわてて視線をそむけて湯を取り顔を洗う。
2767 = "Tim tôi đập thình thịch! \nTôi vội vàng\nquay đi, vớt nước rửa mặt."

# monologue
# JP: （ザバザバザバザバっ！）
3213 = "（Ào ào ào ào!）"

# 【双鉄】
# display as 雙鐵
# JP: 「なん、だ――今のは」
2178 = "「Gì, vậy――Vừa rồi là sao.」"

# monologue
# JP: 単なる驚き、とは違う。
3137 = "Không chỉ đơn thuần là sự kinh ngạc."

# monologue
# JP: 体がカっと熱くなり、\n全身の血が、酒に変わったようだった。
3110 = "Cơ thể bỗng chốc nóng ran,\nmáu toàn thân\nnhư biến thành rượu vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「……バカな、酒など[ひとしずく,1]一滴もいれておらんのに」
1738 = "「……Vớ vẩn, mình chưa uống lấy một giọt\nrượu nào cơ mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「どうしたんですか？」
2130 = "「Anh sao vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットか」
2220 = "「Là Paulette à.」"

# monologue
# JP: 湯が揺れる。\n僕の隣に、ポーレットの体が滑りこんでくる。
2956 = "Mặt nước dao động.\nCơ thể Paulette trượt\nvào bên cạnh tôi."

# monologue
# JP: 洗い終わったばかりなのだろう、\n髪の金色が濃くなって、滴をきらきらまとわせている。
2715 = "Chắc là em ấy vừa mới gội đầu xong,\nmái\ntóc vàng óng trở nên sậm màu hơn, lấp lánh\nnhững giọt nước đọng lại."

# 【ポーレット】
# display as 波萊特
# JP: 「日々姫ちゃんたち、熱心に会議してるのに。\n混じらないんですか？」
2204 = "「Bọn Hibiki đang họp say sưa thế kia.\nAnh\nkhông tham gia cùng sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ――」
2063 = "「A, ừm――」"

# monologue
# JP: 言われてみれば、不思議に思う。\nなんとなく、日々姫から距離をおいてしまったが――いや。
3048 = "Nghe em ấy nói vậy, tôi cũng thấy lạ.\nKhông hiểu sao tôi lại giữ khoảng cách với\nHibiki――À không."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は、甘えたくないと言っていたのだ」
2205 = "「Hibiki đã nói là không muốn nhõng nhẽo\nmà.」"

# monologue
# JP: 理由を探して思い当たれば、\nなにやら無性に安心できる。
2843 = "Khi tìm kiếm lý do và chợt nhận ra điều\nđó,\ntôi bỗng cảm thấy vô cùng an tâm."

# 【双鉄】
# display as 雙鐵
# JP: 「僕があれこれ口を出すのは、\n日々姫のそうした思いに反してしまうかと思ってな」
2167 = "「Anh nghĩ nếu anh xen vào chuyện này\nchuyện kia,\nthì sẽ đi ngược lại với suy\nnghĩ đó của Hibiki mất.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですか」
# 2370 = "「這樣啊」" 

# monologue
# JP: 理解、してくれたようにも聞こえ、\n疑問を、ぶつけられたようにも聞こえる。
2707 = "Nghe như thể em ấy đã hiểu,\nlại cũng giống\nnhư đang đặt ra một câu hỏi."

# monologue
# JP: 少し戸惑うポーレットを見て、\nああ、丸いな、とやはり感じる。
2808 = "Nhìn Paulette có vẻ hơi bối rối,\ntôi lại\ncảm thấy, a, tròn thật đấy."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？」
2395 = "「Anh Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや――すまん、少し目をとられた」
2062 = "「A, không――Xin lỗi, anh hơi bị phân tâm\nmột chút.」"

# 【ポーレット】
# display as 波萊特
# JP: 「目、って」
2315 = "「Phân tâm, á.」"

# monologue
# JP: 驚いたようにポーレットがいい、\n両手で自分の胸を隠す。
2975 = "Paulette ngạc nhiên thốt lên,\nrồi dùng hai\ntay che ngực lại."

# monologue
# JP: けれどもすぐにゆるゆると、\n肌を隠していた腕が、所在なさげにほどかれていく。
2667 = "Nhưng rồi ngay lập tức, một cách chậm rãi,\nđôi cánh tay đang che giấu làn da ấy dần\nbuông thõng xuống một cách lúng túng."

# 【ポーレット】
# display as 波萊特
# JP: 「ええと……私が目を奪えたなら……\nそれって、正直、嬉しいです」
2381 = "「À ừm……Nếu em có thể thu hút được ánh nhìn\ncủa anh……\nThì nói thật là, em rất vui.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
# 2218 = "「是嗎？」" 

# monologue
# JP: 見てもいい、と実質言ってくれている。\nならばと遠慮会釈なく見る。
2705 = "Thực chất là em ấy đang nói tôi có thể\nnhìn.\nNếu vậy thì tôi cũng chẳng khách sáo\nmà nhìn luôn."

# monologue
# JP: （ふむ――）
3211 = "（Ưm――）"

# monologue
# JP: 日々姫のものより成熟している……\nこれは、はっきり女性の体といえるだろう。
3031 = "Trưởng thành hơn của Hibiki……\nĐây rõ ràng\nlà cơ thể của một người phụ nữ."

# monologue
# JP: 胸の膨らみもまさに文字通りの丸みを帯びて、\n腰回りにも、過不足の無い肉が付いている。
2710 = "Bầu ngực căng tròn đúng nghĩa đen,\nvòng eo\ncũng đầy đặn, không thừa không thiếu."

# 【双鉄】
# display as 雙鐵
# JP: 「立派……といえば誤解を招くか。\nとても、女性らしい綺麗な体であると思う」
1936 = "「Tuyệt vời……nói vậy thì dễ gây hiểu lầm\nnhỉ.\nAnh nghĩ em có một cơ thể rất đẹp,\nrất nữ tính.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ええと……あの……ありがとう、ございます」
2044 = "「À ừm……Dạ……Cảm ơn anh.」"

# monologue
# JP: 湯船の中でもじもじと、ポーレットの太ももが\nこすりあわせるようにして動く。
2978 = "Bên trong bồn tắm, hai đùi của Paulette\ncọ\nxát vào nhau một cách ngượng ngùng."

# monologue
# JP: （……ポーレットの体であれば、\n妊娠して、出産するに十分な成熟であるのだろうな）
3177 = "（……Nếu là cơ thể của Paulette,\nchắc hẳn đã\nđủ trưởng thành để mang thai và sinh con\nrồi nhỉ.）"

# monologue
# JP: 僕は成熟した雄で、ポーレットは成熟した雌だ。\nそして僕らは、手を伸ばせば届く距離にいる。
2798 = "Tôi là một con đực trưởng thành, còn\nPaulette là một con cái trưởng thành.\nVà\nchúng tôi đang ở khoảng cách chỉ cần vươn\ntay là tới."

# monologue
# JP: だというのに、体がカっと熱くならない、\n血に濃い酒が混じってこないというのなら――
2608 = "Thế mà cơ thể tôi lại không nóng bừng lên,\nmáu cũng không bị pha lẫn với rượu đặc――"

# monologue
# JP: （さっきのアレは、\n話に聞く発情というものとは違うのか）
3234 = "（Vậy ra cái cảm giác lúc nãy,\nkhông phải\nlà thứ gọi là động dục như người ta hay\nnói sao.）"

# monologue
# JP: ならば、何かと――\n思えばようやく、僕は答えに行き当たる。
3142 = "Nếu vậy, thì là gì――\nSuy nghĩ một hồi,\ncuối cùng tôi cũng tìm ra câu trả lời."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか！　年頃の兄妹だからか」
2115 = "「Ra là vậy! Là vì anh em đang ở tuổi cập\nkê sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　え？　なにが、年頃の兄妹だから――\nなんですか？」
2049 = "「Hả!? Ơ? Cái gì, vì anh em đang ở tuổi cập\nkê――\nlà sao cơ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「以前、日々姫が言っていたのだ。\n『年頃の兄妹だから、一緒に風呂は恥ずかしい』のだと」
2201 = "「Trước đây, Hibiki từng nói thế này.\n『Vì\nlà anh em đang tuổi cập kê, nên tắm chung\nthì ngại lắm』」"

# 【ポーレット】
# display as 波萊特
# JP: 「？　？　？」
2410 = "「? ? ?」"

# monologue
# JP: キツネ――というより、\nむしろタヌキにつままれたようなポーレットの顔。
2980 = "Khuôn mặt Paulette ngơ ngác như thể\nbị\ncáo――à không, bị lừa gạt vậy."

# monologue
# JP: 真相に行き当たったという喜びが、\n僕の唇をなめらかにする。
2845 = "Niềm vui sướng khi tìm ra chân tướng,\nkhiến môi tôi trơn tru nói ra những lời\ntiếp theo."

# 【双鉄】
# display as 雙鐵
# JP: 「いやな？　先ほど――」
2236 = "「Không phải sao? Vừa nãy――」"

# monologue
# JP: 日々姫の肌の丸みを見、日々姫と目が合い\n全身の血に酒が混じってしまったこと。
2789 = "Tôi đã kể cho em ấy nghe chuyện khi nhìn\nthấy sự tròn trịa của làn da Hibiki, khi\nánh mắt chạm nhau với Hibiki,\nmáu toàn\nthân tôi như bị pha lẫn với rượu."

# monologue
# JP: しかし、ポーレットの肌の丸みを間近に見ても、\nその現象は起きなかったと、言葉を重ねる。
2666 = "Tuy nhiên, dù nhìn thấy sự tròn trịa của\nlàn da Paulette ở cự ly gần,\nhiện tượng đó\nlại không xảy ra, tôi tiếp tục giải thích."

# 【双鉄】
# display as 雙鐵
# JP: 「――つまり、血が熱くなった現象こそは、\n日々姫の言っていた、『年頃の兄妹だから――』うむ？」
1708 = "「――Nói cách khác, hiện tượng máu nóng lên\nđó,\nchính là điều mà Hibiki đã nói, 『Vì là\nanh em đang tuổi cập kê――』 ưm?」"

# monologue
# JP: 土左衛門。\nその四文字が頭に浮かぶ。
2826 = "Xác chết trôi.\nBốn chữ đó chợt lóe lên\ntrong đầu tôi."

# monologue
# JP: ポーレットは両手を大きく伸ばしつっぱり、\nその体勢のままで前へと、湯船に倒れ伏している。
2976 = "Paulette vươn thẳng hai tay ra trước,\nvà\ncứ giữ nguyên tư thế đó ngã sấp mặt xuống\nbồn tắm."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット？　そのままだと溺死するぞ」
2276 = "「Paulette? Cứ thế này là em chết đuối\nđấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ぼぼべべぶぼば、ぼーべぶぶぶば　ばびべぶば」
2070 = "「Bục bục bục bục bục, bục bục bục bục bục\nbục bục bục bục」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぶぼば？」
2071 = "「Bục bục bục?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ぷはっ！」
2047 = "「Phụt!」"

# monologue
# JP: 湯船からやにわに体を起こし、\nポーレットはこほこほ軽く咳き込んで。
2981 = "Đột ngột nhổm người dậy khỏi bồn tắm,\nPaulette khẽ ho vài tiếng khù khụ."

# monologue
# JP: それからじっと青い目で――\nうらめしそうに、面白そうに、なんとも微妙に僕を見る。
3008 = "Sau đó, em ấy chằm chằm nhìn tôi bằng đôi\nmắt xanh biếc――\nÁnh nhìn vừa như oán\ntrách, vừa như thích thú, một cảm giác vô\ncùng khó tả."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
2391 = "「Anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2078 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「年頃の兄妹だからうんぬんは、\nバツです、間違い。誤答で、０点です」
1725 = "「Cái vụ vì là anh em đang tuổi cập kê gì\ngì đó,\nlà sai bét, sai hoàn toàn. Trả lời\nsai, 0 điểm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「０点か」
2401 = "「0 điểm sao.」"

# monologue
# JP: あまりに厳しい採点に、突き放されたような気になる。
2636 = "Sự chấm điểm quá đỗi nghiêm khắc khiến tôi\ncó cảm giác như bị hắt hủi."

# monologue
# JP: が、だ。それはつまり、\nポーレットは答えを知っているということになる。
2560 = "Nhưng, mà. Điều đó cũng có nghĩa là,\nPaulette biết câu trả lời."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ポーレット」
2273 = "「Nếu vậy thì, Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「想像して？　双鉄くん。\nほころんでいるバラのつぼみを」
2393 = "「Tưởng tượng đi nào? Anh Soutetsu.\nMột nụ\nhồng đang hé nở.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お、おう」
2056 = "「À, ừ.」"

# monologue
# JP: 何故だろう。\n今ここにいるポーレットには、ただごとならぬ迫力がある。
2552 = "Không hiểu sao.\nPaulette hiện tại đang ở\nđây lại toát ra một khí thế vô cùng áp\nđảo."

# monologue
# JP: 僕は、黙って従うしかない。
2782 = "Tôi chỉ biết ngoan ngoãn nghe theo."

# 【ポーレット】
# display as 波萊特
# JP: 「ほころんでいるバラのつぼみは、\n明日にも自然に咲きそうです」
2285 = "「Nụ hồng đang hé nở,\ncó vẻ như ngày mai sẽ\ntự nhiên nở rộ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2078 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「『早く咲け』って、そこに水や肥料を与えちゃうのは\n――正解ですか？　間違いですか？」
2139 = "「Nếu cứ giục 『Nở nhanh lên』, rồi tưới nước\nbón phân cho nó\n――Là đúng? Hay là sai?」"

# 【双鉄】
# display as 雙鐵
# JP: 「明日にも自然と咲くものならば、間違いだ。\n余計なことで、つぼみを落としてしまいかねない」
2104 = "「Nếu ngày mai nó sẽ tự nhiên nở rộ thì là\nsai rồi.\nLàm những việc thừa thãi, có khi\nlại làm rụng luôn cả nụ hoa mất.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そう。だからわたし、\n双鉄くんには、今は何も言ってあげられない」
2259 = "「Đúng vậy. Thế nên em,\nbây giờ không thể\nnói gì với anh Soutetsu được cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふ……む」
# 2073 = "「嗯……」" 

# monologue
# JP: 正直、意味はわからない。
3101 = "Thú thực, tôi chẳng hiểu ý em ấy là gì."

# monologue
# JP: が――目を見れば、\n思いやられていることくらいは、はっきりわかる。
2559 = "Nhưng――Nhìn vào mắt em ấy,\nít nhất tôi\ncũng hiểu rõ ràng rằng em ấy đang quan tâm\nđến tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「なにやら……すまん、いや――\nありがとう、ポーレット」
2143 = "「Có vẻ như……Xin lỗi em, à không――\nCảm ơn\nem, Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「いいってことです。\n[わたしたちのなか,3]幼なじみじゃないですか」
2254 = "「Không có gì đâu ạ.\nChúng ta là [bạn thanh\nmai trúc mã,3]bạn từ thuở nhỏ mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2078 = "「嗯」" 

# monologue
# JP: “私達の仲”という一言に、\n言葉以上の何かを感じたような気がして。
3049 = "「Không có gì đâu ạ.\nChúng ta là [bạn thanh\nmai trúc mã,3]bạn từ thuở nhỏ mà.」"

# monologue
# JP: けれどもそれを確かめるのは、\nひどく失礼なような気がして、些か戸惑う。
2580 = "Chỉ một câu “Mối quan hệ của chúng ta”,\nnhưng tôi lại cảm nhận được điều gì đó\nvượt xa ý nghĩa của câu nói ấy."

# 【ポーレット】
# display as 波萊特
# JP: 「ね？　双鉄くん。\nもし、バラの花が綺麗に咲いて」
2394 = "「Nhé? Anh Soutetsu.\nNếu như, đóa hồng nở\nrộ xinh đẹp.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2060 = "「啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その後に悩むようなことがあったら、何でも聞いてね？\nわたし、教えてあげるから」
2102 = "「Sau đó mà có chuyện gì phiền muộn, thì cứ\nhỏi em bất cứ điều gì nhé?\nEm sẽ chỉ cho\nanh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「心強いな。ありがとう」
2243 = "「An tâm thật đấy. Cảm ơn em.」"

# 【ポーレット】
# display as 波萊特
# JP: 「けど、無いかな？\n双鉄くんが悩むとか」
1950 = "「Nhưng mà, chắc không có đâu nhỉ?\nChuyện\nanh Soutetsu phiền muộn ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいや」
2257 = "「Không đâu.」"

# monologue
# JP: 即答できる。\nなぜならば今。
2816 = "Tôi có thể trả lời ngay lập tức.\nBởi vì\nngay lúc này đây."

# monologue
# JP: ポーレットの謎かけから解放され、\n視界が広がったこの瞬間に、僕は悩みに陥ったから。
2682 = "Được giải thoát khỏi câu đố của Paulette,\ntrong khoảnh khắc tầm nhìn mở rộng này,\ntôi lại rơi vào một nỗi phiền muộn khác."

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、ポーレット。\n日々姫の、あの目つきなのだが」
2169 = "「Này, Paulette.\nÁnh mắt lúc nãy của Hibiki\nấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ、あはははははは！\nあれ、誤解！　絶対、すっごい誤解してる～っ」
2052 = "「Hả? A, a ha ha ha ha ha ha!\nCái đó, là\nhiểu lầm! Chắc chắn là em ấy đang hiểu lầm\ncực kỳ nghiêm trọng luôn~」"

# monologue
# JP: ぱしゃぱしゃ、ポーレットが楽しげに湯船を叩く。\n一叩きごと、日々姫の目はどんどんどんどん据わっていく。
2984 = "Bùm bụp, Paulette vui vẻ đập nước trong\nbồn tắm.\nMỗi một cú đập, ánh mắt của\nHibiki lại càng ngày càng trở nên sắc lẹm."

# monologue
# JP: 日々姫を挟むようにして、湯船の中のハチロクとれいなは、\nくすくすくすくす、さも楽しげに笑っている。
2735 = "Kẹp Hibiki ở giữa, Hachiroku và Reina\ntrong bồn tắm\nđang khúc khích cười, có vẻ\nrất thích thú."

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、ポーレット、あれは、その――」
2275 = "「Này, Paulette, cái đó, ừm――」"

# 【ポーレット】
# display as 波萊特
# JP: 「ダメダメ、双鉄くん。\nそこは、目一杯悩むとこ」
1948 = "「Không được không được, anh Soutetsu.\nChỗ\nđó, anh phải cố gắng tự mình vắt óc suy\nnghĩ đi.」"

# monologue
# JP: （ざばぁっ）
3212 = "（Rào rào）"

# monologue
# JP: ポーレットが軽やかに湯から出てしまう。\n同時にずんずん、日々姫が僕へと近づいてくる。
2983 = "Paulette nhẹ nhàng bước ra khỏi bồn tắm.\nCùng lúc đó, Hibiki hầm hầm tiến lại gần\ntôi."

# monologue
# JP: ずんずんずんずん――\n湯船を荒々しく波立てながら。
2988 = "Hầm hầm hầm hầm――\nTạo ra những gợn sóng dữ\ndội trong bồn tắm."

# 【日々姫】
# display as 日日姬
# JP: 「兄さん？　少しお話が」
2055 = "「Anh trai? Chúng ta nói chuyện một chút\nnhé.」"

# monologue
# JP: ああ……これは――\nそうか、映画で見たことがある。
2678 = "A……Cái này――\nĐúng rồi, tôi từng thấy trên\nphim."

# monologue
# JP: （日々姫のこの目は――\nそうだ、人喰い鮫の目だ）
3226 = "（Ánh mắt này của Hibiki――\nĐúng rồi, là ánh\nmắt của loài cá mập ăn thịt người.）"
