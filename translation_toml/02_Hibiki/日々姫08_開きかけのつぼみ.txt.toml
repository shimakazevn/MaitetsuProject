2720 = "如果太過依賴她的話，她的負擔同樣會很重——注意到這點以後，思路隨之清晰起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクとも話し合ったのだが、市長選とその後を睨み、\n日々姫の負担を軽減したいと考えている」
2148 = "「我們和八六商量過了。為市長選舉以及日後作打算，我們想減輕日日姬的負擔」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 2078 = "「嗯」" 

# monologue
# JP: 余計な言葉の混じらぬ答えが、\nその簡潔な強さが物語っている。
3047 = "簡單有力的回答反應出了她的想法。" 

# monologue
# JP: 市長職とは、\n兼職でこなせるようなものではやはり、無いのだと。
2632 = "兼職市長果然是不可行的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「端的に聞くが――\n\x%l8620;#00ffc040;8620%l;#;の\x%l機関士;#00ffc040;機関士%l;#;を僕と交代でやってはもらえないだろうか」
2155 = "「我就直接問了——你能不能和我輪著當\\x%l8620;#00ffc040;８６２０%l;#;的\\x%l機関士;#00ffc040;司機%l;#;」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええっ！？」
# 2048 = "「哎！？」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ、その手がありましたか」
2069 = "「啊，還有這個辦法」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その手、って――」
2367 = "「這個辦法是指——」" 

# monologue
# JP: 驚き顔のポーレットへと、\nハチロクが言葉をつないで送る。
2974 = "波萊特一臉驚訝。八六繼續說道。" 

# 【ハチロク】
# display as 八六
