# 【日々姫】
# display as 日日姬
# JP: 「\x%l投炭;#00ffc040;投炭%l;#;！　一分で四十五！！」
1695 = "「\\x%l投炭;#00ffc040;加煤%l;#;！一分鐘４５鏟！！」" 

# monologue
# JP: 日々姫には不意打ちに近かった指示であろうに、\n体はすぐさま反応している。
2736 = "對日日姬而言這指示本應是突如其來，但她的身體卻迅速做出反應。" 

# monologue
