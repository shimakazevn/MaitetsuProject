# 【双鉄】
# display as 雙鐵
# JP: 「わかった、日々姫」
2094 = "「好吧，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2399 = "「！」" 

# monologue
# JP: 日々姫の表情が晴れやかになる。\n僕の気持ちも、それを目にすれば晴らされる。
2656 = "只見日日姬的臉色一下子明朗了許多。我的心情也隨之舒暢起來。" 

