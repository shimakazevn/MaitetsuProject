2302 = "「目前來說，在湯醫線上，波萊特小姐的駕駛經驗和知識比雙鐵少爺更勝一籌」" 

# monologue
# JP: そう。\x%l8620;#00ffc040;8620%l;#;の運転機器の扱いにも、\nポーレットならすぐに熟達できるだろう。
2936 = "是的。而且波萊特應該很快就能熟練掌握\\x%l8620;#00ffc040;８６２０%l;#;的駕駛操作。" 

# monologue
# JP: 故、ポーレット\x%l機関士;#00ffc040;機関士%l;#;-僕が\x%l機関助士;#00ffc040;機関助士%l;#;という体制の方が、\nその逆よりもよほど楽に、よりよい結果を出せる筈だ。
2838 = "所以就由波萊特當\\x%l機関士;#00ffc040;司機%l;#;，我當\\x%l機関助士;#00ffc040;司爐%l;#;，這樣可能反而會更加輕鬆，效果也會更好。" 

# 【ポーレット】
# display as 波萊特
