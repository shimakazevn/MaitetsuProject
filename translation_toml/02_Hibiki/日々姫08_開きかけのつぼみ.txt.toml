2067 = "「啊，對啊，到時——」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。そのときにはきっと再び。\n全てはあるべき――いえ、より良い姿に収まります」
2224 = "「是的。到時一切都會回到應有的狀態——不，會變得更好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2078 = "「嗯」" 

# monologue
# JP: 僕と日々姫とハチロクと――\n生まれ変わった御一夜を、\x%l8620;#00ffc040;8620%l;#;で駆け抜ける。
2778 = "我、日日姬和八六，我們一起駕駛著\\x%l8620;#00ffc040;８６２０%l;#;駛過重生後的御一夜。" 

# monologue
# JP: その光景を現実のものとするために、\nならば僕は、さらに前だけを見据えよう。
3000 = "為了讓這番景象化為現實，我必須專注於前方。" 

# 【双鉄】
# display as 雙鐵
# JP: 「案は了解。大賛成だ。\nが、現状のままでは、その案は空疎なものとなる」
2193 = "「方案我明白了。我十分贊成。問題是現在這個方案的條件尚不齊全」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁぅ」
# 2060 = "「啊」" 

# monologue
# JP: 軽やかだったポーレットの声が寸詰まる。\nハチロクには苦笑が交じる。
2982 = "波萊特輕吟了一聲。八六見狀露出苦笑。" 

# 【ハチロク】
# display as 八六
# JP: 「その反応。\n\x%l客車;#00ffc040;客車%l;#;に関して、良いお話は聞けそうもありませんね？」
2125 = "「從你的反應來看，\\x%l客車;#00ffc040;客運車廂%l;#;那邊應該沒什麼好消息吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぅぅぅ……面目無いです」
2072 = "「嗚……對不起」" 

# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;無しでは、\x%l8620;#00ffc040;8620%l;#;の観光\x%l列車;#00ffc040;列車%l;#;化は果たせない。\nそして現状、煙害直撃の隙間\x%l客車;#00ffc040;客車%l;#;しか僕らは持たない。
3052 = "缺了\\x%l客車;#00ffc040;客運車廂%l;#;就沒辦法把\\x%l8620;#00ffc040;８６２０%l;#;打造成觀光\\x%l列車;#00ffc040;列車%l;#;。而現在我們手裡只有一輛有縫隙會進煙的\\x%l客車;#00ffc040;客運車廂%l;#;。" 

# monologue
# JP: ポーレットは、問題発生からずっと、\n何とか事態を打開するべく、動いてくれているのだが――
2570 = "事故發生之後，波萊特一直在尋找解決途徑——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……改めて聞くが、煙を防ぐ、という方向では\nなんともならんのか？」
1739 = "「……我再問一遍，沒辦法防止進煙嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「補強とは、完成されたバランスを壊す行いです。\nそして壊れたバランスは、安全性を大きく下げます」
2123 = "「強化會破壞車輛原有的平衡，從而導致車輛的安全性大幅下降」" 

# 【双鉄】
# display as 雙鐵
# JP: 「う……む」
2073 = "「嗯……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「この状況でもう一度乗車試験に失敗したら……\n選挙戦の結果も、多分、良くないものになります」
2105 = "「如果試運行再失敗……恐怕選舉也不會有好結果」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……だろうな」
1743 = "「……是啊」" 

# monologue
# JP: ならば、安全性に疑問符のつく補強改修は行えない。\nかといって、別の\x%l客車;#00ffc040;客車%l;#;の確保は困難。
3130 = "這樣一來就不能採用會帶來安全隱患的修理方案。可又很難找到其他\\x%l客車;#00ffc040;客運車廂%l;#;。" 

# monologue
# JP: その状況から抜け出せない。\n練度をどれほどあげてもこれでは、意味を成さない。
2550 = "一籌莫展。這樣下去，即使駕駛練得再好也沒有意義。" 

# 【日々姫】
# display as 日日姬
# JP: 「あの、私――\n\x%l客車;#00ffc040;客車%l;#;について、ちょっと勉強したんだけど」
2382 = "「那個，關於\\x%l客車;#00ffc040;客運車廂%l;#;，我稍微做了點功課」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫？」
# 2209 = "「日日姬？」" 

# monologue
# JP: おずおずと、挙手。\n日々姫の目は、ハチロクとれいなとを見る。
2921 = "日日姬看著八六和玲奈，戰戰兢兢地舉起了手。" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%l客車;#00ffc040;客車%l;#;って、悪いのは車体の部分だけ？\n\x%l台車;#00ffc040;台車%l;#;とか\x%l台枠;#00ffc040;台枠%l;#;には、安全性の問題とか無いの？」
2244 = "「有問題的只是\\x%l客車;#00ffc040;客運車廂%l;#;的車體部分嗎？\\x%l台車;#00ffc040;轉向架%l;#;和\\x%l台枠;#00ffc040;車架%l;#;存在安全問題嗎？」" 

# monologue
# JP: \x%l台枠;#00ffc040;台枠%l;#;。\x%l台車;#00ffc040;台車%l;#;。ハチロクの講義で習ったことだ。\n\x%l動輪;#00ffc040;動輪%l;#;や車軸が付いている、足回り部分が即ち\x%l台車;#00ffc040;台車%l;#;。
2819 = "我聽八六講解過\\x%l台枠;#00ffc040;車架%l;#;和\\x%l台車;#00ffc040;轉向架%l;#;。\\x%l台車;#00ffc040;轉向架%l;#;是支撐車輪的部分，上面裝著\\x%l動輪;#00ffc040;動輪%l;#;和車軸。" 

# monologue
# JP: そして\x%l台枠;#00ffc040;台枠%l;#;は、車輪と車体とを繋ぎささえる、いわば床下\n――建築物で言うなら土台、基本構造となるものだ。
3057 = "而\\x%l台枠;#00ffc040;車架%l;#;是連接車體和車輪，起支撐作用的部分。它相當於建築的地基、基礎。" 

# 【れいな】
# display as 玲奈
# JP: 「それは、れいな、チェックしました。\n\x%l台車;#00ffc040;台車%l;#;は、ぜぇんぜん大丈夫ですよぉ」
2290 = "「玲奈檢查過了。\\x%l台車;#00ffc040;轉向架%l;#;沒有問題」" 

# monologue
# JP: ポーレットに気をつかってか、\n大人しくいい子にしていたれいながホワン、と声を出す。
3022 = "玲奈說道。她之前一直安安靜靜地待著，也許是在顧慮波萊特吧。" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;は？」
1689 = "「\\x%l台枠;#00ffc040;車架%l;#;呢？」" 

# 【れいな】
# display as 玲奈
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;は、組んだままだと精密には検査できないですけど。\n安全に支障が出るような問題は見つけてないですぅ」
2135 = "「想做精密檢查的話需要把\\x%l台枠;#00ffc040;車架%l;#;拆下來，不過目前玲奈沒有發現安全問題」" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、さ」
2388 = "「那麼」" 

# monologue
# JP: ぺろり。日々姫の舌が唇を舐める。
2924 = "日日姬舔了一下嘴唇。" 

# monologue
# JP: 乾燥を防ぐための動きと理解してなお、\n心の隅が、どきりとざわめく。
2814 = "我知道這只是為了防止嘴唇乾燥，但我心中的某個角落還是驚起了一陣躁動。" 

# 【日々姫】
# display as 日日姬
# JP: 「――本当に思いつきなんだけど。\nダメモトで、アイディア、ひとつ聞いて欲しいの」
1714 = "「——我突然想到一個主意，如果實在沒有別的方案的話，你們不妨聽聽看」" 

# monologue
# JP: (カポーーン)
31 = "(哐)" 

# monologue
# JP: 湯船に浸かって、少し驚く。\n疲れを、深くは感じていない。
2803 = "我泡入水中。並沒有像之前那樣感到一身疲勞，這讓我稍稍有些吃驚。" 

# monologue
# JP: 無論、凝りや痛みはあるのだが、\nぐったりと沈み込むような感覚がない。
3154 = "雖然少不了酸痛，卻並沒有乏力感。" 

# monologue
# JP: （体が、少しずつ出来てきたということか）
3240 = "（身體正在逐漸適應）" 

# monologue
# JP: 特段、筋肉などがついたようには思わない。\n元からそれなりに鍛えていた故、体が絞れた気もしない。
3062 = "肌肉沒什麼大變化。因為我本來就有鍛鍊，所以體型也沒怎麼變。" 

# monologue
# JP: が――見えない部分で、確かな変化はあるのだろう。\nそう考えれば、自分の体を不思議なもののように感じる。
2663 = "可是，看不見的地方確確實實發生了變化。這樣想來，身體還真是奇妙。" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、\x%l台枠;#00ffc040;台枠%l;#;がダメって可能性もあっと？」
1688 = "「\\x%l台枠;#00ffc040;車架%l;#;可能不行？」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。\x%l台枠;#00ffc040;台枠%l;#;は頑丈ですから、\n乗り心地とかに影響あんまりでないのですよぉ」
2227 = "「是的。因為\\x%l台枠;#00ffc040;車架%l;#;很堅固，所以坐在上面的時候感覺不到什麼問題」" 

# 【ハチロク】
# display as 八六
# JP: 「耐えに耐え、ある瞬間にいきなりバキリ。そういう\n故障をするものですから、見てみるまではわかりません」
2108 = "「它會一直默默忍受，然後突然壞掉。必須要檢查一下才知道有沒有問題」" 

# 【日々姫】
# display as 日日姬
# JP: 「そっかぁ」
# 2370 = "「這樣啊」" 

# monologue
# JP: ……湯船の向こう端では、会議。
1675 = "……浴池的另一邊正在舉行會議。" 

# monologue
# JP: 風呂の時間に至ってもまだ、\n風呂に入ってさえもなお、終わる気配は見えないようだ。
2694 = "她們一直在討論，討論到了洗澡時間，並且進了浴室還在繼續討論。" 

# monologue
# JP: （……日々姫の体も、変化をしてきているのだろうか）
3175 = "（……日日姬的身體也發生了變化嗎）" 

# monologue
# JP: 気になる。\nから見る。
2800 = "我有些在意，於是看向了她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「む……」
# 2073 = "「嗯……」" 

# monologue
# JP: “丸み”と思う。\n真っ先に。
3045 = "第一印象是“圓潤”。" 

# monologue
# JP: 日々姫はああ見えて文武両道。\n幼い頃は、引き締まった体をしていたものだったが――
2907 = "日日姬文武雙全，她從小時候起身體就非常結實——" 

# monologue
# JP: （緩んだのか？　いや――）
3238 = "（變鬆垮了？不——）" 

# monologue
# JP: 話し合いが勢いづけば、\n日々姫の手が大きく動く。
2928 = "日日姬講得興奮，她揮動起手。" 

# monologue
# JP: 手首から肩、肩周りまで、肉はわずかも緩んでいない。\n幼いころより、さらに引き絞られた感さえもある。
2702 = "她的手臂與肩膀沒有絲毫鬆垮，甚至讓人感覺比小時候更結實了。" 

# monologue
# JP: （なのに……丸い……な）
3208 = "（可卻……圓圓的……）" 

# monologue
# JP: 胸が、丸い。
3072 = "胸很圓。" 

# monologue
# JP: 丸いというほど大きくはなく、\n曲線は極めて控えめなのだが――それでも丸い。
2723 = "它的大小不大，弧度也很平緩——可就是有種很圓的感覺。" 

# monologue
# JP: （なるほど、これが――\n女の体の丸み……であるのか）
3242 = "（這就是女性身體特有的圓潤……）" 

# monologue
# JP: 妹は、路子は――\nそんなものを帯びるほどには生きれなかった。
2806 = "我的妹妹路子在身體產生變化之前就撒手人寰了。" 

# monologue
# JP: 母には女の丸みがあった筈だが、\nあまりはっきり覚えていない。
2952 = "母親應該有這種圓潤，但我記不太清了。" 

# monologue
# JP: （……綺麗なものだな）
3178 = "（……真漂亮）" 

# monologue
# JP: 日々姫は静かに湯につかっている。\nだから、曲線を正確に追える。
2902 = "日日姬安靜地泡在水中。這正好便於我仔細觀察曲線。" 

# monologue
# JP: 体の脇はひらべったいのに、\n胸の形が描き出す影は、ほのかな丸みを帯びてる。
3076 = "腋下附近明明這麼平，胸部的輪廓卻帶著幾分圓潤。" 

# 【日々姫】
# display as 日日姬
# JP: 「……っ」
1731 = "「……」" 

# monologue
# JP: 胸の上、鎖骨とともに真っ白な喉が上下する。\nまるでツバでも飲んだみたいに――っ！
3073 = "胸部上方，鎖骨和白皙的喉嚨一起起伏。就好像在咽口水——！" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2400 = "「！！？」" 

# monologue
# JP: 目が合った。
2680 = "四目相對。" 

# monologue
# JP: 心臓がばくん！　と跳ね上がり、\nあわてて視線をそむけて湯を取り顔を洗う。
2767 = "心臟猛地一震！我趕緊錯開視線用水洗臉。" 

# monologue
# JP: （ザバザバザバザバっ！）
3213 = "（嘩嘩嘩！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「なん、だ――今のは」
2178 = "「我這是怎麼了」" 

# monologue
# JP: 単なる驚き、とは違う。
3137 = "這種感覺不只是驚訝。" 

# monologue
# JP: 体がカっと熱くなり、\n全身の血が、酒に変わったようだった。
3110 = "身體一下子發熱。渾身上下的血就好像變成了酒一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……バカな、酒など[ひとしずく,1]一滴もいれておらんのに」
1738 = "「……怎麼可能，我又沒有喝酒」" 

# 【ポーレット】
# display as 波萊特
# JP: 「どうしたんですか？」
2130 = "「怎麼了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットか」
2220 = "「是波萊特啊」" 

# monologue
# JP: 湯が揺れる。\n僕の隣に、ポーレットの体が滑りこんでくる。
2956 = "水面一陣起伏。波萊特來到我旁邊。" 

# monologue
# JP: 洗い終わったばかりなのだろう、\n髪の金色が濃くなって、滴をきらきらまとわせている。
2715 = "她那或許剛洗過的頭髮掛滿水珠，散發出強烈的金色光彩。" 

# 【ポーレット】
# display as 波萊特
# JP: 「日々姫ちゃんたち、熱心に会議してるのに。\n混じらないんですか？」
2204 = "「日日姬她們討論得這麼火熱。你不參與進去嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ――」
2063 = "「啊，嗯——」" 

# monologue
# JP: 言われてみれば、不思議に思う。\nなんとなく、日々姫から距離をおいてしまったが――いや。
3048 = "經她這麼一說，我也感到奇怪。我無意中和日日姬拉開了距離——不。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は、甘えたくないと言っていたのだ」
2205 = "「日日姬說她不想依賴我」" 

# monologue
# JP: 理由を探して思い当たれば、\nなにやら無性に安心できる。
2843 = "找到原因之後，我的心一下子安了下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕があれこれ口を出すのは、\n日々姫のそうした思いに反してしまうかと思ってな」
2167 = "「我覺得如果我去插嘴，就可能會違背她的想法」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですか」
# 2370 = "「這樣啊」" 

# monologue
# JP: 理解、してくれたようにも聞こえ、\n疑問を、ぶつけられたようにも聞こえる。
2707 = "她的話像是在表示理解，又像是在發出疑問。" 

# monologue
# JP: 少し戸惑うポーレットを見て、\nああ、丸いな、とやはり感じる。
2808 = "我看向有些疑惑的波萊特。啊，果然好圓。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？」
2395 = "「雙鐵君？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや――すまん、少し目をとられた」
2062 = "「啊，不——抱歉，眼睛有些被吸引過去了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「目、って」
2315 = "「眼睛」" 

# monologue
# JP: 驚いたようにポーレットがいい、\n両手で自分の胸を隠す。
2975 = "波萊特一驚，她用雙手遮住自己的胸。" 

# monologue
# JP: けれどもすぐにゆるゆると、\n肌を隠していた腕が、所在なさげにほどかれていく。
2667 = "可沒過一會，她的手無所適從地慢慢鬆開。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええと……私が目を奪えたなら……\nそれって、正直、嬉しいです」
2381 = "「那個……視線被我吸引……說實話，我很開心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
# 2218 = "「是嗎？」" 

# monologue
# JP: 見てもいい、と実質言ってくれている。\nならばと遠慮会釈なく見る。
2705 = "她的言下之意是看也沒關係。那我就不客氣地看了。" 

# monologue
# JP: （ふむ――）
3211 = "（嗯——）" 

# monologue
# JP: 日々姫のものより成熟している……\nこれは、はっきり女性の体といえるだろう。
3031 = "發育得比日日姬要好……這無疑是成熟的女性身體。" 

# monologue
# JP: 胸の膨らみもまさに文字通りの丸みを帯びて、\n腰回りにも、過不足の無い肉が付いている。
2710 = "她胸前的隆起非常豐滿，腰部的肉不多不少。" 

# 【双鉄】
# display as 雙鐵
# JP: 「立派……といえば誤解を招くか。\nとても、女性らしい綺麗な体であると思う」
1936 = "「不得了……這麼說可能會造成誤解。我是說你的身體很有女人味，非常美」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええと……あの……ありがとう、ございます」
2044 = "「呃……那個……謝謝」" 

# monologue
# JP: 湯船の中でもじもじと、ポーレットの太ももが\nこすりあわせるようにして動く。
2978 = "波萊特在水中扭扭捏捏，她的大腿互相蹭來蹭去。" 

# monologue
# JP: （……ポーレットの体であれば、\n妊娠して、出産するに十分な成熟であるのだろうな）
3177 = "（……波萊特的身體已經成熟到可以懷孕生子了吧）" 

# monologue
# JP: 僕は成熟した雄で、ポーレットは成熟した雌だ。\nそして僕らは、手を伸ばせば届く距離にいる。
2798 = "我是成熟的男性，波萊特是成熟的女性。我們之間的距離觸手可及。" 

# monologue
# JP: だというのに、体がカっと熱くならない、\n血に濃い酒が混じってこないというのなら――
2608 = "儘管如此，我的身體卻沒有發熱，也沒那種血液中含有高濃度酒精的感覺。" 

# monologue
# JP: （さっきのアレは、\n話に聞く発情というものとは違うのか）
3234 = "（看來剛才那種感覺不是所謂的發情）" 

# monologue
# JP: ならば、何かと――\n思えばようやく、僕は答えに行き当たる。
3142 = "那到底是——一番思考之後，我終於想到了答案。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか！　年頃の兄妹だからか」
2115 = "「對啊！兄妹到了一定的年齡就會這樣」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　え？　なにが、年頃の兄妹だから――\nなんですか？」
2049 = "「哎！？哎？兄妹到了一定的年齡怎麼了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「以前、日々姫が言っていたのだ。\n『年頃の兄妹だから、一緒に風呂は恥ずかしい』のだと」
2201 = "「日日姬之前說過，兄妹到了一定的年齡，一起洗澡會不好意思」" 

# 【ポーレット】
# display as 波萊特
# JP: 「？　？　？」
2410 = "「？？？」" 

# monologue
# JP: キツネ――というより、\nむしろタヌキにつままれたようなポーレットの顔。
2980 = "波萊特滿臉詫異。" 

# monologue
# JP: 真相に行き当たったという喜びが、\n僕の唇をなめらかにする。
2845 = "找到答案後我十分欣喜。我忍不住開始說了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いやな？　先ほど――」
2236 = "「是這樣的，剛才——」" 

# monologue
# JP: 日々姫の肌の丸みを見、日々姫と目が合い\n全身の血に酒が混じってしまったこと。
2789 = "我對她說，剛才我看到日日姬那圓潤的身材，和她四目相對後渾身發熱。" 

# monologue
# JP: しかし、ポーレットの肌の丸みを間近に見ても、\nその現象は起きなかったと、言葉を重ねる。
2666 = "可是，近距離看波萊特的身體卻沒有引發相同的現象。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――つまり、血が熱くなった現象こそは、\n日々姫の言っていた、『年頃の兄妹だから――』うむ？」
1708 = "「——也就是說，身體會發熱就是因為日日姬說過的“兄妹到了一定的年齡——”嗯？」" 

# monologue
# JP: 土左衛門。\nその四文字が頭に浮かぶ。
2826 = "我腦海中浮現出“浮屍”二字。" 

# monologue
# JP: ポーレットは両手を大きく伸ばしつっぱり、\nその体勢のままで前へと、湯船に倒れ伏している。
2976 = "波萊特兩手大張向前傾倒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット？　そのままだと溺死するぞ」
2276 = "「波萊特？你這樣會溺水的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぼぼべべぶぼば、ぼーべぶぶぶば　ばびべぶば」
2070 = "「啵啵啵啵啵，啵啵啵啵」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぶぼば？」
2071 = "「啵啵啵？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぷはっ！」
2047 = "「哈！」" 

# monologue
# JP: 湯船からやにわに体を起こし、\nポーレットはこほこほ軽く咳き込んで。
2981 = "波萊特突然直起身子，輕輕咳了幾下。" 

# monologue
# JP: それからじっと青い目で――\nうらめしそうに、面白そうに、なんとも微妙に僕を見る。
3008 = "然後她那雙碧眼看向我。眼神中帶著幾分怨氣，又帶著幾分愉快。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
2391 = "「雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2078 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「年頃の兄妹だからうんぬんは、\nバツです、間違い。誤答で、０点です」
1725 = "「“兄妹到了一定的年齡”這種話是不對的，回答錯誤，０分」" 

# 【双鉄】
# display as 雙鐵
# JP: 「０点か」
2401 = "「０分」" 

# monologue
# JP: あまりに厳しい採点に、突き放されたような気になる。
2636 = "分數太過慘澹，我頓感失落。" 

# monologue
# JP: が、だ。それはつまり、\nポーレットは答えを知っているということになる。
2560 = "不過，這也就是說波萊特知道答案。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ポーレット」
2273 = "「波萊特——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「想像して？　双鉄くん。\nほころんでいるバラのつぼみを」
2393 = "「雙鐵君，你想像一下即將綻放的玫瑰花蕾」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お、おう」
2056 = "「哦，好」" 

# monologue
# JP: 何故だろう。\n今ここにいるポーレットには、ただごとならぬ迫力がある。
2552 = "不知為何，波萊特突然顯得氣勢逼人。" 

# monologue
# JP: 僕は、黙って従うしかない。
2782 = "我只能默默順從。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ほころんでいるバラのつぼみは、\n明日にも自然に咲きそうです」
2285 = "「玫瑰花蕾到了第二天就會自然綻放」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2078 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「『早く咲け』って、そこに水や肥料を与えちゃうのは\n――正解ですか？　間違いですか？」
2139 = "「想讓它快點綻放，就為它澆水施肥——這是對還是錯？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「明日にも自然と咲くものならば、間違いだ。\n余計なことで、つぼみを落としてしまいかねない」
2104 = "「如果它到了第二天就會自然綻放，這就是錯的。胡亂插手的話它可能會凋謝」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう。だからわたし、\n双鉄くんには、今は何も言ってあげられない」
2259 = "「沒錯。所以我現在什麼都不能對你說」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふ……む」
# 2073 = "「嗯……」" 

# monologue
# JP: 正直、意味はわからない。
3101 = "說實話，我不明白她的意思。" 

# monologue
# JP: が――目を見れば、\n思いやられていることくらいは、はっきりわかる。
2559 = "不過從她的眼神中，我能清楚地看出她是在為我著想。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにやら……すまん、いや――\nありがとう、ポーレット」
2143 = "「感覺有點……對不起，不……波萊特，謝謝你」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いいってことです。\n[わたしたちのなか,3]幼なじみじゃないですか」
2254 = "「沒什麼。我們可是[好朋友,3]青梅竹馬啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2078 = "「嗯」" 

# monologue
# JP: “私達の仲”という一言に、\n言葉以上の何かを感じたような気がして。
3049 = "總覺得她這句話中包含了一種更深的情感。" 

# monologue
# JP: けれどもそれを確かめるのは、\nひどく失礼なような気がして、些か戸惑う。
2580 = "但我感覺直接詢問她顯得很不禮貌，所以有些猶豫。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ね？　双鉄くん。\nもし、バラの花が綺麗に咲いて」
2394 = "「雙鐵君，如果玫瑰花蕾開成了美麗的花朵」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2060 = "「啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その後に悩むようなことがあったら、何でも聞いてね？\nわたし、教えてあげるから」
2102 = "「如果在這之後你有任何煩惱的話，都可以來找我哦。我會為你解惑的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心強いな。ありがとう」
2243 = "「有你這句話我就放心了，謝謝」" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど、無いかな？\n双鉄くんが悩むとか」
1950 = "「不過雙鐵君應該不會有煩惱吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや」
2257 = "「沒有的事」" 

# monologue
# JP: 即答できる。\nなぜならば今。
2816 = "我立刻回答。原因很簡單。" 

# monologue
# JP: ポーレットの謎かけから解放され、\n視界が広がったこの瞬間に、僕は悩みに陥ったから。
2682 = "因為從波萊特的謎語中解放出來，視野開闊起來之後，我立即就陷入了煩惱。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、ポーレット。\n日々姫の、あの目つきなのだが」
2169 = "「我說，波萊特。日日姬那個眼神」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ、あはははははは！\nあれ、誤解！　絶対、すっごい誤解してる～っ」
2052 = "「哎？啊、啊哈哈哈哈哈！她誤會了！她肯定是誤會了～」" 

# monologue
# JP: ぱしゃぱしゃ、ポーレットが楽しげに湯船を叩く。\n一叩きごと、日々姫の目はどんどんどんどん据わっていく。
2984 = "波萊特開心地拍著水。而日日姬的眼神則越來越凌厲。" 

# monologue
# JP: 日々姫を挟むようにして、湯船の中のハチロクとれいなは、\nくすくすくすくす、さも楽しげに笑っている。
2735 = "將日日姬夾在中間的八六和玲奈則是在非常開心地偷笑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、ポーレット、あれは、その――」
2275 = "「波萊特，她那是——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ダメダメ、双鉄くん。\nそこは、目一杯悩むとこ」
1948 = "「不行不行，雙鐵君。這需要你自己好好想想」" 

# monologue
# JP: （ざばぁっ）
3212 = "（嘩啦）" 

# monologue
# JP: ポーレットが軽やかに湯から出てしまう。\n同時にずんずん、日々姫が僕へと近づいてくる。
2983 = "波萊特輕快地走出浴池。與此同時，日日姬正向這邊衝過來。" 

# monologue
# JP: ずんずんずんずん――\n湯船を荒々しく波立てながら。
2988 = "浴池中激起一陣陣水波。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さん？　少しお話が」
2055 = "「哥哥，我們來談談吧」" 

# monologue
# JP: ああ……これは――\nそうか、映画で見たことがある。
2678 = "啊……這眼神——對了，我在電影裡看到過。" 

# monologue
# JP: （日々姫のこの目は――\nそうだ、人喰い鮫の目だ）
3226 = "（日日姬的眼神是——沒錯，是食人鯊的眼神）" 
