# 【日々姫】
# display as 日日姬
# JP: 「そうなんだ、じゃあ、結構すぐかもしれないね？\nアンケートの満足率が逆転するの」
2056 = "「這樣啊，那麼滿意度調查要逆轉獲勝大概也會很快了吧？」" 

# monologue
# JP: 観光ガイドは、永山さんと、凪＆ふかみチームとの\nローテーションだ。
2826 = "觀光導遊解說是由永山女士和凪＆深美組輪流進行的。" 

# monologue
