# JP: 話の途中だったのだが――\n稀咲を見れば、構わないよと頷いている。
2526 = "我們剛剛才說到一半——不過回頭一看稀咲，她點點頭表示沒關係。" 

# monologue
# JP: 確かに、これほど込み入った話は一度、\n全体会議で議論をすべきことがらか。
2766 = "確實，這種長話還是得開一次全體會議討論才行。" 

# 【ふかみ】
# display as 深美
