2112 = "「離乘務工作開始還有些時間呢，不要緊的。不過——長話就等乘務完了之後再說吧？」" 

# 【日々姫】
# display as 日日姬
# JP: 「込み入った話って、なんですか？」
2099 = "「長話是什麼啊？」" 

# monologue
# JP: 話しつつ、日々姫は奥に入っていく。\nカーテンを引く音、衣擦れの音。
2674 = "日日姬邊說邊走進房間。傳來拉窗簾，衣服摩擦的聲音。" 

# monologue
# JP: 市長のときと、\x%l機関助士;#00ffc040;機関助士%l;#;のとき。服装が１８０度違うから\n着替えが気持ちの切り替えに良いと話していたが……
2569 = "我跟她說過，當市長時和當\\x%l機関助士;#00ffc040;司爐%l;#;時穿的服裝風格是完全相反的，所以換衣服能方便轉換心態，不過……" 

# monologue
# JP: （僕が集中力を乱してどうするのだ。\n衣擦れの音ごときがこんなにも気になってしまうとは）
2929 = "（我自己的注意力都渙散了像什麼樣。沒想到只是衣服摩擦的聲音我都會這麼在意）" 

# 【稀咲】
# display as 稀咲
# JP: 「いいか悪いかでいえば、いいニュースだよ」
1770 = "「如果要說是好消息還是壞消息的話，是好消息」" 

# monologue
# JP: 無論、稀咲はまるで気にする様子も無い。
2755 = "當然，稀咲則是一點都沒有在意的樣子。" 

# monologue
# JP: 日々姫の方を見ようともせず、\nとんとん、書類をまとめている。
2430 = "她瞧都沒有瞧向日日姬那邊，而是在俐落地整理著文件。" 

# 【稀咲】
# display as 稀咲
# JP: 「発注、また新しいのがあったんだ」
1662 = "「又接到新的訂單了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「新しい発注って――\nその話なら昨日聞いているぞ？」
1893 = "「新訂單——這件事昨天我就聽過了啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「昨日話したのは[なんかい,1]難海鉄道からの話だろう？\nそれとは別口、四國は[こんぴら,2]金毘羅鉄道からの発注さ」
1857 = "「我昨天說的是南海鐵路的吧？今天是另外的，四國的琴平鐵路下的訂單」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　今日また、別口の発注が来たんですか！？」
1686 = "「哎！？今天又有別的地方下訂單了嗎！？」" 

# monologue
