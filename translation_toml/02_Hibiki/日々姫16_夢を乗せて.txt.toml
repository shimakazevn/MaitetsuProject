1762 = "「太好了！要有晚輩了！！到時候咱就要用前輩的身份讓她們給咱買下午茶！」" 

# 【ふかみ】
# display as 深美
# JP: 「ダメだよ凪ちゃん、そんなことしちゃ～」
2083 = "「那樣可不行啊，小凪～」" 

# monologue
