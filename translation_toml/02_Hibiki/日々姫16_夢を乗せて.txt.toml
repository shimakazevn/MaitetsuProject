2521 = "我不知道永山女士那邊怎麼樣，不過好像她成功地將凪和深美的競爭意識帶到一個好的方向上來了。" 

# 【ふかみ】
# display as 深美
# JP: 「ですから。ぜひ」
1878 = "「所以請一定來坐一次」" 

# 【双鉄】
# display as 雙鐵
