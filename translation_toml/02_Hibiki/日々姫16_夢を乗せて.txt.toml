2381 = "各位議員也都知道我今天還有乘務工作。他們知道並且認同了，而且還在聲援我。" 

# 【日々姫】
# display as 日日姬
# JP: 「ね？　兄さん」
1867 = "「我說，哥哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ナビを待たせてある。\n込み入った話だったら、空の上での方が――」
1869 = "「我讓Ｎａｖｉ在外面等了。如果事情複雜的話，等起飛了再慢慢說吧——」" 

# 【日々姫】
# display as 日日姬
# JP: 「すごく、簡単な話です。走りながらでも大丈夫」
1579 = "「一點都不複雜的，邊跑邊說也不要緊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならっ」
1924 = "「是嗎？那就」" 

# 【日々姫】
# display as 日日姬
# JP: 「！」
2121 = "「！」" 

# monologue
# JP: 兄さんの手が、いつもみたいに私の手を包んでくれる。\n離れないようしっかりと。痛くないよう優しく、強く。
2388 = "哥哥的手像往常一樣包住我的手。他緊緊拉著不鬆開。既溫柔得不讓我感到疼痛，但是又強而有力。" 

# 【日々姫】
# display as 日日姬
# JP: 「あのね？　私」
1873 = "「我跟你說。我啊」" 

# monologue
# JP: だから、私も強くなれる。\nこの手が私を、何からだって守ってくれる。支えてくれる。
2586 = "所以我也能變得更強。因為有這雙手守護著我，支持著我。" 

# monologue
# JP: 歩幅をあわせて一緒に走ってくれるから、\nどこまでだって、私は行ける。
2403 = "因為有他在我身邊，配合著我的步調一起奔跑，所以哪怕是天涯海角，我也可以到達。" 

# 【日々姫】
# display as 日日姬
# JP: 「私、御一夜をもっともっと素敵な町にしたいです。\nみんなにもっと、笑顔になってほしいから」
1850 = "「我想要讓御一夜變成一個更加更加美好的城市。我想讓大家的笑臉更加燦爛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら、そうしよう。\n必ずできるさ。日々姫と僕なら」
2074 = "「那就這麼辦吧。靠我和日日姬一起努力肯定能做到的」" 

# 【日々姫】
# display as 日日姬
# JP: 「はいっ！」
1727 = "「嗯！」" 

# monologue
# JP: だから兄さん、笑ってください。\n他の誰より――、一番に。
2591 = "所以，哥哥，請你展露笑容——比其他的任何人都笑得更燦爛。" 

# 【日々姫】
# display as 日日姬
# JP: 「そのためだったら、私、なんだってしますから！」
1954 = "「為了實現這個目標，我願意做任何事！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今戻った」
1840 = "「我們回來了」" 

# monologue
# JP: ――っと、ポーレットとれいなはもう機関庫か。\n宝生稀咲が、一人で店の番をしている。
1367 = "——哦，波萊特和玲奈已經到機車庫去了嗎。寶生稀咲一個人在看店。" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、日々姫。双鉄。お帰り」
1716 = "「啊，日日姬，雙鐵，歡迎回來」" 

# 【日々姫】
# display as 日日姬
# JP: 「ただいまです。\nすいません、質疑応答が長引いちゃって」
