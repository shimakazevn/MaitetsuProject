2111 = "「雙鐵少爺，日日姬。時間快到了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1725 = "「嗯」" 

# monologue
# JP: 整備ボディのハチロクが、\nふかみと凪とを引き連れて、僕らを呼びにやってくる。
2609 = "整備體八六帶著深美和凪來叫我們了。" 

# 【ふかみ】
# display as 深美
# JP: 「あの。今日も乗車率、１００％みたい。です」
2067 = "「那個。今天的乘車率好像也是１００％」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、そこで喜んでちゃイケンばいっ！」
1788 = "「小深，別因為這件事感到高興啊！」" 

