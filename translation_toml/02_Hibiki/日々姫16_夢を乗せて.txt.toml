# lines: 422 
# 【議員】
# display as 議員
# JP: 「最後に、御一夜駅前整備についてお伺いいたします」
1929 = "「Cuối cùng, tôi xin hỏi về việc chỉnh trang khu vực trước ga Ohimitera.」"
# monologue
# JP: ……御一夜駅前に人形時計を設置して、\n御一夜観光のシンボルにする。
1372 = "......Lắp đặt đồng hồ búp bê trước ga Ohimitera,\nđể biến nó thành biểu tượng du lịch của Ohimitera."
# monologue
# JP: 稀咲先輩のアイディアは、\nどの会派にも、基本線では賛同をしてもらえてる。
2778 = "Ý tưởng của tiền bối Kisaki,\nvề cơ bản đã nhận được sự đồng thuận từ tất cả các phe phái."
# 【議員】
# display as 議員
# JP: 「仕掛け時計の人形を、\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;と\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を\n模した物に、という案なのですが――」
2101 = "「Về đề xuất mô phỏng búp bê của đồng hồ cơ học theo \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; và \\x%lレイルロオド;#00ffc040;Railord%l;#;――」"
# monologue
# JP: けど、やっぱり細かな部分では、\nどうしても意見が食い違う。
2286 = "Nhưng, quả nhiên ở những chi tiết nhỏ,\nkiểu gì cũng sẽ có những ý kiến bất đồng."
# monologue
# JP: 議員さんは、市民の代表。支持者の代弁者で――\n“誰かの利益”を確保しようとするものだから。
2404 = "Nghị viên là đại diện của người dân. Là người phát ngôn của những người ủng hộ――\nVì họ là những người cố gắng đảm bảo \"lợi ích cho một ai đó\"."
# 【議員】
# display as 議員
# JP: 「確かに、\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;は新しい御一夜のシンボルでしょう。\nが、真に御一夜を代表する名物は、伝統あるキジ馬です」
1981 = "「Đúng là \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; có lẽ là biểu tượng mới của Ohimitera.\nNhưng, đặc sản thực sự đại diện cho Ohimitera, chính là ngựa gỗ Kiji truyền thống.」"
# monologue
# JP: この議員さんは、林業組合が支持母体。
2864 = "Nghị viên này, có nền tảng ủng hộ là hiệp hội lâm nghiệp."
# monologue
# JP: 素朴でかわいい木工品であるキジ馬のイメージアップは、\n林業のイメージアップにも繋がる……ってことだと思う。
2320 = "Việc nâng cao hình ảnh của ngựa gỗ Kiji, một sản phẩm đồ gỗ mộc mạc và đáng yêu,\ncũng sẽ góp phần nâng cao hình ảnh của ngành lâm nghiệp...... tôi nghĩ là vậy."
# 【日々姫】
# display as 日日姬
# JP: 「議員のご意見、大変興味深く伺わせていただきました」
1847 = "「Ý kiến của nghị viên, tôi đã lắng nghe với sự quan tâm sâu sắc.」"
# monologue
# JP: 市長になるまで知らなかったけど、\n質疑応答での質問予定項目は、事前に通告されてくる。
2295 = "Cho đến khi trở thành thị trưởng tôi mới biết,\ncác mục dự định hỏi trong phần hỏi đáp, đều được thông báo trước."
# monologue
# JP: もちろんそれは、あらかじめ答弁を考えて、\n定例議会の限られた時間を、ロスなく有意義に使うためだ。
2753 = "Tất nhiên điều đó là để chuẩn bị trước câu trả lời,\nnhằm sử dụng khoảng thời gian hạn hẹp của kỳ họp thường kỳ một cách có ý nghĩa và không lãng phí."
# 【日々姫】
# display as 日日姬
# JP: 「また、観光組合様からも同様のご陳情をいただき、\n原案を修正する必要があるかと理解しております」
2058 = "「Ngoài ra, chúng tôi cũng đã nhận được thỉnh nguyện tương tự từ hiệp hội du lịch,\nvà tôi hiểu rằng có lẽ cần phải sửa đổi bản dự thảo ban đầu.」"
# monologue
# JP: だから、私は困らない。
2584 = "Vì vậy, tôi không hề gặp khó khăn."
# monologue
# JP: にぃにぃが、私のために考えてくれた、\n解決と改善を同時に果たす修正案を持っているから。
2402 = "Bởi vì tôi đang có trong tay bản sửa đổi do anh hai nghĩ ra cho tôi,\nmột bản sửa đổi có thể đồng thời giải quyết và cải thiện vấn đề."
# 【日々姫】
# display as 日日姬
# JP: 「こちらをご覧ください」
2019 = "「Xin hãy xem cái này.」"
# monologue
# JP: 図や表を見せて説明するとき、他の議員さんのほとんどは、\n秘書さん作成のフリップを使う。
2409 = "Khi giải thích bằng cách đưa ra biểu đồ hay bảng biểu, hầu hết các nghị viên khác\nđều sử dụng bảng lật do thư ký chuẩn bị."
# monologue
# JP: けど私は、自分のスケッチブックしか使わない。\nそれが一番、私の気持ちをまっすぐ伝えてくれるから。
2285 = "Nhưng tôi thì chỉ sử dụng cuốn sổ phác thảo của riêng mình.\nBởi vì đó là thứ truyền đạt tâm tư của tôi một cách trực tiếp nhất."
# 【日々姫】
# display as 日日姬
# JP: (にぃにぃとだって、絵がきっかけで仲良くなれた。\n稀咲先輩とだって、絵を描いてたから知り合えた)
33 = "(Cả với anh hai, cũng nhờ những bức tranh mà trở nên thân thiết.\nCả với tiền bối Kisaki, cũng nhờ vẽ tranh mà quen biết nhau)"
# monologue
# JP: その積み重ねが、私を強くしてくれる。\n今まで描いた全ての線が、私を支えてくれている。
2464 = "Những tích lũy đó, làm tôi trở nên mạnh mẽ hơn.\nTất cả những nét vẽ tôi đã vẽ từ trước đến nay, đều đang nâng đỡ tôi."
# monologue
# JP: 絵と一緒なら、言葉にだって迷わずに済む。
2378 = "Chỉ cần có những bức tranh ở bên, tôi sẽ không còn phải ngập ngừng trong lời nói nữa."
# 【日々姫】
# display as 日日姬
# JP: 「新しい人形配置のラフスケッチです。毎正時に、\n時計正面のフタが開き、回転する仕組みを想定してます」
2055 = "「Đây là bản phác thảo thô về cách bố trí búp bê mới. Chúng tôi dự định\nmỗi khi điểm đúng giờ, nắp trước của đồng hồ sẽ mở ra và có cơ chế xoay tròn.」"
# 【議員】
# display as 議員
# JP: 「ああ……これは……線路で作った輪の上で、\nたくさんの人形を回して、順次見せるということですか」
1706 = "「À...... cái này...... trên một vòng tròn làm bằng đường ray,\nsẽ xoay rất nhiều búp bê, để lần lượt cho mọi người xem phải không.」"
# 【日々姫】
# display as 日日姬
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を乗せたＳＬ、キジ馬、観光川下り船、\nウンスンカルタを競技する人たち――」
2038 = "「SL chở \\x%lレイルロオド;#00ffc040;Railord%l;#;, ngựa gỗ Kiji, thuyền du lịch xuôi dòng,\nnhững người đang chơi bài Unsun Karuta――」"
# monologue
# JP: どれも、御一夜の名物だ。\nどれが一番だとかって、比べて順位がつくものじゃない。
2277 = "Tất cả đều là đặc sản của Ohimitera.\nKhông thể nào so sánh xem cái nào là nhất, để mà xếp hạng được."
# monologue
# JP: だから、かわいい人形にして、\nぐるぐるさせて、全部を見てもらえるようにする。
2580 = "Vì vậy, chúng tôi sẽ làm thành những con búp bê dễ thương,\ncho chúng xoay vòng vòng, để mọi người có thể chiêm ngưỡng tất cả."
# 【日々姫】
# display as 日日姬
# JP: 「人形も時計も、御一夜の職人さんに製作依頼して――\n更に御一夜の色を出したシンボルにしていきたいと」
1601 = "「Cả búp bê và đồng hồ, chúng tôi sẽ nhờ các nghệ nhân của Ohimitera chế tác――\nvà muốn biến nó thành một biểu tượng mang đậm màu sắc Ohimitera hơn nữa.」"
# 【議員】
# display as 議員
# JP: 「なるほど」
1660 = "「Ra là vậy.」"
# monologue
# JP: にぃにぃがくれた解決案が、\n議員さんも笑顔にしてくれる。
2879 = "Giải pháp mà anh hai đưa ra,\nđã mang lại nụ cười cho cả nghị viên."
# 【議員】
# display as 議員
# JP: 「さすが市長、すばらしい修正案をありがとうございます。\nこれでしたら、より御一夜の魅力が伝わりますね」
1971 = "「Quả không hổ danh thị trưởng, cảm ơn cô vì một bản sửa đổi tuyệt vời.\nNếu làm thế này, sức hấp dẫn của Ohimitera sẽ được truyền tải tốt hơn nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ご賛同、ありがとうございます」
1819 = "「Cảm ơn ông đã tán thành.」"
# monologue
# JP: もちろん、このアイディアにも難点はある。\n絶対“これも名産”“これこそ特産”って売り込みがくる。
2752 = "Tất nhiên, ý tưởng này cũng có những khó khăn.\nChắc chắn sẽ có những lời chào mời kiểu \"Cái này cũng là danh sản\", \"Cái này mới là đặc sản\"."
# monologue
# JP: その全部を仮に盛り込んだなら、全部が埋没してしまう。\nどれかを選んでどれかを捨てる――その選択は必要になる。
2443 = "Giả sử nhồi nhét tất cả vào, thì mọi thứ sẽ bị chìm nghỉm mất.\nChọn cái nào và bỏ cái nào――sự lựa chọn đó là cần thiết."
# monologue
# JP: （だけど、それが正解だから）
2913 = "（Nhưng mà, đó mới là câu trả lời đúng）"
# monologue
# JP: ポーレットさんが教えてくれた。全会一致の玉虫色より、\n“過半数”――それを確保できる議案を目指すべきだって。
2865 = "Chị Paulette đã dạy tôi. Rằng thay vì một kết quả ba phải được tất cả đồng thuận,\nthì nên hướng tới một nghị án có thể đảm bảo \"đa số\"――tức là hơn một nửa."
# monologue
# JP: そうするために意見や議論を真剣に交わし合うことが、\n結局は、御一夜の民意を一番正しく示すって。
2374 = "Để làm được điều đó, việc trao đổi ý kiến và tranh luận một cách nghiêm túc,\nrốt cuộc, mới là cách thể hiện chính xác nhất ý nguyện của người dân Ohimitera."
# 【議員】
# display as 議員
# JP: 「ご答弁をありがとうございました。\n議長。私からは以上です」
1820 = "「Cảm ơn cô vì câu trả lời.\nThưa chủ tọa. Phần của tôi đến đây là hết.」"
# monologue
# JP: 拍手、議場のあちこちから。
2497 = "Tiếng vỗ tay vang lên từ khắp nơi trong hội trường."
# monologue
# JP: いい質問をもらえたおかげで、いい答弁ができたかなって、\n安心できて、嬉しくなる。
2420 = "Nhờ nhận được một câu hỏi hay, mà tôi đã có thể đưa ra một câu trả lời tốt,\nđiều đó khiến tôi cảm thấy an tâm và vui vẻ."
# 【議長】
# display as 議長
# JP: 「的場議員の質問を終わります。\n以上にて、定例市議会本日の日程を終了します」
1970 = "「Phần đặt câu hỏi của nghị viên Matoba xin được kết thúc.\nNhư vậy, lịch trình ngày hôm nay của kỳ họp hội đồng thành phố thường kỳ xin được khép lại.」"
# 【日々姫】
# display as 日日姬
# JP: 「ありがとうございました！」
1818 = "「Xin cảm ơn mọi người!」"
# monologue
# JP: よかった。\nこれで今日の質疑も乗り切れた。
2423 = "Tốt quá rồi.\nThế là đã vượt qua được buổi chất vấn ngày hôm nay."
# monologue
# JP: 稀咲先輩のおかげで今は、大きな対立の無い状態だけど、\nそれでもやっぱりホッとする。
2419 = "Nhờ có tiền bối Kisaki mà hiện tại không có xung đột nào lớn,\nnhưng dù vậy tôi vẫn cảm thấy nhẹ nhõm."
# monologue
# JP: （悪意が無い質問だって、答弁間違えたらこじれるし。\n……ポーレットさん、本当に大変だったんだな）
2922 = "（Dù là câu hỏi không có ác ý, nhưng nếu trả lời sai thì cũng sẽ trở nên rắc rối.\n......Chị Paulette, thực sự đã rất vất vả nhỉ）"
# monologue
# JP: \\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致議案は廃案で議決されたけど……、\n対立が激しかった頃には、質疑応答も酷かったって聞いた。
78 = "Nghị án thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; tuy đã bị biểu quyết hủy bỏ......\nnhưng nghe nói vào thời điểm xung đột gay gắt, phần hỏi đáp diễn ra rất tồi tệ."
# monologue
# JP: 予定に無い質問をいきなりぶつけられたり、\n答弁の資料を隠されたりとか、あったって。
2705 = "Nào là bị bất ngờ ném cho những câu hỏi không có trong dự định,\nnào là bị giấu tài liệu trả lời."
# monologue
# JP: （その中でも、ポーレットさん、\n勝てなくても、負けなかったから――）
2924 = "（Ngay cả trong hoàn cảnh đó, chị Paulette,\ndù không thể thắng, nhưng cũng không hề thua――）"
# monologue
# JP: だから、工場誘致反対派は切り崩されなかった。\n環境を、クマ川を守ろうという声はかき消されなかった。
2582 = "Vì vậy, phe phản đối thu hút nhà máy đã không bị đánh gục.\nTiếng nói bảo vệ môi trường, bảo vệ sông Kuma đã không bị dập tắt."
# monologue
# JP: それがどんなに凄いことか、\n議場に立って、初めてわかった。
2556 = "Điều đó tuyệt vời đến nhường nào,\nchỉ khi đứng trên hội trường này, tôi mới lần đầu tiên thấu hiểu."
# 【日々姫】
# display as 日日姬
# JP: 「私……すごく幸運なんだ」
1828 = "「Mình...... thực sự rất may mắn.」"
# monologue
# JP: ポーレットさんが政治の先生をしてくれるから、\n私でも、こうして市長をなんとかかんとかこなせてる。
2418 = "Vì có chị Paulette làm giáo viên chính trị cho tôi,\nnên một người như tôi mới có thể bằng cách nào đó đảm đương được chức thị trưởng thế này."
# 【日々姫】
# display as 日日姬
# JP: 「みんなに――私、支えてもらえてるんだ」
1755 = "「Mọi người――đang hỗ trợ cho mình.」"
# monologue
# JP: にぃにぃだけじゃない、稀咲先輩だけじゃない。
2276 = "Không chỉ có anh hai, không chỉ có tiền bối Kisaki."
# monologue
# JP: ポーレットさんも、ねぇねぇもハチロクもれいなちゃんも、\n凪ちゃんもふかみちゃんも――ほんとに、みんなに。
2875 = "Cả chị Paulette, chị hai, Hachiroku, bé Reina,\nbé Nagi và bé Fukami nữa――thực sự, là tất cả mọi người."
# 【日々姫】
# display as 日日姬
# JP: 「だから、私も。少しでも」
1881 = "「Bởi vậy, em cũng phải. Cố gắng thêm một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
1899 = "「Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
1708 = "「A!」"
# monologue
# JP: にぃにぃ、って声が出かけて、\n慌てて呑み込む。
2539 = "Suýt nữa thì tiếng \"Anh hai\" bật ra khỏi miệng, tôi vội vàng nuốt lại vào trong."
# monologue
# JP: ここは議場で、私は市長で、にぃに――兄さんは第一秘書。\n公私をきちんとわきまえないと兄さんに迷惑をかけるから。
2867 = "Đây là hội trường nghị sự, tôi là thị trưởng, còn anh hai——anh trai là đệ nhất bí thư. Nếu không phân biệt rõ công tư thì sẽ gây rắc rối cho anh mất."
# monologue
# JP: （でも、嬉しいな。\nにぃに、迎えにきてくれたんだ！）
2912 = "（Nhưng mà, vui quá đi. Anh hai đến đón mình kìa!）"
# monologue
# JP: 議場には、原則的には議員だけしか入れない。\n秘書だってその例外じゃない。
2841 = "Về nguyên tắc, chỉ có các nghị viên mới được vào hội trường. Kể cả bí thư cũng không ngoại lệ."
# monologue
# JP: だから議場の扉のぎりぎり半歩だけ前から、\nにぃにぃは私のことを呼んでくれてる。
2590 = "Thế nên anh hai mới đứng cách cửa hội trường đúng nửa bước chân để gọi tôi."
# 【議長】
# display as 議長
# JP: 「市長、お呼びのようですが。\nお時間、大丈夫ですか？」
1792 = "「Thị trưởng, hình như có người gọi cô kìa. Lịch trình của cô không sao chứ?」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1683 = "「Hả!?」"
# monologue
# JP: 時間って。だって、議会が閉じたばっかりなんだから\n――っ！！？
2683 = "Lịch trình á. Tại vì, hội nghị vừa mới bế mạc xong mà——っ!!?"
# 【日々姫】
# display as 日日姬
# JP: 「え！？　やだ、遅刻しちゃうっ！」
1685 = "「Á!? Chết rồi, muộn mất!」"
# monologue
# JP: ドって、議場から笑いが起きる。
2842 = "Cả hội trường rộ lên tiếng cười ồ."
# monologue
# JP: あああ、ダメ、これ、\n公私、私が線引き失敗しちゃってる！
2393 = "Aaa, không được rồi, chuyện này, tôi lại thất bại trong việc vạch rõ ranh giới công tư mất rồi!"
# 【議長】
# display as 議長
# JP: 「議員諸兄。参考人、右田双鉄秘書の議場への入場を\n許可してもよろしいですか？」
1676 = "「Thưa các vị nghị viên. Có thể cho phép người tham chiếu, bí thư Migita Soutetsu tiến vào hội trường được không?」"
# 【議員】
# display as 議員
# JP: 「異議なーし！」
1940 = "「Không có ý kiến!」"
# 【議長】
# display as 議長
# JP: 「賛成多数と認めます。\nでは、右田双鉄秘書の議場入場を許可します」
1752 = "「Đa số tán thành. Vậy, cho phép bí thư Migita Soutetsu tiến vào hội trường.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます、議長さん、みなさん」
2114 = "「Cảm ơn ngài chủ tọa, cùng tất cả mọi người.」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ、あの、すぐ準備」
2092 = "「A, ừm, em chuẩn bị ngay đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も手伝う。大丈夫」
1830 = "「Anh cũng sẽ giúp một tay. Không sao đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――うんっ！」
1704 = "「A——Vâng!」"
# monologue
# JP: にぃにぃの声、にぃにぃの温度、にぃにぃの匂い。\nそれが近くに来てくれただけで、落ち着ける。
2881 = "Giọng nói của anh hai, hơi ấm của anh hai, mùi hương của anh hai. Chỉ cần những điều đó ở ngay bên cạnh thôi là tôi đã thấy an tâm rồi."
# monologue
# JP: 早くしなきゃって混乱してた頭と体が、\nまずは片付けからだって、一致し動き始めてくれる。
2355 = "Đầu óc và cơ thể đang rối bời vì phải nhanh lên, giờ đã đồng nhất lại và bắt đầu cử động, trước tiên là từ việc dọn dẹp."
# 【日々姫】
# display as 日日姬
# JP: 「――お待たせしました、もう行けます」
1384 = "「——Để anh đợi lâu rồi, đi được rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1725 = "「Ừm.」"
# 【日々姫】
# display as 日日姬
# JP: 「それじゃ、皆さま。お先に失礼いたします」
1678 = "「Vậy, thưa mọi người. Tôi xin phép đi trước.」"
# monologue
# JP: がんばれよーって声がする。\n事故るなよーって、ちょっと縁起でもない声も。
2686 = "Có tiếng vọng lại bảo \"Cố lên nha\". Lại còn có cả tiếng \"Đừng để xảy ra tai nạn đấy\", nghe hơi xui xẻo một chút."
# monologue
# JP: 今日の私は乗務があるって、議員さん達も知ってくれてる。\n知って、認めて、その上で応援までしてくれている。
2381 = "Các nghị viên cũng biết hôm nay tôi có ca trực. Họ biết, công nhận, và trên hết là còn cổ vũ cho tôi nữa."
# 【日々姫】
# display as 日日姬
# JP: 「ね？　兄さん」
1867 = "「Này? Anh trai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ナビを待たせてある。\n込み入った話だったら、空の上での方が――」
1869 = "「Anh đang để Navi đợi. Nếu là chuyện phức tạp thì để lên trời rồi nói——」"
# 【日々姫】
# display as 日日姬
# JP: 「すごく、簡単な話です。走りながらでも大丈夫」
1579 = "「Là chuyện cực kỳ đơn giản thôi. Vừa chạy vừa nói cũng không sao đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならっ」
1924 = "「Vậy à. Thế thì.」"
# 【日々姫】
# display as 日日姬
# JP: 「！」
2121 = "「!」"
# monologue
# JP: 兄さんの手が、いつもみたいに私の手を包んでくれる。\n離れないようしっかりと。痛くないよう優しく、強く。
2388 = "Bàn tay của anh trai, lại bao bọc lấy tay tôi như mọi khi. Nắm thật chặt để không rời xa. Thật dịu dàng để không làm tôi đau, nhưng cũng thật mạnh mẽ."
# 【日々姫】
# display as 日日姬
# JP: 「あのね？　私」
1873 = "「Anh biết không? Em ấy.」"
# monologue
# JP: だから、私も強くなれる。\nこの手が私を、何からだって守ってくれる。支えてくれる。
2586 = "Thế nên, em cũng có thể trở nên mạnh mẽ. Bàn tay này sẽ bảo vệ em khỏi bất cứ điều gì. Sẽ nâng đỡ em."
# monologue
# JP: 歩幅をあわせて一緒に走ってくれるから、\nどこまでだって、私は行ける。
2403 = "Vì anh sẽ sải bước cùng em, chạy cùng em, nên dù là nơi đâu, em cũng có thể đi tới."
# 【日々姫】
# display as 日日姬
# JP: 「私、御一夜をもっともっと素敵な町にしたいです。\nみんなにもっと、笑顔になってほしいから」
1850 = "「Em muốn biến Ohimitera thành một thành phố tuyệt vời hơn nữa. Vì em muốn mọi người sẽ nở nụ cười nhiều hơn nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、そうしよう。\n必ずできるさ。日々姫と僕なら」
2074 = "「Vậy thì, làm thế đi. Chắc chắn sẽ làm được thôi. Nếu là Hibiki và anh.」"
# 【日々姫】
# display as 日日姬
# JP: 「はいっ！」
1727 = "「Vâng!」"
# monologue
# JP: だから兄さん、笑ってください。\n他の誰より――、一番に。
2591 = "Vì vậy anh trai à, hãy cười lên đi. Hơn bất kỳ ai khác——, anh phải là người đầu tiên."
# 【日々姫】
# display as 日日姬
# JP: 「そのためだったら、私、なんだってしますから！」
1954 = "「Nếu là vì điều đó, em sẵn sàng làm bất cứ việc gì!」"
# 【双鉄】
# display as 雙鐵
# JP: 「今戻った」
1840 = "「Bọn anh về rồi đây.」"
# monologue
# JP: ――っと、ポーレットとれいなはもう機関庫か。\n宝生稀咲が、一人で店の番をしている。
1367 = "——Ồ, Paulette và Reina đã đến gara đầu máy rồi à. Houshou Kisaki đang trông cửa hàng một mình."
# 【稀咲】
# display as 稀咲
# JP: 「ああ、日々姫。双鉄。お帰り」
1716 = "「A, Hibiki. Soutetsu. Mừng hai người về.」"
# 【日々姫】
# display as 日日姬
# JP: 「ただいまです。\nすいません、質疑応答が長引いちゃって」
1839 = "「Bọn em về rồi đây. Xin lỗi nha, phần hỏi đáp kéo dài quá.」"
# 【稀咲】
# display as 稀咲
# JP: 「乗務まではまだ時間がある。問題ないさ。\nけど――込み入った話は乗務のあとかな？」
2112 = "「Vẫn còn thời gian trước khi bắt đầu ca trực mà. Không vấn đề gì đâu. Nhưng mà——chuyện phức tạp thì để sau ca trực nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「込み入った話って、なんですか？」
2099 = "「Chuyện phức tạp là chuyện gì vậy ạ?」"
# monologue
# JP: 話しつつ、日々姫は奥に入っていく。\nカーテンを引く音、衣擦れの音。
2674 = "Vừa nói, Hibiki vừa đi vào trong. Tiếng kéo rèm, tiếng quần áo sột soạt."
# monologue
# JP: 市長のときと、\\x%l機関助士;#00ffc040;機関助士%l;#;のとき。服装が１８０度違うから\n着替えが気持ちの切り替えに良いと話していたが……
2569 = "Lúc làm thị trưởng và lúc làm \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;. Trang phục khác nhau 180 độ nên cô ấy từng nói việc thay quần áo rất tốt cho việc chuyển đổi tâm trạng, nhưng mà..."
# monologue
# JP: （僕が集中力を乱してどうするのだ。\n衣擦れの音ごときがこんなにも気になってしまうとは）
2929 = "（Mình mất tập trung thì làm ăn gì được. Không ngờ chỉ tiếng sột soạt của quần áo thôi mà cũng khiến mình bận tâm đến vậy.）"
# 【稀咲】
# display as 稀咲
# JP: 「いいか悪いかでいえば、いいニュースだよ」
1770 = "「Nếu phải nói là tốt hay xấu thì, đó là tin tốt đấy.」"
# monologue
# JP: 無論、稀咲はまるで気にする様子も無い。
2755 = "Tất nhiên, Kisaki có vẻ hoàn toàn không bận tâm."
# monologue
# JP: 日々姫の方を見ようともせず、\nとんとん、書類をまとめている。
2430 = "Cô ấy thậm chí không thèm nhìn về phía Hibiki, chỉ gõ gõ, thu xếp đống tài liệu."
# 【稀咲】
# display as 稀咲
# JP: 「発注、また新しいのがあったんだ」
1662 = "「Lại có đơn đặt hàng mới rồi đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「新しい発注って――\nその話なら昨日聞いているぞ？」
1893 = "「Đơn đặt hàng mới ư——Chuyện đó thì hôm qua anh nghe rồi mà?」"
# 【稀咲】
# display as 稀咲
# JP: 「昨日話したのは[なんかい,1]難海鉄道からの話だろう？\nそれとは別口、四國は[こんぴら,2]金毘羅鉄道からの発注さ」
1857 = "「Chuyện hôm qua nói là của Đường sắt Nankai đúng không? Cái này là mối khác, đơn đặt hàng từ Đường sắt Konpira ở Shikoku cơ.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　今日また、別口の発注が来たんですか！？」
1686 = "「Hả!? Hôm nay lại có đơn đặt hàng từ mối khác đến nữa ạ!?」"
# monologue
# JP: 日々姫がひょっ！　と飛び出してくる。\n一瞬慌ててしまうけど、もちろん着替えは終わってる。
2665 = "Hibiki vọt ra! Trong khoảnh khắc tôi hơi hoảng hốt, nhưng tất nhiên là em ấy đã thay đồ xong rồi."
# 【稀咲】
# display as 稀咲
# JP: 「\\x%l客車;#00ffc040;客車%l;#;改修一輌、ベース車輌は\\x%l帝鉄;#00ffc040;帝鉄%l;#;22000系だから、\n今までのパーツも使える。いい話だよ」
1614 = "「Cải tạo một \\x%l客車;#00ffc040;toa hành khách%l;#;, toa xe nguyên bản là dòng 22000 của \\x%l帝鉄;#00ffc040;Teitetsu%l;#;, nên có thể sử dụng các bộ phận từ trước đến nay. Là một mối tốt đấy.」"
# monologue
# JP: いや、まさか――\n連日の受注があるなどと、夢にも思っていなかった。
2787 = "Không, thật không ngờ——Việc nhận được đơn đặt hàng trong nhiều ngày liên tiếp, tôi nằm mơ cũng không nghĩ tới."
# 【日々姫】
# display as 日日姬
# JP: 「すごいですね。\nここのとこ、本当に毎週みたいに注文ありますね」
1769 = "「Tuyệt quá nhỉ. Dạo gần đây, đúng là giống như tuần nào cũng có đơn đặt hàng ấy.」"
# 【稀咲】
# display as 稀咲
# JP: 「毛利の……電車姫様とか言ったっけ？　あの子が、\n納品した\\x%l客車;#00ffc040;客車%l;#;の質を大いに気に入ってくれたそうでね」
1766 = "「Cái người tên là... Denshahime của nhà Mouri ấy nhỉ? Nghe nói cô bé đó rất ưng ý chất lượng của \\x%l客車;#00ffc040;toa hành khách%l;#; mà chúng ta đã giao đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1725 = "「嗯」" 
# 【稀咲】
# display as 稀咲
# JP: 「噂くらいはボクでさえ聞いたことがあったけど――\nいや、本当に大した人物のようだね、彼女は」
1635 = "「Dù chỉ là tin đồn thì ngay cả tôi cũng từng nghe qua rồi——Chà, cô bé đó đúng là một nhân vật tầm cỡ thật đấy.」"
# monologue
# JP: 毛利の姫様が、\\x%lまいてつ;#00ffc040;まいてつ%l;#;界の大立者であることならば、\n今さら説明されずとも、重々理解できてる。
2710 = "Chuyện công chúa nhà Mouri là một nhân vật tai to mặt lớn trong giới \\x%lまいてつ;#00ffc040;người đam mê đường sắt%l;#; thì, dù không cần phải giải thích thêm vào lúc này, tôi cũng đã hiểu quá rõ rồi."
# monologue
# JP: あの姫様が一言でも褒めてくださったのなら、\nその影響は確かに、日ノ本全土の\\x%lまいてつ;#00ffc040;まいてつ%l;#;達に及ぶだろう。
2391 = "Nếu vị công chúa đó mà buông lời khen ngợi dù chỉ một câu, thì sức ảnh hưởng đó chắc chắn sẽ lan tỏa đến các \\x%lまいてつ;#00ffc040;người đam mê đường sắt%l;#; trên toàn Hinomoto."
# monologue
# JP: （が――それは単なるきっかけに過ぎん）
2911 = "（Nhưng——đó cũng chỉ là một cơ hội mà thôi.）"
# monologue
# JP: 一瞬にして広まるような好評は、\n一つのミスで、やはり瞬時に悪評へと堕してしまうだろう。
2273 = "Những đánh giá tốt được lan truyền trong nháy mắt, chỉ cần một sai lầm thôi, chắc chắn cũng sẽ rơi xuống thành đánh giá xấu trong nháy mắt."
# monologue
# JP: 初期の受注をきっちりこなし、実績を重ね続けたからこそ、\n毛利の姫様がばらまいた種は、こうも見事に芽吹いたのだ。
2699 = "Chính vì đã hoàn thành xuất sắc những đơn đặt hàng ban đầu, liên tục tích lũy thành tích, nên hạt giống mà công chúa nhà Mouri gieo xuống mới nảy mầm rực rỡ đến thế."
# monologue
# JP: （さすがは宝生稀咲の手腕か――\nポーレットが財務全般を一任したのは、大正解だったな）
2921 = "（Quả không hổ danh là tài năng của Houshou Kisaki——Paulette giao toàn bộ mảng tài chính cho cô ấy, đúng là một quyết định hoàn toàn chính xác.）"
# 【日々姫】
# display as 日日姬
# JP: 「けど、これほど注文が重なっちゃうと、\nやりくり、大変じゃないですか？」
1589 = "「Nhưng mà, nếu đơn đặt hàng cứ chồng chất thế này, thì việc xoay xở chẳng phải sẽ rất vất vả sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。移送と納品のタイミングを間違えると、\n車輌の置き場すらなくなりそうだ」
1919 = "「Đúng vậy. Nếu tính toán sai thời điểm vận chuyển và giao hàng, e là sẽ chẳng còn chỗ để xe nữa mất.」"
# 【稀咲】
# display as 稀咲
# JP: 「込み入った話、っていうのはそこのところさ」
1852 = "「Chuyện phức tạp mà tôi nói, chính là chỗ đó đấy.」"
# monologue
# JP: 我が意を得たりと稀咲が頷く。
2782 = "Kisaki gật đầu như thể đã đạt được mục đích."
# 【稀咲】
# display as 稀咲
# JP: 「特需はいつまでも続かないが、\n湯医線の営業に支障が出ては、本末転倒になってしまう」
2106 = "「Nhu cầu đặc biệt sẽ không kéo dài mãi, nhưng nếu gây cản trở đến hoạt động kinh doanh của tuyến Yui, thì lại thành ra xôi hỏng bỏng không mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。\\x%l石造機関庫;#00ffc040;石造機関庫%l;#;は、実際、ぎりぎりの状況だ」
1913 = "「Đúng thế. \\x%l石造機関庫;#00ffc040;Xưởng đầu máy bằng đá%l;#;, thực tế là đang ở trong tình trạng quá tải rồi.」"
# monologue
# JP: \\x%l客車;#00ffc040;客車%l;#;、\\x%l貨車;#00ffc040;貨車%l;#;の置き場所である\\x%l客貨車区;#00ffc040;客貨車区%l;#;はすでに満杯。
2602 = "Nơi để \\x%l客車;#00ffc040;toa hành khách%l;#; và \\x%l貨車;#00ffc040;toa chở hàng%l;#; là \\x%l客貨車区;#00ffc040;khu toa khách toa hàng%l;#; đã chật cứng."
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;と\\x%lキハ07;#00ffc040;キハ07%l;#;の置き場所である\\x%l機関区;#00ffc040;機関区%l;#;にまで、\n改修車輌が現状、すでにはみ出してきている。
2467 = "Thậm chí cả \\x%l機関区;#00ffc040;kho đầu máy%l;#; là nơi để \\x%l8620;#00ffc040;8620%l;#; và \\x%lキハ07;#00ffc040;KiHa 07%l;#;, hiện tại các toa xe cải tạo cũng đã lấn sang rồi."
# 【日々姫】
# display as 日日姬
# JP: 「入れ替え、結構ややこしいことになってきてますよね」
2017 = "「Việc dồn toa, cũng đang trở nên khá rắc rối rồi nhỉ.」"
# monologue
# JP: \\x%l客車;#00ffc040;客車%l;#;は、自力では動けない。
91 = "\\x%l客車;#00ffc040;Toa hành khách%l;#; không thể tự mình di chuyển được."
# monologue
# JP: 故に、\\x%l8620;#00ffc040;8620%l;#;もしくは\\x%lキハ07;#00ffc040;キハ07%l;#;を本線上へと出すときには、\n動力車で\\x%l客車;#00ffc040;客車%l;#;を押し引きしての、入替作業が要求される。
2594 = "Do đó, khi đưa \\x%l8620;#00ffc040;8620%l;#; hoặc \\x%lキハ07;#00ffc040;KiHa 07%l;#; ra tuyến chính, bắt buộc phải có thao tác dồn toa, dùng toa xe động lực để đẩy và kéo \\x%l客車;#00ffc040;toa hành khách%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道に参加したいという\\x%lまいてつ;#00ffc040;まいてつ%l;#;さんも\nいらっしゃるのに、今は受け入れ余地も無い」
2107 = "「Dù có những \\x%lまいてつ;#00ffc040;người đam mê đường sắt%l;#; muốn tham gia vào Đường sắt Ohito, nhưng hiện tại chúng ta cũng không còn chỗ để tiếp nhận nữa.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうしたロスを防ぎたい意味もあってね、\n最小規模の設備投資をするように提言したんだ」
1599 = "「Cũng có ý muốn ngăn chặn những tổn thất đó, nên tôi đã đề xuất thực hiện đầu tư thiết bị ở quy mô tối thiểu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「改修施設を増強するということか？」
1814 = "「Ý cô là tăng cường cơ sở cải tạo sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。本当に必要最小限度だけ。\nいずれ特需が失くなっても、持て余さずに済む分だけを」
1724 = "「Ừ. Thực sự chỉ ở mức tối thiểu cần thiết thôi. Để sau này dù nhu cầu đặc biệt có mất đi, thì cũng chỉ ở mức không bị dư thừa.」"
# 【双鉄】
# display as 雙鐵＆日日姬
# JP: 「それはいいな」\n「いいですね、それ」
2069 = "「Thế thì tốt quá.」\n「Ý kiến hay đấy ạ.」"
# monologue
# JP: 日々姫と声が、気持ちが重なる。
2535 = "Giọng nói và cảm xúc của tôi hòa làm một với Hibiki."
# monologue
# JP: 目と目もあって、日々姫が微笑んでくれるから――\nならばと僕が、僕らの意見を重ねて述べる。
2533 = "Bắt gặp ánh mắt nhau, Hibiki mỉm cười với tôi——thế nên tôi đã nói thêm về ý kiến chung của chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕たちとしても……\\x%l検修庫;#00ffc040;検修庫%l;#;というのだったか？　\n検査と修理専門の車輌庫の増設は希望したい」
1837 = "「Về phía bọn anh cũng muốn... gọi là \\x%l検修庫;#00ffc040;xưởng bảo dưỡng%l;#; nhỉ? Rất mong muốn xây thêm nhà kho chuyên dụng cho việc kiểm tra và sửa chữa toa xe.」"
# 【稀咲】
# display as 稀咲
# JP: 「だよね。それが妥当な判断。\n足元を固めないで上を目指すなど愚の骨頂さ」
1916 = "「Đúng không. Đó là phán đoán thỏa đáng. Chưa củng cố nền móng mà đã nhắm lên cao thì đúng là đỉnh cao của sự ngu ngốc.」"
# monologue
# JP: 付き合いが長い分、何かを感じ取ったのだろう。
2325 = "Có lẽ vì chơi với nhau lâu nên em ấy đã cảm nhận được điều gì đó."
# monologue
# JP: あどけなささえ感じる仕草で小首を傾げ、\n日々姫は少し、困ったような声を出す。
2427 = "Nghiêng đầu với dáng vẻ ngây thơ, Hibiki cất giọng hơi bối rối."
# 【日々姫】
# display as 日日姬
# JP: 「ポーレットさんと稀咲先輩、\n意見が食い違っちゃってるんですか？」
1947 = "「Chị Paulette và tiền bối Kisaki, đang bất đồng ý kiến ạ?」"
# 【稀咲】
# display as 稀咲
# JP: 「困ったことにね」
2054 = "「Khổ nỗi là vậy đấy.」"
# monologue
# JP: 日々姫が相手だからだろうか。
2401 = "Có lẽ vì đối phương là Hibiki chăng."
# monologue
# JP: 肩をすくめる稀咲の仕草も芝居がかって、\nどこか楽しげなようにも見える。
2781 = "Cử chỉ nhún vai của Kisaki cũng mang chút kịch tính, trông có vẻ hơi thích thú."
# 【稀咲】
# display as 稀咲
# JP: 「ポーレットは、\n路線延伸をやりたいとか言いだしたんだよ」
1946 = "「Paulette tự nhiên lại bảo là muốn kéo dài tuyến đường đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「路線延伸！」
1798 = "「Kéo dài tuyến đường!」"
# monologue
# JP: 聞いた瞬間、目からウロコが落とされる。
2560 = "Khoảnh khắc nghe thấy điều đó, tôi như được khai sáng."
# monologue
# JP: さすが稀咲と思っていたが、\nいや、ポーレットもさすがとしか言いようが無い。
2356 = "Vừa mới nghĩ quả không hổ danh là Kisaki, nhưng không, Paulette cũng phải nói là quả không hổ danh."
# 【稀咲】
# display as 稀咲
# JP: 「おや？　双鉄は――」
1699 = "「Ô? Soutetsu thì——」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、日々姫。そろそろ時間ですよ」
2111 = "「Ngài Soutetsu, Hibiki. Sắp đến giờ rồi đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1725 = "「嗯」" 
# monologue
# JP: 整備ボディのハチロクが、\nふかみと凪とを引き連れて、僕らを呼びにやってくる。
2609 = "Hachiroku trong thân chính, dẫn theo Fukami và Nagi, đến gọi chúng tôi."
# 【ふかみ】
# display as 深美
# JP: 「あの。今日も乗車率、１００％みたい。です」
2067 = "「Dạ. Hôm nay tỷ lệ lấp đầy, hình như cũng là 100% đấy ạ.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、そこで喜んでちゃイケンばいっ！」
1788 = "「Fukami, không được vui mừng vì chuyện đó đâu nha!」"
# 【ふかみ】
# display as 深美
# JP: 「うん。\nお客さんたち、川下りにも来てもらわないと。だよね！」
1721 = "「Ừm. Phải để khách hàng đến đi thuyền xuôi dòng nữa. Chứ nhỉ!」"
# monologue
# JP: 話の途中だったのだが――\n稀咲を見れば、構わないよと頷いている。
2526 = "Câu chuyện đang dở dang——nhưng nhìn Kisaki, cô ấy gật đầu ra hiệu không sao."
# monologue
# JP: 確かに、これほど込み入った話は一度、\n全体会議で議論をすべきことがらか。
2766 = "Quả thực, một chuyện phức tạp nhường này, đáng lẽ nên đưa ra thảo luận trong cuộc họp toàn thể một lần."
# 【ふかみ】
# display as 深美
# JP: 「あの。双鉄さんも、日々姫さんも。\n私達のガイド。ぜひご乗車ください」
2068 = "「Dạ. Anh Soutetsu, và cả chị Hibiki nữa. Hãy đến nghe hướng dẫn của chúng em. Nhất định phải lên tàu nhé ạ.」"
# 【凪】
# display as 凪
# JP: 「そうばい！　いつでん聞きにくるばい！\n永山のおばちゃんより、上手なガイドしてみせるばい！」
1918 = "「Đúng đó nha! Lúc nào cũng hoan nghênh đến nghe nha! Bọn em sẽ cho thấy tài hướng dẫn còn giỏi hơn cả cô Nagayama luôn nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。それは大したものだな」
1745 = "「Hô. Vậy thì đáng nể thật đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「言い過ぎ！\n凪ちゃん、それはまだちょっと言い過ぎだよう」
2014 = "「Nói quá rồi! Nagi, nói thế vẫn còn hơi quá đấy.」"
# monologue
# JP: 確かに、永山のおばちゃん――\n幽霊寺の奥さんは、元食堂車勤務だけのことはあるらしい。
2716 = "Quả thực, cô Nagayama——vợ của sư trụ trì chùa Yurei, nghe nói trước đây từng làm việc ở toa ăn nên rất có kinh nghiệm."
# monologue
# JP: 観光\\x%l列車;#00ffc040;列車%l;#;の売りのひとつの『御一夜ガイド』を、\n地元出身の二人より、見事にこなしてくれていると聞く。
2561 = "Nghe nói trong phần \"Hướng dẫn Ohimitera\", một trong những điểm nhấn của \\x%l列車;#00ffc040;đoàn tàu%l;#; du lịch, cô ấy còn làm xuất sắc hơn cả hai người xuất thân từ địa phương này."
# 【日々姫】
# display as 日日姬
# JP: 「“まだ”ってことは、追い抜いちゃう予定あるんだ？」
1389 = "「\"Vẫn còn\" nghĩa là, có dự định sẽ vượt mặt luôn đúng không?」"
# 【凪】
# display as 凪
# JP: 「もちろんばい！」
1964 = "「Tất nhiên rồi nha!」"
# 【ふかみ】
# display as 深美
# JP: 「今、いろいろコツとか。教えてもらってます。から」
1841 = "「Hiện tại, bọn em đang được chỉ dạy. Rất nhiều bí quyết ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうなんだ、じゃあ、結構すぐかもしれないね？\nアンケートの満足率が逆転するの」
2056 = "「Vậy à, thế thì, có lẽ sẽ khá nhanh thôi nhỉ? Tỷ lệ hài lòng trong phiếu khảo sát sẽ đảo ngược lại ấy.」"
# monologue
# JP: 観光ガイドは、永山さんと、凪＆ふかみチームとの\nローテーションだ。
2826 = "Hướng dẫn du lịch sẽ được luân phiên giữa cô Nagayama và đội Nagi & Fukami."
# monologue
# JP: 永山さんがどうだかしらんが、凪とふかみには\nライバル意識が、良い方向に働いてくれているようだ。
2521 = "Không biết cô Nagayama thấy thế nào, nhưng đối với Nagi và Fukami, ý thức cạnh tranh có vẻ đang phát huy tác dụng theo hướng tích cực."
# 【ふかみ】
# display as 深美
# JP: 「ですから。ぜひ」
1878 = "「Vậy nên. Nhất định nhé ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうさせてもらおう。\n\\x%l機関助士;#00ffc040;機関助士%l;#;候補の育成も――」
1737 = "「Ừ, anh sẽ làm thế. Việc đào tạo ứng viên \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; cũng——」"
# 【ハチロク】
# display as 八六
# JP: 「はい、順調に進んでいます。\n凪様に後輩が出来る日ももうすぐですよ？」
1735 = "「Vâng, đang tiến triển thuận lợi ạ. Ngày Nagi có hậu bối cũng sắp đến rồi đấy nhé?」"
# 【凪】
# display as 凪
# JP: 「やったばい！　後輩ばいっ！！\n先輩づらして[ごご,1]午后ティー買ってこさせるばい！」
1762 = "「Hoan hô nha! Có hậu bối rồi nha!! Phải ra dáng tiền bối bắt đi mua trà chiều mới được nha!」"
# 【ふかみ】
# display as 深美
# JP: 「ダメだよ凪ちゃん、そんなことしちゃ～」
2083 = "「Không được đâu Nagi, làm thế là không được đâu~」"
# monologue
# JP: 観光復権を市政の大方針として打ち出したことが奏功し、\n川下り船にも船頭さんやともはりさんが復帰してきた。
2527 = "Việc đưa ra chính sách lớn của thành phố là phục hưng du lịch đã thành công, những người lái đò và người chèo thuyền cũng đã quay trở lại với thuyền xuôi dòng sông."
# monologue
# JP: ガイドを兼ねて広報をする余裕はまさにその産物だが、\nいかに凪とて、ガイドと\\x%l機関助士;#00ffc040;機関助士%l;#;とを同時には出来ない。
2461 = "Việc có dư dả thời gian để vừa làm hướng dẫn viên vừa làm tuyên truyền chính là sản phẩm của chính sách đó, nhưng dù Nagi có giỏi đến đâu, cũng không thể đồng thời làm cả hướng dẫn viên và \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; được."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、新人\\x%l機関助士;#00ffc040;機関助士%l;#;の初乗務の日。\n僕と日々姫とで、乗客として\\x%l8620;#00ffc040;8620%l;#;に乗せてもらおう」
2087 = "「Nếu vậy, vào ngày ca trực đầu tiên của \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; mới. Anh và Hibiki sẽ làm hành khách lên \\x%l8620;#00ffc040;8620%l;#; nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「それでは、お二人の自信を喪失させるべく、\nポーレット様と新人を、最高にまで鍛えあげましょう」
2089 = "「Vậy thì, để làm mất đi sự tự tin của hai người, tôi sẽ rèn luyện cho Thị trưởng Paulette và người mới đạt đến mức cao nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「望むところだ」
2084 = "「Đúng ý anh đấy.」"
# monologue
# JP: レールショップの外へと出れば、\n真闇姉の姿が目に入る。
2565 = "Vừa bước ra khỏi cửa hàng đường sắt, hình bóng của chị Mayami lọt vào tầm mắt tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、ポーレットと打ち合わせか？」
1974 = "「Chị Mayami, chị đến bàn bạc với Paulette à?」"
# 【真闇】
# display as 真闇
# JP: 「ううん、納品。蒸気焼酎と蒸気ラムネと。\nおかげで、繁盛させてもろーとりますけん」
1591 = "「Không, chị đến giao hàng. Rượu shochu hơi nước và ramune hơi nước. Nhờ có mọi người mà buôn bán phát đạt lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どういたしまして。こちらこそ」
2010 = "「Không có chi ạ. Bên em mới phải cảm ơn chị.」"
# monologue
# JP: 選挙戦を勝利で終えて、\n真闇姉はすぐさま、本業に復帰した。
2874 = "Sau khi kết thúc chiến dịch tranh cử với chiến thắng, chị Mayami ngay lập tức quay trở lại với công việc chính."
# monologue
# JP: 納品だけなら従業員任せで構わぬはずで――\nなら、真闇姉は僕らの様子を見に来てくれたのだろう。
2371 = "Nếu chỉ là giao hàng thì giao cho nhân viên cũng được mà——vậy thì, chắc chị Mayami đến để xem tình hình của chúng tôi rồi."
# 【真闇】
# display as 真闇
# JP: 「ひーちゃん、ボタン」
1785 = "「Bé Hi, cúc áo kìa.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？」
1690 = "「Dạ?」"
# monologue
# JP: \\x%l機関助士;#00ffc040;機関助士%l;#;の仕事は――\\x%l機関士;#00ffc040;機関士%l;#;もだが、\n常に、熱との戦いだ。
93 = "Công việc của \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; là——\\x%l機関士;#00ffc040;lái tàu%l;#; cũng vậy, luôn là một cuộc chiến với sức nóng."
# monologue
# JP: それにそなえて日々姫が開けていた一番上のボタンを、\nけれど、真闇姉は、手を伸ばしピっと留めてしまう。
2737 = "Để đối phó với điều đó, Hibiki đã mở chiếc cúc áo trên cùng, nhưng chị Mayami lại đưa tay ra cài chặt nó lại."
# 【真闇】
# display as 真闇
# JP: 「機関車の中ば入っとらんときはね、ひーちゃん。\nお客さんからみたら、“駅員さん”やけん」
1787 = "「Khi không ở trong đầu máy thì, bé Hi à. Trong mắt hành khách, em là một \"nhân viên nhà ga\" đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1708 = "「啊！」" 
# monologue
# JP: 深く頷き、日々姫は自ら服装各部をチェックしなおし、\n姿勢を正す。
2654 = "Gật đầu thật sâu, Hibiki tự mình kiểm tra lại từng phần trang phục, và chỉnh lại tư thế."
# 【日々姫】
# display as 日日姬
# JP: 「ありがと、ねぇねぇ。これでどう？」
2023 = "「Cảm ơn chị nha. Thế này được chưa ạ?」"
# 【真闇】
# display as 真闇
# JP: 「うん。立派。どっから見ても一人前」
1730 = "「Ừ. Tuyệt lắm. Nhìn từ góc nào cũng ra dáng người trưởng thành rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 2121 = "「！」" 
# monologue
# JP: 一人前。\nごくありきたりの、普通の言葉だ。
2743 = "Trưởng thành. Một từ hết sức bình thường, phổ biến."
# monologue
# JP: だが、真闇姉が日々姫にかけた“一人前”は、\n僕の耳にも、特別な価値をもって聞こえる。
2290 = "Nhưng, chữ \"trưởng thành\" mà chị Mayami dành cho Hibiki, lọt vào tai tôi, lại mang một giá trị đặc biệt."
# 【日々姫】
# display as 日日姬
# JP: 「ありがと。ねぇねぇ」
2024 = "「Cảm ơn chị nha.」"
# monologue
# JP: 同じ言葉を繰り返し、\nそして日々姫は、見事に整った敬礼をする。
2439 = "Lặp lại cùng một câu nói, rồi Hibiki thực hiện một động tác chào nghiêm trang tuyệt đẹp."
# 【日々姫】
# display as 日日姬
# JP: 「それじゃ、行ってきます！」
2076 = "「Vậy, em đi đây!」"
# 【真闇】
# display as 真闇
# JP: 「はいはい。気ぃつけてねぇ」
1726 = "「Rồi rồi. Đi cẩn thận nhé.」"
# monologue
# JP: 機関庫内では、\nまだ整備ボディのれいなが忙しく働いて――いや――
2408 = "Trong gara đầu máy, Reina trong thân chính vẫn đang bận rộn làm việc——không——"
# 【双鉄】
# display as 雙鐵
# JP: 「入れ替え……終わらせておいてくれたのか」
1391 = "「Việc dồn toa... em đã làm xong hết cho bọn anh rồi sao?」"
# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、れいな、がんばっちゃいましたぁ」
1682 = "「Ê hê hê, Reina, đã cố gắng hết sức rồi đó nha~」"
# monologue
# JP: \\x%l客車;#00ffc040;客車%l;#;や\\x%l貨車;#00ffc040;貨車%l;#;を動かして、本線に出る車輌の、\n進行方向の線路を開ければ、それで入れ替え完了だ。
2769 = "Di chuyển \\x%l客車;#00ffc040;toa hành khách%l;#; và \\x%l貨車;#00ffc040;toa chở hàng%l;#;, mở đường ray theo hướng di chuyển của toa xe ra tuyến chính, như vậy là hoàn thành việc dồn toa."
# monologue
# JP: 単機でもやれないことは無いのだが、\n手間と時間と精神疲労の負担は無論、分業の方が楽になる。
2884 = "Dù chạy đơn toa cũng không phải là không làm được, nhưng tốn công sức, thời gian và mệt mỏi tinh thần là điều đương nhiên, phân công công việc sẽ nhàn hơn nhiều."
# 【れいな】
# display as 玲奈
# JP: 「みんな、鉄道以外のこともいろいろやっているのに、\nれいなは、これしか出来ませんからぁ」
1758 = "「Mọi người, ai cũng làm nhiều việc khác ngoài đường sắt, nhưng Reina, chỉ làm được việc này thôi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1725 = "「嗯」" 
# monologue
# JP: この健気さは、変わらんな――\n思えばぽん、と頭を撫でてる。
2437 = "Sự đáng yêu này, vẫn không thay đổi nhỉ——vừa nghĩ, tôi vừa vỗ nhẹ xoa đầu cô bé."
# 【れいな】
# display as 玲奈
# JP: 「はわっ！？」
1681 = "「Hawa!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。助かった。\nだが、無理はするなよ？」
2022 = "「Cảm ơn em. Giúp được nhiều lắm. Nhưng mà, đừng có gắng sức quá nhé?」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
1976 = "「Vâng ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、双鉄くん、日々姫ちゃん」
1719 = "「A, Soutetsu, Hibiki.」"
# monologue
# JP: \\x%lキハ07;#00ffc040;キハ07%l;#;の\\x%l運転台;#00ffc040;運転台%l;#;から、軽やかにポーレットが降りてくる。
2726 = "Từ \\x%l運転台;#00ffc040;buồng lái%l;#; của \\x%lキハ07;#00ffc040;KiHa 07%l;#;, Paulette nhẹ nhàng bước xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「ええと、今日の乗務のあとって」
1701 = "「À ừm, sau ca trực hôm nay thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「喜んで時間を作ろう。稀咲が言ってた話だろう？」
1849 = "「Anh rất sẵn lòng dành thời gian. Chuyện Kisaki nói lúc nãy đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「多分そうです。延伸か増設の」
1761 = "「Chắc là vậy ạ. Chuyện kéo dài hay xây thêm ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は延伸に一票だ」
1856 = "「Anh bỏ một phiếu cho kéo dài.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1708 = "「啊！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「説明をきちんとすれば、稀咲も納得してくれるさ。\nでは、行ってくる」
1672 = "「Giải thích đàng hoàng thì Kisaki cũng sẽ đồng ý thôi. Vậy, anh đi đây.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、お気をつけて！　いってらっしゃい！」
1739 = "「Vâng, đi cẩn thận nhé! Chúc hai người đi vui vẻ!」"
# 【れいな】
# display as 玲奈
# JP: 「いってらっしゃーい！　ですぅ！」
2018 = "「Chúc đi vui vẻ nha~!」"
# monologue
# JP: 明るい声に見送られれば、各部点検も速やかに済む。
2425 = "Được tiễn bằng những giọng nói vui tươi, việc kiểm tra các bộ phận cũng nhanh chóng hoàn tất."
# monologue
# JP: \\x%l運転台;#00ffc040;運転台%l;#;へとあがったならもう、\nハチロクは運転ボディに換装している。
2545 = "Vừa bước lên \\x%l運転台;#00ffc040;buồng lái%l;#;, Hachiroku đã thay sang thân điều khiển rồi."
# 【ハチロク】
# display as 八六
# JP: 「さぁ、参りましょう」
1838 = "「Nào, chúng ta đi thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
# 1727 = "「嗯！」" 
# 【日々姫】
# display as 日日姬
# JP: 「ボイラ水位、適正です！」
2095 = "「Mực nước lò hơi, bình thường!」"
# monologue
# JP: ブレーキテスト、\\x%lバイパス弁;#00ffc040;バイパス弁%l;#;と排水弁開け、\nブレーキ位置を運転にして、\\x%l前進フルギア;#00ffc040;前進フルギア%l;#;。
2733 = "Kiểm tra phanh, mở \\x%lバイパス弁;#00ffc040;van bypass%l;#; và van xả nước, đặt vị trí phanh ở chế độ chạy, \\x%l前進フルギア;#00ffc040;cài hết số tiến%l;#;."
# monologue
# JP: その間に、日々姫も釜をすっかり仕上げてくれている。\n指差\\x%l喚呼;#00ffc040;喚呼%l;#;も、だから、ぴたりと息が合う。
2413 = "Trong lúc đó, Hibiki cũng đã chuẩn bị xong xuôi lò hơi. Nhờ vậy mà chỉ tay hô \\x%l喚呼;#00ffc040;xác nhận%l;#; cũng vô cùng ăn ý."
# 【双鉄】
# display as 雙鐵＆日日姬
# JP: 「出発！　進行！」
1659 = "「Xuất phát! Tiến lên!」"
# monologue
# JP: 御一夜駅のホームには、\nたくさんの人たちが待っている。
2499 = "Trên sân ga Ohimitera, có rất nhiều người đang chờ đợi."
# monologue
# JP: 速やかに入線、停止し、次の発車の準備。\n発車時刻までの間に、記念撮影などにも応じる。
2568 = "Nhanh chóng vào đường ray, dừng lại, và chuẩn bị cho chuyến khởi hành tiếp theo. Trong thời gian chờ đến giờ khởi hành, chúng tôi cũng đáp ứng các yêu cầu chụp ảnh kỷ niệm."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。発車時刻となります」
2109 = "「Ngài Soutetsu. Đã đến giờ khởi hành rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1725 = "「嗯」" 
# monologue
# JP: 僕がハチロクを小脇にかかえ、\nハチロクは大きな大きなベルを抱える。
2541 = "Tôi cắp Hachiroku vào nách, còn Hachiroku thì ôm một chiếc chuông thật lớn."
# 【ハチロク】
# display as 八六
# JP: 「湯医往復観光特急、\n『ＳＬ御一夜号』間もなく発車いたします！」
1950 = "「Tàu tốc hành du lịch khứ hồi Yui, \"SL Ohimitera\" chuẩn bị khởi hành!」"
# monologue
# JP: （カローーン！　カローーーーンっ！！）
2933 = "（Keng! Kengggg!!）"
# monologue
# JP: （ポーーーーーーーーーーっ！）
2919 = "（Uúúúúúúúúúúúú!）"
# monologue
# JP: 誇らしげな声。ベルの音。\n合わせて\\x%l汽笛;#00ffc040;汽笛%l;#;を、長く、長く、高らかに。
2809 = "Giọng nói đầy tự hào. Tiếng chuông. Cùng với đó là \\x%l汽笛;#00ffc040;tiếng còi hơi nước%l;#;, vang lên thật dài, thật dài, thật cao."
# monologue
# JP: 慌てて走るおばさんを、ポーレットがフォローする。\n乗り込むのを待ち、ドアを閉めるまでを確認する。
2725 = "Paulette hỗ trợ một người phụ nữ đang chạy đến vội vã. Chờ bà ấy lên tàu, và xác nhận cho đến khi cửa đóng lại."
# 【日々姫】
# display as 日日姬
# JP: 「\\x%l客車;#00ffc040;客車%l;#;ドア良し！」
1383 = "「Cửa \\x%l客車;#00ffc040;toa hành khách%l;#; an toàn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l客車;#00ffc040;客車%l;#;ドア良し。出発、進行！」
1382 = "「Cửa \\x%l客車;#00ffc040;toa hành khách%l;#; an toàn. Xuất phát, tiến lên!」"
# monologue
# JP: そして、\\x%l列車;#00ffc040;列車%l;#;は滑り出す。
84 = "Và rồi, \\x%l列車;#00ffc040;đoàn tàu%l;#; bắt đầu lăn bánh."
# monologue
# JP: 無論、\\x%l連結器;#00ffc040;連結器%l;#;は伸びきらせてある。\n発車ショックはいささかたりとも発生しない。
2754 = "Tất nhiên, \\x%l連結器;#00ffc040;khớp nối toa xe%l;#; đã được kéo căng hết cỡ. Cú xóc khi khởi hành sẽ không xảy ra dù chỉ một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「……制限解除、良しっ！」
1393 = "「...Hủy bỏ giới hạn, an toàn!」"
# monologue
# JP: 河村廃駅先の制限解除標を超えれば、\n線路の脇の森の深さが濃くなっていく。
2894 = "Vượt qua biển báo hủy bỏ giới hạn ở phía trước ga bỏ hoang Kawamura, khu rừng ven đường ray ngày càng trở nên rậm rạp hơn."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。運転操作、お任せください」
2110 = "「Ngài Soutetsu. Thao tác điều khiển, xin cứ giao cho tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1725 = "「嗯」" 
# monologue
# JP: 人もほとんど踏み込めぬような森ではあるが、\n線路上、どんな異変が発生するかはわからない。
2866 = "Tuy là khu rừng hầu như không có người bước chân vào, nhưng trên đường ray, không ai biết được sẽ có biến cố gì xảy ra."
# monologue
# JP: 前方注視の必要性は、\n本線走行中、いかなる場所でも変わらない。
2376 = "Tầm quan trọng của việc chú ý quan sát phía trước, trong khi đang chạy trên tuyến chính, thì ở bất cứ nơi nào cũng không thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、代わろう」
1900 = "「Hibiki, đổi chỗ nào.」"
# 【日々姫】
# display as 日日姬
# JP: 「はい、兄さん」
1734 = "「Vâng, anh trai.」"
# monologue
# JP: \\x%lレイルロオド;#00ffc040;レイルロオド%l;#;はともかくとして、\n人間の集中力はどうしても散っていくものだ。
82 = "\\x%lレイルロオド;#00ffc040;Railord%l;#; thì không nói, nhưng sự tập trung của con người kiểu gì cũng sẽ bị phân tán."
# monologue
# JP: だから日々姫と交代し、投げ込みで体を動かすことで、\n漫然と沈みかけていた意識をも活性化させていく。
2587 = "Thế nên tôi đổi chỗ với Hibiki, bằng cách vận động cơ thể qua việc xúc than, để kích hoạt lại ý thức đang dần chìm vào trạng thái lơ đãng."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん、さっきのお話ですけど」
1696 = "「Anh trai, chuyện lúc nãy ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1702 = "「Hửm?」"
# 【日々姫】
# display as 日日姬
# JP: 「延伸って、物凄くお金かかっちゃうんじゃないですか？\nなのに、どうしてこのタイミングで――」
1796 = "「Kéo dài tuyến đường, chẳng phải sẽ tốn một khoản tiền khổng lồ sao? Vậy mà, tại sao lại vào lúc này——」"
# monologue
# JP: 日々姫は前方を注視したまま、\n僕は投げ込みのペースを守って。
2673 = "Hibiki vẫn chú ý quan sát phía trước, còn tôi thì duy trì nhịp độ xúc than."
# monologue
# JP: そうしながらも、会話になんらの支障はない。\nその程度には、僕らも経験を積めてきている。
2525 = "Dù làm vậy, cuộc trò chuyện cũng không hề bị cản trở. Chúng tôi cũng đã tích lũy được kinh nghiệm đến mức độ đó rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、お前が言ったことだぞ？\n線路は本来、どこまでも続くべきものだと」
1903 = "「Hibiki, đó là điều em đã nói mà? Đường ray vốn dĩ, là thứ nên trải dài đến bất cứ đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「それは……\\x%l客車;#00ffc040;客車%l;#;改修事業が上手くいって、\n各地が元気になったら、っていうお話で」
2078 = "「Chuyện đó... là nói đến lúc dự án cải tạo \\x%l客車;#00ffc040;toa hành khách%l;#; diễn ra suôn sẻ, và các nơi đều trở nên phát triển kìa.」"
# monologue
# JP: 市長になって、日々姫に見える“現実”も、\nやはり変化をしているのだろう。
2751 = "Trở thành thị trưởng, \"hiện thực\" mà Hibiki nhìn thấy, quả nhiên cũng đang thay đổi."
# monologue
# JP: 演説のときよりぐっと、日々姫は大人び、\n足元を気にするようにしながら言葉を選んでいる。
2706 = "So với lúc diễn thuyết, Hibiki đã trưởng thành hơn rất nhiều, vừa cẩn thận lựa chọn từ ngữ vừa để ý đến thực tế trước mắt."
# 【日々姫】
# display as 日日姬
# JP: 「今延伸をするっていうのは、\nいくらなんでも焦りすぎって思うんです」
1961 = "「Em nghĩ việc kéo dài tuyến đường bây giờ, dù nói thế nào đi nữa cũng là quá vội vàng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「仮に、各地の鉄道が活性化すれば――\nそれで自然に、線路は復線されていくものか？」
1772 = "「Giả sử, đường sắt ở các nơi được phục hồi——thì đường ray sẽ tự nhiên được khôi phục lại sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「それは……」
2052 = "「Cái đó...」"
# monologue
# JP: 事実、あの毛利電気鉄道でさえ、\n廣島市内から１メートルも、線路を延伸させていない。
2305 = "Thực tế, ngay cả Đường sắt Điện lực Mouri kia, cũng chưa kéo dài đường ray ra khỏi thành phố Hiroshima dù chỉ 1 mét."
# monologue
# JP: “自然と復線”に期待するのは、\n状況がかなり好転したとて難しかろう。
2510 = "Việc kỳ vọng vào \"tự nhiên khôi phục tuyến đường\", dù tình hình có khả quan đến mấy cũng khó mà xảy ra."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、ゆえに示そうとしているのだ。\n線路を延伸し、つなぐことによるメリットを」
1877 = "「Paulette, vì thế mới đang cố gắng chứng minh. Những lợi ích mang lại từ việc kéo dài và kết nối đường ray.」"
# 【日々姫】
# display as 日日姬
# JP: 「メリット、具体的にはどんな感じになりますか？」
1654 = "「Lợi ích, cụ thể là như thế nào ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1725 = "「嗯」" 
# monologue
# JP: ざく、と石炭を一杯投げ込む。\n赤く舞い上がる火の粉はまるで、命の輝きを思わせる。
2575 = "Phập, tôi xúc một xẻng than ném vào. Những tia lửa đỏ rực bay lên, hệt như sự tỏa sáng của sinh mệnh."
# 【双鉄】
# display as 雙鐵
# JP: 「まず、設備。極端な話、[こくら,1]粉蔵まで延伸できれば、\n新造せずとも、巨大な改修設備を使えるようになる」
2117 = "「Trước tiên là thiết bị. Nói một cách cực đoan, nếu có thể kéo dài đến Kokura, thì dù không xây mới, chúng ta vẫn có thể sử dụng cơ sở cải tạo khổng lồ ở đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「それは、コストに見合うほどのメリットですか？\n負担が、あまりにも大きくなるように思いますけど」
2057 = "「Đó có phải là lợi ích tương xứng với chi phí không ạ? Em nghĩ gánh nặng sẽ trở nên quá lớn đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「無論、分担するのです。延伸先の鉄道会社のみならず、\n沿線の自治体などにも、資金や土地の提供を要請して」
1965 = "「Tất nhiên là phải san sẻ rồi. Không chỉ công ty đường sắt ở nơi kéo dài đến, mà còn yêu cầu các chính quyền địa phương dọc tuyến đường cung cấp nguồn vốn và đất đai nữa.」"
# monologue
# JP: それが、セオリーなのだろう。\n僕の考えと同じことを、ハチロクはさらりと口にする。
2748 = "Đó, có lẽ là lý thuyết. Hachiroku thản nhiên nói ra điều giống hệt suy nghĩ của tôi."
# 【日々姫】
# display as 日日姬
# JP: 「でも、今、このへんの地方自治体は、\nどこも財政難ですよ？」
1590 = "「Nhưng mà, bây giờ, chính quyền địa phương quanh đây, chỗ nào cũng đang gặp khó khăn về tài chính mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「『より大きなメリット』を示せば、発展の――\nいや、逆転のための投資を検討してもらえるさ」
1671 = "「Nếu cho họ thấy \"lợi ích to lớn hơn\", thì họ sẽ xem xét việc đầu tư cho sự phát triển——không, là để lật ngược tình thế.」"
# monologue
# JP: 事実、御一夜がそうだった。\nデメリットの大きさに目を瞑っても、工場誘致を望んだ。
2304 = "Thực tế, Ohimitera đã từng như vậy. Dù nhắm mắt làm ngơ trước những nhược điểm to lớn, họ vẫn mong muốn thu hút nhà máy."
# monologue
# JP: 日々姫もそこは承知でき――\nそれでも、納得は出来ぬ様子だ。
2675 = "Hibiki cũng hiểu điều đó——nhưng có vẻ vẫn chưa thể chấp nhận được."
# 【日々姫】
# display as 日日姬
# JP: 「わかりますけど――巨額投資でお釣りがでるほどの\nメリット、感じてもらえますかね？」
2105 = "「Em hiểu nhưng mà——liệu họ có cảm nhận được lợi ích lớn đến mức đủ để bù đắp cho khoản đầu tư khổng lồ không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「例えばだ。九洲全土の路線がつながり、そこを、\n九洲一周夜行寝台\\x%l列車;#00ffc040;列車%l;#;が走ると考えれば――どうだ？」
1933 = "「Ví dụ nhé. Toàn bộ tuyến đường trên toàn Kyushu được kết nối, và trên đó, có một chuyến \\x%l列車;#00ffc040;đoàn tàu%l;#; giường nằm chạy đêm vòng quanh Kyushu——thì sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ！」
# 1708 = "「啊！」" 
# monologue
# JP: 明るい声と、後ろ姿でもはっきりわかる大きな頷き。
2429 = "Một giọng nói tươi sáng, cùng cái gật đầu mạnh mẽ có thể nhìn rõ ngay cả từ phía sau."
# 【日々姫】
# display as 日日姬
# JP: 「そっか……線路の繋がりが産み出すのは、\n車輌需要なんて小さなものだけじゃないんですね」
1922 = "「Ra vậy... sự kết nối của đường ray mang lại, không chỉ là những thứ nhỏ bé như nhu cầu về toa xe nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1725 = "「嗯」" 
# monologue
# JP: 繋がることの相乗効果は、無限の可能性を秘めている。
2799 = "Hiệu ứng hiệp đồng của việc kết nối, ẩn chứa những khả năng vô hạn."
# monologue
# JP: しかし手を、差し伸べ合うことができないのなら、\n１の力は、その１のまま、いずれは０となっていくだろう。
2289 = "Nhưng nếu không thể vươn tay ra giúp đỡ lẫn nhau, thì sức mạnh của 1, vẫn chỉ là 1, rồi cuối cùng sẽ trở về 0."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、こちらから手を差し出すのだ。\nどんなに小さな延伸でもいい。繋がりの力を示すのだ」
1883 = "「Thế nên, chúng ta phải chủ động vươn tay ra. Dù là sự kéo dài nhỏ đến mức nào cũng được. Phải chứng minh sức mạnh của sự kết nối.」"
# 【日々姫】
# display as 日日姬
# JP: 「納得しました。\nわたしも、延伸に一票です！」
1866 = "「Em đã hiểu rồi. Em cũng, bỏ một phiếu cho việc kéo dài!」"
# monologue
# JP: いって、日々姫は前方注視を崩さぬままに――\nそれでも背中で、全身で、ハっとするほど鮮やかに笑う。
2370 = "Nói rồi, Hibiki vẫn không rời mắt khỏi phía trước——nhưng từ bóng lưng, từ toàn thân em ấy, lại tỏa ra một nụ cười rạng rỡ đến sững sờ."
# 【日々姫】
# display as 日日姬
# JP: 「やっぱり凄いですね、兄さんは。\n九洲全土の観光地を繋いじゃうなんていうプラン――」
1694 = "「Quả nhiên anh trai tuyệt thật đấy. Kế hoạch kết nối tất cả các địa điểm du lịch trên toàn Kyushu——」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1580 = "「Không.」"
# monologue
# JP: それは、違う。\n考えるより先に言葉が出て行くほどに。
2292 = "Điều đó, không đúng. Đến mức lời nói tuôn ra trước cả khi kịp suy nghĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「お前は誰より、そのことを理解できている。\n僕に、それを教えてくれたのは、日々姫――お前だ」
1623 = "「Em là người hiểu rõ điều đó hơn bất kỳ ai. Người đã dạy cho anh điều đó, chính là Hibiki——là em đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　いえ、あの演説は」
1692 = "「Hả? Không, bài diễn thuyết đó là...」"
# 【双鉄】
# display as 雙鐵
# JP: 「演説のことなど、一部にすぎん」
1951 = "「Chuyện diễn thuyết, chỉ là một phần nhỏ thôi.」"
# monologue
# JP: 日々姫が教えてくれたのは、\nもっとずうっと、大きなことだ。
2652 = "Điều Hibiki đã dạy cho tôi, còn lớn lao hơn thế rất nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「ジオラマをみなで作っていた時、\n笑顔をつなげて、広がる力を教えてくれた」
1757 = "「Lúc mọi người cùng nhau làm sa bàn, em đã dạy anh về sức mạnh của việc kết nối và lan tỏa những nụ cười.」"
# monologue
# JP: 言葉に、思考が追いついていく。\nそうだ。その輪の中心で、いつも日々姫は描いていた。
2553 = "Suy nghĩ bắt kịp lời nói. Đúng vậy. Ở trung tâm của vòng tròn đó, Hibiki luôn luôn vẽ."
# monologue
# JP: 日々姫がもしも居なければ、日々姫の絵がなかったら、\n稀咲と僕らがつながることも、決してなかった。
2444 = "Nếu như không có Hibiki, nếu không có những bức tranh của Hibiki, thì chúng tôi và Kisaki, tuyệt đối đã không thể kết nối với nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲が僕らの中に加わり、\n御一夜鉄道はさらなる飛躍を遂げつつある」
1994 = "「Kisaki gia nhập vào nhóm chúng ta, và Đường sắt Ohito đang dần đạt được những bước tiến xa hơn nữa.」"
# monologue
# JP: いいや、稀咲だけじゃない。
2291 = "Không, không chỉ có Kisaki."
# monologue
# JP: 僕自身――\n誰より僕が、日々姫のおかげで、他の人達と繋がれたのだ。
2685 = "Bản thân tôi——Hơn ai hết, chính nhờ có Hibiki, mà tôi mới có thể kết nối với những người khác."
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道も人も同じ。孤立していてはその価値を活かせない。\nそのことを、日々姫――僕に、お前が教えてくれたのだ」
2096 = "「Đường sắt hay con người cũng vậy. Nếu bị cô lập thì không thể phát huy được giá trị của mình. Điều đó, Hibiki——chính em đã dạy cho anh.」"
# 【日々姫】
# display as 日日姬
# JP: 「それは……私だって同じです。\n兄さんが、応援をしてくれたから――」
2053 = "「Cái đó... em cũng vậy mà. Vì anh đã, luôn ủng hộ em——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1725 = "「嗯」" 
# monologue
# JP: だったら、嬉しい。\n素直にとても。
2559 = "Nếu vậy thì, thật vui. Thực sự rất vui."
# monologue
# JP: 手と手をつなぎ合うことで、孤独の中で泣いてた僕らが、\n誰かの笑顔を、作る力になれたのだから。
2400 = "Bằng cách nắm lấy tay nhau, những kẻ từng khóc trong cô độc như chúng tôi, đã có thể trở thành sức mạnh để tạo ra nụ cười cho một ai đó."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
# 1899 = "「日日姬」" 
# monologue
# JP: 愛しい名を呼ぶ。\nかけがえのない存在と、日々姫のことを強く感じる。
2537 = "Gọi cái tên thân thương. Tôi cảm nhận mãnh liệt rằng Hibiki là một sự tồn tại không thể thay thế."
# monologue
# JP: 欠けてしまった半身を埋めることなどできないけれど、\n日々姫が側にいてくれるなら、僕は――
2882 = "Dù không thể lấp đầy một nửa cơ thể đã mất đi, nhưng nếu có Hibiki ở bên cạnh, tôi——"
# monologue
# JP: （路子……僕はここから進んでいくさ）
2931 = "（Michi... anh sẽ tiến bước từ đây.）"
# monologue
# JP: あの\\x%l客車;#00ffc040;客車%l;#;を降り、そこから先に続く未来さえ、\n日々姫は僕に示してくれた。
2671 = "Ngay cả tương lai tiếp nối sau khi bước xuống khỏi \\x%l客車;#00ffc040;toa hành khách%l;#; đó, Hibiki cũng đã chỉ cho tôi thấy."
# monologue
# JP: この御一夜から――\nこの\\x%l8620;#00ffc040;8620%l;#;の\\x%l運転台;#00ffc040;運転台%l;#;から。どこまでも。
2495 = "Từ Ohimitera này——từ \\x%l運転台;#00ffc040;buồng lái%l;#; của chiếc \\x%l8620;#00ffc040;8620%l;#; này. Bất kể là đi đến đâu."
# 【日々姫】
# display as 日日姬
# JP: 「兄さん？」
1697 = "「Anh trai?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1741 = "「Hửm?」"
# 【ハチロク】
# display as 八六
# JP: 「何かあったのですか？　\\x%l投炭;#00ffc040;投炭%l;#;の音が止まりましたが」
1811 = "「Có chuyện gì vậy ạ? Tiếng \\x%l投炭;#00ffc040;xúc than%l;#; dừng lại rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや。何事もない。\n少し、ぼんやりとしてしまっただけだ」
1709 = "「A, không. Không có chuyện gì đâu. Anh chỉ hơi lơ đãng một chút thôi.」"
# monologue
# JP: ハチロクも日々姫も前方注視を崩していない。\n僕の目がほんの一瞬、過去を懐かしんでしまっただけだ。
2335 = "Cả Hachiroku và Hibiki đều không rời mắt khỏi phía trước. Chỉ là ánh mắt của tôi, trong một khoảnh khắc ngắn ngủi, đã hoài niệm về quá khứ mà thôi."
# monologue
# JP: だから――\n改めて前を向く。
2611 = "Vì thế——tôi lại một lần nữa hướng về phía trước."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
# 1899 = "「日日姬」" 
# 【日々姫】
# display as 日日姬
# JP: 「は、はいっ！」
1717 = "「V-Vâng!」"
# monologue
# JP: 緊張した声。\n背筋がぴぃんと一気に伸びる。
2798 = "Giọng nói căng thẳng. Sống lưng em ấy bỗng chốc vươn thẳng tắp."
# monologue
# JP: （ああ、いかん。\nこう緊張させては、それこそ事故につながりかねない）
2917 = "（A, không được rồi. Làm em ấy căng thẳng thế này, có khi lại dẫn đến tai nạn mất.）"
# monologue
# JP: 理解すれば、逆に笑えてリラックスできる。
2747 = "Nhận ra điều đó, tôi lại bật cười và thư giãn."
# monologue
# JP: バカか、僕は。焦りすぎだ。\n営業運転の最中に、伝えるべきことではないだろう。
2558 = "Mình bị ngốc à. Vội vàng quá rồi. Đâu phải là chuyện nên nói giữa lúc đang chạy tàu chở khách cơ chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜駅に折り返したら、少し、時間を貰えるか。\n大事なことを話したいんだ」
1996 = "「Khi nào quay lại ga Ohimitera, cho anh xin một chút thời gian được không. Anh có chuyện quan trọng muốn nói.」"
# 【日々姫】
# display as 日日姬
# JP: 「は、はいっ！」
1714 = "「V-Vâng!」"
# monologue
# JP: 後ろ姿の日々姫の首が赤くなる。\nボイラであれば、爆発寸前の雰囲気だ。
2806 = "Nhìn từ phía sau, cổ của Hibiki đỏ bừng lên. Nếu là lò hơi thì chắc là bầu không khí sắp phát nổ đến nơi rồi."
# 【日々姫】
# display as 日日姬
# JP: 「私――あのッ――えとっ、\n\\x%l投炭;#00ffc040;投炭%l;#;、代わりますっ！！！」
1826 = "「Em——à ừm——để em, thay anh \\x%l投炭;#00ffc040;xúc than%l;#; cho!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「停止位置、良し。\\x%l単弁;#00ffc040;単弁%l;#;、緩ブレーキ。\n\\x%l逆転機;#00ffc040;逆転機%l;#;、\\x%lミッドギア;#00ffc040;ミッドギア%l;#;」
1632 = "「Vị trí dừng, an toàn. \\x%l単弁;#00ffc040;Van hãm đơn%l;#;, phanh nhẹ. \\x%l逆転機;#00ffc040;Cần đảo chiều%l;#;, \\x%lミッドギア;#00ffc040;tầm trung%l;#;.」"
# 【ハチロク】
# display as 八六
# JP: 「良い運転でした。\n双鉄様、日々姫。お疲れ様でした」
2119 = "「Lái tàu tốt lắm ạ. Ngài Soutetsu, Hibiki. Hai người vất vả rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1725 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「お疲れ様ー」
2042 = "「Vất vả rồi nha~」"
# monologue
# JP: \\x%lタブレット;#00ffc040;タブレット%l;#;を手早くはめ替えて、\nハチロクは整備ボディに代わる。
2340 = "Nhanh chóng thay \\x%lタブレット;#00ffc040;thẻ bảng%l;#;, Hachiroku chuyển sang thân bảo dưỡng."
# monologue
# JP: 代わるやいなやでスタスタと、\n一人、\\x%l運転台;#00ffc040;運転台%l;#;を降りていく。
2357 = "Vừa mới chuyển đổi xong, em ấy đã vội vã, một mình bước xuống khỏi \\x%l運転台;#00ffc040;buồng lái%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「改札を手伝ってきます。\n戻るまで、小休止していてください」
1843 = "「Tôi đi giúp soát vé đây. Cho đến khi tôi quay lại, hai người cứ nghỉ ngơi một chút đi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1923 = "「Vậy à.」"
# monologue
# JP: タラップを降り、\nそのままハチロクは改札口へと向かっていく。
2337 = "Bước xuống cầu thang, Hachiroku cứ thế tiến thẳng về phía cổng soát vé."
# monologue
# JP: \\x%l客車;#00ffc040;客車%l;#;を降りた人たちが、すぐさまハチロクに群がって、\n記念撮影を一緒にしようとせがんでいる。
2850 = "Những người vừa xuống khỏi \\x%l客車;#00ffc040;toa hành khách%l;#; ngay lập tức vây quanh Hachiroku, nài nỉ em ấy chụp ảnh kỷ niệm cùng."
# 【日々姫】
# display as 日日姬
# JP: 「大人気ですね、ハチロク」
1650 = "「Hachiroku được yêu mến quá nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「当然だろうな。\nアレは綺麗な上、なかなか気の利いたことも言う」
1963 = "「Đương nhiên rồi. Vừa xinh đẹp, lại còn biết nói những câu rất tinh tế nữa chứ.」"
# 【日々姫】
# display as 日日姬
# JP: 「む～～っ」
1703 = "「Ưm~~」"
# monologue
# JP: いきなり、日々姫がぷぅと膨れる。
2661 = "Đột nhiên, Hibiki phồng má lên."
# monologue
# JP: それが可愛くて頬をつつけば、\nもっと頬をふくらせて、僕の指先を押し返してくる。
2563 = "Thấy đáng yêu quá nên tôi chọc vào má em ấy, em ấy lại càng phồng má to hơn, đẩy bật ngón tay tôi ra."
# 【双鉄】
# display as 雙鐵
# JP: 「面白いやつだな、日々姫は」
1626 = "「Em thú vị thật đấy, Hibiki à.」"
# 【日々姫】
# display as 日日姬
# JP: 「私は面白いで、ハチロクは綺麗とか～」
1859 = "「Em thì thú vị, còn Hachiroku thì xinh đẹp sao~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そういうスネ方か」
1712 = "「À, ra là hờn dỗi kiểu đó à.」"
# monologue
# JP: アホだと思えば、なお愛おしい。
2883 = "Dù nghĩ là ngốc nghếch, nhưng lại càng thấy đáng yêu hơn."
# monologue
# JP: ふくれた頬ごと抱きしめて、\n髪をなでつつ、思うがままの言葉を紡ぐ。
2543 = "Tôi ôm trọn lấy đôi má đang phồng lên ấy, vừa vuốt ve mái tóc, vừa buông những lời nói theo đúng suy nghĩ của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクと日々姫との綺麗さにさほどの優劣はあるまい。\n優劣がもし生じるならば、それは好みの問題だ」
1647 = "「Sự xinh đẹp của Hachiroku và Hibiki không chênh lệch nhau là mấy đâu. Nếu có sự chênh lệch, thì đó là vấn đề sở thích thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃには」
2103 = "「Anh hai thì.」"
# monologue
# JP: まだぷっと頬をふくらせたまま、\n胸の中、上目遣いして聞いてくる。
2434 = "Vẫn phồng má lên, nằm gọn trong lồng ngực tôi, em ấy ngước mắt lên hỏi."
# 【日々姫】
# display as 日日姬
# JP: 「どっちが好みと？　私と、ハチロク」
1845 = "「Thích ai hơn? Em, hay là Hachiroku.」"
# 【双鉄】
# display as 雙鐵
# JP: 「圧倒的に日々姫だ。\nそれはお前も知っているだろう？」
2086 = "「Chắc chắn là Hibiki rồi. Điều đó em cũng biết mà đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「それは……そうかもしれないけど～」
2060 = "「Cái đó... có thể là vậy nhưng mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「綺麗と、口先で言えば満足するのか？\n僕の行動と選択が、何より一番の証拠だろうさ」
2113 = "「Nói miệng là xinh đẹp thì em có thỏa mãn không? Hành động và lựa chọn của anh, chính là bằng chứng rõ ràng nhất đấy.」"
# monologue
# JP: 抱きしめる手を強くする。
2544 = "Vòng tay ôm em ấy siết chặt hơn."
# monologue
# JP: 日々姫の熱に早まっている僕の鼓動を、\n胸ごし、日々姫に隠さず伝える。
2574 = "Nhịp đập trái tim đang tăng nhanh vì hơi ấm của Hibiki, tôi truyền qua lồng ngực, không hề giấu giếm cho em ấy biết."
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
1707 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「綺麗も好みも関係無く、僕が愛する女は日々姫だ。\nそうでなければ、娶りたいなどとは望まんさ」
1679 = "「Bất kể xinh đẹp hay sở thích, người phụ nữ anh yêu là Hibiki. Nếu không phải vậy, anh đã chẳng mong muốn được cưới em làm vợ.」"
# 【日々姫】
# display as 日日姬
# JP: 「めっ、めとっ！？　娶る、って――」
1774 = "「C-Cưới!? Cưới, nghĩa là——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1725 = "「嗯」" 
# monologue
# JP: しまった。こんな大事なことを、\n流れの中で言ってしまった。
2789 = "Chết thật. Một chuyện quan trọng thế này, tôi lại thuận miệng nói ra mất rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。もっとムードのある状況で」
1783 = "「Xin lỗi. Đáng lẽ phải ở một khung cảnh lãng mạn hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「謝らんでっ！\nムードだなんだは、どうでもいいけんっ」
1582 = "「Đừng xin lỗi mà! Lãng mạn hay gì đó, không quan trọng đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 1923 = "「是嗎」" 
# monologue
# JP: まっすぐ日々姫に見つめられ、\n自分の愚かさを教えてもらう。
2816 = "Bị Hibiki nhìn thẳng vào mắt, tôi mới nhận ra sự ngốc nghếch của bản thân."
# monologue
# JP: そうだ、大事な話であるならあるほど、\n大切なのは、雰囲気などより、まごころだ。
2458 = "Đúng vậy, càng là chuyện quan trọng, thì điều cốt lõi, không phải là bầu không khí, mà là sự chân thành."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、調べた。義理の兄妹が結婚できるか」
1868 = "「Anh, đã tìm hiểu rồi. Liệu anh em nuôi có thể kết hôn được không.」"
# 【日々姫】
# display as 日日姬
# JP: 「出来る！　知ってる！\nそんなんわたし、ずうっと前に調べとるもん」
1675 = "「Được! Em biết! Chuyện đó em, đã tìm hiểu từ lâu lắc rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったか」
1926 = "「Vậy sao.」"
# monologue
# JP: ずうっと前がいつなのか、それを知りたい気持ちもあるが、\n今は、問うべき時じゃない。
2492 = "Từ lâu lắc là từ bao giờ, tôi cũng muốn biết, nhưng bây giờ, không phải lúc để hỏi."
# monologue
# JP: 日々姫が求めてくれている。\n僕も今すぐ伝えたい。
2650 = "Hibiki đang mong chờ điều đó. Tôi cũng muốn nói ra ngay bây giờ."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば日々姫。僕はお前にプロポーズする。\n願わくば、僕の伴侶になってくれ」
2090 = "「Vậy thì Hibiki. Anh cầu hôn em. Xin em, hãy trở thành bạn đời của anh.」"
# 【日々姫】
# display as 日日姬
# JP: 「はいっ！　なりますっ！！」
1729 = "「Vâng! Em đồng ý!!」"
# monologue
# JP: 即答、\nそして言葉があふれる。
2433 = "Trả lời ngay tắp lự, và rồi lời nói cứ thế tuôn trào."
# 【日々姫】
# display as 日日姬
# JP: 「今すぐなります、役所にいって、兄さんの妻に、伴侶に、\n女房に、奥さんに、ワイフになりますっ！」
1865 = "「Em đồng ý ngay bây giờ, mình đến tòa thị chính đi, em sẽ làm vợ, làm bạn đời, làm bà xã, làm hiền thê, làm wife của anh trai!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか――ありがとう」
1921 = "「Vậy à——cảm ơn em.」"
# 【日々姫】
# display as 日日姬
# JP: 「私っ！　私こそっ――私、こそっ――」
1875 = "「Em! Em mới là người——chính em, mới là người——」"
# 【双鉄】
# display as 雙鐵
# JP: 「何故泣くっ！？」
1625 = "「Sao em lại khóc!?」"
# 【日々姫】
# display as 日日姬
# JP: 「なぜって、そんなんっ――うれしいけんっ」
1955 = "「Sao á, thì là tại——em vui quá mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、まったく」
1718 = "「A, thật tình.」"
# monologue
# JP: 日々姫の感情が爆発している。\nそれほど僕を好いてくれ、無論、物凄く嬉しいが――
2659 = "Cảm xúc của Hibiki đang bùng nổ. Em ấy yêu tôi nhiều đến vậy, tất nhiên, tôi vô cùng sung sướng, nhưng mà——"
# monologue
# JP: これではムードも何も無い。\nいや……つまるところ、僕らはどうにもお似合いなのか。
2288 = "Thế này thì chẳng còn lãng mạn gì nữa. Không... suy cho cùng, hai đứa chúng tôi cũng thật xứng đôi vừa lứa nhỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、落ち着け。\n入籍するより前に、一つだけ頼みたいのだ」
2003 = "「Dù sao thì, bình tĩnh lại đã. Trước khi đăng ký kết hôn, anh có một việc muốn nhờ em.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　何をです？」
1689 = "「Hả!? Chuyện gì ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「墓参りをだ」
1578 = "「Đi viếng mộ.」"
# monologue
# JP: どう伝えようか悩んでいた。
2519 = "Tôi đã từng trăn trở không biết phải mở lời thế nào."
# monologue
# JP: なのに、今、\n何も構えずに言葉にできてる。
2287 = "Vậy mà, giờ đây, tôi lại có thể nói ra mà chẳng cần chuẩn bị gì."
# 【日々姫】
# display as 日日姬
# JP: 「お墓……参り」
1885 = "「Đi viếng... mộ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕には両親と妹が居た。\n今は、死んでしまっているが――」
1861 = "「Anh từng có bố mẹ và một người em gái. Bây giờ, họ đều đã qua đời rồi——」"
# monologue
# JP: 過去形で、家族のことを話してる。
2552 = "Tôi đang kể về gia đình mình, bằng thì quá khứ."
# monologue
# JP: 路子の、父さんの、母さんの死を――\n受け入れ、許し、許してもらったような気がする。
2513 = "Cái chết của Michi, của bố, của mẹ——Tôi cảm thấy mình đã chấp nhận, đã tha thứ, và cũng đã được thứ tha."
# 【双鉄】
# display as 雙鐵
# JP: 「それでも、紹介をしたいのだ。\n僕の妻。僕の、新しい家族のことを」
1588 = "「Dù vậy, anh vẫn muốn giới thiệu với họ. Về người vợ của anh. Về gia đình mới của anh.」"
# 【日々姫】
# display as 日日姬
# JP: 「はいっ！」
# 1727 = "「嗯！」" 
# monologue
# JP: 日々姫が、思い切り僕を抱きしめる。
2657 = "Hibiki, ôm chầm lấy tôi thật chặt."
# monologue
# JP: 頬のラインをなぞるようにして指で触れれば、\n日々姫は自然と顎を持ち上げ、目を閉じる。
2549 = "Khi tôi dùng ngón tay mơn trớn theo đường nét trên má, Hibiki tự nhiên ngước cằm lên, nhắm nghiền đôi mắt lại."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
# 1899 = "「日日姬」" 
# monologue
# JP: 今までのキスとは違うキス。\n緊張のせいか、遠い視線に気付いてしまう。
2386 = "Một nụ hôn khác hẳn với những nụ hôn từ trước đến nay. Có lẽ do căng thẳng, tôi bỗng nhận ra có ánh mắt đang nhìn từ đằng xa."
# 【日々姫】
# display as 日日姬
# JP: 「……？　兄さん？　どうかしましたか？」
1396 = "「...? Anh trai? Có chuyện gì sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、少し視線が気になってな」
1941 = "「Không, anh chỉ hơi để ý ánh mắt của người khác thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
# 1683 = "「哎！？」" 
# monologue
# JP: 日々姫がぎょっと体を起こす。
2656 = "Hibiki giật mình ngồi thẳng dậy."
# monologue
# JP: ハチロクがうまく誘導してくれたのだろうか？\nホームからはもう人影が消え――
2577 = "Có lẽ Hachiroku đã khéo léo dẫn dắt họ đi rồi chăng? Trên sân ga không còn bóng người nào nữa——"
# 【日々姫】
# display as 日日姬
# JP: 「ああ！」
# 1708 = "「啊！」" 
# monologue
# JP: 日々姫が笑う。
2662 = "Hibiki mỉm cười."
# monologue
# JP: 嬉しげに、僕の胸板に顔をすりつけ、\nそして再び、顎を持ち上げて僕を見る。
2441 = "Đầy vui sướng, em ấy cọ mặt vào vòm ngực tôi, và rồi lại ngước cằm lên nhìn tôi."
# 【日々姫】
# display as 日日姬
# JP: 「いいです。見せつけてあげちゃいますよ。\n御一夜のみんなに、私の素敵な旦那様を」
1584 = "「Không sao đâu. Cho họ xem luôn cũng được. Cho mọi người ở Ohimitera thấy, người chồng tuyệt vời của em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうするか」
1597 = "「Làm vậy nhé.」"
# monologue
# JP: 人の気配の無いホーム。\nその掲示板に大きなポスター。
2738 = "Sân ga vắng bóng người. Trên bảng thông báo là một tấm áp phích lớn."
# monologue
# JP: 日々姫が描いた、御一夜のみんなの笑顔をつないだ。
2701 = "Tấm áp phích do Hibiki vẽ, kết nối những nụ cười của mọi người ở Ohimitera."
# 【双鉄】
# display as 雙鐵
# JP: 「愛している。日々姫」
1855 = "「Anh yêu em. Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「愛してます。兄さん」
1854 = "「Em yêu anh. Anh trai.」"
