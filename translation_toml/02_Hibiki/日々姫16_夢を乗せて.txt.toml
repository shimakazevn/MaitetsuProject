# monologue
# JP: さすが稀咲と思っていたが、\nいや、ポーレットもさすがとしか言いようが無い。
2356 = "剛才我還想稀咲真不愧是稀咲，現在我不得不說波萊特也真不愧是波萊特。" 

# 【稀咲】
# display as 稀咲
# JP: 「おや？　双鉄は――」
1699 = "「哦？雙鐵你——」" 

# 【ハチロク】
# display as 八六
