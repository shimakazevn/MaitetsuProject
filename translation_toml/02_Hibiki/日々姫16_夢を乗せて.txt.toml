2461 = "小凪現在能有時間兼任導遊和宣傳也算是這個策略的產物之一。不過就算是她也不可能同時兼任導遊和\\x%l機関助士;#00ffc040;司爐%l;#;。" 

# 【双鉄】
# display as 雙鐵
