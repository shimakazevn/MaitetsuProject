# monologue
# JP: 日々姫が笑う。
2662 = "日日姬笑了起來。" 

# monologue
# JP: 嬉しげに、僕の胸板に顔をすりつけ、\nそして再び、顎を持ち上げて僕を見る。
2441 = "她高興地蹭著我的胸口，然後又抬起下巴仰望我。" 

# 【日々姫】
# display as 日日姬
# JP: 「いいです。見せつけてあげちゃいますよ。\n御一夜のみんなに、私の素敵な旦那様を」
1584 = "「不要緊的，就讓他們看看嘛。讓御一夜的大家看看我的老公有多麼帥氣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうするか」
1597 = "「也好」" 

# monologue
# JP: 人の気配の無いホーム。\nその掲示板に大きなポスター。
2738 = "無人的站台。站台上的告示板上貼著一張大大的海報。" 

# monologue
# JP: 日々姫が描いた、御一夜のみんなの笑顔をつないだ。
2701 = "正是日日姬畫的御一夜的人們露出燦爛笑容的那張。" 

# 【双鉄】
# display as 雙鐵
# JP: 「愛している。日々姫」
1855 = "「我愛你，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「愛してます。兄さん」
1854 = "「我愛你，哥哥」" 
