[script]
# lines: 422 
# 【議員】
# display as 議員
# JP: 「最後に、御一夜駅前整備についてお伺いいたします」
1929 = "「最後我想問一下關於御一夜車站周邊建設的問題」" 

# monologue
# JP: ……御一夜駅前に人形時計を設置して、\n御一夜観光のシンボルにする。
1372 = "……在御一夜車站設置一個人偶時鐘，讓它成為御一夜觀光的象徵物。" 

# monologue
# JP: 稀咲先輩のアイディアは、\nどの会派にも、基本線では賛同をしてもらえてる。
2778 = "稀咲學姐的這個創意基本得到了所有派別的贊同。" 

# 【議員】
# display as 議員
# JP: 「仕掛け時計の人形を、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を\n模した物に、という案なのですが――」
2101 = "「關於以\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;為原型來設計自動機時鐘人偶的提案——」" 

# monologue
# JP: けど、やっぱり細かな部分では、\nどうしても意見が食い違う。
2286 = "不過果然，一涉及到細節方面，大家的意見還是產生了分歧。" 

# monologue
# JP: 議員さんは、市民の代表。支持者の代弁者で――\n“誰かの利益”を確保しようとするものだから。
2404 = "因為議員是市民的代表，是支持者的代言人——也就是要確保“某些人的利益”的人。" 

# 【議員】
# display as 議員
# JP: 「確かに、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;は新しい御一夜のシンボルでしょう。\nが、真に御一夜を代表する名物は、伝統あるキジ馬です」
1981 = "「確實，\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;算是新御一夜的象徵吧。不過，真正能代表御一夜的名物可是擁有悠久傳統的雉子馬才對」" 

# monologue
# JP: この議員さんは、林業組合が支持母体。
2864 = "這個議員的後台是林業行會。" 

# monologue
# JP: 素朴でかわいい木工品であるキジ馬のイメージアップは、\n林業のイメージアップにも繋がる……ってことだと思う。
2320 = "他們肯定是想，如果能將既樸素又可愛的木工品雉子馬推廣出去的話，肯定也能連帶著提高林業的聲譽吧。" 

# 【日々姫】
# display as 日日姬
# JP: 「議員のご意見、大変興味深く伺わせていただきました」
1847 = "「我對各位議員的意見非常感興趣」" 

# monologue
# JP: 市長になるまで知らなかったけど、\n質疑応答での質問予定項目は、事前に通告されてくる。
2295 = "之前還沒成為市長的時候我一點都不知道，原來在提問環節，要提哪些問題都會事先告訴我。" 

# monologue
# JP: もちろんそれは、あらかじめ答弁を考えて、\n定例議会の限られた時間を、ロスなく有意義に使うためだ。
2753 = "當然這也是為了讓我能有更多的時間先思考答案，充分有意義地利用例行議會有限的時間吧。" 

# 【日々姫】
# display as 日日姬
# JP: 「また、観光組合様からも同様のご陳情をいただき、\n原案を修正する必要があるかと理解しております」
2058 = "「還有我也收到了來自旅遊行會的同樣內容的請願，理解當前有必要對原方案進行一定的修改」" 

# monologue
# JP: だから、私は困らない。
2584 = "所以我不會再為此煩惱。" 

# monologue
# JP: にぃにぃが、私のために考えてくれた、\n解決と改善を同時に果たす修正案を持っているから。
2402 = "因為我手上就拿著阿哥為了我而構思的一份能同時解決與改善問題的修正案。" 

# 【日々姫】
# display as 日日姬
# JP: 「こちらをご覧ください」
2019 = "「請看這裡」" 

# monologue
# JP: 図や表を見せて説明するとき、他の議員さんのほとんどは、\n秘書さん作成のフリップを使う。
2409 = "在給眾人展示圖表並說明的時候，其他的議員幾乎都使用秘書製作的圖板卡。" 

# monologue
# JP: けど私は、自分のスケッチブックしか使わない。\nそれが一番、私の気持ちをまっすぐ伝えてくれるから。
2285 = "不過我卻只使用自己的素描本。因為這樣才能最好地直接表達出我的想法。" 

# 【日々姫】
# display as 日日姬
# JP: (にぃにぃとだって、絵がきっかけで仲良くなれた。\n稀咲先輩とだって、絵を描いてたから知り合えた)
33 = "(和阿哥也是因為畫畫才關係那麼好的。稀咲學姐也是因為畫畫才認識的)" 

# monologue
# JP: その積み重ねが、私を強くしてくれる。\n今まで描いた全ての線が、私を支えてくれている。
2464 = "就是這一點一滴的積累才讓我變得更強。至今為止我畫出的所有的線條都在背後支持著我。" 

# monologue
# JP: 絵と一緒なら、言葉にだって迷わずに済む。
2378 = "只要我身邊有畫，我也不會吞吞吐吐的了。" 

# 【日々姫】
# display as 日日姬
# JP: 「新しい人形配置のラフスケッチです。毎正時に、\n時計正面のフタが開き、回転する仕組みを想定してます」
2055 = "「這是新人偶配置的粗略圖。計劃要做的機關會在每個整點打開時鐘前面的蓋子，然後讓它轉一圈」" 

# 【議員】
# display as 議員
# JP: 「ああ……これは……線路で作った輪の上で、\nたくさんの人形を回して、順次見せるということですか」
1706 = "「啊……這是……眾多的人偶在線路構成的圓環上依次轉圈嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を乗せたＳＬ、キジ馬、観光川下り船、\nウンスンカルタを競技する人たち――」
2038 = "「載著\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的蒸汽機車、雉子馬、觀光漂流船、玩嗚吋札的人們——」" 

# monologue
# JP: どれも、御一夜の名物だ。\nどれが一番だとかって、比べて順位がつくものじゃない。
2277 = "不論哪個都是御一夜的名物。它們不應該非得決出高下，排出名次。" 

# monologue
# JP: だから、かわいい人形にして、\nぐるぐるさせて、全部を見てもらえるようにする。
2580 = "所以就把它們全部做成可愛的人偶，讓它們轉圈，把它們全部展示給大家。" 

# 【日々姫】
# display as 日日姬
# JP: 「人形も時計も、御一夜の職人さんに製作依頼して――\n更に御一夜の色を出したシンボルにしていきたいと」
1601 = "「人偶和時鐘屆時都委託御一夜的工匠們來製作——要讓它們成為更能突出御一夜特色的象徵物」" 

# 【議員】
# display as 議員
# JP: 「なるほど」
1660 = "「原來如此」" 

# monologue
# JP: にぃにぃがくれた解決案が、\n議員さんも笑顔にしてくれる。
2879 = "阿哥寫的解決方案讓這位議員也露出了笑臉。" 

# 【議員】
# display as 議員
# JP: 「さすが市長、すばらしい修正案をありがとうございます。\nこれでしたら、より御一夜の魅力が伝わりますね」
1971 = "「真不愧是市長，感謝您提出如此優秀的修正案。如果按這個方案執行的話，一定能更好地彰顯御一夜的魅力」" 

# 【日々姫】
# display as 日日姬
# JP: 「ご賛同、ありがとうございます」
1819 = "「感謝您對這個方案表示贊同」" 

# monologue
# JP: もちろん、このアイディアにも難点はある。\n絶対“これも名産”“これこそ特産”って売り込みがくる。
2752 = "當然執行這個創意也有難點。到時肯定會有人以“這也是名產”“我的東西才是名產”為由，要求把自家的東西也加進去。" 

# monologue
# JP: その全部を仮に盛り込んだなら、全部が埋没してしまう。\nどれかを選んでどれかを捨てる――その選択は必要になる。
2443 = "如果把那些東西都加進去，那最後肯定是全部都被埋沒。必須要進行取捨——選擇哪些捨棄哪些。" 

# monologue
# JP: （だけど、それが正解だから）
2913 = "（不過，這才是正確的方法）" 

# monologue
# JP: ポーレットさんが教えてくれた。全会一致の玉虫色より、\n“過半数”――それを確保できる議案を目指すべきだって。
2865 = "這是波萊特小姐告訴我的。與其全場反應模稜兩可，應該努力去得出一個獲得半數以上支持的議案。" 

# monologue
# JP: そうするために意見や議論を真剣に交わし合うことが、\n結局は、御一夜の民意を一番正しく示すって。
2374 = "只有為此對議案進行真刀真槍的意見討論，最後的結果才能最正確地反映御一夜的民意。" 

# 【議員】
# display as 議員
# JP: 「ご答弁をありがとうございました。\n議長。私からは以上です」
1820 = "「感謝您的回答。議長，我的問題就是這些了」" 

# monologue
# JP: 拍手、議場のあちこちから。
2497 = "從議會廳的各處都傳來了拍手聲。" 

# monologue
# JP: いい質問をもらえたおかげで、いい答弁ができたかなって、\n安心できて、嬉しくなる。
2420 = "多虧了這麼好的問題，我才能回答得這麼好，這下終於安心了。我的心也很快樂。" 

# 【議長】
# display as 議長
# JP: 「的場議員の質問を終わります。\n以上にて、定例市議会本日の日程を終了します」
1970 = "「的場議員的提問結束。今天的例行市議會的日程就到此為止」" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがとうございました！」
1818 = "「感謝大家！」" 

# monologue
# JP: よかった。\nこれで今日の質疑も乗り切れた。
2423 = "太好了，總算熬過今天的提問環節了。" 

# monologue
# JP: 稀咲先輩のおかげで今は、大きな対立の無い状態だけど、\nそれでもやっぱりホッとする。
2419 = "多虧了稀咲學姐，現在議會裡的對立情緒不是很嚴重。不過我還是放心了。" 

# monologue
# JP: （悪意が無い質問だって、答弁間違えたらこじれるし。\n……ポーレットさん、本当に大変だったんだな）
2922 = "（就算問題沒有惡意，要是回答錯誤了也會很麻煩的。……波萊特小姐她真是很不容易啊）" 

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致議案は廃案で議決されたけど……、\n対立が激しかった頃には、質疑応答も酷かったって聞いた。
78 = "\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠引進議案最後雖然被議決為廢案……不過我聽說當兩派對立十分激烈的時候，提問環節也很嚴酷。" 

# monologue
# JP: 予定に無い質問をいきなりぶつけられたり、\n答弁の資料を隠されたりとか、あったって。
2705 = "比如突然拋出一個沒有寫在預定表裡的問題，或者是故意藏起市長的答辯資料等等。" 

# monologue
# JP: （その中でも、ポーレットさん、\n勝てなくても、負けなかったから――）
2924 = "（就算是在這種情況下，波萊特小姐就算沒贏，也至少沒有輸——）" 

# monologue
# JP: だから、工場誘致反対派は切り崩されなかった。\n環境を、クマ川を守ろうという声はかき消されなかった。
2582 = "所以工廠引進反對派才沒有瓦解。想要保護環境、守衛隈河的聲音也才沒有被掩蓋住。" 

# monologue
# JP: それがどんなに凄いことか、\n議場に立って、初めてわかった。
2556 = "我直到親自站到議會廳上才清楚這是多麼了不起的一件事。" 

# 【日々姫】
# display as 日日姬
# JP: 「私……すごく幸運なんだ」
1828 = "「我……真的是特別幸運呢」" 

# monologue
# JP: ポーレットさんが政治の先生をしてくれるから、\n私でも、こうして市長をなんとかかんとかこなせてる。
2418 = "多虧了有波萊特小姐當我的政治老師，我才能像現在這樣勉強應付市長的工作。" 

# 【日々姫】
# display as 日日姬
# JP: 「みんなに――私、支えてもらえてるんだ」
1755 = "「大家——都在背後支持著我」" 

# monologue
# JP: にぃにぃだけじゃない、稀咲先輩だけじゃない。
2276 = "不光是阿哥和稀咲學姐。" 

# monologue
# JP: ポーレットさんも、ねぇねぇもハチロクもれいなちゃんも、\n凪ちゃんもふかみちゃんも――ほんとに、みんなに。
2875 = "還有波萊特小姐、阿姐、八六、玲奈，小凪和深美——還有許許多多的人。" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、私も。少しでも」
1881 = "「所以，我也要更努力一點才行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
1899 = "「日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ！」
1708 = "「啊！」" 

# monologue
# JP: にぃにぃ、って声が出かけて、\n慌てて呑み込む。
2539 = "我差點要喊出阿哥這兩個字，又慌忙咽了回去。" 

# monologue
# JP: ここは議場で、私は市長で、にぃに――兄さんは第一秘書。\n公私をきちんとわきまえないと兄さんに迷惑をかけるから。
2867 = "這裡是議會廳，我是市長，阿哥——哥哥是我的首席秘書。要是不分清楚公私場合可是會給哥哥添麻煩的。" 

# monologue
# JP: （でも、嬉しいな。\nにぃに、迎えにきてくれたんだ！）
2912 = "（不過，真讓人高興啊。阿哥來接我了！）" 

# monologue
# JP: 議場には、原則的には議員だけしか入れない。\n秘書だってその例外じゃない。
2841 = "議會廳原則上只允許議員進入。即使是秘書也不例外。" 

# monologue
# JP: だから議場の扉のぎりぎり半歩だけ前から、\nにぃにぃは私のことを呼んでくれてる。
2590 = "所以阿哥就走到離議會廳門半步的地方叫我。" 

# 【議長】
# display as 議長
# JP: 「市長、お呼びのようですが。\nお時間、大丈夫ですか？」
1792 = "「市長，有人在叫您呢。您的時間安排不要緊嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1683 = "「哎！？」" 

# monologue
# JP: 時間って。だって、議会が閉じたばっかりなんだから\n――っ！！？
2683 = "時間？議會不是剛剛閉會嗎——！！？" 

# 【日々姫】
# display as 日日姬
# JP: 「え！？　やだ、遅刻しちゃうっ！」
1685 = "「哎！？不好，要遲到了！」" 

# monologue
# JP: ドって、議場から笑いが起きる。
2842 = "議會廳裡瞬間爆發出一陣鬨笑。" 

# monologue
# JP: あああ、ダメ、これ、\n公私、私が線引き失敗しちゃってる！
2393 = "啊啊啊，不行，我又沒把公私劃分清楚！" 

# 【議長】
# display as 議長
# JP: 「議員諸兄。参考人、右田双鉄秘書の議場への入場を\n許可してもよろしいですか？」
1676 = "「各位議員。可以允許陳述人右田雙鐵秘書進入議會廳嗎？」" 

# 【議員】
# display as 議員
# JP: 「異議なーし！」
1940 = "「沒有異議！」" 

# 【議長】
# display as 議長
# JP: 「賛成多数と認めます。\nでは、右田双鉄秘書の議場入場を許可します」
1752 = "「多數贊成。那現在允許右田雙鐵秘書進入議會廳」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます、議長さん、みなさん」
2114 = "「非常感謝議長和各位議員」" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ、あの、すぐ準備」
2092 = "「那，那個，我馬上就準備」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も手伝う。大丈夫」
1830 = "「我也來幫你吧。沒事的」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――うんっ！」
1704 = "「啊——嗯！」" 

# monologue
# JP: にぃにぃの声、にぃにぃの温度、にぃにぃの匂い。\nそれが近くに来てくれただけで、落ち着ける。
2881 = "阿哥的聲音、阿哥的溫度、阿哥的氣味。光是這一切來到我的身邊，我就感到很安心。" 

# monologue
# JP: 早くしなきゃって混乱してた頭と体が、\nまずは片付けからだって、一致し動き始めてくれる。
2355 = "剛才因為太急，頭腦和身體陷入了混亂，而現在它們也一致決定先進行整理，開始步調一致地行動起來。" 

# 【日々姫】
# display as 日日姬
