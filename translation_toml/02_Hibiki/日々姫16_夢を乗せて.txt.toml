2087 = "「那麼新人\\x%l機関助士;#00ffc040;司爐%l;#;第一次執行乘務的那天，我和日日姬就去作為乘客乘上\\x%l8620;#00ffc040;８６２０%l;#;吧」" 

# 【ハチロク】
