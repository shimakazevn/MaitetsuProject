1766 = "「好像有個叫毛利的……電車公主來著吧？她對我們交付的\\x%l客車;#00ffc040;客運車廂%l;#;的品質非常滿意」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1725 = "「嗯」" 

