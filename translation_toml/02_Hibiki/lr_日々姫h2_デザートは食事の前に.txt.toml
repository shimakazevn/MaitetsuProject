1185 = "「Thế thì——sao, lại——ưm, hia! A! Trần, trụi, thế này——tuyệt, quá——ngi! ——Khoái, cảm.」"
# monologue
# JP: （ずびゅっ！　ごりゅ！　ぶびゅっ！　どちゅんっ！）
# 1675 = "（啾嚕、啾嚕、啾嚕、啾嚕！）" 
# monologue
