939 = "「Hi——a! A! A! Sao, lại—— thế, này——fu, a——hôm nay, lạ, quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それ、はっ――日々、姫っ――」
1187 = "「Đó, là——Hibi, ki——」"
# monologue
# JP: （ずぶっ！　ごちゅっ！　ぢりゅっ！　ばちゅっ！！）
1674 = "（Phập! Hự! Trượt! Bạch!!）"
# monologue
# JP: 言葉を出すのも苦しくて、今すぐにでも裏返りそうで、\nそれでも必死に――快感の息に声を交える。
1583 = "Việc cất lời cũng thật khó khăn, tưởng chừng như giọng nói sắp vỡ vụn, nhưng tôi vẫn cố gắng——trộn lẫn giọng nói vào những tiếng thở dốc vì khoái cảm."
# 【双鉄】
# display as 雙鐵
# JP: 「僕、らが――くたくた――消耗、して、いてっ――！\n体が、きっと――生命の、危機を――覚えてる、から」
1112 = "「Chúng, ta——đang mệt lử——kiệt sức, rồi——! Cơ thể, chắc chắn——đang cảm nhận được——nguy hiểm, đến tính mạng, nên」"
# monologue
# JP: （ずじゅっ！　ばぢゅっ！　じゅりゅっ！　ごちゅっ！）
