1352 = "Muốn xuất tinh. Sắp xuất tinh. Bị vắt kiệt. Những suy nghĩ mãnh liệt đang rung lên trong cổ họng——nếu thiếu đi khao khát cháy bỏng này."
# 【日々姫】
# display as 日日姬
# JP: 「子孫――子孫……ふぁ――あっ……赤ちゃ、赤ちゃん」
