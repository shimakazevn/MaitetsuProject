# JP: 「ああっ！！！」
1007 = "「啊！！！」" 

# monologue
# JP: 極めて下品な音を立て、勃起先端が開放される。\nそうして日々姫はあーんと大きく口を開け――
1302 = "伴隨著極其下流的聲響，日日姬的嘴鬆開了我的龜頭。然後她張大嘴巴——" 

# 【日々姫】
# display as 日日姬
# JP: 「はむっ！」
992 = "「啊嗚！」" 

# monologue
# JP: ――それでも一気に行ってくれない。\nまたも亀頭の先端だけを――っ！！？
675 = "——但她還是沒有直接含住肉棒。又是隻愛撫龜頭……啊？！" 

# 【日々姫】
# display as 日日姬
# JP: 「ちゅるっ――もむっ！　はむっ――あむっ――\nん……はむっ――かぷっ――もぷっ――あむっ――」
1041 = "「啾嚕、啾嚕嚕嚕……咕啾！嗯……啾……啾嚕……咕啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――ぁっ――あっ――」
975 = "「啊……啊……」" 

# monologue
# JP: 唇で歯をやさしく覆い、日々姫はかぷかぷ、僕の勃起を\n少しずつ少しずつ甘噛しては口の中へと導いていく。
1495 = "日日姬用嘴唇包住牙齒，一點一點地輕咬著肉棒，慢慢含入口中。" 

# 【日々姫】
# display as 日日姬
# JP: 「あむっ――ちゅるっ――はむっ――ちゅっ――むっ――\nかぷっ――れるっ――あむっ――ぢゅるっ――はむっ！」
991 = "「啊嗚……啾嚕、啾啾……啾嚕嚕嚕！啾嚕嚕……啾嚕……哈嗚！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「～～～～っ！！！」
# 972 = "「唔！！！」" 

# monologue
# JP: じわじわ、しかし確実に、僕の勃起が食べられていく。\n滴るほどの快感と、その快感さえべたり塗りつぶす幸福感。
1588 = "雖然速度很慢，但我的肉棒的確慢慢被她吞入口中。我感受到強烈的快感，以及比快感還要厚重無數倍的幸福感。" 

# 【日々姫】
# display as 日日姬
# JP: 「はむっ――れるっ――あむっ――ちゅうっ――はむっ、\nちゅっ――ふぁむっ――ちゅうっ――んっ――っ！！！」
1038 = "「啾嚕、啾啾……啾嚕嚕嚕！啾嚕嚕……啾嚕……咕啾！！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あっ！」
# 1005 = "「啊！」" 

# monologue
# JP: 日々姫の喉奥に僕の亀頭が口づけ――っ！！！？
1594 = "龜頭頂到了日日姬的喉嚨深處……啊！" 

# 【日々姫】
# display as 日日姬
# JP: 「でゅぼっ！　じゅ！！　ぢゅるるっ！　ちゅ、ばっ！\nんっ――ぢゅぼっ！　ちゅうっ！　じゅるっ！　じゅぶ」
998 = "「啊嗯……啾，啾嚕……啊嗯……啾……啾嚕……啾嚕嚕」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 972 = "「唔！！！」" 

# monologue
# JP: あたった瞬間、日々姫がいきなり加速する。\n頭を前後に素早く振って、僕の精液を絞り始める！！！
1590 = "頂到喉嚨的瞬間，日日姬突然開始加速。她快速地前後晃動頭部，汲取我的精液。" 

# 【日々姫】
# display as 日日姬
# JP: 「じゅぶっ！　じゅぼっ！　ぢゅっ！　ぢゅるるっ！\nれるっ！　れろおっ！　じゅるっ！　ぢゅ！　ぢゅぼ！」
# 1041 = "「啾嚕、啾嚕嚕嚕……咕啾！嗯……啾……啾嚕……咕啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くっ――あっ――あっ！　あっ！！！」
948 = "「呃啊！！！」" 

# monologue
# JP: 焦らされ炙られ煮えたぎっている精液たちが、\n勃起の中で激しくゆすられ、更に密度を増していく。
1430 = "按捺已久的精液在肉棒中激烈搖晃，濃度越來越提高。" 

# 【日々姫】
# display as 日日姬
# JP: 「じゅびゅっ！　ずぼっ！　じゅぶっ！　ぢゅむっ！\nぢゅぽっ！　じゅばっ！　じゅううっ！　ぐぽっ！」
996 = "「啊嗯……啊嗚……啾、啾嚕……啾嚕……嗚……咕嘟……噗！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々、姫――激しい――日々、姫っ」
1142 = "「日日姬……好激烈……日日姬」" 

# monologue
# JP: 緩めてくれといいたい言葉を焦らされる恐怖が押し込める。\nあの状態に戻されるより、無様であっても、このまま射精――
1415 = "我本想求她放慢速度，但回想起先前的焦急就又嚥下了後半句話。比起回到乾著急的狀態，還不如直接這樣射出來。" 

# 【日々姫】
# display as 日日姬
# JP: 「ぐぽっ！　ぐぱっ！　ちゅぶっ！　じゅずっ！　ずっ！\nじゅるるるっ！　ぢゅぼっ！　れるっ！　ぶちゅう！」
1056 = "「嗯……啾、啾……啾嚕……啾嚕……啾嚕……啾……啾噗！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はぁっ！　はぁっ！　はぁっ！　はあっ！！」
1171 = "「蛤啊、蛤啊、蛤啊、蛤啊！！」" 

# monologue
# JP: 思考を、激しい口唇愛撫がそして水音がかき乱す。\n息苦しいほどの快感に吹き出す汗も――いやっ――？
1388 = "思考被激烈的口交與水聲打亂，令人窒息的快感讓我直冒汗……咦？" 

# monologue
# JP: （ちぷ――ちゅっ――くちゅっ――くちゃあっ――）
1656 = "（咕啾、咕啾、咕啾）" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1005 = "「啊！」" 

# monologue
# JP: 違う。僕だけの水音ではない、日々姫は僕を貪りながら\n――一緒にイこうと、自らを慰めてもくれている。
1288 = "不對，這水聲不只是從我身上發出來的。日日姬一邊享用我的肉棒，一邊還在自慰。" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 972 = "「唔！！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「んぶっ！？　んっ――あ"っ――ぐっ――んっ！\nでゅぼっ！　ぢゅるっ！　ずびゅっ！　ぢゅぼおっ！」\n1017 = "「啾……啾……啾嚕嚕嚕啾嚕……啾嚕……咕嘟……啾！」" \n\n# monologue\n# JP: 気づいた瞬間思わず突き出てしまった腰に、ほんの一瞬\n日々姫は戸惑い、けれどもすぐに、合わせてくれる。\n1358 = "察覺到之後我就不禁把腰往前一挺，日日姬疑惑了一下，但馬上配合起我的動作。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぢゅろおお！　ぢゅぶううっ！　じゅぼっ！　ぢゅっ！\nでゅろっ！　ぢゅぶっ！　ぢゅぶっ！　ぢゅびゅっ！！」\n1040 = "「啾嚕、啾嚕、啾嚕、啾嚕！！啾嚕、啾嚕嚕、啾嚕！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫、日々姫、日々姫、日々姫っ」\n1148 = "「日日姬、日日姬、日日姬、日日姬」" \n\n# monologue\n# JP: 僕の勃起の長さを恐らく僕より把握している唇が、\n鈴口にキスするまでに引き下がり、けれどすぐさま、\n1480 = "日日姬恐怕比我自己還要了解肉棒的長度，她吐出肉棒親吻馬眼，但馬上再次含住。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぢゅぼおおおっ！　んっ！　ぢゅっ！　ぢゅずっ！！\nぢゅぼっ！　ずりゅううっ！　ぢゅぼおおおおおっ！！」\n# 1042 = "「啾嚕嚕嚕……啾嚕……啾嚕……咕嘟。啾、啾嚕、啾嚕嚕……啾嚕嚕嚕」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！」\n# 1007 = "「啊！！！」" \n\n# monologue\n# JP: 喉奥を突くまで呑んでもらえる。舌も唇も休むことなく、\n僕を愛撫するそのためだけに健気に動き続けてくれる。\n1349 = "她直接把肉棒吞進了喉嚨深處。唇舌一刻也不停歇，充滿活力地集中於對我的愛撫。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぢゅむっ！　ぢゅう！　ぢゅぼっ！　ずりゅうっ！！\nぢゅっ！　ぼっ！　ぢゅ！　ずっ！　ぢゅっ！　りゅ！」\n# 1042 = "「啾嚕嚕嚕……啾嚕……啾嚕……咕嘟。啾、啾嚕、啾嚕嚕……啾嚕嚕嚕」" \n\n# monologue\n# JP: （ぐぢゅっ！　ぅちゅっ！　ぢゅくっ！　ぎゅぢゅっ！）\n1654 = "（咕啾、咕啾、咕啾、咕啾！）" \n\n# monologue\n# JP: 加速につれて日々姫が一人で立てる水音もねばっこくなる。\n鼻をくすぐる鼻息が荒く強くなり甘い匂いに窒息しそうで。\n1317 = "加速之後日日姬自慰的水聲也帶上了黏稠的感覺。我的呼吸越來越急促，這股香甜氣息彷彿要讓我窒息。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「でゅるっ！　ぢゅぼっ！　じゅっ！　ぢゅううっっ！\nぼぢゅっ！　ちゅりゅっ！　ぢゅぼっ！　ぢゅばっ！！」\n1037 = "「啾嚕、啾啾……啾嚕嚕嚕！啾嚕嚕……啾嚕……咕啾！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫――日々姫――一緒に、一緒にっ――っ！！！」\n1146 = "「日日姬……日日姬，我們一起！！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「れ、りゅっ！――ぢゅこっ！　ぢゅばっ！」\n1034 = "「啾嚕……啾嚕嚕！啾啪！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あああっ！」\n989 = "「啊啊啊！」" \n\n# monologue\n# JP: ずっと前から喘ぎ続けてる鈴口に舌先をねじ入れて、\nねじいれたまま唇は、きつく締め付けスライドし続け。\n1483 = "日日姬把舌尖伸入一直喘息的馬眼，同時用嘴唇緊緊包住肉棒繼續滑動。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫、日々姫――もうすぐ――もうっ、もうっ！」\n1147 = "「日日姬、日日姬……我、我要射了！」" \n\n# monologue\n# JP: 日々姫は完全に、僕の射精を促すためにスパートしてる。\n1323 = "口交進入了最後衝刺，完全是在催促我快點射精。" \n\n# monologue\n# JP: （ちゅくっ！　にゅぶっ！！　ちにっ！　くぢゅっ！！）\n1652 = "（咕啾、咕啾、咕啾、咕啾！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んっ！　ちゅむっ！　っ――ぢゅむ！　ずりゅっ！\nちゅぶっ！　ぢゅるっ！　じゅぼっ！　ぢゅばっ！！」\n# 1037 = "「啾嚕、啾啾……啾嚕嚕嚕！啾嚕嚕……啾嚕……咕啾！！」" \n\n# monologue\n# JP: つまりは日々姫も、オナニーでイく寸前なのだ。\nその安心が、一体感が、快感をさらに膨れ上がらせっ！\n1543 = "看來日日姬也馬上要自慰到高潮了。我安下心來彷彿與她融為一體，快感也隨之高漲。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫っ！　僕はっ！　僕はもうっ！！！」\n1150 = "「日日姬！我、我要射了！！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んっ！　ぢゅりゅううううううううっっっっっっ！！」\n1066 = "「嗯！啾嚕嚕嚕嚕嚕！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くはっ！！！」\n# 972 = "「唔！！！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぢゅぼおおおおおおおおおおおっ！！　ぢゅみゅっ！」\n1043 = "「啾嚕嚕嚕嚕嚕嚕！啾！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「！！！！！！！」\n974 = "「唔！！！！！！！」" \n\n# monologue\n# JP: （どりゅうう！　ぶりゅうっ！　びゅぶっ！　ぶりゅ！）\n1668 = "（咻咻！咻咻！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んむっ！？　んっ――んっ！！！　～～～～～っ！！」\n1079 = "「嗯？！嗯……嗯！嗚嗚！！」" \n\n# monologue\n# JP: 日々姫が震える。喉だけでなく、全身をヒクつかせてる。\n一緒にイケた、その喜びが更に精液を勢い付けるっ！！\n1513 = "日日姬顫抖起來。不只是喉嚨，她的全身都在顫抖。同時高潮喜悅讓精液的勢頭更加洶湧。" \n\n# monologue\n# JP: （びゅりゅうう！　ぶりゅっ！　ぶゅっ！　びううっ！）\n# 1668 = "（咻咻！咻咻！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んっ！？　んんんん～っ！　んっ――！　ふっ！\nごきゅっ！　ごくっ！　ぐきゅっ！！　ごきゅん！」\n1077 = "「嗯？！嗚嗚嗚……嗚！嗚嗚……咕嘟、咕嘟……啊嗚！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁ――ぁっ！　あっ！　ああっ！！！」\n976 = "「啊……啊啊啊！！！」" \n\n# monologue\n# JP: （びゅりゅ！　びゅうっ！　ぶびゅっ！　びゅぶるっ！）\n# 1668 = "（咻咻！咻咻！）" \n\n# monologue\n# JP: まる三日間日々姫と常に共にあり、であるというのに、\n激務と疲労に押し込まれ、一度も射精できてなかった。\n1579 = "這三天我都一直和日日姬待在一起，但因為工作的繁忙與疲憊一次都沒射過。" \n\n# monologue\n# JP: （びゅっ！　ぶびゅうっ！　びゅっ――びゅ――りゅっ）\n1665 = "（咻咻……咻咻……）" \n\n# monologue\n# JP: 鈴口を抜ける感覚が完全にゼリー飲料だったその精液を。\nたまりすぎ、炙られすぎて濃縮されきった精液を――\n1567 = "衝出馬眼的精液就像果凍飲料一樣黏稠。精液積攢加熱了這麼長時間，已經徹底濃縮起來。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ごくっ！　ごきゅっ！　ごくっ！　こくっ！\nんくっ！　ごくっ！　ごくんっ――――けふっ――ぷぁ」\n949 = "「咕嘟咕嘟……嗯……咕嘟！咕嘟咕嘟……咳咳……噗哈」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……ぅ……ぁ」\n# 696 = "「……唔」" \n\n# monologue\n# JP: ……日々姫は、多少綺麗にはこぼしているものの、\nそれでも全部、残さず飲みきってくれ――っ！\n691 = "……雖然多少漏了一點出來，但她還是把精液全喝了下去……唔！" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ～～～～～――。\nえへへ～！　ごちそうさまでした！　にぃに！！！」\n977 = "「啊……嘿嘿，多謝招待！阿哥！！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「！」\n# 1005 = "「啊！」" \n\n# monologue\n# JP: 全部飲んだとおくちを開けてご報告して、\nにこにこにこと、実に嬉しそうな顔をする。\n1478 = "日日姬張開嘴向我報告已經全部喝完。她臉上笑嘻嘻的，滿是喜悅的色彩。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫――日々姫は本当に可愛いな。\n可愛くて、がんばり屋さんで――とってもいいこだ」\n1140 = "「日日姬……你好可愛啊。既可愛，又努力……真是個好孩子」" \n\n# monologue\n# JP: 職務をきっちり果たし切る誠実な市長で、\n鉄道車両に関しては最高クラスのデザイナーで\n1339 = "她不僅是個忠於職守的好市長，在鐵路車輛方面也是最高級的設計師。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「えへへへっ！　ありがと！　うれしかとーーっ！！」\n1083 = "「嘿嘿，謝謝！我好開心！！」" \n\n# monologue\n# JP: “仕事のできる大人の女”と、かくも美しく成長し――\nそれでも僕の前でだけは、いつまでも少女で、妹で。\n1346 = "她已經出色地成長為了一名能幹的成熟女性……但只有在我面前時，她永遠都是少女，永遠都是我的妹妹。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「なら、ね？　にぃに。あのね？　ひーちゃんね？\nご褒美、ほしかと」\n1181 = "「這樣的話……阿哥，那什麼，我想要獎勵」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うん。なんだ？　何でも遠慮なくいってみろ」\n1072 = "「嗯，怎麼了？不用客氣，儘管說」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「えへへ～」\n1086 = "「嘿嘿～」" \n\n# monologue\n# JP: 激務のストレスのせいなのか、「ひーちゃん」が、\n時折こうして危ういほどに、幼い顔を覗かせる。\n1291 = "也許是因為工作繁忙積攢下的壓力，日日姬三不五時會表現出這樣幼稚的態度。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あのね、あのね？　それじゃあね？\nんっ…………」\n1165 = "「聽我說，聽我說，接下來呀……嗯……」" \n\n# monologue\n# JP: （ころんっ）\n1693 = "（躺下）" \n\n# monologue\n# JP: 日々姫がベッドに横たわる。可愛い胸を露出させ、\nぐしょ濡れになった剥き出しのおまんこを突き出すように。\n1511 = "日日姬躺到床上露出她可愛的胸部，把毫無遮掩的濕潤小穴展現在我面前。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「まだまだおなかぺこぺこやけん――\nにぃににね？　『おなかいっぱい』にしてほしかと」\n1167 = "「肚子還是好餓……阿哥來幫我填飽肚子吧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n1062 = "「嗯」" \n\n# monologue\n# JP: そうだった。最初から日々姫はそう求めていた。\n僕のパワーバーで、お腹いっぱいにしてほしい、と。\n1361 = "對了，日日姬一開始就是這麼索求的。她說想要用我的能量棒填飽肚子。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なるほど、これは気が利かなかった」\n1180 = "「這樣啊，我可真是不夠體貼」" \n\n# monologue\n# JP: つまりは僕は、飢餓状態の日々姫を放置し、自分だけ、\n日々姫のくれる快感を、貪り食っていたわけか。\n1289 = "也就是說我一直放著飢渴的日日姬不管，獨自沉浸在她給予我的快感之中。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ご褒美にお詫びもくわえ。――\n精一杯に、日々姫をおなかいっぱいにさせていただこう」\n1121 = "「把我的獎勵和歉意一起收下吧。我會竭盡全力填飽你的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ」\n986 = "「啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「[アペリティフ,2]食前酒のあとは、オードブルだな。\nふむ……」\n1199 = "「餐前酒之後就輪到冷盤了啊。嗯……」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「っ！！！！！」\n1009 = "「啊！！！！！」" \n\n# monologue\n# JP: 口をあけ、舌を思い切り突き出せば、\n日々姫の瞳が期待に輝く。\n1399 = "我剛張開嘴伸出舌頭，日日姬的目光裡就透露出期待的神色。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふふっ。お好みの一品のようでなによりだ。\nではオードブルにはタンをお楽しみいただこう」\n953 = "「哈哈，你喜歡就好。那麼今天的冷盤就是牛舌肉了」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「う、うん。あの――いただきます」\n1060 = "「嗯……我開動了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ふふっ。（ちゅむっ）――ん……ふぇひあふぁれ」\n1057 = "「嗯……啾、啾……啾嚕嚕」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あんっ！」\n1000 = "「啊嗯！」" \n\n# monologue\n# JP: “召し上がれ”の一言を、下のお口に\nキスしたままで伝えれば、日々姫は嬉しげに震えてくれる。\n1400 = "我吻在小穴上表示請她享用，日日姬開心地顫抖起來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ん……」\n1047 = "「嗯……」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ……ふっ――あっ――にぃにの、ベロ、が――\nんっ――私の、おまんこ、おまんこの、中っ――ぁっ！」\n994 = "「啊嗯……啊……阿哥的舌頭……嗯……伸進我的、我的小穴裡了……啊！」" \n\n# monologue\n# JP: 思いっきりに舌を伸ばして、\nじゅくじゅくの膣道内を舐め回す。\n1418 = "我用力伸長舌頭，在濕潤的小穴裡四處舔弄。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふぁっ！　あっ――にぃにっ――んっ――ふあっ、\nあっ――べろっ――あったかい――しゅきぃっ」\n1173 = "「蛤啊！啊……阿哥……嗯……蛤啊……啊……舌頭好暖……好舒服」" \n\n# monologue\n# JP: 唾液がすぐに愛液に混じり、愛液で口内が満たされ始める。\nもっと感じさせたくなって、舌先に力を込めて固くして\n1389 = "愛液馬上跟唾液混合在一起，還湧入了我的口中。我把舌尖用力繃緊，想要讓她更有感覺。" \n\n# monologue\n# JP: （にゅっ――じゅにゅっ――にゅぶっ――ぢゅりゅっ）\n1655 = "（咕啾、咕啾、咕啾、咕啾）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ンッ――あっ――うれしっ――しゅき――ん、にぃにの\n――ベロで――おまんこ、じゅぶじゅぶ、されるのぉ」\n1049 = "「嗯……啊……好開心……好喜歡……嗯……阿哥的舌頭……在小穴裡舔來舔去」" \n\n# monologue\n# JP: （ゾリュッ――ニュルッ――じゅる――じゅぶううっ）\n1676 = "（啾嚕、啾嚕、啾嚕、啾嚕）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ん……あっ――はっ――あっ！　おなか、の――方、\nだけ――なめなめ――される、と――じれった、く、て」\n1064 = "「嗯啊……蛤啊……一直舔上面……好難受……」" \n\n# monologue\n# JP: 天井側の粒立つところ、日々姫の感じるところまで、\n僕の舌では届かない。それを承知でひたすら舐め――てっ\n1286 = "上方凹凸不平的地方是日日姬敏感的部位，但我的舌頭伸不到那裡。我知道這一點，故意一個勁往上面舔。" \n\n# monologue\n# JP: （ぷりゅっ）\n1678 = "（啾）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んきゅんんんっ！！！！」\n1004 = "「啊嗯！！！！」" \n\n# monologue\n# JP: 上唇をクリトリスへと引っ掛け、弾く。\n途端に日々姫は派手な嬌声を喉から零す。\n1417 = "我用上唇蹭了一下陰蒂，日日姬突然就大聲嬌喘起來。" \n\n# monologue\n# JP: （れるっ！　じゅぶっ！　ぷりゅ！　れるっ！　じゅぶ）\n# 1676 = "（啾嚕、啾嚕、啾嚕、啾嚕）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひあっ！？　あっ――らめっ――にぃに――まだっ――\nこれ――おちんちんっ――だって――食べてない、のに」\n943 = "「呀啊？！啊……不要……阿哥，又來了……明明還沒有……吃掉肉棒……」" \n\n# monologue\n# JP: 構わないさと答えてやりたい。けれども口を休めたくない。\nならば答えはひとつしかない\n1410 = "我本想告訴她不要在意，但又不想停下嘴巴。那麼我該做的事情就只有一件了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「れるっ――じゅぶっ――じゅむっ――るっ――ぶっ――\n『ひゃばば、ばふぃっ』、ぷぁっ――ぷっ――じゅるっ」\n1033 = "「啾嚕……啾噗……啾嚕……對不起了……啾……啾嚕」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃっつ！？　あっ！　らめっ！　にぃに！　んっ！\nおまんこ！　じゅるじゅる、しながら、おしゃべりぃ」\n946 = "「呀啊？！啊！不要，阿哥！啊嗯！一邊舔小穴……一邊說話……」" \n\n# monologue\n# JP: （ぷりゅっ！　れるっ！　じゅぶっ！　ぷりゅんっっ！）\n1675 = "（啾嚕、啾嚕、啾嚕、啾嚕！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んきゅっっ！　らからっ！　まって――まってぇっ！」\n1002 = "「啊嗯！都說了停一下……停一下！」" \n\n# monologue\n# JP: 待ったところで意味はない。日々姫の膣はもう\n完全にわななきまくり、放っておいてもイクだけだ。なら、\n1536 = "現在停下來也沒有意義，日日姬的小穴已經在不停抽搐，就算放著不管也會馬上高潮。" \n\n# monologue\n# JP: （じゅぶっ！　ぼぢゅっ！　じゅる！――ずりゅっ！）\n# 1675 = "（啾嚕、啾嚕、啾嚕、啾嚕！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふえっ！！！？」\n947 = "「呀？！」" \n\n# monologue\n# JP: どうせなら最高の快感でイカせたい。\nゆえ舌を抜き、両唇で陰核を――\n1434 = "既然如此，不如讓她在最強烈的快感中高潮。於是我收回舌頭，用嘴唇夾住陰蒂。" \n\n# monologue\n# JP: （はむっ！）\n1651 = "（含住）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「んっっっ！！！きゅぅぅぅぅぅぅぅぅぅんんっ！！！」\n1001 = "「啊嗯！呀啊啊啊啊！！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「んぷっ！？」\n1090 = "「噗？！」" \n\n# monologue\n# JP: 日々姫の愛液が顔にかかってしまうけれど離れない、\n1503 = "日日姬的愛液噴在我臉上，但我還是沒有鬆嘴。" \n\n# monologue\n# JP: （はむっ――あむっ――れるっ――まむっ！）\n# 1675 = "（啾嚕、啾嚕、啾嚕、啾嚕！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ん～～っ！！？　ん～～！　ん～～っ！　ん～～！！」\n999 = "「啊嗯……嗯……嗯！！」" \n\n# monologue\n# JP: もはや言葉を発せない、ただガクガクと体を頭を震わせて、\n日々姫はおまんこをどろどろと、愛液に浸し蕩かしていく。\n1475 = "日日姬已經說不出話，身體和腦袋不停顫抖，小穴裡滿是愛液。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぷあっ！」\n1089 = "「噗哈！」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぁっ――あっ――あっ――あっ――\nあ～～――ぅあ～～――ん――ぁっ――はぁっ、はぁっ」\n984 = "「啊、啊、啊、啊……啊啊啊啊啊……蛤啊、蛤啊」" \n\n# monologue\n# JP: ようやく大波がさったのか、日々姫の声が聞こえなくなる。\nはぁはぁと荒い呼吸にあわせ、下腹もおまんこも上下する。\n1379 = "快感的浪潮似乎終於消退，日日姬的聲音安靜了下來。她急促地喘息著，小腹和小穴也配合著呼吸節奏一上一下。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫……」\n# 1139 = "「日日姬……」" \n\n# monologue\n# JP: 三日間フルに働き通しで、やっと帰宅し、\n僕も日々姫も派手に達して、消耗し――\n1280 = "三天辛勤工作後我們終於回到家中，並且攀升到高潮，消耗了許多體力……" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「はぁっ――はあっ――はあっ――はあっ――ん……\n（ごきゅっ）――う、ん――にぃに。にぃに、にぃに」\n1170 = "「蛤啊、蛤啊、蛤啊、蛤啊……嗯……阿哥……阿哥、阿哥」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n1114 = "「我在」" \n\n# monologue\n# JP: ――それでもまったく満足できない。\n求めるものを、日々姫も僕もまだ得ていない。\n677 = "——但這還遠遠沒有滿足。我和日日姬都還沒有得到想要的東西。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「おねがい――おねがい。私のおなか――にぃにの勃起で、\nおちんちんで――いっぱいに、して」\n1157 = "「求你了……求求你……把肉棒插進來……把我……插得滿滿的……」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕の願いもまったく同じだ。\nメインディッシュを――お互い、思い切り味わおう」\n1154 = "「正合我意。主菜就讓我們一起品嘗吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ」\n# 1062 = "「嗯」" \n\n# monologue\n# JP: 日々姫と目が合う。ふっと微笑みをこぼし合う。\nこんなくだらぬところでも、通じあえるのが幸せで\n1397 = "我們相視一笑。即便是這樣無所謂的小事，心意相通後也會化作幸福。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「いただきます」\n1117 = "「我開動了」" \n\n# monologue\n# JP: 僕は日々姫を、日々姫は僕を、\nそうして、同時に貪りはじめる。\n1365 = "就這樣，我們同時開始渴求對方。" \n\n# monologue\n# JP: （くちっ――）\n1661 = "（咕啾）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃにっ――すぐ、で――平気、だからっ――\n私、わたしっ――もう――うずうず――しすぎて」\n1190 = "「阿哥……快一點……我沒事的。我、我……我已經等不及了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うん」\n# 1062 = "「嗯」" \n\n# monologue\n# JP: 亀頭先端を押し当てたなら、膣口も同じ言葉を発してる。\n『早く早く』と、『挿れて挿れて』と、ただそれだけを。\n1426 = "把龜頭抵上去之後，小穴也彷彿在渴求我快點插入。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いくぞ、日々姫」\n1111 = "「我來了，日日姬」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん。にぃに――あっ！」\n1074 = "「嗯，阿哥……啊！」" \n\n# monologue\n# JP: （ずっ――ずぶっ――ずっ――ぐりゅんっ！！）\n1657 = "（咕啾、咕啾！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふあっ！　あっ！　そこっ――そこっ！　ん……\nもっと、ゆっくり――いま――キツい、けんっ――あっ」\n1176 = "「蛤啊！啊！那裡……那裡好舒服……嗯……再慢一點……現在身體……還繃得很緊」" \n\n# monologue\n# JP: （ゆるっ――じゅるっ――ずりゅっ――づりゅっ）\n# 1676 = "（啾嚕、啾嚕、啾嚕、啾嚕）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふひっ――あっ――んっ――あっ！　あっ！　あっ！\nゆっくり――される、と――これ、は――これ、でぇっ」\n936 = "「呀啊……嗯……啊嗯！啊！啊！放慢速度以後……也好舒服……」" \n\n# monologue\n# JP: 舌では届かぬ、日々姫の膣の腹側粒立つ、感じるところ。\nほんの数擦りしただけで、日々姫はもうドロドロすぎて。\n1556 = "肉棒頂到了剛才舌頭沒能觸及的敏感部位。只是摩擦了幾下，日日姬彷彿就要溶化了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「と、いうか――くっ――あっ――僕も、だっ――」\n970 = "「唔……我也很舒服……」" \n\n# monologue\n# JP: （きゅんっ！　きゅううっ！　にゅるっ！　にゅむっ）\n1659 = "（咕啾、咕啾）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「は――あ――なに、これっ――！　――とま、って、て\n――も――にぃに――膣内に――いる、だけで――っ」\n1168 = "「蛤啊……怎麼回事……就、就算停下來……阿哥的肉棒……放在小穴裡就感覺好舒服」" \n\n# monologue\n# JP: 日々姫の膣が、勝手にすぼまり吸い付いてくる。\n経験の無い激しさで、奥へ誘う蠕動だけを繰り返す。\n1502 = "日日姬的小穴主動包裹住肉棒，以前所未有的激烈勢頭蠕動著邀請肉棒深入。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「グッ――うっ――ぁっ」\n969 = "「唔……啊……」" \n\n# monologue\n# JP: （ゆるっ――じゅるっ――ずりゅっ――じゅぶっ！）\n# 1675 = "（啾嚕、啾嚕、啾嚕、啾嚕！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふあっ！　あっ――あっ！　あっ！！！！」\n1174 = "「蛤啊！啊、啊！啊！！！！」" \n\n# monologue\n# JP: ゆえに勝手に、腰が体が魂が意思とは無縁に加速していく。\n1425 = "所以我的腰也開始不受控制地加速抽插。" \n\n# monologue\n# JP: （じゅっ！　ずりゅっ！　じゅぶううううっ！　ごっ！）\n# 1654 = "（咕啾、咕啾、咕啾、咕啾！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゅあっ！！！　きたっ！　奥っ！！！\n子宮！　ごちゅんっ――って！！！」\n941 = "「呀啊啊！插到深處了！！！撞到子宮了！！！」" \n\n# monologue\n# JP: （きゅうううううっ！）\n1660 = "（咕啾！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くあっ！」\n# 1005 = "「啊！」" \n\n# monologue\n# JP: 子宮の扉にがっちり亀頭を捕まえられたような吸い付き。\nそこから無理やり剥がしてけれど、奥へと強く引き戻され\n1357 = "子宮口緊緊吸住了龜頭。我想要強行掙脫，但又被吸回了更深處。" \n\n# monologue\n# JP: （ぶぢゅ！　ずびゅううっ――ぐうううっ！　ごちゅ！）\n1658 = "（咕啾、咕啾！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふあっ！　あっ！　おまん、こっ――しゅご、い、のっ、\nごちゅん、ごちゅんって――にぃにの、ちん、ちんっ」\n1175 = "「蛤啊！啊！小穴……好舒服……阿哥的肉棒……跳來跳去的」" \n\n# monologue\n# JP: （ずびゅ！　ごちゅっ！　ずりゅっ！　ばちゅっ！！）！\n1653 = "（咕啾、咕啾、咕啾、咕啾！！）！" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「～～～っっっ！！」\n971 = "「唔！！」" \n\n# monologue\n# JP: 締め付けも吸い付きも激しすぎ、全く休ませてもらえない。\n日々姫だって消耗しきっているであろうに――いやっ。\n1363 = "小穴不僅夾得緊，吸得也緊，完全不給我休整的機會。她明明也已經很累了……不對。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！」\n# 1007 = "「啊！！！」" \n\n# monologue\n# JP: （ずぢゅっ！　ごちゅっ！　ぢゅばっ！　ごりゅっ！）\n# 1654 = "（咕啾、咕啾、咕啾、咕啾！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひっ――あっ！　あっ！　あっ！　どう、してっ――\nこぎゃ、んっ――ふっ、あっ――今日、おかし、いっっ」\n939 = "「呀啊啊啊！啊、啊、啊！為什麼……今天……這麼激烈……啊嗯」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それ、はっ――日々、姫っ――」\n1187 = "「那是因為……日日姬……」" \n\n# monologue\n# JP: （ずぶっ！　ごちゅっ！　ぢりゅっ！　ばちゅっ！！）\n1674 = "（啾嚕、啾嚕、啾嚕、啾嚕！！）" \n\n# monologue\n# JP: 言葉を出すのも苦しくて、今すぐにでも裏返りそうで、\nそれでも必死に――快感の息に声を交える。\n1583 = "連說話都要竭盡全力，彷彿聲音隨時都會變調。但我還是夾雜著喘息說了出來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕、らが――くたくた――消耗、して、いてっ――！\n体が、きっと――生命の、危機を――覚えてる、から」\n1112 = "「我們……都已經……筋疲力盡了！所以……身體感受到了……生命危機」" \n\n# monologue\n# JP: （ずじゅっ！　ばぢゅっ！　じゅりゅっ！　ごちゅっ！）\n# 1675 = "（啾嚕、啾嚕、啾嚕、啾嚕！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「そぎゃんで――どう、してっ――ん、ひあっ！　あっ！\nこぎゃん、剥き、出し――凄、い――んぎ！――快、感」\n1185 = "「那又……為什麼……呀啊！快感……會這麼……強烈！」" \n\n# monologue\n# JP: （ずびゅっ！　ごりゅ！　ぶびゅっ！　どちゅんっ！）\n# 1675 = "（啾嚕、啾嚕、啾嚕、啾嚕！）" \n\n# monologue\n# JP: ゆるめて会話したいのに、腰が体が止まってくれない。\nそれはつまりは、僕の仮説が真だと証明してるから――\n1413 = "我本想安靜下來跟她說，但是身體卻完全停不下來。這也證明了我的推測是正確的。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「生命、の――危機に――瀕して、いる、ならっ――\nくっ――生物、は――本能、として――子孫、を――」\n1159 = "「瀕臨……生命危機的時候……唔……生物……就會依照本能……留下後代」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あっ！！！！！」\n# 1009 = "「啊！！！！！」" \n\n# monologue\n# JP: （きゅううううううううううんんっっっっっ！！！）\n1686 = "（縮緊！！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぐうぅ～～～っっっっ！！！！」\n973 = "「唔！！！！」" \n\n# monologue\n# JP: イキたい。イってた。絞られていた。今喉を動かしている\n強い思いが――切なる願いが、もしも欠けていたのなら。\n1352 = "好想射出來，小穴緊緊鎖住了肉棒。但心中的強烈情感與真摯願望，驅動著我說了出來。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「子孫――子孫……ふぁ――あっ……赤ちゃ、赤ちゃん」\n1106 = "「後代……後代……小、小寶寶」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「う、むっ」\n# 1062 = "「嗯」" \n\n# monologue\n# JP: （ずりゅっ！　ばちゅっ！　じゅりゅ！　ごりゅっ！！）\n# 1674 = "（啾嚕、啾嚕、啾嚕、啾嚕！！）" \n\n# monologue\n# JP: けど、耐える――勃起の体の魂の欲に抗い、\n精子ではなく、言葉を絞る。\n1403 = "我忍耐住了身心的欲望，擠出的不是精子，而是下一句話。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「今っ、僕たちはっ、ふたり、とも――まずいっ――\nレベ、ルでっ――疲労、していて――けれど、けれどっ」\n1113 = "「我們現在……累到了極點……但是……但是……」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん！　うんっ！　欲しかとっ！　んっ！　にぃに、\nにいにが！　あ！　もっと――ほしっ――かとっ！！」\n1061 = "「嗯、嗯！我想要！啊嗯！想要……想要阿哥！！」" \n\n# monologue\n# JP: （ずりゅっ！　ごちゅっ！　ぬぢゅっ！　ばちゅっ！）\n# 1675 = "（啾嚕、啾嚕、啾嚕、啾嚕！）" \n\n# monologue\n# JP: こころと、肌と、思いだけでなく、理解まで――\n全部を重ねあえればきっと、今度こそはと思うから！\n1396 = "我們的心靈與身體不僅是互相思念，而是達到互相理解的話……那麼這次就是最好的機會！" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だからっ、日々、姫っ――この、セックスは――\nあとはもう――寝るしかできない――次の、射精、はっ」\n1119 = "「所以，日日姬……這次做愛……等同於長眠之前的……最後一次射精……」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ！　うんっ！　うんっ！　うんっ！」\n1067 = "「嗯！嗯！嗯！嗯！」" \n\n# monologue\n# JP: （きゅううううっ！）\n1688 = "（縮緊！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くっ！！！」\n# 972 = "「唔！！！」" \n\n# monologue\n# JP: だだっこのように腰が蠢き、日々姫はもちあげようとする。\n僕らがひとつに繋がる部分を高くして――\n1409 = "我把晃動腰部渴求快感的日日姬抱了起來，把我們合為一體的部位抬高……" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃにっ！　にぃにっ！　きてっ！　射精、してっ！\nわたしっ！　わたしぃ！　イク、けん！　イクけんっ！」\n1195 = "「阿哥！阿哥！來吧！射出來！我、我要高潮了！要高潮了！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……ァっ――くっ！」\n697 = "「……唔！」" \n\n# monologue\n# JP: （ずぢゅっ！　ごちゅ！　ずりゅうっ！　じゅぶん！）\n# 1654 = "（咕啾、咕啾、咕啾、咕啾！）" \n\n# monologue\n# JP: ――精液全部を子宮に流し込めるよう、\nおなかいっぱいできるよう、日々姫の腰は健気に動くっ。\n1506 = "日日姬的腰努力扭動著，彷彿要讓精液全部流入子宮，填滿她的體內。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむっ！！！！」\n# 973 = "「唔！！！！」" \n\n# monologue\n# JP: （ずばっ！　ごっ　ぶっ！　ぢゅっ！　ず！　ごちゅ！）\n# 1675 = "（啾嚕、啾嚕、啾嚕、啾嚕！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ぁっ！　あっ！　ぁっ！　ああっっ！！！」\n985 = "「啊、啊、啊、啊啊啊！！！」" \n\n# monologue\n# JP: ゆえに応える。腿を掴む手に力を込めて、\nなるべく子宮を離れないよう、小刻みに小刻みに小刻みに。\n1432 = "於是我也用力抓住她的腿作為回應，在距離子宮最近的位置快速抽插。" \n\n# monologue\n# JP: （ずっ！　ごっ！　じゅっ！　ちゅっ！　ぶ！　りゅ！）\n1669 = "（啪！啪！啪！啪！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わかるっ！　わかる、とっ！　ふ、あっ！　おまん、こ、\nしきゅ、うっ――精子を――待って――まっとる、けん」\n1108 = "「我、我知道！蛤啊！小穴……一直在等待著精子……」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぅ――ぐっ！！！」\n# 972 = "「唔！！！」" \n\n# monologue\n# JP: 理解も完全にかさねりあってる。僕も今すぐ射精したい。\n日々姫の子宮もすぐさまに、僕の願いを察してくれる！！\n1395 = "我們的心意也徹底合二為一。我現在就想要射出來，日日姬的子宮也即刻察覺到了我的願望。" \n\n# monologue\n# JP: （きゅうううううううううううううっっ！！！）\n# 1686 = "（縮緊！！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くっ！　あっ！！！！」\n# 1008 = "「啊！！！！」" \n\n# monologue\n# JP: （じゅりゅうううううううううっっっっっっっ！！）\n1687 = "（縮緊！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゃぐっ！　あっ、んっ！　やけんっ！　にぃにいっ！\nわらひとっ！　いっしょに――んうっ！！！！！！！」\n942 = "「呀啊！啊嗯！所以……阿哥！和我……一起高潮吧……啊嗯！！！！！！！」" \n\n# monologue\n# JP: （ずぼおおおおおおおおおおおおっっ！　ぢゅっくん！）\n1677 = "（啾嚕嚕嚕嚕嚕！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ひゅぁぁぁぁぁぁぁぁぁぁぁぁっぁぁんんっっ！！！」\n937 = "「呀啊啊啊啊啊啊啊！！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁぁあっ！！！！！！！！」\n990 = "「啊啊啊！！！！！！！！」" \n\n# monologue\n# JP: （びゅぶっ！　どびゅっ！！　びゅるるう！　ぶびっ！）\n1667 = "（咻咻、咻咻！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ふあっ――あっ――あっ――のんでる――のんでるっ、\nごくごくっ――ごく、ごくっ――あっ！！！」\n1172 = "「蛤啊啊……射、射進來了……咕嘟咕嘟……咕嘟咕嘟的……啊！！！」" \n\n# monologue\n# JP: （びゅっ！　ぶりゅっ！　びゅぶっ！　ぶびゅうう！）\n1666 = "（咻咻、咻咻！！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「しゅごっ――ぁっ――はっ――ンッ――ふっ――あ！\nしきゅう――にぃにの――の、せいえき――ぜん、ぶ」\n1092 = "「好厲害……蛤啊啊啊……啊！阿哥的精液……都射進來了……」" \n\n# monologue\n# JP: 日々姫の子宮の入り口に、僕の亀頭が拘束されてる。\nがっちり吸われホールドされれその状態で蠢いてっ。\n1500 = "日日姬的子宮口束縛住了龜頭，保持著緊緊吸附的狀態不斷顫抖。" \n\n# monologue\n# JP: （びゅぶっ！　びゅるっるっ！　びゅう！　びゅっ）\n# 1667 = "（咻咻、咻咻！）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「いっぱい――しきゅう――おなか――いっぱいっ――\nにぃにの――せい、えきっ――精子で――おま、んこ」\n1098 = "「子宮……肚子裡面……都射滿了……阿哥的……精液……填滿了小穴……」" \n\n# monologue\n# JP: （ぶゅるっ――び――ぶっ…………ぴゅるっ――ぴゅ）\n# 1665 = "（咻咻……咻咻……）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！」\n# 1007 = "「啊！！！」" \n\n# monologue\n# JP: 最後の一滴まで絞られて――ふわり、亀頭が開放されて。\n1517 = "最後一滴精液也釋放出來之後，我的龜頭突然獲得了解脫。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぐはあっ！！」\n# 1006 = "「啊！！」" \n\n# monologue\n# JP: けれど、抜けない。その力もない。\n日々姫に挿入したままに――僕は日々姫へ――\n1304 = "但我還是拔不出肉棒，完全提不起力氣。我就保持著插入的姿勢，向著日日姬……" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃ、に――だい――すきっ」\n1192 = "「阿哥……最喜歡你了……」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「！」\n# 1005 = "「啊！」" \n\n# monologue\n# JP: 日々姫に導かれるままに倒れる。\n日々姫の体に、体を重ねる。\n1420 = "我順著日日姬的引導倒了下去，將身子壓在她的身上。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日々姫」\n1149 = "「日日姬」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「もしか、したら――」\n1093 = "「如果……」" \n\n# monologue\n# JP: 日々姫が、重なり合ってる僕の背中をそおっとさする。\n背中ごし――自分の下腹――子宮の上を。\n1486 = "日日姬摸了摸我的後背。那裡透過我的後背就是她的下腹——子宮的位置。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「もしかしたら――お仕事……。\n私、すごい迷惑……かけちゃうのかも」\n1095 = "「如果有了孩子……在工作上可能會添很多麻煩」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「市長職なら、ポーレットと稀咲で代行できよう。\nデザインは――出産ぎりぎりまで描けるだろう」\n1101 = "「市長的職務可以交給波萊特和稀咲來代理。設計工作直到臨產都可以做吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ！」\n# 1005 = "「啊！」" \n\n# monologue\n# JP: 同じ気持ちで、同じ理解で、同じ確信をもっている。\nだから日々姫を抱きしめる。日々姫の中の、未来ごと。\n1394 = "我們擁有同樣的心情，同樣的理解，同樣的確信。所以我抱緊了她，抱緊了蘊含在她體內的未來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「仮に迷惑であろうとも、誰からも祝福される迷惑だ。\nむしろかけてほしいときっと、皆が願ってくれている」\n1100 = "「就算真的會添麻煩，我們也一定會受到大家的祝福。大家一定都期盼著會有這一天」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うんっ！！！！」\n1068 = "「嗯！！！！」" \n\n# monologue\n# JP: 日々姫が笑う。\n汗だくでぐちゃぐちゃに乱れた顔で、飾り気もなく。\n1509 = "日日姬笑了起來。用那張沾滿汗水的臉龐純真地笑了起來。" \n\n# monologue\n# JP: （ぐ～～～～～～っ）\n1663 = "（咕嚕……）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おっと」\n963 = "「哎呀」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「いやぁん、私、かっこわるかと～」\n964 = "「哎呀，好丟臉～」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いやいや、むしろかわいらしいさ。というか――\n当然だよな。セックスを貪っても、実際に腹はふくれん」\n917 = "「不會啊，挺可愛的。不過這倒也正常，畢竟做愛是填不飽肚子的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あー……そういえばご飯。\n最後に食べたの……えと、いつだっけ？」\n981 = "「啊……話說我們最後一次吃飯，是什麼時候來著？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「さぁ、どうだったか。ともかく、すぐに食事にしよう」\n918 = "「不記得了，總之我們馬上去吃飯吧」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あ、にぃに！　その前にっ」\n1012 = "「啊，阿哥！等一下」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「うむっ？」\n1075 = "「嗯？」" \n\n# monologue\n# JP: 甘えて日々姫がからみついてくる。\n嬉しいが、ここからさらにもう一戦は――\n1488 = "日日姬撒著嬌纏住了我。雖然很開心，但再戰一場實在是吃不消……" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「デザート。ひーちゃん、まだやけん」\n1182 = "「還沒吃甜點呢，阿哥」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ、そういえばそうだった」\n967 = "「哦，也對」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ん…………」\n# 1047 = "「嗯……」" \n\n# monologue\n# JP: デザートは、キス。とびきり甘く、ねばっこい。\n1542 = "甜點就是親吻。甜蜜而濃郁的吻。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「ん……ちゅっ――ちゅむっ――ちゅるっ――れるっ――\nちゅっ――ん――ぷあっ――んふふ、ごちそうさまっ」\n1051 = "「嗯……啾……啾……啾嚕……啾……嗯……噗哈……嘿嘿，多謝招待」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「お粗末様、だ」\n1073 = "「嗯，招待不周」" \n\n# monologue\n# JP: そうして僕らは、今度こそ、\n今日はじめての食事を楽しむ。\n1433 = "於是，我們開始享受今天真正的第一餐。" \n