1404 = "Bị trêu chọc, tinh hoàn căng phồng quá\nmức, cảm giác cương cứng trở nên tê dại.\nPhần đầu cứ há ra ngậm lại, thở hổn hển\nnhư con cá vàng thiếu oxy."

