1588 = "Chầm chậm, nhưng chắc chắn, phần dưới của\ntôi đang bị ăn mất.\nKhoái cảm rỏ giọt, và cảm giác hạnh phúc\nthậm chí còn che lấp cả khoái cảm đó."

