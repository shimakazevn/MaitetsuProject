1415 = "Nỗi sợ bị trêu chọc dồn nén lời muốn nói\nxin em hãy nới lỏng ra.\nThà cứ thế này mà xuất tinh, dù có khó\ncoi, còn hơn là bị quay lại trạng thái\nđó——"

