1423 = "Vì vậy, tôi vòi vĩnh. Vứt bỏ lòng tự trọng\ncủa một người anh, một người chồng,\nchỉ như một con đực đang bị bỏ đói tình\ndục."

# 【双鉄】
# display as 雙鐵
