# monologue
# JP: 日々姫と目が合う。ふっと微笑みをこぼし合う。\nこんなくだらぬところでも、通じあえるのが幸せで
1397 = "Tôi chạm mắt với Hibiki. Cả hai cùng mỉm cười. Dù là những chuyện ngớ ngẩn thế này, nhưng có thể thấu hiểu nhau là một niềm hạnh phúc."
# 【日々姫】
# display as 日日姬
# JP: 「いただきます」
1117 = "「Em xin phép thưởng thức.」"
# monologue
# JP: 僕は日々姫を、日々姫は僕を、\nそうして、同時に貪りはじめる。
1365 = "Tôi ngấu nghiến Hibiki, Hibiki ngấu nghiến tôi, và cứ thế, cả hai cùng lúc lao vào nhau."
# monologue
# JP: （くちっ――）
1661 = "（Nhóp nhép——）"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにっ――すぐ、で――平気、だからっ――\n私、わたしっ――もう――うずうず――しすぎて」
1190 = "「Anh hai——ngay, bây giờ——không sao, đâu—— Em, em——đã——râm ran——lắm rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1062 = "「嗯」" 
# monologue
# JP: 亀頭先端を押し当てたなら、膣口も同じ言葉を発してる。\n『早く早く』と、『挿れて挿れて』と、ただそれだけを。
1426 = "Khi tôi áp phần đầu vào, cửa mình của em ấy cũng phát ra những lời tương tự. 『Nhanh lên nhanh lên』, 『Đâm vào đi đâm vào đi』, chỉ toàn là những lời đó."
# 【双鉄】
# display as 雙鐵
# JP: 「いくぞ、日々姫」
1111 = "「Anh vào đây, Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。にぃに――あっ！」
1074 = "「Vâng. Anh hai——a!」"
# monologue
# JP: （ずっ――ずぶっ――ずっ――ぐりゅんっ！！）
1657 = "（Phập——phập——phập——ngoáy!!）"
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！　あっ！　そこっ――そこっ！　ん……\nもっと、ゆっくり――いま――キツい、けんっ――あっ」
1176 = "「Fa! A! Chỗ đó——chỗ đó! Ưm…… Chậm lại, một chút——bây giờ——chặt, quá——a.」"
# monologue
# JP: （ゆるっ――じゅるっ――ずりゅっ――づりゅっ）
# 1676 = "（啾嚕、啾嚕、啾嚕、啾嚕）" 
# 【日々姫】
# display as 日日姬
# JP: 「ふひっ――あっ――んっ――あっ！　あっ！　あっ！\nゆっくり――される、と――これ、は――これ、でぇっ」
936 = "「Fuhi——a——ưm——a! A! A! Chậm rãi——thế này, thì——cái, này——cũng, tuyệt.」"
# monologue
# JP: 舌では届かぬ、日々姫の膣の腹側粒立つ、感じるところ。\nほんの数擦りしただけで、日々姫はもうドロドロすぎて。
1556 = "Phần hạt sần sùi nhạy cảm ở mặt nông phía bụng mà lưỡi không chạm tới được. Chỉ mới cọ xát vài cái, Hibiki đã ướt đẫm nhầy nhụa."
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうか――くっ――あっ――僕も、だっ――」
970 = "「Mà phải nói là——hự——a——anh cũng, thế——」"
# monologue
# JP: （きゅんっ！　きゅううっ！　にゅるっ！　にゅむっ）
1659 = "（Siết! Siết chặt! Trượt! Nhóp nhép）"
# 【日々姫】
# display as 日日姬
# JP: 「は――あ――なに、これっ――！　――とま、って、て\n――も――にぃに――膣内に――いる、だけで――っ」
1168 = "「Ha——a——gì, thế này——! ——Dù, dừng, lại ——thì——anh hai——chỉ cần, ở bên trong——thôi, là——」"
# monologue
# JP: 日々姫の膣が、勝手にすぼまり吸い付いてくる。\n経験の無い激しさで、奥へ誘う蠕動だけを繰り返す。
1502 = "Bên trong Hibiki tự động co thắt và mút chặt lấy. Với sự mãnh liệt chưa từng có, nó liên tục co bóp mời gọi tôi vào sâu hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「グッ――うっ――ぁっ」
969 = "「Hự——ư——a.」"
# monologue
# JP: （ゆるっ――じゅるっ――ずりゅっ――じゅぶっ！）
# 1675 = "（啾嚕、啾嚕、啾嚕、啾嚕！）" 
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！　あっ――あっ！　あっ！！！！」
1174 = "「Fa! A——a! A!!!!」"
# monologue
# JP: ゆえに勝手に、腰が体が魂が意思とは無縁に加速していく。
1425 = "Vì vậy, hông, cơ thể, tâm hồn tôi tự động tăng tốc, chẳng liên quan gì đến ý chí."
# monologue
# JP: （じゅっ！　ずりゅっ！　じゅぶううううっ！　ごっ！）
# 1654 = "（咕啾、咕啾、咕啾、咕啾！）" 
# 【日々姫】
# display as 日日姬
# JP: 「ひゅあっ！！！　きたっ！　奥っ！！！\n子宮！　ごちゅんっ――って！！！」
941 = "「Hyua!!! Đến rồi! Sâu quá!!! Tử cung! Bị đâm trúng——rồi!!!」"
# monologue
# JP: （きゅうううううっ！）
1660 = "（Thắt chặt lạiiiii!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 1005 = "「啊！」" 
# monologue
# JP: 子宮の扉にがっちり亀頭を捕まえられたような吸い付き。\nそこから無理やり剥がしてけれど、奥へと強く引き戻され
1357 = "Lực mút mạnh mẽ như thể phần đầu bị cánh cửa tử cung tóm chặt lấy. Tôi cố sức rút ra, nhưng lại bị kéo mạnh vào trong."
# monologue
# JP: （ぶぢゅ！　ずびゅううっ――ぐうううっ！　ごちゅ！）
1658 = "（Bạch! Trượt vàooo——hựựự! Hự!）"
# 【日々姫】
# display as 日日姬
# JP: 「ふあっ！　あっ！　おまん、こっ――しゅご、い、のっ、\nごちゅん、ごちゅんって――にぃにの、ちん、ちんっ」
1175 = "「Fa! A! Chỗ, đó——tuyệt, quá, cứ đâm, bình bịch——của anh, hai.」"
# monologue
