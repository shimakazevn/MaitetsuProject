1140 = "「Hibiki——Hibiki thật sự rất đáng yêu. Đáng yêu, lại luôn cố gắng hết mình——là một cô bé rất ngoan.」"
# monologue
# JP: 職務をきっちり果たし切る誠実な市長で、\n鉄道車両に関しては最高クラスのデザイナーで
1339 = "Một nữ thị trưởng chân thành luôn hoàn thành tốt nhiệm vụ, một nhà thiết kế đẳng cấp nhất về các phương tiện đường sắt."
# 【日々姫】
# display as 日日姬
# JP: 「えへへへっ！　ありがと！　うれしかとーーっ！！」
