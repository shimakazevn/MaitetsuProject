1413 = "Muốn nới lỏng ra để nói chuyện, nhưng hông và cơ thể không chịu dừng lại. Điều đó chứng minh rằng giả thuyết của tôi là đúng——"
# 【双鉄】
# display as 雙鐵
# JP: 「生命、の――危機に――瀕して、いる、ならっ――\nくっ――生物、は――本能、として――子孫、を――」
1159 = "「Nếu đang, đứng trước——nguy hiểm——đến tính, mạng—— Hự——thì sinh vật——theo bản, năng——sẽ muốn để lại, hậu duệ——」"
# 【日々姫】
# display as 日日姬
