# display as 日日姬
# JP: 「ふあっ――あっ――あっ――のんでる――のんでるっ、\nごくごくっ――ごく、ごくっ――あっ！！！」
1172 = "「Fa——a——a——đang uống——đang uống,\nừng ực——ực, ực——a!!!」"
# monologue
# JP: （びゅっ！　ぶりゅっ！　びゅぶっ！　ぶびゅうう！）
1666 = "（Phụt! Bắn ra! Phụt! Phụtttt!）"
# 【日々姫】
# display as 日日姬
# JP: 「しゅごっ――ぁっ――はっ――ンッ――ふっ――あ！\nしきゅう――にぃにの――の、せいえき――ぜん、ぶ」
1092 = "「Tuyệt quá——a——ha——ưm——fu——a! Tử cung——tinh dịch, của——của anh hai——toàn, bộ.」"
# monologue
# JP: 日々姫の子宮の入り口に、僕の亀頭が拘束されてる。\nがっちり吸われホールドされれその状態で蠢いてっ。
1500 = "Phần đầu của tôi bị trói chặt ở cửa tử cung của Hibiki. Bị mút chặt, giữ chặt và cựa quậy trong trạng thái đó."
# monologue
# JP: （びゅぶっ！　びゅるっるっ！　びゅう！　びゅっ）
# 1667 = "（咻咻、咻咻！）" 
# 【日々姫】
# display as 日日姬
# JP: 「いっぱい――しきゅう――おなか――いっぱいっ――\nにぃにの――せい、えきっ――精子で――おま、んこ」
1098 = "「Đầy rồi——tử cung——bụng——no căng rồi—— Bằng tinh dịch——tinh trùng——của anh hai——chỗ, đó.」"
# monologue
# JP: （ぶゅるっ――び――ぶっ…………ぴゅるっ――ぴゅ）
# 1665 = "（咻咻……咻咻……）" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1007 = "「啊！！！」" 
# monologue
# JP: 最後の一滴まで絞られて――ふわり、亀頭が開放されて。
1517 = "Bị vắt kiệt đến giọt cuối cùng——phần đầu nhẹ nhàng được giải phóng."
# 【双鉄】
# display as 雙鐵
# JP: 「ぐはあっ！！」
# 1006 = "「啊！！」" 
# monologue
# JP: けれど、抜けない。その力もない。\n日々姫に挿入したままに――僕は日々姫へ――
1304 = "Nhưng không rút ra được. Tôi không còn sức nữa. Vẫn cắm sâu trong Hibiki——tôi ngã xuống người em ấy——"
# 【日々姫】
# display as 日日姬
# JP: 「にぃ、に――だい――すきっ」
1192 = "「Anh, hai——em yêu——anh lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1005 = "「啊！」" 
# monologue
# JP: 日々姫に導かれるままに倒れる。\n日々姫の体に、体を重ねる。
1420 = "Tôi ngã xuống theo sự dẫn dắt của Hibiki. Áp cơ thể mình lên cơ thể em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
1149 = "「Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「もしか、したら――」
1093 = "「Nhỡ đâu——」"
# monologue
# JP: 日々姫が、重なり合ってる僕の背中をそおっとさする。\n背中ごし――自分の下腹――子宮の上を。
1486 = "Hibiki nhẹ nhàng vuốt ve lưng tôi đang đè lên em ấy. Vuốt ve phần bụng dưới của em ấy qua tấm lưng của tôi——ngay trên tử cung."
# 【日々姫】
# display as 日日姬
# JP: 「もしかしたら――お仕事……。\n私、すごい迷惑……かけちゃうのかも」
1095 = "「Nhỡ đâu——công việc……. Em sẽ gây rắc rối lớn…… mất thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「市長職なら、ポーレットと稀咲で代行できよう。\nデザインは――出産ぎりぎりまで描けるだろう」
1101 = "「Công việc Thị trưởng thì Paulette và Kisaki có thể làm thay được. Còn thiết kế thì——em có thể vẽ cho đến sát lúc sinh mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1005 = "「啊！」" 
# monologue
# JP: 同じ気持ちで、同じ理解で、同じ確信をもっている。\nだから日々姫を抱きしめる。日々姫の中の、未来ごと。
1394 = "Cùng một cảm xúc, cùng một sự thấu hiểu, cùng một niềm tin. Vì vậy tôi ôm chặt Hibiki. Ôm lấy cả tương lai bên trong em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「仮に迷惑であろうとも、誰からも祝福される迷惑だ。\nむしろかけてほしいときっと、皆が願ってくれている」
1100 = "「Dù có gây rắc rối đi chăng nữa, thì đó cũng là rắc rối được mọi người chúc phúc. Thậm chí chắc chắn mọi người đều mong em sẽ gây ra rắc rối đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！！！！」
1068 = "「Vâng!!!!」"
# monologue
# JP: 日々姫が笑う。\n汗だくでぐちゃぐちゃに乱れた顔で、飾り気もなく。
1509 = "Hibiki mỉm cười. Một nụ cười mộc mạc trên khuôn mặt nhễ nhại mồ hôi và rối bời."
# monologue
# JP: （ぐ～～～～～～っ）
1663 = "（Rột~~~~~~）"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
963 = "「Ồ.」"
# 【日々姫】
# display as 日日姬
# JP: 「いやぁん、私、かっこわるかと～」
964 = "「Á, trông em khó coi quá đi~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやいや、むしろかわいらしいさ。というか――\n当然だよな。セックスを貪っても、実際に腹はふくれん」
917 = "「Không đâu, ngược lại còn rất đáng yêu ấy chứ. Hay nói đúng hơn là—— Đương nhiên rồi. Dù có ngấu nghiến tình dục đến mấy thì bụng cũng không no được.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー……そういえばご飯。\n最後に食べたの……えと、いつだっけ？」
981 = "「A…… nhắc mới nhớ đến cơm. Lần cuối cùng mình ăn là…… ờm, khi nào ấy nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「さぁ、どうだったか。ともかく、すぐに食事にしよう」
918 = "「Chà, khi nào nhỉ. Tóm lại là đi ăn ngay thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、にぃに！　その前にっ」
1012 = "「A, anh hai! Trước đó thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ？」
1075 = "「Hửm?」"
# monologue
# JP: 甘えて日々姫がからみついてくる。\n嬉しいが、ここからさらにもう一戦は――
1488 = "Hibiki quấn lấy tôi nũng nịu. Vui thì vui thật, nhưng thêm một hiệp nữa thì——"
# 【日々姫】
# display as 日日姬
# JP: 「デザート。ひーちゃん、まだやけん」
1182 = "「Món tráng miệng. Hi-chan vẫn chưa được ăn mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そういえばそうだった」
967 = "「À, nhắc mới nhớ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん…………」
# 1047 = "「嗯……」" 
# monologue
# JP: デザートは、キス。とびきり甘く、ねばっこい。
1542 = "Món tráng miệng là một nụ hôn. Vô cùng ngọt ngào và dính nhớp."
# 【日々姫】
# display as 日日姬
# JP: 「ん……ちゅっ――ちゅむっ――ちゅるっ――れるっ――\nちゅっ――ん――ぷあっ――んふふ、ごちそうさまっ」
1051 = "「Ưm…… chụt——chụt——churu——liếm—— Chụt——ưm——pua——nfufu, cảm ơn vì bữa ăn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お粗末様、だ」
1073 = "「Không có gì đâu.」"
# monologue
# JP: そうして僕らは、今度こそ、\n今日はじめての食事を楽しむ。
1433 = "Và rồi lần này, chúng tôi mới thực sự, thưởng thức bữa ăn đầu tiên trong ngày."
