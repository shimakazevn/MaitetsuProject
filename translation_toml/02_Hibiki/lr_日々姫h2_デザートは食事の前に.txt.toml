971 = "「~~~!!!」"
# monologue
# JP: 締め付けも吸い付きも激しすぎ、全く休ませてもらえない。\n日々姫だって消耗しきっているであろうに――いやっ。
1363 = "Sự siết chặt và mút mát quá mãnh liệt, không hề cho tôi một giây nghỉ ngơi. Dù Hibiki chắc chắn cũng đã kiệt sức——không."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1007 = "「啊！！！」" 
# monologue
# JP: （ずぢゅっ！　ごちゅっ！　ぢゅばっ！　ごりゅっ！）
