1346 = "Đã trưởng thành xinh đẹp như một \"người phụ nữ trưởng thành tháo vát\"—— Nhưng chỉ trước mặt tôi, em ấy mãi mãi là một thiếu nữ, là cô em gái bé bỏng."
# 【日々姫】
# display as 日日姬
