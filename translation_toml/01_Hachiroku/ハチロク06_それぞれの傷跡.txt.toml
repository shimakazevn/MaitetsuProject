1722 = "「您究竟是在與波萊特小姐和玲奈討論什麼事情啊？」" 

# monologue
# JP: ――双鉄様のお顔が、曇る。
2801 = "雙鐵少爺的臉上陰雲密布。" 

# monologue
# JP: そのようなお顔を見たくなくって、させたくなくて、\n言葉を上手く、選択できなくなってしまう。
2431 = "我不願見到這樣的面容，不願繼續讓雙鐵少爺露出這樣的面容。然而慌亂之中，我卻口不擇言。" 

# 【ハチロク】
# display as 八六
# JP: 「何についてのお話ですか？\nわたくしが聞くべきではないことですか？」
1969 = "「這是在探討什麼事情呢？是不能讓我知道的事情嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや。そんなことはない。\nむしろ、お前が一番に知るべき話だ」
1466 = "「不，不是這樣的。倒不如說，其實是你最應該知道的事」" 

# 【ハチロク】
# display as 八六
# JP: 「それは――」
1989 = "「那到底——」" 

# monologue
# JP: 目覚めたときから、感じてたこと。
2512 = "早上醒來時，其實已經有所預感。" 

# monologue
# JP: 目覚めた隣に双鉄様がいなかった――\n寂しさと、不安と、そこに入り混じったもの。疎外感。
2780 = "醒來時，雙鐵少爺不在身邊。寂寞與不安瞬間湧上心頭，而疏遠感也混雜其中。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;に、関係のあるお話ですか？」
1802 = "「是與\\x%l8620;#00ffc040;８６２０%l;#;有關的事情嗎？」" 

# monologue
# JP: それを拭ってしまいたいから、\n双鉄様に、言葉で拭っていただきたいから、問いかける。
2548 = "正因為想要將那些情緒揮去，想要雙鐵少爺用話語將那些情緒揮去，才這樣發問。" 

# monologue
# JP: 「違う」と否定していただきたくて。\nけれどもきっと、そうはならないと予測もしていて。
2788 = "雖然希望得到否定，但心裡卻很清楚，答案應該不會如我所願。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。その通りだ」
1643 = "「嗯。正是如此」" 

# 【ハチロク】
# display as 八六
# JP: 「そのことでしたら、昨晩、\nわたくしと話しあったではありませんか」
1963 = "「這件事的話，昨晚不是和我已經討論過了嗎」" 

# monologue
# JP: 双鉄様の、あの言葉。\n『僕を信じて、今は休め』と――
2804 = "雙鐵少爺那句“相信我，先休息吧”猶在耳畔。" 

# monologue
# JP: それがどうとも取れる言葉と知りつつも甘えておいて……\nなのに実際こうなれば、わたくしの思考は乱れてしまう。
2442 = "我明知那句話的意思其實模稜兩可，卻對此視而不見……而在真的需要面對時，我的思緒早已亂作一團。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様を信じていいと――\nおっしゃってくださったではありませんか」
2013 = "「雙鐵少爺不是對我說讓我可以相信您的嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに言った。だから、僕は、お前のために――\nお前を守るために、僕の責任で決断を下そうと考えた」
1744 = "「我確實說過。所以，我為了你，為了保護你，正要擔起責任做出決定」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしを……守る」
1513 = "「保護……我」" 

# monologue
# JP: 嬉しいお言葉のはずなのに、\n思考回路のどこかがぽっと、幸せな熱を帯びるのに。
2767 = "這本應是令我無比開心的話語，思考迴路中的某處本應感到幸福的暖流。" 

# monologue
# JP: なのに、別の部分がキン――と、\n冷えきり、動かなくなったようで。
2608 = "然而，另外的部分卻感到如墜冰窟般的寒冷，令我僵在原地動彈不得。" 

# 【ハチロク】
# display as 八六
# JP: 「なにから、わたくしを守ってくださるのですか？」
1720 = "「您是指怎麼樣保護我呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「事故からだ。今のままなら確実に起こってしまう、\n\x%l台枠;#00ffc040;台枠%l;#;損傷に起因する、大きな事故からだ」
1514 = "「保護你不要出事故。以如今的狀況，今後一定會發生因\\x%l台枠;#00ffc040;車架%l;#;損傷引起的重大事故」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
2009 = "「雙鐵君」" 

# monologue
# JP: ポーレット様の瞳が不安気に伏せられて――\nその目を追って、わたくしも遅れて気付かされる。
2581 = "波萊特小姐的眼中暗藏著一絲不安。而順著視線看去，我才後知後覺地意識到——" 

# monologue
# JP: 双鉄様のお手がギュウっと握られている。\n握られて、ふるふると小さく震えてる。
2800 = "雙鐵少爺的手緊緊地握了起來。不只是握起來，還在輕微地顫抖著。" 

# 【ハチロク】
# display as 八六
# JP: 「ですので、わたくしは申しました」
2002 = "「關於這件事，我已經與您確認過了」" 

# monologue
# JP: わたくしよりも、ポーレット様が先に気づいた。\nわたくしではなく、ポーレット様に相談をした。
2265 = "先我一步發現的，是波萊特小姐。雙鐵少爺首先去尋求意見的，也不是我，而是波萊特小姐。" 

# monologue
# JP: 独立しあった物事に、関連性を覚える気がして、\n言葉の制御系統が、いっそう混乱してしまう。
2660 = "看似獨立無關的事，此刻卻意識到其中暗藏的關聯，而語言控制系統，也隨之陷入了混亂。" 

# 【ハチロク】
# display as 八六
# JP: 「あと二年。\nその期間なら、必ず安全に走れると」
1982 = "「還有兩年，在這段時間內，我一定保證安全行駛」" 

# monologue
# JP: 二年。\n真闇様たちのお父様から双鉄様に与えられた猶予期間。
2269 = "兩年。是真闇小姐她們的父親給予雙鐵少爺的時限。" 

# monologue
# JP: その間に、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を撤回に追い込めないなら、\n双鉄様は、きっと、御一夜から居なくなる。
2706 = "若是不能在這段時間內阻止\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶的話，雙鐵少爺勢必也將無法繼續留在御一夜。" 

# 【ハチロク】
# display as 八六
# JP: 「ですから、その間にわたくしと\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;を使い切り、\nどうぞ目的をお果たしくださいと、わたくしは」
1759 = "「所以，這段時間內，請儘管驅使我和\\x%l8620;#00ffc040;８６２０%l;#;，只要能達成您的目的，哪怕我……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに聞いた。嬉しく思った。\nその上で、僕は決断したのだ」
1962 = "「這些話我都記下了，也非常高興。所以，我才下定了決心」" 

# monologue
# JP: 双鉄様の手が伸びてくる。\nわたくしの帽子をめがけ、褒めてくださる時と同じく。
2792 = "雙鐵少爺伸出手來，像以往表揚我時一樣，向著我的帽子伸來。" 

# monologue
# JP: けれど体が勝手に動き、\nその手を、わずかに避けてしまう。
2340 = "可是身體卻擅自動了起來，輕輕躲過了那隻手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
1628 = "「唔？」" 

# monologue
# JP: 戸惑った顔。
2227 = "不解的表情。" 

# monologue
# JP: 双鉄様は、帽子の上から髪を撫でてくださらぬまま、\nその手を、もとへと戻してしまう。
2799 = "雙鐵少爺沒能隔著帽子輕撫我的頭髮，便收回了伸出的手。" 

# monologue
# JP: わたくし自身にも判断できない、\n不正極まる、その挙動。
2451 = "我自己也無法判斷，為何我會做出這荒誕至極的舉動。" 

# monologue
# JP: 双鉄様も、おそらく意味を取りかねて……\nだからお顔が、いっそう戸惑ったものになる。
2795 = "雙鐵少爺恐怕也同樣無法理解，所以才會露出那樣疑惑的表情吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ハチロク」
1547 = "「八六，其實我」" 

# monologue
# JP: 優しいお声。\nゆっくりとしたしゃべり方。
2592 = "溫柔的聲音。徐徐道來的語調。" 

# monologue
# JP: 大事なことを、\n双鉄様はおっしゃろうとしてくださっている。
2803 = "雙鐵少爺這顯然是要說很重要的事情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はな、ハチロク――鉄道事故が、怖いのだ」
1548 = "「八六，其實我啊，非常害怕鐵路事故」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！」
1638 = "「啊！！」" 

# monologue
# JP: 突き放されたと感じてしまう。
2716 = "被拋棄的感覺湧上心頭。" 

# monologue
# JP: その感覚が、不合理なものと理解して、\nそれでも、思考以外の部分が、熱暴走をしてしまう。
2789 = "雖然明知這感覺並不合理，可除思考以外的部分，還是不由地過熱失控了。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしの判断を、信用できないということですか？\nわたくしが、不具合を持つ\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であるから」
1970 = "「這是說不能相信我的判斷的意思嗎？就因為我是個有故障的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;嗎？」" 

# 【れいな】
# display as 波萊特＆玲奈
# JP: 『「ハチロクちゃん！」\n「ハチロクさん！」』
2037 = "『「八六！」\\n「八六小姐！」』" 

# monologue
# JP: ポーレット様の膝の上、\nじいっと黙り込んでいたれいなが、膝から下りる。
2292 = "原本坐在波萊特小姐腿上一言不發的玲奈，下到了地上。" 

# monologue
# JP: そしてつかつか、\n物も言わずにわたくしの方へ歩み寄り――
2688 = "而後毫不客氣一聲不響地徑直朝我走來——" 

# monologue
# JP: （ピンっ！）
2823 = "（啪！）" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！？」
2025 = "「！！？」" 

# monologue
# JP: 指で、おでこを弾かれる。
2808 = "額頭被手指彈了一下。" 

# monologue
# JP: 衝撃さえもほとんどなくて、\nけれど――どこかが、ひどく動揺してしまう。
2745 = "身體並未感受到明顯的衝擊，但是，卻覺得身體某處在劇烈地晃動。" 

# 【れいな】
# display as 玲奈
# JP: 「だだっ子は、デコピンをされちゃうのです」
1486 = "「任性的孩子就要被彈額頭」" 

# 【ハチロク】
# display as 八六
# JP: 「デコ、ピン？」
1697 = "「彈……額頭？」" 

# 【れいな】
# display as 玲奈
# JP: 「デコピンは、するほうがずっと痛いのです。\nポーレット、デコピンすると、泣きそうな顔するのです」
1698 = "「彈額頭呀，是彈的人才更痛。每次波萊特彈我之後，都是一副要哭的表情」" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
1215 = "「……」" 

# monologue
# JP: れいなも、泣きそうな顔をしてます。\n思考に酷いノイズが混じり、わたくしは混乱しています。
2619 = "玲奈也是一幅要哭出來的表情。干擾思考的雜音實在太嚴重，我已經完全陷入了混亂。" 

# monologue
# JP: だから――痛いと――わたくしは――\nこれが、この感覚も痛みだと――きっと理解をしています。
2462 = "所以，好痛——我肯定也理解了，這種感覺也是一種疼痛——" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしの……どこが、だだっ子などと」
1727 = "「我……哪裡任性了」" 

# 【れいな】
# display as 玲奈
# JP: 「双鉄さん。ハチロクさんの\x%l機関士;#00ffc040;[マスター,2]機関士%l;#;ですよ？\n信用をしてなかったら、一緒になんて走ってないです」
2006 = "「雙鐵先生不是八六小姐的\\x%l機関士;#00ffc040;[主人,1]司機%l;#;嗎？要是不信任你又怎麼能一起駕駛呢」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――」
1629 = "「啊——」" 

# monologue
# JP: それは、当然。\n０か１かで、曖昧さなく、正と断定できること。
2769 = "這簡直是理所當然的。如０和１般，絕無曖昧，且無從反駁的正確。" 

# 【れいな】
# display as 玲奈
# JP: 「ハチロクさんだって、そのことちゃんとわかってるです。\nわかってるのに、困らせるために言うのは、だだです」
1540 = "「八六小姐你其實也是心知肚明的不是嗎。既然如此，還說出這種讓人傷心的話，不就是任性」" 

# 【ハチロク】
# display as 八六
# JP: 「それは――けれど――」
1959 = "「這……可是……」" 

# monologue
# JP: 双鉄様は、不具合があると承知の上で、\nわたくしの\x%l機関士;#00ffc040;機関士%l;#;となり、あれほど頑張ってくださった。
2797 = "雙鐵少爺明知我有故障，卻還義無反顧地成為了我的\\x%l機関士;#00ffc040;司機%l;#;，為此付出了那麼多努力。" 

# monologue
# JP: だからわたくしも応えたくって、頑張って。\nなのに、わたくしの\x%l8620;#00ffc040;8620%l;#;が――双鉄様の重荷となって……
2455 = "所以我也想回應他的期待，一直在努力著。然而，我的\\x%l8620;#00ffc040;８６２０%l;#;，卻成了雙鐵少爺的重擔……" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな。ハチロクを心配してくれて、\n叱ってくれて、ありがとう」
1840 = "「玲奈，謝謝你擔心她，批評她」" 

# monologue
# JP: 双鉄様のお手がれいなの頭を撫ぜます。\nわたくしを――撫ぜ損なってしまわれた手が。
2793 = "雙鐵少爺伸手輕撫了玲奈的頭。那隻手，正是剛剛被我躲開的那隻手。" 

# monologue
# JP: お手が、揺れます、ぐらぐらと。\n双鉄さまのお姿全て、世界がぐらぐら、滲んで揺れます。
2779 = "那隻手在我的視野中搖動。雙鐵少爺的身影，乃至整個世界，似乎都在搖動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、ハチロクはダダをこねたわけでは無いのだ。\nいろいろなことが起きすぎて、少し混乱しているだけだ」
1462 = "「不過，八六並不是單純地在淘氣任性，而是發生了太多的事情，多少有些混亂而已」" 

# 【れいな】
# display as 玲奈
# JP: 「こんらん、ですかぁ？　って、ふわわっ！？」
1826 = "「混亂……嗎？咦？啊呀呀！？」" 

# monologue
# JP: れいなが、奇妙な声を出します。
2624 = "玲奈發出了有些奇怪的聲音。" 

# 【れいな】
# display as 玲奈
# JP: 「あの、ハチロクさん。れいな、軽ぅくしたつもりで――\nええと、そんなに痛かったですかぁ」
1967 = "「這個，八六小姐，玲奈只是想輕輕地彈一下。難道說，真有彈得那麼痛嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「デコピンごとき――少しも、痛くなどありませぬ」
1608 = "「只是彈額頭而已，根本不痛不癢」" 

# 【れいな】
# display as 玲奈
# JP: 「でも、ハチロクさんっ」
1610 = "「可是，八六小姐…」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。れいな」
1918 = "「謝謝你。玲奈」" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいな？　ね？　おいで？」
1838 = "「玲奈，來，過來吧」" 

# 【れいな】
# display as 玲奈
# JP: 「はい……ですぅ」
1625 = "「唔……好」" 

# monologue
# JP: ぽてぽてと、ゆっくり、足音が去っていきます。\nあたたかで大きな気配が、わたくしにそっと近づいて――
2748 = "輕柔的腳步緩緩地走開，而一個溫暖而高大的氣息向我靠近——" 

# monologue
# JP: （ぐいっ）
2824 = "（擦拭）" 

# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1629 = "「啊——」" 

# monologue
# JP: 双鉄様がハンカチで、わたくしの顔をそっと拭って。\n揺れ動いた世界がそれで、すっきり元に戻ります。
2796 = "雙鐵少爺手中的手帕輕輕拂過我的面龐。搖動的世界也隨之恢復了原樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな。妙なことを言ってしまったな」
1762 = "「抱歉，對你說了奇怪的話」" 

# 【ハチロク】
# display as 八六
# JP: 「妙なこと、など――」
1818 = "「沒這回事——」" 

# monologue
# JP: 双鉄様は、わたくしの顔を見てくださいません。
2794 = "雙鐵少爺卻並沒有在看我的臉。" 

# monologue
# JP: 転んで、汚れてしまった膝を、スカートの裾を、\n丁寧に、ぬぐい、はたいて、整えてくださっています。
2337 = "取而代之的是，他仔細地擦拭著因我摔倒而弄髒的膝蓋和裙擺，輕輕拍打，整理平順。" 

# 【ハチロク】
# display as 八六
# JP: 「いえ、確かに――いささか妙ではございましたね」
1468 = "「不，好像——確實有點奇怪」" 

# monologue
# JP: だから、わたくしを見て欲しくって。\nいつもどおりに、いい子と撫ぜていただきたくて。
2463 = "所以，想讓您看著我啊，像平常那樣，輕撫我的頭誇我是乖孩子。" 

# monologue
# JP: いつものわたくしに戻れるように、\nいつものわたくしらしい言葉を、負荷を感じても選びます。
2391 = "幫我回到平常的樣子，對我說平常會對我說的話，哪怕讓我感到有些壓力我也願意。" 

# 【ハチロク】
# display as 八六
# JP: 「鉄道事故が怖いなど、当然のことではございませんか」
1684 = "「害怕鐵路事故，那不是理所當然的事情嗎」" 

# monologue
# JP: 「そうだったな」と、きっと双鉄様は笑ってくださる。\n笑って、きっと、わたくしの頭を撫ぜてくださる。
2791 = "雙鐵少爺一定會笑著對我說“說得也是”。然後，一定會笑著輕撫我的頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1211 = "「…………」" 

# monologue
# JP: なのに、双鉄様は不意に止まってしまわれます。\n言葉ひとつも発さずに、その手をぴたりと止められます。
2615 = "然而，雙鐵少爺卻出乎我意料地僵在了原地。他一言不發，只是默默地停下了那隻手。" 

# 【ハチロク】
# display as 八六
# JP: 「鉄道事故を経験し、痛みを知っているわたくしです。\n事故のリスクを軽視するなど、ありえぬことです」
1814 = "「正因為我親身經歷過鐵路事故，深知其中的痛楚，所以我絕不會有任何輕視事故風險的行為」" 

# monologue
# JP: 双鉄様が、なにもおっしゃってくれないことが怖くて。\n沈黙を埋めるそのために、急いで言葉を重ねます。
2802 = "雙鐵少爺這樣沉默不語，讓我不禁心生恐懼。為掩飾這沉默，我只得繼續把心中所想一一說出。" 

# 【ハチロク】
# display as 八六
# JP: 「そのわたくしが、二年であれば大丈夫と――\nそう保証しているのですから」
1815 = "「正因為此，我向您保證，如果是兩年的話絕無問題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。僕はお前を信じている。\nお前が僕を大事にしてくれていることを知っている」
1549 = "「八六，我相信你。我也知道你是非常看重我的」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2012 = "「雙鐵少爺」" 

# monologue
# JP: いつもの、双鉄様のお声。\n優しいお声。
2766 = "這是雙鐵少爺平常那溫柔的聲音。" 

# monologue
# JP: なのに、お顔が――\nどこか、強張っていらっしゃいます。
2614 = "然而，表情中，卻不知從哪裡透露出些許勉強的痕跡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その前提の上で――\n一つだけ、お前に確認させてくれ」
1653 = "「在這個前提下，我想向你確認一件事」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、なんなりと。双鉄様」
1669 = "「好的，雙鐵少爺，您儘管問」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の問題がなくとも、工場誘致との競争がなくとも、\nハチロクは、\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;の強行運行を主張するのか？」
1521 = "「假使沒有我的問題，假使沒有關於工廠落戶與否的角力，八六你還會堅持強行讓\\x%l8620;#00ffc040;８６２０%l;#;繼續行駛嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！」
1979 = "「這！」" 

# monologue
# JP: そのような、こと――\nそのようなこと……わたくしは、決して行いません。
2768 = "這種事……這種事……我是斷然不會做的。" 

# monologue
# JP: あと二年、無理な運行を続ければ、歪みは回復不能となり、\n\x%l8620;#00ffc040;[あの子,3]8620%l;#;を――わたくしの分身を、必ず壊してしまいますから。
2356 = "因為再持續勉強行駛兩年的話，這扭曲會變得無法修復，如同我分身一般的\\x%l8620;#00ffc040;[那孩子,3]８６２０%l;#;也必然會徹底損壞。" 

# 【ハチロク】
# display as 八六
# JP: 「それは――双鉄様」
1961 = "「這……雙鐵少爺」" 

# monologue
# JP: 自分自身に補正不能な矛盾の存在を確認します。
2438 = "我意識到了我身上這無法調和的矛盾。" 

# monologue
# JP: 後二年、事故なく運用を出来ると確信しているのに、\n事故確率の向上を、不可避と予測もしています。
2289 = "即便確信今後兩年中可以不發生任何事故繼續運轉，但可以想見發生事故的機率會不可避免地被提高。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様……わたくしは――」
2018 = "「雙鐵少爺，我……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこに即答できぬのならば――すまんな、ハチロク。\n\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;の運休を、覆すことは出来ないよ」
1672 = "「如果你不能毫不猶豫地回答的話，抱歉，八六。\\x%l8620;#00ffc040;８６２０%l;#;停運，這一決定便絕無更改的可能」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら――どうして、双鉄様はっ」
1773 = "「既然這樣，那雙鐵少爺又為什麼……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ」
1613 = "「呃」" 

# monologue
# JP: またです。\n視界が歪んでしまいます。
2668 = "眼中的世界，又一次變得扭曲起來。" 

# monologue
# JP: 声は、せめても震わせぬよう、\n制御を、いっぱいに行います。
2447 = "我竭盡全力，控制著自己，只求不要發出顫抖的聲音。" 

# 【ハチロク】
# display as 八六
# JP: 「でしたらどうしてわたくしに――\n望みを言えと……そう、ご命令されたのですか」
1771 = "「既然這樣，為什麼還要我……不，還要命令我，說出自己的願望呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――ハチロク」
1968 = "「這是因為……八六」" 

# 【ハチロク】
# display as 八六
# JP: 「あのご命令が、きっとわたくしを不安定にし、\n欲張りに、だだっ子にしてしまったのです」
1876 = "「肯定是那條命令讓我變得這樣不穩定，多了這許多私心，成了任性的孩子」" 

# monologue
# JP: 制御をしようと思うのに、熱暴走が止められません。
2261 = "儘管努力控制，過熱失控卻仍在持續。" 

# monologue
# JP: わたくしは、壊れてしまっています。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が\x%l機関士;#00ffc040;機関士%l;#;に、逆らうなどはありえませんのに。
2426 = "我一定是壞掉了。若非如此，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;又怎麼可能會頂撞\\x%l機関士;#00ffc040;司機%l;#;呢？" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま――わたくし――は」
# 2018 = "「雙鐵少爺，我……」" 

# monologue
# JP: 自分が、とても恐ろしいです。
2433 = "我從未覺得自己如此可怕。" 

# monologue
# JP: これ以上双鉄様と話していると、\nどこまで暴走してしまうのか、予測さえもが立ちません。
2279 = "再和雙鐵少爺繼續說下去的話，我也無法想像自己會失控到何等地步。" 

# 【ハチロク】
# display as 八六
# JP: 「――申し訳ございません。今は、失礼いたします」
1889 = "「萬分抱歉，目前還容我先行告退」" 

# 【双鉄】
# display as 雙鐵
# JP: 「待て、ハチロク！」
1864 = "「等一下，八六！」" 

# 【ハチロク】
# display as 八六
# JP: 「止めないで！　どうぞ、追わないでくださいましっ！」
1458 = "「不要攔我！也請您不要來追我！」" 

# monologue
# JP: 言えば、双鉄様は止まってくださいます。
2557 = "此話一出，雙鐵少爺便當真停了下來。" 

# monologue
# JP: わたくしが望んだその通り――\nそのことが、ひどく苦しく、寂しいように認識されます。
2551 = "正如我所願，然而同時湧上心頭的，卻是無比的苦澀與寂寞。" 

# 【ハチロク】
# display as 八六
# JP: 「今のわたくしは、熱暴走をしています。\n数時間もあれば、きっと、クールダウンできますので」
1842 = "「現在我正處於過熱失控中。幾個小時後應該就能冷卻下來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――しかし」
1609 = "「可是」" 

# 【ハチロク】
# display as 八六
# JP: 「ですので……どうか。今はひとりに。\n数時間後に、また、お話をさせてください」
1755 = "「所以，請務必先讓我一個人靜一靜。容我在幾個小時後再繼續方才的談話吧」" 

# monologue
# JP: はぁっと、息を吐く音を聞き取れます。
1179 = "“唉……”，一聲嘆息傳入耳中。" 

# monologue
# JP: どういう息を吐かれたのかを知りたくて、お顔が見たくて\n――なのに怖くて、どうしても振り返ることができません。
2437 = "我想知道雙鐵少爺這聲嘆息中的含義，我想看到雙鐵少爺的面容——但是我卻害怕到不敢回頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――――わかった。では、またその時に」
1666 = "「好吧。那就等會再說吧」" 

# 【れいな】
# display as 波萊特＆玲奈
# JP: 『「双鉄くん」\n「そうてつさん」』
2043 = "『「雙鐵君」\\n「雙鐵先生」』" 

# monologue
# JP: 双鉄様のお名前が呼ばれる――\nその声を何故か聞きたくなくて、早足になって。
2520 = "是呼喚雙鐵少爺名字的聲音。這聲音卻不知為何分外刺耳，我不由得快步逃開。" 

# monologue
# JP: ……わたくしを追う足音は。\nわたくしがそうと望んだがゆえ、聞こえて、こなくて。
2552 = "正如我所願，身後並沒有傳來向我追來的腳步聲。" 

# 【ハチロク】
# display as 八六
# JP: 「二年……\nわたくしの方が保たないかもしれませんね」
1538 = "「兩年……或許堅持不到的，反倒會是我自己吧」" 

# monologue
# JP: 登呂流湯のご主人の、\nいいかげん極まるお見立てに、もはや腹さえ立ちません。
2633 = "登呂流浴場老闆那敷衍至極的診斷，在我心中已經激不起半點波瀾。" 

# 【ハチロク】
# display as 八六
# JP: 「自身も制御できないようでは……\n双鉄様のお役にたつどころか、むしろご迷惑に――」
1863 = "「竟連自己都無法控制……這樣別說為雙鐵少爺出力，怕是只能拖後腿吧……」" 

# 【日々姫】
# display as 日日姬
# JP: 「あれ？　ハチロクなんでこんなところに」
1617 = "「咦？八六你在這幹什麼呢」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！？」
2026 = "「！？」" 

# monologue
# JP: 白い手。\n長い――絵描きさんの指。
2646 = "白皙的手，修長的，畫家的手指。" 

# 【ハチロク】
# display as 八六
# JP: 「日々姫こそ――どうして、こんなところに？」
1776 = "「日日姬你才是，到這裡來做什麼啊？」" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%l保火;#00ffc040;[ほか,1]保火%l;#;に来たの――\n\x%l保火;#00ffc040;保火%l;#;に来たんだよ」
1505 = "「來整\\x%l保火;#00ffc040;留火%l;#;——來做\\x%l保火;#00ffc040;留火%l;#;的啊」" 

# monologue
# JP: 同じような言葉をけれど、なぜだか二回繰り返し。\nそれで、わたくしも気づきます。
2238 = "並無多少分別的話，卻不知為何說了兩次。實在太過明顯，讓我沒辦法不注意到。" 

# monologue
# JP: （日々姫……標準語を話していますね）
2827 = "（日日姬這是在努力說普通話啊）" 

# monologue
# JP: 双鉄様とお話するときの日々姫を見ていると、わかります。\n素顔の日々姫は、隈元弁。
2666 = "看過與雙鐵少爺對話時日日姬的樣子就不難理解了。日日姬不假思索時，說的是隈元話。" 

# monologue
# JP: そして、標準語を話す日々姫は、\n背伸びをしたり、よそ行きの顔をしていると。
2658 = "相對的，說普通話時的日日姬，挺直了腰板，表情就像換了一個人一樣。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l保火;#00ffc040;[ほか,1]保火%l;#;、と言っても――\n双鉄様に、お話を聞いていないのですか？」
1196 = "「\\x%l保火;#00ffc040;留火%l;#;——您還沒有聽雙鐵少爺說嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「聞いたよ？　ハチロク走っていっちゃうし――\nわたしが遅れていったらさ、兄さん、こーんな顔してて」
1874 = "「聽他說了啊。我剛來就看到八六一個人跑出去了，後來我一進門，就看到哥哥一副這——樣的面孔」" 

# monologue
# JP: こーんな、と言って、\n日々姫は、映画に出てくる歩く死体みたいなお顔をします。
2510 = "日日姬邊說著“這——樣”，邊做出了一個電影裡那種會走路的屍體一樣的表情。" 

# monologue
# JP: おかしなお顔。\nけれども少し、双鉄様の様子が浮かんでくるようです。
2375 = "好怪的表情。不過，似乎多少能想見雙鐵少爺當時是什麼樣子。" 

# 【ハチロク】
# display as 八六
# JP: 「落ち込まれていたのですか？　あの双鉄様が」
2016 = "「雙鐵少爺那樣的性格，居然也消沉起來了？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん、落ち込んでた。“あの”兄さんが」
1797 = "「是的，很消沉。明明哥哥是“那樣的性格”」" 

# monologue
# JP: 日々姫が、\x%lポーカー;#00ffc040;ポーカー%l;#;を手に取ります。
2511 = "日日姬邊說邊拿起了爐鉤。" 

# monologue
# JP: \x%lカマ;#00ffc040;カマ%l;#;のフタをあけ、\nざくざくと、中の石炭を崩します。
2786 = "隨後打開\\x%lカマ;#00ffc040;窯%l;#;的蓋子，喀拉喀拉地搗著裡面的煤炭。" 

# 【日々姫】
# display as 日日姬
# JP: 「わたしね、ずっと。兄さんって、頭が良くて強いから。\nだから、悩みも落ち込みもしないんだって、思ってたの」
1559 = "「其實我呢，一直覺得哥哥他又聰明又厲害。所以覺得他大概既沒有煩惱也不會消沉」" 

# 【ハチロク】
# display as 八六
# JP: 「そうではないのですか？　\n双鉄様は、賢く、お強い方ではございませんか」
2019 = "「難道不是那樣嗎？雙鐵少爺難道不是既聰明又厲害的人嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「そうだよ。でも、強くて賢くても落ち込むでしょ。\n賢い方が……むしろ悩みは、たくさんなんじゃないの？」
1795 = "「是的啊。不過，又厲害又聰明也一樣會消沉啊。不如說，越是聰明人，煩惱才越多不是嗎？」" 

# monologue
# JP: 肩をすくめて、\n日々姫は得物を、ワンスコへと持ち替えます。
2507 = "日日姬聳了聳肩，把手裡的爐鉤換成了公斤鍬。" 

# 【ハチロク】
# display as 八六
# JP: 「それは……\nそう言われれば、そのような気もいたしますが」
1960 = "「這……這麼一說倒也似乎確實有道理」" 

# 【日々姫】
# display as 日日姬
# JP: 「今までの兄さんが悩まなかったのはさ――だからきっと。\n自分をすごく、抑えてたから」
1484 = "「以前哥哥看起來都沒有什麼煩惱，那肯定都是他極力壓抑掩飾自己吧」" 

# 【ハチロク】
# display as 八六
# JP: 「ご自分を――抑える？」
1655 = "「壓抑……自己嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あれが欲しいとか、これは嫌とか――\nそういうのなかったら、世の中って簡単だと思わない？」
1725 = "「想要這個，討厭那個——如果沒有了這些想法，這個世界是不是一下子就單純得多了？」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――そのような意味ですか」
1630 = "「啊——原來是這樣的意思啊」" 

# monologue
# JP: 本当に左様ですね、と頷きます。
2649 = "的確是這樣沒錯，只能點頭認同。" 

# monologue
# JP: 欲しい気持ち。欲。\nそれはわたくしの世界を、苦しい物に変えましたから。
2554 = "正是“想要”這樣的欲望，讓我的世界變得如此苦澀。" 

# 【日々姫】
# display as 日日姬
# JP: 「好きも嫌いも押し殺してさ。きっと全部を義務にして。\n――だから兄さんは悩みも落ち込みもしなかった」
1622 = "「哥哥肯定是扼殺掉喜歡和討厭的感情，然後把所有的事都當作是自己的義務——所以才能既不煩惱也不消沉」" 

# monologue
# JP: ザク、ザクと――\n日々姫は石炭を投げ込みます。
2346 = "唰啦、唰啦——日日姬鏟煤的手並沒有閒著。" 

# 【日々姫】
# display as 日日姬
# JP: 「でも、今回はすごく悩んでるよね。\nめちゃくちゃうろたえて、おろおろしてる」
1464 = "「不過，這一次他真的是很煩惱呢。簡直是慌得不行，一副坐立不安的樣子」" 

# 【ハチロク】
# display as 八六
# JP: 「左様、ですか？\nわたくしには、とてもそのようには」
1845 = "「當真……如此嗎？我實在是無法想像」" 

# 【日々姫】
# display as 日日姬
# JP: 「あはっ！」
1634 = "「啊哈！」" 

# monologue
# JP: からりと――高熱の油を通したような笑いです。
2489 = "日日姬口中迸發出清脆爽朗的笑聲。" 

# monologue
# JP: 少しもしつこいところがなくて、\nさくりと、言葉が噛み砕かれます。
2560 = "毫不拖泥帶水，隨後的話語也如同滾油炸過一般乾脆。" 

# 【日々姫】
# display as 日日姬
# JP: 「そこに気づけてないんなら、ハチロクと兄さん、\nかなり似たもの同士だよね」
1846 = "「當真沒注意到這一點的話，八六和哥哥你們兩個還真的是很像呢」" 

# 【ハチロク】
# display as 八六
# JP: 「似たもの同士――でございますか？」
1732 = "「我們……很像嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「多分ね。きっと――\n心の大事なところから、ずっと目を逸らし続けてた同士」
1726 = "「應該是八九不離十吧。都是一直在迴避，對自己心裡最看重的部分視而不見」" 

# 【ハチロク】
# display as 八六
# JP: 「……」
# 1215 = "「……」" 

# monologue
# JP: 心。こころ。\n双鉄様は、そうなのでしょうか？
2413 = "心——心靈。雙鐵少爺，或許是這樣吧？" 

# monologue
# JP: わたくし――わたくしは――\nしかし、わたくしは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なのですし――
2420 = "我、我——但是，我只是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;啊……" 

# monologue
# JP: （ザっ！）
2822 = "（唰！）" 

# monologue
# JP: 鮮やかに、日々姫の投げ込む石炭が、\n\x%lカマ;#00ffc040;カマ%l;#;の[バック,1]奥面を抑えます。
2496 = "日日姬拋出的煤炭，劃出一道優美的弧線，蓋住了\\x%lカマ;#00ffc040;窯%l;#;的深處。" 

# monologue
# JP: まるで一枚の絵のように、\n無駄なく、美しい動きでもって。
2284 = "動作猶如一幅優美的畫作一般，毫無累贅。" 

# 【ハチロク】
# display as 八六
# JP: 「上手く――なりましたね。短い期間に」
1975 = "「這麼短的時間，就變得如此熟練了」" 

# monologue
# JP: 言葉がするりと滑り出てきて――\n瞬間「ああ」と認識します。
2736 = "話語脫口而出的瞬間，我不禁為我意識到的事情發出驚呼聲。" 

# monologue
# JP: これが、日々姫の言っている、\n『目を逸らし』ている、実例でしょうか？
2770 = "這莫不就是就是日日姬口中所說的“視而不見”？" 

# 【日々姫】
# display as 日日姬
# JP: 「そりゃそーよ。\nあれだけスパルタで鍛えられたら」
1996 = "「那是自然，都那樣斯巴達式地訓練過了嘛」" 

# monologue
# JP: けれど、日々姫は気にしたそぶりもみせません。\nだから、なんだか――悲しくなります。
2612 = "然而，日日姬看起來似乎是真的毫不知情。我不由得悲從中來。" 

# 【ハチロク】
# display as 八六
# JP: 「無駄な努力を、重ねさせてしまいましたね」
1834 = "「然而，那些努力，都成了無謂的付出」" 

# 【日々姫】
# display as 日日姬
# JP: 「無駄？　って、なにが？」
1828 = "「無謂？這是什麼意思？」" 

# monologue
# JP: 大きく綺麗に\x%lカマ;#00ffc040;カマ%l;#;を整え、\nその上に、日々姫は石炭を敷いていきます。
2492 = "日日姬將寬廣的\\x%lカマ;#00ffc040;窯%l;#;理得平平整整，而後又均勻地鋪上了煤炭。" 

# monologue
# JP: 次に蒸気をあげるとき――\nその時のため、種火を絶やさぬ――\x%l保火;#00ffc040;保火%l;#;をします。
2595 = "為下一次產生蒸汽時做好準備，保持火種不滅——也就是\\x%l保火;#00ffc040;留火%l;#;。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l保火;#00ffc040;[ほか,1]保火%l;#;をしても……\n\x%l8620;#00ffc040;[この子,3]8620%l;#;は、もう、走れないのですから」
1566 = "「即便做了\\x%l保火;#00ffc040;留火%l;#;，\\x%l8620;#00ffc040;[這孩子,3]８６２０%l;#;也已經不能再行駛了」" 

# 【日々姫】
# display as 日日姬
# JP: 「走れない？　なんで？　直すでしょ？　また」
1455 = "「不能行駛？為什麼？還能修好的吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「直す、と簡単に言いますが――」
1517 = "「修好，說來簡單——」" 

# 【日々姫】
# display as 日日姬
# JP: 「簡単じゃなくても、直すでしょ？\nだってにぃに――兄さんだよ？　右田双鉄だよ？」
1687 = "「就算不簡單，也總能修得好吧？他可是我阿哥——我哥哥啊。是右田雙鐵啊」" 

# monologue
# JP: 日々姫の、まっすぐな双鉄様への信頼。\nわたくしはそれを、羨ましいように認識します。
2498 = "日日姬毫不掩飾對雙鐵少爺的信任。我覺得，我真是有些羨慕她這一點了。" 

# 【ハチロク】
# display as 八六
# JP: 「確かに……双鉄様なら為されるでしょう。\n十分な時間と技術と設備、それからお金があれば」
1848 = "「的確，如果有充分的時間、技術與設備保障，同時資金充沛的話，雙鐵少爺想必會這樣做的吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「あはっ、\nハチロクもポーレットさんと同じこと言ってるし」
1635 = "「啊哈，八六也說了和波萊特小姐一樣的話呢」" 

# monologue
# JP: ごくさりげない一言に、\nけれど期待が、ひとつ潰されてしまいます。
2370 = "她的無心之言，毫不留情地擊碎了我心中的一個期待。" 

# monologue
# JP: あるいは、もしかしてポーレット様が、\nわたくしの知らない革新技術をご存知かも、という期待が。
2294 = "原本我還有著“或許，說不定，波萊特小姐會知道一些我所不知道的革命性的新技術”這樣的期待。" 

# 【日々姫】
# display as 日日姬
# JP: 「時間は、つまり労働力でしょ？　人の手の数。\nそれが多ければ多いほど、時間は圧縮できるよね」
1806 = "「時間，說到底就是勞動力吧？只要人手足夠多，那麼時間相應地就可以被壓縮了」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
1793 = "「是的」" 

# 【日々姫】
# display as 日日姬
# JP: 「お金も、技術も設備も、十分な人と人脈があれば、\nどうとでもなる問題じゃない？」
1928 = "「資金也好技術也好設備也好，只要有足夠的人和人脈的話，其實都不成問題不是？」" 

# monologue
# JP: なるほど。\n幾分、理解できたかもしれません。
2290 = "原來如此。我大概稍微理解了那麼一點。" 

# 【ハチロク】
# display as 八六
# JP: 「それは……\n今一度、毛利の[あき,1]安芸様を頼るということですか？」
1978 = "「這麼說，現在是打算再次仰仗毛利的安芸殿下嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「安芸様もきっと頼りになるよね。\nけど、もっと頼りになる人たちがいるじゃない」
1680 = "「安芸殿下也的確是值得信賴的人啦。不過，我們還有其他更值得信賴的人不是嗎」" 

# monologue
# JP: 言いながら、日々姫は自分の胸を親指で指し示します。
2777 = "邊說，日日姬邊用大拇指指了指自己的胸口。" 

# monologue
# JP: そしてその手を大きく広げ――\nあたりを、ぐるりと見渡します。
2603 = "然後張開手臂，在原地轉了個圈。" 

# 【日々姫】
# display as 日日姬
# JP: 「[この子,3]8620はさ、たくさんの人を喜ばせたでしょ？\n“[ハチロク,3]8620運転台通信”も、もっとたくさんに読まれてる」
1556 = "「其實啊，喜歡著[這孩子,3]８６２０的人不是很多嗎？而“[八六,3]８６２０駕駛台通信”的讀者，那就更多啦」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1629 = "「啊——」" 

# 【日々姫】
# display as 日日姬
# JP: 「御一夜の人たちと、観光に来てくれた人たちと――\n[この子,3]8620を好きな人、思ってるよりたくさんいるよ？」
1710 = "「御一夜的人們，以及慕名而來的觀光客們——喜歡著[這孩子,3]８６２０的人，或許比你想像得更多哦」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら――募金とボランティアを？」
1983 = "「那——是說去開展募捐和召集志願者嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん。にぃに――兄さんはその方向で考えてるみたい。\nそれじゃ足りないっていって、まだ悩んでもいたけど」
1646 = "「嗯。阿哥——哥哥說想向這個方向嘗試一下。但似乎光是這樣也還是不夠，還在為這傷腦筋呢」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様は……最初からそこまでを考えて？」
2011 = "「雙鐵少爺……從一開始就想到這麼遠了嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「でしょ？　にぃにだもん。\n[この子,3]8620のことも、見捨てたりとか、絶対しないよ」
1784 = "「是吧？畢竟是阿哥啊。拋棄[這孩子,3]８６２０這種事，他肯定是做不出來的啦」" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;のことも――\nああ、左様です。双鉄さまは、きっと、誰のことさえも。
2773 = "連\\x%l8620;#00ffc040;８６２０%l;#;也——啊，說來也是呢。雙鐵少爺，是不會拋棄任何人的。" 

# monologue
# JP: 嬉しくて。ほっとして。\nけれど、少し――ほんの少しだけ、口惜しいです。
2350 = "喜悅和安心感湧上心頭。不過，還是有點，有那麼一點點委屈。" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら……最初からそうとおっしゃってくだされば」
1770 = "「既然這樣，為什麼一開始不直接跟我說啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「なんか行き違っちゃったの？」
1745 = "「或許只是哪裡有什麼誤會吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。そうですね……\nただの、行き違いのようですね」
1788 = "「是呢。肯定是這樣，只是哪裡有什麼誤會吧」" 

# monologue
# JP: 日々姫と話すと、混乱が整頓されていきます。
2701 = "與日日姬的一番話，讓我得以重整混亂的思緒。" 

# monologue
# JP: いえ、きっと――日々姫は強く意識して、\nわたくしを、落ち着けようとしてくれているのでしょう。
2232 = "不，日日姬肯定是有意識地引導我冷靜下來吧。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様がおっしゃったのです。『鉄道事故が怖い』と。\nそれでわたくし、責められたように受け取ってしまって」
2014 = "「雙鐵少爺剛才對我說他“非常害怕鐵路事故”。這話在我聽來應該是在斥責我吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　ちょっ、待っ――にぃにが言ったと？\n『鉄道事故が怖い』って――」
1615 = "「咦！？等、等一下。阿哥這麼說了？說他“非常害怕鐵路事故”？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。確かに」
1799 = "「是的，沒有錯」" 

# 【日々姫】
# display as 日日姬
# JP: 「それでハチロクはにぃに――んんっ――兄さんに……」
1988 = "「那八六你對阿哥——唔——哥哥……」" 

# monologue
# JP: 数秒――十秒――長い沈黙。
2247 = "五秒，十秒，漫長的沉默。" 

# monologue
# JP: 日々姫は困ったような息を吐き、\nわたくしを、じっと見つめなおします。
2501 = "日日姬滿臉苦惱地嘆了口氣，始終直直地盯著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「なんで鉄道事故が怖いか――\nハチロク、ちゃんと、にぃにぃに聞いたと？」
1827 = "「為什麼會害怕鐵路事故的原因，八六你有好好問過阿哥沒？」" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ――いいえ――」
1469 = "「不，沒有——」" 

# monologue
# JP: 日々姫の瞳。\n怖いくらいに真剣に、まっすぐ、わたくしを捉えます。
2502 = "日日姬的眼神，認真得有些可怕，就這樣目不轉睛地盯著我。" 

# 【ハチロク】
# display as 八六
# JP: 「聞くもなにも――事故が怖いなど、当然で――っ！」
1974 = "「這還要問嗎，害怕事故，那還不是理所當然——啊！」" 

# monologue
# JP: 当然のこと。\n当然のことは、当然だから、誰も、口になどしはしません。
2628 = "理所當然。理所當然的事，正因為理所當然，所以誰都不會特地去強調。" 

# monologue
# JP: なのにあえて、\n“当然”を、わざわざ言葉にするのなら――
2609 = "然而，既然特地把這“理所當然”說出來的話——" 

# 【ハチロク】
# display as 八六
# JP: 「あるの――ですね？\n双鉄様には、鉄道事故を恐れる、特別な理由が」
2015 = "「雙鐵少爺害怕鐵路事故，一定是……有什麼特別的理由吧？」" 

# monologue
# JP: 予測機能を、遮断してしまいたくなります。
2429 = "我不由得想屏蔽掉自己的預測功能。" 

# monologue
# JP: その理由を類推することは、大きな不具合に繋がりそうで\n――けれどもだから、知らなければと認識します。
2708 = "若是深究其中緣由的話，恐怕會引發嚴重的故障——然而我也很清楚，這件事情必須要搞清楚才行。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしに、その理由を教えてください」
1917 = "「請告訴我其中的緣由」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃにの口から――\nそれば、ちゃんと聞かねばいけんよ」
1966 = "「這個還是得讓阿哥親口告訴你才行」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様から……直接に」
1850 = "「直接問……雙鐵少爺」" 

# monologue
# JP: それは怖いと――\n明確な理由が無いのに、認識します。
2515 = "明明沒有任何明確的理由，卻對這樣做心存恐懼。" 

# monologue
# JP: お会いし、お伺いしたいのに――
2434 = "我恨不得馬上見面問清一切，可……" 

# 【日々姫】
# display as 日日姬
# JP: 「行き違いなんて、あって当然のことやけん」
1537 = "「兩人有誤會這不常有的事嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「！？」
# 2026 = "「！？」" 

# monologue
# JP: どうして日々姫には、わたくしの不安がわかるのでしょう。\nどうして日々姫は、わたくしを助けてくれるのでしょう。
2597 = "為什麼日日姬會知道我的不安呢？為什麼日日姬會如此幫助我呢？" 

# 【日々姫】
# display as 日日姬
# JP: 「行き違いば怖がってたら、\nにぃにと、二度と話ばできんよーになっとよ？」
1901 = "「要是害怕誤會的話，以後整不好可就再也沒辦法跟阿哥說話了」" 

# 【ハチロク】
# display as 八六
# JP: 「それは――」
1957 = "「這……」" 

# monologue
# JP: 明確な理由のもとでの、当然に予測できる結末。\n――そのような未来、絶対に迎えたくありません。
2765 = "這是理所當然、可想而知的結果。然而這樣的未來，是我無論如何都不想面對的。" 

# monologue
# JP: でしたら、わたくしは……\nわたくしが行うべきは、ひとつです。
2474 = "既然這樣，我……我該做的事自然別無選擇。" 

# 【ハチロク】
# display as 八六
# JP: 「ありがとう。日々姫。\nでしたらわたくし――双鉄様に、お伺いしてまいります」
1919 = "「謝謝你，日日姬。那我就去找雙鐵少爺問個清楚」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん。それがよかとよ」
1645 = "「嗯。這不挺好」" 

# monologue
# JP: 日々姫が笑って。\n笑っているのに、どこか少しだけ寂しそうで。
2505 = "日日姬笑了。不過她的笑容中，似乎閃過了一絲寂寞。" 

# monologue
# JP: その理由を――わたくしは、\n聞いてはいけないものだと、何故か、認識します。
2226 = "不知為何，我就是覺得，其中的緣由是我萬萬不能過問的。" 

# 【ハチロク】
# display as 八六
# JP: 「ありがとう、日々姫」
1920 = "「謝謝你，日日姬」" 

# monologue
# JP: だからもう一度お礼を言って、小さく一歩を踏み出します。
2457 = "所以我再一次向日日姬道謝，隨後邁出了小小的一步。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし――行ってまいりますね」
1474 = "「事不宜遲，我這就去找雙鐵少爺」" 
