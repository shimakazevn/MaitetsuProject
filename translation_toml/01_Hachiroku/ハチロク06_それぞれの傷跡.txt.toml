[script]
# lines: 415 
# monologue
# JP: ポーレットは少し眠そうだ。
2580 = "波萊特好像有點睏了。" 

# monologue
# JP: その膝の上、\nれいなの口が大きく開き――
2687 = "而坐在她腿上的玲奈也大張著嘴打著哈欠。" 

# 【れいな】
# display as 玲奈
# JP: 「ふぁ……ぁ――\nあ、ごめんなさい、ですぅ」
1619 = "「哈……啊，對不起……嗚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1620 = "「哎呀」" 

# monologue
# JP: まだ三時。\n早朝というにも早過ぎる――夜の領域を抜けぬ時間だ。
2466 = "才三點鐘，說早這也未免太早，嚴格說應該還算是在夜裡吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、どうしても始発の前に話したかった」
1454 = "「不好意思，但還是有些話希望能在發車前說」" 

# monologue
# JP: 始業準備もある以上、\n何時でも――できるだけ早くの方がいい。
2359 = "因為後面還有開業準備要做，所以無暇顧及幾點，只能儘量早些。" 

# monologue
# JP: そう相談した結果出てきた、この時刻ではあるのだが。
2690 = "而這個時間，就是在這個前提下討論定下的。" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、わたしがこの時間でって言ったんですし……\nそれに普段楽させてもらってますし、早起きくらい――」
1623 = "「哪裡，這個時間本就是我提出來的。而且平常承蒙大家照顧，偶爾早起一次何足掛齒」" 

# monologue
# JP: 言って一瞬、\nポーレットの目がきょろっと動く。
2738 = "說話間，波萊特的目光左右掃了一圈。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃん、ご一緒じゃないんですか？」
1541 = "「八六沒和你在一起嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。あれがいると――\n僕が、判断を誤ってしまいかねないと思ってな」
1632 = "「啊。要是她在的話，我怕會影響我做出正確的判斷」" 

# monologue
# JP: 決断している筈なのに、そうとしか決断できない筈なのに、\nこんな言葉が、ついつい口から出てしまう。
2530 = "本應早已下定了決心，本應明知已別無選擇，但這話還是不由自主地脫口而出。" 

# monologue
# JP: 顔に、言葉に、なにかが滲んでしまったのだろうか？\nポーレットは、かすかに頷き背筋を伸ばす。
2521 = "是我的表情或是言語間表露出了什麼訊息嗎？波萊特聽到後微微地點了點頭挺了挺身。" 

# 【ポーレット】
# display as 波萊特
# JP: 「――大事な事情があっての早起きだったら、\nいくらでもします、大丈夫です」
1807 = "「有重要的事情要談的話，不管多早起都是應該的，沒有問題」" 

# monologue
# JP: その顔からはもう、眠気の霧が晴れている。\nならば、時間を無駄にはすまい。
2585 = "波萊特的臉上已不見一絲倦意。既然如此，就不能再繼續浪費時間了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「話というのは、\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;の損傷についてだ」
1903 = "「要說的是關於\\x%l8620;#00ffc040;８６２０%l;#;損傷的事」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　どこか傷んだんですか？」
1639 = "「啊！？有哪裡損壞了嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「傷んだ、ではなく、傷み続けていたらしい。\n長期的に――じわじわと。それが、ついに表面化した」
1519 = "「倒並不是剛剛造成的損壞，更像是長期的暗傷。長年累月，日積月累，終於浮出了水面」" 

# 【れいな】
# display as 波萊特＆玲奈
# JP: 『「――っ！」\n「あっ」』
2031 = "『「——呃！」\\n「啊」』" 

# monologue
# JP: 写真を見せた瞬間に、ポーレットもれいなも絶句する。\nだから、ただ。ハチロクが話したことをそのまま伝える。
2588 = "波萊特與玲奈，在看到照片的一瞬間都啞口無言。而後我只能一五一十地將八六說過的話複述給她們。" 

# monologue
# JP: 言葉ひとつが重なる度に、ポーレットの顔から血の気が失せる。\n心が痛むが、話を止めるわけにもいかない。
2444 = "我每說一句，波萊特的臉色就變得蒼白一分。雖於心不忍，但卻不容我有所隱瞞。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロクの言によれば、\nあと１～２年は運用可能だということだ。が――」
1221 = "「……依八六所說的話，再堅持一到兩年應該是可以做到的。但之後……」" 

# 【れいな】
# display as 玲奈
# JP: 「これ……\nハチロクさん、ここまで気付かなかったんですかぁ？」
1958 = "「這……八六小姐之前竟然都沒有注意到嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ」
1648 = "「嗯」" 

# monologue
# JP: れいなの声も、もはや眠気を孕んでいない。
2626 = "玲奈的聲音裡，睡意也已經煙消雲散。" 

# monologue
# JP: 入れ替わりのように現れたのは素朴な疑念――\n『なぜ？』という、素朴で強烈な問いかけだ。
2336 = "取而代之的是單純而強烈的疑問——“為什麼？”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「気付かなかった――と、本人はそう言っている」
1209 = "「“沒注意到。”——她本人是這樣說的」" 

# monologue
# JP: あいまいな自分の言葉に、気づいてしまう。\nそれは恐らく、僕にもあった疑念なのだと。
2450 = "我自己也注意到了言辭中的曖昧之處。恐怕是因為我自己也對此抱有疑問吧。" 

# monologue
# JP: 僕が指摘をしなかったのなら――誰かの指摘がなかったら、\nこの事実を、ハチロクは隠し続けていたのかもしれないと。
2703 = "若不是由我點破——或者說，若是無人點破的話，八六怕是就會把這件事一直瞞下去吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……あれは、不調をずっと訴え続けていた。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;として、[じゅうぜん,1]十全の性能を発揮できていないと」
1659 = "「她一直說那是因為狀態不好，無法發揮身為\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;全部的性能所致」" 

# monologue
# JP: 疑念を自覚しながらも、\n同時にやはり、ハチロクを強く信じてもいる。
2441 = "我明知自己心中對此存在著疑問，但對八六堅定的信任還是占了上風。" 

# monologue
# JP: 例えわずかなリスクであれど、事故の可能性を増す選択を、\nハチロクは、決して意図的に行いはしない。
2287 = "即便可能性微乎其微，但只要是會提升發生事故可能性的話，八六就絕不會主動做出這樣的選擇。" 

# 【れいな】
# display as 玲奈
# JP: 「調子悪いなら、\n[とろる,2]登呂流湯のおばあさんに見てもらうといいです」
1836 = "「狀態不好的話，去登呂流浴場叫婆婆看看就好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もう見てもらった――\n見てはもらったのだが」
1692 = "「已經去看過了，不過雖然看是看過了……」" 

# monologue
# JP: れいなの指摘は、素朴なだけに突き刺さる。\nいっそ痛みにも近い刺激は、僕の記憶を喚起する。
2623 = "玲奈單刀直入的質疑，直刺問題的要害。由此產生的近乎疼痛的刺激，也讓我想起了那時的情景。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『機能的に異常はない』……とのお話だった。\nその上で不調があるなら、原因はただ『考え過ぎ』と」
1868 = "「結論是“功能上沒有異常”。這樣還覺得狀態不正常的話，只能說是“想多了”這樣」" 

# 【ポーレット】
# display as 波萊特
# JP: 「考えすぎ……」
1723 = "「想多了……」" 

# monologue
# JP: ポーレットが声を発すれば、\nれいなはきゅっと口を結んで、その続きを待つ。
2720 = "見到波萊特開口，玲奈便不再言語，靜待下文。" 

# 【ポーレット】
# display as 波萊特
# JP: 「何を、考えすぎているんでしょう」
1789 = "「是哪方面想多了呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕にはわからん。\nハチロク自身も、わかっていないようだった」
1965 = "「這個我就不知道了。似乎八六自己也並不清楚的樣子」" 

# monologue
# JP: 事故のことではあるのだろうが、\nそれをどう、考え悩んでいるのかまでは、わからない。
2675 = "究竟是不是事故的關係呢？任憑我想到頭痛欲裂也仍然理不出個頭緒。" 

# monologue
# JP: 無責任なことは到底いえんが、\nただひとつ確かなことがあるのなら――
2682 = "終歸不能說些不負責任的話，但是有一點是確信無疑的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、今回のハチロクが問題に気づくのが遅れた理由は、\nそこではない。それは、ひとえに“僕”にある」
1491 = "「但是，八六這麼晚才注意到問題的根本原因並不在那裡，完全在我」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんに……」
1654 = "「在雙鐵君嗎……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を撤回させ、御一夜を守りたい。\n僕の目的を、ハチロクは果たさせたいと願っているのだ」
1819 = "「沒錯。八六她是一心想要實現我“取消\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶計劃，守護御一夜”的這一目標」" 

# monologue
# JP: ん……と、少しくぐもった声。\nポーレットの声に、悲しげな色が交じる。
2691 = "聽到這些，波萊特的話語中也不禁摻雜著悲傷，聲音也有些哽咽。" 

# 【ポーレット】
# display as 波萊特
# JP: 「だから……\x%l台枠;#00ffc040;台枠%l;#;の歪みに、気づけなかった？」
1751 = "「所以才……沒能注意到\\x%l台枠;#00ffc040;車架%l;#;的扭曲嗎?」" 

# 【双鉄】
# display as 雙鐵
# JP: 「多分な。少なくとも僕は、そう思っている」
1702 = "「很可能。至少我覺得是這樣的」" 

# 【れいな】
# display as 玲奈
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;が歪んでいるのに気づいたら、\n危なくて走れなくなっちゃうからですねぇ」
1884 = "「若是注意到\\x%l台枠;#00ffc040;車架%l;#;扭曲了的話，肯定會因為危險而不能再行駛了吧」" 

# monologue
# JP: まったく迷いの無い言葉。
2734 = "話語中全無半點猶豫。" 

# monologue
# JP: その素朴さは、僕の迷いも消してくれる。\n――やはり、この無理は通らぬものだ。
2556 = "正是這份直接，驅散了我心頭的迷惘。果然還是不能再這樣勉強下去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。この歪みは、文字通り目に見えるリスクだ。\nそれを無視して運行などは、とても出来んさ」
1791 = "「是啊。這扭曲毫無疑問已經是浮上水面的風險了。無論如何我都不能無視這一點繼續行駛啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です……よね、やっぱり」
1912 = "「說得……是呢，確實」" 

# monologue
# JP: 言葉が、重い。\n……経営面と信頼面への悪影響。
2735 = "話語無比沉重。……可能對經營與信譽方面產生負面影響。" 

# monologue
# JP: それをまず考えなければいけない立場が恐らく、\nポーレットの決断を遅くしている。
2417 = "恐怕正因為身處這一必須優先考量這些因素的立場，波萊特才難以立即下定決心吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「万が一にでも事故が起きれば、その影響は計り知れん。\n鉄道での観光振興なども、夢物語と終わるだろう」
1888 = "「萬一真的發生了事故，那影響恐怕難以估量。“利用鐵路復興旅遊業”更會變成黃粱一夢」" 

# monologue
# JP: だから、その背を強く押す。\nどんな対価を支払おうとも、決して事故など起こさせない。
2460 = "所以這時更應該幫她下定決心，無論付出怎樣的代價，也絕不能再發生事故。" 

# monologue
# JP: もう一度の事故は恐らく、\nきっと――ハチロクを壊してしまう。
2272 = "八六恐怕也……不，應該是一定無法再承受下一次事故了吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;の運休を前提に考えるしかない。\nその上での最善策を、できるだけ早く立てていくしか」
1713 = "「必須以讓\\x%l8620;#00ffc040;８６２０%l;#;停運為前提擬定計劃。只能在此基礎上擬定最佳方案，儘快重整旗鼓了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「――」
1201 = "「——」" 

# monologue
# JP: 小さく、静かに息を吸い。\n吸われた息は、やがてゆっくりと言葉に変わる。
2583 = "波萊特無聲地輕吸了一口氣，而後緩緩地說道：" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。\nそれしか無いと、わたしも思います」
1861 = "「確實。我也認為除此以外別無他法了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばその上での相談だが。今の予約が消化しきられる、\n一ヶ月と一日後から――ダイヤ改正が出来んだろうか？」
1998 = "「那這個基調就算定了。能在把現有的預約全部消化完的時候，也就是一個月零一天以後，調整時刻表嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ダイヤ改正ですか？　どういうふうに」
1916 = "「調整時刻表嗎？要調成什麼樣呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「バーベキュートレインと、朝夕の定期運行と。\n両者の時刻を、同一に出来ればと思うのだが」
1733 = "「我在想能不能把ＢＢＱ列車和早班車的時間改在一起」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
1637 = "「啊！」" 

# monologue
# JP: ポーレットが目を丸くして、れいなの顔を覗きこむ。\nこくん、とれいなは素直に頷く。
2586 = "波萊特瞪大了眼睛，直直地盯著玲奈。而玲奈則是不加掩飾地點了點頭。" 

# 【れいな】
# display as 玲奈
# JP: 「出来ますよぉ。\nれいな、重いの引っ張るの大得意ですからぁ」
1817 = "「沒問題的。玲奈最擅長拖重的東西啦」" 

# 【ポーレット】
# display as 波萊特
# JP: 「バーベキュー\x%l客車;#00ffc040;客車%l;#;も、定期運行もそのままで。\nただ、両者を連結しちゃって運用する」
2028 = "「ＢＢＱ\\x%l客車;#00ffc040;客運車廂%l;#;仍然開門迎客，班車也照常運營。只不過是把兩者掛接起來一同開行」" 

# monologue
# JP: 言葉に出して整理して、\nん……っと、ポーレットは考えこむ。
2737 = "說出聲顯然更有助於整理思路，波萊特的思路飛快地旋轉起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ローカルの観光\x%l列車;#00ffc040;列車%l;#;ではある形式ですし……\n課題をいくつか解消できれば、いける気がします」
1501 = "「作為當地的觀光\\x%l列車;#00ffc040;列車%l;#;這樣的形式倒不是沒有先例，解決掉幾個難點的話，應該是可行的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その課題とは？」
2020 = "「難點在於？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「まず、時間ですよね。\n朝は、観光\x%l列車;#00ffc040;列車%l;#;としてはかなり早い時刻になります」
2023 = "「首先就是時間了吧。早上的話，對於觀光\\x%l列車;#00ffc040;列車%l;#;而言可以說是相當早了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、学園がある期間は観光的にはオフシーズン。\n学園が休みの時期こそ、観光の稼ぎどきとなるから――」
1463 = "「不過，學校開學的時間是旅遊淡季。學校放假的時候才是旺季啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そか……学園が休みの期間は、\nダイヤを調整しちゃえばいいんですね、単純に」
