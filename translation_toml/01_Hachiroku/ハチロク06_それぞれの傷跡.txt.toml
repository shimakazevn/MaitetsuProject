[script]
# lines: 415 
# monologue
# JP: ポーレットは少し眠そうだ。
2580 = "Paulette có vẻ hơi buồn ngủ."
# monologue
# JP: その膝の上、\nれいなの口が大きく開き――
2687 = "Trên đùi cô ấy,\nReina đang há miệng ngáp thật to――"
# 【れいな】
# display as 玲奈
# JP: 「ふぁ……ぁ――\nあ、ごめんなさい、ですぅ」
1619 = "「Oáp…… a――\nA, Reina xin lỗi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1620 = "「Không sao」"
# monologue
# JP: まだ三時。\n早朝というにも早過ぎる――夜の領域を抜けぬ時間だ。
2466 = "Mới có ba giờ. Bảo là sáng sớm thì quá sớm――vẫn còn đang là ban đêm."
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、どうしても始発の前に話したかった」
1454 = "「Xin lỗi nhé, tôi rất muốn nói chuyện này trước chuyến tàu đầu tiên trong ngày.」"
# monologue
# JP: 始業準備もある以上、\n何時でも――できるだけ早くの方がいい。
2359 = "Vì còn phải chuẩn bị trước khi làm việc, nên giờ nào cũng được――càng sớm càng tốt."
# monologue
# JP: そう相談した結果出てきた、この時刻ではあるのだが。
2690 = "Và kết quả của cuộc thảo luận là chúng tôi đã chọn giờ này."
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、わたしがこの時間でって言ったんですし……\nそれに普段楽させてもらってますし、早起きくらい――」
1623 = "「Không đâu, chính tôi là người đề xuất giờ này mà…… Hơn nữa bình thường mọi người đã giúp đỡ tôi rất nhiều, chỉ dậy sớm một chút thì có đáng gì――」"
# monologue
# JP: 言って一瞬、\nポーレットの目がきょろっと動く。
2738 = "Vừa nói xong,\nmắt Paulette đảo quanh một vòng."
# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃん、ご一緒じゃないんですか？」
1541 = "「Bé Hachiroku không đi cùng anh sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。あれがいると――\n僕が、判断を誤ってしまいかねないと思ってな」
1632 = "「Ừ. Nếu có em ấy ở đây―― Tôi sợ mình sẽ đưa ra quyết định sai lầm mất.」"
# monologue
# JP: 決断している筈なのに、そうとしか決断できない筈なのに、\nこんな言葉が、ついつい口から出てしまう。
2530 = "Đáng lẽ tôi đã quyết định rồi, đáng lẽ tôi chỉ có thể quyết định như vậy, nhưng những lời này cứ thế vô tình thốt ra khỏi miệng."
# monologue
# JP: 顔に、言葉に、なにかが滲んでしまったのだろうか？\nポーレットは、かすかに頷き背筋を伸ばす。
2521 = "Có phải trên mặt, trong lời nói của tôi đã để lộ ra điều gì đó không? Paulette khẽ gật đầu và ngồi thẳng lưng lên."
# 【ポーレット】
# display as 波萊特
# JP: 「――大事な事情があっての早起きだったら、\nいくらでもします、大丈夫です」
1807 = "「――Nếu phải dậy sớm vì có chuyện quan trọng, thì bao nhiêu lần tôi cũng làm được, không sao đâu.」"
# monologue
# JP: その顔からはもう、眠気の霧が晴れている。\nならば、時間を無駄にはすまい。
2585 = "Trên khuôn mặt ấy đã không còn chút ngái ngủ nào nữa. Nếu vậy, tôi cũng không nên lãng phí thời gian."
# 【双鉄】
# display as 雙鐵
# JP: 「話というのは、\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;の損傷についてだ」
1903 = "「Chuyện tôi muốn nói là về hư hỏng của \\x%l8620;#00ffc040;8620%l;#;.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　どこか傷んだんですか？」
1639 = "「Hả!? Có chỗ nào bị hỏng sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「傷んだ、ではなく、傷み続けていたらしい。\n長期的に――じわじわと。それが、ついに表面化した」
1519 = "「Không phải là mới hỏng, mà có vẻ như nó đã bị hỏng từ lâu rồi. Trong một thời gian dài――từ từ và âm ỉ. Và cuối cùng nó đã lộ rõ ra ngoài.」"
# 【れいな】
# display as 波萊特＆玲奈
# JP: 『「――っ！」\n「あっ」』
2031 = "『「――!」\n「A」』"
# monologue
# JP: 写真を見せた瞬間に、ポーレットもれいなも絶句する。\nだから、ただ。ハチロクが話したことをそのまま伝える。
2588 = "Khoảnh khắc tôi cho xem bức ảnh, cả Paulette và Reina đều á khẩu. Vì vậy, tôi chỉ truyền đạt lại y nguyên những gì Hachiroku đã nói."
# monologue
# JP: 言葉ひとつが重なる度に、ポーレットの顔から血の気が失せる。\n心が痛むが、話を止めるわけにもいかない。
2444 = "Mỗi một lời nói ra, sắc mặt Paulette lại càng tái nhợt. Dù rất đau lòng, nhưng tôi không thể dừng câu chuyện lại được."
# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロクの言によれば、\nあと１～２年は運用可能だということだ。が――」
1221 = "「……Theo lời Hachiroku, thì nó vẫn có thể vận hành thêm 1~2 năm nữa. Nhưng――」"
# 【れいな】
# display as 玲奈
# JP: 「これ……\nハチロクさん、ここまで気付かなかったんですかぁ？」
1958 = "「Cái này…… Chị Hachiroku không nhận ra nó đã đến mức này sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
1648 = "「Ưm」"
# monologue
# JP: れいなの声も、もはや眠気を孕んでいない。
2626 = "Giọng của Reina cũng không còn chút ngái ngủ nào nữa."
# monologue
# JP: 入れ替わりのように現れたのは素朴な疑念――\n『なぜ？』という、素朴で強烈な問いかけだ。
2336 = "Thay vào đó là một sự hoài nghi ngây ngô―― Một câu hỏi \"Tại sao?\" vô cùng đơn giản nhưng lại mãnh liệt."
# 【双鉄】
# display as 雙鐵
# JP: 「気付かなかった――と、本人はそう言っている」
1209 = "「Không nhận ra――bản thân em ấy đã nói như vậy.」"
# monologue
# JP: あいまいな自分の言葉に、気づいてしまう。\nそれは恐らく、僕にもあった疑念なのだと。
2450 = "Tôi nhận ra sự mơ hồ trong chính lời nói của mình. Có lẽ, đó cũng là sự hoài nghi tồn tại trong tôi."
# monologue
# JP: 僕が指摘をしなかったのなら――誰かの指摘がなかったら、\nこの事実を、ハチロクは隠し続けていたのかもしれないと。
2703 = "Nếu tôi không chỉ ra――nếu không có ai chỉ ra, thì có lẽ Hachiroku vẫn sẽ tiếp tục che giấu sự thật này."
# 【双鉄】
# display as 雙鐵
# JP: 「……あれは、不調をずっと訴え続けていた。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;として、[じゅうぜん,1]十全の性能を発揮できていないと」
1659 = "「……Em ấy vẫn luôn than phiền về tình trạng không ổn định. Rằng với tư cách là một \\x%lレイルロオド;#00ffc040;Railord%l;#;, em ấy không thể phát huy toàn bộ hiệu suất.」"
# monologue
# JP: 疑念を自覚しながらも、\n同時にやはり、ハチロクを強く信じてもいる。
2441 = "Dù nhận thức được sự hoài nghi đó, nhưng đồng thời tôi vẫn đặt niềm tin mãnh liệt vào Hachiroku."
# monologue
# JP: 例えわずかなリスクであれど、事故の可能性を増す選択を、\nハチロクは、決して意図的に行いはしない。
2287 = "Cho dù rủi ro chỉ là rất nhỏ, nhưng những lựa chọn làm tăng khả năng xảy ra tai nạn, Hachiroku tuyệt đối sẽ không bao giờ cố ý thực hiện."
# 【れいな】
# display as 玲奈
# JP: 「調子悪いなら、\n[とろる,2]登呂流湯のおばあさんに見てもらうといいです」
1836 = "「Nếu thấy không khỏe, thì nhờ bà lão ở nhà tắm Tororyu-yu khám cho là được mà nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「もう見てもらった――\n見てはもらったのだが」
1692 = "「Đã khám rồi――\nKhám thì cũng đã khám rồi nhưng mà.」"
# monologue
# JP: れいなの指摘は、素朴なだけに突き刺さる。\nいっそ痛みにも近い刺激は、僕の記憶を喚起する。
2623 = "Lời chỉ trích của Reina tuy ngây ngô nhưng lại như đâm trúng tim đen. Sự kích thích gần như là đau đớn ấy đã gợi lại ký ức trong tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「『機能的に異常はない』……とのお話だった。\nその上で不調があるなら、原因はただ『考え過ぎ』と」
1868 = "「Bà ấy bảo là 'Về mặt chức năng thì không có gì bất thường'…… Nếu đã vậy mà vẫn thấy không khỏe, thì nguyên nhân chỉ là do 'nghĩ ngợi quá nhiều' thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「考えすぎ……」
1723 = "「Nghĩ ngợi quá nhiều……」"
# monologue
# JP: ポーレットが声を発すれば、\nれいなはきゅっと口を結んで、その続きを待つ。
2720 = "Paulette vừa lên tiếng, Reina liền mím chặt môi, chờ đợi câu tiếp theo."
# 【ポーレット】
# display as 波萊特
# JP: 「何を、考えすぎているんでしょう」
1789 = "「Rốt cuộc là đã nghĩ ngợi quá nhiều về chuyện gì cơ chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕にはわからん。\nハチロク自身も、わかっていないようだった」
1965 = "「Tôi không biết. Có vẻ như chính Hachiroku cũng không biết.」"
# monologue
# JP: 事故のことではあるのだろうが、\nそれをどう、考え悩んでいるのかまでは、わからない。
2675 = "Có lẽ là về vụ tai nạn, nhưng em ấy đang suy nghĩ và trăn trở về nó như thế nào thì tôi không rõ."
# monologue
# JP: 無責任なことは到底いえんが、\nただひとつ確かなことがあるのなら――
2682 = "Dù không thể nói những lời vô trách nhiệm, nhưng nếu có một điều chắc chắn thì đó là――"
# 【双鉄】
# display as 雙鐵
# JP: 「だが、今回のハチロクが問題に気づくのが遅れた理由は、\nそこではない。それは、ひとえに“僕”にある」
1491 = "「Nhưng, lý do khiến Hachiroku chậm nhận ra vấn đề lần này, không phải nằm ở đó. Mà hoàn toàn là do \"tôi\".」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんに……」
1654 = "「Do anh Soutetsu……」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を撤回させ、御一夜を守りたい。\n僕の目的を、ハチロクは果たさせたいと願っているのだ」
1819 = "「Ừ. Muốn họ rút lại quyết định mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, muốn bảo vệ Ohimitera. Hachiroku đang mong muốn giúp tôi đạt được mục đích đó.」"
# monologue
# JP: ん……と、少しくぐもった声。\nポーレットの声に、悲しげな色が交じる。
2691 = "Ưm…… một giọng nói hơi nghèn nghẹn. Giọng của Paulette pha lẫn chút đượm buồn."
# 【ポーレット】
# display as 波萊特
# JP: 「だから……\x%l台枠;#00ffc040;台枠%l;#;の歪みに、気づけなかった？」
1751 = "「Vậy nên…… mới không nhận ra sự biến dạng của \\x%l台枠;#00ffc040;khung gầm%l;#; sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「多分な。少なくとも僕は、そう思っている」
1702 = "「Có lẽ vậy. Ít nhất thì tôi nghĩ là như thế.」"
# 【れいな】
# display as 玲奈
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;が歪んでいるのに気づいたら、\n危なくて走れなくなっちゃうからですねぇ」
1884 = "「Nếu nhận ra \\x%l台枠;#00ffc040;khung gầm%l;#; bị biến dạng, thì sẽ rất nguy hiểm và không thể chạy được nữa đúng không ạ.」"
# monologue
# JP: まったく迷いの無い言葉。
2734 = "Một câu nói không hề có chút do dự nào."
# monologue
# JP: その素朴さは、僕の迷いも消してくれる。\n――やはり、この無理は通らぬものだ。
2556 = "Sự ngây ngô đó cũng đã xóa tan sự do dự trong tôi. ――Quả nhiên, sự gượng ép này là không thể chấp nhận được."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。この歪みは、文字通り目に見えるリスクだ。\nそれを無視して運行などは、とても出来んさ」
1791 = "「Ừ. Sự biến dạng này, theo đúng nghĩa đen là một rủi ro có thể nhìn thấy được. Chúng ta không thể nào phớt lờ nó mà tiếp tục vận hành được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「です……よね、やっぱり」
1912 = "「Đúng…… là vậy nhỉ, quả nhiên là thế.」"
# monologue
# JP: 言葉が、重い。\n……経営面と信頼面への悪影響。
2735 = "Những lời nói, thật nặng nề. ……Ảnh hưởng xấu đến mặt kinh doanh và độ tin cậy."
# monologue
# JP: それをまず考えなければいけない立場が恐らく、\nポーレットの決断を遅くしている。
2417 = "Có lẽ vị trí buộc phải suy nghĩ đến những điều đó trước tiên, đã khiến Paulette chậm đưa ra quyết định."
# 【双鉄】
# display as 雙鐵
# JP: 「万が一にでも事故が起きれば、その影響は計り知れん。\n鉄道での観光振興なども、夢物語と終わるだろう」
1888 = "「Vạn nhất xảy ra tai nạn, thì hậu quả sẽ không thể lường trước được. Việc chấn hưng du lịch bằng đường sắt cũng sẽ chỉ còn là giấc mộng viển vông.」"
# monologue
# JP: だから、その背を強く押す。\nどんな対価を支払おうとも、決して事故など起こさせない。
2460 = "Vì vậy, tôi sẽ đẩy mạnh lưng cô ấy. Dù phải trả giá đắt đến đâu, cũng tuyệt đối không để xảy ra tai nạn."
# monologue
# JP: もう一度の事故は恐らく、\nきっと――ハチロクを壊してしまう。
2272 = "Một vụ tai nạn nữa có lẽ, chắc chắn――sẽ phá hủy Hachiroku mất."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;の運休を前提に考えるしかない。\nその上での最善策を、できるだけ早く立てていくしか」
1713 = "「Chúng ta chỉ còn cách suy nghĩ dựa trên tiền đề là \\x%l8620;#00ffc040;8620%l;#; sẽ ngừng hoạt động. Từ đó, phải lập ra phương án tốt nhất càng sớm càng tốt.」"
# 【ポーレット】
# display as 波萊特
# JP: 「――」
1201 = "「――」"
# monologue
# JP: 小さく、静かに息を吸い。\n吸われた息は、やがてゆっくりと言葉に変わる。
2583 = "Hít một hơi nhỏ và tĩnh lặng. Hơi thở được hít vào, dần dần chậm rãi biến thành lời nói."
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。\nそれしか無いと、わたしも思います」
1861 = "「Vâng.\nTôi cũng nghĩ đó là cách duy nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばその上での相談だが。今の予約が消化しきられる、\n一ヶ月と一日後から――ダイヤ改正が出来んだろうか？」
1998 = "「Nếu vậy thì tôi có chuyện muốn bàn đây. Từ một tháng và một ngày sau, khi mà các lịch đặt trước hiện tại đã được giải quyết xong――chúng ta có thể sửa đổi biểu đồ chạy tàu được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ダイヤ改正ですか？　どういうふうに」
1916 = "「Sửa đổi biểu đồ chạy tàu sao? Sửa như thế nào cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「バーベキュートレインと、朝夕の定期運行と。\n両者の時刻を、同一に出来ればと思うのだが」
1733 = "「Tàu BBQ và chuyến tàu định kỳ sáng tối. Tôi muốn xem liệu có thể điều chỉnh thời gian của cả hai cho trùng nhau được không.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
1637 = "「A!」"
# monologue
# JP: ポーレットが目を丸くして、れいなの顔を覗きこむ。\nこくん、とれいなは素直に頷く。
2586 = "Paulette tròn xoe mắt, nhìn vào mặt Reina. Reina ngoan ngoãn gật đầu một cái rụp."
# 【れいな】
# display as 玲奈
# JP: 「出来ますよぉ。\nれいな、重いの引っ張るの大得意ですからぁ」
1817 = "「Được chứ ạ.\nReina rất giỏi kéo đồ nặng đó nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「バーベキュー\x%l客車;#00ffc040;客車%l;#;も、定期運行もそのままで。\nただ、両者を連結しちゃって運用する」
2028 = "「\\x%l客車;#00ffc040;Toa hành khách%l;#; BBQ và chuyến định kỳ vẫn giữ nguyên. Chỉ là, sẽ liên kết cả hai lại và cùng vận hành.」"
# monologue
# JP: 言葉に出して整理して、\nん……っと、ポーレットは考えこむ。
2737 = "Nói ra thành lời để sắp xếp lại suy nghĩ, Ưm…… Paulette bắt đầu trầm ngâm."
# 【ポーレット】
# display as 波萊特
# JP: 「ローカルの観光\x%l列車;#00ffc040;列車%l;#;ではある形式ですし……\n課題をいくつか解消できれば、いける気がします」
1501 = "「Đây cũng là một hình thức \\x%l列車;#00ffc040;tàu%l;#; du lịch địa phương…… Nếu giải quyết được một số vấn đề, tôi nghĩ là sẽ ổn thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その課題とは？」
2020 = "「Những vấn đề đó là gì?」"
# 【ポーレット】
# display as 波萊特
# JP: 「まず、時間ですよね。\n朝は、観光\x%l列車;#00ffc040;列車%l;#;としてはかなり早い時刻になります」
2023 = "「Đầu tiên là thời gian. Buổi sáng thì hơi quá sớm đối với một chuyến \\x%l列車;#00ffc040;tàu%l;#; du lịch.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だが、学園がある期間は観光的にはオフシーズン。\n学園が休みの時期こそ、観光の稼ぎどきとなるから――」
1463 = "「Nhưng, thời gian học viện mở cửa lại là mùa du lịch thấp điểm. Thời điểm học viện nghỉ lễ mới là lúc kiếm tiền từ du lịch――」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そか……学園が休みの期間は、\nダイヤを調整しちゃえばいいんですね、単純に」
1642 = "「A, ra vậy…… Trong thời gian học viện nghỉ, chỉ cần đơn giản là điều chỉnh lại biểu đồ chạy tàu là được nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「とは思うが、平気か？\n学園の、例えば部活の朝練などは――」
1911 = "「Tôi nghĩ là vậy, nhưng có ổn không? Ví dụ như các buổi tập sáng của câu lạc bộ ở học viện thì――」"
# 【ポーレット】
# display as 波萊特
# JP: 「そういう子たちは、\nもっと早くから自転車通学してますから」
1986 = "「Những học sinh đó, đã đạp xe đến trường từ sớm hơn rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「自転車か」
1877 = "「Xe đạp sao.」"
# monologue
# JP: 驚かされるが、考えてみれば\n御一夜-湯医は路線長でも二十と数キロ。
2710 = "Tuy hơi bất ngờ, nhưng nghĩ lại thì tuyến Ohimitera - Yui cũng chỉ dài khoảng hai mươi mấy kilomet."
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;のように作動不能の影響を受けぬ自転車ならば、\n確かに通えぬ距離でも無い。
2696 = "Nếu là xe đạp không bị ảnh hưởng bởi việc không thể hoạt động như \\x%lエアクラ;#00ffc040;Aircra%l;#;, thì quả thực đó không phải là khoảng cách không thể đi được."
# 【ポーレット】
# display as 波萊特
# JP: 「休み期間中のことなら、学園側とも調整可能でしょうし。\n多分、問題なくいけちゃうと思います」
1883 = "「Nếu là trong thời gian nghỉ lễ, thì chắc chắn có thể điều chỉnh với phía học viện được. Tôi nghĩ là sẽ không có vấn đề gì đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばよかった。他には、どうだ？」
1993 = "「Vậy thì tốt rồi. Còn vấn đề gì khác không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええと――臭い対策。必要になると思います。\n\x%lキハ07;#00ffc040;キハ07%l;#;側――[にちよう,1]日用\x%l列車;#00ffc040;列車%l;#;側に焼肉の臭いが流れこむと……」
1737 = "「Để xem nào――biện pháp xử lý mùi hương. Tôi nghĩ là cần thiết đấy. Nếu mùi thịt nướng bay sang phía \\x%lキハ07;#00ffc040;KiHa 07%l;#;――phía \\x%l列車;#00ffc040;tàu%l;#; chạy thường ngày thì……」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、かなり残酷なこととなるか。\n食べ盛りの学園生が主体の\x%l列車;#00ffc040;列車%l;#;だものな」
1572 = "「Ra vậy, như thế thì khá là tàn nhẫn nhỉ. Vì hành khách chủ yếu của chuyến \\x%l列車;#00ffc040;tàu%l;#; này là những học sinh đang tuổi ăn tuổi lớn mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だけじゃなく、服に臭いがついちゃうと困るとかも、\n普通にあるって思いますし」
1452 = "「Không chỉ vậy, cũng có những người sẽ thấy phiền nếu quần áo bị ám mùi nữa, điều đó cũng rất bình thường thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1907 = "「Ra vậy.」"
# monologue
# JP: 進行方向後ろが\x%l客車;#00ffc040;客車%l;#;になるわけだから、\n臭いイコール空気の流れの、逆流を防げば良いことになる。
2230 = "Vì \\x%l客車;#00ffc040;toa hành khách%l;#; nằm ở phía sau theo hướng di chuyển, nên chỉ cần ngăn chặn mùi hương――hay nói cách khác là luồng không khí chảy ngược lại là được."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l客車;#00ffc040;客車%l;#;側は指定席になるのだよな？」
1200 = "「Phía \\x%l客車;#00ffc040;toa hành khách%l;#; sẽ là ghế chỉ định đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは、はい。\n今までと変わらず、指定有料となります」
1964 = "「Chuyện đó thì, vâng. Vẫn như từ trước đến nay, là ghế chỉ định có thu phí.」"
# monologue
# JP: となると、\x%lキハ07;#00ffc040;キハ07%l;#;-焼肉\x%l客車;#00ffc040;客車%l;#;間の行き来が\nそう頻繁に起こるものとは思えない。
2771 = "Nếu vậy thì, việc đi lại giữa \\x%lキハ07;#00ffc040;KiHa 07%l;#; và \\x%l客車;#00ffc040;toa hành khách%l;#; thịt nướng chắc sẽ không xảy ra thường xuyên đâu."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――単純ではあるが、\n連結部に充電式の送風機を置いてみてはどうだろうか？」
1772 = "「Nếu vậy thì――tuy hơi đơn giản, nhưng chúng ta thử đặt một chiếc quạt gió sạc điện ở chỗ nối toa xem sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「いいかもですね。\x%l客車;#00ffc040;客車%l;#;側に涼しさも提供できますし。\nけど……多分、そうするとですね――」
1746 = "「Có vẻ được đấy. Cũng có thể mang lại sự mát mẻ cho phía \\x%l客車;#00ffc040;toa hành khách%l;#; nữa. Nhưng mà…… có lẽ, nếu làm vậy thì――」"
# monologue
# JP: ポーレットの口から次々と、細かな問題があげられていく。\nそれをどんどん、細かなアイディアで埋めていく。
2579 = "Từ miệng Paulette, hàng loạt những vấn đề nhỏ nhặt được nêu ra. Và chúng tôi liên tục lấp đầy chúng bằng những ý tưởng chi tiết."
# monologue
# JP: ……一番深い部分とすぐには向き合えぬまま、\n妙に軽快な時間が流れる。
2523 = "……Trong khi vẫn chưa thể đối mặt ngay với vấn đề cốt lõi nhất, thời gian trôi qua một cách nhẹ nhàng đến kỳ lạ."
# 【ポーレット】
# display as 波萊特
# JP: 「ええと……あとは――\nあとは、そうですね」
1627 = "「Để xem nào…… còn lại thì―― Còn lại thì, đúng rồi nhỉ.」"
# monologue
# JP: が、細かな問題がほどなく埋まれば――\nそこにはじっとり、重い沈黙が残ってしまう。
2604 = "Nhưng, khi những vấn đề nhỏ nhặt chẳng mấy chốc được giải quyết―― Thì ở đó chỉ còn lại một sự im lặng nặng nề, ngột ngạt."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の方の。\n\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;の問題なのだが」
1739 = "「Về phía tôi. Là vấn đề của \\x%l8620;#00ffc040;8620%l;#;.」"
# monologue
# JP: だから、切り出す。\nどんなに気詰まりだろうとも、それこそが僕の責任だ。
2681 = "Vì vậy, tôi phải mở lời. Dù có ngột ngạt đến đâu, thì đó cũng chính là trách nhiệm của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「具体的にどうということを今の時点では思いつけんが、\n改修を――どれほどに困難だろうと、やりたく思う」
2005 = "「Hiện tại tôi chưa nghĩ ra được phương án cụ thể nào, nhưng tôi muốn tiến hành đại tu――dù cho có khó khăn đến mức nào đi chăng nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「…………それは……はい」
1214 = "「…………Chuyện đó thì…… vâng.」"
# monologue
# JP: 長い沈黙。\n鈍い頷き。
2593 = "Một sự im lặng kéo dài.\nMột cái gật đầu chậm chạp."
# 【ポーレット】
# display as 波萊特
# JP: 「……技術的、資金的な問題が解決できれば。\nもちろん、わたしも……それが最善だと思います」
1675 = "「……Nếu có thể giải quyết được các vấn đề về kỹ thuật và vốn. Tất nhiên, tôi cũng nghĩ…… đó là cách tốt nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1792 = "「Vậy sao.」"
# monologue
# JP: “条件付きの賛同”だ。\nポーレットさえ、苦しげにそうとしか答えられない。
2661 = "Là \"sự đồng tình có điều kiện\". Ngay cả Paulette cũng chỉ có thể trả lời một cách đau khổ như vậy."
# monologue
# JP: ならば、それは……\n\x%l台枠;#00ffc040;台枠%l;#;改修という行為は、やはりそれほどまでに――
2253 = "Nếu vậy, điều đó có nghĩa là…… Việc đại tu \\x%l台枠;#00ffc040;khung gầm%l;#;, quả nhiên là khó khăn đến mức――"
# 【ポーレット】
# display as 波萊特
# JP: 「それであのわたし達の方の問題なんですけど」
1832 = "「Vậy còn vấn đề ở phía chúng tôi thì sao đây.」"
# monologue
# JP: 問いかけの言葉を見つける前に、\nポーレットの声が沈黙を割る。
2361 = "Trước khi tôi kịp tìm ra lời để hỏi, giọng của Paulette đã phá vỡ sự im lặng."
# 【ポーレット】
# display as 波萊特
# JP: 「ええと――れいなの、\nその、足回りの問題に、ついてです」
1718 = "「À ừm――về vấn đề bộ phận chuyển động của Reina, là chuyện đó.」"
# monologue
# JP: ポーレットの手が、わずかに動く。\nそこに、れいなの手が重なる。
2584 = "Bàn tay Paulette khẽ động đậy. Và bàn tay Reina đặt lên trên đó."
# monologue
# JP: ほんの一瞬、見つめ合い――\nやがて、ポーレットはまっすぐ僕へと視線を戻す。
2268 = "Hai người nhìn nhau trong chốc lát―― Rồi Paulette hướng ánh mắt nhìn thẳng về phía tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが、時間を作ってくれましたから……\n問題解決の端緒は、見つけることが出来てます」
1764 = "「Nhờ anh Soutetsu đã tranh thủ thời gian cho chúng tôi…… Nên chúng tôi đã tìm ra được manh mối để giải quyết vấn đề rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか！」
1853 = "「Thật vậy sao!」"
# monologue
# JP: 意外すぎる朗報に、\n思わず椅子から腰が浮く。
2764 = "Trước tin vui quá đỗi bất ngờ này, tôi bất giác nhổm người khỏi ghế."
# 【双鉄】
# display as 雙鐵
# JP: 「どのようにして解決を？」
1504 = "「Giải quyết bằng cách nào vậy?」"
# 【ポーレット】
# display as 波萊特
# JP: 「足回りへの負担は、ふたつの原因から生まれます。\n\x%l粘着力;#00ffc040;粘着力%l;#;の強さと、エンジンのトルクの強さです」
1895 = "「Gánh nặng lên bộ phận chuyển động phát sinh từ hai nguyên nhân. Đó là độ lớn của \\x%l粘着力;#00ffc040;lực bám đường%l;#; và lực xoắn của động cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは理解できる」
1650 = "「Ừ, điều đó thì tôi hiểu được.」"
# monologue
# JP: \x%l粘着力;#00ffc040;粘着力%l;#;とは\x%l動輪;#00ffc040;動輪%l;#;が線路を捕まえる力。\nトルクとは、エンジンが生み出す回転力だ。
67 = "\\x%l粘着力;#00ffc040;Lực bám đường%l;#; là lực mà \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; bám vào đường ray. Còn lực xoắn là lực quay do động cơ tạo ra."
# monologue
# JP: 強い力で線路を捕まえ、その車軸が強く拗じられるなら、\n当然強いパワーを生むが、負荷はその分大きく――っ！
2629 = "Nếu bám chặt vào đường ray bằng một lực mạnh, và trục bánh xe bị vặn xoắn mạnh, thì đương nhiên sẽ tạo ra sức mạnh lớn, nhưng tải trọng cũng sẽ lớn theo tương ứng――!"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、そうか。\x%l粘着力;#00ffc040;粘着力%l;#;を下げてしまうか、\nトルクを落としてしまえばいいのか」
1976 = "「Nếu vậy thì, ra là thế. Chỉ cần giảm \\x%l粘着力;#00ffc040;lực bám đường%l;#; xuống, hoặc giảm lực xoắn xuống là được sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、鉱山鉄道時代と違って、この湯医線ですから……\nどっちをとっても安全だって計算は出来てます」
1801 = "「Vâng, khác với thời ở đường sắt khai thác mỏ, vì đây là tuyến Yui…… Nên dù chọn cách nào thì chúng tôi cũng đã tính toán được là sẽ an toàn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1792 = "「是嗎」" 
# monologue
# JP: 僕の相槌が熱を帯びるのと裏腹に、\nポーレットの口調は、いっそうためらいがちになる。
2700 = "Trái ngược với sự hưởng ứng nhiệt tình của tôi, giọng điệu của Paulette lại càng trở nên ngập ngừng hơn."
# 【ポーレット】
# display as 波萊特
# JP: 「でも、\x%l粘着力;#00ffc040;粘着力%l;#;を一番安全に落とすのは、輪軸からの\n再設計が必要になって――コスト的にも技術的にも……」
1493 = "「Nhưng mà, cách an toàn nhất để giảm \\x%l粘着力;#00ffc040;lực bám đường%l;#; là phải thiết kế lại từ phần trục bánh xe――về cả mặt chi phí lẫn kỹ thuật đều……」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、例えば……\nエンジンにリミッターをつけるなどして」
1972 = "「Nếu vậy thì, ví dụ như…… Gắn bộ giới hạn cho động cơ chẳng hạn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1648 = "「嗯」" 
# monologue
# JP: 頷いて。
2373 = "Cô ấy gật đầu."
# monologue
# JP: 続く言葉は、吹っ切れたようにサバサバしている。
2469 = "Những lời tiếp theo nghe rất sảng khoái, như thể đã rũ bỏ được mọi gánh nặng."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、それを考えてました」
1729 = "「Tôi cũng đã nghĩ đến cách đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 1792 = "「是嗎」" 
# monologue
# JP: 他の設計を変えることなく、\n単にリミッターでエンジン出力だけを落とす。
2601 = "Không cần thay đổi các thiết kế khác, chỉ đơn thuần là dùng bộ giới hạn để giảm công suất động cơ xuống."
# monologue
# JP: それはさまざまなロスをきっと生むのだろうし、\nベストな方法とはいいがたいのだろう。が――
2656 = "Chắc chắn điều đó sẽ gây ra nhiều tổn thất khác nhau, và khó có thể nói đó là phương pháp tốt nhất. Nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、それでよろしく頼めるか？」
1991 = "「Nếu vậy thì, nhờ cô tiến hành theo cách đó được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「――はい」
1667 = "「――Vâng.」"
# monologue
# JP: ポーレット自身もわかってくれてる。\nわかって飲み込もうとしてくれている。
2587 = "Bản thân Paulette cũng hiểu rõ điều đó. Hiểu rõ và đang cố gắng chấp nhận nó."
# monologue
# JP: ベストなど、存在しないのかもしれないし――\nならばベターを、選び、進んでいくべきなのだと。
2526 = "Có lẽ phương pháp tốt nhất vốn dĩ không tồn tại―― Nếu vậy thì chúng ta phải chọn phương pháp tốt hơn và tiếp tục tiến bước."
# 【ポーレット】
# display as 波萊特
# JP: 「やります」
1689 = "「Tôi sẽ làm.」"
# monologue
# JP: 頷いて。\nポーレットは強ばっていた表情を、柔らかな苦笑に崩す。
2589 = "Cô ấy gật đầu. Vẻ mặt cứng đờ của Paulette giãn ra thành một nụ cười khổ gượng gạo."
# 【ポーレット】
# display as 波萊特
# JP: 「あとは、やる、やらないの問題だけだったんです。\nけど、これって――決心。するしか無い状況ですから」
1560 = "「Chỉ còn lại vấn đề là làm hay không làm thôi. Nhưng mà, chuyện này――chúng ta đang ở trong tình thế buộc phải quyết tâm thôi.」"
# monologue
# JP: ポーレットの手が、れいなを包む。
2582 = "Bàn tay Paulette bao bọc lấy Reina."
# monologue
# JP: かばい守っているようにも、\nすがり頼っているようにも見える手が。
2763 = "Bàn tay ấy, trông vừa như đang che chở bảo vệ, lại vừa như đang bám víu dựa dẫm."
# 【ポーレット】
# display as 波萊特
# JP: 「やりますし、やれます。\nその問題は、こっちできっちり、解決します」
1900 = "「Tôi sẽ làm, và tôi có thể làm được. Vấn đề đó, phía chúng tôi sẽ giải quyết triệt để.」"
# monologue
# JP: 瞳は、強い。\n今まで一度も目にしたことが無いほどに。
2670 = "Ánh mắt thật mạnh mẽ. Mạnh mẽ đến mức tôi chưa từng thấy bao giờ."
# monologue
# JP: だから、思う。自然と心に湧いてくる。\nれいなとの絆の強さが――きっとポーレットを強くした。
2654 = "Vì vậy, tôi nghĩ. Tự nhiên trong lòng tôi trào dâng suy nghĩ ấy. Sự gắn kết bền chặt với Reina――chắc chắn đã làm cho Paulette trở nên mạnh mẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕も――」
1994 = "「Nếu vậy thì tôi cũng――」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！」
2017 = "「Ngài Soutetsu!」"
# monologue
# JP: ハチロクの声、\n普段のあの、取り澄ました感じをまるで受けぬ声。
2274 = "Giọng của Hachiroku, một giọng nói hoàn toàn không có vẻ điềm tĩnh như thường ngày."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様――やはり、ここでしたか」
2010 = "「Ngài Soutetsu――quả nhiên ngài ở đây.」"
# monologue
# JP: よほど急いで来たのだろう。
2662 = "Chắc hẳn em ấy đã đến đây rất vội vã."
# monologue
# JP: 普段はきっちり整えてある服のはしばしが乱れて……\nいや――
2392 = "Bộ quần áo vốn luôn được chỉnh tề nay lại xộc xệch ở vài chỗ…… Không――"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――お前、転んだのか？」
1544 = "「Hachiroku――em bị ngã sao?」"
# 【ハチロク】
# display as 八六
# JP: 「そのようなこと、今は関係ございません」
1973 = "「Chuyện đó bây giờ không quan trọng ạ.」"
# monologue
# JP: 汚れた膝を拭いもせずに、\nぐっ、とハチロクが詰め寄ってくる。
2598 = "Không thèm lau đi vết bẩn trên đầu gối, Hachiroku tiến sát lại gần tôi."
# monologue
# JP: その目は、ひどく揺れている。\n怒りと不安と悲しみを、全て混ぜ込んでいるかのように。
2371 = "Ánh mắt em ấy dao động dữ dội. Như thể đang pha trộn tất cả sự tức giận, bất an và buồn bã."
# 【ハチロク】
# display as 八六
# JP: 「ポーレット様と、れいなと……\n一体何を、ご相談されてらしたのですか？」
1722 = "「Cùng với thị trưởng Paulette, và Reina…… Rốt cuộc ngài đang bàn bạc chuyện gì vậy ạ?」"
# monologue
# JP: ――双鉄様のお顔が、曇る。
2801 = "――Khuôn mặt ngài Soutetsu tối sầm lại."
# monologue
# JP: そのようなお顔を見たくなくって、させたくなくて、\n言葉を上手く、選択できなくなってしまう。
2431 = "Tôi không muốn nhìn thấy khuôn mặt như vậy, không muốn ngài ấy phải làm ra khuôn mặt như vậy, nên tôi không thể lựa chọn từ ngữ cho cẩn thận được nữa."
# 【ハチロク】
# display as 八六
# JP: 「何についてのお話ですか？\nわたくしが聞くべきではないことですか？」
1969 = "「Ngài đang nói về chuyện gì vậy ạ? Là chuyện mà em không nên nghe sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。そんなことはない。\nむしろ、お前が一番に知るべき話だ」
1466 = "「Không. Không phải vậy đâu. Đúng hơn thì, em mới là người cần phải biết chuyện này đầu tiên.」"
# 【ハチロク】
# display as 八六
# JP: 「それは――」
1989 = "「Chuyện đó là――」"
# monologue
# JP: 目覚めたときから、感じてたこと。
2512 = "Điều mà tôi đã cảm nhận được ngay từ lúc tỉnh dậy."
# monologue
# JP: 目覚めた隣に双鉄様がいなかった――\n寂しさと、不安と、そこに入り混じったもの。疎外感。
2780 = "Khi tỉnh dậy, ngài Soutetsu không ở bên cạnh―― Sự cô đơn, bất an, và cả thứ cảm xúc hòa lẫn trong đó. Sự xa lánh."
# 【ハチロク】
# display as 八六
# JP: 「\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;に、関係のあるお話ですか？」
1802 = "「Là chuyện có liên quan đến \\x%l8620;#00ffc040;8620%l;#; sao ạ?」"
# monologue
# JP: それを拭ってしまいたいから、\n双鉄様に、言葉で拭っていただきたいから、問いかける。
2548 = "Vì muốn xua tan đi cảm giác đó, vì muốn được ngài Soutetsu xua tan đi bằng lời nói, nên tôi mới hỏi."
# monologue
# JP: 「違う」と否定していただきたくて。\nけれどもきっと、そうはならないと予測もしていて。
2788 = "Tôi muốn ngài ấy phủ nhận rằng \"Không phải vậy\". Nhưng tôi cũng lờ mờ đoán được rằng, chắc chắn mọi chuyện sẽ không như ý muốn."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。その通りだ」
1643 = "「Ừm. Đúng là vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「そのことでしたら、昨晩、\nわたくしと話しあったではありませんか」
1963 = "「Nếu là chuyện đó thì, tối hôm qua, chẳng phải ngài đã nói chuyện với em rồi sao ạ.」"
# monologue
# JP: 双鉄様の、あの言葉。\n『僕を信じて、今は休め』と――
2804 = "Lời nói đó của ngài Soutetsu. 『Hãy tin tôi, bây giờ em cứ nghỉ ngơi đi』――"
# monologue
# JP: それがどうとも取れる言葉と知りつつも甘えておいて……\nなのに実際こうなれば、わたくしの思考は乱れてしまう。
2442 = "Dù biết đó là một câu nói có thể hiểu theo nhiều nghĩa, nhưng tôi vẫn cố tình làm nũng…… Thế mà khi sự thật diễn ra như thế này, tâm trí tôi lại trở nên rối bời."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様を信じていいと――\nおっしゃってくださったではありませんか」
2013 = "「Ngài bảo em có thể tin tưởng ngài―― Chẳng phải ngài đã nói như vậy sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに言った。だから、僕は、お前のために――\nお前を守るために、僕の責任で決断を下そうと考えた」
1744 = "「Đúng là tôi đã nói vậy. Vì thế, vì em―― để bảo vệ em, tôi đã quyết định sẽ tự mình đưa ra quyết định và chịu trách nhiệm về nó.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしを……守る」
1513 = "「Bảo vệ…… em.」"
# monologue
# JP: 嬉しいお言葉のはずなのに、\n思考回路のどこかがぽっと、幸せな熱を帯びるのに。
2767 = "Đáng lẽ đó phải là những lời nói khiến tôi vui mừng, một nơi nào đó trong mạch suy nghĩ của tôi bỗng nhiên rực lên sức nóng của niềm hạnh phúc."
# monologue
# JP: なのに、別の部分がキン――と、\n冷えきり、動かなくなったようで。
2608 = "Thế nhưng, một phần khác lại lạnh buốt―― lạnh cóng lại, dường như không thể hoạt động được nữa."
# 【ハチロク】
# display as 八六
# JP: 「なにから、わたくしを守ってくださるのですか？」
1720 = "「Ngài bảo vệ em, khỏi điều gì cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「事故からだ。今のままなら確実に起こってしまう、\n\x%l台枠;#00ffc040;台枠%l;#;損傷に起因する、大きな事故からだ」
1514 = "「Khỏi tai nạn. Một vụ tai nạn lớn bắt nguồn từ việc \\x%l台枠;#00ffc040;khung gầm%l;#; bị hư hỏng, điều chắc chắn sẽ xảy ra nếu chúng ta cứ để nguyên tình trạng hiện tại.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
2009 = "「Anh Soutetsu.」"
# monologue
# JP: ポーレット様の瞳が不安気に伏せられて――\nその目を追って、わたくしも遅れて気付かされる。
2581 = "Ánh mắt thị trưởng Paulette cụp xuống đầy vẻ bất an―― Nhìn theo ánh mắt ấy, tôi mới muộn màng nhận ra."
# monologue
# JP: 双鉄様のお手がギュウっと握られている。\n握られて、ふるふると小さく震えてる。
2800 = "Bàn tay ngài Soutetsu đang nắm chặt lại. Nắm chặt đến mức run lên bần bật."
# 【ハチロク】
# display as 八六
# JP: 「ですので、わたくしは申しました」
2002 = "「Vì thế nên, em đã nói rồi mà.」"
# monologue
# JP: わたくしよりも、ポーレット様が先に気づいた。\nわたくしではなく、ポーレット様に相談をした。
2265 = "Thị trưởng Paulette đã nhận ra điều đó trước cả tôi. Ngài ấy đã thảo luận với thị trưởng Paulette, chứ không phải với tôi."
# monologue
# JP: 独立しあった物事に、関連性を覚える気がして、\n言葉の制御系統が、いっそう混乱してしまう。
2660 = "Tôi có cảm giác như những sự việc vốn dĩ độc lập lại đang liên kết với nhau, khiến hệ thống kiểm soát ngôn từ của tôi càng trở nên hỗn loạn."
# 【ハチロク】
# display as 八六
# JP: 「あと二年。\nその期間なら、必ず安全に走れると」
1982 = "「Còn hai năm nữa. Trong khoảng thời gian đó, em nhất định có thể chạy an toàn.」"
# monologue
# JP: 二年。\n真闇様たちのお父様から双鉄様に与えられた猶予期間。
2269 = "Hai năm. Là khoảng thời gian gia hạn mà cha của chị Mayami đã dành cho ngài Soutetsu."
# monologue
# JP: その間に、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を撤回に追い込めないなら、\n双鉄様は、きっと、御一夜から居なくなる。
2706 = "Trong khoảng thời gian đó, nếu không thể ép họ rút lại quyết định mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, thì chắc chắn ngài Soutetsu sẽ phải rời khỏi Ohimitera."
# 【ハチロク】
# display as 八六
# JP: 「ですから、その間にわたくしと\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;を使い切り、\nどうぞ目的をお果たしくださいと、わたくしは」
1759 = "「Vì vậy, trong khoảng thời gian đó xin hãy sử dụng em và \\x%l8620;#00ffc040;8620%l;#; đến cùng, chỉ cần ngài đạt được mục đích, dù cho em có……」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに聞いた。嬉しく思った。\nその上で、僕は決断したのだ」
1962 = "「Tôi đã nghe rõ. Và tôi cũng rất vui. Nhưng dựa trên điều đó, tôi đã đưa ra quyết định.」"
# monologue
# JP: 双鉄様の手が伸びてくる。\nわたくしの帽子をめがけ、褒めてくださる時と同じく。
2792 = "Bàn tay ngài Soutetsu vươn tới. Hướng về phía chiếc mũ của tôi, giống hệt như mỗi khi ngài ấy khen ngợi tôi."
# monologue
# JP: けれど体が勝手に動き、\nその手を、わずかに避けてしまう。
2340 = "Thế nhưng cơ thể tôi lại tự động di chuyển, và khẽ né tránh bàn tay ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1628 = "「Ưm」"
# monologue
# JP: 戸惑った顔。
2227 = "Một khuôn mặt bối rối."
# monologue
# JP: 双鉄様は、帽子の上から髪を撫でてくださらぬまま、\nその手を、もとへと戻してしまう。
2799 = "Ngài Soutetsu không xoa tóc tôi qua lớp mũ nữa, mà rút bàn tay ấy về chỗ cũ."
# monologue
# JP: わたくし自身にも判断できない、\n不正極まる、その挙動。
2451 = "Chính bản thân tôi cũng không thể hiểu nổi, hành động vô cùng sai trái đó của mình."
# monologue
# JP: 双鉄様も、おそらく意味を取りかねて……\nだからお顔が、いっそう戸惑ったものになる。
2795 = "Ngài Soutetsu có lẽ cũng không hiểu được ý nghĩa của nó…… Nên khuôn mặt ngài ấy lại càng trở nên bối rối hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ハチロク」
1547 = "「Tôi, Hachiroku à」"
# monologue
# JP: 優しいお声。\nゆっくりとしたしゃべり方。
2592 = "Một giọng nói dịu dàng.\nMột cách nói chuyện chậm rãi."
# monologue
# JP: 大事なことを、\n双鉄様はおっしゃろうとしてくださっている。
2803 = "Ngài Soutetsu đang định nói với tôi, một điều rất quan trọng."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はな、ハチロク――鉄道事故が、怖いのだ」
1548 = "「Tôi ấy mà, Hachiroku――rất sợ tai nạn đường sắt.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！」
1638 = "「A!!」"
# monologue
# JP: 突き放されたと感じてしまう。
2716 = "Tôi có cảm giác như mình vừa bị ruồng bỏ."
# monologue
# JP: その感覚が、不合理なものと理解して、\nそれでも、思考以外の部分が、熱暴走をしてしまう。
2789 = "Dù hiểu rằng cảm giác đó là vô lý, nhưng những phần ngoài tư duy của tôi vẫn đang vượt tầm kiểm soát."
# 【ハチロク】
# display as 八六
# JP: 「わたくしの判断を、信用できないということですか？\nわたくしが、不具合を持つ\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であるから」
1970 = "「Ý ngài là không thể tin tưởng vào phán đoán của em sao? Chỉ vì em là một \\x%lレイルロオド;#00ffc040;Railord%l;#; bị lỗi sao?」"
# 【れいな】
# display as 波萊特＆玲奈
# JP: 『「ハチロクちゃん！」\n「ハチロクさん！」』
2037 = "『「Bé Hachiroku!」\n「Chị Hachiroku!」』"
# monologue
# JP: ポーレット様の膝の上、\nじいっと黙り込んでいたれいなが、膝から下りる。
2292 = "Reina, người nãy giờ vẫn ngồi im lặng trên đùi thị trưởng Paulette, bước xuống đất."
# monologue
# JP: そしてつかつか、\n物も言わずにわたくしの方へ歩み寄り――
2688 = "Và rồi thoăn thoắt, không nói không rằng bước tới chỗ tôi――"
# monologue
# JP: （ピンっ！）
2823 = "（Cốc!）"
# 【ハチロク】
# display as 八六
# JP: 「っ！！？」
2025 = "「!!?」"
# monologue
# JP: 指で、おでこを弾かれる。
2808 = "Tôi bị búng vào trán bằng ngón tay."
# monologue
# JP: 衝撃さえもほとんどなくて、\nけれど――どこかが、ひどく動揺してしまう。
2745 = "Hầu như không có chút lực tác động nào, nhưng――một nơi nào đó trong tôi lại dao động dữ dội."
# 【れいな】
# display as 玲奈
# JP: 「だだっ子は、デコピンをされちゃうのです」
1486 = "「Trẻ con hư là sẽ bị búng trán đó nha.」"
# 【ハチロク】
# display as 八六
# JP: 「デコ、ピン？」
1697 = "「Búng, trán?」"
# 【れいな】
# display as 玲奈
# JP: 「デコピンは、するほうがずっと痛いのです。\nポーレット、デコピンすると、泣きそうな顔するのです」
1698 = "「Búng trán á, người búng mới là người đau hơn đó nha. Chị Paulette mỗi lần búng trán Reina, đều làm ra vẻ mặt như sắp khóc ấy.」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
1215 = "「…………」"
# monologue
# JP: れいなも、泣きそうな顔をしてます。\n思考に酷いノイズが混じり、わたくしは混乱しています。
2619 = "Reina cũng đang làm ra vẻ mặt như sắp khóc. Những tạp âm khủng khiếp lẫn lộn trong suy nghĩ khiến tôi trở nên hỗn loạn."
# monologue
# JP: だから――痛いと――わたくしは――\nこれが、この感覚も痛みだと――きっと理解をしています。
2462 = "Vì thế――tôi đau――tôi―― Chắc chắn tôi cũng hiểu được rằng――cảm giác này cũng là một nỗi đau."
# 【ハチロク】
# display as 八六
# JP: 「わたくしの……どこが、だだっ子などと」
1727 = "「Em…… hư ở chỗ nào cơ chứ.」"
# 【れいな】
# display as 玲奈
# JP: 「双鉄さん。ハチロクさんの\x%l機関士;#00ffc040;[マスター,2]機関士%l;#;ですよ？\n信用をしてなかったら、一緒になんて走ってないです」
2006 = "「Anh Soutetsu là \\x%l機関士;#00ffc040;Lái tàu%l;#; của chị Hachiroku mà đúng không? Nếu không tin tưởng thì làm sao anh ấy có thể cùng chị chạy tàu được chứ.」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
1629 = "「A――」"
# monologue
# JP: それは、当然。\n０か１かで、曖昧さなく、正と断定できること。
2769 = "Đó là điều hiển nhiên. Như 0 và 1, không hề mơ hồ, là một sự thật không thể chối cãi."
# 【れいな】
# display as 玲奈
# JP: 「ハチロクさんだって、そのことちゃんとわかってるです。\nわかってるのに、困らせるために言うのは、だだです」
1540 = "「Chị Hachiroku cũng hiểu rõ điều đó mà. Đã hiểu rõ rồi mà còn nói ra để làm khó người khác, thì đó chính là hư đó nha.」"
# 【ハチロク】
# display as 八六
# JP: 「それは――けれど――」
1959 = "「Đó là――nhưng mà――」"
# monologue
# JP: 双鉄様は、不具合があると承知の上で、\nわたくしの\x%l機関士;#00ffc040;機関士%l;#;となり、あれほど頑張ってくださった。
2797 = "Ngài Soutetsu dù biết rõ em bị lỗi, nhưng vẫn trở thành \\x%l機関士;#00ffc040;Lái tàu%l;#; của em, và đã cố gắng vì em đến nhường nào."
# monologue
# JP: だからわたくしも応えたくって、頑張って。\nなのに、わたくしの\x%l8620;#00ffc040;8620%l;#;が――双鉄様の重荷となって……
2455 = "Nên em cũng muốn đáp lại, em đã cố gắng hết sức. Thế mà \\x%l8620;#00ffc040;8620%l;#; của em――lại trở thành gánh nặng cho ngài Soutetsu……"
# 【双鉄】
# display as 雙鐵
# JP: 「れいな。ハチロクを心配してくれて、\n叱ってくれて、ありがとう」
1840 = "「Reina. Cảm ơn em đã lo lắng, và mắng Hachiroku giúp tôi.」"
# monologue
# JP: 双鉄様のお手がれいなの頭を撫ぜます。\nわたくしを――撫ぜ損なってしまわれた手が。
2793 = "Bàn tay ngài Soutetsu xoa đầu Reina. Bàn tay ấy――vừa nãy đã không thể xoa đầu tôi."
# monologue
# JP: お手が、揺れます、ぐらぐらと。\n双鉄さまのお姿全て、世界がぐらぐら、滲んで揺れます。
2779 = "Bàn tay ấy, đang rung lắc dữ dội. Toàn bộ hình dáng ngài Soutetsu, cả thế giới này đang rung lắc, nhòe đi và chao đảo."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、ハチロクはダダをこねたわけでは無いのだ。\nいろいろなことが起きすぎて、少し混乱しているだけだ」
1462 = "「Nhưng mà, Hachiroku không phải đang nhõng nhẽo đâu. Chỉ là có quá nhiều chuyện xảy ra, nên em ấy hơi bối rối một chút thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「こんらん、ですかぁ？　って、ふわわっ！？」
1826 = "「Bối rối, sao ạ? Ủa, ơ ơ!?」"
# monologue
# JP: れいなが、奇妙な声を出します。
2624 = "Reina thốt lên một âm thanh kỳ lạ."
# 【れいな】
# display as 玲奈
# JP: 「あの、ハチロクさん。れいな、軽ぅくしたつもりで――\nええと、そんなに痛かったですかぁ」
1967 = "「Dạ, chị Hachiroku. Reina định búng nhẹ thôi mà―― À ừm, chị đau đến thế cơ ạ~」"
# 【ハチロク】
# display as 八六
# JP: 「デコピンごとき――少しも、痛くなどありませぬ」
1608 = "「Ba cái trò búng trán này――không hề đau một chút nào cả.」"
# 【れいな】
# display as 玲奈
# JP: 「でも、ハチロクさんっ」
1610 = "「Nhưng mà, chị Hachiroku~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。れいな」
1918 = "「Cảm ơn em. Reina.」"
# 【ポーレット】
# display as 波萊特
# JP: 「れいな？　ね？　おいで？」
1838 = "「Reina? Ngoan nào? Lại đây với chị?」"
# 【れいな】
# display as 玲奈
# JP: 「はい……ですぅ」
1625 = "「Dạ…… vâng ạ~」"
# monologue
# JP: ぽてぽてと、ゆっくり、足音が去っていきます。\nあたたかで大きな気配が、わたくしにそっと近づいて――
2748 = "Tiếng bước chân lạch bạch, chậm rãi rời đi. Một hơi ấm to lớn khẽ khàng tiến lại gần tôi――"
# monologue
# JP: （ぐいっ）
2824 = "（Lau）"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1629 = "「啊——」" 
# monologue
# JP: 双鉄様がハンカチで、わたくしの顔をそっと拭って。\n揺れ動いた世界がそれで、すっきり元に戻ります。
2796 = "Ngài Soutetsu dùng khăn tay nhẹ nhàng lau mặt cho tôi. Thế giới đang chao đảo nhờ vậy mà rõ ràng trở lại."
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな。妙なことを言ってしまったな」
1762 = "「Xin lỗi nhé. Tôi lại nói mấy lời kỳ lạ rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「妙なこと、など――」
1818 = "「Kỳ lạ, gì chứ――」"
# monologue
# JP: 双鉄様は、わたくしの顔を見てくださいません。
2794 = "Ngài Soutetsu không nhìn vào mặt tôi."
# monologue
# JP: 転んで、汚れてしまった膝を、スカートの裾を、\n丁寧に、ぬぐい、はたいて、整えてくださっています。
2337 = "Ngài ấy đang cẩn thận lau chùi, phủi bụi và chỉnh lại phần đầu gối, phần vạt váy bị bẩn do tôi vấp ngã."
# 【ハチロク】
# display as 八六
# JP: 「いえ、確かに――いささか妙ではございましたね」
1468 = "「À không, quả thực――có hơi kỳ lạ một chút ạ.」"
# monologue
# JP: だから、わたくしを見て欲しくって。\nいつもどおりに、いい子と撫ぜていただきたくて。
2463 = "Vì vậy, tôi muốn ngài ấy nhìn tôi. Muốn ngài ấy xoa đầu khen tôi là một cô bé ngoan như mọi khi."
# monologue
# JP: いつものわたくしに戻れるように、\nいつものわたくしらしい言葉を、負荷を感じても選びます。
2391 = "Để có thể trở lại là tôi của ngày thường, tôi cố gắng chọn những từ ngữ giống với bản thân mình nhất, dù cho có cảm thấy áp lực."
# 【ハチロク】
# display as 八六
# JP: 「鉄道事故が怖いなど、当然のことではございませんか」
1684 = "「Việc sợ tai nạn đường sắt, chẳng phải là chuyện đương nhiên sao ạ.」"
# monologue
# JP: 「そうだったな」と、きっと双鉄様は笑ってくださる。\n笑って、きっと、わたくしの頭を撫ぜてくださる。
2791 = "Chắc chắn ngài Soutetsu sẽ cười và nói \"Đúng là vậy nhỉ\". Ngài ấy sẽ cười, và chắc chắn sẽ xoa đầu tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1211 = "「…………」"
# monologue
# JP: なのに、双鉄様は不意に止まってしまわれます。\n言葉ひとつも発さずに、その手をぴたりと止められます。
2615 = "Thế nhưng, ngài Soutetsu lại đột ngột khựng lại. Ngài ấy không nói một lời nào, và bàn tay cũng dừng lại giữa chừng."
# 【ハチロク】
# display as 八六
# JP: 「鉄道事故を経験し、痛みを知っているわたくしです。\n事故のリスクを軽視するなど、ありえぬことです」
1814 = "「Em là người đã từng trải qua tai nạn đường sắt và thấu hiểu nỗi đau đó. Nên không bao giờ có chuyện em xem nhẹ rủi ro tai nạn đâu ạ.」"
# monologue
# JP: 双鉄様が、なにもおっしゃってくれないことが怖くて。\n沈黙を埋めるそのために、急いで言葉を重ねます。
2802 = "Tôi sợ hãi khi ngài Soutetsu không nói gì. Để lấp đầy khoảng lặng đó, tôi vội vã nói thêm."
# 【ハチロク】
# display as 八六
# JP: 「そのわたくしが、二年であれば大丈夫と――\nそう保証しているのですから」
1815 = "「Chính em đã đảm bảo rằng, nếu là hai năm thì sẽ không sao mà――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。僕はお前を信じている。\nお前が僕を大事にしてくれていることを知っている」
1549 = "「Hachiroku. Tôi tin tưởng em. Tôi biết em luôn quan tâm đến tôi.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2012 = "「Ngài Soutetsu.」"
# monologue
# JP: いつもの、双鉄様のお声。\n優しいお声。
2766 = "Giọng nói thường ngày của ngài Soutetsu. Một giọng nói dịu dàng."
# monologue
# JP: なのに、お顔が――\nどこか、強張っていらっしゃいます。
2614 = "Thế nhưng, khuôn mặt ngài ấy―― lại có chút gì đó căng thẳng."
# 【双鉄】
# display as 雙鐵
# JP: 「その前提の上で――\n一つだけ、お前に確認させてくれ」
1653 = "「Dựa trên tiền đề đó―― Cho tôi xác nhận với em một điều duy nhất.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、なんなりと。双鉄様」
1669 = "「Vâng, ngài cứ hỏi đi ạ. Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の問題がなくとも、工場誘致との競争がなくとも、\nハチロクは、\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;の強行運行を主張するのか？」
1521 = "「Giả sử không có vấn đề của tôi, không có cuộc cạnh tranh mời gọi nhà máy, thì Hachiroku có vẫn nhất quyết đòi cho \\x%l8620;#00ffc040;8620%l;#; tiếp tục chạy không?」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
1979 = "「Chuyện đó!」"
# monologue
# JP: そのような、こと――\nそのようなこと……わたくしは、決して行いません。
2768 = "Chuyện như vậy―― Chuyện như vậy…… em tuyệt đối sẽ không làm."
# monologue
# JP: あと二年、無理な運行を続ければ、歪みは回復不能となり、\n\x%l8620;#00ffc040;[あの子,3]8620%l;#;を――わたくしの分身を、必ず壊してしまいますから。
2356 = "Nếu cứ tiếp tục gượng ép chạy thêm hai năm nữa, sự biến dạng sẽ không thể phục hồi, và chắc chắn sẽ phá hủy \\x%l8620;#00ffc040;8620%l;#;――phân thân của em mất."
# 【ハチロク】
# display as 八六
# JP: 「それは――双鉄様」
1961 = "「Chuyện đó――ngài Soutetsu.」"
# monologue
# JP: 自分自身に補正不能な矛盾の存在を確認します。
2438 = "Tôi nhận ra sự tồn tại của một mâu thuẫn không thể cứu vãn trong chính bản thân mình."
# monologue
# JP: 後二年、事故なく運用を出来ると確信しているのに、\n事故確率の向上を、不可避と予測もしています。
2289 = "Rõ ràng tôi tin chắc rằng hai năm tới có thể vận hành mà không xảy ra tai nạn, nhưng đồng thời cũng dự đoán được rằng xác suất xảy ra tai nạn sẽ không thể tránh khỏi tăng lên."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様……わたくしは――」
2018 = "「Ngài Soutetsu…… em――」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこに即答できぬのならば――すまんな、ハチロク。\n\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;の運休を、覆すことは出来ないよ」
1672 = "「Nếu em không thể trả lời ngay lập tức――thì xin lỗi nhé, Hachiroku. Quyết định ngừng hoạt động \\x%l8620;#00ffc040;8620%l;#; sẽ không thể thay đổi được đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら――どうして、双鉄様はっ」
1773 = "「Nếu vậy thì――tại sao, ngài Soutetsu lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
1613 = "「Ưm」"
# monologue
# JP: またです。\n視界が歪んでしまいます。
2668 = "Lại nữa rồi.\nTầm nhìn của tôi đang bị bóp méo."
# monologue
# JP: 声は、せめても震わせぬよう、\n制御を、いっぱいに行います。
2447 = "Tôi cố gắng hết sức để kiểm soát, ít nhất là không để giọng nói của mình bị run rẩy."
# 【ハチロク】
# display as 八六
# JP: 「でしたらどうしてわたくしに――\n望みを言えと……そう、ご命令されたのですか」
1771 = "「Nếu vậy thì tại sao ngài lại bảo em―― nói ra mong muốn của mình…… ngài đã ra lệnh như vậy cơ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――ハチロク」
1968 = "「Chuyện đó là――Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「あのご命令が、きっとわたくしを不安定にし、\n欲張りに、だだっ子にしてしまったのです」
1876 = "「Mệnh lệnh đó, chắc chắn đã khiến em trở nên bất ổn, khiến em trở nên tham lam, và trở thành một đứa trẻ hư.」"
# monologue
# JP: 制御をしようと思うのに、熱暴走が止められません。
2261 = "Tôi muốn kiểm soát lại, nhưng sự quá nhiệt vẫn không thể dừng lại."
# monologue
# JP: わたくしは、壊れてしまっています。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が\x%l機関士;#00ffc040;機関士%l;#;に、逆らうなどはありえませんのに。
2426 = "Tôi đã bị hỏng mất rồi. Rõ ràng một \\x%lレイルロオド;#00ffc040;Railord%l;#; không thể nào chống đối lại \\x%l機関士;#00ffc040;Lái tàu%l;#; được cơ mà."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま――わたくし――は」
# 2018 = "「雙鐵少爺，我……」" 
# monologue
# JP: 自分が、とても恐ろしいです。
2433 = "Tôi cảm thấy bản thân mình thật đáng sợ."
# monologue
# JP: これ以上双鉄様と話していると、\nどこまで暴走してしまうのか、予測さえもが立ちません。
2279 = "Nếu cứ tiếp tục nói chuyện với ngài Soutetsu, tôi thậm chí không thể đoán được mình sẽ mất kiểm soát đến mức nào nữa."
# 【ハチロク】
# display as 八六
# JP: 「――申し訳ございません。今は、失礼いたします」
1889 = "「――Thành thật xin lỗi ngài. Bây giờ, em xin phép.」"
# 【双鉄】
# display as 雙鐵
# JP: 「待て、ハチロク！」
1864 = "「Đợi đã, Hachiroku!」"
# 【ハチロク】
# display as 八六
# JP: 「止めないで！　どうぞ、追わないでくださいましっ！」
1458 = "「Đừng cản em! Xin ngài, đừng đuổi theo em!」"
# monologue
# JP: 言えば、双鉄様は止まってくださいます。
2557 = "Nghe tôi nói vậy, ngài Soutetsu đã dừng lại."
# monologue
# JP: わたくしが望んだその通り――\nそのことが、ひどく苦しく、寂しいように認識されます。
2551 = "Đúng như những gì tôi đã mong muốn―― Thế nhưng, tôi lại cảm thấy điều đó thật đau đớn và cô đơn."
# 【ハチロク】
# display as 八六
# JP: 「今のわたくしは、熱暴走をしています。\n数時間もあれば、きっと、クールダウンできますので」
1842 = "「Hiện tại em đang bị quá nhiệt. Chỉ cần vài giờ nữa, chắc chắn em sẽ có thể hạ nhiệt lại được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――しかし」
1609 = "「――Nhưng mà.」"
# 【ハチロク】
# display as 八六
# JP: 「ですので……どうか。今はひとりに。\n数時間後に、また、お話をさせてください」
1755 = "「Vì vậy…… xin ngài. Bây giờ hãy để em một mình. Vài giờ nữa, xin hãy cho phép em được nói chuyện tiếp với ngài.」"
# monologue
# JP: はぁっと、息を吐く音を聞き取れます。
1179 = "Tôi nghe thấy một tiếng thở dài thườn thượt."
# monologue
# JP: どういう息を吐かれたのかを知りたくて、お顔が見たくて\n――なのに怖くて、どうしても振り返ることができません。
2437 = "Tôi muốn biết ngài ấy đã thở dài với tâm trạng thế nào, muốn nhìn khuôn mặt ngài ấy ――Thế nhưng tôi lại sợ hãi, dù thế nào cũng không dám ngoảnh lại."
# 【双鉄】
# display as 雙鐵
# JP: 「――――わかった。では、またその時に」
1666 = "「――――Tôi hiểu rồi. Vậy thì, để lúc đó chúng ta nói chuyện tiếp.」"
# 【れいな】
# display as 波萊特＆玲奈
# JP: 『「双鉄くん」\n「そうてつさん」』
2043 = "『「Anh Soutetsu」\n「Anh Soutetsu」』"
# monologue
# JP: 双鉄様のお名前が呼ばれる――\nその声を何故か聞きたくなくて、早足になって。
2520 = "Tên ngài Soutetsu được gọi lên―― Không hiểu sao tôi lại không muốn nghe thấy giọng nói đó, liền rảo bước nhanh hơn."
# monologue
# JP: ……わたくしを追う足音は。\nわたくしがそうと望んだがゆえ、聞こえて、こなくて。
2552 = "……Tiếng bước chân đuổi theo tôi. Vì tôi đã mong muốn như vậy, nên không hề vang lên."
# 【ハチロク】
# display as 八六
# JP: 「二年……\nわたくしの方が保たないかもしれませんね」
1538 = "「Hai năm…… Có khi em mới là người không trụ được đến lúc đó.」"
# monologue
# JP: 登呂流湯のご主人の、\nいいかげん極まるお見立てに、もはや腹さえ立ちません。
2633 = "Đối với chẩn đoán vô cùng qua loa của bà chủ nhà tắm Tororyu-yu, tôi thậm chí còn không buồn tức giận nữa."
# 【ハチロク】
# display as 八六
# JP: 「自身も制御できないようでは……\n双鉄様のお役にたつどころか、むしろご迷惑に――」
1863 = "「Đến bản thân mình còn không thể kiểm soát được thế này thì…… Đừng nói là giúp ích cho ngài Soutetsu, có khi còn gây thêm rắc rối――」"
# 【日々姫】
# display as 日日姬
# JP: 「あれ？　ハチロクなんでこんなところに」
1617 = "「Ủa? Hachiroku, sao em lại ở đây?」"
# 【ハチロク】
# display as 八六
# JP: 「っ！？」
2026 = "「!?」"
# monologue
# JP: 白い手。\n長い――絵描きさんの指。
2646 = "Một bàn tay trắng muốt. Những ngón tay dài――của một họa sĩ."
# 【ハチロク】
# display as 八六
# JP: 「日々姫こそ――どうして、こんなところに？」
1776 = "「Chị Hibiki mới đúng――sao chị lại ở đây?」"
# 【日々姫】
# display as 日日姬
# JP: 「\x%l保火;#00ffc040;[ほか,1]保火%l;#;に来たの――\n\x%l保火;#00ffc040;保火%l;#;に来たんだよ」
1505 = "「Chị đến để \\x%l保火;#00ffc040;giữ lửa%l;#;―― Chị đến để \\x%l保火;#00ffc040;giữ lửa%l;#; đó.」"
# monologue
# JP: 同じような言葉をけれど、なぜだか二回繰り返し。\nそれで、わたくしも気づきます。
2238 = "Cùng một câu nói nhưng không hiểu sao chị ấy lại lặp lại hai lần. Vì vậy, tôi cũng nhận ra."
# monologue
# JP: （日々姫……標準語を話していますね）
2827 = "（Chị Hibiki…… đang cố nói giọng phổ thông nhỉ.）"
# monologue
# JP: 双鉄様とお話するときの日々姫を見ていると、わかります。\n素顔の日々姫は、隈元弁。
2666 = "Chỉ cần nhìn lúc chị Hibiki nói chuyện với ngài Soutetsu là tôi hiểu. Con người thật của chị Hibiki là nói giọng Kumamoto."
# monologue
# JP: そして、標準語を話す日々姫は、\n背伸びをしたり、よそ行きの顔をしていると。
2658 = "Và khi nói giọng phổ thông, chị Hibiki đang cố tỏ ra người lớn, hoặc đang khoác lên mình vẻ mặt xã giao."
# 【ハチロク】
# display as 八六
# JP: 「\x%l保火;#00ffc040;[ほか,1]保火%l;#;、と言っても――\n双鉄様に、お話を聞いていないのですか？」
1196 = "「Dù là \\x%l保火;#00ffc040;giữ lửa%l;#;―― Nhưng chị chưa nghe ngài Soutetsu nói gì sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「聞いたよ？　ハチロク走っていっちゃうし――\nわたしが遅れていったらさ、兄さん、こーんな顔してて」
1874 = "「Chị nghe rồi. Hachiroku thì chạy đi mất―― Lúc chị đến muộn, thì anh trai đang làm ra vẻ mặt như thế này này.」"
# monologue
# JP: こーんな、と言って、\n日々姫は、映画に出てくる歩く死体みたいなお顔をします。
2510 = "Vừa nói \"như thế này này\", chị Hibiki vừa làm ra vẻ mặt giống như xác chết biết đi trong phim vậy."
# monologue
# JP: おかしなお顔。\nけれども少し、双鉄様の様子が浮かんでくるようです。
2375 = "Một vẻ mặt thật kỳ quặc. Nhưng nó cũng phần nào gợi lên hình ảnh của ngài Soutetsu lúc đó."
# 【ハチロク】
# display as 八六
# JP: 「落ち込まれていたのですか？　あの双鉄様が」
2016 = "「Ngài ấy suy sụp lắm sao ạ? Ngài Soutetsu ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、落ち込んでた。“あの”兄さんが」
1797 = "「Ừ, suy sụp lắm. \"Cái anh trai đó\" cơ mà.」"
# monologue
# JP: 日々姫が、\x%lポーカー;#00ffc040;ポーカー%l;#;を手に取ります。
2511 = "Chị Hibiki cầm \\x%lポーカー;#00ffc040;móc bếp%l;#; lên."
# monologue
# JP: \x%lカマ;#00ffc040;カマ%l;#;のフタをあけ、\nざくざくと、中の石炭を崩します。
2786 = "Mở nắp \\x%lカマ;#00ffc040;lò hơi%l;#; ra, rồi chọc vỡ những tảng than bên trong kêu sột soạt."
# 【日々姫】
# display as 日日姬
# JP: 「わたしね、ずっと。兄さんって、頭が良くて強いから。\nだから、悩みも落ち込みもしないんだって、思ってたの」
1559 = "「Chị ấy mà, trước giờ luôn nghĩ. Vì anh trai rất thông minh và mạnh mẽ. Nên anh ấy sẽ không bao giờ có phiền muộn hay suy sụp đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「そうではないのですか？　\n双鉄様は、賢く、お強い方ではございませんか」
2019 = "「Không phải vậy sao ạ? Ngài Soutetsu chẳng phải là một người rất thông minh và mạnh mẽ sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「そうだよ。でも、強くて賢くても落ち込むでしょ。\n賢い方が……むしろ悩みは、たくさんなんじゃないの？」
1795 = "「Đúng vậy. Nhưng dù mạnh mẽ và thông minh thì cũng có lúc suy sụp chứ. Càng thông minh…… thì có khi lại càng có nhiều phiền muộn hơn ấy chứ?」"
# monologue
# JP: 肩をすくめて、\n日々姫は得物を、ワンスコへと持ち替えます。
2507 = "Nhún vai một cái, chị Hibiki đổi sang cầm xẻng xúc than."
# 【ハチロク】
# display as 八六
# JP: 「それは……\nそう言われれば、そのような気もいたしますが」
1960 = "「Chuyện đó……\nNghe chị nói vậy, em cũng thấy có lý.」"
# 【日々姫】
# display as 日日姬
# JP: 「今までの兄さんが悩まなかったのはさ――だからきっと。\n自分をすごく、抑えてたから」
1484 = "「Lý do mà trước đây anh trai không bao giờ tỏ ra phiền muộn――chắc chắn là vì. Anh ấy đã kìm nén bản thân mình rất nhiều.」"
# 【ハチロク】
# display as 八六
# JP: 「ご自分を――抑える？」
1655 = "「Kìm nén――bản thân mình sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「あれが欲しいとか、これは嫌とか――\nそういうのなかったら、世の中って簡単だと思わない？」
1725 = "「Muốn cái này, ghét cái kia―― Nếu không có những cảm xúc đó, em không thấy thế giới này sẽ đơn giản hơn rất nhiều sao?」"
# 【ハチロク】
# display as 八六
# JP: 「ああ――そのような意味ですか」
1630 = "「A――Ra là ý đó ạ.」"
# monologue
# JP: 本当に左様ですね、と頷きます。
2649 = "Tôi gật đầu đồng tình, quả thực là như vậy."
# monologue
# JP: 欲しい気持ち。欲。\nそれはわたくしの世界を、苦しい物に変えましたから。
2554 = "Cảm giác khao khát. Dục vọng. Chính nó đã biến thế giới của tôi thành một nơi đầy đau khổ."
# 【日々姫】
# display as 日日姬
# JP: 「好きも嫌いも押し殺してさ。きっと全部を義務にして。\n――だから兄さんは悩みも落ち込みもしなかった」
1622 = "「Kìm nén cả yêu lẫn ghét. Chắc chắn anh ấy đã biến tất cả thành nghĩa vụ. ――Vì thế nên anh trai mới không phiền muộn cũng chẳng suy sụp.」"
# monologue
# JP: ザク、ザクと――\n日々姫は石炭を投げ込みます。
2346 = "Xoạt, xoạt―― Chị Hibiki liên tục xúc than ném vào trong."
# 【日々姫】
# display as 日日姬
# JP: 「でも、今回はすごく悩んでるよね。\nめちゃくちゃうろたえて、おろおろしてる」
1464 = "「Nhưng mà, lần này anh ấy lại đang rất phiền muộn. Vô cùng bối rối và hoang mang.」"
# 【ハチロク】
# display as 八六
# JP: 「左様、ですか？\nわたくしには、とてもそのようには」
1845 = "「Vậy sao ạ?\nEm thì lại không thấy như thế chút nào.」"
# 【日々姫】
# display as 日日姬
# JP: 「あはっ！」
1634 = "「A ha!」"
# monologue
# JP: からりと――高熱の油を通したような笑いです。
2489 = "Một tiếng cười giòn tan――như vừa được nhúng qua chảo dầu sôi."
# monologue
# JP: 少しもしつこいところがなくて、\nさくりと、言葉が噛み砕かれます。
2560 = "Không hề có chút gì dài dòng, những lời nói được thốt ra một cách gãy gọn."
# 【日々姫】
# display as 日日姬
# JP: 「そこに気づけてないんなら、ハチロクと兄さん、\nかなり似たもの同士だよね」
1846 = "「Nếu em không nhận ra điều đó, thì Hachiroku và anh trai, hai người khá là giống nhau đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「似たもの同士――でございますか？」
1732 = "「Giống nhau――sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「多分ね。きっと――\n心の大事なところから、ずっと目を逸らし続けてた同士」
1726 = "「Chắc vậy. Chắc chắn là―― Hai người đều luôn ngoảnh mặt làm ngơ trước những điều quan trọng trong lòng mình.」"
# 【ハチロク】
# display as 八六
# JP: 「……」
# 1215 = "「……」" 
# monologue
# JP: 心。こころ。\n双鉄様は、そうなのでしょうか？
2413 = "Trong lòng. Trái tim.\nNgài Soutetsu, là như vậy sao?"
# monologue
# JP: わたくし――わたくしは――\nしかし、わたくしは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なのですし――
2420 = "Còn em――em thì―― Nhưng mà, em chỉ là một \\x%lレイルロオド;#00ffc040;Railord%l;#; thôi mà――"
# monologue
# JP: （ザっ！）
2822 = "（Xoạt!）"
# monologue
# JP: 鮮やかに、日々姫の投げ込む石炭が、\n\x%lカマ;#00ffc040;カマ%l;#;の[バック,1]奥面を抑えます。
2496 = "Tảng than mà chị Hibiki ném vào, đã lấp gọn gàng phần trong cùng của \\x%lカマ;#00ffc040;lò hơi%l;#;."
# monologue
# JP: まるで一枚の絵のように、\n無駄なく、美しい動きでもって。
2284 = "Một động tác đẹp đẽ, không một chút dư thừa, giống như một bức tranh vậy."
# 【ハチロク】
# display as 八六
# JP: 「上手く――なりましたね。短い期間に」
1975 = "「Chị đã――thành thạo hơn rồi nhỉ. Chỉ trong một thời gian ngắn.」"
# monologue
# JP: 言葉がするりと滑り出てきて――\n瞬間「ああ」と認識します。
2736 = "Những lời đó vô tình thốt ra―― Và khoảnh khắc tiếp theo, tôi chợt nhận ra \"A\"."
# monologue
# JP: これが、日々姫の言っている、\n『目を逸らし』ている、実例でしょうか？
2770 = "Đây, chính là ví dụ thực tế cho việc, \"ngoảnh mặt làm ngơ\" mà chị Hibiki vừa nói sao?"
# 【日々姫】
# display as 日日姬
# JP: 「そりゃそーよ。\nあれだけスパルタで鍛えられたら」
1996 = "「Đương nhiên rồi. Bị rèn luyện kiểu Sparta đến mức đó cơ mà.」"
# monologue
# JP: けれど、日々姫は気にしたそぶりもみせません。\nだから、なんだか――悲しくなります。
2612 = "Nhưng chị Hibiki không hề tỏ ra bận tâm. Vì thế, không hiểu sao――tôi lại thấy buồn."
# 【ハチロク】
# display as 八六
# JP: 「無駄な努力を、重ねさせてしまいましたね」
1834 = "「Em đã bắt chị phải nỗ lực vô ích rồi nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「無駄？　って、なにが？」
1828 = "「Vô ích? Ý em là sao?」"
# monologue
# JP: 大きく綺麗に\x%lカマ;#00ffc040;カマ%l;#;を整え、\nその上に、日々姫は石炭を敷いていきます。
2492 = "Chị Hibiki dàn đều \\x%lカマ;#00ffc040;lò hơi%l;#; thật rộng và đẹp, rồi rải than lên trên đó."
# monologue
# JP: 次に蒸気をあげるとき――\nその時のため、種火を絶やさぬ――\x%l保火;#00ffc040;保火%l;#;をします。
2595 = "Để chuẩn bị cho lần tạo hơi nước tiếp theo―― Chị ấy đang duy trì mồi lửa――đang \\x%l保火;#00ffc040;giữ lửa%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「\x%l保火;#00ffc040;[ほか,1]保火%l;#;をしても……\n\x%l8620;#00ffc040;[この子,3]8620%l;#;は、もう、走れないのですから」
1566 = "「Dù có \\x%l保火;#00ffc040;giữ lửa%l;#; đi nữa…… \\x%l8620;#00ffc040;8620%l;#; cũng không thể chạy được nữa đâu ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「走れない？　なんで？　直すでしょ？　また」
1455 = "「Không thể chạy? Tại sao chứ? Chúng ta sẽ sửa nó mà? Đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「直す、と簡単に言いますが――」
1517 = "「Sửa thì nói nghe dễ lắm ạ――」"
# 【日々姫】
# display as 日日姬
# JP: 「簡単じゃなくても、直すでしょ？\nだってにぃに――兄さんだよ？　右田双鉄だよ？」
1687 = "「Dù không dễ thì cũng sẽ sửa được thôi, đúng không? Bởi vì anh hai――anh trai cơ mà? Là Migita Soutetsu cơ mà?」"
# monologue
# JP: 日々姫の、まっすぐな双鉄様への信頼。\nわたくしはそれを、羨ましいように認識します。
2498 = "Sự tin tưởng tuyệt đối của chị Hibiki dành cho ngài Soutetsu. Tôi nhận ra mình đang ghen tị với điều đó."
# 【ハチロク】
# display as 八六
# JP: 「確かに……双鉄様なら為されるでしょう。\n十分な時間と技術と設備、それからお金があれば」
1848 = "「Quả thực…… nếu là ngài Soutetsu thì chắc chắn sẽ làm được. Chỉ cần có đủ thời gian, kỹ thuật, thiết bị, và cả tiền bạc nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「あはっ、\nハチロクもポーレットさんと同じこと言ってるし」
1635 = "「A ha,\nHachiroku cũng nói y hệt chị Paulette luôn.」"
# monologue
# JP: ごくさりげない一言に、\nけれど期待が、ひとつ潰されてしまいます。
2370 = "Một câu nói vô cùng bâng quơ, nhưng lại dập tắt một niềm hy vọng trong tôi."
# monologue
# JP: あるいは、もしかしてポーレット様が、\nわたくしの知らない革新技術をご存知かも、という期待が。
2294 = "Đó là niềm hy vọng rằng, biết đâu thị trưởng Paulette lại biết một công nghệ đột phá nào đó mà tôi không hay biết."
# 【日々姫】
# display as 日日姬
# JP: 「時間は、つまり労働力でしょ？　人の手の数。\nそれが多ければ多いほど、時間は圧縮できるよね」
1806 = "「Thời gian, nói cách khác là sức lao động đúng không? Số lượng nhân công. Càng có nhiều người thì càng rút ngắn được thời gian nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
1793 = "「Vâng.」"
# 【日々姫】
# display as 日日姬
# JP: 「お金も、技術も設備も、十分な人と人脈があれば、\nどうとでもなる問題じゃない？」
1928 = "「Tiền bạc, kỹ thuật hay thiết bị, chỉ cần có đủ người và mối quan hệ, thì vấn đề nào cũng giải quyết được hết đúng không?」"
# monologue
# JP: なるほど。\n幾分、理解できたかもしれません。
2290 = "Ra là vậy.\nCó lẽ tôi đã phần nào hiểu được ý chị ấy."
# 【ハチロク】
# display as 八六
# JP: 「それは……\n今一度、毛利の[あき,1]安芸様を頼るということですか？」
1978 = "「Chuyện đó…… Ý chị là chúng ta sẽ lại nhờ cậy ngài Aki nhà Mori một lần nữa sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「安芸様もきっと頼りになるよね。\nけど、もっと頼りになる人たちがいるじゃない」
1680 = "「Ngài Aki chắc chắn cũng rất đáng tin cậy rồi. Nhưng mà, chẳng phải chúng ta còn có những người đáng tin cậy hơn sao.」"
# monologue
# JP: 言いながら、日々姫は自分の胸を親指で指し示します。
2777 = "Vừa nói, chị Hibiki vừa dùng ngón cái chỉ vào ngực mình."
# monologue
# JP: そしてその手を大きく広げ――\nあたりを、ぐるりと見渡します。
2603 = "Sau đó dang rộng hai tay――\nvà nhìn quanh một vòng."
# 【日々姫】
# display as 日日姬
# JP: 「[この子,3]8620はさ、たくさんの人を喜ばせたでしょ？\n“[ハチロク,3]8620運転台通信”も、もっとたくさんに読まれてる」
1556 = "「\\x%l8620;#00ffc040;8620%l;#; đã mang lại niềm vui cho rất nhiều người đúng không? \"Bản tin buồng lái \\x%l8620;#00ffc040;8620%l;#;\" cũng đang được rất nhiều người đọc nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1629 = "「啊——」" 
# 【日々姫】
# display as 日日姬
# JP: 「御一夜の人たちと、観光に来てくれた人たちと――\n[この子,3]8620を好きな人、思ってるよりたくさんいるよ？」
1710 = "「Những người dân Ohimitera, những vị khách đến tham quan―― Có nhiều người yêu mến \\x%l8620;#00ffc040;8620%l;#; hơn em nghĩ đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら――募金とボランティアを？」
1983 = "「Nếu vậy thì――chúng ta sẽ quyên góp và kêu gọi tình nguyện viên sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「ん。にぃに――兄さんはその方向で考えてるみたい。\nそれじゃ足りないっていって、まだ悩んでもいたけど」
1646 = "「Ừm. Anh hai――anh trai có vẻ đang suy nghĩ theo hướng đó. Dù anh ấy vẫn đang đau đầu vì cho rằng nhiêu đó là chưa đủ.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様は……最初からそこまでを考えて？」
2011 = "「Ngài Soutetsu…… đã tính xa đến mức đó ngay từ đầu rồi sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「でしょ？　にぃにだもん。\n[この子,3]8620のことも、見捨てたりとか、絶対しないよ」
1784 = "「Đúng không? Vì là anh hai mà. Anh ấy tuyệt đối sẽ không bao giờ bỏ rơi \\x%l8620;#00ffc040;8620%l;#; đâu.」"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;のことも――\nああ、左様です。双鉄さまは、きっと、誰のことさえも。
2773 = "Ngay cả \\x%l8620;#00ffc040;8620%l;#; cũng―― A, đúng vậy. Ngài Soutetsu, chắc chắn sẽ không bỏ rơi bất kỳ ai."
# monologue
# JP: 嬉しくて。ほっとして。\nけれど、少し――ほんの少しだけ、口惜しいです。
2350 = "Thật vui. Thật nhẹ nhõm. Nhưng mà, tôi cũng cảm thấy hơi――một chút xíu thôi, hơi hối hận."
# 【ハチロク】
# display as 八六
# JP: 「でしたら……最初からそうとおっしゃってくだされば」
1770 = "「Nếu vậy…… giá như ngài ấy nói cho em biết ngay từ đầu.」"
# 【日々姫】
# display as 日日姬
# JP: 「なんか行き違っちゃったの？」
1745 = "「Hai người có hiểu lầm gì nhau à?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。そうですね……\nただの、行き違いのようですね」
1788 = "「Vâng. Đúng vậy nhỉ…… Có vẻ chỉ là một sự hiểu lầm thôi ạ.」"
# monologue
# JP: 日々姫と話すと、混乱が整頓されていきます。
2701 = "Nói chuyện với chị Hibiki, sự hỗn loạn trong tôi dần được sắp xếp lại."
# monologue
# JP: いえ、きっと――日々姫は強く意識して、\nわたくしを、落ち着けようとしてくれているのでしょう。
2232 = "Không, chắc chắn là――chị Hibiki đang cố tình, làm vậy để giúp tôi bình tĩnh lại."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様がおっしゃったのです。『鉄道事故が怖い』と。\nそれでわたくし、責められたように受け取ってしまって」
2014 = "「Ngài Soutetsu đã nói là. 'Tôi rất sợ tai nạn đường sắt'. Nên em cứ tưởng ngài ấy đang trách mắng em.」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　ちょっ、待っ――にぃにが言ったと？\n『鉄道事故が怖い』って――」
1615 = "「Hả!? Chờ, chờ đã――anh hai nói vậy á? 'Rất sợ tai nạn đường sắt' á――」"
# 【ハチロク】
# display as 八六
# JP: 「はい。確かに」
1799 = "「Vâng. Đúng là vậy ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「それでハチロクはにぃに――んんっ――兄さんに……」
1988 = "「Rồi sau đó Hachiroku đã làm gì với anh hai――ưm――anh trai……」"
# monologue
# JP: 数秒――十秒――長い沈黙。
2247 = "Vài giây――Mười giây――Một sự im lặng kéo dài."
# monologue
# JP: 日々姫は困ったような息を吐き、\nわたくしを、じっと見つめなおします。
2501 = "Chị Hibiki thở hắt ra một hơi như thể đang bối rối, rồi lại nhìn chằm chằm vào tôi."
# 【日々姫】
# display as 日日姬
# JP: 「なんで鉄道事故が怖いか――\nハチロク、ちゃんと、にぃにぃに聞いたと？」
1827 = "「Tại sao lại sợ tai nạn đường sắt―― Hachiroku, em đã hỏi anh hai cho đàng hoàng chưa?」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ――いいえ――」
1469 = "「Chưa ạ――chưa ạ――」"
# monologue
# JP: 日々姫の瞳。\n怖いくらいに真剣に、まっすぐ、わたくしを捉えます。
2502 = "Ánh mắt của chị Hibiki. Nghiêm túc đến đáng sợ, nhìn thẳng vào tôi."
# 【ハチロク】
# display as 八六
# JP: 「聞くもなにも――事故が怖いなど、当然で――っ！」
1974 = "「Hỏi han gì chứ――sợ tai nạn là chuyện đương nhiên mà――!」"
# monologue
# JP: 当然のこと。\n当然のことは、当然だから、誰も、口になどしはしません。
2628 = "Là chuyện đương nhiên. Những chuyện đương nhiên, vì nó là đương nhiên, nên chẳng ai nói ra cả."
# monologue
# JP: なのにあえて、\n“当然”を、わざわざ言葉にするのなら――
2609 = "Thế mà lại cố tình, cất công nói ra hai chữ \"đương nhiên\" đó thì――"
# 【ハチロク】
# display as 八六
# JP: 「あるの――ですね？\n双鉄様には、鉄道事故を恐れる、特別な理由が」
2015 = "「Chắc chắn là――có đúng không ạ? Ngài Soutetsu có một lý do đặc biệt nào đó để sợ hãi tai nạn đường sắt.」"
# monologue
# JP: 予測機能を、遮断してしまいたくなります。
2429 = "Tôi muốn ngắt luôn chức năng dự đoán của mình."
# monologue
# JP: その理由を類推することは、大きな不具合に繋がりそうで\n――けれどもだから、知らなければと認識します。
2708 = "Việc suy luận ra lý do đó, có vẻ sẽ dẫn đến một sự cố lớn ――Nhưng cũng chính vì vậy, tôi nhận ra mình cần phải biết."
# 【ハチロク】
# display as 八六
# JP: 「わたくしに、その理由を教えてください」
1917 = "「Xin chị hãy cho em biết lý do đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにの口から――\nそれば、ちゃんと聞かねばいけんよ」
1966 = "「Từ chính miệng anh hai―― Em phải nghe đàng hoàng từ anh ấy mới được.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様から……直接に」
1850 = "「Từ ngài Soutetsu…… trực tiếp nghe sao.」"
# monologue
# JP: それは怖いと――\n明確な理由が無いのに、認識します。
2515 = "Thật đáng sợ―― Dù không có lý do rõ ràng, nhưng tôi vẫn nhận thức được điều đó."
# monologue
# JP: お会いし、お伺いしたいのに――
2434 = "Dù muốn gặp và muốn hỏi ngài ấy――"
# 【日々姫】
# display as 日日姬
# JP: 「行き違いなんて、あって当然のことやけん」
1537 = "「Hiểu lầm nhau thì cũng là chuyện bình thường thôi mà.」"
# 【ハチロク】
# display as 八六
# JP: 「！？」
# 2026 = "「！？」" 
# monologue
# JP: どうして日々姫には、わたくしの不安がわかるのでしょう。\nどうして日々姫は、わたくしを助けてくれるのでしょう。
2597 = "Tại sao chị Hibiki lại thấu hiểu được sự bất an của tôi nhỉ. Tại sao chị Hibiki lại giúp đỡ tôi nhỉ."
# 【日々姫】
# display as 日日姬
# JP: 「行き違いば怖がってたら、\nにぃにと、二度と話ばできんよーになっとよ？」
1901 = "「Nếu cứ sợ hiểu lầm, thì em sẽ không bao giờ nói chuyện lại được với anh hai nữa đâu đấy?」"
# 【ハチロク】
# display as 八六
# JP: 「それは――」
1957 = "「Chuyện đó――」"
# monologue
# JP: 明確な理由のもとでの、当然に予測できる結末。\n――そのような未来、絶対に迎えたくありません。
2765 = "Một kết cục hoàn toàn có thể dự đoán được dựa trên những lý do rõ ràng. ――Một tương lai như vậy, tôi tuyệt đối không muốn đón nhận."
# monologue
# JP: でしたら、わたくしは……\nわたくしが行うべきは、ひとつです。
2474 = "Nếu vậy thì, em……\nViệc em nên làm, chỉ có một thôi."
# 【ハチロク】
# display as 八六
# JP: 「ありがとう。日々姫。\nでしたらわたくし――双鉄様に、お伺いしてまいります」
1919 = "「Cảm ơn chị. Chị Hibiki. Nếu vậy thì em――sẽ đi hỏi ngài Soutetsu đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん。それがよかとよ」
1645 = "「Ừm. Như vậy là tốt nhất đấy.」"
# monologue
# JP: 日々姫が笑って。\n笑っているのに、どこか少しだけ寂しそうで。
2505 = "Chị Hibiki mỉm cười. Dù đang cười, nhưng trông chị ấy lại có vẻ hơi buồn bã."
# monologue
# JP: その理由を――わたくしは、\n聞いてはいけないものだと、何故か、認識します。
2226 = "Lý do cho điều đó――không hiểu sao tôi lại nhận ra rằng, đó là điều mà mình không nên hỏi."
# 【ハチロク】
# display as 八六
# JP: 「ありがとう、日々姫」
1920 = "「Cảm ơn chị, chị Hibiki.」"
# monologue
# JP: だからもう一度お礼を言って、小さく一歩を踏み出します。
2457 = "Vì vậy, tôi nói lời cảm ơn một lần nữa, rồi khẽ bước đi."
# 【ハチロク】
# display as 八六
# JP: 「わたくし――行ってまいりますね」
1474 = "「Em――đi đây.」"
