757 = "「Hí a——a——a——không——được đâu!\nBây giờ——b, bây giờ——vẫn còn——rất nhạy\ncảm, ạ!」"

# monologue
# JP: ……それでも指を動かせば、\nキツイまま応え、広がってくれる。
472 = "……Dù vậy khi tôi cử động ngón tay,\nlỗ hậu chật hẹp vẫn phản hồi lại và mở\nrộng ra."

# monologue
# JP: アナルの門の感触は、幾度触れても挿入しても、\nその度僕を感動させる。
1607 = "Cảm giác ở cửa lỗ hậu, dù có chạm vào hay\nđút vào bao nhiêu lần đi chăng nữa,\nlần nào cũng khiến tôi cảm động."

# 【双鉄】
# display as 雙鐵
# JP: 「それとも――」
942 = "「Hay là——」"

# 【ハチロク】
# display as 鈴
# JP: 「ああっ」
# 800 = "「啊啊」" 

# monologue
# JP: 期待に震え濡れている声。\nそれに応えて、再び中指を大きく伸ばす。
1265 = "Giọng nói ướt át run rẩy vì mong đợi.\nĐáp lại điều đó, tôi lại đưa ngón giữa vào\nsâu hơn."

# 【ハチロク】
# display as 鈴
# JP: 「っ！　（ごくっ）」
814 = "「っ! （Ực）」"

# monologue
# JP: 加えて、人差し指も添えれば、\nすずははっきり、喉を鳴らして息を呑み込み唾を飲む。
1233 = "Thêm vào đó, khi tôi đưa thêm cả ngón trỏ\nvào,\nSuzu rõ ràng đã kêu lên trong cổ họng, nín\nthở và nuốt nước bọt."

# 【双鉄】
# display as 雙鐵
