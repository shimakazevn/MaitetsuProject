1329 = "Hòa tan tất cả những thứ đó lại với nhau, chính vì hòa quyện sâu sắc đến thế, nên Suzu và tôi mới trở nên nổi bật."
# monologue
# JP: （ばちゅっ！　じゅぶっ！　じゅばっ！　ばちゅんっ！）
1849 = "（Bạch! Nhóp nhép! Phập! Bạch!）"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまっ！　だんな、さまっ――んあっ！！！」
970 = "「Ngài Soutetsu! Phu quân——ưm a!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「すずっ――すずっ！！！」
949 = "「Suzu——Suzu!!!」"
# monologue
# JP: （じゅぼおおおおおおおおおおおおおおおっっっ！！）
1863 = "（Nhóp nhéppppppppppppppppp!!）"
# 【ハチロク】
# display as 鈴
# JP: 「んゅ――ぁぁぁああああぁぁぁぁぁぁあああああっ！」
842 = "「Ưm——aaaaaAAAAAAaaaaAAAAA!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
804 = "「っ!」"
# monologue
# JP: （びゅぶっ！　どびゅっ！　どびゅる！　ばちゅん！）
1890 = "（Phụt! Phụt! Phụt! Bạch!）"
# 【ハチロク】
# display as 鈴
# JP: 「ぁっ――ぁっ――ぁっ――ぁっ――」
# 784 = "「啊——啊——啊——啊——」" 
# monologue
# JP: （びゅうっ！　びゅるっ！　どびゅっ！　びゅびゅ！）
1887 = "（Phụt! Phụt! Phụt! Phụt phụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「しゅごい――の、あちゅい――のッ――はぁ――\nかっ――はっ――おなか――しきゅう――ぶつかっ、て」
856 = "「Sướng——quá, nóng——quá——haa—— ha——ha——bụng——tử cung——bị chạm, vào」"
# monologue
# JP: （びゅっ！　どびゅっ！　ビュルっ！　どぴゅんっ！）
1892 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「せいえき――精液……そうてつ、様の――あかちゃんの、\nたね――しきゅうに――あたって――とぷとぷ、って」
929 = "「Tinh dịch——tinh dịch……của Ngài Soutetsu——hạt giống, của em bé——chạm vào——tử cung——ùng ục, ùng ục」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁ」
# 796 = "「啊」" 
# monologue
# JP: すずを、満たした。\nこの上もなく、満たされた。
1669 = "Đã thỏa mãn Suzu.\nThỏa mãn tột cùng."
# monologue
# JP: のに――
1193 = "Vậy mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
477 = "「っ——」"
# 【ハチロク】
# display as 鈴
# JP: 「あ――　双鉄さま」
786 = "「A——Ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、れ？」
751 = "「Ủa?」"
# monologue
# JP: なぜかは知らねど、視界がゆがむ。
1274 = "Không hiểu vì sao, tầm nhìn của tôi lại nhòe đi."
# 【ハチロク】
# display as 鈴
# JP: 「……双鉄様」
486 = "「……Ngài Soutetsu」"
# monologue
# JP: （ぎゅっ）
1916 = "（Ôm chặt）"
# monologue
# JP: すずに抱かれる。抱きしめられる。\n優しい指が、そうっと僕の頬の涙を掬ってくれる。
1660 = "Được Suzu ôm lấy. Ôm chặt lấy. Những ngón tay dịu dàng nhẹ nhàng lau đi giọt nước mắt trên má tôi."
# 【双鉄】
# display as 雙鐵
# JP: （ああ……僕は――泣いているのか）
1845 = "（Aa……mình đang——khóc sao）"
# monologue
# JP: 泣いている理由がわからないまま。\nその事実だけを理解する。
1402 = "Dù không hiểu lý do vì sao mình lại khóc. Tôi chỉ hiểu được sự thật đó."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄、さま」
967 = "「Ngài, Soutetsu」"
# monologue
# JP: 優しい呼び声。\nそして、沈黙。
1291 = "Tiếng gọi dịu dàng.\nVà rồi, là sự im lặng."
# monologue
# JP: 自分の鼓動が暗闇の中響きわたって、\nすずの鼓動と――ごくごく自然に思ってしまう。
1466 = "Nhịp tim của chính mình vang vọng trong bóng tối, tôi hoàn toàn tự nhiên nghĩ rằng——đó là nhịp tim của Suzu."
# 【ハチロク】
# display as 鈴
# JP: 「思い出されて……しまいましたか？\nわたくしが、時を遡らせて」
869 = "「Ngài đã……nhớ lại rồi sao? Là do em đã làm thời gian quay ngược lại」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁ――」
# 779 = "「啊——」" 
# monologue
# JP: そうなのかも――いや、そうなのだろう。\nすずはそこまで、僕をわかって……許してくれる。
1251 = "Có lẽ là vậy——không, chắc chắn là vậy rồi. Suzu hiểu tôi đến thế……và tha thứ cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: （あの事故がなかったのなら――\n僕とすずとは――決して……出会ってさえいなかった）
1904 = "（Nếu không có vụ tai nạn đó—— Tôi và Suzu——chắc chắn……đã không bao giờ gặp nhau）"
# monologue
# JP: 今更ながらの、\nいや……今までは、目をつぶっていた真実を。
1182 = "Dù đã muộn màng, không……đó là sự thật mà cho đến nay tôi vẫn luôn nhắm mắt làm ngơ."
# monologue
# JP: すずの衣装のせいなのか、僕の心が変化したのか、\nなぜだか、今日は思ってしまって。
1253 = "Do trang phục của Suzu, hay do trái tim tôi đã thay đổi, không hiểu sao, hôm nay tôi lại nghĩ đến điều đó."
# 【ハチロク】
# display as 鈴
# JP: 「大丈夫です。双鉄様」
916 = "「Không sao đâu ạ. Ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 796 = "「啊」" 
# monologue
# JP: くちびるに、やわらかな甘みが押し付けられて。\nだから自然と……それを唇に含んでる。
1527 = "Vị ngọt mềm mại áp vào môi tôi. Vì vậy tôi tự nhiên……ngậm lấy nó bằng môi mình."
# monologue
# JP: （チュッ――ちゅう――ちゅうっ――ちゅむっ――）
1852 = "（Chụt——chụt——chụt——chụt——）"
# 【ハチロク】
# display as 鈴
# JP: 「……全て、双鉄様の望まれるまま。\nわたくしは――ハチロクは。ただ、それだけが望みです」
480 = "「……Tất cả, đều theo ý nguyện của Ngài Soutetsu. Em——Hachiroku. Đó là mong muốn duy nhất của em」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
975 = "「っ!!」"
# monologue
# JP: ハチロクと。\nすずは自分を、そう呼んだ。
1229 = "Hachiroku.\nSuzu đã gọi mình như vậy."
# monologue
# JP: 肉体はゼロ距離においたまま――\nけれど、心を、あえて僕から、半歩離した。
1606 = "Cơ thể vẫn giữ ở khoảng cách số không—— Nhưng, trái tim lại cố tình lùi xa tôi nửa bước."
# 【双鉄】
# display as 雙鐵
# JP: 「すず」
# 953 = "「鈴」" 
# monologue
# JP: だから、呼ぶ。\n僕だけの名を、愛おしい名を。
1491 = "Vì vậy, tôi gọi. Cái tên của riêng tôi, cái tên vô cùng đáng yêu."
# monologue
# JP: 過去の傷さえ、形を違えて、けれども僕らは共有し。\nだから傷つき。それだからこそ許しあえると、また知って。
1655 = "Dù hình dạng có khác nhau, nhưng chúng tôi cùng chia sẻ vết thương quá khứ. Vì thế mà tổn thương. Nhưng cũng chính vì thế, tôi lại biết rằng chúng tôi có thể tha thứ cho nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「すず――（はむっ）」
950 = "「Suzu——（Ngoạm）」"
# 【ハチロク】
# display as 鈴
# JP: 「んっ！」
# 846 = "「嗯！」" 
# monologue
# JP: 乳首を咥える。
1418 = "Ngậm lấy nhũ hoa."
# monologue
# JP: 今度は甘えるためだけではなく、\nすずを感じさせてあげるためにも。
1396 = "Lần này không chỉ để làm nũng, mà còn để cho Suzu cảm nhận được."
# monologue
# JP: （チュッ――ちゅむっ――ちゅうっ――ちゅっ）
1858 = "（Chụt——chụt——chụt——chụt）"
# 【ハチロク】
# display as 鈴
# JP: 「んふ……ふっ――元気に――なられ、ました、ね」
835 = "「Ưm phu……phù——Ngài đã——khỏe lại, rồi, nhỉ」"
# monologue
# JP: （さすっ）
1936 = "（Xoa xoa）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 778 = "「唔！」" 
# monologue
# JP: 触れられ、気づく。\n勃起は硬度を取り戻してる。
1633 = "Bị chạm vào, tôi mới nhận ra. Côn thịt đã lấy lại được độ cứng."
# monologue
# JP: 心同様、すずが欲しいと。すずとの未来を望んでいると。\n雄々しく聳え、天さえ割らんと咆哮している。
1464 = "Giống như trái tim tôi, nó muốn Suzu. Nó khao khát tương lai cùng Suzu. Nó vươn lên mạnh mẽ, gầm thét như muốn xé toạc cả bầu trời."
# 【ハチロク】
# display as 鈴
# JP: 「もう一度だけ、ぴゅっぴゅして。\nそれからゆっくり――くっつきあって、休みましょう」
709 = "「Chỉ một lần nữa thôi, ngài hãy xuất tinh đi. Sau đó chúng ta từ từ——ôm lấy nhau, và nghỉ ngơi nhé」"
# monologue
# JP: （しゅこ――しにゅっ）
1899 = "（Tuốt——nhóp nhép）"
# 【双鉄】
# display as 雙鐵
# JP: （ああ……）
1846 = "（Aa……）"
# monologue
# JP: 甘く、ゆるやかにしごかれる。\n唇をゆるく動かして、甘く静かに、乳首をしゃぶる。
1315 = "Được vuốt ve một cách ngọt ngào và chậm rãi. Tôi cử động môi nhẹ nhàng, mút lấy nhũ hoa một cách ngọt ngào và tĩnh lặng."
# 【双鉄】
# display as 雙鐵
# JP: （チュッ――ちゅむっ――ちゅううっ――チュッ――）
1857 = "（Chụt——chụt——chụttttt——chụt——）"
# 【ハチロク】
# display as 鈴
# JP: 「ん……双鉄――さま――あ……おちん、ちん……ね？\nいいこ――いいこで……かわいい……かわいい」
828 = "「Ưm……Ngài——Soutetsu——a……côn, thịt……nhỉ? Ngoan nào——ngoan nào……đáng yêu quá……đáng yêu quá」"
# monologue
# JP: （しこ――しこ――しゅこ――しゅこっ――）
1920 = "（Tuốt——tuốt——tuốt——tuốt——）"
# monologue
# JP: おだやかに、お互いの熱を交換しながら、\nじわじわ、ゆるゆる、たかまっていく。
1411 = "Êm đềm, vừa trao đổi hơi ấm cho nhau, vừa chầm chậm, từ từ, đẩy lên cao trào."
# 【双鉄】
# display as 雙鐵
# JP: （ちゅっ――ちゅぱっ――ちゅううっ――ちゅうううっ）
1854 = "（Chụt——chu pa——chụttttt——chụttttt）"
# monologue
# JP: 出るわけがないとわかっていても、\n母乳を飲みたいような気がして、乳首を強く吸ってしまう。
1467 = "Dù biết là không thể nào có sữa, nhưng tôi vẫn có cảm giác muốn uống sữa mẹ, nên đã mút mạnh nhũ hoa."
# 【ハチロク】
# display as 鈴
# JP: 「んっ――あ……双鉄……さま……ふ――ぁ――ん、\n大丈夫……です……よ？　いいこ……ね？　いいこ……」
816 = "「Ưm——a……Ngài……Soutetsu……hu——a——ưm, Không sao……đâu……ạ? Ngoan nào……nhé? Ngoan nào……」"
# monologue
# JP: いいこ……いいこ。\nいい子。いい子。
1323 = "Ngoan nào……ngoan nào.\nBé ngoan. Bé ngoan."
# monologue
# JP: その単純な響きが僕を、どうしようもないバカにする。
1261 = "Âm thanh đơn giản đó biến tôi thành một kẻ ngốc không thể cứu chữa."
# monologue
# JP: このまま溺れてしまいたい。すずの赤ちゃんになりたいと。\nそんな愚かな欲望が――っ！？
1433 = "Tôi muốn cứ thế này mà chìm đắm mãi. Tôi muốn trở thành em bé của Suzu. Cái ham muốn ngu ngốc đó——!?"
# 【ハチロク】
# display as 鈴
# JP: 「いいこ――いいこ、ね？　双鉄さま。わたくしの、\nわたくしだけの大事な大事な――いとおしい方」
698 = "「Ngoan nào——ngoan nào, nhé? Ngài Soutetsu. Người thương, người thương vô cùng quan trọng——của riêng mình em」"
# monologue
# JP: （なで――なで――さす――さす）
1935 = "（Xoa——xoa——vuốt——vuốt）"
# 【双鉄】
# display as 雙鐵
# JP: （すず……）
1947 = "（Suzu……）"
# monologue
# JP: 僕の頭を支えてる、\n左手はやさしく、ただただやさしく撫でながら。
1292 = "Đỡ lấy đầu tôi, bàn tay trái nhẹ nhàng, chỉ nhẹ nhàng vuốt ve."
# monologue
# JP: （しこ――しこ――しゅこ――しゅこ――）
1805 = "（Tuốt——tuốt——tuốt——tuốt——）"
# monologue
# JP: けれども右手は、勃起をすごいてくれている。\n男の僕を、大人の僕を、励まし慰めてくれている。
1198 = "Nhưng bàn tay phải lại đang tuốt lấy côn thịt. Đang khích lệ và an ủi tôi, một người đàn ông, một người trưởng thành."
# monologue
# JP: 溺れることも立ち上がることも許されている。待たれてる。\nすずはいつでも――僕の全てをまるごと全部認めてくれる。
1156 = "Được phép chìm đắm, cũng được phép đứng lên. Được chờ đợi. Suzu lúc nào cũng——chấp nhận toàn bộ mọi thứ của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「すず」
# 953 = "「鈴」" 
# monologue
# JP: だから、乳首を口から離す。\n僕の言葉で――はっきり願いをすずに伝える。
1495 = "Vì vậy, tôi rời miệng khỏi nhũ hoa. Bằng lời nói của mình——tôi truyền đạt rõ ràng mong muốn của mình cho Suzu."
# 【双鉄】
# display as 雙鐵
# JP: 「その手で、射精させてくれ。\n僕の濁りを――根こそぎ、絞り出してくれ」
881 = "「Hãy dùng bàn tay đó, làm anh xuất tinh đi. Hãy vắt kiệt——toàn bộ sự vẩn đục của anh ra đi」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。かしこまりした双鉄様――\nわたくしの愛しい、旦那様」
830 = "「Vâng. Em hiểu rồi, Ngài Soutetsu—— Phu quân đáng yêu của em」"
# monologue
# JP: （しゅこんっ！）
1926 = "（Tuốt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 804 = "「啊！」" 
# monologue
# JP: すずの手指に、力がこもる。\n母の優しいなでなでが、一瞬にして姿を変える。
1663 = "Ngón tay của Suzu dùng lực. Sự vuốt ve dịu dàng của người mẹ, trong nháy mắt đã thay đổi dáng vẻ."
# monologue
# JP: 欲を隠さぬ女の動きに、\n精を絞りとり満ちようとする、激しくも甘いシコシコへ。
1294 = "Biến thành chuyển động của một người phụ nữ không che giấu dục vọng, những cú tuốt lột mãnh liệt nhưng ngọt ngào, cố gắng vắt kiệt tinh dịch để thỏa mãn."
# 【ハチロク】
# display as 鈴
# JP: 「たくさん、ん――ぴゅっぴゅ――して、ください、ね？\nあなたの――すず、の――しこ、しこ――おてて、で」
859 = "「Xin ngài hãy, ưm——xuất thật nhiều——ra, nhé? Bằng bàn tay——tuốt, tuốt——của Suzu——của ngài」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
978 = "「っ!?」"
# monologue
# JP: （しこっ！　しゅこっ！　しゅこんっ！　しゅこっ！）
1923 = "（Tuốt! Tuốt! Tuốt! Tuốt!）"
# monologue
# JP: 手指は激しく僕の男を猛らせて、\nけれども声は、いまだに赤子をあやすごときに。
1301 = "Những ngón tay mãnh liệt kích thích sự nam tính của tôi, nhưng giọng nói thì vẫn như đang dỗ dành một đứa trẻ."
# 【ハチロク】
# display as 鈴
# JP: 「おちんちん、かわいちんちん、しこ、しこ、しこしこ。\nしゅこ、しゅこ――ぴゅぴゅのために、しこしこしゅこ」
861 = "「Côn thịt nhỏ, côn thịt đáng yêu, tuốt, tuốt, tuốt tuốt. Tuốt, tuốt——để xuất tinh, tuốt tuốt tuốt」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁああっ！」
# 801 = "「啊啊！」" 
# monologue
# JP: 耳から脳へと来る情報と、体が受けている刺激との、\n激しいギャップに混乱させられ、性感がより研ぎ澄まさる。
1593 = "Sự khác biệt mãnh liệt giữa thông tin truyền từ tai lên não và kích thích mà cơ thể đang nhận, khiến tôi bối rối, và khoái cảm càng trở nên nhạy bén hơn."
# monologue
# JP: （しゅこっ！　ちゅぼっ！　じゅにっ！　じにゅっ！）
# 1923 = "（捋！捋！捋！捋！）" 
# 【ハチロク】
# display as 鈴
# JP: 「先ばしり、じる――どろどろ――で……んっ――\nわたくし――おてて――おまん、まん――みたい、で」
972 = "「Chất dịch, rỉ ra——sền sệt——……ưm—— bàn tay——của em——giống như——tiểu huyệt, vậy」"
# monologue
# JP: （じゅぼっ！　じゅぶっ！　じゅちゅっ！　じゅこっ！）
1865 = "（Nhóp nhép! Nhóp nhép! Chụt chụt! Chụt chụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「おてて、まんまん――しこ、しこ――しゅこ、しゅこ！\nぴゅっぴゅ、もうすぐ――我慢、しないで、おちんちん」
890 = "「Bàn tay, giống như tiểu huyệt——tuốt, tuốt——tuốt, tuốt! Sắp xuất tinh——rồi——đừng, nhịn nữa nhé, côn thịt nhỏ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅっ――あっ！」
811 = "「Ư——a!」"
# monologue
# JP: （じゅぼっ！　しゅこん！　じゅぼっ！　しこおおっ！）
1866 = "（Nhóp nhép! Tuốt! Nhóp nhép! Tuốttttt!）"
# monologue
# JP: すずのおててがおまんまんで、だからその中に出したくて。\nただそれだけしか思えなくなり腰を無様に動かしさえして。
1662 = "Bàn tay của Suzu giống hệt như tiểu huyệt, vì thế tôi muốn xuất tinh vào trong đó. Tôi chỉ có thể nghĩ được đến thế, thậm chí còn lóng ngóng đẩy eo tới."
# 【ハチロク】
# display as 鈴
# JP: 「おてて、まんまん――しこしこ――じゅぽじゅぽ、\n射精、ね？　たぁくさん、殿方らしく、おもいっきりに」
893 = "「Bàn tay, giống như tiểu huyệt——tuốt tuốt——nhóp nhép nhóp nhép, Xuất tinh, đi nhé? Thật nhiều, ra dáng một người đàn ông, hãy xuất ra hết đi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅあ――あっ――あっ――あっ――」
# 784 = "「啊——啊——啊——啊——」" 
# monologue
# JP: バカになってる、脳味噌ぜんぶがとろかされてる。
1436 = "Tôi trở nên ngốc nghếch rồi, toàn bộ não bộ đều đang tan chảy."
# monologue
# JP: シコシコぴゅっぴゅ、したくて、したい。\n今はそれしか、ただそれだけしか望めないっ！！
1511 = "Muốn được tuốt lột và xuất tinh, rất muốn. Bây giờ tôi chỉ mong muốn điều đó, chỉ có điều đó mà thôi!!"
# 【ハチロク】
# display as 鈴
# JP: 「しこしこ、しゅこしゅこ、ちんちんビクビク。\nぴゅっぴゅ、もうすぐ。さん、にぃ、いち――えいっ！」
894 = "「Tuốt tuốt, tuốt tuốt, côn thịt nhỏ giật giật. Sắp xuất tinh, rồi. Ba, hai, một——ây!」"
# monologue
# JP: （じゅこんっ！！！！！）
1861 = "（Tuốtttt!!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」」
# 804 = "「啊！」" 
# monologue
# JP: （んびうっ！　びゅるるっ！　どびゅう！　びゅあっ！）
1885 = "（Ưm biu! Phụt! Phụt! Phụt a!）"
# 【ハチロク】
# display as 鈴
# JP: 「あああっ！」
# 801 = "「啊啊！」" 
# monologue
# JP: （しゅこ！　こしゅっ！　みゅうっ！　ずりゅっ！！）
1922 = "（Tuốt! Tuốt! Myuu! Trơn tuột!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「！！？」
977 = "「!!?」"
# monologue
# JP: （びゅっ！　びゅるっ！　びゅうっ！　びゅぼっ！）
1894 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: 天高くへと登った精が、一瞬遅れて白く濁った雨になる。\nそれを全身に浴びながら――
1700 = "Tinh dịch phóng vọt lên trời cao, chậm một nhịp rồi hóa thành cơn mưa trắng đục. Trong khi tắm mình dưới cơn mưa ấy——"
# 【ハチロク】
# display as 鈴
# JP: 「精液――びゅっびゅっ！　もっと！　ね、もっと！！」
927 = "「Tinh dịch——xuất ra rồi! Thêm nữa đi! Nhé, thêm nữa đi!!」"
# monologue
# JP: （しこっ！　しゅこっ！　しにゅっ！！　ぐいっ！！）
1924 = "（Tuốt! Tuốt! Nhóp nhép!! Siết!!）"
# monologue
# JP: 扱く、ではなく竿を下から絞りあげ、\nすずの手指は精液全部を、僕から絞ろうとしてくれる。
1276 = "Không chỉ tuốt lột, mà còn vắt từ gốc côn thịt lên, những ngón tay của Suzu cố gắng vắt kiệt toàn bộ tinh dịch từ tôi."
# monologue
# JP: その健気さに、懸命さに、\nああ、そうなのかと今更ようやく理解する。
1298 = "Trước sự kiên cường đó, sự nỗ lực đó, aa, đến tận bây giờ tôi mới hiểu ra mọi chuyện."
# 【双鉄】
# display as 雙鐵
# JP: （不安を……すずにも――僕は、伝染させていたんだ）
1938 = "（Sự bất an……tôi đã——truyền cả sang Suzu rồi）"
# monologue
# JP: 己の未熟を痛感し、\nそれごと僕を包んでくれたすずへの愛しさがまた弾け飛ぶ。
1456 = "Tôi đau đớn nhận ra sự non nớt của bản thân, và tình yêu dành cho Suzu, người đã bao dung cho cả điều đó, lại một lần nữa bùng nổ."
# monologue
# JP: （びゅっ！　びゅるっ！！　びゅううっ！　びゅっ！！）
1896 = "（Phụt! Phụt!! Phụt! Phụt!!）"
# 【ハチロク】
# display as 鈴
# JP: 「あ……あっ――双鉄さま――双鉄……さまぁ」
789 = "「A……a——Ngài Soutetsu——Ngài Soutetsu……a」"
# 【双鉄】
# display as 雙鐵
# JP: 「すず」
# 953 = "「鈴」" 
# monologue
# JP: （ぎゅうううっ！）
1809 = "（Siết chặtttt!）"
# 【ハチロク】
# display as 鈴
# JP: 「あ」
# 796 = "「啊」" 
# monologue
# JP: すずの庇護から身を起こし、\n全身に浴びせた精液ごと、小さな体を抱きしめる。
1431 = "Tôi nhổm người dậy khỏi sự che chở của Suzu, ôm chặt lấy cơ thể nhỏ bé cùng với tinh dịch đang vương vãi khắp người em."
# 【双鉄】
# display as 雙鐵
# JP: 「もう大丈夫だ。僕も、おまえも」
863 = "「Bây giờ không sao rồi. Cả anh, và cả em nữa」"
# 【ハチロク】
# display as 鈴
# JP: 「あ――」
# 779 = "「啊——」" 
# monologue
# JP: 安堵と、脱力が混じる声。\nそうしてすずは、花のような。
1296 = "Một giọng nói lẫn lộn giữa sự nhẹ nhõm và kiệt sức. Và rồi Suzu, giống như một bông hoa."
# monologue
# JP: 月並みだけれど、それしか言葉が当てはまらない、\n花の咲くような笑みを浮かべる。
1470 = "Dù là một cách nói sáo rỗng, nhưng không có từ nào khác phù hợp hơn, em nở một nụ cười rạng rỡ như hoa nở."
# 【ハチロク】
# display as 鈴
# JP: 「はい！　双鉄様」
858 = "「Vâng! Ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、休もう。おまえが望んでくれたとおりに。\nこのまま一つに、くっつきあって」
889 = "「Vì vậy, chúng ta hãy nghỉ ngơi thôi. Đúng như những gì em đã mong muốn. Cứ thế này hòa làm một, và ôm chặt lấy nhau」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。双鉄様」
849 = "「Vâng. Ngài Soutetsu」"
# monologue
# JP: 信頼しきって。甘えきってる。\n僕とすずとは、お互いに。
1412 = "Hoàn toàn tin tưởng. Hoàn toàn làm nũng. Tôi và Suzu, cả hai đều như vậy với nhau."
# monologue
# JP: だから時折り、傷がかさぶたを突き破り、\n僕らをじくじく苛んだとて。
1222 = "Vì vậy, đôi khi, vết thương lại xé toạc lớp vảy, và rỉ máu hành hạ chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「おやすみ、すず」
909 = "「Ngủ ngon nhé, Suzu」"
# 【ハチロク】
# display as 鈴
# JP: 「おやすみなさい。いとおしいひと」
907 = "「Chúc ngài ngủ ngon. Người thương của em」"
# monologue
# JP: ともに眠って。\n夢へと過去を綴じ直し。
1149 = "Cùng nhau chìm vào giấc ngủ. Trong giấc mơ, chúng tôi sẽ thêu dệt lại quá khứ."
# monologue
# JP: 目覚めた明日を、\n手を取り合って走り出せると――知っている。
1580 = "Khi thức dậy vào ngày mai, chúng tôi biết rằng——mình có thể nắm tay nhau và cùng bước tiếp."
