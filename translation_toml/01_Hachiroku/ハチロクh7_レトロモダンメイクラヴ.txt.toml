# display as 雙鐵
# JP: （ふうっ）
1832 = "（呼）" 

# 【ハチロク】
# display as 鈴
# JP: 「きゃふぅっ！！！」
737 = "「呀嗚！！！」" 

# monologue
# JP: 尻肉の奥にすぼまっている小さな蕾に息をかければ、\nすずの背中がひくひく蠢く。
1419 = "我向屁股裡縮緊的菊穴吹氣，鈴的後背就會抽動起來。" 

# monologue
# JP: ……鎖骨、それから背骨のライン。\nそんなところまで美しいなと、今更ながらしみじみ思う。
475 = "……鎖骨、脊骨的線條。原來這些部位都可以如此美麗。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どちらが――欲しい？」
706 = "「你哪邊——想要？」" 

# monologue
# JP: （つううううううううううう――――つぷんっ！）
1818 = "（呲嗚——呲噗！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひっ――ああっ――指――おしり、にっ――」
785 = "「啊——啊啊——手指——屁股——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ここ、か――」
901 = "「是不是這裡——」" 

# monologue
# JP: アナルは、小指で。
1337 = "對肛門就用小指頭。" 

# monologue
# JP: 優しく優しく撫ぜまわした後\n先端だけを、焦らすようにして浅ぁく沈める。
1269 = "在溫柔地來回撫摸之後，我伸入指尖，用很淺的侵入刺激她。" 

# monologue
# JP: （きちぃぃぃぃぃ！）
1903 = "（好緊！）" 

# monologue
# JP: 径のあってないゴムパッキンに、\n無理やり指をねじ込むような。
1340 = "就像對直徑對不上的橡膠環硬擰進手指的感覺一樣。" 

# monologue
# JP: （くりっ――くりゅんっ！！）
1927 = "（揉——咕溜！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひあっ――あっ――あっ――らめっ――れすぅ！\nひまっ――い、いま――は、まだ――敏感、れっ！」
757 = "「咿啊——啊——啊——不行——嗚！那裡——現在——還——敏感，的！」" 

# monologue
# JP: ……それでも指を動かせば、\nキツイまま応え、広がってくれる。
472 = "……但是動一動手指，緊緻的肛門就鬆開了。" 

# monologue
# JP: アナルの門の感触は、幾度触れても挿入しても、\nその度僕を感動させる。
1607 = "肛門的觸感即便插過那麼多次還是讓我很感動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それとも――」
942 = "「還是說——」" 

# 【ハチロク】
# display as 鈴
# JP: 「ああっ」
# 800 = "「啊啊」" 

# monologue
# JP: 期待に震え濡れている声。\nそれに応えて、再び中指を大きく伸ばす。
1265 = "因為期待，她的聲音顫抖、帶著濕氣。於是我再次把中指深深插入。" 

# 【ハチロク】
# display as 鈴
# JP: 「っ！　（ごくっ）」
814 = "「嗚！（嗯）」" 

# monologue
# JP: 加えて、人差し指も添えれば、\nすずははっきり、喉を鳴らして息を呑み込み唾を飲む。
1233 = "再把食指也加上，鈴用力地吸氣、吞了口口水。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こちらか？」
902 = "「是不是這邊？」" 

# monologue
# JP: （づっ）
1830 = "（呲）" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ！？」
808 = "「啊！？」" 

# monologue
# JP: あえての、第一関節まで。\nそこまで挿れて動きを止めれば、すずの視線が縋ってくる。
1416 = "我只插入第一關節。插到這麼多我就停下，鈴的眼睛睜得是那麼大。" 

# monologue
# JP: だが、動かない。\nすずのさっきの自分を恥じてか、汗を流して我慢する。
1200 = "但是我卻一動不動。她大汗直流，可能是為剛剛的自己而害羞吧。" 

# 【ハチロク】
# display as 鈴
# JP: 「はぁっ――はぁっ――はぁっ――はぁっ――」
784 = "「啊——啊——啊——啊——」" 

# monologue
# JP: すずの荒いだ吐気を聞くたび、\n勃起はビクビク暴れてしまう。
1539 = "每次聽到她慌張的呼吸，肉棒都會發起瘋來。" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ……（ごくっ）――ふぅ……ふぅ――ふぅ、ふぅ」
795 = "「啊……（嗯）——嗚……嗚——嗚，嗚」" 

# monologue
# JP: すずにも確認できたのだろうか？\n視線が股間に釘付けとなり、荒い呼吸が早くなる。
1277 = "她也感覺到了嗎？她緊緊盯著自己的下胯，呼吸的節奏更快了。" 

# monologue
# JP: （くちいっ！）
1876 = "（嗚吱！）" 

# 【ハチロク】
# display as 鈴
# JP: 「っ！！！」
976 = "「！！！」" 

# monologue
# JP: 腰が、動いた。\n水音が示した事実に、すずはいやいやと首を振り――
1306 = "她的腰動了起來。水聲昭示著事實，鈴卻連連搖頭——" 

# monologue
# JP: それからきゅっと口を結んで、\n振り絞るような声をだす。
1557 = "然後她緊緊地閉上嘴，從喉嚨裡擠出了聲音。" 

# 【ハチロク】
# display as 鈴
# JP: 「はしたない……おんなと……どうか、どうか……\nご軽蔑、なさらないで……ください、まし――ね？」
965 = "「雖然我是……下流的女人……可不要……太看不起我……好嗎——？」" 

# monologue
# JP: （にゅぽっ）
1870 = "（啾噗）" 

# 【ハチロク】
# display as 鈴
# JP: 「んっ！！」
847 = "「嗯！！」" 

# monologue
# JP: それだけ聞けば、答えの全てを聞いたももはや同然で。
1596 = "聽過這一句話，就等於聽過了所有的答案。" 

# monologue
# JP: けれども、口で言って欲しくて、\nすずの膣から指を抜く。
1202 = "但是我想聽她親口說出來，所以從陰道裡拔出了手指。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おまえに答えを強いている――\n僕の方がよほど、はしたなく、浅ましい男だろうさ」
865 = "「強迫著你回答的我——是比你更下流，可恥的男人啊」" 

# 【ハチロク】
# display as 鈴
# JP: 「でしたら……どうか――双鉄様。\nわたくしと、あなたの妻と……ともに、底まで。奈落まで」
944 = "「那……那就——雙鐵少爺。和我、和您的妻子一起……做到底、做到地獄吧」" 

# monologue
# JP: （くぱああっ）
1850 = "（啵）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 974 = "「！」" 

# 【ハチロク】
# display as 鈴
# JP: 「わたくし……おまた……おまん、まん……でも」
883 = "「我的……大腿……小妹妹……但是」" 

# monologue
# JP: すずの言葉に震えるように、何度セックスを重ねても、\n色を濁らせぬピンクの膣が、ひくつき僕を誘ってくる。
1667 = "鈴的言詞顫抖，反覆幾次做愛下，陰道的顏色依然桃紅，抽動著勾引我的進入。" 

# 【ハチロク】
# display as 鈴
# JP: 「それ……から……こちら――んっ」
920 = "「然後……這邊也——」" 

# monologue
# JP: （むにいいいっ）
1928 = "（揉搓）" 

# monologue
# JP: 尻肉を手で寄せ動かして、すずは自ら、アナルを晒す。\n食べた石炭燃え残り――フライアッシュを排出するだけ。
1443 = "我揉了揉她的屁股，她就主動露出了肛門。將吃下並燃燒完的石炭——即煤灰排出用的肛門。" 

# monologue
# JP: その目的で設けられているのであろう、\n人のものよりよほど清潔で未熟なアナルを。
1541 = "比起人類要清潔、幼嫩多的肛門。" 

# 【ハチロク】
# display as 鈴
# JP: 「わたくし……の……お尻……はぅっ……そ、その――\nアナル、でも……わたくし、わたくし――双鉄、様、を」
885 = "「我的……屁股……啊嗚……那、那個——肛門……我、我也要——雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 800 = "「啊啊」" 

# monologue
# JP: 待たない。待てない。\n一気に貫く！
1579 = "等不了、也等不下去了。我一口氣貫穿進去！" 

# monologue
# JP: （みちいいいいいいいいいいいいいいいいいっ！！！！）
1811 = "（吱嚕——！！！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「い"ぎゅっっっっっ！？」\n761 = "「咿啊！？」" \n\n# monologue\n# JP: すずらしからぬ、まるで獣の悲鳴のような――\n自分の制御を完全に、できずに漏らしてしまってる声。\n1665 = "鈴的聲音彷彿野獸的慘叫，完全不像她——她控制不住自己，才發出了這樣的聲音。" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「か……は……あっ――ぐっ――んっ――そ――ん、な、\nいき、なり――いき――なりッ――んきゅうう！！？」\n745 = "「呃……啊——咕——嗯——那樣——的，突然——就——就——嗯啊——！！？」" \n\n# monologue\n# JP: （ずろおおおおおおおおおお！！！）\n1826 = "（呲嚕——！！！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「っ！！！！！！！！！！」\n807 = "「啊！！！！！！！！！！」" \n\n# monologue\n# JP: 根本まで、アナルにみっちり埋めた勃起を、\nずろずろぞろと、抜けるぎりぎりまで引き抜いてやる。\n1604 = "肉棒連根插入肛門，再一點點拔出到極限的位置。" \n\n# monologue\n# JP: すずは敷布に顔をうずめんばかりに頭を激しく振り乱し、\n恐らく強すぎる性感に、呼吸までもを怪しくしている。\n1657 = "鈴把臉幾乎要埋在床單裡，激烈地搖著頭，恐怕太強的性刺激，讓她呼吸都不對勁了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: （いきなりなどで――あるものか――っ！）\n1842 = "（哪有什麼突然不突然的——！）" \n\n# monologue\n# JP: この快感を得るために、すずをぐちょぐちょに乱すため、\nどれほど勃起をなだめてきたか――\n1550 = "為了這份快感，為了讓鈴凌亂，我的肉棒可是忍了好久——" \n\n# monologue\n# JP: （ずっ！　――ずぼっ！　――ぶづっ！　ずろっ！）\n1828 = "（呲！——呲啵！——噗呲！呲嚕！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「ひっ――きゅっ――ふああっ！　あっ！　おし、りっ！\nやけ、ちゃう――キツ――く、てっ――熱っ――ふっ！」\n753 = "「咿——呀——嗚啊！啊！屁股！要燒起來了——好緊——好熱——呼！」" \n\n# monologue\n# JP: （きちちちちちちちっ！）\n1943 = "（緊——！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「んぐぐっ！」\n840 = "「嗯唔！」" \n\n# monologue\n# JP: 指先だけでも痛みを感じる強烈な締めの肛門が、\n僕の勃起と重なる部分を、みちみちくぱくぱ締め付ける。\n1364 = "強烈縮緊的肛門，擠得我指尖作痛。與我的肉棒重疊的部分也一張一合地咬緊。" \n\n# monologue\n# JP: 歯を、食いしばる。\n必死になって、射精衝動を噛み殺す。\n1422 = "我咬緊牙關。努力壓抑射精的衝動。" \n\n# monologue\n# JP: （ずっ――ぎゅりゅ！　ずぼっ！　ぐりゅりゅっ！）\n1813 = "（呲——吱溜！啪！唔溜！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「らめっ！　だめっ――ですっ――双鉄、様――ふあっ！\nお腰、ぐり、ぐり――おしり――わたくし、広がっ、て」\n692 = "「不行！不行——雙鐵少爺——呼啊！腰，動來動去——屁股——被撐開了」" \n\n# monologue\n# JP: 広がりなどは全くしない。\n1232 = "其實根本沒有撐開。" \n\n# monologue\n# JP: 締め付けは変わらず強烈で、そうありながら、\nグラインドさえきっちりみっちり受け止める。\n1349 = "屁股還是那麼緊，但是我承受住了她屁股的摩擦。" \n\n# monologue\n# JP: （ず――ずぼっ！！　ずばっ！　ぶぢゅんっ！！！）\n1814 = "（呲——呲啵！！啪！噗啾！！！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「ひゃっ！　あっ！　んっ！！　ふあっ――はきゅっ――\nふっ――ふあっ！　あっ！　あっ！　あああっ！！！！」\n743 = "「呀！啊！嗯！！呼啊——哈嗚——呼——呼啊！啊！啊！啊啊！！！！」" \n\n# monologue\n# JP: すずの肛内はひたすらツルツルで単調で、\n触れ合い擦れ合う感触が、脳を掴んで揺すぶってくる。\n1666 = "鈴的肛裡是那麼順滑單調，互相接觸和摩擦的感覺，讓我大腦爽上了天。" \n\n# monologue\n# JP: （ずっ！　ずぼおおっ！　みちりっっ！　じゅぶっ！！）\n1829 = "（呲！呲啪！咪吱！啾！！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「はっ――わた――わた、くしっ――おしり、でっ！　ん、\nおしりっ、アナル、を――ずぼずぼ――され、てっ――」\n768 = "「哈——我——我的——屁股！嗯，屁股，肛門——噗哧噗哧——被插到——」" \n\n# monologue\n# JP: （きゅうううううっ！）\n1933 = "（插入）" \n\n# monologue\n# JP: 根本の凶悪な締め付けと、\nツルツルキュウキュウ滑り合う肛内の触感と。\n1608 = "肛門緊緊勒著根部，以及滑嫩光潔的肛內觸感。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くっ！」\n846 = "「嗯！」" \n\n# monologue\n# JP: 誘引された精液が高い圧力で尿道口を遡ってくる。\n1582 = "精液在強大壓力下，被引誘到了尿道口。" \n\n# monologue\n# JP: けれど――まだ射精したくない。\n逃げたい気持ちが体を勝手に動かしてっ！\n1195 = "但是——我還不想射精。逃避的心態，讓我身體不由自主地動了起來！" \n\n# monologue\n# JP: （ずんっ！！！！）\n1819 = "（呲嗯！！！！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「んっきゅぅぅぅぅぅぅぅぅぅうっぅううううう！！」\n843 = "「嗯嗚——！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「んぐっ！！？」\n841 = "「嗯唔！！？」" \n\n# monologue\n# JP: （みちいいいいいいいいいいいっっっっっっ！）\n1941 = "（箍緊）" \n\n# monologue\n# JP: 衝動的に動いた腰が、突発的にすずをイかせるっ！\nすずは体を縮めるように、ぶるぶる震えて息さえできず。\n1426 = "我因衝動挺起了腰，突然讓鈴高潮了！鈴顫抖著蜷縮起身體，連呼吸都不順暢了。" \n\n# monologue\n# JP: 不意打ちに近い締め付けと、一気に高まる肛内温度に、\n射精したくて汗が吹き出てそれでも精を漏らさぬままに！\n1573 = "突如其來的收縮，以及猛烈提高的肛溫，讓我想射精到滿頭大汗，但我依然控制著不射！" \n\n# monologue\n# JP: （ずぼおおおおおおっっ！！！）\n# 1929 = "（插入——！！！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「ふきゅんっ！！！！！！！」\n750 = "「呼啾！！！！！！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！！」\n# 976 = "「！！！」" \n\n# monologue\n# JP: 引き抜くだけで射精しそうで、\nけれども欲で、射精欲より強い欲望でその衝動を塗り潰す。\n1505 = "抽出肉棒就讓我想射精，但是超越射精欲的欲望澆滅了這種衝動。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「はぁっ――はっ――はぁっ――はぁっ」\n782 = "「啊——哈——啊——啊」" \n\n# monologue\n# JP: （すりっ――しゅりっ――すりゅ――くにゅっ）\n1898 = "（噝溜——噝溜——噝溜——唔溜）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「く！」\n778 = "「唔！」" \n\n# monologue\n# JP: 目眩がしてる、くらくらしてる、\n焦りで指先が震えてしまう。\n1484 = "我頭暈目眩，指尖都焦躁地震動著。" \n\n# monologue\n# JP: 入り慣れてるおまんまんへと、旨く勃起を挿入できない。\nイってるすずには、僕を導く余裕さえ無――っ！！\n1444 = "我甚至沒辦法把肉棒插進無比熟悉的小妹妹中。高潮中的鈴沒有了引導我的從容——！！" \n\n# monologue\n# JP: （ちゅっ）\n1875 = "（啾）" \n\n# monologue\n# JP: 膣口が、自ら亀頭を吸い寄せる。\n勃起に甘いキスをして、ひくつきここだと教えてくれる。\n1688 = "陰道口主動吸引著龜頭。它給肉棒一個甜甜的吻，讓我知道它的位置。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁあ――」\n# 779 = "「啊——」" \n\n# monologue\n# JP: 寒風にずっと晒され続け、\n帰宅しようやく、風呂へと入る安心感。\n1648 = "這彷彿是沐浴著寒風回到家中，泡上熱水澡的安心感。" \n\n# monologue\n# JP: （ずっ――ぶっ）\n1815 = "（呲——噗）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「ひぎゅっ！！！？」\n734 = "「呀啊！！！？」" \n\n# monologue\n# JP: （きゅうううううううぅぅっっ！！！）\n# 1929 = "（插入——！！！）" \n\n# monologue\n# JP: それがすぐさま沸騰し、\n僕の体を、そして脳までを白熱させる。\n1390 = "感情迅速沸騰，讓我的身體和大腦有灼燒般的快感。" \n\n# monologue\n# JP: すずの膣内は抱きつき張り付き蠢きながら、\n勃起を奥へ、奥へ奥へとわななき導く。\n1668 = "鈴的陰道抱住肉棒、貼緊肉棒、不斷蠕動，將肉棒向深處不斷引導。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「す、ず――」\n945 = "「鈴——」" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「か……ふっ――あっ！」\n787 = "「啊……呼——啊！」" \n\n# monologue\n# JP: 言葉も満足に出せないくらい、感じてくれてる。\n1282 = "她已經舒服到話都說不清楚了。" \n\n# monologue\n# JP: 僕のおんなを、僕の愛しい愛しい女を、\n完璧に仕上げとろとろにして――思いっきりに貪っている。\n1462 = "我的女人，我無比可愛的女人，陰道是那麼黏滑，盡情貪圖著我肉棒的快感。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「すずっ」\n# 953 = "「鈴」" \n\n# monologue\n# JP: （にゅっ――ずっ――ず、ぶ――ずずっ）\n1909 = "（扭——呲——呲噗——呲）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「は――ぁっ――そ……てつ――さ、まっ」\n767 = "「哈——啊——雙——鐵……」" \n\n# monologue\n# JP: 頬を真っ赤に、金魚のように口をぱくぱく喘がせて、\nそれでもなんとか、僕の名前を呼ぼうとしてる。\n1314 = "她臉頰通紅，像金魚一樣地口一張一合喘息著，還是努力支吾出了我的名字。" \n\n# monologue\n# JP: こんなに綺麗で、これほど健気な存在を、\n醜く膨れた僕の勃起で、思うがままに貫いている。\n1318 = "她這麼漂亮、這麼堅強，我卻用鼓脹到醜惡程度的肉棒將她貫穿。" \n\n# monologue\n# JP: （ぞぶっ！　ず――ずううううっ！　ずっ！！！）\n1822 = "（呲噗！呲嗚——！呲！！！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「あっ――ひっ――しょっ――くっ――んあっ――\nゆっく――りっ――され、りゅっ――と――んぅ～っ！」\n783 = "「啊——哈——嗚——嗯——啊——慢——慢一點！」" \n\n# monologue\n# JP: ――その感動さえ、衝動的にはぶつけない。\n462 = "——我不能讓這份感動變成衝動。" \n\n# monologue\n# JP: この一瞬を永遠に――引き延ばすよう引き延ばすよう、\nゆるゆる、じわじわ――腰をっ――すす、めっ――て！\n1549 = "為了讓這一刻延長、成為永恆——就要慢慢地、一點一點地往前推入！" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「ひうっ！？　ふ――あっ！？　そ、双鉄、さまっ！\n待っ――待っ――まぁっ――っ！　～～～～っっ！！！」\n763 = "「咿！？呼——啊！？雙，雙鐵少爺！等——等——等等——！～～～～！！！」" \n\n# monologue\n# JP: ようやく言葉を取り戻し、じたじたすずが身悶える。\n膣はきゅんきゅん喜びまくり、僕に全部を貼り付けてくる。\n1311 = "她終於找回了說話的力氣，但還是身體緊縮著。陰道倒是很高興地，貼緊了我整個肉棒。" \n\n# monologue\n# JP: （ぐっ――ググッ――――――こちゅっ！）\n1833 = "（咕——咕咕——咕啾！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「んひっ！　あっ――おくっ――ひきゅうっ――にっ！\nひゅあっ――んくっ――あっ、しきゅう――こつんって」\n839 = "「嗯咿！啊——嗯——咿嗚——！呀啊——嗯——啊，子宮——被頂到了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「すずっ！！」\n954 = "「鈴！！」" \n\n# monologue\n# JP: 最奥に、またキスをした。\nすずへと僕を、また刻印した。\n1414 = "我又一次吻上了陰道最深處，將自己的吻痕留在了她的子宮口上。" \n\n# monologue\n# JP: その喜びに、開放される！\n体が、脳が、魂が、射精に向けてほとばしってく！！\n1651 = "這種喜悅解放了我！身體、大腦、靈魂都向著射精而迸發！！" \n\n# monologue\n# JP: （ばちゅっ！　じゅちゅっ！　じゅぶっ！　ごりゅっ！）\n1848 = "（啪啾！呲啾！啾！咕溜！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「ひっ――あっ――またっ！　やっ――わたっ――くし、\nまたっ――んきゅっ――くるっ――しゅごい、のっ！！」\n754 = "「咿——啊——又！哎——我——我，又——來了——好爽！！」" \n\n# monologue\n# JP: （きゅううううううっっんっっ！）\n1930 = "（插入——！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っっっ！！！」\n# 976 = "「！！！」" \n\n# monologue\n# JP: （ばちゅっ！　ずちゅっ！　ぞりゅっ！　じゅぶっっ！）\n1847 = "（啪啾！呲啾！呲溜！啾！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「双鉄！　さまっ！　だんな、さまっ――んっ――あっ！\nわたくし――おく――に――おまん、まん――おくっ！」\n969 = "「雙鐵少爺！夫君——啊！對我——最裡面——小妹妹——裡面！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ――最奥に――お前の――子宮に――射精、する」\n799 = "「啊啊——我會最向裡頭——你的——子宮——射精」" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「ああっ！」\n801 = "「啊啊！」" \n\n# monologue\n# JP: 聞くまでも無いおねだりと。\n言うまでもない回答と。\n1650 = "這種乞求不聽我也懂。回答自然不說也知道。" \n\n# monologue\n# JP: そうとわかってのやりとりで、それでもすずは幸せそうに、\n幸せそうに――とろけた顔で、わわってくれてっ！\n1410 = "我們互相心知肚明，鈴依然幸福到神魂顛倒，口齒不清！" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「すず――好きだっ――お前っ――おまえがっ！！」\n947 = "「鈴——我——喜歡——你！！」" \n\n# monologue\n# JP: （ずぢゅっ！　ばちゅっ！　じゅぶっ！　じゅぼおっ！）\n1817 = "（呲呲啾！啪啾！啾！啾啵！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「愛して――おります――あなた――ひとりを――\nわたく、し――だけ――の――いとしい――方、をっ！」\n875 = "「我也愛——您——一個人——只屬於我的——最愛的——夫君！」" \n\n# monologue\n# JP: （じゅぶっ！　ゅるっ！！　じゅぶうっ！　ばちゅん！）\n1873 = "（啾！嚕！！啾嗚！啪啾！）" \n\n# monologue\n# JP: 肉と肉、性器と性器、体温と体温、匂いと匂い。\nそして動きと言葉と――こころ。\n1605 = "肉與肉，性器官和性器官，體溫和體溫，氣味與氣味交織起來。還有動作、語言，以及我們的心靈。" \n\n# monologue\n# JP: それら全てを溶かしあわせて、\nこうまで深く融け合うからこそ、すずと僕とが際立って。\n1329 = "它們全部融化在一起，因為我們如此深切地交合，才讓我格外興奮。" \n\n# monologue\n# JP: （ばちゅっ！　じゅぶっ！　じゅばっ！　ばちゅんっ！）\n1849 = "（啪啾！啾！啾啪！！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「双鉄さまっ！　だんな、さまっ――んあっ！！！」\n970 = "「雙鐵少爺！夫君——啊！！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「すずっ――すずっ！！！」\n949 = "「鈴——鈴！！！」" \n\n# monologue\n# JP: （じゅぼおおおおおおおおおおおおおおおっっっ！！）\n1863 = "（啾啵——！！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「んゅ――ぁぁぁああああぁぁぁぁぁぁあああああっ！」\n842 = "「嗯啊——！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n804 = "「啊！」" \n\n# monologue\n# JP: （びゅぶっ！　どびゅっ！　どびゅる！　ばちゅん！）\n1890 = "（噗！咕噗！咕噗！啪啾！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「ぁっ――ぁっ――ぁっ――ぁっ――」\n# 784 = "「啊——啊——啊——啊——」" \n\n# monologue\n# JP: （びゅうっ！　びゅるっ！　どびゅっ！　びゅびゅ！）\n1887 = "（噗嚕！噗！咕噗！噗噗！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「しゅごい――の、あちゅい――のッ――はぁ――\nかっ――はっ――おなか――しきゅう――ぶつかっ、て」\n856 = "「好棒——好熱——啊————哈——肚子——子宮——碰到了」" \n\n# monologue\n# JP: （びゅっ！　どびゅっ！　ビュルっ！　どぴゅんっ！）\n1892 = "（噗！咕噗！噗嚕！咕噗！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「せいえき――精液……そうてつ、様の――あかちゃんの、\nたね――しきゅうに――あたって――とぷとぷ、って」\n929 = "「精液——精液……雙鐵少爺的——小寶寶的，種子——碰上——子宮——咕嘟咕嘟的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁぁ」\n# 796 = "「啊」" \n\n# monologue\n# JP: すずを、満たした。\nこの上もなく、満たされた。\n1669 = "鈴被滿足了。無比的滿足。" \n\n# monologue\n# JP: のに――\n1193 = "但是——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ――」\n477 = "「——」" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「あ――　双鉄さま」\n786 = "「啊——雙鐵少爺」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あ、れ？」\n751 = "「咦？」" \n\n# monologue\n# JP: なぜかは知らねど、視界がゆがむ。\n1274 = "奇怪的是我眼前一黑。" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「……双鉄様」\n486 = "「……雙鐵少爺」" \n\n# monologue\n# JP: （ぎゅっ）\n1916 = "（抱緊）" \n\n# monologue\n# JP: すずに抱かれる。抱きしめられる。\n優しい指が、そうっと僕の頬の涙を掬ってくれる。\n1660 = "鈴抱住了我，她緊緊地抱住了我。她用溫柔的手指，擦去了我臉頰上的眼淚。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: （ああ……僕は――泣いているのか）\n1845 = "（啊……我是不是哭了）" \n\n# monologue\n# JP: 泣いている理由がわからないまま。\nその事実だけを理解する。\n1402 = "我不明白哭的理由，但卻明白了這個事實。" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「双鉄、さま」\n967 = "「雙鐵少爺」" \n\n# monologue\n# JP: 優しい呼び声。\nそして、沈黙。\n1291 = "她溫柔地呼喚我。接著又是沉默。" \n\n# monologue\n# JP: 自分の鼓動が暗闇の中響きわたって、\nすずの鼓動と――ごくごく自然に思ってしまう。\n1466 = "我的心跳響徹在黑暗中，我把它幻想成了鈴的心跳聲。" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「思い出されて……しまいましたか？\nわたくしが、時を遡らせて」\n869 = "「您……想起來了嗎？是我讓時間回溯了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁぁ――」\n# 779 = "「啊——」" \n\n# monologue\n# JP: そうなのかも――いや、そうなのだろう。\nすずはそこまで、僕をわかって……許してくれる。\n1251 = "可能吧……不，應該就是的。鈴如此理解我……如此寬容我。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: （あの事故がなかったのなら――\n僕とすずとは――決して……出会ってさえいなかった）\n1904 = "（如果沒有那件事故——我和鈴——絕對……不會相遇）" \n\n# monologue\n# JP: 今更ながらの、\nいや……今までは、目をつぶっていた真実を。\n1182 = "事到如今，不對……那是我一直避之不及的真相。" \n\n# monologue\n# JP: すずの衣装のせいなのか、僕の心が変化したのか、\nなぜだか、今日は思ってしまって。\n1253 = "可能是因為鈴的衣服，也可能是我心境不一樣了，今天我回想起來了。" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「大丈夫です。双鉄様」\n916 = "「沒關係的，雙鐵少爺」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あ」\n# 796 = "「啊」" \n\n# monologue\n# JP: くちびるに、やわらかな甘みが押し付けられて。\nだから自然と……それを唇に含んでる。\n1527 = "柔軟的嘴唇壓在我的嘴唇上。我很自然地……夾起嘴含住。" \n\n# monologue\n# JP: （チュッ――ちゅう――ちゅうっ――ちゅむっ――）\n1852 = "（啾——啾——啾嗚——啾姆——）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「……全て、双鉄様の望まれるまま。\nわたくしは――ハチロクは。ただ、それだけが望みです」\n480 = "「……全部都按您想的來。我——我是八六，我只有這一個願望」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！！」\n975 = "「！！」" \n\n# monologue\n# JP: ハチロクと。\nすずは自分を、そう呼んだ。\n1229 = "八六。鈴是這樣自稱的。" \n\n# monologue\n# JP: 肉体はゼロ距離においたまま――\nけれど、心を、あえて僕から、半歩離した。\n1606 = "肉體的零距離——但心靈卻與我拉開了半步遠。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「すず」\n# 953 = "「鈴」" \n\n# monologue\n# JP: だから、呼ぶ。\n僕だけの名を、愛おしい名を。\n1491 = "所以我才叫了她。用屬於我的那個可愛的名字。" \n\n# monologue\n# JP: 過去の傷さえ、形を違えて、けれども僕らは共有し。\nだから傷つき。それだからこそ許しあえると、また知って。\n1655 = "過去的傷痛雖然不一樣，但我們共享著傷痛。所以我們才會互相傷害，但也因此會互相諒解。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「すず――（はむっ）」\n950 = "「鈴——（親吻）」" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「んっ！」\n# 846 = "「嗯！」" \n\n# monologue\n# JP: 乳首を咥える。\n1418 = "我叼住乳頭。" \n\n# monologue\n# JP: 今度は甘えるためだけではなく、\nすずを感じさせてあげるためにも。\n1396 = "我不僅是在撒嬌，也是為了讓鈴有感覺。" \n\n# monologue\n# JP: （チュッ――ちゅむっ――ちゅうっ――ちゅっ）\n1858 = "（啾——啾姆——啾嗚——啾）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「んふ……ふっ――元気に――なられ、ました、ね」\n835 = "「嗯呼……呼——這下——有精神了吧」" \n\n# monologue\n# JP: （さすっ）\n1936 = "（撫摸）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n# 778 = "「唔！」" \n\n# monologue\n# JP: 触れられ、気づく。\n勃起は硬度を取り戻してる。\n1633 = "被她碰到，我才發現，肉棒恢復了硬度。" \n\n# monologue\n# JP: 心同様、すずが欲しいと。すずとの未来を望んでいると。\n雄々しく聳え、天さえ割らんと咆哮している。\n1464 = "我的心也渴求著鈴，想要與她一起過未來的時光。心聲是那麼威武雄壯，彷彿有開天闢地之勢。" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「もう一度だけ、ぴゅっぴゅして。\nそれからゆっくり――くっつきあって、休みましょう」\n709 = "「再來一次，再射一次吧。然後靠在一起，慢慢地休息吧」" \n\n# monologue\n# JP: （しゅこ――しにゅっ）\n1899 = "（套弄）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: （ああ……）\n1846 = "（啊啊……）" \n\n# monologue\n# JP: 甘く、ゆるやかにしごかれる。\n唇をゆるく動かして、甘く静かに、乳首をしゃぶる。\n1315 = "她輕柔、緩慢地捋著我的肉棒。我也動了動嘴唇，輕柔安靜地舔著她的乳頭。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: （チュッ――ちゅむっ――ちゅううっ――チュッ――）\n1857 = "（啾——啾姆——啾嗚——啾——）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「ん……双鉄――さま――あ……おちん、ちん……ね？\nいいこ――いいこで……かわいい……かわいい」\n828 = "「嗯……雙鐵少爺——啊……雞雞……好孩子——乖孩子……真可愛……真可愛」" \n\n# monologue\n# JP: （しこ――しこ――しゅこ――しゅこっ――）\n1920 = "（捋——捋——捋——捋——）" \n\n# monologue\n# JP: おだやかに、お互いの熱を交換しながら、\nじわじわ、ゆるゆる、たかまっていく。\n1411 = "我們平靜地交換彼此的熱量，心緒一點一點地舒暢、高漲起來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: （ちゅっ――ちゅぱっ――ちゅううっ――ちゅうううっ）\n1854 = "（啾——啾啪——啾嗚——啾嗚）" \n\n# monologue\n# JP: 出るわけがないとわかっていても、\n母乳を飲みたいような気がして、乳首を強く吸ってしまう。\n1467 = "我知道吸不出奶水，但也想像著吸奶的感覺，用力地吮吸乳頭。" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「んっ――あ……双鉄……さま……ふ――ぁ――ん、\n大丈夫……です……よ？　いいこ……ね？　いいこ……」\n816 = "「嗯——啊……雙鐵少爺……呼——啊——沒關係的……乖哦……要乖乖的哦……」" \n\n# monologue\n# JP: いいこ……いいこ。\nいい子。いい子。\n1323 = "好孩子……好孩子。乖孩子，乖孩子。" \n\n# monologue\n# JP: その単純な響きが僕を、どうしようもないバカにする。\n1261 = "單調的詞語，讓我淪陷成了無可救藥的笨蛋。" \n\n# monologue\n# JP: このまま溺れてしまいたい。すずの赤ちゃんになりたいと。\nそんな愚かな欲望が――っ！？\n1433 = "我想沉溺於這一刻，成為鈴的小寶寶。真是愚蠢的欲望，但是——！？" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「いいこ――いいこ、ね？　双鉄さま。わたくしの、\nわたくしだけの大事な大事な――いとおしい方」\n698 = "「乖哦——要乖乖的哦。雙鐵少爺，您是我的——只屬於我的——最重要最重要的愛人」" \n\n# monologue\n# JP: （なで――なで――さす――さす）\n1935 = "（撫摸——撫摸——摸——摸）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: （すず……）\n1947 = "（鈴……）" \n\n# monologue\n# JP: 僕の頭を支えてる、\n左手はやさしく、ただただやさしく撫でながら。\n1292 = "她用左手支撐著我的頭，輕柔地撫摸。" \n\n# monologue\n# JP: （しこ――しこ――しゅこ――しゅこ――）\n1805 = "（上下套弄）" \n\n# monologue\n# JP: けれども右手は、勃起をすごいてくれている。\n男の僕を、大人の僕を、励まし慰めてくれている。\n1198 = "但是她的右手卻套弄著勃起，安慰著作為成年男性的我。" \n\n# monologue\n# JP: 溺れることも立ち上がることも許されている。待たれてる。\nすずはいつでも――僕の全てをまるごと全部認めてくれる。\n1156 = "不管我是要沉溺進去還是就此起身，她都會接納我、等候我。她無論何時都會認同我的一切。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「すず」\n# 953 = "「鈴」" \n\n# monologue\n# JP: だから、乳首を口から離す。\n僕の言葉で――はっきり願いをすずに伝える。\n1495 = "所以我鬆開了乳頭。我要用話語——清楚地表達出願望。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「その手で、射精させてくれ。\n僕の濁りを――根こそぎ、絞り出してくれ」\n881 = "「我想射在你的手裡。請你把我的汙濁——徹徹底底地榨出來吧」" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「はい。かしこまりした双鉄様――\nわたくしの愛しい、旦那様」\n830 = "「嗯。我明白了，雙鐵少爺——我可愛的夫君」" \n\n# monologue\n# JP: （しゅこんっ！）\n1926 = "（捋！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n# 804 = "「啊！」" \n\n# monologue\n# JP: すずの手指に、力がこもる。\n母の優しいなでなでが、一瞬にして姿を変える。\n1663 = "鈴的手指用上了力量。她剛才還是母親一般的溫柔撫摸，一瞬間變了模式。" \n\n# monologue\n# JP: 欲を隠さぬ女の動きに、\n精を絞りとり満ちようとする、激しくも甘いシコシコへ。\n1294 = "她用慾火焚身的動作，激烈而又嬌柔的揉搓，彷彿是想榨走每一滴精液。" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「たくさん、ん――ぴゅっぴゅ――して、ください、ね？\nあなたの――すず、の――しこ、しこ――おてて、で」\n859 = "「射吧——射很多出來，好嗎？您的——鈴——會用手幫您——」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！？」\n978 = "「！？」" \n\n# monologue\n# JP: （しこっ！　しゅこっ！　しゅこんっ！　しゅこっ！）\n1923 = "（捋！捋！捋！捋！）" \n\n# monologue\n# JP: 手指は激しく僕の男を猛らせて、\nけれども声は、いまだに赤子をあやすごときに。\n1301 = "她的手指激烈地調動我的雄心，但是聲音還是哄寶寶的言辭。" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「おちんちん、かわいちんちん、しこ、しこ、しこしこ。\nしゅこ、しゅこ――ぴゅぴゅのために、しこしこしゅこ」\n861 = "「小雞雞，可愛的小雞雞，捋、捋、捋啊捋。捋，捋——為了射射的捋啊捋」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁああっ！」\n# 801 = "「啊啊！」" \n\n# monologue\n# JP: 耳から脳へと来る情報と、体が受けている刺激との、\n激しいギャップに混乱させられ、性感がより研ぎ澄まさる。\n1593 = "耳朵向腦傳來的情報、身體接受的刺激，兩者激烈的差異讓我混亂，讓我更加有感覺。" \n\n# monologue\n# JP: （しゅこっ！　ちゅぼっ！　じゅにっ！　じにゅっ！）\n# 1923 = "（捋！捋！捋！捋！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「先ばしり、じる――どろどろ――で……んっ――\nわたくし――おてて――おまん、まん――みたい、で」\n972 = "「預射液——黏糊糊的——……嗯——我——的手——像小妹妹——一樣」" \n\n# monologue\n# JP: （じゅぼっ！　じゅぶっ！　じゅちゅっ！　じゅこっ！）\n1865 = "（啾啵！啾！啾啾！啾咕！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「おてて、まんまん――しこ、しこ――しゅこ、しゅこ！\nぴゅっぴゅ、もうすぐ――我慢、しないで、おちんちん」\n890 = "「手就是小妹妹——捋、捋——捋啊捋！馬上就要射射了——不要忍耐哦，小雞雞」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぅっ――あっ！」\n811 = "「嗚——啊！」" \n\n# monologue\n# JP: （じゅぼっ！　しゅこん！　じゅぼっ！　しこおおっ！）\n1866 = "（啾啵！捋！啾啵！捋！）" \n\n# monologue\n# JP: すずのおててがおまんまんで、だからその中に出したくて。\nただそれだけしか思えなくなり腰を無様に動かしさえして。\n1662 = "鈴的手就是小妹妹，所以我要在裡面射精。我帶著這個想法，粗魯地扭動著腰。" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「おてて、まんまん――しこしこ――じゅぽじゅぽ、\n射精、ね？　たぁくさん、殿方らしく、おもいっきりに」\n893 = "「手就是小妹妹——捋捋——啾啾，射精哦？用男子漢的一面，射很多出來哦」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぅあ――あっ――あっ――あっ――」\n# 784 = "「啊——啊——啊——啊——」" \n\n# monologue\n# JP: バカになってる、脳味噌ぜんぶがとろかされてる。\n1436 = "我感覺腦子都融化了，感覺自己成了笨蛋。" \n\n# monologue\n# JP: シコシコぴゅっぴゅ、したくて、したい。\n今はそれしか、ただそれだけしか望めないっ！！\n1511 = "揉揉搓搓，想射、想射出來。現在的我全心全意只有這一個念頭！！" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「しこしこ、しゅこしゅこ、ちんちんビクビク。\nぴゅっぴゅ、もうすぐ。さん、にぃ、いち――えいっ！」\n894 = "「捋捋，捋捋，小雞雞戰戰兢兢。馬上就要射射啦。三、二、一——嘿！」" \n\n# monologue\n# JP: （じゅこんっ！！！！！）\n1861 = "（啾唔！！！！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くあっ！」」\n# 804 = "「啊！」" \n\n# monologue\n# JP: （んびうっ！　びゅるるっ！　どびゅう！　びゅあっ！）\n1885 = "（嗯嗚！噗嚕！咕噗！噗啊！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「あああっ！」\n# 801 = "「啊啊！」" \n\n# monologue\n# JP: （しゅこ！　こしゅっ！　みゅうっ！　ずりゅっ！！）\n1922 = "（捋！咕咻！嗚！呲溜！！）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「！！？」\n977 = "「！！？」" \n\n# monologue\n# JP: （びゅっ！　びゅるっ！　びゅうっ！　びゅぼっ！）\n1894 = "（噗！噗！噗嚕！噗啵！）" \n\n# monologue\n# JP: 天高くへと登った精が、一瞬遅れて白く濁った雨になる。\nそれを全身に浴びながら――\n1700 = "高高射出的精液懸在空中，又化為白色的雨滴落下。沐浴在全身上下——" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「精液――びゅっびゅっ！　もっと！　ね、もっと！！」\n927 = "「精液——射射！多一點！再多一點！！」" \n\n# monologue\n# JP: （しこっ！　しゅこっ！　しにゅっ！！　ぐいっ！！）\n1924 = "（捋！捋！握！！按！！）" \n\n# monologue\n# JP: 扱く、ではなく竿を下から絞りあげ、\nすずの手指は精液全部を、僕から絞ろうとしてくれる。\n1276 = "她不只是捋，更是從肉棒下方施加壓力，鈴的手指想把我的精液都給擠榨出來。" \n\n# monologue\n# JP: その健気さに、懸命さに、\nああ、そうなのかと今更ようやく理解する。\n1298 = "她的堅強與拚命，我現在終於明白背後的原因了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: （不安を……すずにも――僕は、伝染させていたんだ）\n1938 = "（是我……把不安的心情傳染給了鈴）" \n\n# monologue\n# JP: 己の未熟を痛感し、\nそれごと僕を包んでくれたすずへの愛しさがまた弾け飛ぶ。\n1456 = "我痛感於自己的不成熟，同時也更加愛上了容忍我一切的鈴。" \n\n# monologue\n# JP: （びゅっ！　びゅるっ！！　びゅううっ！　びゅっ！！）\n1896 = "（噗！噗！！噗嚕！噗！！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「あ……あっ――双鉄さま――双鉄……さまぁ」\n789 = "「啊……啊——雙鐵少爺——雙鐵少爺……啊」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「すず」\n# 953 = "「鈴」" \n\n# monologue\n# JP: （ぎゅうううっ！）\n1809 = "（吱嗚——！）" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「あ」\n# 796 = "「啊」" \n\n# monologue\n# JP: すずの庇護から身を起こし、\n全身に浴びせた精液ごと、小さな体を抱きしめる。\n1431 = "我從鈴的保護下支起身子，抱起嬌小的她，也包括她全身的精液。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「もう大丈夫だ。僕も、おまえも」\n863 = "「已經沒事了，無論我還是你」" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「あ――」\n# 779 = "「啊——」" \n\n# monologue\n# JP: 安堵と、脱力が混じる声。\nそうしてすずは、花のような。\n1296 = "她發出了放心和脫力的聲音。然後鈴露出了花一般的——" \n\n# monologue\n# JP: 月並みだけれど、それしか言葉が当てはまらない、\n花の咲くような笑みを浮かべる。\n1470 = "我知道這個詞很俗，但我也想不到更好的詞，露出了花開一般的笑容。" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「はい！　双鉄様」\n858 = "「好的！雙鐵少爺」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ゆえに、休もう。おまえが望んでくれたとおりに。\nこのまま一つに、くっつきあって」\n889 = "「所以就休息吧，按你期盼的那樣。讓我們緊靠在一起，化為一體」" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「はい。双鉄様」\n849 = "「嗯，雙鐵少爺」" \n\n# monologue\n# JP: 信頼しきって。甘えきってる。\n僕とすずとは、お互いに。\n1412 = "我們無比信任對方，又無比依靠對方。" \n\n# monologue\n# JP: だから時折り、傷がかさぶたを突き破り、\n僕らをじくじく苛んだとて。\n1222 = "儘管有時舊傷會撕開瘡疤，讓我們備受折磨。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おやすみ、すず」\n909 = "「晚安，鈴」" \n\n# 【ハチロク】\n# display as 鈴\n# JP: 「おやすみなさい。いとおしいひと」\n907 = "「晚安，我心愛的夫君」" \n\n# monologue\n# JP: ともに眠って。\n夢へと過去を綴じ直し。\n1149 = "一起睡吧。在夢中重新編寫過去。" \n\n# monologue\n# JP: 目覚めた明日を、\n手を取り合って走り出せると――知っている。\n1580 = "等到明天一起醒來，我們還能手牽著手，一同邁開腳步。" \n