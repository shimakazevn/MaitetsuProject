[script]
# lines: 464 
# 【双鉄】
# display as 雙鐵
# JP: 「すず……これを着け忘れているぞ」
951 = "「鈴……你忘記戴這個了」" 

# 【ハチロク】
# display as 鈴
# JP: 「あ――」
779 = "「啊——」" 

# monologue
# JP: 僕の愛するレイルロオドを、僕のおんなを。\nふたりきりのときだけに呼ぶ名で呼んで。
1459 = "我的女人、我愛的鐵路人偶。與她獨處的時候，我才這樣叫她。" 

# monologue
# JP: そうしてそっと、花とリボンとの髪飾りを着け、\nその黒髪を彩ってやる。
1471 = "我給她輕輕戴上花朵和絲帶的髮飾，讓她的黑髮熠熠生輝。" 

# 【双鉄】
# display as 雙鐵
# JP: 「最後の仕上げは、この高下駄だ」
913 = "「最後是這雙高齒木屐」" 

# 【ハチロク】
# display as 鈴
# JP: 「た、畳の上で――高下駄を履いてしまうのですか？」
850 = "「在、在榻榻米上——穿高齒木屐嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや。それでは縁起が悪い」
696 = "「不，那樣不吉利」" 

# monologue
# JP: （ひょい）
1917 = "（抱起）" 

# 【ハチロク】
# display as 鈴
# JP: 「ふぁっ」
796 = "「啊」" 

# monologue
# JP: すずを抱き上げ、目で示すなら、\n抱かれたままにその足を、朱の高下駄で飾ってくれる。
1440 = "我抱起鈴，給她眼神示意。她的腳上裝點著紅色的高齒木屐。" 

# monologue
# JP: 可愛い、愛しい、美しい。\nだから思い切り、乱したくなる。
1321 = "好可愛，好美麗。所以我才想動手弄亂。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今は、おまえは。\n僕一人だけのキャンペーンガールだ」
922 = "「現在，你呢，是只屬於我的宣傳女郎」" 

# monologue
# JP: 御一夜大詔レトロフェスタ。
1371 = "御一夜大詔鐵路節。" 

# monologue
# JP: その催しの看板娘を、飾り立て彩るための華麗な衣装を、\n独り占めして、僕がどろどろに穢してしまう。
1289 = "她是活動的看板娘，穿著活動時的盛裝艷服。此刻就要被我獨占並玷汙了。" 

# 【ハチロク】
# display as 鈴
# JP: 「今だけではなく、どんなときでも。\nわたくしは――旦那様。あなたひとりの、おんなです」
688 = "「不僅僅是現在，而是任何時候我都是夫君，您一個人的女人」" 

# monologue
# JP: 子供じみ、いささか歪んだその欲望さえ、\nすずは理解し、そのまま受け入れ喜んでくれる。
1342 = "就連我帶有孩子氣的扭曲欲望，鈴也能理解、接受和為之喜悅。" 

# monologue
# JP: 腕に感じる重みはそのまま、圧倒的な幸福で、\n自然、足取りも早くなる。
1501 = "手臂感到的重量，感覺是那麼的幸福，讓我的腳步自然加快。" 

# 【ハチロク】
# display as 鈴
# JP: 「え？　あの……次の間へ向かうのですか？\nあそこは、あまり――」
775 = "「哎？那個……去下一個房間嗎？那裡是不是有點——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。愛しあうのに適した部屋とは言いがたい」
904 = "「是啊。那不是男歡女愛的房間」" 

# monologue
# JP: が。今日は別だ。
1189 = "但今天是特別的。" 

# monologue
# JP: この衣装のため、このときのため。\n特別な準備をしておいたから。
1551 = "為了這身華服，為了這一刻。我做了特殊的準備。" 

# monologue
# JP: （ふわっ）
1831 = "（呼哇）" 

# 【ハチロク】
# display as 鈴
# JP: 「まあっ」
# 796 = "「啊」" 

# monologue
# JP: [うこん,1]鬱金の敷布の寝台へ、すずの体を、そっと寝かせる。
1438 = "我把鈴抱到了鋪有鮮黃色床單的臥鋪上。" 

# monologue
# JP: 僕を見上げる目が潤んでる。\n唇は、キスを求めて甘やかに小さく開いてる。
1309 = "她看著我的眼神很濕潤。嘴唇微微張開，想要和我接吻。" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……ん……ちゅっ――ちゅむっ――ンッ――\nふ――っぁ……れろっ――れるっ――ちゅる――ちゅ」
791 = "「啊……啾——啾姆——嗯——呼——啊……嗯——咻嚕——啾嚕——啾」" 

# monologue
# JP: くちづけすれば、ほどなくすずが侵入してくる。
1145 = "一吻上，很快鈴的舌頭就侵入了我的嘴。" 

# monologue
# JP: 短めの舌を懸命に伸ばし動かして、\n唇の裏、歯の裏、歯茎――口内全てを舐めようとする。
1284 = "她拚命伸長短短的舌頭，想將我的嘴唇後、牙齒後、牙根——嘴裡所有位置都舔到。" 

# 【ハチロク】
# display as 鈴
# JP: 「チュッ――んっ……チュルッ――れるっ――るっ――\nんっ！？　こくっ――れろっ――れるっ――ちゅるっ」
810 = "「啾——……啾嚕——咻嚕——嚕——嗯！？唔唔——嗯——咻嚕——啾嚕」" 

# monologue
# JP: 上から僕が流しこむ、唾液も嬉しげに飲み干しながら、\n一途で律儀な短い舌は、動きを少しも緩めない。
1320 = "她高興地吞下了我送來的唾液，專一又忠實的舌頭也沒有絲毫的放緩。" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……むっ――んっ――ん……チュッ……れるっ――\nンッ――ちゅっ――ちゅうっ――れるっ――れろっ」
793 = "「啊……姆——嗯——……啾……咻嚕——n——啾——啾嗚——咻嚕——嗯」" 

# monologue
# JP: 僕の性感を高めるために、自ら性感を得るために、\n淫靡にしつこく、舌を動かし唇を甘く喰みあわせ。
1548 = "為了讓我更加有感覺，也為了自己更加有感覺，她淫蕩而又頑強地動著舌頭，輕咬著嘴唇。" 

# monologue
# JP: そうしながらもすずはすりすり、母に甘える子犬のように、\n顔を体を揺り動かして、あどけないほどの甘えをみせる。
1255 = "同時她還會晃動臉龐和身體，像跟母親撒嬌的小狗一樣天真地黏著我。" 

# 【双鉄】
# display as 雙鐵
# JP: （なんと、愛くるしいものか）
1900 = "（她真可愛）" 

# monologue
# JP: 思えば途端、思った言葉にまた情愛を煽られる。\n愛くるしい。
1382 = "想著想著，我又更加憐愛她了。真是可憐又可愛。" 

# monologue
# JP: 愛がくるしい。愛ゆえくるしい。\n――愛がこれほど、くるおしい。
1388 = "愛是多麼可憐，愛讓人多麼可憐。——愛就是如此瘋狂。" 

# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅっ――ぷあっ――あ……双鉄、さま？」
827 = "「嗯……啾——噗啊——啊……雙鐵少爺？」" 

# monologue
# JP: 感慨にふけった一瞬に、すずに応える舌の動きが、\nおろそかになってしまったらしい。
1271 = "大發感慨的一刻，我好像忘記用舌頭回應鈴了。" 

# monologue
# JP: ただそれだけで、\n緋色の瞳はこれほど不安げに僕を見上げる。
1191 = "但她紅色的眼睛已經憂心忡忡地仰視起我來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「可愛らしいなと思っただけだ。\nお前が僕の妻で本当に幸せだな、と」
879 = "「我就是覺得你很可愛。能有你做妻子，我真是幸福」" 

# 【ハチロク】
# display as 鈴
# JP: 「まぁ」
771 = "「哎呀」" 

# monologue
# JP: ほっとした顔。\nただでさえ紅潮している頬に、朝焼けのような朱が差す。
1310 = "她看起來很安心。本來就紅的臉頰，透出像朝霞一樣的紅。" 

# 【ハチロク】
# display as 鈴
# JP: 「わたくしも――あなたが。\n双鉄様が、わたくしの旦那様なことが――ちゅっ」
873 = "「我——也愛您。有您做夫君，我真是幸福——啾」" 

# monologue
# JP: また、キス。
1243 = "又是一個吻。" 

# monologue
# JP: けれども今度はごく軽い、\n小鳥が餌でもついばむような。
1205 = "但這次非常輕，就像小鳥啄食一般。" 

# 【ハチロク】
# display as 鈴
# JP: 「どうしようもなく幸せで、\n時間をこのまま、綴じてしまいたく感じるほどです」
925 = "「真是幸福極了，簡直希望時間就這樣無盡地延續下去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「時間、か」
906 = "「時間啊……」" 

# monologue
# JP: かわいいキスのお返しに、\n唇、鼻先、頬、耳、まぶた――黒髪にまでキスをする。
1424 = "我回吻她的嘴唇、鼻尖、臉頰、耳朵和眼瞼。" 

# monologue
# JP: 髪の夜空に輝いている月のごときなかんざしが、\n今このときを、永遠のようにも、とても儚くも感じさせる。
1304 = "她的秀髮好像夜空，而髮簪就是懸在夜空上的明月。我感覺這一刻彷彿化作了夢幻般的永恆。" 

# 【双鉄】
# display as 雙鐵
# JP: （すずに――ハチロクに――閉じた時間がなかったのなら。\nもしも眠っていなかったなら）
1946 = "（鈴——八六——如果沒有那段關起來的時間，如果沒有那次安眠的話）" 

# monologue
# JP: つまり、あの事故がなかったのなら、\n僕らは決して出会わずにいた。
1172 = "也就是說，沒有那件事故，我們絕對無法相遇。" 

# monologue
# JP: この甘やかなひとときを、僕は永遠に、味わわずにいた。\n失くしたものは……傷は、永遠に消えなくもあるが――
1429 = "我就永遠無法體會現在這甜蜜的一刻。失去的東西……傷痕永遠不會消失，但是——" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様？　――んっ！？　あ……チュッ――んっ――\nふっ――あっ――んむっ――あっ――ふあっ！　あっ！」
971 = "「雙鐵少爺？嗯——！？啊……啾——呼——啊——姆——啊——呼啊！啊！」" 

# monologue
# JP: 心配する声を聞きたくなくて、\n閉じ込めるためのキスをして。
1400 = "我不想聽她擔心的聲音，所以用吻把她的嘴塞上。" 

# monologue
# JP: そうしてそのまま唇を、舌を、\nなめくじのようにぞろりじわりと這わせてく。
1558 = "然後將她的嘴唇、舌頭都舔個遍，就像蛞蝓一樣。" 

# 【ハチロク】
# display as 鈴
# JP: 「ん……ふ―あっ――だんな、さまの――舌が……ぬる、\nぬる……と……わたくしの、肌――唾液で、濡ら、して」
821 = "「嗯……呼啊——夫君——舌頭……黏黏的……把我的，皮膚——都給舔濕吧」" 

# monologue
# JP: 汗を舐め取り、唾液をなすり、綺麗な顎のラインを登る。
1474 = "我舔掉汗液，擦上唾液，沿著漂亮的下巴曲線向上爬。" 

# 【ハチロク】
# display as 鈴
# JP: 「ひっ！？　あ――お耳――んっ――わたくしの、耳――\n旦那、様の舌に――は、……挿入られ――てっ――くぅ」
765 = "「咿！？啊——耳朵——我的，耳朵——夫君的舌頭——……伸進來了——啾」" 

# monologue
# JP: 耳孔を舌で犯しておいて、\nまぶたに、瞳に、キスをする。
1454 = "我用舌頭入侵耳孔，吻著眼皮、瞳孔。" 

# 【ハチロク】
# display as 鈴
# JP: 「舌……あ……こんなに――近く、に――んっ！\nあ――わたくし――目の、たま――なめられ、て……」
938 = "「舌頭……啊……這麼——近——！啊——我的——眼球——被舔到了……」" 

# monologue
# JP: 目をそらさない。\nまばたき出来るはずなのに、一瞬たりとも瞼を閉じない。
1280 = "她卻不閉上眼睛。她可以眨眼，但卻一次都沒有閉上眼皮。" 

# 【ハチロク】
# display as 鈴
# JP: 「わたしの、瞳……んっ――双鉄、さまに――\nぺろりと――食べられて――しまい、そうっ」
886 = "「我的，瞳孔……——感覺要被雙鐵少爺——您給——吃掉了——似的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――食べるぞ」
798 = "「啊啊——我是要吃啊」" 

# monologue
# JP: （れろおおおおっっ）
1840 = "（咻嚕——）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ！」
741 = "「呀！」" 

# monologue
# JP: 愛おしくってたまらなくなり、\n涙のラインを描く如くに、頬のラインを舐め落ちる。
1259 = "喜愛之情油然而生，我舔過她臉頰的線條，也是她的淚跡線。" 

# 【ハチロク】
# display as 鈴
# JP: 「ん……あっ――舌……あったかい……んっ――\nや……くびす、じ……んっ――くすぐった――ふぁ」
823 = "「嗯……啊——舌頭……暖暖的……——……脖子……——癢癢的——嗚啊」" 

# monologue
# JP: 首の筋肉のラインを辿って、鎖骨のくぼみを舐めまわす。\nそれから一転やわらかすぎる感触を――
1483 = "我順著脖頸的線條，舔到了鎖骨的凹陷處。然後就是無比柔軟的感觸——" 

# monologue
# JP: （れろっ――れるっ――れろおおおお――はぷっ！）
1878 = "（嗯——咻嚕——咻嚕——哈噗！）" 

# monologue
# JP: ――おっぱいというには平坦すぎて、\nけれども確かに他と違った弾力を持つ、胸を舌先で弄ぶ。
460 = "——也就是一馬平川、當然還是有曼妙彈性的胸部，用舌尖把玩。" 

# monologue
# JP: 勃起乳首の乳輪まわりを、ぺちゃぺちゃ舐めて、\n感じさせつつ、僕のものだとマーキングする。
1476 = "我舔著聳立的乳頭邊的乳暈，帶給她快感，也宣誓我的主權。" 

# 【ハチロク】
# display as 鈴
# JP: 「きゅあっ！　あっ、んっ――おっぱい――は――あっ\nきもち……いい、です――だんな、さまぁっ――」
732 = "「呀啊！啊，嗯——乳房——啊感覺……好棒——夫君——」" 

# monologue
# JP: （れろっ――はむっ――ちゅうう――きゅぽっ！）
1880 = "（嗯——哈姆——啾嗚——咕啵！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひあんっ！！！」
760 = "「咿啊！！！」" 

# monologue
# JP: 唇だけで小さな蕾を咥えて置いて、\n上へと持ち上げ――自然に離れる力で、放つ。
1448 = "我用嘴唇叼住小花蕾，往上提起，再放它自然下落。" 

# monologue
# JP: （くぽっっ――ちゅうううううっ――ぷりゅんっ！）
1844 = "（唔哦——啾嗚嗚嗚——噗嚕！）" 

# 【ハチロク】
# display as 鈴
# JP: 「だんな……さまっ――ふ、ぁっ――すず――の、\nおむね、が――乳首、が――伸び、て――んっ！」
853 = "「夫君……——呼，啊——鈴的——胸部——乳頭——給拉長了，嗯——！」" 

# 【双鉄】
# display as 雙鐵
# JP: （伸びなどすまい。これほどの張りと弾力なのだ）
1939 = "（當然了，畢竟這麼鬆軟有彈性）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゃん！　また――ふ……ぁんっ！！！　ん……\nおっぱい……じんじん――シビレて――感じ、てっ」
739 = "「呀嗯！又——呼……啊嗯！！！嗯……乳房……一顫一顫——有點發麻——」" 

# monologue
# JP: （ちゅむううううううううう――――つぷんっ！！）
1868 = "（啾嗯——呲噗！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「んゆぅっっっ！！！！」
845 = "「嗯嗚！！！！」" 

# monologue
# JP: 最初からずっと勃起していたすずの乳首は、\n吸って離しを繰り返すうち、さらに大きくなっている。
1525 = "本來就聳立的乳頭，在吸吮、放開的過程中又變得更大。" 

# monologue
# JP: 乳首の赤みも鮮やかになり――\nいや、これは――
1175 = "乳頭的紅色也變得鮮明——這樣看來——" 

# monologue
# JP: （ちゅぱっ）
1862 = "（啾啪）" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ」
# 796 = "「啊」" 

# monologue
# JP: 口全体で、赤子がするように胸を含めば、\nすずは安心した声を出す。
1450 = "我用整張嘴像嬰兒一樣含住胸部，鈴發出了很安心的聲音。" 

# 【双鉄】
# display as 雙鐵
# JP: （れろっ――れろっ――ぺろっ――ぺろっ――）
1881 = "（嗯——嗯——（舔）——（舔）——）" 

# monologue
# JP: 傷口を舐めて消毒していくイメージで、\n慎重に、ごく穏やかに柔らかに、乳首をしゃぶる。
1451 = "我用給傷口消毒的感覺，慎重、平靜而輕柔地吮吸乳頭。" 

# 【ハチロク】
# display as 鈴
# JP: 「ふぁ……あっ――それ……ここち……いい……\n双鉄……様の……舌……さっきは――あれ、ほどっ」
813 = "「嗚啊……啊——那個……好舒服……雙鐵少爺的……舌頭……剛才——那麼的」" 

# monologue
