737 = "「Á phù!!!」"

# monologue
# JP: 尻肉の奥にすぼまっている小さな蕾に息をかければ、\nすずの背中がひくひく蠢く。
1419 = "Chỉ cần thổi nhẹ vào nụ hoa nhỏ xíu đang\nkhép nép sâu giữa hai cánh mông,\ntấm lưng Suzu liền giật giật ngọ nguậy."

# monologue
# JP: ……鎖骨、それから背骨のライン。\nそんなところまで美しいなと、今更ながらしみじみ思う。
475 = "……Xương quai xanh, rồi đến đường gân dọc\nsống lưng.\nĐến tận bây giờ tôi mới thấm thía nhận ra,\nngay cả những nơi như vậy cũng thật đẹp\nđẽ."

# 【双鉄】
# display as 雙鐵
# JP: 「どちらが――欲しい？」
706 = "「Em muốn——bên nào?」"

# monologue
