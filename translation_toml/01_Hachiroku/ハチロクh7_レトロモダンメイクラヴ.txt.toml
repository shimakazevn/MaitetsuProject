784 = "「Haa——haa——haa——haa——」"

# monologue
# JP: すずの荒いだ吐気を聞くたび、\n勃起はビクビク暴れてしまう。
1539 = "Mỗi lần nghe thấy tiếng thở dốc của Suzu,\ncôn thịt đang cương cứng lại giật giật bạo\nđộng."

# 【ハチロク】
# display as 鈴
# JP: 「あっ……（ごくっ）――ふぅ……ふぅ――ふぅ、ふぅ」
795 = "「A……（Ực）——phù……phù——phù, phù」"

# monologue
# JP: すずにも確認できたのだろうか？\n視線が股間に釘付けとなり、荒い呼吸が早くなる。
1277 = "Có lẽ Suzu cũng nhận ra rồi sao?\nÁnh mắt em dán chặt vào đũng quần tôi,\nnhịp thở dốc càng lúc càng nhanh."

# monologue
# JP: （くちいっ！）
1876 = "（Nhóp nhép!）"

# 【ハチロク】
# display as 鈴
# JP: 「っ！！！」
976 = "「っ!!!」"

# monologue
# JP: 腰が、動いた。\n水音が示した事実に、すずはいやいやと首を振り――
1306 = "Eo em, đã cử động.\nTrước sự thật mà tiếng nước đã chứng minh,\nSuzu liên tục lắc đầu——"

# monologue
# JP: それからきゅっと口を結んで、\n振り絞るような声をだす。
1557 = "Sau đó em mím chặt môi,\ncất lên giọng nói như bị vắt kiệt."

# 【ハチロク】
# display as 鈴
# JP: 「はしたない……おんなと……どうか、どうか……\nご軽蔑、なさらないで……ください、まし――ね？」
965 = "「Một người phụ nữ……dâm đãng……xin ngài, xin\nngài……\nđừng, khinh miệt em……có được không——ạ?」"

# monologue
# JP: （にゅぽっ）
1870 = "（Phập）"

# 【ハチロク】
# display as 鈴
# JP: 「んっ！！」
847 = "「Ưm!!」"

# monologue
# JP: それだけ聞けば、答えの全てを聞いたももはや同然で。
1596 = "Chỉ cần nghe bấy nhiêu thôi, cũng giống\nnhư đã nghe được toàn bộ câu trả lời rồi."

# monologue
# JP: けれども、口で言って欲しくて、\nすずの膣から指を抜く。
1202 = "Tuy nhiên, vì muốn em tự nói ra bằng\nmiệng,\ntôi rút ngón tay khỏi âm đạo của Suzu."

# 【双鉄】
# display as 雙鐵
# JP: 「おまえに答えを強いている――\n僕の方がよほど、はしたなく、浅ましい男だろうさ」
865 = "「Ép buộc em phải trả lời——\nAnh mới là một gã đàn ông đê tiện và dâm\nđãng hơn nhiều đấy.」"

# 【ハチロク】
# display as 鈴
# JP: 「でしたら……どうか――双鉄様。\nわたくしと、あなたの妻と……ともに、底まで。奈落まで」
944 = "「Nếu vậy thì……xin ngài——Ngài Soutetsu.\nCùng với em, cùng với người vợ của\nngài……cùng nhau chìm xuống tận đáy. Đến\ntận địa ngục.」"

# monologue
# JP: （くぱああっ）
1850 = "（Mở rộng）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 974 = "「！」" 

# 【ハチロク】
# display as 鈴
# JP: 「わたくし……おまた……おまん、まん……でも」
883 = "「Em……chỗ đó……tiểu huyệt……nhưng mà」"

# monologue
# JP: すずの言葉に震えるように、何度セックスを重ねても、\n色を濁らせぬピンクの膣が、ひくつき僕を誘ってくる。
1667 = "Như rung động trước những lời của Suzu, dù\nđã làm tình bao nhiêu lần,\nâm đạo màu hồng đào không hề vẩn đục ấy\nvẫn đang co giật gọi mời tôi."

# 【ハチロク】
# display as 鈴
# JP: 「それ……から……こちら――んっ」
920 = "「Sau……đó……cả bên này nữa——ưm」"

# monologue
# JP: （むにいいいっ）
1928 = "（Nắn bóp）"

# monologue
# JP: 尻肉を手で寄せ動かして、すずは自ら、アナルを晒す。\n食べた石炭燃え残り――フライアッシュを排出するだけ。
1443 = "Dùng tay vạch hai cánh mông ra, Suzu tự\nmình phơi bày lỗ hậu.\nChỉ để bài tiết than đá cháy dở đã ăn——tức\nlà tro bay."

# monologue
# JP: その目的で設けられているのであろう、\n人のものよりよほど清潔で未熟なアナルを。
1541 = "Chắc hẳn nó được tạo ra vì mục đích đó,\nmột lỗ hậu non nớt và sạch sẽ hơn của con\nngười rất nhiều."

# 【ハチロク】
# display as 鈴
