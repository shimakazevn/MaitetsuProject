[script]
# lines: 464 
# 【双鉄】
# display as 雙鐵
# JP: 「すず……これを着け忘れているぞ」
951 = "「Suzu……em quên cài cái này rồi.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ――」
779 = "「A——」"
# monologue
# JP: 僕の愛するレイルロオドを、僕のおんなを。\nふたりきりのときだけに呼ぶ名で呼んで。
1459 = "Railord mà tôi yêu, người phụ nữ của tôi. Tôi gọi em bằng cái tên chỉ dùng khi hai đứa ở riêng với nhau."
# monologue
# JP: そうしてそっと、花とリボンとの髪飾りを着け、\nその黒髪を彩ってやる。
1471 = "Rồi tôi khẽ cài chiếc kẹp tóc đính hoa và ruy băng, tô điểm thêm cho mái tóc đen của em."
# 【双鉄】
# display as 雙鐵
# JP: 「最後の仕上げは、この高下駄だ」
913 = "「Bước hoàn thiện cuối cùng, là đôi guốc mộc đế cao này.」"
# 【ハチロク】
# display as 鈴
# JP: 「た、畳の上で――高下駄を履いてしまうのですか？」
850 = "「T-Trên chiếu Tatami——mà lại mang guốc mộc đế cao sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや。それでは縁起が悪い」
696 = "「Không. Như thế thì xui xẻo lắm.」"
# monologue
# JP: （ひょい）
1917 = "（Bế bổng）"
# 【ハチロク】
# display as 鈴
# JP: 「ふぁっ」
796 = "「A」"
# monologue
# JP: すずを抱き上げ、目で示すなら、\n抱かれたままにその足を、朱の高下駄で飾ってくれる。
1440 = "Tôi bế bổng Suzu lên, ra hiệu bằng ánh mắt, em ngoan ngoãn để tôi mang đôi guốc mộc đế cao màu đỏ chu sa vào chân trong khi vẫn nằm gọn trong vòng tay tôi."
# monologue
# JP: 可愛い、愛しい、美しい。\nだから思い切り、乱したくなる。
1321 = "Đáng yêu, đáng thương, xinh đẹp. Chính vì thế, tôi càng muốn làm em rối tung lên."
# 【双鉄】
# display as 雙鐵
# JP: 「今は、おまえは。\n僕一人だけのキャンペーンガールだ」
922 = "「Bây giờ, em. Là cô gái đại diện của riêng một mình tôi thôi.」"
# monologue
# JP: 御一夜大詔レトロフェスタ。
1371 = "Lễ hội hoài cổ Taisho Ohimitera."
# monologue
# JP: その催しの看板娘を、飾り立て彩るための華麗な衣装を、\n独り占めして、僕がどろどろに穢してしまう。
1289 = "Cô gái đại diện của sự kiện đó, cùng với bộ trang phục lộng lẫy dùng để tô điểm cho em, tôi sẽ độc chiếm tất cả, và vấy bẩn chúng một cách nhầy nhụa."
# 【ハチロク】
# display as 鈴
# JP: 「今だけではなく、どんなときでも。\nわたくしは――旦那様。あなたひとりの、おんなです」
688 = "「Không chỉ bây giờ, mà bất cứ lúc nào. Em——thưa phu quân. Vẫn luôn là người phụ nữ của riêng ngài.」"
# monologue
# JP: 子供じみ、いささか歪んだその欲望さえ、\nすずは理解し、そのまま受け入れ喜んでくれる。
1342 = "Ngay cả cái dục vọng trẻ con và có phần méo mó đó, Suzu cũng thấu hiểu, sẵn sàng chấp nhận và lấy làm vui sướng."
# monologue
# JP: 腕に感じる重みはそのまま、圧倒的な幸福で、\n自然、足取りも早くなる。
1501 = "Sức nặng cảm nhận được trên cánh tay chính là một niềm hạnh phúc tột độ, khiến bước chân tôi tự nhiên cũng nhanh hơn."
# 【ハチロク】
# display as 鈴
# JP: 「え？　あの……次の間へ向かうのですか？\nあそこは、あまり――」
775 = "「Hả? Dạ……chúng ta sang gian phòng bên cạnh sao ạ? Chỗ đó, có hơi——」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。愛しあうのに適した部屋とは言いがたい」
904 = "「Đúng vậy. Khó có thể nói đó là căn phòng thích hợp để ân ái.」"
# monologue
# JP: が。今日は別だ。
1189 = "Nhưng. Hôm nay thì khác."
# monologue
# JP: この衣装のため、このときのため。\n特別な準備をしておいたから。
1551 = "Vì bộ trang phục này, vì khoảnh khắc này. Tôi đã chuẩn bị một thứ đặc biệt."
# monologue
# JP: （ふわっ）
1831 = "（Nhẹ nhàng）"
# 【ハチロク】
# display as 鈴
# JP: 「まあっ」
# 796 = "「啊」" 
# monologue
# JP: [うこん,1]鬱金の敷布の寝台へ、すずの体を、そっと寝かせる。
1438 = "Tôi nhẹ nhàng đặt cơ thể Suzu xuống chiếc giường trải ga màu vàng nghệ."
# monologue
# JP: 僕を見上げる目が潤んでる。\n唇は、キスを求めて甘やかに小さく開いてる。
1309 = "Đôi mắt ngước nhìn tôi ướt át. Đôi môi khẽ mở ra đầy ngọt ngào, khao khát một nụ hôn."
# 【ハチロク】
# display as 鈴
# JP: 「あ……ん……ちゅっ――ちゅむっ――ンッ――\nふ――っぁ……れろっ――れるっ――ちゅる――ちゅ」
791 = "「A……ưm……chụt——chụm——ưm—— phù——a……liếm——mút——chụt——chụt」"
# monologue
# JP: くちづけすれば、ほどなくすずが侵入してくる。
1145 = "Vừa chạm môi, chẳng mấy chốc Suzu đã chủ động xâm nhập."
# monologue
# JP: 短めの舌を懸命に伸ばし動かして、\n唇の裏、歯の裏、歯茎――口内全てを舐めようとする。
1284 = "Cố gắng vươn dài chiếc lưỡi ngắn ngủi, em muốn liếm láp khắp mặt trong môi, mặt sau răng, nướu——toàn bộ khoang miệng tôi."
# 【ハチロク】
# display as 鈴
# JP: 「チュッ――んっ……チュルッ――れるっ――るっ――\nんっ！？　こくっ――れろっ――れるっ――ちゅるっ」
810 = "「Chụt——ưm……chụt——mút——mút——\nưm!? Ực——liếm——mút——chụt」"
# monologue
# JP: 上から僕が流しこむ、唾液も嬉しげに飲み干しながら、\n一途で律儀な短い舌は、動きを少しも緩めない。
1320 = "Vui vẻ nuốt trọn lượng nước bọt tôi truyền xuống từ phía trên, chiếc lưỡi ngắn ngủi tận tụy và chân thành ấy không hề chậm lại một nhịp nào."
# 【ハチロク】
# display as 鈴
# JP: 「あ……むっ――んっ――ん……チュッ……れるっ――\nンッ――ちゅっ――ちゅうっ――れるっ――れろっ」
793 = "「A……ưm——ưm——ưm……chụt……mút—— ưm——chụt——chùn chụt——mút——liếm」"
# monologue
# JP: 僕の性感を高めるために、自ら性感を得るために、\n淫靡にしつこく、舌を動かし唇を甘く喰みあわせ。
1548 = "Để đẩy khoái cảm của tôi lên cao, và để tự bản thân cũng đạt được khoái cảm, em dai dẳng, dâm đãng uốn lượn chiếc lưỡi, ngọt ngào cắn nhẹ lấy môi tôi."
# monologue
# JP: そうしながらもすずはすりすり、母に甘える子犬のように、\n顔を体を揺り動かして、あどけないほどの甘えをみせる。
1255 = "Vừa làm vậy, Suzu vừa cọ cọ, lắc lư khuôn mặt và cơ thể như một chú cún con nũng nịu mẹ, phô bày sự làm nũng ngây thơ đến lạ."
# 【双鉄】
# display as 雙鐵
# JP: （なんと、愛くるしいものか）
1900 = "（Sao lại có thể đáng yêu đến nhường này chứ）"
# monologue
# JP: 思えば途端、思った言葉にまた情愛を煽られる。\n愛くるしい。
1382 = "Vừa nghĩ đến đó, tình yêu trong tôi lại càng bùng cháy mãnh烈. Thật đáng yêu."
# monologue
# JP: 愛がくるしい。愛ゆえくるしい。\n――愛がこれほど、くるおしい。
1388 = "Yêu đến đau lòng. Vì yêu mà đau lòng. ——Tình yêu lại có thể cuồng si đến vậy."
# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅっ――ぷあっ――あ……双鉄、さま？」
827 = "「Ưm……chụt——phù a——a……Ngài Soutetsu?」"
# monologue
# JP: 感慨にふけった一瞬に、すずに応える舌の動きが、\nおろそかになってしまったらしい。
1271 = "Chìm đắm trong cảm xúc một thoáng, có vẻ như tôi đã lơ là việc dùng lưỡi đáp lại Suzu."
# monologue
# JP: ただそれだけで、\n緋色の瞳はこれほど不安げに僕を見上げる。
1191 = "Chỉ vì thế thôi, mà đôi mắt màu đỏ thẫm ấy lại ngước nhìn tôi đầy vẻ bất an."
# 【双鉄】
# display as 雙鐵
# JP: 「可愛らしいなと思っただけだ。\nお前が僕の妻で本当に幸せだな、と」
879 = "「Tôi chỉ đang nghĩ em đáng yêu quá thôi. Rằng tôi thật sự rất hạnh phúc khi có em làm vợ.」"
# 【ハチロク】
# display as 鈴
# JP: 「まぁ」
771 = "「Ôi.」"
# monologue
# JP: ほっとした顔。\nただでさえ紅潮している頬に、朝焼けのような朱が差す。
1310 = "Khuôn mặt thở phào nhẹ nhõm. Đôi má vốn đã ửng hồng nay lại càng thêm đỏ rực như ánh rạng đông."
# 【ハチロク】
# display as 鈴
# JP: 「わたくしも――あなたが。\n双鉄様が、わたくしの旦那様なことが――ちゅっ」
873 = "「Em cũng vậy——có ngài. Có ngài Soutetsu làm phu quân của em——chụt.」"
# monologue
# JP: また、キス。
1243 = "Lại một nụ hôn."
# monologue
# JP: けれども今度はごく軽い、\n小鳥が餌でもついばむような。
1205 = "Nhưng lần này lại vô cùng nhẹ nhàng, như một chú chim nhỏ đang nhấm nháp thức ăn."
# 【ハチロク】
# display as 鈴
# JP: 「どうしようもなく幸せで、\n時間をこのまま、綴じてしまいたく感じるほどです」
925 = "「Em hạnh phúc đến mức không biết phải làm sao, chỉ muốn thời gian cứ mãi dừng lại ở khoảnh khắc này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「時間、か」
906 = "「Thời gian, sao.」"
# monologue
# JP: かわいいキスのお返しに、\n唇、鼻先、頬、耳、まぶた――黒髪にまでキスをする。
1424 = "Để đáp lại nụ hôn đáng yêu ấy, tôi hôn lên môi, chóp mũi, má, tai, mí mắt——và cả mái tóc đen của em."
# monologue
# JP: 髪の夜空に輝いている月のごときなかんざしが、\n今このときを、永遠のようにも、とても儚くも感じさせる。
1304 = "Chiếc trâm cài tóc lấp lánh như vầng trăng giữa bầu trời đêm trên mái tóc em, khiến khoảnh khắc này mang lại cảm giác vừa như vĩnh cửu, lại vừa quá đỗi mong manh."
# 【双鉄】
# display as 雙鐵
# JP: （すずに――ハチロクに――閉じた時間がなかったのなら。\nもしも眠っていなかったなら）
1946 = "（Nếu Suzu——Hachiroku——không có khoảng thời gian bị đóng băng ấy. Nếu như em không hề chìm vào giấc ngủ）"
# monologue
# JP: つまり、あの事故がなかったのなら、\n僕らは決して出会わずにいた。
1172 = "Nói cách khác, nếu vụ tai nạn đó không xảy ra, chúng tôi sẽ chẳng bao giờ gặp được nhau."
# monologue
# JP: この甘やかなひとときを、僕は永遠に、味わわずにいた。\n失くしたものは……傷は、永遠に消えなくもあるが――
1429 = "Tôi sẽ vĩnh viễn không bao giờ được tận hưởng khoảnh khắc ngọt ngào này. Những thứ đã mất đi……dù cho vết thương có mãi mãi không thể phai mờ, nhưng——"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄様？　――んっ！？　あ……チュッ――んっ――\nふっ――あっ――んむっ――あっ――ふあっ！　あっ！」
971 = "「Ngài Soutetsu? ——Ưm!? A……chụt——ưm—— phù——a——ưm——a——phù a! A!」"
# monologue
# JP: 心配する声を聞きたくなくて、\n閉じ込めるためのキスをして。
1400 = "Không muốn nghe giọng nói đầy lo lắng ấy, tôi trao em một nụ hôn để khóa chặt đôi môi."
# monologue
# JP: そうしてそのまま唇を、舌を、\nなめくじのようにぞろりじわりと這わせてく。
1558 = "Và rồi cứ thế, tôi để đôi môi, chiếc lưỡi của mình, trườn đi trườn lại chậm rãi, nhớp nháp như một con sên."
# 【ハチロク】
# display as 鈴
# JP: 「ん……ふ―あっ――だんな、さまの――舌が……ぬる、\nぬる……と……わたくしの、肌――唾液で、濡ら、して」
821 = "「Ưm……phù——a——chiếc lưỡi——của phu, quân……trơn, trơn……ướt……làm ướt, làn da của em——bằng, nước bọt.」"
# monologue
# JP: 汗を舐め取り、唾液をなすり、綺麗な顎のラインを登る。
1474 = "Liếm sạch mồ hôi, bôi trét nước bọt, tôi trườn lên dọc theo đường nét chiếc cằm thanh tú."
# 【ハチロク】
# display as 鈴
# JP: 「ひっ！？　あ――お耳――んっ――わたくしの、耳――\n旦那、様の舌に――は、……挿入られ――てっ――くぅ」
765 = "「Hí!? A——tai——ưm——tai của, em—— lưỡi của phu, quân——đang,……đút vào——trong——ư.」"
# monologue
# JP: 耳孔を舌で犯しておいて、\nまぶたに、瞳に、キスをする。
1454 = "Sau khi dùng lưỡi xâm phạm lỗ tai em, tôi lại chuyển sang hôn lên mí mắt, lên đôi đồng tử."
# 【ハチロク】
# display as 鈴
# JP: 「舌……あ……こんなに――近く、に――んっ！\nあ――わたくし――目の、たま――なめられ、て……」
938 = "「Lưỡi……a……gần——thế này——ưm! A——nhãn, cầu——của em——đang bị, liếm……」"
# monologue
# JP: 目をそらさない。\nまばたき出来るはずなのに、一瞬たりとも瞼を閉じない。
1280 = "Em không hề ngoảnh mặt đi. Rõ ràng là có thể chớp mắt, nhưng em không hề nhắm lại dù chỉ một giây."
# 【ハチロク】
# display as 鈴
# JP: 「わたしの、瞳……んっ――双鉄、さまに――\nぺろりと――食べられて――しまい、そうっ」
886 = "「Đôi mắt, của em……ưm——sắp bị—— ngài Soutetsu——liếm láp——ăn trọn——mất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――食べるぞ」
798 = "「Ừ——tôi ăn đây.」"
# monologue
# JP: （れろおおおおっっ）
1840 = "（Liếm dài——）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ！」
741 = "「Á!」"
# monologue
# JP: 愛おしくってたまらなくなり、\n涙のラインを描く如くに、頬のラインを舐め落ちる。
1259 = "Tình yêu thương trào dâng đến mức không thể kiềm chế, tôi liếm dọc theo gò má, như đang vẽ lại vệt nước mắt rơi."
# 【ハチロク】
# display as 鈴
# JP: 「ん……あっ――舌……あったかい……んっ――\nや……くびす、じ……んっ――くすぐった――ふぁ」
823 = "「Ưm……a——lưỡi……ấm quá……ưm—— a……sau, gáy……ưm——nhột quá——phù.」"
# monologue
# JP: 首の筋肉のラインを辿って、鎖骨のくぼみを舐めまわす。\nそれから一転やわらかすぎる感触を――
1483 = "Lần theo đường gân cổ, tôi liếm láp hõm xương quai xanh. Rồi chuyển hướng sang một xúc cảm vô cùng mềm mại——"
# monologue
# JP: （れろっ――れるっ――れろおおおお――はぷっ！）
1878 = "（Liếm——mút——liếm dài——ngoạm!）"
# monologue
# JP: ――おっぱいというには平坦すぎて、\nけれども確かに他と違った弾力を持つ、胸を舌先で弄ぶ。
460 = "——Một bộ ngực quá đỗi phẳng lặng để được gọi là vú, nhưng chắc chắn mang một độ đàn hồi khác biệt, tôi dùng đầu lưỡi trêu đùa nó."
# monologue
# JP: 勃起乳首の乳輪まわりを、ぺちゃぺちゃ舐めて、\n感じさせつつ、僕のものだとマーキングする。
1476 = "Liếm láp chùn chụt quanh quầng vú của núm vú đang cương cứng, vừa kích thích khoái cảm cho em, vừa đánh dấu khẳng định đó là vật sở hữu của tôi."
# 【ハチロク】
# display as 鈴
# JP: 「きゅあっ！　あっ、んっ――おっぱい――は――あっ\nきもち……いい、です――だんな、さまぁっ――」
732 = "「Á a! A, ưm——vú——a\nsướng……lắm, ạ——phu, quân——」"
# monologue
# JP: （れろっ――はむっ――ちゅうう――きゅぽっ！）
1880 = "（Liếm——ngoạm——chùn chụt——bật ra!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひあんっ！！！」
760 = "「Hí a!!!」"
# monologue
# JP: 唇だけで小さな蕾を咥えて置いて、\n上へと持ち上げ――自然に離れる力で、放つ。
1448 = "Chỉ dùng môi ngậm lấy nụ hoa nhỏ xíu, kéo nó lên cao——rồi để nó tự tuột ra bằng lực đàn hồi tự nhiên."
# monologue
# JP: （くぽっっ――ちゅうううううっ――ぷりゅんっ！）
1844 = "（Mút——chùn chụt——bật nảy!）"
# 【ハチロク】
# display as 鈴
# JP: 「だんな……さまっ――ふ、ぁっ――すず――の、\nおむね、が――乳首、が――伸び、て――んっ！」
853 = "「Phu……quân——phù, a——ngực, của—— Suzu——núm vú, bị——kéo dài, ra——ưm!」"
# 【双鉄】
# display as 雙鐵
# JP: （伸びなどすまい。これほどの張りと弾力なのだ）
1939 = "（Làm sao mà kéo dài ra được chứ. Nó căng tròn và đàn hồi đến mức này cơ mà.）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃん！　また――ふ……ぁんっ！！！　ん……\nおっぱい……じんじん――シビレて――感じ、てっ」
739 = "「Á! Lại nữa——phù……a!!! Ưm…… vú……tê rần——tê dại——sướng, quá.」"
# monologue
# JP: （ちゅむううううううううう――――つぷんっ！！）
1868 = "（Mút mạnh————bật ra!!）"
# 【ハチロク】
# display as 鈴
# JP: 「んゆぅっっっ！！！！」
845 = "「Ưm yuuuu!!!!」"
# monologue
# JP: 最初からずっと勃起していたすずの乳首は、\n吸って離しを繰り返すうち、さらに大きくなっている。
1525 = "Núm vú của Suzu vốn đã cương cứng ngay từ đầu, sau nhiều lần bị mút rồi nhả ra, giờ lại càng sưng to hơn."
# monologue
# JP: 乳首の赤みも鮮やかになり――\nいや、これは――
1175 = "Sắc đỏ của núm vú cũng trở nên tươi tắn hơn—— không, thế này là——"
# monologue
# JP: （ちゅぱっ）
1862 = "（Chụt）"
# 【ハチロク】
# display as 鈴
# JP: 「あっ」
# 796 = "「啊」" 
# monologue
# JP: 口全体で、赤子がするように胸を含めば、\nすずは安心した声を出す。
1450 = "Tôi dùng cả khuôn miệng ngậm lấy bầu ngực như một đứa trẻ khát sữa, Suzu khẽ thốt lên một tiếng đầy an tâm."
# 【双鉄】
# display as 雙鐵
# JP: （れろっ――れろっ――ぺろっ――ぺろっ――）
1881 = "（Liếm——liếm——liếm——liếm——）"
# monologue
# JP: 傷口を舐めて消毒していくイメージで、\n慎重に、ごく穏やかに柔らかに、乳首をしゃぶる。
1451 = "Tưởng tượng như đang liếm để sát trùng vết thương, tôi mút mát núm vú một cách cẩn thận, vô cùng điềm tĩnh và nhẹ nhàng."
# 【ハチロク】
# display as 鈴
# JP: 「ふぁ……あっ――それ……ここち……いい……\n双鉄……様の……舌……さっきは――あれ、ほどっ」
813 = "「Phù……a——như thế……dễ……chịu quá…… lưỡi……của ngài……Soutetsu……ban nãy——rõ ràng, là.」"
# monologue
# JP: 『さっきはあれほどあつかったのに』\n吐息に飲まれてしまった言葉を、乳首の熱が伝えてくれる。
468 = "『Ban nãy rõ ràng là nóng bỏng đến thế mà』 Sức nóng từ núm vú đã truyền đạt lại những lời nói bị nuốt chửng bởi tiếng thở dốc ấy."
# monologue
# JP: 一時に、あまりに乳首を弄びすぎてしまったせいで、\n性的快感だけでなく、腫れぼったくもなってるようだ。
1264 = "Chỉ vì một lúc trêu đùa núm vú quá trớn, mà giờ đây nó không chỉ mang lại khoái cảm tình dục, mà dường như còn hơi sưng tấy lên."
# 【双鉄】
# display as 雙鐵
# JP: （ぺろっ――れろっ――れるっ――ぺりゅっ）
1944 = "（Liếm——liếm——mút——liếm）"
# 【ハチロク】
# display as 鈴
# JP: 「ん……は……ぁ……きもち……良く……て……あ、\nわた、くしっ――は――ぁっ――乳首……とけ、そうっ」
824 = "「Ưm……hà……a……sướng……quá……a, em——hà——a——núm vú……sắp tan, chảy mất.」"
# monologue
# JP: （くちゅんっ）
1837 = "（Nhóp nhép）"
# monologue
# JP: 無意識にだろう。
1286 = "Chắc là trong vô thức."
# monologue
# JP: すずがすりあわせた股の付け根が、\nそれこそ溶けきった水音を出す。
1661 = "Suzu cọ xát hai gốc đùi vào nhau, phát ra âm thanh róc rách như thể đã tan chảy hoàn toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「構わんぞ？　溶けたら僕が飲んでやろう」
915 = "「Không sao đâu? Nếu tan chảy ra thì tôi sẽ uống cạn nó.」"
# monologue
# JP: （つぷうぅぅ）
1824 = "（Phập）"
# 【ハチロク】
# display as 鈴
# JP: 「んきゅううんんんっ！！！」
844 = "「Ưm kiuu ưm ưm!!!」"
# monologue
# JP: 狭くて熱い膣内へ、\nけれども指は、圧されながら飲み込まれていく。
1576 = "Tiến vào bên trong âm đạo chật hẹp và nóng rực, nhưng ngón tay vẫn bị ép chặt và nuốt chửng lấy."
# monologue
# JP: （きゅっ！　きゅうううっ！　にゅるっ！　にゅううっ）
1883 = "（Thít! Siết chặt! Trơn tuột! Lún sâu）"
# 【ハチロク】
# display as 鈴
# JP: 「はっ！　あっ！　あっ！　あっ！！！」
770 = "「Hà! A! A! A!!!」"
# monologue
# JP: まだ動かしてもいないのに、\nすずはイヤイヤと首を振る。
1482 = "Tôi còn chưa kịp cử động,\nSuzu đã lắc đầu nguầy nguậy."
# monologue
# JP: 膣はもう、ひっきりなしに蠕動していて、\n蠢きながら締めつけ、指から精を絞り出そうと責め立てる。
1689 = "Âm đạo đã không ngừng nhu động từ nãy đến giờ, vừa ngọ nguậy vừa siết chặt, thúc ép như muốn vắt kiệt tinh dịch từ ngón tay tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「すず――かわいいぞ」
946 = "「Suzu——đáng yêu lắm.」"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄……様っ――指っ……だめ――です――\nすこ、し……おゆるめ――くだ、さいっ」
966 = "「Ngài Soutetsu……ngón tay……không được——đâu ạ—— xin ngài……nới lỏng——một chút, đi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「緩めるも何も。僕は全く動いてないぞ？」
700 = "「Nới lỏng cái gì chứ. Tôi hoàn toàn chưa hề cử động mà?」"
# monologue
# JP: 事実が明確に伝わるように、\n膣内に指を刺したまま、体全部の動きを止める。
1547 = "Để sự thật được truyền đạt một cách rõ ràng, tôi giữ nguyên ngón tay trong âm đạo, và dừng mọi chuyển động của cơ thể."
# monologue
# JP: （にゅぶっ！　にゅっ！！　にゅくっ！　にゅぶんっ！）
1869 = "（Mút! Siết!! Thít! Nhóp nhép!）"
# monologue
# JP: けれども音は止まらない。
1203 = "Nhưng âm thanh vẫn không hề dừng lại."
# monologue
# JP: 僕の中指は根本まで、すずの膣内に飲まれては、\n浅く外へ吐き出されてを繰り返す。
1457 = "Ngón giữa của tôi bị âm đạo của Suzu nuốt trọn đến tận gốc, rồi lại bị nhả ra nông nông, cứ lặp đi lặp lại như thế."
# 【ハチロク】
# display as 鈴
# JP: 「え？　あ――あっ！　いやっ！　わたくし――\nわたくし、体っ――こんな、みだらに――はしたなくっ」
773 = "「Hả? A——a! Không! Em—— cơ thể, của em——lại dâm đãng——đê tiện, thế này.」"
# monologue
# JP: （くちゅっ！　ずちゅっ！　くちゅんっ！　ちゅぷっ！）
1836 = "（Nhóp nhép! Phập! Chụt! Bóp!）"
# monologue
# JP: それが意味するところを理解し、顔を真っ赤に恥じ入って。\nそれでもすずは、腰の動きを止められない。
1514 = "Hiểu được ý nghĩa của hành động đó, khuôn mặt em đỏ bừng vì xấu hổ. Nhưng Suzu vẫn không thể dừng chuyển động của hông lại được."
# 【ハチロク】
# display as 鈴
# JP: 「いや、ですっ――んっ……ふ、あっ――だんな、さ、ま\n――あ！　お指、で――でも――一人で――イク、など」
694 = "「Không, muốn đâu——ưm……phù, a——phu, quân ——a! Bằng ngón, tay——nhưng mà——lên đỉnh——một mình, thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
800 = "「Ừ.」"
# monologue
# JP: 膣はほとんど痙攣に近い収縮をして、\nすずが達する瞬間は、もうほどなくだと伝えて来てる。
1690 = "Âm đạo co thắt gần như co giật, báo cho tôi biết khoảnh khắc Suzu lên đỉnh đã sắp đến gần."
# monologue
# JP: ならば、一人で――一人遊びでなどイカせまい。\n僕が一緒に――僕のこの手と、この舌で。
1488 = "Nếu vậy, tôi sẽ không để em phải lên đỉnh một mình——hay tự sướng một mình đâu. Tôi sẽ cùng em——bằng đôi tay này, và chiếc lưỡi này."
# monologue
# JP: （はむっ！）
1906 = "（Ngoạm!）"
# 【ハチロク】
# display as 鈴
# JP: 「んひゅっ！！　ふ――あっ！　あっ！　あっ！！」
837 = "「Ưm hứ!! Phù——a! A! A!!」"
# monologue
# JP: （じゅぶっ！　じゅぼっ！　ずぼっ！　ずびゅっ！！）
1871 = "（Chụt! Mút! Phập! Phụt!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ぁきゅ！　んっ！　はっ――しゅごっ！　ふ、あっ――\nおっぱい、も――おまん、まん――もぉっ！！！！」
802 = "「A kiu! Ưm! Hà——sướng quá! Phù, a—— vú, cũng——cô, bé——cũng!!!!」"
# monologue
# JP: （ちゅうっ――ちゅう――ちゅう――ちゅうっ）
1867 = "（Chùn chụt——chùn chụt——chùn chụt——chùn chụt）"
# 【ハチロク】
# display as 鈴
# JP: 「舌……べろっ――だんな、さまっつ――双鉄、\nさまの――おっぱい――ちゅうちゅう――可愛く、てっ」
939 = "「Lưỡi……lưỡi——phu, quân——của ngài, Soutetsu——đang chùn chụt——vú em——đáng yêu, quá.」"
# monologue
# JP: 乳首は、あくまで静かに優しく。\nむしろ癒やしを与えるように、舌の動きも最小限に。
1477 = "Với núm vú, tôi vẫn giữ sự nhẹ nhàng và từ tốn. Thậm chí chuyển động của lưỡi cũng được giảm thiểu tối đa, như thể đang xoa dịu em."
# monologue
# JP: （ずびょ！　じゅぼっ！　ぶちゅっ！　ばぢゅっ！！！）
1823 = "（Phập! Mút! Bạch! Chụt!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃぎゅっ！？　あ――キツ――きつ――ん、あっ！！\nおまん、まんっ――は、ぁ――えぐれっ、えぐれてっ！」
738 = "「Á hự!? A——khít——khít quá——ưm, a!! Cô, bé——hà, a——bị khoét, bị khoét sâu quá!」"
# monologue
# JP: （きゅんっ！　きゅうううううっ！　きゅきゅっ！）
1931 = "（Thít! Siết chặt! Co thắt!）"
# monologue
# JP: 指一本だ。\n二本ではなく、中指だけだ。
1447 = "Chỉ một ngón tay. Không phải hai ngón, chỉ duy nhất ngón giữa."
# monologue
# JP: であるというのに、締め付けは強く痛みを感じそうなほど。\nこれが僕の勃起であるなら――思えば、更に高まっていく。
1649 = "Vậy mà lực siết chặt lại mạnh đến mức gần như gây đau đớn. Nếu đây là cậu bé đang cương cứng của tôi thì——càng nghĩ, sự hưng phấn lại càng dâng trào."
# monologue
# JP: （じゅぼっ！　ずびゅっ！　じょばっ！　ばぢゅっ！！）
1864 = "（Mút! Phụt! Róc rách! Bạch!!）"
# 【ハチロク】
# display as 鈴
# JP: 「らめっ――れす――ん、だめっ！　そう、てつ、さまぁ\n――おまん、まん――の、おつ、ゆ――ひゅぎゅっ！？」
690 = "「Không——được——ưm, không được! Ngài, Soutetsu ——dịch, nhờn——của, cô bé——hí hự!?」"
# monologue
# JP: （つん――つん――クリュッ――むにゅ！）
1908 = "（Chọc——chọc——miết——nắn!）"
# monologue
# JP: 中指思いっきりに伸ばしたままに、親指も伏せ硬くして、\nすずのおまんまんに沿わせるように当て、擦る。
1161 = "Giữ nguyên ngón giữa duỗi thẳng hết cỡ, ngón cái gập lại cho cứng cáp, áp dọc theo cô bé của Suzu rồi chà xát."
# 【ハチロク】
# display as 鈴
# JP: 「あっ！　あっ！　あっ！　あっ！　双鉄、さまっ！\nふ――きゅっ！　双鉄、さま――だんな、さまぁ！」
806 = "「A! A! A! A! Ngài Soutetsu! Phù——kiu! Ngài Soutetsu——phu, quân!」"
# monologue
# JP: （きゅきゅっっ――ぷちゅっ！！）
1859 = "（Co thắt——bạch!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おっ」
776 = "「Ồ.」"
# monologue
# JP: 膣からおつゆが弾け出る。\n外側さえもぬかるみ熱くて、僕の手指と融け合っている。
1691 = "Dịch nhờn bắn ra từ âm đạo. Ngay cả bên ngoài cũng lầy lội, nóng rực, hòa quyện với những ngón tay của tôi."
# monologue
# JP: もう止まらないし、止まれない。\nこのまま一気にすずをイかせて――
1397 = "Không thể dừng lại, và cũng không muốn dừng lại nữa. Cứ thế này, tôi sẽ khiến Suzu lên đỉnh trong một hơi——"
# monologue
# JP: （ぎゅっ！！）
1915 = "（Ôm chặt!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
974 = "「!」"
# monologue
# JP: すずの腕が僕の頭を――
1659 = "Vòng tay Suzu ôm lấy đầu tôi——"
# monologue
# JP: おっぱいをまだちゅうちゅうしてる僕の頭を、、\n甘やかに強く掻き抱く。
1480 = "Ôm ghì lấy cái đầu vẫn đang chùn chụt mút vú của tôi, một cái ôm thật ngọt ngào và mạnh mẽ."
# 【ハチロク】
# display as 鈴
# JP: 「そうてつ、さまっ！　ふ――あっ！　だんな、さまっ！\nわた――くし――わた、し、の――愛おしい――方っ！」
968 = "「Ngài, Soutetsu! Phù——a! Phu, quân! Người——mà——em, vô cùng——yêu, thương!」"
# monologue
# JP: 一人ではなく。\nすずだけ先に達しようとも、僕らふたりでセックスしてる。
1404 = "Không phải một mình. Dù Suzu có lên đỉnh trước, thì cả hai chúng tôi vẫn đang cùng nhau làm tình."
# monologue
# JP: そんな想いが、腕のぬくもり、抱く強さから伝わって――\n可愛くて、切なくて。どうしようもなく愛おしくなる。
1430 = "Suy nghĩ ấy truyền đến từ hơi ấm của vòng tay, từ sức mạnh của cái ôm—— Đáng yêu, và xót xa. Khiến tôi yêu thương em đến mức không thể kiềm chế nổi."
# 【双鉄】
# display as 雙鐵
# JP: 「すず」
953 = "「Suzu.」"
# monologue
# JP: （きゅんっ！）
1874 = "（Thít!）"
# monologue
# JP: だから名を呼ぶ。\n僕だけの名を。
1487 = "Vì thế, tôi gọi tên em.\nCái tên của riêng tôi."
# monologue
# JP: そうして再び、平たい胸へとむしゃぶりつく。
1556 = "Và rồi một lần nữa, tôi vùi mặt vào khuôn ngực phẳng lì ấy."
# monologue
# JP: （はぷっ）
1897 = "（Ngoạm）"
# 【ハチロク】
# display as 鈴
# JP: 「んひゅんっっっ！！」
836 = "「Ưm hiun!!!」"
# monologue
# JP: （きゅううううううっ！！！）
1932 = "（Siết chặt!!!）"
# monologue
# JP: たったそれだけの刺激でさえも、\n今のすずには十分すぎて。
1652 = "Chỉ một chút kích thích đó thôi, cũng đã là quá đủ đối với Suzu lúc này."
# monologue
# JP: 膣から伝わる絶頂感を、\nひときわ高めてやりたくなって！
1435 = "Cảm giác lên đỉnh truyền đến từ âm đạo, khiến tôi muốn đẩy nó lên cao trào hơn nữa!"
# monologue
# JP: （ずぶううううううううううううううううっ！！！）
1820 = "（Phập!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひぎゅっ！？　あっ――ひ、きゅぅぅぅぅぅぅぅ！！」
736 = "「Hí gư!? A——hí, kiuuuuuuu!!」"
# monologue
# JP: （きゅううううううううんっ！！！）
1929 = "（Thít chặt!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くおっ！！」
777 = "「Ư ô!!」"
# monologue
# JP: 中指が、もぎ取られそうな締め付けと、\n甘くかわいいからだの震えと。
1325 = "Ngón giữa bị siết chặt như muốn đứt lìa, cùng với sự run rẩy ngọt ngào và đáng yêu của cơ thể em."
# 【ハチロク】
# display as 鈴
# JP: 「ひあ――あっ――あっ――ふあっ――あっ！！」
731 = "「Hí a——a——a——phù a——a!!」"
# monologue
# JP: 腰を浮かせるようにして、ひくひく、すずは震え続ける。
1658 = "Hông nảy lên, Suzu tiếp tục run rẩy từng hồi."
# monologue
# JP: 融け合うように密着しきった中指と膣――\nけれどもそこから、ピっ、ピと溢れた蜜が弾ける。
1585 = "Ngón giữa và âm đạo áp sát vào nhau như thể hòa tan—— nhưng từ đó, những giọt mật trào ra vẫn bắn lên lép bép."
# 【双鉄】
# display as 雙鐵
# JP: 「すず…」
952 = "「Suzu…」"
# 【ハチロク】
# display as 鈴
# JP: 「ん……きゅっ――ふぁああああんっ！！！」
819 = "「Ưm……kiu——phù a a a a a!!!」"
# monologue
# JP: 中指をじわじわ引き抜けば、\nすずはまた、膣を激しく収縮させて震えてしまう。
1394 = "Từ từ rút ngón giữa ra, Suzu lại một lần nữa co thắt âm đạo dữ dội và run rẩy."
# monologue
# JP: シーツの鬱金がすずの愛液に濡らされて、\n重い茶となり、肌の白さをよりいっそうに映えさせる。
1361 = "Màu vàng nghệ của ga trải giường bị thấm đẫm ái dịch của Suzu, chuyển thành màu nâu sẫm, càng làm tôn lên làn da trắng ngần của em."
# 【双鉄】
# display as 雙鐵
# JP: 「すず――僕もだ」
948 = "「Suzu——tôi cũng vậy.」"
# 【ハチロク】
# display as 鈴
# JP: 「は、はい、双鉄様――あっ！？」
898 = "「V-Vâng, ngài Soutetsu——a!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
# 796 = "「啊」" 
# monologue
# JP: あるいは口で、愛してくれようとしたのだろうか。
1694 = "Có lẽ em định dùng miệng để ân ái với tôi chăng."
# monologue
# JP: 身を起こそうとしたすずは、けれども脱力しきったままに、\n姿勢をごろりと崩してしまう。
1380 = "Suzu cố gắng gượng dậy, nhưng vì đã hoàn toàn kiệt sức, nên tư thế liền đổ gục xuống."
# 【ハチロク】
# display as 鈴
# JP: 「も、申し訳ございません、だんなさま――ひゃっ！？」
711 = "「T-Thật có lỗi quá, thưa phu quân——á!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「申し訳なくなど」
712 = "「Có gì đâu mà có lỗi.」"
# monologue
# JP: （さわっ――さすっ――むにっ――もにっ――）
1934 = "（Chạm nhẹ——vuốt ve——nắn——bóp——）"
# 【ハチロク】
# display as 鈴
# JP: 「ふぁっ……ふっ……は……あ……お尻、も……いま、は\n……達した……ばか、り……で……敏感……んううっ！」
812 = "「Phù a……phù……hà……a……mông, cũng……bây giờ, thì ……vừa mới……lên đỉnh……xong……nên rất nhạy cảm……ưm ư!」"
# monologue
# JP: 丸く、ま白く、つややかな尻。\n衣装の黒との対比によって、白さを一層際立てる尻。
1300 = "Cặp mông tròn trịa, trắng nõn, bóng bẩy. Sự tương phản với màu đen của trang phục càng làm nổi bật thêm độ trắng sáng của nó."
# monologue
# JP: それがぷりんと、甘く震えて、\nたっぷり蜜を滴らせ、僕を誘ってくれている。
1330 = "Nó nảy lên, run rẩy đầy ngọt ngào, nhỏ giọt mật tràn trề, mời gọi tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「むしろ、僕には申し分無い。\n挿入したい気持ちを、この上なく煽られてるよ」
878 = "「Ngược lại, với tôi thế này là quá tuyệt vời. Cảm giác muốn đút vào đang bị kích thích tột độ đây này.」"
# monologue
# JP: （むにいいっ！）
1919 = "（Nắn bóp!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひあっ！　んっ――お尻――ふあっ――お尻、も……\nです、から――今、は……んっ――んくぅぅぅ～～っ」
759 = "「Hí a! Ưm——mông——phù a——mông, cũng…… mà——bây giờ, thì……ưm——ưm kuuu~~」"
# monologue
# JP: だから、あえての愛撫を重ねる。\n最高に昂めあえてる状態で、最高のすずを貫けるよう。
1493 = "Vì thế, tôi cố tình vuốt ve em nhiều hơn nữa. Để có thể đâm xuyên qua một Suzu tuyệt vời nhất, trong trạng thái hưng phấn tột đỉnh nhất."
# monologue
# JP: （もにゅっ――みゅっ――もにゅっ――にゅるんっ）
1889 = "（Bóp——nắn——bóp——trơn tuột）"
# monologue
# JP: すずの汗、僕の汗。\nそれから腿に、いくらでも滴ってくる甘い蜜。
1664 = "Mồ hôi của Suzu, mồ hôi của tôi. Rồi cả dòng mật ngọt không ngừng nhỏ giọt xuống đùi em."
# monologue
# JP: 普段であっても感度十分な双峰を、\n両手を使って、雫を掬って、揉み込むように愛撫する。
1267 = "Dùng cả hai tay, hứng lấy những giọt sương, tôi xoa bóp, ái ân hai bầu ngực vốn dĩ đã vô cùng nhạy cảm ngay cả trong lúc bình thường."
# monologue
# JP: （くちゅっ！――ぷりゅん！　もみゅ、みゅにゅぅっ！）
1835 = "（Nhóp nhép!——Bật nảy! Nắn, bóp!）"
# 【ハチロク】
# display as 鈴
# JP: 「は……ぁ……く……は――ふ……あっ――だんな、さま、\nの、手……ん……お尻……ひら……い、てっ――」
485 = "「Hà……a……ư……hà——phù……a——bàn tay, của…… phu, quân……ưm……đang banh……mông, ra——」"
# 【双鉄】
# display as 雙鐵
# JP: （ふうっ）
1832 = "（Phù）"
# 【ハチロク】
# display as 鈴
# JP: 「きゃふぅっ！！！」
737 = "「Á phù!!!」"
# monologue
# JP: 尻肉の奥にすぼまっている小さな蕾に息をかければ、\nすずの背中がひくひく蠢く。
1419 = "Chỉ cần thổi nhẹ vào nụ hoa nhỏ xíu đang khép nép sâu giữa hai cánh mông, tấm lưng Suzu liền giật giật ngọ nguậy."
# monologue
# JP: ……鎖骨、それから背骨のライン。\nそんなところまで美しいなと、今更ながらしみじみ思う。
475 = "……Xương quai xanh, rồi đến đường gân dọc sống lưng. Đến tận bây giờ tôi mới thấm thía nhận ra, ngay cả những nơi như vậy cũng thật đẹp đẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「どちらが――欲しい？」
706 = "「Em muốn——bên nào?」"
# monologue
# JP: （つううううううううううう――――つぷんっ！）
1818 = "（Trượt dài————phập!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひっ――ああっ――指――おしり、にっ――」
785 = "「Hí——aa——ngón tay——vào, mông——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ここ、か――」
901 = "「Chỗ này, à——」"
# monologue
# JP: アナルは、小指で。
1337 = "Với hậu môn, tôi dùng ngón út."
# monologue
# JP: 優しく優しく撫ぜまわした後\n先端だけを、焦らすようにして浅ぁく沈める。
1269 = "Sau khi vuốt ve thật nhẹ nhàng, thật dịu dàng, tôi chỉ nhấn phần đầu ngón tay vào thật nông, như thể đang trêu chọc em."
# monologue
# JP: （きちぃぃぃぃぃ！）
1903 = "（Khít quá!）"
# monologue
# JP: 径のあってないゴムパッキンに、\n無理やり指をねじ込むような。
1340 = "Cảm giác giống như đang cố nhét ngón tay vào một miếng đệm cao su không vừa kích cỡ vậy."
# monologue
# JP: （くりっ――くりゅんっ！！）
1927 = "（Xoáy——miết mạnh!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひあっ――あっ――あっ――らめっ――れすぅ！\nひまっ――い、いま――は、まだ――敏感、れっ！」
757 = "「Hí a——a——a——không——được đâu! Bây giờ——b, bây giờ——vẫn còn——rất nhạy cảm, ạ!」"
# monologue
# JP: ……それでも指を動かせば、\nキツイまま応え、広がってくれる。
472 = "……Dù vậy khi tôi cử động ngón tay, lỗ hậu chật hẹp vẫn phản hồi lại và mở rộng ra."
# monologue
# JP: アナルの門の感触は、幾度触れても挿入しても、\nその度僕を感動させる。
1607 = "Cảm giác ở cửa lỗ hậu, dù có chạm vào hay đút vào bao nhiêu lần đi chăng nữa, lần nào cũng khiến tôi cảm động."
# 【双鉄】
# display as 雙鐵
# JP: 「それとも――」
942 = "「Hay là——」"
# 【ハチロク】
# display as 鈴
# JP: 「ああっ」
# 800 = "「啊啊」" 
# monologue
# JP: 期待に震え濡れている声。\nそれに応えて、再び中指を大きく伸ばす。
1265 = "Giọng nói ướt át run rẩy vì mong đợi. Đáp lại điều đó, tôi lại đưa ngón giữa vào sâu hơn."
# 【ハチロク】
# display as 鈴
# JP: 「っ！　（ごくっ）」
814 = "「っ! （Ực）」"
# monologue
# JP: 加えて、人差し指も添えれば、\nすずははっきり、喉を鳴らして息を呑み込み唾を飲む。
1233 = "Thêm vào đó, khi tôi đưa thêm cả ngón trỏ vào, Suzu rõ ràng đã kêu lên trong cổ họng, nín thở và nuốt nước bọt."
# 【双鉄】
# display as 雙鐵
# JP: 「こちらか？」
902 = "「Bên này sao?」"
# monologue
# JP: （づっ）
1830 = "（Phập）"
# 【ハチロク】
# display as 鈴
# JP: 「あっ！？」
808 = "「A!?」"
# monologue
# JP: あえての、第一関節まで。\nそこまで挿れて動きを止めれば、すずの視線が縋ってくる。
1416 = "Tôi cố tình chỉ đút đến đốt ngón tay đầu tiên. Chỉ đút đến đó rồi dừng lại, ánh mắt Suzu liền nhìn tôi cầu xin."
# monologue
# JP: だが、動かない。\nすずのさっきの自分を恥じてか、汗を流して我慢する。
1200 = "Nhưng tôi không cử động. Suzu có lẽ đang xấu hổ vì bản thân lúc nãy, đổ mồ hôi hột cố gắng chịu đựng."
# 【ハチロク】
# display as 鈴
# JP: 「はぁっ――はぁっ――はぁっ――はぁっ――」
784 = "「Haa——haa——haa——haa——」"
# monologue
# JP: すずの荒いだ吐気を聞くたび、\n勃起はビクビク暴れてしまう。
1539 = "Mỗi lần nghe thấy tiếng thở dốc của Suzu, côn thịt đang cương cứng lại giật giật bạo động."
# 【ハチロク】
# display as 鈴
# JP: 「あっ……（ごくっ）――ふぅ……ふぅ――ふぅ、ふぅ」
795 = "「A……（Ực）——phù……phù——phù, phù」"
# monologue
# JP: すずにも確認できたのだろうか？\n視線が股間に釘付けとなり、荒い呼吸が早くなる。
1277 = "Có lẽ Suzu cũng nhận ra rồi sao? Ánh mắt em dán chặt vào đũng quần tôi, nhịp thở dốc càng lúc càng nhanh."
# monologue
# JP: （くちいっ！）
1876 = "（Nhóp nhép!）"
# 【ハチロク】
# display as 鈴
# JP: 「っ！！！」
976 = "「っ!!!」"
# monologue
# JP: 腰が、動いた。\n水音が示した事実に、すずはいやいやと首を振り――
1306 = "Eo em, đã cử động. Trước sự thật mà tiếng nước đã chứng minh, Suzu liên tục lắc đầu——"
# monologue
# JP: それからきゅっと口を結んで、\n振り絞るような声をだす。
1557 = "Sau đó em mím chặt môi, cất lên giọng nói như bị vắt kiệt."
# 【ハチロク】
# display as 鈴
# JP: 「はしたない……おんなと……どうか、どうか……\nご軽蔑、なさらないで……ください、まし――ね？」
965 = "「Một người phụ nữ……dâm đãng……xin ngài, xin ngài…… đừng, khinh miệt em……có được không——ạ?」"
# monologue
# JP: （にゅぽっ）
1870 = "（Phập）"
# 【ハチロク】
# display as 鈴
# JP: 「んっ！！」
847 = "「Ưm!!」"
# monologue
# JP: それだけ聞けば、答えの全てを聞いたももはや同然で。
1596 = "Chỉ cần nghe bấy nhiêu thôi, cũng giống như đã nghe được toàn bộ câu trả lời rồi."
# monologue
# JP: けれども、口で言って欲しくて、\nすずの膣から指を抜く。
1202 = "Tuy nhiên, vì muốn em tự nói ra bằng miệng, tôi rút ngón tay khỏi âm đạo của Suzu."
# 【双鉄】
# display as 雙鐵
# JP: 「おまえに答えを強いている――\n僕の方がよほど、はしたなく、浅ましい男だろうさ」
865 = "「Ép buộc em phải trả lời—— Anh mới là một gã đàn ông đê tiện và dâm đãng hơn nhiều đấy.」"
# 【ハチロク】
# display as 鈴
# JP: 「でしたら……どうか――双鉄様。\nわたくしと、あなたの妻と……ともに、底まで。奈落まで」
944 = "「Nếu vậy thì……xin ngài——Ngài Soutetsu. Cùng với em, cùng với người vợ của ngài……cùng nhau chìm xuống tận đáy. Đến tận địa ngục.」"
# monologue
# JP: （くぱああっ）
1850 = "（Mở rộng）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 974 = "「！」" 
# 【ハチロク】
# display as 鈴
# JP: 「わたくし……おまた……おまん、まん……でも」
883 = "「Em……chỗ đó……tiểu huyệt……nhưng mà」"
# monologue
# JP: すずの言葉に震えるように、何度セックスを重ねても、\n色を濁らせぬピンクの膣が、ひくつき僕を誘ってくる。
1667 = "Như rung động trước những lời của Suzu, dù đã làm tình bao nhiêu lần, âm đạo màu hồng đào không hề vẩn đục ấy vẫn đang co giật gọi mời tôi."
# 【ハチロク】
# display as 鈴
# JP: 「それ……から……こちら――んっ」
920 = "「Sau……đó……cả bên này nữa——ưm」"
# monologue
# JP: （むにいいいっ）
1928 = "（Nắn bóp）"
# monologue
# JP: 尻肉を手で寄せ動かして、すずは自ら、アナルを晒す。\n食べた石炭燃え残り――フライアッシュを排出するだけ。
1443 = "Dùng tay vạch hai cánh mông ra, Suzu tự mình phơi bày lỗ hậu. Chỉ để bài tiết than đá cháy dở đã ăn——tức là tro bay."
# monologue
# JP: その目的で設けられているのであろう、\n人のものよりよほど清潔で未熟なアナルを。
1541 = "Chắc hẳn nó được tạo ra vì mục đích đó, một lỗ hậu non nớt và sạch sẽ hơn của con người rất nhiều."
# 【ハチロク】
# display as 鈴
# JP: 「わたくし……の……お尻……はぅっ……そ、その――\nアナル、でも……わたくし、わたくし――双鉄、様、を」
885 = "「Của em……mông……haư……c, cái đó—— lỗ hậu, nhưng mà……em, em——Ngài Soutetsu, em muốn ngài」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 800 = "「啊啊」" 
# monologue
# JP: 待たない。待てない。\n一気に貫く！
1579 = "Không chờ nữa. Không thể chờ được nữa. Một mạch đâm xuyên qua!"
# monologue
# JP: （みちいいいいいいいいいいいいいいいいいっ！！！！）
1811 = "（Phậpppppppppppppppppppppp!!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「い"ぎゅっっっっっ！？」
761 = "「Í aaaaaa!?」"
# monologue
# JP: すずらしからぬ、まるで獣の悲鳴のような――\n自分の制御を完全に、できずに漏らしてしまってる声。
1665 = "Một tiếng thét không giống Suzu chút nào, cứ như tiếng kêu của dã thú—— Một giọng nói lọt ra khi em hoàn toàn không thể kiểm soát được bản thân."
# 【ハチロク】
# display as 鈴
# JP: 「か……は……あっ――ぐっ――んっ――そ――ん、な、\nいき、なり――いき――なりッ――んきゅうう！！？」
745 = "「A……ha……a——ư——ưm——như——vậy, đột, nhiên——đột——nhiên——ưn kyuuu!!?」"
# monologue
# JP: （ずろおおおおおおおおおお！！！）
1826 = "（Phậppppppppppp!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「っ！！！！！！！！！！」
807 = "「っ!!!!!!!!!!」"
# monologue
