1337 = "Với hậu môn, tôi dùng ngón út."

# monologue
# JP: 優しく優しく撫ぜまわした後\n先端だけを、焦らすようにして浅ぁく沈める。
1269 = "Sau khi vuốt ve thật nhẹ nhàng, thật dịu\ndàng,\ntôi chỉ nhấn phần đầu ngón tay vào thật\nnông, như thể đang trêu chọc em."

# monologue
# JP: （きちぃぃぃぃぃ！）
1903 = "（Khít quá!）"

# monologue
# JP: 径のあってないゴムパッキンに、\n無理やり指をねじ込むような。
1340 = "Cảm giác giống như đang cố nhét ngón tay\nvào một miếng đệm cao su không vừa kích cỡ\nvậy."

# monologue
# JP: （くりっ――くりゅんっ！！）
1927 = "（Xoáy——miết mạnh!!）"

# 【ハチロク】
# display as 鈴
