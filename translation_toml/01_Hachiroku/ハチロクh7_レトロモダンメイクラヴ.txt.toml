1416 = "Tôi cố tình chỉ đút đến đốt ngón tay đầu\ntiên.\nChỉ đút đến đó rồi dừng lại, ánh mắt Suzu\nliền nhìn tôi cầu xin."

# monologue
# JP: だが、動かない。\nすずのさっきの自分を恥じてか、汗を流して我慢する。
1200 = "Nhưng tôi không cử động.\nSuzu có lẽ đang xấu hổ vì bản thân lúc\nnãy, đổ mồ hôi hột cố gắng chịu đựng."

# 【ハチロク】
# display as 鈴
