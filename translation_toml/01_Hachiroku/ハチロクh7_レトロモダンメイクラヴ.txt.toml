# ハチロクh7_レトロモダンメイクラヴ.txt 
[info]

[characters]
1244 = "双鉄"
1128 = "ハチロク"

[character_subs]
1693 = "雙鐵"
1656 = "鈴"

[script]
# lines: 464 
# 【双鉄】
# display as 雙鐵
# JP: 「すず……これを着け忘れているぞ」
951 = "「Suzu……em quên cài cái này rồi.」"

# 【ハチロク】
# display as 鈴
# JP: 「あ――」
779 = "「A——」"

# monologue
# JP: 僕の愛するレイルロオドを、僕のおんなを。\nふたりきりのときだけに呼ぶ名で呼んで。
1459 = "Railord mà tôi yêu, người phụ nữ của tôi.\nTôi gọi em bằng cái tên chỉ dùng khi hai\nđứa ở riêng với nhau."

# monologue
# JP: そうしてそっと、花とリボンとの髪飾りを着け、\nその黒髪を彩ってやる。
1471 = "Rồi tôi khẽ cài chiếc kẹp tóc đính hoa và\nruy băng,\ntô điểm thêm cho mái tóc đen của em."

# 【双鉄】
# display as 雙鐵
# JP: 「最後の仕上げは、この高下駄だ」
913 = "「Bước hoàn thiện cuối cùng, là đôi guốc\nmộc đế cao này.」"

# 【ハチロク】
# display as 鈴
# JP: 「た、畳の上で――高下駄を履いてしまうのですか？」
850 = "「T-Trên chiếu Tatami——mà lại mang guốc mộc\nđế cao sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいや。それでは縁起が悪い」
696 = "「Không. Như thế thì xui xẻo lắm.」"

# monologue
# JP: （ひょい）
1917 = "（Bế bổng）"

# 【ハチロク】
# display as 鈴
# JP: 「ふぁっ」
796 = "「A」"

# monologue
# JP: すずを抱き上げ、目で示すなら、\n抱かれたままにその足を、朱の高下駄で飾ってくれる。
1440 = "Tôi bế bổng Suzu lên, ra hiệu bằng ánh\nmắt,\nem ngoan ngoãn để tôi mang đôi guốc mộc đế\ncao màu đỏ chu sa vào chân trong khi vẫn\nnằm gọn trong vòng tay tôi."

# monologue
# JP: 可愛い、愛しい、美しい。\nだから思い切り、乱したくなる。
1321 = "Đáng yêu, đáng thương, xinh đẹp.\nChính vì thế, tôi càng muốn làm em rối\ntung lên."

# 【双鉄】
# display as 雙鐵
# JP: 「今は、おまえは。\n僕一人だけのキャンペーンガールだ」
922 = "「Bây giờ, em.\nLà cô gái đại diện của riêng một mình tôi\nthôi.」"

# monologue
# JP: 御一夜大詔レトロフェスタ。
1371 = "Lễ hội hoài cổ Taisho Ohimitera."

# monologue
# JP: その催しの看板娘を、飾り立て彩るための華麗な衣装を、\n独り占めして、僕がどろどろに穢してしまう。
1289 = "Cô gái đại diện của sự kiện đó, cùng với\nbộ trang phục lộng lẫy dùng để tô điểm cho\nem,\ntôi sẽ độc chiếm tất cả, và vấy bẩn chúng\nmột cách nhầy nhụa."

# 【ハチロク】
# display as 鈴
# JP: 「今だけではなく、どんなときでも。\nわたくしは――旦那様。あなたひとりの、おんなです」
688 = "「Không chỉ bây giờ, mà bất cứ lúc nào.\nEm——thưa phu quân. Vẫn luôn là người phụ\nnữ của riêng ngài.」"

# monologue
# JP: 子供じみ、いささか歪んだその欲望さえ、\nすずは理解し、そのまま受け入れ喜んでくれる。
1342 = "Ngay cả cái dục vọng trẻ con và có phần\nméo mó đó,\nSuzu cũng thấu hiểu, sẵn sàng chấp nhận và\nlấy làm vui sướng."

# monologue
# JP: 腕に感じる重みはそのまま、圧倒的な幸福で、\n自然、足取りも早くなる。
1501 = "Sức nặng cảm nhận được trên cánh tay chính\nlà một niềm hạnh phúc tột độ,\nkhiến bước chân tôi tự nhiên cũng nhanh\nhơn."

# 【ハチロク】
# display as 鈴
# JP: 「え？　あの……次の間へ向かうのですか？\nあそこは、あまり――」
775 = "「Hả? Dạ……chúng ta sang gian phòng bên cạnh\nsao ạ?\nChỗ đó, có hơi——」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。愛しあうのに適した部屋とは言いがたい」
904 = "「Đúng vậy. Khó có thể nói đó là căn phòng\nthích hợp để ân ái.」"

# monologue
# JP: が。今日は別だ。
1189 = "Nhưng. Hôm nay thì khác."

# monologue
# JP: この衣装のため、このときのため。\n特別な準備をしておいたから。
1551 = "Vì bộ trang phục này, vì khoảnh khắc này.\nTôi đã chuẩn bị một thứ đặc biệt."

# monologue
# JP: （ふわっ）
1831 = "（Nhẹ nhàng）"

# 【ハチロク】
# display as 鈴
# JP: 「まあっ」
# 796 = "「啊」" 

# monologue
# JP: [うこん,1]鬱金の敷布の寝台へ、すずの体を、そっと寝かせる。
1438 = "Tôi nhẹ nhàng đặt cơ thể Suzu xuống chiếc\ngiường trải ga màu vàng nghệ."

# monologue
# JP: 僕を見上げる目が潤んでる。\n唇は、キスを求めて甘やかに小さく開いてる。
1309 = "Đôi mắt ngước nhìn tôi ướt át.\nĐôi môi khẽ mở ra đầy ngọt ngào, khao khát\nmột nụ hôn."

# 【ハチロク】
# display as 鈴
# JP: 「あ……ん……ちゅっ――ちゅむっ――ンッ――\nふ――っぁ……れろっ――れるっ――ちゅる――ちゅ」
791 = "「A……ưm……chụt——chụm——ưm——\nphù——a……liếm——mút——chụt——chụt」"

# monologue
# JP: くちづけすれば、ほどなくすずが侵入してくる。
1145 = "Vừa chạm môi, chẳng mấy chốc Suzu đã chủ\nđộng xâm nhập."

# monologue
# JP: 短めの舌を懸命に伸ばし動かして、\n唇の裏、歯の裏、歯茎――口内全てを舐めようとする。
1284 = "Cố gắng vươn dài chiếc lưỡi ngắn ngủi,\nem muốn liếm láp khắp mặt trong môi, mặt\nsau răng, nướu——toàn bộ khoang miệng tôi."

# 【ハチロク】
# display as 鈴
# JP: 「チュッ――んっ……チュルッ――れるっ――るっ――\nんっ！？　こくっ――れろっ――れるっ――ちゅるっ」
810 = "「Chụt——ưm……chụt——mút——mút——\nưm!? Ực——liếm——mút——chụt」"

# monologue
# JP: 上から僕が流しこむ、唾液も嬉しげに飲み干しながら、\n一途で律儀な短い舌は、動きを少しも緩めない。
1320 = "Vui vẻ nuốt trọn lượng nước bọt tôi truyền\nxuống từ phía trên,\nchiếc lưỡi ngắn ngủi tận tụy và chân thành\nấy không hề chậm lại một nhịp nào."

# 【ハチロク】
# display as 鈴
# JP: 「あ……むっ――んっ――ん……チュッ……れるっ――\nンッ――ちゅっ――ちゅうっ――れるっ――れろっ」
793 = "「A……ưm——ưm——ưm……chụt……mút——\nưm——chụt——chùn chụt——mút——liếm」"

# monologue
# JP: 僕の性感を高めるために、自ら性感を得るために、\n淫靡にしつこく、舌を動かし唇を甘く喰みあわせ。
1548 = "Để đẩy khoái cảm của tôi lên cao, và để tự\nbản thân cũng đạt được khoái cảm,\nem dai dẳng, dâm đãng uốn lượn chiếc lưỡi,\nngọt ngào cắn nhẹ lấy môi tôi."

# monologue
# JP: そうしながらもすずはすりすり、母に甘える子犬のように、\n顔を体を揺り動かして、あどけないほどの甘えをみせる。
1255 = "Vừa làm vậy, Suzu vừa cọ cọ, lắc lư khuôn\nmặt và cơ thể\nnhư một chú cún con nũng nịu mẹ, phô bày\nsự làm nũng ngây thơ đến lạ."

# 【双鉄】
# display as 雙鐵
# JP: （なんと、愛くるしいものか）
1900 = "（Sao lại có thể đáng yêu đến nhường này\nchứ）"

# monologue
# JP: 思えば途端、思った言葉にまた情愛を煽られる。\n愛くるしい。
1382 = "Vừa nghĩ đến đó, tình yêu trong tôi lại\ncàng bùng cháy mãnh liệt.\nThật đáng yêu."

# monologue
# JP: 愛がくるしい。愛ゆえくるしい。\n――愛がこれほど、くるおしい。
1388 = "Yêu đến đau lòng. Vì yêu mà đau lòng.\n——Tình yêu lại có thể cuồng si đến vậy."

# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅっ――ぷあっ――あ……双鉄、さま？」
827 = "「Ưm……chụt——phù a——a……Ngài Soutetsu?」"

# monologue
# JP: 感慨にふけった一瞬に、すずに応える舌の動きが、\nおろそかになってしまったらしい。
1271 = "Chìm đắm trong cảm xúc một thoáng,\ncó vẻ như tôi đã lơ là việc dùng lưỡi đáp\nlại Suzu."

# monologue
# JP: ただそれだけで、\n緋色の瞳はこれほど不安げに僕を見上げる。
1191 = "Chỉ vì thế thôi,\nmà đôi mắt màu đỏ thẫm ấy lại ngước nhìn\ntôi đầy vẻ bất an."

# 【双鉄】
# display as 雙鐵
# JP: 「可愛らしいなと思っただけだ。\nお前が僕の妻で本当に幸せだな、と」
879 = "「Tôi chỉ đang nghĩ em đáng yêu quá thôi.\nRằng tôi thật sự rất hạnh phúc khi có em\nlàm vợ.」"

# 【ハチロク】
# display as 鈴
# JP: 「まぁ」
771 = "「Ôi.」"

# monologue
# JP: ほっとした顔。\nただでさえ紅潮している頬に、朝焼けのような朱が差す。
1310 = "Khuôn mặt thở phào nhẹ nhõm.\nĐôi má vốn đã ửng hồng nay lại càng thêm\nđỏ rực như ánh rạng đông."

# 【ハチロク】
# display as 鈴
# JP: 「わたくしも――あなたが。\n双鉄様が、わたくしの旦那様なことが――ちゅっ」
873 = "「Em cũng vậy——có ngài.\nCó ngài Soutetsu làm phu quân của\nem——chụt.」"

# monologue
# JP: また、キス。
1243 = "Lại một nụ hôn."

# monologue
# JP: けれども今度はごく軽い、\n小鳥が餌でもついばむような。
1205 = "Nhưng lần này lại vô cùng nhẹ nhàng,\nnhư một chú chim nhỏ đang nhấm nháp thức\năn."

# 【ハチロク】
# display as 鈴
# JP: 「どうしようもなく幸せで、\n時間をこのまま、綴じてしまいたく感じるほどです」
925 = "「Em hạnh phúc đến mức không biết phải làm\nsao,\nchỉ muốn thời gian cứ mãi dừng lại ở\nkhoảnh khắc này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「時間、か」
906 = "「Thời gian, sao.」"

# monologue
# JP: かわいいキスのお返しに、\n唇、鼻先、頬、耳、まぶた――黒髪にまでキスをする。
1424 = "Để đáp lại nụ hôn đáng yêu ấy,\ntôi hôn lên môi, chóp mũi, má, tai, mí\nmắt——và cả mái tóc đen của em."

# monologue
# JP: 髪の夜空に輝いている月のごときなかんざしが、\n今このときを、永遠のようにも、とても儚くも感じさせる。
1304 = "Chiếc trâm cài tóc lấp lánh như vầng trăng\ngiữa bầu trời đêm trên mái tóc em,\nkhiến khoảnh khắc này mang lại cảm giác\nvừa như vĩnh cửu, lại vừa quá đỗi mong\nmanh."

# 【双鉄】
# display as 雙鐵
# JP: （すずに――ハチロクに――閉じた時間がなかったのなら。\nもしも眠っていなかったなら）
1946 = "（Nếu Suzu——Hachiroku——không có khoảng thời\ngian bị đóng băng ấy.\nNếu như em không hề chìm vào giấc ngủ）"

# monologue
# JP: つまり、あの事故がなかったのなら、\n僕らは決して出会わずにいた。
1172 = "Nói cách khác, nếu vụ tai nạn đó không xảy\nra,\nchúng tôi sẽ chẳng bao giờ gặp được nhau."

# monologue
# JP: この甘やかなひとときを、僕は永遠に、味わわずにいた。\n失くしたものは……傷は、永遠に消えなくもあるが――
1429 = "Tôi sẽ vĩnh viễn không bao giờ được tận\nhưởng khoảnh khắc ngọt ngào này.\nNhững thứ đã mất đi……dù cho vết thương có\nmãi mãi không thể phai mờ, nhưng——"

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様？　――んっ！？　あ……チュッ――んっ――\nふっ――あっ――んむっ――あっ――ふあっ！　あっ！」
971 = "「Ngài Soutetsu? ——Ưm!? A……chụt——ưm——\nphù——a——ưm——a——phù a! A!」"

# monologue
# JP: 心配する声を聞きたくなくて、\n閉じ込めるためのキスをして。
1400 = "Không muốn nghe giọng nói đầy lo lắng ấy,\ntôi trao em một nụ hôn để khóa chặt đôi\nmôi."

# monologue
# JP: そうしてそのまま唇を、舌を、\nなめくじのようにぞろりじわりと這わせてく。
1558 = "Và rồi cứ thế, tôi để đôi môi, chiếc lưỡi\ncủa mình,\ntrườn đi trườn lại chậm rãi, nhớp nháp như\nmột con sên."

# 【ハチロク】
# display as 鈴
# JP: 「ん……ふ―あっ――だんな、さまの――舌が……ぬる、\nぬる……と……わたくしの、肌――唾液で、濡ら、して」
821 = "「Ưm……phù——a——chiếc lưỡi——của phu,\nquân……trơn,\ntrơn……ướt……làm ướt, làn da của em——bằng,\nnước bọt.」"

# monologue
# JP: 汗を舐め取り、唾液をなすり、綺麗な顎のラインを登る。
1474 = "Liếm sạch mồ hôi, bôi trét nước bọt, tôi\ntrườn lên dọc theo đường nét chiếc cằm\nthanh tú."

# 【ハチロク】
# display as 鈴
# JP: 「ひっ！？　あ――お耳――んっ――わたくしの、耳――\n旦那、様の舌に――は、……挿入られ――てっ――くぅ」
765 = "「Hí!? A——tai——ưm——tai của, em——\nlưỡi của phu, quân——đang,……đút\nvào——trong——ư.」"

# monologue
# JP: 耳孔を舌で犯しておいて、\nまぶたに、瞳に、キスをする。
1454 = "Sau khi dùng lưỡi xâm phạm lỗ tai em,\ntôi lại chuyển sang hôn lên mí mắt, lên\nđôi đồng tử."

# 【ハチロク】
# display as 鈴
# JP: 「舌……あ……こんなに――近く、に――んっ！\nあ――わたくし――目の、たま――なめられ、て……」
938 = "「Lưỡi……a……gần——thế này——ưm!\nA——nhãn, cầu——của em——đang bị, liếm……」"

# monologue
# JP: 目をそらさない。\nまばたき出来るはずなのに、一瞬たりとも瞼を閉じない。
1280 = "Em không hề ngoảnh mặt đi.\nRõ ràng là có thể chớp mắt, nhưng em không\nhề nhắm lại dù chỉ một giây."

# 【ハチロク】
# display as 鈴
# JP: 「わたしの、瞳……んっ――双鉄、さまに――\nぺろりと――食べられて――しまい、そうっ」
886 = "「Đôi mắt, của em……ưm——sắp bị——\nngài Soutetsu——liếm láp——ăn trọn——mất\nrồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――食べるぞ」
798 = "「Ừ——tôi ăn đây.」"

# monologue
# JP: （れろおおおおっっ）
1840 = "（Liếm dài——）"

# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ！」
741 = "「Á!」"

# monologue
# JP: 愛おしくってたまらなくなり、\n涙のラインを描く如くに、頬のラインを舐め落ちる。
1259 = "Tình yêu thương trào dâng đến mức không\nthể kiềm chế,\ntôi liếm dọc theo gò má, như đang vẽ lại\nvệt nước mắt rơi."

# 【ハチロク】
# display as 鈴
# JP: 「ん……あっ――舌……あったかい……んっ――\nや……くびす、じ……んっ――くすぐった――ふぁ」
823 = "「Ưm……a——lưỡi……ấm quá……ưm——\na……sau, gáy……ưm——nhột quá——phù.」"

# monologue
# JP: 首の筋肉のラインを辿って、鎖骨のくぼみを舐めまわす。\nそれから一転やわらかすぎる感触を――
1483 = "Lần theo đường gân cổ, tôi liếm láp hõm\nxương quai xanh.\nRồi chuyển hướng sang một xúc cảm vô cùng\nmềm mại——"

# monologue
# JP: （れろっ――れるっ――れろおおおお――はぷっ！）
1878 = "（Liếm——mút——liếm dài——ngoạm!）"

# monologue
# JP: ――おっぱいというには平坦すぎて、\nけれども確かに他と違った弾力を持つ、胸を舌先で弄ぶ。
460 = "——Một bộ ngực quá đỗi phẳng lặng để được\ngọi là vú,\nnhưng chắc chắn mang một độ đàn hồi khác\nbiệt, tôi dùng đầu lưỡi trêu đùa nó."

# monologue
# JP: 勃起乳首の乳輪まわりを、ぺちゃぺちゃ舐めて、\n感じさせつつ、僕のものだとマーキングする。
1476 = "Liếm láp chùn chụt quanh quầng vú của núm\nvú đang cương cứng,\nvừa kích thích khoái cảm cho em, vừa đánh\ndấu khẳng định đó là vật sở hữu của tôi."

# 【ハチロク】
# display as 鈴
# JP: 「きゅあっ！　あっ、んっ――おっぱい――は――あっ\nきもち……いい、です――だんな、さまぁっ――」
732 = "「Á a! A, ưm——vú——a\nsướng……lắm, ạ——phu, quân——」"

# monologue
# JP: （れろっ――はむっ――ちゅうう――きゅぽっ！）
1880 = "（Liếm——ngoạm——chùn chụt——bật ra!）"

# 【ハチロク】
# display as 鈴
# JP: 「ひあんっ！！！」
760 = "「Hí a!!!」"

# monologue
# JP: 唇だけで小さな蕾を咥えて置いて、\n上へと持ち上げ――自然に離れる力で、放つ。
1448 = "Chỉ dùng môi ngậm lấy nụ hoa nhỏ xíu,\nkéo nó lên cao——rồi để nó tự tuột ra bằng\nlực đàn hồi tự nhiên."

# monologue
# JP: （くぽっっ――ちゅうううううっ――ぷりゅんっ！）
1844 = "（Mút——chùn chụt——bật nảy!）"

# 【ハチロク】
# display as 鈴
# JP: 「だんな……さまっ――ふ、ぁっ――すず――の、\nおむね、が――乳首、が――伸び、て――んっ！」
853 = "「Phu……quân——phù, a——ngực, của——\nSuzu——núm vú, bị——kéo dài, ra——ưm!」"

# 【双鉄】
# display as 雙鐵
# JP: （伸びなどすまい。これほどの張りと弾力なのだ）
1939 = "（Làm sao mà kéo dài ra được chứ. Nó căng\ntròn và đàn hồi đến mức này cơ mà.）"

# 【ハチロク】
# display as 鈴
# JP: 「ひゃん！　また――ふ……ぁんっ！！！　ん……\nおっぱい……じんじん――シビレて――感じ、てっ」
739 = "「Á! Lại nữa——phù……a!!! Ưm……\nvú……tê rần——tê dại——sướng, quá.」"

# monologue
# JP: （ちゅむううううううううう――――つぷんっ！！）
1868 = "（Mút mạnh————bật ra!!）"

# 【ハチロク】
# display as 鈴
# JP: 「んゆぅっっっ！！！！」
845 = "「Ưm yuuuu!!!!」"

# monologue
# JP: 最初からずっと勃起していたすずの乳首は、\n吸って離しを繰り返すうち、さらに大きくなっている。
1525 = "Núm vú của Suzu vốn đã cương cứng ngay từ\nđầu,\nsau nhiều lần bị mút rồi nhả ra, giờ lại\ncàng sưng to hơn."

# monologue
# JP: 乳首の赤みも鮮やかになり――\nいや、これは――
1175 = "Sắc đỏ của núm vú cũng trở nên tươi tắn\nhơn——\nkhông, thế này là——"

# monologue
# JP: （ちゅぱっ）
1862 = "（Chụt）"

# 【ハチロク】
# display as 鈴
# JP: 「あっ」
# 796 = "「啊」" 

# monologue
# JP: 口全体で、赤子がするように胸を含めば、\nすずは安心した声を出す。
1450 = "Tôi dùng cả khuôn miệng ngậm lấy bầu ngực\nnhư một đứa trẻ khát sữa,\nSuzu khẽ thốt lên một tiếng đầy an tâm."

# 【双鉄】
# display as 雙鐵
# JP: （れろっ――れろっ――ぺろっ――ぺろっ――）
1881 = "（Liếm——liếm——liếm——liếm——）"

# monologue
# JP: 傷口を舐めて消毒していくイメージで、\n慎重に、ごく穏やかに柔らかに、乳首をしゃぶる。
1451 = "Tưởng tượng như đang liếm để sát trùng vết\nthương,\ntôi mút mát núm vú một cách cẩn thận, vô\ncùng điềm tĩnh và nhẹ nhàng."

# 【ハチロク】
# display as 鈴
# JP: 「ふぁ……あっ――それ……ここち……いい……\n双鉄……様の……舌……さっきは――あれ、ほどっ」
813 = "「Phù……a——như thế……dễ……chịu quá……\nlưỡi……của ngài……Soutetsu……ban nãy——rõ\nràng, là.」"

# monologue
# JP: 『さっきはあれほどあつかったのに』\n吐息に飲まれてしまった言葉を、乳首の熱が伝えてくれる。
468 = "『Ban nãy rõ ràng là nóng bỏng đến thế mà』\nSức nóng từ núm vú đã truyền đạt lại những\nlời nói bị nuốt chửng bởi tiếng thở dốc\nấy."

# monologue
# JP: 一時に、あまりに乳首を弄びすぎてしまったせいで、\n性的快感だけでなく、腫れぼったくもなってるようだ。
1264 = "Chỉ vì một lúc trêu đùa núm vú quá trớn,\nmà giờ đây nó không chỉ mang lại khoái cảm\ntình dục, mà dường như còn hơi sưng tấy\nlên."

# 【双鉄】
# display as 雙鐵
# JP: （ぺろっ――れろっ――れるっ――ぺりゅっ）
1944 = "（Liếm——liếm——mút——liếm）"

# 【ハチロク】
# display as 鈴
# JP: 「ん……は……ぁ……きもち……良く……て……あ、\nわた、くしっ――は――ぁっ――乳首……とけ、そうっ」
824 = "「Ưm……hà……a……sướng……quá……a,\nem——hà——a——núm vú……sắp tan, chảy mất.」"

# monologue
# JP: （くちゅんっ）
1837 = "（Nhóp nhép）"

# monologue
# JP: 無意識にだろう。
1286 = "Chắc là trong vô thức."

# monologue
# JP: すずがすりあわせた股の付け根が、\nそれこそ溶けきった水音を出す。
1661 = "Suzu cọ xát hai gốc đùi vào nhau,\nphát ra âm thanh róc rách như thể đã tan\nchảy hoàn toàn."

# 【双鉄】
# display as 雙鐵
# JP: 「構わんぞ？　溶けたら僕が飲んでやろう」
915 = "「Không sao đâu? Nếu tan chảy ra thì tôi sẽ\nuống cạn nó.」"

# monologue
# JP: （つぷうぅぅ）
1824 = "（Phập）"

# 【ハチロク】
# display as 鈴
# JP: 「んきゅううんんんっ！！！」
844 = "「Ưm kiuu ưm ưm!!!」"

# monologue
# JP: 狭くて熱い膣内へ、\nけれども指は、圧されながら飲み込まれていく。
1576 = "Tiến vào bên trong âm đạo chật hẹp và nóng\nrực,\nnhưng ngón tay vẫn bị ép chặt và nuốt\nchửng lấy."

# monologue
# JP: （きゅっ！　きゅうううっ！　にゅるっ！　にゅううっ）
1883 = "（Thít! Siết chặt! Trơn tuột! Lún sâu）"

# 【ハチロク】
# display as 鈴
# JP: 「はっ！　あっ！　あっ！　あっ！！！」
770 = "「Hà! A! A! A!!!」"

# monologue
# JP: まだ動かしてもいないのに、\nすずはイヤイヤと首を振る。
1482 = "Tôi còn chưa kịp cử động,\nSuzu đã lắc đầu nguầy nguậy."

# monologue
# JP: 膣はもう、ひっきりなしに蠕動していて、\n蠢きながら締めつけ、指から精を絞り出そうと責め立てる。
1689 = "Âm đạo đã không ngừng nhu động từ nãy đến\ngiờ,\nvừa ngọ nguậy vừa siết chặt, thúc ép như\nmuốn vắt kiệt tinh dịch từ ngón tay tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「すず――かわいいぞ」
946 = "「Suzu——đáng yêu lắm.」"

# 【ハチロク】
# display as 鈴
# JP: 「双鉄……様っ――指っ……だめ――です――\nすこ、し……おゆるめ――くだ、さいっ」
966 = "「Ngài Soutetsu……ngón tay……không được——đâu\nạ——\nxin ngài……nới lỏng——một chút, đi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「緩めるも何も。僕は全く動いてないぞ？」
700 = "「Nới lỏng cái gì chứ. Tôi hoàn toàn chưa\nhề cử động mà?」"

# monologue
# JP: 事実が明確に伝わるように、\n膣内に指を刺したまま、体全部の動きを止める。
1547 = "Để sự thật được truyền đạt một cách rõ\nràng,\ntôi giữ nguyên ngón tay trong âm đạo, và\ndừng mọi chuyển động của cơ thể."

# monologue
# JP: （にゅぶっ！　にゅっ！！　にゅくっ！　にゅぶんっ！）
1869 = "（Mút! Siết!! Thít! Nhóp nhép!）"

# monologue
# JP: けれども音は止まらない。
1203 = "Nhưng âm thanh vẫn không hề dừng lại."

# monologue
# JP: 僕の中指は根本まで、すずの膣内に飲まれては、\n浅く外へ吐き出されてを繰り返す。
1457 = "Ngón giữa của tôi bị âm đạo của Suzu nuốt\ntrọn đến tận gốc,\nrồi lại bị nhả ra nông nông, cứ lặp đi lặp\nlại như thế."

# 【ハチロク】
# display as 鈴
# JP: 「え？　あ――あっ！　いやっ！　わたくし――\nわたくし、体っ――こんな、みだらに――はしたなくっ」
773 = "「Hả? A——a! Không! Em——\ncơ thể, của em——lại dâm đãng——đê tiện, thế\nnày.」"

# monologue
# JP: （くちゅっ！　ずちゅっ！　くちゅんっ！　ちゅぷっ！）
1836 = "（Nhóp nhép! Phập! Chụt! Bóp!）"

# monologue
# JP: それが意味するところを理解し、顔を真っ赤に恥じ入って。\nそれでもすずは、腰の動きを止められない。
1514 = "Hiểu được ý nghĩa của hành động đó, khuôn\nmặt em đỏ bừng vì xấu hổ.\nNhưng Suzu vẫn không thể dừng chuyển động\ncủa hông lại được."

# 【ハチロク】
# display as 鈴
# JP: 「いや、ですっ――んっ……ふ、あっ――だんな、さ、ま\n――あ！　お指、で――でも――一人で――イク、など」
694 = "「Không, muốn đâu——ưm……phù, a——phu, quân\n——a! Bằng ngón, tay——nhưng mà——lên\nđỉnh——một mình, thì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
800 = "「Ừ.」"

# monologue
# JP: 膣はほとんど痙攣に近い収縮をして、\nすずが達する瞬間は、もうほどなくだと伝えて来てる。
1690 = "Âm đạo co thắt gần như co giật,\nbáo cho tôi biết khoảnh khắc Suzu lên đỉnh\nđã sắp đến gần."

# monologue
# JP: ならば、一人で――一人遊びでなどイカせまい。\n僕が一緒に――僕のこの手と、この舌で。
1488 = "Nếu vậy, tôi sẽ không để em phải lên đỉnh\nmột mình——hay tự sướng một mình đâu.\nTôi sẽ cùng em——bằng đôi tay này, và chiếc\nlưỡi này."

# monologue
# JP: （はむっ！）
1906 = "（Ngoạm!）"

# 【ハチロク】
# display as 鈴
# JP: 「んひゅっ！！　ふ――あっ！　あっ！　あっ！！」
837 = "「Ưm hứ!! Phù——a! A! A!!」"

# monologue
# JP: （じゅぶっ！　じゅぼっ！　ずぼっ！　ずびゅっ！！）
1871 = "（Chụt! Mút! Phập! Phụt!!）"

# 【ハチロク】
# display as 鈴
# JP: 「ぁきゅ！　んっ！　はっ――しゅごっ！　ふ、あっ――\nおっぱい、も――おまん、まん――もぉっ！！！！」
802 = "「A kiu! Ưm! Hà——sướng quá! Phù, a——\nvú, cũng——cô, bé——cũng!!!!」"

# monologue
# JP: （ちゅうっ――ちゅう――ちゅう――ちゅうっ）
1867 = "（Chùn chụt——chùn chụt——chùn chụt——chùn\nchụt）"

# 【ハチロク】
# display as 鈴
# JP: 「舌……べろっ――だんな、さまっつ――双鉄、\nさまの――おっぱい――ちゅうちゅう――可愛く、てっ」
939 = "「Lưỡi……lưỡi——phu, quân——của ngài,\nSoutetsu——đang chùn chụt——vú em——đáng yêu,\nquá.」"

# monologue
# JP: 乳首は、あくまで静かに優しく。\nむしろ癒やしを与えるように、舌の動きも最小限に。
1477 = "Với núm vú, tôi vẫn giữ sự nhẹ nhàng và từ\ntốn.\nThậm chí chuyển động của lưỡi cũng được\ngiảm thiểu tối đa, như thể đang xoa dịu\nem."

# monologue
# JP: （ずびょ！　じゅぼっ！　ぶちゅっ！　ばぢゅっ！！！）
1823 = "（Phập! Mút! Bạch! Chụt!!!）"

# 【ハチロク】
# display as 鈴
# JP: 「ひゃぎゅっ！？　あ――キツ――きつ――ん、あっ！！\nおまん、まんっ――は、ぁ――えぐれっ、えぐれてっ！」
738 = "「Á hự!? A——khít——khít quá——ưm, a!!\nCô, bé——hà, a——bị khoét, bị khoét sâu\nquá!」"

# monologue
# JP: （きゅんっ！　きゅうううううっ！　きゅきゅっ！）
1931 = "（Thít! Siết chặt! Co thắt!）"

# monologue
# JP: 指一本だ。\n二本ではなく、中指だけだ。
1447 = "Chỉ một ngón tay.\nKhông phải hai ngón, chỉ duy nhất ngón\ngiữa."

# monologue
# JP: であるというのに、締め付けは強く痛みを感じそうなほど。\nこれが僕の勃起であるなら――思えば、更に高まっていく。
1649 = "Vậy mà lực siết chặt lại mạnh đến mức gần\nnhư gây đau đớn.\nNếu đây là cậu bé đang cương cứng của tôi\nthì——càng nghĩ, sự hưng phấn lại càng dâng\ntrào."

# monologue
# JP: （じゅぼっ！　ずびゅっ！　じょばっ！　ばぢゅっ！！）
1864 = "（Mút! Phụt! Róc rách! Bạch!!）"

# 【ハチロク】
# display as 鈴
# JP: 「らめっ――れす――ん、だめっ！　そう、てつ、さまぁ\n――おまん、まん――の、おつ、ゆ――ひゅぎゅっ！？」
690 = "「Không——được——ưm, không được! Ngài,\nSoutetsu\n——dịch, nhờn——của, cô bé——hí hự!?」"

# monologue
# JP: （つん――つん――クリュッ――むにゅ！）
1908 = "（Chọc——chọc——miết——nắn!）"

# monologue
# JP: 中指思いっきりに伸ばしたままに、親指も伏せ硬くして、\nすずのおまんまんに沿わせるように当て、擦る。
1161 = "Giữ nguyên ngón giữa duỗi thẳng hết cỡ,\nngón cái gập lại cho cứng cáp,\náp dọc theo cô bé của Suzu rồi chà xát."

# 【ハチロク】
# display as 鈴
# JP: 「あっ！　あっ！　あっ！　あっ！　双鉄、さまっ！\nふ――きゅっ！　双鉄、さま――だんな、さまぁ！」
806 = "「A! A! A! A! Ngài Soutetsu!\nPhù——kiu! Ngài Soutetsu——phu, quân!」"

# monologue
# JP: （きゅきゅっっ――ぷちゅっ！！）
1859 = "（Co thắt——bạch!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「おっ」
776 = "「Ồ.」"

# monologue
# JP: 膣からおつゆが弾け出る。\n外側さえもぬかるみ熱くて、僕の手指と融け合っている。
1691 = "Dịch nhờn bắn ra từ âm đạo.\nNgay cả bên ngoài cũng lầy lội, nóng rực,\nhòa quyện với những ngón tay của tôi."

# monologue
# JP: もう止まらないし、止まれない。\nこのまま一気にすずをイかせて――
1397 = "Không thể dừng lại, và cũng không muốn\ndừng lại nữa.\nCứ thế này, tôi sẽ khiến Suzu lên đỉnh\ntrong một hơi——"

# monologue
# JP: （ぎゅっ！！）
1915 = "（Ôm chặt!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
974 = "「!」"

# monologue
# JP: すずの腕が僕の頭を――
1659 = "Vòng tay Suzu ôm lấy đầu tôi——"

# monologue
# JP: おっぱいをまだちゅうちゅうしてる僕の頭を、、\n甘やかに強く掻き抱く。
1480 = "Ôm ghì lấy cái đầu vẫn đang chùn chụt mút\nvú của tôi,\nmột cái ôm thật ngọt ngào và mạnh mẽ."

# 【ハチロク】
# display as 鈴
# JP: 「そうてつ、さまっ！　ふ――あっ！　だんな、さまっ！\nわた――くし――わた、し、の――愛おしい――方っ！」
968 = "「Ngài, Soutetsu! Phù——a! Phu, quân!\nNgười——mà——em, vô cùng——yêu, thương!」"

# monologue
# JP: 一人ではなく。\nすずだけ先に達しようとも、僕らふたりでセックスしてる。
1404 = "Không phải một mình.\nDù Suzu có lên đỉnh trước, thì cả hai\nchúng tôi vẫn đang cùng nhau làm tình."

# monologue
# JP: そんな想いが、腕のぬくもり、抱く強さから伝わって――\n可愛くて、切なくて。どうしようもなく愛おしくなる。
1430 = "Suy nghĩ ấy truyền đến từ hơi ấm của vòng\ntay, từ sức mạnh của cái ôm——\nĐáng yêu, và xót xa. Khiến tôi yêu thương\nem đến mức không thể kiềm chế nổi."

# 【双鉄】
# display as 雙鐵
# JP: 「すず」
953 = "「Suzu.」"

# monologue
# JP: （きゅんっ！）
1874 = "（Thít!）"

# monologue
# JP: だから名を呼ぶ。\n僕だけの名を。
1487 = "Vì thế, tôi gọi tên em.\nCái tên của riêng tôi."

# monologue
# JP: そうして再び、平たい胸へとむしゃぶりつく。
1556 = "Và rồi một lần nữa, tôi vùi mặt vào khuôn\nngực phẳng lì ấy."

# monologue
# JP: （はぷっ）
1897 = "（Ngoạm）"

# 【ハチロク】
# display as 鈴
# JP: 「んひゅんっっっ！！」
836 = "「Ưm hiun!!!」"

# monologue
# JP: （きゅううううううっ！！！）
1932 = "（Siết chặt!!!）"

# monologue
# JP: たったそれだけの刺激でさえも、\n今のすずには十分すぎて。
1652 = "Chỉ một chút kích thích đó thôi,\ncũng đã là quá đủ đối với Suzu lúc này."

# monologue
# JP: 膣から伝わる絶頂感を、\nひときわ高めてやりたくなって！
1435 = "Cảm giác lên đỉnh truyền đến từ âm đạo,\nkhiến tôi muốn đẩy nó lên cao trào hơn\nnữa!"

# monologue
# JP: （ずぶううううううううううううううううっ！！！）
1820 = "（Phập!!!）"

# 【ハチロク】
# display as 鈴
# JP: 「ひぎゅっ！？　あっ――ひ、きゅぅぅぅぅぅぅぅ！！」
736 = "「Hí gư!? A——hí, kiuuuuuuu!!」"

# monologue
# JP: （きゅううううううううんっ！！！）
1929 = "（Thít chặt!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「くおっ！！」
777 = "「Ư ô!!」"

# monologue
# JP: 中指が、もぎ取られそうな締め付けと、\n甘くかわいいからだの震えと。
1325 = "Ngón giữa bị siết chặt như muốn đứt lìa,\ncùng với sự run rẩy ngọt ngào và đáng yêu\ncủa cơ thể em."

# 【ハチロク】
# display as 鈴
# JP: 「ひあ――あっ――あっ――ふあっ――あっ！！」
731 = "「Hí a——a——a——phù a——a!!」"

# monologue
# JP: 腰を浮かせるようにして、ひくひく、すずは震え続ける。
1658 = "Hông nảy lên, Suzu tiếp tục run rẩy từng\nhồi."

# monologue
# JP: 融け合うように密着しきった中指と膣――\nけれどもそこから、ピっ、ピと溢れた蜜が弾ける。
1585 = "Ngón giữa và âm đạo áp sát vào nhau như\nthể hòa tan——\nnhưng từ đó, những giọt mật trào ra vẫn\nbắn lên lép bép."

# 【双鉄】
# display as 雙鐵
# JP: 「すず…」
952 = "「Suzu…」"

# 【ハチロク】
# display as 鈴
# JP: 「ん……きゅっ――ふぁああああんっ！！！」
819 = "「Ưm……kiu——phù a a a a a!!!」"

# monologue
# JP: 中指をじわじわ引き抜けば、\nすずはまた、膣を激しく収縮させて震えてしまう。
1394 = "Từ từ rút ngón giữa ra,\nSuzu lại một lần nữa co thắt âm đạo dữ dội\nvà run rẩy."

# monologue
# JP: シーツの鬱金がすずの愛液に濡らされて、\n重い茶となり、肌の白さをよりいっそうに映えさせる。
1361 = "Màu vàng nghệ của ga trải giường bị thấm\nđẫm ái dịch của Suzu,\nchuyển thành màu nâu sẫm, càng làm tôn lên\nlàn da trắng ngần của em."

# 【双鉄】
# display as 雙鐵
# JP: 「すず――僕もだ」
948 = "「Suzu——tôi cũng vậy.」"

# 【ハチロク】
# display as 鈴
# JP: 「は、はい、双鉄様――あっ！？」
898 = "「V-Vâng, ngài Soutetsu——a!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
# 796 = "「啊」" 

# monologue
# JP: あるいは口で、愛してくれようとしたのだろうか。
1694 = "Có lẽ em định dùng miệng để ân ái với tôi\nchăng."

# monologue
# JP: 身を起こそうとしたすずは、けれども脱力しきったままに、\n姿勢をごろりと崩してしまう。
1380 = "Suzu cố gắng gượng dậy, nhưng vì đã hoàn\ntoàn kiệt sức,\nnên tư thế liền đổ gục xuống."

# 【ハチロク】
# display as 鈴
# JP: 「も、申し訳ございません、だんなさま――ひゃっ！？」
711 = "「T-Thật có lỗi quá, thưa phu quân——á!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「申し訳なくなど」
712 = "「Có gì đâu mà có lỗi.」"

# monologue
# JP: （さわっ――さすっ――むにっ――もにっ――）
1934 = "（Chạm nhẹ——vuốt ve——nắn——bóp——）"

# 【ハチロク】
# display as 鈴
# JP: 「ふぁっ……ふっ……は……あ……お尻、も……いま、は\n……達した……ばか、り……で……敏感……んううっ！」
812 = "「Phù a……phù……hà……a……mông, cũng……bây giờ,\nthì\n……vừa mới……lên đỉnh……xong……nên rất nhạy\ncảm……ưm ư!」"

# monologue
# JP: 丸く、ま白く、つややかな尻。\n衣装の黒との対比によって、白さを一層際立てる尻。
1300 = "Cặp mông tròn trịa, trắng nõn, bóng bẩy.\nSự tương phản với màu đen của trang phục\ncàng làm nổi bật thêm độ trắng sáng của\nnó."

# monologue
# JP: それがぷりんと、甘く震えて、\nたっぷり蜜を滴らせ、僕を誘ってくれている。
1330 = "Nó nảy lên, run rẩy đầy ngọt ngào,\nnhỏ giọt mật tràn trề, mời gọi tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「むしろ、僕には申し分無い。\n挿入したい気持ちを、この上なく煽られてるよ」
878 = "「Ngược lại, với tôi thế này là quá tuyệt\nvời.\nCảm giác muốn đút vào đang bị kích thích\ntột độ đây này.」"

# monologue
# JP: （むにいいっ！）
1919 = "（Nắn bóp!）"

# 【ハチロク】
# display as 鈴
# JP: 「ひあっ！　んっ――お尻――ふあっ――お尻、も……\nです、から――今、は……んっ――んくぅぅぅ～～っ」
759 = "「Hí a! Ưm——mông——phù a——mông, cũng……\nmà——bây giờ, thì……ưm——ưm kuuu~~」"

# monologue
# JP: だから、あえての愛撫を重ねる。\n最高に昂めあえてる状態で、最高のすずを貫けるよう。
1493 = "Vì thế, tôi cố tình vuốt ve em nhiều hơn\nnữa.\nĐể có thể đâm xuyên qua một Suzu tuyệt vời\nnhất, trong trạng thái hưng phấn tột đỉnh\nnhất."

# monologue
# JP: （もにゅっ――みゅっ――もにゅっ――にゅるんっ）
1889 = "（Bóp——nắn——bóp——trơn tuột）"

# monologue
# JP: すずの汗、僕の汗。\nそれから腿に、いくらでも滴ってくる甘い蜜。
1664 = "Mồ hôi của Suzu, mồ hôi của tôi.\nRồi cả dòng mật ngọt không ngừng nhỏ giọt\nxuống đùi em."

# monologue
# JP: 普段であっても感度十分な双峰を、\n両手を使って、雫を掬って、揉み込むように愛撫する。
1267 = "Dùng cả hai tay, hứng lấy những giọt\nsương, tôi xoa bóp, ái ân\nhai bầu ngực vốn dĩ đã vô cùng nhạy cảm\nngay cả trong lúc bình thường."

# monologue
# JP: （くちゅっ！――ぷりゅん！　もみゅ、みゅにゅぅっ！）
1835 = "（Nhóp nhép!——Bật nảy! Nắn, bóp!）"

# 【ハチロク】
# display as 鈴
# JP: 「は……ぁ……く……は――ふ……あっ――だんな、さま、\nの、手……ん……お尻……ひら……い、てっ――」
485 = "「Hà……a……ư……hà——phù……a——bàn tay, của……\nphu, quân……ưm……đang banh……mông, ra——」"

# 【双鉄】
# display as 雙鐵
