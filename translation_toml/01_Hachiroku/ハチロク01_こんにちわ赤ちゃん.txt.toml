# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。おかげで自分の不明に気づけたし、\n気づきに落ち込まされることなく、前をむけた」
2730 = "「Cảm ơn mọi người. Nhờ mọi người mà anh đã nhận ra sự thiếu sót của bản thân,\\nvà thay vì suy sụp vì điều đó, anh đã có thể vững bước hướng về phía trước」"

# monologue
# JP: 立ち上がる。
3282 = "Đứng dậy."

# monologue
# JP: どうにも出来ないことだからこそ、\nすずとしっかり話し合いたい。
3334 = "Chính vì đó là chuyện bất khả kháng,\\nnên tôi mới muốn thảo luận kỹ càng với Suzu."

# 【日々姫】
# display as 日日姬
# JP: 「おやすみ、にぃに」
2592 = "「Chúc anh ngủ ngon, anh Hai」"

# 【真闇】
# display as 真闇
# JP: 「おやすみ、双ちゃん」
2587 = "「Chúc ngủ ngon, Sou-chan」"

# monologue
# JP: 気持ちをわかってくれてだろう。\n真闇姉も日々姫も、僕をあっさりと送り出してくれる。
3373 = "Chắc là vì hiểu được tâm trạng của tôi.\\nCả chị Mayami lẫn Hibiki đều dễ dàng để tôi đi."

# 【双鉄】
# display as 雙鐵
# JP: 「おやすみ、真闇姉。おやすみ、日々姫。\nまた明日」
2588 = "「Chúc chị Mayami ngủ ngon. Chúc ngủ ngon, Hibiki.\\nHẹn gặp lại vào ngày mai」"

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま、おかえりなさいまし」
2819 = "「Mừng ngài đã trở về, Soutetsu-sama」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2312 = "「嗯」" 

# monologue
# JP: 風呂からあがれば、すずは布団を敷き終えている。\nもぐればすぐに、僕の隣にいそいそ体を寄せてくる。
3418 = "Vừa bước ra khỏi phòng tắm, Suzu đã trải xong nệm.\\nNgay khi tôi chui vào, em ấy đã hăm hở xích lại gần bên cạnh."

# 【ハチロク】
# display as 鈴
# JP: 「今日も一日、お疲れ様でした。双鉄さま」
2107 = "「Ngài đã vất vả suốt cả ngày hôm nay rồi, Soutetsu-sama」"

# 【双鉄】
# display as 雙鐵
# JP: 「すずこそ――」
2805 = "「Suzu cũng vậy mà――」"

# monologue
# JP: 言うかどうかを一瞬悩むが、悩んだ弱さをすぐに消す。
3558 = "Tôi thoáng do dự có nên nói ra hay không, nhưng nhanh chóng gạt bỏ sự yếu lòng đó."

# monologue
# JP: どのみち、向き合わねばいけないことだ。\nならば早くに、ふたりで問題を共有しよう。
3292 = "Dù sao thì đây cũng là chuyện sớm muộn gì cũng phải đối mặt.\\nVậy thì thà chia sẻ vấn đề này cùng nhau từ sớm thì hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「今日はひときわつかれただろう。\n慣れぬ赤ちゃんの世話などもして」
2109 = "「Hôm nay chắc em mệt mỏi hơn hẳn mọi khi nhỉ.\\nLại còn phải chăm sóc em bé chưa quen tay nữa」"

# 【ハチロク】
# display as 鈴
# JP: 「疲れる……ということはございませんでしたが――」
2691 = "「Mệt mỏi…… thì không có chuyện đó đâu ạ, nhưng mà――」"

# monologue
# JP: 布団の中で、すずが力を抜いたのだろう。\nふわり、石鹸の匂いがひろがり、僕を簡単に幸福にする。
3289 = "Ở trong chăn, chắc là Suzu đã thả lỏng người.\\nHương xà phòng dịu nhẹ lan tỏa, dễ dàng mang lại hạnh phúc cho tôi."

# 【ハチロク】
# display as 鈴
# JP: 「……左様ですね。戸惑ったことは確かです。\nなにもかも、初めての経験でしたから」
1648 = "「……Quả đúng là vậy. Quả thực là em đã rất bối rối.\\nVì mọi thứ, đều là những trải nghiệm lần đầu tiên mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2265 = "「啊——」" 

# monologue
# JP: 帝央\x%l機関区;#00ffc040;機関区%l;#;。
3237 = "Khu nhà ga\\x%lTeiou;#00ffc040;Khu nhà ga%l;#;。"

# monologue
# JP: 通勤列車も長距離列車もひっきりなしに行っては帰る、\nまさに帝鉄の心臓部。
3520 = "Tàu đi làm hay tàu đường dài đều đi đi về về không ngớt,\\nđúng nghĩa là trái tim của Teitetsu."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。すずの昔の仕事場は、\n子連れで勤められるような場所ではなかったろうしな」
2187 = "「Ra là vậy. Nơi làm việc cũ của Suzu,\\n e là không phải là chỗ có thể vừa làm vừa trông con được」"

# 【ハチロク】
# display as 鈴
# JP: 「左様でございますね。帝鉄時代は、\nわたくしほとんど、直接の接客も致しませんでしたし」
2497 = "「Quả đúng như vậy ạ. Thời còn ở Teitetsu,\\n hầu như em không hề tiếp xúc trực tiếp với khách hàng」"

# 【双鉄】
# display as 雙鐵
# JP: 「直接の、というのは？」
2660 = "「Tiếp xúc trực tiếp, ý là sao?」"

# 【ハチロク】
# display as 鈴
# JP: 「セレモニイ――各種の式典などで、\nお客様の前に出ることなどはございました」
2164 = "「Là các buổi lễ kỷ niệm――Trong các buổi nghi lễ khác nhau, thỉnh thoảng em có xuất hiện trước mặt khách hàng thôi ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2245 = "「哦」" 

# monologue
# JP: そうした接し方であるなら、\n赤ちゃんと触れ合うなどは、とても叶わぬことだろう。
3207 = "Nếu chỉ tiếp xúc theo cách đó,\\nthì việc được chạm vào em bé, quả là điều không thể mơ tới."

# 【双鉄】
# display as 雙鐵
# JP: 「で、どうだった？」
2787 = "「Vậy, cảm thấy thế nào?」"

# 【ハチロク】
# display as 鈴
# JP: 「どう、とは？　\n――どのような意味でございましょうか？」
2104 = "「Thế nào, là sao ạ? \\n――Ý ngài là muốn hỏi về điều gì vậy?」"

# monologue
# JP: 構えず尋ねる。
3174 = "Tôi hỏi một cách tự nhiên."

# monologue
# JP: この流れ、この機を逃してしまったならば、\nどんどん聞きづらくなることは目に見えるゆえ。
3369 = "Nếu để lỡ mất luồng câu chuyện này, cơ hội này,\\nthì tôi hiểu rõ rằng sau đó sẽ càng khó để hỏi hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「初めて、親しく接してみてだ。\n赤ちゃんについて、どのように感じた？」
2689 = "「Lần đầu tiên tiếp xúc gần gũi như vậy. Em cảm thấy thế nào về em bé?」"

# 【ハチロク】
# display as 鈴
# JP: 「あ」
# 2270 = "「啊」" 

# monologue
# JP: 困ったように、すずが息を呑んでしまう。\nだからその手を、布団の中でにぎりしめる。
3431 = "Suzu nín thở như đang gặp khó khăn.\\nVì vậy, tôi nắm chặt tay cô ấy dưới tấm chăn."

# 【ハチロク】
# display as 鈴
# JP: 「だんなさま……」
2384 = "「Chủ nhân……」"

# 【双鉄】
# display as 雙鐵
# JP: 「聞かせてくれ、すずの思いを。\n素直な気持ちを――僕は、それを共有したい」
2552 = "\"Hãy cho anh biết, những suy nghĩ của Suzu.\nNhững cảm xúc chân thật nhất――anh muốn được cùng chia sẻ với em.\""

# 【ハチロク】
# display as 鈴
# JP: 「っ」
# 2260 = "「唔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまなかったな。『嬉しいのなら、素直に喜べ』――\nなどと。すずの気持ちを汲み取りもせず」
2678 = "\"Anh xin lỗi. Rằng 'nếu em thấy vui thì hãy cứ vui vẻ mà đón nhận'――\nAnh đã nói thế mà không hề thấu hiểu cảm xúc của Suzu.\""

# 【ハチロク】
# display as 鈴
# JP: 「いえ！　いえ！　そのようなこと。\nわたくしが勝手に、お伝えしてはいけないことかと」
2254 = "\"Không ạ! Không ạ! Chuyện đó... \nEm chỉ nghĩ rằng, đó không phải là điều em nên tự ý nói ra.\""

# 【双鉄】
# display as 雙鐵
# JP: 「なにも無いさ。何一つ無い。\nすずの気持ちで、僕が受け取りたくないものなど」
2771 = "\"Không có gì cả. Chẳng có gì cả.\nNhững cảm xúc của Suzu, không có điều nào mà anh không muốn đón nhận cả.\""

# 【ハチロク】
# display as 鈴
# JP: 「はい――だんなさま。わたくしのマスター。\n双鉄、さま」
2402 = "\"Vâng――chủ nhân. Chủ nhân của em.\nSoutetsu, sama.\""

# monologue
# JP: （きゅっ）
3575 = "(Siết chặt)"

# monologue
# JP: 握り返してくる。
3189 = "Bàn tay ấy siết lại tay tôi."

# monologue
# JP: すずの手が、僕の手をにぎり、\n指をほどいて、指と指とを絡めてくる。
3531 = "Tay của Suzu nắm lấy tay tôi,\nrồi nới lỏng ngón tay, đan chặt vào từng kẽ tay tôi."

# 【ハチロク】
# display as 鈴
# JP: 「でしたら、感じましたことを。\nそのまま、素直に申しますね？」
2794 = "\"Vậy thì, những gì em cảm nhận được.\nEm sẽ nói ra một cách thật thà, y như vậy nhé?\""

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2312 = "「嗯」" 

# 【ハチロク】
# display as 鈴
# JP: 「かわいい。やわらかい。あたたかい。こわれそう。\n守りたい。ミルクのかおり。おひさまの匂い。しあわせ」
2181 = "\"Đáng yêu. Mềm mại. Ấm áp. Tựa như sắp vỡ tan.\nMuốn bảo vệ. Mùi hương của sữa. Mùi hương của ánh mặt trời. Hạnh phúc.\""

# monologue
# JP: 言葉を飾れば、きっと、何かが変わるのだろう。
3439 = "Nếu tô vẽ thêm lời hoa mỹ, chắc chắn, thứ gì đó sẽ đổi thay."

# monologue
# JP: すずは単語を――\n感じたままを、本当にそのまま、口から零す。
3294 = "Suzu chỉ thốt ra những từ ngữ――\nĐúng như những gì cô bé cảm nhận, thực sự chỉ là những từ ngữ thuần túy."

# 【ハチロク】
# display as 鈴
# JP: 「愛しい。大好き。くすぐったい。ふわふわ。\nおわかれするのが――とても、さみしい。痛いくらいに」
2503 = "\"Yêu thương. Rất yêu. Nhột nhạt. Bồng bềnh.\nKhi phải chia xa――thật sự, rất buồn. Đau đến nhói lòng.\""

# 【双鉄】
# display as 雙鐵
# JP: 「すず」
2804 = "\"Suzu.\""

# 【ハチロク】
# display as 鈴
# JP: 「それから、うれしい。わたくしの大好きな双鉄さまが、\nわたくしのだんなさまが、一緒に喜んで、笑ってくれて」
2166 = "\"Và sau đó, là hạnh phúc. Vì người mà em yêu quý nhất, Soutetsu-sama,\nchủ nhân của em, đã cùng vui, cùng cười với em.\""

# monologue
# JP: きゅうっと、僕の手をにぎる力が強くなる。
3486 = "Cái nắm tay của cô ấy bỗng chặt hơn, siết lấy tay tôi."

# 【ハチロク】
# display as 鈴
# JP: 「とても、楽しい時間でした。まるで夢のような――\nいえ、きっと。あれはひとときの、夢だったのです」
2672 = "「Đó là một khoảng thời gian vô cùng tuyệt vời. Cứ như là một giấc mơ vậy――\nKhông, chắc chắn rồi. Đó chỉ là một giấc mơ ngắn ngủi mà thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「……夢、か」
1656 = "「……Mơ sao」"

# monologue
# JP: 眠ってみる夢。\n起きながらにして描く夢。
3525 = "Giấc mơ khi ta chìm vào giấc ngủ.\nGiấc mơ khi ta vẽ ra ngay cả lúc đang tỉnh."

# monologue
# JP: そのどちらもが、夢と呼ばれる。\nすずは恐らく、前者と捉えているのだろうが――
3049 = "Cả hai đều được gọi là giấc mơ.\nSuzu có lẽ đang nghĩ về trường hợp thứ nhất, nhưng mà――"

# 【双鉄】
# display as 雙鐵
# JP: 「夢であるなら、叶える方法を探ってみよう」
2701 = "「Nếu đó là mơ, thì hãy cùng tìm cách biến nó thành hiện thực xem」"

# 【ハチロク】
# display as 鈴
# JP: 「えっ！？」
2227 = "「Hả!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかっている。お前が\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なことは。\nけれど僕らは、こうして夫婦に、家族になれた」
2530 = "「Anh biết. Biết rõ em là một \\x%lRailord;#00ffc040;Railord%l;#;. \nNhưng chúng ta vẫn có thể trở thành vợ chồng, trở thành một gia đình như thế này đây」"

# 【ハチロク】
# display as 鈴
# JP: 「それは……左様でございますが」
2761 = "「Chuyện đó…… đúng là như vậy ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「初めて出会ったときには、まさか夫婦になるなどと。\nそれこそ夢にも、お互い思っていなかった」
2515 = "「Lần đầu gặp mặt, chẳng ai trong chúng ta, thậm chí là trong mơ, có thể ngờ rằng sẽ có ngày trở thành vợ chồng」"

# 【ハチロク】
# display as 鈴
# JP: 「はい――」
2619 = "「Vâng――」"

# 【双鉄】
# display as 雙鐵
# JP: 「それが、今は、こうして夫婦の床にいる。僕らがお互い、\nそうありたいと、いつか望むようになったから」
2128 = "「Vậy mà giờ đây, chúng ta lại đang ở đây, bên nhau như một đôi vợ chồng. Bởi vì cả hai chúng ta, cuối cùng cũng đã khao khát điều đó」"

# monologue
# JP: すずの手が、僕の手のひらにくっついたままに解かれる。
3533 = "Tay Suzu rời ra khỏi lòng bàn tay tôi, rồi lại đặt lại vào."

# monologue
# JP: 言葉で答えるその代わり、指と指とを絡め合い、\nすずはぴったり、隙間なく僕の手をにぎり直す。
3426 = "Thay vì trả lời bằng lời nói, các ngón tay đan xen vào nhau,\nSuzu nắm chặt lấy tay tôi một lần nữa, không một kẽ hở."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、望もう。ふたりで共に。\nこどもを――新しい家族を迎えることを」
2791 = "「Vậy thì, hãy cùng ước nguyện đi. Cả hai chúng ta.\nSẽ đón một đứa trẻ―― một thành viên mới của gia đình mình」"

# 【ハチロク】
# display as 鈴
# JP: 「あ……\nあっ――双鉄、さまっっ」
2269 = "\"A……\nAh――Soutetsu-sama\""

# monologue
# JP: ぼろぼろと、すずの瞳から涙が落ちる。
3359 = "Từng giọt nước mắt lăn dài từ đôi mắt của Suzu."

# monologue
# JP: それほどに強く焦がれたのかと少し驚き――\nならば、叶えてやりたくなる。
3197 = "Tôi hơi ngạc nhiên khi thấy cô ấy khao khát điều đó đến nhường này――\nNếu vậy, tôi muốn thực hiện nó cho cô ấy."

# 【ハチロク】
# display as 鈴
# JP: 「わたっ――わたくしの、ために、そのような」
2507 = "\"Chuyện đó――vì em, mà ngài lại...\""

# 【双鉄】
# display as 雙鐵
# JP: 「すずのため、ではない。\n僕らのため、さ」
2765 = "\"Không phải vì Suzu đâu.\nLà vì chúng ta đấy.\""

# 【ハチロク】
# display as 鈴
# JP: 「っ！！」
2262 = "\"Ư!!\""

# 【双鉄】
# display as 雙鐵
# JP: 「さっきすずが、自らの口で言ったろう。\n僕も、一緒に楽しみ、笑った」
2178 = "\"Chẳng phải vừa nãy chính miệng Suzu đã nói sao?\nAnh cũng đã cùng em tận hưởng và mỉm cười.\""

# monologue
# JP: ああ、そうだ。\n笑いが自然とこみあげるほど、楽しかったのだ。
3175 = "À, phải rồi.\nNiềm vui ấy khiến nụ cười tự nhiên trào dâng."

# monologue
# JP: 手の中に抱いたちいさな命は、\nひたすらかわいく、かけがえのないものと感じた。
3253 = "Sinh linh nhỏ bé đang ôm trong tay này,\nThật sự vô cùng đáng yêu và không gì có thể thay thế được."

# 【双鉄】
# display as 雙鐵
# JP: 「ああした時間を、僕も、すずと重ねていきたい。\nだからこれは間違いなく、僕らの願い――いや、目標だ」
2512 = "\"Anh cũng muốn tiếp tục cùng Suzu chia sẻ những khoảng thời gian như thế.\nVì vậy, đây chắc chắn là mong ước――không, là mục tiêu của chúng ta.\""

# 【ハチロク】
# display as 鈴
# JP: 「とても――うれしうございます。\nけれど――ですけれどっ、双鉄さまっ」
2541 = "\"Em thực sự――vô cùng hạnh phúc.\nNhưng mà――nhưng mà, Soutetsu-sama!\""

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2346 = "「嗯？」" 

# monologue
# JP: ぼろぼろぼろぼろ。すずの涙は止まらない。\nむしろ激しくなっている。
3532 = "Nước mắt Suzu rơi lã chã không ngừng.\nThậm chí còn dữ dội hơn trước."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？\n僕は、なにかまたまずい事を言ってしまったか？」
2485 = "\"Sao vậy?\nAnh lại lỡ lời nói điều gì không phải sao?\""

# 【ハチロク】
# display as 鈴
# JP: 「いいえ、いいえ、まずいことなど、ただのひとつも。\nけれど……ですけれど――わたくし――わた、くしっ」
2617 = "\"Không, không, không có điều gì là không phải cả.\nChỉ là…… nhưng mà――em――em...\""

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2312 = "「嗯」" 

# monologue
# JP: 落ち着けたくて、\n空いている手ですずをゆっくり撫ぜてやる。
3281 = "Muốn để cô ấy bình tĩnh lại,\nTôi nhẹ nhàng vuốt ve Suzu bằng bàn tay còn lại."

# monologue
# JP: ゆっくりゆっくり、何度も何度も――\nそうしていつか、しゃくりあげる声が聞こえなくなる。
3492 = "Chậm rãi thôi, lặp đi lặp lại thật nhiều lần——\nCứ như thế, cho đến một lúc nào đó, không còn nghe thấy tiếng nức nở nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「……すずは、何が悲しいのだ？\nあるいは、何が心配なのだ？」
1674 = "「……Suzu, em đang buồn điều gì?\nHay là, em đang lo lắng chuyện gì vậy?」"

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまのお望みに、応えることができるかどうか――\nそれさえわからぬ、わたくし自身が、でございます」
2539 = "「Liệu có thể đáp ứng được mong muốn của anh Soutetsu hay không——\nNgay cả chính bản thân em cũng chẳng rõ điều đó, thưa anh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2346 = "「嗯？」" 

# 【ハチロク】
# display as 鈴
# JP: 「わたくしは、古い。とても古い\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です」
2525 = "「Em là một Railord rất cũ. Một \\x%lRailord;#00ffc040;Railord%l;#; rất đỗi cổ xưa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2265 = "「啊——」" 

# monologue
# JP: なるほど、そこか。
3142 = "Ra là vậy, là ở chỗ đó sao."

# monologue
# JP: 確かにそれは、避けては通れぬ問題だ。
3054 = "Quả thực, đó là một vấn đề không thể né tránh."

# 【ハチロク】
# display as 鈴
# JP: 「今日止まるとも、明日止まるともわからぬ存在。\nそのようなわたくしが、例え何らかの方法で――」
2084 = "「Một sự tồn tại mà chẳng biết hôm nay hay ngày mai sẽ dừng hoạt động.\nNgay cả khi em có thể bằng cách nào đó——」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから夫婦で。だから、家族だ」
2545 = "「Vì thế chúng ta là vợ chồng. Vì thế chúng ta là gia đình.」"

# 【ハチロク】
# display as 鈴
# JP: 「！」
# 2283 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心配性だな。僕のかわいいおよめさんは」
2517 = "「Em lo xa quá đấy. Người vợ đáng yêu của anh ạ.」"

# monologue
# JP: わざとふざけた口調でいって、\n目の縁の残る涙の粒をぬぐいとる。
3255 = "Tôi cố tình nói bằng giọng đùa cợt,\nrồi lau đi những giọt nước mắt còn vương nơi khóe mắt em."

# 【双鉄】
# display as 雙鐵
# JP: 「今日死ぬかも、明日死ぬかもわからんのは、\n誰もが同じだ。僕も、日々姫も、真闇姉も」
2721 = "「Ai cũng vậy thôi, chẳng ai biết mình sẽ chết vào hôm nay hay ngày mai cả.\nKể cả anh, Hibiki-hime, hay chị Mamiyo cũng vậy.」"

# 【ハチロク】
# display as 鈴
# JP: 「それは――理屈の上では左様でございましょうが」
2500 = "「Về mặt lý thuyết thì đúng là như vậy ạ——」"

# 【双鉄】
# display as 雙鐵
# JP: 「理屈の上では、なのだろう？　すずの懸念も。\nそれとも、まさかどこか具体的な不調でも」
2775 = "「Về mặt lý thuyết, là thế đúng không? Mối bận tâm của Suzu cũng vậy.\nHay là, chẳng lẽ em đang gặp bất ổn cụ thể nào ở đâu sao?」"

# 【ハチロク】
# display as 鈴
# JP: 「いいえ、まったく！　もしも何かの異変があれば、\nまっさきに双鉄さまにお伝えしております」
2618 = "「Không, hoàn toàn không ạ! Nếu có bất kỳ sự thay đổi bất thường nào,\nem sẽ là người đầu tiên báo cho anh Soutetsu biết.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だよな」
2421 = "「Anh biết mà.」"

# monologue
# JP: ホッとする。\nそんな気持ちを共有したくて、また撫ぜる。
3259 = "Cảm thấy nhẹ nhõm.\\nMuốn chia sẻ cảm giác đó, tôi lại vuốt ve."

# 【双鉄】
# display as 雙鐵
# JP: 「誰もが、明日どうなってしまうかわからない。\nだから、人は、きっと家族をつくるのだ」
2125 = "「Chẳng ai biết ngày mai sẽ ra sao cả.\\nThế nên, con người mới luôn muốn tạo dựng một gia đình.」"

# 【ハチロク】
# display as 鈴
# JP: 「どうなってしまうかわからないから――\nきっと、お互いを支え合うため」
2636 = "「Vì chẳng biết chuyện gì sẽ xảy ra――\\nNên chắc chắn, chúng ta cần nương tựa vào nhau.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。未来はとても不確かで、怖くて。\nだけれど未来を諦めるのは、とても愚かしいことだから」
2310 = "「Ừ. Tương lai rất mơ hồ và đáng sợ.\\nNhưng từ bỏ tương lai là một điều vô cùng ngu ngốc.」"

# monologue
# JP: 他の誰より、僕は知ってる。
3506 = "Hơn bất cứ ai, tôi hiểu rõ điều đó."

# monologue
# JP: 未来を諦めるそのことが、どれほど周りを、\nそして誰より自分自身を、傷つけ悲しませることなのか。
3313 = "Việc từ bỏ tương lai sẽ gây tổn thương và đau buồn cho những người xung quanh,\\nvà hơn ai hết, cho chính bản thân mình đến nhường nào."

# 【双鉄】
# display as 雙鐵
# JP: 「僕らは家族だ。なにかあっても支え合える。\nそうしてそれは、赤ちゃんに対しても、必ず同じだ」
2516 = "「Chúng ta là một gia đình. Dù có chuyện gì cũng có thể cùng nhau vượt qua.\\nVà điều đó, chắc chắn cũng sẽ áp dụng với đứa bé.」"

# 【ハチロク】
# display as 鈴
# JP: 「あ――」
# 2265 = "「啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前と僕だけの赤ちゃんではない。\n右田家で迎える赤ちゃんだ。必ず、幸せにしてやれる」
2406 = "「Đó không phải chỉ là con của riêng em và anh.\\nĐó là đứa bé được đón nhận bởi gia đình Migita. Anh chắc chắn sẽ mang lại hạnh phúc cho đứa bé.」"

# 【ハチロク】
# display as 鈴
# JP: 「はい――はい、きっと。\n必ず、左様ですね、双鉄さま」
2389 = "「Vâng――vâng, chắc chắn rồi ạ.\\nNhất định là như vậy, thưa Soutetsu-sama.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2312 = "「嗯」" 

# monologue
# JP: ならば、いい。
3509 = "Nếu vậy thì tốt."

# monologue
# JP: 絶対に幸せにする覚悟が無いなら、\n僕ら夫婦に、こどもを迎えようとする資格などない。
3443 = "Nếu không có quyết tâm mang lại hạnh phúc tuyệt đối,\\nthì vợ chồng chúng ta chẳng có tư cách để đón một đứa trẻ về."

# 【ハチロク】
# display as 鈴
# JP: 「うふふ……ふぁ」
2348 = "「Ư fufu… haa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「眠くなったか」
2764 = "「Em buồn ngủ rồi sao?」"

# 【ハチロク】
# display as 鈴
# JP: 「はい。嬉しくて、安心したら、なんだかとても。\nきっと今日は、こころが動きすぎたのですね」
2579 = "「Vâng. Vì quá vui sướng và an tâm nên em thấy hơi…\\nChắc là hôm nay cảm xúc của em đã xao động quá nhiều rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。僕もだ」
2596 = "「Chắc vậy. Anh cũng thế.」"

# monologue
# JP: だからまぶたを優しく撫でて、今は瞳を閉じさせる。
3314 = "Vì vậy, tôi nhẹ nhàng vuốt ve mi mắt, để em khép đôi mắt lại ngay bây giờ."

# 【双鉄】
# display as 雙鐵
# JP: 「故にいまは――何も考えず静かに眠ろう」
2547 = "「Vậy nên lúc này đây——hãy cứ lặng lẽ chìm vào giấc ngủ mà không cần suy nghĩ gì cả」"

# 【ハチロク】
# display as 鈴
# JP: 「はい――かしこまりました」
2397 = "「Vâng——em đã rõ rồi ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「おやすみ、すず」
2590 = "「Chúc ngủ ngon, Suzu」"

# monologue
# JP: 目を閉じる。
3262 = "Tôi nhắm mắt lại."

# monologue
# JP: たやすく生じた暗闇に、\n優しい声が、ぽうっと灯る。
3183 = "Trong màn đêm dễ dàng bao trùm lấy,\\nmột giọng nói dịu dàng, khẽ thắp sáng lên."

# 【ハチロク】
# display as 鈴
# JP: 「おやすみなさい――だんなさま。\nわたくしの大好きな、双鉄さま」
2584 = "「Chúc ngủ ngon——thưa chủ nhân.\\nSoutetsu-sama, người mà em vô cùng yêu mến」"
