# 【ハチロク】
# display as 八六
# JP: 「良かったのは、双鉄さまもですよ？、\n双鉄さまもまゆちゃんと、相性抜群でございますから」
2762 = "「Người nhận được điều tốt lành cũng là Soutetsu-sama nữa mà?\\nVì Soutetsu-sama cũng cực kỳ hợp rơ với bé Mayu đấy thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――ああ！」
2345 = "「Uhm? ――A!」"

# monologue
# JP: 一瞬遅れて理解する。
3557 = "Một khắc sau tôi mới hiểu ra."

# monologue
# JP: 僕とハチロクの相性は最高。\nで、ハチロクとまゆちゃんの相性が抜群ならば――
3268 = "Sự tương thích giữa tôi và Hachiroku là tuyệt nhất.\\nVà nếu sự tương thích giữa Hachiroku và bé Mayu cũng là xuất chúng――"

# 【双鉄】
# display as 雙鐵
# JP: 「三段論法か」
2558 = "「Tam đoạn luận sao?」"

# 【まゆ】
# display as 茉祐
# JP: 「あぅわぅぅゅゅぅ～」
2302 = "「A... u... oa... u... uu~」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　三段論法と、いままゆちゃんが！\n双鉄さまのお声を真似したのですね！！」
2496 = "「Chà! Tam đoạn luận sao, vừa rồi bé Mayu!\\nĐã bắt chước giọng của ngài Soutetsu đúng không ạ!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
2082 = "「Không――」"

# 【まゆ】
# display as 茉祐
# JP: 「ふにゃー」
2303 = "「Funyaー」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2261 = "「!」"

# monologue
# JP: 偶然だろう、と舌先にまで乗っていた言葉を、\n急ぎ呑み込む。
3267 = "Tôi vội nuốt ngược những lời \"chắc chỉ là ngẫu nhiên thôi\"\\nđang chực chờ nơi đầu lưỡi."

# monologue
# JP: いま――いま、このこは――\nまゆちゃんは――
3137 = "Vừa rồi―― vừa rồi, đứa trẻ này――\\nbé Mayu――"

# 【双鉄】
# display as 雙鐵
# JP: 「僕の顔をみて、笑ったぞ」
2388 = "「Đã nhìn mặt anh và cười kìa.」"

# 【ハチロク】
# display as 八六
# JP: 「笑いましたね。\n相性抜群なのですから、当然でしょうが」
2385 = "「Đã cười rồi nhỉ.\\nVì sự tương thích là xuất chúng mà, nên đó là điều đương nhiên thôi.」"

# 【まゆ】
# display as 茉祐
# JP: 「んふー」
2321 = "「Nfuhー」"

# 【双鉄】
# display as 雙鐵
# JP: 「むうう」
2224 = "「Muuu」"

# monologue
# JP: これは、かわいい。\nハチロクがメロメロになった気持ちがわかる。
3195 = "Cái này, thật là đáng yêu.\\nMình có thể hiểu được cảm xúc khiến Hachiroku mê mẩn đến vậy."

# monologue
# JP: どこまでだって喜ばせてやりたくなるし、\nもっと幸せにしてやりたくなる。
3203 = "Dù có đi đến đâu đi chăng nữa, mình cũng muốn làm cho cô bé vui lòng,\\nvà muốn làm cho cô bé hạnh phúc hơn nữa."

# 【ハチロク】
# display as 八六
# JP: 「あの――浦上様。\n双鉄さまにも、まゆちゃんを抱っこしていただいても」
2728 = "「Xin lỗi――Urakami-sama.\\nCô cũng có thể cho Soutetsu-sama bế bé Mayu một chút được không ạ」"

# 【浦上】
# display as 浦上
# JP: 「もちろん。っていうか、それこそ光栄。\n御一夜を立て直した腕に抱っこしてもらえるなんて」
2647 = "「Dĩ nhiên rồi. Mà nói đúng hơn, đó là vinh hạnh của tôi ấy chứ.\\nĐược bế bởi đôi tay từng vực dậy cả Ohitoyo cơ mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、おおげさです」
2255 = "「Không, cô nói quá rồi ạ」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？\n抱っこは、右手をゆりかごにして、ですね」
2820 = "「Soutetsu-sama?\\nKhi bế bé, hãy dùng tay phải làm thành một chiếc nôi nhé」"

# monologue
# JP: さっき浦上さんから教わったそのままを、\nまるでベテランの顔をして、ハチロクは僕に教えてくれる。
3103 = "Hachiroku chỉ lại cho tôi chính xác những gì vừa được Urakami-san hướng dẫn lúc nãy,\\nvới một khuôn mặt trông y như một người đầy kinh nghiệm."

# 【ハチロク】
# display as 八六
# JP: 「そう――とてもお上手です。\nええと……それでは、浦上さま」
2425 = "「Đúng rồi――Anh làm tốt lắm.\\nÀ…… Vậy thì, Urakami-sama」"

# 【浦上】
# display as 浦上
# JP: 「ううん。ハチロクちゃんが移してあげて？」
2326 = "「Không sao đâu. Hachiroku-chan cứ trao bé qua cho cậu ấy đi?」"

# 【ハチロク】
# display as 八六
# JP: 「は、はい。それは――大役でございますね。\nですが――それでは、失礼して――そっと、そうっと」
2290 = "「V-Vâng. Việc đó――quả là một trọng trách lớn lao ạ.\\nNhưng mà――vậy thì, em xin phép――nhẹ nhàng, thật nhẹ nhàng thôi」"

# monologue
# JP: ハチロクの腕の高さにあわせ、腰をかがめる。
3273 = "Tôi khom người xuống, điều chỉnh theo độ cao của cánh tay Hachiroku."

# monologue
# JP: ハチロクの肌が僕の腕に触れ、\nまゆちゃんがゆっくりと僕の手に移される――
3100 = "Làn da của Hachiroku chạm vào cánh tay tôi,\\nvà bé Mayu từ từ được chuyển sang đôi tay tôi――"

# 【まゆ】
# display as 茉祐
# JP: 「あにゅー」
2279 = "「A nyuー」"

# monologue
# JP: 金モールがまゆちゃんの手から離れて、\nまゆちゃんの腕が追いかけ、伸びる。
3457 = "Sợi dây tua rua vàng rời khỏi tay bé Mayu,\\nvà đôi tay của Mayu vươn ra để đuổi theo nó."

# monologue
# JP: ほとんど反射での行動だろう。\nハチロクは、その手の先に指を差し出し。
3508 = "Gần như là một hành động theo phản xạ.\\nHachiroku đưa ngón tay của mình ra phía trước bàn tay bé."

# monologue
# JP: （きゅっ！）
3573 = "（Chặt!）"

# 【まゆ】
# display as 茉祐
# JP: 「んゆー」
2320 = "「Nyuu—」"

# 【ハチロク】
# display as 八六
# JP: 「あ――あっ――」
2266 = "「A—— a——」"

# monologue
# JP: そして、固まる。
3098 = "Và rồi, em ấy đứng hình."

# monologue
# JP: 困惑にでも怯えにでもなく、幸福に。
3033 = "Không phải vì bối rối hay sợ hãi, mà là vì hạnh phúc."

# 【まゆ】
# display as 茉祐
# JP: 「ん～、あー、きゅふー」
2347 = "「Ưm~, aa, kyufu—」"

# monologue
# JP: まゆちゃんはにこにこご機嫌だ。
3449 = "Bé Mayu đang mỉm cười rạng rỡ đầy vui vẻ."

# monologue
# JP: ハチロクの最高の肌触りを楽しんでいるのだろうか？\n手をにぎにぎと動かしながら、はしゃいでいる。
3034 = "Có lẽ là đang tận hưởng cảm giác tuyệt vời khi chạm vào làn da của Hachiroku chăng?\\nĐôi bàn tay nhỏ nhắn cứ nắm đi nắm lại, đầy vẻ phấn khích."

# 【ハチロク】
# display as 八六
# JP: 「だ、だんなさまっ――双鉄さま。どうしましょう、\nわたくし、動けなくなってしまいました」
2381 = "「Nh- Nhân công đại nhân—— ngài Soutetsu. Phải làm sao bây giờ ạ,\\n v- vạt áo của em, không thể nhúc nhích được nữa rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。動けんな」
2342 = "「Ừm. Không cử động được rồi」"

# monologue
# JP: 姿勢が良くない。僕は完全な中腰だ。\n今はまったく平気なものの、時間が立てば辛くなろう。
3279 = "Tư thế này không tốt chút nào. Tôi đang phải khom hoàn toàn lưng xuống.\\nBây giờ thì chưa sao, nhưng một lát nữa thôi chắc chắn sẽ mỏi nhừ."

# monologue
# JP: ――む？　いや、時間っ！
1588 = "—— Hửm? Khoan đã, thời gian!"

# 【双鉄】
# display as 雙鐵
# JP: 「すまない、稀咲。\n予定時間を大幅にオーバーしてしまった」
2079 = "「Xin lỗi em, Kisaki.\\nAnh đã để quá giờ hẹn nhiều quá rồi」"

# 【ハチロク】
# display as 八六
# JP: 「え！？　あ！　きゃっ！！？\nわたくしたちも、戻りませんとっ」
2229 = "「Ể!? A! Kyaa!!?\\nChúng ta cũng phải mau quay lại thôi ạ」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ、本当だ。残念――\n楽しい時間は、飛ぶように過ぎ去ってしまうものだね」
2298 = "「À, đúng thế thật. Tiếc quá nhỉ——\\nKhoảng thời gian vui vẻ quả nhiên luôn trôi qua nhanh như bay vậy」"

# 【浦上】
# display as 浦上
# JP: 「うふふ、それじゃあ、まゆ、\nおうちに帰ろうか？」
2353 = "「Ufufu, vậy thì Mayu này,\\nchúng ta về nhà thôi con nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっ」
2245 = "「Ồ」"

# 【まゆ】
# display as 茉祐
# JP: 「んきゅあ！」
2314 = "「Nkyua!」"

# monologue
# JP: ――ああ、正真正銘、母は強し、だ。
1586 = "――Ai chà, quả đúng là người mẹ nào cũng thật phi thường."

# monologue
# JP: ハチロクや僕に抱っこされていたときも、\nまゆちゃんはほぼほぼ笑顔でいてくれたが。
3555 = "Ngay cả lúc được Hachiroku hay tôi bồng bế,\\nbé Mayu hầu như lúc nào cũng giữ nụ cười trên môi."

# 【双鉄】
# display as 雙鐵
# JP: 「これは――輝くような笑顔だな」
2769 = "「Đây đúng là――một nụ cười rạng rỡ nhỉ」"

# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 2265 = "「啊——」" 

# monologue
# JP: まゆちゃんの手が、あっけなく、\nハチロクの指を離してしまう。
3460 = "Bàn tay bé nhỏ của Mayu dễ dàng\\nbuông lỏng khỏi ngón tay của Hachiroku."

# monologue
# JP: その手でぎゅうっと浦上さんにくっついて、\nしあわせであふれんばかりの笑顔を胸に埋めている。
3524 = "Đôi bàn tay ấy ôm thật chặt lấy cô Uragami, vùi khuôn mặt tràn ngập nụ cười hạnh phúc vào lồng ngực mẹ."

# 【浦上】
# display as 浦上
# JP: 「私もすみませんでした。突然お邪魔しちゃって。\n近くまで来たものだから、ご挨拶だけでもと思って」
2258 = "「Tôi mới là người phải xin lỗi ạ. Tự dưng lại đến làm phiền thế này.\\nVì có việc đi ngang qua đây nên tôi chỉ định ghé qua chào hỏi một tiếng thôi」"

# 【稀咲】
# display as 稀咲
# JP: 「いや、来てくれて嬉しい。本当に。\nまたいつでも、今度はゆっくり、会食でもしよう」
2252 = "「Không đâu, em đến là anh vui rồi. Thật đấy.\\nBất cứ lúc nào cũng được, lần tới hãy thong thả cùng nhau ăn một bữa nhé」"

# 【浦上】
# display as 浦上
# JP: 「ええ、喜んで」
2328 = "「Vâng, em rất sẵn lòng ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、僕らも」
2158 = "「Hachiroku, chúng ta cũng...」"

# 【ハチロク】
# display as 八六
# JP: 「はい――左様ですね、双鉄さま」
2398 = "「Vâng――đúng vậy ạ, thưa ngài Soutetsu」"

# monologue
# JP: ハチロクの目が、ほんの一瞬まゆちゃんを見る。
3125 = "Ánh mắt Hachiroku khẽ nhìn bé Mayu trong thoáng chốc."

# monologue
# JP: あれほどにモールを、指を気に入ってたのに、\nまゆちゃんはもう、おかあさんだけしか見ていない。
3447 = "Dù lúc nãy bé có vẻ thích sợi dây nhung và ngón tay của cô ấy đến thế, nhưng giờ đây, trong mắt Mayu chỉ còn có mẹ mình mà thôi."

# 【ハチロク】
# display as 八六
# JP: 「それでは、失礼いたします。稀咲様、浦上様」
2790 = "「Vậy thì, tôi xin phép cáo lui. Kisa-sama, Uragami-sama」"

# monologue
# JP: ハチロクも、もういつもどおりだ。\nすました顔でスカートの裾をつまんで一礼をする。
3115 = "Hachiroku cũng đã trở lại dáng vẻ ngày thường.\\nCô nhấc nhẹ gấu váy, cúi đầu chào một cách lịch sự với khuôn mặt điềm tĩnh."

# 【稀咲】
# display as 稀咲
# JP: 「うん。また」
2330 = "「Ừm. Hẹn gặp lại nhé」"

# 【浦上】
# display as 浦上
# JP: 「今日は、まゆをかまってくれてありがとうね。\nおかげで、稀咲さんとゆっくりお話できた」
2112 = "「Cảm ơn cháu hôm nay đã chơi với Mayu nhé.\\nNhờ vậy mà cô mới có thể thong thả trò chuyện với Kisa-san」"

# 【ハチロク】
# display as 八六
# JP: 「こちらこそ。まゆちゃんをだっこさせてくださり、\nありがとうございました。さ、参りましょう双鉄さま」
2491 = "「Dạ không có chi ạ. Cảm ơn cô đã cho cháu được bế bé Mayu.\\nNào, chúng ta đi thôi, Soutetsu-sama」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。では、またな、稀咲。\n浦上さんも、またお会いできますことを」
2344 = "「Ừm. Vậy hẹn gặp lại sau nhé, Kisa.\\nUragami-san, hy vọng sớm được gặp lại cô」"

# 【稀咲】
# display as 稀咲
# JP: 「うん、また」
# 2330 = "「嗯，待會見」" 

# 【浦上】
# display as 浦上
# JP: 「ええ、きっと」
2454 = "「Vâng, chắc chắn rồi」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
2821 = "「Soutetsu-sama?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2312 = "「嗯」" 

# monologue
# JP: 時間は確かに押してはいるが、\n遅刻せずに済む範囲でもある。
3559 = "Thời gian tuy có hơi gấp rút thật,\\nnhưng vẫn nằm trong phạm vi không lo bị trễ."

# monologue
# JP: そう急がずとも良い気もするが、\nハチロクは妙にせかせかしている。
3309 = "Tôi cảm thấy cũng chẳng cần phải vội vã đến thế,\\nnhưng Hachiroku lại tỏ ra nôn nóng một cách lạ lùng."

# 【双鉄】
# display as 雙鐵
# JP: 「待たせたな。行こう」
2093 = "「Để em chờ lâu rồi. Đi thôi nào」"

# 【ハチロク】
# display as 八六
# JP: 「はい。参りましょう」
2400 = "「Vâng. Chúng ta đi thôi ạ」"

# 【まゆ】
# display as 茉祐
# JP: 「あーーー」
# 2265 = "「啊——」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 2261 = "「唔！」" 

# monologue
# JP: 甘えたようなまゆちゃんの声。\nハチロクの足がぎくりと止まる。
3428 = "Giọng nói nũng nịu của bé Mayu vang lên.\\nBước chân của Hachiroku bỗng khựng lại."

# 【浦上】
# display as 浦上
# JP: 「そうね？　まゆ。\nね、ハチロクおねーちゃんに『バイバイ』って」
2574 = "「Đúng không nào, Mayu?\\nNào, 'bai bai' chị Hachiroku đi con」"

# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます――まゆちゃん」
2729 = "「Chị cảm ơn em nhé ―― Mayu-chan」"

# monologue
# JP: ハチロクが振り向く。\n完璧な営業スマイルで――だから、余計に目立ってしまう。
3088 = "Hachiroku quay lại.\\nVới một nụ cười rạng rỡ, chuyên nghiệp — chính vì thế, nó lại càng thêm nổi bật."

# 【ハチロク】
# display as 八六
# JP: 「バイバイ、ですね。\nご縁がありましたら、またお会いしましょう」
2555 = "「Tạm biệt nhé.\\nNếu có duyên, chúng ta sẽ lại gặp nhau」"

# monologue
# JP: ……笑顔で、とても綺麗な声で。
1608 = "……Một nụ cười, cùng với chất giọng vô cùng trong trẻo."

# monologue
# JP: けれどその目のフチには涙が――\nほんの僅かに、滲んでる。
3367 = "Nhưng nơi khóe mắt cô ấy —\\nLại đang chớm đọng một chút lệ nhòa."

# 【日々姫】
# display as 日日姬
# JP: 「ご馳走さまーっ！」
2521 = "「Cảm ơn vì bữa ăn ạ!」"

# 【真闇】
# display as 真闇
# JP: 「はい、お粗末さま。\nで、おねーちゃんも、ご馳走様」
