[script]
# lines: 558 
# 【元忠】
# display as 元忠
# JP: 「大九洲SL構想！」
2373 = "「Sáng kiến SL Đại Cửu Châu!」"

# monologue
# JP: 分厚い書類が元忠さんの手によって\n机の上に叩きつけられる。
3073 = "Một xấp tài liệu dày cộp được bác Mototada\\nđập mạnh xuống bàn."

# monologue
# JP: 構想参加各社の経営報告書――\nその内容が、上向きの物ばかりであるにも関わらず。
3517 = "Báo cáo kinh doanh của các công ty tham gia sáng kiến――\\nbất kể nội dung trong đó toàn là những chuyển biến đầy khởi sắc."

# 【元忠】
# display as 元忠
# JP: 「構想は広く受け入れられている。各地の復線も順調だ。\nにもかかわらず――御一夜だけが取り残されている」
2710 = "「Sáng kiến đang được đón nhận rộng rãi. Việc khôi phục các tuyến đường sắt khắp nơi cũng tiến triển thuận lợi.\\nThế nhưng――chỉ có mỗi Oniyo là đang bị bỏ lại phía sau」"

# monologue
# JP: 元忠さんがギロリと僕をねめつける。\nその隣、稀咲はどこか取り澄ましたような表情だ。
3074 = "Bác Mototada lườm tôi một cái sắc lẹm.\\nNgay bên cạnh bác, Kisa lại mang một vẻ mặt có phần thờ ơ, điềm tĩnh."

# 【元忠】
# display as 元忠
# JP: 「原因が何かを御一夜鉄道がきちんと分析できているのか。\n双鉄君、君の口から聞かせてもらおう」
2161 = "「Liệu Đường sắt Oniyo đã phân tích kỹ càng nguyên nhân là gì chưa.\\nCậu Soutetsu, ta muốn chính miệng cậu trả lời xem nào」"

# monologue
# JP: ホっとする。\nこの質問なら想定してある。
3258 = "Tôi thở phào nhẹ nhõm.\\nCâu hỏi này nằm trong dự tính của tôi rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「原因は、極めて明快です。\n大九洲ＳＬ構想が、受け入れられすぎたため、となります」
2193 = "「Nguyên nhân vô cùng rõ ràng.\\nĐó là vì Sáng kiến SL Đại Cửu Châu đã được đón nhận quá mức ạ」"

# 【元忠】
# display as 元忠
# JP: 「受け入れられすぎた？」
2210 = "「Được đón nhận quá mức?」"

# 【双鉄】
# display as 雙鐵
# JP: 「エアクラの発展により、人は移動に困らなくなり――\nゆえに『旅路』には、単なる移動以上を求め始めました」
2814 = "「Nhờ sự phát triển của Aircra, con người không còn gặp khó khăn trong việc di chuyển nữa――\\nvì vậy, đối với 'hành trình', họ bắt đầu đòi hỏi nhiều hơn là việc chỉ đơn thuần dịch chuyển」"

# 【元忠】
# display as 元忠
# JP: 「うむ」
2312 = "「Ừm」"

# 【双鉄】
# display as 雙鐵
# JP: 「目的地へ移動してからの観光ではなく、\n移動そのものを観光として楽しむ旅――」
2077 = "「Không phải là đến điểm đích rồi mới tham quan,\\nmà là một chuyến đi tận hưởng chính việc di chuyển như một hình thức du lịch――」"

# 【稀咲】
# display as 稀咲
# JP: 「それを求める風潮に、\n大九洲ＳＬ構想はズバリとハマったわけだ」
2606 = "「Sáng kiến SL Đại Cửu Châu đã đánh trúng\\nvào xu hướng đòi hỏi điều đó chứ gì」"

# 【ハチロク】
# display as 八六
# JP: 「ハマった――というのは」
2610 = "「\"Ăn khớp ngẫu nhiên\"―― ý cô là sao?」"

# monologue
# JP: 思わずこぼれた声なのだろう。すず――\nいや、相手が元忠さんと稀咲とはいえ、人前だ。
3510 = "Chắc hẳn đó là tiếng thốt lên trong vô thức. Dù đối phương có là chú Mototada và Kisa đi nữa, thì trước mặt mọi người thế này thật là...\\nKhông, Suzu――"

# monologue
# JP: “ハチロク”も、言ってしまってすぐ口元を手で覆う。
1592 = "\"Hachiroku\" cũng nhanh chóng lấy tay che miệng ngay sau khi lỡ lời."

# 【稀咲】
# display as 稀咲
# JP: 「構わないよ？　率直な意見を聞かせて欲しい」
2622 = "「Không sao đâu mà? Chị muốn nghe ý kiến thẳng thắn của em」"

# monologue
# JP: ハチロクがそっと僕を見る。\n無論、頷く。
3093 = "Hachiroku khẽ nhìn tôi.\\nDĩ nhiên, tôi gật đầu."

# monologue
# JP: 僕を思っての言葉であるなら、\nそれがどのようなものであれ、僕は全力で受け止めよう。
3438 = "Nếu đó là những lời vì nghĩ cho tôi,\\nthì dù nó có thế nào đi chăng nữa, tôi cũng sẽ dốc lòng đón nhận."

# 【ハチロク】
# display as 八六
# JP: 「では、失礼いたしまして」
2783 = "「Vậy thì, em xin thất lễ」"

# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 2312 = "「嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「ハマったのではございません。そのような需要があると、\n双鉄さまはご理解の上で、ご構想を進められたのです」
2092 = "「Không phải là ăn khớp ngẫu nhiên đâu ạ. Ngài Soutetsu tiến hành ý tưởng này\\nlà vì ngài ấy hiểu rõ rằng nhu cầu như vậy thực sự tồn tại」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ、確かに。\nこれはボクの失言だった」
2338 = "「À, đúng thật.\\nĐây là lỗi lỡ lời của chị rồi」"

# monologue
# JP: 稀咲が素直に認めれば、\nハチロクも嬉しげに頷いて、褒めてほしそうに僕を見る。
3403 = "Thấy Kisa thành thật thừa nhận,\\nHachiroku cũng vui vẻ gật đầu, rồi nhìn tôi như thể đang chờ được khen ngợi."

# 【双鉄】
# display as 雙鐵
# JP: 「……そのような、いわば回帰があることは、\n御一夜鉄道で働けば、誰にでも容易にわかることです」
1670 = "「...Sự quay trở lại của những giá trị cũ như thế, ví dụ như vậy,\\nbất kỳ ai làm việc tại Đường sắt Onight cũng đều dễ dàng nhận ra」"

# monologue
# JP: が、まさか人前でだっこして、\n頭を撫でて頬ずリをしてやるわけにもいかん。
3050 = "Nhưng mà, chẳng lẽ lại ôm chầm lấy em ấy trước mặt mọi người,\\nrồi xoa đầu cưng nựng sao được."

# monologue
# JP: 大いに褒めるのは後回しにし、\nいまはともかく、元忠さんへと集中しなおす。
3473 = "Chuyện khen thưởng nồng nhiệt đành phải để sau vậy,\\ncòn bây giờ, trước tiên tôi cần tập trung trở lại vào chú Mototada."

# 【双鉄】
# display as 雙鐵
# JP: 「8620復活で盛り上がったあの熱気――\nその後の、バーベキュー列車の大好評」
2153 = "「Bầu không khí cuồng nhiệt khi đầu máy 8620 hồi sinh――\\nvà sau đó là sự đón nhận nồng nhiệt dành cho đoàn tàu tiệc nướng BBQ」"

# 【元忠】
# display as 元忠
# JP: 「そんなことならば承知している。\nでなければ、協力も出資もしていない」
2766 = "「Những chuyện đó ta đều biết cả.\\nNếu không thì ta đã chẳng hợp tác lẫn đầu tư vào rồi」"

# monologue
# JP: 一転、ゆっくりとした手つきでもって、\n元忠さんは、経営報告書を机に広げる。
3076 = "Đột nhiên, với động tác chậm rãi, \\nngài Mototada mở tờ báo cáo kinh doanh ra bàn."

# 【元忠】
# display as 元忠
# JP: 「実際、御一夜鉄道はこの六年、常に前年比５％以上、\n極めて順調に営業利益を伸ばし続けている」
2412 = "「Thực tế, Đường sắt Onitoya suốt sáu năm qua luôn duy trì mức tăng trưởng lợi nhuận kinh doanh trên 5% so với năm trước, \\nphát triển vô cùng thuận lợi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2620 = "「Vâng.」"

# 【元忠】
# display as 元忠
# JP: 「だが、近隣の同業他社のここ三期の伸びは二桁だ！\n取り残されているのは、比喩でもなんでもない現実だぞ」
2639 = "「Nhưng mức tăng trưởng trong ba kỳ gần đây của các công ty cùng ngành lân cận đều đạt hai chữ số! \\nBị bỏ lại phía sau không phải là một phép ẩn dụ, mà là thực tế rõ ràng đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ご指摘の通りです。御一夜鉄道は本構想の発信源であり、\n中心であるにも関わらず、出遅れてしまっています」
2494 = "「Đúng như ngài đã chỉ ra. Dù Đường sắt Onitoya là cội nguồn và \\nlà trung tâm của kế hoạch này, nhưng chúng tôi lại đang bị chậm chân.」"

# 【元忠】
# display as 元忠
# JP: 「改めて尋ねよう。その理由は？\n構想が受け入れられると、なぜ御一夜が出遅れるのだ」
2792 = "「Ta hỏi lại một lần nữa. Lý do là gì? \\nTại sao khi kế hoạch được đón nhận, Onitoya lại là bên chậm chân?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
2768 = "「Chuyện đó――」"

# monologue
# JP: 一拍を置き、一番うまい伝え方が何かを考える。
3283 = "Khựng lại một nhịp, tôi suy nghĩ xem cách truyền đạt nào là tốt nhất."

# 【双鉄】
# display as 雙鐵
# JP: 「……構想が受け入れられすぎ、九洲内にとどまらず、\n日ノ本各地で類似の運動が始まってしまったためです」
1655 = "「……Là vì kế hoạch này được đón nhận quá nồng nhiệt, không chỉ dừng lại trong phạm vi Kyushu, \\nmà các phong trào tương tự đã bắt đầu nổ ra ở khắp nơi trên toàn Hinomoto.」"

# 【元忠】
# display as 元忠
# JP: 「ふむ？」
2346 = "「Hửm?」"

# 【稀咲】
# display as 稀咲
# JP: 「『スティーム・ロコモーション』や『よか旅・[じょうきげん,2]蒸機嫌』\nなどのキャンペーンは、特に大当たりしているね」
2614 = "「Các chiến dịch như 『Steam Locomotion』 hay 『Chuyến du ngoạn tuyệt vời · Đam mê đầu máy hơi nước』 \\nđều đặc biệt thành công vang dội nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「御一夜にまでテレビシイエムが流れておりますものね。\n東日ノ本や四國でも[じょうき,1]蒸機は高く再評価されている様子で」
2662 = "「Đến tận Onitoya mà cũng phát sóng quảng cáo trên tivi cơ mà. \\nCó vẻ như ở Higashi-Hinomoto hay Shikoku, đầu máy hơi nước cũng đang được đánh giá cao trở lại.」"

# monologue
# JP: ……僕達の苦境の遠因であるというのに、\nハチロクはなんとも嬉しげだ。
1602 = "……Dù đó là nguyên nhân gián tiếp dẫn đến tình cảnh khó khăn của chúng tôi, \\nnhưng Hachiroku trông vẫn vô cùng hạnh phúc."

# 【ハチロク】
# display as 八六
# JP: 「[たかさき,1]高嵜鉄道の[デゴイチ,2]Ｄ５１　[ハチヨンマル,2]８４０。いよかん鉄道の[じょう]嬢ちゃん列車。\nどちらも、大変に素晴らしい観光\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;です」
2826 = "「Đầu D51 840 của Đường sắt Takasaki. Chuyến tàu tiểu thư của Đường sắt Iyokan. \\nCả hai đều là những \\x%l観光蒸気機関車;#00ffc040;tàu hơi nước du lịch%l;#; vô cùng tuyệt vời.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうした各地でのヒットが、[なごてつ,2]名護鉄や[とうかい,1]東峡鉄道――\n大廃線を生き残った大手鉄道事業者にも波及しました」
2815 = "「Những thành công vang dội ở khắp các địa phương đó đã lan rộng đến cả Nagotetsu hay Đường sắt Tokyo――\\nnhững doanh nghiệp đường sắt lớn đã sống sót qua thời kỳ Đại Phế Tuyến.」"

# 【ハチロク】
# display as 八六
# JP: 「[なごてつ,2]名護鉄は申すまでもない名門私鉄。[とうかい,1]東峡鉄道は、旧帝鉄\n東峡道本線の、[みしま,1]箕島-[おおさか,1]逢坂間を買い受けた会社ですね」
2216 = "「Đường sắt Nago là một tuyến đường sắt tư nhân danh tiếng không cần bàn cãi. Còn Đường sắt Tokyo là công ty đã mua lại đoạn Mishima - Osaka của tuyến Tokyodo chính thuộc Cựu Đế thiết\\n」"

# 【双鉄】
# display as 雙鐵
# JP: 「大幅に体力を削られたとはいえ、実績も信用度も\n桁違いの各社が\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;活用に続々参入した結果」
2650 = "「Dù tiềm lực đã bị suy giảm đáng kể, nhưng việc các công ty có thành tựu và uy tín\\nở một đẳng cấp hoàn toàn khác lần lượt tham gia vào việc\\x%l đầu máy hơi nước;#00ffc040;vận dụng đầu máy hơi nước%l;#; đã dẫn đến kết quả là...」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ」
2270 = "「À...」"

# monologue
# JP: ス――\nと稀咲が右手を上げる。
3402 = "Kisa thong thả\\ngiơ tay phải lên."

# 【稀咲】
# display as 稀咲
# JP: 「マーケットに出回る\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;が、\nことごとく買い占められてしまった……かな？」
2094 = "「Có phải tất cả\\x%l đầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;#; có mặt trên thị trường\\nđều đã bị thu mua sạch sẽ... rồi không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほぼ正解だ。それだけでなく、各地のまいてつ達が、\n各社の構想の中に続々組み入れられている」
2816 = "「Gần như chính xác. Không chỉ vậy, các Railord ở khắp mọi nơi\\nđang dần được tích hợp vào kế hoạch của các công ty đó.」"

# 【元忠】
# display as 元忠
# JP: 「……他の晴れ舞台があるのなら、\nわざわざ御一夜までやってきてくれる物好きはいないか」
1662 = "「...Nếu đã có những sân khấu hào nhoáng khác chào đón,\\nthì chẳng có kẻ lập dị nào lại cất công tìm đến tận Onight đâu nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「金銭面や名誉面でも、名門事業者はやはり圧倒的です。\n正面から比較されれば、勝ち目は全くありません」
2362 = "「Xét về cả mặt tiền bạc lẫn danh tiếng, các đơn vị danh tiếng quả thực vẫn áp đảo hoàn toàn.\\nNếu bị đem ra so sánh trực diện, chúng ta tuyệt đối không có cửa thắng.」"

# monologue
# JP: 言えばすぐさま不愉快そうに、元忠さんの眉が歪む。
3430 = "Vừa dứt lời, chân mày của ông Mototada liền nheo lại đầy vẻ khó chịu."

# 【元忠】
# display as 元忠
# JP: 「そこを埋め合わせる何物をも、\n六年、御一夜鉄道は出してこなかったわけか」
2096 = "「Nghĩa là suốt sáu năm qua, Đường sắt Onight\\nvẫn chưa từng đưa ra được bất cứ thứ gì để bù đắp vào khoảng trống đó sao?」"

# monologue
# JP: 冷たい視線。
3521 = "Một ánh nhìn lạnh lùng."

# monologue
# JP: 実際になんの準備もしていなかったなら、\n恥じ入って逃げたくなるようなまなざしだ。が――
3288 = "Nếu thực sự không có sự chuẩn bị nào,\\nđây sẽ là ánh mắt khiến người ta phải hổ thẹn đến mức muốn bỏ chạy. Thế nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「いえ。対策は取り続けてきました」
2824 = "「Không. Chúng tôi vẫn luôn liên tục thực hiện các biện pháp đối phó.」"

# monologue
# JP: 弱小であるのは最初からだ。
3265 = "Ngay từ đầu chúng tôi đã là một thế lực yếu kém."

# monologue
# JP: それを言い訳にするようならば、\n僕らはそもそも、8620の復活さえもできなかったろう。
3436 = "Nếu lấy điều đó làm cái cớ,\\nthì ngay từ đầu, chúng tôi thậm chí còn chẳng thể vực dậy nổi 8620."

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道[ゆのい,1]湯医線には、他の路線と比較した時、\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;[しょうち,1]招致に圧倒的に有利な点があります」
2468 = "「Tuyến Yui của Đường sắt Ohitoyo, khi so sánh với các tuyến đường khác,\\n\\x%lTàu hơi nước;#00ffc040;tàu hơi nước%l;#; có một lợi thế áp đảo trong việc thu hút hành khách」"

# 【元忠】
# display as 元忠
# JP: 「ほう？」
2251 = "「Ồ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは[ちせい,1]地勢です。高低差は極めて軽微。トンネルはゼロ。\n強いていうなら橋の数の多さだけが特徴の、平坦路線」
2785 = "「Đó chính là địa thế. Sự chênh lệch độ cao cực kỳ ít. Không có một đường hầm nào.\\nNếu phải chỉ ra điểm đặc trưng thì đó là một tuyến đường bằng phẳng, chỉ có số lượng cây cầu là nhiều」"

# 【ハチロク】
# display as 八六
# JP: 「つまり――\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の走行にとって、極めて[へいい,1]平易。\nどのように性能が劣るこでも、ここでなら走れるのです」
2560 = "「Nói cách khác――đối với việc vận hành của \\x%lTàu hơi nước;#00ffc040;tàu hơi nước%l;#;, nó cực kỳ dễ dàng.\\nDù tính năng có kém đến đâu đi chăng nữa, nó vẫn có thể chạy được ở nơi này」"

# 【稀咲】
# display as 稀咲
# JP: 「成程ね。そうか、そういう計画をたてていたのか」
2186 = "「Ra là vậy. Ra thế, các cháu đã lập ra một kế hoạch như vậy sao」"

# 【元忠】
# display as 元忠
# JP: 「[おひとよ,2]御一夜-[はやと,1]早戸間のみかん鉄道への[たいよ,1]貸与。\n先方に有利にすぎる条件だとは思っていたが――ふむ」
2130 = "「Cho Đường sắt Mikan thuê đoạn giữa Ohitoyo và Hayato.\\nTa đã từng nghĩ đó là một điều kiện quá có lợi cho phía bên kia――hửm」"

# 【双鉄】
# display as 雙鐵
# JP: 「ご[けんさつ,1]賢察をありがとうございます」
2368 = "「Cảm ơn sự thấu suốt của bác」"

# monologue
# JP: さすがは宝生親子だ。話が早いという他にない。\nが、万一の誤解があってはことだ。
3376 = "Quả không hổ danh là cha con nhà Houshou. Chẳng biết nói gì hơn ngoài việc họ hiểu chuyện quá nhanh.\\nNhưng nếu để xảy ra một hiểu lầm dù là nhỏ nhất thì cũng thật tai hại."

# monologue
# JP: いわずもがなのこととは思えど、\n相互確認のために説明しておく。
3296 = "Dẫu nghĩ đây là điều không cần nói cũng hiểu,\\nnhưng tôi vẫn giải thích để đôi bên cùng xác nhận lại."

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道にとって初の廃線復線――御一夜-[はやと,1]早戸間の\n扱いに関して、最終的に残った案は[ふたあん,1]二案でした」
2467 = "「Đối với Đường sắt Ohitoyo, việc khôi phục tuyến đường sắt bị bỏ hoang đầu tiên――về việc xử lý đoạn giữa Ohitoyo và Hayato,\\nphương án cuối cùng còn sót lại là hai phương án」"

# 【ハチロク】
# display as 八六
# JP: 「[ひとあん,1]一案は、実現化いたしました、みかん鉄道様への[たいよ,1]貸与。\nそしてもう一案は、[はやと,1]早戸への直通列車でございました」
2159 = "「Phương án một là phương án đã được thực hiện, cho phía Đường sắt Mikan thuê.\\nVà phương án còn lại là chuyến tàu chạy thẳng đến Hayato」"

# 【元忠】
# display as 元忠
# JP: 「報告は受けた。[ゆのい,1]湯医-早戸間の直通運転となると、\n8620の負担が大きすぎる――のが、断念の理由だったな」
2536 = "「Ta đã nhận được báo cáo rồi. Nếu là vận hành chạy thẳng giữa Yui và Hayato,\\ngánh nặng lên đầu máy 8620 sẽ quá lớn――đó là lý do các cháu từ bỏ phải không」"

# 【ハチロク】
# display as 八六
# JP: 「左様でございます。御一夜-早戸間。特に[おこば,1]小畑駅周辺は、\n[ひのもと,2]日ノ本中に名を[とどろ]轟かせる、天下の[しゅんけん,1]峻険」
2725 = "「Dạ đúng như vậy ạ. Đoạn giữa Ohitoyo và Hayato. Đặc biệt là xung quanh ga Kobata,\\nlà một vùng hiểm trở nổi tiếng khắp Hinomoto」"

# 【稀咲】
# display as 稀咲
# JP: 「ボクも勉強した。\n確か、[ひのもとさんだいしゃそう,6]日ノ本三大車窓のひとつに数えられているよね？」
2763 = "「Con cũng có tìm hiểu rồi.\\nNếu con nhớ không lầm, nơi đó được xếp vào một trong ba cảnh quan từ cửa sổ tàu đẹp nhất Hinomoto đúng không ạ?」"

# 【ハチロク】
# display as 八六
# JP: 「はい。\x%lスイッチバック;#00ffc040;スイッチバック%l;#;と\x%lループ線;#00ffc040;ループ線%l;#;とを\n組み合わせねば登り切れない。それほどに険しい高み」
2582 = "「Vâng. Nếu không kết hợp cả \\x%lSwitchback;#00ffc040;chạy giật lùi (switchback)%l;#; và \\x%lTuyến đường vòng;#00ffc040;tuyến đường vòng (loop)%l;#;\\nthì không thể nào leo hết lên được. Đó là một tầm cao hiểm trở đến mức ấy」"

# monologue
# JP: 噛みしめるようにつぶやいて。\nハチロクは、うっとりと、夢見るように瞳を閉じる。
3089 = "Thầm thì như thể đang gặm nhấm từng câu chữ.\\nHachiroku lim dim nhắm mắt lại, đầy say đắm và mơ màng."

# 【ハチロク】
# display as 八六
# JP: 「そこからの車窓――いま自分が駆け上ってきた\n\x%lループ線;#00ffc040;ループ線%l;#;を見下ろす景色は、どれ程見事なものでしょう」
2358 = "「Cảnh sắc từ ô cửa sổ nơi đó――được ngắm nhìn xuống\\n\\x%lđường ray vòng lặp;#00ffc040;đường ray vòng lặp%l;#; mà mình vừa vượt qua, sẽ tuyệt mỹ đến nhường nào cơ chứ」"

# 【稀咲】
# display as 稀咲
# JP: 「おや？　乗客としてもまだ乗っていないのかい？」
2235 = "「Ồ? Ngay cả với tư cách là hành khách mà em cũng chưa từng đi qua sao?」"

# 【ハチロク】
# display as 八六
# JP: 「左様です。……初めてその景色を目にするのでしたら、\n[ハチロクニイマル,3]8620の運転台から、双鉄さまとともに、と願いますので」
2724 = "「Dạ phải ạ. ……Bởi em ước nguyện rằng, nếu là lần đầu tiên được chiêm ngưỡng cảnh sắc ấy,\\nnguyện sẽ được đứng từ buồng lái của đầu máy 8620, cùng với ngài Soutetsu」"

# 【稀咲】
# display as 稀咲
# JP: 「おやおや」
2273 = "「Ồ hô」"

# 【双鉄】
# display as 雙鐵
# JP: 「こほん」
2240 = "「Khụ khụ」"

# monologue
# JP: ハチロクの気持ちは無論嬉しい。僕も同じく願ってもいる。
3119 = "Tấm lòng của Hachiroku đương nhiên khiến tôi vô cùng hạnh phúc. Bản thân tôi cũng có cùng nguyện ước như vậy."

# monologue
# JP: 抱きしめてやりたい気持ちを抑えるそのためにも、\n今はともかく、元忠さんへと集中する。
3168 = "Để kìm nén cảm xúc muốn ôm chầm lấy cô ấy vào lòng,\\ntrước mắt tôi cố gắng dồn hết sự tập trung vào bác Mototada."

# 【双鉄】
# display as 雙鐵
# JP: 「とにかく、それほどの難所ですので、湯医から\n走りっぱなしで早戸までは、無理が生じるかと」
2693 = "「Dù sao đi nữa, vì nơi đó là một đoạn hiểm trở như vậy, nên nếu bắt\\nchạy một mạch từ Yui đến Hayato thì e rằng sẽ quá sức」"

# 【ハチロク】
# display as 八六
# JP: 「[ハチロクけい,4]8620形は平凡ゆえの万能さが武器。[やません,1]山線ももちろん\n走れますが――決して得意とは申せませんので」
2839 = "「Dòng 8620 lấy sự vạn năng trong cái bình phàm làm vũ khí. Dù tất nhiên vẫn có thể\\nchạy trên tuyến đường núi――nhưng tuyệt nhiên đó không phải là sở trường của chúng em」"

# 【元忠】
# display as 元忠
# JP: 「虎の子の[ハチロク,3]8620に故障でもされては敵わん。\nその判断にも、出た結論にも異存はない」
2705 = "「Để báu vật 8620 xảy ra hỏng hóc thì thật không ổn.\\nTa không có ý kiến gì về quyết định cũng như kết luận đó cả」"

# 【双鉄】
# display as 雙鐵
# JP: 「そこで路線を[たいよ,1]貸与し、みかん鉄道との関係を強化。\n同時に、同社の収益力と信用の強化も目指しました」
2357 = "「Vì vậy, bằng việc cho mượn tuyến đường, chúng ta sẽ thắt chặt mối quan hệ với Đường sắt Mikan.\\nĐồng thời, cũng hướng tới mục tiêu củng cố năng lực doanh thu và uy tín của quý công ty」"

# 【元忠】
# display as 元忠
# JP: 「みかん鉄道が新車両を導入し、\n[よじょうき,2]余剰機を御一夜鉄道に回せるように――だな？」
2135 = "「Đường sắt Mikan sẽ đưa vào vận hành dòng tàu mới,\\nvà chuyển giao đầu máy dư thừa sang cho Đường sắt Onisha――phải không?」"

# 【稀咲】
# display as 稀咲
# JP: 「そうして、銀行にも伝えていなかったその動きを、\n今日ここで明らかにした。ということは」
2782 = "「Và rồi, cậu lại hé lộ ngay tại đây hôm nay một kế hoạch mà thậm chí còn chưa thông báo cho phía ngân hàng. Điều đó có nghĩa là」"

# 【双鉄】
# display as 雙鐵
# JP: 「その通りです。\nこの案が実現することが、確定的になりました」
2404 = "「Chính xác là như vậy ạ.\\nViệc phương án này đi vào thực tiễn giờ đã là điều chắc chắn」"

# 【稀咲】
# display as 稀咲＆元忠
# JP: 「それでどんな機関車が」「つまりその余剰機が湯医線を。\n8620が御一夜-早戸間を走ることになるのだな？」
2801 = "「Vậy đó là đầu máy loại nào—」「Tức là chiếc máy dư thừa đó sẽ chạy tuyến Yui. \\n8620 sẽ chạy đoạn giữa Onitoya và Hayato đúng không?」"

# monologue
# JP: 宝生親子の声が重なり、稀咲が途中で言葉を呑む。\nならば答えを返すべきは、その父親の問いにであろう。
3224 = "Giọng của hai cha con nhà Houshou đè lên nhau, khiến Kisa phải nuốt lại lời định nói giữa chừng. \\nNếu vậy, người cần đưa ra câu trả lời nên là câu hỏi của người cha."

# 【双鉄】
# display as 雙鐵
# JP: 「そう計画しています。実際は、試走もまだなので、\n諸問題の発生する可能性は捨てきれませんが」
2608 = "「Chúng tôi lên kế hoạch là như vậy ạ. Trên thực tế, vì vẫn chưa chạy thử nên \\nchúng tôi không thể loại trừ khả năng phát sinh các vấn đề khác nữa」"

# 【元忠】
# display as 元忠
# JP: 「変化があるならそれで動ける」
2428 = "「Nếu có chuyển biến, vậy thì có thể hành động dựa trên nó rồi」"

# monologue
# JP: 言いながら、元忠氏はもう椅子から腰を浮かせている。
3071 = "Vừa nói, ông Mototada đã nhấc người rời khỏi ghế."

# 【元忠】
# display as 元忠
# JP: 「有意義だった。私はここまでで失礼させてもらう」
2111 = "「Rất có ý nghĩa. Tôi xin phép cáo lui tại đây」"

# 【双鉄】
# display as 雙鐵
# JP: 「こちらこそ、有意義な時間をありがとうございました」
2493 = "「Chúng tôi cũng xin cảm ơn ông vì đã dành thời gian quý báu cho chúng tôi ạ」"

# 【元忠】
# display as 元忠
# JP: 「ふっ」
2225 = "「Hửm」"

# monologue
# JP: 僕の挨拶に笑いで返し、\n元忠氏は大股に支店長室のドアから出ていく。
3226 = "Đáp lại lời chào của tôi bằng một tiếng cười mũi, \\nông Mototada sải bước dài ra khỏi cửa phòng giám đốc chi nhánh."

# monologue
# JP: 途端、稀咲がほーーっと長い息を吐く。
3042 = "Ngay lập tức, Kisa thở phào một hơi thật dài."

# 【稀咲】
# display as 稀咲
# JP: 「……双鉄は頭取の扱いがとても上手いね。\n当行各支店にも、一人ずつ双鉄を備えたいくらいだ」
1676 = "「……Soutetsu đối phó với ngài chủ tịch khéo thật đấy. \\nĐến mức tôi muốn trang bị mỗi chi nhánh ngân hàng của chúng ta một Soutetsu luôn cơ」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2346 = "「嗯？」" 

# 【稀咲】
# display as 稀咲
# JP: 「気がついていなかったのかい？　\n今日の頭取は機嫌が最悪だった。財務省から」
2138 = "「Cậu không nhận ra sao? \\nHôm nay tâm trạng của chủ tịch cực kỳ tồi tệ đấy. Từ phía Bộ Tài chính...」"

# 【元忠】
# display as 元忠
# JP: 「なんと！　これはめでたい！！」
2681 = "「Ối chà! Đây quả là chuyện đáng chúc mừng nha!!」"

# 【稀咲】
# display as 稀咲
# JP: 「！！？」
2226 = "「!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「機嫌が悪い――声にはとても聞こえんな」
2474 = "「Tâm trạng tồi tệ ư――Nghe qua giọng điệu thì hoàn toàn không giống chút nào cả」"

# 【ハチロク】
# display as 八六
# JP: 「元忠様も……\nこのような声をお出しになられるのですね」
2148 = "「Ngay cả ngài Mototada...\\nvẫn có thể phát ra những âm thanh như thế này sao」"

# monologue
# JP: ハチロクが零した素直な感想に、稀咲も頷く。\n確かに、こんな声は聞いたことがない。
3406 = "Trước cảm nhận chân thành thốt ra từ Hachiroku, Kisa cũng gật đầu đồng tình.\\nQuả thật, cô chưa từng nghe thấy một giọng điệu như thế này bao giờ."

# monologue
# JP: 喜びで弾んでいるような、明るく晴れた――\nああ、そうだ。これは『ウキウキ』している声だ。
3172 = "Một giọng nói tươi sáng, rạng rỡ, như đang reo vui vì hạnh phúc――\\nÀ, phải rồi. Đó chính là một giọng nói đầy 'hân hoan'."

# 【元忠】
# display as 元忠
# JP: 「来客といっても双鉄君とハチロクだ。入りたまえ。\n知らん仲でも無いだろう」
2818 = "「Có khách nhưng cũng chỉ là cậu Soutetsu và Hachiroku thôi. Cứ vào đi.\\nĐều là người quen cả mà」"

# 【浦上】
# display as ？？？
# JP: 「そうですか？　それなら」
2577 = "「Vậy sao ạ? Nếu thế thì」"

# 【稀咲】
# display as 稀咲
# JP: 「この声っ！」
2772 = "「Giọng nói này...!」"

# 【浦上】
# display as ？？？
# JP: 「お久しぶりです。支店長――いえ、稀咲さん。\nそれに、右田さんにハチロクさんも」
2393 = "「Đã lâu không gặp. Giám đốc chi nhánh――không, cô Kisa.\\nVà cả anh Migita cùng cô Hachiroku nữa」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ……」
2267 = "「Nghê...」"

# 【ハチロク】
# display as 八六
# JP: 「え、あ――」
2230 = "「Ủa, ơ――」"

# monologue
# JP: 声に、ならない。
3169 = "Không thể thốt lên lời."

# monologue
# JP: ハチロクと顔を見合わせて、それからふたり、\nそろって首をまた正面に戻す。
3286 = "Tôi nhìn sang Hachiroku, và rồi cả hai cùng lúc\\nquay ngoắt đầu về phía trước một lần nữa."

# 【浦上】
# display as ？？？
# JP: 「驚かせてしまいましたか？　すいません」
2703 = "「Tôi đã làm mọi người ngạc nhiên sao? Xin lỗi nhé」"

# monologue
# JP: この声。物言い。間違いない。\n間違いないが……繋がらないし、反応できない。
3507 = "Giọng nói này. Cách nói chuyện này. Không thể sai được.\\nKhông thể sai vào đâu được, nhưng... tâm trí vẫn chưa thể kết nối và phản ứng kịp."

# monologue
# JP: まさか、まさかあの、浦上さんが――
3561 = "Không thể nào, không lẽ anh Urakami lại――"

# 【稀咲】
# display as 稀咲
# JP: 「[うらかみ,1]浦上！　おめでとう！！\nなんて、なんて素敵なことだろう！」
2633 = "「Urakami! Chúc mừng nhé!!\\nThật là, thật là một điều tuyệt vời làm sao!」"

# monologue
# JP: 稀咲までもが歓声を、\nウキウキした声をあげて立ち上がる。
3514 = "Ngay cả Kisaki cũng reo hò, \\ncô ấy phấn khích đứng bật dậy."

# 【まゆ】
# display as 宝宝
# JP: 「ふにゃあ」
2222 = "「Funyaa」"

# monologue
# JP: 浦上さんが抱っこしている赤ちゃんが、\nその勢いに驚いたのか、わずかにむずかる声をだす。
3349 = "Em bé mà chị Uragami đang bế dường như bị bất ngờ trước sự cuồng nhiệt đó, khẽ cựa quậy rồi thút thít."

# monologue
# JP: と、いうか、だ！
3504 = "Mà, quan trọng hơn là!"

# 【稀咲】
# display as 稀咲
# JP: 「浦上、君は――\nおかあさんになったんだね！！！」
2635 = "「Uragami, em――\\nđã làm mẹ rồi sao!!!」"

# 【ハチロク】
# display as 八六
# JP: 「あ、の……わたくしが、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が――\nだっこをしても大丈夫なものでしょうか？？」
2296 = "「A, dẫu... dẫu vậy, một %lレイルロオド;#00ffc040;Railord%l;#; như tôi――\\nliệu bế bé có sao không ạ??」"

# 【浦上】
# display as 浦上
# JP: 「人間よりも繊細な作業ができる手と聞いてますし――\nそれに、大事に扱ってくれるでしょう？」
2519 = "「Chị nghe nói bàn tay của các em có thể làm những công việc còn tinh xảo hơn cả con người mà――\\nvả lại, em chắc chắn sẽ nâng niu bé đúng không?」"

# 【ハチロク】
# display as 八六
# JP: 「それはもう。なにより繊細にお取り扱いいたします。\n水面計ガラスの交換よりも、もっと慎重に、大切に」
2697 = "「Vâng, tất nhiên rồi ạ. Tôi sẽ nâng niu bé một cách tinh tế nhất.\\nCòn cẩn thận và trân quý hơn cả khi thay kính ống thủy đo nước nữa ạ」"

# 【浦上】
# display as 浦上
# JP: 「なら安心です。手をゆりかごにして――\nそう、上手。だっこの前に、声をかけてあげて下さい」
2797 = "「Vậy thì chị yên tâm rồi. Hãy khum tay lại làm nôi nhé――\\nĐúng rồi, khéo lắm. Trước khi bế, em hãy trò chuyện với bé một chút đi nào」"

# 【ハチロク】
# display as 八六
# JP: 「こ、こんにちわ。赤ちゃん、さま――いえ、ええと」
2134 = "「X-Xin chào em. Em bé, thưa ngài――à không, ơ kìa」"

# 【浦上】
# display as 浦上
# JP: 「まゆ」
2706 = "「Là Mayu」"

# 【ハチロク】
# display as 八六
# JP: 「こんにちわ――まゆ様。まゆちゃん」
2131 = "「Xin chào em――em Mayu. Bé Mayu đáng yêu」"

# 【まゆ】
# display as 茉祐
# JP: 「あー」
# 2270 = "「啊」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ――！」
2241 = "「Trời đất ơi――!」"

# monologue
# JP: それだけ言って絶句して。\n真っ赤になって、ハチロクはふるふる震える。
3086 = "Chỉ thốt lên được bấy nhiêu rồi nghẹn lời.\\nĐỏ bừng cả mặt, Hachiroku khẽ run bần bật."

# monologue
# JP: それから僕の顔を見上げて――\nどうしましょう、と喜びいっぱいの目で問いかけてくる。
3425 = "Rồi cô ấy ngước nhìn lên tôi――\\nvới ánh mắt ngập tràn niềm hạnh phúc như muốn hỏi: \"Em phải làm sao bây giờ đây ạ?\""

# 【浦上】
# display as 浦上
# JP: 「あはは、ご機嫌。これなら安心。\nだから――はい。お願いします」
2278 = "「Ahaha, em vui quá. Thế này thì yên tâm rồi.\\nVậy thì―― Vâng. Nhờ chị nhé」"

# 【双鉄】
# display as 雙鐵
# JP: 「せっかくの機会だ。ハチロク。\n気をつけて、抱っこさせてもらうといい」
2604 = "「Cơ hội hiếm có mà. Hachiroku.\\nCứ cẩn thận bế bé thử xem」"

# 【ハチロク】
# display as 八六
# JP: 「は、はい。それでは――\nどうぞ、よろしくおねがいいたします」
2392 = "「V-Vâng. Vậy thì――\\nXin được nhờ chị chỉ bảo ạ」"

# monologue
# JP: 浦上さんの手がゆっくりうごき、\n赤ちゃん――まゆちゃんをハチロクの腕へと預ける。
3354 = "Bàn tay của cô Urakami chậm rãi chuyển động,\\nđặt em bé――bé Mayu, vào vòng tay của Hachiroku."

# monologue
# JP: ハチロクはガチガチに緊張し、それでも教わったとおりに\n横抱きに――腕を、まゆちゃんの枕にする。
3111 = "Hachiroku căng thẳng đến cứng đờ người, nhưng cô vẫn làm theo những gì được hướng dẫn\\nbế ngang bé――dùng cánh tay của mình làm gối cho bé Mayu."

# 【ハチロク】
# display as 八六
# JP: 「はわっ――あ、うっ――ふ、ふあ――わ」
2243 = "「Hawa―― A, u―― Ph-Phù, phơ―― Oa」"

# monologue
# JP: 聞いたことのない慌てた声。
3274 = "Tiếng bối rối, cuống cuồng chưa từng nghe thấy bao giờ."

# monologue
# JP: 自分の手だけで赤ちゃんの重みを受け止めて、\nハチロクは混乱してしまったようだ。
3057 = "Tự mình đón lấy sức nặng của một đứa trẻ sơ sinh,\\nHachiroku dường như đã hoàn toàn rối bời."

# 【ハチロク】
# display as 八六
# JP: 「ち、ちいさい――かるい――ぽかぽかで、\nそ、双鉄さま――まゆちゃん、わたくし――」
2413 = "「Nh-Nhỏ quá―― Nhẹ quá―― Ấm áp quá,\\nS-Soutetsu-sama―― Bé Mayu, em――」"

# 【双鉄】
# display as 雙鐵
# JP: 「落ち着け、ハチロク。\nまゆちゃんのためにも、まずは深呼吸で落ち着こう」
2168 = "「Bình tĩnh lại nào, Hachiroku.\\nVì bé Mayu nữa, trước tiên hãy hít thở thật sâu để bình tĩnh lại đã」"

# 【ハチロク】
# display as 八六
# JP: 「さ、左様ですね。乗務と同じ――\nわたくしの不安は、まゆちゃんも不安にさせてしまう」
2291 = "「Đ-Đúng là như vậy ạ. Cũng giống như khi vận hành tàu――\\nSự bất an của em cũng sẽ khiến bé Mayu thấy bất an theo」"

# monologue
# JP: いって、ハチロクは深呼吸する。\n二度、三度。
3487 = "Nói rồi, Hachiroku hít thở thật sâu.\\nHai lần, rồi ba lần."

# monologue
# JP: ハチロクの呼気と排気につれて動く体が心地良いのか、\nまゆちゃんは、気分よさげにおとなしくしてくれてい――
3485 = "Có lẽ cảm thấy cơ thể chuyển động theo nhịp hít vào thở ra của Hachiroku thật dễ chịu,\\nbé Mayu ngoan ngoãn nằm yên với vẻ mặt vô cùng thư thái――"

# 【まゆ】
# display as 茉祐
# JP: 「んあーんっ」
2319 = "「Ưng oa~n」"

# 【ハチロク】
# display as 八六
# JP: 「あっ！　双鉄さま、いま、まゆちゃんが、声――声を。\nこれは……いったい、何といっているのでしょう？」
2285 = "「A! Soutetsu-sama, vừa rồi bé Mayu đã cất tiếng―― Cất tiếng đấy ạ.\\nChuyện này…… rốt cuộc là bé đang muốn nói gì thế ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、落ち着け。僕もわからんが、笑顔でいるのだ。\n恐らく、悪い意味での『んあーん』ではなかろう」
2549 = "「Vì thế nên, bình tĩnh lại nào. Anh cũng chẳng rõ nữa, nhưng cứ mỉm cười đi.\\nCó lẽ đó không phải là tiếng 『N'ah~n』 theo nghĩa xấu đâu.」"

# 【ハチロク】
# display as 八六
# JP: 「それでしたら良いのですが」
2443 = "「Nếu được như vậy thì tốt quá ạ.」"

# 【浦上】
# display as 浦上
# JP: 「ふふっ」
2349 = "「Fufu.」"

# monologue
# JP: 僕らのやりとりを見守っていた浦上さんが、\nくるりと稀咲の方を向く。
3563 = "Chị Uragami, người nãy giờ vẫn dõi theo cuộc trò chuyện của chúng tôi,\\nđột nhiên quay ngoắt sang phía Kisaki."

# 【浦上】
# display as 浦上
# JP: 「ね、もしよかったら――\n久しぶりに、支店長のコーヒーをいただけますか？」
2723 = "「Này, nếu không phiền thì――\\nĐã lâu rồi, tôi có thể thưởng thức lại cà phê của Trưởng chi nhánh không?」"

# 【稀咲】
# display as 稀咲
# JP: 「支店長はよしてよ、浦上――とと、\nいまは……旦那様の名字？」
2778 = "「Đừng gọi là Trưởng chi nhánh nữa mà, Uragami―― Khoan đã,\\nbây giờ thì... là họ của chồng cậu à?」"

# 【浦上】
# display as 浦上
# JP: 「ええ。戸籍上は、[かとうぎ,2]加藤木です。\nけど、仕事では今も旧姓を」
2331 = "「Vâng. Trên hộ tịch thì là Katogi.\\nNhưng trong công việc thì tôi vẫn dùng họ cũ.」"

# 【稀咲】
# display as 稀咲
# JP: 「へぇ、いいね。っていうか――\n任せておいて、大丈夫なの？」
2250 = "「Hể, tuyệt thật đấy. Mà khoan――\\nCứ giao cho hai người họ như vậy, liệu có ổn không đó?」"

# 【浦上】
# display as 浦上
# JP: 「大丈夫でしょう。あのお二人なら」
2124 = "「Chắc là ổn thôi mà. Nếu là hai người họ.」"

# monologue
# JP: いや、ご信頼は嬉しいが、\nハチロクはまだ落ち着ききらない。
3505 = "Không, được tin tưởng thì vui thật đấy, nhưng\\nHachiroku vẫn chưa thể nào bình tĩnh lại được."

# monologue
# JP: やはり、不安が伝染するのか、\nご機嫌だったまゆちゃんも、だんだんだんだん――
3329 = "Quả nhiên là cảm giác bất an đã lây lan sang rồi sao,\\nbé Mayu vốn đang vui vẻ bỗng nhiên dần dần, từng chút một――"

# 【まゆ】
# display as 茉祐
# JP: 「ふぇ、ぇ……」
2304 = "「Hức, ưk...」"

# 【ハチロク】
# display as 八六
# JP: 「え？　そのっ、な、泣くのですか？　困りますっ――\n双鉄さまっ、わたくしいったい、どうしたらっ」
2239 = "「Oa? Cái đó, n-nút nhát khóc sao ạ? Con khó xử lắm――\\nCậu Soutetsu ơi, con rốt cuộc phải làm sao bây giờ ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああいや――うむ」
2282 = "「À không―― Ừm.」"

# monologue
# JP: 助け舟を求めて見てみるが、浦上さんはもう完全に、\n稀咲との談笑モードに入っている。
3277 = "Tôi nhìn sang cầu cứu, nhưng chị Uragami đã hoàn toàn\\nchìm đắm vào chế độ nói chuyện phiếm với Kisaki mất rồi."

# monologue
# JP: ならばと思うが、あいにくと僕もここまで小さな……\nまだ一歳にもなっていない赤子の面倒を見たことは――！
3475 = "Ta cũng có cùng suy nghĩ đó, nhưng ngặt nỗi bản thân ta chưa từng có kinh nghiệm chăm sóc một đứa trẻ nhỏ đến nhường này……\\nđến một tuổi còn chưa tròn nữa là――!"

# 【双鉄】
# display as 雙鐵
# JP: 「いつだったか書物で読んだことがある。\n確か、手になにか掴ませてあげると落ち着くとか」
2542 = "「Ta nhớ từng đọc được trong một cuốn sách lúc trước.\\nHình như, nếu cho đứa trẻ nắm lấy thứ gì đó trong tay, nó sẽ bình tĩnh lại」"

# 【ハチロク】
# display as 八六
# JP: 「なにか――あ、そうです！　双鉄さま！\nこれを――わたくしの金モールを」
2594 = "「Thứ gì đó――a, đúng rồi! Cậu Soutetsu!\\nCái này――xin hãy dùng sợi dây tua rua vàng này của tôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいのか？」
2668 = "「Như vậy có ổn không?」"

# 【ハチロク】
# display as 八六
# JP: 「いいも悪いも！　このままでは泣かせてしまいます」
2105 = "「Ổn hay không gì tầm này nữa ạ! Cứ để thế này con bé sẽ khóc mất thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
2571 = "「Ta hiểu rồi」"

# monologue
# JP: ハチロクの、右の肩章から下がる金モール\nその尻尾を束ねて、まゆちゃんの手に――
3271 = "Sợi dây tua rua vàng rủ xuống từ cầu vai bên phải của Hachiroku\\nTôi chụm phần đuôi của nó lại, rồi đặt vào bàn tay của bé Mayu――"

# 【まゆ】
# display as 茉祐
# JP: 「あ～――んー……あうー」
2300 = "「A~――ưm…… au~」"

# 【ハチロク】
# display as 八六
# JP: 「どう……でしょう？\nお気、に……召しますでしょうか？」
2477 = "「Thế nào…… ạ?\\nKhông biết, em ấy…… có thích nó không nữa?」"

# 【双鉄】
# display as 雙鐵
# JP: 「さっぱりわからん。\n――興味深げにいじっているようには見えるが」
2508 = "「Ta cũng chẳng rõ nữa.\\n――Nhưng trông có vẻ như con bé đang nghịch ngợm nó với sự hiếu kỳ đấy」"

# 【まゆ】
# display as 茉祐
# JP: 「んふー」
2316 = "「Ưm hư~」"

# 【ハチロク】
# display as 八六
# JP: 「あっ！」
2283 = "「A!」"

# 【まゆ】
# display as 茉祐
# JP: 「（にこーーーーっ）」
2837 = "「（Nhoẻn miệng cườiiiiii）」"

# 【ハチロク】
# display as 八六
# JP: 「――――――っ！！！」
1621 = "「――――――っ!!!」"

# monologue
# JP: また、絶句。\nじわじわ顔が、今度は首まで赤くなっていく。
3084 = "Lại một lần nữa, cạn lời.\\nKhuôn mặt dần dần đỏ bừng lên, và lần này lan rộng xuống tận cổ."

# monologue
# JP: （ふむ？）
3572 = "（Hửm?）"

# monologue
# JP: 何故なのだろうか。ハチロクは――\nどうも喜びの声を、必死で押し殺しているようにも見える。
3032 = "Vì sao thế nhỉ. Trông Hachiroku――\\ncó vẻ như đang cố hết sức kìm nén tiếng reo vui sướng."

# 【まゆ】
# display as 茉祐
# JP: 「ん～……う～――きゃはっ！　んふっ、う～」
2307 = "「Ưm~…… ư~―― kya ha! Ư hư, ư~」"

# 【双鉄】
# display as 雙鐵
# JP: 「よかった、気に入ってくれたようだな。\nご機嫌でいじくりまわしてくれているぞ」
2378 = "「Tốt quá, có vẻ con bé thích nó rồi.\\nĐang vui vẻ nghịch ngợm nó kìa」"

# 【ハチロク】
# display as 八六
# JP: 「――はい。とても――\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の身には余るほど、光栄なことと存じます」
1627 = "「――Vâng. Việc này quả thực rất――\\n\\x%lRailord;#00ffc040;Railord%l;#; vô cùng vinh hạnh, vinh hạnh đến mức nằm ngoài tầm với của bản thân ạ」"

# monologue
# JP: 光栄と来た。\nなんとも激しい感動ぶりだ。
3413 = "Vinh hạnh cơ đấy.\\nQuả là một sự xúc động vô cùng mãnh liệt."

# monologue
# JP: 無論、可愛く微笑ましいが――\n同時になにゆえそこまでと、少し不思議な気もしてくる。
3230 = "Dĩ nhiên là vừa đáng yêu vừa dễ thương rồi――\\nnhưng đồng thời tôi cũng có chút tò mò, không hiểu vì sao cô ấy lại xúc động đến mức đó."

# 【まゆ】
# display as 茉祐
# JP: 「ふにゅー、んあー」
2223 = "「Phư nyu~, ưm a~」"

# 【ハチロク】
# display as 八六＆雙鐵
# JP: 「いけません！」\n「おっと」
2086 = "「Không được đâu ạ!」\\n「Ối chà」"

# monologue
# JP: まゆちゃんがモールをおしゃぶりしようとしたところ、\n間一髪、ちいさな手ごと引き戻す。
3391 = "Ngay khoảnh khắc bé Mayu định ngậm sợi dây kim tuyến vào miệng,\\ntrong gang tấc, tôi đã kịp thời giữ bàn tay nhỏ nhắn của con bé lại."

# 【まゆ】
# display as 茉祐
# JP: 「んゆー？」
2317 = "「Ưm yư~?」"

