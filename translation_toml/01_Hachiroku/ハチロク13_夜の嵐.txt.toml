[script]
# lines: 450 
# monologue
# JP: 朝一番のコーヒーを飲み、乗務予定を確認する。\n寝ぼけた頭が覚醒していき、そうだったかと思い出す。
2790 = "起床之後我馬上喝了杯咖啡，確認了一次乘務安排。昏昏沉沉的大腦清醒後，我突然想起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……もう明日になるのか、四往復は」
1239 = "「……明天開始，每天要跑四個來回啊」" 

# monologue
# JP: 試験を終えて、\x%l8620;#00ffc040;8620%l;#;が営業運転に復帰して、\nそれを待っていた\x%lキハ07;#00ffc040;キハ07%l;#;がオーバーホールに入り。
2414 = "在\\x%l8620;#00ffc040;８６２０%l;#;完成測試並恢復正式營業之後，\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;就開始了大修。" 

# monologue
# JP: 日々姫と凪とローテーションで、\nどうにかまわり始めてきたところだったのだが。
2421 = "多虧有日日姬和凪和輪班，才算勉強維持了運轉。" 

# 【ハチロク】
# display as 八六
# JP: 「オーバーホール、良い判断でしたね」
1569 = "「去大修真是個正確的決定」" 

# monologue
# JP: ハチロクのその言葉には、もちろん、頷く他にない。
2740 = "聽了八六的話，我只有點點頭表示同意。" 

# 【双鉄】
# display as 雙鐵
# JP: 「シャフトに亀裂が見つかるとはな」
1757 = "「居然在傳動軸上發現了龜裂」" 

# 【ハチロク】
# display as 八六
# JP: 「微細なうちに発見できてなによりでした。\n他には大きな不具合もないとのことですし」
1693 = "「在龜裂不是很嚴重的時候及時發現真是萬幸。而且除此之外沒有發現別的大問題」" 

# monologue
# JP: 事故を未然に防止して、\x%lキハ07;#00ffc040;キハ07%l;#;の寿命も延びて、\nこれこそまさしくなによりだ。
2461 = "將事故防範於未然，並且還能延長\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;的壽命，真是只能用萬幸來形容。" 

# monologue
# JP: なによりなのだが――延びてしまった修理期間が、\nこんな形で影響するとも、正直思っていなかった。
2774 = "話是這麼說沒錯——但我沒想到修理工期延長會帶來這樣的後果。" 

# 【日々姫】
# display as 日日姬
# JP: 「ごめんねにぃに。明日、学園の登園日やけん」
1733 = "「對不起啊，阿哥。明天我得去學校才行」" 

# monologue
# JP: 顔に出てしまっていたのだろうか。\nパンを片手に、日々姫が申し訳なさそうな声を出す。
2387 = "可能是我的煩惱寫在了臉上。日日姬看到我的表情，滿懷歉疚地說道。" 

# monologue
# JP: が、日々姫になんの責任があろうはずもない。
2284 = "但是，日日姬對此自然沒有任何責任。" 

# 【双鉄】
# display as 雙鐵
# JP: 「謝るようなことではないさ。\n学園生の本分は、勉学であるに決まっている」
1508 = "「你不用道歉。學生的本分當然就是學習」" 

# 【日々姫】
# display as 日日姬
# JP: 「うう～っ」
1660 = "「嗚嗚～」" 

# monologue
# JP: ハチロクが食べてる石炭を、\n間違って呑んでしまったようなしかめつら。
2436 = "她皺起了眉頭，就像是不小心吞了一塊八六吃的煤炭。" 

# monologue
# JP: 説教として取られたと、その表情に理解する。
2702 = "看她這般表情，看來她是把我的話當成教育她的說辭了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「勉強しろという話ではない。ただ、日々姫と凪の\n臨時雇いに頼りきった現状に問題があると感じただけだ」
1775 = "「我不是在催你去讀書。只是覺得我們這種過於依賴你和凪兩位臨時司爐的做法是存在問題的」" 

# monologue
# JP: いざ登園日となってしまえば、\nローテーションを組むことさえもできなくなる。
2732 = "等到她們開學了，兩人就沒辦法再輪班了。" 

# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;が稼働してればニ勤ですむが、\n予定が少しズレこむだけで、助士欠員での四勤だ。
2442 = "如果\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;還在運營的話，就是兩班制。但是現在和原計劃稍有出入，就成了缺少司爐的四班制。" 

# 【双鉄】
# display as 雙鐵
# JP: 「学園の新学期が始まれば、お前たちにも頼りづらい。\nフルタイムの助士の増員も必要かと、やはりな」
2027 = "「開學之後，就不好麻煩你們了。想了想，還是應該聘幾個全職的司爐」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー、まあ、そうかもねー」
1639 = "「啊——也許，有必要吧——」" 

# monologue
# JP: ちらり、日々姫は窺うような上目遣い。
2635 = "日日姬悄悄抬起目光瞟了我一眼。" 

# 【日々姫】
# display as 日日姬
# JP: 「新学期とかのこともそうだし――もっと先。\n学園出たあと、私も、どうなるかわからんしね」
1778 = "「我不清楚新學期開始之後會怎麼樣——就算我畢業了，我也不知道自己該何去何從」" 

# 【双鉄】
# display as 雙鐵
# JP: 「帝都の美大に行くのではないのか？」
1506 = "「你不是要去帝都的美術大學嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「それもいいけど……\x%lトレインマーク;#00ffc040;トレインマーク%l;#;とかも楽しかけん。\n地元で勉強ば続けられるなら……とかも思うとる」
1574 = "「去美術大學是好……不過設計\\x%lトレインマーク;#00ffc040;車標%l;#;之類的也挺有趣的。所以我也想……在本地繼續學習也沒什麼不好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「地元で？」
1749 = "「就在本地？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。隈元市内に美術科のある大学あるけんね。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;で片道二時間かかるけど――ぎりぎり通えるし」
1667 = "「嗯。隈元市內也有大學開設美術專業。雖然坐\\x%lエアクラ;#00ffc040;空凝機%l;#;去的話大約需要兩小時——但勉強還能接受」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1684 = "「嚯」" 

# monologue
# JP: 少し前までの日々姫にならば、\n進路について、きっとあれこれ相談されていたことだろう。
2446 = "如果換成前些日子的日日姬，一定會來找我商量很多有關升學的事情吧。" 

# monologue
# JP: 自分で調べ、思い悩んで――\n心も成長しているのだなと、しみじみ思い、嬉しくなる。
2701 = "看她這樣自己收集訊息，自己考慮未來——我不禁感嘆，她的心智也開始變成熟了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、一番行きたい道を行け。\n仮にお前が他所にいっても、なんとかやるさ」
1868 = "「沒事，你選擇你最想走的路就好。就算你去到了別的地方，我這邊也會想辦法應付的」" 

# 【日々姫】
# display as 日日姬
# JP: 「……だね。わたしがおらんでも、\nなんでも、なんとでも出来ちゃうんだよね、にぃには」
1243 = "「……說得也是。就算我不在，也沒什麼事情能難倒阿哥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
1635 = "「唔」" 

# monologue
# JP: 応援のつもりの言葉だったが、\n淋しげな顔にさせてしまった。
2569 = "我本來是想鼓勵她的，卻讓她露出了落寞的表情。" 

# monologue
# JP: どうしたものか――と悩んでしまえば、\nうまい言葉が見つからなくなる。
2585 = "我越是陷入苦思，就越不知該如何回覆她。" 

# 【ハチロク】
# display as 八六
# JP: 「いずれにしても、まだまだ先のお話です。\n新しい方を雇うにしても、日々姫が学園を卒業するのも」
1605 = "「反正，不論是雇用新的司爐，還是日日姬畢業，都還是很遙遠的事」" 

# 【日々姫】
# display as 雙鐵＆日日姬
# JP: 『「だな」\n「うんっ！」』
2075 = "『「是啊」\\n「嗯！」』" 

# monologue
# JP: 僕らのうなずきを穏やかに見て。
2313 = "八六平靜地看著點頭的我們。" 

# monologue
# JP: ハチロクは、口の端についた石炭クズを、\nナプキンでそっと拭い取る。
2823 = "隨後她輕輕用手帕抹去了嘴角的煤灰。" 

# 【ハチロク】
# display as 八六
# JP: 「先のことを思い悩むより、いまのこと。\n双鉄様は、明日の[よんきん,1]四勤をきっちりこなすことからです」
1943 = "「與其為以後的事擔憂，不如考慮目前的事。雙鐵少爺，您先把明天開始的四連班做好吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、その、明日のことなんだけど――」
1654 = "「啊，那個，關於明天——」" 

# monologue
# JP: ほっとしたのは、\n日々姫も僕と、恐らく同様であるのだろう。
2593 = "或許，日日姬也跟我一樣鬆了一口氣。" 

# monologue
# JP: ハチロクのさりげない助け舟に\n少し早口で乗っかっていく。
2439 = "她順著八六解圍的話語，用比平常略快的語速繼續說道。" 

# 【日々姫】
# display as 日日姬
# JP: 「あしたね？\n出来れば、夜も学園で過ごしたかとよ」
1719 = "「如果可以的話，明天我想晚上也待在學校裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「夜も？」
1848 = "「晚上也待在學校？」" 

# 【日々姫】
# display as 日日姬
# JP: 「学園の合宿所。\nお泊りしてもよかと？」
1502 = "「住在學校的寄宿樓裡。我可以在那過夜嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、またお泊りの話か」
1484 = "「什麼呀，又想在外面過夜啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「だって、一回も許可してくれんし」
1970 = "「誰叫你一次都不同意人家」" 

# monologue
# JP: ぷうっと、日々姫の頬がふくらむ。\n芝居がかった仕草に見えるが、目は真剣だ。
2637 = "日日姬把臉頰鼓得像氣球一樣。這舉動看起來像是在裝樣子，但是她的眼神無比認真。" 

# 【双鉄】
# display as 雙鐵
# JP: 「仕方なかろう。\n術仙廃炭鉱など、とても寝泊まりできる場所ではない」
1872 = "「沒辦法啊。術仙廢煤礦怎麼想也不是一個能過夜的地方」" 

# 【日々姫】
# display as 日日姬
# JP: 「そりゃああの日は、準備も無しの思いつきだったけど\n……そのあと計画ば立てなおしても、同じこというし」
2046 = "「雖然那天我什麼準備都沒有，只是突發奇想而已……但後來我做足了準備計劃，你還是沒同意」" 

# 【双鉄】
# display as 雙鐵
# JP: 「学園生だけでキャンプするには、危険すぎる場所だ。\n装備や経験があったとしても、それは変わらん」
2018 = "「那地方太過危險，不適合學生獨自露營。就算你有專業設備和經驗也一樣」" 

# monologue
# JP: 少女スカウトのメンバーだという凪が出してきた\nキャンププランは、確かに見事なものに思えた。
2739 = "聲稱自己是女童子軍的凪提出的露營方案確實非常周全。" 

# monologue
# JP: が、それを見ても真闇姉の許可は下りなかったし、\n僕も到底、日々姫の味方は出来なかった。
2288 = "但是，真闇姐看了那方案後也沒有同意她們。而我個人也沒辦法同意日日姬的觀點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あの付近は、\x%lエアクラ;#00ffc040;エアクラ%l;#;で近寄れないだけでなく、\n携帯の電波も通じん。なにかあっても誰も気づけん」
1691 = "「在那附近，不僅是\\x%lエアクラ;#00ffc040;空凝機%l;#;進不去，而且連手機信號也沒有。要是發生什麼意外，沒人能夠發現你們」" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、学園の合宿所なら良かとよね？\n携帯も通じるし、\x%lエアクラ;#00ffc040;エアクラ%l;#;も使えるけん」
2013 = "「那住學校的集訓所裡就沒問題了吧？手機也有信號，\\x%lエアクラ;#00ffc040;空凝機%l;#;也能開過去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1635 = "「唔」" 

# monologue
# JP: 誘導されたか――とほとんど反射で思ってしまい、\n思ったことで、自分の固執に気付かされる。
2544 = "我幾乎條件反射般地以為她是在誘導我。而我也因此才發現自己有多固執。" 

# monologue
# JP: 反対のための反対などは、愚かしい。\nこの件はこの件とし、以前と切り離して判断せねば。
2680 = "為了反對而反對，真是愚蠢至極。一碼歸一碼，進行判斷的時候不能受過去的事影響。" 

# 【双鉄】
# display as 雙鐵
# JP: 「何故、学園の合宿所に泊まる必要があるんだ？」
2016 = "「那你為什麼非要在學校的集訓所裡過夜呢？」" 

# 【日々姫】
# display as 日日姬
# JP: 「アイディア出し。術仙炭鉱の再開発の。\nみんなで、わーっとやりたかとよ」
1933 = "「給術仙煤礦的二次開發出點子。我想和大家一起來計劃一番」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことは昼間に――っと」
2000 = "「這種事在白天做就——哦」" 

# monologue
# JP: 言いかけてすぐに気づいたことを、\nやはり日々姫が補足してくる。
2579 = "我話還沒說完就反應了過來，日日姬也接著補充道。" 

# 【日々姫】
# display as 日日姬
# JP: 「昼間はみんな忙しかもん。\nまとめてじっくり相談できるのは、夜しかなかと」
1909 = "「白天大家都很忙啊。只有晚上大家才能湊到一起好好商量」" 

# 【ハチロク】
# display as 八六
# JP: 「夜は……\n普段には無い考えが浮かぶものとも聞きますね」
1939 = "「聽說……到了晚上有時候會想到一些平常想不到的點子」" 

# monologue
# JP: どこか遠くを見るような目で、ハチロクが言う。
2321 = "八六眼神中充滿懷念地說道。" 

# monologue
# JP: あるいはそれは、\n清美機関士が昔に聞かせた言葉だろうか？
2592 = "或許這句話是以前清美司機告訴她的吧？" 

# 【日々姫】
# display as 日日姬
# JP: 「そう！　それもあるし。凪ちゃんとか、とっぴょうしも\nなかことば言うから、稀咲先輩、面白がるし」
1734 = "「對！也有這個原因。而且小凪會說出一些出人意料的想法，稀咲學姐對此很感興趣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。\n確かに凪と稀咲とは、化学反応を起こしそうだな」
1680 = "「噢。感覺凪和稀咲之間確實會產生些化學反應」" 

# monologue
# JP: そこに日々姫の絵描きの目と、\nじっと一点を見つめるようなふかみの目とが加われば……
2340 = "再加上日日姬由繪畫磨練出的洞察力，還有深美的專注力……" 

# 【双鉄】
# display as 雙鐵
# JP: 「面白そうだとは僕も思うが――しかし……\n現状の再開発案では、足りんのか？」
2043 = "「雖然我也覺得挺有趣的——但是……目前的二次開發方案，還有什麼不足嗎？」" 

# monologue
# JP: 半動態でのSL保存と、整備改修技術継承とを行いながら、\nSL記念館として観光もできる施設を作る。
2243 = "一邊半動態保存蒸汽機車，一邊繼承整備改裝技術，並且將此作為蒸汽機車紀念館向公眾開放觀光。" 

# monologue
# JP: 僕などには、非常にスマートな案に思えるのだが……
2415 = "在我看來，這應該是個非常高明的方案啊……" 

# 【日々姫】
# display as 日日姬
# JP: 「もうひと押しが足りないって、稀咲先輩は」
1927 = "「稀咲學姐說“還差了一步”」" 

# 【ハチロク】
# display as 八六
# JP: 「もうひと押し……でございますか」
2009 = "「還差了一步……是嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「参加してもいい、じゃなく、参加したいって思わせる。\nそこにもっていくには、まだ足りないって」
1963 = "「要讓大眾覺得“想要參加”，而不是“沒別的事的話可以參加”。她認為目前的方案還沒到那個地步」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ＰＲ面でのもうひと押しということか」
1476 = "「也就是說在公關方面上還差一步嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「それだけじゃなく、資金面もって稀咲先輩は」
1462 = "「不僅是如此，稀咲學姐說資金方面也差一點」" 

# monologue
# JP: 資金、と言われると実に苦しい。
2525 = "我們確實在資金方面有些困難。" 

# monologue
# JP: 改修続きの物入りで、常勤助士の増員さえも、\nいまだに果たせていないのだから。
2412 = "因為我們一直在購置維修改裝所需設備，現在就連全職司爐都沒有雇用。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ……だな。初期費用さえ、\n僕らだけでは到底まかないきれんだろうし」
1968 = "「說得也是……如果只有我們出資，就連啟動資金都湊不夠」" 

# monologue
# JP: 支店で判断できるレベルの融資額では、とても足りまい。\n宝生元忠判断の融資や、鉄道各社の参入・出資。
2619 = "支行能批下來的融資額度完全不夠用。還得靠寶生元忠的融資，還有各個鐵路公司的參股及出資。" 

# monologue
# JP: あるいは市民や鉄道ファンによるカンパなど、\nどうやって資金を集めるにせよ…………そうか、なるほど。
2589 = "或是依靠市民和鐵路愛好者的募捐。無論採用哪種方法籌措資金…………啊，原來是這樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「理解した。インパクトのあるアイディアは、\n採算性をも良化させる可能性を持つのだな」
1787 = "「我懂了。如果能想出些令人印象深刻的點子，也有可能幫我們最佳化收支」" 

# 【日々姫】
# display as 日日姬
# JP: 「なら！　お泊りしてもよかと？」
1812 = "「既然這樣！我們可以留宿囉？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、学園の合宿所ならば良いだろう。\nとはいえ、真闇姉にも」
1678 = "「嗯，既然是學校的集訓所應該沒什麼沒問題。不過，你還是得跟真闇姐打聲招呼」" 

# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇには許可もらってる！\nにぃにぃがオッケーならオッケーって」
2035 = "「阿姐那邊早就同意啦！說只要阿哥你同意了就行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「根回しのいいことだ。\nハチロクは、なにかあるか？」
1510 = "「你事前工作做得真到位啊。八六你有什麼意見？」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね――」
1785 = "「我想想——」" 

# monologue
# JP: ハチロクの目が、\n座卓におかれた新聞の上に落とされる。
2318 = "八六的視線看向了放在茶几上的報紙。" 

# 【ハチロク】
# display as 八六
# JP: 「明日泊まって、あさっての朝に戻るのならば、\n大丈夫ですよね？」
1613 = "「只要明天晚上在學校留宿，後天早上回來就沒問題了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、天気予報か」
1683 = "「噢，你看了天氣預報啊」" 

# monologue
# JP: 少し気になっていたことだから、すぐに通じる。
2520 = "我也有些在意這幾天的天氣，所以我知道八六的顧慮是什麼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まだ[おきなわ,1]冲縄の南西だろう？　九洲に上陸するにしても、\n明後日の夜半ごろとのことだし」
2063 = "「颱風還在沖繩的西南方吧？後天的深夜才有可能登陸九州」" 

# 【日々姫】
# display as 日日姬
# JP: 「もし台風が来たって平気とよ。\n合宿所、うちよかよーっぽど新しかけん」
1753 = "「就算颱風來了也沒關係喔。集訓所可比我們家要新得多咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ははは、道理だ。\nならば良かろう。明日は、気をつけていってこい」
1626 = "「哈哈哈，你說得對。那好吧。你明天要多注意安全」" 

# 【ハチロク】
# display as 八六
# JP: 「良いアイディアが産まれますこと、\n大いに期待しておりますね」
1794 = "「我期待著你們想出的好主意」" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがと！　にぃに、ハチロク！」
2032 = "「阿哥，八六！謝謝你們！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、その前に。だ」
1472 = "「不過，在這之前」" 

# monologue
# JP: 今日はクマ川下りに団体客が入るとのことで、\n凪はお休み。
2270 = "今天隈河漂流那邊來了一波旅行團的客人，凪今天無法參與乘務工作。" 

# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;が僕、助士が日々姫の固定シフトで、\n日用二便、観光二便の四往復を頑張る他ない。
2378 = "只能由我來當\\x%l機関士;#00ffc040;司機%l;#;，日日姬來當司爐。我們二人的固定班組，要努力完成兩班通勤、兩班觀光，共計四個往復班次。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l投炭;#00ffc040;投炭%l;#;がキツかろうとは思うが……\nすまんな、今日一日はがんばってくれ」
1203 = "「\\x%l投炭;#00ffc040;加煤%l;#;應該會很辛苦……不過沒辦法，今天只能請你加把勁了」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！」
1672 = "「嗯！」" 

# monologue
# JP: 思いがけぬほど明るい笑顔。\nだけでなく、ガッツポーズまでしてみせる。
2571 = "我沒想到她會綻放這樣的笑臉。她甚至擺出了勝利姿勢給我看。" 

# 【日々姫】
# display as 日日姬
# JP: 「期待しとって！　明日にぃにが楽できるよう、\n最っ高ーの\x%lカマ;#00ffc040;カマ%l;#;で引き継ぎばしてあげるけん！」
2030 = "「阿哥就好好期待著吧！我今天就把\\x%lカマ;#00ffc040;窯%l;#;打理得妥妥當當，讓阿哥明天輕鬆上路！」" 

# 【ハチロク】
# display as 八六
# JP: 「あら？」
1628 = "「哎呀？」" 

# monologue
# JP: 気がかりな声。
2738 = "耳邊傳來了八六擔憂的聲音。" 

# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;席へと目をやれば、\nハチロクは空を睨んだ視線を動かし、僕を見る。
2691 = "當我看向坐在\\x%l機関士;#00ffc040;司機%l;#;席上的八六，她也把原本眺望天空的視線移到我身上。" 

# 【ハチロク】
# display as 八六
# JP: 「すみません、双鉄様。\nよろしいですか？」
1464 = "「不好意思，雙鐵少爺。能打擾您一下嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ」
1873 = "「沒關係」" 

# monologue
# JP: むしろ嬉しい。単純に。\nワンスコを手から離せることが。
2250 = "不如說我挺高興的。因為我終於可以將手中的公斤鍬放下了。" 

# monologue
# JP: 四往復目の、ようやく復路。\nここに来るまで、どれほどの石炭を投げ込んだことか――
2268 = "今天的第四個班次，終於開始了返程。我已經記不清在此之前自己鏟了多少煤炭進窯裡——" 

# 【ハチロク】
# display as 八六
# JP: 「ほんの少しだけ、お願いします」
1792 = "「我有一個小小的請求」" 

# monologue
# JP: 請われるままに、びりびりと重い腕を動かし、\n\x%l自弁;#00ffc040;自弁%l;#;ハンドルに手をかける。
2516 = "我一邊聽著她的請求，一邊將沉甸甸而又麻痺了的手放到\\x%l自弁;#00ffc040;自剎%l;#;杆上。" 

# monologue
# JP: それを見届けハチロクは、\n\x%lタブレット;#00ffc040;タブレット%l;#;を外し\x%l運転体;#00ffc040;運転体%l;#;へと。
2328 = "八六見狀，自己取出了\\x%lタブレット;#00ffc040;操作板%l;#;換到\\x%l運転体;#00ffc040;駕駛體%l;#;上。" 

# 【ハチロク】
# display as 八六
# JP: 「ああ、やはり――\nこれ、もうすぐ降り出しますね」
1647 = "「啊，不出所料——馬上就要下雨了呀」" 

# monologue
# JP: その一言で、\nセンサーの良い\x%l運転体;#00ffc040;運転体%l;#;へと換装をした理由を悟る。
2742 = "聽她這麼說，我就明白了她為什麼要換上感官靈敏的\\x%l運転体;#00ffc040;駕駛體%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「気圧か」
1867 = "「氣壓嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。\nあ――ほら、目視でも黒雲が」
1841 = "「是的。啊——您看，烏雲已經能用肉眼看見了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当だな。\n……予報よりも、随分早いが」
1924 = "「確實……這比天氣預報中說的要來得早啊」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。いやな風です」
1834 = "「是啊。這風吹得真是令人不快」" 

# monologue
# JP: ハチロクはすぐ\x%l整備体;#00ffc040;整備体%l;#;へとまた\x%lタブレット;#00ffc040;タブレット%l;#;を入れ替える。\nだったら僕は、またワンスコを握るしか無い。
2336 = "八六馬上又將\\x%lタブレット;#00ffc040;操作板%l;#;換到\\x%l整備体;#00ffc040;整備體%l;#;身上。看來我又得拿起公斤鍬了。" 

# monologue
# JP: 御一夜駅着が近づいて、入線の準備をするために\n給炭を停止するまでは――この分担が、最善だから。
2695 = "直到列車接近御一夜站，要為進站做準備而停止供煤為止——這是最合適的分工。" 

# 【ハチロク】
# display as 八六
# JP: 「……御一夜駅に戻るまでも、保ちそうにありませんね」
1240 = "「……看來，不等我們進御一夜站就要下雨了呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当だな。これはまるで……」
1833 = "「是啊。這簡直就像……」" 

# monologue
# JP: 疲れのせいか、投げこむ炭が綺麗にバラついてくれない。
2385 = "可能是因為我累了吧，投入窯中的煤並沒有很好地分散開來。" 

# monologue
# JP: 単にそれが災いしただけ。\n僕の未熟が生みだしてしまった錯覚なのだが――
2801 = "這只是單純的失手而已。雖然這只是因為我的不成熟而產生的錯覺——" 

# 【双鉄】
# display as 雙鐵
# JP: 「[ハチロク,3]8620の煙が、雨雲に変わっているようだ」
1744 = "「就像[八六,3]８６２０的煙都變成了雨雲一樣」" 

# monologue
# JP: もくもくと、煙が雲に入り混じっていく。\n流れが早い。異様なまでに。
2844 = "黑煙以異常快的速度咕咚咕咚地灌入了雲層中。" 

# monologue
# JP: ついさっきまで綺麗な夕焼け色をしていた空が、\n分厚い黒へと、見る間に塗りつぶされていく。
2361 = "剛才天空中那壯麗無比的夕陽，慢慢被抹上了一層厚厚的黑色。" 

# 【ハチロク】
# display as 八六
# JP: 「あ……」
1643 = "「啊……」" 

# monologue
# JP: 降り出してきた。\nと、思う間も無く本降りになり、横殴りになる。
2247 = "下雨了。不等我反應過來，細雨就變成了大顆的雨點。" 

# monologue
# JP: （バチバチバチバチっ）
2879 = "（嘩啦嘩啦嘩啦嘩啦）" 

# monologue
# JP: 視界が極端に悪くなる。\n声さえ、通りづらい雨音。
2763 = "視線變得模糊不清。雨聲甚至蓋過了所有的聲音。" 

# monologue
# JP: だが――もう少しで御一夜駅だ。
2281 = "但是——馬上就要進御一夜站了。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2053 = "「雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1671 = "「嗯」" 

# monologue
# JP: 気持ち厚めに石炭を投げ、\n\x%l煙室;#00ffc040;煙室%l;#;通風、ボイラ注水も整えてから、\x%l機関士;#00ffc040;機関士%l;#;席へ。
2567 = "我振作起精神，將煤炭投入窯中，給\\x%l煙室;#00ffc040;煙室%l;#;通風，往鍋爐注水。完成這一系列工作之後，回到了\\x%l機関士;#00ffc040;司機%l;#;席上。" 

# monologue
# JP: それを見届けハチロクは、\x%lタブレット;#00ffc040;タブレット%l;#;を換え、\n\x%l運転体;#00ffc040;運転体%l;#;に戻って声を引き締める。
2326 = "八六見狀，又將\\x%lタブレット;#00ffc040;操作板%l;#;換到了\\x%l運転体;#00ffc040;駕駛體%l;#;上，嚴肅地說。" 

# 【ハチロク】
# display as 八六
# JP: 「この横風で、降りはじめです。\n挙動を早く、緩やかに取るようにしてください」
1902 = "「現在在吹側風，雨剛下不久。您的所有操作都需要迅速而穩健地完成」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1716 = "「好的」" 

# monologue
# JP: 最大限の注意が要求されるのは、\nびしょ濡れではなく、雨の降りはじめの段階だ。
2651 = "最需要保持警惕的並不是環境被完全打濕的時候，而是剛剛開始下雨的這段時間。" 

# monologue
# JP: 線路に付着した細かな異物が浮き上がり、\n\x%l粘着力;#00ffc040;粘着力%l;#;を、著しく低下させてしま――っ！？
2818 = "附著在鐵路上的細小異物會微微浮起，使\\x%l粘着力;#00ffc040;黏著力%l;#;顯著下降——！？" 

# monologue
# JP: （ガタっ）
2868 = "（咣當）" 

# monologue
# JP: （ドクンっ）
2866 = "（咚）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
2067 = "「！！！」" 

# monologue
# JP: 恐怖が、一気に這い登ってくる。\nもう割り切った筈なのに、整頓できた筈なのに。
2506 = "恐懼從我心底竄了上來。我明明已經和過去做了了斷，明明已經可以面對它了。" 

# monologue
# JP: 小石かなにか、異物を踏んで乗り越えた――\nただそれだけのことなのに、全身の血が凍ってしまう。
2346 = "列車可能只是碾過了一塊小石子或是別的異物——卻已經讓我全身的血液為之一滯。" 

# monologue
# JP: （大丈夫だ。大丈夫――落ち着け、落ち着くんだ）
2888 = "（沒關係。沒關係——冷靜下來，給我冷靜下來）" 

# monologue
# JP: ごうごうという風の音。\n石炭の燃える臭い――焼け焦げる臭い。
2841 = "風在我耳邊轟鳴。鼻腔中瀰漫著煤炭燃燒的味道——燒焦的味道。" 

# monologue
# JP: 刺激されてしまえば記憶は、僕の集中を乱そうとする。\nあの日が滲んで、今と、ここと。重なろうとする。
2454 = "它們不停刺激我的感官，翻湧的記憶讓我無法集中注意力。往日的點點滴滴，跟眼前的景色重合到一起。" 

# monologue
# JP: （そう簡単には……緩んでくれんものなのか）
2890 = "（看來……並不會容易放過我嗎）" 

# monologue
# JP: 吐き気を飲み込み、その反動で、息を吐く。
2573 = "我用力忍著那股想要嘔吐的感覺，導致我連連吐氣。" 

# monologue
# JP: ……細く、短くしか吐き出せない。\n汗が、ぶわぶわ噴き出してくる。
1186 = "……我只能短促地呼氣，汗如雨下。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄……様」
2047 = "「雙鐵……少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2066 = "「！」" 

# monologue
# JP: ハチロクの声で視野が広がる。
2317 = "八六的聲音讓我的視野逐漸清晰起來。" 

# monologue
# JP: いけない――腕、これ、\nこんなにガチガチに力んでちゃ――
2248 = "不好——我的手臂已經繃得僵硬——" 

# 【ハチロク】
# display as 八六
# JP: 「大丈夫……です、か？　\nお顔、色――」
1771 = "「您……沒事吧？您的臉色很蒼白——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫、いささか緊張しただけだ」
1869 = "「沒事，只是稍微有些緊張罷了」" 

# monologue
# JP: これほど力が入っていては、\nとても柔らかなブレーキなどはかけられない。
2610 = "把肌肉繃得那麼緊，不可能做到平穩地剎車。" 

# monologue
# JP: パ。グ。――と一瞬、\n指を広げて握り直す。
2547 = "我張開手，又馬上握緊。" 

# monologue
# JP: （ああ……本当に大丈夫じゃないか）
2871 = "（啊……確實是沒事啊）" 

# monologue
# JP: 僕の体は、動いてくれる。\n重ね続けてきた訓練が、意思を離れて動かしてくれる。
2575 = "我的身體動了起來。長期以來的訓練，讓我的身體可以下意識地採取行動。" 

# monologue
# JP: いつもと同じに、体が動く。\nいつもと同じに、やればいい――
2541 = "我就像平常一樣行動了起來。像平常一樣，就可以了——" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l逆転機;#00ffc040;逆転機%l;#;、\x%lミッドギア;#00ffc040;ミッドギア%l;#;」
1210 = "「\\x%l逆転機;#00ffc040;回動機%l;#;，\\x%lミッドギア;#00ffc040;中位檔%l;#;」" 

# monologue
# JP: 停車のための、前動作。\n\x%l8620;#00ffc040;8620%l;#;も僕も、そこにまで進めてきている。
2803 = "這是停車前的預備動作。\\x%l8620;#00ffc040;８６２０%l;#;和我都已經走到了這一步。" 

# monologue
# JP: あとひといきだ、もう少し――\nそうと思えば意識にも、わずかずつ余裕が戻ってくれる。
2813 = "還差一點，就差一點了——我這麼想著，變得稍微從容了一些。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l絶気;#00ffc040;絶気%l;#;良し。\x%l前進フルギア;#00ffc040;前進フルギア%l;#;」
2006 = "「進入無汽狀態。\\x%l前進フルギア;#00ffc040;滿檔前進%l;#;」" 

# monologue
# JP: もはや惰力での走行だ。\nあとは、減速して止まるだけ。
2347 = "列車基本上就是在依靠慣性前進。接下來只要減速就好。" 

# monologue
# JP: そう言い聞かせ、\x%l自弁;#00ffc040;自弁%l;#;をじわり――\nわずかに動かす。
2514 = "我一邊在心中默默念道，一邊稍稍推了推\\x%l自弁;#00ffc040;自剎%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l制動;#00ffc040;制動%l;#;、コンマ４」
1201 = "「\\x%l制動;#00ffc040;減速%l;#;，零點四」" 

# monologue
# JP: 早めに、弱めに――\n最初のブレーキをごくゆるくかけ、圧縮空気を込め直す。
2794 = "迅速而慎重地——進行第一階段剎車，然後重新注入壓縮空氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「制限４０」
2036 = "「限速４０」" 

# monologue
# JP: 制限速度を守れてる。\nきちんと減速できている。
2807 = "速度維持在限速以下了。列車已經成功減速。" 

# monologue
# JP: いつもどおりのことがけれども、\n今は何より、頼もしい。
2825 = "雖然在往常這是理所當然的事情，但這對現在的我來說卻無異於一顆定心丸。" 

# monologue
# JP: （――いや）
2846 = "（——不對）" 

# monologue
# JP: いつもと違う。\nハチロクが\x%l喚呼;#00ffc040;喚呼%l;#;を合わせてくれない。
2402 = "和以往不一樣。八六並沒有\\x%l喚呼;#00ffc040;復誦%l;#;我的指令。" 

# monologue
# JP: 試されてるのか？　以前にもたしかこんなことが――\n湧き起こってきた雑念を、目と手への集中を戻し追い払う。
2433 = "她在考驗我嗎？以前好像也有過這樣的——我趕緊把注意力集中在眼前以及手上，拋開心中的雜念。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l階段;#00ffc040;階段%l;#;！」
1212 = "「\\x%l階段;#00ffc040;分段%l;#;！」" 

# monologue
# JP: 普段はしない細かな\x%l喚呼;#00ffc040;喚呼%l;#;を入れて意識を引き締め直し、\n減速度を徐々に弱めていく。
2580 = "我說著這些平時不會使用的詳細\\x%l喚呼;#00ffc040;復誦%l;#;，讓自己集中注意力，同時慢慢地放緩減速度。" 

# monologue
# JP: ……停止目標は、すぐそこだ。\nあとは、惰性で行けばいい。
1182 = "……停車位置已經近在眼前。接下來只要讓列車靠慣性前進就好了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l自弁;#00ffc040;[じべん,1]自弁%l;#;――運転」
1208 = "「\\x%l自弁;#00ffc040;自剎%l;#;——行駛位置」" 

# monologue
# JP: 速度が、落ちる。落ちきっている。
2348 = "列車的速度越來越慢。已經幾乎停止前進。" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;はもう、\nホームを歩くポーレットより遅くなってる。
91 = "\\x%l8620;#00ffc040;８６２０%l;#;已經比站台上行走的波萊特還要慢了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――停車。停止目標、良し」
1214 = "「——停車。停車位置，正常」" 

# monologue
# JP: ぴたりだ。\nしかし、ハチロクはまたも\x%l喚呼;#00ffc040;喚呼%l;#;をしない。
2344 = "列車停得不偏不倚。但是，八六還是沒有\\x%l喚呼;#00ffc040;復誦%l;#;我的指令。" 

# monologue
# JP: ならばと自分で時計を確かめ、\x%l喚呼;#00ffc040;喚呼%l;#;する。
2624 = "於是我看了看自己的表，獨自完成\\x%l喚呼;#00ffc040;復誦%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[ちゃく]着、[ヒトハチマルマル,3]1800――定刻通り」
1551 = "「到站，１８００——準點」" 

# monologue
# JP: どっと、安心感が湧く。
2455 = "安心的感覺從我心底湧起。" 

# monologue
# JP: 震えだしそうになる指をなんとか制御して、\n停車措置を終え――ようやく、ハチロクへ呼びかける。
2532 = "我努力控制住想要發抖的手指，完成了停車後的操作——而後終於向八六開口。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。御一夜駅着だ。――定刻通りだ」
1527 = "「八六。到御一夜站了。準點到達」" 

# 【ハチロク】
# display as 八六
# JP: 「ええ。……ええ。\nきちんと、わたくしは見ておりました」
1661 = "「嗯……嗯。我全都看在眼裡」" 

# monologue
# JP: ぎゅっと目を閉じ、息を吸い込む。
2323 = "八六緊緊閉上了眼，深吸一口氣。" 

# monologue
# JP: そうして僕を見直す瞳は……\nいつもどおりの、落ち着いたものだ。
2690 = "當她再次睜開眼看我時……她的眼神恢復了一如既往的平靜。" 

# 【ハチロク】
# display as 八六
# JP: 「見事な運転でございました。双鉄様」
1773 = "「您的駕駛操作非常完美。雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だったら、よかった」
2019 = "「那就好」" 

# monologue
# JP: 今日はとにかく、早く帰って寝てしまいたい。\n体が、酷く疲れているし――
2266 = "今天就這樣趕緊回家，趕緊睡覺吧。我的身體已經疲憊不堪了——" 

# monologue
# JP: （ああ、いや、そうか……）
2875 = "（啊，不對，原來是這樣……）" 

# monologue
# JP: 疲労がきっと影響したのだ。
2697 = "看來是疲勞影響了我的狀態。" 

# monologue
# JP: でなければ、風雨の音や振動くらいで、\nこれほどまでに動揺するなど、ありえなかろう。
2252 = "不然的話，我怎麼會因為那區區風聲和震動就動搖成那樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、下りるぞ。\n\x%lタブレット;#00ffc040;タブレット%l;#;を換えてくれ」
1538 = "「八六，我們下車了。你把\\x%lタブレット;#00ffc040;操作板%l;#;換一下」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――はい、\n左様、ですね」
1641 = "「啊——好的，您說得是」" 

# monologue
# JP: \x%l運転体;#00ffc040;運転体%l;#;を\x%l乗務鞄;#00ffc040;乗務鞄%l;#;に大事にしまい、\nさて――と立っても、まだハチロクは立ち上がらない。
2555 = "我把\\x%l運転体;#00ffc040;駕駛體%l;#;小心翼翼地收入\\x%l乗務鞄;#00ffc040;乘務包%l;#;中。站了起來——但是八六並沒有隨我起身。" 

# monologue
# JP: （む？）
2878 = "（嗯？）" 

# monologue
# JP: \x%l運転体;#00ffc040;運転体%l;#;のときには気づかなかったが――
2427 = "她使用\\x%l運転体;#00ffc040;駕駛體%l;#;的時候我還沒有注意到——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、調子が優れないのか？」
1528 = "「八六，你有哪裡不舒服嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「え？　いえ――あ、はい。\nそう……ですね」
1631 = "「哎？沒有——嗯。是有點……」" 

# monologue
# JP: こっ――くり、と。\n頷きはいっそ緩慢だ。
2324 = "八六緩慢地點了點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「やはり[じょし,1]助士抜きの体制ですと、[かんそう,1]換装が多くなりますから。\nその分、負荷が」
1871 = "「沒有司爐幫忙的話，我更換身體的頻度會變高。這對我造成了一些負擔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば――ほら」
1835 = "「是嗎。既然這樣——來」" 

# monologue
# JP: 手を差し伸べる。\nハチロクはゆるゆると僕の手を――っ！
2334 = "八六顫顫巍巍地握住了我向她伸出的手——這！" 

# monologue
# JP: （なんだ――冷えきっているじゃないか）
2882 = "（她的手怎麼這麼冷）" 

# monologue
# JP: 換装が多かった影響なのか、\nいつものハチロクのぬくもりをまるで感じない。
2591 = "或許是頻繁更換身體所造成的影響，我感受不到八六身上以往的溫暖。" 

# monologue
# JP: だから握る手に力を込めて、\n僕から熱を、少しでも伝えようとする。
2598 = "所以我用力握緊她的手，希望能儘量將我的熱量傳遞給她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうだ？　立てるか？」
1769 = "「怎麼樣？能站起來嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「少し、休んでいただけですから。\n立つことくらいは、いくらでも」
1608 = "「只是稍微休息了一下而已。站起來當然是沒問題的」" 

# monologue
# JP: （ゴン、ゴンっ）
2865 = "（咚、咚）" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄君？　いいですか？」
2050 = "「雙鐵君？現在方便嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、今降りる」
1650 = "「啊，我們這就下車」" 

# monologue
# JP: ポーレットも丁度、改札を終えたところらしい。
2676 = "波萊特似乎正好做完了檢票工作。" 

# monologue
# JP: ハチロクを立たせ先に降ろして、\n続いて僕もホームへ降りる。
2576 = "我等八六站起了身並讓她先下車，隨後跟著她走到了站台上。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あれ？　キャブでもないんですか？」
1630 = "「哎呀？她們也不在駕駛室嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「何がだ？」
1515 = "「你是指誰？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「日々姫ちゃんたちです。\n\x%l客車;#00ffc040;客車%l;#;に乗ってなかったし――わぷっ！？」
1818 = "「日日姬她們啊。也沒在\\x%l客車;#00ffc040;客運車廂%l;#;——哇噗！？」" 

# 【れいな】
# display as 玲奈
# JP: 「ふわわ、すごい雨と風ですぅ」
1624 = "「哇哇，雨和風都好大啊」" 

# monologue
# JP: 確かにだ。
2724 = "確實是。" 

# monologue
# JP: 屋根と\x%l8620;#00ffc040;8620%l;#;が防いでくれているにもかかわらず、\nその隙間から、突き刺すような雨が来る。
2303 = "儘管有屋頂和\\x%l8620;#00ffc040;８６２０%l;#;遮擋，但是雨點還是從兩者間的縫隙吹了進來，打在身上像針扎一樣痛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これはたまらん。転車を先にすませてしまおう。\n話はそのあと、レールショップで」
1998 = "「這可真是受不了。我先去轉車。有什麼話留到鐵路商店裡說」" 

# 【ハチロク】
# display as 八六
# JP: 「ふぅ……タオル、ありがとうございます」
1622 = "「呼……謝謝您的毛巾」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえいえ、乗務、お疲れ様です」
1633 = "「哪裡哪裡，乘務工作辛苦你們了」" 

# monologue
# JP: レールショップへ戻ってポーレットの紅茶を飲めば、\n末端部からじわじわと、体温が戻ってくるようだ。
2536 = "我回到了鐵路商店，喝著波萊特沏的紅茶，身體漸漸恢復了溫暖。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで……ええと、日々姫ちゃんたち――」
1808 = "「於是……呃，日日姬她們——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫と稀咲と、凪とふかみもだろう？」
1513 = "「你是在說日日姬、稀咲、凪還有深美她們吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうです」
1679 = "「嗯，是的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのメンツなら、外泊だ。\n学園の合宿所に泊まるということだ」
1712 = "「她們一行人今天在外留宿。說是在學校的集訓所裡過夜」" 

# 【ポーレット】
# display as 波萊特
# JP: 「泊まるって――」
2008 = "「過夜——」" 

# monologue
# JP: ポーレットの目が窓の外へと。
2678 = "波萊特看向了窗外。" 

# monologue
# JP: 横殴りの雨はバチバチ、更に勢いを増している。\nガラスを割って室内にまで飛び込んできそうなほどに。
2614 = "拍打著窗戶的大雨此時更添了幾分勢頭。簡直就像要把玻璃擊碎，衝進屋內一般。" 

# 【双鉄】
# display as 雙鐵
# JP: 「許可をしたのは昨日の朝だったのだ。\nそのときの予報では、台風はまだ来ないはずだった」
1789 = "「我是昨天早上同意她們這麼做的。按照那時候的天氣預報，現在颱風應該還沒來」" 

# 【ハチロク】
# display as 八六
# JP: 「宝生稀咲様が、泊まりがけでの相談をご希望された\nとのことで――日々姫が、どうしてもと」
1688 = "「因為日日姬百般請求，說寶生稀咲小姐希望跟她們一起在外留宿，商討主意——」" 

# monologue
# JP: ……僕とハチロク、交互に事情を説明していく。
1187 = "……我和八六一人說一句，把整件事情一五一十地道出。" 

# monologue
# JP: が、現実にはこの天候だ。\n言葉はどうにも、言い訳じみたものとなる。
2286 = "但是，現實就是天公不作美。我的話聽起來怎麼都像是在找藉口。" 

# 【ポーレット】
# display as 波萊特
# JP: 「まぁ、ここまで崩れちゃったら、\n泊まって、落ち着いてからの方が正解ですよね」
1473 = "「不過，天氣這麼差。她們在校內留宿等待雨停才是正確的選擇」" 

# 【双鉄】
# display as 雙鐵
# JP: 「とは思うのだが――」
2042 = "「雖然我也是這麼想的——」" 

# monologue
# JP: 話してるうち、不安が高まってきてしまった。
2778 = "說著說著，我心中的不安越來越強烈。" 

# monologue
# JP: 判断ミスをしたかもと、そんな気持ちもそこに混じって、\nどうにもそわそわ、落ち着かん。
2238 = "一想到我可能做出了錯誤的判斷，這份懊惱就與不安混雜在一起，讓我坐立難安。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……とにかく様子を確認しよう。\n電話を貸してもらえるか？」
1242 = "「……總之先確認一下情況吧。能借我用一下電話嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、どうぞ。あ、学園の番号ってわかります？」
1870 = "「沒問題，請用。啊，你知道學校的電話號碼嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまない」
1611 = "「只能麻煩你了」" 

# monologue
# JP: ポーレットが渡してくれたメモの番号へかければすぐに、\n落ち着いた声の応答がある。
2530 = "我剛撥通波萊特遞給我的電話號碼，聽筒中就馬上傳來了平靜的回覆聲。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すみません。\n[ざいえんせい,2]在園生の、右田日々姫の兄ですが――」
1658 = "「喂，不好意思。我是貴校在讀生右田日日姬的哥哥——」" 

# monologue
# JP: この天候だ。
2689 = "畢竟天氣這麼差。" 

# monologue
# JP: 問い合わせが他にも相次ぐのだろう、\n返答は極めて事務的であり、それゆえ素早く的確だ。
2607 = "打電話來詢問的人應該接連不斷吧，對方的回答非常形式化，卻也因此顯得精簡又準確。" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい。合宿所に。ええ――\nそうですね、可能であれば話を――はい、すみません」
1666 = "「嗯。她們在集訓所。嗯——是的，如果可以的話，請讓她來接電話——好的，麻煩您了」" 

# monologue
# JP: 心配そうに僕を見ているハチロクたちに、\n安心しろと親指をたてる。
2534 = "我向一臉擔憂看著我的八六豎起了大拇指，示意她放心。" 

# monologue
# JP: というか……いささか過保護すぎたか。\n何かあったら向こうから――――っと！
2775 = "話說回來……我是不是有點過度保護了。如果她們發生了什麼事，應該會給我——啊！" 

# 【双鉄】
# display as 雙鐵
# JP: 「もしもし――え？　あれ？」
1657 = "「喂——哎？咦？」" 

# monologue
# JP: 最初の応答と同じ声。\n無論、日々姫の声ではない。
2744 = "聽筒中又傳來了剛才接電話的聲音。當然，這並不是日日姬的聲音。" 

# monologue
# JP: 嫌な予感がどんどん濃くなり――\nそうしてそれは、一瞬にして現実となる。
2549 = "我心中不安的陰霾越來越濃厚——而這份不安在轉瞬間變成了現實。" 

# 【双鉄】
# display as 雙鐵
# JP: 「居ない、ですか？　日々姫が――\n稀咲も、凪も、ふかみも――四人……揃って」
1715 = "「她們，不在那？日日姬——還有稀咲、凪、深美——四個人……都不在」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうですか。はい――こちらも心当たりを全部――\nはい。何か分かり次第に、すぐにご連絡します」
1566 = "「原來如此。嗯——我們也會把她們可能去的地方都問一遍——好的。一有消息馬上聯繫你們」" 

# monologue
# JP: （プツっ）
2887 = "（掛斷）" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様――」
2052 = "「雙鐵少爺——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「全滅だ。蓑笠さんのところも、早瀬さんのところも――\n宝生さんのところでも、心当たりが無いそうだ」
1972 = "「誰都不知道。不管是蓑笠先生、早瀨女士，還是寶生先生——都沒有她們的消息」" 

# 【ハチロク】
# display as 八六
# JP: 「そんなっ」
1768 = "「怎麼會這樣」" 

# monologue
# JP: （ガラっ！）
2876 = "（喀噠！）" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん！」
1739 = "「小雙！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉っ」
1915 = "「真闇姐」" 

# monologue
# JP: レールショップへ、息せききって駆け込んでくる。\n真闇姉には、無論、真っ先に電話していた。
2716 = "真闇姐氣喘吁吁地衝進了鐵路商店。當然，在聯絡那麼多人之前，我最先撥通的是真闇姐的電話。" 

# monologue
# JP: 帰ってないかを聞くことと、もしも帰っていないなら、\n宝生元忠への連絡手段を教えてもらう、そのために。
2608 = "打電話給她是為了詢問日日姬她們回家沒有。如果沒有，就請她告訴我寶生元忠的聯絡方式。" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、[じゅつせん,1]術仙炭鉱じゃなかと？」
1740 = "「小雙，她們會不會在術仙煤礦？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは僕も考えた。\nが、[ゆのい,1]湯医から徒歩でいけるような場所ではないし」
1779 = "「我也覺得有可能。但是那裡離湯醫很遠，走路到不了的」" 

# 【真闇】
# display as 真闇
# JP: 「歩き以外は？」
1722 = "「如果她們不是走路過去的呢？」" 

# monologue
# JP: 言いながら、真闇姉が地図を広げてくれる。
2714 = "真闇姐一邊說一邊攤開了地圖。" 

# monologue
# JP: これは……何十年か前の地図。\n術仙炭鉱が、まだ現役だったころの地図のようだ。
2802 = "這是……幾十年前的地圖。這張地圖繪成的時候術仙煤礦還在運作。" 

# 【真闇】
# display as 真闇
# JP: 「例えば、ぎりぎりまで\x%lエアクラ;#00ffc040;エアクラ%l;#;で行ってからとか」
1478 = "「也許，她們乘\\x%lエアクラ;#00ffc040;空凝機%l;#;到了煤礦附近」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、ナビと\x%l共感;#00ffc040;共感%l;#;をつなげるか」
1530 = "「八六，你能跟Ｎａｖｉ建立\\x%l共感;#00ffc040;共鳴%l;#;嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「はい――繋ぎます。え？　ああ！」
1823 = "「是——我這就接通。哎？啊！」" 

# monologue
# JP: 僕が指示するより先に、\nハチロクの手がペンを取り――
2588 = "我還沒有給Ｎａｖｉ下達指示，八六就拿起了筆——" 

# 【真闇】
# display as 真闇
# JP: 「コピーやけん。直接書きこんじゃってよかよ」
1999 = "「這是影本。直接畫也沒事」" 

# monologue
# JP: ――真闇姉の言葉と同時、地図に引かれていったラインが、やがて大きな範囲を区切る。
1173 = "——真闇姐說完，八六就在地圖上拉起一條線，將一大片區域圍在圈內。" 

# monologue
# JP: ナビが持っている\x%lエアクラ;#00ffc040;エアクラ%l;#;侵入禁止区域のデータ。\nそれをハチロクが、地図上に再現してくれたのだ。
2310 = "八六在地圖上圈出的，是Ｎａｖｉ資料庫中\\x%lエアクラ;#00ffc040;空凝機%l;#;的禁入區域。" 

# 【真闇】
# display as 真闇
# JP: 「こぎゃん広かと？」
2002 = "「這麼大一片？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん、御一夜側からなら、線路沿いのここ――」
1675 = "「嗯，御一夜這一側，是從鐵路旁的這一區域開始——」" 

# monologue
# JP: 進入禁止区域の一端、\nナビが最初に不時着をした地点を指し示す。
2564 = "我指向了禁入區域的一端，當初Ｎａｖｉ就是在這裡緊急降落的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ここから、線路沿いに二キロも歩けば術仙炭鉱近辺に\n到着できるが、湯医側から歩くとなると……」
1763 = "「從這裡沿鐵路走兩公里，就能到達術仙煤礦附近。但如果是從湯醫那邊走過去……」" 

# 【真闇】
# display as 真闇
# JP: 「一番近くて……六キロくらい？」
1849 = "「最近的路……少說也有六公里？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「歩けぬ距離ではなかろうが……\n四人全員、きちんと登園はしたとのことなのだ」
2041 = "「雖然勉強算是可以步行的距離……但聽說她們四個人今天都是去了學校的」" 

# monologue
# JP: 四人の中では最上級の稀咲のクラスの、\n全カリキュラムが終わるのが午後の二時。
2432 = "她們四個人中年級最高的是稀咲，她的課應該是下午兩點結束。" 

# monologue
# JP: それから\x%lエアクラ;#00ffc040;エアクラ%l;#;を手配して、\n進入禁止区域ギリギリにまで移動したとして――
2289 = "假設她在這以後準備了\\x%lエアクラ;#00ffc040;空凝機%l;#;，開到禁入區域的邊緣——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、タクシー会社に問い合わせてみよう。\n自宅からの送迎がなかったことは確認している」
1930 = "「算了，我去問問計程車公司。我已經確認過不是在自家門口接送的了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それはわたしが」
1782 = "「我來問吧」" 

# monologue
# JP: すぐにポーレットが受話器を掴む。\nならばそちらは任せるとして――
2679 = "波萊特馬上抓起了聽筒。既然這樣那就交給她吧——" 

# 【真闇】
# display as 真闇
# JP: 「ナビが頼まれたってことはなかと？」
1714 = "「她們會不會是託了Ｎａｖｉ送她們過去？」" 

# monologue
# JP: ちら、と真闇姉はハチロクを見る。
2717 = "真闇姐瞟了一眼八六。" 

# monologue
# JP: ハチロクはすぐに遠い目をして、\nそれからゆっくり首を振る。
2623 = "於是八六把目光投向遠方，然後緩緩搖了搖頭。" 

# 【ハチロク】
# display as 八六
# JP: 「ナビは、ずっと双鉄様のフォローをしていたそうです。\n誰も乗せてもいないし、何も頼まれてもいないと」
2071 = "「Ｎａｖｉ一直在跟著雙鐵少爺。它沒有載過任何人，也沒有人拜託過它」" 

# 【真闇】
# display as 真闇
# JP: 「やったら、他は……\n\x%lエアクラ;#00ffc040;エアクラ%l;#;以外で――」
2022 = "「那，除此之外……除\\x%lエアクラ;#00ffc040;空凝機%l;#;之外——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――いや、そうか。“\x%lエアクラ;#00ffc040;エアクラ%l;#;以外”か」
1218 = "「——啊，對啊。“除\\x%lエアクラ;#00ffc040;空凝機%l;#;之外”」" 

# monologue
# JP: （ガラっ）
2877 = "（喀噠）" 

# 【蓑笠】
# display as 蓑笠
# JP: 「双鉄君。凪が、ご迷惑ばかけまして」
2051 = "「雙鐵小弟。我家凪給你添麻煩了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠さん、丁度よかった！」
1953 = "「蓑笠先生，您來得正好！」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「っ！！？」
2068 = "「！！？」" 

# monologue
# JP: レールショップに来るやいなやで、\n深々と下げかけていた頭が、ぎくりと止まる。
2760 = "見蓑笠先生走進鐵路商店，我剛要向他深深地低下頭，又突然停下了動作。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪は今日、キャンプ道具を持ってでかけましたか？」
1489 = "「今天凪上學的時候有沒有帶上露營道具？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「今日ですか？　今日は普通の通学鞄ば――」
1491 = "「今天？今天她只帶了平常用的書包——」" 

# monologue
# JP: そこまでいって。\nああ――と蓑笠さんが小さく呻く。
2279 = "他說到一半，又發出了“啊啊——”的咕噥聲。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「いや、何日か前に『お泊りの準備ばする』いうて、\n寝袋だなんだ持ちだして……持ち帰ってきとりませんが」
1474 = "「不過，幾天前她說“要為外宿做準備”，就把睡袋什麼的給帶走了……一直沒拿回來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうですか」
1843 = "「是這樣嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「湯医近辺のタクシー会社さん。日々姫ちゃんたち、\n四人でも別々にでも、乗ってないみたいです」
1784 = "「我剛才聯繫了湯醫附近的計程車公司。都說沒有載過日日姬她們，不管是四人一起還是分別乘坐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。それではすまんが、\n[せき]堰さんにかけてくれんか？」
1976 = "「謝謝你。不好意思，能麻煩你再打電話給堰先生嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「ああ！」
1646 = "「啊！」" 

# monologue
# JP: 真闇姉にも通じたようだ。
2698 = "看來真闇姐也明白我為什麼要這麼做了。" 

# monologue
# JP: 真闇姉が確認している地図上の――川のラインと、\n術仙炭鉱廃駅とでは、ものの一キロも離れていない。
2438 = "她看了看地圖——河岸線和術仙煤礦廢車站之間只有短短一公里不到。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。はい――え！？　そうなんですか？\nはい！　わかりました。ありがとうございます！」
1825 = "「是。是——哎！？這樣嗎？好的！我知道了。非常感謝！」" 

# monologue
# JP: 興奮した声。\n勢いも良く受話器が置かれる。
2677 = "波萊特的語氣非常興奮，爽快地掛斷了電話。" 

# 【ポーレット】
# display as 波萊特
# JP: 「堰さん、今、[ゆのい,1]湯医の発船所なんだそうです。\n台風で流されないよう、舟、あげておくため。それで」
1699 = "「堰先生說他現在就在湯醫的發船點。他要去把船拖上岸，防止被颱風颳走。然後——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「舟が一[そう]艘――足りないのだな？」
1907 = "「發現少了一艘船——是嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。そうおっしゃってました」
1839 = "「是的。他就是這樣說的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば四人は、川を下って術仙炭鉱近辺に\n向かった可能性が高い」
1910 = "「看來她們四人很可能是乘船順流而下，去術仙煤礦附近了」" 

# monologue
# JP: 昨日の凪は助士を休んで、\nふかみとともにクマ川下りで団体客の相手をしていた。
2640 = "昨天凪沒有來擔任司爐，她和深美兩人帶一個旅行團順隈河漂流而下。" 

# monologue
# JP: あのふたりなら、「川をつかえばすぐ炭鉱」と、\nとっくに気づいていたのだろうし――
2431 = "她們兩人應該早已知曉“走水路可以很快到達煤礦”——" 

# 【ポーレット】
# display as 波萊特
# JP: 「炭鉱……は、キャンプ。危ないですよね。\nもしも、暖を取りたくて火とか使っちゃったら」
1571 = "「去煤礦裡露營……是很危險的吧。如果為了取暖而生了火——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2066 = "「！」" 

# monologue
# JP: ポーレットの指摘を受けて、背筋が伸びる。
2741 = "聽了波萊特的話，我不禁緊張得背都繃直了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。\nガスと当たってしまえば――最悪爆発だ」
1830 = "「是啊。如果點燃了瓦斯——最糟糕的情況下會引發爆炸」" 

# 【ハチロク】
# display as 八六
# JP: 「爆発って――」
1894 = "「爆炸——」" 

# 【れいな】
# display as 玲奈
# JP: 「炭鉱内には、ガスが発生しやすいんですよぉ。\n工具とかも、火花が出ないものを使うくらいですからぁ」
1893 = "「煤礦裡很容易產生瓦斯。工具也必須用不會產生火花的」" 

# 【真闇】
# display as 真闇
# JP: 「……旧宿舎群に泊まるとしても、危なかとよ。\nあそこ、いつ倒壊してもおかしくなか建物もあるばい」
1231 = "「……就算住在舊宿舍樓裡也很危險啊。有的老房子隨時可能倒塌」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、双鉄様！　すぐ向かいましょう」
2054 = "「雙鐵少爺！既然如此，我們快點趕過去吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしたいのはやまやまだが、手がかりも無しの捜索は\nどれほどの時間がかかってしまうかわからない」
2044 = "「雖然我很想現在就過去，但是現在手頭一點線索都沒有，要找她們無異於大海撈針」" 

# 【ポーレット】
# display as 波萊特
# JP: 「今、稼働できる車輌が[ハチロクニイマル,3]8620しかありませんから」
1903 = "「現在能運作的車輛只有８６２０了」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――」
1638 = "「啊——」" 

# monologue
# JP: 術仙炭鉱近辺に入ってしまえば、連絡の手段が途絶する。
2444 = "如果到了術仙煤礦附近，就會失去通訊手段。" 

# monologue
# JP: やみくもな捜索で人員と移動手段とが拘束されれば、\n捜索時間の間、他を完全に空白にしてしまうこととなる。
2448 = "如果胡亂地搜索，人手不足、交通方式又受限，只會在搜索期間忽略所有其它的可能性。" 

# 【双鉄】
# display as 雙鐵
