[script]
# lines: 450 
# monologue
# JP: 朝一番のコーヒーを飲み、乗務予定を確認する。\n寝ぼけた頭が覚醒していき、そうだったかと思い出す。
2790 = "Uống ly cà phê sáng sớm, tôi kiểm tra lại lịch trình làm việc. Cái đầu còn ngái ngủ dần tỉnh táo lại, và tôi nhớ ra chuyện đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……もう明日になるのか、四往復は」
1239 = "「……Đã đến ngày mai rồi sao, cái lịch trình 4 vòng khứ hồi ấy.」"
# monologue
# JP: 試験を終えて、\x%l8620;#00ffc040;8620%l;#;が営業運転に復帰して、\nそれを待っていた\x%lキハ07;#00ffc040;キハ07%l;#;がオーバーホールに入り。
2414 = "Sau khi hoàn thành chạy thử, \\x%l8620;#00ffc040;8620%l;#; đã trở lại hoạt động thương mại, và \\x%lキハ07;#00ffc040;KiHa 07%l;#; cũng bắt đầu đợt đại tu như đã định."
# monologue
# JP: 日々姫と凪とローテーションで、\nどうにかまわり始めてきたところだったのだが。
2421 = "Nhờ có Hibiki và Nagi luân phiên trực, mà mọi thứ mới bắt đầu xoay xở được."
# 【ハチロク】
# display as 八六
# JP: 「オーバーホール、良い判断でしたね」
1569 = "「Đại tu quả là một quyết định đúng đắn ngài nhỉ.」"
# monologue
# JP: ハチロクのその言葉には、もちろん、頷く他にない。
2740 = "Trước câu nói đó của Hachiroku, tất nhiên tôi chỉ có thể gật đầu đồng tình."
# 【双鉄】
# display as 雙鐵
# JP: 「シャフトに亀裂が見つかるとはな」
1757 = "「Không ngờ lại phát hiện ra vết nứt trên trục truyền động cơ đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「微細なうちに発見できてなによりでした。\n他には大きな不具合もないとのことですし」
1693 = "「Thật may là phát hiện ra khi vết nứt còn nhỏ. Ngoài ra cũng không có lỗi nào nghiêm trọng nữa.」"
# monologue
# JP: 事故を未然に防止して、\x%lキハ07;#00ffc040;キハ07%l;#;の寿命も延びて、\nこれこそまさしくなによりだ。
2461 = "Ngăn chặn được tai nạn, kéo dài tuổi thọ cho \\x%lキハ07;#00ffc040;KiHa 07%l;#;, đây quả thực là điều may mắn nhất."
# monologue
# JP: なによりなのだが――延びてしまった修理期間が、\nこんな形で影響するとも、正直思っていなかった。
2774 = "May mắn thì may mắn thật——nhưng tôi không ngờ thời gian sửa chữa kéo dài lại ảnh hưởng theo cách này."
# 【日々姫】
# display as 日日姬
# JP: 「ごめんねにぃに。明日、学園の登園日やけん」
1733 = "「Xin lỗi anh hai nha. Ngày mai, em phải đến trường rồi.」"
# monologue
# JP: 顔に出てしまっていたのだろうか。\nパンを片手に、日々姫が申し訳なさそうな声を出す。
2387 = "Có lẽ suy nghĩ đã hiện rõ trên mặt tôi. Hibiki cầm miếng bánh mì trên tay, cất giọng đầy áy náy."
# monologue
# JP: が、日々姫になんの責任があろうはずもない。
2284 = "Nhưng, Hibiki đâu có lỗi gì trong chuyện này."
# 【双鉄】
# display as 雙鐵
# JP: 「謝るようなことではないさ。\n学園生の本分は、勉学であるに決まっている」
1508 = "「Đâu phải chuyện cần xin lỗi. Bổn phận của học sinh là học hành mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「うう～っ」
1660 = "「Ư ư~」"
# monologue
# JP: ハチロクが食べてる石炭を、\n間違って呑んでしまったようなしかめつら。
2436 = "Khuôn mặt con bé nhăn nhó, như thể lỡ nuốt nhầm cục than mà Hachiroku hay ăn vậy."
# monologue
# JP: 説教として取られたと、その表情に理解する。
2702 = "Nhìn biểu cảm đó, tôi hiểu là con bé tưởng mình đang bị thuyết giáo."
# 【双鉄】
# display as 雙鐵
# JP: 「勉強しろという話ではない。ただ、日々姫と凪の\n臨時雇いに頼りきった現状に問題があると感じただけだ」
1775 = "「Anh không bảo em phải học. Anh chỉ cảm thấy tình trạng hiện tại, khi quá phụ thuộc vào nhân công thời vụ như em và Nagi, là có vấn đề thôi.」"
# monologue
# JP: いざ登園日となってしまえば、\nローテーションを組むことさえもできなくなる。
2732 = "Đến ngày tựu trường, thì ngay cả việc luân phiên trực cũng không thể thực hiện được nữa."
# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;が稼働してればニ勤ですむが、\n予定が少しズレこむだけで、助士欠員での四勤だ。
2442 = "Nếu \\x%lキハ07;#00ffc040;KiHa 07%l;#; hoạt động thì chỉ cần 2 ca, nhưng kế hoạch hơi lệch đi một chút, là thành 4 ca trong tình trạng thiếu phụ lái."
# 【双鉄】
# display as 雙鐵
# JP: 「学園の新学期が始まれば、お前たちにも頼りづらい。\nフルタイムの助士の増員も必要かと、やはりな」
2027 = "「Học kỳ mới bắt đầu, anh cũng khó mà nhờ vả hai đứa được. Quả nhiên là cần phải tuyển thêm phụ lái toàn thời gian thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、まあ、そうかもねー」
1639 = "「A, chà, chắc là vậy rồi.」"
# monologue
# JP: ちらり、日々姫は窺うような上目遣い。
2635 = "Hibiki khẽ ngước mắt lên nhìn dò xét."
# 【日々姫】
# display as 日日姬
# JP: 「新学期とかのこともそうだし――もっと先。\n学園出たあと、私も、どうなるかわからんしね」
1778 = "「Chuyện học kỳ mới cũng vậy——mà xa hơn nữa. Sau khi tốt nghiệp, em cũng không biết mình sẽ ra sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「帝都の美大に行くのではないのか？」
1506 = "「Không phải em định thi vào trường Mỹ thuật trên Đế đô sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「それもいいけど……\x%lトレインマーク;#00ffc040;トレインマーク%l;#;とかも楽しかけん。\n地元で勉強ば続けられるなら……とかも思うとる」
1574 = "「Thế cũng tốt…… nhưng thiết kế \\x%lトレインマーク;#00ffc040;biểu trưng tàu%l;#; cũng thú vị lắm. Nên em cũng đang nghĩ…… hay là tiếp tục học ở quê.」"
# 【双鉄】
# display as 雙鐵
# JP: 「地元で？」
1749 = "「Ở quê á?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。隈元市内に美術科のある大学あるけんね。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;で片道二時間かかるけど――ぎりぎり通えるし」
1667 = "「Vâng. Trong thành phố Kumamoto cũng có trường đại học có khoa Mỹ thuật mà. Đi \\x%lエアクラ;#00ffc040;Aircra%l;#; mất khoảng hai tiếng một chiều——nhưng cũng ráng đi về được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1684 = "「Ồ.」"
# monologue
# JP: 少し前までの日々姫にならば、\n進路について、きっとあれこれ相談されていたことだろう。
2446 = "Nếu là Hibiki của trước đây, chắc chắn con bé đã hỏi ý kiến tôi đủ thứ về định hướng tương lai rồi."
# monologue
# JP: 自分で調べ、思い悩んで――\n心も成長しているのだなと、しみじみ思い、嬉しくなる。
2701 = "Tự mình tìm hiểu, tự mình suy nghĩ—— Nhận ra con bé đã trưởng thành hơn, tôi thấy thật vui."
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、一番行きたい道を行け。\n仮にお前が他所にいっても、なんとかやるさ」
1868 = "「Thôi, cứ đi con đường nào em muốn đi nhất ấy. Dù em có đi nơi khác, anh cũng sẽ xoay xở được thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「……だね。わたしがおらんでも、\nなんでも、なんとでも出来ちゃうんだよね、にぃには」
1243 = "「……Cũng phải. Dù không có em, chuyện gì anh hai cũng giải quyết êm xuôi hết mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1635 = "「Hừm.」"
# monologue
# JP: 応援のつもりの言葉だったが、\n淋しげな顔にさせてしまった。
2569 = "Tôi vốn định nói lời cổ vũ, nhưng lại làm con bé buồn đi mất rồi."
# monologue
# JP: どうしたものか――と悩んでしまえば、\nうまい言葉が見つからなくなる。
2585 = "Phải làm sao đây——tôi bối rối, chẳng tìm được từ ngữ nào thích hợp."
# 【ハチロク】
# display as 八六
# JP: 「いずれにしても、まだまだ先のお話です。\n新しい方を雇うにしても、日々姫が学園を卒業するのも」
1605 = "「Dù sao thì, đó cũng là chuyện của tương lai xa. Cả việc thuê người mới, lẫn việc Hibiki tốt nghiệp.」"
# 【日々姫】
# display as 雙鐵＆日日姬
# JP: 『「だな」\n「うんっ！」』
2075 = "『「Đúng vậy.」\n「Vâng!」』"
# monologue
# JP: 僕らのうなずきを穏やかに見て。
2313 = "Nhìn chúng tôi gật đầu đồng tình, Hachiroku mỉm cười hiền hòa."
# monologue
# JP: ハチロクは、口の端についた石炭クズを、\nナプキンでそっと拭い取る。
2823 = "Hachiroku dùng khăn ăn, nhẹ nhàng lau vụn than dính trên khóe miệng."
# 【ハチロク】
# display as 八六
# JP: 「先のことを思い悩むより、いまのこと。\n双鉄様は、明日の[よんきん,1]四勤をきっちりこなすことからです」
1943 = "「Thay vì lo lắng chuyện tương lai, hãy tập trung vào hiện tại. Ngài Soutetsu, trước mắt hãy hoàn thành tốt 4 ca trực ngày mai đã.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、その、明日のことなんだけど――」
1654 = "「A, cái đó, chuyện ngày mai ấy mà——」"
# monologue
# JP: ほっとしたのは、\n日々姫も僕と、恐らく同様であるのだろう。
2593 = "Có lẽ Hibiki cũng giống như tôi, đều cảm thấy nhẹ nhõm."
# monologue
# JP: ハチロクのさりげない助け舟に\n少し早口で乗っかっていく。
2439 = "Con bé nhanh chóng nương theo lời giải vây khéo léo của Hachiroku."
# 【日々姫】
# display as 日日姬
# JP: 「あしたね？\n出来れば、夜も学園で過ごしたかとよ」
1719 = "「Ngày mai á? Nếu được, em muốn ở lại trường buổi tối luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「夜も？」
1848 = "「Cả buổi tối á?」"
# 【日々姫】
# display as 日日姬
# JP: 「学園の合宿所。\nお泊りしてもよかと？」
1502 = "「Ở khu nội trú của trường.\nEm ngủ lại được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、またお泊りの話か」
1484 = "「Gì chứ, lại chuyện ngủ qua đêm à.」"
# 【日々姫】
# display as 日日姬
# JP: 「だって、一回も許可してくれんし」
1970 = "「Tại anh có cho phép lần nào đâu.」"
# monologue
# JP: ぷうっと、日々姫の頬がふくらむ。\n芝居がかった仕草に見えるが、目は真剣だ。
2637 = "Hibiki phồng má lên. Trông có vẻ như đang làm nũng, nhưng ánh mắt lại rất nghiêm túc."
# 【双鉄】
# display as 雙鐵
# JP: 「仕方なかろう。\n術仙廃炭鉱など、とても寝泊まりできる場所ではない」
1872 = "「Chịu thôi. Cái mỏ than bỏ hoang Jutsusen đó đâu phải chỗ để ngủ lại.」"
# 【日々姫】
# display as 日日姬
# JP: 「そりゃああの日は、準備も無しの思いつきだったけど\n……そのあと計画ば立てなおしても、同じこというし」
2046 = "「Thì đúng là hôm đó em nảy ra ý định đột xuất mà chưa chuẩn bị gì ……nhưng sau đó lập lại kế hoạch đàng hoàng rồi anh vẫn nói vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「学園生だけでキャンプするには、危険すぎる場所だ。\n装備や経験があったとしても、それは変わらん」
2018 = "「Chỗ đó quá nguy hiểm để học sinh tự cắm trại. Dù có trang bị hay kinh nghiệm thì cũng vậy thôi.」"
# monologue
# JP: 少女スカウトのメンバーだという凪が出してきた\nキャンププランは、確かに見事なものに思えた。
2739 = "Kế hoạch cắm trại do Nagi - một nữ hướng đạo sinh - đưa ra quả thực rất tuyệt vời."
# monologue
# JP: が、それを見ても真闇姉の許可は下りなかったし、\n僕も到底、日々姫の味方は出来なかった。
2288 = "Nhưng chị Mayami xem xong vẫn không cho phép, và tôi cũng chẳng thể nào bênh vực Hibiki được."
# 【双鉄】
# display as 雙鐵
# JP: 「あの付近は、\x%lエアクラ;#00ffc040;エアクラ%l;#;で近寄れないだけでなく、\n携帯の電波も通じん。なにかあっても誰も気づけん」
1691 = "「Khu vực đó không chỉ \\x%lエアクラ;#00ffc040;Aircra%l;#; không vào được, mà sóng điện thoại cũng không có. Lỡ xảy ra chuyện gì thì chẳng ai hay biết đâu.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら、学園の合宿所なら良かとよね？\n携帯も通じるし、\x%lエアクラ;#00ffc040;エアクラ%l;#;も使えるけん」
2013 = "「Vậy, ở khu nội trú của trường thì được đúng không? Có sóng điện thoại, \\x%lエアクラ;#00ffc040;Aircra%l;#; cũng dùng được nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1635 = "「唔」" 
# monologue
# JP: 誘導されたか――とほとんど反射で思ってしまい、\n思ったことで、自分の固執に気付かされる。
2544 = "Bị gài bẫy rồi sao——Tôi gần như phản xạ nghĩ vậy, và chính suy nghĩ đó khiến tôi nhận ra sự cố chấp của mình."
# monologue
# JP: 反対のための反対などは、愚かしい。\nこの件はこの件とし、以前と切り離して判断せねば。
2680 = "Việc phản đối chỉ vì muốn phản đối thật là ngu ngốc. Chuyện nào ra chuyện đó, phải tách biệt với trước đây để phán đoán."
# 【双鉄】
# display as 雙鐵
# JP: 「何故、学園の合宿所に泊まる必要があるんだ？」
2016 = "「Tại sao em lại cần ngủ lại khu nội trú của trường?」"
# 【日々姫】
# display as 日日姬
# JP: 「アイディア出し。術仙炭鉱の再開発の。\nみんなで、わーっとやりたかとよ」
1933 = "「Để nghĩ ý tưởng. Về việc tái phát triển mỏ than Jutsusen. Em muốn cùng mọi người làm một trận cho ra trò.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなことは昼間に――っと」
2000 = "「Chuyện đó thì cứ làm vào ban ngà——A.」"
# monologue
# JP: 言いかけてすぐに気づいたことを、\nやはり日々姫が補足してくる。
2579 = "Tôi vừa định nói thì nhận ra ngay, và quả nhiên Hibiki đã bổ sung thêm."
# 【日々姫】
# display as 日日姬
# JP: 「昼間はみんな忙しかもん。\nまとめてじっくり相談できるのは、夜しかなかと」
1909 = "「Ban ngày mọi người đều bận mà. Chỉ có buổi tối mới có thể tập trung lại bàn bạc kỹ lưỡng được thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「夜は……\n普段には無い考えが浮かぶものとも聞きますね」
1939 = "「Buổi tối…… Nghe nói là sẽ nảy ra những ý tưởng mà bình thường không nghĩ tới được đấy ạ.」"
# monologue
# JP: どこか遠くを見るような目で、ハチロクが言う。
2321 = "Hachiroku nói với ánh mắt như đang nhìn về nơi xa xăm nào đó."
# monologue
# JP: あるいはそれは、\n清美機関士が昔に聞かせた言葉だろうか？
2592 = "Hoặc có lẽ, đó là lời mà lái tàu Kiyomi đã nói với em ấy ngày xưa?"
# 【日々姫】
# display as 日日姬
# JP: 「そう！　それもあるし。凪ちゃんとか、とっぴょうしも\nなかことば言うから、稀咲先輩、面白がるし」
1734 = "「Đúng rồi! Cũng có lý do đó nữa. Với lại bé Nagi hay nói mấy câu đột phá lắm, chị Kisaki cũng thấy thú vị nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。\n確かに凪と稀咲とは、化学反応を起こしそうだな」
1680 = "「Ừ. Quả thật Nagi và Kisaki có vẻ sẽ tạo ra phản ứng hóa học đấy.」"
# monologue
# JP: そこに日々姫の絵描きの目と、\nじっと一点を見つめるようなふかみの目とが加われば……
2340 = "Nếu thêm vào đó góc nhìn của một họa sĩ như Hibiki, và ánh mắt luôn chăm chú vào một điểm của Fukami nữa thì……"
# 【双鉄】
# display as 雙鐵
# JP: 「面白そうだとは僕も思うが――しかし……\n現状の再開発案では、足りんのか？」
2043 = "「Anh cũng thấy thú vị đấy——nhưng mà…… Phương án tái phát triển hiện tại vẫn chưa đủ sao?」"
# monologue
# JP: 半動態でのSL保存と、整備改修技術継承とを行いながら、\nSL記念館として観光もできる施設を作る。
2243 = "Vừa bảo tồn SL ở trạng thái bán động, vừa kế thừa kỹ thuật bảo dưỡng cải tạo, đồng thời xây dựng cơ sở tham quan du lịch như một bảo tàng SL."
# monologue
# JP: 僕などには、非常にスマートな案に思えるのだが……
2415 = "Với tôi, đó có vẻ là một phương án rất thông minh, nhưng……"
# 【日々姫】
# display as 日日姬
# JP: 「もうひと押しが足りないって、稀咲先輩は」
1927 = "「Chị Kisaki bảo là vẫn còn thiếu một cú hích nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「もうひと押し……でございますか」
2009 = "「Một cú hích nữa…… sao ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「参加してもいい、じゃなく、参加したいって思わせる。\nそこにもっていくには、まだ足りないって」
1963 = "「Phải làm sao để họ muốn tham gia, chứ không phải là tham gia cũng được. Để đạt đến mức độ đó thì vẫn chưa đủ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ＰＲ面でのもうひと押しということか」
1476 = "「Ý là cần một cú hích về mặt PR sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「それだけじゃなく、資金面もって稀咲先輩は」
1462 = "「Không chỉ vậy đâu, chị Kisaki bảo về mặt vốn cũng cần nữa.」"
# monologue
# JP: 資金、と言われると実に苦しい。
2525 = "Nhắc đến tiền vốn thì đúng là đau đầu thật."
# monologue
# JP: 改修続きの物入りで、常勤助士の増員さえも、\nいまだに果たせていないのだから。
2412 = "Vì chi phí sửa chữa liên tục, mà đến giờ chúng tôi vẫn chưa thể tăng cường thêm phụ lái toàn thời gian."
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ……だな。初期費用さえ、\n僕らだけでは到底まかないきれんだろうし」
1968 = "「À thì…… đúng vậy. Ngay cả chi phí ban đầu, chỉ dựa vào chúng ta thì chắc chắn không kham nổi rồi.」"
# monologue
# JP: 支店で判断できるレベルの融資額では、とても足りまい。\n宝生元忠判断の融資や、鉄道各社の参入・出資。
2619 = "Hạn mức cho vay ở cấp chi nhánh thì không thể nào đủ được. Phải cần đến khoản vay do Houshou Mototada quyết định, hoặc sự tham gia góp vốn của các công ty đường sắt."
# monologue
# JP: あるいは市民や鉄道ファンによるカンパなど、\nどうやって資金を集めるにせよ…………そうか、なるほど。
2589 = "Hay là kêu gọi quyên góp từ người dân và người hâm mộ đường sắt, dù huy động vốn bằng cách nào đi chăng nữa………… Ra là vậy, hiểu rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「理解した。インパクトのあるアイディアは、\n採算性をも良化させる可能性を持つのだな」
1787 = "「Anh hiểu rồi. Những ý tưởng mang tính đột phá sẽ có khả năng cải thiện cả tính sinh lời nữa nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら！　お泊りしてもよかと？」
1812 = "「Vậy thì! Tụi em ngủ lại được chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、学園の合宿所ならば良いだろう。\nとはいえ、真闇姉にも」
1678 = "「Thôi được, nếu là khu nội trú của trường thì chắc không sao. Dù vậy, cũng phải xin phép chị Mayami nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇねぇには許可もらってる！\nにぃにぃがオッケーならオッケーって」
2035 = "「Chị hai cho phép rồi!\nChỉ cần anh hai ok là ok.」"
# 【双鉄】
# display as 雙鐵
# JP: 「根回しのいいことだ。\nハチロクは、なにかあるか？」
1510 = "「Chuẩn bị kỹ càng gớm nhỉ. Hachiroku, em có ý kiến gì không?」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね――」
1785 = "「Để xem nào——」"
# monologue
# JP: ハチロクの目が、\n座卓におかれた新聞の上に落とされる。
2318 = "Ánh mắt Hachiroku,\nrơi xuống tờ báo đặt trên bàn."
# 【ハチロク】
# display as 八六
# JP: 「明日泊まって、あさっての朝に戻るのならば、\n大丈夫ですよね？」
1613 = "「Nếu ngủ lại đêm mai, và sáng mốt về thì chắc không sao đâu nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、天気予報か」
1683 = "「À, dự báo thời tiết sao.」"
# monologue
# JP: 少し気になっていたことだから、すぐに通じる。
2520 = "Vì cũng đang để ý chuyện đó nên tôi hiểu ngay."
# 【双鉄】
# display as 雙鐵
# JP: 「まだ[おきなわ,1]冲縄の南西だろう？　九洲に上陸するにしても、\n明後日の夜半ごろとのことだし」
2063 = "「Vẫn còn ở Tây Nam Okinawa mà nhỉ? Dù có đổ bộ vào Kyushu, thì cũng phải tầm nửa đêm ngày mốt cơ.」"
# 【日々姫】
# display as 日日姬
# JP: 「もし台風が来たって平気とよ。\n合宿所、うちよかよーっぽど新しかけん」
1753 = "「Lỡ bão có tới cũng hổng sao đâu. Khu nội trú mới hơn nhà mình nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ははは、道理だ。\nならば良かろう。明日は、気をつけていってこい」
1626 = "「Hahaha, có lý. Vậy thì được. Ngày mai đi cẩn thận đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「良いアイディアが産まれますこと、\n大いに期待しておりますね」
1794 = "「Em rất mong chờ mọi người sẽ nghĩ ra những ý tưởng hay ho đấy ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ありがと！　にぃに、ハチロク！」
2032 = "「Cảm ơn nha! Anh hai, Hachiroku!」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、その前に。だ」
1472 = "「Nhưng, trước đó đã.」"
# monologue
# JP: 今日はクマ川下りに団体客が入るとのことで、\n凪はお休み。
2270 = "Hôm nay có khách đoàn đi thuyền trên sông Kuma, nên Nagi xin nghỉ."
# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;が僕、助士が日々姫の固定シフトで、\n日用二便、観光二便の四往復を頑張る他ない。
2378 = "Ca trực cố định chỉ có tôi làm \\x%l機関士;#00ffc040;lái tàu%l;#;, Hibiki làm phụ lái, chúng tôi không còn cách nào khác ngoài việc cố gắng hoàn thành 4 vòng khứ hồi, gồm 2 chuyến đi lại hàng ngày và 2 chuyến tham quan."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l投炭;#00ffc040;投炭%l;#;がキツかろうとは思うが……\nすまんな、今日一日はがんばってくれ」
1203 = "「Anh biết là việc \\x%l投炭;#00ffc040;xúc than%l;#; sẽ vất vả lắm…… Nhưng xin lỗi nhé, hôm nay em cố gắng lên nha.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！」
1672 = "「Vâng!」"
# monologue
# JP: 思いがけぬほど明るい笑顔。\nだけでなく、ガッツポーズまでしてみせる。
2571 = "Một nụ cười tươi rói đến không ngờ. Không chỉ vậy, con bé còn làm động tác quyết tâm nữa."
# 【日々姫】
# display as 日日姬
# JP: 「期待しとって！　明日にぃにが楽できるよう、\n最っ高ーの\x%lカマ;#00ffc040;カマ%l;#;で引き継ぎばしてあげるけん！」
2030 = "「Cứ mong chờ đi! Để ngày mai anh hai được nhàn nhã, em sẽ bàn giao một cái \\x%lカマ;#00ffc040;lò hơi%l;#; hoàn hảo nhất cho coi!」"
# 【ハチロク】
# display as 八六
# JP: 「あら？」
1628 = "「Ơ kìa?」"
# monologue
# JP: 気がかりな声。
2738 = "Một giọng nói lo lắng."
# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;席へと目をやれば、\nハチロクは空を睨んだ視線を動かし、僕を見る。
2691 = "Hướng mắt về phía ghế \\x%l機関士;#00ffc040;lái tàu%l;#;, Hachiroku dời ánh nhìn đang chằm chằm vào bầu trời sang tôi."
# 【ハチロク】
# display as 八六
# JP: 「すみません、双鉄様。\nよろしいですか？」
1464 = "「Xin lỗi, ngài Soutetsu.\nNgài có rảnh không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ」
1873 = "「Không sao.」"
# monologue
# JP: むしろ嬉しい。単純に。\nワンスコを手から離せることが。
2250 = "Trái lại tôi còn thấy vui nữa là đằng khác. Đơn giản là vì có thể buông chiếc xẻng xúc than ra."
# monologue
# JP: 四往復目の、ようやく復路。\nここに来るまで、どれほどの石炭を投げ込んだことか――
2268 = "Vòng khứ hồi thứ 4, cuối cùng cũng là chuyến về. Từ nãy đến giờ, tôi đã ném vào lò bao nhiêu than rồi không biết——"
# 【ハチロク】
# display as 八六
# JP: 「ほんの少しだけ、お願いします」
1792 = "「Xin ngài giúp em một chút thôi ạ.」"
# monologue
# JP: 請われるままに、びりびりと重い腕を動かし、\n\x%l自弁;#00ffc040;自弁%l;#;ハンドルに手をかける。
2516 = "Theo lời yêu cầu, tôi cử động cánh tay nặng trĩu tê rần, đặt tay lên tay cầm \\x%l自弁;#00ffc040;van hãm tự động%l;#;."
# monologue
# JP: それを見届けハチロクは、\n\x%lタブレット;#00ffc040;タブレット%l;#;を外し\x%l運転体;#00ffc040;運転体%l;#;へと。
2328 = "Thấy vậy, Hachiroku tháo \\x%lタブレット;#00ffc040;thẻ bảng%l;#; ra và chuyển sang \\x%l運転体;#00ffc040;thân điều khiển%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「ああ、やはり――\nこれ、もうすぐ降り出しますね」
1647 = "「A, quả nhiên là——\nSắp mưa rồi đây.」"
# monologue
# JP: その一言で、\nセンサーの良い\x%l運転体;#00ffc040;運転体%l;#;へと換装をした理由を悟る。
2742 = "Chỉ một câu đó, tôi đã hiểu lý do em ấy đổi sang \\x%l運転体;#00ffc040;thân điều khiển%l;#; có cảm biến tốt hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「気圧か」
1867 = "「Áp suất không khí à?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。\nあ――ほら、目視でも黒雲が」
1841 = "「Vâng.\nA——Ngài xem, mắt thường cũng thấy mây đen kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「本当だな。\n……予報よりも、随分早いが」
1924 = "「Đúng thật.\n……Đến sớm hơn dự báo nhiều nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。いやな風です」
1834 = "「Vâng ạ. Gió khó chịu quá.」"
# monologue
# JP: ハチロクはすぐ\x%l整備体;#00ffc040;整備体%l;#;へとまた\x%lタブレット;#00ffc040;タブレット%l;#;を入れ替える。\nだったら僕は、またワンスコを握るしか無い。
2336 = "Hachiroku lập tức chuyển \\x%lタブレット;#00ffc040;thẻ bảng%l;#; về lại \\x%l整備体;#00ffc040;thân chính%l;#;. Vậy thì tôi chỉ còn cách cầm xẻng lên lại thôi."
# monologue
# JP: 御一夜駅着が近づいて、入線の準備をするために\n給炭を停止するまでは――この分担が、最善だから。
2695 = "Cho đến khi gần tới ga Ohitoyo và ngừng cấp than để chuẩn bị vào ga——đây là sự phân công tốt nhất rồi."
# 【ハチロク】
# display as 八六
# JP: 「……御一夜駅に戻るまでも、保ちそうにありませんね」
1240 = "「……Có vẻ như không cầm cự được đến lúc về ga Ohitoyo rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「本当だな。これはまるで……」
1833 = "「Đúng vậy. Trông cứ như……」"
# monologue
# JP: 疲れのせいか、投げこむ炭が綺麗にバラついてくれない。
2385 = "Chắc do mệt mỏi, than ném vào không tản ra đều được."
# monologue
# JP: 単にそれが災いしただけ。\n僕の未熟が生みだしてしまった錯覚なのだが――
2801 = "Chỉ là một sự cố nhỏ. Một ảo giác do sự non nớt của tôi tạo ra——"
# 【双鉄】
# display as 雙鐵
# JP: 「[ハチロク,3]8620の煙が、雨雲に変わっているようだ」
1744 = "「Cứ như thể khói của \\x%l8620;#00ffc040;8620%l;#; đang biến thành mây mưa vậy.」"
# monologue
# JP: もくもくと、煙が雲に入り混じっていく。\n流れが早い。異様なまでに。
2844 = "Từng cuộn khói cuồn cuộn hòa vào mây. Trôi đi rất nhanh. Đến mức dị thường."
# monologue
# JP: ついさっきまで綺麗な夕焼け色をしていた空が、\n分厚い黒へと、見る間に塗りつぶされていく。
2361 = "Bầu trời mới nãy còn nhuộm màu hoàng hôn tuyệt đẹp, chỉ trong chớp mắt đã bị bao phủ bởi một màu đen đặc xịt."
# 【ハチロク】
# display as 八六
# JP: 「あ……」
1643 = "「A……」"
# monologue
# JP: 降り出してきた。\nと、思う間も無く本降りになり、横殴りになる。
2247 = "Bắt đầu rơi rồi. Chưa kịp nghĩ xong, mưa đã trút xuống xối xả, gió tạt ngang dữ dội."
# monologue
# JP: （バチバチバチバチっ）
2879 = "（Lộp độp lộp độp）"
# monologue
# JP: 視界が極端に悪くなる。\n声さえ、通りづらい雨音。
2763 = "Tầm nhìn trở nên cực kỳ tồi tệ. Tiếng mưa lấn át cả tiếng nói."
# monologue
# JP: だが――もう少しで御一夜駅だ。
2281 = "Nhưng——chỉ một chút nữa là đến ga Ohitoyo rồi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2053 = "「Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1671 = "「Ừm.」"
# monologue
# JP: 気持ち厚めに石炭を投げ、\n\x%l煙室;#00ffc040;煙室%l;#;通風、ボイラ注水も整えてから、\x%l機関士;#00ffc040;機関士%l;#;席へ。
2567 = "Tôi ném thêm một lớp than dày hơn chút, điều chỉnh thông gió \\x%l煙室;#00ffc040;buồng khói%l;#; và bơm nước lò hơi xong xuôi, rồi tiến về ghế \\x%l機関士;#00ffc040;lái tàu%l;#;."
# monologue
# JP: それを見届けハチロクは、\x%lタブレット;#00ffc040;タブレット%l;#;を換え、\n\x%l運転体;#00ffc040;運転体%l;#;に戻って声を引き締める。
2326 = "Thấy vậy, Hachiroku đổi \\x%lタブレット;#00ffc040;thẻ bảng%l;#;, trở lại \\x%l運転体;#00ffc040;thân điều khiển%l;#; và cất giọng nghiêm túc."
# 【ハチロク】
# display as 八六
# JP: 「この横風で、降りはじめです。\n挙動を早く、緩やかに取るようにしてください」
1902 = "「Gió tạt ngang, lại mới bắt đầu mưa. Xin ngài hãy thao tác thật nhanh và nhẹ nhàng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1716 = "「Ừ.」"
# monologue
# JP: 最大限の注意が要求されるのは、\nびしょ濡れではなく、雨の降りはじめの段階だ。
2651 = "Giai đoạn đòi hỏi sự chú ý cao độ nhất, không phải là lúc mưa ướt sũng, mà là lúc vừa mới bắt đầu mưa."
# monologue
# JP: 線路に付着した細かな異物が浮き上がり、\n\x%l粘着力;#00ffc040;粘着力%l;#;を、著しく低下させてしま――っ！？
2818 = "Những dị vật nhỏ bám trên đường ray sẽ nổi lên, làm giảm \\x%l粘着力;#00ffc040;lực bám đường%l;#; một cách đáng kể——!?"
# monologue
# JP: （ガタっ）
2868 = "（Khục）"
# monologue
# JP: （ドクンっ）
2866 = "（Thịch）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
2067 = "「!!!」"
# monologue
# JP: 恐怖が、一気に這い登ってくる。\nもう割り切った筈なのに、整頓できた筈なのに。
2506 = "Nỗi sợ hãi ập đến trong chốc lát. Rõ ràng tôi đã rũ bỏ được, đã dọn dẹp sạch sẽ rồi cơ mà."
# monologue
# JP: 小石かなにか、異物を踏んで乗り越えた――\nただそれだけのことなのに、全身の血が凍ってしまう。
2346 = "Chỉ là cán qua một viên sỏi hay dị vật gì đó thôi—— Vậy mà toàn thân tôi như đông cứng lại."
# monologue
# JP: （大丈夫だ。大丈夫――落ち着け、落ち着くんだ）
2888 = "（Không sao đâu. Không sao——Bình tĩnh lại, phải bình tĩnh lại.）"
# monologue
# JP: ごうごうという風の音。\n石炭の燃える臭い――焼け焦げる臭い。
2841 = "Tiếng gió gào thét.\nMùi than cháy——mùi khét lẹt."
# monologue
# JP: 刺激されてしまえば記憶は、僕の集中を乱そうとする。\nあの日が滲んで、今と、ここと。重なろうとする。
2454 = "Bị kích thích, ký ức bắt đầu làm nhiễu loạn sự tập trung của tôi. Ngày hôm đó đang mờ ảo hiện ra, hòa lẫn vào lúc này, và nơi đây."
# monologue
# JP: （そう簡単には……緩んでくれんものなのか）
2890 = "（Không dễ gì…… buông tha cho mình sao.）"
# monologue
# JP: 吐き気を飲み込み、その反動で、息を吐く。
2573 = "Tôi nuốt cơn buồn nôn xuống, và theo phản xạ, tôi thở hắt ra."
# monologue
# JP: ……細く、短くしか吐き出せない。\n汗が、ぶわぶわ噴き出してくる。
1186 = "……Chỉ có thể thở ra những hơi ngắn và mỏng manh. Mồ hôi túa ra đầm đìa."
# 【ハチロク】
# display as 八六
# JP: 「双鉄……様」
2047 = "「Ngài…… Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2066 = "「!」"
# monologue
# JP: ハチロクの声で視野が広がる。
2317 = "Giọng nói của Hachiroku giúp tầm nhìn của tôi mở rộng ra."
# monologue
# JP: いけない――腕、これ、\nこんなにガチガチに力んでちゃ――
2248 = "Không được——Cánh tay, thế này,\ncăng cứng thế này thì——"
# 【ハチロク】
# display as 八六
# JP: 「大丈夫……です、か？　\nお顔、色――」
1771 = "「Ngài…… không sao chứ ạ?\nSắc mặt ngài——」"
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫、いささか緊張しただけだ」
1869 = "「Không sao, chỉ hơi căng thẳng chút thôi.」"
# monologue
# JP: これほど力が入っていては、\nとても柔らかなブレーキなどはかけられない。
2610 = "Dùng sức nhiều thế này, thì không thể nào hãm phanh êm ái được."
# monologue
# JP: パ。グ。――と一瞬、\n指を広げて握り直す。
2547 = "Bóp. Nhả.——Trong tích tắc, tôi xòe các ngón tay ra rồi nắm lại."
# monologue
# JP: （ああ……本当に大丈夫じゃないか）
2871 = "（A…… Thật sự không sao mà.）"
# monologue
# JP: 僕の体は、動いてくれる。\n重ね続けてきた訓練が、意思を離れて動かしてくれる。
2575 = "Cơ thể tôi vẫn cử động được. Những bài huấn luyện lặp đi lặp lại đã giúp cơ thể tự động phản xạ mà không cần ý thức."
# monologue
# JP: いつもと同じに、体が動く。\nいつもと同じに、やればいい――
2541 = "Cơ thể tôi cử động, giống như mọi khi. Cứ làm như mọi khi là được——"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l逆転機;#00ffc040;逆転機%l;#;、\x%lミッドギア;#00ffc040;ミッドギア%l;#;」
1210 = "「\\x%l逆転機;#00ffc040;Cần đảo chiều%l;#;, \\x%lミッドギア;#00ffc040;số trung tính%l;#;.」"
# monologue
# JP: 停車のための、前動作。\n\x%l8620;#00ffc040;8620%l;#;も僕も、そこにまで進めてきている。
2803 = "Thao tác chuẩn bị để dừng tàu. Cả \\x%l8620;#00ffc040;8620%l;#; và tôi, đều đã tiến đến bước này rồi."
# monologue
# JP: あとひといきだ、もう少し――\nそうと思えば意識にも、わずかずつ余裕が戻ってくれる。
2813 = "「\\x%l逆転機;#00ffc040;Cần đảo chiều%l;#;, \\x%lミッドギア;#00ffc040;số trung tính%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l絶気;#00ffc040;絶気%l;#;良し。\x%l前進フルギア;#00ffc040;前進フルギア%l;#;」
2006 = "Thao tác chuẩn bị để dừng tàu. Cả \\x%l8620;#00ffc040;8620%l;#; và tôi, đều đã tiến đến bước này rồi."
# monologue
# JP: もはや惰力での走行だ。\nあとは、減速して止まるだけ。
2347 = "Tôi bất giác nghĩ như vậy.\nDù thế nào đi nữa."
# monologue
# JP: そう言い聞かせ、\x%l自弁;#00ffc040;自弁%l;#;をじわり――\nわずかに動かす。
2514 = "Hachiroku là một đồ vật, là một \\x%lレイルロオド;#00ffc040;Railord%l;#;—— Nhưng đồng thời, em ấy cũng chắc chắn đang sống."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l制動;#00ffc040;制動%l;#;、コンマ４」
1201 = "「Nếu vậy thì.」"
# monologue
# JP: 早めに、弱めに――\n最初のブレーキをごくゆるくかけ、圧縮空気を込め直す。
2794 = "「!」"
# 【双鉄】
# display as 雙鐵
# JP: 「制限４０」
2036 = "Bàn tay Hachiroku nắm lấy tay tôi."
# monologue
# JP: 制限速度を守れてる。\nきちんと減速できている。
2807 = "Kìm soát vé tuột khỏi tay rơi xuống. Nhưng tôi chẳng màng đến việc nhặt nó lên."
# monologue
# JP: いつもどおりのことがけれども、\n今は何より、頼もしい。
2825 = "「Ngài Soutetsu có thể—— chạm vào, và tự mình xác nhận được không ạ?」"
# monologue
# JP: （――いや）
2846 = "Cứ thế để em ấy dẫn dắt, tôi đặt tay lên ngực Hachiroku. Thật ấm áp. Thật mềm mại."
# monologue
# JP: いつもと違う。\nハチロクが\x%l喚呼;#00ffc040;喚呼%l;#;を合わせてくれない。
2402 = "Cơ thể tôi nóng ran lên. Nhịp đập mãnh liệt của chính tôi, dường như cũng truyền cả sang Hachiroku."
# monologue
# JP: 試されてるのか？　以前にもたしかこんなことが――\n湧き起こってきた雑念を、目と手への集中を戻し追い払う。
2433 = "「Thế này thì——khó mà biết được nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l階段;#00ffc040;階段%l;#;！」
1212 = "「Nếu vậy thì——」"
# monologue
# JP: 普段はしない細かな\x%l喚呼;#00ffc040;喚呼%l;#;を入れて意識を引き締め直し、\n減速度を徐々に弱めていく。
2580 = "Hachiroku nhìn chằm chằm vào tôi. Ánh mắt và cả bàn tay em ấy đều không hề rời đi."
# monologue
# JP: ……停止目標は、すぐそこだ。\nあとは、惰性で行けばいい。
1182 = "「Nếu vậy thì, xin ngài, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l自弁;#00ffc040;[じべん,1]自弁%l;#;――運転」
1208 = "「Về rồi nè!! Ủa? Anh hai, Hachiroku, hai người đi đâu rồi?」"
# monologue
# JP: 速度が、落ちる。落ちきっている。
2348 = "Là Nagi.\nĐược cứu rồi."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;はもう、\nホームを歩くポーレットより遅くなってる。
91 = "Vừa nghĩ vậy, tôi chợt thấy bối rối. Rốt cuộc, tôi đã được cứu khỏi cái gì cơ chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「――停車。停止目標、良し」
1214 = "「Hả? Anh hai——ưm——\nAnh trai, không có ở đây sao?」"
# monologue
# JP: ぴたりだ。\nしかし、ハチロクはまたも\x%l喚呼;#00ffc040;喚呼%l;#;をしない。
2344 = "「Hộc, hộc, hộc—— Thiệt tình, hai người——chạy nhanh——quá đi.」"
# monologue
# JP: ならばと自分で時計を確かめ、\x%l喚呼;#00ffc040;喚呼%l;#;する。
2624 = "「Chắc là ở trong nhà ga thôi. Họ bảo sẽ khảo sát chỗ đó mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[ちゃく]着、[ヒトハチマルマル,3]1800――定刻通り」
1551 = "「À ừ, trong nhà ga đây.\nBên này cũng vừa mới xong.」"
# monologue
# JP: どっと、安心感が湧く。
2455 = "Tôi cùng Hachiroku bước ra ngoài."
# monologue
# JP: 震えだしそうになる指をなんとか制御して、\n停車措置を終え――ようやく、ハチロクへ呼びかける。
2532 = "Hibiki, Kisaki, Nagi và Fukami."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。御一夜駅着だ。――定刻通りだ」
1527 = "Mặt ai nấy đều hơi lấm lem, nhưng lại nở những nụ cười rạng rỡ và đầy sức sống."
# 【ハチロク】
# display as 八六
# JP: 「ええ。……ええ。\nきちんと、わたくしは見ておりました」
1661 = "「Có vẻ như mọi người đã có một buổi khảo sát đầy ý nghĩa nhỉ.」"
# monologue
# JP: ぎゅっと目を閉じ、息を吸い込む。
2323 = "「Ý nghĩa lắm luôn! Cực kỳ vui luôn á!!」"
# monologue
# JP: そうして僕を見直す瞳は……\nいつもどおりの、落ち着いたものだ。
2690 = "「Thiệt tình bé Nagi này, người ta đâu có hỏi vui hay không đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「見事な運転でございました。双鉄様」
1773 = "「Không, sự thú vị cũng quan trọng lắm đấy. Anh Soutetsu. Có vẻ như nơi này có giá trị vượt xa dự đoán của tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だったら、よかった」
2019 = "Nói rồi, Kisaki nhìn Hibiki như muốn thúc giục."
# monologue
# JP: 今日はとにかく、早く帰って寝てしまいたい。\n体が、酷く疲れているし――
2266 = "Hibiki khẽ gật đầu, rồi ngước lên nhìn tôi bằng đôi mắt nũng nịu."
# monologue
# JP: （ああ、いや、そうか……）
2875 = "「Vậy nên, anh hai——à không, anh trai. Ưm, bọn em, nếu được thì.」"
# monologue
# JP: 疲労がきっと影響したのだ。
2697 = "À, lại vòi vĩnh rồi. Mà chắc chắn cũng chẳng phải chuyện gì tốt đẹp."
# monologue
# JP: でなければ、風雨の音や振動くらいで、\nこれほどまでに動揺するなど、ありえなかろう。
2252 = "Tôi và Hibiki là anh em mà, nên dư sức đoán được bằng trực giác."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、下りるぞ。\n\x%lタブレット;#00ffc040;タブレット%l;#;を換えてくれ」
1538 = "「Bọn em ngủ lại đây——để tiếp tục khảo sát, có được không ạ?」"
# 【ハチロク】
# display as 八六
# JP: 「あ――はい、\n左様、ですね」
1641 = "Uống ly cà phê sáng sớm, tôi kiểm tra lại lịch trình làm việc. Cái đầu còn ngái ngủ dần tỉnh táo lại, và tôi nhớ ra chuyện đó."
# monologue
# JP: \x%l運転体;#00ffc040;運転体%l;#;を\x%l乗務鞄;#00ffc040;乗務鞄%l;#;に大事にしまい、\nさて――と立っても、まだハチロクは立ち上がらない。
2555 = "「……Đã đến ngày mai rồi sao, cái lịch trình 4 vòng khứ hồi ấy.」"
# monologue
# JP: （む？）
2878 = "Sau khi hoàn thành chạy thử, \\x%l8620;#00ffc040;8620%l;#; đã trở lại hoạt động thương mại, và \\x%lキハ07;#00ffc040;KiHa 07%l;#; cũng bắt đầu đợt đại tu như đã định."
# monologue
# JP: \x%l運転体;#00ffc040;運転体%l;#;のときには気づかなかったが――
2427 = "Nhờ có Hibiki và Nagi luân phiên trực, mà mọi thứ mới bắt đầu xoay xở được."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、調子が優れないのか？」
1528 = "「Đại tu quả là một quyết định đúng đắn ngài nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「え？　いえ――あ、はい。\nそう……ですね」
1631 = "Trước câu nói đó của Hachiroku, tất nhiên tôi chỉ có thể gật đầu đồng tình."
# monologue
# JP: こっ――くり、と。\n頷きはいっそ緩慢だ。
2324 = "「Không ngờ lại phát hiện ra vết nứt trên trục truyền động cơ đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「やはり[じょし,1]助士抜きの体制ですと、[かんそう,1]換装が多くなりますから。\nその分、負荷が」
1871 = "「Thật may là phát hiện ra khi vết nứt còn nhỏ. Ngoài ra cũng không có lỗi nào nghiêm trọng nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば――ほら」
1835 = "Ngăn chặn được tai nạn, kéo dài tuổi thọ cho \\x%lキハ07;#00ffc040;KiHa 07%l;#;, đây quả thực là điều may mắn nhất."
# monologue
# JP: 手を差し伸べる。\nハチロクはゆるゆると僕の手を――っ！
2334 = "May mắn thì may mắn thật——nhưng tôi không ngờ thời gian sửa chữa kéo dài lại ảnh hưởng theo cách này."
# monologue
# JP: （なんだ――冷えきっているじゃないか）
2882 = "「Xin lỗi anh hai nha. Ngày mai, em phải đến trường rồi.」"
# monologue
# JP: 換装が多かった影響なのか、\nいつものハチロクのぬくもりをまるで感じない。
2591 = "Có lẽ suy nghĩ đã hiện rõ trên mặt tôi. Hibiki cầm miếng bánh mì trên tay, cất giọng đầy áy náy."
# monologue
# JP: だから握る手に力を込めて、\n僕から熱を、少しでも伝えようとする。
2598 = "Nhưng, Hibiki đâu có lỗi gì trong chuyện này."
# 【双鉄】
# display as 雙鐵
# JP: 「どうだ？　立てるか？」
1769 = "「Đâu phải chuyện cần xin lỗi. Bổn phận của học sinh là học hành mà.」"
# 【ハチロク】
# display as 八六
# JP: 「少し、休んでいただけですから。\n立つことくらいは、いくらでも」
1608 = "「Ư ư~」"
# monologue
# JP: （ゴン、ゴンっ）
2865 = "Khuôn mặt con bé nhăn nhó, như thể lỡ nuốt nhầm cục than mà Hachiroku hay ăn vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄君？　いいですか？」
2050 = "Nhìn biểu cảm đó, tôi hiểu là con bé tưởng mình đang bị thuyết giáo."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、今降りる」
1650 = "「Anh không bảo em phải học. Anh chỉ cảm thấy tình trạng hiện tại, khi quá phụ thuộc vào nhân công thời vụ như em và Nagi, là có vấn đề thôi.」"
# monologue
# JP: ポーレットも丁度、改札を終えたところらしい。
2676 = "Đến ngày tựu trường, thì ngay cả việc luân phiên trực cũng không thể thực hiện được nữa."
# monologue
# JP: ハチロクを立たせ先に降ろして、\n続いて僕もホームへ降りる。
2576 = "Nếu \\x%lキハ07;#00ffc040;KiHa 07%l;#; hoạt động thì chỉ cần 2 ca, nhưng kế hoạch hơi lệch đi một chút, là thành 4 ca trong tình trạng thiếu phụ lái."
# 【ポーレット】
# display as 波萊特
# JP: 「あれ？　キャブでもないんですか？」
1630 = "「Học kỳ mới bắt đầu, anh cũng khó mà nhờ vả hai đứa được. Quả nhiên là cần phải tuyển thêm phụ lái toàn thời gian thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「何がだ？」
1515 = "「A, chà, chắc là vậy rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「日々姫ちゃんたちです。\n\x%l客車;#00ffc040;客車%l;#;に乗ってなかったし――わぷっ！？」
1818 = "Hibiki khẽ ngước mắt lên nhìn dò xét."
# 【れいな】
# display as 玲奈
# JP: 「ふわわ、すごい雨と風ですぅ」
1624 = "「Chuyện học kỳ mới cũng vậy——mà xa hơn nữa. Sau khi tốt nghiệp, em cũng không biết mình sẽ ra sao.」"
# monologue
# JP: 確かにだ。
2724 = "「Không phải em định thi vào trường Mỹ thuật trên Đế đô sao?」"
# monologue
# JP: 屋根と\x%l8620;#00ffc040;8620%l;#;が防いでくれているにもかかわらず、\nその隙間から、突き刺すような雨が来る。
2303 = "「Thế cũng tốt…… nhưng thiết kế \\x%lトレインマーク;#00ffc040;biểu trưng tàu%l;#; cũng thú vị lắm. Nên em cũng đang nghĩ…… hay là tiếp tục học ở quê.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これはたまらん。転車を先にすませてしまおう。\n話はそのあと、レールショップで」
1998 = "「Ở quê á?」"
# 【ハチロク】
# display as 八六
# JP: 「ふぅ……タオル、ありがとうございます」
1622 = "「Vâng. Trong thành phố Kumamoto cũng có trường đại học có khoa Mỹ thuật mà. Đi \\x%lエアクラ;#00ffc040;Aircra%l;#; mất khoảng hai tiếng một chiều——nhưng cũng ráng đi về được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえいえ、乗務、お疲れ様です」
1633 = "「Ồ.」"
# monologue
# JP: レールショップへ戻ってポーレットの紅茶を飲めば、\n末端部からじわじわと、体温が戻ってくるようだ。
2536 = "Nếu là Hibiki của trước đây, chắc chắn con bé đã hỏi ý kiến tôi đủ thứ về định hướng tương lai rồi."
# 【ポーレット】
# display as 波萊特
# JP: 「それで……ええと、日々姫ちゃんたち――」
1808 = "Tự mình tìm hiểu, tự mình suy nghĩ—— Nhận ra con bé đã trưởng thành hơn, tôi thấy thật vui."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫と稀咲と、凪とふかみもだろう？」
1513 = "「Thôi, cứ đi con đường nào em muốn đi nhất ấy. Dù em có đi nơi khác, anh cũng sẽ xoay xở được thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうです」
1679 = "「……Cũng phải. Dù không có em, chuyện gì anh hai cũng giải quyết êm xuôi hết mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのメンツなら、外泊だ。\n学園の合宿所に泊まるということだ」
1712 = "「Hừm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「泊まるって――」
2008 = "Tôi vốn định nói lời cổ vũ, nhưng lại làm con bé buồn đi mất rồi."
# monologue
# JP: ポーレットの目が窓の外へと。
2678 = "Phải làm sao đây——tôi bối rối, chẳng tìm được từ ngữ nào thích hợp."
# monologue
# JP: 横殴りの雨はバチバチ、更に勢いを増している。\nガラスを割って室内にまで飛び込んできそうなほどに。
2614 = "「Dù sao thì, đó cũng là chuyện của tương lai xa. Cả việc thuê người mới, lẫn việc Hibiki tốt nghiệp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「許可をしたのは昨日の朝だったのだ。\nそのときの予報では、台風はまだ来ないはずだった」
1789 = "『「Đúng vậy.」\n「Vâng!」』"
# 【ハチロク】
# display as 八六
# JP: 「宝生稀咲様が、泊まりがけでの相談をご希望された\nとのことで――日々姫が、どうしてもと」
1688 = "Nhìn chúng tôi gật đầu đồng tình, Hachiroku mỉm cười hiền hòa."
# monologue
# JP: ……僕とハチロク、交互に事情を説明していく。
1187 = "Hachiroku dùng khăn ăn, nhẹ nhàng lau vụn than dính trên khóe miệng."
# monologue
# JP: が、現実にはこの天候だ。\n言葉はどうにも、言い訳じみたものとなる。
2286 = "「Thay vì lo lắng chuyện tương lai, hãy tập trung vào hiện tại. Ngài Soutetsu, trước mắt hãy hoàn thành tốt 4 ca trực ngày mai đã.」"
# 【ポーレット】
# display as 波萊特
# JP: 「まぁ、ここまで崩れちゃったら、\n泊まって、落ち着いてからの方が正解ですよね」
1473 = "「A, cái đó, chuyện ngày mai ấy mà——」"
# 【双鉄】
# display as 雙鐵
# JP: 「とは思うのだが――」
2042 = "Có lẽ Hibiki cũng giống như tôi, đều cảm thấy nhẹ nhõm."
# monologue
# JP: 話してるうち、不安が高まってきてしまった。
2778 = "Con bé nhanh chóng nương theo lời giải vây khéo léo của Hachiroku."
# monologue
# JP: 判断ミスをしたかもと、そんな気持ちもそこに混じって、\nどうにもそわそわ、落ち着かん。
2238 = "「Ngày mai á? Nếu được, em muốn ở lại trường buổi tối luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……とにかく様子を確認しよう。\n電話を貸してもらえるか？」
1242 = "「Cả buổi tối á?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、どうぞ。あ、学園の番号ってわかります？」
1870 = "「Ở khu nội trú của trường.\nEm ngủ lại được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまない」
1611 = "「Gì chứ, lại chuyện ngủ qua đêm à.」"
# monologue
# JP: ポーレットが渡してくれたメモの番号へかければすぐに、\n落ち着いた声の応答がある。
2530 = "「Tại anh có cho phép lần nào đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すみません。\n[ざいえんせい,2]在園生の、右田日々姫の兄ですが――」
1658 = "Hibiki phồng má lên. Trông có vẻ như đang làm nũng, nhưng ánh mắt lại rất nghiêm túc."
# monologue
# JP: この天候だ。
2689 = "「Chịu thôi. Cái mỏ than bỏ hoang Jutsusen đó đâu phải chỗ để ngủ lại.」"
# monologue
# JP: 問い合わせが他にも相次ぐのだろう、\n返答は極めて事務的であり、それゆえ素早く的確だ。
2607 = "「Thì đúng là hôm đó em nảy ra ý định đột xuất mà chưa chuẩn bị gì ……nhưng sau đó lập lại kế hoạch đàng hoàng rồi anh vẫn nói vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。合宿所に。ええ――\nそうですね、可能であれば話を――はい、すみません」
1666 = "「Chỗ đó quá nguy hiểm để học sinh tự cắm trại. Dù có trang bị hay kinh nghiệm thì cũng vậy thôi.」"
# monologue
# JP: 心配そうに僕を見ているハチロクたちに、\n安心しろと親指をたてる。
2534 = "Kế hoạch cắm trại do Nagi - một nữ hướng đạo sinh - đưa ra quả thực rất tuyệt vời."
# monologue
# JP: というか……いささか過保護すぎたか。\n何かあったら向こうから――――っと！
2775 = "Nhưng chị Mayami xem xong vẫn không cho phép, và tôi cũng chẳng thể nào bênh vực Hibiki được."
# 【双鉄】
# display as 雙鐵
# JP: 「もしもし――え？　あれ？」
1657 = "「Khu vực đó không chỉ \\x%lエアクラ;#00ffc040;Aircra%l;#; không vào được, mà sóng điện thoại cũng không có. Lỡ xảy ra chuyện gì thì chẳng ai hay biết đâu.」"
# monologue
# JP: 最初の応答と同じ声。\n無論、日々姫の声ではない。
2744 = "「Vậy, ở khu nội trú của trường thì được đúng không? Có sóng điện thoại, \\x%lエアクラ;#00ffc040;Aircra%l;#; cũng dùng được nữa.」"
# monologue
# JP: 嫌な予感がどんどん濃くなり――\nそうしてそれは、一瞬にして現実となる。
2549 = "Bị gài bẫy rồi sao——Tôi gần như phản xạ nghĩ vậy, và chính suy nghĩ đó khiến tôi nhận ra sự cố chấp của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「居ない、ですか？　日々姫が――\n稀咲も、凪も、ふかみも――四人……揃って」
1715 = "Việc phản đối chỉ vì muốn phản đối thật là ngu ngốc. Chuyện nào ra chuyện đó, phải tách biệt với trước đây để phán đoán."
# 【双鉄】
# display as 雙鐵
# JP: 「そうですか。はい――こちらも心当たりを全部――\nはい。何か分かり次第に、すぐにご連絡します」
1566 = "「Tại sao em lại cần ngủ lại khu nội trú của trường?」"
# monologue
# JP: （プツっ）
2887 = "「Để nghĩ ý tưởng. Về việc tái phát triển mỏ than Jutsusen. Em muốn cùng mọi người làm một trận cho ra trò.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様――」
2052 = "「Chuyện đó thì cứ làm vào ban ngà——A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「全滅だ。蓑笠さんのところも、早瀬さんのところも――\n宝生さんのところでも、心当たりが無いそうだ」
1972 = "Tôi vừa định nói thì nhận ra ngay, và quả nhiên Hibiki đã bổ sung thêm."
# 【ハチロク】
# display as 八六
# JP: 「そんなっ」
1768 = "「Ban ngày mọi người đều bận mà. Chỉ có buổi tối mới có thể tập trung lại bàn bạc kỹ lưỡng được thôi.」"
# monologue
# JP: （ガラっ！）
2876 = "「Buổi tối…… Nghe nói là sẽ nảy ra những ý tưởng mà bình thường không nghĩ tới được đấy ạ.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん！」
1739 = "Hachiroku nói với ánh mắt như đang nhìn về nơi xa xăm nào đó."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉っ」
1915 = "Hoặc có lẽ, đó là lời mà lái tàu Kiyomi đã nói với em ấy ngày xưa?"
# monologue
# JP: レールショップへ、息せききって駆け込んでくる。\n真闇姉には、無論、真っ先に電話していた。
2716 = "「Đúng rồi! Cũng có lý do đó nữa. Với lại bé Nagi hay nói mấy câu đột phá lắm, chị Kisaki cũng thấy thú vị nữa.」"
# monologue
# JP: 帰ってないかを聞くことと、もしも帰っていないなら、\n宝生元忠への連絡手段を教えてもらう、そのために。
2608 = "「Ừ. Quả thật Nagi và Kisaki có vẻ sẽ tạo ra phản ứng hóa học đấy.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、[じゅつせん,1]術仙炭鉱じゃなかと？」
1740 = "Nếu thêm vào đó góc nhìn của một họa sĩ như Hibiki, và ánh mắt luôn chăm chú vào một điểm của Fukami nữa thì……"
# 【双鉄】
# display as 雙鐵
# JP: 「それは僕も考えた。\nが、[ゆのい,1]湯医から徒歩でいけるような場所ではないし」
1779 = "「Anh cũng thấy thú vị đấy——nhưng mà…… Phương án tái phát triển hiện tại vẫn chưa đủ sao?」"
# 【真闇】
# display as 真闇
# JP: 「歩き以外は？」
1722 = "Vừa bảo tồn SL ở trạng thái bán động, vừa kế thừa kỹ thuật bảo dưỡng cải tạo, đồng thời xây dựng cơ sở tham quan du lịch như một bảo tàng SL."
# monologue
# JP: 言いながら、真闇姉が地図を広げてくれる。
2714 = "Với tôi, đó có vẻ là một phương án rất thông minh, nhưng……"
# monologue
# JP: これは……何十年か前の地図。\n術仙炭鉱が、まだ現役だったころの地図のようだ。
2802 = "「Chị Kisaki bảo là vẫn còn thiếu một cú hích nữa.」"
# 【真闇】
# display as 真闇
# JP: 「例えば、ぎりぎりまで\x%lエアクラ;#00ffc040;エアクラ%l;#;で行ってからとか」
1478 = "「Một cú hích nữa…… sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、ナビと\x%l共感;#00ffc040;共感%l;#;をつなげるか」
1530 = "「Phải làm sao để họ muốn tham gia, chứ không phải là tham gia cũng được. Để đạt đến mức độ đó thì vẫn chưa đủ.」"
# 【ハチロク】
# display as 八六
# JP: 「はい――繋ぎます。え？　ああ！」
1823 = "「Ý là cần một cú hích về mặt PR sao.」"
# monologue
# JP: 僕が指示するより先に、\nハチロクの手がペンを取り――
2588 = "「Không chỉ vậy đâu, chị Kisaki bảo về mặt vốn cũng cần nữa.」"
# 【真闇】
# display as 真闇
# JP: 「コピーやけん。直接書きこんじゃってよかよ」
1999 = "Nhắc đến tiền vốn thì đúng là đau đầu thật."
# monologue
# JP: ――真闇姉の言葉と同時、地図に引かれていったラインが、やがて大きな範囲を区切る。
1173 = "Vì chi phí sửa chữa liên tục, mà đến giờ chúng tôi vẫn chưa thể tăng cường thêm phụ lái toàn thời gian."
# monologue
# JP: ナビが持っている\x%lエアクラ;#00ffc040;エアクラ%l;#;侵入禁止区域のデータ。\nそれをハチロクが、地図上に再現してくれたのだ。
2310 = "「À thì…… đúng vậy. Ngay cả chi phí ban đầu, chỉ dựa vào chúng ta thì chắc chắn không kham nổi rồi.」"
# 【真闇】
# display as 真闇
# JP: 「こぎゃん広かと？」
2002 = "Hạn mức cho vay ở cấp chi nhánh thì không thể nào đủ được. Phải cần đến khoản vay do Houshou Mototada quyết định, hoặc sự tham gia góp vốn của các công ty đường sắt."
# 【双鉄】
# display as 雙鐵
# JP: 「うん、御一夜側からなら、線路沿いのここ――」
1675 = "Hay là kêu gọi quyên góp từ người dân và người hâm mộ đường sắt, dù huy động vốn bằng cách nào đi chăng nữa………… Ra là vậy, hiểu rồi."
# monologue
# JP: 進入禁止区域の一端、\nナビが最初に不時着をした地点を指し示す。
2564 = "「Anh hiểu rồi. Những ý tưởng mang tính đột phá sẽ có khả năng cải thiện cả tính sinh lời nữa nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ここから、線路沿いに二キロも歩けば術仙炭鉱近辺に\n到着できるが、湯医側から歩くとなると……」
1763 = "「Vậy thì! Tụi em ngủ lại được chứ?」"
# 【真闇】
# display as 真闇
# JP: 「一番近くて……六キロくらい？」
1849 = "「Thôi được, nếu là khu nội trú của trường thì chắc không sao. Dù vậy, cũng phải xin phép chị Mayami nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「歩けぬ距離ではなかろうが……\n四人全員、きちんと登園はしたとのことなのだ」
2041 = "「Chị hai cho phép rồi!\nChỉ cần anh hai ok là ok.」"
# monologue
# JP: 四人の中では最上級の稀咲のクラスの、\n全カリキュラムが終わるのが午後の二時。
2432 = "「Chuẩn bị kỹ càng gớm nhỉ. Hachiroku, em có ý kiến gì không?」"
# monologue
# JP: それから\x%lエアクラ;#00ffc040;エアクラ%l;#;を手配して、\n進入禁止区域ギリギリにまで移動したとして――
2289 = "「Để xem nào——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、タクシー会社に問い合わせてみよう。\n自宅からの送迎がなかったことは確認している」
1930 = "Ánh mắt Hachiroku,\nrơi xuống tờ báo đặt trên bàn."
# 【ポーレット】
# display as 波萊特
# JP: 「それはわたしが」
1782 = "「Nếu ngủ lại đêm mai, và sáng mốt về thì chắc không sao đâu nhỉ?」"
# monologue
# JP: すぐにポーレットが受話器を掴む。\nならばそちらは任せるとして――
2679 = "「À, dự báo thời tiết sao.」"
# 【真闇】
# display as 真闇
# JP: 「ナビが頼まれたってことはなかと？」
1714 = "Vì cũng đang để ý chuyện đó nên tôi hiểu ngay."
# monologue
# JP: ちら、と真闇姉はハチロクを見る。
2717 = "「Vẫn còn ở Tây Nam Okinawa mà nhỉ? Dù có đổ bộ vào Kyushu, thì cũng phải tầm nửa đêm ngày mốt cơ.」"
# monologue
# JP: ハチロクはすぐに遠い目をして、\nそれからゆっくり首を振る。
2623 = "「Lỡ bão có tới cũng hổng sao đâu. Khu nội trú mới hơn nhà mình nhiều.」"
# 【ハチロク】
# display as 八六
# JP: 「ナビは、ずっと双鉄様のフォローをしていたそうです。\n誰も乗せてもいないし、何も頼まれてもいないと」
2071 = "「Hahaha, có lý. Vậy thì được. Ngày mai đi cẩn thận đấy.」"
# 【真闇】
# display as 真闇
# JP: 「やったら、他は……\n\x%lエアクラ;#00ffc040;エアクラ%l;#;以外で――」
2022 = "「Em rất mong chờ mọi người sẽ nghĩ ra những ý tưởng hay ho đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――いや、そうか。“\x%lエアクラ;#00ffc040;エアクラ%l;#;以外”か」
1218 = "「Cảm ơn nha! Anh hai, Hachiroku!」"
# monologue
# JP: （ガラっ）
2877 = "「Nhưng, trước đó đã.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「双鉄君。凪が、ご迷惑ばかけまして」
2051 = "Hôm nay có khách đoàn đi thuyền trên sông Kuma, nên Nagi xin nghỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠さん、丁度よかった！」
1953 = "Ca trực cố định chỉ có tôi làm \\x%l機関士;#00ffc040;lái tàu%l;#;, Hibiki làm phụ lái, chúng tôi không còn cách nào khác ngoài việc cố gắng hoàn thành 4 vòng khứ hồi, gồm 2 chuyến đi lại hàng ngày và 2 chuyến tham quan."
# 【蓑笠】
# display as 蓑笠
# JP: 「っ！！？」
2068 = "「Anh biết là việc \\x%l投炭;#00ffc040;xúc than%l;#; sẽ vất vả lắm…… Nhưng xin lỗi nhé, hôm nay em cố gắng lên nha.」"
# monologue
# JP: レールショップに来るやいなやで、\n深々と下げかけていた頭が、ぎくりと止まる。
2760 = "「Vâng!」"
# 【双鉄】
# display as 雙鐵
# JP: 「凪は今日、キャンプ道具を持ってでかけましたか？」
1489 = "Một nụ cười tươi rói đến không ngờ. Không chỉ vậy, con bé còn làm động tác quyết tâm nữa."
# 【蓑笠】
# display as 蓑笠
# JP: 「今日ですか？　今日は普通の通学鞄ば――」
1491 = "「Cứ mong chờ đi! Để ngày mai anh hai được nhàn nhã, em sẽ bàn giao một cái \\x%lカマ;#00ffc040;lò hơi%l;#; hoàn hảo nhất cho coi!」"
# monologue
# JP: そこまでいって。\nああ――と蓑笠さんが小さく呻く。
2279 = "「Ơ kìa?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「いや、何日か前に『お泊りの準備ばする』いうて、\n寝袋だなんだ持ちだして……持ち帰ってきとりませんが」
1474 = "Một giọng nói lo lắng."
# 【双鉄】
# display as 雙鐵
# JP: 「そうですか」
1843 = "Hướng mắt về phía ghế \\x%l機関士;#00ffc040;lái tàu%l;#;, Hachiroku dời ánh nhìn đang chằm chằm vào bầu trời sang tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「湯医近辺のタクシー会社さん。日々姫ちゃんたち、\n四人でも別々にでも、乗ってないみたいです」
1784 = "「Xin lỗi, ngài Soutetsu.\nNgài có rảnh không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。それではすまんが、\n[せき]堰さんにかけてくれんか？」
1976 = "「Không sao.」"
# 【真闇】
# display as 真闇
# JP: 「ああ！」
1646 = "Trái lại tôi còn thấy vui nữa là đằng khác. Đơn giản là vì có thể buông chiếc xẻng xúc than ra."
# monologue
# JP: 真闇姉にも通じたようだ。
2698 = "Vòng khứ hồi thứ 4, cuối cùng cũng là chuyến về. Từ nãy đến giờ, tôi đã ném vào lò bao nhiêu than rồi không biết——"
# monologue
# JP: 真闇姉が確認している地図上の――川のラインと、\n術仙炭鉱廃駅とでは、ものの一キロも離れていない。
2438 = "「Xin ngài giúp em một chút thôi ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。はい――え！？　そうなんですか？\nはい！　わかりました。ありがとうございます！」
1825 = "Theo lời yêu cầu, tôi cử động cánh tay nặng trĩu tê rần, đặt tay lên tay cầm \\x%l自弁;#00ffc040;van hãm tự động%l;#;."
# monologue
# JP: 興奮した声。\n勢いも良く受話器が置かれる。
2677 = "Thấy vậy, Hachiroku tháo \\x%lタブレット;#00ffc040;thẻ bảng%l;#; ra và chuyển sang \\x%l運転体;#00ffc040;thân điều khiển%l;#;."
# 【ポーレット】
# display as 波萊特
# JP: 「堰さん、今、[ゆのい,1]湯医の発船所なんだそうです。\n台風で流されないよう、舟、あげておくため。それで」
1699 = "「A, quả nhiên là——\nSắp mưa rồi đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「舟が一[そう]艘――足りないのだな？」
1907 = "Chỉ một câu đó, tôi đã hiểu lý do em ấy đổi sang \\x%l運転体;#00ffc040;thân điều khiển%l;#; có cảm biến tốt hơn."
# 【ポーレット】
# display as 波萊特
# JP: 「はい。そうおっしゃってました」
1839 = "「Áp suất không khí à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば四人は、川を下って術仙炭鉱近辺に\n向かった可能性が高い」
1910 = "「Vâng.\nA——Ngài xem, mắt thường cũng thấy mây đen kìa.」"
# monologue
# JP: 昨日の凪は助士を休んで、\nふかみとともにクマ川下りで団体客の相手をしていた。
2640 = "「Đúng thật.\n……Đến sớm hơn dự báo nhiều nhỉ.」"
# monologue
# JP: あのふたりなら、「川をつかえばすぐ炭鉱」と、\nとっくに気づいていたのだろうし――
2431 = "「Vâng ạ. Gió khó chịu quá.」"
# 【ポーレット】
# display as 波萊特
# JP: 「炭鉱……は、キャンプ。危ないですよね。\nもしも、暖を取りたくて火とか使っちゃったら」
1571 = "Hachiroku lập tức chuyển \\x%lタブレット;#00ffc040;thẻ bảng%l;#; về lại \\x%l整備体;#00ffc040;thân chính%l;#;. Vậy thì tôi chỉ còn cách cầm xẻng lên lại thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2066 = "「！」" 
# monologue
# JP: ポーレットの指摘を受けて、背筋が伸びる。
2741 = "Cho đến khi gần tới ga Ohitoyo và ngừng cấp than để chuẩn bị vào ga——đây là sự phân công tốt nhất rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。\nガスと当たってしまえば――最悪爆発だ」
1830 = "「……Có vẻ như không cầm cự được đến lúc về ga Ohitoyo rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「爆発って――」
1894 = "「Đúng vậy. Trông cứ như……」"
# 【れいな】
# display as 玲奈
# JP: 「炭鉱内には、ガスが発生しやすいんですよぉ。\n工具とかも、火花が出ないものを使うくらいですからぁ」
1893 = "Chắc do mệt mỏi, than ném vào không tản ra đều được."
# 【真闇】
# display as 真闇
# JP: 「……旧宿舎群に泊まるとしても、危なかとよ。\nあそこ、いつ倒壊してもおかしくなか建物もあるばい」
1231 = "Chỉ là một sự cố nhỏ. Một ảo giác do sự non nớt của tôi tạo ra——"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、双鉄様！　すぐ向かいましょう」
2054 = "「Cứ như thể khói của \\x%l8620;#00ffc040;8620%l;#; đang biến thành mây mưa vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしたいのはやまやまだが、手がかりも無しの捜索は\nどれほどの時間がかかってしまうかわからない」
2044 = "Từng cuộn khói cuồn cuộn hòa vào mây. Trôi đi rất nhanh. Đến mức dị thường."
# 【ポーレット】
# display as 波萊特
# JP: 「今、稼働できる車輌が[ハチロクニイマル,3]8620しかありませんから」
1903 = "Bầu trời mới nãy còn nhuộm màu hoàng hôn tuyệt đẹp, chỉ trong chớp mắt đã bị bao phủ bởi một màu đen đặc xịt."
# 【ハチロク】
# display as 八六
# JP: 「あ――」
1638 = "「A……」"
# monologue
# JP: 術仙炭鉱近辺に入ってしまえば、連絡の手段が途絶する。
2444 = "Bắt đầu rơi rồi. Chưa kịp nghĩ xong, mưa đã trút xuống xối xả, gió tạt ngang dữ dội."
# monologue
# JP: やみくもな捜索で人員と移動手段とが拘束されれば、\n捜索時間の間、他を完全に空白にしてしまうこととなる。
2448 = "（Lộp độp lộp độp）"
# 【双鉄】
# display as 雙鐵
# JP: 「推測だけでは動き辛い。\n最もつかみやすい手がかりは…………舟か」
1861 = "Tầm nhìn trở nên cực kỳ tồi tệ. Tiếng mưa lấn át cả tiếng nói."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、ナビが。飛行禁止区域外の川沿いを」
2056 = "Nhưng——chỉ một chút nữa là đến ga Ohitoyo rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ダメだ。飛ぶな。命令だ」
1467 = "「Ngài Soutetsu.」"
# monologue
# JP: 上空からの捜索は確かに効果が高かろうが、\nこの悪天候――見落としどころか二次災害の危険もある。
2826 = "「Ừm.」"
# monologue
# JP: ここは時間がかかっても、\n確実性の少しでも高い手段を取らねばならない。
2685 = "Tôi ném thêm một lớp than dày hơn chút, điều chỉnh thông gió \\x%l煙室;#00ffc040;buồng khói%l;#; và bơm nước lò hơi xong xuôi, rồi tiến về ghế \\x%l機関士;#00ffc040;lái tàu%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「舟をあげるなら――[せき]堰さんは湯医に、\nガソリンエンジン車で向かっているのだよな？」
1810 = "Thấy vậy, Hachiroku đổi \\x%lタブレット;#00ffc040;thẻ bảng%l;#;, trở lại \\x%l運転体;#00ffc040;thân điều khiển%l;#; và cất giọng nghiêm túc."
# monologue
# JP: 問うた途端に、ポーレットは受話器をひっつかむ。
2529 = "「Gió tạt ngang, lại mới bắt đầu mưa. Xin ngài hãy thao tác thật nhanh và nhẹ nhàng.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい！　お願いしてみます」
1718 = "「Ừ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「術仙炭鉱近辺の上陸可能地点に、舟があるかないかだけ。\nその一点だけ確認し、報告して欲しいとお願いしてくれ」
1973 = "Giai đoạn đòi hỏi sự chú ý cao độ nhất, không phải là lúc mưa ướt sũng, mà là lúc vừa mới bắt đầu mưa."
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
1797 = "Những dị vật nhỏ bám trên đường ray sẽ nổi lên, làm giảm \\x%l粘着力;#00ffc040;lực bám đường%l;#; một cách đáng kể——!?"
# 【れいな】
# display as 玲奈
# JP: 「れいなも、お願いしてくるですねぇ」
1901 = "（Khục）"
# 【双鉄】
# display as 雙鐵
# JP: 「！？」
2069 = "（Thịch）"
# monologue
# JP: いきなり、れいなが雨も構わずドアの外へと――
2728 = "「!!!」"
# 【コン】
# display as 空
# JP: 「ケン！」
1618 = "Nỗi sợ hãi ập đến trong chốc lát. Rõ ràng tôi đã rũ bỏ được, đã dọn dẹp sạch sẽ rồi cơ mà."
# 【れいな】
# display as 玲奈
# JP: 「コンちゃん、通訳お願いするですぅ」
1738 = "Chỉ là cán qua một viên sỏi hay dị vật gì đó thôi—— Vậy mà toàn thân tôi như đông cứng lại."
# 【コン】
# display as 空
# JP: 「ケンっ！」
# 1618 = "「吭！」" 
# monologue
# JP: れいなの思惑がわかった気がする。\nが、この風雨の中、果たして雀が飛べるだろうか？
2539 = "（Không sao đâu. Không sao——Bình tĩnh lại, phải bình tĩnh lại.）"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「聞きました。手伝えることがあればいってください」
1799 = "Tiếng gió gào thét.\nMùi than cháy——mùi khét lẹt."
# monologue
# JP: れいなと入れ替わるようにして、\n赤井宮司と住職と住職夫人が駆け込んでくる。
2684 = "Bị kích thích, ký ức bắt đầu làm nhiễu loạn sự tập trung của tôi. Ngày hôm đó đang mờ ảo hiện ra, hòa lẫn vào lúc này, và nơi đây."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「とりあえずは、[うじこ,1]氏子さんたちの連絡網で、\n情報を集めてもらっています」
1935 = "（Không dễ gì…… buông tha cho mình sao.）"
# 【雲山】
# display as 雲山
# JP: 「こっちもだ。檀家の連中がほうぼう聞きまわってる」
2001 = "Tôi nuốt cơn buồn nôn xuống, và theo phản xạ, tôi thở hắt ra."
# 【永山】
# display as 永山
# JP: 「炊き出し、おにぎりとお味噌汁用意するから」
1790 = "……Chỉ có thể thở ra những hơi ngắn và mỏng manh. Mồ hôi túa ra đầm đìa."
# 【双鉄】
# display as 雙鐵
# JP: 「みなさん――ありがとうございます」
2059 = "「Ngài…… Soutetsu.」"
# monologue
# JP: （♪～）　
2862 = "「!」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「と、私ですね。失礼」
1652 = "Giọng nói của Hachiroku giúp tầm nhìn của tôi mở rộng ra."
# monologue
# JP: 電話がひっきりなしに鳴る。\n見知った顔、見知らぬ顔――続々、人が集まってくる。
2834 = "Không được——Cánh tay, thế này,\ncăng cứng thế này thì——"
# monologue
# JP: 手伝うと言ってくれている人たちの中心に真闇姉が立ち、\n分担を、テキパキと決めていってくれる。
2719 = "「Ngài…… không sao chứ ạ?\nSắc mặt ngài——」"
# monologue
# JP: （ああ……これこそが御一夜だ）
2873 = "「Không sao, chỉ hơi căng thẳng chút thôi.」"
# monologue
# JP: 工場誘致賛成派も反対派も無い。\n地域の危機には、手を取り合って、繋がれる。
2254 = "Dùng sức nhiều thế này, thì không thể nào hãm phanh êm ái được."
# monologue
# JP: （御一夜は、人の繋がりの町なんだ――）
2885 = "Bóp. Nhả.——Trong tích tắc, tôi xòe các ngón tay ra rồi nắm lại."
# monologue
# JP: この繋がりに頼れるのなら、ここから先は。
2383 = "（A…… Thật sự không sao mà.）"
# monologue
# JP: 僕は、僕らは――\n僕らにしか出来ないことを行えばいい。
2509 = "Cơ thể tôi vẫn cử động được. Những bài huấn luyện lặp đi lặp lại đã giúp cơ thể tự động phản xạ mà không cần ý thức."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉、ポーレット。しばらく頼む。\n僕らはいつでも出られるように、整えておく」
1917 = "Cơ thể tôi cử động, giống như mọi khi. Cứ làm như mọi khi là được——"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
# 1797 = "「我知道了」" 
# 【真闇】
# display as 真闇
# JP: 「任せて、双ちゃん」
1565 = "「Cứ giao cho chị, Sou-chan.」"
# monologue
# JP: 頼もしい。
2705 = "Thật đáng tin cậy."
# monologue
# JP: 後顧に、なんの憂いも無い。\nまっすぐ、前だけ向けばいい！
2542 = "Không còn gì phải lo lắng ở hậu phương nữa. Giờ chỉ việc hướng thẳng về phía trước thôi!"
# 【双鉄】
# display as 雙鐵
# JP: 「いくぞ、ハチロク」
1541 = "「Đi thôi, Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「はいっ！」
1844 = "「Vâng!」"
# monologue
# JP: ……\x%lカマ;#00ffc040;カマ%l;#;を整え、本線に出て、\n発車準備を終えてしまえば、あとは連絡を待つしか無い。
1189 = "……Sửa soạn \\x%lカマ;#00ffc040;lò hơi%l;#;, tiến ra đường chính, chuẩn bị xuất phát xong xuôi, giờ chỉ còn biết chờ liên lạc."
# monologue
# JP: レールショップにいったん戻って――
2305 = "Tạm thời quay lại cửa hàng đường sắt đã——"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、お気付きになられましたか？」
2055 = "「Ngài Soutetsu, ngài có để ý thấy không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1671 = "「嗯」" 
# monologue
# JP: ――思った矢先のハチロクの問い。\n僕も気づいて、気になっていた。
1172 = "——Vừa nghĩ vậy thì Hachiroku cất tiếng hỏi. Tôi cũng nhận ra và đang thắc mắc đây."
# 【双鉄】
# display as 雙鐵
# JP: 「雀だよな。\nただの一羽も見かけない」
1517 = "「Bầy chim sẻ nhỉ.\nChẳng thấy bóng dáng con nào cả.」"
# 【ハチロク】
# display as 八六
# JP: 「探しに……飛んで出てくれたのでしょうか？」
2058 = "「Có khi nào…… chúng bay đi tìm mọi người rồi không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「これだけ煙を焚いているのに、来なかったのだ。\n……そうであって欲しいと思うよ」
1554 = "「Khói tỏa ra nhiều thế này mà chúng không tới. ……Anh cũng mong là vậy.」"
# monologue
# JP: この風雨の中、雀の小さな翼が果たして、\n飛べるものかも怪しく思うが――
2827 = "Trong cơn mưa to gió lớn này, đôi cánh nhỏ bé của chim sẻ liệu có bay nổi không, tôi cũng hơi nghi ngờ——"
# 【双鉄】
# display as 雙鐵
# JP: 「猫の手でも雀の羽でも、借りられるならありがたい。\n少しでも、有力な情報が得られれば……」
1615 = "「Bây giờ dù là tay mèo hay cánh sẻ, có gì nhờ nấy cũng đáng quý. Chỉ cần có được chút thông tin hữu ích nào đó……」"
# monologue
# JP: 手は尽くしている。\n待つしか無い。
2524 = "Mọi cách đều đã làm rồi. Giờ chỉ còn biết chờ đợi thôi."
# monologue
# JP: 今日の乗務の疲労も根深く巣食っているし、\n動き出すそのときのため、備えをしておく他に無い。
2669 = "Sự mệt mỏi từ ca trực hôm nay vẫn còn bám rễ sâu, tôi phải chuẩn bị sẵn sàng cho lúc cần xuất phát."
# 【ハチロク】
# display as 八六
# JP: 「そこまで、術仙炭鉱の夜を見たかったのでしょうか？」
1713 = "「Bọn họ muốn xem đêm ở mỏ than Jutsusen đến mức đó sao?」"
# monologue
# JP: ハチロクが重ねてきた問いに、\n言外の意味も感じてしまう。
2552 = "Câu hỏi dồn dập của Hachiroku, làm tôi cảm nhận được cả những ẩn ý bên trong."
# monologue
# JP: それもまた、少しは気になっていたことだから。
2518 = "Vì đó cũng là điều tôi hơi bận tâm."
# 【双鉄】
# display as 雙鐵
# JP: 「どうなのだろうな。\n計画的に……日々姫が僕を騙すものとも思えんが」
1971 = "「Ai mà biết được. Tôi không nghĩ là Hibiki lại lên kế hoạch…… lừa dối tôi đâu.」"
# monologue
# JP: というか、日々姫にそんな器用な芸当はできんだろう。
2507 = "Hay nói đúng hơn, Hibiki làm gì có đủ mưu mô để bày ra trò đó."
# monologue
# JP: 今日もにこにこ、\n混じりけの無い笑顔で家を出て行ったのだし。
2424 = "Hôm nay con bé cũng mỉm cười, một nụ cười hồn nhiên, vô tư khi ra khỏi nhà mà."
# 【双鉄】
# display as 雙鐵
# JP: 「いつもと違う荷物も、スポーツバッグ一つだけだ。\nあれでは、着替えを入れるくらいがせいぜいだろうさ」
1637 = "「Hành lý mang theo cũng chỉ có mỗi một cái túi thể thao khác ngày thường. Chừng đó chắc chỉ nhét vừa vài bộ đồ thay thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、宝生稀咲様か、凪様かが主導で？」
2020 = "「Vậy thì, là do cô Houshou Kisaki, hay là Nagi chủ mưu ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲が主導は、あるかもしれんな」
1969 = "「Kisaki chủ mưu thì cũng có khả năng đấy.」"
# monologue
# JP: 日々姫ひとりだけでなく、\n凪もふかみも、すっかりなついているようだった。
2687 = "Không chỉ riêng Hibiki, mà cả Nagi và Fukami có vẻ cũng rất quấn quýt với cô ấy."
# monologue
# JP: 稀咲が『どうかな？』と切り出せば、\n誰も反対しないだろう。
2758 = "Nếu Kisaki ngỏ lời \"Thấy sao?\", chắc sẽ chẳng ai phản đối đâu."
# 【双鉄】
# display as 雙鐵
# JP: 「が、ただ単純に話し合いでアイディアが出ず、\n突発的に、実地を見てみようとなったのかもしれん」
1500 = "「Nhưng, có khi chỉ đơn giản là bàn mãi không ra ý tưởng, nên mới đột nhiên nảy ra ý định đi xem thực tế cũng nên.」"
# monologue
# JP: 凪は凪で、常識で計れん類の人間だ。
2688 = "Bản thân Nagi cũng là kiểu người không thể đo lường bằng lẽ thường mà."
# monologue
# JP: 寝袋うんぬんという話も、\n単純にどこかに置き忘れているだけかもしれんし――
2720 = "Còn chuyện túi ngủ gì đó, có khi chỉ đơn giản là để quên ở đâu đó thôi——"
# 【れいな】
# display as 玲奈
# JP: 「[かとうすずめ,2]加東雀さん、もどってきましたぁ！」
1558 = "「Bạn Kato Suzume về rồi nè!」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2066 = "「！」" 
# 【ハチロク】
# display as 八六
# JP: 「どうでした！？」
1932 = "「Thế nào rồi!?」"
# monologue
# JP: 転がるようにホームに下りれば、\nれいなはコンと、ずぶ濡れの加東雀を従えている。
2551 = "Tôi lao xuống sân ga như lăn, thấy Reina đi cùng Kuu và Kato Suzume đang ướt sũng."
# 【雀】
# display as 加藤雀
# JP: 「ちゅんく！　ちゅんっ！！」
1656 = "「Chun! Chun!!」"
# 【コン】
# display as 空
# JP: 「ケンっ！　ケンっ！」
1619 = "「Keng! Keng!」"
# 【れいな】
# display as 玲奈
# JP: 「ええと……いなかったそうなんですぅ。\n廃炭鉱の中にも、宿舎あとにも」
1664 = "「Ưm…… bạn ấy bảo là không có ai ạ. Cả trong mỏ than bỏ hoang lẫn khu ký túc xá cũ.」"
# 【ハチロク】
# display as 八六
# JP: 「いなかった！！？」
2025 = "「Không có ai!!?」"
# monologue
# JP: ハチロクが、迷う瞳で僕を見る。
2315 = "Hachiroku nhìn tôi với ánh mắt hoang mang."
# monologue
# JP: その報告を信じるべきか。\n信じるべきなら、他にどこを探せばいいのか――
2554 = "Có nên tin báo cáo này không. Nếu tin thì phải đi tìm ở đâu khác nữa đây——"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……いや、そうか」
1644 = "「A…… Không, ra là vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2057 = "「Ngài Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「コンも加東雀もありがとう。れいな、支払いは僕がする。\n一番上等の油揚げと、パンとを盛大に振る舞ってくれ」
1929 = "「Cảm ơn Kuu và Kato Suzume nhé. Reina, anh sẽ trả tiền. Em hãy đãi tụi nó đậu phụ rán loại thượng hạng và bánh mì thật thịnh soạn vào nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「あぶらげとパン、了解ですよぉ」
1881 = "「Đậu phụ rán và bánh mì, rõ rồi ạ nha~」"
# 【コン】
# display as 空
# JP: 「ケンっ！」
# 1618 = "「吭！」" 
# 【雀】
# display as 加藤雀
# JP: 「ちゅんくっ！」
1655 = "「Chun!」"
# monologue
# JP: 加東雀につらなりぞろぞろ、\n真っ黒な濡れ雀たちがれいなの後を追っていく。
2241 = "Từng bầy chim sẻ ướt sũng đen ngòm, nối đuôi Kato Suzume lạch bạch chạy theo sau Reina."
# monologue
# JP: 予想以上の物量作戦――虱ではなく、雀つぶしで、\n廃炭鉱内と宿舎跡とを捜索してくれていたのだろう。
2706 = "Chiến thuật huy động lực lượng vượt ngoài sức tưởng tượng——không phải mò kim đáy bể, mà là rải chim sẻ tìm kiếm, chắc tụi nó đã lùng sục khắp trong mỏ than và khu ký túc xá cũ rồi."
# 【ハチロク】
# display as 八六
# JP: 「れいなが話せているとして……それでもどうでしょう？\n雀はもちろん、鳥目でしょうし」
2045 = "「Cho dù Reina có thể nói chuyện được…… nhưng như vậy thì sao ạ? Chim sẻ tất nhiên là mắt kém vào ban đêm rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だとしても、いたのであれば気配があろう。\n雀は臆病な鳥だから、気配にはむしろ敏感だろうし」
1752 = "「Dù vậy, nếu có người ở đó thì phải có tiếng động chứ. Chim sẻ vốn nhát gan, nên chắc chắn chúng rất nhạy cảm với tiếng động.」"
# 【ハチロク】
# display as 八六
# JP: 「けれど――\nもしもそうなら、日々姫たちはいったいどこへ」
1498 = "「Nhưng mà—— Nếu vậy thì nhóm Hibiki rốt cuộc đang ở đâu?」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん！　[せき]堰さんから電話ありました！\n舟、炭鉱近くの川岸にあげてあったそうです」
2049 = "「Anh Soutetsu! Chú Seki gọi điện tới! Bảo là thấy thuyền được kéo lên bờ sông gần mỏ than rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「やはりか！」
1857 = "「Quả nhiên là vậy!」"
# monologue
# JP: ならば、これで間違いあるまい。\nなにせ、あの宝生稀咲だ。
2815 = "Nếu vậy thì không sai vào đâu được. Dù sao người đi cùng cũng là Houshou Kisaki cơ mà."
# monologue
# JP: ここまでの調査で、炭鉱内も宿舎跡も、\n宿泊するには危険な場所と、もちろん理解している筈だ。
2733 = "Qua những lần khảo sát trước, cô ấy chắc chắn phải hiểu rõ việc ngủ lại trong mỏ than hay khu ký túc xá cũ nguy hiểm đến mức nào."
# 【ハチロク】
# display as 八六
# JP: 「きゃっ！？」
1620 = "「Á!?」"
# monologue
# JP: ハチロクをキャブに引っ張り上げる。\nすぐさま、\x%l乗務鞄;#00ffc040;乗務鞄%l;#;をあける。
2559 = "Tôi kéo Hachiroku lên buồng lái. Ngay lập tức, mở \\x%l乗務鞄;#00ffc040;túi phi hành đoàn%l;#; ra."
# 【双鉄】
# display as 雙鐵
# JP: 「出るぞ、ハチロク。準備をしてくれ」
1540 = "「Khởi hành thôi, Hachiroku. Chuẩn bị đi.」"
# 【ハチロク】
# display as 八六
# JP: 「出るって、どこへでございますか？」
1547 = "「Khởi hành, là đi đâu cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、日々姫たちを迎えにだ」
1906 = "「Tất nhiên là đi đón nhóm Hibiki rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんっ」
2048 = "「Anh Soutetsu.」"
# monologue
# JP: ポーレットの声。
2578 = "Tiếng của Paulette."
# monologue
# JP: キャブの窓から首を出せば、\n青い瞳がまっすぐ僕を見上げている。
2612 = "Thò đầu ra khỏi cửa sổ buồng lái, đôi mắt xanh thẳm đang nhìn thẳng lên tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「わかったんですか？\n日々姫ちゃんたちがどこにいるか」
1511 = "「Anh biết rồi sao?\nNhóm bé Hibiki đang ở đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、多分――\nいや、かなりの確度があるとは思う」
1676 = "「Ừ, có lẽ——\nÀ không, tôi khá chắc chắn đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですか！　じゃ、わたし助士で入りましょうか？\nあと、捜索に人員がいるなら\x%l客車;#00ffc040;客車%l;#;つなげて」
1836 = "「Vậy sao! Thế để tôi làm phụ lái nhé? Với lại, nếu cần người tìm kiếm thì cứ nối thêm \\x%l客車;#00ffc040;toa hành khách%l;#; vào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――僕の予想が正しければ、捜索は一瞬で済む。\n空振りの場合でも、すぐに連絡をいれるので」
1465 = "「Không cần đâu——Nếu dự đoán của tôi đúng thì chỉ nhoáng cái là tìm thấy thôi. Trường hợp không có thì tôi sẽ liên lạc ngay.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。その場合に備えておきますね？\nそれと、携帯も持って行ってください」
1922 = "「Tôi hiểu rồi. Vậy tôi sẽ chuẩn bị sẵn sàng cho trường hợp đó nhé? À, anh nhớ mang theo điện thoại di động nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまん、借りるぞ。いずれにせよ時間はかけない。\n通話可能になったらすぐに連絡する」
1978 = "「Cảm ơn, tôi mượn nhé. Dù sao cũng không mất nhiều thời gian đâu. Có sóng tôi sẽ gọi liền.」"
# 【ポーレット】
# display as 波萊特
# JP: 「お願いします。\n他にしておくことがあれば言ってください」
1802 = "「Trăm sự nhờ anh. Có việc gì cần làm sẵn thì cứ nói tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「連絡を。[せき]堰さんには、万一のため、\n近辺で通話可能な場所につめておいてほしいと」
2065 = "「Liên lạc đi. Nhờ báo với chú Seki là phòng hờ vạn nhất, hãy túc trực ở chỗ nào gần đó có sóng điện thoại nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。それ以外には？」
1796 = "「Tôi rõ rồi. Ngoài ra còn gì nữa không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……僕には今は思いつけん。\n気がつくことの手当を、任せていいか？」
1235 = "「……Giờ tôi chưa nghĩ ra thêm gì cả. Nếu cô nhận thấy cần chuẩn bị gì thì cứ tự quyết định giúp tôi được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。やっておきます」
1920 = "「Được rồi. Cứ giao cho tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
1977 = "「Cảm ơn cô.」"
# monologue
# JP: 気配りやケアに関するようなことなら、\nポーレット以上の適任者は無い。
2805 = "Về khoản chu đáo và chăm sóc người khác, thì không ai thích hợp hơn Paulette cả."
# monologue
# JP: ならば、僕は――
2626 = "Vậy thì, tôi——"
# 【双鉄】
# display as 雙鐵
# JP: 「やりきるだけだ。僕にしか――\n僕とハチロクだけにしか、出来ないことを、確実に」
1561 = "「Chỉ việc làm tới cùng thôi. Những việc chỉ có tôi—— chỉ có tôi và Hachiroku mới làm được, phải thật chắc chắn.」"
