# JP: 「出るって、どこへでございますか？」
1547 = "「出發？您打算去哪？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、日々姫たちを迎えにだ」
1906 = "「當然是去接日日姬她們」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんっ」
2048 = "「雙鐵君」" 

# monologue
# JP: ポーレットの声。
2578 = "我聽到了波萊特的聲音。" 

# monologue
# JP: キャブの窓から首を出せば、\n青い瞳がまっすぐ僕を見上げている。
2612 = "把頭從駕駛室的窗口探出去，只見波萊特那雙碧眼正望向我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかったんですか？\n日々姫ちゃんたちがどこにいるか」
1511 = "「你已經知道日日姬她們在哪裡了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、多分――\nいや、かなりの確度があるとは思う」
1676 = "「嗯，應該是——不，基本上八九不離十了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですか！　じゃ、わたし助士で入りましょうか？\nあと、捜索に人員がいるなら\x%l客車;#00ffc040;客車%l;#;つなげて」
1836 = "「是嗎！那是否需要我做司爐？還有，如果搜索需要人手的話，就把\\x%l客車;#00ffc040;客運車廂%l;#;給掛上」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――僕の予想が正しければ、捜索は一瞬で済む。\n空振りの場合でも、すぐに連絡をいれるので」
1465 = "「不用——如果我沒有猜錯的話，馬上就能找到她們。就算找不到，我也會馬上聯繫你們」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。その場合に備えておきますね？\nそれと、携帯も持って行ってください」
1922 = "「知道了。那我先以找到人為前提做準備。還有，請帶手機一起去吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん、借りるぞ。いずれにせよ時間はかけない。\n通話可能になったらすぐに連絡する」
1978 = "「謝謝，那我借走了。反正搜索用不了多久。一有信號馬上跟你聯絡」" 

# 【ポーレット】
# display as 波萊特
# JP: 「お願いします。\n他にしておくことがあれば言ってください」
1802 = "「拜託你了。如果還有什麼需要我做的話，請儘管開口」" 

# 【双鉄】
# display as 雙鐵
# JP: 「連絡を。[せき]堰さんには、万一のため、\n近辺で通話可能な場所につめておいてほしいと」
2065 = "「麻煩你跟堰先生說一聲，為了以防萬一，請他到附近有信號的地方待命」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。それ以外には？」
1796 = "「我知道了。除此之外呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕には今は思いつけん。\n気がつくことの手当を、任せていいか？」
1235 = "「……我能想到的就這麼多。如果還發現有什麼事，可以麻煩你來處理嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。やっておきます」
1920 = "「知道了。我會盡力而為」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
1977 = "「謝謝你」" 

# monologue
# JP: 気配りやケアに関するようなことなら、\nポーレット以上の適任者は無い。
2805 = "這類需要細心和耐心的工作，沒有人比波萊特更能勝任。" 

# monologue
# JP: ならば、僕は――
2626 = "既然如此，我——" 

# 【双鉄】
# display as 雙鐵
# JP: 「やりきるだけだ。僕にしか――\n僕とハチロクだけにしか、出来ないことを、確実に」
1561 = "「努力到最後就好。認認真真做好那些只有我——只有我和八六才能勝任的事」" 
