# monologue
# JP: \x%l喚呼;#00ffc040;喚呼%l;#;と同時に、\x%l自弁;#00ffc040;自弁%l;#;を操作。
2957 = "我一邊\\x%l喚呼;#00ffc040;復誦%l;#;一邊操作著\\x%l自弁;#00ffc040;自剎%l;#;。" 

# monologue
# JP: （グンッ！）
3308 = "（哐！）" 

# monologue
# JP: やや遅れ、減速感がはっきりしてくる。
3084 = "片刻之後，明顯的減速感從腳底傳來。" 

# monologue
# JP: （悪くない――いいぞ、このままだ）
3301 = "（不錯——很好，就這樣）" 

# monologue
# JP: \x%l階段;#00ffc040;階段%l;#;緩めを行って、\n減速度をやわらかなものにする。
3242 = "通過\\x%l階段;#00ffc040;分段%l;#;釋放的方式，讓減速度變得平順柔和。" 

# monologue
# JP: 少し置き、もう一回の\x%l階段;#00ffc040;階段%l;#;緩め――\n錆果てた停止指示板が、ごくゆっくりと近づいてくる。
3121 = "稍等一會，再進行一次\\x%l階段;#00ffc040;分段%l;#;釋放——鏽跡斑斑的停車指示牌緩緩地向車頭靠近。" 

# monologue
# JP: （キっ）
3303 = "（吱）" 

# 【双鉄】
# display as 雙鐵
# JP: 「……停止確認。\x%l逆転機;#00ffc040;逆転機%l;\x%lミッドギア;#;#00ffc040;ミッドギア%l;#;」
1683 = "「……停車確認。\\x%l逆転機;#00ffc040;回動機%l;\\x%lミッドギア;#;#00ffc040;中位檔%l;#;」" 

# monologue
# JP: そして、\x%l単弁;#00ffc040;単弁%l;#;を緩ブレーキに。
3132 = "而後，將\\x%l単弁;#00ffc040;單剎%l;#;改到輕度剎車。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[かわむら,1]河村廃駅、停車」
2212 = "「川村廢車站，停車」" 

# 【ハチロク】
# display as 八六
# JP: 「[ちゃく]着、[ヒトマルマルロク,3]1006」
2035 = "「到站，１００６」" 

# monologue
# JP: 時計を睨んで\x%l喚呼;#00ffc040;喚呼%l;#;して、\nハチロクは、パ、と明るい顔で僕を見上げる。
2893 = "對著表\\x%l喚呼;#00ffc040;復誦%l;#;之後，八六爽朗地抬頭看向我。" 

# 【ハチロク】
# display as 八六
# JP: 「良い運転でした。双鉄様」
2230 = "「您駕駛得真棒，雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2295 = "「是嗎」" 

# monologue
# JP: はずんだ声にホっとしかける。\nが、気を緩めるわけにもいかん。
3046 = "明快的聲音讓我隨之安下心來。但也不能就這樣掉以輕心。" 

# monologue
# JP: \x%l台枠;#00ffc040;台枠%l;#;交換完了後の、河村廃駅までの第一回の試験運転。\n僅か4.4キロの短さの後、むしろ本番はここからだ。
3231 = "這是\\x%l台枠;#00ffc040;車架%l;#;更換完成後，開往川村廢車站的第一次試運營。而真正的考驗，在這短短４.４公里後才剛剛開始。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、凪。早速で、すまんが――」
2287 = "「日日姬，凪，不好意思，得抓緊——」" 

# 【日々姫】
# display as 日日姬
# JP: 「任せて、にぃにっ！」
1998 = "「交給我吧，阿哥！」" 

# 【凪】
# display as 凪
# JP: 「行ってくるばーい！」
2431 = "「趕緊出發囉！」" 

# monologue
# JP: 言い切らぬうち、助士のふたりが先を争うようにして、\nキャブからホームへと下りていく。
2724 = "不等我說完，兩位司爐就爭先恐後地從駕駛室下到了站台上。" 

# monologue
# JP: 僕らも無論、後から追いかけ各部点検を行うのだが、\nそれより前、感覚を忘れんうちにやるべきことが他にある。
2961 = "我們等一下自然也要一起去進行各個部位的清查。不過在那之前，趁感覺還沒有淡去，還有其他要先做完的事情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「で――\nハチロクのレビューはどうだ？」
2486 = "「那——八六你怎麼看？」" 

# 【ハチロク】
# display as 八六
# JP: 「[この子,3]8620に関しては何もございません。\n\x%l台枠;#00ffc040;台枠%l;#;は、ほぼ完全にフィットしてくれています」
2202 = "「就[這孩子,3]８６２０而言，沒有任何需要特別說明的。\\x%l台枠;#00ffc040;車架%l;#;基本是完全合適的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「やはりか」
2312 = "「果然啊」" 

# monologue
# JP: 自分の感覚を、ハチロクの目に裏付けて貰えた。
3152 = "自己的感覺，從八六的眼神中得到了印證。" 

# monologue
# JP: ごく単純な満足感を感じるが――\n悪い方でも、恐らくそれは一致しているだろうとも思う。
2933 = "心中泛起一種非常單純的滿足感——但是在不好的方面，恐怕我們也想到了一處。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[ハチロク,3]8620以外の要素に関しては？」
1642 = "「[八六,3]８６２０以外的部分呢？」" 

# monologue
# JP: 間髪入れず問い返したなら、\nハチロクも、満足そうなうなずきを見せる。
3182 = "見我很快問到了點上，八六露出一絲滿意的神情點了點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「やはり、お気づきになられましたか。\n\x%l保線;#00ffc040;保線%l;#;の質が、いささか低下しておりますね？」
2226 = "「您果然也注意到了啊。\\x%l保線;#00ffc040;巡線%l;#;的質量，多少有些不足對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nが、今後は回復してくれるだろう」
2292 = "「是啊。不過，今後會逐步恢復的吧」" 

# monologue
# JP: 御一夜鉄道株式会社は現状、\n特に\x%l保線;#00ffc040;保線%l;#;に関して、ボランティア頼りの部分が大きい。
2926 = "御一夜鐵路股份公司目前對志願者有著很大的依賴，尤其是\\x%l保線;#00ffc040;巡線%l;#;相關的部分。" 

# monologue
# JP: その指導監督を出来る人材も、\n今のところ、極めて限られてしまってもいる。
3142 = "能夠進行指導監督的人，目前也是屈指可數。" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、今回は……\x%l三角線;#00ffc040;[さんかくせん,2]三角線%l;#;の新設もあり、\n\x%l台枠;#00ffc040;台枠%l;#;交換もあり、でしたからね」
1987 = "「不過，目前這是新鋪設了\\x%l三角線;#00ffc040;三角線%l;#;，又更換了\\x%l台枠;#00ffc040;車架%l;#;，也難免呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのどちらにも区切りがついた。\n既設路線の\x%l保線;#00ffc040;保線%l;#;にも、眼と手が行き届くようになるさ」
1982 = "「不過這兩件事都告一段落了。現有路線的\\x%l保線;#00ffc040;巡線%l;#;工作，也很快會得到大家的關注與幫助」" 

# 【ハチロク】
# display as 八六
# JP: 「眼と、手……」
2509 = "「關注與幫助……」" 

# monologue
# JP: ハチロクはそっと手を広げ、\n噛みしめるようにして、僕の言葉を繰り返す。
2783 = "八六將兩手輕輕地張開，一字一頓地複述著我的話。" 

# 【ハチロク】
# display as 八六
# JP: 「たくさんを、\x%l8620;#00ffc040;8620%l;#;に注いでいただけました」
1643 = "「\\x%l8620;#00ffc040;８６２０%l;#;已經得到了太多太多」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――本当にたくさんだったな」
2127 = "「嗯——真的是很多很多」" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を走らせてやりたい――\nそうした気持ちが、機関庫中に満ち満ちていた。
2940 = "想要讓\\x%l8620;#00ffc040;８６２０%l;#;再次馳騁——這樣的情緒在機車庫裡無處不在。" 

# monologue
# JP: 直接\x%l8620;#00ffc040;8620%l;#;に手を触れずとも、炊き出しや清掃や事務処理で、\n僕らはずっと、支えてもらい続けてた。
2854 = "哪怕是那些並不直接接觸\\x%l8620;#00ffc040;８６２０%l;#;的人，也在後廚、或是以清掃整理這樣的方式，一直支持著我們。" 

# 【ハチロク】
# display as 八六
# JP: 「とても、ありがたいことと存じます」
2219 = "「心中的感激之情實在無以言表」" 

# monologue
# JP: キャブをぐるりと見渡して、\nハチロクの手が、\x%l逆転機;#00ffc040;逆転機%l;#;ハンドルを優しく撫でる。
2801 = "八六環視了駕駛艙一週，把手放在了\\x%l逆転機;#00ffc040;回動機%l;#;的手把上，輕輕地撫摸著。" 

# 【ハチロク】
# display as 八六
# JP: 「今日の乗り味の柔らかさは、きっとそうした、\nたくさんの手によって産まれたものかと存じます」
2003 = "「今天的駕乘體驗能如此平順柔和，想必也是大家傾注了大量的心力才有可能實現的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そのとおりだな」
2145 = "「嗯，說得沒錯」" 

# monologue
# JP: 感傷的な物言いにも聞こえるが、\n端的な事実を示してもいる。
3140 = "聽起來似乎多少有些多愁善感的味道，不過這也的確是事實。" 

# monologue
# JP: 部品の選別、徹底した磨きこみに、丁寧な注油――\nそうした細かな積み重ねが、乗り味を変化させるのだから。
2865 = "嚴格地挑選，徹底地打磨，細心地注油——正是這些細微之處的積累，最終左右了駕乘體驗的優劣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、それだけでもない」
1984 = "「不過，也並非全靠這些」" 

# 【ハチロク】
# display as 八六
# JP: 「ええ、もちろん。双鉄様の運転技術も――」
2294 = "「是啊，那當然。雙鐵少爺的駕駛技術也——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなのはごくごく小さな要素さ」
2313 = "「枝微末節不值一提」" 

# monologue
# JP: 手が出る、自然に。
2988 = "我自然地伸出了手。" 

# monologue
# JP: ハチロクの帽子を軽く持ち上げ、\n柔らかな髪を、思う存分に撫で回す。
3206 = "輕輕地摘下八六的帽子，隨心地撫摸著那柔順的秀髮。" 

# 【ハチロク】
# display as 八六
# JP: 「そ、双鉄様？」
2516 = "「雙、雙鐵少爺？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前の復調が一番大きい」
2014 = "「你恢復了狀態才是最重要的」" 

# monologue
# JP: どれほどの眼と手と熱意でも、方向付けがなされなければ、\n無為とも……どころか、有害とさえなり得てしまう。
3074 = "無論得到多少關注與幫助，若是沒能把握好方向的話，也會徒勞無功……甚至有可能適得其反。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さすがはトップナンバーと、\nメーカーの[ふち]淵さんまでもが大いに感心してたじゃないか」
2481 = "「連在製作方工作的淵先生都對你讚嘆不已，說你“不愧是首車的鐵路人偶”，不是嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「それは――」
2494 = "「那只是——」" 

# monologue
# JP: 顔が、微妙にこわばってしまう。
2876 = "她的表情顯露出些許的僵硬。" 

# monologue
# JP: いささか調子に乗りすぎたかと、\n撫でる手を止め帽子を戻す。
2983 = "我發現自己玩鬧得有點過分了，於是停了手，幫她把帽子戴好。" 

# 【ハチロク】
# display as 八六
# JP: 「かつてのわたくしが、\n十分な仕事をできていなかっただけのことです」
2217 = "「從前的我，沒能把應盡之事做到萬全而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2096 = "「唔」" 

# monologue
# JP: そういう見方も出来てしまうと、\nそこは納得せざるを得ない。
2971 = "我必須承認，這也是一種看待問題的角度。" 

# monologue
# JP: 復元のときと、今回と――ハチロクが飛ばす指示にせよ、\n質問に対する回答にせよ、量も精度も段違いだったから。
3158 = "與剛剛修復時相比，如今的八六發出的指令和面對各種問題時的應答，在質量與精度上都已不可同日而語。" 

# 【ハチロク】
# display as 八六
# JP: 「もともとの\x%l台枠;#00ffc040;台枠%l;#;の寿命も、\nあるいは、わたくしが最初から万全であれば――」
2192 = "「如果我一開始就處於萬全的狀態，或許舊\\x%l台枠;#00ffc040;車架%l;#;的壽命也——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「仮に、もう十年、\x%l台枠;#00ffc040;台枠%l;#;の寿命を延ばせていたとして、\n事態は、今よりよほど困難になっていただろう」
2089 = "「哪怕\\x%l台枠;#00ffc040;車架%l;#;能再多十年壽命，情況也會比現在要困難得多吧」" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
2100 = "「啊」" 

# monologue
# JP: ハチロクもすぐにわかってくれる。
2769 = "八六也馬上理解了我話中的意思。" 

# monologue
# JP: 仮に、何の手もなく十年後を迎えていたなら――\nそのときの鉄道環境は、今よりよほど悪くあろうと。
2839 = "即使目前可以什麼也不做，但到了十年以後，屆時的鐵路環境只怕是會比如今更加不堪。" 

# 【双鉄】
# display as 雙鐵
# JP: 「見方を変えれば、これこそ幸いだったのだ。\n大丈夫――僕らは、一番良い道を進んできている」
2264 = "「換一種角度來看，我們這是因禍得福。沒問題——我們已經在沿著最好的道路前進了」" 

# 【ハチロク】
# display as 八六
# JP: 「そのことでしたら、もとより承知をしております」
2460 = "「這一點，我從一開始就堅信不疑」" 

# monologue
# JP: 床に降り立ち、ハチロクは、\n\x%l整備体;#00ffc040;整備体%l;#;へと\x%lタブレット;#00ffc040;タブレット%l;#;を換える。
3195 = "說著，八六從位子上下來，把\\x%lタブレット;#00ffc040;操作板%l;#;換裝到了\\x%l整備体;#00ffc040;整備體%l;#;上。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様が、ともに歩んでくださっているのですから」
2163 = "「因為有雙鐵少爺在我身邊，與我並肩前行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク……」
2024 = "「八六……」" 

# monologue
# JP: それはむしろ、僕が言うべきことだろう。\nハチロクが、共に居てくれたから――
3238 = "這話本應是由我口中說出才對。正因為有八六在我身邊——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほら、見てくれ」
2019 = "「來，你看」" 

# monologue
# JP: 手を差し出せば、\nハチロクは再び笑ってくれる。
3099 = "看著我伸出的手，八六又露出了燦爛的笑容。" 

# 【ハチロク】
# display as 八六
# JP: 「今さら見ずとも。\n最初から、ずうっと見ていました」
2041 = "「即便您不說，我也始至終都在看著」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2295 = "「是嗎」" 

# monologue
# JP: ――震えなかった。\n乗車前にも運転中も、ただの一度も。
1613 = "——我的手沒有顫抖，從上車前，到行駛中，一次都沒有。" 

# monologue
# JP: 吐き気もめまいもわずかも感じず、\n今はただただ、すっきりしている。
2732 = "也完全沒有噁心頭暈，現在只是單純覺得神清氣爽。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前のおかげで、僕の、この手は――」
2297 = "「是因為有你，我的這雙手才會——」" 

# monologue
# JP: ぎゅうっと握りこんでたものを、\n手放せそうな気がしている。
2950 = "感覺自己終於能將一直以來緊握在手裡的東西鬆開了。" 

# monologue
# JP: 手放してもなお居てくれるなら、それでいい。\n手放して遠く離れていくなら、またそれもいい。
2884 = "如果鬆開之後那個東西還是在那裡，便由它去。若是離我遠去，那也並不壞。" 

