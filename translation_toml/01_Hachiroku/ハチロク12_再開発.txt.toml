2991 = "我試著用手勢把轉彎時\\x%lフランジ;#00ffc040;輪緣%l;#;和線路摩擦的樣子比劃出一個大概。" 

# 【凪】
# display as 凪
# JP: 「なるほどばい」
2306 = "「是這樣的啊」" 

# 【ハチロク】
# display as 八六
