2251 = "「或者說……不用\\x%l8620;#00ffc040;８６２０%l;#;，一起搭乘\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;如何」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、それはちょっと」
2121 = "「啊，這個可能不太好」" 

