2462 = "「這個凸出的部分，就是\\x%lフランジ;#00ffc040;輪緣%l;#;。轉彎的時候，就是因為有它在，列車才不會脫軌」" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、走っていくうち、\x%lフランジ;#00ffc040;フランジ%l;#;も段々と摩耗する」
1985 = "「不過，在行駛的過程中，\\x%lフランジ;#00ffc040;輪緣%l;#;也會逐漸磨損」" 

