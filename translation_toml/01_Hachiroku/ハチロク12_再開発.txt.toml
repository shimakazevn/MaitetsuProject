2276 = "「既然這樣——」" 

# monologue
# JP: ハチロクが、じっと僕を見る。\n視線も手のひらも外せない。
2813 = "八六目不轉睛地看著我，手也同樣緊緊地抓著不放。" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、どうか、双鉄様」
2281 = "「既然這樣，還請雙鐵少爺——」" 

# 【凪】
# display as 凪
# JP: 「もどったばーい！！\nあれ？　にーさん、ハチロク、どこ行ったとよ？」
2156 = "「回來啦！！咦？大哥哥和八六跑哪塊兒去啦？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2537 = "「！」" 

# monologue
# JP: 凪だ。\n助かった。
3047 = "是凪。得救了。" 

# monologue
# JP: 思ってしまって、混乱する。\n一体何から、僕は助かったというのだろうか。
3207 = "轉念一想，我卻又陷入了混亂。她到底是把我從什麼當中救了出來呢。" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　にぃに――んっ――\n兄さん、いないの？」
2085 = "「哎？阿哥——唔——哥哥他不在嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「はぁ、はぁ、はぁ――\nもう、ふたりとも――はやい――よぉ」
2079 = "「哈、哈、哈——真是的，你們兩個，跑太快了啦」" 

# 【稀咲】
# display as 稀咲
# JP: 「おそらく駅舎の中だろう。\n調査をするといってたじゃないか」
2236 = "「應該是在車站裡面吧。他們不是說要調查那邊嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああうん、駅だ。\nこちらも、丁度終わったところだ」
2108 = "「啊，嗯，在車站裡。我們這邊也剛好結束了」" 

# monologue
# JP: ハチロクとともに外にでる。
2965 = "我和八六一起走了出去。" 

# monologue
# JP: 日々姫に稀咲に凪、ふかみ。
3040 = "日日姬、稀咲、凪、深美。" 

# monologue
# JP: そろって顔を薄汚れさせ、\nけれどもまぶしい、力強い笑みを浮かべている。
3148 = "臉上都有一點髒，但四個人臉上都綻放著燦爛而堅定的笑容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうやら、有意義な調査ができたようだな」
2347 = "「看來是進行了一次有意義的調查啊」" 

# 【凪】
# display as 凪
# JP: 「有意義ばい！　めっちゃくちゃ楽しかったばい！！」
2428 = "「賊有意義！超好玩的！！」" 

# 【ふかみ】
# display as 深美
# JP: 「もう凪ちゃん、\n楽しかったとかそういうことじゃないよう」
2198 = "「小凪真是的，不是問你好不好玩啦」" 

# 【稀咲】
# display as 稀咲
# JP: 「いや、楽しさも重要だ。\n双鉄。ここにはどうやら、ボクの予想以上の価値がある」
1991 = "「不，好玩也是很重要的。雙鐵，這裡似乎比我預期的更有價值」" 

# monologue
# JP: いって、稀咲が、促すように日々姫を見る。
3117 = "稀咲邊說，邊催促般地看著日日姬。" 

# monologue
# JP: 日々姫は小さく頷いて、\n甘えた瞳で僕を見上げる。
3043 = "日日姬輕點了一下頭，撒嬌似的看向我。" 

# 【日々姫】
# display as 日日姬
# JP: 「それで、にぃに――ううん、兄さん。\nええと、わたしたち、できたら、だけど」
2338 = "「然後呢，阿哥——不，哥哥。這個，我們……如果可以的話」" 

# monologue
# JP: ああ、ねだられる。\nそれも、ろくでもないことを。
2863 = "啊，這是要撒嬌耍賴了。而且准不是好事。" 

# monologue
# JP: そのことを直感できるくらいには、\n僕と日々姫は、兄妹だ。
2967 = "我和日日姬畢竟兄妹一場，自然能夠靠直覺猜到。" 

# 【日々姫】
# display as 日日姬
# JP: 「このままお泊りして――調査、続けたらだめかなぁ？」
2375 = "「能不能今天就住下來，繼續進行調查呢？」" 
