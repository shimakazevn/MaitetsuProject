# 【ハチロク】
# display as 八六
# JP: 「双鉄様――この切符に、\x%l入鋏;#00ffc040;[にゅうきょう,1]入鋏%l;#;をしていただけますか？」
2518 = "「雙鐵少爺，可以請您為這張車票\\x%l入鋏;#00ffc040;剪票%l;#;嗎？」" 

# 【双鉄】
# display as 雙鐵
