# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の話がもしもなければ、\n僕の深い部分はきっと、まだ死んだままに生きていた。
3161 = "若是沒有\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶這事的話，我恐怕還是會像以前一樣，保持著心死的狀態活下去吧。" 

# 【ハチロク】
# display as 八六
# JP: 「ですが……そのような発展は、\n長期的に続くものとは思えませんが――」
2073 = "「可是……那樣的發展，怕是難以長久——」" 

# 【稀咲】
# display as 稀咲
# JP: 「さぁ、どうだろうね。けど――極論すれば、\nあの人とすれば、５０年も保てば十分なのかもしれない」
2468 = "「這個，又有誰能斷言呢。不過，極端一點說，對那個人而言，能堅持五十年或許就足夠了」" 

# monologue
# JP: あの人、と稀咲は冷たく繰り返す。
1620 = "“那個人”，稀咲又用了這個冰冷的稱呼。" 

# monologue
# JP: ５０年……それは恐らく、稀咲が見込む、\nあの人――宝生元忠の余命の長さであるのだろう。
2736 = "五十年……那恐怕是在稀咲看來，那個人——寶生元忠所剩餘的壽命吧。" 

# 【れいな】
# display as 玲奈
# JP: 「町は、だけど――\nその先も、ずっと続いていくんですよぉ？」
2074 = "「可是呢，城鎮在那以後，還是要繼續存在的哦」" 

# monologue
# JP: 素朴極まるれいなの言葉に、ハチロクが同意の声を重ねる。
3057 = "樸素至極的話語。八六也對此表示贊同。" 

# 【ハチロク】
# display as 八六
# JP: 「発展がいつか途絶え、対立はけれど残り続ける。\nそのような未来は、御一夜にふさわしいとは思えません」
2345 = "「發展總有一天會停滯，然而對立卻不會就此消失。那樣的未來，在我看來並不適合御一夜」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、信頼を取り戻せばいい」
2503 = "「那麼，只要重新取得信任就好了」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうだね。しかし、そうするためには時間がかかる。\n地道な積み重ねは、地道であるゆえ、波及しづらい」
2319 = "「沒錯。然而，這卻不能一蹴而就。腳踏實地的積累，也正因其“腳踏實地”而難以傳播開影響」" 

# monologue
# JP: ん、と短く息を飲む音。\nポーレットの声は、普段以上に慎重な響きを帯び始める。
3066 = "波萊特短暫躊躇了一下，然後格外慎重地開口了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……宝生さんの動きは、それほど活発なのですか？」
1691 = "「……寶生先生的活動，有那麼積極嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「さて、どうだろうね。身近に知っている分、ボクが、\n過大評価をしてしまっているだけの可能性もある」
2469 = "「這個，誰知道呢。雖然身為至親的我對他了解比較多，但也有可能只是我高估了他」" 

# monologue
# JP: （ああ――）
3310 = "（啊——）" 

# monologue
# JP: その一言に、少し、わかったような気になる。\n稀咲がこうも急速に、僕ら側に与してくれた理由には――
3139 = "聽她這麼說，我覺得多少能夠理解一些了。稀咲之所以會這麼突然地轉投我們這一方——" 

# monologue
# JP: 父であり頭取である宝生元忠への対抗心、\nそれも、恐らく、大いに影響しているのだろうと。
2874 = "她對既是父親又是行長的寶生元忠的對抗心理，恐怕起到了莫大的作用。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……どうあれ、調査を急いで損はないわけか」
1671 = "「……不管怎樣，儘快做好調查有百利而無一害」" 

# 【稀咲】
# display as 稀咲
# JP: 「図面上では確認したし、いくらかのプランも立てた」
2243 = "「我已經在圖面上確認過了，也擬定了幾個不同的方案」" 

# monologue
# JP: 言いつつ、稀咲は鞄からペーパーを出し、配り始める。
3248 = "邊說，稀咲邊從包裡取出了一疊紙，分發給大家。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……今日は、[うらかみ,1]浦上さんは一緒じゃないのか？」
1676 = "「……今天浦上經理沒跟著一起來嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「[うらかみ,1]浦上なら送り返された。エアロ＝クラフテック社は\n近日中に、別の担当者を送りこんでくるみたいだ」
2332 = "「浦上被召回自己的公司了。空凝科技公司應該很快會派別的負責人過來接手吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！！？」
2538 = "「！！？」" 

# 【稀咲】
# display as 稀咲
# JP: 「浦上ほどに公正な判断をくださない――\nあの人の意向にそって動くであろう、新担当をね」
2265 = "「新的負責人恐怕不會做出像浦上那樣公正客觀的判斷，而是依那個人的意向而動了吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……この期に及んで、\x%lエアクラ;#00ffc040;エアクラ%l;#;社もまだ、\n御一夜への工場設置をあきらめてはいないのか」
1672 = "「……也就是說時至今日，\\x%lエアクラ;#00ffc040;空凝機%l;#;公司也還沒有放棄在御一夜建廠嗎」" 

# 【稀咲】
# display as 稀咲
