2774 = "八六在線路旁蹲下把\\x%l動輪;#00ffc040;動輪%l;#;緊扣著軌頭內側的部分指給凪看。" 

# 【ハチロク】
# display as 八六
# JP: 「ここ、\x%l動輪;#00ffc040;動輪%l;#;に出っ張りがあるのが見えますか？」
2479 = "「這裡，看到\\x%l動輪;#00ffc040;動輪%l;#;凸出來的部分了嗎？」" 

# 【凪】
# display as 凪
