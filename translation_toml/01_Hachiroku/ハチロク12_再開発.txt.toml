2471 = "「這和我支持大九州蒸汽機車藍圖的理由是一樣的。要想拿下九州的中央，御一夜是一個絕佳的落腳點」" 

# 【れいな】
# display as 玲奈
# JP: 「あきらめさせるには、どうしたらいいんですかぁ？」
2240 = "「我們要怎麼做，才能讓對方放棄呢？」" 

# monologue
# JP: れいなの、またも素朴な疑問。\nさしもの稀咲も、張り詰めていた表情を少し緩める。
3138 = "聽到玲奈質樸的疑問，稀咲緊繃的表情也緩和了些許。" 

# 【稀咲】
# display as 稀咲
# JP: 「それは、双鉄がさっき言ったとおりだよ」
2204 = "「就像雙鐵剛才所說的那樣」" 

# 【凪】
# display as 凪
# JP: 「にーさん、なんば言うとったっけ？」
2170 = "「大哥哥剛才說了什麼來著？」" 

# 【ふかみ】
# display as 深美
# JP: 「信頼だよ、凪ちゃん。\n双鉄さん、信頼を取り戻せばいいって」
2289 = "「是信任啊，小凪。雙鐵先生說“只要重新取得信任就好了”」" 

# 【稀咲】
