# monologue
# JP: ハチロクが今、絶好調でもあることだし、特に初回は、\n僕が余計なことせず、ハチロクの計算に任せた方が――
2781 = "八六如今狀態絕佳，特別現在又是第一次的行駛，我更應該不做任何多餘干涉，全部交由八六來計算更好——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ハチロク？」
2149 = "「嗯？八六？」" 

# 【ハチロク】
# display as 八六
# JP: 「あ、いえっ」
2111 = "「啊，沒事」" 

# monologue
# JP: どこか、ぼうっとしていたように思えたが、\n僕へと振り返る顔はいつものハチロクだ。
2723 = "不知為何事，八六似乎想得出了神。不過在她看向我時，又恢復成了平常的樣子。" 

# 【ハチロク】
# display as 八六
# JP: 「少し、考えていただけです、その……」
2242 = "「我只是在想些事情，是關於……」" 

# monologue
# JP: ハチロクの目が稀咲を、日々姫を、\n凪とふかみとを順番に見る。
2804 = "八六的目光在稀咲、日日姬、凪和深美身上逐一掃過。" 

# 【ハチロク】
# display as 八六
# JP: 「術仙炭鉱廃駅どまりだと、[ゆのい,1]湯医まで行っての折り返しと、\n後進で御一夜まで戻るのと……いずれがよろしいかと」
2508 = "「開到術仙煤礦廢車站之後，是索性開到湯醫後折返，還是倒車返回御一夜……哪種方法更合適」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……試験初期の段階で、\n一気に[ゆのい,1]湯医まで走らせるのは避けたいな」
2464 = "「這個啊……在測試初期，最好還是別一口氣開到湯醫那麼遠」" 

# 【ポーレット】
# display as 波萊特
# JP: 「――それは――そうですね……\n試験初期にあんまり長距離は……けど――あ、そうだ！」
1704 = "「……這倒也……不無道理呢……測試初期就跑長距離確實……不過——啊，對了！」" 

# monologue
# JP: ぽんっ、と、ポーレットが手を打ち鳴らす。
3067 = "波萊特突然拍了拍手。" 

# 【ポーレット】
# display as 波萊特
# JP: 「だったら、術仙炭鉱駅停車時の各部点検が終わったら、\n駅舎の調査をしてもらえませんか？」
2500 = "「那索性，在術仙煤礦廢車站停車完成各個部位的清查之後，調查一下車站的情況怎麼樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「駅舎か、なるほど。\n再開発をするのなら、駅舎も再利用するわけだしな」
2432 = "「車站啊，原來如此。若要進行二次開發的話，車站也應該重新利用起來啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうできるのか、できなくて、建て替えが必要なのか\n――運転モードのハチロクちゃんのセンサーでしたら」
2303 = "「是能夠重新利用，還是無法利用需要重建——八六在駕駛模式下的感測器應該能夠檢測出來」" 

# 【ハチロク】
# display as 八六
# JP: 「方法のご教示をいただければ、そのとおりに試験し、\nデータをあげていくことには問題ございません」
2066 = "「只要告訴我方法，我就可以按部就班地進行測試，統計並報告數據」" 

# 【ポーレット】
# display as 波萊特
# JP: 「なら、ひとまずそれでお願いできますか？」
2496 = "「那就先按照這個方案進行可以嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2140 = "「嗯」" 

# monologue
# JP: 長距離はやはりまだ走らせたくないし、\n\x%l8620;#00ffc040;8620%l;#;を放置して稀咲たちの調査についてもいけん。
3090 = "目前還是不想讓火車跑太長的距離，不過也不能把\\x%l8620;#00ffc040;８６２０%l;#;丟下陪著稀咲她們去做調查。" 

# monologue
# JP: ポーレットの案は、\nかなり無駄の無いものに思える。
2993 = "我認為波萊特的方案很有效率。" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解した。では、そのように行おう」
2177 = "「好。那就照此方案實施吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「なら、出来るだけ早くで頼めるかな。\nスケジュールは最優先であけるから」
2502 = "「那能拜託儘快安排嗎。我這邊會儘快調整好行程的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。予定を立て次第に連絡を入れる」
2182 = "「好的，日程安排好就立即聯繫你」" 

# 【稀咲】
# display as 稀咲
# JP: 「ありがとう。有意な話し合いが出来て何よりだ。\n双鉄、みなさん。これから、よろしくおねがいします」
2524 = "「非常感謝大家，今天的對話真是收穫頗豐。雙鐵，還有大家，今後也請多關照」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、こちらこそ」
2093 = "「哪裡，彼此彼此」" 

# 【ハチロク】
# display as 八六
# JP: 「お力添え、頼もしく存じます」
2309 = "「有您助陣，讓人倍感安心」" 

# monologue
# JP: ひと通りの挨拶を終えればすぐさま、\n早足で稀咲は去っていく。
2903 = "幾句簡短的寒暄之後，稀咲便立即起身離開了。" 

# monologue
# JP: あの急ぎよう――状況は、僕らが認識したより更に、\n切迫しているものかもしれない。
2879 = "她走得如此匆忙，讓我們意識到——情況或許比我們所想的還要更加急迫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、僕らも行くぞ」
2029 = "「八六，我們也走吧」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
2189 = "「好的，雙鐵少爺」" 

# monologue
# JP: やるべきことは明快で、\n迷いの入り込む余地も無い。
3193 = "該做的事一目了然，並無半點猶豫躊躇的餘地。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まずは、試験運転のデータと[ハチロク,3]8620を、\n技工さんたちに一度戻すぞ」
2529 = "「首先把試運營的數據和[八六,3]８６２０一起，帶回去給技工們看一下吧」" 

# monologue
# JP: ……まもなく、クマ川第四橋梁だ。\n\x%l自弁;#00ffc040;自弁%l;#;にかけている手を軽く握りこみ、遊びを無くす。
1628 = "……隈河第四大橋已經近在眼前了。我輕輕握了握放在\\x%l自弁;#00ffc040;自剎%l;#;手把上的手，全神貫注。" 

# monologue
# JP: （むっ！？）
3309 = "（唔！？）" 

# monologue
# JP: ハチロクからの指示が無い。\nならばここは、自己判断でやれということなのだろう。
2796 = "八六沒有下達指示給我。也就是讓我自行判斷的意思吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l制動;#00ffc040;制動%l;#;、コンマ８っ！」
# 1650 = "「\\x%l制動;#00ffc040;減速%l;#;，零點八！」" 

# monologue
# JP: 上り勾配が気になるが、\n足りないのならば、足せばいい。
3271 = "雖然有點在意上坡，不過速度不夠的話提上去就是。" 

# monologue
# JP: オーバーランだけしないよう、\n安全だけを最優先で操作をしていく。
2741 = "但過沖是一定要避免的。安全第一，一切操作都要以此為前提。" 

# monologue
# JP: （やはり、早いか？）
3316 = "（還是太早了嗎？）" 

# monologue
# JP: カットオフして、ブレーキも\x%l運転位置;#00ffc040;運転位置%l;#;に戻している。
2999 = "我關掉了汽門，剎車也放回了\\x%l運転位置;#00ffc040;行駛位置%l;#;。" 

# monologue
# JP: あとは惰性の赴くまま――ああ、くそっ。
3018 = "接下來就靠慣性——啊，可惡。" 

# 【日々姫】
# display as 日日姬
# JP: 「お見事！　にぃに――んんっ、兄さん」
2334 = "「漂亮！阿哥——唔，哥哥」" 

# 【稀咲】
# display as 稀咲
# JP: 「へぇえ、上手に止まるものだね」
2154 = "「嘿，停得很熟練嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや……うむ」
1971 = "「不……唔」" 

# monologue
# JP: 停止位置より、二メートルも手前に止まってしまった。
3051 = "最後停在了離停車位置還有兩公尺的地方。" 

# monologue
# JP: 大甘査定の日々姫の目や、経験の無い稀咲の目には\n見事と映ったのかもしれんが、これはハチロクに――
2867 = "在對我的標準過於寬鬆的日日姬，以及沒有經驗的稀咲看來，或許覺得停得不錯，但換做是八六的話——" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？　ハチロク？」
# 2149 = "「嗯？八六？」" 

# 【ハチロク】
# display as 八六
# JP: 「え！？　あ、ああ――はい、\n着――[ヒトヒトマルマル,3]1100――丁度ですね、お疲れ様でした」
2083 = "「哎！？啊，哦——是的，到站——１１００——準點，您辛苦了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、それはいいのだが――」
2102 = "「啊不是，辛苦倒是無所謂，不過——」" 

# 【ハチロク】
# display as 八六
# JP: 「わかっております。わたくしたちは駅舎、\n日々姫たちは炭鉱近辺の、それぞれ調査でございますね」
2246 = "「我知道，我們去車站，日日姬她們去煤礦周邊，分頭進行調查對吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ、おいっ」
2115 = "「啊，等等」" 

# monologue
# JP: 逃げ出すようにバタバタと、\nハチロクはキャブから飛び降りてしまう。
2786 = "八六慌慌張張地從駕駛室跳了下去，簡直像是要逃跑一樣。" 

# 【凪】
# display as 凪
# JP: 「ふっふーん、探検、探検ばーい！」
2081 = "「哈哈，探險，探險去囉！」" 

# 【ふかみ】
# display as 深美
# JP: 「ああん、凪ちゃん、ちょっと待ってよぅ」
2110 = "「啊，小凪，等等我啦」" 

# 【稀咲】
# display as 稀咲
# JP: 「遊びじゃない。はしゃいでいると怪我をするよ？」
2461 = "「這不是去玩，亂跑亂鬧的話可是會受傷的哦」" 

# monologue
# JP: ついで、ふかみと凪と稀咲も。\nホームの上へと目をやれば、もうハチロクの姿は無い。
2828 = "凪、深美和稀咲也緊跟著下了車。而當我轉頭看向站台時，卻早已不見了八六的身影。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ――」
2095 = "「唔——」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、どぎゃんしたと？」
2513 = "「阿哥，怎麼了？」" 

# monologue
# JP: 稀咲の姿がないところでは、日々姫は自然な隈元弁だ。
3109 = "稀咲不在身邊的時候，日日姬就自然地說起了隈元話。" 

# monologue
# JP: その力みない問いかけに、\n考え過ぎかと、少し気分をやわらげられる。
3137 = "聽到她不假思索的提問，讓我覺得也許是自己想多了，便隨之放鬆了一點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、停止位置が手前過ぎたなと反省していただけだ。\nそれより、気をつけていってこいよ？」
2320 = "「沒，只是在反省自己停得離停車位置有點遠而已。倒是你，路上當心點哦」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！　いってきまーす！」
2142 = "「嗯！那我出發啦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1662 = "「…………」" 

# monologue
# JP: 指示がなく、停止位置のズレにも指摘がなかった。
3058 = "沒有指示，也沒有對停車位置偏差的批評。" 

# monologue
# JP: いくら試験運転とはいえ、\nあまりにチェックが甘すぎるような気もするが――
2901 = "就算是試運營，我還是覺得這評判標準有些太過寬鬆了——" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、今はともかく、言われた仕事をこなさないとな」
2370 = "「算了，目前還是先按指示完成任務吧」" 

# monologue
# JP: ――ハチロクはずっと絶好調だし、\n僕が試されただけかもしれん。
1612 = "——八六最近一直是狀態絕佳，也許她只是在試探我。" 

# monologue
# JP: 念のため、前方確認をしっかりとって、慎重に――\n停止位置をぴたりに合わせてなおす。
3073 = "為防萬一，我還是在仔細確認前方後，慎重地重新對齊了停車位置。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2140 = "「嗯」" 

# monologue
# JP: これでよし。
3235 = "這樣就好了。" 

# monologue
# JP: あとは停車処置をして――
3017 = "接下來就是做好停車操作——" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて。駅舎調査をがんばるとするか」
2179 = "「好了，現在開始加油調查車站吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ――」
# 2095 = "「唔——」" 

# monologue
# JP: 見れば見るほど、調べれば調べるほどに、\n思ってしまう。
3201 = "越是仔細查看，越是深入調查，我就越來越有這種感覺——" 

# monologue
# JP: 僕が観光客ならば、\nこの駅には、あまり旅情を感じんだろう。
2882 = "如果我是遊客的話，實在是感受不到這車站有什麼旅途的情調。" 

# 【双鉄】
# display as 雙鐵
# JP: 「かつて、術仙炭鉱が栄えていた――\nということの現れなのであろうがな」
2515 = "「雖然這也是體現了術仙煤礦曾經的繁榮吧」" 

# monologue
# JP: 湯医線の、他のほとんどの廃駅と違い、\n駅舎は、かなりしっかりしている。
2853 = "和湯醫線上其他大多數廢車站不同，這座車站建得還是很有模有樣的。" 

# monologue
# JP: が、現役当時は恐らく綺麗であったのだろう外板も、\n汚れてしまった今となっては、酷く安っぽく見えるだけだ。
3076 = "然而，當年應該很漂亮的外立面，如今布滿汙漬，顯得格外廉價。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、問題なのは中身か。検査の結果次第では、\n建物をそのまま、再利用できるのかもしれんしな」
1989 = "「不過，關鍵還是在內部。若檢查結果樂觀，這幢房子或許還能夠重新利用」" 

# monologue
# JP: 駅舎の内側ではハチロクが、\n指示された検査を、ひとりこつこつこなしている。
2868 = "在車站裡面，八六正依照指示，一項一項認真地在做著檢查。" 

# monologue
# JP: 僕は駅舎の外回りの、人間の目で気づくことなどを\nチェックするという分担なのだが――
3135 = "而我則是負責在車站外面走走看看，以人的眼光找尋並檢查值得注意的地方，不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「テツの中には、[はいせん,1]廃線テツという方々もいるそうだが――\n僕は、それにはなれんようだな」
2506 = "「鐵路愛好者中，有所謂“廢線迷”這麼一群人。不過看來，我是成不了他們的一員了」" 

# monologue
# JP: 全くわからん。物悲しささえあまり感じん。\nかすかに悲しみを感じたものを強いてあげるなら――
2887 = "完全理解不了。甚至都沒泛起幾分感傷。若非要問我在哪裡能感受到一絲淒涼的話，大概只有——" 

# monologue
# JP: 廃駅告知をしていたのであろう「おしらせ」の紙が、\n半ば剥がれて、「らせ」だけとなり果てた姿くらいだ。
2745 = "作為廢站通知書貼出來的那張“通知”，如今只剩寫著“知”的那半張還掛在原處——這一點吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、ハチロクを一人にしてもおけんしな」
2399 = "「話說回來，就這麼放著八六一個人不管好像也不太好」" 

# monologue
# JP: 日々姫達についていった方が、\nやりがいのある調査をまだしも出来たのでは――
3179 = "要是跟著日日姬她們的話，或許還能進行點有意義的調查——" 

# monologue
# JP: 頭をよぎるそんな思いを、理屈と気持ちで振り払う。
2998 = "我趕緊用道理和感情趕走了這個驀然浮現的念頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクを一人置いていくなど――」
2260 = "「拋下八六一個人這種事情——」" 

# monologue
# JP: ありえんことだし、やりたくも無い。
2986 = "我絕對做不出來，也根本不想這樣做。" 

# monologue
# JP: ハチロクが内側で調査している、その物音を聞くだけで、\nこころがこうも、やわらかにあたたかになるというのに。
2794 = "八六正在裡面進行著調查。只是聽到她弄出的動靜，心頭就如有暖流流過，整個人都隨之放鬆下來。" 

# 【双鉄】
# display as 雙鐵
