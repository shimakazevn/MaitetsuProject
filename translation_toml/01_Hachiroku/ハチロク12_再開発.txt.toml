# 【双鉄】
# display as 雙鐵
# JP: 「うむ。この短い区間であったにしては、\n\x%l動輪;#00ffc040;動輪%l;#;が、熱を持ちすぎているような気もするが……」
2132 = "「嗯。以這麼短的距離而言，感覺\\x%l動輪;#00ffc040;動輪%l;#;上積蓄的熱量似乎有些太多了……」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2100 = "「啊」" 

# monologue
# JP: 車体向こうのチェックを終えたのだろう。\nちょうど、ハチロクと凪も戻ってきた。
3233 = "這時，八六和凪回到了這邊，大概是車體對面的檢查都結束了吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクはどう思う？」
2027 = "「八六你怎麼看？」" 

# monologue
# JP: 感じたことを伝えれば、\nハチロクはその手を\x%l動輪;#00ffc040;動輪%l;#;に触れさせる。
2778 = "八六在聽到我照實說出的想法後，伸手碰了碰\\x%l動輪;#00ffc040;動輪%l;#;。" 

# 【ハチロク】
# display as 八六
# JP: 「確かにいささか熱いですが――気温と、\x%l踏面;#00ffc040;踏面%l;#;の状態と、\n\x%lフランジ;#00ffc040;フランジ%l;#;を削り直した影響との、単純な複合でしょう」
2360 = "「確實是有點熱。不過應該只是氣溫、\\x%l踏面;#00ffc040;踏面%l;#;的狀態、\\x%lフランジ;#00ffc040;輪緣%l;#;重新拋光等一系列因素共同影響造成的吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なるほどな」
2105 = "「啊，原來如此」" 

# 【凪】
# display as 凪
