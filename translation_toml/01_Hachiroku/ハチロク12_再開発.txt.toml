[script]
# lines: 440 
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l制動;#00ffc040;制動%l;#;、コンマ８っ！」
1650 = "「\\x%l制動;#00ffc040;Hãm phanh%l;#;, phẩy 8!」"
# monologue
# JP: \\x%l喚呼;#00ffc040;喚呼%l;#;と同時に、\\x%l自弁;#00ffc040;自弁%l;#;を操作。
2957 = "Cùng lúc với \\x%l喚呼;#00ffc040;hô xác nhận%l;#;, tôi thao tác \\x%l自弁;#00ffc040;van hãm tự động%l;#;."
# monologue
# JP: （グンッ！）
3308 = "（Kịch!）"
# monologue
# JP: やや遅れ、減速感がはっきりしてくる。
3084 = "Trễ một nhịp, cảm giác giảm tốc dần trở nên rõ rệt."
# monologue
# JP: （悪くない――いいぞ、このままだ）
3301 = "（Không tệ——tốt lắm, cứ giữ nguyên thế này.）"
# monologue
# JP: \\x%l階段;#00ffc040;階段%l;#;緩めを行って、\n減速度をやわらかなものにする。
3242 = "Tiến hành \\x%l階段;#00ffc040;nhả phanh từng nấc%l;#;, để làm cho tốc độ giảm dần một cách êm ái."
# monologue
# JP: 少し置き、もう一回の\\x%l階段;#00ffc040;階段%l;#;緩め――\n錆果てた停止指示板が、ごくゆっくりと近づいてくる。
3121 = "Đợi một chút, lại \\x%l階段;#00ffc040;nhả phanh từng nấc%l;#; thêm lần nữa—— Tấm biển báo dừng rỉ sét đang chầm chậm tiến lại gần."
# monologue
# JP: （キっ）
3303 = "（Kéét）"
# 【双鉄】
# display as 雙鐵
# JP: 「……停止確認。\\x%l逆転機;#00ffc040;逆転機%l;\\x%lミッドギア;#;#00ffc040;ミッドギア%l;#;」
1683 = "「......Xác nhận dừng tàu. \\x%l逆転機;#00ffc040;Cần đảo chiều%l; \\x%lミッドギア;#;#00ffc040;số trung tính%l;#;.」"
# monologue
# JP: そして、\\x%l単弁;#00ffc040;単弁%l;#;を緩ブレーキに。
3132 = "Sau đó, chuyển \\x%l単弁;#00ffc040;van hãm đơn%l;#; sang hãm nhẹ."
# 【双鉄】
# display as 雙鐵
# JP: 「[かわむら,1]河村廃駅、停車」
2212 = "「Ga bỏ hoang Kawamura, dừng tàu.」"
# 【ハチロク】
# display as 八六
# JP: 「[ちゃく]着、[ヒトマルマルロク,3]1006」
2035 = "「Đến nơi, 1006.」"
# monologue
# JP: 時計を睨んで\\x%l喚呼;#00ffc040;喚呼%l;#;して、\nハチロクは、パ、と明るい顔で僕を見上げる。
2893 = "Sau khi nhìn đồng hồ và \\x%l喚呼;#00ffc040;hô xác nhận%l;#;, Hachiroku ngước lên nhìn tôi với khuôn mặt rạng rỡ."
# 【ハチロク】
# display as 八六
# JP: 「良い運転でした。双鉄様」
2230 = "「Ngài lái tàu giỏi lắm. Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2295 = "「Vậy sao.」"
# monologue
# JP: はずんだ声にホっとしかける。\nが、気を緩めるわけにもいかん。
3046 = "Giọng điệu phấn khởi ấy làm tôi suýt thì thở phào nhẹ nhõm. Nhưng, cũng không thể cứ thế mà lơ là được."
# monologue
# JP: \\x%l台枠;#00ffc040;台枠%l;#;交換完了後の、河村廃駅までの第一回の試験運転。\n僅か4.4キロの短さの後、むしろ本番はここからだ。
3231 = "Đây là chuyến chạy thử đầu tiên đến ga bỏ hoang Kawamura sau khi hoàn tất việc thay \\x%l台枠;#00ffc040;khung gầm%l;#;. Chỉ với quãng đường ngắn ngủi 4.4km, màn thử thách thực sự giờ mới bắt đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、凪。早速で、すまんが――」
2287 = "「Hibiki, Nagi. Xin lỗi vì phải hối thúc, nhưng——」"
# 【日々姫】
# display as 日日姬
# JP: 「任せて、にぃにっ！」
1998 = "「Cứ giao cho em, anh hai!」"
# 【凪】
# display as 凪
# JP: 「行ってくるばーい！」
2431 = "「Tụi em đi nha!」"
# monologue
# JP: 言い切らぬうち、助士のふたりが先を争うようにして、\nキャブからホームへと下りていく。
2724 = "Tôi còn chưa dứt lời, hai cô phụ lái tàu đã tranh nhau nhảy từ buồng lái xuống sân ga."
# monologue
# JP: 僕らも無論、後から追いかけ各部点検を行うのだが、\nそれより前、感覚を忘れんうちにやるべきことが他にある。
2961 = "Tất nhiên là chúng tôi cũng sẽ đuổi theo sau để kiểm tra các bộ phận, nhưng trước đó, trong lúc cảm giác lái vẫn còn, có một việc khác cần phải làm."
# 【双鉄】
# display as 雙鐵
# JP: 「で――\nハチロクのレビューはどうだ？」
2486 = "「Thế—— Đánh giá của Hachiroku thì sao?」"
# 【ハチロク】
# display as 八六
# JP: 「[この子,3]8620に関しては何もございません。\n\\x%l台枠;#00ffc040;台枠%l;#;は、ほぼ完全にフィットしてくれています」
2202 = "「Về 8620 thì không có vấn đề gì ạ. \\x%l台枠;#00ffc040;Khung gầm%l;#; gần như đã ăn khớp hoàn toàn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「やはりか」
2312 = "「Quả nhiên là vậy.」"
# monologue
# JP: 自分の感覚を、ハチロクの目に裏付けて貰えた。
3152 = "Cảm giác của tôi đã được chứng thực qua ánh mắt của Hachiroku."
# monologue
# JP: ごく単純な満足感を感じるが――\n悪い方でも、恐らくそれは一致しているだろうとも思う。
2933 = "Tôi cảm thấy một sự thỏa mãn hết sức giản đơn—— Nhưng có lẽ, về mặt xấu, chúng tôi cũng có chung suy nghĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「[ハチロク,3]8620以外の要素に関しては？」
1642 = "「Thế còn các yếu tố ngoài 8620 thì sao?」"
# monologue
# JP: 間髪入れず問い返したなら、\nハチロクも、満足そうなうなずきを見せる。
3182 = "Thấy tôi hỏi vặn lại ngay lập tức, Hachiroku cũng gật đầu tỏ vẻ hài lòng."
# 【ハチロク】
# display as 八六
# JP: 「やはり、お気づきになられましたか。\n\\x%l保線;#00ffc040;保線%l;#;の質が、いささか低下しておりますね？」
2226 = "「Quả nhiên là ngài cũng nhận ra sao. Chất lượng \\x%l保線;#00ffc040;bảo trì đường ray%l;#; có vẻ hơi đi xuống nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nが、今後は回復してくれるだろう」
2292 = "「Đúng vậy. Nhưng, từ giờ trở đi chắc sẽ hồi phục lại thôi.」"
# monologue
# JP: 御一夜鉄道株式会社は現状、\n特に\\x%l保線;#00ffc040;保線%l;#;に関して、ボランティア頼りの部分が大きい。
2926 = "Công ty Đường sắt Ohitoyo hiện tại, đặc biệt là về mảng \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, phụ thuộc rất lớn vào tình nguyện viên."
# monologue
# JP: その指導監督を出来る人材も、\n今のところ、極めて限られてしまってもいる。
3142 = "Nhân lực có khả năng hướng dẫn và giám sát việc đó, hiện tại cũng vô cùng hạn chế."
# 【ハチロク】
# display as 八六
# JP: 「まぁ、今回は……\\x%l三角線;#00ffc040;[さんかくせん,2]三角線%l;#;の新設もあり、\n\\x%l台枠;#00ffc040;台枠%l;#;交換もあり、でしたからね」
1987 = "「Dạ, lần này thì...... vừa mới xây dựng thêm \\x%l三角線;#00ffc040;đường tam giác%l;#;, lại vừa phải thay \\x%l台枠;#00ffc040;khung gầm%l;#; nữa mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのどちらにも区切りがついた。\n既設路線の\\x%l保線;#00ffc040;保線%l;#;にも、眼と手が行き届くようになるさ」
1982 = "「Cả hai việc đó đều đã xong xuôi rồi. Việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#; cho các tuyến hiện tại rồi cũng sẽ được quan tâm và chăm sóc kỹ lưỡng thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「眼と、手……」
2509 = "「Quan tâm, và chăm sóc......」"
# monologue
# JP: ハチロクはそっと手を広げ、\n噛みしめるようにして、僕の言葉を繰り返す。
2783 = "Hachiroku khẽ dang rộng hai tay, và lặp lại lời tôi như thể đang nghiền ngẫm."
# 【ハチロク】
# display as 八六
# JP: 「たくさんを、\\x%l8620;#00ffc040;8620%l;#;に注いでいただけました」
1643 = "「Mọi người đã dành rất nhiều tâm huyết cho \\x%l8620;#00ffc040;8620%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――本当にたくさんだったな」
2127 = "「Ừ——thật sự là rất nhiều.」"
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;を走らせてやりたい――\nそうした気持ちが、機関庫中に満ち満ちていた。
2940 = "Mong muốn được thấy \\x%l8620;#00ffc040;8620%l;#; lăn bánh—— Cảm xúc đó đã ngập tràn khắp xưởng đầu máy."
# monologue
# JP: 直接\\x%l8620;#00ffc040;8620%l;#;に手を触れずとも、炊き出しや清掃や事務処理で、\n僕らはずっと、支えてもらい続けてた。
2854 = "Dù không trực tiếp chạm tay vào \\x%l8620;#00ffc040;8620%l;#;, nhưng qua việc nấu ăn, dọn dẹp hay xử lý giấy tờ, chúng tôi vẫn luôn được mọi người hỗ trợ."
# 【ハチロク】
# display as 八六
# JP: 「とても、ありがたいことと存じます」
2219 = "「Em cảm thấy vô cùng biết ơn ạ.」"
# monologue
# JP: キャブをぐるりと見渡して、\nハチロクの手が、\\x%l逆転機;#00ffc040;逆転機%l;#;ハンドルを優しく撫でる。
2801 = "Hachiroku đưa mắt nhìn quanh buồng lái, rồi nhẹ nhàng vuốt ve tay cầm \\x%l逆転機;#00ffc040;cần đảo chiều%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「今日の乗り味の柔らかさは、きっとそうした、\nたくさんの手によって産まれたものかと存じます」
2003 = "「Sự êm ái của chuyến đi hôm nay, chắc chắn là, được tạo nên từ rất nhiều bàn tay như thế ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そのとおりだな」
2145 = "「Ừ——đúng là vậy.」"
# monologue
# JP: 感傷的な物言いにも聞こえるが、\n端的な事実を示してもいる。
3140 = "Nghe có vẻ hơi đa cảm, nhưng nó cũng phản ánh một sự thật hiển nhiên."
# monologue
# JP: 部品の選別、徹底した磨きこみに、丁寧な注油――\nそうした細かな積み重ねが、乗り味を変化させるのだから。
2865 = "Lựa chọn linh kiện, đánh bóng kỹ lưỡng, tra dầu cẩn thận—— Chính những tích lũy nhỏ nhặt đó đã làm thay đổi cảm giác lái."
# 【双鉄】
# display as 雙鐵
# JP: 「が、それだけでもない」
1984 = "「Nhưng, không chỉ có vậy đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「ええ、もちろん。双鉄様の運転技術も――」
2294 = "「Vâng, tất nhiên rồi. Kỹ thuật lái tàu của ngài Soutetsu cũng——」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなのはごくごく小さな要素さ」
2313 = "「Cái đó chỉ là yếu tố cực kỳ nhỏ thôi.」"
# monologue
# JP: 手が出る、自然に。
2988 = "Tay tôi đưa ra, một cách tự nhiên."
# monologue
# JP: ハチロクの帽子を軽く持ち上げ、\n柔らかな髪を、思う存分に撫で回す。
3206 = "Tôi nhẹ nhàng nhấc mũ của Hachiroku lên, và thỏa thích vuốt ve mái tóc mềm mại của em ấy."
# 【ハチロク】
# display as 八六
# JP: 「そ、双鉄様？」
2516 = "「Ng-Ngài Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「お前の復調が一番大きい」
2014 = "「Việc em phục hồi phong độ mới là yếu tố lớn nhất.」"
# monologue
# JP: どれほどの眼と手と熱意でも、方向付けがなされなければ、\n無為とも……どころか、有害とさえなり得てしまう。
3074 = "Dù có bao nhiêu sự quan tâm, chăm sóc và nhiệt huyết đi chăng nữa, nếu không được định hướng đúng đắn, thì cũng thành vô ích...... thậm chí còn có thể gây hại."
# 【双鉄】
# display as 雙鐵
# JP: 「さすがはトップナンバーと、\nメーカーの[ふち]淵さんまでもが大いに感心してたじゃないか」
2481 = "「Đến cả anh Fuchi của nhà sản xuất cũng phải hết lời khen ngợi em đúng là chiếc xe đầu tiên cơ mà.」"
# 【ハチロク】
# display as 八六
# JP: 「それは――」
2494 = "「Chuyện đó——」"
# monologue
# JP: 顔が、微妙にこわばってしまう。
2876 = "Khuôn mặt em ấy, có chút cứng đờ."
# monologue
# JP: いささか調子に乗りすぎたかと、\n撫でる手を止め帽子を戻す。
2983 = "Chắc tôi hơi quá đà rồi, tôi dừng tay lại và đội mũ lại cho em ấy."
# 【ハチロク】
# display as 八六
# JP: 「かつてのわたくしが、\n十分な仕事をできていなかっただけのことです」
2217 = "「Chỉ là trước đây em, đã không hoàn thành tốt công việc của mình thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
2096 = "「Hừm.」"
# monologue
# JP: そういう見方も出来てしまうと、\nそこは納得せざるを得ない。
2971 = "Nếu nhìn nhận theo cách đó, thì tôi cũng đành phải đồng ý."
# monologue
# JP: 復元のときと、今回と――ハチロクが飛ばす指示にせよ、\n質問に対する回答にせよ、量も精度も段違いだったから。
3158 = "So với lúc phục chế, lần này——dù là những chỉ thị Hachiroku đưa ra, hay câu trả lời cho các câu hỏi, cả về số lượng lẫn độ chính xác đều khác biệt một trời một vực."
# 【ハチロク】
# display as 八六
# JP: 「もともとの\\x%l台枠;#00ffc040;台枠%l;#;の寿命も、\nあるいは、わたくしが最初から万全であれば――」
2192 = "「Ngay cả tuổi thọ của \\x%l台枠;#00ffc040;khung gầm%l;#; ban đầu, nếu như ngay từ đầu em ở trạng thái hoàn hảo thì có lẽ——」"
# 【双鉄】
# display as 雙鐵
# JP: 「仮に、もう十年、\\x%l台枠;#00ffc040;台枠%l;#;の寿命を延ばせていたとして、\n事態は、今よりよほど困難になっていただろう」
2089 = "「Giả sử như tuổi thọ của \\x%l台枠;#00ffc040;khung gầm%l;#; được kéo dài thêm mười năm nữa, thì tình hình có lẽ sẽ còn khó khăn hơn bây giờ nhiều.」"
# 【ハチロク】
# display as 八六
# JP: 「あ」
2100 = "「A.」"
# monologue
# JP: ハチロクもすぐにわかってくれる。
2769 = "Hachiroku cũng hiểu ngay lập tức."
# monologue
# JP: 仮に、何の手もなく十年後を迎えていたなら――\nそのときの鉄道環境は、今よりよほど悪くあろうと。
2839 = "Giả sử, mười năm nữa trôi qua mà không có bất kỳ biện pháp nào—— Môi trường đường sắt lúc đó chắc chắn sẽ còn tồi tệ hơn bây giờ rất nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「見方を変えれば、これこそ幸いだったのだ。\n大丈夫――僕らは、一番良い道を進んできている」
2264 = "「Nếu thay đổi góc nhìn, thì đây chính là điều may mắn. Không sao đâu——chúng ta đang đi trên con đường tốt nhất rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「そのことでしたら、もとより承知をしております」
2460 = "「Về chuyện đó, em vốn đã hiểu rõ rồi ạ.」"
# monologue
# JP: 床に降り立ち、ハチロクは、\n\\x%l整備体;#00ffc040;整備体%l;#;へと\\x%lタブレット;#00ffc040;タブレット%l;#;を換える。
3195 = "Bước xuống sàn, Hachiroku chuyển \\x%lタブレット;#00ffc040;thẻ bảng%l;#; sang \\x%l整備体;#00ffc040;thân chính%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様が、ともに歩んでくださっているのですから」
2163 = "「Bởi vì có ngài Soutetsu, đang cùng bước đi với em mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク……」
2024 = "「Hachiroku......」"
# monologue
# JP: それはむしろ、僕が言うべきことだろう。\nハチロクが、共に居てくれたから――
3238 = "Đó đáng ra phải là lời tôi nói mới đúng. Bởi vì có Hachiroku ở bên cạnh tôi——"
# 【双鉄】
# display as 雙鐵
# JP: 「ほら、見てくれ」
2019 = "「Này, nhìn đi.」"
# monologue
# JP: 手を差し出せば、\nハチロクは再び笑ってくれる。
3099 = "Tôi đưa tay ra, Hachiroku lại mỉm cười."
# 【ハチロク】
# display as 八六
# JP: 「今さら見ずとも。\n最初から、ずうっと見ていました」
2041 = "「Giờ ngài không cần cho em xem đâu. Từ đầu đến giờ, em vẫn luôn nhìn ngài mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2295 = "「是嗎」" 
# monologue
# JP: ――震えなかった。\n乗車前にも運転中も、ただの一度も。
1613 = "——Tay tôi không hề run. Từ lúc trước khi lên tàu cho đến khi đang lái, không một lần nào."
# monologue
# JP: 吐き気もめまいもわずかも感じず、\n今はただただ、すっきりしている。
2732 = "Không hề cảm thấy buồn nôn hay chóng mặt, hiện tại tôi chỉ thấy hoàn toàn sảng khoái."
# 【双鉄】
# display as 雙鐵
# JP: 「お前のおかげで、僕の、この手は――」
2297 = "「Nhờ có em, mà đôi tay này của tôi——」"
# monologue
# JP: ぎゅうっと握りこんでたものを、\n手放せそうな気がしている。
2950 = "Tôi cảm thấy mình đã có thể buông bỏ thứ mà tôi luôn nắm chặt bấy lâu nay."
# monologue
# JP: 手放してもなお居てくれるなら、それでいい。\n手放して遠く離れていくなら、またそれもいい。
2884 = "Nếu buông bỏ mà nó vẫn ở lại, thì cũng tốt. Nếu buông bỏ mà nó rời xa, thì cũng chẳng sao."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2517 = "「Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
2140 = "「Ừ.」"
# monologue
# JP: ハチロクが、そっと手のひらを載せてくる。\n迷わず、その手を握りしめる。
2788 = "Hachiroku khẽ đặt lòng bàn tay lên tay tôi. Không chút do dự, tôi nắm chặt lấy bàn tay ấy."
# 【ハチロク】
# display as 八六
# JP: 「この先も――\nきっと、この手でわたくしを」
2005 = "「Từ nay về sau—— Nhất định, hãy dùng đôi tay này để dẫn dắt em nhé.」"
# monologue
# JP: （ゴンッ！　ゴンっ！）
3307 = "（Cộc! Cộc!）"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ハチロク、ちょこーっと良かと？」
2511 = "「Anh hai, Hachiroku, cho em hỏi một xíu được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2087 = "「Ây da.」"
# monologue
# JP: いかん。
3230 = "Không ổn rồi."
# monologue
# JP: レビューが終わっているのだ。\n速やかに、各部点検を僕らも行うべきだった。
2948 = "Đánh giá xong rồi. Đáng lẽ chúng tôi cũng phải nhanh chóng đi kiểm tra các bộ phận mới phải."
# 【双鉄】
# display as 雙鐵
# JP: 「構わん。すまん。今すぐに出る」
2068 = "「Không sao. Xin lỗi nhé. Bọn anh ra ngay đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「――にぃに、どぎゃんと？」
1654 = "「——Anh hai, sao rồi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。この短い区間であったにしては、\n\\x%l動輪;#00ffc040;動輪%l;#;が、熱を持ちすぎているような気もするが……」
2132 = "「Ừm. Với một đoạn đường ngắn thế này, anh cảm giác \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; đang bị quá nhiệt thì phải......」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2100 = "「啊」" 
# monologue
# JP: 車体向こうのチェックを終えたのだろう。\nちょうど、ハチロクと凪も戻ってきた。
3233 = "Chắc là đã kiểm tra xong phía bên kia thân xe rồi. Hachiroku và Nagi vừa vặn quay lại."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクはどう思う？」
2027 = "「Hachiroku nghĩ sao?」"
# monologue
# JP: 感じたことを伝えれば、\nハチロクはその手を\\x%l動輪;#00ffc040;動輪%l;#;に触れさせる。
2778 = "Nghe tôi nói vậy, Hachiroku liền đặt tay lên \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「確かにいささか熱いですが――気温と、\\x%l踏面;#00ffc040;踏面%l;#;の状態と、\n\\x%lフランジ;#00ffc040;フランジ%l;#;を削り直した影響との、単純な複合でしょう」
2360 = "「Quả thật là hơi nóng——nhưng có lẽ chỉ là do sự kết hợp đơn thuần giữa nhiệt độ, tình trạng \\x%l踏面;#00ffc040;mặt lăn bánh xe%l;#;, và ảnh hưởng từ việc gọt lại \\x%lフランジ;#00ffc040;gờ bánh xe%l;#; thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なるほどな」
2105 = "「À, ra là vậy.」"
# 【凪】
# display as 凪
# JP: 「\\x%lフランジ;#00ffc040;フランジ%l;#;？　って、何ばい？」
1646 = "「\\x%lフランジ;#00ffc040;Gờ bánh xe%l;#;? Là cái gì vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「これでございますよ、凪様」
2206 = "「Là cái này đây, Nagi.」"
# monologue
# JP: ハチロクが線路の脇にしゃがみ込み、\n\\x%l動輪;#00ffc040;動輪%l;#;の奥を指し示す。
2774 = "Hachiroku ngồi xổm bên cạnh đường ray, chỉ vào phần bên trong của \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「ここ、\\x%l動輪;#00ffc040;動輪%l;#;に出っ張りがあるのが見えますか？」
2479 = "「Chỗ này, em có thấy phần nhô ra trên \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; không?」"
# 【凪】
# display as 凪
# JP: 「あ、ほんとばい。\nこんなんなってるの気づかんかったばい」
2113 = "「A, đúng thiệt nè. Em hổng để ý là nó có hình dạng thế này luôn đó.」"
# 【ハチロク】
# display as 八六
# JP: 「この出っ張りが、\\x%lフランジ;#00ffc040;フランジ%l;#;です。これがあるから、\nカーブの時にも脱線をしづらくなるのです」
2462 = "「Phần nhô ra này chính là \\x%lフランジ;#00ffc040;gờ bánh xe%l;#;. Nhờ có nó mà tàu mới khó bị trật bánh khi vào cua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、走っていくうち、\\x%lフランジ;#00ffc040;フランジ%l;#;も段々と摩耗する」
1985 = "「Nhưng trong quá trình chạy, \\x%lフランジ;#00ffc040;gờ bánh xe%l;#; cũng sẽ dần bị mài mòn.」"
# monologue
# JP: 内側に曲げた左手を線路に見立て、\n親指を立てた右の拳を\\x%l列車;#00ffc040;列車%l;#;に見立て、滑らせる。
2977 = "Tôi lấy bàn tay trái cong vào trong làm đường ray, nắm đấm phải dựng ngón cái lên làm \\x%l列車;#00ffc040;tàu%l;#; rồi trượt đi."
# monologue
# JP: カーブ時に\\x%lフランジ;#00ffc040;フランジ%l;#;が擦れる様子を、\nなんとなくだが、その手の動きで示してみせる。
2991 = "Bằng cử động của tay, tôi mô phỏng lại cảnh \\x%lフランジ;#00ffc040;gờ bánh xe%l;#; ma sát khi vào cua."
# 【凪】
# display as 凪
# JP: 「なるほどばい」
2306 = "「Thì ra là vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「ことに、\\x%l8620;#00ffc040;8620%l;#;は\\x%l動輪;#00ffc040;動輪%l;#;が\\x%l空転;#00ffc040;空転%l;#;しづらい構造ですから、\n摩耗も比較的激しいものとなります」
2038 = "「Đặc biệt là, \\x%l8620;#00ffc040;8620%l;#; có cấu trúc khiến \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; khó bị \\x%l空転;#00ffc040;quay trơn%l;#;, nên độ mài mòn cũng tương đối nghiêm trọng.」"
# 【凪】
# display as 凪
# JP: 「それで、削り直しばするとね？」
2256 = "「Thế nên mới phải gọt lại hở?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり」
2402 = "「Chính xác.」"
# monologue
# JP: 僕らも折に触れ行うことだが、\nやはり、本職の仕上がりは違う。
3011 = "Dù chúng tôi thỉnh thoảng cũng làm việc này, nhưng quả nhiên thành phẩm của thợ chuyên nghiệp vẫn khác bọt."
# monologue
# JP: \\x%l保線;#00ffc040;保線%l;#;状態の悪さをことさらに感じてしまったのも、逆に、\n\\x%l動輪;#00ffc040;動輪%l;#;の状態が、普段に増してよかったからかもしれない。
3145 = "Việc tôi đặc biệt cảm nhận rõ tình trạng \\x%l保線;#00ffc040;bảo trì đường ray%l;#; kém, ngược lại, có thể là do tình trạng \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; tốt hơn bình thường."
# 【ハチロク】
# display as 八六
# JP: 「そういう事情でございますので、\\x%l動輪;#00ffc040;動輪%l;#;の加熱については、\nご心配いただくような事象ではないかと存じます」
2160 = "「Vì những lý do đó, em nghĩ việc \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; bị quá nhiệt không phải là vấn đề đáng lo ngại đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。では、僕の方からはもう何も無いな。\nハチロクはどうだ？」
2139 = "「Hừm. Vậy thì phía tôi không còn gì nữa. Hachiroku thì sao?」"
# 【ハチロク】
# display as 八六
# JP: 「私も、油滲みの一つも確認できませんでした」
2250 = "「Phía em cũng không thấy có chỗ nào bị rỉ dầu cả.」"
# monologue
# JP: ほうっと、満足そうな息。\nハチロクの頬はバラ色だ。
3266 = "Hachiroku thở hắt ra vẻ hài lòng. Đôi gò má em ửng hồng."
# 【ハチロク】
# display as 八六
# JP: 「[ゴーハチロクニイサン,4]58623の\\x%l台枠;#00ffc040;台枠%l;#;。これなら、長く――\n大切に、使わせていただけそうです」
2539 = "「\\x%l台枠;#00ffc040;Khung gầm%l;#; của 58623. Với cái này, chúng ta có thể sử dụng lâu dài—— và trân trọng nó.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら！　にぃに！」
2282 = "「Vậy thì! Anh hai!」"
# monologue
# JP: 大きな声と同時に体まで乗り出してくる。
3042 = "Cùng với giọng nói lớn, con bé rướn người tới."
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩のお願い、叶えてもらえると？」
2498 = "「Mong muốn của chị Kisaki, anh có thể thực hiện được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、あの話か」
2124 = "「À, chuyện đó sao.」"
# 【ハチロク】
# display as 八六
# JP: 「あの話？\n……ああ、ポーレット様に呼ばれたときに？」
2492 = "「Chuyện đó? ......À, lúc được Thị trưởng Paulette gọi đến ấy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。流れで話しそびれたが――\nお前とも、相談しなければいけなかったんだ」
2128 = "「Ừ. Lúc nãy thuận đà nên quên khuấy mất—— Đáng lẽ tôi cũng phải bàn bạc với em nữa.」"
# 【稀咲】
# display as 稀咲
# JP: 「お待たせしたね」
2414 = "「Để mọi người đợi lâu rồi.」"
# monologue
# JP: 銀行から直で来たのだろう。\nスーツスタイルの宝生稀咲は、席ヘ着くなり話し始める。
3095 = "Chắc là đi thẳng từ ngân hàng đến. Houshou Kisaki trong bộ âu phục, vừa ngồi xuống đã bắt đầu nói."
# 【稀咲】
# display as 稀咲
# JP: 「日々姫からの電話で概要は聞いた。\n双鉄が話し合いたいのは、どの点なんだい？」
2174 = "「Tôi đã nghe sơ qua qua điện thoại của Hibiki rồi. Điểm mà anh Soutetsu muốn bàn bạc là gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「術仙炭鉱廃駅に降ろして欲しいとの希望だが――\nまず、その理由を教えて欲しい」
2016 = "「Cô muốn chúng tôi đưa đến ga bỏ hoang của mỏ than Jutsusen—— Nhưng trước tiên, tôi muốn biết lý do.」"
# 【稀咲】
# display as 稀咲
# JP: 「調査さ。あそこには、\\x%lエアクラ;#00ffc040;エアクラ%l;#;では入れないからね。\n調査のために、鉄道で連れて行ってもらいたいんだ」
2045 = "「Là để khảo sát. Nơi đó không thể vào bằng \\x%lエアクラ;#00ffc040;Aircra%l;#; được. Vì mục đích khảo sát, tôi muốn nhờ mọi người đưa đi bằng đường sắt.」"
# 【ハチロク】
# display as 八六
# JP: 「なんの調査、でございますか？」
2377 = "「Khảo sát gì vậy ạ?」"
# 【稀咲】
# display as 稀咲
# JP: 「あの一帯は市有地――御一夜市が\n所有している土地だってことは、知っているかな」
2488 = "「Khu vực đó là đất công—— Mọi người có biết đó là đất thuộc sở hữu của thành phố Ohitoyo không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
2307 = "「Vậy sao?」"
# monologue
# JP: 聞けば即座に、ポーレットは頷き返す。
2968 = "Nghe tôi hỏi, Paulette lập tức gật đầu đáp."
# 【ポーレット】
# display as 波萊特
# JP: 「はい。炭鉱会社が撤退するとき、寄付を受けたそうです。\nあの広さだと、固定資産税と維持費が嵩むからかと」
2299 = "「Vâng. Nghe nói lúc công ty than rút lui, họ đã quyên tặng lại. Chắc là do diện tích lớn thế kia thì thuế tài sản cố định và phí bảo trì sẽ rất cao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2043 = "「Ra là vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「現状の市議会は御一夜鉄道株式会社に極めて好意的だ。\n有力な再開発の議案を出せば、恐らく通る」
2346 = "「Hội đồng thành phố hiện tại cực kỳ có thiện cảm với Công ty Đường sắt Ohitoyo. Nếu đưa ra một dự luật tái phát triển khả thi, khả năng cao sẽ được thông qua.」"
# 【ハチロク】
# display as 八六
# JP: 「再開発……\nそのための再調査なのですね」
1997 = "「Tái phát triển...... Vì vậy mới cần khảo sát lại nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。キミたちのぶちあげた大九洲SL構想――\n“ボクは”、あれに目があると見込んでいる」
2135 = "「Ừ. Kế hoạch Grand Kyushu SL mà mọi người đưa ra—— “Cá nhân tôi” đánh giá rất cao tiềm năng của nó.」"
# monologue
# JP: ボクは、をやけに強調しているその口調。\n自然と、疑問が誘導される。
3194 = "Giọng điệu của cô ấy cố tình nhấn mạnh chữ “Cá nhân tôi”. Làm dấy lên sự nghi ngờ một cách tự nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「……[くまもと,1]隈元銀行としては、反対なのか？」
1706 = "「......Ngân hàng Kumamoto thì phản đối sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「行員レベルでは、誘致断念の空気が強めかな。\nけど――頭取はまだ、\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を諦めてない」
2364 = "「Ở cấp độ nhân viên thì bầu không khí từ bỏ việc mời gọi đang khá mạnh. Nhưng——Giám đốc vẫn chưa từ bỏ việc mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# 【ポーレット】
# display as 雙鐵＆波萊特
# JP: 『「っ！？」\n「なっ！」』
2550 = "『「!?」 「Cái gì!」』"
# monologue
# JP: 驚愕の声を重ねてしまい、\n続く言葉を譲り合っての沈黙が一瞬垂れ込める。
2767 = "Cả hai cùng thốt lên vì kinh ngạc, rồi nhường nhau nói tiếp khiến không gian rơi vào im lặng trong thoáng chốc."
# monologue
# JP: そこにするりと、稀咲が言葉を滑らせる。
3113 = "Thấy vậy, Kisaki liền nói tiếp."
# 【稀咲】
# display as 稀咲
# JP: 「議会感情と市民感情は異なるものさ。駅周辺を外れれば\n市民の――そうだね、半数程はまだ鉄道を信用してない」
2413 = "「Cảm xúc của hội đồng và cảm xúc của người dân là hai thứ khác nhau. Ra khỏi khu vực quanh ga thì người dân——đúng rồi, khoảng một nửa vẫn chưa tin tưởng vào đường sắt.」"
# 【ハチロク】
# display as 八六
# JP: 「信用……」
2020 = "「Tin tưởng......」"
# monologue
# JP: 言われてみれば、そうかとも思う。
3239 = "Nghe vậy, tôi cũng thấy có lý."
# monologue
# JP: バーベキュー\\x%l列車;#00ffc040;列車%l;#;で、高めてくれたであろう期待を、\n現状、僕達は裏切ってしまっているに等しいのだから。
3088 = "Bởi vì hiện tại, chúng tôi gần như đã phản bội lại những kỳ vọng được thổi bùng lên từ chuyến \\x%l列車;#00ffc040;tàu%l;#; BBQ."
# 【ポーレット】
# display as 波萊特
# JP: 「……確かに、[ほうしょう,1]宝生さんなら県政とか国政レベルの\n働きかけで、強硬手段を取れるかもしれません――けど」
1695 = "「......Quả thực, nếu là ông Houshou thì có thể dùng các mối quan hệ ở cấp tỉnh hoặc cấp quốc gia để sử dụng biện pháp mạnh——Nhưng mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「『そんなことをしたら、市が完全に割れてしまう』」
1660 = "『Làm thế thì thành phố sẽ hoàn toàn bị chia rẽ mất.』"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
2103 = "「!」"
# monologue
# JP: 先回りをされたのだろうか――\n稀咲の言葉に、ポーレットは息を呑み込まされる。
3002 = "Bị đoán trúng tim đen sao—— Lời của Kisaki khiến Paulette phải nín thở."
# monologue
# JP: 稀咲は小さく頷いて、\n芝居がかった仕草で肩をすくめてみせる。
3114 = "Kisaki gật đầu nhẹ, và nhún vai với điệu bộ hơi kịch tính."
# 【稀咲】
# display as 稀咲
# JP: 「あの人はそれを良しとする。対立や、時として憎しみが\n発展や成長を促すことは確かにあるしね」
2493 = "「Người đó lại cho rằng thế là tốt. Xung đột, hay đôi khi là sự thù ghét, quả thực có thể thúc đẩy sự phát triển và trưởng thành.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、そう……だ、が」
2400 = "「Chuyện đó, thì đúng là...... vậy, nhưng.」"
# monologue
# JP: ……視線を稀咲に向けられずとも、自覚している。\n反発や、憎しみこそが、僕を成長させてくれたと。
1630 = "......Dù không nhìn thẳng vào Kisaki, nhưng tôi vẫn tự ý thức được. Chính sự phản kháng và thù hận đã giúp tôi trưởng thành."
# monologue
# JP: \\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の話がもしもなければ、\n僕の深い部分はきっと、まだ死んだままに生きていた。
3161 = "Nếu không có chuyện mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, chắc chắn phần sâu thẳm trong tôi vẫn sẽ tiếp tục sống trong sự chết lặng."
# 【ハチロク】
# display as 八六
# JP: 「ですが……そのような発展は、\n長期的に続くものとは思えませんが――」
2073 = "「Nhưng mà...... em không nghĩ sự phát triển như vậy sẽ kéo dài được lâu đâu——」"
# 【稀咲】
# display as 稀咲
# JP: 「さぁ、どうだろうね。けど――極論すれば、\nあの人とすれば、５０年も保てば十分なのかもしれない」
2468 = "「Chà, ai biết được. Nhưng——nói cực đoan thì, đối với người đó, giữ được 50 năm có lẽ là quá đủ rồi.」"
# monologue
# JP: あの人、と稀咲は冷たく繰り返す。
1620 = "Người đó, Kisaki lạnh lùng lặp lại."
# monologue
# JP: ５０年……それは恐らく、稀咲が見込む、\nあの人――宝生元忠の余命の長さであるのだろう。
2736 = "50 năm...... Đó có lẽ là khoảng thời gian mà Kisaki dự đoán, cho phần đời còn lại của người đó——Houshou Mototada."
# 【れいな】
# display as 玲奈
# JP: 「町は、だけど――\nその先も、ずっと続いていくんですよぉ？」
2074 = "「Nhưng mà thị trấn—— Sau đó vẫn sẽ tiếp tục tồn tại cơ mà?」"
# monologue
# JP: 素朴極まるれいなの言葉に、ハチロクが同意の声を重ねる。
3057 = "Hachiroku cũng lên tiếng đồng tình với lời nói hết sức ngây thơ của Reina."
# 【ハチロク】
# display as 八六
# JP: 「発展がいつか途絶え、対立はけれど残り続ける。\nそのような未来は、御一夜にふさわしいとは思えません」
2345 = "「Sự phát triển rồi sẽ có lúc dừng lại, nhưng xung đột thì vẫn mãi tồn tại. Một tương lai như vậy, em không nghĩ là phù hợp với Ohitoyo đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、信頼を取り戻せばいい」
2503 = "「Nếu vậy, chỉ cần lấy lại lòng tin là được.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね。しかし、そうするためには時間がかかる。\n地道な積み重ねは、地道であるゆえ、波及しづらい」
2319 = "「Đúng vậy. Tuy nhiên, để làm được điều đó cần có thời gian. Những nỗ lực tích lũy từng chút một, chính vì nó âm thầm nên rất khó để lan tỏa.」"
# monologue
# JP: ん、と短く息を飲む音。\nポーレットの声は、普段以上に慎重な響きを帯び始める。
3066 = "Có tiếng nuốt nước bọt khẽ vang lên. Giọng Paulette bắt đầu mang vẻ thận trọng hơn mức bình thường."
# 【ポーレット】
# display as 波萊特
# JP: 「……宝生さんの動きは、それほど活発なのですか？」
1691 = "「......Động thái của ông Houshou tích cực đến mức đó sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「さて、どうだろうね。身近に知っている分、ボクが、\n過大評価をしてしまっているだけの可能性もある」
2469 = "「Chà, ai biết được. Cũng có thể do tôi biết quá rõ về ông ta, nên mới đánh giá quá cao không chừng.」"
# monologue
# JP: （ああ――）
3310 = "（A——）"
# monologue
# JP: その一言に、少し、わかったような気になる。\n稀咲がこうも急速に、僕ら側に与してくれた理由には――
3139 = "Lời nói đó khiến tôi cảm thấy như đã hiểu ra phần nào. Lý do mà Kisaki lại nhanh chóng đứng về phía chúng tôi như vậy——"
# monologue
# JP: 父であり頭取である宝生元忠への対抗心、\nそれも、恐らく、大いに影響しているのだろうと。
2874 = "Tâm lý đối kháng với Houshou Mototada, người vừa là cha vừa là Giám đốc ngân hàng, có lẽ đã ảnh hưởng rất lớn đến cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「……どうあれ、調査を急いで損はないわけか」
1671 = "「......Dù sao thì, khẩn trương khảo sát cũng chẳng mất gì nhỉ.」"
# 【稀咲】
# display as 稀咲
# JP: 「図面上では確認したし、いくらかのプランも立てた」
2243 = "「Tôi đã xác nhận trên bản vẽ, và cũng lập vài kế hoạch rồi.」"
# monologue
# JP: 言いつつ、稀咲は鞄からペーパーを出し、配り始める。
3248 = "Vừa nói, Kisaki vừa lấy tài liệu từ trong túi ra và bắt đầu phát."
# 【双鉄】
# display as 雙鐵
# JP: 「……今日は、[うらかみ,1]浦上さんは一緒じゃないのか？」
1676 = "「......Hôm nay anh Urakami không đi cùng sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「[うらかみ,1]浦上なら送り返された。エアロ＝クラフテック社は\n近日中に、別の担当者を送りこんでくるみたいだ」
2332 = "「Urakami đã bị gọi về rồi. Có vẻ như trong vài ngày tới, công ty Aero-Craftech sẽ cử một người phụ trách khác đến.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！！？」
2538 = "「!!?」"
# 【稀咲】
# display as 稀咲
# JP: 「浦上ほどに公正な判断をくださない――\nあの人の意向にそって動くであろう、新担当をね」
2265 = "「Một người phụ trách mới, không đưa ra phán đoán công bằng như Urakami—— mà sẽ hành động theo ý muốn của người đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……この期に及んで、\\x%lエアクラ;#00ffc040;エアクラ%l;#;社もまだ、\n御一夜への工場設置をあきらめてはいないのか」
1672 = "「......Đến nước này rồi mà công ty \\x%lエアクラ;#00ffc040;Aircra%l;#; vẫn chưa từ bỏ việc đặt nhà máy ở Ohitoyo sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「大九洲SL構想をボクが支持する理由と同じさ。\n九洲中央を睨むには、良い土地なんだよ、御一夜は」
2471 = "「Cũng giống như lý do tôi ủng hộ Kế hoạch Grand Kyushu SL thôi. Ohitoyo là một vùng đất đắc địa để nhắm đến khu vực trung tâm Kyushu mà.」"
# 【れいな】
# display as 玲奈
# JP: 「あきらめさせるには、どうしたらいいんですかぁ？」
2240 = "「Làm sao để họ chịu từ bỏ vậy ạ?」"
# monologue
# JP: れいなの、またも素朴な疑問。\nさしもの稀咲も、張り詰めていた表情を少し緩める。
3138 = "Lại là một câu hỏi ngây thơ của Reina. Ngay cả Kisaki cũng phải giãn nét mặt căng thẳng ra một chút."
# 【稀咲】
# display as 稀咲
# JP: 「それは、双鉄がさっき言ったとおりだよ」
2204 = "「Điều đó thì đúng như lời anh Soutetsu vừa nói đấy.」"
# 【凪】
# display as 凪
# JP: 「にーさん、なんば言うとったっけ？」
2170 = "「Anh Soutetsu vừa nói gì cơ?」"
# 【ふかみ】
# display as 深美
# JP: 「信頼だよ、凪ちゃん。\n双鉄さん、信頼を取り戻せばいいって」
2289 = "「Là lòng tin đó, bé Nagi. Anh Soutetsu nói là chỉ cần lấy lại lòng tin là được.」"
# 【稀咲】
# display as 稀咲
# JP: 「そう。議員ではなく、市民を完全に味方にすること。\n市民に嫌われて成り立つ商売など、ありえない」
2317 = "「Đúng vậy. Không phải hội đồng, mà là biến toàn bộ người dân thành đồng minh. Không có công việc kinh doanh nào tồn tại được nếu bị người dân ghét bỏ cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのための、このプランか」
2472 = "「Bản kế hoạch này là vì mục đích đó sao.」"
# monologue
# JP: 記念館と整備改修施設を併設させて、静態以上の整備をし、\nいつでも動ける――いわば半動態でSL達を保存する。
2915 = "Xây dựng nhà tưởng niệm kết hợp với cơ sở bảo dưỡng cải tạo, thực hiện bảo dưỡng ở mức độ cao hơn lưu tĩnh, để có thể vận hành bất cứ lúc nào——nói cách khác là bảo tồn các SL ở trạng thái bán động."
# monologue
# JP: 整備技術の継承と観光施設とを兼ねながら、実用車両の\nバックアップ用としても機能させようという構想だ。
2721 = "Kế hoạch này vừa kế thừa kỹ thuật bảo dưỡng, vừa kết hợp làm cơ sở tham quan du lịch, đồng thời đóng vai trò làm phương tiện dự phòng cho các xe đang vận hành thực tế."
# 【ハチロク】
# display as 八六
# JP: 「とても、興味深い案かと存じます」
2350 = "「Em thấy đây là một phương án rất thú vị ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「箱物は、市民の注意を引きつける一番早い手段だ。\nかけたお金は、そのまま本気度と見てもらえるからね」
2215 = "「Các công trình xây dựng là cách nhanh nhất để thu hút sự chú ý của người dân. Số tiền bỏ ra sẽ được xem như là thước đo cho mức độ nghiêm túc của chúng ta.」"
# 【ポーレット】
# display as 波萊特
# JP: 「けど、資金は」
2076 = "「Nhưng mà, tiền vốn thì sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「そのための持株会社設立案だ。もちろん、\n支店レベルで、低利での貸付けも行わせてもらいたい」
2258 = "「Đó là lý do tôi đề xuất thành lập công ty cổ phần. Tất nhiên, tôi cũng muốn chi nhánh có thể cho vay với lãi suất thấp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道他社との持株会社を設立すること――\n資金面でも、信用面でも、それが必須となるわけか」
2381 = "「Thành lập công ty cổ phần cùng các công ty đường sắt khác—— Cả về mặt vốn lẫn uy tín, đó là điều bắt buộc phải không.」"
# 【ハチロク】
# display as 八六
# JP: 「……持株会社への参加を促す――そのためにも、\n説得力のある資料が必要となるのですね？」
1699 = "「......Thúc đẩy việc tham gia công ty cổ phần——Để làm được điều đó, cũng cần phải có những tài liệu mang tính thuyết phục đúng không ạ?」"
# monologue
# JP: やっとわかってくれたかと言わんばかりの、強い頷き。
3111 = "Kisaki gật đầu mạnh một cái, như thể muốn nói cuối cùng mọi người cũng hiểu."
# 【稀咲】
# display as 稀咲
# JP: 「そのとおりだね。それだけでなく、\n現地を見れば、新しい案も出るかもしれない」
2401 = "「Đúng vậy. Không chỉ thế, nếu khảo sát thực địa, biết đâu lại nảy ra phương án mới.」"
# 【日々姫】
# display as 日日姬
# JP: 「ね、にぃに――こほんっ――兄さん。\nそういうことですから」
2197 = "「Nè, anh hai——e hèm——anh trai. Chuyện là như vậy đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「事情はわかった。僕としては全く異論が無い」
2235 = "「Tôi hiểu tình hình rồi. Về phần tôi thì hoàn toàn không có ý kiến gì.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしもです、双鉄様」
2238 = "「Em cũng vậy ạ, ngài Soutetsu.」"
# 【凪】
# display as 凪
# JP: 「そういうことなら、調査のお手伝いしたかばい！\nね、ふかみちゃんっ」
2278 = "「Nếu vậy thì em cũng muốn phụ một tay khảo sát nè! Đúng hông bé Fukami?」"
# 【ふかみ】
# display as 深美
# JP: 「う……うん。役にたてるかわからないけど――\n凪ちゃんといっしょなら、興味、ある、かも。です」
2144 = "「Ư...... ừm. Dù không biết có giúp ích được gì không—— nhưng nếu đi cùng bé Nagi, chắc là em cũng...... có hứng thú ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「大歓迎だよ。クマ川下りを――こういってはあれだが、\n潰さなかったキミ達の力を、ボクは高く評価している」
2528 = "「Rất hoan nghênh. Tuyến xuôi dòng sông Kuma——nói thế này thì hơi kỳ, nhưng tôi đánh giá rất cao năng lực của các em khi đã không để nó bị dẹp bỏ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、キャブにもう二人加わるわけか」
2477 = "「Nếu vậy, buồng lái sẽ có thêm hai người nữa sao.」"
# 【ハチロク】
# display as 八六
# JP: 「無理ではありませんが――かなり窮屈になりますね」
2514 = "「Cũng không phải là không được——nhưng sẽ khá chật chội đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あるいは……\n\\x%l8620;#00ffc040;8620%l;#;ではなく、\\x%lキハ07;#00ffc040;キハ07%l;#;に同乗する方が」
2251 = "「Hay là...... Thay vì \\x%l8620;#00ffc040;8620%l;#;, chúng ta cùng đi \\x%lキハ07;#00ffc040;KiHa 07%l;#; thì sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、それはちょっと」
2121 = "「A, chuyện đó thì hơi.」"
# monologue
# JP: 申し訳無さそうな顔をして、\nけれど、ポーレットの声には、迷いがない。
3065 = "Paulette lộ vẻ mặt áy náy, nhưng trong giọng nói lại không hề có sự do dự."
# 【ポーレット】
# display as 波萊特
# JP: 「非常事態でも無いのに、\n営業運転中の臨時停車は出来ませんよ」
2165 = "「Đâu phải tình huống khẩn cấp gì, sao có thể dừng tàu đột xuất khi đang chạy thương mại được chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは当然のことだったな。\nすまん、単純に思いつきを口に出してしまった」
2120 = "「À, cũng phải. Xin lỗi, tôi chỉ tiện miệng nói ra suy nghĩ thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「と、[レイナナエス,2]07s。ここのところ結構負荷がかかってますし、\n技術者さんも今いらしてますから――」
2483 = "「Với lại, 07S dạo này cũng phải chịu tải khá lớn, hơn nữa hiện tại các kỹ thuật viên cũng đang ở đây nên——」"
# monologue
# JP: 青い目がちらりとれいなを見る。\nれいなは、嬉しげにこっくり頷く。
2878 = "Đôi mắt xanh liếc nhìn Reina. Reina vui vẻ gật đầu."
# 【れいな】
# display as 玲奈
# JP: 「[ハチロクニイマル,3]8620が復活したら、すぐのタイミングで、\nエンジンのオーバーホールをお願いしたいんですぅ」
2369 = "「Đợi \\x%l8620;#00ffc040;8620%l;#; hoạt động trở lại, Reina muốn nhờ mọi người đại tu động cơ ngay luôn đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なるほどな。いい考えだ。\nぜひともそうしておくべきだろう」
2104 = "「À, ra là vậy. Ý kiến hay đấy. Chắc chắn là nên làm thế rồi.」"
# monologue
# JP: リミッター改造の影響もチェックしておくべきだろうし、\n負担も確かに、かなりかけてしまっていた。
2836 = "Việc cải tạo bộ giới hạn tốc độ cũng cần được kiểm tra lại ảnh hưởng, và quả thực con bé đã phải chịu tải khá nhiều."
# monologue
# JP: このタイミングで――というのは理にかなっている。\nキャブが窮屈になる程度、もとより何ほどのことでもない。
3246 = "Chọn thời điểm này——cũng rất hợp lý. Buồng lái có hơi chật chội một chút cũng chẳng sao."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、[ハチロクニイマル,3]8620の試験を急ぎ――完了し、営業運転に\n復帰でき次第、キハ[レイナナ,1]07のオーバーホールで良いか？」
2279 = "「Vậy thì, cứ gấp rút thử nghiệm \\x%l8620;#00ffc040;8620%l;#;——ngay khi hoàn tất và trở lại chạy thương mại, chúng ta sẽ đại tu KiHa 07 nhé?」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、双鉄様のお考えに賛成です」
2247 = "「Em tán thành suy nghĩ của ngài Soutetsu ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。\nそうしてもらえればこっちとしてもベストです」
2523 = "「Cảm ơn mọi người. Được vậy thì bên tôi cũng yên tâm.」"
# 【ハチロク】
# display as 八六
# JP: 「だとすると――当面の試験区間は、\n術仙炭鉱廃駅までの往復とすることとなりますか？」
2280 = "「Nếu vậy thì——đoạn đường chạy thử trước mắt, sẽ là chặng khứ hồi đến ga bỏ hoang mỏ than Jutsusen đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、術仙炭鉱廃駅どまりか」
2098 = "「Hừm, chỉ đến ga bỏ hoang mỏ than Jutsusen thôi sao.」"
# monologue
# JP: 試験区間は徐々に伸ばしていくべきだし、\n術仙炭鉱廃駅までなら、ちょうど手頃だ。
3070 = "Đoạn đường chạy thử nên được kéo dài dần dần, đến ga bỏ hoang mỏ than Jutsusen là vừa đẹp."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。\n止まるのに丁度いい目印があれば教えてくれ」
2327 = "「Paulette. Nếu có cột mốc nào vừa vặn để dừng tàu thì chỉ tôi với.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、あそこは簡単です。クマ川第四[きょうりょう,1]橋梁ありますよね、\nキハだと、あそこ超えてすぐに\\x%l制動;#00ffc040;制動%l;#;かけてます」
2122 = "「À, chỗ đó dễ lắm. Anh biết cầu sắt thứ tư qua sông Kuma chứ, nếu là KiHa thì vừa qua khỏi đó là phải \\x%l制動;#00ffc040;hãm phanh%l;#; ngay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「思ったより遅い――ああ、いや、御一夜からだと\n橋を過ぎ、軽い上り勾配を超えての駅か」
2316 = "「Muộn hơn tôi nghĩ——à, không, nếu đi từ Ohitoyo thì qua cầu xong, phải vượt qua một đoạn dốc thoai thoải mới tới ga nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうです。ですから」
2318 = "「Đúng vậy. Thế nên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。わかった、参考にさせてもらおう」
2137 = "「Ừ. Hiểu rồi, tôi sẽ tham khảo.」"
# monologue
# JP: とはいえこれは、保険の保険のような知識だ。
2727 = "Dù vậy, đây cũng chỉ là kiến thức phòng hờ cho chắc ăn thôi."
# monologue
# JP: ハチロクが今、絶好調でもあることだし、特に初回は、\n僕が余計なことせず、ハチロクの計算に任せた方が――
2781 = "Hiện tại Hachiroku đang có phong độ rất tốt, đặc biệt là lần đầu tiên này, tôi không nên làm gì thừa thãi, cứ để Hachiroku tính toán thì hơn——"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ハチロク？」
2149 = "「Hửm? Hachiroku?」"
# 【ハチロク】
# display as 八六
# JP: 「あ、いえっ」
2111 = "「A, không có gì ạ.」"
# monologue
# JP: どこか、ぼうっとしていたように思えたが、\n僕へと振り返る顔はいつものハチロクだ。
2723 = "Có vẻ em ấy hơi thẫn thờ một chút, nhưng khuôn mặt quay lại nhìn tôi vẫn là Hachiroku thường ngày."
# 【ハチロク】
# display as 八六
# JP: 「少し、考えていただけです、その……」
2242 = "「Em chỉ đang suy nghĩ một chút thôi, ừm......」"
# monologue
# JP: ハチロクの目が稀咲を、日々姫を、\n凪とふかみとを順番に見る。
2804 = "Ánh mắt Hachiroku lần lượt lướt qua Kisaki, Hibiki, Nagi và Fukami."
# 【ハチロク】
# display as 八六
# JP: 「術仙炭鉱廃駅どまりだと、[ゆのい,1]湯医まで行っての折り返しと、\n後進で御一夜まで戻るのと……いずれがよろしいかと」
2508 = "「Nếu chỉ đến ga bỏ hoang mỏ than Jutsusen, thì nên chạy tiếp đến Yui rồi vòng lại, hay là chạy lùi về Ohitoyo...... cách nào sẽ tốt hơn ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……試験初期の段階で、\n一気に[ゆのい,1]湯医まで走らせるのは避けたいな」
2464 = "「À...... Ở giai đoạn đầu chạy thử, tôi muốn tránh việc chạy một mạch đến Yui.」"
# 【ポーレット】
# display as 波萊特
# JP: 「――それは――そうですね……\n試験初期にあんまり長距離は……けど――あ、そうだ！」
1704 = "「——Chuyện đó——cũng đúng nhỉ...... Mới chạy thử mà đi xa quá thì...... Nhưng mà——A, đúng rồi!」"
# monologue
# JP: ぽんっ、と、ポーレットが手を打ち鳴らす。
3067 = "Paulette vỗ tay cái bốp."
# 【ポーレット】
# display as 波萊特
# JP: 「だったら、術仙炭鉱駅停車時の各部点検が終わったら、\n駅舎の調査をしてもらえませんか？」
2500 = "「Nếu vậy, sau khi dừng tàu tại ga mỏ than Jutsusen và kiểm tra xong các bộ phận, mọi người có thể khảo sát luôn nhà ga được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「駅舎か、なるほど。\n再開発をするのなら、駅舎も再利用するわけだしな」
2432 = "「Nhà ga sao, ra là vậy. Nếu đã tái phát triển thì cũng phải tái sử dụng nhà ga nữa mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうできるのか、できなくて、建て替えが必要なのか\n――運転モードのハチロクちゃんのセンサーでしたら」
2303 = "「Có thể làm được hay không, hay là cần phải xây mới lại ——Nếu là cảm biến của Hachiroku ở chế độ lái thì chắc chắn sẽ biết được.」"
# 【ハチロク】
# display as 八六
# JP: 「方法のご教示をいただければ、そのとおりに試験し、\nデータをあげていくことには問題ございません」
2066 = "「Nếu được hướng dẫn cách thức, em có thể tiến hành kiểm tra theo đúng như vậy, việc thu thập dữ liệu sẽ không thành vấn đề ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら、ひとまずそれでお願いできますか？」
2496 = "「Vậy thì, tạm thời nhờ mọi người như thế nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2140 = "「嗯」" 
# monologue
# JP: 長距離はやはりまだ走らせたくないし、\n\\x%l8620;#00ffc040;8620%l;#;を放置して稀咲たちの調査についてもいけん。
3090 = "Tôi vẫn chưa muốn cho tàu chạy đường dài, cũng không thể bỏ mặc \\x%l8620;#00ffc040;8620%l;#; để đi theo Kisaki khảo sát được."
# monologue
# JP: ポーレットの案は、\nかなり無駄の無いものに思える。
2993 = "Phương án của Paulette, có vẻ rất hợp lý và không hề dư thừa."
# 【双鉄】
# display as 雙鐵
# JP: 「了解した。では、そのように行おう」
2177 = "「Đã rõ. Vậy chúng ta sẽ làm như thế.」"
# 【稀咲】
# display as 稀咲
# JP: 「なら、出来るだけ早くで頼めるかな。\nスケジュールは最優先であけるから」
2502 = "「Vậy, nhờ mọi người sắp xếp càng sớm càng tốt nhé. Tôi sẽ ưu tiên lịch trình này lên hàng đầu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。予定を立て次第に連絡を入れる」
2182 = "「Rõ rồi. Ngay khi có kế hoạch tôi sẽ liên lạc.」"
# 【稀咲】
# display as 稀咲
# JP: 「ありがとう。有意な話し合いが出来て何よりだ。\n双鉄、みなさん。これから、よろしくおねがいします」
2524 = "「Cảm ơn mọi người. Một buổi thảo luận thật ý nghĩa. Anh Soutetsu, và mọi người. Từ nay mong được giúp đỡ nhiều hơn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、こちらこそ」
2093 = "「Vâng, chúng tôi cũng vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「お力添え、頼もしく存じます」
2309 = "「Có cô trợ sức, em thấy rất đáng tin cậy ạ.」"
# monologue
# JP: ひと通りの挨拶を終えればすぐさま、\n早足で稀咲は去っていく。
2903 = "Vừa dứt lời chào hỏi, Kisaki liền vội vã rời đi."
# monologue
# JP: あの急ぎよう――状況は、僕らが認識したより更に、\n切迫しているものかもしれない。
2879 = "Dáng vẻ vội vã đó——tình hình có lẽ còn cấp bách hơn cả những gì chúng tôi nhận thức."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、僕らも行くぞ」
2029 = "「Hachiroku, chúng ta cũng đi thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
2189 = "「Vâng, ngài Soutetsu.」"
# monologue
# JP: やるべきことは明快で、\n迷いの入り込む余地も無い。
3193 = "Những việc cần làm đã rõ ràng, không còn chỗ cho sự do dự nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「まずは、試験運転のデータと[ハチロク,3]8620を、\n技工さんたちに一度戻すぞ」
2529 = "「Trước tiên, chúng ta sẽ mang dữ liệu chạy thử và \\x%l8620;#00ffc040;8620%l;#; trở lại cho các kỹ thuật viên xem xét.」"
# monologue
# JP: ……まもなく、クマ川第四橋梁だ。\n\\x%l自弁;#00ffc040;自弁%l;#;にかけている手を軽く握りこみ、遊びを無くす。
1628 = "......Sắp đến cầu sắt thứ tư qua sông Kuma rồi. Tôi nắm hờ tay đặt trên \\x%l自弁;#00ffc040;van hãm tự động%l;#;, tập trung tinh thần."
# monologue
# JP: （むっ！？）
3309 = "（Hửm!?）"
# monologue
# JP: ハチロクからの指示が無い。\nならばここは、自己判断でやれということなのだろう。
2796 = "Không thấy Hachiroku chỉ thị gì. Vậy là muốn tôi tự phán đoán đây mà."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l制動;#00ffc040;制動%l;#;、コンマ８っ！」
# 1650 = "「\\x%l制動;#00ffc040;減速%l;#;，零點八！」" 
# monologue
# JP: 上り勾配が気になるが、\n足りないのならば、足せばいい。
3271 = "Dù hơi e ngại đoạn dốc lên, nhưng nếu thiếu đà thì cứ tăng thêm là được."
# monologue
# JP: オーバーランだけしないよう、\n安全だけを最優先で操作をしていく。
2741 = "Miễn sao không bị chạy lố đà, tôi sẽ thao tác với sự an toàn là ưu tiên hàng đầu."
# monologue
# JP: （やはり、早いか？）
3316 = "（Quả nhiên là, hơi sớm sao?）"
# monologue
# JP: カットオフして、ブレーキも\\x%l運転位置;#00ffc040;運転位置%l;#;に戻している。
2999 = "Tôi đã cắt hơi, phanh cũng đã đưa về \\x%l運転位置;#00ffc040;vị trí chạy tàu%l;#;."
# monologue
# JP: あとは惰性の赴くまま――ああ、くそっ。
3018 = "Còn lại cứ để quán tính lo——a, chết tiệt."
# 【日々姫】
# display as 日日姬
# JP: 「お見事！　にぃに――んんっ、兄さん」
2334 = "「Tuyệt vời! Anh hai——ưm, anh trai.」"
# 【稀咲】
# display as 稀咲
# JP: 「へぇえ、上手に止まるものだね」
2154 = "「Hể, anh dừng tàu giỏi ghê nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや……うむ」
1971 = "「Không...... ừm.」"
# monologue
# JP: 停止位置より、二メートルも手前に止まってしまった。
3051 = "Tàu đã dừng lại cách vị trí quy định đến tận hai mét."
# monologue
# JP: 大甘査定の日々姫の目や、経験の無い稀咲の目には\n見事と映ったのかもしれんが、これはハチロクに――
2867 = "Trong mắt một người dễ dãi như Hibiki, hay người không có kinh nghiệm như Kisaki thì có vẻ là tuyệt vời, nhưng với Hachiroku thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「む？　ハチロク？」
# 2149 = "「嗯？八六？」" 
# 【ハチロク】
# display as 八六
# JP: 「え！？　あ、ああ――はい、\n着――[ヒトヒトマルマル,3]1100――丁度ですね、お疲れ様でした」
2083 = "「Hả!? A, vâng——vâng, Đến nơi——1100——Vừa đúng giờ, ngài vất vả rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、それはいいのだが――」
2102 = "「À không, chuyện đó thì không sao——」"
# 【ハチロク】
# display as 八六
# JP: 「わかっております。わたくしたちは駅舎、\n日々姫たちは炭鉱近辺の、それぞれ調査でございますね」
2246 = "「Em biết rồi ạ. Chúng ta sẽ khảo sát nhà ga, còn nhóm Hibiki sẽ khảo sát quanh khu vực mỏ than nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、おいっ」
2115 = "「A, này.」"
# monologue
# JP: 逃げ出すようにバタバタと、\nハチロクはキャブから飛び降りてしまう。
2786 = "Như muốn trốn chạy, Hachiroku vội vàng nhảy xuống khỏi buồng lái."
# 【凪】
# display as 凪
# JP: 「ふっふーん、探検、探検ばーい！」
2081 = "「Hừ hừm, thám hiểm, đi thám hiểm thôi!」"
# 【ふかみ】
# display as 深美
# JP: 「ああん、凪ちゃん、ちょっと待ってよぅ」
2110 = "「Aaa, bé Nagi, chờ chị với.」"
# 【稀咲】
# display as 稀咲
# JP: 「遊びじゃない。はしゃいでいると怪我をするよ？」
2461 = "「Không phải đi chơi đâu. Nghịch ngợm là bị thương đấy nhé?」"
# monologue
# JP: ついで、ふかみと凪と稀咲も。\nホームの上へと目をやれば、もうハチロクの姿は無い。
2828 = "Tiếp theo là Fukami, Nagi và Kisaki. Nhìn ra sân ga, bóng dáng Hachiroku đã không còn."
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ――」
2095 = "「Ưm——」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、どぎゃんしたと？」
2513 = "「Anh hai, sao vậy?」"
# monologue
# JP: 稀咲の姿がないところでは、日々姫は自然な隈元弁だ。
3109 = "Khi không có Kisaki ở đây, Hibiki lại nói giọng Kumamoto tự nhiên."
# monologue
# JP: その力みない問いかけに、\n考え過ぎかと、少し気分をやわらげられる。
3137 = "Trước câu hỏi tự nhiên ấy, tôi chợt nghĩ có lẽ mình đã suy nghĩ quá nhiều, tâm trạng cũng dịu đi đôi chút."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、停止位置が手前過ぎたなと反省していただけだ。\nそれより、気をつけていってこいよ？」
2320 = "「Không, anh chỉ đang tự kiểm điểm vì dừng tàu hơi sớm thôi. Quan trọng hơn là, em đi cẩn thận nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　いってきまーす！」
2142 = "「Vâng! Em đi đây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1662 = "「............」"
# monologue
# JP: 指示がなく、停止位置のズレにも指摘がなかった。
3058 = "Không có chỉ thị, cũng không bị nhắc nhở về việc dừng sai vị trí."
# monologue
# JP: いくら試験運転とはいえ、\nあまりにチェックが甘すぎるような気もするが――
2901 = "Dù là chạy thử đi chăng nữa, nhưng tôi có cảm giác em ấy kiểm tra quá lỏng lẻo thì phải——"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、今はともかく、言われた仕事をこなさないとな」
2370 = "「Thôi, giờ cứ tạm gác lại, phải hoàn thành công việc được giao đã.」"
# monologue
# JP: ――ハチロクはずっと絶好調だし、\n僕が試されただけかもしれん。
1612 = "——Hachiroku vẫn luôn có phong độ tuyệt vời, có khi em ấy chỉ đang thử tôi thôi cũng nên."
# monologue
# JP: 念のため、前方確認をしっかりとって、慎重に――\n停止位置をぴたりに合わせてなおす。
3073 = "Để chắc ăn, tôi cẩn thận xác nhận lại phía trước, rồi điều chỉnh lại vị trí dừng tàu cho chuẩn xác."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2140 = "「嗯」" 
# monologue
# JP: これでよし。
3235 = "Thế này là ổn."
# monologue
# JP: あとは停車処置をして――
3017 = "Còn lại chỉ cần xử lý các bước dừng đỗ——"
# 【双鉄】
# display as 雙鐵
# JP: 「さて。駅舎調査をがんばるとするか」
2179 = "「Được rồi. Cố gắng khảo sát nhà ga thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ――」
# 2095 = "「唔——」" 
# monologue
# JP: 見れば見るほど、調べれば調べるほどに、\n思ってしまう。
3201 = "Càng nhìn, càng tìm hiểu, tôi càng cảm thấy."
# monologue
# JP: 僕が観光客ならば、\nこの駅には、あまり旅情を感じんだろう。
2882 = "Nếu tôi là một du khách, chắc tôi sẽ chẳng cảm nhận được chút phong vị lữ hành nào từ nhà ga này."
# 【双鉄】
# display as 雙鐵
# JP: 「かつて、術仙炭鉱が栄えていた――\nということの現れなのであろうがな」
2515 = "「Có lẽ đây là minh chứng cho việc—— mỏ than Jutsusen từng một thời hưng thịnh.」"
# monologue
# JP: 湯医線の、他のほとんどの廃駅と違い、\n駅舎は、かなりしっかりしている。
2853 = "Khác với hầu hết các ga bỏ hoang trên tuyến Yui, nhà ga này được xây dựng khá kiên cố."
# monologue
# JP: が、現役当時は恐らく綺麗であったのだろう外板も、\n汚れてしまった今となっては、酷く安っぽく見えるだけだ。
3076 = "Nhưng, lớp ván ốp ngoài có lẽ từng rất đẹp khi còn hoạt động, nay đã bám đầy bụi bẩn, trông vô cùng rẻ tiền."
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、問題なのは中身か。検査の結果次第では、\n建物をそのまま、再利用できるのかもしれんしな」
1989 = "「Mà, vấn đề nằm ở bên trong cơ. Tùy thuộc vào kết quả kiểm tra, biết đâu tòa nhà này vẫn có thể tái sử dụng được.」"
# monologue
# JP: 駅舎の内側ではハチロクが、\n指示された検査を、ひとりこつこつこなしている。
2868 = "Ở bên trong nhà ga, Hachiroku đang cặm cụi một mình thực hiện các bài kiểm tra được giao."
# monologue
# JP: 僕は駅舎の外回りの、人間の目で気づくことなどを\nチェックするという分担なのだが――
3135 = "Tôi được phân công đi vòng quanh bên ngoài nhà ga, để kiểm tra những thứ mà mắt người có thể nhận ra, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「テツの中には、[はいせん,1]廃線テツという方々もいるそうだが――\n僕は、それにはなれんようだな」
2506 = "「Nghe nói trong giới hâm mộ đường sắt, có những người được gọi là người mê tuyến đường bỏ hoang—— Nhưng có vẻ tôi không thể trở thành người như vậy được rồi.」"
# monologue
# JP: 全くわからん。物悲しささえあまり感じん。\nかすかに悲しみを感じたものを強いてあげるなら――
2887 = "Hoàn toàn không hiểu nổi. Thậm chí còn chẳng cảm thấy buồn bã mấy. Nếu buộc phải kể ra một thứ khiến tôi thấy chút xót xa thì——"
# monologue
# JP: 廃駅告知をしていたのであろう「おしらせ」の紙が、\n半ば剥がれて、「らせ」だけとなり果てた姿くらいだ。
2745 = "Chỉ có tờ giấy \"Thông báo\" chắc là thông báo bỏ hoang ga, đã bị bong tróc một nửa, chỉ còn trơ trọi lại chữ \"báo\" mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、ハチロクを一人にしてもおけんしな」
2399 = "「Dù vậy, cũng không thể để Hachiroku lại một mình được.」"
# monologue
# JP: 日々姫達についていった方が、\nやりがいのある調査をまだしも出来たのでは――
3179 = "Giá mà đi theo nhóm Hibiki, thì có khi còn làm được một cuộc khảo sát có ý nghĩa hơn——"
# monologue
# JP: 頭をよぎるそんな思いを、理屈と気持ちで振り払う。
2998 = "Tôi dùng lý trí và tình cảm gạt phăng đi suy nghĩ vừa thoáng qua trong đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクを一人置いていくなど――」
2260 = "「Việc để Hachiroku lại một mình——」"
# monologue
# JP: ありえんことだし、やりたくも無い。
2986 = "Là điều không thể nào, và tôi cũng chẳng muốn làm."
# monologue
# JP: ハチロクが内側で調査している、その物音を聞くだけで、\nこころがこうも、やわらかにあたたかになるというのに。
2794 = "Chỉ cần nghe thấy tiếng động Hachiroku đang khảo sát bên trong, lòng tôi đã trở nên mềm mại và ấm áp đến nhường này."
# 【双鉄】
# display as 雙鐵
# JP: 「が――」
2012 = "「Nhưng——」"
# monologue
# JP: 僕が近くで見ていては、気が散ってしまうということも。\n全く慣れないことだから、集中したいということも――
2990 = "Nếu tôi đứng gần quan sát, có thể em ấy sẽ bị phân tâm. Vì đây là việc hoàn toàn không quen thuộc, nên chắc em ấy muốn tập trung——"
# monologue
# JP: そのとおりだろうとわかっているが、\nわかっていても、やはりこうどこか心ざみしい。
3268 = "Dù biết là vậy, nhưng hiểu là một chuyện, trong lòng vẫn thấy có chút cô đơn."
# 【双鉄】
# display as 雙鐵
# JP: 「……一人というのは、味気ないものだったのだなぁ」
1687 = "「......Một mình, quả là tẻ nhạt thật đấy.」"
# monologue
# JP: ハチロクが隣に居てくれるなら。そして会話を出来るなら\nこの虚しさは、一瞬にして消えるだろうに。
3160 = "Giá như có Hachiroku ở bên cạnh. Và có thể trò chuyện cùng nhau thì sự trống trải này, chắc chắn sẽ tan biến trong chớp mắt."
# monologue
# JP: （がたっ）
3311 = "（Lạch cạch）"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2096 = "「唔」" 
# 【ハチロク】
# display as 八六
# JP: 「お待たせしました、双鉄様」
2415 = "「Để ngài đợi lâu rồi, ngài Soutetsu.」"
# monologue
# JP: 運転ボディのハチロクが、ホコリを叩く素振りをしながら、\nようやく廃駅舎を出てきてくれる。
3285 = "Hachiroku trong thân chính, vừa làm điệu bộ phủi bụi, cuối cùng cũng bước ra khỏi nhà ga bỏ hoang."
# 【双鉄】
# display as 雙鐵
# JP: 「調査の方はどうだった？」
2403 = "「Việc khảo sát thế nào rồi?」"
# 【ハチロク】
# display as 八六
# JP: 「どうなのでしょう？　指示された試験を行い、\n数値を記録しましたが、その意味まではわかりません」
2470 = "「Sao nhỉ? Em đã tiến hành kiểm tra theo chỉ thị, và ghi lại số liệu rồi, nhưng ý nghĩa của chúng thì em chịu ạ.」"
# monologue
# JP: いたずらっぽく肩をすくめるハチロクに、\n妙な共感を覚えてしまう。
3098 = "Nhìn Hachiroku tinh nghịch nhún vai, tôi chợt cảm thấy một sự đồng cảm kỳ lạ."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ハチロクもわからなかったか。\n僕もだ」
2474 = "「Vậy sao, Hachiroku cũng không hiểu à. Tôi cũng thế.」"
# monologue
# JP: 真似して、肩をすくめて見せる。
2886 = "Bắt chước em ấy, tôi cũng nhún vai một cái."
# 【双鉄】
# display as 雙鐵
# JP: 「良い点も悪い点も、全くもってピンとこない。\n廃駅の良し悪しを知るには、どうも修行が足りんらしい」
2194 = "「Điểm tốt hay xấu, tôi hoàn toàn mù tịt. Để đánh giá được ga bỏ hoang này, xem ra tôi còn phải tu luyện nhiều.」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2103 = "「啊！」" 
# monologue
# JP: ぴょこん、とハチロクが小さく跳ねる。
2815 = "Hachiroku khẽ bật nhảy một cái."
# monologue
# JP: らしくない、子供じみたような仕草だが、\n満面に浮かぶ笑顔を見れば、むしろ似合うとさえも感じる。
3228 = "Một cử chỉ trẻ con không giống em ấy chút nào, nhưng nhìn nụ cười rạng rỡ trên khuôn mặt em, tôi lại thấy nó thật hợp."
# 【ハチロク】
# display as 八六
# JP: 「悪い点はともかく、良い点でしたら、ひとつだけ。\nきっと、教えてさしあげられます」
1973 = "「Điểm xấu thì không nói, nhưng nếu là điểm tốt thì có một chỗ đấy ạ. Chắc chắn em có thể chỉ cho ngài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2088 = "「Ồ.」"
# monologue
# JP: 廃駅舎へといそいそと――\n戻ろうとした足がくるりと、逆へ向く。
2817 = "Đang háo hức định quay lại nhà ga bỏ hoang—— thì bước chân em ấy đột ngột xoay ngược lại."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク？」
2030 = "「Hachiroku?」"
# 【ハチロク】
# display as 八六
# JP: 「うふふ、抱き上げていただけますか？」
2150 = "「Fufu, ngài có thể bế em lên được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、キャブへ戻るのか？」
2221 = "「Sao vậy, muốn quay lại buồng lái à?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。少々お待ちくださいましね？」
2301 = "「Vâng. Ngài vui lòng đợi một chút nhé?」"
# monologue
# JP: キャブへとハチロクを入れてやる。\nと、すぐにごとりと\\x%lタブレット;#00ffc040;タブレット%l;#;を換える音。
2973 = "Tôi bế Hachiroku đặt vào buồng lái. Ngay sau đó, có tiếng lạch cạch đổi \\x%lタブレット;#00ffc040;thẻ bảng%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「もう少し、今しばらくだけお待ちください」
2484 = "「Xin ngài hãy đợi thêm một chút nữa thôi ạ.」"
# monologue
# JP: \\x%l整備体;#00ffc040;整備体%l;#;になりキャブを降りたかと思えばすぐに、\nハチロクはひとり、廃駅舎へと入ってしまう。
3021 = "Vừa mới chuyển sang \\x%l整備体;#00ffc040;thân chính%l;#; và bước xuống buồng lái, Hachiroku lại một mình đi vào nhà ga bỏ hoang."
# monologue
# JP: （……今日は、随分と待たされる日だな）
3290 = "（......Hôm nay, mình bị bắt chờ hơi nhiều nhỉ.）"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　どうぞ、いらしてください」
2520 = "「Ngài Soutetsu? Mời ngài vào đây ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――おお！」
2126 = "「Ừm——Ồ!」"
# monologue
# JP: 駅舎の中は、悪くない。\n悪くないどころか――かなりいい。
3205 = "Bên trong nhà ga, trông không tệ chút nào. Đâu chỉ không tệ——mà là quá tuyệt vời."
# monologue
# JP: 木と漆喰と、鉄の駅。\nまさに昔の――\\x%l大詔;#00ffc040;大詔%l;#;時代の鉄道駅のイメージだ。
3054 = "Một nhà ga bằng gỗ, thạch cao và sắt. Đúng chuẩn hình ảnh nhà ga đường sắt thời xưa——thời \\x%l大詔;#00ffc040;Đại Chiếu%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「どちらまでの切符をお求めですか？」
2408 = "「Ngài muốn mua vé đi đến đâu ạ?」"
# monologue
# JP: その中で、改札鋏をぱちぱち鳴らすハチロクが、\nわくわくとした目で僕を見上げる。
3014 = "Đứng giữa không gian đó, Hachiroku vừa bấm kìm soát vé lách cách, vừa ngước lên nhìn tôi bằng ánh mắt đầy háo hức."
# monologue
# JP: いつもの服が舞台ひとつで、駅員のように見えてくる。\nこれは、可愛い。よく似合っている。
3247 = "Vẫn bộ trang phục thường ngày, nhưng đứng trên sân khấu này, trông em ấy hệt như một nhân viên nhà ga. Thật đáng yêu. Vô cùng hợp với em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな――特に行き先は決めてないんだ」
2465 = "「Để xem nào——Tôi chưa quyết định điểm đến cụ thể.」"
# monologue
# JP: うれしくなって、\nごっこ遊びに自然、付き合う。
2959 = "Thấy vui vui, tôi cũng tự nhiên hùa theo trò chơi đóng giả của em ấy."
# monologue
# JP: こんなことをするのは本当に、何年ぶりのことだろう。
3236 = "Đã bao nhiêu năm rồi tôi mới lại làm mấy trò thế này nhỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「どこかおすすめの場所などあれば、そこまで頼む」
2018 = "「Nếu có nơi nào đáng để đi, thì cho tôi một vé đến đó nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様へのおすすめでしたら」
2396 = "「Nếu là gợi ý cho ngài Soutetsu thì...」"
# monologue
# JP: 手元の紙に、ハチロクは何やら書き込んでいく。
2818 = "Hachiroku cắm cúi viết gì đó lên tờ giấy trên tay."
# monologue
# JP: ああ――どうやら手書きの切符用紙だ。\n昔は、そんなものを使っていたのか。
2860 = "À——Có vẻ là giấy viết vé thủ công. Ngày xưa người ta dùng loại này sao."
# 【ハチロク】
# display as 八六
# JP: 「こちらなど、いかがでしょう？」
2478 = "「Nơi này thì sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2125 = "「Ồ.」"
# monologue
# JP: 自由:特急　人員:人１人\n有効期間:無制限
3157 = "Tự do: Tàu tốc hành　Số lượng: 1 người lớn Thời hạn: Không giới hạn"
# monologue
# JP: そして乗車線区間は、\n双鉄駅からハチロク駅だ。
3130 = "Và chặng đường ghi trên vé là, từ ga Soutetsu đến ga Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「いかがでしょう？　専用乗車券、\n特別無料ご招待ですよ？」
2225 = "「Ngài thấy sao ạ? Vé chuyên cơ, đặc biệt dành tặng miễn phí cho ngài đấy nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「これはいい。一枚いただこう」
2466 = "「Tuyệt quá. Cho tôi một vé nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、どうぞ。\nそれでは、\\x%l入鋏;#00ffc040;[にゅうきょう,1]入鋏%l;#;させていただきますね？」
2184 = "「Vâng, của ngài đây. Vậy thì, em xin phép \\x%l入鋏;#00ffc040;bấm vé%l;#; cho ngài nhé?」"
# monologue
# JP: 言われるままに、受け取ったばかりの切符を差し出す。
3080 = "Nghe vậy, tôi liền đưa tấm vé vừa nhận ra."
# monologue
# JP: ハチロクは少し緊張した面持ちで、\nゆっくりと、深呼吸までしてみせる。
2806 = "Hachiroku lộ vẻ hơi căng thẳng, từ từ hít một hơi thật sâu."
# monologue
# JP: （パチンっ）
3313 = "（Tách）"
# 【ハチロク】
# display as 八六
# JP: 「うふふっ、これでいつでも双鉄様は、\nハチロク駅までフリーパスです」
2153 = "「Fufu, vậy là từ giờ ngài Soutetsu có thể đến ga Hachiroku bất cứ lúc nào bằng vé miễn phí rồi nhé.」"
# monologue
# JP: うむむ、なんとも……\nなんでなんだか照れくさい。
2859 = "Ưm, thật là...... Sao tự dưng thấy ngại ngùng thế này."
# monologue
# JP: 照れくさいけれど、ひどく嬉しい。\nああ、いや、ならば、この嬉しさを――
3270 = "Tuy ngại ngùng, nhưng lại vô cùng hạnh phúc. À, không, nếu vậy thì, niềm vui này——"
# 【双鉄】
# display as 雙鐵
# JP: 「もう一枚、発券をしてもらえるかな？\nプレゼントに使いたいんだ」
2070 = "「Có thể xuất thêm một vé nữa không? Tôi muốn dùng làm quà tặng.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、どちらまでの切符ですか？」
2183 = "「Vâng, ngài muốn đi đến đâu ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク駅から双鉄駅、大人一枚、\n有効期間無制限の特急券で一枚頼む」
2409 = "「Từ ga Hachiroku đến ga Soutetsu, một người lớn, cho tôi một vé tốc hành không thời hạn nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「は、は――はい」
2175 = "「V-V——Vâng ạ.」"
# monologue
# JP: ぽぽぽと、ハチロクの頬が赤くなる。
2808 = "Đôi má Hachiroku bỗng chốc đỏ ửng lên."
# monologue
# JP: この照れくささは僕一人だけのものではないと――\nそんなことまでが実に嬉しい。
3229 = "Sự ngại ngùng này không chỉ của riêng tôi—— Nhận ra điều đó thực sự khiến tôi rất vui."
# 【ハチロク】
# display as 八六
# JP: 「ど、どうぞ」
2407 = "「C-Của ngài đây ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。\nでは、この切符はハチロクにプレゼントだ」
2410 = "「Cảm ơn. Vậy thì, tấm vé này là quà tặng cho Hachiroku đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
2099 = "「A——」"
# monologue
# JP: 自分で作った切符であるのに、\nハチロクは、それを尊いもののように見る。
3269 = "Dù là vé do chính tay mình làm ra, nhưng Hachiroku lại nhìn nó như một món bảo vật."
# monologue
# JP: 僕の手に改札鋏を預けてまでも、両手で切符を受け取って、\nそうしてほうっと、幸せそうな息をつく。
2892 = "Giao kìm soát vé vào tay tôi, em ấy đón lấy tấm vé bằng cả hai tay, rồi thở hắt ra một hơi đầy hạnh phúc."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様――この切符に、\\x%l入鋏;#00ffc040;[にゅうきょう,1]入鋏%l;#;をしていただけますか？」
2518 = "「Ngài Soutetsu——Ngài có thể \\x%l入鋏;#00ffc040;bấm vé%l;#; cho tấm vé này được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、喜んで」
2148 = "「À, rất sẵn lòng.」"
# 【ハチロク】
# display as 八六
# JP: 「持ち方はこうです、\n親指と人差し指で上を挟んで――」
2467 = "「Cách cầm là như thế này ạ, dùng ngón cái và ngón trỏ kẹp phần trên——」"
# 【双鉄】
# display as 雙鐵
# JP: 「こうか、ふむ」
2475 = "「Như vầy hả, hừm.」"
# monologue
# JP: 懇切丁寧な指導を受けて――\nけれど、\\x%l入鋏;#00ffc040;入鋏%l;#;は一瞬だ。
2809 = "Nhận được sự hướng dẫn tận tình chu đáo—— Nhưng việc \\x%l入鋏;#00ffc040;bấm vé%l;#; chỉ diễn ra trong chớp mắt."
# monologue
# JP: （パチン！）
3312 = "（Tách!）"
# 【ハチロク】
# display as 八六
# JP: 「あ」
# 2100 = "「啊」" 
# monologue
# JP: 小さな声。\n大きく吸う息。
3267 = "Một tiếng kêu nhỏ. Kèm theo tiếng hít thở sâu."
# monologue
# JP: そしてうふふとハチロクは、\n幸せそのものの笑いを転がす。
3131 = "Và rồi Hachiroku, cất tiếng cười trong trẻo ngập tràn hạnh phúc."
# 【ハチロク】
# display as 八六
# JP: 「これでわたくしたち、\nお互いを行き来できるのですね？」
2476 = "「Vậy là từ giờ, chúng ta có thể qua lại thăm nhau rồi ngài nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2140 = "「嗯」" 
# monologue
# JP: ごっこ遊びにすぎない切符が、\nハチロクの笑顔ひとつで宝物になる。
3234 = "Tấm vé vốn chỉ là trò chơi đóng giả, nay đã hóa thành bảo vật nhờ nụ cười của Hachiroku."
# monologue
# JP: これは確かに尊いと――\n遅ればせながら、僕も感じる。
3237 = "Điều này quả thực rất quý giá—— Dù hơi muộn màng, nhưng tôi cũng đã cảm nhận được."
# 【双鉄】
# display as 雙鐵
# JP: 「……これは、胸ポケットに仕舞っておこう。\n無くさないよう、僕の心臓の一番近くに」
1703 = "「......Cái này, tôi sẽ cất vào túi áo ngực. Để không làm mất, tôi sẽ giữ nó ở nơi gần trái tim mình nhất.」"
# 【ハチロク】
# display as 八六
# JP: 「――わたくしも、そのようにいたします」
1652 = "「——Em cũng sẽ làm như vậy ạ.」"
# monologue
# JP: 頷いて。\n僕を見直すハチロクの目は、ほんの少しだけ切なげだ。
2819 = "Gật đầu. Ánh mắt Hachiroku nhìn tôi lại ánh lên chút xót xa."
# 【ハチロク】
# display as 八六
# JP: 「わたくしには、心臓がないのが残念ですが」
2064 = "「Chỉ tiếc là, em không có trái tim thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無いのかな、本当に」
2351 = "「Không có sao, thật sự đấy.」"
# monologue
# JP: 思ってしまう。\nどうしても。
2970 = "Tôi bất giác nghĩ như vậy. Dù thế nào đi nữa."
# monologue
# JP: ハチロクは物で、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;で――\nけれども、確かに生きているから。
2790 = "Hachiroku là một đồ vật, là một \\x%lレイルロオド;#00ffc040;Railord%l;#;—— Nhưng đồng thời, em ấy cũng chắc chắn đang sống."
# 【ハチロク】
# display as 八六
# JP: 「でしたら」
2277 = "「Nếu vậy thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2537 = "「!」"
# monologue
# JP: ハチロクの手が僕の手を取る。
2789 = "Bàn tay Hachiroku nắm lấy tay tôi."
# monologue
# JP: 改札鋏が滑って落ちる。\nが、拾おうとも思えない。
2833 = "Kìm soát vé tuột khỏi tay rơi xuống. Nhưng tôi chẳng màng đến việc nhặt nó lên."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様が――\n触れて、確かめてみてくださいますか？」
2378 = "「Ngài Soutetsu có thể—— chạm vào, và tự mình xác nhận được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2140 = "「嗯」" 
# monologue
# JP: 導かれるまま、ハチロクの胸に手を当てる。\n温かい。柔らかい。
2982 = "Cứ thế để em ấy dẫn dắt, tôi đặt tay lên ngực Hachiroku. Thật ấm áp. Thật mềm mại."
# monologue
# JP: 体が、カっと熱くなる。\n自分自身の鼓動を激しく、ハチロクにまで響かせてしまう。
2985 = "Cơ thể tôi nóng ran lên. Nhịp đập mãnh liệt của chính tôi, dường như cũng truyền cả sang Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「これでは――どうだかわからんな」
2473 = "「Thế này thì——khó mà biết được nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら――」
2276 = "「Nếu vậy thì——」"
# monologue
# JP: ハチロクが、じっと僕を見る。\n視線も手のひらも外せない。
2813 = "Hachiroku nhìn chằm chằm vào tôi. Ánh mắt và cả bàn tay em ấy đều không hề rời đi."
# 【ハチロク】
# display as 八六
# JP: 「でしたら、どうか、双鉄様」
2281 = "「Nếu vậy thì, xin ngài, ngài Soutetsu.」"
# 【凪】
# display as 凪
# JP: 「もどったばーい！！\nあれ？　にーさん、ハチロク、どこ行ったとよ？」
2156 = "「Về rồi nè!! Ủa? Anh hai, Hachiroku, hai người đi đâu rồi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2537 = "「！」" 
# monologue
# JP: 凪だ。\n助かった。
3047 = "Là Nagi. Được cứu rồi."
# monologue
# JP: 思ってしまって、混乱する。\n一体何から、僕は助かったというのだろうか。
3207 = "Vừa nghĩ vậy, tôi chợt thấy bối rối. Rốt cuộc, tôi đã được cứu khỏi cái gì cơ chứ."
# 【日々姫】
# display as 日日姬
# JP: 「え？　にぃに――んっ――\n兄さん、いないの？」
2085 = "「Hả? Anh hai——ưm—— Anh trai, không có ở đây sao?」"
# 【ふかみ】
# display as 深美
# JP: 「はぁ、はぁ、はぁ――\nもう、ふたりとも――はやい――よぉ」
2079 = "「Hộc, hộc, hộc—— Thiệt tình, hai người——chạy nhanh——quá đi.」"
# 【稀咲】
# display as 稀咲
# JP: 「おそらく駅舎の中だろう。\n調査をするといってたじゃないか」
2236 = "「Chắc là ở trong nhà ga thôi. Họ bảo sẽ khảo sát chỗ đó mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああうん、駅だ。\nこちらも、丁度終わったところだ」
2108 = "「À ừ, trong nhà ga đây. Bên này cũng vừa mới xong.」"
# monologue
# JP: ハチロクとともに外にでる。
2965 = "Tôi cùng Hachiroku bước ra ngoài."
# monologue
# JP: 日々姫に稀咲に凪、ふかみ。
3040 = "Hibiki, Kisaki, Nagi và Fukami."
# monologue
# JP: そろって顔を薄汚れさせ、\nけれどもまぶしい、力強い笑みを浮かべている。
3148 = "Mặt ai nấy đều hơi lấm lem, nhưng lại nở những nụ cười rạng rỡ và đầy sức sống."
# 【双鉄】
# display as 雙鐵
# JP: 「どうやら、有意義な調査ができたようだな」
2347 = "「Có vẻ như mọi người đã có một buổi khảo sát đầy ý nghĩa nhỉ.」"
# 【凪】
# display as 凪
# JP: 「有意義ばい！　めっちゃくちゃ楽しかったばい！！」
2428 = "「Ý nghĩa lắm luôn! Cực kỳ vui luôn á!!」"
# 【ふかみ】
# display as 深美
# JP: 「もう凪ちゃん、\n楽しかったとかそういうことじゃないよう」
2198 = "「Thiệt tình bé Nagi này, người ta đâu có hỏi vui hay không đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「いや、楽しさも重要だ。\n双鉄。ここにはどうやら、ボクの予想以上の価値がある」
1991 = "「Không, sự thú vị cũng quan trọng lắm đấy. Anh Soutetsu. Có vẻ như nơi này có giá trị vượt xa dự đoán của tôi.」"
# monologue
# JP: いって、稀咲が、促すように日々姫を見る。
3117 = "Nói rồi, Kisaki nhìn Hibiki như muốn thúc giục."
# monologue
# JP: 日々姫は小さく頷いて、\n甘えた瞳で僕を見上げる。
3043 = "Hibiki khẽ gật đầu, rồi ngước lên nhìn tôi bằng đôi mắt nũng nịu."
# 【日々姫】
# display as 日日姬
# JP: 「それで、にぃに――ううん、兄さん。\nええと、わたしたち、できたら、だけど」
2338 = "「Vậy nên, anh hai——à không, anh trai. Ưm, bọn em, nếu được thì.」"
# monologue
# JP: ああ、ねだられる。\nそれも、ろくでもないことを。
2863 = "À, lại vòi vĩnh rồi. Mà chắc chắn cũng chẳng phải chuyện gì tốt đẹp."
# monologue
# JP: そのことを直感できるくらいには、\n僕と日々姫は、兄妹だ。
2967 = "Tôi và Hibiki là anh em mà, nên dư sức đoán được bằng trực giác."
# 【日々姫】
# display as 日日姬
# JP: 「このままお泊りして――調査、続けたらだめかなぁ？」
2375 = "「Bọn em ngủ lại đây——để tiếp tục khảo sát, có được không ạ?」"
