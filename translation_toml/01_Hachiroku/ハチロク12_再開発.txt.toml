# display as 稀咲
# JP: 「『そんなことをしたら、市が完全に割れてしまう』」
1660 = "「“真那樣做的話，御一夜市就要完全分裂了”」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
2103 = "「啊！」" 

# monologue
# JP: 先回りをされたのだろうか――\n稀咲の言葉に、ポーレットは息を呑み込まされる。
