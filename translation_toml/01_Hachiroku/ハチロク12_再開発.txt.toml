2299 = "「是的。煤礦公司撤離時捐給了御一夜市。估計是因為那麼大面積的土地，需要承擔高額的固定資產稅和維護費用吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2043 = "「原來如此啊」" 

