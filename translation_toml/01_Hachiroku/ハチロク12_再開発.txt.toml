2038 = "「加之，以\\x%l8620;#00ffc040;８６２０%l;#;的構造，\\x%l動輪;#00ffc040;動輪%l;#;是不太容易發生\\x%l空転;#00ffc040;空轉%l;#;的，所以磨損也相對比較嚴重」" 

# 【凪】
