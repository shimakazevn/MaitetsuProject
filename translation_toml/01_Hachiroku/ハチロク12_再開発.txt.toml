2493 = "「那個人對此並無所謂。對立，有時甚至是憎恨，都可能會促進發展與進步」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、そう……だ、が」
2400 = "「話雖如此……可是」" 

