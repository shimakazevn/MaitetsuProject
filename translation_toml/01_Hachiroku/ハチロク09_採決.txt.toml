# 【ハチロク】
# display as 八六
# JP: 「双鉄様。素晴らしいご答弁でございました」
2435 = "「雙鐵少爺。真是精彩的答辯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　ならば、なによりだ」
2161 = "「是嗎？那就好」" 

# monologue
# JP: 運転鞄の中からは、低く抑えた――\nそして嬉しげで誇らしげなハチロクの声。
2900 = "從乘務包中傳出八六的聲音——她把聲音壓得很低，但聽起來充滿了喜悅和自豪。" 

# monologue
# JP: 耳にしたならそれだけで、緊張が解けてしまいそうになる。
2787 = "只是聽到她的聲音，我就幾乎要放下了自己緊張的情緒。" 

# monologue
# JP: （が、まだだ。\n今日の正念場は、ここからだ）
3332 = "（但是，還沒結束。正頭戲還在之後）" 

# 【議長】
# display as 議長
# JP: 「この際、関連の質疑を続けます。\n御一夜の未来を考える会。[にいつ,1]新津議員」
2128 = "「接下來繼續提出對本方案的質疑。有請御一夜未來規劃會的新津議員發言」" 

# 【中堅議員】
# display as 中堅議員
# JP: 「バーベキュー\x%l列車;#00ffc040;列車%l;#;の運行について、\nクレームが発生している件はご存知ですね？」
2100 = "「想必您知道有部分人對ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;的運營表示不滿吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。改善意見として承っております」
2171 = "「是的。我了解過這些意見，以尋求改善的方法」" 

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致推進派の急先鋒である新津議員。
2702 = "他是\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶支持派的急先鋒新津議員。" 

# monologue
# JP: ポーレットの花道などという意識はまるでないらしい。\n挨拶もせず、噛みつかんばかりの勢いだ。
2699 = "他似乎完全沒有打算為波萊特鋪設紅毯。連招呼都沒打一聲，就咄咄逼人地問道。" 

# monologue
# JP: （が――これは……役者が違うな）
3330 = "（但是——天外有天，人外有人啊）" 

# 【中堅議員】
# display as 中堅議員
# JP: 「しかし！　鉄道業のため市長を辞任する。\nこれが市政軽視であると言わずに、なんと言いますか」
1860 = "「但是！為了鐵路業辭去市長一職，這不叫輕視市政，又該叫什麼？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「日ノ本の法が公職にあるものの兼職を禁じていないのは、\n利権、金銭の流れを明らかにするためと理解しています」
2111 = "「我明白，日本法律不禁止公務人員兼職，是為了避免假公濟私，讓金錢的流動公開化」" 

# monologue
# JP: 劣勢を挽回せんとの感情的な――\n通告になかった質問さえを、いとも容易く切り返している。
2882 = "就連這種急於挽回劣勢而提出的——並未事前告知的衝動問題，她也從容地做出了應對。" 

# monologue
# JP: ポーレットが語っているのは、学園少等部で習うこと。\nさしもの新津議員といえど、そこに異論は挟めない。
3048 = "波萊特所說的是小學就教過的知識。就算是新津議員也無法反駁。" 

# 【ポーレット】
# display as 波萊特
# JP: 「今回の補正予算が仮に通れば、明快な利権が発生します。\n立法の趣旨を尊重するため、辞任が最適と判断しました」
1877 = "「假設這次的預算修正案通過，顯然就有假公濟私之嫌。為了尊重立法的宗旨，我認為辭職是最好的選擇」" 

# 【中堅議員】
# display as 中堅議員
# JP: 「ならば市長職を優先し、社長業を譲ることこそが、\n選良たる者の判断ではないかと思うのですが、いかがか」
2415 = "「那麼，本人認為應該將市長的職務放在優先位置，辭去社長的職務才是明智之舉，不是嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ご主張、おっしゃるとおりかと思います」
2121 = "「我認為您的主張很正確」" 

# monologue
# JP: 大きなどよめき。\nしてやったり、と新津議員の目がギラつく。
2645 = "一陣譁然。自以為計劃得逞的新津議員眼神一亮。" 

# monologue
# JP: が、ポーレット自身には動揺の影すら見られない。
2715 = "但是，波萊特自身沒有一絲不安。" 

# 【ポーレット】
# display as 波萊特
# JP: 「しかし、人材の問題がありました。政界を見れば、\n御一夜には優れた人材が数多くいらっしゃいますが――」
1855 = "「但是在人才方面存在問題。縱觀政治界，雖然御一夜擁有眾多優秀的人才——」" 

# monologue
# JP: 一拍。\n言葉が浸透するのを待つかのような沈黙。
2834 = "她停頓片刻，彷彿在等待眾人消化她的話。" 

# 【ポーレット】
# display as 波萊特
# JP: 「鉄道界にはまだ人材が乏しく。その数少ない人材も、\nそれぞれの職務に忙殺されてしまっている状況です」
1865 = "「但鐵路界目前依舊人才匱乏。而為數不多的人才也處於為各自的職務忙得不可開交的狀態」" 

# monologue
# JP: ああ、と納得するような声。\nこれも、議場のあちこちからだ。
3019 = "會場的各處傳來恍然大悟的聲音。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですので、御一夜の政・財のよりよき発展のために、\n市長辞任の方がベターと、判断させていただきました」
2017 = "「因此，為了讓御一夜的財政得到更好的發展，我認為辭去市長一職是更好的方法」" 

# monologue
# JP: そうだ！　と、ヤジ。
3020 = "會場響起了“沒錯！”的起鬨聲。" 

# monologue
# JP: 声の方向へ向いた新津議員の視線が、\nやがて議場の一点へ――吸い付くように向けられる。
2986 = "新津議員順著聲音傳來的方向看去——隨後他的視線被固定在會場的某一點。" 

# monologue
# JP: （宝生稀咲……\nそれに、浦上さんもか）
3339 = "（寶生稀咲……還有浦上經理也在啊）" 

# monologue
# JP: 稀咲と浦上はなにかを小声で交換しあい――\nやがて、稀咲が大きく頷く。
3148 = "稀咲和浦上在小聲交談——不久後，稀咲用力點點頭。" 

# 【中堅議員】
# display as 中堅議員
# JP: 「見解の相違ですな。これ以上は結構です。\n議長、参考人への質問に移行します」
2236 = "「看來我們見解不同。已經無需多講，議長，請進入向陳述人提問的環節」" 

# 【議長】
# display as 議長
# JP: 「参考人。宝生稀咲君」
2313 = "「請陳述人寶生稀咲小姐發言」" 

# 【稀咲】
# display as 稀咲
# JP: 「隈元銀行御一夜支店長、宝生稀咲です」
2112 = "「我是隈元銀行御一夜支行行長寶生稀咲」" 

# 【中堅議員】
# display as 中堅議員
# JP: 「宝生さん。銀行の立場からみて、市長提案の本補正予算。\nこれに対し、疑問を感じる部分はありますか？」
2052 = "「寶生小姐，從銀行的立場來看，您對市長提議的本預算修正案有何疑問嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「よく考えられた補正予算案であると感じました。\nが、一点、少し気がかりな点はあります」
2122 = "「我認為這個預算修正案考慮得相當週全。但是有一點，我很好奇」" 

# 【中堅議員】
# display as 中堅議員
# JP: 「それは？」
2312 = "「請問是？」" 

# 【稀咲】
# display as 稀咲
# JP: 「再現性についてです」
2421 = "「關於可重複性的問題」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！？」
2454 = "「！？」" 

# monologue
# JP: 運転鞄の中から、詰まった声。
2899 = "從乘務包中傳來倒吸一口涼氣的聲音。" 

# monologue
# JP: 心あたりがあるのか――と、\n問うより先に、稀咲の声が力強く響く。
2970 = "我還沒來得及問八六“你有頭緒嗎”，稀咲的聲音就強有力地響起。" 

# 【稀咲】
# display as 稀咲
# JP: 「この点、市長から直接のご答弁をいただきたいのですが\nいかがでしょうか？」
2422 = "「關於這點，我想得到市長的親口答覆，請問可以嗎？」" 

# 【議長】
# display as 議長
# JP: 「直接討議を認めます」
1880 = "「允許你們直接討論」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！！？」
2453 = "「！！？」" 

# monologue
# JP: 動揺が顔にあらわれている。立ち上がる勢いがまるで無い。\nいかん――あのポーレットだ。
2846 = "她的神情上充滿了動搖。站起來的時候也完全沒有氣勢。不好——是軟弱狀態的波萊特。" 

# monologue
# JP: この質問をまるきり予想もしてなかったのか、\n不意を打たれた、弱いポーレットが出てしまっている。
2794 = "可能是完全沒有預料到會出現這個問題，猝不及防的波萊特暴露出了自己軟弱的一面。" 

# 【稀咲】
# display as 稀咲
# JP: 「今回、[ハチロクニイマル,3]8620の\x%l台枠;#00ffc040;台枠%l;#;交換にかかる費用が、驚くべき\n低額にまとまるということは、喜ばしいことですね」
2379 = "「這次更換８６２０\\x%l台枠;#00ffc040;車架%l;#;所需的費用被壓低到一個很低的價格是件可喜的事」" 

# 【ポーレット】
# display as 波萊特
# JP: 「は……はい」
2150 = "「是……是的」" 

# 【稀咲】
# display as 稀咲
# JP: 「が、このようなめぐり合わせ、言ってしまえば幸運に、\n今後とも、恵まれるという保証はあるのでしょうか？」
1861 = "「但是，你能保證今後還會有這樣的機會——或者說好運嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2452 = "「！」" 

# monologue
# JP: なるほど――再現性の問題とは、つまりそういうことか。
2773 = "原來如此——可重複性是指這麼一回事啊。" 

# monologue
# JP: 今回の、素晴らしいめぐり合わせを二度三度……\n確かに、繰り返せるものとは思えない。
3125 = "確實，像這樣幸運的機會……我不覺得會連續遇到多次。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは……わたしでは――\nその……判断も、予測もできないことです」
2374 = "「這個……我——那個……無法做出判斷和預測」" 

# 【稀咲】
# display as 稀咲
# JP: 「では質問を変えましょう。交換して新規実装した\x%l台枠;#00ffc040;台枠%l;#;が、\n将来、また破損したとして――その時にはどうします？」
2406 = "「那麼我換個問題。假設更換後新裝上的\\x%l台枠;#00ffc040;車架%l;#;將來再次出現破損——到時候該怎麼辦？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「…………あの――そのときは――」
1518 = "「…………那個——到時——」" 

# monologue
# JP: 青い瞳がぐらぐら揺れてる。\nこれは保たない。
2853 = "她碧藍的眼眸在不安地晃動。看樣子要堅持不下去了。" 

# monologue
# JP: 厳しいところを突かれてしまった。\n動揺モードのポーレットでは、乗り切ることは難しかろう。
3213 = "被戳到痛處了。處於動搖狀態的波萊特應該很難突破這一難關。" 

# 【双鉄】
# display as 雙鐵
# JP: 「議長。それに関しては、現場の立場からの方が、\n正確な答弁をさせていただけるかと存じます」
2317 = "「議長。關於這點，我認為應該由親歷現場的陳述人來作出正確的回答」" 

# 【議長】
# display as 議長
# JP: 「右田参考人の答弁を認めます」
1881 = "「允許右田陳述人的答辯」" 

# 【稀咲】
# display as 稀咲
# JP: 「それでは、右田参考人に改めてお伺いします」
2414 = "「那麼，我再一次詢問右田陳述人」" 

# monologue
# JP: 稀咲の唇。\nその端が、薄く持ちあがってる。
3153 = "稀咲的嘴角微微揚起。" 

# 【稀咲】
# display as 稀咲
