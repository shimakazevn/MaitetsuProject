[script]
# lines: 481 
# 【双鉄】
# display as 雙鐵
# JP: 「――む」
1503 = "「——Ưm.」"
# monologue
# JP: 差し込む朝日の眩しさに、思考までもが真っ白になる。
3194 = "Ánh nắng ban mai chói lọi chiếu vào, khiến cả dòng suy nghĩ của tôi cũng trở nên trống rỗng."
# 【ハチロク】
# display as 八六
# JP: 「……すぅ……すぅ」
1530 = "「……Su……su.」"
# monologue
# JP: 寝息――だとしか聞こえない、\nハチロクの穏やかな吸排気音。
2746 = "Tiếng thở khi ngủ——chỉ có thể nghe thấy như vậy,\nâm thanh hút xả khí êm ả của Hachiroku."
# monologue
# JP: それに揺すられ、\nぼんやりとした現実感がまとまり始める。
2785 = "Bị lay động bởi âm thanh ấy,\ncảm giác thực tại mơ hồ bắt đầu hội tụ lại."
# 【双鉄】
# display as 雙鐵
# JP: 「……のどかなものだ」
1541 = "「……Thật là thanh bình.」"
# monologue
# JP: 布団と僕とハチロクと。\n世界がそれだけしかないような、とても手狭な万能感。
3211 = "Chăn, tôi và Hachiroku.\nMột cảm giác toàn năng vô cùng chật hẹp, như thể thế giới chỉ có ngần ấy thứ."
# monologue
# JP: 柔らかな頬をそうっと押せば、\nハチロクは、わずらわしそうに寝返りを打つ。
3248 = "Khẽ chạm vào gò má mềm mại ấy,\nHachiroku trở mình, có vẻ hơi khó chịu."
# 【ハチロク】
# display as 八六
# JP: 「ん…………」
1995 = "「Ưm…………」"
# monologue
# JP: あまりにも人間じみたその仕草。\nふっと、疑問を感じてしまう。
2860 = "Một cử chỉ quá đỗi giống con người.\nBất chợt, tôi cảm thấy một sự hoài nghi."
# monologue
# JP: （どうして……これほどまでに、似せたのだろうな）
3342 = "（Tại sao……lại được chế tạo giống đến mức này cơ chứ）"
# monologue
# JP: 機能の全ての現れが、\n人間のものをほぼ完全に模している。
2836 = "Tất cả các biểu hiện chức năng,\ngần như mô phỏng hoàn toàn của con người."
# monologue
# JP: それは安らぎを与えてくれるが、\n同時に不安も掻き立てる。
3295 = "Điều đó mang lại sự bình yên,\nnhưng đồng thời cũng khơi dậy sự bất an."
# monologue
# JP: （似せれば似せてしまうほど――\n違いは、残酷なまでに際立ってしまうというのに）
3344 = "（Càng làm giống thì——\nSự khác biệt, lại càng nổi bật một cách tàn nhẫn）"
# monologue
# JP: 体を持たず、機能だけであるナビになら、\nこんな気持ちを抱くことなど、ありえまい。
3300 = "Nếu là Navi, chỉ có chức năng mà không có cơ thể,\nchắc chắn tôi sẽ không bao giờ có những cảm xúc như thế này."
# monologue
# JP: ……壊れてしまうまでの時間と、僕の寿命と。\nそれを比べて、未来を思ってしまうなど。
1479 = "……Thời gian cho đến khi hỏng hóc, và tuổi thọ của tôi.\nSo sánh hai điều đó, rồi lại nghĩ về tương lai."
# 【双鉄】
# display as 雙鐵
# JP: 「が――」
1853 = "「Nhưng mà——」"
# monologue
# JP: ハチロクを起こさぬように布団から出る。
3061 = "Tôi bước ra khỏi chăn để không làm Hachiroku thức giấc."
# monologue
# JP: そうしたつもりだったのだけれど、\nゆっくりと、ハチロクのまぶたが持ち上がる。
2712 = "Dù đã định làm như vậy,\nnhưng mí mắt của Hachiroku vẫn từ từ hé mở."
# 【ハチロク】
# display as 八六
# JP: 「……あ――」
1531 = "「……A——」"
# monologue
# JP: ぼうっとした目。\nやがて焦点が結ばれて、ゆるやかな笑みが浮き上がる。
2840 = "Đôi mắt mơ màng.\nChẳng mấy chốc tiêu cự đã hội tụ lại, và một nụ cười nhẹ nhàng nở trên môi."
# 【ハチロク】
# display as 八六
# JP: 「おはようございます、双鉄様」
2149 = "「Chào buổi sáng, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。良く眠れたようだな」
1996 = "「Ừ. Có vẻ em ngủ rất ngon nhỉ.」"
# monologue
# JP: 髪がいささか寝乱れている。
2849 = "Mái tóc hơi rối do vừa ngủ dậy."
# monologue
# JP: 手櫛で軽く整えてやれば、\nハチロクは、心地よさそうに目を閉じる。
2960 = "Tôi dùng tay vuốt nhẹ lại mái tóc cho cô ấy,\nHachiroku nhắm mắt lại với vẻ mặt đầy thoải mái."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1515 = "「…………」"
# monologue
# JP: あどけない。愛おしい。守ってやりたい。
2839 = "Thật ngây thơ. Thật đáng yêu. Thật muốn che chở."
# monologue
# JP: そう感じれば、ちりちりとした痛みと不安が、\nいっそ鮮明に沸き起こってくる。――が、だ。
3081 = "Khi cảm nhận được điều đó, một nỗi đau và sự bất an nhói lên,\ncàng trỗi dậy một cách rõ rệt.——Nhưng mà."
# 【双鉄】
# display as 雙鐵
# JP: 「いよいよ、今日が決戦だな」
1844 = "「Cuối cùng, hôm nay là ngày quyết chiến nhỉ.」"
# monologue
# JP: 未来を不安に感じるのなら、\nよりよいものへ整えればいい。
3201 = "Nếu cảm thấy bất an về tương lai,\nthì cứ việc sắp xếp lại cho nó tốt đẹp hơn là được."
# monologue
# JP: ハチロクが幸せに暮らせる世界を整えるよう、\n僕のベストを尽くしていけば。
2789 = "Chỉ cần tôi cố gắng hết sức mình,\nđể sắp xếp một thế giới nơi Hachiroku có thể sống hạnh phúc."
# 【ハチロク】
# display as 八六
# JP: 「決戦――」
2193 = "「Quyết chiến——」"
# monologue
# JP: まばたきし、眠気の膜を取り払い、\nハチロクはまっすぐな目で僕を見つめる。
2851 = "Chớp mắt, xua tan đi màng sương buồn ngủ,\nHachiroku nhìn tôi bằng ánh mắt kiên định."
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。今日の議会で、[あの子,3]8620の――\nいえ、御一夜そのものの未来が決定される」
2164 = "「Đúng vậy nhỉ. Trong cuộc họp hội đồng hôm nay, tương lai của đứa bé đó, 8620——\nKhông, là tương lai của chính Ohimitera sẽ được định đoạt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「事実上、そうなるな」
1832 = "「Trên thực tế, là vậy đấy.」"
# monologue
# JP: 御一夜市議会、予算委員会の補正予算審議。\nその採決が行われるのだから。
3021 = "Cuộc họp hội đồng thành phố Ohimitera, thẩm định ngân sách bổ sung của ủy ban ngân sách.\nBởi vì cuộc bỏ phiếu sẽ được diễn ra."
# 【ハチロク】
# display as 八六
# JP: 「……ポーレット様の予算案。\nみなさまのご理解をいただけますよね？」
1539 = "「……Dự toán ngân sách của Thị trưởng Paulette.\nChắc chắn sẽ nhận được sự thấu hiểu của mọi người đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、今日の質疑応答次第だろう」
2375 = "「Chuyện đó, còn tùy thuộc vào phần hỏi đáp hôm nay nữa.」"
# monologue
# JP: 不安げな声を聞いてしまえば、\n無条件に勇気づけたくなる。
2925 = "Nghe thấy giọng nói đầy bất an ấy,\ntôi lại muốn vô điều kiện mà tiếp thêm dũng khí cho cô ấy."
# monologue
# JP: が、言葉はそれを発する僕にも、必ず影響を与えるものだ。\nだから唇と心を、意識して強く引き締める。
2720 = "Nhưng, lời nói cũng sẽ ảnh hưởng đến chính bản thân tôi, người phát ngôn ra chúng.\nVì vậy, tôi cố ý mím chặt môi và trấn tĩnh lại cõi lòng."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致推進派にしても、ここが[せんど,1]先途だ。\nこちらの弱みを、徹底的についてくるだろう」
2058 = "「Đối với phe thúc đẩy thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#;, đây cũng là thời khắc quyết định.\nHọ chắc chắn sẽ triệt để tấn công vào điểm yếu của chúng ta.」"
# 【ハチロク】
# display as 八六
# JP: 「弱み……ですか」
2077 = "「Điểm yếu……sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「費用の問題。\x%l台枠;#00ffc040;台枠%l;#;交換で新たな不具合が出る危険。\nキハ[レイナナ,1]07の観光・日用併用に、僅かながら苦情の声もある」
2339 = "「Vấn đề chi phí. Nguy cơ phát sinh lỗi mới khi thay thế \x%l台枠;#00ffc040;khung gầm%l;#;.\nViệc kết hợp sử dụng KiHa 07 cho cả du lịch và sinh hoạt hàng ngày, cũng có một vài tiếng nói phàn nàn.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2178 = "「Vâng.」"
# monologue
# JP: ただ、現状を正しく伝える。\nそうすることで、僕の頭も整頓し直す。
2878 = "Chỉ là, truyền đạt đúng tình hình hiện tại.\nBằng cách đó, tôi cũng có thể sắp xếp lại suy nghĩ trong đầu mình."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対派の議員は固まっているが、\n過半数には及んでいない。自主投票の会派もある」
1498 = "「Các nghị sĩ thuộc phe phản đối thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#; đã đoàn kết lại,\nnhưng vẫn chưa đạt quá bán. Vẫn còn những phe phái bỏ phiếu tự do nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「ご理解をいただけなければ――\n最悪の場合、逆転を許してしまう危険もあるのですか？」
2046 = "「Nếu không nhận được sự thấu hiểu——\nTrong trường hợp xấu nhất, liệu có nguy cơ bị lật ngược tình thế không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――鉄道での振興が否定されれば、他に手はない。\n流れは一気に、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致待望へと傾くだろう」
2194 = "「Ừ——Nếu việc chấn hưng bằng đường sắt bị phủ nhận, thì không còn cách nào khác.\nCục diện sẽ ngay lập tức, nghiêng về phía mong muốn thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#; thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「……」
1519 = "「……」"
# monologue
# JP: きゅっと、ハチロクが唇を結ぶ。\n拳が、ゆっくり握られていく。
2750 = "Hachiroku mím chặt môi.\nĐôi bàn tay, từ từ nắm chặt lại."
# 【ハチロク】
# display as 八六
# JP: 「ご理解をいただく――のではなく、\nわたくしたちで、勝ち得なければならないのですね」
1802 = "「Không phải là nhận được sự thấu hiểu——\nMà là chúng ta, phải tự mình giành lấy chiến thắng nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
2199 = "「Đúng vậy.」"
# monologue
# JP: いい顔だ。\n緩まず力まず、怯えの影も見られない。
2847 = "Một khuôn mặt rất đẹp.\nKhông chùng bước, không gồng mình, cũng không thấy bóng dáng của sự sợ hãi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうするための準備もしてきた。\nポーレットはもちろん、真闇姉も日々姫も」
2218 = "「Chúng ta cũng đã chuẩn bị sẵn sàng cho việc đó rồi.\nPaulette thì tất nhiên, cả chị Mayami và Hibiki nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、よかった。もう起きとるね？」
1978 = "「A, may quá. Anh đã dậy rồi nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫か。入ってくれ」
2163 = "「Hibiki à. Vào đi.」"
# monologue
# JP: 途端、あわあわハチロクは、\n髪を、着衣を気にするそぶり。
2753 = "Ngay lập tức, Hachiroku cuống cuồng lên,\nchú ý đến mái tóc, và trang phục của mình."
# 【ハチロク】
# display as 八六
# JP: 「あ――あの、わたくし、\n身支度を整えて参ります」
2388 = "「A——ừm, em,\nsẽ đi chỉnh trang lại trang phục ạ.」"
# monologue
# JP: 日々姫と入れ替わるようにして、\n着替えを抱えてハチロクは部屋を小走りに出る。
2743 = "Như thể đổi chỗ cho Hibiki,\nHachiroku ôm lấy quần áo chạy lóc cóc ra khỏi phòng."
# monologue
# JP: 日々姫はすっかり身なりを整え、\nスケッチブックまで抱えている。
3007 = "Hibiki đã chỉnh trang xong xuôi,\nthậm chí còn ôm theo cả cuốn sổ phác thảo."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕もいつまでも寝間着ではいかんな」
1983 = "「À, anh cũng không thể cứ mặc đồ ngủ mãi được.」"
# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！？　着替えるんなら外で待っとるけん」
1993 = "「Chờ chút!? Nếu anh thay đồ thì em ra ngoài đợi nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「兄妹で照れるようなことでもなかろう。\nそれに、今日のこの日の時間は貴重だ」
1888 = "「Anh em với nhau có gì đâu mà phải ngại.\nHơn nữa, thời gian ngày hôm nay rất quý giá.」"
# 【日々姫】
# display as 日日姬
# JP: 「んっ――」
1994 = "「Ưm——」"
# monologue
# JP: 立ち去りかけてた日々姫の足がぴたりと止まる。
3198 = "Bước chân đang định rời đi của Hibiki bỗng khựng lại."
# monologue
# JP: 一応は僕も気をつかい、\n日々姫に背中を向け着替えながら問いかける。
2930 = "Dù sao thì tôi cũng để ý một chút,\nquay lưng lại với Hibiki, vừa thay đồ vừa hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「それで、どうした？」
2402 = "「Thế, có chuyện gì vậy?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、うん。これ、頼まれてたやつ――」
1977 = "「A, vâng. Đây, cái anh nhờ em làm——」"
# 【双鉄】
# display as 雙鐵
# JP: 「どれ」
2120 = "「Đâu xem nào.」"
# monologue
# JP: スケッチブックの間から、\n日々姫がボードを取り出していく。
3009 = "Từ giữa cuốn sổ phác thảo,\nHibiki lấy ra một tấm bảng."
# monologue
# JP: 今日の答弁のための備えだ。\n確認したくて、着替えを急ぐ。
3269 = "Đây là đồ dự phòng cho phần biện luận hôm nay.\nTôi muốn kiểm tra ngay nên vội vàng thay đồ."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ――さすがだな。\n見やすくて良い出来のフリップだ……っと？」
1975 = "「A, ừm——Quả không hổ danh.\nMột tấm bảng lật rất dễ nhìn và chất lượng tốt……ủa?」"
# monologue
# JP: なんだ……見覚えのない、地図に――表。
3268 = "Cái gì đây……Một tấm bản đồ lạ hoắc——và cả bảng biểu nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「これは？」
2377 = "「Cái này là?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、フリップの準備ばしてたら、ねぇねぇが。\n資料をくれて、『役に立つかもしれんけん』って」
2006 = "「Vâng, lúc em đang chuẩn bị bảng lật thì chị Mayami đến.\nĐưa cho em tài liệu này, bảo là 『Có thể sẽ có ích đấy』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉がか？」
2246 = "「Chị Mayami sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩も、参考人に呼ばれるみたいやけん」
2272 = "「Nghe nói chị Kisaki, cũng được gọi đến làm nhân chứng đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか……なるほどな。\n向こうも、やはり本気だな」
2158 = "「Vậy sao……Ra là thế.\nBên kia, quả nhiên cũng rất nghiêm túc.」"
# monologue
# JP: 今日の質疑応答では、僕も参考人として、\n誘致反対派の予算委員の質問に答えることとなっている。
2810 = "Trong phần hỏi đáp hôm nay, tôi cũng với tư cách là nhân chứng,\nsẽ trả lời các câu hỏi của ủy viên ngân sách phe phản đối thu hút nhà máy."
# monologue
# JP: つまりは事実上の応援演説だが、参考人である以上、\n他の委員から質問をされる可能性もある。
2876 = "Tóm lại trên thực tế là một bài diễn thuyết ủng hộ, nhưng đã là nhân chứng,\nthì cũng có khả năng bị các ủy viên khác đặt câu hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットからも忠告はされている。\n今日ばかりは、事前通告のない質問もあるかもしれぬと」
2211 = "「Paulette cũng đã cảnh báo anh rồi.\nChỉ riêng hôm nay, có thể sẽ có những câu hỏi không được báo trước.」"
# monologue
# JP: 市議会の議長は、かなり柔軟と定評のある人物だ。
2890 = "Chủ tịch hội đồng thành phố, là một nhân vật nổi tiếng khá linh hoạt."
# monologue
# JP: 御一夜の未来を見誤らぬよう、議論を活性化させるため、\nその程度の逸脱を良しとするとて、不思議もあるまい。
3062 = "Để không nhìn nhận sai lầm về tương lai của Ohimitera, nhằm thúc đẩy các cuộc tranh luận sôi nổi hơn,\nviệc ông ấy chấp nhận mức độ sai lệch đó, cũng không có gì lạ."
# 【双鉄】
# display as 雙鐵
# JP: 「どんな切り口で攻め込まれるかわからんからな。\n真闇姉が預けてくれるものならば心強い」
2018 = "「Vì không biết họ sẽ tấn công từ góc độ nào mà.\nNếu là đồ do chị Mayami gửi gắm thì thật sự rất đáng tin cậy.」"
# monologue
# JP: 言った途端に、ぷくっと日々姫の頬がふくれる。
2941 = "Vừa dứt lời, hai má của Hibiki liền phồng lên."
# 【日々姫】
# display as 日日姬
# JP: 「私のフリップば心強くなかと？」
2119 = "「Bảng lật của em không đáng tin cậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさか、そんなことは――\nああ、いや。礼を言うのが遅れたな」
2095 = "「Làm gì có chuyện đó——\nA, không. Là do anh chậm trễ trong việc cảm ơn thôi.」"
# monologue
# JP: 頭を下げる。\nというよりむしろ、素直に頭が下がってる。
2934 = "Tôi cúi đầu.\nNói đúng hơn là, tôi thành thật cúi đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「本当に感謝している。フリップのことだけでなく――\n僕らに、これほどまでに力を貸してくれていることに」
2240 = "「Thực sự rất cảm ơn em. Không chỉ vì tấm bảng lật——\nMà còn vì em đã dốc sức giúp đỡ bọn anh nhiều đến thế.」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　ちょっ、なに！？\n今さら――そんな、やめてよにぃに」
1957 = "「Hả? Chờ đã, gì vậy!?\nĐến giờ phút này rồi——thôi đi anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかし――\n当初、お前は\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に賛成していただろう？」
1814 = "「Không, nhưng mà——\nBan đầu, chẳng phải em cũng tán thành việc thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#; sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「それは……うん。まぁ」
2373 = "「Chuyện đó……vâng. Thì là vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「もしもそのまま、\n考えを変えないままでいたのなら……」
2044 = "「Nếu như em cứ giữ nguyên,\nkhông thay đổi suy nghĩ của mình thì……」"
# monologue
# JP: ゾっとする。\n広報告知に関しての日々姫のセンスは、本物だ。
2929 = "Tôi rùng mình.\nKhuếu thẩm mỹ của Hibiki trong việc quảng cáo và thông báo, là đồ thật đấy."
# monologue
# JP: それが無くなるだけでなく、向こうの力になっていたなら\n――僕らの発する声など恐らく、かき消されていた。
2866 = "Nếu không có nó, mà nó lại trở thành sức mạnh của phe bên kia\n——thì có lẽ, tiếng nói của chúng tôi đã bị nhấn chìm mất rồi."
# 【日々姫】
# display as 日日姬
# JP: 「考えなんて、変えてなかと？」
2116 = "「Suy nghĩ của em, đâu có thay đổi đâu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？　それはどういう――」
1965 = "「Hử? Đó là ý gì——」"
# 【日々姫】
# display as 日日姬
# JP: 「御一夜に一番良かかと思うことば手伝ーとるだけ」
2107 = "「Em chỉ đang giúp đỡ những việc mà em nghĩ là tốt nhất cho Ohimitera thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1966 = "「À.」"
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩も、私とおんなじ。\nただ、一番良かと思う手段ば、違とるだけで」
2271 = "「Chị Kisaki, cũng giống như em vậy.\nChỉ là, phương pháp mà chị ấy cho là tốt nhất, lại khác với em thôi.」"
# monologue
# JP: そうだったな、と思い出す。\n看板描きやイラストマップ――
2950 = "Đúng là vậy nhỉ, tôi chợt nhớ ra.\nViệc vẽ bảng hiệu hay bản đồ minh họa——"
# monologue
# JP: 日々姫と稀咲がともに為してきたことたちが、\nなによりのその証明だ。
3005 = "Những điều mà Hibiki và Kisaki đã cùng nhau làm,\nchính là minh chứng rõ ràng nhất cho điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば宝生稀咲にも……鉄道による振興が、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致より優れていると思ってもらえれば」
2409 = "「Nếu vậy thì, chỉ cần làm cho Houshou Kisaki……nghĩ rằng việc chấn hưng bằng đường sắt,\nưu việt hơn so với việc thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#; là được.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！」
2004 = "「Vâng!」"
# monologue
# JP: おもいっきりに日々姫が頷く。\n強い瞳で僕を見つめる。
3011 = "Hibiki gật đầu thật mạnh.\nNhìn tôi bằng ánh mắt kiên định."
# 【日々姫】
# display as 日日姬
# JP: 「そしたら、きっと、先輩も力になってくれるとよ」
2378 = "「Nếu làm được vậy, chắc chắn, chị ấy cũng sẽ trở thành sức mạnh của chúng ta.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいな。それもまた実に心強かろう」
2301 = "「Tuyệt lắm. Điều đó cũng thực sự rất đáng tin cậy.」"
# monologue
# JP: 思えば、意識を変えられる。\nこれは、敵・味方に分かれての論戦ではなく――
3273 = "Nghĩ vậy, nhận thức của tôi đã thay đổi.\nĐây không phải là một cuộc luận chiến chia rẽ địch - ta——"
# monologue
# JP: よりよい御一夜を作るための最適解を探し求める、\nいわば、ひとつのコンペなのだと。
3196 = "Mà là một cuộc thi, để tìm ra giải pháp tối ưu nhất\nnhằm xây dựng một Ohimitera tốt đẹp hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「そうするためにも、出来る限りを尽くさねばな。\n真闇姉は、下か？」
2219 = "「Để làm được điều đó, chúng ta cũng phải cố gắng hết sức.\nChị Mayami, đang ở dưới nhà à?」"
# 【日々姫】
# display as 日日姬
# JP: 「ん、今日ば蔵ば任せて、傍聴に行くって」
2007 = "「Vâng, hôm nay giao lại nhà xưởng ủ rượu cho em, chị ấy bảo sẽ đi dự thính.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば、追加資料について、\nレクチャーを受けることもできるか」
2159 = "「Vậy sao, nếu thế thì, về các tài liệu bổ sung,\nanh có thể nhờ chị ấy giảng giải thêm được không nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「わ」
1953 = "「Oa.」"
# monologue
# JP: 日々姫の目が丸くなる。\n驚いたように、同時に少し、楽しげに。
3013 = "Mắt Hibiki tròn xoe.\nCó vẻ ngạc nhiên, nhưng đồng thời cũng có chút vui vẻ."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、ちょっと変わったと？」
2424 = "「Anh hai, có chút thay đổi rồi sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん」
1969 = "「À……ừm.」"
# monologue
# JP: 言われて、気づく。\n確かにだ。
2861 = "Bị nói vậy, tôi mới nhận ra.\nĐúng là thế thật."
# 【双鉄】
# display as 雙鐵
# JP: 「以前の僕なら、土壇場であがきはしなかったかもな。\n『これまでの積み重ねを信じるのみだ』と、そう考えて」
2286 = "「Nếu là anh của trước kia, có lẽ sẽ không vùng vẫy vào phút chót đâu.\nSẽ chỉ nghĩ là 『Chỉ cần tin tưởng vào những gì đã tích lũy từ trước đến nay là được』.」"
# monologue
# JP: が、今は――そんな余裕をとても持てない。\n付け焼き刃でも、生兵法でも、見苦しくとも構わない。
2719 = "Nhưng, bây giờ thì——tôi hoàn toàn không có sự thong dong đó.\nDù là học đòi, dù là binh pháp nửa vời, dù có khó coi cũng chẳng sao."
# monologue
# JP: それが、御一夜のよりよい未来を作ると信じ……\nそうしてそこでハチロクに、暮らして欲しいと願うから。
2804 = "Vì tôi tin rằng, điều đó sẽ tạo ra một tương lai tốt đẹp hơn cho Ohimitera……\nVà vì tôi mong muốn, Hachiroku sẽ sống ở đó."
# 【ポーレット】
# display as 波萊特
# JP: 「以上をもちまして、\n本補正予算案の趣旨説明を終わります」
2186 = "「Trên đây,\nlà phần kết thúc giải trình về dự toán ngân sách bổ sung này.」"
# monologue
# JP: 着席と同時に拍手。\n議場の、ほとんど全面からの。
2812 = "Vừa ngồi xuống thì những tràng vỗ tay vang lên.\nTừ hầu như khắp mọi nơi trong hội trường."
# monologue
# JP: （……見事だ）
3310 = "（……Tuyệt vời.）"
# monologue
# JP: 補正予算案の趣旨と、\n予算成立の可否によらず、市長を辞任することとの説明。
3050 = "Giải trình về mục đích của dự toán ngân sách bổ sung,\nvà tuyên bố sẽ từ chức thị trưởng bất kể ngân sách có được thông qua hay không."
# monologue
# JP: ――ポーレットがしたことはただそれだけで。\nそれゆえむしろ鮮やかに、語られぬことが際立った。
1468 = "——Những gì Paulette làm chỉ có vậy.\nChính vì thế, những điều không được nói ra lại càng trở nên nổi bật một cách sống động."
# monologue
# JP: （……技術などより大切なものが、\n演説には――いや、政治にはあるのだな）
3313 = "（……Thứ quan trọng hơn cả kỹ thuật,\ntrong diễn thuyết——không, trong chính trị mới đúng nhỉ.）"
# monologue
# JP: 御一夜のよりよい未来を築くため――\nその一点を目的とした、無私の行動。
3063 = "Để xây dựng một tương lai tốt đẹp hơn cho Ohimitera——\nMột hành động vô tư, chỉ nhắm vào một mục đích duy nhất đó."
# monologue
# JP: 予算案への賛成反対、立場を問わずに起きた拍手は、\nポーレットが積み重ねてきた時間への、称賛だろう。
2656 = "Những tràng vỗ tay vang lên bất kể lập trường tán thành hay phản đối dự toán ngân sách,\nchắc hẳn là sự tán dương dành cho những thời gian mà Paulette đã tích lũy được."
# 【議長】
# display as 議長
# JP: 「この[さい]際、関連の質疑に入ります。\n[みんゆうれん,2]民由連、斉藤委員」
2411 = "「Nhân dịp này, chúng ta sẽ bước vào phần hỏi đáp liên quan.\nỦy viên Saitou của Đảng Dân Do.」"
# 【女性議員】
# display as 女議員
# JP: 「はい」
2151 = "「Vâng.」"
# monologue
# JP: 斉藤議員――\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致反対派であり、\n親ポーレットの女性議員だ。
3307 = "Nghị sĩ Saitou——Là người thuộc phe phản đối thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#;,\nvà là nữ nghị sĩ thân thiết với Paulette."
# monologue
# JP: ポーレットへの質疑応答もなめらかだ。\nさきほど生まれた流れを巧みに導き、強めていく。
2856 = "Phần hỏi đáp với Paulette cũng diễn ra rất trôi chảy.\nKhéo léo dẫn dắt và củng cố luồng dư luận vừa mới được tạo ra lúc nãy."
# monologue
# JP: （……質疑に、工場誘致派の議員たちさえ頷いている）
3318 = "（……Đến cả các nghị sĩ thuộc phe thu hút nhà máy cũng đang gật gù trước những câu hỏi.）"
# monologue
# JP: この補正予算案の成立を、ポーレット辞任の花道に――\n議場の中でそんな空気が、どんどん濃度を増してるようだ。
3241 = "Việc thông qua dự toán ngân sách bổ sung này, sẽ trở thành con đường trải đầy hoa cho việc từ chức của Paulette——\nBầu không khí đó trong hội trường, dường như đang ngày càng đậm đặc hơn."
# 【女性議員】
# display as 女議員
# JP: 「――市長。ありがとうございました。\nそれでは、参考人にお話を伺わせていただきます」
1504 = "「——Thưa Thị trưởng. Xin cảm ơn cô.\nTiếp theo, xin phép được lắng nghe ý kiến từ các nhân chứng.」"
# 【議長】
# display as 議長
# JP: 「参考人、[みぎたそうてつ,3]右田双鉄君」
2431 = "「Nhân chứng, Migita Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2020 = "「Có.」"
# monologue
# JP: ならば、ただただ流れに乗って、\n準備のとおりの答弁をすれば、それでいい。
3284 = "Nếu vậy thì, chỉ cần nương theo luồng dư luận này,\nvà trả lời đúng như những gì đã chuẩn bị là được."
# 【女性議員】
# display as 女議員
# JP: 「右田さんはバーベキュー\x%l列車;#00ffc040;列車%l;#;――[ハチロクニイマル,3]8620号の、\n主任\x%l機関士;#00ffc040;機関士%l;#;兼運行責任者でいらっしゃるとのことですが」
1937 = "「Anh Migita là \x%l機関士;#00ffc040;Lái tàu%l;#; trưởng kiêm người chịu trách nhiệm vận hành của \x%l列車;#00ffc040;chuyến tàu%l;#; BBQ——\nĐầu máy 8620 đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。[ハチロクニイマル,3]8620によるバーベキュー\x%l列車;#00ffc040;列車%l;#;の、\n全ての運行を担当させていただいております」
2174 = "「Vâng. Tôi chịu trách nhiệm toàn bộ việc vận hành,\ncủa \x%l列車;#00ffc040;chuyến tàu%l;#; BBQ do Đầu máy 8620 đảm nhận.」"
# monologue
# JP: 現状、\x%l8620;#00ffc040;8620%l;#;の\x%l機関士;#00ffc040;機関士%l;#;は僕しかいないし、\nならば当然、運行の責任を負う者も僕だ。
3091 = "Hiện tại, \x%l機関士;#00ffc040;Lái tàu%l;#; của \x%l8620;#00ffc040;8620%l;#; chỉ có mình tôi,\nvậy nên đương nhiên, người chịu trách nhiệm vận hành cũng là tôi."
# monologue
# JP: 主任だの責任者だの、言葉遊びにすぎんようだが、\n肩書を強調しておくことが、この後の答弁に効いてくる。
2687 = "Lái tàu trưởng hay người chịu trách nhiệm, nghe có vẻ chỉ là trò chơi chữ,\nnhưng việc nhấn mạnh chức danh sẽ có tác dụng cho phần biện luận sau này."
# 【女性議員】
# display as 女議員
# JP: 「つまり、現場を一番よく知る方なのですね。\nそれでは、現場からのご意見をお聞かせください」
1825 = "「Tóm lại, anh là người hiểu rõ hiện trường nhất nhỉ.\nVậy thì, xin hãy cho chúng tôi nghe ý kiến từ phía hiện trường.」"
# monologue
# JP: 経営者の、ポーレットの声と、\n労働者である僕の声。
3183 = "Tiếng nói của người điều hành, Paulette, và\ntiếng nói của người lao động là tôi."
# monologue
# JP: 異なる立場が、異なる声で、同じ結論にたどり着く。\n構図が単純であるがゆえ、主張の説得力は増す。
2653 = "Những lập trường khác nhau, bằng những tiếng nói khác nhau, cùng đi đến một kết luận.\nChính vì cấu trúc đơn giản, nên sức thuyết phục của luận điểm càng tăng lên."
# 【女性議員】
# display as 女議員
# JP: 「――なるほど。それほどまでに\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;と\nバーベキュー\x%l客車;#00ffc040;客車%l;#;の相乗効果は大きいのですね？」
1499 = "「——Ra là vậy. Hiệu ứng cộng hưởng giữa \x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#; và\n\x%l客車;#00ffc040;toa hành khách%l;#; BBQ lại lớn đến thế sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。こちらが、アンケートで出た満足度――\n五段階のうち、『非常に満足』をいただいた比率です」
2177 = "「Vâng. Đây là mức độ hài lòng thu được từ bảng khảo sát——\nTrong năm mức độ, đây là tỷ lệ nhận được đánh giá 『Vô cùng hài lòng』.」"
# monologue
# JP: 縦軸が満足度、\n横軸が時間経過の、折れ線グラフだ。
3270 = "Trục dọc là mức độ hài lòng,\ntrục ngang là thời gian trôi qua, một biểu đồ đường gấp khúc."
# 【女性議員】
# display as 女議員
# JP: 「途中……赤い線が引いてある場所からやや降下し、\nその数日後から、極端に降下しているようですが」
2125 = "「Giữa chừng……từ chỗ có vạch kẻ màu đỏ, nó hơi giảm xuống,\nvà vài ngày sau đó, có vẻ như đã giảm mạnh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「赤い線が引いてある日が、牽引車両変更――\n[ハチロクニイマル,3]8620からキハ[レイナナ,1]07へと切り替わった日です」
1906 = "「Ngày có vạch kẻ màu đỏ, là ngày thay đổi phương tiện kéo tàu——\nNgày chuyển từ Đầu máy 8620 sang KiHa 07.」"
# monologue
# JP: 縦軸は、0～100でなく、80～100のグラフになっている。
2808 = "Trục dọc không phải là từ 0 đến 100, mà là biểu đồ từ 80 đến 100."
# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;牽引でも『非常に満足』は平均80\%以上の数値を\n出しているのだが、グラフの見た目は、“激変”だ。
3294 = "Dù được kéo bởi \x%lキハ07;#00ffc040;KiHa 07%l;#;, đánh giá 『Vô cùng hài lòng』 vẫn đạt con số trung bình trên 80\%,\nnhưng nhìn vào biểu đồ thì, nó giống như một \"sự biến động dữ dội\"."
# 【双鉄】
# display as 雙鐵
# JP: 「『おおむね満足』まで加えた\nグラフはこちらとなります」
2030 = "「Còn đây là biểu đồ,\nđã cộng thêm cả đánh giá 『Nhìn chung là hài lòng』.」"
# monologue
# JP: こちらは、ずっとほぼ１００％。\nバーベキュー\x%l客車;#00ffc040;客車%l;#;自体は、変わらずご満足いただけている。
3266 = "Biểu đồ này thì luôn xấp xỉ 100%.\nBản thân \x%l客車;#00ffc040;toa hành khách%l;#; BBQ, vẫn luôn nhận được sự hài lòng."
# monologue
# JP: にもかかわらず“おおむね”と“非常に”の間に出た差異。\nそれこそが、\x%l8620;#00ffc040;8620%l;#;の持つ、“ならでは”の魅力だ。
1474 = "Dù vậy, sự khác biệt giữa \"Nhìn chung\" và \"Vô cùng\" vẫn xuất hiện.\nĐó chính là, sức hấp dẫn \"độc nhất vô nhị\" mà \x%l8620;#00ffc040;8620%l;#; mang lại."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり基本的なサービスにプラスされる、\nプレミアムな満足感を、[ハチロクニイマル,3]8620は与えてきたわけです」
1826 = "「Tóm lại, 8620 đã mang đến một cảm giác hài lòng cao cấp,\ncộng thêm vào những dịch vụ cơ bản.」"
# 【女性議員】
# display as 女議員
# JP: 「なるほど。そこが、他の観光資源に差をつけていく\n重要なポイントともなるわけですね」
1913 = "「Ra là vậy. Đó cũng chính là điểm quan trọng,\ntạo nên sự khác biệt so với các nguồn tài nguyên du lịch khác nhỉ.」"
# monologue
# JP: ポーレットと真闇姉とのアドバイスも受け、\n練りあげてきた答弁を、斉藤議員がうまく引き出す。
3309 = "Nghị sĩ Saitou đã khéo léo dẫn dắt phần biện luận mà tôi đã dày công chuẩn bị,\ndựa trên những lời khuyên của Paulette và chị Mayami."
# monologue
# JP: 引き出すだけにとどまらず、ポイントの強調もしてくれる。
2651 = "Không chỉ dừng lại ở việc dẫn dắt, bà ấy còn giúp nhấn mạnh các điểm chính."
# 【女性議員】
# display as 女議員
# JP: 「以上で、質問を終わります。ありがとうございました」
2132 = "「Trên đây là phần câu hỏi của tôi. Xin cảm ơn.」"
# monologue
# JP: （パチパチパチパチ）
3334 = "（Lộp bộp lộp bộp）"
# monologue
# JP: 効果は絶大。\n満場の、といって差し支えない拍手が僕らを包んでくれる。
2978 = "Hiệu quả vô cùng to lớn.\nNhững tràng pháo tay vang lên từ khắp hội trường, có thể nói là bao trùm lấy chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございました」
2445 = "「Xin cảm ơn.」"
# monologue
# JP: 斉藤議員に、力を貸してくれたみんなに――\n本心からのお礼を置いて、元の席へと静かに戻る。
2927 = "Gửi lời cảm ơn chân thành đến nghị sĩ Saitou, và tất cả những người đã giúp đỡ tôi——\nTôi lặng lẽ quay trở lại chỗ ngồi của mình."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。素晴らしいご答弁でございました」
2435 = "「Ngài Soutetsu. Phần biện luận của ngài thật tuyệt vời.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　ならば、なによりだ」
2161 = "「Vậy sao? Thế thì tốt quá rồi.」"
# monologue
# JP: 運転鞄の中からは、低く抑えた――\nそして嬉しげで誇らしげなハチロクの声。
2900 = "Từ trong chiếc cặp lái tàu, truyền ra một giọng nói trầm thấp——\nNhưng lại chứa đựng sự vui sướng và tự hào của Hachiroku."
# monologue
# JP: 耳にしたならそれだけで、緊張が解けてしまいそうになる。
2787 = "Chỉ cần nghe thấy giọng nói ấy thôi, sự căng thẳng của tôi dường như đã tan biến."
# monologue
# JP: （が、まだだ。\n今日の正念場は、ここからだ）
3332 = "（Nhưng, vẫn chưa xong đâu.\nThời khắc quyết định của ngày hôm nay, bây giờ mới bắt đầu.）"
# 【議長】
# display as 議長
# JP: 「この際、関連の質疑を続けます。\n御一夜の未来を考える会。[にいつ,1]新津議員」
2128 = "「Nhân dịp này, chúng ta sẽ tiếp tục phần hỏi đáp liên quan.\nHội Tương lai Ohimitera. Nghị sĩ Niitsu.」"
# 【中堅議員】
# display as 中堅議員
# JP: 「バーベキュー\x%l列車;#00ffc040;列車%l;#;の運行について、\nクレームが発生している件はご存知ですね？」
2100 = "「Về việc vận hành \x%l列車;#00ffc040;chuyến tàu%l;#; BBQ,\nchắc cô cũng biết là đang có những lời phàn nàn phát sinh đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。改善意見として承っております」
2171 = "「Vâng. Chúng tôi đang tiếp nhận chúng như những ý kiến đóng góp để cải thiện.」"
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致推進派の急先鋒である新津議員。
2702 = "Nghị sĩ Niitsu, là người tiên phong của phe thúc đẩy thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#;."
# monologue
# JP: ポーレットの花道などという意識はまるでないらしい。\n挨拶もせず、噛みつかんばかりの勢いだ。
2699 = "Có vẻ như ông ta hoàn toàn không có ý định để cho Paulette được từ chức trong êm đẹp.\nThậm chí không thèm chào hỏi, mà lao vào tấn công như muốn cắn xé."
# monologue
# JP: （が――これは……役者が違うな）
3330 = "（Nhưng mà——thế này thì……đẳng cấp khác hẳn rồi.）"
# 【中堅議員】
# display as 中堅議員
# JP: 「しかし！　鉄道業のため市長を辞任する。\nこれが市政軽視であると言わずに、なんと言いますか」
1860 = "「Nhưng mà! Từ chức thị trưởng vì ngành đường sắt.\nĐiều này không gọi là coi thường chính quyền thành phố thì gọi là gì?」"
# 【ポーレット】
# display as 波萊特
# JP: 「日ノ本の法が公職にあるものの兼職を禁じていないのは、\n利権、金銭の流れを明らかにするためと理解しています」
2111 = "「Luật pháp Hinomoto không cấm những người giữ chức vụ công kiêm nhiệm các công việc khác,\ntôi hiểu đó là để minh bạch hóa dòng chảy của lợi ích và tiền bạc.」"
# monologue
# JP: 劣勢を挽回せんとの感情的な――\n通告になかった質問さえを、いとも容易く切り返している。
2882 = "Những câu hỏi đầy cảm tính nhằm vớt vát lại thế yếu——\nNgay cả những câu hỏi không được báo trước, cô ấy cũng dễ dàng đáp trả."
# monologue
# JP: ポーレットが語っているのは、学園少等部で習うこと。\nさしもの新津議員といえど、そこに異論は挟めない。
3048 = "Những gì Paulette đang nói, đều là những kiến thức được dạy ở trường tiểu học.\nDù là nghị sĩ Niitsu đi chăng nữa, cũng không thể đưa ra bất kỳ phản bác nào."
# 【ポーレット】
# display as 波萊特
# JP: 「今回の補正予算が仮に通れば、明快な利権が発生します。\n立法の趣旨を尊重するため、辞任が最適と判断しました」
1877 = "「Nếu dự toán ngân sách bổ sung lần này được thông qua, sẽ phát sinh những lợi ích rõ ràng.\nĐể tôn trọng mục đích của luật pháp, tôi cho rằng từ chức là quyết định tốt nhất.」"
# 【中堅議員】
# display as 中堅議員
# JP: 「ならば市長職を優先し、社長業を譲ることこそが、\n選良たる者の判断ではないかと思うのですが、いかがか」
2415 = "「Nếu vậy thì ưu tiên chức vụ thị trưởng, và nhường lại công việc giám đốc,\nchẳng phải đó mới là quyết định của một người được tuyển chọn sao, cô nghĩ sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ご主張、おっしゃるとおりかと思います」
2121 = "「Chủ trương của ông, tôi nghĩ là hoàn toàn chính xác.」"
# monologue
# JP: 大きなどよめき。\nしてやったり、と新津議員の目がギラつく。
2645 = "Một tiếng ồ lớn vang lên.\nÁnh mắt của nghị sĩ Niitsu lóe lên vẻ đắc ý, như thể đã đạt được mục đích."
# monologue
# JP: が、ポーレット自身には動揺の影すら見られない。
2715 = "Nhưng, bản thân Paulette lại không hề để lộ ra một chút dao động nào."
# 【ポーレット】
# display as 波萊特
# JP: 「しかし、人材の問題がありました。政界を見れば、\n御一夜には優れた人材が数多くいらっしゃいますが――」
1855 = "「Tuy nhiên, lại có vấn đề về nhân sự. Nhìn vào giới chính trị,\nOhimitera có rất nhiều nhân tài xuất chúng, nhưng mà——」"
# monologue
# JP: 一拍。\n言葉が浸透するのを待つかのような沈黙。
2834 = "Ngập ngừng một nhịp.\nMột sự im lặng như để chờ đợi những lời nói đó thấm sâu vào tâm trí mọi người."
# 【ポーレット】
# display as 波萊特
# JP: 「鉄道界にはまだ人材が乏しく。その数少ない人材も、\nそれぞれの職務に忙殺されてしまっている状況です」
1865 = "「Trong giới đường sắt vẫn còn rất thiếu nhân tài. Và những nhân tài ít ỏi đó,\ncũng đang trong tình trạng bận rộn ngập đầu với các nhiệm vụ của riêng mình.」"
# monologue
# JP: ああ、と納得するような声。\nこれも、議場のあちこちからだ。
3019 = "Những tiếng \"À\" đầy vẻ đồng tình vang lên.\nCũng xuất phát từ khắp mọi nơi trong hội trường."
# 【ポーレット】
# display as 波萊特
# JP: 「ですので、御一夜の政・財のよりよき発展のために、\n市長辞任の方がベターと、判断させていただきました」
2017 = "「Vì vậy, vì sự phát triển tốt đẹp hơn của cả chính trị và kinh tế Ohimitera,\ntôi đã quyết định rằng việc từ chức thị trưởng sẽ là lựa chọn tốt hơn.」"
# monologue
# JP: そうだ！　と、ヤジ。
3020 = "\"Đúng thế!\" Tiếng reo hò vang lên."
# monologue
# JP: 声の方向へ向いた新津議員の視線が、\nやがて議場の一点へ――吸い付くように向けられる。
2986 = "Ánh mắt của nghị sĩ Niitsu hướng về phía âm thanh phát ra,\nvà rồi hướng về một điểm trong hội trường——như thể bị hút chặt vào đó."
# monologue
# JP: （宝生稀咲……\nそれに、浦上さんもか）
3339 = "（Houshou Kisaki……\nCả anh Urakami nữa sao.）"
# monologue
# JP: 稀咲と浦上はなにかを小声で交換しあい――\nやがて、稀咲が大きく頷く。
3148 = "Kisaki và Urakami thì thầm trao đổi điều gì đó với nhau——\nRồi sau đó, Kisaki gật đầu thật mạnh."
# 【中堅議員】
# display as 中堅議員
# JP: 「見解の相違ですな。これ以上は結構です。\n議長、参考人への質問に移行します」
2236 = "「Đúng là sự khác biệt về quan điểm nhỉ. Tôi không còn gì để nói thêm nữa.\nThưa chủ tọa, xin phép chuyển sang phần đặt câu hỏi cho nhân chứng.」"
# 【議長】
# display as 議長
# JP: 「参考人。宝生稀咲君」
2313 = "「Nhân chứng. Houshou Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「隈元銀行御一夜支店長、宝生稀咲です」
2112 = "「Tôi là Houshou Kisaki, Giám đốc chi nhánh Ohimitera của Ngân hàng Kumamoto.」"
# 【中堅議員】
# display as 中堅議員
# JP: 「宝生さん。銀行の立場からみて、市長提案の本補正予算。\nこれに対し、疑問を感じる部分はありますか？」
2052 = "「Cô Houshou. Đứng trên lập trường của ngân hàng, về dự toán ngân sách bổ sung do Thị trưởng đề xuất này.\nCô có cảm thấy nghi ngờ ở điểm nào không?」"
# 【稀咲】
# display as 稀咲
# JP: 「よく考えられた補正予算案であると感じました。\nが、一点、少し気がかりな点はあります」
2122 = "「Tôi cảm thấy đây là một dự toán ngân sách bổ sung đã được cân nhắc rất kỹ lưỡng.\nNhưng, có một điểm, tôi hơi bận tâm một chút.」"
# 【中堅議員】
# display as 中堅議員
# JP: 「それは？」
2312 = "「Đó là?」"
# 【稀咲】
# display as 稀咲
# JP: 「再現性についてです」
2421 = "「Về tính khả thi để tái hiện lại.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！？」
2454 = "「!?」"
# monologue
# JP: 運転鞄の中から、詰まった声。
2899 = "Từ trong chiếc cặp lái tàu, phát ra một giọng nói nghẹn lại."
# monologue
# JP: 心あたりがあるのか――と、\n問うより先に、稀咲の声が力強く響く。
2970 = "Em có biết chuyện gì sao——\nTrước khi tôi kịp hỏi, giọng nói của Kisaki đã vang lên đầy mạnh mẽ."
# 【稀咲】
# display as 稀咲
# JP: 「この点、市長から直接のご答弁をいただきたいのですが\nいかがでしょうか？」
2422 = "「Về điểm này, tôi muốn nhận được câu trả lời trực tiếp từ Thị trưởng,\nkhông biết có được không ạ?」"
# 【議長】
# display as 議長
# JP: 「直接討議を認めます」
1880 = "「Chấp thuận cho phép thảo luận trực tiếp.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！！？」
2453 = "「!!?」"
# monologue
# JP: 動揺が顔にあらわれている。立ち上がる勢いがまるで無い。\nいかん――あのポーレットだ。
2846 = "Sự dao động hiện rõ trên khuôn mặt cô ấy. Hoàn toàn không có chút khí thế nào khi đứng lên.\nKhông xong rồi——là dáng vẻ đó của Paulette."
# monologue
# JP: この質問をまるきり予想もしてなかったのか、\n不意を打たれた、弱いポーレットが出てしまっている。
2794 = "Có lẽ cô ấy hoàn toàn không lường trước được câu hỏi này,\nbị tấn công bất ngờ, dáng vẻ yếu đuối của Paulette đã bộc lộ ra ngoài."
# 【稀咲】
# display as 稀咲
# JP: 「今回、[ハチロクニイマル,3]8620の\x%l台枠;#00ffc040;台枠%l;#;交換にかかる費用が、驚くべき\n低額にまとまるということは、喜ばしいことですね」
2379 = "「Lần này, chi phí cho việc thay thế \x%l台枠;#00ffc040;khung gầm%l;#; của Đầu máy 8620,\nđược gói gọn trong một con số thấp đến kinh ngạc, quả là một điều đáng mừng nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「は……はい」
2150 = "「V……Vâng.」"
# 【稀咲】
# display as 稀咲
# JP: 「が、このようなめぐり合わせ、言ってしまえば幸運に、\n今後とも、恵まれるという保証はあるのでしょうか？」
1861 = "「Nhưng mà, những cơ duyên như thế này, hay nói thẳng ra là sự may mắn,\nliệu có gì đảm bảo rằng từ nay về sau, chúng ta vẫn sẽ tiếp tục nhận được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2452 = "「!」"
# monologue
# JP: なるほど――再現性の問題とは、つまりそういうことか。
2773 = "Ra là vậy——vấn đề về tính khả thi để tái hiện lại, tóm lại là như thế sao."
# monologue
# JP: 今回の、素晴らしいめぐり合わせを二度三度……\n確かに、繰り返せるものとは思えない。
3125 = "Cơ duyên tuyệt vời lần này, liệu có thể lặp lại lần hai, lần ba……\nQuả thực, tôi không nghĩ là có thể lặp lại được."
# 【ポーレット】
# display as 波萊特
# JP: 「それは……わたしでは――\nその……判断も、予測もできないことです」
2374 = "「Chuyện đó……tôi thì——\nCái đó……không thể phán đoán, cũng không thể dự đoán được.」"
# 【稀咲】
# display as 稀咲
# JP: 「では質問を変えましょう。交換して新規実装した\x%l台枠;#00ffc040;台枠%l;#;が、\n将来、また破損したとして――その時にはどうします？」
2406 = "「Vậy tôi sẽ đổi câu hỏi. Giả sử \x%l台枠;#00ffc040;khung gầm%l;#; mới được thay thế và lắp đặt,\ntrong tương lai, lại bị hư hỏng một lần nữa——khi đó cô sẽ làm thế nào?」"
# 【ポーレット】
# display as 波萊特
# JP: 「…………あの――そのときは――」
1518 = "「…………Cái đó——khi đó thì——」"
# monologue
# JP: 青い瞳がぐらぐら揺れてる。\nこれは保たない。
2853 = "Đôi mắt xanh biếc đang rung động dữ dội.\nThế này thì không trụ nổi mất."
# monologue
# JP: 厳しいところを突かれてしまった。\n動揺モードのポーレットでは、乗り切ることは難しかろう。
3213 = "Bị đâm trúng điểm yếu chí mạng rồi.\nVới một Paulette đang trong trạng thái dao động, e là khó mà vượt qua được."
# 【双鉄】
# display as 雙鐵
# JP: 「議長。それに関しては、現場の立場からの方が、\n正確な答弁をさせていただけるかと存じます」
2317 = "「Thưa chủ tọa. Về vấn đề đó, tôi nghĩ nếu đứng trên lập trường của hiện trường,\nsẽ có thể đưa ra câu trả lời chính xác hơn ạ.」"
# 【議長】
# display as 議長
# JP: 「右田参考人の答弁を認めます」
1881 = "「Chấp thuận cho nhân chứng Migita trả lời.」"
# 【稀咲】
# display as 稀咲
# JP: 「それでは、右田参考人に改めてお伺いします」
2414 = "「Vậy thì, tôi xin hỏi lại nhân chứng Migita.」"
# monologue
# JP: 稀咲の唇。\nその端が、薄く持ちあがってる。
3153 = "Đôi môi của Kisaki.\nKhóe môi cô ấy, đang khẽ nhếch lên."
# 【稀咲】
# display as 稀咲
# JP: 「現場の立場から、率直に、YESかNOかでお答えください。\n今回のような事態対応を、今後とも繰り返せますか？」
2310 = "「Đứng trên lập trường của hiện trường, xin hãy trả lời thẳng thắn, CÓ hay KHÔNG.\nViệc ứng phó với tình huống như lần này, từ nay về sau có thể lặp lại được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
2372 = "「Chuyện đó——」"
# monologue
# JP: 追い込んでくる。まったく情け容赦無く。\n要求される答えしか、吐き出すことを許されない。
2855 = "Dồn ép đến cùng. Hoàn toàn không chút khoan nhượng.\nChỉ cho phép tôi thốt ra những câu trả lời mà cô ấy yêu cầu."
# 【双鉄】
# display as 雙鐵
# JP: 「今回のような事態対応をそのまま再現することは、\n難しいことであるかと思います」
2304 = "「Việc tái hiện lại y nguyên cách ứng phó với tình huống như lần này,\ntôi nghĩ là một điều rất khó.」"
# 【稀咲】
# display as 稀咲
# JP: 「再現できないのであれば、もし、もう一度の\x%l台枠;#00ffc040;台枠%l;#;等の\n深刻な損傷が発生した場合」
2141 = "「Nếu không thể tái hiện lại, giả sử, một lần nữa xảy ra\nnhững hư hỏng nghiêm trọng đối với \x%l台枠;#00ffc040;khung gầm%l;#; hay các bộ phận khác.」"
# monologue
# JP: 稀咲の手が、パン、とペーパーを、\n補正予算案のまとめられた書類を叩き鳴らす。
3155 = "Bàn tay của Kisaki, đập \"Bốp\" một cái,\nlên tập tài liệu tổng hợp dự toán ngân sách bổ sung."
# 【稀咲】
# display as 稀咲
# JP: 「改修にかかる費用は跳ね上がる。\nとなると、[ハチロクニイマル,3]8620の運用継続は難しくなりますね？」
1875 = "「Chi phí sửa chữa sẽ tăng vọt.\nNếu vậy thì, việc tiếp tục vận hành Đầu máy 8620 sẽ trở nên khó khăn nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……再改修の必要がもし、出てしまえば。\nその場合には、ご指摘どおりとなる可能性は感じます」
1535 = "「……Nếu như, lại phát sinh nhu cầu phải sửa chữa một lần nữa.\nTrong trường hợp đó, tôi cảm thấy khả năng xảy ra đúng như cô chỉ ra là có.」"
# monologue
# JP: もし再びの改修が要求されるのならば――\n材料段階で、億単位の資金が要求されることは確実だ。
2868 = "Nếu lại có yêu cầu sửa chữa một lần nữa——\nThì chắc chắn ngay từ giai đoạn vật liệu, đã cần đến nguồn vốn hàng trăm triệu yên rồi."
# monologue
# JP: 現在の御一夜鉄道の財政状況に補助金がくわわったとして、\nそれに対応するのは正直……極めて厳しい。
2923 = "Dù có thêm tiền trợ cấp vào tình hình tài chính hiện tại của Đường sắt Ohimitera,\nthì nói thật, việc đáp ứng được chi phí đó……là cực kỳ khó khăn."
# 【稀咲】
# display as 稀咲
# JP: 「交換頂く\x%l台枠;#00ffc040;台枠%l;#;も、老朽部品には変わりない。\n検査整備する御一夜鉄道側は、\x%l台枠;#00ffc040;台枠%l;#;損傷を見過ごした」
2282 = "「\x%l台枠;#00ffc040;Khung gầm%l;#; được thay thế, cũng vẫn chỉ là những bộ phận cũ kỹ.\nPhía Đường sắt Ohimitera phụ trách kiểm tra bảo dưỡng, đã bỏ sót những hư hỏng của \x%l台枠;#00ffc040;khung gầm%l;#;.」"
# monologue
# JP: 答弁を待たず攻め立ててくる。\n立て直す余裕を得られない。
2832 = "Cô ấy liên tục tấn công mà không chờ tôi trả lời.\nTôi hoàn toàn không có thời gian để chấn chỉnh lại đội hình."
# 【稀咲】
# display as 稀咲
# JP: 「[ハチロクニイマル,3]8620号――のみならず、滅びつつある鉄道というものを\n軸とした観光振興は、潜在不安が大きく、継続性を欠く」
1800 = "「Đầu máy 8620——không chỉ vậy, việc chấn hưng du lịch lấy đường sắt, một thứ đang dần lụi tàn,\nlàm cốt lõi, mang theo những bất ổn tiềm tàng rất lớn, và thiếu tính bền vững.」"
# monologue
# JP: それは違うと心が叫ぶが、うかつに声には変えられない。
2946 = "Trái tim tôi gào thét rằng điều đó là sai, nhưng tôi không thể bất cẩn thốt lên thành lời."
# monologue
# JP: 僕の中でまだ、反論を整頓しきれていない。\n中途半端な発言は、稀咲に絡め取られるだけだ。
2971 = "Trong thâm tâm tôi, vẫn chưa sắp xếp xong những lý lẽ để phản bác.\nNhững phát ngôn nửa vời, sẽ chỉ bị Kisaki tóm lấy làm điểm yếu mà thôi."
# 【稀咲】
# display as 稀咲
# JP: 「そのような事業に、市の予算を投入するというのは」
2057 = "「Việc đầu tư ngân sách của thành phố vào một dự án như vậy, là」"
# 【ハチロク】
# display as 八六
# JP: 「継続性はございます。\nむしろ、より大きな発展へと繋がる、継続性が」
2152 = "「Tính bền vững là có ạ.\nHơn thế nữa, nó còn mang tính bền vững dẫn đến những sự phát triển lớn lao hơn.」"
# 【稀咲】
# display as 稀咲
# JP: 「っ！！？」
# 2453 = "「！！？」" 
# monologue
# JP: 運転鞄からの、声。
2672 = "Một giọng nói, phát ra từ chiếc cặp lái tàu."
# monologue
# JP: 鞄を開けて抱き上げたなら、\nハチロクは、その体勢のまま大音声を張り上げる。
2952 = "Khi tôi mở cặp và ôm cô ấy lên,\nHachiroku vẫn giữ nguyên tư thế đó, lớn tiếng nói."
# 【ハチロク】
# display as 八六
# JP: 「今回いただく素晴らしいご縁は、\nより広範へ、必ずや広がっていくものです」
2106 = "「Cơ duyên tuyệt vời mà chúng ta nhận được lần này,\nnhất định sẽ lan rộng ra, với quy mô lớn hơn nữa.」"
# 【中堅議員】
# display as 中堅議員
# JP: 「議長！　不規則発言を禁じてください！\n参考人、いや、人ですらない物などがっ」
2321 = "「Chủ tọa! Xin hãy cấm những phát ngôn sai quy tắc!\nKhông phải là nhân chứng, không, thậm chí còn không phải là con người nữa chứ.」"
# 【議長】
# display as 議長
# JP: 「不規則発言を」
2309 = "「Yêu cầu không phát ngôn sai quy tắc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「議長！　これは参考人である僕の発言です！」
2322 = "「Thưa chủ tọa! Đây là phát ngôn của tôi, với tư cách là một nhân chứng!」"
# monologue
# JP: 異議への異議に、議長がぱちくり、まばたきをする。\n指さし示し、その目をマイクに向けさせる。
2948 = "Trước sự phản đối của tôi đối với lời phản đối kia, chủ tọa chớp chớp mắt ngạc nhiên.\nTôi chỉ tay, hướng ánh mắt của ông ấy về phía chiếc micro."
# 【双鉄】
# display as 雙鐵
# JP: 「マイクが声を増幅したとて、それは発言ではありません。\n新津議員が仰るように、人でない物は、発言できない」
1910 = "「Dù micro có khuếch đại âm thanh, thì đó cũng không phải là phát ngôn.\nNhư nghị sĩ Niitsu đã nói, những thứ không phải con người thì không thể phát ngôn.」"
# 【中堅議員】
# display as 中堅議員
# JP: 「っ！」
# 2452 = "「！」" 
# 【議長】
# display as 議長
# JP: 「なるほど」
1914 = "「Ra là vậy.」"
# monologue
# JP: 議長の瞳が、笑ったように細くなる。
3240 = "Đôi mắt của chủ tọa nheo lại như đang cười."
# 【議長】
# display as 議長
# JP: 「右田参考人は、答弁を続けるように」
2311 = "「Yêu cầu nhân chứng Migita tiếp tục phần trả lời.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
2444 = "「Xin cảm ơn.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2436 = "「Ngài Soutetsu.」"
# monologue
# JP: 少し不安げなハチロクの声。\nその背を、声で押してやる。
2748 = "Giọng nói của Hachiroku có chút bất an.\nTôi dùng giọng nói của mình, để tiếp thêm sức mạnh cho cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「信じるままを言ってくれ。\nお前の声は僕の声。お前の言葉は僕の言葉だ」
1870 = "「Hãy nói những gì em tin tưởng.\nGiọng nói của em là giọng nói của anh. Lời nói của em là lời nói của anh.」"
# 【ハチロク】
# display as 八六
# JP: 「はいっ！」
2179 = "「Vâng!」"
# monologue
# JP: 凛と、ハチロクの声が伸びていく。
2745 = "Giọng nói dõng dạc của Hachiroku vang lên."
# 【ハチロク】
# display as 八六
# JP: 「九洲に残る鉄道路線は、\n御一夜鉄道、[ゆのい,1]湯医線だけではございません」
1818 = "「Những tuyến đường sắt còn sót lại ở Kyushu,\nkhông chỉ có Tuyến Yui của Đường sắt Ohimitera đâu ạ.」"
# monologue
# JP: その発言で思い出す。
3265 = "Câu nói đó khiến tôi nhớ ra."
# monologue
# JP: 真闇姉が用意してくれたフリップの中に、\nそれがあったと。
3100 = "Trong tấm bảng lật mà chị Mayami đã chuẩn bị cho tôi,\ncó thông tin về điều đó."
# monologue
# JP: （トンっ）
3333 = "（Cạch）"
# monologue
# JP: フリップを探し差し出せば、\nほう、と感心の声が聞こえる。
2954 = "Tôi tìm tấm bảng lật và đưa ra,\nnhững tiếng \"Ồ\" đầy thán phục vang lên."
# 【ハチロク】
# display as 八六
# JP: 「[あそさんがく,3]阿曽山岳鉄道、[ひさつ,1]肥颯みかん鉄道、[ながさききどう,3]永崎軌道、[まつうら,1]松裏九洲線、\n[からき,1]辛木鉄道、[ちくほう,1]筑方軌道――」
2429 = "「Đường sắt Vùng núi Aso, Đường sắt Hisatsu Mikan, Quỹ đạo Nagasaki, Tuyến Matsuura Kyushu,\nĐường sắt Karaki, Quỹ đạo Chikuhou——」"
# monologue
# JP: 九洲広くに、ぽつ、ぽつ――と。\n路線であるのに、点在としかいいようのない、軌道たち。
2844 = "Trải rộng khắp Kyushu, lác đác, lác đác——\nDù là những tuyến đường, nhưng chỉ có thể gọi là những quỹ đạo nằm rải rác."
# monologue
# JP: しかし、それは確かに。\n全て、生きている“鉄道”だ。
2723 = "Nhưng mà, đó chắc chắn.\nTất cả, đều là những \"tuyến đường sắt\" đang còn sống."
# 【ハチロク】
# display as 八六
# JP: 「それらの鉄道各線の中にも、\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;は運用されておりますよね？　ポーレット様」
2028 = "「Trong số các tuyến đường sắt đó,\ncũng có những tuyến đang vận hành \x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#; đúng không ạ? Thị trưởng Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ！\nそれは、もちろん」
1955 = "「Hả? A!\nChuyện đó, tất nhiên rồi.」"
# monologue
# JP: 得意分野の話をふられ、\nポーレットの目がようやく落ち着きを取戻す。
3209 = "Được hỏi về lĩnh vực sở trường của mình,\nđôi mắt của Paulette cuối cùng cũng lấy lại được sự bình tĩnh."
# 【ポーレット】
# display as 波萊特
# JP: 「[ふくおか,1]福丘、[ちくほう,1]筑方軌道の\x%l9600;#00ffc040;[キュウロク,3]9600%l;#;――19633、\n[かごしま,2]鹿兒島は、みかん鉄道の[シゴロクキュウキュウ,5]C56-99」
2262 = "「Fukuoka, \x%l9600;#00ffc040;9600%l;#; của Quỹ đạo Chikuhou——19633,\nKagoshima thì có C56-99 của Đường sắt Mikan.」"
# monologue
# JP: 指折り指折り、ポーレットが現役車両を数え上げていく。\n全１１機。その後、静かに一言を足す。
3049 = "Paulette bẻ từng ngón tay, đếm số lượng các phương tiện đang còn hoạt động.\nTổng cộng 11 chiếc. Sau đó, cô ấy nhẹ nhàng nói thêm một câu."
# 【ポーレット】
# display as 波萊特
# JP: 「[せいたい,1]静態保存のものを含めれば、\n[きゅうしゅう,1]九洲内だけで、さらに数倍はあると思います」
2288 = "「Nếu tính cả những chiếc đang được \x%l静態保存;#00ffc040;lưu tĩnh%l;#;,\nthì chỉ tính riêng trong Kyushu, tôi nghĩ số lượng còn gấp vài lần như thế.」"
# monologue
# JP: ほう、そんなにか、と、誰かの呟きが聞こえてくる。
2965 = "\"Ồ, nhiều đến thế sao\", tôi nghe thấy tiếng lẩm bẩm của ai đó."
# monologue
# JP: 稀咲は、何も口に出さない。\nただじっと――値踏みする目で、僕らを見ている。
3146 = "Kisaki không nói gì cả.\nChỉ im lặng——nhìn chúng tôi bằng ánh mắt đánh giá."
# 【ハチロク】
# display as 八六
# JP: 「ＳＬに、観光資源、経営資源としての価値があることは、\nさきほどのグラフでも証明されています」
2294 = "「Việc SL có giá trị như một nguồn tài nguyên du lịch, tài nguyên kinh doanh,\ncũng đã được chứng minh qua biểu đồ lúc nãy rồi ạ.」"
# monologue
# JP: 傍聴席、真闇姉の頷きが、目の端、ちらりと移りこむ。
2962 = "Qua khóe mắt, tôi thoáng thấy cái gật đầu của chị Mayami ở hàng ghế dự thính."
# 【ハチロク】
# display as 八六
# JP: 「しかし、点在し、孤立しているがゆえ、それらの資源は、\n朽ち果てていくことを待つだけの状況に陥っています」
1864 = "「Tuy nhiên, vì nằm rải rác và bị cô lập, nên những nguồn tài nguyên đó,\nđang rơi vào tình trạng chỉ biết chờ đợi để mục nát.」"
# monologue
# JP: ああ、そうだ――\nこれは真闇姉の教えだったか。
2801 = "A, đúng rồi——\nĐây là lời dạy của chị Mayami mà."
# monologue
# JP: 経営資源は、テコにして、連鎖させてこそ大きく働く。
3223 = "Nguồn tài nguyên kinh doanh, phải được dùng làm đòn bẩy, tạo ra sự liên kết thì mới phát huy tác dụng lớn."
# 【ハチロク】
# display as 八六
# JP: 「そして、先般の[ハチロクニイマル,3]8620改修が示したように――\n整備改修のスキルを持つ技術者たちも、残っています」
2386 = "「Và, như việc sửa chữa Đầu máy 8620 vừa qua đã cho thấy——\nNhững kỹ thuật viên có kỹ năng bảo dưỡng và sửa chữa, vẫn còn tồn tại.」"
# monologue
# JP: 確かにだ。
3124 = "Đúng là vậy."
# monologue
# JP: 粉蔵の技術者達もそうだし、閉鎖されてしまったという、\n日ノ本車輌蒸気部門の技師たちも――っ！
2649 = "Các kỹ thuật viên ở Kokura cũng vậy, và cả những kỹ sư\ncủa bộ phận hơi nước thuộc Công ty Xe lửa Hinomoto, nơi được cho là đã bị đóng cửa nữa——!"
# 【ハチロク】
# display as 八六
# JP: 「つなぎ合わせることが出来れば――\nそれらは大きな……とても大きな力を、必ず発揮します」
1933 = "「Nếu có thể kết nối họ lại với nhau——\nNhững điều đó chắc chắn sẽ phát huy một sức mạnh lớn lao……vô cùng lớn lao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その中心に……御一夜が」
2284 = "「Và trung tâm của sự kết nối đó……chính là Ohimitera.」"
# monologue
# JP: ハチロクの真意を理解し、言葉が漏れる。
2955 = "Hiểu được ý định thực sự của Hachiroku, tôi buột miệng nói ra."
# monologue
# JP: その瞬間、\nホっと、安心したように、抱き上げる体から力が抜ける。
3199 = "Khoảnh khắc đó,\ncơ thể đang được tôi bế trên tay bỗng thả lỏng ra, như thể vừa trút được một tiếng thở phào nhẹ nhõm."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様のお喉の調子が、戻られたようです」
2437 = "「Có vẻ như cổ họng của ngài Soutetsu, đã trở lại bình thường rồi ạ.」"
# monologue
# JP: 軽く、一礼。\nハチロクは僕を促して、膝の上へと落ち着いてしまう。\nが、十分だ。十分すぎる――
2751 = "Khẽ cúi chào một cái.\nHachiroku thúc giục tôi, rồi ngoan ngoãn ngồi yên trên đùi tôi.\nNhưng, thế là đủ rồi. Quá đủ rồi——"
# monologue
# JP: ハチロクは僕に、思考を整頓する時間だけでなく、\n新たなアイディアと言葉をくれた。
2740 = "Hachiroku không chỉ cho tôi thời gian để sắp xếp lại suy nghĩ,\nmà còn cho tôi những ý tưởng và ngôn từ mới."
# 【双鉄】
# display as 雙鐵
# JP: 「近隣にある――そう、例えばみかん鉄道とでしたら、\n御一夜-[やつしろ,2]八ツ城間を復線させれば、繋がれます」
1868 = "「Nằm ở khu vực lân cận——đúng rồi, ví dụ như Đường sắt Mikan,\nnếu chúng ta khôi phục lại tuyến đường giữa Ohimitera và Yatsushiro, thì có thể kết nối được với họ.」"
# 【稀咲】
# display as 稀咲
# JP: 「復線って、君、双鉄。\nそんな簡単に言うけれど」
2097 = "「Khôi phục tuyến đường, cậu đùa à, Soutetsu.\nNói thì nghe dễ dàng thế thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「もちろん、すぐには難しいかもしれん。\nが、いずれ――遠からず、\x%lエアクラ;#00ffc040;エアクラ%l;#;は必ず空へ向かう」
2231 = "「Tất nhiên, có thể sẽ rất khó để thực hiện ngay lập tức.\nNhưng mà, một ngày nào đó——không xa nữa, \x%lエアクラ;#00ffc040;Aircra%l;#; chắc chắn sẽ hướng lên bầu trời.」"
# monologue
# JP: 安芸様が予言していた、来るべき道。\nそれを、当事者に確認してみる。
2871 = "Con đường sắp tới, mà ngài Aki đã tiên đoán.\nTôi sẽ thử xác nhận điều đó, với chính người trong cuộc."
# 【双鉄】
# display as 雙鐵
# JP: 「浦上さん。飛行型\x%lエアクラ;#00ffc040;エアクラ%l;#;の普及は、\nエアロ＝クラフテック社の目標とするところですよね？」
2214 = "「Anh Urakami. Việc phổ biến \x%lエアクラ;#00ffc040;Aircra%l;#; loại bay,\nchính là mục tiêu mà công ty Aero-Craftech đang hướng tới đúng không?」"
# monologue
# JP: 困ったように、浦上が稀咲の顔を見る。
3054 = "Urakami nhìn khuôn mặt Kisaki với vẻ bối rối."
# monologue
# JP: 稀咲の頷き。浦上の挙手。\n議長が、待ちわびていたような声を出す。
3157 = "Kisaki gật đầu. Urakami giơ tay.\nChủ tọa cất giọng như thể đã chờ đợi từ lâu."
# 【議長】
# display as 議長
# JP: 「[ほうしょう,1]宝生参考人の、補佐人の発言を認めます」
1882 = "「Chấp thuận cho trợ lý của nhân chứng Houshou phát biểu.」"
# 【浦上】
# display as 浦上
# JP: 「非常におおまかな目標としては、\n[みぎた,1]右田さんのおっしゃるとおりであると認識しています」
2449 = "「Là một mục tiêu vô cùng khái quát,\nthì tôi xác nhận là đúng như những gì anh Migita đã nói.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばいずれ、地上は\x%lエアクラ;#00ffc040;エアクラ%l;#;から解放されましょう。\nガソリン自動車への乗り戻りが起こるとは考え難い」
2412 = "「Nếu vậy thì một ngày nào đó, mặt đất sẽ được giải phóng khỏi \x%lエアクラ;#00ffc040;Aircra%l;#;.\nThật khó để tưởng tượng việc mọi người sẽ quay trở lại sử dụng ô tô chạy bằng xăng.」"
# monologue
# JP: ガソリンエンジンは、\x%lエアクラ;#00ffc040;エアクラ%l;#;機関の、\n超高コストの下位互換である要素が多い。
3035 = "Động cơ xăng, có rất nhiều yếu tố\nlà phiên bản tương thích ngược với chi phí siêu cao của động cơ \x%lエアクラ;#00ffc040;Aircra%l;#;."
# monologue
# JP: 作動不能地域においてと、ごく趣味的なものたちと――\n現状以上の復権は、どう考えてもありえんだろう。
3289 = "Ngoại trừ ở những khu vực không thể hoạt động, và những sở thích cá nhân——\nDù nghĩ thế nào đi nữa, việc khôi phục lại vị thế hơn hiện tại là điều không thể."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし鉄道は違います。公共性を持つ旅ができ、\n同時に、大量輸送の、効率の良いツールでもあるから」
1857 = "「Nhưng đường sắt thì khác. Nó có thể tạo ra những chuyến đi mang tính công cộng,\nđồng thời, nó cũng là một công cụ vận chuyển khối lượng lớn rất hiệu quả.」"
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;と鉄道の最大の違い。\nそれは“個”を最優先できるかできないかの差異だ。
84 = "Sự khác biệt lớn nhất giữa \x%lエアクラ;#00ffc040;Aircra%l;#; và đường sắt.\nĐó là sự khác biệt ở chỗ có thể ưu tiên \"cá nhân\" lên hàng đầu hay không."
# monologue
# JP: 公共の移動手段でしかありえぬ鉄道はそれゆえに、\n他者と、時間を、空間を――共有させる。
3031 = "Đường sắt, với tư cách chỉ có thể là một phương tiện di chuyển công cộng, chính vì vậy,\nbuộc người ta phải chia sẻ——thời gian, không gian với những người khác."
# 【双鉄】
# display as 雙鐵
# JP: 「公共性が。他者の緩やかな連帯が、好感され評価される。\nバーベキュー\x%l列車;#00ffc040;列車%l;#;の大ヒットは、そんな嗜好の現れです」
1894 = "「Tính công cộng. Sự liên kết nhẹ nhàng với những người khác, được yêu thích và đánh giá cao.\nSự thành công vang dội của \x%l列車;#00ffc040;chuyến tàu%l;#; BBQ, chính là biểu hiện của sở thích đó.」"
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;の急速な発展が引き起こした、\n個から群への揺り戻し――
83 = "Sự phát triển nhanh chóng của \x%lエアクラ;#00ffc040;Aircra%l;#; đã gây ra,\nsự đảo ngược từ cá nhân trở về với tập thể——"
# monologue
# JP: そうした社会傾向を、当の\x%lエアクラ;#00ffc040;エアクラ%l;#;社も無論、\n分析・把握をしているはずだ。
82 = "Xu hướng xã hội như vậy, bản thân công ty \x%lエアクラ;#00ffc040;Aircra%l;#; tất nhiên,\ncũng phải phân tích và nắm bắt được."
# 【双鉄】
# display as 雙鐵
# JP: 「……\x%lエアクラ;#00ffc040;エアクラ%l;#;が空へと向かった後の、鉄道復権。\nそれは、\x%lエアクラ;#00ffc040;エアクラ%l;#;社の利益にも繋がりますよね？」
1514 = "「……Sự khôi phục vị thế của đường sắt, sau khi \x%lエアクラ;#00ffc040;Aircra%l;#; hướng lên bầu trời.\nĐiều đó, cũng mang lại lợi ích cho công ty \x%lエアクラ;#00ffc040;Aircra%l;#; đúng không?」"
# monologue
# JP: 短く、浦上は息を吸い、吐く。
3055 = "Urakami hít một hơi ngắn, rồi thở ra."
# 【浦上】
# display as 浦上
# JP: 「社としての判断を下せる能力も無く立場でもありません。\nが、個人としては……ご指摘どおりかと認識します」
2102 = "「Tôi không có khả năng cũng như lập trường để đưa ra phán đoán với tư cách là công ty.\nNhưng với tư cách cá nhân……tôi nhận thấy đúng như những gì anh đã chỉ ra.」"
# monologue
# JP: ざわりと、議場が大きくどよめく。\nかすかに頷き、稀咲がやっと、言葉を発する。
3018 = "Cả hội trường bỗng xôn xao ồn ào.\nKhẽ gật đầu, cuối cùng Kisaki cũng cất lời."
# 【稀咲】
# display as 稀咲
# JP: 「超重量物の移送問題は、そう簡単には解決できない。\n鉄道の復権は、\x%lエアクラ;#00ffc040;エアクラ%l;#;の弱点の補完になるわけだ」
2348 = "「Vấn đề vận chuyển các vật thể siêu nặng, không thể giải quyết dễ dàng như vậy được.\nSự khôi phục vị thế của đường sắt, chính là để bù đắp cho điểm yếu của \x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう。\x%lエアクラ;#00ffc040;エアクラ%l;#;と鉄道は共存できる。そして、\n観光面での鉄道の魅力を最大に活かすものは、ＳＬだ」
2196 = "「Đúng vậy. \x%lエアクラ;#00ffc040;Aircra%l;#; và đường sắt có thể cùng tồn tại. Và,\nthứ phát huy tối đa sức hấp dẫn của đường sắt về mặt du lịch, chính là SL.」"
# monologue
# JP: 鉄道復権がなされるときには、\x%l気動車;#00ffc040;気動車%l;#;、電車――\nより大きな利便性を持つ車輌も当然、復権しよう。
3086 = "Khi đường sắt được khôi phục vị thế, \x%l気動車;#00ffc040;toa xe tự hành%l;#;, tàu điện——\nnhững phương tiện mang lại sự tiện lợi lớn hơn, đương nhiên cũng sẽ được khôi phục vị thế."
# monologue
# JP: が、ＳＬにはＳＬならではの価値がある。\nＳＬが滅び行くことを、人は、決して望まない。
2717 = "Nhưng, SL có những giá trị chỉ riêng SL mới có.\nCon người, tuyệt đối không mong muốn SL bị diệt vong."
# 【双鉄】
# display as 雙鐵
# JP: 「故に、御一夜を中心とした鉄道路線を復活させ、\nそこでのＳＬの集中運用というモデルを作る」
2220 = "「Do đó, chúng ta sẽ hồi sinh các tuyến đường sắt lấy Ohimitera làm trung tâm,\nvà tạo ra một mô hình tập trung vận hành SL tại đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そっか……車輌は各地に――そして、ＳＬに特化した、\n保全・改修のための設備や人材を、御一夜に集中させて」
1912 = "「Ra là vậy……phân bổ phương tiện đến các nơi——và rồi, tập trung những trang thiết bị, nhân lực\nchuyên môn hóa cho việc bảo trì, sửa chữa SL về Ohimitera.」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜をＳＬ観光の起点駅とする。\x%l8620;#00ffc040;8620%l;#;から乗り換えて、\nＳＬで、九洲各地を観光できる。そんな未来を作るのだ」
2323 = "「Biến Ohimitera thành ga xuất phát cho du lịch SL. Từ \x%l8620;#00ffc040;8620%l;#; đổi chuyến,\nđể có thể đi du lịch khắp Kyushu bằng SL. Chúng ta sẽ tạo ra một tương lai như vậy.」"
# monologue
# JP: そうなれば、無論、整備性も大きく向上する。\nノウハウも、蓄積し活かしていくことが出来る。
3271 = "Nếu được như vậy, tất nhiên, khả năng bảo dưỡng cũng sẽ được nâng cao đáng kể.\nCác bí quyết kỹ thuật, cũng có thể được tích lũy và tận dụng."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに[ハチロクニイマル,3]8620はすでに老朽車両かもしれん。\nが、\x%l8620;#00ffc040;8620%l;#;が壊れたとして――それなら次へ、受け渡せる」
2252 = "「Quả thực 8620 có thể đã là một phương tiện cũ kỹ.\nNhưng, giả sử \x%l8620;#00ffc040;8620%l;#; có hỏng đi chăng nữa——thì vẫn có thể trao lại cho thế hệ tiếp theo.」"
# monologue
# JP: 終着駅は、全ての終わりを意味しない。
3178 = "Ga cuối cùng, không có nghĩa là kết thúc tất cả."
# monologue
# JP: そこは新しい起点となって――\nその先へ、次へとつなげていけるのだから。
2805 = "Nơi đó sẽ trở thành một điểm xuất phát mới——\nBởi vì chúng ta có thể tiếp tục tiến về phía trước, kết nối với những điều tiếp theo."
# 【日々姫】
# display as 日日姬
# JP: 「ＳＬの……蒸気の町――\nううん、そう――蒸気のふるさと、御一夜」
2296 = "「Thành phố của SL……của hơi nước——\nKhông, đúng rồi——Quê hương của hơi nước, Ohimitera.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2003 = "「Ừ.」"
# monologue
# JP: 傍聴席からの日々姫の呟き。\nそれが、イメージを固めてくれる。
2901 = "Tiếng lẩm bẩm của Hibiki từ hàng ghế dự thính.\nNó đã giúp củng cố thêm hình ảnh đó."
# monologue
# JP: 焼酎、温泉、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;――御一夜は、今の時点でも、\n“蒸気のふるさと”と呼ばれてしかるべき町だ。
3070 = "Rượu shochu, suối nước nóng, \x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#;——Ohimitera, ngay tại thời điểm này,\ncũng đã là một thành phố xứng đáng được gọi là \"Quê hương của hơi nước\" rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「蒸気のふるさと御一夜として、全ての資源を連携させる。\nそれは、御一夜にしか、鉄道でしか出来ないことだ」
2105 = "「Với tư cách là Quê hương của hơi nước Ohimitera, chúng ta sẽ liên kết tất cả các nguồn tài nguyên lại với nhau.\nĐó là điều mà chỉ Ohimitera, chỉ đường sắt mới có thể làm được.」"
# 【浦上】
# display as 浦上
# JP: 「……稀咲様」
1544 = "「……Cô Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 2003 = "「嗯」" 
# monologue
# JP: 稀咲が、浦上が、僕を見、頷く。
3150 = "Kisaki, và Urakami, nhìn tôi và gật đầu."
# monologue
# JP: ならば、僕らは――\nきっと、同じ未来図をもう、描けてる。
3283 = "Nếu vậy thì, chúng tôi——\nchắc chắn, đã cùng vẽ nên một bức tranh tương lai giống nhau rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「この補正予算案は、その未来のための最初の投資。\n成立を強く要望し、僕の答弁を終わります」
2371 = "「Dự toán ngân sách bổ sung này, là khoản đầu tư đầu tiên cho tương lai đó.\nTôi tha thiết mong muốn nó được thông qua, và xin kết thúc phần biện luận của mình tại đây.」"
# monologue
# JP: パチ、パチと。最初の拍手は、稀咲から。\nほどなくそれは、議場のすべて、全ての手から、鳴り響く。
1473 = "Lộp bộp, lộp bộp. Tiếng vỗ tay đầu tiên, là từ Kisaki.\nChẳng mấy chốc, nó đã vang lên từ khắp hội trường, từ tất cả những đôi bàn tay."
# monologue
# JP: やがて万雷となった拍手を、\n議長の重々しい声が割る。
3016 = "Tiếng vỗ tay cuối cùng đã trở nên vang dội như sấm rền,\nbị cắt ngang bởi giọng nói trang nghiêm của chủ tọa."
# 【議長】
# display as 議長
# JP: 「本補正予算案の採決を行います。\n本案に賛成の議員は、ご起立を願います」
2227 = "「Chúng ta sẽ tiến hành bỏ phiếu cho dự toán ngân sách bổ sung này.\nXin mời các nghị sĩ tán thành dự thảo này đứng lên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、補正予算の成立を祝して――」
2408 = "「Vậy thì, để chúc mừng dự toán ngân sách bổ sung đã được thông qua——」"
# 【ハチロク】
# display as 八六
# JP: 「かんぱーい！」
1829 = "「Cạn ly~!」"
# 【日々姫】
# display as 波萊特＆日日姬
# JP: 『「かんぱーい！」\n「かんぱーい！」』
2467 = "『「Cạn ly~!」\n「Cạn ly~!」』"
# monologue
# JP: 笑顔が溢れる。
3169 = "Nụ cười ngập tràn."
# monologue
# JP: 誰も彼もが――\nつい先程まで対立していた稀咲さえもが笑っている。
3033 = "Bất kỳ ai——\nNgay cả Kisaki, người mới nãy còn đang đối lập với chúng tôi, cũng đang mỉm cười."
# 【双鉄】
# display as 雙鐵
# JP: 「……変われば変わるものだな」
1542 = "「……Đúng là thay đổi chóng mặt thật đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「君子は豹変す――と言うべきものでございましょう。\n稀咲様のお力は、極めて大きなものとなるかと」
2376 = "「Nên gọi là, người quân tử tùy thời mà biến——nhỉ.\nEm nghĩ sức mạnh của cô Kisaki, sẽ trở thành một sự trợ giúp vô cùng to lớn đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そのことは早速実感させられた」
2002 = "「Ừm. Anh đã cảm nhận được điều đó ngay lập tức rồi.」"
# monologue
# JP: 予算通過と同時に稀咲は僕らに握手を求めて来た。\nのみならず、提案までをもしてくれた。
2819 = "Ngay khi ngân sách được thông qua, Kisaki đã đến yêu cầu bắt tay với chúng tôi.\nKhông chỉ vậy, cô ấy còn đưa ra những đề xuất nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「……まずは近県の鉄道会社との、持株会社の設立。か」
1549 = "「……Trước tiên là thành lập một công ty cổ phần, với các công ty đường sắt ở các tỉnh lân cận. Sao.」"
# 【ハチロク】
# display as 八六
# JP: 「持株会社、とはどのようなものなのですか？」
2131 = "「Công ty cổ phần, là loại hình như thế nào vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「複数の会社を統括する一つの会社を、共同出資で作る。\nそしてそこを親会社として、経営の集約化を行うものだ」
2385 = "「Là việc cùng góp vốn để tạo ra một công ty duy nhất, quản lý nhiều công ty khác.\nVà lấy đó làm công ty mẹ, để tiến hành tập trung hóa việc kinh doanh.」"
# 【ハチロク】
# display as 八六
# JP: 「ええ……と」
1947 = "「Ờm……」"
# 【双鉄】
# display as 雙鐵
# JP: 「例えば……そうだな、真闇姉に、\n御一夜市内のクマ焼酎の全体を見てもらおうと考える」
2190 = "「Ví dụ như……đúng rồi, giả sử anh muốn nhờ chị Mayami,\nquản lý toàn bộ mảng rượu shochu Kuma trong thành phố Ohimitera.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、それは素敵な考えですね」
1987 = "「Oa, đó là một ý tưởng rất tuyệt vời đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこで、真闇姉を社長とする持株会社を、\nそれぞれの酒蔵を束ねる、親会社として設立するのだ」
2189 = "「Vì vậy, anh sẽ thành lập một công ty cổ phần do chị Mayami làm giám đốc,\nvới tư cách là công ty mẹ, để tập hợp các nhà xưởng ủ rượu lại với nhau.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ……そのようにすれば、指示やお金が、\nスムーズに流れるようになるのですね？」
1971 = "「A……Nếu làm như vậy, thì các chỉ thị và dòng tiền,\nsẽ được lưu thông một cách trơn tru đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。それぞれの会社はそのままだから、\n損失の方は、他の会社へ影響をさせないでも済む」
2197 = "「Ừ. Vì các công ty vẫn giữ nguyên như cũ,\nnên phần tổn thất, sẽ không làm ảnh hưởng đến các công ty khác.」"
# monologue
# JP: これを、A社、B社ではなく、一つの企業に再編し、\nA部門、B部門としてしまうなら、そうはいかない。
2864 = "Nếu tái cấu trúc lại thành một doanh nghiệp duy nhất, thay vì công ty A, công ty B,\nmà biến thành bộ phận A, bộ phận B, thì sẽ không được như vậy."
# monologue
# JP: A部門で出した赤字は、社のものとなり、\nB部門にも影響を及ぼしてしまうから。
3345 = "Vì khoản lỗ do bộ phận A gây ra, sẽ trở thành khoản lỗ của cả công ty,\nvà sẽ làm ảnh hưởng đến cả bộ phận B nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「経営の集約をしつつ独立性も維持できるのが持株会社だ。\nそれは当然、第三、第四の企業の参入を促しやすくする」
2143 = "「Vừa có thể tập trung kinh doanh, vừa duy trì được tính độc lập, đó chính là công ty cổ phần.\nĐiều đó đương nhiên, sẽ giúp dễ dàng thúc đẩy sự tham gia của các doanh nghiệp thứ ba, thứ tư.」"
# 【ハチロク】
# display as 八六
# JP: 「……[だいきゅしゅう,2]大九洲ＳＬ構想を成立、発展させていくため。\n持株会社は、なるほど、優れた仕組みなのですね」
1536 = "「……Để thiết lập và phát triển kế hoạch Đại Kyushu SL.\nCông ty cổ phần, ra là vậy, đúng là một cơ cấu xuất sắc nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、構想への理解、協力を得られればだがな。\n九洲男児は独立心が強いと聞くし、簡単ではなかろう」
2230 = "「Mà, đó là nếu nhận được sự thấu hiểu và hợp tác cho kế hoạch này thôi.\nAnh nghe nói đàn ông Kyushu có tinh thần độc lập rất cao, chắc sẽ không dễ dàng đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だとしても、絶対いけます。\n向こうにだって、メリット、ものすごく大きいですから」
1879 = "「Dù vậy thì, nhất định sẽ thành công thôi.\nBởi vì đối với họ, lợi ích cũng vô cùng lớn mà.」"
# monologue
# JP: ポーレットがスっと会話にすべりこんでくる。
3047 = "Paulette tự nhiên xen vào cuộc trò chuyện."
# monologue
# JP: その頬はワインのせいか、かなり赤らみ、\n手には、\x%l帝鉄;#00ffc040;帝鉄%l;#;時代のものと思しき路線地図を持っている。
2792 = "Có lẽ do rượu vang, hai má cô ấy khá ửng đỏ,\ntrên tay đang cầm một tấm bản đồ tuyến đường, có vẻ như là từ thời \x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;."
# 【ポーレット】
# display as 波萊特
# JP: 「まず最初は、みかん鉄道。北回りだけじゃなくって、\n南、[はやと,1]早戸を通じて[かごしま,2]鹿兒島までも復線できれば――」
2450 = "「Đầu tiên là, Đường sắt Mikan. Không chỉ tuyến vòng phía Bắc,\nmà nếu có thể khôi phục lại tuyến đường xuống phía Nam, qua Hayato đến tận Kagoshima thì——」"
# 【ハチロク】
# display as 八六
# JP: 「ああ、環状が出来るのですね？」
1981 = "「A, sẽ tạo thành một tuyến đường vòng tròn đúng không ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そう！　その上、路線上には[おこば,1]小畑もありますし。\nこれ、観光振興に効果絶大ですよ」
2201 = "「Đúng vậy! Hơn nữa, trên tuyến đường đó còn có Okoba nữa.\nCái này, sẽ có hiệu quả cực kỳ lớn đối với việc chấn hưng du lịch đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おこば？」
2038 = "「Okoba?」"
# 【ハチロク】
# display as 八六
# JP: 「鉄道界隈では有名な――日ノ本で唯一、\n\x%lループ線;#00ffc040;ループ線%l;#;と\x%lスイッチバック;#00ffc040;スイッチバック%l;#;とをともに持つ駅です」
2031 = "「Rất nổi tiếng trong giới đường sắt ạ——Là nhà ga duy nhất ở Hinomoto,\nsở hữu cả \x%lループ線;#00ffc040;đường ray vòng tròn%l;#; và \x%lスイッチバック;#00ffc040;đường vòng zigzag%l;#; cùng lúc.」"
# monologue
# JP: 言いながら、\nハチロクはポーレットの広げた地図をまじまじと見る。
2738 = "Vừa nói,\nHachiroku vừa nhìn chằm chằm vào tấm bản đồ mà Paulette đang mở ra."
# 【ハチロク】
# display as 八六
# JP: 「すぐ南……御一夜と、これほど近くにあったのですね」
2066 = "「Ngay phía Nam……Hóa ra nó lại nằm gần Ohimitera đến thế này sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「[やません,1]山線ですから、復線も大変ですけど――\nでも、周辺自治体とみかん鉄道の協力も得られれば」
2019 = "「Vì là Tuyến đường núi, nên việc khôi phục cũng sẽ rất vất vả nhưng——\nNhưng mà, nếu nhận được sự hợp tác của các chính quyền địa phương xung quanh và Đường sắt Mikan thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのおこば駅と繋がる路線を持つことは、\nそれほど、みかん鉄道にも良いことなのか？」
1952 = "「Việc sở hữu tuyến đường kết nối với ga Okoba đó,\nđối với Đường sắt Mikan lại tốt đến vậy sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「要素単体では、どう評価されるかわかりませんけど……\n構想全体をきちんと伝えれば、理解を貰えると思います」
2434 = "「Nếu chỉ xét riêng lẻ từng yếu tố, thì không biết họ sẽ đánh giá thế nào nhưng……\nTôi nghĩ nếu truyền đạt rõ ràng toàn bộ kế hoạch, thì sẽ nhận được sự thấu hiểu thôi.」"
# 【稀咲】
# display as 稀咲
# JP: 「だろうね」
1824 = "「Chắc là vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1958 = "「Ồ.」"
# monologue
# JP: 稀咲が話に割り込んでくる。\nにこにこ顔の日々姫も一緒だ。
3143 = "Kisaki xen vào câu chuyện.\nCùng với khuôn mặt tươi cười của Hibiki."
# 【稀咲】
# display as 稀咲
# JP: 「ボクもそう判断したから協力を申し出た。\nだから、必ずや実現可能性を実地で示してもらいたい」
2115 = "「Tôi cũng đã phán đoán như vậy nên mới đề nghị hợp tác.\nThế nên, tôi muốn mọi người nhất định phải chứng minh được tính khả thi đó trên thực tế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2003 = "「嗯」" 
# monologue
# JP: そのためには、\x%l8620;#00ffc040;8620%l;#;の復活と、\nバーベキュー\x%l列車;#00ffc040;列車%l;#;のより一層の活性化が必須となる。
3064 = "Để làm được điều đó, sự hồi sinh của \x%l8620;#00ffc040;8620%l;#;, và\nviệc kích hoạt mạnh mẽ hơn nữa \x%l列車;#00ffc040;chuyến tàu%l;#; BBQ là điều bắt buộc."
# monologue
# JP: ごく当然のこととはいえど、\n指摘をされれば、改めて気が引き締まる。
3293 = "Dù nói là điều hiển nhiên,\nnhưng khi bị chỉ ra như vậy, tôi lại một lần nữa cảm thấy căng thẳng."
# 【日々姫】
# display as 日日姬
# JP: 「もう、にぃに～\nこーんな席まで厳しか顔ばしてー」
2426 = "「Thiệt tình, anh hai~\nĐến tận bữa tiệc thế này rồi mà vẫn còn làm cái vẻ mặt nghiêm trọng đó nữa~」"
# monologue
# JP: 緩んでいる。\n日々姫はよほど嬉しいのだろう。
3003 = "Đang buông lỏng.\nCó lẽ Hibiki đang rất vui sướng."
# monologue
# JP: 稀咲と一緒にいるというのに、\n標準語がまるで出てこない。
3015 = "Dù đang ở cùng với Kisaki,\nnhưng em ấy hoàn toàn không nói một câu tiếng phổ thông nào."
# 【日々姫】
# display as 日日姬
# JP: 「もーっとほら、にこにこせんと！\n笑わん角には、福も来んとよ？」
2037 = "「Phải cười tươi lên chứ nè!\nNgười không cười thì phúc lộc cũng không đến đâu nha?」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ」
1948 = "「Ư, ừm.」"
# monologue
# JP: 言われてしまうと、笑顔というのは難しい。
3215 = "Bị nói vậy, tự nhiên thấy việc nở nụ cười khó khăn làm sao."
# monologue
# JP: なんとか浮かべる――\nつもりであったが、ハチロクがプっと吹き出してしまう。
2940 = "Tôi cố gắng nặn ra một nụ cười——\nĐịnh là vậy, nhưng Hachiroku lại phì cười."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、お顔、ぎくしゃくとされていますよ？」
2438 = "「Ngài Soutetsu, khuôn mặt của ngài, trông cứng đơ luôn rồi kìa?」"
# 【日々姫】
# display as 日日姬
# JP: 「もっと、自然に～　にこにこにこーって、\nれいなちゃんのこと、見習うとよかばい」
1901 = "「Phải tự nhiên hơn nữa~ Cười tươi rạng rỡ lên,\nanh nên học tập bé Reina ấy nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2009 = "「Hử?」"
# monologue
# JP: 言われて、気づく。\nポーレットとれいなが一緒ではない。
3182 = "Bị nói vậy, tôi mới nhận ra.\nPaulette và Reina không ở cùng nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなは？」
2226 = "「Reina đâu rồi?」"
# 【ポーレット】
# display as 波萊特
# JP: 「外です。コン駅長にもご馳走のおすそ分けって」
2021 = "「Ở ngoài ạ. Em ấy bảo muốn chia một ít đồ ăn ngon cho ga trưởng Kon.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、れいならしいな」
1985 = "「À, đúng là phong cách của Reina nhỉ.」"
# monologue
# JP: ちょうどいい。\n賑やかすぎて、少し息苦しくもなってたところだ。
2678 = "Vừa hay.\nĐang lúc quá ồn ào, khiến tôi cảm thấy hơi ngột ngạt."
# 【双鉄】
# display as 雙鐵
# JP: 「なら、様子でも見てこよう」
2416 = "「Vậy thì, anh ra ngoài xem tình hình em ấy thế nào.」"
# 【ハチロク】
# display as 八六
# JP: 「あ、双鉄様、わたくしも――ひゃっ！！？」
1989 = "「A, ngài Soutetsu, em cũng——hya!!?」"
# 【凪】
# display as 凪
# JP: 「だめばーい！　いかせんばーい！　話きくばーい！」
1804 = "「Không được đâu nè! Không cho đi đâu nè! Kể chuyện nghe coi nè!」"
# monologue
# JP: 素早く背後に忍び寄り、凪がハチロクを捕まえる。\n遅れて凪に追いついたふかみの顔は、真っ赤になってる。
3251 = "Nhanh nhẹn lẻn ra sau lưng, Nagi tóm gọn lấy Hachiroku.\nFukami đuổi theo Nagi đến muộn hơn, khuôn mặt đỏ bừng."
# 【ふかみ】
# display as 深美
# JP: 「あ、あの――ハチロク、ちゃん。えと――\n双鉄さん、と……その後……どう――です、か？」
2390 = "「A, cái đó——Hachiroku-chan. Ờm——\nVới, anh Soutetsu……sau đó……thế nào——rồi, ạ?」"
# 【ハチロク】
# display as 八六
# JP: 「ど、どう――と聞かれましても……」
2064 = "「Th, thế nào——cô hỏi vậy thì……」"
# monologue
# JP: ……完全に女性陣に取り囲まれたか。
1481 = "……Hoàn toàn bị hội chị em vây quanh rồi sao."
# monologue
# JP: 助けるべきかと少し迷うが、ハチロクもかなり楽しげで、\nまんざらでもなさそうな表情だ。
2958 = "Tôi hơi phân vân không biết có nên giúp hay không, nhưng Hachiroku cũng có vẻ khá vui,\nbiểu cảm cũng không có vẻ gì là không thích."
# monologue
# JP: （ガラっ）
3335 = "（Xoạch）"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅ。夜風が心地いいな」
1949 = "「Phù. Gió đêm dễ chịu thật.」"
# monologue
# JP: クーラーのそれとは違う涼やかさ。\n街頭の光を覆う、月の明るさ。
3272 = "Một sự mát mẻ khác hẳn với máy lạnh.\nÁnh sáng của mặt trăng, bao trùm cả ánh đèn đường."
# monologue
# JP: だがしかし、れいなの姿が……\nコンの姿も、見当たらん。
2713 = "Nhưng mà, bóng dáng của Reina……\nCả bóng dáng của Kon, cũng không thấy đâu."
# 【コン】
# display as 空
# JP: 「ケンっ！」
1945 = "「Keng!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん？　機関庫の方か？」
2012 = "「Hử? Phía nhà xe đầu máy sao?」"
# monologue
# JP: 満月の下、キツネに呼ばれて、機関庫へ。\n童話の世界にまぎれたようで、少し可笑しくなってくる。
2816 = "Dưới ánh trăng rằm, được một con cáo gọi đến nhà xe đầu máy.\nCứ như lạc vào thế giới cổ tích vậy, khiến tôi cảm thấy hơi buồn cười."
# 【双鉄】
# display as 雙鐵
# JP: 「おお、コン。れいなも」
1961 = "「Ồ, Kon. Cả Reina nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「あ、双鉄さん。こんばんわですぅ」
1988 = "「A, anh Soutetsu. Chào buổi tối ạ~」"
# 【コン】
# display as 空
# JP: 「コンっ！」
# 1945 = "「吭！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。こんばんわ――むっ？」
1999 = "「Ừm. Chào buổi tối——hử?」"
# monologue
# JP: ケンケンと、コンが足元に擦り寄ってくる。
3160 = "Kon vừa kêu \"keng keng\", vừa cọ cọ vào chân tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　なにかあったのか？」
2094 = "「Sao vậy? Có chuyện gì à?」"
# 【れいな】
# display as 玲奈
# JP: 「あのですね、れいな、コンちゃんにあぶらげあげようと\n思ったんですぅ」
2067 = "「Chuyện là, Reina, định cho bé Kon ăn đậu phụ rán đó ạ~」"
# 【コン】
# display as 空
# JP: 「ケンっ！！」
1946 = "「Keng!!」"
# 【れいな】
# display as 玲奈
# JP: 「けど――スズメさんが」
1854 = "「Nhưng mà——bạn chim sẻ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　おお！」
2010 = "「Hử? Ồ!」"
# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;の窓のふち。
87 = "Trên bậu cửa sổ của \x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;."
# monologue
# JP: ずらりと並んだ黒い影たちに、\nひとつの異形が混じっている。
2814 = "Giữa hàng dài những bóng đen xếp hàng,\ncó một hình thù dị thường trà trộn vào."
# 【双鉄】
# display as 雙鐵
# JP: 「あれは……雀の親分か。\nあぶらげを提げ配下を従え――さしずめ、[かとうすずめ,2]加東雀だな」
2404 = "「Đó là……đại ca của bầy chim sẻ sao.\nCắp theo miếng đậu phụ rán, dẫn dắt đám đàn em——cứ như thể là Kato Suzume (Chim sẻ Kato) vậy.」"
# 【れいな】
# display as 玲奈
# JP: 「かとうすずめ――ですかぁ？」
1909 = "「Kato Suzume——sao ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「[かとうはやぶさ,2]加東隼戦闘隊、というのを子供の頃に読んでな。\nキツネから上前を撥ねるなど、称賛すべき勇猛さだろう」
2062 = "「Hồi nhỏ anh từng đọc cuốn Đội chiến đấu Kato Hayabusa (Chim ưng Kato).\nDám nẫng tay trên của cáo, đúng là sự dũng mãnh đáng được khen ngợi nhỉ.」"
# 【コン】
# display as 空
# JP: 「ケンっ！！」
# 1946 = "「吭！！」" 
# monologue
# JP: 上前を撥ねられてしまった方が、\n抗議にしっぽをぶわりとさせる。
3208 = "Kẻ bị nẫng tay trên,\nxù đuôi lên để phản đối."
# monologue
# JP: このような祝いの席に、争いごとなぞふさわしくもない。\nできるものなら円満に、ことを収めてやりたいが――
2818 = "Trong một bữa tiệc chúc mừng như thế này, những cuộc tranh giành thật không phù hợp chút nào.\nNếu có thể, tôi muốn giải quyết chuyện này một cách êm đẹp nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「どうしたものかな。\n話が通じる相手でも無し」
2308 = "「Nên làm thế nào đây.\nĐối phương lại không hiểu tiếng người.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、ちょこっとだったらお話できますよぉ？」
2225 = "「Reina, có thể nói chuyện được một chút đó ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
2160 = "「Vậy sao?」"
# monologue
# JP: れいなは動物にたいそう好かれると、\nポーレットがいつか話していたが――
3046 = "Paulette từng nói rằng,\nReina rất được các loài động vật yêu quý——"
# monologue
# JP: あるいはこれほどの無垢さであれば、\nこころさえ、多少は通じ合うものかもしれん。
2679 = "Hoặc với sự ngây thơ nhường này,\nthì có lẽ, trái tim cũng có thể thấu hiểu nhau phần nào."
# 【双鉄】
# display as 雙鐵
# JP: 「では、加東雀に伝えてくれ。\n『フランク産の、とても上等なバゲットがある』と」
2405 = "「Vậy thì, hãy chuyển lời đến Kato Suzume giúp anh.\n『Ở đây có một chiếc bánh mì baguette rất hảo hạng, xuất xứ từ Frank (Pháp)』.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、れいな、伝えますねぇ。\nあのですね、かとーすずめさん」
2042 = "「Vâng ạ~, Reina, sẽ truyền đạt lại nha~.\nNày bạn Kato Suzume ơi~」"
# monologue
# JP: ちゅんちゅん言うのかと思ったが、\nれいなは、そのままの言葉で伝える。
2969 = "Cứ tưởng em ấy sẽ kêu \"chiếp chiếp\",\nnhưng Reina lại dùng nguyên lời nói đó để truyền đạt."
# 【れいな】
# display as 玲奈
# JP: 「フランク産の、おいしいバゲットがあるのです。\nバゲットは、ポロポロくずれるおいしいパンです」
2381 = "「Ở đây có bánh mì baguette ngon lắm, xuất xứ từ Frank đó.\nBaguette là loại bánh mì vụn ra từng mảnh rất ngon ạ.」"
# 【雀】
# display as 雀
# JP: 「ちゅん？」
1991 = "「Chiếp?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2013 = "「Ồ.」"
# monologue
# JP: 偶然か、そうでないのか。\n雀がれいなに反応している。
2676 = "Là ngẫu nhiên, hay không phải.\nCon chim sẻ đang phản ứng lại với Reina."
# monologue
# JP: ならば、大急ぎでバゲットを取りに戻らねば――
3282 = "Nếu vậy thì, phải nhanh chóng quay lại lấy bánh mì baguette mới được——"
# 【れいな】
# display as 玲奈
# JP: 「よかったぁ。\nじゃあ、バゲットと交換ですねぇ」
2040 = "「Tốt quá rồi~.\nVậy thì, đổi lấy bánh mì baguette nhé~」"
# monologue
# JP: （ぼとっ）
3341 = "（Bộp）"
# 【双鉄】
# display as 雙鐵
# JP: 「おおお」
1959 = "「Ồ ồ ồ.」"
# monologue
# JP: 機関庫前に戻るやいなや、\nあぶらげの急降下爆撃だ。
2939 = "Vừa quay lại trước nhà xe đầu máy,\nđã có một cuộc ném bom bổ nhào bằng đậu phụ rán."
# monologue
# JP: コンがそれにむしゃぶりつくのを見極めて、\n僕も、バゲットを崩し、ばら撒く。
3095 = "Chờ Kon lao vào ngấu nghiến miếng đậu phụ,\ntôi cũng bẻ vụn bánh mì baguette ra và rải xung quanh."
# 【雀】
# display as 雀
# JP: 「ちゅんくっ！」
1990 = "「Chiếp chiếp!」"
# monologue
# JP: 号令一斉！\nスズメたちがわっとバゲットへ降下し、飛び去る。
2762 = "Khẩu lệnh đồng loạt vang lên!\nBầy chim sẻ ùa xuống miếng bánh mì baguette, rồi bay đi mất."
# 【双鉄】
# display as 雙鐵
# JP: 「すごいな。本当に言葉が通じているかのよう――\nいいや、これは通じているのか」
2239 = "「Tuyệt thật đấy. Cứ như thể thực sự hiểu tiếng người vậy——\nKhông, thế này là hiểu thật rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「本当にちょこーっとだけですよ？\n『来るな』とか『遊んで』とか、そんなくらいです」
2243 = "「Thực sự chỉ một chút xíu thôi đó ạ~?\nCỡ như 『Đừng đến đây』 hay 『Chơi cùng đi』 thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
1963 = "「Hừm.」"
# monologue
# JP: 犬猫相手であれば確かに、\nその程度の意思疎通なら出来る気もする。
2935 = "Nếu đối tượng là chó mèo thì quả thật,\ntôi cũng có cảm giác có thể giao tiếp được ở mức độ đó."
# monologue
# JP: ならばれいなのこれは、その対象が、\n鳥やキツネにまで広がっているというほどのことか。
3285 = "Nếu vậy thì khả năng này của Reina, chỉ là mở rộng đối tượng\nra đến cả chim chóc và cáo thôi sao."
# 【双鉄】
# display as 雙鐵
# JP: 「それにしても、すごいものだ」
1809 = "「Dù sao thì, cũng tuyệt thật đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、ぜんぜんすごくないですぅ。\nハチロクさんの方が、ずっと、ずうっとすごいですよぉ」
2223 = "「Reina, không hề tuyệt chút nào đâu ạ~.\nChị Hachiroku mới tuyệt hơn, tuyệt hơn rất nhiề~u đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
1962 = "「Hử?」"
# 【れいな】
# display as 玲奈
# JP: 「ＳＬを中心にして、きゅうしゅう全土に線路をもどして。\nすごく、おっきくていいアイディアだなって思いますぅ」
1852 = "「Lấy SL làm trung tâm, khôi phục lại tuyến đường sắt trên toàn cõi Kyushu.\nEm nghĩ đó là một ý tưởng rất lớn và rất tuyệt vời đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うむ」
# 1969 = "「啊……嗯」" 
# monologue
# JP: 言われて。少し気まずくなる。
2862 = "Bị nói vậy. Tôi cảm thấy hơi ngại ngùng."
# monologue
# JP: そういえば、勢い任せに――\nＳＬだけを、鉄道の中心のように言ってしまった。
2964 = "Nhắc mới nhớ, trong lúc hăng hái——\nTôi đã lỡ lời nói như thể chỉ có SL mới là trung tâm của đường sắt."
# 【双鉄】
# display as 雙鐵
# JP: 「議会では……その、勢いもあってすまなかったな」
2023 = "「Ở hội đồng……cái đó, do đang hăng hái quá nên xin lỗi em nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「すまないって、なにがですかぁ？」
2059 = "「Xin lỗi, vì chuyện gì vậy ạ~?」"
# monologue
# JP: きょとんとした顔。\n先走ったかと理解する。
2830 = "Khuôn mặt ngơ ngác.\nTôi hiểu ra là mình đã cầm đèn chạy trước ô tô."
# monologue
# JP: が――言いかけてしまったことだ。
2709 = "Nhưng mà——lỡ nói ra mất rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ＳＬだけを観光の主役のように言い……その……\n\x%l気動車;#00ffc040;気動車%l;#;を軽んじたように聞こえたなら……本意ではない」
2382 = "「Nói như thể chỉ có SL mới là nhân vật chính của du lịch……ờm……\nNếu nghe như anh đang coi nhẹ \x%l気動車;#00ffc040;toa xe tự hành%l;#; thì……đó không phải là ý định của anh đâu.」"
# 【れいな】
# display as 玲奈
# JP: 「ＳＬは、観光の主役ですよぉ。かーっこいいですもん。\nれいながみたって、そう思います」
2295 = "「SL, là nhân vật chính của du lịch mà ạ~. Ngầu lắm luôn á.\nNgay cả Reina nhìn vào, cũng thấy vậy đó ạ.」"
# monologue
# JP: あっさり、にっこり、れいなは笑う。
3076 = "Reina mỉm cười, một nụ cười nhẹ nhàng và thanh thản."
# 【れいな】
# display as 玲奈
# JP: 「でもでも、れいなは、\x%l気動車;#00ffc040;気動車%l;#;は。\n毎日のご利用の、主役なのです！」
1810 = "「Nhưng mà nhưng mà, Reina, và \x%l気動車;#00ffc040;toa xe tự hành%l;#;.\nLà nhân vật chính của việc sử dụng hàng ngày đó ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん。\nそうだな。そのとおりだ」
1968 = "「À……ừm.\nĐúng vậy nhỉ. Hoàn toàn chính xác.」"
# 【れいな】
# display as 玲奈
# JP: 「病院にいくおばあちゃんや、学園に行く生徒さんには、\n静かで煙くないれいなの方が、人気者さんなんですよ？」
1923 = "「Đối với những bà cụ đi bệnh viện, hay những học sinh đi học,\nthì Reina vừa yên tĩnh vừa không có khói, lại được yêu thích hơn đó nha~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2003 = "「嗯」" 
# monologue
# JP: 観光の主役。\n日用の主役。
2989 = "Nhân vật chính của du lịch.\nNhân vật chính của sinh hoạt hàng ngày."
# monologue
# JP: 両者の間に、優劣などは存在しない。\nごく当然の教えを僕は、れいなにもらった。
2735 = "Giữa hai bên, không hề tồn tại sự ưu việt hay kém cỏi.\nTôi đã nhận được một bài học vô cùng hiển nhiên từ Reina."
# 【双鉄】
# display as 雙鐵
# JP: 「[ハチロク,3]8620を早くなおして――\nれいなと一緒に、もっと活躍してもらわねばな」
2084 = "「Phải nhanh chóng sửa chữa 8620 thôi——\nĐể cô ấy cùng với Reina, hoạt động tích cực hơn nữa mới được.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！　れいな、がんばりますよぉ」
2200 = "「Vâng ạ~! Reina, sẽ cố gắng hết sức đó nha~」"
# 【コン】
# display as 空
# JP: 「ケンっ！」
# 1945 = "「吭！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。もちろん、コンにもだ」
2000 = "「Ừm. Tất nhiên, cả Kon nữa.」"
# monologue
# JP: 皆の力でここまで来たと、\nいまさらながらに、しみじみ思う。
2942 = "Nhờ sức mạnh của mọi người mà chúng ta mới đến được đây,\ngiờ tôi mới thấm thía điều đó."
# monologue
# JP: ここから先も、皆と一緒に――\n願いは、そのまま言葉に変わる。
2691 = "Từ nay về sau, cũng sẽ cùng với mọi người——\nĐiều ước đó, cứ thế hóa thành lời nói."
# 【双鉄】
# display as 雙鐵
# JP: 「祝の席だ。主役が欠けてはつまらない。\nコンも、れいなも、よければ戻ろう」
2439 = "「Bữa tiệc chúc mừng mà. Thiếu nhân vật chính thì chán lắm.\nCả Kon, và Reina nữa, nếu được thì chúng ta quay lại thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！」
2043 = "「Vâng ạ~!」"
