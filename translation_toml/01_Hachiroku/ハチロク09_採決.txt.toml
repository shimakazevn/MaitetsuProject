2310 = "「請你以親歷現場的陳述人角度，回答“能”或者“不能”。今後遇到這樣的事態時，還可能以現在這樣的方式應對嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
2372 = "「這個——」" 

# monologue
# JP: 追い込んでくる。まったく情け容赦無く。\n要求される答えしか、吐き出すことを許されない。
2855 = "她緊逼著不放，一點情面都不留。不允許我作出多餘的回答。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今回のような事態対応をそのまま再現することは、\n難しいことであるかと思います」
2304 = "「要說今後還能不能以同樣的方式處理這個問題的話，我認為是很困難的」" 

# 【稀咲】
# display as 稀咲
# JP: 「再現できないのであれば、もし、もう一度の\x%l台枠;#00ffc040;台枠%l;#;等の\n深刻な損傷が発生した場合」
2141 = "「既然無法重複，那麼假設，如果\\x%l台枠;#00ffc040;車架%l;#;再一次產生嚴重的損壞」" 

# monologue
# JP: 稀咲の手が、パン、とペーパーを、\n補正予算案のまとめられた書類を叩き鳴らす。
3155 = "稀咲的手“啪”的一聲將預算修正案的文件摔在桌子上。" 

# 【稀咲】
# display as 稀咲
# JP: 「改修にかかる費用は跳ね上がる。\nとなると、[ハチロクニイマル,3]8620の運用継続は難しくなりますね？」
1875 = "「修理的費用會大幅增加。這樣一來，８６２０應該很難再繼續運營了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……再改修の必要がもし、出てしまえば。\nその場合には、ご指摘どおりとなる可能性は感じます」
1535 = "「……如果再一次出現需要修理的情況，我認為確實有可能面臨您所說的局面」" 

# monologue
# JP: もし再びの改修が要求されるのならば――\n材料段階で、億単位の資金が要求されることは確実だ。
2868 = "如果真的需要再一次進行修理的話——在準備材料的階段就需要花費數以億計的資金。" 

# monologue
# JP: 現在の御一夜鉄道の財政状況に補助金がくわわったとして、\nそれに対応するのは正直……極めて厳しい。
2923 = "憑目前御一夜鐵路的財政狀況，就算有補助金補貼，要承受這樣的費用……老實說是非常困難的。" 

# 【稀咲】
# display as 稀咲
# JP: 「交換頂く\x%l台枠;#00ffc040;台枠%l;#;も、老朽部品には変わりない。\n検査整備する御一夜鉄道側は、\x%l台枠;#00ffc040;台枠%l;#;損傷を見過ごした」
2282 = "「而交換來的\\x%l台枠;#00ffc040;車架%l;#;也同樣是舊部件。負責檢查整備的御一夜鐵路方忽視了\\x%l台枠;#00ffc040;車架%l;#;損傷」" 

# monologue
# JP: 答弁を待たず攻め立ててくる。\n立て直す余裕を得られない。
2832 = "她不等我答辯就接二連三地發起猛攻，不給我重整態勢的時間。" 

# 【稀咲】
# display as 稀咲
# JP: 「[ハチロクニイマル,3]8620号――のみならず、滅びつつある鉄道というものを\n軸とした観光振興は、潜在不安が大きく、継続性を欠く」
1800 = "「不僅僅是８６２０號——以逐漸衰落的鐵路為核心的旅遊復興存在極大的潛在不穩定因素，欠缺可持續性」" 

# monologue
# JP: それは違うと心が叫ぶが、うかつに声には変えられない。
2946 = "我在心中對她作出反駁，卻不敢輕易說出口。" 

# monologue
# JP: 僕の中でまだ、反論を整頓しきれていない。\n中途半端な発言は、稀咲に絡め取られるだけだ。
2971 = "我還沒整理好反駁的思路。隨意的發言只會被稀咲帶入她的節奏。" 

# 【稀咲】
# display as 稀咲
# JP: 「そのような事業に、市の予算を投入するというのは」
2057 = "「將我市的預算投入到這樣的事業中是——」" 

# 【ハチロク】
# display as 八六
# JP: 「継続性はございます。\nむしろ、より大きな発展へと繋がる、継続性が」
2152 = "「是具有可持續性的。甚至可以說，這個方案能帶來更大的發展潛力」" 

# 【稀咲】
# display as 稀咲
# JP: 「っ！！？」
# 2453 = "「！！？」" 

# monologue
# JP: 運転鞄からの、声。
2672 = "乘務包裡傳出了八六的聲音。" 

# monologue
# JP: 鞄を開けて抱き上げたなら、\nハチロクは、その体勢のまま大音声を張り上げる。
2952 = "我打開包把她抱起，八六保持著原來的姿勢大聲說道。" 

# 【ハチロク】
# display as 八六
# JP: 「今回いただく素晴らしいご縁は、\nより広範へ、必ずや広がっていくものです」
2106 = "「我們這次所獲得的幸運機會，一定能帶來更加廣泛的、更加巨大的轉機」" 

# 【中堅議員】
# display as 中堅議員
# JP: 「議長！　不規則発言を禁じてください！\n参考人、いや、人ですらない物などがっ」
2321 = "「議長！請禁止違規發言！不能讓不是陳述人，不，連人都不是的東西來插嘴」" 

# 【議長】
# display as 議長
# JP: 「不規則発言を」
2309 = "「請不要作違規發言」" 

# 【双鉄】
# display as 雙鐵
# JP: 「議長！　これは参考人である僕の発言です！」
2322 = "「議長！這是身為陳述人的我的發言！」" 

# monologue
# JP: 異議への異議に、議長がぱちくり、まばたきをする。\n指さし示し、その目をマイクに向けさせる。
2948 = "我對異議的反駁，讓議長驚訝地眨巴著眼睛。我用手指示意他看向話筒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「マイクが声を増幅したとて、それは発言ではありません。\n新津議員が仰るように、人でない物は、発言できない」
1910 = "「即便話筒能讓聲音放大，但也不是話筒在發言。正如新津議員所說，非人的物品是不能發言的」" 

# 【中堅議員】
# display as 中堅議員
# JP: 「っ！」
# 2452 = "「！」" 

# 【議長】
# display as 議長
# JP: 「なるほど」
1914 = "「原來如此」" 

# monologue
# JP: 議長の瞳が、笑ったように細くなる。
3240 = "議長帶著笑意地眯起了雙眼。" 

# 【議長】
# display as 議長
# JP: 「右田参考人は、答弁を続けるように」
2311 = "「請右田陳述人繼續答辯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
2444 = "「非常感謝」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2436 = "「雙鐵少爺」" 

# monologue
# JP: 少し不安げなハチロクの声。\nその背を、声で押してやる。
2748 = "八六的聲音有些不安。我用聲音來鼓勵她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「信じるままを言ってくれ。\nお前の声は僕の声。お前の言葉は僕の言葉だ」
1870 = "「你怎麼想的就怎麼說吧。你的聲音就是我的聲音。你說的話就是我說的話」" 

# 【ハチロク】
# display as 八六
# JP: 「はいっ！」
2179 = "「是！」" 

# monologue
# JP: 凛と、ハチロクの声が伸びていく。
2745 = "八六用莊嚴的語氣說道。" 

# 【ハチロク】
# display as 八六
# JP: 「九洲に残る鉄道路線は、\n御一夜鉄道、[ゆのい,1]湯医線だけではございません」
1818 = "「九州剩下的鐵路線路不僅僅只有御一夜鐵路的湯醫線」" 

# monologue
# JP: その発言で思い出す。
3265 = "這句話讓我想起來了。" 

# monologue
# JP: 真闇姉が用意してくれたフリップの中に、\nそれがあったと。
3100 = "真闇姐給我準備的掛圖裡有寫到。" 

# monologue
# JP: （トンっ）
3333 = "（咚）" 

# monologue
# JP: フリップを探し差し出せば、\nほう、と感心の声が聞こえる。
2954 = "我找到掛圖並呈交上去，接著便聽到一片嘆服的聲音。" 

# 【ハチロク】
# display as 八六
# JP: 「[あそさんがく,3]阿曽山岳鉄道、[ひさつ,1]肥颯みかん鉄道、[ながさききどう,3]永崎軌道、[まつうら,1]松裏九洲線、\n[からき,1]辛木鉄道、[ちくほう,1]筑方軌道――」
2429 = "「阿蘇山岳鐵路、肥薩橙鐵路、長崎軌道、松浦九州線、唐木鐵路、築豐軌道——」" 

# monologue
# JP: 九洲広くに、ぽつ、ぽつ――と。\n路線であるのに、点在としかいいようのない、軌道たち。
2844 = "她的手“哐、哐”地敲在九州的各個地方——這些線路，如今只是零零星星地分布在各處。" 

# monologue
# JP: しかし、それは確かに。\n全て、生きている“鉄道”だ。
2723 = "但，它們都是還活著的“鐵路”。" 

# 【ハチロク】
# display as 八六
# JP: 「それらの鉄道各線の中にも、\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;は運用されておりますよね？　ポーレット様」
2028 = "「在這些鐵路之中也有使用\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;的對吧？波萊特小姐」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ！\nそれは、もちろん」
1955 = "「哎？啊！這是自然」" 

# monologue
# JP: 得意分野の話をふられ、\nポーレットの目がようやく落ち着きを取戻す。
3209 = "被問到擅長領域的問題，波萊特的眼神總算恢復了冷靜。" 

# 【ポーレット】
# display as 波萊特
# JP: 「[ふくおか,1]福丘、[ちくほう,1]筑方軌道の\x%l9600;#00ffc040;[キュウロク,3]9600%l;#;――19633、\n[かごしま,2]鹿兒島は、みかん鉄道の[シゴロクキュウキュウ,5]C56-99」
2262 = "「福岡、築豐軌道的\\x%l9600;#00ffc040;[九六,3]９６００%l;#;——１９６３３，鹿兒島的話就是橙鐵路的Ｃ５６－９９」" 

# monologue
# JP: 指折り指折り、ポーレットが現役車両を数え上げていく。\n全１１機。その後、静かに一言を足す。
3049 = "波萊特掰著手指一一列舉現役車輛。總共１１輛。之後靜靜地補充了一句。" 

# 【ポーレット】
# display as 波萊特
# JP: 「[せいたい,1]静態保存のものを含めれば、\n[きゅうしゅう,1]九洲内だけで、さらに数倍はあると思います」
2288 = "「若是算上靜態保存的車輛，光是九州範圍內的數目就比這多出好幾倍」" 

# monologue
# JP: ほう、そんなにか、と、誰かの呟きが聞こえてくる。
2965 = "我聽見了有人低聲說“哦，有這麼多啊”。" 

# monologue
# JP: 稀咲は、何も口に出さない。\nただじっと――値踏みする目で、僕らを見ている。
3146 = "稀咲什麼都沒說。她只是靜靜地打量著我們。" 

# 【ハチロク】
# display as 八六
# JP: 「ＳＬに、観光資源、経営資源としての価値があることは、\nさきほどのグラフでも証明されています」
2294 = "「蒸汽機車具備作為旅遊資源和經營資源的價值，剛才的圖表也已經證明了這一事實」" 

# monologue
# JP: 傍聴席、真闇姉の頷きが、目の端、ちらりと移りこむ。
2962 = "我的眼角瞟到坐在旁聽席上的真闇姐在點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「しかし、点在し、孤立しているがゆえ、それらの資源は、\n朽ち果てていくことを待つだけの状況に陥っています」
1864 = "「但是，因為各條鐵路的分散及孤立，這些資源目前只能被閒置著，直至腐朽」" 

# monologue
# JP: ああ、そうだ――\nこれは真闇姉の教えだったか。
2801 = "啊，對了——這是真闇姐的教誨啊。" 

# monologue
# JP: 経営資源は、テコにして、連鎖させてこそ大きく働く。
3223 = "要將經營資源作為槓桿，引發連鎖反應，才能發揮最大的效果。" 

# 【ハチロク】
# display as 八六
# JP: 「そして、先般の[ハチロクニイマル,3]8620改修が示したように――\n整備改修のスキルを持つ技術者たちも、残っています」
2386 = "「還有正如先前８６２０的修理方案所展示的——現在社會上還有大量掌握維修技術的技術人員」" 

# monologue
# JP: 確かにだ。
3124 = "確實。" 

# monologue
# JP: 粉蔵の技術者達もそうだし、閉鎖されてしまったという、\n日ノ本車輌蒸気部門の技師たちも――っ！
2649 = "不僅是小倉的技術人員，還有據說已經被關閉的日本車輛蒸汽部門的技工——啊！" 

# 【ハチロク】
# display as 八六
# JP: 「つなぎ合わせることが出来れば――\nそれらは大きな……とても大きな力を、必ず発揮します」
1933 = "「只要能夠齊心協力——就一定能發揮巨大的……無比巨大的力量」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その中心に……御一夜が」
2284 = "「而御一夜……就是其中心」" 

# monologue
# JP: ハチロクの真意を理解し、言葉が漏れる。
2955 = "我明白了八六的本意，輕聲說道。" 

# monologue
# JP: その瞬間、\nホっと、安心したように、抱き上げる体から力が抜ける。
3199 = "聽到我這麼說，我懷中的八六忽然放鬆了下來，就好像放下了心中的一塊大石頭。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様のお喉の調子が、戻られたようです」
2437 = "「雙鐵少爺的喉嚨似乎恢復正常了」" 

# monologue
# JP: 軽く、一礼。\nハチロクは僕を促して、膝の上へと落ち着いてしまう。\nが、十分だ。十分すぎる――
2751 = "八六輕輕施了一禮，催促我坐下，然後坐到我的膝蓋上。不過，足夠了。她做的已經很夠了——" 

# monologue
# JP: ハチロクは僕に、思考を整頓する時間だけでなく、\n新たなアイディアと言葉をくれた。
2740 = "八六不僅給了我整理思路的時間，還提供了新的點子和說辭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「近隣にある――そう、例えばみかん鉄道とでしたら、\n御一夜-[やつしろ,2]八ツ城間を復線させれば、繋がれます」
1868 = "「位於近鄰的——比如說橙鐵路。若是讓御一夜到八代的廢線恢復，就能與之互通」" 

# 【稀咲】
# display as 稀咲
# JP: 「復線って、君、双鉄。\nそんな簡単に言うけれど」
2097 = "「恢復廢線……雙鐵你啊，話說得倒是簡單」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もちろん、すぐには難しいかもしれん。\nが、いずれ――遠からず、\x%lエアクラ;#00ffc040;エアクラ%l;#;は必ず空へ向かう」
2231 = "「當然，或許無法馬上實現。但是遲早——在不久的將來，\\x%lエアクラ;#00ffc040;空凝機%l;#;必定會飛上天空」" 

# monologue
# JP: 安芸様が予言していた、来るべき道。\nそれを、当事者に確認してみる。
2871 = "安芸殿下所預言的不久後的將來。我試著向當事人確認這點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「浦上さん。飛行型\x%lエアクラ;#00ffc040;エアクラ%l;#;の普及は、\nエアロ＝クラフテック社の目標とするところですよね？」
2214 = "「浦上經理。讓飛行型\\x%lエアクラ;#00ffc040;空凝機%l;#;普及是空凝科技公司的目標，對吧？」" 

# monologue
# JP: 困ったように、浦上が稀咲の顔を見る。
3054 = "浦上左右為難地看著稀咲的臉。" 

# monologue
# JP: 稀咲の頷き。浦上の挙手。\n議長が、待ちわびていたような声を出す。
3157 = "稀咲點點頭。浦上舉起手。議長就好像迫不及待一般說道。" 

# 【議長】
# display as 議長
# JP: 「[ほうしょう,1]宝生参考人の、補佐人の発言を認めます」
1882 = "「允許寶生陳述人的助理發言」" 

# 【浦上】
# display as 浦上
# JP: 「非常におおまかな目標としては、\n[みぎた,1]右田さんのおっしゃるとおりであると認識しています」
2449 = "「非常籠統地說，右田先生說得沒有錯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばいずれ、地上は\x%lエアクラ;#00ffc040;エアクラ%l;#;から解放されましょう。\nガソリン自動車への乗り戻りが起こるとは考え難い」
2412 = "「那麼，地上交通將不再被\\x%lエアクラ;#00ffc040;空凝機%l;#;局限。而回到汽油引擎汽車的時代幾乎是不可能的」" 

# monologue
# JP: ガソリンエンジンは、\x%lエアクラ;#00ffc040;エアクラ%l;#;機関の、\n超高コストの下位互換である要素が多い。
3035 = "汽油引擎在很多方面，都是\\x%lエアクラ;#00ffc040;空凝機%l;#;引擎的降級版本，需要額外付出極高的成本。" 

# monologue
# JP: 作動不能地域においてと、ごく趣味的なものたちと――\n現状以上の復権は、どう考えてもありえんだろう。
3289 = "除在\\x%lエアクラ;#00ffc040;空凝機%l;#;無法工作的地區，以及作為少數人的愛好——汽油引擎想回到更高的地位，無論怎麼想都是不切實際的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし鉄道は違います。公共性を持つ旅ができ、\n同時に、大量輸送の、効率の良いツールでもあるから」
1857 = "「但是鐵路不同。不僅能運用於具備公共性的旅行，同時也是能高效輸送大批貨物的工具」" 

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;と鉄道の最大の違い。\nそれは“個”を最優先できるかできないかの差異だ。
84 = "\\x%lエアクラ;#00ffc040;空凝機%l;#;與鐵路最大的不同，就在於能否以“個體”為優先。" 

# monologue
# JP: 公共の移動手段でしかありえぬ鉄道はそれゆえに、\n他者と、時間を、空間を――共有させる。
3031 = "正因為鐵路只能是公共的交通手段，所以才能和他人共有時間和空間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「公共性が。他者の緩やかな連帯が、好感され評価される。\nバーベキュー\x%l列車;#00ffc040;列車%l;#;の大ヒットは、そんな嗜好の現れです」
1894 = "「公共性和為他人提供舒適的共處空間，能博得旅客的好感及好評。ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;的爆紅正是這一嗜好的體現」" 

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;の急速な発展が引き起こした、\n個から群への揺り戻し――
83 = "\\x%lエアクラ;#00ffc040;空凝機%l;#;的迅速發展引起的從個體到群體的還原——" 

# monologue
# JP: そうした社会傾向を、当の\x%lエアクラ;#00ffc040;エアクラ%l;#;社も無論、\n分析・把握をしているはずだ。
82 = "\\x%lエアクラ;#00ffc040;空凝機%l;#;公司自然也應該分析並掌握了這一社會傾向。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……\x%lエアクラ;#00ffc040;エアクラ%l;#;が空へと向かった後の、鉄道復権。\nそれは、\x%lエアクラ;#00ffc040;エアクラ%l;#;社の利益にも繋がりますよね？」
1514 = "「……\\x%lエアクラ;#00ffc040;空凝機%l;#;升空後的鐵路復興。這也關係到\\x%lエアクラ;#00ffc040;空凝機%l;#;公司的利益，沒錯吧？」" 

# monologue
# JP: 短く、浦上は息を吸い、吐く。
3055 = "浦上輕輕吸了一口氣，然後將其呼出。" 

# 【浦上】
# display as 浦上
# JP: 「社としての判断を下せる能力も無く立場でもありません。\nが、個人としては……ご指摘どおりかと認識します」
2102 = "「我並沒有代表公司作出判斷的能力及資格。但是從個人角度來說……我認為你說得沒錯」" 

# monologue
# JP: ざわりと、議場が大きくどよめく。\nかすかに頷き、稀咲がやっと、言葉を発する。
3018 = "會場一下子騷動起來。稀咲微微點點頭，然後終於說話了。" 

# 【稀咲】
# display as 稀咲
# JP: 「超重量物の移送問題は、そう簡単には解決できない。\n鉄道の復権は、\x%lエアクラ;#00ffc040;エアクラ%l;#;の弱点の補完になるわけだ」
2348 = "「超重物的運輸問題不是那麼容易就能解決的。鐵路的復興只不過是彌補了\\x%lエアクラ;#00ffc040;空凝機%l;#;的弱點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう。\x%lエアクラ;#00ffc040;エアクラ%l;#;と鉄道は共存できる。そして、\n観光面での鉄道の魅力を最大に活かすものは、ＳＬだ」
2196 = "「沒錯。\\x%lエアクラ;#00ffc040;空凝機%l;#;和鐵路可以共存。而能夠在旅遊上最大程度活用鐵路魅力的便是蒸汽機車」" 

# monologue
# JP: 鉄道復権がなされるときには、\x%l気動車;#00ffc040;気動車%l;#;、電車――\nより大きな利便性を持つ車輌も当然、復権しよう。
3086 = "當鐵路成功復興之時，\\x%lディーゼル気動車;#00ffc040;柴油動車%l;#;、電車——這些擁有更大便利性的車輛自然也不例外。" 

# monologue
# JP: が、ＳＬにはＳＬならではの価値がある。\nＳＬが滅び行くことを、人は、決して望まない。
2717 = "但是，蒸汽機車有蒸汽機車的價值。人們絕不會願意看到蒸汽機車退出歷史舞台。" 

# 【双鉄】
# display as 雙鐵
# JP: 「故に、御一夜を中心とした鉄道路線を復活させ、\nそこでのＳＬの集中運用というモデルを作る」
2220 = "「為此，我們需要讓以御一夜為中心的鐵路線路復活，創造集中運用蒸汽機車的模式」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そっか……車輌は各地に――そして、ＳＬに特化した、\n保全・改修のための設備や人材を、御一夜に集中させて」
1912 = "「原來如此……派出車輛前往各地——並且讓跟蒸汽機車配套的維護及修理設備還有人才聚集在御一夜」" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜をＳＬ観光の起点駅とする。\x%l8620;#00ffc040;8620%l;#;から乗り換えて、\nＳＬで、九洲各地を観光できる。そんな未来を作るのだ」
2323 = "「讓御一夜成為蒸汽機車旅遊的起點站。從\\x%l8620;#00ffc040;８６２０%l;#;換乘，然後搭乘蒸汽機車在九州各地觀光。我們要創造這樣的未來」" 

# monologue
# JP: そうなれば、無論、整備性も大きく向上する。\nノウハウも、蓄積し活かしていくことが出来る。
3271 = "這樣一來，可維護性自然也會大幅提升。也可以累積並有效利用經驗。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに[ハチロクニイマル,3]8620はすでに老朽車両かもしれん。\nが、\x%l8620;#00ffc040;8620%l;#;が壊れたとして――それなら次へ、受け渡せる」
2252 = "「確實，８６２０或許已經是老舊車輛了。但是，就算\\x%l8620;#00ffc040;８６２０%l;#;壞了——也能夠託付給下一輛」" 

# monologue
# JP: 終着駅は、全ての終わりを意味しない。
3178 = "終點站並不意味著一切的結束。" 

# monologue
# JP: そこは新しい起点となって――\nその先へ、次へとつなげていけるのだから。
2805 = "因為那將會成為新的起點——通往新的前路、新的未來的起點。" 

# 【日々姫】
# display as 日日姬
# JP: 「ＳＬの……蒸気の町――\nううん、そう――蒸気のふるさと、御一夜」
2296 = "「蒸汽機車的……蒸汽之城——不，是蒸汽之鄉——御一夜」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2003 = "「嗯」" 

# monologue
# JP: 傍聴席からの日々姫の呟き。\nそれが、イメージを固めてくれる。
2901 = "從旁聽席上傳來日日姬的低語，將我的話語具象化。" 

# monologue
# JP: 焼酎、温泉、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;――御一夜は、今の時点でも、\n“蒸気のふるさと”と呼ばれてしかるべき町だ。
3070 = "燒酒、溫泉、\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;——哪怕是現在，御一夜也一樣稱得上是“蒸汽之鄉”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「蒸気のふるさと御一夜として、全ての資源を連携させる。\nそれは、御一夜にしか、鉄道でしか出来ないことだ」
2105 = "「我們要打著蒸汽之鄉的名號，讓御一夜協調運用所有的資源。這是只有御一夜，只有鐵路才能辦到的事」" 

# 【浦上】
# display as 浦上
# JP: 「……稀咲様」
1544 = "「……稀咲小姐」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 2003 = "「嗯」" 

# monologue
# JP: 稀咲が、浦上が、僕を見、頷く。
3150 = "稀咲和浦上看著我，點點頭。" 

# monologue
# JP: ならば、僕らは――\nきっと、同じ未来図をもう、描けてる。
3283 = "那麼我們——所構想的未來肯定也是一樣的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この補正予算案は、その未来のための最初の投資。\n成立を強く要望し、僕の答弁を終わります」
2371 = "「這一預算修正案正是為了實現這一未來的第一筆投資。我強烈希望它能夠通過。我的答辯就此結束」" 

# monologue
# JP: パチ、パチと。最初の拍手は、稀咲から。\nほどなくそれは、議場のすべて、全ての手から、鳴り響く。
1473 = "“啪、啪”。第一個鼓掌的人是稀咲。不久後，會場的所有人都送來了掌聲。" 

# monologue
# JP: やがて万雷となった拍手を、\n議長の重々しい声が割る。
3016 = "最終，雷鳴般的掌聲被議長莊嚴的聲音所打斷。" 

# 【議長】
# display as 議長
# JP: 「本補正予算案の採決を行います。\n本案に賛成の議員は、ご起立を願います」
2227 = "「現在進行本修正預算案的表決。贊成本案的議員，請起立」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでは、補正予算の成立を祝して――」
2408 = "「那麼為了慶祝預算修正案的通過——」" 

# 【ハチロク】
# display as 八六
# JP: 「かんぱーい！」
1829 = "「乾杯！」" 

# 【日々姫】
# display as 波萊特＆日日姬
# JP: 『「かんぱーい！」\n「かんぱーい！」』
2467 = "『「乾杯！」\\n「乾杯！」』" 

# monologue
# JP: 笑顔が溢れる。
3169 = "笑容洋溢。" 

# monologue
# JP: 誰も彼もが――\nつい先程まで対立していた稀咲さえもが笑っている。
3033 = "每一個人——就連方才還站在對立面的稀咲也在笑著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……変われば変わるものだな」
1542 = "「……真是說變就能變啊」" 

# 【ハチロク】
# display as 八六
# JP: 「君子は豹変す――と言うべきものでございましょう。\n稀咲様のお力は、極めて大きなものとなるかと」
2376 = "「這就是所謂的——成大事者不拘小節吧。我認為稀咲小姐能給我們提供相當大的助力」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そのことは早速実感させられた」
2002 = "「嗯。這點我很快就切身體會到了」" 

# monologue
# JP: 予算通過と同時に稀咲は僕らに握手を求めて来た。\nのみならず、提案までをもしてくれた。
2819 = "在預算通過的同時，稀咲來和我握手。不僅如此，還給了我些許建議。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……まずは近県の鉄道会社との、持株会社の設立。か」
1549 = "「……首先與鄰縣的鐵路公司成立控股公司嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「持株会社、とはどのようなものなのですか？」
2131 = "「控股公司是指什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「複数の会社を統括する一つの会社を、共同出資で作る。\nそしてそこを親会社として、経営の集約化を行うものだ」
2385 = "「通過共同出資，建立一家總管多家公司的公司。然後以此為母公司，進行匯總經營」" 

# 【ハチロク】
# display as 八六
# JP: 「ええ……と」
1947 = "「呃……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば……そうだな、真闇姉に、\n御一夜市内のクマ焼酎の全体を見てもらおうと考える」
2190 = "「比如說……對了，假設讓真闇姐來管理御一夜市內整個隈燒酒行業」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、それは素敵な考えですね」
1987 = "「啊，這個假設真不錯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこで、真闇姉を社長とする持株会社を、\nそれぞれの酒蔵を束ねる、親会社として設立するのだ」
2189 = "「此時，我們要讓真闇姐擔任社長的控股公司成為管理各個酒窖的母公司」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ……そのようにすれば、指示やお金が、\nスムーズに流れるようになるのですね？」
1971 = "「啊……這樣一來，指示和資金就能周轉得更加順暢，對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。それぞれの会社はそのままだから、\n損失の方は、他の会社へ影響をさせないでも済む」
2197 = "「沒錯。因為各個公司保持原來的形式不變，所以損失也不會波及到其他的公司」" 

# monologue
# JP: これを、A社、B社ではなく、一つの企業に再編し、\nA部門、B部門としてしまうなら、そうはいかない。
2864 = "如果不是分為Ａ公司、Ｂ公司，而是重組為一個企業，分為Ａ部門、Ｂ部門的話，就沒辦法這樣了。" 

# monologue
# JP: A部門で出した赤字は、社のものとなり、\nB部門にも影響を及ぼしてしまうから。
3345 = "Ａ部門出現赤字會使整個公司受到牽連，連Ｂ部門也會受到影響。" 

# 【双鉄】
# display as 雙鐵
# JP: 「経営の集約をしつつ独立性も維持できるのが持株会社だ。\nそれは当然、第三、第四の企業の参入を促しやすくする」
2143 = "「既能匯總經營，又能維持獨立性，這便是控股公司的特徵。當然也容易吸引第三、第四家企業的加入」" 

# 【ハチロク】
# display as 八六
# JP: 「……[だいきゅしゅう,2]大九洲ＳＬ構想を成立、発展させていくため。\n持株会社は、なるほど、優れた仕組みなのですね」
1536 = "「……我明白了。要想讓大九州蒸汽機車藍圖得以成立並發展壯大，控股公司確實是很合適的結構」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、構想への理解、協力を得られればだがな。\n九洲男児は独立心が強いと聞くし、簡単ではなかろう」
2230 = "「當然，大前提是大家能理解我們的構想並給予支持。聽說九州男人的獨立心很強，恐怕不容易實現」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だとしても、絶対いけます。\n向こうにだって、メリット、ものすごく大きいですから」
1879 = "「儘管如此也一定能成功。因為對對方也有非常大的好處」" 

# monologue
# JP: ポーレットがスっと会話にすべりこんでくる。
3047 = "波萊特很自然地加入了對話。" 

# monologue
# JP: その頬はワインのせいか、かなり赤らみ、\n手には、\x%l帝鉄;#00ffc040;帝鉄%l;#;時代のものと思しき路線地図を持っている。
2792 = "可能是因為葡萄酒的原因，她的臉頰紅得厲害，手上則拿著好像屬於\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;時代的線路地圖。" 

# 【ポーレット】
# display as 波萊特
# JP: 「まず最初は、みかん鉄道。北回りだけじゃなくって、\n南、[はやと,1]早戸を通じて[かごしま,2]鹿兒島までも復線できれば――」
2450 = "「首先是橙鐵路。不僅僅是北部路線，如果南部能夠通過隼人站，恢復鹿兒島的廢線——」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ、環状が出来るのですね？」
1981 = "「啊，就能形成環狀線對吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう！　その上、路線上には[おこば,1]小畑もありますし。\nこれ、観光振興に効果絶大ですよ」
2201 = "「沒錯！而且路線上還有大畑。這對旅遊復興意義重大」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おこば？」
2038 = "「大畑？」" 

# 【ハチロク】
# display as 八六
# JP: 「鉄道界隈では有名な――日ノ本で唯一、\n\x%lループ線;#00ffc040;ループ線%l;#;と\x%lスイッチバック;#00ffc040;スイッチバック%l;#;とをともに持つ駅です」
2031 = "「在鐵路圈很有名的——日本唯一一個同時具備\\x%lループ線;#00ffc040;展線%l;#;與\\x%lスイッチバック;#00ffc040;折返線%l;#;的車站」" 

# monologue
# JP: 言いながら、\nハチロクはポーレットの広げた地図をまじまじと見る。
2738 = "八六一邊說一邊仔細查看波萊特攤開的地圖。" 

# 【ハチロク】
# display as 八六
# JP: 「すぐ南……御一夜と、これほど近くにあったのですね」
2066 = "「就在南邊不遠……原來離御一夜這麼近」" 

# 【ポーレット】
# display as 波萊特
# JP: 「[やません,1]山線ですから、復線も大変ですけど――\nでも、周辺自治体とみかん鉄道の協力も得られれば」
2019 = "「因為是山路線，所以要恢復廢線也很困難——但只要能得到周邊自治體和橙鐵路的協助」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのおこば駅と繋がる路線を持つことは、\nそれほど、みかん鉄道にも良いことなのか？」
1952 = "「和那個大畑站互通路線對橙鐵路有這麼大的益處嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「要素単体では、どう評価されるかわかりませんけど……\n構想全体をきちんと伝えれば、理解を貰えると思います」
2434 = "「雖然不確定若單看條件本身會得到什麼評價……但只要把整個方案說明白了，我想他們會理解的」" 

# 【稀咲】
# display as 稀咲
# JP: 「だろうね」
1824 = "「也對」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1958 = "「哦——」" 

# monologue
# JP: 稀咲が話に割り込んでくる。\nにこにこ顔の日々姫も一緒だ。
3143 = "稀咲也插話了。滿面微笑的日日姬也在一起。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクもそう判断したから協力を申し出た。\nだから、必ずや実現可能性を実地で示してもらいたい」
2115 = "「我正是因為如此判斷才提出協助的。所以請你們到時候務必在現場證明出這個方案實現的可能性」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2003 = "「嗯」" 

# monologue
# JP: そのためには、\x%l8620;#00ffc040;8620%l;#;の復活と、\nバーベキュー\x%l列車;#00ffc040;列車%l;#;のより一層の活性化が必須となる。
3064 = "為此需要讓\\x%l8620;#00ffc040;８６２０%l;#;復活，以及讓ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;更進一步最佳化利用。" 

# monologue
# JP: ごく当然のこととはいえど、\n指摘をされれば、改めて気が引き締まる。
3293 = "雖然也可以說是理所當然的事情，但聽她這麼一說，我再一次嚴肅了起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「もう、にぃに～\nこーんな席まで厳しか顔ばしてー」
2426 = "「阿哥真是的～在這種宴會上還板著個臉～」" 

# monologue
# JP: 緩んでいる。\n日々姫はよほど嬉しいのだろう。
3003 = "日日姬一副很隨便的樣子。想必她是很高興吧。" 

# monologue
# JP: 稀咲と一緒にいるというのに、\n標準語がまるで出てこない。
3015 = "明明是和稀咲在一起，卻完全不說普通話。" 

# 【日々姫】
# display as 日日姬
# JP: 「もーっとほら、にこにこせんと！\n笑わん角には、福も来んとよ？」
2037 = "「多開心點才行嘛！人不笑，福氣也不會來哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ」
1948 = "「呃，嗯」" 

# monologue
# JP: 言われてしまうと、笑顔というのは難しい。
3215 = "被這樣一提醒，我反而不知該如何做出笑容來。" 

# monologue
# JP: なんとか浮かべる――\nつもりであったが、ハチロクがプっと吹き出してしまう。
2940 = "我剛打算勉強擠出個笑容——八六就忍不住笑了出來。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、お顔、ぎくしゃくとされていますよ？」
2438 = "「雙鐵少爺，您的表情很生硬呢」" 

# 【日々姫】
# display as 日日姬
# JP: 「もっと、自然に～　にこにこにこーって、\nれいなちゃんのこと、見習うとよかばい」
1901 = "「再自然一點～微微微微笑～你學學玲奈就好啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2009 = "「嗯？」" 

# monologue
# JP: 言われて、気づく。\nポーレットとれいなが一緒ではない。
3182 = "經她提醒我才發現，波萊特和玲奈沒在一起。" 

# 【双鉄】
