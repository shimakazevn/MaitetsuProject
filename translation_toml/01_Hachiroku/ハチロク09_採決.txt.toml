# lines: 481 
# 【双鉄】
# display as 雙鐵
# JP: 「――む」
1503 = "「——唔」" 

# monologue
# JP: 差し込む朝日の眩しさに、思考までもが真っ白になる。
3194 = "耀眼的朝陽讓我連思考也變得雪白。" 

# 【ハチロク】
# display as 八六
# JP: 「……すぅ……すぅ」
1530 = "「……呼……呼」" 

# monologue
# JP: 寝息――だとしか聞こえない、\nハチロクの穏やかな吸排気音。
2746 = "八六發出了入睡時特有的平穩呼吸聲。" 

# monologue
# JP: それに揺すられ、\nぼんやりとした現実感がまとまり始める。
2785 = "受她的呼吸聲所影響，模糊的現實感開始變得清晰起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……のどかなものだ」
1541 = "「……真夠悠哉的」" 

# monologue
# JP: 布団と僕とハチロクと。\n世界がそれだけしかないような、とても手狭な万能感。
3211 = "被子、我和八六。我有一種彷彿世界被濃縮在這個狹窄範圍內一般的全能感。" 

# monologue
# JP: 柔らかな頬をそうっと押せば、\nハチロクは、わずらわしそうに寝返りを打つ。
3248 = "輕輕戳了一下八六柔軟的臉頰，她不耐煩地翻了個身。" 

# 【ハチロク】
# display as 八六
# JP: 「ん…………」
1995 = "「嗯…………」" 

# monologue
# JP: あまりにも人間じみたその仕草。\nふっと、疑問を感じてしまう。
2860 = "她這樣子實在是太過接近人類了。我不由得產生了疑問。" 

# monologue
# JP: （どうして……これほどまでに、似せたのだろうな）
3342 = "（為什麼……會做得這麼像呢）" 

# monologue
# JP: 機能の全ての現れが、\n人間のものをほぼ完全に模している。
2836 = "她基本具備人類身體所有該有的機能。" 

# monologue
# JP: それは安らぎを与えてくれるが、\n同時に不安も掻き立てる。
3295 = "雖然這點讓人安心，但又同時讓人產生不安。" 

# monologue
# JP: （似せれば似せてしまうほど――\n違いは、残酷なまでに際立ってしまうというのに）
3344 = "（越是做得與人類相近——差異往往會越來越突出）" 

# monologue
# JP: 体を持たず、機能だけであるナビになら、\nこんな気持ちを抱くことなど、ありえまい。
3300 = "面對沒有身體只有功能的Ｎａｖｉ時，我不可能產生這樣的念頭。" 

# monologue
# JP: ……壊れてしまうまでの時間と、僕の寿命と。\nそれを比べて、未来を思ってしまうなど。
1479 = "……不會去想將來是她會先報廢掉，還是我生命會先走到盡頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が――」
1853 = "「但——」" 

# monologue
# JP: ハチロクを起こさぬように布団から出る。
3061 = "為了不弄醒八六，我小心翼翼地離開被窩。" 

# monologue
# JP: そうしたつもりだったのだけれど、\nゆっくりと、ハチロクのまぶたが持ち上がる。
2712 = "但事與願違，八六慢慢地抬起了眼瞼。" 

# 【ハチロク】
# display as 八六
# JP: 「……あ――」
1531 = "「……啊——」" 

# monologue
# JP: ぼうっとした目。\nやがて焦点が結ばれて、ゆるやかな笑みが浮き上がる。
2840 = "她朦朧的雙眼開始慢慢對焦，隨後露出了平和的微笑。" 

# 【ハチロク】
# display as 八六
# JP: 「おはようございます、双鉄様」
2149 = "「早安，雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。良く眠れたようだな」
1996 = "「嗯。你睡得很熟嘛」" 

# monologue
# JP: 髪がいささか寝乱れている。
2849 = "她的頭髮有些亂。" 

# monologue
# JP: 手櫛で軽く整えてやれば、\nハチロクは、心地よさそうに目を閉じる。
2960 = "我用手去溫柔地梳理她的頭髮，八六舒適地合上了雙眼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1515 = "「…………」" 

# monologue
# JP: あどけない。愛おしい。守ってやりたい。
2839 = "她是如此無邪，可愛。我想要守護她。" 

# monologue
# JP: そう感じれば、ちりちりとした痛みと不安が、\nいっそ鮮明に沸き起こってくる。――が、だ。
3081 = "產生這些想法時，陣陣收縮的疼痛和不安便更加鮮明地湧上心頭。但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「いよいよ、今日が決戦だな」
1844 = "「今天終於到決戰時刻了啊」" 

# monologue
# JP: 未来を不安に感じるのなら、\nよりよいものへ整えればいい。
3201 = "若是對未來感到不安，只要讓未來變得更好便可。" 

# monologue
# JP: ハチロクが幸せに暮らせる世界を整えるよう、\n僕のベストを尽くしていけば。
2789 = "只要我能盡一切努力去創造八六能幸福生活的世界。" 

# 【ハチロク】
# display as 八六
# JP: 「決戦――」
2193 = "「決戰——」" 

# monologue
# JP: まばたきし、眠気の膜を取り払い、\nハチロクはまっすぐな目で僕を見つめる。
2851 = "她眨眨眼趕走睡意，凝視著我。" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。今日の議会で、[あの子,3]8620の――\nいえ、御一夜そのものの未来が決定される」
2164 = "「是的。今天議會將會決定[那孩子,3]８６２０——不，是整個御一夜的未來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「事実上、そうなるな」
1832 = "「事實上確實如此」" 

# monologue
# JP: 御一夜市議会、予算委員会の補正予算審議。\nその採決が行われるのだから。
3021 = "會議中將會對御一夜市議會、預算委員會的預算修正案審議進行表決。" 

# 【ハチロク】
# display as 八六
# JP: 「……ポーレット様の予算案。\nみなさまのご理解をいただけますよね？」
1539 = "「……波萊特小姐的預算案能得到大家的理解嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、今日の質疑応答次第だろう」
2375 = "「這取決於今天的聽證吧」" 

# monologue
# JP: 不安げな声を聞いてしまえば、\n無条件に勇気づけたくなる。
2925 = "我一聽到她不安的聲音，就會無條件地想要為她加油鼓氣。" 

# monologue
# JP: が、言葉はそれを発する僕にも、必ず影響を与えるものだ。\nだから唇と心を、意識して強く引き締める。
2720 = "但說的話必定也會對我造成影響。所以我小心翼翼地字斟句酌。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致推進派にしても、ここが[せんど,1]先途だ。\nこちらの弱みを、徹底的についてくるだろう」
2058 = "「對\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶推行派來說，今天也同樣是緊要關頭。他們應該會揪住我們的弱點不放吧」" 

# 【ハチロク】
# display as 八六
# JP: 「弱み……ですか」
2077 = "「弱點嗎……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「費用の問題。\x%l台枠;#00ffc040;台枠%l;#;交換で新たな不具合が出る危険。\nキハ[レイナナ,1]07の観光・日用併用に、僅かながら苦情の声もある」
2339 = "「費用的問題。替換\\x%l台枠;#00ffc040;車架%l;#;出現新的缺陷的風險。雖然很少，但也有部分人對Ｋｉｈａ０７觀光和日用兩用表示不滿」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
2178 = "「是的」" 

# monologue
# JP: ただ、現状を正しく伝える。\nそうすることで、僕の頭も整頓し直す。
2878 = "將現狀傳達給她。這樣做也能讓我重新整理思緒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対派の議員は固まっているが、\n過半数には及んでいない。自主投票の会派もある」
1498 = "「\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠反對派的議員雖然上下齊心，但人數還沒有過半。而且還有自主投票的派系」" 

# 【ハチロク】
# display as 八六
# JP: 「ご理解をいただけなければ――\n最悪の場合、逆転を許してしまう危険もあるのですか？」
2046 = "「如果得不到贊同的話——最糟糕的情況下會被反超，是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――鉄道での振興が否定されれば、他に手はない。\n流れは一気に、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致待望へと傾くだろう」
2194 = "「沒錯——若是鐵路振興遭到否決的話就束手無策了。恐怕局面會瞬間倒向\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶支持派」" 

# 【ハチロク】
# display as 八六
# JP: 「……」
1519 = "「……」" 

# monologue
# JP: きゅっと、ハチロクが唇を結ぶ。\n拳が、ゆっくり握られていく。
2750 = "八六緊緊地抿著嘴唇。拳頭慢慢地握緊。" 

# 【ハチロク】
# display as 八六
# JP: 「ご理解をいただく――のではなく、\nわたくしたちで、勝ち得なければならないのですね」
1802 = "「不能期盼得到他們的理解——必須由我們自己去爭取」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
2199 = "「沒錯」" 

# monologue
# JP: いい顔だ。\n緩まず力まず、怯えの影も見られない。
2847 = "她的表情很不錯。不會太放鬆也不會太緊張，也沒有一絲畏懼的神色。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうするための準備もしてきた。\nポーレットはもちろん、真闇姉も日々姫も」
2218 = "「準備也已經做足了。波萊特自不用說，真闇姐和日日姬也一樣」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、よかった。もう起きとるね？」
1978 = "「啊，太好了。已經醒了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫か。入ってくれ」
2163 = "「是日日姬啊。進來吧」" 

# monologue
# JP: 途端、あわあわハチロクは、\n髪を、着衣を気にするそぶり。
2753 = "八六馬上開始在意起自己的頭髮和著裝。" 

# 【ハチロク】
# display as 八六
# JP: 「あ――あの、わたくし、\n身支度を整えて参ります」
2388 = "「那——那個，我先去換身衣服」" 

# monologue
# JP: 日々姫と入れ替わるようにして、\n着替えを抱えてハチロクは部屋を小走りに出る。
2743 = "八六和進來的日日姬交錯而過，抱著需要換上的衣服小跑著離開了房間。" 

# monologue
# JP: 日々姫はすっかり身なりを整え、\nスケッチブックまで抱えている。
3007 = "日日姬已經整理好了穿著，連素描簿都拿上了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕もいつまでも寝間着ではいかんな」
1983 = "「啊，我也不能老是穿著睡衣啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「ちょっ！？　着替えるんなら外で待っとるけん」
1993 = "「喂！？要換衣服的話我去外面等」" 

# 【双鉄】
# display as 雙鐵
# JP: 「兄妹で照れるようなことでもなかろう。\nそれに、今日のこの日の時間は貴重だ」
1888 = "「兄妹之間沒什麼好害羞的吧。而且今天的時間很寶貴」" 

# 【日々姫】
# display as 日日姬
# JP: 「んっ――」
1994 = "「嗯——」" 

# monologue
# JP: 立ち去りかけてた日々姫の足がぴたりと止まる。
3198 = "聽到我這樣說，正準備離開的日日姬停下了腳步。" 

# monologue
# JP: 一応は僕も気をつかい、\n日々姫に背中を向け着替えながら問いかける。
2930 = "我也姑且顧慮著日日姬的感受，背過身去一邊換衣服一邊問道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それで、どうした？」
2402 = "「那你找我是？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、うん。これ、頼まれてたやつ――」
1977 = "「啊，嗯。這是你要的東西——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どれ」
2120 = "「我看看」" 

# monologue
# JP: スケッチブックの間から、\n日々姫がボードを取り出していく。
3009 = "日日姬從素描簿之間取出掛圖。" 

# monologue
# JP: 今日の答弁のための備えだ。\n確認したくて、着替えを急ぐ。
3269 = "這是為了今天的聽證而準備的。我急著想看看，趕緊換好衣服。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ――さすがだな。\n見やすくて良い出来のフリップだ……っと？」
1975 = "「啊，嗯——厲害。真是簡單易懂的掛圖……嗯？」" 

# monologue
# JP: なんだ……見覚えのない、地図に――表。
3268 = "這是什麼……一張我沒見過的地圖——還有表格。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは？」
2377 = "「這是？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん、フリップの準備ばしてたら、ねぇねぇが。\n資料をくれて、『役に立つかもしれんけん』って」
2006 = "「嗯，在準備掛圖的時候，阿姐她給了我資料，說“或許能派上用場”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉がか？」
2246 = "「真闇姐她這麼說？」" 

# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩も、参考人に呼ばれるみたいやけん」
2272 = "「稀咲學姐好像也被叫來當陳述人了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか……なるほどな。\n向こうも、やはり本気だな」
2158 = "「是嗎……原來如此。看來對方也是認真的啊」" 

# monologue
# JP: 今日の質疑応答では、僕も参考人として、\n誘致反対派の予算委員の質問に答えることとなっている。
2810 = "在今天的聽證答辯環節，我也要作為陳述人來回答落戶反對派的預算委員的問題。" 

# monologue
# JP: つまりは事実上の応援演説だが、参考人である以上、\n他の委員から質問をされる可能性もある。
2876 = "實際上也就是聲援演說，但既然是陳述人，那麼也就有被其他委員提問的可能性。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットからも忠告はされている。\n今日ばかりは、事前通告のない質問もあるかもしれぬと」
2211 = "「波萊特也忠告過我。今天或許會被問到沒有事前通告過的問題」" 

# monologue
# JP: 市議会の議長は、かなり柔軟と定評のある人物だ。
2890 = "市議會議長是位以思維靈活而著稱的人物。" 

# monologue
# JP: 御一夜の未来を見誤らぬよう、議論を活性化させるため、\nその程度の逸脱を良しとするとて、不思議もあるまい。
3062 = "為了不耽誤御一夜的未來，為了讓議論更加具備靈活性，他對這種程度的意外睜隻眼閉隻眼也是不足為奇的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どんな切り口で攻め込まれるかわからんからな。\n真闇姉が預けてくれるものならば心強い」
2018 = "「因為不知道對方會以什麼論點發起進攻啊。既然是真闇姐準備的，那簡直是打了一針強心劑」" 

# monologue
# JP: 言った途端に、ぷくっと日々姫の頬がふくれる。
2941 = "我剛這麼說，日日姬就鼓起了臉。" 

# 【日々姫】
# display as 日日姬
# JP: 「私のフリップば心強くなかと？」
2119 = "「我的掛圖就不是強心劑了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさか、そんなことは――\nああ、いや。礼を言うのが遅れたな」
2095 = "「怎麼會呢——啊，嗯。是我道謝晚了」" 

# monologue
# JP: 頭を下げる。\nというよりむしろ、素直に頭が下がってる。
2934 = "我低下頭。應該說是老老實實地低下了頭。" 

# 【双鉄】
