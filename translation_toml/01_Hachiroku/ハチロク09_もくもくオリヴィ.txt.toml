1521 = "「Hôm nay, em sẽ là Suzu sao ạ? Rõ ràng là đang ở trên tàu của Đường sắt Ohimitera, hơn nữa, lại còn có cả cô Fukami ở đây nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道の車内でも、今日は完全なプライベートだ。\nきっぷも、きちんと購入してある」
1819 = "「Dù là trên tàu của Đường sắt Ohimitera, nhưng hôm nay hoàn toàn là không gian riêng tư. Vé cũng đã mua đàng hoàng rồi.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。うふふ。きっぷのデザインも変えたのですね」
1779 = "「Vâng. Ufufu. Thiết kế của vé cũng đã được thay đổi rồi nhỉ.」"
# monologue
# JP: うれしげに、ハチロクは革製のきっぷケースから、\n僕らのきっぷを取り出し、眺める。
2417 = "Hachiroku vui vẻ lấy vé của chúng tôi ra từ chiếc bao da đựng vé, rồi ngắm nghía."
# monologue
# JP: さすがは日々姫。西部劇風に、綺麗にまとめてある。\n乗合馬車のチケットと言われれば、一瞬はそう信じそうだ。
2650 = "Quả không hổ danh là Hibiki. Thiết kế mang phong cách phim cao bồi viễn Tây rất đẹp mắt. Nếu bảo đây là vé xe ngựa chở khách, có lẽ trong khoảnh khắc tôi cũng sẽ tin là thật."
# 【双鉄】
# display as 雙鐵
