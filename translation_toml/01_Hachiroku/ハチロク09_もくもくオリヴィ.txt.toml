2835 = "Dù vô cùng thoải mái, nhưng với tư cách là nhân viên của Đường sắt Ohimitera, tôi vẫn hơi bận tâm việc các ghế không được lấp đầy."
# 【ハチロク】
# display as 鈴
# JP: 「けれど……だんな様？」
1491 = "「Nhưng mà……phu quân?」"
# 【双鉄】
# display as 雙鐵
