1896 = "「Xin lỗi quý khách.」"
# 【双鉄】
# display as 雙鐵＆鈴
# JP: 「っ！？」\n「きゃっ！？」
1675 = "「!?」\n「Á!?」"
# 【ふかみ】
# display as 深美
