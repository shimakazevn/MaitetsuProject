1575 = "「Xin lỗi vì đã làm phiền cuộc trò chuyện của hai người. Đây là phần BBQ của quý khách ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1635 = "「Ồ.」"
# monologue
