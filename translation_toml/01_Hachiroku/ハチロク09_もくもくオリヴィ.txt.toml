1037 = "……Việc tiến vào ga Suối nước nóng Ohimitera, buổi lễ, và cả việc tiếp đón hành khách, đều được thực hiện vô cùng bài bản."
# monologue
# JP: 嬉しい反面、少し、寂しいような気もする。\nもう僕たちがいなくとも、湯医線はまわっていく。
2831 = "Vui mừng là vậy, nhưng mặt khác, tôi cũng cảm thấy có chút cô đơn. Dù không có chúng tôi, Tuyến Yui vẫn sẽ tiếp tục hoạt động."
# 【ハチロク】
# display as 八六
# JP: 「あ――」
1653 = "「A——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1710 = "「嗯」" 
# monologue
# JP: 衝動の無い滑り出し。\n凪がここまで成長したかと、少し、目頭が熱く
2579 = "Khởi hành trơn tru không một chút chấn động. Nghĩ đến việc Nagi đã trưởng thành đến mức này, khóe mắt tôi hơi cay cay."
# monologue
# JP: （ガクンッ！）
2866 = "（Kịch!）"
# 【ハチロク】
# display as 八六
# JP: 「きゃっ！！？」
1607 = "「Á!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「すずっ」
2128 = "「Suzu!」"
# monologue
# JP: 思わず手を伸ばし支える――\nが、一瞬だけの衝撃だった。
2590 = "Bất giác vươn tay ra đỡ lấy—— Nhưng, chấn động đó chỉ diễn ra trong một khoảnh khắc."
# monologue
# JP: 車内が、少しざわついてしまう。\n\x%l加減弁;#00ffc040;加減弁%l;#;扱いでもしくじっただけのこととは思うが……
2786 = "Trong xe, bỗng trở nên ồn ào một chút. Tôi nghĩ chắc chỉ là do lỡ tay khi thao tác \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#; thôi, nhưng mà……"
# 【ふかみ】
# display as 深美
# JP: 「みなさま、本日は御一夜鉄道バーベキュートレイン、\n『もくもくオリヴィ』へご乗車ありがとうございます」
2029 = "「Kính thưa quý khách, cảm ơn quý khách hôm nay đã lên chuyến tàu BBQ của Đường sắt Ohimitera, 『Olivy Nghi Ngút Khói』 ạ.」"
# monologue
# JP: \x%l車掌;#00ffc040;車掌%l;#;――ではない。ひとまずは\x%l客乗;#00ffc040;客乗%l;#;からの乗務となった、\nふかみの、これが初アナウンスだ。
2824 = "Không phải \\x%l車掌;#00ffc040;Trưởng tàu%l;#;——. Trước mắt bắt đầu làm nhiệm vụ từ vị trí \\x%l客乗;#00ffc040;Nhân viên phục vụ trên tàu%l;#;, đây là lần phát thanh đầu tiên của Fukami."
# monologue
# JP: タイミングがいい。ざわめきが一瞬に消え失せて、\nみなの注意がアナウンスに向く。
2661 = "Thời điểm rất tốt. Sự ồn ào biến mất trong nháy mắt, sự chú ý của mọi người đều hướng về bài phát thanh."
# 【ふかみ】
# display as 深美
# JP: 「この列車、いままでの『もくもくハチロク号』とは\n違っています。いったい、どこが変わったか」
1523 = "「Chuyến tàu này, có điểm khác biệt so với 『Tàu Hachiroku Nghi Ngút Khói』 từ trước đến nay ạ. Rốt cuộc, đã thay đổi ở đâu vậy nhỉ?」"
# 【ちびっこ】
# display as 小孩
# JP: 「きかんしゃー！　きかんしゃがハチロクから、\nきゅうごうきかんしゃにかわったのー」
1938 = "「Đầu máy xe lửa~! Đầu máy xe lửa từ Hachiroku, đã đổi thành Đầu máy số 9 rồi ạ~」"
# 【ふかみ】
# display as 深美
# JP: 「大正解！　すごい、とってもくわしいね～！\nＳＬポイント、１、あげちゃうね？」
1809 = "「Chính xác! Giỏi quá, em biết rõ ghê nha~! Chị tặng em 1 điểm SL nhé?」"
# monologue
