2079 = "「Dùng tiền của mình mua vé, rồi hai vợ chồng cùng đi du lịch. Nếu vậy thì, cũng chẳng cần phải e ngại ánh mắt của ai cả.」"
# 【ハチロク】
# display as 鈴
# JP: 「かしこまりました。うふふっ！\nだんなさま、双鉄さま」
1874 = "「Em hiểu rồi ạ. Ufufu!\nPhu quân, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。すず」
1735 = "「Ừm. Suzu.」"
# monologue
# JP: 名前を呼び、名前を呼ばれる。\nそれだけのことが、なんとしあわせな――
2597 = "Gọi tên nhau, và được gọi tên. Chỉ bấy nhiêu thôi, cũng đã hạnh phúc biết bao——"
# 【ふかみ】
# display as 深美
