2152 = "「雙鐵少爺，肉差不多該翻面了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　いや、まだだ」
1740 = "「嗯？沒，再等等」" 

# 【ハチロク】
# display as 鈴
# JP: 「左様ですか？」
2089 = "「還要再等一下嗎？」" 

# 【双鉄】
# display as 雙鐵
