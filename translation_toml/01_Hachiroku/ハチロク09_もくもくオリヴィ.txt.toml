[script]
# lines: 502 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わぉ！」
1616 = "「哇！」" 

# monologue
# JP: 目。栗色。ただでさえ大きいのに。\nさらに、こんなに丸くなる。
2524 = "奧莉薇那本就不小的，栗色眼睛，瞪得更是，如銅鈴一般。" 

# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;。伝わってくる。\n歓迎されてる。ものすごく。
2638 = "接到了，\\x%l共感;#00ffc040;共鳴%l;#;。是熱烈的，歡迎。" 

# 【ハチロク】
# display as 八六
# JP: 「今日のこの日を、ニイロクとともに迎えられること。\nこころより、嬉しく、誇らしく思います」
1533 = "「今日您能與二六一同前來，不勝欣喜，蓬蓽生輝」" 

# monologue
# JP: ハチロクは、\x%l共感;#00ffc040;共感%l;#;の意味、あんまりない。\n気持ちと言葉。ものすごく、いつも一緒だから。
2410 = "八六的話，\\x%l共感;#00ffc040;共鳴%l;#;其實，沒多少意義。她心裡的想法，和嘴上的話語，並無表裡不一。" 

# monologue
# JP: 澄ましてるけど、とっても素直。優等生。\nだから。少しだけニガテ。少しだけだけど。
2837 = "雖顯做作，卻很坦率，標準的優等生。所以，不是很好相處，不過也不算困難。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ニイロクもヒノモトナデシコなんだね～！\nいいな、クロカミ！　うらやましい！！」
1508 = "「二六也是大和撫子呀！黑髮真漂亮！好羨慕哦！！」" 

# 【ニイロク】
# display as 二六
# JP: 「…………」
1083 = "「……」" 

# monologue
# JP: オリヴィも、素直は素直。\nけど。感情の浅くまでしか\x%l共感;#00ffc040;共感%l;#;。許してない。
2525 = "奧莉薇雖也算坦率，但是，\\x%l共感;#00ffc040;共鳴%l;#;只開放到了，表層感情為止。" 

# monologue
# JP: それはもちろん。当たり前のこと。ごく普通のこと。\nだけど。気になる。何かを、隠していそうな気がする。
2836 = "雖然說這樣，是理所當然，再普通不過。但是，不禁讓我覺得，她似乎是在掩飾著什麼。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「さすが試験機、見た目もバッチリ、ビジンさん！\nアカイグージもゴジマンだね～！！」
1993 = "「真不愧是測試機，外表也一絲不苟，漂亮得不得了！赤井宮司肯定很為你驕傲吧！！」" 

# 【ニイロク】
# display as 二六
# JP: 「――」
1071 = "「——」" 

# monologue
# JP: 清春のこと。言うの。ずるい。
2536 = "她竟然在這時，提起清春。這叫我如何是好。" 

# monologue
# JP: 表情、動かないけど、動かせないけど、\nほっぺたがカって、あつくなる。
2606 = "我沒有，做出任何表情。雖然做不出表情，但臉頰，卻變得熱熱的。" 

# 【ニイロク】
# display as 二六
# JP: 「……当然のこと。そう作られている」
1108 = "「……那是自然。就是這樣設計的」" 

# monologue
# JP: だから。表情が動かせないのが。悔しい。恥ずかしい。\nお父さんたちの設計意図を、満たせない自分が情けない。
2637 = "所以這時，無法做出表情，讓我特別難過，也特別羞愧。無法達到父親們設計目標的要求的自己，實在讓人無地自容。" 

# monologue
# JP: それをわかっているはずなのに――\nオリヴィは、ぐいぐい自分に、踏み込んでくる。
2654 = "明明奧莉薇應該已經知道了這些情況——她卻還是，對我步步緊逼。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「今日はホータイはずしてきてくれてありがとー！\nホータイやっぱり、お客さんおどろかせちゃいそーだし」
2032 = "「謝謝你今天解開了繃帶！纏著繃帶果然還是會嚇到客人呀」" 

# 【ニイロク】
# display as 二六
# JP: 「無関係。自分は、添乗して見学するだけ。\n乗客対応には、出ない」
1610 = "「和那沒關係。我今天，只是來陪同學習的。並不會，去接待乘客」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっか！　お客さんのことカンケーなしに、\nお顔見せてくれたならもっとうれしい！」
1855 = "「懂了！就算不用接待客人，也願意露臉給奧莉薇看嗎？那奧莉薇就更高興啦！」" 

# 【ニイロク】
# display as 二六
# JP: 「顔を見せるためでも。ない」
1500 = "「也不是，特地露來給你看的」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、どーして？」
2095 = "「那——是為什麼呢？」" 

# monologue
# JP: 理由ならある。\n当然の理由が。
2725 = "自然是有原因的。理所當然的原因。" 

# 【ニイロク】
# display as 二六
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;。外燃機関。火の粉が飛ぶ」
1070 = "「\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;，外燃機，會濺出火星」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1701 = "「喔！」" 

# monologue
# JP: 右田双鉄。この男も、単純。きっと。
2487 = "右田雙鐵。這個男人，一定，也很單純。" 

# monologue
# JP: 人間には\x%l共感;#00ffc040;共感%l;#;が通じないからわからないけど、\n多分、根本的なところが、ハチロクと似てる気がする。
2829 = "雖然不能和人類\\x%l共感;#00ffc040;共鳴%l;#;讓我不能確信，但大概，在本質上，他和八六給我的感覺很接近。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。包帯は\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の服のような難燃性ではないものな。しかも、薄く長い故、危ないか」
1576 = "「原來如此。繃帶並不是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;制服那種阻燃材料。而且又薄又長，所以很危險啊」" 

# monologue
# JP: だけど有能。清春が絶賛するほどに。\n清春が、叶いっこ無い夢を見るほどに。
2364 = "不過頗有才幹，連清春都對他稱讚有加。甚至於，又喚起了清春心裡那無從實現的夢想。" 

# monologue
# JP: そうして自分は、清春のモノ。清春の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。\nだから、叶わなくても。清春の見る夢を見る。
2719 = "而我，是屬於清春的，清春的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。所以，即便無從實現，我也要和他一同努力。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどけど、キャブ内にヒノコなんてほとんどこないよ？\n窓あるし」
1603 = "「可是可是，真的很少有火星進到駕駛室裡哦？這還有窗戶呢」" 

# monologue
# JP: （こんこん）
2874 = "（敲打）" 

# 【ニイロク】
# display as 二六
# JP: 「う」
1647 = "「唔」" 

# monologue
# JP: オリヴィ。窓まで叩いてみせる。\n知ってる、そんなこと。添乗。何度もしてきたし。
2527 = "奧莉薇，還特地敲了敲窗戶。就算她不說，我也知道。這又不是，第一次在駕駛室陪同。" 

# monologue
# JP: けど。そこは。だって――
2459 = "可是，這種事，畢竟——" 

# 【赤井】
# display as 赤井
# JP: 「ニイロクは、心配性なんですよ。\n外に出るまでにも、長い時間をかけて見極めたくらい」
1510 = "「二六就是這麼小心謹慎。連出趟門都要花好長時間做好萬全準備」" 

# 【ニイロク】
# display as 二六
# JP: 「清春」
1963 = "「清春」" 

# monologue
# JP: 清春。やっぱり助けてくれる。\nわかってくれてる。
2684 = "清春，果然幫我打了圓場。果然還是他最懂我。" 

# monologue
# JP: そう。清春の言うとおり。\n『出ても平気』って。自分は、思った。
2657 = "是的，就像清春所說，我覺得，我做好了“可以放心出來”的準備。" 

# 【赤井】
# display as 赤井
# JP: 「ですから、よい機会をいただけたと思っています。\n本当に――ありがとう」
1885 = "「所以我覺得是大家給了我們一個這麼好的機會。我要對大家致以誠摯的謝意」" 

# 【ニイロク】
# display as 二六
# JP: 「清春……」
1962 = "「清春……」" 

# monologue
# JP: 清春が。右田双鉄に頭を下げる。\nだから。自分も。頭を下げる。
2680 = "清春對著右田雙鐵，躬身施禮。那我自然，也應該和他一起。" 

# monologue
# JP: 右田双鉄に。と。それから少し。少しだけ。\nオリヴィとハチロクにも。気持ち。少しは。
2496 = "向著，右田雙鐵。而後，稍稍地，稍稍地，也向奧莉薇和八六，略表心意。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こちらこそです。Ⅸ号の営業運転初日に添乗頂けること、\nなによりこころづよく、ありがたく感じています」
1865 = "「我們才該道謝。九號商業運營第一天就能請到二位陪同，我們心裡真是既感謝又放心」" 

# 【赤井】
# display as 赤井
# JP: 「そういっていただけると恐縮です、が――そのために、\n右田さんたちを\x%l客車;#00ffc040;客車%l;#;に追いやってしまうのは」
2077 = "「這實在不敢當。為此還占了右田先生你們的位子，讓你們只能去\\x%l客車;#00ffc040;客運車廂%l;#;那邊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いえ、何もなくとも\x%l客車;#00ffc040;客車%l;#;でこの時を迎えるつもりでした。\n僕とハチロクとの教導は、既に終わっていますから」
1951 = "「沒關係的。本來我們也是打算去\\x%l客車;#00ffc040;客運車廂%l;#;那邊的，畢竟我和八六的教練工作都已經完成了」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんは完璧です。湯医線に関して、\nわたくしがお教えできることは、もう何もございません」
1771 = "「奧莉薇真的是無可挑剔。就這條湯醫線而言，我已經再沒有什麼可以教她的了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「へっへーん！」
1754 = "「嘿嘿——嗯！」" 

# monologue
# JP: 嬉しさ。自信。誇らしさ。\n\x%l共感;#00ffc040;共感%l;#;が、まっすぐ、まっすぐ、伝えてくる。
2826 = "開心，自信，驕傲。這些都通過\\x%l共感;#00ffc040;共鳴%l;#;，直接地，毫不遮掩地，傳達了過來。" 

# monologue
# JP: ほんの少しだけ。走りたくなる。\nそんな気持ちに、させられそうになるくらい。
2764 = "被這樣的情緒感染，讓我都不禁覺得，稍微，有一點想要再次馳騁的感覺。" 

# 【ハチロク】
# display as 八六
# JP: 「それに……うふふっ、わたくしたち実は、\n\x%l客車;#00ffc040;客車%l;#;乗車を、とても楽しみにしております」
2011 = "「而且……嘻嘻，我們其實，也很期待在\\x%l客車;#00ffc040;客運車廂%l;#;搭車的感受」" 

# 【赤井】
# display as 赤井
# JP: 「それは、いったいどういう理由で？」
2074 = "「這又是為什麼呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしたちには、初めてのこととなりますから。\nバアベキウ列車に、乗車いたしますこと」
1562 = "「其實我們自己也是第一次乘坐ＢＢＱ列車」" 

# 【ニイロク】
# display as 二六
# JP: 「！」
1668 = "「啊！」" 

# monologue
# JP: すごい。これ。ほっぺた。勝手に赤くなる。\n右田双鉄と一緒に列車に乗れる。それだけで、こんなに。
2539 = "好厲害。她的，臉頰，不由自主地泛起了紅暈。只是和右田雙鐵一同搭車，竟會如此——" 

# monologue
# JP: こんな、好き。まっすぐな、好き。嬉しい。楽しい。\n――ちょっと、すごい。右田双鉄がうらやましくなる。
2549 = "如此地，喜歡。毫不掩飾地，喜歡。開心，快樂。——這也太，厲害了。我都有些羨慕右田雙鐵了。" 

# 【赤井】
# display as 赤井
# JP: 「ああ、それはそうですよね。\nいままではずっと、牽引でしたものね」
1695 = "「啊，說來也是。以前一直都是你們在駕駛機車牽引的嘛」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、ですから」
1939 = "「正是，所以……」" 

# monologue
# JP: あ。ハチロク。双鉄の服。きゅうってしてる。\nあれ。かわいい。うらやましい。
2499 = "啊。八六，緊緊地，牽住了雙鐵的衣角。這動作，好可愛。好羨慕。" 

# monologue
# JP: ……整備ボディをなくしたの。いまさらだけど――\nううん。そんなの。ほんとに、いまさら。
1031 = "……可我的整備體已經遺失了。事到如今——不，真是的，事到如今，還想這個幹什麼呢。" 

# 【ハチロク】
# display as 八六
# JP: 「どうぞ、\nご安全な運行を、よろしくおねがいいたしますね？」
2127 = "「那還麻煩各位安全行駛了」" 

# 【赤井】
# display as 赤井
# JP: 「それは、添乗の僕たちにではなく、\n担当\x%l機関士;#00ffc040;機関士%l;#;と\x%l機関助士;#00ffc040;機関助士%l;#;と、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に」
2075 = "「這可就不該是對陪同的我們說了，而是應該和負責駕駛的\\x%l機関士;#00ffc040;司機%l;#;、\\x%l機関助士;#00ffc040;司爐%l;#;以及\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;說才對吧」" 

# 【ハチロク】
# display as 八六
# JP: 「あら、うふふ。左様ですね」
1608 = "「呀，嘻嘻。您說得沒錯」" 

# 【赤井】
# display as 赤井
# JP: 「無論、万一のことがあれば、\n\x%l投炭;#00ffc040;投炭%l;#;くらいはお手伝いできるかとは思います、が――」
1984 = "「當然，若是有萬一的情況，幫著幫個忙\\x%l投炭;#00ffc040;加煤%l;#;我還是沒問題的，不過——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「マンイチなんておこさないよー！\nそのために！　ばっちり準備してきたんだから！」
1479 = "「不會有什麼萬一的！奧莉薇已經都做好充分準備啦！」" 

# 【凪】
# display as 凪
# JP: 「オイル、走行分点検完了ばい！！」
2047 = "「走行部的油路清查好咧！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「灰箱きれーに掃除してきた！\nどこもかしこも、Ⅸ号機関車、ピッカピカ！」
1966 = "「灰箱已經打掃得乾乾淨淨啦！九號機車從頭到腳都乾乾淨淨啦！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
1713 = "「嗯！」" 

# monologue
# JP: 戻ってきた。蓑笠と右田妹。自分の目には、\n\x%l機関士;#00ffc040;機関士%l;#;としては、右田妹のほうが少し上等に見える。
2737 = "蓑笠和右田妹妹，回來了。在我看來，作為\\x%l機関士;#00ffc040;司機%l;#;，右田妹妹更合適一些。" 

# monologue
# JP: けど、交代制でやるって聞いた。\n初の営業運転の――記念の今日が、蓑笠\x%l機関士;#00ffc040;機関士%l;#;だとも。
2365 = "不過，聽說她們是互換排班的。只是第一次商業運營——今天這個值得紀念的日子是由蓑笠擔任\\x%l機関士;#00ffc040;司機%l;#;。" 

# monologue
# JP: （ふしぎ。けど――。右田妹。納得してるみたい。\n実際に。チームワークも。すごくいい）
2856 = "（不可思議。不過——右田妹妹，似乎也接受了。這團隊合作，著實，不容小覷）" 

# monologue
# JP: 右田双鉄の顔も、安心してるみたい。\nハチロクの手。まだきゅって。右田のシャツを持ったまま。
2586 = "從右田雙鐵的表情看，他似乎也很放心。而八六的手，仍然緊緊地，牽著右田的衣角。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、なにかあるか？」
