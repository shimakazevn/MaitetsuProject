1995 = "「Đúng là Aka-ou có khác.\nNhìn bề ngoài thôi đã thấy khác hẳn mấy\nloại thịt bò bình thường rồi.」"

# monologue
# JP: 上等な肉の赤さと脂の白さとが、\nピーマンの緑、とうもろこしの黄に引き立てられる。
2353 = "Sắc đỏ của thịt thượng hạng cùng sắc trắng\ncủa lớp mỡ,\nđược tôn lên bởi màu xanh của ớt chuông,\nvà màu vàng của ngô."

# monologue
# JP: スタンダードな取り合わせ故、質の高さを一際感じる。
2643 = "Sự kết hợp vô cùng tiêu chuẩn, nên càng\ncảm nhận rõ hơn chất lượng tuyệt hảo của\nnó."

# 【ふかみ】
# display as 深美
# JP: 「うふふ。お目が高いですね、お客様。\nお肉は阿曽から特別に取り寄せているんです」
1632 = "「Ufufu. Quý khách thật tinh mắt.\nThịt này được chúng tôi đặc biệt đặt mua\ntừ Aso đấy ạ.」"

# monologue
# JP: ふかみは僕らに、客室乗務員として接してくれている。\nならば僕らも当然に、一乗客として楽しもう。
2669 = "Fukami đang tiếp đón chúng tôi, với tư\ncách là một nhân viên phục vụ trên tàu.\nVậy thì đương nhiên, chúng tôi cũng nên\ntận hưởng với tư cách là những hành khách\nbình thường."

# 【双鉄】
# display as 雙鐵
# JP: 「『もくもくハチロク号』でも、\nこうした、串焼き形式だったのですか？」
1498 = "「Hồi 『Tàu Hachiroku Nghi Ngút Khói』,\ncũng là hình thức thịt xiên nướng như thế\nnày sao?」"

# 【ふかみ】
# display as 深美
# JP: 「いえ、『もくもくハチロク号』のときは、\nトングで肉や野菜を挟んで焼くスタイルでした」
1493 = "「Dạ không, hồi 『Tàu Hachiroku Nghi Ngút\nKhói』,\nlà phong cách dùng kẹp gắp thịt và rau củ\nlên nướng ạ.」"

# monologue
# JP: 初乗務だというのに、十年選手のような案内。
2656 = "Rõ ràng là lần đầu tiên làm nhiệm vụ, vậy\nmà lại hướng dẫn điêu luyện như một nhân\nviên đã có mười năm kinh nghiệm."

# monologue
# JP: 少しでも乗務員が不安なところを見せてしまえば\n乗客はその何倍も不安になると、熟知している対応だ。
2541 = "Nếu nhân viên phục vụ chỉ để lộ ra một\nchút bất an,\nthì hành khách sẽ cảm thấy bất an gấp\nnhiều lần, đó là một cách ứng xử cho thấy\ncô bé rất hiểu rõ điều này."

# 【ハチロク】
# display as 鈴
# JP: 「それがどうして、串焼きの形に？」
2123 = "「Thế tại sao, lại đổi thành hình thức thịt\nxiên nướng vậy?」"

# 【ふかみ】
# display as 深美
# JP: 「大きな理由はふたつです。串焼きの方がどなたにも\n簡単にバーベキューをお楽しみにいただけることと」
1497 = "「Có hai lý do chính ạ. Hình thức xiên\nnướng sẽ giúp bất cứ ai\ncũng có thể dễ dàng tận hưởng BBQ, và——」"

# 【ハチロク】
# display as 鈴
# JP: 「ことと？」
2085 = "「Và?」"

# 【ふかみ】
# display as 深美
# JP: 「Ⅸ号機関車の出身地に敬意をはらってです。\nこの方がもっと、[メリケン,1]冥国って感じ、しませんか？」
1606 = "「Và để bày tỏ sự tôn kính với quê hương\ncủa Đầu máy số 9 ạ.\nThế này sẽ mang lại cảm giác Minh Quốc\n(Nước Mỹ) hơn, quý khách có thấy vậy không\nạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、確かに」
1579 = "「Ra là vậy, đúng là thế thật.」"

# 【ふかみ】
# display as 深美
# JP: 「お客様のストーブはあちらです。\nみなさまで、どうぞお譲りあってご利用ください」
1560 = "「Bếp lò của quý khách ở đằng kia ạ.\nXin mọi người hãy nhường nhịn nhau cùng sử\ndụng nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう」
2031 = "「Cảm ơn.」"

# monologue
# JP: なるほど、串焼きであればストーブの上をフルに使える。\n順番待ちをさせずとも、譲り合ってで事足りるのか。
2435 = "Ra là vậy, nếu là thịt xiên nướng thì có\nthể sử dụng toàn bộ không gian trên bếp\nlò.\nKhông cần phải bắt mọi người xếp hàng chờ\nđợi, chỉ cần nhường nhịn nhau là đủ."

# 【双鉄】
# display as 雙鐵
# JP: 「すず。いくか」
2131 = "「Suzu. Đi thôi.」"

# 【ハチロク】
# display as 鈴
# JP: 「はい。お供いたします。双鉄さま」
1794 = "「Vâng. Em sẽ đi cùng ngài, ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お供という程の距離でもなかろう」
1822 = "「Khoảng cách ngắn thế này thì đâu đến mức\nphải gọi là đi cùng.」"

# monologue
# JP: 発車時こそは怪しかったが、御一夜－湯医は平坦路線。\n途中停車もないうえに、Ⅸ号機関車は速度も出ない。
2698 = "Tuy lúc xuất phát có hơi đáng lo, nhưng\nđoạn Ohimitera - Yui là một tuyến đường\nbằng phẳng.\nHơn nữa, giữa chừng không hề dừng đỗ, Đầu\nmáy số 9 cũng không chạy với tốc độ cao."

# monologue
# JP: ゆえ、揺れはほとんど感じない。\nオリヴィの\x%l保線;#00ffc040;保線%l;#;指導の効果も出ているのかもしれん。
2632 = "Do đó, hầu như không cảm thấy rung lắc.\nCó lẽ cũng nhờ hiệu quả từ sự hướng dẫn \\x%l保線;#00ffc040;bảo trì đường ray%l;#;\ncủa Olivy."

# 【ハチロク】
# display as 鈴
# JP: 「あら、さっきクイズにご正解なされた」
1690 = "「A, là em bé vừa nãy trả lời đúng câu đố\nkìa.」"

# 【ちびっこ】
# display as 小孩
# JP: 「わ！　ハチロクー！！」
1622 = "「Oa! Hachiroku kìa~!!」"

# 【ハチロク】
# display as 鈴
# JP: 「まぁ、わたくしのことをご存じでいらっしゃるのですね。\nありがとうございます」
1623 = "「Oa, em biết chị sao.\nCảm ơn em nhé.」"

# 【母親】
# display as 母親
# JP: 「あ、ごめんなさいね？　お仕事中に」
1681 = "「A, xin lỗi hai người nhé? Đang trong giờ\nlàm việc mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いえ、今日はプライベートです。\n仕事中に、さすがに肉は焼きません」
1944 = "「Không sao đâu, hôm nay chúng tôi đi với\ntư cách cá nhân.\nĐang trong giờ làm việc thì sao có thể\nnướng thịt được chứ.」"

# 【母親】
# display as 母親
# JP: 「あら、それじゃもっと申し訳ないわね」
1697 = "「Ây da, vậy thì càng xin lỗi hai người\nhơn.」"

# 【ちびっこ】
# display as 小孩
# JP: 「わ！　みぎたそうてつきかんしもー！」
1618 = "「Oa! Cả bác lái tàu Migita Soutetsu nữa\nkìa~!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと」
2084 = "「Ồ.」"

# monologue
# JP: 驚いた。僕のことまで知ってるのは、\nかなり珍しいちびっこファン――ああ。
2615 = "Ngạc nhiên thật đấy. Biết cả tôi thì,\nđúng là một fan nhí khá hiếm thấy——A."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――君はよく、踏切やさんのところで\n手をふってくれているこか」
1925 = "「Ra là vậy——Cháu là cô bé thường hay vẫy\ntay\nở chỗ cửa hàng gần trạm chắn tàu đúng\nkhông?」"

# 【ハチロク】
# display as 鈴
# JP: 「まぁ！　いわれてみましたら」
1636 = "「Oa! Nhắc mới nhớ.」"

# 【ちびっこ】
# display as 小孩
# JP: 「わかるの！！？」
1550 = "「Hai người nhận ra cháu ạ!!?」"

# monologue
# JP: おちびさんの瞳がきらきら輝く。
2556 = "Đôi mắt của cô bé sáng long lanh."

# monologue
# JP: あるいは彼……いや、彼女か？　には、\n『ＳＬの機関士さん』は、憧れの存在であるのかもしれん。
2373 = "Hoặc có thể đối với cậu bé……không, cô bé\nchứ?\n『Bác lái tàu SL』, có lẽ là một sự tồn tại\nđáng ngưỡng mộ."

# 【双鉄】
# display as 雙鐵
# JP: 「名前を、教えてもらってもいいかな」
1600 = "「Có thể cho bác biết tên cháu được không?」"

# 【ちびっこ】
# display as 小孩
# JP: 「ゆう！　みさと、ゆう」
1867 = "「Yuu! Misato, Yuu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆうちゃんか」
1815 = "「Là bé Yuu à.」"

# monologue
# JP: 名前を聞けば、性別がわかるかと思ったが――\nゆう、は男女どちらでもありそうだ。
2621 = "Cứ tưởng hỏi tên là sẽ biết giới tính——\nNhưng Yuu, có vẻ dùng cho cả nam lẫn nữ\nđều được."

# monologue
# JP: まぁ、どちらであっても失礼にならぬよう、\n言葉を選べばすむことではあるが。
2807 = "Mà thôi, dù là giới tính nào thì chỉ cần\nchọn từ ngữ cẩn thận\nđể không thất lễ là được."

# 【双鉄】
# display as 雙鐵
# JP: 「わかる。というか、君は有名人だ。\n今日は、わんちゃんは一緒じゃないのか」
1983 = "「Bác nhận ra chứ. Phải nói là, cháu rất\nnổi tiếng đấy.\nHôm nay, bạn cún không đi cùng cháu sao?」"

# 【ちびっこ】
# display as 小悠
# JP: 「うん、ポチはおうちでおるすばーん」
1729 = "「Vâng ạ, Pochi đang ở nhà trông nhà rồi~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならこんど、わんちゃんと一緒にレールショップに\n遊びに来てくれ、きっと、れいなたちもよろこぶ」
2097 = "「Vậy lần tới, hãy cùng bạn cún đến cửa\nhàng đường sắt\nchơi nhé, chắc chắn Reina và mọi người sẽ\nrất vui đấy.」"

# 【ちびっこ】
# display as 小悠
# JP: 「わーい！　ぜったいにいくー！」
1619 = "「Hoan hô! Cháu nhất định sẽ đi~!」"

# 【双鉄】
# display as 雙鐵
# JP: 「が、今は肉を焼こう。せっかくのバーベキュー列車。\n肉を焼かずに下りてしまっては、もったいない」
2104 = "「Nhưng mà, bây giờ thì nướng thịt thôi.\nHiếm khi mới có chuyến tàu BBQ.\nNếu xuống tàu mà chưa nướng thịt thì phí\nlắm.」"

# 【ちびっこ】
# display as 小悠
# JP: 「わかったー！　やくー！！」
1788 = "「Cháu hiểu rồi~! Nướng thôi~!!」"

# monologue
# JP: （おお）
2868 = "（Ồ）"

# monologue
# JP: ゆうちゃんの串は、小さな作りだ。
2562 = "Xiên thịt của bé Yuu, được làm nhỏ hơn."

# monologue
# JP: しかも、串そのものも竹製かなにか――\n僕らの、金属のものとはちがう。
2712 = "Hơn nữa, bản thân que xiên cũng làm bằng\ntre hay gì đó——\nKhác với que kim loại của chúng tôi."

# 【ちびっこ】
# display as 小悠
# JP: 「ママー、やきたいー」
1806 = "「Mẹ ơi~, con muốn nướng~」"

# 【母親】
# display as 母親
# JP: 「はいはい。じゃ、一緒に焼きましょうねー」
1778 = "「Rồi rồi. Vậy thì, cùng nướng nhé~」"

# 【ちびっこ】
# display as 小悠
# JP: 「わーい」
1799 = "「Hoan hô~」"

# monologue
# JP: ……メニュー面での見直しは、\n永山夫人のご監督とは聞いていたが、これも流石だ。
1048 = "……Nghe nói việc xem xét lại thực đơn\nlà do phu nhân Nagayama giám sát, nhưng\nquả thật rất ấn tượng."

# monologue
# JP: 事故の確率を少しでも下げる。\nそんな配慮が、車両内にも皿の上にも満ち満ちている。
2800 = "Giảm thiểu nguy cơ xảy ra tai nạn dù chỉ\nlà một chút.\nSự chu đáo đó, tràn ngập từ trong toa xe\ncho đến cả trên đĩa ăn."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま？　\nお肉、そろそろひっくりかえしてもよろしいのでは？」
2152 = "「Ngài Soutetsu?\nThịt, cũng sắp lật được rồi đúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　いや、まだだ」
1740 = "「Ừm? Không, vẫn chưa được đâu.」"

# 【ハチロク】
# display as 鈴
# JP: 「左様ですか？」
2089 = "「Vậy sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。真闇姉にならったことがある。牛肉の返し時は、\nまだ焼かれてない側の脂が、ふつふつしだす時だと」
1702 = "「Ừ. Anh từng được chị Mayami dạy. Thời\nđiểm lật thịt bò,\nlà khi lớp mỡ ở mặt chưa nướng, bắt đầu\nsủi bọt lăn tăn.」"

# 【ハチロク】
# display as 鈴
# JP: 「焼かれていない側の脂が、ふつふつ？　あ――」
1949 = "「Lớp mỡ ở mặt chưa nướng, sủi bọt lăn tăn\nạ? A——」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう、こうなるのだ」
1950 = "「Đúng vậy, sẽ trở nên như thế này.」"

# monologue
# JP: 湯が湧いたように、小さな泡がぷくりと立つ。\nここをもう少し――もう少しだけ待ち――
2567 = "Những bọt bong bóng nhỏ nổi lên như nước\nsôi.\nChỗ này thêm một chút nữa——chỉ cần đợi\nthêm một chút nữa thôi——"

# monologue
# JP: （くるっ！）
2871 = "（Lật!）"

# 【ハチロク】
# display as 鈴
# JP: 「まぁ！」
# 1616 = "「哇！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。はじめてにしては上出来だろう」
1709 = "「Ừm. Lần đầu nướng mà được thế này là quá\ntốt rồi.」"

# monologue
# JP: とうもろこしなど焦げてはいるが、\nまぁまぁそれも、こうしたものの楽しみだ。
2834 = "Tuy ngô có hơi cháy một chút,\nnhưng mà thôi, đó cũng là thú vui của\nnhững món nướng thế này."

# monologue
# JP: すずのわくわくした目を見ていれば、\nあっという間に、裏面もこんがり焼きあがる。
2715 = "Nhìn vào đôi mắt háo hức của Suzu,\nchỉ trong chớp mắt, mặt sau cũng đã chín\nvàng."

# 【双鉄】
# display as 雙鐵
# JP: 「さて、席に戻って食べるとしよう」
2112 = "「Nào, quay lại chỗ ngồi và ăn thôi.」"

# 【ハチロク】
# display as 鈴
# JP: 「はい、双鉄さま――まぁ！\n見てください、わたくしたちのテエブルの上」
1797 = "「Vâng, ngài Soutetsu——Oa!\nNgài nhìn kìa, trên bàn của chúng ta.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、\nドリンクはこのタイミングでサーブされるのか」
1698 = "「Ồ,\nđồ uống lại được phục vụ vào đúng lúc này\nsao.」"

# monologue
# JP: クマ焼酎と、クマ川のおいしい水。\nその上、ハチロクのテーブルには――
2599 = "Rượu shochu Kuma, và nước suối ngon ngọt\ncủa sông Kuma.\nHơn nữa, trên bàn của Hachiroku còn có——"

# 【ハチロク】
# display as 鈴
# JP: 「うふふ、おいしそうな[れきせいたん,2]瀝青炭です。形もまことに美しく。\nまさに、黒いダイヤでございますね」
1751 = "「Ufufu, là than bitum trông rất ngon mắt\nạ. Hình dáng cũng thực sự rất đẹp.\nQuả đúng là, những viên kim cương đen\nnhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「実に行き届いたサービスだな」
2088 = "「Quả là một dịch vụ vô cùng chu đáo.」"

# monologue
# JP: ハチロクも人間の食事はできるが、付き合い程度だ。
2418 = "Hachiroku cũng có thể ăn thức ăn của con\nngười, nhưng chỉ ở mức độ xã giao thôi."

# monologue
# JP: 希望メニューの備考欄に『可能であれば石炭を』と\n書いておいたのも、きちんと配慮してもらえた。
2355 = "Trong mục ghi chú của thực đơn mong muốn,\ntôi có viết 『Nếu được thì xin hãy chuẩn bị\nthan đá』,\nvà họ đã thực sự lưu tâm đến điều đó."

# 【ハチロク】
# display as 鈴
# JP: 「あの……だんなさま？」
2072 = "「À ừm……phu quân?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1737 = "「嗯？」" 

# 【ハチロク】
# display as 鈴
# JP: 「その……わたくし普段は、大きな石炭を、\nそのまままるごといただくことを好むのですが」
2145 = "「Chuyện là……bình thường, em thích ăn cả\nkhối than lớn\nđể nguyên như vậy hơn, nhưng mà...」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。アイスピックなら持っているぞ」
1688 = "「À. Anh có mang theo dụng cụ đập đá đây.」"

# 【ハチロク】
# display as 鈴
# JP: 「まぁ！」
# 1616 = "「哇！」" 

# monologue
# JP: すずがほっとした笑みを浮かべる。\n相変わらずのおねだり下手だ。
2815 = "Suzu nở một nụ cười nhẹ nhõm.\nVẫn vụng về trong việc vòi vĩnh như mọi\nkhi."

# monologue
# JP: この程度、すずがして欲しいと望むなら、\n100でも200でも砕いてやるのに。
2543 = "Nếu chỉ ở mức độ này, nếu Suzu mong muốn,\ndù là 100 hay 200 khối anh cũng sẽ đập nát\ncho em."

# 【ハチロク】
# display as 鈴
# JP: 「それでは――ひとつだけ。\nガッガッとしていただけますか？」
2110 = "「Vậy thì——chỉ một khối thôi ạ.\nNgài có thể đập nhỏ ra giúp em được\nkhông?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おやすい御用だ」
1982 = "「Dễ như trở bàn tay.」"

# monologue
# JP: オリヴィのため、毎日やっていることだ。\nいい加減コツも身についてきた。
2695 = "Vì Olivy, ngày nào tôi cũng làm việc này.\nNên cũng đã nắm được chút bí quyết rồi."

# monologue
# JP: （がっ！　がっ！）
2867 = "（Cộc! Cộc!）"

# 【ハチロク】
# display as 鈴
# JP: 「まぁ。あざやかなお手並みですこと」
1626 = "「Oa. Kỹ năng thật là điêu luyện.」"

# 【双鉄】
# display as 雙鐵
# JP: 「褒めてもらって、光栄だ」
1894 = "「Được khen ngợi, thật là vinh hạnh.」"

# monologue
# JP: 砕いた石炭を、元あった皿の上へと戻せば――
2605 = "Đặt những mảnh than đã đập nhỏ trở lại\nchiếc đĩa ban đầu——"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、これは黒いダイヤだな。\n遠目でならば、キャビアのようにも見えそうだ」
1580 = "「Ra là vậy, đây đúng là kim cương đen.\nNhìn từ xa, trông cũng giống như trứng cá\nmuối caviar vậy.」"

# 【ハチロク】
# display as 鈴
# JP: 「きゃびあ。でございますか？」
1850 = "「Trứng cá muối caviar. Sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、幼いころに食べたきりだが。\n本当に小さな瓶に入っていて、こう――」
1859 = "「Anh cũng chỉ mới ăn hồi còn nhỏ thôi.\nNó được đựng trong một chiếc lọ thật nhỏ,\nvà thế này——」"

# monologue
# JP: ああ、そうだ。\n思い立ったが吉日と小さなスプーンを一つ借りる。
2501 = "À, đúng rồi.\nNghĩ là làm, tôi bèn đi mượn một chiếc\nthìa nhỏ."

# 【双鉄】
# display as 雙鐵
# JP: 「こうして、スプーンに乗せ――ほら、あーん」
1554 = "「Thế này, xúc lên thìa——Nào, a——」"

# 【ハチロク】
# display as 鈴
# JP: 「あ――はい。あーん」
1656 = "「A——Vâng. A——」"

# monologue
# JP: はむりと、すずがスプーン上の石炭を口におさめる。
2813 = "Suzu há miệng, ngậm lấy phần than trên\nthìa."

# monologue
# JP: こりこりと、普段とはまるでちがった――\nまるでナッツでも齧っているかのような、上品な音。
2406 = "Lạo xạo, hoàn toàn khác với bình thường——\nMột âm thanh thanh tao, giống như đang\nnhai các loại hạt vậy."

# 【ハチロク】
# display as 鈴
# JP: 「ああ――」
# 1653 = "「啊——」" 

# monologue
# JP: 実に満足そうな一息。\n見て聞いているそれだけで、僕まで満腹できそうなほど。
2816 = "Một tiếng thở dài vô cùng mãn nguyện.\nChỉ cần nhìn và nghe thôi, cũng đủ khiến\ntôi cảm thấy no bụng rồi."

# 【ハチロク】
# display as 鈴
# JP: 「おいしうございます。食べごたえではまるごとですが、\n味わいは、こちらの方が感じられますね」
1989 = "「Ngon lắm ạ. Về độ đã miệng thì để nguyên\ncả khối sẽ hơn,\nnhưng về hương vị, thì ăn thế này lại cảm\nnhận rõ hơn nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。では、もう一口を」
2080 = "「Vậy sao. Thế thì, thêm một miếng nữa\nnhé.」"

# 【ハチロク】
# display as 鈴
# JP: 「まぁ！　わたくしったら食べさせていただくばかりで。\n今度は、さ？　双鉄さま？　さめないうちに――あーん」
1621 = "「Oa! Cứ để ngài đút cho em ăn mãi.\nLần này, đến lượt ngài nhé? Ngài Soutetsu?\nNhân lúc còn chưa nguội——a——」"

# 【双鉄】
# display as 雙鐵
# JP: 「すず。この串は、横からくわえて抜き取るものだ。\nもう少し、角度を変えてくれるか？」
2132 = "「Suzu. Xiên thịt này, phải ngậm từ bên\nhông rồi rút ra.\nEm có thể thay đổi góc độ một chút được\nkhông?」"

# 【ハチロク】
# display as 鈴
# JP: 「左様でしたか。でしたら、このような塩梅ですか？」
2081 = "「Là vậy sao ạ. Nếu vậy, để như thế này đã\nđược chưa ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ――――あむっ――うん！」
1644 = "「Ừm――――Amu~――Ừm!」"

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ！　おいしそうなお顔です」
1743 = "「Ufufu! Khuôn mặt trông có vẻ ngon miệng\nquá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「すずも、相当おいしそうなお顔をしているぞ？\nほら、あーん」
2129 = "「Suzu cũng, đang có khuôn mặt trông rất\nngon miệng đấy nhé?\nNào, a——」"

# 【ハチロク】
# display as 鈴
# JP: 「うふふふふっ、あーーん――――ぱくっ！」
1630 = "「Ufufufu, a——n――――Paku~!」"

# monologue
# JP: ……幸せに満ち、腹も満ち、喉の乾きも満たされる。\n僕らが\x%l罐屋;#00ffc040;罐屋%l;#;のせいかもしれんが、車内もまったく暑くない。
1042 = "……Tràn ngập hạnh phúc, cái bụng cũng no,\nvà cơn khát cũng được thỏa mãn.\nCó lẽ do chúng tôi là \\x%l罐屋;#00ffc040;thợ máy%l;#;, nên trong\nxe hoàn toàn không thấy nóng chút nào."

# monologue
# JP: これは、快適――\n実に楽しい、列車の旅だ。
2726 = "Thật là, thoải mái——\nMột chuyến đi bằng tàu hỏa, thực sự rất\nthú vị."

# 【ハチロク】
# display as 鈴
# JP: 「……運転台の小さな窓から見える景色と――\nまるで、違って見えますね」
1098 = "「……Cảnh sắc nhìn từ ô cửa sổ nhỏ của buồng\nlái——\nTrông hoàn toàn khác biệt nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1912 = "「Ừ.」"

# monologue
# JP: ただ、広い。\n無限の空を、まだ青い稲穂がすっくと伸びて支えている。
2350 = "Vô cùng, rộng lớn.\nNhững bông lúa còn xanh mướt vươn thẳng\nlên, nâng đỡ bầu trời vô tận."

# monologue
# JP: 狭く切り取られるキャブの窓から見るときは、\n単なる、田んぼの光景なのだが――
2587 = "Khi nhìn từ ô cửa sổ buồng lái bị cắt hẹp,\nthì đó chỉ đơn thuần, là khung cảnh của\nmột cánh đồng lúa——"

# 【双鉄】
# display as 雙鐵
# JP: 「田園、だな。実に見事だ」
2083 = "「Đúng là, điền viên nhỉ. Thực sự rất tuyệt\nvời.」"

# 【ハチロク】
# display as 鈴
# JP: 「わたくしたちは、\nこのように美しいところを走っていたのですね」
1581 = "「Chúng ta,\nđã luôn chạy qua những nơi xinh đẹp như\nthế này nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1710 = "「嗯」" 

# monologue
# JP: そして、心が満ちていく。
2611 = "Và rồi, trái tim dần được lấp đầy."

# monologue
# JP: この幸せを、鉄道の旅の楽しさを――\nもっと伸ばして繋げたい、味わいたいと、つくづく思う。
2801 = "Niềm hạnh phúc này, niềm vui của những\nchuyến đi bằng tàu hỏa này——\nTôi thực sự muốn được kéo dài và kết nối\nnó hơn nữa, muốn được thưởng thức nó nhiều\nhơn nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「[おこば,1]小畑の車窓も見事だったが、あの\x%lスイッチバック;#00ffc040;スイッチバック%l;#;などは、\nむしろ運転台からの方がおもしろかろうな」
1832 = "「Cảnh sắc ngoài cửa sổ ở Okoba cũng rất\ntuyệt vời, nhưng mà đoạn \\x%lスイッチバック;#00ffc040;đường vòng zigzag%l;#;\nđó,\nthà nhìn từ buồng lái có khi lại thú vị\nhơn.」"

# 【ハチロク】
# display as 鈴
# JP: 「で、ございますね。こちらもこれで大区切りですし、\nわたくしたちの、[おこば,1]小畑越えの習熟運転も楽しみです」
2002 = "「Đúng vậy nhỉ. Chuyến đi này cũng coi như\nlà một dấu mốc lớn rồi,\nem cũng rất mong chờ chuyến lái tập huấn\nvượt đèo Okoba của chúng ta.」"

# 【双鉄】
# display as 雙鐵
# JP: 「走ることが、やはり一番の楽しみなのだな。すずは」
1931 = "「Việc chạy tàu, quả nhiên vẫn là niềm vui\nlớn nhất nhỉ. Đối với Suzu.」"

# 【ハチロク】
# display as 鈴
# JP: 「いいえ、双鉄さま。\n今ではもう、残念ながら二番目です」
2154 = "「Không đâu, ngài Soutetsu.\nBây giờ thì, thật đáng tiếc nhưng nó đã\nrơi xuống vị trí thứ hai rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1737 = "「嗯？」" 

# monologue
# JP: すずの瞳が、僕を捉える。
2817 = "Đôi mắt của Suzu, bắt lấy ánh nhìn của\ntôi."

# 【ハチロク】
# display as 鈴
# JP: 「一番は――こうして、あなたと過ごす時間が」
1927 = "「Điều tuyệt vời nhất là——khoảng thời gian\nđược ở bên ngài như thế này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1668 = "「啊！」" 

# monologue
# JP: 妻だというのに、毎日毎晩見ている顔だというのにけれど、\nどうしようもなく見とれてしまう。
2531 = "Dù đã là vợ chồng, dù là khuôn mặt tôi vẫn\nnhìn thấy mỗi ngày mỗi đêm,\nnhưng tôi vẫn không thể kìm được mà say\nđắm ngắm nhìn."

# monologue
# JP: このままいれば、自制心さえなくなりそうで、\nなかば無理やり、視線をそらして話を変える。
2804 = "Cứ thế này, có lẽ tôi sẽ mất đi cả sự tự\nchủ mất,\nnên tôi đành phải gượng ép, đánh trống\nlảng và đổi chủ đề."

# 【双鉄】
# display as 雙鐵
# JP: 「そのっ――帝都ではどうだった？\n帝鉄時代は、どんな見事な車窓を見ていた？」
2028 = "「Cái đó——ở Đế Đô thì sao?\nThời Đường sắt Hoàng gia, em đã từng nhìn\nthấy những cảnh sắc tuyệt vời nào qua cửa\nsổ?」"

# 【ハチロク】
# display as 鈴
# JP: 「むぅ。\n……帝鉄時代、でございますか？」
1645 = "「Ưm.\n……Thời Đường sắt Hoàng gia, sao ạ?」"

# monologue
# JP: ほんの一瞬、可愛く片頬をふくらせて。\nけれどもすずは、すぐに真面目に答えてくれる。
2530 = "Chỉ trong một khoảnh khắc, cô ấy phồng một\nbên má lên trông thật đáng yêu.\nNhưng ngay sau đó, Suzu đã nghiêm túc trả\nlời tôi."

# 【ハチロク】
# display as 鈴
# JP: 「わたくしは――本線の中の本線。\n[とうかいどう,2]東峡道本線ばかりを走っておりましたものですので」
1875 = "「Em thì——chỉ chạy trên tuyến chính của các\ntuyến chính.\nVì em chỉ toàn chạy trên Tuyến chính\nToukaido thôi nên...」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1710 = "「嗯」" 

# 【ハチロク】
# display as 鈴
# JP: 「忙しいばかりでしたが、それでも覚えておりますのは、\n[ゆい,1]由衣のあたりのお海の景色と、冨士のお山と――」
2118 = "「Dù chỉ toàn là bận rộn, nhưng những gì em\ncòn nhớ được là,\ncảnh biển quanh vùng Yui, và núi Phú Sĩ,\ncùng với——」"

# monologue
# JP: そこまでいって、ぎくりとすずが固まってしまう。\nああ、そうなのかと、僕も感じる。
2415 = "Nói đến đó, Suzu bỗng giật mình cứng đờ\nngười lại.\nA, ra là vậy, tôi cũng lờ mờ nhận ra."

# monologue
# JP: ……あの日、父が見せようとしてくれた景色は。\nそれほど見事なものであるのか。
1053 = "……Cảnh sắc mà ngày hôm đó, cha đã muốn cho\ntôi xem.\nTuyệt vời đến mức đó sao."

# 【双鉄】
# display as 雙鐵
# JP: 「聞かせてほしい。今すぐには無理であっても。\nいつかお前と、ともに、その景色を越えるため」
1802 = "「Anh muốn nghe. Dù bây giờ có thể chưa\nđược.\nĐể một ngày nào đó, cùng với em, chúng ta\nsẽ vượt qua cảnh sắc đó.」"

# 【ハチロク】
# display as 鈴
# JP: 「っ！」
1648 = "「!」"

# monologue
# JP: すずも、気持ちを受け取ってくれる。\n\x%l共感;#00ffc040;共感%l;#;など無くとも確信できる。
2431 = "Suzu cũng, đã đón nhận tâm ý của tôi.\nDù không có \\x%l共感;#00ffc040;cộng cảm%l;#;, tôi vẫn có thể khẳng\nđịnh chắc chắn."

# monologue
# JP: 僕とすずとは、心をたしかに、繋げあえてる。
2608 = "Tôi và Suzu, chắc chắn, đã kết nối được\ntrái tim với nhau."

# 【ハチロク】
# display as 鈴
# JP: 「はい、双鉄さま。\nわたくしも、きっと、あの橋を――」
1798 = "「Vâng, ngài Soutetsu.\nEm cũng, nhất định, sẽ vượt qua cây cầu\nđó——」"

# monologue
# JP: すずの瞳に、僕が映る。\nすずの他には、何も見えない。
2612 = "Trong đôi mắt của Suzu, phản chiếu hình\nbóng tôi.\nNgoài Suzu ra, tôi không nhìn thấy bất cứ\nthứ gì khác."

# 【ハチロク】
# display as 鈴
# JP: 「恐ろしく、けれど美しい冨士川橋梁を。\n必ずいつか――あなたとともに」
2036 = "「Cây cầu Fujikawa đáng sợ, nhưng lại vô\ncùng xinh đẹp đó.\nNhất định một ngày nào đó——cùng với ngài.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。すず」
1795 = "「Ừm. Suzu.」"

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま……だんなさま……」
2149 = "「Ngài Soutetsu……phu quân……」"

# 【ふかみ】
# display as 深美
# JP: 「みなさま、ご乗車おつかれさまでした。\nあと十分ほどで列車は、終点、湯医に到着します」
2030 = "「Kính thưa quý khách, cảm ơn quý khách đã\nđồng hành cùng chuyến đi.\nKhoảng mười phút nữa, tàu sẽ đến ga cuối,\nga Yui ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？\nな、なんと、もうか！？　あっという間だな」
1678 = "「!?\nCái, cái gì, đã đến rồi sao!? Mới chớp mắt\nmột cái thôi mà.」"

# 【ハチロク】
# display as 鈴
# JP: 「ま、まことに左様ですねっ！\nあと十分でしたら、その、降りる支度をいたしませんと」
1599 = "「Q-Quả đúng là vậy nhỉ!\nNếu còn mười phút nữa, thì, ừm, chúng ta\nphải chuẩn bị xuống tàu thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな！」
1909 = "「Đúng vậy!」"

# monologue
# JP: いかん、今の一瞬は車中だと、\n公共の場だと、完全に頭から消えてしまっていた。
2358 = "Chết tiệt, trong khoảnh khắc vừa rồi,\ntôi đã hoàn toàn quên mất mình đang ở trên\ntàu, đang ở nơi công cộng."

# monologue
# JP: いや――あるいはふかみはそれを見咎め、\n車内アナウンスで僕らを、助けてくれたのかもしれん。
2367 = "Không——hoặc có lẽ Fukami đã nhận ra điều\nđó,\nvà dùng bài phát thanh trên tàu để giải\nvây cho chúng tôi cũng nên."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし――実に良い旅だった」
1490 = "「Nhưng mà——thực sự là một chuyến đi tuyệt\nvời.」"

# 【ハチロク】
# display as 鈴
# JP: 「はい、本当に素敵な旅でした」
1921 = "「Vâng, quả thực là một chuyến đi rất tuyệt\nvời.」"

# monologue
# JP: いつも仕事で乗務している同じ路線の、けれど、“旅”。\n普段は見えない多くが見えた。
2833 = "Dù vẫn là tuyến đường quen thuộc luôn làm\nnhiệm vụ, nhưng lần này là một \"chuyến\nđi\".\nChúng tôi đã nhìn thấy rất nhiều điều mà\nbình thường không thể thấy."

# monologue
# JP: 運転台では感じられない、貴重な多くを体験できた。
2372 = "Chúng tôi đã trải nghiệm được rất nhiều\nđiều quý giá, những điều không thể cảm\nnhận được khi ở buồng lái."

# 【ハチロク】
# display as 鈴
# JP: 「わたくしたちは、素敵なお仕事をしていたのですね」
1864 = "「Chúng ta, đã làm một công việc thật tuyệt\nvời nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1710 = "「嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「長らくのご乗車、まことにありがとうございました。\n列車は、[ゆのい,1]湯医、終点湯医に到着いたします」
1572 = "「Chân thành cảm ơn quý khách đã đồng hành\ncùng chúng tôi trên chặng đường dài.\nTàu sắp đến ga Yui, ga cuối Yui ạ.」"

# monologue
# JP: ――そして、列車は湯医に着く。
1006 = "——Và rồi, con tàu đã đến ga Yui."

# 【双鉄】
# display as 雙鐵
# JP: 「せっかくだ。折り返しは、舟をつかうか」
1937 = "「Hiếm khi mới có dịp. Lúc về, chúng ta đi\nthuyền nhé?」"

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ。それも楽しみです。ふかみでも凪でもない\n船頭さん、どのような方でございましょうね？」
1753 = "「Ufufu. Nghe cũng thú vị lắm ạ. Một người\nlái đò\nkhông phải là Fukami hay Nagi, không biết\nsẽ là người như thế nào nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「案外、[せき]堰さんか[ながれ]流さんか[おさむ]治さん――おや」
2027 = "「Biết đâu lại là bác Seki, anh Nagare hay\nanh Osamu——ủa.」"

# 【ハチロク】
# display as 鈴
# JP: 「まぁ。あのこ、先程の――ゆうちゃん」
1628 = "「Oa. Cô bé đó, là bé Yuu——lúc nãy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1710 = "「嗯」" 

# 【ちびっこ】
# display as 小悠
# JP: 「やぁぁん」
1857 = "「Không chịu đâu~」"

# monologue
# JP: 派手にグズってしまっている。\nおかあさんも、かなりの困り顔だ。
2802 = "Đang khóc lóc ăn vạ rất dữ dội.\nNgười mẹ cũng đang tỏ ra khá bối rối."

# 【ちびっこ】
# display as 小悠
# JP: 「もくもく！　ぜんぜんしなかったー！　まえのがいー！　ハチロクのほうが、ずーっといーいーっ！！」
1947 = "「Nghi ngút khói! Hoàn toàn không có chút\nnào hết~! Con thích cái trước cơ~!\nHachiroku vẫn tốt hơn, tốt hơn rất\nnhiề~~u!!」"

# 【ハチロク】
# display as 八六
# JP: 「ぱたぱた、ぱたぱた」
2162 = "「Phạch phạch, phạch phạch」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、すずしー、きもちいー」
1655 = "「A~, mát quá~, thoải mái quá~」"

# monologue
# JP: オリヴィの肌がずいぶん赤い。\n完全にゆだってしまっている。
2521 = "Da của Olivy đỏ bừng lên.\nHoàn toàn bị luộc chín mất rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「長風呂は体によくないと、\n登呂流湯のご主人にも言われているだろう」
1987 = "「Tắm lâu không tốt cho sức khỏe đâu,\nchủ nhà tắm Tororyu-yu cũng đã nói rồi\nmà.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。けど、ヒビキとナギともりあがっちゃってー」
1705 = "「Ừm. Nhưng mà, tám chuyện với Hibiki và\nNagi vui quá nên không dứt ra được~」"

# 【ハチロク】
# display as 八六
# JP: 「もりあがりましたね。\nニイロクも来てくれればよかったのですが」
1551 = "「Vui quá nhỉ.\nGiá mà Niiroku cũng đến thì tốt biết mấy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「グージとすぐに帰ったみたいだからねー。\nジンジャでお風呂はいったんじゃないかなー」
1775 = "「Có vẻ cậu ấy đã đi về cùng với đền chủ\nngay rồi mà~\nChắc là về tắm ở đền rồi đó~」"

# monologue
# JP: ……風呂にはいったかどうかは知らんが、\nニイロクと宮司のその後の足取りならば、知っている。
1054 = "……Tôi không biết họ có đi tắm hay không,\nnhưng tung tích sau đó của Niiroku và đền\nchủ thì tôi biết."

# monologue
# JP: レールショップで、僕とポーレットが話しているとき、\n報告に来てくれたのだから。
2568 = "Bởi vì lúc tôi và Paulette đang nói chuyện\nở cửa hàng đường sắt,\nhọ đã đến để báo cáo tình hình."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あのふたり、なかよしだよねー。ハチロクたちもだし。マスター\x%lレイルロオド;#00ffc040;レイルロオド%l;#;って、みんなそーなの？」
1541 = "「Hai người đó, thân nhau ghê ha~. Cả\nHachiroku nữa. Các Master và \\x%lレイルロオド;#00ffc040;Railord%l;#;, ai\ncũng như\nvậy sao?」"

# 【ハチロク】
# display as 八六
# JP: 「いえ。マスターと\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の関係は、ふつうは、\nどれほどの信頼関係があろうと、仕事に終始いたします」
1475 = "「Dạ không. Mối quan hệ giữa Master và \\x%lレイルロオド;#00ffc040;Railord%l;#;\n, thông thường,\ndù có tin tưởng nhau đến mức nào, cũng chỉ\ngiới hạn trong công việc thôi ạ.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、やっぱりふつーはそーなんだ。\nじゃ、ハチロクたちはトクベツなんだね～」
1693 = "「A~, quả nhiên bình thường là vậy nhỉ.\nThế thì, Hachiroku là trường hợp đặc biệt\nrồi~」"

# monologue
# JP: 言われて、一瞬。\nオリヴィをあおぐハチロクの手の動きが止まる。
2408 = "Bị nói trúng tim đen, trong một khoảnh\nkhắc.\nBàn tay đang quạt cho Olivy của Hachiroku\nbỗng dừng lại."

# 【ハチロク】
# display as 八六
# JP: 「……そこは否定をいたしません。双鉄さまという特別な\nマスターを得られたことは、わたくしの生涯の幸せです」
1103 = "「……Điểm đó thì em không phủ nhận. Việc có\nđược một Master đặc biệt\nnhư ngài Soutetsu, là niềm hạnh phúc lớn\nnhất trong cuộc đời em.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いいなー」
1996 = "「Thích ghê nha~」"

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1083 = "「……」" 

# monologue
# JP: ハチロクは、それ以上何も言わない。\nただパタパタと、オリヴィをあおいでいるだけだ。
2401 = "Hachiroku không nói thêm gì nữa.\nChỉ lẳng lặng phạch phạch, tiếp tục quạt\ncho Olivy."

# monologue
# JP: オリヴィももう、何も聞かない。\n気持ちよさげに、ハチロクにあおがれているだけだ。
2520 = "Olivy cũng không hỏi thêm gì nữa.\nChỉ thoải mái tận hưởng làn gió mát từ\nHachiroku."

# monologue
# JP: （\x%l共感;#00ffc040;共感%l;#;で……あるいは何かを、会話しているのかな）
2860 = "（Không biết họ có đang trò chuyện gì\nđó……thông qua \\x%l共感;#00ffc040;cộng cảm%l;#; không nhỉ）"

# monologue
# JP: そうしているような気もするし。\n沈黙自体で、なにかを伝えあってるような気もする。
2832 = "Tôi có cảm giác như vậy.\nCũng có cảm giác như chính sự im lặng đó,\nđang truyền đạt một điều gì đó cho nhau."

# monologue
# JP: いい距離感に、いい関係になって来たなと、\nぼんやり、思う。
2625 = "Khoảng cách và mối quan hệ giữa họ đang\ndần trở nên tốt đẹp hơn,\ntôi mơ màng nghĩ vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「――今日、僕も登呂流湯さんにいってきた。\n報告が長引いたので、みながあがったあとになったが」
1073 = "「——Hôm nay, anh cũng đã đến nhà tắm\nTororyu-yu.\nVì việc báo cáo kéo dài nên lúc anh đến\nmọi người đã tắm xong hết rồi.」"

# 【ハチロク】
# display as 八六＆奥莉薇
# JP: 「まぁ、左様でございましたか」\n「なにかきけた！？」
1639 = "「Oa, ra là vậy sao ạ」\n「Có nghe được gì không!?」"

# monologue
# JP: オリヴィがぴょんと跳ね起きる。\n急な動きを冷やそうと、ハチロクのうちわが強くなる。
2522 = "Olivy bật dậy cái rụp.\nĐể làm mát cho hành động đột ngột đó,\nchiếc quạt trên tay Hachiroku cũng vung\nmạnh hơn."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なんだっけー、あの、電車姫がいってた」
2100 = "「Gì ấy nhỉ~, cái mà, Công chúa Xe điện đã\nnói ấy.」"

# 【ハチロク】
# display as 八六
# JP: 「ロオドコア？」
1513 = "「Lõi Lord?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうそう！　そのロオドコア！\nトロルユのおばーちゃん、なにかしってた？」
1813 = "「Đúng đúng! Cái Lõi Lord đó!\nBà cụ ở nhà tắm Tororyu-yu, có biết gì\nkhông?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや……ロオドコアについては、何も。恐らく、\n日ノ本には把握できている者はいない、とのことだった」
2073 = "「Không……về Lõi Lord thì, không có gì cả.\nCó lẽ,\nở Hinomoto không có ai nắm rõ được nó cả,\nbà ấy đã nói vậy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、メーコクとかエーコクに聞きにいくしかない？」
2102 = "「Vậy thì, chỉ còn cách đi hỏi Minh Quốc\n(Mỹ) hay Vịnh Quốc (Anh) thôi sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それもなかなか厳しいようだな。詠国で学んだ者は、\n日ノ本の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;技師にも多いそうだが……」
1848 = "「Chuyện đó có vẻ cũng khá khó khăn đấy.\nNhững người từng học ở Vịnh Quốc,\ntrong số các kỹ sư \\x%lレイルロオド;#00ffc040;Railord%l;#; của Hinomoto\ncũng có rất nhiều, nhưng mà……」"

# 【ハチロク】
# display as 八六
# JP: 「ああ――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;製造の核心部については、\n完全な部外秘と、わたくしも聞いた覚えがございます」
1659 = "「A——Về phần cốt lõi trong việc chế tạo \\x%lレイルロオド;#00ffc040;Railord%l;#;\n,\nem cũng nhớ từng nghe nói đó là bí mật\ntuyệt đối không được tiết lộ ra ngoài ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「らしいのだ。\nので、そちらの方面はまったく収穫が無かった。が――」
1544 = "「Có vẻ là vậy.\nThế nên, về phương diện đó hoàn toàn không\ncó thu hoạch gì. Nhưng mà——」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「他になにかシューカクあったの？」
2120 = "「Có thu hoạch gì khác nữa sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。電車姫様がおっしゃっていた、\n『変わり者』についての話をきけた」
1724 = "「Ừm. Chuyện về 『Kẻ kỳ quặc』,\nmà Công chúa Xe điện đã nhắc đến, anh đã\nnghe được rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ――登呂流湯のご主人さまの、\nお知り合いの方でらっしゃるのですか？」
1662 = "「Oa——Là người quen của,\nchủ nhà tắm Tororyu-yu sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。数度、診たことがあるそうだ」
1707 = "「Ừ. Nghe nói bà ấy đã từng khám cho cô ta\nvài lần.」"

# 【ハチロク】
# display as 八六
# JP: 「みた……ですか？　会った、ではなく」
1991 = "「Khám……sao ạ? Không phải là gặp gỡ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「その見たではなく、診察の“診た”だ。\nつまり――」
1918 = "「Không phải là nhìn thấy, mà là \"khám\"\ntrong khám bệnh.\nNói cách khác——」"

# monologue
# JP: ビッ！　と、オリヴィの手があがる。
2519 = "Vút! Olivy giơ tay lên."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィわかった！\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なんだね、そのカワリモノ！」
1769 = "「Olivy hiểu rồi!\nKẻ kỳ quặc đó, là một \\x%lレイルロオド;#00ffc040;Railord%l;#; nhỉ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「正解だ。その名を、ひよこ。\nC57 145\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。世間ではむしろ」
1979 = "「Chính xác. Tên cô ta là, Hiyoko.\n\\x%lレイルロオド;#00ffc040;Railord%l;#; của Đầu máy C57 145. Còn đối với\nngười đời thì——」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「フシチョウ！　知ってる！　ユーメイだよね！\n帝鉄のサイゴをみとった、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;」
1482 = "「Phượng Hoàng Lửa (Fushichou)! Tớ biết!\nNổi tiếng lắm đó nha!\n\\x%lレイルロオド;#00ffc040;Railord%l;#; đã chứng kiến giây phút cuối cùng\ncủa Đường sắt Hoàng gia!」"

# 【ハチロク】
# display as 八六
# JP: 「不死鳥……帝鉄の最後を看取った――」
1481 = "「Phượng Hoàng Lửa……chứng kiến giây phút\ncuối cùng của Đường sắt Hoàng gia——」"

# monologue
# JP: けれどハチロクは、ことりと首をかしげてしまう。
2457 = "Nhưng Hachiroku lại khẽ nghiêng đầu thắc\nmắc."

# 【ハチロク】
# display as 八六
# JP: 「わたくしが、眠っていた間のことですね」
1916 = "「Là chuyện xảy ra trong lúc em đang ngủ\nsay nhỉ.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ね！　フシチョウってカワリモノなの？\nってか、いまどこにいるの？」
1876 = "「Nè! Phượng Hoàng Lửa là kẻ kỳ quặc sao?\nMà này, bây giờ cô ấy đang ở đâu vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「話にもでた、[おおみや,1]旺宮の鉄道歴史館。\nそこの実質的な館長が、その、不死鳥・ひよこだそうだ」
2070 = "「Cũng đã từng được nhắc đến rồi đấy, Bảo\ntàng Lịch sử Đường sắt Omiya.\nNghe nói vị giám đốc thực sự ở đó, chính\nlà Phượng Hoàng Lửa Hiyoko.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
# 1616 = "「哇！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;がカンチョーなの！？\nすごい！　それだけでちょーカワリモノ！」
1063 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; làm giám đốc á!?\nTuyệt quá! Chỉ nhiêu đó thôi cũng đã cực\nkỳ kỳ quặc rồi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「で、だ」
1856 = "「Và, thế này.」"

# monologue
# JP: 一拍おけば、ハチロクのうちわもぱたりと止まる。\n通じ合えているような気がして、少しうれしい。
2721 = "Tôi ngập ngừng một nhịp, chiếc quạt của\nHachiroku cũng dừng lại cái phạch.\nCảm giác như chúng tôi đang thấu hiểu lẫn\nnhau, khiến tôi thấy hơi vui."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとも相談したのだが――\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;について学ぶため」
1883 = "「Anh cũng đã bàn bạc với Paulette rồi——\nĐể tìm hiểu thêm về \\x%lレイルロオド;#00ffc040;Railord%l;#;」"

# monologue
# JP: みなまで聞かず、オリヴィが跳ねる。
2616 = "Không đợi tôi nói hết câu, Olivy đã nhảy\ncẫng lên."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いいの！？　オリヴィもいってもいいの！！？\nオーミヤでしょ！？　これって、そういう話でしょ！？」
1998 = "「Được sao!? Olivy cũng đi cùng được sao!!?\nOmiya đúng không!? Chuyện này, là ý đó\nđúng không!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そういう話だ」
1723 = "「Ừ, là ý đó đấy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いく！　つれてって！　おいてかないで！！\nオーミヤのレキシカン！　みてみたい！！」
1772 = "「Tớ đi! Cho tớ đi với! Đừng bỏ tớ lại\nnha!!\nBảo tàng lịch sử Omiya! Tớ muốn đến xem\nthử!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　旺宮で検査は受けたのだろう？」
1739 = "「Ừm? Chẳng phải cậu đã từng đến Omiya kiểm\ntra rồi sao?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うけてたけど、アソビじゃないし。\nチョッコーで検査うけてチョッキだよー」
1908 = "「Đã từng kiểm tra, nhưng đâu phải đi chơi.\nChỉ đến thẳng đó kiểm tra rồi về thẳng nhà\nthôi~」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。では、鉄道歴史館見学の時間も必ず作ろう。\nハチロクは？」
1578 = "「Ra là vậy. Thế thì, anh nhất định sẽ sắp\nxếp thời gian để tham quan Bảo tàng Lịch\nsử Đường sắt.\nHachiroku thì sao?」"

# 【ハチロク】
# display as 八六
# JP: 「お尋ねになる必要もございません。わたくしは、\nそうお望みいただける限り、常に、あなたのお側に」
1852 = "「Ngài không cần phải hỏi đâu ạ. Em,\nchỉ cần ngài mong muốn, em sẽ luôn luôn, ở\nbên cạnh ngài.」"

# 【双鉄】
# display as 雙鐵
# JP: 「では決まりだな。小畑線の運転が始まる前だから、\nいささか慌ただしくなるが」
2108 = "「Vậy là quyết định rồi nhé. Vì là trước\nkhi Tuyến Okoba bắt đầu đi vào hoạt động,\nnên sẽ hơi vội vã một chút.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「水曜日と土日祝はオリヴィもバーベキュー列車あるから、\nそれ以外になるよね？」
1906 = "「Thứ tư và các ngày cuối tuần, ngày lễ\nOlivy cũng phải phụ trách chuyến tàu BBQ,\nnên sẽ đi vào những ngày khác đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「と、なる。くわしい候補日は、出次第で伝える」
1734 = "「Là vậy đấy. Ngày đi cụ thể, khi nào có\nanh sẽ báo lại.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！　それに、ありがとハチロク！\nカラダひえた！！」
2000 = "「Tớ hiểu rồi! Với lại, cảm ơn Hachiroku\nnha!\nCơ thể tớ mát lại rồi!!」"

# monologue
# JP: 言うなり、オリヴィは部屋を出て行く。
2523 = "Vừa dứt lời, Olivy liền đi ra khỏi phòng."

# 【双鉄】
# display as 雙鐵
# JP: 「今夜は日々姫の部屋で寝るのか？」
1534 = "「Đêm nay cậu ngủ ở phòng Hibiki à?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　少しでもタイオン下げたいし、\nクーラーつけてもらってねるー」
1720 = "「Ừm! Tớ muốn hạ thân nhiệt xuống thêm chút\nnữa,\nnên sẽ nhờ cậu ấy bật máy lạnh rồi ngủ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。冷やしすぎないようにな」
1790 = "「Vậy sao. Cẩn thận đừng để lạnh quá đấy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「へーき！　さむくなったらヒビキにくっつくし！」
1945 = "「Không sao! Nếu thấy lạnh tớ sẽ bám chặt\nlấy Hibiki!」"

# 【ハチロク】
# display as 八六
# JP: 「それはあたたかなことですね。\nおやすみなさい。オリヴィちゃん」
2122 = "「Vậy thì ấm áp lắm nhỉ.\nChúc ngủ ngon. Olivy-chan.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！\nおやすみ、ハチロク！　おやすみ、ソーテツ！」
1715 = "「Ừm!\nNgủ ngon, Hachiroku! Ngủ ngon, Soutetsu!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おやすみオリヴィ。良い夢を」
1773 = "「Ngủ ngon Olivy. Chúc cậu có những giấc mơ\nđẹp.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツもねー」
2148 = "「Soutetsu cũng vậy nha~」"

# monologue
# JP: ふすまが閉まり、軽い足音が遠ざかっていく。\nと、おもいきや、すぐさまこちらに戻ってくる。
2537 = "Cửa kéo đóng lại, tiếng bước chân nhẹ\nnhàng xa dần.\nCứ tưởng vậy, nhưng cô bé lập tức quay trở\nlại."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1737 = "「嗯？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いいわすれた！　おやすみなさいで、またあした！！」
1571 = "「Tớ quên mất! Chúc ngủ ngon, và hẹn gặp\nlại vào ngày mai!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。また明日」
1727 = "「Ừ. Hẹn ngày mai.」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1083 = "「……」" 

# 【ハチロク】
# display as 鈴
# JP: 「…………」
# 1083 = "「……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1083 = "「……」" 

# 【ハチロク】
# display as 鈴
# JP: 「…………双鉄さま。もうお休みになられましたか？」
1109 = "「…………Ngài Soutetsu. Ngài đã ngủ rồi sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
2086 = "「Chưa——」"

# monologue
# JP: 眠れずにいた。\nすずも眠れずにいると感じてたが――
2623 = "Tôi vẫn chưa ngủ được.\nTôi cũng cảm thấy Suzu vẫn chưa ngủ được,\nnhưng mà——"

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまが、なにかお話しになりたいのかと、\nわたくし、それが気がかりで――」
1871 = "「Ngài Soutetsu, hình như ngài có chuyện gì\nđó muốn nói,\nem, cứ bận tâm mãi về điều đó——」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1710 = "「嗯」" 

# monologue
# JP: 布団の中で、手が伸びてくる。\nその手を受取る。指を絡める。
2814 = "Trong chăn, một bàn tay vươn tới.\nTôi đón lấy bàn tay ấy. Đan mười ngón tay\nvào nhau."

# monologue
# JP: それだけで、心がかなり、軽くなる。\nが――
2573 = "Chỉ cần vậy thôi, cõi lòng tôi đã nhẹ nhõm\nđi rất nhiều.\nNhưng mà——"

# 【双鉄】
# display as 雙鐵
# JP: 「やはり、切り替えをした直後ゆえの問題はあるよな。\nコンセプト不徹底の件は、日々姫とも話あってるらしい」
1933 = "「Quả nhiên, vì vừa mới thay đổi nên vẫn\ncòn một số vấn đề nhỉ.\nVề chuyện concept chưa triệt để, có vẻ như\nhọ cũng đang bàn bạc với Hibiki rồi.」"

# 【ハチロク】
# display as 鈴
# JP: 「あ、バアベキウ列車のことでございましたか」
1691 = "「A, là chuyện về chuyến tàu BBQ sao ạ.」"

# monologue
# JP: あからさまに声がほっとする。\nその声に、軽くなった心がいささか、また重みを増す。
2534 = "Giọng nói của cô ấy lộ rõ vẻ nhẹ nhõm.\nGiọng nói ấy, lại khiến cõi lòng vừa mới\nnhẹ đi của tôi, thêm phần trĩu nặng."

# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
1074 = "「——Ừ.」"

# monologue
# JP: それは、一部だ。重要ではあるが、最重要ではない一部。\nポーレットと、ニイロクと、赤井宮司と話したことの。
2370 = "Đó chỉ là, một phần. Quan trọng, nhưng\nkhông phải là phần quan trọng nhất.\nTrong những chuyện tôi đã nói với\nPaulette, Niiroku và đền chủ Akai."

# monologue
# JP: だが、言えない。夫婦であっても――夫婦であるから。\nすずがどれほど狼狽するか、容易に想像できるゆえ。
2394 = "Nhưng mà, tôi không thể nói. Dù là vợ\nchồng——chính vì là vợ chồng.\nVì tôi có thể dễ dàng tưởng tượng ra Suzu\nsẽ bối rối đến mức nào."

# 【双鉄】
# display as 雙鐵
# JP: 「[ハチロクニイマル,3]8620と同じことをしていては、8620には及ばない。\nゆえ、冥国風を前面に押し出すことにした」
2146 = "「Nếu làm giống hệt như 8620, thì sẽ không\nthể sánh bằng 8620 được.\nVì vậy, họ đã quyết định đưa phong cách\nMinh Quốc (Mỹ) lên hàng đầu.」"

# 【ハチロク】
# display as 鈴
# JP: 「きっぷも、メニウもそのように整っておりましたね。\nわたくし、大変よろしいものと感じましたが」
2048 = "「Vé và thực đơn cũng đã được điều chỉnh\ntheo phong cách đó nhỉ.\nEm cảm thấy, những thứ đó đều rất tuyệt\nvời ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。が、それらは僕らが、[ハチロク,3]8620時代の\nバーベキュー列車を知らないからであるらしい」
1861 = "「Anh cũng vậy. Nhưng, có vẻ như đó là vì\nchúng ta,\nkhông biết đến chuyến tàu BBQ thời của\n8620.」"

# 【ハチロク】
# display as 鈴
# JP: 「あ！　そういえば、あのこも言っていましたね。\n『もくもくが足りない』と」
1670 = "「A! Nhắc mới nhớ, cô bé đó cũng đã nói\nnhỉ.\n『Nghi ngút khói vẫn chưa đủ』.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1710 = "「嗯」" 

# monologue
# JP: 今日は日々姫が\x%l機関助士;#00ffc040;機関助士%l;#;で、Ⅸ号の調子も良いようだった。\n煙はほとんど白煙で、その上、もとから罐も小さい。
2382 = "Hôm nay Hibiki làm \\x%l機関助士;#00ffc040;Phụ lái tàu%l;#;, tình trạng\ncủa Đầu máy số 9 có vẻ cũng rất tốt.\nKhói tỏa ra hầu như là khói trắng, hơn\nnữa, lò hơi vốn dĩ cũng nhỏ."

# monologue
# JP: 車窓にながれる『もくもく』を期待してくれていたのなら、\nそこはほとんど、満足いただけなかっただろう。
2631 = "Nếu như mong đợi sự 『nghi ngút khói』 bay\nqua cửa sổ,\nthì điểm đó, chắc chắn sẽ không thể khiến\ncô bé hài lòng được."

# 【ハチロク】
# display as 鈴
# JP: 「爆煙など褒められたものではございませんが――\nファンサアビスとして望まれる方もいらっしゃる」
2147 = "「Dù việc xả khói mù mịt không phải là điều\nđáng khen ngợi——\nnhưng cũng có những người mong muốn điều\nđó như một kiểu phục vụ fan (fan service)\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。しかし、老朽化したⅨ号で、\n意図的な不完全燃焼などというのも、望ましくない」
1503 = "「Đúng vậy. Nhưng mà, với một Đầu máy số 9\nđã cũ kỹ,\nviệc cố ý đốt cháy không hoàn toàn, cũng\nkhông phải là điều nên làm.」"

# 【ハチロク】
# display as 鈴
# JP: 「で、ございますね」
1923 = "「Vâng, đúng là vậy nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、旺宮では、その辺のヒントも集めて来て欲しいと\n頼まれた。つまり、冥国\x%l蒸機;#00ffc040;蒸機%l;#;らしさなんぞやという点の」
1891 = "「Vì thế, họ đã nhờ anh đến Omiya, thu thập\nthêm những gợi ý về vấn đề đó.\nNói cách khác, là những điểm mang đậm nét\nđặc trưng của \\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#; Minh Quốc\n(Mỹ).」"

# 【ハチロク】
# display as 鈴
# JP: 「ヒント。“も”で、ございますか？」
1079 = "「Gợi ý. \"Cũng\" sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、もちろん大本命は、延命のための方法と、\n子供を授かるための方法を尋ねることだ」
1914 = "「À, tất nhiên mục tiêu chính là, tìm cách\nkéo dài tuổi thọ,\nvà hỏi về cách để có con.」"

# 【ハチロク】
# display as 鈴
# JP: 「はい。\nそちらも、業務としてお伺いしてよろしいのですね？」
1904 = "「Vâng.\nNhững chuyện đó, em cũng có thể coi là\ncông việc để đi hỏi đúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「当然だ。お前やオリヴィのような優秀な\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を、\n御一夜鉄道だって、失いたいはずも無いのだから」
2116 = "「Tất nhiên rồi. Những \\x%lレイルロオド;#00ffc040;Railord%l;#; xuất sắc như\nem hay Olivy,\nĐường sắt Ohimitera chắc chắn cũng không\nmuốn đánh mất đâu.」"

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ、とても光栄なことでございます――――\nふぁっ」
1747 = "「Ufufu, thật là một điều vô cùng vinh\nhạnh――――\nOáp.」"

# monologue
# JP: 今の話で安心したのか、すずが小さくあくびする。
2360 = "Chắc là vì yên tâm sau câu chuyện vừa rồi,\nSuzu ngáp một cái thật nhỏ."

# 【ハチロク】
# display as 鈴
# JP: 「いやだ。失礼をしてしまいました」
1634 = "「Thật tình. Em thất lễ quá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「少しも失礼などではないさ。\nすずと話せて、僕もなんだか、眠くなってきた」
1545 = "「Không thất lễ chút nào đâu.\nĐược nói chuyện với Suzu, anh cũng thấy\nhơi buồn ngủ rồi.」"

# 【ハチロク】
# display as 鈴
# JP: 「うふふ、今日はわたくしたち、はしゃぎましたものね」
1745 = "「Ufufu, hôm nay chúng ta, đã vui đùa thỏa\nthích mà nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、素晴らしい一日だった」
1915 = "「Ừ, một ngày thật tuyệt vời.」"

# monologue
# JP: （きゅっ）
2873 = "（Nắm chặt）"

# monologue
# JP: 絡んだ指の力が強まる。\nすずのてのひらが、僕のこころまで包んでくれる。
2603 = "Những ngón tay đan vào nhau siết chặt hơn.\nLòng bàn tay của Suzu, dường như bao bọc\nlấy cả trái tim tôi."

# 【ハチロク】
# display as 鈴
# JP: 「あしたはきっと、もっと素敵な日になります――\n（ちゅっ）」
1902 = "「Ngày mai nhất định, sẽ là một ngày tuyệt\nvời hơn nữa——\n（Chụt）」"

# 【双鉄】
# display as 雙鐵
# JP: 「今ので、さらにハードルがあがったぞ？\n今日より“もっと”は、正直なかなか厳しかろう」
1518 = "「Với nụ hôn vừa rồi, tiêu chuẩn lại càng\ntăng cao hơn nữa đấy?\nNói thật, để \"hơn\" ngày hôm nay thì khá là\nkhó đấy.」"

# 【ハチロク】
# display as 鈴
# JP: 「大丈夫です。双鉄さま。\n明日もずっと、わたくしたちは一緒なのですから」
1946 = "「Không sao đâu ạ. Ngài Soutetsu.\nVì ngày mai, chúng chúng ta cũng sẽ luôn ở\nbên nhau mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1710 = "「嗯」" 

# monologue
# JP: ――大好きだなぁと、しみじみ思う。\n素朴で単純な大好きが、僕の全てを満たしてく。
1010 = "——Yêu quá đi mất, tôi thấm thía suy nghĩ\nđó.\nTình yêu mộc mạc và giản đơn ấy, đang lấp\nđầy toàn bộ con người tôi."

# monologue
# JP: 満ち足りていく。満たされていく。\n眠りが、甘く、ゆるやかに水位をあげていく。
2571 = "Thỏa mãn. Đong đầy.\nGiấc ngủ, ngọt ngào, chầm chậm dâng lên\nnhư mực nước."

# 【双鉄】
# display as 雙鐵
# JP: 「おやすみ、すず」
2130 = "「Ngủ ngon, Suzu.」"

# 【ハチロク】
# display as 鈴
# JP: 「おやすみなさい、双鉄さま」
2150 = "「Chúc ngài ngủ ngon, ngài Soutetsu.」"

# monologue
# JP: そして手と手をつないだままに――\n僕らはなかよく、眠りに落ちる。
2598 = "Và rồi đôi tay vẫn đan chặt vào nhau——\nChúng tôi hòa thuận, chìm vào giấc ngủ."
