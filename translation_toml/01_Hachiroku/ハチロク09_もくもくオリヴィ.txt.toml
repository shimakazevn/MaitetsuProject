2593 = "Giờ tôi mới nhận ra và vô cùng ấn tượng, đây chính là kỹ năng tiếp khách mà Fukami đã không ngừng rèn giũa từ khi mới sinh ra."
# 【ふかみ】
# display as 深美
# JP: 「だからⅨ号機関車は。日ノ本撫子のハチロクよりも、\nちょっとだけジャジャ馬なのかもしれませんね」
1879 = "「Chính vì vậy Đầu máy số 9. So với Yamato Nadeshiko Hachiroku, có lẽ mang một chút gì đó của ngựa chứng hoang dã nhỉ.」"
# 【ちびっこ】
# display as 小孩
