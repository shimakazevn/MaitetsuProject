# 【ハチロク】
# display as 鈴
# JP: 「一番は――こうして、あなたと過ごす時間が」
1927 = "「最開心的，還是像現在這樣，與您共度的時光」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1668 = "「啊！」" 

# monologue
# JP: 妻だというのに、毎日毎晩見ている顔だというのにけれど、\nどうしようもなく見とれてしまう。
2531 = "她明明是我的妻子，每天每晚都能見面，但我就是忍不住一下子看得入迷了起來。" 

# monologue
# JP: このままいれば、自制心さえなくなりそうで、\nなかば無理やり、視線をそらして話を変える。
2804 = "這樣下去的話，怕是我就要無法自制了。所以我強迫自己錯開視線，岔開了話題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのっ――帝都ではどうだった？\n帝鉄時代は、どんな見事な車窓を見ていた？」
2028 = "「說起來——帝都是怎麼樣的呢？你在帝國鐵路時代從車窗外看到的又是怎樣美妙的景色呢？」" 

# 【ハチロク】
# display as 鈴
# JP: 「むぅ。\n……帝鉄時代、でございますか？」
1645 = "「唔。……您是說帝國鐵路時代……嗎？」" 

# monologue
# JP: ほんの一瞬、可愛く片頬をふくらせて。\nけれどもすずは、すぐに真面目に答えてくれる。
2530 = "她思考時輕輕鼓起一側臉頰的樣子真是可愛至極。不過很快，她就認真地給出了答案。" 

# 【ハチロク】
# display as 鈴
# JP: 「わたくしは――本線の中の本線。\n[とうかいどう,2]東峡道本線ばかりを走っておりましたものですので」
1875 = "「我當初，是在幹線中的幹線，東海道本線上執行乘務任務的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1710 = "「嗯」" 

# 【ハチロク】
# display as 鈴
# JP: 「忙しいばかりでしたが、それでも覚えておりますのは、\n[ゆい,1]由衣のあたりのお海の景色と、冨士のお山と――」
2118 = "「那時可以說是相當忙碌，現在還有印象的，就只有由比一帶的海景、富士山和——」" 

# monologue
# JP: そこまでいって、ぎくりとすずが固まってしまう。\nああ、そうなのかと、僕も感じる。
2415 = "八六說到這裡，話語卻戛然而止，整個人僵在那裡。啊，我也多少感覺到了，或許真的是那裡。" 

# monologue
# JP: ……あの日、父が見せようとしてくれた景色は。\nそれほど見事なものであるのか。
1053 = "……那天，父親本想讓我們看的景色，竟是那般美麗壯觀嗎。" 

# 【双鉄】
# display as 雙鐵
# JP: 「聞かせてほしい。今すぐには無理であっても。\nいつかお前と、ともに、その景色を越えるため」
1802 = "「如果現在你講不出的話，那就回頭再說給我聽吧。為了某一天，我們能攜手跨越那絕景」" 

# 【ハチロク】
# display as 鈴
# JP: 「っ！」
1648 = "「唔！」" 

# monologue
# JP: すずも、気持ちを受け取ってくれる。\n\x%l共感;#00ffc040;共感%l;#;など無くとも確信できる。
2431 = "即便和我之間沒有\\x%l共感;#00ffc040;共鳴%l;#;，我也確信鈴理解了我話中的含義。" 

# monologue
# JP: 僕とすずとは、心をたしかに、繋げあえてる。
2608 = "我的內心與鈴的內心之間，早已有了一條看不見的紐帶。" 

# 【ハチロク】
# display as 鈴
# JP: 「はい、双鉄さま。\nわたくしも、きっと、あの橋を――」
1798 = "「好的，雙鐵少爺。那座橋，我也一定會——」" 

# monologue
# JP: すずの瞳に、僕が映る。\nすずの他には、何も見えない。
2612 = "我的眼中，只有鈴的雙眸。而那雙眸之中，倒映著我自己。" 

# 【ハチロク】
# display as 鈴
# JP: 「恐ろしく、けれど美しい冨士川橋梁を。\n必ずいつか――あなたとともに」
2036 = "「讓我恐懼，卻也無比美麗的富士川橋樑。總有一天——我會與您攜手跨越」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。すず」
1795 = "「好的，鈴」" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま……だんなさま……」
2149 = "「雙鐵少爺……夫君……」" 

# 【ふかみ】
# display as 深美
# JP: 「みなさま、ご乗車おつかれさまでした。\nあと十分ほどで列車は、終点、湯医に到着します」
2030 = "「諸位乘客，長時間搭車辛苦了。本次列車將在十分鐘後抵達終點站湯醫站」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？\nな、なんと、もうか！？　あっという間だな」
1678 = "「啊！？這、這就要到了嗎！？好快啊」" 

# 【ハチロク】
# display as 鈴
# JP: 「ま、まことに左様ですねっ！\nあと十分でしたら、その、降りる支度をいたしませんと」
1599 = "「可、可不是嘛！還有十分鐘的話，那是差不多該準備下車了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな！」
1909 = "「是呀！」" 

# monologue
# JP: いかん、今の一瞬は車中だと、\n公共の場だと、完全に頭から消えてしまっていた。
2358 = "不好，剛才那一瞬間，我們都徹底把這車廂裡是公共場所的事給拋到了九霄雲外。" 

# monologue
# JP: いや――あるいはふかみはそれを見咎め、\n車内アナウンスで僕らを、助けてくれたのかもしれん。
2367 = "且慢——或許正是深美看到我們沉浸於二人世界，才在這個時候進行了車內播音，將我們拉回現實。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし――実に良い旅だった」
1490 = "「不過——確實是很開心的旅程啊」" 

# 【ハチロク】
# display as 鈴
# JP: 「はい、本当に素敵な旅でした」
1921 = "「是的，當真是非常棒的一次旅程」" 

# monologue
# JP: いつも仕事で乗務している同じ路線の、けれど、“旅”。\n普段は見えない多くが見えた。
2833 = "雖然是平常執行乘務任務相同的線路，但這次是在“旅行”。我們看到了許多平常注意不到的東西。" 

# monologue
# JP: 運転台では感じられない、貴重な多くを体験できた。
2372 = "也積累了許多在駕駛台上感受不到的珍貴體驗。" 

# 【ハチロク】
# display as 鈴
# JP: 「わたくしたちは、素敵なお仕事をしていたのですね」
1864 = "「我們所負責的工作，真的是非常美好並且有意義的事情」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1710 = "「嗯」" 

# 【ふかみ】
# display as 深美
# JP: 「長らくのご乗車、まことにありがとうございました。\n列車は、[ゆのい,1]湯医、終点湯医に到着いたします」
1572 = "「十分感謝您長時間乘坐本次列車。本次列車已抵達終點站，湯醫站」" 

# monologue
# JP: ――そして、列車は湯医に着く。
1006 = "——列車就這樣停靠在了湯醫站。" 

# 【双鉄】
# display as 雙鐵
# JP: 「せっかくだ。折り返しは、舟をつかうか」
1937 = "「機會難得，我們就坐船回去吧」" 

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ。それも楽しみです。ふかみでも凪でもない\n船頭さん、どのような方でございましょうね？」
1753 = "「嘻嘻，那也很值得期待。深美和凪都不在，不知道會是怎樣的人掌棹呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「案外、[せき]堰さんか[ながれ]流さんか[おさむ]治さん――おや」
2027 = "「說不定會是堰先生、流先生或者治先生吧——哦？」" 

# 【ハチロク】
# display as 鈴
# JP: 「まぁ。あのこ、先程の――ゆうちゃん」
1628 = "「哇，是剛才那個孩子——小悠」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1710 = "「嗯」" 

# 【ちびっこ】
# display as 小悠
# JP: 「やぁぁん」
1857 = "「我不要——」" 

# monologue
# JP: 派手にグズってしまっている。\nおかあさんも、かなりの困り顔だ。
2802 = "這彆扭看來是鬧得不輕。一旁的媽媽也顯得頗為為難。" 

# 【ちびっこ】
# display as 小悠
# JP: 「もくもく！　ぜんぜんしなかったー！　まえのがいー！　ハチロクのほうが、ずーっといーいーっ！！」
1947 = "「沒有煙嘛！根本就沒有煙嘛！我要之前那個！八六比這個好得多得多啦！！」" 

# 【ハチロク】
# display as 八六
# JP: 「ぱたぱた、ぱたぱた」
2162 = "「（扇扇扇，扇扇扇）」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、すずしー、きもちいー」
1655 = "「啊——好涼快，好舒服」" 

# monologue
# JP: オリヴィの肌がずいぶん赤い。\n完全にゆだってしまっている。
2521 = "奧莉薇的皮膚就像煮熟的蝦一樣，整個紅彤彤的了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「長風呂は体によくないと、\n登呂流湯のご主人にも言われているだろう」
1987 = "「登呂流浴場老闆不是都說過了嗎，泡太久對身體不好」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。けど、ヒビキとナギともりあがっちゃってー」
1705 = "「嗯。只是，和日日姬還有凪一起就停不下來了」" 

# 【ハチロク】
# display as 八六
# JP: 「もりあがりましたね。\nニイロクも来てくれればよかったのですが」
1551 = "「停不下來了啊。要是二六也能一起來就好了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「グージとすぐに帰ったみたいだからねー。\nジンジャでお風呂はいったんじゃないかなー」
1775 = "「她好像和宮司直接回去了。是不是回神社洗澡了」" 

# monologue
# JP: ……風呂にはいったかどうかは知らんが、\nニイロクと宮司のその後の足取りならば、知っている。
1054 = "……雖然不知道是不是去洗澡了，但他們之後的行蹤我是知道的。" 

# monologue
# JP: レールショップで、僕とポーレットが話しているとき、\n報告に来てくれたのだから。
2568 = "就在我在鐵路商店和波萊特談話的時候，他們來找我們做報告了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あのふたり、なかよしだよねー。ハチロクたちもだし。マスター\x%lレイルロオド;#00ffc040;レイルロオド%l;#;って、みんなそーなの？」
1541 = "「他們兩個關係好好哦。八六你們也是。你們這些定組的司機和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;都是這樣的嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ。マスターと\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の関係は、ふつうは、\nどれほどの信頼関係があろうと、仕事に終始いたします」
1475 = "「不是的。一般來說，司機和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;之間，無論相互如何信任，也僅限於工作中而已」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、やっぱりふつーはそーなんだ。\nじゃ、ハチロクたちはトクベツなんだね～」
1693 = "「啊，果然一般來說應該是那樣呀。那八六你們就是特別的囉～」" 

# monologue
# JP: 言われて、一瞬。\nオリヴィをあおぐハチロクの手の動きが止まる。
2408 = "八六在聽到奧莉薇這話的瞬間，給奧莉薇扇扇子的手隨之一滯。" 

# 【ハチロク】
# display as 八六
# JP: 「……そこは否定をいたしません。双鉄さまという特別な\nマスターを得られたことは、わたくしの生涯の幸せです」
1103 = "「……這一點我不否認。能遇到雙鐵少爺這樣特別的司機，是我一生之幸事」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いいなー」
1996 = "「真好啊——」" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1083 = "「……」" 

# monologue
# JP: ハチロクは、それ以上何も言わない。\nただパタパタと、オリヴィをあおいでいるだけだ。
2401 = "八六不再言語，只是默默地繼續給奧莉薇扇扇子。" 

# monologue
# JP: オリヴィももう、何も聞かない。\n気持ちよさげに、ハチロクにあおがれているだけだ。
2520 = "奧莉薇也不再多問，只是滿臉舒爽地默默享受著八六扇來的涼風。" 

# monologue
# JP: （\x%l共感;#00ffc040;共感%l;#;で……あるいは何かを、会話しているのかな）
2860 = "（不知她們是不是還在繼續通過\\x%l共感;#00ffc040;共鳴%l;#;聊著什麼呢）" 

# monologue
# JP: そうしているような気もするし。\n沈黙自体で、なにかを伝えあってるような気もする。
2832 = "雖然我有種這樣的感覺，但目前的沉默本身，似乎也有傳達出了某種訊息的感覺。" 

# monologue
# JP: いい距離感に、いい関係になって来たなと、\nぼんやり、思う。
2625 = "我隱約覺得，她們之間的關係和距離感變得越來越好了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――今日、僕も登呂流湯さんにいってきた。\n報告が長引いたので、みながあがったあとになったが」
1073 = "「——今天，我也去過登呂流浴場了。因為報告耽誤了些時間，所以回來的時候你們都已經洗好了」" 

# 【ハチロク】
# display as 八六＆奥莉薇
# JP: 「まぁ、左様でございましたか」\n「なにかきけた！？」
1639 = "「哦，原來是這樣啊」\\n「都說了些什麼！？」" 

# monologue
# JP: オリヴィがぴょんと跳ね起きる。\n急な動きを冷やそうと、ハチロクのうちわが強くなる。
2522 = "奧莉薇說著就彈簧似地坐了起來。而八六怕她這猛的一下子又發熱，扇扇子的手上也加大了力道。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なんだっけー、あの、電車姫がいってた」
2100 = "「那個什麼來著——就是，電車公主說過的那個」" 

# 【ハチロク】
# display as 八六
# JP: 「ロオドコア？」
1513 = "「人偶核？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうそう！　そのロオドコア！\nトロルユのおばーちゃん、なにかしってた？」
1813 = "「對對！就是人偶核！登呂流浴場的婆婆她都說了什麼呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや……ロオドコアについては、何も。恐らく、\n日ノ本には把握できている者はいない、とのことだった」
2073 = "「這個嘛……她完全沒提人偶核。恐怕放眼整個日本，都沒有掌握這些技術的人吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、メーコクとかエーコクに聞きにいくしかない？」
2102 = "「那只能去美國或者英國打聽了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それもなかなか厳しいようだな。詠国で学んだ者は、\n日ノ本の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;技師にも多いそうだが……」
1848 = "「恐怕外國希望也很渺茫。日本的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;技工有很多都是留學英國的……」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;製造の核心部については、\n完全な部外秘と、わたくしも聞いた覚えがございます」
1659 = "「啊——我好像也聽人說起過，製造\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的核心技術是對外完全保密的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「らしいのだ。\nので、そちらの方面はまったく収穫が無かった。が――」
1544 = "「似乎確實如此。所以那方面可以說是一無所獲。不過——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「他になにかシューカクあったの？」
2120 = "「那有什麼其他收穫嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。電車姫様がおっしゃっていた、\n『変わり者』についての話をきけた」
1724 = "「嗯，就是電車公主殿下提到過的“異乎尋常者”，我稍微打聽了一下」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ――登呂流湯のご主人さまの、\nお知り合いの方でらっしゃるのですか？」
1662 = "「啊——莫非登呂流浴場老闆認識嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。数度、診たことがあるそうだ」
1707 = "「嗯。好像是看過她幾次」" 

# 【ハチロク】
# display as 八六
# JP: 「みた……ですか？　会った、ではなく」
1991 = "「看過……嗎？不是見過？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その見たではなく、診察の“診た”だ。\nつまり――」
1918 = "「是的，不是見面，而是看病的“看”。也就是說——」" 

# monologue
# JP: ビッ！　と、オリヴィの手があがる。
2519 = "奧莉薇“唰”地舉起了手。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィわかった！\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なんだね、そのカワリモノ！」
1769 = "「奧莉薇明白啦！那個“異乎尋常者”是個\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;吧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「正解だ。その名を、ひよこ。\nC57 145\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。世間ではむしろ」
1979 = "「猜對了。她名叫“雛”。是Ｃ５７　１４５的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。而她更廣為人知的名號是——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「フシチョウ！　知ってる！　ユーメイだよね！\n帝鉄のサイゴをみとった、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;」
1482 = "「不死鳥！奧莉薇知道的！她很有名的！據說是親眼見證了帝國鐵路隕落的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# 【ハチロク】
# display as 八六
# JP: 「不死鳥……帝鉄の最後を看取った――」
1481 = "「不死鳥……親眼見證了帝國鐵路隕落——」" 

# monologue
# JP: けれどハチロクは、ことりと首をかしげてしまう。
2457 = "可八六卻像小鳥一樣歪著腦袋，一副茫然的表情。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしが、眠っていた間のことですね」
1916 = "「是在我沉睡期間發生的事情吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ね！　フシチョウってカワリモノなの？\nってか、いまどこにいるの？」
1876 = "「我說呀！不死鳥是異乎尋常的嗎？而且哦，她現在在哪裡呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「話にもでた、[おおみや,1]旺宮の鉄道歴史館。\nそこの実質的な館長が、その、不死鳥・ひよこだそうだ」
2070 = "「這一點也說到了，在大宮鐵路歷史館。那裡實質性的館長，好像就是這位不死鳥·雛」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
# 1616 = "「哇！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;がカンチョーなの！？\nすごい！　それだけでちょーカワリモノ！」
1063 = "「\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;做館長嗎！？好厲害！光這一條就夠異乎尋常了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「で、だ」
1856 = "「應該，是吧」" 

# monologue
# JP: 一拍おけば、ハチロクのうちわもぱたりと止まる。\n通じ合えているような気がして、少しうれしい。
2721 = "聽到我故意頓了一下，八六也停下了手中的扇子。這種心有靈犀的感覺，讓我頗感欣喜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとも相談したのだが――\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;について学ぶため」
1883 = "「所以我和波萊特商量了一下，為了更深入學習了解\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;——」" 

# monologue
# JP: みなまで聞かず、オリヴィが跳ねる。
2616 = "我話還沒說完，奧莉薇就繃不住了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いいの！？　オリヴィもいってもいいの！！？\nオーミヤでしょ！？　これって、そういう話でしょ！？」
1998 = "「真的嗎！？奧莉薇可以一起去嗎！！？是要去大宮吧！？是這個意思吧！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そういう話だ」
1723 = "「嗯，就是這個意思」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いく！　つれてって！　おいてかないで！！\nオーミヤのレキシカン！　みてみたい！！」
1772 = "「奧莉薇要去！別把奧莉薇丟下，帶奧莉薇一起去嘛！大宮的歷史館！奧莉薇想去看一看！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　旺宮で検査は受けたのだろう？」
1739 = "「嗯？之前你不是去過大宮做檢查嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うけてたけど、アソビじゃないし。\nチョッコーで検査うけてチョッキだよー」
1908 = "「是去做檢查啊，又不是去玩。就直接去做好檢查然後直接回來了，其他哪裡都沒去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。では、鉄道歴史館見学の時間も必ず作ろう。\nハチロクは？」
1578 = "「原來如此。那我一定安排出個時間去參觀歷史館。八六你呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「お尋ねになる必要もございません。わたくしは、\nそうお望みいただける限り、常に、あなたのお側に」
1852 = "「您本不必特地詢問於我。只要雙鐵少爺情願，我便常伴於您左右」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では決まりだな。小畑線の運転が始まる前だから、\nいささか慌ただしくなるが」
2108 = "「那就這麼定了。目前大畑線就要開始運營，可能多少有些倉促就是了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「水曜日と土日祝はオリヴィもバーベキュー列車あるから、\nそれ以外になるよね？」
1906 = "「星期三和週末節假日奧莉薇要負責ＢＢＱ列車，所以就得安排在其他的日子了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、なる。くわしい候補日は、出次第で伝える」
1734 = "「嗯，確實。具體的日期我安排好了告訴你們吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！　それに、ありがとハチロク！\nカラダひえた！！」
2000 = "「知道啦！還有謝謝你，八六！我已經涼快下來啦！！」" 

# monologue
# JP: 言うなり、オリヴィは部屋を出て行く。
2523 = "奧莉薇邊說邊朝房間外走去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今夜は日々姫の部屋で寝るのか？」
1534 = "「今晚睡在日日姬房間嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　少しでもタイオン下げたいし、\nクーラーつけてもらってねるー」
1720 = "「嗯！還是想把體溫控制得低一點，就讓她把空調打開睡啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。冷やしすぎないようにな」
1790 = "「好的，不過當心別太冷著涼咯」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「へーき！　さむくなったらヒビキにくっつくし！」
1945 = "「沒事！要是冷了奧莉薇會緊緊抱住日日姬的！」" 

# 【ハチロク】
# display as 八六
# JP: 「それはあたたかなことですね。\nおやすみなさい。オリヴィちゃん」
2122 = "「那樣確實很暖和。奧莉薇，晚安」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！\nおやすみ、ハチロク！　おやすみ、ソーテツ！」
1715 = "「嗯！八六，晚安！雙鐵，晚安！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おやすみオリヴィ。良い夢を」
1773 = "「奧莉薇，晚安。做個好夢」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツもねー」
2148 = "「雙鐵你也是哦」" 

# monologue
# JP: ふすまが閉まり、軽い足音が遠ざかっていく。\nと、おもいきや、すぐさまこちらに戻ってくる。
2537 = "她關上了拉門，腳步聲也漸漸走遠了。但一轉眼卻突然又折了回來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1737 = "「嗯？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いいわすれた！　おやすみなさいで、またあした！！」
1571 = "「剛才忘說啦！晚安，明天見！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。また明日」
1727 = "「嗯，明天見」" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1083 = "「……」" 

# 【ハチロク】
# display as 鈴
# JP: 「…………」
# 1083 = "「……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1083 = "「……」" 

# 【ハチロク】
# display as 鈴
# JP: 「…………双鉄さま。もうお休みになられましたか？」
1109 = "「……雙鐵少爺，您已經睡著了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
2086 = "「還沒——」" 

# monologue
# JP: 眠れずにいた。\nすずも眠れずにいると感じてたが――
2623 = "我還沒睡著。其實我也多少感覺到鈴應該也沒睡著——" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまが、なにかお話しになりたいのかと、\nわたくし、それが気がかりで――」
1871 = "「我就是有點放心不下，總覺得雙鐵少爺好像有話想說——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1710 = "「嗯」" 

# monologue
# JP: 布団の中で、手が伸びてくる。\nその手を受取る。指を絡める。
2814 = "鈴把手從被窩裡伸了過來。而我自然地牽起她的手，把手指扣在了一起。" 

# monologue
# JP: それだけで、心がかなり、軽くなる。\nが――
2573 = "就這樣一個簡單的動作，讓我放鬆了許多。不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「やはり、切り替えをした直後ゆえの問題はあるよな。\nコンセプト不徹底の件は、日々姫とも話あってるらしい」
1933 = "「果然，更換之後短期內會有很多問題啊。風格不統一這個問題，好像也有人去和日日姬反映過了」" 

# 【ハチロク】
# display as 鈴
# JP: 「あ、バアベキウ列車のことでございましたか」
1691 = "「啊，是說ＢＢＱ列車的事啊」" 

# monologue
# JP: あからさまに声がほっとする。\nその声に、軽くなった心がいささか、また重みを増す。
2534 = "她的聲音中並無半點猶豫，這讓我稍微放心了一些。但心頭的壓力，卻反而又加重了幾分。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
1074 = "「——嗯」" 

# monologue
# JP: それは、一部だ。重要ではあるが、最重要ではない一部。\nポーレットと、ニイロクと、赤井宮司と話したことの。
2370 = "之前和波萊特、二六、赤井宮司的談話中，確實提及了這部分內容，雖非無關緊要，但並不是最重要的部分。" 

# monologue
# JP: だが、言えない。夫婦であっても――夫婦であるから。\nすずがどれほど狼狽するか、容易に想像できるゆえ。
2394 = "但即便我們是夫婦——不，應該說正因為是夫婦，反而更難開口。因為我不難想像，那會讓鈴平添多少不安。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[ハチロクニイマル,3]8620と同じことをしていては、8620には及ばない。\nゆえ、冥国風を前面に押し出すことにした」
2146 = "「雖然它擔任的工作和８６２０完全一樣，但總歸是比８６２０有所不足。所以，才會轉變策略，主打美國風情」" 

# 【ハチロク】
# display as 鈴
# JP: 「きっぷも、メニウもそのように整っておりましたね。\nわたくし、大変よろしいものと感じましたが」
2048 = "「車票和菜單也都按這個主題做了調整。我覺得品質相當值得稱道」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。が、それらは僕らが、[ハチロク,3]8620時代の\nバーベキュー列車を知らないからであるらしい」
1861 = "「我也這麼覺得。不過，那大概是因為我們並不了解８６２０時期的ＢＢＱ列車」" 

# 【ハチロク】
# display as 鈴
# JP: 「あ！　そういえば、あのこも言っていましたね。\n『もくもくが足りない』と」
1670 = "「啊！您這麼一說，那孩子好像確實說了“煙太少了”這樣的話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1710 = "「嗯」" 

# monologue
# JP: 今日は日々姫が\x%l機関助士;#00ffc040;機関助士%l;#;で、Ⅸ号の調子も良いようだった。\n煙はほとんど白煙で、その上、もとから罐も小さい。
2382 = "今天的\\x%l機関助士;#00ffc040;司爐%l;#;是日日姬，九號的狀態好像也不錯，所以排出的基本都是白煙，況且九號的鍋爐本就不大。" 

# monologue
# JP: 車窓にながれる『もくもく』を期待してくれていたのなら、\nそこはほとんど、満足いただけなかっただろう。
2631 = "所以如果是期待著車窗外“煙霧繚繞”的感覺的話，那基本肯定是要敗興而歸了。" 

# 【ハチロク】
# display as 鈴
# JP: 「爆煙など褒められたものではございませんが――\nファンサアビスとして望まれる方もいらっしゃる」
2147 = "「雖然故意排出大量黑煙並不是值得稱道的做法——但作為滿足愛好者的一環似乎還是有其需求存在的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。しかし、老朽化したⅨ号で、\n意図的な不完全燃焼などというのも、望ましくない」
1503 = "「也對。但是，九號已經頗為老舊，故意製造燃燒不充分的情況也確實不妥」" 

# 【ハチロク】
# display as 鈴
# JP: 「で、ございますね」
1923 = "「是的，確實不妥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、旺宮では、その辺のヒントも集めて来て欲しいと\n頼まれた。つまり、冥国\x%l蒸機;#00ffc040;蒸機%l;#;らしさなんぞやという点の」
1891 = "「所以，他們希望這次去大宮，也能在這方面得到一些建議。換言之，就是體現美國\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;特色的方式方法」" 

# 【ハチロク】
# display as 鈴
# JP: 「ヒント。“も”で、ございますか？」
1079 = "「“也”能得到建議……嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、もちろん大本命は、延命のための方法と、\n子供を授かるための方法を尋ねることだ」
1914 = "「是啊，當然最主要的任務，還是去諮詢關於延長壽命和生兒育女的方法」" 

# 【ハチロク】
# display as 鈴
# JP: 「はい。\nそちらも、業務としてお伺いしてよろしいのですね？」
1904 = "「明白了。那這些問題都是歸為公司業務去諮詢的嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「当然だ。お前やオリヴィのような優秀な\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を、\n御一夜鉄道だって、失いたいはずも無いのだから」
2116 = "「那是當然。你和奧莉薇都是非常優秀的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，御一夜鐵路斷然沒有任何放棄你們的理由」" 

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ、とても光栄なことでございます――――\nふぁっ」
1747 = "「嘻嘻，您能這麼說我真是倍感光榮——呼啊——」" 

# monologue
# JP: 今の話で安心したのか、すずが小さくあくびする。
2360 = "不知是不是剛才的話讓她覺得安心的關係，鈴打了個小小的哈欠。" 

# 【ハチロク】
# display as 鈴
# JP: 「いやだ。失礼をしてしまいました」
1634 = "「哎呀，抱歉我剛剛失態了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「少しも失礼などではないさ。\nすずと話せて、僕もなんだか、眠くなってきた」
1545 = "「何來失態一說。和鈴這樣聊聊天，我也有點睏了呢」" 

# 【ハチロク】
# display as 鈴
# JP: 「うふふ、今日はわたくしたち、はしゃぎましたものね」
1745 = "「嘻嘻，今天我們真的是大玩特玩了一通呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、素晴らしい一日だった」
1915 = "「是啊，真是非常美妙的一天」" 

# monologue
# JP: （きゅっ）
2873 = "（握緊）" 

# monologue
# JP: 絡んだ指の力が強まる。\nすずのてのひらが、僕のこころまで包んでくれる。
2603 = "我握緊了鈴的手。而從掌心傳來的感觸，就如同鈴將我的心捧在手心一般。" 

# 【ハチロク】
# display as 鈴
# JP: 「あしたはきっと、もっと素敵な日になります――\n（ちゅっ）」
1902 = "「明天一定會是比今天更加美妙的一天——（親）」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今ので、さらにハードルがあがったぞ？\n今日より“もっと”は、正直なかなか厳しかろう」
1518 = "「今天已經很難得了哦？要是比今天“更加”的話，實話說，是不是有點困難呀」" 

# 【ハチロク】
# display as 鈴
# JP: 「大丈夫です。双鉄さま。\n明日もずっと、わたくしたちは一緒なのですから」
1946 = "「沒問題的，雙鐵少爺。因為明天我們兩個也都會一直在一起啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1710 = "「嗯」" 

# monologue
# JP: ――大好きだなぁと、しみじみ思う。\n素朴で単純な大好きが、僕の全てを満たしてく。
1010 = "——我再次深感鈴對我的愛。這質樸而單純的愛意，早已充實了我的心。" 

# monologue
# JP: 満ち足りていく。満たされていく。\n眠りが、甘く、ゆるやかに水位をあげていく。
2571 = "就在這滿足和充實的烘托下，甜美的睡意緩緩湧上我的全身。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おやすみ、すず」
2130 = "「鈴，晚安」" 

# 【ハチロク】
# display as 鈴
# JP: 「おやすみなさい、双鉄さま」
2150 = "「雙鐵少爺，晚安」" 

# monologue
# JP: そして手と手をつないだままに――\n僕らはなかよく、眠りに落ちる。
2598 = "我們便這樣十指相牽——一同沉入了夢鄉。" 
