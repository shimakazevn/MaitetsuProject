2505 = "A, đây là cách làm của Olivy."
# monologue
# JP: さすがはふかみ――今までの接客スキルにくわえ、\n新しい技術をもう身につけている。
2671 = "Quả không hổ danh là Fukami——ngoài kỹ năng tiếp khách từ trước đến nay, cô bé đã trang bị thêm cho mình kỹ thuật mới rồi."
# 【ふかみ】
# display as 深美
# JP: 「はぁい。これがポイントシール」
2006 = "「Đây. Tem tích điểm của em đây nhé.」"
# 【ちびっこ】
# display as 小孩
# JP: 「やったあ！」
1800 = "「Hoan hô!」"
# monologue
# JP: \x%lヘッドマーク;#00ffc040;ヘッドマーク%l;#;ステッカー。\n全員配布のものではあるが、予備もある。
2809 = "Nhãn dán \\x%lヘッドマーク;#00ffc040;biểu trưng đầu tàu%l;#;. Dù là phát cho tất cả mọi người, nhưng vẫn có đồ dự phòng."
