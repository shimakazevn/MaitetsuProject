# monologue
# JP: しかも、串そのものも竹製かなにか――\n僕らの、金属のものとはちがう。
2712 = "而且用的也是類似竹子的籤子——我們大人手裡的則都是金屬簽。" 

# 【ちびっこ】
# display as 小悠
# JP: 「ママー、やきたいー」
1806 = "「媽媽，我也想烤」" 

# 【母親】
# display as 母親
# JP: 「はいはい。じゃ、一緒に焼きましょうねー」
1778 = "「好好。那就一起烤吧」" 

# 【ちびっこ】
# display as 小悠
# JP: 「わーい」
1799 = "「好耶」" 

