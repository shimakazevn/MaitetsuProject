2392 = "Nếu làm thế này thì sẽ không có ai bất mãn vì 『không được nhận』, và những người có ý muốn tham gia cao sẽ càng cảm thấy hài lòng hơn."
# 【ふかみ】
# display as 深美
# JP: 「それじゃあ……おかあさん、いいですか？\nこのⅨ号機関車、どこの国で作られたものでしょう？」
2126 = "「Vậy thì……Mẹ của bé ơi, cho phép em hỏi một câu nhé? Đầu máy số 9 này, được chế tạo ở quốc gia nào vậy ạ?」"
# monologue
# JP: ――実に上手い。もし知っていれば、\n今のちびっこが喜びいさんで答えるだろうし……
1013 = "——Thực sự rất khéo léo. Nếu biết, đứa bé vừa rồi chắc chắn sẽ vui vẻ tranh trả lời……"
