[script]
# lines: 502 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わぉ！」
1616 = "「Oa!」"

# monologue
# JP: 目。栗色。ただでさえ大きいのに。\nさらに、こんなに丸くなる。
2524 = "Đôi mắt. Màu hạt dẻ. Bình thường đã to\nrồi.\nGiờ lại còn tròn xoe như thế này."

# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;。伝わってくる。\n歓迎されてる。ものすごく。
2638 = "\\x%l共感;#00ffc040;Cộng cảm%l;#;. Truyền đến đây.\nĐang được chào đón. Vô cùng nồng nhiệt."

# 【ハチロク】
# display as 八六
# JP: 「今日のこの日を、ニイロクとともに迎えられること。\nこころより、嬉しく、誇らしく思います」
1533 = "「Việc có thể cùng Niiroku đón chào ngày\nhôm nay.\nTừ tận đáy lòng, tôi cảm thấy rất vui và\ntự hào.」"

# monologue
# JP: ハチロクは、\x%l共感;#00ffc040;共感%l;#;の意味、あんまりない。\n気持ちと言葉。ものすごく、いつも一緒だから。
2410 = "Hachiroku thì, \\x%l共感;#00ffc040;cộng cảm%l;#; không có nhiều ý\nnghĩa lắm.\nVì cảm xúc và lời nói của cô ấy. Luôn\nluôn, vô cùng đồng nhất với nhau."

# monologue
# JP: 澄ましてるけど、とっても素直。優等生。\nだから。少しだけニガテ。少しだけだけど。
2837 = "Trông có vẻ điềm tĩnh, nhưng lại rất thành\nthật. Một học sinh ưu tú.\nThế nên. Hơi khó đối phó một chút. Dù chỉ\nlà một chút thôi."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ニイロクもヒノモトナデシコなんだね～！\nいいな、クロカミ！　うらやましい！！」
1508 = "「Niiroku cũng là Hinomoto Nadeshiko nhỉ~!\nThích thật đấy, tóc đen! Ghen tị quá đi!!」"

# 【ニイロク】
# display as 二六
# JP: 「…………」
1083 = "「…………」"

# monologue
# JP: オリヴィも、素直は素直。\nけど。感情の浅くまでしか\x%l共感;#00ffc040;共感%l;#;。許してない。
2525 = "Olivy cũng vậy, thành thật thì có thành\nthật.\nNhưng. Cô ấy chỉ cho phép \\x%l共感;#00ffc040;cộng cảm%l;#; chạm\nđến những cảm xúc nông cạn mà thôi."

# monologue
# JP: それはもちろん。当たり前のこと。ごく普通のこと。\nだけど。気になる。何かを、隠していそうな気がする。
2836 = "Chuyện đó tất nhiên. Là điều hiển nhiên.\nVô cùng bình thường.\nNhưng mà. Vẫn thấy tò mò. Cứ có cảm giác\ncô ấy đang giấu giếm điều gì đó."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「さすが試験機、見た目もバッチリ、ビジンさん！\nアカイグージもゴジマンだね～！！」
1993 = "「Đúng là máy thử nghiệm có khác, ngoại\nhình cũng hoàn hảo, là một mỹ nhân nha!\nĐền chủ Akai chắc cũng tự hào lắm đây~!!」"

# 【ニイロク】
# display as 二六
# JP: 「――」
1071 = "「——」"

# monologue
# JP: 清春のこと。言うの。ずるい。
2536 = "Nhắc đến. Kiyoharu. Thật là xảo quyệt."

# monologue
# JP: 表情、動かないけど、動かせないけど、\nほっぺたがカって、あつくなる。
2606 = "Biểu cảm, dù không thay đổi, dù không thể\nthay đổi,\nnhưng hai má lại nóng bừng lên."

# 【ニイロク】
# display as 二六
# JP: 「……当然のこと。そう作られている」
1108 = "「……Đó là điều đương nhiên. Tôi được chế\ntạo ra như vậy mà.」"

# monologue
# JP: だから。表情が動かせないのが。悔しい。恥ずかしい。\nお父さんたちの設計意図を、満たせない自分が情けない。
2637 = "Thế nên. Việc không thể thay đổi biểu cảm.\nThật đáng hận. Thật đáng xấu hổ.\nMột kẻ không thể đáp ứng được ý đồ thiết\nkế của các cha như tôi, thật thảm hại."

# monologue
# JP: それをわかっているはずなのに――\nオリヴィは、ぐいぐい自分に、踏み込んでくる。
2654 = "Đáng lẽ cô ấy phải hiểu điều đó chứ——\nVậy mà Olivy, cứ liên tục dồn ép, xen vào\nchuyện của tôi."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「今日はホータイはずしてきてくれてありがとー！\nホータイやっぱり、お客さんおどろかせちゃいそーだし」
2032 = "「Cảm ơn hôm nay cậu đã tháo băng gạc ra\nnha~!\nQuả nhiên quấn băng gạc, sẽ làm khách hàng\ngiật mình mất」"

# 【ニイロク】
# display as 二六
# JP: 「無関係。自分は、添乗して見学するだけ。\n乗客対応には、出ない」
1610 = "「Không liên quan. Tôi chỉ, đi cùng để tham\nquan thôi.\nSẽ không, ra tiếp khách đâu.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっか！　お客さんのことカンケーなしに、\nお顔見せてくれたならもっとうれしい！」
1855 = "「Vậy sao! Nếu không liên quan đến khách\nhàng,\nmà cậu vẫn cho tớ xem mặt thì tớ còn vui\nhơn nữa!」"

# 【ニイロク】
# display as 二六
# JP: 「顔を見せるためでも。ない」
1500 = "「Cũng không phải. Là để cho xem mặt đâu.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、どーして？」
2095 = "「Thế, tại sao vậy?」"

# monologue
# JP: 理由ならある。\n当然の理由が。
2725 = "Lý do thì có chứ.\nMột lý do hiển nhiên."

# 【ニイロク】
# display as 二六
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;。外燃機関。火の粉が飛ぶ」
1070 = "「\\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#;. Động cơ đốt ngoài. Sẽ\nbị tàn lửa bay\nvào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1701 = "「A!」"

# monologue
# JP: 右田双鉄。この男も、単純。きっと。
2487 = "Migita Soutetsu. Người đàn ông này, cũng\nthật đơn giản. Chắc chắn là vậy."

# monologue
# JP: 人間には\x%l共感;#00ffc040;共感%l;#;が通じないからわからないけど、\n多分、根本的なところが、ハチロクと似てる気がする。
2829 = "Tuy con người không thể \\x%l共感;#00ffc040;cộng cảm%l;#; nên không\nrõ lắm,\nnhưng có lẽ, về cơ bản, anh ta có nét gì\nđó giống với Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。包帯は\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の服のような難燃性ではないものな。しかも、薄く長い故、危ないか」
1576 = "「Ra là vậy. Băng gạc không có tính chống\ncháy như trang phục của \\x%lレイルロオド;#00ffc040;Railord%l;#;. Đã vậy\ncòn mỏng\nvà dài, nên sẽ rất nguy hiểm nhỉ.」"

# monologue
# JP: だけど有能。清春が絶賛するほどに。\n清春が、叶いっこ無い夢を見るほどに。
2364 = "Nhưng lại rất tài năng. Đến mức Kiyoharu\nphải hết lời khen ngợi.\nĐến mức khiến Kiyoharu, lại mơ về một giấc\nmơ không thể thành hiện thực."

# monologue
# JP: そうして自分は、清春のモノ。清春の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。\nだから、叶わなくても。清春の見る夢を見る。
2719 = "Và tôi, là của Kiyoharu. Là \\x%lレイルロオド;#00ffc040;Railord%l;#; của\nKiyoharu.\nNên là, dù không thể thành hiện thực. Tôi\ncũng sẽ mơ cùng một giấc mơ với Kiyoharu."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどけど、キャブ内にヒノコなんてほとんどこないよ？\n窓あるし」
1603 = "「Nhưng mà nhưng mà, tàn lửa hầu như đâu có\nbay vào buồng lái đâu?\nCó cửa sổ mà.」"

# monologue
# JP: （こんこん）
2874 = "（Cốc cốc）"

# 【ニイロク】
# display as 二六
# JP: 「う」
1647 = "「Ư」"

# monologue
# JP: オリヴィ。窓まで叩いてみせる。\n知ってる、そんなこと。添乗。何度もしてきたし。
2527 = "Olivy. Thậm chí còn gõ cả vào cửa sổ cho\nxem.\nTôi biết chứ, mấy chuyện đó. Việc đi cùng\ntàu. Tôi đã làm vô số lần rồi."

# monologue
# JP: けど。そこは。だって――
2459 = "Nhưng mà. Chỗ đó thì. Tại vì——"

# 【赤井】
# display as 赤井
# JP: 「ニイロクは、心配性なんですよ。\n外に出るまでにも、長い時間をかけて見極めたくらい」
1510 = "「Niiroku là người hay lo lắng mà.\nĐến mức phải mất một thời gian dài quan\nsát kỹ lưỡng rồi mới chịu ra ngoài đấy.」"

# 【ニイロク】
# display as 二六
# JP: 「清春」
1963 = "「Kiyoharu」"

# monologue
# JP: 清春。やっぱり助けてくれる。\nわかってくれてる。
2684 = "Kiyoharu. Quả nhiên là anh ấy sẽ giúp tôi.\nAnh ấy hiểu tôi mà."

# monologue
# JP: そう。清春の言うとおり。\n『出ても平気』って。自分は、思った。
2657 = "Đúng vậy. Giống như Kiyoharu nói.\n『Dù có ra ngoài cũng không sao』. Tôi đã,\nnghĩ như vậy."

# 【赤井】
# display as 赤井
# JP: 「ですから、よい機会をいただけたと思っています。\n本当に――ありがとう」
1885 = "「Thế nên, tôi nghĩ đây là một cơ hội rất\ntốt.\nThực sự——cảm ơn mọi người.」"

# 【ニイロク】
# display as 二六
# JP: 「清春……」
1962 = "「Kiyoharu……」"

# monologue
# JP: 清春が。右田双鉄に頭を下げる。\nだから。自分も。頭を下げる。
2680 = "Kiyoharu. Đã cúi đầu trước Migita\nSoutetsu.\nVì thế. Tôi cũng. Phải cúi đầu."

# monologue
# JP: 右田双鉄に。と。それから少し。少しだけ。\nオリヴィとハチロクにも。気持ち。少しは。
2496 = "Trước Migita Soutetsu. Và. Sau đó một\nchút. Chỉ một chút thôi.\nCả Olivy và Hachiroku nữa. Thể hiện lòng\nbiết ơn. Một chút."

# 【双鉄】
# display as 雙鐵
# JP: 「こちらこそです。Ⅸ号の営業運転初日に添乗頂けること、\nなによりこころづよく、ありがたく感じています」
1865 = "「Chúng tôi mới là người phải cảm ơn. Việc\nhai người có thể đi cùng trong ngày đầu\ntiên Đầu máy số 9 đi vào hoạt động thương\nmại,\nđã tiếp thêm cho chúng tôi sức mạnh to\nlớn, chúng tôi thực sự rất biết ơn.」"

# 【赤井】
# display as 赤井
# JP: 「そういっていただけると恐縮です、が――そのために、\n右田さんたちを\x%l客車;#00ffc040;客車%l;#;に追いやってしまうのは」
2077 = "「Cậu nói vậy làm tôi ngại quá, nhưng——vì\nchuyện đó,\nmà lại đẩy anh Migita và mọi người xuống \\x%l客車;#00ffc040;toa hành khách%l;#;\nthì...」"

# 【双鉄】
# display as 雙鐵
# JP: 「いえ、何もなくとも\x%l客車;#00ffc040;客車%l;#;でこの時を迎えるつもりでした。\n僕とハチロクとの教導は、既に終わっていますから」
1951 = "「Không đâu, dù không có chuyện này thì\nchúng tôi cũng định đón khoảnh khắc này ở \\x%l客車;#00ffc040;toa hành khách%l;#;\nmà.\nVì việc huấn luyện của tôi và Hachiroku,\nđã kết thúc từ lâu rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんは完璧です。湯医線に関して、\nわたくしがお教えできることは、もう何もございません」
1771 = "「Olivy-chan đã hoàn hảo rồi ạ. Về Tuyến\nYui,\nkhông còn gì tôi có thể dạy cho cô bé nữa\nđâu.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「へっへーん！」
1754 = "「Hê hê~n!」"

# monologue
# JP: 嬉しさ。自信。誇らしさ。\n\x%l共感;#00ffc040;共感%l;#;が、まっすぐ、まっすぐ、伝えてくる。
2826 = "Sự vui sướng. Tự tin. Tự hào.\n\\x%l共感;#00ffc040;Cộng cảm%l;#;, cứ thế truyền thẳng, truyền\nthẳng đến đây."

# monologue
# JP: ほんの少しだけ。走りたくなる。\nそんな気持ちに、させられそうになるくらい。
2764 = "Chỉ một chút thôi. Tôi lại muốn được chạy.\nĐến mức, khiến tôi suýt nữa thì có cảm\ngiác như vậy."

# 【ハチロク】
# display as 八六
# JP: 「それに……うふふっ、わたくしたち実は、\n\x%l客車;#00ffc040;客車%l;#;乗車を、とても楽しみにしております」
2011 = "「Hơn nữa……ufufu, thực ra chúng tôi,\ncũng đang rất mong chờ được ngồi ở \\x%l客車;#00ffc040;toa hành khách%l;#;\nạ.」"

# 【赤井】
# display as 赤井
# JP: 「それは、いったいどういう理由で？」
2074 = "「Đó là, rốt cuộc là vì lý do gì vậy?」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしたちには、初めてのこととなりますから。\nバアベキウ列車に、乗車いたしますこと」
1562 = "「Bởi vì đây sẽ là lần đầu tiên của chúng\ntôi ạ.\nViệc được ngồi trên chuyến tàu BBQ.」"

# 【ニイロク】
# display as 二六
# JP: 「！」
1668 = "「!」"

# monologue
# JP: すごい。これ。ほっぺた。勝手に赤くなる。\n右田双鉄と一緒に列車に乗れる。それだけで、こんなに。
2539 = "Tuyệt thật. Thế này. Hai má. Tự động đỏ\nbừng lên.\nĐược cùng đi tàu với Migita Soutetsu. Chỉ\nthế thôi, mà đã như vậy rồi."

# monologue
# JP: こんな、好き。まっすぐな、好き。嬉しい。楽しい。\n――ちょっと、すごい。右田双鉄がうらやましくなる。
2549 = "Yêu thích, đến mức này. Sự yêu thích,\nthẳng thắn. Vui sướng. Hạnh phúc.\n——Hơi, lợi hại rồi đấy. Bỗng dưng thấy\nghen tị với Migita Soutetsu."

# 【赤井】
# display as 赤井
# JP: 「ああ、それはそうですよね。\nいままではずっと、牽引でしたものね」
1695 = "「A, ra là vậy.\nTừ trước đến giờ hai người luôn làm nhiệm\nvụ kéo tàu mà nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「はい、ですから」
1939 = "「Vâng, chính vì thế nên...」"

# monologue
# JP: あ。ハチロク。双鉄の服。きゅうってしてる。\nあれ。かわいい。うらやましい。
2499 = "A. Hachiroku. Nắm chặt. Áo của Soutetsu.\nCái đó. Đáng yêu quá. Ghen tị thật."

# monologue
# JP: ……整備ボディをなくしたの。いまさらだけど――\nううん。そんなの。ほんとに、いまさら。
1031 = "……Mình đã mất đi thân máy bảo dưỡng rồi.\nGiờ nói ra thì đã muộn màng——\nKhông. Chuyện đó. Thực sự, đã quá muộn\nrồi."

# 【ハチロク】
# display as 八六
# JP: 「どうぞ、\nご安全な運行を、よろしくおねがいいたしますね？」
2127 = "「Vậy thì,\nxin nhờ mọi người vận hành tàu an toàn\nnhé?」"

# 【赤井】
# display as 赤井
# JP: 「それは、添乗の僕たちにではなく、\n担当\x%l機関士;#00ffc040;機関士%l;#;と\x%l機関助士;#00ffc040;機関助士%l;#;と、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に」
2075 = "「Câu đó, không phải nói với những người đi\ncùng như chúng tôi,\nmà là với \\x%l機関士;#00ffc040;Lái tàu%l;#; phụ trách, \\x%l機関助士;#00ffc040;Phụ lái tàu%l;#;\nvà \\x%lレイルロオド;#00ffc040;Railord%l;#; mới đúng chứ.」"

# 【ハチロク】
# display as 八六
# JP: 「あら、うふふ。左様ですね」
1608 = "「Ây da, ufufu. Đúng là vậy nhỉ.」"

# 【赤井】
# display as 赤井
# JP: 「無論、万一のことがあれば、\n\x%l投炭;#00ffc040;投炭%l;#;くらいはお手伝いできるかとは思います、が――」
1984 = "「Tất nhiên, nếu lỡ có chuyện gì xảy ra,\ntôi nghĩ mình cũng có thể giúp đỡ \\x%l投炭;#00ffc040;xúc than%l;#;\nmột chút, nhưng mà——」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「マンイチなんておこさないよー！\nそのために！　ばっちり準備してきたんだから！」
1479 = "「Sẽ không có chuyện lỡ như đâu~!\nBởi vì! Bọn tớ đã chuẩn bị hoàn hảo hết\nrồi!」"

# 【凪】
# display as 凪
# JP: 「オイル、走行分点検完了ばい！！」
2047 = "「Đã kiểm tra xong dầu mỡ cho phần chạy rồi\nnè!!」"

# 【日々姫】
# display as 日日姬
# JP: 「灰箱きれーに掃除してきた！\nどこもかしこも、Ⅸ号機関車、ピッカピカ！」
1966 = "「Hộp tro cũng đã được dọn dẹp sạch sẽ rồi!\nKhắp mọi nơi trên Đầu máy số 9, đều bóng\nlộn luôn!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
1713 = "「Ừm!」"

# monologue
# JP: 戻ってきた。蓑笠と右田妹。自分の目には、\n\x%l機関士;#00ffc040;機関士%l;#;としては、右田妹のほうが少し上等に見える。
2737 = "Đã quay lại. Minokasa và em gái Migita.\nTrong mắt tôi,\nxét về vai trò \\x%l機関士;#00ffc040;Lái tàu%l;#;, em gái Migita\ntrông có vẻ nhỉnh hơn một chút."

# monologue
# JP: けど、交代制でやるって聞いた。\n初の営業運転の――記念の今日が、蓑笠\x%l機関士;#00ffc040;機関士%l;#;だとも。
2365 = "Nhưng mà, nghe nói họ sẽ làm theo chế độ\nluân phiên.\nChuyến đi thương mại đầu tiên——ngày kỷ\nniệm hôm nay, \\x%l機関士;#00ffc040;Lái tàu%l;#; sẽ là Minokasa."

# monologue
# JP: （ふしぎ。けど――。右田妹。納得してるみたい。\n実際に。チームワークも。すごくいい）
2856 = "（Kỳ lạ thật. Nhưng mà——. Em gái Migita. Có\nvẻ rất hài lòng.\nThực tế thì. Tinh thần làm việc nhóm. Cũng\nrất tuyệt.）"

# monologue
# JP: 右田双鉄の顔も、安心してるみたい。\nハチロクの手。まだきゅって。右田のシャツを持ったまま。
2586 = "Vẻ mặt của Migita Soutetsu, cũng có vẻ rất\nan tâm.\nTay của Hachiroku. Vẫn nắm chặt. Vẫn đang\ntúm lấy áo của Migita."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、なにかあるか？」
1841 = "「Hachiroku, có chuyện gì sao?」"

# 【ハチロク】
# display as 八六
# JP: 「いえ、双鉄さま。わたくしからは、もう、なにも」
2151 = "「Dạ không, ngài Soutetsu. Từ phía em,\nkhông còn gì nữa đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1781 = "「Vậy sao.」"

# monologue
# JP: 右田双鉄がじっと見る。\n右田妹を。蓑笠を。オリヴィを。
2488 = "Migita Soutetsu nhìn chằm chằm.\nVào em gái Migita. Vào Minokasa. Vào\nOlivy."

# monologue
# JP: 見られた相手の背筋が伸びる。引き締まるのに。顔が喜ぶ。\n教導――すごく。いいものだったって。伝わってくる。
2770 = "Những người bị nhìn đều thẳng lưng lên.\nTrông rất căng thẳng. Nhưng khuôn mặt lại\nlộ rõ vẻ vui sướng.\nSự huấn luyện——rất. Tuyệt vời. Điều đó đã\nđược truyền đạt lại."

# 【双鉄】
# display as 雙鐵
# JP: 「それでは――少しいいですか？\n\x%l機関士;#00ffc040;機関士%l;#;さん、\x%l機関助士;#00ffc040;機関助士%l;#;さん、それから\x%lレイルロオド;#00ffc040;レイルロオド%l;#;さん」
2092 = "「Vậy thì——xin phép một chút được không?\n\\x%l機関士;#00ffc040;Lái tàu%l;#;, \\x%l機関助士;#00ffc040;Phụ lái tàu%l;#;, và cả \\x%lレイルロオド;#00ffc040;Railord%l;#; nữa.」"

# 【オリヴィ】
# display as 奥莉薇＆凪
# JP: 「！」\n「！！？」
1649 = "「!」\n「!!?」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、はい、なんでしょう――\nあっ！　じゃなくて！　えとっ、蓑笠\x%l機関士;#00ffc040;機関士%l;#;」
1683 = "「A, vâng, có chuyện gì vậy ạ——\nÁ! Không phải! Ờm, \\x%l機関士;#00ffc040;Lái tàu%l;#; Minokasa.」"

# 【凪】
# display as 凪
# JP: 「あわっ！？　あ！　そうだったば――ん――\nそうでした」
1514 = "「Á!? A! Đúng rồi nè——ưm——\nĐúng là vậy ạ.」"

# monologue
# JP: あ。蓑笠が。『ばい』っていってない。\nかなり綺麗な標準語。
2503 = "A. Minokasa. Không nói \"nè\".\nMà dùng tiếng phổ thông khá chuẩn."

# monologue
# JP: そういえば、清春がいってた気がする。\n銀行の誰だかに、標準語の特訓受けている。とか。
2777 = "Nhắc mới nhớ, hình như Kiyoharu từng nói.\nĐang được ai đó ở ngân hàng huấn luyện đặc\nbiệt về tiếng phổ thông. Hay gì đó."

# 【凪】
# display as 凪
# JP: 「なんでしょうか？　お客様」
2071 = "「Quý khách có việc gì cần dặn dò ạ?」"

# monologue
# JP: 右田双鉄。すごく。嬉しそう。
2489 = "Migita Soutetsu. Vô cùng. Trông có vẻ vui\nsướng."

# monologue
# JP: 右田双鉄とハチロクの教導――\nこんなことも。その成果なのかもしれない。
2455 = "Sự huấn luyện của Migita Soutetsu và\nHachiroku——\nNgay cả những chuyện như thế này. Có lẽ\ncũng là thành quả của nó."

# 【双鉄】
# display as 雙鐵
# JP: 「今日の旅行を、\n妻とふたり、ずっと楽しみにしていました」
1869 = "「Chuyến du lịch hôm nay,\nhai vợ chồng chúng tôi, đã mong chờ từ rất\nlâu rồi.」"

# 【凪】
# display as 凪
# JP: 「！！！」
1638 = "「!!!」"

# monologue
# JP: 蓑笠の目。まん丸になる。\n他の人たちも、オリヴィも、驚いてる。
2742 = "Đôi mắt của Minokasa. Tròn xoe.\nNhững người khác, cả Olivy nữa, đều đang\nkinh ngạc."

# 【ハチロク】
# display as 八六
# JP: 「……」
# 1083 = "「……」" 

# monologue
# JP: ハチロクは少しも驚いてない。
2404 = "Hachiroku thì không hề ngạc nhiên chút\nnào."

# monologue
# JP: ハチロクからの\x%l共感;#00ffc040;共感%l;#;が、自分を溺れさせそうになる。\nしあわせで。うれしくて。自慢で。それで、いっぱいで。
2584 = "\\x%l共感;#00ffc040;Cộng cảm%l;#; từ Hachiroku, dường như sắp nhấn\nchìm tôi.\nHạnh phúc. Vui sướng. Tự hào. Tràn ngập\nnhững cảm xúc đó."

# 【双鉄】
# display as 雙鐵
# JP: 「ですから、どうか。おねがいします。\n安全で、素敵な旅を、私達に」
1888 = "「Vì vậy, xin nhờ mọi người.\nHãy mang đến cho chúng tôi, một chuyến đi\nan toàn và tuyệt vời.」"

# 【凪】
# display as 凪
# JP: 「～～っ！　『わかりました』」
1651 = "「~~! 『Đã rõ ạ』」"

# monologue
# JP: 蓑笠が。深く。頭を下げる。\n右田妹も。オリヴィまで。
2749 = "Minokasa. Cúi đầu. Thật sâu.\nCả em gái Migita. Cả Olivy nữa."

# 【凪】
# display as 凪
# JP: 「でもって！！\nわかったとばい！　まーかせーろばーい！！」
1880 = "「Và thế là!!\nĐã rõ rồi nè! Cứ giao cho bọn này đi\nnha!!」"

# 【日々姫】
# display as 日日姬
# JP: 「あはっ！」
1667 = "「Aha!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
# 1713 = "「嗯！」" 

# monologue
# JP: 蓑笠が笑ったら。みんなも笑顔。\n表情。もしも動いていたら。きっと。自分も。
2701 = "Khi Minokasa cười. Mọi người cũng mỉm cười\ntheo.\nBiểu cảm. Nếu như có thể thay đổi. Chắc\nchắn. Mình cũng sẽ."

# monologue
# JP: 右田双鉄が。小さく頷く。\nハチロクの手を取り直して。キャブから外に――
2490 = "Migita Soutetsu. Khẽ gật đầu.\nNắm lại tay Hachiroku. Bước ra khỏi buồng\nlái——"

# 【凪】
# display as 凪
# JP: 「あっ！　あのっ！！」
1671 = "「A! Cái đó!!」"

# monologue
# JP: 蓑笠が軍手を外して右手を差し出す。
2741 = "Minokasa tháo găng tay lao động ra và chìa\ntay phải về phía trước."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1665 = "「À.」"

# 【日々姫】
# display as 日日姬
# JP: 「教導、ありがとうございました。それから――\nにぃに！　ハチロク！　旅行、たくさん楽しんでね！」
2155 = "「Cảm ơn vì đã huấn luyện bọn em. Với lại——\nAnh hai! Hachiroku! Chúc hai người đi du\nlịch thật vui vẻ nha!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1710 = "「Ừm.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いい教導だったよー！\nありがとね！　ソーテツ、ハチロク！」
1549 = "「Buổi huấn luyện tuyệt lắm đó~!\nCảm ơn nha! Soutetsu, Hachiroku!」"

# monologue
# JP: 右田と握手。蓑笠が。右田妹が。オリヴィも。
2745 = "Bắt tay với Migita. Minokasa. Em gái\nMigita. Cả Olivy nữa."

# 【ハチロク】
# display as 八六
# JP: 「……いつの間に、\x%l罐屋;#00ffc040;罐屋%l;#;の手に育ちましたね」
1091 = "「……Không biết từ lúc nào, đã trở thành đôi\ntay của \\x%l罐屋;#00ffc040;thợ máy%l;#; rồi nhỉ.」"

# 【凪】
# display as 凪
# JP: 「ずーっとがんばっとるけんね！　とーぜんばい！！」
1615 = "「Bọn này vẫn luôn cố gắng mà lị! Đương\nnhiên rồi nè!!」"

# monologue
# JP: それから。ハチロクとも、順番に。
2716 = "Sau đó. Lần lượt, với cả Hachiroku nữa."

# 【赤井】
# display as 赤井
# JP: 「……いいものですねぇ」
1104 = "「……Thật là tuyệt vời nhỉ.」"

# 【ニイロク】
# display as 二六
# JP: 「うん。いいものと。自分も思う」
1725 = "「Ừm. Rất tuyệt vời. Tôi cũng nghĩ vậy.」"

# monologue
# JP: ……けど。清春もニイロクも。握手しない。\n添乗だから。このチームの、一員じゃないから。
1033 = "……Nhưng mà. Cả Kiyoharu và Niiroku. Đều\nkhông bắt tay.\nVì chỉ đi cùng thôi. Không phải là, một\nthành viên của đội này."

# 【双鉄】
# display as 雙鐵
# JP: 「それでは、乗務前のお忙しいときに、失礼しました」
2105 = "「Vậy thì, xin lỗi vì đã làm phiền mọi\nngười trước giờ làm nhiệm vụ.」"

# 【ハチロク】
# display as 八六
# JP: 「うふふっ、どうぞ、よい乗務を」
1749 = "「Ufufu, chúc mọi người, có một chuyến đi\nthuận lợi.」"

# monologue
# JP: 右田とハチロクの足音が消える。
2486 = "Tiếng bước chân của Migita và Hachiroku xa\ndần."

# monologue
# JP: 途端にパーン。すごい音。\n蓑笠が、自分で自分のほっぺたを、ぶった音。
2803 = "Đột nhiên vang lên tiếng \"Bốp\". Một âm\nthanh rất lớn.\nLà tiếng Minokasa, tự tát vào má mình."

# 【凪】
# display as 凪
# JP: 「よーーーっし！　やるばい！　がんばるばい！\nにーさんの信頼に答えるばいっ！」
1777 = "「Đượ——c rồi! Làm thôi nè! Cố lên nè!\nPhải đáp lại sự tin tưởng của anh hai nè!」"

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　\n\x%l溶栓;#00ffc040;溶栓%l;#;よし！　\x%l火床;#00ffc040;火床%l;#;良し！　ボイラー水位、85％！」
1711 = "「Ừm!\n\\x%l溶栓;#00ffc040;Nút chảy an toàn%l;#; tốt! \\x%l火床;#00ffc040;Buồng lửa%l;#; tốt! Mực\nnước lò hơi, 85%!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「\x%l空気圧縮機;#00ffc040;空気圧縮機%l;#;正常！　機器類全てイジョーなしだよー！」
1067 = "「\\x%l空気圧縮機;#00ffc040;Máy nén khí%l;#; bình thường! Toàn bộ thiết bị\nmáy móc\nkhông có gì bất thường~!」"

# 【凪】
# display as 凪
# JP: 「ブレーキテスト、よし！　\n日々ねーちゃん、ブロア弁閉じ。\x%l投炭;#00ffc040;投炭%l;#;、二分で二十！」
1569 = "「Kiểm tra phanh, tốt!\nChị Hibiki, đóng van thiết bị thổi gió. \\x%l投炭;#00ffc040;Xúc than%l;#;\n, hai mươi xẻng trong hai phút!」"

# 【日々姫】
# display as 日日姬
# JP: 「了解！　\x%l投炭;#00ffc040;投炭%l;#;、二分で二十！」
1782 = "「Đã rõ! \\x%l投炭;#00ffc040;Xúc than%l;#;, hai mươi xẻng trong hai\nphút!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いよいよだねー」
2007 = "「Sắp bắt đầu rồi nhỉ~」"

# monologue
# JP: そう。いよいよ。\n出発準備。全部が、順調に進んでく。
2660 = "Đúng vậy. Sắp bắt đầu rồi.\nChuẩn bị xuất phát. Mọi thứ, đều đang diễn\nra thuận lợi."

# 【赤井】
# display as 赤井
# JP: 「ニイロク。見えていますか？\nオリヴィの動きが、指示が」
1512 = "「Niiroku. Cô có thấy không?\nChuyển động, và những chỉ thị của Olivy.」"

# 【ニイロク】
# display as 二六
# JP: 「うん。見えてる。――見てる」
1731 = "「Ừm. Thấy rồi.——Đang nhìn đây.」"

# monologue
# JP: 見てる。本当に、真剣に。
2771 = "Đang nhìn. Thực sự, rất nghiêm túc."

# monologue
# JP: だからわかる。\nオリヴィが、どれだけ我慢強いのか。
2634 = "Nên tôi mới hiểu.\nOlivy, giỏi chịu đựng đến mức nào."

# monologue
# JP: （注意。すごくしたがってる。\nけど――待ってる――自分たちで気づくの――あっ！）
2870 = "（Cảnh báo. Rất muốn làm theo.\nNhưng mà——đang chờ đợi——để họ tự nhận\nra——a!）"

# 【日々姫】
# display as 日日姬
# JP: 「あれっ！？　凪ちゃん。時計っ！\nこれ、もーちょっと焚いた方が良くない？」
1612 = "「Ủa!? Nagi-chan. Đồng hồ kìa!\nCái này, đốt thêm chút nữa thì tốt hơn\nđúng không?」"

# 【凪】
# display as 凪
# JP: 「わ！？　もーこんな時間ばいっ！？\nなら、二分で六十！　頼むばい！」
1680 = "「Oa!? Đã giờ này rồi sao nè!?\nVậy thì, sáu mươi xẻng trong hai phút! Nhờ\nchị nha!」"

# 【日々姫】
# display as 日日姬
# JP: 「了解！　二分で六十！！」
1784 = "「Đã rõ! Sáu mươi xẻng trong hai phút!!」"

# monologue
# JP: ……オリヴィ。\x%l共感;#00ffc040;共感%l;#;。喜んでる。ホッとしてる。\n自分なら、もっと早く注意してた。多分、ハチロクも同じ。
1049 = "……Olivy. \\x%l共感;#00ffc040;Cộng cảm%l;#;. Đang vui mừng. Đang thở\nphào nhẹ nhõm.\nNếu là tôi, tôi đã nhắc nhở sớm hơn rồi.\nCó lẽ, Hachiroku cũng vậy."

# monologue
# JP: でも、オリヴィは、ギリギリまで待つ。\nあと十秒は――\x%l共感;#00ffc040;共感%l;#;でそう伝わってきてた。
2397 = "Nhưng, Olivy lại chờ đến tận giây phút\ncuối cùng.\nMười giây nữa——\\x%l共感;#00ffc040;cộng cảm%l;#; đã truyền đạt như\nvậy."

# 【ニイロク】
# display as 二六
# JP: 「……ちゃんと、見てる。今はまだわからないことも。\n全部、見て――ニイロクは、ちゃんと、覚えてる」
1099 = "「……Tôi đang, nhìn rất kỹ. Cả những điều\nbây giờ vẫn chưa hiểu.\nTất cả, đều nhìn——Niiroku sẽ, ghi nhớ thật\nkỹ.」"

# 【赤井】
# display as 赤井
# JP: 「そうですか」
2082 = "「Vậy sao.」"

# 【ニイロク】
