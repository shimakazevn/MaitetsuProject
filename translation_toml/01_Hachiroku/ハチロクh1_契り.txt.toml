1229 = "「Hia!? A――Ngài Soutetsu――Ngài Soutetsu,\nđang――\nƯm! Bướm――của, em――ưm.」"

# monologue
# JP: （ツ――れるっ――れろっ――じゅっ――じゅるっ――）
2149 = "（Liếm――liếm láp――liếm láp――chụt――chụt――）"

# 【ハチロク】
# display as 八六
# JP: 「あひっ――やっ――あうっっ……おまん、まん――\nはっ――あっ――とけ、ちゃうっ――んうっ」
1245 = "「Ahi――A――Aư……Bướm, bướm――\nHa――A――Tan chảy,\nmất thôi――Ưm.」"

# monologue
# JP: ああ、やはりこれが正解だ。
1774 = "À, quả nhiên đây mới là cách làm đúng."

# monologue
# JP: くちづけたまま、割り入った舌でほじくるように、\n外から中へとゆるゆると、螺旋を描き舐めほぐす。
1949 = "Vẫn giữ nguyên nụ hôn, tôi dùng chiếc lưỡi\nđã len lỏi vào trong như đang ngoáy móc,\ntừ ngoài vào trong, từ từ liếm láp theo\nhình xoắn ốc để nới lỏng ra."

# 【ハチロク】
# display as 八六
# JP: 「やっ――あっ――うねうね――してっ――んっ――\nおなか――おまんまんっ――あっ、舐めて――ん、ふっ」
1217 = "「A――A――Uốn lượn――như vậy――Ưm――\nBụng――Bướm――A, liếm đi――Ưm, phù.」"

# monologue
# JP: じゅぶじゅぶ、口におつゆが溢れる。
2086 = "Nhóp nhép, nước dâm tràn ngập trong miệng\ntôi."

# monologue
# JP: 舐めて平気かと思ったが、無味無臭の、\nほとんど水の……上等の水の味わいだ。
1999 = "Lúc đầu tôi còn lo không biết liếm có sao\nkhông, nhưng nó vô vị vô hương,\ngần như là\nnước……hương vị của một loại nước thượng\nhạng."

# monologue
# JP: （じゅるるうるるるっ）
2179 = "（Chùn chụt chùn chụt）"

# 【ハチロク】
# display as 八六
# JP: 「やあアッ！　音、音をたてて――んっ――\nおまんまん――すっちゃ――いや、ですうっ」
1224 = "「Aaa! Phát ra, âm thanh như vậy――Ưm――\nBướm――Bị mút――Không, chịu đâu.」"

# monologue
# JP: （ほじっ）
2124 = "（Ngoáy）"

# 【ハチロク】
# display as 八六
# JP: 「ひゃうんっ！！？」
1226 = "「Hyaưn!!?」"

# monologue
# JP: イヤといわれれば続けない。
1781 = "Bảo không chịu thì tôi sẽ không làm tiếp\nnữa."

# monologue
# JP: 代わりに栓をするように、舌をいっぱいに伸ばし舐めれば、\nこれはこれで、ハチロクはがくがくと腰を震わす。
1920 = "Thay vào đó, như để đóng nút lại, tôi thè\nlưỡi ra liếm láp,\nđiều này lại khiến\nHachiroku run rẩy cả hông."

# 【ハチロク】
# display as 八六
# JP: 「あ……ひっ――んっ――あっ――あああっ」
1253 = "「A……Hi――Ưm――A――Aaaa.」"

# monologue
# JP: 舐める。舐める。ひたすら舐めて、\n舌でほじって、音を立てぬようおつゆを飲み干す。
1907 = "Liếm. Liếm. Tôi say sưa liếm láp,\ndùng\nlưỡi tách mở khe hở, lặng lẽ nuốt trọn thứ\ndịch nhờn ướt át."

# monologue
# JP: ……どれくらい、そうした時間を過ごしただろう。\nハチロクが、とろとろに溶けた声を出す。
953 = "……Không biết đã qua bao lâu rồi.\nHachiroku\ncất lên giọng nói mềm nhũn như tan chảy."

# 【ハチロク】
# display as 八六
# JP: 「そう……てつ、さまっ――わたくし――おまん、まん、\nもう、とけそう、で――切なく、てっ」
1508 = "「Ngài…… Soutetsu——cô bé, của em,\nsắp, tan\nchảy mất rồi——khó chịu, quá——っ」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――僕の方も、もう限界だ」
1274 = "「Ừm——Anh cũng, đến giới hạn rồi.」"

# monologue
# JP: 勃起がヘソまで反り返り、軽く腹肉を押している。\n舌もいささかしびれるほどだ。
1778 = "Dục vọng cương cứng vươn thẳng tới tận\nrốn, ép nhẹ vào phần bụng dưới.\nLưỡi tôi\ncũng đã hơi tê dại."

# 【双鉄H】
# display as 雙鐵
# JP: （さすがに、十二分にほぐせただろう）
2183 = "（Chắc là, đã đủ mềm mại rồi nhỉ）"

# 【ハチロク】
# display as 八六
# JP: 「あっ――」
# 1243 = "「啊——」" 

# monologue
# JP: 足を持ち上げ押し広げれば、\n体がくにゃくにゃだとわかる。
1923 = "Nâng đôi chân em lên và dang rộng ra,\ntôi\ncó thể cảm nhận được cơ thể em đang mềm\nnhũn."

# monologue
# JP: ハチロクは全身くったりと力をぬいて、\nただおまんまんだけを貪欲にひくつかせてる。
1706 = "Hachiroku buông thõng toàn thân, không còn\nchút sức lực,\nchỉ có cô bé là đang co giật\nđầy tham lam."

# 【双鉄H】
# display as 雙鐵
# JP: 「少しずつ――挿れてみるぞ」
1369 = "「Anh sẽ từ từ——tiến vào nhé」"

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄――様っ」
1314 = "「Vâng, ngài Soutetsu——」"

# monologue
# JP: ハチロクの声がわずかに震える。\n僕の体も、震えてる。
1718 = "Giọng Hachiroku hơi run rẩy.\nCơ thể tôi\ncũng đang run lên."

# monologue
# JP: 不安と期待両方が、\n僕らを支配し――心まで強く、つなげてくれる。
1857 = "Cả sự bất an lẫn kỳ vọng,\nđang chi phối\nchúng tôi——kết nối cả trái tim lại với\nnhau thật bền chặt."

# monologue
# JP: （ぴとっ）
2180 = "（Chạm nhẹ）"

# 【ハチロク】
# display as 八六
# JP: 「んふううっっ！」
1287 = "「Ưm hưm!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1242 = "「唔！」" 

# monologue
# JP: 柔肉に勃起を押し付ける。\nただそれだけで、肉がうねって吸い付いてくる。
2038 = "Tôi ép phần thịt cương cứng vào lớp thịt\nmềm mại.\nChỉ vậy thôi, phần thịt ấy đã uốn\néo và mút chặt lấy tôi."

# monologue
# JP: 熱い塊がただそれだけでせり上がってきて、\n必死に堪え、落ち着くための息を吐く――
1996 = "Dục vọng nóng bỏng cứ thế dâng trào,\ntôi\ntuyệt vọng kìm nén, thở hắt ra để bình\ntĩnh lại——"

# 【ハチロク】
# display as 八六
# JP: 「触れただけで……これほど……ここちよいのなら……」
1170 = "「Chỉ mới chạm vào thôi…… mà đã…… sung\nsướng thế này thì……」"

# monologue
# JP: ハチロクが言葉にしてくれる。\n僕の期待を。僕の不安を。
1941 = "Hachiroku đã nói thay tiếng lòng tôi.\nCả\nsự kỳ vọng. Cả nỗi bất an."

# monologue
# JP: 心が重なりあっているから、\n体もやはり、もっと深くに重なりたくなる。
1890 = "Vì trái tim đã hòa quyện vào nhau,\nnên thể\nxác cũng muốn được hòa quyện sâu sắc hơn\nnữa."

# monologue
# JP: （しにゅっ――すっ――するっ――すりゅっ）
2138 = "（Phập——sượt——trượt——sột sột）"

# 【ハチロク】
# display as 八六
# JP: 「やぁっ――あっ――おまんまんの――すじっ――\nこすられ、てっ――んっ――ふあっ！」
1214 = "「Nhá——a——khe hở——của cô bé——\nđang bị cọ\nxát——ưm——ư a!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――あっ――」
1239 = "「Hự——a——」"

# monologue
# JP: 息が漏れる。声が溢れる。\n歯を思い切りかみしめていても、その隙間から。
1917 = "Hơi thở rò rỉ. Tiếng rên rỉ tuôn trào.\nDù\ncó cắn chặt răng đến đâu, âm thanh vẫn lọt\nqua kẽ răng."

# monologue
# JP: 快感が背筋をかけのぼり、\nそれがあまりに強くてぞくぞくしすぎて殆ど吐きそうで。
1863 = "Khoái cảm chạy dọc sống lưng,\nmạnh mẽ đến\nmức khiến tôi run rẩy, gần như buồn nôn."

# 【ハチロク】
# display as 八六
# JP: 「あ……ンッ――ふあっ――あっ――双鉄、ッ様っ――\nじらしちゃ……あっ――いや、ですっ――んっ」
1257 = "「A……ưm——ư a——a——Ngài Soutetsu——\nĐừng trêu\nem nữa……a——không chịu, đâu——ưm」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1312 = "「Ừm」"

# monologue
# JP: もう、これ以上はほぐせない。
1845 = "Không thể nào nới lỏng thêm được nữa."

# monologue
# JP: ハチロクの肉は蕩けきってて、\n僕を求めて張り付き吸い付き抱きついてくる。
1719 = "Lớp thịt của Hachiroku đã hoàn toàn tan\nchảy,\nbám chặt, mút lấy và ôm trọn lấy tôi\nnhư đang khao khát."

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば――いくぞっ」
1499 = "「Vậy thì——anh vào đây」"

# monologue
# JP: （つぷっ）
2165 = "（Phập）"

# 【ハチロク】
# display as 八六
# JP: 「かはっ！？」
1272 = "「A!?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1242 = "「唔！」" 

# monologue
# JP: 甘さに、鋭さが混じる声。\n理由を、僕の勃起の先端が教えてくれる。
1796 = "Giọng nói ngọt ngào xen lẫn sự chói tai.\nLý do thì, phần đầu đang cương cứng của\ntôi đã cho tôi biết."

# 【双鉄H】
# display as 雙鐵
# JP: 「痛むのか？」
1337 = "「Đau sao em?」"

# 【ハチロク】
# display as 八六
# JP: 「少し――少し、だけ――いっぱい、で――んっ」
1212 = "「Một chút——chỉ một chút, thôi——vì đầy ắp,\nquá——ưm」"

# monologue
# JP: 少しだけ、などということはありえない。
1866 = "Không thể nào chỉ là một chút được."

# monologue
# JP: 僕の勃起の先端は、これほどやわらかい肉なのに、\nなおぎゅうぎゅうと圧されて、痛みを感じるほどだから。
1692 = "Phần đầu đang cương cứng của tôi, dù được\nbao bọc bởi lớp thịt mềm mại đến thế,\nnhưng vẫn bị ép chặt đến mức tôi cũng cảm\nthấy đau đớn."

# 【ハチロク】
# display as 八六
# JP: 「そう、てつ――さまっ――くちづけ、を――\nどうか、わたくしに――」
1509 = "「Ngài Soutetsu——hãy hôn, em đi——\nxin ngài,\nhãy hôn em——」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1281 = "「嗯」" 

# monologue
# JP: （れるっ）
2133 = "（Sượt）"

# 【ハチロク】
# display as 八六
# JP: 「んふうっ――んっ――」
1286 = "「Ưm hưm——ưm——」"

# monologue
# JP: （れるっ――れろっ――じゅちゅっ――じゅるっ）
2132 = "（Sượt——sượt——chụt——chu mút）"

# monologue
# JP: ハチロクの唇を押し割って、\n短い舌に舌を絡めて、吸い込むようになめさする。
1943 = "Tôi cạy mở đôi môi Hachiroku,\nquấn lấy\nchiếc lưỡi ngắn của em, mút mát và liếm\nláp."

# monologue
# JP: （きゅっ――きゅきゅっ）
2129 = "（Siết chặt——siết chặt）"

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ」
# 1281 = "「嗯」" 

# monologue
# JP: そうしていると、締め付けがいくらか和らいでくる。
1975 = "Làm vậy, sự co thắt cũng dịu đi phần nào."

# monologue
# JP: そうか、他の部分を気持よくして、\n意識をほぐし、ちらせれば――
1747 = "Ra là vậy, chỉ cần làm cho những bộ phận\nkhác cảm thấy sung sướng,\nđể tâm trí em\nthư giãn và phân tán sự chú ý thì——"

# monologue
# JP: （くりゅっ）
2164 = "（Nắn nắn）"

# 【ハチロク】
# display as 八六
# JP: 「んううううっ！」
# 1287 = "「嗯嗚——！」" 

# monologue
# JP: そう思いつつ乳首をさすれば、\n途端にハチロクは激しくひくつく。
1976 = "Nghĩ vậy, tôi liền xoa nắn đầu ngực em,\nngay lập tức Hachiroku co giật dữ dội."

# monologue
# JP: おまんまんはすりつぶすほどでなく、\nきゅうくつ――と言える範囲の締め付けになる。
1829 = "Cô bé không còn siết chặt đến mức nghiền\nnát nữa,\nmà chỉ còn ở mức chật chội——có\nthể nói là vậy."

# 【双鉄H】
# display as 雙鐵
# JP: （これ、なら――いける、か？）
2157 = "（Thế này, thì——vào được, chưa nhỉ?）"

# monologue
# JP: 口には出さない。\nハチロクをまたこわばらせるに決まってるから。
1910 = "Tôi không nói ra miệng.\nVì chắc chắn sẽ\nlàm Hachiroku căng thẳng trở lại."

# monologue
# JP: 代わりにキスの雨を降らせて、\n乳首をなんども、しつこくしつこくいじりたおして――
1896 = "Thay vào đó, tôi trút xuống những nụ hôn\nnhư mưa,\nliên tục, liên tục trêu đùa đầu\nngực em——"

# monologue
# JP: （ずっ――ぬっ――ずぶううううっ！――プツっ）
2177 = "（Phập——phập——phập phập phập!——Bục）"

# 【ハチロク】
# display as 八六
# JP: 「きゃふうっっっっ！？」
1225 = "「Kya hưm!?」"

# monologue
# JP: （みちみちみちみちっ！）
2176 = "（Siết chặt siết chặt!）"

# 【双鉄H】
# display as 雙鐵
# JP: 「うあ――あっ」
1240 = "「Ư a——a」"

# monologue
# JP: 勃起の先が何かをぷつりと切った感触。\nそこから先は、肉を割るような強烈すぎる密着感。
2036 = "Cảm giác phần đầu cương cứng vừa xuyên\nthủng thứ gì đó.\nTừ đó trở đi là một cảm\ngiác áp sát mãnh liệt như xé toạc da thịt."

# 【ハチロク】
# display as 八六
# JP: 「あっ――ふあっ――あっ――あひっ――」
1251 = "「A——ư a——a——a hi——」"

# monologue
# JP: （こつっ）
2126 = "（Cộc）"

# 【ハチロク】
# display as 八六
# JP: 「んきゅううううっ！！」
1282 = "「Ưm kyaaa!!」"

# monologue
# JP: やがて、先端が奥に当たって、痺れるような快感で――\n僕は、わずかにも動けなくなる。
2040 = "Cuối cùng, phần đầu cũng chạm đến tận\ncùng, mang theo khoái cảm tê dại——\nTôi\nkhông thể nhúc nhích dù chỉ một chút."

# 【ハチロク】
# display as 八六
# JP: 「あ……わたくし――わたくし、双鉄様と――\nひとつ、に――やっと――」
1260 = "「A……em——em, với ngài Soutetsu——\ncuối cùng,\ncũng hòa làm một——rồi——」"

# monologue
# JP: ぽろりと、ハチロクの目が涙をこぼす。\n痛みと、きっと喜びのため。
1716 = "Nước mắt tuôn rơi từ khóe mắt Hachiroku.\nVì đau đớn, và chắc chắn là cả vì vui\nsướng nữa."

# monologue
# JP: 何か気の利いたことを言いたくて。\nなのに快感が強烈すぎて、欲望で脳が濁ってる。
1913 = "Tôi muốn nói điều gì đó thật tinh tế.\nNhưng khoái cảm quá mãnh liệt, dục vọng\nlàm mờ đi lý trí."

# 【ハチロク】
# display as 八六
# JP: 「双鉄……様――どうぞ、お好きになさってください」
1511 = "「Ngài Soutetsu……——xin ngài, cứ làm những\ngì ngài muốn đi ạ」"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？　しかし、お前、痛みが――」
1293 = "「!? Nhưng mà, em, đang đau——」"

# 【ハチロク】
# display as 八六
# JP: 「確かに、痛みも……ございます――ですが……んっ」
1431 = "「Quả thực, cũng có……đau đớn——nhưng mà……ưm」"

# monologue
# JP: ハチロクが言葉を発するだけで、\nおまんまんの中が震えて、快感がざわり押し上がってくる。
1713 = "Chỉ cần Hachiroku cất tiếng,\nbên trong cô\nbé lại run lên, khoái cảm dâng trào mạnh\nmẽ."

# 【ハチロク】
# display as 八六
# JP: 「それ以上に……喜びと……心地よさ、とが――あっ、\n双鉄、様、と……契りを――結べ……ました、から」
1149 = "「Hơn thế nữa……niềm vui và……sự sung\nsướng——a,\nbởi vì……em đã được……kết——duyên,\ncùng ngài Soutetsu……rồi」"

# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな――僕らは、契りを結んだ。\n切ってもきれぬ――お互いの、男と女に、なれたのだ」
1387 = "「Đúng vậy——chúng ta, đã kết duyên rồi.\nChúng ta đã trở thành người đàn ông và\nngười phụ nữ của nhau——không thể tách rời」"

# 【ハチロク】
# display as 八六
# JP: 「ですから――どうぞっ」
1376 = "「Vì vậy——xin ngài hãyっ」"

# monologue
# JP: （きゅうっ）
2170 = "（Siết chặt）"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1242 = "「唔！」" 

# monologue
# JP: 意識して、のことなのだろうか？
1791 = "Có phải em đang có ý thức làm vậy không?"

# monologue
# JP: ハチロクのおまんまんが甘く蠢き、\nただでさえ締めている僕をより甘やかに、絞ろうとする。
1714 = "Cô bé của Hachiroku ngọt ngào vặn vẹo,\ncố\ngắng siết chặt lấy tôi hơn nữa, dù vốn dĩ\nđã rất khít rồi."

# 【ハチロク】
# display as 八六
# JP: 「満たして、ください――わたくしを、双鉄様で――\n双鉄様の、くださる――熱い、喜び、でっ」
1463 = "「Xin hãy, lấp đầy em——bằng ngài Soutetsu——\nbằng niềm vui, nóng bỏng——mà ngài\nSoutetsu, trao cho emっ」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ハチロクっ！」
1175 = "「Hachiroku!」"

# monologue
# JP: （ずるううううううっ！）
2184 = "（Phập phập phập!）"

# 【ハチロク】
# display as 八六
# JP: 「くふううううんっ！」
1241 = "「Ư hưm!」"

# monologue
# JP: （ズパンっ！！！）
2141 = "（Phập!!!）"

# 【ハチロク】
# display as 八六
# JP: 「あひゅんっ！！！」
1265 = "「A hưm!!!」"

# monologue
# JP: もう、止まらない、止まれない。
1879 = "Không thể dừng lại, không thể dừng lại\nđược nữa."

# monologue
# JP: もとより限界に近かった、自分自身の歯止めを壊し、\nただひたすらに、ハチロクの中を味わい尽くす！
1933 = "Phá vỡ lớp kìm nén vốn đã gần chạm đến\ngiới hạn của bản thân,\ntôi chỉ biết đắm\nchìm vào việc tận hưởng trọn vẹn bên trong\nHachiroku!"

# monologue
# JP: （ずばっ！　じゅっ！　じゅるっ！　じゅにゅっ！）
2144 = "（Phập! Chụt! Chu mút! Sột sột!）"

# 【ハチロク】
# display as 八六
# JP: 「ひあっ、あっ――双鉄、さまっ――なにか、きます――\nなにか――やっ――これ――真っ白、にっ――んっっ！」
1222 = "「Kya, a——Ngài Soutetsu——có thứ gì đó, sắp\nđến——\nthứ gì đó——á——cái này——trắng xóa,\nrồi——ưm!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ハチロク！　ハチロク！」
1176 = "「Hachiroku! Hachiroku!」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！　双鉄様っ！」
1515 = "「Ngài Soutetsu! Ngài Soutetsu!」"

# monologue
# JP: （ばちゅっ！　じゅ！　じゅりゅ！　ブぼっ！！）
2145 = "（Phập! Chụt! Chu mút! Bục!!）"

# monologue
# JP: 熱い塊がこみ上げてくる。\nもう限界は振り切っている。
2008 = "Khối nhiệt nóng bỏng trào dâng.\nĐã vượt\nquá giới hạn rồi."

# monologue
# JP: だから一番深くへと、\n思いっきりに腰を突き出し！
1935 = "Vì vậy, tôi dùng hết sức đẩy hông,\ntiến\nvào nơi sâu nhất!"

# monologue
# JP: （びゅるるるっ！　ぼびゅうっ！　びゅるっ！　びゅ！）
2153 = "（Phụt phụt phụt! Phụt! Phụt! Phụt!）"

# 【ハチロク】
# display as 八六
# JP: 「いっ――あっ――んくうっっっっっっっ！！！」
1238 = "「Á——a——ưm kuu!!!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああっ――」
1263 = "「A a——」"

# monologue
# JP: 射精――と、確か呼ぶ現象だ。\n真っ白く濁る熱い雫が、僕の勃起を通りぬけ――
2067 = "Chắc chắn là hiện tượng được gọi là——xuất\ntinh.\nNhững giọt chất lỏng nóng hổi trắng\nđục xuyên qua phần cương cứng của tôi——"

# monologue
# JP: ハチロクのおまんまんの一番奥の、\nその更に奥へと激しくぶつかり飛び散り、たまる。
1827 = "Bắn mạnh, vương vãi và đọng lại tận sâu\nbên trong,\nsâu hơn nữa bên trong cô bé của\nHachiroku."

# 【ハチロク】
# display as 八六
# JP: 「あ……あ……双鉄、様の……\nあつい……おつゆ、が」
1255 = "「A……a……dịch nhờn……nóng hổi……\ncủa ngài\nSoutetsu」"

# monologue
# JP: ぼーっとした目で。無意識にか。
1808 = "Đôi mắt đờ đẫn. Trong vô thức sao."

# monologue
# JP: 繋がったままでなお、接合部から溢れたそれを、\nハチロクは指先で掬って――舐める。
1789 = "Dù vẫn đang kết nối, Hachiroku dùng đầu\nngón tay vớt lấy phần chất lỏng tràn ra từ\nchỗ giao hợp——rồi liếm."

# 【ハチロク】
# display as 八六
# JP: 「ん……苦いっ――ねばついて――からみつくような――\nなんでしょう、これは」
1280 = "「Ưm……đắng quá——dính nhớp——như quấn chặt\nlấy——\nCái này, là gì vậy ạ」"

# 【双鉄H】
# display as 雙鐵
# JP: 「多分、だが――んっ――精液……\n赤ちゃんの、種、だと――思うっ」
1371 = "「Anh đoán là——ưm——tinh dịch……\nlà hạt\ngiống, của em bé——anh nghĩ vậyっ」"

# 【ハチロク】
# display as 八六
# JP: 「せいえき……双鉄、様の――\n赤ちゃんの、たね」
1447 = "「Tinh dịch……của ngài Soutetsu——\nhạt giống,\ncủa em bé」"

# monologue
# JP: （びゅくっ――びゅっ――びゅっ――びゅるっ）
2151 = "（Phụt——phụt——phụt——phụt phụt）"

# monologue
# JP: 何年分が、内側に溜まっていたのだろうか？
2074 = "Không biết đã tích tụ bên trong bao nhiêu\nnăm rồi nhỉ?"

# monologue
# JP: ハチロクと会話しつつも、強すぎる快感に脱力しつつも、\nまだまだ射精は収まる気配も見せはしない。
1903 = "Dù đang trò chuyện với Hachiroku, dù cơ\nthể rã rời vì khoái cảm quá mạnh,\nnhưng\nviệc xuất tinh vẫn chưa có dấu hiệu dừng\nlại."

# monologue
# JP: 次々溢れだしてくそれを、\nハチロクはいとおしそうに指ですくって、じっと眺める。
1707 = "Hachiroku âu yếm dùng ngón tay vớt lấy thứ\nchất lỏng liên tục trào ra,\nrồi chăm chú\nngắm nhìn."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様……この、せいえき……いただいても？」
1513 = "「Ngài Soutetsu……tinh dịch, này……em có thể\nnhận được không?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ――好きにしてくれ。\n僕はすでに、全部まるごと、お前の男なのだから」
1429 = "「Đương nhiên rồi——tùy ý em đi.\nBởi vì anh,\ntrọn vẹn cả con người này, đã là người đàn\nông của em rồi」"

# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます」
1464 = "「Cảm ơn ngài」"

# monologue
# JP: （こくんっ）
2154 = "（Ực）"

# monologue
# JP: 苦く、ねばつき、からみつくという精液をハチロクは、\n目を閉じながら、愛おしそうに喉へと落とす。
1729 = "Hachiroku nhắm mắt lại, âu yếm nuốt thứ\ntinh dịch đắng chát, dính nhớp và quấn\nchặt lấy cổ họng ấy xuống."

# 【双鉄H】
# display as 雙鐵
# JP: （子を成せぬことを――知っているから、か？）
2156 = "（Là vì——em ấy biết mình không thể sinh con\nsao?）"

# monologue
# JP: 思えば、狂おしいほどに愛おしくなる。
2019 = "Nghĩ vậy, tôi lại càng thấy yêu em đến\nđiên cuồng."

# monologue
# JP: ハチロクを、この世の誰より幸せに――\nその思いだけが胸に溢れる。
2010 = "Phải làm cho Hachiroku trở thành người\nhạnh phúc nhất trên thế gian này——\nChỉ có\nsuy nghĩ đó là tràn ngập trong tim tôi."

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1262 = "「啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
1300 = "「Ưm?」"

# 【ハチロク】
# display as 八六
# JP: 「いえ――ほら」
1142 = "「Không có gì ạ——ngài xem」"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1518 = "「！」" 

# monologue
# JP: 薄い腹ごし、\nハチロクの指がそうっと撫ぜる。
1710 = "Xuyên qua lớp da bụng mỏng manh,\nngón tay\nHachiroku nhẹ nhàng vuốt ve."

# monologue
# JP: ただそれだけで震えるほどに心地よく。それで、気づく。\n射精で一度、勢いを失くしてた僕の勃起が――
1682 = "Chỉ vậy thôi cũng đủ khiến tôi sung sướng\nđến run rẩy. Và rồi, tôi nhận ra.\nPhần\ncương cứng của tôi vốn đã xìu xuống sau\nmột lần xuất tinh, giờ lại——"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様のおちんちん、まだまだ動きたいって、\nひくひくおねだり、なさってますね？」
1351 = "「Cậu bé của ngài Soutetsu, dường như vẫn\nmuốn vận động tiếp,\ndang giật giật đòi hỏi\nphải không ạ?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。構わんか？」
1397 = "「Ừ. Có sao không?」"

# 【ハチロク】
# display as 八六
# JP: 「もちろんですとも、双鉄様」
1428 = "「Đương nhiên là được rồi, thưa ngài\nSoutetsu」"

# 【双鉄H】
# display as 雙鐵
# JP: 「あ――」
# 1243 = "「啊——」" 

# monologue
# JP: ハチロクの手が僕を掴まえ、\n導かれるままくちづける。
1703 = "Bàn tay Hachiroku nắm lấy tôi,\ndẫn dắt tôi\ntrao nụ hôn."

# monologue
# JP: 幸せそうに――ただ、幸せそうに。\nハチロクは満面の笑顔を浮かべる。
1806 = "Trông thật hạnh phúc——chỉ là, trông thật\nhạnh phúc.\nHachiroku nở nụ cười rạng rỡ."

# 【ハチロク】
# display as 八六
# JP: 「わたくし、双鉄様の女、なのですから」」
1304 = "「Bởi vì em, là người phụ nữ của ngài\nSoutetsu mà」"
