[script]
# lines: 371 
# 【ハチロク】
# display as 八六
# JP: 「……ぁっ」
956 = "「……啊」" 

# monologue
# JP: ハチロクを僕が求めて。\nハチロクが僕を求めてくれて。
1937 = "我渴求著八六。八六也渴求著我。" 

# monologue
# JP: そうして重ねたキスを解けば、\n熱を帯び、切なさを溶かしたような声がこぼれる。
2085 = "鬆開相合的嘴唇之後，她張開嘴，吐出了帶著熱氣、有些許含羞的話。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様……」
1510 = "「雙鐵少爺……」" 

# monologue
# JP: 僕の名を呼び、\n濡れて色づく唇を、ツ――と小指で軽く撫ぜる。
1786 = "她叫著我的名字，我用小指輕輕撫摸著她溫潤桃紅的嘴唇。" 

# monologue
# JP: この唇に、くちづけていた。\nそうと強調されてるようで、体の奥が熱くなる。
1902 = "我吻了這副嘴唇。體內的熱度讓我知道，這個吻有多深的含義。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様……[シーリング,1]封印が開放された日のことを、\n覚えていらっしゃいますか？」
1512 = "「雙鐵少爺……您還記得封印的事嗎」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。忘れるわけがない。\nお前との絆が深まったと、証がたったような日だからな」
1298 = "「嗯，我不會忘記的。因為那一天就是我和你真正走到一起的證明」" 

# monologue
# JP: ハチロクと僕との絆が深くなったゆえ、\n今まで封印されていた機能が開放された。
1776 = "因為八六和我的愛意更加深厚了，她曾經被封印的功能也得以重見天日。" 

# monologue
# JP: ただ、その機能は使わぬままなら使わぬでいい――\n登呂流湯のご主人はそう言って、静かに微笑んでいた。
1762 = "只是以前沒有用過的功能，不用也沒關係——登呂流湯的老闆說完之後，就靜靜地笑了。" 

# 【ハチロク】
# display as 八六
# JP: 「開放されたのは、\n双鉄様とわたくしとの絆を更に深める機能と聞きました」
1453 = "「聽說開放的功能，能讓我和雙鐵少爺的愛能更進一步」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
1394 = "「是啊」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様とわたくしがひとつになるため――\n[にせ,1]二世の[ちぎ]契りを結べるようになる、機能だと」
1421 = "「為了我和雙鐵少爺能合為一體的功能——來生的婚約」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「[にせ,1]二世の[ちぎ]契り、か」
1160 = "「來生的婚約嗎」" 

# monologue
# JP: 古い言葉だ。時代劇にしか出てこんような。
2021 = "真是古老的詞彙，只有古裝劇裡才會出現吧。" 

# monologue
# JP: だが、ハチロクの口から出れば、\n瑞々しいまでの潤いをもって僕の鼓膜をゆすぶってくる。
1676 = "但這是八六說的。她水潤的聲音，打動了我的鼓膜。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「確か、\n切れぬ絆を結ぶ、というような意味だよな」
1374 = "「我記得意思是結下剪不斷的情緣吧」" 

# 【ハチロク】
# display as 八六
# JP: 「はい――[げんせ,1]現世と[らいせ,1]来世、二世に渡っても途切れぬ契り。\n死を持ってさえ、断ち切ることの出来ない絆」
1388 = "「是啊——貫穿今生和來生的婚約。即便今生注定會逝去，也帶不走的愛」" 

# monologue
# JP: 凛、と鈴の音が響いた気がする。
1946 = "我聽到鈴鐺清脆的聲音。" 

# monologue
# JP: ハチロクはそれほど鮮やかに姿勢を整え、\nそのまま深く――三指をついて頭を下げる。
1696 = "八六優美地整理了一下姿勢，跪在地上——行了一個三指撐地的最敬禮。" 

# 【ハチロク】
# display as 八六
# JP: 「レイルロオドたるこの身に来世があるかは存じませぬ。\nけれどわたくしは双鉄様と、契りを結びとうございます」
1319 = "「小女子不知道鐵路人偶是否有來生。但我也打算與雙鐵少爺，您定下婚約」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、結ぼう。二世の契りを」
1296 = "「嗯，定下我們直到來生的婚約吧」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！」
1519 = "「！！」" 

# monologue
# JP: 驚いたように頭を上げたハチロクを、\nまるごと抱きしめ、またキスをする。
1731 = "八六驚訝地抬起了頭，我摟住她，又送上了一個吻。" 

# 【ハチロク】
# display as 八六
# JP: 「あ……ん……は……んっ」
1258 = "「啊……嗯……哈……嗯」" 

# monologue
# JP: ハチロクの熱が僕に伝わる。
1915 = "我感受到了八六的熱度。" 

# monologue
# JP: 僕も同じとわかってほしくて、\nハチロクを抱きしめる手に力をこめる。
1928 = "我摟著她的手更緊了，我想讓她也感受我與她一樣的溫度。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「それで、具体的には何をどうすればいいのだ？\n開放された機能を僕らが使うには」
1497 = "「那我們具體應該怎麼做呢？如果要使用剛開放的功能」" 

# 【ハチロク】
# display as 八六
# JP: 「そ、それは――」
1475 = "「這、這個——」" 

# monologue
# JP: 抱きしめている体がボっ、と熱くなる。\nみるみるうちに、首筋までが赤くなる。
1877 = "懷中嬌小的身體突然熱了起來。眼見她的臉紅迅速地紅到了脖子根。" 

# 【ハチロク】
# display as 八六
# JP: 「その……わたくしが、は、裸になって横たわり――\n双鉄様に、体の隅々までを丹念に調べていただければ」
1315 = "「如果……我、我脫光衣服躺下來——再讓您仔細檢查過我身體的每一處部位，應該就知道了」" 

# monologue
# JP: ごくり、と大きく、喉がなる音。\n自分の立てた音だと気付き、異様な鼓動の速さに気づく。
1945 = "我聽到吞了口唾沫的聲音。這是我自己發出的聲音，我的心跳得異常快。" 

# monologue
# JP: 熱い、熱い、熱い。\nハチロクの照れくさそうな言葉が僕を、加熱している。
1815 = "好熱、好熱、好熱。八六含羞的話讓我渾身熱了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「左様にすれば――機能は自然と使われる、と……\n登呂流湯のご主人は、おっしゃっておられました」
1479 = "「這樣的話——功能就會自動生效了……登呂流湯的老闆是這麼說的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「では、そうしよう。\n僕が――その、脱がせれば良いか？」
1495 = "「那就這麼辦吧。我——幫你脫掉衣服就可以了嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「いえっ、\nそ、双鉄様のお手をわずらわせるまでもありません」
1144 = "「不用，不、不勞煩您費心了」" 

# monologue
# JP: ハチロクらしくも無い早口。\n目線を僕からツイと外して、今度は吐息のような声。
1803 = "她的語速很快，完全不像平時的她。她移開了看著我的視線，喘息起來。" 

# 【ハチロク】
# display as 八六
# JP: 「自分で……脱ぎます。\n双鉄様は、明かりを――落としてくださいますか？」
1359 = "「我……自己會脫。雙鐵少爺，您能——關一下燈嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……だな」
1275 = "「嗯……」" 

# monologue
# JP: 電灯の紐をカチカチ引いて、\n一番小さな明かりに換える。
1925 = "我拉了幾下開關繩，將燈光亮度調到最暗。" 

# monologue
# JP: ハチロクは手早く布団を敷いて、\n潤んだ瞳で僕を見上げる。
1697 = "八六已經很快地鋪好了被褥，她用水靈靈的眼睛看著我。" 

# 【ハチロク】
# display as 八六
# JP: 「目を――閉じていてくださいますか？」
1346 = "「您——可以閉上眼睛嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1281 = "「嗯」" 

# monologue
# JP: 衣擦れの音。\nボタンを外しているのだろうか、規則正しい強い音。
1944 = "我聽到了衣料的摩擦聲。應該是解扣子的聲音，很有規律的強烈聲音。" 

# monologue
# JP: とさっ、と。物を置いたような音。
2001 = "然後是丟下東西的聲音。" 

# 【ハチロク】
# display as 八六
# JP: 「んっ――」
1273 = "「嗯——」" 

# monologue
# JP: ハチロクが小さく息を漏らし、\nそうして、待ちわびた言葉をくれる。
1727 = "八六輕輕嘆了一口氣，說出了我等候已久的話。" 

# 【ハチロク】
# display as 八六
# JP: 「目を――開けてくださって大丈夫です」
1349 = "「您可以睜開眼睛了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 1281 = "「嗯」" 

# monologue
# JP: ――黒く、可憐な花が咲いてる。\n甘やかに僕を誘ってる。
946 = "——眼前黑亮可人的鮮花，散發著誘人的香氣，勾引著我的垂憐。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「綺麗だ――とても」
1158 = "「你真是太美了」" 

# monologue
# JP: それしか言葉が出てこない。
1897 = "我只會說這句話了。" 

# monologue
# JP: 黒髪と黒い制服と、その合間から見える肌の白とが、\n燃えているような瞳の朱とが、僕を引きつけ放さない。
2066 = "透過黑髮、黑色的制服間的縫隙，我能看到她美麗白皙的肌膚。再加上那對火紅的雙眼，緊緊地吸引著我。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「触れても、いいか？」
1364 = "「我可以摸摸你嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「もちろんです。わたくしは双鉄様の女ですから、\n双鉄様のなさりたいようになさって――いえ」
1427 = "「當然了，我是屬於您的，您當然可以為所欲為——抱歉，撤回前言」" 

# monologue
# JP: ク、と唇が結ばれて、はにかむように解かれる。
1813 = "她親了我一下，又靦腆地鬆開了嘴。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしが、触れていただきたいのです。\n双鉄様の……わたくしの大好きなあなたの、その指で」
1360 = "「我也想您來摸我。想最愛的您……親手來疼愛我」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ハチロク」
1174 = "「八六」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ」
1262 = "「啊」" 

# monologue
# JP: 体ごとおおいかぶさって、\nまぶたに、髪に、キスをする。
1931 = "我撲在她的身上，吻她的眼瞼，吻她的頭髮。" 

# monologue
# JP: そうして指でふにふにと、可憐な唇を弄ぶ。
1961 = "手指把玩著她柔軟可愛的嘴唇。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いい匂いがする。柔らかだ」
1441 = "「真香，真柔軟啊」" 

# 【ハチロク】
# display as 八六
# JP: 「せ、せっけんの匂いだと思います。日々姫が、\n薦めてくれたのです。無添加の、上等の品を」
1210 = "「只、只是肥皂的味道吧。是日日姬推薦給我的。無添加劑的高級產品」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、日々姫のお手柄だな」
1489 = "「那就是日日姬大功一件了」" 

# monologue
# JP: ハチロクに体臭は無いのだろうか？
1704 = "八六會有體臭嗎？" 

# monologue
# JP: ふと、そんなことを思ってしまい、\n耳元から、その黒髪へ、首筋ふかくへ鼻をもぐらす。
1848 = "帶著這個突如其來的疑問，我嗅著她耳畔、黑髮叢間，以及脖頸深處的氣息。" 

# 【ハチロク】
# display as 八六
# JP: 「あっ」
# 1262 = "「啊」" 

# monologue
# JP: 肌から、汗から、甘い匂いを感じる気がする。\nそれを確かめ味わいたくて、顎のラインに舌を這わせる。
1802 = "她的肌膚、汗液，都帶著甜蜜的氣味。我沿著她的下巴舔了過去，來品嘗這種芳香。" 

# 【ハチロク】
# display as 八六
# JP: 「ん……ふっ――あっ――んっ」
1276 = "「嗯……唔——啊——嗯」" 

# monologue
# JP: 半開きになりあえいでる、口へと指を差し込めば、\n短い舌が出迎えるように吸い付いてくる。
1957 = "手指伸進她微微張開喘著氣的嘴，短小的舌頭就吮吸起來，彷彿在恭迎一般。" 

# 【ハチロク】
# display as 八六
# JP: 「んっ……んちゅっ――んっ――れるっ――んっ」
1278 = "「嗯……嗯啾——嗯——噗嚕——嗯」" 

# monologue
# JP: それをふにふにまた弄び、\n首筋に沿って指を下ろして、ブラウス越しに撫でさする。
1954 = "我逗弄著她的舌頭，另一邊的手指沿著脖頸滑下，隔著襯衫撫摸起她來。" 

# 【ハチロク】
# display as 八六
# JP: 「あっ――」
1243 = "「啊——」" 

# monologue
# JP: 鎖骨、だ。
1982 = "是鎖骨。" 

# monologue
# JP: 見た目でもそうと思っていたが、整備体のハチロクは、\nこんなに間近で触れてても、人間とまるで変わらない。
1853 = "從外表就能看出，整備體的八六很像真人。但居然這樣撫摸起來都和人類別無二致。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「全ては、脱ぎ捨てなかったのだな」
1180 = "「原來沒有脫下所有衣服啊」" 

# 【ハチロク】
# display as 八六
# JP: 「全ては……その、\n少し――恥ずかしいような気がして」
1357 = "「我……有點害羞，所以不好意思脫」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「恥ずかしがってくれてよかった。\nこの服は、やはりいちばん、お前らしい」
1480 = "「還好你害羞了一下呢。這件衣服就是最配你的了」" 

# 【ハチロク】
# display as 八六
# JP: 「さ、左様でございますか」
1476 = "「這、這樣啊」" 

# monologue
# JP: 嬉しげな声。\nもじ、とハチロクが身をよじる。
2035 = "聽起來她很高興。只見八六扭了扭身子。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「それに、色合いもいい。\n黒があり、白があるから――」
1451 = "「而且顏色搭配也很漂亮。一部分黑色，一部分又是白色——」" 

# 【ハチロク】
# display as 八六
# JP: 「ふあっ」
1267 = "「嗚啊」" 

# monologue
# JP: 脇の下から、指を滑らす。
1967 = "手指滑過她的腋下。" 

# monologue
# JP: 厚手の布地に、薄いブラウス。\nそして剥き出しの肌に触れ――
1930 = "我撫摸過她厚厚的衣料和薄薄的襯衫。然後滑過她暴露在外的肌膚——" 

# 【双鉄H】
# display as 雙鐵
# JP: 「桜色の可憐が、引き立つ」
1379 = "「所以桃色的小突起是那麼顯眼」" 

# 【ハチロク】
# display as 八六
# JP: 「んんっ！」
1291 = "「嗯嗯！」" 

# monologue
# JP: 乳首に触れた瞬間に、\nハチロクの声が甘くかすれる。
2026 = "碰到乳頭的那一瞬間，八六就嬌喘了出來。" 

# monologue
# JP: その声をもっと聞きたくて、\n同じところを、何度も何度も指で転がす。
1906 = "我在同樣的部位轉來轉去，只為了再聽到她這樣的嬌聲。" 

# 【ハチロク】
# display as 八六
# JP: 「や……双鉄……様っ……んっ――\nわたくし、の――胸……など……んふっ」
1219 = "「呀……雙鐵少爺……嗯——我、的胸———有什……嗯唔」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ハチロクの胸が、どうした？」
1157 = "「你的胸怎麼了？」" 

# 【ハチロク】
# display as 八六
# JP: 「ふくらみも……何も……ございません――のにっ、\nなん……で――んっ――そのように……甘やか、にっ」
1354 = "「我……又……沒什麼大小——為什麼……嗯——要這樣……溫柔地」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ふくらみは無くとも、柔らかさはある。\nお前の肌は、僕の手に吸い付くようで、心地良い」
1417 = "「沒有大小，但還是很柔軟啊。你的肌膚是那麼細膩，彷彿吸附住了我的手一般」" 

# monologue
# JP: （さすっ）
