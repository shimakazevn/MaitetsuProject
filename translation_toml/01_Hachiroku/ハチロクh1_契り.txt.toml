1651 = "Chỉ một nhịp ngập ngừng của tôi thôi cũng\nđủ khiến ánh mắt Hachiroku dao động vì bất\nan.\nEm ấy khao khát tôi――mãnh liệt đến\nnhường ấy."

# monologue
