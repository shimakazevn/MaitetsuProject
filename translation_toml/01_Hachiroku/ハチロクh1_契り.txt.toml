[script]
# lines: 371 
# 【ハチロク】
# display as 八六
# JP: 「……ぁっ」
956 = "「……A.」"
# monologue
# JP: ハチロクを僕が求めて。\nハチロクが僕を求めてくれて。
1937 = "Tôi khao khát Hachiroku.\nHachiroku cũng khao khát tôi."
# monologue
# JP: そうして重ねたキスを解けば、\n熱を帯び、切なさを溶かしたような声がこぼれる。
2085 = "Khi nụ hôn nồng cháy vừa dứt,\nmột giọng nói chất chứa hơi nóng và sự nghẹn ngào khẽ vang lên."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様……」
1510 = "「Ngài Soutetsu……」"
# monologue
# JP: 僕の名を呼び、\n濡れて色づく唇を、ツ――と小指で軽く撫ぜる。
1786 = "Em gọi tên tôi,\ntôi dùng ngón út khẽ vuốt dọc――đôi môi ướt át, ửng hồng của em."
# monologue
# JP: この唇に、くちづけていた。\nそうと強調されてるようで、体の奥が熱くなる。
1902 = "Tôi đã hôn lên đôi môi này.\nNhư để nhấn mạnh điều đó, sâu thẳm trong cơ thể tôi nóng ran lên."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様……[シーリング,1]封印が開放された日のことを、\n覚えていらっしゃいますか？」
1512 = "「Ngài Soutetsu……ngài có còn nhớ cái ngày,\nmà phong ấn được giải trừ không ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。忘れるわけがない。\nお前との絆が深まったと、証がたったような日だからな」
1298 = "「Ừ. Làm sao mà quên được chứ.\nBởi vì đó là ngày minh chứng cho việc mối liên kết giữa tôi và em đã trở nên sâu sắc hơn mà.」"
# monologue
# JP: ハチロクと僕との絆が深くなったゆえ、\n今まで封印されていた機能が開放された。
1776 = "Vì mối liên kết giữa Hachiroku và tôi đã trở nên sâu sắc hơn,\nnên những chức năng bị phong ấn bấy lâu nay đã được giải trừ."
# monologue
# JP: ただ、その機能は使わぬままなら使わぬでいい――\n登呂流湯のご主人はそう言って、静かに微笑んでいた。
1762 = "Chỉ là, nếu những chức năng đó không được sử dụng thì cứ để vậy cũng không sao――\nÔng chủ nhà tắm Tororyu-yu đã nói như vậy, và lặng lẽ mỉm cười."
# 【ハチロク】
# display as 八六
# JP: 「開放されたのは、\n双鉄様とわたくしとの絆を更に深める機能と聞きました」
1453 = "「Em nghe nói chức năng được giải trừ,\nlà chức năng giúp mối liên kết giữa Ngài Soutetsu và em càng thêm sâu sắc.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
1394 = "「Ừm.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様とわたくしがひとつになるため――\n[にせ,1]二世の[ちぎ]契りを結べるようになる、機能だと」
1421 = "「Để Ngài Soutetsu và em hòa làm một――\nĐó là chức năng, giúp chúng ta có thể kết lời thề nguyện hai kiếp.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「[にせ,1]二世の[ちぎ]契り、か」
1160 = "「Lời thề nguyện hai kiếp, sao.」"
# monologue
# JP: 古い言葉だ。時代劇にしか出てこんような。
2021 = "Một từ ngữ cổ xưa. Cứ như chỉ xuất hiện trong phim cổ trang vậy."
# monologue
# JP: だが、ハチロクの口から出れば、\n瑞々しいまでの潤いをもって僕の鼓膜をゆすぶってくる。
1676 = "Nhưng khi được thốt ra từ miệng Hachiroku,\nnó lại mang theo một sự tươi mát, ẩm ướt làm rung động màng nhĩ của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「確か、\n切れぬ絆を結ぶ、というような意味だよな」
1374 = "「Hình như,\nnó có nghĩa là kết nối một mối liên kết không thể chia cắt đúng không.」"
# 【ハチロク】
# display as 八六
# JP: 「はい――[げんせ,1]現世と[らいせ,1]来世、二世に渡っても途切れぬ契り。\n死を持ってさえ、断ち切ることの出来ない絆」
1388 = "「Vâng――Một lời thề nguyện không bao giờ đứt đoạn dù trải qua hai kiếp, kiếp này và kiếp sau.\nMột mối liên kết mà ngay cả cái chết cũng không thể chia cắt.」"
# monologue
# JP: 凛、と鈴の音が響いた気がする。
1946 = "Tôi có cảm giác như nghe thấy một tiếng chuông vang lên lanh lảnh."
# monologue
# JP: ハチロクはそれほど鮮やかに姿勢を整え、\nそのまま深く――三指をついて頭を下げる。
1696 = "Hachiroku chỉnh lại tư thế một cách thật trang nghiêm,\nvà cứ thế cúi đầu thật sâu――chống ba ngón tay xuống sàn."
# 【ハチロク】
# display as 八六
# JP: 「レイルロオドたるこの身に来世があるかは存じませぬ。\nけれどわたくしは双鉄様と、契りを結びとうございます」
1319 = "「Một \\x%lレイルロオド;#00ffc040;Railord%l;#; như em không biết liệu mình có kiếp sau hay không.\nNhưng em vẫn muốn được kết lời thề nguyện cùng Ngài Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、結ぼう。二世の契りを」
1296 = "「Ừ, kết lời thề nguyện nhé. Lời thề nguyện hai kiếp.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！」
1519 = "「!!」"
# monologue
# JP: 驚いたように頭を上げたハチロクを、\nまるごと抱きしめ、またキスをする。
1731 = "Tôi ôm trọn lấy Hachiroku đang ngẩng đầu lên đầy kinh ngạc,\nvà lại trao cho em một nụ hôn."
# 【ハチロク】
# display as 八六
# JP: 「あ……ん……は……んっ」
1258 = "「A……ưm……ha……ưm.」"
# monologue
# JP: ハチロクの熱が僕に伝わる。
1915 = "Hơi nóng của Hachiroku truyền sang tôi."
# monologue
# JP: 僕も同じとわかってほしくて、\nハチロクを抱きしめる手に力をこめる。
1928 = "Tôi cũng muốn em hiểu rằng tôi cũng vậy,\nnên vòng tay ôm Hachiroku càng siết chặt hơn."
# 【双鉄H】
# display as 雙鐵
# JP: 「それで、具体的には何をどうすればいいのだ？\n開放された機能を僕らが使うには」
1497 = "「Vậy, cụ thể thì chúng ta phải làm gì đây?\nĐể có thể sử dụng những chức năng đã được giải trừ ấy.」"
# 【ハチロク】
# display as 八六
# JP: 「そ、それは――」
1475 = "「Ch, chuyện đó thì――」"
# monologue
# JP: 抱きしめている体がボっ、と熱くなる。\nみるみるうちに、首筋までが赤くなる。
1877 = "Cơ thể trong vòng tay tôi bỗng nóng rực lên.\nChỉ trong chớp mắt, đỏ bừng đến tận cổ."
# 【ハチロク】
# display as 八六
# JP: 「その……わたくしが、は、裸になって横たわり――\n双鉄様に、体の隅々までを丹念に調べていただければ」
1315 = "「Chuyện đó……em, sẽ kh, khỏa thân và nằm xuống――\nNgài Soutetsu, xin hãy kiểm tra cẩn thận từng ngóc ngách trên cơ thể em.」"
# monologue
# JP: ごくり、と大きく、喉がなる音。\n自分の立てた音だと気付き、異様な鼓動の速さに気づく。
1945 = "Ực, một tiếng nuốt nước bọt lớn vang lên.\nTôi nhận ra đó là âm thanh do chính mình tạo ra, và nhận ra nhịp tim đang đập nhanh một cách bất thường."
# monologue
# JP: 熱い、熱い、熱い。\nハチロクの照れくさそうな言葉が僕を、加熱している。
1815 = "Nóng quá, nóng quá, nóng quá.\nNhững lời nói ngượng ngùng của Hachiroku đang thiêu đốt tôi."
# 【ハチロク】
# display as 八六
# JP: 「左様にすれば――機能は自然と使われる、と……\n登呂流湯のご主人は、おっしゃっておられました」
1479 = "「Nếu làm như vậy――chức năng sẽ tự động được sử dụng, và……\nÔng chủ nhà tắm Tororyu-yu, đã nói như vậy ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「では、そうしよう。\n僕が――その、脱がせれば良いか？」
1495 = "「Vậy, cứ làm thế đi.\nTôi――ừm, sẽ cởi ra cho em nhé?」"
# 【ハチロク】
# display as 八六
# JP: 「いえっ、\nそ、双鉄様のお手をわずらわせるまでもありません」
1144 = "「Dạ không,\nkh, không cần phải phiền đến tay Ngài Soutetsu đâu ạ.」"
# monologue
# JP: ハチロクらしくも無い早口。\n目線を僕からツイと外して、今度は吐息のような声。
1803 = "Một giọng điệu nhanh nhảu không giống Hachiroku chút nào.\nEm ấy ngoảnh mặt đi tránh ánh nhìn của tôi, và lần này là một giọng nói như tiếng thở dài."
# 【ハチロク】
# display as 八六
# JP: 「自分で……脱ぎます。\n双鉄様は、明かりを――落としてくださいますか？」
1359 = "「Em sẽ tự……cởi ạ.\nNgài Soutetsu, có thể――tắt đèn giúp em được không ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……だな」
1275 = "「À……được thôi.」"
# monologue
# JP: 電灯の紐をカチカチ引いて、\n一番小さな明かりに換える。
1925 = "Tôi kéo dây công tắc đèn cạch cạch,\nchuyển sang mức sáng nhỏ nhất."
# monologue
# JP: ハチロクは手早く布団を敷いて、\n潤んだ瞳で僕を見上げる。
1697 = "Hachiroku nhanh chóng trải chăn đệm ra,\nvà ngước nhìn tôi bằng đôi mắt ướt át."
# 【ハチロク】
# display as 八六
# JP: 「目を――閉じていてくださいますか？」
1346 = "「Ngài có thể――nhắm mắt lại được không ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1281 = "「Ừ.」"
# monologue
# JP: 衣擦れの音。\nボタンを外しているのだろうか、規則正しい強い音。
1944 = "Tiếng quần áo sột soạt.\nCó lẽ em ấy đang cởi cúc áo, một âm thanh mạnh mẽ và đều đặn."
# monologue
# JP: とさっ、と。物を置いたような音。
2001 = "Phịch, một tiếng. Âm thanh như thể đặt một vật gì đó xuống."
# 【ハチロク】
# display as 八六
# JP: 「んっ――」
1273 = "「Ưm――」"
# monologue
# JP: ハチロクが小さく息を漏らし、\nそうして、待ちわびた言葉をくれる。
1727 = "Hachiroku khẽ thở hắt ra,\nvà rồi, trao cho tôi lời nói mà tôi hằng mong đợi."
# 【ハチロク】
# display as 八六
# JP: 「目を――開けてくださって大丈夫です」
1349 = "「Ngài có thể――mở mắt ra được rồi ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 1281 = "「嗯」" 
# monologue
# JP: ――黒く、可憐な花が咲いてる。\n甘やかに僕を誘ってる。
946 = "――Một bông hoa màu đen, đáng yêu đang nở rộ.\nNgọt ngào mời gọi tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「綺麗だ――とても」
1158 = "「Đẹp quá――thực sự rất đẹp.」"
# monologue
# JP: それしか言葉が出てこない。
1897 = "Tôi chỉ có thể thốt lên những lời đó."
# monologue
# JP: 黒髪と黒い制服と、その合間から見える肌の白とが、\n燃えているような瞳の朱とが、僕を引きつけ放さない。
2066 = "Mái tóc đen và bộ đồng phục đen, cùng với làn da trắng ngần lấp ló giữa những khoảng hở,\nvà sắc đỏ của đôi mắt như đang rực cháy, thu hút tôi không thể rời mắt."
# 【双鉄H】
# display as 雙鐵
# JP: 「触れても、いいか？」
1364 = "「Tôi chạm vào, được chứ?」"
# 【ハチロク】
# display as 八六
# JP: 「もちろんです。わたくしは双鉄様の女ですから、\n双鉄様のなさりたいようになさって――いえ」
1427 = "「Tất nhiên rồi ạ. Vì em là người phụ nữ của Ngài Soutetsu,\nnên ngài cứ làm những gì ngài muốn――à không.」"
# monologue
# JP: ク、と唇が結ばれて、はにかむように解かれる。
1813 = "Em khẽ mím môi, rồi lại hé mở như đang e thẹn."
# 【ハチロク】
# display as 八六
# JP: 「わたくしが、触れていただきたいのです。\n双鉄様の……わたくしの大好きなあなたの、その指で」
1360 = "「Là em, muốn được ngài chạm vào.\nBằng những ngón tay của Ngài Soutetsu……của người mà em yêu nhất.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ハチロク」
1174 = "「Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「あっ」
1262 = "「A.」"
# monologue
# JP: 体ごとおおいかぶさって、\nまぶたに、髪に、キスをする。
1931 = "Tôi phủ phục toàn thân lên người em,\nhôn lên mí mắt, lên mái tóc em."
# monologue
# JP: そうして指でふにふにと、可憐な唇を弄ぶ。
1961 = "Rồi dùng ngón tay vuốt ve, trêu đùa đôi môi đáng yêu ấy."
# 【双鉄H】
# display as 雙鐵
# JP: 「いい匂いがする。柔らかだ」
1441 = "「Mùi hương thật thơm. Thật mềm mại.」"
# 【ハチロク】
# display as 八六
# JP: 「せ、せっけんの匂いだと思います。日々姫が、\n薦めてくれたのです。無添加の、上等の品を」
1210 = "「Ch, chắc là mùi xà phòng đấy ạ. Hibiki,\nđã giới thiệu cho em. Một loại xà phòng thượng hạng, không chứa chất phụ gia.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、日々姫のお手柄だな」
1489 = "「Nếu vậy thì, đó là công lao của Hibiki rồi.」"
# monologue
# JP: ハチロクに体臭は無いのだろうか？
1704 = "Hachiroku không có mùi cơ thể sao?"
# monologue
# JP: ふと、そんなことを思ってしまい、\n耳元から、その黒髪へ、首筋ふかくへ鼻をもぐらす。
1848 = "Chợt nghĩ đến điều đó,\ntôi rúc mũi từ mang tai, vào mái tóc đen, rồi hít hà sâu vào tận cổ em."
# 【ハチロク】
# display as 八六
# JP: 「あっ」
# 1262 = "「啊」" 
# monologue
# JP: 肌から、汗から、甘い匂いを感じる気がする。\nそれを確かめ味わいたくて、顎のラインに舌を這わせる。
1802 = "Từ làn da, từ những giọt mồ hôi, tôi có cảm giác như ngửi thấy một mùi hương ngọt ngào.\nMuốn xác nhận và thưởng thức nó, tôi lướt lưỡi dọc theo đường viền hàm của em."
# 【ハチロク】
# display as 八六
# JP: 「ん……ふっ――あっ――んっ」
1276 = "「Ưm……phù――a――ưm.」"
# monologue
# JP: 半開きになりあえいでる、口へと指を差し込めば、\n短い舌が出迎えるように吸い付いてくる。
1957 = "Khi tôi đưa ngón tay vào chiếc miệng đang hé mở và thở dốc,\nchiếc lưỡi ngắn ngủn của em liền mút lấy như để chào đón."
# 【ハチロク】
# display as 八六
# JP: 「んっ……んちゅっ――んっ――れるっ――んっ」
1278 = "「Ưm……chụt――ưm――rột――ưm.」"
# monologue
# JP: それをふにふにまた弄び、\n首筋に沿って指を下ろして、ブラウス越しに撫でさする。
1954 = "Tôi lại vuốt ve trêu đùa chiếc lưỡi ấy,\nrồi trượt ngón tay dọc theo cổ, vuốt ve em qua lớp áo blouse."
# 【ハチロク】
# display as 八六
# JP: 「あっ――」
1243 = "「A――」"
# monologue
# JP: 鎖骨、だ。
1982 = "Là xương quai xanh."
# monologue
# JP: 見た目でもそうと思っていたが、整備体のハチロクは、\nこんなに間近で触れてても、人間とまるで変わらない。
1853 = "Nhìn bề ngoài thì tôi cũng đã nghĩ vậy rồi, nhưng Hachiroku trong thân chính,\ndù có chạm vào ở khoảng cách gần thế này, cũng chẳng khác gì con người."
# 【双鉄H】
# display as 雙鐵
# JP: 「全ては、脱ぎ捨てなかったのだな」
1180 = "「Em không cởi bỏ hết tất cả nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「全ては……その、\n少し――恥ずかしいような気がして」
1357 = "「Tất cả thì……ừm,\nem cảm thấy hơi――xấu hổ.」"
# 【双鉄H】
# display as 雙鐵
