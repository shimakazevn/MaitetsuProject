1318 = "「A, đúng là vậy ạ. Xin ngài đợi một lát.\nBây giờ, em sẽ cởi bỏ hết tất cả.」"

# monologue
# JP: ハチロクは手早く服を脱ぎ、それを丁寧にたたんでいく。\n帽子、手袋、ベルトも綺麗に整え置いて――
1699 = "Hachiroku nhanh chóng cởi quần áo ra, và\ncẩn thận gấp chúng lại.\nMũ, găng tay, thắt\nlưng cũng được xếp gọn gàng――"

