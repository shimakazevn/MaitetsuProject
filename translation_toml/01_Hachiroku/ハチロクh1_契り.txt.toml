1286 = "「嗯嗚——嗯——」" 

# monologue
# JP: （れるっ――れろっ――じゅちゅっ――じゅるっ）
2132 = "（咻嚕——咻嚕——啾——啾嚕）" 

# monologue
# JP: ハチロクの唇を押し割って、\n短い舌に舌を絡めて、吸い込むようになめさする。
1943 = "我的舌頭撐開八六的嘴唇，纏住她短短的舌頭，吮吸、撫摩。" 

# monologue
# JP: （きゅっ――きゅきゅっ）
2129 = "（咻——咻咻）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ」
# 1281 = "「嗯」" 

# monologue
# JP: そうしていると、締め付けがいくらか和らいでくる。
1975 = "於是她小穴也沒那麼緊了。" 

# monologue
# JP: そうか、他の部分を気持よくして、\n意識をほぐし、ちらせれば――
1747 = "原來只要讓其他部位有快感，讓她分神，不要這麼緊張的話——" 

# monologue
# JP: （くりゅっ）
2164 = "（捏）" 

# 【ハチロク】
# display as 八六
# JP: 「んううううっ！」
# 1287 = "「嗯嗚——！」" 

# monologue
# JP: そう思いつつ乳首をさすれば、\n途端にハチロクは激しくひくつく。
1976 = "於是我擦了擦她的乳頭，八六又激烈地顫抖了起來。" 

# monologue
# JP: おまんまんはすりつぶすほどでなく、\nきゅうくつ――と言える範囲の締め付けになる。
1829 = "小妹妹的緊緻度終於下降到了一般狹窄的程度。" 

# 【双鉄H】
# display as 雙鐵
# JP: （これ、なら――いける、か？）
2157 = "（好像——可以了？）" 

# monologue
# JP: 口には出さない。\nハチロクをまたこわばらせるに決まってるから。
1910 = "我心裡想到。但真這麼說，又會讓八六緊張起來。" 

# monologue
# JP: 代わりにキスの雨を降らせて、\n乳首をなんども、しつこくしつこくいじりたおして――
1896 = "我只是不斷地吻她，不知道多少次擠壓過乳頭之後——" 

# monologue
# JP: （ずっ――ぬっ――ずぶううううっ！――プツっ）
2177 = "（緩緩插入——戳破）" 

# 【ハチロク】
# display as 八六
# JP: 「きゃふうっっっっ！？」
1225 = "「呀嗚——！？」" 

# monologue
# JP: （みちみちみちみちっ！）
2176 = "（緊緊包住）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うあ――あっ」
1240 = "「唔——啊」" 

# monologue
# JP: 勃起の先が何かをぷつりと切った感触。\nそこから先は、肉を割るような強烈すぎる密着感。
2036 = "肉棒好像頂開了什麼東西。再想深入就非常困難，感覺彷彿在割開肉一樣。" 

# 【ハチロク】
# display as 八六
# JP: 「あっ――ふあっ――あっ――あひっ――」
1251 = "「啊——嗚啊——啊——啊咿——」" 

# monologue
# JP: （こつっ）
2126 = "（咕呲）" 

# 【ハチロク】
# display as 八六
# JP: 「んきゅううううっ！！」
1282 = "「嗯呀——！！」" 

# monologue
# JP: やがて、先端が奥に当たって、痺れるような快感で――\n僕は、わずかにも動けなくなる。
2040 = "肉棒終於頂到了底，電擊一般的快感讓我動彈不得。" 

# 【ハチロク】
# display as 八六
# JP: 「あ……わたくし――わたくし、双鉄様と――\nひとつ、に――やっと――」
1260 = "「啊……我——我和雙鐵少爺——終於合為——一體了——」" 

# monologue
# JP: ぽろりと、ハチロクの目が涙をこぼす。\n痛みと、きっと喜びのため。
1716 = "八六的眼睛裡掉出了眼淚。既因為疼痛，也有喜悅的原因。" 

# monologue
# JP: 何か気の利いたことを言いたくて。\nなのに快感が強烈すぎて、欲望で脳が濁ってる。
1913 = "我想找點安慰她的話，但快感是那麼激烈，欲望讓我不能正常思考。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄……様――どうぞ、お好きになさってください」
1511 = "「雙鐵少爺……您想怎麼來就怎麼來吧」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？　しかし、お前、痛みが――」
1293 = "「嗯！？但你不是很痛嗎——」" 

# 【ハチロク】
# display as 八六
# JP: 「確かに、痛みも……ございます――ですが……んっ」
1431 = "「疼是痛……但是……嗯」" 

# monologue
# JP: ハチロクが言葉を発するだけで、\nおまんまんの中が震えて、快感がざわり押し上がってくる。
1713 = "八六的小妹妹跟著一起顫抖起來，讓我快感沸騰。" 

# 【ハチロク】
# display as 八六
# JP: 「それ以上に……喜びと……心地よさ、とが――あっ、\n双鉄、様、と……契りを――結べ……ました、から」
1149 = "「但更多的是……開心……以及舒服——啊，因為……和您結下了……婚約」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな――僕らは、契りを結んだ。\n切ってもきれぬ――お互いの、男と女に、なれたのだ」
1387 = "「是啊——我們結下了婚約。我們相親相愛——誰也別想切斷我們的關係」" 

# 【ハチロク】
# display as 八六
# JP: 「ですから――どうぞっ」
1376 = "「所以——來吧」" 

# monologue
# JP: （きゅうっ）
2170 = "（收緊）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1242 = "「唔！」" 

# monologue
# JP: 意識して、のことなのだろうか？
1791 = "她是主動的嗎？" 

# monologue
# JP: ハチロクのおまんまんが甘く蠢き、\nただでさえ締めている僕をより甘やかに、絞ろうとする。
1714 = "八六的小妹妹輕輕動了動，吮吸起了夾在中間的肉棒。" 

# 【ハチロク】
# display as 八六
# JP: 「満たして、ください――わたくしを、双鉄様で――\n双鉄様の、くださる――熱い、喜び、でっ」
1463 = "「請把我填滿——用您——滾燙的喜悅——」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ハチロクっ！」
1175 = "「八六！」" 

# monologue
# JP: （ずるううううううっ！）
2184 = "（長驅直入）" 

# 【ハチロク】
# display as 八六
# JP: 「くふううううんっ！」
1241 = "「唔——嗯！」" 

# monologue
# JP: （ズパンっ！！！）
2141 = "（啪！啪！！）" 

# 【ハチロク】
# display as 八六
# JP: 「あひゅんっ！！！」
1265 = "「啊嗯！！！」" 

# monologue
# JP: もう、止まらない、止まれない。
1879 = "我不會停下來了，也不可能停下來了。" 

# monologue
# JP: もとより限界に近かった、自分自身の歯止めを壊し、\nただひたすらに、ハチロクの中を味わい尽くす！
1933 = "我放開了自己已經接近極限的控制閥，一心一意地要嚐遍八六穴中裡的每一寸！" 

# monologue
# JP: （ずばっ！　じゅっ！　じゅるっ！　じゅにゅっ！）
2144 = "（啪！啾！啾嚕！啾嚕！）" 

# 【ハチロク】
# display as 八六
# JP: 「ひあっ、あっ――双鉄、さまっ――なにか、きます――\nなにか――やっ――これ――真っ白、にっ――んっっ！」
1222 = "「呀啊、啊——雙鐵少爺——要來了——有什麼——呀——這——腦子一片空白——嗯！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ハチロク！　ハチロク！」
1176 = "「八六！八六！」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！　双鉄様っ！」
1515 = "「雙鐵少爺！雙鐵少爺！」" 

# monologue
# JP: （ばちゅっ！　じゅ！　じゅりゅ！　ブぼっ！！）
2145 = "（啪！啾！啾嚕！噗！！）" 

# monologue
# JP: 熱い塊がこみ上げてくる。\nもう限界は振り切っている。
2008 = "熱意湧了上來。我已經掙脫了極限。" 

# monologue
# JP: だから一番深くへと、\n思いっきりに腰を突き出し！
1935 = "我朝著小妹妹的最深處，用最大的力氣挺進！" 

# monologue
# JP: （びゅるるるっ！　ぼびゅうっ！　びゅるっ！　びゅ！）
2153 = "（噗嚕嚕！噗！噗嚕！噗！）" 

# 【ハチロク】
# display as 八六
# JP: 「いっ――あっ――んくうっっっっっっっ！！！」
1238 = "「咿——啊——嗯嗚——！！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああっ――」
1263 = "「啊啊——」" 

# monologue
# JP: 射精――と、確か呼ぶ現象だ。\n真っ白く濁る熱い雫が、僕の勃起を通りぬけ――
2067 = "這就是叫做射精的現象吧。純白火熱的白濁液滴，穿過我的肉棒——" 

# monologue
# JP: ハチロクのおまんまんの一番奥の、\nその更に奥へと激しくぶつかり飛び散り、たまる。
1827 = "射進八六的小妹妹的最深處，射到更深的地方，在裡面迸發破散。" 

# 【ハチロク】
# display as 八六
# JP: 「あ……あ……双鉄、様の……\nあつい……おつゆ、が」
1255 = "「啊……啊……雙鐵少爺……您熱熱的……黏液……」" 

# monologue
# JP: ぼーっとした目で。無意識にか。
1808 = "她眼神呆滯，可能是下意識說的話。" 

# monologue
# JP: 繋がったままでなお、接合部から溢れたそれを、\nハチロクは指先で掬って――舐める。
1789 = "她從我們相連的部位揩下了一點溢出來的白濁液，舔了一舔。" 

# 【ハチロク】
# display as 八六
# JP: 「ん……苦いっ――ねばついて――からみつくような――\nなんでしょう、これは」
1280 = "「嗯……有點苦——又有點黏——沾在手上甩不掉——這是什麼啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「多分、だが――んっ――精液……\n赤ちゃんの、種、だと――思うっ」
1371 = "「我猜——嗯——這是精液……是小寶寶的種子」" 

# 【ハチロク】
# display as 八六
# JP: 「せいえき……双鉄、様の――\n赤ちゃんの、たね」
1447 = "「精液……是雙鐵少爺的——小寶寶的種子」" 

# monologue
# JP: （びゅくっ――びゅっ――びゅっ――びゅるっ）
2151 = "（噗——噗——噗——噗嚕）" 

# monologue
# JP: 何年分が、内側に溜まっていたのだろうか？
2074 = "難不成是陳年積攢下的精液嗎？" 

# monologue
# JP: ハチロクと会話しつつも、強すぎる快感に脱力しつつも、\nまだまだ射精は収まる気配も見せはしない。
1903 = "我和八六說著話，而且本來就快活到沒力氣了，但是我的射精卻沒有停歇的跡象。" 

# monologue
# JP: 次々溢れだしてくそれを、\nハチロクはいとおしそうに指ですくって、じっと眺める。
1707 = "八六用她可愛的手指沾起了不斷淌出來的精液，看得非常仔細。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様……この、せいえき……いただいても？」
1513 = "「雙鐵少爺……這些精液……可以給我嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ――好きにしてくれ。\n僕はすでに、全部まるごと、お前の男なのだから」
1429 = "「當然可以——隨你的便。畢竟我已經徹底屬於你一個人了」" 

# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます」
1464 = "「謝謝」" 

# monologue
# JP: （こくんっ）
2154 = "（嚥下）" 

# monologue
# JP: 苦く、ねばつき、からみつくという精液をハチロクは、\n目を閉じながら、愛おしそうに喉へと落とす。
1729 = "八六閉著眼睛，吞下了她所說的又苦又黏、還甩不掉的精液，樣子十分惹人憐愛。" 

# 【双鉄H】
# display as 雙鐵
# JP: （子を成せぬことを――知っているから、か？）
2156 = "（因為她也知道——她是沒辦法懷孕的嗎？）" 

# monologue
# JP: 思えば、狂おしいほどに愛おしくなる。
2019 = "真叫我愛她愛到要發瘋。" 

# monologue
# JP: ハチロクを、この世の誰より幸せに――\nその思いだけが胸に溢れる。
2010 = "現在我的心裡只有一個念頭——讓八六做世界上最幸福的人。" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1262 = "「啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
1300 = "「嗯？」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ――ほら」
1142 = "「不是的——您看」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1518 = "「！」" 

# monologue
# JP: 薄い腹ごし、\nハチロクの指がそうっと撫ぜる。
1710 = "八六用手指隔著肚皮輕輕撫摸我的肉棒。" 

# monologue
# JP: ただそれだけで震えるほどに心地よく。それで、気づく。\n射精で一度、勢いを失くしてた僕の勃起が――
1682 = "僅是如此，我已經快樂到渾身顫抖了。我突然發現，射完精軟下來的肉棒又一次勃起——" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様のおちんちん、まだまだ動きたいって、\nひくひくおねだり、なさってますね？」
1351 = "「您的雞雞好像還在動呢，它應該是還想要吧？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。構わんか？」
1397 = "「是啊，你不介意吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「もちろんですとも、双鉄様」
1428 = "「當然了，雙鐵少爺」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「あ――」
# 1243 = "「啊——」" 

# monologue
# JP: ハチロクの手が僕を掴まえ、\n導かれるままくちづける。
1703 = "八六摟住了我，讓我附身跟她接吻。" 

# monologue
# JP: 幸せそうに――ただ、幸せそうに。\nハチロクは満面の笑顔を浮かべる。
1806 = "她看起來是那麼幸福——滿臉都是笑意。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし、双鉄様の女、なのですから」」
1304 = "「因為我是屬於您的女子啊」" 
