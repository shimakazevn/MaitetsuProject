# 【双鉄H】
# display as 雙鐵
# JP: 「うむ。幼少期に僕は、おまんまんと呼ぶと教えられた。\n大学の友人などはおまんこと、詠語ではプッシーと呼ぶ」
1393 = "「Ừm. Hồi nhỏ tôi được dạy gọi đó là bướm.\nCòn bạn bè ở trường đại học thì gọi là lồn, trong tiếng Anh thì gọi là pussy.」"
# 【ハチロク】
# display as 八六
# JP: 「おまんまん……双鉄さまの勃起したおちんちんと、\nわたくしの、開放された……おまんまん」
1321 = "「Bướm……Chim đang cương cứng của Ngài Soutetsu, và,\nbướm……đã được giải trừ phong ấn của em.」"
# monologue
# JP: おちんちんと、おまんまん。
1831 = "Chim và bướm."
# monologue
# JP: 幼児語らしい単純な響きがハチロクに、\n“それは一対のものなのだ”と連想させてくれたらしい。
2017 = "Âm thanh đơn giản của những từ ngữ trẻ con dường như đã giúp Hachiroku,\nliên tưởng rằng “đó là một cặp đôi hoàn hảo”."
# 【ハチロク】
# display as 八六
# JP: 「それでは……もしかして、せっくす、とは。\nわたくしのおまんまんに、双鉄さまのおちんちん、を」
1483 = "「Vậy thì……có lẽ nào, làm tình, là.\nCho chim của Ngài Soutetsu, vào bướm của em.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、挿入して、文字通りに体でひとつになること。\nそれが、セックスだと僕は理解している」
1399 = "「Ừ, đưa vào trong, và hòa làm một với nhau theo đúng nghĩa đen.\nTôi hiểu làm tình là như vậy đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまの、おちんちんが――わたくしの、中、に」
1350 = "「Chim của, Ngài Soutetsu――sẽ vào bên trong, em.」"
# monologue
# JP: ふる、とハチロクの体が震える。
1722 = "Cơ thể Hachiroku khẽ run lên."
# 【ハチロク】
# display as 八六
# JP: 「それほどまでに大きなおちんちんが、\nわたくしの、おまんまんの中に入るのでしたら」
1502 = "「Nếu một cái chim to lớn đến nhường ấy,\nmà đi vào bên trong bướm của em.」"
# monologue
# JP: 怯えたとして、無理はない。\n指一本でも、あれほどまでに窮屈なのだ。
1794 = "Nếu em ấy có sợ hãi thì cũng là điều dễ hiểu.\nChỉ mới một ngón tay thôi mà đã chật chội đến thế cơ mà."
# 【ハチロク】
# display as 八六
# JP: 「わたくし、いま……おまんまんの中が……その、\nおつゆで、とろとろかと思うのですが――」
1373 = "「Em, bây giờ……bên trong bướm……ừm,\nchắc là đang nhầy nhụa nước dâm rồi――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「！」
1518 = "「!」"
# monologue
# JP: 目が、潤んでる。声は、期待に熱を帯びてる。\n怯えていない。ほんの僅かも。
1800 = "Đôi mắt em ướt át. Giọng nói mang theo hơi nóng của sự mong đợi.\nEm ấy không hề sợ hãi. Dù chỉ một chút."
# monologue
# JP: ハチロクは僕を受け入れることを当然として――\nその先のことを、何か、懸念してくれている。
1787 = "Hachiroku coi việc tiếp nhận tôi là điều hiển nhiên――\nVà đang lo lắng về điều gì đó sẽ xảy ra tiếp theo."
# 【ハチロク】
# display as 八六
# JP: 「押し出されて、おつゆが、きっと溢れますよね？\nそうしたら、わたくし、お布団を――」
1487 = "「Bị đẩy vào, nước dâm, chắc chắn sẽ tràn ra ngoài đúng không ạ?\nNếu vậy, em, sẽ làm chăn đệm――」"
# 【双鉄H】
# display as 雙鐵
# JP: 「布団などかまわん。そのためのシーツだろう。\n後で洗えば済むことだ。が――」
1332 = "「Chăn đệm thì không sao cả. Ga trải giường sinh ra là vì thế mà.\nSau này giặt là xong thôi. Nhưng mà――」"
# 【ハチロク】
# display as 八六
# JP: 「他にも、何かございましょうか？」
1481 = "「Còn chuyện gì khác nữa sao ạ?」"
# monologue
# JP: 一拍おいたそれだけで、ハチロクの目が不安に揺れる。\n僕をそれほど――強く求めてくれている。
1651 = "Chỉ một nhịp ngập ngừng của tôi thôi cũng đủ khiến ánh mắt Hachiroku dao động vì bất an.\nEm ấy khao khát tôi――mãnh liệt đến nhường ấy."
# monologue
# JP: 可愛らしくて、愛おしくって、\nだからこそ、少しの苦痛も不安も与えたくは無い。
1793 = "Thật đáng yêu, thật đáng mến,\nchính vì thế, tôi không muốn mang đến cho em dù chỉ một chút đau đớn hay bất an nào."
# 【双鉄H】
# display as 雙鐵
# JP: 「替えの制服をクリーニングに出したばかりだろう。\n今のをもしも、おつゆで汚してしまったら」
1154 = "「Em vừa mới mang bộ đồng phục dự phòng đi giặt khô mà đúng không.\nNếu bộ này, bị dính nước dâm làm bẩn mất thì sao.」"
# 【ハチロク】
# display as 八六
# JP: 「あ、左様ですね。お待ちください。\n今、全て脱いでしまいますので」
1318 = "「A, đúng là vậy ạ. Xin ngài đợi một lát.\nBây giờ, em sẽ cởi bỏ hết tất cả.」"
# monologue
# JP: ハチロクは手早く服を脱ぎ、それを丁寧にたたんでいく。\n帽子、手袋、ベルトも綺麗に整え置いて――
1699 = "Hachiroku nhanh chóng cởi quần áo ra, và cẩn thận gấp chúng lại.\nMũ, găng tay, thắt lưng cũng được xếp gọn gàng――"
# monologue
# JP: どころか、タブレットまでを外してしまう。
2013 = "Thậm chí, em ấy còn tháo cả thẻ bảng ra."
# 【双鉄H】
# display as 雙鐵
# JP: 「タブレット、外してしまって大丈夫なのか？」
1382 = "「Thẻ bảng, tháo ra như vậy có sao không?」"
# 【ハチロク】
# display as 八六
# JP: 「ええ、コントロールを移動するときの専有確認の――\nパソコンでいえば、起動確認のCDのようなものですので」
1405 = "「Vâng, nó giống như một xác nhận độc quyền khi di chuyển quyền điều khiển――\nNếu nói theo ngôn ngữ máy tính, thì nó giống như đĩa CD xác nhận khởi động vậy ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「なるほど。起動時に確認、読み込みできれば、\nその後は外してしまって大丈夫なのか」
1179 = "「Ra là vậy. Nếu đã xác nhận và đọc được lúc khởi động,\nthì sau đó tháo ra cũng không sao à.」"
# 【ハチロク】
# display as 八六
# JP: 「とはいえ、失くしては一大事です。\n普段は決して、外すものではございませんが――」
1152 = "「Dù vậy, nếu làm mất thì sẽ là một vấn đề lớn đấy ạ.\nBình thường thì tuyệt đối không được tháo ra đâu nhưng――」"
# monologue
# JP: ハチロクの目が僕を捉える。\n澄み切った朱に、心の全てを引き込まれる。
1724 = "Ánh mắt Hachiroku hướng về phía tôi.\nSắc đỏ trong vắt ấy thu hút trọn vẹn trái tim tôi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様に、せっくす――していただくのですから。\n全てを脱ぎ捨て、裸のわたくしでいたいと、どうしても」
1151 = "「Bởi vì em sẽ được Ngài Soutetsu, làm tình――mà.\nNên dù thế nào, em cũng muốn cởi bỏ tất cả, để được là chính mình trong trạng thái khỏa thân.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな。余計なものは、何もいらんな」
1396 = "「Đúng vậy. Những thứ dư thừa, không cần thiết nữa.」"
# monologue
# JP: 僕も、全てを脱ぎ捨てる。
1883 = "Tôi cũng cởi bỏ tất cả."
# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1262 = "「啊」" 
# monologue
# JP: 風呂で何度も見てるだろうに、\nハチロクの口から、興奮したような声が漏れる。
1979 = "Dù đã nhìn thấy bao nhiêu lần trong phòng tắm rồi,\nnhưng từ miệng Hachiroku vẫn thốt ra một giọng nói đầy hưng phấn."
# monologue
# JP: ああ、いや、僕も同じだ。\n風呂で見ている裸は、単なる裸だが――
1657 = "À, không, tôi cũng vậy thôi.\nCơ thể khỏa thân nhìn thấy trong phòng tắm, chỉ đơn thuần là khỏa thân nhưng――"
# 【双鉄H】
# display as 雙鐵
# JP: 「ハチロク。お前を、僕の女にするぞ」
1177 = "「Hachiroku. Tôi sẽ biến em, thành người phụ nữ của tôi.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様。わたくしを――\n双鉄様の女に、どうぞ、なさってください」
1299 = "「Vâng, Ngài Soutetsu. Xin ngài――\nhãy biến em, thành người phụ nữ của Ngài Soutetsu đi ạ.」"
# monologue
# JP: 今、ここにいる僕とハチロクは、\nお互いを求め合ってる、裸の男と裸の女だ。
1992 = "Lúc này, ở đây, tôi và Hachiroku,\nlà một người đàn ông và một người phụ nữ khỏa thân, đang khao khát lẫn nhau."
# monologue
# JP: 姿に、言葉に、仕草の一つに、\nどうしようもなく、性的興奮をかきたてられる。
1891 = "Từ dáng vẻ, lời nói, cho đến từng cử chỉ,\nđều khơi gợi sự hưng phấn tình dục một cách không thể cưỡng lại."
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、十分ほぐしておこう」
1490 = "「Nếu vậy, tôi sẽ nới lỏng cho em thật kỹ nhé.」"
# monologue
# JP: （くちぃっ）
2166 = "（Nhóp nhép）"
# 【ハチロク】
# display as 八六
# JP: 「ああっ」
1264 = "「A.」"
# monologue
# JP: 切なげな声を漏らしはするが、\nハチロクは僕の動きを止めない。
2072 = "Dù phát ra những âm thanh nũng nịu,\nnhưng Hachiroku không hề ngăn cản hành động của tôi."
# monologue
# JP: おまんまんを指で開かれたまま、\nシーツを掴み、じいっと僕を見つめてる。
1797 = "Để mặc cho ngón tay tôi mở rộng bướm của mình,\nem nắm chặt lấy ga giường, và chăm chú nhìn tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「肉……だな。感触もそうであったが、\n見た目も、素晴らしく可愛い、肉だ」
1478 = "「Thịt……nhỉ. Cảm giác khi chạm vào là vậy,\nnhưng nhìn bề ngoài, cũng là những thớ thịt vô cùng đáng yêu.」"
# 【ハチロク】
# display as 八六
# JP: 「さ、左様でございますか？」
1436 = "「V, vậy sao ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
# 1394 = "「是啊」" 
# monologue
# JP: 指で広げた菱型の頂点には、可愛らしい突起がある。\n押し開かれた内側にはピンクの濡れた肉が広がる。
1964 = "Ở đỉnh của hình thoi được mở rộng bằng ngón tay, có một nốt lồi nhỏ nhắn đáng yêu.\nBên trong được đẩy mở ra là những thớ thịt màu hồng ướt át."
# monologue
# JP: ひくつく肉には小さな――恐らくは排尿のための穴があり、\nその下に、僕の指を飲み込んだ窮屈なくぼみが震えてる。
2077 = "Trên phần thịt đang co giật có một cái lỗ nhỏ――có lẽ là lỗ niệu đạo,\nvà bên dưới đó, vùng lõm chật chội vừa nuốt trọn ngón tay tôi đang run rẩy."
# 【双鉄H】
# display as 雙鐵
# JP: 「とても可愛く、いやらしい。\nずっと見ていたいほどのものだが――」
1437 = "「Rất đáng yêu, và dâm đãng.\nĐến mức tôi muốn nhìn mãi không thôi nhưng――」"
# monologue
# JP: （つぷっ）
2160 = "（Phập）"
# 【ハチロク】
# display as 八六
# JP: 「ふああああああああああっ！！」
1269 = "「Phuaaaaaaaaaa!!」"
# monologue
# JP: （ぴゅぴゅっ！）
2128 = "（Tũm tũm!）"
# 【双鉄H】
# display as 雙鐵
# JP: （おっと）
2136 = "（Ối.）"
# monologue
# JP: 寄せてた顔にしぶきがかかる。\nハチロクのおまんまんの中に湧いた水かと――
2081 = "Những giọt nước bắn lên khuôn mặt đang kề sát của tôi.\nCó phải là nước tuôn ra từ bên trong bướm của Hachiroku không――"
# monologue
# JP: そこで温まったぬくみかと、\n思えば、勃起が激しくびくつく。
1981 = "Nghĩ đến sự ấm áp đã được ủ ấm ở đó,\ndương vật đang cương cứng của tôi giật nảy lên dữ dội."
# 【双鉄H】
# display as 雙鐵
# JP: （挿れたい、な。\nだが――まだだ――徹底的にほぐさねば）
2174 = "（Muốn đút vào, quá.\nNhưng――vẫn chưa được――phải nới lỏng ra thật kỹ mới được.）"
# 【ハチロク】
# display as 八六
# JP: 「ふあっ……はっ――はぁっ……あひっ！？」
1266 = "「Phua……ha――ha……ahi!?」"
# monologue
# JP: （ぐりゅっ――こしゅっ！）
2127 = "（Ngoáy――sột!）"
# monologue
# JP: 少しでも広げておこうと指を鉤にし、\nハチロクがさっき感じてた、ざらつく部分を擦り上げる。
1955 = "Để mở rộng ra thêm dù chỉ một chút, tôi cong ngón tay lại như một cái móc,\nvà cọ xát vào phần thô ráp mà Hachiroku vừa cảm nhận thấy lúc nãy."
# monologue
# JP: （きゅっ――きゅむっ――きゅううううっ）
2125 = "（Siết――siết chặt――siết chặttttt）"
# 【ハチロク】
# display as 八六
# JP: 「あっ――ひっ――んううっ――双鉄、様っ――\nそれ――すごすぎ――って、んひゅっ――ひうううっ！」
1248 = "「A――hi――ưm ư――Ngài, Soutetsu――\nCái đó――sướng quá――ưm hyu――hiưưư!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1242 = "「!」"
# monologue
# JP: 指が、ちぎられそうになる。
1875 = "Ngón tay tôi, như sắp bị đứt lìa ra."
# monologue
# JP: 刺激がどうにも強すぎるのか、ほぐすどころか、\nこれではかえって頑なにしてしまいかねない。
1771 = "Có vẻ như kích thích quá mạnh, thay vì nới lỏng ra,\nđiều này lại càng làm cho nó trở nên cứng ngắc hơn."
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば――」
1494 = "「Nếu vậy thì――」"
# monologue
# JP: （ちゅむっ）
2147 = "（Chụt）"
# monologue
# JP: おまんまんへとくちづけをした瞬間に、\nむわりと、強い熱気を感じる。
1939 = "Khoảnh khắc tôi đặt nụ hôn lên bướm em,\nmột luồng nhiệt khí mạnh mẽ phả vào mặt."
# monologue
# JP: 構わず舌で割り入れば、これほどやわらかなものがなお、\nキュッキュと強く締め付けてくる。
1889 = "Mặc kệ điều đó, tôi dùng lưỡi len lỏi vào trong, một thứ mềm mại đến vậy,\nlại đang siết chặt lấy tôi."
# 【ハチロク】
# display as 八六
# JP: 「ひあっ！？　あ――双鉄様――双鉄さま、がっ――\nんっ！　わたくし、の――おまんまん――を――んふっ」
1229 = "「Hia!? A――Ngài Soutetsu――Ngài Soutetsu, đang――\nƯm! Bướm――của, em――ưm.」"
# monologue
# JP: （ツ――れるっ――れろっ――じゅっ――じゅるっ――）
2149 = "（Liếm――liếm láp――liếm láp――chụt――chụt――）"
# 【ハチロク】
# display as 八六
# JP: 「あひっ――やっ――あうっっ……おまん、まん――\nはっ――あっ――とけ、ちゃうっ――んうっ」
1245 = "「Ahi――A――Aư……Bướm, bướm――\nHa――A――Tan chảy, mất thôi――Ưm.」"
# monologue
# JP: ああ、やはりこれが正解だ。
1774 = "À, quả nhiên đây mới là cách làm đúng."
# monologue
# JP: くちづけたまま、割り入った舌でほじくるように、\n外から中へとゆるゆると、螺旋を描き舐めほぐす。
1949 = "Vẫn giữ nguyên nụ hôn, tôi dùng chiếc lưỡi đã len lỏi vào trong như đang ngoáy móc,\ntừ ngoài vào trong, từ từ liếm láp theo hình xoắn ốc để nới lỏng ra."
# 【ハチロク】
# display as 八六
# JP: 「やっ――あっ――うねうね――してっ――んっ――\nおなか――おまんまんっ――あっ、舐めて――ん、ふっ」
1217 = "「A――A――Uốn lượn――như vậy――Ưm――\nBụng――Bướm――A, liếm đi――Ưm, phù.」"
# monologue
# JP: じゅぶじゅぶ、口におつゆが溢れる。
2086 = "Nhóp nhép, nước dâm tràn ngập trong miệng tôi."
# monologue
# JP: 舐めて平気かと思ったが、無味無臭の、\nほとんど水の……上等の水の味わいだ。
1999 = "Lúc đầu tôi còn lo không biết liếm có sao không, nhưng nó vô vị vô hương,\ngần như là nước……hương vị của một loại nước thượng hạng."
# monologue
# JP: （じゅるるうるるるっ）
2179 = "（Chùn chụt chùn chụt）"
# 【ハチロク】
# display as 八六
# JP: 「やあアッ！　音、音をたてて――んっ――\nおまんまん――すっちゃ――いや、ですうっ」
1224 = "「Aaa! Phát ra, âm thanh như vậy――Ưm――\nBướm――Bị mút――Không, chịu đâu.」"
# monologue
# JP: （ほじっ）
2124 = "（Ngoáy）"
# 【ハチロク】
# display as 八六
# JP: 「ひゃうんっ！！？」
1226 = "「Hyaưn!!?」"
# monologue
# JP: イヤといわれれば続けない。
1781 = "Bảo không chịu thì tôi sẽ không làm tiếp nữa."
# monologue
# JP: 代わりに栓をするように、舌をいっぱいに伸ばし舐めれば、\nこれはこれで、ハチロクはがくがくと腰を震わす。
1920 = "Thay vào đó, như để đóng nút lại, tôi thè lưỡi ra liếm láp,\nđiều này lại khiến Hachiroku run rẩy cả hông."
# 【ハチロク】
# display as 八六
# JP: 「あ……ひっ――んっ――あっ――あああっ」
1253 = "「A……Hi――Ưm――A――Aaaa.」"
# monologue
# JP: 舐める。舐める。ひたすら舐めて、\n舌でほじって、音を立てぬようおつゆを飲み干す。
1907 = "Liếm. Liếm. Tôi say sưa liếm láp,\ndùng lưỡi tách mở khe hở, lặng lẽ nuốt trọn thứ dịch nhờn ướt át."
# monologue
# JP: ……どれくらい、そうした時間を過ごしただろう。\nハチロクが、とろとろに溶けた声を出す。
953 = "……Không biết đã qua bao lâu rồi.\nHachiroku cất lên giọng nói mềm nhũn như tan chảy."
# 【ハチロク】
# display as 八六
# JP: 「そう……てつ、さまっ――わたくし――おまん、まん、\nもう、とけそう、で――切なく、てっ」
1508 = "「Ngài…… Soutetsu——cô bé, của em,\nsắp, tan chảy mất rồi——khó chịu, quá——っ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――僕の方も、もう限界だ」
1274 = "「Ừm——Anh cũng, đến giới hạn rồi.」"
# monologue
# JP: 勃起がヘソまで反り返り、軽く腹肉を押している。\n舌もいささかしびれるほどだ。
1778 = "Dục vọng cương cứng vươn thẳng tới tận rốn, ép nhẹ vào phần bụng dưới.\nLưỡi tôi cũng đã hơi tê dại."
# 【双鉄H】
# display as 雙鐵
# JP: （さすがに、十二分にほぐせただろう）
2183 = "（Chắc là, đã đủ mềm mại rồi nhỉ）"
# 【ハチロク】
# display as 八六
# JP: 「あっ――」
# 1243 = "「啊——」" 
# monologue
# JP: 足を持ち上げ押し広げれば、\n体がくにゃくにゃだとわかる。
1923 = "Nâng đôi chân em lên và dang rộng ra,\ntôi có thể cảm nhận được cơ thể em đang mềm nhũn."
# monologue
# JP: ハチロクは全身くったりと力をぬいて、\nただおまんまんだけを貪欲にひくつかせてる。
1706 = "Hachiroku buông thõng toàn thân, không còn chút sức lực,\nchỉ có cô bé là đang co giật đầy tham lam."
# 【双鉄H】
# display as 雙鐵
# JP: 「少しずつ――挿れてみるぞ」
1369 = "「Anh sẽ từ từ——tiến vào nhé」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄――様っ」
1314 = "「Vâng, ngài Soutetsu——」"
# monologue
# JP: ハチロクの声がわずかに震える。\n僕の体も、震えてる。
1718 = "Giọng Hachiroku hơi run rẩy.\nCơ thể tôi cũng đang run lên."
# monologue
# JP: 不安と期待両方が、\n僕らを支配し――心まで強く、つなげてくれる。
1857 = "Cả sự bất an lẫn kỳ vọng,\nđang chi phối chúng tôi——kết nối cả trái tim lại với nhau thật bền chặt."
# monologue
# JP: （ぴとっ）
2180 = "（Chạm nhẹ）"
# 【ハチロク】
# display as 八六
# JP: 「んふううっっ！」
1287 = "「Ưm hưm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1242 = "「唔！」" 
# monologue
# JP: 柔肉に勃起を押し付ける。\nただそれだけで、肉がうねって吸い付いてくる。
2038 = "Tôi ép phần thịt cương cứng vào lớp thịt mềm mại.\nChỉ vậy thôi, phần thịt ấy đã uốn éo và mút chặt lấy tôi."
# monologue
# JP: 熱い塊がただそれだけでせり上がってきて、\n必死に堪え、落ち着くための息を吐く――
1996 = "Dục vọng nóng bỏng cứ thế dâng trào,\ntôi tuyệt vọng kìm nén, thở hắt ra để bình tĩnh lại——"
# 【ハチロク】
# display as 八六
# JP: 「触れただけで……これほど……ここちよいのなら……」
1170 = "「Chỉ mới chạm vào thôi…… mà đã…… sung sướng thế này thì……」"
# monologue
# JP: ハチロクが言葉にしてくれる。\n僕の期待を。僕の不安を。
1941 = "Hachiroku đã nói thay tiếng lòng tôi.\nCả sự kỳ vọng. Cả nỗi bất an."
# monologue
# JP: 心が重なりあっているから、\n体もやはり、もっと深くに重なりたくなる。
1890 = "Vì trái tim đã hòa quyện vào nhau,\nnên thể xác cũng muốn được hòa quyện sâu sắc hơn nữa."
# monologue
# JP: （しにゅっ――すっ――するっ――すりゅっ）
2138 = "（Phập——sượt——trượt——sột sột）"
# 【ハチロク】
# display as 八六
# JP: 「やぁっ――あっ――おまんまんの――すじっ――\nこすられ、てっ――んっ――ふあっ！」
1214 = "「Nhá——a——khe hở——của cô bé——\nđang bị cọ xát——ưm——ư a!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――あっ――」
1239 = "「Hự——a——」"
# monologue
# JP: 息が漏れる。声が溢れる。\n歯を思い切りかみしめていても、その隙間から。
1917 = "Hơi thở rò rỉ. Tiếng rên rỉ tuôn trào.\nDù có cắn chặt răng đến đâu, âm thanh vẫn lọt qua kẽ răng."
# monologue
# JP: 快感が背筋をかけのぼり、\nそれがあまりに強くてぞくぞくしすぎて殆ど吐きそうで。
1863 = "Khoái cảm chạy dọc sống lưng,\nmạnh mẽ đến mức khiến tôi run rẩy, gần như buồn nôn."
# 【ハチロク】
# display as 八六
# JP: 「あ……ンッ――ふあっ――あっ――双鉄、ッ様っ――\nじらしちゃ……あっ――いや、ですっ――んっ」
1257 = "「A……ưm——ư a——a——Ngài Soutetsu——\nĐừng trêu em nữa……a——không chịu, đâu——ưm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1312 = "「Ừm」"
# monologue
# JP: もう、これ以上はほぐせない。
1845 = "Không thể nào nới lỏng thêm được nữa."
# monologue
# JP: ハチロクの肉は蕩けきってて、\n僕を求めて張り付き吸い付き抱きついてくる。
1719 = "Lớp thịt của Hachiroku đã hoàn toàn tan chảy,\nbám chặt, mút lấy và ôm trọn lấy tôi như đang khao khát."
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば――いくぞっ」
1499 = "「Vậy thì——anh vào đây」"
# monologue
# JP: （つぷっ）
2165 = "（Phập）"
# 【ハチロク】
# display as 八六
# JP: 「かはっ！？」
1272 = "「A!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1242 = "「唔！」" 
# monologue
# JP: 甘さに、鋭さが混じる声。\n理由を、僕の勃起の先端が教えてくれる。
1796 = "Giọng nói ngọt ngào xen lẫn sự chói tai.\nLý do thì, phần đầu đang cương cứng của tôi đã cho tôi biết."
# 【双鉄H】
# display as 雙鐵
# JP: 「痛むのか？」
1337 = "「Đau sao em?」"
# 【ハチロク】
# display as 八六
# JP: 「少し――少し、だけ――いっぱい、で――んっ」
1212 = "「Một chút——chỉ một chút, thôi——vì đầy ắp, quá——ưm」"
# monologue
# JP: 少しだけ、などということはありえない。
1866 = "Không thể nào chỉ là một chút được."
# monologue
# JP: 僕の勃起の先端は、これほどやわらかい肉なのに、\nなおぎゅうぎゅうと圧されて、痛みを感じるほどだから。
1692 = "Phần đầu đang cương cứng của tôi, dù được bao bọc bởi lớp thịt mềm mại đến thế,\nnhưng vẫn bị ép chặt đến mức tôi cũng cảm thấy đau đớn."
# 【ハチロク】
# display as 八六
# JP: 「そう、てつ――さまっ――くちづけ、を――\nどうか、わたくしに――」
1509 = "「Ngài Soutetsu——hãy hôn, em đi——\nxin ngài, hãy hôn em——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1281 = "「嗯」" 
# monologue
# JP: （れるっ）
2133 = "（Sượt）"
# 【ハチロク】
# display as 八六
# JP: 「んふうっ――んっ――」
1286 = "「Ưm hưm——ưm——」"
# monologue
# JP: （れるっ――れろっ――じゅちゅっ――じゅるっ）
2132 = "（Sượt——sượt——chụt——chu mút）"
# monologue
# JP: ハチロクの唇を押し割って、\n短い舌に舌を絡めて、吸い込むようになめさする。
1943 = "Tôi cạy mở đôi môi Hachiroku,\nquấn lấy chiếc lưỡi ngắn của em, mút mát và liếm láp."
# monologue
# JP: （きゅっ――きゅきゅっ）
2129 = "（Siết chặt——siết chặt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ」
# 1281 = "「嗯」" 
# monologue
# JP: そうしていると、締め付けがいくらか和らいでくる。
1975 = "Làm vậy, sự co thắt cũng dịu đi phần nào."
# monologue
# JP: そうか、他の部分を気持よくして、\n意識をほぐし、ちらせれば――
1747 = "Ra là vậy, chỉ cần làm cho những bộ phận khác cảm thấy sung sướng,\nđể tâm trí em thư giãn và phân tán sự chú ý thì——"
# monologue
# JP: （くりゅっ）
2164 = "（Nắn nắn）"
# 【ハチロク】
# display as 八六
# JP: 「んううううっ！」
# 1287 = "「嗯嗚——！」" 
# monologue
# JP: そう思いつつ乳首をさすれば、\n途端にハチロクは激しくひくつく。
1976 = "Nghĩ vậy, tôi liền xoa nắn đầu ngực em,\nngay lập tức Hachiroku co giật dữ dội."
# monologue
# JP: おまんまんはすりつぶすほどでなく、\nきゅうくつ――と言える範囲の締め付けになる。
1829 = "Cô bé không còn siết chặt đến mức nghiền nát nữa,\nmà chỉ còn ở mức chật chội——có thể nói là vậy."
# 【双鉄H】
# display as 雙鐵
# JP: （これ、なら――いける、か？）
2157 = "（Thế này, thì——vào được, chưa nhỉ?）"
# monologue
# JP: 口には出さない。\nハチロクをまたこわばらせるに決まってるから。
1910 = "Tôi không nói ra miệng.\nVì chắc chắn sẽ làm Hachiroku căng thẳng trở lại."
# monologue
# JP: 代わりにキスの雨を降らせて、\n乳首をなんども、しつこくしつこくいじりたおして――
1896 = "Thay vào đó, tôi trút xuống những nụ hôn như mưa,\nliên tục, liên tục trêu đùa đầu ngực em——"
# monologue
# JP: （ずっ――ぬっ――ずぶううううっ！――プツっ）
2177 = "（Phập——phập——phập phập phập!——Bục）"
# 【ハチロク】
# display as 八六
# JP: 「きゃふうっっっっ！？」
1225 = "「Kya hưm!?」"
# monologue
# JP: （みちみちみちみちっ！）
2176 = "（Siết chặt siết chặt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「うあ――あっ」
1240 = "「Ư a——a」"
# monologue
# JP: 勃起の先が何かをぷつりと切った感触。\nそこから先は、肉を割るような強烈すぎる密着感。
2036 = "Cảm giác phần đầu cương cứng vừa xuyên thủng thứ gì đó.\nTừ đó trở đi là một cảm giác áp sát mãnh liệt như xé toạc da thịt."
# 【ハチロク】
# display as 八六
# JP: 「あっ――ふあっ――あっ――あひっ――」
1251 = "「A——ư a——a——a hi——」"
# monologue
# JP: （こつっ）
2126 = "（Cộc）"
# 【ハチロク】
# display as 八六
# JP: 「んきゅううううっ！！」
1282 = "「Ưm kyaaa!!」"
# monologue
# JP: やがて、先端が奥に当たって、痺れるような快感で――\n僕は、わずかにも動けなくなる。
2040 = "Cuối cùng, phần đầu cũng chạm đến tận cùng, mang theo khoái cảm tê dại——\nTôi không thể nhúc nhích dù chỉ một chút."
# 【ハチロク】
# display as 八六
# JP: 「あ……わたくし――わたくし、双鉄様と――\nひとつ、に――やっと――」
1260 = "「A……em——em, với ngài Soutetsu——\ncuối cùng, cũng hòa làm một——rồi——」"
# monologue
# JP: ぽろりと、ハチロクの目が涙をこぼす。\n痛みと、きっと喜びのため。
1716 = "Nước mắt tuôn rơi từ khóe mắt Hachiroku.\nVì đau đớn, và chắc chắn là cả vì vui sướng nữa."
# monologue
# JP: 何か気の利いたことを言いたくて。\nなのに快感が強烈すぎて、欲望で脳が濁ってる。
1913 = "Tôi muốn nói điều gì đó thật tinh tế.\nNhưng khoái cảm quá mãnh liệt, dục vọng làm mờ đi lý trí."
# 【ハチロク】
# display as 八六
# JP: 「双鉄……様――どうぞ、お好きになさってください」
1511 = "「Ngài Soutetsu……——xin ngài, cứ làm những gì ngài muốn đi ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？　しかし、お前、痛みが――」
1293 = "「!? Nhưng mà, em, đang đau——」"
# 【ハチロク】
# display as 八六
# JP: 「確かに、痛みも……ございます――ですが……んっ」
1431 = "「Quả thực, cũng có……đau đớn——nhưng mà……ưm」"
# monologue
# JP: ハチロクが言葉を発するだけで、\nおまんまんの中が震えて、快感がざわり押し上がってくる。
1713 = "Chỉ cần Hachiroku cất tiếng,\nbên trong cô bé lại run lên, khoái cảm dâng trào mạnh mẽ."
# 【ハチロク】
# display as 八六
# JP: 「それ以上に……喜びと……心地よさ、とが――あっ、\n双鉄、様、と……契りを――結べ……ました、から」
1149 = "「Hơn thế nữa……niềm vui và……sự sung sướng——a,\nbởi vì……em đã được……kết——duyên, cùng ngài Soutetsu……rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな――僕らは、契りを結んだ。\n切ってもきれぬ――お互いの、男と女に、なれたのだ」
1387 = "「Đúng vậy——chúng ta, đã kết duyên rồi.\nChúng ta đã trở thành người đàn ông và người phụ nữ của nhau——không thể tách rời」"
# 【ハチロク】
# display as 八六
# JP: 「ですから――どうぞっ」
1376 = "「Vì vậy——xin ngài hãyっ」"
# monologue
# JP: （きゅうっ）
2170 = "（Siết chặt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1242 = "「唔！」" 
# monologue
# JP: 意識して、のことなのだろうか？
1791 = "Có phải em đang có ý thức làm vậy không?"
# monologue
# JP: ハチロクのおまんまんが甘く蠢き、\nただでさえ締めている僕をより甘やかに、絞ろうとする。
1714 = "Cô bé của Hachiroku ngọt ngào vặn vẹo,\ncố gắng siết chặt lấy tôi hơn nữa, dù vốn dĩ đã rất khít rồi."
# 【ハチロク】
# display as 八六
# JP: 「満たして、ください――わたくしを、双鉄様で――\n双鉄様の、くださる――熱い、喜び、でっ」
1463 = "「Xin hãy, lấp đầy em——bằng ngài Soutetsu——\nbằng niềm vui, nóng bỏng——mà ngài Soutetsu, trao cho emっ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ハチロクっ！」
1175 = "「Hachiroku!」"
# monologue
# JP: （ずるううううううっ！）
2184 = "（Phập phập phập!）"
# 【ハチロク】
# display as 八六
# JP: 「くふううううんっ！」
1241 = "「Ư hưm!」"
# monologue
# JP: （ズパンっ！！！）
2141 = "（Phập!!!）"
# 【ハチロク】
# display as 八六
# JP: 「あひゅんっ！！！」
1265 = "「A hưm!!!」"
# monologue
# JP: もう、止まらない、止まれない。
1879 = "Không thể dừng lại, không thể dừng lại được nữa."
# monologue
# JP: もとより限界に近かった、自分自身の歯止めを壊し、\nただひたすらに、ハチロクの中を味わい尽くす！
1933 = "Phá vỡ lớp kìm nén vốn đã gần chạm đến giới hạn của bản thân,\ntôi chỉ biết đắm chìm vào việc tận hưởng trọn vẹn bên trong Hachiroku!"
# monologue
# JP: （ずばっ！　じゅっ！　じゅるっ！　じゅにゅっ！）
2144 = "（Phập! Chụt! Chu mút! Sột sột!）"
# 【ハチロク】
# display as 八六
# JP: 「ひあっ、あっ――双鉄、さまっ――なにか、きます――\nなにか――やっ――これ――真っ白、にっ――んっっ！」
1222 = "「Kya, a——Ngài Soutetsu——có thứ gì đó, sắp đến——\nthứ gì đó——á——cái này——trắng xóa, rồi——ưm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ハチロク！　ハチロク！」
1176 = "「Hachiroku! Hachiroku!」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！　双鉄様っ！」
1515 = "「Ngài Soutetsu! Ngài Soutetsu!」"
# monologue
# JP: （ばちゅっ！　じゅ！　じゅりゅ！　ブぼっ！！）
2145 = "（Phập! Chụt! Chu mút! Bục!!）"
# monologue
# JP: 熱い塊がこみ上げてくる。\nもう限界は振り切っている。
2008 = "Khối nhiệt nóng bỏng trào dâng.\nĐã vượt quá giới hạn rồi."
# monologue
# JP: だから一番深くへと、\n思いっきりに腰を突き出し！
1935 = "Vì vậy, tôi dùng hết sức đẩy hông,\ntiến vào nơi sâu nhất!"
# monologue
# JP: （びゅるるるっ！　ぼびゅうっ！　びゅるっ！　びゅ！）
2153 = "（Phụt phụt phụt! Phụt! Phụt! Phụt!）"
# 【ハチロク】
# display as 八六
# JP: 「いっ――あっ――んくうっっっっっっっ！！！」
1238 = "「Á——a——ưm kuu!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああっ――」
1263 = "「A a——」"
# monologue
# JP: 射精――と、確か呼ぶ現象だ。\n真っ白く濁る熱い雫が、僕の勃起を通りぬけ――
2067 = "Chắc chắn là hiện tượng được gọi là——xuất tinh.\nNhững giọt chất lỏng nóng hổi trắng đục xuyên qua phần cương cứng của tôi——"
# monologue
# JP: ハチロクのおまんまんの一番奥の、\nその更に奥へと激しくぶつかり飛び散り、たまる。
1827 = "Bắn mạnh, vương vãi và đọng lại tận sâu bên trong,\nsâu hơn nữa bên trong cô bé của Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「あ……あ……双鉄、様の……\nあつい……おつゆ、が」
1255 = "「A……a……dịch nhờn……nóng hổi……\ncủa ngài Soutetsu」"
# monologue
# JP: ぼーっとした目で。無意識にか。
1808 = "Đôi mắt đờ đẫn. Trong vô thức sao."
# monologue
# JP: 繋がったままでなお、接合部から溢れたそれを、\nハチロクは指先で掬って――舐める。
1789 = "Dù vẫn đang kết nối, Hachiroku dùng đầu ngón tay vớt lấy phần chất lỏng tràn ra từ chỗ giao hợp——rồi liếm."
# 【ハチロク】
# display as 八六
# JP: 「ん……苦いっ――ねばついて――からみつくような――\nなんでしょう、これは」
1280 = "「Ưm……đắng quá——dính nhớp——như quấn chặt lấy——\nCái này, là gì vậy ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「多分、だが――んっ――精液……\n赤ちゃんの、種、だと――思うっ」
1371 = "「Anh đoán là——ưm——tinh dịch……\nlà hạt giống, của em bé——anh nghĩ vậyっ」"
# 【ハチロク】
# display as 八六
# JP: 「せいえき……双鉄、様の――\n赤ちゃんの、たね」
1447 = "「Tinh dịch……của ngài Soutetsu——\nhạt giống, của em bé」"
# monologue
# JP: （びゅくっ――びゅっ――びゅっ――びゅるっ）
2151 = "（Phụt——phụt——phụt——phụt phụt）"
# monologue
# JP: 何年分が、内側に溜まっていたのだろうか？
2074 = "Không biết đã tích tụ bên trong bao nhiêu năm rồi nhỉ?"
# monologue
# JP: ハチロクと会話しつつも、強すぎる快感に脱力しつつも、\nまだまだ射精は収まる気配も見せはしない。
1903 = "Dù đang trò chuyện với Hachiroku, dù cơ thể rã rời vì khoái cảm quá mạnh,\nnhưng việc xuất tinh vẫn chưa có dấu hiệu dừng lại."
# monologue
# JP: 次々溢れだしてくそれを、\nハチロクはいとおしそうに指ですくって、じっと眺める。
1707 = "Hachiroku âu yếm dùng ngón tay vớt lấy thứ chất lỏng liên tục trào ra,\nrồi chăm chú ngắm nhìn."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様……この、せいえき……いただいても？」
1513 = "「Ngài Soutetsu……tinh dịch, này……em có thể nhận được không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ――好きにしてくれ。\n僕はすでに、全部まるごと、お前の男なのだから」
1429 = "「Đương nhiên rồi——tùy ý em đi.\nBởi vì anh, trọn vẹn cả con người này, đã là người đàn ông của em rồi」"
# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます」
1464 = "「Cảm ơn ngài」"
# monologue
# JP: （こくんっ）
2154 = "（Ực）"
# monologue
# JP: 苦く、ねばつき、からみつくという精液をハチロクは、\n目を閉じながら、愛おしそうに喉へと落とす。
1729 = "Hachiroku nhắm mắt lại, âu yếm nuốt thứ tinh dịch đắng chát, dính nhớp và quấn chặt lấy cổ họng ấy xuống."
# 【双鉄H】
# display as 雙鐵
# JP: （子を成せぬことを――知っているから、か？）
2156 = "（Là vì——em ấy biết mình không thể sinh con sao?）"
# monologue
# JP: 思えば、狂おしいほどに愛おしくなる。
2019 = "Nghĩ vậy, tôi lại càng thấy yêu em đến điên cuồng."
# monologue
# JP: ハチロクを、この世の誰より幸せに――\nその思いだけが胸に溢れる。
2010 = "Phải làm cho Hachiroku trở thành người hạnh phúc nhất trên thế gian này——\nChỉ có suy nghĩ đó là tràn ngập trong tim tôi."
# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1262 = "「啊」" 
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
1300 = "「Ưm?」"
# 【ハチロク】
# display as 八六
# JP: 「いえ――ほら」
1142 = "「Không có gì ạ——ngài xem」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1518 = "「！」" 
# monologue
# JP: 薄い腹ごし、\nハチロクの指がそうっと撫ぜる。
1710 = "Xuyên qua lớp da bụng mỏng manh,\nngón tay Hachiroku nhẹ nhàng vuốt ve."
# monologue
# JP: ただそれだけで震えるほどに心地よく。それで、気づく。\n射精で一度、勢いを失くしてた僕の勃起が――
1682 = "Chỉ vậy thôi cũng đủ khiến tôi sung sướng đến run rẩy. Và rồi, tôi nhận ra.\nPhần cương cứng của tôi vốn đã xìu xuống sau một lần xuất tinh, giờ lại——"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様のおちんちん、まだまだ動きたいって、\nひくひくおねだり、なさってますね？」
1351 = "「Cậu bé của ngài Soutetsu, dường như vẫn muốn vận động tiếp,\ndang giật giật đòi hỏi phải không ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。構わんか？」
1397 = "「Ừ. Có sao không?」"
# 【ハチロク】
# display as 八六
# JP: 「もちろんですとも、双鉄様」
1428 = "「Đương nhiên là được rồi, thưa ngài Soutetsu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ――」
# 1243 = "「啊——」" 
# monologue
# JP: ハチロクの手が僕を掴まえ、\n導かれるままくちづける。
1703 = "Bàn tay Hachiroku nắm lấy tôi,\ndẫn dắt tôi trao nụ hôn."
# monologue
# JP: 幸せそうに――ただ、幸せそうに。\nハチロクは満面の笑顔を浮かべる。
1806 = "Trông thật hạnh phúc——chỉ là, trông thật hạnh phúc.\nHachiroku nở nụ cười rạng rỡ."
# 【ハチロク】
# display as 八六
# JP: 「わたくし、双鉄様の女、なのですから」」
1304 = "「Bởi vì em, là người phụ nữ của ngài Soutetsu mà」"
