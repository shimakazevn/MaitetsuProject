# monologue
# JP: 同じく\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であるオリヴィが、\nどんな扱いを受けていたのか、多少心配になってくる。
2911 = "如此一來，我就開始有點擔心了。難以想像同樣身為\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的奧莉薇在這裡的待遇究竟如何。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
# 2527 = "「雙鐵少爺？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すいません。ぼーっとしました。\n少し、乗り疲れが出てしまったのかな」
2004 = "「啊，不好意思，我有點走神了。可能是一路坐車過來有點累了」" 

# 【美馬】
# display as 美馬
# JP: 「そりゃあそうでしょう。[はやと,1]早戸－[かごしま,2]鹿兒島－[せんだい,1]千内経由で[やつしろ,2]八ツ城\nなんて長時間をよくもまぁ……お好きなんですねぇ」
2484 = "「這也難怪，途徑隼人、鹿兒島和川內抵達八代，能忍受如此長時間的車旅勞頓……您的愛著實非比尋常」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論です。\nでなければ、結婚しません」
2505 = "「那是當然，不然我也不會與她結婚」" 

# 【ハチロク】
# display as 八六
# JP: 「そ、双鉄さまっ！？」
2525 = "「雙、雙鐵少爺！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あっ」
1998 = "「啊」" 

# monologue
# JP: これはしまった、『ハチロクと過ごす時間が』ではなく、\n『長時間乗車が』に対する『お好き』であったか――
3116 = "糟了，對方所言並非指“與八六共同度過漫漫時光”——而是對於“長時間搭車”的喜歡。" 

# 【美馬】
# display as 美馬
# JP: 「確かに、私らは鉄道と結婚したようなもんですねぇ。\nここまでの斜陽産業になるとは、思ってもいなかった」
2406 = "「的確我們現在就如同是與鐵路事業結了婚一般啊。以前真是做夢都沒想到，會沒落至此等夕陽遲暮的田地」" 

# monologue
# JP: 普通に誤解をしたのか、\nあるいは、誤解したふりをしてくれたのか。
2751 = "他是真的誤解了我的意思，還是佯裝誤解為我打圓場呢。" 

# monologue
# JP: 美馬さんは微苦笑を浮かべ――\n目を細め、八ツ城駅を静かに見渡す。
3127 = "美馬先生微微苦笑——而後眯起眼睛，默默環視整個車站。" 

# 【美馬】
# display as 美馬
# JP: 「それでもまだ、走ってますから。\nなかなか、見捨てられんもんですなぁ」
1905 = "「即便如此，我們也還都馳騁在這鐵路線上，這哪是能夠輕易割捨得了的啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日が傾くのは、また昇るためです」
2276 = "「日落西山，也是為將來能夠東山再起」" 

# monologue
# JP: 僕ごとき若輩者が、おそらくは鉄道一筋に生きてこられた、\nこの方にいえるようなことでは無いとも思う。
2762 = "以我一介後生晚輩，或許並沒有資格與這些在鐵路事業上嘔心瀝血的老一輩談論這些。" 

# monologue
# JP: が、それでも声が出てしまう。\nそうするために、僕はここに来ているのだから。
3080 = "然而我還是忍不住這樣回答他，因為我來到這裡也是為了實現這個目標。" 

# 【双鉄】
# display as 雙鐵
# JP: 「みかん鉄道と御一夜鉄道がつながったように、\nレールは必ず、再び広くつながっていきますよ」
2121 = "「就如橙鐵路和御一夜鐵路能夠建立聯繫一樣，鐵路一定會再次遍布我們日本的大地」" 

# 【美馬】
# display as 美馬
# JP: 「ははっ――かもしれませんねぇ。\nあの[きゅうごう,1]Ⅸ号がまた本線を走るって話なんですから」
1958 = "「哈哈——或許真能有那麼一天，畢竟就連九號都要再次在幹線上行駛了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうでした。本日は、そのお話を」
2034 = "「嗯，是的。我們今天前來，正是想就此事向您諮詢一二」" 

# 【美馬】
# display as 美馬
# JP: 「うかがってますよ。御社の[ひない,1]雛衣社長から。\nオリヴィが\x%l共感;#00ffc040;共感%l;#;を閉ざしてるそうで」
2226 = "「我已從貴公司雛衣社長處得知了情況，聽說奧莉薇關閉了\\x%l共感;#00ffc040;共鳴%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……」
# 1443 = "「……」" 

# monologue
# JP: ハチロクから話した方がよかろうと思い、\n返事を待つ――が、ハチロクは口を開かない。
3019 = "我心想此事應該由八六談起為好，於是靜待她回話。不想八六卻並沒有做聲。" 

# monologue
# JP: 妙な沈黙が生まれてしまう。\nならば、僕から話す他ない。
3200 = "這樣沉默下去難免尷尬，那就只能由我來說明情況了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、聞いています。まだオリヴィは添乗のみ。乗務には\nあたっていませんので、当座は問題がないのですが」
2245 = "「我聽說的也是這個情況，現在奧莉薇只是在陪同執行乘務任務，還沒有讓她單獨負責，所以目前還沒有問題」" 

# 【美馬】
# display as 美馬
# JP: 「当座ではなくなってしまったときに、問題になる」
1931 = "「可是以後就會有問題了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「率直に申しますと、そのとおりです。ですので今日は、\n御一夜鉄道への譲渡前の状況などをお伺いできればと」
2181 = "「恕我直言，您的判斷一語中的。所以今天我們就是前來了解她在來到御一夜鐵路之前的各種情況」" 

# 【美馬】
# display as 美馬
# JP: 「わかりました。\nオリヴィを使っていた\x%l機関士;#00ffc040;機関士%l;#;をお連れしましょう」
2237 = "「我明白了。那我就將原先使用奧莉薇的\\x%l機関士;#00ffc040;司機%l;#;帶過來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2534 = "「！」" 

# monologue
# JP: 言って、美馬さんが駅裏手へと消えていく。\n消えるやいなやでハチロクが、あきれたような声をだす。
3174 = "說罷，美馬先生便向車站後方走去。待他漸漸淡出了我們的視野，八六才以頗為不滿的語氣開口了。" 

# 【ハチロク】
# display as 八六
# JP: 「……お人あたりの柔らかな方かとお見受け致しましたが、\n気の利く方、というわけではないようですね」
1468 = "「……此人雖然態度彬彬有禮，卻似乎並不懂得待人之道」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ハチロクもそう感じたか」
2022 = "「嗯，你也這麼覺得嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。[の]乗り[づか]疲れされている双鉄さまに立ち話させ、\nお茶のひとつもお出ししないだなんて」
2303 = "「是的，明明雙鐵少爺舟車勞頓，對方卻連看座奉茶之類的基本禮節都不懂得」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこか」
1846 = "「你是說這個啊」" 

# monologue
# JP: そこは全く気にしてなかった。
3008 = "我倒是完全不在乎這些。" 

# monologue
# JP: 逆にハチロクには、僕の引っ掛かりが気にならないのか、\n少し不思議に感じてしまう。
3012 = "我反而有些奇怪，為什麼我在意的事情，八六居然絲毫沒往心裡去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に対する扱いがいかがなものかが、\nむしろ気にかかってしまったが」
1886 = "「其實我在意的反倒是，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;在他們心中的地位」" 

# 【ハチロク】
# display as 八六
# JP: 「と、申されますと？」
2186 = "「您的意思是？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『オリヴィを使っていた』だの、\n『作りの良い\x%lレイルロオド;#00ffc040;レイルロオド%l;#;』だの」
1900 = "「剛剛對方不是說什麼“使用奧莉薇”，還有“做工精良”」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ！」
2002 = "「啊！」" 

# monologue
# JP: 少し驚いたような表情。\nそれが笑顔に溶けていく。
2907 = "她面露訝異之色，但很快便又恢復了笑容。" 

# 【ハチロク】
# display as 八六
# JP: 「うふふ、双鉄さまは[わたくしたち,5]レイルロオドを、とても大切に\n扱って下さっているのですね――ありがとうございます」
1951 = "「呵呵，雙鐵少爺您真的是非常愛惜我們\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，著實令我感激不盡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？\nまるで僕が変わり者であるかのような言い方だが」
2042 = "「嗯？聽你這話就好像我的態度才屬於特例」" 

# 【ハチロク】
# display as 八六
# JP: 「で、ございましょう。世間一般――。と申しましても、\nわたくしが知る世間は、『旧帝鉄』の基準ですが」
2055 = "「在一般人看來的話應該確實如此——雖然我所知的一般，也只是“前帝國鐵路”的標準」" 

# 【双鉄】
# display as 雙鐵
# JP: 「旧帝鉄――」
1897 = "「前帝國鐵路——」" 

# monologue
# JP: 言われて、気づく、\nなるほどだ。
3141 = "聽她這麼一說我才注意到，原來是這麼回事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ポーレットには帝鉄勤務の経験が無い。\nゆえ、御一夜鉄道はその文化圏の外にあるのか」
2112 = "「對啊，波萊特沒有在帝國鐵路工作的經驗，所以御一夜鐵路就沒有受到其文化的薰陶」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。そして、みかん鉄道様は、見たところ、\n旧帝鉄の文化をそのまま引き継いでらっしゃるかと」
2460 = "「誠如您所言。而依我所見，橙鐵路這裡應當是繼承了前帝國鐵路的文化氛圍」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんな雰囲気ではあるよな」
2132 = "「就氣氛來說還真是這樣啊」" 

# monologue
# JP: 昔ながら、という言葉が素直に出てくるホームの景色だ。
2972 = "就是車站的景象，也與記憶中別無二致。" 

# monologue
# JP: 幼少期の僕と路子がそこの階段から下りてきたとて、\n一片の違和感も生じないであろうほどに。
2877 = "哪怕現在兒時的我和路子正在從那邊的台階走過來，大概也不會產生絲毫不協調的感覺。" 

# 【双鉄】
# display as 雙鐵
# JP: 「旧帝鉄の文化では――ああ、いや、\nハチロクにも聞かされたことがあったか」
1859 = "「依照前帝國鐵路的文化——啊，等等，這些其實也都聽你說起過的」" 

# 【ハチロク】
# display as 八六
# JP: 「なにをでございましょうか？」
2184 = "「您是想說哪方面呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「旧帝鉄、[ていおう,1]帝央\x%l機関区;#00ffc040;機関区%l;#;では、8620[けい]形\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\nトップナンバー以外、ハロ１、ハロ２の連番だったと」
1802 = "「不是說在前帝國鐵路，帝國中央車站\\x%l機関区;#00ffc040;機務段%l;#;，８６２０型\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;除首車人偶都依次稱為Haro1號、Haro2號的嘛」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、そのように細かなことまで\n覚えてらしてくださったのですね！」
1955 = "「哇，您居然連這些細節都記得一清二楚！」" 

# monologue
# JP: ハチロクの笑顔に温度が加わる。\nさらにあたたかなものになる。
2818 = "八六的笑容更添幾分燦爛，我看在眼中，心頭也變得越來越溫暖。" 

# 【ハチロク】
# display as 八六
# JP: 「左様でございます。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、基本、物。\nそこは、旧帝鉄の取扱の基本でございました」
2340 = "「正是如此，一般\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;都只被定義為物品，這也是過去前帝國鐵路的基本認識」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 2016 = "「嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「もちろん、常に例外はございます。\n例えば、[デーゴジュウイチ,2]Ｄ５１　[ハチヨンマル,2]８４０レイルロオド――ラン」
2404 = "「當然既有基本，便總有特例，比方說Ｄ５１　８４０的鐵路人偶——蘭」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ＴＶＣＭでよく見る\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だな。\n東日ノ本では大人気のようだが」
1977 = "「哦，是那位經常做電視廣告的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;吧，在關東好像知名度很高」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまの大九洲ＳＬ構想を後追いしての、東日ノ本一丸\nとなってのＳＬ構想――その金看板でございますね」
2520 = "「關東大一統，模仿您的大九州蒸汽機車藍圖所規劃的蒸汽機車藍圖——而她便是這塊藍圖的金字招牌」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[ハチヨンマル,2]８４０とは、極平凡な量産機であろう番号だよな。\nしかも、デゴイチは[ヒノモト,2]日ノ本全土で珍しくない」
2164 = "「從８４０這個編號看，她應該是極其普通的量產機車之一對吧，而且Ｄ５１在全日本也並不算少見」" 

# 【ハチロク】
# display as 八六
# JP: 「左様でございますね。けれど、あのランは――\n現役時代から、なんと申せば良いのでしょうか……」
2344 = "「正是如此，但是說到蘭的話——她自從在第一線工作的時候就是……該如何表述才好呢」" 

# monologue
# JP: 言葉を探して、ハチロクが少し黙り込む。
2812 = "八六沉默了片刻，應該是在挑選措辭。" 

# 【ハチロク】
# display as 八六
# JP: 「看板、広告塔――タレント！　で良いのでしょうか？\nそういうふうに扱われていたこだと聞き及びました」
2335 = "「標誌、照片——或者說偶像！不知這樣描述您是否能理解，總之依我所知，這就是她當時的身份」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1971 = "「哦」" 

# 【ハチロク】
# display as 八六
# JP: 「ランは、[デーゴジュウイチけい,3]Ｄ５１形\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とは思えない、\n非常にスマアトで華やいだ印象の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です」
2454 = "「要說蘭這一\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;本身，其外表之華麗與心智之機敏，相較一般Ｄ５１型\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;可謂天壤之別」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[デゴイチ,2]Ｄ５１\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、一般的には華やがぬのか？」
2528 = "「難道一般的Ｄ５１\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;外表都並不華麗？」" 

# 【ハチロク】
# display as 八六
# JP: 「[かもつき,2]貨物機\x%lレイルロオド;#00ffc040;レイルロオド%l;#;らしい――朴訥、寡黙、勤勉。\nそうした印象を持ったものが多いように思われます」
2070 = "「大多都符合標準的貨運機車用\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;形象——木訥、寡言、勤勉」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。だとすると、あのランという\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\n確かに毛色が全く違う――相当な変わり種だな」
1987 = "「哦，這樣說來那位名叫蘭的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的確可以說是風格迥異，屬於相當特殊的個體了」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。それこそ[らん]蘭の花のように、目立って優美で。\nあのこは、最初の運用から\x%l客車;#00ffc040;客車%l;#;を牽引したそうですよ？」
2037 = "「嗯，正如其名，她的形象宛如蘭花一般美麗而醒目，聽說她從一開始就是用於牽引\\x%l客車;#00ffc040;客運車廂%l;#;編組的機車」" 

# monologue
# JP: そう賞賛するハチロクの声までが優美だ。\nよほど、気に入っているのであろう。
2804 = "八六就連讚揚她的聲音都頗為動聽，看來她也是相當喜愛那個鐵路人偶。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それほど特別に扱われたのか。\nかつての帝鉄の、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は物とする文化の中でも」
2125 = "「就是在曾經帝國鐵路將\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;視為物品的文化環境之中，她都有如此特殊的待遇」" 

# monologue
# JP: 言って。いや違うか、ともすぐに感じる。\n『物』として扱うからこそ、運用を柔軟に切り替えるのか。
3170 = "話音剛落，我就覺得這麼說不對了。或許正因為是將其視為物品，才能隨意改變用途。" 

# monologue
# JP: 貨物機として産まれ、けれども広告塔とされる――\nラン自身の意思の如何は、おそらく考慮さえされぬまま。
3090 = "生為貨運機車的鐵路人偶，卻被用於宣傳——恐怕並沒有人考慮過蘭自身的意願。" 

# 【ハチロク】
# display as 八六
# JP: 「いわゆる『当り[がま]罐』の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;版でございますね。\nときどき、ああしたこが出てまいります」
1827 = "「也可以形容為\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;中的“大獎”吧。偶爾就是會出現像蘭那樣的個體」" 

# monologue
# JP: けれど、ハチロクの声には無邪気な賞賛の感しかない。\nならば僕から、そこを引っ掻き回す必要も無いだろう。
2770 = "但是聽八六的口氣卻只有純粹的讚揚，那麼我也就沒有必要深究這些了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『当り[がま]罐』――か。そんなこともあるのか？\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、精密機械の代表格であろうに」
1440 = "「“大獎”是嗎——還真會有這種情況發生？\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;自身不該是精密機械行業的尖端技術產物嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「精密機械であると同時に、わたくしたちでさえ\nその製造の核心部を知らない、機密製品でございます」
1799 = "「不僅屬於精密機械，還是一種機密產品，就連我們自己都不了解其核心技術」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。それゆえに[まぎ]紛れがある？」
1982 = "「哦，正因為如此才會出現各種偏差？」" 

# 【ハチロク】
# display as 八六
# JP: 「で、あろうかと存じます。個性、個体差は、同形式でも\n――恐らくは双鉄さまのご想像より、遥かに大きいかと」
1856 = "「依我看來當是如此，哪怕型號相同，其中個性與個體的差別之大——恐怕是遠超您的想像」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 1971 = "「哦」" 

# monologue
# JP: そういわれるとますます、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は生物に近い、と、\nそんな考えが――僕の実感が強化されていく。
3032 = "我聽到她這番解釋，我就越來越覺得，並且更加堅信——\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;與生物無比接近。" 

# monologue
# JP: “蒸機は生き物”である以上に、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、命と体温を持っているのだ、と。
2719 = "不僅是“蒸汽機車與生物無異”，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;更是擁有生命與體溫的存在。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が――　一般的にはモノ扱いか」
1937 = "「可是，一般人卻將其視為物品」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、ですが、精密機器なうえ機密製品で、しかも、\n鉄道保安部品ですから、手厚く保護されておりますよ？」
2290 = "「是的，不過我們不僅屬於精密機器以及機密產品，還是鐵路安全組件，因而也是受到了嚴格保護的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、それはそうだな。\n鉄道営業法でもしっかりと守られているとは感じる」
2008 = "「啊，這倒也是，從鐵路運營法也能看出對於你們的保護措施很到位」" 

# 【ハチロク】
# display as 八六
# JP: 「みだりに\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に触れたり、損壊させれば、\n簡単に刑事事件になりますからね」
2450 = "「要是未經允許就觸碰\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;或者將其毀壞，很容易就會被定性為刑事犯罪」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。線路への置石などと同様の、\n安全支障を生みかねない行為だものな、それは」
2123 = "「就是啊，和在鐵軌上亂扔石頭一樣，這些行為都是有可能威脅到行車安全的」" 

# monologue
# JP: ゆえ、乗客は\x%lレイルロオド;#00ffc040;レイルロオド%l;#;には触れられないし、\n鉄道事業者とてそう気楽には扱えない。
3041 = "所以不僅乘客無法觸碰\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，即使是有關人員也需要慎重對待。" 

# monologue
# JP: 他社・他者所有の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;への接し方には、\n僕の場合は、ある意味では対人以上に気を使う。
2970 = "尤其是對待其他公司或個人所有的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，對我來說某種意義上甚至比待人還要費神。" 

# 【ハチロク】
# display as 八六
# JP: 「物ではあるけれど、極めて重要。しかし、結局は物。\nそれが、一般的な意識においての\x%lレイルロオド;#00ffc040;レイルロオド%l;#;かと」
1866 = "「儘管屬於物品，卻價值甚高，但卻仍不過是物品。這就是一般人對於\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的認識」" 

# 【双鉄】
# display as 雙鐵
# JP: 「結局は物、という部分が、よくわからんな」
2523 = "「雖然我還是理解不了為什麼只能被定義為物品」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね、例えば――」
2518 = "「關於您的疑問，舉例來說——」" 

# 【美馬】
# display as 美馬
# JP: 「いやいや、すみません。\nおまたせしました」
1965 = "「哎呀實在不好意思。讓您久等了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いえ」
2005 = "「啊，哪裡哪裡」" 

# 【美馬】
# display as 美馬
# JP: 「これが、[むなかた,1]宗方。\nオリヴィを使っていた\x%l機関士;#00ffc040;機関士%l;#;です」
2485 = "「這位是宗方。他就是在我們這裡使用奧莉薇的\\x%l機関士;#00ffc040;司機%l;#;」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2002 = "「啊！」" 

# monologue
# JP: ハチロクが小さく声をあげ、\nすぐに口を閉じ、かしこまる。
2831 = "八六輕聲驚呼，但隨即閉口正色，不至失態。" 

# monologue
# JP: 僕もしっかり記憶している。\nこの人は、オリヴィを連れていた\x%l機関士;#00ffc040;機関士%l;#;だ。
2997 = "我也記得一清二楚，他就是將奧莉薇帶去我們那裡的\\x%l機関士;#00ffc040;司機%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜では、お世話になりました。\n御一夜鉄道[ハチロクニイマル,3]8620号\x%l機関士;#00ffc040;機関士%l;#;。右田双鉄です」
1823 = "「之前在御一夜勞煩您了，我是御一夜鐵路８６２０號\\x%l機関士;#00ffc040;司機%l;#;，名叫右田雙鐵」" 

# 【宗方】
# display as 宗方
# JP: 「よければ、どうぞ」
1797 = "「不介意的話請用吧」" 

# monologue
# JP: ハチロクと並びベンチに座っていた腰をあわてて、\nわずかに浮かす。
2995 = "我之前和八六一起並肩坐在長椅上，見狀連忙從座位上微微站起。" 

# 【双鉄】
# display as 雙鐵
# JP: 「恐縮です。ご馳走になります」
2102 = "「實在不好意思，那就不客氣了」" 

# monologue
# JP: 缶コーヒーだ。僕ひとりにだけ。\nハチロクの分も、宗方さん自身の分もない。
2952 = "宗方先生遞來了罐裝咖啡，不過只有給我的一聽，既沒有八六的也沒有他自己喝的。" 

# monologue
# JP: 一応は、気を使ってもらえている。\nならば、駅長室などは来客で使用中であるのかもしれん。
3102 = "看來姑且還是把我們當客人對待的。那也許是已經有先客來訪，占據了站長室之類的場所。" 

# 【宗方】
# display as 宗方
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;同士――の話で、大丈夫ですかね？」
1928 = "「可以理解為——這是\\x%l機関士;#00ffc040;司機%l;#;之間的交談嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「肩書抜きでということですね？　了解です」
2196 = "「意思是拋開彼此的身份嗎，好的」" 

# 【宗方】
# display as 宗方
# JP: 「なら、ざっくばらんに行くが――」
2500 = "「那我就打開天窗說亮話了——」" 

# monologue
# JP: 宗方さんも、無造作にベンチに腰掛ける。
2943 = "宗方先生於是也隨意坐在了長椅上。" 

# monologue
# JP: ハチロク、僕、宗方さんの並びだが、\n僕と宗方さんとの間には、人一人ほどの空間がある。
2746 = "他坐在了我的身旁，八六在我的另一邊。但是宗方先生和我之間，仍隔著一人左右寬的間隙。" 

# 【宗方】
# display as 宗方
# JP: 「オリヴィが、壊れたのか？」
2074 = "「奧莉薇是出了故障嗎？」" 

# monologue
# JP: 予想以上にざっくばらんだ。
3202 = "這話可比我想像中還要直戳了當。" 

# monologue
# JP: 声音がどこか心配そうで、\nそこにはなんだか、少しだけほっとさせられる。
2754 = "他的聲音聽起來有幾分擔心，這也令我稍稍鬆了一口氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いえ、壊れたというわけではありません。\n表面上は、明るく気丈にふるまっています。が――」
1812 = "「不，並非是出了故障。雖然表面上她的態度開朗而積極——」" 

# monologue
# JP: ここは、ハチロクからの方がいい。
3045 = "接下來還是交給八六來解釋吧。" 

# monologue
# JP: 宗方さんを見、ハチロクを見て、また目で問えば、\n宗方さんは、無言の頷きで答えてくれる。
3029 = "我看了一眼宗方先生，又看向八六，接著用眼神徵求宗方先生的同意，他隨後默默點了點頭表示應允。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィは\x%l共感;#00ffc040;共感%l;#;の殆どを拒絶しています。\n乗務外でのこととはいえ、これは異常な状態です」
1428 = "「\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;奧莉薇幾乎拒絕與我們進行\\x%l共感;#00ffc040;共鳴%l;#;。儘管是在執行乘務任務之外的時候，但這依然屬於異常狀況」" 

# 【宗方】
# display as 宗方
# JP: 「ほぉ？　なら、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;同士は、\n乗務の外でも\x%l共感;#00ffc040;共感%l;#;を交わすものなのか？」
2051 = "「噢？\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;之間在執行乘務任務之外也會進行\\x%l共感;#00ffc040;共鳴%l;#;？」" 

# monologue
# JP: 僕より遥かにベテランの――つまりは先輩の\x%l機関士;#00ffc040;機関士%l;#;だ。\nその質問は、意外であるような気もする。が……
2960 = "對方作為\\x%l機関士;#00ffc040;司機%l;#;，可是遠比我經驗豐富的前輩，我總覺得這個問題不該從他的口中聽到，不過……" 

# monologue
# JP: 冷静になれば僕とても、普段ハチロクとれいなとが、\nどんな\x%l共感;#00ffc040;共感%l;#;を交わし合っているかなど、まるで知らない。
2767 = "但冷靜一想，其實我也並不清楚，平時八六和玲奈進行的\\x%l共感;#00ffc040;共鳴%l;#;都是什麼樣的內容。" 

# 【ハチロク】
# display as 八六
# JP: 「普段から深くまで\x%l共感;#00ffc040;共感%l;#;を交わすものでもございませんが、\n人間の皆様の雑談同様、日常的な\x%l共感;#00ffc040;共感%l;#;などは交わします」
2208 = "「我們並不是一直在進行深層\\x%l共感;#00ffc040;共鳴%l;#;。在平時我們之間的共鳴內容其實與人類的閒聊無二」" 

# 【宗方】
# display as 宗方
# JP: 「女子職員の、茶飲み話みたいなものか？」
2134 = "「就類似於女職員之間的的喝茶聊天？」" 

# 【ハチロク】
# display as 八六
# JP: 「そのご解釈で、大きくはズレていないものかと」
2228 = "「我想如此形容並沒有太大偏差」" 

# 【宗方】
# display as 宗方
# JP: 「その茶飲み話をオリヴィは拒否している？」
2266 = "「於是奧莉薇拒絕與你們閒聊？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
2288 = "「是的」" 

# 【宗方】
# display as 宗方
# JP: 「拒否されると、どう困る」
2487 = "「這對你們有哪些影響」" 

# 【ハチロク】
# display as 八六
# JP: 「現時点では、少しさみしい程度です。けれどももしも、\n万が一、乗務に係わる\x%l共感;#00ffc040;共感%l;#;までが閉ざされるなら」
2407 = "「目前來說只是令我們稍感寂寞，但是萬一她在執行乘務時也開始拒絕\\x%l共感;#00ffc040;共鳴%l;#;的話——」" 

# 【宗方】
# display as 宗方
# JP: 「ああ。そうなれば完全に使い物にならんな」
1992 = "「哦，那樣的話可就徹底派不上用場了」" 

# monologue
# JP: 鉄仮面のようだった宗方さんの表情が、\nわずかに歪む。
2940 = "宗方先生彷彿戴著面具一般毫無表情的臉上，些許擔憂一閃而過。" 

# 【宗方】
# display as 宗方
# JP: 「御一夜では、[きゅうごう,1]Ⅸ号とオリヴィを――」
1844 = "「你們御一夜是要讓九號和奧莉薇——」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。本線を走ってもらう予定ですので」
2295 = "「是的，我們打算讓其負責幹線運營」" 

# 【宗方】
# display as 宗方
# JP: 「問題があることは理解した。\n……理解はしたが」
1845 = "「你們要提出的問題我明白了……可是」" 

# monologue
# JP: 野太い指が、無精髭の生えた顎を撫ぜる。
2748 = "他將粗壯的手指放在下巴上，摸了摸略為雜亂的鬍子。" 

# 【宗方】
# display as 宗方
# JP: 「故障ならオレの手には負えんし、\n拗ねているだけなら、それはもうオレの管轄外だ」
2084 = "「如果是出了故障的話我處理不了，如果只是它在耍性子，如今這也不是我該負責的了」" 

# 【ハチロク】
# display as 八六
# JP: 「……そうおっしゃられてしまいますと――\nまさしく、お言葉のとおりではあるのですけれど――」
1461 = "「……按說這事情，的確如您所說——」" 

# monologue
# JP: ハチロクの立場では、\n他社の職員の意見に異論を挟めない。
3230 = "面對其他公司職員，她以八六的身份是難以提出異議的。" 

# monologue
# JP: ここから先は、僕が引き継ぐべきだろう。
3209 = "那話題就該由我繼續下去了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにか、拗ねるような原因に心あたりがおありですか？\n弊社雛衣は、かかる事態を回避して欲しいと、時間を」
2262 = "「敢問您對於導致奧莉薇耍性子的原因有什麼眉目嗎？原本我公司的雛衣為避免這一情況的發生，特地留出了時間」" 

# 【宗方】
# display as 宗方
# JP: 「ああ。その話は聞いたし、業務命令も受けた。\n引き渡しにはこっちも、万全の準備をするつもりだった」
2316 = "「是，我聽說了你們的用意，也得到了上面的指示。原本我們也是打算做好萬全的準備，再移交給你們的」" 

# monologue
