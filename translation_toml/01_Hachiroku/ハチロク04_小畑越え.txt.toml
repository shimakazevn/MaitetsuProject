# JP: 「長年使ってきた道具だ。愛着もある」
2398 = "「畢竟是使用多年的物件，感情還是有的」" 

# monologue
# JP: 宗方さんは、今度は自然に答えてくれる。\nにじみ出てきたような言葉を、ハチロクもただ受け止める。
2941 = "宗方先生很乾脆地回答道，而八六也只是默默接受了他的肺腑之言。" 

# 【宗方】
# display as 宗方
# JP: 「譲渡のおかげで、アレもオレも本線に復帰できる。\nいいことばかりだ――使いこなしてもらえるなら、な」
2065 = "「多虧這次轉屬，不論它還是我都能回歸幹線工作，對雙方都是件好事。雖然這還需要貴公司能夠做到物盡其用」" 

# 【双鉄】
# display as 雙鐵
# JP: 「こちらとしても、もちろんそうするつもりです。\n今回お話をお伺いしにきたのは、そのためです」
2211 = "「我們當然也準備讓她充分發揮她的價值。本次來訪也正是為此」" 

# 【宗方】
# display as 宗方
# JP: 「そうか」
2497 = "「那就好」" 

# monologue
# JP: 宗方さんが、僕を見る。\nぼり、と、その指が頬を掻く。
2948 = "宗方先生看向我，有些不好意思地撓了撓自己的臉頰。" 

# 【宗方】
# display as 宗方
# JP: 「じゃじゃ馬な面もあるが、素直な機械だ。\n形式は確かに古いが、学習意欲も高い」
2097 = "「它這機器雖然有時愛耍脾氣，本性還是坦率耿直，儘管型號已年代久遠，但依然勤奮好學」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 2016 = "「嗯」" 

# monologue
# JP: Ⅸ号ではなく、オリヴィのことだ。
2758 = "他這番話不是說九號，而是指奧莉薇。" 

# monologue
# JP: 僕のとなりで、とても小さく――\nハチロクが、ほっとしたような息を吐く。
2883 = "在我身旁的八六也輕輕地舒了一口氣。" 

# 【宗方】
# display as 宗方
# JP: 「まだ何年か――運がよければ、この先も走れるだろう。\n本線で――使える限りは、できるだけ使ってやってほしい」
2475 = "「起碼還有幾年，如果受上天庇佑，甚至可以再跑更久一些。只要條件允許，希望你們能讓它在幹線上堅持到最後」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのつもりです」
2210 = "「我們會的」" 

# monologue
# JP: ……\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を物と扱う。\nそのことへの違和感が、薄らいでいく。
1407 = "……將\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;視作物品，我對於這一認識的排斥正在一點點淡化。" 

# monologue
# JP: 同時に、少しだけわかったような気持ちになれる。\nオリヴィが、みかん鉄道を愛する理由を。
3143 = "與之同時，對於奧莉薇如此熱愛橙鐵路的理由，我似乎多少也能理解些許了。" 

# monologue
# JP: （物として――宗方さんは、みかん鉄道は、\nⅨ号とオリヴィを、大事に大事に扱ってきたのだ）
3240 = "（九號和奧莉薇儘管被視為物品，卻依然受到了宗方先生以及整個橙鐵路的人們悉心呵護）" 

# monologue
# JP: そうでなければ、１００年以上経過した今も\n現役で走れるわけがない。
2724 = "不然歷經百年以上歲月的蒸汽機車，也不可能留有足以在第一線活躍的能力。" 

# monologue
# JP: 文化の違いから来る違和感に惑わされ、そんな単純な\n事実を失念しかけた自分が、恥ずかしくなる。
2992 = "想不到我被文化的差異蒙蔽了雙眼，以至於忽視了如此顯而易見的道理。這委實令我無地自容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィが、本線で活躍をはじめたら、\n必ずご連絡を差し上げます」
2429 = "「等奧莉薇開始在幹線一展身手，我一定會通知您的」" 

# monologue
# JP: だから、出て来る。\n誘いの言葉が、とても自然に。
2738 = "也正因為如此，我才能自然而然地想到邀請對方。" 

# 【双鉄】
# display as 雙鐵
# JP: 「もしよろしければその時には、一度ご乗車に来て下さい。\nオリヴィも――きっと、喜ぶかと思いますので」
2091 = "「如果條件允許，屆時請您務必賞臉來搭乘由九號牽引的列車。奧莉薇也一定會欣喜萬分」" 
