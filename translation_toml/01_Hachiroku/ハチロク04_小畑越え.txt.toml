[script]
# lines: 463 
# 【双鉄】
# display as 雙鐵
# JP: 「初めての[おこば,1]小畑越えが、まさかこんな形になるとはな」
2190 = "「Lần đầu tiên vượt đèo Okoba, không ngờ lại diễn ra theo cách này.」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんのためですもの――」
2400 = "「Vì Olivy mà——」"
# monologue
# JP: 言って、ハチロクが車内を見まわす。
2834 = "Nói rồi, Hachiroku nhìn quanh bên trong toa xe."
# 【ハチロク】
# display as 八六
# JP: 「わたくしのささやかな夢くらい、\n喜んで引き換えにいたします」
2383 = "「Nếu chỉ là một ước mơ nhỏ nhoi của em,\nthì em sẵn sàng đánh đổi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
2391 = "「Hửm?」"
# monologue
# JP: 僕もしっかり覚えている。
2999 = "Tôi vẫn nhớ rất rõ."
# monologue
# JP: 初めての小畑越えは、僕とふたりで、8620の運転台で。\nそれが、ハチロクの望みであったが――
2797 = "Lần đầu tiên vượt đèo Okoba, sẽ chỉ có hai chúng tôi, trong buồng lái của 8620.\nĐó từng là mong muốn của Hachiroku, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「引き換えずとも……\nナビに飛んでもらえばそれで済んだだけの話では？」
1885 = "「Đâu cần phải đánh đổi……\nChỉ cần để Navi bay qua là xong chuyện rồi mà?」"
# 【ハチロク】
# display as 八六
# JP: 「あらあら」
1968 = "「Ái chà ái chà.」"
# monologue
# JP: あきれたような顔をして、ハチロクはクスクス笑い出す。
2838 = "Với vẻ mặt có phần cạn lời, Hachiroku khúc khích cười."
# 【ハチロク】
# display as 八六
# JP: 「わたくしのだんな様は、\n相変わらず乙女心を解さない方でございますのね？」
2413 = "「Phu quân của em,\nvẫn luôn là một người không hiểu thiếu nữ tâm chút nào nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1971 = "「À.」"
# monologue
# JP: だんな様と言われてわかった。\n妻との旅と考えるなら――なるほど僕は、野暮天だ。
3140 = "Nghe gọi là \"Phu quân\", tôi mới hiểu ra.\nNếu coi đây là một chuyến du lịch cùng vợ——thì quả thật, tôi đúng là một kẻ vô tâm."
# 【双鉄】
# display as 雙鐵
# JP: 「ナビをつかえば、旅というほどの時間もかからん。\nそれでは、あまりにもったいないか」
2257 = "「Nếu dùng Navi thì thời gian chẳng đủ để gọi là du lịch nữa.\nNhư vậy thì quá lãng phí nhỉ.」"
# 【ハチロク】
# display as 鈴
# JP: 「うふふっ、左様ですね」
2044 = "「Ufufu, đúng vậy ạ.」"
# monologue
# JP: うれしげにすず――いや、列車内もやはり公共の場だ。\n踏み外さぬよう、あえて自分にカギをかけよう。
3215 = "Suzu vui vẻ——à không, trong tàu vẫn là nơi công cộng.\nĐể không đi quá giới hạn, tôi tự nhắc nhở bản thân phải kiềm chế."
# monologue
# JP: うれしげにハチロクは微笑んで、\n僕の肩に一瞬だけの頬ずりをする。
2827 = "Hachiroku mỉm cười hạnh phúc,\nvà cọ má vào vai tôi trong một thoáng."
# 【ハチロク】
# display as 八六
# JP: 「譲渡前のオリヴィちゃんの様子をお伺いするための、\nみかん鉄道様への聞き取り調査」
2348 = "「Chuyến đi này là để thu thập thông tin từ Đường sắt Mikan\nvề tình hình của Olivy trước khi chuyển nhượng ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「同時に、Ⅸ号機関車の湯医線本線試運転のために、\nいくつかの点も確認してくる」
1922 = "「Đồng thời, cũng để xác nhận một số điểm\ncho việc chạy thử nghiệm đầu máy số 9 trên đường chính tuyến Yui.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。ほんの数点だけですが――\nただ一点も、決して疎かにはできません」
2347 = "「Đúng vậy ạ. Dù chỉ là một vài điểm nhỏ——\nnhưng tuyệt đối không thể lơ là bất kỳ điểm nào.」"
# monologue
# JP: Ⅸ号はもう、全般検修に入っている。
2732 = "Đầu máy số 9 đã bước vào giai đoạn đại tu toàn diện."
# monologue
# JP: その中で技師さんたちから出てきた疑問を、\nハチロクと僕は預かっている。
3136 = "Những thắc mắc của các kỹ sư trong quá trình đó,\nđã được giao lại cho tôi và Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「なんといっても、蒸機は生き物でございますから」
2402 = "「Dù sao đi nữa, đầu máy hơi nước cũng là một sinh vật sống mà ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2370 = "「Đúng vậy.」"
# monologue
# JP: ……蒸機は生き物。定型句のように語られる言葉であるが、\nこれはまさしく、真実だ。
1412 = "……Đầu máy hơi nước là một sinh vật sống. Câu nói này nghe như một lời sáo rỗng,\nnhưng nó lại là sự thật."
# monologue
# JP: 軽々に部品を外してしまったのなら、長年の摩耗や歪みの\n影響で、二度と同じくつけられなくなることさえもある。
2711 = "Nếu tháo các bộ phận ra một cách khinh suất, thì do sự hao mòn và biến dạng qua nhiều năm,\nthậm chí có thể không bao giờ lắp lại được như cũ nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「長年\x%l入換;#00ffc040;入換%l;#;でしか走――いや、動いていなかったⅨ号が、\n御一夜までの長旅を経験したのだ」
2061 = "「Nhiều năm qua, đầu máy số 9 chỉ chạy——à không, chỉ hoạt động \\x%l入換;#00ffc040;dồn toa%l;#;,\nnay lại vừa trải qua một chuyến đi dài đến Ohito.」"
# 【ハチロク】
# display as 八六
# JP: 「それだけでも、大きな負荷がかかっております。\n本線に出す前の、再度の慎重な検修は、必要です」
2013 = "「Chỉ riêng việc đó thôi cũng đã tạo ra một gánh nặng rất lớn rồi.\nViệc kiểm tra kỹ lưỡng lại một lần nữa trước khi đưa ra đường chính là rất cần thiết ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。ポーレットの判断を、僕も支持する」
2029 = "「Ừ. Tôi cũng ủng hộ quyết định của Paulette.」"
# monologue
# JP: とはいえ、元忠氏にせっつかれている状況でもある。
2859 = "Dù vậy, chúng tôi cũng đang bị ông Mototada hối thúc."
# monologue
# JP: 可及的速やかに、Ⅸ号には湯医線を走ってもらい、\n僕らと8620は、この線路の上を走りたいものだ。
2750 = "Chúng tôi muốn đầu máy số 9 chạy trên tuyến Yui càng sớm càng tốt,\nđể tôi và 8620 có thể chạy trên tuyến đường này."
# 【双鉄】
# display as 雙鐵
# JP: 「……御一夜鉄道職員としての、出張扱いでもある。\n時間は、極力有意義に使い倒さねばならんな」
1477 = "「……Đây cũng được coi là một chuyến công tác với tư cách là nhân viên của Đường sắt Ohito.\nChúng ta phải tận dụng thời gian một cách có ý nghĩa nhất có thể.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしも、おなじ思いでございます。\nこの線路を走るのならば、視察も同時に行えますから」
2200 = "「Em cũng nghĩ vậy ạ.\nNếu chạy trên tuyến đường này, chúng ta cũng có thể đồng thời tiến hành khảo sát luôn.」"
# monologue
# JP: ハチロクの目が、窓の外へと向けられる。\n丁度、小畑に入線だ。
2819 = "Hachiroku hướng mắt ra ngoài cửa sổ.\nVừa lúc tàu tiến vào ga Okoba."
# monologue
# JP: 下りる乗客も、乗る乗客も全くいない。\nけれども、この駅が存続している理由は、これから――！
3150 = "Hoàn toàn không có hành khách nào lên hay xuống tàu.\nNhưng lý do nhà ga này vẫn tồn tại, là bắt đầu từ đây——!"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、逆進を始めたな」
2050 = "「Ồ, bắt đầu chạy lùi rồi kìa.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。ここからが\x%lスイッチバック;#00ffc040;スイッチバック%l;#;。\n\x%lループ線;#00ffc040;ルウプ線%l;#;へと進んでいくための前準備です」
2307 = "「Đúng vậy ạ. Từ đây sẽ là \\x%lスイッチバック;#00ffc040;đường vòng zigzag%l;#;.\nLà bước chuẩn bị để tiến vào \\x%lループ線;#00ffc040;đường ray vòng tròn%l;#; ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lスイッチバック;#00ffc040;スイッチバック%l;#;の上に\x%lループ線;#00ffc040;ループ線%l;#;。\n本当に厳しい山岳路線なのだな」
2322 = "「Có \\x%lスイッチバック;#00ffc040;đường vòng zigzag%l;#; rồi lại còn \\x%lループ線;#00ffc040;đường ray vòng tròn%l;#; nữa.\nĐúng là một tuyến đường đồi núi khắc nghiệt thật.」"
# monologue
# JP: 言う間に、機関車は逆進を終え――
3175 = "Trong lúc nói chuyện, đầu máy đã chạy lùi xong——"
# monologue
# JP: （ぐんっ）
3251 = "（Vù）"
# monologue
# JP: 今度は前進。
2842 = "Lần này là tiến lên."
# monologue
# JP: \x%lポイント;#00ffc040;ポイント%l;#;は当然切り替わり、進入してきた駅側ではなく、\n別経路――\x%lループ線;#00ffc040;ループ線%l;#;側へと僕らの列車を誘導する。
69 = "\\x%lポイント;#00ffc040;Ghi đường sắt%l;#; đương nhiên đã chuyển hướng, dẫn đoàn tàu của chúng tôi đi vào một con đường khác——\nhướng về phía \\x%lループ線;#00ffc040;đường ray vòng tròn%l;#;, chứ không phải hướng nhà ga lúc nãy."
# 【ハチロク】
# display as 八六
# JP: 「行って、戻って、また行って。そのあとぐるうりと\nルウプして、その度、少しずつ高さを稼いでいくのです」
1899 = "「Tiến lên, lùi lại, rồi lại tiến lên. Sau đó chạy vòng quanh\ntheo vòng tròn, mỗi lần như vậy sẽ nhích lên cao thêm một chút ạ.」"
# monologue
# JP: ハチロクの手が、空中に図を描き出す。
2795 = "Bàn tay Hachiroku vẽ ra những hình ảnh trong không trung."
# monologue
# JP: 配線も概念も、すでに理解できているつもりだが、\n仕草の可愛いらしさにしばし、目を楽しませる。
3227 = "Mặc dù tôi đã hiểu được cách bố trí và khái niệm,\nnhưng những cử chỉ đáng yêu của cô ấy vẫn khiến tôi thích thú ngắm nhìn một lúc."
# 【ハチロク】
# display as 八六
# JP: 「ですから、山越えはのんびりになってしまいます。\nその分、わたくしは双鉄さまと甘い時間を――」
2251 = "「Vì vậy, việc vượt núi sẽ mất khá nhiều thời gian ạ.\nĐổi lại, em sẽ có những giây phút ngọt ngào cùng ngài Soutetsu——」"
# monologue
# JP: 言って、ぽぽっとハチロクの頬が赤くなる。
2829 = "Nói xong, hai má Hachiroku ửng đỏ lên."
# 【ハチロク】
# display as 八六
# JP: 「こほん」
1953 = "「E hèm.」"
# monologue
# JP: 咳払い。とても律儀だ。愛くるしい。
2902 = "Cô ấy tằng hắng. Rất nghiêm túc. Thật đáng yêu."
# monologue
# JP: いいこだ、と、\n抱きしめて頬ずりしたい衝動を、列車内ゆえ何とか鎮める。
3107 = "Thật ngoan quá,\ntôi cố gắng kìm nén cơn bốc đồng muốn ôm lấy và cọ má vào cô ấy vì đang ở trên tàu."
# 【ハチロク】
# display as 八六
# JP: 「――その分、丁寧に視察を果たせるわけです。\nこの先、わたくしたちが乗務する路線なのですから」
1434 = "「——Đổi lại, chúng ta có thể thực hiện khảo sát một cách kỹ lưỡng ạ.\nVì đây là tuyến đường mà chúng ta sẽ làm nhiệm vụ sau này mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。丁寧に見ることは、とても大事だ」
1829 = "「Đúng vậy. Việc quan sát kỹ lưỡng là rất quan trọng.」"
# monologue
# JP: 夫婦として、６年の日々を共に過ごして。\nそれでもなお、ハチロクは新しい顔を見せてくれる。
3006 = "Chúng tôi đã chung sống với nhau 6 năm với tư cách là vợ chồng.\nVậy mà, Hachiroku vẫn luôn cho tôi thấy những khía cạnh mới mẻ."
# monologue
# JP: 細かな一挙手一投足で、ごくごくささいな一言で、\n新しい喜びを与えてくれる。
2917 = "Qua từng cử chỉ nhỏ nhặt, từng lời nói nhỏ nhẹ,\ncô ấy lại mang đến cho tôi những niềm vui mới."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……せっかくの視察だ。贅沢をいえば、\nもう少し良い\x%l客車;#00ffc040;客車%l;#;に乗りたかったかとも感じる」
1934 = "「Nhưng mà…… đã mất công đi khảo sát rồi. Nếu được xa xỉ một chút,\ntôi cũng muốn được ngồi trên một \\x%l客車;#00ffc040;toa hành khách%l;#; tốt hơn một chút.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。さらに贅沢を申しますなら、わたくしも、牽引は\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;でとも、望みたいところでございます」
2311 = "「Đúng vậy ạ. Nếu được xa xỉ hơn nữa, em cũng muốn\nđược \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; kéo đi cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[ディーエル,1]ＤＬ牽引で、ロングシートの\x%l客車;#00ffc040;客車%l;#;だものなぁ」
2336 = "「Đằng này lại bị DL kéo, mà \\x%l客車;#00ffc040;toa hành khách%l;#; lại là ghế dài dọc theo xe nữa chứ.」"
# monologue
# JP: ロングシートも、帝都を思い出して嫌いではない。\nが、御一夜から小畑を越えて早戸へと――
3226 = "Ghế dài dọc theo xe gợi nhớ đến Đế Đô nên tôi cũng không ghét.\nNhưng đi từ Ohito qua đèo Okoba đến Hayato——"
# monologue
# JP: 風光明媚と名高い山越えの、二時間以上の乗車となると、\nさすがになんでロングシートかとは感じてしまう。
2886 = "Một chuyến đi vượt núi nổi tiếng với phong cảnh hữu tình kéo dài hơn hai tiếng đồng hồ,\nthì quả thật tôi không khỏi thắc mắc tại sao lại dùng ghế dài dọc theo xe."
# 【ハチロク】
# display as 八六
# JP: 「とはいえ、[たいよ,1]貸与路線を走る貸与の機関車・\x%l客車;#00ffc040;客車%l;#;ですから。\nそこはやはり、過剰投資はできないものかと」
1940 = "「Dù vậy, đây cũng chỉ là đầu máy và \\x%l客車;#00ffc040;toa hành khách%l;#; đi thuê chạy trên tuyến đường thuê mượn thôi ạ.\nNên việc không thể đầu tư quá mức cũng là điều dễ hiểu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、それはそうだよな。\nというか――この\x%l客車;#00ffc040;客車%l;#;と機関車は確か」
1852 = "「Chà, điều đó thì đúng rồi.\nMà này——\\x%l客車;#00ffc040;toa hành khách%l;#; và đầu máy này hình như là」"
# 【ハチロク】
# display as 八六
# JP: 「普段はしまてつ――[しまばら,1]縞原鉄道で活躍するまいてつ様の\n車両と聞いております。\x%l機関士;#00ffc040;機関士%l;#;がきっと、その[かた]方かと」
2243 = "「Em nghe nói đây là toa xe của một chủ tàu\nthường hoạt động ở Shimatetsu——Đường sắt Shimabara ạ. Chắc hẳn \\x%l機関士;#00ffc040;lái tàu%l;#; chính là người đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[しまばら,1]縞原か。随分と遠いな。\nさぞ、輸送にはご苦労を――」
2138 = "「Shimabara sao. Xa phết nhỉ.\nChắc hẳn việc vận chuyển đã rất vất vả——」"
# monologue
# JP: そこまでいって、思い出す。
3169 = "Nói đến đó, tôi chợt nhớ ra."
# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、そうか、縞原－隈元間は、海路か」
2000 = "「À không, đúng rồi, từ Shimabara đến Kumamoto là đi đường biển nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「なのでしょうか？\nわたくし、そこまでは詳しくお伺いしておりませんが」
2314 = "「Vậy sao ạ?\nEm cũng không hỏi chi tiết đến mức đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、他社様の話だしな。\nが、移送コストを考えれば、当然海路一択に――ああ」
2399 = "「Mà, đó là chuyện của công ty khác mà.\nNhưng xét về chi phí vận chuyển, thì đường biển đương nhiên là lựa chọn duy nhất——à」"
# monologue
# JP: 九洲在住とはいえど、\nハチロクはあまり、湯医線の外に出ることはない。
2837 = "Dù sống ở Kyushu,\nnhưng Hachiroku rất hiếm khi ra khỏi tuyến Yui."
# monologue
# JP: あるいは土地勘が無いのかも、と、\nメモに簡単な九洲地図を書いてやる。
2736 = "Có lẽ em ấy không rành địa hình nơi đây,\ntôi bèn vẽ một bản đồ Kyushu đơn giản lên giấy nhớ cho em ấy xem."
# 【双鉄】
# display as 雙鐵
# JP: 「縞原から隈元は、陸路では[ながさき,1]永崎、[さが,1]左賀とぐるり大回りを\n余儀なくされるが、海路だと――ほら」
2163 = "「Từ Shimabara đến Kumamoto, nếu đi đường bộ thì bắt buộc phải đi vòng\nmột vòng lớn qua Nagasaki và Saga, nhưng nếu đi đường biển thì——nhìn này.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！　これほどの短い距離で、一直線に。\n文字通りのショオトカットになるのですね」
2011 = "「Chà! Khoảng cách ngắn như vậy, lại còn đi theo đường thẳng.\nĐúng nghĩa là đi đường tắt luôn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。縞原港も隈元港も大きな港だ。\n機関車と\x%l客車;#00ffc040;客車%l;#;の移送に、問題はなかろう」
2027 = "「Ừm. Cảng Shimabara và cảng Kumamoto đều là những cảng lớn.\nViệc vận chuyển đầu máy và \\x%l客車;#00ffc040;toa hành khách%l;#; chắc không thành vấn đề.」"
# monologue
# JP: 隈元にまで列車を連れてこれたなら、\n八ツ城までをトレーラー陸送すればすむ。
2855 = "Nếu có thể đưa tàu đến tận Kumamoto,\nthì đoạn đến Yatsushiro chỉ cần vận chuyển bằng xe đầu kéo là xong."
# monologue
# JP: まぁ、その区間がトレーラーとなってしまう――\n未だ復線叶わぬことには、隔靴掻痒の感も覚えるが。
3171 = "Mà, đoạn đó lại phải dùng xe đầu kéo——\nViệc tuyến đường vẫn chưa được khôi phục khiến tôi có cảm giác như gãi ngứa ngoài giày vậy."
# 【ハチロク】
# display as 八六
# JP: 「海路――おふね」
2377 = "「Đường biển——đi tàu thủy ạ.」"
# monologue
# JP: ハチロクがふわりと目を閉じる。\n夢見るように、体を僕にもたれさせる。
2807 = "Hachiroku khẽ nhắm mắt lại.\nNhư đang mơ màng, em ấy tựa người vào tôi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまは、お船に乗られたことがありますか？」
2526 = "「Ngài Soutetsu đã từng đi tàu thủy bao giờ chưa ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ある。というか、今話題に出た航路。\n隈元－縞原間のフェリーに乗った」
2032 = "「Ừm. Có chứ. Mà thực ra là chính tuyến đường chúng ta vừa nhắc đến đấy.\nTôi đã đi phà giữa Kumamoto và Shimabara.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1972 = "「Ồ.」"
# monologue
# JP: ハチロクの目がぱちりと開く。\nけれども体は、僕に甘えて寄りかかったままだ。
2822 = "Hachiroku mở to mắt.\nNhưng cơ thể em ấy vẫn nũng nịu tựa vào tôi."
# 【ハチロク】
# display as 八六
# JP: 「おいくつくらいのときですか？　いったい、どなたと」
2263 = "「Lúc đó ngài khoảng bao nhiêu tuổi ạ? Và ngài đi cùng ai vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「右田に引き取られてしばらく経って。だが、あのときは\n――うぅむ、日々姫はいなかったような気がする」
2403 = "「Đó là một thời gian sau khi tôi được nhà Migita nhận nuôi. Nhưng lúc đó\n——ừm, tôi nhớ hình như không có Hibiki.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、何故でしょう」
1990 = "「Ồ, tại sao vậy ạ?」"
# monologue
# JP: 興味津々のまなざしに、記憶のモヤが晴らされていく。
2892 = "Ánh mắt đầy tò mò của em ấy dần xua đi lớp sương mù trong ký ức tôi."
# monologue
# JP: ああ――なんとなくだが覚えている。\nあの頃の僕にとっても、よほど印象的だったのだろう。
2882 = "À——tôi nhớ mang máng rồi.\nChắc hẳn đối với tôi lúc bấy giờ, đó là một sự kiện vô cùng đáng nhớ."
# 【双鉄】
# display as 雙鐵
# JP: 「確か――発熱だったと思う。日々姫が大泣きをして\n……そうだ、『ならば、僕も残ろう』と、申し出たな」
2459 = "「Hình như——em ấy bị sốt. Hibiki đã khóc rất nhiều\n……đúng rồi, tôi còn đề nghị 'Nếu vậy, con cũng sẽ ở lại'.」"
# 【ハチロク】
# display as 八六
# JP: 「ご家族でのご旅行だったのですか？」
2284 = "「Đó là chuyến du lịch gia đình sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「多分な。\n多分――[たいと,1]汰斗さんはそのつもりだったのだろうと思う」
2197 = "「Chắc là vậy.\nCó lẽ——ông Taito đã định như thế.」"
# monologue
# JP: 残念だが、やはり詳細には思い出せない。\n断片的なエピソードだけが、ぽつぽつ浮かんで来るだけだ。
3204 = "Tiếc là tôi vẫn không thể nhớ lại chi tiết.\nChỉ có vài mảnh ký ức rời rạc lác đác hiện về."
# 【双鉄】
# display as 雙鐵
# JP: 「『いや、双鉄はついてこい』と汰斗さんに言われて。\n無論、命令には従うから、日々姫はますます泣いて」
2366 = "「Ông Taito bảo 'Không, Soutetsu phải đi theo'.\nTất nhiên là tôi phải tuân lệnh, nên Hibiki càng khóc to hơn.」"
# 【ハチロク】
# display as 八六
# JP: 「あぁ、おかわいそうに」
1970 = "「Ôi, tội nghiệp em ấy quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉とふたりでなぐさめて。\nびいどろとカステラをお土産にすると指切りを――」
2214 = "「Tôi và chị Mayami đã cùng nhau dỗ dành em ấy.\nNgoắc tay hứa sẽ mua đồ thủy tinh và bánh bông lan Castella về làm quà——」"
# 【ハチロク】
# display as 八六
# JP: 「……双鉄さま？」
1458 = "「……Ngài Soutetsu?」"
# monologue
# JP: 思い出す。\n完全に忘れてしまっていたことを。
3010 = "Tôi nhớ ra rồi.\nMột chuyện mà tôi đã hoàn toàn quên mất."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだった。\nもうひとつした約束は、いまだに果たせぬままにいる」
2111 = "「Đúng rồi.\nCòn một lời hứa nữa, đến giờ tôi vẫn chưa thực hiện được.」"
# 【ハチロク】
# display as 八六
# JP: 「もうひとつ、でございますか？」
2491 = "「Còn một lời hứa nữa sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「『熱が引いたら日々姫をフェリーに乗せてやる』、と。\n……さすがに日々姫も、もう忘れていることとは思うが」
2212 = "「'Khi nào hết sốt, anh sẽ cho Hibiki đi phà'.\n……Dù tôi nghĩ chắc Hibiki cũng đã quên chuyện đó rồi.」"
# monologue
# JP: 言えば小さく、\nハチロクはどこか不満そうに首を傾げる。
2823 = "Nghe tôi nói nhỏ giọng,\nHachiroku hơi nghiêng đầu với vẻ bất mãn."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまがお約束を果たされないだなんて――\nお船が、楽しくなかったのでございますか？」
2188 = "「Không ngờ ngài Soutetsu lại không giữ lời hứa đấy——\nChuyến đi tàu không vui sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「う……ん」
1993 = "「Ừ……m」"
# monologue
# JP: 我ながら半端な返事だが、致し方ない。\nあの頃の僕には、楽しいも楽しくないも無かったのだから。
3037 = "Tôi tự thấy câu trả lời của mình thật nửa vời, nhưng cũng đành chịu.\nBởi vì đối với tôi lúc bấy giờ, làm gì có chuyện vui hay không vui."
# 【双鉄】
# display as 雙鐵
# JP: 「いや――ああ、真闇姉ははしゃいでいた。\nだから、楽しい船旅だったのだろう」
1801 = "「Không——à, chị Mayami lúc đó rất phấn khích.\nNên chắc hẳn đó là một chuyến đi biển vui vẻ.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、真闇様がおはしゃぎに？\nそれはお珍しい――ああ、いえ」
1984 = "「Ồ, chị Mayami mà cũng phấn khích sao ạ?\nThật hiếm thấy——à, không.」"
# monologue
# JP: ぺろりと小さな舌がのぞく。\n珍しくもいたずらな表情だ。
2799 = "Em ấy thè chiếc lưỡi nhỏ nhắn ra.\nMột biểu cảm tinh nghịch hiếm thấy."
# monologue
# JP: なんだ、聞いたハチロクもはしゃいでいるな、と、\nただそれだけで嬉しくなる。
3026 = "Gì chứ, nghe xong Hachiroku cũng phấn khích theo kìa,\nchỉ vậy thôi cũng đủ khiến tôi thấy vui rồi."
# 【ハチロク】
# display as 八六
# JP: 「そのころは、真闇様もお若かったのですものね」
2401 = "「Hồi đó, chị Mayami cũng còn trẻ mà nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。今でも若いぞ。真闇姉は」
2490 = "「Không. Bây giờ chị Mayami vẫn còn trẻ chán.」"
# 【ハチロク】
# display as 八六
# JP: 「ああああああっ！」
2001 = "「Aaaaa!」"
# monologue
# JP: ハチロクの悲鳴に、\n車内のまばらな乗客が、驚きそろってこちらを見る。
2816 = "Tiếng hét của Hachiroku\nkhiến những hành khách lác đác trong xe đồng loạt giật mình nhìn về phía chúng tôi."
# monologue
# JP: が、ハチロクは気づかない。\nただただ必死に僕を見て、すがりつかんばかりの勢いだ。
3077 = "Nhưng Hachiroku không hề nhận ra.\nEm ấy chỉ tuyệt vọng nhìn tôi, như thể sắp bám chặt lấy tôi đến nơi."
# 【ハチロク】
# display as 八六
# JP: 「そのころは、真闇様もおちいさかったと！\nわたくし、そう申したつもりだったのです、本当に」
2231 = "「Hồi đó, chị Mayami cũng còn nhỏ tuổi!\nÝ em là vậy đó, thật mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん、大丈夫だ。\nそういうつもりではあろうと、僕にも容易に想像できた」
2023 = "「Ừ, không sao đâu.\nTôi cũng dễ dàng đoán được em định nói thế mà.」"
# monologue
# JP: あまりのハチロクの必死さに、\nからかおうなどとも思えない。
3104 = "Thấy Hachiroku cuống cuồng như vậy,\ntôi cũng chẳng có tâm trí đâu mà trêu chọc em ấy nữa."
# monologue
# JP: 周囲の視線も、\nどうしたことかと心配そうで、申し訳ない。
2874 = "Ánh mắt của những người xung quanh\ncũng lộ vẻ lo lắng không biết có chuyện gì, thật ngại quá."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。約束する。\n今のハチロクの失言を、僕は墓場までもっていく」
2367 = "「Không sao đâu. Tôi hứa.\nTôi sẽ mang theo lời lỡ miệng vừa rồi của Hachiroku xuống mồ.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ――ありがとう――\nありがとうございます、双鉄さま」
1996 = "「A——cảm ơn ngài——\nCảm ơn ngài rất nhiều, ngài Soutetsu.」"
# monologue
# JP: ハチロクが安堵の長い息を吐けば、\n車内全体も、なんとはなしにホっとしたような空気になる。
2835 = "Hachiroku thở phào nhẹ nhõm một hơi dài,\nbầu không khí trong xe dường như cũng chùng xuống, bớt căng thẳng hơn."
# monologue
# JP: ごくさりげなく、「お騒がせしました」と会釈をすれば、\nみなさりげなく、自分たちの時間に戻っていく。
3036 = "Tôi khẽ gật đầu, nói \"Xin lỗi vì đã làm ồn\" một cách tự nhiên nhất có thể,\nmọi người cũng tự nhiên quay trở lại với việc riêng của mình."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
2527 = "「Ngài Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんでもないさ」
1894 = "「Không có gì đâu.」"
# monologue
# JP: あのハチロクが、周囲の空気に気づかなかった。\nそれほど必死だったのか――
2805 = "Một Hachiroku tinh tế như vậy mà lại không nhận ra bầu không khí xung quanh.\nEm ấy đã hoảng hốt đến mức đó sao——"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、ハチロクがそこまで真闇姉を恐れているとは、\n知らなかったぞ」
1809 = "「Nhưng mà, tôi không biết là Hachiroku\nlại sợ chị Mayami đến thế đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「……真闇様ならずとも同じことです。人間の女性に、\nお年のことを迂闊にお話しするのは、[タブウ,1]禁忌かと」
1452 = "「……Dù không phải chị Mayami thì cũng vậy thôi ạ. Đối với phụ nữ con người,\nbất cẩn nhắc đến chuyện tuổi tác là một điều cấm kỵ đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。そういうものか」
1976 = "「Hừm. Vậy sao.」"
# monologue
# JP: 言えば、こっくり深く頷く。\nなにかよほど――過去に痛い目をみたのかもしれん。
3142 = "Nghe tôi nói, em ấy gật đầu thật sâu.\nCó vẻ như——trong quá khứ em ấy đã từng nếm mùi đau khổ vì chuyện này rồi."
# 【ハチロク】
# display as 八六
# JP: 「それより、お聞かせくださいまし！」
1869 = "「Quan trọng hơn là, xin ngài hãy kể tiếp đi ạ!」"
# monologue
# JP: 話を変えたい。\nそんな気持ちを強く感じる切り換え方だ。
2898 = "Muốn đổi chủ đề.\nCách chuyển hướng câu chuyện cho thấy rõ mong muốn mãnh liệt đó."
# 【ハチロク】
# display as 八六
# JP: 「そのときの真闇様は、\nどのようにおはしゃぎになられたのです？」
2511 = "「Lúc đó chị Mayami,\nđã phấn khích như thế nào vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が覚えているのは、カモメだ」
2246 = "「Thứ mà tôi nhớ được là chim hải âu.」"
# 【ハチロク】
# display as 八六
# JP: 「カモメ――と、申しますと」
2379 = "「Hải âu——ý ngài là」"
# monologue
# JP: ハチロクの手が小さく羽ばたく。
2813 = "Bàn tay Hachiroku khẽ vỗ cánh."
# 【ハチロク】
# display as 八六
# JP: 「海に棲まう鳥のこと。で、ございますよね？」
2130 = "「Là loài chim sống ở biển. Đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだが――\nハチロクはカモメを見たことがないのか？」
1848 = "「Đúng vậy——\nNhưng Hachiroku chưa từng nhìn thấy hải âu sao?」"
# 【ハチロク】
# display as 八六
# JP: 「目近に、あるいはじっくりと意識して、\nということなら、見たことがないかと存じます」
2086 = "「Nếu là nhìn ở cự ly gần, hay cố ý quan sát kỹ,\nthì em nghĩ là mình chưa từng thấy ạ.」"
# monologue
# JP: かぼそい指が、その唇に当てられる、
2895 = "Ngón tay thon thả đặt lên môi,"
# 【ハチロク】
# display as 八六
# JP: 「ですが……ん……[ゆい,1]由衣のあたりを走り抜ける折り、\nあるいは遠目に見ていたかもしれません」
1925 = "「Nhưng mà…… ừm…… lúc chạy ngang qua khu vực Yui,\ncó lẽ em đã nhìn thấy chúng từ đằng xa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「走り抜ける――ならば、乗務か」
2532 = "「Chạy ngang qua——vậy là lúc làm nhiệm vụ sao.」"
# 【ハチロク】
# display as 八六
# JP: 「当然のことでございます。\nわたくしは、ただの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――ああ、いえ」
2506 = "「Đương nhiên rồi ạ.\nEm chỉ là một \\x%lレイルロオド;#00ffc040;Railord%l;#; bình thường——à, không.」"
# monologue
# JP: くっついたまま、ハチロクが僕を見上げる。\nただそれだけで、暖かになる。しあわせになる。
2810 = "Vẫn tựa sát vào tôi, Hachiroku ngước nhìn tôi.\nChỉ vậy thôi cũng đủ khiến tôi thấy ấm áp. Thấy hạnh phúc."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまとお会いできないでいましたころには――\nわたくしは、ただの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でしたから」
2396 = "「Trong khoảng thời gian chưa gặp được ngài Soutetsu——\nEm chỉ là một \\x%lレイルロオド;#00ffc040;Railord%l;#; bình thường thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1860 = "「Vậy sao.」"
# monologue
# JP: ただの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。\nただの物。
2705 = "Một \\x%lレイルロオド;#00ffc040;Railord%l;#; bình thường.\nChỉ là một món đồ."
# monologue
# JP: であらば、線路の上をただ走るだけ――\n海辺に遊び、カモメに近づくようなこともない。
3206 = "Nếu vậy, thì chỉ biết chạy trên đường ray——\nChứ chẳng bao giờ ra biển chơi đùa, hay lại gần chim hải âu."
# 【ハチロク】
# display as 八六
# JP: 「カモメは、わたくしの知識では、\nそれほど美しい鳥であるとは思えません」
1854 = "「Theo kiến thức của em, hải âu\nkhông phải là một loài chim quá đỗi xinh đẹp ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。フォルムが綺麗と言えば綺麗だが、\nそれをいったらほぼ全ての鳥にあてはまろう」
1831 = "「Đúng vậy. Nói hình dáng đẹp thì cũng đẹp thật,\nnhưng nói thế thì loài chim nào chẳng vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「それなのに何故。そのときの真闇様は、\nカモメで、それほどおはしゃぎに？」
2509 = "「Vậy tại sao. Lúc đó chị Mayami,\nlại phấn khích vì chim hải âu đến thế ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1948 = "「Ừm.」"
# monologue
# JP: ならば、伝えてやらねばなるまい。\n線路の外にも、たくさんの素敵があることを。
3207 = "Vậy thì, tôi phải cho em ấy biết.\nRằng bên ngoài đường ray, còn rất nhiều điều tuyệt vời."
# monologue
# JP: 生きながらにして死んでいた、あの頃の僕が覚えている程、\n楽しいことが、いくらでもあるのだということを。
2841 = "Rằng có vô vàn những niềm vui,\nmà một kẻ sống không bằng chết như tôi hồi đó vẫn còn nhớ được."
# 【双鉄】
# display as 雙鐵
# JP: 「シバテンえびせん、というお菓子がある。\nその小袋を、一袋いくらで、船内の売店で買えるのだ」
2325 = "「Có một loại bánh kẹo tên là bánh phồng tôm Shibaten.\nCó thể mua từng túi nhỏ với giá vài đồng ở cửa hàng trên tàu.」"
# 【ハチロク】
# display as 八六
# JP: 「ＴＶシイエムで流れているお菓子でございますね？\n確か――『とめられないたまらない』、でしたか」
2287 = "「Là loại bánh kẹo hay quảng cáo trên TV đúng không ạ?\nHình như là——'Không thể dừng lại, không thể cưỡng lại', phải không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう、それだ。そのシバテンえびせんを、\nカモメは大変な好物にしているらしくてな」
2117 = "「Đúng, là nó đấy. Có vẻ như bánh phồng tôm Shibaten đó,\nlà món khoái khẩu của hải âu thì phải.」"
# 【ハチロク】
# display as 八六
# JP: 「あらまぁ、うふふふ。\nきっと、エビがはいっているからでしょうね」
2489 = "「Ái chà, ufufufu.\nChắc chắn là vì có tôm ở trong đó rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「エビが、か」
2259 = "「Vì có tôm, sao.」"
# monologue
# JP: 虚をつかれる。\nその発想は、まるでなかった。
3021 = "Tôi sững người.\nTôi hoàn toàn chưa từng nghĩ đến điều đó."
# monologue
# JP: が、純粋な知識だけから導き出したのであろう\n結論であるゆえ――
3198 = "Nhưng, vì đó là kết luận được rút ra\nchỉ từ kiến thức thuần túy nên——"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、理に[かな]適っているな。が、今の僕と同様、\n幼かったころの僕も、そんなことは思いもしなかった」
1906 = "「Ra vậy, hợp lý thật đấy. Nhưng cũng giống như tôi bây giờ,\ntôi hồi nhỏ chưa từng nghĩ đến điều đó.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2016 = "「Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんに言われるがままに小袋を買い、甲板に出て、\n言われるがまま小袋を開けた、その瞬間だ！」
2233 = "「Tôi mua một túi nhỏ theo lời ông Taito, bước ra boong tàu,\nvà ngay khoảnh khắc mở túi ra theo lời ông ấy!」"
# 【ハチロク】
# display as 八六
# JP: 「きゃっ！？」
1947 = "「Á!?」"
# monologue
# JP: カモメに見立てた両手でばさばさ、\nハチロクの頭を囲い込む。
3025 = "Tôi dùng hai tay giả làm chim hải âu vỗ cánh phành phạch,\nôm trọn lấy đầu Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「一斉にだ。カモメが僕に――小袋にめがけて飛んできた。\nそうしたら、真闇姉のまぁはしゃぐことはしゃぐこと」
2380 = "「Tất cả cùng một lúc. Bọn hải âu lao thẳng về phía tôi——nhắm vào túi bánh.\nThế là chị Mayami phấn khích tột độ luôn.」"
# 【ハチロク】
# display as 八六
# JP: 「お笑いになられたのですか？」
2077 = "「Chị ấy cười sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「笑うというか、はしゃぐだ。きゃあきゃあと騒ぎたてて、\nえびせんをカモメにばらまきまくった」
2444 = "「Không hẳn là cười, mà là phấn khích ấy. Chị ấy la hét ầm ĩ,\nrồi tung bánh phồng tôm cho hải âu khắp nơi.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
# 1971 = "「哦」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ばらまいてもえびせんは、甲板に落ちないのだ。\n地に着く前に、かならずカモメが鮮やかに掻っ攫うゆえ」
2386 = "「Dù có tung lung tung thì bánh phồng tôm cũng không rơi xuống boong tàu đâu.\nBởi vì trước khi chạm đất, chắc chắn sẽ bị lũ hải âu đớp gọn một cách điệu nghệ.」"
# 【ハチロク】
# display as 八六
# JP: 「それは、見事な景色でしょうね」
2093 = "「Cảnh tượng đó chắc hẳn là ngoạn mục lắm ạ.」"
# monologue
# JP: ふんわり、ハチロクが微笑む。
2826 = "Hachiroku khẽ mỉm cười dịu dàng."
# 【ハチロク】
# display as 八六
# JP: 「とてもにぎやかで楽しそう」
1811 = "「Nghe có vẻ rất náo nhiệt và vui vẻ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。賑やかで楽しかった」
2040 = "「Ừ. Rất náo nhiệt và vui vẻ.」"
# monologue
# JP: だから、こうして思い出せる。\n言葉に直し、わずかなりとハチロクに伝えてやれる。
3044 = "Vì vậy nên tôi mới có thể nhớ lại như thế này.\nCó thể diễn đạt thành lời, và truyền đạt lại cho Hachiroku dù chỉ một chút."
# monologue
# JP: それがどんなに尊いことか――\n今の僕になら、理解できる。
3132 = "Điều đó đáng quý đến nhường nào——\nTôi của bây giờ, đã có thể hiểu được."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、行こう。\n船に乗りに、海に遊びに」
2249 = "「Vậy nên, đi thôi.\nĐi tàu, ra biển chơi.」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
1995 = "「A——」"
# monologue
# JP: 目が見開かれる。\n僕をまっすぐ、まっすぐ見つめる。
2906 = "Mắt em ấy mở to.\nNhìn tôi chằm chằm, không chớp mắt."
# monologue
# JP: そして、頷く。\nたった一度だけ――深く、強く。
3076 = "Sau đó, gật đầu.\nChỉ một lần duy nhất——thật sâu, thật mạnh."
# 【ハチロク】
# display as 八六
# JP: 「はい。どうぞ連れていってくださいまし。\nわたくしを、双鉄さまの、いきたい海に」
2079 = "「Vâng. Xin ngài hãy đưa em đi cùng.\nĐưa em đến vùng biển mà ngài Soutetsu muốn đến.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、必ずふたりで出かけよう。\nそして、それとは別にして、家族旅行もしてみよう」
2020 = "「Ừ, nhất định hai chúng ta sẽ cùng đi.\nVà ngoài chuyện đó ra, hãy thử đi du lịch gia đình nữa nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「家族旅行！」
1872 = "「Du lịch gia đình!」"
# monologue
# JP: はずんだ声に、嬉しくなる。
2904 = "Giọng nói phấn khích của em ấy khiến tôi cũng thấy vui lây."
# monologue
# JP: ふたりの時間と同じくらいにハチロクは、\n家族の時間を、大事に嬉しく、きっと感じてくれている。
2896 = "Cũng giống như thời gian riêng của hai người,\nchắc chắn Hachiroku cũng cảm thấy thời gian bên gia đình rất quan trọng và đáng quý."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫との約束も果たしたいし、\n家族旅行の楽しさを、ハチロクにも体験してほしい」
2198 = "「Tôi muốn thực hiện lời hứa với Hibiki,\nvà cũng muốn Hachiroku trải nghiệm niềm vui của một chuyến du lịch gia đình.」"
# 【ハチロク】
# display as 八六
# JP: 「はい！　喜んで！！」
2018 = "「Vâng! Em rất sẵn lòng ạ!!」"
# monologue
# JP: そうして僕も、体験したい。\nハチロクと出会い解放された、今の僕のこころで、体で。
3134 = "Và tôi cũng muốn trải nghiệm.\nBằng trái tim và cơ thể của tôi hiện tại, sau khi đã được giải thoát nhờ gặp Hachiroku."
# monologue
# JP: あの事故の日に失ってしまった――\n汰斗さんが与えようとしてくれた――家族旅行の楽しさを。
3023 = "Niềm vui của một chuyến du lịch gia đình——\nMà ông Taito đã định trao cho tôi——Nhưng đã mất đi vào ngày xảy ra tai nạn đó."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉の都合のつく日を作ってもらって――\n乗務の方は、赤井宮司か、み[てつ]鉄さんかにヘルプを頼んで」
2466 = "「Để chị Mayami sắp xếp một ngày rảnh rỗi——\nCòn việc làm nhiệm vụ thì nhờ ông Akai hoặc Đường sắt Mikan giúp đỡ.」"
# 【ハチロク】
# display as 八六
# JP: 「あの――オリヴィちゃん」
2493 = "「Dạ——còn Olivy thì sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2016 = "「嗯」" 
# monologue
# JP: ただそれだけで伝わってくる。\nハチロクが何を望んでいるかが。
3074 = "Chỉ vậy thôi là đủ hiểu.\nHachiroku đang mong muốn điều gì."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、いいな。\n今はまだ、単なる仮住まいの同居人だが」
2465 = "「Cũng được đấy, ý hay.\nDù bây giờ cô ấy chỉ là người sống cùng nhà tạm thời thôi.」"
# monologue
# JP: けれど、ハチロクとて最初は仮住まいの同居人だった。\nそのことを思い出すなら、どんな可能性も否定できない。
2726 = "Nhưng mà, Hachiroku lúc đầu cũng chỉ là người sống cùng nhà tạm thời.\nNhớ lại chuyện đó, thì không thể phủ nhận bất kỳ khả năng nào."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィが僕らを、家族と思ってくれるようになったら。\n僕らがオリヴィを、家族と思えるようになったら」
2089 = "「Nếu Olivy coi chúng ta như người một nhà.\nNếu chúng ta cũng có thể coi Olivy như người một nhà.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2016 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「きっとそのときはみんなでしよう。\n賑やかで楽しい家族旅行を――みんなそろって」
2508 = "「Thì nhất định lúc đó tất cả chúng ta sẽ cùng đi.\nMột chuyến du lịch gia đình náo nhiệt và vui vẻ——có mặt đầy đủ mọi người.」"
# 【双鉄】
# display as 雙鐵
# JP: 「思っていたほどは疲れなかったな」
1861 = "「Không mệt như tôi tưởng.」"
# monologue
# JP: とはいえ、“思っていたほどは”だ。
3085 = "Tuy nói vậy, nhưng cũng chỉ là \"như tôi tưởng\" thôi."
# monologue
# JP: 早朝始発で夕方着。\nやはり体に、重さ、だるさは感じてしまう。
3061 = "Đi từ chuyến sớm nhất buổi sáng đến chiều tối mới tới nơi.\nQuả nhiên cơ thể vẫn cảm thấy nặng nề, uể oải."
# 【ハチロク】
# display as 八六
# JP: 「うふふっ、あっという間の旅でした。\n[やつしろ,2]八ツ城は、まことに素敵な駅ですね」
2046 = "「Ufufu, chuyến đi trôi qua nhanh như chớp mắt vậy.\nYatsushiro quả là một nhà ga tuyệt vời ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――特別な重みを感じる駅だ」
2015 = "「Ừ——Một nhà ga mang đến cảm giác quan trọng đặc biệt.」"
# monologue
# JP: 帝鉄時代の[ひさつせん,2]肥颯線起点駅。\n肥颯線の全線復旧など、６年前は遥かな夢であったが――
3201 = "Ga khởi điểm của tuyến Hisatsu thời Teitetsu.\nViệc khôi phục toàn tuyến Hisatsu, 6 năm trước còn là một giấc mơ xa vời, nhưng——"
# 【ハチロク】
# display as 八六
# JP: 「残すは、北側――御一夜－八ツ城間のみ。\n叶いますね、ほんの数年後には、[ひさつ,1]肥颯線の全線復旧が」
2081 = "「Chỉ còn lại phía Bắc——đoạn giữa Ohito và Yatsushiro thôi ạ.\nSẽ thành hiện thực thôi, chỉ vài năm nữa, tuyến Hisatsu sẽ được khôi phục toàn tuyến.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
2285 = "「Đúng vậy.」"
# monologue
# JP: ハチロクも、同じことを思ってくれていた。\nただそれだけで嬉しくなる。
2793 = "Hachiroku cũng có cùng suy nghĩ với tôi.\nChỉ điều đó thôi cũng đủ khiến tôi thấy vui."
# monologue
# JP: 喜びが、僕の想像の翼を広げる。
2879 = "Niềm vui ấy chắp cánh cho trí tưởng tượng của tôi bay xa."
# 【双鉄】
# display as 雙鐵
# JP: 「[ひさつ,1]肥薩線の、そして[やつしろ,2]八ツ城－隈元間の復線が叶ったら、\n隈元－御一夜の直通列車を走らせてもおもしろかろうな」
1807 = "「Nếu tuyến Hisatsu, và đoạn giữa Yatsushiro - Kumamoto được khôi phục,\nthì việc chạy chuyến tàu thẳng từ Kumamoto đến Ohito chắc sẽ thú vị lắm.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、それは素敵なアイデアですね！」
1957 = "「Oa, đó là một ý tưởng tuyệt vời đấy ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「[おこば,1]小畑まわりの[やません,1]山線は、\nやはり8620には正直キツそうかと、第一印象では感じた」
2438 = "「Tuyến đường núi quanh Okoba,\nấn tượng đầu tiên của tôi là có vẻ hơi quá sức với 8620.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2016 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ――気の早い話にも程があるが、いつかはそちらを\n山の得意な機関車に任せ、僕らは御一夜－隈元間を」
2524 = "「Cho nên——dù nói chuyện này hơi sớm, nhưng một ngày nào đó,\nchúng ta sẽ giao khu vực đó cho những đầu máy giỏi leo núi, còn chúng ta sẽ phụ trách đoạn Ohito - Kumamoto.」"
# 【ハチロク】
# display as 八六
# JP: 「うふふ。御一夜急行でございますね。\nそれとも、御一夜特急、でございましょうか？」
2048 = "「Ufufu. Là Tàu tốc hành Ohito nhỉ.\nHay là, Tàu siêu tốc Ohito ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1994 = "「Hừm.」"
# monologue
# JP: 隈元からの観光客を御一夜へと直通で運ぶ。\n御一夜急行。確かにわかりやすくて、素敵な名前だ。
2959 = "Chở thẳng khách du lịch từ Kumamoto đến Ohito.\nTàu tốc hành Ohito. Quả thực là một cái tên dễ hiểu và tuyệt vời."
# monologue
# JP: が、足りぬ。一番の売りが何であるかを、\nハチロクは自分のことゆえ、見落としている。
3086 = "Nhưng, vẫn chưa đủ. Điểm hút khách nhất là gì,\nHachiroku vì là chuyện của bản thân nên đã bỏ sót."
# 【双鉄】
# display as 雙鐵
# JP: 「――ＳＬ御一夜」
1432 = "「——SL Ohito.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
1966 = "「Oa!」"
# monologue
# JP: その反応だけでわかる。\nやはり、この名前以外、ありえないのだと。
2854 = "Chỉ cần nhìn phản ứng đó là đủ hiểu.\nQuả nhiên, ngoài cái tên này ra thì không thể là cái tên nào khác."
# 【ハチロク】
# display as 八六
# JP: 「ＳＬ御一夜――シンプルで力強く、蒸気の香りが漂う。\nとても素敵な名前です」
2175 = "「SL Ohito——Đơn giản, mạnh mẽ, và thoang thoảng hương thơm của hơi nước.\nMột cái tên rất tuyệt vời ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ＳＬ御一夜を走らせるためにも頑張ろう。\n御一夜－[はやと,1]早戸間の営業運転を、何としても成功させよう」
2512 = "「Vậy thì, hãy cùng cố gắng để SL Ohito được chạy nào.\nDù thế nào cũng phải đưa tuyến Ohito - Hayato vào vận hành thương mại thành công.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。そう運ぶため、[こうこ,1]後顧の[うれ]憂いをなくすため。\n本日の、このリサアチも」
2304 = "「Đúng vậy ạ. Để đạt được điều đó, và để không còn mối lo về sau.\nChuyến khảo sát hôm nay cũng vậy.」"
# 【美馬】
# display as ？
# JP: 「ああ、あなた方が御一夜鉄道の」
1973 = "「À, các vị là người của Đường sắt Ohito đúng không.」"
# monologue
# JP: 突然の声に振り返れば、\n６０がらみの男性が、にこにここちらを見つめている。
3034 = "Nghe tiếng gọi bất ngờ, tôi quay lại,\nthấy một người đàn ông khoảng 60 tuổi đang mỉm cười nhìn chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「はい、そうです。御一夜鉄道運輸部長兼\x%l保線部長;#00ffc040;保線部長%l;#;兼\n[ハチロクニイマル,3]8620\x%l機関士;#00ffc040;機関士%l;#;の、右田双鉄ともうします」
2298 = "「Vâng, đúng vậy. Tôi là Migita Soutetsu, Trưởng phòng Vận tải kiêm \\x%l保線部長;#00ffc040;Trưởng bộ phận bảo trì đường ray%l;#;,\nkiêm \\x%l機関士;#00ffc040;lái tàu%l;#; của 8620 thuộc Đường sắt Ohito.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の、ハチロク、と申します。\n御一夜鉄道[ハチロクニイマル,3]8620の、専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でございます」
2217 = "「Em là Hachiroku, \\x%lレイルロオド;#00ffc040;Railord%l;#; của ngài Soutetsu ạ.\nLà \\x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của 8620 thuộc Đường sắt Ohito ạ.」"
# 【美馬】
# display as 美馬
# JP: 「[みぎた,1]右田さんの噂はよく耳にします。\nとても優秀な方だそうで――っと、私、[みま,1]美馬です」
1819 = "「Tôi nghe danh anh Migita đã lâu.\nNghe nói anh là một người rất xuất sắc——à, tôi là Mima.」"
# monologue
# JP: 名刺交換。\n肩書を見れば、みかん鉄道さんの運輸部長だ。
3005 = "Chúng tôi trao đổi danh thiếp.\nNhìn chức danh thì ông ấy là Trưởng phòng Vận tải của Đường sắt Mikan."
# 【双鉄】
# display as 雙鐵
# JP: 「お会いできて光栄です。しかし、僕らが\n御一夜鉄道の者だと、よくおわかりになられましたね」
1902 = "「Rất hân hạnh được gặp ông. Nhưng mà, sao ông biết\nchúng tôi là người của Đường sắt Ohito hay vậy?」"
# 【美馬】
# display as 美馬
# JP: 「はっは。そりゃわかりますよ。そこまで作りの良い\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、なかなかお目にかかれない」
1960 = "「Haha. Đương nhiên là biết chứ. Một \\x%lレイルロオド;#00ffc040;Railord%l;#;\nđược chế tạo tinh xảo đến mức đó, hiếm khi mới được thấy đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「お褒めにあずかり、光栄です。\nありがとうございます」
2253 = "「Được ông khen ngợi, em rất vinh hạnh.\nXin cảm ơn ông ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……」
1443 = "「……」"
# monologue
# JP: 作りの良い\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。か。\n賛辞はもちろん賛辞であろうが、見事なまでに物扱いだ。
2775 = "\\x%lレイルロオド;#00ffc040;Railord%l;#; được chế tạo tinh xảo. Sao.\nLời khen thì tất nhiên là lời khen rồi, nhưng rõ ràng là ông ta coi cô ấy như một món đồ."
# monologue
# JP: 同じく\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であるオリヴィが、\nどんな扱いを受けていたのか、多少心配になってくる。
2911 = "Tôi bắt đầu thấy hơi lo lắng, không biết Olivy, cũng là một \\x%lレイルロオド;#00ffc040;Railord%l;#;,\nđã bị đối xử như thế nào ở đây."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
# 2527 = "「雙鐵少爺？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すいません。ぼーっとしました。\n少し、乗り疲れが出てしまったのかな」
2004 = "「À, xin lỗi ông. Tôi hơi đãng trí.\nChắc là do đi tàu hơi mệt.」"
# 【美馬】
# display as 美馬
# JP: 「そりゃあそうでしょう。[はやと,1]早戸－[かごしま,2]鹿兒島－[せんだい,1]千内経由で[やつしろ,2]八ツ城\nなんて長時間をよくもまぁ……お好きなんですねぇ」
2484 = "「Cũng phải thôi. Đi từ Hayato qua Kagoshima, Sendai rồi mới đến Yatsushiro,\nchặng đường dài như vậy mà cậu cũng đi được…… cậu thích đi tàu nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論です。\nでなければ、結婚しません」
2505 = "「Tất nhiên rồi.\nNếu không thì tôi đã chẳng kết hôn.」"
# 【ハチロク】
# display as 八六
# JP: 「そ、双鉄さまっ！？」
2525 = "「Ng, ngài Soutetsu!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ」
1998 = "「A.」"
# monologue
# JP: これはしまった、『ハチロクと過ごす時間が』ではなく、\n『長時間乗車が』に対する『お好き』であったか――
3116 = "Thôi chết, chữ \"thích\" đó không phải là \"thích thời gian ở bên Hachiroku\",\nmà là \"thích đi tàu đường dài\" sao——"
# 【美馬】
# display as 美馬
# JP: 「確かに、私らは鉄道と結婚したようなもんですねぇ。\nここまでの斜陽産業になるとは、思ってもいなかった」
2406 = "「Quả thực, chúng ta giống như đã kết hôn với đường sắt vậy.\nKhông ngờ nó lại trở thành một ngành công nghiệp lụi tàn đến mức này.」"
# monologue
# JP: 普通に誤解をしたのか、\nあるいは、誤解したふりをしてくれたのか。
2751 = "Ông ấy thực sự hiểu lầm,\nhay là đang giả vờ hiểu lầm để giữ thể diện cho tôi đây."
# monologue
# JP: 美馬さんは微苦笑を浮かべ――\n目を細め、八ツ城駅を静かに見渡す。
3127 = "Ông Mima nở một nụ cười gượng——\nnheo mắt, lặng lẽ nhìn quanh ga Yatsushiro."
# 【美馬】
# display as 美馬
# JP: 「それでもまだ、走ってますから。\nなかなか、見捨てられんもんですなぁ」
1905 = "「Nhưng mà, tàu vẫn đang chạy mà.\nNên cũng khó mà bỏ mặc được nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日が傾くのは、また昇るためです」
2276 = "「Mặt trời lặn là để ngày mai lại mọc.」"
# monologue
# JP: 僕ごとき若輩者が、おそらくは鉄道一筋に生きてこられた、\nこの方にいえるようなことでは無いとも思う。
2762 = "Một kẻ trẻ người non dạ như tôi, có lẽ không đủ tư cách để nói điều này\nvới một người đã dành cả đời cho đường sắt như ông ấy."
# monologue
# JP: が、それでも声が出てしまう。\nそうするために、僕はここに来ているのだから。
3080 = "Nhưng tôi vẫn không kìm được mà thốt lên.\nBởi vì tôi đến đây là để làm điều đó mà."
# 【双鉄】
# display as 雙鐵
# JP: 「みかん鉄道と御一夜鉄道がつながったように、\nレールは必ず、再び広くつながっていきますよ」
2121 = "「Giống như Đường sắt Mikan và Đường sắt Ohito đã kết nối với nhau,\nđường ray nhất định sẽ lại được kết nối rộng khắp một lần nữa.」"
# 【美馬】
# display as 美馬
# JP: 「ははっ――かもしれませんねぇ。\nあの[きゅうごう,1]Ⅸ号がまた本線を走るって話なんですから」
1958 = "「Haha——có thể lắm nhỉ.\nDù sao thì cũng có tin đầu máy số 9 sẽ lại chạy trên đường chính mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうでした。本日は、そのお話を」
2034 = "「À, đúng rồi. Hôm nay chúng tôi đến đây là vì chuyện đó.」"
# 【美馬】
# display as 美馬
# JP: 「うかがってますよ。御社の[ひない,1]雛衣社長から。\nオリヴィが\x%l共感;#00ffc040;共感%l;#;を閉ざしてるそうで」
2226 = "「Tôi nghe nói rồi. Từ Giám đốc Hinai của công ty cậu.\nNghe nói Olivy đang đóng kín \\x%l共感;#00ffc040;cộng cảm%l;#; đúng không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……」
# 1443 = "「……」" 
# monologue
# JP: ハチロクから話した方がよかろうと思い、\n返事を待つ――が、ハチロクは口を開かない。
3019 = "Nghĩ rằng để Hachiroku nói thì tốt hơn,\ntôi chờ em ấy lên tiếng——nhưng Hachiroku vẫn im lặng."
# monologue
# JP: 妙な沈黙が生まれてしまう。\nならば、僕から話す他ない。
3200 = "Một sự im lặng kỳ lạ bao trùm.\nNếu vậy thì tôi đành phải nói thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「と、聞いています。まだオリヴィは添乗のみ。乗務には\nあたっていませんので、当座は問題がないのですが」
2245 = "「Tôi cũng nghe nói vậy. Hiện tại Olivy chỉ đi theo tàu chứ chưa chính thức\nlàm nhiệm vụ, nên tạm thời không có vấn đề gì, nhưng mà」"
# 【美馬】
# display as 美馬
# JP: 「当座ではなくなってしまったときに、問題になる」
1931 = "「Khi không còn là tạm thời nữa thì sẽ thành vấn đề chứ gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「率直に申しますと、そのとおりです。ですので今日は、\n御一夜鉄道への譲渡前の状況などをお伺いできればと」
2181 = "「Nói thẳng ra thì đúng là vậy. Do đó hôm nay,\nchúng tôi muốn hỏi thăm về tình hình của cô ấy trước khi chuyển nhượng cho Đường sắt Ohito.」"
# 【美馬】
# display as 美馬
# JP: 「わかりました。\nオリヴィを使っていた\x%l機関士;#00ffc040;機関士%l;#;をお連れしましょう」
2237 = "「Tôi hiểu rồi.\nĐể tôi gọi \\x%l機関士;#00ffc040;lái tàu%l;#; từng sử dụng Olivy đến.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2534 = "「!」"
# monologue
# JP: 言って、美馬さんが駅裏手へと消えていく。\n消えるやいなやでハチロクが、あきれたような声をだす。
3174 = "Nói xong, ông Mima đi về phía sau nhà ga.\nÔng ấy vừa khuất bóng, Hachiroku liền cất giọng với vẻ ngán ngẩm."
# 【ハチロク】
# display as 八六
# JP: 「……お人あたりの柔らかな方かとお見受け致しましたが、\n気の利く方、というわけではないようですね」
1468 = "「……Trông ông ấy có vẻ là người hòa nhã,\nnhưng có vẻ không được tinh tế cho lắm nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ハチロクもそう感じたか」
2022 = "「À, Hachiroku cũng thấy vậy sao.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。[の]乗り[づか]疲れされている双鉄さまに立ち話させ、\nお茶のひとつもお出ししないだなんて」
2303 = "「Vâng. Ngài Soutetsu đi tàu mệt mỏi thế này mà lại để ngài đứng nói chuyện,\nlại còn không thèm mời lấy một ly trà nữa chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこか」
1846 = "「Là chỗ đó sao.」"
# monologue
# JP: そこは全く気にしてなかった。
3008 = "Tôi hoàn toàn không để ý đến chuyện đó."
# monologue
# JP: 逆にハチロクには、僕の引っ掛かりが気にならないのか、\n少し不思議に感じてしまう。
3012 = "Ngược lại, tôi thấy hơi lạ là tại sao Hachiroku\nlại không bận tâm đến điều khiến tôi vướng mắc."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に対する扱いがいかがなものかが、\nむしろ気にかかってしまったが」
1886 = "「Tôi thì lại bận tâm đến\ncách ông ấy đối xử với \\x%lレイルロオド;#00ffc040;Railord%l;#; hơn.」"
# 【ハチロク】
# display as 八六
# JP: 「と、申されますと？」
2186 = "「Ý ngài là sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「『オリヴィを使っていた』だの、\n『作りの良い\x%lレイルロオド;#00ffc040;レイルロオド%l;#;』だの」
1900 = "「Thì mấy câu như 'từng sử dụng Olivy',\nhay '\\x%lレイルロオド;#00ffc040;Railord%l;#; được chế tạo tinh xảo' ấy.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ！」
2002 = "「A!」"
# monologue
# JP: 少し驚いたような表情。\nそれが笑顔に溶けていく。
2907 = "Biểu cảm hơi ngạc nhiên.\nSau đó tan chảy thành một nụ cười."
# 【ハチロク】
# display as 八六
# JP: 「うふふ、双鉄さまは[わたくしたち,5]レイルロオドを、とても大切に\n扱って下さっているのですね――ありがとうございます」
1951 = "「Ufufu, ngài Soutetsu đối xử với \\x%lレイルロオド;#00ffc040;chúng em%l;#;\nrất trân trọng nhỉ——Cảm ơn ngài ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？\nまるで僕が変わり者であるかのような言い方だが」
2042 = "「Hửm?\nEm nói cứ như thể tôi là kẻ lập dị vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「で、ございましょう。世間一般――。と申しましても、\nわたくしが知る世間は、『旧帝鉄』の基準ですが」
2055 = "「Có lẽ là vậy ạ. Đối với thế giới chung——. Mà nói thế chứ,\nthế giới mà em biết cũng chỉ là tiêu chuẩn của 'Teitetsu cũ' thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「旧帝鉄――」
1897 = "「Đường sắt Hoàng gia cũ——」"
# monologue
# JP: 言われて、気づく、\nなるほどだ。
3141 = "Nghe cô ấy nói tôi mới nhận ra,\nra là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ポーレットには帝鉄勤務の経験が無い。\nゆえ、御一夜鉄道はその文化圏の外にあるのか」
2112 = "「Ra vậy. Paulette không có kinh nghiệm làm việc ở Đường sắt Hoàng gia.\nDo đó, Đường sắt Ohito nằm ngoài vòng văn hóa đó sao.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。そして、みかん鉄道様は、見たところ、\n旧帝鉄の文化をそのまま引き継いでらっしゃるかと」
2460 = "「Đúng vậy ạ. Và theo như em thấy, Đường sắt Mikan\ncó vẻ như vẫn kế thừa nguyên vẹn văn hóa của Đường sắt Hoàng gia cũ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんな雰囲気ではあるよな」
2132 = "「Bầu không khí quả thực là như vậy nhỉ.」"
# monologue
# JP: 昔ながら、という言葉が素直に出てくるホームの景色だ。
2972 = "Khung cảnh sân ga khiến người ta tự nhiên thốt lên từ \"cổ kính\"."
# monologue
# JP: 幼少期の僕と路子がそこの階段から下りてきたとて、\n一片の違和感も生じないであろうほどに。
2877 = "Đến mức cho dù hình bóng tôi và Michiko thời thơ ấu có bước xuống từ cầu thang đằng kia,\ncũng chẳng mang lại chút cảm giác sai lệch nào."
# 【双鉄】
# display as 雙鐵
# JP: 「旧帝鉄の文化では――ああ、いや、\nハチロクにも聞かされたことがあったか」
1859 = "「Trong văn hóa của Đường sắt Hoàng gia cũ——à không,\nHachiroku cũng từng kể cho tôi nghe rồi nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「なにをでございましょうか？」
2184 = "「Chuyện gì vậy thưa ngài?」"
# 【双鉄】
# display as 雙鐵
# JP: 「旧帝鉄、[ていおう,1]帝央\x%l機関区;#00ffc040;機関区%l;#;では、8620[けい]形\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\nトップナンバー以外、ハロ１、ハロ２の連番だったと」
1802 = "「Ở Đường sắt Hoàng gia cũ, tại \\x%l機関区;#00ffc040;kho đầu máy%l;#; Trung tâm Hoàng gia, các \\x%lレイルロオド;#00ffc040;Railord%l;#; mẫu 8620,\nngoại trừ chiếc đầu tiên thì đều được gọi theo số thứ tự Haro 1, Haro 2.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、そのように細かなことまで\n覚えてらしてくださったのですね！」
1955 = "「Ôi, ngài còn nhớ rõ đến cả những chi tiết nhỏ nhặt như vậy sao!」"
# monologue
# JP: ハチロクの笑顔に温度が加わる。\nさらにあたたかなものになる。
2818 = "Nụ cười của Hachiroku như thêm phần ấm áp.\nTrở nên dịu dàng hơn nữa."
# 【ハチロク】
# display as 八六
# JP: 「左様でございます。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、基本、物。\nそこは、旧帝鉄の取扱の基本でございました」
2340 = "「Đúng là như vậy ạ. \\x%lレイルロオド;#00ffc040;Railord%l;#; về cơ bản chỉ là đồ vật.\nĐó là quy tắc ứng xử cơ bản của Đường sắt Hoàng gia cũ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 2016 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「もちろん、常に例外はございます。\n例えば、[デーゴジュウイチ,2]Ｄ５１　[ハチヨンマル,2]８４０レイルロオド――ラン」
2404 = "「Tất nhiên, lúc nào cũng có ngoại lệ ạ.\nVí dụ như, Railord của D51 840——Ran.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ＴＶＣＭでよく見る\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だな。\n東日ノ本では大人気のようだが」
1977 = "「À, \\x%lレイルロオド;#00ffc040;Railord%l;#; thường thấy trên quảng cáo truyền hình nhỉ.\nCó vẻ rất nổi tiếng ở Đông Hinomoto.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまの大九洲ＳＬ構想を後追いしての、東日ノ本一丸\nとなってのＳＬ構想――その金看板でございますね」
2520 = "「Dự án SL toàn Đông Hinomoto được lập ra để bắt kịp dự án SL Đại Kyushu của ngài Soutetsu――\nvà cô ấy chính là bảng hiệu vàng của dự án đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[ハチヨンマル,2]８４０とは、極平凡な量産機であろう番号だよな。\nしかも、デゴイチは[ヒノモト,2]日ノ本全土で珍しくない」
2164 = "「840 là một con số cho thấy đây là cỗ máy sản xuất hàng loạt cực kỳ bình thường nhỉ.\nHơn nữa, D51 cũng chẳng hiếm lạ gì trên toàn Hinomoto.」"
# 【ハチロク】
# display as 八六
# JP: 「左様でございますね。けれど、あのランは――\n現役時代から、なんと申せば良いのでしょうか……」
2344 = "「Đúng vậy ạ. Thế nhưng, Ran đó thì――\ntừ hồi còn tại ngũ, phải nói thế nào cho đúng nhỉ……」"
# monologue
# JP: 言葉を探して、ハチロクが少し黙り込む。
2812 = "Hachiroku im lặng một chút để tìm từ ngữ."
# 【ハチロク】
# display as 八六
# JP: 「看板、広告塔――タレント！　で良いのでしょうか？\nそういうふうに扱われていたこだと聞き及びました」
2335 = "「Bảng hiệu, tháp quảng cáo――hay là idol! Gọi như vậy có được không ạ?\nEm nghe nói cô ấy đã được đối xử như vậy đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1971 = "「哦」" 
# 【ハチロク】
# display as 八六
# JP: 「ランは、[デーゴジュウイチけい,3]Ｄ５１形\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とは思えない、\n非常にスマアトで華やいだ印象の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です」
2454 = "「Ran là một \\x%lレイルロオド;#00ffc040;Railord%l;#; vô cùng thanh lịch và rực rỡ,\nđến mức không ai nghĩ cô ấy là \\x%lレイルロオド;#00ffc040;Railord%l;#; mẫu D51 ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[デゴイチ,2]Ｄ５１\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、一般的には華やがぬのか？」
2528 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; D51 nói chung không rực rỡ sao?」"
# 【ハチロク】
# display as 八六
# JP: 「[かもつき,2]貨物機\x%lレイルロオド;#00ffc040;レイルロオド%l;#;らしい――朴訥、寡黙、勤勉。\nそうした印象を持ったものが多いように思われます」
2070 = "「Đậm chất \\x%lレイルロオド;#00ffc040;Railord%l;#; máy kéo hàng――chất phác, ít nói, siêng năng.\nEm nghĩ phần lớn họ đều mang lại ấn tượng như vậy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。だとすると、あのランという\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\n確かに毛色が全く違う――相当な変わり種だな」
1987 = "「Hừm. Nếu vậy thì \\x%lレイルロオド;#00ffc040;Railord%l;#; tên Ran đó,\nđúng là hoàn toàn khác biệt――một trường hợp khá đặc biệt nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。それこそ[らん]蘭の花のように、目立って優美で。\nあのこは、最初の運用から\x%l客車;#00ffc040;客車%l;#;を牽引したそうですよ？」
2037 = "「Vâng. Cô ấy nổi bật và thanh nhã hệt như một đóa hoa lan vậy.\nNghe nói từ lúc mới đi vào hoạt động, cô ấy đã kéo \\x%l客車;#00ffc040;toa hành khách%l;#; rồi đấy ạ?」"
# monologue
# JP: そう賞賛するハチロクの声までが優美だ。\nよほど、気に入っているのであろう。
2804 = "Ngay cả giọng điệu tán thưởng của Hachiroku cũng thật thanh nhã.\nChắc hẳn em ấy rất thích cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「それほど特別に扱われたのか。\nかつての帝鉄の、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は物とする文化の中でも」
2125 = "「Được đối xử đặc biệt đến thế sao.\nNgay cả trong nền văn hóa coi \\x%lレイルロオド;#00ffc040;Railord%l;#; là đồ vật của Đường sắt Hoàng gia trước đây.」"
# monologue
# JP: 言って。いや違うか、ともすぐに感じる。\n『物』として扱うからこそ、運用を柔軟に切り替えるのか。
3170 = "Vừa nói xong. Tôi lập tức cảm thấy, không phải vậy sao.\nChính vì coi là \"đồ vật\" nên mới có thể linh hoạt chuyển đổi mục đích sử dụng."
# monologue
# JP: 貨物機として産まれ、けれども広告塔とされる――\nラン自身の意思の如何は、おそらく考慮さえされぬまま。
3090 = "Sinh ra là máy kéo hàng, nhưng lại bị dùng làm tháp quảng cáo――\nCó lẽ ý muốn của chính Ran còn chẳng hề được đếm xỉa tới."
# 【ハチロク】
# display as 八六
# JP: 「いわゆる『当り[がま]罐』の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;版でございますね。\nときどき、ああしたこが出てまいります」
1827 = "「Đó chính là phiên bản \\x%lレイルロオド;#00ffc040;Railord%l;#; của cái gọi là \"Lò trúng thưởng\" ạ.\nThỉnh thoảng, sẽ có những đứa trẻ như vậy xuất hiện.」"
# monologue
# JP: けれど、ハチロクの声には無邪気な賞賛の感しかない。\nならば僕から、そこを引っ掻き回す必要も無いだろう。
2770 = "Thế nhưng, trong giọng nói của Hachiroku chỉ có sự tán thưởng hồn nhiên.\nVậy thì tôi cũng chẳng cần phải bới móc chuyện đó lên làm gì."
# 【双鉄】
# display as 雙鐵
# JP: 「『当り[がま]罐』――か。そんなこともあるのか？\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、精密機械の代表格であろうに」
1440 = "「\"Lò trúng thưởng\"――sao. Lại có chuyện đó ư?\n\\x%lレイルロオド;#00ffc040;Railord%l;#; đáng lẽ phải là đại diện tiêu biểu của máy móc chính xác chứ.」"
# 【ハチロク】
# display as 八六
# JP: 「精密機械であると同時に、わたくしたちでさえ\nその製造の核心部を知らない、機密製品でございます」
1799 = "「Đồng thời với việc là máy móc chính xác, chúng em còn là những sản phẩm cơ mật\nmà ngay cả chính chúng em cũng không biết phần cốt lõi trong quá trình chế tạo ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。それゆえに[まぎ]紛れがある？」
1982 = "「À. Vì vậy nên mới có sự sai lệch?」"
# 【ハチロク】
# display as 八六
# JP: 「で、あろうかと存じます。個性、個体差は、同形式でも\n――恐らくは双鉄さまのご想像より、遥かに大きいかと」
1856 = "「Em nghĩ là vậy ạ. Cá tính, sự khác biệt giữa các cá thể, dù cùng chung mẫu mã\n――có lẽ còn lớn hơn nhiều so với tưởng tượng của ngài Soutetsu đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 1971 = "「哦」" 
# monologue
# JP: そういわれるとますます、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は生物に近い、と、\nそんな考えが――僕の実感が強化されていく。
3032 = "Nghe em ấy nói vậy, suy nghĩ rằng \\x%lレイルロオド;#00ffc040;Railord%l;#; gần giống sinh vật hơn\n――cảm nhận thực tế của tôi lại càng thêm mãnh liệt."
# monologue
# JP: “蒸機は生き物”である以上に、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、命と体温を持っているのだ、と。
2719 = "Không chỉ \"Đầu máy hơi nước là một sinh vật sống\",\nmà \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng có sinh mệnh và hơi ấm của riêng mình."
# 【双鉄】
# display as 雙鐵
# JP: 「が――　一般的にはモノ扱いか」
1937 = "「Nhưng―― nhìn chung vẫn bị coi là đồ vật sao.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、ですが、精密機器なうえ機密製品で、しかも、\n鉄道保安部品ですから、手厚く保護されておりますよ？」
2290 = "「Vâng, nhưng vì là máy móc chính xác, sản phẩm cơ mật,\nlại còn là bộ phận an ninh đường sắt, nên chúng em được bảo vệ rất nghiêm ngặt đấy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、それはそうだな。\n鉄道営業法でもしっかりと守られているとは感じる」
2008 = "「Ừm, chuyện đó thì đúng thật.\nLuật kinh doanh đường sắt cũng bảo vệ rất chặt chẽ.」"
# 【ハチロク】
# display as 八六
# JP: 「みだりに\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に触れたり、損壊させれば、\n簡単に刑事事件になりますからね」
2450 = "「Nếu tự ý chạm vào hoặc làm hỏng \\x%lレイルロオド;#00ffc040;Railord%l;#;,\nsẽ rất dễ trở thành vụ án hình sự mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな。線路への置石などと同様の、\n安全支障を生みかねない行為だものな、それは」
2123 = "「Đúng vậy. Đó là hành vi có thể gây trở ngại an toàn,\ngiống như việc đặt đá lên đường ray vậy.」"
# monologue
# JP: ゆえ、乗客は\x%lレイルロオド;#00ffc040;レイルロオド%l;#;には触れられないし、\n鉄道事業者とてそう気楽には扱えない。
3041 = "Vì vậy, hành khách không thể chạm vào \\x%lレイルロオド;#00ffc040;Railord%l;#;,\nvà các doanh nghiệp đường sắt cũng không thể tùy tiện xử lý."
# monologue
# JP: 他社・他者所有の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;への接し方には、\n僕の場合は、ある意味では対人以上に気を使う。
2970 = "Cách đối xử với \\x%lレイルロオド;#00ffc040;Railord%l;#; thuộc sở hữu của công ty hay cá nhân khác,\nđối với tôi, theo một nghĩa nào đó còn phải cẩn thận hơn cả với con người."
# 【ハチロク】
# display as 八六
# JP: 「物ではあるけれど、極めて重要。しかし、結局は物。\nそれが、一般的な意識においての\x%lレイルロオド;#00ffc040;レイルロオド%l;#;かと」
1866 = "「Dù là đồ vật nhưng cực kỳ quan trọng. Tuy nhiên, rốt cuộc vẫn chỉ là đồ vật.\nĐó có lẽ là nhận thức chung về \\x%lレイルロオド;#00ffc040;Railord%l;#; ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「結局は物、という部分が、よくわからんな」
2523 = "「Cái phần 'rốt cuộc vẫn là đồ vật', tôi không hiểu lắm.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね、例えば――」
2518 = "「Vâng, ví dụ như――」"
# 【美馬】
# display as 美馬
# JP: 「いやいや、すみません。\nおまたせしました」
1965 = "「Ây da, xin lỗi nhé.\nĐã để hai người phải đợi lâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いえ」
2005 = "「À, không sao đâu.」"
# 【美馬】
# display as 美馬
# JP: 「これが、[むなかた,1]宗方。\nオリヴィを使っていた\x%l機関士;#00ffc040;機関士%l;#;です」
2485 = "「Đây là Munakata.\nLà \\x%l機関士;#00ffc040;lái tàu%l;#; từng sử dụng Olivy.」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2002 = "「啊！」" 
# monologue
# JP: ハチロクが小さく声をあげ、\nすぐに口を閉じ、かしこまる。
2831 = "Hachiroku khẽ thốt lên một tiếng,\nrồi ngay lập tức ngậm miệng lại, nghiêm trang."
# monologue
# JP: 僕もしっかり記憶している。\nこの人は、オリヴィを連れていた\x%l機関士;#00ffc040;機関士%l;#;だ。
2997 = "Tôi cũng nhớ rất rõ.\nNgười này là \\x%l機関士;#00ffc040;lái tàu%l;#; đã đưa Olivy đến."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜では、お世話になりました。\n御一夜鉄道[ハチロクニイマル,3]8620号\x%l機関士;#00ffc040;機関士%l;#;。右田双鉄です」
1823 = "「Ở Ohito đã làm phiền anh rồi.\nTôi là \\x%l機関士;#00ffc040;lái tàu%l;#; đầu máy 8620 của Đường sắt Ohito. Migita Soutetsu.」"
# 【宗方】
# display as 宗方
# JP: 「よければ、どうぞ」
1797 = "「Nếu được thì, xin mời.」"
# monologue
# JP: ハチロクと並びベンチに座っていた腰をあわてて、\nわずかに浮かす。
2995 = "Tôi đang ngồi trên băng ghế cạnh Hachiroku, vội vàng\nhơi nhổm người lên."
# 【双鉄】
# display as 雙鐵
# JP: 「恐縮です。ご馳走になります」
2102 = "「Ngại quá. Cảm ơn anh.」"
# monologue
# JP: 缶コーヒーだ。僕ひとりにだけ。\nハチロクの分も、宗方さん自身の分もない。
2952 = "Là cà phê lon. Chỉ cho một mình tôi.\nKhông có phần của Hachiroku, cũng không có phần của chính anh Munakata."
# monologue
# JP: 一応は、気を使ってもらえている。\nならば、駅長室などは来客で使用中であるのかもしれん。
3102 = "Tạm thời thì, anh ấy cũng đang chiếu cố chúng tôi.\nVậy thì, có lẽ phòng trưởng ga đang có khách sử dụng."
# 【宗方】
# display as 宗方
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;同士――の話で、大丈夫ですかね？」
1928 = "「Chuyện giữa các \\x%l機関士;#00ffc040;lái tàu%l;#; với nhau――không vấn đề gì chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「肩書抜きでということですね？　了解です」
2196 = "「Ý anh là bỏ qua chức danh phải không? Tôi hiểu rồi.」"
# 【宗方】
# display as 宗方
# JP: 「なら、ざっくばらんに行くが――」
2500 = "「Vậy thì, tôi cứ thẳng thắn mà nói nhé――」"
# monologue
# JP: 宗方さんも、無造作にベンチに腰掛ける。
2943 = "Anh Munakata cũng thản nhiên ngồi xuống băng ghế."
# monologue
# JP: ハチロク、僕、宗方さんの並びだが、\n僕と宗方さんとの間には、人一人ほどの空間がある。
2746 = "Hachiroku, tôi, rồi đến anh Munakata ngồi thành hàng,\nnhưng giữa tôi và anh Munakata có một khoảng trống cỡ một người."
# 【宗方】
# display as 宗方
# JP: 「オリヴィが、壊れたのか？」
2074 = "「Olivy, bị hỏng rồi à?」"
# monologue
# JP: 予想以上にざっくばらんだ。
3202 = "Thẳng thắn hơn tôi tưởng."
# monologue
# JP: 声音がどこか心配そうで、\nそこにはなんだか、少しだけほっとさせられる。
2754 = "Giọng điệu của anh ấy có vẻ lo lắng,\nđiều đó khiến tôi phần nào cảm thấy nhẹ nhõm."
# 【双鉄】
# display as 雙鐵
# JP: 「いえ、壊れたというわけではありません。\n表面上は、明るく気丈にふるまっています。が――」
1812 = "「Không, không phải là bị hỏng.\nBề ngoài thì cô ấy vẫn tỏ ra vui vẻ và mạnh mẽ. Nhưng――」"
# monologue
# JP: ここは、ハチロクからの方がいい。
3045 = "Chỗ này, để Hachiroku nói thì tốt hơn."
# monologue
# JP: 宗方さんを見、ハチロクを見て、また目で問えば、\n宗方さんは、無言の頷きで答えてくれる。
3029 = "Nhìn anh Munakata, nhìn Hachiroku, rồi lại dùng ánh mắt để hỏi,\nanh Munakata đã đáp lại bằng một cái gật đầu im lặng."
# 【ハチロク】
# display as 八六
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィは\x%l共感;#00ffc040;共感%l;#;の殆どを拒絶しています。\n乗務外でのこととはいえ、これは異常な状態です」
1428 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; Olivy đang từ chối hầu hết các \\x%l共感;#00ffc040;cộng cảm%l;#;.\nDù là ngoài giờ làm việc, nhưng đây là một tình trạng bất thường ạ.」"
# 【宗方】
# display as 宗方
# JP: 「ほぉ？　なら、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;同士は、\n乗務の外でも\x%l共感;#00ffc040;共感%l;#;を交わすものなのか？」
2051 = "「Hô? Vậy là, giữa các \\x%lレイルロオド;#00ffc040;Railord%l;#; với nhau,\nngoài giờ làm việc cũng trao đổi \\x%l共感;#00ffc040;cộng cảm%l;#; sao?」"
# monologue
# JP: 僕より遥かにベテランの――つまりは先輩の\x%l機関士;#00ffc040;機関士%l;#;だ。\nその質問は、意外であるような気もする。が……
2960 = "Một người kỳ cựu hơn tôi rất nhiều――tức là một \\x%l機関士;#00ffc040;lái tàu%l;#; tiền bối.\nCâu hỏi đó khiến tôi có chút bất ngờ. Nhưng……"
# monologue
# JP: 冷静になれば僕とても、普段ハチロクとれいなとが、\nどんな\x%l共感;#00ffc040;共感%l;#;を交わし合っているかなど、まるで知らない。
2767 = "Bình tĩnh nghĩ lại thì ngay cả tôi, cũng hoàn toàn không biết\nbình thường Hachiroku và Reina trao đổi \\x%l共感;#00ffc040;cộng cảm%l;#; gì với nhau."
# 【ハチロク】
# display as 八六
# JP: 「普段から深くまで\x%l共感;#00ffc040;共感%l;#;を交わすものでもございませんが、\n人間の皆様の雑談同様、日常的な\x%l共感;#00ffc040;共感%l;#;などは交わします」
2208 = "「Bình thường chúng em cũng không trao đổi \\x%l共感;#00ffc040;cộng cảm%l;#; quá sâu sắc,\nnhưng những \\x%l共感;#00ffc040;cộng cảm%l;#; thường ngày giống như con người tán gẫu thì vẫn có ạ.」"
# 【宗方】
# display as 宗方
# JP: 「女子職員の、茶飲み話みたいなものか？」
2134 = "「Giống như mấy cô nhân viên nữ vừa uống trà vừa buôn chuyện à?」"
# 【ハチロク】
# display as 八六
# JP: 「そのご解釈で、大きくはズレていないものかと」
2228 = "「Em nghĩ cách hiểu đó cũng không sai lệch nhiều lắm đâu ạ.」"
# 【宗方】
# display as 宗方
# JP: 「その茶飲み話をオリヴィは拒否している？」
2266 = "「Và Olivy đang từ chối mấy cuộc buôn chuyện đó?」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2288 = "「Vâng ạ.」"
# 【宗方】
# display as 宗方
# JP: 「拒否されると、どう困る」
2487 = "「Bị từ chối thì, mấy người gặp rắc rối gì.」"
# 【ハチロク】
# display as 八六
# JP: 「現時点では、少しさみしい程度です。けれどももしも、\n万が一、乗務に係わる\x%l共感;#00ffc040;共感%l;#;までが閉ざされるなら」
2407 = "「Hiện tại thì, chỉ là hơi buồn một chút thôi ạ. Nhưng nếu như,\nnhỡ đâu đến cả \\x%l共感;#00ffc040;cộng cảm%l;#; liên quan đến công việc cũng bị đóng lại thì」"
# 【宗方】
# display as 宗方
# JP: 「ああ。そうなれば完全に使い物にならんな」
1992 = "「À. Nếu vậy thì hoàn toàn vô dụng rồi.」"
# monologue
# JP: 鉄仮面のようだった宗方さんの表情が、\nわずかに歪む。
2940 = "Nét mặt như chiếc mặt nạ sắt của anh Munakata,\nhơi méo mó một chút."
# 【宗方】
# display as 宗方
# JP: 「御一夜では、[きゅうごう,1]Ⅸ号とオリヴィを――」
1844 = "「Ở Ohito, các người định để Đầu máy số 9 và Olivy――」"
# 【ハチロク】
# display as 八六
# JP: 「はい。本線を走ってもらう予定ですので」
2295 = "「Vâng. Chúng em dự định để họ chạy trên tuyến chính ạ.」"
# 【宗方】
# display as 宗方
# JP: 「問題があることは理解した。\n……理解はしたが」
1845 = "「Tôi hiểu vấn đề rồi.\n……Hiểu thì hiểu, nhưng」"
# monologue
# JP: 野太い指が、無精髭の生えた顎を撫ぜる。
2748 = "Ngón tay thô ráp vuốt ve cái cằm lởm chởm râu."
# 【宗方】
# display as 宗方
# JP: 「故障ならオレの手には負えんし、\n拗ねているだけなら、それはもうオレの管轄外だ」
2084 = "「Nếu hỏng hóc thì tôi cũng bó tay,\ncòn nếu chỉ là đang dỗi, thì đó đã nằm ngoài quyền hạn của tôi rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「……そうおっしゃられてしまいますと――\nまさしく、お言葉のとおりではあるのですけれど――」
1461 = "「……Anh nói vậy thì――\nđúng là như lời anh nói thật, nhưng mà――」"
# monologue
# JP: ハチロクの立場では、\n他社の職員の意見に異論を挟めない。
3230 = "Với lập trường của Hachiroku,\nem ấy không thể phản bác ý kiến của nhân viên công ty khác."
# monologue
# JP: ここから先は、僕が引き継ぐべきだろう。
3209 = "Từ đây trở đi, tôi nên tiếp quản thì hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「なにか、拗ねるような原因に心あたりがおありですか？\n弊社雛衣は、かかる事態を回避して欲しいと、時間を」
2262 = "「Anh có nghĩ ra nguyên nhân nào khiến cô ấy dỗi không?\nHinai của công ty chúng tôi, vì muốn tránh tình trạng này xảy ra, nên đã xin thêm thời gian」"
# 【宗方】
# display as 宗方
# JP: 「ああ。その話は聞いたし、業務命令も受けた。\n引き渡しにはこっちも、万全の準備をするつもりだった」
2316 = "「À. Chuyện đó tôi có nghe, cũng nhận được lệnh rồi.\nBên này cũng định chuẩn bị kỹ lưỡng cho việc bàn giao.」"
# monologue
# JP: つもりだった――\nが、そうできなかった。
2850 = "Định chuẩn bị――\nnhưng, đã không thể làm vậy."
# monologue
# JP: まったくの予定外の前倒し騒動があったのだから、\nその一点は、明白だ。
3065 = "Vì đã có một vụ lộn xộn đẩy nhanh tiến độ hoàn toàn ngoài dự kiến,\nnên điểm đó là rất rõ ràng."
# 【宗方】
# display as 宗方
# JP: 「一番長くⅨ号を使っていた自分が担当にあてられた。\nつまり、オリヴィに命令を遵守させるためのだ」
2439 = "「Người sử dụng Đầu máy số 9 lâu nhất là tôi được giao phụ trách.\nTức là, để bắt Olivy tuân thủ mệnh lệnh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 2016 = "「嗯」" 
# monologue
# JP: 説得、ではなく、命令を遵守させる。\n根本的な意識の違いを、ここでも感じさせられてしまう。
2728 = "Không phải thuyết phục, mà là bắt tuân thủ mệnh lệnh.\nSự khác biệt căn bản về nhận thức, lại một lần nữa khiến tôi cảm nhận được ở đây."
# 【宗方】
# display as 宗方
# JP: 「そんな業務の経験はなかった。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は命令を守るものだからな」
2113 = "「Tôi chưa từng có kinh nghiệm làm việc đó.\nVì \\x%lレイルロオド;#00ffc040;Railord%l;#; vốn là thứ phải tuân theo mệnh lệnh mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「でしたら、そのまま命令を？」
2267 = "「Nếu vậy, anh cứ thế ra lệnh sao?」"
# 【宗方】
# display as 宗方
# JP: 「いや、御社社長が気にしている点は、俺にも理解できた。\n命令に素直に従っても、アレがみかん鉄道に対して――」
1814 = "「Không, tôi cũng hiểu được điểm mà giám đốc công ty cậu đang lo ngại.\nCho dù có ngoan ngoãn tuân lệnh, nếu nó vẫn giữ tình cảm với Đường sắt Mikan――」"
# monologue
# JP: 宗方さんが、一瞬黙る。\n言葉を、多分探している。
2949 = "Anh Munakata im lặng một thoáng.\nCó lẽ, đang tìm từ ngữ thích hợp."
# 【宗方】
# display as 宗方
# JP: 「みかん鉄道への復職を希望するようなことがあっては、\n御一夜でフルパフォーマンスを発揮できない危険がある」
2083 = "「Nếu nó có ý định muốn quay lại làm việc cho Đường sắt Mikan,\nthì có nguy cơ sẽ không thể phát huy hết khả năng ở Ohito.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、雛衣が懸念したのは、\nまさしくその一点で間違いないと理解しています」
2300 = "「Vâng, tôi hiểu Hinai lo ngại chính xác là ở điểm đó.」"
# monologue
# JP: が、ポーレットが時間を設けての準備を依頼したのは、\n御一夜での性能低下を心配してのことではないだろう。
3082 = "Nhưng, lý do Paulette yêu cầu dành thời gian chuẩn bị,\nchắc chắn không phải vì lo lắng hiệu suất ở Ohito sẽ giảm sút."
# monologue
# JP: オリヴィの心残りが無いように、別れをきちんと\n告げられるようにと――そう望んでの配慮の筈だ。
2899 = "Là để Olivy không còn gì vương vấn, để cô ấy có thể nói lời chia tay\nđàng hoàng――đó hẳn là sự quan tâm xuất phát từ mong muốn như vậy."
# 【宗方】
# display as 宗方
# JP: 「ので、まずは現状を確認しようと考え、\n一番最初に、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;技師のところに点検に出した」
2268 = "「Vì thế, tôi nghĩ trước tiên phải xác nhận tình trạng hiện tại,\nnên việc đầu tiên là đưa nó đến chỗ kỹ sư \\x%lレイルロオド;#00ffc040;Railord%l;#; để kiểm tra.」"
# 【双鉄】
# display as 雙鐵
# JP: 「八ツ城にも、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;技師の方が？」
1877 = "「Ở Yatsushiro cũng có kỹ sư \\x%lレイルロオド;#00ffc040;Railord%l;#; sao?」"
# 【宗方】
# display as 宗方
# JP: 「いや、ちゃんと[おおみや,1]旺宮送りにした。\n検査は、まぁいつもどおりの結果だった」
2369 = "「Không, tôi đã gửi nó đến Omiya đàng hoàng.\nKết quả kiểm tra thì, chà, vẫn như mọi khi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いつもどおり――というのは」
2443 = "「Vẫn như mọi khi――nghĩa là sao?」"
# 【宗方】
# display as 宗方
# JP: 「これだな」
2120 = "「Đây này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「拝見します」
2101 = "「Cho tôi xem với.」"
# monologue
# JP: 書類一枚が手渡される。
2743 = "Một tờ tài liệu được đưa cho tôi."
# monologue
# JP: 随分待たされたのは、あるいは、\nこれを用意をしてくれていたせいなのかもしらん。
2739 = "Có lẽ việc để chúng tôi chờ lâu như vậy,\nlà do anh ấy bận chuẩn bị thứ này cũng nên."
# 【双鉄】
# display as 雙鐵
# JP: 「……機能は全て正常。が――老朽化が著しいため、\n毎年の全般検査を強く推奨、ですか」
1466 = "「……Mọi chức năng đều bình thường. Nhưng――do tình trạng xuống cấp nghiêm trọng,\nkhuyến cáo mạnh mẽ nên kiểm tra toàn diện hàng năm, sao.」"
# 【ハチロク】
# display as 八六
# JP: 「毎年全検！」
2355 = "「Kiểm tra toàn diện hàng năm!」"
# monologue
# JP: よほど驚いたのだろう。\nずっと静かに控えていたハチロクから声が零れる。
2714 = "Chắc hẳn em ấy rất ngạc nhiên.\nHachiroku, người vẫn luôn giữ im lặng, buột miệng thốt lên."
# monologue
# JP: 確かに毎年は相当だ。製造後五十年内の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の\n全検は八年に一度。それを越えても四年に一度なのだから。
3070 = "Quả thực mỗi năm một lần là khá nhiều. \\x%lレイルロオド;#00ffc040;Railord%l;#; trong vòng 50 năm sau khi chế tạo\nchỉ cần kiểm tra toàn diện 8 năm một lần. Dù có vượt quá mức đó thì cũng là 4 năm một lần."
# 【宗方】
# display as 宗方
# JP: 「この書類の写しは、御社社長にも送ってある。\n状況は全て、合意確認済みの引き渡しだ」
2328 = "「Bản sao của tài liệu này cũng đã được gửi cho giám đốc công ty cậu.\nMọi tình huống đều đã được xác nhận và đồng ý trước khi bàn giao.」"
# monologue
# JP: 宗方さんの声音が固くなってしまう。\n責めているように聞こえたのなら、本意ではない。
2946 = "Giọng của anh Munakata trở nên cứng rắn.\nNếu nghe như tôi đang trách móc, thì đó không phải là ý định của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「その点も、もちろん了解しています」
2115 = "「Điểm đó, tất nhiên là tôi hiểu.」"
# 【ハチロク】
# display as 八六
# JP: 「すみません。\n驚きのあまり、つい声が漏れてしまいました」
2531 = "「Xin lỗi ạ.\nVì quá ngạc nhiên nên em lỡ buột miệng.」"
# monologue
# JP: ハチロクの謝罪に、宗方さんは反応しない。\nならば話をさっさと変えた方がいい。
2939 = "Anh Munakata không phản ứng gì trước lời xin lỗi của Hachiroku.\nVậy thì nên nhanh chóng đổi chủ đề."
# 【双鉄】
# display as 雙鐵
# JP: 「検査の結果は、オリヴィには伝えたのですか？」
2339 = "「Kết quả kiểm tra, anh đã báo cho Olivy biết chưa?」"
# 【宗方】
# display as 宗方
# JP: 「いいや？」
2368 = "「Chưa?」"
# monologue
# JP: 不思議そうなトーンの否定。\nなぜ伝える必要がある、といわんばかりだ。
3139 = "Lời phủ nhận với giọng điệu ngạc nhiên.\nNhư thể muốn nói, tại sao lại phải báo."
# 【宗方】
# display as 宗方
# JP: 「だが、時期外の検査に違和感は覚えたらしく、\n『自分はもう寿命なのか』ということを聞いてきた」
1841 = "「Nhưng, có vẻ nó cũng cảm thấy kỳ lạ vì đợt kiểm tra ngoài dự kiến này,\nnên đã hỏi 'Có phải mình đã hết tuổi thọ rồi không'.」"
# 【双鉄】
# display as 雙鐵
# JP: 「寿命――」
2072 = "「Tuổi thọ――」"
# monologue
# JP: ドキリとする。\n僕とて、すずを、ハチロクを妻とするものだ。
3017 = "Tôi giật mình.\nBản thân tôi cũng là người lấy Suzu, lấy Hachiroku làm vợ."
# monologue
# JP: 耐用年数を越えている\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、\n寿命を常に気にすることは、痛感している。
2962 = "Tôi cảm nhận sâu sắc rằng, những \\x%lレイルロオド;#00ffc040;Railord%l;#; đã vượt quá thời hạn sử dụng\nluôn bận tâm đến tuổi thọ của mình."
# monologue
# JP: （その上――オリヴィは常に稼働し続けてきた、\nハチロクよりも年式の古い\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ）
3245 = "(Hơn nữa――Olivy vẫn luôn hoạt động liên tục,\nlà một \\x%lレイルロオド;#00ffc040;Railord%l;#; có tuổi đời còn cũ hơn cả Hachiroku)"
# monologue
# JP: あの外観と、明るい言動とに目をくらまされていたが……\n確かに寿命のことを、気に病んでいない訳が無いだろう。
2788 = "Dù đã bị che mắt bởi vẻ ngoài và lời nói vui vẻ đó...\nNhưng chắc chắn cô ấy không thể nào không bận tâm đến chuyện tuổi thọ được."
# 【宗方】
# display as 宗方
# JP: 「そこもきちんと、御社社長とは合意済みだ」
2519 = "「Chuyện đó cũng đã được thỏa thuận rõ ràng với giám đốc công ty cậu rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1998 = "「啊」" 
# monologue
# JP: そこを気にしたわけではない。\nいうより先に、不機嫌そうな言葉を叩きつけられる。
3072 = "Tôi không phải bận tâm chuyện đó.\nNhưng trước khi tôi kịp nói, những lời khó chịu đã giáng xuống."
# 【宗方】
# display as 宗方
# JP: 「[だいたい,1]代替の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の[めど,1]目処があるのだろう。\nⅨ号の状態が良ければ、他は不問で話がついている」
2191 = "「Chắc hẳn các cậu đã nhắm được \\x%lレイルロオド;#00ffc040;Railord%l;#; thay thế rồi chứ gì.\nChỉ cần Đầu máy số 9 trong tình trạng tốt, những thứ khác không thành vấn đề, đã thỏa thuận vậy rồi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1443 = "「……」" 
# monologue
# JP: 代替。そして、他は不問。\n随分と残酷な表現に聞こえてしまう、が――
3058 = "Thay thế. Và, những thứ khác không thành vấn đề.\nNghe có vẻ là một cách diễn đạt khá tàn nhẫn, nhưng――"
# monologue
# JP: ポーレットが最悪を想定した上で行動するのは、\n経営者として、むしろ当然のこととも思える。
2772 = "Việc Paulette hành động sau khi đã dự liệu trường hợp xấu nhất,\nvới tư cách là một nhà quản lý, có lẽ là điều hiển nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「……オリヴィの質問に、宗方さんはなんとお答えに？」
1479 = "「……Trước câu hỏi của Olivy, anh Munakata đã trả lời thế nào?」"
# 【宗方】
# display as 宗方
# JP: 「『お前の状態はお前が一番わかっているだろう』と。\nすると、『何でこの時期に検査なのか』と聞いてきた」
2242 = "「'Tình trạng của mày thì mày phải rõ nhất chứ'.\nRồi nó lại hỏi, 'Tại sao lại kiểm tra vào lúc này'.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1889 = "「Vâng.」"
# 【宗方】
# display as 宗方
# JP: 「[おひとよ,2]御一夜鉄道への譲渡の準備だと答えた。\nすると、アレは――」
2234 = "「Tôi trả lời là để chuẩn bị chuyển nhượng cho Đường sắt Ohito.\nThế là, nó――」"
# monologue
# JP: 仮面のような無表情を通す宗方さんの顔に、\nはっきりとした険が宿る。
3172 = "Trên khuôn mặt vô cảm như chiếc mặt nạ của anh Munakata,\nhiện lên vẻ gay gắt rõ rệt."
# 【宗方】
# display as 宗方
# JP: 「『それなら、一日でも早く御一夜で仕事をしたい』\nと――」
2094 = "「'Nếu vậy, tôi muốn làm việc ở Ohito sớm ngày nào hay ngày đó'\nnó bảo thế――」"
# monologue
# JP: 宗方さんが沈黙する。\n下唇が、わずかに噛まれる。
3173 = "Anh Munakata im lặng.\nMôi dưới khẽ cắn lại."
# monologue
# JP: 続く言葉をしばらく待つ。\nが――沈黙が重くなるだけだ。
3030 = "Tôi đợi anh nói tiếp một lúc.\nNhưng――chỉ có sự im lặng thêm nặng nề."
# 【双鉄】
# display as 雙鐵
# JP: 「……そうだったのですね」
1454 = "「……Ra là vậy.」"
# monologue
# JP: あとでハチロクに答え合わせを頼まねばならんが――\n他者の心の機微に疎い僕でも、ここまで聞けば想像がつく。
2789 = "Lát nữa phải nhờ Hachiroku đối chiếu lại mới được――\nnhưng dù là một kẻ không nhạy bén với tâm lý người khác như tôi, nghe đến đây cũng có thể tưởng tượng ra."
# monologue
# JP: つまるところオリヴィは、\n『自分がみかん鉄道に捨てられた』と感じたのだ。
2733 = "Tóm lại là Olivy\nđã cảm thấy 'Mình bị Đường sắt Mikan vứt bỏ'."
# 【宗方】
# display as 宗方
# JP: 「上と相談し、そのことを御社にも報告した。すると、\n御社社長も『そういうことなら是非に』と乗り気で」
2223 = "「Tôi đã thảo luận với cấp trên, và báo cáo việc đó cho công ty cậu. Sau đó,\ngiám đốc công ty cậu cũng rất hào hứng 'Nếu vậy thì nhất định phải làm'.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1995 = "「啊——」" 
# monologue
# JP: ポーレットの、社長でも市長でもない、素の顔が。\n鉄道マニアの一面が、悪い形で出てしまった。
3199 = "Con người thật của Paulette, không phải với tư cách giám đốc hay thị trưởng.\nMà là khía cạnh của một người đam mê đường sắt, đã bộc lộ ra theo cách tồi tệ."
# monologue
# JP: 社長として冷静に判断をできていたのなら、\nまずは丁寧な事情聴取をするべきだったのだろう。
2910 = "Nếu có thể bình tĩnh phán đoán với tư cách là một giám đốc,\nthì trước tiên đáng lẽ phải cẩn thận lắng nghe tình hình mới đúng."
# monologue
# JP: （とはいえ僕も同罪だ。待望の新列車、新\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に\n――僕も、我知らず舞い上がってしまっていたのか）
3249 = "(Tuy nói vậy nhưng tôi cũng đồng lõa. Trước chuyến tàu mới, \\x%lレイルロオド;#00ffc040;Railord%l;#; mới được mong đợi\n――tôi cũng đã vô thức mà vui mừng quá đỗi sao)"
# 【宗方】
# display as 宗方
# JP: 「先方と当事者が乗り気なら、こちらは従うだけだ。\nだから、そのようにオリヴィに命令をした」
2271 = "「Nếu bên nhận và đương sự đều hào hứng, thì bên này chỉ việc làm theo thôi.\nVì vậy, tôi đã ra lệnh cho Olivy như thế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道で働くように――ですか」
2182 = "「Là đi làm việc ở Đường sắt Ohito――sao?」"
# 【宗方】
# display as 宗方
# JP: 「ああ。全て合意の上、確認をとっての行動だ。\n今更クレームを持ち込まれても――正直困る」
2116 = "「Đúng vậy. Tất cả đều là hành động sau khi đã xác nhận và được sự đồng ý.\nGiờ mới mang khiếu nại đến――thú thật là tôi rất khó xử.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこは了解しています。契約を白紙化したい、とか、\nそうしたお話では一切ありません」
2240 = "「Điểm đó thì tôi hiểu. Hoàn toàn không có chuyện\nmuốn hủy bỏ hợp đồng hay gì đâu.」"
# 【宗方】
# display as 宗方
# JP: 「そうか」
2488 = "「Vậy sao.」"
# monologue
# JP: 宗方さんが息を吐く。\n顔の厳しさがいささか薄れる。
2953 = "Anh Munakata thở phào.\nVẻ nghiêm nghị trên khuôn mặt vơi đi phần nào."
# 【宗方】
# display as 宗方
# JP: 「[じゅつせん,1]術仙車両工場だったか？\nあれも稼働しているのだよな」
2458 = "「Là Nhà máy chế tạo toa xe Jutsusen phải không?\nChỗ đó cũng đang hoạt động nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、おかげさまですでに稼働しています。\n大九洲ＳＬ構想の、ひとつの中核となるはずです」
2293 = "「Vâng, nhờ ơn mọi người mà nó đã đi vào hoạt động rồi.\nChắc chắn nó sẽ trở thành một trong những nòng cốt của dự án SL Đại Kyushu.」"
# 【宗方】
# display as 宗方
# JP: 「御一夜には[とろ,1]登呂[もとぎかん,2]元技官もいるのだろう？\nなら、Ⅸ号にもアレにも、そちらの方が好環境だ」
2495 = "「Ở Ohito cũng có cựu kỹ quan Toro phải không?\nVậy thì, môi trường bên đó tốt hơn cho cả Đầu máy số 9 và nó đấy.」"
# monologue
# JP: 登呂元技官――つまりは、登呂流湯のご主人か。
3056 = "Cựu kỹ quan Toro――nói cách khác, là ông chủ của Tororyu-yu sao."
# monologue
# JP: やはりあの方は、\n他社様にも知られているくらいの技術者なのか。
3063 = "Quả nhiên người đó\nlà một kỹ sư được cả công ty khác biết đến sao."
# 【ハチロク】
# display as 八六
# JP: 「……ご心配をくださっておられるのですね。\nⅨ号機関車にも、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィにも」
1469 = "「……Anh đang lo lắng cho họ phải không ạ.\nCả Đầu máy số 9, lẫn \\x%lレイルロオド;#00ffc040;Railord%l;#; Olivy.」"
# monologue
# JP: するりと、ハチロクが会話にすべりこんでくる。
2803 = "Hachiroku trơn tru chen ngang vào cuộc trò chuyện."
# 【宗方】
# display as 宗方
# JP: 「長年使ってきた道具だ。愛着もある」
2398 = "「Là công cụ đã sử dụng nhiều năm mà. Cũng có chút gắn bó.」"
# monologue
# JP: 宗方さんは、今度は自然に答えてくれる。\nにじみ出てきたような言葉を、ハチロクもただ受け止める。
2941 = "Lần này, anh Munakata trả lời rất tự nhiên.\nNhững lời nói như bộc phát từ đáy lòng, Hachiroku cũng chỉ biết tiếp nhận."
# 【宗方】
# display as 宗方
# JP: 「譲渡のおかげで、アレもオレも本線に復帰できる。\nいいことばかりだ――使いこなしてもらえるなら、な」
2065 = "「Nhờ có việc chuyển nhượng, cả nó và tôi đều có thể quay lại tuyến chính.\nToàn là chuyện tốt――nếu như các cậu có thể sử dụng nó một cách thành thạo.」"
# 【双鉄】
# display as 雙鐵
# JP: 「こちらとしても、もちろんそうするつもりです。\n今回お話をお伺いしにきたのは、そのためです」
2211 = "「Về phía chúng tôi, tất nhiên cũng định làm như vậy.\nĐó là lý do chúng tôi đến đây hỏi chuyện lần này.」"
# 【宗方】
# display as 宗方
# JP: 「そうか」
2497 = "「Vậy sao.」"
# monologue
# JP: 宗方さんが、僕を見る。\nぼり、と、その指が頬を掻く。
2948 = "Anh Munakata nhìn tôi.\nNgón tay anh khẽ gãi má."
# 【宗方】
# display as 宗方
# JP: 「じゃじゃ馬な面もあるが、素直な機械だ。\n形式は確かに古いが、学習意欲も高い」
2097 = "「Dù có phần ương bướng, nhưng là một cỗ máy ngoan ngoãn.\nMẫu mã tuy đã cũ, nhưng tinh thần học hỏi rất cao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 2016 = "「嗯」" 
# monologue
# JP: Ⅸ号ではなく、オリヴィのことだ。
2758 = "Không phải Đầu máy số 9, mà là Olivy."
# monologue
# JP: 僕のとなりで、とても小さく――\nハチロクが、ほっとしたような息を吐く。
2883 = "Bên cạnh tôi, rất khẽ――\nHachiroku thở hắt ra như trút được gánh nặng."
# 【宗方】
# display as 宗方
# JP: 「まだ何年か――運がよければ、この先も走れるだろう。\n本線で――使える限りは、できるだけ使ってやってほしい」
2475 = "「Vài năm nữa――nếu may mắn, nó vẫn có thể chạy tiếp.\nTrên tuyến chính――chừng nào còn dùng được, mong các cậu hãy tận dụng tối đa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのつもりです」
2210 = "「Tôi cũng định như vậy.」"
# monologue
# JP: ……\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を物と扱う。\nそのことへの違和感が、薄らいでいく。
1407 = "……Coi \\x%lレイルロオド;#00ffc040;Railord%l;#; là đồ vật.\nCảm giác sai lệch về điều đó, đang dần phai nhạt."
# monologue
# JP: 同時に、少しだけわかったような気持ちになれる。\nオリヴィが、みかん鉄道を愛する理由を。
3143 = "Đồng thời, tôi có cảm giác như mình đã hiểu ra đôi chút.\nLý do Olivy yêu Đường sắt Mikan."
# monologue
# JP: （物として――宗方さんは、みかん鉄道は、\nⅨ号とオリヴィを、大事に大事に扱ってきたのだ）
3240 = "(Dù coi là đồ vật――anh Munakata, Đường sắt Mikan,\nđã luôn đối xử vô cùng trân trọng với Đầu máy số 9 và Olivy)"
# monologue
# JP: そうでなければ、１００年以上経過した今も\n現役で走れるわけがない。
2724 = "Nếu không thì, sao bây giờ, sau hơn 100 năm,\nnó vẫn có thể chạy ngon lành như vậy được."
# monologue
# JP: 文化の違いから来る違和感に惑わされ、そんな単純な\n事実を失念しかけた自分が、恥ずかしくなる。
2992 = "Bị cảm giác sai lệch từ sự khác biệt văn hóa làm cho bối rối, tôi suýt quên mất\nmột sự thật đơn giản như vậy, thật đáng xấu hổ."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィが、本線で活躍をはじめたら、\n必ずご連絡を差し上げます」
2429 = "「Khi nào Olivy bắt đầu hoạt động trên tuyến chính,\nchúng tôi nhất định sẽ liên lạc với anh.」"
# monologue
# JP: だから、出て来る。\n誘いの言葉が、とても自然に。
2738 = "Vì vậy, những lời mời mọc\nmới tuôn ra thật tự nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「もしよろしければその時には、一度ご乗車に来て下さい。\nオリヴィも――きっと、喜ぶかと思いますので」
2091 = "「Nếu được, khi đó xin anh hãy đến đi thử một chuyến.\nOlivy――chắc chắn cũng sẽ rất vui đấy.」"
