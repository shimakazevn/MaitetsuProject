[script]
# lines: 463 
# 【双鉄】
# display as 雙鐵
# JP: 「初めての[おこば,1]小畑越えが、まさかこんな形になるとはな」
2190 = "「想不到我們竟是以這樣的方式第一次越過大畑」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんのためですもの――」
2400 = "「畢竟是為了奧莉薇——」" 

# monologue
# JP: 言って、ハチロクが車内を見まわす。
2834 = "八六邊說邊環視了一圈車廂內。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしのささやかな夢くらい、\n喜んで引き換えにいたします」
2383 = "「為此，犧牲我的些微心願不足為惜」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
2391 = "「犧牲？」" 

# monologue
# JP: 僕もしっかり覚えている。
2999 = "我也記得非常清楚。" 

# monologue
# JP: 初めての小畑越えは、僕とふたりで、8620の運転台で。\nそれが、ハチロクの望みであったが――
2797 = "八六原本是希望，我們兩個一同駕駛８６２０完成對大畑的第一次翻越——" 

# 【双鉄】
# display as 雙鐵
# JP: 「引き換えずとも……\nナビに飛んでもらえばそれで済んだだけの話では？」
1885 = "「其實也用不著犧牲吧……坐Ｎａｖｉ飛過去不就可以了？」" 

# 【ハチロク】
# display as 八六
# JP: 「あらあら」
1968 = "「哎呀，您這話可就」" 

# monologue
# JP: あきれたような顔をして、ハチロクはクスクス笑い出す。
2838 = "八六面露頗為無奈的神色，笑出聲來。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしのだんな様は、\n相変わらず乙女心を解さない方でございますのね？」
2413 = "「看來我的夫君，依舊是全然不知少女心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1971 = "「哦」" 

# monologue
# JP: だんな様と言われてわかった。\n妻との旅と考えるなら――なるほど僕は、野暮天だ。
3140 = "聽到夫君這個稱呼我才轉過彎來，此行應該當成是夫婦二人的一次旅行。著實是我愚鈍了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ナビをつかえば、旅というほどの時間もかからん。\nそれでは、あまりにもったいないか」
2257 = "「換成坐Ｎａｖｉ過去一眨眼就到了，那就無法慢慢享受旅行了。如此想來那才真是浪費了一個大好機會」" 

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ、左様ですね」
2044 = "「嘻嘻，您所言極是」" 

# monologue
# JP: うれしげにすず――いや、列車内もやはり公共の場だ。\n踏み外さぬよう、あえて自分にカギをかけよう。
3215 = "鈴顯得很開心——不過，車廂內依然屬於公共場合，我必須嚴於律己，將她視為八六。" 

# monologue
# JP: うれしげにハチロクは微笑んで、\n僕の肩に一瞬だけの頬ずりをする。
2827 = "八六莞爾一笑，以臉頰輕輕蹭了一下我的肩膀。" 

# 【ハチロク】
# display as 八六
# JP: 「譲渡前のオリヴィちゃんの様子をお伺いするための、\nみかん鉄道様への聞き取り調査」
2348 = "「此行前去橙鐵路查訪，目的在於打探奧莉薇過去的經歷」" 

# 【双鉄】
# display as 雙鐵
# JP: 「同時に、Ⅸ号機関車の湯医線本線試運転のために、\nいくつかの点も確認してくる」
1922 = "「另外讓九號機車進行湯醫線幹線試運營前，也需要先向對方明確幾個問題」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。ほんの数点だけですが――\nただ一点も、決して疎かにはできません」
2347 = "「正是，雖然問題不多——但萬不可有絲毫疏漏」" 

# monologue
# JP: Ⅸ号はもう、全般検修に入っている。
2732 = "九號目前已經進入全面檢修階段。" 

# monologue
# JP: その中で技師さんたちから出てきた疑問を、\nハチロクと僕は預かっている。
3136 = "而我和八六前往徵求回答的，正是檢修期間技工們提出的種種疑問。" 

# 【ハチロク】
# display as 八六
# JP: 「なんといっても、蒸機は生き物でございますから」
2402 = "「畢竟蒸汽機車與生物無異」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2370 = "「沒錯」" 

# monologue
# JP: ……蒸機は生き物。定型句のように語られる言葉であるが、\nこれはまさしく、真実だ。
1412 = "……蒸汽機車與生物無異，雖然聽起來像是掛在嘴邊的標語，但卻是不折不扣的大實話。" 

# monologue
# JP: 軽々に部品を外してしまったのなら、長年の摩耗や歪みの\n影響で、二度と同じくつけられなくなることさえもある。
2711 = "一旦輕率地將零件取下，由於零件整體長年累積的損耗與變形，重新安裝時甚至可能無法再恢復原樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「長年\x%l入換;#00ffc040;入換%l;#;でしか走――いや、動いていなかったⅨ号が、\n御一夜までの長旅を経験したのだ」
2061 = "「多年以來只為\\x%l入換;#00ffc040;調車%l;#;而行駛——不，應該說是只被用於\\x%l入換;#00ffc040;調車%l;#;的九號，剛剛又經歷了來到御一夜的長途旅程」" 

# 【ハチロク】
# display as 八六
# JP: 「それだけでも、大きな負荷がかかっております。\n本線に出す前の、再度の慎重な検修は、必要です」
2013 = "「單是此行就會對其帶來很大負擔。所以在開始幹線運營之前，需要再一次進行細緻入微的檢修」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ポーレットの判断を、僕も支持する」
2029 = "「嗯，我也贊成波萊特的判斷」" 

# monologue
# JP: とはいえ、元忠氏にせっつかれている状況でもある。
2859 = "可是目前元忠先生也很著急。" 

# monologue
# JP: 可及的速やかに、Ⅸ号には湯医線を走ってもらい、\n僕らと8620は、この線路の上を走りたいものだ。
2750 = "他希望九號能儘快在湯醫線投入運營，這樣才能騰出我們和８２６０去負責目前身處的這條線路。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……御一夜鉄道職員としての、出張扱いでもある。\n時間は、極力有意義に使い倒さねばならんな」
1477 = "「……這次也算是作為御一夜鐵路員工的一次出差。難得的機會當然要儘可能善加利用」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしも、おなじ思いでございます。\nこの線路を走るのならば、視察も同時に行えますから」
2200 = "「我也持相同意見。既然經行這條線路，順便進行實地考察自是理所當然」" 

# monologue
# JP: ハチロクの目が、窓の外へと向けられる。\n丁度、小畑に入線だ。
2819 = "八六的視線移向窗外——剛好要進大畑站了。" 

# monologue
# JP: 下りる乗客も、乗る乗客も全くいない。\nけれども、この駅が存続している理由は、これから――！
3150 = "要說這個車站明明沒有乘客出入卻為何能存續至今，其中緣由即將被揭曉——！" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお、逆進を始めたな」
2050 = "「噢，開始倒車了」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。ここからが\x%lスイッチバック;#00ffc040;スイッチバック%l;#;。\n\x%lループ線;#00ffc040;ルウプ線%l;#;へと進んでいくための前準備です」
2307 = "「是的，現在即將進入\\x%lスイッチバック;#00ffc040;折返線%l;#;，是為了登上\\x%lループ線;#00ffc040;展線%l;#;而提前做的準備」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lスイッチバック;#00ffc040;スイッチバック%l;#;の上に\x%lループ線;#00ffc040;ループ線%l;#;。\n本当に厳しい山岳路線なのだな」
2322 = "「有\\x%lスイッチバック;#00ffc040;折返線%l;#;不說再加上\\x%lループ線;#00ffc040;展線%l;#;，這條山區線路是有夠險峻的」" 

# monologue
# JP: 言う間に、機関車は逆進を終え――
3175 = "說話間，機車已經停止倒車——" 

# monologue
# JP: （ぐんっ）
3251 = "（轟鳴聲）" 

# monologue
# JP: 今度は前進。
2842 = "再次向前行駛。" 

# monologue
# JP: \x%lポイント;#00ffc040;ポイント%l;#;は当然切り替わり、進入してきた駅側ではなく、\n別経路――\x%lループ線;#00ffc040;ループ線%l;#;側へと僕らの列車を誘導する。
69 = "\\x%lポイント;#00ffc040;轉轍器%l;#;自然已經完成軌道切換，將我們所在的列車從剛剛由車站進入的方向，引導至另一條線路——也就是\\x%lループ線;#00ffc040;展線%l;#;的方向。" 

# 【ハチロク】
# display as 八六
# JP: 「行って、戻って、また行って。そのあとぐるうりと\nルウプして、その度、少しずつ高さを稼いでいくのです」
1899 = "「前進，折返，再前進，而後在展線上迂迴，就這樣穩紮穩打地一點點提升高度」" 

# monologue
# JP: ハチロクの手が、空中に図を描き出す。
2795 = "八六伸手在空中比劃著線路的結構。" 

# monologue
# JP: 配線も概念も、すでに理解できているつもりだが、\n仕草の可愛いらしさにしばし、目を楽しませる。
3227 = "雖然我覺得自己對配線和概念都已爛熟於心，但她的舉止著實可愛，格外養眼。" 

# 【ハチロク】
# display as 八六
# JP: 「ですから、山越えはのんびりになってしまいます。\nその分、わたくしは双鉄さまと甘い時間を――」
2251 = "「所以翻山的過程是很緩慢的，於是我們就可以趁此享受甜蜜的時光——」" 

# monologue
# JP: 言って、ぽぽっとハチロクの頬が赤くなる。
2829 = "八六說罷，一絲紅暈飄上了臉頰。" 

# 【ハチロク】
# display as 八六
# JP: 「こほん」
1953 = "「咳咳」" 

# monologue
# JP: 咳払い。とても律儀だ。愛くるしい。
2902 = "她清了清嗓子，這自律的舉動一樣惹人憐愛。" 

# monologue
# JP: いいこだ、と、\n抱きしめて頬ずりしたい衝動を、列車内ゆえ何とか鎮める。
3107 = "真想一把抱過去磨蹭她的臉頰，好好誇獎她一番——然而在車廂裡我也只能努力控制住自己。" 

# 【ハチロク】
# display as 八六
# JP: 「――その分、丁寧に視察を果たせるわけです。\nこの先、わたくしたちが乗務する路線なのですから」
1434 = "「——所以我們可以趁此機會進行細緻考察，以後這條線就會是我們要負責乘務任務的線路了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。丁寧に見ることは、とても大事だ」
1829 = "「也是，細緻觀察是很重要的」" 

# monologue
# JP: 夫婦として、６年の日々を共に過ごして。\nそれでもなお、ハチロクは新しい顔を見せてくれる。
3006 = "我們結為夫婦，迄今已度過了６年的時光。然而八六依然會不時向我展現她不為我所知的一面。" 

# monologue
# JP: 細かな一挙手一投足で、ごくごくささいな一言で、\n新しい喜びを与えてくれる。
2917 = "字裡行間儘管微不足道，舉手投足雖在細節之處，卻次次都能帶給我全新的喜悅。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし……せっかくの視察だ。贅沢をいえば、\nもう少し良い\x%l客車;#00ffc040;客車%l;#;に乗りたかったかとも感じる」
1934 = "「可是這難得的考察機會……說實話如果可以提要求的話，我還是想坐更高級一點的\\x%l客車;#00ffc040;客運車廂%l;#;」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。さらに贅沢を申しますなら、わたくしも、牽引は\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;でとも、望みたいところでございます」
2311 = "「是的，若能再進一步的話，我還希望是由\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;來進行牽引」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[ディーエル,1]ＤＬ牽引で、ロングシートの\x%l客車;#00ffc040;客車%l;#;だものなぁ」
2336 = "「機車是柴油機車不說，我們這\\x%l客車;#00ffc040;客運車廂%l;#;還是用的豎排座位」" 

# monologue
# JP: ロングシートも、帝都を思い出して嫌いではない。\nが、御一夜から小畑を越えて早戸へと――
3226 = "雖然對於豎排座位，抑或由此勾起的在帝都時的回憶，我都並不牴觸，但是從御一夜出發越過大畑前往隼人——" 

# monologue
# JP: 風光明媚と名高い山越えの、二時間以上の乗車となると、\nさすがになんでロングシートかとは感じてしまう。
2886 = "在這以風景秀麗著稱的山區線路中，一段耗時超過兩個小時的旅途，乘坐的卻是豎排座位車廂，不得不說著實有些煞風景。" 

# 【ハチロク】
# display as 八六
# JP: 「とはいえ、[たいよ,1]貸与路線を走る貸与の機関車・\x%l客車;#00ffc040;客車%l;#;ですから。\nそこはやはり、過剰投資はできないものかと」
1940 = "「可畢竟不論線路還是在其上行駛的機車與\\x%l客車;#00ffc040;客運車廂%l;#;都是租借的，在這裡還是無法投入太多資金」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、それはそうだよな。\nというか――この\x%l客車;#00ffc040;客車%l;#;と機関車は確か」
1852 = "「你這話也的確在理。話說——我記得這\\x%l客車;#00ffc040;客運車廂%l;#;和機車應該是」" 

# 【ハチロク】
# display as 八六
# JP: 「普段はしまてつ――[しまばら,1]縞原鉄道で活躍するまいてつ様の\n車両と聞いております。\x%l機関士;#00ffc040;機関士%l;#;がきっと、その[かた]方かと」
2243 = "「我聽說是屬於之前在島鐵——也就是島原鐵路那邊工作的一位掌車人的。想來\\x%l機関士;#00ffc040;司機%l;#;應該就是那位掌車人本人了吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[しまばら,1]縞原か。随分と遠いな。\nさぞ、輸送にはご苦労を――」
2138 = "「島原那邊的啊，離我們這還挺遠的。運輸過來怕是也頗費了一番周折——」" 

# monologue
# JP: そこまでいって、思い出す。
3169 = "話說到一半我突然想起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああいや、そうか、縞原－隈元間は、海路か」
2000 = "「啊不對，說來島原到隈元之間應該是走的海路」" 

# 【ハチロク】
# display as 八六
# JP: 「なのでしょうか？\nわたくし、そこまでは詳しくお伺いしておりませんが」
2314 = "「是這樣嗎？我倒沒有了解到那麼細」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、他社様の話だしな。\nが、移送コストを考えれば、当然海路一択に――ああ」
2399 = "「畢竟是其他公司負責的線路。不過考慮到運輸成本，海上運輸肯定是最佳選擇——噢」" 

# monologue
# JP: 九洲在住とはいえど、\nハチロクはあまり、湯医線の外に出ることはない。
2837 = "八六雖然是住在九州，卻很少到湯醫線之外的區域走動。" 

# monologue
# JP: あるいは土地勘が無いのかも、と、\nメモに簡単な九洲地図を書いてやる。
2736 = "也有可能是因為她本就不怎麼熟悉這個地區，於是我在紙上畫出九州的大致地圖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「縞原から隈元は、陸路では[ながさき,1]永崎、[さが,1]左賀とぐるり大回りを\n余儀なくされるが、海路だと――ほら」
2163 = "「從島原到隈元如果走陸路，就必須途徑長崎、佐賀，要繞一大段彎路，但是換成海上運輸的話——你看」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　これほどの短い距離で、一直線に。\n文字通りのショオトカットになるのですね」
2011 = "「喔！居然能縮至這麼短的直線距離，可謂名副其實的抄近路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。縞原港も隈元港も大きな港だ。\n機関車と\x%l客車;#00ffc040;客車%l;#;の移送に、問題はなかろう」
2027 = "「嗯，島原和隈元也都算是比較大的港口，運送機車和\\x%l客車;#00ffc040;客運車廂%l;#;也都不成問題」" 

# monologue
# JP: 隈元にまで列車を連れてこれたなら、\n八ツ城までをトレーラー陸送すればすむ。
2855 = "只要能把列車運送至隈元，後面到八代就可以採用拖車運輸。" 

# monologue
# JP: まぁ、その区間がトレーラーとなってしまう――\n未だ復線叶わぬことには、隔靴掻痒の感も覚えるが。
3171 = "說來這段廢線直至目前都未能恢復而不得不仰仗拖車，也著實令我感到些許的焦躁。" 

# 【ハチロク】
# display as 八六
# JP: 「海路――おふね」
2377 = "「海上運輸——坐船」" 

# monologue
# JP: ハチロクがふわりと目を閉じる。\n夢見るように、体を僕にもたれさせる。
2807 = "八六忽然閉上眼睛。她就像在遙想什麼一般，依偎在我身上。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまは、お船に乗られたことがありますか？」
2526 = "「雙鐵少爺，您搭乘過船舶嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ある。というか、今話題に出た航路。\n隈元－縞原間のフェリーに乗った」
2032 = "「嗯，我坐過。好比剛剛提到的航路，隈元到島原間的渡船我就坐過」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1972 = "「哦哦」" 

# monologue
# JP: ハチロクの目がぱちりと開く。\nけれども体は、僕に甘えて寄りかかったままだ。
2822 = "八六睜大了眼睛，但她依然撒嬌似地靠在我身上。" 

# 【ハチロク】
# display as 八六
# JP: 「おいくつくらいのときですか？　いったい、どなたと」
2263 = "「敢問那是在您多大的時候呢，還有是和誰在一起？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「右田に引き取られてしばらく経って。だが、あのときは\n――うぅむ、日々姫はいなかったような気がする」
2403 = "「當時我被右田家收養已有一段時日了，不過那時——唔，記得日日姬是不在」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、何故でしょう」
1990 = "「哦，那是為何？」" 

# monologue
# JP: 興味津々のまなざしに、記憶のモヤが晴らされていく。
2892 = "她好奇的目光令我腦海中模糊的記憶一點點浮現出來。" 

# monologue
# JP: ああ――なんとなくだが覚えている。\nあの頃の僕にとっても、よほど印象的だったのだろう。
2882 = "嗯——我大體還是有些印象。看來那對當時的我而言也是印象非常深刻的一次經歷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確か――発熱だったと思う。日々姫が大泣きをして\n……そうだ、『ならば、僕も残ろう』と、申し出たな」
2459 = "「記得那時——她應該是在發燒，還嚎啕大哭……對了，我還提出要一起留下來陪她」" 

# 【ハチロク】
# display as 八六
# JP: 「ご家族でのご旅行だったのですか？」
2284 = "「是一家人出去旅行嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「多分な。\n多分――[たいと,1]汰斗さんはそのつもりだったのだろうと思う」
2197 = "「應該吧。我想——汰斗老爺應該是準備去旅行的」" 

# monologue
# JP: 残念だが、やはり詳細には思い出せない。\n断片的なエピソードだけが、ぽつぽつ浮かんで来るだけだ。
3204 = "遺憾的是有些細節我依然回想不起來。只有斷斷續續的片段接二連三浮現在在腦海之中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『いや、双鉄はついてこい』と汰斗さんに言われて。\n無論、命令には従うから、日々姫はますます泣いて」
2366 = "「汰斗老爺不答應，要我和他們一起去。當然我只好遵從命令，於是日日姬就哭得更厲害了」" 

# 【ハチロク】
# display as 八六
# JP: 「あぁ、おかわいそうに」
1970 = "「哎呀，著實可憐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉とふたりでなぐさめて。\nびいどろとカステラをお土産にすると指切りを――」
2214 = "「我只好和真闇姐一起安撫她，還打勾勾約好給她帶玻璃工藝品和長崎蛋糕回來——」" 

# 【ハチロク】
# display as 八六
# JP: 「……双鉄さま？」
1458 = "「……双鉄少爺？」" 

# monologue
# JP: 思い出す。\n完全に忘れてしまっていたことを。
3010 = "我又想起了一件事，直到前一刻我還將其忘得一乾二淨。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだった。\nもうひとつした約束は、いまだに果たせぬままにいる」
2111 = "「對了，除此之外還有一條迄今都尚未兌現」" 

# 【ハチロク】
# display as 八六
# JP: 「もうひとつ、でございますか？」
2491 = "「還有一條？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『熱が引いたら日々姫をフェリーに乗せてやる』、と。\n……さすがに日々姫も、もう忘れていることとは思うが」
2212 = "「我們約好了，等日日姬燒退了就帶她坐渡船……大概就連日日姬也都把這事給忘了吧」" 

# monologue
# JP: 言えば小さく、\nハチロクはどこか不満そうに首を傾げる。
2823 = "八六聽我這麼一說，略顯不滿地將頭歪向了一邊。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまがお約束を果たされないだなんて――\nお船が、楽しくなかったのでございますか？」
2188 = "「您竟會有不兌現承諾的時候——莫非是在船上發生了什麼不愉快的事嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「う……ん」
1993 = "「唔……」" 

# monologue
# JP: 我ながら半端な返事だが、致し方ない。\nあの頃の僕には、楽しいも楽しくないも無かったのだから。
3037 = "我說得很模稜兩可，這也難怪。畢竟對那時的我而言，旅途無論愉不愉快都無所謂。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――ああ、真闇姉ははしゃいでいた。\nだから、楽しい船旅だったのだろう」
1801 = "「不是——噢噢，真闇姐那時很興奮。所以我們在船上應該過得很開心」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、真闇様がおはしゃぎに？\nそれはお珍しい――ああ、いえ」
1984 = "「哦，真闇小姐竟有那般開心？實屬少見——啊，不」" 

# monologue
# JP: ぺろりと小さな舌がのぞく。\n珍しくもいたずらな表情だ。
2799 = "八六吐了吐嬌小的舌頭，她這種想要使壞的表情也是難得一見。" 

# monologue
# JP: なんだ、聞いたハチロクもはしゃいでいるな、と、\nただそれだけで嬉しくなる。
3026 = "我由此意識到她在聽了我的講述之後也變得欣喜雀躍，不由得開心了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「そのころは、真闇様もお若かったのですものね」
2401 = "「畢竟當時真闇小姐也非常年輕」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや。今でも若いぞ。真闇姉は」
2490 = "「這麼說可不對，她現在也很年輕」" 

# 【ハチロク】
# display as 八六
# JP: 「ああああああっ！」
2001 = "「啊啊啊！」" 

# monologue
# JP: ハチロクの悲鳴に、\n車内のまばらな乗客が、驚きそろってこちらを見る。
2816 = "八六的尖叫聲，引起了車內為數不多的幾個乘客注意，他們都驚訝地看向了我們。" 

# monologue
# JP: が、ハチロクは気づかない。\nただただ必死に僕を見て、すがりつかんばかりの勢いだ。
3077 = "然而八六並沒有發覺周圍人的目光，她緊張地看向我，拚命想要解釋。" 

# 【ハチロク】
# display as 八六
# JP: 「そのころは、真闇様もおちいさかったと！\nわたくし、そう申したつもりだったのです、本当に」
2231 = "「我想表達的意思是！那時真闇小姐年紀也尚幼小！絕無他意」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん、大丈夫だ。\nそういうつもりではあろうと、僕にも容易に想像できた」
2023 = "「嗯，你別慌。我想想也知道你不是那個意思」" 

# monologue
# JP: あまりのハチロクの必死さに、\nからかおうなどとも思えない。
3104 = "看她那慌亂的模樣，調侃的念頭還沒冒出來就被我遠遠地趕走了。" 

# monologue
# JP: 周囲の視線も、\nどうしたことかと心配そうで、申し訳ない。
2874 = "周圍的視線也流露著幾分擔心，這令我甚是內疚。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。約束する。\n今のハチロクの失言を、僕は墓場までもっていく」
2367 = "「沒事的，我保證。關於你剛才的失言，我這輩子都會為你保守秘密」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――ありがとう――\nありがとうございます、双鉄さま」
1996 = "「啊——謝謝——謝謝您雙鐵少爺」" 

# monologue
# JP: ハチロクが安堵の長い息を吐けば、\n車内全体も、なんとはなしにホっとしたような空気になる。
2835 = "八六長長地舒了一口氣，而安心的氛圍也隨之在整個車廂瀰漫開來。" 

# monologue
# JP: ごくさりげなく、「お騒がせしました」と会釈をすれば、\nみなさりげなく、自分たちの時間に戻っていく。
3036 = "我若無其事地向其他乘客致歉說“不好意思打擾到大家了”，於是大家也都收回了注意力。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
2527 = "「雙鐵少爺？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんでもないさ」
1894 = "「別在意」" 

# monologue
# JP: あのハチロクが、周囲の空気に気づかなかった。\nそれほど必死だったのか――
2805 = "八六居然沒有察覺周遭的變化，她剛才竟有如此慌亂嗎——" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、ハチロクがそこまで真闇姉を恐れているとは、\n知らなかったぞ」
1809 = "「不過我還真不知道，你有那麼畏懼真闇姐」" 

# 【ハチロク】
# display as 八六
# JP: 「……真闇様ならずとも同じことです。人間の女性に、\nお年のことを迂闊にお話しするのは、[タブウ,1]禁忌かと」
1452 = "「……不是針對真闇小姐，對於人類女性，提及有關年齡的話題都應當萬分謹慎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。そういうものか」
1976 = "「哦，是這樣嗎」" 

# monologue
# JP: 言えば、こっくり深く頷く。\nなにかよほど――過去に痛い目をみたのかもしれん。
3142 = "聽我這麼一說，她用力地點了點頭，看來是過去吃過慘痛的教訓。" 

# 【ハチロク】
# display as 八六
# JP: 「それより、お聞かせくださいまし！」
1869 = "「先不提這個了，請您快接著講吧！」" 

# monologue
# JP: 話を変えたい。\nそんな気持ちを強く感じる切り換え方だ。
2898 = "她急忙岔開話題，顯然不願再多提及。" 

# 【ハチロク】
# display as 八六
# JP: 「そのときの真闇様は、\nどのようにおはしゃぎになられたのです？」
2511 = "「那真闇小姐當時非常興奮，又是因為什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が覚えているのは、カモメだ」
2246 = "「我能記得的就只有海鷗了」" 

# 【ハチロク】
# display as 八六
# JP: 「カモメ――と、申しますと」
2379 = "「海鷗——您的意思是」" 

# monologue
# JP: ハチロクの手が小さく羽ばたく。
2813 = "八六用手模仿了展翅飛翔的動作。" 

# 【ハチロク】
# display as 八六
# JP: 「海に棲まう鳥のこと。で、ございますよね？」
2130 = "「就是棲息於海邊的鳥類對嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだが――\nハチロクはカモメを見たことがないのか？」
1848 = "「你說的不錯——不過難不成你沒有見過海鷗？」" 

# 【ハチロク】
# display as 八六
# JP: 「目近に、あるいはじっくりと意識して、\nということなら、見たことがないかと存じます」
2086 = "「如果是問有沒有近距離接觸或者仔細觀察過，那我應當算沒有見過」" 

# monologue
# JP: かぼそい指が、その唇に当てられる、
2895 = "她將纖細的手指抵住嘴唇，繼續說道。" 

# 【ハチロク】
# display as 八六
# JP: 「ですが……ん……[ゆい,1]由衣のあたりを走り抜ける折り、\nあるいは遠目に見ていたかもしれません」
1925 = "「只不過……唔……我可能在駛經由比一帶時，遠遠地望見過」" 

# 【双鉄】
# display as 雙鐵
# JP: 「走り抜ける――ならば、乗務か」
2532 = "「駛經由比——就是執行乘務任務的時候嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「当然のことでございます。\nわたくしは、ただの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――ああ、いえ」
2506 = "「那是當然，我只是一介\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;——啊，不是」" 

# monologue
# JP: くっついたまま、ハチロクが僕を見上げる。\nただそれだけで、暖かになる。しあわせになる。
2810 = "八六抬頭望向我，卻並未坐直身體，已然依偎在我身上。只是這個簡單的動作就令我心頭一熱，感到無比幸福。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまとお会いできないでいましたころには――\nわたくしは、ただの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でしたから」
2396 = "「畢竟在與雙鐵少爺相識之前——我還只是一介\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1860 = "「倒也是」" 

# monologue
# JP: ただの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。\nただの物。
2705 = "一介\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。區區一件物品。" 

# monologue
# JP: であらば、線路の上をただ走るだけ――\n海辺に遊び、カモメに近づくようなこともない。
3206 = "那她便只能隨機車在線路上疾馳，斷無在海邊玩耍，與海鷗近距離接觸的機會。" 

# 【ハチロク】
# display as 八六
# JP: 「カモメは、わたくしの知識では、\nそれほど美しい鳥であるとは思えません」
1854 = "「依我的知識，海鷗並非具有美麗迷人的外表」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。フォルムが綺麗と言えば綺麗だが、\nそれをいったらほぼ全ての鳥にあてはまろう」
1831 = "「也沒錯，雖然身體形狀是很優美，但是單論這點幾乎所有的鳥類都是如此」" 

# 【ハチロク】
# display as 八六
# JP: 「それなのに何故。そのときの真闇様は、\nカモメで、それほどおはしゃぎに？」
2509 = "「那當時真闇小姐又為何能因海鷗，變得如此興奮？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1948 = "「呃」" 

# monologue
# JP: ならば、伝えてやらねばなるまい。\n線路の外にも、たくさんの素敵があることを。
3207 = "那我必須讓她明白，在狹長的線路之外，還有很多美妙的事物存在於這個世界。" 

# monologue
# JP: 生きながらにして死んでいた、あの頃の僕が覚えている程、\n楽しいことが、いくらでもあるのだということを。
2841 = "其中的樂趣與喜悅，即便是曾經活得如同行屍走肉一般的我，都對此留下了深刻印象。" 

# 【双鉄】
# display as 雙鐵
# JP: 「シバテンえびせん、というお菓子がある。\nその小袋を、一袋いくらで、船内の売店で買えるのだ」
2325 = "「有一種名叫芝天蝦味煎餅的零食，在船上的小賣鋪裡一小袋賣幾塊錢」" 

# 【ハチロク】
# display as 八六
# JP: 「ＴＶシイエムで流れているお菓子でございますね？\n確か――『とめられないたまらない』、でしたか」
2287 = "「是正在做電視廣告的零食吧，記得標語是——“美味可口欲罷不能”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう、それだ。そのシバテンえびせんを、\nカモメは大変な好物にしているらしくてな」
2117 = "「對，就是那個。據說海鷗特別愛吃」" 

# 【ハチロク】
