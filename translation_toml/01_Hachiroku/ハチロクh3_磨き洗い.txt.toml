# ハチロクh3_磨き洗い.txt 
[info]

[characters]
1321 = "Hachiroku"
1400 = "Soutetsu H"

[character_subs]
1675 = "Suzu"
1738 = "Soutetsu"

[script]
# lines: 327 
# 【ハチロク】
# display as 鈴
# JP: 「ごしごし、ごしごし」
1013 = "「Chà chà, kỳ cọ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぅ、む……」
1045 = "「Ư, ừm......」"
# monologue
# JP: 乗務の後の登呂流湯で、\nハチロク――すずに背中を流して貰う。
1423 = "Tại nhà tắm Tororyu-yu sau ca trực, tôi đang được Hachiroku——Suzu kỳ cọ lưng cho."
# monologue
# JP: いつもながらの生き返るようなひとときが、\nけれども今日は、いつもと違う。
1521 = "Vẫn là khoảnh khắc như được hồi sinh thường lệ, nhưng hôm nay lại khác với mọi ngày."
# 【ハチロク】
# display as 鈴
# JP: 「整備に手間取ってしまったおかげで、\nかえって得をしてしまいましたね」
1195 = "「Nhờ tốn thời gian bảo dưỡng, mà chúng ta lại được hưởng lợi thế này nhỉ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、\n登呂流湯のご主人にはご厚意をいただいてしまったな」
1031 = "「Ừ, Chúng ta đã nhận được sự ưu ái từ chủ nhân nhà tắm Tororyu-yu rồi」"
# monologue
# JP: 営業運転中に僕らが感じた、極めて微妙な異常振動。\nその原因は、動輪に張り付いていた黒い粘着テープだった。
1414 = "Rung động bất thường cực kỳ tinh vi mà chúng tôi cảm nhận được trong lúc vận hành thương mại. Nguyên nhân là do một dải băng dính đen dính vào bánh xe chủ động."
# monologue
# JP: だったのだが、あまりの単純さと視覚的な紛らわしさから、\nまさに盲点を突かれてしまい、発見に手間取らされたのだ。
1363 = "Tuy nhiên, chính vì sự đơn giản và dễ nhầm lẫn về mặt thị giác đó, mà nó đã đánh trúng điểm mù, khiến chúng tôi mất rất nhiều thời gian mới phát hiện ra."
# 【双鉄H】
# display as 雙鐵
# JP: 「二十三時を過ぎていたのに、\n風呂に入れてもらえるとはな」
1194 = "「Đã qua 23 giờ rồi, thế mà vẫn được cho vào tắm」"
# 【ハチロク】
# display as 鈴
# JP: 「ありがたいお話です」
1087 = "「Thật đáng biết ơn ạ」"
# monologue
# JP: 言いながら、すずは手桶を湯で満たし、\n飛び散らないよう気をつけながら、僕の体へと注ぐ。
1684 = "Vừa nói, Suzu vừa múc đầy gáo nước nóng, rồi cẩn thận dội lên người tôi để nước không bắn tung tóe."
# 【ハチロク】
# display as 鈴
# JP: 「とは申しましても、これほど大きなお風呂のお掃除、\nきっと大変なことでしょうけれど」
1160 = "「Mặc dù nói vậy, nhưng việc dọn dẹp một nhà tắm lớn thế này, chắc chắn sẽ rất vất vả đấy ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「まぁ、ぼちぼちとやればいいさ。\n時間無制限の、完全貸切風呂なのだから」
1099 = "「Thì, cứ từ từ mà làm thôi. Được bao trọn gói, lại không giới hạn thời gian cơ mà」"
# monologue
# JP: もう閉まっているだろうと半ば以上は覚悟しながら\nそれでも登呂流湯を訪ねた僕らに。
1536 = "Chúng tôi đến Tororyu-yu với hơn nửa tâm lý chuẩn bị sẵn là nhà tắm đã đóng cửa."
# monologue
# JP: ご主人は、『もう寝るけん。勝手に入って湯ば落として、\n掃除して帰ればそいでよか』と合鍵を預けて下さった。
1636 = "Chủ nhân nhà tắm bảo: 『Tôi đi ngủ đây. Cứ tự nhiên vào tắm, xả nước, rồi dọn dẹp xong thì về là được』, rồi giao chìa khóa dự phòng cho chúng tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「ピカピカに磨き上げて返そう。\nそれが、せめてもの恩返しだ」
1203 = "「Hãy cọ rửa thật sạch sẽ, sáng bóng rồi mới trả lại. Đó là cách báo ân tối thiểu nhất」"
# 【ハチロク】
# display as 鈴
# JP: 「左様ですね。双鉄様のお体のようにピカピカに、\n丁寧に磨き洗いをいたしましょう」
1132 = "「Đúng vậy ạ. Em sẽ cọ rửa cẩn thận, sạch sẽ sáng bóng, giống như cơ thể của ngài Soutetsu vậy」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ。だが、その前に」
1070 = "「Ừ. Nhưng, trước đó」"
# monologue
# JP: 椅子からたって、すずの両肩に手をあてる。
1545 = "Tôi đứng dậy khỏi ghế, đặt tay lên hai vai Suzu."
# monologue
# JP: そしてそのままくるり体勢を入れ替えて、\n僕の座ってた風呂椅子へと腰掛けさせる。
1606 = "Rồi cứ thế xoay người đổi chỗ, để em ngồi xuống chiếc ghế tắm tôi vừa ngồi."
# 【双鉄H】
# display as 雙鐵
# JP: 「すずの体を、ピカピカに洗ってやらねばな」
1096 = "「Anh cũng phải tắm rửa cho cơ thể Suzu thật sạch sẽ, sáng bóng mới được」"
# 【ハチロク】
# display as 鈴
# JP: 「あ――」
1020 = "「A——」"
# monologue
# JP: くすりと、すずが微笑する。
1695 = "Suzu khẽ mỉm cười."
# 【ハチロク】
# display as 鈴
# JP: 「その状態の双鉄様に体を洗っていただいたら、\n洗い場が、精液で汚れてしまいそうです」
1173 = "「Nếu để ngài Soutetsu trong tình trạng đó tắm cho em, thì khu vực tắm sẽ bị vấy bẩn bởi tinh dịch mất ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
1081 = "「Hửm?」"
# monologue
# JP: 言われて、気づく。
1439 = "Nghe em nói, tôi mới nhận ra."
# monologue
# JP: いつの間にか完全に勃起して――\nどころかヒクつき、先走りまで滲ませている。
1642 = "Không biết từ lúc nào tôi đã cương cứng hoàn toàn—— Thậm chí còn đang giật giật, rỉ cả dịch nhờn ra."
# 【双鉄H】
# display as 雙鐵
# JP: 「や……考えてみれば当然か。大好きな嫁に手洗いされて、\n勃起をしないわけがない」
1190 = "「À......nghĩ lại thì cũng đương nhiên thôi. Được người vợ yêu dấu đích thân tắm cho, thì làm sao mà không cương cứng được chứ」"
# 【ハチロク】
# display as 鈴
# JP: 「まぁ」
1082 = "「Ái chà」"
# monologue
# JP: すずは嬉しげな笑みをこぼして――
1681 = "Suzu nở nụ cười vui sướng——"
# monologue
# JP: （ちゅっ）
1814 = "（Chụt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1221 = "「!」"
# monologue
# JP: 勃起の先端。\n亀頭と呼ばれるらしいところに、キスしてくれる。
1641 = "Đỉnh của phần cương cứng. Nơi được gọi là quy đầu, em đặt lên đó một nụ hôn."
# 【ハチロク】
# display as 鈴
# JP: 「これほど熱いおちんちんです。大好きな嫁のわたくしの、\n体をこしこし、丁寧に洗ってくださってたら――」
1090 = "「Cậu bé nóng rực thế này cơ mà. Nếu ngài cọ rửa cẩn thận cho cơ thể của người vợ yêu dấu này——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「確かに、それだけで射精してしまいかねんな」
1164 = "「Quả thực, chỉ vậy thôi cũng đủ để anh xuất tinh rồi」"
# 【ハチロク】
# display as 鈴
# JP: 「ええ。ですので――」
1052 = "「Vâng. Vì vậy——」"
# monologue
# JP: 短い舌を精一杯に伸ばしてすずは、\n唇のまわりをねろりと、ゆっくり舐め回す。
1682 = "Suzu cố vươn hết cỡ chiếc lưỡi ngắn của mình, chậm rãi liếm láp một vòng quanh môi."
# 【ハチロク】
# display as 鈴
# JP: 「洗い場を汚さないよう、一度すっきり、\n射精をしていただいた方が、よろしいかと」
1155 = "「Để không làm bẩn khu vực tắm, em nghĩ ngài nên giải tỏa, xuất tinh một lần thì hơn ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや、しかし……\n射精をしたら汚してしまうのだろう？」
974 = "「Không, nhưng mà...... Xuất tinh thì sẽ làm bẩn mất đúng không?」"
# monologue
# JP: 無論、僕にもわかってる。\nすずのいやらしい舌の動きが、射精すべき場所を示した。
1557 = "Đương nhiên, tôi cũng hiểu rõ. Chuyển động lưỡi dâm đãng của Suzu đã chỉ ra nơi tôi nên xuất tinh."
# monologue
# JP: わかっていても、\nすずの口から、はっきり聞かせてもらいたい。
1361 = "Dù đã biết, nhưng tôi vẫn muốn nghe rõ ràng từ chính miệng Suzu."
# 【ハチロク】
# display as 鈴
# JP: 「はい。\nですから、わたくしのお口の一番奥に――」
1050 = "「Vâng. Vì vậy, hãy xuất vào sâu tận cùng trong miệng em——」"
# monologue
# JP: ああん、と、すずが大きく口を開いてみせる。
1678 = "Suzu há to miệng, phát ra tiếng \"A an\"."
# monologue
# JP: 赤くぬらつくその中には、\n小粒で白い歯たちが綺麗に整列してる。
1397 = "Bên trong khoang miệng đỏ hồng ẩm ướt, những chiếc răng trắng nhỏ nhắn xếp thành hàng ngay ngắn."
# 【ハチロク】
# display as 鈴
# JP: 「――双鉄様のおちんちんをお迎えして、\n精液を、一滴もこぼさず飲み干しますので」
787 = "「——Em sẽ đón nhận cậu bé của ngài Soutetsu, và uống cạn tinh dịch, không để rơi vãi một giọt nào」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、頼む」
1123 = "「Vậy thì, nhờ em」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。お任せください、双鉄様」
1055 = "「Vâng. Cứ giao cho em, thưa ngài Soutetsu」"
# monologue
# JP: （ちゅろぉぉぉっ）
1813 = "（Phụt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「なっ」
1028 = "「Gì」"
# monologue
# JP: 予想外の冷たい感触。\nボディソープが、僕の勃起の全体にとろとろかけられる。
1528 = "Một cảm giác lạnh lẽo bất ngờ. Sữa tắm dạng lỏng được đổ lên toàn bộ phần cương cứng của tôi."
# 【ハチロク】
# display as 鈴
# JP: 「わたくし、そのままの双鉄様のおちんちんの、\nむわっ、とした熱い匂いが大好きなのですけれど」
1217 = "「Tuy em rất thích mùi hương nóng bỏng, ngai ngái tỏa ra từ cậu bé của ngài Soutetsu」"
# monologue
# JP: （しにゅっ）
1838 = "（Nắm lấy）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1221 = "「！」" 
# monologue
# JP: すずの両手が、僕の勃起を泡立てていく。
1697 = "Hai bàn tay Suzu bắt đầu xoa bóp tạo bọt trên phần cương cứng của tôi."
# monologue
# JP: 両側から揉み込むようにして、\n亀頭の先から玉の裏まで、全部をあわあわにしてしまう。
1459 = "Xoa bóp từ hai bên, từ đỉnh quy đầu đến mặt sau hai hòn bi, tất cả đều ngập trong bọt."
# 【ハチロク】
# display as 鈴
# JP: 「さきほど一度洗ってしまったものですから。\n今宵ばかりは、徹底的な磨き洗いをいたしましょう」
1086 = "「Vì lúc nãy em đã lỡ rửa một lần rồi. Chỉ đêm nay thôi, hãy để em cọ rửa thật triệt để nhé」"
# monologue
# JP: （しゅこんっ）
1834 = "（Vuốt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁっ――」
# 1020 = "「啊——」" 
# monologue
# JP: 筒にした手が、しごいてくれる。\n普段と違うぬらつきに、お尻の穴がきゅっと締まる。
1474 = "Bàn tay cuộn thành hình ống, bắt đầu tuốt lấy. Sự trơn trượt khác với thường ngày khiến lỗ hậu môn tôi thắt lại."
# 【ハチロク】
# display as 鈴
# JP: 「あわあわ、しゅこしゅこ、あわ、しゅこしゅこっ」
1152 = "「Bọt này bọt này, vuốt vuốt, bọt này, vuốt vuốt」"
# monologue
# JP: リズムをとって、すずは僕をしごき続ける。
1680 = "Bắt đúng nhịp điệu, Suzu tiếp tục tuốt lấy tôi."
# monologue
# JP: 亀頭のくびれが、筒にした手からはみ出てしまう、\nそのギリギリまで手を引いて――
1385 = "Kéo tay xuống đến mức giới hạn, ngay trước khi phần khấc quy đầu trượt khỏi bàn tay hình ống——"
# 【ハチロク】
# display as 鈴
# JP: 「うふふっ」
1009 = "「Ư fufu」"
# monologue
# JP: （ずりゅんっ！）
1793 = "（Trượt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――ぉっ――」
784 = "「——o——」"
# monologue
# JP: 噛み締めても噛み締めても声がこぼれる。
1410 = "Dù có cắn chặt răng đến đâu, âm thanh vẫn bật ra."
# monologue
# JP: 泡で滑ってしまう分、手のひらの熱と摩擦が無い分、\n快感としては弱いのだけれど――
1645 = "Do trơn trượt vì bọt xà phòng, thiếu đi hơi ấm và ma sát từ lòng bàn tay, nên khoái cảm có phần yếu hơn——"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまのおちんちん、\nあわあわ、しゅこしゅこ、きれい、きれい」
1219 = "「Cậu bé của ngài Soutetsu, bọt này bọt này, vuốt vuốt, sạch sẽ, sạch sẽ」"
# monologue
# JP: 無邪気なような言葉と手つきと、\n純白にふわふわ浮く泡と。
1436 = "Lời nói và cử chỉ ngây thơ, cùng những bọt xà phòng trắng muốt bồng bềnh."
# monologue
# JP: （しゅこ！　しゅっ！　しにゅっ！　すりゅっ！）
1833 = "（Vuốt! Vuốt! Nắm! Trượt!）"
# monologue
# JP: その中でしごき立てられ、時折り覗く自分の勃起の\n醜いまでの赤黒さとの対比に興奮させられる。
1383 = "Bị tuốt lấy giữa những bọt xà phòng trắng muốt, thỉnh thoảng lại lộ ra phần cương cứng đỏ đen đến mức xấu xí của mình, sự tương phản đó khiến tôi hưng phấn."
# 【双鉄H】
# display as 雙鐵
# JP: （これほど可憐な手のひらが、\nこんなにも剥き出しの欲望を――）
1845 = "（Một bàn tay đáng yêu đến nhường này, lại đang nắm lấy dục vọng trần trụi thế này——）"
# monologue
# JP: 嬉しげに、懸命に奉仕してくれている。\n僕が、奉仕をさせている。
1496 = "Em đang vui vẻ, dốc sức phục vụ tôi. Tôi đang để em phục vụ mình."
# monologue
# JP: 独占欲と支配欲、達成感がぞくぞくと胸に沸き起こり、\nそれはすぐさま、精の高まりへと直結していく。
1613 = "Cảm giác độc chiếm, khao khát thống trị và cảm giác thành tựu râm ran trào dâng trong ngực, và ngay lập tức, chúng kết nối trực tiếp với sự hưng phấn của tinh dịch."
# 【双鉄H】
# display as 雙鐵
# JP: 「すず――このままだと――出て、しまう」
1205 = "「Suzu——cứ thế này——anh sẽ xuất, mất」"
# 【ハチロク】
# display as 鈴
# JP: 「あっ」
# 1028 = "「啊」" 
# monologue
# JP: 慌てたような声を出し、すずはぴたりと手を止める。
1461 = "Suzu thốt lên một tiếng hoảng hốt, rồi đột ngột dừng tay lại."
# monologue
# JP: そして手桶をまた湯で満たし、\nちょろちょろと細く垂らして、勃起の泡を流してく。
1449 = "Sau đó, em lại múc đầy gáo nước nóng, rót xuống thành dòng nhỏ, rửa trôi bọt xà phòng trên phần cương cứng."
# 【ハチロク】
# display as 鈴
# JP: 「すみずみまでを、ピカピカに」
1175 = "「Mọi ngóc ngách, đều phải sạch sẽ sáng bóng」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ」
1057 = "「Ưm」"
# monologue
# JP: 皮を摘まれ、その内側にまでゆるゆると湯を流し込まれる。
1395 = "Em kéo phần da bao quy đầu lên, rồi từ từ rót nước nóng vào tận bên trong."
# monologue
# JP: そうしてすずは自分の手を湯につけ濡らし、\nゆっくりゆっくり、僕の勃起を擦り洗いつつ検分していく。
1607 = "Xong xuôi, Suzu nhúng ướt tay mình vào nước nóng, rồi chầm chậm, chầm chậm vừa cọ rửa vừa kiểm tra phần cương cứng của tôi."
# 【ハチロク】
# display as 鈴
# JP: 「うん。上等の仕上がりです。双鉄様のおちんちん、\nぴかぴかの、きれいきれいになりました」
1054 = "「Vâng. Hoàn hảo rồi ạ. Cậu bé của ngài Soutetsu, đã trở nên sạch sẽ, sáng bóng rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか、ありがとう」
1137 = "「Vậy sao, cảm ơn em」"
# 【ハチロク】
# display as 鈴
# JP: 「ですので、今度は」
1117 = "「Vì vậy, tiếp theo」"
# monologue
# JP: ぺろ、と舌先が可愛く覗く。
1480 = "Đầu lưỡi em thè ra một cách đáng yêu."
# 【ハチロク】
# display as 鈴
# JP: 「おちんちんの中の方。\nすっきり綺麗にいたしましょうね？」
1179 = "「Phần bên trong cậu bé. Em sẽ làm sạch sẽ, sảng khoái nhé?」"
# monologue
# JP: （ぱくっ）
1806 = "（Ngoạm）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
783 = "「——」"
# monologue
# JP: 刺激が強すぎないように、\nすずは大きく口を開いて、ただ、くわえ込む。
1679 = "Để không gây kích thích quá mạnh, Suzu mở to miệng, chỉ đơn giản là ngậm lấy."
# 【ハチロク】
# display as 鈴
# JP: 「ん……」
# 1045 = "「嗯……」" 
# monologue
# JP: 動かない。舐めもすすりも吸い込みもしない。
1447 = "Em không cử động. Không liếm, không mút, cũng không hút."
# monologue
# JP: なのに僕の下腹に当たる、鼻からすひすひ漏れる排気は、\n一瞬ごとに熱と荒さとを増していく。
1609 = "Vậy mà hơi thở phì phò phả ra từ mũi em chạm vào bụng dưới của tôi, lại càng lúc càng nóng rực và dồn dập hơn qua từng giây."
# 【双鉄H】
# display as 雙鐵
# JP: （咥えてるだけでそれほどに？　いや――）
1789 = "（Chỉ ngậm thôi mà đã hưng phấn đến vậy sao? Không——）"
# monologue
# JP: すずの手が、股の間に潜ってる。
1690 = "Bàn tay Suzu đang luồn xuống giữa hai đùi em."
# monologue
# JP: 自分の指で自分のおまんまん……\nその肉の割れ目の間に、短い指を埋めている。
1471 = "Em dùng ngón tay tự chạm vào cô bé của mình...... Những ngón tay ngắn vùi sâu vào giữa khe hở da thịt ấy."
# 【ハチロク】
# display as 鈴
# JP: 「ふ……す……」
1010 = "「Phù......su......」"
# monologue
# JP: 口がふさがってるせいなのか、\n声を、意識して殺しているのか。
1407 = "Có lẽ vì miệng đang bận, hay do em cố tình kìm nén âm thanh."
# monologue
# JP: もれてくるのは、ただただ熱い排気だけ。\nそこにくちゅりと、湿った音がまじり始める。
1538 = "Thứ lọt ra ngoài chỉ là hơi thở nóng rực. Xen lẫn vào đó là những âm thanh lép nhép ẩm ướt bắt đầu vang lên."
# 【双鉄H】
# display as 雙鐵
# JP: （ああ……そこも気持ちいいのか）
1802 = "（À......chỗ đó cũng sung sướng sao）"
# monologue
# JP: すずの勉強の成果に慌て、僕も勉強をしてみたが――\nやはり実地は、本とは違う。
1560 = "Hoảng hốt trước thành quả học tập của Suzu, tôi cũng đã thử tự tìm hiểu xem sao—— Quả nhiên thực hành khác xa với sách vở."
# monologue
# JP: クリトリスでなく、膣穴でなく、ただの柔肉。\n膣前庭とよばれる部分を、すずは丹念になぞってる。
1339 = "Không phải âm vật, không phải lỗ âm đạo, mà chỉ là lớp thịt mềm. Suzu đang cẩn thận miết dọc theo bộ phận được gọi là tiền đình âm đạo."
# 【ハチロク】
# display as 鈴
# JP: 「ん……ふっ……んっ」
1046 = "「Ưm......phù......ưm」"
# monologue
# JP: 既に溢れてる蜜をすくって、\n指先で、それを伸ばしていくように――
1465 = "Vớt lấy lượng mật ngọt đã tràn ra, như thể đang dùng đầu ngón tay kéo dãn nó ra——"
# monologue
# JP: しにゅ、しにゅとすずの短い指は、\nおまんまんの割れ目にそって、上下動する。
1698 = "Những ngón tay ngắn của Suzu nhóp nhép, di chuyển lên xuống dọc theo khe hở của cô bé."
# 【ハチロク】
# display as 鈴
# JP: 「んっ――」
1040 = "「Ưm——」"
# monologue
# JP: 蜜にまみれた指を持ち上げ、\nすずは潤んだ瞳で僕を、じ、と見上げる。
1463 = "Nâng những ngón tay đẫm mật ngọt lên, Suzu ngước nhìn tôi bằng đôi mắt ướt át."
# 【双鉄H】
# display as 雙鐵
# JP: （ああ――）
1805 = "（A a——）"
# monologue
# JP: 伝わってくる……ような気がする。\nすずの思いが、欲望が。
1558 = "Tôi cảm nhận được......hình như là vậy. Tâm tư, và dục vọng của Suzu."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕も、お前と一緒に気持ちよくなりたい」
1110 = "「Anh cũng muốn, cùng em tận hưởng sự sung sướng này」"
# 【ハチロク】
# display as 鈴
# JP: 「ん！」
1068 = "「Ưm!」"
# monologue
# JP: 瞳が、ぱあっと明るく輝く。\nやはり、そうか。
1475 = "Đôi mắt em bừng sáng. Quả nhiên, là vậy sao."
# monologue
# JP: 僕と同時に、一番気持ちよい場所へ達するために、\nギリギリの僕には何もせず、すずは自分を高めているのだ。
1595 = "Để có thể cùng tôi đạt đến đỉnh điểm khoái cảm cùng một lúc, Suzu không làm gì với tôi đang ở sát giới hạn, mà tự nâng cao khoái cảm của bản thân."
# 【双鉄H】
# display as 雙鐵
# JP: 「見ている。お前を。\nだからそのまま、続けて気持よくなってくれ」
1108 = "「Anh đang nhìn em. Vì vậy, cứ tiếp tục làm mình sung sướng đi」"
# 【ハチロク】
# display as 鈴
# JP: 「ふぁひ、ほーへふはは」
1139 = "「Vâ ng, n gài Sou te tsu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んくっ――」
1067 = "「Ưm——」"
# monologue
# JP: 喋られるだけで、あやうく精が漏れそうになる。\nやはり、いくらかは鎮めておかねば――
1437 = "Chỉ cần em cất tiếng, tinh dịch đã chực trào ra. Quả nhiên, phải làm dịu đi phần nào mới được——"
# monologue
# JP: （くぱっ）
1840 = "（Tách ra）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1221 = "「！」" 
# monologue
# JP: 思うのに、すずが大きく、おまんまんを開き見せつける。\n洗い場の鏡が僕に、正面からの視界も与えてくれている。
1358 = "Dù nghĩ vậy, nhưng Suzu lại mở to cô bé ra phô bày trước mắt tôi. Tấm gương trong khu vực tắm còn cho tôi một góc nhìn trực diện."
# 【双鉄H】
# display as 雙鐵
# JP: （鏡越しに見ると……妙に、客観視できるものだな）
1848 = "（Nhìn qua gương thế này......kỳ lạ thay, lại có thể quan sát một cách khách quan）"
# monologue
# JP: すずのおまんまんはとても小さい。\nすず本人の全体も、驚くほどに小さく華奢だ。
1688 = "Cô bé của Suzu rất nhỏ nhắn. Toàn bộ cơ thể Suzu cũng nhỏ bé và mỏng manh đến kinh ngạc."
# monologue
# JP: 鏡の中の僕自身――完全に成熟した雄の体が、\n小さく可憐なすずに勃起を、咥えさせてる。
1705 = "Hình ảnh phản chiếu của chính tôi trong gương——cơ thể của một con đực trưởng thành hoàn toàn, dang bắt một Suzu nhỏ nhắn, đáng yêu ngậm lấy phần cương cứng của mình."
# monologue
# JP: （つぷっ）
1827 = "（Phập）"
# 【ハチロク】
# display as 鈴
# JP: 「んううっ～っ」
1066 = "「Ưm ưm～」"
# monologue
# JP: なのに、すずは喜んでいる。\n自分の指を小さな小さな膣口に浅く差し込んで――
1364 = "Vậy mà, Suzu lại đang vui sướng. Em cắm nông ngón tay mình vào lỗ âm đạo nhỏ bé ấy——"
# monologue
# JP: （ちゅぷっ――にゅるっ――にゅっ――こしゅっ――）
1810 = "（Chụt——trượt——ngoáy——sột sột——）"
# 【ハチロク】
# display as 鈴
# JP: 「ん……ふっ……んっ……んうっ！」
1048 = "「Ưm......phù......ưm......ưm!」"
# monologue
# JP: 指は、ずぶずぶ入っていかない。
1466 = "Ngón tay không đâm sâu vào trong."
# monologue
# JP: おつゆをちぷちぷ弾かせて、\n浅い部分で、何度もしつこく蠢くだけだ。
1453 = "Chỉ làm bắn những giọt dịch nhờn tí tách, và liên tục cựa quậy ở phần nông bên ngoài."
# 【ハチロク】
# display as 鈴
# JP: 「ん……ひっ――んっ――んっ、ふっ、ふっ、んっ！」
1049 = "「Ưm......hi——ưm——ưm, phù, phù, ưm!」"
# monologue
# JP: 僕に先ほど見せてくれたように、\n恐らくは指を鉤にして、気持ち良い場所をコスってるのだ。
1445 = "Giống như những gì em đã cho tôi thấy lúc nãy, có lẽ em đang uốn cong ngón tay như cái móc, cọ xát vào điểm nhạy cảm nhất."
# monologue
# JP: （にゅろんっ！）
1800 = "（Trượt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！？」
1069 = "「Ưm!?」"
# monologue
# JP: いきなり、すずの舌が動く。
1627 = "Đột nhiên, lưỡi Suzu cử động."
# monologue
# JP: 僕の勃起に巻き付くように、\n全体をぞろりと舐めて刺激する！
1484 = "Như quấn chặt lấy phần cương cứng của tôi, em liếm trọn toàn bộ để kích thích!"
# 【双鉄H】
# display as 雙鐵
# JP: 「すず――イクのだな？」
1208 = "「Suzu——em sắp ra rồi sao?」"
# monologue
# JP: あの、一番気持ち良い場所。\nそこへほとんど、すずはもう達しかけている。
1701 = "Cái nơi sung sướng nhất ấy. Suzu gần như đã chạm tới đó rồi."
# monologue
# JP: 指の動きに、すずが集中できるよう、\nすずの頭を軽く抑えて――
1596 = "Để Suzu có thể tập trung vào chuyển động của ngón tay, tôi nhẹ nhàng giữ lấy đầu em——"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、一緒に」
1201 = "「Vậy thì, cùng nhau nhé」"
# monologue
# JP: （ずるううううっ）
1832 = "（Rút ra）"
# 【ハチロク】
# display as 鈴
# JP: 「っ！！？」
1222 = "「!!?」"
# monologue
# JP: 唇から亀頭が半分でてしまうまで、\n大きく大きく腰を引けば、すずはその目を白黒させる。
1544 = "Tôi lùi hông lại thật sâu, cho đến khi quy đầu tuột ra khỏi môi em một nửa, khiến mắt Suzu đảo liên hồi."
# 【ハチロク】
# display as 鈴
# JP: 「んんっ――」
# 1067 = "「嗯嗯——」" 
# monologue
# JP: 逃がさないよう、すずが思い切り吸引してくる。
1442 = "Không để tôi trốn thoát, Suzu dốc hết sức hút mạnh."
# monologue
# JP: 頬がへっこみ、唇がきゅっと張り付くようで、\n口内はまるで、真空に近い状態だ。
1479 = "Hai má em hóp lại, đôi môi như dính chặt lấy, khoang miệng lúc này gần như ở trạng thái chân không."
# 【双鉄H】
# display as 雙鐵
# JP: 「わかってる。洗い場を決して汚さぬように、\n僕が射精をするべき場所は――決まってるよな？」
1112 = "「Anh biết rồi. Để tuyệt đối không làm bẩn khu vực tắm, nơi anh nên xuất tinh——đã được quyết định rồi, đúng không?」"
# monologue
# JP: 抑えてる手で髪を撫ぜ、すずを安心させてやる。
1554 = "Tôi dùng bàn tay đang giữ đầu vuốt ve mái tóc em, để Suzu an tâm."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕が今腰を引いたのは、\nおまえと一緒に――イキたいからだ」
990 = "「Lý do anh lùi hông lại lúc nãy, là vì anh muốn——ra cùng với em」"
# monologue
# JP: （ずぼおおおおおおおおおっ！！）
1837 = "（Phập!!）"
# 【ハチロク】
# display as 鈴
# JP: 「んううううううっ！！！」
1064 = "「Ưm ưm ưm!!!」"
# monologue
# JP: 真空状態の口内へ、勃起を思い切り押しこめば、\nごん、と容易く亀頭は喉の奥をつくっ！
1556 = "Đâm mạnh phần cương cứng vào khoang miệng đang ở trạng thái chân không, quy đầu dễ dàng chạm đến tận sâu trong cổ họng đánh \"cộc\" một cái!"
# 【双鉄H】
# display as 雙鐵
# JP: 「――っ――ぁっ！」
785 = "「——a!」"
# monologue
# JP: 快感があまりに強すぎて、膝がガクガク震えてしまう。
1524 = "Khoái cảm quá mạnh khiến đầu gối tôi run lẩy bẩy."
# monologue
# JP: これ以上動けば射精する。\nそれが分かりきっていながら腰は、止まってくれない。
1382 = "Chỉ cần cử động thêm chút nữa là sẽ xuất tinh. Dù biết rõ điều đó nhưng hông tôi vẫn không chịu dừng lại."
# monologue
# JP: （ぢゅぽっ！　じゅっ！　にゅくっ！　じゅぶっ！！）
1809 = "（Chụt! Chụt! Ngoáy! Chu mút!!）"
# 【ハチロク】
# display as 鈴
# JP: 「んぶっ、んっ――ぢゅっ――ぢゅるっ――ちゅぷっ」
1065 = "「Ưm bư, ưm——chụt——chu mút——chụt」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すず、すず！　僕は、もうイクっ！\nお前も、一緒にっ！！」
1209 = "「Suzu, Suzu! Anh, ra đây! Em cũng, cùng lúc nhé!!」"
# 【ハチロク】
# display as 鈴
# JP: 「んっ！」
# 1068 = "「嗯！」" 
# monologue
# JP: 空いてる指で、すずはクリトリスをきゅうっとつまむ。\nそして同時に、膣に差してる指をグリっと回すっ！
1685 = "Bằng những ngón tay còn trống, Suzu véo mạnh vào âm vật. Đồng thời, ngón tay đang cắm trong âm đạo cũng ngoáy mạnh một vòng!"
# 【ハチロク】
# display as 鈴
# JP: 「んふうううううううううううううう～～～っ！」
1063 = "「Ưm hưm～～～!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うあっ！」
1039 = "「Ư a!」"
# monologue
# JP: （びゅくっ！　びゅるっ！　びゅっ！　ぶびゅるっ！！）
1820 = "（Phụt! Phụt! Phụt! Phụt!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ずぞぉぉぉぉぉぉぉぉっ！！！」
1030 = "「A a a a!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあぁっぁぁぁぁっ！」
1029 = "「A a a a!」"
# monologue
# JP: 声が、全く抑えきれない。
1540 = "Giọng nói, hoàn toàn không thể kìm nén được."
# monologue
# JP: （びゅるっ！　びゅっ！！　びゅうっ！　びゅるるっ！）
1826 = "（Phụt! Phụt!! Phụt! Phụt phụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「ん――ごくっ――んくっ――ごくっ――ごきゅっ――」
1044 = "「Ưm——ực——ưm——ực——ực——」"
# monologue
# JP: すずの真っ白な喉が何度も何度も動く。\n僕が吐き出す精液を、吐き出す先から飲み込んでいく！
1700 = "Cổ họng trắng ngần của Suzu chuyển động hết lần này đến lần khác. Nuốt trọn lấy dòng tinh dịch tôi vừa phóng ra!"
# monologue
# JP: （びゅっ！　びゅるっ！　びゅうっ！　びゅっ！）
1824 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「っ――んくっ――んっ――ごくっ――ごっくんっ――」
1042 = "「Ưm——ưm——ưm——ực——ực——」"
# monologue
# JP: 鏡の中では、すずの膣口が震えてる。
1706 = "Trong gương, âm đạo của Suzu đang run rẩy."
# monologue
# JP: 指が抜かれた穴もそのまま、蜜をだらだらだらだら零し、\n思いっきりにイキました、と、震えることで語ってる。
1568 = "Ngón tay vừa rút ra, cái lỗ ấy vẫn để nguyên, mật ngọt tuôn rơi ròng rập, như đang dùng sự run rẩy ấy để nói rằng em đã lên đỉnh một cách thỏa mãn."
# 【双鉄H】
# display as 雙鐵
# JP: 「一緒に――イケたな？」
1104 = "「Chúng ta——đã ra cùng nhau nhỉ?」"
# 【ハチロク】
# display as 鈴
# JP: 「ぷあっ――あっ――はっ――\nはい、双鉄、さまっ……ですが」
1084 = "「Phù a——a——ha—— Vâng, ngài Soutetsu......nhưng mà」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、まだ磨き洗いをするべき場所が残っているな」
1080 = "「À, vẫn còn một chỗ cần phải cọ rửa nữa nhỉ」"
# 【ハチロク】
# display as 鈴
# JP: 「は、い――」
1130 = "「Vâ, ng——」"
# monologue
# JP: 声も、膣口も震えてる。\n僕を、求めてくれている。
1477 = "Cả giọng nói lẫn âm đạo đều đang run rẩy. Em đang khao khát tôi."
# 【ハチロク】
# display as 鈴
# JP: 「ですので、洗って頂けますか？　わたくしを」
1120 = "「Vì vậy, ngài có thể rửa cho em được không ạ? Cơ thể em」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、無論だ」
1078 = "「Ừ, đương nhiên rồi」"
# monologue
# JP: ほっとした顔。
1494 = "Khuôn mặt nhẹ nhõm."
# monologue
# JP: そのあどけないような顔からちろ、と、\nピンクに濡れた舌が伸びてくる。
1455 = "Từ khuôn mặt ngây thơ ấy, một chiếc lưỡi ướt át màu hồng nhạt thò ra."
# 【ハチロク】
# display as 鈴
# JP: 「ぺろっ――れろっ――ちゅっ――れろろ～っ」
1224 = "「Liếm——liếm——chụt——liếm láp～」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――」
# 1040 = "「嗯——」" 
# monologue
# JP: 精液にまみれた勃起を、\nすずは丹念に舐め洗う。
1683 = "Phần cương cứng đẫm tinh dịch, được Suzu cẩn thận liếm sạch."
# monologue
# JP: たまもその裏も、皮の内側までを舐め、\n満足そうな顔で頷く。
1487 = "Liếm cả hai hòn bi, mặt sau, cho đến tận mặt trong của lớp da, rồi em gật đầu với vẻ mặt mãn nguyện."
# 【ハチロク】
# display as 鈴
# JP: 「この、てらてらのおちんちんで――\nどうぞ、わたくしのおまんまんの内側を」
1159 = "「Với cậu bé bóng loáng này—— xin ngài hãy rửa sạch bên trong cô bé của em đi ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1057 = "「嗯」" 
# monologue
# JP: 言い様、床へと寝転がり、\nすずの体をそのまま抱き込む。
1578 = "Nói rồi, tôi nằm lăn ra sàn, cứ thế ôm trọn lấy cơ thể Suzu."
# 【ハチロク】
# display as 鈴
# JP: 「え！？　あの――わたくしが双鉄様にまたがるなどっ」
1019 = "「Hả!? Dạ——sao em có thể cưỡi lên người ngài Soutetsu đượcっ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「それがいかん。すず、お前はどうにも、\n本質的な部分で保守的にすぎるようだ」
988 = "「Thế là không được đâu. Suzu, em có vẻ hơi quá bảo thủ ở những phần bản chất đấy」"
# 【ハチロク】
# display as 鈴
# JP: 「保守的、でございますか？」
978 = "「Bảo thủ, sao ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、自分でおまんまんを弄る姿を見ててもそうだ。\n同じ場所、気持ちいい一箇所だけをずうっとコスる」
1136 = "「Ừ, nhìn cách em tự thủ dâm là thấy. Em cứ cọ xát mãi vào cùng một chỗ, đúng cái điểm duy nhất khiến em thấy sướng」"
# 【ハチロク】
# display as 鈴
# JP: 「は、はい」
1128 = "「Vâ, vâng」"
# 【双鉄H】
# display as 雙鐵
# JP: 「それはそれで、正しいことであるかとも思う。\nだがな？　すず」
1115 = "「Anh nghĩ điều đó cũng không sai. Nhưng mà này? Suzu」"
# monologue
# JP: （さすっ）
1839 = "（Vuốt）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃうんっ！」
1007 = "「Hya ưm!」"
# monologue
# JP: 手を伸ばし、脇の下からアバラの線を擦ってやる。
1552 = "Tôi vươn tay, vuốt dọc theo đường xương sườn từ dưới nách em."
# monologue
# JP: それから腹の下へと手をはり、\nかわいいおへそを、かるぅくクリクリ弄ぶ。
1543 = "Sau đó đưa tay xuống bụng dưới, nhẹ nhàng ngoáy ngoáy trêu đùa cái rốn đáng yêu của em."
# 【双鉄H】
# display as 雙鐵
# JP: 「同じことを繰り返すだけじゃ進歩が無い。\nセックスにおいても、新鮮さを失くしてはいかんと思う」
958 = "「Cứ lặp đi lặp lại một việc thì sẽ không có tiến bộ. Trong chuyện làm tình cũng vậy, không được để mất đi sự mới mẻ」"
# 【ハチロク】
# display as 鈴
# JP: 「セックスの……新線開発」
980 = "「Làm tình cũng phải......khai phá tuyến đường mới」"
# monologue
# JP: いや、違う――といいかけてけれど、言葉を飲み込む。
1389 = "Không, không phải——tôi định nói vậy, nhưng lại nuốt lời vào trong."
# monologue
# JP: 聞き違いではあるのだろうが、僕の言わんとすることを、\n自分に理解しやすい言葉で、すずは納得してくれている。
1405 = "Chắc là em nghe nhầm, nhưng Suzu đã dùng ngôn từ dễ hiểu với bản thân để diễn giải và chấp nhận điều tôi muốn nói."
# 【ハチロク】
# display as 鈴
# JP: 「まことに、双鉄さまのおっしゃるとおりでございますね。\nこのような格好……はしたないこととは存じますが――」
1165 = "「Quả thực, đúng như lời ngài Soutetsu nói. Tư thế này......tuy em biết là rất đáng xấu hổ nhưng——」"
# monologue
# JP: （すりゅううううっ）
1829 = "（Sột sột）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
# 1068 = "「嗯！」" 
# monologue
# JP: 自分の指でしていたことを、僕の亀頭ですずはする。
1468 = "Những gì từng làm bằng ngón tay của mình, giờ Suzu làm bằng quy đầu của tôi."
# monologue
# JP: わずかに亀頭を膣の肉へと食い込ませ、\nおまんまんのスジに添わせて、腰を動かしスライドさせる。
1457 = "Em để quy đầu lún nhẹ vào lớp thịt âm đạo, áp dọc theo khe hở của cô bé, rồi chuyển động hông trượt tới lui."
# 【ハチロク】
# display as 鈴
# JP: 「あ……ん――わたくし――頑張って――あっ――\n今まで、知らない――気持ち、いい――場所っ」
1036 = "「A......ưm——em——sẽ cố gắng——a—— tìm ra nơi——sung sướng——mà từ trước đến nay, chưa từng biếtっ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん。探してみてくれ。\nいや、探してみよう。僕と、一緒に」
1076 = "「Ừ. Thử tìm xem sao. Không, hãy cùng tìm nào. Cùng với, anh」"
# 【ハチロク】
# display as 鈴
# JP: 「はいっ。んっ――双鉄、さまとっ、\nふたりで――あっ――、一緒、にっ」
1072 = "「Vâng. Ưm——cùng với, ngài Soutetsuっ, hai chúng ta——a——, cùng, nhauっ」"
# monologue
# JP: （くちんっ）
1816 = "（Phập）"
# monologue
# JP: 動かしていた腰を止め、\nすずは亀頭に、その膣口を押し当てる。
1676 = "Dừng lại chuyển động của hông, Suzu ép chặt âm đạo vào quy đầu."
# monologue
# JP: すずの小さく細い指とは、まるで違う。\n自分の勃起が、これほど凶悪とは思わなかった。
1674 = "Khác hẳn với những ngón tay nhỏ nhắn, thon dài của Suzu. Tôi không ngờ phần cương cứng của mình lại hung hãn đến vậy."
# 【ハチロク】
# display as 鈴
# JP: 「気持ち、いい……とこ――\nいつもと、違う……んっ――新しい――とこっ」
1170 = "「Nơi......sung sướng—— khác với, mọi khi......ưm——nơi——mới mẻっ」"
# monologue
# JP: （ずっ――るっ――）
1791 = "（Trượt——vào——）"
# monologue
# JP: ゆっくりゆっくり、すずのおまんまんが僕を飲み込む。\n膣口はぴっちり広がって、今にも切れてしまいそうだ。
1687 = "Chầm chậm, chầm chậm, cô bé của Suzu nuốt trọn lấy tôi. Âm đạo mở rộng hết cỡ, tưởng chừng như sắp rách toạc ra."
# 【双鉄H】
# display as 雙鐵
# JP: （なの、に――くっ――あっ――）
1787 = "（Thế, mà——hự——a——）"
# monologue
# JP: １ミクロンの隙さえないのに、\nすずの膣肉はうごめいてくる。
1581 = "Dù không còn lấy một micromet khe hở, nhưng lớp thịt âm đạo của Suzu vẫn cựa quậy."
# monologue
# JP: 僕の亀頭を歓迎し、どうぞこのままもっと奥へと、\n張り付きながら、やわやわキュウキュウすりあげてくる。
1500 = "Nó chào đón quy đầu của tôi, mời gọi tiến sâu hơn nữa, vừa bám chặt, vừa cọ xát mềm mại và siết chặt lấy."
# monologue
# JP: （ごしゅっ）
1795 = "（Sột）"
# 【ハチロク】
# display as 鈴
# JP: 「はひゅっ！？」
1017 = "「Hí u!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
# 783 = "「——」" 
# monologue
# JP: このまま奥へ、と思った瞬間、\nすずはぐりゅん、と腰を大きく回転させる。
1425 = "Ngay khoảnh khắc định tiến sâu hơn, Suzu đột ngột xoay hông một vòng lớn."
# monologue
# JP: きつく締め付け密着していた膣肉を、無理やり剥がされ\n拗じられるのが、気持ち良すぎて呼吸が止まる。
1666 = "Lớp thịt âm đạo đang bám chặt bị cưỡng ép tách ra rồi vặn vẹo, sung sướng đến mức tôi ngừng thở."
# 【ハチロク】
# display as 鈴
# JP: 「あっ――ひゅっ――これっ――しゅごっ――」
1023 = "「A——hí u——cái này——tuyệt quá——」"
# monologue
# JP: （ぐりゅっ！　ぐりゅっ！　ぎゅっ！　ぶりゅん！）
1801 = "（Ngoáy! Ngoáy! Siết! Phập!）"
# monologue
# JP: 大きく何度も、すずの腰が跳ねる。\n不器用なのにとても綺麗な――酷く淫靡なダンスを踊る。
1694 = "Hông Suzu nảy lên mạnh mẽ nhiều lần. Một điệu nhảy vụng về nhưng lại vô cùng tuyệt đẹp——và cực kỳ dâm đãng."
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ――あっ――知らない、とこっ――んっ――\nこすれて――これ――やっ――気持ち――いいっ」
1012 = "「Phù a——a——nơi, chưa từng biếtっ——ưm—— đang bị cọ xát——cái này——á——sung——sướng quáっ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「おっと」
1016 = "「Ây da」"
# monologue
# JP: 夢中になって動く弾みで上体が崩れそうになり、\n慌てて手を添え支えてやる。
1617 = "Do chuyển động quá hăng say khiến nửa thân trên sắp ngã quỵ, tôi vội vàng đưa tay ra đỡ lấy em."
# 【ハチロク】
# display as 鈴
# JP: 「あっ――あっ！」
1024 = "「A——a!」"
# monologue
# JP: （ずりゅんっ！！！）
1792 = "（Trượt!!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「～～～～っ！」
1226 = "「～～～～!」"
# monologue
# JP: 支えに安堵したせいか、\nすずの体重が前の方へと大きく動く。
1434 = "Có lẽ vì an tâm khi được đỡ, trọng lượng cơ thể Suzu đổ dồn về phía trước."
# monologue
# JP: 亀頭の裏が激しく摺られ、\n竿の全部がぎゅううっと前へ持っていかれる！
1744 = "Mặt dưới quy đầu bị cọ xát dữ dội, toàn bộ phần thân bị kéo mạnh về phía trước!"
# 【ハチロク】
# display as 鈴
# JP: 「は、ひっ――」
1014 = "「Ha, hí——」"
# monologue
# JP: すずのよだれが、僕の胸板にぼとぼと落ちる。
1691 = "Nước dãi của Suzu nhỏ ròng ròng xuống ngực tôi."
# monologue
# JP: （ずぼっ！　じゅぼっ！　じゅぼっ！　ぼちっ！）
1808 = "（Phập! Chu mút! Chu mút! Chụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「ここっ――んっ――こんなの、しら、ないっ――\nおまん、まん――膣の、壁、これ――気持ち――いいっ」
1189 = "「Chỗ nàyっ——ưm——cảm giác này, em chưa, từng biếtっ—— cô, bé——vách, âm đạo, thế này——sung——sướng quáっ」"
# monologue
# JP: （じゅぶっ！　じゅっ！　ぐりゅっ！　じゅぶっ！）
1811 = "（Phập! Chụt! Ngoáy! Phập!）"
# monologue
# JP: 時折り、腰のグラインドも混ぜ、\nすずは体を、何度も何度も跳ねさせる。
1586 = "Thỉnh thoảng xen lẫn những cú lắc hông, Suzu liên tục, liên tục nảy người lên."
# monologue
# JP: 僕もものすごく気持ちいい――が、\n同時に、あえかな不満も感じる。
1532 = "Tôi cũng vô cùng sung sướng——nhưng, đồng thời cũng cảm thấy đôi chút không thỏa mãn."
# 【双鉄H】
# display as 雙鐵
# JP: （やはり、保守的だな、どうしても）
1843 = "（Quả nhiên, vẫn còn bảo thủ lắm, dù thế nào đi nữa）"
# monologue
# JP: 一番最初に発見した、気持ちのいい場所。\nそこをただただ、繰り返し擦る。
1493 = "Nơi sung sướng đầu tiên mà em khám phá ra. Em cứ liên tục, liên tục cọ xát vào đó."
# monologue
# JP: すずはもう、その一点だけに心を奪われ、\n探索を、すっかり止めてしまってる。
1699 = "Suzu đã hoàn toàn bị mê hoặc bởi điểm đó, và dừng hẳn việc khám phá."
# 【双鉄H】
# display as 雙鐵
# JP: （ここは、僕が手伝わねばな）
1830 = "（Chỗ này, tôi phải giúp một tay thôi）"
# 【ハチロク】
# display as 鈴
# JP: 「んひいいっ！！？」
1062 = "「Ưm hí ii!!?」"
# monologue
# JP: （きゅううううううっ！！！）
1836 = "（Siết chặt!!!）"
# monologue
# JP: 尻穴に指をいれた瞬間、膣が思い切り締めあげてきて、\n危うく射精しそうになる。
1565 = "Khoảnh khắc tôi đưa ngón tay vào lỗ hậu môn, âm đạo đột ngột siết chặt lại, khiến tôi suýt chút nữa thì xuất tinh."
# 【ハチロク】
# display as 鈴
# JP: 「そう、てつ――さまっ！？　んきゅっ――そこっ――\nおひりっ――おしりの――穴、ですぅっ――んっ」
1218 = "「Ngài, Soutetsu——!? Ưm kya——chỗ đóっ—— là lỗっ——lỗ——hậu môn, đấy ạっ——ưm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。わかってる。\nわかった上で、ほじってる」
1074 = "「Ừ. Anh biết. Biết rồi anh mới ngoáy chứ」"
# monologue
# JP: すずの尻穴はひどく熱い。\nそうしてつるんと、引っ掛かりのない感触だ。
1689 = "Lỗ hậu môn của Suzu nóng rực. Trơn tuột, không hề có cảm giác vướng víu."
# 【双鉄H】
# display as 雙鐵
# JP: 「普段は何に使うのだ？\nレイルロオドの[しりあな,1]尻穴は」
1210 = "「Bình thường thì dùng để làm gì? Lỗ hậu môn của Railord ấy」"
# 【ハチロク】
# display as 鈴
# JP: 「めったな――ことでは――ンッ――つかいま――\nひぇ、んっ――んう――ただ、どう、して、もっ――」
1149 = "「Hiếm khi——lắm mới——ưm——dùng đến—— Hi a, ưm——ưm ư——chỉ khi, thế nào, cũng khôngっ——」"
# monologue
# JP: どうしても内部で燃焼しきれぬ異物を体外に排出する。\n基本、尻穴の用途も人間とほぼ変わらないものらしい。
1503 = "Đào thải những dị vật không thể đốt cháy hoàn toàn bên trong ra ngoài cơ thể. Về cơ bản, công dụng của lỗ hậu môn cũng không khác gì con người."
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば――だ」
1204 = "「Nếu vậy——thì」"
# monologue
# JP: （くっ――くくっ――）
1815 = "（Ngoáy——ngoáy ngoáy——）"
# 【ハチロク】
# display as 鈴
# JP: 「やっ――お指――んっ――おひりの、あなのっ――\nおく、いれちゃ――やぁっ」
1003 = "「Á——ngón tay——ưm——vào sâu, trong lỗっ—— hậu môn, mất——áっ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「勉強したが。ここでするセックスもあるらしい。\nアナルセックスというのだが――」
1114 = "「Anh có tìm hiểu. Hình như cũng có kiểu làm tình ở đây đấy. Gọi là quan hệ qua đường hậu môn——」"
# 【ハチロク】
# display as 鈴
# JP: 「あっ――あなる……せっく――すっ」
1168 = "「A——quan hệ......qua đường——hậu mônっ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そんなことまで人はするのだ。\n僕らも、せっかくのセックスなのだし」
1134 = "「Ừ, con người còn làm đến cả những chuyện như vậy cơ mà. Chúng ta cũng vậy, hiếm khi mới làm tình một lần mà」"
# 【ハチロク】
# display as 鈴
# JP: 「は、はひっ――開発、したい、ですっ――んっ、\n双鉄、さまと――いっしょの――セックス――ふあっ」
1127 = "「Vâ, vângっ——em muốn, khai pháっ——ưm, làm tình——cùng với——ngài Soutetsu——phù a」"
# 【双鉄H】
# display as 雙鐵
# JP: 「痛っ！？」
1088 = "「Đau!?」"
# monologue
# JP: 尻穴がギチリと締まってしまい、\nあわてふためいて指を抜く。
1511 = "Lỗ hậu môn siết chặt lại đau điếng, tôi vội vàng rút ngón tay ra."
# monologue
# JP: 膣もきゅんきゅんと締め付けながら、\n無数のヒダで、僕を抱きしめ揉みしだいてくる。
1737 = "Âm đạo cũng siết chặt liên hồi, vô số nếp gấp ôm lấy và nhào nặn tôi."
# 【ハチロク】
# display as 鈴
# JP: 「け、けれど、わ、わたくしっ――\nいまっ――今は、もうっ！――んっ！」
972 = "「Nhưng, nhưng mà, e, emっ—— bây giờっ——bây giờ, đãっ!——ưm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか。もう少しだけ我慢してくれ」
1193 = "「Vậy sao. Chịu đựng thêm một chút nữa thôi nhé」"
# monologue
# JP: 余計なことを考えて、\n快感をむさぼることを怠ってしまった。
1548 = "Mải nghĩ chuyện bao đồng, mà lơ là việc tận hưởng khoái cảm mất rồi."
# monologue
# JP: 次のセックスは次のこと、\n今はただ、すずの可愛いおまんまんだけを――
1336 = "Lần làm tình sau để sau tính, bây giờ chỉ cần tập trung vào cô bé đáng yêu của Suzu thôi——"
# monologue
# JP: （ずぶうううううううううううっ！）
1835 = "（Phập!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃふっっ！？　きゅ、急に――双鉄、様っ！」
1006 = "「Hya fư!? Đ, đột nhiên——ngài Soutetsu!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いやか？」
1178 = "「Ghét à?」"
# 【ハチロク】
# display as 鈴
# JP: 「いやなことなど――んっ――うれひっ――\nわたくしっ――嬉しい――ですっ――ふあっ！」
964 = "「Không ghét đâu——ưm——vuiっ—— emっ——vui lắm——ạっ——phù a!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだっ！」
1101 = "「Anh cũng vậy!」"
# monologue
# JP: （ずっ！　じゅぶっ！　ずぼっ！　じゅぼっ！）
1794 = "（Phập! Sột sột! Phập! Chu mút!）"
# monologue
# JP: すずの腰と僕の腰。\n動きが、最早シンクロしている。
1693 = "Hông của Suzu và hông của tôi. Chuyển động đã hoàn toàn đồng điệu."
# monologue
# JP: すずのおまんまんはもう完全に僕を覚えて、\nただ一箇所に、精を吐きだせと誘導してくる。
1686 = "Cô bé của Suzu đã hoàn toàn ghi nhớ tôi, và đang dẫn dụ tôi xuất tinh vào một điểm duy nhất."
# 【ハチロク】
# display as 鈴
# JP: 「あっ――来たっ！　ごつんっ――って――あっ、\n双鉄、さまの――おちんちんの――先っ」
1021 = "「A——đến rồi! Cộc một cái——a, phần đỉnh——cậu bé——của ngài Soutetsuっ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「おちんちんの、先は――なっ――くっ、あ――\n亀頭と――、一般には、言う――そう、だっ」
1089 = "「Phần đỉnh, của cậu bé——là——hự, a—— gọi là——quy đầu——người ta thường nói, vậy đấyっ」"
# 【ハチロク】
# display as 鈴
# JP: 「きとう、好きっ――双鉄さまの、きとう、大好きっ！\n子宮に、ちゅって、キス、して――くれ――んふっ！！」
1106 = "「Quy đầu, em thíchっ——quy đầu của ngài Soutetsu, em thích lắm! Hãy hôn, chụt một cái, vào tử cung——của em đi——ưm hưm!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すずっ！　すずっ！！！」
1207 = "「Suzu! Suzu!!!」"
# monologue
# JP: ぼたぼた垂れるよだれが、汗が、\n僕に染み込み精液になり、溢れ出そうと暴れてる。
1416 = "Nước dãi và mồ hôi nhỏ ròng ròng, thấm vào tôi, hóa thành tinh dịch, cuộn trào chực chờ tuôn trào."
# monologue
# JP: すずの膣内も熱くほぐれて、\n繋がる部分が融け合うようで、ただひたすらに気持ちいい。
1696 = "Bên trong âm đạo của Suzu cũng nóng bỏng và giãn nở, phần kết nối như hòa tan vào nhau, chỉ còn lại sự sung sướng tột độ."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま！　双鉄さまぁ！」
1220 = "「Ngài Soutetsu! Ngài Soutetsu!」"
# monologue
# JP: （ばちゅんっ！　じゅっ！　じゅぶっ！　じゅぱっ！）
1807 = "（Phập! Chụt! Sột sột! Chụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「あっ！　あっ！　あっ！　あっ！」
1038 = "「A! A! A! A!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ、もうイクっ――」
1102 = "「Anh cũng vậy, sắp ra rồi——」"
# monologue
# JP: 腰が、一瞬だけ止まる。\n僕のも、すずのも、示し合わせでもしたかのように。
1648 = "Hông, dừng lại trong một khoảnh khắc. Cả của tôi và của Suzu, cứ như đã hẹn trước vậy."
# monologue
# JP: そうして、やはり二人同時に！
1605 = "Và rồi, quả nhiên cả hai cùng lúc!"
# 【ハチロク】
# display as 鈴
# JP: 「いっ、くうぅぅぅぅぅぅぅぅぅぅっっ！！」
966 = "「Ra, ra mất!!!」"
# monologue
# JP: （ずりゅううううううううううううっ！）
1828 = "（Trượt!!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
1037 = "「Kua!」"
# monologue
# JP: （びゅばっ！　びゅっるっ！　どびゅっ！　びゅぶっ！）
1818 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「あっ――あつっ――熱いっ――んっ――\n精液――せいえきっ――双鉄様、のっ――」
1026 = "「A——nóng——nóng quá——ưm—— tinh dịch——tinh dịchっ——của ngài Soutetsuっ——」"
# monologue
# JP: （びゅるっ！　びゅっ！　びゅるるっ！　びゅうっ――）
1823 = "（Phụt! Phụt! Phụt phụt! Phụt——）"
# 【ハチロク】
# display as 鈴
# JP: 「はっ――あっ――ああっ――～～～んっ――ふあっ――\nあっ！？」
1015 = "「Ha——a——a a——～～～ưm——phù a—— A!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！？」
# 1069 = "「嗯！？」" 
# monologue
# JP: 驚いたような声に慌てて顔を向ければ、\nすずは指先をスプーンにして、結合部から溢れた精を――
1639 = "Giật mình quay mặt lại trước giọng nói đầy kinh ngạc, Suzu dùng đầu ngón tay như một chiếc thìa, vớt lấy tinh dịch tràn ra từ chỗ kết nối——"
# 【ハチロク】
# display as 鈴
# JP: 「あーーーーーんっ――んっ――こくっ」
1034 = "「A a a a ưm——ưm——ực」"
# monologue
# JP: 丁寧に、丁寧に、漉き拭って、飲み干している。
1458 = "Cẩn thận, cẩn thận, vớt lấy, lau sạch, rồi nuốt trọn."
# monologue
# JP: これほど濁ったものを何故と、\n少し不思議に感じてしまう。
1597 = "Tại sao lại nuốt thứ đục ngầu như thế này, tôi cảm thấy có chút khó hiểu."
# 【双鉄H】
# display as 雙鐵
# JP: 「精液の……味が、好きなのか？」
976 = "「Em thích......hương vị của tinh dịch sao?」"
# 【ハチロク】
# display as 鈴
# JP: 「いえ――そういうわけでもございませんが――\nんくっ」
963 = "「Không ạ——cũng không hẳn là vậy—— ưm」"
# monologue
# JP: 言いながらも、まだ溢れだす精液を、\n丹念にぬぐっては舌へ乗せてく。
1450 = "Miệng nói vậy, nhưng em vẫn cẩn thận lau sạch lượng tinh dịch đang trào ra rồi đưa lên lưỡi."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄様の、赤ちゃんのたねでございますから。\n水に流れたり乾いたりしては、かわいそうです」
1191 = "「Vì đây là hạt giống em bé của ngài Soutetsu mà. Để nó trôi theo dòng nước hay khô đi thì tội nghiệp lắm」"
# monologue
# JP: きっぱり言って。\nすずは自分のおなかにそうっと、手を当てる。
1488 = "Nói một cách dứt khoát. Suzu nhẹ nhàng đặt tay lên bụng mình."
# 【ハチロク】
# display as 鈴
# JP: 「ですから、わたくしのお腹の中で。双鉄様の精液が。\nわたくしの、一部になってくれたら嬉しいな、と」
1121 = "「Vì vậy, ở trong bụng em. Tinh dịch của ngài Soutetsu. Nếu nó trở thành một phần của em thì em sẽ rất vui」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すず」
1206 = "「Suzu」"
# 【ハチロク】
# display as 鈴
# JP: 「あ――」
# 1020 = "「啊——」" 
# monologue
# JP: 愛おしくなり、抱きしめる。
1482 = "Cảm thấy yêu thương vô ngần, tôi ôm chặt lấy em."
# monologue
# JP: 僕の手の中、すずはほうっと幸せそうな息を吐き、\nやがて、うふふと小さく微笑む。
1677 = "Trong vòng tay tôi, Suzu khẽ thở hắt ra một hơi hạnh phúc, rồi mỉm cười \"ư fufu\" nhỏ nhẹ."
# 【双鉄H】
# display as 雙鐵
# JP: 「どうした？」
1098 = "「Sao vậy?」"
# 【ハチロク】
# display as 鈴
# JP: 「いえ、ただ双鉄様の磨き洗いが……\n本当に素敵で、気持ちよかったなって、思って」
1148 = "「Không ạ, chỉ là em nghĩ cọ rửa cho ngài Soutetsu...... thật sự rất tuyệt, và rất sướng thôi ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1057 = "「嗯」" 
# monologue
# JP: 言われて、つられて思い出す。
1492 = "Nghe em nói, tôi cũng sực nhớ ra."
# monologue
# JP: そうだ、僕らがやるべきことは、\nセックスではなく――
1504 = "Đúng rồi, việc chúng tôi cần làm, không phải là làm tình mà là——"
# 【ハチロク】
# display as 鈴
# JP: 「おかげさまで、パワーも百倍です。\nお風呂、ピカピカに磨いて綺麗にしてあげられます」
1157 = "「Nhờ ngài mà em có thêm sức mạnh gấp trăm lần rồi. Em sẽ cọ rửa nhà tắm thật sạch sẽ, sáng bóng」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか！」
1192 = "「Vậy sao!」"
# monologue
# JP: すずの笑顔に元気を貰う。\n射精後のけだるさを払い、立ち上がる。
1692 = "Nụ cười của Suzu tiếp thêm sinh lực cho tôi. Gạt đi sự uể oải sau khi xuất tinh, tôi đứng dậy."
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、一気に取り掛かろう」
1200 = "「Vậy thì, bắt tay vào làm một lèo luôn nào」"
# 【ハチロク】
# display as 鈴
# JP: 「はい！」
1138 = "「Vâng!」"
# monologue
# JP: けれどもすぐにお尻に手をやり、もぞもぞと振る。
1356 = "Nhưng rồi em ngay lập tức đưa tay xuống mông, vặn vẹo."
# 【ハチロク】
# display as 鈴
# JP: 「あの、双鉄様？」
1198 = "「Dạ, ngài Soutetsu?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
# 1081 = "「嗯？」" 
# monologue
# JP: 求められるまま耳を寄せれば、他には誰もいないのに、\nすずは小さく小さく、囁く。
1550 = "Chiều theo ý em, tôi ghé tai lại gần, dù chẳng có ai khác ở đây, nhưng Suzu vẫn thì thầm thật nhỏ, thật nhỏ."
# 【ハチロク】
# display as 鈴
# JP: 「次はもっと新しい、今まで知らない、気持ちいい場所、\nわたくし、がんばって探しますから」
961 = "「Lần tới em sẽ cố gắng tìm ra một nơi sung sướng mới mẻ hơn, mà từ trước đến nay chưa từng biết đến ạ」"
