1829 = "（噝溜）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
# 1068 = "「嗯！」" 

# monologue
# JP: 自分の指でしていたことを、僕の亀頭ですずはする。
1468 = "她用我的龜頭，做了她剛剛用手指做過的事。" 

# monologue
# JP: わずかに亀頭を膣の肉へと食い込ませ、\nおまんまんのスジに添わせて、腰を動かしスライドさせる。
1457 = "她將龜頭抵在陰道口的肉上，靠在小妹妹的縫上，扭了扭腰蹭著肉棒。" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……ん――わたくし――頑張って――あっ――\n今まで、知らない――気持ち、いい――場所っ」
1036 = "「啊嗯……——我——會努力——啊——找到不知道的——舒服的——部位的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うん。探してみてくれ。\nいや、探してみよう。僕と、一緒に」
1076 = "「嗯，找找看吧。不，和我一起來尋找吧」" 

# 【ハチロク】
# display as 鈴
# JP: 「はいっ。んっ――双鉄、さまとっ、\nふたりで――あっ――、一緒、にっ」
1072 = "「嗯，嗯——和您一起，兩個人要一起——啊——」" 

# monologue
# JP: （くちんっ）
1816 = "（噗哧）" 

# monologue
# JP: 動かしていた腰を止め、\nすずは亀頭に、その膣口を押し当てる。
1676 = "鈴停下了腰的扭動，將陰道口對準了龜頭。" 

# monologue
# JP: すずの小さく細い指とは、まるで違う。\n自分の勃起が、これほど凶悪とは思わなかった。
1674 = "這和鈴纖細的手指完全不同。我從沒想過自己的肉棒會如此兇惡。" 

# 【ハチロク】
# display as 鈴
# JP: 「気持ち、いい……とこ――\nいつもと、違う……んっ――新しい――とこっ」
1170 = "「舒服的……部位——與平時不一樣的……——新的部位」" 

# monologue
# JP: （ずっ――るっ――）
1791 = "（呲——嚕——）" 

# monologue
# JP: ゆっくりゆっくり、すずのおまんまんが僕を飲み込む。\n膣口はぴっちり広がって、今にも切れてしまいそうだ。
1687 = "鈴的小妹妹慢慢地吞下了我。陰道口張得很開，彷彿要裂開了似的。" 

# 【双鉄H】
# display as 雙鐵
# JP: （なの、に――くっ――あっ――）
1787 = "（但是——嗯——啊——）" 

# monologue
# JP: １ミクロンの隙さえないのに、\nすずの膣肉はうごめいてくる。
1581 = "明明一微米的縫隙都沒有，鈴的陰道卻蠕動了起來。" 

# monologue
# JP: 僕の亀頭を歓迎し、どうぞこのままもっと奥へと、\n張り付きながら、やわやわキュウキュウすりあげてくる。
1500 = "它迎接著我的龜頭，讓我向內前進，貼得很緊，摩擦得卻又很溫柔。" 

# monologue
# JP: （ごしゅっ）
1795 = "（咕咻）" 

# 【ハチロク】
# display as 鈴
# JP: 「はひゅっ！？」
1017 = "「哎！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
# 783 = "「——」" 

# monologue
# JP: このまま奥へ、と思った瞬間、\nすずはぐりゅん、と腰を大きく回転させる。
1425 = "在我準備繼續向前的那一刻，鈴突然大大地扭了一下腰。" 

# monologue
# JP: きつく締め付け密着していた膣肉を、無理やり剥がされ\n拗じられるのが、気持ち良すぎて呼吸が止まる。
1666 = "貼得緊繃繃的陰道肉被扯了開來，這種擰巴的感覺舒服極了，讓我氣都來不及喘。" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ――ひゅっ――これっ――しゅごっ――」
1023 = "「啊——咻——這好厲害——」" 

# monologue
# JP: （ぐりゅっ！　ぐりゅっ！　ぎゅっ！　ぶりゅん！）
1801 = "（唔溜！唔溜！哧溜！噗溜！）" 

# monologue
# JP: 大きく何度も、すずの腰が跳ねる。\n不器用なのにとても綺麗な――酷く淫靡なダンスを踊る。
1694 = "鈴的腰跳起來了數次，彷彿是笨拙卻美麗的——極為色情的舞蹈。" 

# 【ハチロク】
# display as 鈴
# JP: 「ふあっ――あっ――知らない、とこっ――んっ――\nこすれて――これ――やっ――気持ち――いいっ」
1012 = "「呼啊——啊——不知道的部位——嗯——摩擦一下——這麼——哎——舒服——」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「おっと」
1016 = "「哎呀」" 

# monologue
# JP: 夢中になって動く弾みで上体が崩れそうになり、\n慌てて手を添え支えてやる。
1617 = "看她太沉迷了，上半身差點要癱下來，我趕緊用手幫她撐住。" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ――あっ！」
1024 = "「啊——啊！」" 

# monologue
# JP: （ずりゅんっ！！！）
1792 = "（呲溜！！！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「～～～～っ！」
1226 = "「～～～～！」" 

# monologue
# JP: 支えに安堵したせいか、\nすずの体重が前の方へと大きく動く。
1434 = "大概是因為有了支撐所以放心了吧，鈴的重心大大地前傾。" 

# monologue
# JP: 亀頭の裏が激しく摺られ、\n竿の全部がぎゅううっと前へ持っていかれる！
1744 = "龜頭內側被激烈地摩擦，整個肉竿都被向前用力一拔！" 

# 【ハチロク】
# display as 鈴
# JP: 「は、ひっ――」
1014 = "「哈——」" 

# monologue
# JP: すずのよだれが、僕の胸板にぼとぼと落ちる。
1691 = "鈴的涎水，啪嗒啪嗒掉上我的胸脯。" 

# monologue
# JP: （ずぼっ！　じゅぼっ！　じゅぼっ！　ぼちっ！）
1808 = "（啪！啾啵！啾啵！啵唧！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ここっ――んっ――こんなの、しら、ないっ――\nおまん、まん――膣の、壁、これ――気持ち――いいっ」
1189 = "「這——我從來不知道會這樣——小妹妹——陰道的，肉壁——這麼——舒服」" 

# monologue
# JP: （じゅぶっ！　じゅっ！　ぐりゅっ！　じゅぶっ！）
1811 = "（啾噗！啾！唔溜！啾！）" 

# monologue
# JP: 時折り、腰のグラインドも混ぜ、\nすずは体を、何度も何度も跳ねさせる。
1586 = "有時她還會扭腰，於是身體就會跟著反覆跳起。" 

# monologue
# JP: 僕もものすごく気持ちいい――が、\n同時に、あえかな不満も感じる。
1532 = "我也非常非常舒服——同時，也有些許的不滿。" 

# 【双鉄H】
# display as 雙鐵
# JP: （やはり、保守的だな、どうしても）
1843 = "（果然她還是太保守了）" 

# monologue
# JP: 一番最初に発見した、気持ちのいい場所。\nそこをただただ、繰り返し擦る。
1493 = "她還是只知道反覆摩擦最開始發現的舒服的部位。" 

# monologue
# JP: すずはもう、その一点だけに心を奪われ、\n探索を、すっかり止めてしまってる。
1699 = "鈴被那一點奪走了全部心神，完全不再繼續探索了。" 

# 【双鉄H】
# display as 雙鐵
# JP: （ここは、僕が手伝わねばな）
1830 = "（得有我來幫幫她）" 

# 【ハチロク】
# display as 鈴
# JP: 「んひいいっ！！？」
1062 = "「嗯咿！！？」" 

# monologue
# JP: （きゅううううううっ！！！）
1836 = "（插入！！！）" 

# monologue
# JP: 尻穴に指をいれた瞬間、膣が思い切り締めあげてきて、\n危うく射精しそうになる。
1565 = "手指插進屁眼的瞬間，陰道突然縮得非常緊，我差點就射了。" 

# 【ハチロク】
# display as 鈴
# JP: 「そう、てつ――さまっ！？　んきゅっ――そこっ――\nおひりっ――おしりの――穴、ですぅっ――んっ」
1218 = "「雙鐵少爺——！？嗯嗚——那是——屁股——屁股的——洞，嗯——」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。わかってる。\nわかった上で、ほじってる」
1074 = "「嗯，我知道。所以我才要鑽這裡」" 

# monologue
# JP: すずの尻穴はひどく熱い。\nそうしてつるんと、引っ掛かりのない感触だ。
1689 = "鈴的屁眼非常熱。有種光滑、毫無黏滯的感覺。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「普段は何に使うのだ？\nレイルロオドの[しりあな,1]尻穴は」
1210 = "「鐵路人偶的屁眼平時都是幹什麼用的？」" 

# 【ハチロク】
# display as 鈴
# JP: 「めったな――ことでは――ンッ――つかいま――\nひぇ、んっ――んう――ただ、どう、して、もっ――」
1149 = "「沒什麼——嗯——事情——會用上，嗯——嗚——只是，怎樣，也——」" 

# monologue
# JP: どうしても内部で燃焼しきれぬ異物を体外に排出する。\n基本、尻穴の用途も人間とほぼ変わらないものらしい。
1503 = "將體內怎樣都無法徹底燃燒的異物從屁眼排出體外。看來主體上和人類的屁眼用途相同。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば――だ」
1204 = "「那麼——」" 

# monologue
# JP: （くっ――くくっ――）
1815 = "（嗯——嗯——）" 

# 【ハチロク】
# display as 鈴
# JP: 「やっ――お指――んっ――おひりの、あなのっ――\nおく、いれちゃ――やぁっ」
1003 = "「呀——手指——嗯——屁眼的——裡頭，插進去了——啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「勉強したが。ここでするセックスもあるらしい。\nアナルセックスというのだが――」
1114 = "「我看過，有種性愛用的是這個洞。聽說叫肛交——」" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ――あなる……せっく――すっ」
1168 = "「肛——肛交……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そんなことまで人はするのだ。\n僕らも、せっかくのセックスなのだし」
1134 = "「是啊，人類還會用肛門性交。我們也要用好這次性愛的機會」" 

# 【ハチロク】
# display as 鈴
# JP: 「は、はひっ――開発、したい、ですっ――んっ、\n双鉄、さまと――いっしょの――セックス――ふあっ」
1127 = "「是、是——我也想開發——嗯——和雙鐵少爺——一起的——性愛——呼啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「痛っ！？」
1088 = "「好痛！？」" 

# monologue
# JP: 尻穴がギチリと締まってしまい、\nあわてふためいて指を抜く。
1511 = "屁眼突然勒緊，我慌忙抽出手指。" 

# monologue
# JP: 膣もきゅんきゅんと締め付けながら、\n無数のヒダで、僕を抱きしめ揉みしだいてくる。
1737 = "陰道也捆緊了，無數褶皺懷抱著我、揉搓著我。" 

# 【ハチロク】
# display as 鈴
# JP: 「け、けれど、わ、わたくしっ――\nいまっ――今は、もうっ！――んっ！」
972 = "「但、但是我，我——現在——現在已經！——嗯！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか。もう少しだけ我慢してくれ」
1193 = "「這樣啊，那你再忍耐一下吧」" 

# monologue
# JP: 余計なことを考えて、\n快感をむさぼることを怠ってしまった。
1548 = "我想了些多餘的事，疏忽了對快感的追求。" 

# monologue
# JP: 次のセックスは次のこと、\n今はただ、すずの可愛いおまんまんだけを――
1336 = "下次做愛是下次的事，現在我要專心在鈴可愛的小妹妹上——" 

# monologue
# JP: （ずぶうううううううううううっ！）
1835 = "（插——！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゃふっっ！？　きゅ、急に――双鉄、様っ！」
1006 = "「呀嗚！？這、這麼突然——雙鐵少爺！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いやか？」
1178 = "「討厭嗎？」" 

# 【ハチロク】
# display as 鈴
# JP: 「いやなことなど――んっ――うれひっ――\nわたくしっ――嬉しい――ですっ――ふあっ！」
964 = "「不討厭——嗯——好高興——我——好高興——呼啊！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだっ！」
1101 = "「我也是！」" 

# monologue
# JP: （ずっ！　じゅぶっ！　ずぼっ！　じゅぼっ！）
1794 = "（呲！啾！啪！啾啵！）" 

# monologue
# JP: すずの腰と僕の腰。\n動きが、最早シンクロしている。
1693 = "鈴的腰和我的腰。我們已經完全同步了。" 

# monologue
# JP: すずのおまんまんはもう完全に僕を覚えて、\nただ一箇所に、精を吐きだせと誘導してくる。
1686 = "鈴的小妹妹已經完全記住了我，誘導著肉棒在一個部位射精。" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ――来たっ！　ごつんっ――って――あっ、\n双鉄、さまの――おちんちんの――先っ」
1021 = "「啊——來！用力——啊，雙鐵少爺的——小雞雞的——前頭」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「おちんちんの、先は――なっ――くっ、あ――\n亀頭と――、一般には、言う――そう、だっ」
1089 = "「小雞雞的，前頭——嗯，啊——龜頭——就是一般稱呼——嗎」" 

# 【ハチロク】
# display as 鈴
# JP: 「きとう、好きっ――双鉄さまの、きとう、大好きっ！\n子宮に、ちゅって、キス、して――くれ――んふっ！！」
1106 = "「我喜歡龜頭——好喜歡雙鐵少爺的龜頭！親一親我的子宮吧——呼！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すずっ！　すずっ！！！」
1207 = "「鈴！鈴！！！」" 

# monologue
# JP: ぼたぼた垂れるよだれが、汗が、\n僕に染み込み精液になり、溢れ出そうと暴れてる。
1416 = "啪嗒啪嗒淌下的涎水和汗水，滲入我的肉棒化為精液，激烈地想要噴出。" 

# monologue
# JP: すずの膣内も熱くほぐれて、\n繋がる部分が融け合うようで、ただひたすらに気持ちいい。
1696 = "鈴的陰道也很熱、很鬆弛，相連的部位彷彿融為了一體，真的舒服極了。" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま！　双鉄さまぁ！」
1220 = "「雙鐵少爺！雙鐵少爺！」" 

# monologue
# JP: （ばちゅんっ！　じゅっ！　じゅぶっ！　じゅぱっ！）
1807 = "（啪啾！啾！啾！啾啪！）" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ！　あっ！　あっ！　あっ！」
1038 = "「啊！啊！啊！啊！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ、もうイクっ――」
1102 = "「我也要高潮了——」" 

# monologue
# JP: 腰が、一瞬だけ止まる。\n僕のも、すずのも、示し合わせでもしたかのように。
1648 = "腰停了一下。我和鈴彷彿說好了一般……" 

# monologue
# JP: そうして、やはり二人同時に！
1605 = "然後兩人在同一刻！" 

# 【ハチロク】
# display as 鈴
# JP: 「いっ、くうぅぅぅぅぅぅぅぅぅぅっっ！！」
966 = "「丟了嗚嗚嗚嗚——！！」" 

# monologue
# JP: （ずりゅううううううううううううっ！）
1828 = "（噝溜——！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
1037 = "「啊！」" 

# monologue
# JP: （びゅばっ！　びゅっるっ！　どびゅっ！　びゅぶっ！）
1818 = "（噗啪！噗嚕！咕噗！噗！）" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ――あつっ――熱いっ――んっ――\n精液――せいえきっ――双鉄様、のっ――」
1026 = "「啊——好熱——好熱——嗯——精液——精液——雙鐵少爺的——」" 

# monologue
# JP: （びゅるっ！　びゅっ！　びゅるるっ！　びゅうっ――）
1823 = "（噗！噗！噗嚕！噗嚕——）" 

# 【ハチロク】
# display as 鈴
# JP: 「はっ――あっ――ああっ――～～～んっ――ふあっ――\nあっ！？」
1015 = "「哈——啊——啊啊——～～～——呼啊——啊！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！？」
# 1069 = "「嗯！？」" 

# monologue
# JP: 驚いたような声に慌てて顔を向ければ、\nすずは指先をスプーンにして、結合部から溢れた精を――
1639 = "聽到她驚慌的聲音，我趕緊轉過來一看，鈴從結合部位用手舀了一點淌出的精液——" 

# 【ハチロク】
# display as 鈴
# JP: 「あーーーーーんっ――んっ――こくっ」
1034 = "「啊嗯———嗯——啊嗚」" 

# monologue
# JP: 丁寧に、丁寧に、漉き拭って、飲み干している。
1458 = "她很小心翼翼地擦在手上，喝了下去。" 

# monologue
# JP: これほど濁ったものを何故と、\n少し不思議に感じてしまう。
1597 = "為什麼會吃這麼渾濁的東西呢？我有些不可思議。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「精液の……味が、好きなのか？」
976 = "「你喜歡精液的……味道嗎？」" 

# 【ハチロク】
# display as 鈴
# JP: 「いえ――そういうわけでもございませんが――\nんくっ」
963 = "「不是的——不過——嗯嗯」" 

# monologue
# JP: 言いながらも、まだ溢れだす精液を、\n丹念にぬぐっては舌へ乗せてく。
1450 = "她又精心揩掉了繼續溢出的精液，舔掉了。" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様の、赤ちゃんのたねでございますから。\n水に流れたり乾いたりしては、かわいそうです」
1191 = "「這是雙鐵少爺的，小寶寶的種子。沖掉或者白白放乾就太可憐了」" 

# monologue
# JP: きっぱり言って。\nすずは自分のおなかにそうっと、手を当てる。
1488 = "她說得很直接。鈴把手貼到自己的肚子上。" 

# 【ハチロク】
# display as 鈴
# JP: 「ですから、わたくしのお腹の中で。双鉄様の精液が。\nわたくしの、一部になってくれたら嬉しいな、と」
1121 = "「所以雙鐵少爺的精液就收在我的肚子裡。我想能成為我的一部分就好了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すず」
1206 = "「鈴」" 

# 【ハチロク】
# display as 鈴
# JP: 「あ――」
# 1020 = "「啊——」" 

# monologue
# JP: 愛おしくなり、抱きしめる。
1482 = "她真可愛，我抱住了她。" 

# monologue
# JP: 僕の手の中、すずはほうっと幸せそうな息を吐き、\nやがて、うふふと小さく微笑む。
1677 = "鈴在我的懷抱中幸福地呼氣，不久，又輕輕地微笑起來。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「どうした？」
1098 = "「怎麼了？」" 

# 【ハチロク】
# display as 鈴
# JP: 「いえ、ただ双鉄様の磨き洗いが……\n本当に素敵で、気持ちよかったなって、思って」
1148 = "「沒事，只是您的刷洗……真是太棒了，太舒服了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1057 = "「嗯」" 

# monologue
# JP: 言われて、つられて思い出す。
1492 = "她這麼一說，我才想起來。" 

# monologue
# JP: そうだ、僕らがやるべきことは、\nセックスではなく――
1504 = "對了，我們應該做的事，不是做愛——" 

# 【ハチロク】
# display as 鈴
# JP: 「おかげさまで、パワーも百倍です。\nお風呂、ピカピカに磨いて綺麗にしてあげられます」
1157 = "「現在我精神百倍，一定會把浴室打掃得閃閃發亮」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか！」
1192 = "「這樣啊！」" 

# monologue
# JP: すずの笑顔に元気を貰う。\n射精後のけだるさを払い、立ち上がる。
1692 = "鈴的笑容給了我動力。我甩掉射精後的懈怠感，站起來。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、一気に取り掛かろう」
1200 = "「那就一口氣解決吧」" 

# 【ハチロク】
# display as 鈴
# JP: 「はい！」
1138 = "「是！」" 

# monologue
# JP: けれどもすぐにお尻に手をやり、もぞもぞと振る。
1356 = "但她又馬上摸了摸自己的屁股。" 

# 【ハチロク】
# display as 鈴
# JP: 「あの、双鉄様？」
1198 = "「那個，雙鐵少爺？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
# 1081 = "「嗯？」" 

# monologue
# JP: 求められるまま耳を寄せれば、他には誰もいないのに、\nすずは小さく小さく、囁く。
1550 = "我把耳朵湊到了她嘴邊。明明旁邊沒人在，鈴也壓低聲量偷偷跟我說道。" 

# 【ハチロク】
# display as 鈴
# JP: 「次はもっと新しい、今まで知らない、気持ちいい場所、\nわたくし、がんばって探しますから」
961 = "「下次我一定會找到一個更新的、以前不知道的舒服部位」" 
