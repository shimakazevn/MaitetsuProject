[script]
# lines: 327 
# 【ハチロク】
# display as 鈴
# JP: 「ごしごし、ごしごし」
1013 = "「咯哧咯哧，咯哧咯哧」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぅ、む……」
1045 = "「嗯……」" 

# monologue
# JP: 乗務の後の登呂流湯で、\nハチロク――すずに背中を流して貰う。
1423 = "在乘務結束後的登呂流湯，八六——鈴在幫我洗背。" 

# monologue
# JP: いつもながらの生き返るようなひとときが、\nけれども今日は、いつもと違う。
1521 = "平時泡的話我一定會甩去疲憊、重獲新生，但今天與平時不同。" 

# 【ハチロク】
# display as 鈴
# JP: 「整備に手間取ってしまったおかげで、\nかえって得をしてしまいましたね」
1195 = "「還好花時間準備了，居然能收穫這樣的好處」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、\n登呂流湯のご主人にはご厚意をいただいてしまったな」
1031 = "「啊啊，感謝登呂流湯老闆的關照了」" 

# monologue
# JP: 営業運転中に僕らが感じた、極めて微妙な異常振動。\nその原因は、動輪に張り付いていた黒い粘着テープだった。
1414 = "商業營運時我們感受到了極小的異常震動，發現原因是驅動輪上黏著的黑色膠帶。" 

# monologue
# JP: だったのだが、あまりの単純さと視覚的な紛らわしさから、\nまさに盲点を突かれてしまい、発見に手間取らされたのだ。
1363 = "但由於原因太單純，膠帶又不好辨別出來，所以反而成了盲點，花了很多時間才發現。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「二十三時を過ぎていたのに、\n風呂に入れてもらえるとはな」
1194 = "「過了十一點居然還能泡澡」" 

# 【ハチロク】
# display as 鈴
# JP: 「ありがたいお話です」
1087 = "「太叫人感激了」" 

# monologue
# JP: 言いながら、すずは手桶を湯で満たし、\n飛び散らないよう気をつけながら、僕の体へと注ぐ。
1684 = "鈴用熱水裝滿提桶，小心翼翼地幫我沖洗身體。" 

# 【ハチロク】
# display as 鈴
# JP: 「とは申しましても、これほど大きなお風呂のお掃除、\nきっと大変なことでしょうけれど」
1160 = "「畢竟打掃這麼大的澡堂絕對不容易」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「まぁ、ぼちぼちとやればいいさ。\n時間無制限の、完全貸切風呂なのだから」
1099 = "「慢慢來就行了。反正是沒有時間限制的包場」" 

# monologue
# JP: もう閉まっているだろうと半ば以上は覚悟しながら\nそれでも登呂流湯を訪ねた僕らに。
1536 = "我們覺得澡堂可能已經關門了，但還是來登呂流湯探探情況。" 

# monologue
# JP: ご主人は、『もう寝るけん。勝手に入って湯ば落として、\n掃除して帰ればそいでよか』と合鍵を預けて下さった。
1636 = "老闆說她要睡了，給了我們備用鑰匙，讓我們進去泡澡，順便打掃一下衛生再回去。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ピカピカに磨き上げて返そう。\nそれが、せめてもの恩返しだ」
1203 = "「那肯定要打掃到閃閃發亮，也算是一點心意」" 

# 【ハチロク】
# display as 鈴
# JP: 「左様ですね。双鉄様のお体のようにピカピカに、\n丁寧に磨き洗いをいたしましょう」
1132 = "「是啊。一定要好好刷洗到跟您的身體一樣閃閃發亮」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ。だが、その前に」
1070 = "「嗯，但在那之前——」" 

# monologue
# JP: 椅子からたって、すずの両肩に手をあてる。
1545 = "我從椅子上站起來，扶住鈴的雙肩。" 

# monologue
# JP: そしてそのままくるり体勢を入れ替えて、\n僕の座ってた風呂椅子へと腰掛けさせる。
1606 = "然後讓她坐在了我剛剛坐的澡堂凳上。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すずの体を、ピカピカに洗ってやらねばな」
1096 = "「得把你的身體也洗得閃閃發亮」" 

# 【ハチロク】
# display as 鈴
# JP: 「あ――」
1020 = "「啊——」" 

# monologue
# JP: くすりと、すずが微笑する。
1695 = "鈴的臉上露出微笑。" 

# 【ハチロク】
# display as 鈴
# JP: 「その状態の双鉄様に体を洗っていただいたら、\n洗い場が、精液で汚れてしまいそうです」
1173 = "「要是現在的您幫我洗身子，洗澡的地方就要被精液弄髒了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
1081 = "「嗯？」" 

# monologue
# JP: 言われて、気づく。
1439 = "她一說我才發現。" 

# monologue
# JP: いつの間にか完全に勃起して――\nどころかヒクつき、先走りまで滲ませている。
1642 = "肉棒早已經完全勃起——甚至都開始顫抖，分泌預射液了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「や……考えてみれば当然か。大好きな嫁に手洗いされて、\n勃起をしないわけがない」
1190 = "「這……這也是當然的，心愛的妻子洗我的身子，我肯定會勃起啊」" 

# 【ハチロク】
# display as 鈴
# JP: 「まぁ」
1082 = "「嘻嘻」" 

# monologue
# JP: すずは嬉しげな笑みをこぼして――
1681 = "鈴樂呵呵地笑了——" 

# monologue
# JP: （ちゅっ）
1814 = "（啾）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1221 = "「！」" 

# monologue
# JP: 勃起の先端。\n亀頭と呼ばれるらしいところに、キスしてくれる。
1641 = "肉棒尖端。她吻到了這個被稱為龜頭的位置。" 

# 【ハチロク】
# display as 鈴
# JP: 「これほど熱いおちんちんです。大好きな嫁のわたくしの、\n体をこしこし、丁寧に洗ってくださってたら――」
1090 = "「小雞雞這麼熱了。要是為心愛的妻子——為我仔仔細細地洗身子的話——」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「確かに、それだけで射精してしまいかねんな」
1164 = "「的確可能就射精了」" 

# 【ハチロク】
# display as 鈴
# JP: 「ええ。ですので――」
1052 = "「嗯。所以——」" 

# monologue
# JP: 短い舌を精一杯に伸ばしてすずは、\n唇のまわりをねろりと、ゆっくり舐め回す。
1682 = "鈴用力伸出了短短的舌頭，慢慢地舔了一圈嘴唇。" 

# 【ハチロク】
# display as 鈴
# JP: 「洗い場を汚さないよう、一度すっきり、\n射精をしていただいた方が、よろしいかと」
1155 = "「為了不弄髒洗澡的地方，最好先痛快地射一次精吧」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いや、しかし……\n射精をしたら汚してしまうのだろう？」
974 = "「但是……射精會弄髒的吧？」" 

# monologue
# JP: 無論、僕にもわかってる。\nすずのいやらしい舌の動きが、射精すべき場所を示した。
1557 = "我當然明白。鈴淫蕩的舌頭動作，已經指明了射精的地點。" 

# monologue
# JP: わかっていても、\nすずの口から、はっきり聞かせてもらいたい。
1361 = "但是，我想聽她一個字一個字地說出來。" 

# 【ハチロク】
# display as 鈴
# JP: 「はい。\nですから、わたくしのお口の一番奥に――」
1050 = "「嗯。就是射在我嘴的最裡面——」" 

# monologue
# JP: ああん、と、すずが大きく口を開いてみせる。
1678 = "鈴張大了嘴。" 

# monologue
# JP: 赤くぬらつくその中には、\n小粒で白い歯たちが綺麗に整列してる。
1397 = "又紅又滑溜的小嘴裡整齊排列著小粒的白牙。" 

# 【ハチロク】
# display as 鈴
# JP: 「――双鉄様のおちんちんをお迎えして、\n精液を、一滴もこぼさず飲み干しますので」
787 = "「——我會迎接雙鐵少爺的小雞雞，一滴也不漏地喝光精液」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、頼む」
1123 = "「拜託了」" 

# 【ハチロク】
# display as 鈴
# JP: 「はい。お任せください、双鉄様」
1055 = "「嗯。請交給我吧，雙鐵少爺」" 

# monologue
# JP: （ちゅろぉぉぉっ）
1813 = "（啾嚕）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「なっ」
1028 = "「啊」" 

# monologue
# JP: 予想外の冷たい感触。\nボディソープが、僕の勃起の全体にとろとろかけられる。
1528 = "想不到會這麼涼。我的肉棒布滿了沐浴液。" 

# 【ハチロク】
# display as 鈴
# JP: 「わたくし、そのままの双鉄様のおちんちんの、\nむわっ、とした熱い匂いが大好きなのですけれど」
1217 = "「雖然我喜歡您的小雞雞那種熱烈濃郁的氣味」" 

# monologue
# JP: （しにゅっ）
1838 = "（握）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1221 = "「！」" 

# monologue
# JP: すずの両手が、僕の勃起を泡立てていく。
1697 = "鈴的雙手在我的肉棒上搓出了肥皂泡。" 

# monologue
# JP: 両側から揉み込むようにして、\n亀頭の先から玉の裏まで、全部をあわあわにしてしまう。
1459 = "她從兩側一點點向內揉，讓龜頭頂到睪丸內側都擠滿了肥皂泡。" 

# 【ハチロク】
# display as 鈴
# JP: 「さきほど一度洗ってしまったものですから。\n今宵ばかりは、徹底的な磨き洗いをいたしましょう」
1086 = "「因為剛才洗過一次。今晚就徹底洗個乾淨吧」" 

# monologue
# JP: （しゅこんっ）
1834 = "（捋）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぁっ――」
# 1020 = "「啊——」" 

# monologue
# JP: 筒にした手が、しごいてくれる。\n普段と違うぬらつきに、お尻の穴がきゅっと締まる。
1474 = "她的手環成筒形，套弄起了肉棒。與平時不同的滑溜觸感讓我舒服得收緊了肛門。" 

# 【ハチロク】
# display as 鈴
# JP: 「あわあわ、しゅこしゅこ、あわ、しゅこしゅこっ」
1152 = "「泡泡，捋捋，泡，捋捋」" 

# monologue
# JP: リズムをとって、すずは僕をしごき続ける。
1680 = "鈴有節奏地套弄著。" 

# monologue
# JP: 亀頭のくびれが、筒にした手からはみ出てしまう、\nそのギリギリまで手を引いて――
1385 = "冠狀溝部分要從手中溜出來了，她套弄到這個極限的位置——" 

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ」
1009 = "「呵呵」" 

# monologue
# JP: （ずりゅんっ！）
1793 = "（呲溜！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ――ぉっ――」
784 = "「——哦——」" 

# monologue
# JP: 噛み締めても噛み締めても声がこぼれる。
1410 = "咬緊牙關也還是會發出聲音。" 

# monologue
# JP: 泡で滑ってしまう分、手のひらの熱と摩擦が無い分、\n快感としては弱いのだけれど――
1645 = "肥皂泡的潤滑、手心的熱量、少掉的摩擦，雖然都是不強的快感——" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまのおちんちん、\nあわあわ、しゅこしゅこ、きれい、きれい」
1219 = "「雙鐵少爺的小雞雞，泡泡，捋捋，變乾淨，變乾淨」" 

# monologue
# JP: 無邪気なような言葉と手つきと、\n純白にふわふわ浮く泡と。
1436 = "天真爛漫的言詞和手勢，純白又輕飄飄的泡泡。" 

# monologue
# JP: （しゅこ！　しゅっ！　しにゅっ！　すりゅっ！）
1833 = "（捋！捋！握！滑！）" 

# monologue
# JP: その中でしごき立てられ、時折り覗く自分の勃起の\n醜いまでの赤黒さとの対比に興奮させられる。
1383 = "再與其中被手揉搓的、時而顯露的肉棒醜陋的紅黑色一對比，我就覺得很興奮。" 

# 【双鉄H】
# display as 雙鐵
# JP: （これほど可憐な手のひらが、\nこんなにも剥き出しの欲望を――）
1845 = "（這麼可愛的手掌，與這麼赤裸的欲望——）" 

# monologue
# JP: 嬉しげに、懸命に奉仕してくれている。\n僕が、奉仕をさせている。
1496 = "她高興又用心地為我服務著。我讓她為我服務著。" 

# monologue
# JP: 独占欲と支配欲、達成感がぞくぞくと胸に沸き起こり、\nそれはすぐさま、精の高まりへと直結していく。
1613 = "獨占欲、控制欲與成就感陸續在心裡湧起，推動著我射精感的奔湧。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すず――このままだと――出て、しまう」
1205 = "「鈴——這樣下去——我會射的」" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ」
# 1028 = "「啊」" 

# monologue
# JP: 慌てたような声を出し、すずはぴたりと手を止める。
1461 = "她慌張地叫出聲來，停下了手上的動作。" 

# monologue
# JP: そして手桶をまた湯で満たし、\nちょろちょろと細く垂らして、勃起の泡を流してく。
1449 = "她又用熱水裝滿提桶，一點點地倒下，洗掉肉棒上的泡泡。" 

# 【ハチロク】
# display as 鈴
# JP: 「すみずみまでを、ピカピカに」
1175 = "「要每個角落都洗得閃閃發亮才行」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ」
1057 = "「嗯」" 

# monologue
# JP: 皮を摘まれ、その内側にまでゆるゆると湯を流し込まれる。
1395 = "包皮被她剝開，肉棒內側都被沖洗到了。" 

# monologue
# JP: そうしてすずは自分の手を湯につけ濡らし、\nゆっくりゆっくり、僕の勃起を擦り洗いつつ検分していく。
1607 = "然後鈴把手浸在熱水裡，慢慢地擦洗並檢查著我的肉棒。" 

# 【ハチロク】
# display as 鈴
# JP: 「うん。上等の仕上がりです。双鉄様のおちんちん、\nぴかぴかの、きれいきれいになりました」
1054 = "「嗯。效果太好了。雙鐵少爺的小雞雞，閃閃發光的很乾淨」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか、ありがとう」
1137 = "「是嗎，謝謝」" 

# 【ハチロク】
# display as 鈴
# JP: 「ですので、今度は」
1117 = "「所以……」" 

# monologue
# JP: ぺろ、と舌先が可愛く覗く。
1480 = "她的舌尖可愛地探了出來。" 

# 【ハチロク】
# display as 鈴
# JP: 「おちんちんの中の方。\nすっきり綺麗にいたしましょうね？」
1179 = "「該把小雞雞裡面也清理乾淨了吧？」" 

# monologue
# JP: （ぱくっ）
1806 = "（啊嗚）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
783 = "「——」" 

# monologue
# JP: 刺激が強すぎないように、\nすずは大きく口を開いて、ただ、くわえ込む。
1679 = "鈴張大嘴含住了肉棒，她不想立刻刺激到我。" 

# 【ハチロク】
# display as 鈴
# JP: 「ん……」
# 1045 = "「嗯……」" 

# monologue
# JP: 動かない。舐めもすすりも吸い込みもしない。
1447 = "她動也不動，不舔舐、不啜飲、不吮吸。" 

# monologue
# JP: なのに僕の下腹に当たる、鼻からすひすひ漏れる排気は、\n一瞬ごとに熱と荒さとを増していく。
1609 = "然而鼻子呼出的氣打在我的下腹上，讓我每一刻都在發熱和失控。" 

# 【双鉄H】
# display as 雙鐵
# JP: （咥えてるだけでそれほどに？　いや――）
1789 = "（含著就這麼有感覺嗎？不對——）" 

# monologue
# JP: すずの手が、股の間に潜ってる。
1690 = "鈴的手鑽進了胯間。" 

# monologue
# JP: 自分の指で自分のおまんまん……\nその肉の割れ目の間に、短い指を埋めている。
1471 = "她用自己的手指對自己的小妹妹……用短小的手指堵住了蜜縫。" 

# 【ハチロク】
# display as 鈴
# JP: 「ふ……す……」
1010 = "「呼……」" 

# monologue
# JP: 口がふさがってるせいなのか、\n声を、意識して殺しているのか。
1407 = "可能是因為嘴堵住了，所以她主動壓下了聲音吧。" 

# monologue
# JP: もれてくるのは、ただただ熱い排気だけ。\nそこにくちゅりと、湿った音がまじり始める。
1538 = "我只能聽到她溫熱的喘息聲，以及另一種潮濕的水聲。" 

# 【双鉄H】
# display as 雙鐵
# JP: （ああ……そこも気持ちいいのか）
