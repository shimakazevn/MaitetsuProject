[script]
# lines: 498 
# 【ハチロク】
# display as 八六
# JP: 「あーーーーーん、むっ」
1809 = "「啊——嗯，唔」" 

# monologue
# JP: いつものように、体温計をくわえさせる。
2583 = "八六駕輕就熟地把體溫計含在了嘴裡。" 

# monologue
# JP: ハチロクがくわえたのとは反対側の端っこを、\n一分間、僕は律儀に保ちつづける。
2914 = "而我則是輕輕地扶著體溫計的另一端，靜靜地等著這一分鐘從身邊溜走。" 

# monologue
# JP: （ピピピっ、ピピピっ、ピピピっ）
3078 = "（蜂鳴音）" 

# 【双鉄】
# display as 雙鐵
# JP: 「時間だ」
2044 = "「時間到了」" 

# 【ハチロク】
# display as 八六
# JP: 「ん――――ぷ、ぁ」
1841 = "「嗯——噗啊」" 

# monologue
# JP: 口からそっと体温計を抜きとれば、\nハチロクは、ごくさりげなく表面を拭く。
2764 = "我小心地把體溫計從八六口中取出，她順勢輕描淡寫地把表面擦乾淨。" 

# monologue
# JP: この一年を丁寧に丁寧にすごす間に、\nそれもまた、すっかりルーチンとなってしまったようだ。
2465 = "一年過去，這些細微的來回動作，也已成為了我們之間的一種默契。" 

# 【双鉄】
# display as 雙鐵
# JP: 「38度4分。余裕で稼働安全圏だな」
2276 = "「３８.４度，在安全範圍內，離危險溫度還遠」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふっ、よろしうございました」
1857 = "「嘻嘻，那真是太好了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――」
1808 = "「啊——」" 

# monologue
# JP: けれど、いつもの流れが途切れる。
2631 = "可是接下來情景卻是有別於往常。" 

# monologue
# JP: 「へーねつー」と、\n楽しげなオリヴィの声が飛んでこない。
2467 = "一般這時會聽到奧莉薇的一句“體溫正常”，此刻卻並未聽到她高興的聲音。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「やだなー。ちょっと高い」
2158 = "「討厭啦，有點高哎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「何度だ？」
1875 = "「多少度？」" 

# monologue
# JP: オリヴィが差し出してくる体温計を受け取れば――
2754 = "我伸手接過了奧莉薇遞來的體溫計一看——" 

# 【ハチロク】
# display as 八六
# JP: 「41度ちょうど。\n――警戒域の数値ですね」
1862 = "「四十一度整——這溫度已經進入警惕範圍了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、今日は休むしかないな」
2223 = "「那今天就只能休息了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えーーーーっ！」
1963 = "「怎麼這樣～～！」" 

# monologue
# JP: 途端にオリヴィの頬が膨れる。
2773 = "我話音未落，奧莉薇就鼓起了小臉。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「こんなの、0.1度下がったらカドーアンゼンケンだし！\nそれに今日はヒビキたちのっ」
2193 = "「這再低個零點一度就是安全範圍內了嘛！而且今天還是日日姬她們——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今日がどういう日であるかなら、\nもちろん僕も承知している。が――」
1973 = "「我當然清楚今天是什麼日子，可是——」" 

# 【ハチロク】
# display as 八六
# JP: 「0.1メートル。\x%l閉塞;#00ffc040;閉塞%l;#;を越えてしまったら、\nそれは[ぼうしん,1]冒進。事故になります」
1915 = "「如果進入了\\x%l閉塞;#00ffc040;閉塞%l;#;區間，哪怕只有零點一公尺，那都是冒進，是事故」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あうっ」
1824 = "「啊嗚」" 

# monologue
# JP: 正論だ。\n一切、反論の余地が無い。
2577 = "八六的道理完全正確，毫無辯駁的餘地。" 

# 【ハチロク】
# display as 八六
# JP: 「境界を都合にあわせ動かすのなら、安全は守れませぬ。\n他ならぬオリヴィちゃんが、その程度のことを」
1912 = "「如果為圖方便隨意變更標準範圍，又談何保障安全。奧莉薇，這話從你嘴裡說出來可就太不應該了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなのもちろんわかってる！」
1889 = "「奧莉薇當然也知道啦！」" 

# monologue
# JP: ゆえ、オリヴィも同意する。\n同意して――それでも頬はふくれたままだ。
2780 = "所以奧莉薇也只得表示同意。雖然同意是同意了——臉頰卻還是那氣鼓鼓的樣子。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかってる、けど――\nけど！　今日は、オリヴィ乗務しないし」
2111 = "「知道是知道——可是今天奧莉薇又不是要執行乘務任務！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや。教導も立派な乗務だ」
1665 = "「不對哦，指導也毫無疑問屬於乘務任務」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だとしても、っていうか、\nリッパでダイジなことならなおさらっ」
1945 = "「就算這樣，不對，既然屬於重要的任務，那就更加……」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん」
1887 = "「奧莉薇」" 

# monologue
# JP: 静かな声。
2575 = "八六的聲音無比平靜。" 

# monologue
# JP: 『どうぞ落ち着いてください』と、\nその響きだけで伝わってくる。
3017 = "雖未明說，言語中卻流露出她的意思——“請冷靜一些，不要激動”。" 

# 【ハチロク】
# display as 八六
# JP: 「秋の色は日に日に濃さを増してはおります。けれどまだ、\n運転台内の気温は、優に五十度を超えてしまいます」
2268 = "「雖說是一陣秋風一陣涼，但駕駛台上的氣溫卻仍常在五十度以上」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その気温では、下がる体温も上がってしまう。\n上がってしまえば、削られるのはオリヴィの寿命だぞ」
1866 = "「在那溫度下，本已降低的體溫也很可能會再升高。若是如此，削減的可是奧莉薇的壽命啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも――」
1778 = "「可是——」" 

# monologue
# JP: 頭では理解できている。\nそれでも、どうしても乗務したい。
2698 = "她雖然明白這個道理，可儘管如此還是想執行乘務任務。" 

# monologue
# JP: 言葉にはまとまりきらぬ言葉から、\nオリヴィの強い気持ちも、また痛い程に伝わってくる。
2727 = "就在奧莉薇這不甚成句的隻言片語間，我不禁痛感她心中願望之強烈。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それでもオリヴィやっぱりっ！」
1946 = "「就算這樣，奧莉薇還是！」" 

# 【ハチロク】
# display as 八六
# JP: 「削られてしまうその一日――いえ、何時間、何十分を。\nのちほどひどく、悔いてしまうかもしれませんよ？」
2152 = "「若因此而削減了一日——不，或許是數小時，數十分，日後說不定會追悔莫及哦」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！！」
1806 = "「唔！！！」" 

# monologue
# JP: 静かな声の――けれども、極めて重い指摘だ。\n僕でさえ、否応なしに想像を余儀なくされてしまう。
2962 = "語調平靜——卻直擊痛處。連我都不由得設身處地產生想像。" 

# monologue
# JP: 『その一分』が足りぬため、もしも宗方さんとオリヴィが、再会しそこねるようなことがあったら――
2935 = "若因這“一分一秒”，而讓奧莉薇與和宗方的重逢擦肩而過——" 

# 【ハチロク】
# display as 八六
# JP: 「焦らず、大事に。ここまでの時間を、\nそうして重ねて来たのではありませんか」
1667 = "「不急不躁，腳踏實地。我們不是已經這樣一路走過來了嘛」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ううううう～っ！！」
1839 = "「嗚嗚嗚～！！」" 

# monologue
# JP: 僕でさえ思うことならば、\nオリヴィにとってはひとしおだろう。
2992 = "連我都能想到的道理，想必奧莉薇心裡只會更清楚才對。" 

# monologue
# JP: ならば、想いは止まらない。
2808 = "既然這樣，那她顯然也是有自己的打算。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だけど――やっぱり、それでも今日だけはっ」
1779 = "「可是——想來想去，最起碼今天還是……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……オリヴィ」
1350 = "「……奧莉薇」" 

# monologue
# JP: 待ちに待った来春からの宗方さんとの時間を秤にかける程。\n今日の乗務を、引き継ぐことを、大事に考えてくれている。
2854 = "明年春天，讓她望穿秋水的宗方先生就要來了。而今天的乘務任務於她的重要性，竟能與宗方一較高下。" 

# monologue
# JP: であるのなら、オリヴィの気持ちを大事にしたい。\nそう考えれば、自然と言葉が湧き出してくる。
2803 = "既然如此，我又何嘗不想尊重她的想法。想到這裡，我便自然地開口接著說了下去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ここは、逆側から考えてみてはくれんか」
2100 = "「現在不如反過來想一想如何」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「逆側？」
1770 = "「反過來？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。つまり、『乗らぬことこそを、教導とする』と」
2028 = "「是啊，也就是說“不去陪同也是一種指導”」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「乗らないことが――教導？」
1663 = "「不去陪同——也是一種指導？」" 

# monologue
# JP: ことん、とオリヴィの首が傾く。
2979 = "這話把奧莉薇一下子弄呆了。" 

# monologue
# JP: 思考の角度も、恐らく少しは変わっただろう。\nその手応えが、僕の唇をなめらかにする。
2690 = "她思考的角度想必也發生了些許的變化吧。而她的反應，也讓我更加堅定自己的意見。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。『いざとなったらオリヴィが代わってくれる』。\nその安心感なしの乗務をもって、教導の仕上げとする」
1940 = "「對，這樣一來便沒有“萬一有情況時奧莉薇會接管”帶來的安心感，而實現獨自執行乘務任務，可謂是指導的終極目標」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー」
# 1808 = "「啊——」" 

# monologue
# JP: 妙に力の抜けた声。
2694 = "她的聲音中似乎少了一絲強硬。" 

# monologue
# JP: 頬の膨れが、口の尖りが、\nそれと同時に解消される。
3051 = "鼓著的臉頰，撅著的小嘴，也都放鬆了下來。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっかー。それもアイディアだねー」
1937 = "「對哦，這也是一個主意」" 

# 【ハチロク】
# display as 八六
# JP: 「ですね。\nわたくしも、素晴らしいご提案かと存じます」
2037 = "「是的。我也覺得這個建議很不錯」" 

# monologue
# JP: ごくごく静かに、穏やかに。\nハチロクも後押ししてくれる。
2563 = "八六不動聲色地支持著我。" 

# 【ハチロク】
# display as 八六
# JP: 「この案でしたら、\nわたくしも外れた方がよろしいでしょう」
1911 = "「如果按這個思路的話，那我是不是也應該迴避呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぬ」
1802 = "「唔」" 

# monologue
# JP: 言われた瞬間不安にかられ、\nだから、そうかと理解する。
2925 = "聽她這麼一說我心中湧起了一絲不安，但也讓我更加理解了其中關鍵所在。" 

# monologue
# JP: ハチロクの添乗もまた、この上無く心強い保険ゆえ――\nそれもまた外すことでこそ、真の実力を試し得るのだと。
2702 = "如果有八六陪同，那想必會讓人不能更放心——但正因如此，她不在場的話，更能體現車組的真正實力。" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんとご一緒に、レールショップで。\n定刻どおりのⅨ号機関車入線を待たせていただきます」
2239 = "「那我就和奧莉薇一起，在鐵路商店等待九號機車準時進站吧」" 

# monologue
# JP: こくり、オリヴィが小さく頷く。
2685 = "奧莉薇輕輕地點了點頭。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……ニイロクは、もうⅨ号を自分のものにできてる。\nアカイグージと組んでるときは」
1341 = "「……二六在和赤井宮司搭檔的時候，已經可以把九號駕駛得爐火純青了」" 

# monologue
# JP: “赤井宮司と組んでるときは”――\n実に冷静、かつ的確な現状評価だ。
1272 = "“和赤井宮司搭檔的時候”——的確是對現狀冷靜而切實的評價。" 

# monologue
# JP: オリヴィは僕らの案に納得し、\n完全に落ち着いてくれたのだなと、ホっとする。
2875 = "由此可見奧莉薇已經接受了我們的建議，而且完全冷靜了下來，我也隨之鬆了一口氣。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、今日。ヒビキ-ナギとニイロクだけで。それで\nちゃんと運用できれば、オリヴィ、安心して引退できる」
1991 = "「所以如果今天光靠日日姬、凪和二六她們幾個，也能順利駕駛的話，奧莉薇就可以安心引退啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
1807 = "「唔！？」" 

# monologue
# JP: 引退とまで言われた瞬間、自分の不明を思い知る。
2923 = "聽她說出“引退”二字，我意識到自己剛才實在想得太膚淺。" 

# monologue
# JP: 今日の試験に日々姫チームが合格すれば、\nオリヴィは教導のすべてを終える。が、そうなれば――
2699 = "如果日日姬車組今天的試運營合格的話，奧莉薇的指導工作就全部完成了。但那樣的話——" 

# 【ハチロク】
# display as 八六
# JP: 「あのっ、オリヴィちゃん？　今日の引退と、\nそこまで一気に決めずとも良いのではないでしょうか？」
2205 = "「這，奧莉薇？也不用這麼急著今天就引退吧？」" 

# monologue
# JP: ハチロクもまた、僕と同じく思うのだろう。\n珍しく、目に見えて慌てた様子だ。
2570 = "八六想來也是和我想的一樣了，因為她現在這一目了然的慌張樣子著實少見。" 

# 【ハチロク】
# display as 八六
# JP: 「教導を終えたとて、そのっ」
1750 = "「即便指導已經完成了——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ？　キョードー終わって引退しても。オリヴィ、\nヒジョーキンのショクタク扱いになるだけ――でしょ？」
2051 = "「有問題嗎？指導結束功成身退，奧莉薇也不過是轉為非全職的合同工而已啊，不是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1935 = "「對」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だからニイロクの全検のときとかは、引退したって、\nオリヴィ、多分ふつーに乗務することになると思うし」
1995 = "「所以趕上二六接受全檢之類的時候，奧莉薇就算引退了，應該還是可以正常執行乘務任務的」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――確かに、まことに左様でございますね」
1813 = "「啊——這倒是，的確如此」" 

# monologue
# JP: ほんの一瞬、意識もせずにハチロクと視線を交わしている、\nほうっと、安堵の息が出る。
3012 = "隨後，我和八六無意識地短暫交換了一下眼神，而後放心地鬆了一口氣。" 

# monologue
# JP: Ⅸ号とオリヴィ。100年以上をともに走り続けた相棒同士。\nそのお別れは、まだまだ先のことだと気づけて。
2498 = "九號與奧莉薇這對一同馳騁了百年以上的搭檔，看來距離真正的分別依然遙不可及。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だったら、うん！　オリヴィ、今日はいいこにしてる！\nハチロクと一緒に、アンセーにしてまってるよ」
2230 = "「那好吧！奧莉薇今天就老實待著！和八六一起安靜地等她們吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕らも安心だ」
2203 = "「這樣的話，我們也就放心了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから？　ね？　オリヴィ、いいこにしてるから」
1989 = "「所以呢？奧莉薇都這麼聽話了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1854 = "「嗯？」" 

# monologue
# JP: オリヴィが、上目遣いに僕を見る。
2684 = "奧莉薇看我的眼神明顯是有事相求。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「お昼、もーいっかいタイオンはかって？\nそれで大丈夫になってたら、午後はまたお仕事させて？」
1683 = "「中午時候再量一次體溫好不好？如果沒問題的話下午就讓奧莉薇去工作吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1840 = "「嗯——」" 

# monologue
# JP: 順調にいけば午前に引退。\nけれども午後には、嘱託として初勤務したい。
3030 = "順利的話她上午就可以引退，而後下午就開始以合同工的新身份開始工作。" 

# monologue
# JP: そこまでせずともと思いもするが、\nそのような弱い理由で否定するなど、あり得ない。
3020 = "雖然我覺得沒必要做到這個地步，但以這樣的理由拒絕她也確實太不近人情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「隆起現場を見ておきたいのか」
1721 = "「你想去看看隆起現場，是嗎」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うんっ！　ムナカタにマカされたことだから！」
1844 = "「嗯！因為宗方都已經交待過了嘛！」" 

# monologue
# JP: ハチロクをちらりと見れば、\nすぐに頷きが返される。
2772 = "我瞄了一眼八六，她對我輕輕地點了點頭。" 

# monologue
# JP: 現地確認の負担は乗務より遥かに軽いし、\n再検査して安全域なら、稼働を止める理由もない。
2899 = "確認現場的負擔要遠輕於乘務任務，重新測量的結果如果在安全範圍的話，也沒有一定要阻攔她活動的理由。" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。そのときの体温が40.9度以下なら、\n大歓迎で仕事をしてもらおう」
1970 = "「我明白了。如果到時體溫在四十點九度以下的話，我自然樂意讓你以新身份開始工作」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケーわかった！　それじゃ、ソーテツ！\nちゃあんとあのこたち見てあげてきてね！」
2281 = "「ＯＫ好噠！那雙鐵呀！你可要照顧好她們幾個哦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。無論だ。\n僕も、僕の仕事をきちんとこなしてくる」
1853 = "「嗯，那是自然。我也會好好完成我的工作的」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。おかえりをお待ち申し上げます」
2237 = "「那我們便在此靜候」" 

# monologue
# JP: ハチロクの暖かな笑顔を見れば、瞳が喜ぶ。\nそうして、耳も、すぐさまに。
2886 = "看著八六的笑臉，一股暖流如電擊般瞬間遍布我的全身。" 

# 【ハチロク】
# display as 八六
# JP: 「いってらっしゃいまし、双鉄さま。\nどうぞ、本日もご安全に」
2269 = "「雙鐵少爺路上當心，願您今天也一路平安」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1842 = "「嗯」" 

# monologue
# JP: ハチロクが隣にいない乗務は無論、\nこころ細いし、寂しくもある。が――
2667 = "執行乘務任務時八六不在我身邊，實話說多少有些不安與寂寞。不過——" 

# monologue
# JP: この見送りを受けられるのなら、四年に一度かそのくらい。稀にはあっても、悪くない。
2485 = "不過這樣的送行場面往常要每四年才會有一次，如此想來倒也不壞。" 

# 【日々姫】
# display as 日日姬
# JP: 「閉じーーーーる」
2261 = "「關閉——」" 

# monologue
# JP: 長い声。\n日々姫がゆるゆる、\x%l加減弁;#00ffc040;加減弁%l;#;を全閉にむけ操作していく。
2625 = "只聽一陣拉長的聲音，日日姬緩緩地關閉著\\x%l加減弁;#00ffc040;汽門%l;#;。" 

# monologue
# JP: 同時に凪がブロア止弁を開いて閉じて、\n煙室の通風を良化する。
2642 = "同時凪操作著風管止回閥一開一合，讓煙室能得到更好的通風。" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%l絶気;#00ffc040;絶気%l;#;、入ります」
2212 = "「進入\\x%l絶気;#00ffc040;無汽%l;#;狀態」" 

# monologue
# JP: 普段には無い細かな\x%l喚呼;#00ffc040;喚呼%l;#;は、\n試験の緊張ゆえだろう。
2828 = "日日姬\\x%l喚呼;#00ffc040;復誦%l;#;的聲音甚輕，若在尋常絕不會如此——想必是因為試運營而緊張的關係吧。" 

# monologue
# JP: その声に応え凪の目、そうしてニイロクの目が、\n計器を手早く確認していく。
2916 = "而聽到她的聲音，凪和二六一同迅速地確認了一下各個儀表。" 

# 【凪】
# display as 凪
# JP: 「ボイラ注水！」
2257 = "「鍋爐加水！」" 

# 【日々姫】
# display as 日日姬
# JP: 「シリンダー圧力よし。\x%lバイパス弁;#00ffc040;バイパス弁%l;#;開け、\nシリンダー排水弁あけ、\x%l逆転機;#00ffc040;逆転機%l;#;――\x%l前進フルギア;#00ffc040;前進フルギア%l;#;！」
2078 = "「氣缸壓力正常。\\x%lバイパス弁;#00ffc040;旁路閥%l;#;打開，氣缸閥打開，\\x%l逆転機;#00ffc040;回動機%l;#;——\\x%l前進フルギア;#00ffc040;滿檔前進%l;#;！」" 

# monologue
# JP: ……問題ない。\n一切何のトラブルも無く、ここまでこれた。
1287 = "……沒有問題。到目前為止都一切順利。" 

# 【凪】
# display as 凪
# JP: 「踏切！　人影あるばい！」
2214 = "「道口！有人影哎！」" 

# monologue
# JP: （ポッ！）
3068 = "（啵！）" 

# monologue
# JP: ごくごく短い、警戒の\x%l汽笛;#00ffc040;汽笛%l;#;。\nここも難なく越えていく。
2889 = "短短地拉響警戒\\x%l汽笛;#00ffc040;汽笛%l;#;後，此地也順利通過。" 

# monologue
# JP: あとはもう、御一夜温泉駅に止めるだけ。\n……オリヴィの長い教導も、それで完全に終わりを告げる。
2792 = "接下來，便只剩在御一夜溫泉站停車了。……奧莉薇長久的指導，也將在那時畫下完美的句號。" 

# monologue
# JP: （長くあったが――一瞬のようにも思えるな）
3081 = "（雖然歷時頗久——但回首卻如一瞬之間）" 

# monologue
# JP: 感傷にひたるなど、早すぎるとはわかっているが、\nそんな思いが湧いてくるのを止められない。
3021 = "雖然明知沉浸於感傷為時尚早，但這種感覺就是不停地向我湧來。" 

# monologue
# JP: 初めての、オリヴィ不在のⅨ号機関車の運転台は、\n普段オリヴィがどれほどに――――？
2904 = "第一次身處奧莉薇不在的九號機車駕駛台，越來越覺得奧莉薇平常是何等————嗯？" 

# monologue
# JP: （なんだ……なにか、違和感が――あ）
3072 = "（怎麼回事……感覺哪裡不太對——啊）" 

# 【双鉄】
# display as 雙鐵
# JP: 「速度計？」
2208 = "「速度表？」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1789 = "「咦！？」" 

# monologue
# JP: いかん、声に出てしまったか。
2470 = "不好，不小心說出聲了。" 

# monologue
# JP: 日々姫がぎくりと一瞬動き、\nけれどもすぐさま、前方注視に復帰する。
2848 = "日日姬驚得一晃，但馬上就轉回頭繼續注視著前方。" 

# 【日々姫】
# display as 日日姬
# JP: 「ニイロク――速度。\n計測、声でお願い」
1703 = "「二六——測算一下速度，報給我」" 

# monologue
# JP: （ああ、やはりか）
3067 = "（啊，果然如此）" 

# monologue
# JP: 緊張まじりの日々姫の声が、違和感に焦点を結ばせる。
2862 = "果然日日姬那滿是緊張感的聲音，才是心中疑問的焦點所在。" 

# monologue
# JP: 下がっていない。\n速度計の針が一切――さきほどからまるで動いていない。
2983 = "速度表的指針完全沒有下降——準確地說是從剛才開始就完全沒動過。" 

# 【ニイロク】
# display as 二六
# JP: 「時速――32キロ」
2041 = "「時速——３２公里」" 

# monologue
# JP: 聞いた瞬間、不安にかられる。\n反射で、遅いと思ってしまう。
2922 = "聽到這數字的瞬間，我突然覺得有些不安——我下意識地覺得這數字是不是太低了。" 

# monologue
# JP: が、それは僕の体に染み付いた、8620での感覚だ。\nⅨ号の運転感覚を、僕はほとんど有していない。
2541 = "但那也不過是銘記在我身體裡８６２０的感覺而已。要說駕駛九號的感覺，於我而言基本是一片空白。" 

# monologue
# JP: （……焦るな。大丈夫だ。\nここまで来れば、ナビが上空からフォローしている）
3052 = "（……不要急，沒問題的。到這裡Ｎａｖｉ應該已經能在上空支援了）" 

# monologue
# JP: 僕らの会話もモニターされてる。\nナビが訂正してこないのなら、ニイロクの計測は正確だ。
2755 = "我們的對話也都逃不過Ｎａｖｉ的耳朵。既然Ｎａｖｉ沒有發聲，那就代表著二六的測算準確無誤。" 

# 【ニイロク】
# display as 二六
# JP: 「31キロ」
2275 = "「３１公里」" 

# 【日々姫】
# display as 日日姬
# JP: 「復唱。現在時速、31キロ」
1957 = "「復誦，現在時速３１公里」" 

# monologue
# JP: 日々姫の声が緊張している。無理もない。\n1キロ刻みまで細かくを、僕らは普段は意識していない。
2843 = "日日姬的聲音仍然透著掩不住的緊張。這也沒辦法，一公里這種程度的差異，我們平常本都不會在意。" 

# monologue
# JP: 速度計の針はアナログ――見た目の感覚で処理するものだ。\nゆえ細かな数字を刻まれてしまうと、かえって僕など――
2980 = "速度表是指針式的——基本上都是憑感覺看的。如果認真具體的數字的話，像我這種水平反而會——" 

# 【ニイロク】
# display as 二六
# JP: 「日々姫\x%l機関士;#00ffc040;機関士%l;#;。\n自分は。意見具申を。希望する」
2005 = "「日日姬\\x%l機関士;#00ffc040;司機%l;#;，我，想要，提個意見」" 

# 【双鉄】
# display as ３人
# JP: 「っ！！？」
1830 = "「啊！！？」" 

# monologue
# JP: 速度計の故障に気づいた瞬間よりも、\nはるかに大きく心臓が跳ねる。
2770 = "我的心臟跳得越來越猛烈，更甚於注意到速度表故障的瞬間。" 

# monologue
# JP: 驚いた。まさかニイロクが、赤井\x%l機関士;#00ffc040;機関士%l;#;以外の人に、\n自分から話しかけてこようとは――
2663 = "因為這著實令我吃驚不小。二六竟然主動向赤井\\x%l機関士;#00ffc040;司機%l;#;以外的人開口——" 

# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　もちろん、なんでもいって！」
2104 = "「當然！有什麼儘管說好了！！」" 

# 【ニイロク】
# display as 二六
# JP: 「なら言う。速度計。\n日々姫は普段。全然見てない。びっくりするほど」
2240 = "「那我就說了。日日姬，平常其實，根本不看速度表。或者說，次數少得驚人」" 

# 【日々姫】
# display as 日日姬＆雙鐵
# JP: 「ええっ！？」\n「ああ」
1799 = "「唉！？」\\n「嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「って！？　『ああ』って！\nわたし、そぎゃんと！！？」
1326 = "「“嗯”什麼啊！我什麼時候！！？」" 

# monologue
# JP: 『そぎゃんと』だ。言いたい気持ちをグっと抑える。
1270 = "“什麼時候都是”。我剛想開口，轉念就又把這話咽了回去。" 

# monologue
# JP: さきほどは、思わず声を零してしまったが――\nこれは試験。僕の関与は、極力少ない方がいい。
2602 = "剛才確實是一不小心說了出來，不過——這可是試運營，我的干預應該是越少越好。" 

# 【ニイロク】
# display as 二六
# JP: 「日々姫の前方注視。集中力。凄い。\nレバー類だって。操作の。ほんの一瞬しか見ない」
2008 = "「日日姬目視前方時，集中注意力，非常厲害。手把之類，操作的時候，都只是餘光一掃」" 

# 【日々姫】
# display as 日日姬
# JP: 「そう……なんだ」
2017 = "「是……這樣嗎」" 

# monologue
# JP: 僕が返事をしないことで、日々姫も思い出したのだろう。
2767 = "我沒有回答，想必日日姬也由此想明白了吧。" 

# monologue
# JP: 今日のこの運転台の内側で、\n誰がチームで――頼って構わぬ存在なのかを。
2515 = "今天，在這駕駛台上，誰是她的車組——是她可以放心依賴的人。" 

# 【ニイロク】
# display as 二六
# JP: 「だから。細かな数字はかえって。邪魔になる。と、思う。\n日々姫の運転は。目の運転。目と、感覚の運転だから」
1996 = "「所以，我覺得，具體數字，只會，起反作用。因為日日姬的，駕駛方式，是以眼力，通過觀察和感覺駕駛」" 

# 【日々姫】
# display as 日日姬
# JP: 「わかった。ありがと」
1971 = "「我明白了，謝謝」" 

# monologue
# JP: すうっと、日々姫が息を吸う。
2837 = "日日姬深吸了一口氣。" 

# monologue
# JP: 前方注視に釘付けられてるままの瞳が、\n静かな、落ち着きの色を得る。
2909 = "緊緊盯住前方的雙眸中，現出了冷靜沉著的神色。" 

# 【日々姫】
# display as 日日姬
# JP: 「[ゆのい,1]湯医発[おひとよ,2]御一夜いきは乗車率65％。いつもより少し軽い。\n天気は晴れ、線路のコンディションは良好」
2102 = "「由湯醫發往御一夜的列車上座率６５％，比平常稍低一些。天氣晴朗，線路狀況良好」" 

# 【凪】
# display as 凪
# JP: 「踏切！　車とまっとるばい！」
2215 = "「道口！有車停在那咧！」" 

# monologue
# JP: （ポッ！）
# 3068 = "（啵！）" 

# monologue
# JP: ――実にいい。
1261 = "——著實不錯。" 

# monologue
# JP: 日々姫同様、凪も完全に落ち着いている。\nこの状況下で、自分の仕事に集中できている。
2652 = "和日日姬一樣，凪也完全冷靜下來了。在這個狀態下也仍能集中精神在自己的工作上。" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、少しだけ\x%lブレーキ;#00ffc040;ブレーキ%l;#;を遅く。違いはそれだけ。\nその他は全部！　いつも通りにやればいいだけっ！」
1985 = "「所以\\x%lブレーキ;#00ffc040;剎車%l;#;要稍微晚一些。區別僅此而已。其他全都只要照平常一樣就可以了！」" 

# 【凪】
# display as 凪
# JP: 「きっとそうばい！　それでよかばい！」
2142 = "「肯定沒錯囉！那就沒毛病咧！」" 

# 【ニイロク】
# display as 二六
# JP: 「同意。問題が発生したら。フォロー、する」
1786 = "「同意。如果有問題，我會，幫忙解決」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん！！」
1845 = "「嗯！！」" 

# monologue
# JP: 日々姫が笑う。視線をまったく崩さぬままに、\nそれでも、日々姫の笑顔で笑う。
2845 = "日日姬笑了，雖然她的視線仍然直視前方紋絲未動，但卻難掩臉上的笑容。" 

# monologue
# JP: ならばもう。何も心配することはない。
2805 = "既然如此，那我也就沒有什麼好擔心的了。" 

# 【日々姫】
# display as 日日姬
# JP: 「――。\x%l自弁;#00ffc040;自弁%l;#;、\x%l常用;#00ffc040;常用%l;#;！！」
1309 = "「\\x%l自弁;#00ffc040;自剎%l;#;，\\x%l常用;#00ffc040;常用%l;#;！！」" 

# monologue
# JP: ――そして、日々姫は\x%lブレーキ;#00ffc040;ブレーキ%l;#;をかける。\n一拍置いた、いつもより遅めのタイミングで。
2883 = "看準比平常慢一拍的時機，日日姬邊說邊拉動了\\x%lブレーキ;#00ffc040;剎車%l;#;。" 

# 【ニイロク】
