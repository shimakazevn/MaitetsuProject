[script]
# lines: 498 
# 【ハチロク】
# display as 八六
# JP: 「あーーーーーん、むっ」
1809 = "「A————n, ứm.」"
# monologue
# JP: いつものように、体温計をくわえさせる。
2583 = "Như mọi khi, tôi cho em ấy ngậm nhiệt kế."
# monologue
# JP: ハチロクがくわえたのとは反対側の端っこを、\n一分間、僕は律儀に保ちつづける。
2914 = "Tôi cẩn thận giữ phần đuôi nhiệt kế,\ntrong suốt một phút."
# monologue
# JP: （ピピピっ、ピピピっ、ピピピっ）
3078 = "（Tít tít tít, tít tít tít, tít tít tít）"
# 【双鉄】
# display as 雙鐵
# JP: 「時間だ」
2044 = "「Đến giờ rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「ん――――ぷ、ぁ」
1841 = "「Ưm————phù, a.」"
# monologue
# JP: 口からそっと体温計を抜きとれば、\nハチロクは、ごくさりげなく表面を拭く。
2764 = "Khi tôi nhẹ nhàng rút nhiệt kế ra khỏi miệng,\nHachiroku cũng rất tự nhiên lau sạch bề mặt."
# monologue
# JP: この一年を丁寧に丁寧にすごす間に、\nそれもまた、すっかりルーチンとなってしまったようだ。
2465 = "Trải qua một năm cẩn thận tỉ mỉ từng chút một,\nđiều này dường như đã trở thành thói quen thường nhật rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「38度4分。余裕で稼働安全圏だな」
2276 = "「38 độ 4. Vẫn dư sức nằm trong ngưỡng an toàn để hoạt động.」"
# 【ハチロク】
# display as 八六
# JP: 「うふふっ、よろしうございました」
1857 = "「Fufu, vậy là tốt rồi ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――」
1808 = "「A——」"
# monologue
# JP: けれど、いつもの流れが途切れる。
2631 = "Thế nhưng, dòng chảy quen thuộc bỗng chốc đứt đoạn."
# monologue
# JP: 「へーねつー」と、\n楽しげなオリヴィの声が飛んでこない。
2467 = "Không thấy giọng nói vui vẻ của Olivy vang lên\n\"Bình thườ——ng\"."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「やだなー。ちょっと高い」
2158 = "「Ghét ghê. Hơi cao rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「何度だ？」
1875 = "「Bao nhiêu độ?」"
# monologue
# JP: オリヴィが差し出してくる体温計を受け取れば――
2754 = "Nhận lấy nhiệt kế Olivy đưa cho——"
# 【ハチロク】
# display as 八六
# JP: 「41度ちょうど。\n――警戒域の数値ですね」
1862 = "「Tròn 41 độ.\n——Đã đến mức cảnh báo rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、今日は休むしかないな」
2223 = "「Vậy thì, hôm nay chỉ còn cách nghỉ ngơi thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えーーーーっ！」
1963 = "「Ếếếế!」"
# monologue
# JP: 途端にオリヴィの頬が膨れる。
2773 = "Ngay lập tức, hai má Olivy phồng lên."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「こんなの、0.1度下がったらカドーアンゼンケンだし！\nそれに今日はヒビキたちのっ」
2193 = "「Chỉ cần giảm 0.1 độ nữa là vào ngưỡng an toàn rồi mà!\nVới lại hôm nay là ngày của nhóm Hibiki——」"
# 【双鉄】
# display as 雙鐵
# JP: 「今日がどういう日であるかなら、\nもちろん僕も承知している。が――」
1973 = "「Tất nhiên là tôi cũng biết rõ\nhôm nay là ngày gì. Nhưng——」"
# 【ハチロク】
# display as 八六
# JP: 「0.1メートル。\x%l閉塞;#00ffc040;閉塞%l;#;を越えてしまったら、\nそれは[ぼうしん,1]冒進。事故になります」
1915 = "「0.1 mét. Nếu vượt qua giới hạn \\x%l閉塞;#00ffc040;đóng đường%l;#;,\nthì đó là chạy lố. Sẽ xảy ra tai nạn.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あうっ」
1824 = "「Aư.」"
# monologue
# JP: 正論だ。\n一切、反論の余地が無い。
2577 = "Lời lẽ hoàn toàn chính xác.\nKhông có chỗ nào để phản bác."
# 【ハチロク】
# display as 八六
# JP: 「境界を都合にあわせ動かすのなら、安全は守れませぬ。\n他ならぬオリヴィちゃんが、その程度のことを」
1912 = "「Nếu cứ tùy tiện xê dịch ranh giới, thì sao có thể bảo đảm an toàn được.\nChính Olivy đáng lẽ phải hiểu rõ điều cơ bản đó chứ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなのもちろんわかってる！」
1889 = "「Mấy chuyện đó tất nhiên là Olivy biết chứ!」"
# monologue
# JP: ゆえ、オリヴィも同意する。\n同意して――それでも頬はふくれたままだ。
2780 = "Vì thế, Olivy cũng đồng ý.\nĐồng ý là vậy——nhưng hai má vẫn cứ phồng lên."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかってる、けど――\nけど！　今日は、オリヴィ乗務しないし」
2111 = "「Biết là vậy, nhưng——\nNhưng mà! Hôm nay, Olivy đâu có trực tiếp lái đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや。教導も立派な乗務だ」
1665 = "「Không đâu. Chỉ dẫn cũng là một nhiệm vụ quan trọng đấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だとしても、っていうか、\nリッパでダイジなことならなおさらっ」
1945 = "「Dù là vậy, hay nói đúng hơn,\nnếu là nhiệm vụ quan trọng thì lại càng phải tham gia chứ.」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん」
1887 = "「Olivy này.」"
# monologue
# JP: 静かな声。
2575 = "Một giọng nói điềm tĩnh."
# monologue
# JP: 『どうぞ落ち着いてください』と、\nその響きだけで伝わってくる。
3017 = "Chỉ qua âm sắc ấy,\nđã truyền đạt thông điệp \"Xin hãy bình tĩnh lại\"."
# 【ハチロク】
# display as 八六
# JP: 「秋の色は日に日に濃さを増してはおります。けれどまだ、\n運転台内の気温は、優に五十度を超えてしまいます」
2268 = "「Sắc thu đang ngày một đậm nét. Thế nhưng,\nnhiệt độ trong buồng lái vẫn dư sức vượt ngưỡng 50 độ đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その気温では、下がる体温も上がってしまう。\n上がってしまえば、削られるのはオリヴィの寿命だぞ」
1866 = "「Với nhiệt độ đó, thân nhiệt đáng lẽ phải hạ xuống lại càng tăng lên.\nNếu cứ tăng mãi, thì tuổi thọ của Olivy sẽ bị rút ngắn lại đấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも――」
1778 = "「Nhưng mà——」"
# monologue
# JP: 頭では理解できている。\nそれでも、どうしても乗務したい。
2698 = "Trong đầu thì hiểu rõ.\nNhưng dù thế nào cũng vẫn muốn được tham gia ca trực."
# monologue
# JP: 言葉にはまとまりきらぬ言葉から、\nオリヴィの強い気持ちも、また痛い程に伝わってくる。
2727 = "Từ những lời lẽ lộn xộn ấy,\ntôi cũng cảm nhận được rõ ràng khao khát mãnh liệt của Olivy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それでもオリヴィやっぱりっ！」
1946 = "「Dù vậy thì Olivy vẫn muốn!」"
# 【ハチロク】
# display as 八六
# JP: 「削られてしまうその一日――いえ、何時間、何十分を。\nのちほどひどく、悔いてしまうかもしれませんよ？」
2152 = "「Chỉ vì một ngày bị rút ngắn đi——không, dù chỉ là vài giờ, vài chục phút.\nBiết đâu sau này bạn sẽ phải hối hận tột cùng đấy?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！！」
1806 = "「!!!」"
# monologue
# JP: 静かな声の――けれども、極めて重い指摘だ。\n僕でさえ、否応なしに想像を余儀なくされてしまう。
2962 = "Một lời nhắc nhở nhẹ nhàng——nhưng lại vô cùng nặng nề.\nĐến cả tôi cũng không khỏi rùng mình khi nghĩ đến."
# monologue
# JP: 『その一分』が足りぬため、もしも宗方さんとオリヴィが、再会しそこねるようなことがあったら――
2935 = "Nếu chỉ vì thiếu đi \"một phút\" đó, mà ông Munakata và Olivy\nlỡ mất cơ hội đoàn tụ thì sao——"
# 【ハチロク】
# display as 八六
# JP: 「焦らず、大事に。ここまでの時間を、\nそうして重ねて来たのではありませんか」
1667 = "「Đừng nôn nóng, hãy trân trọng nó. Chẳng phải thời gian qua,\nbạn đã luôn kiên nhẫn tích lũy từng chút một sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ううううう～っ！！」
1839 = "「Ư ư ư ư ư~!!」"
# monologue
# JP: 僕でさえ思うことならば、\nオリヴィにとってはひとしおだろう。
2992 = "Ngay cả tôi còn nghĩ vậy,\nthì đối với Olivy chắc chắn càng sâu sắc hơn."
# monologue
# JP: ならば、想いは止まらない。
2808 = "Dù vậy, khao khát đó vẫn không ngừng cháy bỏng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だけど――やっぱり、それでも今日だけはっ」
1779 = "「Nhưng mà——quả nhiên, dù sao đi nữa thì chỉ hôm nay thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……オリヴィ」
1350 = "「……Olivy.」"
# monologue
# JP: 待ちに待った来春からの宗方さんとの時間を秤にかける程。\n今日の乗務を、引き継ぐことを、大事に考えてくれている。
2854 = "Đến mức sẵn sàng đặt lên bàn cân với khoảng thời gian bên ông Munakata vào mùa xuân tới mà cô ấy đã mong ngóng bấy lâu.\nCô ấy coi trọng ca trực hôm nay, coi trọng việc bàn giao công việc đến nhường nào."
# monologue
# JP: であるのなら、オリヴィの気持ちを大事にしたい。\nそう考えれば、自然と言葉が湧き出してくる。
2803 = "Nếu vậy, tôi cũng muốn trân trọng cảm xúc của Olivy.\nNghĩ vậy, lời nói tự nhiên tuôn trào."
# 【双鉄】
# display as 雙鐵
# JP: 「ここは、逆側から考えてみてはくれんか」
2100 = "「Hay là, thử suy nghĩ theo hướng ngược lại xem sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「逆側？」
1770 = "「Hướng ngược lại?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。つまり、『乗らぬことこそを、教導とする』と」
2028 = "「Ừ. Tức là, 『Chính việc không lên tàu mới là bài học chỉ dẫn』.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「乗らないことが――教導？」
1663 = "「Không lên tàu——là bài học chỉ dẫn?」"
# monologue
# JP: ことん、とオリヴィの首が傾く。
2979 = "Olivy khẽ nghiêng đầu thắc mắc."
# monologue
# JP: 思考の角度も、恐らく少しは変わっただろう。\nその手応えが、僕の唇をなめらかにする。
2690 = "Có lẽ góc độ suy nghĩ của cô ấy cũng đã thay đổi đôi chút.\nSự phản hồi ấy giúp tôi cất lời trôi chảy hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。『いざとなったらオリヴィが代わってくれる』。\nその安心感なしの乗務をもって、教導の仕上げとする」
1940 = "「Đúng vậy. 『Lỡ có chuyện gì thì đã có Olivy lo』.\nHoàn thành ca trực mà không có sự an tâm đó, chính là bài kiểm tra cuối cùng.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー」
# 1808 = "「啊——」" 
# monologue
# JP: 妙に力の抜けた声。
2694 = "Giọng nói bỗng chốc mất đi sức lực."
# monologue
# JP: 頬の膨れが、口の尖りが、\nそれと同時に解消される。
3051 = "Đôi má phồng, cái miệng chu ra,\ncũng đồng thời xẹp xuống."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっかー。それもアイディアだねー」
1937 = "「Ra là vậy. Đó cũng là một ý hay nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「ですね。\nわたくしも、素晴らしいご提案かと存じます」
2037 = "「Vâng.\nEm cũng nghĩ đó là một đề xuất tuyệt vời ạ.」"
# monologue
# JP: ごくごく静かに、穏やかに。\nハチロクも後押ししてくれる。
2563 = "Rất đỗi nhẹ nhàng, êm ái.\nHachiroku cũng lên tiếng ủng hộ."
# 【ハチロク】
# display as 八六
# JP: 「この案でしたら、\nわたくしも外れた方がよろしいでしょう」
1911 = "「Nếu theo phương án này,\nthì em cũng không nên đi cùng đâu nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぬ」
1802 = "「Hử.」"
# monologue
# JP: 言われた瞬間不安にかられ、\nだから、そうかと理解する。
2925 = "Vừa nghe xong, một nỗi bất an trào dâng trong tôi,\nnhưng cũng vì thế, tôi đã hiểu ra vấn đề."
# monologue
# JP: ハチロクの添乗もまた、この上無く心強い保険ゆえ――\nそれもまた外すことでこそ、真の実力を試し得るのだと。
2702 = "Việc Hachiroku đi cùng cũng là một sự bảo đảm vô cùng vững chắc——\nNên việc gạt bỏ cả sự bảo đảm ấy, mới thực sự kiểm chứng được năng lực thật sự."
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんとご一緒に、レールショップで。\n定刻どおりのⅨ号機関車入線を待たせていただきます」
2239 = "「Em sẽ cùng với Olivy ở lại cửa hàng đường sắt.\nĐể chờ đợi đầu máy số 9 vào ga đúng giờ.」"
# monologue
# JP: こくり、オリヴィが小さく頷く。
2685 = "Olivy khẽ gật đầu."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……ニイロクは、もうⅨ号を自分のものにできてる。\nアカイグージと組んでるときは」
1341 = "「……Niiroku đã hoàn toàn làm chủ được đầu máy số 9 rồi.\nÍt nhất là khi hợp tác cùng với Akai Guuji.」"
# monologue
# JP: “赤井宮司と組んでるときは”――\n実に冷静、かつ的確な現状評価だ。
1272 = "\"Khi hợp tác cùng với Akai Guuji\"——\nQuả là một đánh giá tình hình cực kỳ điềm tĩnh và chuẩn xác."
# monologue
# JP: オリヴィは僕らの案に納得し、\n完全に落ち着いてくれたのだなと、ホっとする。
2875 = "Thấy Olivy đã đồng ý với đề xuất của chúng tôi\nvà hoàn toàn bình tĩnh lại, tôi mới thở phào nhẹ nhõm."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、今日。ヒビキ-ナギとニイロクだけで。それで\nちゃんと運用できれば、オリヴィ、安心して引退できる」
1991 = "「Vì vậy, hôm nay. Chỉ cần nhóm Hibiki-Nagi và Niiroku.\nNếu mọi người có thể vận hành suôn sẻ, Olivy sẽ an tâm nghỉ hưu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
1807 = "「Hửm!?」"
# monologue
# JP: 引退とまで言われた瞬間、自分の不明を思い知る。
2923 = "Khoảnh khắc nghe đến hai chữ \"nghỉ hưu\", tôi chợt nhận ra sự thiếu hiểu biết của mình."
# monologue
# JP: 今日の試験に日々姫チームが合格すれば、\nオリヴィは教導のすべてを終える。が、そうなれば――
2699 = "Nếu đội của Hibiki vượt qua bài kiểm tra hôm nay,\nOlivy sẽ hoàn thành toàn bộ công việc hướng dẫn. Nhưng, nếu vậy thì——"
# 【ハチロク】
# display as 八六
# JP: 「あのっ、オリヴィちゃん？　今日の引退と、\nそこまで一気に決めずとも良いのではないでしょうか？」
2205 = "「Này, Olivy? Đâu cần phải vội vàng quyết định\nchuyện nghỉ hưu ngay trong hôm nay đâu chứ?」"
# monologue
# JP: ハチロクもまた、僕と同じく思うのだろう。\n珍しく、目に見えて慌てた様子だ。
2570 = "Có lẽ Hachiroku cũng có cùng suy nghĩ với tôi.\nHiếm khi thấy em ấy luống cuống rõ rệt thế này."
# 【ハチロク】
# display as 八六
# JP: 「教導を終えたとて、そのっ」
1750 = "「Dù đã hoàn thành việc hướng dẫn, thì, ừm.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ？　キョードー終わって引退しても。オリヴィ、\nヒジョーキンのショクタク扱いになるだけ――でしょ？」
2051 = "「Sao cơ? Dù có hoàn thành khóa hướng dẫn và nghỉ hưu. Thì Olivy,\ncũng chỉ chuyển sang làm nhân viên hợp đồng bán thời gian thôi mà——đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1935 = "「À.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だからニイロクの全検のときとかは、引退したって、\nオリヴィ、多分ふつーに乗務することになると思うし」
1995 = "「Thế nên những lúc Niiroku phải kiểm tra toàn diện, dù đã nghỉ hưu,\nchắc Olivy vẫn sẽ trực tiếp tham gia ca trực như bình thường thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ――確かに、まことに左様でございますね」
1813 = "「A——Đúng là vậy, quả thực là thế nhỉ.」"
# monologue
# JP: ほんの一瞬、意識もせずにハチロクと視線を交わしている、\nほうっと、安堵の息が出る。
3012 = "Trong tích tắc, tôi và Hachiroku vô thức chạm mắt nhau,\nrồi thở phào nhẹ nhõm."
# monologue
# JP: Ⅸ号とオリヴィ。100年以上をともに走り続けた相棒同士。\nそのお別れは、まだまだ先のことだと気づけて。
2498 = "Đầu máy số 9 và Olivy. Đôi bạn đồng hành đã cùng nhau rong ruổi suốt hơn 100 năm.\nNhận ra rằng ngày chia tay của họ vẫn còn rất xa."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だったら、うん！　オリヴィ、今日はいいこにしてる！\nハチロクと一緒に、アンセーにしてまってるよ」
2230 = "「Nếu vậy thì, ừm! Olivy hôm nay sẽ ngoan ngoãn!\nCùng với Hachiroku, nằm nghỉ ngơi chờ mọi người về nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕らも安心だ」
2203 = "「Thế thì chúng tôi cũng an tâm rồi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから？　ね？　オリヴィ、いいこにしてるから」
1989 = "「Vậy nên? Nhá? Olivy đã ngoan ngoãn rồi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1854 = "「Hửm?」"
# monologue
# JP: オリヴィが、上目遣いに僕を見る。
2684 = "Olivy ngước mắt lên nhìn tôi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「お昼、もーいっかいタイオンはかって？\nそれで大丈夫になってたら、午後はまたお仕事させて？」
1683 = "「Trưa nay, đo nhiệt độ lại một lần nữa nha?\nNếu thấy ổn rồi, thì chiều nay cho Olivy làm việc tiếp nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1840 = "「À——」"
# monologue
# JP: 順調にいけば午前に引退。\nけれども午後には、嘱託として初勤務したい。
3030 = "Nếu thuận lợi thì sáng nay sẽ nghỉ hưu.\nNhưng chiều nay, lại muốn có ngày làm việc đầu tiên với tư cách là nhân viên hợp đồng."
# monologue
# JP: そこまでせずともと思いもするが、\nそのような弱い理由で否定するなど、あり得ない。
3020 = "Dù nghĩ rằng không cần thiết phải làm đến mức đó,\nnhưng cũng không thể lấy lý do mỏng manh ấy để từ chối được."
# 【双鉄】
# display as 雙鐵
# JP: 「隆起現場を見ておきたいのか」
1721 = "「Cô muốn đến xem hiện trường sụt lún sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うんっ！　ムナカタにマカされたことだから！」
1844 = "「Vâng! Vì đó là việc Munakata đã giao phó mà!」"
# monologue
# JP: ハチロクをちらりと見れば、\nすぐに頷きが返される。
2772 = "Tôi liếc nhìn Hachiroku,\nem ấy lập tức gật đầu đáp lại."
# monologue
# JP: 現地確認の負担は乗務より遥かに軽いし、\n再検査して安全域なら、稼働を止める理由もない。
2899 = "Việc xác nhận tại hiện trường nhẹ nhàng hơn nhiều so với trực ca,\nnếu kiểm tra lại mà ở ngưỡng an toàn thì cũng chẳng có lý do gì để ngăn cản."
# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。そのときの体温が40.9度以下なら、\n大歓迎で仕事をしてもらおう」
1970 = "「Rõ rồi. Nếu lúc đó nhiệt độ dưới 40.9 độ,\nthì rất hoan nghênh cô làm việc.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケーわかった！　それじゃ、ソーテツ！\nちゃあんとあのこたち見てあげてきてね！」
2281 = "「Ok, hiểu rồi! Vậy thì, Soutetsu!\nNhớ chăm sóc mấy đứa nhỏ cẩn thận nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。無論だ。\n僕も、僕の仕事をきちんとこなしてくる」
1853 = "「Ừm. Tất nhiên rồi.\nTôi cũng sẽ hoàn thành tốt công việc của mình.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。おかえりをお待ち申し上げます」
2237 = "「Vâng. Bọn em sẽ đợi ngài về.」"
# monologue
# JP: ハチロクの暖かな笑顔を見れば、瞳が喜ぶ。\nそうして、耳も、すぐさまに。
2886 = "Nhìn nụ cười ấm áp của Hachiroku, đôi mắt tôi ngập tràn niềm vui.\nVà rồi, đôi tai tôi cũng nhanh chóng đón nhận."
# 【ハチロク】
# display as 八六
# JP: 「いってらっしゃいまし、双鉄さま。\nどうぞ、本日もご安全に」
2269 = "「Ngài đi cẩn thận nhé, ngài Soutetsu.\nChúc ngài hôm nay cũng có một chuyến đi an toàn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1842 = "「Ừm.」"
# monologue
# JP: ハチロクが隣にいない乗務は無論、\nこころ細いし、寂しくもある。が――
2667 = "Một ca trực không có Hachiroku bên cạnh,\ntất nhiên là có chút bất an và cô đơn. Nhưng——"
# monologue
# JP: この見送りを受けられるのなら、四年に一度かそのくらい。稀にはあっても、悪くない。
2485 = "Nếu được nhận lời tiễn biệt này, thì cỡ 4 năm 1 lần. Lâu lâu mới có cũng không tệ."
# 【日々姫】
# display as 日日姬
# JP: 「閉じーーーーる」
2261 = "「Đóーーーーng.」"
# monologue
# JP: 長い声。\n日々姫がゆるゆる、\x%l加減弁;#00ffc040;加減弁%l;#;を全閉にむけ操作していく。
2625 = "Giọng nói kéo dài.\nHibiki từ từ thao tác đóng hoàn toàn \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;."
# monologue
# JP: 同時に凪がブロア止弁を開いて閉じて、\n煙室の通風を良化する。
2642 = "Cùng lúc đó, Nagi mở rồi đóng van chặn blower,\ncải thiện thông gió cho buồng khói."
# 【日々姫】
# display as 日日姬
# JP: 「\x%l絶気;#00ffc040;絶気%l;#;、入ります」
2212 = "「Vào trạng thái \\x%l絶気;#00ffc040;cắt hơi%l;#; ạ.」"
# monologue
# JP: 普段には無い細かな\x%l喚呼;#00ffc040;喚呼%l;#;は、\n試験の緊張ゆえだろう。
2828 = "Tiếng \\x%l喚呼;#00ffc040;hô xác nhận%l;#; chi tiết khác hẳn ngày thường,\nchắc là do căng thẳng vì đang trong bài kiểm tra."
# monologue
# JP: その声に応え凪の目、そうしてニイロクの目が、\n計器を手早く確認していく。
2916 = "Đáp lại tiếng hô đó, ánh mắt Nagi, và cả ánh mắt Niiroku,\nnhanh chóng kiểm tra các đồng hồ đo."
# 【凪】
# display as 凪
# JP: 「ボイラ注水！」
2257 = "「Bơm nước lò hơi!」"
# 【日々姫】
# display as 日日姬
# JP: 「シリンダー圧力よし。\x%lバイパス弁;#00ffc040;バイパス弁%l;#;開け、\nシリンダー排水弁あけ、\x%l逆転機;#00ffc040;逆転機%l;#;――\x%l前進フルギア;#00ffc040;前進フルギア%l;#;！」
2078 = "「Áp suất xi-lanh ổn định. Mở \\x%lバイパス弁;#00ffc040;van bypass%l;#;,\nmở van xả nước xi-lanh, \\x%l逆転機;#00ffc040;cần đảo chiều%l;#;——\\x%l前進フルギア;#00ffc040;cài hết số tiến%l;#;!」"
# monologue
# JP: ……問題ない。\n一切何のトラブルも無く、ここまでこれた。
1287 = "……Không có vấn đề gì.\nMọi thứ đều suôn sẻ, không có chút rắc rối nào cho đến tận lúc này."
# 【凪】
# display as 凪
# JP: 「踏切！　人影あるばい！」
2214 = "「Đường ngang! Có bóng người kìa!」"
# monologue
# JP: （ポッ！）
3068 = "（Tu!）"
# monologue
# JP: ごくごく短い、警戒の\x%l汽笛;#00ffc040;汽笛%l;#;。\nここも難なく越えていく。
2889 = "Tiếng \\x%l汽笛;#00ffc040;còi hơi nước%l;#; cảnh báo cực kỳ ngắn.\nĐoạn này cũng dễ dàng vượt qua."
# monologue
# JP: あとはもう、御一夜温泉駅に止めるだけ。\n……オリヴィの長い教導も、それで完全に終わりを告げる。
2792 = "Còn lại, chỉ cần dừng tại ga suối nước nóng Ohitoyo nữa thôi.\n……Quá trình chỉ dẫn dài đằng đẵng của Olivy cũng sẽ hoàn toàn khép lại."
# monologue
# JP: （長くあったが――一瞬のようにも思えるな）
3081 = "（Một chặng đường dài——nhưng ngẫm lại cứ như một chớp mắt.）"
# monologue
# JP: 感傷にひたるなど、早すぎるとはわかっているが、\nそんな思いが湧いてくるのを止められない。
3021 = "Dù biết là còn quá sớm để chìm đắm trong sự đa cảm,\nnhưng tôi không thể ngăn những dòng suy nghĩ ấy trào dâng."
# monologue
# JP: 初めての、オリヴィ不在のⅨ号機関車の運転台は、\n普段オリヴィがどれほどに――――？
2904 = "Lần đầu tiên, buồng lái đầu máy số 9 không có Olivy,\nbình thường Olivy đã phải nhường nào――――?"
# monologue
# JP: （なんだ……なにか、違和感が――あ）
3072 = "（Sao thế này…… cảm giác có gì đó sai sai——a）"
# 【双鉄】
# display as 雙鐵
# JP: 「速度計？」
2208 = "「Đồng hồ tốc độ?」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
1789 = "「Hả!?」"
# monologue
# JP: いかん、声に出てしまったか。
2470 = "Không ổn, lỡ nói ra tiếng mất rồi."
# monologue
# JP: 日々姫がぎくりと一瞬動き、\nけれどもすぐさま、前方注視に復帰する。
2848 = "Hibiki giật mình chớp mắt một cái,\nnhưng ngay lập tức quay lại tập trung nhìn về phía trước."
# 【日々姫】
# display as 日日姬
# JP: 「ニイロク――速度。\n計測、声でお願い」
1703 = "「Niiroku——Tốc độ.\nĐo rồi đọc lên giúp chị nhé.」"
# monologue
# JP: （ああ、やはりか）
3067 = "（A, quả nhiên là vậy.）"
# monologue
# JP: 緊張まじりの日々姫の声が、違和感に焦点を結ばせる。
2862 = "Giọng nói pha lẫn sự căng thẳng của Hibiki khiến cảm giác sai sai kia trở nên rõ ràng."
# monologue
# JP: 下がっていない。\n速度計の針が一切――さきほどからまるで動いていない。
2983 = "Không hề giảm xuống.\nKim đồng hồ tốc độ hoàn toàn——không nhúc nhích chút nào từ nãy đến giờ."
# 【ニイロク】
# display as 二六
# JP: 「時速――32キロ」
2041 = "「Tốc độ——32 km/h.」"
# monologue
# JP: 聞いた瞬間、不安にかられる。\n反射で、遅いと思ってしまう。
2922 = "Khoảnh khắc nghe thấy con số, một nỗi bất an trào dâng.\nTheo phản xạ, tôi cảm thấy tốc độ đó là quá chậm."
# monologue
# JP: が、それは僕の体に染み付いた、8620での感覚だ。\nⅨ号の運転感覚を、僕はほとんど有していない。
2541 = "Nhưng, đó chỉ là cảm giác khi lái 8620 đã ăn sâu vào cơ thể tôi.\nCòn cảm giác lái đầu máy số 9 thì tôi gần như chẳng có chút khái niệm nào."
# monologue
# JP: （……焦るな。大丈夫だ。\nここまで来れば、ナビが上空からフォローしている）
3052 = "（……Đừng vội. Sẽ ổn thôi.\nĐến đây rồi thì Navi cũng đang hỗ trợ từ trên không trung mà.）"
# monologue
# JP: 僕らの会話もモニターされてる。\nナビが訂正してこないのなら、ニイロクの計測は正確だ。
2755 = "Cuộc trò chuyện của chúng tôi cũng đang được theo dõi.\nNếu Navi không lên tiếng đính chính, thì phép đo của Niiroku là chính xác."
# 【ニイロク】
# display as 二六
# JP: 「31キロ」
2275 = "「31 km/h.」"
# 【日々姫】
# display as 日日姬
# JP: 「復唱。現在時速、31キロ」
1957 = "「Nhắc lại. Tốc độ hiện tại, 31 km/h.」"
# monologue
# JP: 日々姫の声が緊張している。無理もない。\n1キロ刻みまで細かくを、僕らは普段は意識していない。
2843 = "Giọng Hibiki nghe rất căng thẳng. Cũng phải thôi.\nBình thường chúng tôi đâu có để ý chi tiết đến từng 1 km/h như vậy."
# monologue
# JP: 速度計の針はアナログ――見た目の感覚で処理するものだ。\nゆえ細かな数字を刻まれてしまうと、かえって僕など――
2980 = "Kim đồng hồ tốc độ là dạng cơ——chủ yếu xử lý bằng cảm giác thị giác.\nThế nên nếu cứ bị ám ảnh bởi những con số chi tiết, thì đối với người như tôi lại càng——"
# 【ニイロク】
# display as 二六
# JP: 「日々姫\x%l機関士;#00ffc040;機関士%l;#;。\n自分は。意見具申を。希望する」
2005 = "「\\x%l機関士;#00ffc040;Lái tàu%l;#; Hibiki.\nTôi. Xin phép. Đưa ra ý kiến.」"
# 【双鉄】
# display as ３人
# JP: 「っ！！？」
1830 = "「!!?」"
# monologue
# JP: 速度計の故障に気づいた瞬間よりも、\nはるかに大きく心臓が跳ねる。
2770 = "Trái tim tôi đập mạnh hơn hẳn,\nso với lúc phát hiện ra đồng hồ tốc độ bị hỏng."
# monologue
# JP: 驚いた。まさかニイロクが、赤井\x%l機関士;#00ffc040;機関士%l;#;以外の人に、\n自分から話しかけてこようとは――
2663 = "Thật đáng kinh ngạc. Không ngờ Niiroku lại chủ động bắt chuyện\nvới người khác ngoài \\x%l機関士;#00ffc040;lái tàu%l;#; Akai——"
# 【日々姫】
# display as 日日姬
# JP: 「もちろん！　もちろん、なんでもいって！」
2104 = "「Tất nhiên rồi! Tất nhiên, em cứ nói đi!」"
# 【ニイロク】
# display as 二六
# JP: 「なら言う。速度計。\n日々姫は普段。全然見てない。びっくりするほど」
2240 = "「Vậy tôi nói. Đồng hồ tốc độ.\nBình thường Hibiki. Hoàn toàn không nhìn. Đến mức ngạc nhiên.」"
# 【日々姫】
# display as 日日姬＆雙鐵
# JP: 「ええっ！？」\n「ああ」
1799 = "「Hả!?」\n「À.」"
# 【日々姫】
# display as 日日姬
# JP: 「って！？　『ああ』って！\nわたし、そぎゃんと！！？」
1326 = "「Gì cơ!? Anh \"À\" cái gì chứ!\nEm, thiệt sự vậy luôn hả!!?」"
# monologue
# JP: 『そぎゃんと』だ。言いたい気持ちをグっと抑える。
1270 = "\"Thiệt sự vậy đó\". Tôi cố nén cảm giác muốn nói ra."
# monologue
# JP: さきほどは、思わず声を零してしまったが――\nこれは試験。僕の関与は、極力少ない方がいい。
2602 = "Lúc nãy, tôi lỡ buột miệng nói ra——\nNhưng đây là bài kiểm tra. Sự can thiệp của tôi càng ít càng tốt."
# 【ニイロク】
# display as 二六
# JP: 「日々姫の前方注視。集中力。凄い。\nレバー類だって。操作の。ほんの一瞬しか見ない」
2008 = "「Khả năng quan sát phía trước của Hibiki. Sự tập trung. Rất tuyệt vời.\nCả các cần gạt nữa. Khi thao tác. Chỉ nhìn thoáng qua một chớp mắt.」"
# 【日々姫】
# display as 日日姬
# JP: 「そう……なんだ」
2017 = "「Vậy…… sao.」"
# monologue
# JP: 僕が返事をしないことで、日々姫も思い出したのだろう。
2767 = "Thấy tôi không trả lời, có lẽ Hibiki cũng đã nhớ ra."
# monologue
# JP: 今日のこの運転台の内側で、\n誰がチームで――頼って構わぬ存在なのかを。
2515 = "Rằng bên trong buồng lái ngày hôm nay,\nai mới là đồng đội——là sự tồn tại mà em ấy có thể dựa dẫm vào."
# 【ニイロク】
# display as 二六
# JP: 「だから。細かな数字はかえって。邪魔になる。と、思う。\n日々姫の運転は。目の運転。目と、感覚の運転だから」
1996 = "「Vì thế. Những con số chi tiết. Sẽ trở nên vướng víu. Tôi nghĩ vậy.\nCách lái của Hibiki. Là lái bằng mắt. Lái bằng mắt và cảm giác.」"
# 【日々姫】
# display as 日日姬
# JP: 「わかった。ありがと」
1971 = "「Chị hiểu rồi. Cảm ơn em.」"
# monologue
# JP: すうっと、日々姫が息を吸う。
2837 = "Hibiki khẽ hít sâu một hơi."
# monologue
# JP: 前方注視に釘付けられてるままの瞳が、\n静かな、落ち着きの色を得る。
2909 = "Đôi mắt vẫn dán chặt về phía trước,\ndần trở nên tĩnh lặng và điềm tĩnh."
# 【日々姫】
# display as 日日姬
# JP: 「[ゆのい,1]湯医発[おひとよ,2]御一夜いきは乗車率65％。いつもより少し軽い。\n天気は晴れ、線路のコンディションは良好」
2102 = "「Chuyến từ Yui đi Ohitoyo có tỷ lệ lấp đầy là 65%. Nhẹ hơn mọi khi một chút.\nThời tiết nắng ráo, tình trạng đường ray tốt.」"
# 【凪】
# display as 凪
# JP: 「踏切！　車とまっとるばい！」
2215 = "「Đường ngang! Có xe đang dừng kìa!」"
# monologue
# JP: （ポッ！）
# 3068 = "（啵！）" 
# monologue
# JP: ――実にいい。
1261 = "——Quả thực rất tốt."
# monologue
# JP: 日々姫同様、凪も完全に落ち着いている。\nこの状況下で、自分の仕事に集中できている。
2652 = "Giống như Hibiki, Nagi cũng đã hoàn toàn bình tĩnh.\nTrong tình huống này, con bé vẫn tập trung tốt vào công việc của mình."
# 【日々姫】
# display as 日日姬
# JP: 「だから、少しだけ\x%lブレーキ;#00ffc040;ブレーキ%l;#;を遅く。違いはそれだけ。\nその他は全部！　いつも通りにやればいいだけっ！」
1985 = "「Vậy nên, chỉ cần hãm \\x%lブレーキ;#00ffc040;phanh%l;#; trễ hơn một chút thôi. Sự khác biệt chỉ có vậy.\nCòn lại tất cả! Cứ làm như mọi khi là được!」"
# 【凪】
# display as 凪
# JP: 「きっとそうばい！　それでよかばい！」
2142 = "「Chắc chắn là vậy rồi! Thế là ngon lành!」"
# 【ニイロク】
# display as 二六
# JP: 「同意。問題が発生したら。フォロー、する」
1786 = "「Đồng ý. Nếu phát sinh vấn đề. Tôi sẽ. Hỗ trợ.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！！」
1845 = "「Ừm!!」"
# monologue
# JP: 日々姫が笑う。視線をまったく崩さぬままに、\nそれでも、日々姫の笑顔で笑う。
2845 = "Hibiki mỉm cười. Ánh mắt vẫn không hề xao nhãng,\nnhưng con bé vẫn nở một nụ cười rạng rỡ đặc trưng của mình."
# monologue
# JP: ならばもう。何も心配することはない。
2805 = "Nếu vậy thì. Chẳng còn gì phải lo lắng nữa."
# 【日々姫】
# display as 日日姬
# JP: 「――。\x%l自弁;#00ffc040;自弁%l;#;、\x%l常用;#00ffc040;常用%l;#;！！」
1309 = "「——. \\x%l自弁;#00ffc040;Van hãm tự động%l;#;, \\x%l常用;#00ffc040;phanh thường%l;#;!!」"
# monologue
# JP: ――そして、日々姫は\x%lブレーキ;#00ffc040;ブレーキ%l;#;をかける。\n一拍置いた、いつもより遅めのタイミングで。
2883 = "——Và rồi, Hibiki kéo \\x%lブレーキ;#00ffc040;phanh%l;#;.\nChậm hơn một nhịp so với thường lệ."
# 【ニイロク】
# display as 二六
# JP: 「ん」
# 1842 = "「嗯」" 
# monologue
# JP: Ⅸ号と\x%l客車;#00ffc040;客車%l;#;は、素直に減速し始める。
2496 = "Đầu máy số 9 và \\x%l客車;#00ffc040;toa hành khách%l;#; ngoan ngoãn bắt đầu giảm tốc."
# monologue
# JP: 速度計の針は変わらず、ぴくりとも動く気配を見せない。\nが、この減速で間違いない。
2982 = "Kim đồng hồ tốc độ vẫn vậy, không có dấu hiệu nhúc nhích.\nNhưng tốc độ giảm này là hoàn toàn chính xác."
# 【日々姫】
# display as 日日姬
# JP: 「かいだーーーん」
1741 = "「Từng nấ——c.」"
# monologue
# JP: \x%l重なり位置;#00ffc040;重なり位置%l;#;。\n緩め・込め位置。また\x%l重なり位置;#00ffc040;重なり位置%l;#;。
97 = "\\x%l重なり位置;#00ffc040;Vị trí giữ phanh%l;#;.\nVị trí nhả - nạp. Lại trở về \\x%l重なり位置;#00ffc040;vị trí giữ phanh%l;#;."
# monologue
# JP: 実になめらかな減速で、列車はホームへ入線していく。\n後は制動力自体を緩め、速度を落としすぎないように――
3015 = "Với tốc độ giảm mượt mà, đoàn tàu từ từ tiến vào sân ga.\nPhần còn lại chỉ là nới lỏng lực hãm, tránh để tốc độ giảm quá nhanh——"
# monologue
# JP: （くっ――）
3070 = "（Ư——）"
# monologue
# JP: ああ――ほんのわずかに早かったか。\n調整のための、かすかな\x%l減圧;#00ffc040;減圧%l;#;。
2653 = "A——Hình như hơi sớm một chút thì phải.\nMột sự \\x%l減圧;#00ffc040;giảm áp%l;#; rất nhỏ để điều chỉnh."
# monologue
# JP: ごくごく軽い衝動とともに、\n列車は静かに――\x%l動輪;#00ffc040;動輪%l;#;全ての動きを止める。
3013 = "Cùng với một chấn động cực kỳ nhẹ,\nđoàn tàu chầm chậm dừng lại——tất cả \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; đều đứng yên."
# 【日々姫】
# display as 日日姬
# JP: 「緩\x%lブレーキ;#00ffc040;ブレーキ%l;#;。\x%l逆転機;#00ffc040;逆転機%l;#;、\x%lミッドギア;#00ffc040;ミッドギア%l;#;」
2167 = "「Hãm \\x%lブレーキ;#00ffc040;phanh%l;#; nhẹ. \\x%l逆転機;#00ffc040;Cần đảo chiều%l;#;, \\x%lミッドギア;#00ffc040;số trung tính%l;#;.」"
# monologue
# JP: 停車措置を素早くこなし、\n日々姫は胸のポケットから、自分の鉄道時計を取り出す。
2829 = "Thao tác dừng tàu được thực hiện nhanh gọn,\nHibiki lấy chiếc đồng hồ đường sắt của mình ra từ túi áo ngực."
# 【日々姫】
# display as 日日姬
# JP: 「901列車、バーベキュー・オリヴィ。\n御一夜温泉駅入線1145――定刻っ！！！」
2278 = "「Đoàn tàu 901, BBQ Olivy.\nVào ga suối nước nóng Ohitoyo lúc 1145——Đúng giờ!!!」"
# 【ニイロク】
# display as 二六
# JP: 「停止位置。ぴたり。――上出来」
1729 = "「Vị trí dừng tàu. Vừa khít. ——Xuất sắc.」"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！！」
# 1845 = "「嗯！！」" 
# monologue
# JP: ニイロクの確認を受け、\n日々姫の笑顔が鮮やかに咲く。
2921 = "Nhận được sự xác nhận từ Niiroku,\nnụ cười của Hibiki nở rộ rạng rỡ."
# 【日々姫】
# display as 日日姬
# JP: 「ありがと！　おつかれ！！！」
2162 = "「Cảm ơn nha! Mọi người vất vả rồi!!!」"
# 【凪】
# display as 凪
# JP: 「おっつかればーーい！」
2171 = "「Vất vả rồi nha!」"
# 【ニイロク】
# display as 二六
# JP: 「いい運転。だった。\n自分がどれだけ、サポートできたか。わからないけど」
2271 = "「Lái tàu tốt. Lắm.\nTôi cũng không biết. Mình đã hỗ trợ được bao nhiêu. Nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなん！　こぎゃんとよ、こぎゃーーーーんと！！」
2196 = "「Làm gì có! Nhiều cỡ này nè, cỡ này nèeeeeee!!」"
# monologue
# JP: 両手を思い切り思い切り、\n指先までをぴぃんと日々姫は伸ばし切る。
2835 = "Hibiki dang rộng hai tay hết cỡ,\nduỗi thẳng tắp cho đến tận đầu ngón tay."
# 【日々姫】
# display as 日日姬
# JP: 「速度計！　ニイロクのアドバイスなかったら、\n私、あのままきっとパニックしちゃっとったけん」
2207 = "「Vụ đồng hồ tốc độ á! Nếu không có lời khuyên của Niiroku,\nchắc chắn tôi đã hoảng loạn luôn rồi.」"
# 【ニイロク】
# display as 二六
# JP: 「なら。よかった」
2202 = "「Vậy thì. Tốt rồi.」"
# monologue
# JP: ニイロクの表情は動かない。\nけれども声が――ふわりと、わらった。
2506 = "Nét mặt Niiroku không hề thay đổi.\nNhưng giọng nói——đã khẽ bật cười."
# 【凪】
# display as 凪
# JP: 「凪さまは！　凪さまはどーだったとばい！？」
2058 = "「Thế Nagi đại nhân thì sao! Nagi đại nhân hôm nay thế nào hả!?」"
# 【日々姫】
# display as 日日姬
# JP: 「完璧！　一番おちついてたし、ミスもなかった。\n凪ちゃんがいつも通りで、それで落ち着けたのもあった」
1924 = "「Hoàn hảo! Bình tĩnh nhất luôn, không mắc lỗi nào cả.\nChính nhờ bé Nagi cứ tưng tửng như mọi khi nên chị mới bình tĩnh lại được đó.」"
# 【凪】
# display as 凪
# JP: 「さすが！　さすがは凪さまばいっ！！」
1860 = "「Tuyệt vời! Quả không hổ danh Nagi đại nhân!!」"
# monologue
# JP: 自身満々の言葉だけれども、笑顔は実に照れくさそうだ。
2589 = "Miệng thì nói đầy tự tin, nhưng nụ cười lại trông có vẻ khá ngượng ngùng."
# monologue
# JP: 仕事を果たした喜びと、それを褒められた嬉しさとが、\n綺麗に混じり合っている。
3029 = "Niềm vui khi hoàn thành công việc và sự sung sướng khi được khen ngợi,\nđang hòa quyện vào nhau một cách tuyệt đẹp."
# monologue
# JP: （ああ――）
3074 = "（A——）"
# monologue
# JP: これがオリヴィの育てたチーム。\nこれがオリヴィの託したものか。
2978 = "Đây chính là đội ngũ do Olivy bồi dưỡng.\nĐây là những gì Olivy gửi gắm sao."
# monologue
# JP: 引退をして構わぬと、何故思えたか――\nそれを、少しは[わか,1]理解れた気がする。
2723 = "Tại sao cô ấy lại nghĩ rằng mình có thể yên tâm nghỉ hưu——\nTôi cảm giác mình đã hiểu được phần nào lý do đó."
# 【日々姫】
# display as 日日姬
# JP: 「それで、あの――にぃに――ううん、えと、\n右田双鉄教導\x%l機関士;#00ffc040;機関士%l;#;」
2255 = "「Vậy, ừm——anh hai——à không, ừm,\nGiáo quan \\x%l機関士;#00ffc040;lái tàu%l;#; Migita Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　右田日々姫\x%l機関士;#00ffc040;機関士%l;#;」
2052 = "「Chuyện gì vậy? \\x%l機関士;#00ffc040;Lái tàu%l;#; Migita Hibiki.」"
# 【日々姫】
# display as 日日姬
# JP: 「私――私達の、今日の乗務の[ひょうてい,1]評定は」
1967 = "「Đánh giá ca trực hôm nay của em——của bọn em là.」"
# 【双鉄】
# display as 雙鐵
# JP: 「最後の\x%lブレーキ;#00ffc040;ブレーキ%l;#;が珠に瑕だったが、\nその他には概ね問題がない」
2047 = "「Pha hãm \\x%lブレーキ;#00ffc040;phanh%l;#; cuối cùng là hạt sạn duy nhất,\ncòn lại thì nhìn chung không có vấn đề gì.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
1814 = "「A.」"
# monologue
# JP: 日々姫の笑みがまた変化する。\n安堵が、歓喜が、顔いっぱいにゆるゆるひろがる。
2842 = "Nụ cười của Hibiki lại thay đổi.\nSự an tâm, niềm vui sướng lan tỏa khắp khuôn mặt con bé."
# 【日々姫】
# display as 日日姬
# JP: 「じゃ、私たちっ」
2252 = "「Vậy, bọn em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1842 = "「嗯」" 
# monologue
# JP: 無論いくつか、指摘すべき、細かな改善点はある。
2878 = "Tất nhiên là vẫn còn vài điểm nhỏ cần cải thiện phải chỉ ra."
# monologue
# JP: が、それはオリヴィハチロクとも相談の上、\n後ほど文書で出せばいい。
2484 = "Nhưng cái đó cứ bàn bạc với Olivy và Hachiroku,\nrồi sau đó gửi văn bản cũng được."
# 【双鉄】
# display as 雙鐵
# JP: 「合否の結果なら、\n運転台の外に掲出されているぞ？」
2019 = "「Nếu là kết quả đậu rớt,\nthì đã được dán bên ngoài buồng lái rồi đấy?」"
# 【日々姫】
# display as 日日姬＆凪
# JP: 「えっ！？」\n「いつの間にばい！？」
1790 = "「Hả!?」\n「Từ lúc nào vậy!?」"
# monologue
# JP: ふたり同時に窓からホームに目を走らせて、
2688 = "Cả hai đồng loạt hướng mắt ra ngoài cửa sổ nhìn về phía sân ga."
# 【日々姫】
# display as 日日姬＆凪
# JP: 「あっ」\n「にへへーっ、にーさん、なかなかキザばいっ！」
1816 = "「A.」\n「Nihehe, anh hai, cũng sến súa gớm nha!」"
# monologue
# JP: 人、人、人。
2513 = "Người, người và người."
# monologue
# JP: Ⅸ号と一緒に写ろうと、あるいは自撮りし、\nあるいはカメラを周りの人にお願いしている、人たちの顔。
2902 = "Những khuôn mặt háo hức muốn chụp ảnh cùng đầu máy số 9, người thì selfie,\nngười thì nhờ người xung quanh chụp hộ."
# 【ニイロク】
# display as 二六
# JP: 「――みんな。笑顔。\n自分たちが、運んだ。笑顔」
1877 = "「——Mọi người. Đều đang cười.\nLà nụ cười. Mà chúng ta. Đã chở đến.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。\n乗る前よりも、ずっと明るく輝く笑顔だ」
2084 = "「Đúng vậy.\nMột nụ cười rạng rỡ và tươi sáng hơn hẳn lúc trước khi lên tàu.」"
# 【日々姫】
# display as 日日姬
# JP: 「これが――私達の合格証」
2195 = "「Đây chính là——Giấy chứng nhận đậu của chúng ta.」"
# 【凪】
# display as 凪
# JP: 「凪さまなんかっ、\nなんだかますますうれしかとばーい！！」
2060 = "「Nagi đại nhân đây,\ntự dưng thấy càng lúc càng vui quá đi mất!!」"
# monologue
# JP: 風呂にいれられてあがったばかりの子犬のように、\n凪がぶるりと大きく震える。
2596 = "Nagi rùng mình một cái thật mạnh,\ngiống hệt một chú cún con vừa mới tắm xong."
# monologue
# JP: そうしてもう一度ホームを見渡し、\nきょとん、と不思議そうな顔で僕を見る。
2915 = "Sau đó con bé lại đưa mắt nhìn quanh sân ga một lần nữa,\nrồi ngơ ngác nhìn tôi với vẻ mặt khó hiểu."
# 【凪】
# display as 凪
# JP: 「オリヴィ、おらんと？」
1893 = "「Olivy, không có ở đây sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　む――確かに姿がみえんな」
1856 = "「Hửm? Ưm——Đúng là không thấy bóng dáng đâu cả.」"
# 【ニイロク】
# display as 二六
# JP: 「オリヴィ。寝てる。レールショップで。\nハチロクが、起こすかどうか、悩んでる」
1895 = "「Olivy. Đang ngủ. Ở cửa hàng đường sắt.\nHachiroku. Đang phân vân. Không biết có nên gọi dậy không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。では、『正午までは寝かせておいてやれ』と、\n\x%l共感;#00ffc040;共感%l;#;で伝えてもらえるか？」
2198 = "「Vậy sao. Thế thì, em có thể truyền đạt qua \\x%l共感;#00ffc040;cộng cảm%l;#; là,\n『Cứ để cô ấy ngủ đến giữa trưa đi』 được không?」"
# 【ニイロク】
# display as 二六
# JP: 「わかった。正午を過ぎたら起こす。でいい？」
1906 = "「Hiểu rồi. Quá trưa sẽ gọi dậy. Có được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1842 = "「嗯」" 
# 【ニイロク】
# display as 二六
# JP: 「伝えた。了解。と。それと――。\n『起こすのが可哀想なほど安心しきって熟睡してる』と」
2105 = "「Đã truyền đạt. Rõ rồi. Với lại——.\n『Cô ấy ngủ say và yên bình đến mức không nỡ gọi dậy luôn』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ありがとう」
1850 = "「Ừm. Cảm ơn em.」"
# monologue
# JP: 伝えてもらえてほっとする。\n安静というのであれば、やはり睡眠が一番だろうし……
2711 = "Nhờ truyền đạt xong tôi cũng thấy nhẹ nhõm.\nNếu nói đến nghỉ ngơi thì quả nhiên giấc ngủ là tốt nhất mà……"
# 【双鉄】
# display as 雙鐵
# JP: 「……それほど信頼してくれているのだな。\nオリヴィが手塩にかけて育てた――このチームのことを」
1695 = "「……Cô ấy tin tưởng mọi người đến mức đó đấy.\nMột đội ngũ——do chính tay Olivy dày công bồi dưỡng cơ mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへ、嬉しかー」
1859 = "「Ehehe, vui quá đi.」"
# monologue
# JP: 日々姫の顔から力が抜ける、\n笑顔のままにほにゃりと溶けて、家での日々姫の顔になる。
2847 = "Sự căng thẳng trên khuôn mặt Hibiki tan biến,\nnụ cười dần trở nên mềm mại, trở lại là khuôn mặt của Hibiki khi ở nhà."
# 【日々姫】
# display as 日日姬
# JP: 「ばってん、これでオリヴィが引退しちゃうの……\nやっぱり、正直寂しかねー」
2248 = "「Nhưng mà, vậy là Olivy sẽ nghỉ hưu sao……\nNói thật thì, quả nhiên là buồn ghê.」"
# 【双鉄】
# display as 雙鐵
# JP: 「乗務前にも説明したが、\n常勤を引退し、嘱託扱いになるだけだ」
1867 = "「Trước ca trực anh cũng giải thích rồi mà,\ncô ấy chỉ nghỉ làm nhân viên toàn thời gian và chuyển sang làm nhân viên hợp đồng thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 1842 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「なにかの用事で、ニイロクが乗務を外れる際には、\n代理を頼まれる筆頭候補は、当然オリヴィになるだろう」
1909 = "「Những lúc Niiroku có việc bận không thể trực ca,\nthì ứng cử viên số một được nhờ thay thế, tất nhiên sẽ là Olivy rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「そか。ならよかったー」
2201 = "「Vậy ạ. Thế thì tốt quá.」"
# monologue
# JP: あまりに日々姫がご機嫌すぎて、\nほんのすこしだけからかいたくなる。
2839 = "Thấy Hibiki vui vẻ quá đỗi,\ntôi bỗng muốn trêu chọc con bé một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？\n日々姫はそんなにオリヴィに働かせたいのか？」
1964 = "「Gì đây?\nHibiki muốn bắt Olivy làm việc đến thế cơ à?」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんわけなか！　私だって、\nオリヴィにはたっぷり休んで欲しかとよ！　ばってん」
2194 = "「Làm gì có chuyện đó! Em cũng muốn\nOlivy được nghỉ ngơi thật nhiều chứ bộ! Nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ばってん？」
1715 = "「Nhưng mà?」"
# 【日々姫】
# display as 日日姬
# JP: 「カウキャッチャー。あと二ヶ月もせんと仕上がるけん。\nせっかくだから、オリヴィにも試してほしくって」
2263 = "「Cái gạt chướng ngại vật á. Chắc không tới 2 tháng nữa là xong rồi.\nSẵn dịp nên em cũng muốn Olivy dùng thử xem sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1814 = "「啊」" 
# monologue
# JP: そう聞くだけで僕まで嬉しくなってくる。\n映像がまぶたの裏に浮き上がってくる。
2924 = "Chỉ nghe vậy thôi mà tôi cũng thấy vui lây.\nHình ảnh đó hiện lên ngay trong tâm trí tôi."
# monologue
# JP: カウキャッチャーを付けたⅨ号、その前に立つオリヴィ。\n――どれほどに晴れがましい笑顔を見せてくれるだろう。
2906 = "Đầu máy số 9 gắn gạt chướng ngại vật, và Olivy đứng trước đó.\n——Không biết nụ cười của cô ấy lúc đó sẽ rạng rỡ đến nhường nào nhỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、それは楽しみだ。\nそのときには、もちろんオリヴィに乗務してもらおう」
2122 = "「Quả thực, rất đáng mong đợi đấy.\nLúc đó, tất nhiên chúng ta sẽ nhờ Olivy tham gia trực ca rồi.」"
# 【ニイロク】
# display as 二六
# JP: 「反対。自分は」
1977 = "「Phản đối. Tôi thì.」"
# 【双鉄】
# display as 雙鐵＆日日姬
# JP: 「っ！？」\n「ええっ！？」
1846 = "「!?」\n「Hả!?」"
# monologue
# JP: 思いもかけぬニイロクの声。
2505 = "Giọng nói của Niiroku vang lên đầy bất ngờ."
# monologue
# JP: いや……その声に浮かれた気分を剥がされたなら、\nニイロクの反対の理由が何かは容易に想像できる。
2482 = "Không…… Khi giọng nói ấy kéo tôi ra khỏi tâm trạng lâng lâng,\nthì lý do Niiroku phản đối cũng không khó để tưởng tượng ra."
# 【凪】
# display as 凪
# JP: 「オリヴィ、そぎゃんヤバい感じと？」
1888 = "「Olivy, tình trạng tệ đến mức đó sao?」"
# monologue
# JP: 凪が、僕より先に言葉を発する。\n瞬間、背筋がゾッとする。
2594 = "Nagi lên tiếng trước cả tôi.\nKhoảnh khắc đó, tôi chợt thấy lạnh sống lưng."
# monologue
# JP: あるいは凪の動物的な感覚が、僕らの理解より深く、\nオリヴィの状態を、危機的に捉えたのかもしれぬと感じ。
2501 = "Có lẽ trực giác nhạy bén như động vật của Nagi đã hiểu rõ hơn chúng tôi,\nvà cảm nhận được tình trạng của Olivy đang ở mức nguy kịch."
# 【ニイロク】
# display as 二六
# JP: 「今は。一時期ほどには、ひどくない。\nむしろ。ここ最近。かなり落ち着いてきてもいる」
2150 = "「Hiện tại. Không tệ như một thời gian trước.\nTrái lại. Gần đây. Đã ổn định hơn khá nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1808 = "「啊——」" 
# monologue
# JP: 明確な否定をもらい、ほっとする。\n同時に、根拠が気になってくる。
2738 = "Nhận được lời phủ định rõ ràng, tôi thở phào nhẹ nhõm.\nĐồng thời, tôi cũng tò mò về cơ sở của lời nói đó."
# 【双鉄】
# display as 雙鐵
# JP: 「その、“一時期”とは」
2192 = "「Cái \"một thời gian trước\" đó là……」"
# 【ニイロク】
# display as 二六
# JP: 「清春と自分とが。オリヴィと会った。ころ。\nあの頃のオリヴィは。いつ壊れるか。怖かった」
2032 = "「Lúc Kiyoharu và tôi. Gặp Olivy.\nOlivy lúc đó. Sợ rằng. Sẽ hỏng bất cứ lúc nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ？」
# 1854 = "「嗯？」" 
# monologue
# JP: そんな素振りは、\n少なくとも僕には見られなかったような気が――っ！！
2933 = "Những biểu hiện như vậy,\nít nhất là tôi không hề nhận ra——!!"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、そうか、\x%l共感;#00ffc040;共感%l;#;か？　だからニイロクはあの頃、\n時折、苦しげな声をあげていたのか」
2134 = "「À, ra là vậy, là do \\x%l共感;#00ffc040;cộng cảm%l;#; sao? Thảo nào dạo đó Niiroku,\nthỉnh thoảng lại phát ra những tiếng rên rỉ đau đớn.」"
# 【ニイロク】
# display as 二六
# JP: 「自分は、帝鉄末期の。\n当時最新鋭の。特急型電車の。試験機。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;」
1980 = "「Tôi là. \\x%lレイルロオド;#00ffc040;Railord%l;#; thử nghiệm. Của loại tàu điện tốc hành. Tiên tiến nhất thời đó.\nVào cuối thời Teitetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「試験機……」
2095 = "「Mẫu thử nghiệm……」"
# 【ニイロク】
# display as 二六
# JP: 「そう。秘匿性の高い。試験機の。トップナンバーだから。\n\x%l共感;#00ffc040;共感%l;#;に関し。他の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に出来ないことも。可能」
2035 = "「Đúng vậy. Mẫu thử nghiệm. Có tính bảo mật cao. Lại là chiếc đầu tiên.\nVề mặt \\x%l共感;#00ffc040;cộng cảm%l;#;. Có thể làm được. Những điều mà các \\x%lレイルロオド;#00ffc040;Railord%l;#; khác không thể.」"
# 【双鉄】
# display as 雙鐵
# JP: 「秘匿性、か」
1727 = "「Tính bảo mật, sao.」"
# monologue
# JP: ……ああ、やはりなのかと思う。\nニイロクがまだ、“包帯の少女”だったころ。
2660 = "……A, quả nhiên là vậy.\nCái thời Niiroku vẫn còn là \"Thiếu nữ quấn băng\"."
# monologue
# JP: ハチロクが、“存在さえも感知できない”と訝しんでいた、\nその理由が、ようやく明らかになった気がする。
2877 = "Lý do mà Hachiroku từng kinh ngạc thốt lên \"Thậm chí không thể cảm nhận được sự tồn tại\",\ncuối cùng cũng đã sáng tỏ."
# 【ニイロク】
# display as 二六
# JP: 「まさか。自分が\x%l共感;#00ffc040;共感%l;#;してると。\n気づかれてるとは。思わなかった」
1896 = "「Chắc hẳn. Cô ấy không ngờ. Mình đang bị \\x%l共感;#00ffc040;cộng cảm%l;#;.\nVà bị phát hiện.」"
# 【双鉄】
# display as 雙鐵
# JP: 「気づいた――繋がったのは、たった今だ。が――」
2156 = "「Tôi cũng chỉ mới nhận ra——mới liên kết lại được mọi chuyện thôi. Nhưng——」"
# monologue
# JP: 記憶と気づきが結びつき合う。
2762 = "Những ký ức và nhận thức đan xen vào nhau."
# monologue
# JP: あの苦しげな声――\nなにかを伝えたそうにしていた、ニイロクと赤井宮司と。
2765 = "Những tiếng rên rỉ đau đớn đó——\nNiiroku và Akai Guuji, như muốn truyền đạt điều gì đó."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィの苦痛の、あるいは恐怖の\x%l共感;#00ffc040;共感%l;#;を……\nハチロクは受け取れぬことで、むしろ救われたのかもな」
1890 = "「Sự \\x%l共感;#00ffc040;cộng cảm%l;#; về nỗi đau đớn, hay nỗi sợ hãi của Olivy……\nViệc Hachiroku không thể tiếp nhận được, có lẽ lại là một sự giải thoát cho em ấy.」"
# 【ニイロク】
# display as 二六
# JP: 「かもしれない。し。ハチロクも受け取って。\nそれで、知らないふりをしていただけかもしれない」
1982 = "「Cũng có thể. Và. Hachiroku cũng tiếp nhận được.\nNhưng, chỉ là đang giả vờ như không biết thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――」
1801 = "「Ừm——」"
# monologue
# JP: 心を開いてくれているニイロクを否定せぬために、\n口ではそのように答えておくが、ありえない。
2750 = "Để không phủ nhận Niiroku đang mở lòng với mình,\ntôi chỉ ậm ừ đáp lại, nhưng chuyện đó là không thể nào."
# monologue
# JP: そのような重大情報であるなら、\nハチロクは必ず僕に、報告している。
2704 = "Nếu là một thông tin quan trọng như vậy,\nchắc chắn Hachiroku đã báo cáo cho tôi rồi."
# 【ニイロク】
# display as 二六
# JP: 「あのころのオリヴィは、苦痛、痛みに満ち満ちていた。\nそれを普段は、とても上手に。隠していた」
2243 = "「Olivy lúc đó. Tràn ngập nỗi đau, và sự thống khổ.\nNhưng bình thường, cô ấy che giấu. Rất khéo léo.」"
# 【双鉄】
# display as 雙鐵
# JP: 「隠す？」
2267 = "「Che giấu?」"
# 【ニイロク】
# display as 二六
# JP: 「嬉しい。楽しい。大好き。しあわせ。\nそういうものを、たくさんたくさん、散りばめていた」
2260 = "「Vui vẻ. Hạnh phúc. Yêu thương. Sung sướng.\nCô ấy rải rác. Rất nhiều, rất nhiều những thứ đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――」
1752 = "「Ra là vậy——」"
# monologue
# JP: 隠す、というよりそれはむしろ……
3016 = "Che giấu, hay nói đúng hơn là……"
# monologue
# JP: 自分を騙し、痛みを忘れ、苦しみに耐える、\n苦肉の方法だったのではないかと、ふっと感じる。
2864 = "Tự lừa dối bản thân, quên đi nỗi đau, chịu đựng sự thống khổ,\ntôi chợt cảm thấy đó có lẽ là một khổ nhục kế."
# 【ニイロク】
# display as 二六
# JP: 「だけど。オリヴィの処理能力。多分。相当に低い。\nだから、乗務で。運転補助に。処理能力が集中すると」
1677 = "「Nhưng mà. Năng lực xử lý của Olivy. Chắc là. Khá thấp.\nNên khi trực ca. Tập trung năng lực xử lý. Vào việc hỗ trợ lái tàu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「楽しいや嬉しいが消え――\n痛みや苦痛が、むき出しになってしまったのか？」
1960 = "「Thì niềm vui và hạnh phúc sẽ biến mất——\nNỗi đau và sự thống khổ sẽ bị phơi bày ra sao?」"
# 【ニイロク】
# display as 二六
# JP: 「それでも、ほとんどは隠してた。\nだけど。隙間から、突き刺さってきた」
1748 = "「Dù vậy. Phần lớn vẫn được che giấu.\nNhưng. Xuyên qua những khe hở. Nó đâm châm chích.」"
# monologue
# JP: ぶるり、ニイロクが小さく震える。
2963 = "Niiroku khẽ rùng mình một cái."
# 【ニイロク】
# display as 二六
# JP: 「帝鉄そのものの。断末魔の叫び。それを知ってる自分が。\n初めて体験させられる。どうしようもなく。鋭い痛みが」
1751 = "「Tiếng thét hấp hối. Của chính Teitetsu. Bản thân tôi dù biết rõ.\nNhưng đó là lần đầu tiên được trải nghiệm. Nỗi đau nhói. Không thể diễn tả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それほど……か」
2133 = "「Đến mức đó sao……」"
# 【ニイロク】
# display as 二六
# JP: 「乗務に支障。出たら。すぐに報告しようと思っていた。\nけれど。乗務。ただの一度も。滞らなかった」
2062 = "「Nếu gây cản trở. Cho ca trực. Tôi định sẽ báo cáo ngay.\nNhưng. Ca trực. Chưa một lần nào. Bị đình trệ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1842 = "「嗯」" 
# monologue
# JP: その点ならば、僕も全力で同意できる。
2977 = "Về điểm đó, tôi hoàn toàn đồng ý."
# monologue
# JP: オリヴィの仕事はいつであれ、\nあのハチロクが賞賛するほど、行き届いたものだ。
2681 = "Bất cứ lúc nào, công việc của Olivy\ncũng đều chu đáo đến mức khiến Hachiroku phải khen ngợi."
# 【日々姫】
# display as 日日姬
# JP: 「オリヴィ……今は――\n今も、そぎゃんと苦痛ば、隠しておると？」
2228 = "「Olivy…… bây giờ——\nBây giờ cô ấy cũng đang giấu đi nỗi đau đớn đó sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
1803 = "「!」"
# 【ニイロク】
# display as 二六
# JP: 「多分無い。と思う。……。去年の夏の。終わりごろから。\nオリヴィの感情の主体。幸せが溢れだす。ようなもの」
1974 = "「Chắc là không. Tôi nghĩ vậy. ……Từ khoảng. Cuối mùa hè năm ngoái.\nCảm xúc chủ đạo của Olivy. Như thể. Hạnh phúc tràn trề.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1808 = "「啊——」" 
# monologue
# JP: 去年の夏の終わりなら……\n宗方さんが来訪してくれ、それをひとつのきっかけに――
2611 = "Nếu là cuối mùa hè năm ngoái……\nThì nhân chuyến viếng thăm của ông Munakata làm cơ hội——"
# monologue
# JP: 不死鳥博士・電車姫様・登呂流湯さんの\n相互協力体制が、ちょうど生まれたあの時期だ。
2472 = "Chính là lúc hệ thống hợp tác tương trợ giữa Tiến sĩ Fushicho,\nDenshahime và ông chủ nhà tắm Tororyu-yu được hình thành."
# 【双鉄】
# display as 雙鐵
# JP: 「……延命ケアや緩和ケアが、\n効果を示してくれている、と考えても良いのだろうか」
1669 = "「……Liệu có thể cho rằng, các biện pháp chăm sóc kéo dài tuổi thọ\nvà chăm sóc giảm nhẹ đã phát huy hiệu quả không?」"
# 【ニイロク】
# display as 二六
# JP: 「自分には。そこまではわからない。\nかいかぶりすぎ」
2221 = "「Cái đó. Tôi không rõ.\nĐánh giá quá cao rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはそうか。すまん」
1831 = "「À, cũng phải. Xin lỗi nhé.」"
# 【ニイロク】
# display as 二六
# JP: 「謝ること。ない。延命ケア。今のうちから。\n自分も。清春とやっている。けど」
1681 = "「Không cần. Xin lỗi. Chăm sóc kéo dài tuổi thọ. Ngay từ bây giờ.\nTôi. Cùng với Kiyoharu. Cũng đang thực hiện. Nhưng.」"
# monologue
# JP: ふんわり、声がやわらかになる。
2508 = "Giọng nói bỗng trở nên dịu dàng."
# 【ニイロク】
# display as 二六
# JP: 「あれ。とてもいい。体温。清春に計ってもらう。\nそれだけで。メンテナンス。できてる気になる」
2226 = "「Cái đó. Rất tốt. Nhiệt độ cơ thể. Được Kiyoharu đo cho.\nChỉ vậy thôi. Đã cảm thấy. Như được bảo dưỡng rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2200 = "「Vậy sao.」"
# monologue
# JP: ハチロク――すずも、きっと同じく感じてくれている。\nその確信を、強くもてるゆえ思ってしまう。
2560 = "Hachiroku——Suzu chắc chắn cũng cảm thấy như vậy.\nVì có niềm tin mãnh liệt đó nên tôi mới bất giác nghĩ thế."
# 【双鉄】
# display as 雙鐵
# JP: 「――四月が、早く来てくれればいい。\nそうすれば、オリヴィの延命ケアもよりいっそう」
2109 = "「——Giá như tháng Tư đến sớm hơn thì tốt biết mấy.\nNhư vậy, việc chăm sóc kéo dài tuổi thọ cho Olivy cũng sẽ càng thêm hiệu quả.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
1825 = "「A!」"
# 【凪】
# display as 凪
# JP: 「来たばい！」
1725 = "「Đến rồi kìa!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「おまたせー！　ごめーん！　ネボウしちゃっったー」
1687 = "「Để mọi người chờ lâu rồi! Xin lỗiiii! Ngủ quên mất tiêuuuu.」"
# monologue
# JP: オリヴィが小走りにかけてくる。
2683 = "Olivy chạy lon ton tới."
# monologue
# JP: ハチロクは走ることなく、その後ろからしずしずと。
2569 = "Hachiroku không chạy mà thong thả bước theo sau."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、どーだった！！？」
2250 = "「Thế, sao rồi!!?」"
# 【凪】
# display as 凪
# JP: 「ふっふーん、にーさんに聞くまでもなかとよねー」
1797 = "「Hừ hừm, đâu cần phải hỏi anh hai đâu ha.」"
# 【日々姫】
# display as 日日姬
# JP: 「そーそー！\nオリヴィ！　自分のまわり見てみてよ」
1777 = "「Đúng rồi đúng rồi!\nOlivy! Thử nhìn xung quanh xem.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「え？　――wow！！」
1794 = "「Hả? ——Wow!!」"
# monologue
# JP: オリヴィの姿を見つけて、声を聞きつけ、\nバラけはじめていた乗客たちが、再び集まりはじめる。
2882 = "Nhìn thấy Olivy, nghe thấy giọng cô ấy,\nnhững hành khách đang bắt đầu tản đi lại tụ tập lại."
# monologue
# JP: カメラを、スマホをその手に手に。\n笑顔をうかべ、オリヴィとの記念写真を撮りたがっている。
2512 = "Trên tay mỗi người là máy ảnh, điện thoại thông minh.\nHọ tươi cười, muốn chụp một bức ảnh kỷ niệm cùng Olivy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あははっ！　そっか！　そーなんだっ！！\nヒビキ、ナギ！　ニイロク！　合格おめでとー！　で！」
1822 = "「Ahaha! Ra vậy! Ra là vậy!!\nHibiki, Nagi! Niiroku! Chúc mừng mọi người đã đậu nha! Và!」"
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「む！」\n「まぁ！」
1804 = "「Hửm!」\n「Trời ạ!」"
# monologue
# JP: しゃがんだかと思ったオリヴィが、\n大きく伸びて跳ね上がり、帽子を空へと投げ飛ばす。
2776 = "Cứ tưởng Olivy ngồi xổm xuống,\nai dè cô ấy vươn người bật nhảy thật cao, tung chiếc mũ lên không trung."
# monologue
# JP: 高く。高く。高く。\n青空に溶けてしまうほど。
3047 = "Cao. Thật cao. Cao vút.\nNhư thể hòa tan vào bầu trời xanh thẳm."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ！　引退おめでとー！！　だねっ！！！」
1892 = "「Olivy! Chúc mừng nghỉ hưu nha!! Phải không!!!」"
# monologue
# JP: 御一夜発早戸いき。\n折り返し、早戸発御一夜いきの乗務を終えれば日が暮れる。
2874 = "Từ Ohitoyo đi Hayato.\nQuay đầu lại, hoàn thành chuyến đi từ Hayato về Ohitoyo thì trời cũng sẩm tối."
# monologue
# JP: ナビに頼んで隆起現場に急ぎ向かえば、\nオリヴィはそこに佇んでいる。
2492 = "Nhờ Navi đưa vội đến hiện trường sụt lún,\nthì thấy Olivy đang đứng thẫn thờ ở đó."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ。冷えるぞ」
1894 = "「Olivy. Lạnh đấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「冷やしたほーがちょーどいいでしょ？\nけさは、41どもあったんだしー」
2131 = "「Làm mát một chút mới vừa chứ?\nSáng nay tận 41 độ lận mà.」"
# monologue
# JP: ……昼の体温測定では、\nオリヴィの口内温度は、40.7度まで下がっていた。
2490 = "……Lần đo nhiệt độ buổi trưa,\nnhiệt độ trong miệng Olivy đã giảm xuống còn 40.7 độ."
# monologue
# JP: ゆえ、約束通り、\nここの監視についてもらってはいるのだが――
2782 = "Do đó, theo như lời hứa,\ntôi đã để cô ấy giám sát ở đây, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「くれぐれも無理はしないでくれ。\nなにかあっては、宗方さんに申し訳がたたん」
1670 = "「Đừng có cố quá đấy.\nNhỡ có chuyện gì thì tôi không biết ăn nói sao với anh Munakata đâu.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「してないよー。『ナビ子がとんできた！』って思って、\nオムカエにでてきただけだからー」
2083 = "「Không có cố đâu~. Chỉ là nghĩ 'Navi bay tới rồi!'\nnên ra đón thôi mà~」"
# monologue
# JP: いって、笑って。\nオリヴィは線路の向こうを指差してみせる。
2964 = "Nói rồi cười.\nOlivy chỉ tay về phía bên kia đường ray."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それまでは、ヒミツキチで休み休みで、のんびり見て。\nあと、ご近所まわって、おはなしきいたりしてただけ」
1863 = "「Trước lúc đó thì tôi chỉ ở căn cứ bí mật nghỉ ngơi, thong thả quan sát.\nVới cả đi loanh quanh hàng xóm nghe ngóng chuyện trò thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2197 = "「Vậy sao.」"
# monologue
# JP: ……ここの監視をすることになり、\n急ごしらえでの設営となった、保線基地。
2666 = "……Trở thành nơi giám sát khu vực này,\ncăn cứ bảo trì đường ray được dựng lên vội vã."
# monologue
# JP: 確かに機能は基地ともいえるが、見た目的には秘密基地\n――いや、むしろ、小屋という方がしっくりと来る。
2523 = "Đúng là xét về chức năng thì có thể gọi là căn cứ, nhưng nhìn bề ngoài thì giống căn cứ bí mật\n——không, đúng hơn là gọi là túp lều thì hợp lý hơn."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それとね？　セキからデンゴン。あとで自分でも\nシンセーするけど、そろそろ夜はストーブが欲しいって」
2219 = "「Với lại nè? Lời nhắn từ Seki. Lát nữa ông ấy sẽ tự\nxin, nhưng mà bảo là ban đêm bắt đầu cần lò sưởi rồi đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。ポーレットにつたえておこう」
2014 = "「Đã rõ. Tôi sẽ báo lại với Paulette.」"
# monologue
# JP: ならばゆうべ、堰さんは泊まって見てくれたのか。
2524 = "Vậy ra đêm qua, ông Seki đã ở lại để canh gác sao."
# monologue
# JP: まことありがたく嬉しいことだが、\nお年のことを考えたなら、申し訳無さが先立って来る。
3018 = "Thật sự rất biết ơn và vui mừng, nhưng\nnghĩ đến tuổi tác của ông ấy, cảm giác có lỗi lại lấn át hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「……結局は、長丁場になってしまったなぁ」
1365 = "「……Rốt cuộc thì, lại thành ra một cuộc chiến trường kỳ rồi nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「原因、ガスならよかったのですが」
1757 = "「Nguyên nhân, giá mà là do khí ga thì tốt biết mấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1842 = "「嗯」" 
# monologue
# JP: 専門業者を入れての調査結果は、\n率直にいえば空振りに等しいものだった。
2722 = "Kết quả điều tra sau khi đưa đội chuyên gia vào,\nnói thẳng ra thì chẳng khác nào công cốc."
# monologue
# JP: 『隆起を起こす程のガスは滞留しておらず検知できない』\n『トンネルや坑道跡のような地中遺物も存在しない』
1269 = "『Không phát hiện lượng khí ga tích tụ đủ lớn để gây ra hiện tượng phình lên』\n『Không tồn tại các cấu trúc ngầm như đường hầm hay di tích hầm mỏ cũ』"
# 【双鉄】
# display as 雙鐵
# JP: 「……いまだ隆起は収まらず。\nその原因はまったくもって不明のままか」
1343 = "「……Hiện tượng phình lên vẫn chưa dừng lại.\nNguyên nhân của nó vẫn hoàn toàn không rõ ràng sao.」"
# monologue
# JP: 言えばぶんぶん、オリヴィは激しく首を振る。
2927 = "Nghe vậy, Olivy lắc đầu quầy quậy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ガスでもマイセツブツでも水でもなさそーって\nわかったし！　『マッタクモッテ』じゃないと思う！」
1732 = "「Đã biết không phải do khí ga, không phải vật bị chôn vùi, cũng không phải do nước rồi mà!\nNên tôi không nghĩ là 『hoàn toàn』 đâu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな。\n言われてみればまったくもって指摘の通りだ」
1833 = "「À, đúng vậy.\nNghe cô nói thì quả thật là hoàn toàn đúng như vậy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「また！　マッタクモッテ！！」
1762 = "「Lại nữa! Hoàn toàn!!」"
# monologue
# JP: なにがおかしいと感じるのだろう？\nオリヴィはケラケラ、気分よさげに笑い続ける。
2500 = "Thấy có gì buồn cười sao?\nOlivy cứ cười khúc khích, vẻ mặt rất vui vẻ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オヒトヨとかハヤトで、\n『マッタクモッテ』、リューコーしてるの？」
1955 = "「Ở Ohito với Hayato,\ntừ 『hoàn toàn』 đang thịnh hành hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや？」
2082 = "「Không?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまの影響をうけ、ほんのときおり、日々姫が――\nああ、稀咲様もですね、口にするのを聞く程度かと」
1773 = "「Chắc là do ảnh hưởng từ ngài Soutetsu nên thỉnh thoảng Hibiki mới——\nÀ, cả cô Kisaki nữa, em mới nghe họ nói vậy thôi ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でもね！　いるの！　おじいちゃんで、\nソーテツみたいに、『マッタクモッテ』とかいうひと！」
1782 = "「Nhưng mà nhé! Có đó! Có ông lão,\ncũng hay nói 『hoàn toàn』 giống Soutetsu ấy!」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1795 = "「Chà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「『ノダ』とか『ナノダナ』とか！　おじーちゃん、\nすっごくなんだかソーテツっぽくておかしいの！」
1902 = "「Cả mấy từ như 『đấy』 hay 『đấy nhỉ』 nữa! Ông lão đó,\ntrông cứ giống giống Soutetsu thế nào ấy, buồn cười lắm!」"
# 【ハチロク】
# display as 八六
# JP: 「あらまぁ。うふふっ」
1796 = "「Ây da. Ufufu.」"
# monologue
# JP: 『お爺様が双鉄さまっぽいのではなく、\n双鉄さまがお爺様っぽいのでございます』
1278 = "『Không phải ông lão đó giống ngài Soutetsu,\nmà là ngài Soutetsu giống ông lão đó mới đúng ạ』"
# monologue
# JP: できた妻ゆえ口には出さぬが、さも楽しげなすずの――\nハチロクの目が、そういっているように感じてしまう。
2971 = "Vì là một người vợ hiền thục nên không nói ra miệng, nhưng ánh mắt vui vẻ của Suzu——\nà không, của Hachiroku, khiến tôi có cảm giác như em ấy đang nói vậy."
# monologue
# JP: （しかし、まぁ――決して悪くない気分ではある）
3066 = "（Nhưng mà, ừm——cảm giác cũng không tệ chút nào.）"
# monologue
# JP: 赤の他人の口調から、僕を連想してくれる。
2860 = "Từ cách nói chuyện của một người hoàn toàn xa lạ mà lại liên tưởng đến tôi."
# monologue
# JP: オリヴィと僕らとの距離は、\nそれくらいには、近づいているのだと感じられ。
2531 = "Khoảng cách giữa Olivy và chúng tôi,\ntôi cảm nhận được là đã gần gũi đến mức đó rồi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「やっぱり、それってオモシロイよね！\nハチロクもソーテツもにこにこしてるし！」
2066 = "「Quả nhiên là chuyện đó buồn cười mà nhỉ!\nCả Hachiroku lẫn Soutetsu đều đang cười tủm tủm kìa!」"
# 【ハチロク】
# display as 八六
# JP: 「あら」
1819 = "「Ôi chà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはともかく、その老人から、あるいは他から、\nなにか、新情報などは聞き取れたのか？」
2191 = "「Chuyện đó để sau đi, từ ông lão đó, hoặc từ những người khác,\ncó nghe ngóng được thông tin gì mới không?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ぜーんぜん！」
1919 = "「Hoàn toàn không!」"
# monologue
# JP: 問えばオリヴィはぶんぶんと、\n今度は力なく首を振る。
2926 = "Nghe tôi hỏi, Olivy lại lắc đầu quầy quậy,\nnhưng lần này thì trông có vẻ yếu ớt."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ワキミズが出たりとまったり。ニゴったりイオンしたり。\nイシュウしたり、ジワレとかあったり。ぜーんぜん無し」
1705 = "「Nào là nước ngầm rỉ ra rồi tạnh. Nào là đục ngầu hay có âm thanh lạ.\nNào là mùi lạ, hay nứt nẻ đất. Hoàn toàn không có gì hết.」"
# 【ハチロク】
# display as 八六
# JP: 「……平穏無事は、\nなによりのことではあるのですけれど」
1354 = "「……Bình yên vô sự,\ntuy là điều đáng mừng nhất nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、な」
1849 = "「Ừm, cũng đúng.」"
# monologue
# JP: しかしそれは、手がかりのなさをも示してしまう。
2630 = "Nhưng điều đó cũng đồng nghĩa với việc không có manh mối nào cả."
# monologue
# JP: 隆起はあるのに、対処療法しか打てる手がない。\n……その状況が、あと何年も続くのだろうか。
3022 = "Dù hiện tượng phình lên vẫn còn, nhưng chúng tôi chỉ có thể chữa cháy tạm thời.\n……Liệu tình trạng này sẽ còn kéo dài bao nhiêu năm nữa đây."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ところがね、ヘーオンブジってわけでもないよ？」
1675 = "「Nhưng mà nè, cũng không hẳn là bình yên vô sự đâu nha?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにかあるのか？」
1740 = "「Có chuyện gì sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「きづかない？\nっていうかソーテツ、いま体力にヨユーある？」
1723 = "「Không nhận ra hả?\nMà nè Soutetsu, bây giờ anh có dư dả thể lực không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「余裕か？　ふむ――無くはないな。\n多少の作業なら引き受けられる」
1745 = "「Dư dả sao? Hừm——Cũng không hẳn là không.\nNếu là công việc nhẹ nhàng thì tôi có thể đảm nhận được.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら、ちょっとだけ\x%lバラスト;#00ffc040;バラスト%l;#;ついてかない？」
2224 = "「Vậy thì, đi xử lý \\x%lバラスト;#00ffc040;đá ba-lát%l;#; một chút không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2015 = "「Đã rõ.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、わたくしもお手伝いいたします」
2234 = "「Nếu vậy, em cũng sẽ giúp một tay ạ.」"
# monologue
# JP: すぐにハチロクも応えてくれる。
2564 = "Hachiroku cũng lập tức đáp lời."
# monologue
# JP: 嬉しくあるが、本音をいえば、ハチロクに保線作業の――\n単純な肉体労働の負荷を、かけたいものとは思えない。
3019 = "Dù rất vui, nhưng nói thật lòng thì, tôi không muốn để Hachiroku phải gánh vác công việc bảo trì đường ray——\nmột công việc lao động chân tay đơn thuần."
# 【双鉄】
# display as 雙鐵
# JP: 「――すまんが、頼む」
1311 = "「——Xin lỗi nhé, đành nhờ em vậy.」"
# monologue
# JP: が、それでも答えはひとつしかない。\n今ここで、ハチロクの負荷を軽減しようとするのであれば。
2533 = "Nhưng dù vậy, câu trả lời chỉ có một.\nNếu bây giờ tôi muốn giảm bớt gánh nặng cho Hachiroku."
# monologue
# JP: それはそのまま、\nオリヴィの負荷の増大を、意味してしまうのだから。
2994 = "Thì điều đó cũng đồng nghĩa với việc,\nsẽ làm tăng gánh nặng cho Olivy."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕一人で済ませられればいいのだがな」
1370 = "「……Giá mà một mình tôi có thể làm xong thì tốt biết mấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ひとりじゃダメ！　バランスよくゆるまないからー。\nほんとは、もーひとりいて四人だと一番いいけど」
1661 = "「Một mình thì không được đâu! Sẽ không nới lỏng cân bằng được đâu~.\nThật ra, có thêm một người nữa thành bốn người là tốt nhất.」"
# 【ハチロク】
# display as 八六
# JP: 「あら」
# 1819 = "「啊呀」" 
# monologue
# JP: 保線小屋から持ち出し渡したビーターを、物珍しそうに\n眺め回していたハチロクが、ふっとその顔を持ち上げる。
2566 = "Hachiroku đang nhìn chằm chằm một cách tò mò vào chiếc cuốc chim lấy từ túp lều bảo trì đường ray đưa cho, chợt ngẩng mặt lên."
# 【ハチロク】
# display as 八六
# JP: 「ゆるめる。のですか？　双鉄さまのお話ですと、\n道床は、『[つ]搗き固める』ものかと、わたくしは」
2155 = "「Nới lỏng. Sao ạ? Theo như lời ngài Soutetsu nói thì,\nlớp đá nền là để 『đầm chặt』 mà, em nghĩ vậy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だねー！　言葉では『ツキカタメ』。\nけど、実際はいったんゆるめて、かためるんだよー」
2123 = "「Đúng vậy~! Nói thì là 『đầm chặt』.\nNhưng thực tế là phải nới lỏng ra một chút, rồi mới đầm chặt lại đó~」"
# monologue
# JP: 見て、と笑って、バトンのように、\nオリヴィはビーターをくるり手の中で回転させる。
2627 = "Nhìn nè, Olivy cười, rồi xoay chiếc cuốc chim trong tay một vòng như chiếc gậy chỉ huy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ビーター、普通に使う側。\nヘラみたいにさ、ひらぺったーくつぶれてるでしょお？」
2217 = "「Cuốc chim, cái đầu thường dùng ấy.\nNó dẹt và phẳng như cái xẻng đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、左様ですね」
2040 = "「Vâng, đúng vậy ạ.」"
# monologue
# JP: 言って、ハチロクはまじまじと手の中のビーターを見る。\nひらぺったいヘラ状の方、その反対の尖った方。
2581 = "Nói rồi, Hachiroku nhìn chằm chằm vào chiếc cuốc chim trong tay.\nMột đầu dẹt như cái xẻng, đầu kia thì nhọn hoắt."
# monologue
# JP: それから再びじっくりと見る、ヘラ状になっている方が、\nいわゆる“道床搗き固め”では、主として使われている。
2928 = "Sau đó nhìn kỹ lại lần nữa, cái đầu dẹt như cái xẻng đó,\nchính là đầu chủ yếu được sử dụng trong việc \"đầm chặt lớp đá nền\"."
# 【ハチロク】
# display as 八六
# JP: 「……ただ単に搗き固めるだけでしたら、\n木槌のような形状の方が、好適に思えます」
1368 = "「……Nếu chỉ đơn thuần là đầm chặt lại,\nthì hình dáng như chiếc vồ gỗ có vẻ sẽ thích hợp hơn ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そそ。だから『ツキカタメ』っていうのは、\nもう固まってる\x%lバラスト;#00ffc040;バラスト%l;#;を、一回ゆるめて崩すことなの」
1938 = "「Đúng đúng. Nên 『đầm chặt』 ấy,\nlà phải nới lỏng và làm tơi lớp \\x%lバラスト;#00ffc040;đá ba-lát%l;#; đã cứng lại ra một lần.」"
# 【ハチロク】
# display as 八六
# JP: 「緩めて崩して、どうなさいます？」
1685 = "「Nới lỏng và làm tơi ra, rồi làm gì nữa ạ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「決まってる！　線路の歪みをホセーする形に動かして、\n作り直して、それでもっかいツキカタメなおすんだよー」
2204 = "「Tất nhiên rồi! Di chuyển sao cho điều chỉnh lại độ cong vênh của đường ray,\nlàm lại từ đầu, rồi sau đó mới đầm chặt lại một lần nữa đó~」"
# 【ハチロク】
# display as 八六
# JP: 「あ！　例えば――盛り上がっている場合なら、\n線路の下の\x%lバラスト;#00ffc040;バラスト%l;#;をいちどゆるめて、少し取り除いて」
1826 = "「A! Ví dụ——trong trường hợp bị phình lên,\nthì nới lỏng \\x%lバラスト;#00ffc040;đá ba-lát%l;#; dưới đường ray ra một chút, rồi lấy bớt ra.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーそー！　そーなればそこは低くなるから、\nその状態で搗き固めなおすの！」
2086 = "「Đúng đúng! Như vậy thì chỗ đó sẽ thấp xuống,\nrồi cứ để nguyên trạng thái đó mà đầm chặt lại!」"
# monologue
# JP: 言われ、ハチロクが深く頷く。
2578 = "Nghe vậy, Hachiroku gật đầu thật sâu."
# 【ハチロク】
# display as 八六
# JP: 「なるほど、大変に明快でございますね」
1755 = "「Ra là vậy, thật sự rất rõ ràng và dễ hiểu ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど、単純じゃないんだよ？　\nだって、レールはつながってるから」
1713 = "「Nhưng mà, không đơn giản thế đâu nha?\nVì đường ray nó nối liền với nhau mà.」"
# 【ハチロク】
# display as 八六
# JP: 「あ――どこか一箇所を動かしたなら、\nつながる近い部分のバランスも、変わってしまう」
1811 = "「A——Nếu di chuyển một chỗ nào đó,\nthì sự cân bằng của những phần nối liền gần đó cũng sẽ thay đổi theo.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーそー！　どっかが上がればどっかが下がる。\n列車が走っていくだけで、道床は必ず歪んじゃう」
2085 = "「Đúng đúng! Chỗ này nhô lên thì chỗ kia lõm xuống.\nChỉ cần có tàu chạy qua là lớp đá nền chắc chắn sẽ bị cong vênh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「歪む――なるほど。\n\x%l保線;#00ffc040;保線%l;#;とは、その歪みを常に補正し続けることといえるか」
2071 = "「Cong vênh——Ra là vậy.\n\\x%l保線;#00ffc040;Bảo trì đường ray%l;#; có thể nói là việc liên tục điều chỉnh những cong vênh đó sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だね！　だから、時間のイミでも『\x%l保線;#00ffc040;保線%l;#;』なんだよ！\n線路を保つための作業を、ずーっと、線で繋げてく！！」
2022 = "「Đúng vậy! Nên xét về mặt thời gian thì nó cũng là 『\\x%l保線;#00ffc040;bảo trì đường ray%l;#;』 đó!\nCông việc bảo vệ đường ray, cứ liên tục, nối tiếp nhau thành một đường thẳng!!」"
# 【ハチロク】
# display as 八六
# JP: 「ああ――わかりやすいご説明をありがとうございます。\n少し、\x%l保線;#00ffc040;保線%l;#;への理解を深められたように思います」
1834 = "「A——Cảm ơn cô đã giải thích rất dễ hiểu ạ.\nEm cảm thấy mình đã hiểu sâu hơn một chút về việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#; rồi.」"
# monologue
# JP: ハチロクの瞳は、新知識を得た――\nいや、それを我が物とした喜びに、輝いている。
2573 = "Ánh mắt Hachiroku, vì có được kiến thức mới——\nkhông, vì niềm vui sướng khi biến nó thành của mình, đang sáng lấp lánh."
# monologue
# JP: オリヴィもまた、笑顔でハチロクの笑顔に応える。
2679 = "Olivy cũng đáp lại nụ cười của Hachiroku bằng một nụ cười."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど、ホントなら、\nツキカタメは少なくできる方がいいに決まってるよね」
1676 = "「Nhưng mà, nếu được thì,\nchắc chắn là càng ít đầm chặt càng tốt rồi nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「……安定している線路の状態を崩さず、そのまま\n使い続けることこそが、最も理想的ということですね？」
1344 = "「……Không phá vỡ trạng thái ổn định của đường ray, cứ thế\ntiếp tục sử dụng mới là lý tưởng nhất đúng không ạ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そだよー！　研究されてた、コンクリート[どうしょう,1]道床とか、\nカンペキにそっちがわの発想だよね～」
2246 = "「Đúng vậy đó~! Mấy cái lớp nền bê tông đang được nghiên cứu ấy,\nhoàn toàn là dựa trên ý tưởng đó luôn~」"
# 【ハチロク】
# display as 八六
# JP: 「なるほど。でしたら、今緊急に搗き固めを行うのは、\nそうしなければいけない不具合が出たから」
1753 = "「Ra là vậy. Nếu vậy, việc khẩn cấp đầm chặt bây giờ là,\nvì có sự cố bắt buộc phải làm thế.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよだよ。隆起が線路をまた歪めてるの。\nここらへん――走行にはすぐには支障でない範囲だけど」
1936 = "「Đúng rồi đúng rồi. Chỗ phình lên lại làm đường ray bị cong vênh.\nQuanh đây nè——Tuy chưa đến mức ảnh hưởng ngay đến việc chạy tàu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1802 = "「唔」" 
# monologue
# JP: 言われて見れば、違和感がある。\nが、今の僕ではただの一目で、狂いの内容までは見えない。
2944 = "Nghe nói vậy nhìn lại thì thấy có gì đó sai sai.\nNhưng với tôi bây giờ, chỉ nhìn lướt qua thì không thể thấy được mức độ sai lệch."
# monologue
# JP: ゆえ、線路に耳をぴたりとくっつけ、\n示された地点をじっくりと見る――と。
2783 = "Thế nên, tôi áp sát tai xuống đường ray,\nnhìn kỹ vào địa điểm được chỉ——thì."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、たしかになだらかに隆起しているな」
1754 = "「Ra là vậy, quả thật là đang phình lên thoai thoải.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「セキたちがほーこく入れてないから、\nこの何時間かで盛り上がったんだと思う」
1869 = "「Seki và mọi người không có báo cáo,\nnên tôi nghĩ là nó mới nhô lên trong vài giờ qua thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1840 = "「嗯——」" 
# 【ハチロク】
# display as 八六
# JP: 「短時間で、目視できるほど隆起してしまう。\nやはり、ただごとではございませんね」
2115 = "「Chỉ trong thời gian ngắn mà đã phình lên đến mức có thể nhìn thấy bằng mắt thường.\nQuả nhiên không phải chuyện đùa đâu nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2121 = "「Đúng vậy.」"
# monologue
# JP: ゆえに、気になる。\n周囲にまったく、異変の兆候が見られぬことが。
2778 = "Thế nên, tôi thấy lo lắng.\nViệc xung quanh hoàn toàn không có dấu hiệu bất thường nào."
# monologue
# JP: いや――それを決して見逃さぬよう、\n僕たちは、継続監視を続けているのか。
2481 = "Không——Chính vì để không bỏ sót điều đó,\nmà chúng tôi mới tiếp tục giám sát liên tục sao."
# 【双鉄】
# display as 雙鐵
# JP: 「……宗方さんがここを重点的に見るようにと\n提言してくださったのは、まことに正しかった」
1357 = "「……Anh Munakata đề nghị chúng ta tập trung giám sát chỗ này\nquả thật là rất chính xác.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよねー！！！」
2021 = "「Đúng không nào!!!」"
# monologue
# JP: とはいえ残念ながら、現在の御一夜鉄道には、\nこの地点を常時監視できるだけの、人的資金的余裕は無い。
2535 = "Tuy nhiên đáng tiếc là, Đường sắt Ohito hiện tại,\nkhông có đủ nhân lực và tài chính để giám sát liên tục địa điểm này."
# monologue
# JP: それでも、最重要の監視地点ゆえ、一日最低八時間。\n誰かひとりは交代で詰めているように――ああ。
2483 = "Dù vậy, vì đây là địa điểm giám sát quan trọng nhất, nên mỗi ngày ít nhất tám tiếng.\nPhải có một người thay phiên nhau túc trực——A."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィが今日の引退を決意した理由には――\nここに詰められる回数を増やそうという意向もあるのか」
1722 = "「Lý do Olivy quyết định nghỉ hưu hôm nay——\nCó phải cũng là vì muốn tăng số lần túc trực ở đây không?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「もちろんだよー！　ショクタクの方が、\nオリヴィの好きに配置してもらえるでしょお？」
2103 = "「Tất nhiên rồi~! Làm nhân viên hợp đồng thì,\nsẽ được bố trí theo ý thích của Olivy mà đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
2107 = "「Chắc là vậy.」"
# monologue
# JP: 教導も完全に済み、オリヴィの延命を考える以上、\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;乗務はまったく推奨できない。
2790 = "Việc hướng dẫn đã hoàn tất, xét đến việc kéo dài tuổi thọ cho Olivy,\nthì việc đảm nhận công việc trên \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; là hoàn toàn không được khuyến khích."
# monologue
# JP: ポーレットがその事情を無視し、\nオリヴィに乗務や添乗を命令するなどありえんだろうし。
2869 = "Paulette không thể nào phớt lờ chuyện đó,\nmà ra lệnh cho Olivy đảm nhận công việc hay đi cùng tàu được."
# 【双鉄】
# display as 雙鐵
# JP: 「どうしてもということならば、乗務の方の嘱託を断り、\n\x%l保線;#00ffc040;保線%l;#;だけの嘱託を受認するという手もあるだろう」
1927 = "「Nếu bắt buộc phải vậy, thì cũng có cách là từ chối hợp đồng làm nhân viên tàu,\nvà chỉ nhận hợp đồng làm \\x%l保線;#00ffc040;bảo trì đường ray%l;#; thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そこまではしないよー！　オリヴィ、\nオヒトヨ鉄道を困らせたりしたくないし」
1694 = "「Không đến mức đó đâu~! Olivy,\nkhông muốn làm khó Đường sắt Ohito đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1900 = "「Vậy sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど。ここのこと！\nオリヴィ、ムナカタにマカされたから！」
1775 = "「Nhưng mà. Chuyện ở đây!\nOlivy đã được Munakata giao phó rồi!」"
# monologue
# JP: よほど嬉しく、誇らしいのだろう。
2695 = "Chắc hẳn là cô ấy rất vui và tự hào."
# monologue
# JP: 見ているこちらまでつられてしまいそうなほど、\nオリヴィの笑顔は輝いている。
2756 = "Nụ cười của Olivy rạng rỡ đến mức,\nngười nhìn cũng muốn cười theo."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、ちゃあんとケアするの！　この程度なら\nすぐなおせるけど、なおさなきゃ列車止まるから！」
1992 = "「Thế nên, phải chăm sóc cẩn thận! Mức độ này thì\ncó thể sửa ngay, nhưng không sửa là tàu sẽ dừng lại đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2121 = "「確實」" 
# monologue
# JP: 早期に対処してしまえば、\nなんのことはなく復旧できる。
2706 = "Nếu xử lý sớm,\nthì có thể khôi phục lại như không có chuyện gì xảy ra."
# monologue
# JP: が、放置された歪みはかならず、さらなる歪みを呼び、\n複合的な、対処困難なものへと育てていってしまう。
2537 = "Nhưng, sự cong vênh bị bỏ mặc chắc chắn sẽ kéo theo những cong vênh khác,\nvà dần trở thành một vấn đề phức tạp, khó giải quyết."
# 【双鉄】
# display as 雙鐵
# JP: 「善は急げだ。早速やってしまおう」
1701 = "「Việc tốt không nên chậm trễ. Làm ngay thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！　じゃ、ハチロクにお手本みせるから、\n最初は、ちょっとだけそこで見ててね」
2283 = "「Okay! Vậy, tôi sẽ làm mẫu cho Hachiroku xem,\nlúc đầu thì, cứ đứng đó xem một chút nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました」
1903 = "「Đã rõ ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツは、線路の反対側ついて。\nタスキでやろー！」
2270 = "「Soutetsu, sang phía bên kia đường ray đi.\nLàm chéo nhau nhé~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2012 = "「Đã rõ.」"
# monologue
# JP: 襷掛け。
2802 = "Chéo nhau."
# monologue
# JP: オリヴィと僕が線路を挟み、\x%l枕木;#00ffc040;枕木%l;#;を挟んで向かい合い、\nその体制で、同時に搗き固めるやり方だ。
2759 = "Olivy và tôi đứng đối diện nhau qua đường ray, kẹp \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#; ở giữa,\nvà trong tư thế đó, cùng lúc đầm chặt xuống."
# monologue
# JP: 配置につけば、\nすぐオリヴィは、ビーターを高く振り上げる。
2725 = "Vừa vào vị trí,\nOlivy liền vung cao chiếc cuốc chim lên."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「『ヨーイトショーぉ！』」
1321 = "「『Yôito shô!』」"
# 【双鉄】
# display as 雙鐵
# JP: 「『ヨーイトショーぉ！』」
# 1321 = "「“勤巡線呀嗎嗬嗨！”」" 
# monologue
# JP: 文字通りに、『音頭をとって』。
2686 = "Đúng nghĩa đen là, 『bắt nhịp』."
# monologue
# JP: 保線夫たちに歌い継がれる音頭を口ずさみながら、\nオリヴィと僕は息を合わせて――
2936 = "Vừa lẩm nhẩm bài hát bắt nhịp được các công nhân bảo trì đường ray truyền tai nhau,\nOlivy và tôi vừa phối hợp nhịp nhàng——"
# monologue
# JP: （ざぐっ）\n（ざぐっ）
3076 = "（Phập）\n（Phập）"
# monologue
# JP: \x%lバラスト;#00ffc040;バラスト%l;#;にビーターを搗き込むことで、\n\x%lバラスト;#00ffc040;バラスト%l;#;をバラけさせ動かし、すぐ振り上げる。
2720 = "Bằng cách đâm cuốc chim vào \\x%lバラスト;#00ffc040;đá ba-lát%l;#;,\nlàm tơi và xê dịch \\x%lバラスト;#00ffc040;đá ba-lát%l;#;, rồi lập tức vung lên."
# monologue
# JP: 搗きほぐされた砕石たちが、\nビーターの自然な動きにつれて、バラバラと舞う。
2917 = "Những viên đá dăm bị đâm tơi ra,\nbay lả tả theo chuyển động tự nhiên của chiếc cuốc chim."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「『わーれらーのてーつどーお』」
1323 = "「『Đường~ sắt~ của~ chúng~ ta~』」"
# 【双鉄】
# display as 雙鐵
# JP: 「『わーれらーのてーつどーお』」
# 1323 = "「“咱的鐵路呀嗬嗨”」" 
# monologue
# JP: （ざぐっ）\n（ざぐっ）
3069 = "（Phập）\n（Phập）"
# monologue
# JP: 叩いて固める、緩めて動かす――\nその両方を、ビーター一本で繰り返す。
2669 = "Đập để làm cứng, nới lỏng để xê dịch——\nLặp đi lặp lại cả hai việc đó chỉ bằng một chiếc cuốc chim."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「『ヨーイトサーノオ』」
1319 = "「『Yôito sâ no o』」"
# 【双鉄】
# display as 雙鐵
# JP: 「『ヨーイトサーノオ』」
# 1319 = "「“保暢通呀嗎嗬嗨”」" 
# monologue
# JP: （ざぐっ）\n（ざぐっ）
# 3069 = "（喳）（喳）" 
# monologue
# JP: ――その繰り返しが、\x%l枕木;#00ffc040;枕木%l;#;の下に潜り込み、\nそこを頑なに支え続ける\x%lバラスト;#00ffc040;バラスト%l;#;たちをも動かしていく。
1257 = "——Sự lặp lại đó luồn lách xuống dưới \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#;,\nvà làm xê dịch cả những viên \\x%lバラスト;#00ffc040;đá ba-lát%l;#; vẫn luôn ngoan cường chống đỡ nơi đó."
# 【ハチロク】
# display as 八六
# JP: 「……なるほど、\nおおまかな要領は、見て覚えたように思います」
1347 = "「……Ra là vậy,\nem nghĩ là mình đã nhìn và nhớ được đại khái cách làm rồi ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ？　じゃ、ハチロクとオリヴィ、タスキになって、\n反対側の線路いこ？　で、ソーテツは」
2030 = "「Thế à? Vậy, Hachiroku và Olivy, đứng chéo nhau,\nsang đường ray bên kia nhé? Còn Soutetsu thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「今オリヴィのいるところに入れば、一番いいか」
1965 = "「Vào chỗ Olivy đang đứng bây giờ là tốt nhất nhỉ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーゆーこと！」
1942 = "「Chính là vậy đó!」"
# monologue
# JP: オリヴィはこのメンツの中で、\nもっとも高い技術と、もっとも弱い力とを持つ。
2682 = "Trong nhóm này, Olivy\ncó kỹ thuật cao nhất, nhưng sức lực lại yếu nhất."
# monologue
# JP: ゆえ、オリヴィの場所に僕が入るローテーションを四度\n回せば、一番よろしく、バランスを取っていけるだろう。
2785 = "Thế nên, nếu xoay vòng bốn lần để tôi vào vị trí của Olivy,\nthì sẽ giữ được sự cân bằng tốt nhất."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そしたら、もっかいいくよー！」
2231 = "「Vậy thì, làm lại lần nữa nha~!」"
# monologue
# JP: そのあまりにも輝く笑顔に、ほんの一瞬思ってしまう。\nオリヴィは乗務より、\x%l保線;#00ffc040;保線%l;#;の方が好きなのではないかと。
2995 = "Nhìn nụ cười rạng rỡ ấy, tôi chợt nghĩ trong thoáng chốc.\nPhải chăng Olivy thích \\x%l保線;#00ffc040;bảo trì đường ray%l;#; hơn là làm nhân viên trên tàu."
# monologue
# JP: けれどもすぐに、その錯覚を否定する。\n今の僕なら、それが錯覚だと断言できる。
2538 = "Nhưng ngay lập tức, tôi phủ nhận ảo giác đó.\nVới tôi bây giờ, tôi có thể khẳng định đó chỉ là ảo giác."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「『ヨーイトショーオ！』」
# 1321 = "「“勤巡線呀嗎嗬嗨！”」" 
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「『ヨーイトショーオ』」
# 1321 = "「“勤巡線呀嗎嗬嗨！”」" 
# monologue
# JP: （ざぐっ）\n（ざぐっ）
3075 = "（Phập）\n（Phập）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「いいねいいね！　ジョーズジョーズ！！！」
1678 = "「Tốt lắm tốt lắm! Giỏi lắm giỏi lắm!!!」"
# monologue
# JP: ――ハチロクと、好きな相手とともに作業をするのなら。\n搗き固めさえ、これほど楽しく幸せだ。
1255 = "——Nếu được làm việc cùng Hachiroku, cùng người mình thích.\nThì ngay cả việc đầm chặt cũng vui vẻ và hạnh phúc đến thế này."
# monologue
# JP: 共に居らずともオリヴィは、ここで\x%l保線;#00ffc040;保線%l;#;をするときには、\nその感覚を、きっと味わえているのだろう。
2607 = "Dù không ở cùng nhau, nhưng khi Olivy \\x%l保線;#00ffc040;bảo trì đường ray%l;#; ở đây,\nchắc chắn cô ấy cũng cảm nhận được điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……早く、桜が咲かんものかな」
1339 = "「……Mau mau, hoa anh đào nở đi nào.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あはっ！」
1823 = "「Aha!」"
# monologue
# JP: オリヴィが笑う。\nにっこりわらって、高く、ビーターを振り上げる。
2680 = "Olivy cười.\nCười tươi rạng rỡ, vung cao chiếc cuốc chim lên."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だね！　桜が咲いたら、春になったら！\nきっと全部が！　今よりもっとステキになるよ！」
2027 = "「Đúng vậy! Khi hoa anh đào nở, khi mùa xuân đến!\nChắc chắn mọi thứ! Sẽ tuyệt vời hơn bây giờ nhiều!」"
# monologue
# JP: そうして、声を張り上げる。
2693 = "Rồi, cô ấy cất cao giọng."
# monologue
# JP: 鹿兒島にまで、八ツ城にまで。\n宗方さんの耳元にまで、届かせようとするかのように。
2734 = "Như thể muốn truyền đến tận Kagoshima, đến tận Yatsushiro.\nĐến tận tai của anh Munakata vậy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「『わーれらのてーつどお！』」
# 1323 = "「“咱的鐵路呀嗬嗨”」" 
