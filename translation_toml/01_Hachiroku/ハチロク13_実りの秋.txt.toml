# 【ニイロク】
# display as 二六
# JP: 「今は。一時期ほどには、ひどくない。\nむしろ。ここ最近。かなり落ち着いてきてもいる」
2150 = "「與過去相比，是沒有前一段時間，那樣嚴重。應該說，最近，已經頗有紓解」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1808 = "「啊——」" 

# monologue
# JP: 明確な否定をもらい、ほっとする。\n同時に、根拠が気になってくる。
2738 = "得到了明確的否定，我也鬆了口氣，但同時也對她的這番話感到好奇。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その、“一時期”とは」
2192 = "「這個“前一段時間”是指」" 

# 【ニイロク】
# display as 二六
# JP: 「清春と自分とが。オリヴィと会った。ころ。\nあの頃のオリヴィは。いつ壊れるか。怖かった」
2032 = "「是清春和我，一開始，見到奧莉薇的時候，當時她時刻處於恐懼，擔心自己隨時有可能，停止活動」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ？」
# 1854 = "「嗯？」" 

# monologue
# JP: そんな素振りは、\n少なくとも僕には見られなかったような気が――っ！！
2933 = "至少當時，我應該沒有見過她害怕的樣子——呃！！" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そうか、\x%l共感;#00ffc040;共感%l;#;か？　だからニイロクはあの頃、\n時折、苦しげな声をあげていたのか」
2134 = "「等一下，對了，是\\x%l共感;#00ffc040;共鳴%l;#;嗎？所以那時二六你才會三不五時發出像是很痛苦的聲音」" 

# 【ニイロク】
# display as 二六
# JP: 「自分は、帝鉄末期の。\n当時最新鋭の。特急型電車の。試験機。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;」
1980 = "「我，是帝國鐵路末期，最新型的，特快電車，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，測試機」" 

# 【双鉄】
# display as 雙鐵
# JP: 「試験機……」
2095 = "「測試機……」" 

# 【ニイロク】
# display as 二六
# JP: 「そう。秘匿性の高い。試験機の。トップナンバーだから。\n\x%l共感;#00ffc040;共感%l;#;に関し。他の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に出来ないことも。可能」
2035 = "「是的。因為是高保密性的，測試機，還是首車的鐵路人偶，在\\x%l共感;#00ffc040;共鳴%l;#;方面，能做到很多，其他\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，做不到的事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「秘匿性、か」
1727 = "「保密性嗎」" 

# monologue
# JP: ……ああ、やはりなのかと思う。\nニイロクがまだ、“包帯の少女”だったころ。
2660 = "回想起二六還是“裹著繃帶的少女”那時，我得以印證了自己曾經的猜測。" 

# monologue
# JP: ハチロクが、“存在さえも感知できない”と訝しんでいた、\nその理由が、ようやく明らかになった気がする。
2877 = "當時八六驚嘆“竟然都沒有探測到她的存在”，其中緣由，總算是水落石出。" 

# 【ニイロク】
# display as 二六
# JP: 「まさか。自分が\x%l共感;#00ffc040;共感%l;#;してると。\n気づかれてるとは。思わなかった」
1896 = "「她都沒有想到，自己這些情感，通過\\x%l共感;#00ffc040;共鳴%l;#;，讓我發現了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「気づいた――繋がったのは、たった今だ。が――」
2156 = "「要說我也是這才注意到——才剛剛將這些訊息聯繫在一起，不過——」" 

# monologue
# JP: 記憶と気づきが結びつき合う。
2762 = "我將過去的記憶，與現在的發現相結合。" 

# monologue
# JP: あの苦しげな声――\nなにかを伝えたそうにしていた、ニイロクと赤井宮司と。
2765 = "我曾經不止一次聽到的那些痛苦的聲音，以及對我欲言又止的二六和赤井宮司。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィの苦痛の、あるいは恐怖の\x%l共感;#00ffc040;共感%l;#;を……\nハチロクは受け取れぬことで、むしろ救われたのかもな」
1890 = "「奧莉薇的痛苦，或者說恐懼的\\x%l共感;#00ffc040;共鳴%l;#;……沒有被八六接收到或許反而是件好事吧」" 

# 【ニイロク】
# display as 二六
# JP: 「かもしれない。し。ハチロクも受け取って。\nそれで、知らないふりをしていただけかもしれない」
1982 = "「或許是，不過，也可能八六接收到了，只是，佯裝不知而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ――」
1801 = "「唔——」" 

# monologue
# JP: 心を開いてくれているニイロクを否定せぬために、\n口ではそのように答えておくが、ありえない。
2750 = "我不想否定願意開口交流的二六的看法，便姑且含混答覆著。但她說的這種情況應該是絕無可能的。" 

# monologue
# JP: そのような重大情報であるなら、\nハチロクは必ず僕に、報告している。
2704 = "如果有如此重要的訊息，八六必然不會對我有絲毫隱瞞。" 

# 【ニイロク】
# display as 二六
# JP: 「あのころのオリヴィは、苦痛、痛みに満ち満ちていた。\nそれを普段は、とても上手に。隠していた」
2243 = "「那時的奧莉薇，內心滿是疼痛，與痛苦。但在平時，卻很好地，隱藏了起來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「隠す？」
2267 = "「隱藏？」" 

# 【ニイロク】
# display as 二六
# JP: 「嬉しい。楽しい。大好き。しあわせ。\nそういうものを、たくさんたくさん、散りばめていた」
2260 = "「開心，快樂，喜歡，幸福。她一直都在，不停地散播著，這些感覺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――」
1752 = "「原來如此——」" 

# monologue
# JP: 隠す、というよりそれはむしろ……
3016 = "隱藏，倒不如說……" 

# monologue
# JP: 自分を騙し、痛みを忘れ、苦しみに耐える、\n苦肉の方法だったのではないかと、ふっと感じる。
2864 = "欺騙自己，忘記疼痛，強忍痛苦，感覺說是自我麻痺的苦肉計也不為過吧。" 

# 【ニイロク】
# display as 二六
# JP: 「だけど。オリヴィの処理能力。多分。相当に低い。\nだから、乗務で。運転補助に。処理能力が集中すると」
1677 = "「不過，奧莉薇的處理能力，大概，很低。所以，執行乘務任務，輔助駕駛時，集中處理能力的話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「楽しいや嬉しいが消え――\n痛みや苦痛が、むき出しになってしまったのか？」
1960 = "「快樂和開心就消失了——疼痛與痛苦就顯現出來了嗎？」" 

# 【ニイロク】
# display as 二六
# JP: 「それでも、ほとんどは隠してた。\nだけど。隙間から、突き刺さってきた」
1748 = "「即便如此，也基本都隱藏起來了。不過，還有些許間隙，未能完全掩蓋」" 

# monologue
# JP: ぶるり、ニイロクが小さく震える。
2963 = "說到這裡，二六輕微地顫抖了起來。" 

# 【ニイロク】
# display as 二六
# JP: 「帝鉄そのものの。断末魔の叫び。それを知ってる自分が。\n初めて体験させられる。どうしようもなく。鋭い痛みが」
1751 = "「即便親身經歷，帝國鐵路自身，臨終的哀嚎，那種無可名狀的，錐心之痛，也是我從未體驗過的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それほど……か」
2133 = "「竟到那種程度嗎……」" 

# 【ニイロク】
# display as 二六
# JP: 「乗務に支障。出たら。すぐに報告しようと思っていた。\nけれど。乗務。ただの一度も。滞らなかった」
2062 = "「本打算，如果影響到，乘務任務，就馬上報告的。然而，乘務任務，卻從未有，些許不暢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1842 = "「嗯」" 

# monologue
# JP: その点ならば、僕も全力で同意できる。
2977 = "這一點我可以毫無保留地加以肯定。" 

# monologue
# JP: オリヴィの仕事はいつであれ、\nあのハチロクが賞賛するほど、行き届いたものだ。
2681 = "奧莉薇完成的工作，一直都是優秀到讓苛刻的八六都讚賞有加。" 

# 【日々姫】
# display as 日日姬
# JP: 「オリヴィ……今は――\n今も、そぎゃんと苦痛ば、隠しておると？」
2228 = "「那奧莉薇……現在——她現在也隱藏著那樣的痛苦嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1803 = "「唔！」" 

# 【ニイロク】
# display as 二六
# JP: 「多分無い。と思う。……。去年の夏の。終わりごろから。\nオリヴィの感情の主体。幸せが溢れだす。ようなもの」
1974 = "「我覺得，大概沒有……從去年夏天，結束的時候開始，奧莉薇的感情，大抵都是，滿滿的幸福」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1808 = "「啊——」" 

# monologue
# JP: 去年の夏の終わりなら……\n宗方さんが来訪してくれ、それをひとつのきっかけに――
2611 = "去年夏末的話……是藉由宗方先生來訪的機會——" 

# monologue
# JP: 不死鳥博士・電車姫様・登呂流湯さんの\n相互協力体制が、ちょうど生まれたあの時期だ。
2472 = "不死鳥博士、電車公主殿下、登呂流浴場老闆三方之間，建立起相互協助的合作體制的時候。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……延命ケアや緩和ケアが、\n効果を示してくれている、と考えても良いのだろうか」
1669 = "「不知是否可以理解為，延長壽命與紓解不適的護理方法產生了效果呢」" 

# 【ニイロク】
# display as 二六
# JP: 「自分には。そこまではわからない。\nかいかぶりすぎ」
2221 = "「那些，我就不清楚了。超出能力範圍」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはそうか。すまん」
1831 = "「啊，也是。不好意思」" 

# 【ニイロク】
# display as 二六
# JP: 「謝ること。ない。延命ケア。今のうちから。\n自分も。清春とやっている。けど」
1681 = "「並不需要，道歉。延壽護理，自那時開始，我和清春，也有在做」" 

# monologue
# JP: ふんわり、声がやわらかになる。
2508 = "二六的語調不知不覺間變得輕柔了許多。" 

# 【ニイロク】
# display as 二六
# JP: 「あれ。とてもいい。体温。清春に計ってもらう。\nそれだけで。メンテナンス。できてる気になる」
2226 = "「那個，確實很好。讓清春，幫我量體溫，僅僅如此，就像剛做過維護，一樣的感覺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2200 = "「這樣啊」" 

# monologue
# JP: ハチロク――すずも、きっと同じく感じてくれている。\nその確信を、強くもてるゆえ思ってしまう。
2560 = "八六——鈴想必也有同樣的感覺吧。正因為有十足的把握，如此想法在我心中越來越強烈。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――四月が、早く来てくれればいい。\nそうすれば、オリヴィの延命ケアもよりいっそう」
2109 = "「真希望四月能早點到來啊。那樣奧莉薇的延壽護理想必也能更加有效……」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
1825 = "「啊！」" 

# 【凪】
# display as 凪
# JP: 「来たばい！」
1725 = "「來囉！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「おまたせー！　ごめーん！　ネボウしちゃっったー」
1687 = "「久等啦！抱歉！睡過頭啦」" 

# monologue
# JP: オリヴィが小走りにかけてくる。
2683 = "奧莉薇朝我們小跑了過來。" 

# monologue
# JP: ハチロクは走ることなく、その後ろからしずしずと。
2569 = "八六則是不慌不忙，儀態端莊地跟在後面。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、どーだった！！？」
2250 = "「那，怎麼樣啦！！？」" 

# 【凪】
# display as 凪
# JP: 「ふっふーん、にーさんに聞くまでもなかとよねー」
1797 = "「哼哼，都不用問大哥哥就能知道啦」" 

# 【日々姫】
# display as 日日姬
# JP: 「そーそー！\nオリヴィ！　自分のまわり見てみてよ」
1777 = "「可不是！奧莉薇，看看你周圍吧！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「え？　――wow！！」
1794 = "「咦？——ｗｏｗ！！」" 

# monologue
# JP: オリヴィの姿を見つけて、声を聞きつけ、\nバラけはじめていた乗客たちが、再び集まりはじめる。
2882 = "看到奧莉薇的身影，聽到她的聲音，本已開始散去的乘客們，又重新聚攏了過來。" 

# monologue
# JP: カメラを、スマホをその手に手に。\n笑顔をうかべ、オリヴィとの記念写真を撮りたがっている。
2512 = "人們紛紛舉起手中的相機和智慧型手機，滿面笑容地和奧莉薇合影。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あははっ！　そっか！　そーなんだっ！！\nヒビキ、ナギ！　ニイロク！　合格おめでとー！　で！」
1822 = "「啊哈哈！這樣啊！原來是這麼回事！！日日姬，凪！二六！恭喜你們合格！還有！」" 

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「む！」\n「まぁ！」
1804 = "「唔！」\\n「哇！」" 

# monologue
# JP: しゃがんだかと思ったオリヴィが、\n大きく伸びて跳ね上がり、帽子を空へと投げ飛ばす。
2776 = "我還正納悶奧莉薇為什麼要蹲下，她突然高高地跳了起來，甩手將帽子向上高高拋起。" 

# monologue
# JP: 高く。高く。高く。\n青空に溶けてしまうほど。
3047 = "高高地，高高地，宛如要融入這藍天一般。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ！　引退おめでとー！！　だねっ！！！」
1892 = "「奧莉薇！恭喜順利引退！！好耶！！！」" 

# monologue
# JP: 御一夜発早戸いき。\n折り返し、早戸発御一夜いきの乗務を終えれば日が暮れる。
2874 = "由御一夜發往隼人，而後折返，由隼人發往御一夜。執行完這一串乘務任務後已是天色漸沉之時。" 

# monologue
# JP: ナビに頼んで隆起現場に急ぎ向かえば、\nオリヴィはそこに佇んでいる。
2492 = "之後我們乘坐Ｎａｖｉ火速趕往發生隆起的地點，到達時便見到奧莉薇佇立在那裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ。冷えるぞ」
1894 = "「奧莉薇，當心冷」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「冷やしたほーがちょーどいいでしょ？\nけさは、41どもあったんだしー」
2131 = "「稍微冷點不是正好嗎？今天早上四十一度呢」" 

# monologue
# JP: ……昼の体温測定では、\nオリヴィの口内温度は、40.7度まで下がっていた。
2490 = "中午量到的口腔體溫，則是降到了四十點七度。" 

# monologue
# JP: ゆえ、約束通り、\nここの監視についてもらってはいるのだが――
2782 = "所以我們按照事前說好的，帶她到這裡來進行監視，不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「くれぐれも無理はしないでくれ。\nなにかあっては、宗方さんに申し訳がたたん」
1670 = "「不要太勉強自己。要是有個閃失我怎麼跟宗方先生交代嘛」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「してないよー。『ナビ子がとんできた！』って思って、\nオムカエにでてきただけだからー」
2083 = "「沒有啦。只是感覺到“小Ｎａｖｉ飛過來啦”，出來接你們一下而已」" 

# monologue
# JP: いって、笑って。\nオリヴィは線路の向こうを指差してみせる。
2964 = "說笑間，奧莉薇指了指線路對面給我看。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それまでは、ヒミツキチで休み休みで、のんびり見て。\nあと、ご近所まわって、おはなしきいたりしてただけ」
1863 = "「在那之前，就在秘密基地裡休息休息，悠閒地盯著看啦。還有就是在附近轉轉，了解一下情況而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2197 = "「這樣哦」" 

# monologue
# JP: ……ここの監視をすることになり、\n急ごしらえでの設営となった、保線基地。
2666 = "在確定要進行監視後，我們便在這裡臨時搭建了一個巡線基地。" 

# monologue
# JP: 確かに機能は基地ともいえるが、見た目的には秘密基地\n――いや、むしろ、小屋という方がしっくりと来る。
2523 = "以功能而言確實可以算是基地，但看起來更像是秘密基地——倒不如說其實就是一間小屋而已。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それとね？　セキからデンゴン。あとで自分でも\nシンセーするけど、そろそろ夜はストーブが欲しいって」
2219 = "「還有哦？是堰叫奧莉薇轉達的。他說晚上需要一個爐子了，不過他回頭會自己去申請」" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解だ。ポーレットにつたえておこう」
2014 = "「明白了。我會去和波萊特說」" 

# monologue
# JP: ならばゆうべ、堰さんは泊まって見てくれたのか。
2524 = "以此看來，昨晚堰先生是住在這裡進行監視了啊。" 

# monologue
# JP: まことありがたく嬉しいことだが、\nお年のことを考えたなら、申し訳無さが先立って来る。
3018 = "雖然對此頗感感激與欣慰，但考慮到他的歲數，愧疚之情不禁湧上心頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……結局は、長丁場になってしまったなぁ」
1365 = "「……結果還是變成持久戰了啊」" 

# 【ハチロク】
# display as 八六
# JP: 「原因、ガスならよかったのですが」
1757 = "「原因要真是瓦斯倒好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1842 = "「嗯」" 

# monologue
# JP: 専門業者を入れての調査結果は、\n率直にいえば空振りに等しいものだった。
2722 = "專業人員的調查結果基本證實我們之前猜錯了。" 

# monologue
# JP: 『隆起を起こす程のガスは滞留しておらず検知できない』\n『トンネルや坑道跡のような地中遺物も存在しない』
1269 = "“並沒有檢測到足以導致隆起程度的瓦斯囤積”“並無隧道或坑道等遺留的地下構造物”" 

# 【双鉄】
# display as 雙鐵
# JP: 「……いまだ隆起は収まらず。\nその原因はまったくもって不明のままか」
1343 = "「……但隆起至今未能平復。根本原因還真真兒是搞不清楚」" 

# monologue
# JP: 言えばぶんぶん、オリヴィは激しく首を振る。
2927 = "聽我這麼說，奧莉薇也用力地搖起頭來。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ガスでもマイセツブツでも水でもなさそーって\nわかったし！　『マッタクモッテ』じゃないと思う！」
1732 = "「光知道既不是瓦斯也不是地下構造物更不像是地下水！“真真兒”就是搞不清楚啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな。\n言われてみればまったくもって指摘の通りだ」
1833 = "「啊，可不是。你這麼一說還真真兒就是這麼個感覺」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「また！　マッタクモッテ！！」
1762 = "「又來啦！真真兒的！！」" 

# monologue
# JP: なにがおかしいと感じるのだろう？\nオリヴィはケラケラ、気分よさげに笑い続ける。
2500 = "也不知奧莉薇是不是覺得這個詞好笑，只見她頗顯開心地呵呵笑個不停。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オヒトヨとかハヤトで、\n『マッタクモッテ』、リューコーしてるの？」
1955 = "「御一夜和隼人那邊，最近很流行說“真真兒”嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや？」
2082 = "「沒有啊？」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまの影響をうけ、ほんのときおり、日々姫が――\nああ、稀咲様もですね、口にするのを聞く程度かと」
1773 = "「受雙鐵少爺影響，日日姬也有時——啊，稀咲小姐三不五時候也會這樣說」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「でもね！　いるの！　おじいちゃんで、\nソーテツみたいに、『マッタクモッテ』とかいうひと！」
1782 = "「可是啊，還是有老爺爺像雙鐵一樣，會說“真真兒”的！」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1795 = "「哇」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「『ノダ』とか『ナノダナ』とか！　おじーちゃん、\nすっごくなんだかソーテツっぽくておかしいの！」
1902 = "「好比“您那”還有動不動帶個“兒”啊！那老爺爺說這些的時候就跟雙鐵一個樣，可好玩了！」" 

# 【ハチロク】
# display as 八六
# JP: 「あらまぁ。うふふっ」
1796 = "「哎呀，嘻嘻嘻」" 

# monologue
# JP: 『お爺様が双鉄さまっぽいのではなく、\n双鉄さまがお爺様っぽいのでございます』
1278 = "“那不是老爺爺像雙鐵少爺一樣，而是雙鐵少爺像老爺爺一樣吧”" 

# monologue
# JP: できた妻ゆえ口には出さぬが、さも楽しげなすずの――\nハチロクの目が、そういっているように感じてしまう。
2971 = "身為溫柔賢惠的妻子，這些話八六怕是說不出口，但心裡還是被奧莉薇給逗樂了——她的眼神裡似乎傳來了這樣的感覺。" 

# monologue
# JP: （しかし、まぁ――決して悪くない気分ではある）
3066 = "（不過，這感覺倒也不壞）" 

# monologue
# JP: 赤の他人の口調から、僕を連想してくれる。
2860 = "會從陌生人說話的方式聯想到我。" 

# monologue
# JP: オリヴィと僕らとの距離は、\nそれくらいには、近づいているのだと感じられ。
2531 = "似乎也隱隱表現出，奧莉薇和我們的距離已大為縮短了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「やっぱり、それってオモシロイよね！\nハチロクもソーテツもにこにこしてるし！」
2066 = "「果然很好玩對吧！看你們倆也都笑眯眯的！」" 

# 【ハチロク】
# display as 八六
# JP: 「あら」
1819 = "「啊呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはともかく、その老人から、あるいは他から、\nなにか、新情報などは聞き取れたのか？」
2191 = "「這些先不說，從那位老人那裡，或者是從其他人那裡，有沒有打聽到什麼新的訊息？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ぜーんぜん！」
1919 = "「完全沒！」" 

# monologue
# JP: 問えばオリヴィはぶんぶんと、\n今度は力なく首を振る。
2926 = "聽我這麼問，奧莉薇又搖起頭來。只是這次完全沒有方才那般有力。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ワキミズが出たりとまったり。ニゴったりイオンしたり。\nイシュウしたり、ジワレとかあったり。ぜーんぜん無し」
1705 = "「什麼湧水啊積水啊，渾濁啊異響啊，異味啊裂縫啊，全都沒有」" 

# 【ハチロク】
# display as 八六
# JP: 「……平穏無事は、\nなによりのことではあるのですけれど」
1354 = "「……安穩無事，雖說亦是求之不得」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、な」
1849 = "「嗯，確實」" 

# monologue
# JP: しかしそれは、手がかりのなさをも示してしまう。
2630 = "可也同時意味著，我們仍然找不到絲毫的線索。" 

# monologue
# JP: 隆起はあるのに、対処療法しか打てる手がない。\n……その状況が、あと何年も続くのだろうか。
3022 = "雖然隆起還在持續，卻無法根本解決只能修修補補，也不知這狀況還要再持續幾年。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ところがね、ヘーオンブジってわけでもないよ？」
1675 = "「不過哎，也說不上安穩無事哦？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにかあるのか？」
1740 = "「出了什麼狀況嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「きづかない？\nっていうかソーテツ、いま体力にヨユーある？」
1723 = "「你沒注意到嗎？話說回來，雙鐵你還有力氣嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「余裕か？　ふむ――無くはないな。\n多少の作業なら引き受けられる」
1745 = "「力氣？唔，倒也不算沒有吧。多少還是能幹得動一點工作的」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら、ちょっとだけ\x%lバラスト;#00ffc040;バラスト%l;#;ついてかない？」
2224 = "「那來和奧莉薇一起弄一下\\x%lバラスト;#00ffc040;道砟%l;#;吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2015 = "「明白了」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、わたくしもお手伝いいたします」
2234 = "「那我也來一起幫忙吧」" 

# monologue
# JP: すぐにハチロクも応えてくれる。
2564 = "八六也馬上跟著附和。" 

# monologue
# JP: 嬉しくあるが、本音をいえば、ハチロクに保線作業の――\n単純な肉体労働の負荷を、かけたいものとは思えない。
3019 = "雖然心裡挺高興的，但實話說，巡線的工作——我是真不想給八六增加這種單純體力勞動的負擔。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――すまんが、頼む」
1311 = "「——不好意思，麻煩了」" 

# monologue
# JP: が、それでも答えはひとつしかない。\n今ここで、ハチロクの負荷を軽減しようとするのであれば。
2533 = "但如今也不容我另作他想。如果這時心疼八六不願給她增加負擔的話。" 

# monologue
# JP: それはそのまま、\nオリヴィの負荷の増大を、意味してしまうのだから。
2994 = "那就意味著這些負擔，都會一絲不少地落在奧莉薇的肩上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕一人で済ませられればいいのだがな」
1370 = "「……要是我一個人都能搞定就好了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ひとりじゃダメ！　バランスよくゆるまないからー。\nほんとは、もーひとりいて四人だと一番いいけど」
1661 = "「一個人不行！會串不鬆道砟的。其實要能再加個人，四個人一起就最好了」" 

# 【ハチロク】
# display as 八六
# JP: 「あら」
# 1819 = "「啊呀」" 

# monologue
# JP: 保線小屋から持ち出し渡したビーターを、物珍しそうに\n眺め回していたハチロクが、ふっとその顔を持ち上げる。
2566 = "八六似乎覺得奧莉薇從巡線小屋拿出的道鎬非常稀奇，拿在手裡來回觀察了半天，才抬起頭來開口發問。" 

# 【ハチロク】
# display as 八六
# JP: 「ゆるめる。のですか？　双鉄さまのお話ですと、\n道床は、『[つ]搗き固める』ものかと、わたくしは」
2155 = "「要串松嗎？我按雙鐵少爺所說來理解，道床應該是要搗固的才對吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だねー！　言葉では『ツキカタメ』。\nけど、実際はいったんゆるめて、かためるんだよー」
2123 = "「確實！因為叫“搗固”嘛。可是實際上是要先串松，再搗固的」" 

# monologue
# JP: 見て、と笑って、バトンのように、\nオリヴィはビーターをくるり手の中で回転させる。
2627 = "只見奧莉薇笑著把手中的道鎬像指揮棒一樣轉了半圈。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ビーター、普通に使う側。\nヘラみたいにさ、ひらぺったーくつぶれてるでしょお？」
2217 = "「道鎬平常用得多的這一邊，形狀扁平像鏟子一樣對吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、左様ですね」
2040 = "「是的，確實如此」" 

# monologue
# JP: 言って、ハチロクはまじまじと手の中のビーターを見る。\nひらぺったいヘラ状の方、その反対の尖った方。
2581 = "八六邊說邊再次端詳起手中的道鎬。一邊是扁平像鏟子一樣的形狀，另一邊則是尖尖的。" 

# monologue
# JP: それから再びじっくりと見る、ヘラ状になっている方が、\nいわゆる“道床搗き固め”では、主として使われている。
2928 = "聽過奧莉薇的話再看，就不難想像“搗固道床”主要就是用鏟子形狀的這邊了。" 

# 【ハチロク】
# display as 八六
# JP: 「……ただ単に搗き固めるだけでしたら、\n木槌のような形状の方が、好適に思えます」
1368 = "「……若是單純搗固的話，或許木槌那樣的形狀會更合適吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そそ。だから『ツキカタメ』っていうのは、\nもう固まってる\x%lバラスト;#00ffc040;バラスト%l;#;を、一回ゆるめて崩すことなの」
1938 = "「對對。所以說這個“搗固”，是要先把緊實的\\x%lバラスト;#00ffc040;道砟%l;#;先串松」" 

# 【ハチロク】
# display as 八六
# JP: 「緩めて崩して、どうなさいます？」
1685 = "「串松嗎？我不是很明白」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「決まってる！　線路の歪みをホセーする形に動かして、\n作り直して、それでもっかいツキカタメなおすんだよー」
2204 = "「這還不簡單！就是對讓線路產生歪曲的地方進行調整，重新矯正到正常的狀態，而後重新進行搗固咯」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！　例えば――盛り上がっている場合なら、\n線路の下の\x%lバラスト;#00ffc040;バラスト%l;#;をいちどゆるめて、少し取り除いて」
1826 = "「啊！比方說，如果說是高起來了的話，就先把線路下面的\\x%lバラスト;#00ffc040;道砟%l;#;串松，然後去除掉一些」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーそー！　そーなればそこは低くなるから、\nその状態で搗き固めなおすの！」
2086 = "「沒錯沒錯！那樣那裡就會低下去一點，然後保持那樣進行搗固！」" 

# monologue
# JP: 言われ、ハチロクが深く頷く。
2578 = "八六聞言深深地點了點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「なるほど、大変に明快でございますね」
1755 = "「原來如此，這樣的說明真是很直觀明了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど、単純じゃないんだよ？　\nだって、レールはつながってるから」
1713 = "「但是做起來並沒有那麼簡單哦，因為鐵軌都是連在一起的」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――どこか一箇所を動かしたなら、\nつながる近い部分のバランスも、変わってしまう」
1811 = "「啊——如果動了某一個地方，那相鄰部分的道砟也會產生變化」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーそー！　どっかが上がればどっかが下がる。\n列車が走っていくだけで、道床は必ず歪んじゃう」
2085 = "「沒錯沒錯！如果有高有低的話，列車從上面駛過，道床和線路就會產生歪曲」" 

# 【双鉄】
# display as 雙鐵
# JP: 「歪む――なるほど。\n\x%l保線;#00ffc040;保線%l;#;とは、その歪みを常に補正し続けることといえるか」
2071 = "「歪曲，原來如此。\\x%l保線;#00ffc040;巡線%l;#;就是一直要對這些歪曲進行調整啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だね！　だから、時間のイミでも『\x%l保線;#00ffc040;保線%l;#;』なんだよ！\n線路を保つための作業を、ずーっと、線で繋げてく！！」
2022 = "「是呀！所以\\x%l保線;#00ffc040;巡線%l;#;就是要通過踏查“線路”，“巡”出問題，而後加以處理，才能保證線路長久穩定使用呀！！」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――わかりやすいご説明をありがとうございます。\n少し、\x%l保線;#00ffc040;保線%l;#;への理解を深められたように思います」
1834 = "「啊，非常感謝，你的說明真的很簡單易懂。我對\\x%l保線;#00ffc040;巡線%l;#;的理解可以說又加深了一些」" 

# monologue
# JP: ハチロクの瞳は、新知識を得た――\nいや、それを我が物とした喜びに、輝いている。
2573 = "八六的眼神中閃爍著喜悅的光輝，在為掌握新知識，有所進步而欣喜不已。" 

# monologue
# JP: オリヴィもまた、笑顔でハチロクの笑顔に応える。
2679 = "奧莉薇也對八六回以笑容。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど、ホントなら、\nツキカタメは少なくできる方がいいに決まってるよね」
1676 = "「不過話說回來，可能的話，其實搗固還是應該儘量少做的」" 

# 【ハチロク】
# display as 八六
# JP: 「……安定している線路の状態を崩さず、そのまま\n使い続けることこそが、最も理想的ということですね？」
1344 = "「……保持線路穩定的狀態不加以破壞，持續使用下去其實才是最理想的，對吧？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そだよー！　研究されてた、コンクリート[どうしょう,1]道床とか、\nカンペキにそっちがわの発想だよね～」
2246 = "「那當然！所以說以前研究的混凝土道床之類，就是這個方向上一個很好的想法」" 

# 【ハチロク】
# display as 八六
# JP: 「なるほど。でしたら、今緊急に搗き固めを行うのは、\nそうしなければいけない不具合が出たから」
1753 = "「原來如此。那說起來，現在去進行緊急搗固，是出現了必須馬上處理的異常情況嗎」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよだよ。隆起が線路をまた歪めてるの。\nここらへん――走行にはすぐには支障でない範囲だけど」
1936 = "「對呀對呀，隆起又讓線路產生了歪曲，就是這一帶——雖然並沒有嚴重到能立刻影響行駛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1802 = "「唔」" 

# monologue
# JP: 言われて見れば、違和感がある。\nが、今の僕ではただの一目で、狂いの内容までは見えない。
2944 = "被她這麼一說，確實覺得有些不自然。但如今我這樣一眼還看不出具體是哪裡有異常。" 

# monologue
# JP: ゆえ、線路に耳をぴたりとくっつけ、\n示された地点をじっくりと見る――と。
2783 = "所以，只能趴下來把耳朵貼在線路上，再朝著奧莉薇指出的地點仔細看去——" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、たしかになだらかに隆起しているな」
1754 = "「原來如此，確實有一段平緩的隆起」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「セキたちがほーこく入れてないから、\nこの何時間かで盛り上がったんだと思う」
1869 = "「堰他們沒有報告過，看來應該是這幾個小時裡剛剛出現的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1840 = "「嗯——」" 

# 【ハチロク】
# display as 八六
# JP: 「短時間で、目視できるほど隆起してしまう。\nやはり、ただごとではございませんね」
2115 = "「短時間內產生肉眼可見的隆起，局面果然不容樂觀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2121 = "「確實」" 

# monologue
# JP: ゆえに、気になる。\n周囲にまったく、異変の兆候が見られぬことが。
2778 = "所以周圍完全沒有任何異變的徵兆反而越來越讓我放心不下。" 

# monologue
# JP: いや――それを決して見逃さぬよう、\n僕たちは、継続監視を続けているのか。
2481 = "不過——我們也正是為了不漏過任何蛛絲馬跡，而安排人手持續在這裡監視。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……宗方さんがここを重点的に見るようにと\n提言してくださったのは、まことに正しかった」
1357 = "「……宗方先生建議重點監視這裡，現在看來是何等高瞻遠矚」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよねー！！！」
2021 = "「是吧！！！」" 

# monologue
# JP: とはいえ残念ながら、現在の御一夜鉄道には、\nこの地点を常時監視できるだけの、人的資金的余裕は無い。
2535 = "但是遺憾的是，對這裡進行二十四小時不間斷的監視，不管是人力還是資金，御一夜鐵路都是心有餘而力不足。" 

# monologue
# JP: それでも、最重要の監視地点ゆえ、一日最低八時間。\n誰かひとりは交代で詰めているように――ああ。
2483 = "不過至少在最重要的監視地點，以交替輪班的方式，至少保證了每天八小時的覆蓋——我明白了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィが今日の引退を決意した理由には――\nここに詰められる回数を増やそうという意向もあるのか」
1722 = "「你決定在今天引退，也是想得到更多在這裡值班的機會嗎」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「もちろんだよー！　ショクタクの方が、\nオリヴィの好きに配置してもらえるでしょお？」
2103 = "「當然囉！以合同工的身份更方便按奧莉薇的想法來安排嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
2107 = "「的確」" 

# monologue
# JP: 教導も完全に済み、オリヴィの延命を考える以上、\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;乗務はまったく推奨できない。
2790 = "指導已經完全結束，考慮到奧莉薇的壽命因素，讓她繼續執行\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;的乘務任務顯然不是明智之舉。" 

# monologue
# JP: ポーレットがその事情を無視し、\nオリヴィに乗務や添乗を命令するなどありえんだろうし。
2869 = "波萊特自然也不可能無視這一因素，強行命令奧莉薇去執行乘務任務或陪同執勤。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうしてもということならば、乗務の方の嘱託を断り、\n\x%l保線;#00ffc040;保線%l;#;だけの嘱託を受認するという手もあるだろう」
1927 = "「實在不行，還可以不接乘務方面的工作，只接受\\x%l保線;#00ffc040;巡線%l;#;這個辦法」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そこまではしないよー！　オリヴィ、\nオヒトヨ鉄道を困らせたりしたくないし」
1694 = "「也不會到那個程度的啦！奧莉薇不想讓御一夜鐵路為難」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1900 = "「好吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど。ここのこと！\nオリヴィ、ムナカタにマカされたから！」
1775 = "「只是這裡呢！宗方可是把這裡託付給了奧莉薇哦！」" 

# monologue
# JP: よほど嬉しく、誇らしいのだろう。
2695 = "她的語氣中滿是開心和驕傲。" 

# monologue
# JP: 見ているこちらまでつられてしまいそうなほど、\nオリヴィの笑顔は輝いている。
2756 = "我們看著奧莉薇那燦爛的笑容，都不禁要被她感染了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、ちゃあんとケアするの！　この程度なら\nすぐなおせるけど、なおさなきゃ列車止まるから！」
1992 = "「所以必須要好好打理！這種程度很快就能處理好，但放著不管的話就會影響列車通行了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2121 = "「確實」" 

# monologue
# JP: 早期に対処してしまえば、\nなんのことはなく復旧できる。
2706 = "如果能夠儘早處理的話，就可以毫無問題地修復。" 

# monologue
# JP: が、放置された歪みはかならず、さらなる歪みを呼び、\n複合的な、対処困難なものへと育てていってしまう。
2537 = "但若是聽之任之，歪曲只會越來越嚴重，最終形成複雜而難以處理的局面。" 

# 【双鉄】
# display as 雙鐵
# JP: 「善は急げだ。早速やってしまおう」
1701 = "「事不宜遲，趕快處理掉吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！　じゃ、ハチロクにお手本みせるから、\n最初は、ちょっとだけそこで見ててね」
2283 = "「ＯＫ！那八六你先站在這裡看我們怎麼做吧」" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました」
1903 = "「好的，沒問題」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツは、線路の反対側ついて。\nタスキでやろー！」
2270 = "「雙鐵，你去線路對面，斜對著奧莉薇」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2012 = "「明白」" 

# monologue
# JP: 襷掛け。
2802 = "斜對面。" 

# monologue
# JP: オリヴィと僕が線路を挟み、\x%l枕木;#00ffc040;枕木%l;#;を挟んで向かい合い、\nその体制で、同時に搗き固めるやり方だ。
2759 = "我和奧莉薇分別站在線路左右兩邊，一根\\x%l枕木;#00ffc040;枕木%l;#;的前後兩側，這樣就可以一起進行搗固了。" 

# monologue
# JP: 配置につけば、\nすぐオリヴィは、ビーターを高く振り上げる。
2725 = "就位以後，奧莉薇就高高地揮起了道鎬。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「『ヨーイトショーぉ！』」
1321 = "「“勤巡線呀嗎嗬嗨！”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『ヨーイトショーぉ！』」
# 1321 = "「“勤巡線呀嗎嗬嗨！”」" 

# monologue
# JP: 文字通りに、『音頭をとって』。
2686 = "奧莉薇開口起了個頭。" 

# monologue
# JP: 保線夫たちに歌い継がれる音頭を口ずさみながら、\nオリヴィと僕は息を合わせて――
2936 = "藉著巡線員們代代相傳的號子，我和奧莉薇配合好節奏——" 

# monologue
# JP: （ざぐっ）\n（ざぐっ）
3076 = "（挖土）（挖土）" 

# monologue
# JP: \x%lバラスト;#00ffc040;バラスト%l;#;にビーターを搗き込むことで、\n\x%lバラスト;#00ffc040;バラスト%l;#;をバラけさせ動かし、すぐ振り上げる。
2720 = "將道鎬刨進\\x%lバラスト;#00ffc040;道砟%l;#;，將\\x%lバラスト;#00ffc040;道砟%l;#;搖散，再拔出來。" 

# monologue
# JP: 搗きほぐされた砕石たちが、\nビーターの自然な動きにつれて、バラバラと舞う。
2917 = "而道砟在道鎬的揮舞之間，也變得鬆散，容易鏟動了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「『わーれらーのてーつどーお』」
1323 = "「“咱的鐵路呀嗬嗨”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『わーれらーのてーつどーお』」
# 1323 = "「“咱的鐵路呀嗬嗨”」" 

# monologue
# JP: （ざぐっ）\n（ざぐっ）
3069 = "（喳）（喳）" 

# monologue
# JP: 叩いて固める、緩めて動かす――\nその両方を、ビーター一本で繰り返す。
2669 = "夯實，刨松——通過翻轉手中的道鎬，我們交替完成這兩種動作。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「『ヨーイトサーノオ』」
1319 = "「“保暢通呀嗎嗬嗨”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『ヨーイトサーノオ』」
# 1319 = "「“保暢通呀嗎嗬嗨”」" 

# monologue
# JP: （ざぐっ）\n（ざぐっ）
# 3069 = "（喳）（喳）" 

# monologue
# JP: ――その繰り返しが、\x%l枕木;#00ffc040;枕木%l;#;の下に潜り込み、\nそこを頑なに支え続ける\x%lバラスト;#00ffc040;バラスト%l;#;たちをも動かしていく。
1257 = "——經過這一次次的重複，原本被壓在\\x%l枕木;#00ffc040;枕木%l;#;下面穩固支撐著枕木的\\x%lバラスト;#00ffc040;道砟%l;#;分布也隨之緩緩地變化著。" 

# 【ハチロク】
# display as 八六
# JP: 「……なるほど、\nおおまかな要領は、見て覚えたように思います」
1347 = "「……原來如此，我感覺自己掌握大致要領了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ？　じゃ、ハチロクとオリヴィ、タスキになって、\n反対側の線路いこ？　で、ソーテツは」
2030 = "「是嗎？那奧莉薇到對面去，八六過來站在斜對面吧？然後雙鐵你就」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今オリヴィのいるところに入れば、一番いいか」
1965 = "「應該換到你現在的位置是吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーゆーこと！」
1942 = "「就是這樣！」" 

# monologue
# JP: オリヴィはこのメンツの中で、\nもっとも高い技術と、もっとも弱い力とを持つ。
2682 = "奧莉薇是這幾個人之中，技術最為高超，但力量最小的一個。" 

# monologue
# JP: ゆえ、オリヴィの場所に僕が入るローテーションを四度\n回せば、一番よろしく、バランスを取っていけるだろう。
2785 = "所以，由我順著奧莉薇後面輪換，這樣重複四次，應該也是最有效率的做法。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そしたら、もっかいいくよー！」
2231 = "「那就再來一次囉！」" 

# monologue
# JP: そのあまりにも輝く笑顔に、ほんの一瞬思ってしまう。\nオリヴィは乗務より、\x%l保線;#00ffc040;保線%l;#;の方が好きなのではないかと。
2995 = "那璀璨的笑容讓我一時間不禁覺得，比起乘務任務，奧莉薇是不是更喜歡\\x%l保線;#00ffc040;巡線%l;#;呢。" 

# monologue
# JP: けれどもすぐに、その錯覚を否定する。\n今の僕なら、それが錯覚だと断言できる。
2538 = "但轉瞬之間，我就否定了這個錯覺。如今的我，可以肯定地斷言那肯定是錯覺。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「『ヨーイトショーオ！』」
# 1321 = "「“勤巡線呀嗎嗬嗨！”」" 

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「『ヨーイトショーオ』」
# 1321 = "「“勤巡線呀嗎嗬嗨！”」" 

# monologue
# JP: （ざぐっ）\n（ざぐっ）
3075 = "（挖土）" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いいねいいね！　ジョーズジョーズ！！！」
1678 = "「不錯不錯！做得很棒！！！」" 

# monologue
# JP: ――ハチロクと、好きな相手とともに作業をするのなら。\n搗き固めさえ、これほど楽しく幸せだ。
1255 = "——和八六，和喜歡的人一起的話，就連搗固都變得如此讓我樂在其中。" 

# monologue
# JP: 共に居らずともオリヴィは、ここで\x%l保線;#00ffc040;保線%l;#;をするときには、\nその感覚を、きっと味わえているのだろう。
2607 = "即便那個人現在並沒有在這裡一同\\x%l保線;#00ffc040;巡線%l;#;，但奧莉薇心裡的感受想必也與我們相去不遠吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……早く、桜が咲かんものかな」
1339 = "「……不知道櫻花會不會早點開呢」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あはっ！」
1823 = "「啊哈！」" 

# monologue
# JP: オリヴィが笑う。\nにっこりわらって、高く、ビーターを振り上げる。
2680 = "奧莉薇又笑了。不過並沒有停下手中的道鎬。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だね！　桜が咲いたら、春になったら！\nきっと全部が！　今よりもっとステキになるよ！」
2027 = "「是呀！櫻花開了那就是春天啦！到時一切肯定都會變得比現在更好的！」" 

# monologue
# JP: そうして、声を張り上げる。
2693 = "她的聲調也隨之又高了幾分。" 

# monologue
# JP: 鹿兒島にまで、八ツ城にまで。\n宗方さんの耳元にまで、届かせようとするかのように。
2734 = "彷彿要傳到鹿兒島，傳到八代，一路傳到宗方先生耳中一般。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「『わーれらのてーつどお！』」
# 1323 = "「“咱的鐵路呀嗬嗨”」" 
