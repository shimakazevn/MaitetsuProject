1472 = "「八六怎麼了嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「そーね。\n……まぁ、ウチの気のせいかもしれんけど」
1561 = "「嗯。……不過這說不定只是咱的錯覺」" 

# monologue
