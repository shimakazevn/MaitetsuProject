# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そのことか」
1728 = "「是這件事啊」" 

# 【真闇】
# display as 真闇
# JP: 「双ちゃん、心あたりばあっと？」
1599 = "「小雙想到什麼了嗎？」" 

# 【双鉄】
# display as 雙鐵
