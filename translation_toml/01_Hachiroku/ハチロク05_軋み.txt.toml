[script]
# lines: 397 
# monologue
# JP: 朝食の席に似合わぬ言葉に、\n石炭を取るハチロクの手がぴたりと止まる。
2594 = "（Nghe thấy những lời không mấy phù hợp trong bữa sáng,\nbàn tay đang gắp than của Hachiroku chợt khựng lại.）"
# 【ハチロク】
# display as 八六
# JP: 「[えんがい,1]煙害、でございますか？」
1778 = "「\\x%l煙害;#00ffc040;Khói than gây hại%l;#; sao ạ?」"
# 【真闇】
# display as 真闇
# JP: 「そ。[えんがい,1]煙害。\n商店会の方に、クレームが来とっとよ」
1596 = "「Ừ. \\x%l煙害;#00ffc040;Khói than gây hại%l;#;.\nCó khiếu nại gửi đến Hiệp hội Thương mại đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「商店会にか」
1536 = "「Gửi đến Hiệp hội Thương mại sao?」"
# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;は最も間近に、\nＳＬの生む煙と火とに接する仕事だ。
2637 = "（\\x%l機関士;#00ffc040;Lái tàu%l;#; là công việc phải tiếp xúc gần nhất\nvới khói và lửa do đầu máy hơi nước tạo ra.）"
# monologue
# JP: それがいかなる凄まじさかを知っているゆえ、\n苦情が来たと聞かされたとて、“予想外”とは思えない。
2364 = "（Vì biết rõ sự khủng khiếp của nó,\nnên khi nghe tin có khiếu nại, tôi cũng không thấy \"bất ngờ\" cho lắm.）"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、量的にも時間的にも、\n一番煙と接することになるのは駅周辺であるからな」
1802 = "「Đúng là, xét về cả lượng lẫn thời gian,\nkhu vực xung quanh nhà ga là nơi tiếp xúc với khói nhiều nhất mà.」"
# monologue
# JP: 言った途端に「いやいや」と、\n真闇姉の手が軽く振られる。
2552 = "（Ngay khi tôi vừa dứt lời, chị Mayami liền khẽ xua tay,\n「Không không.」）"
# 【真闇】
# display as 真闇
# JP: 「違かとよ。御一夜商店会の中からのクレームじゃなか。\nおかげで繁盛しとるけん、こっちはむしろ\x%l8620;#00ffc040;[ハチロク,3]8620%l;#;様様」
1437 = "「Không phải đâu. Không phải là khiếu nại từ bên trong Hiệp hội Thương mại Ohimitera đâu.\nNhờ có nó mà buôn bán phát đạt, bên này còn đang phải cảm tạ \\x%l8620;#00ffc040;[Hachiroku,3]8620%l;#; ấy chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　では、一体誰が――」
1712 = "「Vậy sao? Thế thì rốt cuộc là ai——」"
# 【真闇】
# display as 真闇
# JP: 「これ。煙ばかぶっとるって」
1796 = "「Đây này. Họ bảo là bị khói bay mù mịt.」"
# monologue
# JP: 言って、真闇姉は一枚の写真を取り出せば、\nハチロクは喰いつくように覗きこむ。
2555 = "（Nói rồi, chị Mayami lấy ra một bức ảnh,\nHachiroku chồm tới nhìn chằm chằm vào đó.）"
# 【ハチロク】
# display as 八六
# JP: 「これは――双鉄様」
1897 = "「Đây là——ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ……[ふみきりや,2]踏切屋さんだな」
1559 = "「Ừm... Là cửa hàng Fumikiriya nhỉ.」"
# monologue
# JP: 御一夜駅から数キロは離れた、寂れてしまった踏切近くで、\n未だにずっと生き続けている雑貨屋、“踏切屋”さん。
2235 = "（Cách ga Ohimitera vài km, gần một đoạn giao cắt đường sắt đã bị bỏ hoang,\ncó một cửa hàng tạp hóa vẫn luôn tồn tại từ trước đến nay, mang tên \"Fumikiriya\".）"
# monologue
# JP: 名前からして、鉄道には理解を示してくれそうに、\nなんとなく思っていたのだが――
2530 = "（Nghe cái tên, tôi cứ nghĩ mường tượng rằng họ sẽ có sự thấu hiểu nhất định đối với đường sắt,\nnhưng mà——）"
# 【双鉄】
# display as 雙鐵
# JP: 「まさか、あそこから苦情が来るとは」
1743 = "「Không ngờ khiếu nại lại đến từ đó.」"
# monologue
# JP: 煙に接する時間など、\n\x%l8620;#00ffc040;8620%l;#;が通過する、長くとも数十秒のことだろう。
2199 = "（Thời gian tiếp xúc với khói,\nchỉ là vài chục giây khi \\x%l8620;#00ffc040;8620%l;#; chạy ngang qua mà thôi.）"
# monologue
# JP: まして、この写真を見る限りでは……
2447 = "（Huống hồ, nhìn vào bức ảnh này thì...）"
# 【双鉄】
# display as 雙鐵
# JP: 「ずいぶんと、煙が流れているな。\nしかも、黒い」
1779 = "「Khói bay xa thật đấy.\nHơn nữa, lại còn đen ngòm.」"
# 【ハチロク】
# display as 八六
# JP: 「強風の日、でございましょうね。\n木もずいぶんと曲がっているように見えます」
1864 = "「Chắc hẳn là vào một ngày gió lớn ạ.\nNhìn cây cối cũng có vẻ bị uốn cong đi rất nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――確かに。\n写真で見てもわかるほど、大きく風に揺すられているな」
1707 = "「À——đúng thật.\nNhìn ảnh thôi cũng thấy gió thổi rung rinh mạnh cỡ nào rồi.」"
# monologue
# JP: ……強風の日は、どうにも機関車の調子が悪い。\n\x%l加減弁;#00ffc040;加減弁%l;#;テコ、ブレーキ、あるいは逆転機――
1175 = "（……Vào những ngày gió lớn, tình trạng của đầu máy thường rất tệ.\nCần gạt \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;, phanh, hay cần đảo chiều——）"
# monologue
# JP: そうした機器の操作がイマイチしっくり来ないし、\n振動も、ずいぶん強くなるような気がする。
2655 = "（Thao tác những thiết bị đó cứ thấy sượng sượng,\nvà độ rung có vẻ cũng mạnh hơn rất nhiều.）"
# 【双鉄】
# display as 雙鐵
# JP: 「煙が黒いのも、日々姫が\x%lカマ;#00ffc040;カマ%l;#;を制御しそこねて\nしまったせいか」
1775 = "「Khói đen ngòm thế kia, cũng là do Hibiki không kiểm soát tốt \\x%lカマ;#00ffc040;lò hơi%l;#;\nphải không?」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ……左様でございましょうね」
1700 = "「Vâng... Chắc là vậy rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「となると、\nこれはめったに起こることでは無さそうだがなぁ」
1850 = "「Nếu vậy thì,\nchuyện này có vẻ hiếm khi xảy ra lắm mà nhỉ.」"
# 【真闇】
# display as 八六＆真闇
# JP: 『「双鉄様」\n「そぎゃんかもねぇ」』
1908 = "『「Ngài Soutetsu」\n「Có lẽ vậy nhỉ」』"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
1565 = "「Hửm?」"
# monologue
# JP: ハチロクと真闇姉との声が重なる。
2249 = "（Giọng của Hachiroku và chị Mayami vang lên cùng lúc.）"
# monologue
# JP: ハチロクはすぐに目をふせて、\n真闇姉へと言葉をゆずるそぶりを見せる。
2173 = "（Hachiroku lập tức cụp mắt xuống,\ntỏ ý nhường lời cho chị Mayami.）"
# 【双鉄】
# display as 雙鐵
# JP: 「そぎゃん、とはどういうことだ？」
1660 = "「Có lẽ vậy, là ý gì?」"
# 【真闇】
# display as 真闇
# JP: 「こん写真――\n航空写真ば、誰が撮ったかいうことよ」
1542 = "「Bức ảnh này——\nBức ảnh chụp từ trên không này, là do ai chụp mới được chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「誰が、とは……ああ」
1828 = "「Ai chụp ư... À.」"
# monologue
# JP: “航空写真”の響きが僕に理解をくれる。
1168 = "（Cụm từ \"ảnh chụp từ trên không\" đã giúp tôi hiểu ra vấn đề.）"
# monologue
# JP: 御一夜上空を飛ぶものなどは、\n普段であれば鳥たちとナビくらいがせいぜいだ。
2475 = "（Những thứ bay trên bầu trời Ohimitera,\nbình thường thì cùng lắm cũng chỉ có lũ chim và Navi mà thôi.）"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致推進派による撮影――\nということになるのか、これは」
1445 = "「Bức ảnh này——\nlà do phe thúc đẩy thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; chụp sao.」"
# 【真闇】
# display as 真闇
# JP: 「ま、そぎゃんと考えるのが自然よねぇ」
1849 = "「Chà, nghĩ vậy là tự nhiên nhất rồi.」"
# monologue
# JP: おっとりと、いつもどおりの口調とペースで、\n鋭い指摘が紡がれていく。
2549 = "（Với giọng điệu và nhịp độ từ tốn, điềm đạm như thường lệ,\nchị ấy đưa ra một nhận định sắc bén.）"
# 【真闇】
# display as 真闇
# JP: 「[ふみきりや,2]踏切屋さんの二代目さん。\n今の店主は、ガチガチの\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致推進派やもん」
1857 = "「Người chủ đời thứ hai của cửa hàng Fumikiriya.\nChủ cửa hàng hiện tại là một người thuộc phe thúc đẩy thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; cực kỳ cứng rắn đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……やはり、不況の影響によるものか？」
1452 = "「Chuyện đó... quả nhiên là do ảnh hưởng của suy thoái kinh tế sao?」"
# 【真闇】
# display as 真闇
# JP: 「やろうねぇ。あそこまで離れてしまうと、\n駅前が繁盛しても、取り残されてしまうけん」
1618 = "「Chắc là vậy rồi. Nằm cách xa đến mức đó,\nthì dù khu vực trước ga có buôn bán sầm uất đến đâu, cũng sẽ bị bỏ lại phía sau thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「工場や宿舎の立地次第では、\n一気に商売が盛り返すかもしれんしな」
1588 = "「Tùy thuộc vào vị trí đặt nhà máy và ký túc xá,\nmà việc buôn bán có thể phất lên nhanh chóng nhỉ.」"
# monologue
# JP: どこで買ってもさほど値段に大きな差がない、\n日用雑貨の類であれば、十二分に期待できることだろう。
2443 = "（Nếu là những mặt hàng tạp hóa thiết yếu hàng ngày, mua ở đâu cũng không chênh lệch giá mấy,\nthì hoàn toàn có thể kỳ vọng vào điều đó.）"
# monologue
# JP: むしろ、立地案などでゆさぶられ、\n工場誘致を推進するようになったものかもしれん。
2624 = "（Thậm chí, có khi họ đã bị lung lay bởi các phương án lựa chọn địa điểm,\nvà bắt đầu thúc đẩy việc thu hút nhà máy cũng nên.）"
# 【双鉄】
# display as 雙鐵
# JP: 「これは……ヘタな対応を打ってしまうと、\n政治的に広げられてしまいかねない案件か」
1846 = "「Chuyện này... nếu xử lý không khéo,\ncó thể sẽ trở thành một vụ việc bị thổi phồng lên về mặt chính trị mất.」"
# monologue
# JP: 踏切屋さん一件にとどまらず、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致派が、\nクレームの嵐を吹かせるようなことになったらたまらない。
2122 = "（Không chỉ dừng lại ở vụ việc của cửa hàng Fumikiriya, nếu phe thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;\nmà tạo ra một cơn bão khiếu nại thì thật tồi tệ.）"
# monologue
# JP: なにせ、煙の問題だ。風向きと条件次第では、\n予想もつかない場所にも伸びてしまおうし――
2525 = "（Dù sao thì, đây cũng là vấn đề về khói than. Tùy thuộc vào hướng gió và điều kiện thời tiết,\nmà nó có thể lan đến những nơi không thể lường trước được——）"
# 【真闇】
# display as 真闇
# JP: 「水汚染の防止が工場誘致反対の旗印やもんねぇ。\n『ＳＬも汚染を』ゆうて主張されると、泥仕合たい」
1882 = "「Ngăn chặn ô nhiễm nguồn nước là ngọn cờ đầu trong việc phản đối thu hút nhà máy mà lị.\nNếu bị họ vin vào cớ 『Đầu máy hơi nước cũng gây ô nhiễm』, thì sẽ thành một cuộc chiến bùn lầy mất.」"
# 【ハチロク】
# display as 八六
# JP: 「であれば、\n先手を打って最善の対策を取ってしまいましょう」
1869 = "「Nếu vậy,\nchúng ta hãy đi trước một bước và thực hiện biện pháp đối phó tốt nhất đi ạ.」"
# monologue
# JP: 確信に満ちたハチロクの声。\n顔を向ければ、一心な瞳が僕を捉える。
2161 = "（Giọng nói của Hachiroku tràn đầy tự tin.\nQuay mặt sang, tôi bắt gặp ánh mắt kiên định của cô ấy đang nhìn mình.）"
# 【双鉄】
# display as 雙鐵
# JP: 「なにか良い考えでもありそうだな」
1793 = "「Có vẻ em đã có ý tưởng gì hay rồi nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「無論です。\nＳＬの歴史は、煙害との戦いの歴史でもありますので」
1847 = "「Tất nhiên rồi ạ.\nLịch sử của đầu máy hơi nước cũng chính là lịch sử của cuộc chiến chống lại khói than gây hại mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
1711 = "「Vậy sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。ごくごく初期の\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;においては、\n煙に混じる火の粉によっての火災さえございました」
1720 = "「Vâng. Ở những chiếc \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; thời kỳ sơ khai nhất,\nthậm chí đã từng xảy ra hỏa hoạn do tàn lửa lẫn trong khói bay ra ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「火災――」
1758 = "「Hỏa hoạn——」"
# monologue
# JP: 聞いた瞬間、ざわりと背筋が怖気だつ。\n火のイメージは鼓膜に軋みを、口に鉄の味を蘇らせる。
2063 = "（Khoảnh khắc nghe thấy từ đó, sống lưng tôi lạnh toát.\nHình ảnh ngọn lửa làm màng nhĩ tôi rít lên, vị máu tanh tưởi trào ngược trong khoang miệng.）"
# monologue
# JP: 声も身体も放っておけば震えてしまいそうな気がして、\n半ば無理やり言葉を絞って、心を落ち着けようとする。
2372 = "（Cảm giác như giọng nói và cơ thể sẽ run rẩy nếu cứ để mặc như vậy,\ntôi cố gắng ép bản thân thốt ra thành lời, để giữ bình tĩnh.）"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな――\n火と鉄と……それこそが、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;だ」
1704 = "「Đúng là vậy nhỉ——\nLửa và sắt... đó chính là \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;.」"
# monologue
# JP: 頷いて、\nハチロクは静かな言葉をつなげる。
2174 = "（Gật đầu,\nHachiroku tiếp tục nói với giọng điềm tĩnh.）"
# 【ハチロク】
# display as 八六
# JP: 「わたくしの頃までにも技術革新はございましたが、\nそれでも決して、煙を甘く見ることは出来ません」
1891 = "「Mặc dù đến thời đại của em thì công nghệ đã có những bước tiến đổi mới,\nnhưng vẫn không thể nào xem nhẹ khói than gây hại được ạ.」"
# monologue
# JP: （ああ――）
2722 = "（À——）"
# monologue
# JP: ハチロクに満ちているのは確信ではなく、緊張なのだと、\n僕に巣食った怯えが逆に、気づかせてくれる。
2170 = "（Những gì đang tràn ngập trong Hachiroku không phải là sự tự tin, mà là sự căng thẳng.\nNỗi sợ hãi đang bám rễ trong tôi ngược lại đã giúp tôi nhận ra điều đó.）"
# monologue
# JP: ハチロクの声の硬さの裏にあるものは――\n僕のときっと似通った、事故に対する恐怖なのだと。
2246 = "（Đằng sau sự cứng nhắc trong giọng nói của Hachiroku——\nchắc chắn cũng giống hệt như tôi, là nỗi sợ hãi đối với tai nạn.）"
# 【ハチロク】
# display as 八六
# JP: 「たとえ少数の声で、稀であろうと。煙害があるのなら、\nわたくしたちの為すべきはただ、根絶のための努力です」
1548 = "「Dù chỉ là thiểu số lên tiếng, dù chỉ là những trường hợp hiếm hoi. Nhưng nếu khói than gây hại thực sự tồn tại,\nthì việc chúng ta phải làm chỉ có một, đó là nỗ lực tận diệt nó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1710 = "「Đúng vậy.」"
# monologue
# JP: 環境汚染の基準値だとか、利益と損失のバランスだとか、\nそうした主張では、誘致派と同じ土俵に立つことになる。
1165 = "（Nếu cứ đem những lý lẽ như tiêu chuẩn ô nhiễm môi trường, hay cân bằng giữa lợi ích và tổn thất ra,\nthì chẳng khác nào tự đặt mình lên cùng một võ đài với phe thu hút nhà máy.）"
# monologue
# JP: 煙害と感じさせないレベルまで、状況を改善させてこそ、\n僕らの目指す御一夜復興への道筋もつけられよう。
2124 = "（Chỉ khi cải thiện được tình hình đến mức không còn ai cảm thấy khói than là mối nguy hại nữa,\nthì con đường phục hưng Ohimitera mà chúng tôi đang hướng tới mới có thể mở ra.）"
# 【真闇】
# display as 真闇
# JP: 「けど煙害ば根絶するとか……\nそぎゃんかこつ、出来ゆうもんとや？」
1524 = "「Nhưng mà bảo tận diệt khói than gây hại thì...\nchuyện đó có thực sự làm được không?」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしの世代以降のＳＬたちには、\n“[しゅうえん,1]集煙装置”が取り付けられたものがございます」
1622 = "「Từ thế hệ của em trở đi, có những chiếc đầu máy hơi nước\nđã được trang bị thứ gọi là \"\\x%l集煙装置;#00ffc040;Thiết bị gom khói%l;#;\".」"
# 【真闇】
# display as 真闇
# JP: 「しゅうえん……あ、煙ば集める？」
1681 = "「Gom khói... a, gom khói lại sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、その集煙です。本来は、\nトンネル内で絶大な効果を発揮するものですが――」
1725 = "「Vâng, chính là gom khói ạ. Vốn dĩ,\nnó là thiết bị phát huy tác dụng cực kỳ lớn khi đi trong hầm——」"
# monologue
# JP: ハチロクの手が、簡素な図面を引いていく。
2143 = "（Bàn tay Hachiroku thoăn thoắt vẽ ra một bản vẽ phác thảo đơn giản.）"
# monologue
# JP: 煙突上部に、後方だけが開いた箱を取り付ける……\nそれが一番簡単な、\x%l集煙装置;#00ffc040;集煙装置%l;#;の原理のようだ。
2510 = "（Lắp một chiếc hộp chỉ hở phần phía sau lên trên miệng ống khói...\nĐó có vẻ là nguyên lý cơ bản nhất của \\x%l集煙装置;#00ffc040;thiết bị gom khói%l;#;.）"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。何もせずにいれば上へと吹き出す煙を、\n\x%l集煙装置;#00ffc040;集煙装置%l;#;は、後方へと強制的に流してしまうのか」
1494 = "「Ra vậy. Khói vốn dĩ sẽ phụt thẳng lên trên nếu không làm gì cả,\nnhưng \\x%l集煙装置;#00ffc040;thiết bị gom khói%l;#; sẽ cưỡng chế đẩy luồng khói đó chảy về phía sau sao.」"
# 【ハチロク】
# display as 八六
# JP: 「左様です。\x%l除煙板;#00ffc040;[デフ,2]除煙板%l;#;と組み合わせることにより、\n煙の広がりを、かなり抑えこむことが可能となるかと」
1744 = "「Đúng vậy ạ. Nếu kết hợp với \\x%l除煙板;#00ffc040;tấm chắn khói%l;#;,\nthì có thể kiềm chế đáng kể sự lan rộng của khói ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――デメリットは？」
1564 = "「Hừm——Vậy còn nhược điểm thì sao?」"
# 【ハチロク】
# display as 八六
# JP: 「箱の上部は開閉可能なフタとなっておりますから、\n不要時には開いておけば良いだけですし……」
1809 = "「Phần trên của hộp là một chiếc nắp có thể đóng mở được,\nnên khi không cần thiết thì chỉ việc mở nắp ra là xong...」"
# monologue
# JP: ん……と、ハチロクが考えこむ。
2171 = "（Hừm... Hachiroku trầm ngâm suy nghĩ.）"
# monologue
# JP: 唇を結び目を閉じて――\nやがて、ゆっくりと言葉が吐かれる。
2251 = "（Mím môi, nhắm mắt lại——\nMột lúc sau, cô ấy chậm rãi cất lời.）"
# 【ハチロク】
# display as 八六
# JP: 「目に見えるデメリットとなりますと、\n重量増加くらいのものとなりますでしょうか」
1825 = "「Nếu nói về nhược điểm có thể nhìn thấy được,\nthì có lẽ chỉ là việc trọng lượng sẽ tăng lên đôi chút thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「重量増加か……\n確かに機関車にも\x%l客車;#00ffc040;客車%l;#;にも、増設が重なってるからな」
1573 = "「Trọng lượng tăng lên sao...\nĐúng là cả đầu máy lẫn \\x%l客車;#00ffc040;toa hành khách%l;#; đều đang bị chất thêm đủ thứ trang bị bổ sung nhỉ.」"
# 【真闇】
# display as 真闇
# JP: 「ゆーか、\n\x%l集煙装置;#00ffc040;集煙装置%l;#;やらは、簡単に入手できるもんとや？」
1594 = "「Mà này,\nmấy thứ như \\x%l集煙装置;#00ffc040;thiết bị gom khói%l;#; ấy, có dễ kiếm không vậy?」"
# monologue
# JP: 真闇姉の素朴な、それだけに重要な問い。\nハチロクは、どこかホっとしたような頷きを返す。
2686 = "（Một câu hỏi giản dị, nhưng lại cực kỳ quan trọng của chị Mayami.\nHachiroku gật đầu đáp lại, mang theo chút gì đó nhẹ nhõm.）"
# 【ハチロク】
# display as 八六
# JP: 「\x%l集煙装置;#00ffc040;集煙装置%l;#;は、各地の\x%l機関区;#00ffc040;機関区%l;#;が独自開発していたものです。\nですので、図面さえ入手できれば製造は比較的容易かと」
1199 = "「\\x%l集煙装置;#00ffc040;Thiết bị gom khói%l;#; là thứ do các \\x%l機関区;#00ffc040;khu đầu máy%l;#; ở từng địa phương tự phát triển ạ.\nNên chỉ cần có bản vẽ, việc chế tạo sẽ tương đối dễ dàng ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「各地で独自開発……その土地々々の実情にあわせてと\nいった感じか？」
1533 = "「Các địa phương tự phát triển... \nkiểu như là tùy biến cho phù hợp với tình hình thực tế của từng vùng sao?」"
# 【ハチロク】
# display as 八六
# JP: 「左様です。ので、可能であれば複数の図面を入手して、\nできるかぎり軽量のものを装備できればと願います」
1746 = "「Đúng vậy ạ. Cho nên, nếu có thể thì em muốn thu thập nhiều bản vẽ khác nhau,\nđể có thể trang bị loại nào nhẹ nhất có thể ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その方針で動いてみるか。\n赤井宮司や毛利の[あき,1]安芸様に図面のことを尋ねてみよう」
1867 = "「Nếu vậy thì cứ theo phương châm đó mà tiến hành nhé.\nĐể tôi hỏi thử đền chủ Akai hay ngài Aki nhà Mouri xem họ có biết gì về bản vẽ không.」"
# monologue
# JP: それでどうかと視線で問えば、即座の答え。
2369 = "（Tôi đưa mắt nhìn hỏi ý kiến mọi người, và nhận được câu trả lời ngay tắp lự.）"
# 【ハチロク】
# display as 八六
# JP: 「わたくしに異論はございません」
1652 = "「Em không có ý kiến gì khác ạ.」"
# 【真闇】
# display as 真闇
# JP: 「うちも良かとよ」
1539 = "「Chị cũng thấy ổn.」"
# monologue
# JP: 言って大きく伸びをして、\n真闇姉は、んんっ、と咳き込む。
2625 = "（Nói xong, chị Mayami vươn vai một cái thật lớn,\nrồi hắng giọng ho khan vài tiếng.）"
# 【真闇】
# display as 真闇
# JP: 「ああ、ホっとしたらなんか喉ば渇きよるねぇ」
1429 = "「Aiza, tự nhiên thấy nhẹ nhõm xong cái khát nước ghê.」"
# 【ハチロク】
# display as 八六
# JP: 「あら、気が付きませんで。すぐにお淹れいたします」
1544 = "「Ôi, em không để ý. Để em đi pha trà ngay đây ạ.」"
# 【真闇】
# display as 真闇
# JP: 「ありがとうねぇ。助かるわぁ」
1829 = "「Cảm ơn em nhé. Giúp chị nhiều lắm.」"
# monologue
# JP: 会釈を残し、ハチロクが奥へと引っ込んでいく。\nその足音が消えるのを待ち、問いかける。
2168 = "（Để lại một cái cúi chào, Hachiroku lui vào trong.\nĐợi đến khi tiếng bước chân của cô ấy khuất hẳn, tôi mới cất tiếng hỏi.）"
# 【双鉄】
# display as 雙鐵
# JP: 「――なにか、引っかかるところでもあるのか？」
1214 = "「——Chị có điều gì lấn cấn sao?」"
# 【真闇】
# display as 真闇
# JP: 「煙害のことは、\n双ちゃんの考え通りでよかかと思うけど……」
1777 = "「Chuyện khói than gây hại thì,\nchị nghĩ cứ làm theo ý của em là được rồi...」"
# monologue
# JP: 真闇姉らしからぬ、\n奥歯にものの挟まったようなその言葉。
2547 = "（Những lời nói ngập ngừng, ấp úng,\nthật chẳng giống với chị Mayami thường ngày chút nào.）"
# monologue
# JP: で、あるのならお茶云々は、\nやはりハチロクを退席させるための方便だったのだろう。
2533 = "（Nếu vậy thì chuyện pha trà ban nãy,\nquả nhiên chỉ là cái cớ để bảo Hachiroku lánh mặt.）"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、ハチロクに何かあるのか？」
1472 = "「Vậy, Hachiroku bị làm sao à?」"
# 【真闇】
# display as 真闇
# JP: 「そーね。\n……まぁ、ウチの気のせいかもしれんけど」
1561 = "「Ừm.\n...Mà, có khi chỉ là chị tưởng tượng thôi.」"
# monologue
# JP: 巨大な居間の座卓越し、真闇姉が身を乗り出してくる。
2557 = "（Qua chiếc bàn thấp khổng lồ trong phòng khách, chị Mayami nhoài người về phía trước.）"
# monologue
# JP: よほど大事な話だろうと、\n反対側から、僕も大きく身を寄せる。
2528 = "（Chắc hẳn là chuyện rất quan trọng,\ntôi cũng từ phía đối diện chồm người lại gần.）"
# 【真闇】
# display as 真闇
# JP: 「ハチロクちゃん。なんか……\nどっかで、無理ばしとる感じ、せん？」
1457 = "「Hachiroku ấy. Hình như...\nem ấy đang cố gượng ép bản thân chuyện gì đó thì phải?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そのことか」
1728 = "「À, chuyện đó sao.」"
# 【真闇】
# display as 真闇
# JP: 「双ちゃん、心あたりばあっと？」
1599 = "「Em có biết chuyện gì không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。まぁな」
1562 = "「Ừm. Cũng đại khái đoán được.」"
# monologue
# JP: 無理なら、している。\n僕と同様――ハチロクも、恐らくはいまだ変わらずに。
2309 = "（Nếu có gượng ép, thì chắc chắn là có.\nGiống như tôi——có lẽ Hachiroku vẫn chưa hề thay đổi.）"
# monologue
# JP: 鉄道事故の大きな傷を負いながら、\nそれでも鉄道と離れられない、それゆえに。
2254 = "（Mang trong mình vết thương lòng sâu sắc từ vụ tai nạn đường sắt,\nnhưng vẫn không thể rời xa đường sắt, chính vì lẽ đó.）"
# 【双鉄】
# display as 雙鐵
# JP: 「その無理は恐らく、背負わねばならぬ類のものだ。\nそしてハチロクはそれに耐えると、僕は信じる」
1631 = "「Sự gượng ép đó có lẽ là thứ mà cô ấy buộc phải gánh vác.\nVà tôi tin rằng Hachiroku sẽ chịu đựng được.」"
# 【真闇】
# display as 真闇
# JP: 「そ？　なら、良かけどねぇ」
1713 = "「Vậy sao? Nếu thế thì tốt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1901 = "「っ!?」"
# monologue
# JP: 真闇姉が思い切り腕を、指を伸ばして僕の額をつつく。\nそうしておっとり、いつもの声で伝えてくれる。
2550 = "（Chị Mayami vươn thẳng cánh tay, dùng ngón tay gõ mạnh vào trán tôi.\nRồi với chất giọng từ tốn thường ngày, chị căn dặn.）"
# 【真闇】
# display as 真闇
# JP: 「よー見てあげねばいけんよ？　双ちゃん。\nハチロクちゃんは、女の子なんだけんねぇ」
1600 = "「Phải để ý chăm sóc em ấy cho cẩn thận đấy nhé? Sou-chan.\nDù sao thì Hachiroku cũng là con gái mà.」"
# monologue
# JP: 生憎のひどい雨だが、\x%l客車;#00ffc040;客車%l;#;は満席。\n営業的には、極めてありがたいことだ。
2090 = "（Dù trời đang mưa to tầm tã, nhưng \\x%l客車;#00ffc040;toa hành khách%l;#; vẫn kín chỗ.\nVề mặt kinh doanh mà nói, đây là một điều vô cùng đáng mừng.）"
# monologue
# JP: が、別角度から見るのなら、重い車輌に濡れた\x%l踏面;#00ffc040;踏面%l;#;――\n運転には、いつも以上の慎重さと精密さとを要求される。
2106 = "（Nhưng nhìn từ một góc độ khác, toa xe nặng trịch cùng \\x%l踏面;#00ffc040;mặt lăn bánh xe%l;#; ướt sũng——\nđòi hỏi việc lái tàu phải thận trọng và chính xác hơn mức bình thường rất nhiều.）"
# 【ハチロク】
# display as 八六
# JP: 「――\x%l汽笛;#00ffc040;汽笛%l;#;禁止制限」
1215 = "「——Giới hạn cấm \\x%l汽笛;#00ffc040;còi hơi nước%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l汽笛;#00ffc040;汽笛%l;#;禁止制限、良し！」
1803 = "「Giới hạn cấm \\x%l汽笛;#00ffc040;còi hơi nước%l;#;, rõ!」"
# monologue
# JP: 踏切屋さんの通過まであと２０秒。
2636 = "（Còn 20 giây nữa là đi ngang qua cửa hàng Fumikiriya.）"
# monologue
# JP: この区間、余計な刺激を与えないよう、\n\x%l汽笛;#00ffc040;汽笛%l;#;を鳴らさぬようにする。
2495 = "（Để tránh gây thêm kích động không cần thiết trong khu vực này,\ntôi quyết định không kéo \\x%l汽笛;#00ffc040;còi hơi nước%l;#;.）"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l集煙装置;#00ffc040;集煙装置%l;#;、フタ閉め」
1202 = "「\\x%l集煙装置;#00ffc040;Thiết bị gom khói%l;#;, đóng nắp.」"
# 【日々姫】
# display as 日日姬
# JP: 「\x%l集煙装置;#00ffc040;集煙装置%l;#;、フタ閉め――良し！」
1201 = "「\\x%l集煙装置;#00ffc040;Thiết bị gom khói%l;#;, đóng nắp——rõ!」"
# monologue
# JP: 日々姫がロッドを引き込めば、\x%lドラフト;#00ffc040;ドラフト%l;#;音――\n煙を吐き出すぽっぽという音がいくらかこもる。
2434 = "（Khi Hibiki kéo cần gạt, tiếng \\x%lドラフト;#00ffc040;hút gió lò hơi%l;#;——\ntiếng \"phịch phịch\" nhả khói nghe có vẻ nghèn nghẹt đi đôi chút.）"
# monologue
# JP: 音の変化が、\n\x%l集煙装置;#00ffc040;集煙装置%l;#;のフタが閉まったと教えてくれる。
2295 = "（Sự thay đổi của âm thanh,\ncho biết nắp của \\x%l集煙装置;#00ffc040;thiết bị gom khói%l;#; đã được đóng lại.）"
# 【ハチロク】
# display as 八六
# JP: 「――\x%l汽笛;#00ffc040;汽笛%l;#;禁止制限、解除」
1207 = "「——Hủy giới hạn cấm \\x%l汽笛;#00ffc040;còi hơi nước%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l汽笛;#00ffc040;汽笛%l;#;制限解除、良し！\n\x%l集煙装置;#00ffc040;集煙装置%l;#;、フタ開け！」
1466 = "「Hủy giới hạn \\x%l汽笛;#00ffc040;còi hơi nước%l;#;, rõ!\n\\x%l集煙装置;#00ffc040;Thiết bị gom khói%l;#;, mở nắp!」"
# 【日々姫】
# display as 日日姬
# JP: 「\x%l集煙装置;#00ffc040;集煙装置%l;#;、フタ開け――良し！」
1200 = "「\\x%l集煙装置;#00ffc040;Thiết bị gom khói%l;#;, mở nắp——rõ!」"
# monologue
# JP: 声と同時に、体を乗り出すようにして、\n日々姫が後方確認をする。
2431 = "（Đồng thời với tiếng đáp lời, Hibiki chồm người ra ngoài,\nkiểm tra phía sau.）"
# 【双鉄】
# display as 雙鐵
# JP: 「どうだ？」
1626 = "「Thế nào?」"
# 【日々姫】
# display as 日日姬
# JP: 「大丈夫、煙、全然かかってなかった」
1636 = "「Ổn rồi, khói không bay vào đó chút nào đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば今日も、第一関門は無事クリアだな」
1444 = "「Vậy là hôm nay cũng vượt qua ải đầu tiên trót lọt rồi nhỉ.」"
# monologue
# JP: とはいえ、無駄に\x%l汽笛;#00ffc040;汽笛%l;#;は鳴らさない。
2622 = "（Mặc dù vậy, tôi cũng không kéo \\x%l汽笛;#00ffc040;còi hơi nước%l;#; một cách vô tội vạ.）"
# monologue
# JP: [いちぶ,1]一歩廃駅を通過して、\n\x%l惰行;#00ffc040;惰行%l;#;運転に入る直前に鳴らすのが僕の習慣だ。
2318 = "（Thói quen của tôi là kéo còi ngay trước khi đi ngang qua ga bỏ hoang Ichibu,\nvà chuẩn bị chuyển sang chạy \\x%l惰行;#00ffc040;quán tính%l;#;.）"
# 【ハチロク】
# display as 八六
# JP: 「[いちぶ,1]一歩廃駅通過」
1853 = "「Đi ngang qua ga bỏ hoang Ichibu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[いちぶ,1]一歩廃駅通過、良し！」
1854 = "「Đi ngang qua ga bỏ hoang Ichibu, rõ!」"
# 【日々姫】
# display as 日日姬
# JP: 「後部異常無し！」
1620 = "「Phía sau không có gì bất thường!」"
# 【双鉄】
# display as 雙鐵
# JP: 「後部異常無し！」
# 1620 = "「後方無異常情況！」" 
# monologue
# JP: 速度は十分、制限時速いっぱいにまで伸びている。
2643 = "（Tốc độ đã đạt mức tối đa cho phép.）"
# monologue
# JP: （ポーーーっ！）
2738 = "（Tuúúúú!）"
# monologue
# JP: 満を持し\x%l汽笛;#00ffc040;汽笛%l;#;を響かせて、\n\x%l逆転機;#00ffc040;逆転機%l;#;を\x%lミッドギア;#00ffc040;ミッドギア%l;#;まで引きあげる。
2377 = "（Đợi đến đúng thời điểm, tôi kéo vang \\x%l汽笛;#00ffc040;còi hơi nước%l;#;,\nrồi kéo \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; lên \\x%lミッドギア;#00ffc040;tầm trung%l;#;.）"
# 【双鉄】
# display as 雙鐵
# JP: 「閉めーる！」
1880 = "「Đóng lại!」"
# monologue
# JP: \x%l喚呼;#00ffc040;喚呼%l;#;しながら、\x%l加減弁;#00ffc040;加減弁%l;#;をゆっくり閉じる。
2322 = "（Vừa \\x%l喚呼;#00ffc040;chỉ tay hô xác nhận%l;#;, tôi vừa từ từ đóng \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#; lại.）"
# monologue
# JP: \x%lバイパス弁;#00ffc040;バイパス弁%l;#;、\x%lシリンダー弁;#00ffc040;シリンダー弁%l;#;を開け、\n\x%l逆転機;#00ffc040;逆転機%l;#;を\x%l前進フルギア;#00ffc040;前進フルギア%l;#;に――
2412 = "（Mở \\x%lバイパス弁;#00ffc040;van bypass%l;#;, \\x%lシリンダー弁;#00ffc040;van xi lanh%l;#;,\nrồi chuyển \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; sang \\x%l前進フルギア;#00ffc040;cài hết số tiến%l;#;——）"
# monologue
# JP: （ガトっ）
2733 = "（Cạch!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っと」
1566 = "「Úi」"
# monologue
# JP: 妙な振動。\n\x%lカマ;#00ffc040;カマ%l;#;が悪いのかと見てみれば、日々姫も僕の方を見ている。
2180 = "（Một rung động kỳ lạ.\nTưởng \\x%lカマ;#00ffc040;lò hơi%l;#; có vấn đề, tôi nhìn sang thì thấy Hibiki cũng đang nhìn tôi.）"
# 【双鉄】
# display as 雙鐵
# JP: 「……\x%l絶気;#00ffc040;絶気%l;#;、良し」
1249 = "「……\\x%l絶気;#00ffc040;Cắt hơi%l;#;, rõ.」"
# monologue
# JP: ともかく、これでしばらくは\x%l惰行;#00ffc040;惰行%l;#;運転――\n\x%l絶気;#00ffc040;絶気%l;#;して、慣性だけでの運行だ。
2068 = "（Dù sao thì, từ giờ sẽ chạy \\x%l惰行;#00ffc040;quán tính%l;#; một lúc——\n\\x%l絶気;#00ffc040;cắt hơi%l;#;, và chỉ chạy bằng quán tính thôi.）"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
1900 = "「っ!」"
# monologue
# JP: 途端、日々姫が\x%lポーカー;#00ffc040;ポーカー%l;#;を手にとり\x%l火床;#00ffc040;火床%l;#;へ突っ込む。\n\x%l火床;#00ffc040;火床%l;#;の中を突き崩すため――
2440 = "（Ngay lập tức, Hibiki vớ lấy \\x%lポーカー;#00ffc040;móc bếp%l;#; thọc vào \\x%l火床;#00ffc040;buồng lửa%l;#;.\nĐể chọc vỡ đống than bên trong \\x%l火床;#00ffc040;buồng lửa%l;#;——）"
# monologue
# JP: つまりは、\x%l火床;#00ffc040;火床%l;#;の中で石炭が、\n不完全燃焼を起こし積み重なってしまっているのだ。
2076 = "（Nghĩa là, than bên trong \\x%l火床;#00ffc040;buồng lửa%l;#;\nđã cháy không hoàn toàn và chất đống lên nhau.）"
# 【双鉄】
# display as 雙鐵
# JP: 「やはりさっきの振動は、\x%lカマ;#00ffc040;カマ%l;#;の不良か？」
1490 = "「Quả nhiên rung động ban nãy là do \\x%lカマ;#00ffc040;lò hơi%l;#; không tốt sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「っていうか、\x%l集煙装置;#00ffc040;集煙装置%l;#;つけた影響？\nなんか最近、通風が落ち着いてくれない感じで」
1527 = "「Hay là do ảnh hưởng của việc lắp \\x%l集煙装置;#00ffc040;thiết bị gom khói%l;#; nhỉ?\nDạo này em cứ thấy thông gió không được ổn định cho lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
# 1711 = "「是嗎？」" 
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――兄さんにも、責任ありますよ？\n今日みたいに天気悪い日は、運転、荒くなりますから」
1813 = "「Anh hai——anh cũng có một phần trách nhiệm đấy nhé?\nMấy ngày thời tiết xấu như hôm nay, anh lái tàu bạo lực lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む――」
1550 = "「Hừm——」"
# monologue
# JP: 自覚は全くなかったが、\n\x%lカマ;#00ffc040;カマ%l;#;を証拠に指摘されれば、反論をする余地さえなくなる。
79 = "（Tôi hoàn toàn không tự nhận thức được điều đó,\nnhưng khi bị chỉ đích danh với bằng chứng rành rành là cái \\x%lカマ;#00ffc040;lò hơi%l;#;, thì tôi chẳng còn đường nào mà cãi.）"
# monologue
# JP: \x%l加減弁;#00ffc040;加減弁%l;#;を乱暴に扱うのなら、強烈な通風が発生し、\n\x%l火床;#00ffc040;火床%l;#;はすぐさま、滅茶苦茶に荒れてしまうものだから。
2131 = "（Bởi vì nếu thao tác \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#; thô bạo, luồng thông gió mạnh sẽ sinh ra,\nvà \\x%l火床;#00ffc040;buồng lửa%l;#; sẽ lập tức trở nên lộn xộn, rối tung.）"
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、少し気をつけてみ――」
1675 = "「Xin lỗi nhé, tôi sẽ chú ý hơn một chút——」"
# monologue
# JP: （ガトっ）
# 2733 = "（咣咚）" 
# 【日々姫】
# display as 雙鐵＆日日姬
# JP: 『「っ！？」\n「っ！？」』
1910 = "『「っ!?」\n「っ!?」』"
# monologue
# JP: 日々姫と目を見交わせて、\nついで揃って、ハチロクを見る。
2339 = "（Tôi và Hibiki đưa mắt nhìn nhau,\nrồi cùng đồng loạt quay sang nhìn Hachiroku.）"
# monologue
# JP: \x%l絶気運転;#00ffc040;絶気運転%l;#;中の振動――\nあるいは線路に、なにか異常があるのかもしれん。
94 = "（Rung động trong lúc \\x%l絶気運転;#00ffc040;chạy cắt hơi%l;#;——\nHay là trên đường ray có gì đó bất thường.）"
# 【ハチロク】
# display as 八六
# JP: 「\x%l踏面;#00ffc040;踏面%l;#;には異常感知できませんでした。\n非常停止の要は無いものと判断します」
1653 = "「Không phát hiện bất thường nào trên \\x%l踏面;#00ffc040;mặt lăn bánh xe%l;#; ạ.\nEm nhận định là không cần thiết phải dừng khẩn cấp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぬ――」
# 1550 = "「唔……」" 
# monologue
# JP: 聞くより前にもらう返事は、\nけれどもかえって僕の不安を掻き立てる。
2392 = "（Câu trả lời đưa ra trước cả khi tôi kịp hỏi,\nngược lại càng làm dấy lên nỗi bất an trong tôi.）"
# monologue
# JP: （ここのところ、\n好調続きで特に気にさえしていなかったが――）
2742 = "（Dạo gần đây,\nmọi chuyện diễn ra suôn sẻ nên tôi cũng chẳng mảy may bận tâm, nhưng——）"
# monologue
# JP: “感知できませんでした”という一言が、\nどうにもひどく引っかかる。
1162 = "（Câu nói \"Không phát hiện bất thường\",\ncứ khiến tôi lấn cấn mãi không thôi.）"
# monologue
# JP: ハチロクは自らの機能について、\n十全ではないと認めているのだ。
2150 = "（Hachiroku đang thừa nhận rằng,\nchức năng của bản thân mình không được hoàn hảo.）"
# 【双鉄】
# display as 雙鐵
# JP: 「……念のためれいなに\x%l共感;#00ffc040;共感%l;#;で位置情報を送ってくれ。\n折り返しまでに、調査をしてもらっておこう」
1241 = "「……Để cho chắc ăn, em hãy dùng \\x%l共感;#00ffc040;cộng cảm%l;#; gửi thông tin vị trí cho Reina đi.\nNhờ cô ấy đi điều tra trước khi chúng ta quay về.」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました」
1696 = "「Em hiểu rồi ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、もうすぐ」
1886 = "「Anh hai, sắp đến rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1710 = "「是啊」" 
# monologue
# JP: 日々姫の声に我に返る。\n気を散らしている余裕はなかった。
2437 = "（Giọng nói của Hibiki kéo tôi về thực tại.\nKhông có thời gian để phân tâm nữa.）"
# monologue
# JP: もうすぐ、上り勾配となる。\n\x%l絶気;#00ffc040;絶気%l;#;のままでは、力が不足してしまう。
2692 = "（Sắp đến đoạn đường dốc lên rồi.\nNếu cứ để \\x%l絶気;#00ffc040;cắt hơi%l;#; thế này thì sẽ không đủ lực mất.）"
# 【双鉄】
# display as 雙鐵
# JP: 「開けるっ！」
1670 = "「Mở ra!」"
# monologue
# JP: \x%l喚呼;#00ffc040;喚呼%l;#;しながら、逆転機を\x%lミッドギア;#00ffc040;ミッドギア%l;#;まで引き上げて、\n\x%lバイパス弁;#00ffc040;バイパス弁%l;#;を閉め、\x%l加減弁;#00ffc040;加減弁%l;#;テコをわずかに開く。
2390 = "（Vừa \\x%l喚呼;#00ffc040;chỉ tay hô xác nhận%l;#;, tôi vừa kéo cần đảo chiều lên \\x%lミッドギア;#00ffc040;tầm trung%l;#;,\nđóng \\x%lバイパス弁;#00ffc040;van bypass%l;#; lại, và khẽ mở cần gạt \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#; ra.）"
# monologue
# JP: シリンダー排水弁を開けて閉め水を吐き出して、\n\x%l加減弁;#00ffc040;加減弁%l;#;テコをいっぱいに引き、逆転機をまた伸ばしていく。
2351 = "（Mở van xả xi lanh để đẩy nước đọng ra ngoài,\nrồi kéo cần gạt \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#; hết cỡ, và tiếp tục đẩy cần đảo chiều lên.）"
# monologue
# JP: （シュッ！　シュッ！　シュッ！　シュッ！）
2734 = "（Xịch! Xịch! Xịch! Xịch!）"
# monologue
# JP: \x%lブラスト;#00ffc040;ブラスト%l;#;の力強い響きとともに、蒸気が\x%l動輪;#00ffc040;動輪%l;#;を回し始める。
2104 = "（Cùng với tiếng \\x%lブラスト;#00ffc040;khí thải xi lanh%l;#; mạnh mẽ, hơi nước bắt đầu làm quay \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;.）"
# monologue
# JP: 雨で、上りで、満席だ。
2244 = "（Trời mưa, dốc lên, và kín chỗ.）"
# monologue
# JP: （くっ）
2732 = "（Hự）"
# monologue
# JP: \x%l砂撒き;#00ffc040;砂撒き%l;#;コックを手早く繰ってすぐ戻し、\n\x%l動輪;#00ffc040;動輪%l;#;前方に砂を撒く。
2353 = "（Tôi nhanh chóng vặn van \\x%l砂撒き;#00ffc040;phun cát%l;#; rồi đóng lại ngay,\nphun một ít cát ra phía trước \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;.）"
# 【ハチロク】
# display as 八六
# JP: 「\x%l粘着力;#00ffc040;粘着力%l;#;十分――このまま、登りきりましょう」
1193 = "「\\x%l粘着力;#00ffc040;Lực bám đường%l;#; đã đủ——Cứ thế này, hãy leo lên dốc thôi ạ.」"
# monologue
# JP: 砂は当然に摩擦を増すので、\n\x%l粘着力;#00ffc040;粘着力%l;#;――\x%l動輪;#00ffc040;動輪%l;#;が線路を捕まえる力も増加する。
2481 = "（Cát đương nhiên sẽ làm tăng ma sát,\nnên \\x%l粘着力;#00ffc040;lực bám đường%l;#;——lực bám của \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; vào đường ray cũng tăng theo.）"
# monologue
# JP: （シュっ、シュっ、シュっ、シュっ）
2735 = "（Xịch, xịch, xịch, xịch）"
# monologue
# JP: \x%l動輪;#00ffc040;動輪%l;#;が\x%l空転;#00ffc040;空転%l;#;を起こしてしまえば、\x%l制動;#00ffc040;制動%l;#;さえも効かなくなる。
2266 = "（Nếu để \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; xảy ra hiện tượng \\x%l空転;#00ffc040;quay trơn bánh xe%l;#;,\nthì ngay cả \\x%l制動;#00ffc040;hãm phanh%l;#; cũng sẽ trở nên vô tác dụng.）"
# monologue
# JP: \x%l自弁;#00ffc040;自弁%l;#;と加減弁テコに、いつでも力を加えられるよう、\n力まず、柔らかく備えておく。
2497 = "（Tôi chuẩn bị sẵn sàng một cách nhẹ nhàng, không gồng cứng người,\nđể có thể tác dụng lực lên \\x%l自弁;#00ffc040;van hãm tự động%l;#; và cần gạt van tiết lưu hơi bất cứ lúc nào.）"
# monologue
# JP: （ガトっ）
# 2733 = "（咣咚）" 
# monologue
# JP: また、だ。
2191 = "（Lại nữa rồi.）"
# monologue
# JP: あのささやかな――\nけれど、確かに感じる振動。
2680 = "（Rung động nho nhỏ đó——\nnhưng tôi cảm nhận được rất rõ ràng.）"
# monologue
# JP: （ハチロクは……何もいわんか）
2721 = "（Hachiroku... không nói gì sao?）"
# monologue
# JP: 同じことが三度重なれば、\n違和感と疑問とは、一つの形にまとまっていく。
2218 = "（Nếu cùng một chuyện lặp lại đến ba lần,\nthì sự khác lạ và nghi ngờ sẽ gộp lại thành một hình thù rõ rệt.）"
# monologue
# JP: が……いまはとにかく集中だ。\nこの勾配を登りきらねば、会話ひとつも交わせない。
2071 = "（Nhưng... bây giờ cứ tập trung đã.\nNếu không leo hết con dốc này, thì một chữ cũng chẳng thốt ra nổi.）"
# monologue
# JP: （ボッ、ボッ、ボッ、ボッ）
2736 = "（Bụp, bụp, bụp, bụp）"
# monologue
# JP: 機関車があえいでいるような排気音。\n\x%lカマ;#00ffc040;カマ%l;#;はまだ、整えきれてないようだ。
2452 = "（Tiếng xả khí nghe như tiếng thở dốc của đầu máy.\nCó vẻ như \\x%lカマ;#00ffc040;lò hơi%l;#; vẫn chưa được điều chỉnh ổn định.）"
# monologue
# JP: （どうにも今日はうまくいかんな）
2719 = "（Hôm nay mọi chuyện cứ không được suôn sẻ cho lắm nhỉ.）"
# monologue
# JP: 客席の方は順調だろうか。
2064 = "（Không biết bên khoang hành khách có ổn không.）"
# monologue
# JP: 非常ブザーが鳴っていなくとも、\n小さなトラブルはあるかもしれん。
2586 = "（Dù chuông báo khẩn cấp không reo,\nnhưng có thể vẫn có những rắc rối nhỏ xảy ra.）"
# monologue
# JP: （まぁ、もうすぐ湯医――携帯ももう通じる範囲だ。\nもしも何かあったのなら、永山夫人が知らせてくれよう）
2726 = "（Mà, sắp đến Yui rồi——cũng sắp vào vùng có sóng điện thoại rồi.\nNếu có chuyện gì, chắc phu nhân Nagayama sẽ báo cho mình biết thôi.）"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　\x%l雨三本;#00ffc040;[あめさんぼん,2]雨三本%l;#;ですっ！」
1895 = "「Ngài Soutetsu! \\x%l雨三本;#00ffc040;Lễ hội mưa%l;#; ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ！　制限60――！」
1538 = "「——っ! Giới hạn 60——!」"
# monologue
# JP: \x%l雨三本;#00ffc040;雨三本%l;#;、雨降りの日のブレーキは、\nレールの繋ぎ目３つ分、早めにかける必要がある。
101 = "（\\x%l雨三本;#00ffc040;Lễ hội mưa%l;#;, vào những ngày trời mưa,\ncần phải hãm phanh sớm hơn bình thường khoảng 3 nhịp nối đường ray.）"
# monologue
# JP: ハチロクの声と同時に圧をかけ――
2593 = "（Đồng thời với tiếng gọi của Hachiroku, tôi tăng áp suất——）"
# 【双鉄】
# display as 雙鐵
# JP: 「良しっ！」
1584 = "「Được rồi!」"
# monologue
# JP: 良くない。本当にギリギリだった。
2177 = "（Không được. Thực sự là quá sát nút.）"
# monologue
# JP: ハチロクの注意がもしもなければ、\n完全に、速度超過をしてしまっていた。
2267 = "（Nếu không có lời nhắc nhở của Hachiroku,\nthì chắc chắn tôi đã chạy quá tốc độ mất rồi.）"
# monologue
# JP: （なるほど……これか）
2723 = "（Ra vậy... là thế này sao.）"
# monologue
# JP: 悪天候の日には運転が荒くなる。
2234 = "（Vào những ngày thời tiết xấu, thao tác lái của tôi trở nên thô bạo hơn.）"
# monologue
# JP: 日々姫の指摘が真実だったと、\nまさしく体感で思い知る。
2337 = "（Tôi đã thực sự cảm nhận được bằng chính cơ thể mình,\nrằng lời nhắc nhở của Hibiki là hoàn toàn chính xác.）"
# 【双鉄】
# display as 雙鐵
# JP: 「――新[つるは,1]弦羽廃駅、通過、良し！」
1218 = "「——Đi ngang qua ga bỏ hoang Tân Tsuruha, rõ!」"
# monologue
# JP: 今はともかく、何事もなく湯医駅まで持っていくこと。\nそれだけに、気持ちの全てを集中させる。
2518 = "（Bây giờ cứ gác lại đã, phải đưa tàu đến ga Yui an toàn.\nTôi dồn toàn bộ tâm trí vào việc đó.）"
# monologue
# JP: 集中させよう――と、思うのに――
2348 = "（Phải tập trung thôi——tôi tự nhủ như vậy, nhưng——）"
# monologue
# JP: （くそっ）
2729 = "（Chết tiệt）"
# monologue
# JP: 前方窓にぶつかってくる雨音が、\nどうにも耳障りで仕方ない。
2677 = "（Tiếng mưa đập vào cửa sổ phía trước,\nnghe thật chói tai, khó chịu vô cùng.）"
# monologue
# JP: 鼓膜の上にちりちりと、\n小虫が這いまわっているようで。
2588 = "（Cứ như có hàng ngàn con bọ nhỏ xíu\nđang bò lổm ngổm trên màng nhĩ vậy.）"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l制動;#00ffc040;制動%l;#;――コンマ[ハチ]８」
1188 = "「\\x%l制動;#00ffc040;Hãm phanh%l;#;——0.8.」"
# monologue
# JP: だから、普段にはしない\x%l喚呼;#00ffc040;喚呼%l;#;も、あえてする。\n今日はうまく回っていないと既に明らかになった以上――
2231 = "（Thế nên, tôi cố tình thực hiện những tiếng \\x%l喚呼;#00ffc040;chỉ tay hô xác nhận%l;#; mà bình thường tôi chẳng bao giờ làm.\nMột khi đã rõ ràng là hôm nay mọi chuyện không được suôn sẻ——）"
# monologue
# JP: 声を出し、ハチロクと日々姫の目と耳も借り、\nキャブ内で相互に、お互いを確かめ合っていく他に無い。
2666 = "（Thì chẳng còn cách nào khác ngoài việc cất cao giọng, mượn ánh mắt và đôi tai của Hachiroku cùng Hibiki,\nđể chúng tôi tương tác, hỗ trợ lẫn nhau trong buồng lái.）"
# monologue
# JP: （そうだ。僕らはチームなんだ）
2740 = "（Đúng vậy. Chúng tôi là một đội mà.）"
# monologue
# JP: 良い部分も、悪い部分も、共有しあい、支えあう。\nこの先もそうしていくために――
2292 = "（Cùng nhau chia sẻ, nâng đỡ nhau cả những lúc tốt đẹp lẫn tồi tệ.\nĐể có thể tiếp tục bước tiếp trên chặng đường phía trước——）"
# monologue
# JP: （ボーーーーーーーーっ！）
# 2738 = "（嗚——！）" 
# monologue
# JP: 思い切り良く\x%l汽笛;#00ffc040;汽笛%l;#;を響かせ、\nこの雨音を鼓膜の中から――記憶の傷から、吹き飛ばす。
2365 = "（Tôi kéo vang \\x%l汽笛;#00ffc040;còi hơi nước%l;#; thật dứt khoát,\nthổi bay tiếng mưa rào rạt khỏi màng nhĩ——và cả những vết thương trong ký ức.）"
# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;まで\x%l8620;#00ffc040;8620%l;#;を連れて戻れば、\nポーレットが待っていてくれる。
2334 = "（Nếu đưa \\x%l8620;#00ffc040;8620%l;#; trở về \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;,\nPaulette sẽ ở đó đợi chúng tôi.）"
# monologue
# JP: その表情は、雨雲さえもはらえそうなほど、晴れやかだ。
2259 = "（Vẻ mặt rạng rỡ của cô ấy, như thể có thể xua tan đi cả những đám mây đen kịt.）"
# 【ポーレット】
# display as 波萊特
# JP: 「ナビちゃんから連絡受け取ってます。\n今日も煙、踏切屋さんに全然かかってなかったそうです」
1646 = "「Tôi nhận được liên lạc từ Navi rồi.\nHôm nay khói cũng hoàn toàn không bay vào cửa hàng Fumikiriya đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なによりだ」
1580 = "「Tốt quá rồi.」"
# monologue
# JP: 装着以来、\x%l集煙装置;#00ffc040;集煙装置%l;#;は、確かな仕事をしてくれている。\nこの調子ならクレームは、再発せずに済みそうだ。
99 = "（Kể từ khi lắp đặt, \\x%l集煙装置;#00ffc040;thiết bị gom khói%l;#; đã làm rất tốt nhiệm vụ của mình.\nCứ đà này thì có vẻ như sẽ không còn khiếu nại nào nữa.）"
# monologue
# JP: （とはいえ……またぞろ金が掛かってしまった）
2745 = "（Dù vậy... lại tốn thêm một khoản tiền nữa rồi.）"
# monologue
# JP: 助士を一人雇入れての、２チーム体制への移行……
2333 = "（Thuê thêm một phụ lái, chuyển sang hệ thống 2 đội...）"
# monologue
# JP: できれば早く願いたいのだが、\nこうも改修がつづいては――っと。
2204 = "（Tôi muốn thực hiện càng sớm càng tốt,\nnhưng cứ phải sửa chữa liên tục thế này thì——à.）"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。報告をいれた、異常振動のことなのだが」
1593 = "「Đúng rồi. Về vụ rung động bất thường mà tôi đã báo cáo ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それについては[せき]堰さんに行ってもらいました。\n線路には、特段の異常はなかったそうです」
1569 = "「Về chuyện đó thì tôi đã nhờ ông Seki đi kiểm tra rồi.\nÔng ấy bảo đường ray không có gì bất thường cả.」"
# monologue
# JP: ……ふかみの祖父たち、堰さんとそのご兄弟とは、\n水と土との専門家だ。
1178 = "（……Ông nội của Fukami, ông Seki và anh em của ông ấy,\nlà những chuyên gia về nước và đất.）"
# monologue
# JP: その\x%l保線;#00ffc040;保線%l;#;技術の確かさは、ハチロクも認める域にある。
2282 = "（Kỹ năng \\x%l保線;#00ffc040;bảo trì đường ray%l;#; vững chắc của họ, ngay cả Hachiroku cũng phải công nhận.）"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば安心だな。\n手間をかけてすまなかった。ありがとう」
1870 = "「Vậy thì yên tâm rồi.\nXin lỗi vì đã làm phiền cô. Cảm ơn nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いいえ、\x%l保線;#00ffc040;保線%l;#;は鉄道の生命線のひとつですから。\n小さなことも、報告してもらえた方が助かります」
1741 = "「Không đâu, \\x%l保線;#00ffc040;bảo trì đường ray%l;#; là một trong những mạch máu của đường sắt mà.\nDù là chuyện nhỏ nhặt nhất, được báo cáo lại thì vẫn giúp ích rất nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そういってもらえると気が休まる」
1235 = "「……Nghe cô nói vậy tôi cũng thấy nhẹ nhõm phần nào.」"
# monologue
# JP: が……\n線路に異常が無いのなら、異常は他にあることになる。
2201 = "（Nhưng...\nNếu đường ray không có bất thường, thì sự bất thường phải nằm ở chỗ khác.）"
# 【ポーレット】
# display as 波萊特
# JP: 「あれ？」
# 1565 = "「嗯？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1900 = "「！」" 
# monologue
# JP: 青い瞳が近寄ってくる。\n大きく、まっすぐ――全てを見通しそうな瞳が。
2491 = "（Đôi mắt xanh biếc tiến lại gần.\nTo, tròn, và nhìn thẳng——đôi mắt như nhìn thấu mọi thứ.）"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、なんか、心配事ですか？\n元気、無いみたいに見えますけど」
1893 = "「Soutetsu, anh đang lo lắng chuyện gì sao?\nTrông anh có vẻ không được khỏe.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん。\nそうだな、気がかりはある」
1555 = "「À... ừm.\nĐúng là tôi có chút bận tâm.」"
# monologue
# JP: ポーレットには、嘘は吐けない。\nまして、安全にもかかわることだ。
2361 = "（Tôi không thể nói dối Paulette được.\nHuống hồ, chuyện này còn liên quan đến an toàn nữa.）"
# 【双鉄】
# display as 雙鐵
# JP: 「気がかりはあるのだが、まだ確認がとれていない。\n確認が取れ次第に、報告させてもらいたく思う」
1519 = "「Có chút bận tâm, nhưng tôi vẫn chưa xác nhận được.\nNgay khi xác nhận xong, tôi muốn báo cáo lại với cô.」"
# 【ポーレット】
# display as 波萊特
# JP: 「――わかりました！」
1212 = "「——Tôi hiểu rồi!」"
# monologue
# JP: 何も尋ねず、\nポーレットは笑顔をくもらさぬまま、頷いてくれる。
2490 = "（Không hỏi thêm lời nào,\nPaulette gật đầu, nụ cười vẫn không hề vụt tắt.）"
# 【ポーレット】
# display as 波萊特
# JP: 「それじゃ、報告待ってます。\n何もなければ、それがきっと一番ですけど」
1872 = "「Vậy, tôi đợi báo cáo của anh nhé.\nTất nhiên, nếu không có chuyện gì xảy ra thì vẫn là tốt nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1710 = "「是啊」" 
# monologue
# JP: 臆病で引っ込み思案でも、\nポーレットは本質的にリーダーなのだと、つくづく感じる。
2670 = "（Dù có nhút nhát và hay rụt rè,\nnhưng tôi thực sự cảm thấy Paulette bản chất vẫn là một người lãnh đạo.）"
# monologue
# JP: わずかな言葉を交わしただけで、\nぐしゃぐしゃしていた気持ちをいくらか、解してもらえた。
2126 = "（Chỉ vài câu trao đổi ngắn ngủi,\nđã giúp tôi gỡ rối phần nào mớ cảm xúc rối bời trong lòng.）"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　話が終わったなら、手伝って！」
1884 = "「Anh hai! Nói chuyện xong rồi thì ra giúp em một tay với!」"
# monologue
# JP: \x%l運転台;#00ffc040;運転台%l;#;の中から日々姫の、少し怒ったような声。\n恐らく\x%l火床;#00ffc040;火床%l;#;が、よほどひどく固まってしまったのだろう。
2294 = "（Từ trong \\x%l運転台;#00ffc040;buồng lái%l;#; vọng ra giọng nói có phần bực bội của Hibiki.\nChắc hẳn \\x%l火床;#00ffc040;buồng lửa%l;#; đã bị đóng cục nghiêm trọng lắm rồi.）"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった、すぐに」
1586 = "「Biết rồi, ra ngay đây.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、わたし行きます。\n大丈夫。ちゃんと手伝えますから」
1557 = "「A, để tôi đi cho.\nKhông sao đâu. Tôi giúp được mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかし――」
1520 = "「Không, nhưng mà——」"
# 【ポーレット】
# display as 波萊特
# JP: 「大事なときに使えるように、\n時間、作ってもらえてるのわかってますから」
1659 = "「Tôi biết anh cố tình tạo ra khoảng thời gian này,\nđể tôi có thể sử dụng vào lúc quan trọng mà.」"
# monologue
# JP: 笑って、言って。\nポーレットはもう歩き出してる。
2492 = "（Cười, và nói.\nPaulette đã bước đi.）"
# 【ポーレット】
# display as 波萊特
# JP: 「で、今がきっと――\nその“大事なとき”ですよね？」
1781 = "「Và, bây giờ chắc chắn là——\n\"lúc quan trọng\" đó đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまない」
1708 = "「Ừ, xin lỗi nhé.」"
# monologue
# JP: 確かにそうだ。\nだから素直に、言葉に甘える。
2261 = "（Đúng là vậy.\nNên tôi ngoan ngoãn đón nhận lòng tốt của cô ấy.）"
# 【双鉄】
# display as 雙鐵
# JP: 「――良し」
1211 = "「——Được rồi.」"
# monologue
# JP: 覚悟を決めて一歩踏み出す。\n姿の見えぬハチロクが、どこにいるかの想像はつく。
2325 = "（Chuẩn bị tinh thần, tôi bước lên một bước.\nTôi có thể đoán được Hachiroku đang ở đâu, dù không thấy bóng dáng cô ấy.）"
# monologue
# JP: その想像が外れていれば、\n僕の懸念は、恐らく杞憂で済むのだ、が――
2271 = "（Nếu dự đoán của tôi sai,\nthì nỗi lo của tôi có lẽ chỉ là lo bò trắng răng, nhưng——）"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。やはりここか」
1480 = "「Hachiroku. Quả nhiên em ở đây.」"
# 【ハチロク】
# display as 八六
# JP: 「あ――双鉄様」
1556 = "「A——ngài Soutetsu.」"
# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;の床の穴。\n下からの整備をするために、掘られた“\x%lピット;#00ffc040;ピット%l;#;”。
89 = "（Cái hố trên sàn \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#;.\n\"\\x%lピット;#00ffc040;Hố kiểm tra%l;#;\" được đào để bảo dưỡng từ bên dưới.）"
# monologue
# JP: 整備ボディのハチロクは、\nその中にもぐって、\x%l8620;#00ffc040;8620%l;#;の下腹を見上げている。
2154 = "Hachiroku trong hình dáng thân chính đã chui vào bên trong,\nvà đang ngước nhìn phần gầm của \\x%l8620;#00ffc040;8620%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「異常振動の原因は、足回りか？」
1784 = "「Nguyên nhân của sự rung lắc bất thường là do bộ phận chuyển động sao?」"
# monologue
# JP: 思ったことをそのまま言えば、\nハチロクはぎくりと動きを止める。
2355 = "Nghe tôi nói thẳng suy nghĩ của mình,\nHachiroku giật mình khựng lại."
# 【ハチロク】
# display as 八六
# JP: 「それは……」
1844 = "「Chuyện đó……」"
# 【双鉄】
# display as 雙鐵
# JP: 「以前からあったものだよな。\n今日ほどの頻発は、恐らく初めてのこととはなるが」
1848 = "「Trước đây cũng từng bị rồi nhỉ.\nNhưng có lẽ đây là lần đầu tiên nó xảy ra thường xuyên như hôm nay.」"
# monologue
# JP: 今日、何回も重なったから、\nそれが明確な違和感だと気づけた。
2093 = "Hôm nay nó đã xảy ra liên tục nhiều lần,\nnên tôi mới nhận ra sự bất thường rõ rệt đó."
# monologue
# JP: 今まであった不意の振動のいくらかは、\n恐らく同じ原因で、発生していたものであろうとも。
2311 = "Có lẽ một vài rung lắc bất ngờ từ trước đến nay,\ncũng là do cùng một nguyên nhân gây ra."
# 【双鉄】
# display as 雙鐵
# JP: 「機関車側に何かある――\nハチロクも、それを疑っているのだよな？」
1474 = "「Có vấn đề gì đó ở phía đầu máy hơi nước――\nEm cũng đang nghi ngờ điều đó đúng không, Hachiroku?」"
# 【ハチロク】
# display as 八六
# JP: 「はい……」
1718 = "「Vâng……」"
# monologue
# JP: ハチロクは僕を見ようとしない。\nならばもう、“疑い”の域を超えた問題なのかもしれない。
2139 = "Hachiroku không chịu nhìn tôi.\nNếu vậy, có lẽ vấn đề đã vượt quá mức \"nghi ngờ\" rồi."
# monologue
# JP: が、そうであるならそうであるほど、\n当然に、早期対処をするべきなのだ。
2418 = "Nhưng nếu càng như vậy,\nthì đương nhiên càng phải xử lý sớm."
# 【双鉄】
# display as 雙鐵
# JP: 「もしもお前が原因を特定しきれないなら、\n改修を手伝ってくれた技師さんにでも――」
1824 = "「Nếu em không thể xác định chính xác nguyên nhân,\nthì chúng ta có thể nhờ kỹ sư đã giúp cải tạo――」"
# 【ハチロク】
# display as 八六
# JP: 「いえ……\n原因でしたら、特定できております」
1432 = "「Không ạ……\nNếu là nguyên nhân thì, em đã xác định được rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1901 = "「！？」" 
# monologue
# JP: やっと、ハチロクが僕を見る。
2164 = "Cuối cùng, Hachiroku cũng nhìn tôi."
# monologue
# JP: その目には、見たことの無い寂しい色が――\n恐らく、諦めという名の色が、張り付いている。
2257 = "Trong ánh mắt đó hiện lên một nỗi buồn mà tôi chưa từng thấy――\nCó lẽ, đó là ánh mắt của sự cam chịu."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ……それほど、悪いのか？」
1634 = "「Sao vậy…… Tình hình tệ đến mức đó ư?」"
# 【ハチロク】
# display as 八六
# JP: 「原因は特定できておりますし――\n双鉄様のお目にもすでに、映っております」
1498 = "「Em đã xác định được nguyên nhân rồi――\nVà nó cũng đã lọt vào mắt ngài Soutetsu rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 1565 = "「嗯？」" 
# monologue
# JP: そのままハチロクを確認するが、\n表情と瞳以外には、それほど変わった様子は見えない。
2381 = "Tôi cứ thế quan sát Hachiroku,\nnhưng ngoài biểu cảm và ánh mắt ra, tôi không thấy có gì khác thường."
# monologue
# JP: ならばと\x%l8620;#00ffc040;8620%l;#;を改めて見る。\n\x%lピット;#00ffc040;ピット%l;#;から見上げていたのだから、まず下回り――
2393 = "Nghĩ vậy, tôi nhìn lại \\x%l8620;#00ffc040;8620%l;#; một lần nữa.\nVì đang ngước nhìn từ dưới \\x%lピット;#00ffc040;hố kiểm tra%l;#; lên, nên trước tiên là phần gầm――"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1546 = "「Hả?」"
# monologue
# JP: 見えている。\n見えていた。
2534 = "Tôi thấy rồi.\nTôi vẫn luôn nhìn thấy nó."
# monologue
# JP: 見えていたから、気付かなかった。\nいや――本当に気付けている、の、か――
2279 = "Chính vì luôn nhìn thấy nên tôi mới không nhận ra.\nKhông――Tôi thực sự đã nhận ra, rồi, sao――"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1649 = "「Ra vậy」"
# monologue
# JP: （パシャっ）
2737 = "（Tách）"
# monologue
# JP: ポケットから取り出すカメラで、一枚を撮る。
2347 = "Tôi lấy máy ảnh từ trong túi ra và chụp một tấm."
# monologue
# JP: 機関庫の端につんであるファイルを抜き取って、\n改修直後の\x%l8620;#00ffc040;8620%l;#;の写真と、比較する――――っ！
2410 = "Tôi rút một tập hồ sơ xếp ở góc xưởng đầu máy ra,\nvà so sánh với bức ảnh của \\x%l8620;#00ffc040;8620%l;#; ngay sau khi cải tạo――――っ!"
# 【双鉄】
# display as 雙鐵
# JP: 「……[ゆが]歪んでいる――だと」
1238 = "「……Bị cong――sao.」"
# monologue
# JP: 目の錯覚だと思いたい。\nレンズの特性だと思いたい。
2345 = "Tôi muốn tin rằng đó chỉ là ảo giác.\nTôi muốn tin rằng đó là do đặc tính của ống kính."
# monologue
# JP: が、それを許してくれぬほど、\n歪みは、大きく明確だ。
2113 = "Nhưng độ cong lại lớn và rõ ràng đến mức,\nkhông cho phép tôi nghĩ như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「なぜ……これほど――こんなになる、まで」
1762 = "「Tại sao…… lại đến mức này――cho đến khi thành ra thế này.」"
# 【ハチロク】
# display as 八六
# JP: 「日々、わずかずつ――\n本当にわずかずつの歪みだったのでしょう」
1830 = "「Mỗi ngày một chút――\nChắc chắn nó chỉ cong đi một chút xíu thôi ạ.」"
# monologue
# JP: 巨大なものの、わずかな歪み。\n例えばそれは、象の背中へと乗せる藁。
2291 = "Sự biến dạng nhỏ nhoi của một vật thể khổng lồ.\nVí dụ như, cọng rơm đè lên lưng voi."
# 【ハチロク】
# display as 八六
# JP: 「巨大さ故に気づけぬそれは、\nわずかずつわずかずつ積み重なって……」
1567 = "「Chính vì sự khổng lồ nên chúng ta không thể nhận ra,\nnó cứ tích tụ dần từng chút, từng chút một……」"
# 【双鉄】
# display as 雙鐵
# JP: 「目に見えるほどになったときには、\n巨大な歪みと育ってしまっているわけか」
1757 = "「Đến khi có thể nhìn thấy bằng mắt thường,\nthì nó đã phát triển thành một độ cong khổng lồ rồi sao.」"
# monologue
# JP: 藁でさえ無数に積み重なるなら、\n象の背骨をひしゃげさせよう。
2573 = "Ngay cả rơm rạ nếu chất đống vô số,\ncũng sẽ làm gãy xương sống của con voi."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;のどこかにかかった、小さな負荷も、\nやがて底面を歪ませるほど、重なり続けてしまったのだ。
2117 = "Những tải trọng nhỏ nhoi đè lên một nơi nào đó của \\x%l8620;#00ffc040;8620%l;#;,\ncũng đã liên tục tích tụ đến mức làm cong cả mặt đáy."
# 【双鉄】
# display as 雙鐵
# JP: 「歪み……というか、これは、“捻じれ”か？」
1617 = "「Cong…… hay nói đúng hơn, đây là \"xoắn\" sao?」"
# 【ハチロク】
# display as 八六
# JP: 「単純な損傷ではございません。\n複合的に――歪み、ねじれ、ひずんでいるのです」
1845 = "「Đó không phải là một hư hỏng đơn thuần ạ.\nNó là sự kết hợp phức tạp của――cong, xoắn và biến dạng.」"
# monologue
# JP: 思わずもれたつぶやきに、\n力のこもらぬ言葉が、返る。
2147 = "Đáp lại tiếng lẩm bẩm vô tình thốt ra của tôi,\nlà một câu nói yếu ớt."
# 【ハチロク】
# display as 八六
# JP: 「恐らくは、あの事故のとき――\n目に見えぬ傷が残ったのです」
1630 = "「Có lẽ, từ vụ tai nạn lần đó――\nĐã để lại những vết thương không thể nhìn thấy bằng mắt thường.」"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を大破させ、ハチロクを眠りに至らせた事故。
2663 = "Vụ tai nạn đã phá hủy hoàn toàn \\x%l8620;#00ffc040;8620%l;#;, khiến Hachiroku chìm vào giấc ngủ."
# monologue
# JP: 確かに、それほどの破壊がなければ、\nこの歪みの、端緒とさえもなれないだろう。
2273 = "Quả thực, nếu không có sức tàn phá cỡ đó,\nthì thậm chí còn không thể tạo ra mầm mống cho sự biến dạng này."
# 【ハチロク】
# display as 八六
# JP: 「目に見えず、検査でも確認できない傷は、\nけれど力の、不正な逃げ場となったのでしょう」
1863 = "「Những vết thương không thể nhìn thấy và cũng không thể xác nhận qua kiểm tra,\nđã trở thành lối thoát sai lệch cho các lực tác động.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それが――蓄積されて、歪んだ」
1691 = "「Và chúng――tích tụ lại, gây ra sự biến dạng.」"
# monologue
# JP: いくつもの箇所でそれが起き。
2656 = "Điều đó đã xảy ra ở nhiều vị trí khác nhau."
# monologue
# JP: ちいさな捻じれと歪みとひずみは、\n相互に影響を与え合い――
2081 = "Những vết xoắn, cong và biến dạng nhỏ,\nđã tác động qua lại lẫn nhau――"
# 【ハチロク】
# display as 八六
# JP: 「そうでもなければ\x%l台枠;#00ffc040;台枠%l;#;が……\nここまで変形してしまうなど、ありえません」
1817 = "「Nếu không thì \\x%l台枠;#00ffc040;khung gầm%l;#;……\nkhông thể nào biến dạng đến mức này được ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
# 1900 = "「！」" 
# monologue
# JP: やはり、か。やはり、\x%l台枠;#00ffc040;台枠%l;#;自体か。\nわかっていたが、どうしても認めたくはなかった。
2578 = "Quả nhiên là vậy sao. Quả nhiên là do bản thân \\x%l台枠;#00ffc040;khung gầm%l;#; sao.\nTôi đã lờ mờ đoán được, nhưng dù thế nào cũng không muốn thừa nhận."
# monologue
# JP: \x%l台枠;#00ffc040;台枠%l;#;は、車輌の土台にして背骨。\n歪みが即ち、全ての部位の弱さに、危険に繋がってしまう。
83 = "\\x%l台枠;#00ffc040;Khung gầm%l;#; là nền tảng và xương sống của toa xe.\nSự biến dạng của nó đồng nghĩa với việc mọi bộ phận đều trở nên yếu ớt, dẫn đến nguy hiểm."
# 【双鉄】
# display as 雙鐵
# JP: 「重すぎる\x%l客車;#00ffc040;客車%l;#;を引かせたせい――\n追加装備を、どんどん重ねてしまったせいか」
1716 = "「Là do tôi đã bắt em kéo \\x%l客車;#00ffc040;toa hành khách%l;#; quá nặng――\nHay là do tôi đã liên tục gắn thêm các trang bị bổ sung sao.」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、双鉄様。歪みは最初からあったのです。\nそれに、わたくしたちが気づけていなかっただけのこと」
1441 = "「Không đâu ạ, ngài Soutetsu. Sự biến dạng đã có ngay từ đầu rồi.\nChỉ là, chúng ta đã không nhận ra nó mà thôi.」"
# monologue
# JP: ハチロクの声に、慰めるような響きはない。\nただ淡々と、事実を述べているだけの口調だ。
2137 = "Trong giọng nói của Hachiroku không hề có âm hưởng của sự an ủi.\nChỉ là một giọng điệu đều đều, trần thuật lại sự thật."
# 【ハチロク】
# display as 八六
# JP: 「歪みに気づけていない方が、よほど恐ろしい……\n重量増や追加装備は、危険を明らかにしてくれたのです」
1822 = "「Việc không nhận ra sự biến dạng mới thực sự đáng sợ……\nViệc tăng trọng lượng và các trang bị bổ sung đã giúp chúng ta thấy rõ mối nguy hiểm này.」"
# monologue
# JP: けれど、体はわなないている。\nひどい寒さを堪えるように、ずっと小刻みに震えてる。
2507 = "Thế nhưng, cơ thể em ấy lại đang run rẩy.\nRun lên từng đợt như đang phải chịu đựng cái lạnh thấu xương."
# monologue
# JP: ならば、決断は僕が下そう。
2660 = "Nếu vậy, tôi sẽ là người đưa ra quyết định."
# 【双鉄】
# display as 雙鐵
# JP: 「だとしても、だ」
1602 = "「Cho dù là vậy đi nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「[けんざいか,2]顕在化している危険なら対処をすれば良いだけです。\nそしてわたくしにはそれが出来ます」
1692 = "「Nếu mối nguy hiểm đã hiện rõ thì chúng ta chỉ cần xử lý nó thôi ạ.\nVà em có thể làm được điều đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1901 = "「！？」" 
# monologue
# JP: ハチロクが早口になっている。\n僕に話させたくないかのように、次々、言葉を重ねてく。
2162 = "Hachiroku nói nhanh hơn.\nNhư thể không muốn để tôi lên tiếng, em ấy liên tục tuôn ra những lời lẽ."
# 【ハチロク】
# display as 八六
# JP: 「[ゆのい,1]湯医線は負荷の少ない路線です。\n振動は機関車側にしか出ずに済みます」
1755 = "「Tuyến Yui là tuyến đường có tải trọng thấp.\nĐộ rung lắc sẽ chỉ xuất hiện ở phía đầu máy hơi nước thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――ハチロク」
1470 = "「Chuyện đó――Hachiroku.」"
# monologue
# JP: ありえない。\nそう思うからこそ、あえて尋ねる。
2473 = "Không thể nào.\nChính vì nghĩ như vậy, nên tôi mới dám hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「まさかこのまま――この\x%l8620;#00ffc040;[ハチロク,3]8620%l;#;で、\n営業運転をするといっているのではあるまいな」
1462 = "「Chẳng lẽ em định――dùng chiếc \\x%l8620;#00ffc040;8620%l;#; này,\nđể tiếp tục chạy thương mại sao?」"
# 【ハチロク】
# display as 八六
# JP: 「あと１、２年は、\n\x%l8620;#00ffc040;[この子,3]8620%l;#;もわたくしも、保つ筈です」
1640 = "「Khoảng 1, 2 năm nữa,\ncả \\x%l8620;#00ffc040;8620%l;#; và em đều sẽ trụ được ạ.」"
# monologue
# JP: 真正面から答えぬままにハチロクは、\n僕の問いかけを肯定する。
2130 = "Không trả lời trực diện, Hachiroku\nđã ngầm khẳng định câu hỏi của tôi."
# 【ハチロク】
# display as 八六
# JP: 「それだけの時間があれば、\n工場誘致を撤回させることが出来ましょう」
1834 = "「Chỉ cần có ngần ấy thời gian,\nchúng ta sẽ có thể khiến họ rút lại quyết định mời gọi nhà máy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1900 = "「！」" 
# monologue
# JP: 息を呑む。
2328 = "Tôi nín thở."
# monologue
# JP: それにつられでもしたかのように、\nハチロクもゆっくり――どこか苦しげに息を吸い込む。
2149 = "Như bị kéo theo phản ứng đó,\nHachiroku cũng từ từ――hít một hơi có vẻ đau đớn."
# 【ハチロク】
# display as 八六
# JP: 「撤回にさえ追い込めば……その後じっくり時間をかけて、\n大改修をすることもできるようになるのです」
1806 = "「Chỉ cần ép họ rút lại quyết định…… sau đó chúng ta sẽ có nhiều thời gian,\nđể tiến hành đại tu toàn bộ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか」
1246 = "「À…… ra vậy.」"
# monologue
# JP: わかった。\n理解、できてしまった。
2359 = "Tôi hiểu rồi.\nTôi đã hiểu ra mất rồi."
# monologue
# JP: ハチロクが――安全を第一の義務として、\n病的なまでに危険を恐れる、ハチロクが――
2135 = "Hachiroku――người luôn coi an toàn là nghĩa vụ hàng đầu,\nngười sợ hãi sự nguy hiểm đến mức ám ảnh, Hachiroku ấy――"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、お前は……\n僕の、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なのだな」
1475 = "「Hachiroku, em là……\n\\x%lレイルロオド;#00ffc040;Railord%l;#; của tôi nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「左様です。双鉄様」
1726 = "「Đúng vậy ạ. Ngài Soutetsu.」"
# monologue
# JP: なのに、己を曲げてまで、\n無理な運行をしようとするのは……
2206 = "Thế nhưng, đến mức phải gạt bỏ nguyên tắc của bản thân,\nđể cố gắng vận hành một cách gượng ép là vì……"
# monologue
# JP: 僕の目的を成し遂げさせる、そのためだけのことなのだ。
2657 = "Chỉ là vì muốn giúp tôi đạt được mục đích mà thôi."
# 【ハチロク】
# display as 八六
# JP: 「ですので、どうか――\nわたくしと\x%l8620;#00ffc040;[この子,3]8620%l;#;をお使いください」
1662 = "「Vì vậy, xin ngài――\nhãy sử dụng em và \\x%l8620;#00ffc040;8620%l;#; đi ạ.」"
# monologue
# JP: 凛とした声。\nもはや迷いの混じらぬ瞳。
2166 = "Giọng nói lanh lảnh.\nÁnh mắt không còn chút do dự nào."
# monologue
# JP: であるというのに――\nその指先のわずかな震えは、止まらない。
2111 = "Mặc dù vậy――\nSự run rẩy nhẹ trên đầu ngón tay em ấy vẫn không hề dừng lại."
# 【ハチロク】
# display as 八六
# JP: 「壊れ、埋もれていくはずのわたくしたちに、\nふたたびの命を与えてくださったのは、双鉄様です」
1501 = "「Người đã ban cho chúng em sinh mệnh một lần nữa, khi mà chúng em\nđáng lẽ đã bị phá hủy và chôn vùi, chính là ngài Soutetsu.」"
# monologue
# JP: だから、僕には確信できる。\nハチロクには、疑いようもなく魂がある。
2228 = "Vì thế, tôi có thể khẳng định chắc chắn.\nHachiroku không nghi ngờ gì nữa, em ấy có một linh hồn."
# monologue
# JP: 理性で、頭で理解していて――\nけれど魂と身体とは、その結論に従えずにいる。
2260 = "Dù lý trí và đầu óc đã hiểu rõ――\nNhưng linh hồn và thể xác lại không thể tuân theo kết luận đó."
# 【ハチロク】
# display as 八六
# JP: 「あの美しいクマ川を、優しい御一夜の人と暮らしを――\n守り抜くため、どうぞわたくしたちを使ってください」
1761 = "「Để bảo vệ dòng sông Kuma xinh đẹp ấy, bảo vệ cuộc sống của những người dân Ohimitera hiền hòa――\nXin ngài hãy sử dụng chúng em đi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――おいで」
1482 = "「Hachiroku――lại đây.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄……様？」
1892 = "「Ngài…… Soutetsu?」"
# monologue
# JP: 機関庫の床に跪き、\n\x%lピット;#00ffc040;ピット%l;#;の中へと、両手を思い切り差し伸べる。
2385 = "Tôi quỳ xuống sàn xưởng đầu máy,\nvà dang rộng hai tay về phía trong \\x%lピット;#00ffc040;hố kiểm tra%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「くるんだ、ハチロク」
1624 = "「Lại đây nào, Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「しかし……わたくし――\nススと油とで服を汚して」
1522 = "「Nhưng mà…… em――\nquần áo em đang dính đầy muội than và dầu mỡ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も同じだ。構わんさ」
1638 = "「Tôi cũng vậy thôi. Không sao đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「は……い」
1583 = "「Vâng…… ạ.」"
# monologue
# JP: ハチロクの身体を両手で包む。\nハチロクもその手を伸ばし、僕の体に手を回す。
2397 = "Tôi ôm trọn cơ thể Hachiroku bằng hai tay.\nHachiroku cũng vươn tay ra, vòng qua người tôi."
# monologue
# JP: 僕の体にだきついてなお、\nハチロクの指のふるえは、とまらない。
2264 = "Dù đã ôm chặt lấy tôi,\nnhững ngón tay của Hachiroku vẫn không ngừng run rẩy."
# 【双鉄】
# display as 雙鐵
# JP: 「ん――」
1549 = "「Ưm――」"
# monologue
# JP: その態勢で、ハチロクを\x%lピット;#00ffc040;ピット%l;#;から引き上げる。
2343 = "Trong tư thế đó, tôi kéo Hachiroku lên khỏi \\x%lピット;#00ffc040;hố kiểm tra%l;#;."
# monologue
# JP: 手応え。柔らかさ。あたたかさ。\nハチロクは生き――生きるが故に、苦しんでいる。
2399 = "Cảm giác. Sự mềm mại. Sự ấm áp.\nHachiroku đang sống――và vì đang sống, nên em ấy mới đau khổ."
# 【ハチロク】
# display as 八六
# JP: 「あ――」
1552 = "「A――」"
# monologue
# JP: だから、そのまま抱きしめる。\nその苦しみを引き受けたくて。
2380 = "Vì vậy, tôi cứ thế ôm chặt lấy em ấy.\nVì tôi muốn gánh vác nỗi đau khổ đó."
# 【ハチロク】
# display as 八六
# JP: 「あの……双鉄様」
1894 = "「À…… ngài Soutetsu.」"
# monologue
# JP: 鼓動は、僕のものだけだ。\n普段よりも、速くなってる。
2476 = "Nhịp đập này, chỉ là của tôi thôi.\nNó đang đập nhanh hơn bình thường."
# monologue
# JP: 事態はそれほど深刻なのだと、僕の身体も理解している。
2374 = "Cơ thể tôi cũng hiểu rằng, tình hình đang nghiêm trọng đến mức nào."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――僕を信じて、今は休め」
1792 = "「Hachiroku――hãy tin tôi, bây giờ em cứ nghỉ ngơi đi.」"
# monologue
# JP: ハチロクは眠る。\n人間とまるで変わらずに。
2158 = "Hachiroku cũng ngủ.\nChẳng khác gì một con người."
# monologue
# JP: そこに魂がある以上、\nきっと、休息は必要だから。
2654 = "Một khi đã có linh hồn,\nthì chắc chắn cũng cần phải được nghỉ ngơi."
# 【ハチロク】
# display as 八六
# JP: 「しかし……あの――」
1521 = "「Nhưng mà…… cái đó――」"
# 【双鉄】
# display as 雙鐵
# JP: 「休んだのちに目覚めたのなら、\nそのときはまた、僕のために力を貸してくれ」
1582 = "「Sau khi nghỉ ngơi và tỉnh dậy,\nlúc đó em hãy lại cho tôi mượn sức mạnh nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1552 = "「啊——」" 
# monologue
# JP: ハチロクの体から力が抜ける。\n指先の震えが止まる。
2157 = "Cơ thể Hachiroku thả lỏng ra.\nSự run rẩy trên những ngón tay cũng dừng lại."
# monologue
# JP: それが安堵のせいなのか、\nあきらめのせいなのかまでは、わからない。
2327 = "Đó là do em ấy đã an tâm,\nhay là do cam chịu thì tôi không rõ."
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。\n双鉄様、いまは、お言葉に甘えます」
1648 = "「Em hiểu rồi ạ.\nNgài Soutetsu, vậy bây giờ, em xin phép nghe lời ngài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「甘えろ。言葉だけでなく」
1688 = "「Cứ nghe lời đi. Không chỉ bằng lời nói đâu.」"
# monologue
# JP: （ぐっ）
2744 = "（Lộc cộc）"
# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
1545 = "「A!?」"
# 【れいな】
# display as 玲奈
# JP: 「いいですねぇ、ハチロクさん。\nれいな、うらやましいですよぉ」
1798 = "「Thích thật đó nha, chị Hachiroku.\nReina ghen tị quá đi mất~」"
# 【コン】
# display as 空
# JP: 「ケンっ！」
1537 = "「Keng!」"
# monologue
# JP: れいなの声。\nエサを与えていたのだろうか、コンを引き連れやってくる。
2445 = "Giọng của Reina.\nCó lẽ em ấy vừa cho ăn xong, đang dắt theo Kon đi tới."
# monologue
# JP: 無邪気なひとりと一匹は、\n目をきらきらと、僕とハチロクを見つめている。
2250 = "Một người một vật vô tư lự,\nđang đưa đôi mắt lấp lánh nhìn tôi và Hachiroku."
# 【コン】
# display as 空
# JP: 「ケンっ！」
# 1537 = "「吭！」" 
# monologue
# JP: コンはお腹を見せてころがり、\n撫でろ撫でろと要求してくる。
2575 = "Kon lăn ra phơi bụng,\nđòi chúng tôi vuốt ve."
# monologue
# JP: が、今は――
2208 = "Nhưng, bây giờ thì――"
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、また今度にしてくれ。\n今は、ハチロクを甘えさせたい気分でいるのだ」
1673 = "「Xin lỗi nhé, để khi khác đi.\nBây giờ, tôi đang muốn chiều chuộng Hachiroku một chút.」"
# 【ハチロク】
# display as 八六
# JP: 「ぁ……」
1553 = "「A……」"
# monologue
# JP: 諦めたような、困ったような小さな息。
2142 = "Một tiếng thở hắt ra nho nhỏ, như cam chịu, lại như bối rối."
# monologue
# JP: そしてハチロクは僕の耳元、\n一転優しい、安心したような声を出す。
2409 = "Và rồi Hachiroku ghé sát tai tôi,\nđột ngột cất lên một giọng nói dịu dàng, đầy an tâm."
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄様。\nそれでは今は――わたくし、甘えさせていただきます」
1651 = "「Em hiểu rồi, ngài Soutetsu.\nVậy thì bây giờ――xin cho phép em được làm nũng ngài ạ.」"
