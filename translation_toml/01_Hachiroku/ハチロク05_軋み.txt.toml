[script]
# lines: 397 
# monologue
# JP: 朝食の席に似合わぬ言葉に、\n石炭を取るハチロクの手がぴたりと止まる。
2594 = "聽到和早餐時間格格不入的話題，八六突然停下了那隻伸向煤炭的手。" 

# 【ハチロク】
# display as 八六
# JP: 「[えんがい,1]煙害、でございますか？」
1778 = "「煙災？」" 

# 【真闇】
# display as 真闇
# JP: 「そ。[えんがい,1]煙害。\n商店会の方に、クレームが来とっとよ」
1596 = "「對，煙災。有人向商店協會投訴」" 

# 【双鉄】
# display as 雙鐵
# JP: 「商店会にか」
1536 = "「向商店協會？」" 

# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;は最も間近に、\nＳＬの生む煙と火とに接する仕事だ。
2637 = "距離蒸汽機車的煙和火最近的人便是\\x%l機関士;#00ffc040;司機%l;#;。" 

# monologue
# JP: それがいかなる凄まじさかを知っているゆえ、\n苦情が来たと聞かされたとて、“予想外”とは思えない。
2364 = "我深知它們的厲害，所以聽到有人投訴的時候，我並沒有覺得太意外。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、量的にも時間的にも、\n一番煙と接することになるのは駅周辺であるからな」
1802 = "「確實，無論是從煙的量還是從持續時間來說，車站那一帶都是受害最嚴重的」" 

# monologue
# JP: 言った途端に「いやいや」と、\n真闇姉の手が軽く振られる。
2552 = "真闇姐輕輕搖了搖手。" 

# 【真闇】
# display as 真闇
# JP: 「違かとよ。御一夜商店会の中からのクレームじゃなか。\nおかげで繁盛しとるけん、こっちはむしろ\x%l8620;#00ffc040;[ハチロク,3]8620%l;#;様様」
1437 = "「不是咧。不是御一夜商店協會裡的人投訴的哦。那邊生意興隆，他們感謝\\x%l8620;#00ffc040;[八六,3]８６２０%l;#;還來不及」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　では、一体誰が――」
1712 = "「是嗎？那到底是誰——」" 

# 【真闇】
# display as 真闇
# JP: 「これ。煙ばかぶっとるって」
1796 = "「看這個。人家說讓煙燻到了」" 

# monologue
# JP: 言って、真闇姉は一枚の写真を取り出せば、\nハチロクは喰いつくように覗きこむ。
2555 = "真闇姐邊說邊掏出一張照片，一旁的八六則是目不轉睛地盯著那照片。" 

# 【ハチロク】
# display as 八六
# JP: 「これは――双鉄様」
1897 = "「雙鐵少爺，這是……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ……[ふみきりや,2]踏切屋さんだな」
1559 = "「嗯……是道口商店」" 

# monologue
# JP: 御一夜駅から数キロは離れた、寂れてしまった踏切近くで、\n未だにずっと生き続けている雑貨屋、“踏切屋”さん。
2235 = "在距御一夜車站數公里外一處冷清的道口附近，有一家至今仍在經營的名叫道口商店的雜貨店。" 

# monologue
# JP: 名前からして、鉄道には理解を示してくれそうに、\nなんとなく思っていたのだが――
2530 = "看它的店名，我還以為店主會願意包涵鐵路——" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさか、あそこから苦情が来るとは」
1743 = "「沒想到會被那家店投訴」" 

# monologue
# JP: 煙に接する時間など、\n\x%l8620;#00ffc040;8620%l;#;が通過する、長くとも数十秒のことだろう。
2199 = "只有當\\x%l8620;#00ffc040;８６２０%l;#;經過時，那家店才會和煙有接觸。這段時間至多只有數十秒。" 

# monologue
# JP: まして、この写真を見る限りでは……
2447 = "更何況，從這張照片來看……" 

# 【双鉄】
# display as 雙鐵
# JP: 「ずいぶんと、煙が流れているな。\nしかも、黒い」
1779 = "「煙飄得夠遠的，而且還很黑」" 

# 【ハチロク】
# display as 八六
# JP: 「強風の日、でございましょうね。\n木もずいぶんと曲がっているように見えます」
1864 = "「那天風肯定很大吧。我看照片裡的樹彎得很厲害」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――確かに。\n写真で見てもわかるほど、大きく風に揺すられているな」
1707 = "「是啊。看照片就知道，樹被風吹得直晃」" 

# monologue
# JP: ……強風の日は、どうにも機関車の調子が悪い。\n\x%l加減弁;#00ffc040;加減弁%l;#;テコ、ブレーキ、あるいは逆転機――
1175 = "……每當風大的日子，機車的狀態總是不太好。\\x%l加減弁;#00ffc040;汽門%l;#;操作杆、剎車、回動機——" 

# monologue
# JP: そうした機器の操作がイマイチしっくり来ないし、\n振動も、ずいぶん強くなるような気がする。
2655 = "這些器械會變得有些不太好用，車輛震動似乎也比平時強烈得多。" 

# 【双鉄】
# display as 雙鐵
# JP: 「煙が黒いのも、日々姫が\x%lカマ;#00ffc040;カマ%l;#;を制御しそこねて\nしまったせいか」
1775 = "「煙會這麼黑，是因為日日姬沒掌控好\\x%lカマ;#00ffc040;窯%l;#;吧」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ……左様でございましょうね」
1700 = "「是啊……我想您說得沒錯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「となると、\nこれはめったに起こることでは無さそうだがなぁ」
1850 = "「這麼說來，這種情況應該不常發生啊」" 

# 【真闇】
# display as 八六＆真闇
# JP: 『「双鉄様」\n「そぎゃんかもねぇ」』
1908 = "『「雙鐵少爺」\\n「或許吧」』" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
1565 = "「嗯？」" 

# monologue
# JP: ハチロクと真闇姉との声が重なる。
2249 = "她們兩人的聲音同時響起。" 

# monologue
# JP: ハチロクはすぐに目をふせて、\n真闇姉へと言葉をゆずるそぶりを見せる。
2173 = "八六隨即微微俯首，示意讓真闇姐先講。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そぎゃん、とはどういうことだ？」
1660 = "「或許，是指什麼？」" 

# 【真闇】
# display as 真闇
# JP: 「こん写真――\n航空写真ば、誰が撮ったかいうことよ」
1542 = "「咱就尋思這照片兒——這航空照片兒是誰拍的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「誰が、とは……ああ」
1828 = "「誰拍的……啊，我明白了」" 

# monologue
# JP: “航空写真”の響きが僕に理解をくれる。
1168 = "“航空照片”這個詞語提醒了我。" 

# monologue
# JP: 御一夜上空を飛ぶものなどは、\n普段であれば鳥たちとナビくらいがせいぜいだ。
2475 = "正常情況下，御一夜的上空只有鳥和Ｎａｖｉ在活動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致推進派による撮影――\nということになるのか、これは」
1445 = "「也就是說這張照片很可能是\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠支持派拍攝的」" 

# 【真闇】
# display as 真闇
# JP: 「ま、そぎゃんと考えるのが自然よねぇ」
1849 = "「這麼想比較合理吧」" 

# monologue
# JP: おっとりと、いつもどおりの口調とペースで、\n鋭い指摘が紡がれていく。
2549 = "真闇姐以極其平常的口吻，從容不迫地指出了尖銳的問題。" 

# 【真闇】
# display as 真闇
# JP: 「[ふみきりや,2]踏切屋さんの二代目さん。\n今の店主は、ガチガチの\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致推進派やもん」
1857 = "「道口商店的現任——也就是第二代店主是\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠引進計劃的堅實支持者」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……やはり、不況の影響によるものか？」
1452 = "「他站在支持派那邊……是因為生意不好嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「やろうねぇ。あそこまで離れてしまうと、\n駅前が繁盛しても、取り残されてしまうけん」
1618 = "「很有可能。那裡離車站太遠，車站那一帶的興旺惠及不到那裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「工場や宿舎の立地次第では、\n一気に商売が盛り返すかもしれんしな」
1588 = "「如果工廠和宿舍建在那附近，商店說不定就能一舉翻身了」" 

# monologue
# JP: どこで買ってもさほど値段に大きな差がない、\n日用雑貨の類であれば、十二分に期待できることだろう。
2443 = "日用雜貨的價格各處都差不多，人們會選擇在方便的地方購買。那家店應該對工廠寄予了很大的期望吧。" 

# monologue
# JP: むしろ、立地案などでゆさぶられ、\n工場誘致を推進するようになったものかもしれん。
2624 = "說不定他就是受了選址方案的引誘才成了工廠支持派。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは……ヘタな対応を打ってしまうと、\n政治的に広げられてしまいかねない案件か」
1846 = "「這件事……要是處理得不好，可能會產生更大的影響」" 

# monologue
# JP: 踏切屋さん一件にとどまらず、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致派が、\nクレームの嵐を吹かせるようなことになったらたまらない。
2122 = "假如以道口商店這件事為開端，\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠支持派開始煽動更多人投訴，那就糟了。" 

# monologue
# JP: なにせ、煙の問題だ。風向きと条件次第では、\n予想もつかない場所にも伸びてしまおうし――
2525 = "畢竟煙可能會隨著風向和其他條件的變化，飄到各式各樣的地方去——" 

# 【真闇】
# display as 真闇
# JP: 「水汚染の防止が工場誘致反対の旗印やもんねぇ。\n『ＳＬも汚染を』ゆうて主張されると、泥仕合たい」
1882 = "「防止水汙染是咱們反對引進工廠的旗號。要是他們主張“蒸汽機車也會帶來汙染”，那扯皮起來就講不清咯」" 

# 【ハチロク】
# display as 八六
# JP: 「であれば、\n先手を打って最善の対策を取ってしまいましょう」
1869 = "「那我們就搶先一步以最妥善的方式來應對吧」" 

# monologue
# JP: 確信に満ちたハチロクの声。\n顔を向ければ、一心な瞳が僕を捉える。
2161 = "八六的聲音充滿了自信。望向我的眼神中也透著堅定。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにか良い考えでもありそうだな」
1793 = "「看來你是想到什麼好主意了啊」" 

# 【ハチロク】
# display as 八六
# JP: 「無論です。\nＳＬの歴史は、煙害との戦いの歴史でもありますので」
1847 = "「這是當然。蒸汽機車的歷史，就是與煙災作鬥爭的歷史」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
1711 = "「是嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。ごくごく初期の\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;においては、\n煙に混じる火の粉によっての火災さえございました」
1720 = "「是的。最早期的\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;甚至會產生混雜著火星的煙，那些火星還引發過火災」" 

# 【双鉄】
# display as 雙鐵
# JP: 「火災――」
1758 = "「火災——」" 

# monologue
# JP: 聞いた瞬間、ざわりと背筋が怖気だつ。\n火のイメージは鼓膜に軋みを、口に鉄の味を蘇らせる。
2063 = "一聽到“火災”這個詞，我立刻後背發涼。它讓我回想起了刺耳的聲響、嘴裡如鐵鏽般的血腥味。" 

# monologue
# JP: 声も身体も放っておけば震えてしまいそうな気がして、\n半ば無理やり言葉を絞って、心を落ち着けようとする。
2372 = "我的聲音和身體似乎稍不留神就會顫抖起來。我勉強自己擠出話語，強行讓心情平復下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな――\n火と鉄と……それこそが、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;だ」
1704 = "「是啊……火與鐵……這才是\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;」" 

# monologue
# JP: 頷いて、\nハチロクは静かな言葉をつなげる。
2174 = "八六點點頭，繼續說了下去。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしの頃までにも技術革新はございましたが、\nそれでも決して、煙を甘く見ることは出来ません」
1891 = "「雖然我所處的那個時代技術已經有了革新，但人們依舊不敢輕視煙災」" 

# monologue
# JP: （ああ――）
2722 = "（原來如此——）" 

# monologue
# JP: ハチロクに満ちているのは確信ではなく、緊張なのだと、\n僕に巣食った怯えが逆に、気づかせてくれる。
2170 = "八六表現出的並不是自信，而是緊張。這反而讓我注意到了盤踞在我心頭的恐懼。" 

# monologue
# JP: ハチロクの声の硬さの裏にあるものは――\n僕のときっと似通った、事故に対する恐怖なのだと。
2246 = "她之所以會這麼緊張，是因為她和我一樣，對事故抱有恐懼。" 

# 【ハチロク】
# display as 八六
# JP: 「たとえ少数の声で、稀であろうと。煙害があるのなら、\nわたくしたちの為すべきはただ、根絶のための努力です」
1548 = "「哪怕受害人再少，發生次數再少，只要出現了煙災，我們就該為杜絕它而努力」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1710 = "「是啊」" 

# monologue
# JP: 環境汚染の基準値だとか、利益と損失のバランスだとか、\nそうした主張では、誘致派と同じ土俵に立つことになる。
1165 = "“環境汙染的基準”、“權衡利益與損失”——這種辯解會把我們帶到支持引進派的主場。" 

# monologue
# JP: 煙害と感じさせないレベルまで、状況を改善させてこそ、\n僕らの目指す御一夜復興への道筋もつけられよう。
2124 = "做出改善，讓人們不覺得有煙災，這才是我們該走的御一夜復興之路。" 

# 【真闇】
# display as 真闇
# JP: 「けど煙害ば根絶するとか……\nそぎゃんかこつ、出来ゆうもんとや？」
1524 = "「可是……真有法子能杜絕煙災嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしの世代以降のＳＬたちには、\n“[しゅうえん,1]集煙装置”が取り付けられたものがございます」
1622 = "「從我之後的那一代開始，蒸汽機車裝配了一種叫“排煙器”的裝置」" 

# 【真闇】
# display as 真闇
# JP: 「しゅうえん……あ、煙ば集める？」
1681 = "「排煙……啊，控制如何把煙排出去？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、その集煙です。本来は、\nトンネル内で絶大な効果を発揮するものですが――」
1725 = "「是的，這就是它的作用。在過隧道時，它非常有用——」" 

# monologue
# JP: ハチロクの手が、簡素な図面を引いていく。
2143 = "八六在紙上畫出簡潔的示意圖。" 

# monologue
# JP: 煙突上部に、後方だけが開いた箱を取り付ける……\nそれが一番簡単な、\x%l集煙装置;#00ffc040;集煙装置%l;#;の原理のようだ。
2510 = "煙囪頂部裝配了一個僅在後方開口的箱子。這就是\\x%l集煙装置;#00ffc040;排煙器%l;#;的基本原理吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。何もせずにいれば上へと吹き出す煙を、\n\x%l集煙装置;#00ffc040;集煙装置%l;#;は、後方へと強制的に流してしまうのか」
1494 = "「原來如此。裝了\\x%l集煙装置;#00ffc040;排煙器%l;#;之後，原本向上噴出的煙會被引到後方」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です。\x%l除煙板;#00ffc040;[デフ,2]除煙板%l;#;と組み合わせることにより、\n煙の広がりを、かなり抑えこむことが可能となるかと」
1744 = "「沒錯。它和\\x%l除煙板;#00ffc040;集煙板%l;#;一起使用，能夠在很大程度上抑制住煙的擴散」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――デメリットは？」
1564 = "「嗯。那它有缺點嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「箱の上部は開閉可能なフタとなっておりますから、\n不要時には開いておけば良いだけですし……」
1809 = "「箱子頂上設有可開關的蓋子，不需要排煙的時候把蓋子打開就行了……」" 

# monologue
# JP: ん……と、ハチロクが考えこむ。
2171 = "八六陷入了思考。" 

# monologue
# JP: 唇を結び目を閉じて――\nやがて、ゆっくりと言葉が吐かれる。
