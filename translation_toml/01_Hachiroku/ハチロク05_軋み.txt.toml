# 【真闇】
# display as 真闇
# JP: 「ああ、ホっとしたらなんか喉ば渇きよるねぇ」
1429 = "「一放鬆下來就渴了」" 

# 【ハチロク】
# display as 八六
# JP: 「あら、気が付きませんで。すぐにお淹れいたします」
1544 = "「哎呀，是我怠慢了。我這就去泡茶」" 

# 【真闇】
# display as 真闇
# JP: 「ありがとうねぇ。助かるわぁ」
1829 = "「謝謝」" 

# monologue
# JP: 会釈を残し、ハチロクが奥へと引っ込んでいく。\nその足音が消えるのを待ち、問いかける。
