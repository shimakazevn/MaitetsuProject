# 【双鉄】
# display as 雙鐵
# JP: 「――なにか、引っかかるところでもあるのか？」
1214 = "「——有什麼問題嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「煙害のことは、\n双ちゃんの考え通りでよかかと思うけど……」
1777 = "「煙災的事，咱覺得你的想法沒什麼問題，只是……」" 

# monologue
# JP: 真闇姉らしからぬ、\n奥歯にものの挟まったようなその言葉。
2547 = "真闇姐一反常態，說話吞吞吐吐。" 

# monologue
