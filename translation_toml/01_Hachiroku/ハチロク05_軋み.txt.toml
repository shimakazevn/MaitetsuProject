# 【双鉄】
# display as 雙鐵
# JP: 「重量増加か……\n確かに機関車にも\x%l客車;#00ffc040;客車%l;#;にも、増設が重なってるからな」
1573 = "「增加重量啊……的確，這段時間一直在添加部件，機車和\\x%l客車;#00ffc040;客運車廂%l;#;都已經重了不少」" 

# 【真闇】
# display as 真闇
