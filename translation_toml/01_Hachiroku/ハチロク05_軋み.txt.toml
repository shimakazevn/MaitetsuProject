1594 = "「對了，\\x%l集煙装置;#00ffc040;排煙器%l;#;這種東西很容易就能搞到嗎？」" 

# monologue
# JP: 真闇姉の素朴な、それだけに重要な問い。\nハチロクは、どこかホっとしたような頷きを返す。
2686 = "面對真闇姐提出的這個直接而重要的疑問，八六安心地向她點點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l集煙装置;#00ffc040;集煙装置%l;#;は、各地の\x%l機関区;#00ffc040;機関区%l;#;が独自開発していたものです。\nですので、図面さえ入手できれば製造は比較的容易かと」
1199 = "「\\x%l集煙装置;#00ffc040;排煙器%l;#;由各地的\\x%l機関区;#00ffc040;機務段%l;#;各自獨立開發。只要能搞到圖紙，製作應該不會太難」" 

# 【双鉄】
# display as 雙鐵
# JP: 「各地で独自開発……その土地々々の実情にあわせてと\nいった感じか？」
1533 = "「各地各自獨立開發……也就是說因地區的實際情況而有所不同？」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です。ので、可能であれば複数の図面を入手して、\nできるかぎり軽量のものを装備できればと願います」
1746 = "「沒錯。最好能取得多張圖紙，儘量選取更簡潔的方案製作」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その方針で動いてみるか。\n赤井宮司や毛利の[あき,1]安芸様に図面のことを尋ねてみよう」
1867 = "「那就朝著這個方向努力吧。我們去問問看赤井宮司和毛利的安芸殿下，不知他們是否有頭緒」" 

# monologue
# JP: それでどうかと視線で問えば、即座の答え。
