# 【双鉄】
# display as 雙鐵
# JP: 「やはりさっきの振動は、\x%lカマ;#00ffc040;カマ%l;#;の不良か？」
1490 = "「剛才發生震動是因為\\x%lカマ;#00ffc040;窯%l;#;的狀態不好嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「っていうか、\x%l集煙装置;#00ffc040;集煙装置%l;#;つけた影響？\nなんか最近、通風が落ち着いてくれない感じで」
1527 = "「可能是受了\\x%l集煙装置;#00ffc040;排煙器%l;#;的影響吧？最近我總覺得進氣不太穩定」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
# 1711 = "「是嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに――兄さんにも、責任ありますよ？\n今日みたいに天気悪い日は、運転、荒くなりますから」
1813 = "「而且阿哥——哥哥也有責任吧？一遇到這種壞天氣，駕駛就變得不太穩」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む――」
1550 = "「唔……」" 

# monologue
# JP: 自覚は全くなかったが、\n\x%lカマ;#00ffc040;カマ%l;#;を証拠に指摘されれば、反論をする余地さえなくなる。
79 = "\\x%l加減弁;#00ffc040;汽門%l;#;操作不得當會引發強烈的進氣，進而導致\\x%l火床;#00ffc040;火床%l;#;被攪得一塌糊塗。" 

# monologue
# JP: \x%l加減弁;#00ffc040;加減弁%l;#;を乱暴に扱うのなら、強烈な通風が発生し、\n\x%l火床;#00ffc040;火床%l;#;はすぐさま、滅茶苦茶に荒れてしまうものだから。
2131 = "儘管我自己沒有意識到問題，但是\\x%lカマ;#00ffc040;窯%l;#;的狀態已經擺在眼前，我根本沒有反駁的餘地。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、少し気をつけてみ――」
1675 = "「抱歉，我會注意——」" 

# monologue
# JP: （ガトっ）
# 2733 = "（咣咚）" 

# 【日々姫】
# display as 雙鐵＆日日姬
# JP: 『「っ！？」\n「っ！？」』
1910 = "『「！？」\\n「！？」』" 

# monologue
# JP: 日々姫と目を見交わせて、\nついで揃って、ハチロクを見る。
2339 = "我和日日姬面面相覷。然後我們一起看向八六。" 

# monologue
# JP: \x%l絶気運転;#00ffc040;絶気運転%l;#;中の振動――\nあるいは線路に、なにか異常があるのかもしれん。
94 = "\\x%l絶気運転;#00ffc040;無汽行駛%l;#;時發生了震動，難道說鐵軌上有什麼異常。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l踏面;#00ffc040;踏面%l;#;には異常感知できませんでした。\n非常停止の要は無いものと判断します」
1653 = "「我沒有感知到\\x%l踏面;#00ffc040;踏面%l;#;上有異常。我認為不需要緊急停車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぬ――」
# 1550 = "「唔……」" 

# monologue
# JP: 聞くより前にもらう返事は、\nけれどもかえって僕の不安を掻き立てる。
2392 = "我還沒問出口，八六就給出了回答。但這反而激起了我的不安。" 

# monologue
# JP: （ここのところ、\n好調続きで特に気にさえしていなかったが――）
2742 = "（最近這段時間比較順利，所以我一直沒有多想。可是——）" 

# monologue
# JP: “感知できませんでした”という一言が、\nどうにもひどく引っかかる。
1162 = "“沒有感知到”——這句話讓我覺得不對勁。" 

# monologue
# JP: ハチロクは自らの機能について、\n十全ではないと認めているのだ。
2150 = "八六承認過她自己的機能出了一些問題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……念のためれいなに\x%l共感;#00ffc040;共感%l;#;で位置情報を送ってくれ。\n折り返しまでに、調査をしてもらっておこう」
1241 = "「……慎重起見，你把位置訊息用\\x%l共感;#00ffc040;共鳴%l;#;發出去吧。返程前找人幫忙確認一下」" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました」
1696 = "「明白」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、もうすぐ」
1886 = "「阿哥，快到了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1710 = "「是啊」" 

# monologue
# JP: 日々姫の声に我に返る。\n気を散らしている余裕はなかった。
2437 = "日日姬的聲音讓我回過神來。沒時間想其他事了。" 

# monologue
# JP: もうすぐ、上り勾配となる。\n\x%l絶気;#00ffc040;絶気%l;#;のままでは、力が不足してしまう。
2692 = "馬上就到上坡了。繼續保持無汽狀態將會導致列車上坡時動力不足。" 

# 【双鉄】
# display as 雙鐵
# JP: 「開けるっ！」
1670 = "「打開\\x%l加減弁;#00ffc040;汽門%l;#;！」" 

# monologue
# JP: \x%l喚呼;#00ffc040;喚呼%l;#;しながら、逆転機を\x%lミッドギア;#00ffc040;ミッドギア%l;#;まで引き上げて、\n\x%lバイパス弁;#00ffc040;バイパス弁%l;#;を閉め、\x%l加減弁;#00ffc040;加減弁%l;#;テコをわずかに開く。
2390 = "我進行著\\x%l喚呼;#00ffc040;復誦%l;#;，並把回動機切換到\\x%lミッドギア;#00ffc040;中位檔%l;#;，關閉\\x%lバイパス弁;#00ffc040;旁路閥%l;#;，微微拉動\\x%l加減弁;#00ffc040;汽門%l;#;操作杆。" 

# monologue
# JP: シリンダー排水弁を開けて閉め水を吐き出して、\n\x%l加減弁;#00ffc040;加減弁%l;#;テコをいっぱいに引き、逆転機をまた伸ばしていく。
2351 = "我打開又關上了汽缸排水閥，把汽缸中的水排了出去。然後大幅拉動\\x%l加減弁;#00ffc040;汽門%l;#;操作杆，擰高回動機檔位。" 

# monologue
# JP: （シュッ！　シュッ！　シュッ！　シュッ！）
2734 = "（咻！咻！咻！咻！）" 

# monologue
# JP: \x%lブラスト;#00ffc040;ブラスト%l;#;の力強い響きとともに、蒸気が\x%l動輪;#00ffc040;動輪%l;#;を回し始める。
2104 = "伴隨著\\x%lブラスト;#00ffc040;汽缸排汽%l;#;強而有力的聲響，蒸汽開始驅動\\x%l動輪;#00ffc040;動輪%l;#;。" 

# monologue
# JP: 雨で、上りで、満席だ。
2244 = "大雨，上坡，再加上滿客。" 

# monologue
# JP: （くっ）
2732 = "（咕）" 

# monologue
# JP: \x%l砂撒き;#00ffc040;砂撒き%l;#;コックを手早く繰ってすぐ戻し、\n\x%l動輪;#00ffc040;動輪%l;#;前方に砂を撒く。
2353 = "我把\\x%l砂撒き;#00ffc040;放沙%l;#;閥打開一小段時間，在\\x%l動輪;#00ffc040;動輪%l;#;前方撒下沙子。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l粘着力;#00ffc040;粘着力%l;#;十分――このまま、登りきりましょう」
1193 = "「\\x%l粘着力;#00ffc040;黏著力%l;#;沒問題，就這樣上坡吧」" 

# monologue
# JP: 砂は当然に摩擦を増すので、\n\x%l粘着力;#00ffc040;粘着力%l;#;――\x%l動輪;#00ffc040;動輪%l;#;が線路を捕まえる力も増加する。
2481 = "沙子增大了摩擦，加強了\\x%l粘着力;#00ffc040;黏著力%l;#;——即\\x%l動輪;#00ffc040;動輪%l;#;抓住鐵軌的力量。" 

# monologue
# JP: （シュっ、シュっ、シュっ、シュっ）
2735 = "（咻，咻，咻，咻）" 

# monologue
# JP: \x%l動輪;#00ffc040;動輪%l;#;が\x%l空転;#00ffc040;空転%l;#;を起こしてしまえば、\x%l制動;#00ffc040;制動%l;#;さえも効かなくなる。
2266 = "如果\\x%l動輪;#00ffc040;動輪%l;#;發生了\\x%l空転;#00ffc040;空轉%l;#;，那連\\x%l制動;#00ffc040;減速%l;#;都會失效。" 

# monologue
# JP: \x%l自弁;#00ffc040;自弁%l;#;と加減弁テコに、いつでも力を加えられるよう、\n力まず、柔らかく備えておく。
2497 = "為了隨時都能拉動\\x%l自弁;#00ffc040;自剎%l;#;和汽門操作杆，我放鬆身體做好準備。" 

# monologue
# JP: （ガトっ）
# 2733 = "（咣咚）" 

# monologue
# JP: また、だ。
2191 = "又來了。" 

# monologue
# JP: あのささやかな――\nけれど、確かに感じる振動。
2680 = "震動雖然不大，可它確實發生了。" 

# monologue
# JP: （ハチロクは……何もいわんか）
2721 = "（八六……什麼都沒有說）" 

# monologue
# JP: 同じことが三度重なれば、\n違和感と疑問とは、一つの形にまとまっていく。
2218 = "同樣的事重複了三遍，異常感和疑問漸漸聯繫起來。" 

# monologue
# JP: が……いまはとにかく集中だ。\nこの勾配を登りきらねば、会話ひとつも交わせない。
2071 = "不過……現在還是先集中精力駕駛機車吧。在上坡結束之前根本沒辦法好好談話。" 

# monologue
# JP: （ボッ、ボッ、ボッ、ボッ）
2736 = "（啵，啵，啵，啵）" 

# monologue
# JP: 機関車があえいでいるような排気音。\n\x%lカマ;#00ffc040;カマ%l;#;はまだ、整えきれてないようだ。
2452 = "機車像喘氣一樣發出排氣聲。\\x%lカマ;#00ffc040;窯%l;#;的狀態依舊不太好。" 

# monologue
# JP: （どうにも今日はうまくいかんな）
2719 = "（今天著實不太順利啊）" 

# monologue
# JP: 客席の方は順調だろうか。
2064 = "不知道車廂內情況怎麼樣。" 

# monologue
# JP: 非常ブザーが鳴っていなくとも、\n小さなトラブルはあるかもしれん。
2586 = "緊急蜂鳴器沒有響過，但搞不好會有一些小麻煩。" 

# monologue
# JP: （まぁ、もうすぐ湯医――携帯ももう通じる範囲だ。\nもしも何かあったのなら、永山夫人が知らせてくれよう）
2726 = "（反正馬上就到湯醫了——手機也已經有信號了。要是出了什麼事，永山夫人會打電話過來的）" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　\x%l雨三本;#00ffc040;[あめさんぼん,2]雨三本%l;#;ですっ！」
1895 = "「雙鐵少爺！\\x%l雨三本;#00ffc040;雨三節%l;#;！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――っ！　制限60――！」
1538 = "「呃！限速６０！」" 

# monologue
# JP: \x%l雨三本;#00ffc040;雨三本%l;#;、雨降りの日のブレーキは、\nレールの繋ぎ目３つ分、早めにかける必要がある。
101 = "\\x%l雨三本;#00ffc040;雨三節%l;#;——下雨時需要在比平常提前三節鐵軌的位置剎車。" 

# monologue
# JP: ハチロクの声と同時に圧をかけ――
2593 = "聽到八六的提醒以後，我立刻剎車——" 

# 【双鉄】
# display as 雙鐵
# JP: 「良しっ！」
1584 = "「好！」" 

# monologue
# JP: 良くない。本当にギリギリだった。
2177 = "其實並不好。險些就錯過了。" 

# monologue
# JP: ハチロクの注意がもしもなければ、\n完全に、速度超過をしてしまっていた。
2267 = "如果八六沒有提醒我，列車肯定已經超速了。" 

# monologue
# JP: （なるほど……これか）
2723 = "（原來如此……）" 

# monologue
# JP: 悪天候の日には運転が荒くなる。
2234 = "在天氣惡劣的日子，我的駕駛會變得不穩定。" 

# monologue
# JP: 日々姫の指摘が真実だったと、\nまさしく体感で思い知る。
2337 = "我切身體會到了日日姬指出的問題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――新[つるは,1]弦羽廃駅、通過、良し！」
1218 = "「——通過新鶴羽廢車站，正常！」" 

# monologue
# JP: 今はともかく、何事もなく湯医駅まで持っていくこと。\nそれだけに、気持ちの全てを集中させる。
2518 = "現在還是先集中所有精力把列車平安地開到湯醫站吧。" 

# monologue
# JP: 集中させよう――と、思うのに――
2348 = "我想要集中精力……可是——" 

# monologue
# JP: （くそっ）
2729 = "（可惡）" 

# monologue
# JP: 前方窓にぶつかってくる雨音が、\nどうにも耳障りで仕方ない。
2677 = "雨水打在前車窗上，聲音異常刺耳。" 

# monologue
# JP: 鼓膜の上にちりちりと、\n小虫が這いまわっているようで。
2588 = "耳膜上就像有小蟲在爬一樣刺痛不斷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l制動;#00ffc040;制動%l;#;――コンマ[ハチ]８」
1188 = "「\\x%l制動;#00ffc040;減速%l;#;，零點八」" 

# monologue
# JP: だから、普段にはしない\x%l喚呼;#00ffc040;喚呼%l;#;も、あえてする。\n今日はうまく回っていないと既に明らかになった以上――
2231 = "因此，我喊出平時不會做的\\x%l喚呼;#00ffc040;復誦%l;#;。既然我已經清楚今天自己的狀態不好——" 

# monologue
# JP: 声を出し、ハチロクと日々姫の目と耳も借り、\nキャブ内で相互に、お互いを確かめ合っていく他に無い。
2666 = "那就發出聲音，讓八六與日日姬的眼睛和耳朵幫我把關，與駕駛室內的成員互相確認情況。" 

# monologue
# JP: （そうだ。僕らはチームなんだ）
2740 = "（是啊，我們是一個團隊）" 

# monologue
# JP: 良い部分も、悪い部分も、共有しあい、支えあう。\nこの先もそうしていくために――
2292 = "彼此之間取長補短，相互支持。為了今後也能如此——" 

# monologue
# JP: （ボーーーーーーーーっ！）
# 2738 = "（嗚——！）" 

# monologue
# JP: 思い切り良く\x%l汽笛;#00ffc040;汽笛%l;#;を響かせ、\nこの雨音を鼓膜の中から――記憶の傷から、吹き飛ばす。
2365 = "我用力鳴響\\x%l汽笛;#00ffc040;汽笛%l;#;，把雨聲從鼓膜中——從記憶的傷痕中趕走。" 

# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;まで\x%l8620;#00ffc040;8620%l;#;を連れて戻れば、\nポーレットが待っていてくれる。
2334 = "我們開著\\x%l8620;#00ffc040;８６２０%l;#;回到\\x%l石造機関庫;#00ffc040;石製機車庫%l;#;，波萊特已經在等著我們了。" 

# monologue
# JP: その表情は、雨雲さえもはらえそうなほど、晴れやかだ。
2259 = "她的表情是那麼地爽朗，彷彿蘊含著驅散雨雲的力量。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ナビちゃんから連絡受け取ってます。\n今日も煙、踏切屋さんに全然かかってなかったそうです」
1646 = "「我收到了Ｎａｖｉ的聯絡。它說煙沒有飄到道口商店那裡去，今天也成功了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なによりだ」
1580 = "「太好了」" 

# monologue
# JP: 装着以来、\x%l集煙装置;#00ffc040;集煙装置%l;#;は、確かな仕事をしてくれている。\nこの調子ならクレームは、再発せずに済みそうだ。
99 = "\\x%l集煙装置;#00ffc040;排煙器%l;#;被安裝到車上之後一直表現得很不錯。看樣子應該不會再有人投訴了。" 

# monologue
# JP: （とはいえ……またぞろ金が掛かってしまった）
2745 = "（話雖如此……這讓我們又花了一筆錢）" 

# monologue
# JP: 助士を一人雇入れての、２チーム体制への移行……
2333 = "我們希望僱傭一位司爐，儘快組建兩個隊伍形成輪班制……" 

# monologue
# JP: できれば早く願いたいのだが、\nこうも改修がつづいては――っと。
2204 = "可是改裝這麼頻繁——噢，對了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。報告をいれた、異常振動のことなのだが」
1593 = "「對了。關於我們在報告中提到的異常震動」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それについては[せき]堰さんに行ってもらいました。\n線路には、特段の異常はなかったそうです」
1569 = "「堰先生已經去看過了。他沒發現線路有什麼異常」" 

# monologue
# JP: ……ふかみの祖父たち、堰さんとそのご兄弟とは、\n水と土との専門家だ。
1178 = "……深美的祖父——堰先生和他的兄弟是水文與地質方面的專家。" 

# monologue
# JP: その\x%l保線;#00ffc040;保線%l;#;技術の確かさは、ハチロクも認める域にある。
2282 = "就連八六都認可他們的\\x%l保線;#00ffc040;巡線%l;#;技術。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば安心だな。\n手間をかけてすまなかった。ありがとう」
1870 = "「那我就放心了。給你添麻煩了。謝謝」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いいえ、\x%l保線;#00ffc040;保線%l;#;は鉄道の生命線のひとつですから。\n小さなことも、報告してもらえた方が助かります」
1741 = "「沒事。\\x%l保線;#00ffc040;巡線%l;#;對鐵路來說至關重要，哪怕是再小的事也請提出來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そういってもらえると気が休まる」
1235 = "「……你這麼說我心裡就好受一些了」" 

# monologue
# JP: が……\n線路に異常が無いのなら、異常は他にあることになる。
2201 = "可是……如果線路上沒有異常的話，問題就出在其他地方。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あれ？」
# 1565 = "「嗯？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1900 = "「！」" 

# monologue
# JP: 青い瞳が近寄ってくる。\n大きく、まっすぐ――全てを見通しそうな瞳が。
2491 = "波萊特的碧眼湊到我的面前，那雙彷彿能看透一切的大眼睛透著真摯的光芒。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、なんか、心配事ですか？\n元気、無いみたいに見えますけど」
1893 = "「雙鐵君，你好像沒什麼精神，是不是有什麼心事？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん。\nそうだな、気がかりはある」
1555 = "「啊……嗯。我在想一些事」" 

# monologue
# JP: ポーレットには、嘘は吐けない。\nまして、安全にもかかわることだ。
2361 = "我沒辦法對波萊特撒謊。更何況這還牽扯到安全問題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「気がかりはあるのだが、まだ確認がとれていない。\n確認が取れ次第に、報告させてもらいたく思う」
1519 = "「只是現在還不確定。等確定之後我會向你報告的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「――わかりました！」
1212 = "「——好吧！」" 

# monologue
# JP: 何も尋ねず、\nポーレットは笑顔をくもらさぬまま、頷いてくれる。
2490 = "波萊特沒有多問，她笑著點點頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それじゃ、報告待ってます。\n何もなければ、それがきっと一番ですけど」
1872 = "「那我等你的報告。當然，沒事是最好的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1710 = "「是啊」" 

# monologue
# JP: 臆病で引っ込み思案でも、\nポーレットは本質的にリーダーなのだと、つくづく感じる。
2670 = "雖然波萊特缺乏自信畏手畏腳，但她骨子裡確實很適合當領導者。" 

# monologue
# JP: わずかな言葉を交わしただけで、\nぐしゃぐしゃしていた気持ちをいくらか、解してもらえた。
2126 = "僅僅和她交談了三言兩語，我那原本亂糟糟的心情便舒坦了一些。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　話が終わったなら、手伝って！」
1884 = "「阿哥！話講完了嗎，過來幫一下忙！」" 

# monologue
# JP: \x%l運転台;#00ffc040;運転台%l;#;の中から日々姫の、少し怒ったような声。\n恐らく\x%l火床;#00ffc040;火床%l;#;が、よほどひどく固まってしまったのだろう。
2294 = "從\\x%l運転台;#00ffc040;駕駛台%l;#;上傳來了日日姬有些惱火的呼喊聲。恐怕\\x%l火床;#00ffc040;火床%l;#;上結塊很嚴重吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった、すぐに」
1586 = "「好，我這就來」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、わたし行きます。\n大丈夫。ちゃんと手伝えますから」
1557 = "「啊，我去吧。別擔心，我可以的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、しかし――」
1520 = "「可是——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大事なときに使えるように、\n時間、作ってもらえてるのわかってますから」
1659 = "「我知道你為我安排了能在關鍵時刻空出來的時間」" 

# monologue
# JP: 笑って、言って。\nポーレットはもう歩き出してる。
2492 = "波萊特笑著說道，腳下也同時邁開了步伐。" 

# 【ポーレット】
# display as 波萊特
# JP: 「で、今がきっと――\nその“大事なとき”ですよね？」
1781 = "「現在不就是“關鍵時刻”嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまない」
1708 = "「是啊。謝謝」" 

# monologue
# JP: 確かにそうだ。\nだから素直に、言葉に甘える。
2261 = "她說得沒錯。我決定接受她的好意。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――良し」
1211 = "「——好」" 

# monologue
# JP: 覚悟を決めて一歩踏み出す。\n姿の見えぬハチロクが、どこにいるかの想像はつく。
2325 = "我下定了決心，朝目的地走去。我大概能猜到八六在哪裡。" 

# monologue
# JP: その想像が外れていれば、\n僕の懸念は、恐らく杞憂で済むのだ、が――
2271 = "如果她不在那裡，我擔心的事可能就不會發生——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。やはりここか」
1480 = "「八六，你果然在這」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――双鉄様」
1556 = "「啊……雙鐵少爺」" 

# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;の床の穴。\n下からの整備をするために、掘られた“\x%lピット;#00ffc040;ピット%l;#;”。
89 = "\\x%l石造機関庫;#00ffc040;石製機車庫%l;#;的地面上有塊凹下去的地方。那是為了從下方進行整備而挖出的“\\x%lピット;#00ffc040;維修區%l;#;”。" 

# monologue
# JP: 整備ボディのハチロクは、\nその中にもぐって、\x%l8620;#00ffc040;8620%l;#;の下腹を見上げている。
2154 = "八六換上了整備體，鑽入其中。她正在檢查\\x%l8620;#00ffc040;８６２０%l;#;的底部。" 

# 【双鉄】
# display as 雙鐵
# JP: 「異常振動の原因は、足回りか？」
1784 = "「異常震動的原因出在行駛系統上嗎？」" 

# monologue
# JP: 思ったことをそのまま言えば、\nハチロクはぎくりと動きを止める。
2355 = "我把想法說出來後，八六一下子僵住了。" 

# 【ハチロク】
# display as 八六
# JP: 「それは……」
1844 = "「這……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「以前からあったものだよな。\n今日ほどの頻発は、恐らく初めてのこととはなるが」
1848 = "「這種震動之前也有過，只不過從沒像今天這樣頻繁發生」" 

# monologue
# JP: 今日、何回も重なったから、\nそれが明確な違和感だと気づけた。
2093 = "今天的數次震動讓我確信有地方出了問題。" 

# monologue
# JP: 今まであった不意の振動のいくらかは、\n恐らく同じ原因で、発生していたものであろうとも。
2311 = "恐怕在至今為止發生過的意外震動中，有一部分也是由於相同的原因引起的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「機関車側に何かある――\nハチロクも、それを疑っているのだよな？」
1474 = "「八六，你也在懷疑是機車出了問題吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい……」
1718 = "「是的……」" 

# monologue
# JP: ハチロクは僕を見ようとしない。\nならばもう、“疑い”の域を超えた問題なのかもしれない。
2139 = "八六不願看我。看來這已經不只是“懷疑”了。" 

# monologue
# JP: が、そうであるならそうであるほど、\n当然に、早期対処をするべきなのだ。
2418 = "既然這樣，那就更應該及早處理。" 

# 【双鉄】
# display as 雙鐵
# JP: 「もしもお前が原因を特定しきれないなら、\n改修を手伝ってくれた技師さんにでも――」
1824 = "「要是你確定不了問題出在哪，可以請修復時幫過我們的技師——」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ……\n原因でしたら、特定できております」
1432 = "「不……原因已經確定了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1901 = "「！？」" 

# monologue
# JP: やっと、ハチロクが僕を見る。
2164 = "八六終於看向了我。" 

# monologue
# JP: その目には、見たことの無い寂しい色が――\n恐らく、諦めという名の色が、張り付いている。
2257 = "她的眼神中透著一種不曾有過的失落——彷彿對什麼東西死心了一般。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ……それほど、悪いのか？」
1634 = "「情況……這麼糟嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「原因は特定できておりますし――\n双鉄様のお目にもすでに、映っております」
1498 = "「原因已經找到了，雙鐵少爺也已經看見了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 1565 = "「嗯？」" 

# monologue
# JP: そのままハチロクを確認するが、\n表情と瞳以外には、それほど変わった様子は見えない。
2381 = "我觀察八六的樣子。除了表情和眼神之外，她並沒有什麼不對勁的地方。" 

# monologue
# JP: ならばと\x%l8620;#00ffc040;8620%l;#;を改めて見る。\n\x%lピット;#00ffc040;ピット%l;#;から見上げていたのだから、まず下回り――
2393 = "我重新看向\\x%l8620;#00ffc040;８６２０%l;#;。順著八六的視線，我首先查看靠下的部分——" 

# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1546 = "「哎？」" 

# monologue
# JP: 見えている。\n見えていた。
2534 = "看見了，一直在看。" 

# monologue
# JP: 見えていたから、気付かなかった。\nいや――本当に気付けている、の、か――
2279 = "就是因為一直在看所以才沒發現。不，也許其實已經發現了——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1649 = "「我明白了」" 

# monologue
# JP: （パシャっ）
2737 = "（喀嚓）" 

# monologue
# JP: ポケットから取り出すカメラで、一枚を撮る。
2347 = "我從口袋中取出相機，拍了一張照片。" 

# monologue
# JP: 機関庫の端につんであるファイルを抜き取って、\n改修直後の\x%l8620;#00ffc040;8620%l;#;の写真と、比較する――――っ！
2410 = "接著，我從堆放在牆邊的文件夾中抽出一張\\x%l8620;#00ffc040;８６２０%l;#;剛完成修復時的照片，把兩者作對比……！" 

# 【双鉄】
# display as 雙鐵
# JP: 「……[ゆが]歪んでいる――だと」
1238 = "「……彎了」" 

# monologue
# JP: 目の錯覚だと思いたい。\nレンズの特性だと思いたい。
2345 = "我希望是自己看錯了。我希望這只是鏡頭的畸變。" 

# monologue
# JP: が、それを許してくれぬほど、\n歪みは、大きく明確だ。
2113 = "但是，彎曲已經嚴重到了不容我這麼想的地步。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なぜ……これほど――こんなになる、まで」
1762 = "「為什麼……在變成這樣之前……」" 

# 【ハチロク】
# display as 八六
# JP: 「日々、わずかずつ――\n本当にわずかずつの歪みだったのでしょう」
1830 = "「變化肯定是在平日裡一點一點、一點一點產生的」" 

# monologue
# JP: 巨大なものの、わずかな歪み。\n例えばそれは、象の背中へと乗せる藁。
2291 = "巨大物體的些許彎曲，打個比喻的話，就像是放到大象背上的稻草。" 

# 【ハチロク】
# display as 八六
# JP: 「巨大さ故に気づけぬそれは、\nわずかずつわずかずつ積み重なって……」
1567 = "「在車輛巨大的體型之下，變化顯得不明顯，經過日積月累……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「目に見えるほどになったときには、\n巨大な歪みと育ってしまっているわけか」
1757 = "「演變成了肉眼也能分辨的嚴重彎曲」" 

# monologue
# JP: 藁でさえ無数に積み重なるなら、\n象の背骨をひしゃげさせよう。
2573 = "稻草只要夠多，一樣能壓垮大象的脊樑。" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;のどこかにかかった、小さな負荷も、\nやがて底面を歪ませるほど、重なり続けてしまったのだ。
2117 = "作用在\\x%l8620;#00ffc040;８６２０%l;#;某處的小負擔不斷累積，最終弄彎了底面。" 

# 【双鉄】
# display as 雙鐵
# JP: 「歪み……というか、これは、“捻じれ”か？」
1617 = "「彎曲……正確來說應該是“扭曲”？」" 

# 【ハチロク】
# display as 八六
# JP: 「単純な損傷ではございません。\n複合的に――歪み、ねじれ、ひずんでいるのです」
1845 = "「這並非只是單一的損傷，多種形變——彎曲、扭曲、翹曲疊加在了一起」" 

# monologue
# JP: 思わずもれたつぶやきに、\n力のこもらぬ言葉が、返る。
2147 = "八六對我不經意間漏出的呢喃作出了回應。她的聲音空洞無力。" 

# 【ハチロク】
# display as 八六
# JP: 「恐らくは、あの事故のとき――\n目に見えぬ傷が残ったのです」
1630 = "「恐怕它在那場事故中負了肉眼發現不了的傷」" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を大破させ、ハチロクを眠りに至らせた事故。
2663 = "那場事故重創了\\x%l8620;#00ffc040;８６２０%l;#;，致使八六陷入了沉睡。" 

# monologue
# JP: 確かに、それほどの破壊がなければ、\nこの歪みの、端緒とさえもなれないだろう。
2273 = "如果沒有這麼強勁的破壞力，它也就不會成為彎曲變形的起因了。" 

# 【ハチロク】
# display as 八六
# JP: 「目に見えず、検査でも確認できない傷は、\nけれど力の、不正な逃げ場となったのでしょう」
1863 = "「那些肉眼發現不了的、檢查不出來的損傷處成了應力的宣洩口」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが――蓄積されて、歪んだ」
1691 = "「效果一點點累積，久而久之化為了彎曲變形」" 

# monologue
# JP: いくつもの箇所でそれが起き。
2656 = "這種情況並非僅此一處。" 

# monologue
# JP: ちいさな捻じれと歪みとひずみは、\n相互に影響を与え合い――
2081 = "些許的彎曲、扭曲、翹曲互相影響——" 

# 【ハチロク】
# display as 八六
# JP: 「そうでもなければ\x%l台枠;#00ffc040;台枠%l;#;が……\nここまで変形してしまうなど、ありえません」
1817 = "「要不然\\x%l台枠;#00ffc040;車架%l;#;……怎麼可能會彎成這樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ」
# 1900 = "「！」" 

# monologue
# JP: やはり、か。やはり、\x%l台枠;#00ffc040;台枠%l;#;自体か。\nわかっていたが、どうしても認めたくはなかった。
2578 = "竟然……真的是\\x%l台枠;#00ffc040;車架%l;#;。我已經隱約想到了，只是心裡一直不願承認。" 

# monologue
# JP: \x%l台枠;#00ffc040;台枠%l;#;は、車輌の土台にして背骨。\n歪みが即ち、全ての部位の弱さに、危険に繋がってしまう。
83 = "\\x%l台枠;#00ffc040;車架%l;#;是車輛的根基、脊柱。它一旦彎曲變形，所有部位都會變得脆弱危險。" 

# 【双鉄】
# display as 雙鐵
# JP: 「重すぎる\x%l客車;#00ffc040;客車%l;#;を引かせたせい――\n追加装備を、どんどん重ねてしまったせいか」
1716 = "「是因為我們不斷添加裝置，讓\\x%l8620;#00ffc040;８６２０%l;#;拉了過重的\\x%l客車;#00ffc040;客運車廂%l;#;嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ、双鉄様。歪みは最初からあったのです。\nそれに、わたくしたちが気づけていなかっただけのこと」
1441 = "「不是的，雙鐵少爺。彎曲一開始就有，只不過我們沒有發現而已」" 

# monologue
# JP: ハチロクの声に、慰めるような響きはない。\nただ淡々と、事実を述べているだけの口調だ。
2137 = "八六不像是在安慰我。她似乎只是在平靜地訴說事實。" 

# 【ハチロク】
# display as 八六
# JP: 「歪みに気づけていない方が、よほど恐ろしい……\n重量増や追加装備は、危険を明らかにしてくれたのです」
1822 = "「要是一直不發現反而會更危險……增重和添加裝置，使這個問題浮出了水面」" 

# monologue
# JP: けれど、体はわなないている。\nひどい寒さを堪えるように、ずっと小刻みに震えてる。
2507 = "然而，八六的身體卻在顫抖。她就像置身嚴寒之中一樣，不停地打著哆嗦。" 

# monologue
# JP: ならば、決断は僕が下そう。
2660 = "還是我來拿主意吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だとしても、だ」
1602 = "「就算是這樣」" 

# 【ハチロク】
# display as 八六
# JP: 「[けんざいか,2]顕在化している危険なら対処をすれば良いだけです。\nそしてわたくしにはそれが出来ます」
1692 = "「既然問題已經浮出水面，採取相應的措施便是。我有能力做到」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1901 = "「！？」" 

# monologue
# JP: ハチロクが早口になっている。\n僕に話させたくないかのように、次々、言葉を重ねてく。
2162 = "八六的語速突然變快。就像是不給我說話的機會一樣，她毫不間斷地說著。" 

# 【ハチロク】
# display as 八六
# JP: 「[ゆのい,1]湯医線は負荷の少ない路線です。\n振動は機関車側にしか出ずに済みます」
1755 = "「湯醫線是一條負荷比較輕的線路。我有辦法讓震動不傳到車廂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――ハチロク」
1470 = "「八六」" 

# monologue
# JP: ありえない。\nそう思うからこそ、あえて尋ねる。
2473 = "正因為我覺得這不可能，所以才要問。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさかこのまま――この\x%l8620;#00ffc040;[ハチロク,3]8620%l;#;で、\n営業運転をするといっているのではあるまいな」
1462 = "「你難道想繼續用這輛\\x%l8620;#00ffc040;[八六,3]８６２０%l;#;進行商業運營嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「あと１、２年は、\n\x%l8620;#00ffc040;[この子,3]8620%l;#;もわたくしも、保つ筈です」
1640 = "「我和\\x%l8620;#00ffc040;[這孩子,3]８６２０%l;#;再撐個一兩年應該不成問題」" 

# monologue
# JP: 真正面から答えぬままにハチロクは、\n僕の問いかけを肯定する。
2130 = "儘管八六沒有正面回答，但她承認了有這種想法。" 

# 【ハチロク】
# display as 八六
# JP: 「それだけの時間があれば、\n工場誘致を撤回させることが出来ましょう」
1834 = "「趁這段時間阻止工廠引進，時間應該足夠了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1900 = "「！」" 

# monologue
# JP: 息を呑む。
2328 = "我不禁屏息。" 

# monologue
# JP: それにつられでもしたかのように、\nハチロクもゆっくり――どこか苦しげに息を吸い込む。
2149 = "八六就像受到了我的影響一樣，慢慢地、有點痛苦地吸氣。" 

# 【ハチロク】
# display as 八六
# JP: 「撤回にさえ追い込めば……その後じっくり時間をかけて、\n大改修をすることもできるようになるのです」
1806 = "「等他們撤回引進計劃之後……我們有的是時間大修」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか」
1246 = "「……是這個意思啊」" 

# monologue
# JP: わかった。\n理解、できてしまった。
2359 = "我明白了。我終於懂了。" 

# monologue
# JP: ハチロクが――安全を第一の義務として、\n病的なまでに危険を恐れる、ハチロクが――
2135 = "八六一向把安全放在首位，她超乎尋常地畏懼危險。可是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、お前は……\n僕の、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なのだな」
1475 = "「八六，你是……我的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です。双鉄様」
1726 = "「是的，雙鐵少爺」" 

# monologue
# JP: なのに、己を曲げてまで、\n無理な運行をしようとするのは……
2206 = "可是，她卻不惜違背自己的堅持，想要強行維持運營……" 

# monologue
# JP: 僕の目的を成し遂げさせる、そのためだけのことなのだ。
2657 = "這都是為了幫助我達成目的。" 

# 【ハチロク】
# display as 八六
# JP: 「ですので、どうか――\nわたくしと\x%l8620;#00ffc040;[この子,3]8620%l;#;をお使いください」
1662 = "「所以，請您使用我和\\x%l8620;#00ffc040;[這孩子,3]８６２０%l;#;」" 

# monologue
# JP: 凛とした声。\nもはや迷いの混じらぬ瞳。
2166 = "八六聲音凜然，眼神堅定。" 

# monologue
# JP: であるというのに――\nその指先のわずかな震えは、止まらない。
2111 = "但是，她的指尖卻在不停地顫抖。" 

# 【ハチロク】
# display as 八六
# JP: 「壊れ、埋もれていくはずのわたくしたちに、\nふたたびの命を与えてくださったのは、双鉄様です」
1501 = "「原本等待我們的是在角落裡腐壞的命運，是雙鐵少爺給了我們第二次生命」" 

# monologue
# JP: だから、僕には確信できる。\nハチロクには、疑いようもなく魂がある。
2228 = "因此我能確信，八六毫無疑問有著靈魂。" 

# monologue
# JP: 理性で、頭で理解していて――\nけれど魂と身体とは、その結論に従えずにいる。
2260 = "她的靈魂和身體正在反抗理性得出的結論。" 

# 【ハチロク】
# display as 八六
# JP: 「あの美しいクマ川を、優しい御一夜の人と暮らしを――\n守り抜くため、どうぞわたくしたちを使ってください」
1761 = "「為了保護那條美麗的隈河，保護御一夜善良的人們以及他們的生活，請您使用我們吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――おいで」
1482 = "「八六，過來」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄……様？」
1892 = "「雙鐵……少爺？」" 

# monologue
# JP: 機関庫の床に跪き、\n\x%lピット;#00ffc040;ピット%l;#;の中へと、両手を思い切り差し伸べる。
2385 = "我跪在機車庫的地面上，用力往\\x%lピット;#00ffc040;維修區%l;#;裡伸出雙手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「くるんだ、ハチロク」
1624 = "「快過來，八六」" 

# 【ハチロク】
# display as 八六
# JP: 「しかし……わたくし――\nススと油とで服を汚して」
1522 = "「可是……我身上都是煤灰和油汙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も同じだ。構わんさ」
1638 = "「我也一樣，沒關係」" 

# 【ハチロク】
# display as 八六
# JP: 「は……い」
1583 = "「好的……」" 

# monologue
# JP: ハチロクの身体を両手で包む。\nハチロクもその手を伸ばし、僕の体に手を回す。
2397 = "我雙手摟住八六的身體。八六也伸手勾住我的後背。" 

# monologue
# JP: 僕の体にだきついてなお、\nハチロクの指のふるえは、とまらない。
2264 = "她靠在了我的身上，但她的手指依舊抖個不停。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん――」
1549 = "「唔——」" 

# monologue
# JP: その態勢で、ハチロクを\x%lピット;#00ffc040;ピット%l;#;から引き上げる。
2343 = "我就這樣把八六從\\x%lピット;#00ffc040;維修區%l;#;里拉了上來。" 

# monologue
# JP: 手応え。柔らかさ。あたたかさ。\nハチロクは生き――生きるが故に、苦しんでいる。
2399 = "手中傳來的是既柔軟又溫暖的觸感。八六是有生命的，正因為活著所以才會痛苦。" 

# 【ハチロク】
# display as 八六
# JP: 「あ――」
1552 = "「啊——」" 

# monologue
# JP: だから、そのまま抱きしめる。\nその苦しみを引き受けたくて。
2380 = "我緊緊抱住她不放，想要分擔她的痛苦。" 

# 【ハチロク】
# display as 八六
# JP: 「あの……双鉄様」
1894 = "「雙鐵少爺……請問……」" 

# monologue
# JP: 鼓動は、僕のものだけだ。\n普段よりも、速くなってる。
2476 = "此刻我只能感受到自己的心跳——節奏遠比平常來得更快。" 

# monologue
# JP: 事態はそれほど深刻なのだと、僕の身体も理解している。
2374 = "我的身體也明白情況是何等緊急。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――僕を信じて、今は休め」
1792 = "「相信我。你現在先好好休息吧」" 

# monologue
# JP: ハチロクは眠る。\n人間とまるで変わらずに。
2158 = "八六會像人類一樣睡覺。" 

# monologue
# JP: そこに魂がある以上、\nきっと、休息は必要だから。
2654 = "這一定是因為有著靈魂的她需要休息。" 

# 【ハチロク】
# display as 八六
# JP: 「しかし……あの――」
1521 = "「可是……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「休んだのちに目覚めたのなら、\nそのときはまた、僕のために力を貸してくれ」
1582 = "「好好休息，等你睡醒以後再繼續幫我吧」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1552 = "「啊——」" 

# monologue
# JP: ハチロクの体から力が抜ける。\n指先の震えが止まる。
2157 = "八六放鬆了下來，她的手指不再顫抖。" 

# monologue
# JP: それが安堵のせいなのか、\nあきらめのせいなのかまでは、わからない。
2327 = "我不知道她是安心了還是死心了。" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。\n双鉄様、いまは、お言葉に甘えます」
1648 = "「我明白了。雙鐵少爺，那就恭敬不如從命了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「甘えろ。言葉だけでなく」
1688 = "「放心照我說的做吧」" 

# monologue
# JP: （ぐっ）
2744 = "（腳步聲）" 

# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
1545 = "「哎！？」" 

# 【れいな】
# display as 玲奈
# JP: 「いいですねぇ、ハチロクさん。\nれいな、うらやましいですよぉ」
1798 = "「真好啊，八六小姐。玲奈好羨慕」" 

# 【コン】
# display as 空
# JP: 「ケンっ！」
1537 = "「吭！」" 

# monologue
# JP: れいなの声。\nエサを与えていたのだろうか、コンを引き連れやってくる。
2445 = "是玲奈的聲音。可能剛餵完食吧，她帶著空走了過來。" 

# monologue
# JP: 無邪気なひとりと一匹は、\n目をきらきらと、僕とハチロクを見つめている。
2250 = "她們兩眼放光，天真無邪地注視著我和八六。" 

# 【コン】
# display as 空
# JP: 「ケンっ！」
# 1537 = "「吭！」" 

# monologue
# JP: コンはお腹を見せてころがり、\n撫でろ撫でろと要求してくる。
2575 = "空露出了肚子，想讓我們去撫摸它。" 

# monologue
# JP: が、今は――
2208 = "可是，現在——" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、また今度にしてくれ。\n今は、ハチロクを甘えさせたい気分でいるのだ」
1673 = "「抱歉，下次吧。我現在想好好陪陪八六」" 

# 【ハチロク】
# display as 八六
# JP: 「ぁ……」
1553 = "「啊……」" 

# monologue
# JP: 諦めたような、困ったような小さな息。
2142 = "八六像是在表示無奈又像是在為難。" 

# monologue
# JP: そしてハチロクは僕の耳元、\n一転優しい、安心したような声を出す。
2409 = "接著，她語氣一變，在我耳邊發出溫柔又平靜的聲音。" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄様。\nそれでは今は――わたくし、甘えさせていただきます」
1651 = "「我明白了，雙鐵少爺。那我就恭敬不如從命了」" 
