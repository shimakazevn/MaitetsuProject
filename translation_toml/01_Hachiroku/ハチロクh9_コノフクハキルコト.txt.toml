[characters]
2767 = "Hachiroku men theo thành bồn tắm,\nchậm rãi tiến về phía này."
2913 = "Sao lại——\nNgay khi vừa thắc mắc, tôi đã tìm ra câu\ntrả lời."

[character_subs]
2859 = "Cô ấy đã nhanh chóng xua tan bầu không khí\nsắp trở nên gượng gạo.\nChỗ này cứ ngoan ngoãn nương theo cô ấy\nvậy."
3425 = "雙鐵"
3402 = "鈴"

[script]
# lines: 635 
# 【ハチロク】
# display as 八六
# JP: 「……双鉄様、そちらはいかがですか？」
1431 = "「……Ngài Soutetsu, bên ngài thế nào rồi ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、全くだ。これは一度、覚悟を決めて――」\n部屋の中の物を全て、外に出すべきなのかもしれんな」
2564 = "「Không, hoàn toàn chưa đâu. Có lẽ chúng ta\nphải hạ quyết tâm một lần——\nchuyển toàn bộ đồ đạc trong phòng ra ngoài\nthôi.」"

# 【ハチロク】
# display as 八六
# JP: 「この部屋の中のものを、全てでございますね？」
2337 = "「Đúng vậy.」"

# monologue
# JP: ハチロクの、いつもどおりの端正な声。
2882 = "Giọng nói đoan trang như thường lệ của\nHachiroku."

# monologue
# JP: それがいささかうんざり気味に聞こえてしまうのは、\nおそらくむしろ、僕の気持ちのせいだろう。
3262 = "Việc tôi nghe nó có vẻ hơi chán chường,\ncó lẽ là do tâm trạng của tôi thì đúng\nhơn."

# 【双鉄】
# display as 雙鐵
# JP: 「正直言って、まったくやりたいことではない。\nけれど――すまん。他に方法が思いつかない」
2494 = "「Anh hai——Anh trai,\nanh quen biết thị trưởng từ lúc nào vậy?」"

# 【ハチロク】
# display as 八六
# JP: 「すまんだなどと、おっしゃらないでくださいまし。\nわたくしは、楽しく、嬉しく感じておりますよ？」
2514 = "「Xin ngài đừng nói lời xin lỗi như vậy.\nEm đang cảm thấy rất vui và hạnh phúc mà?」"

# 【双鉄】
# display as 雙鐵
# JP: 「楽しく嬉しい？　探し物がか」
2273 = "「C-Cơ thể á!?\nC-Cách——xoa bóp——cơ thể á!?」"

# 【ハチロク】
# display as 八六
# JP: 「いいえ。探し物は好みません。よく整頓され、\n所定の物が、所定の場所にあることを好みます」
2296 = "「Hả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。なら、何故」
2396 = "「Nghe nói đầu máy loại 8620 của Hachiroku,\nsẽ là điểm nhấn lớn để thu hút khách du\nlịch.」"

# 【ハチロク】
# display as 八六
# JP: 「ことばにせねば――双鉄様には伝わりませんか？\nこのひととき、双鉄様には退屈で苦しいだけ、ですか？」
2224 = "「Nếu không nói ra bằng lời——Ngài Soutetsu\nsẽ không hiểu được sao?\nKhoảnh khắc này, đối với Ngài Soutetsu chỉ\ntoàn là nhàm chán và khổ sở thôi sao?」"

# monologue
# JP: （そっ――）
3516 = "（Sột——）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2624 = "「っ!」"

# monologue
# JP: ハチロクの手が、控えめに動く。
2877 = "Bàn tay của Hachiroku rụt rè di chuyển."

# monologue
# JP: ごくさり気なく、ほんの僅かに、\n僕の手の甲に重なってくる。
2975 = "Thật tự nhiên, và chỉ một chút thôi,\nbàn tay em đặt lên mu bàn tay tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「……資料の山に圧倒されて、\nどうも、気持ちまで埋めてしまっていたようだ」
1413 = "「……Bị áp đảo bởi núi tài liệu,\ncó vẻ như đến cả tâm trạng của anh cũng bị\nchôn vùi theo rồi.」"

# monologue
# JP: “目的は達成すべきもの”――\nそれができぬなら、僕に生きている価値などない。
1348 = "\"Mục đích là thứ phải đạt được\"——\nNếu không làm được điều đó, thì tôi chẳng\ncó giá trị gì để sống cả."

# monologue
# JP: 死なずに生きる、その支えとしてきた思考法は、\n今でも僕の、骨の髄にまで染み込んでいるらしい。
3211 = "Cách tư duy đã làm chỗ dựa cho tôi sống\nsót,\ncó vẻ như đến giờ vẫn ngấm sâu vào tận\nxương tủy tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「が、考えてみれば、お前とふたり、同じ場所で、\n同じ時を、これほど密に過ごせているのだ」
1960 = "「Nhưng nghĩ lại thì, chỉ có hai chúng ta,\nở cùng một nơi,\ncùng một thời điểm, và đang trải qua\nkhoảng thời gian thân mật đến thế này.」"

# monologue
# JP: 重ねられた手を、にぎり返す。\n小さく。暖かく。柔らかい。
3166 = "Tôi nắm lấy bàn tay đang đặt lên tay mình.\nNhỏ nhắn. Ấm áp. Mềm mại."

# 【双鉄】
# display as 雙鐵
# JP: 「――とても楽しく、幸せだ」
1364 = "「——Rất vui, và hạnh phúc.」"

# 【ハチロク】
# display as 八六
# JP: 「はい」
2387 = "「Mệt rồi. Đi ngủ thôi.」"

# monologue
# JP: 短く、強く、飾り気なく。
3091 = "Ngắn gọn, mạnh mẽ, và không chút giả tạo."

# monologue
# JP: それだけに、ハチロクの――\nいや、すずの気持ちが鳴り響く。
2860 = "Là bởi vì thế đó, em ấy nói."

# 【ハチロク】
# display as 鈴
# JP: 「わたくしも同じ気持ちです」
2302 = "「Em cũng có cùng cảm nhận như vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは嬉しい。\nが――同じであるなら、些かの疲労もあるはずだ」
2572 = "「Nghe vậy anh rất vui.\nNhưng——nếu cùng cảm nhận, thì chắc hẳn em\ncũng phải thấy đôi chút mệt mỏi chứ.」"

# 【ハチロク】
# display as 鈴
# JP: 「まぁ、双鉄様はいじわるですね」
2609 = "「Chà, Ngài Soutetsu thật là xấu tính.」"

# monologue
# JP: ムードを壊した。\nすずは恐らく、その一点を不満に感じて、スネている。
3157 = "Tôi đã phá hỏng bầu không khí rồi.\nCó lẽ Suzu đang bất mãn vì điểm đó, nên\nmới hờn dỗi."

# monologue
# JP: が、すず相手なら、\n僕とてそこまで朴念仁ではいられない。
2839 = "Ngay cả trong khoảng thời gian sống không\nbằng chết đó,\ntôi vẫn trải qua mỗi ngày."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、疲労を回復するために――\n熱量を、お互いに補給しあいたいのだが」
2348 = "「Vì vậy, để xua tan mệt mỏi——\nAnh muốn chúng ta cùng nhau bổ sung nhiệt\nlượng.」"

# 【ハチロク】
# display as 鈴
# JP: 「あ」
2092 = "「A, cháu xin lỗi.」"

# monologue
# JP: すずの瞳に、ぽっ、と小さな火が灯る。\nその火に、僕の影を重ねる。
3410 = "Trong đôi mắt Suzu, một ngọn lửa nhỏ bùng\nlên.\nTrong ngọn lửa ấy, phản chiếu hình bóng\ncủa tôi."

# 【ハチロク】
# display as 鈴
# JP: 「あ――んっ」
2087 = "「A——ưm」"

# monologue
# JP: 短い口づけ。\nすぐさますずは、それを何度も繰り返す。
3280 = "Một nụ hôn ngắn ngủi.\nSuzu ngay lập tức lặp đi lặp lại nó nhiều\nlần."

# 【ハチロク】
# display as 鈴
# JP: 「――ちゅっ――ちゅっ、ちゅっ――ちゅむ、ちゅっ、\nちゅっ、ちゅうっ――ちゅっ――ちゅむ――れるっ」
1358 = "「——Chụt——chụt, chụt——chụt, chụt,\nchụt, chụttttt——chụt——chụt——liếm lútttt」"

# monologue
# JP: すずの短い舌がおずおず、僕の唇を舐めてくる。\n吸い込むように招き入れ、舌と舌とを絡め、楽しむ。
3412 = "Chiếc lưỡi ngắn ngủi của Suzu rụt rè liếm\nlên môi tôi.\nTôi đón nhận nó như đang hút vào, để hai\nchiếc lưỡi quấn lấy nhau, và tận hưởng."

# 【ハチロク】
# display as 鈴
# JP: 「ふっ……あっ――んっ――れるるっ――ちゅっ――\nれろっ――れりゅうっ――るっ――ん――むちゅっ」
2035 = "「Hu……a——ưm——liếm——chụt——\nliếm láp——mút mát——ưm——ưm——mu chu」"

# monologue
# JP: 短く熱い鼻腔からの排気が顔をくすぐる。\n僕の全身も熱を帯びる。もっと密着したくなる。
3447 = "Từng hơi thở ngắn và nóng rực từ khoang\nmũi phả vào khiến mặt tôi nhồn nhột.\nToàn thân tôi cũng nóng lên. Tôi muốn áp\nsát vào em hơn nữa."

# 【ハチロク】
# display as 鈴
# JP: 「ちゅっ――れるっ――れろっ――ちゅううう――\nちゅるっ――（こくっ）――んっ――ちゅっ、ちゅむ」
2120 = "「Chụt——liếm——mút——chụttttt——\nchóp chép——（Ực）——ưm——chụt, chụt」"

# monologue
# JP: すずの排気に煽られて、体が、こころが、燃えていく。\nキスより、更に進みたくなる。
2958 = "Hoặc có lẽ đây là nơi mà em ấy cực kỳ yêu\nthích."

# 【双鉄】
# display as 雙鐵
# JP: 「――すず」
1365 = "「——Suzu」"

# 【ハチロク】
# display as 鈴
# JP: 「はい、双鉄様」
2414 = "「Nếu vậy thì——\nThị trưởng Paulette có chút đáng thương\nnhỉ.」"

# monologue
# JP: 名を呼べば、すずは全身の力を抜いて、\n僕に全てを預け――っ！？
3131 = "Khi tôi gọi tên, Suzu buông lỏng toàn\nthân,\ngiao phó tất cả cho tôi——!?"

# 【ハチロク】
# display as 鈴
# JP: 「え？」
2065 = "「Hả?」"

# monologue
# JP: いかん、バランス――っ！！！？
2815 = "Không xong rồi, mất thăng bằng——!!!?"

# monologue
# JP: （どんっ！）
3515 = "（Rầm!）"

# 【ハチロク】
# display as 鈴
# JP: 「きゃっ！！？」
2019 = "「Chỉ cần ấn đúng huyệt là được thôi ạ.」"

# monologue
# JP: （どさどさどさどさっ！！！）
3488 = "（Loảng xoảng loảng xoảng!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「すずっ！！\nぐっ！？　ぬっ――がっ！！」
2591 = "「Suzu!!\nKhục!? Ư——a!!」"

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様っ！？」
2608 = "「Ngài Soutetsu!?」"

# monologue
# JP: 覆い被さりすずを庇えば、\n背中に重みが何度も何度もぶつかってくる。
3190 = "Tôi che chở cho Suzu ở bên dưới,\nnhững vật nặng liên tiếp đập vào lưng tôi."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまっ！」
2607 = "「Ngài Soutetsu!」"

# monologue
# JP: 無事だと応えてやりたいが、ヘタに喋れば舌を噛む。
3146 = "Giống như đã quay lại, nhưng lại tiến thêm\nmột bậc cầu thang xoắn ốc——\nChắc chắn phải có điều gì đó đã được tích\nlũy thêm."

# monologue
# JP: すずをすっぽり胸に収めて、はみ出させぬこと。\n今はそれだけに集中し、落下の雨が収まるのを待つ。
3128 = "Không thèm xưng tên lại.\nBà chủ Tororyu-yu chỉ phẩy tay nhẹ như thể\nđã hiểu."

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1389 = "「…………」"

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様、双鉄様っ！　双鉄様っ！！」
2611 = "「Ngài Soutetsu, Ngài Soutetsu! Ngài\nSoutetsu!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………大丈夫だ、すず。何事もない」
1399 = "「……Anh không sao đâu, Suzu. Không có\nchuyện gì đâu.」"

# 【ハチロク】
# display as 鈴
# JP: 「何事もないかどうかなど、\nご自身だけでお分かりになるものではございませぬ！」
2277 = "「Có chuyện gì hay không,\nngài không thể tự mình quyết định được\nđâu!」"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2169 = "「Ưm」"

# 【ハチロク】
# display as 鈴
# JP: 「どうぞ、おつむをお見せください。……こぶなどは\nできていないようですね。それでは、おせなを」
2516 = "「Xin hãy cho em xem đầu ngài. ……Có vẻ như\nkhông có cục u nào. Vậy thì, đến lưng ạ」"

# monologue
# JP: ……すずの言葉に従って、しゃがみ、立ち上がり\n振り向き、手足をいちいち動かす。
3189 = "……Làm theo lời Suzu, tôi ngồi xổm, đứng\nlên\nquay lại, và cử động tay chân từng chút\nmột."

# 【ハチロク】
# display as 鈴
# JP: 「よかった……本当に[だいじ,1]大事無かったご様子ですね。\nありがとうございます。わたくしをかばってくださって」
2212 = "「May quá……Có vẻ ngài thực sự không sao\nrồi.\nCảm ơn ngài. Vì đã che chở cho em.」"

# 【双鉄】
# display as 雙鐵
# JP: 「大事なお前だ。当然守るし――\nそれにより僕が傷つけば、お前も傷つくと知っている」
1933 = "「Em là người quan trọng của anh mà. Đương\nnhiên anh phải bảo vệ em rồi——\nAnh biết nếu anh bị thương, em cũng sẽ đau\nlòng.」"

# 【ハチロク】
# display as 鈴
# JP: 「はい」
2403 = "「Chà, nói ở đây thì thà đi xem tận mắt còn\nnhanh hơn nhỉ.\nNó ở đâu vậy anh?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、自分の身も大切にするさ。\nが――今回の場合は、それ以前の部分で軽率だった」
2342 = "「Vì thế, anh cũng sẽ trân trọng bản thân\nmình.\nNhưng——trong trường hợp này, anh đã bất\ncẩn từ trước đó rồi.」"

# 【ハチロク】
# display as 鈴
# JP: 「あっ」
# 2092 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。『ハチロク』」
2248 = "「Che phía trước rồi đấy.\nHibiki, yên tâm chà lưng cho tôi đi.」"

# 【ハチロク】
# display as 八六
# JP: 「まことに左様でございますね。双鉄様」
2436 = "「Quả đúng là vậy ạ. Ngài Soutetsu.」"

# monologue
# JP: 髪を整え、着衣に乱れ無いことを手早く確かめて、\nハチロクは、凛と背筋を伸ばし直す。
2869 = "Chỉnh lại mái tóc, nhanh chóng kiểm tra\nxem trang phục có xộc xệch không,\nHachiroku vươn thẳng lưng đầy kiêu hãnh."

# 【ハチロク】
# display as 八六
# JP: 「お仕事がらみの探し物の最中に、\nわたくしごとで――こころを乱してしまいました」
2451 = "「Chuyến \\x%l列車;#00ffc040;tàu%l;#; này…… đang đi về đâu vậy nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「わたくしごと、か」
1980 = "「Chuyện cá nhân, sao.」"

# monologue
# JP: 実に、ハチロクらしい一言だ。\n耳から、こころが幸せになる。
3387 = "Quả thực là một câu nói rất giống phong\ncách của Hachiroku.\nTừ đôi tai, trái tim tôi ngập tràn hạnh\nphúc."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、お前の“わたくしごと”の一部であることを、\n本当に嬉しく光栄に思う」
2328 = "「Ví dụ như, chỗ này——nhỉ? Ngài thấy sao\nạ?」"

# 【ハチロク】
# display as 八六
# JP: 「一部どころか、ほとんど全部でございますよ？\n双鉄様」
1881 = "「Chà lưng…… hay đúng hơn là.\nỜm, việc hai người tắm chung với nhau, cảm\ngiác cứ sao sao ấy——」"

# monologue
# JP: いいながら、ハチロクの短い指が伸ばされる。\nそのままぴとり、僕の唇を優しくふさぐ。
3364 = "Vừa nói, Hachiroku vừa đưa ngón tay ngắn\nngủi ra.\nCứ thế nhẹ nhàng chạm vào, dịu dàng bịt\nlấy môi tôi."

# 【ハチロク】
# display as 八六
# JP: 「ですので、わたくしのこころをあまやかすお言葉は\n――どうぞ夜まで、ひそかに閉じておいて下さいまし」
2346 = "「Vì vậy, những lời nói làm chiều chuộng\ntrái tim em\n——xin ngài hãy tạm cất giữ cho đến tối\nnhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「わたくしごとの時間まで、か」
2453 = "「Căn phòng này được dọn dẹp gọn gàng quá\nnhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「うふふ、左様ですね。\nわたくしごとの時間になったら――どうぞ、ふたたび」
2025 = "「Đáng thương?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そのときを楽しみに、\n今は公私の公に励むか」
2576 = "「Nếu vậy, anh sẽ mong chờ đến lúc đó,\ncòn bây giờ thì tập trung vào việc công\nthôi nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「はい！　双鉄様」
2405 = "「Vâng! Ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「まずは……落下物だな。\nどうせなら、これらから外に出してしまおう」
2618 = "「Trước tiên là……những thứ bị rơi xuống.\nTiện thể thì mang luôn đống này ra ngoài\nđi.」"

# 【ハチロク】
# display as 八六
# JP: 「心得ました――あら」
2316 = "「Em rõ rồi ạ——Ô kìa」"

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2197 = "「Hửm?」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま……ひょっといたしましたら、これ」
2605 = "「Ngài Soutetsu……không chừng, thứ này」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――おお！」
2196 = "「Ưm? ——Ồ!」"

# monologue
# JP: 棚からぼたもちとはこのことか。
3386 = "Đây chính là \"Bánh botamochi từ trên kệ\nrơi xuống\" (chó ngáp phải ruồi) sao."

# monologue
# JP: あれほど探して見つからなかったものが、\nよもや自ら落ちてくるとは。
3201 = "Thứ mà chúng tôi tìm mãi không thấy,\nkhông ngờ lại tự rơi xuống thế này."

# 【ハチロク】
# display as 八六
# JP: 「『御一夜機関区機関車配置表』\n――間違いございませんね」
1380 = "「\"Bảng bố trí đầu máy Khu cơ vụ Ohimitera\"\n——Không sai vào đâu được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……明智末期から正和十年代までが揃っているか。\nこれなら、ポーレットの要求を満たそう」
1410 = "「……Có đầy đủ từ cuối thời Minh Trị (Meiji)\nđến những năm đầu thời Chính Hòa (Showa)\nsao.\nThế này thì đáp ứng được yêu cầu của\nPaulette rồi.」"

# monologue
# JP: 僕の言葉に小さく頷き、ハチロクは目を――\n嬉しさと不安が混じえた瞳を向けてくる。
2996 = "Khẽ gật đầu trước lời nói của tôi,\nHachiroku nhìn tôi——\nbằng đôi mắt xen lẫn niềm vui và sự bất\nan."

# 【ハチロク】
# display as 八六
# JP: 「新しい[でもの,1]出物、でございますか」
1909 = "「Không đâu. Lời nói và hành động của Navi\nkhông hề mâu thuẫn.」"

# monologue
# JP: 出物――すなわち、蒸気機関車。
3384 = "Món hàng——tức là, đầu máy hơi nước."

# monologue
# JP: お役御免になったものが一両、\nレイルロオドとともに手放されるという話。
3300 = "Có thông tin nói rằng một đầu máy đã hết\nhạn sử dụng,\nsẽ được thanh lý cùng với Railord của nó."

# 【双鉄】
# display as 雙鐵
# JP: 「争奪戦になっているようだからな。\n過去の繋がりなどがもし見つかればとのことだった」
2221 = "「Có vẻ như đang xảy ra một cuộc tranh\ngiành.\nNếu tìm thấy được mối liên hệ trong quá\nkhứ thì tốt biết mấy.」"

# 【ハチロク】
# display as 八六
# JP: 「過去の繋がりが、\n全て良いものとは限らないかとも思いますが」
2563 = "「Mối liên hệ trong quá khứ,\nem nghĩ không phải lúc nào cũng là điều\ntốt đẹp đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。レイルロオドが嫌な記憶でも残していれば\n――確かに、却って不利になりかねんか」
2385 = "「À, ừ. Cũng hơi mệt một chút.」"

# 【ハチロク】
# display as 八六
# JP: 「いえ、そのようなことはございません。\nレイルロオドは物です。決定に影響は及ぼしません」
1886 = "「Không, không có chuyện đó đâu ạ.\nRailord là vật phẩm. Không gây ảnh hưởng\nđến quyết định đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことはなかろう。ハチロクもれいなも、\n僕やポーレットの決定に大いに影響を及ぼしている」
2435 = "「Làm gì có chuyện đó. Cả Hachiroku và\nReina,\nđều đang ảnh hưởng rất lớn đến quyết định\ncủa anh và Paulette đấy thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「それは……」
2569 = "「Điều đó……」"

# monologue
# JP: 少しだけ困ったような、\nけれどもほんわり、暖かな笑み。
3044 = "Hibiki ngơ ngác nghiêng đầu."

# 【ハチロク】
# display as 八六
# JP: 「御一夜鉄道が例外――\n特別というだけの話でございます」
2269 = "「À, xin lỗi.\nTôi không có ý đó đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
2411 = "「Vậy sao?」"

# 【ハチロク】
# display as 八六
# JP: 「はい。以前にもお話ししたかと記憶しておりますが、\n例えば、[ていおう,1]帝央機関区では――」
2157 = "「Vâng. Em nhớ là đã từng nói với ngài rồi,\nví dụ như ở Khu cơ vụ Teio thì——」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだったな。8620形レイルロオドは、\nお前以外は、ハロ１、ハロ２の連番だったと」
2103 = "「Ừ. Ngủ ngon nhé, Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。そちらの方が一般的です。呼称から全て、\nレイルロオドは、物と扱われる方が一般的なのです」
2168 = "「Mong sao——nhanh chóng đến được ga cuối.」"

# monologue
# JP: 口調は淡々としているが、\n気持ちの方は、口調程に穏やかではなさそうだ。
3021 = "Khuôn mặt Hibiki liên tục gật gù,\ndần dần ửng đỏ lên như một hòn than đang\nđược nung nóng."

# monologue
# JP: 落ちた資料を拾ってはいるが、右から左。\nらしくもなく、ただ雑然と移動させ――うむ？
3004 = "Dù đang nhặt những tài liệu bị rơi, nhưng\nlại chuyển từ phải sang trái.\nThật không giống em ấy chút nào, chỉ đang\ndi chuyển một cách lộn xộn——ưm?"

# 【双鉄】
# display as 雙鐵
# JP: 「随分と立派な風呂敷包みだな、それは」
2570 = "「Gói đồ bọc bằng khăn Furoshiki đó trông\nlộng lẫy quá nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「はい？　風呂敷――あ！　ああ、本当――\nって、双鉄様？　これ、覚え書きが……」
1917 = "「Dạ? Khăn Furoshiki——a! A, đúng thật——\nƠ, Ngài Soutetsu? Cái này, có tờ ghi\nchú……」"

# 【双鉄】
# display as 雙鐵
# JP: 「どれどれ、ふむ――」
2324 = "「Đâu để anh xem, hừm——」"

# monologue
# JP: 小さな紙片に、几帳面なボールペン文字。\nさして重要そうな感じはうけぬが――
3077 = "Trên mảnh giấy nhỏ là những dòng chữ viết\nbằng bút bi nắn nót.\nTrông không có vẻ gì là quan trọng lắm,\nnhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 『レイルロオドヨウ。コノフクハキルコト』――か」
1385 = "\"DÀNH CHO RAILORD. PHẢI MẶC BỘ QUẦN ÁO\nNÀY\"——sao."

# 【ハチロク】
# display as 八六
# JP: 「この服は着ること。レイルロオド用とは……\n一体、どのこのためのものだったのでしょうか？」
2114 = "「Phải mặc bộ quần áo này. Dành cho Railord\nsao……\nRốt cuộc, nó được dành cho ai vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「さてな。さっきの機関車配置表を見てみても――」
1952 = "「Hà, ra đây là người nhà Migita sao.\nĐẹp trai phết nhỉ. Còn bên trong thế nào\nthì không biết.」"

# 【ハチロク】
# display as 八六
# JP: 「ほんの数十年前には、まことに栄えていたのですね、\n御一夜機関区は」
2264 = "「Chỉ vài chục năm trước thôi, Khu cơ vụ\nOhimitera\nđã từng rất phồn vinh ngài nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2387 = "「是啊」" 

# monologue
# JP: 3100形、4110形、5700形、6760形、8620形――\nC51形、C55形。――D51形の名もみえる。
3520 = "Dòng 3100, dòng 4110, dòng 5700, dòng\n6760, dòng 8620——\nDòng C51, dòng C55. ——Cả tên dòng D51 cũng\ncó."

# monologue
# JP: 気動車も含めれば、さらに多種多様となろうし……\nと、いうことは、だ――
3290 = "Nếu tính cả toa xe tự hành, thì còn đa\ndạng hơn nữa……\nĐiều đó có nghĩa là——"

# 【双鉄】
# display as 雙鐵
# JP: 「特定のレイルロオドのためのものであったのならば、\n愛称なり機体番号なりも記したのではなかろうか？」
2370 = "「Nếu nó được dành cho một Railord cụ thể,\nthì chẳng phải sẽ ghi rõ biệt danh hay số\nhiệu máy sao?」"

# 【ハチロク】
# display as 八六
# JP: 「では、この風呂敷包みの中身は、誰もが着るもの\n……例えば、昔の制服などでしょうか？」
2352 = "「Vậy thì, bên trong gói Furoshiki này, là\nthứ mà ai cũng có thể mặc\n……Ví dụ như, đồng phục ngày xưa chẳng\nhạn?」"

# 【双鉄】
# display as 雙鐵
# JP: 「制服ならば、\n日々姫やポーレットの参考になるかもしれんな。ふむ」
2226 = "「Cũng có những chuyện không thể nhớ ra\nđược nhỉ.\nNhiều thứ, chắc chắn là——cả những chuyện\nquan trọng nữa.」"

# monologue
# JP: 真闇姉から、この部屋にある全てについては、\n僕が被相続人であると明言されてる。
3274 = "Chị Mayami đã nói rõ rằng, về tất cả những\nthứ trong căn phòng này,\ntôi là người thừa kế hợp pháp."

# monologue
# JP: 汰斗さんのご遺志自体も、\n『この服は着ること』なのだし――
3244 = "Bản thân di nguyện của ông Taito cũng là\n\"Phải mặc bộ quần áo này\"——"

# 【双鉄】
# display as 雙鐵
# JP: 「風呂敷を解いてみよう」
2356 = "「Thử mở gói Furoshiki ra xem sao.」"

# 【ハチロク】
# display as 八六
# JP: 「左様でございますね」
# 2169 = "「嗯」" 

# monologue
# JP: 嬉しげな声。
3042 = "Hai má Hibiki phồng lên.\nNước mắt cũng bắt đầu ứa ra."

# monologue
# JP: ほれ、と風呂敷を手渡せば、\n待ちかねていたかのように、指もいそいそ動き出す。
3155 = "Giọng nói vui vẻ."

# 【ハチロク】
# display as 八六
# JP: 「まぁ――これは華やかですこと」
2059 = "\"Đây,\" tôi đưa gói Furoshiki cho em,\nnhững ngón tay em thoăn thoắt cử động như\nthể đã chờ đợi từ lâu."

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2198 = "「Nói vậy tức là.\nChúng cháu được phép vào tắm sao ạ?」"

# monologue
# JP: 新品だ。ぴっちりビニールに包まれて、\nその中には、能書きらしきものが同梱されてる。
3344 = "Đồ mới tinh. Được bọc kín trong túi ni\nlông,\nbên trong có kèm theo một tờ giấy trông\nnhư bản mô tả."

# 【ハチロク】
# display as 八六
# JP: 「[ビイル,1]麦酒列車用試作品」
2115 = "「Nếu không có ai quấy rầy, và cô ấy có thể\nnói thỏa thích——\nThì em nghĩ người đó có thể truyền đạt\nđược \"màu đỏ là màu đỏ\".」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、イベント列車用のコスチュームか。\n鉄道黄金期にも、そのような営業努力があったのだな」
2072 = "「À, trang phục dùng cho tàu sự kiện sao.\nNgay cả trong thời kỳ hoàng kim của đường\nsắt, cũng có những nỗ lực kinh doanh như\nvậy nhỉ.」"

# monologue
# JP: 言えばけれども、静かにハチロクの頭が振られる。
2837 = "Để không kéo tôi theo vào khoảnh khắc cái\nchết ập đến——\nMichiko đã cắt đứt mối liên kết với tôi."

# 【ハチロク】
# display as 八六
# JP: 「それは逆です、双鉄様」
2512 = "「Ngược lại mới đúng ạ, Ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「逆？」
2006 = "「Ngược lại?」"

# 【ハチロク】
# display as 八六
# JP: 「そのような営業努力があってはじめて、\n[ていてつ,1]帝鉄の最盛期は、花開いたのです」
2258 = "「Chính nhờ có những nỗ lực kinh doanh như\nvậy,\nthời kỳ hoàng kim của Đường sắt Hoàng gia\n(Teitetsu) mới được nở rộ ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうだな、そのとおりだ。\nしかし……ならば、何故使われなかったのかな？」
2067 = "「À——đúng vậy nhỉ, em nói đúng.\nNhưng mà……nếu vậy, tại sao nó lại không\nđược sử dụng?」"

# 【ハチロク】
# display as 八六
# JP: 「麦酒列車自体の計画が潰れたか――\nあるいは、別の試作品がより優れていた、とか」
2014 = "「Có thể là do kế hoạch Tàu bia đã bị hủy\nbỏ——\nHoặc là, có một sản phẩm thử nghiệm khác\nxuất sắc hơn chẳng hạn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ありそうな話だ。\nとはいえ、これも――」
1974 = "「Ra vậy, nghe có vẻ hợp lý đấy.\nDù sao thì, cái này cũng——」"

# monologue
# JP: 解いてしまった風呂敷だ。\nビニール包みを破くことにも、抵抗は無い。
2906 = "Đã cất công mở gói Furoshiki ra rồi.\nCũng chẳng có lý do gì để chần chừ xé bỏ\nlớp túi ni lông."

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　まぁまぁまぁ！！」
2051 = "「Hả? Không phải——ưm, cái đó——\nMột chút——ờm, chuyện, công việc…… thôi.」"

# monologue
# JP: 黒、白、赤。\nたくさんのレースに、フリルにリボン。
3442 = "Đen, trắng, đỏ.\nRất nhiều ren, bèo nhún và ruy băng."

# monologue
# JP: たたまれていたものを開き伸ばせば、\nハチロクの瞳がキラキラ輝く。
3171 = "Khi tôi mở và trải bộ quần áo đang được\ngấp gọn ra,\nđôi mắt Hachiroku sáng lấp lánh."

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、やはり見事な品だ。\nよければ、軽くあわせてみてくれ」
2190 = "「Hừm, quả nhiên là một tác phẩm tuyệt đẹp.\nNếu được, em thử ướm lên người xem sao.」"

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、マイ・マスター。\nどうぞ、少しだけお待ちくださいましね！」
2375 = "「Em rõ rồi ạ, Master của em.\nXin ngài đợi một chút nhé!」"

# monologue
# JP: （スウっ――トッ）
3508 = "（Soạt——phập）"

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
2470 = "「Vậy thì đi tìm thôi.」"

# monologue
# JP: 肩から軽くあててみろ――という程度のことを\n言ったつもりが、ハチロクは着る気まんまんだ。
3130 = "Tôi chỉ định bảo em ướm thử lên vai xem\nsao——\nnhưng Hachiroku có vẻ đang rất muốn mặc\nthử nó."

# monologue
# JP: とはいえ、正直楽しみでもある。\n見事な作りの一品が、ハチロクに似合わぬわけもない。
2891 = "Dù vậy, thành thật mà nói thì tôi cũng rất\nmong đợi.\nMột bộ trang phục được thiết kế tuyệt đẹp\nnhư thế này, không có lý do gì lại không\nhợp với Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「……楽しみとなると焦れるものだな。\nあのひらひらだ、着るのにも一苦労あろうが――む」
1430 = "「……Càng mong đợi thì lại càng sốt ruột\nnhỉ.\nBộ đồ bèo nhún thế kia, chắc mặc vào cũng\nvất vả lắm——ưm.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。大変おまたせいたしました」
2610 = "「Ngài Soutetsu. Đã để ngài phải đợi lâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――おお」
1359 = "「——Ồ.」"

# 【ハチロク】
# display as 八六
# JP: 「うふふ、いかがでございましょう？」
2023 = "「Đúng là vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「よく似合っている。とても可憐だ。\n夜を衣に縫い換えて、その身にまとっているようだ」
2476 = "「Rất hợp với em. Vô cùng đáng yêu.\nGiống như em đã lấy màn đêm may thành y\nphục và khoác lên mình vậy.」"

# 【ハチロク】
# display as 八六
# JP: 「お褒めいただき、光栄です」
2284 = "「Hibiki.」"

# monologue
# JP: 似合うと自覚し、自信を持っていたのだろう、\nハチロクの声には、安堵とともに誇りを感じる。
2972 = "Nếu vậy thì tôi nhất định phải đưa\nMichiko,\nđến nơi bình yên có bố và mẹ."

# 【双鉄】
# display as 雙鐵
# JP: 「白のフリルが効いているな。\nいつもの制服の、赤のフリルも素晴らしいが――」
2461 = "「Dạ…… còn cháu thì sao ạ?」"

# monologue
# JP: 改めて、見る。\n見れば見るほど、惹きつけられる。
3125 = "Tôi nhìn lại một lần nữa.\nCàng nhìn, càng bị thu hút."

# 【双鉄】
# display as 雙鐵
# JP: 「白のフリルであるがゆえ、\nお前の肌の、抜けるような透明さがさらに際立つ」
2463 = "「Cái con——ưm, chiếc \\x%lエアクラ;#00ffc040;Aircra%l;#; đó cũng ích kỷ\nphết nhỉ.\nRõ ràng mạnh miệng bảo vệ mạng sống của\nanh cơ mà.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ……そこまで褒めていただけると、\nわたくし――そのっ……」
2076 = "「Hừm?」"

# monologue
# JP: 僕の視線に照れたのか、\nハチロクは両手をあてて膝を隠す。
3030 = "Có lẽ vì xấu hổ trước ánh nhìn của tôi,\nHachiroku dùng hai tay che đầu gối lại."

# monologue
# JP: 動きにつれてリボンが揺れる。\n大きな羽の蝶々のように。
3303 = "Ruy băng khẽ đung đưa theo từng chuyển\nđộng.\nGiống như một chú bướm với đôi cánh lớn."

# 【双鉄】
# display as 雙鐵
# JP: 「成程――ビール列車向きではないかもしれんな。\nそのリボン、いかにもどこかに引っ掛けそうだ」
1972 = "「Ra là vậy——Có lẽ bộ đồ này không phù hợp\ncho Tàu bia.\nChiếc ruy băng đó, trông rất dễ bị vướng\nvào đâu đó.」"

# 【ハチロク】
# display as 八六
# JP: 「かもしれませんね。――ですが、双鉄様」
2384 = "「Đợi em chút! Em lau cho anh ngay đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2169 = "「嗯」" 

# monologue
# JP: 風呂敷包みに貼られていた紙。\n『コノフクハキルコト』。
2904 = "Mảnh giấy được dán trên gói Furoshiki.\n\"PHẢI MẶC BỘ QUẦN ÁO NÀY\"."

# monologue
# JP: それを改めて示されたなら、\n遺志を軽々に無視はできない気にもなる。
3401 = "Khi được nhắc nhở lại điều đó,\ntôi cảm thấy mình không thể xem nhẹ di\nnguyện này."

# 【双鉄】
# display as 雙鐵
# JP: 「ビール列車は確かに集客も良さそうだし……\nせっかくの品だ、試験をしてみるべきかもしれん」
2116 = "「Tàu bia quả thực có vẻ thu hút khách rất\ntốt……\nĐã cất công tìm thấy món đồ này, có lẽ\nchúng ta nên thử nghiệm xem sao.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら、まずは、双鉄様とわたくしと、\nふたりだけでの試験をしては見ませんか？」
2580 = "「Nếu vậy, trước tiên, Ngài Soutetsu và em,\nchúng ta hãy thử nghiệm với chỉ hai người\nthôi được không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふたりだけの試験」
2254 = "「Thử nghiệm chỉ có hai người sao.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。このように慣れぬ服装での、初めての業務。\nわたくし、正直に申しまして、不安ですので」
2166 = "「Vâng. Mặc một bộ trang phục không quen\nthuộc thế này để thực hiện nhiệm vụ lần\nđầu tiên.\nThành thật mà nói, em cũng thấy hơi bất an\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そのようにしてみるか。[かいしゃ,4]御一夜鉄道の\n業務終了後に、客車を一両使わせてもらって」
2578 = "「Nếu vậy, chúng ta thử làm thế xem sao.\nSau khi Đường sắt Ohimitera\nkết thúc giờ làm việc, chúng ta sẽ mượn\nmột toa hành khách.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、\nそれでしたらより精度のある試験ができますね」
2195 = "「Chà,\nnếu vậy thì chúng ta có thể tiến hành thử\nnghiệm chính xác hơn rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ひとつ、シミュレーションといってみよう」
2191 = "「Ừm. Hãy coi như đây là một buổi mô phỏng\nđi.」"

# 【ハチロク】
# display as 八六
# JP: 「シミュレイション。模擬実験でございますね」
2427 = "「Mô phỏng. Là một buổi thử nghiệm thực tế\nnhỉ.」"

# monologue
# JP: ハチロクの瞳にぽっ、と小さな炎が燃える。\nいい顔だ。
2880 = "Trong đôi mắt Hachiroku bùng lên một ngọn\nlửa nhỏ.\nMột vẻ mặt thật rạng rỡ."

# monologue
# JP: この塩梅なら案外と、\nビール列車、実用レベルとできるかもしれん。
2948 = "Cơ hội mãi mới đến này,\ntôi không ngốc đến mức để vuột mất."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットには、僕の方から電話をしておく。\nハチロクも、なにか準備があれば整えておいてくれ」
2325 = "「Anh sẽ gọi điện báo cho Paulette.\nHachiroku cũng chuẩn bị những thứ cần\nthiết đi nhé.」"

# 【ハチロク】
# display as 八六
# JP: 「はい――。\nかしこまりました。双鉄様」
2217 = "「Đương nhiên là vậy rồi. Chúng ta đang tắm\nchung mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……っと、こんなものかな」
1407 = "「……Phù, chắc thế này là đủ rồi.」"

# monologue
# JP: ビールケースを運ぶのだったら、\n真闇姉にも負けはしない。
2957 = "Không biết cô ấy dự đoán được việc tôi sẽ\nđi đến nhà tắm công cộng,\nhay là đã nghe thấy——à, đúng rồi."

# monologue
# JP: シミュレーションをより正確に行うために、\n30人×3本+予備10本の、100本を車内に運び込む。
3249 = "Để mô phỏng chính xác hơn,\ntôi đã bê 100 chai bia vào trong toa xe,\ntương đương 30 người x 3 chai + 10 chai dự\nphòng."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、この程度の量でも車内に置くとかさばるな」
2011 = "「Nhưng mà, chỉ với số lượng này thôi mà\nđặt trong toa xe cũng chiếm diện tích\nphết.」"

# monologue
# JP: 実際に運用するとなれば、お客様たちの荷物もある。\n大きな荷物は、駅預かりと扱うか――
3060 = "Em ấy im lặng với đôi má ửng đỏ."

# 【双鉄】
# display as 雙鐵
# JP: 「あるいは、バーベキュートレインと同じく、\nキハ07sを併結して、だが――」
2336 = "「Không có chuyện em không thích đâu ạ. Ở\ngần ngài Soutetsu——\nKhoảng cách này là tốt nhất với em rồi ạ.」"

# monologue
# JP: 通学客と酔客を同じ列車にはおけないし……\nいや、この辺のことは皆で智慧を出し合うべきか。
2911 = "Không thể để học sinh đi học và những\nngười say xỉn trên cùng một chuyến tàu\nđược……\nKhông, chuyện này có lẽ mọi người nên cùng\nnhau bàn bạc tìm giải pháp."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。こちらの準備は整ったぞ」
1958 = "「Hachiroku. Bên anh chuẩn bị xong rồi\nđấy.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしも今まいります」
2164 = "「Vâng. Em đến ngay đây ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
2068 = "「Ồ——」"

# monologue
# JP: 夜の機関庫のストーブ客車。\n橙色のともしびの下。
2965 = "Toa xe sưởi ấm trong xưởng đầu máy vào ban\nđêm.\nDưới ánh đèn màu cam ấm áp."

# monologue
# JP: 夜をまとったハチロクは、\nまるで――まるで……
3062 = "Em ấy vội vã ngậm miệng lại và ngó nghiêng\nxung quanh.\nSau đó vỗ tay bộp một cái, Hibiki làm ra\nvẻ mặt tự mãn."

# 【双鉄】
# display as 雙鐵
# JP: 「言葉にならん。\nお前は――本当に美しいのだな」
2309 = "「Không thể diễn tả bằng lời.\nEm——thật sự rất đẹp.」"

# 【ハチロク】
# display as 八六
# JP: 「光栄です。\nそのように作られている身ではございますが」
2517 = "「Thật vinh hạnh ạ.\nDù cơ thể em được tạo ra như vậy, nhưng……」"

# 【双鉄】
# display as 雙鐵
# JP: 「作り物の美しさではない。人形を、よし同じ顔に\n作ってみたとて、決してお前の美しさはでてこない」
2315 = "「Không phải vẻ đẹp của đồ tạo tác. Dù có\ntạo ra một con búp bê với khuôn mặt giống\nhệt,\ncũng không thể nào toát lên được vẻ đẹp\ncủa em đâu.」"

# monologue
# JP: 服装の、顔立ちの、スタイルの、\n全ての親和だけではない。
2809 = "Có lẽ do vẽ tranh quá nhiều nên em ấy hơi\nbị cận thị,\nhơn nữa lại còn bị hơi nước che\nkhuất——chắc hẳn em ấy không nhìn rõ tình\nhình bên này."

# monologue
# JP: ハチロクを、ハチロクたらしめている美しさは――
3366 = "Vẻ đẹp làm nên một Hachiroku đích thực\nchính là——"

# 【双鉄】
# display as 雙鐵
# JP: 「その美しさは、お前自身の――\nお前が育てた美しさだ」
2487 = "「Vẻ đẹp đó, là của chính em——\nLà vẻ đẹp do em tự nuôi dưỡng.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしが――育てた？」
2292 = "「Do em——tự nuôi dưỡng sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2387 = "「是啊」" 

# monologue
# JP: おいでおいでと手招きすれば、\nハチロクは素直によってくる。
3164 = "Tôi vẫy tay gọi em lại,\nHachiroku ngoan ngoãn tiến đến."

# monologue
# JP: ふたり座席に座り、\n頭の飾りに、かるぅく触れる。
2986 = "Hai chúng tôi ngồi xuống ghế,\ntôi khẽ chạm vào đồ trang trí trên tóc em."

# 【双鉄】
# display as 雙鐵
# JP: 「このリボンひとつを見てもわかる。\nバランス良く、実に美しく結ばれている」
2469 = "「Chỉ cần nhìn chiếc ruy băng này thôi cũng\nđủ hiểu.\nNó được thắt rất cân đối và vô cùng đẹp\nmắt.」"

# 【ハチロク】
# display as 八六
# JP: 「あっ」
# 2092 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「全てのリボンに関してそうだ。フリルとて――」
2354 = "「Tất cả những chiếc ruy băng khác cũng\nvậy. Cả phần bèo nhún nữa——」"

# monologue
# JP: 頭の飾りを、肩口を。\n胸もと、二の腕、いちいち触れて確かめる。
3429 = "Đồ trang trí trên tóc, rồi đến bờ vai.\nTrước ngực, bắp tay, tôi chạm vào từng chỗ\nđể xác nhận."

# 【双鉄】
# display as 雙鐵
# JP: 「やはり、だ。とても気をつけて着ているな。\n巻き込んでしまっているようなものは、ひとつもない」
2422 = "「Bắt anh hai làm \\x%l機関士;#00ffc040;người lái tàu%l;#; á!? Sao có\nthể!\nThời gian anh ở nhà sẽ ít đi mất——à không\nphải!」"

# 【ハチロク】
# display as 八六
# JP: 「それは――だって、ごくごく当たり前のことです。\n双鉄様に見ていただく衣装なのですから」
2551 = "「Đó là——bởi vì, đó là điều hiển nhiên mà\nạ.\nVì đây là trang phục để Ngài Soutetsu ngắm\nnhìn cơ mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕が離れているときとて同じだろう。\nハチロクが制服を着乱しているのなど見たこともない」
2294 = "「Ngay cả khi anh không ở bên cạnh cũng vậy\nthôi.\nAnh chưa từng thấy Hachiroku mặc đồng phục\nxộc xệch bao giờ.」"

# 【ハチロク】
# display as 八六
# JP: 「身だしなみは、大事なマナーと教わりました。\n共に働く方や、お客様への、敬意を示すマナーだと」
1912 = "「Em đã được dạy rằng, diện mạo là một phép\nlịch sự quan trọng.\nLà cách thể hiện sự tôn trọng đối với đồng\nnghiệp và khách hàng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。しかし、教わっただけでは身につかぬ。\nそれを常に意識し、日々の実践を繰り返し、理解して」
2186 = "「Làm gì có chuyện hết được chứ!\nXấu hổ lắm chứ! Xấu hổ lắm nhưng mà——」"

# monologue
# JP: 立って、手を引く。\nハチロクは素直に僕に従い、スカートをさっと整える。
3183 = "Tôi đứng dậy và kéo tay em.\nHachiroku ngoan ngoãn làm theo, rồi nhanh\nchóng chỉnh lại váy."

# 【双鉄】
# display as 雙鐵
# JP: 「結果が、それだ。どのようなときにでも、\n着衣の乱れを手早く改め、最高の身だしなみを整える」
2496 = "「Anh hai! Màu đỏ là màu đỏ đó nha!」"

# 【ハチロク】
# display as 八六
# JP: 「あ――」
2080 = "「À, ra vậy. Tôi không nghĩ đến chuyện đó,\nxin lỗi nhé.」"

# monologue
# JP: 言われて、ハチロクは自分の手をまじまじと見て、\n驚いたように視線を僕に向け直す。
3219 = "Nghe tôi nói vậy, Hachiroku chăm chú nhìn\nđôi bàn tay mình,\nrồi ngước mắt nhìn tôi với vẻ ngạc nhiên."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様が見てくださっているわたくしは――\nいつも、このようにしておりますか？」
2283 = "「Trong mắt Ngài Soutetsu, em——\nlúc nào cũng như vậy sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いつもだ。それを僕はとても好ましく思い、\n同時に、見習いたいとも感じている」
2389 = "「Ừ, lúc nào cũng vậy. Anh rất thích điều\nđó ở em,\nvà đồng thời, anh cũng muốn học hỏi theo.」"

# 【ハチロク】
# display as 八六
# JP: 「これは――\nわたくし……その、不正挙動でしょうか？」
2550 = "「Điều này——\nem……đó có phải là, hành vi bất thường\nkhông ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「不正挙動？」
1892 = "「Hành vi bất thường?」"

# monologue
# JP: 思わぬ言葉だ。\n褒めたつもりが、ハチロクは何故だかひどく不安げだ。
3267 = "（Xoè!）"

# 【ハチロク】
# display as 八六
# JP: 「わたくし、『そうするように』と、\n命令をくだしておりませんのに、手指が勝手に」
2433 = "「Em không hề ra lệnh cho bản thân phải\n'làm như vậy',\nnhưng những ngón tay lại tự động di\nchuyển.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……それは。恐らく――\nそう、『最適化』というべき処理ではないのか？」
2098 = "「À……chuyện đó. Có lẽ——\nđúng rồi, nên gọi là quá trình 'Tối ưu\nhóa' chứ nhỉ?」"

# 【ハチロク】
# display as 八六
# JP: 「最適化？」
2415 = "「Nếu tận mắt chứng kiến sức hấp dẫn, người\nta sẽ muốn tìm hiểu về nó.\nSự chuyển biến tâm lý đó có lẽ là một\ntrong những nhu cầu căn bản của con\nngười.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクの魂か、プログラムか。そのどちらかが、\n『この状況なら、必ずこう動作する』と学習した」
1937 = "「Linh hồn của Hachiroku, hay là chương\ntrình của em. Một trong hai thứ đó,\nđã học được rằng 'trong tình huống này,\nnhất định phải hành động như thế này'.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。確かにわたくし、教わった当時から、\nそうするようにと意識して行っておりました」
2162 = "「Vâng. Quả thực, kể từ khi được dạy,\nem đã luôn có ý thức thực hiện điều đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「繰り返し、いつの間に自然な仕草になり、身につく。\n人間でいうなら、習慣化し、無意識に行うようになる」
2008 = "「Lặp đi lặp lại, rồi từ lúc nào không hay,\nnó trở thành một cử chỉ tự nhiên và thấm\nnhuần vào cơ thể.\nNếu là con người, thì đó gọi là hình thành\nthói quen, và thực hiện nó một cách vô\nthức.」"

# 【ハチロク】
# display as 八六
# JP: 「習慣化しての――特定条件下での、自動処理。\nそれが、つまりは、最適化だと？」
2560 = "「Hình thành thói quen——xử lý tự động trong\nnhững điều kiện nhất định.\nĐó, tóm lại là, tối ưu hóa sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「人間における無意識の作用が、レイルロオドでは、\nバックグラウンドの処理となるとは考えられんか？」
2249 = "「Sự tác động vô thức ở con người, đối với\nRailord,\nchẳng phải có thể coi là quá trình xử lý\nngầm (background processing) sao?」"

# 【ハチロク】
# display as 八六
# JP: 「……考えられます。不正挙動と仮定するより、\n遥かに矛盾点を減らせる推論です」
1412 = "「……Có thể nghĩ như vậy ạ. So với việc giả\nđịnh đó là hành vi bất thường,\nthì suy luận này giúp giảm thiểu những\nđiểm mâu thuẫn hơn rất nhiều.」"

# monologue
# JP: ほっとしたようなハチロクの声。
2883 = "Giọng nói của Hachiroku như trút được gánh\nnặng."

# 【双鉄】
# display as 雙鐵
# JP: 「そうした美徳を習慣化すること。それは成長だ。\nお前の体は成長せぬが、意識は、魂は成長する」
2245 = "「Việc biến những đức tính tốt đẹp đó thành\nthói quen. Đó chính là sự trưởng thành.\nCơ thể em không lớn lên, nhưng ý thức và\nlinh hồn em thì có.」"

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2403 = "「是的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その成長が、ハチロク。お前の美しさを作った。\n同形式のどの妹も、恐らくは持ち得ぬ――」
2498 = "「Anh cũng có cảm giác như đã quen biết từ\ntrước——\nNhưng thực tế thì, có vẻ như vừa nãy mới\nlà lần đầu gặp mặt.」"

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 2092 = "「啊」" 

# monologue
# JP: 顎に触れ、まじまじ、面差しを、瞳を見つめる。\n美しい――本当にただ、ひたすらに。
3170 = "Chạm vào cằm em, tôi chăm chú nhìn vào\nkhuôn mặt, vào đôi mắt em.\nĐẹp quá——thật sự, chỉ có thể nói là đẹp."

# monologue
# JP: 恐らくは、などという言葉は不用であった。\n条件づけも間違えていた。
2896 = "Những từ ngữ như \"có lẽ\" thật không cần\nthiết.\nViệc đặt điều kiện cũng sai lầm."

# 【双鉄】
# display as 雙鐵
# JP: 「世界中の誰も持ち得ぬ、世界最高の美しさを。\nハチロク。お前は、自分で育て、作ったのだ」
1899 = "「Một vẻ đẹp tuyệt trần nhất thế gian mà\nkhông ai trên thế giới này có được.\nHachiroku. Em đã tự mình nuôi dưỡng và tạo\nra nó.」"

# 【ハチロク】
# display as 八六
# JP: 「で、あるのなら。その大半は、双鉄様。\nあなたとともに、育み、作り上げた美しさです」
2231 = "「Cháu là \\x%lレイルロオド;#00ffc040;Railord%l;#; của ngài Soutetsu.\nXin hãy gọi cháu là Hachiroku.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕とともに？」
1940 = "「Nhưng sao em lại biết nhà tắm này hay\nvậy.\nTrong lúc tôi ở Đế đô, nhà tắm nhà mình bị\nhỏng hay sao?」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様に愛されたいと――\nいつしか生まれたその気持ちが、きっと、わたくしを」
2310 = "「Muốn được Ngài Soutetsu yêu thương——\nTình cảm nảy sinh từ lúc nào không hay đó,\nchắc chắn đã giúp em」"

# monologue
# JP: そこでふと、ハチロクの言葉が止まってしまう。
3286 = "Chợt Hachiroku ngừng lời."

# 【ハチロク】
# display as 八六
# JP: 「その……わたくしを、うつ……うつくし、く――\nああ、どうしたのでしょう、わたくし」
2518 = "「Rằng……em, đẹ……đẹp——\nAa, em bị làm sao thế này」"

# 【双鉄】
# display as 雙鐵
# JP: 「自分自身を“美しい”というのが、\n恥ずかしいのか？」
2490 = "「Việc tự gọi bản thân mình là \"đẹp\",\nkhiến em thấy xấu hổ sao?」"

# 【ハチロク】
# display as 八六
# JP: 「……そのようです。いつもでしたら、\nまったく当然のこととしてお話できますのに」
1420 = "「……Có vẻ là vậy ạ. Nếu là bình thường,\nem hoàn toàn có thể nói điều đó như một lẽ\nđương nhiên mà」"

# monologue
# JP: 嬉しくなる。\nそれこそがまさに、証であるから。
3145 = "Tôi thấy vui.\nBởi vì đó chính là bằng chứng rõ ràng\nnhất."

# 【双鉄】
# display as 雙鐵
# JP: 「作られ、当然のものとしてあたえられた美しさなら、\nそれを誇ることは、産みの親、製作者を称えることだ」
2229 = "「Nếu là vẻ đẹp được tạo ra và ban cho như\nmột lẽ đương nhiên,\nthì việc tự hào về nó chính là ca ngợi\nngười đã sinh ra, người đã tạo ra nó.」"

# 【ハチロク】
# display as 八六
# JP: 「左様でございますね」
# 2387 = "「是啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、お前自らが獲得した美しさを誇ることは、\n自賛であり自慢だ。恥じ入る気持ちも起こるだろうさ」
1922 = "「Ý anh là sao?」"

# 【ハチロク】
# display as 八六
# JP: 「――左様、ですね。\nそれではわたくし、双鉄様を、誇りましょう」
1362 = "「——Đúng là, như vậy nhỉ.\nVậy thì, em sẽ tự hào về Ngài Soutetsu.」"

# monologue
# JP: 小さな、頷き。\n小さな、小さな、唇の端だけが、浮かべる微笑み。
2995 = "Một cái gật đầu nhẹ.\nMột nụ cười khẽ, thật khẽ, chỉ thoáng hiện\ntrên khóe môi."

# monologue
# JP: 愛されている、自覚と自信。僕への信頼。\nどこまでもまっすぐに溶け合っていく、視線と視線。
3023 = "Em ấy lại đỏ mặt và cúi gầm xuống.\nDù Hibiki không trực tiếp được khen ngợi——"

# 【ハチロク】
# display as 八六
# JP: 「わたくしを見つけ出してくださって、\n世界一美しく花開かせてくださった、愛しいあなたを」
2455 = "「Tự hào về người đã tìm ra em,\nđã giúp em nở rộ thành bông hoa đẹp nhất\nthế gian, người em yêu dấu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――」
1956 = "「Hachiroku——」"

# monologue
# JP: 愛おしい。その気持ちで胸がいっぱいになり、\nすぐには、言葉を発せない。
3139 = "Thật đáng yêu. Cảm xúc ấy lấp đầy lồng\nngực,\nkhiến tôi không thể thốt nên lời ngay lập\ntức."

# monologue
# JP: 伝えたいことも、してやりたいことも――っ！
3256 = "Những điều muốn nói, những điều muốn làm\ncho em——!"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2612 = "「Ngài Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
2104 = "「Ừ」"

# monologue
# JP: 考えが、欲へと引かれそうになった。
3112 = "Bố và mẹ không có trên tàu.\nMichiko vẫn luôn đi trên chuyến \\x%l列車;#00ffc040;tàu%l;#; này\nmột mình."

# monologue
# JP: ＜わたくしごとは、試験の後＞。\nすずとの約束を思い返して、慎重に言葉を選び取る。
1346 = "<Chuyện cá nhân, để sau khi thử nghiệm\nxong>.\nNhớ lại lời hứa với Suzu, tôi cẩn trọng\nlựa chọn từ ngữ."

# 【双鉄】
# display as 雙鐵
# JP: 「為すべきことを、早くしっかり為しきろう。\n“わたくしごと”を、より濃密に楽しむためにも」
2529 = "「Chúng ta hãy nhanh chóng hoàn thành thật\ntốt những việc cần làm thôi.\nĐể sau đó có thể tận hưởng \"chuyện cá\nnhân\" một cách nồng nhiệt hơn.」"

# 【ハチロク】
# display as 八六
# JP: 「あ……左様でした。いけませんね、わたくし、\n[ビール,1]麦酒の前に、双鉄様に酔わされてしまうところでした」
2091 = "「A……đúng rồi nhỉ. Em thật là tệ,\nchưa kịp uống bia mà đã suýt bị Ngài\nSoutetsu làm cho say mất rồi.」"

# monologue
# JP: ふわり、艶やかにはにかんで、\n姿勢を正し、僕に一礼。
3018 = "Em cười bẽn lẽn một cách đằm thắm,\nchỉnh lại tư thế và cúi chào tôi."

# monologue
# JP: もちあげなおしたその顔は、\n凛と締まって――完全に仕事モードだ。
3041 = "Khuôn mặt khi ngẩng lên,\nđã trở nên nghiêm túc——hoàn toàn chuyển\nsang chế độ làm việc."

# 【ハチロク】
# display as 八六
# JP: 「大変おまたせいたしました。お客様。\nきっぷを拝見いたします」
2519 = "「Đã để quý khách phải đợi lâu. Thưa quý\nkhách.\nXin phép được kiểm tra vé của ngài ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「きっぷか」
2480 = "「Vé sao.」"

# monologue
# JP: きっぷケースに折れないようにしまいこんでる紙片を、\n大事に大事に取り出す。
3141 = "Tôi lấy mảnh giấy được cất cẩn thận trong\nbao đựng vé để không bị nếp gấp ra,\nmột cách thật nâng niu, trân trọng."

# 【双鉄】
# display as 雙鐵
# JP: 「これで良いかな？」
2556 = "「Thế này được chưa?」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2050 = "「Ôi」"

# monologue
# JP: ハチロク駅から双鉄駅へ。
2885 = "Từ ga Hachiroku đến ga Soutetsu."

# monologue
# JP: 無期限きっぷを目にした途端、\nハチロクの頬が薔薇色になる。
2804 = "Ngay khi nhìn thấy tấm vé vô thời hạn,\nhai má Hachiroku ửng hồng như màu hoa\nhồng."

# 【ハチロク】
# display as 八六
# JP: 「もちろんです、お客様。\nきっぷ、お返しいたしますね？」
2432 = "「Bẩn thì bẩn thật, nhưng nếu là dính đầy\nbụi phấn thế này thì……\nĐúng là anh khó mà vào nhà với bộ dạng này\nđược.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2169 = "「嗯」" 

# monologue
# JP: 再び大事にしまい直す。\n僕の挙動をハチロクは、幸せそうに見つめている。
3260 = "Tôi lại cẩn thận cất nó đi.\nHachiroku nhìn hành động của tôi với vẻ\nđầy hạnh phúc."

# 【ハチロク】
# display as 八六
# JP: 「お客様のきっぷは、ただ一枚の最優等の特別きっぷ。\nどちらなり、どうぞお好みのお席へおつき下さい」
2239 = "「Vé của quý khách là tấm vé đặc biệt hạng\nưu duy nhất.\nXin mời quý khách chọn chỗ ngồi tùy thích\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――そうだな。ここにしよう」
2584 = "「Nếu vậy——để xem nào. Chọn chỗ này đi.」"

# monologue
# JP: ストーブ正面、通路が一番狭いところをあえて選ぶ。
3194 = "Tôi cố tình chọn chỗ đối diện lò sưởi, nơi\nlối đi hẹp nhất."

# monologue
# JP: その意図を察してくれたのだろう、\nハチロクの顔が再び締まる。
3013 = "Có lẽ hiểu được ý đồ của tôi,\nkhuôn mặt Hachiroku lại trở nên nghiêm\ntúc."

# 【双鉄】
# display as 雙鐵
# JP: 「む――発車時刻のようだな」
2219 = "「Ưm——có vẻ đến giờ tàu chạy rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「え！？　あ、はいっ――\nええと、これはシミュレイションなのですから……」
2064 = "「A, anh trai. Mừng anh đã về.」"

# monologue
# JP: あわてた顔は、ほんの一瞬。
2984 = "Nếu điểm đó đã rõ ràng, thì tiếp theo sẽ\nsửa chữa Hachiroku.\nChỉ cần thực hiện đúng các bước, mọi\nchuyện chắc chắn sẽ được giải quyết."

# monologue
# JP: いつもの乗務と同じように、\nハチロクは凛と背筋を伸ばす。
3259 = "Giống như những lần làm nhiệm vụ bình\nthường,\nHachiroku vươn thẳng lưng đầy kiêu hãnh."

# 【ハチロク】
# display as 八六
# JP: 「出発！　進行！　ポっ、ポーーーー！」
1964 = "「Xuất phát! Tiến lên! Tu, tuuuuu!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお、見事な汽笛だ」
2472 = "「Nếu vậy thì sau khi tắm xong ngài nên xoa\nbóp cơ thể ạ.\nSáng hôm sau cảm giác mệt mỏi sẽ tan biến\nhoàn toàn khác biệt đấy ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「うふふっ――さて、お客様。本日は御一夜鉄道、\n『特別[ビール,1]麦酒列車』へのご乗車、ありがとうございます」
2020 = "「Ufufu——Thưa quý khách. Cảm ơn quý khách\nđã lên chuyến\n\"Tàu bia đặc biệt\" của Đường sắt Ohimitera\nngày hôm nay ạ.」"

# monologue
# JP: 軽く一礼。\nいつもより華やいだ声色は、イベント列車ゆえだろう。
3026 = "Hibiki và chị Mayami đều ở phòng riêng.\nỞ đây chỉ có tôi và Hachiroku."

# 【ハチロク】
# display as 八六
# JP: 「この列車は、御一夜発、[ゆのい,1]湯医行きです。湯医では、\nドアを開かぬ折返しとなり、下車はいただけません」
2418 = "「Chuyến tàu này xuất phát từ Ohimitera, đi\nYunoi. Tại Yunoi,\ntàu sẽ quay đầu mà không mở cửa, nên quý\nkhách không thể xuống tàu được ạ.」"

# monologue
# JP: あらかじめ、行程を想定してくれていたのか。
2909 = "Em ấy đã dự tính trước cả hành trình rồi\nsao."

# monologue
# JP: アナウンスの方も、\nアドリブとはとても思えぬレベルで、なめらかだ。
3088 = "Giọng thông báo cũng\ntrôi chảy đến mức không ai nghĩ đó là ứng\nbiến."

# 【ハチロク】
# display as 八六
# JP: 「ビールは、ご乗車中飲み放題となります。\n簡単なおつまみも、パック料金に含まれております」
2362 = "「Quý khách có thể uống bia thỏa thích\ntrong suốt chuyến đi.\nĐồ nhắm đơn giản cũng đã được bao gồm\ntrong giá vé trọn gói ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2199 = "「Cảm ơn ngài.\nVì đã đợi đến lúc chỉ còn hai chúng ta mới\nhỏi chuyện này.」"

# monologue
# JP: おつまみに関しては全く聞いていなかった。\n実際、用意があるかはしらぬが――
3142 = "Tôi hoàn toàn chưa nghe nói gì về đồ nhắm.\nThực tế không biết em ấy có chuẩn bị\nkhông, nhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「では、おつまみと、ビールを一本もらいたい」
2581 = "「Vậy thì, cho tôi đồ nhắm và một chai bia\nnhé.」"

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、お客様」
2374 = "「Vâng, thưa quý khách.」"

# monologue
# JP: ひらり、リボンをたなびかせ、ハチロクは車輌前方へ。\nなにやらトレーに乗せてすぐに戻ってくる。
2888 = "Mở mắt ra,\ntôi nhận ra mình đang ở trong một giấc mơ."

# 【ハチロク】
# display as 八六
# JP: 「どうぞ。簡単なものではございますが」
2515 = "「Xin mời quý khách. Dù chỉ là những món\nđơn giản thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。定番だな。\n馬刺しに、[ひともじ,2]一文字グルグルに――おや？」
2070 = "「Hà, thợ đốt lò và \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nCũng mấy chục năm rồi mới có người làm bẩn\nnước tắm của ta đấy nhỉ.」"

# monologue
# JP: これも定番、辛子れんこん。\nが、上に何かが――
3383 = "Đây cũng là món quen thuộc, củ sen nhồi mù\ntạt (Karashi Renkon).\nNhưng, bên trên có gì đó——"

# 【双鉄】
# display as 雙鐵
# JP: 「これは一体？」
2554 = "「Cái này là gì vậy?」"

# 【ハチロク】
# display as 八六
# JP: 「辛子れんこんの、マヨネエズ焼きでございます」
2409 = "「Là củ sen nhồi mù tạt nướng sốt\nmayonnaise ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほーう。ハチロ――\nいや、アテンダントさんのお手製ですか？」
2398 = "「V-Vâng, nghe nói vậy. Cô ấy trở nên ấp\núng……\nThế là ý kiến của Thị trưởng Paulette chưa\nbao giờ được thông qua.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。お客様。\n恥ずかしながら、わたくしが作らせていただきました」
2407 = "「Ngộ nhỡ bụi than lọt vào rượu shochu,\nthì hậu quả sẽ không thể cứu vãn được.」"

# monologue
# JP: 指導は、おそらく真闇姉――いや、永山夫人か？\nどちらにせよ、初めて目にする。楽しみだ。
3216 = "Người hướng dẫn, có lẽ là chị\nMayami——không, phu nhân Nagayama chăng?\nDù là ai đi nữa, đây là lần đầu tiên tôi\nthấy món này. Thật đáng mong đợi."

# 【双鉄】
# display as 雙鐵
# JP: 「では、ありがたくいただきます。\n――あむっ――んっ――おお――――旨い」
2193 = "「Vậy thì, tôi xin phép dùng bữa.\n——A mu——ưm——ồ————ngon quá.」"

# 【ハチロク】
# display as 八六
# JP: 「本当ですか！？　双鉄さ――ま――\nこほん、お客様」
2474 = "「Vì em mà ngài Soutetsu đã phải lấm lem\nthan đá.\nViệc tẩy sạch những vết bẩn đó là nghĩa vụ\nhiển nhiên của em ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕は全般、\n薄味のものを好むたちなのだが――あむっ」
2160 = "「Ngọn núi, lá cây đỏ rực,\nnhưng khi em vẽ tranh, ông mặt trời còn đỏ\nhơn nữa cơ!」"

# monologue
# JP: からし蓮根のキツさが中和されている。\nマヨネーズを焼いた甘みのおかげであろう。
3336 = "Vị hăng của củ sen nhồi mù tạt đã được\ntrung hòa.\nCó lẽ là nhờ vị ngọt của sốt mayonnaise\nnướng."

# 【双鉄】
# display as 雙鐵
# JP: 「これは、いい。これならどんどん箸が進むし――」
2559 = "「Món này, ngon đấy. Thế này thì cứ muốn ăn\nmãi thôi——」"

# 【ハチロク】
# display as 八六
# JP: 「あら、気が利きませんで。お[つ]注ぎいたします」
2058 = "「Anh về đây là để phản đối việc thu hút\nnhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; cơ mà,\nnhư vậy thì thời gian dành cho hoạt động\nđó sẽ bị giảm đi mất còn gì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2169 = "「嗯」" 

# monologue
# JP: 袖口が随分とひらひらしている印象だが、\n注ぐ動作にも支障は出ない。
3347 = "Mặc dù phần tay áo trông khá bèo nhún và\nvướng víu,\nnhưng không hề cản trở đến động tác rót\nbia."

# monologue
# JP: 移動中、ストーブや荷物にあたるようなこともなし、\nこれならば――
3035 = "Khi di chuyển cũng không hề va quệt vào lò\nsưởi hay hành lý,\nNếu được như thế này thì——"

# 【双鉄】
# display as 雙鐵
# JP: 「おっとっと」
2061 = "「Anh hai, em sẽ\nlàm ghế ngồi tắm cho Hachiroku.」"

# monologue
# JP: 泡立てすぎだ。\nあわてて口に運んで泡ごと、少し飲む。
3371 = "Rót quá nhiều bọt rồi.\nTôi vội đưa ly lên miệng, uống một chút cả\nphần bọt."

# 【ハチロク】
# display as 八六
# JP: 「不慣れな物で――\n申し訳ございません。大変失礼いたしました」
2246 = "「Anh bị dính quá nhiều bụi than, có thể sẽ\ngây ảnh hưởng xấu\nđến một thiết bị tinh vi như Navi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いやいや、これほどのべっぴんさんのお酌だ。\nこちらの手元が緊張で震えてしまったのだろうさ」
1888 = "「Không cần phải vội vàng cảm ơn đâu.\nSau khi tìm thấy \\x%l8620;#00ffc040;8620%l;#;——hay thậm chí là sau\nđó nữa, cũng chưa muộn.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、お上手ですこと」
2237 = "「Chà, ngài thật khéo nói.」"

# monologue
# JP: ――さすがは、トップナンバー・レイルロオドだ。\n本来業務ではない接客も、見事にこなして見せている。
1339 = "——Quả không hổ danh là Railord số 1.\nNgay cả công việc tiếp khách không phải\nchuyên môn, em cũng xử lý rất hoàn hảo."

# monologue
# JP: が、それゆえに些か……穏やかならぬ気分もしてくる。\n独占欲とわかっていても、到底黙殺しきれない。
2833 = "Nhưng, cũng chính vì thế mà tôi cảm thấy\nđôi chút……không được bình tĩnh cho lắm.\nDù biết đó là tính chiếm hữu, nhưng tôi\nhoàn toàn không thể phớt lờ nó."

# 【ハチロク】
# display as 八六
# JP: 「双鉄さ――ああ、いえ、お客様？」
2603 = "「Ngài Soutet——à, không, thưa quý khách?」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんでもないさ」
2431 = "「Không có gì đâu.」"

# monologue
# JP: いかん。表情に出てしまったか。
2817 = "Không xong rồi. Mình để lộ ra mặt rồi sao."

# monologue
# JP: ハチロクの不安げな顔をほぐすため、\n飲み慣れぬビールをさらにごくりと――っ！？
3250 = "Để làm dịu vẻ mặt bất an của Hachiroku,\ntôi lại ực thêm một ngụm bia vốn không\nquen uống——!?"

# 【双鉄】
# display as 雙鐵
# JP: 「かはっ！　こほっ！？」
2095 = "「Trờiiii ơiiii!!!\nAnh hai! Hachiroku! Hai người đang làm cái\ntrò gì vậyyyyy!」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！？」
# 2608 = "「雙鐵少爺！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「えほっ――げほっ――むせた――だけ――\nごほっ、ごほっ！」
2039 = "「Eho——geho——chỉ là——bị sặc——thôi——\nGoho, goho!」"

# 【ハチロク】
# display as 八六
# JP: 「おせなをおさすりいたします――あっ！？」
2303 = "「Vâng, chúc ngài ngủ ngon, ngài Soutetsu.」"

# monologue
# JP: （ことんっ）
3486 = "（Cạch）"

# monologue
# JP: 箸でも落ちたか、何かが床に当たる音。
3315 = "Tiếng đũa rơi, hay thứ gì đó chạm xuống\nsàn."

# 【ハチロク】
# display as 八六
# JP: 「すみません。わたくし、また粗相を」
2247 = "「Em xin lỗi. Em, lại gây ra lỗi lầm rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「い――や――僕がっ、んんっ――\n騒がせてしまったせいだ」
1883 = "「Đ-Đừng có đối xử với em như trẻ con chứ.」"

# 【ハチロク】
# display as 八六
# JP: 「そのようなことはございませぬ。\n申し訳ございません。すぐにお取り替えいたします」
1887 = "「Không có chuyện đó đâu ạ.\nEm vô cùng xin lỗi. Em sẽ đổi cái khác\nngay đây ạ.」"

# monologue
# JP: ようやく顔を持ち上げ直せた僕の目の前、\nハチロクはツとしゃがみ込み――
3185 = "Ngay trước mắt tôi, khi tôi vừa mới ngẩng\nmặt lên được,\nHachiroku đã ngồi xổm xuống——"

# 【双鉄】
# display as 雙鐵
# JP: 「いかんっ！　ハチロクっ、しゃがむな！？」
2141 = "「Không được! Hachiroku, đừng ngồi xổm\nxuống!?」"

# 【ハチロク】
# display as 八六
# JP: 「えっ！？　あ――はいっ！？」
2062 = "「Hả!? A——vâng!?」"

# monologue
# JP: いきなりの命令に困惑したのか、\nハチロクが動きをとめてしまう。
2936 = "Tôi chỉ tay lên trên đầu.\nNếp nhăn trên trán Hibiki càng hằn sâu\nhơn."

# monologue
# JP: 箸を拾おうと前かがみになった姿勢のまま、で――
3039 = "Vẫn giữ nguyên tư thế hơi cúi người về\nphía trước để nhặt đũa, và——"

# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロク――その、だな…………\nああ、そうだ、手鏡かなにか持っているか？」
1402 = "「……Hachiroku——chuyện đó, ừm…………\nÀ, đúng rồi, em có mang theo gương tay hay\ngì không?」"

# 【ハチロク】
# display as 八六
# JP: 「もちろんでございます。\nそれも、淑女の嗜みですので」
2454 = "「Thật may vì người đó là ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なら貸してくれ。姿勢はそのまま、動かさず」
2574 = "「Vậy cho anh mượn. Giữ nguyên tư thế đó,\nđừng cử động nhé.」"

# 【ハチロク】
# display as 八六
# JP: 「はい、かしこまりました」
2413 = "「Vâng, em rõ rồi ạ.」"

# monologue
# JP: どこかに、ポケットでもあったのだろうか？
3426 = "Đâu đó có túi áo túi quần sao?"

# monologue
# JP: ハチロクは衣装に触れると、\nすぐにコンパクトミラーを渡してくれる。
2866 = "Hachiroku sờ vào trang phục,\nrồi nhanh chóng đưa cho tôi chiếc gương\ntrang điểm nhỏ."

# 【双鉄】
# display as 雙鐵
# JP: 「見てみろ――これが、今のお前の胸もとだ」
1939 = "「Nhìn xem——đây, là vùng ngực của em lúc\nnày đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「あっ！？　きゃああっ！！？」
2112 = "「Ở \\x%l機関区;#00ffc040;kho đầu máy%l;#; Teiou, trong một thời gian\ndài chỉ có một mình cô Kiyomi là người lái\ntàu thôi ạ.\nTuy nhiên, trong thời chiến thì số lượng\nnữ \\x%l機関士;#00ffc040;người lái tàu%l;#; đã tăng lên rất nhiều.」"

# monologue
# JP: 悲鳴と同時、ハチロクは両手で胸もとをおさえ、\nぺたんとへたり込んでしまう。
3001 = "Cùng lúc với tiếng hét, Hachiroku dùng hai\ntay che ngực,\nrồi ngồi bệt xuống sàn."

# 【ハチロク】
# display as 八六
# JP: 「わ――わたくし――丸、見えっ――」
2048 = "「E——em——lộ, hết rồi——」"

# 【双鉄】
# display as 雙鐵
# JP: 「胸のサイズがもう少しあれば違うのだろうが、\nそのなだらかに、この衣装では――――」
2233 = "「Nếu vòng một lớn hơn chút nữa thì có lẽ\nđã khác, nhưng\nvới sự phẳng lì đó, cộng thêm bộ trang\nphục này thì――――」"

# monologue
# JP: いかん。\n思ったときには、もう遅い。
2814 = "Không xong rồi.\nLúc nhận ra thì đã quá muộn."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
# 2612 = "「雙鐵少爺？」" 

# monologue
# JP: ハチロクが、たおやかに笑っている。
2873 = "Hachiroku, đang mỉm cười dịu dàng."

# 【ハチロク】
# display as 八六
# JP: 「そのなだらか、とは――\nどのなだらかでございましょうか？」
2280 = "「Sự phẳng lì đó, là——\nphẳng lì ở chỗ nào vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「すまなかった」
2357 = "「Anh xin lỗi.」"

# monologue
# JP: 手をつく。そして頭を下げる。\nハチロクの声は――返ってこない。
3195 = "Tôi chống tay xuống. Và cúi đầu.\nKhông có tiếng đáp lại——từ Hachiroku."

# monologue
# JP: 恐る恐るに頭をあげる――と。
3153 = "Chết thật.\nTôi lỡ buột miệng nói ra suy nghĩ của mình\nmất rồi."

# 【ハチロク】
# display as 八六
# JP: 「……わたくしは、\n双鉄様のご発言に怒っているわけではございませぬ」
1415 = "「……Em,\nkhông hề tức giận vì câu nói của Ngài\nSoutetsu đâu ạ.」"

# monologue
# JP: 僕の発言に怒っているとしか思えぬ声で、\nそれでもハチロクは答えてくれる。
2886 = "Dù nghe giọng điệu thì chỉ có thể nghĩ là\nem đang giận vì câu nói của tôi,\nnhưng Hachiroku vẫn trả lời."

# 【ハチロク】
# display as 八六
# JP: 「『コノフクハキルコト』不十分な指示と存じます。\n誰が、いつ、どのようにも書いておくべきです」
1381 = "「\"PHẢI MẶC BỘ QUẦN ÁO NÀY\", em nghĩ đây là\nmột chỉ thị không đầy đủ.\nLẽ ra phải ghi rõ ai, khi nào, và mặc như\nthế nào nữa.」"

# monologue
# JP: 指示書きをわざわざ引っ張り出して、\nハチロクの手はその文字を――？
2865 = "Nếu sự căng thẳng là do thể chất, và dù có\ngồng mình cũng không thể bù đắp được,\nthì một sự cản trở cực kỳ đơn giản như\ntiếng la ó cũng sẽ mang lại hiệu quả lớn."

# 【双鉄】
# display as 雙鐵
# JP: 「少し待て、ハチロク。なにか、おかしい」
2482 = "「Thợ đốt lò và \\x%lレイルロオド;#00ffc040;Railord%l;#; thì vào phòng tắm\nnữ.\nChứ để làm bẩn cái phòng tắm nam rộng\nthênh thang thì ta chịu không thấu đâu.」"

# 【ハチロク】
# display as 八六
# JP: 「ですから、おかしいのはこの指示で」
2340 = "「Vì thế em mới nói, cái không đúng là chỉ\nthị này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうなのだが――ほら、ここだ」
2391 = "「Điều đó thì đúng rồi, nhưng——nhìn này, ở\nchỗ này cơ.」"

# 【ハチロク】
# display as 八六
# JP: 「え？」
# 2065 = "「哎？」" 

# monologue
# JP: 『キルコト』のルの字が、歪んでる。
1344 = "「Cái gì vậy ạ? Cái này——\nÔi! Là sợi chỉ vụn.」"

# 【ハチロク】
# display as 八六
# JP: 「なんでしょう？　これ――\nまぁ！　糸くず」
2553 = "「Thật là dễ gây hiểu lầm quá đi——thôi\nxong.\nA——」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと紛らわしいことか――っと。\nあ――」
2266 = "「Thế này thì……sợi chỉ vụn, đã làm thay đổi\ncả ý nghĩa——」"

# 【ハチロク】
# display as 八六
# JP: 「これは……糸くずが、意味まで変えて――」
2552 = "「Thế này thì……sợi chỉ vụn, đã làm thay đổi\ncả ý nghĩa——」"

# monologue
# JP: 『ル』、ではなく『ノ　+　糸くず』\n糸くずを退けてしまえば、残すところは――
2812 = "「\"PHẢI VỨT BỎ BỘ QUẦN ÁO NÀY\"」"

# 【ハチロク】
# display as 八六
# JP: 「『コノフクハキノコト』」
1382 = "「Bộ quần áo này, phải vứt bỏ——\nTrời ạ, hóa ra là đồ bỏ đi sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「この服、破棄のこと――\nなんと、捨てるべきものだったのか」
1973 = "「Bộ quần áo này, phải vứt bỏ——\nTrời ạ, hóa ra là đồ bỏ đi sao.」"

# monologue
# JP: ビール列車の制服として、\n着るまでもなく不適であると判断されて、没とされた。
2966 = "Với tư cách là đồng phục của Tàu bia,\nnó đã bị đánh giá là không phù hợp ngay cả\nkhi chưa mặc thử, và bị loại bỏ."

# monologue
# JP: それが何らかの手違いで、\nいままで残り続けてしまっていただけか。
3301 = "Chỉ là do một sự nhầm lẫn nào đó,\nmà nó vẫn còn sót lại cho đến tận bây giờ\nsao."

# 【ハチロク】
# display as 八六
# JP: 「……本当に紛らわしい。この糸くずさえなければ、\nわたくし、双鉄様に無様をお見せするようなことなど」
1409 = "「……Thật sự quá dễ gây hiểu lầm. Nếu không\ncó sợi chỉ vụn này,\nthì em, đã không phải phơi bày bộ dạng khó\ncoi trước mặt Ngài Soutetsu rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、無様などではなかったぞ」
1897 = "「Không đâu, chẳng có gì là khó coi cả.」"

# 【ハチロク】
# display as 八六
# JP: 「え？」
# 2065 = "「哎？」" 

# monologue
# JP: きょとん、とした顔。\nそれでようやく、理解がつながる。
3015 = "Khuôn mặt ngơ ngác.\nĐến lúc này, tôi mới hiểu ra mọi chuyện."

# monologue
# JP: ハチロクの、らしくも無い長い怒りの原因は、\n僕の失言が一因とはいえ……
2863 = "Hibiki vẫn không thay đổi, việc được khen\nngợi——không,\nngay cả việc bản thân nhận được đánh giá\nxứng đáng, em ấy cũng có vẻ không quen."

# 【双鉄】
# display as 雙鐵
# JP: 「それで、ハチロクは怒っていたのか。\n僕に無様を晒したと、そう誤解してしまったが故」
2345 = "「Vậy ra, Hachiroku tức giận là vì thế sao.\nVì hiểu lầm rằng em đã phơi bày bộ dạng\nkhó coi trước mặt anh.」"

# 【ハチロク】
# display as 八六
# JP: 「怒ってなどはおりませぬ。ですが――ですが、\nわたくし――自らが不甲斐なくて、口惜しくて」
2434 = "「Em không hề tức giận. Nhưng——nhưng mà,\nem——chỉ thấy bản thân mình thật vô dụng,\nthật đáng tiếc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「無様ではなく、かわいかった。\n正直、その……僕は性的にを興奮した」
2074 = "「Hừm.」"

# 【ハチロク】
# display as 八六
# JP: 「え？」
# 2065 = "「哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かがみこみ、胸の先まで――服の奥までが見え。\n僕は性的に興奮したゆえに、まずいと思った」
2467 = "「Khi em cúi người xuống, anh có thể nhìn\nthấy tận sâu bên trong áo——đến tận đầu\nngực.\nAnh đã cảm thấy hưng phấn, nên mới nghĩ là\nkhông ổn.」"

# 【ハチロク】
# display as 八六
# JP: 「ですから、\nわたくしがそのような無様をお見せしなければ」
2349 = "「Ghế ngồi tắm?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういう意味のまずさではない。\nそもそも、失敗をゼロにすることなどは、不可能だ」
2298 = "「Không phải là không ổn theo nghĩa đó.\nVốn dĩ, việc loại bỏ hoàn toàn sai sót là\nđiều không thể.」"

# 【ハチロク】
# display as 八六
# JP: 「――はい」
1360 = "「——Vâng.」"

# monologue
# JP: 事故は起こる。\nハチロクも僕も、そのことを何より知っている。
3385 = "Tai nạn luôn có thể xảy ra.\nHachiroku và tôi, hiểu rõ điều đó hơn ai\nhết."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、大切となるのは準備であり、装備となる。\nが、今回の場合は、装備であるその服が――」
2202 = "「Vì vậy, điều quan trọng là sự chuẩn bị,\nlà trang bị.\nNhưng trong trường hợp này, trang bị là bộ\nquần áo đó——」"

# monologue
# JP: あらためて。見る。\n胸だけ、やはり余っている。
3124 = "Tôi nhìn lại một lần nữa.\nPhần ngực, quả nhiên vẫn bị thừa ra."

# monologue
# JP: その危うさも、\n僕にとっては大きな魅力であるがゆえ――
3388 = "Sự hớ hênh đó,\nđối với tôi lại là một sức hút to lớn, vì\nthế——"

# 【双鉄】
# display as 雙鐵
# JP: 「新たな危険要因になってしまっている。つまり……\n目にした者の性的興奮を煽るという意味において」
2555 = "「Nó đã trở thành một yếu tố nguy hiểm mới.\nTức là……\ntrong việc kích thích ham muốn của người\nnhìn thấy nó.」"

# 【ハチロク】
# display as 八六
# JP: 「それは……その……さほどの危険要因ではないかと。\n申しました通り、世間一般でレイルロオドは物ですし」
2333 = "「Điều đó……ừm……chắc cũng không phải là yếu\ntố nguy hiểm gì to tát đâu ạ.\nNhư em đã nói, trong mắt xã hội, Railord\nchỉ là đồ vật thôi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれん。人間は、単なる物には発情せん。\nが――お前は、世界一美しいハチロクだぞ？」
2013 = "「Có thể là vậy. Con người không phát tình\nvới một đồ vật đơn thuần.\nNhưng——em là Hachiroku xinh đẹp nhất thế\ngian cơ mà?」"

# monologue
# JP: なぜ伝わらんのか、じれったい。\n言葉が、どうしても急いてくる。
3180 = "Tại sao em lại không hiểu chứ, thật sốt\nruột.\nLời nói cứ thế tuôn ra một cách vội vã."

# 【双鉄】
# display as 雙鐵
# JP: 「その胸を目にしてしまった者は、\n仮に木石であろうとも、性的興奮を煽られよう」
2465 = "「Bất cứ ai nhìn thấy bộ ngực đó,\ncho dù có là gỗ đá vô tri, cũng sẽ bị kích\nthích ham muốn thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「いえ――双鉄様。自分で申すのも悲しいのですが\n……この胸ですよ？　その、人間の方々が好むのは」
1889 = "「Không đâu——Ngài Soutetsu. Tự mình nói ra\nđiều này cũng thật đáng buồn,\n……nhưng ngực em thế này cơ mà? Chắc chắn,\ncon người sẽ thích những bộ ngực」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、お前は例外なのだ。お前の胸なら、\nどれほど小さくあろうとも、見た者を必ず魅了する」
1931 = "「Vì thế, em là ngoại lệ. Nếu là ngực của\nem,\ndù có nhỏ bé đến đâu, chắc chắn cũng sẽ\nlàm say đắm bất cứ ai nhìn thấy.」"

# 【ハチロク】
# display as 八六
# JP: 「！」
# 2624 = "「！」" 

# monologue
# JP: 驚いた顔。\nそれがじわじわ、溶けていく。
3264 = "Khuôn mặt ngạc nhiên.\nRồi dần dần, tan chảy."

# 【ハチロク】
# display as 八六
# JP: 「つまり――かいつまめば……双鉄様は――」
2255 = "「Nói cách khác——tóm lại là……Ngài\nSoutetsu——」"

# monologue
# JP: ハチロクはしばし黙り込み、それからゆっくり、\n慎重に慎重に、言葉を発する。
2871 = "Đúng rồi nhỉ.\nTôi đã nghe em ấy nói là vì anh em đang\ntuổi mới lớn nên mới thấy xấu hổ."

# 【ハチロク】
# display as 八六
# JP: 「わたくしのお胸が、見知らぬ誰かに見られてしまう。\nそのときのことを想定されて、双鉄様は……その」
2279 = "「Bộ ngực của em, sẽ bị một kẻ xa lạ nào đó\nnhìn thấy.\nTưởng tượng đến viễn cảnh đó, Ngài\nSoutetsu đã……ừm」"

# 【双鉄】
# display as 雙鐵
# JP: 「動転したのだ。言葉を正しく使えぬほどに。\n僕以外の誰にも見せたくないと思ったがゆえ」
2306 = "「Vâng, chuyện đó thì em biết.\nEm cũng đang theo học ở học viện Yunoi\nmà.」"

# 【ハチロク】
# display as 八六
# JP: 「……なるほど、左様でございましたか」
1403 = "「……Ra là vậy, thì ra là thế ạ.」"

# monologue
# JP: 普段どおりを装っている声。\nけれど、嬉しさがほころんでいる。
3033 = "Giọng nói giả vờ như bình thường.\nNhưng niềm vui sướng lại đang hé nở."

# 【ハチロク】
# display as 八六
# JP: 「そのようなご心配は不用です。わたくし、この服は、\n双鉄様の[おんまえ,1]御前でしか、召しませぬ」
1894 = "「Ngài không cần phải lo lắng về điều đó\nđâu ạ. Em, bộ trang phục này,\nsẽ chỉ mặc khi ở trước mặt Ngài Soutetsu\nthôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕の前では、着てくれるのか」
2205 = "「Em sẽ mặc nó, khi ở trước mặt anh sao?」"

# monologue
# JP: 少し、意外だ。
3172 = "Có chút, bất ngờ."

# monologue
# JP: 律儀極まるハチロクだ。\n“ハキノコト”に従うものかと思っていたが。
3397 = "Một Hachiroku vô cùng nguyên tắc.\nTôi cứ tưởng em sẽ tuân theo chỉ thị \"PHẢI\nVỨT BỎ\" chứ."

# 【ハチロク】
# display as 八六
# JP: 「せっかく、双鉄様の『性的興奮』を煽れる服です。\n双鉄様がご廃棄されたら、大事に回収いたします」
2615 = "「Đã cất công tìm được một bộ trang phục có\nthể kích thích 'ham muốn' của Ngài\nSoutetsu mà.\nNếu Ngài Soutetsu vứt bỏ, em sẽ cẩn thận\nthu hồi lại ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。それは大変にありがたい――では、\n僕はその服を、汰斗さんの指示通りに破棄しよう」
1975 = "「Xấu hổ sao? Anh em với nhau mà.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたらわたくしは、破棄された服を拾います。\nうふふ――双鉄様のお気に召しそうな一着ですので」
2585 = "「Nếu vậy, em sẽ nhặt bộ trang phục bị vứt\nbỏ đó lên.\nUfufu——Vì đây là một bộ trang phục có vẻ\nrất hợp ý Ngài Soutetsu mà.」"

# monologue
# JP: 言って、ハチロクはその中指で、\n服を――いや、自らの身体をなぞって行く。
3365 = "Nói rồi, Hachiroku dùng ngón giữa,\nvuốt ve bộ trang phục——không, vuốt ve\nchính cơ thể mình."

# monologue
# JP: なだらかで美しい体の線を、\nフリルの下から浮き上がらせようとするかのように。
3247 = "Navi đã nói vậy, và thay vì chở tôi,\ncô ấy đã luôn theo sát tôi từ trên cao."

# monologue
# JP: （ぞくっ）
3489 = "（Rùng mình）"

# monologue
# JP: 血が、騒ぐ。
3341 = "Máu trong người tôi, đang sôi sục."

# monologue
# JP: 誘われている。\n指が、視線が、声が、全てが、僕を性的に誘っている。
2988 = "Đang bị quyến rũ.\nNgón tay, ánh mắt, giọng nói, tất cả mọi\nthứ, đều đang khêu gợi tôi."

# 【ハチロク】
# display as 鈴
# JP: 「陽も、落ちましたね」
2215 = "「Mặt trời, cũng đã lặn rồi nhỉ.」"

# monologue
# JP: ごく控えめに。\n世界で一人僕にだけわかることばで、誘ってくれる。
3266 = "Rất e lệ.\nEm quyến rũ tôi bằng những lời nói mà trên\nthế giới này chỉ mình tôi hiểu được."

# 【双鉄】
# display as 雙鐵
# JP: 「業務の時間は、終わったな」
2260 = "「Cứu giúp ai đó.」"

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。双鉄様」
2397 = "「Nghe nói những tiếng la ó phản đối dữ dội\nlắm.\nMỗi khi Thị trưởng Paulette bước lên bục\nphát biểu ở hội đồng thành phố.」"

# monologue
# JP: つ、と。\nハチロクが僕に寄ってくる。
2951 = "Tôi vừa dùng cử chỉ tay, vừa giải thích về\nviệc \\x%l投炭;#00ffc040;xúc than%l;#;."

# monologue
# JP: 体をぴたりとくっつけて、\nゼロ距離から、甘やかな声を流し込んでくる。
3028 = "Lạch cạch, Hibiki chạy ùa vào nhà và phóng\nlên lầu."

# 【ハチロク】
# display as 八六
# JP: 「ここから先は、わたくしごとの時間です」
2360 = "「Shochu à? Uống sau khi tắm xong thì nguy\nhiểm lắm đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2169 = "「嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 2092 = "「啊」" 

# monologue
# JP: すずの黒髪に顔を埋め、\n匂いを、思い切りすって楽しむ。
3159 = "Vùi mặt vào mái tóc đen của Suzu,\ntôi thỏa thích hít hà và tận hưởng mùi\nhương của em."

# 【双鉄】
# display as 雙鐵
# JP: 「おひさまと――シャンプーの匂いがするな」
2402 = "「Anh cũng cảm thấy mặt mình dính khá nhiều\nbụi, nhưng không ngờ lại đen thui thế này.\nThảo nào Navi không cho anh lên xe.」"

# 【ハチロク】
# display as 八六
# JP: 「今日は……煙を吸っておりませんので」
2203 = "「Hôm nay……em không phải hít khói bụi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いい匂いだ。これも、お前の匂いなのだな」
2478 = "「Mùi hương tuyệt thật. Đây cũng là mùi\nhương của em nhỉ.」"

# 【ハチロク】
# display as 鈴
# JP: 「左様ですね、これも、です」
2394 = "「Đúng vậy ạ, đây cũng là, mùi của em.」"

# monologue
# JP: 小さく笑い、\nすずもまた、僕へと鼻先を押し付けてくる。
2998 = "Cười khúc khích,\nSuzu cũng áp chóp mũi vào tôi."

# 【ハチロク】
# display as 鈴
# JP: 「乗務のあとの汗と煙の混じる匂いも、\nお風呂あがりの石鹸も、双鉄様の匂いなように」
1906 = "「Mùi mồ hôi lẫn với khói bụi sau khi làm\nnhiệm vụ,\nhay mùi xà phòng sau khi tắm xong, tất cả\nđều là mùi hương của Ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「どんなときでも、お前と、僕だ」
2447 = "「Đây là giới hạn rồi! Lại gần nữa em sẽ\nxấu hổ chết mất,\nem không dám nhìn anh hai nữa đâu.」"

# monologue
# JP: 顎を持ち上げ、瞳を見つめる。\nそのまま深く口付ける。
3161 = "Nâng cằm em lên, tôi nhìn sâu vào đôi mắt\nấy.\nCứ thế trao cho em một nụ hôn sâu."

# 【ハチロク】
# display as 八六
# JP: 「ん……ちゅっ――ちゅむっ――ちゅっ――んっ――\nれるっ――れろっ――じゅるる――れるっ――ちゅぷ」
2156 = "「Sou-chan.」"

# monologue
# JP: 中断していた時間の続きだ。\nハチロクもすぐに答えてくれる。
3186 = "Sự tiếp nối của khoảng thời gian bị gián\nđoạn.\nHachiroku cũng lập tức đáp lại tôi."

# monologue
# JP: 唇を割り、唾液をすすり、\n短い舌で懸命に、僕の口内をねぶってくれる。
2977 = "Tách đôi môi tôi ra, mút lấy nước bọt,\nbằng chiếc lưỡi ngắn ngủi, em ra sức liếm\nláp khoang miệng tôi."

# 【ハチロク】
# display as 八六
# JP: 「はっ――んっ――ちゅっ――ふっ、ほうへふ、はぁ\n――ちゅくっ、ん――らいふき――れふっ――ふぅっ」
2053 = "「Hả? Ơ……ờm——」"

# monologue
# JP: うわごとのような囁きが、\n口から口へと直接響く。
2991 = "Tiếng thì thầm như nói mớ,\nvang vọng trực tiếp từ miệng truyền sang\nmiệng."

# monologue
# JP: 体の芯に効いてくる。\n股間が――どんどん熱くなる。
3177 = "Tác động đến tận tâm can.\nĐũng quần——ngày càng trở nên nóng rực."

# 【双鉄】
# display as 雙鐵
# JP: 「ん……ふっ――」
2154 = "「Đúng thế nhỉ!」"

# monologue
# JP: だからぐりぐり、押し付ける。
3175 = "Vì thế tôi liên tục cọ xát, và áp sát vào."

# monologue
# JP: 僕はお前を求めていると、\n少女そのもののフリルの上から、強く伝える。
3174 = "Nghe tôi nói vậy, Hibiki nhíu mày vẻ bất\nmãn."

# 【ハチロク】
# display as 八六
# JP: 「あっ――んっ……ちゅうっ」
2078 = "「A——ưm……chụttttt」"

# monologue
# JP: キスが、ゆるゆる解かれる。
3121 = "Nụ hôn, từ từ buông lơi."

# 【ハチロク】
# display as 鈴
# JP: 「お足もと、失礼いたします」
2359 = "「Xin thất lễ với đôi chân của ngài.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！？」
2184 = "「Vâng, thưa ngài Soutetsu.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくし、またも、\n双鉄様の性的興奮を、煽ってしまいましたね」
2305 = "「Em, lại một lần nữa,\nkích thích sự hưng phấn tình dục của Ngài\nSoutetsu rồi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2382 = "「À——」"

# monologue
# JP: 期待に満ち満ちたハチロクの瞳。\n望まれていることは明快だ。
2878 = "Ngay cả trong những cử chỉ nhỏ nhặt như\nvậy, Hibiki vẫn luôn nghiêm túc và hết\nmình."

# 【双鉄】
# display as 雙鐵
# JP: 「僕の性的興奮を――\nすず。お前に……僕の妻に、鎮めてほしい」
2323 = "「Sự hưng phấn tình dục của anh——\nSuzu. Anh muốn em……vợ của anh, xoa dịu\nnó.」"

# 【ハチロク】
# display as 鈴
# JP: 「かしこまりました、旦那様。\nそれでは――失礼いたしまして」
2373 = "「Em hiểu rồi thưa phu quân.\nVậy thì——xin phép ngài.」"

# monologue
# JP: しゃらしゃらリボンが衣擦れする。
3302 = "Dải ruy băng cọ vào quần áo sột soạt."

# 【ハチロク】
# display as 鈴
# JP: 「ん――よい、しょっ。双鉄様の、おおきくて――\nふ……あ……お窓から出すだけ――でもっ」
2151 = "「Ưm——xong, rồi. Của ngài Soutetsu, to\nquá——\nPhù……a……chỉ lấy ra từ cửa sổ thôi——mà\ncũngっ」"

# monologue
# JP: 愛情をこめて丁寧に、すずは勃起を導いていく。
3002 = "Suzu cẩn thận và đầy yêu thương dẫn dắt sự\ncương cứng của tôi."

# 【ハチロク】
# display as 鈴
# JP: 「車内で、汗をかかれたのですね。匂いが――\n（すん、すんっ）――いつもより濃ぅございます」
2206 = "「Anh không biết đâu là câu trả lời đúng.\nCũng không biết điều gì sẽ kết nối với\nnhau.\nVậy thì chỉ còn cách tin rằng tất cả đều\nlà câu trả lời đúng và làm thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば……綺麗にしてもらえるか？」
2582 = "「Vậy thì……em làm sạch cho tôi được không?」"

# 【ハチロク】
# display as 鈴
# JP: 「かしこまりました、旦那様――んっ！？」
2371 = "「Bà chủ Tororyu-yu ơi, lâu rồi không gặp\nbà ạ.」"

# monologue
# JP: 自分から亀頭を差し出し、すずの唇に押し当てる。\n柔らかに濡れた感触に、勃起がビクリと動いてしまう。
3119 = "Tôi chủ động đưa quy đầu ra, áp vào môi\nSuzu.\nCảm giác ẩm ướt mềm mại khiến dương vật\nkhẽ giật bắn lên."

# 【双鉄】
# display as 雙鐵
# JP: 「舐めてくれ。決して咥えず、丁寧に」
2507 = "「Liếm đi. Tuyệt đối không được ngậm, phải\nthật cẩn thận.」"

# 【ハチロク】
# display as 八六
# JP: 「っ――」
1354 = "「っ——」"

# monologue
# JP: 言葉を亀頭に抑えられたままの小さな返事。\nちろり、舌先が僕を這う。
2955 = "Khi tôi chui vào trong chăn, ở một góc xa,\nHachiroku cũng thu mình chui vào với vẻ vô\ncùng e dè."

# 【ハチロク】
# display as 鈴
# JP: 「ぺろっ、ぺろっ、ぺろっ、ぺろっ――\nん……ぺろっ――ぺろおっ――ぺろ、ぺろ」
2030 = "「Nhưng đôi mắt của Hibiki đã nhìn thấy màu\nđỏ mà tôi bỏ lỡ.\nQua bức tranh của Hibiki——tôi đã thực sự\nhiểu được rằng màu đỏ là màu đỏ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふ……くっ――」
2036 = "「Cảm giác khá là dễ chịu đấy.\nThế nào, Hibiki cũng thử học xem sao.」"

# monologue
# JP: 尿道口の割れ目を、しつこく、しつこく舐める。
2990 = "Nếu đã được nhận diện như vậy,\nthì tôi càng phải cẩn trọng trong từng\nhành động và cử chỉ hơn bình thường."

# 【ハチロク】
# display as 鈴
# JP: 「ちろっ、ぺろっ、ぺろっ、ぺろっ、れるっ――\nんっ――ぺるっ、ぺろっ――ぺろ、ぺろ、ぺろ、ぺろ」
2136 = "「Chụt, pero, pero, pero, rero——\nƯm——pero, pero——pero, pero, pero, pero」"

# 【双鉄】
# display as 雙鐵
# JP: 「舌の動きに――強弱を」
2505 = "「Chuyển động của lưỡi——cần có nhịp độ mạnh\nyếu.」"

# 【ハチロク】
# display as 鈴
# JP: 「ぺろっ、ぺろっ、ぺろっ――ぺろおっ――\nぺちゃ、ぺちゃ、ぺちゃっ――ぺちゅううっ」
2029 = "「Pero, pero, pero——peroo——\nPecha, pecha, pecha——pechuuu」"

# monologue
# JP: 小刻みに動く舌先が、\n時折亀頭に食い込んでくる。
3076 = "Đầu lưỡi chuyển động từng nhịp nhỏ,\nthỉnh thoảng lại luồn lách vào quy đầu."

# 【ハチロク】
# display as 鈴
# JP: 「ちゅるうっ――ちゅ、ずっ――ぺろ、ぺろ、ぺろっ、\nちゅるうっ、ちゅっ――れろっ――ぺろ、ぺろおっっ」
2133 = "「Churuu——chu, zu——pero, pero, pero,\nchuruu, chu——rero——pero, perooo」"

# monologue
# JP: 心地いい。舌に欲望が誘導される。
3270 = "Thật dễ chịu. Dục vọng của tôi hoàn toàn\nbị cái lưỡi ấy dẫn dắt."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆっくり行くぞ」
2312 = "「Vậy sao?」"

# monologue
# JP: じわじわと腰を進めて、唇を突く。
3115 = "Chuyện này lan truyền đến tận tai tôi ở Đế\nđô.\nPhe ủng hộ thu hút đầu tư chắc hẳn đã\nchiếm đa số trong hội đồng."

# 【ハチロク】
# display as 鈴
# JP: 「んっ――はむっ――ちゅっ――ちゅううっ、ちゅ」
2153 = "「Nhân tiện, Hachiroku này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ、くっ――」
2113 = "「A, ưm——」"

# monologue
# JP: くぽり、咥えられ吸われてく。
3320 = "Phập một tiếng, nó đã bị ngậm lấy và mút\nmát."

# 【ハチロク】
# display as 鈴
# JP: 「ぺろっ、れろっ――ぺろ、ぺろっ――ぺろっ、ぺろ、\nぺろっ――ぺろおおっ――はむっ――ちゅずううっ！」
2031 = "「Pero, rero——pero, pero——pero, pero,\npero——perooo——hamu——chuzuuu!」"

# monologue
# JP: 思わず腰を止めてしまえば、舌が一気に蠢き出す。
3117 = "Tôi bất giác dừng hông lại, chiếc lưỡi lập\ntức ngọ nguậy mãnh liệt."

# 【ハチロク】
# display as 鈴
# JP: 「ちゅっ――じゅっ――じゅるっ――じゅううっ――\nんっ――れろおおっ――れるっ――れるううううっ」
2122 = "「Chu——ju——juru——juuu——\nƯm——rerooo——reru——reruuuu」"

# monologue
# JP: ゆっくりたっぷりねぶられていく。
3031 = "Có vẻ Hibiki đang ở trên tầng hai."

# 【ハチロク】
# display as 鈴
# JP: 「れるっ――るっ――るうううっ――じゅ、ずっ――\nずっ――れろ――れるううっ――ずずっ――ずうっ」
2043 = "「Mogaga! Mogagobugabugobu! Gobubuuu!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「んっ――くっ」
2149 = "「Ưm——ưm」"

# monologue
# JP: これほどわがままに動いてもなお、\nすずの舌先は貪るように、僕を抱きしめ愛してくれる。
3083 = "Dù tôi có chuyển động tùy tiện đến thế nào\nđi chăng nữa,\nđầu lưỡi của Suzu vẫn như muốn nuốt chửng,\nôm ấp và yêu thương lấy tôi."

# monologue
# JP: その快感が、僕を酔わせる。
3389 = "Khoái cảm đó khiến tôi say đắm."

# 【ハチロク】
# display as 鈴
# JP: 「ちゅむっ、れるっ――ちゅううっ、ちゅるるっ――\nズズッ――んっ――ちゅっ――れろっ、れるうっ」
2140 = "「Chumu, reru——chuuu, chururu——\nZuzu——ưm——chu——rero, reruu」"

# 【双鉄】
# display as 雙鐵
# JP: 「す、ず――」
2586 = "「Su, zu——」"

# monologue
# JP: 小さく可憐な口を使ってセックスしてる。\nすずの口腔を――犯してる。
3137 = "Tôi đang làm tình bằng chiếc miệng nhỏ bé\nđáng yêu ấy.\nTôi đang xâm phạm——khoang miệng của Suzu."

# monologue
# JP: （じゅぼおおおおおおっ！）
3492 = "（Chụt bọpppp!）"

# 【ハチロク】
# display as 鈴
# JP: 「んぶっ！！！！？」
2179 = "「Ưm bu!!!!?」"

# monologue
# JP: 思った瞬間、すずの喉奥を突いている。\nもう止まらないし、止まる気も無い。
3182 = "Tấm lưng——lưng sao.\nTôi chìa lưng về phía Hachiroku theo yêu\ncầu."

# 【ハチロク】
# display as 鈴
# JP: 「んむっ！？　んっ――ちゅぼっ――じゅっ！\nぢゅぶっ！　ぢゅむっ！　ふっ――ちゅむ、じゅっ！」
2182 = "「Ưm mu!? Ưm——chubo——ju!\nJubu! Jumu! Phù——chumu, ju!」"

# monologue
# JP: 口だけでなく、喉の奥まで――\nすずの全てを、僕の精液で染め抜きたい。
2810 = "Không chỉ trong miệng, mà sâu tận cuống\nhọng——\nTôi muốn nhuộm đẫm toàn bộ con người Suzu\nbằng tinh dịch của mình."

# 【ハチロク】
# display as 鈴
# JP: 「んっ――ちゅっ――ちゅぼっ！　じゅぼっ！\nじゅ！　じゅぼっ！　じゅりゅうう！　じゅ、ぼっ！」
2145 = "「Ưm——chu——chubo! Jubo!\nJu! Jubo! Juryuuu! Ju, bo!」"

# 【双鉄】
# display as 雙鐵
# JP: 「く――あっ」
1355 = "「Ư——a」"

# 【ハチロク】
# display as 鈴
# JP: 「ちゅむっ！　じゅっ！　じゅぼっ――んっ、ふっ、\nれるっ――ぢゅっ！　ぢゅぼっ！　じゅるううっ！」
2138 = "「Chumu! Ju! Jubo——ưm, phù,\nreru——ju! Jubo! Juruuu!」"

# monologue
# JP: すずも健気に応えてくれる。\n舌を柔らかなレールとし、勃起の動きを助けてくれる。
3403 = "Suzu cũng kiên cường đáp lại tôi.\nCô ấy biến chiếc lưỡi thành một đường ray\nmềm mại, hỗ trợ cho từng chuyển động của\ndương vật."

# 【ハチロク】
# display as 鈴
# JP: 「ちゅうっ！　じゅっ！　ぢゅるるっ！　じゅぼっ！\nんっ――ちゅうっ！　ぢゅっ！　ぢゅぼ！　ぢゅ！」
2128 = "「Chuu! Ju! Jururu! Jubo!\nƯm——chuu! Ju! Jubo! Ju!」"

# monologue
# JP: 受け入れられてる、包まれている、愛されている。\nだから、このまま吐き出したくなる。
3011 = "Tôi đang được đón nhận, được bao bọc, được\nyêu thương.\nChính vì vậy, tôi muốn cứ thế này mà bắn\nra."

# 【双鉄】
# display as 雙鐵
# JP: 「すず――飲んでくれ――僕の精液――精子を、全部」
2587 = "「Suzu——uống đi——toàn bộ tinh dịch——tinh tử\ncủa tôi.」"

# 【ハチロク】
# display as 鈴
# JP: 「ぢゅる――（ごくっ）――んっ――\nふへひゅうほはひはふ、ほーへふはは」
2134 = "「Juru——（Ực）——ưm——\nPhu he hyuu ho ha hi ha phu, ho he phu ha\nha」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
2625 = "「!!!」"

# 【ハチロク】
# display as 鈴
# JP: 「んっ――ちゅむっ！　じゅっ！　じゅぼっ！　じゅ、\nぢゅちゅっ！　ちゅむっ！　ぢゅるっ！　じゅぶ！」
2147 = "「Nếu không được thì cứ thử nhiều cách cho\nđến khi được mới thôi.」"

# monologue
# JP: 加速してく。
2978 = "Cô ấy tăng tốc."

# monologue
# JP: 吸い込む力が、ぽかぽかすぎる口内密度を更に高めて、\n僕の精液に早くおいでと手招きをする。
2944 = "Lực mút càng làm tăng thêm mật độ ấm áp\nbên trong khoang miệng,\nnhư đang vẫy gọi tinh dịch của tôi mau\nchóng trào ra."

# 【双鉄】
# display as 雙鐵
# JP: 「すず――いくぞっ」
2588 = "「Suzu——tôi ra đâyっ」"

# 【ハチロク】
# display as 鈴
# JP: 「ぢゅうううううっ！　ぢゅぼ！　ちゅっ！　じゅぶ、\nじゅぼっ！　ちゅうっ！　ぢゅるっ！　ぢゅ！　ぼ！」
2127 = "「Có lẽ là Hibiki muốn\nngài Soutetsu che cơ thể lại đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「くああ！」
2101 = "「Aaa!」"

# monologue
# JP: 精液がそこまでこみ上げている。\nすずの頭を捕まえて、思いっきりに腰を引きっ――
3296 = "Tinh dịch đã dâng trào đến tận đỉnh.\nTôi giữ chặt lấy đầu Suzu, và dùng hết sức\nrút hông——"

# 【ハチロク】
# display as 鈴
# JP: 「じゅるうううううっ！　ぢゅぼおっ――んくっ！？」
2135 = "「Juruuuuu! Juboo——ưm ku!?」"

# monologue
# JP: （びゅぶっ！　びゅるるっ！　びゅぶっ！　びゅううっ！）
3504 = "（Phụt! Phụt phụt! Phụt! Phụttt!）"

# 【ハチロク】
# display as 鈴
# JP: 「んぶっ！？　んっ――\nごくっ、ごくっ、ごくっ、ごくっ」
2181 = "「Ưm bu!? Ưm——\n（Ực, ực, ực, ực）」"

# monologue
# JP: （びゅううっ！　びゅっ！　びゅるるっ！　びゅうっ！）
3502 = "（Phụttt! Phụt! Phụt phụt! Phụttt!）"

# 【ハチロク】
# display as 鈴
# JP: 「ンッ――んっ――んっ――んっ――ん……」
2148 = "「Ưm——ưm——ưm——ưm——ưm……」"

# monologue
# JP: （びゅるるっ――びゅっ――――ぷっ）
3501 = "（Phụt phụt——phụt————phụt）"

# 【ハチロク】
# display as 鈴
# JP: 「ふっ……んっ――――（ごくんっ）\nずっ――ちゅるっ――じゅううっ――（ごくっ）」
2033 = "「Phù……ưm————（Ực）\nZu——churu——juuu——（Ực）」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2624 = "「！」" 

# monologue
# JP: 飲んで、くれた。
2987 = "Cô ấy đã uống, cạn sạch."

# monologue
# JP: 口内に出したものだけでなく、\n余りの量の飲みきれず、口の端からこぼれたものまで。
2808 = "Không chỉ những gì bắn vào trong miệng,\nmà cả phần tràn ra khỏi khóe môi vì lượng\ntinh dịch quá nhiều không nuốt kịp."

# 【ハチロク】
# display as 鈴
# JP: 「あー……んっ――」
2079 = "「A——」"

# monologue
# JP: すずは口を大きく開けて、僕にその中を見せつける。
3407 = "Suzu há to miệng, cho tôi thấy rõ bên\ntrong."

# 【ハチロク】
# display as 鈴
# JP: 「んう――っ――」
2176 = "「Rất hân hạnh được gặp bà.\nCháu là Migita Soutetsu.」"

# monologue
# JP: 口内にまだこびりついている精液を、\n指先で丁寧にぬぐいとる。
2927 = "Hồi trước với Michiko, dù là đi tắm hay\nlàm gì,\nchúng tôi cũng luôn ở cạnh nhau đúng chuẩn\nsinh đôi, nhưng……"

# monologue
# JP: ねっとりたまったそれを示せば、\nすずは、指先に吸い付いてくる。
2981 = "Sau đó Hibiki chậm rãi,\ncất lời với giọng điệu như đang giảng\ngiải."

# 【ハチロク】
# display as 鈴
# JP: 「ちゅっ――ちゅむっ――ちゅるうぅ――（ごくっ）」
2124 = "「Chu——chumu——churuuu——（Ực）」"

# 【双鉄】
# display as 雙鐵
# JP: 「すず、すず」
2592 = "「Suzu, Suzu」"

# 【ハチロク】
# display as 鈴
# JP: 「双鉄……様。まだ、足りませぬ」
2606 = "「Ngài Soutetsu…… Vẫn chưa, đủ đâu ạ.」"

# monologue
# JP: （とっ）
3490 = "（Bịch）"

# monologue
# JP: すがりつかれる、その勢いのまま横になる。
3007 = "Tôi để mặc cô ấy ôm chặt lấy mình, rồi cứ\nthế nằm xuống."

# 【双鉄】
# display as 雙鐵
# JP: 「今度はすずが、思うがままに動いてみてくれ」
2557 = "「Lần này Suzu cứ di chuyển theo ý mình\nmuốn đi.」"

# 【ハチロク】
# display as 鈴
# JP: 「はい――かしこまりました、双鉄様」
2380 = "「Quả thực là vậy.」"

# monologue
# JP: 手早く下着を脱ぎ捨てて、すずが、僕の上にまたがる。
2973 = "Suzu nhanh chóng cởi phăng đồ lót rồi cưỡi\nlên người tôi."

# monologue
# JP: スカートの裾をつまみ上げ、\nかわいいおまんまんを晒してくれる。
3009 = "Cô ấy túm lấy vạt váy,\nđể lộ ra cô bé vô cùng đáng yêu."

# 【ハチロク】
# display as 鈴
# JP: 「はしたないおんなと――\nどうぞ、思わないでくださいましね？」
2513 = "「Loại 8620……sao ạ?\nĐó là một đầu máy xe lửa hấp dẫn đến thế\ncơ ạ?」"

# monologue
# JP: （にゅるっ）
3512 = "（Nhóp nhép）"

# 【ハチロク】
# display as 鈴
# JP: 「あっ！」
2107 = "「A!」"

# monologue
# JP: 僕の勃起に、すずのおまんまんの割れ目が当たる。
3405 = "Khe hở cô bé của Suzu chạm vào dương vật\nđang cương cứng của tôi."

# monologue
# JP: ぐっしょり、濡れてる。\n触れ合った――ただそれだけで吸い付いてくる。
3395 = "Nó ướt đẫm.\nChỉ vừa chạm vào——đã có cảm giác như bị\nmút chặt lấy."

# 【ハチロク】
