1870 = "「Cùng nhau, cùng nhau, nhé!? Ngài\nSoutetsu,\ncùng với em, cùng nhau, cùng nhau ra nhé!」"

# 【双鉄】
# display as 雙鐵
# JP: 「望む――ところだっ」
2428 = "「Đúng như――tôi mong muốnっ」"

# 【ハチロク】
# display as 鈴
# JP: 「はぁ！　あ！　すきっ！　しゅき！　双鉄さまっ！\nそうてつ、さまっ――ふ、あっ――だんな、さまっ」
2109 = "「Ừ」"

# monologue
# JP: （きゅんっ！　きゅきゅうううんっ！）
3495 = "（Co thắt! Co thắttttt!）"

# 【ハチロク】
# display as 鈴
# JP: 「どうか――いっしょに――せいえき、くだ、さいっ\nわたくし――もう――んっ、げんかい、これ、もう！」
1868 = "「Xin ngài——hãy cùng nhau——ban cho em, tinh\ndịchっ\nEm——đã——ưm, đến giới hạn, rồi, sắp!」"

# monologue
# JP: 歯を食いしばり、射精欲求を一瞬、留める。
3135 = "Tôi nghiến răng, kiềm nén dục vọng xuất\ntinh trong một khoảnh khắc."

# 【ハチロク】
# display as 鈴
# JP: 「は――あっ！　あ！　あ！　おまん、まんっ、\nふ、あっ――イク！　イク！　イク！　イクっ！」
1356 = "「Hà——a! A! A! Cô bé,\nphù, a——ra mất! Ra mất! Ra mất! Ra mất!」"

# monologue
# JP: 最奥に――すずの子宮の、一番奥へと！
2939 = "Sâu tận cùng——vào tận nơi sâu nhất trong\ntử cung của Suzu!"

# monologue
# JP: （ぐりゅうううううううっっっ！！）
3484 = "（Sục sâuuuuuu!!!）"

# 【ハチロク】
# display as 鈴
# JP: 「んっきゅっ！！？\nふああぁぁぁぁぁぁっぁぁぁぁっぁああああっ！！」
2180 = "「Ưm kyu!!?\nPhù a a a a a a a a a a a a a a a a a a a\na!!」"

# monologue
# JP: （びゅぶっ！　びゅっ！　びゅるるっ！　びゅうっ！）
3506 = "（Phụt! Phụt! Phụt phụt! Phụttt!）"

# 【ハチロク】
# display as 鈴
# JP: 「ふあっ！　あっ――ふううっ！　ふあっ！！」
2037 = "「Phù a! A——phù ư ư! Phù a!!」"

# monologue
# JP: 喉から奥と、膣から上と、その二箇所。\n僕の濃厚な白濁が、すずを塗替え染めている。
3095 = "Sâu trong cuống họng, và sâu trong âm đạo,\ncả hai nơi.\nDòng tinh dịch trắng đục đậm đặc của tôi\nđang nhuộm đẫm lấy Suzu."

# monologue
# JP: （が――まだ足りん）
3478 = "（Nhưng——vẫn chưa đủ）"

# 【ハチロク】
# display as 鈴
# JP: 「はぁっ！　はぁっ！　はああっ！　ふあっ！？」
2110 = "「Hô」"

# monologue
# JP: 軽く手を当て、すずを導く。\nもう一箇所。僕の精液で染めねばならぬ、狭き門へと。
3191 = "Tôi khẽ đặt tay lên, dẫn dắt Suzu.\nCòn một nơi nữa. Cánh cổng chật hẹp mà tôi\nphải nhuộm đẫm bằng tinh dịch của mình."

# 【ハチロク】
# display as 鈴
# JP: 「あ――あ――そうてつ、さまっ。\nわたくし――うれしゅうございます」
2084 = "「A!\nVậy là anh được ngài thị trưởng và bé\nReina giúp đỡ sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2100 = "「Ừ.」"

# monologue
# JP: すずも、望んでくれている。\nならば、ためらうことはない。
3404 = "Suzu cũng đang mong muốn điều đó.\nNếu vậy thì, không có gì phải ngần ngại\ncả."

# 【双鉄】
# display as 雙鐵
# JP: 「いくぞ、すず」
2331 = "「Tới đây, Suzu.」"

# 【ハチロク】
# display as 鈴
# JP: 「はい。旦那様」
2188 = "「Vâng. Phu quân.」"
