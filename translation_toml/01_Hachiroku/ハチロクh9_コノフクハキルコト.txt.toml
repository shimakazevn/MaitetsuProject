# monologue
# JP: 本当にゆっくり、じわじわと。\n膣内で、僕の勃起を、たっぷりと舐め味わうように。
3090 = "很慢很慢地、一點一點地。她想用陰道完整、仔細地品味我的肉棒。" 

# 【ハチロク】
# display as 鈴
# JP: 「おちん――ちん――んっ。ふと、いっ――ふ、あっ、\nぼこっって、した――とこ――おまん、まん、にっ」
2613 = "「雞——雞——嗯。好粗——呼，啊，粗粗的——部位——進了小妹妹」" 

# monologue
# JP: （ずるっ）
3514 = "（滑動）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゅゅあ！！　あっ――はいった！　はいった、らっ\nん、あっ――だめっ――こし、わたくし、はしたないっ」
2041 = "「咻啊！！啊——進來了！進來了，啊、嗯，啊——不行——我、我好下流」" 

# monologue
# JP: （にゅっ――にゅぐっ――）
3491 = "（啾——啾咕——）" 

# monologue
# JP: 勃起の全部を埋めきらぬまま、\nすずの腰が回るようにして動きざわめく。
3319 = "肉棒雖然還沒有全部進入，鈴的腰已經急不可耐地扭動了起來。" 

# monologue
# JP: おまんまんの肉は喜びわななき、\n僕をきゅうきゅう、ひっきりなしに締め付けてくる。
3074 = "小妹妹的肉歡喜到哆嗦，把我的肉棒捆得越來越緊。" 

# 【ハチロク】
# display as 鈴
# JP: 「はぁあっ――あっ――きもち、い――あっ、おいし、\nおいしいっ――ん――双鉄、さまの――おちん、ちん」
2097 = "「啊啊——啊——好，舒服——啊，好吃，好吃——雙鐵少爺的——雞，雞」" 

# monologue
# JP: （にゅるっ――にゅるううっ）
# 3510 = "（扭——扭嗚）" 

# monologue
# JP: 腰が大きく回るたび、亀頭がざらつく部分を撫ぜる。
3237 = "每次腰大幅地轉動，龜頭都會碰到粗糙的部分。" 

# 【ハチロク】
# display as 鈴
# JP: 「きゅうっ――んっ――あっ――あっ――ここ、好きっ、\nおちんちん、ぺろって、おまん、まん――舐め、てっ」
2223 = "「好緊——啊——啊——這裡，喜歡，小雞雞，舔到了，小妹妹的——」" 

# monologue
# JP: みちみちに広がりきってる接合部が、\n腰の動きにつれて新たな蜜をこぼす。
3304 = "緊緻的結合部分被撐開，隨著她腰的動作淌出了新的蜜汁。" 

# monologue
# JP: が――
2835 = "但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「――すず。頼む。\n僕は、お前に――お前に全部を、食べ尽くしてほしい」
1366 = "「——鈴，拜託你了。我想你全部吞下去」" 

# 【ハチロク】
# display as 鈴
# JP: 「あ――はいっ、はいっ――さよう、ですね、\n双鉄、さまっ――んっ――ふっ――ふあっ――あ」
2089 = "「啊——是，是——這樣啊，雙鐵少爺——呼——呼啊——啊」" 

# monologue
# JP: （ずっ――じゅぶっ――きゅうううううっ）
3480 = "（呲——啾——嗯嗚——）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん、くっ――」
2187 = "「嗯，嗯——」" 

# monologue
# JP: 腰がふたたび、じわり、じわりと沈み始める。\nおもいっきりに突きあげたいが、今はこらえる。
3020 = "她的腰再次漸漸地開始下沉。我真想狠狠地插過去，但是現在就忍耐吧。" 

# monologue
# JP: すずが自ら僕の勃起を食べきるさまを、見届けたい。
3149 = "我想看著鈴主動吞下我整根肉棒的樣子。" 

# 【ハチロク】
# display as 鈴
# JP: 「おちん、ちん――双鉄、さま、のっ――\nわたくし、の――おく――いちばん、おく、までっ」
2614 = "「雞雞——雙鐵少爺的——插進我的——深處——最深的位置」" 

# monologue
# JP: きつい、きつい。\n膣全体が、柔らかな無数の襞で抱きついてくる。
3305 = "緊，好緊。整個陰道，無數柔軟的肉褶擁抱住了我。" 

# monologue
# JP: 抱きついたままでざわめいて、\nきゅうきゅうわななき、絞る動きで精を求める。
3054 = "它擁抱著肉棒，不停蠕動，收縮得是那麼緊，奮力地絞榨我的精液。" 

# 【ハチロク】
# display as 鈴
# JP: 「はっ、はあっ――はあっ――はあっ――\nおまん、まんの、奥っ――あと、もう、少し、で」
2055 = "「哈，啊——啊——啊——小妹妹的，裡頭——還差一點點了」" 

# monologue
# JP: ぼたり、ぼたりと落ちてくる、\nすずの愛液、すずの汗。
3409 = "鈴的愛液和汗水大顆大顆落下。" 

# 【ハチロク】
# display as 鈴
# JP: 「まい、――り。ます――ね？　双鉄、さまっ――\nんっ――んうううううううっ！！！」
2329 = "「我要——來了——哦？雙鐵少爺——嗯——嗯嗚——！！！」" 

# 【ハチロク】
# display as 鈴
# JP: 「きゅくぅぅぅぅ～～～っ！！」
2178 = "「嗯嗚嗚～～～！！」" 

# monologue
# JP: 奥に、当たった。\nすずの子宮のドアをごつんとノックした。
3283 = "碰到最深處了。我敲到了鈴子宮的門。" 

# 【ハチロク】
# display as 鈴
# JP: 「はっ、はっ――はああっ――は、あ――はぁっ」
2054 = "「哈，哈——啊啊——啊——啊」" 

# monologue
# JP: ぺろりと、赤い舌が蠢く。\n唇のまわりを、一瞬舐める。
2980 = "她動了動鮮紅的舌頭，舔了一圈嘴唇。" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄、さま、の――おちん、ちん――\nわたく、し――わたくし――食べちゃいました」
2604 = "「雙鐵少爺——雞，雞——我——我——都吞下去了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すずっ！」
2590 = "「鈴！」" 

# monologue
# JP: （ごりゅっ！）
3485 = "（咕溜！）" 

# 【ハチロク】
# display as 鈴
# JP: 「んひゅふぅぅぅっ！！？」
2177 = "「嗯嗚——！！？」" 

# monologue
# JP: 一番奥に当たっていてなお、突きあげる。\nすずが体ごと跳ね上がる。
3085 = "已經插到最深處了，我還用力一頂，鈴的身體都跳了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「動きを、すず――一緒に、だ」
2589 = "「鈴——跟我一起動吧」" 

# 【ハチロク】
# display as 鈴
# JP: 「はひっ――んっ、くっ――ふ、あっ――\nはいっ！　そう、てつ――さまっ！！！」
2378 = "「是——嗯——呼，啊——是！雙鐵少爺——！！！」" 

# monologue
# JP: 腰ごと、落ちる。\nすずの足には、ほとんど力が入っていない。
3037 = "她跟著我的腰一起落下。鈴的腿上已經沒有什麼力氣了。" 

# monologue
# JP: （ずっ！　じゅぶっ！　　じゅぼっ！　じゅうっ！）
3483 = "（呲！啾！啾啵！吱吱！）" 

# 【ハチロク】
# display as 鈴
# JP: 「はひっ！？　ひっ――しゅごっ――すご、いっ！\nきゅふっ！　わた、く、し――おちん、ちん、にっ」
2046 = "「咿！？咿——好棒——好棒啊！嗯呀！我——被小雞雞——」" 

# monologue
# JP: （じゅぶっ！　じゅぼっ！　ぎゅりゅ！　ぐじゅつっ！）
3496 = "（啾！啾啵！吱溜！咕啾！）" 

# 【ハチロク】
# display as 鈴
# JP: 「おまん、まんっ――ン――いっぱい、いっぱい、\nそうてつ、さま、に――つきあげ、られ、てっ――」
2251 = "「小妹妹——嗯——好滿、滿噹噹的，被雙鐵少爺的——往上頂——」" 

# monologue
# JP: ただでさえ凶悪に狭い膣道が更に窄まり蠢く。
3229 = "本來窄到兇殘的陰道縮得更加窄了。" 

# 【ハチロク】
# display as 鈴
# JP: 「ひあっ！？　あっ、うう、うっ――おなか――\nぐ、りって――すごい――おく、もっと――んうっ」
2045 = "「咿啊！？啊，嗚嗚，嗚——肚子——被鑽——好厲害——裡面更加——嗯嗚」" 

# monologue
# JP: 子宮口さえもがくぱくぱしてる。\n僕の亀頭を呑もうとしてくる。
3052 = "子宮口都開始張開嘴巴了，它也想吞下我的龜頭。" 

# 【ハチロク】
# display as 鈴
# JP: 「しきゅう、おへや――こわれ、ちゃ、うっ――んっ、\nおまん、まん――回路――やき、きれ、ちゃ――うっ」
2235 = "「子宮的，房間——要壞掉了——嗯、小妹妹——迴路——要燒斷了——嗚」" 

# monologue
# JP: （じゅぶっ！　じゅるっ！　ばちゅっ！　ぐぐんっ！）
3498 = "（啾！啾嚕！啪啾！咕嗯！）" 

# 【ハチロク】
# display as 鈴
# JP: 「かっ――ふあ――だめっ――ですっ――ちか、らっ\nもう――はいら、ないっ――からだ――ガク、って」
2082 = "「啊——呼啊——不行——力氣已經——使不上了——身子——好僵」" 

# monologue
# JP: すずが、真っ赤だ。\n受粉するため、全身を花と色づかせてる。
3406 = "鈴已經變得通紅。彷彿要受粉的花一樣，渾身都鮮艷了起來。" 

# 【ハチロク】
# display as 鈴
# JP: 「あ――あっあっ――あああっ――双鉄、さまの、\nわかり、ますっ――びくって、がまんっ――ん、あ」
2086 = "「啊——啊啊——啊啊——雙鐵少爺的，我明白——您還在忍耐吧——嗯、啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2624 = "「！」" 

# 【ハチロク】
# display as 鈴
# JP: 「がまん、いらない――ぴゅうって、して、してっ。\nわたくし――だって――わたくし、もう、もうっ！」
1896 = "「不需要忍耐——射、射進來，射進來。我——也——我，已經、已經——！」" 

# monologue
# JP: 勃起全体が膨れる感覚。\n精液が、出口を求めて殺到している。
3317 = "肉棒似乎又脹大了，精液湧向了唯一的出口。" 

# 【ハチロク】
# display as 鈴
# JP: 「いっしょ、いっしょ、ね！？　そうてつさまぁ、\nわたくしと、いっしょ、いっしょ、いっしょにっ！」
1870 = "「一起，一起，哦！？雙鐵少爺，跟我，一起，一起，一起！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「望む――ところだっ」
2428 = "「正合我意——」" 

# 【ハチロク】
# display as 鈴
# JP: 「はぁ！　あ！　すきっ！　しゅき！　双鉄さまっ！\nそうてつ、さまっ――ふ、あっ――だんな、さまっ」
2109 = "「啊！啊！喜歡！捋來！雙鐵少爺！雙鐵少爺——呼，啊——夫君」" 

# monologue
# JP: （きゅんっ！　きゅきゅうううんっ！）
3495 = "（啾！啾——嗯！）" 

# 【ハチロク】
# display as 鈴
# JP: 「どうか――いっしょに――せいえき、くだ、さいっ\nわたくし――もう――んっ、げんかい、これ、もう！」
1868 = "「一定要——跟我一起——對我射精，我——已經——嗯、到極限了！」" 

# monologue
# JP: 歯を食いしばり、射精欲求を一瞬、留める。
3135 = "我咬緊牙關，再按捺住射精欲望一瞬間。" 

# 【ハチロク】
# display as 鈴
# JP: 「は――あっ！　あ！　あ！　おまん、まんっ、\nふ、あっ――イク！　イク！　イク！　イクっ！」
1356 = "「——啊！啊！啊！小妹妹，呼，啊——高、高、高潮了！高潮了！」" 

# monologue
# JP: 最奥に――すずの子宮の、一番奥へと！
2939 = "向最裡頭——向鈴子宮的最裡面！" 

# monologue
# JP: （ぐりゅうううううううっっっ！！）
3484 = "（咕溜——！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「んっきゅっ！！？\nふああぁぁぁぁぁぁっぁぁぁぁっぁああああっ！！」
2180 = "「嗯嗚！！？呼、嗯啊啊——！！」" 

# monologue
# JP: （びゅぶっ！　びゅっ！　びゅるるっ！　びゅうっ！）
3506 = "（噗！噗！噗嚕！噗嚕！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ふあっ！　あっ――ふううっ！　ふあっ！！」
2037 = "「呼啊！啊——呼！呼啊！！」" 

# monologue
# JP: 喉から奥と、膣から上と、その二箇所。\n僕の濃厚な白濁が、すずを塗替え染めている。
3095 = "從喉嚨往深處，從陰道往高處，鈴的兩個地方都被我濃濃的白濁液玷汙。" 

# monologue
# JP: （が――まだ足りん）
3478 = "（不過——還不夠）" 

# 【ハチロク】
# display as 鈴
# JP: 「はぁっ！　はぁっ！　はああっ！　ふあっ！？」
2110 = "「啊！啊！嗬啊！呼啊！？」" 

# monologue
# JP: 軽く手を当て、すずを導く。\nもう一箇所。僕の精液で染めねばならぬ、狭き門へと。
3191 = "我輕輕拉住鈴的手，引導著她。還有一處，我要用精液玷汙的狹窄門口。" 

# 【ハチロク】
# display as 鈴
# JP: 「あ――あ――そうてつ、さまっ。\nわたくし――うれしゅうございます」
2084 = "「啊——啊——雙鐵少爺。我——好高興」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2100 = "「啊啊」" 

# monologue
# JP: すずも、望んでくれている。\nならば、ためらうことはない。
3404 = "鈴也很期待。那我更不需要猶豫了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いくぞ、すず」
2331 = "「我要來了，鈴」" 

# 【ハチロク】
# display as 鈴
# JP: 「はい。旦那様」
2188 = "「嗯，我的夫君」" 
