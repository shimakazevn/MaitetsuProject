# 【ポーレット】
# display as 波萊特
# JP: 「人間と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の結婚って」
1563 = "「人和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;結婚，莫非」" 

# 【日々姫】
# display as 日日姬
# JP: 「それって、にぃにと――」
2070 = "「難道是，阿哥和——」" 

# 【れいな】
