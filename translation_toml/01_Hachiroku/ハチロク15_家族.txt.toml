# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1879 = "「是的」" 

# monologue
# JP: ハチロクの目の、頑ななものが薄れ始める。
2363 = "八六眼中的執拗開始漸漸散去。" 

# monologue
# JP: 薄れてみれば、\nそれは恐らく、恐れだったのだろうと思う。
2713 = "這樣看來，那多半是她心中的恐懼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、バーベキュー\x%l列車;#00ffc040;列車%l;#;。あれを僕らは、\nこれからも、懸命に運転していくだろう」
1895 = "「比方說ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;，我們今後也會全力以赴地持續運營下去」" 

# 【ハチロク】
# display as 八六
# JP: 「もちろんです。双鉄様とあるかぎり。\nわたくしたちが、その任を解かれない限り」
2040 = "「那是自然。只要我還與雙鐵少爺在一起，只要我們還未離開那個崗位」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1870 = "「是啊」" 

# monologue
# JP: ハチロクは、僕よりよほど考えている。知っている。
2357 = "八六的知識比我還要淵博，眼光比我還要長遠。" 

# monologue
# JP: “任を解かれる”その日は必ず、\n遅かれ早かれ、訪れるのだと。
2446 = "她明白“離開那個崗位”的日子，或早或晚，總會到來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「任を解かれるその時には、\nきっと、僕らに代わる、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と\x%l機関士;#00ffc040;機関士%l;#;がいる」
1943 = "「等到我們離開崗位時，一定會有新的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;和\\x%l機関士;#00ffc040;司機%l;#;來接替我們」" 

# 【ハチロク】
# display as 八六
# JP: 「……ああ」
1257 = "「……是啊」" 

# monologue
# JP: 僕が夢見ている光景を、\nきっと、ハチロクも見てくれた。
2518 = "我所憧憬的那幅光景，八六也一定心生嚮往。" 

# monologue
# JP: そうだ、僕らが歩む先には――
2567 = "是啊，我們並肩而行的前方——" 

# 【ハチロク】
# display as 八六
# JP: 「きっと、新しい\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が――\nまだ見ぬ、わたくしの妹が」
1524 = "「一定會有新的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;——我尚未謀面的妹妹」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1701 = "「嗯」" 

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;との共存が果たせる以上、\n鉄道は必ず復権するし、そうさせていく。
2434 = "在覓得與\\x%lエアクラ;#00ffc040;空凝機%l;#;共存方法之後，鐵路必然會重振雄風，我們也將為此努力。" 

# monologue
# JP: 今は喪失寸前の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の作成技術も、\nきっと再びニーズを得、継承され、発展をすることだろう。
2647 = "而如今已瀕臨失傳的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;製造技術，一定會因新的需求而得以繼承、發展。" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えばそのとき、新しいコンビへと。\n僕達が積み重ねてきたノウハウを、伝えてあげる」
1946 = "「等到那時，我們可以把我們所積累的經驗技術，傳授給那對新的搭檔」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1879 = "「是的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あるいは、誰かが御一夜を思い出すとき。\nそこに僕らの、[ハチロクニイマル,3]8620の姿があるのでもいい」
1838 = "「或者，日後有誰回想起御一夜過往的時候，其中能夠閃現出我們和８６２０的身影的話也好」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1879 = "「是的」" 

# monologue
# JP: そしてハチロクの頷きは、\n僕が想像している未来に、色を、温度を与えてくれる。
2327 = "八六不住地點頭，為我所想像的未來，增添了幾分色彩與溫度。" 

# 【双鉄】
# display as 雙鐵
# JP: 「誰かが、どんな形でも、僕たちのことを覚えてくれて。\nそうした記憶が、その人の中で、生きるなら――」
1918 = "「無論是誰，無論是以怎樣的形式，只要有人還能記得我們，只要那份回憶還留在人們的心中——」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしたちは。つなげるのですね」
2023 = "「這就是我們的傳承」" 

# monologue
# JP: ハチロクの手に力がこもる。
2343 = "八六張開了她的雙臂。" 

# monologue
# JP: 僕をぎゅうっと抱きしめ返し、\n体の熱を伝えてくれる。
2440 = "她也用力地抱緊了我，她的體溫我也感受得越來越真切。" 

# 【ハチロク】
# display as 八六
# JP: 「だれかに、バトンを。わたくしたちが遺せるものを。\nわたくしと双鉄様との――記憶――記憶の、遺伝子を」
1853 = "「把接力棒交到來者的手中，留下我們的印記，留下我和雙鐵少爺的記憶——留下記憶的基因」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。遺せる。つないでいける」
1874 = "「是啊，留下我們的傳承」" 

# monologue
# JP: 自らの遺伝子を残すため――\n子を生すために子を生すのなら、それは不幸だ。
2419 = "只為留下自己的基因——為了生孩子而生孩子的話，實可謂不幸。" 

# monologue
# JP: その子にとっても、誰にとっても、おそらくは。\nが……
2502 = "恐怕那無論是對孩子，抑或對他人而言，都是如此。然而……" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうして遺せるものならば、きっと幸福な遺伝子だ。\nお前と結婚できるなら、僕は幸せになれるから」
1816 = "「我們這樣留下的，一定是幸福的基因。因為若能與你結為夫妻，於我而言便是無上幸福」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしもです、双鉄様。\n貴方の妻としていただけるのなら」
1812 = "「我也一樣，雙鐵少爺。如蒙不棄，可以成為您的妻子的話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1701 = "「嗯」" 

# monologue
# JP: 間髪入れずに、答えてもらえた。\n喜びは、けれど、とても静かだ。
2581 = "沒有絲毫遲疑，八六立刻給了我回答。我的喜悅無以言表，卻絲毫未形於色。" 

# monologue
# JP: 真白に降りつむ雪のごとくにしんしんと――\n音無き音で、僕の心に染み透ってくる。
2454 = "如潔白瑞雪，悄然飄落，無聲之音，浸透心間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばそのため、僕は生きたい。\nお前とふたり、生きる証を、のこしていきたい」
2042 = "「那麼，我希望今生能為此而活。我想與你一同，努力留下我們生命的印記」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
# 2064 = "「雙鐵少爺」" 

# monologue
# JP: もうハチロクは震えない。
2362 = "八六的身體已經不再顫抖。" 

# monologue
# JP: 手をほどき、僕から少し体を離し――\nまっすぐな目で、見つめてくれる。
2444 = "她放開手，向後退了一步——而後便直直地看著我，與我四目相對。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、貴方を愛しています。\n他の誰より、何よりも」
1830 = "「我深愛著您，勝過其他任何人、任何物」" 

# monologue
# JP: 知っている。\nもうすでに、お互いに誓いあっているのだから。
2516 = "我很清楚。畢竟已經相互交換過彼此的誓言。" 

# monologue
# JP: そうであるのに――\n喜びの雪は降り止まぬ。
2316 = "儘管如此，喜悅卻如白雪般漫天飛舞。" 

# 【ハチロク】
# display as 八六
# JP: 「ですので、わたくしは望みます」
1846 = "「所以，我在此許下願望」" 

# monologue
# JP: ほどかれた手が、差し伸べられる。\nハチロクから僕に、伸ばしてくれる。
2335 = "八六再次舉起了手，伸向了我。" 

# 【ハチロク】
# display as 八六
# JP: 「ふつつかものではございますが――\nどうか、わたくしを、貴方の妻となさってください」
1768 = "「小女子不才，請讓我成為您的妻子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「喜んで」
1887 = "「樂意之至」" 

# monologue
# JP: その手を取る。\nそして、自然とくちづける。
2524 = "我握住了那隻手，隨後，自然地一吻。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今から僕はお前の夫で。\nハチロク――お前は、僕の妻だ」
1793 = "「從現在開始，我就是你的丈夫。八六，你就是我的妻子了」" 

# 【ハチロク】
# display as 八六
# JP: 「はいっ！」
1746 = "「好的！」" 

# 【凪】
# display as 凪
# JP: 「おめでとーばーい！」
1806 = "「恭喜咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「おめでとうございまーす！！」
1807 = "「恭喜恭喜！！」" 

# 【ハチロク】
# display as 雙鐵＆八六
# JP: 『「っ！！？」\n「っ！！？」』
2088 = "『「！！？」\\n「！！？」』" 

# monologue
# JP: すっかり、飛んでた。\n完全に、ふたりの世界にはいっていた、が――
2536 = "我的意識早已沉浸在二人世界裡，飄到不知何處去了，不過——" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　にぃに！　かーっこよかった！！」
2053 = "「阿哥！阿哥！帥呆啦！！」" 

# 【真闇】
# display as 真闇
# JP: 「まっこと。日ノ本一のお似合いの夫婦よね」
1930 = "「真是。全日本都沒有比你們更般配的夫婦了」" 

# 【稀咲】
# display as 稀咲
# JP: 「おめでとう。ふたりとも。\n支店長会議を抜けだして余りある景色を見せてもらった」
1805 = "「恭喜二位。能目睹如此場景，也不枉我從支行長會議上溜出來了」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、ふわふわしちゃいましたー。\nおよめさんになるってとーっても、素敵なんですねぇ」
1922 = "「玲奈開心得要暈倒啦。成為新娘子，真是一件非常美好的事呀」" 

# 【ハチロク】
# display as 八六
# JP: 「あ……うっ――あっ」
1678 = "「啊……嗚——啊」" 

# monologue
# JP: 僕と同じくハチロクも、\n意識から飛ばしていたのだろう。
2329 = "八六也和我一樣，意識早已不知雲遊在何處了吧。" 

# monologue
# JP: 急速で猛然たる祝福を受け、\nゆでダコもかくやの真っ赤な顔になってる。
2632 = "突然受到大家這麼熱情地祝福，八六的臉一下子紅成了一個紅蘋果。" 

# 【ハチロク】
# display as 八六
# JP: 「あ、あの――ありがとうございます！」
1691 = "「啊，這個——謝謝你們！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。\n祝辞の分も、その何倍も、僕らは、幸せな夫婦となるよ」
1982 = "「謝謝。我們定會成為比你們的祝福更幸福千百倍的夫婦」" 

# monologue
# JP: 目配せすらもかわさないのに、\n僕とハチロク、完全に同じタイミングでの深い礼。
2612 = "甚至都不需要眼神的交流，我和八六同時深鞠一躬，向大家致謝。" 

# monologue
# JP: ひやかす声は祝福で、\nそれを浴びれば、幸せは何倍にもふくれあがって――
2579 = "沐浴著大家充滿祝福的哄鬧聲，幸福感越來越高漲——" 

# monologue
# JP: （いや――あれ？）
2761 = "（等一下——咦？）" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、ハチロクちゃん。\n大丈夫です！　おふたり、法的にも結婚できます！」
2062 = "「雙鐵君，八六。沒有問題！依照法律兩位是可以結婚的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1718 = "「噢！」" 

# monologue
# JP: 一人足りない――思った矢先に、\nポーレットらしい祝福を投げてもらえる。
2528 = "我正想著好像少了一個人，波萊特就送來了富有她風格的祝福。" 

# monologue
# JP: こんなときでも流されず、\n尋ねたことを、きちんと調べてくれていたのか。
2406 = "即便是這樣的場合，她也沒有受到影響，還是認真地為我找尋著答案嗎。" 

# 【ハチロク】
# display as 八六
# JP: 「けれど――わたくしは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;で」
1540 = "「不過——我可是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫なんですよ。\nハチロクちゃんは、だって、女性ですから」
1904 = "「沒有問題啊。因為你看，八六你是女性沒錯吧」" 

# monologue
# JP: 『日ノ本国六法全書』
1224 = "《日本國六法全書》" 

# monologue
# JP: 分厚い本の細かな文字を、\nこここことポーレットは指し示す。
2594 = "波萊特指著厚厚的書本上的一處細小的文字，示意我們看。" 

# 【ポーレット】
# display as 波萊特
# JP: 「まず、大前提として民法の定めるところは、\n結婚は両性の合意にのみ基づいて成立するってことです」
2074 = "「首先，在民法中作為大前提明確的是，結婚是基於兩性的共同意願而得以成立的行為」" 

# 【双鉄】
# display as 雙鐵
# JP: 「両性か」
1599 = "「兩性啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「これは男性と女性の両性という解釈で通用してます」
1238 = "「“兩性”在這裡適用“男性”與“女性”的解釋」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1666 = "「哦」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その前提のもと、直系の血族との婚姻、重婚、\n法定年齢に達する前の結婚が、禁止されています」
1728 = "「在此基礎上，法律禁止直系親屬間的婚姻、重婚、與未滿法定年齡的對象結婚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……本当だな」
1681 = "「啊……真的哎」" 

# monologue
# JP: 民法というのは初めて見たが――\nまさしく、ポーレットのいったとおりに書かれている。
2716 = "這還是我第一次參閱民法——不過上面的確如波萊特所言，分毫不差。" 

# monologue
# JP: そう書かれてはいるのだが――
2321 = "內容確實如此，不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はハチロクが女性であることを知っているが――\nそれは法的にも通用するのか？」
1824 = "「我很清楚八六身為女性這一點——但是這在法律層面上能成立嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
# 2076 = "「！！！」" 

# monologue
# JP: 言った瞬間、ハチロクがボっと赤くなる。
2688 = "話剛出口，八六的臉就一下子紅到了脖根。" 

# monologue
# JP: そういう意味にも取れてしまうかと少し焦るが、\nポーレットはまるで気にしていない。
2726 = "雖然有點擔心是不是會被理解成什麼別的意思，不過波萊特似乎並沒有想太多。" 

# 【ポーレット】
# display as 波萊特
# JP: 「なにをもって女性とするかの法的根拠は、戸籍です。\n戸籍上で女性であれば、女性ということになります」
1839 = "「戶籍是法律判定是否是女性的根據。只要戶籍上登記為女性，那就可以被認定為女性」" 

# 【ハチロク】
# display as 八六
# JP: 「戸籍……ですか」
1590 = "「依據戶籍啊……」" 

# monologue
# JP: ハチロクの声が、くもってしまう。
2360 = "八六的聲音似乎蒙上了淡淡的陰霾。" 

# 【ハチロク】
# display as 八六
# JP: 「残念ながら、わたくしには」
1638 = "「可惜，我並沒有……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いいえ、残念じゃないんです。\n戸籍は創出できますから。自治体の長の判断によって」
1550 = "「不，沒什麼好可惜的。因為戶籍是可以根據所在自治體領導的判斷添加的啊」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
2030 = "「這！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか！」
1883 = "「是這樣啊！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜の場合は市長の判断になりますね。\nですので、ここもまったく問題になりません」
1725 = "「在御一夜的話，就是根據市長的判斷。所以，在這方面也完全沒有問題」" 

# monologue
# JP: 頼もしい。\nポーレットが光り輝いてさえみえる。
2470 = "實在太可靠了。在我們眼中的波萊特簡直閃閃發光。" 

# monologue
# JP: ここにも、まさしく餅屋がいたと、\n伏して拝みたいような気持ちになる。
2580 = "沒想到在這裡也有一位擁有“金剛鑽”的專家，實在讓我高興得想跪地拜謝。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですから、ひとつだけ。\nそれだけしてもらえれば、法律面はクリアになります」
1849 = "「所以，現在只剩一個問題。只要解決了這個，法律層面上就完全沒問題了」" 

# 【ハチロク】
# display as 八六
# JP: 「え？」
# 1653 = "「咦？」" 

# monologue
# JP: ハチロクが、ぎくりとした顔になってしまう。
2381 = "八六被這突如其來的轉折驚得滿臉錯愕。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、それはいったい」
1916 = "「波萊特，到底還差什麼啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「姓名です。苗字と名前。\nそれだけ、決めてもらえれば」
2031 = "「還差姓名，姓氏與名字。只要確定了這個就可以了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1682 = "「啊」" 

# 【ハチロク】
# display as 八六
# JP: 「名前……\nわたくしの、名前」
1649 = "「名字……我的，名字」" 

# monologue
# JP: ハチロクの手が、僕のシャツへと。
2354 = "八六的手拉住了我的襯衫。" 

# monologue
# JP: まるで小さな子のように、\n頼って、すがりついてくる。
2442 = "她就像個小孩子一樣，依賴著我，貼在我身邊。" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、名前も――\nわたくしは、双鉄様にお与えいただきたく思います」
2025 = "「這樣的話，名字——我的名字，還是希望能讓雙鐵少爺來定」" 

# 【双鉄】
# display as 雙鐵
# JP: 「名前を、か？」
1648 = "「名字……嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。ハチロクは[けいしきめいしょう,3]形式名称。\nいうなれば、姓であるかと存じますので」
1875 = "「是的。八六是車型名稱，說來或許和姓氏比較接近吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、なるほどそうかもしれんが――」
2016 = "「這……的確不無道理。不過——」" 

# monologue
# JP: だけれど、僕は知っている。
2265 = "不過，我其實是明白的。" 

# monologue
# JP: 形式名称を名乗ること、\nそれこそが、トップナンバーの誇りなのだと。
2287 = "以車型名稱自稱，這正是身為首車的鐵路人偶獨有的榮耀。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前の姓は、すぐに右田となるのだぞ？\nせっかくのハチロクの……いや。ああ、そうか」
1582 = "「你的姓氏，馬上就要改成右田了哦？那豈不是用不了“八六”二字……慢著。啊，對哦」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です」
1905 = "「沒有錯」" 

# monologue
# JP: いたずらっぽく瞳が輝く。
2365 = "八六眼中閃出一絲頑皮。" 

# 【ハチロク】
# display as 八六
# JP: 「お仕事では旧姓を名乗らせていただければと」
1724 = "「在工作時，我想使用娘家姓」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。いいな。\nそのほうが、公私のメリハリをつけられそうだ」
1712 = "「嗯，這樣不錯。這樣也能把公私分清」" 

# 【凪】
# display as 凪
# JP: 「子牛のメリハリって、ブチのことばい？\n模様みたくに、白黒はっきりつけよるってことと？」
1607 = "「公獅分清楚，是說鬃毛嗎？根據形狀長短，給每一隻取個不一樣的名字？」" 

# 【ふかみ】
# display as 深美
# JP: 「ちがうよ、凪ちゃん。\n今の場合は、きっと、ええっと――」
1532 = "「不是啦，小凪。現在說的，應該，這個——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「仕事を離れ、ふたりきりになったときだけ、\n新しい名を――いや、僕だけの名を呼ぶということだ」
1939 = "「等一下了班，只剩我們兩個的時候，就可以叫新名字——不，應該是只屬於我的名字吧」" 

# 【ふかみ】
# display as 深美
# JP: 「はぅぅ～～っ」
1660 = "「哈嗚～～」" 

# 【凪】
# display as 凪
# JP: 「な、なんだかにーさん、ド迫力ばい」
1937 = "「突、突然覺得大哥哥好有魄力」" 

# monologue
# JP: あえて自ら踏み込み答え、\n周囲の雑音を消しておく。
2525 = "我故意把話說得更明白，讓周圍的雜音安靜下來。" 

# monologue
# JP: そして生まれる沈黙の中、\n考える――途端にちりん、名が響く。
2651 = "而我就在這沉默中飛速思考著——一個名字就此在我腦海中響起。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『すず』だ」
1636 = "「叫“鈴”」" 

# 【ハチロク】
# display as 八六
# JP: 「すず――」
2044 = "「鈴——」" 

# monologue
# JP: ふんわり、笑う。
2383 = "八六輕輕地笑了。" 

# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます。\n素敵なお名前」
1983 = "「謝謝您。真是很棒的名字」" 

# 【双鉄】
# display as 雙鐵
# JP: 「素敵で当然。\nお前を思い、自然と浮かんだ名なのだからな」
1928 = "「當然是個好名字。我一想到你，這個名字就自然浮現出來了」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしを――お思いくださって？」
1809 = "「想到我——就自然浮現出來？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。いつでもお前は凛としている。\nころころ笑うし、鈴の音のように輝いている」
1863 = "「是啊。你總是那副颯爽的模樣，開朗的笑聲就如鈴聲一樣清脆悅耳」" 

# 【ハチロク】
# display as 八六
# JP: 「すず――すず」
2045 = "「鈴——鈴」" 

# monologue
# JP: 舌で転がす。\nハチロクが、僕の与えた新しい名を、幸せそうに。
2347 = "八六滿臉幸福地重複著我剛剛給她取的名字。" 

# 【ハチロク】
# display as 八六
# JP: 「お呼びいただけるのは、夜ですね？」
1810 = "「應該等到夜裡才這麼叫我吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。乗務が終わった後だ――っと！」
1869 = "「是啊。等乘務工作都結束以後——啊！」" 

# monologue
# JP: いかん、時間だ。\nそろそろ\x%lカマ;#00ffc040;カマ%l;#;を起こしてやらねば、走れなくなる。
2257 = "不好，都這個時候了。再不趕快把\\x%lカマ;#00ffc040;窯%l;#;生起來，等一下就沒辦法行駛了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういうことだ。みな。ありがとう。\n行くぞ、ハチロクっ！」
1773 = "「就是這樣啦。謝謝大家。走吧，八六！」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様っ！」
1748 = "「好的，雙鐵少爺！」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　ちょっ、にぃにっ！　\nわたしもいくけん！　助士やけんっ！」
1663 = "「哎！？等一下啊，阿哥！我也得去啊！別把司爐扔下啊！」" 

# 【稀咲】
# display as 稀咲
# JP: 「ふふ、随分と双鉄は早足だ」
1716 = "「嘻嘻，雙鐵這麼急著走」" 

# 【真闇】
# display as 真闇
# JP: 「あぎゃん照れば、少ぉし遅れて来ぃよるけんねぇ」
2026 = "「這種害羞的感覺，是要過會才反應過來的」" 

# 【凪】
# display as 凪
# JP: 「あぎゃん照れって、どぎゃん照ればい？」
1241 = "「“這種害羞的感覺”是指哪種啊？」" 

# 【ふかみ】
# display as 深美
# JP: 「ええと……良くわからない、けど――\n自分が実はノロケてるって、後から気づく的な照れ？」
2021 = "「這個……我也不是很清楚，或許是——把私房話當著大家說完了才反應過來的害羞？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「～っ」
2078 = "「～」" 

# monologue
# JP: ヒヤカシという祝福だとはわかっていても、\n照れてることを指摘されるのは照れくさい。
2725 = "雖然我明白她們起鬨也是在祝福我們，但自己的害羞被點破，還真是格外地難為情。" 

# monologue
# JP: （つんつん）
2757 = "（戳戳）" 

# 【双鉄】
# display as 雙鐵
# JP: 「むっ？」
# 1713 = "「嗯？」" 

# 【れいな】
# display as 玲奈
# JP: 「ハチロクさん、そうてつさん、\n今日もいちにち、がんばりましょおねぇ～」
1602 = "「八六小姐，雙鐵先生，今天，也要一起加油哦～」" 

# 【ポーレット】
# display as 波萊特
# JP: 「良い乗務を」
1933 = "「祝工作順利」" 

# 【ハチロク】
# display as 八六
# JP: 「ええ、がんばりましょう」
1702 = "「嗯，加油吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お互いに、良い乗務を」
1562 = "「也祝你們工作順利」" 

# monologue
# JP: ……ごく、さりげなく教えてもらえる。\n祝福は、つまり応援なのだと。
1220 = "……在這些鼓勵的話語中，同樣也傳達著她們委婉的祝福。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて、と」
1742 = "「好了，那麼——」" 

# monologue
# JP: 今日、これからがはじめの一歩だ。\n僕ら夫婦が、記憶の遺伝子を手渡すための。
2279 = "今天要邁出的，是我們夫婦二人親手傳承記憶基因的第一步。" 

# monologue
# JP: たくさんのたくさんの旅の記憶に、\n僕らの軌跡を、交えてもらうそのための。
2271 = "也是為了在數之不盡的旅途記憶中，讓我們的軌跡得以交錯的一步。" 

# 【双鉄】
# display as 雙鐵
# JP: 「行くぞ、ハチロク」
1988 = "「走吧，八六」" 
