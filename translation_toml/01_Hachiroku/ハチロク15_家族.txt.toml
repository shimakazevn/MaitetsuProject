# monologue
# JP: だが隔離され、守ってもらっていなければ――\n外の世界で、きっとまともには生きられなかった。
2606 = "然而，若不是隔離於此，受其庇佑，想必我當初也無法在外面的世界正常生活吧。" 

# 【双鉄】
# display as 雙鐵
