1835 = "「我說，八六」" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1242 = "「…………」" 

# monologue
# JP: 困った顔をし、ハチロクが立ち尽くしてしまってる。
2600 = "滿臉困惑的八六就那樣呆立在原地。" 

# monologue
# JP: （……不安にさせてしまったか）
2745 = "（……讓她覺得不安了嗎）" 

# monologue
