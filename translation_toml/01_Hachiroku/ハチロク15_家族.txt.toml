2264 = "不過，不管發展成什麼樣子，我該做的事情不會有絲毫改變。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。ハチロク。\n僕はお前を、必ず僕の妻にする」
1902 = "「沒事的，八六。我一定會讓你成為我的妻子」" 

# 【凪】
# display as 凪
