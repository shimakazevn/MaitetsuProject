# display as 雙鐵
# JP: 「子を生すだけが、\n命をつなぐ方法じゃない」
1555 = "「並非只有生兒育女才是傳承生命的方法」" 

# 【ハチロク】
# display as 八六
# JP: 「それ、は……いったい」
