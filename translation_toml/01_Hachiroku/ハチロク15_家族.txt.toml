2521 = "我所期望的，只是能夠作為\\x%l機関士;#00ffc040;司機%l;#;，與八六一直並肩馳騁。" 

# monologue
# JP: そうした環境がほぼ調おうとしているのだから、\nその中で最善を尽くしていくことだけに集中したい。
2712 = "這樣的大環境已經基本成型，所以我希望能夠專注於解決接下來會遇到的問題。" 

# 【ポーレット】
# display as 波萊特
