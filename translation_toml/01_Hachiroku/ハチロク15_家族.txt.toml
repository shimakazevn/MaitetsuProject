1235 = "「\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;和人要結婚的話，應該怎麼做呢？」" 

# 【日々姫】
# display as 波萊特＆日日姬
# JP: 『「えっ！？」\n「んなっ！？」』
2084 = "『「哎！？」\\n「什麼！？」』" 

# monologue
