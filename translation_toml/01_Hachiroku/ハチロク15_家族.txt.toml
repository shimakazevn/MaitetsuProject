2531 = "我環視\\x%l客車;#00ffc040;客運車廂%l;#;，心中卻早已再無半點痛楚。" 

# monologue
# JP: これで恐らくは見納めと……\n思ってしまえば、妙な感慨が湧いてくる。
2252 = "一想到此後恐怕就是永別，種種難以言表的情感不禁湧上心頭。" 

# 【双鉄】
