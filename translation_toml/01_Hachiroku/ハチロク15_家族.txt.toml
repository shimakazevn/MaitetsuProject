# 【双鉄】
# display as 雙鐵
# JP: 「いや、そういう話では――\nああ、そうか。そういう話か」
1546 = "「不，我不是說這個——啊，對哦，原來是這麼一回事」" 

# monologue
# JP: つまりは、時間の節約だ。
2636 = "簡單來說就是——節約時間。" 

