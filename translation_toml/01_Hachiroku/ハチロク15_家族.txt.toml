[script]
# lines: 429 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2755 = "（Cạch, cộc,\nxình, xịch——）"
# monologue
# JP: いつもの音だ。\n過去の音。
2250 = "Âm thanh quen thuộc.\nÂm thanh của quá khứ."
# monologue
# JP: そうと感じてまぶたを上げれば、\nいつもの、夢の中にいる。
2432 = "Cảm nhận được điều đó, tôi mở mắt ra,\nlại thấy mình đang ở trong giấc mơ quen thuộc."
# 【双鉄】
# display as 雙鐵
# JP: 「[みちこ,1]路子？」
1989 = "「Michiko?」"
# monologue
# JP: けれども、どこにも見当たらない。\nいつもであれば向かいの席にある、路子の姿が。
2604 = "Nhưng, chẳng thấy đâu cả.\nHình bóng Michiko, người đáng lẽ phải ngồi ở ghế đối diện."
# 【双鉄】
# display as 雙鐵
# JP: 「どこだ？　路子――――」
1580 = "「Đâu rồi? Michiko――――」"
# monologue
# JP: 腰を浮かせた、その瞬間に理解する。
2575 = "Khoảnh khắc nhổm người dậy, tôi đã hiểu ra."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1672 = "「A……」"
# monologue
# JP: 入線してる。\nこの\x%l列車;#00ffc040;列車%l;#;はもう、終着駅についている。
2717 = "Đang tiến vào sân ga.\n\\x%l列車;#00ffc040;Chuyến tàu%l;#; này, đã đến nhà ga cuối cùng."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったな――」
1861 = "「Đúng rồi nhỉ——」"
# monologue
# JP: 僕と、ハチロクとで到着させた。
2568 = "Tôi và Hachiroku đã đưa nó đến đích."
# monologue
# JP: あの橋を――\n僕たちはもう、越えたのだ。
2511 = "Cây cầu đó——\nChúng tôi đã, vượt qua rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、路子は……」
2029 = "「Nếu vậy, Michiko……」"
# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;の中をぐるりと見渡す。\nそうしても、もはや痛みは感じない。
2531 = "Tôi nhìn quanh một vòng trong \\x%l客車;#00ffc040;toa hành khách%l;#;.\nDù vậy, tôi không còn cảm thấy đau đớn nữa."
# monologue
# JP: これで恐らくは見納めと……\n思ってしまえば、妙な感慨が湧いてくる。
2252 = "Có lẽ đây là lần cuối cùng được nhìn thấy nơi này……\nKhi nghĩ vậy, một cảm xúc kỳ lạ trào dâng."
# 【双鉄】
# display as 雙鐵
# JP: 「牢獄を出て行くときに……\nあるいは、こんな気持ちになるものかもな」
1991 = "「Khi bước ra khỏi nhà giam……\nCó lẽ, người ta cũng có cảm giác như thế này」"
# monologue
# JP: ここは、自分を閉じ込めていた。\n外界と隔離してしまう場所だった。
2715 = "Nơi này, đã từng giam cầm tôi.\nLà nơi cách ly tôi với thế giới bên ngoài."
# monologue
# JP: だが隔離され、守ってもらっていなければ――\n外の世界で、きっとまともには生きられなかった。
2606 = "Nhưng nếu không bị cách ly, không được bảo vệ——\nChắc chắn tôi đã không thể sống một cách bình thường ở thế giới bên ngoài."
# 【双鉄】
# display as 雙鐵
# JP: 「……路子は、先に出て行ったのだな」
1258 = "「……Michiko, đã ra ngoài trước rồi nhỉ」"
# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;の扉は開け放たれてる。\nその先は、真っ白な光に満ちている。
79 = "Cánh cửa \\x%l客車;#00ffc040;toa hành khách%l;#; đang mở toang.\nPhía trước, ngập tràn ánh sáng trắng xóa."
# monologue
# JP: 終着駅について、それから。\n路子はきっと。――きっと父さんと、母さんと――
2556 = "Đến nhà ga cuối cùng, và sau đó.\nMichiko chắc chắn. ——Chắc chắn sẽ cùng với bố, và mẹ——"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2067 = "「Ngài Soutetsu?」"
# monologue
# JP: おだやかな声。\n姿は見えない。
2504 = "Giọng nói dịu dàng.\nKhông thấy bóng dáng đâu."
# monologue
# JP: なのに、僕を優しくゆする手は、\nしっかりとした感触を持つ。
2266 = "Nhưng, bàn tay đang nhẹ nhàng lay tôi,\nlại mang một cảm giác vô cùng chân thực."
# 【双鉄】
# display as 雙鐵
# JP: 「うん――」
1699 = "「Ừm——」"
# monologue
# JP: だから目覚める。\nもう一度。
2509 = "Vì thế, tôi tỉnh giấc.\nMột lần nữa."
# monologue
# JP: 目覚めてもまだ見ていた夢から、今度こそ。
2714 = "Lần này, tôi đã thực sự tỉnh lại từ giấc mơ mà dù đã mở mắt vẫn còn nhìn thấy."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2064 = "「Ngài Soutetsu」"
# monologue
# JP: ほっとした声。
2456 = "Giọng nói đầy nhẹ nhõm."
# monologue
# JP: 僕を揺すってた手が動き、\n髪をやさしく撫で付けてくれる。
2720 = "Bàn tay đang lay tôi dừng lại,\nvà dịu dàng vuốt ve mái tóc tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕は、うなされてでもいたか？」
1256 = "「……Trông anh, có vẻ như đang gặp ác mộng sao?」"
# 【ハチロク】
# display as 八六
# JP: 「いえ――うなされてはいませんでしたが」
1901 = "「Không ạ——trông ngài không giống như đang gặp ác mộng, nhưng」"
# monologue
# JP: ハチロクの手が、静かにすべる。
2388 = "Bàn tay Hachiroku, lặng lẽ lướt đi."
# 【ハチロク】
# display as 八六
# JP: 「…………」
1242 = "「…………」"
# monologue
# JP: 目尻から頬へとゆっくりと、輪郭をなぞるようにして。
2548 = "Từ khóe mắt đến gò má một cách chậm rãi, như đang vẽ lại đường nét khuôn mặt."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか……。\n泣いていたのか」
1692 = "「A, ra vậy…….\nAnh đã khóc sao」"
# 【ハチロク】
# display as 八六
# JP: 「はい。ですのでわたくし……\n双鉄様がお苦しいのかと」
1878 = "「Vâng. Vì thế em……\nĐã nghĩ ngài Soutetsu đang đau buồn chuyện gì」"
# 【双鉄】
# display as 雙鐵
# JP: 「苦しくはない。悲しくも」
1554 = "「Không đau buồn. Cũng chẳng bi thương」"
# monologue
# JP: どころか、むしろ……
2698 = "Thậm chí, ngược lại……"
# 【双鉄】
# display as 雙鐵
# JP: 「かすか――か」
1239 = "「Nhỏ nhoi——sao」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
1653 = "「Dạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「幽霊寺のご住職がおっしゃっていただろう。\n幽霊の[ゆう]幽は、“かすか”だと」
1788 = "「Trụ trì chùa Yurei đã nói rồi đó.\nChữ \"U\" (U uất) trong U linh, nghĩa là \"nhỏ nhoi\"」"
# 【ハチロク】
# display as 八六
# JP: 「ああ……はい」
1679 = "「A……vâng」"
# 【双鉄】
# display as 雙鐵
# JP: 「その“かすか”を、僕はおそらく、手放したのだ」
1952 = "「Cái \"nhỏ nhoi\" đó, có lẽ, anh đã buông bỏ được rồi」"
# monologue
# JP: 手放したのか――\nあるいは、手放されたのか。
2550 = "Đã buông bỏ được rồi sao——\nHay là, đã bị buông bỏ."
# monologue
# JP: いずれにしても、おんなじだ。\n手放したものは徐々にでも、きっと、思い出に変化する。
2260 = "Dù thế nào đi nữa, cũng giống nhau cả thôi.\nNhững thứ đã buông tay, dù dần dần, chắc chắn sẽ biến thành những kỷ niệm."
# 【ハチロク】
# display as 八六
# JP: 「手放されて――おさみしいのですか？」
1721 = "「Bị buông bỏ——Ngài có thấy cô đơn không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんな顔をしているか？」
1834 = "「Trông mặt anh như vậy sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
1879 = "「Vâng」"
# monologue
# JP: うなずかれ、ようやく認める気になる。
2689 = "Nhận được cái gật đầu, cuối cùng tôi cũng có ý định thừa nhận."
# monologue
# JP: この気持ちはやっぱり寂しさで。\nけれど湿らず、カラリと晴れた寂しさだ。
2710 = "Cảm giác này, quả nhiên là sự cô đơn.\nNhưng không hề u ám, mà là một sự cô đơn trong trẻo, quang đãng."
# 【双鉄】
# display as 雙鐵
# JP: 「寂しくあるが、すぐに満ちる」
2058 = "「Dù cô đơn, nhưng sẽ nhanh chóng được lấp đầy thôi」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
1669 = "「A——」"
# monologue
# JP: 体を布団の上に起こして、\nハチロクを胸の中へと掻き抱く。
2539 = "Nhổm người dậy trên tấm nệm,\ntôi ôm trọn Hachiroku vào lòng."
# monologue
# JP: ハチロクは、素直に僕へと体を預ける。
2330 = "Hachiroku, ngoan ngoãn tựa vào người tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「かすかではなく、たくさんで。\nお前が僕を、きっと満たしてくれるから」
1556 = "「Không phải là nhỏ nhoi, mà là rất nhiều.\nBởi vì em, chắc chắn sẽ lấp đầy trái tim anh」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様……」
2063 = "「Ngài Soutetsu……」"
# monologue
# JP: 言葉ではなく、くちづけで。\nハチロクは、僕に応えてくれる。
2372 = "Không phải bằng lời nói, mà bằng một nụ hôn.\nHachiroku, đã đáp lại tôi."
# monologue
# JP: 朝っぱらから――と、いくらか不安にさせられる、\n長く、熱く、甘やかに、脳を溶かしてくるキスで。
2248 = "Mới sáng sớm mà——dù khiến tôi có chút bất an,\nnhưng đó là một nụ hôn dài, cuồng nhiệt, ngọt ngào, làm tan chảy cả tâm trí."
# 【ハチロク】
# display as 八六
# JP: 「……それが双鉄様のお望みならば。\n双鉄様を、わたくしはずっと満たします」
1261 = "「……Nếu đó là mong muốn của ngài Soutetsu.\nEm sẽ luôn lấp đầy trái tim ngài」"
# 【双鉄】
# display as 雙鐵
# JP: 「むろん、それが僕の望みだ」
1929 = "「Tất nhiên, đó là mong muốn của anh rồi」"
# monologue
# JP: 小さな頷き。\n幸せそうな。
2384 = "Một cái gật đầu khe khẽ.\nTrông thật hạnh phúc."
# monologue
# JP: そしてハチロクは、\nしっとりと濡れた瞳で僕を見上げる。
2652 = "Và rồi Hachiroku,\nngước nhìn tôi với đôi mắt ướt đẫm."
# 【ハチロク】
# display as 八六
# JP: 「いつか、おっしゃってくださいましたよね？\n双鉄様は、わたくしに、『望みをいえ』と」
2066 = "「Ngài Soutetsu, ngài đã từng nói với em rồi đúng không?\nRằng em hãy 『nói ra mong muốn của mình』 đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、言った」
1705 = "「Ừ, tôi đã nói.」"
# monologue
# JP: 今なら、わかる。\n何故僕がそれを求めたか。
2273 = "Bây giờ thì tôi đã hiểu.\nTại sao tôi lại mong muốn điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「お前の望みを、僕は叶えてやりたいからな」
1722 = "「Bởi vì tôi muốn thực hiện mong muốn của em.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら――」
1859 = "「Nếu vậy thì――」"
# monologue
# JP: わずかに震える言葉もやはり、濡れている。
2739 = "Những lời nói khẽ run rẩy, dường như cũng ướt đẫm."
# 【ハチロク】
# display as 八六
# JP: 「願わくば、わたくしの機能が停止するその瞬間まで。\n満たしてください。ずっと、わたくしを双鉄様で」
1603 = "「Nếu được, cho đến khoảnh khắc chức năng của em ngừng hoạt động.\nXin hãy lấp đầy em. Mãi mãi, lấp đầy em bằng Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「満たそう。必ず。僕の命が続く限りに」
1635 = "「Tôi sẽ lấp đầy em. Chắc chắn. Chừng nào sinh mệnh tôi còn tiếp diễn.」"
# monologue
# JP: 誓いの言葉だ――\n思った瞬間、思いつく。
2709 = "Đó là lời thề――\nKhoảnh khắc nghĩ vậy, tôi chợt nảy ra một ý."
# monologue
# JP: そうするべきだ、そうしたい。\n思いはすぐさま言葉となって滑りだす。
2476 = "Nên làm thế, tôi muốn làm thế.\nSuy nghĩ ấy lập tức hóa thành lời nói trào ra."
# 【双鉄】
# display as 雙鐵
# JP: 「誓うのならば、やはり形とすべきだろうな」
1857 = "「Nếu đã thề, thì quả nhiên nên hiện thực hóa nó nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「え？　あのっ――わたくしは、もちろん……\nやぶさかではございませんが、けれど、お仕事が」
1657 = "「Hả? Dạ――Tất nhiên là em...\nkhông có gì phản đối cả, nhưng mà, công việc thì sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なに、仕事前には解決しよう。\nポーレットに聞けばわかる話だ」
1903 = "「Không sao, giải quyết xong trước khi làm việc là được.\nHỏi Paulette là hiểu ngay thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「へ？」
1665 = "「Hả?」"
# monologue
# JP: きょとん、とハチロクが固まってしまう。
2369 = "Hachiroku ngơ ngác, cứng đờ người lại."
# 【ハチロク】
# display as 八六
# JP: 「あの――ポーレット様に、\nなにを……お聞きになるのでしょうか？」
2012 = "「Dạ――Ngài định hỏi...\nThị trưởng Paulette chuyện gì vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕とお前が、夫婦となるための手続きだ」
1820 = "「Thủ tục để tôi và em trở thành vợ chồng.」"
# 【ハチロク】
# display as 八六
# JP: 「ふうふ？　って――あっ――えっ！？」
1738 = "「Vợ chồng? Là sao ạ――A――Hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「夫と妻との一組だ。\n結婚をし、家庭を築くという、その“夫婦”だ」
1771 = "「Là một cặp chồng và vợ.\nKết hôn, xây dựng gia đình, chính là “vợ chồng” đó.」"
# monologue
# JP: パチパチ、まばたき。
2356 = "Chớp chớp mắt."
# monologue
# JP: ハチロクの頬がバラ色になり、口がぽかんと開き、\n慌てて結び直される。
2448 = "Đôi má Hachiroku ửng hồng, miệng há hốc ra,\nrồi lại vội vàng ngậm chặt lại."
# 【ハチロク】
# display as 八六
# JP: 「あ――はい。はい！　喜んで！！\nわたくしで！　わたくしでよろしっ――けれ――ば……」
1671 = "「A――Vâng. Vâng! Em rất sẵn lòng!!\nLà em! Nếu như ngài không chê――em――thì……」"
# monologue
# JP: ぶんぶんぶんと、壊れたような頷きが、\nけれども不意に、止まってしまう。
2345 = "Cô ấy gật đầu lia lịa như một cỗ máy hỏng,\nnhưng rồi đột nhiên dừng bặt."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ハチロク。\nお前で、ではなく。お前が、僕は良いのだが」
1803 = "「Sao vậy? Hachiroku.\nKhông phải là nếu không chê em. Mà là tôi muốn người đó là em.」"
# 【ハチロク】
# display as 八六
# JP: 「あの……ですが。\nわたくし、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですよ？」
2013 = "「Dạ……Nhưng mà.\nEm là \\x%lレイルロオド;#00ffc040;Railord%l;#; đấy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん、わかってる。法律上の問題だよな。\nだから、そこを尋ねてみようということさ」
1707 = "「Ừ, tôi biết. Là vấn đề về mặt pháp luật nhỉ.\nThế nên tôi mới định đi hỏi đây.」"
# 【ハチロク】
# display as 八六
# JP: 「あ、はい。それもございますが――」
1685 = "「A, vâng. Chuyện đó thì đúng là vậy, nhưng mà――」"
# monologue
# JP: （ジリリリリ　ジリリリリ）
2756 = "（Reng reng reng reng　Reng reng reng reng）"
# 【双鉄】
# display as 雙鐵
# JP: 「っと！」
1668 = "「Ối!」"
# monologue
# JP: 電話だ。\nよりによって、このタイミングで。
2733 = "Là tiếng điện thoại.\nSao lại đúng vào lúc này cơ chứ."
# monologue
# JP: さすがに邪魔だと感じてしまい――
2675 = "Quả thực là thấy bị làm phiền――"
# 【ハチロク】
# display as 八六
# JP: 「ね、双鉄様」
2065 = "「Nè, Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん？」
1713 = "「Hửm?」"
# monologue
# JP: ハチロクは、とりなすような笑みを浮かべる。
2379 = "Hachiroku nở nụ cười như để xoa dịu."
# monologue
# JP: ああ、ならば――特段、焦ることもない。\n大事な話であるからこそ、仕切り直しをするべきだ。
2425 = "À, nếu vậy thì――Cũng không cần phải vội vàng.\nChính vì là chuyện quan trọng nên mới cần bình tâm lại để giải quyết."
# 【ハチロク】
# display as 八六
# JP: 「こんな朝から、\nどなたが電話を下さったのでしょうね？」
2028 = "「Mới sáng sớm thế này,\nkhông biết ai gọi điện đến vậy nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……ひとりしか心あたらんが」
1253 = "「……Tôi chỉ nghĩ ra được một người thôi.」"
# monologue
# JP: ――そう言いながら立ち上がる。
1211 = "――Tôi vừa nói vừa đứng dậy."
# monologue
# JP: ハチロクの手が、軽く引っかかり、\nけれどもすぐに、ふわりと離れる。
2382 = "Bàn tay Hachiroku khẽ níu lấy tôi,\nnhưng rồi ngay lập tức nhẹ nhàng buông ra."
# 【日々姫】
# display as 日日姬
# JP: 「はい、もしもし。右田です」
1695 = "「Vâng, a lô. Nhà Migita xin nghe.」"
# 【ハチロク】
# display as 八六
# JP: 「そのお一人は、どなたです？」
2034 = "「Một người đó, là ai vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「雛で始まってトで終わる、僕とお前との雇い主だ」
2069 = "「Bắt đầu bằng chữ Hina và kết thúc bằng chữ tte, là người thuê tôi và em đấy.」"
# monologue
# JP: 答えれば、いたずらっぽいくすくす笑い。
2375 = "Nghe tôi trả lời, cô ấy bật cười khúc khích tinh nghịch."
# monologue
# JP: 電話に邪魔されたイガイガが、\n綺麗に洗い流されていく。
2681 = "Cảm giác bực bội vì bị điện thoại làm phiền,\nđã bị cuốn trôi sạch sẽ."
# 【ハチロク】
# display as 八六
# JP: 「奇遇ですね、\nわたくしもその方を思いうかべておりました」
1743 = "「Thật tình cờ,\nem cũng đang nghĩ đến người đó đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「シフトの変更でもあるのかな？」
1537 = "「Không biết có phải là đổi ca làm việc không nhỉ?」"
# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;のオーバーホールがようやく明けて、\nバーベキュー\x%l列車;#00ffc040;列車%l;#;だけの、一日あたり二往復。
74 = "Cuộc đại tu \\x%lキハ07;#00ffc040;Kiha 07%l;#; cuối cùng cũng hoàn tất,\nhiện tại chỉ có \\x%l列車;#00ffc040;đoàn tàu%l;#; BBQ chạy khứ hồi hai chuyến mỗi ngày."
# monologue
# JP: 実に安定した乗務をできてはいるのだが――
2471 = "Quả thực là lịch trình làm việc rất ổn định, nhưng mà――"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、起きてる？」
2054 = "「Anh hai, anh dậy chưa?」"
# monologue
# JP: ととと、と足音。\nふすま一枚を隔てた向こうに、日々姫の明るい息遣い。
2724 = "Tiếng bước chân lạch cạch.\nCách một lớp cửa kéo, tôi nghe thấy tiếng thở vui vẻ của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、電話だな？」
1710 = "「Ừ, có điện thoại à?」"
# monologue
# JP: （スパンっ！）
2754 = "（Xoạch!）"
# 【日々姫】
# display as 日日姬
# JP: 「そ！　ポーレットさんから」
1767 = "「Đúng rồi! Chị Paulette gọi đấy.」"
# monologue
# JP: やっぱり、と\nハチロクは嬉しげな笑み。
2378 = "Quả nhiên là vậy,\nHachiroku nở nụ cười vui vẻ."
# monologue
# JP: 心が、明るく温かくなる。\n受話器を受け取る手にも自然と、力がこもる。
2535 = "Trái tim tôi trở nên tươi sáng và ấm áp.\nBàn tay nhận lấy ống nghe cũng tự nhiên tràn đầy sức lực."
# 【双鉄】
# display as 雙鐵
# JP: 「もしもし、僕だ。丁度よかった」
1696 = "「A lô, tôi đây. Đúng lúc lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これは……」
2024 = "「Đây là……」"
# 【ポーレット】
# display as 波萊特
# JP: 「まだドラフトですけど。\n先方からも、基本線の合意はいただいてます」
2060 = "「Mặc dù mới chỉ là bản nháp thôi.\nNhưng phía đối tác cũng đã đồng ý với những điểm cơ bản rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ドラフト？」
1970 = "「Bản nháp?」"
# monologue
# JP: 契約書の下案――たたき台のようなものだと教える。
2592 = "Tôi giải thích cho con bé rằng đó là bản thảo hợp đồng――giống như một bản thiết kế sơ bộ vậy."
# 【ハチロク】
# display as 八六
# JP: 「ああ」
1717 = "「À.」"
# monologue
# JP: 頷いて、\nハチロクが手元のペーパーを確認し直す。
2389 = "Hachiroku gật đầu,\nrồi kiểm tra lại xấp giấy trên tay."
# 【ハチロク】
# display as 八六
# JP: 「これを元にして、双方が細かな部分を\nすりあわせていくのですね？」
2061 = "「Dựa vào bản nháp này, hai bên sẽ thảo luận\nnhững chi tiết nhỏ hơn đúng không ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうです。っていっても今回は――」
1906 = "「Đúng vậy. Nhưng mà lần này thì――」"
# monologue
# JP: ポーレットの声にはありありと、\n感心の色が浮かんでいる。
2595 = "Trong giọng nói của Paulette\nhiện rõ sự thán phục."
# 【ポーレット】
# display as 波萊特
# JP: 「むしろ先方が大乗り気で。\nすぐにでも調印したいってくらいの勢いなんです」
1765 = "「Ngược lại, phía đối tác lại rất hứng thú.\nHọ có vẻ như muốn ký kết ngay lập tức luôn ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
1560 = "「Cũng phải thôi.」"
# monologue
# JP: 餅は餅屋といわれはするが……\nいや、まさしくこれこそ、餅屋の仕事だ。
2474 = "Người ta thường nói việc gì ra việc nấy……\nKhông, đây chính xác là công việc của những người chuyên nghiệp."
# 【双鉄】
# display as 雙鐵
# JP: 「水を売りにする町でなければ……\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の誘致は、実に優れた振興策だものな」
1959 = "「Nếu đây không phải là thị trấn bán nước thì……\nviệc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; quả thực là một chính sách chấn hưng xuất sắc.」"
# 【ハチロク】
# display as 八六
# JP: 「[ほうしょうもとただ,3]宝生元忠……\nやはり、[くまぎん,1]隈銀の頭取たる人物なのですね」
1759 = "「Houshou Mototada……\nQuả nhiên là nhân vật xứng tầm Chủ tịch ngân hàng Kumagin nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、稀咲があれほどにライバル視――\nいや、超えたいと願う気持ちも、当然だろうな」
1872 = "「Ừ, Kisaki coi ông ấy là đối thủ đến mức đó――\nÀ không, mong muốn vượt qua ông ấy cũng là lẽ đương nhiên thôi.」"
# monologue
# JP: それほど、この案は良く出来ている。
2654 = "Bản kế hoạch này được lập ra xuất sắc đến mức đó đấy."
# monologue
# JP: 復線できれば、みかん鉄道と湯医線との乗り継ぎ駅となる、\n[かごしま,2]鹿兒島県は[せんだい,1]千内駅の近郊に――
2673 = "Nếu có thể khôi phục tuyến đường, khu vực ngoại ô ga Sendai ở tỉnh Kagoshima, nơi sẽ trở thành ga trung chuyển giữa Đường sắt Mikan và tuyến Yui――"
# 【ポーレット】
# display as 波萊特
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;工場の誘致を支援して、\nかわりに、持株会社への参加を促す」
1953 = "「Sẽ hỗ trợ thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;,\nđổi lại, thúc đẩy họ tham gia vào công ty cổ phần.」"
# 【ハチロク】
# display as 八六
# JP: 「みかん鉄道が加わってくれ、復線をなせるのならば、\n大九洲SL構想の実現可能性が一気に高まりますね」
1961 = "「Nếu Đường sắt Mikan tham gia và khôi phục tuyến đường thành công,\nkhả năng hiện thực hóa Kế hoạch SL Đại Kyushu sẽ tăng lên đáng kể đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、他社の参加へのハードルを大きく引き下げるし、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;社にとっても、利益につながる話となる」
2018 = "「Điều đó sẽ làm giảm đáng kể rào cản tham gia đối với các công ty khác,\nvà cũng là một thương vụ mang lại lợi ích cho công ty \\x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# 【日々姫】
# display as 日日姬
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;社にとっても？　って、どぎゃんして？」
1764 = "「Cho cả công ty \\x%lエアクラ;#00ffc040;Aircra%l;#; nữa á? Là sao vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「書いてあるぞ。補足資料２の、8ページからだ」
2017 = "「Có viết ở đây này. Từ trang 8 của tài liệu bổ sung số 2.」"
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;の新車を顧客へ納品するとき、\n無論、自走はさせられない。
2428 = "Khi giao xe \\x%lエアクラ;#00ffc040;Aircra%l;#; mới cho khách hàng,\ntất nhiên là không thể để xe tự chạy đến được."
# monologue
# JP: 共振崩壊の危険があるゆえ、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;で\x%lエアクラ;#00ffc040;エアクラ%l;#;を輸送するということも出来ない。
2643 = "Vì có nguy cơ sụp đổ do cộng hưởng,\nnên cũng không thể dùng \\x%lエアクラ;#00ffc040;Aircra%l;#; để vận chuyển \\x%lエアクラ;#00ffc040;Aircra%l;#;."
# 【日々姫】
# display as 日日姬
# JP: 「あー……そっか。納品のための輸送コストって、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;でもやっぱりかかるんだ」
1673 = "「A……Ra là vậy. Chi phí vận chuyển để giao hàng,\nngay cả với \\x%lエアクラ;#00ffc040;Aircra%l;#; thì vẫn tốn kém nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。そのため\x%lエアクラ;#00ffc040;エアクラ%l;#;社は、できるかぎり、\n工場から直でマーケットへと[おろ]卸したい」
1865 = "「Đúng vậy. Do đó, công ty \\x%lエアクラ;#00ffc040;Aircra%l;#; muốn bán trực tiếp\ntừ nhà máy ra thị trường càng nhiều càng tốt.」"
# monologue
# JP: ショップを通じてだけでなく、\n工場-顧客のダイレクト直販の普及と強化。
71 = "Không chỉ thông qua các cửa hàng,\nmà còn phổ biến và đẩy mạnh việc bán hàng trực tiếp từ nhà máy đến khách hàng."
# monologue
# JP: それも、\x%lエアクラ;#00ffc040;エアクラ%l;#;社の基本経営戦略のひとつらしい。
2570 = "Đó có vẻ cũng là một trong những chiến lược kinh doanh cơ bản của công ty \\x%lエアクラ;#00ffc040;Aircra%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「御一夜に\x%lエアクラ;#00ffc040;エアクラ%l;#;工場を、というのは、\n九洲中央への展開の拠点とするため……でしたか」
1844 = "「Việc xây dựng nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; ở Ohimitera,\nlà để làm cứ điểm mở rộng ra khu vực trung tâm Kyushu……phải không ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「展開のために最適の土地という事実は変わらないけれど\n御一夜工場設立は、もう実現できなくなりましたから」
1579 = "「Sự thật đây là vùng đất lý tưởng nhất để mở rộng vẫn không thay đổi,\nnhưng việc thành lập nhà máy ở Ohimitera thì không thể thực hiện được nữa rồi.」"
# monologue
# JP: ポーレットの言葉に顔をあげ、もう一度手元の資料を見、\nゆっくり大きく、日々姫は頷く。
2655 = "Nghe những lời của Paulette, Hibiki ngẩng mặt lên, nhìn lại tài liệu trên tay một lần nữa,\nrồi từ từ gật đầu mạnh một cái."
# 【日々姫】
# display as 日日姬
# JP: 「そっか。[せんだい,1]千内に工場作っても、\n新車を鉄道輸送できるなら――」
1616 = "「Ra vậy. Dù có xây nhà máy ở Sendai,\nnhưng nếu có thể vận chuyển xe mới bằng đường sắt thì――」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;社は移送コストを大きく軽減できるし、\nこちらとしても、安定的な貨物収入を確保できる」
1232 = "「Công ty \\x%lエアクラ;#00ffc040;Aircra%l;#; có thể giảm thiểu đáng kể chi phí vận chuyển,\nvà về phía chúng ta, cũng có thể đảm bảo được nguồn thu nhập ổn định từ việc chở hàng hóa.」"
# 【ハチロク】
# display as 八六
# JP: 「まさしく、一石二鳥――いえ、それ以上の案ですね」
1891 = "「Đúng là một mũi tên trúng hai đích――không, bản kế hoạch này còn tuyệt vời hơn thế nữa ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「三鳥、四鳥？　あれ？　ええと……\n御一夜市と[せんだい,1]千内市と、御一夜鉄道とみかん鉄道と――」
1526 = "「Trúng ba đích, bốn đích luôn? Ủa? Để xem nào……\nThành phố Ohimitera và thành phố Sendai, Đường sắt Ohito và Đường sắt Mikan――」"
# monologue
# JP: 両手の指を折っても数えきれなかろう。\n宝生元忠は、そうした案を組んできたのだ。
2500 = "Có gập hết mười ngón tay lại chắc cũng không đếm xuể.\nHoushou Mototada đã lập ra một bản kế hoạch như vậy đấy."
# 【双鉄】
# display as 雙鐵
# JP: 「[かね]金のことなら、無論、銀行は専門だろうが……\n頭取ともなると違うな。これほど大きな絵を描けるとは」
2059 = "「Nếu nói về tiền bạc, tất nhiên ngân hàng là chuyên gia rồi……\nNhưng ở tầm Chủ tịch thì đúng là khác biệt. Không ngờ ông ấy có thể vẽ ra một bức tranh lớn đến vậy.」"
# monologue
# JP: 素直な感嘆をもらした瞬間、視線が集まる。
2533 = "Khoảnh khắc tôi thốt lên lời cảm thán chân thành, mọi ánh nhìn đều đổ dồn về phía tôi."
# monologue
# JP: 僕の顔へと、\nハチロク、日々姫、ポーレットの目が。
2325 = "Ánh mắt của Hachiroku, Hibiki và Paulette,\nđều hướng về phía khuôn mặt tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　僕はおかしなことを言ったか？」
1802 = "「Sao vậy? Tôi đã nói gì kỳ lạ à?」"
# monologue
# JP: 今度は視線が、三すくみのごとく移動する。\nそうしてなぜか、三人ともに頷き合う。
2254 = "Lần này, ánh mắt của họ lại chuyển dời như thể đang dò xét lẫn nhau.\nRồi không hiểu sao, cả ba người cùng gật đầu với nhau."
# 【日々姫】
# display as 日日姬
# JP: 「おかしく、なかよ？\nおかしくなか、けど――」
1591 = "「Đâu có gì kỳ lạ đâu anh?\nKhông kỳ lạ chút nào, nhưng mà――」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの、ええと……思っただけです。\n『だからだったのかなぁ』って」
1818 = "「À, ừm……Tôi chỉ nghĩ thôi.\nRằng 『Có lẽ vì vậy chăng』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、とは？」
1581 = "「Vì vậy, là sao?」"
# monologue
# JP: 問えば、視線がまた動く。
2416 = "Khi tôi hỏi lại, ánh mắt họ lại đảo quanh."
# monologue
# JP: 日々姫とポーレットはふたり、\nそろってハチロクの方を見る。
2565 = "Hibiki và Paulette,\ncả hai cùng nhìn về phía Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「……あったではないですか。\n双鉄様ご自身を担保に、というお話が」
1252 = "「……Chẳng phải đã có chuyện đó sao ạ.\nChuyện lấy chính bản thân Ngài Soutetsu ra làm tài sản thế chấp ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ――」
1714 = "「Hửm? À――」"
# monologue
# JP: あった。確かに、そういえば。
2693 = "Có chuyện đó. Nhắc mới nhớ, đúng là có."
# monologue
# JP: 真闇姉が手を差し伸べてくれなかったら、\n呑んでいたかもしれん話が。
2668 = "Nếu chị Mayami không đưa tay ra giúp đỡ,\nthì có lẽ tôi đã chấp nhận điều kiện đó rồi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様を担保とし、そのお身柄を欲しがったのは、\n双鉄様のお力を、つまりはお認めになっていたのかと」
1975 = "「Việc muốn lấy Ngài Soutetsu làm tài sản thế chấp, muốn có được ngài,\ntức là ông ấy đã công nhận năng lực của Ngài Soutetsu đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どういうことだ？」
2027 = "「Là sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「やけん。そぎゃんと大きか絵ば描くのは、\nにぃにぃ、すっごい得意よねえっていうお話よ」
1535 = "「Chứ còn sao nữa. Ý mọi người là, vẽ ra một bức tranh lớn như vậy,\nanh hai cực kỳ giỏi luôn ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が？」
1822 = "「Tôi á?」"
# 【ポーレット】
# display as 波萊特
# JP: 「です。わたしもそう思います。双鉄くんがまとめれば\nもっと凄い案出せるかもって」
1881 = "「Đúng vậy. Tôi cũng nghĩ thế. Nếu anh Soutetsu mà đứng ra tổng hợp\nthì có khi còn đưa ra được bản kế hoạch tuyệt vời hơn nữa ấy chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういってもらえるのは嬉しい……\n正直、まったくの過大評価だ」
1955 = "「Mọi người nói vậy tôi rất vui……\nNhưng thành thật mà nói, mọi người đang đánh giá quá cao tôi rồi.」"
# monologue
# JP: 前提となる知識も情報も、それを入手する能力も、\n宝生氏と僕とでは、比較にならない程の差がある。
2294 = "Từ kiến thức và thông tin nền tảng, cho đến khả năng thu thập chúng,\ngiữa ông Houshou và tôi có một khoảng cách lớn đến mức không thể so sánh được."
# monologue
# JP: その上――だ。
2480 = "Hơn nữa――"
# 【双鉄】
# display as 雙鐵
# JP: 「仮に僕にそうした素養があるとしてもだ。\n磨かれずにいる素養など、結局は無いと変わらんさ」
1615 = "「Giả sử tôi có tố chất đó đi chăng nữa.\nMột tố chất không được mài giũa thì rốt cuộc cũng chẳng khác gì không có.」"
# 【日々姫】
# display as 日日姬
# JP: 「磨かんと？」
1923 = "「Anh không mài giũa á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「必要が生じない限りはな。\n今の体制が続くのならば、その必要も出てこんさ」
1963 = "「Trừ khi có nhu cầu phát sinh.\nNếu hệ thống hiện tại cứ tiếp tục, thì nhu cầu đó cũng sẽ không xuất hiện đâu.」"
# monologue
# JP: 僕の望みは、\x%l機関士;#00ffc040;機関士%l;#;として一日でも長く\nハチロクとともに走ることだけ。
2521 = "Mong muốn của tôi,\nchỉ là được sát cánh cùng Hachiroku chạy trên đường ray với tư cách là \\x%l機関士;#00ffc040;lái tàu%l;#; thêm một ngày nào hay ngày đó."
# monologue
# JP: そうした環境がほぼ調おうとしているのだから、\nその中で最善を尽くしていくことだけに集中したい。
2712 = "Vì môi trường đó gần như đã được chuẩn bị sẵn sàng,\nnên tôi chỉ muốn tập trung làm hết sức mình trong môi trường đó thôi."
# 【ポーレット】
# display as 波萊特
# JP: 「あー、まぁ。そうかもですね」
2022 = "「A, ừm. Có lẽ là vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしていきたいのだ、僕はむしろ。\n故に、ひとつポーレットに教えて欲しいことがある」
1611 = "「Đúng hơn là, tôi muốn làm như vậy.\nVì thế, tôi có một chuyện muốn nhờ Paulette chỉ bảo.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　わたしに、ですか？」
1654 = "「Hả? Hỏi tôi sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1701 = "「Ừ.」"
# monologue
# JP: つい最近まで市長、つまりは政治家だったのだ。\n法律について、僕らなどより、よほど詳しいに違いない。
2596 = "Cho đến gần đây cô ấy vẫn là thị trưởng, tức là một chính trị gia.\nChắc chắn cô ấy am hiểu về luật pháp hơn chúng tôi rất nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と人間と、\n結婚するにはどうしたらいい？」
1235 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; và con người,\nlàm thế nào để kết hôn với nhau?」"
# 【日々姫】
# display as 波萊特＆日日姬
# JP: 『「えっ！？」\n「んなっ！？」』
2084 = "『「Hả!?」\n「Cái gì!?」』"
# monologue
# JP: 驚愕した声。
2322 = "Những giọng nói đầy kinh ngạc."
# monologue
# JP: ポーレットと日々姫とは目を丸くして、\nお互いの顔を見つめ合い、それから僕をまじまじと見る。
2593 = "Paulette và Hibiki tròn xoe mắt,\nnhìn nhau, rồi lại nhìn tôi chằm chằm."
# 【ポーレット】
# display as 波萊特
# JP: 「人間と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の結婚って」
1563 = "「Con người và \\x%lレイルロオド;#00ffc040;Railord%l;#; kết hôn á.」"
# 【日々姫】
# display as 日日姬
# JP: 「それって、にぃにと――」
2070 = "「Vậy tức là, anh hai và――」"
# 【れいな】
# display as 玲奈
# JP: 「はわわ、れいな、\nけっこんなんて、まだ早すぎますぅ」
1698 = "「Oa oa oa, với Reina thì,\nchuyện kết hôn vẫn còn sớm quá ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2077 = "「!!?」"
# monologue
# JP: 背後から、いきなりではあるがのんびりした声。
2658 = "Một giọng nói thong thả bất ngờ vang lên từ phía sau."
# monologue
# JP: \x%l仕業検査;#00ffc040;仕業検査%l;#;を終えたのだろう。\n\x%l整備体;#00ffc040;整備体%l;#;のれいなが、驚き顔で立ってる。
80 = "Chắc là em ấy vừa hoàn thành \\x%l仕業検査;#00ffc040;kiểm tra doanh nghiệp%l;#; xong.\nReina trong \\x%l整備体;#00ffc040;thân chính%l;#; đang đứng đó với vẻ mặt ngạc nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、れいなの結婚話ではない。\n僕と――」
1549 = "「Không, không phải chuyện kết hôn của Reina đâu.\nTôi và――」"
# 【日々姫】
# display as 日日姬
# JP: 「ちょーっと待ってにぃに！\nこぎゃんと大事な話、私らだけで聞けんけんっ！」
2051 = "「Khoan đã anh hai!\nChuyện quan trọng thế này, sao có thể để mỗi tụi em nghe được chứ!」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですよね。\nみんな、絶対知りたいだろうし」
1687 = "「A, đúng vậy nhỉ.\nChắc chắn mọi người đều muốn biết mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1612 = "「Không――」"
# 【日々姫】
# display as 日日姬
# JP: 「なら、私はねぇねぇと稀咲先輩を」
2038 = "「Vậy thì, em sẽ đi gọi chị Mayami và chị Kisaki.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。\nわたしは凪ちゃんとふかみちゃんですね」
1745 = "「Tôi hiểu rồi.\nTôi sẽ gọi bé Nagi và bé Fukami nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おい！」
1693 = "「Này!」"
# monologue
# JP: 僕の呼びかけに反応もせず、\n日々姫とポーレットはそれぞれに携帯をかけ始める。
2458 = "Không thèm để ý đến tiếng gọi của tôi,\nHibiki và Paulette mỗi người bắt đầu lấy điện thoại ra gọi."
# monologue
# JP: ……これは、参った――いや、参らんのか？\nいずれはみなに、確実に伝えることなのだし。
1222 = "……Chuyện này, rắc rối rồi đây――À không, cũng chẳng rắc rối lắm nhỉ?\nDù sao thì sớm muộn gì cũng phải nói cho mọi người biết mà."
# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、ハチロク」
1835 = "「Này, Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1242 = "「…………」" 
# monologue
# JP: 困った顔をし、ハチロクが立ち尽くしてしまってる。
2600 = "Hachiroku đứng chết trân với vẻ mặt bối rối."
# monologue
# JP: （……不安にさせてしまったか）
2745 = "（……Mình làm em ấy bất an rồi sao.）"
# monologue
# JP: 恐らく、冷やかされるだろうし、\nそれ以上にやっかいな話も、あるかもしれない。
2692 = "Có lẽ chúng tôi sẽ bị trêu chọc,\nvà biết đâu còn có những chuyện rắc rối hơn nữa."
# monologue
# JP: が、どんな展開になろうとも、\n僕がするべきは変わらない。
2264 = "Nhưng dù mọi chuyện có diễn biến thế nào,\nđiều tôi cần làm vẫn không thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。ハチロク。\n僕はお前を、必ず僕の妻にする」
1902 = "「Không sao đâu. Hachiroku.\nTôi nhất định sẽ biến em thành vợ tôi.」"
# 【凪】
# display as 凪
# JP: 「来たばーい！」
1584 = "「Đến rồi đây nè!」"
# 【ふかみ】
# display as 深美
# JP: 「お、お邪魔します。です」
1852 = "「X-xin làm phiền ạ. Dạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、いくらなんでも早すぎないか？」
1534 = "「Không, dù thế nào thì cũng nhanh quá rồi đấy?」"
# 【凪】
# display as 凪
# JP: 「早かばーい！　空から来たばい」
1927 = "「Nhanh mà lị! Tụi em từ trên trời rơi xuống á.」"
# 【ふかみ】
# display as 深美
# JP: 「あ、あの……発船所まで――\nナビさんが、お迎えに来てくれた、です」
1609 = "「Dạ, à ừm……Đến tận bến tàu――\nNavi đã đến đón tụi em, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……何をやってるんだ、ナビは」
1264 = "「……Navi đang làm cái quái gì vậy.」"
# 【凪】
# display as 凪
# JP: 「次は[まくら,1]真闇さん迎えにいくってゆーとったばい」
2032 = "「Cô ấy bảo tiếp theo sẽ đi đón chị Mayami đó nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、そういう話では――\nああ、そうか。そういう話か」
1546 = "「Không, tôi không nói chuyện đó――\nÀ, ra vậy. Là chuyện đó à.」"
# monologue
# JP: つまりは、時間の節約だ。
2636 = "Tóm lại là, để tiết kiệm thời gian."
# monologue
# JP: ここから一番距離のある、クマ川下り発船所。\nそこへとまずは迎えにいって、次は酒蔵。
2318 = "Bến tàu xuôi dòng Kumagawa là nơi xa nhất tính từ đây.\nCô ấy đến đó đón trước, tiếp theo là xưởng ủ rượu."
# 【真闇】
# display as 真闇
# JP: 「あらあら、にぎやかやねぇ」
1662 = "「Ây da, náo nhiệt quá nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。騒ぎになってしまった」
1700 = "「Vâng. Thành ra ồn ào mất rồi.」"
# monologue
# JP: そして、一番近くの銀行ならば、\n迎えが無くとも――
2665 = "Và nếu là ngân hàng gần nhất,\nthì dù không cần đi đón――"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、みんな揃っているんだ。\n待たせてしまったかな」
1683 = "「A, mọi người đã tập trung đông đủ rồi à.\nTôi bắt mọi người phải đợi sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、ほぼ同時の集合だ」
1907 = "「Không đâu, gần như là tập hợp cùng lúc đấy.」"
# monologue
# JP: もう少し落ちついて聞きたかったことではあるが、\nしかしまぁ、こうなった以上、腹をくくろう。
2512 = "Dù tôi muốn bình tĩnh hỏi chuyện hơn một chút,\nnhưng mà thôi, đã đến nước này rồi thì cứ quyết tâm vậy."
# monologue
# JP: 僕が浮つかず、しっかりと、\nハチロクだけを見つめ続ければ良いことだ。
2420 = "Chỉ cần tôi không bị phân tâm, kiên định,\nvà tiếp tục nhìn về phía Hachiroku là được."
# 【双鉄】
# display as 雙鐵
# JP: 「で、だ」
2041 = "「Vậy thì.」"
# monologue
# JP: 何をすべきか。\nその順番を間違えたことは理解した。
2711 = "Nên làm gì đây.\nTôi nhận ra mình đã nhầm lẫn thứ tự."
# monologue
# JP: 冷静になれば僕はまだ、\nハチロクからの返事も受け取っていなかった。
2396 = "Bình tĩnh lại thì tôi vẫn chưa,\nnhận được câu trả lời từ Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。\n僕は、[じんぜん,1]人前で誓い直したい」
1605 = "「Hachiroku.\nTôi muốn thề lại trước mặt mọi người.」"
# 【ふかみ】
# display as 深美
# JP: 「わっ――」
1658 = "「Oa――」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！！！」
2076 = "「!!!」"
# monologue
# JP: ハチロクは、きゅっと唇を結んでる。
2373 = "Hachiroku mím chặt môi."
# monologue
# JP: 可愛い、凛々しい、愛おしい。\n背後に聞こえたざわめきは、あっという間に消えていく。
2554 = "Thật đáng yêu, thật dũng cảm, thật đáng mến.\nTiếng xì xào phía sau lưng biến mất trong nháy mắt."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、僕は」
1604 = "「Hachiroku, tôi.」"
# 【ハチロク】
# display as 八六
# JP: 「お待ちください、双鉄様っ！」
1981 = "「Xin hãy đợi đã, Ngài Soutetsu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1651 = "「!?」"
# monologue
# JP: 息を、言葉を、呑みこまされる。
2507 = "Tôi phải nuốt hơi thở, nuốt những lời định nói vào trong."
# monologue
# JP: ハチロクは目を大きく見開き――っ！？
2368 = "Hachiroku mở to hai mắt――!?"
# monologue
# JP: （涙っ！？　なにを、泣くというのだ？）
2760 = "（Nước mắt!? Tại sao, em ấy lại khóc chứ?）"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは――\nわたくしは、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です」
1826 = "「Em là――\nEm là, \\x%lレイルロオド;#00ffc040;Railord%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1701 = "「嗯」" 
# monologue
# JP: わかりきってる、そんなことなら。
2452 = "Chuyện đó, tôi biết rõ rồi mà."
# monologue
# JP: けれどハチロクはその当然を、\n罪を告白するかのような、深刻な重さで僕に伝える。
2603 = "Thế nhưng Hachiroku lại truyền đạt sự thật hiển nhiên ấy cho tôi,\nvới một sự nặng nề nghiêm trọng như thể đang thú tội."
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、双鉄様を愛しています。\nこの身の果てるその時まで、双鉄様のおそばにいます」
1825 = "「Em yêu Ngài Soutetsu.\nCho đến khi thân xác này tàn lụi, em vẫn sẽ ở bên cạnh Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。僕もだ。僕もお前を愛し、生涯そばにいる。\nならば僕らは当然に――」
1703 = "「Ừ. Tôi cũng vậy. Tôi cũng yêu em, và sẽ ở bên em suốt đời.\nNếu vậy thì chúng ta đương nhiên――」"
# 【ハチロク】
# display as 八六
# JP: 「いえ！　それは当然ではございません。\nわたくしは、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なのですから」
1544 = "「Không! Chuyện đó không hề đương nhiên chút nào.\nBởi vì, em là \\x%lレイルロオド;#00ffc040;Railord%l;#;.」"
# monologue
# JP: 僕の言葉を断ち切ってまで、\nハチロクは強く首を振る。
2349 = "Cắt ngang lời tôi,\nHachiroku lắc đầu nguầy nguậy."
# 【ハチロク】
# display as 八六
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であるわたくしを、\nもしも、妻としてしまうのなら……」
1967 = "「Nếu như ngài lấy một \\x%lレイルロオド;#00ffc040;Railord%l;#; như em,\nlàm vợ thì……」"
# monologue
# JP: 苦しげな声。
2359 = "Một giọng nói đầy đau khổ."
# monologue
# JP: 自分でも言いたくないことを、\n無理に吐き出しているような。
2459 = "Giống như đang ép bản thân phải thốt ra,\nnhững lời mà chính mình cũng không muốn nói."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様を愛しても。お互い、愛しあおうとも――\nわたくしは……わたくしでは――できない、のです」
1774 = "「Cho dù em có yêu Ngài Soutetsu. Cho dù chúng ta có yêu nhau đi chăng nữa――\nEm……Một người như em thì――không thể làm được.」"
# monologue
# JP: ハチロクの全身が震えてしまう。\n言葉が、出てこなくなってしまう。
2333 = "Toàn thân Hachiroku run rẩy.\nKhông thể thốt nên lời nào nữa."
# monologue
# JP: ハチロクを何が苦しめるのか、僕にもわかった気になって\n――勘違いでも構わないから、両手ですっぽり抱きしめる。
2450 = "Tôi có cảm giác mình đã hiểu được điều gì đang làm Hachiroku đau khổ\n――Dù có hiểu lầm cũng không sao, tôi vòng tay ôm trọn lấy cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。どれほど愛し合い満たし合っても、\nハチロク、お前と僕との間に――子は、生せない」
1559 = "「Đúng vậy. Cho dù chúng ta có yêu nhau và lấp đầy nhau đến đâu,\nHachiroku, giữa em và tôi――không thể sinh con được.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
2075 = "「!」"
# monologue
# JP: 抱きすくめている胸の中、\nハチロクが驚きの目を持ち上げる。
2339 = "Trong vòng tay ôm chặt của tôi,\nHachiroku ngước lên với đôi mắt kinh ngạc."
# 【双鉄】
# display as 雙鐵
# JP: 「考えていたさ。そのことは。お前を、好きだと――\n他のみんなとは違う好きだと、気づいたときから」
2020 = "「Tôi đã nghĩ về điều đó rồi. Từ lúc tôi nhận ra――\nmình thích em, một tình cảm khác hẳn với mọi người.」"
# 【ハチロク】
# display as 八六
# JP: 「それでも……それを、わかっていても」
1642 = "「Dù vậy……Dù ngài đã biết điều đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっていても、僕は、お前と一緒になりたい。\nお前以外に、妻とするものを考えられない」
1776 = "「Dù biết vậy, tôi vẫn muốn ở bên em.\nTôi không thể nghĩ đến ai khác làm vợ mình ngoài em.」"
# 【ハチロク】
# display as 八六
# JP: 「ですが――ですがっ、双鉄様は」
1641 = "「Nhưng mà――Nhưng mà, Ngài Soutetsu thì...」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1701 = "「嗯」" 
# monologue
# JP: ハチロクならば、わかってくれてる。\n僕はそのことを、知っている。
2341 = "Nếu là Hachiroku thì chắc chắn em ấy sẽ hiểu.\nTôi biết rõ điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「子を生し、命をつないでいくことは大切だ」
1925 = "「Sinh con đẻ cái, tiếp nối sinh mệnh là điều quan trọng.」"
# monologue
# JP: 父さんと、母さんと、路子とに――
2609 = "Cha, mẹ, và cả Michiko nữa――"
# monologue
# JP: 僕が託してもらった命を、\n僕も当然、子供へと繋いでいくべきだろう。
2286 = "Sinh mệnh mà họ đã gửi gắm cho tôi,\nđương nhiên tôi cũng nên tiếp nối nó cho những đứa trẻ của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「だけれど――僕は、思うのだ」
1977 = "「Nhưng mà――tôi nghĩ thế này.」"
# monologue
# JP: それを理由でハチロクを諦め、\n好きではない女性と例え子を生したとして。
2671 = "Nếu vì lý do đó mà tôi từ bỏ Hachiroku,\nvà sinh con với một người phụ nữ mà tôi không yêu."
# monologue
# JP: あるいはハチロクを愛人として、正妻を娶るものとして。\nそれは果たして、僕の命を正しくつなぐことになろうか。
2540 = "Hoặc là lấy Hachiroku làm nhân tình, rồi cưới một người vợ chính thức.\nLiệu điều đó có thực sự là tiếp nối sinh mệnh của tôi một cách đúng đắn không?"
# 【双鉄】
# display as 雙鐵
# JP: 「子を生すだけが、\n命をつなぐ方法じゃない」
1555 = "「Sinh con đẻ cái,\nkhông phải là cách duy nhất để tiếp nối sinh mệnh.」"
# 【ハチロク】
# display as 八六
# JP: 「それ、は……いったい」
2015 = "「Chuyện đó, là……ý ngài là sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕らの力などは小さい。\nだが、小さいなりに、為していけることもある」
1815 = "「Sức lực của chúng ta tuy nhỏ bé.\nNhưng dù nhỏ bé, vẫn có những điều chúng ta có thể làm được.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1879 = "「是的」" 
# monologue
# JP: ハチロクの目の、頑ななものが薄れ始める。
2363 = "Sự bướng bỉnh trong ánh mắt Hachiroku bắt đầu nhạt dần."
# monologue
# JP: 薄れてみれば、\nそれは恐らく、恐れだったのだろうと思う。
2713 = "Khi sự bướng bỉnh ấy nhạt đi,\ntôi nhận ra có lẽ đó chính là nỗi sợ hãi."
# 【双鉄】
# display as 雙鐵
# JP: 「例えば、バーベキュー\x%l列車;#00ffc040;列車%l;#;。あれを僕らは、\nこれからも、懸命に運転していくだろう」
1895 = "「Ví dụ như, \\x%l列車;#00ffc040;đoàn tàu%l;#; BBQ.\nTừ nay về sau, chúng ta vẫn sẽ tiếp tục dốc sức vận hành nó đúng không.」"
# 【ハチロク】
# display as 八六
# JP: 「もちろんです。双鉄様とあるかぎり。\nわたくしたちが、その任を解かれない限り」
2040 = "「Tất nhiên rồi ạ. Chừng nào em còn ở bên Ngài Soutetsu.\nChừng nào chúng ta chưa được miễn nhiệm khỏi vị trí đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな」
1870 = "「Đúng vậy.」"
# monologue
# JP: ハチロクは、僕よりよほど考えている。知っている。
2357 = "Hachiroku suy nghĩ sâu sắc hơn tôi nhiều. Em ấy biết rõ."
# monologue
# JP: “任を解かれる”その日は必ず、\n遅かれ早かれ、訪れるのだと。
2446 = "Ngày “được miễn nhiệm” đó chắc chắn,\nsớm muộn gì cũng sẽ đến."
# 【双鉄】
# display as 雙鐵
# JP: 「任を解かれるその時には、\nきっと、僕らに代わる、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と\x%l機関士;#00ffc040;機関士%l;#;がいる」
1943 = "「Khi chúng ta được miễn nhiệm,\nchắc chắn sẽ có \\x%lレイルロオド;#00ffc040;Railord%l;#; và \\x%l機関士;#00ffc040;lái tàu%l;#; khác thay thế chúng ta.」"
# 【ハチロク】
# display as 八六
# JP: 「……ああ」
1257 = "「……A.」"
# monologue
# JP: 僕が夢見ている光景を、\nきっと、ハチロクも見てくれた。
2518 = "Cảnh tượng mà tôi hằng mơ ước,\nchắc chắn Hachiroku cũng đã nhìn thấy."
# monologue
# JP: そうだ、僕らが歩む先には――
2567 = "Đúng vậy, trên con đường chúng ta bước đi――"
# 【ハチロク】
# display as 八六
# JP: 「きっと、新しい\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が――\nまだ見ぬ、わたくしの妹が」
1524 = "「Chắc chắn sẽ có những \\x%lレイルロオド;#00ffc040;Railord%l;#; mới――\nnhững đứa em gái mà em chưa từng gặp mặt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1701 = "「嗯」" 
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;との共存が果たせる以上、\n鉄道は必ず復権するし、そうさせていく。
2434 = "Một khi có thể cùng tồn tại với \\x%lエアクラ;#00ffc040;Aircra%l;#;,\nđường sắt chắc chắn sẽ phục hưng, và chúng ta sẽ làm cho điều đó xảy ra."
# monologue
# JP: 今は喪失寸前の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の作成技術も、\nきっと再びニーズを得、継承され、発展をすることだろう。
2647 = "Ngay cả công nghệ chế tạo \\x%lレイルロオド;#00ffc040;Railord%l;#; hiện đang trên bờ vực thất truyền,\nchắc chắn sẽ lại có nhu cầu, được kế thừa và phát triển."
# 【双鉄】
# display as 雙鐵
# JP: 「例えばそのとき、新しいコンビへと。\n僕達が積み重ねてきたノウハウを、伝えてあげる」
1946 = "「Ví dụ như khi đó, chúng ta sẽ truyền lại cho bộ đôi mới,\nnhững bí quyết mà chúng ta đã tích lũy được.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1879 = "「是的」" 
# 【双鉄】
# display as 雙鐵
# JP: 「あるいは、誰かが御一夜を思い出すとき。\nそこに僕らの、[ハチロクニイマル,3]8620の姿があるのでもいい」
1838 = "「Hoặc là, khi ai đó nhớ về Ohimitera.\nCó hình bóng của chúng ta, của 8620 ở đó cũng được.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1879 = "「是的」" 
# monologue
# JP: そしてハチロクの頷きは、\n僕が想像している未来に、色を、温度を与えてくれる。
2327 = "Và cái gật đầu của Hachiroku,\nđã mang lại màu sắc và sự ấm áp cho tương lai mà tôi đang tưởng tượng."
# 【双鉄】
# display as 雙鐵
# JP: 「誰かが、どんな形でも、僕たちのことを覚えてくれて。\nそうした記憶が、その人の中で、生きるなら――」
1918 = "「Chỉ cần ai đó, dưới bất kỳ hình thức nào, vẫn còn nhớ đến chúng ta.\nNếu những ký ức đó vẫn sống mãi trong lòng người đó――」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちは。つなげるのですね」
2023 = "「Thì chúng ta... đã có thể tiếp nối sinh mệnh rồi nhỉ.」"
# monologue
# JP: ハチロクの手に力がこもる。
2343 = "Bàn tay Hachiroku tràn đầy sức lực."
# monologue
# JP: 僕をぎゅうっと抱きしめ返し、\n体の熱を伝えてくれる。
2440 = "Em ấy ôm chặt lấy tôi,\ntruyền cho tôi hơi ấm từ cơ thể em."
# 【ハチロク】
# display as 八六
# JP: 「だれかに、バトンを。わたくしたちが遺せるものを。\nわたくしと双鉄様との――記憶――記憶の、遺伝子を」
1853 = "「Trao lại gậy tiếp sức cho ai đó. Những gì chúng ta có thể để lại.\nKý ức của em và Ngài Soutetsu――những gen di truyền của ký ức.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。遺せる。つないでいける」
1874 = "「Đúng vậy. Chúng ta có thể để lại. Có thể tiếp nối.」"
# monologue
# JP: 自らの遺伝子を残すため――\n子を生すために子を生すのなら、それは不幸だ。
2419 = "Chỉ để lưu lại gen di truyền của bản thân――\nNếu sinh con chỉ vì mục đích sinh con, thì đó là một điều bất hạnh."
# monologue
# JP: その子にとっても、誰にとっても、おそらくは。\nが……
2502 = "Đối với đứa trẻ đó, hay đối với bất kỳ ai, có lẽ đều là như vậy.\nNhưng……"
# 【双鉄】
# display as 雙鐵
# JP: 「そうして遺せるものならば、きっと幸福な遺伝子だ。\nお前と結婚できるなら、僕は幸せになれるから」
1816 = "「Nếu những gì chúng ta để lại được tạo ra như thế, thì đó chắc chắn là những gen hạnh phúc.\nBởi vì nếu được kết hôn với em, tôi sẽ trở nên vô cùng hạnh phúc.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしもです、双鉄様。\n貴方の妻としていただけるのなら」
1812 = "「Em cũng vậy, Ngài Soutetsu.\nNếu ngài chấp nhận em làm vợ ngài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1701 = "「嗯」" 
# monologue
# JP: 間髪入れずに、答えてもらえた。\n喜びは、けれど、とても静かだ。
2581 = "Câu trả lời được đưa ra không chút do dự.\nNiềm vui sướng, tuy nhiên, lại vô cùng tĩnh lặng."
# monologue
# JP: 真白に降りつむ雪のごとくにしんしんと――\n音無き音で、僕の心に染み透ってくる。
2454 = "Tựa như tuyết trắng không ngừng rơi xuống――\nThấm đẫm vào trái tim tôi bằng một âm thanh tĩnh lặng."
# 【双鉄】
# display as 雙鐵
# JP: 「ならばそのため、僕は生きたい。\nお前とふたり、生きる証を、のこしていきたい」
2042 = "「Nếu vậy, tôi muốn sống vì điều đó.\nTôi muốn cùng em, để lại minh chứng cho sự tồn tại của chúng ta.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
# 2064 = "「雙鐵少爺」" 
# monologue
# JP: もうハチロクは震えない。
2362 = "Hachiroku không còn run rẩy nữa."
# monologue
# JP: 手をほどき、僕から少し体を離し――\nまっすぐな目で、見つめてくれる。
2444 = "Em buông tay ra, hơi lùi lại một chút――\nvà nhìn tôi bằng một ánh mắt kiên định."
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、貴方を愛しています。\n他の誰より、何よりも」
1830 = "「Em yêu ngài.\nHơn bất kỳ ai, hơn bất cứ điều gì.」"
# monologue
# JP: 知っている。\nもうすでに、お互いに誓いあっているのだから。
2516 = "Tôi biết chứ.\nBởi vì chúng tôi đã trao lời thề cho nhau rồi mà."
# monologue
# JP: そうであるのに――\n喜びの雪は降り止まぬ。
2316 = "Dù vậy――\nCơn tuyết của niềm vui sướng vẫn không ngừng rơi."
# 【ハチロク】
# display as 八六
# JP: 「ですので、わたくしは望みます」
1846 = "「Vì vậy, em mong muốn...」"
# monologue
# JP: ほどかれた手が、差し伸べられる。\nハチロクから僕に、伸ばしてくれる。
2335 = "Đôi tay vừa buông ra, lại đưa về phía trước.\nHachiroku vươn tay về phía tôi."
# 【ハチロク】
# display as 八六
# JP: 「ふつつかものではございますが――\nどうか、わたくしを、貴方の妻となさってください」
1768 = "「Dù em còn nhiều thiếu sót――\nNhưng xin ngài, hãy nhận em làm vợ của ngài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「喜んで」
1887 = "「Rất sẵn lòng.」"
# monologue
# JP: その手を取る。\nそして、自然とくちづける。
2524 = "Tôi nắm lấy bàn tay ấy.\nVà tự nhiên đặt lên đó một nụ hôn."
# 【双鉄】
# display as 雙鐵
# JP: 「今から僕はお前の夫で。\nハチロク――お前は、僕の妻だ」
1793 = "「Từ giờ phút này, tôi là chồng của em.\nHachiroku――em là vợ của tôi.」"
# 【ハチロク】
# display as 八六
# JP: 「はいっ！」
1746 = "「Vâng ạ!」"
# 【凪】
# display as 凪
# JP: 「おめでとーばーい！」
1806 = "「Chúc mừng nha!」"
# 【ふかみ】
# display as 深美
# JP: 「おめでとうございまーす！！」
1807 = "「Chúc mừng hai người ạ!!」"
# 【ハチロク】
# display as 雙鐵＆八六
# JP: 『「っ！！？」\n「っ！！？」』
2088 = "『「!!?」\n「!!?」』"
# monologue
# JP: すっかり、飛んでた。\n完全に、ふたりの世界にはいっていた、が――
2536 = "Tôi hoàn toàn quên mất.\nĐã hoàn toàn chìm đắm vào thế giới của hai người, nhưng mà――"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　にぃに！　かーっこよかった！！」
2053 = "「Anh hai! Anh hai! Ngầu quá đi mất!!」"
# 【真闇】
# display as 真闇
# JP: 「まっこと。日ノ本一のお似合いの夫婦よね」
1930 = "「Thật đấy. Cặp vợ chồng đẹp đôi nhất Hinomoto luôn.」"
# 【稀咲】
# display as 稀咲
# JP: 「おめでとう。ふたりとも。\n支店長会議を抜けだして余りある景色を見せてもらった」
1805 = "「Chúc mừng hai người.\nĐược chứng kiến cảnh tượng này thì trốn khỏi cuộc họp Giám đốc chi nhánh cũng đáng.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、ふわふわしちゃいましたー。\nおよめさんになるってとーっても、素敵なんですねぇ」
1922 = "「Reina, thấy lâng lâng quá đi mất.\nTrở thành cô dâu thật là tuyệt vời quá nha~」"
# 【ハチロク】
# display as 八六
# JP: 「あ……うっ――あっ」
1678 = "「A……Ư――A」"
# monologue
# JP: 僕と同じくハチロクも、\n意識から飛ばしていたのだろう。
2329 = "Giống như tôi, Hachiroku chắc cũng\nđã quên mất sự hiện diện của mọi người."
# monologue
# JP: 急速で猛然たる祝福を受け、\nゆでダコもかくやの真っ赤な顔になってる。
2632 = "Nhận được những lời chúc phúc dồn dập và nồng nhiệt,\nmặt em ấy đỏ bừng lên như con bạch tuộc luộc vậy."
# 【ハチロク】
# display as 八六
# JP: 「あ、あの――ありがとうございます！」
1691 = "「A, dạ――Em cảm ơn mọi người ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。\n祝辞の分も、その何倍も、僕らは、幸せな夫婦となるよ」
1982 = "「Cảm ơn mọi người.\nĐáp lại những lời chúc phúc này, chúng tôi sẽ trở thành một cặp vợ chồng hạnh phúc gấp vạn lần.」"
# monologue
# JP: 目配せすらもかわさないのに、\n僕とハチロク、完全に同じタイミングでの深い礼。
2612 = "Dù không hề trao đổi ánh mắt,\nnhưng tôi và Hachiroku lại cúi đầu cảm ơn cùng một lúc."
# monologue
# JP: ひやかす声は祝福で、\nそれを浴びれば、幸せは何倍にもふくれあがって――
2579 = "Những tiếng trêu chọc chính là lời chúc phúc,\nkhi đắm mình trong đó, niềm hạnh phúc lại dâng trào lên gấp bội――"
# monologue
# JP: （いや――あれ？）
2761 = "（Khoan đã――ủa?）"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、ハチロクちゃん。\n大丈夫です！　おふたり、法的にも結婚できます！」
2062 = "「Anh Soutetsu, bé Hachiroku.\nKhông sao đâu! Hai người hoàn toàn có thể kết hôn hợp pháp!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1718 = "「Ồ!」"
# monologue
# JP: 一人足りない――思った矢先に、\nポーレットらしい祝福を投げてもらえる。
2528 = "Vừa nghĩ sao thiếu mất một người――thì ngay lập tức,\ntôi đã nhận được lời chúc phúc đậm chất Paulette."
# monologue
# JP: こんなときでも流されず、\n尋ねたことを、きちんと調べてくれていたのか。
2406 = "Ngay cả trong lúc này mà cô ấy vẫn không bị cuốn theo không khí,\nvẫn cẩn thận tìm hiểu những gì tôi đã hỏi sao."
# 【ハチロク】
# display as 八六
# JP: 「けれど――わたくしは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;で」
1540 = "「Nhưng mà――em là \\x%lレイルロオド;#00ffc040;Railord%l;#; mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫なんですよ。\nハチロクちゃんは、だって、女性ですから」
1904 = "「Không sao đâu mà.\nBởi vì, bé Hachiroku là phụ nữ mà.」"
# monologue
# JP: 『日ノ本国六法全書』
1224 = "『Hinomoto Quốc Lục Pháp Toàn Thư』"
# monologue
# JP: 分厚い本の細かな文字を、\nこここことポーレットは指し示す。
2594 = "Paulette chỉ vào những dòng chữ nhỏ li ti,\ntrên cuốn sách dày cộp."
# 【ポーレット】
# display as 波萊特
# JP: 「まず、大前提として民法の定めるところは、\n結婚は両性の合意にのみ基づいて成立するってことです」
2074 = "「Đầu tiên, tiền đề lớn nhất mà Bộ luật Dân sự quy định là,\nhôn nhân chỉ được thành lập dựa trên sự đồng thuận của cả hai giới.」"
# 【双鉄】
# display as 雙鐵
# JP: 「両性か」
1599 = "「Hai giới à.」"
# 【ポーレット】
# display as 波萊特
# JP: 「これは男性と女性の両性という解釈で通用してます」
1238 = "「Điều này được hiểu chung là hai giới tính nam và nữ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1666 = "「Hô.」"
# 【ポーレット】
# display as 波萊特
# JP: 「その前提のもと、直系の血族との婚姻、重婚、\n法定年齢に達する前の結婚が、禁止されています」
1728 = "「Dựa trên tiền đề đó, pháp luật cấm kết hôn với người thân trực hệ, trùng hôn,\nvà kết hôn trước độ tuổi luật định.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……本当だな」
1681 = "「À……Đúng thật này.」"
# monologue
# JP: 民法というのは初めて見たが――\nまさしく、ポーレットのいったとおりに書かれている。
2716 = "Đây là lần đầu tiên tôi đọc Bộ luật Dân sự――\nNhưng quả thực, nó được viết chính xác như những gì Paulette đã nói."
# monologue
# JP: そう書かれてはいるのだが――
2321 = "Mặc dù được viết như vậy, nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「僕はハチロクが女性であることを知っているが――\nそれは法的にも通用するのか？」
1824 = "「Tôi biết Hachiroku là phụ nữ――\nnhưng điều đó có được pháp luật công nhận không?」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
# 2076 = "「！！！」" 
# monologue
# JP: 言った瞬間、ハチロクがボっと赤くなる。
2688 = "Khoảnh khắc tôi nói ra, mặt Hachiroku đỏ bừng lên."
# monologue
# JP: そういう意味にも取れてしまうかと少し焦るが、\nポーレットはまるで気にしていない。
2726 = "Tôi hơi bối rối vì sợ bị hiểu nhầm sang ý khác,\nnhưng Paulette thì hoàn toàn không bận tâm."
# 【ポーレット】
# display as 波萊特
# JP: 「なにをもって女性とするかの法的根拠は、戸籍です。\n戸籍上で女性であれば、女性ということになります」
1839 = "「Căn cứ pháp lý để xác định giới tính nữ là sổ hộ khẩu.\nNếu trên hộ khẩu là nữ, thì sẽ được công nhận là nữ.」"
# 【ハチロク】
# display as 八六
# JP: 「戸籍……ですか」
1590 = "「Sổ hộ khẩu……sao ạ.」"
# monologue
# JP: ハチロクの声が、くもってしまう。
2360 = "Giọng nói của Hachiroku chùng xuống."
# 【ハチロク】
# display as 八六
# JP: 「残念ながら、わたくしには」
1638 = "「Đáng tiếc là, em lại không có.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いいえ、残念じゃないんです。\n戸籍は創出できますから。自治体の長の判断によって」
1550 = "「Không đâu, không có gì đáng tiếc cả.\nBởi vì sổ hộ khẩu có thể được lập mới. Dựa theo quyết định của người đứng đầu chính quyền địa phương.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
2030 = "「Trời!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか！」
1883 = "「Vậy sao!」"
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜の場合は市長の判断になりますね。\nですので、ここもまったく問題になりません」
1725 = "「Trong trường hợp của Ohimitera thì sẽ do Thị trưởng quyết định.\nThế nên, vấn đề này cũng hoàn toàn được giải quyết.」"
# monologue
# JP: 頼もしい。\nポーレットが光り輝いてさえみえる。
2470 = "Thật đáng tin cậy.\nPaulette trông như đang tỏa sáng lấp lánh vậy."
# monologue
# JP: ここにも、まさしく餅屋がいたと、\n伏して拝みたいような気持ちになる。
2580 = "Quả thực ở đây cũng có một người chuyên nghiệp,\ntôi có cảm giác như muốn phủ phục xuống bái lạy cô ấy luôn."
# 【ポーレット】
# display as 波萊特
# JP: 「ですから、ひとつだけ。\nそれだけしてもらえれば、法律面はクリアになります」
1849 = "「Vậy nên, chỉ còn một việc duy nhất nữa thôi.\nChỉ cần giải quyết xong việc đó, thì mặt pháp lý sẽ hoàn toàn rõ ràng.」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
# 1653 = "「咦？」" 
# monologue
# JP: ハチロクが、ぎくりとした顔になってしまう。
2381 = "Hachiroku giật thót mình, khuôn mặt lộ vẻ căng thẳng."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、それはいったい」
1916 = "「Paulette, rốt cuộc việc đó là gì?」"
# 【ポーレット】
# display as 波萊特
# JP: 「姓名です。苗字と名前。\nそれだけ、決めてもらえれば」
2031 = "「Là họ tên. Họ và tên.\nChỉ cần hai người quyết định được điều đó là xong.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1682 = "「À.」"
# 【ハチロク】
# display as 八六
# JP: 「名前……\nわたくしの、名前」
1649 = "「Tên……\nTên của, em.」"
# monologue
# JP: ハチロクの手が、僕のシャツへと。
2354 = "Bàn tay Hachiroku nắm lấy vạt áo sơ mi của tôi."
# monologue
# JP: まるで小さな子のように、\n頼って、すがりついてくる。
2442 = "Giống như một đứa trẻ nhỏ,\ndựa dẫm và bám víu lấy tôi."
# 【ハチロク】
# display as 八六
# JP: 「でしたら、名前も――\nわたくしは、双鉄様にお与えいただきたく思います」
2025 = "「Nếu vậy thì, cái tên――\nEm mong Ngài Soutetsu sẽ đặt cho em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「名前を、か？」
1648 = "「Tên, sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。ハチロクは[けいしきめいしょう,3]形式名称。\nいうなれば、姓であるかと存じますので」
1875 = "「Vâng. Hachiroku là tên gọi mẫu xe.\nNói cách khác, nó giống như là họ vậy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、なるほどそうかもしれんが――」
2016 = "「Ra là vậy, có lẽ là thế thật nhưng――」"
# monologue
# JP: だけれど、僕は知っている。
2265 = "Nhưng mà, tôi biết rõ."
# monologue
# JP: 形式名称を名乗ること、\nそれこそが、トップナンバーの誇りなのだと。
2287 = "Việc xưng tên bằng tên gọi mẫu xe,\nchính là niềm tự hào của đầu máy số hiệu đầu tiên."
# 【双鉄】
# display as 雙鐵
# JP: 「お前の姓は、すぐに右田となるのだぞ？\nせっかくのハチロクの……いや。ああ、そうか」
1582 = "「Họ của em sẽ sớm đổi thành Migita đấy nhé?\nChữ Hachiroku quý giá……À không. À, ra vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「左様です」
1905 = "「Đúng là vậy ạ.」"
# monologue
# JP: いたずらっぽく瞳が輝く。
2365 = "Đôi mắt em ánh lên nét tinh nghịch."
# 【ハチロク】
# display as 八六
# JP: 「お仕事では旧姓を名乗らせていただければと」
1724 = "「Khi làm việc, em muốn được sử dụng họ cũ của mình ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。いいな。\nそのほうが、公私のメリハリをつけられそうだ」
1712 = "「Ừ. Được đấy.\nNhư vậy sẽ dễ dàng phân biệt rạch ròi giữa công việc và đời tư hơn.」"
# 【凪】
# display as 凪
# JP: 「子牛のメリハリって、ブチのことばい？\n模様みたくに、白黒はっきりつけよるってことと？」
1607 = "「Koushi (công tư) á? Ý anh là koushi (bê con) hả?\nÝ là phải phân biệt rạch ròi trắng đen như đốm bò sữa ấy hả?」"
# 【ふかみ】
# display as 深美
# JP: 「ちがうよ、凪ちゃん。\n今の場合は、きっと、ええっと――」
1532 = "「Không phải đâu, bé Nagi.\nTrong trường hợp này, chắc chắn là, ừm――」"
# 【双鉄】
# display as 雙鐵
# JP: 「仕事を離れ、ふたりきりになったときだけ、\n新しい名を――いや、僕だけの名を呼ぶということだ」
1939 = "「Nghĩa là khi gác lại công việc, chỉ còn lại hai chúng ta,\ntôi sẽ gọi tên mới――không, cái tên chỉ dành riêng cho tôi gọi.」"
# 【ふかみ】
# display as 深美
# JP: 「はぅぅ～～っ」
1660 = "「Haưư～～」"
# 【凪】
# display as 凪
# JP: 「な、なんだかにーさん、ド迫力ばい」
1937 = "「T-Tự dưng thấy anh hai, ngầu quá xá.」"
# monologue
# JP: あえて自ら踏み込み答え、\n周囲の雑音を消しておく。
2525 = "Tôi chủ động đưa ra câu trả lời,\nđể dập tắt những tiếng xì xào xung quanh."
# monologue
# JP: そして生まれる沈黙の中、\n考える――途端にちりん、名が響く。
2651 = "Và trong sự im lặng vừa chớm nở,\ntôi suy nghĩ――ngay lập tức, một cái tên vang lên lanh lảnh."
# 【双鉄】
# display as 雙鐵
# JP: 「『すず』だ」
1636 = "「Là 『Suzu』.」"
# 【ハチロク】
# display as 八六
# JP: 「すず――」
2044 = "「Suzu――」"
# monologue
# JP: ふんわり、笑う。
2383 = "Em mỉm cười nhẹ nhàng."
# 【ハチロク】
# display as 八六
# JP: 「ありがとうございます。\n素敵なお名前」
1983 = "「Em cảm ơn ngài.\nMột cái tên thật đẹp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「素敵で当然。\nお前を思い、自然と浮かんだ名なのだからな」
1928 = "「Đẹp là đương nhiên rồi.\nBởi vì đó là cái tên tự nhiên nảy ra trong đầu khi tôi nghĩ về em mà.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしを――お思いくださって？」
1809 = "「Khi ngài nghĩ về――em sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。いつでもお前は凛としている。\nころころ笑うし、鈴の音のように輝いている」
1863 = "「Ừ. Lúc nào em cũng rất uy nghi.\nLại hay cười khúc khích, và tỏa sáng rạng rỡ như tiếng chuông (suzu) vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「すず――すず」
2045 = "「Suzu――Suzu.」"
# monologue
# JP: 舌で転がす。\nハチロクが、僕の与えた新しい名を、幸せそうに。
2347 = "Em nhẩm đi nhẩm lại.\nHachiroku gọi cái tên mới mà tôi đặt cho em với vẻ đầy hạnh phúc."
# 【ハチロク】
# display as 八六
# JP: 「お呼びいただけるのは、夜ですね？」
1810 = "「Ngài sẽ gọi em bằng cái tên này vào buổi tối đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。乗務が終わった後だ――っと！」
1869 = "「Đúng vậy. Sau khi kết thúc ca làm việc――Á!」"
# monologue
# JP: いかん、時間だ。\nそろそろ\x%lカマ;#00ffc040;カマ%l;#;を起こしてやらねば、走れなくなる。
2257 = "Không ổn rồi, đến giờ rồi.\nNếu không nhóm \\x%lカマ;#00ffc040;lò hơi%l;#; bây giờ thì sẽ không chạy được mất."
# 【双鉄】
# display as 雙鐵
# JP: 「そういうことだ。みな。ありがとう。\n行くぞ、ハチロクっ！」
1773 = "「Mọi chuyện là vậy đấy. Cảm ơn mọi người.\nĐi thôi, Hachiroku!」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様っ！」
1748 = "「Vâng, Ngài Soutetsu!」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　ちょっ、にぃにっ！　\nわたしもいくけん！　助士やけんっ！」
1663 = "「Hả!? Khoan đã, anh hai!\nEm cũng đi nữa! Em là phụ lái mà!」"
# 【稀咲】
# display as 稀咲
# JP: 「ふふ、随分と双鉄は早足だ」
1716 = "「Fufu, Soutetsu đi nhanh thật đấy.」"
# 【真闇】
# display as 真闇
# JP: 「あぎゃん照れば、少ぉし遅れて来ぃよるけんねぇ」
2026 = "「Chắc là do xấu hổ quá nên mới vội vàng bỏ chạy đó mà.」"
# 【凪】
# display as 凪
# JP: 「あぎゃん照れって、どぎゃん照ればい？」
1241 = "「Xấu hổ kiểu đó là kiểu gì vậy chị?」"
# 【ふかみ】
# display as 深美
# JP: 「ええと……良くわからない、けど――\n自分が実はノロケてるって、後から気づく的な照れ？」
2021 = "「À ừm……Chị cũng không rõ lắm, nhưng mà――\nkiểu như sau khi khoe khoang tình cảm xong mới nhận ra rồi thấy xấu hổ ấy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「～っ」
2078 = "「~」"
# monologue
# JP: ヒヤカシという祝福だとはわかっていても、\n照れてることを指摘されるのは照れくさい。
2725 = "Dù biết đó là những lời chúc phúc mang tính trêu chọc,\nnhưng bị chỉ ra là đang xấu hổ thì vẫn thấy ngượng ngùng."
# monologue
# JP: （つんつん）
2757 = "（Chọc chọc）"
# 【双鉄】
# display as 雙鐵
# JP: 「むっ？」
# 1713 = "「嗯？」" 
# 【れいな】
# display as 玲奈
# JP: 「ハチロクさん、そうてつさん、\n今日もいちにち、がんばりましょおねぇ～」
1602 = "「Chị Hachiroku, anh Soutetsu,\nhôm nay cũng hãy cùng nhau cố gắng nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「良い乗務を」
1933 = "「Chúc một ca làm việc tốt lành.」"
# 【ハチロク】
# display as 八六
# JP: 「ええ、がんばりましょう」
1702 = "「Vâng, cùng cố gắng nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お互いに、良い乗務を」
1562 = "「Cùng chúc nhau một ca làm việc tốt lành nào.」"
# monologue
# JP: ……ごく、さりげなく教えてもらえる。\n祝福は、つまり応援なのだと。
1220 = "……Họ đã cho tôi biết một cách thật tinh tế.\nRằng lời chúc phúc, cũng chính là sự ủng hộ."
# 【双鉄】
# display as 雙鐵
# JP: 「さて、と」
1742 = "「Vậy thì.」"
# monologue
# JP: 今日、これからがはじめの一歩だ。\n僕ら夫婦が、記憶の遺伝子を手渡すための。
2279 = "Hôm nay, từ giờ phút này sẽ là bước đi đầu tiên.\nĐể vợ chồng chúng tôi trao gửi những gen di truyền của ký ức."
# monologue
# JP: たくさんのたくさんの旅の記憶に、\n僕らの軌跡を、交えてもらうそのための。
2271 = "Để hòa quyện quỹ đạo của chúng tôi,\nvào biết bao nhiêu ký ức của những chuyến đi."
# 【双鉄】
# display as 雙鐵
# JP: 「行くぞ、ハチロク」
1988 = "「Đi thôi, Hachiroku.」"
