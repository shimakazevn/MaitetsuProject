1584 = "「來咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「お、お邪魔します。です」
1852 = "「打……打擾了。嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、いくらなんでも早すぎないか？」
1534 = "「不是，你們來得也太快了吧？」" 

# 【凪】
# display as 凪
# JP: 「早かばーい！　空から来たばい」
1927 = "「當然快咧！咱們可是從天上來的」" 

