80 = "\\x%l整備体;#00ffc040;整備體%l;#;狀態的玲奈應該是剛做好\\x%l仕業検査;#00ffc040;營業檢查%l;#;回來。只見她滿臉驚愕地站在那裡一動不動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、れいなの結婚話ではない。\n僕と――」
1549 = "「不，我們不是在說玲奈的婚事。是我和——」" 

# 【日々姫】
# display as 日日姬
# JP: 「ちょーっと待ってにぃに！\nこぎゃんと大事な話、私らだけで聞けんけんっ！」
2051 = "「阿哥你等一下！這麼大的事，可不能就我們幾個在場！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですよね。\nみんな、絶対知りたいだろうし」
1687 = "「啊，說得沒錯。大家也一定都想知道」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1612 = "「別——」" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、私はねぇねぇと稀咲先輩を」
2038 = "「那我就去叫阿姐和稀咲學姐」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。\nわたしは凪ちゃんとふかみちゃんですね」
1745 = "「好的。那我就去叫小凪和小深」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おい！」
1693 = "「喂！」" 

# monologue
