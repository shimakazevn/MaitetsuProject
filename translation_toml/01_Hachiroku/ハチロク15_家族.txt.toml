2458 = "完全不理會我的抗議，日日姬和波萊特各自掏出手機開始撥號。" 

# monologue
# JP: ……これは、参った――いや、参らんのか？\nいずれはみなに、確実に伝えることなのだし。
1222 = "……這可麻煩了——慢著，也不算麻煩吧？反正這件事早晚都是要告訴大家的。" 

# 【双鉄】
# display as 雙鐵
