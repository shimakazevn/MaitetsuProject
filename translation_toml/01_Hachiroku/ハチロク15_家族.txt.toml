# JP: 「そうしていきたいのだ、僕はむしろ。\n故に、ひとつポーレットに教えて欲しいことがある」
1611 = "「其實這才是我心中的期冀。所以，有件事想要請教波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　わたしに、ですか？」
1654 = "「咦？要問我嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1701 = "「嗯」" 

