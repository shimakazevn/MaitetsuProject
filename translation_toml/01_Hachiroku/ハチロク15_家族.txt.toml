# 【真闇】
# display as 真闇
# JP: 「あらあら、にぎやかやねぇ」
1662 = "「哎呀呀，好熱鬧啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。騒ぎになってしまった」
1700 = "「嗯。事情一下子搞大了」" 

# monologue
# JP: そして、一番近くの銀行ならば、\n迎えが無くとも――
