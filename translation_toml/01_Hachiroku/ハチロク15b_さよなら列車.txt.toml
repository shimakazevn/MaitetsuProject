# 【オリヴィ】
# display as 奥莉薇
# JP: 「サイショ、イッショにねたとき、ね？\nヒビキ、背中、とんとんって、してくれてたでしょ？」
1576 = "「咱們，第一次一起睡的時候，你不是，幫忙敲了，奧莉薇的背嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「私が？　そぎゃんことしたと？」
1695 = "「我有這麼做過嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「すごーいヒビキ！　卵わるの上手ー！」
1718 = "「日日姬好厲害哦！雞蛋打得好熟練！」" 

# 【日々姫】
# display as 日日姬
# JP: 「えー、このくらい普通だよー」
1740 = "「有嗎，也就普普通通啦」" 

# monologue
# JP: とぼけているのか、本当に覚えていないのか。\n日々姫のにこやかな表情からは、僕さえ何もわからない。
2149 = "就算是我也無法從日日姬的微笑中看出她是真的忘了還是裝的。" 

# monologue
# JP: 日々姫はそれほど完璧に――\n笑顔の仮面を、かぶり続ける。
2190 = "日日姬臉上掛著的笑容，完美到彷彿面具一般。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「したの。ソギャンコト。\nそれね？　オリヴィ、とーってもうれしかったんだぁ」
1789 = "「肯定有的，不用裝傻啦。所以當時啊，奧莉薇特別開心」" 

# 【日々姫】
# display as 日日姬
# JP: 「そっか」
1735 = "「是嗎」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがとね、ヒビキ」
1723 = "「日日姬，謝謝你」" 

# 【日々姫】
# display as 日日姬
# JP: 「水臭かとねー。\nそんなん、いつだっていくらでもしてあげるけん！」
1834 = "「這客氣什麼呢。什麼時候想要幫忙儘管開口唄！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがと。\nあとね？　マクラも、つたえておいて？」
1808 = "「謝謝。還有，幫忙轉告給真闇」" 

# 【日々姫】
# display as 日日姬
# JP: 「伝える、って――」
1820 = "「轉告——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ごはん、イッショね？　たのしかったの。\nオリヴィ、そんなの、はじめて、だったし」
1502 = "「一起吃飯，真的很開心。奧莉薇，還是第一次，和別人一起吃飯」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ね？　オリヴィどこすわったらいい？」
1844 = "「那奧莉薇坐在哪裡好呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「そうですね……\n双鉄さまのお隣がわたくしですので――」
1833 = "「這……雙鐵少爺這邊我已經坐了——」" 

# 【日々姫】
# display as 日日姬
# JP: 「そっちに三人並びは狭かとでしょー！\nわたしの隣に座ればよかとよ」
1506 = "「三人都坐那邊兒也不嫌擠得慌嗎！坐我這邊兒不就得了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、そーする！」
1848 = "「那就這麼坐吧！」" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ」
# 1596 = "「啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「石炭、おんなじ石炭でも、ね？\nみんなでたべると、おいしくて」
1857 = "「雖然吃的，是和往常一樣的煤炭。可是和大家一起吃，就更好吃」" 

# 【日々姫】
# display as 日日姬
# JP: 「そんなん！　そんなん、照れくさかけん！\nオリヴィ、自分で伝えんといけんよ！！」
1838 = "「這！這麼說太丟人咧！奧莉薇，你自己去跟阿姐說唄！！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「自分でかー。\nそっかー。そだよねー」
1795 = "「自己去說啊。也對，是應該自己去」" 

# monologue
# JP: ザクザクと、ワンスコの音が大きくなる。\n照れを、ではなく。きっと涙を隠すそのため。
2019 = "公斤鍬鏟煤炭的聲音更大了。日日姬一定是用聲音掩飾自己的害羞——不，是眼淚。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それでね？　ソーテツも、ありがとー」
1840 = "「還有，雙鐵，也謝謝你——」" 

# 【オリヴィ】
# display as 奥莉薇
