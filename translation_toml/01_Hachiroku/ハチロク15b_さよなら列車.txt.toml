# JP: 「オリヴィ！！！？」
1643 = "「奧莉薇！！！？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナ……カタ――あの、ね？　ひとつ、だけ――\nいい、ワスれ――それ、で――」
1654 = "「宗方——聽奧莉薇說，還有——一件事，忘了，說――」" 

# 【宗方】
# display as 宗方
# JP: 「なんだ――なんでも聞いてやるぞ」
1727 = "「是什麼——你儘管開口」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なん――でも？」
1804 = "「說什麼——你都聽？」" 

# monologue
# JP: オリヴィ、だ。\nオリヴィの、いたずらっこめいた、あの微笑みだ。
2282 = "這笑容，是奧莉薇平時掛在臉上的那種有些淘氣的微笑。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへっ、それ、じゃ――\nギュって、して？」
1583 = "「哎嘿嘿，那——抱抱奧莉薇吧？」" 

# 【宗方】
# display as 宗方
# JP: 「ああ」
# 1606 = "「嗯」" 

# monologue
# JP: 大柄な宗方さんが、体をぎゅうっと縮こめる。\n小さく丸まるオリヴィを、そうっと大事に――抱きしめる。
2262 = "身材高大的宗方先生團起上半身，輕輕抱著縮成一團的奧莉薇。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ああ――冷たい。\n冷たくて、とっても、気持ちいい」
1595 = "「啊——好涼。涼颼颼的，真舒服」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1863 = "「！」" 

# monologue
# JP: オリヴィの目がうっすらと開く。\nまったく焦点を結ばぬ瞳が、笑みのアーチをふわりと描く。
2087 = "奧莉薇輕輕把眼睛睜開一條縫。她的眼神已經無法聚焦，只有微彎的眼睛訴說她的笑意。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「つめ、たい――のに――胸、だけ――えへへっ、\nもっと――さっきより、あっつい――な」
1859 = "「雖然，涼涼的——可，只有，胸口——比剛才，更熱了——」" 

# 【宗方】
# display as 宗方
# JP: 「苦しいのか！？」
1535 = "「你難受嗎！？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「くるしく、ない――から――\nこの、まま――きい、て」
1522 = "「不難受——你，就這麼，抱著——聽奧莉薇說」" 

# 【宗方】
# display as 宗方
# JP: 「ああ」
1646 = "「好」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あの、ね？　さっき、いえなく、て――\nずっと、ずうっと、いえなかった、け、ど――」
1548 = "「其實，剛才，奧莉薇沒能，說出口――一直、一直都，沒能說，出口——」" 

# 【宗方】
# display as 宗方
# JP: 「何をだ」
1675 = "「怎麼了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、メリケンで――オヒトヨの、こ、だけど。\nだけど、ね？　ずっと、オリヴィ――ムナカタのこと」
1637 = "「奧莉薇——雖然，又是美國式——又是，御一夜的，鐵路人偶。可奧莉薇，一直認為，宗方就是——」" 

# monologue
# JP: オリヴィの手が、這い上がる。\n宗方さんの顔に触れようと、がくがく震え、力なく。
2080 = "奧莉薇的手無力地輕輕抬起，顫抖著，像是想要去摸宗方先生的臉。" 

# monologue
# JP: 宗方さんが、顔からその手を迎えにいく。\n頬と手が触れ――オリヴィはまた、小さく、笑う。
2120 = "宗方先生主動低頭把臉放在她的手裡。奧莉薇摸到了他的臉頰，又輕輕笑了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「――ずっと、思ってて、\nよびたかった、の」
1266 = "「——就是奧莉薇的司機，奧莉薇一直都想這麼叫你」" 

# 【宗方】
# display as 宗方
# JP: 「っ！？」
1570 = "「呃！？」" 

# monologue
# JP: オリヴィの手が、落ちていく。\n小さな笑顔は、そのままに。
2081 = "奧莉薇的手臂落了下來，可她依舊笑著。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「さよ、なら――\ngood bye――My Master――――」
1549 = "「別了——Ｇｏｏｄｂｙｅ——Ｍｙ　ｍａｓｔｅｒ——」" 

# 【宗方】
# display as 宗方
# JP: 「オリヴィ？」
1645 = "「奧莉薇？」" 

# monologue
# JP: 宗方さんが、オリヴィを呼ぶ。\nその手がぺちぺち、軽く、オリヴィの頬を叩く。
2124 = "宗方先生呼喚著奧莉薇的名字，用手掌輕輕拍著奧莉薇的臉蛋。" 

# 【宗方】
# display as 宗方
# JP: 「オリヴィ！　おい！　オリヴィ！　オリヴィ！！」
1642 = "「奧莉薇！喂，奧莉薇！奧莉薇！！」" 

# monologue
# JP: （ガッ！　ガッ！　ガッ！　ガッ！）
2326 = "（喀！喀！喀！喀！）" 

# monologue
# JP: 石炭がまた砕かれる。\n何度も、何度も、何度も、何度も。
2122 = "宗方先生又無數次揮下碎冰錐，鑿碎一塊煤炭。" 

# monologue
# JP: だが、オリヴィは――\nオリヴィはもう、別れを、告げた。
2041 = "可是，奧莉薇——奧莉薇已經說出告別的話語了。" 

# 【宗方】
# display as 宗方
# JP: 「オリヴィ――――っ――オリ、ヴィ」
1636 = "「奧莉薇——奧莉、薇」" 

# 【ハチロク】
# display as 八六
# JP: 「ああっ！」
# 1600 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫――\x%l汽笛;#00ffc040;汽笛%l;#;を」
1713 = "「日日姬——鳴\\x%l汽笛;#00ffc040;汽笛%l;#;」" 

# 【日々姫】
# display as 日日姬
# JP: 「きてーーーーーーーーきっ！！！」
1753 = "「汽——笛！！！」" 

# monologue
# JP: 長く、長く、長く、長く。\n宗方さんの慟哭は、オリヴィだけが聞けばいいから。
2293 = "長長的汽笛聲掩蓋住了宗方先生的號泣。他的哭聲只讓奧莉薇聽見就夠了。" 

# monologue
# JP: そうしてⅨ号機関車には。\nオリヴィのため――思い切り泣く、資格があるから。
2250 = "而九號機車則有為了奧莉薇盡情哭泣的資格。" 
