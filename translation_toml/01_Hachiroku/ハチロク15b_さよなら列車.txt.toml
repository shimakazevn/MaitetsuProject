[script]
# lines: 304 
# monologue
# JP: （がっ――ざしゅっ！　がっ――ざしゅっ！）
2319 = "（Xoạt! Xoạt!）"
# 【日々姫】
# display as 日日姬
# JP: 「…………」
1279 = "「…………」"
# monologue
# JP: 日々姫は、ずっと何も言わない。
2184 = "Hibiki cứ im lặng mãi."
# monologue
# JP: 必要なだけの\x%l投炭;#00ffc040;投炭%l;#;をして、あとはただ――\n一文字に口を結んで、じっと、前方を注視している。
2097 = "Chỉ thực hiện lượng \\x%l投炭;#00ffc040;xúc than%l;#; cần thiết, rồi sau đó——\nmím chặt môi thành một đường thẳng, chằm chằm nhìn về phía trước."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「まさか、まさか――」
1755 = "「Không ngờ, không ngờ lại——」"
# monologue
# JP: Ⅸ号の運転台の上でもやはり、奇跡は起きない。\nオリヴィは、回復の兆しを見せてくれない。
2145 = "Ngay cả trên buồng lái của đầu máy số 9, phép màu cũng không xảy ra.\nOlivy không hề cho thấy bất kỳ dấu hiệu hồi phục nào."
# monologue
# JP: もはや体を起こせずに、\n宗方さんの膝の上、子猫のように丸まっている。
2219 = "Không thể gượng dậy được nữa,\nem ấy cuộn tròn như một chú mèo con trên đùi ngài Munakata."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「まさか、また、ムナカタと――\nムナカタと、Ⅸ号、乗れる、なんて」
1756 = "「Không ngờ, lại được cùng Munakata——\nCùng Munakata, lên đầu máy số 9, thế này」"
# monologue
# JP: けれども、声はとても明るい。\n聞いているだけで、僕まで幸せを感じるほどに。
1998 = "Nhưng, giọng nói lại vô cùng rạng rỡ.\nChỉ nghe thôi, cũng đủ khiến tôi cảm thấy hạnh phúc lây."
# 【宗方】
# display as 宗方
# JP: 「俺も驚いた。しかも、[やつしろ,2]八ツ城行きの乗務――\n本線を、Ⅸ号で走るとはな」
1683 = "「Tôi cũng bất ngờ lắm. Hơn nữa lại còn là chuyến tàu đi [やつしろ,2]Yatsushiro——\nKhông ngờ lại được chạy đầu máy số 9 trên tuyến chính đấy」"
# monologue
# JP: だから。僕もハチロクも日々姫に倣う。\nオリヴィと宗方さんとⅨ号と――
2172 = "Vì thế. Cả tôi và Hachiroku đều bắt chước Hibiki.\nOlivy, ngài Munakata và đầu máy số 9——"
# monologue
# JP: 恐らくはオリヴィにとっての最後の乗務を、最後の旅を。\n一瞬たりとも、邪魔したいとは思わぬゆえに。
2283 = "Có lẽ đây là chuyến tàu cuối cùng, chuyến đi cuối cùng của Olivy.\nVì không muốn phá hỏng dù chỉ một khoảnh khắc nào."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「夢、みたい。夢じゃない、かな？　ね？　ムナ――\nええと、ハチロク？　ほっぺ、ギュってして？」
1784 = "「Giống như, một giấc mơ vậy. Chắc không phải, là mơ đâu, nhỉ? Muna——\nÀ, Hachiroku? Véo má chị, một cái, được không?」"
# monologue
# JP: ……宗方さんに頼めばいいのに、ハチロクだ。\n困った顔で僕を見上げるハチロクに、ただ、うなずき返す。
1246 = "……Đáng lẽ nên nhờ ngài Munakata, vậy mà lại gọi Hachiroku.\nNhìn Hachiroku ngước lên nhìn tôi với vẻ mặt bối rối, tôi chỉ biết gật đầu đáp lại."
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、オリヴィちゃん。\nまいりますよ？　ぎゅっ！」
1693 = "「Em hiểu rồi, Olivy.\nEm véo đây nhé? Véo!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、れ？　イタく、ない\nなら、これ――オリヴィの夢、なの？」
1574 = "「Ủa? Không, đau.\nNếu vậy, đây——là giấc mơ, của Olivy, sao?」"
# 【ハチロク】
# display as 八六
# JP: 「さぁ、いかがでしょう？　わたくし、\n\x%l運転体;#00ffc040;運転体%l;#;に換装してしまいましたし、力が弱く――ああ！」
1680 = "「Chà, sao nhỉ? Em,\nđã đổi sang \\x%l運転体;#00ffc040;thân chính%l;#; rồi, nên lực tay hơi yếu——A!」"
# monologue
# JP: ハチロクが、僕へと振り向き目配せをする。
2015 = "Hachiroku quay lại nhìn tôi, nháy mắt ra hiệu."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？　わたくしでは力が弱すぎるようですので」
1861 = "「Ngài Soutetsu? Có vẻ như lực của em quá yếu ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「あいにく、僕もこの細腕だ。\n宗方さん。よろしければ、お願いできますか？」
1566 = "「Tiếc là, cánh tay của anh cũng mỏng manh lắm.\nNgài Munakata. Nếu được, nhờ ngài có được không?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「はうっっ！？！」
1581 = "「Hả!?」"
# 【宗方】
# display as 宗方
# JP: 「構いませんが――」
1686 = "「Tôi thì không sao nhưng——」"
# monologue
# JP: （むぎゅっ）
2329 = "（Véo）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！！！！」
1616 = "「!!!!」"
# monologue
# JP: 無造作に。
2279 = "Một cách hờ hững."
# monologue
# JP: 野良猫の首根っこでもつまむが如くに、\n宗方さんはオリヴィの頬を摘んで伸ばす。
2128 = "Giống như xách gáy một con mèo hoang,\nngài Munakata véo má Olivy rồi kéo ra."
# 【宗方】
# display as 宗方
# JP: 「――お前、随分と熱いな」
1263 = "「——Cô, nóng quá đấy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「むなふぁふぁほ、ふゅひ、ほへはふへ、ひほひ、ひー\nひゅへへ、ふぁっふぁふぁ、ほへ、ほんほー、はんは」
1657 = "「Munafafa, fyuhi, hohefafuhe, hihohi, hi——\nhyuhehe, faffafa, hohe, honho, hanha」"
# 【宗方】
# display as 宗方
# JP: 「何？」
1532 = "「Gì cơ?」"
# monologue
# JP: 宗方さんは、あっさりと指を離してしまう。
2138 = "Ngài Munakata thản nhiên buông tay ra."
# monologue
# JP: 真っ赤になったほっぺたを大切そうにそっと撫で。\nオリヴィは、幸せいっぱいの笑顔を浮かべる。
2086 = "Nhẹ nhàng vuốt ve gò má đỏ ửng như thể rất trân trọng.\nOlivy nở một nụ cười ngập tràn hạnh phúc."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なんでもない。\n『夢じゃなかった』って、いっただけ」
1754 = "「Không có gì.\nChỉ là, 『Không phải là mơ rồi』 thôi」"
# 【宗方】
# display as 宗方
# JP: 「そりゃあ、良かった。\n俺も多少は、こりゃ夢じゃないかと思ったからな」
1846 = "「Vậy thì tốt.\nThực ra tôi cũng hơi nghĩ đây có phải là mơ hay không đấy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ、ね。まさか、オリヴィが」
1660 = "「Đúng, nhỉ. Không ngờ, Olivy lại」"
# 【日々姫】
# display as 日日姬
# JP: 「来た！　\x%lC12;#00ffc040;C12%l;#;！」
1537 = "「Đến rồi! \\x%lC12;#00ffc040;C12%l;#;!」"
# monologue
# JP: ――みかん鉄道の\x%lC12;#00ffc040;C12%l;#;。
1232 = "——Là \\x%lC12;#00ffc040;C12%l;#; của Đường sắt Mikan."
# monologue
# JP: Ⅸ号をみかん鉄道から追いやったともいえるその一両が、\n敬意を表する長い\x%l汽笛;#00ffc040;汽笛%l;#;を鳴らして早戸のホームに滑り込む。
2284 = "Chiếc đầu máy có thể nói là đã hất cẳng đầu máy số 9 khỏi Đường sắt Mikan,\nkéo một hồi \\x%l汽笛;#00ffc040;còi hơi nước%l;#; dài để bày tỏ sự kính trọng rồi từ từ tiến vào sân ga Hayato."
# 【宗方】
# display as 宗方
# JP: 「……せっかく代走に来てくれたのに、\n空気輸送もいいところだな」
1318 = "「……Cất công đến chạy thay,\nmà lại thành ra chở không khí thế này」"
# monologue
# JP: はるばる鹿兒島から牽いてきた、ほとんど無人の\x%l客車;#00ffc040;客車%l;#;には、この早戸駅でも、まばらにしか乗車がなかったようだ。
1976 = "\\x%l客車;#00ffc040;Toa hành khách%l;#; lặn lội kéo từ Kagoshima đến đây gần như trống không, ngay cả ở ga Hayato này cũng chỉ có lác đác vài hành khách lên tàu."
# monologue
# JP: それでも少しも緩むことなく、みかん鉄道の\x%lC12;#00ffc040;C12%l;#;は、\n小畑線へと進入し、御一夜へ向け、屋岳の坂に挑んでいく。
1999 = "Dù vậy, không hề chùn bước, chiếc \\x%lC12;#00ffc040;C12%l;#; của Đường sắt Mikan,\ntiến vào tuyến Obata, hướng về Ohito, thách thức con dốc Yadake."
# 【宗方】
# display as 宗方
# JP: 「まぁしかし、おかげでこいつと、\n八ツ城にまで走れるわけだ――っと」
1520 = "「Chà, nhưng nhờ vậy mà tôi,\nmới có thể chạy đến tận Yatsushiro cùng với cô đấy——」"
# monologue
# JP: 宗方さんが鉄道時計をちらと眺める。
2132 = "Ngài Munakata liếc nhìn chiếc đồng hồ đường sắt."
# 【宗方】
# display as 宗方
# JP: 「時間だ」
1554 = "「Đến giờ rồi」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
1606 = "「Ưm」"
# monologue
# JP: （ポーーーーーーーーーーッ！！！）
2322 = "（Tuuuuuuuuuuuuuuuu!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1596 = "「A」"
# monologue
# JP: 見事なものだ。
2224 = "Thật tuyệt vời."
# monologue
# JP: ガラス板の上を滑らすように――\n一切の衝動無しに、宗方さんはⅨ号の\x%l動輪;#00ffc040;動輪%l;#;を回し始める。
2049 = "Giống như đang lướt trên một tấm kính——\nKhông một chút giật cục, ngài Munakata bắt đầu làm quay \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; của đầu máy số 9."
# 【宗方】
# display as 宗方
# JP: 「……\x%l投炭;#00ffc040;投炭%l;#;、少し厚めに頼めますか」
1294 = "「……\\x%l投炭;#00ffc040;Xúc than%l;#;, nhờ cô rải dày hơn một chút nhé」"
# 【日々姫】
# display as 日日姬
# JP: 「はいっ！」
1648 = "「Vâng!」"
# monologue
# JP: （ざっ――がしゅっ！　ざっ――がしゅっ！）
# 2319 = "（唰啦！唰啦！）" 
# monologue
# JP: 日々姫が響かせるワンスコの音を聞きながら、\nオリヴィは、幸せそうに瞳を細める。
2078 = "Lắng nghe âm thanh xẻng xúc than vang lên từ tay Hibiki,\nOlivy nheo mắt lại đầy hạnh phúc."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「重いねー。お客さん、満員なんだねー」
1649 = "「Nặng quá nhỉ. Hành khách, đông kín luôn nhỉ」"
# 【宗方】
# display as 宗方
# JP: 「だな。しかし……夢にも思っていなかったな。\nお前の、引退セレモニーとは」
1734 = "「Ừ. Nhưng mà……Tôi nằm mơ cũng không nghĩ tới.\nLễ giải nghệ của cô, lại như thế này」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ、ね――信じられない、よね」
1732 = "「Đúng, nhỉ——Thật không thể, tin được, nhỉ」"
# 【宗方】
# display as 宗方
# JP: 「それだけじゃなく、御一夜からも早戸からも、\nこれだけの人達が八ツ城にむかってくれるとはなぁ」
1512 = "「Không chỉ vậy, từ Ohito hay từ Hayato,\nlại có ngần này người hướng về Yatsushiro cơ đấy」"
# monologue
# JP: ……指摘する愚は犯さぬが、宗方さんは失念している。\n雪で、そのうえ噴火直後というリスクを取って。
1253 = "……Tôi sẽ không phạm sai lầm ngớ ngẩn mà chỉ ra điều đó, nhưng ngài Munakata đã quên mất rồi.\nRằng họ đã chấp nhận rủi ro vì tuyết, và hơn nữa là ngay sau khi núi lửa phun trào."
# monologue
# JP: なおもこれほどの乗客たちが、\nオリヴィの引退を見届けたいと、来てくれたのだ。
2277 = "Dù vậy, vẫn có ngần ấy hành khách,\nđến đây để chứng kiến khoảnh khắc giải nghệ của Olivy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「夢じゃないって、もうわかった、けど、\nえへへ――やっぱり、夢、みたい」
1639 = "「Dù biết là, không phải mơ, nhưng,\nehehe——quả nhiên, vẫn giống như, một giấc mơ vậy」"
# 【宗方】
# display as 宗方
# JP: 「第一\x%l閉塞;#00ffc040;閉塞%l;#;！　進行！」
1778 = "「\\x%l閉塞;#00ffc040;Đóng đường%l;#; thứ nhất! Tiến lên!」"
# monologue
# JP: 世間話のような会話の最中にも、まったく怠り無い\x%l喚呼;#00ffc040;喚呼%l;#;。\nオリヴィの頬が、少し膨れる。
2193 = "Dù đang trò chuyện như những câu chuyện phiếm thường ngày, nhưng \\x%l喚呼;#00ffc040;hô xác nhận%l;#; không hề chểnh mảng.\nHai má Olivy hơi phồng lên."
# monologue
# JP: 体を起こせず、目視を出来ず、\n故に\x%l喚呼;#00ffc040;喚呼%l;#;をあわせられない、その歯がゆさのためだろう。
2280 = "Không thể ngồi dậy, không thể quan sát bằng mắt,\nvà do đó không thể cùng \\x%l喚呼;#00ffc040;hô xác nhận%l;#;, chắc hẳn em ấy đang cảm thấy rất bứt rứt."
# monologue
# JP: （そうか。\nオリヴィの\x%l喚呼;#00ffc040;喚呼%l;#;も、もう聞けんのか）
2338 = "（Ra vậy.\n\\x%l喚呼;#00ffc040;Hô xác nhận%l;#; của Olivy, cũng không còn được nghe nữa sao）"
# monologue
# JP: 寂しく思い、その寂しさに苦笑する。
1967 = "Cảm thấy cô đơn, tôi cười khổ với chính sự cô đơn đó."
# monologue
# JP: 別れが不可避であろうことを、頭で理解したつもりでも、\n体は、こころは、受け入れきれずにいるらしい。
2147 = "Dù lý trí đã hiểu rằng sự chia ly là điều không thể tránh khỏi,\nnhưng cơ thể, trái tim này dường như vẫn chưa thể chấp nhận được."
# 【宗方】
# display as 宗方
# JP: 「……御鉄さんの雛衣社長に聞いたんだが、\nテレビで流れたそうだ」
1299 = "「……Nghe Giám đốc Hinai của Đường sắt Ohito nói,\nchuyện đó đã được phát trên tivi rồi đấy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ナガれた、って、なに、が？」
1508 = "「Phát, trên tivi, là, chuyện gì, cơ?」"
# 【宗方】
# display as 宗方
# JP: 「なにって、お前のニュースがだ」
1841 = "「Chuyện gì á, là tin tức về cô đấy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええっ！？」
1584 = "「Hảảả!?」"
# 【宗方】
# display as 宗方
# JP: 「……考えてみりゃ、何人もの被害を防いで、\n鉄路も守ったんだからなぁ」
1307 = "「……Nghĩ lại thì, cô đã ngăn chặn được thiệt hại cho biết bao nhiêu người,\nlại còn bảo vệ được cả tuyến đường sắt nữa mà」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふえっ！？」
# 1584 = "「哎！？」" 
# 【宗方】
# display as 宗方
# JP: 「お前は、それだけのことをしたってことだ。\n夢なんかじゃなく、な」
1837 = "「Có nghĩa là, cô đã làm được một việc vĩ đại đến mức đó đấy.\nĐây không phải là mơ đâu」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「――っ」
1264 = "「——」"
# 【宗方】
# display as 宗方
# JP: 「頑張ってくれたな。感謝している」
1530 = "「Cô đã cố gắng hết sức rồi. Cảm ơn cô」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！！！」
1568 = "「!!!」"
# monologue
# JP: 膝の上の子猫を撫でる、そのままの手つきで。\nほんの一瞬、ごく軽く、宗方さんがオリヴィを撫でる。
2125 = "Vẫn với động tác vuốt ve chú mèo con trên đùi.\nChỉ trong một khoảnh khắc, ngài Munakata vuốt ve Olivy thật nhẹ nhàng."
# monologue
# JP: オリヴィは、真っ赤になって黙り込む。\nびくとも、体を動かさなくなる。
2079 = "Olivy đỏ bừng mặt và im bặt.\nKhông hề nhúc nhích cơ thể dù chỉ một chút."
# monologue
# JP: （ああ――）
2321 = "（A——）"
# monologue
# JP: 報われたなと、だから、感じる。\nハチロクも、日々姫も、みなが、きっと同じ気持ちだ。
2220 = "Tôi cảm thấy, những nỗ lực đó đã được đền đáp.\nCả Hachiroku, Hibiki và mọi người, chắc chắn cũng có chung một cảm xúc."
# monologue
# JP: （本当に、それだけのことを――\nオリヴィ、君はしてくれたんだ）
2328 = "（Thật sự, em đã làm được một điều vĩ đại đến thế đấy——\nOlivy à）"
# monologue
# JP: 100年を経た、もうボロボロの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、\nたくさんの人命と、鉄路を救った。
2152 = "Một \\x%lレイルロオド;#00ffc040;Railord%l;#; đã trải qua 100 năm, cơ thể đã tàn tạ,\nlại cứu được rất nhiều sinh mạng và cả tuyến đường sắt."
# monologue
# JP: 第一報を送り出したのこそは確かに、\n稀咲と元忠さんの力が働く報道各社だ。が――
2257 = "Chắc chắn, việc phát đi bản tin đầu tiên,\nlà nhờ vào sức ảnh hưởng của Kisaki và ngài Mototada tới các đài truyền hình. Nhưng——"
# 【宗方】
# display as 宗方
# JP: 「……なんだ、こりゃ」
1316 = "「……Cái gì, thế này」"
# monologue
# JP: 1340。延17分。早戸駅での遅延を9分回復し――\n臨時列車「さよならオリヴィ号」は、鹿兒島駅に入線する。
2340 = "13:40. Trễ 17 phút. Đã gỡ lại được 9 phút chậm trễ tại ga Hayato——\nChuyến tàu lâm thời \"Tạm biệt Olivy\" tiến vào ga Kagoshima."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「どした、の？　ムナカタ」
1656 = "「Sao, vậy? Munakata」"
# 【宗方】
# display as 宗方
# JP: 「ホームに人が溢れてるぞ」
1776 = "「Sân ga tràn ngập người kìa」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええっ？　みたい、みたい」
1589 = "「Hảảả? Chị muốn xem, muốn xem」"
# 【宗方】
# display as 宗方
# JP: 「ほれ」
1536 = "「Đây」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ひゃうっ！！」
1567 = "「Hya!!」"
# monologue
# JP: 人、人、人。\n大廃線前はかくやとも思わせられる人の数。
1986 = "Người, người và người.\nSố lượng người đông đến mức khiến tôi cứ ngỡ như đang ở thời kỳ trước khi Đại bãi bỏ các tuyến."
# monologue
# JP: 宗方さんに、両脇の下でもちあげられて、\n幸せそうに、照れくさそうにオリヴィは――
2085 = "Được ngài Munakata nhấc bổng lên bằng hai tay xốc nách,\nOlivy với vẻ mặt vừa hạnh phúc vừa ngại ngùng——"
# monologue
# JP: (ごんごんっ！)
31 = "(Cộc cộc!)"
# 【宗方】
# display as 宗方
# JP: 「どうした？」
1676 = "「Chuyện gì vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「御一夜鉄道、\x%l車掌;#00ffc040;車掌%l;#;の早瀬です。あの――増結、\n[けいきゃくしゃ,2]軽客車を二両増結できるかって、駅長さんから」
1689 = "「Tôi là Hayase, \\x%l車掌;#00ffc040;trưởng tàu%l;#; của Đường sắt Ohito. Dạ——Trưởng ga hỏi là,\ncó thể ghép thêm hai [けいきゃくしゃ,2]toa hành khách nhẹ nữa không ạ」"
# 【宗方】
# display as 宗方
# JP: 「増結？」
1558 = "「Ghép thêm?」"
# 【ふかみ】
# display as 深美
# JP: 「です、あの、テレビ。鹿兒島でも流れてるみたいで。\nそれで、セレモニー。八ツ城、行きたいひとが多くって」
1737 = "「Vâng, là vì, bản tin trên tivi. Hình như ở Kagoshima cũng đang phát.\nVì thế, lễ giải nghệ. Rất nhiều người muốn đến Yatsushiro ạ」"
# monologue
# JP: ――鹿兒島にまで、隈銀の影響力は及ばない。\nオリヴィの成し遂げたことの大きさを。
1236 = "——Tầm ảnh hưởng của Ngân hàng Kumamoto không vươn tới tận Kagoshima.\nSự vĩ đại của những gì Olivy đã làm được."
# monologue
# JP: オリヴィがどれほど愛されているかを、\nいまさらながらに、しみじみ思う。
1965 = "Giờ đây, tôi mới thấm thía,\nOlivy được yêu mến đến nhường nào."
# 【宗方】
# display as 宗方
# JP: 「……引けんことはないと、駅長にそう伝えてくれ」
1320 = "「……Hãy nói với trưởng ga là có thể kéo được」"
# 【ふかみ】
# display as 深美
# JP: 「わかりました！」
# 1648 = "「好的！」" 
# 【真闇】
# display as 真闇
# JP: 「と、よかったら」
1585 = "「À, nếu được thì」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「マクラ！」
1770 = "「Makura!」"
# 【真闇】
# display as 真闇
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;さんたちにお差し入れ」
1577 = "「Chị mang đồ tiếp tế cho các \\x%l機関士;#00ffc040;người lái tàu%l;#; đây」"
# monologue
# JP: 乗客として乗車していた真闇姉の穏やかな声に、\nオリヴィの顔がぱっと輝く。
2082 = "Nghe giọng nói dịu dàng của chị Mayami, người lên tàu với tư cách là hành khách,\nkhuôn mặt Olivy bừng sáng."
# monologue
# JP: もぞもぞ、体を動かそうとする。
2103 = "Em ấy loay hoay, cố gắng cử động cơ thể."
# 【真闇】
# display as 真闇
# JP: 「はい、これ。オリヴィちゃんの大好物」
1786 = "「Đây, cho em. Món khoái khẩu của Olivy đó」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「おみず、おいしいの――\nクマがわの、おみず――うれしい」
1752 = "「Nước, ngon quá——\nNước của, sông Kuma——vui quá」"
# monologue
# JP: クーラーボックスの中には、ぎっしりと、\n安全のためのペットボトルで、右田一の水が入っている。
2228 = "Bên trong thùng giữ nhiệt, chứa đầy ắp\nnhững chai nhựa nước của Migita System để đảm bảo an toàn."
# 【宗方】
# display as 宗方
# JP: 「慌てるな」
1550 = "「Đừng vội」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふあっ」
1614 = "「Phu」"
# monologue
# JP: オリヴィの分も宗方さんがうけとって、\n優しく、オリヴィに飲ませてやる。
2130 = "Ngài Munakata nhận lấy phần của Olivy,\nvà dịu dàng cho em ấy uống."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「んく――こくっ――んっ――ごくっ。――ぷあっ。\nあのね？　ムナカタ、これ――すごくおいしいから」
1604 = "「Nku——ực——ưm——ực. ——Pua.\nNày nhé? Munakata, cái này——ngon lắm đó」"
# 【宗方】
# display as 宗方
# JP: 「もちろんもらう――（ごくっ、ごくっ）」
1696 = "「Tất nhiên là tôi cũng uống rồi——(Ực, ực)」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふぁ……うふふっ――えへへ～。\nね？　おいしー、でしょ？」
1571 = "「Phu……ufufu——ehehe~.\nThấy chưa? Ngon, đúng không?」"
# 【宗方】
# display as 宗方
# JP: 「うん。うまい」
1605 = "「Ừ. Ngon lắm」"
# monologue
# JP: なんと優しく、幸せあふれる光景だろう。\n見ている僕らのこころまで、澄み切った水が沁み通る。
2278 = "Thật là một khung cảnh dịu dàng, ngập tràn hạnh phúc làm sao.\nĐến cả tâm hồn của những người đứng xem như chúng tôi, cũng được dòng nước trong vắt ấy thấm đẫm."
# 【真闇】
# display as 真闇
# JP: 「お邪魔をしたらいけんけん――\nオリヴィちゃんも、みなさんも、よか旅を」
1564 = "「Chị không được làm phiền mọi người nữa——\nOlivy và mọi người, chúc một chuyến đi tốt lành nhé」"
# monologue
# JP: それだけいって、軽く手を振り、\n真闇姉は、ごくあっさりと去っていく。
2227 = "Chỉ nói vậy, khẽ vẫy tay,\nchị Mayami quay đi một cách dứt khoát."
# monologue
# JP: （ああ――）
# 2321 = "（啊——）" 
# monologue
# JP: だから、感じる。\n気持ちを、願いを。
2197 = "Vì thế, tôi cảm nhận được.\nTâm ý, và ước nguyện của mọi người."
# monologue
# JP: （ふかみも、凪も――ニイロクも赤井\x%l機関士;#00ffc040;機関士%l;#;も、\nポーレットもれいなも――みんな、同じだ）
2333 = "（Cả Fukami, Nagi——Niiroku và \\x%l機関士;#00ffc040;người lái tàu%l;#; Akai,\ncả Paulette và Reina nữa——tất cả mọi người, đều có chung một tâm trạng）"
# monologue
# JP: 僕らが出るとき、誰もが何かを言いたげだった。\nオリヴィへ、きっと伝えたい言葉があった。
2051 = "Khi chúng tôi rời đi, ai cũng có vẻ như muốn nói điều gì đó.\nChắc chắn có những lời muốn gửi gắm đến Olivy."
# 【ポーレット】
# display as 波萊特
# JP: 「調整、全部つけました。けど、現地で何か出てきたら、\nそれは……双鉄くんが判断してくれて大丈夫です」
1807 = "「Em đã sắp xếp xong hết rồi. Nhưng nếu đến nơi có phát sinh chuyện gì,\nthì……anh Soutetsu cứ tự mình quyết định là được nhé」"
# 【れいな】
# display as 玲奈
# JP: 「いってらっしゃぁい。\nごあんぜんに、良い乗務をですぅ」
1504 = "「Đi cẩn thận nha~.\nChúc mọi người thượng lộ bình an, có một chuyến đi tốt đẹp ạ」"
# monologue
# JP: けれど、その言葉は飲み込まれた。\nオリヴィと宗方さんとを、少しでも長く旅させるため。
2039 = "Nhưng, những lời đó đã bị nuốt ngược vào trong.\nĐể Olivy và ngài Munakata có thể tận hưởng chuyến đi này lâu hơn một chút."
# 【赤井】
# display as 赤井
# JP: 「痛っ……あ痛たたた」
1768 = "「Đau quá……A đau đau đau」"
# 【ニイロク】
# display as 二六
# JP: 「清春、お腹いたい。\nニイロク、清春を見捨てられない」
1763 = "「Kiyoharu, đau bụng. \nNiiroku, không thể bỏ mặc Kiyoharu được」"
# 【凪】
# display as 凪
# JP: 「なら、凪さまがついててやるばい！」
1851 = "「Nếu vậy, cô Nagi này sẽ đi cùng!」"
# monologue
# JP: 僕ら家族で、乗務をさせてくれるため――
2060 = "Để gia đình chúng tôi, được thực hiện chuyến tàu này——"
# monologue
# JP: 不器用極まる芝居をしてまで、早戸から先、\n\x%l補機;#00ffc040;補機%l;#;である8620を引き受けて、僕らにⅨ号を託してくれた。
1990 = "Dù phải diễn một vở kịch vô cùng vụng về, từ Hayato trở đi,\nhọ đã đảm nhận vai trò \\x%l補機;#00ffc040;đầu máy phụ%l;#; 8620, và giao phó đầu máy số 9 cho chúng tôi."
# monologue
# JP: （ポーーーーーーーーーーーーーーーーーっ！）
2323 = "（Tuuuuuuuuuuuuuuuuuuuu!）"
# monologue
# JP: 長い、長い\x%l汽笛;#00ffc040;汽笛%l;#;とともに、\n再びⅨ号は走り始める。
1996 = "Cùng với hồi \\x%l汽笛;#00ffc040;còi hơi nước%l;#; dài, thật dài,\nđầu máy số 9 lại một lần nữa bắt đầu lăn bánh."
# monologue
# JP: オリヴィに――どうぞ、少しでも素敵な旅を。\n僕らみんなの、たったひとつの願いを乗せて。
2166 = "Gửi tới Olivy——Mong em, có một chuyến đi thật tuyệt vời.\nMang theo ước nguyện duy nhất của tất cả chúng ta."
# monologue
# JP: （シュッ、シュッ、シュッ、シュッ――）
2318 = "（Xình, xịch, xình, xịch——）"
# monologue
# JP: 千内でまた一両増結。\nなんと、縞原鉄道さんが客車貸与をしてくれた。
2165 = "Tại Sendai lại ghép thêm một toa nữa.\nKhông ngờ, Đường sắt Shimabara lại cho chúng tôi mượn toa hành khách."
# monologue
# JP: どころか――宗方さんは、Ⅸ号で牽けると断ったが――\n\x%lディーゼル機関車;#00ffc040;ディーゼル機関車%l;#;を\x%l補機;#00ffc040;補機%l;#;につけようかとまで提案してきた。
2247 = "Không những thế——Dù ngài Munakata đã từ chối và nói rằng đầu máy số 9 kéo là đủ rồi——\nhọ thậm chí còn đề nghị dùng \\x%lディーゼル機関車;#00ffc040;đầu máy diesel%l;#; làm \\x%l補機;#00ffc040;đầu máy phụ%l;#; nữa."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……すっごい、ねー、シマテツさん、まで、\nオリヴィ、たちに、ここまで、してくれる、なんて」
1291 = "「……Tuyệt, thật đấy, đến cả, Đường sắt Shimatetsu,\ncũng vì, Olivy và mọi người, mà làm đến mức này, cơ đấy」"
# 【宗方】
# display as 宗方
# JP: 「鉄道にとって、\n何十年振りかの、誇らしいニュースだからかもしれんな」
1766 = "「Đối với ngành đường sắt,\ncó lẽ vì đây là một tin tức đáng tự hào sau mấy chục năm đấy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんな……そんなの、オオゲサ、だよぉ」
1832 = "「Làm gì……làm gì, có chuyện đó, anh nói quá, rồi」"
# monologue
# JP: 軽く笑って――\n沈黙。沈黙。
2088 = "Khẽ cười——\nSự im lặng. Im lặng."
# monologue
# JP: 宗方さんは、決してそれを自分から破りにいってくれない。
2136 = "Ngài Munakata, tuyệt đối sẽ không chủ động phá vỡ sự im lặng đó."
# 【宗方】
# display as 宗方
# JP: 「…………」
# 1279 = "「……」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
# 1279 = "「……」" 
# monologue
# JP: 千内を過ぎ、オリヴィにとって一番馴染みの路線に入り。\n安心したのか、オリヴィの口数は一気に減った。
2286 = "Qua khỏi Sendai, tiến vào tuyến đường quen thuộc nhất với Olivy.\nCó lẽ vì đã yên tâm, nên Olivy ít nói hẳn đi."
# 【宗方】
# display as 宗方
# JP: 「\x%l制限;#00ffc040;制限%l;#;40！　よしっ！」
1260 = "「\\x%l制限;#00ffc040;Giới hạn tốc độ%l;#; 40! Rõ!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふふっ」
1572 = "「Fufu」"
# monologue
# JP: が、それで全く構わんのだろう。
2003 = "Nhưng, như vậy cũng chẳng sao."
# monologue
# JP: さっきからずっと瞳を閉じたそのままに、\nオリヴィは、幸せそうに笑うのだから。
2089 = "Bởi vì từ nãy đến giờ, vẫn nhắm nghiền đôi mắt,\nOlivy đang mỉm cười đầy hạnh phúc."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……ね？　ヒビキ」
1310 = "「……Này? Hibiki」"
# 【日々姫】
# display as 日日姬
# JP: 「ん？　どぎゃんしたと？」
1610 = "「Hửm? Có chuyện gì vậy?」"
# monologue
# JP: 不意の呼びかけ。\n\x%l投炭;#00ffc040;投炭%l;#;の手を止めることなく、日々姫が、普段通りに答える。
2083 = "Một tiếng gọi bất ngờ.\nKhông dừng tay \\x%l投炭;#00ffc040;xúc than%l;#;, Hibiki trả lời như thường lệ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「サイショ、イッショにねたとき、ね？\nヒビキ、背中、とんとんって、してくれてたでしょ？」
1576 = "「Lần đầu, tiên, chúng ta ngủ cùng nhau, ấy?\nHibiki, đã vỗ nhẹ, vào lưng, chị đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「私が？　そぎゃんことしたと？」
1695 = "「Em á? Em có làm chuyện đó sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「すごーいヒビキ！　卵わるの上手ー！」
1718 = "「Hibiki giỏi quá! Đập trứng siêu thật!」"
# 【日々姫】
# display as 日日姬
# JP: 「えー、このくらい普通だよー」
1740 = "「Ehe, cỡ này thì bình thường thôi mà」"
# monologue
# JP: とぼけているのか、本当に覚えていないのか。\n日々姫のにこやかな表情からは、僕さえ何もわからない。
2149 = "Là giả vờ ngốc nghếch, hay là thật sự không nhớ.\nTừ nụ cười rạng rỡ của Hibiki, ngay cả tôi cũng chẳng thể hiểu được gì."
# monologue
# JP: 日々姫はそれほど完璧に――\n笑顔の仮面を、かぶり続ける。
2190 = "Hibiki vẫn hoàn hảo đến mức đó——\nTiếp tục đeo chiếc mặt nạ tươi cười."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「したの。ソギャンコト。\nそれね？　オリヴィ、とーってもうれしかったんだぁ」
1789 = "「Có mà. Chuyện đó đó.\nLúc đó nhé? Olivy, đã vô cùng, vui sướng đó」"
# 【日々姫】
# display as 日日姬
# JP: 「そっか」
1735 = "「Vậy sao」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがとね、ヒビキ」
1723 = "「Cảm ơn cậu nha, Hibiki」"
# 【日々姫】
# display as 日日姬
# JP: 「水臭かとねー。\nそんなん、いつだっていくらでもしてあげるけん！」
1834 = "「Cậu khách sáo quá đó.\nChuyện đó, lúc nào tớ cũng sẵn lòng giúp cậu mà!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがと。\nあとね？　マクラも、つたえておいて？」
1808 = "「Cảm ơn cậu.\nÀ mà? Nhờ cậu, chuyển lời đến Makura, giúp chị nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「伝える、って――」
1820 = "「Chuyển lời, là sao——」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ごはん、イッショね？　たのしかったの。\nオリヴィ、そんなの、はじめて、だったし」
1502 = "「Bữa ăn, cùng nhau, ấy? Vui lắm.\nVới Olivy, chuyện đó, là lần đầu tiên, mà」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ね？　オリヴィどこすわったらいい？」
1844 = "「Này? Olivy ngồi đâu thì được?」"
# 【ハチロク】
# display as 八六
# JP: 「そうですね……\n双鉄さまのお隣がわたくしですので――」
1833 = "「Để xem nào……\nBên cạnh ngài Soutetsu là em rồi nên——」"
# 【日々姫】
# display as 日日姬
# JP: 「そっちに三人並びは狭かとでしょー！\nわたしの隣に座ればよかとよ」
1506 = "「Ba người ngồi bên đó thì chật lắm!\nNgồi cạnh chị là được rồi」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、そーする！」
1848 = "「Vậy, quyết định thế nha!」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
# 1596 = "「啊」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「石炭、おんなじ石炭でも、ね？\nみんなでたべると、おいしくて」
1857 = "「Than đá, dù cùng là than đá, nhưng mà?\nKhi ăn cùng mọi người, lại thấy ngon hơn hẳn」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなん！　そんなん、照れくさかけん！\nオリヴィ、自分で伝えんといけんよ！！」
1838 = "「Chuyện đó! Chuyện đó, xấu hổ lắm!\nOlivy, phải tự mình nói mới được!!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「自分でかー。\nそっかー。そだよねー」
1795 = "「Tự mình nói sao.\nRa vậy. Đúng là thế nhỉ」"
# monologue
# JP: ザクザクと、ワンスコの音が大きくなる。\n照れを、ではなく。きっと涙を隠すそのため。
2019 = "Xoạt xoạt, tiếng xẻng xúc than to dần lên.\nKhông phải để che giấu sự xấu hổ. Chắc chắn là để giấu đi những giọt nước mắt."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それでね？　ソーテツも、ありがとー」
1840 = "「Với lại nhé? Soutetsu, cũng, cảm ơn anh——」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「まさかオリヴィ、\nソーテツにお姫様だっこしてもらうとか思わなかったー」
1638 = "「Olivy không ngờ,\nlại được Soutetsu bế kiểu công chúa đâu đấy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「お姫様だっこ、らくちんだねー、きもちいいねー。\nおんなのこがみんな憧れる理由、わかった気がするー」
1640 = "「Bế kiểu công chúa, nhàn thật đấy, thích thật đấy.\nHình như chị đã hiểu, lý do vì sao mọi cô gái đều mơ ước được như vậy rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1600 = "「!」"
# monologue
# JP: 何故僕なのだ。宗方さんと話してほしい。\nだからといって、無視もありえん。
2211 = "Tại sao lại là tôi. Tôi muốn em ấy nói chuyện với ngài Munakata.\nNhưng nói vậy thôi, tôi cũng không thể phớt lờ được."
# monologue
# JP: 声を、震わせないように。\nただそれだけを、意識し、答える。
2167 = "Cố gắng, để giọng nói không bị run rẩy.\nChỉ ý thức điều đó, rồi tôi đáp lời."
# 【双鉄】
# display as 雙鐵
# JP: 「僕など、なにもしていないだろう」
1685 = "「Anh, đã làm được gì đâu chứ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「したよー、たくさん。\n保線講習、ムナカタ、よんでくれたのも、そーだし」
1542 = "「Anh đã làm rồi, rất nhiều điều.\nBuổi học bảo trì đường ray, gọi Munakata đến, cũng là anh làm mà」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、オリヴィの知ってるダイジなことは、\nぜーんぶムナカタが教えてくれたんだよ！！」
1698 = "「Vì thế, những điều quan trọng mà Olivy biết,\ntất cả đều là do Munakata dạy cho đó!!」"
# 【宗方】
# display as 宗方
# JP: 「……買い被りすぎだ」
1315 = "「……Em đánh giá anh quá cao rồi」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへー」
1611 = "「Ehehe」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1596 = "「啊」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オーミヤにもつれてってくれたし！\nうふふっ、ドクターフェニックス！　おかしかったぁ！」
1839 = "「Anh còn đưa chị đến Omiya nữa!\nUfufu, Tiến sĩ Fushicho! Thật là kỳ lạ!」"
# monologue
# JP: ポーズを、きっと真似たいのだろう。\nオリヴィの手が、手先がわずかに、動きをみせる。
2100 = "Chắc hẳn là em ấy đang muốn bắt chước lại tư thế đó.\nBàn tay, những ngón tay của Olivy khẽ cử động."
# 【双鉄】
# display as 雙鐵
# JP: 「……だなぁ」
1305 = "「……Đúng vậy nhỉ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーゆーのなかったら、オリヴィ、とっくに止まってて。\n今日だって、ゼッタイ、走れてなかった、から」
1801 = "「Nếu không có những chuyện đó, Olivy, đã dừng hoạt động từ lâu rồi.\nCả ngày hôm nay, chắc chắn, cũng không thể chạy được, đâu」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
1593 = "「A——」"
# monologue
# JP: 光が、ゆるやかに満ちていく。
2298 = "Ánh sáng, từ từ tràn ngập."
# monologue
# JP: 差し込む西日がオレンジに、\nオリヴィの顔を、体を染めていく。
2276 = "Ánh nắng chiều tà nhuộm màu cam,\nlên khuôn mặt, lên cơ thể Olivy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、アリガト。\nソーテツ、たくさん、たすけてくれた」
1699 = "「Vì thế, cảm ơn anh.\nSoutetsu, đã giúp đỡ, chị rất nhiều」"
# 【双鉄】
# display as 雙鐵
# JP: 「……早く、桜が咲かんものかな」
1289 = "「……Ước gì, hoa anh đào nở sớm nhỉ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あはっ！」
1599 = "「Aha!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だね！　桜が咲いたら、春になったら！\nきっと全部が！　今よりもっとステキになるよ！」
1730 = "「Đúng thế! Nếu hoa anh đào nở, nếu mùa xuân đến!\nChắc chắn mọi thứ! Sẽ còn tuyệt vời hơn bây giờ nhiều!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「『わーれらのてーつどお！』」
1275 = "「『Đường sắt, của chúng ta!』」"
# 【双鉄】
# display as 雙鐵
# JP: 「……お互いさまだ」
1304 = "「……Chúng ta giúp đỡ lẫn nhau mà」"
# monologue
# JP: 実際、僕とハチロクが、そうして御一夜鉄道が、\nどれほどオリヴィに助けられたか――
2143 = "Thực tế thì, tôi và Hachiroku, cũng như Đường sắt Ohito,\nđã được Olivy giúp đỡ biết bao nhiêu——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あはは、そっかー、オタガイサマ、かぁ」
1598 = "「Ahaha, ra vậy, giúp đỡ lẫn nhau, nhỉ」"
# monologue
# JP: 閉じられたままの瞳が笑う。\n満ち足りたように笑ってくれる。
2090 = "Đôi mắt vẫn nhắm nghiền, nhưng đang mỉm cười.\nMột nụ cười mãn nguyện."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オタガイサマなら、オリヴィ、よかったー」
1792 = "「Nếu là giúp đỡ lẫn nhau, Olivy, vui lắm——」"
# monologue
# JP: ……潮の香りを、ふっと感じる。\n海だ。オリヴィが、あれほど自慢していた海。
1250 = "……Chợt, tôi ngửi thấy mùi hương của biển.\nLà biển. Vùng biển mà Olivy đã từng vô cùng tự hào."
# monologue
# JP: けれどももう、オリヴィはそれさえも感じないのか、\nまったく反応を示さずにいる。
2036 = "Nhưng có lẽ, Olivy ngay cả điều đó cũng không cảm nhận được nữa,\nem ấy hoàn toàn không có phản ứng gì."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それでね？　ハチロク」
1765 = "「Với lại nhé? Hachiroku」"
# 【ハチロク】
# display as 八六
# JP: 「はい。なんでしょう、オリヴィちゃん」
1618 = "「Vâng. Chuyện gì vậy, Olivy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィのこと、たくさん、たくさん。\nたくさんたくさん、大事に、してくれて、ありがとー」
1810 = "「Cảm ơn em, vì đã, rất, rất.\nRất rất, trân trọng, Olivy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「乗らないことが――教導？」
1514 = "「Không lên tàu——cũng là chỉ đạo sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっかー。それもアイディアだねー」
1659 = "「Ra vậy. Đó cũng là một ý hay nhỉ」"
# 【ハチロク】
# display as 八六
# JP: 「この案でしたら、\nわたくしも外れた方がよろしいでしょう」
1651 = "「Nếu theo phương án này,\ncó lẽ em cũng nên rút lui thì hơn」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんとご一緒に、レールショップで。\n定刻どおりのⅨ号機関車入線を待たせていただきます」
1850 = "「Em sẽ cùng với Olivy, ở lại cửa hàng đường sắt.\nChờ đợi đầu máy số 9 tiến vào sân ga đúng như lịch trình ạ」"
# 【ハチロク】
# display as 八六
# JP: 「いえ……それは――\nわたくしが、そうしたかったというだけで」
1510 = "「Không……chuyện đó——\nChỉ là, bản thân em muốn làm như vậy thôi」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら、ね？　そーしたいって、\nおもって、くれて――ありがとー」
1703 = "「Nếu vậy, nhé? Cảm ơn em, vì đã,\nmuốn, làm như vậy——cho chị」"
# 【ハチロク】
# display as 八六
# JP: 「あっ」
# 1596 = "「啊」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「たくさんたくさん、いっしょにいてくれて、ありがとー。\nなんでもはなして、なんでもきいてくれて、ありがとー」
1809 = "「Cảm ơn em, vì đã luôn, luôn, ở bên chị.\nCảm ơn em, vì đã kể cho chị nghe mọi chuyện, và luôn lắng nghe chị」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィ、ちゃん――」
1635 = "「Olivy——」"
# monologue
# JP: ハチロクの唇がわなわな震える。\nだけれど、言葉は出てこない。
2017 = "Đôi môi Hachiroku run rẩy.\nNhưng, không thể thốt nên lời."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「さいしょは、すごく、イヤだった、けど――\nだいじに、されて、して、もらって、うれしかった、の」
1858 = "「Lúc đầu, chị thấy, vô cùng, khó chịu, nhưng——\nĐược em, trân trọng, như vậy, chị đã, rất vui」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「知ってる！　そんなの！！\nムナカタにだっていわれたもんっ！」
1515 = "「Chị biết chứ! Chuyện đó!!\nMunakata cũng đã nói rồi mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば何故、その残り少ないかもしれぬ時間を。\n泣いて喚いて、無駄に使うのだ」
1708 = "「Nếu vậy thì tại sao, lại dùng khoảng thời gian có lẽ là ít ỏi còn lại đó.\nĐể khóc lóc, gào thét, lãng phí nó đi chứ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！！？」
1524 = "「!!?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまっ！？　そのようなおっしゃり方」
1860 = "「Ngài Soutetsu!? Sao ngài lại nói như vậy ạ」"
# 【ハチロク】
# display as 八六
# JP: 「でし、たら――」
1842 = "「Nếu, vậy——」"
# monologue
# JP: 涙声。\nハチロクはぐっとそれを飲み込む。
2016 = "Giọng nói nghẹn ngào nước mắt.\nHachiroku cố nuốt nó vào trong."
# 【ハチロク】
# display as 八六
# JP: 「なにが、不思議ではないのですか？」
1546 = "「Không có gì, đáng ngạc nhiên, sao ạ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「みんなのことを思い出したら、がんばれること！\nそれって、だって。きっと、みんなもオリヴィのこと」
1518 = "「Chỉ cần nhớ đến mọi người, là có thể cố gắng!\nVì điều đó, nên. Chắc chắn, mọi người cũng, đối với Olivy」"
# 【ハチロク】
# display as 八六
# JP: 「はい、忘れません。少なくともわたくしは、\nなにがあっても、決してオリヴィちゃんのことを」
1608 = "「Vâng, em sẽ không quên đâu. Ít nhất là em,\ndù có chuyện gì xảy ra, cũng tuyệt đối không bao giờ quên Olivy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへー。うれしいな、ありがとう」
1613 = "「Ehehe. Vui quá, cảm ơn em」"
# 【ハチロク】
# display as 八六
# JP: 「――でしたら、でしたら！\nこれからだって、いくらでもっ」
1268 = "「——Nếu vậy, nếu vậy!\nTừ nay về sau, dù là bao nhiêu đi chăng nữa」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だからね？　ハチロク、ソーテツ、ヒビキ。\nオリヴィ――おかえし――おかえしに、ね？」
1702 = "「Nên là nhé? Hachiroku, Soutetsu, Hibiki.\nOlivy——sẽ trả ơn——để trả ơn, nhé?」"
# monologue
# JP: ぶるぶる、震え。\n震えて、震えて――オリヴィの手が、持ち上がる。
2091 = "Run rẩy, run rẩy.\nRun rẩy, run rẩy——Bàn tay của Olivy, nhấc lên."
# monologue
# JP: 瞳を閉じたそのままに――\n指はまっすぐ、\x%l運転台;#00ffc040;運転台%l;#;の横窓の向こうを指し示す。
2092 = "Đôi mắt vẫn nhắm nghiền——\nNgón tay chỉ thẳng ra ngoài cửa sổ bên hông \\x%l運転台;#00ffc040;buồng lái%l;#;."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「プレ、ゼント――あげる――車窓――\nオリヴィの、いちばん、ダイスキな」
1641 = "「Món, quà——tặng mọi người——Khung cảnh ngoài cửa sổ——\nNơi mà, Olivy, thích nhất」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1593 = "「啊——」" 
# 【日々姫】
# display as 日日姬
# JP: 「っ！！！」
1601 = "「!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
1615 = "「Ồ——」"
# monologue
# JP: 海が、黄金に染め抜かれている。\n景色の全てが、影絵となって海原の黄金を引き立てる。
2058 = "Biển cả, được nhuộm một màu vàng rực rỡ.\nToàn bộ cảnh vật, trở thành những bức tranh bóng, làm nổi bật lên sắc vàng của đại dương."
# 【双鉄】
# display as 雙鐵
# JP: 「なんと――見事な」
1835 = "「Thật là——tuyệt đẹp」"
# monologue
# JP: 流れる一秒、一秒ごとに景色が、光がうつろって――\nであるというのにその黄金は、いささかたりとも色褪せぬ。
2199 = "Từng giây trôi qua, cảnh sắc, ánh sáng lại biến đổi——\nDù vậy, sắc vàng đó, không hề phai nhạt dù chỉ một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「これは――確かに」
1836 = "「Cảnh này——đúng thật là」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「きれい、でしょ？　オリヴィの、いちばん、だいじ、な、\nTop　of　the　world……セカイ、イチ、の――」
1663 = "「Đẹp, đúng không? Của Olivy, quan trọng, nhất,\nTop of the world……Nhất, thế giới——」"
# monologue
# JP: 瞳を、こころを、釘付けられる。\n世界一とは、大げさにすぎると思っていたが――
2170 = "Đôi mắt, trái tim, như bị đóng đinh.\nTôi từng nghĩ \"nhất thế giới\" chỉ là nói quá, nhưng——"
# 【宗方】
# display as 宗方
# JP: 「すまん。右田君、代わってくれるか」
1706 = "「Xin lỗi. Cậu Migita, thay tôi một chút được không」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1587 = "「Hả?」"
# 【宗方】
# display as 宗方
# JP: 「代わってくれ、非常事態だ」
1787 = "「Thay tôi đi, tình trạng khẩn cấp rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1590 = "「!!?」"
# monologue
# JP: 切羽詰まったその声が、\n視界の黄金を引き剥がす！
1993 = "Giọng nói dồn dập đó,\nđã kéo tầm nhìn của tôi khỏi sắc vàng rực rỡ!"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、\x%l機関士;#00ffc040;機関士%l;#;に！　僕が助士をやる」
1721 = "「Hibiki, làm \\x%l機関士;#00ffc040;người lái tàu%l;#;! Anh sẽ làm phụ lái」"
# 【日々姫】
# display as 日日姬
# JP: 「わかった！」
1725 = "「Đã rõ!」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃ」
# 1635 = "「奧莉薇——」" 
# 【宗方】
# display as 宗方
# JP: 「オリヴィ！　起きろ！！　起きるんだ！！\n乗務中に寝るバカがいるか！！！」
1644 = "「Olivy! Dậy đi!! Dậy đi!!\nCó đứa ngốc nào lại ngủ gật trong lúc làm nhiệm vụ không!!!」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！　～～～っ！」
1602 = "「! ~~~!」"
# monologue
# JP: オリヴィはぴくりとも動かない。\nムナカタさんが、どれほど激しく揺すぶろうとも。
1973 = "Olivy không hề nhúc nhích.\nDù ngài Munakata có lay mạnh đến mức nào đi chăng nữa."
# 【日々姫】
# display as 日日姬
# JP: 「制、げんっ――解除っ！」
1803 = "「Giới, hạn——Hủy bỏ!」"
# monologue
# JP: （ざっ！　ざくっ！　ざっ！　ざくっ！！）
2320 = "（Xoạt! Xoạt! Xoạt! Xoạt!!）"
# monologue
# JP: だから日々姫は、前方注視を崩さない。\nだから僕は、\x%l投炭;#00ffc040;投炭%l;#;の手を休めない。
2187 = "Vì thế Hibiki không hề rời mắt khỏi phía trước.\nVì thế tôi không ngừng tay \\x%l投炭;#00ffc040;xúc than%l;#;."
# monologue
# JP: オリヴィの半身を、Ⅸ号を、\nなにがなんでも、八ツ城へつれていくそのために。
2212 = "Để đưa một nửa của Olivy, đưa đầu máy số 9,\ndù thế nào đi nữa, cũng phải đến được Yatsushiro."
# 【宗方】
# display as 宗方
# JP: 「起きろ、オリヴィ！　八ツ城までもう少しだ！\nお前、そんな無責任な\x%lレイルロオド;#00ffc040;レイルロオド%l;#;じゃ――っ！！！」
1668 = "「Dậy đi, Olivy! Chỉ còn một chút nữa là đến Yatsushiro rồi!\nCô đâu phải là một \\x%lレイルロオド;#00ffc040;Railord%l;#; vô trách nhiệm như vậy——!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1569 = "「!!?」"
# monologue
# JP: 宗方さんが、いきなり石炭をひっつかみ――
2135 = "Ngài Munakata, đột nhiên vồ lấy một hòn than đá——"
# monologue
# JP: （ガっ！　ガっ！　ガっ！　ガッ！！！）
2324 = "（Cộc! Cộc! Cộc! Cộc!!!）"
# monologue
# JP: 猛然と、アイスピックで砕き始める。
2215 = "Mãnh liệt, bắt đầu dùng chiếc dùi đục đá đập nát nó."
# monologue
# JP: 宗方さんは――アイスピックを、持っている。
2118 = "Ngài Munakata——có mang theo dùi đục đá."
# monologue
# JP: （ガッ！　ガッ！　ガッ！　ガッ！）
2325 = "（Cộc! Cộc! Cộc! Cộc!）"
# 【宗方】
# display as 宗方
# JP: 「起きろ！　オリヴィ！　乗務の時間だ！！\nお前が寝坊してどうする！　オリヴィ！！！」
1667 = "「Dậy đi! Olivy! Đến giờ làm nhiệm vụ rồi!!\nCô ngủ nướng thì làm sao bây giờ! Olivy!!!」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！？」
1592 = "「!!?」"
# monologue
# JP: ぴくりと、一瞬、オリヴィが――
2240 = "Giật mình, trong một khoảnh khắc, Olivy——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ――あっ――」
1591 = "「——A——」"
# 【宗方】
# display as 宗方
# JP: 「オリヴィ！！！？」
1643 = "「Olivy!!!?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナ……カタ――あの、ね？　ひとつ、だけ――\nいい、ワスれ――それ、で――」
1654 = "「Muna……kata——này, nhé? Chỉ một, chuyện thôi——\nChị, quên——vậy, thôi——」"
# 【宗方】
# display as 宗方
# JP: 「なんだ――なんでも聞いてやるぞ」
1727 = "「Chuyện gì——Cô nói gì tôi cũng nghe」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なん――でも？」
1804 = "「Chuyện gì——cũng nghe?」"
# monologue
# JP: オリヴィ、だ。\nオリヴィの、いたずらっこめいた、あの微笑みだ。
2282 = "Là Olivy.\nLà nụ cười mỉm, tinh nghịch đó của Olivy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへっ、それ、じゃ――\nギュって、して？」
1583 = "「Ehehe, nếu, vậy——\nÔm chị, thật chặt, được không?」"
# 【宗方】
# display as 宗方
# JP: 「ああ」
# 1606 = "「嗯」" 
# monologue
# JP: 大柄な宗方さんが、体をぎゅうっと縮こめる。\n小さく丸まるオリヴィを、そうっと大事に――抱きしめる。
2262 = "Ngài Munakata với thân hình to lớn, thu mình lại.\nNhẹ nhàng, trân trọng——ôm chặt lấy Olivy đang cuộn tròn bé xíu."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ああ――冷たい。\n冷たくて、とっても、気持ちいい」
1595 = "「A——lạnh quá.\nLạnh, và, rất, dễ chịu」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1863 = "「!」"
# monologue
# JP: オリヴィの目がうっすらと開く。\nまったく焦点を結ばぬ瞳が、笑みのアーチをふわりと描く。
2087 = "Đôi mắt Olivy hé mở.\nĐôi mắt hoàn toàn không thể tiêu cự, vẽ nên một đường cong mềm mại của nụ cười."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「つめ、たい――のに――胸、だけ――えへへっ、\nもっと――さっきより、あっつい――な」
1859 = "「Lạnh——vậy mà——chỉ có, ngực——ehehe,\nhơn cả——lúc nãy, nóng, quá——」"
# 【宗方】
# display as 宗方
# JP: 「苦しいのか！？」
1535 = "「Cô thấy khó chịu sao!?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「くるしく、ない――から――\nこの、まま――きい、て」
1522 = "「Không, khó chịu——đâu——\nCứ, thế này——nghe, chị nói」"
# 【宗方】
# display as 宗方
# JP: 「ああ」
1646 = "「Ừ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あの、ね？　さっき、いえなく、て――\nずっと、ずうっと、いえなかった、け、ど――」
1548 = "「Này, nhé? Lúc nãy, không nói, được——\nTừ lâu, rất lâu, đã không thể, nói, được, nhưng——」"
# 【宗方】
# display as 宗方
# JP: 「何をだ」
1675 = "「Cô muốn nói gì」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、メリケンで――オヒトヨの、こ、だけど。\nだけど、ね？　ずっと、オリヴィ――ムナカタのこと」
1637 = "「Olivy, ở Mỹ——là con của, Ohito, nhưng.\nNhưng, nhé? Từ lâu, Olivy——đối với Munakata」"
# monologue
# JP: オリヴィの手が、這い上がる。\n宗方さんの顔に触れようと、がくがく震え、力なく。
2080 = "Bàn tay Olivy, bò lên.\nCố chạm vào khuôn mặt ngài Munakata, run rẩy, yếu ớt."
# monologue
# JP: 宗方さんが、顔からその手を迎えにいく。\n頬と手が触れ――オリヴィはまた、小さく、笑う。
2120 = "Ngài Munakata, cúi khuôn mặt xuống đón lấy bàn tay ấy.\nMá và tay chạm nhau——Olivy lại, khẽ, mỉm cười."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「――ずっと、思ってて、\nよびたかった、の」
1266 = "「——Từ lâu, đã nghĩ,\nmuốn gọi, như vậy」"
# 【宗方】
# display as 宗方
# JP: 「っ！？」
1570 = "「!?」"
# monologue
# JP: オリヴィの手が、落ちていく。\n小さな笑顔は、そのままに。
2081 = "Bàn tay Olivy, rơi xuống.\nNụ cười nhỏ bé, vẫn đọng lại trên môi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「さよ、なら――\ngood bye――My Master――――」
1549 = "「Tạm, biệt——\ngood bye——My Master――――」"
# 【宗方】
# display as 宗方
# JP: 「オリヴィ？」
1645 = "「Olivy?」"
# monologue
# JP: 宗方さんが、オリヴィを呼ぶ。\nその手がぺちぺち、軽く、オリヴィの頬を叩く。
2124 = "Ngài Munakata, gọi Olivy.\nBàn tay ngài vỗ nhè nhẹ, lên má Olivy."
# 【宗方】
# display as 宗方
# JP: 「オリヴィ！　おい！　オリヴィ！　オリヴィ！！」
1642 = "「Olivy! Này! Olivy! Olivy!!」"
# monologue
# JP: （ガッ！　ガッ！　ガッ！　ガッ！）
2326 = "（Cộc! Cộc! Cộc! Cộc!）"
# monologue
# JP: 石炭がまた砕かれる。\n何度も、何度も、何度も、何度も。
2122 = "Than đá lại bị đập nát.\nNhiều lần, nhiều lần, nhiều lần, nhiều lần."
# monologue
# JP: だが、オリヴィは――\nオリヴィはもう、別れを、告げた。
2041 = "Nhưng, Olivy——\nOlivy đã, nói lời, từ biệt rồi."
# 【宗方】
# display as 宗方
# JP: 「オリヴィ――――っ――オリ、ヴィ」
1636 = "「Olivy――――——Oli, vy」"
# 【ハチロク】
# display as 八六
# JP: 「ああっ！」
# 1600 = "「啊！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫――\x%l汽笛;#00ffc040;汽笛%l;#;を」
1713 = "「Hibiki——Kéo \\x%l汽笛;#00ffc040;còi hơi nước%l;#; đi」"
# 【日々姫】
# display as 日日姬
# JP: 「きてーーーーーーーーきっ！！！」
1753 = "「Còiiiiiiiiiiiiiiiiiiiiii!!!」"
# monologue
# JP: 長く、長く、長く、長く。\n宗方さんの慟哭は、オリヴィだけが聞けばいいから。
2293 = "Thật dài, thật dài, thật dài, thật dài.\nTiếng khóc nấc của ngài Munakata, chỉ cần Olivy nghe thấy là đủ."
# monologue
# JP: そうしてⅨ号機関車には。\nオリヴィのため――思い切り泣く、資格があるから。
2250 = "Và đối với đầu máy số 9.\nNó có quyền, được khóc thỏa thích——vì Olivy."
