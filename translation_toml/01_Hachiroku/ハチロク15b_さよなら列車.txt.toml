# lines: 304 
# monologue
# JP: （がっ――ざしゅっ！　がっ――ざしゅっ！）
2319 = "（唰啦！唰啦！）" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
1279 = "「……」" 

# monologue
# JP: 日々姫は、ずっと何も言わない。
2184 = "日日姬一直沉默著。" 

# monologue
# JP: 必要なだけの\x%l投炭;#00ffc040;投炭%l;#;をして、あとはただ――\n一文字に口を結んで、じっと、前方を注視している。
2097 = "她只是默默完成需要的\\x%l投炭;#00ffc040;加煤%l;#;工作，然後就只是緊緊抿著嘴，死死盯著前方。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「まさか、まさか――」
1755 = "「沒想到，沒想到——」" 

# monologue
# JP: Ⅸ号の運転台の上でもやはり、奇跡は起きない。\nオリヴィは、回復の兆しを見せてくれない。
2145 = "就算奧莉薇到了九號的駕駛台上也沒有發生奇蹟。她看起來沒有一點要恢復的兆頭。" 

# monologue
# JP: もはや体を起こせずに、\n宗方さんの膝の上、子猫のように丸まっている。
2219 = "現在她連站都站不起來，只能像隻小貓一樣團在宗方先生大腿上。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「まさか、また、ムナカタと――\nムナカタと、Ⅸ号、乗れる、なんて」
1756 = "「沒想到，竟然能，和宗方——和宗方一起，乘上九號」" 

# monologue
# JP: けれども、声はとても明るい。\n聞いているだけで、僕まで幸せを感じるほどに。
1998 = "但她的聲音聽起來卻很高興。光是聽著她的話語，我都能感受到她此刻有多麼幸福。" 

# 【宗方】
# display as 宗方
# JP: 「俺も驚いた。しかも、[やつしろ,2]八ツ城行きの乗務――\n本線を、Ⅸ号で走るとはな」
1683 = "「我也很驚訝。而且這趟車是去八代方向的，沒想到能用九號跑這條幹線」" 

# monologue
# JP: だから。僕もハチロクも日々姫に倣う。\nオリヴィと宗方さんとⅨ号と――
2172 = "所以，我和八六也像日日姬一樣，緊緊閉著嘴巴。" 

# monologue
# JP: 恐らくはオリヴィにとっての最後の乗務を、最後の旅を。\n一瞬たりとも、邪魔したいとは思わぬゆえに。
2283 = "這趟旅程恐怕就是奧莉薇和宗方先生還有九號最後的乘務任務、最後的旅程。我們誰也不想打擾他們一分一秒。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「夢、みたい。夢じゃない、かな？　ね？　ムナ――\nええと、ハチロク？　ほっぺ、ギュってして？」
1784 = "「簡直，就像做夢，一樣。這不是夢吧？宗——話說，八六，能捏捏奧莉薇的臉蛋嗎？」" 

# monologue
# JP: ……宗方さんに頼めばいいのに、ハチロクだ。\n困った顔で僕を見上げるハチロクに、ただ、うなずき返す。
1246 = "……明明可以讓宗方先生這麼做的，她卻指名了八六。八六面有難色地抬頭看著我，我只能靜靜點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、オリヴィちゃん。\nまいりますよ？　ぎゅっ！」
1693 = "「我明白了，奧莉薇。我要捏了。（捏）」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、れ？　イタく、ない\nなら、これ――オリヴィの夢、なの？」
1574 = "「咦？一點也不痛。難道說，奧莉薇還在夢裡嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「さぁ、いかがでしょう？　わたくし、\n\x%l運転体;#00ffc040;運転体%l;#;に換装してしまいましたし、力が弱く――ああ！」
1680 = "「我不太清楚。也可能是因為我換了\\x%l運転体;#00ffc040;駕駛體%l;#;，沒什麼力氣——啊！」" 

# monologue
# JP: ハチロクが、僕へと振り向き目配せをする。
2015 = "八六扭頭朝我使了個眼色。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？　わたくしでは力が弱すぎるようですので」
1861 = "「雙鐵少爺，我力氣不夠」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あいにく、僕もこの細腕だ。\n宗方さん。よろしければ、お願いできますか？」
1566 = "「可惜我力氣也不算大。宗方先生，能拜託您嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「はうっっ！？！」
1581 = "「哈唔！？！」" 

# 【宗方】
# display as 宗方
# JP: 「構いませんが――」
1686 = "「我倒是不介意——」" 

# monologue
# JP: （むぎゅっ）
2329 = "（捏）" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！！！！」
1616 = "「噫！！！！」" 

# monologue
# JP: 無造作に。
2279 = "這捏得也太隨意了。" 

# monologue
# JP: 野良猫の首根っこでもつまむが如くに、\n宗方さんはオリヴィの頬を摘んで伸ばす。
2128 = "宗方先生就跟捏住小野貓的後頸一樣，捏起奧莉薇的臉頰。" 

# 【宗方】
# display as 宗方
# JP: 「――お前、随分と熱いな」
1263 = "「——你可真熱啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「むなふぁふぁほ、ふゅひ、ほへはふへ、ひほひ、ひー\nひゅへへ、ふぁっふぁふぁ、ほへ、ほんほー、はんは」
1657 = "「宗發發、呼嘿、嚯哈呼嘿、嘿嚯嘿、嘿——咻嘿嘿、發發發、嚯嘿、轟嚯、吭哈」" 

# 【宗方】
# display as 宗方
# JP: 「何？」
1532 = "「你說什麼？」" 

# monologue
# JP: 宗方さんは、あっさりと指を離してしまう。
2138 = "宗方先生鬆開了捏著奧莉薇臉蛋的手。" 

# monologue
# JP: 真っ赤になったほっぺたを大切そうにそっと撫で。\nオリヴィは、幸せいっぱいの笑顔を浮かべる。
2086 = "奧莉薇輕輕來回摸著被他捏得通紅的臉頰，露出了充滿幸福的笑容。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なんでもない。\n『夢じゃなかった』って、いっただけ」
1754 = "「沒什麼。只是說“這不是做夢”」" 

# 【宗方】
# display as 宗方
# JP: 「そりゃあ、良かった。\n俺も多少は、こりゃ夢じゃないかと思ったからな」
1846 = "「那就好。其實我也有點覺得自己是不是在做夢」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ、ね。まさか、オリヴィが」
1660 = "「就是啊。沒想到，奧莉薇竟然——」" 

# 【日々姫】
# display as 日日姬
# JP: 「来た！　\x%lC12;#00ffc040;C12%l;#;！」
1537 = "「來了！是\\x%lC12;#00ffc040;Ｃ１２%l;#;！」" 

# monologue
# JP: ――みかん鉄道の\x%lC12;#00ffc040;C12%l;#;。
1232 = "——是橙鐵路的\\x%lC12;#00ffc040;Ｃ１２%l;#;。" 

# monologue
# JP: Ⅸ号をみかん鉄道から追いやったともいえるその一両が、\n敬意を表する長い\x%l汽笛;#00ffc040;汽笛%l;#;を鳴らして早戸のホームに滑り込む。
2284 = "這輛可以說是把九號趕出橙鐵路的機車長鳴了一聲表示敬意的\\x%l汽笛;#00ffc040;汽笛%l;#;，慣行進入了隼人站的站台。" 

# 【宗方】
# display as 宗方
# JP: 「……せっかく代走に来てくれたのに、\n空気輸送もいいところだな」
1318 = "「……難得讓它來代跑一趟，結果這不是運了一車空氣嘛」" 

# monologue
# JP: はるばる鹿兒島から牽いてきた、ほとんど無人の\x%l客車;#00ffc040;客車%l;#;には、この早戸駅でも、まばらにしか乗車がなかったようだ。
1976 = "不辭辛苦從鹿兒島拉到這裡的\\x%l客車;#00ffc040;客運車廂%l;#;裡並無多少乘客，在隼人站也只上了幾個零星客人。" 

# monologue
# JP: それでも少しも緩むことなく、みかん鉄道の\x%lC12;#00ffc040;C12%l;#;は、\n小畑線へと進入し、御一夜へ向け、屋岳の坂に挑んでいく。
1999 = "但橙鐵路的\\x%lC12;#00ffc040;Ｃ１２%l;#;還是按時發車，進入了大畑線，朝著御一夜方向行駛，去挑戰矢岳的坡道。" 

# 【宗方】
# display as 宗方
# JP: 「まぁしかし、おかげでこいつと、\n八ツ城にまで走れるわけだ――っと」
1520 = "「不過，也多虧這樣，才能和它一起往八代那邊跑了」" 

# monologue
# JP: 宗方さんが鉄道時計をちらと眺める。
2132 = "宗方先生瞟了一眼鐵路表。" 

# 【宗方】
# display as 宗方
# JP: 「時間だ」
1554 = "「到時間了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
1606 = "「嗯」" 

# monologue
# JP: （ポーーーーーーーーーーッ！！！）
2322 = "（啵——！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1596 = "「啊」" 

# monologue
# JP: 見事なものだ。
2224 = "真是太精彩了。" 

# monologue
# JP: ガラス板の上を滑らすように――\n一切の衝動無しに、宗方さんはⅨ号の\x%l動輪;#00ffc040;動輪%l;#;を回し始める。
2049 = "在宗方先生的操作下，九號的\\x%l動輪;#00ffc040;動輪%l;#;開始轉動起來——如行雲流水，不急不緩。" 

# 【宗方】
# display as 宗方
# JP: 「……\x%l投炭;#00ffc040;投炭%l;#;、少し厚めに頼めますか」
1294 = "「……就拜託你\\x%l投炭;#00ffc040;加煤%l;#;時鋪厚一點了」" 

# 【日々姫】
# display as 日日姬
# JP: 「はいっ！」
1648 = "「好的！」" 

# monologue
# JP: （ざっ――がしゅっ！　ざっ――がしゅっ！）
# 2319 = "（唰啦！唰啦！）" 

# monologue
# JP: 日々姫が響かせるワンスコの音を聞きながら、\nオリヴィは、幸せそうに瞳を細める。
2078 = "奧莉薇一邊聽著日日姬揮動公斤鍬的聲音，一邊幸福地眯起眼睛。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「重いねー。お客さん、満員なんだねー」
1649 = "「好重啊——客人都坐滿了」" 

# 【宗方】
# display as 宗方
# JP: 「だな。しかし……夢にも思っていなかったな。\nお前の、引退セレモニーとは」
1734 = "「是啊。不過……我做夢都沒想到，你的引退典禮竟然來了這麼多人」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ、ね――信じられない、よね」
1732 = "「是啊——真的，無法相信」" 

# 【宗方】
# display as 宗方
# JP: 「それだけじゃなく、御一夜からも早戸からも、\nこれだけの人達が八ツ城にむかってくれるとはなぁ」
1512 = "「不光如此。從御一夜、隼人竟然有這麼多人要前往八代」" 

# monologue
# JP: ……指摘する愚は犯さぬが、宗方さんは失念している。\n雪で、そのうえ噴火直後というリスクを取って。
1253 = "……雖然我不會做在這種時候指出錯誤這種沒有眼力見的事，但宗方先生忘記了。" 

# monologue
# JP: なおもこれほどの乗客たちが、\nオリヴィの引退を見届けたいと、来てくれたのだ。
2277 = "這些客人可是冒著下雪和剛火山噴發後的風險也要來見證奧莉薇的引退的。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「夢じゃないって、もうわかった、けど、\nえへへ――やっぱり、夢、みたい」
1639 = "「奧莉薇已經知道這不是夢了，不過——哎嘿嘿——果然還是像做夢一樣」" 

# 【宗方】
# display as 宗方
# JP: 「第一\x%l閉塞;#00ffc040;閉塞%l;#;！　進行！」
1778 = "「第一\\x%l閉塞;#00ffc040;閉塞%l;#;！前進！」" 

# monologue
# JP: 世間話のような会話の最中にも、まったく怠り無い\x%l喚呼;#00ffc040;喚呼%l;#;。\nオリヴィの頬が、少し膨れる。
2193 = "明明他們剛才還在隨口聊天，宗方先生也絲毫沒有懈怠，進行了\\x%l喚呼;#00ffc040;復誦%l;#;。奧莉薇鼓起臉頰。" 

# monologue
# JP: 体を起こせず、目視を出来ず、\n故に\x%l喚呼;#00ffc040;喚呼%l;#;をあわせられない、その歯がゆさのためだろう。
2280 = "這是因為她無法起身用眼睛確認，無法進行\\x%l喚呼;#00ffc040;復誦%l;#;而感到不甘心吧。" 

# monologue
# JP: （そうか。\nオリヴィの\x%l喚呼;#00ffc040;喚呼%l;#;も、もう聞けんのか）
2338 = "（這樣啊。已經無法再聽到奧莉薇的\\x%l喚呼;#00ffc040;復誦%l;#;了嗎）" 

# monologue
# JP: 寂しく思い、その寂しさに苦笑する。
1967 = "一想到這裡，我就感到很落寞，只能苦笑著。" 

# monologue
# JP: 別れが不可避であろうことを、頭で理解したつもりでも、\n体は、こころは、受け入れきれずにいるらしい。
2147 = "就算我大腦很清楚總有一天我們會分別，我的身體和心靈此刻似乎還是無法接受。" 

# 【宗方】
# display as 宗方
# JP: 「……御鉄さんの雛衣社長に聞いたんだが、\nテレビで流れたそうだ」
1299 = "「……御鐵的雛衣社長告訴我，你似乎上電視了啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ナガれた、って、なに、が？」
1508 = "「上電視，什麼上電視？」" 

# 【宗方】
# display as 宗方
# JP: 「なにって、お前のニュースがだ」
1841 = "「還能是什麼，當然是你的新聞啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええっ！？」
1584 = "「哎！？」" 

# 【宗方】
# display as 宗方
# JP: 「……考えてみりゃ、何人もの被害を防いで、\n鉄路も守ったんだからなぁ」
1307 = "「……畢竟你提前預警防止出現了人員傷亡，還守住了鐵路」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふえっ！？」
# 1584 = "「哎！？」" 

# 【宗方】
# display as 宗方
# JP: 「お前は、それだけのことをしたってことだ。\n夢なんかじゃなく、な」
1837 = "「這說明你的功勞足以上電視。這可不是做夢」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「――っ」
1264 = "「——唔」" 

# 【宗方】
# display as 宗方
# JP: 「頑張ってくれたな。感謝している」
1530 = "「你真的很努力了。謝謝你」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！！！」
1568 = "「呀！！！」" 

# monologue
# JP: 膝の上の子猫を撫でる、そのままの手つきで。\nほんの一瞬、ごく軽く、宗方さんがオリヴィを撫でる。
2125 = "宗方先生在一瞬間輕輕摸了奧莉薇一下，動作就跟撫摸躺在大腿上的小貓一樣。" 

# monologue
# JP: オリヴィは、真っ赤になって黙り込む。\nびくとも、体を動かさなくなる。
2079 = "奧莉薇則紅著臉沉默了。一動也不動。" 

# monologue
# JP: （ああ――）
2321 = "（啊——）" 

# monologue
# JP: 報われたなと、だから、感じる。\nハチロクも、日々姫も、みなが、きっと同じ気持ちだ。
2220 = "看到她的努力有了回報，我瞬間感到十分高興。不光是我，八六、日日姬和大家肯定也這麼想。" 

# monologue
# JP: （本当に、それだけのことを――\nオリヴィ、君はしてくれたんだ）
2328 = "（奧莉薇，你的所作所為就是有這麼大的價值啊）" 

# monologue
# JP: 100年を経た、もうボロボロの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、\nたくさんの人命と、鉄路を救った。
2152 = "已經一百多歲全身布滿歲月痕跡的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;拯救了無數人命，拯救了鐵路。" 

# monologue
# JP: 第一報を送り出したのこそは確かに、\n稀咲と元忠さんの力が働く報道各社だ。が――
2257 = "記得最先報導這個新聞的是稀咲和元忠先生關聯的媒體。不過——" 

# 【宗方】
# display as 宗方
# JP: 「……なんだ、こりゃ」
1316 = "「……這是怎麼回事」" 

# monologue
# JP: 1340。延17分。早戸駅での遅延を9分回復し――\n臨時列車「さよならオリヴィ号」は、鹿兒島駅に入線する。
2340 = "１３４０。延誤１７分鐘，我們挽回了在隼人站造成的９分鐘延誤。臨時列車“告別奧莉薇號”在鹿兒島站進站了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「どした、の？　ムナカタ」
1656 = "「宗方，怎麼了？」" 

# 【宗方】
# display as 宗方
# JP: 「ホームに人が溢れてるぞ」
1776 = "「站台上全是人啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええっ？　みたい、みたい」
1589 = "「哎？要看要看，奧莉薇要看」" 

# 【宗方】
# display as 宗方
# JP: 「ほれ」
1536 = "「來」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ひゃうっ！！」
1567 = "「呀！！」" 

# monologue
# JP: 人、人、人。\n大廃線前はかくやとも思わせられる人の数。
1986 = "人、人、人。站台上的人多到讓人懷疑是不是穿越回了大廢線前。" 

# monologue
# JP: 宗方さんに、両脇の下でもちあげられて、\n幸せそうに、照れくさそうにオリヴィは――
2085 = "奧莉薇被宗方先生舉了起來，有些害羞又幸福地笑了。" 

# monologue
# JP: (ごんごんっ！)
31 = "(咣咣！)" 

# 【宗方】
# display as 宗方
# JP: 「どうした？」
1676 = "「怎麼了？」" 

# 【ふかみ】
# display as 深美
# JP: 「御一夜鉄道、\x%l車掌;#00ffc040;車掌%l;#;の早瀬です。あの――増結、\n[けいきゃくしゃ,2]軽客車を二両増結できるかって、駅長さんから」
1689 = "「我叫早瀨，是御一夜鐵路\\x%l車掌;#00ffc040;列車長%l;#;。請問——站長問能不能加掛兩節輕型客車」" 

# 【宗方】
# display as 宗方
# JP: 「増結？」
1558 = "「加掛？」" 

# 【ふかみ】
# display as 深美
# JP: 「です、あの、テレビ。鹿兒島でも流れてるみたいで。\nそれで、セレモニー。八ツ城、行きたいひとが多くって」
1737 = "「是的，嗯。那個，鹿兒島的電視台也放了那條新聞。所以想去八代參加典禮的客人有好多」" 

# monologue
# JP: ――鹿兒島にまで、隈銀の影響力は及ばない。\nオリヴィの成し遂げたことの大きさを。
1236 = "——隈元銀行在鹿兒島沒有影響力。能上鹿兒島的新聞全靠奧莉薇的努力。" 

# monologue
# JP: オリヴィがどれほど愛されているかを、\nいまさらながらに、しみじみ思う。
1965 = "一想到奧莉薇竟然被這麼多的人所熱愛，我感到十分感動。" 

# 【宗方】
# display as 宗方
# JP: 「……引けんことはないと、駅長にそう伝えてくれ」
1320 = "「……麻煩告訴站長，可以加掛」" 

# 【ふかみ】
# display as 深美
# JP: 「わかりました！」
# 1648 = "「好的！」" 

# 【真闇】
# display as 真闇
# JP: 「と、よかったら」
1585 = "「哎，上來了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「マクラ！」
1770 = "「真闇！」" 

# 【真闇】
# display as 真闇
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;さんたちにお差し入れ」
1577 = "「咱是來慰勞\\x%l機関士;#00ffc040;司機%l;#;們的」" 

# monologue
# JP: 乗客として乗車していた真闇姉の穏やかな声に、\nオリヴィの顔がぱっと輝く。
2082 = "奧莉薇看到作為乘客登上列車的真闇姐，表情馬上為之一亮。" 

# monologue
# JP: もぞもぞ、体を動かそうとする。
2103 = "她窸窸窣窣地想要活動自己的身體。" 

# 【真闇】
# display as 真闇
# JP: 「はい、これ。オリヴィちゃんの大好物」
1786 = "「給，這可是奧莉薇最喜歡的」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「おみず、おいしいの――\nクマがわの、おみず――うれしい」
1752 = "「水，好好喝——是隈河的水——好高興」" 

# monologue
# JP: クーラーボックスの中には、ぎっしりと、\n安全のためのペットボトルで、右田一の水が入っている。
2228 = "真闇姐拿來的保溫箱裡裝滿了右田一釀酒廠的瓶裝水，這樣在車裡喝也很安全。" 

# 【宗方】
# display as 宗方
# JP: 「慌てるな」
1550 = "「別著急」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふあっ」
1614 = "「噗哈」" 

# monologue
# JP: オリヴィの分も宗方さんがうけとって、\n優しく、オリヴィに飲ませてやる。
2130 = "宗方先生接過給奧莉薇的水，動作輕柔地餵她喝下去。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「んく――こくっ――んっ――ごくっ。――ぷあっ。\nあのね？　ムナカタ、これ――すごくおいしいから」
1604 = "「嗯——咕咕——嗯。呼啊。宗方，這個可好喝了」" 

# 【宗方】
# display as 宗方
# JP: 「もちろんもらう――（ごくっ、ごくっ）」
1696 = "「我當然也會喝——（喝水）」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふぁ……うふふっ――えへへ～。\nね？　おいしー、でしょ？」
1571 = "「呼……唔呼呼——哎嘿嘿～好喝吧？」" 

# 【宗方】
# display as 宗方
# JP: 「うん。うまい」
1605 = "「嗯。好喝」" 

# monologue
# JP: なんと優しく、幸せあふれる光景だろう。\n見ている僕らのこころまで、澄み切った水が沁み通る。
2278 = "這場景是多麼溫馨啊。我光是在旁邊看著，都覺得心靈如同受到了洗滌。" 

# 【真闇】
# display as 真闇
# JP: 「お邪魔をしたらいけんけん――\nオリヴィちゃんも、みなさんも、よか旅を」
1564 = "「可不能打擾你們咧——奧莉薇還有大家，祝你們一路順風」" 

# monologue
# JP: それだけいって、軽く手を振り、\n真闇姉は、ごくあっさりと去っていく。
2227 = "真闇姐只留下這句話，揮了揮手就馬上離開了。" 

# monologue
# JP: （ああ――）
# 2321 = "（啊——）" 

# monologue
# JP: だから、感じる。\n気持ちを、願いを。
2197 = "正因如此，我才感受到了真闇姐還有大家的心意。" 

# monologue
# JP: （ふかみも、凪も――ニイロクも赤井\x%l機関士;#00ffc040;機関士%l;#;も、\nポーレットもれいなも――みんな、同じだ）
2333 = "（深美、凪、二六、赤井\\x%l機関士;#00ffc040;司機%l;#;、波萊特、玲奈——大家的心意都是一樣的）" 

# monologue
# JP: 僕らが出るとき、誰もが何かを言いたげだった。\nオリヴィへ、きっと伝えたい言葉があった。
2051 = "在我出門的時候，大家看起來都欲言又止的樣子。他們一定是有話要轉達給奧莉薇。" 

# 【ポーレット】
# display as 波萊特
# JP: 「調整、全部つけました。けど、現地で何か出てきたら、\nそれは……双鉄くんが判断してくれて大丈夫です」
1807 = "「調整是都調整好了。不過要是現場發生什麼事……就得交給雙鐵君你判斷了」" 

# 【れいな】
# display as 玲奈
# JP: 「いってらっしゃぁい。\nごあんぜんに、良い乗務をですぅ」
1504 = "「一路順風，祝工作順利安全」" 

# monologue
# JP: けれど、その言葉は飲み込まれた。\nオリヴィと宗方さんとを、少しでも長く旅させるため。
2039 = "可是他們故意沒有說出口，就是為了讓奧莉薇和宗方先生最後的旅程儘量再長一點。" 

# 【赤井】
# display as 赤井
# JP: 「痛っ……あ痛たたた」
1768 = "「痛……好疼」" 

# 【ニイロク】
# display as 二六
# JP: 「清春、お腹いたい。\nニイロク、清春を見捨てられない」
1763 = "「清春，肚子痛。我不能，放著他不管」" 

# 【凪】
# display as 凪
# JP: 「なら、凪さまがついててやるばい！」
1851 = "「那本小姐也陪你去！」" 

# monologue
# JP: 僕ら家族で、乗務をさせてくれるため――
2060 = "大家都是為了讓我們一家人完成最後的乘務工作才這麼做的——" 

# monologue
# JP: 不器用極まる芝居をしてまで、早戸から先、\n\x%l補機;#00ffc040;補機%l;#;である8620を引き受けて、僕らにⅨ号を託してくれた。
1990 = "他們甚至演了這麼一齣蹩腳戲，在隼人那接手了作為\\x%l補機;#00ffc040;補機%l;#;的８６２０，把九號交給了我們。" 

# monologue
# JP: （ポーーーーーーーーーーーーーーーーーっ！）
2323 = "（啵——！）" 

# monologue
# JP: 長い、長い\x%l汽笛;#00ffc040;汽笛%l;#;とともに、\n再びⅨ号は走り始める。
1996 = "伴隨著長長的\\x%l汽笛;#00ffc040;汽笛%l;#;聲，九號再次開始行駛起來。" 

# monologue
# JP: オリヴィに――どうぞ、少しでも素敵な旅を。\n僕らみんなの、たったひとつの願いを乗せて。
2166 = "我們所有人都只有一個願望，就是讓奧莉薇最後的旅程更加美好一些。" 

# monologue
# JP: （シュッ、シュッ、シュッ、シュッ――）
2318 = "（咻、咻、咻、咻——）" 

# monologue
# JP: 千内でまた一両増結。\nなんと、縞原鉄道さんが客車貸与をしてくれた。
2165 = "我們在川內又加掛了一節客運車廂。沒想到島原鐵路竟然也把客運車廂借給我們了。" 

# monologue
# JP: どころか――宗方さんは、Ⅸ号で牽けると断ったが――\n\x%lディーゼル機関車;#00ffc040;ディーゼル機関車%l;#;を\x%l補機;#00ffc040;補機%l;#;につけようかとまで提案してきた。
2247 = "而且他們甚至還提議用\\x%lディーゼル機関車;#00ffc040;柴油機車%l;#;當\\x%l補機;#00ffc040;補機%l;#;，但被宗方先生拒絕了，他說有九號牽引就足夠了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……すっごい、ねー、シマテツさん、まで、\nオリヴィ、たちに、ここまで、してくれる、なんて」
1291 = "「……好厲害，竟然連島鐵，都願意，幫助我們，到這個份上」" 

# 【宗方】
# display as 宗方
# JP: 「鉄道にとって、\n何十年振りかの、誇らしいニュースだからかもしれんな」
1766 = "「畢竟這對鐵路來說，可是好幾十年都沒有的值得驕傲的新聞啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんな……そんなの、オオゲサ、だよぉ」
1832 = "「這……你太誇張啦」" 

# monologue
# JP: 軽く笑って――\n沈黙。沈黙。
2088 = "奧莉薇輕輕笑笑，然後沉默了。" 

# monologue
# JP: 宗方さんは、決してそれを自分から破りにいってくれない。
2136 = "宗方先生絕對不會主動打破這沉默。" 

# 【宗方】
# display as 宗方
# JP: 「…………」
# 1279 = "「……」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
# 1279 = "「……」" 

# monologue
# JP: 千内を過ぎ、オリヴィにとって一番馴染みの路線に入り。\n安心したのか、オリヴィの口数は一気に減った。
2286 = "過了川內之後，就進入了奧莉薇最熟悉的線路。她可能是放心下來了，就越來越不怎麼說話了。" 

# 【宗方】
# display as 宗方
# JP: 「\x%l制限;#00ffc040;制限%l;#;40！　よしっ！」
1260 = "「\\x%l制限;#00ffc040;限速%l;#;４０！確認！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふふっ」
1572 = "「呼呼」" 

# monologue
# JP: が、それで全く構わんのだろう。
2003 = "但這也無所謂。" 

# monologue
# JP: さっきからずっと瞳を閉じたそのままに、\nオリヴィは、幸せそうに笑うのだから。
2089 = "奧莉薇雖然從剛才就閉著眼睛，但她臉上卻一直浮現出幸福的笑容。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……ね？　ヒビキ」
1310 = "「……話說，日日姬」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん？　どぎゃんしたと？」
1610 = "「嗯？怎麼咧？」" 

# monologue
# JP: 不意の呼びかけ。\n\x%l投炭;#00ffc040;投炭%l;#;の手を止めることなく、日々姫が、普段通りに答える。
