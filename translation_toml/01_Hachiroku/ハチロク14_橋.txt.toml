2137 = "不是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;和主人的關係。就連如此親近的關係都不再能夠滿足我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ハチロク。お前にも。\n僕を所有し、独占して欲しいと思っているのだ」
