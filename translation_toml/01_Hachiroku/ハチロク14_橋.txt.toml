# ハチロク14_橋.txt 
[info]

[characters]
2321 = "Dù không phải vậy, thì sau khi tỏ tình 'Tớ\nthích cậu' và bị bỏ chạy. Sau đó,\nviệc tiếp tục bày tỏ muốn luôn hành động\ncùng nhau……cũng khó khăn lắm chứ."
2089 = "ハチロク"
2288 = "凪"
2224 = "Người được khen thì chớp chớp mắt liên\ntục,\nchắc do quá xấu hổ nên trông như bị đứng\nhình luôn rồi."
2713 = "稀咲"
2610 = "Ngay khi nghĩ vậy, một nỗi nghi ngờ từ lâu\ntrong tôi\nđã phần nào được gỡ bỏ."
2753 = "蓑笠"
2694 = "真闇"
2621 = "早瀬堰"
2043 = "「Em sợ Chí Hoàn\nđã thay đổi như thế nào?」"

