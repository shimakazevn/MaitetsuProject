[script]
# lines: 489 
# monologue
# JP: [なだれ,1]雪崩る雨と、沸き立つ雲のような蒸気が、\n前照灯の明かりを散らす。
2210 = "1 năm 7 tháng trước……của 4 tháng trước.\nRa vậy, đúng vào khoảng thời gian ngay\ntrước chuyến chạy đầu tiên của Nine Stars."

# monologue
# JP: 豪雨と霧と光のベール。\n幻想的な光景は、しかし視界をほぼ完全に塞いでもいる。
2633 = "Bức màn mưa lớn, sương mù và ánh sáng.\nMột khung cảnh huyền ảo, nhưng lại gần như\nche khuất hoàn toàn tầm nhìn."

# monologue
# JP: （文字通りの手探り、だな。これは）
2948 = "（Đúng nghĩa đen là mò mẫm trong đêm tối\nrồi. Thế này thì）"

# monologue
# JP: 訓練でなら、夜間走行は何度も経験している。
2510 = "Nếu là huấn luyện thì tôi đã trải qua chạy\ntàu ban đêm nhiều lần rồi."

# monologue
# JP: が……これほどの、ほぼ無視界の悪天候下で走らせるなど、\n日中にさえ、まったく経験の無い―――っ！？
2195 = "Nhưng…… chạy tàu trong điều kiện thời tiết\nkhắc nghiệt gần như không có tầm nhìn thế\nnày,\nthì ngay cả ban ngày tôi cũng chưa từng\ntrải qua bao giờ——!?"

# 【双鉄】
# display as 雙鐵
# JP: 「くそっ」
1851 = "「Viết là chữ 'Kiện' trong 'khỏe mạnh', và\nchữ 'Vi' trong 'làm việc', đọc là Kiện Vi.\nĐó là một thành phố khai thác mỏ địa\nphương nơi đầu máy hơi nước vẫn đang hoạt\nđộng.」"

# monologue
# JP: 鉄の臭いと\x%lブラスト;#00ffc040;ブラスト%l;#;音が、激しい雨と暴風が、\n見えない冷たい手となって、僕の喉をゆるく締めてくる。
2841 = "Mùi sắt và tiếng \\x%lブラスト;#00ffc040;khí thải xi lanh%l;#;, cùng\ntrận mưa lớn và cuồng phong,\nhóa thành những bàn tay lạnh lẽo vô hình,\ntừ từ siết lấy cổ họng tôi."

# monologue
# JP: ……放っておけばあの日の記憶が這い登ってくる。\n頭を振って息を吐き、休ませずに手を動かし続ける。
1185 = "……Nếu cứ để mặc thì ký ức ngày hôm đó sẽ\nlại ùa về.\nTôi lắc đầu, thở hắt ra, đôi tay không\nngừng cử động."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ――とにかく投げ込みだ」
1786 = "「Đúng rồi——tóm lại cứ xúc than vào thôi.」"

# monologue
# JP: （ざくっ）
2925 = "（Phập）"

# monologue
# JP: 石炭と火と水さえあれば、蒸気を切らすことがなければ、\n\x%l8620;#00ffc040;8620%l;#;はレールの上を、前進できる。
2337 = "Chỉ cần có than, lửa và nước, chỉ cần\nkhông bị tắt hơi,\nthì \\x%l8620;#00ffc040;8620%l;#; vẫn có thể tiến lên phía trước\ntrên đường ray."

# monologue
# JP: そしてレールの向こうでは、恐らくはほぼ確実に、\n日々姫たちが、僕らの救援を待っているのだ。
2380 = "Và ở phía bên kia đường ray, gần như chắc\nchắn là,\nHibiki và mọi người đang chờ chúng tôi đến\ncứu viện."

# monologue
# JP: （焦らず進む。それだけでいい。\n……ここを越えれば、全ては一気に好転する）
2913 = "（Không nóng vội mà cứ tiến lên. Chỉ cần\nvậy thôi.\n……Vượt qua được chỗ này, mọi thứ sẽ tốt\nđẹp lên ngay lập tức.）"

# monologue
# JP: 現実的なことだけを。\n今のことだけを考える。
2506 = "Chỉ nghĩ đến những điều thực tế.\nChỉ nghĩ đến hiện tại thôi."

# monologue
# JP: 稀咲の助力を得られるようになり、実際、\n御一夜鉄道株式会社の財務体質は大きく改善されている。
2748 = "Nhờ có sự giúp đỡ của Kisaki, thực tế là,\ntình hình tài chính của Công ty Cổ phần\nĐường sắt Ohito đã được cải thiện đáng kể."

# monologue
# JP: （\x%lキハ07;#00ffc040;キハ07%l;#;が営業運転に復帰できれば、\n金銭面でも運営面でも、大きな余裕が生まれてくる）
2940 = "（Nếu \\x%lキハ07;#00ffc040;Kiha 07%l;#; có thể hoạt động thương mại\ntrở lại,\nthì cả về mặt tài chính lẫn vận hành đều\nsẽ có khoảng dư dả lớn.）"

# monologue
# JP: そうなれば、人員だって増強できる。
2819 = "Khi đó, nhân sự cũng có thể được tăng\ncường."

# monologue
# JP: あと一人、助士の目と手がありさえすれば、\nこの状況とて――こうも不安には感じまい。
2752 = "Chỉ cần có thêm một đôi mắt và đôi tay của\nphụ lái tàu,\nthì trong tình huống này——tôi cũng không\ncảm thấy bất an đến thế."

# monologue
# JP: （ハチロクが――\x%l機関士;#00ffc040;機関士%l;#;役など）
2927 = "（Để Hachiroku——đóng vai trò \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;\n）"

# monologue
# JP: 助士が不在で、僕が投げ込みに回る以上、\n\x%l機関士;#00ffc040;機関士%l;#;として\x%l8620;#00ffc040;8620%l;#;を運転するのは、ハチロクだ。
2374 = "Vì không có phụ lái tàu, tôi phải quay\nsang xúc than,\nnên người lái \\x%l8620;#00ffc040;8620%l;#; với tư cách là \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;\n, chính là Hachiroku."

# monologue
# JP: \x%l整備体;#00ffc040;整備体%l;#;の横顔は凛と張り詰めて、\n怖いくらいに美しいものと感じもするが――
2514 = "Góc nghiêng của \\x%l整備体;#00ffc040;thân chính%l;#; vô cùng nghiêm\nnghị và căng thẳng,\nđẹp đến mức khiến tôi cảm thấy đáng sợ——"

# monologue
# JP: （だが、目隠しだ。\x%l整備体;#00ffc040;整備体%l;#;のハチロクでは、\nセンサ性能が不十分すぎる）
2910 = "（Nhưng mà, thế này chẳng khác nào bịt mắt.\nVới \\x%l整備体;#00ffc040;thân chính%l;#; của Hachiroku,\nthì hiệu suất cảm biến quá kém.）"

# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;の僕と、\x%l運転体;#00ffc040;運転体%l;#;のハチロクとで組んでるときの――\n背中を完全に預けあえている安心感が、今は無い。
2678 = "Cảm giác an tâm khi tôi làm \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;\nkết hợp với \\x%l運転体;#00ffc040;kíp lái%l;#; của Hachiroku——\ncảm giác có thể hoàn toàn giao phó tấm\nlưng cho nhau, bây giờ không còn nữa."

# monologue
# JP: 車体の状態を適宜モニタし、最適の運転指示をくれる。\n\x%l運転体;#00ffc040;運転体%l;#;の能力を、今のハチロクは発揮できない。
2455 = "Theo dõi trạng thái thân xe một cách thích\nhợp, và đưa ra chỉ thị lái tối ưu nhất.\nNăng lực của \\x%l運転体;#00ffc040;kíp lái%l;#;, Hachiroku hiện tại\nkhông thể phát huy được."

# monologue
# JP: （これでは――やはり……）
2947 = "（Thế này thì——quả nhiên……）"

# 【ハチロク】
# display as 八六
# JP: 「制限60」
1899 = "「Thực sự là một cuộc cứu hộ xuất sắc. Cả\nlúc khởi hành lẫn lúc phanh hãm,\nchuyển động mượt mà đến mức khiến tôi vô\ncùng thán phục.」"

# monologue
# JP: 雨音の向こう。\x%l喚呼;#00ffc040;喚呼%l;#;はひどく、細く聞こえる。\n標識位置での\x%l喚呼;#00ffc040;喚呼%l;#;であるが、恐らく表示を読めてもいまい。
2814 = "Phía sau tiếng mưa. Tiếng \\x%l喚呼;#00ffc040;hô xác nhận%l;#; nghe\nrất nhỏ và yếu ớt.\nDù là \\x%l喚呼;#00ffc040;hô xác nhận%l;#; ở vị trí biển báo, nhưng\ncó lẽ em ấy cũng không đọc được biển báo."

# monologue
# JP: ただ、経験のみ。\n今まで調べ、積み重ねてきたものだけが――っ！？
2398 = "Chỉ dựa vào kinh nghiệm.\nChỉ những gì đã tìm hiểu và tích lũy từ\ntrước đến nay——!?"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ」
1617 = "「A, đúng rồi.」"

# monologue
# JP: 喉がすうっと楽になる。\nハチロクのただ一言が、僕の不安を祓ってくれる。
2560 = "Cổ họng tôi chợt nhẹ nhõm hẳn.\nChỉ một lời nói của Hachiroku đã xua tan\nđi sự bất an trong tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「見えているんだ。ハチロクには。\nいや――僕にだって、見えたじゃないか」
1545 = "「À——Hachiroku cũng từng nói, thông qua\ncộng cảm,\ncô ấy đã nhận được 'những âm thanh mà bản\nthân không thể nghe thấy' từ Tây Qua nhỉ.」"

# monologue
# JP: 豪雨のベールの向こうでも、\nいつもと違う速度であっても、確かに見えた。
2437 = "Tôi không ngờ Hachiroku lại yêu động vật\nđến thế.\nBởi vì Ga trưởng Kon toàn quấn lấy Reina\nvà Hibiki thôi——"

# monologue
# JP: 標識の位置、信号の位置、踏切の位置、廃駅の位置。\n把握出来てる――経験が、視界の代わりを努めてくれてる。
2151 = "Vị trí biển báo, vị trí tín hiệu, vị trí\nđường ngang, vị trí ga bỏ hoang.\nTôi đều nắm rõ——Kinh nghiệm đã thay thế\ncho tầm nhìn."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ、ハチロクはハチロクだ。\n僕よりよほど経験豊かだ。何を心配することも無い」
1790 = "「Đúng rồi, Hachiroku là Hachiroku.\nEm ấy giàu kinh nghiệm hơn tôi nhiều.\nKhông có gì phải lo lắng cả.」"

# monologue
# JP: あれほど注意していた筈なのに、\nそれでも思考が、ネガティブな方へ引きずられていた。
2541 = "Có thể ngay lập tức tinh tế nhận ra điều\nđó,\nvà hoàn toàn kiểm soát con thuyền chỉ bằng\nnhững thao tác chèo tối thiểu——"

# monologue
# JP: さっきより強く頭を振って深呼吸して、\nワンスコを握る指にも力を込め直す。
2551 = "Tôi lắc đầu mạnh hơn lúc nãy, hít một hơi\nthật sâu,\nvà nắm chặt lại các ngón tay đang cầm xẻng\nxúc than."

# monologue
# JP: （ザクっ――ザッ）
2936 = "（Phập——Phập）"

# monologue
# JP: が――\n気合がそのまま石炭に乗ってくれるものでもない。
2184 = "Nhưng——\nKhông phải cứ có khí thế là than sẽ cháy\ntheo ý mình."

# monologue
# JP: まるで湿気りでもしたかのように、\nグズって、カラリと燃えてくれない。
2674 = "Như thể bị ẩm vậy,\nnó cứ ỉu xìu, không chịu cháy bùng lên."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、ブロアをかけるぞ」
1551 = "「Hachiroku, anh bật thiết bị thổi gió\nnhé.」"

# 【ハチロク】
# display as 八六
# JP: 「…………」
1222 = "「…………」"

# monologue
# JP: 滝のような雨音に負け、聞こえぬようだ。\n声を張り上げ、もう一度。
2564 = "Có vẻ tiếng mưa như thác đổ đã át đi, em\nấy không nghe thấy.\nTôi lớn giọng, gọi lại lần nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク！　ブロアをかけるが、良いか！\n\x%lカマ;#00ffc040;カマ%l;#;の具合がすぐれんのだ」
1547 = "「Hachiroku! Anh bật thiết bị thổi gió nhé,\nđược không!\nTình trạng \\x%lカマ;#00ffc040;lò hơi%l;#; không được tốt lắm.」"

# 【ハチロク】
# display as 八六
# JP: 「えっ！？　あ、ブロア――ブロアですね。\nどうぞ、なさってください」
1596 = "「Hả!? A, thiết bị thổi gió——thiết bị thổi\ngió ạ.\nVâng, ngài cứ bật đi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「『ブロア！』」
1220 = "「『Thiết bị thổi gió!』」"

# monologue
# JP: \x%l喚呼;#00ffc040;喚呼%l;#;一発、勢いも良くバルブをひねれば、\nボっ！　と蒸気が煙突から追い出される。
2123 = "Sau một tiếng \\x%l喚呼;#00ffc040;hô xác nhận%l;#;, tôi vặn mạnh\nvan,\nPhụt! Hơi nước bị đẩy ra khỏi ống khói."

# monologue
# JP: 強烈な通風が起こったはずだが――焚き口を開けても、\n\x%lカマ;#00ffc040;カマ%l;#;の火にはやはり、いつものような勢いはない。
2817 = "Đáng lẽ phải có luồng gió mạnh thổi\nqua——nhưng dù mở cửa lò,\nlửa trong \\x%lカマ;#00ffc040;lò hơi%l;#; vẫn không có khí thế như\nmọi khi."

# 【双鉄】
# display as 雙鐵
# JP: 「何故だ？\nまさか、実際に[しけ,1]湿気っているわけでもあるまいに」
1804 = "「Tại sao chứ?\nLàm gì có chuyện nó thực sự bị ẩm được.」"

# 【ハチロク】
# display as 八六
# JP: 「あ」
1612 = "「A.」"

# monologue
# JP: まるで目覚めでもしたかのように、\nぱちぱち、何度か小刻みなまばたき。
2429 = "Đến tận lúc này tôi mới cảm nhận sâu sắc\nrằng,\ntôi thực sự chỉ có những lời biết ơn dành\ncho cô Khương."

# 【ハチロク】
# display as 八六
# JP: 「燃えが悪いのは、気圧のせいです。双鉄様」
1759 = "「Cháy kém là do áp suất không khí đấy ạ.\nNgài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「気圧――ああ」
1781 = "「Nếu những nhà nghỉ như thế này vẫn còn\ntồn tại không đổi thay——\nThì chắc chắn nhu cầu cũng phải ở mức\ntương đối trở lên rồi.」"

# monologue
# JP: ただそれだけの会話に心底ほっとする。
2418 = "Chỉ một cuộc đối thoại ngắn ngủi vậy thôi\ncũng khiến tôi nhẹ nhõm từ tận đáy lòng."

# monologue
# JP: ハチロクの集中を乱したくない――\nそう思いつつ、返事をせずにはいられなくなる。
2851 = "Tôi không muốn làm Hachiroku mất tập\ntrung——\nDù nghĩ vậy, nhưng tôi không thể không trả\nlời."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、気圧か。\nこれほどの台風の[ただなか,1]只中だものな」
1564 = "「A! Ở trong nhà.——Em nghĩ mấy bé gấu trúc\ncon,\nđã được chuyển vào cơ sở chăn nuôi trong\nnhà rồi ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「っ！」
1910 = "「!」"

# monologue
# JP: ハチロクの背中が一瞬、ビクつく。\n力が入り、妙に強張っているようにも見える。
2275 = "Lưng Hachiroku giật thót trong giây lát.\nCó vẻ như em ấy đang gồng mình, cứng đờ\nmột cách kỳ lạ."

# 【双鉄】
# display as 雙鐵
# JP: 「どうかしたか？」
1671 = "「Tây Qua cảm thấy dạo gần đây thư ký\nKhương và Chí Hoàn cũng có vẻ thân thiết.\nSự nghi ngờ đó, đã đẩy suy nghĩ của Tây\nQua vào một vòng lặp vô tận.」"

# 【ハチロク】
# display as 八六
# JP: 「あっ――あ、いえ。その……\n日々姫たちは、大丈夫かと」
1603 = "「A——A, không ạ. Chuyện là……\nKhông biết Hibiki và mọi người có sao\nkhông.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのことならば心配するな。\n日々姫だけではなく、稀咲もふかみもいるのだ」
1876 = "「Tây Qua đã bị thu hút bởi âm điệu tiếng\nHinomoto mà lão sư học,\nvà từ đó đã có thể giao tiếp bằng tiếng\nHinomoto.」"

# monologue
# JP: 凪がもし、おかしな場所で寝泊まりしたがろうとしても、\n三人寄れば、流されるようなこともあるまい。
2435 = "Khu vực giường nằm của chúng tôi cũng lập\ntức trở nên náo nhiệt.\nMột tiếng chuông hoàn toàn xa lạ vang lên,\nvà loa phát thanh trên tàu bắt đầu thông\nbáo."

# 【双鉄】
# display as 雙鐵
# JP: 「僕らの目と手で、安全性を確かめただろう。\n廃炭鉱の探索に、最適なベースキャンプ地ならば――」
1693 = "「Chúng ta đã tận mắt và tận tay kiểm tra\nsự an toàn rồi mà.\nNếu là địa điểm cắm trại lý tưởng nhất cho\nviệc khám phá mỏ than bỏ hoang thì——」"

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1612 = "「啊」" 

# monologue
# JP: 小さな声がもれると同時に、背中の強張りが消えていく。
2399 = "Cùng lúc với một tiếng kêu nhỏ phát ra, sự\ncăng cứng trên lưng em ấy cũng biến mất."

# 【ハチロク】
# display as 八六
# JP: 「駅舎ですか」
1765 = "「Thế nên, chúng ta cũng vậy!\nPhải hoàn thành thật tốt công việc của\nmình mới được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。あの日得たデータから出た結論を、\n日々姫も稀咲も、確認しているのだからな」
1624 = "「Ở Hinomoto——ngay cả chiến trường cổ Quan\nNgọa Nguyên nổi tiếng,\ncũng hầu như chẳng có ai đến tham quan\ncả.」"

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\nはい――はい」
1788 = "「Đúng vậy ạ.\nVâng——Vâng.」"

# monologue
# JP: よほど心配だったのだろう。\n何度も何度もハチロクは頷く。
2693 = "Chắc hẳn em ấy đã rất lo lắng.\nHachiroku gật đầu hết lần này đến lần\nkhác."

# 【ハチロク】
# display as 八六
# JP: 「日々姫たちは――\n駅で、わたくしたちの到着を待っている」
1743 = "「Hibiki và mọi người——\nđang đợi chúng ta đến ở nhà ga.」"

# monologue
# JP: 噛みしめるようなハチロクの言葉。\nそれはじんわり、僕の心にも染みてくる。
2263 = "Hai người đồng thanh ngắt lời tôi, rồi\nnhìn nhau một lúc,\nSau đó Hibiki đưa mắt nhường lời cho\nHachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな」
1653 = "「Tôi hiểu rồi. Cảm ơn mọi người.\nVậy quyết định thế nhé.」"

# monologue
# JP: 局面自体は簡単なのだと、\n頭がぱちり、切り替わる。
2574 = "Tình hình thực ra rất đơn giản,\nđầu óc tôi chợt bừng tỉnh."

# monologue
# JP: 駅から駅へ、乗客を乗せて届ければいい。\nいつもどおりをやれば問題は解決するのだ。
2332 = "Chỉ cần chở hành khách từ ga này đến ga\nkhác.\nCứ làm như mọi khi là vấn đề sẽ được giải\nquyết."

# 【ハチロク】
# display as 八六
# JP: 「――[きのした,1]木下廃駅、通過！」
1204 = "「——Ga bỏ hoang Kinoshita, đi qua!」"

# 【双鉄】
# display as 雙鐵
# JP: 「[きのした,1]木下廃駅、通過、良し！」
1776 = "「Ga bỏ hoang Kinoshita, đi qua, tốt!」"

# monologue
# JP: はっきりとしたハチロクの\x%l喚呼;#00ffc040;喚呼%l;#;が気合を新たにしてくれる。\n術仙炭鉱廃駅までを安全に乗り切るために――
2258 = "Tiếng \\x%l喚呼;#00ffc040;hô xác nhận%l;#; rõ ràng của Hachiroku đã\ntiếp thêm cho tôi sức mạnh mới.\nĐể vượt qua đoạn đường đến ga mỏ than bỏ\nhoang Jutsusen một cách an toàn——"

# monologue
# JP: 普段と違い、助士ではあるが、\nやるべきことなら、体がきっちり覚えてる。
2849 = "Dù khác với mọi khi, tôi đang làm phụ lái\ntàu,\nnhưng những việc cần làm, cơ thể tôi vẫn\nnhớ rất rõ."

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
1628 = "「Trong 4 tháng đó, thân xe và thiết bị\ntrên chiếc Đông Phú 4 2000 của Tây Qua\nđược tiến hành bảo dưỡng nâng cấp——và\nchúng em đã nhận được công việc trong lúc\nđó.」"

# monologue
# JP: 石炭を軽めに投げ入れて、水面計を確かめる。
2573 = "Tôi xúc than ném vào nhẹ nhàng, rồi kiểm\ntra đồng hồ đo mực nước."

# monologue
# JP: ……ボイラ水位が、下がりすぎてる。\n給水バルブをひねって80\%まで戻す。
1186 = "……Mực nước lò hơi, giảm quá nhiều rồi.\nTôi vặn van cấp nước để đưa nó về lại 80%."

# monologue
# JP: ふたりでも、十分やれるじゃないか。
2347 = "Nhà Migita là xưởng nấu rượu. Không thể\nnuôi thú cưng được. Hồi ở Đường sắt Hoàng\ngia,\nchắc chắn em ấy cũng chẳng có cơ hội tiếp\nxúc với động vật……"

# monologue
# JP: そうやれるよう、積み重ねてきた。\n全てはハチロクが叩き込み、体に覚えさせてくれた。
2725 = "Chúng tôi đã tích lũy kinh nghiệm để có\nthể làm được như vậy.\nTất cả đều do Hachiroku chỉ dạy, và bắt cơ\nthể tôi phải ghi nhớ."

# monologue
# JP: 助士が欠員しようとも、どれほど天候が悪くとも、\n越える準備を、僕は整えてもらって――――ん？
2439 = "Dù có thiếu phụ lái tàu, dù thời tiết có\ntồi tệ đến đâu,\ntôi cũng đã được chuẩn bị sẵn sàng để vượt\nqua――――hửm?"

# monologue
# JP: （水位――うむ？）
2934 = "（Mực nước——hửm?）"

# monologue
# JP: いつもと同じにした筈なのに、水面がやけに高い――\nいやっ！？　いっぱいにまでせり上がってる！
2627 = "Tôi thừa nhận điều đó. Và tự kiểm điểm.\nTôi đã lỡ nói những lời có ý xem thường\nkhi những người trong cuộc không có mặt."

# 【双鉄】
# display as 雙鐵
# JP: 「っ！　そうかっ、これも気圧が――っ！！？」
1614 = "「! Ra là vậy, cái này cũng là do áp suất\nkhông khí——!!?」"

# monologue
# JP: （ボッ！　ボボっ！　ズォボーーーーーーーッツ！！）
2926 = "（Bụp! Bụp! Xìiiiiiiiii!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？」
1475 = "「Dù vậy, công việc vẫn là công việc. Chúng\nta có nhiệm vụ\nđề xuất những phương án khảo sát tốt hơn.」"

# 【ハチロク】
# display as 八六
# JP: 「っ！？」
1915 = "「Đúng vậy.……Vì còn phải chuẩn bị cho việc\nvề nước nữa,\nnên thực tế thì, chúng ta chỉ còn dư dả\nngày mai thôi.」"

# monologue
# JP: 異音！\nすぐさま黒が視界をっ！？
2475 = "Âm thanh lạ!\nNgay lập tức một màu đen che khuất tầm\nnhìn!?"

# monologue
# JP: 前方窓にビシャビシャと、\n真っ黒な雨がぶつかってくるっ！
2656 = "Đập vào cửa sổ phía trước,\nlà những giọt mưa đen ngòm!"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、これはっ」
1878 = "「Tất nhiên, nếu mọi người muốn, chúng tôi\nsẽ cố gắng thương lượng hết sức có thể.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。大丈夫です！　治まります！」
1903 = "「Trời ạ, ngài Soutetsu thật là.」"

# monologue
# JP: 前方注視を解いてまで、\nハチロクは僕へと振り向き、笑ってくれる。
2254 = "Hachiroku thậm chí còn ngừng quan sát phía\ntrước,\nquay lại nhìn tôi và mỉm cười."

# monologue
# JP: 黒い雨はまだ前窓を激しく叩いている。\n見ようとしても、何一つさえ見えないほどに。
2879 = "Cơn mưa đen vẫn đang đập mạnh vào cửa sổ\nphía trước.\nDù có cố nhìn cũng không thể thấy được gì."

# 【ハチロク】
# display as 八六
# JP: 「ただの\x%l汽水共発;#00ffc040;[プライミング,3]汽水共発%l;#;です。\n水が飛びきれば、治まります」
1460 = "「Chỉ là \\x%l汽水共発;#00ffc040;hiện tượng sủi bọt lò hơi%l;#; thôi ạ.\nKhi nước bắn hết ra ngoài, nó sẽ dừng\nlại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「プライミング？」
1784 = "「Sủi bọt lò hơi?」"

# 【ハチロク】
# display as 八六
# JP: 「ボイラ水が溢れたのです。それが蒸気と一緒に膨張し、\n猛烈な勢いで煙突まで抜けて、吹き出た」
1894 = "「Nước lò hơi bị tràn ra ạ. Nó cùng với hơi\nnước giãn nở ra,\nthoát ra ống khói với lực rất mạnh, và\nphun ra ngoài.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あっ――」
1602 = "「Hửm?」"

# monologue
# JP: 失敗をした。足しすぎた。\nいつもどおりのつもりだったが、気圧に影響されて――
2505 = "Cả gấu trúc con lẫn Hachiroku."

# monologue
# JP: （いやっ）
2903 = "（Không）"

# monologue
# JP: “いつもどおり”にやるのなら、\nハチロクに何故、注水の前に確認を取らなかったのか。
2416 = "Nếu làm \"như mọi khi\",\nthì tại sao tôi lại không xác nhận với\nHachiroku trước khi cấp nước."

# monologue
# JP: ――あと少しだと油断した。\n自分の甘さを、いまさらながらに理解する。
2120 = "——Chỉ vì nghĩ sắp đến nơi rồi nên tôi đã\nchủ quan.\nGiờ tôi mới nhận ra sự nông nổi của bản\nthân."

# 【ハチロク】
# display as 八六
# JP: 「そのようなお顔をなさらないでください」
1853 = "「Xin ngài đừng làm vẻ mặt như vậy ạ.」"

# monologue
# JP: 動揺している。\n自分でそうとわかるほど。
2543 = "Nếu không làm được như vậy, Nine Stars sẽ\nkhông thể thành hình.\nVì tất cả đều hiểu rõ điều đó, nên bầu\nkhông khí bỗng chốc trở nên nặng nề."

# monologue
# JP: だからであろう、ハチロクは、\n包み込むような笑顔で僕に、ゆっくりとした言葉をかける。
2157 = "Có lẽ vì vậy mà Hachiroku,\nđã nở một nụ cười bao dung và nói với tôi\nbằng giọng điệu chậm rãi."

# 【ハチロク】
# display as 八六
# JP: 「プライミングなど、ままあることと聞いています。\n実害は、ほとんど発生しないものであるとも」
1727 = "「Em nghe nói hiện tượng sủi bọt lò hơi\ncũng thường xảy ra lắm ạ.\nVà nó cũng hầu như không gây ra thiệt hại\nthực tế nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……そうか」
1241 = "「……Vậy sao.」"

# monologue
# JP: いたわりが、なぐさめが。とても温かに伝わってくる。\nならば自責は……単なる甘えとなってしまおう。
2408 = "Sự quan tâm, lời an ủi. Truyền đến tôi\nthật ấm áp.\nNếu vậy, sự tự trách…… sẽ chỉ là một sự\nnhõng nhẽo đơn thuần thôi."

# monologue
# JP: 悔やむ気持ちを腹でぎゅうっと、最小限に押しつぶす。
2517 = "Chỉ cần được nhìn thấy dáng vẻ này của\nHachiroku,\nthì dù là gấu trúc mà tôi không mấy hứng\nthú cũng trở nên thật đáng yêu."

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。\n同じ失敗は繰り返さぬようにする」
1737 = "「Xin lỗi.\nAnh sẽ không lặp lại sai lầm tương tự\nnữa.」"

# 【ハチロク】
# display as 八六
# JP: 「それはもちろんのことですが――」
1879 = "「Đó là điều tất nhiên rồi ạ, nhưng——」"

# monologue
# JP: 数秒。\n言葉を探すような沈黙。
2404 = "Vài giây.\nMột sự im lặng như thể đang tìm kiếm từ\nngữ."

# 【ハチロク】
# display as 八六
# JP: 「駆け出しの時分にはよく起こす失敗と聞きますので。\n今まで一度も無かったことが、むしろ珍しいかと」
1728 = "「Em nghe nói đây là lỗi thường gặp ở những\nngười mới bắt đầu.\nTừ trước đến nay chưa từng xảy ra một lần\nnào, mới là điều hiếm thấy đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはハチロク。お前のおかげだ」
1882 = "「Đó là nhờ em đấy, Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「え？」
1600 = "「Hừm. Quả là một món quà trời ban.\nNgay cả với đôi tai bình thường như chúng\ntôi, âm thanh cũng mang lại rất nhiều\nthông tin.」"

# monologue
# JP: 単なる事実が証明している。\nそれがよくある失敗ならば、なおのこと。
2162 = "Một sự thật đơn giản đã chứng minh điều\nđó.\nNếu đó là một lỗi thường gặp, thì càng\nchứng minh điều đó."

# monologue
# JP: 僕だけではなく、日々姫も、凪も――\n誰が助士を務めたときにもこんな現象は起こらなかった。
2132 = "Không chỉ tôi, mà cả Hibiki, cả Nagi——\nDù ai làm phụ lái tàu đi chăng nữa, thì\nhiện tượng này cũng chưa từng xảy ra."

# 【双鉄】
# display as 雙鐵
# JP: 「お前が常に、的確な指示をくれるから。\n僕らは失敗らしい失敗もせずやってきたのだ」
1636 = "「Mọi người đánh giá tôi là người lát đường\nray\n……Có lẽ là vì tôi luôn nhìn nhận vấn đề\ndưới góc độ đó chăng.」"

# 【ハチロク】
# display as 八六
# JP: 「いえ、そのような――っ！！？」
1463 = "「Không đâu ạ, làm gì có chuyện——!!?」"

# monologue
# JP: （ガガっ！　ガリリリリっ！）
2924 = "（Két! Két két két két!）"

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？　なんだこれはっ！？」
1476 = "「Cái gì!? Cái gì thế này!?」"

# monologue
# JP: 別の異音――金属音。衝撃音。\n鋼鉄の歯を歯医者のドリルで削るみたいな――
2330 = "Ra vậy. Nghe cô ấy nói thì có lẽ đúng là\nthế."

# 【ハチロク】
# display as 八六
# JP: 「えっ！？　まさかっ！？」
1598 = "「Vâng. Đúng vậy. Anh không nhớ sao? Chú\nnày này.\nLẫn trong những chiếc xe buýt gấu trúc,\ncũng có cả xe buýt của chú ấy nữa.」"

# monologue
# JP: （ガガガっ！　ガガガガガガガっ！！）
2923 = "（Két két két! Két két két két két két\nkét!!）"

# monologue
# JP: 音は止まない。\nむしろますます加熱して――っ！
2746 = "Âm thanh không dừng lại.\nThậm chí còn ngày càng lớn hơn——!"

# 【双鉄】
# display as 雙鐵
# JP: 「油切れかっ！」
1764 = "「Vì vậy, họ muốn đưa những yếu tố giúp\nviệc di chuyển không chỉ đơn thuần là di\nchuyển——\nvào 'Nine Stars phiên bản Trung Quốc'\nsao.」"

# monologue
# JP: 突沸し、煙突から高圧で吹き出し降り注いだボイラ水が、\n駆動部のオイルを根こそぎ洗い飛ばしてしまったのだろう。
2482 = "Chính vì Hibiki biết rõ tôi trong quá khứ,\nmột kẻ luôn từ chối việc \"có hứng thú\" với\nbất cứ thứ gì,\nnên em ấy mới vui mừng trước sự thay đổi\nnày của tôi."

# 【ハチロク】
# display as 八六
# JP: 「そんな……\nこのような事例、ほとんど聞いたことも」
1672 = "「Thư ký Khương rất quan tâm và chú ý đến\nviệc\nđường sắt Hinomoto đang dần được phục\nhưng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「が、起きたのだ。何万分の一であろうと」
1488 = "「Nhưng, nó đã xảy ra rồi. Dù xác suất chỉ\nlà một phần vạn đi chăng nữa.」"

# monologue
# JP: 失敗を起こさぬ能力を有しているがゆえ、\nハチロクは動揺しているようだ。
2362 = "Vì sở hữu năng lực không bao giờ mắc lỗi,\nnên Hachiroku có vẻ đang rất bối rối."

# monologue
# JP: このままいけば\x%l8620;#00ffc040;8620%l;#;は、焼きつきを起こし壊れてしまう。\nならば、取るべき手段はひとつしかない。
2821 = "Nếu cứ để thế này, \\x%l8620;#00ffc040;8620%l;#; sẽ bị kẹt động cơ\nvà hỏng mất.\nNếu vậy, chỉ còn một cách duy nhất."

# 【ハチロク】
# display as 八六
# JP: 「っ！！？\n双鉄様、代わってください！　わたくしが」
1914 = "「!!?\nNgài Soutetsu, xin hãy đổi chỗ cho em! Em\nsẽ」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、だめだ。僕が行く」
1454 = "「Được Hachiroku khen như vậy, Tây Qua thấy\ntự tin hơn hẳn.\nBởi vì tiếng Hinomoto của Hachiroku nghe\nrất trong trẻo và mềm mại.」"

# 【ハチロク】
# display as 八六
# JP: 「危険すぎます！　生身の人間がそのような」
1855 = "「Quá nguy hiểm ạ! Một con người bằng xương\nbằng thịt sao có thể」"

# 【双鉄】
# display as 雙鐵
# JP: 「お前とて、転落すれば壊れよう。\nお前が壊れてしまっては、\x%l8620;#00ffc040;8620%l;#;はもう走れない」
1520 = "「Cả em nữa, nếu ngã xuống thì cũng sẽ hỏng\nmất.\nNếu em bị hỏng, \\x%l8620;#00ffc040;8620%l;#; sẽ không thể chạy\nđược nữa.」"

# 【ハチロク】
# display as 八六
# JP: 「ですがっ！」
1490 = "「Nhưng mà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕はオーナーでマスターだ」
1714 = "「Anh là chủ sở hữu và là Master.」"

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 1910 = "「！」" 

# monologue
# JP: 行かせられない。\n行かせない。
2149 = "Không thể để em ấy đi được.\nTôi sẽ không để em ấy đi."

# monologue
# JP: もしもハチロクが壊れたら、\n僕とて、恐らく歩けなくなる。
2412 = "Chí Hoàn trao đổi ngắn gọn vài câu,\nrồi nở nụ cười nhẹ nhõm."

# 【双鉄】
# display as 雙鐵
# JP: 「命令をする。\nハチロク。このまま、運転を維持するんだ」
1699 = "「Đây là mệnh lệnh.\nHachiroku. Cứ như vậy, duy trì việc lái\ntàu đi.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！？」
1905 = "「Năng động thật đấy.」"

# monologue
# JP: 続く言葉を待ちはせず、\n\x%l歩き板;#00ffc040;歩き板%l;#;へと身をおどらせる。
2552 = "Cả nét mặt lẫn giọng nói đều tươi rói.\nĐúng là một cục năng lượng vui vẻ."

# monologue
# JP: （ゴウっ！！！！）
2916 = "（Vùuuu!!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！？」
1592 = "「Vâng! Đúng thế nhỉ!\nĐược rồi, em cũng phải gọt thật nhiềềều\nbút chì mới được.」"

# monologue
# JP: ――これこそ、まさに暴風だ。
1161 = "——Đây mới thực sự là cuồng phong."

# monologue
# JP: 風に曝され殴りつけられ、\n言葉の意味を、体で思い知らされる。
2489 = "Bị gió quật vào người,\ntôi mới hiểu được ý nghĩa của từ đó bằng\nchính cơ thể mình."

# 【双鉄】
# display as 雙鐵
# JP: 「普段で、あれば――なんてことはない――\n距離――なのにっ――」
1744 = "「Bình thường, thì——chẳng là gì cả——\nKhoảng cách này——vậy mà——」"

# monologue
# JP: キャブから、ほんの数メートル先。\n\x%l缶胴;#00ffc040;缶胴%l;#;右側、デフのすぐ後――\x%lオイルポンプ;#00ffc040;オイルポンプ%l;#;はそこにある。
2854 = "Cách buồng lái chỉ vài mét.\nBên phải \\x%l缶胴;#00ffc040;thân lò%l;#;, ngay sau tấm chắn khói——\\x%lオイルポンプ;#00ffc040;bơm dầu%l;#;\nnằm ở đó."

# 【双鉄】
# display as 雙鐵
# JP: 「く、そ――」
1850 = "「Chết, tiệt——」"

# monologue
# JP: \x%l缶掴み棒;#00ffc040;[ハンドレール,3]缶掴み棒%l;#;を握る手が、\n\x%l歩き板;#00ffc040;歩き板%l;#;に乗る足が、滑る。滑りに滑る。
2534 = "Sau đó, cô bé thẳng lưng lên,\nvà quay sang đối diện trực tiếp với Chí\nHoàn."

# monologue
# JP: 飛んだオイルが、そこにも恐らく乗っているのだ。
2772 = "Chắc hẳn là dầu bắn ra cũng đã dính vào đó\nrồi."

# 【双鉄】
# display as 雙鐵
# JP: 「くそっ！！！！」
1585 = "「A. Ngài Soutetsu.」"

# monologue
# JP: 鉄の臭い。油の臭い。風の音。雨の音。\n一瞬にして冷えきる体は、あの時を思い出している。
2840 = "Mùi sắt. Mùi dầu. Tiếng gió. Tiếng mưa.\nCơ thể lạnh toát trong chớp mắt, lại nhớ\nvề khoảnh khắc đó."

# monologue
# JP: だが、震えたなら、僕は死ぬ。\nならば心で、体を抑える。
2200 = "Nhưng, nếu run rẩy, tôi sẽ chết.\nVậy thì phải dùng lý trí để khống chế cơ\nthể."

# 【双鉄】
# display as 雙鐵
# JP: 「今度は――この手を――\n今度こそっ――絶対、この手を離さんぞっ！」
1881 = "「Lần này——đôi tay này——\nLần này chắc chắn——tuyệt đối, sẽ không\nbuông tay đâu!」"

# monologue
# JP: じり、じり、進む。\n\x%l歩き板;#00ffc040;歩き板%l;#;から足を浮かせず、にじるようにして進んでく。
2525 = "Từng chút, từng chút một, tôi tiến lên.\nChân không rời khỏi \\x%l歩き板;#00ffc040;bệ bước chân%l;#;, tôi\nnhích từng bước về phía trước."

# 【双鉄】
# display as 雙鐵
# JP: 「路子が――掴ませてくれた、命なんだ」
1880 = "「Michi——đã trao cho tôi, sinh mệnh này.」"

# monologue
# JP: ようやく、僕は理解する。
2569 = "Cuối cùng, tôi cũng đã hiểu."

# monologue
# JP: 路子は僕を突き放し――\n空いた手に、命を渡してくれてたのだと。
2795 = "Michi đã đẩy tôi ra——\nvà trao sinh mệnh này vào bàn tay trống\nrỗng của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクと――出会わせてくれた命なんだ」
1887 = "「Sinh mệnh đã giúp tôi——được gặp gỡ\nHachiroku.」"

# monologue
# JP: そして、進む一歩ごとに思い知る。
2671 = "Và rồi, mỗi bước tiến lên, tôi lại càng\nthấm thía."

# monologue
# JP: 僕はこれほど――\n生を、望んでいるのだと。
2545 = "Tôi khao khát——\nđược sống đến nhường này."

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
1645 = "「Được rồi!」"

# monologue
# JP: ようやくデフのすぐ後ろにまで辿り着く。\nだが、慌てない。慌てれば死ぬ。
2736 = "Cuối cùng tôi cũng đến được ngay sau tấm\nchắn khói.\nNhưng, không được hoảng hốt. Hoảng hốt là\nchết."

# monologue
# JP: ゆっくりゆっくり右手を離し、\n\x%lオイルポンプ;#00ffc040;オイルポンプ%l;#;の扉を開けて、中のハンドルに手をかける。
2529 = "Từ từ, từ từ buông tay phải ra,\nmở cửa \\x%lオイルポンプ;#00ffc040;bơm dầu%l;#;, rồi đặt tay lên tay cầm\nbên trong."

# 【双鉄】
# display as 雙鐵
# JP: 「ン――くっ！」
1620 = "「Ư——hự!」"

# monologue
# JP: 片手でハンドルを回して、回して――
2532 = "Một tay xoay tay cầm, xoay mãi——"

# monologue
# JP: やがて。\n異音が聞こえなくなる。
2128 = "Rồi cuối cùng.\nTiếng động lạ cũng biến mất."

# 【双鉄】
# display as 雙鐵
# JP: 「やったぞ――ハチロク」
1674 = "「Lần đầu tiên thư ký Khương đến gặp lão sư\nvà Tây Qua là vào 5 năm trước.\nVì nhận thấy có sự khác thường rõ rệt\ntrong báo cáo, nên cô ấy đến để xác nhận.」"

# monologue
# JP: やっとの思いで油を戻した。\nここで油断をしたなら、馬鹿だ。
2410 = "Phải khó khăn lắm mới bơm dầu lại được.\nNếu lúc này mà chủ quan thì đúng là đồ\nngốc."

# monologue
# JP: キャブへと戻る手も足も、\nだからいっそう、慎重になる――
2585 = "Cả tay và chân khi quay lại buồng lái,\nvì thế mà càng trở nên thận trọng hơn——"

# 【双鉄】
# display as 雙鐵
# JP: 「――ぅはっ！」
1196 = "「——Ư hự!」"

# monologue
# JP: キャブへと、文字通り倒れこむ。
2568 = "Tôi ngã nhào vào buồng lái, đúng nghĩa\nđen."

# monologue
# JP: 息が出来ない、目がくらむ。\n濡れて冷えきり、体がひどく重く感じる。
2556 = "Không thở nổi, hoa mắt chóng mặt.\nCơ thể ướt sũng và lạnh toát, nặng trĩu vô\ncùng."

# 【ハチロク】
# display as 八六
# JP: 「双鉄……さまっ――」
1902 = "「Ngài Soutetsu……——」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1912 = "「!!?」"

# monologue
# JP: それでも一気に跳ね起きる。\nハチロクが――
2194 = "Dù vậy tôi vẫn bật dậy ngay lập tức.\nHachiroku đang——"

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、ハチロク」
1512 = "「Sao vậy, Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしっ――わたくしには――\nむり――ですっ――もう、無理っ――」
1679 = "「Em——em không thể——\nLàm được——đâu ạ——không thể, nữa rồi——」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1912 = "「！！？」" 

# monologue
# JP: 運転姿勢のそのままで、前方注視を崩さぬままで――\nハチロクは、ぼろぼろと泣いている。
2253 = "Vẫn giữ nguyên tư thế lái tàu, vẫn không\nngừng quan sát phía trước——\nHachiroku đang khóc nức nở."

# monologue
# JP: 涙を床にぼとぼと落とし、\nそうしながらも、\x%l加減弁;#00ffc040;加減弁%l;#;テコを制御している。
2648 = "Những giọt nước mắt rơi lã chã xuống sàn,\ndù vậy em ấy vẫn đang điều khiển cần gạt \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;\n."

# 【ハチロク】
# display as 八六
# JP: 「無理――ですっ――\n運転を、維持、するっ、などっ――」
1867 = "「Nếu việc sắp xếp hành lý khó khăn quá,\nmọi người cứ thoải mái sử dụng giường tầng\ntrên nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクっ！」
1546 = "「À——ra vậy.\nĐôi tai của Tây Qua cũng được mài giũa qua\nnhững sở thích như thế sao.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄――様、までっ――\nわたくしを――置いて――いって――しまう、かとっ」
1688 = "「Dù không được bế thì em vẫn muốn đi thử!\nCơ hội được nhìn thấy nhiều gấu trúc cùng\nlúc hiếm lắm đấy!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1911 = "「!!!」"

# monologue
# JP: ああ、そうだ。\nハチロクも置き去りにされているのだ。
2426 = "À, đúng rồi.\nHachiroku cũng từng bị bỏ lại."

# monologue
# JP: 事故の、そのあと。\x%l機関士;#00ffc040;機関士%l;#;からも仲間からも。\n同じ時間を過ごした存在、全てから――
2368 = "Sau vụ tai nạn đó. Từ \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; cho\nđến những người đồng đội.\nTừ tất cả những người đã cùng chung sống\ntrong khoảng thời gian đó——"

# 【ハチロク】
# display as 八六
# JP: 「わたくし――はっ――\nもう――誰もっ――なくしたく――などっ――」
1676 = "「Em——đã——\nKhông muốn——mất đi——bất kỳ ai——nữa đâu——」"

# monologue
# JP: 突き刺さってくる。泣き声が。\nハチロクも僕と同じなのだと、ようやく、わかる。
2407 = "Tiếng khóc ấy. Đâm xuyên qua tôi.\nCuối cùng, tôi cũng hiểu ra rằng,\nHachiroku cũng giống như tôi."

# monologue
# JP: 救えなかった苦しみを、死なせてしまった苦しみを。\nあの日から――ずっと、抱え続けているのだと。
2459 = "Nỗi đau khổ vì không thể cứu được, nỗi đau\nkhổ vì đã để họ chết đi.\nTừ ngày hôm đó——em ấy vẫn luôn ôm giữ\ntrong lòng."

# 【ハチロク】
# display as 八六
# JP: 「わたくしを――置き去りに――どうか――しないでっ」
1852 = "「Để có thể lắng nghe trọn vẹn và chân thực\nnhất giọng nói của Chí Hoàn.\nHãy loại bỏ từng chút một những tạp âm bên\ntrong và xung quanh Tây Qua.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク……僕は……」
1541 = "「Hửm? À, không……Nếu xét theo khía cạnh đó,\nthì việc chỉ có Hibiki ở lại thêm vài\nngày——」"

# monologue
# JP: 頼りきっていた。甘ったれていた。\nこんなに小さなハチロクに。
2484 = "Hibiki gật đầu.\nMạnh đến mức làm chiếc giường lún sâu\nxuống."

# monologue
# JP: 大の男である僕が、自分の不安に耐え切れず――\nそれをまるごと、押し付けていた。
2797 = "Một thằng đàn ông to xác như tôi, lại\nkhông thể chịu đựng nổi sự bất an của\nchính mình——\nvà trút toàn bộ lên em ấy."

# monologue
# JP: （今まで、ずっとだ――\n無自覚に……僕は、ずうっとそうし続けてた）
2904 = "（Từ trước đến nay, vẫn luôn như vậy——\nMột cách vô thức…… tôi đã luôn tiếp tục\nlàm như vậy.）"

# monologue
# JP: 終着駅に着いてないのは、\nそこまで、たどり着けなかったのは――
2538 = "Việc chưa đến được ga cuối,\nviệc không thể đi đến tận cùng——"

# monologue
# JP: ハチロクも同じなのだと、知っていたのに。
2247 = "Dù tôi biết rằng, Hachiroku cũng giống như\nmình."

# 【ハチロク】
# display as 八六
# JP: 「もう、これ以上――ひとり――で、なんて」
1457 = "「Chuyện đó cũng bình thường mà. Còn với\nem,\nem chỉ đơn giản là muốn nhìn thấy tất cả\nnhững gì lọt vào tầm mắt thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1543 = "「À——」"

# monologue
# JP: 僕が押し付けた全てを受け止め、\nハチロクは支えてくれていた。
2265 = "Hachiroku đã đón nhận tất cả những gì tôi\ntrút lên,\nvà luôn chống đỡ cho tôi."

# monologue
# JP: いま、ハチロクが崩れてしまいそうならば、\n今度は僕が、支えたい。
2609 = "Nếu nói về \"cơ bản\", thì từ lúc tôi còn là\nmột tờ giấy trắng cho đến tận bây giờ,\nHachiroku vẫn luôn không ngừng nhồi nhét\nnó vào từng tế bào của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「一人じゃない。僕も、お前も」
1508 = "「Ôi! Ufufufu.\nNếu vậy chắc chắn phải dùng vé bằng lá\ntrúc rồi nhỉ.」"

# monologue
# JP: だから、後から抱きしめる。\n抱きしめて、ハチロクの手を手で包み込む。
2589 = "Thế nên, tôi ôm em ấy từ phía sau.\nÔm lấy em ấy, và dùng tay mình bao bọc lấy\nđôi tay của Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「もう一人じゃない。一人じゃないんだ。\n僕がいて、お前がいるから――ここにいるから」
1509 = "「Em không còn cô đơn nữa. Không cô đơn\nđâu.\nVì có anh, có em——vì chúng ta đang ở đây.」"

# monologue
# JP: 割り切ろうとして割り切れず。\n忘れようとして忘れられずに。
2480 = "Cố gắng dứt bỏ nhưng không thể dứt bỏ.\nCố gắng lãng quên nhưng không thể lãng\nquên."

# monologue
# JP: 傷の痛みは、きっと同じで。\nでもハチロクはその苦しさを、一度も僕に見せなかった。
2500 = "Nỗi đau của vết thương, chắc chắn là giống\nnhau.\nNhưng Hachiroku chưa một lần nào cho tôi\nthấy sự đau khổ đó."

# monologue
# JP: （僕がいたから、ハチロクは……\n事故の苦しみを、吐き出せなかった――）
2933 = "（Vì có tôi ở đó, nên Hachiroku……\nđã không thể trút bỏ nỗi đau khổ về vụ tai\nnạn——）"

# monologue
# JP: それがどれほどの苦痛であるか、\n僕は、誰より知っている。
2547 = "Nỗi đau đó lớn đến nhường nào,\ntôi là người hiểu rõ hơn ai hết."

# monologue
# JP: その苦しみをどう扱えばいいものか、\nようやく、僕は知れたと思う。
2558 = "Tôi nghĩ cuối cùng mình cũng đã biết,\nphải đối mặt với nỗi đau đó như thế nào."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――\nこの勾配の向こうの景色が、お前にも見えるよな」
1539 = "「Ưm……Sự quan tâm của mình, hay ánh mắt của\nmình rốt cuộc đang hướng về đâu,\ntrước giờ tôi chưa từng bận tâm đến.」"

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 1910 = "「！」" 

# monologue
# JP: ハチロクの体が硬くなる。\n怯えに、ぶるぶる震え始める。
2282 = "Cơ thể Hachiroku cứng đờ.\nBắt đầu run lẩy bẩy vì sợ hãi."

# monologue
# JP: それでも手指は迷わず動く。\n\x%l加減弁;#00ffc040;加減弁%l;#;を。ブレーキを。重ね合う手で操作する。
2187 = "Dù vậy, những ngón tay vẫn cử động không\nchút do dự.\n\\x%l加減弁;#00ffc040;Van tiết lưu hơi%l;#;. Phanh hãm. Điều khiển\nbằng đôi bàn tay đan vào nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「あそこを越えれば到着できる。\n日々姫が、そこで待っているんだ」
1582 = "「Vượt qua chỗ đó là chúng ta sẽ đến nơi.\nHibiki đang đợi ở đó.」"

# monologue
# JP: 雨は少しも緩んでくれず。\n視界は、ほとんど遮られている。
2859 = "Mưa không hề ngớt đi chút nào.\nTầm nhìn gần như bị che khuất hoàn toàn."

# monologue
# JP: それでも僕らは、見えずとも見る。\nクマ川第四橋梁を――赤くか細い鉄橋を。
2189 = "Dù vậy, chúng tôi vẫn nhìn thấy dù không\nthể thấy.\nCây cầu thứ tư trên sông Kuma——cây cầu sắt\nmàu đỏ mỏng manh."

# 【ハチロク】
# display as 八六
# JP: 「わたくし――には――むりっ」
1680 = "「Em——không thể——làm được」"

# monologue
# JP: ガタガタと、ハチロクの震えは止まらない。\n涙は、もはや川のようだ。
2283 = "Tôi không ngờ tên của Hachiroku lại được\nnhắc đến ở đây."

# 【ハチロク】
# display as 八六
# JP: 「見えま――せんっ――\nだって――橋は――あの、橋はっ！」
1724 = "「Sao vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1789 = "「Ừ.」"

# monologue
# JP: 涙に揺れる瞳はきっと、過去を見ている。\n僕らはずっと、そうすることを強いられてきた。
2402 = "Đôi mắt đẫm lệ đó chắc chắn đang nhìn về\nquá khứ.\nChúng tôi đã luôn bị ép buộc phải làm như\nvậy."

# 【双鉄】
# display as 雙鐵
# JP: 「あの橋を、あの過去を。\n僕も同じだ。越えられなかった」
1684 = "「Đúng rồi! Ngôi nhà cũ của nhà thơ đó đã\ntrở thành di tích lịch sử,\nvà khu vực xung quanh cũng được quy hoạch\nthành công viên thu hút khách du lịch luôn\nđó.」"

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 1910 = "「！」" 

# monologue
# JP: 救えなかった悲しみは、殺してしまった悲しみは、\n一生、消えることはない。
2658 = "Nỗi buồn vì không thể cứu được, nỗi buồn\nvì đã giết chết họ,\nsẽ không bao giờ biến mất trong suốt quãng\nđời còn lại."

# monologue
# JP: 割り切ることも忘れることも決してできないことなのだと、\n僕は何度も。何度も何度も、何度も思い知らされた。
2520 = "Tôi đã nhiều lần. Rất nhiều lần, vô số lần\nnhận ra rằng,\nđó là điều tuyệt đối không thể dứt bỏ,\ncũng không thể lãng quên."

# 【双鉄】
# display as 雙鐵
# JP: 「だがな。ハチロク」
1489 = "「Nhưng mà. Hachiroku.」"

# monologue
# JP: 体を預ける。密着させる。\n僕とハチロクの身体の熱を、交換しあう。
2566 = "Tôi tựa hẳn người vào em ấy. Áp sát vào\nnhau.\nTrao đổi hơi ấm cơ thể giữa tôi và\nHachiroku."

# monologue
# JP: 届くと知ってる。聞こうと、いつでもしてくれるから。\nたとえハチロクがどれほどに、怯え竦んでしまっていても。
2148 = "Tôi biết là sẽ truyền đến được. Vì em ấy\nluôn sẵn sàng lắng nghe.\nDù cho Hachiroku có đang sợ hãi co rúm lại\nđến mức nào đi chăng nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「僕らは、ふたりだ」
1694 = "「Công việc?」"

# monologue
# JP: ひとりじゃない。
2498 = "Không phải một mình."

# monologue
# JP: かつての路子と僕とのように、\n半身をわけあったものじゃない。
2134 = "Không giống như tôi và Michi ngày trước,\nkhông phải là hai nửa chia sẻ cùng một cơ\nthể."

# 【双鉄】
# display as 雙鐵
# JP: 「ひとりでは決して出来ないことが――\nふたりだったら、できるんだ」
1659 = "「Những điều mà một người tuyệt đối không\nthể làm được——\nNếu là hai người, thì sẽ làm được.」"

# monologue
# JP: 教えてくれたのはハチロクだ。
2268 = "Hachiroku khẽ nín thở.\nNhưng, cũng chỉ có vậy thôi."

# monologue
# JP: もしも忘れてしまっているなら、思い出させるだけでいい。
2413 = "Nếu em ấy đã quên, thì tôi chỉ cần nhắc\nlại cho em ấy nhớ là được."

# 【双鉄】
# display as 雙鐵
# JP: 「お前は、あの橋を越えられなかった。\n僕は、あの橋を越えられなかった」
1523 = "「!!!」"

# monologue
# JP: そして死なせた。救えなかった。
2670 = "Và rồi đã để họ chết. Không thể cứu được."

# monologue
# JP: ついてしまった傷は一生消えないし。\n今も未来も、ことあるごとに血を流していくことだろう。
2361 = "Sự thư giãn trước khi đến nơi,\nnhư thể đã hòa tan mọi công việc và vị thế\ntrong chốc lát."

# 【双鉄】
# display as 雙鐵
# JP: 「だから、越えたい。あの橋を」
1735 = "「Người phải nói lời cảm ơn là Tây Qua mới\nđúng. Hôm đó trời mưa phùn,\ntình cờ lại trở thành chuyến đi thuyền bao\ntrọn gói chỉ dành riêng cho nhóm Tây Qua.」"

# 【ハチロク】
# display as 八六
# JP: 「…………っ」
# 1222 = "「…………」" 

# monologue
# JP: 手が動く。
2501 = "Đôi tay cử động."

# monologue
# JP: 僕の手と、ハチロクの手と。\n重なりあって、同時に動く。
2563 = "Bàn tay của tôi, và bàn tay của Hachiroku.\nĐan vào nhau, và cùng lúc cử động."

# 【双鉄】
# display as 雙鐵
# JP: 「越えよう。今日こそ。\n僕と、お前で――僕らふたりで」
1481 = "「Cùng vượt qua nào. Chính hôm nay.\nAnh và em——hai chúng ta.」"

# monologue
# JP: ぐ、と。ハチロクの喉が動く。
2272 = "Hachiroku và Hibiki đồng thanh reo lên,\nrồi cả hai ngạc nhiên\nnhìn nhau và cùng nở nụ cười bẽn lẽn."

# monologue
# JP: 何かを飲み干し――\n代わりに、切れ切れの声を吐く。
2353 = "A, chuyện này——mình lại lỡ lời rồi sao.\nChưa kịp nghĩ xong, một giọng nói sắc lẹm\nđã bay tới."

# 【ハチロク】
# display as 八六
# JP: 「は……いっ」
1639 = "「Vâ……ng.」"

# monologue
# JP: 割り切れない。忘れられない。\n許されはしない。許しもできない。
2659 = "Không thể dứt bỏ. Không thể lãng quên.\nSẽ không được tha thứ. Cũng không thể tha\nthứ."

# monologue
# JP: けれども確かに、そうした過去が今を作った。\n事故があるから、僕らふたりは、今ここにいる。
2186 = "Nhưng chắc chắn, quá khứ đó đã tạo nên\nhiện tại.\nVì có vụ tai nạn đó, nên hai chúng tôi mới\nở đây lúc này."

# 【双鉄】
# display as 雙鐵
# JP: 「他に何もしなくていい。\nただひとつだけを、すればいい」
1555 = "「Ừ.」"

# monologue
# JP: 上り勾配にさしかかる。\n\x%l粘着力;#00ffc040;粘着力%l;#;が、きっと足りない。
2294 = "Sắp tiến vào đoạn dốc lên.\n\\x%l粘着力;#00ffc040;Lực bám đường%l;#;, chắc chắn là không đủ."

# monologue
# JP: \x%l砂撒き;#00ffc040;砂撒き%l;#;コックで砂を吐き出し、\x%l動輪;#00ffc040;動輪%l;#;がそれを超えると同時、\n排水で砂を流してしまう。
2682 = "Dùng van \\x%l砂撒き;#00ffc040;phun cát%l;#; để xả cát ra, đồng thời\nkhi \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; vượt qua nó,\nsẽ dùng nước xả để cuốn trôi cát đi."

# 【双鉄】
# display as 雙鐵
# JP: 「――あの橋だ」
1193 = "「——Cây cầu đó kìa.」"

# monologue
# JP: 見えてくる。\n坂の向こうに。雨の向こうに。
2827 = "Dần hiện ra.\nPhía bên kia con dốc. Phía sau màn mưa."

# monologue
# JP: 赤はおぼろに溶けゆくようで、\n頼りなく……いっそ、今にも落ちそうで。
2828 = "Sắc đỏ như đang tan chảy mờ ảo,\nmong manh…… đến mức tưởng như sắp sập\nxuống bất cứ lúc nào."

# 【双鉄】
# display as 雙鐵
# JP: 「あの日の橋を。\n僕と、お前で――」
1856 = "「Cây cầu của ngày hôm đó.\nAnh và em——」"

# 【ハチロク】
# display as 八六
# JP: 「は、い――双鉄、様」
1642 = "「Vâ, ng——ngài Soutetsu.」"

# monologue
# JP: だが、怯えない。\n僕もハチロクも、もう怯えない。
2488 = "Nhưng, chúng tôi không sợ hãi.\nCả tôi và Hachiroku, sẽ không sợ hãi nữa."

# monologue
# JP: 僕らはふたりと、知っているから。\nそう出来るのだと、知っているから。
2363 = "Giữa đám đông chen lấn, em ấy cứ chạy lăng\nxăng như bị cuốn theo dòng người,\ncố gắng tiến lại gần gấu trúc thêm một\nchút."

# 【ハチロク】
# display as 八六
# JP: 「わた、くしと。双鉄、様、とで――」
1703 = "「E, m và. Ngài Soutetsu, cùng nhau——」"

# monologue
# JP: 重なっている。\n手だけではなく、体だけじゃなく、言葉も、心も。
2499 = "Trong trẻo, và còn mềm mại nữa.\nRa vậy, nghe cô bé nói thế mới thấy giọng\ncủa Hachiroku đúng là như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。僕達で。\n僕ら、ふたりで」
1652 = "「Tôi đã hiểu. Vậy thì……」"

# monologue
# JP: だから、僕らはそうできる。\nふたりでいるから――そうできている。
2580 = "Tây Qua dáo dác nhìn quanh.\nSau đó, cô bé xích lại gần tôi, vẻ như\nmuốn nói điều gì đó."

# 【双鉄】
# display as 雙鐵
# JP: 「――乗り越えるんだ」
1198 = "「——Sẽ vượt qua.」"

# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2918 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch——）"

# monologue
# JP: あっけないほど、軽い音。\nいつか、遠くに聞いた音。
2800 = "Một âm thanh nhẹ nhàng đến mức ngỡ ngàng.\nÂm thanh đã từng nghe thấy ở một nơi xa\nxăm nào đó."

# monologue
# JP: もう、減速に入ってる。\nあとは、惰力で――何もせずとも、辿り着く。
2446 = "Viết ra tất cả các yếu tố một lần nữa,\nnhìn lại và suy nghĩ lại từ đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「ほら、出来た」
1829 = "「Thấy chưa, làm được rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「あ……はっ――んっ――\nあ、はい――できまし、た」
1608 = "「A……ha——ưm——\nA, vâng——làm được, rồi ạ.」"

# monologue
# JP: ばしばし、何度もまばたきをする。\nそうして、涙を弾いて飛ばす。
2685 = "Em ấy chớp mắt liên tục nhiều lần.\nRồi, gạt đi những giọt nước mắt."

# 【ハチロク】
# display as 八六
# JP: 「できました――わたくしたちは――\n越え、ましたっ！」
1529 = "「Ồ! Thật là……có vẻ rất thú vị——\nÀ không——nói một cách không hoa mỹ thì, đó\nthực sự là một chuyến đi rất vui vẻ nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。越えたな」
1626 = "「Ừm. Vượt qua rồi.」"

# monologue
# JP: 朽ちたホームへの入線は、いつもよりさらに遅く感じる。
2206 = "Việc tiến vào sân ga mục nát, có cảm giác\nchậm hơn mọi khi."

# 【ハチロク】
# display as 八六
# JP: 「え！？」
1595 = "「Hửm!?」"

# monologue
# JP: 瞬間、何かが駆け出してくる。\n凪だ。あれではずぶぬれになる。
2704 = "Khoảnh khắc đó, có thứ gì đó lao ra.\nLà Nagi. Thế kia thì ướt sũng mất thôi."

# monologue
# JP: その向こう、日々姫と稀咲と、ふかみ。\n――やはりだ、みんな、ここにいた。
2739 = "Phía sau em ấy, là Hibiki, Kisaki và\nFukami.\n——Quả nhiên là, mọi người đều ở đây."

# 【双鉄】
# display as 雙鐵
# JP: 「だから、帰ろう。御一夜に」
1733 = "「Em cảm thấy tất cả những gì mình nhìn\nthấy đều là những thiết kế tuyệt mỹ.\nNhưng mà——a, ngài Soutetsu, nhưng mà,\nnhưng mà!」"

# 【ハチロク】
# display as 八六
# JP: 「左様ですね、双鉄様」
1644 = "「Đến mức đó sao.」"

# monologue
# JP: ん、とハチロクが考えこむ。\nいつもそうしているように。
2262 = "Không có bất kỳ kiến thức chuẩn bị nào.\nNói cách khác, đây là một chuyến đi tới\nđâu hay tới đó."

# 【ハチロク】
# display as 八六
# JP: 「日々姫たちの健康状態に問題なければ、\n多少、時間がかかっても――」
1839 = "「Lịch sử——kiểu như đi tham quan các di\ntích lịch sử và danh lam thắng cảnh sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、[ゆのい,1]湯医の\x%l三角線;#00ffc040;[さんかくせん,2]三角線%l;#;まで行ってしまう方が安全だ。\nそこから折り返して、前を向いて御一夜へ帰ろう」
1754 = "「Em nghĩ là có đấy. Đặc biệt là thế hệ\ntrẻ——\nDù có tuyến đường sắt, nhưng xu hướng là\nhọ không sử dụng chúng.」"

# 【ハチロク】
# display as 八六
# JP: 「はいっ！」
1767 = "「Vâng ạ!」"

# monologue
# JP: そうして、笑顔。\nいつもよりずっと晴れやかな。
2667 = "Và rồi, một nụ cười.\nRạng rỡ hơn mọi khi rất nhiều."

# 【凪】
# display as 凪
# JP: 「開けて開けて開けて開けて！\n濡れるばい濡れるばい濡れるばい！」
1898 = "「Mở cửa mở cửa mở cửa mở cửa!\nƯớt hết rồi ướt hết rồi ướt hết rồi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと！」
1633 = "「Ây da!」"

# monologue
# JP: このために\x%l客車;#00ffc040;客車%l;#;を引いてきた。
2432 = "Kéo theo \\x%l客車;#00ffc040;toa hành khách%l;#; là vì mục đích này\nđây."

# monologue
# JP: ハチロクもすぐ、\n\x%l客車;#00ffc040;客車%l;#;ドアの鍵をポケットから出す。
2250 = "Hachiroku cũng lập tức,\nlấy chìa khóa cửa \\x%l客車;#00ffc040;toa hành khách%l;#; từ trong\ntúi ra."

# 【双鉄】
# display as 雙鐵
# JP: 「思わぬところで、ストーブが役に立つものだな」
1771 = "「Lò sưởi lại hữu ích ở những nơi không ngờ\ntới nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「うふふ、左様ですね」
1588 = "「Ufufu, đúng vậy ạ.」"

# monologue
# JP: 御一夜駅に無事に帰り着くまで、\nゆっくり休んで、温まり乾かしておけばいい。
2372 = "Cho đến khi bình an trở về ga Ohito,\ncứ thong thả nghỉ ngơi, sưởi ấm và hong\nkhô người là được."

# monologue
# JP: 御一夜駅に戻ったのなら、どれほど乾かしておいたとて。\nそこからぎゅうぎゅう、更に絞られるのだろうから。
2355 = "Nhưng khi về đến ga Ohito rồi, thì dù có\nhong khô đến mức nào đi nữa.\nChắc chắn sẽ bị vắt kiệt sức thêm nữa\nthôi."

# 【元忠】
# display as 元忠
# JP: 「馬鹿者がっ！」
1801 = "「Đến sớm thì sẽ có thêm nhiều thời gian để\nngắm gấu trúc mà.\nEm cũng ủng hộ quyết định đó ạ.」"

# monologue
# JP: （パンっ！！！）
2922 = "（Bốp!!!）"

# monologue
# JP: 乾ききった音。\n痛みが伝わってきそうな程に。
2449 = "Một âm thanh khô khốc.\nĐến mức như có thể cảm nhận được nỗi đau\ntruyền đến."

# monologue
# JP: 場の殆どの人間は身体を竦めて目を閉じて――\nしかし、叩かれた当人のみは、身動ぎひとつみせはしない。
2371 = "Hầu hết những người có mặt ở đó đều co rúm\nngười lại và nhắm nghiền mắt——\nNhưng, người bị đánh lại không hề nhúc\nnhích."

# 【稀咲】
# display as 稀咲
# JP: 「言い訳はしない。これは、ボクの責任だ」
1682 = "「Sợ điều gì——điều gì……」"

# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩っ――っ！」
1834 = "「Tiền bối Kisaki——!」"

# monologue
# JP: 飛び出しかけた日々姫を稀咲は視線で制する。
2723 = "Kisaki dùng ánh mắt ngăn cản Hibiki đang\nđịnh lao ra."

# monologue
# JP: そして深々――\n僕らへ向けて、頭を下げる。
2672 = "Rồi cúi gập người——\nhướng về phía chúng tôi, cúi đầu tạ lỗi."

# 【稀咲】
# display as 稀咲
# JP: 「どうしてもアイディアが欲しかった。\nその焦りに、みんなを付き合わせて巻き込んでしまった」
1721 = "「Tớ thực sự rất muốn có ý tưởng.\nSự nóng vội đó đã kéo theo và liên lụy đến\nmọi người.」"

# 【凪】
# display as 凪
# JP: 「キャンプしたいっていったのは、ウチばい」
1750 = "「Tôi hiểu rồi. Sẽ dẫn đến tình trạng không\ncó người chịu trách nhiệm ở lại quản lý——\nlà vậy đúng không.」"

# monologue
# JP: 視線の制止を、\nけれども凪は気にも止めない。
2197 = "Ánh mắt ngăn cản đó,\nNagi hoàn toàn không để tâm."

# 【凪】
# display as 凪
# JP: 「やけん、ぶつんだったら、ウチんこと」
1843 = "「Thế nên, nếu có đánh thì đánh em đây\nnày.」"

# monologue
# JP: （ぽかっ！）
2917 = "（Bộp!）"

# 【凪】
# display as 凪
# JP: 「痛かっ！？」
1640 = "「Tốt quá rồi. Có vẻ họ đang nỗ lực tăng\ntốc để bù lại thời gian.\nNhư thế này thì độ trễ có thể rút ngắn\nxuống dưới 90 phút.」"

# 【蓑笠】
# display as 蓑笠
# JP: 「[でほー,2]大阿呆がっ！」
1842 = "「Đồ đại ngốc!」"

# 【凪】
# display as 凪
# JP: 「じいちゃんっ！？」
1816 = "「Vâng. Rất là vui ạ. Ở Hokkaido, Hokuriku,\nShikoku\nvà nhiều nơi khác, chúng em còn được nghe\nchuyện trực tiếp từ những nhân vật chủ\nchốt.」"

# monologue
# JP: ぽかんと一発。
2293 = "Khi tôi hỏi lý do cho tiếng reo hò bất ngờ\nđó,\nHachiroku đáp lại bằng một giọng đầy hào\nhứng."

# monologue
# JP: 今度の大きな音にはけれど、\n誰一人顔をしかめない。
2852 = "Nhưng với âm thanh lớn lần này,\nkhông một ai cau mày."

# 【蓑笠】
# display as 蓑笠
# JP: 「……怪我はなかとか？」
1233 = "「……Có bị thương ở đâu không?」"

# 【凪】
# display as 凪
# JP: 「ケガ今したばい！　コブできたばい！！」
1560 = "「!」\n「Ôi trời!」"

# 【蓑笠】
# display as 蓑笠
# JP: 「そん他は？」
1553 = "「Còn chỗ nào khác không?」"

# 【凪】
# display as 凪
# JP: 「なかたい！　ふかみちゃんも、\nねーさんたちもぴんしゃんしとるばい！」
1785 = "「Không có! Fukami và\nmấy chị cũng đang khỏe re đây này!」"

# 【蓑笠】
# display as 蓑笠
# JP: 「そぎゃんか」
1756 = "「Vậy sao.」"

# monologue
# JP: ほーーーっと、長い、長い息。
2846 = "Phùuu, một tiếng thở dài, thật dài."

# monologue
# JP: 蓑笠老人は拳を解いて、\n皺だらけの手で、凪をなでる。
2760 = "Ông lão Minokasa buông lỏng nắm đấm,\ndùng bàn tay nhăn nheo xoa đầu Nagi."

# 【蓑笠】
# display as 蓑笠
# JP: 「……無事でよかった」
1242 = "「……Bình an là tốt rồi.」"

# 【凪】
# display as 凪
# JP: 「あ！」
1613 = "「A!」"

# monologue
# JP: 蓑笠さんの安堵の顔は、\n泣きだしそうなものにも見えて――
2757 = "Khuôn mặt an tâm của ông Minokasa,\ntrông như sắp khóc đến nơi——"

# monologue
# JP: それを目にした瞬間に、\n凪は思いきり頭を下げる。
2379 = "Khoảnh khắc nhìn thấy điều đó,\nNagi cúi gập đầu xuống."

# 【凪】
# display as 凪
# JP: 「爺ちゃんに心配ばかけて、ごめんなさい」
1647 = "「Tôi hiểu rồi. Vậy thì, tôi sẽ nhờ Chí\nHoàn đặt vé chuyến\nxe buýt gấu trúc sớm nhất có thể.」"

# 【元忠】
# display as 稀咲＆元忠
# JP: 『「っ！」\n「っ！」』
1924 = "「!」\n「!」"

# monologue
# JP: 視線を背け合っていた父と娘とが、\n全く同じタイミングでお互いの顔を見る。
2165 = "Người cha và cô con gái vốn đang ngoảnh\nmặt đi,\nlại nhìn nhau cùng một lúc."

# monologue
# JP: ふたりとも、どこか気まずそうな表情を浮かべ――\nややあって、元忠氏が大げさに咳払いする。
2243 = "Cả hai đều lộ vẻ mặt có chút ngượng\nngùng——\nMột lúc sau, ông Mototada hắng giọng một\ncách khoa trương."

# 【元忠】
# display as 元忠
# JP: 「まぁ。うん。\nとにかく、怪我がなくて何よりだった」
1610 = "「À thì. Ừm.\nTóm lại, không ai bị thương là tốt rồi.」"

# 【稀咲】
# display as 稀咲
# JP: 「……ごめん。心配をかけるつもりはなかった」
1238 = "「……Xin lỗi. Con không định làm bố lo lắng\nđâu.」"

# 【元忠】
# display as 元忠
# JP: 「お前も大人だ。責任のとり方と謝罪の仕方は\n自分自身で考えろ」
1506 = "「Oa.」"

# monologue
# JP: 厳しい言葉が、優しく響く。
2176 = "Những lời lẽ nghiêm khắc, lại vang lên\nthật dịu dàng."

# 【稀咲】
# display as 稀咲
# JP: 「わかっているさ」
1726 = "「À, Hibiki. Em đến tìm bọn anh sao.」"

# 【元忠】
# display as 元忠
# JP: 「が、必要があればいつでも言え。\n私も親だ。娘の尻ぐらいはいつでも拭う」
1495 = "「Nhưng, nếu cần thì cứ nói bất cứ lúc nào.\nTa cũng là cha mà. Chút rắc rối của con\ngái thì lúc nào ta cũng dọn dẹp được.」"

# 【稀咲】
# display as 稀咲
# JP: 「……ありがとう。\n言葉を選んでもらえればもっとうれしいけれど」
1245 = "「……Cảm ơn bố.\nNếu bố chọn từ ngữ cẩn thận hơn một chút\nthì con sẽ vui hơn đấy.」"

# 【元忠】
# display as 元忠
# JP: 「ああ。うむ――そうだな」
1609 = "「Ufufu, đúng vậy nhỉ.\nChúng ta đã được nhìn thấy, nghe thấy\nnhững điều vô cùng đáng quý và dễ thương.」"

# monologue
# JP: ぎくしゃくしてるが、離れていない。\n親子、なのだなとぼんやり思う。
2848 = "Dù có chút ngượng ngùng, nhưng không hề xa\ncách.\nQuả nhiên là cha con, tôi thầm nghĩ."

# 【真闇】
# display as 真闇
# JP: 「ひーちゃん」
1654 = "「Hii-chan.」"

# 【早瀬堰】
# display as 早賴堰
# JP: 「ふかみや」
1798 = "「Fukami à.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、ねぇねぇ」
1618 = "「A, chị hai.」"

# 【ふかみ】
# display as 深美
# JP: 「おじいちゃん……」
1815 = "「Ông nội……」"

# monologue
# JP: 日々姫とふかみと、\nふたりの頭が、同時にさがる。
2617 = "Hibiki và Fukami,\ncả hai cùng lúc cúi đầu."

# 【ふかみ】
# display as 日日姬＆深美
# JP: 『「ありがとう、ごめんなさい」\n「ありがとう、ごめんなさい」』
1920 = "『\"Cảm ơn, và xin lỗi.\"\n\"Cảm ơn, và xin lỗi.\"』"

# 【早瀬堰】
# display as 早賴堰
# JP: 「すぐ電話せぇ。\nみどり、ここに来たがるほど心配しとったけん」
1668 = "「Gọi điện thoại ngay đi.\nMidori lo lắng đến mức đòi đến tận đây\nđấy.」"

# 【ふかみ】
# display as 深美
# JP: 「あ――うん、ごめんなさい」
1607 = "「A——vâng, cháu xin lỗi.」"

# 【早瀬堰】
# display as 早賴堰
# JP: 「ワシにゃ謝らんでええ。早ぅに安心させてやれ」
1455 = "「Giường của công chúa!」"

# monologue
# JP: ……厳しく、あるいは優しく叱り、\n叱りながらも包み込む。
1179 = "……Trách mắng nghiêm khắc, hoặc dịu dàng,\ndù trách mắng nhưng vẫn bao dung che chở."

# monologue
# JP: ……姉妹と、祖父・孫。\n関係の形は変わっても、あたたかさはどれも変わらない。
1175 = "……Chị em, và ông cháu.\nDù hình thái mối quan hệ có khác nhau,\nnhưng sự ấm áp thì không hề thay đổi."

# 【双鉄】
# display as 雙鐵
# JP: 「……家族、か」
1235 = "「……Gia đình, sao.」"

# 【ハチロク】
# display as 八六
# JP: 「――双鉄様」
1205 = "「——Ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1627 = "「Ừm.」"

# monologue
# JP: ハチロクと手を繋ぎ合う。
2509 = "Tôi và Hachiroku nắm tay nhau."

# monologue
# JP: どちらが求めたわけでなく、\nごくごく自然に、そうしてる。
2142 = "Không phải ai chủ động trước,\nmà cứ thế diễn ra một cách vô cùng tự\nnhiên."

# monologue
# JP: （これも同じだ。\nただ、乗り越えて、いけばいいんだ）
2946 = "（Điều này cũng giống vậy thôi.\nChỉ cần, vượt qua là được.）"

# monologue
# JP: 無くしたものを悔やむのではなく、羨むでもなく。
2660 = "（À không, có lẽ,\nem ấy thích động vật, nhưng chỉ là không\nbiết cách tiếp xúc với chúng chăng?）"

# monologue
# JP: もう一度作っていけばいいのだし、\n僕たちになら、そうできる。
2424 = "Chỉ cần tạo dựng lại một lần nữa là được,\nvà nếu là chúng tôi, thì chắc chắn sẽ làm\nđược."

# 【元忠】
# display as 元忠
# JP: 「で？　求めたアイディアは得られたのか？」
1808 = "「Chính xác.」"

# 【稀咲】
# display as 稀咲
# JP: 「と、今の段階では思ってるよ」
1723 = "「Ở giai đoạn hiện tại thì con nghĩ là có\nrồi.」"

# monologue
# JP: 稀咲が頷く。\nリラックスした表情で。
2722 = "Kisaki gật đầu.\nVới vẻ mặt thư giãn."

# monologue
# JP: それからハっと、気づいたように背筋を伸ばし、\nまっすぐ元忠氏を見据える。
2669 = "Rồi cô ấy chợt nhận ra điều gì đó, vội\nthẳng lưng lên,\nnhìn thẳng vào ông Mototada."

# 【稀咲】
# display as 稀咲
# JP: 「ただ、今のボクは一人の娘で。\nええと……父さん、は。――父さんだって、思うから」
1580 = "「À, anh nhớ rồi. Hình như còn có dòng chữ\nĐỗ Phủ kèm theo nữa nhỉ.\nLà một nhà thơ tiêu biểu của Trung Quốc\nđúng không?」"

# 【元忠】
# display as 元忠
# JP: 「ああ」
# 1627 = "「嗯」" 

# 【稀咲】
# display as 稀咲
# JP: 「だからそれは整理して、落ち着いたときに聞いて欲しい。\n娘ではなく、支店長として。父さんではなく、頭取に」
1731 = "「Thế nên chuyện đó hãy để con sắp xếp lại,\nlúc nào bình tĩnh rồi con sẽ nói cho bố\nnghe.\nKhông phải với tư cách con gái, mà là Giám\nđốc chi nhánh. Không phải nói với bố, mà\nlà với Chủ tịch.」"

# 【元忠】
# display as 元忠
# JP: 「そう望むなら、そうしよう」
1514 = "「Nếu con muốn vậy, thì cứ làm thế đi.」"

# monologue
# JP: 微笑と口調を口の端へとほんの一瞬乗せて、消し。
2229 = "Một nụ cười và giọng điệu thoáng qua trên\nkhóe môi trong chốc lát, rồi biến mất."

# monologue
# JP: 大きく頷き、\n元忠氏はぐるり、僕へと体を向け直す。
2182 = "Gật đầu mạnh một cái,\nông Mototada xoay người, hướng về phía\ntôi."

# 【元忠】
# display as 元忠
# JP: 「私は今は、一人の父だそうだから。\n一人の父として、礼を言わせて欲しいと思う」
1772 = "「Bây giờ tôi chỉ là một người cha thôi.\nVới tư cách là một người cha, tôi muốn nói\nlời cảm ơn.」"

# monologue
# JP: 深々。\n頭が下げられる。
2180 = "Cúi gập người.\nCúi đầu tạ ơn."

# 【元忠】
# display as 元忠
# JP: 「ありがとう。娘を助けてくれて」
1854 = "「Cảm ơn cậu. Vì đã cứu con gái tôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「当然のことをしたまでです。鉄道に関わる人間として。\nそして、御一夜の一員として」
1696 = "「Tôi chỉ làm việc đương nhiên thôi. Với tư\ncách là một người liên quan đến đường sắt.\nVà với tư cách là một thành viên của\nOhito.」"

# 【元忠】
# display as 元忠
# JP: 「ああ――」
1619 = "「À——」"

# monologue
# JP: 元忠氏の目が、改札の向こうまでを見渡す。\n人、人、人。
2231 = "Ánh mắt ông Mototada nhìn bao quát ra tận\nbên ngoài cổng soát vé.\nNgười, người, và người."

# monologue
# JP: 心配し、集まってくれた方々が、\n駅舎から溢れ僕らを見ている。
2365 = "Những người lo lắng, tụ tập lại đây,\nđang tràn ra từ nhà ga và nhìn chúng tôi."

# 【元忠】
# display as 元忠
# JP: 「炊き出しまで――」
1883 = "「Đúng là Nine Stars trong chín ngày,\nsẽ mang đến cho hành khách một chuyến đi\nthú vị mà không hề nhàm chán. Nhưng mà.」"

# monologue
# JP: おにぎり、味噌汁、タオルに着替え。\nどんどん、日々姫たちに渡されていく。
2874 = "Cơm nắm, súp miso, khăn tắm và quần áo\nthay.\nLiên tục được đưa cho Hibiki và mọi người."

# monologue
# JP: 今度は、そこにいる全ての人へと――\nさっきよりも更に深くまで、元忠氏の頭がさげられる。
2816 = "Lần này, hướng về tất cả những người có\nmặt ở đó——\nÔng Mototada cúi đầu còn sâu hơn lúc nãy."

# 【双鉄】
# display as 雙鐵
# JP: 「――御一夜は、こういう町だと知っていました。\nだから僕は、それを守りたいと思っています」
1200 = "「——Tôi biết Ohito là một thị trấn như vậy.\nThế nên tôi mới muốn bảo vệ nó.」"

# 【元忠】
# display as 元忠
# JP: 「……そうか」
# 1241 = "「……是嗎」" 

# monologue
# JP: ご近所同士の絆や繋がり――\nそれが特別、濃いとも強いとも思わない。
2831 = "Sự gắn kết và mối liên hệ giữa những người\nhàng xóm——\nTôi không nghĩ nó đặc biệt sâu đậm hay\nmạnh mẽ."

# monologue
# JP: 普通に対立だっておきるし、\nみなそれぞれに、それぞれの日々を好きに生きてる。
2451 = "Xung đột vẫn xảy ra như thường,\nmọi người đều sống những ngày tháng theo\ncách riêng của mình."

# 【双鉄】
# display as 雙鐵
# JP: 「いざというとき、助け合いの輪が自然と出来る。\nその環境は、壊してはいけないものだと、思っています」
1558 = "「Aaa! Ngài Soutetsu! Ngài thấy không? Nó\nngã lăn quay kìa!\nBé gấu trúc con ngã lộn nhào lăn quay\nkìa!!!」"

# 【元忠】
# display as 元忠
# JP: 「…………共存、か」
1225 = "「…………Cộng tồn, sao.」"

# monologue
# JP: 元忠氏の目が、\x%l8620;#00ffc040;8620%l;#;の鉄の体を静かに見上げる。
2239 = "Ánh mắt ông Mototada tĩnh lặng ngước nhìn\ncơ thể bằng sắt của \\x%l8620;#00ffc040;8620%l;#;."

# monologue
# JP: 鉄道と。\x%lエアクラ;#00ffc040;エアクラ%l;#;と。\nそれもまた、必ず共存しあえるものだ。
2742 = "Đường sắt. Và \\x%lエアクラ;#00ffc040;Aircra%l;#;.\nĐó cũng là những thứ chắc chắn có thể cộng\ntồn với nhau."

# 【元忠】
# display as 元忠
# JP: 「……出来ると思うかね？　わだかまりを超えて」
1230 = "「……Cậu nghĩ là làm được sao? Vượt qua\nnhững hiềm khích.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう思います。心は――\n人と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;との間でも、繋がるものなのですから」
1717 = "「Chí Hoàn, để em giúp!」"

# 【元忠】
# display as 元忠
# JP: 「ふむ」
1601 = "「Hừm.」"

# monologue
# JP: ハチロクとつなぎ合ってる手。
2572 = "Bàn tay đang nắm lấy Hachiroku."

# monologue
# JP: それを解かず、そのままに、\n元忠氏へとまっすぐ伸ばす。
2519 = "Không buông ra, cứ thế,\ntôi vươn thẳng tay về phía ông Mototada."

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、あなたと僕とでも。\n御一夜を大事に思う気持ちは、きっと共通してますし」
1777 = "「Với vòng lặp 20 tiếng đi tàu, 4 tiếng\ntham quan,\nthì dù bên trong tàu có được thiết kế\nthoải mái, sang trọng đến đâu đi chăng\nnữa.」"

# 【元忠】
# display as 元忠
# JP: 「なるほどな」
1563 = "「! Cô ấy có nói vậy nhỉ. Người Hồng Cảng……\nHình như là, 'Tôi hầu như không quen thuộc\nvới đường sắt cho lắm'.」"

# monologue
# JP: 元忠氏の手が無造作に、僕らが伸ばした手へと重なる。
2227 = "Nhưng mà, hiện tại tôi đang ở vị thế của\nmột khách mời,\nnếu khiêm tốn quá thì ngược lại có thể sẽ\nthành ra thất lễ."

# monologue
# JP: だけでなく、左手までをそこに重ねて、\nはさみこむような握手でぶんぶん腕を動かす。
2131 = "Không chỉ vậy, ông ấy còn đặt cả tay trái\nlên,\nbắt tay theo kiểu kẹp chặt và lắc mạnh\ncánh tay."

# 【元忠】
# display as 元忠
# JP: 「君の意見は、十分検討に値する。\n参考にさせてもらうよ、今後の経営方針のね」
1524 = "「!?」"

# monologue
# JP: ぱっと両手が離される。
2178 = "Hai tay buông ra."

# monologue
# JP: そしてその手は、稀咲の肩へと乗せられる。
2668 = "Và bàn tay đó, đặt lên vai Kisaki."

# 【稀咲】
# display as 稀咲
# JP: 「と、父さんっ！？」
1813 = "「Ừ. Thật đáng mong đợi xem đó sẽ là loại \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#;\nnào, và tuyến đường ra sao.」"

# 【元忠】
# display as 元忠
# JP: 「疲れてるだろう。送ってやる。\nこんな日くらいは、一緒に帰るのも悪くない」
1503 = "「Chắc con mệt rồi. Để bố đưa về.\nNhững ngày thế này, cùng nhau về nhà cũng\nkhông tệ.」"

# 【稀咲】
# display as 稀咲
# JP: 「――そうだね。今は」
1190 = "「——Vâng. Bây giờ thì.」"

# monologue
# JP: お詫びか、去り際のあいさつか。
2146 = "Lời xin lỗi, hay lời chào tạm biệt."

# monologue
# JP: もう一度の会釈を残し稀咲がホームから立ち去れば、\n集まっていた人たちも、安堵した顔で散り始める。
2720 = "Sau khi để lại một cái cúi chào nữa,\nKisaki rời khỏi sân ga,\nnhững người tụ tập ở đó cũng mang khuôn\nmặt nhẹ nhõm và bắt đầu giải tán."

# 【凪】
# display as 凪
# JP: 「じーちゃん、帰ろっ」
1817 = "「Vâng. Tất nhiên là chúng ta sẽ đi tham\nquan rồi ạ. Vì thế,\nchúng tôi đang sắp xếp dời lịch trình ngày\nmai sang hôm nay.」"

# 【早瀬堰】
# display as 早賴堰
# JP: 「ほれ、乗れ。ふかみ」
1799 = "「Nào, lên xe đi. Fukami」"

# 【真闇】
# display as 真闇
# JP: 「ひーちゃん、帰るよ」
1655 = "「Nếu lỡ lạc nhau, một tiếng sau chúng ta\nsẽ tập trung\ntrước máy bán hàng tự động gấu trúc lúc\nnãy nhé. Phía bên này, chúng tôi sẽ đảm\nbảo an toàn.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ――うん」
1605 = "「Fufu.」"

# monologue
# JP: 真闇姉に手を引かれつつ、\n日々姫は僕とハチロクを見る。
2619 = "Bị chị Mayami dắt tay,\nHibiki quay lại nhìn tôi và Hachiroku."

# monologue
# JP: （ああ……）
2921 = "（A……）"

# monologue
# JP: 自然と思う。\n思い出す。
2570 = "Tôi tự nhiên nghĩ đến.\nVà nhớ lại."

# monologue
# JP: ――僕は家族を、\nとっくの昔に、与えてもらえていたのだと。
1164 = "——Rằng tôi đã được ban cho một gia đình,\ntừ rất lâu về trước rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「待ってくれ。日々姫、ねえさん」
1835 = "「Vâng. Nhờ vậy mà thư ký Khương đã giao\ncho lão sư và Tây Qua một công việc mới\n——và đó cũng là công việc đầu tiên của Chí\nHoàn.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1613 = "「啊！」" 

# 【真闇】
# display as 真闇
# JP: 「ん？」
1631 = "「Trong cái rủi có cái may, nếu điều đó\ngiúp ích cho chuyến khảo sát của mọi\nngười,\nthì đối với chúng tôi đó cũng là một niềm\nvui lớn.」"

# monologue
# JP: にこっと、笑う。ふたりそろって。
2244 = "Cả hai cùng mỉm cười."

# monologue
# JP: さすがは姉妹。\n日々姫と真闇姉との笑顔は、とても良く似てる。
2135 = "Quả không hổ là chị em.\nNụ cười của Hibiki và chị Mayami thực sự\nrất giống nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「僕とハチロクも、一緒に帰る」
1701 = "「Em và Hachiroku cũng sẽ về cùng」"

# monologue
# JP: そうして僕とハチロクも、\nきっとそっくりな笑顔の筈だ。
2820 = "Và chắc chắn, tôi cùng Hachiroku\ncũng đang nở một nụ cười y hệt như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「な？　ハチロク」
1583 = "「Ôi, thật là một điều tuyệt vời.」"

# 【ハチロク】
# display as 八六
# JP: 「はい！　双鉄様」
1630 = "「Lúc đó ngài Soutetsu chỉ tập trung vào\ntoàn bộ quá trình vận hành——\nChỉ một lòng tìm cách giải quyết tình\nhuống mà thôi.」"

# 【真闇】
# display as 真闇
# JP: 「そ？　そんならねぇ」
1757 = "「Hoặc có lẽ do lãnh thổ quá rộng lớn. Di\nchuyển bằng chuyến bay nội địa,\nrồi thuê Aircra tại điểm đến có thể đang\nlà xu hướng chủ đạo.」"

# monologue
# JP: 真闇姉の手がハチロクの手を。\n日々姫の手が僕の手を取る。
2701 = "Chị Mayami nắm lấy tay Hachiroku.\nHibiki nắm lấy tay tôi."

# monologue
# JP: そうして僕らは手を繋ぎ――\n家族そろって、家へと帰る。
2441 = "Kỹ năng lái tàu của tôi cũng đâu đến mức\nxuất sắc gì cho cam……\nChẳng lẽ Kisaki đã gửi cho họ những tài\nliệu quay lại những khoảnh khắc đẹp nhất\ncủa tôi sao?"

# 【双鉄】
# display as 雙鐵
# JP: 「くはぁ」
1589 = "「Ừm. Đây chỉ là suy đoán của tôi thôi——\nnhưng chắc chắn Chí Hoàn cũng có chung cảm\nxúc đó.」"

# monologue
# JP: 全身の力が抜けていく。
2603 = "Toàn bộ sức lực trong cơ thể như tan biến."

# monologue
# JP: 抜けた部分にふわふわとした、疲労感と倦怠感と、\nそして達成感とが混じったものが、入り込んでくる。
2122 = "Thay vào khoảng trống đó là một cảm giác\nlâng lâng, pha trộn giữa sự mệt mỏi, uể\noải\nvà cả cảm giác thành tựu."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。お疲れ様でございました」
1904 = "「Ngài Soutetsu. Ngài đã vất vả rồi ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「お前こそだ。\nお疲れ様、ハチロク」
1517 = "「Em mới phải đó.\nVất vả cho em rồi, Hachiroku」"

# 【ハチロク】
# display as 八六
# JP: 「あら？　わたくしは疲れませんよ？」
1593 = "「Kìa? Em đâu có thấy mệt mỏi gì đâu ạ」"

# monologue
# JP: クスクス笑い。\nハチロクは、いつも以上にあたたかだ。
2801 = "Hachiroku khẽ cười khúc khích.\nTrông em ấy ấm áp hơn thường ngày."

# 【ハチロク】
# display as 八六
# JP: 「わたくしはものでございますから。\n疲れたりなどしないのです」
1637 = "「Vì em là đồ vật mà.\nNên em không biết mệt là gì đâu ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「もの――か」
1818 = "「Đồ vật——sao」"

# monologue
# JP: ハチロクが良く口にすること。\n単なる事実でもあること。
2284 = "Câu nói mà Hachiroku thường hay nhắc tới.\nVà cũng là một sự thật hiển nhiên."

# monologue
# JP: あるいは疲れのせいなのだろうか、\nそれが、妙に引っかかる。
2577 = "Hoặc có lẽ do sự mệt mỏi,\nmà tôi lại cảm thấy bận tâm đến điều đó\nmột cách kỳ lạ."

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、ハチロク。“もの”とはなんだ？」
1704 = "「Khi biết Tây Qua là người thích ghi âm\ntàu hỏa——tức là Tori-tetsu chuyên về âm\nthanh,\nmọi người đã cho em nghe những phong cảnh\nâm thanh đường sắt mà họ tự hào nhất.」"

# 【ハチロク】
# display as 八六
# JP: 「え？」
# 1600 = "「哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前の言う。お前の定義している。\n“もの”とはなんだ？」
1515 = "「Theo như em nói. Theo như định nghĩa của\nem.\n\"Đồ vật\" là gì?」"

# 【ハチロク】
# display as 八六
# JP: 「“もの”――とは」
1219 = "「\"Đồ vật\"——là」"

# monologue
# JP: ほんの一瞬だけ考えて、\nハチロクは、流れるような答えを紡ぐ。
2286 = "Có vẻ sự chú ý của Hachiroku cũng bị kéo\nkhỏi bé gấu trúc con,\ntôi nghe thấy một tiếng nín thở nhỏ."

# 【ハチロク】
# display as 八六
# JP: 「人間に作られた、人間の目的のため機能する存在――\nでございましょうか」
1657 = "「Là tồn tại được con người tạo ra, và hoạt\nđộng vì mục đích của con người——\ncó lẽ là vậy ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「人間に作られた、人間の目的のために機能する……」
1472 = "「Dù không có cuộc Đại bãi bỏ tuyến đường\nsắt, thì việc mọi người quay lưng với\nđường sắt vẫn là điều khó tránh khỏi sao.\nÀ——nhắc mới nhớ, cô tiếp viên hàng không\ntrên máy bay cũng……」"

# monologue
# JP: 淀むところの無い声が、ストンと胸に落ちてくる。
2394 = "Trước câu nói đùa tỉnh bơ của cô Khương,\nHachiroku cười khúc khích không ngớt.\n——Thật đúng là một chuyến đi. Bầu không\nkhí của một chuyến du lịch."

# monologue
# JP: 妥当な定義と納得できただけでなく、\n僕自身の深いところに、響いて染みる。
2486 = "Hibiki mỉm cười. Không hiểu sao trông em\nấy vô cùng hạnh phúc——\nÀ, không phải."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば。僕も“もの”だったのだな」
1893 = "「Một giấc ngủ trông thật hạnh phúc làm\nsao.\nLiệu bé có được ngủ trên chiếc giường làm\nbằng lá trúc không nhỉ?」"

# 【ハチロク】
# display as 八六
# JP: 「え？」
# 1600 = "「哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あの事故の後、お前と出会うまでの僕は――\n誰かの目的を果たすため、機能するだけの存在だった」
1890 = "「Sau vụ tai nạn đó, cho đến trước khi gặp\nem——\nanh cũng chỉ là một tồn tại hoạt động nhằm\nhoàn thành mục đích của ai đó mà thôi」"

# 【ハチロク】
# display as 八六
# JP: 「そう……なのですか」
1747 = "「Vậy là ý kiến của chúng tôi đã thống\nnhất.\nNếu không có vấn đề gì, chúng tôi muốn đi\nkhảo sát cơ sở gấu trúc đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。そうだった。そうしなければ生きられなかった。\n今振り返れば……あれは、ものとしての生だったのだな」
1622 = "「Ừ. Đúng là vậy. Nếu không làm thế thì anh\nđã không thể sống tiếp.\nBây giờ nhìn lại……\nđó đúng là một cuộc sống của đồ vật nhỉ」"

# 【ハチロク】
# display as 八六
# JP: 「それでは――今は、双鉄様は……」
1891 = "「Nè! Ngài Soutetsu, ngài Soutetsu——\nỦa? Ngài Soutetsu? Ngài đang ở đâu vậy!?」"

# monologue
# JP: いたわるような、ためらうような。\nどこかわずかに、怯えているようにも聞こえる声。
2396 = "Một giọng nói như đang thương xót, lại như\nđang ngập ngừng.\nNghe có vẻ gì đó hơi sợ sệt."

# 【ハチロク】
# display as 八六
# JP: 「今の、双鉄様の生は……\nどのようなものなのですか？」
1822 = "「Vậy cuộc sống hiện tại của ngài\nSoutetsu……\nlà một cuộc sống như thế nào ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「今、か。\n今、この瞬間の僕の生は――」
1821 = "「Vâng. Đó là một khu vực hiểm trở với độ\ndốc lớn. Thời kỳ hoàng kim của Đường sắt\nHoàng gia,\nhọ thậm chí còn thiết lập cả một tuyến\nđường vòng chỉ dành riêng cho việc đưa \\x%l補機;#00ffc040;đầu máy phụ%l;#;\nvề.」"

# monologue
# JP: ハチロクの目が僕を見ている。\n答えを、求めてくれている。
2278 = "Có vẻ Hachiroku cũng nghĩ giống tôi.\nNhưng, tại sao lại đột ngột nhắc đến Quan\nNgọa Nguyên——A!"

# monologue
# JP: そのことがただ幸せで、これほど近くにいてもなお、\nもっと、ハチロクを知りたくなって、近づきたくなる。
2211 = "Một tiếng thở hắt nhẹ nhàng vang lên."

# 【双鉄】
# display as 雙鐵
# JP: 「――満たしてもらえたはずなのに、\nもっと多くを求める生、だな」
1201 = "「——Là một cuộc sống mà dù đáng lẽ đã được\nlấp đầy,\nnhưng vẫn luôn khao khát nhiều hơn thế\nnữa」"

# monologue
# JP: 疲労してるが、充実し。充実しても不足している。\nハチロクという存在を、痛いほど強く求めてる。
2850 = "Dù mệt mỏi, nhưng lại trọn vẹn. Dù trọn\nvẹn, nhưng vẫn thấy thiếu thốn.\nTôi khao khát một tồn tại mang tên\nHachiroku đến nhức nhối."

# monologue
# JP: この感情を、この衝動を、何といおうか――\n思ったときには、言葉が喉を飛び出している。
2823 = "Phải gọi cảm xúc này, sự thôi thúc này là\ngì đây——\nKhi vừa nghĩ đến, ngôn từ đã tự tuôn trào\nkhỏi cổ họng."

# 【双鉄】
# display as 雙鐵
# JP: 「おそらく、これが。人としての生だ。\n生きることを求め、先へと進みたがる生だ」
1877 = "「Náo nhiệt lắm. Bằng các chuyến bay nội\nđịa và Aircra.\nNhưng lượng khách du lịch bằng đường sắt\nthì lại đang giảm dần qua từng năm.」"

# 【ハチロク】
# display as 八六
# JP: 「人としての、生――」
1501 = "「Cuộc sống, của một con người——」"

# 【双鉄】
# display as 雙鐵
# JP: 「それを与えてくれたのは。\nハチロク。お前だ」
1836 = "「Và người đã ban cho anh điều đó.\nChính là em, Hachiroku」"

# monologue
# JP: 乗り越えたいと、だから思えた。\nハチロクがともにいてくれたから、乗り越えられた。
2582 = "Tây Qua cúi đầu thật sâu.\nChào tôi, Hachiroku. Rồi hướng về phía\nHibiki và cô Khương."

# monologue
# JP: そして今、僕はこれほど強く、強く、\n終着駅のさらに先へも、ともにいきたいと望んでる。
2741 = "Và giờ đây, anh đang khao khát mãnh liệt,\nvô cùng mãnh liệt,\nmuốn được cùng em đi xa hơn nữa, vượt qua\ncả nhà ga cuối cùng."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。僕はお前が欲しい」
1542 = "「Hachiroku. Anh muốn có em」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、すでにあなたのものです。\nハチロクは、双鉄様の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です」
1705 = "「Thầy Mouri Aki của Đường sắt điện Hiro.\nThầy Goto Kaita của Đường sắt Goto Kyu. Từ\nHokkaido\nđến Kyushu, chúng em đã được gặp gỡ những\nnhân vật nòng cốt trong công cuộc phục\nhưng ở mỗi nơi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだが。もっと欲しい。\n僕は――僕は――」
1900 = "「!! Em rất vinh hạnh! Em nghĩ mình chỉ làm\ntheo những điều cơ bản,\nmột cách cơ bản nhất thôi, nhưng dù vậy」"

# monologue
# JP: 探せば、すぐに答えは見つかる。
2334 = "Chỉ cần tìm kiếm, sẽ thấy ngay câu trả\nlời."

# monologue
# JP: きっと、ずうっと前からそこにあり。\nけれど恐れて、視線を逸らしてしまってた答えが。
2421 = "Chắc chắn, nó đã nằm ở đó từ rất lâu rồi.\nChỉ là do tôi sợ hãi, nên đã luôn ngoảnh\nmặt làm ngơ trước câu trả lời ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「与えられた関係ではなく。僕の、僕だけのお前が欲しい。\n僕は、お前を独占したいし、家族にしたい」
1712 = "「Không phải là một mối quan hệ được ban\ncho. Anh muốn em là của anh, của riêng anh\nthôi.\nAnh muốn độc chiếm em, muốn em trở thành\ngia đình của anh」"

# 【ハチロク】
# display as 八六
# JP: 「家族……」
1648 = "「Gia đình……」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。つまりは――お互い等しくあることだ」
1787 = "「Đúng vậy. Nói cách khác——chúng ta bình\nđẳng với nhau」"

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;とマスターではなく。\nこれほど近くにいてさえ足りず。
2137 = "Không phải là \\x%lレイルロオド;#00ffc040;Railord%l;#; và Master.\nDù ở gần đến thế này vẫn là chưa đủ."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ハチロク。お前にも。\n僕を所有し、独占して欲しいと思っているのだ」
1686 = "「Anh cũng muốn Hachiroku, cả em nữa.\nCũng khao khát được sở hữu anh, được độc\nchiếm anh」"

# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1602 = "「啊——」" 

# monologue
# JP: わなわな、ハチロクの口が震える。\n震えはすぐに体に広がり、僕の体にも伝わってくる。
2273 = "Đôi môi Hachiroku run rẩy.\nSự run rẩy ấy nhanh chóng lan ra toàn\nthân, và truyền sang cả cơ thể tôi."

# 【ハチロク】
# display as 八六
# JP: 「しかし、ものであるわたくしが――\n双鉄様を、所有など」
1492 = "「Nhưng, một đồ vật như em——\nlàm sao có thể sở hữu ngài Soutetsu được\nchứ」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、確かにものだった。\n誰かのために、機能するだけの存在だった」
1719 = "「Chúng ta về thôi. Chí Hoàn.\nTây Qua, muốn nói chuyện riêng với Chí\nHoàn.」"

# monologue
# JP: それが事実と、さっきよりも深く理解する。
2550 = "Tôi hiểu rõ sự thật đó sâu sắc hơn lúc\nnãy."

# monologue
# JP: 今の自分のありようが\nどれほど生きたものであるかを、ようやく確信できたから。
2364 = "Bởi vì cuối cùng tôi cũng đã tin chắc\nrằng, trạng thái hiện tại của bản thân\nđang sống động đến nhường nào."

# 【双鉄】
# display as 雙鐵
# JP: 「だが、お前と出会い。僕はものではなくなった。\nお前を求めることにより――僕は、ひとりの男となった」
1493 = "「Đúng vậy. Dù chuyến khảo sát chỉ còn vỏn\nvẹn hai ngày,\nnhưng nếu cứ gượng gạo một cách kỳ lạ thì\nchúng ta cũng khó xử.」"

# monologue
# JP: 誰かに言われたからでなく、目的を果たすためでもなく。\nただ僕自身の欲として、これほど強く求めてる。
2140 = "Không phải vì bị ai đó sai bảo, cũng chẳng\nphải để hoàn thành mục đích nào cả.\nChỉ đơn thuần là dục vọng của chính bản\nthân anh, khao khát mãnh liệt đến thế này."

# monologue
# JP: だから、思い切り抱きしめる。\nハチロクの小さな体を、壊してしまうほど強く。
2584 = "Không biết có phải do xấu hổ hay không mà\nTây Qua cúi gằm mặt xuống.\nTheo phản xạ, bím tóc của cô bé khẽ giật\ngiật, đung đưa đầy vui sướng."

# 【双鉄】
# display as 雙鐵
# JP: 「お前は、違うか？　まだ、ものなのか？\nお前は、僕を求めては――」
1505 = "「Dạ?」"

# 【ハチロク】
# display as 八六
# JP: 「求めております。狂おしいほど」
1710 = "「Em khao khát ngài. Khao khát đến phát\nđiên lên được」"

# monologue
# JP: ハチロクの手が、答えてくれる。\nぎゅっと、ぎゅうっと――僕の体に巻き付いてくる。
2276 = "Như đang chìm trong một giấc mơ đầy khao\nkhát,\nHachiroku không ngừng lặp đi lặp lại từ\ngấu trúc."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク。お前は女だ」
1892 = "「Nếu vậy, Hachiroku. Em là một người phụ\nnữ」"

# 【ハチロク】
# display as 八六
# JP: 「はい、わたくしは――女です。\n双鉄様を、これほど求める女です」
1762 = "「Vâng, em——là một người phụ nữ.\nMột người phụ nữ khao khát ngài Soutetsu\nđến nhường này」"

# 【双鉄】
# display as 雙鐵
# JP: 「男と女だ。お互いに求め合っている。\nだったら、答えなど簡単だ」
1692 = "「Một người đàn ông và một người phụ nữ.\nĐang khao khát lẫn nhau.\nNếu vậy thì, câu trả lời đơn giản quá rồi\ncòn gì」"

# 【ハチロク】
# display as 八六
# JP: 「はい――」
1760 = "「Vâng——」"

# monologue
# JP: 頷いて。\nハチロクは顎を軽くあげ、目を閉じる。
2287 = "Giọng của Hachiroku cũng bắt đầu nhuốm màu\nbuồn ngủ đậm đặc.\nNói đúng hơn là——cả tôi cũng vậy——"

# monologue
# JP: 僕らの望みは、重なり合ってる。
2502 = "Về phần chụp ảnh thì tôi không chụp được\nnhiều lắm,\nnhưng dù vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
# 1543 = "「八六」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄、さま」
1901 = "「Ngài Soutetsu」"

# monologue
# JP: だから、望みを形にするため。
2590 = "Vì thế, để biến ước muốn đó thành hiện\nthực."

# monologue
# JP: 僕らは――お互いを与え合うキスをする。
2503 = "Chúng tôi——trao nhau nụ hôn để hiến dâng\ncho nhau."
