[script]
# lines: 489 
# monologue
# JP: [なだれ,1]雪崩る雨と、沸き立つ雲のような蒸気が、\n前照灯の明かりを散らす。
2210 = "Trận mưa trút xuống như tuyết lở, cùng hơi nước cuồn cuộn như mây,\nlàm tán loạn ánh sáng của đèn pha trước."
# monologue
# JP: 豪雨と霧と光のベール。\n幻想的な光景は、しかし視界をほぼ完全に塞いでもいる。
2633 = "Bức màn mưa lớn, sương mù và ánh sáng.\nMột khung cảnh huyền ảo, nhưng lại gần như che khuất hoàn toàn tầm nhìn."
# monologue
# JP: （文字通りの手探り、だな。これは）
2948 = "（Đúng nghĩa đen là mò mẫm trong đêm tối rồi. Thế này thì）"
# monologue
# JP: 訓練でなら、夜間走行は何度も経験している。
2510 = "Nếu là huấn luyện thì tôi đã trải qua chạy tàu ban đêm nhiều lần rồi."
# monologue
# JP: が……これほどの、ほぼ無視界の悪天候下で走らせるなど、\n日中にさえ、まったく経験の無い―――っ！？
2195 = "Nhưng…… chạy tàu trong điều kiện thời tiết khắc nghiệt gần như không có tầm nhìn thế này,\nthì ngay cả ban ngày tôi cũng chưa từng trải qua bao giờ——!?"
# 【双鉄】
# display as 雙鐵
# JP: 「くそっ」
1851 = "「Chết tiệt.」"
# monologue
# JP: 鉄の臭いと\x%lブラスト;#00ffc040;ブラスト%l;#;音が、激しい雨と暴風が、\n見えない冷たい手となって、僕の喉をゆるく締めてくる。
2841 = "Mùi sắt và tiếng \\x%lブラスト;#00ffc040;khí thải xi lanh%l;#;, cùng trận mưa lớn và cuồng phong,\nhóa thành những bàn tay lạnh lẽo vô hình, từ từ siết lấy cổ họng tôi."
# monologue
# JP: ……放っておけばあの日の記憶が這い登ってくる。\n頭を振って息を吐き、休ませずに手を動かし続ける。
1185 = "……Nếu cứ để mặc thì ký ức ngày hôm đó sẽ lại ùa về.\nTôi lắc đầu, thở hắt ra, đôi tay không ngừng cử động."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ――とにかく投げ込みだ」
1786 = "「Đúng rồi——tóm lại cứ xúc than vào thôi.」"
# monologue
# JP: （ざくっ）
2925 = "（Phập）"
# monologue
# JP: 石炭と火と水さえあれば、蒸気を切らすことがなければ、\n\x%l8620;#00ffc040;8620%l;#;はレールの上を、前進できる。
2337 = "Chỉ cần có than, lửa và nước, chỉ cần không bị tắt hơi,\nthì \\x%l8620;#00ffc040;8620%l;#; vẫn có thể tiến lên phía trước trên đường ray."
# monologue
# JP: そしてレールの向こうでは、恐らくはほぼ確実に、\n日々姫たちが、僕らの救援を待っているのだ。
2380 = "Và ở phía bên kia đường ray, gần như chắc chắn là,\nHibiki và mọi người đang chờ chúng tôi đến cứu viện."
# monologue
# JP: （焦らず進む。それだけでいい。\n……ここを越えれば、全ては一気に好転する）
2913 = "（Không nóng vội mà cứ tiến lên. Chỉ cần vậy thôi.\n……Vượt qua được chỗ này, mọi thứ sẽ tốt đẹp lên ngay lập tức.）"
# monologue
# JP: 現実的なことだけを。\n今のことだけを考える。
2506 = "Chỉ nghĩ đến những điều thực tế.\nChỉ nghĩ đến hiện tại thôi."
# monologue
# JP: 稀咲の助力を得られるようになり、実際、\n御一夜鉄道株式会社の財務体質は大きく改善されている。
2748 = "Nhờ có sự giúp đỡ của Kisaki, thực tế là,\ntình hình tài chính của Công ty Cổ phần Đường sắt Ohito đã được cải thiện đáng kể."
# monologue
# JP: （\x%lキハ07;#00ffc040;キハ07%l;#;が営業運転に復帰できれば、\n金銭面でも運営面でも、大きな余裕が生まれてくる）
2940 = "（Nếu \\x%lキハ07;#00ffc040;Kiha 07%l;#; có thể hoạt động thương mại trở lại,\nthì cả về mặt tài chính lẫn vận hành đều sẽ có khoảng dư dả lớn.）"
# monologue
# JP: そうなれば、人員だって増強できる。
2819 = "Khi đó, nhân sự cũng có thể được tăng cường."
# monologue
# JP: あと一人、助士の目と手がありさえすれば、\nこの状況とて――こうも不安には感じまい。
2752 = "Chỉ cần có thêm một đôi mắt và đôi tay của phụ lái tàu,\nthì trong tình huống này——tôi cũng không cảm thấy bất an đến thế."
# monologue
# JP: （ハチロクが――\x%l機関士;#00ffc040;機関士%l;#;役など）
2927 = "（Để Hachiroku——đóng vai trò \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;）"
# monologue
# JP: 助士が不在で、僕が投げ込みに回る以上、\n\x%l機関士;#00ffc040;機関士%l;#;として\x%l8620;#00ffc040;8620%l;#;を運転するのは、ハチロクだ。
2374 = "Vì không có phụ lái tàu, tôi phải quay sang xúc than,\nnên người lái \\x%l8620;#00ffc040;8620%l;#; với tư cách là \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#;, chính là Hachiroku."
# monologue
# JP: \x%l整備体;#00ffc040;整備体%l;#;の横顔は凛と張り詰めて、\n怖いくらいに美しいものと感じもするが――
2514 = "Góc nghiêng của \\x%l整備体;#00ffc040;thân chính%l;#; vô cùng nghiêm nghị và căng thẳng,\nđẹp đến mức khiến tôi cảm thấy đáng sợ——"
# monologue
# JP: （だが、目隠しだ。\x%l整備体;#00ffc040;整備体%l;#;のハチロクでは、\nセンサ性能が不十分すぎる）
2910 = "（Nhưng mà, thế này chẳng khác nào bịt mắt. Với \\x%l整備体;#00ffc040;thân chính%l;#; của Hachiroku,\nthì hiệu suất cảm biến quá kém.）"
# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;の僕と、\x%l運転体;#00ffc040;運転体%l;#;のハチロクとで組んでるときの――\n背中を完全に預けあえている安心感が、今は無い。
2678 = "Cảm giác an tâm khi tôi làm \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; kết hợp với \\x%l運転体;#00ffc040;kíp lái%l;#; của Hachiroku——\ncảm giác có thể hoàn toàn giao phó tấm lưng cho nhau, bây giờ không còn nữa."
# monologue
# JP: 車体の状態を適宜モニタし、最適の運転指示をくれる。\n\x%l運転体;#00ffc040;運転体%l;#;の能力を、今のハチロクは発揮できない。
2455 = "Theo dõi trạng thái thân xe một cách thích hợp, và đưa ra chỉ thị lái tối ưu nhất.\nNăng lực của \\x%l運転体;#00ffc040;kíp lái%l;#;, Hachiroku hiện tại không thể phát huy được."
# monologue
# JP: （これでは――やはり……）
2947 = "（Thế này thì——quả nhiên……）"
# 【ハチロク】
# display as 八六
# JP: 「制限60」
1899 = "「Giới hạn 60.」"
# monologue
# JP: 雨音の向こう。\x%l喚呼;#00ffc040;喚呼%l;#;はひどく、細く聞こえる。\n標識位置での\x%l喚呼;#00ffc040;喚呼%l;#;であるが、恐らく表示を読めてもいまい。
2814 = "Phía sau tiếng mưa. Tiếng \\x%l喚呼;#00ffc040;hô xác nhận%l;#; nghe rất nhỏ và yếu ớt.\nDù là \\x%l喚呼;#00ffc040;hô xác nhận%l;#; ở vị trí biển báo, nhưng có lẽ em ấy cũng không đọc được biển báo."
# monologue
# JP: ただ、経験のみ。\n今まで調べ、積み重ねてきたものだけが――っ！？
2398 = "Chỉ dựa vào kinh nghiệm.\nChỉ những gì đã tìm hiểu và tích lũy từ trước đến nay——!?"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ」
1617 = "「A, đúng rồi.」"
# monologue
# JP: 喉がすうっと楽になる。\nハチロクのただ一言が、僕の不安を祓ってくれる。
2560 = "Cổ họng tôi chợt nhẹ nhõm hẳn.\nChỉ một lời nói của Hachiroku đã xua tan đi sự bất an trong tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「見えているんだ。ハチロクには。\nいや――僕にだって、見えたじゃないか」
1545 = "「Em ấy nhìn thấy được. Hachiroku.\nKhông——cả tôi cũng nhìn thấy mà.」"
# monologue
# JP: 豪雨のベールの向こうでも、\nいつもと違う速度であっても、確かに見えた。
2437 = "Dù là phía sau bức màn mưa lớn,\ndù tốc độ có khác mọi khi, nhưng tôi vẫn nhìn thấy rõ."
# monologue
# JP: 標識の位置、信号の位置、踏切の位置、廃駅の位置。\n把握出来てる――経験が、視界の代わりを努めてくれてる。
2151 = "Vị trí biển báo, vị trí tín hiệu, vị trí đường ngang, vị trí ga bỏ hoang.\nTôi đều nắm rõ——Kinh nghiệm đã thay thế cho tầm nhìn."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ、ハチロクはハチロクだ。\n僕よりよほど経験豊かだ。何を心配することも無い」
1790 = "「Đúng rồi, Hachiroku là Hachiroku.\nEm ấy giàu kinh nghiệm hơn tôi nhiều. Không có gì phải lo lắng cả.」"
# monologue
# JP: あれほど注意していた筈なのに、\nそれでも思考が、ネガティブな方へ引きずられていた。
2541 = "Đã cẩn thận đến mức đó rồi,\nvậy mà suy nghĩ vẫn bị kéo về hướng tiêu cực."
# monologue
# JP: さっきより強く頭を振って深呼吸して、\nワンスコを握る指にも力を込め直す。
2551 = "Tôi lắc đầu mạnh hơn lúc nãy, hít một hơi thật sâu,\nvà nắm chặt lại các ngón tay đang cầm xẻng xúc than."
# monologue
# JP: （ザクっ――ザッ）
2936 = "（Phập——Phập）"
# monologue
# JP: が――\n気合がそのまま石炭に乗ってくれるものでもない。
2184 = "Nhưng——\nKhông phải cứ có khí thế là than sẽ cháy theo ý mình."
# monologue
# JP: まるで湿気りでもしたかのように、\nグズって、カラリと燃えてくれない。
2674 = "Như thể bị ẩm vậy,\nnó cứ ỉu xìu, không chịu cháy bùng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、ブロアをかけるぞ」
1551 = "「Hachiroku, anh bật thiết bị thổi gió nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
1222 = "「…………」"
# monologue
# JP: 滝のような雨音に負け、聞こえぬようだ。\n声を張り上げ、もう一度。
2564 = "Có vẻ tiếng mưa như thác đổ đã át đi, em ấy không nghe thấy.\nTôi lớn giọng, gọi lại lần nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク！　ブロアをかけるが、良いか！\n\x%lカマ;#00ffc040;カマ%l;#;の具合がすぐれんのだ」
1547 = "「Hachiroku! Anh bật thiết bị thổi gió nhé, được không!\nTình trạng \\x%lカマ;#00ffc040;lò hơi%l;#; không được tốt lắm.」"
# 【ハチロク】
# display as 八六
# JP: 「えっ！？　あ、ブロア――ブロアですね。\nどうぞ、なさってください」
1596 = "「Hả!? A, thiết bị thổi gió——thiết bị thổi gió ạ.\nVâng, ngài cứ bật đi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「『ブロア！』」
1220 = "「『Thiết bị thổi gió!』」"
# monologue
# JP: \x%l喚呼;#00ffc040;喚呼%l;#;一発、勢いも良くバルブをひねれば、\nボっ！　と蒸気が煙突から追い出される。
2123 = "Sau một tiếng \\x%l喚呼;#00ffc040;hô xác nhận%l;#;, tôi vặn mạnh van,\nPhụt! Hơi nước bị đẩy ra khỏi ống khói."
# monologue
# JP: 強烈な通風が起こったはずだが――焚き口を開けても、\n\x%lカマ;#00ffc040;カマ%l;#;の火にはやはり、いつものような勢いはない。
2817 = "Đáng lẽ phải có luồng gió mạnh thổi qua——nhưng dù mở cửa lò,\nlửa trong \\x%lカマ;#00ffc040;lò hơi%l;#; vẫn không có khí thế như mọi khi."
# 【双鉄】
# display as 雙鐵
# JP: 「何故だ？\nまさか、実際に[しけ,1]湿気っているわけでもあるまいに」
1804 = "「Tại sao chứ?\nLàm gì có chuyện nó thực sự bị ẩm được.」"
# 【ハチロク】
# display as 八六
# JP: 「あ」
1612 = "「A.」"
# monologue
# JP: まるで目覚めでもしたかのように、\nぱちぱち、何度か小刻みなまばたき。
2429 = "Như thể vừa bừng tỉnh,\nem ấy chớp mắt liên tục vài cái."
# 【ハチロク】
# display as 八六
# JP: 「燃えが悪いのは、気圧のせいです。双鉄様」
1759 = "「Cháy kém là do áp suất không khí đấy ạ. Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「気圧――ああ」
1781 = "「Áp suất không khí——À.」"
# monologue
# JP: ただそれだけの会話に心底ほっとする。
2418 = "Chỉ một cuộc đối thoại ngắn ngủi vậy thôi cũng khiến tôi nhẹ nhõm từ tận đáy lòng."
# monologue
# JP: ハチロクの集中を乱したくない――\nそう思いつつ、返事をせずにはいられなくなる。
2851 = "Tôi không muốn làm Hachiroku mất tập trung——\nDù nghĩ vậy, nhưng tôi không thể không trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、気圧か。\nこれほどの台風の[ただなか,1]只中だものな」
1564 = "「Vậy sao, áp suất không khí à.\nĐang ở giữa tâm bão thế này cơ mà.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
1910 = "「!」"
# monologue
# JP: ハチロクの背中が一瞬、ビクつく。\n力が入り、妙に強張っているようにも見える。
2275 = "Lưng Hachiroku giật thót trong giây lát.\nCó vẻ như em ấy đang gồng mình, cứng đờ một cách kỳ lạ."
# 【双鉄】
# display as 雙鐵
# JP: 「どうかしたか？」
1671 = "「Có chuyện gì sao?」"
# 【ハチロク】
# display as 八六
# JP: 「あっ――あ、いえ。その……\n日々姫たちは、大丈夫かと」
1603 = "「A——A, không ạ. Chuyện là……\nKhông biết Hibiki và mọi người có sao không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのことならば心配するな。\n日々姫だけではなく、稀咲もふかみもいるのだ」
1876 = "「Chuyện đó thì em đừng lo.\nKhông chỉ có Hibiki, mà còn có cả Kisaki và Fukami nữa.」"
# monologue
# JP: 凪がもし、おかしな場所で寝泊まりしたがろうとしても、\n三人寄れば、流されるようなこともあるまい。
2435 = "Dù Nagi có muốn ngủ lại ở nơi kỳ quái nào đó,\nthì với ba người bọn họ, chắc chắn sẽ không để bị cuốn theo đâu."
# 【双鉄】
# display as 雙鐵
# JP: 「僕らの目と手で、安全性を確かめただろう。\n廃炭鉱の探索に、最適なベースキャンプ地ならば――」
1693 = "「Chúng ta đã tận mắt và tận tay kiểm tra sự an toàn rồi mà.\nNếu là địa điểm cắm trại lý tưởng nhất cho việc khám phá mỏ than bỏ hoang thì——」"
# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1612 = "「啊」" 
# monologue
# JP: 小さな声がもれると同時に、背中の強張りが消えていく。
2399 = "Cùng lúc với một tiếng kêu nhỏ phát ra, sự căng cứng trên lưng em ấy cũng biến mất."
# 【ハチロク】
# display as 八六
# JP: 「駅舎ですか」
1765 = "「Nhà ga sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。あの日得たデータから出た結論を、\n日々姫も稀咲も、確認しているのだからな」
1624 = "「Ừm. Kết luận rút ra từ dữ liệu thu được ngày hôm đó,\ncả Hibiki và Kisaki đều đã xác nhận rồi mà.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\nはい――はい」
1788 = "「Đúng vậy ạ.\nVâng——Vâng.」"
# monologue
# JP: よほど心配だったのだろう。\n何度も何度もハチロクは頷く。
2693 = "Chắc hẳn em ấy đã rất lo lắng.\nHachiroku gật đầu hết lần này đến lần khác."
# 【ハチロク】
# display as 八六
# JP: 「日々姫たちは――\n駅で、わたくしたちの到着を待っている」
1743 = "「Hibiki và mọi người——\nđang đợi chúng ta đến ở nhà ga.」"
# monologue
# JP: 噛みしめるようなハチロクの言葉。\nそれはじんわり、僕の心にも染みてくる。
2263 = "Lời nói của Hachiroku như thể đang tự nhủ với bản thân.\nNó cũng dần dần thấm vào trái tim tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな」
1653 = "「Ừ. Đúng vậy.」"
# monologue
# JP: 局面自体は簡単なのだと、\n頭がぱちり、切り替わる。
2574 = "Tình hình thực ra rất đơn giản,\nđầu óc tôi chợt bừng tỉnh."
# monologue
# JP: 駅から駅へ、乗客を乗せて届ければいい。\nいつもどおりをやれば問題は解決するのだ。
2332 = "Chỉ cần chở hành khách từ ga này đến ga khác.\nCứ làm như mọi khi là vấn đề sẽ được giải quyết."
# 【ハチロク】
# display as 八六
# JP: 「――[きのした,1]木下廃駅、通過！」
1204 = "「——Ga bỏ hoang Kinoshita, đi qua!」"
# 【双鉄】
# display as 雙鐵
# JP: 「[きのした,1]木下廃駅、通過、良し！」
1776 = "「Ga bỏ hoang Kinoshita, đi qua, tốt!」"
# monologue
# JP: はっきりとしたハチロクの\x%l喚呼;#00ffc040;喚呼%l;#;が気合を新たにしてくれる。\n術仙炭鉱廃駅までを安全に乗り切るために――
2258 = "Tiếng \\x%l喚呼;#00ffc040;hô xác nhận%l;#; rõ ràng của Hachiroku đã tiếp thêm cho tôi sức mạnh mới.\nĐể vượt qua đoạn đường đến ga mỏ than bỏ hoang Jutsusen một cách an toàn——"
# monologue
# JP: 普段と違い、助士ではあるが、\nやるべきことなら、体がきっちり覚えてる。
2849 = "Dù khác với mọi khi, tôi đang làm phụ lái tàu,\nnhưng những việc cần làm, cơ thể tôi vẫn nhớ rất rõ."
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
1628 = "「Ừm!」"
# monologue
# JP: 石炭を軽めに投げ入れて、水面計を確かめる。
2573 = "Tôi xúc than ném vào nhẹ nhàng, rồi kiểm tra đồng hồ đo mực nước."
# monologue
# JP: ……ボイラ水位が、下がりすぎてる。\n給水バルブをひねって80\%まで戻す。
1186 = "……Mực nước lò hơi, giảm quá nhiều rồi.\nTôi vặn van cấp nước để đưa nó về lại 80%."
# monologue
# JP: ふたりでも、十分やれるじゃないか。
2347 = "Dù chỉ có hai người, chúng tôi vẫn làm tốt mà."
# monologue
# JP: そうやれるよう、積み重ねてきた。\n全てはハチロクが叩き込み、体に覚えさせてくれた。
2725 = "Chúng tôi đã tích lũy kinh nghiệm để có thể làm được như vậy.\nTất cả đều do Hachiroku chỉ dạy, và bắt cơ thể tôi phải ghi nhớ."
# monologue
# JP: 助士が欠員しようとも、どれほど天候が悪くとも、\n越える準備を、僕は整えてもらって――――ん？
2439 = "Dù có thiếu phụ lái tàu, dù thời tiết có tồi tệ đến đâu,\ntôi cũng đã được chuẩn bị sẵn sàng để vượt qua――――hửm?"
# monologue
# JP: （水位――うむ？）
2934 = "（Mực nước——hửm?）"
# monologue
# JP: いつもと同じにした筈なのに、水面がやけに高い――\nいやっ！？　いっぱいにまでせり上がってる！
2627 = "Rõ ràng là làm giống như mọi khi, sao mực nước lại cao thế này——\nKhông!? Nó đang dâng lên đến tận miệng rồi!"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！　そうかっ、これも気圧が――っ！！？」
1614 = "「! Ra là vậy, cái này cũng là do áp suất không khí——!!?」"
# monologue
# JP: （ボッ！　ボボっ！　ズォボーーーーーーーッツ！！）
2926 = "（Bụp! Bụp! Xìiiiiiiiii!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？」
1475 = "「Cái gì!?」"
# 【ハチロク】
# display as 八六
# JP: 「っ！？」
1915 = "「!?」"
# monologue
# JP: 異音！\nすぐさま黒が視界をっ！？
2475 = "Âm thanh lạ!\nNgay lập tức một màu đen che khuất tầm nhìn!?"
# monologue
# JP: 前方窓にビシャビシャと、\n真っ黒な雨がぶつかってくるっ！
2656 = "Đập vào cửa sổ phía trước,\nlà những giọt mưa đen ngòm!"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、これはっ」
1878 = "「Cái gì thế này.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。大丈夫です！　治まります！」
1903 = "「Ngài Soutetsu. Không sao đâu ạ! Sẽ hết ngay thôi!」"
# monologue
# JP: 前方注視を解いてまで、\nハチロクは僕へと振り向き、笑ってくれる。
2254 = "Hachiroku thậm chí còn ngừng quan sát phía trước,\nquay lại nhìn tôi và mỉm cười."
# monologue
# JP: 黒い雨はまだ前窓を激しく叩いている。\n見ようとしても、何一つさえ見えないほどに。
2879 = "Cơn mưa đen vẫn đang đập mạnh vào cửa sổ phía trước.\nDù có cố nhìn cũng không thể thấy được gì."
# 【ハチロク】
# display as 八六
# JP: 「ただの\x%l汽水共発;#00ffc040;[プライミング,3]汽水共発%l;#;です。\n水が飛びきれば、治まります」
1460 = "「Chỉ là \\x%l汽水共発;#00ffc040;hiện tượng sủi bọt lò hơi%l;#; thôi ạ.\nKhi nước bắn hết ra ngoài, nó sẽ dừng lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「プライミング？」
1784 = "「Sủi bọt lò hơi?」"
# 【ハチロク】
# display as 八六
# JP: 「ボイラ水が溢れたのです。それが蒸気と一緒に膨張し、\n猛烈な勢いで煙突まで抜けて、吹き出た」
1894 = "「Nước lò hơi bị tràn ra ạ. Nó cùng với hơi nước giãn nở ra,\nthoát ra ống khói với lực rất mạnh, và phun ra ngoài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ――」
1602 = "「A——」"
# monologue
# JP: 失敗をした。足しすぎた。\nいつもどおりのつもりだったが、気圧に影響されて――
2505 = "Tôi đã thất bại. Cho quá nhiều nước rồi.\nCứ tưởng làm như mọi khi là được, nhưng do ảnh hưởng của áp suất không khí——"
# monologue
# JP: （いやっ）
2903 = "（Không）"
# monologue
# JP: “いつもどおり”にやるのなら、\nハチロクに何故、注水の前に確認を取らなかったのか。
2416 = "Nếu làm \"như mọi khi\",\nthì tại sao tôi lại không xác nhận với Hachiroku trước khi cấp nước."
# monologue
# JP: ――あと少しだと油断した。\n自分の甘さを、いまさらながらに理解する。
2120 = "——Chỉ vì nghĩ sắp đến nơi rồi nên tôi đã chủ quan.\nGiờ tôi mới nhận ra sự nông nổi của bản thân."
# 【ハチロク】
# display as 八六
# JP: 「そのようなお顔をなさらないでください」
1853 = "「Xin ngài đừng làm vẻ mặt như vậy ạ.」"
# monologue
# JP: 動揺している。\n自分でそうとわかるほど。
2543 = "Tôi đang bối rối.\nĐến mức tự bản thân tôi cũng nhận ra điều đó."
# monologue
# JP: だからであろう、ハチロクは、\n包み込むような笑顔で僕に、ゆっくりとした言葉をかける。
2157 = "Có lẽ vì vậy mà Hachiroku,\nđã nở một nụ cười bao dung và nói với tôi bằng giọng điệu chậm rãi."
# 【ハチロク】
# display as 八六
# JP: 「プライミングなど、ままあることと聞いています。\n実害は、ほとんど発生しないものであるとも」
1727 = "「Em nghe nói hiện tượng sủi bọt lò hơi cũng thường xảy ra lắm ạ.\nVà nó cũng hầu như không gây ra thiệt hại thực tế nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そうか」
1241 = "「……Vậy sao.」"
# monologue
# JP: いたわりが、なぐさめが。とても温かに伝わってくる。\nならば自責は……単なる甘えとなってしまおう。
2408 = "Sự quan tâm, lời an ủi. Truyền đến tôi thật ấm áp.\nNếu vậy, sự tự trách…… sẽ chỉ là một sự nhõng nhẽo đơn thuần thôi."
# monologue
# JP: 悔やむ気持ちを腹でぎゅうっと、最小限に押しつぶす。
2517 = "Tôi nén chặt cảm giác hối hận xuống tận đáy lòng, thu nhỏ nó lại mức tối đa."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。\n同じ失敗は繰り返さぬようにする」
1737 = "「Xin lỗi.\nAnh sẽ không lặp lại sai lầm tương tự nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「それはもちろんのことですが――」
1879 = "「Đó là điều tất nhiên rồi ạ, nhưng——」"
# monologue
# JP: 数秒。\n言葉を探すような沈黙。
2404 = "Vài giây.\nMột sự im lặng như thể đang tìm kiếm từ ngữ."
# 【ハチロク】
# display as 八六
# JP: 「駆け出しの時分にはよく起こす失敗と聞きますので。\n今まで一度も無かったことが、むしろ珍しいかと」
1728 = "「Em nghe nói đây là lỗi thường gặp ở những người mới bắt đầu.\nTừ trước đến nay chưa từng xảy ra một lần nào, mới là điều hiếm thấy đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはハチロク。お前のおかげだ」
1882 = "「Đó là nhờ em đấy, Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
1600 = "「Dạ?」"
# monologue
# JP: 単なる事実が証明している。\nそれがよくある失敗ならば、なおのこと。
2162 = "Một sự thật đơn giản đã chứng minh điều đó.\nNếu đó là một lỗi thường gặp, thì càng chứng minh điều đó."
# monologue
# JP: 僕だけではなく、日々姫も、凪も――\n誰が助士を務めたときにもこんな現象は起こらなかった。
2132 = "Không chỉ tôi, mà cả Hibiki, cả Nagi——\nDù ai làm phụ lái tàu đi chăng nữa, thì hiện tượng này cũng chưa từng xảy ra."
# 【双鉄】
# display as 雙鐵
# JP: 「お前が常に、的確な指示をくれるから。\n僕らは失敗らしい失敗もせずやってきたのだ」
1636 = "「Vì em luôn đưa ra những chỉ thị chính xác.\nNên chúng ta mới có thể làm việc mà không gặp phải sai lầm nào đáng kể.」"
# 【ハチロク】
# display as 八六
# JP: 「いえ、そのような――っ！！？」
1463 = "「Không đâu ạ, làm gì có chuyện——!!?」"
# monologue
# JP: （ガガっ！　ガリリリリっ！）
2924 = "（Két! Két két két két!）"
# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？　なんだこれはっ！？」
1476 = "「Cái gì!? Cái gì thế này!?」"
# monologue
# JP: 別の異音――金属音。衝撃音。\n鋼鉄の歯を歯医者のドリルで削るみたいな――
2330 = "Lại một âm thanh lạ khác——âm thanh kim loại. Âm thanh va chạm.\nGiống như tiếng mũi khoan nha khoa đang mài vào răng thép vậy——"
# 【ハチロク】
# display as 八六
# JP: 「えっ！？　まさかっ！？」
1598 = "「Hả!? Không lẽ nào!?」"
# monologue
# JP: （ガガガっ！　ガガガガガガガっ！！）
2923 = "（Két két két! Két két két két két két két!!）"
# monologue
# JP: 音は止まない。\nむしろますます加熱して――っ！
2746 = "Âm thanh không dừng lại.\nThậm chí còn ngày càng lớn hơn——!"
# 【双鉄】
# display as 雙鐵
# JP: 「油切れかっ！」
1764 = "「Hết dầu sao!」"
# monologue
# JP: 突沸し、煙突から高圧で吹き出し降り注いだボイラ水が、\n駆動部のオイルを根こそぎ洗い飛ばしてしまったのだろう。
2482 = "Nước lò hơi sôi trào, phun ra từ ống khói với áp suất cao rồi rơi xuống,\nchắc hẳn đã rửa trôi sạch sẽ dầu bôi trơn ở bộ phận truyền động rồi."
# 【ハチロク】
# display as 八六
# JP: 「そんな……\nこのような事例、ほとんど聞いたことも」
1672 = "「Sao có thể……\nTrường hợp như thế này, em hầu như chưa từng nghe thấy bao giờ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、起きたのだ。何万分の一であろうと」
1488 = "「Nhưng, nó đã xảy ra rồi. Dù xác suất chỉ là một phần vạn đi chăng nữa.」"
# monologue
# JP: 失敗を起こさぬ能力を有しているがゆえ、\nハチロクは動揺しているようだ。
2362 = "Vì sở hữu năng lực không bao giờ mắc lỗi,\nnên Hachiroku có vẻ đang rất bối rối."
# monologue
# JP: このままいけば\x%l8620;#00ffc040;8620%l;#;は、焼きつきを起こし壊れてしまう。\nならば、取るべき手段はひとつしかない。
2821 = "Nếu cứ để thế này, \\x%l8620;#00ffc040;8620%l;#; sẽ bị kẹt động cơ và hỏng mất.\nNếu vậy, chỉ còn một cách duy nhất."
# 【ハチロク】
# display as 八六
# JP: 「っ！！？\n双鉄様、代わってください！　わたくしが」
1914 = "「!!?\nNgài Soutetsu, xin hãy đổi chỗ cho em! Em sẽ」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、だめだ。僕が行く」
1454 = "「Không, không được. Anh sẽ đi.」"
# 【ハチロク】
# display as 八六
# JP: 「危険すぎます！　生身の人間がそのような」
1855 = "「Quá nguy hiểm ạ! Một con người bằng xương bằng thịt sao có thể」"
# 【双鉄】
# display as 雙鐵
# JP: 「お前とて、転落すれば壊れよう。\nお前が壊れてしまっては、\x%l8620;#00ffc040;8620%l;#;はもう走れない」
1520 = "「Cả em nữa, nếu ngã xuống thì cũng sẽ hỏng mất.\nNếu em bị hỏng, \\x%l8620;#00ffc040;8620%l;#; sẽ không thể chạy được nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「ですがっ！」
1490 = "「Nhưng mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕はオーナーでマスターだ」
1714 = "「Anh là chủ sở hữu và là Master.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 1910 = "「！」" 
# monologue
# JP: 行かせられない。\n行かせない。
2149 = "Không thể để em ấy đi được.\nTôi sẽ không để em ấy đi."
# monologue
# JP: もしもハチロクが壊れたら、\n僕とて、恐らく歩けなくなる。
2412 = "Nếu Hachiroku bị hỏng,\nthì có lẽ tôi cũng không thể bước tiếp được nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「命令をする。\nハチロク。このまま、運転を維持するんだ」
1699 = "「Đây là mệnh lệnh.\nHachiroku. Cứ như vậy, duy trì việc lái tàu đi.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！？」
1905 = "「Ngài Soutetsu!?」"
# monologue
# JP: 続く言葉を待ちはせず、\n\x%l歩き板;#00ffc040;歩き板%l;#;へと身をおどらせる。
2552 = "Không đợi em ấy nói hết câu,\ntôi liền lao mình ra \\x%l歩き板;#00ffc040;bệ bước chân%l;#;."
# monologue
# JP: （ゴウっ！！！！）
2916 = "（Vùuuu!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！？」
1592 = "「Ua!?」"
# monologue
# JP: ――これこそ、まさに暴風だ。
1161 = "——Đây mới thực sự là cuồng phong."
# monologue
# JP: 風に曝され殴りつけられ、\n言葉の意味を、体で思い知らされる。
2489 = "Bị gió quật vào người,\ntôi mới hiểu được ý nghĩa của từ đó bằng chính cơ thể mình."
# 【双鉄】
# display as 雙鐵
# JP: 「普段で、あれば――なんてことはない――\n距離――なのにっ――」
1744 = "「Bình thường, thì——chẳng là gì cả——\nKhoảng cách này——vậy mà——」"
# monologue
# JP: キャブから、ほんの数メートル先。\n\x%l缶胴;#00ffc040;缶胴%l;#;右側、デフのすぐ後――\x%lオイルポンプ;#00ffc040;オイルポンプ%l;#;はそこにある。
2854 = "Cách buồng lái chỉ vài mét.\nBên phải \\x%l缶胴;#00ffc040;thân lò%l;#;, ngay sau tấm chắn khói——\\x%lオイルポンプ;#00ffc040;bơm dầu%l;#; nằm ở đó."
# 【双鉄】
# display as 雙鐵
# JP: 「く、そ――」
1850 = "「Chết, tiệt——」"
# monologue
# JP: \x%l缶掴み棒;#00ffc040;[ハンドレール,3]缶掴み棒%l;#;を握る手が、\n\x%l歩き板;#00ffc040;歩き板%l;#;に乗る足が、滑る。滑りに滑る。
2534 = "Bàn tay đang nắm chặt \\x%l缶掴み棒;#00ffc040;tay vịn lò hơi%l;#;,\nđôi chân đang đạp trên \\x%l歩き板;#00ffc040;bệ bước chân%l;#;, cứ trượt đi. Trượt mãi."
# monologue
# JP: 飛んだオイルが、そこにも恐らく乗っているのだ。
2772 = "Chắc hẳn là dầu bắn ra cũng đã dính vào đó rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「くそっ！！！！」
1585 = "「Chết tiệt!!!!」"
# monologue
# JP: 鉄の臭い。油の臭い。風の音。雨の音。\n一瞬にして冷えきる体は、あの時を思い出している。
2840 = "Mùi sắt. Mùi dầu. Tiếng gió. Tiếng mưa.\nCơ thể lạnh toát trong chớp mắt, lại nhớ về khoảnh khắc đó."
# monologue
# JP: だが、震えたなら、僕は死ぬ。\nならば心で、体を抑える。
2200 = "Nhưng, nếu run rẩy, tôi sẽ chết.\nVậy thì phải dùng lý trí để khống chế cơ thể."
# 【双鉄】
# display as 雙鐵
# JP: 「今度は――この手を――\n今度こそっ――絶対、この手を離さんぞっ！」
1881 = "「Lần này——đôi tay này——\nLần này chắc chắn——tuyệt đối, sẽ không buông tay đâu!」"
# monologue
# JP: じり、じり、進む。\n\x%l歩き板;#00ffc040;歩き板%l;#;から足を浮かせず、にじるようにして進んでく。
2525 = "Từng chút, từng chút một, tôi tiến lên.\nChân không rời khỏi \\x%l歩き板;#00ffc040;bệ bước chân%l;#;, tôi nhích từng bước về phía trước."
# 【双鉄】
# display as 雙鐵
# JP: 「路子が――掴ませてくれた、命なんだ」
1880 = "「Michi——đã trao cho tôi, sinh mệnh này.」"
# monologue
# JP: ようやく、僕は理解する。
2569 = "Cuối cùng, tôi cũng đã hiểu."
# monologue
# JP: 路子は僕を突き放し――\n空いた手に、命を渡してくれてたのだと。
2795 = "Michi đã đẩy tôi ra——\nvà trao sinh mệnh này vào bàn tay trống rỗng của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクと――出会わせてくれた命なんだ」
1887 = "「Sinh mệnh đã giúp tôi——được gặp gỡ Hachiroku.」"
# monologue
# JP: そして、進む一歩ごとに思い知る。
2671 = "Và rồi, mỗi bước tiến lên, tôi lại càng thấm thía."
# monologue
# JP: 僕はこれほど――\n生を、望んでいるのだと。
2545 = "Tôi khao khát——\nđược sống đến nhường này."
# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
1645 = "「Được rồi!」"
# monologue
# JP: ようやくデフのすぐ後ろにまで辿り着く。\nだが、慌てない。慌てれば死ぬ。
2736 = "Cuối cùng tôi cũng đến được ngay sau tấm chắn khói.\nNhưng, không được hoảng hốt. Hoảng hốt là chết."
# monologue
# JP: ゆっくりゆっくり右手を離し、\n\x%lオイルポンプ;#00ffc040;オイルポンプ%l;#;の扉を開けて、中のハンドルに手をかける。
2529 = "Từ từ, từ từ buông tay phải ra,\nmở cửa \\x%lオイルポンプ;#00ffc040;bơm dầu%l;#;, rồi đặt tay lên tay cầm bên trong."
# 【双鉄】
# display as 雙鐵
# JP: 「ン――くっ！」
1620 = "「Ư——hự!」"
# monologue
# JP: 片手でハンドルを回して、回して――
2532 = "Một tay xoay tay cầm, xoay mãi——"
# monologue
# JP: やがて。\n異音が聞こえなくなる。
2128 = "Rồi cuối cùng.\nTiếng động lạ cũng biến mất."
# 【双鉄】
# display as 雙鐵
# JP: 「やったぞ――ハチロク」
1674 = "「Thành công rồi——Hachiroku.」"
# monologue
# JP: やっとの思いで油を戻した。\nここで油断をしたなら、馬鹿だ。
2410 = "Phải khó khăn lắm mới bơm dầu lại được.\nNếu lúc này mà chủ quan thì đúng là đồ ngốc."
# monologue
# JP: キャブへと戻る手も足も、\nだからいっそう、慎重になる――
2585 = "Cả tay và chân khi quay lại buồng lái,\nvì thế mà càng trở nên thận trọng hơn——"
# 【双鉄】
# display as 雙鐵
# JP: 「――ぅはっ！」
1196 = "「——Ư hự!」"
# monologue
# JP: キャブへと、文字通り倒れこむ。
2568 = "Tôi ngã nhào vào buồng lái, đúng nghĩa đen."
# monologue
# JP: 息が出来ない、目がくらむ。\n濡れて冷えきり、体がひどく重く感じる。
2556 = "Không thở nổi, hoa mắt chóng mặt.\nCơ thể ướt sũng và lạnh toát, nặng trĩu vô cùng."
# 【ハチロク】
# display as 八六
# JP: 「双鉄……さまっ――」
1902 = "「Ngài Soutetsu……——」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1912 = "「!!?」"
# monologue
# JP: それでも一気に跳ね起きる。\nハチロクが――
2194 = "Dù vậy tôi vẫn bật dậy ngay lập tức.\nHachiroku đang——"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、ハチロク」
1512 = "「Sao vậy, Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしっ――わたくしには――\nむり――ですっ――もう、無理っ――」
1679 = "「Em——em không thể——\nLàm được——đâu ạ——không thể, nữa rồi——」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1912 = "「！！？」" 
# monologue
# JP: 運転姿勢のそのままで、前方注視を崩さぬままで――\nハチロクは、ぼろぼろと泣いている。
2253 = "Vẫn giữ nguyên tư thế lái tàu, vẫn không ngừng quan sát phía trước——\nHachiroku đang khóc nức nở."
# monologue
# JP: 涙を床にぼとぼと落とし、\nそうしながらも、\x%l加減弁;#00ffc040;加減弁%l;#;テコを制御している。
2648 = "Những giọt nước mắt rơi lã chã xuống sàn,\ndù vậy em ấy vẫn đang điều khiển cần gạt \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「無理――ですっ――\n運転を、維持、するっ、などっ――」
1867 = "「Không thể——đâu ạ——\nDuy trì, việc lái tàu, các thứ——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクっ！」
1546 = "「Hachiroku!」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄――様、までっ――\nわたくしを――置いて――いって――しまう、かとっ」
1688 = "「Đến cả——ngài Soutetsu——\nCũng sẽ——bỏ lại——em——mà đi, mất thôi——」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1911 = "「!!!」"
# monologue
# JP: ああ、そうだ。\nハチロクも置き去りにされているのだ。
2426 = "À, đúng rồi.\nHachiroku cũng từng bị bỏ lại."
# monologue
# JP: 事故の、そのあと。\x%l機関士;#00ffc040;機関士%l;#;からも仲間からも。\n同じ時間を過ごした存在、全てから――
2368 = "Sau vụ tai nạn đó. Từ \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; cho đến những người đồng đội.\nTừ tất cả những người đã cùng chung sống trong khoảng thời gian đó——"
# 【ハチロク】
# display as 八六
# JP: 「わたくし――はっ――\nもう――誰もっ――なくしたく――などっ――」
1676 = "「Em——đã——\nKhông muốn——mất đi——bất kỳ ai——nữa đâu——」"
# monologue
# JP: 突き刺さってくる。泣き声が。\nハチロクも僕と同じなのだと、ようやく、わかる。
2407 = "Tiếng khóc ấy. Đâm xuyên qua tôi.\nCuối cùng, tôi cũng hiểu ra rằng, Hachiroku cũng giống như tôi."
# monologue
# JP: 救えなかった苦しみを、死なせてしまった苦しみを。\nあの日から――ずっと、抱え続けているのだと。
2459 = "Nỗi đau khổ vì không thể cứu được, nỗi đau khổ vì đã để họ chết đi.\nTừ ngày hôm đó——em ấy vẫn luôn ôm giữ trong lòng."
# 【ハチロク】
# display as 八六
# JP: 「わたくしを――置き去りに――どうか――しないでっ」
1852 = "「Đừng——bỏ lại——em——xin ngài——đừng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク……僕は……」
1541 = "「Hachiroku…… Anh……」"
# monologue
# JP: 頼りきっていた。甘ったれていた。\nこんなに小さなハチロクに。
2484 = "Tôi đã quá dựa dẫm. Đã quá nhõng nhẽo.\nVào một Hachiroku nhỏ bé thế này."
# monologue
# JP: 大の男である僕が、自分の不安に耐え切れず――\nそれをまるごと、押し付けていた。
2797 = "Một thằng đàn ông to xác như tôi, lại không thể chịu đựng nổi sự bất an của chính mình——\nvà trút toàn bộ lên em ấy."
# monologue
# JP: （今まで、ずっとだ――\n無自覚に……僕は、ずうっとそうし続けてた）
2904 = "（Từ trước đến nay, vẫn luôn như vậy——\nMột cách vô thức…… tôi đã luôn tiếp tục làm như vậy.）"
# monologue
# JP: 終着駅に着いてないのは、\nそこまで、たどり着けなかったのは――
2538 = "Việc chưa đến được ga cuối,\nviệc không thể đi đến tận cùng——"
# monologue
# JP: ハチロクも同じなのだと、知っていたのに。
2247 = "Dù tôi biết rằng, Hachiroku cũng giống như mình."
# 【ハチロク】
# display as 八六
# JP: 「もう、これ以上――ひとり――で、なんて」
1457 = "「Đừng, bắt em phải——cô đơn——thêm nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1543 = "「Hachiroku.」"
# monologue
# JP: 僕が押し付けた全てを受け止め、\nハチロクは支えてくれていた。
2265 = "Hachiroku đã đón nhận tất cả những gì tôi trút lên,\nvà luôn chống đỡ cho tôi."
# monologue
# JP: いま、ハチロクが崩れてしまいそうならば、\n今度は僕が、支えたい。
2609 = "Bây giờ, nếu Hachiroku sắp sụp đổ,\nthì lần này, tôi muốn là người chống đỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「一人じゃない。僕も、お前も」
1508 = "「Em không cô đơn đâu. Cả anh, cả em đều vậy.」"
# monologue
# JP: だから、後から抱きしめる。\n抱きしめて、ハチロクの手を手で包み込む。
2589 = "Thế nên, tôi ôm em ấy từ phía sau.\nÔm lấy em ấy, và dùng tay mình bao bọc lấy đôi tay của Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「もう一人じゃない。一人じゃないんだ。\n僕がいて、お前がいるから――ここにいるから」
1509 = "「Em không còn cô đơn nữa. Không cô đơn đâu.\nVì có anh, có em——vì chúng ta đang ở đây.」"
# monologue
# JP: 割り切ろうとして割り切れず。\n忘れようとして忘れられずに。
2480 = "Cố gắng dứt bỏ nhưng không thể dứt bỏ.\nCố gắng lãng quên nhưng không thể lãng quên."
# monologue
# JP: 傷の痛みは、きっと同じで。\nでもハチロクはその苦しさを、一度も僕に見せなかった。
2500 = "Nỗi đau của vết thương, chắc chắn là giống nhau.\nNhưng Hachiroku chưa một lần nào cho tôi thấy sự đau khổ đó."
# monologue
# JP: （僕がいたから、ハチロクは……\n事故の苦しみを、吐き出せなかった――）
2933 = "（Vì có tôi ở đó, nên Hachiroku……\nđã không thể trút bỏ nỗi đau khổ về vụ tai nạn——）"
# monologue
# JP: それがどれほどの苦痛であるか、\n僕は、誰より知っている。
2547 = "Nỗi đau đó lớn đến nhường nào,\ntôi là người hiểu rõ hơn ai hết."
# monologue
# JP: その苦しみをどう扱えばいいものか、\nようやく、僕は知れたと思う。
2558 = "Tôi nghĩ cuối cùng mình cũng đã biết,\nphải đối mặt với nỗi đau đó như thế nào."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――\nこの勾配の向こうの景色が、お前にも見えるよな」
1539 = "「Hachiroku——\nKhung cảnh phía bên kia con dốc này, em cũng nhìn thấy đúng không.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 1910 = "「！」" 
# monologue
# JP: ハチロクの体が硬くなる。\n怯えに、ぶるぶる震え始める。
2282 = "Cơ thể Hachiroku cứng đờ.\nBắt đầu run lẩy bẩy vì sợ hãi."
# monologue
# JP: それでも手指は迷わず動く。\n\x%l加減弁;#00ffc040;加減弁%l;#;を。ブレーキを。重ね合う手で操作する。
2187 = "Dù vậy, những ngón tay vẫn cử động không chút do dự.\n\\x%l加減弁;#00ffc040;Van tiết lưu hơi%l;#;. Phanh hãm. Điều khiển bằng đôi bàn tay đan vào nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「あそこを越えれば到着できる。\n日々姫が、そこで待っているんだ」
1582 = "「Vượt qua chỗ đó là chúng ta sẽ đến nơi.\nHibiki đang đợi ở đó.」"
# monologue
# JP: 雨は少しも緩んでくれず。\n視界は、ほとんど遮られている。
2859 = "Mưa không hề ngớt đi chút nào.\nTầm nhìn gần như bị che khuất hoàn toàn."
# monologue
# JP: それでも僕らは、見えずとも見る。\nクマ川第四橋梁を――赤くか細い鉄橋を。
2189 = "Dù vậy, chúng tôi vẫn nhìn thấy dù không thể thấy.\nCây cầu thứ tư trên sông Kuma——cây cầu sắt màu đỏ mỏng manh."
# 【ハチロク】
# display as 八六
# JP: 「わたくし――には――むりっ」
1680 = "「Em——không thể——làm được」"
# monologue
# JP: ガタガタと、ハチロクの震えは止まらない。\n涙は、もはや川のようだ。
2283 = "Hachiroku vẫn run rẩy không ngừng.\nNước mắt đã tuôn rơi như một dòng sông."
# 【ハチロク】
# display as 八六
# JP: 「見えま――せんっ――\nだって――橋は――あの、橋はっ！」
1724 = "「Không nhìn——thấy đâu ạ——\nVì——cây cầu——cây cầu đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1789 = "「Ừ.」"
# monologue
# JP: 涙に揺れる瞳はきっと、過去を見ている。\n僕らはずっと、そうすることを強いられてきた。
2402 = "Đôi mắt đẫm lệ đó chắc chắn đang nhìn về quá khứ.\nChúng tôi đã luôn bị ép buộc phải làm như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「あの橋を、あの過去を。\n僕も同じだ。越えられなかった」
1684 = "「Cây cầu đó, quá khứ đó.\nAnh cũng giống em. Không thể vượt qua được.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 1910 = "「！」" 
# monologue
# JP: 救えなかった悲しみは、殺してしまった悲しみは、\n一生、消えることはない。
2658 = "Nỗi buồn vì không thể cứu được, nỗi buồn vì đã giết chết họ,\nsẽ không bao giờ biến mất trong suốt quãng đời còn lại."
# monologue
# JP: 割り切ることも忘れることも決してできないことなのだと、\n僕は何度も。何度も何度も、何度も思い知らされた。
2520 = "Tôi đã nhiều lần. Rất nhiều lần, vô số lần nhận ra rằng,\nđó là điều tuyệt đối không thể dứt bỏ, cũng không thể lãng quên."
# 【双鉄】
# display as 雙鐵
# JP: 「だがな。ハチロク」
1489 = "「Nhưng mà. Hachiroku.」"
# monologue
# JP: 体を預ける。密着させる。\n僕とハチロクの身体の熱を、交換しあう。
2566 = "Tôi tựa hẳn người vào em ấy. Áp sát vào nhau.\nTrao đổi hơi ấm cơ thể giữa tôi và Hachiroku."
# monologue
# JP: 届くと知ってる。聞こうと、いつでもしてくれるから。\nたとえハチロクがどれほどに、怯え竦んでしまっていても。
2148 = "Tôi biết là sẽ truyền đến được. Vì em ấy luôn sẵn sàng lắng nghe.\nDù cho Hachiroku có đang sợ hãi co rúm lại đến mức nào đi chăng nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「僕らは、ふたりだ」
1694 = "「Chúng ta, là hai người.」"
# monologue
# JP: ひとりじゃない。
2498 = "Không phải một mình."
# monologue
# JP: かつての路子と僕とのように、\n半身をわけあったものじゃない。
2134 = "Không giống như tôi và Michi ngày trước,\nkhông phải là hai nửa chia sẻ cùng một cơ thể."
# 【双鉄】
# display as 雙鐵
# JP: 「ひとりでは決して出来ないことが――\nふたりだったら、できるんだ」
1659 = "「Những điều mà một người tuyệt đối không thể làm được——\nNếu là hai người, thì sẽ làm được.」"
# monologue
# JP: 教えてくれたのはハチロクだ。
2268 = "Người đã dạy tôi điều đó chính là Hachiroku."
# monologue
# JP: もしも忘れてしまっているなら、思い出させるだけでいい。
2413 = "Nếu em ấy đã quên, thì tôi chỉ cần nhắc lại cho em ấy nhớ là được."
# 【双鉄】
# display as 雙鐵
# JP: 「お前は、あの橋を越えられなかった。\n僕は、あの橋を越えられなかった」
1523 = "「Em, đã không thể vượt qua cây cầu đó.\nAnh, cũng đã không thể vượt qua cây cầu đó.」"
# monologue
# JP: そして死なせた。救えなかった。
2670 = "Và rồi đã để họ chết. Không thể cứu được."
# monologue
# JP: ついてしまった傷は一生消えないし。\n今も未来も、ことあるごとに血を流していくことだろう。
2361 = "Vết thương đã in hằn sẽ không bao giờ biến mất.\nCả hiện tại và tương lai, mỗi khi có chuyện gì, nó sẽ lại rỉ máu."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、越えたい。あの橋を」
1735 = "「Thế nên, anh muốn vượt qua. Cây cầu đó.」"
# 【ハチロク】
# display as 八六
# JP: 「…………っ」
# 1222 = "「…………」" 
# monologue
# JP: 手が動く。
2501 = "Đôi tay cử động."
# monologue
# JP: 僕の手と、ハチロクの手と。\n重なりあって、同時に動く。
2563 = "Bàn tay của tôi, và bàn tay của Hachiroku.\nĐan vào nhau, và cùng lúc cử động."
# 【双鉄】
# display as 雙鐵
# JP: 「越えよう。今日こそ。\n僕と、お前で――僕らふたりで」
1481 = "「Cùng vượt qua nào. Chính hôm nay.\nAnh và em——hai chúng ta.」"
# monologue
# JP: ぐ、と。ハチロクの喉が動く。
2272 = "Ưực. Cổ họng Hachiroku chuyển động."
# monologue
# JP: 何かを飲み干し――\n代わりに、切れ切れの声を吐く。
2353 = "Nuốt trôi thứ gì đó——\nThay vào đó, thốt ra những âm thanh đứt quãng."
# 【ハチロク】
# display as 八六
# JP: 「は……いっ」
1639 = "「Vâ……ng.」"
# monologue
# JP: 割り切れない。忘れられない。\n許されはしない。許しもできない。
2659 = "Không thể dứt bỏ. Không thể lãng quên.\nSẽ không được tha thứ. Cũng không thể tha thứ."
# monologue
# JP: けれども確かに、そうした過去が今を作った。\n事故があるから、僕らふたりは、今ここにいる。
2186 = "Nhưng chắc chắn, quá khứ đó đã tạo nên hiện tại.\nVì có vụ tai nạn đó, nên hai chúng tôi mới ở đây lúc này."
# 【双鉄】
# display as 雙鐵
# JP: 「他に何もしなくていい。\nただひとつだけを、すればいい」
1555 = "「Không cần phải làm gì khác cả.\nChỉ cần làm một việc duy nhất thôi.」"
# monologue
# JP: 上り勾配にさしかかる。\n\x%l粘着力;#00ffc040;粘着力%l;#;が、きっと足りない。
2294 = "Sắp tiến vào đoạn dốc lên.\n\\x%l粘着力;#00ffc040;Lực bám đường%l;#;, chắc chắn là không đủ."
# monologue
# JP: \x%l砂撒き;#00ffc040;砂撒き%l;#;コックで砂を吐き出し、\x%l動輪;#00ffc040;動輪%l;#;がそれを超えると同時、\n排水で砂を流してしまう。
2682 = "Dùng van \\x%l砂撒き;#00ffc040;phun cát%l;#; để xả cát ra, đồng thời khi \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; vượt qua nó,\nsẽ dùng nước xả để cuốn trôi cát đi."
# 【双鉄】
# display as 雙鐵
# JP: 「――あの橋だ」
1193 = "「——Cây cầu đó kìa.」"
# monologue
# JP: 見えてくる。\n坂の向こうに。雨の向こうに。
2827 = "Dần hiện ra.\nPhía bên kia con dốc. Phía sau màn mưa."
# monologue
# JP: 赤はおぼろに溶けゆくようで、\n頼りなく……いっそ、今にも落ちそうで。
2828 = "Sắc đỏ như đang tan chảy mờ ảo,\nmong manh…… đến mức tưởng như sắp sập xuống bất cứ lúc nào."
# 【双鉄】
# display as 雙鐵
# JP: 「あの日の橋を。\n僕と、お前で――」
1856 = "「Cây cầu của ngày hôm đó.\nAnh và em——」"
# 【ハチロク】
# display as 八六
# JP: 「は、い――双鉄、様」
1642 = "「Vâ, ng——ngài Soutetsu.」"
# monologue
# JP: だが、怯えない。\n僕もハチロクも、もう怯えない。
2488 = "Nhưng, chúng tôi không sợ hãi.\nCả tôi và Hachiroku, sẽ không sợ hãi nữa."
# monologue
# JP: 僕らはふたりと、知っているから。\nそう出来るのだと、知っているから。
2363 = "Vì chúng tôi biết, chúng tôi có hai người.\nVì chúng tôi biết, chúng tôi có thể làm được."
# 【ハチロク】
# display as 八六
# JP: 「わた、くしと。双鉄、様、とで――」
1703 = "「E, m và. Ngài Soutetsu, cùng nhau——」"
# monologue
# JP: 重なっている。\n手だけではなく、体だけじゃなく、言葉も、心も。
2499 = "Đang hòa làm một.\nKhông chỉ đôi tay, không chỉ cơ thể, mà cả lời nói, cả trái tim."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。僕達で。\n僕ら、ふたりで」
1652 = "「Ừ. Bằng sức của chúng ta.\nHai chúng ta.」"
# monologue
# JP: だから、僕らはそうできる。\nふたりでいるから――そうできている。
2580 = "Thế nên, chúng tôi có thể làm được.\nVì có hai người——nên mới có thể làm được."
# 【双鉄】
# display as 雙鐵
# JP: 「――乗り越えるんだ」
1198 = "「——Sẽ vượt qua.」"
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2918 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch——）"
# monologue
# JP: あっけないほど、軽い音。\nいつか、遠くに聞いた音。
2800 = "Một âm thanh nhẹ nhàng đến mức ngỡ ngàng.\nÂm thanh đã từng nghe thấy ở một nơi xa xăm nào đó."
# monologue
# JP: もう、減速に入ってる。\nあとは、惰力で――何もせずとも、辿り着く。
2446 = "Đã bắt đầu giảm tốc rồi.\nPhần còn lại, nhờ quán tính——dù không làm gì, cũng sẽ đến nơi."
# 【双鉄】
# display as 雙鐵
# JP: 「ほら、出来た」
1829 = "「Thấy chưa, làm được rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「あ……はっ――んっ――\nあ、はい――できまし、た」
1608 = "「A……ha——ưm——\nA, vâng——làm được, rồi ạ.」"
# monologue
# JP: ばしばし、何度もまばたきをする。\nそうして、涙を弾いて飛ばす。
2685 = "Em ấy chớp mắt liên tục nhiều lần.\nRồi, gạt đi những giọt nước mắt."
# 【ハチロク】
# display as 八六
# JP: 「できました――わたくしたちは――\n越え、ましたっ！」
1529 = "「Làm được rồi ạ——chúng ta——\nĐã vượt qua, rồi ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。越えたな」
1626 = "「Ừm. Vượt qua rồi.」"
# monologue
# JP: 朽ちたホームへの入線は、いつもよりさらに遅く感じる。
2206 = "Việc tiến vào sân ga mục nát, có cảm giác chậm hơn mọi khi."
# 【ハチロク】
# display as 八六
# JP: 「え！？」
1595 = "「Hả!?」"
# monologue
# JP: 瞬間、何かが駆け出してくる。\n凪だ。あれではずぶぬれになる。
2704 = "Khoảnh khắc đó, có thứ gì đó lao ra.\nLà Nagi. Thế kia thì ướt sũng mất thôi."
# monologue
# JP: その向こう、日々姫と稀咲と、ふかみ。\n――やはりだ、みんな、ここにいた。
2739 = "Phía sau em ấy, là Hibiki, Kisaki và Fukami.\n——Quả nhiên là, mọi người đều ở đây."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、帰ろう。御一夜に」
1733 = "「Nào, về thôi. Về Ohito.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね、双鉄様」
1644 = "「Đúng vậy ạ, ngài Soutetsu.」"
# monologue
# JP: ん、とハチロクが考えこむ。\nいつもそうしているように。
2262 = "Ưm, Hachiroku trầm ngâm suy nghĩ.\nNhư mọi khi em ấy vẫn làm."
# 【ハチロク】
# display as 八六
# JP: 「日々姫たちの健康状態に問題なければ、\n多少、時間がかかっても――」
1839 = "「Nếu tình trạng sức khỏe của Hibiki và mọi người không có vấn đề gì,\nthì dù có mất chút thời gian——」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、[ゆのい,1]湯医の\x%l三角線;#00ffc040;[さんかくせん,2]三角線%l;#;まで行ってしまう方が安全だ。\nそこから折り返して、前を向いて御一夜へ帰ろう」
1754 = "「Đúng vậy, đi đến \\x%l三角線;#00ffc040;đường tam giác%l;#; ở Yui thì sẽ an toàn hơn.\nTừ đó chúng ta sẽ quay đầu, hướng về phía trước và trở về Ohito.」"
# 【ハチロク】
# display as 八六
# JP: 「はいっ！」
1767 = "「Vâng ạ!」"
# monologue
# JP: そうして、笑顔。\nいつもよりずっと晴れやかな。
2667 = "Và rồi, một nụ cười.\nRạng rỡ hơn mọi khi rất nhiều."
# 【凪】
# display as 凪
# JP: 「開けて開けて開けて開けて！\n濡れるばい濡れるばい濡れるばい！」
1898 = "「Mở cửa mở cửa mở cửa mở cửa!\nƯớt hết rồi ướt hết rồi ướt hết rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと！」
1633 = "「Ây da!」"
# monologue
# JP: このために\x%l客車;#00ffc040;客車%l;#;を引いてきた。
2432 = "Kéo theo \\x%l客車;#00ffc040;toa hành khách%l;#; là vì mục đích này đây."
# monologue
# JP: ハチロクもすぐ、\n\x%l客車;#00ffc040;客車%l;#;ドアの鍵をポケットから出す。
2250 = "Hachiroku cũng lập tức,\nlấy chìa khóa cửa \\x%l客車;#00ffc040;toa hành khách%l;#; từ trong túi ra."
# 【双鉄】
# display as 雙鐵
# JP: 「思わぬところで、ストーブが役に立つものだな」
1771 = "「Lò sưởi lại hữu ích ở những nơi không ngờ tới nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「うふふ、左様ですね」
1588 = "「Ufufu, đúng vậy ạ.」"
# monologue
# JP: 御一夜駅に無事に帰り着くまで、\nゆっくり休んで、温まり乾かしておけばいい。
2372 = "Cho đến khi bình an trở về ga Ohito,\ncứ thong thả nghỉ ngơi, sưởi ấm và hong khô người là được."
# monologue
# JP: 御一夜駅に戻ったのなら、どれほど乾かしておいたとて。\nそこからぎゅうぎゅう、更に絞られるのだろうから。
2355 = "Nhưng khi về đến ga Ohito rồi, thì dù có hong khô đến mức nào đi nữa.\nChắc chắn sẽ bị vắt kiệt sức thêm nữa thôi."
# 【元忠】
# display as 元忠
# JP: 「馬鹿者がっ！」
1801 = "「Đồ ngốc!」"
# monologue
# JP: （パンっ！！！）
2922 = "（Bốp!!!）"
# monologue
# JP: 乾ききった音。\n痛みが伝わってきそうな程に。
2449 = "Một âm thanh khô khốc.\nĐến mức như có thể cảm nhận được nỗi đau truyền đến."
# monologue
# JP: 場の殆どの人間は身体を竦めて目を閉じて――\nしかし、叩かれた当人のみは、身動ぎひとつみせはしない。
2371 = "Hầu hết những người có mặt ở đó đều co rúm người lại và nhắm nghiền mắt——\nNhưng, người bị đánh lại không hề nhúc nhích."
# 【稀咲】
# display as 稀咲
# JP: 「言い訳はしない。これは、ボクの責任だ」
1682 = "「Con sẽ không viện cớ. Đây là trách nhiệm của con.」"
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩っ――っ！」
1834 = "「Tiền bối Kisaki——!」"
# monologue
# JP: 飛び出しかけた日々姫を稀咲は視線で制する。
2723 = "Kisaki dùng ánh mắt ngăn cản Hibiki đang định lao ra."
# monologue
# JP: そして深々――\n僕らへ向けて、頭を下げる。
2672 = "Rồi cúi gập người——\nhướng về phía chúng tôi, cúi đầu tạ lỗi."
# 【稀咲】
# display as 稀咲
# JP: 「どうしてもアイディアが欲しかった。\nその焦りに、みんなを付き合わせて巻き込んでしまった」
1721 = "「Tớ thực sự rất muốn có ý tưởng.\nSự nóng vội đó đã kéo theo và liên lụy đến mọi người.」"
# 【凪】
# display as 凪
# JP: 「キャンプしたいっていったのは、ウチばい」
1750 = "「Người đòi đi cắm trại là em mà.」"
# monologue
# JP: 視線の制止を、\nけれども凪は気にも止めない。
2197 = "Ánh mắt ngăn cản đó,\nNagi hoàn toàn không để tâm."
# 【凪】
# display as 凪
# JP: 「やけん、ぶつんだったら、ウチんこと」
1843 = "「Thế nên, nếu có đánh thì đánh em đây này.」"
# monologue
# JP: （ぽかっ！）
2917 = "（Bộp!）"
# 【凪】
# display as 凪
# JP: 「痛かっ！？」
1640 = "「Đau!?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「[でほー,2]大阿呆がっ！」
1842 = "「Đồ đại ngốc!」"
# 【凪】
# display as 凪
# JP: 「じいちゃんっ！？」
1816 = "「Ông nội!?」"
# monologue
# JP: ぽかんと一発。
2293 = "Bị gõ một cái rõ kêu."
# monologue
# JP: 今度の大きな音にはけれど、\n誰一人顔をしかめない。
2852 = "Nhưng với âm thanh lớn lần này,\nkhông một ai cau mày."
# 【蓑笠】
# display as 蓑笠
# JP: 「……怪我はなかとか？」
1233 = "「……Có bị thương ở đâu không?」"
# 【凪】
# display as 凪
# JP: 「ケガ今したばい！　コブできたばい！！」
1560 = "「Vừa bị thương xong đây này! Sưng cục rồi đây này!!」"
# 【蓑笠】
# display as 蓑笠
# JP: 「そん他は？」
1553 = "「Còn chỗ nào khác không?」"
# 【凪】
# display as 凪
# JP: 「なかたい！　ふかみちゃんも、\nねーさんたちもぴんしゃんしとるばい！」
1785 = "「Không có! Fukami và\nmấy chị cũng đang khỏe re đây này!」"
# 【蓑笠】
# display as 蓑笠
# JP: 「そぎゃんか」
1756 = "「Vậy sao.」"
# monologue
# JP: ほーーーっと、長い、長い息。
2846 = "Phùuu, một tiếng thở dài, thật dài."
# monologue
# JP: 蓑笠老人は拳を解いて、\n皺だらけの手で、凪をなでる。
2760 = "Ông lão Minokasa buông lỏng nắm đấm,\ndùng bàn tay nhăn nheo xoa đầu Nagi."
# 【蓑笠】
# display as 蓑笠
# JP: 「……無事でよかった」
1242 = "「……Bình an là tốt rồi.」"
# 【凪】
# display as 凪
# JP: 「あ！」
1613 = "「A!」"
# monologue
# JP: 蓑笠さんの安堵の顔は、\n泣きだしそうなものにも見えて――
2757 = "Khuôn mặt an tâm của ông Minokasa,\ntrông như sắp khóc đến nơi——"
# monologue
# JP: それを目にした瞬間に、\n凪は思いきり頭を下げる。
2379 = "Khoảnh khắc nhìn thấy điều đó,\nNagi cúi gập đầu xuống."
# 【凪】
# display as 凪
# JP: 「爺ちゃんに心配ばかけて、ごめんなさい」
1647 = "「Xin lỗi vì đã làm ông lo lắng.」"
# 【元忠】
# display as 稀咲＆元忠
# JP: 『「っ！」\n「っ！」』
1924 = "「!」\n「!」"
# monologue
# JP: 視線を背け合っていた父と娘とが、\n全く同じタイミングでお互いの顔を見る。
2165 = "Người cha và cô con gái vốn đang ngoảnh mặt đi,\nlại nhìn nhau cùng một lúc."
# monologue
# JP: ふたりとも、どこか気まずそうな表情を浮かべ――\nややあって、元忠氏が大げさに咳払いする。
2243 = "Cả hai đều lộ vẻ mặt có chút ngượng ngùng——\nMột lúc sau, ông Mototada hắng giọng một cách khoa trương."
# 【元忠】
# display as 元忠
# JP: 「まぁ。うん。\nとにかく、怪我がなくて何よりだった」
1610 = "「À thì. Ừm.\nTóm lại, không ai bị thương là tốt rồi.」"
# 【稀咲】
# display as 稀咲
# JP: 「……ごめん。心配をかけるつもりはなかった」
1238 = "「……Xin lỗi. Con không định làm bố lo lắng đâu.」"
# 【元忠】
# display as 元忠
# JP: 「お前も大人だ。責任のとり方と謝罪の仕方は\n自分自身で考えろ」
1506 = "「Con cũng lớn rồi. Cách chịu trách nhiệm và cách xin lỗi,\nhãy tự mình suy nghĩ đi.」"
# monologue
# JP: 厳しい言葉が、優しく響く。
2176 = "Những lời lẽ nghiêm khắc, lại vang lên thật dịu dàng."
# 【稀咲】
# display as 稀咲
# JP: 「わかっているさ」
1726 = "「Con biết rồi.」"
# 【元忠】
# display as 元忠
# JP: 「が、必要があればいつでも言え。\n私も親だ。娘の尻ぐらいはいつでも拭う」
1495 = "「Nhưng, nếu cần thì cứ nói bất cứ lúc nào.\nTa cũng là cha mà. Chút rắc rối của con gái thì lúc nào ta cũng dọn dẹp được.」"
# 【稀咲】
# display as 稀咲
# JP: 「……ありがとう。\n言葉を選んでもらえればもっとうれしいけれど」
1245 = "「……Cảm ơn bố.\nNếu bố chọn từ ngữ cẩn thận hơn một chút thì con sẽ vui hơn đấy.」"
# 【元忠】
# display as 元忠
# JP: 「ああ。うむ――そうだな」
1609 = "「À. Ừm——cũng phải.」"
# monologue
# JP: ぎくしゃくしてるが、離れていない。\n親子、なのだなとぼんやり思う。
2848 = "Dù có chút ngượng ngùng, nhưng không hề xa cách.\nQuả nhiên là cha con, tôi thầm nghĩ."
# 【真闇】
# display as 真闇
# JP: 「ひーちゃん」
1654 = "「Hii-chan.」"
# 【早瀬堰】
# display as 早賴堰
# JP: 「ふかみや」
1798 = "「Fukami à.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、ねぇねぇ」
1618 = "「A, chị hai.」"
# 【ふかみ】
# display as 深美
# JP: 「おじいちゃん……」
1815 = "「Ông nội……」"
# monologue
# JP: 日々姫とふかみと、\nふたりの頭が、同時にさがる。
2617 = "Hibiki và Fukami,\ncả hai cùng lúc cúi đầu."
# 【ふかみ】
# display as 日日姬＆深美
# JP: 『「ありがとう、ごめんなさい」\n「ありがとう、ごめんなさい」』
1920 = "『\"Cảm ơn, và xin lỗi.\"\n\"Cảm ơn, và xin lỗi.\"』"
# 【早瀬堰】
# display as 早賴堰
# JP: 「すぐ電話せぇ。\nみどり、ここに来たがるほど心配しとったけん」
1668 = "「Gọi điện thoại ngay đi.\nMidori lo lắng đến mức đòi đến tận đây đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――うん、ごめんなさい」
1607 = "「A——vâng, cháu xin lỗi.」"
# 【早瀬堰】
# display as 早賴堰
# JP: 「ワシにゃ謝らんでええ。早ぅに安心させてやれ」
1455 = "「Không cần xin lỗi ta đâu. Mau làm cho nó yên tâm đi.」"
# monologue
# JP: ……厳しく、あるいは優しく叱り、\n叱りながらも包み込む。
1179 = "……Trách mắng nghiêm khắc, hoặc dịu dàng,\ndù trách mắng nhưng vẫn bao dung che chở."
# monologue
# JP: ……姉妹と、祖父・孫。\n関係の形は変わっても、あたたかさはどれも変わらない。
1175 = "……Chị em, và ông cháu.\nDù hình thái mối quan hệ có khác nhau, nhưng sự ấm áp thì không hề thay đổi."
# 【双鉄】
# display as 雙鐵
# JP: 「……家族、か」
1235 = "「……Gia đình, sao.」"
# 【ハチロク】
# display as 八六
# JP: 「――双鉄様」
1205 = "「——Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1627 = "「Ừm.」"
# monologue
# JP: ハチロクと手を繋ぎ合う。
2509 = "Tôi và Hachiroku nắm tay nhau."
# monologue
# JP: どちらが求めたわけでなく、\nごくごく自然に、そうしてる。
2142 = "Không phải ai chủ động trước,\nmà cứ thế diễn ra một cách vô cùng tự nhiên."
# monologue
# JP: （これも同じだ。\nただ、乗り越えて、いけばいいんだ）
2946 = "（Điều này cũng giống vậy thôi.\nChỉ cần, vượt qua là được.）"
# monologue
# JP: 無くしたものを悔やむのではなく、羨むでもなく。
2660 = "Không phải hối tiếc về những gì đã mất, cũng không phải ghen tị."
# monologue
# JP: もう一度作っていけばいいのだし、\n僕たちになら、そうできる。
2424 = "Chỉ cần tạo dựng lại một lần nữa là được,\nvà nếu là chúng tôi, thì chắc chắn sẽ làm được."
# 【元忠】
# display as 元忠
# JP: 「で？　求めたアイディアは得られたのか？」
1808 = "「Thế? Đã có được ý tưởng như mong muốn chưa?」"
# 【稀咲】
# display as 稀咲
# JP: 「と、今の段階では思ってるよ」
1723 = "「Ở giai đoạn hiện tại thì con nghĩ là có rồi.」"
# monologue
# JP: 稀咲が頷く。\nリラックスした表情で。
2722 = "Kisaki gật đầu.\nVới vẻ mặt thư giãn."
# monologue
# JP: それからハっと、気づいたように背筋を伸ばし、\nまっすぐ元忠氏を見据える。
2669 = "Rồi cô ấy chợt nhận ra điều gì đó, vội thẳng lưng lên,\nnhìn thẳng vào ông Mototada."
# 【稀咲】
# display as 稀咲
# JP: 「ただ、今のボクは一人の娘で。\nええと……父さん、は。――父さんだって、思うから」
1580 = "「Nhưng mà, con bây giờ chỉ là một đứa con gái.\nỜm…… Bố, thì. ——Con nghĩ bố vẫn là bố.」"
# 【元忠】
# display as 元忠
# JP: 「ああ」
# 1627 = "「嗯」" 
# 【稀咲】
# display as 稀咲
# JP: 「だからそれは整理して、落ち着いたときに聞いて欲しい。\n娘ではなく、支店長として。父さんではなく、頭取に」
1731 = "「Thế nên chuyện đó hãy để con sắp xếp lại, lúc nào bình tĩnh rồi con sẽ nói cho bố nghe.\nKhông phải với tư cách con gái, mà là Giám đốc chi nhánh. Không phải nói với bố, mà là với Chủ tịch.」"
# 【元忠】
# display as 元忠
# JP: 「そう望むなら、そうしよう」
1514 = "「Nếu con muốn vậy, thì cứ làm thế đi.」"
# monologue
# JP: 微笑と口調を口の端へとほんの一瞬乗せて、消し。
2229 = "Một nụ cười và giọng điệu thoáng qua trên khóe môi trong chốc lát, rồi biến mất."
# monologue
# JP: 大きく頷き、\n元忠氏はぐるり、僕へと体を向け直す。
2182 = "Gật đầu mạnh một cái,\nông Mototada xoay người, hướng về phía tôi."
# 【元忠】
# display as 元忠
# JP: 「私は今は、一人の父だそうだから。\n一人の父として、礼を言わせて欲しいと思う」
1772 = "「Bây giờ tôi chỉ là một người cha thôi.\nVới tư cách là một người cha, tôi muốn nói lời cảm ơn.」"
# monologue
# JP: 深々。\n頭が下げられる。
2180 = "Cúi gập người.\nCúi đầu tạ ơn."
# 【元忠】
# display as 元忠
# JP: 「ありがとう。娘を助けてくれて」
1854 = "「Cảm ơn cậu. Vì đã cứu con gái tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「当然のことをしたまでです。鉄道に関わる人間として。\nそして、御一夜の一員として」
1696 = "「Tôi chỉ làm việc đương nhiên thôi. Với tư cách là một người liên quan đến đường sắt.\nVà với tư cách là một thành viên của Ohito.」"
# 【元忠】
# display as 元忠
# JP: 「ああ――」
1619 = "「À——」"
# monologue
# JP: 元忠氏の目が、改札の向こうまでを見渡す。\n人、人、人。
2231 = "Ánh mắt ông Mototada nhìn bao quát ra tận bên ngoài cổng soát vé.\nNgười, người, và người."
# monologue
# JP: 心配し、集まってくれた方々が、\n駅舎から溢れ僕らを見ている。
2365 = "Những người lo lắng, tụ tập lại đây,\nđang tràn ra từ nhà ga và nhìn chúng tôi."
# 【元忠】
# display as 元忠
# JP: 「炊き出しまで――」
1883 = "「Cả đồ ăn cứu trợ nữa——」"
# monologue
# JP: おにぎり、味噌汁、タオルに着替え。\nどんどん、日々姫たちに渡されていく。
2874 = "Cơm nắm, súp miso, khăn tắm và quần áo thay.\nLiên tục được đưa cho Hibiki và mọi người."
# monologue
# JP: 今度は、そこにいる全ての人へと――\nさっきよりも更に深くまで、元忠氏の頭がさげられる。
2816 = "Lần này, hướng về tất cả những người có mặt ở đó——\nÔng Mototada cúi đầu còn sâu hơn lúc nãy."
# 【双鉄】
# display as 雙鐵
# JP: 「――御一夜は、こういう町だと知っていました。\nだから僕は、それを守りたいと思っています」
1200 = "「——Tôi biết Ohito là một thị trấn như vậy.\nThế nên tôi mới muốn bảo vệ nó.」"
# 【元忠】
# display as 元忠
# JP: 「……そうか」
# 1241 = "「……是嗎」" 
# monologue
# JP: ご近所同士の絆や繋がり――\nそれが特別、濃いとも強いとも思わない。
2831 = "Sự gắn kết và mối liên hệ giữa những người hàng xóm——\nTôi không nghĩ nó đặc biệt sâu đậm hay mạnh mẽ."
# monologue
# JP: 普通に対立だっておきるし、\nみなそれぞれに、それぞれの日々を好きに生きてる。
2451 = "Xung đột vẫn xảy ra như thường,\nmọi người đều sống những ngày tháng theo cách riêng của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「いざというとき、助け合いの輪が自然と出来る。\nその環境は、壊してはいけないものだと、思っています」
1558 = "「Nhưng khi có chuyện, vòng tròn tương trợ sẽ tự nhiên hình thành.\nTôi nghĩ đó là một môi trường không được phép phá vỡ.」"
# 【元忠】
# display as 元忠
# JP: 「…………共存、か」
1225 = "「…………Cộng tồn, sao.」"
# monologue
# JP: 元忠氏の目が、\x%l8620;#00ffc040;8620%l;#;の鉄の体を静かに見上げる。
2239 = "Ánh mắt ông Mototada tĩnh lặng ngước nhìn cơ thể bằng sắt của \\x%l8620;#00ffc040;8620%l;#;."
# monologue
# JP: 鉄道と。\x%lエアクラ;#00ffc040;エアクラ%l;#;と。\nそれもまた、必ず共存しあえるものだ。
2742 = "Đường sắt. Và \\x%lエアクラ;#00ffc040;Aircra%l;#;.\nĐó cũng là những thứ chắc chắn có thể cộng tồn với nhau."
# 【元忠】
# display as 元忠
# JP: 「……出来ると思うかね？　わだかまりを超えて」
1230 = "「……Cậu nghĩ là làm được sao? Vượt qua những hiềm khích.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう思います。心は――\n人と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;との間でも、繋がるものなのですから」
1717 = "「Tôi nghĩ vậy. Trái tim thì——\nngay cả giữa con người và \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng có thể kết nối với nhau mà.」"
# 【元忠】
# display as 元忠
# JP: 「ふむ」
1601 = "「Hừm.」"
# monologue
# JP: ハチロクとつなぎ合ってる手。
2572 = "Bàn tay đang nắm lấy Hachiroku."
# monologue
# JP: それを解かず、そのままに、\n元忠氏へとまっすぐ伸ばす。
2519 = "Không buông ra, cứ thế,\ntôi vươn thẳng tay về phía ông Mototada."
# 【双鉄】
# display as 雙鐵
# JP: 「例えば、あなたと僕とでも。\n御一夜を大事に思う気持ちは、きっと共通してますし」
1777 = "「Ví dụ như, giữa ông và tôi cũng vậy.\nTình cảm trân trọng Ohito, chắc chắn là chúng ta giống nhau.」"
# 【元忠】
# display as 元忠
# JP: 「なるほどな」
1563 = "「Ra là vậy.」"
# monologue
# JP: 元忠氏の手が無造作に、僕らが伸ばした手へと重なる。
2227 = "Bàn tay ông Mototada hững hờ đặt lên bàn tay chúng tôi đang vươn ra."
# monologue
# JP: だけでなく、左手までをそこに重ねて、\nはさみこむような握手でぶんぶん腕を動かす。
2131 = "Không chỉ vậy, ông ấy còn đặt cả tay trái lên,\nbắt tay theo kiểu kẹp chặt và lắc mạnh cánh tay."
# 【元忠】
# display as 元忠
# JP: 「君の意見は、十分検討に値する。\n参考にさせてもらうよ、今後の経営方針のね」
1524 = "「Ý kiến của cậu, rất đáng để xem xét.\nTôi sẽ tham khảo nó cho phương hướng kinh doanh sắp tới.」"
# monologue
# JP: ぱっと両手が離される。
2178 = "Hai tay buông ra."
# monologue
# JP: そしてその手は、稀咲の肩へと乗せられる。
2668 = "Và bàn tay đó, đặt lên vai Kisaki."
# 【稀咲】
# display as 稀咲
# JP: 「と、父さんっ！？」
1813 = "「Bố, bố!?」"
# 【元忠】
# display as 元忠
# JP: 「疲れてるだろう。送ってやる。\nこんな日くらいは、一緒に帰るのも悪くない」
1503 = "「Chắc con mệt rồi. Để bố đưa về.\nNhững ngày thế này, cùng nhau về nhà cũng không tệ.」"
# 【稀咲】
# display as 稀咲
# JP: 「――そうだね。今は」
1190 = "「——Vâng. Bây giờ thì.」"
# monologue
# JP: お詫びか、去り際のあいさつか。
2146 = "Lời xin lỗi, hay lời chào tạm biệt."
# monologue
# JP: もう一度の会釈を残し稀咲がホームから立ち去れば、\n集まっていた人たちも、安堵した顔で散り始める。
2720 = "Sau khi để lại một cái cúi chào nữa, Kisaki rời khỏi sân ga,\nnhững người tụ tập ở đó cũng mang khuôn mặt nhẹ nhõm và bắt đầu giải tán."
# 【凪】
# display as 凪
# JP: 「じーちゃん、帰ろっ」
1817 = "「Ông ơi, về thôi」"
# 【早瀬堰】
# display as 早賴堰
# JP: 「ほれ、乗れ。ふかみ」
1799 = "「Nào, lên xe đi. Fukami」"
# 【真闇】
# display as 真闇
# JP: 「ひーちゃん、帰るよ」
1655 = "「Hi-chan, về thôi nào」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――うん」
1605 = "「A——vâng」"
# monologue
# JP: 真闇姉に手を引かれつつ、\n日々姫は僕とハチロクを見る。
2619 = "Bị chị Mayami dắt tay,\nHibiki quay lại nhìn tôi và Hachiroku."
# monologue
# JP: （ああ……）
2921 = "（A……）"
# monologue
# JP: 自然と思う。\n思い出す。
2570 = "Tôi tự nhiên nghĩ đến.\nVà nhớ lại."
# monologue
# JP: ――僕は家族を、\nとっくの昔に、与えてもらえていたのだと。
1164 = "——Rằng tôi đã được ban cho một gia đình,\ntừ rất lâu về trước rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「待ってくれ。日々姫、ねえさん」
1835 = "「Đợi đã. Hibiki, chị hai」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1613 = "「啊！」" 
# 【真闇】
# display as 真闇
# JP: 「ん？」
1631 = "「Hửm?」"
# monologue
# JP: にこっと、笑う。ふたりそろって。
2244 = "Cả hai cùng mỉm cười."
# monologue
# JP: さすがは姉妹。\n日々姫と真闇姉との笑顔は、とても良く似てる。
2135 = "Quả không hổ là chị em.\nNụ cười của Hibiki và chị Mayami thực sự rất giống nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「僕とハチロクも、一緒に帰る」
1701 = "「Em và Hachiroku cũng sẽ về cùng」"
# monologue
# JP: そうして僕とハチロクも、\nきっとそっくりな笑顔の筈だ。
2820 = "Và chắc chắn, tôi cùng Hachiroku\ncũng đang nở một nụ cười y hệt như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「な？　ハチロク」
1583 = "「Được chứ? Hachiroku」"
# 【ハチロク】
# display as 八六
# JP: 「はい！　双鉄様」
1630 = "「Vâng! Ngài Soutetsu」"
# 【真闇】
# display as 真闇
# JP: 「そ？　そんならねぇ」
1757 = "「Vậy sao? Nếu thế thì」"
# monologue
# JP: 真闇姉の手がハチロクの手を。\n日々姫の手が僕の手を取る。
2701 = "Chị Mayami nắm lấy tay Hachiroku.\nHibiki nắm lấy tay tôi."
# monologue
# JP: そうして僕らは手を繋ぎ――\n家族そろって、家へと帰る。
2441 = "Cứ như thế, chúng tôi nắm tay nhau——\ncả gia đình quây quần cùng bước về nhà."
# 【双鉄】
# display as 雙鐵
# JP: 「くはぁ」
1589 = "「Phù」"
# monologue
# JP: 全身の力が抜けていく。
2603 = "Toàn bộ sức lực trong cơ thể như tan biến."
# monologue
# JP: 抜けた部分にふわふわとした、疲労感と倦怠感と、\nそして達成感とが混じったものが、入り込んでくる。
2122 = "Thay vào khoảng trống đó là một cảm giác lâng lâng, pha trộn giữa sự mệt mỏi, uể oải\nvà cả cảm giác thành tựu."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様。お疲れ様でございました」
1904 = "「Ngài Soutetsu. Ngài đã vất vả rồi ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「お前こそだ。\nお疲れ様、ハチロク」
1517 = "「Em mới phải đó.\nVất vả cho em rồi, Hachiroku」"
# 【ハチロク】
# display as 八六
# JP: 「あら？　わたくしは疲れませんよ？」
1593 = "「Kìa? Em đâu có thấy mệt mỏi gì đâu ạ」"
# monologue
# JP: クスクス笑い。\nハチロクは、いつも以上にあたたかだ。
2801 = "Hachiroku khẽ cười khúc khích.\nTrông em ấy ấm áp hơn thường ngày."
# 【ハチロク】
# display as 八六
# JP: 「わたくしはものでございますから。\n疲れたりなどしないのです」
1637 = "「Vì em là đồ vật mà.\nNên em không biết mệt là gì đâu ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「もの――か」
1818 = "「Đồ vật——sao」"
# monologue
# JP: ハチロクが良く口にすること。\n単なる事実でもあること。
2284 = "Câu nói mà Hachiroku thường hay nhắc tới.\nVà cũng là một sự thật hiển nhiên."
# monologue
# JP: あるいは疲れのせいなのだろうか、\nそれが、妙に引っかかる。
2577 = "Hoặc có lẽ do sự mệt mỏi,\nmà tôi lại cảm thấy bận tâm đến điều đó một cách kỳ lạ."
# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、ハチロク。“もの”とはなんだ？」
1704 = "「Này, Hachiroku. \"Đồ vật\" là gì?」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
# 1600 = "「哎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「お前の言う。お前の定義している。\n“もの”とはなんだ？」
1515 = "「Theo như em nói. Theo như định nghĩa của em.\n\"Đồ vật\" là gì?」"
# 【ハチロク】
# display as 八六
# JP: 「“もの”――とは」
1219 = "「\"Đồ vật\"——là」"
# monologue
# JP: ほんの一瞬だけ考えて、\nハチロクは、流れるような答えを紡ぐ。
2286 = "Chỉ suy nghĩ trong một thoáng chốc,\nHachiroku đưa ra câu trả lời trôi chảy."
# 【ハチロク】
# display as 八六
# JP: 「人間に作られた、人間の目的のため機能する存在――\nでございましょうか」
1657 = "「Là tồn tại được con người tạo ra, và hoạt động vì mục đích của con người——\ncó lẽ là vậy ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「人間に作られた、人間の目的のために機能する……」
1472 = "「Được con người tạo ra, và hoạt động vì mục đích của con người……」"
# monologue
# JP: 淀むところの無い声が、ストンと胸に落ちてくる。
2394 = "Giọng nói không chút ngập ngừng ấy rơi thõng vào lòng tôi."
# monologue
# JP: 妥当な定義と納得できただけでなく、\n僕自身の深いところに、響いて染みる。
2486 = "Không chỉ cảm thấy đó là một định nghĩa thỏa đáng,\nmà nó còn vang vọng và thấm sâu vào tận đáy lòng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば。僕も“もの”だったのだな」
1893 = "「Nếu vậy. Thì anh cũng từng là \"đồ vật\" nhỉ」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
# 1600 = "「哎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「あの事故の後、お前と出会うまでの僕は――\n誰かの目的を果たすため、機能するだけの存在だった」
1890 = "「Sau vụ tai nạn đó, cho đến trước khi gặp em——\nanh cũng chỉ là một tồn tại hoạt động nhằm hoàn thành mục đích của ai đó mà thôi」"
# 【ハチロク】
# display as 八六
# JP: 「そう……なのですか」
1747 = "「Vậy……sao ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。そうだった。そうしなければ生きられなかった。\n今振り返れば……あれは、ものとしての生だったのだな」
1622 = "「Ừ. Đúng là vậy. Nếu không làm thế thì anh đã không thể sống tiếp.\nBây giờ nhìn lại…… đó đúng là một cuộc sống của đồ vật nhỉ」"
# 【ハチロク】
# display as 八六
# JP: 「それでは――今は、双鉄様は……」
1891 = "「Vậy thì——bây giờ, ngài Soutetsu……」"
# monologue
# JP: いたわるような、ためらうような。\nどこかわずかに、怯えているようにも聞こえる声。
2396 = "Một giọng nói như đang thương xót, lại như đang ngập ngừng.\nNghe có vẻ gì đó hơi sợ sệt."
# 【ハチロク】
# display as 八六
# JP: 「今の、双鉄様の生は……\nどのようなものなのですか？」
1822 = "「Vậy cuộc sống hiện tại của ngài Soutetsu……\nlà một cuộc sống như thế nào ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「今、か。\n今、この瞬間の僕の生は――」
1821 = "「Hiện tại, sao.\nCuộc sống của anh trong khoảnh khắc này, lúc này là——」"
# monologue
# JP: ハチロクの目が僕を見ている。\n答えを、求めてくれている。
2278 = "Đôi mắt Hachiroku đang nhìn tôi.\nĐang mong chờ một câu trả lời từ tôi."
# monologue
# JP: そのことがただ幸せで、これほど近くにいてもなお、\nもっと、ハチロクを知りたくなって、近づきたくなる。
2211 = "Chỉ điều đó thôi cũng đủ khiến tôi hạnh phúc, dù đang ở gần đến thế,\ntôi vẫn muốn hiểu thêm về Hachiroku, muốn được đến gần em ấy hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「――満たしてもらえたはずなのに、\nもっと多くを求める生、だな」
1201 = "「——Là một cuộc sống mà dù đáng lẽ đã được lấp đầy,\nnhưng vẫn luôn khao khát nhiều hơn thế nữa」"
# monologue
# JP: 疲労してるが、充実し。充実しても不足している。\nハチロクという存在を、痛いほど強く求めてる。
2850 = "Dù mệt mỏi, nhưng lại trọn vẹn. Dù trọn vẹn, nhưng vẫn thấy thiếu thốn.\nTôi khao khát một tồn tại mang tên Hachiroku đến nhức nhối."
# monologue
# JP: この感情を、この衝動を、何といおうか――\n思ったときには、言葉が喉を飛び出している。
2823 = "Phải gọi cảm xúc này, sự thôi thúc này là gì đây——\nKhi vừa nghĩ đến, ngôn từ đã tự tuôn trào khỏi cổ họng."
# 【双鉄】
# display as 雙鐵
# JP: 「おそらく、これが。人としての生だ。\n生きることを求め、先へと進みたがる生だ」
1877 = "「Có lẽ, đây chính là. Cuộc sống của một con người.\nMột cuộc sống khao khát được sống, và luôn muốn tiến về phía trước」"
# 【ハチロク】
# display as 八六
# JP: 「人としての、生――」
1501 = "「Cuộc sống, của một con người——」"
# 【双鉄】
# display as 雙鐵
# JP: 「それを与えてくれたのは。\nハチロク。お前だ」
1836 = "「Và người đã ban cho anh điều đó.\nChính là em, Hachiroku」"
# monologue
# JP: 乗り越えたいと、だから思えた。\nハチロクがともにいてくれたから、乗り越えられた。
2582 = "Nên anh mới muốn vượt qua.\nVì có Hachiroku ở bên, nên anh mới có thể vượt qua được."
# monologue
# JP: そして今、僕はこれほど強く、強く、\n終着駅のさらに先へも、ともにいきたいと望んでる。
2741 = "Và giờ đây, anh đang khao khát mãnh liệt, vô cùng mãnh liệt,\nmuốn được cùng em đi xa hơn nữa, vượt qua cả nhà ga cuối cùng."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。僕はお前が欲しい」
1542 = "「Hachiroku. Anh muốn có em」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、すでにあなたのものです。\nハチロクは、双鉄様の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です」
1705 = "「Em, vốn dĩ đã là của ngài rồi.\nHachiroku là \\x%lレイルロオド;#00ffc040;Railord%l;#; của ngài Soutetsu mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだが。もっと欲しい。\n僕は――僕は――」
1900 = "「Đúng là vậy. Nhưng anh muốn nhiều hơn thế.\nAnh——Anh——」"
# monologue
# JP: 探せば、すぐに答えは見つかる。
2334 = "Chỉ cần tìm kiếm, sẽ thấy ngay câu trả lời."
# monologue
# JP: きっと、ずうっと前からそこにあり。\nけれど恐れて、視線を逸らしてしまってた答えが。
2421 = "Chắc chắn, nó đã nằm ở đó từ rất lâu rồi.\nChỉ là do tôi sợ hãi, nên đã luôn ngoảnh mặt làm ngơ trước câu trả lời ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「与えられた関係ではなく。僕の、僕だけのお前が欲しい。\n僕は、お前を独占したいし、家族にしたい」
1712 = "「Không phải là một mối quan hệ được ban cho. Anh muốn em là của anh, của riêng anh thôi.\nAnh muốn độc chiếm em, muốn em trở thành gia đình của anh」"
# 【ハチロク】
# display as 八六
# JP: 「家族……」
1648 = "「Gia đình……」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。つまりは――お互い等しくあることだ」
1787 = "「Đúng vậy. Nói cách khác——chúng ta bình đẳng với nhau」"
# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;とマスターではなく。\nこれほど近くにいてさえ足りず。
2137 = "Không phải là \\x%lレイルロオド;#00ffc040;Railord%l;#; và Master.\nDù ở gần đến thế này vẫn là chưa đủ."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ハチロク。お前にも。\n僕を所有し、独占して欲しいと思っているのだ」
1686 = "「Anh cũng muốn Hachiroku, cả em nữa.\nCũng khao khát được sở hữu anh, được độc chiếm anh」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1602 = "「啊——」" 
# monologue
# JP: わなわな、ハチロクの口が震える。\n震えはすぐに体に広がり、僕の体にも伝わってくる。
2273 = "Đôi môi Hachiroku run rẩy.\nSự run rẩy ấy nhanh chóng lan ra toàn thân, và truyền sang cả cơ thể tôi."
# 【ハチロク】
# display as 八六
# JP: 「しかし、ものであるわたくしが――\n双鉄様を、所有など」
1492 = "「Nhưng, một đồ vật như em——\nlàm sao có thể sở hữu ngài Soutetsu được chứ」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も、確かにものだった。\n誰かのために、機能するだけの存在だった」
1719 = "「Anh cũng từng là đồ vật mà.\nCũng từng là tồn tại chỉ hoạt động vì một ai đó thôi」"
# monologue
# JP: それが事実と、さっきよりも深く理解する。
2550 = "Tôi hiểu rõ sự thật đó sâu sắc hơn lúc nãy."
# monologue
# JP: 今の自分のありようが\nどれほど生きたものであるかを、ようやく確信できたから。
2364 = "Bởi vì cuối cùng tôi cũng đã tin chắc rằng, trạng thái hiện tại của bản thân\nđang sống động đến nhường nào."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、お前と出会い。僕はものではなくなった。\nお前を求めることにより――僕は、ひとりの男となった」
1493 = "「Nhưng, kể từ khi gặp em. Anh không còn là đồ vật nữa.\nNhờ khao khát em——anh đã trở thành một người đàn ông thực thụ」"
# monologue
# JP: 誰かに言われたからでなく、目的を果たすためでもなく。\nただ僕自身の欲として、これほど強く求めてる。
2140 = "Không phải vì bị ai đó sai bảo, cũng chẳng phải để hoàn thành mục đích nào cả.\nChỉ đơn thuần là dục vọng của chính bản thân anh, khao khát mãnh liệt đến thế này."
# monologue
# JP: だから、思い切り抱きしめる。\nハチロクの小さな体を、壊してしまうほど強く。
2584 = "Thế nên, tôi ôm chầm lấy em.\nÔm chặt đến mức như muốn làm vỡ vụn cơ thể nhỏ bé của Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「お前は、違うか？　まだ、ものなのか？\nお前は、僕を求めては――」
1505 = "「Còn em thì sao? Vẫn là đồ vật ư?\nEm, không khao khát anh sao——」"
# 【ハチロク】
# display as 八六
# JP: 「求めております。狂おしいほど」
1710 = "「Em khao khát ngài. Khao khát đến phát điên lên được」"
# monologue
# JP: ハチロクの手が、答えてくれる。\nぎゅっと、ぎゅうっと――僕の体に巻き付いてくる。
2276 = "Bàn tay Hachiroku đã trả lời thay em.\nSiết chặt, thật chặt——vòng quanh cơ thể tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク。お前は女だ」
1892 = "「Nếu vậy, Hachiroku. Em là một người phụ nữ」"
# 【ハチロク】
# display as 八六
# JP: 「はい、わたくしは――女です。\n双鉄様を、これほど求める女です」
1762 = "「Vâng, em——là một người phụ nữ.\nMột người phụ nữ khao khát ngài Soutetsu đến nhường này」"
# 【双鉄】
# display as 雙鐵
# JP: 「男と女だ。お互いに求め合っている。\nだったら、答えなど簡単だ」
1692 = "「Một người đàn ông và một người phụ nữ. Đang khao khát lẫn nhau.\nNếu vậy thì, câu trả lời đơn giản quá rồi còn gì」"
# 【ハチロク】
# display as 八六
# JP: 「はい――」
1760 = "「Vâng——」"
# monologue
# JP: 頷いて。\nハチロクは顎を軽くあげ、目を閉じる。
2287 = "Khẽ gật đầu.\nHachiroku hơi ngẩng cằm lên, nhắm nghiền đôi mắt."
# monologue
# JP: 僕らの望みは、重なり合ってる。
2502 = "Ước muốn của chúng tôi, đang hòa quyện vào nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
# 1543 = "「八六」" 
# 【ハチロク】
# display as 八六
# JP: 「双鉄、さま」
1901 = "「Ngài Soutetsu」"
# monologue
# JP: だから、望みを形にするため。
2590 = "Vì thế, để biến ước muốn đó thành hiện thực."
# monologue
# JP: 僕らは――お互いを与え合うキスをする。
2503 = "Chúng tôi——trao nhau nụ hôn để hiến dâng cho nhau."
