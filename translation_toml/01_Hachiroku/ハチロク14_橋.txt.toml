# lines: 489 
# monologue
# JP: [なだれ,1]雪崩る雨と、沸き立つ雲のような蒸気が、\n前照灯の明かりを散らす。
2210 = "傾盆大雨和不斷升騰的稠密蒸汽將前照燈的亮光無情打散。" 

# monologue
# JP: 豪雨と霧と光のベール。\n幻想的な光景は、しかし視界をほぼ完全に塞いでもいる。
2633 = "暴雨、霧與光組成的遮罩形成了如夢如幻的光景，但卻幾乎完全遮蔽了視野。" 

# monologue
# JP: （文字通りの手探り、だな。これは）
2948 = "（這簡直是真正意義上的“摸索”了啊）" 

# monologue
# JP: 訓練でなら、夜間走行は何度も経験している。
2510 = "我在以前的訓練中有過幾次夜間行車的經驗。" 

# monologue
# JP: が……これほどの、ほぼ無視界の悪天候下で走らせるなど、\n日中にさえ、まったく経験の無い―――っ！？
2195 = "但是……就算在白天，我也沒有過在視野如此之差的惡劣天氣下行車的經驗——！？" 

# 【双鉄】
# display as 雙鐵
# JP: 「くそっ」
1851 = "「該死」" 

# monologue
# JP: 鉄の臭いと\x%lブラスト;#00ffc040;ブラスト%l;#;音が、激しい雨と暴風が、\n見えない冷たい手となって、僕の喉をゆるく締めてくる。
2841 = "鐵的氣味和\\x%lブラスト;#00ffc040;汽缸排汽%l;#;的聲音、強烈的暴雨和狂風化為寒冷而不可見的手慢慢地扼住我的喉嚨。" 

# monologue
# JP: ……放っておけばあの日の記憶が這い登ってくる。\n頭を振って息を吐き、休ませずに手を動かし続ける。
1185 = "……這樣下去，那天的記憶會再次復甦的。我搖搖頭，吐了一口氣，片刻不停地忙碌著手上的工作。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ――とにかく投げ込みだ」
1786 = "「沒錯——只要加就對了」" 

# monologue
# JP: （ざくっ）
2925 = "（嘩）" 

# monologue
# JP: 石炭と火と水さえあれば、蒸気を切らすことがなければ、\n\x%l8620;#00ffc040;8620%l;#;はレールの上を、前進できる。
2337 = "只要有煤炭、火和水，只要蒸汽不會斷，\\x%l8620;#00ffc040;８６２０%l;#;就能在軌道上前進。" 

# monologue
# JP: そしてレールの向こうでは、恐らくはほぼ確実に、\n日々姫たちが、僕らの救援を待っているのだ。
2380 = "在軌道的另一頭，我可以近乎百分百確定日日姬在等待我們的救援。" 

# monologue
# JP: （焦らず進む。それだけでいい。\n……ここを越えれば、全ては一気に好転する）
2913 = "（保持冷靜，平穩前進。只需這樣就好……只要克服這一難關，一切都能好轉）" 

# monologue
# JP: 現実的なことだけを。\n今のことだけを考える。
2506 = "我只需去考慮實際，只需去考慮現在。" 

# monologue
# JP: 稀咲の助力を得られるようになり、実際、\n御一夜鉄道株式会社の財務体質は大きく改善されている。
2748 = "自從得到稀咲的協助後，御一夜鐵路股份公司的財務體系到了極大的改善。" 

# monologue
# JP: （\x%lキハ07;#00ffc040;キハ07%l;#;が営業運転に復帰できれば、\n金銭面でも運営面でも、大きな余裕が生まれてくる）
2940 = "（若是\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;能夠恢復營業運行，不管是資金方面還是運營方面都能充裕很多）" 

# monologue
# JP: そうなれば、人員だって増強できる。
2819 = "這樣一來還能增加人手。" 

# monologue
# JP: あと一人、助士の目と手がありさえすれば、\nこの状況とて――こうも不安には感じまい。
2752 = "若能再多一個司爐的助力，就算面對這種狀況，我也不會再感到如此不安了。" 

# monologue
# JP: （ハチロクが――\x%l機関士;#00ffc040;機関士%l;#;役など）
2927 = "（居然要由八六來擔任\\x%l機関士;#00ffc040;司機%l;#;）" 

# monologue
# JP: 助士が不在で、僕が投げ込みに回る以上、\n\x%l機関士;#00ffc040;機関士%l;#;として\x%l8620;#00ffc040;8620%l;#;を運転するのは、ハチロクだ。
2374 = "在沒有司爐，必須由我來加煤的情況下，是八六在作為\\x%l機関士;#00ffc040;司機%l;#;駕駛\\x%l8620;#00ffc040;８６２０%l;#;。" 

# monologue
# JP: \x%l整備体;#00ffc040;整備体%l;#;の横顔は凛と張り詰めて、\n怖いくらいに美しいものと感じもするが――
2514 = "我在側面看著她的\\x%l整備体;#00ffc040;整備體%l;#;端莊而嚴肅的臉，真是美麗得令人感到恐怖，但是——" 

# monologue
# JP: （だが、目隠しだ。\x%l整備体;#00ffc040;整備体%l;#;のハチロクでは、\nセンサ性能が不十分すぎる）
2910 = "（但這不過是掩飾而已。八六的\\x%l整備体;#00ffc040;整備體%l;#;感測器性能太過低下）" 

# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;の僕と、\x%l運転体;#00ffc040;運転体%l;#;のハチロクとで組んでるときの――\n背中を完全に預けあえている安心感が、今は無い。
2678 = "現在我感覺不到由我擔當\\x%l機関士;#00ffc040;司機%l;#;與使用\\x%l運転体;#00ffc040;駕駛體%l;#;的八六搭檔時那種能將身後完全託付給對方的安全感。" 

# monologue
# JP: 車体の状態を適宜モニタし、最適の運転指示をくれる。\n\x%l運転体;#00ffc040;運転体%l;#;の能力を、今のハチロクは発揮できない。
2455 = "往常的她能即時監控車體的狀態，並作出最適合的操作指示。但現在的她卻無法發揮出\\x%l運転体;#00ffc040;駕駛體%l;#;那樣的能力。" 

# monologue
# JP: （これでは――やはり……）
2947 = "（這樣下去——果然會……）" 

# 【ハチロク】
# display as 八六
# JP: 「制限60」
1899 = "「限速６０」" 

# monologue
# JP: 雨音の向こう。\x%l喚呼;#00ffc040;喚呼%l;#;はひどく、細く聞こえる。\n標識位置での\x%l喚呼;#00ffc040;喚呼%l;#;であるが、恐らく表示を読めてもいまい。
2814 = "透過雨聲聽到的\\x%l喚呼;#00ffc040;復誦%l;#;顯得很微弱。雖然是基於標誌位置的\\x%l喚呼;#00ffc040;復誦%l;#;，但恐怕她其實是看不清指示標誌的。" 

# monologue
# JP: ただ、経験のみ。\n今まで調べ、積み重ねてきたものだけが――っ！？
2398 = "她只是在憑經驗、依靠至今為止所學到的知識——嗯！？" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ」
1617 = "「啊，對啊」" 

# monologue
# JP: 喉がすうっと楽になる。\nハチロクのただ一言が、僕の不安を祓ってくれる。
2560 = "我的喉嚨一下子變輕鬆了。八六一句話就驅除了我的不安。" 

# 【双鉄】
# display as 雙鐵
# JP: 「見えているんだ。ハチロクには。\nいや――僕にだって、見えたじゃないか」
1545 = "「八六她能看到。不——我不是也看到了嗎」" 

# monologue
# JP: 豪雨のベールの向こうでも、\nいつもと違う速度であっても、確かに見えた。
2437 = "就算是在暴雨籠罩的前方，就算速度和往常不一樣，她也還是看見了。" 

# monologue
# JP: 標識の位置、信号の位置、踏切の位置、廃駅の位置。\n把握出来てる――経験が、視界の代わりを努めてくれてる。
2151 = "不論是標誌的位置、信號機的位置、道口的位置還是廢車站的位置，她都瞭然於胸——經驗代替了她的眼睛在發揮作用。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ、ハチロクはハチロクだ。\n僕よりよほど経験豊かだ。何を心配することも無い」
1790 = "「沒錯，八六始終還是八六。她的經驗比我要豐富很多。我沒什麼好擔心的」" 

# monologue
# JP: あれほど注意していた筈なのに、\nそれでも思考が、ネガティブな方へ引きずられていた。
2541 = "我明明都提醒過自己那麼多次了，但思考還是往消極的方向走。" 

# monologue
# JP: さっきより強く頭を振って深呼吸して、\nワンスコを握る指にも力を込め直す。
2551 = "我比剛才更加用力地搖頭並深呼吸，再次握緊公斤鍬。" 

# monologue
# JP: （ザクっ――ザッ）
2936 = "（沙——沙）" 

# monologue
# JP: が――\n気合がそのまま石炭に乗ってくれるものでもない。
2184 = "但——氣勢可不會對煤炭造成影響。" 

# monologue
# JP: まるで湿気りでもしたかのように、\nグズって、カラリと燃えてくれない。
2674 = "煤炭遲遲不肯充分燃燒，彷彿受潮了一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、ブロアをかけるぞ」
1551 = "「八六，我要通風了」" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
1222 = "「…………」" 

# monologue
# JP: 滝のような雨音に負け、聞こえぬようだ。\n声を張り上げ、もう一度。
2564 = "我的聲音好像被瀑布般的雨聲蓋住了，無法傳進她的耳中。於是我提高音量又喊了一次。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク！　ブロアをかけるが、良いか！\n\x%lカマ;#00ffc040;カマ%l;#;の具合がすぐれんのだ」
1547 = "「八六！我要通風，可以嗎！\\x%lカマ;#00ffc040;窯%l;#;的狀況不太好」" 

# 【ハチロク】
# display as 八六
# JP: 「えっ！？　あ、ブロア――ブロアですね。\nどうぞ、なさってください」
1596 = "「哎！？啊，通風——通風是吧。好的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『ブロア！』」
1220 = "「“通風！”」" 

# monologue
# JP: \x%l喚呼;#00ffc040;喚呼%l;#;一発、勢いも良くバルブをひねれば、\nボっ！　と蒸気が煙突から追い出される。
2123 = "一聲\\x%l喚呼;#00ffc040;復誦%l;#;後我猛地將閥門扭開，蒸汽“轟！”的一聲從煙囪中排出。" 

# monologue
# JP: 強烈な通風が起こったはずだが――焚き口を開けても、\n\x%lカマ;#00ffc040;カマ%l;#;の火にはやはり、いつものような勢いはない。
2817 = "這樣一來應該會有很好的通風才對——但就算我打開爐門，\\x%lカマ;#00ffc040;窯%l;#;裡的火還是沒有以往的氣勢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「何故だ？\nまさか、実際に[しけ,1]湿気っているわけでもあるまいに」
1804 = "「為什麼？又不可能是真的受潮了」" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
1612 = "「啊」" 

# monologue
# JP: まるで目覚めでもしたかのように、\nぱちぱち、何度か小刻みなまばたき。
2429 = "就像是清醒過來了一樣，八六輕輕地連續眨著眼睛。" 

# 【ハチロク】
# display as 八六
# JP: 「燃えが悪いのは、気圧のせいです。双鉄様」
1759 = "「是氣壓導致了煤炭不易燃。雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「気圧――ああ」
1781 = "「氣壓——是這樣啊」" 

# monologue
# JP: ただそれだけの会話に心底ほっとする。
2418 = "如此簡單的對話，卻讓我發自內心地鬆了一口氣。" 

# monologue
# JP: ハチロクの集中を乱したくない――\nそう思いつつ、返事をせずにはいられなくなる。
2851 = "雖然我並不想打擾八六——但卻不能不回答。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、気圧か。\nこれほどの台風の[ただなか,1]只中だものな」
1564 = "「原來是氣壓啊。畢竟是在如此強烈的颱風裡」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！」
1910 = "「！」" 

# monologue
# JP: ハチロクの背中が一瞬、ビクつく。\n力が入り、妙に強張っているようにも見える。
2275 = "八六的後背猛地顫抖了一下。她的身體看起來很僵硬。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうかしたか？」
1671 = "「怎麼了？」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ――あ、いえ。その……\n日々姫たちは、大丈夫かと」
1603 = "「啊——啊，沒事。我只是在想……日日姬她們有沒有事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのことならば心配するな。\n日々姫だけではなく、稀咲もふかみもいるのだ」
1876 = "「這個不用擔心。不只是日日姬，稀咲和深美也在呢」" 

# monologue
# JP: 凪がもし、おかしな場所で寝泊まりしたがろうとしても、\n三人寄れば、流されるようなこともあるまい。
2435 = "就算凪打算在危險的地方過夜，有另外三個人在，就不會輕易同意她的冒失舉動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らの目と手で、安全性を確かめただろう。\n廃炭鉱の探索に、最適なベースキャンプ地ならば――」
1693 = "「我們去親自確認過安全性了吧。說到探索廢煤礦時最適合的露營地——」" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1612 = "「啊」" 

# monologue
# JP: 小さな声がもれると同時に、背中の強張りが消えていく。
2399 = "她在輕聲叫出來的同時，後背也放鬆了下來。" 

# 【ハチロク】
# display as 八六
# JP: 「駅舎ですか」
1765 = "「是車站嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。あの日得たデータから出た結論を、\n日々姫も稀咲も、確認しているのだからな」
1624 = "「嗯。日日姬和稀咲都確認過了從那天得到的數據中得出的結論」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\nはい――はい」
1788 = "「沒錯。是的——是的」" 

# monologue
# JP: よほど心配だったのだろう。\n何度も何度もハチロクは頷く。
2693 = "看樣子八六是真的很擔心。她連連點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「日々姫たちは――\n駅で、わたくしたちの到着を待っている」
1743 = "「日日姬她們——在車站等著我們的到來」" 

# monologue
# JP: 噛みしめるようなハチロクの言葉。\nそれはじんわり、僕の心にも染みてくる。
2263 = "八六就像是在仔細領會自己的話一般。她的話也慢慢地滲透進我的心裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだな」
1653 = "「對。沒錯」" 

# monologue
# JP: 局面自体は簡単なのだと、\n頭がぱちり、切り替わる。
2574 = "我轉變了想法，看來目前的局勢本身是很簡單的。" 

# monologue
# JP: 駅から駅へ、乗客を乗せて届ければいい。\nいつもどおりをやれば問題は解決するのだ。
2332 = "只要將乘客從一個站送到下一個站就行了。和往常一樣來就能解決問題。" 

# 【ハチロク】
# display as 八六
# JP: 「――[きのした,1]木下廃駅、通過！」
1204 = "「——木下廢車站，通過！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[きのした,1]木下廃駅、通過、良し！」
1776 = "「木下廢車站，通過，正常！」" 

# monologue
# JP: はっきりとしたハチロクの\x%l喚呼;#00ffc040;喚呼%l;#;が気合を新たにしてくれる。\n術仙炭鉱廃駅までを安全に乗り切るために――
2258 = "八六吐字清晰的\\x%l喚呼;#00ffc040;復誦%l;#;讓我鼓足了幹勁。為了安全到達術仙煤礦廢車站——" 

# monologue
# JP: 普段と違い、助士ではあるが、\nやるべきことなら、体がきっちり覚えてる。
2849 = "雖然和平常不同，我現在是司爐，但我的身體還清晰地記得該做些什麼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
1628 = "「嗯！」" 

# monologue
# JP: 石炭を軽めに投げ入れて、水面計を確かめる。
2573 = "我輕輕地將煤炭撒進窯，確認水位計。" 

# monologue
# JP: ……ボイラ水位が、下がりすぎてる。\n給水バルブをひねって80\%まで戻す。
1186 = "……鍋爐水位下降很多，於是我將供水閥門扭回到８０％。" 

# monologue
# JP: ふたりでも、十分やれるじゃないか。
2347 = "哪怕只有兩個人也完全可以勝任。" 

# monologue
# JP: そうやれるよう、積み重ねてきた。\n全てはハチロクが叩き込み、体に覚えさせてくれた。
2725 = "積累至今的知識經驗讓我有了這樣的能力。一切都是八六灌輸給我，讓我用身體去記住的。" 

# monologue
# JP: 助士が欠員しようとも、どれほど天候が悪くとも、\n越える準備を、僕は整えてもらって――――ん？
2439 = "就算缺少司爐，就算天氣再惡劣，我都做好了克服困難的準備————嗯？" 

# monologue
# JP: （水位――うむ？）
2934 = "（水位——嗯？）" 

# monologue
# JP: いつもと同じにした筈なのに、水面がやけに高い――\nいやっ！？　いっぱいにまでせり上がってる！
2627 = "明明是和平常一樣做的，水面卻特別高——不！是在急劇上漲！？" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！　そうかっ、これも気圧が――っ！！？」
1614 = "「啊！原來如此，這也是氣壓在作怪——呃！！？」" 

# monologue
# JP: （ボッ！　ボボっ！　ズォボーーーーーーーッツ！！）
2926 = "（噗！噗！嗞噗——————————！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？」
1475 = "「什麼！？」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！？」
1915 = "「！？」" 

# monologue
# JP: 異音！\nすぐさま黒が視界をっ！？
2475 = "怪聲！緊接著視野一片漆黑！？" 

# monologue
# JP: 前方窓にビシャビシャと、\n真っ黒な雨がぶつかってくるっ！
2656 = "漆黑色的雨嘩啦啦地拍打在前方的窗戶上！" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、これはっ」
1878 = "「這是怎麼回事」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様。大丈夫です！　治まります！」
1903 = "「雙鐵少爺。別擔心！很快會好的！」" 

# monologue
# JP: 前方注視を解いてまで、\nハチロクは僕へと振り向き、笑ってくれる。
2254 = "八六停止了注視前方，回過頭給了我一個微笑。" 

# monologue
# JP: 黒い雨はまだ前窓を激しく叩いている。\n見ようとしても、何一つさえ見えないほどに。
2879 = "黑雨還在猛烈地拍打著前窗。不管怎麼看也看不見任何東西。" 

# 【ハチロク】
# display as 八六
# JP: 「ただの\x%l汽水共発;#00ffc040;[プライミング,3]汽水共発%l;#;です。\n水が飛びきれば、治まります」
1460 = "「不過是\\x%l汽水共発;#00ffc040;汽水共騰%l;#;而已。只要等水排淨就好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「プライミング？」
1784 = "「汽水共騰？」" 

# 【ハチロク】
# display as 八六
# JP: 「ボイラ水が溢れたのです。それが蒸気と一緒に膨張し、\n猛烈な勢いで煙突まで抜けて、吹き出た」
1894 = "「鍋爐水流出來了。它和蒸汽一起膨脹，以猛烈的氣勢湧上煙囪噴出」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あっ――」
1602 = "「啊——」" 

# monologue
# JP: 失敗をした。足しすぎた。\nいつもどおりのつもりだったが、気圧に影響されて――
2505 = "我加太多水了，這是我的過失。本來還覺得能和往常一樣，卻受氣壓影響——" 

# monologue
# JP: （いやっ）
2903 = "（不）" 

# monologue
# JP: “いつもどおり”にやるのなら、\nハチロクに何故、注水の前に確認を取らなかったのか。
2416 = "如果是“和往常一樣”的話，為什麼不在注水前向八六進行確認呢。" 

# monologue
# JP: ――あと少しだと油断した。\n自分の甘さを、いまさらながらに理解する。
2120 = "一定是我因為覺得快到了所以才疏忽了。事到如今我才明白自己有多天真。" 

# 【ハチロク】
# display as 八六
# JP: 「そのようなお顔をなさらないでください」
1853 = "「請不要露出這樣的表情」" 

# monologue
# JP: 動揺している。\n自分でそうとわかるほど。
2543 = "我明顯地感覺到我的心在動搖。" 

# monologue
# JP: だからであろう、ハチロクは、\n包み込むような笑顔で僕に、ゆっくりとした言葉をかける。
2157 = "也許正因如此，八六對我露出充滿包容力的笑容，並溫柔地對我說。" 

# 【ハチロク】
# display as 八六
# JP: 「プライミングなど、ままあることと聞いています。\n実害は、ほとんど発生しないものであるとも」
1727 = "「我聽說汽水共騰是很常見的事情。而且它幾乎不會造成什麼實際損害」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうか」
1241 = "「……是嗎」" 

# monologue
# JP: いたわりが、なぐさめが。とても温かに伝わってくる。\nならば自責は……単なる甘えとなってしまおう。
2408 = "她的體恤、安撫顯得特別的溫暖。這樣一來我的自責……顯得就像是單純的撒嬌一樣。" 

# monologue
# JP: 悔やむ気持ちを腹でぎゅうっと、最小限に押しつぶす。
2517 = "我將後悔的心情在心中壓抑至最小限度。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。\n同じ失敗は繰り返さぬようにする」
1737 = "「抱歉。我會小心不再犯同樣的錯誤」" 

# 【ハチロク】
# display as 八六
# JP: 「それはもちろんのことですが――」
1879 = "「這是自然，不過——」" 

# monologue
# JP: 数秒。\n言葉を探すような沈黙。
2404 = "她沉默了數秒，彷彿在思考說辭。" 

# 【ハチロク】
# display as 八六
# JP: 「駆け出しの時分にはよく起こす失敗と聞きますので。\n今まで一度も無かったことが、むしろ珍しいかと」
1728 = "「我聽說這是在對工作還不熟的時候經常犯的失誤。像您這樣從來沒犯過，可能反而更少見」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはハチロク。お前のおかげだ」
1882 = "「這都是多虧了你啊，八六」" 

# 【ハチロク】
# display as 八六
# JP: 「え？」
1600 = "「哎？」" 

# monologue
# JP: 単なる事実が証明している。\nそれがよくある失敗ならば、なおのこと。
2162 = "事實已經證明了我的說法，如果這本應是“很常有的失誤”的話就更不用說了。" 

# monologue
# JP: 僕だけではなく、日々姫も、凪も――\n誰が助士を務めたときにもこんな現象は起こらなかった。
2132 = "不僅是我，日日姬也好，凪也好——每個人在當司爐的時候都從沒造成這樣的現象。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前が常に、的確な指示をくれるから。\n僕らは失敗らしい失敗もせずやってきたのだ」
1636 = "「因為你總是下達正確的指示，我們才不會犯明顯的失誤」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ、そのような――っ！！？」
1463 = "「不，這怎麼——啊！！？」" 

# monologue
# JP: （ガガっ！　ガリリリリっ！）
2924 = "（喀喀！喀哩哩哩哩！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？　なんだこれはっ！？」
1476 = "「什麼！？這是怎麼了！？」" 

# monologue
# JP: 別の異音――金属音。衝撃音。\n鋼鉄の歯を歯医者のドリルで削るみたいな――
2330 = "另一種怪聲——金屬聲。衝擊聲。就像是牙醫的鑽頭在削鋼牙一般——" 

# 【ハチロク】
# display as 八六
# JP: 「えっ！？　まさかっ！？」
1598 = "「哎！？該不會！？」" 

# monologue
# JP: （ガガガっ！　ガガガガガガガっ！！）
2923 = "（喀喀喀！喀喀喀喀喀喀喀！！）" 

# monologue
# JP: 音は止まない。\nむしろますます加熱して――っ！
2746 = "聲音沒有停止。反而變得越來越劇烈——！" 

# 【双鉄】
# display as 雙鐵
# JP: 「油切れかっ！」
1764 = "「是缺油了嗎！」" 

# monologue
# JP: 突沸し、煙突から高圧で吹き出し降り注いだボイラ水が、\n駆動部のオイルを根こそぎ洗い飛ばしてしまったのだろう。
2482 = "應該是爆沸的鍋爐水從煙囪中噴出後，冷凝下落時將驅動部分的油給沖洗掉了。" 

# 【ハチロク】
# display as 八六
# JP: 「そんな……\nこのような事例、ほとんど聞いたことも」
1672 = "「怎麼會……我幾乎沒聽說過這樣的案例啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、起きたのだ。何万分の一であろうと」
1488 = "「但就算只有幾萬分之一的機率，現在事情已經發生了」" 

# monologue
# JP: 失敗を起こさぬ能力を有しているがゆえ、\nハチロクは動揺しているようだ。
2362 = "因為八六具有不出現失誤的能力，所以她似乎陷入了動搖。" 

# monologue
# JP: このままいけば\x%l8620;#00ffc040;8620%l;#;は、焼きつきを起こし壊れてしまう。\nならば、取るべき手段はひとつしかない。
2821 = "這樣下去\\x%l8620;#00ffc040;８６２０%l;#;會因發生拉缸而毀壞的。那麼要採取的手段不做他想。" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！？\n双鉄様、代わってください！　わたくしが」
1914 = "「！！？雙鐵少爺，請讓我來！我去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、だめだ。僕が行く」
1454 = "「不可以。我去」" 

# 【ハチロク】
# display as 八六
# JP: 「危険すぎます！　生身の人間がそのような」
1855 = "「讓人類去做這種事太危險了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前とて、転落すれば壊れよう。\nお前が壊れてしまっては、\x%l8620;#00ffc040;8620%l;#;はもう走れない」
1520 = "「你掉下去也會壞掉的。你如果壞掉，\\x%l8620;#00ffc040;８６２０%l;#;就再也不能跑了」" 

# 【ハチロク】
# display as 八六
# JP: 「ですがっ！」
1490 = "「但是！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はオーナーでマスターだ」
1714 = "「我是所有者，也是你的主人」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 1910 = "「！」" 

# monologue
# JP: 行かせられない。\n行かせない。
2149 = "不能讓她去。絕對不能。" 

# monologue
# JP: もしもハチロクが壊れたら、\n僕とて、恐らく歩けなくなる。
2412 = "如果八六壞掉的話，我或許也會從此一蹶不振。" 

# 【双鉄】
# display as 雙鐵
# JP: 「命令をする。\nハチロク。このまま、運転を維持するんだ」
1699 = "「我命令你。八六。繼續駕駛列車」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！？」
1905 = "「雙鐵少爺！？」" 

# monologue
# JP: 続く言葉を待ちはせず、\n\x%l歩き板;#00ffc040;歩き板%l;#;へと身をおどらせる。
2552 = "我沒等她繼續說就跳上\\x%l歩き板;#00ffc040;踏腳板%l;#;。" 

# monologue
# JP: （ゴウっ！！！！）
2916 = "（呼！！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！？」
1592 = "「哇！？」" 

# monologue
# JP: ――これこそ、まさに暴風だ。
1161 = "——好強的暴風。" 

# monologue
# JP: 風に曝され殴りつけられ、\n言葉の意味を、体で思い知らされる。
2489 = "我不由得切身感受到狂風大作的滋味。" 

# 【双鉄】
# display as 雙鐵
# JP: 「普段で、あれば――なんてことはない――\n距離――なのにっ――」
1744 = "「明明在往常的話——這點距離——根本——算不了什麼——」" 

# monologue
# JP: キャブから、ほんの数メートル先。\n\x%l缶胴;#00ffc040;缶胴%l;#;右側、デフのすぐ後――\x%lオイルポンプ;#00ffc040;オイルポンプ%l;#;はそこにある。
2854 = "離駕駛室幾公尺的前方，\\x%l缶胴;#00ffc040;爐體%l;#;右側，擋煙板後——\\x%lオイルポンプ;#00ffc040;油泵%l;#;就在那裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「く、そ――」
1850 = "「該、死——」" 

# monologue
# JP: \x%l缶掴み棒;#00ffc040;[ハンドレール,3]缶掴み棒%l;#;を握る手が、\n\x%l歩き板;#00ffc040;歩き板%l;#;に乗る足が、滑る。滑りに滑る。
2534 = "我握住\\x%l缶掴み棒;#00ffc040;爐體扶手%l;#;的手，踩在\\x%l歩き板;#00ffc040;踏腳板%l;#;上的腳都在不停打滑。" 

# monologue
# JP: 飛んだオイルが、そこにも恐らく乗っているのだ。
2772 = "被沖走的油或許也黏在上面。" 

# 【双鉄】
# display as 雙鐵
# JP: 「くそっ！！！！」
1585 = "「可惡！！！！」" 

# monologue
# JP: 鉄の臭い。油の臭い。風の音。雨の音。\n一瞬にして冷えきる体は、あの時を思い出している。
2840 = "鐵的味道。油的味道。風的聲音。雨的聲音。一瞬間，冰冷的身體讓我想起了那個時候。" 

# monologue
# JP: だが、震えたなら、僕は死ぬ。\nならば心で、体を抑える。
2200 = "但若是發抖的話，我就會死。那麼就用意志控制住身體。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今度は――この手を――\n今度こそっ――絶対、この手を離さんぞっ！」
1881 = "「這次——我絕對——絕對不會——再放開、我的手了！」" 

# monologue
# JP: じり、じり、進む。\n\x%l歩き板;#00ffc040;歩き板%l;#;から足を浮かせず、にじるようにして進んでく。
2525 = "我慢慢地前進。腳不離\\x%l歩き板;#00ffc040;踏腳板%l;#;，往前蹭著前進。" 

# 【双鉄】
# display as 雙鐵
# JP: 「路子が――掴ませてくれた、命なんだ」
1880 = "「這條命——是路子救下來的」" 

# monologue
# JP: ようやく、僕は理解する。
2569 = "我總算理解了。" 

# monologue
# JP: 路子は僕を突き放し――\n空いた手に、命を渡してくれてたのだと。
2795 = "路子推開我——將生命託付到我空蕩蕩的手中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクと――出会わせてくれた命なんだ」
1887 = "「那是讓我——和八六相遇的生命」" 

# monologue
# JP: そして、進む一歩ごとに思い知る。
2671 = "然後我每前進一步，都切身感受到。" 

# monologue
# JP: 僕はこれほど――\n生を、望んでいるのだと。
2545 = "我是如此地——渴望活著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
1645 = "「好！」" 

# monologue
# JP: ようやくデフのすぐ後ろにまで辿り着く。\nだが、慌てない。慌てれば死ぬ。
2736 = "總算到了擋煙板後。但是不能慌張。慌張就會死。" 

# monologue
# JP: ゆっくりゆっくり右手を離し、\n\x%lオイルポンプ;#00ffc040;オイルポンプ%l;#;の扉を開けて、中のハンドルに手をかける。
2529 = "我慢慢地，慢慢地放開右手，打開\\x%lオイルポンプ;#00ffc040;油泵%l;#;的門，抓住裡面的手把。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ン――くっ！」
1620 = "「嗯——唔！」" 

# monologue
# JP: 片手でハンドルを回して、回して――
2532 = "我抓著手把旋轉、旋轉——" 

# monologue
# JP: やがて。\n異音が聞こえなくなる。
2128 = "不久後，聽不到怪聲了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「やったぞ――ハチロク」
1674 = "「成功了——八六」" 

# monologue
# JP: やっとの思いで油を戻した。\nここで油断をしたなら、馬鹿だ。
2410 = "好不容易才把油注好。若是在回去時犯錯的話就太傻了。" 

# monologue
# JP: キャブへと戻る手も足も、\nだからいっそう、慎重になる――
2585 = "所以返回駕駛室時，四肢也更加慎重——" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ぅはっ！」
1196 = "「——嗚啊！」" 

# monologue
# JP: キャブへと、文字通り倒れこむ。
2568 = "我直接倒進了駕駛室。" 

# monologue
# JP: 息が出来ない、目がくらむ。\n濡れて冷えきり、体がひどく重く感じる。
2556 = "我無法呼吸，雙眼眩暈。又濕又冷的身體分外沉重。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄……さまっ――」
1902 = "「雙鐵……少爺——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1912 = "「！！？」" 

# monologue
# JP: それでも一気に跳ね起きる。\nハチロクが――
2194 = "但我還是一口氣跳了起來。八六她——" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、ハチロク」
1512 = "「你怎麼了，八六」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしっ――わたくしには――\nむり――ですっ――もう、無理っ――」
1679 = "「我——我——辦不——到——辦不到了——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1912 = "「！！？」" 

# monologue
# JP: 運転姿勢のそのままで、前方注視を崩さぬままで――\nハチロクは、ぼろぼろと泣いている。
2253 = "八六保持著駕駛姿勢，雙眼注視著前方——哭成了淚人。" 

# monologue
# JP: 涙を床にぼとぼと落とし、\nそうしながらも、\x%l加減弁;#00ffc040;加減弁%l;#;テコを制御している。
2648 = "淚水滴滴答答地落在地板上，但她仍然控制著\\x%l加減弁;#00ffc040;汽門%l;#;。" 

# 【ハチロク】
# display as 八六
# JP: 「無理――ですっ――\n運転を、維持、するっ、などっ――」
1867 = "「辦——不到——我、沒辦法、繼續、駕駛——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクっ！」
1546 = "「八六！」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄――様、までっ――\nわたくしを――置いて――いって――しまう、かとっ」
1688 = "「我以為——連——雙鐵、少爺——都會——扔下——我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1911 = "「！！！」" 

# monologue
# JP: ああ、そうだ。\nハチロクも置き去りにされているのだ。
2426 = "對啊，沒錯。八六同樣遭到了拋棄。" 

# monologue
# JP: 事故の、そのあと。\x%l機関士;#00ffc040;機関士%l;#;からも仲間からも。\n同じ時間を過ごした存在、全てから――
2368 = "在事故之後，不管是\\x%l機関士;#00ffc040;司機%l;#;還是同伴，曾與她共度時光的所有人都將她拋棄——" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし――はっ――\nもう――誰もっ――なくしたく――などっ――」
1676 = "「我——已經——不想——再——失去——誰——」" 

# monologue
# JP: 突き刺さってくる。泣き声が。\nハチロクも僕と同じなのだと、ようやく、わかる。
2407 = "她的哭聲深深地扎在我的心上。我總算明白，八六和我是一樣的。" 

# monologue
# JP: 救えなかった苦しみを、死なせてしまった苦しみを。\nあの日から――ずっと、抱え続けているのだと。
2459 = "從那一天起——她就一直背負沒能拯救他人的痛苦、讓他人死去的痛苦。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしを――置き去りに――どうか――しないでっ」
1852 = "「請不要——拋下——我——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク……僕は……」
1541 = "「八六……我……」" 

# monologue
# JP: 頼りきっていた。甘ったれていた。\nこんなに小さなハチロクに。
2484 = "我一直在依靠著她，一直在向這麼嬌小的八六撒嬌。" 

# monologue
# JP: 大の男である僕が、自分の不安に耐え切れず――\nそれをまるごと、押し付けていた。
2797 = "身為一個男人，我承受不住自己的不安——將其全部推給了她。" 

# monologue
# JP: （今まで、ずっとだ――\n無自覚に……僕は、ずうっとそうし続けてた）
2904 = "（之前一直都——不自覺地……我一直以來都是這樣）" 

# monologue
# JP: 終着駅に着いてないのは、\nそこまで、たどり着けなかったのは――
2538 = "我明明知道沒有到達終點站、沒能走到最後的不只是我一人——" 

# monologue
# JP: ハチロクも同じなのだと、知っていたのに。
2247 = "八六也是一樣。" 

# 【ハチロク】
# display as 八六
# JP: 「もう、これ以上――ひとり――で、なんて」
1457 = "「不要再——留我——孤身一人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1543 = "「八六」" 

# monologue
# JP: 僕が押し付けた全てを受け止め、\nハチロクは支えてくれていた。
2265 = "八六承受住了我推給她的一切，並一直以來都在支撐著我。" 

# monologue
# JP: いま、ハチロクが崩れてしまいそうならば、\n今度は僕が、支えたい。
2609 = "既然現在八六快要崩潰了，那麼就該輪到我來支撐她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「一人じゃない。僕も、お前も」
1508 = "「你和我都不是孤身一人」" 

# monologue
# JP: だから、後から抱きしめる。\n抱きしめて、ハチロクの手を手で包み込む。
2589 = "所以，我從身後抱住了她。我抱住八六，用自己的手包住她的手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「もう一人じゃない。一人じゃないんだ。\n僕がいて、お前がいるから――ここにいるから」
1509 = "「你已經不是孤身一人了。我們都不是。這裡有我，也有你——我們都在這裡」" 

# monologue
# JP: 割り切ろうとして割り切れず。\n忘れようとして忘れられずに。
2480 = "想要訣別又無法訣別。想要忘記又無法忘記。" 

# monologue
# JP: 傷の痛みは、きっと同じで。\nでもハチロクはその苦しさを、一度も僕に見せなかった。
2500 = "我們的傷痛肯定都是一樣的。但是八六從來沒讓我見到她的痛楚。" 

# monologue
# JP: （僕がいたから、ハチロクは……\n事故の苦しみを、吐き出せなかった――）
2933 = "（正因為有我，八六才……一直將遭遇事故的痛苦忍在心裡——）" 

# monologue
# JP: それがどれほどの苦痛であるか、\n僕は、誰より知っている。
2547 = "我比任何人都要清楚，這是何等痛苦的一件事。" 

# monologue
# JP: その苦しみをどう扱えばいいものか、\nようやく、僕は知れたと思う。
2558 = "我現在總算知道，該怎樣面對這種痛苦了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――\nこの勾配の向こうの景色が、お前にも見えるよな」
1539 = "「八六——你也能看得見這斜坡對面的景色吧」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 1910 = "「！」" 

# monologue
# JP: ハチロクの体が硬くなる。\n怯えに、ぶるぶる震え始める。
2282 = "八六的身體變得僵硬。恐懼讓她開始發抖。" 

# monologue
# JP: それでも手指は迷わず動く。\n\x%l加減弁;#00ffc040;加減弁%l;#;を。ブレーキを。重ね合う手で操作する。
2187 = "但儘管如此，她的手指還是毫不猶豫地忙碌著。我們雙手交疊地操作著\\x%l加減弁;#00ffc040;汽門%l;#;和剎車。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あそこを越えれば到着できる。\n日々姫が、そこで待っているんだ」
1582 = "「只要跨過那裡就能到了。日日姬在那邊等著我們」" 

# monologue
# JP: 雨は少しも緩んでくれず。\n視界は、ほとんど遮られている。
2859 = "雨勢完全沒有減弱。視野幾乎都被遮住了。" 

# monologue
# JP: それでも僕らは、見えずとも見る。\nクマ川第四橋梁を――赤くか細い鉄橋を。
2189 = "但就算看不見，我們還是能看見。看見隈河第四大橋——那座紅色的細小鐵橋。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし――には――むりっ」
1680 = "「我——辦不到」" 

# monologue
# JP: ガタガタと、ハチロクの震えは止まらない。\n涙は、もはや川のようだ。
2283 = "八六的身體還在顫抖不止。臉上淚流成河。" 

# 【ハチロク】
# display as 八六
# JP: 「見えま――せんっ――\nだって――橋は――あの、橋はっ！」
1724 = "「我看不見——因為——橋——那座橋是！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1789 = "「沒錯」" 

# monologue
# JP: 涙に揺れる瞳はきっと、過去を見ている。\n僕らはずっと、そうすることを強いられてきた。
2402 = "她布滿淚水的雙眸一定看到了過去。我們一直都受著往昔惡夢纏身之苦。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あの橋を、あの過去を。\n僕も同じだ。越えられなかった」
1684 = "「我也一樣。我沒能跨過那座橋，跨過那段過去」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 1910 = "「！」" 

# monologue
# JP: 救えなかった悲しみは、殺してしまった悲しみは、\n一生、消えることはない。
2658 = "無法拯救他們的悲傷，害死他們的悲傷，一輩子也不會消失。" 

# monologue
# JP: 割り切ることも忘れることも決してできないことなのだと、\n僕は何度も。何度も何度も、何度も思い知らされた。
2520 = "我已經無數次、無數次無數次地意識到——自己將永遠無法釋懷，也無法忘記那時的過去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だがな。ハチロク」
1489 = "「但是啊，八六」" 

# monologue
# JP: 体を預ける。密着させる。\n僕とハチロクの身体の熱を、交換しあう。
2566 = "我的身體與八六緊貼在一起。與她互相交換著身體的溫度。" 

# monologue
# JP: 届くと知ってる。聞こうと、いつでもしてくれるから。\nたとえハチロクがどれほどに、怯え竦んでしまっていても。
2148 = "不管八六有多麼害怕有多畏懼，我的心意總是能傳達到。因為她一直都在傾聽。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らは、ふたりだ」
1694 = "「我們是兩個人」" 

# monologue
# JP: ひとりじゃない。
2498 = "我們不是一個人。" 

# monologue
# JP: かつての路子と僕とのように、\n半身をわけあったものじゃない。
2134 = "不像以前我和路子那樣互為半身。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひとりでは決して出来ないことが――\nふたりだったら、できるんだ」
1659 = "「就算這件事一個人的確克服不了——那兩個人的話就一定可以」" 

# monologue
# JP: 教えてくれたのはハチロクだ。
2268 = "八六教會了我這個道理。" 

# monologue
# JP: もしも忘れてしまっているなら、思い出させるだけでいい。
2413 = "如果她忘記了，那我讓她想起來就好。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前は、あの橋を越えられなかった。\n僕は、あの橋を越えられなかった」
1523 = "「你未能跨過那座橋。我也未能跨過那座橋」" 

# monologue
# JP: そして死なせた。救えなかった。
2670 = "然後我們害死了他們。沒能拯救他們。" 

# monologue
# JP: ついてしまった傷は一生消えないし。\n今も未来も、ことあるごとに血を流していくことだろう。
2361 = "因此產生的傷口一輩子也無法癒合。或許不管是現在還是未來，傷口一旦被觸及，仍會血流如注。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、越えたい。あの橋を」
1735 = "「所以，我想跨過那座橋」" 

# 【ハチロク】
# display as 八六
# JP: 「…………っ」
# 1222 = "「…………」" 

# monologue
# JP: 手が動く。
2501 = "我們的手在動。" 

# monologue
# JP: 僕の手と、ハチロクの手と。\n重なりあって、同時に動く。
2563 = "我的手和八六的手重疊在一起，同時操作著列車。" 

# 【双鉄】
# display as 雙鐵
# JP: 「越えよう。今日こそ。\n僕と、お前で――僕らふたりで」
1481 = "「今天就讓我和你——兩人一起跨過這道障礙吧」" 

# monologue
# JP: ぐ、と。ハチロクの喉が動く。
2272 = "八六的喉嚨“咕”地響了一聲。" 

# monologue
# JP: 何かを飲み干し――\n代わりに、切れ切れの声を吐く。
2353 = "嚥下了什麼東西——然後發出斷斷續續的聲音。" 

# 【ハチロク】
# display as 八六
# JP: 「は……いっ」
1639 = "「好……的」" 

# monologue
# JP: 割り切れない。忘れられない。\n許されはしない。許しもできない。
2659 = "無法釋懷。無法忘記。無法被原諒。也無法原諒。" 

# monologue
# JP: けれども確かに、そうした過去が今を作った。\n事故があるから、僕らふたりは、今ここにいる。
2186 = "但也的確是這樣的過去，造就了現在的我們。因為發生了事故，我們兩人才會身處於此。" 

# 【双鉄】
# display as 雙鐵
# JP: 「他に何もしなくていい。\nただひとつだけを、すればいい」
1555 = "「別的什麼都不用做，只需專注一件事就好」" 

# monologue
# JP: 上り勾配にさしかかる。\n\x%l粘着力;#00ffc040;粘着力%l;#;が、きっと足りない。
2294 = "列車臨近上坡。\\x%l粘着力;#00ffc040;黏著力%l;#;肯定不足。" 

# monologue
# JP: \x%l砂撒き;#00ffc040;砂撒き%l;#;コックで砂を吐き出し、\x%l動輪;#00ffc040;動輪%l;#;がそれを超えると同時、\n排水で砂を流してしまう。
2682 = "用\\x%l砂撒き;#00ffc040;放沙%l;#;閥撒下砂石，在\\x%l動輪;#00ffc040;動輪%l;#;越過砂石的同時，透過排水將砂石沖走。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――あの橋だ」
1193 = "「——到那座橋了」" 

# monologue
# JP: 見えてくる。\n坂の向こうに。雨の向こうに。
2827 = "那座橋映入眼簾。在坡道的另一頭。在雨的另一頭。" 

# monologue
# JP: 赤はおぼろに溶けゆくようで、\n頼りなく……いっそ、今にも落ちそうで。
2828 = "那抹飄渺的紅色彷彿要融入水中……就好像是馬上要墜落一般。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あの日の橋を。\n僕と、お前で――」
1856 = "「讓我和你一起，去跨過那一天的橋——」" 

# 【ハチロク】
# display as 八六
# JP: 「は、い――双鉄、様」
1642 = "「好的——雙鐵……少爺」" 

# monologue
# JP: だが、怯えない。\n僕もハチロクも、もう怯えない。
2488 = "我不再畏懼。我和八六都已經不再畏懼。" 

# monologue
# JP: 僕らはふたりと、知っているから。\nそう出来るのだと、知っているから。
2363 = "因為我們已經知道，我們是兩個人。因為已經知道，我們能夠辦到。" 

# 【ハチロク】
# display as 八六
# JP: 「わた、くしと。双鉄、様、とで――」
1703 = "「我和雙鐵少爺，兩個人——」" 

# monologue
# JP: 重なっている。\n手だけではなく、体だけじゃなく、言葉も、心も。
2499 = "我們合為一體。不僅是手，不僅是身體，還有話語和心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。僕達で。\n僕ら、ふたりで」
1652 = "「對。我們。我們兩人」" 

# monologue
# JP: だから、僕らはそうできる。\nふたりでいるから――そうできている。
2580 = "所以我們能夠做到。因為有兩個人——所以能做到。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――乗り越えるんだ」
1198 = "「——我們要跨越過去」" 

# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2918 = "（咣咚，咚咚，鐺鐺，鐺鐺——）" 

# monologue
# JP: あっけないほど、軽い音。\nいつか、遠くに聞いた音。
2800 = "輕得出乎意料的聲音。曾經在遠方聽過的聲音。" 

# monologue
# JP: もう、減速に入ってる。\nあとは、惰力で――何もせずとも、辿り着く。
2446 = "已經開始減速了。之後就靠慣性——什麼都不做都能抵達終點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほら、出来た」
1829 = "「看，我們做到了」" 

# 【ハチロク】
# display as 八六
# JP: 「あ……はっ――んっ――\nあ、はい――できまし、た」
1608 = "「啊……哈——嗯——啊，是的——做到、了」" 

# monologue
# JP: ばしばし、何度もまばたきをする。\nそうして、涙を弾いて飛ばす。
2685 = "用力地眨了幾下眼睛，清了清眼中的淚水。" 

# 【ハチロク】
# display as 八六
# JP: 「できました――わたくしたちは――\n越え、ましたっ！」
1529 = "「做到了——我們——跨過去了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。越えたな」
1626 = "「嗯。跨過去了」" 

# monologue
# JP: 朽ちたホームへの入線は、いつもよりさらに遅く感じる。
2206 = "停靠破敗的站台時，速度感覺比平時還要慢。" 

# 【ハチロク】
# display as 八六
# JP: 「え！？」
1595 = "「哎！？」" 

# monologue
