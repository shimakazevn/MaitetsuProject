# 【ハチロク】
# display as 八六
# JP: 「求めております。狂おしいほど」
1710 = "「我想擁有您。想得如痴如狂」" 

# monologue
# JP: ハチロクの手が、答えてくれる。\nぎゅっと、ぎゅうっと――僕の体に巻き付いてくる。
2276 = "八六的手告訴了我答案。她的手緊緊地——纏住我的身體。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク。お前は女だ」
1892 = "「那麼八六，你已經是女人了」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、わたくしは――女です。\n双鉄様を、これほど求める女です」
1762 = "「是的，我是女人。一個如此渴望雙鐵少爺的女人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「男と女だ。お互いに求め合っている。\nだったら、答えなど簡単だ」
1692 = "「我們一個是男人，一個是女人，而且渴求著彼此。那麼答案就很簡單了」" 

# 【ハチロク】
# display as 八六
# JP: 「はい――」
1760 = "「是的——」" 

# monologue
# JP: 頷いて。\nハチロクは顎を軽くあげ、目を閉じる。
2287 = "八六點點頭。她輕輕地抬起下巴，閉上眼睛。" 

# monologue
# JP: 僕らの望みは、重なり合ってる。
2502 = "我們的願望合而為一。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
# 1543 = "「八六」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄、さま」
1901 = "「雙鐵——少爺」" 

# monologue
# JP: だから、望みを形にするため。
2590 = "所以，為了讓願望成真。" 

# monologue
# JP: 僕らは――お互いを与え合うキスをする。
2503 = "我們雙唇相印，把身心寄託於對方。" 
