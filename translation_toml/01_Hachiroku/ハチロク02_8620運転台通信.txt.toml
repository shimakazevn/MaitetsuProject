[script]
# lines: 340 
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！　こん写真ばっ！！」
1954 = "「Fukami-chan! Nhìn tấm ảnh này nè!!」"

# 【ふかみ】
# display as 深美
# JP: 「なになに凪ちゃん――わ！」
1979 = "「Sao thế sao thế Nagi-chan——ủa!」"

# monologue
# JP: 凪とふかみが目を見合わせて、\nそれからぽかん、と口を開けながら僕を見る。
2490 = "Nagi và Fukami nhìn nhau,\nđoạn cả hai há hốc miệng nhìn tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　何をそんなに――ああ」
1980 = "「Gì vậy? Mọi người làm sao thế——à」"

# monologue
# JP: ふたりの見ている写真を覗いた瞬間に、\nなるほどこれかと理解する。
2537 = "Ngay khoảnh khắc nhìn vào tấm ảnh hai đứa đang xem,\ntôi đã hiểu ra vấn đề."

# 【凪】
# display as 凪
# JP: 「機関車の前ば、開いとるばい」
1795 = "「Trước đầu máy xe lửa, nó đang mở ra kìa」"

# monologue
# JP: 写真の中では、\x%l8620;#00ffc040;8620%l;#;の正面前方――
2733 = "Trong ảnh,\nphía trước chính diện của \\x%l8620;#00ffc040;8620%l;#;——"

# monologue
# JP: “8620”のプレートが普段取り付けられてる前面が、\nぱっくり大きく開いている。
2510 = "Cái mặt trước nơi thường gắn tấm biển “8620”,\nđang mở toang hoác."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。開くのだ。扉になっているからな」
1872 = "「Ừm. Nó mở được đấy. Vì nó là một cánh cửa mà」"

# 【ふかみ】
# display as 深美
# JP: 「とびら――あ、扉！」
2245 = "「Cửa——á, là cửa thật kìa!」"

# monologue
# JP: いまだぽかん、と僕の言葉を繰り返し。
2716 = "Cô ấy vẫn ngẩn ngơ, lặp lại lời tôi."

# monologue
# JP: それからふかみは目をしばたたかせ、\n夢から覚めたようになる。
2834 = "Sau đó, Fukami chớp chớp mắt, như thể vừa bừng tỉnh sau cơn mơ."

# 【ふかみ】
# display as 深美
# JP: 「丸いハンドルみたいなのついてるの知ってました。けど、\nわたし、あれ、アクセントっていうか、飾りかなぁって」
2009 = "「Em biết là nó có cái thứ giống như vô lăng tròn tròn đó. Nhưng mà, em cứ tưởng đó là điểm nhấn, hay là vật trang trí chứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「飾りではない。あのハンドルは回して開けるためにある。\n僕も最初に目にしたときは、驚いた」
2230 = "「Đó không phải là vật trang trí. Cái tay quay đó dùng để mở cửa. Lần đầu tiên nhìn thấy, tôi cũng đã rất ngạc nhiên.」"

# monologue
# JP: が、整備点検を重ねるうちに、\nなんとも思わなくなってしまっていたのだが……
2519 = "Thế nhưng, sau nhiều lần bảo trì kiểm tra, tôi lại chẳng còn cảm thấy gì nữa..."

# 【凪】
# display as 凪
# JP: 「こん写真ば！　ぜーーーったいに新聞にのせるばい！\nみんな、きっとびっくりするたいっ！」
2220 = "「Tấm ảnh này! Nhất định phải đăng lên báo mới được! Mọi người chắc chắn sẽ bất ngờ lắm cho xem!」"

# 【ふかみ】
# display as 深美
# JP: 「わたしも、賛成。大賛成。です」
2000 = "「Em cũng đồng ý. Hoàn toàn đồng ý. ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だ、そうだぞ、日々姫」
2045 = "「Đ, đúng là vậy đó, Hibihime.」"

# 【日々姫】
# display as 日日姬
# JP: 「オッケ。\nじゃ、その写真も一面に載せちゃお」
1928 = "「Okie. Vậy thì, mình sẽ đăng cả bức ảnh đó lên trang nhất luôn.」"

# monologue
# JP: ＳＬのことを何も知らない皆様向けの新聞だから、\n関連知識の乏しい者に、内容をチェックしてもらう――
2743 = "Vì đây là tờ báo dành cho những người không biết gì về tàu hơi nước, nên việc để một người thiếu kiến thức chuyên môn kiểm tra nội dung――"

# monologue
# JP: 自分で出したアイディアが的を射たせいもあるのだろうか、\nレールショップのPCを操る、日々姫の指の音は軽快だ。
2527 = "Có lẽ cũng vì ý tưởng do chính mình đề xuất lại vô cùng chuẩn xác, nên những ngón tay của Hibihime đang điều khiển chiếc máy tính tại Rail Shop nghe thật nhẹ nhàng."

# 【ハチロク】
# display as 八六
# JP: 「む……ん…………」
1868 = "「Ư... ừm............」"

# monologue
# JP: それに引き換え、\nハチロクはずっと頭を抱え続けている。
2771 = "Trái lại với điều đó, Hachiroku vẫn cứ ôm đầu suy nghĩ mãi."

# monologue
# JP: “なんでも好きに書いてくれ”と言ったのが、\nあるいは逆効果だったのかもしれん。
2522 = "Có lẽ câu nói “Em muốn viết gì thì viết” của mình đã phản tác dụng mất rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうわけでな。ハチロク」
1801 = "「Vậy nên là, Hachiroku à.」"

# 【ハチロク】
# display as 八六
# JP: 「ひゃわっ！？　え？　あ――はい、\nなんでございましょう、双鉄様」
1849 = "「Hyawaaa!? Ơ? À——vâng,\nCó chuyện gì thế ạ, Soutetsu-sama?」"

# monologue
# JP: 今の驚きぶりから見るに、\n僕らの話も、まるで聞こえていなかったのだろう。
2749 = "Nhìn vẻ kinh ngạc của cô ấy lúc này,\nchắc là cô ấy chẳng nghe thấy chúng ta nói gì đâu."

# 【双鉄】
# display as 雙鐵
# JP: 「最初のコラムなのだが、\n“[ハチロクニイマル,3]8620の大掃除”というお題でどうだろう」
2039 = "「Về cột bài đầu tiên,\ntôi thấy chủ đề “Tổng vệ sinh 8620” thế nào nhỉ?」"

# monologue
# JP: 怪訝そうな顔のハチロクに、\nさきほど選ばれた写真を示し、事情をざらりと話し聞かせる。
2618 = "Tôi đưa bức ảnh vừa chọn cho Hachiroku đang lộ vẻ nghi hoặc,\nrồi kể sơ qua cho cô ấy nghe sự tình."

# monologue
# JP: やがて、ひどくのろのろした声。
2762 = "Chẳng mấy chốc, một giọng nói cực kỳ chậm rãi cất lên."

# 【ハチロク】
# display as 八六
# JP: 「これを文章で伝えてみれば……良い、のでしょうか？\nこの写真……\x%l煙室;#00ffc040;[えんしつ,1]煙室%l;#;の内部を清掃する様子を」
2026 = "「Nếu truyền đạt điều này bằng văn bản…… liệu có ổn không ạ?\nBức ảnh này…… khắc họa cảnh dọn dẹp bên trong \\x%l煙室;#00ffc040;Buồng khói%l;#; này ạ」"

# monologue
# JP: 言葉も顔も、いまひとつ自信がなさそうだ。
2563 = "Cả lời nói lẫn nét mặt, cô ấy có vẻ vẫn chưa tự tin lắm."

# monologue
# JP: どうしたものか――\nと思う矢先に、ふかみがおずおず挙手をする。
2694 = "Đang tự hỏi nên làm thế nào đây——\nthì Fukami rụt rè giơ tay."

# 【ふかみ】
# display as 深美
# JP: 「えんしつ……って、この中のこと、です？\nどういう感じになってる。ですか？」
2221 = "「Buồng khói…… là phần bên trong này ạ?\nNó trông như thế nào. vậy ạ?」"

# 【ハチロク】
# display as 八六
# JP: 「煙の部屋で\x%l煙室;#00ffc040;煙室%l;#;です。ふかみ様。\x%l煙室;#00ffc040;煙室%l;#;の上部には、\nほら、煙突があるのがわかりますでしょう？」
2016 = "「Là căn phòng của khói, \\x%l煙室;#00ffc040;Buồng khói%l;#; đó ạ. Fukami-sama.\n\\x%l煙室;#00ffc040;Buồng khói%l;#; phía trên này, cô thấy đấy, có ống khói đúng không ạ?」"

# 【ふかみ】
# display as 深美
# JP: 「あ――煙突まで、煙を通すための部屋ですか？」
1876 = "「A——là căn phòng để dẫn khói lên ống khói sao ạ?」"

# 【ハチロク】
# display as 八六
# JP: 「そのとおりです。\x%l火室;#00ffc040;火室%l;#;内での燃焼を助けるため、\n[きゅうはいき,2]吸排気を良くする工夫が、\x%l煙室;#00ffc040;煙室%l;#;には詰まっています」
2089 = "「Đúng như vậy ạ.\nĐể hỗ trợ quá trình cháy trong \\x%l火室;#00ffc040;Buồng đốt%l;#;,\n\\x%l煙室;#00ffc040;Buồng khói%l;#; chứa đựng những cấu tạo giúp cải thiện khả năng hút và xả khí ạ」"

# 【凪】
# display as 凪
# JP: 「あれ？　ＳＬの胴体の中って、\n全部で火がぼうぼうと燃えてるんじゃなかと？」
1852 = "「Ủa? Chẳng phải bên trong thân tàu hơi nước,\nlửa cháy rực khắp nơi sao ạ?」"

# 【ハチロク】
# display as 八六
# JP: 「いいえ、凪様。火が燃える場所――\x%l火室;#00ffc040;[かしつ,1]火室%l;#;は、\n機関車全体の、四分の一にも満たない範囲だけですよ？」
1802 = "「Không phải đâu, Nagi-sama. Nơi lửa cháy——\\x%l火室;#00ffc040;Buồng đốt%l;#;,\nchỉ chiếm chưa đầy một phần tư toàn bộ đầu máy thôi ạ?」"

# monologue
# JP: 写真の上を囲んで示す、ハチロクの指は嬉しげだ。
2468 = "Ngón tay Hachiroku khoanh tròn trên bức ảnh, vẻ mặt đầy thích thú."

# 【ハチロク】
# display as 八六
# JP: 「機関車前面、\x%l煙室戸;#00ffc040;[えんしつど,2]煙室戸%l;#;側から四分の一程度が\x%l煙室;#00ffc040;煙室%l;#;。\n真ん中の二分の一程度が\x%l缶胴;#00ffc040;[かんどう,1]缶胴%l;#;。キャブ側の残りが\x%l火室;#00ffc040;火室%l;#;」
1921 = "「Ở mặt trước đầu máy, khoảng một phần tư tính từ phía \\x%l煙室戸;#00ffc040;Cửa buồng khói%l;#; là \\x%l煙室;#00ffc040;Buồng khói%l;#;.\\nKhoảng một phần hai ở giữa là \\x%l缶胴;#00ffc040;Thân nồi hơi%l;#;. Phần còn lại phía gần cabin là \\x%l火室;#00ffc040;Buồng đốt%l;#;」"

# 【凪】
# display as 凪
# JP: 「かんどう？」
2131 = "「Thân nồi hơi ạ?」"

# 【ハチロク】
# display as 八六
# JP: 「ボイラーの主体。水で満ちている部分ですね。\nSLは、\x%l缶胴;#00ffc040;缶胴%l;#;内の水を沸かして生まれる蒸気で動きます」
1747 = "「Là bộ phận chính của nồi hơi, nơi chứa đầy nước ạ.\\nĐầu máy hơi nước hoạt động nhờ hơi nước được tạo ra khi đun sôi nước bên trong \\x%l缶胴;#00ffc040;Thân nồi hơi%l;#; đó」"

# monologue
# JP: こくりと、頷く。\n凪もふかみも――日々姫までもが。
2412 = "Tôi khẽ gật đầu.\\nCả Nagi, Fukami, và ngay cả Hibihime nữa."

# 【ハチロク】
# display as 八六
# JP: 「より効率良く沸かすため、\x%l缶胴;#00ffc040;缶胴%l;#;の中に満ちている水――\n[かんすい,1]缶水の中に更に、無数の細長い\x%l煙管;#00ffc040;[えんかん,1]煙管%l;#;が通してあります」
2106 = "「Để đun sôi nước một cách hiệu quả hơn, bên trong \\x%l缶胴;#00ffc040;Thân nồi hơi%l;#; đầy nước —\\nnước nồi hơi — còn được thiết kế xuyên qua bởi vô số những \\x%l煙管;#00ffc040;ống lò hơi%l;#; dài và mảnh」"

# 【ふかみ】
# display as 深美
# JP: 「えんかん――細長い……あ！　煙の管？」
2123 = "「Ống lò hơi... dài và mảnh... A! Ống dẫn khói phải không?」"

# monologue
# JP: 正解です、とハチロクが笑顔で頷けば、\nふかみの顔がぱあっと晴れる。
2719 = "Khi Hachiroku mỉm cười gật đầu bảo rằng đó là đáp án chính xác,\\nkhuôn mặt Fukami bừng sáng."

# 【ふかみ】
# display as 深美
# JP: 「わかった！　熱い煙を、その\x%l煙管;#00ffc040;煙管%l;#;の中に通すの、きっと。\nそしたら、お湯も」
2006 = "「Tớ hiểu rồi! Chắc chắn là người ta dẫn luồng khói nóng qua những \\x%l煙管;#00ffc040;ống lò hơi%l;#; đó.\\nNhư vậy thì nước cũng sẽ...」"

# 【凪】
# display as 凪
# JP: 「そうばい！　一ヶ所から火であぶるだけより、\nずうっと早くわきよるばいっ！」
1953 = "「Đúng rồi đó! Thay vì chỉ đốt lửa ở một chỗ, cách này sẽ làm nước sôi nhanh hơn nhiều!」"

# 【ハチロク】
# display as 八六
# JP: 「左様です。ですので、火を燃やす場所は、\n\x%l火室;#00ffc040;火室%l;#;内だけで十分なのです」
2084 = "「Đúng vậy ạ. Chính vì thế, chỉ cần đốt lửa bên trong \\x%l火室;#00ffc040;Buồng đốt%l;#; là đã đủ rồi」"

# monologue
# JP: 言って、もう一度、ハチロクの指が写真の一部。\n\x%l運転台;#00ffc040;運転台%l;#;の少し前方の胴体を指す。
2469 = "Vừa nói, ngón tay Hachiroku lại chỉ vào một phần trên bức ảnh.\\nCô chỉ vào phần thân phía trước một chút so với \\x%l運転台;#00ffc040;Buồng lái%l;#;."

# 【ハチロク】
# display as 八六
# JP: 「この\x%l火室;#00ffc040;火室%l;#;部分だけに石炭を投げ込み、燃焼させます。\nですので、\x%l火室;#00ffc040;火室%l;#;のお掃除は大変なのです」
2126 = "「Chúng ta chỉ ném than vào và đốt cháy ngay tại phần \\x%l火室;#00ffc040;Buồng đốt%l;#; này.\\nVì vậy, công việc dọn dẹp \\x%l火室;#00ffc040;Buồng đốt%l;#; rất vất vả ạ」"

# 【ふかみ】
# display as 深美
# JP: 「あ……そっか。前の扉が開いても、胴体の真ん中に\n\x%l煙管;#00ffc040;煙管%l;#;っていうのが詰まってるなら――」
1879 = "「À... ra là vậy. Ngay cả khi mở cửa phía trước ra, nếu bên trong thân đầu máy bị chặn bởi mấy cái \\x%l煙管;#00ffc040;ống lò hơi%l;#; đó thì...」"

# 【凪】
# display as 凪
# JP: 「前から入って通りぬけして、\n\x%l火室;#00ffc040;火室%l;#;ばお掃除できんとね」
2010 = "「Thì không thể đi từ phía trước xuyên qua để dọn dẹp \\x%l火室;#00ffc040;Buồng đốt%l;#; được, đúng không nè」"

# 【ハチロク】
# display as 八六
# JP: 「はい。ですが無論、本格的に\x%l火室;#00ffc040;火室%l;#;を大掃除するときは、\n\x%l火室;#00ffc040;火室%l;#;の中に入っていかねばなりません」
2090 = "「Vâng ạ. Nhưng tất nhiên, khi muốn tổng vệ sinh \\x%l火室;#00ffc040;Buồng đốt%l;#;, chúng ta bắt buộc phải chui vào bên trong \\x%l火室;#00ffc040;Buồng đốt%l;#; mới làm được」"

# 【ふかみ】
# display as 凪＆深美
# JP: 『「どうやってばい？」\n「どうやって。です？」』
2276 = "『「Làm sao mà được chứ?」\\n「Làm sao mà được chứ?」』"

# monologue
# JP: くすくす笑い。\nハチロクは少しもったいぶって、答えを教える。
2473 = "Khẽ cười khúc khích.\\nHachiroku làm ra vẻ quan trọng một chút, rồi mới nói cho biết câu trả lời."

# 【ハチロク】
# display as 八六
# JP: 「[た]炊き口――石炭を投げ込むあの小さな開き戸から、\n足から先に、仰向けになって潜り込んでいくのです」
1976 = "「Phải bò ngược từ chân vào, chui qua cái cửa nhỏ dùng để nạp than――nơi mà người ta hay gọi là cửa lò đốt ấy」"

# 【凪】
# display as 深美＆凪
# JP: 『「え～～っ！」\n「え～～っ！」』
2272 = "『「Ê～～～！」\\n「Ê～～～！」』"

# 【双鉄】
# display as 雙鐵
# JP: 「狭くて暑くて苦しいぞ。\x%l火室;#00ffc040;火室%l;#;内の耐火レンガなどは、\nそう簡単に冷めるものではないからな」
2239 = "「Chật hẹp, nóng bức và ngộp thở lắm đấy. Gạch chịu nhiệt trong \\x%l火室;#00ffc040;Buồng đốt%l;#; không phải thứ dễ dàng nguội đi đâu」"

# monologue
# JP: 無火――火を完全に落としての検査を、\n試験走行直後にやったが……いやもう、本当に大変だった。
2787 = "Việc kiểm tra khi đã 'tắt lửa'――tức là để lửa lụi hoàn toàn, mình đã làm ngay sau khi chạy thử nghiệm xong thế mà…… chà, thực sự là quá vất vả."

# 【双鉄】
# display as 雙鐵
# JP: 「石炭が綺麗に燃えればサラサラの灰になるそうなのだが、\n僕らは、駆け出しもいいところなので、そうはいかない」
1936 = "「Nghe bảo nếu than cháy sạch hoàn toàn thì sẽ tạo thành tro mịn, nhưng vì chúng ta vẫn còn là những tay mơ, nên đâu có được suôn sẻ như thế」"

# monologue
# JP: 石炭が完全に燃えきらず、\n半ば溶けた状態で固まったものを、“クリンカ”という。
2729 = "Phần than không cháy hết, bị đông cứng lại trong trạng thái bán nóng chảy, được gọi là “xỉ than” (clinker)."

# monologue
# JP: ――ハチロクから教わったことをそのまま、\n凪とふかみに伝え教える。
1437 = "――Mình đem tất cả những gì Hachiroku dạy, thuật lại y nguyên cho Nagi và Fukami nghe."

# 【双鉄】
# display as 雙鐵
# JP: 「このクリンカが、硬い。熱い。\x%lポーカー;#00ffc040;ポーカー%l;#;という鉄棒で\nガンガン叩いて壊すのだが、\x%lポーカー;#00ffc040;ポーカー%l;#;の方が溶けて歪む」
2217 = "「Cái thứ xỉ than này cứng lắm. Lại còn nóng nữa. Dùng một thanh sắt gọi là \\x%lポーカー;#00ffc040;que chọc lò%l;#; để nện thật mạnh vào phá vỡ nó, thế mà \\x%lポーカー;#00ffc040;que chọc lò%l;#; lại bị nung chảy rồi cong queo cả ra」"

# 【ふかみ】
# display as 深美
# JP: 「え！？　そんなに熱くて硬いんですか？」
1855 = "「Hả!? Nó nóng và cứng đến thế sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lポーカー;#00ffc040;ポーカー%l;#;の先が真っ赤になってぐにゃりと行く程だ。\nその時は\x%l火室;#00ffc040;火室%l;#;から出て、ハンマーで叩いて曲がりを直す」
2129 = "「Đến mức đầu của \\x%lポーカー;#00ffc040;que chọc lò%l;#; đỏ rực lên rồi biến dạng luôn đấy. Những lúc như vậy phải chui ra khỏi \\x%l火室;#00ffc040;buồng đốt%l;#;, dùng búa nện để uốn nắn lại cho thẳng」"

# 【凪】
# display as 凪
# JP: 「じいちゃんの仕事みたいばい！」
1960 = "「Giống hệt công việc của ông nội vậy á!」"

# 【双鉄】
# display as 雙鐵
# JP: 「まさしく、にわか鍛冶師の真似ごとをして、\n元通りに戻ったらまた\x%l火室;#00ffc040;火室%l;#;に入り……その繰り返しだ」
2094 = "「Chính xác là đang làm trò bắt chước mấy thợ rèn nghiệp dư, cứ làm cho thẳng xong lại chui vào \\x%l火室;#00ffc040;buồng đốt%l;#;…… cứ thế lặp đi lặp lại」"

# monologue
# JP: どうにかクリンカを叩き壊して清掃しても、\nその先は“チューブ突き”、\x%l煙管;#00ffc040;煙管%l;#;掃除をさせられて……
2573 = "Dù có phá được đống xỉ than để dọn dẹp sạch sẽ, thì ngay sau đó lại phải làm công việc “thông ống”, chính là lau chùi \\x%l煙管;#00ffc040;ống lò hơi%l;#;……"

# monologue
# JP: あんなもの、大人数でワっとやらねばとてもとても――\nっと、ああ。そうか。
2824 = "Thứ đó mà không làm ồ ạt với đông người thì chẳng thể nào mà...\\nÀ, phải rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l火室;#00ffc040;火室%l;#;の中に興味があるなら、どうだ？　次の大掃除で。\n少しでも手助けをしてもらえるなら、大歓迎だ」
1931 = "「Nếu em quan tâm đến bên trong \\x%l火室;#00ffc040;buồng đốt%l;#; thì sao nào? Trong buổi tổng vệ sinh tới.\\nNếu các em có thể giúp anh một tay thì anh rất hoan nghênh」"

# 【凪】
# display as 凪
# JP: 「やるやる！　やってみたいばい！！\n面白か修行にもなりそうばいっ！」
2179 = "「Em làm! Em muốn thử làm lắm ạ!!\\nNghe như một bài tu luyện thú vị vậy đó!」"

# 【ふかみ】
# display as 深美
# JP: 「拭き掃除のお手伝いとかくらいなら、できる。です。\nそれで、中身もちょっと覗かせてもらえたら。嬉しい」
1933 = "「Nếu chỉ là giúp lau dọn thôi thì... em có thể làm được ạ. Nếu qua đó mà em có thể được nhìn ngó bên trong một chút... thì em sẽ rất vui」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。助かる。\nでは、そのときにはよろしく頼む」
2059 = "「Ra vậy. Cảm ơn các em.\\nVậy thì, lúc đó nhờ cả vào các em nhé」"

# 【ハチロク】
# display as 八六
# JP: 「うふふ、双鉄様。\n頼もしい\x%l庫内手;#00ffc040;庫内手%l;#;を確保されましたね」
1898 = "「Ư fufu, anh Soutetsu.\\nAnh đã tuyển được những \\x%l庫内手;#00ffc040;trợ lý buồng lái%l;#; đáng tin cậy rồi nhỉ」"

# monologue
# JP: ハチロクの笑顔が柔らかだ。\nつられるように、僕の言葉もなめらかになる。
2463 = "Nụ cười của Hachiroku thật dịu dàng.\\nNhư bị lây, lời nói của tôi cũng trở nên trôi chảy hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。その上で方針も得た」
2057 = "「Đúng vậy. Hơn nữa, anh cũng đã có được hướng đi rồi」"

# 【ハチロク】
# display as 八六
# JP: 「方針、でございますか？」
1994 = "「Hướng đi, ý anh là sao ạ?」"

# monologue
# JP: どんな話をしたのなら、\n興味を持ってもらえるか――
2502 = "Nói chuyện thế nào, để họ có thể cảm thấy hứng thú――"

# monologue
# JP: 自らそれを示してみせたということに、\nハチロクは気づいて無いようだ。
2448 = "Có vẻ như Hachiroku không nhận ra rằng, chính tôi là người đã tự mình thể hiện điều đó."

# 【双鉄】
# display as 雙鐵
# JP: 「今の話の中身を、分割して記事にするのはどうだろう。\nまずは、大掃除ということで、\x%l煙管;#00ffc040;煙管%l;#;と\x%l火室;#00ffc040;火室%l;#;を紹介する」
1963 = "「Hay là chúng ta chia nhỏ nội dung vừa rồi ra để viết bài? Đầu tiên, với chủ đề tổng vệ sinh, anh sẽ giới thiệu về \\x%l煙管;#00ffc040;ống lò hơi%l;#; và \\x%l火室;#00ffc040;buồng đốt%l;#;」"

# 【ハチロク】
# display as 八六
# JP: 「ああ、それは分かり良いかもしれませんね」
1893 = "「A, cách đó có vẻ dễ hiểu hơn đấy ạ」"

# monologue
# JP: 声から、ようやく惑いが消える。
2464 = "Sự bối rối cuối cùng cũng đã tan biến khỏi giọng nói của cô ấy."

# 【ハチロク】
# display as 八六
# JP: 「『どうやって\x%l火室;#00ffc040;火室%l;#;の中に入るのでしょう？』で、\n“つづく”にして。次の回で、蒸気機関の簡単な説明を」
2022 = "「Với tiêu đề 'Làm thế nào để chui được vào trong \\x%l火室;#00ffc040;buồng đốt%l;#;?', rồi để là 'Còn tiếp'. Sang kỳ sau sẽ là giải thích đơn giản về đầu máy hơi nước」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな、そういう感じがいいと僕も考えた。\n興味を引きそうなエピソードを、説明につなげていく」
1952 = "「Phải đấy, anh cũng nghĩ cách tiếp cận đó là tốt nhất.\nKết nối những câu chuyện gợi sự tò mò vào phần giải thích.」"

# 【ハチロク】
# display as 八六
# JP: 「それを繰り返していけば、[うちの子,3]8620のことを、\nみなさまにも広く、より深く知っていただけるのですね」
1940 = "「Nếu cứ lặp đi lặp lại như vậy, mọi người sẽ biết đến và hiểu sâu hơn về [うちの子,3]8620, đúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。知れば実物に触れたくなる。\n乗って、身近に感じたくなる」
2092 = "「Đúng thế. Một khi đã biết, người ta sẽ muốn tận mắt chạm vào hiện vật.\nMuốn trải nghiệm và cảm nhận nó ở thật gần.」"

# monologue
# JP: まさに、僕がその実例だ。
2632 = "Chính tôi là một ví dụ điển hình cho điều đó."

# monologue
# JP: 責任とはいえ、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;に関わることには、\n正直まったく、気乗りがしていなかったはずなのに――
2598 = "Dẫu nói là trách nhiệm, nhưng tôi vốn dĩ chẳng hề mặn mà gì với việc liên quan đến \\x%lđầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;#; cả—"

# 【双鉄】
# display as 雙鐵
# JP: 「そして身近に感じれば、\nだんだんと好きになっていくものだ」
1826 = "「Và khi đã cảm nhận được sự gần gũi, người ta sẽ dần dần trở nên yêu mến nó thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「左様、ですね」
1993 = "「Quả thật là vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1837 = "「Ư！」"

# monologue
# JP: ハチロクの目が、熱を帯びてる。\n生々しいまでの温度を感じる。
2635 = "Đôi mắt Hachiroku ánh lên sự nồng nhiệt.\nTôi cảm nhận được một hơi ấm chân thực đến lạ lùng."

# monologue
# JP: 人間以上に人間らしい――\nその錯覚のせいなのか、胸がドキリと震えてしまう。
2570 = "Còn giống con người hơn cả con người—\nCó lẽ vì ảo giác đó, mà tim tôi chợt thắt lại."

# 【ハチロク】
# display as 八六
# JP: 「身近になればなるほどに――\n好きに……愛おしく、なるものですね」
1825 = "「Càng gần gũi bao nhiêu—\nNgười ta lại càng yêu mến... trở nên trân quý bấy nhiêu, đúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
1465 = "「——」"

# 【ハチロク】
# display as 八六
# JP: 「あら」
1848 = "「À...」"

# monologue
# JP: ハチロクの驚いた顔に、僕も驚く。\n僕は、今――
2754 = "Nhìn vẻ mặt kinh ngạc của Hachiroku, tôi cũng sững sờ.\nTôi, vừa mới—"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　撮るべきは、\nわたくしではなく[ハチロクニイマル,3]8620でございましょう」
2249 = "「Soutetsu-sama? Thứ anh cần chụp,\nkhông phải là em, mà là 8620 chứ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや。うん……だが――」
1836 = "「Không. Ừ... nhưng mà—」"

# monologue
# JP: 手が勝手にカメラを取り出し。\n勝手にシャッターを切っていた。
2626 = "Đôi tay tôi tự ý lấy máy ảnh ra.\\nTự ý bấm máy chụp hình."

# 【双鉄】
# display as 雙鐵
# JP: 「ここのところ、写真を撮りまくっていたせいかな。\n綺麗だと感じた瞬間、自然とカメラを」
1831 = "「Có lẽ vì dạo gần đây, tôi chụp hình nhiều quá.\\nCứ khoảnh khắc nào thấy đẹp là máy ảnh lại tự động giơ lên」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1813 = "「Chà」"

# monologue
# JP: 驚いた顔がゆるむと同時、\n頬がじわじわ、赤くなってく。
2467 = "Khuôn mặt ngạc nhiên vừa giãn ra, đồng thời,\\nđôi má dần ửng đỏ."

# 【ハチロク】
# display as 八六
# JP: 「そんな……わたくしの顔など、\n双鉄様には珍しいものでもございませんでしょうに」
1771 = "「Thật là... khuôn mặt của thiếp thì,\\nchắc chẳng có gì lạ lẫm với Soutetsu-sama đâu nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう――だよな。\nそれは無論、そうなのだが……」
1829 = "「Phải―― nhỉ.\\nĐương nhiên là vậy rồi, nhưng mà...」"

# 【日々姫】
# display as 日日姬
# JP: 「おーっほん、えーーっほんっ！！」
1874 = "「Hự hèm, ê hèm!!」"

# 【ハチロク】
# display as 雙鐵＆八六
# JP: 『「っ！！？」\n「あっ」』
2282 = "『「!!?」\\n「A」』"

# monologue
# JP: 僕らを見つめる日々姫の目。\nこちらはじとりと……妙に冷えきり、粘ついている。
2675 = "Ánh mắt của Hibihime nhìn chằm chằm vào chúng tôi.\\nCái nhìn đó... lạ lùng thay, lạnh lẽo và đầy vẻ soi mói."

# monologue
# JP: なぜなのか、凪はけらけら笑っている。\nふかみは両手で口を押さえて、目を輝かせ僕らを見てる。
2415 = "Không hiểu sao, Nagi cứ cười khúc khích.\\nFukami thì lấy hai tay che miệng, mắt sáng rực nhìn chúng tôi."

# 【日々姫】
# display as 日日姬
# JP: 「それで、ハチロク。記事の方、いつ受け取れると？\n記事さえもらえば、すぐに新聞刷れるけん」
2116 = "「Vậy đó, Hachiroku. Chừng nào thì nhận được bài viết đây?\\nChỉ cần có bài là tui có thể cho in báo ngay đó」"

# monologue
# JP: 何が気に入らなかったのか、日々姫の声は刺刺しい。
2420 = "Không biết điều gì đã khiến Hibihime không hài lòng, giọng cô ấy nghe đầy vẻ gai góc."

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\n双鉄様が、レールを敷いてくださいましたから」
2193 = "「Đúng vậy ạ.\\nVì Soutetsu-sama đã đặt sẵn đường ray cho thiếp rồi」"

# monologue
# JP: が、ハチロクはその険しさを気にも留めない。
2747 = "Thế nhưng, Hachiroku chẳng mảy may để tâm đến thái độ gay gắt đó."

# monologue
# JP: ふわりと柔らかに微笑んで、\n自信に満ち満ちた声で答える。
2552 = "Cô nhẹ nhàng mỉm cười,\\nđáp lại bằng chất giọng đầy tự tin."

# 【ハチロク】
# display as 八六
# JP: 「四十八時間いただけましたら――、\nわたくしの最善を尽くした記事をお渡しできるか、と」
1827 = "「Nếu ngài cho em bốn mươi tám giờ――, em tin rằng mình sẽ có thể mang đến cho ngài một bài viết tốt nhất mà em có thể thực hiện」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅ」
1843 = "「Phù」"

# monologue
# JP: キャブを下りれば、\n汗だくの肌を洗うが如く、さらなる汗が噴き出してくる。
2634 = "Vừa bước xuống khỏi ca-bin, \\nmồ hôi lại tuôn ra như tắm, chẳng khác nào đang gột rửa lớp da vốn đã ướt đẫm mồ hôi trước đó."

# monologue
# JP: 今日の訓練、\nいつも以上にキツかった。
2429 = "Buổi huấn luyện hôm nay, \\nlại còn khắc nghiệt hơn mọi khi."

# 【ハチロク】
# display as 八六
# JP: 「練度が目に見えてあがっていますね。\n以前よりずっと伸びが良いです」
2148 = "「Mức độ thuần thục của anh đang tăng lên trông thấy đấy ạ. \\nTiến bộ nhanh hơn trước rất nhiều」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
2060 = "「Thế sao?」"

# monologue
# JP: ――が、僕もたいがいに単純だ。\n褒められればもう、疲労を心地よいものと感じる。
1435 = "――Mà, mình cũng đơn giản thật đấy. \\nChỉ cần được khen một câu là mọi mệt mỏi lại trở nên dễ chịu ngay."

