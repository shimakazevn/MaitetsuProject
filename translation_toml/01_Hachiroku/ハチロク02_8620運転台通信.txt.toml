# display as 日日姬
# JP: 「へぇ――あ、ひょっとして運転台通信の効果！？\nっていうのは、ちょっと気が早すぎるか」
2219 = "「Hể―― à, không lẽ là nhờ hiệu quả của 'Đường dây liên lạc buồng lái' sao!?\\nMà nói vậy thì có hơi vội vàng quá nhỉ」"

# 【ふかみ】
# display as 深美
# JP: 「でもでも。それもあるかもって。思います。です」
1772 = "「Nhưng mà... em nghĩ... có thể cũng là nhờ vậy ạ」"

# 【ハチロク】
# display as 八六
# JP: 「それも――でございますか？」
1788 = "「Cũng là... nhờ vậy sao?」"

# 【ふかみ】
# display as 深美
# JP: 「それも。です」
1814 = "「Vâng. Là nhờ vậy ạ」"

# monologue
# JP: なぜだかとても恥ずかしそうに、幸せそうに頷いて。\nふかみはちらりと僕を見る。
2416 = "Không hiểu sao Fukami lại gật đầu, trông vừa rất xấu hổ, lại vừa vô cùng hạnh phúc.\\nCô ấy liếc nhìn tôi một cái."

# 【ふかみ】
# display as 深美
# JP: 「わたし、最近。目標ができた。です。\nダメかもって思ってて、諦めかけてたんです。けど」
2002 = "「Gần đây em... đã tìm thấy một mục tiêu ạ.\\nEm đã từng nghĩ có lẽ mình sẽ thất bại, và suýt chút nữa đã bỏ cuộc. Thế nhưng」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\nその目標を果たすため、更に頑張っているというわけか」
1812 = "「Ra là vậy.\\nVì muốn hoàn thành mục tiêu đó nên em đang càng nỗ lực hơn, đúng chứ?」"

# 【ふかみ】
# display as 深美
# JP: 「…………」
# 1472 = "「…………」" 

# monologue
# JP: ふかみが黙る。\nその頬がじわじわ赤くなる。
2718 = "Fukami im lặng.\\nĐôi má cô ấy dần dần ửng đỏ."

# 【凪】
# display as 凪
# JP: 「実際、ふかみちゃんがんばっとるばい。\n前よりずーっと背筋伸ばして、かっこ良かばい！」
2238 = "「Thực sự là em Fukami đang rất cố gắng đó.\\nSo với trước đây, em ấy đã biết ưỡn ngực thẳng lưng hơn, trông ngầu lắm đó!」"

# 【日々姫】
# display as 日日姬
# JP: 「え？　……それって……\n目標って、まさか」
1857 = "「Hả? ...Cái đó...\\nChẳng lẽ, mục tiêu đó là...」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、まだここでしたか」
1886 = "「À, thì ra mọi người vẫn còn ở đây」"

# monologue
# JP: 声に振り向けばポーレット。
2649 = "Quay đầu lại theo hướng phát ra giọng nói, đó là Paulette."

# monologue
# JP: れいなを引き連れ――\n走ってきたのか、少し汗ばみ、息が荒い。
2554 = "Dẫn theo Reina――\nCó vẻ là vừa chạy đến đây nên hơi đẫm mồ hôi và thở dốc."

# 【れいな】
# display as 玲奈
# JP: 「わぁ、凪さんとふかみさんですぅ。こんにちわぁ」
1845 = "「Oa, là Nagi-san và Fukami-san. Chào hai người ạ.」"

# 【ふかみ】
# display as 深美
# JP: 「こんにちわ。\nあ、これ、おふたりにお福分け。です」
2049 = "「Chào hai người.\nÀ, đây là quà chia sẻ cho hai người đấy.」"

# 【れいな】
# display as 玲奈
# JP: 「え？　わ！　パンと牛乳とお水ですよぉ。\nれいな、うれしいです。ありがとうございますぅ」
1859 = "「Hả? Oa! Là bánh mì, sữa và nước đây mà.\nReina vui lắm. Cảm ơn ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「差し入れですか？\nすみません、いただきますね」
2063 = "「Đồ tiếp tế ạ?\nXin lỗi, mình xin nhận nhé.」"

# monologue
# JP: 深く一礼。\nそうして直る体がぐりん、と僕へ向く。
2711 = "Cúi người chào thật sâu.\nRồi thân hình thẳng lại, xoay ngoắt về phía tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「それはそうと双鉄くん。\n姫様がお呼びです」
1951 = "「À mà này Soutetsu-kun.\nCông chúa đang gọi cậu đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「姫様？」
1798 = "「Công chúa?」"

# monologue
# JP: 誰だ、それは。
2826 = "Đó là ai chứ?"

# monologue
# JP: 思うより先、\nポーレットの手が僕を捕まえグイグイと引く。
2628 = "Chưa kịp nghĩ ngợi gì,\nTay Paulette đã chộp lấy tôi và kéo đi xềnh xệch."

# 【ポーレット】
# display as 波萊特
# JP: 「\x%lまいてつ;#00ffc040;まいてつ%l;#;界隈で姫様っていったら、一人しかいません。\nあの――あんまりお待たせしちゃったら、ちょっと……」
2191 = "「Trong giới \\x%lMaitetsu;#00ffc040;Maitetsu%l;#; thì nhắc đến Công chúa, chỉ có một người duy nhất thôi.\nCái đó――nếu để ngài ấy đợi lâu quá thì, hơi...」"

# 【双鉄】
# display as 雙鐵
# JP: 「む。そうか」
1870 = "「Hừm. Ra vậy.」"

# monologue
# JP: 事情は把握しきれんが、\nポーレットを困らせるのは本意ではない。
2838 = "Dù chưa nắm rõ tình hình,\nnhưng làm Paulette khó xử thì không phải là ý của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば会おう。\nその、姫様とやらに」
2234 = "「Vậy thì đi gặp thôi.\nCái người gọi là Công chúa đó.」"

# 【電車姫】
# display as 電車公主
# JP: 「うぷぷ。なんだなんだ、真っ黒だのう。\nそちが\x%l機関士;#00ffc040;機関士%l;#;――[みぎたそうてつ,3]右田双鉄だな」
1902 = "「U pự pự. Cái gì, cái gì, đen thui thế kia.\nNgươi là \\x%lThợ máy;#00ffc040;Thợ máy%l;#;――Migita Soutetsu đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2061 = "「Vâng.」"

# monologue
# JP: 出会い頭に笑われて、けれども不快とは感じない。
2503 = "Vừa gặp đã bị cười nhạo, nhưng tôi lại không cảm thấy khó chịu chút nào."

# monologue
# JP: 邪気が無い――\nやんごとないとはこのことなのかと、自然に感じる。
2619 = "Chẳng có chút tà ý nào cả――\\nTôi tự nhiên cảm thấy, có lẽ đây chính là sự cao quý mà người ta vẫn thường nói."

# 【電車姫】
# display as 電車公主
# JP: 「おお、挨拶が遅れたの。余は毛利[あき,1]安芸。\n世の者からは、毛利の姫とも電車姫とも呼ばれておる」
1908 = "「Ồ, chậm trễ mất rồi. Ta là Mouri Aki.\\nNgười đời vẫn thường gọi ta là Công chúa Mouri, hay Công chúa Tàu điện.」"

# monologue
# JP: 手にした扇子で、口元を隠しながらの言葉に頷く。\n見るからにもう、まさしく“姫”だ。
2520 = "Tôi gật đầu trước lời nói của người đang dùng chiếc quạt trên tay che đi khuôn miệng.\\nNhìn thôi là đủ biết, đích thị là một “công chúa” rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「はい。お噂は、かねがね」
1889 = "「Vâng. Tôi cũng đã nghe danh từ lâu.」"

# monologue
# JP: 予想の百倍幼い顔が、ディスプレイの中から僕を見ている。
2566 = "Gương mặt trẻ con hơn cả trăm lần so với tưởng tượng đang nhìn tôi từ trong màn hình."

# monologue
# JP: ネット会議というのは初めての経験だが――\nいやはや、世の中の進歩は凄い。
2821 = "Họp trực tuyến là một trải nghiệm lần đầu, thế nhưng――\\nChà chà, tiến bộ của thế giới quả thực đáng kinh ngạc."

# 【電車姫】
# display as 電車公主
# JP: 「ずいぶんと驚いた顔に見えるの。\n噂と余とでは、違ったか？」
1793 = "「Trông ngươi có vẻ kinh ngạc lắm nhỉ.\\nGiữa lời đồn và ta có gì khác biệt sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうですね。\n噂で聞いた限りでは、相当にお年を召された方かと」
2073 = "「Phải ạ.\\nTheo những gì tôi nghe được, cứ ngỡ ngài là một bậc cao niên cơ.」"

# 【ハチロク】
# display as 日日姬＆八六
# JP: 『「にぃにっ！」\n「双鉄様」』
2279 = "『「Nii-ni!」\\n「Soutetsu-sama」』"

# monologue
# JP: 分割された画面の中から、僕と同様真っ黒な顔の日々姫と、\n整備ボディに換装し、真っ白なハチロクの叱咤を浴びる。
2535 = "Từ những ô màn hình chia nhỏ, tôi nhận lấy lời quở trách từ Hibiki với gương mặt đen nhẻm như tôi, và Hachiroku trong bộ dạng bảo trì trắng muốt."

# monologue
# JP: ああ、いや、そうか。\n女性に対して年の話は――
2531 = "À, không, phải rồi.\\nNói chuyện tuổi tác với phụ nữ là――"

# 【電車姫】
# display as 電車公主
# JP: 「構わぬ。妙に気を使われるよりよほど良い」
2112 = "「Không sao cả. Thà như vậy còn hơn là bị câu nệ một cách lạ lùng.」"

# monologue
# JP: ぱっと扇子をひらめかせ、\n小さなことだと形で示す。
2558 = "Nàng phẩy chiếc quạt một cái đầy dứt khoát,\\ncho thấy đó là chuyện nhỏ nhặt."

# 【電車姫】
# display as 電車公主
# JP: 「こういう[やまい]病だ。ゆえに、そちたちにも会いに行けぬ。\n呼び立てた無礼、許せよ」
2088 = "「Căn bệnh này là như vậy. Thế nên, ta cũng không thể đi gặp các ngươi.\\nThứ lỗi cho sự vô lễ khi gọi các ngươi đến đây」"

# 【双鉄】
# display as 雙鐵
# JP: 「無礼などとは感じません。\nむしろ、お会いできて光栄です」
1998 = "「Chúng tôi không hề cảm thấy đó là sự vô lễ.\\nNgược lại, được gặp ngài là vinh dự của chúng tôi」"

# monologue
# JP: お世辞ではなく、本心で。
2819 = "Không phải là lời khách sáo, mà là lời từ tận đáy lòng."

# monologue
# JP: わざわざ“僕ら”――\x%l8620;#00ffc040;8620%l;#;チームと会いたいと、\nこの方が希望をくださったのなら……
2776 = "Nếu ngài đã cất công mong muốn được gặp “chúng tôi”——\\x%l8620;#00ffc040;8620%l;#; đội ngũ, thì……"

# 【双鉄】
# display as 雙鐵
# JP: 「『[ハチロク,3]8620運転台通信』お読みくださったのですか？」
1987 = "「Ngài đã đọc 'Thông tin Buồng lái 8620' sao ạ?」"

# 【電車姫】
# display as 電車公主
# JP: 「おお、そうだ」
1895 = "「Ồ, đúng vậy」"

# monologue
# JP: 姫様が手のひらを上に向けると、\n画面の外からス、と白い手が入り込んでくる。
2744 = "Khi Công chúa ngửa lòng bàn tay lên,\\nmột bàn tay trắng muốt từ ngoài màn hình nhẹ nhàng đưa vào."

# monologue
# JP: すぐさまその手が引っ込むと、\n姫様の手のひらには、見慣れた新聞が乗っている。
2828 = "Ngay khi bàn tay đó rút lại,\\ntrên lòng bàn tay Công chúa đã đặt tờ báo quen thuộc."

# 【電車姫】
# display as 電車公主
# JP: 「面白いの。写真も良い。\x%l電車;#00ffc040;電車%l;#;以外には、\nあまり興味を持たぬ[たち,1]性質だが、[ハチロクニイマル,3]8620は気に入った」
2142 = "「Rất thú vị. Hình ảnh cũng đẹp nữa.\\x%l電車;#00ffc040;Tàu điện%l;#; ngoài ra thì,\\nta vốn không có hứng thú mấy, nhưng ta lại rất ưng ý chiếc 8620」"

# monologue
# JP: 新聞を置き、姫様は扇子をまた口元に。\n顔が、画面にグイとよる。
2476 = "Đặt tờ báo xuống, Công chúa lại dùng chiếc quạt che miệng.\\nKhuôn mặt ghé sát vào màn hình."

# 【電車姫】
# display as 電車公主
# JP: 「が、そちたち抜きでは\x%l8620;#00ffc040;8620%l;#;の魅力も半減じゃろうな。\nそこでどうじゃ。そちたち揃って、[ひろしま,1]廣島に来ぬか？」
2117 = "「Nhưng mà, nếu thiếu các ngươi thì\\x%l8620;#00ffc040;8620%l;#; cũng giảm đi một nửa sức hút nhỉ.\\nVậy thì thế nào? Các ngươi cùng nhau đến Hiroshima không?」"

# 【日々姫】
# display as 日日姬
# JP: 「ええっ！？」
1853 = "「Ể!!?」"

# monologue
# JP: 日々姫が驚いた声を出し、\n慌てて両手で口を押さえて、すがる瞳で僕を見る。
2676 = "Hibi-hime thốt lên tiếng kinh ngạc,\\nvội vã lấy hai tay che miệng, nhìn tôi với ánh mắt cầu cứu."

# 【双鉄】
# display as 雙鐵
# JP: 「[ひろしま,1]廣島に伺う、とはどのような意味でしょう？」
2195 = "「Ý của ngài, đến Hiroshima là có ý gì vậy ạ?」"

# 【電車姫】
# display as 電車公主
# JP: 「さて、の」
2246 = "「À thì, để xem nào」"

# monologue
# JP: 扇子に口元を隠したままで、\nそれでも笑みだと感じるほどに、姫様の目の形が変わる。
2549 = "Vẫn che miệng bằng chiếc quạt, nhưng tôi vẫn cảm nhận được nụ cười đó qua ánh mắt của Công chúa đang dần thay đổi."

# 【電車姫】
# display as 電車公主
# JP: 「余に仕えよ――という意味であったら、何と答える？」
2183 = "\"Nếu ta nói rằng -- đó là ý muốn bắt ngươi phải phục tùng ta, ngươi sẽ trả lời thế nào?\""

# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
2216 = "\"Chuyện đó...\""

# monologue
# JP: 一瞬、言葉に詰まってしまう。
2409 = "Trong khoảnh khắc, tôi nghẹn lời."

# monologue
# JP: 無論、断る他ないのだが、機嫌を損ねたくもなく――\nその言いように悩んでしまう。
2643 = "Đương nhiên là chẳng còn lựa chọn nào khác ngoài việc từ chối, nhưng tôi cũng không muốn làm ngài phật ý -- nên tôi đành băn khoăn về cách diễn đạt."

# 【ハチロク】
# display as 八六
# JP: 「[おそ]畏れながら申し上げます」
2226 = "\"Xin mạn phép cho tôi được lên tiếng.\""

# monologue
# JP: 沈黙を守りつづけていたハチロクが、\n静かな声を差し込んでくる。
2407 = "Hachiroku, người vốn giữ im lặng từ nãy đến giờ, cất giọng nhẹ nhàng xen vào."

# 【電車姫】
# display as 電車公主
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・ハチロクか。\nそちのコラムも、面白く読んだぞ」
1786 = "\"\\x%lRailord;#00ffc040;Railord%l;#; - Hachiroku sao. Ta cũng đã đọc chuyên mục của ngươi, rất thú vị.\""

# 【ハチロク】
# display as 八六
# JP: 「恐縮です」
2190 = "\"Tôi vô cùng cảm kích.\""

# 【電車姫】
# display as 電車公主
# JP: 「そう[かしこ]畏まるな。良い。なんなりと申してみよ」
1734 = "\"Đừng quá khách sáo. Được rồi, ngươi cứ nói bất cứ điều gì ngươi muốn.\""

# 【ハチロク】
# display as 八六
# JP: 「畏れながら――[ひろしま,1]廣島のような大都市においては、\n[ハチロクニイマル,3]8620は[うと]疎まれる存在となってしまうかと存じます」
2194 = "\"Xin mạn phép -- tại một thành phố lớn như Hiroshima, tôi nghĩ rằng 8620 sẽ trở thành một sự hiện diện không được chào đón.\""

# 【電車姫】
# display as 電車公主
# JP: 「なにゆえだ？」
1774 = "\"Tại sao lại như vậy?\""

# 【ハチロク】
# display as 八六
# JP: 「[ばいえん,1]煤煙――煙突から出る猛然たる煙によって、です。\n廣島電気鉄道は、\x%l市電;#00ffc040;[しでん,1]市電%l;#;とお伺いいたしましたので」
1917 = "\"Là vì khói bụi -- lượng khói dữ dội thoát ra từ ống khói ạ. Vì tôi được biết Hiroshima Electric Railway là \\x%lNguồn điện chính;#00ffc040;Nguồn điện chính%l;#;.\""

# monologue
# JP: なるほど、だ。
2508 = "Ra là vậy."

# monologue
# JP: \x%l市電;#00ffc040;市電%l;#;なら、線路は町の間を縫って走っているはず。\n\x%l8620;#00ffc040;8620%l;#;の吐き出す煙は、町を真っ黒にしてしまおう。
71 = "Nếu là \\x%lNguồn điện chính;#00ffc040;Nguồn điện chính%l;#;, thì đường ray hẳn phải chạy len lỏi giữa các khu phố. Lượng khói mà \\x%l8620;#00ffc040;8620%l;#; phun ra sẽ nhuộm đen cả thị trấn mất."

# 【電車姫】
# display as 電車公主
# JP: 「ほう、それほどに煙が――\nああ、いや――うぷぷぷぷぷ」
1910 = "「Ồ, khói nhiều đến mức đó sao――\nÀ, không―― phì phì phì phì phì」"

# monologue
# JP: 扇子で口を覆って、笑いを抑える素振り。\n笑い声だけ聞くのなら、姫様はまるでいたずらっ子だ。
2562 = "Nàng lấy quạt che miệng, điệu bộ như đang cố nén cười.\nNếu chỉ nghe tiếng cười, thì công chúa chẳng khác nào một đứa trẻ tinh nghịch."

# 【電車姫】
# display as 電車公主
# JP: 「[ぐ]愚を申した。一目瞭然とはこのことであるか」
1785 = "「Ta đã nói lời ngớ ngẩn rồi. Một mắt nhìn là rõ mồn một, chẳng phải sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「恐れいります」
1808 = "「Xin cảm ơn tiểu thư.」"

# 【電車姫】
# display as 電車公主
# JP: 「なれば、一度きりのイベント\x%l列車;#00ffc040;列車%l;#;として遊びに参れ――\nという意味であるとしておこうぞ」
2034 = "「Nếu vậy, hãy cứ coi như đó là một lời mời―― hãy đến chơi với tư cách là một \\x%lchuyến tàu;#00ffc040;chuyến tàu%l;#; chỉ có một lần duy nhất―― đi nhé.」"

# 【ハチロク】
# display as 八六
# JP: 「それは――」
# 2216 = "「這——」" 

# monologue
# JP: ハチロクが言葉に詰まってしまう。\nおそらくは僕と同じ理由で。
2820 = "Hachiroku nghẹn lời.\nCó lẽ cũng cùng lý do với tôi."

# monologue
# JP: レールが繋がっていない現状、\nその移送には――あまりにコストが掛かってしまう。
2737 = "Trong tình cảnh đường ray chưa được kết nối,\nviệc di chuyển nó―― sẽ tốn quá nhiều chi phí."

# 【双鉄】
# display as 雙鐵
# JP: 「[じせい,1]時勢が許せば――\n無論、そうさせていただきたく存じます」
2181 = "「Nếu thời thế cho phép――\nChắc chắn rồi, tôi rất muốn làm như vậy.」"

# 【電車姫】
# display as 電車公主
# JP: 「時勢か。なるほど。[さっこん,1]昨今は、時勢も優れぬの」
2068 = "「Thời thế sao. Ra là vậy. Dạo gần đây, thời thế cũng chẳng mấy thuận lợi nhỉ.」"

# monologue
# JP: 姫様の扇子がたたまれ、真正面へと差し出される。\nあらわになったその口元は、笑みの形をとっている。
2479 = "Chiếc quạt của công chúa được khép lại, rồi hướng thẳng về phía trước.\nĐể lộ khuôn miệng đang giữ hình dáng của một nụ cười."

# 【電車姫】
# display as 電車公主
# JP: 「なれど、時勢などいずれは変わる。\n鉄道は、必ずや復権を果たそうぞ」
1822 = "「Tuy nhiên, thời thế rồi sẽ thay đổi.\nĐường sắt, nhất định sẽ phục hưng trở lại.」"

# 【ハチロク】
# display as 八六
# JP: 「なっ――」
1760 = "「Hả――」"

# monologue
# JP: ハチロクの目が丸くなる。
2475 = "Mắt Hachiroku mở tròn xoe."

# monologue
# JP: 毛利の姫は、顔色ひとつ変えぬまま、\nツ――と、扇子の先を天井に向ける。
2701 = "Công chúa Mouri, khuôn mặt không chút biến sắc,\nchầm chậm―― đưa đầu chiếc quạt hướng thẳng lên trần nhà."

# 【電車姫】
# display as 電車公主
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;は、いずれ空へ向く。飛ぶか、浮くか。\nそうしたタイプが、必ずや安価となり、広く普及する」
1461 = "「\\x%lAirCraft;#00ffc040;AirCraft%l;#; cuối cùng rồi cũng sẽ hướng lên bầu trời. Bay hoặc nổi.\nNhững kiểu loại như thế, chắc chắn sẽ trở nên rẻ hơn và phổ biến rộng rãi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1862 = "「Ah——」"

# monologue
# JP: 目からウロコが剥がされる。
2567 = "Như trút được gánh nặng khỏi đôi mắt."

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;もいずれ廃れるかもと……\nなんの根拠も無しにそんなことを考えてはいた。が――
2638 = "\\x%lAirCraft;#00ffc040;AirCraft%l;#; có lẽ rồi cũng sẽ lỗi thời...\\nTôi đã từng nghĩ vậy mà chẳng có căn cứ gì cả. Thế nhưng——"

# 【電車姫】
# display as 電車公主
# JP: 「さなれば、地上は道路から解放される。\nそしての？　[みぎた,1]右田。人は群れ、繋がりたがる生き物だ」
2015 = "「Nếu vậy thì, mặt đất sẽ được giải phóng khỏi những con đường.\\nVà rồi sao nữa? Migita. Con người vốn là sinh vật thích tụ tập và kết nối với nhau mà.」"

# 【日々姫】
# display as 日日姬
# JP: 「そっか……」
2058 = "「Ra vậy...」"

# monologue
# JP: 僕と同じ衝撃を、あるいは受けているのかもしれない。\n日々姫の零した呟きは、かすかにだけれど震えている。
2525 = "Có lẽ cô ấy cũng đang đón nhận cú sốc tương tự, hoặc hơn cả tôi.\\nLời thì thầm của Hibihime khẽ run rẩy."

# 【日々姫】
# display as 日日姬
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;は……たくさんでは乗れないし――\nちょっと、個人的すぎるのかも」
1460 = "「\\x%lAirCraft;#00ffc040;AirCraft%l;#; thì... không thể chở được nhiều người—\\nCó chút gì đó, quá cá nhân chăng.」"

# 【電車姫】
# display as 電車公主
# JP: 「であるの。個人主義が過ぎれば、必ずや人は群れたがる。\nきっかけを上手く与えれば――鉄道は、その受皿となる」
2082 = "「Chính là như vậy. Nếu chủ nghĩa cá nhân quá đà, con người chắc chắn sẽ muốn tụ tập lại.\\nNếu ta tạo ra cơ hội một cách khéo léo—đường sắt chính là nơi tiếp nhận điều đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「地上が再び……\x%lエアクラ;#00ffc040;エアクラ%l;#;から解放されるなら」
2186 = "「Nếu mặt đất một lần nữa...\\nđược giải phóng khỏi \\x%lAirCraft;#00ffc040;AirCraft%l;#;」"

# monologue
# JP: そのとき、人が鉄道を求めてくれれば。
2779 = "Vào khoảnh khắc đó, nếu con người biết tìm đến đường sắt."

# monologue
# JP: うちの町にも走って欲しいと――\nそう思ってくれているのなら。
2773 = "Rằng họ mong muốn nó chạy qua cả thị trấn của chúng ta——\\nNếu họ thực sự nghĩ như thế."

# 【双鉄】
# display as 雙鐵
# JP: 「群れ――繋がるための――\nそのための場所としての、鉄道を」
2108 = "「Tụ tập—để kết nối—\\nĐường sắt, chính là nơi dành cho điều đó.」"

# monologue
# JP: 言葉が、固着していた記憶を揺する。\n……幼い頃に、路子と一緒に\x%l列車;#00ffc040;列車%l;#;に乗った、あのワクワク。
2645 = "Lời nói ấy làm lay động những ký ức đã đóng băng trong tôi.\\n...Cái cảm giác phấn khích khi cùng Ruriko đi trên \\x%lTàu;#00ffc040;Tàu%l;#; hồi còn bé."

# monologue
# JP: 見知らぬ人たち、二度とは会わぬ通りすがりの人達は……\n言葉をかわさず、とくに見ずとも、それで確かに――
2704 = "Những người xa lạ, những người qua đường mà ta chẳng bao giờ gặp lại...\\nDù không trò chuyện, dù chẳng nhìn lấy nhau, nhưng họ vẫn thực sự——"

# 【ハチロク】
# display as 八六
# JP: 「遠くの駅の、聞いたことがない方言、ざわめき。\nもう日が落ちて冷えたホームの、それでも確かな暖かさ」
1924 = "「Những phương ngữ xa lạ chưa từng nghe ở các ga tàu, tiếng ồn ào náo nhiệt.\\nCái hơi ấm dù mong manh nhưng chắc chắn trên sân ga lạnh lẽo khi đêm xuống.」"

# monologue
# JP: ハチロクも思い出してる。\nおんなじような感覚を、きっと、ハチロクも感じてたのだ。
2455 = "Hachiroku cũng đang hồi tưởng.\nChắc chắn, Hachiroku cũng đã cảm nhận được một cảm giác tương tự như vậy."

# 【ハチロク】
# display as 八六
# JP: 「[キャブ,2]運転台に隔離されるわたくしにさえ――\nああした空気に触れるのは、確かに一つの楽しみでした」
1966 = "「Ngay cả với người bị cách ly trong buồng lái như thiếp――\nđược tiếp xúc với bầu không khí đó, quả thực là một niềm vui.」"

# monologue
# JP: そうだ、空気だ。\n空気に触れる。他人と空気を共有する。
2705 = "Đúng rồi, là không khí.\nĐược chạm vào không khí. Được chia sẻ bầu không khí với người khác."

# monologue
# JP: 出会いというほど大げさではなく、\nけれど決して――ひとりではない、あの感覚。
2836 = "Chẳng phải điều gì quá to tát như một cuộc gặp gỡ định mệnh,\nnhưng tuyệt đối――không phải là cô độc, cảm giác đó."

# 【双鉄】
# display as 雙鐵
# JP: 「人の……誰かがいるあたたかみ……\nあれを――そうか。人は、求めるものなのか」
1756 = "「Sự ấm áp khi có người... có ai đó ở bên...\nThì ra là vậy. Con người... luôn khao khát điều đó sao.」"

# monologue
# JP: 言って、なぜだかホっとする。
2806 = "Nói xong, không hiểu sao tôi cảm thấy nhẹ nhõm hẳn."

# monologue
# JP: ハチロクも――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も人と同じく、\nそれを、求めてくれるとわかって。
2450 = "Hachiroku cũng――\n\\x%lレイルロオド;#00ffc040;Railord%l;#; cũng giống như con người,\nbiết được rằng cô ấy cũng khao khát điều đó."

# 【電車姫】
# display as 電車公主
# JP: 「この毛利安芸はそう考える。\nゆえに“いずれ”だ。いずれ、時勢が許すようになれば」
1778 = "「Mouri Aki này nghĩ như vậy.\nCho nên mới là 'một ngày nào đó'. Một ngày nào đó, khi thời thế cho phép.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい、必ずや」
1892 = "「Vâng, nhất định là vậy ạ.」"

# monologue
# JP: 姫様であれど、姫様ではない。
2837 = "Dù là công chúa, nhưng cũng chẳng phải là công chúa."

# monologue
# JP: この小さな人は、親の威光でちやほやされる、\n単に、それだけの人物では無い。
2822 = "Cô bé nhỏ nhắn này không chỉ đơn thuần là người được nuông chiều\ndựa vào uy thế của cha mẹ."

# 【双鉄】
# display as 雙鐵
# JP: 「いずれ、時勢を整えて。線路を繋げ――\n\x%l8620;#00ffc040;8620%l;#;を、[あき,1]安芸様にお披露目させて頂きます」
2171 = "「Một ngày nào đó, khi thời thế đã định. Hãy nối những đường ray――\n\\x%l8620;#00ffc040;8620%l;#; sẽ được ra mắt trước mặt ngài Aki.」"

# monologue
# JP: くっくと、今度の笑いは大人びている。
2823 = "Khúc khích, tiếng cười lần này mang vẻ trưởng thành hơn."

# monologue
# JP: さも愉快そうに扇子が開かれ、\nパチン、と音を立て閉じられる。
2560 = "Chiếc quạt được mở ra một cách đầy khoái chí,\nđoạn khép lại nghe cái 'tách'."

# 【電車姫】
# display as 電車公主
# JP: 「とは申せ、\nそち一人の力によって果たせることでも無い」
2189 = "「Dẫu cho có nói vậy,\nđó cũng không phải là việc mà một mình ngươi có thể hoàn thành.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 2061 = "「是的」" 

# monologue
# JP: 否定しようとも思わない。\nそれは、厳然すぎる事実だ。
2642 = "Ta cũng chẳng định phủ nhận điều đó.\nĐó là một sự thật quá đỗi hiển nhiên."

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を安全に走らせることでさえ、\n僕一人では、決して果たせぬことなのだから。
2577 = "\\x%l8620;#00ffc040;8620%l;#; ngay cả việc vận hành an toàn,\nchỉ một mình ta cũng chẳng thể nào làm nổi."

# 【電車姫】
# display as 電車公主
# JP: 「[ひない,1]雛衣という心強い味方もいようが、\n余も、ささやかながらそち達に支援をいたそうぞ」
2248 = "「Có Hinai là một đồng minh đáng tin cậy rồi, nhưng\nta cũng muốn hỗ trợ các ngươi một chút đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ご支援、ですか。\nありがたいお話ですが――」
1986 = "「Sự hỗ trợ của ngài sao ạ?\nLời đề nghị thật đáng quý, nhưng mà――」"

# 【電車姫】
# display as 電車公主
# JP: 「そちらが何を、焦がれる程に求めているか、\n余にも、わかっておるつもりだぞ？」
2136 = "「Ngươi đang khao khát điều gì,\nta cũng phần nào hiểu được mà, phải không?」"

# 【ハチロク】
# display as 八六
# JP: 「っ！！」
2261 = "「！！」"

# monologue
# JP: ハチロクの腰が椅子からほとんど浮きかける。
2457 = "Hachiroku gần như bật khỏi ghế."

# monologue
# JP: あの通信を読んでくれているのなら、\nポーレットと交流してくれてるなら――
2579 = "Nếu như người đó đã đọc những tin nhắn ấy,\nnếu như đã giao lưu với Paulette――"

# 【電車姫】
# display as 電車公主
# JP: 「ふふふ、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・ハチロクは聡いの。\nさても、お主の予想通りのものではあるが――」
1838 = "「Phù phù phù, \\x%lRailord;#00ffc040;Railord%l;#; Hachiroku thật thông minh.\nĐúng như những gì ngươi dự đoán――」"

# monologue
# JP: ちょいちょいと、\n安芸様の扇子が手招きするように動かされる。
2593 = "Cây quạt của Aki-sama khẽ động đậy, tựa như đang vẫy gọi."

# monologue
# JP: 僕らにではなく、画面外にいる誰かに向けて。
2746 = "Không phải hướng về phía chúng ta, mà là một ai đó ở bên ngoài màn hình."

# 【電車姫】
# display as 電車公主
# JP: 「……か？　うむ――なれば――……む」
1479 = "「…… hả? Ừm―― nếu vậy thì――…… ưm」"

# monologue
# JP: 声を、マイクが拾ってくれない。
2550 = "Giọng nói, micro không thu được gì cả."

# monologue
# JP: 安芸様のものはとぎれとぎれで、\n話し相手のものにいたっては、一言たりとも。
2630 = "Lời của Aki-sama thì chập chờn đứt quãng,\ncòn của đối phương thì chẳng nghe được lấy một lời."

# 【電車姫】
# display as 電車公主
# JP: 「二週間ほど待つが良い。さすれば、そちたちの枕元に、\n\x%l8620;#00ffc040;8620%l;#;に似合いの\x%l客車;#00ffc040;客車%l;#;が、届こうぞ」
2134 = "「Hãy đợi khoảng hai tuần đi. Khi đó, bên cạnh gối các ngươi,\nsẽ có một toa tàu khách xứng tầm với \\x%l8620;#00ffc040;8620%l;#; được gửi đến đấy.」"

# monologue
# JP: やはり、\x%l客車;#00ffc040;客車%l;#;か。
2679 = "Quả nhiên, là \\x%ltoa tàu khách;#00ffc040;toa tàu khách%l;#; sao."

# monologue
# JP: あまりにあっけないような気がして、現実感がまだ――\nああいや、そうだ。これだけはまず確かめなければ。
2533 = "Cảm giác mọi thứ trôi qua quá nhanh, tôi vẫn chưa kịp cảm thấy chân thực--\nÀ không, đúng rồi. Điều này thì trước hết phải xác nhận đã."

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。\nで――その――代金と移送費とはどれほどに」
2251 = "「Cảm ơn ngài.\nVậy--về phần--chi phí và phí vận chuyển thì là bao nhiêu ạ」"

# 【電車姫】
# display as 電車公主
# JP: 「おお、それを申し忘れておったな」
