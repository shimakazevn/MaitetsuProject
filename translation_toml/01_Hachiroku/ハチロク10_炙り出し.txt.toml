2555 = "我雖然知道她作為經營者肯定會有所顧慮，不過既然都已經決定了，就算她是裝的我也希望她能欣然接受。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、\n出来るのならば、そう気に病んでくれるな」
1976 = "「波萊特，我希望你不要有所負擔」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？」
1750 = "「哎！？」" 

# monologue
# JP: 心底、びっくりしたような顔。
2405 = "她似乎真的被我的話嚇了一跳。" 

# monologue
# JP: ハチロクと僕とも顔を見合わせ、\nいささかあっけにとられてしまう。
2491 = "我和八六相視一眼，稍微有些不知所措。" 

# 【ポーレット】
# display as 波萊特
# JP: 「気に病むって……何をです？」
2029 = "「負擔……指的是什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや……移送コストのこと……ではないのか？」
1747 = "「呃……不是關於……運輸費用的嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「ポーレット様の眉、このようになっておりましたよ？」
1975 = "「波萊特小姐的眉毛都變成這樣了哦？」" 

# monologue
# JP: ハチロクが指で眉根を下げる。\nへちょーん、と。絵に描いたような困り顔だ。
2327 = "八六用手指將眉梢往下拉。簡直是典型的“困惑的表情”。" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ！　ごめんなさい。そういう顔、\nしちゃってたなら原因、コストとかのことじゃないです」
1753 = "「哎？啊！不好意思。我皺眉不是因為開銷方面的問題」" 

# 【ハチロク】
# display as 八六
# JP: 「違うのですか？　では、何が――」
1644 = "「不是嗎？那是為什麼——」" 

# 【ポーレット】
# display as 波萊特
