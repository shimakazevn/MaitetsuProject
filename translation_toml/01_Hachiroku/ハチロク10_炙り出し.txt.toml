# 【ハチロク】
# display as 八六
# JP: 「ポーレット様……」
1974 = "「波萊特小姐……」" 

# monologue
# JP: いかん、ハチロクの顔色までもが曇りそうだ。
2255 = "不好，連八六也跟著失落了起來。" 

# monologue
