1761 = "「啊……那個——是關於\\x%l甲種輸送;#00ffc040;甲種運送%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l甲種輸送;#00ffc040;甲種輸送%l;#;？」
1385 = "「\\x%l甲種輸送;#00ffc040;甲種運送%l;#;？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、多分、\x%l甲種輸送;#00ffc040;甲種輸送%l;#;って言葉に刷り込みがあって\n――パパ、その……結構な撮りテツでしたから」
1896 = "「我大概潛移默化地了解過\\x%l甲種輸送;#00ffc040;甲種運送%l;#;這個詞——因為爸爸他……是個十足的鐵影家」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ、そのようなご事情が」
1779 = "「啊，還有這番緣由」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　今のでわかるのか？」
1860 = "「怎麼？你聽懂了剛才的話？」" 

# monologue
# JP: 僕にはわからん。\nどこが納得のポイントなのか。
2479 = "我不懂她為什麼能聽明白。" 

# 【ハチロク】
# display as 八六
# JP: 「キュウロクたちがしばしば聞かせてくれたのです。\n\x%l甲種輸送;#00ffc040;甲種輸送%l;#;のときには、撮りテツさんたちが凄いと」
1905 = "「我經常聽九六她們跟我說起這事。進行\\x%l甲種輸送;#00ffc040;甲種運送%l;#;的時候，經常圍著很多鐵影家」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l9600;#00ffc040;[キュウロク,4]9600形%l;#;――お前の後につくられた、\n確か、量産貨物機だったか？」
1376 = "「\\x%l9600;#00ffc040;[九六,4]９６００型%l;#;好像是繼你之後的——量產貨運機車？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。大傑作の貨物機です。日ノ本のあらゆる場所で、\nあらゆる貨物を。恐らくは今も、輸送している子達です」
1793 = "「嗯，它是非常優秀的貨運機車。她們過去一直將各種貨物運送到日本各地，恐怕現在仍是如此」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\nならば\x%l甲種輸送;#00ffc040;甲種輸送%l;#;に従事する機会も多かったのか」
1710 = "「原來如此。看來她們執行\\x%l甲種輸送;#00ffc040;甲種運送%l;#;任務的機會也很多吧」" 

# 【ハチロク】
# display as 八六
# JP: 「左様でございますね」
1956 = "「正如您所說」" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l甲種輸送;#00ffc040;甲種輸送%l;#;を撮るのって、撮りテツには一大イベントなん――ううんっ、らしいんですよ」
1830 = "「對於鐵影家來說，\\x%l甲種輸送;#00ffc040;甲種運送%l;#;——是一件備受矚目的活動——呃，應該是這樣的」" 

# monologue
# JP: “なんです”と出かけた言葉を飲み込んで、\nポーレットは僕らに教えてくれる。
2643 = "波萊特一邊跟我們說，一邊不忘修正自己的說法。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしは乗るのが好きなだけですけど、パパの影響は\nやっぱりあって。\x%l甲種輸送;#00ffc040;甲種輸送%l;#;って聞いただけで、つい」
2092 = "「雖然我只是喜歡乘坐列車，但是受爸爸的影響，聽到\\x%l甲種輸送;#00ffc040;甲種運送%l;#;就不自覺地……」" 

# 【双鉄】
# display as 雙鐵
