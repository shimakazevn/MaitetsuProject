# display as 八六
# JP: 「それと、コスト的に許せば、\x%l動輪;#00ffc040;動輪%l;#;まわり一式と……\n\x%l先台車;#00ffc040;[せんだいしゃ,2]先台車%l;#;も運んでいただけると、助かるのですが」
2070 = "「還有，若是經濟方面允許……最好是請對方將\\x%l動輪;#00ffc040;動輪%l;#;組還有\\x%l先台車;#00ffc040;導輪架%l;#;一同送來」" 

# 【ポーレット】
# display as 波萊特
# JP: 「了解です――うん。了解です。\x%l台枠;#00ffc040;台枠%l;#;改修に失敗したら、\nコストをどれほど抑えてたところで、無意味ですからね」
2000 = "「知道了——嗯，我知道了。如果最後沒辦法成功修好\\x%l台枠;#00ffc040;車架%l;#;，在這之前如何節約費用都沒有任何意義了啊」" 

# monologue
# JP: どこか、自身に言い聞かせているようなその口調。
2645 = "波萊特的語氣彷彿就是要將這話說給她自己聽一樣。" 

# monologue
# JP: 相当に費用がふくらむのだろうと想像するが、\n妥協できるような問題でも無い。
2809 = "雖然這可能大幅增加開銷費用，但這個問題是不容妥協的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、これで決まりとしよう。\n下回り一式を、乙種輸送で移送してもらう」
2078 = "「那就這麼定了。麻煩對方連同配件組一起採用乙種運送送來」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。先方にもそのように伝えます。\n下回り一式を、乙種……乙種で、ですね」
