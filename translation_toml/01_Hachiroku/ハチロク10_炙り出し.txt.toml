[script]
# lines: 395 
# 【ポーレット】
# display as 波萊特
# JP: 「おはようございます！\n日ノ本車輌さんから返信、来てます」
1930 = "「Chào buổi sáng!\nCó thư phản hồi từ công ty Toa xe Hinamoto\nrồi ạ.」"

# monologue
# JP: レールショップに入るやいなや、\nポーレットが笑顔で迎えてくれる。
2251 = "Ngay khi vừa bước vào Rail Shop,\nPaulette đã tươi cười chào đón chúng tôi."

# monologue
# JP: ハチロクの肩がぴくん、と動く。
2330 = "Vai Hachiroku khẽ giật mình một cái."

# 【ハチロク】
# display as 八六
# JP: 「先方は、どのように？」
1675 = "「Bên đó phản hồi như thế nào ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「提示の内容で全てＯＫとのことです。\nそれでまず、先方が\x%l台枠;#00ffc040;台枠%l;#;を送ってくれるそうです」
1673 = "「Họ nói rằng mọi nội dung đề xuất đều OK.\nVà trước tiên, bên đó sẽ gửi \\x%l台枠;#00ffc040;khung gầm%l;#; đến\ncho chúng ta.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　向こうが先送りしてくれるのか？」
1797 = "「Hửm? Bên đó sẽ gửi đến trước sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「もし大丈夫ならって、こっちから希望を出しました。\n万一……縁起でも無い話になっちゃいますけど――」
1888 = "「Bên mình đã đưa ra nguyện vọng là nếu\nđược thì mong họ làm vậy.\nVạn nhất……dù nói ra thì hơi xui xẻo——」"

# monologue
# JP: ポーレットの声が、申し訳無さそうに沈み込む。
2644 = "Giọng Paulette trầm xuống, có vẻ đầy áy\nnáy."

# 【ポーレット】
# display as 波萊特
# JP: 「[ハチロクニイマル,3]8620に[ゴーハチロクニイサン,4]58623の\x%l台枠;#00ffc040;台枠%l;#;が移植出来ない場合にも――\nそれなら、\x%l台枠;#00ffc040;台枠%l;#;一つの往復輸送費だけで済みますから」
2008 = "「Trong trường hợp không thể cấy ghép \\x%l台枠;#00ffc040;khung gầm%l;#;\ncủa 58623 cho 8620——\nthì lúc đó, chúng ta cũng chỉ mất chi phí\nvận chuyển hai chiều cho một cái \\x%l台枠;#00ffc040;khung gầm%l;#;\nthôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1712 = "「Thì ra là vậy.」"

# monologue
# JP: 最悪に備えることもまた、\n経営者の資質であり、責務だろうと理解する。
2545 = "Tôi hiểu rằng, việc chuẩn bị cho tình\nhuống xấu nhất,\ncũng là một tư chất và trách nhiệm của\nngười điều hành."

# monologue
# JP: 市長との兼職を解除してからこちら、\nポーレットはぐんぐんと、社長らしさを増してるようだ。
2735 = "Kể từ khi thôi kiêm nhiệm chức thị trưởng,\nPaulette ngày càng ra dáng một giám đốc\nhơn hẳn."

# monologue
# JP: （……あるいは、宝生稀咲との\n顔合わせが増えた影響も大きいのかもしれんな）
2824 = "（……Hoặc có lẽ, việc thường xuyên chạm mặt\nvới Houshou Kisaki cũng có ảnh hưởng lớn.）"

# monologue
# JP: 宝生稀咲はあれ以来、レールショップに機関庫に、\n頻繁に足を運んでいる。
2736 = "Kể từ dạo đó, Houshou Kisaki thường xuyên\nlui tới Rail Shop và xưởng đầu máy."

# monologue
# JP: 一番話す相手はやはり日々姫のようだが、ポーレットや僕、\nハチロクやれいなとも熱心に――っと？
2413 = "Người cô ấy nói chuyện nhiều nhất có vẻ\nvẫn là Hibiki, nhưng cô ấy cũng\nrất nhiệt tình với Paulette, tôi,\nHachiroku và Reina——hửm?"

# 【双鉄】
# display as 雙鐵
# JP: 「れいなは整備か？」
1981 = "「Reina đang làm bảo dưỡng sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。今日もバーベキュー\x%l列車;#00ffc040;列車%l;#;、\n九割がたは席埋まってますし、張り切ってくれてます」
1940 = "「Vâng. Hôm nay \\x%l列車;#00ffc040;tàu%l;#; BBQ cũng\nkín chỗ đến chín phần rồi, nên em ấy đang\nrất hăng hái ạ.」"

# monologue
# JP: 8620牽引時の、あの連日の満席状態。
2392 = "Tình trạng kín chỗ liên tục mỗi ngày trong\nthời gian 8620 kéo tàu."

# monologue
# JP: サービス開始直後の特需に過ぎなかったのかもしれないが、\nやはり、乗客減は気にかかる。
2810 = "Có thể đó chỉ là nhu cầu tăng đột biến\nngay sau khi bắt đầu dịch vụ,\nnhưng quả thực, việc lượng khách giảm sút\nvẫn khiến tôi bận tâm."

# 【双鉄】
# display as 雙鐵
# JP: 「九割がた、か」
1851 = "「Chín phần, sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。九割がた。\nですから改装も、出来るだけ早く取り組めればって」
1949 = "「Vâng. Chín phần.\nVì vậy em muốn tiến hành việc cải tạo càng\nsớm càng tốt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1791 = "「Ừm.」"

# monologue
# JP: 危機感も、れいなが言ってた適材適所ということも、\nポーレットはすでにして理解してくれているようだ。
2696 = "Cảm giác khủng hoảng, và cả việc \"dụng\nnhân như dụng mộc\" mà Reina đã nói,\ncó vẻ Paulette đều đã hiểu rõ."

# 【ハチロク】
# display as 八六
# JP: 「しかしながら、\n焦ってことを仕損じては元も子もございません」
1738 = "「Tuy nhiên,\ndục tốc bất đạt, nếu hỏng việc thì xôi\nhỏng bỏng không đấy ạ.」"

# monologue
# JP: ハチロクの凛とした声。\nポーレットの顔もまた引き締まる。
2646 = "Giọng nói dõng dạc của Hachiroku vang lên.\nKhuôn mặt Paulette cũng trở nên nghiêm\nnghị."

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。先方からも、\nいくつか、決めて欲しい点があるって預かってます」
2021 = "「Đúng vậy nhỉ. Phía bên kia cũng\nnhờ em quyết định một vài điểm nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「移送手段に関してか？」
2088 = "「Liên quan đến phương tiện vận chuyển\nsao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「それもありますし、移送する中身についても」
1636 = "「Cũng có cái đó, và cả về nội dung cần vận\nchuyển nữa ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「というと？」
2059 = "「Nghĩa là sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;を単体で送るのか、\n\x%l動輪;#00ffc040;動輪%l;#;や\x%l先台車;#00ffc040;[せんだいしゃ,2]先台車%l;#;もつけるのか――ってことです」
1676 = "「Họ hỏi là chỉ gửi riêng \\x%l台枠;#00ffc040;khung gầm%l;#; thôi,\nhay là gửi kèm cả \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; và \\x%l先台車;#00ffc040;giá chuyển hướng trước%l;#;\nnữa——là vậy đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1791 = "「嗯」" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;形の\x%l台枠;#00ffc040;台枠%l;#;には、車軸や\x%l軸箱;#00ffc040;[じくはこ,1]軸箱%l;#;、\x%l軸箱守;#00ffc040;[じくはこもり,2]軸箱守%l;#;といった\nパーツ群によって、\x%l動輪;#00ffc040;動輪%l;#;が直接取り付けられている。
79 = "Trên \\x%l台枠;#00ffc040;khung gầm%l;#; của dòng \\x%l8620;#00ffc040;8620%l;#;, \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;\nđược lắp đặt trực tiếp\nthông qua các cụm linh kiện như trục bánh\nxe, \\x%l軸箱;#00ffc040;hộp trục%l;#; và \\x%l軸箱守;#00ffc040;giá dẫn hướng hộp trục%l;#;."

# monologue
# JP: ずっと走ってなかったものだ、\nそのまま送って貰っても、調整はやはり必要だろうが……
2679 = "Một thứ đã không chạy trong thời gian dài,\ndù có gửi nguyên vẹn đến thì vẫn cần phải\nđiều chỉnh lại, nhưng mà……"

# 【双鉄】
# display as 雙鐵
# JP: 「送ってもらった場合には、それをセットで使って、\nこちらからもセットで送り返す形になるか？」
2015 = "「Trong trường hợp họ gửi đến, chúng ta sẽ\nsử dụng nguyên bộ đó,\nrồi gửi trả lại nguyên bộ cho họ sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、好きに選んで――いいとこ取りをさせてもらって\nかまわないそうです。それこそ、ピンの一本まで」
1650 = "「Dạ không, họ bảo cứ chọn tùy thích——chọn\nlấy những phần tốt nhất\ncũng không sao đâu ạ. Thậm chí là đến từng\ncái chốt một.」"

# 【双鉄】
# display as 雙鐵
# JP: 「選択肢が増えることはありがたい――が……\nそうなると、移送コストは[かさ]嵩むのだよな？」
1951 = "「Có thêm lựa chọn thì cũng tốt——nhưng mà……\nnếu vậy thì chi phí vận chuyển sẽ tăng lên\nđúng không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。場所も重量も――\x%l動輪;#00ffc040;動輪%l;#;一つでも増えると……\n[へいしゅ,1]丙種輸送だとやっぱり、結構、[かさ]嵩んじゃいます」
1946 = "「Vâng. Cả về không gian lẫn trọng\nlượng——chỉ cần thêm một cái \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;\nthôi thì……\nNếu là vận chuyển loại Bính thì quả thực\nchi phí sẽ đội lên khá nhiều ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「へいしゅゆそう？」
1704 = "「Vận chuyển loại Bính?」"

# 【ハチロク】
# display as 八六
# JP: 「線路を使わず、船やトレーラーによって、\n車輌を運搬することです、双鉄様」
1836 = "「Là việc vận chuyển phương tiện bằng tàu\nthủy hoặc xe kéo\nmà không sử dụng đường ray ạ, ngài\nSoutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ……海軍と陸軍のイメージか？」
1784 = "「Ừm……giống như hình ảnh của hải quân và\nlục quân sao?」"

# 【ハチロク】
# display as 八六
# JP: 「え？」
1751 = "「Dạ?」"

# monologue
# JP: ぽかん、とハチロクの口が開く。
2328 = "Hachiroku há hốc mồm ngơ ngác."

# monologue
# JP: 僕を見、ポーレットを見、また僕を見て。\nややあり、クスクスと笑い出す。
2407 = "Em ấy nhìn tôi, nhìn Paulette, rồi lại\nnhìn tôi.\nMột lúc sau, em ấy bật cười khúc khích."

# 【ハチロク】
# display as 八六
# JP: 「お間違えですよ？　双鉄様。\n兵隊さんの兵種ではなく、甲乙丙の[へいしゅ,1]丙種です」
2099 = "「Ngài nhầm rồi ạ? Ngài Soutetsu.\nKhông phải là binh chủng của quân đội, mà\nlà loại Bính trong Giáp Ất Bính ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、そちらか。甲類、乙類の甲乙丙か」
1774 = "「Gì chứ, ra là vậy à. Giáp Ất Bính trong\nloại Giáp, loại Ất sao.」"

# monologue
# JP: 焼酎であれば類の違いは、蒸留方法の違いを示す。\n移送についても――そうか、同じことであるのか。
2299 = "Nếu là rượu shochu thì sự khác biệt về\nloại chỉ ra sự khác biệt về phương pháp\nchưng cất.\nVề việc vận chuyển——ra vậy, cũng tương tự\nthế sao."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、甲……\x%l甲種輸送;#00ffc040;甲種輸送%l;#;、でいいのかな？　それか、\n乙種輸送かは、線路を使っての輸送のことだろう」
2081 = "「Nếu vậy, loại Giáp……\\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#;,\ncó đúng không? Hoặc là,\nvận chuyển loại Ất, chắc là việc vận\nchuyển bằng đường ray nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「左様でございます、双鉄様。\n甲種、乙種ともに、線路を使って車輌を輸送します」
1875 = "「Đúng là như vậy ạ, ngài Soutetsu.\nCả loại Giáp và loại Ất đều sử dụng đường\nray để vận chuyển phương tiện.」"

# monologue
# JP: 真面目な声で言いながら、\nハチロクの口元はいまだわずかに、ほころんでいる。
2320 = "Dù đang nói bằng một giọng điệu nghiêm\ntúc,\nnhưng khóe miệng Hachiroku vẫn còn hơi hé\nmở."

# 【ハチロク】
# display as 八六
# JP: 「\x%l甲種輸送;#00ffc040;甲種輸送%l;#;は、輸送される車輌が、貨物機関車により、\n自分の車輪で牽引されていく輸送法です」
1384 = "「\\x%l甲種輸送;#00ffc040;Vận chuyển loại Giáp%l;#; là phương pháp vận\nchuyển mà phương tiện được vận chuyển\nsẽ được đầu máy hàng hóa kéo đi bằng chính\nbánh xe của nó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。自分の車輪で――とあえていうなら。わかった。\n乙種は、\x%l貨車;#00ffc040;貨車%l;#;か何かにまるごと乗せての輸送だな？」
1789 = "「Ừm. Cố tình nhấn mạnh là bằng chính bánh\nxe của nó——thì anh hiểu rồi.\nLoại Ất là đặt toàn bộ lên \\x%l貨車;#00ffc040;toa chở hàng%l;#;\nhay gì đó để vận chuyển đúng không?」"

# 【ハチロク】
# display as 八六
# JP: 「さすが。ご明察です、双鉄様」
1640 = "「Không hổ danh là ngài. Ngài thật sáng\nsuốt ạ, ngài Soutetsu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そこも、決めて欲しいっておっしゃってました。\n[ゴーハチロクニイサン,4]58623、今は[とよかわ,1]豊河の工場にあるそうなんですけど――」
1829 = "「Bên đó cũng bảo là muốn chúng ta quyết\nđịnh luôn phần đó.\nNghe nói hiện tại 58623 đang ở nhà máy\nToyokawa——」"

# monologue
# JP: 言いながら、ポーレットは地図を指し示す。
2642 = "Vừa nói, Paulette vừa chỉ vào bản đồ."

# monologue
# JP: 豊河を出て、[なごや,2]名児耶――東名児耶港・錦城埠頭。\n愛智県を横断するように、まるまる、路線が生きている。
2446 = "Xuất phát từ Toyokawa, đi qua Nagoya——cảng\nĐông Nagoya, bến tàu Kinjo.\nNguyên một tuyến đường chạy vắt ngang tỉnh\nAichi vẫn còn đang hoạt động."

# 【双鉄】
# display as 雙鐵
# JP: 「すごいな。これほど長い線路が残っているのか」
1996 = "「Tuyệt thật đấy. Vẫn còn sót lại một đoạn\nđường sắt dài đến thế này sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「[なごてつ,2]名児鉄ですね。\x%l帝鉄;#00ffc040;帝鉄%l;#;の路線網がずたずたになって、\n相対的に価値が上昇したのが幸いしたって聞いてます」
2054 = "「Là đường sắt Nagoya ạ. Nghe nói nhờ mạng\nlưới đường sắt của \\x%l帝鉄;#00ffc040;Teitetsu%l;#; bị xé nát,\nmà giá trị tương đối của nó tăng lên nên\nmới may mắn còn tồn tại đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「これも、山間を抜ける路線だな。\nあるいは、走行不能区域にもかかっているのかな」
2053 = "「Đây cũng là tuyến đường xuyên qua núi\nnhỉ.\nHoặc là, nó cũng nằm trong khu vực không\nthể chạy tàu chăng.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2097 = "「Ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっとすまん。話を寄り道させてしまったな。\nええと――」
1800 = "「Ồ xin lỗi. Làm câu chuyện bị chệch hướng\nmất rồi.\nÀ ừm——」"

# 【ポーレット】
# display as 波萊特
# JP: 「港までを、\x%l甲種輸送;#00ffc040;甲種輸送%l;#;か乙種輸送かも、\nこちらで選んで構わないっていう話です」
2019 = "「Họ nói rằng việc vận chuyển đến cảng bằng\n\\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#; hay loại Ất,\nbên mình cứ tùy ý lựa chọn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。ハチロクとしてはどうだ？　甲種か乙種か。\nそれと、移送をしてもらう内容についても」
1757 = "「Ừm. Ý Hachiroku thế nào? Loại Giáp hay\nloại Ất.\nVà cả về nội dung nhờ họ vận chuyển nữa.」"

# 【ハチロク】
# display as 八六
# JP: 「左様でございますね――甲種、乙種で移送コストは」
2087 = "「Dạ để xem nào——chi phí vận chuyển giữa\nloại Giáp và loại Ất thì」"

# 【ポーレット】
# display as 波萊特
# JP: 「そこはほとんど変わりません。\n実費でやってくださるってことですし」
1695 = "「Về điểm đó thì hầu như không khác biệt ạ.\nBên đó cũng bảo sẽ tính theo chi phí thực\ntế.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら、乙種を希望します。\n移送時のリスクも、可能な限り軽減したく思います」
2080 = "「Nếu vậy, em xin chọn loại Ất ạ.\nEm cũng muốn giảm thiểu rủi ro khi vận\nchuyển ở mức tối đa có thể.」"

# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;の僕をたて、控えてくれていたのだろうか。\n水を向けられハチロクは、流れるように話し始める。
2694 = "Có lẽ em ấy đã nhường lời để tôn trọng \\x%l機関士;#00ffc040;người lái tàu%l;#;\nlà tôi chăng.\nĐược tôi gợi ý, Hachiroku bắt đầu trình\nbày một cách trôi chảy."

# 【ハチロク】
# display as 八六
# JP: 「それと、コスト的に許せば、\x%l動輪;#00ffc040;動輪%l;#;まわり一式と……\n\x%l先台車;#00ffc040;[せんだいしゃ,2]先台車%l;#;も運んでいただけると、助かるのですが」
2070 = "「Với lại, nếu chi phí cho phép, mong họ\ngửi kèm toàn bộ cụm \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; và……\ncả \\x%l先台車;#00ffc040;giá chuyển hướng trước%l;#; nữa thì sẽ giúp\ních rất nhiều ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「了解です――うん。了解です。\x%l台枠;#00ffc040;台枠%l;#;改修に失敗したら、\nコストをどれほど抑えてたところで、無意味ですからね」
2000 = "「Đã rõ——vâng. Đã rõ ạ. Nếu sửa chữa \\x%l台枠;#00ffc040;khung gầm%l;#;\nthất bại,\nthì dù có tiết kiệm chi phí đến đâu cũng\ntrở nên vô nghĩa mà.」"

# monologue
# JP: どこか、自身に言い聞かせているようなその口調。
2645 = "Một giọng điệu như thể cô ấy đang tự nhắc\nnhở chính mình vậy."

# monologue
# JP: 相当に費用がふくらむのだろうと想像するが、\n妥協できるような問題でも無い。
2809 = "Tôi có thể tưởng tượng chi phí sẽ đội lên\nkhá nhiều,\nnhưng đây không phải là vấn đề có thể thỏa\nhiệp được."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、これで決まりとしよう。\n下回り一式を、乙種輸送で移送してもらう」
2078 = "「Nếu vậy, chúng ta quyết định thế này đi.\nNhờ họ gửi toàn bộ cụm gầm xe bằng vận\nchuyển loại Ất.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。先方にもそのように伝えます。\n下回り一式を、乙種……乙種で、ですね」
1823 = "「Vâng. Em sẽ truyền đạt lại với bên đó như\nvậy.\nToàn bộ cụm gầm xe, loại Ất……loại Ất,\nnhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「ポーレット様……」
1974 = "「Cô Paulette……」"

# monologue
# JP: いかん、ハチロクの顔色までもが曇りそうだ。
2255 = "Không ổn rồi, sắc mặt của Hachiroku cũng\nsắp sầm lại mất thôi."

# monologue
# JP: 経営者としての懸念もわかるが、問われて答えた判断だ。\nここは、フリでも気持よく了解してもらいたい。
2555 = "Dù hiểu được nỗi lo của một người điều\nhành, nhưng đây là phán đoán được đưa ra\nkhi được hỏi.\nLúc này, tôi muốn cô ấy dù giả vờ cũng hãy\nvui vẻ chấp nhận."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、\n出来るのならば、そう気に病んでくれるな」
1976 = "「Paulette,\nnếu được thì xin cô đừng quá phiền lòng\nnhư vậy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？」
1750 = "「Dạ!?」"

# monologue
# JP: 心底、びっくりしたような顔。
2405 = "Một khuôn mặt ngạc nhiên từ tận đáy lòng."

# monologue
# JP: ハチロクと僕とも顔を見合わせ、\nいささかあっけにとられてしまう。
2491 = "Tôi và Hachiroku đưa mắt nhìn nhau,\ncó chút sững sờ."

# 【ポーレット】
# display as 波萊特
# JP: 「気に病むって……何をです？」
2029 = "「Phiền lòng……chuyện gì cơ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや……移送コストのこと……ではないのか？」
1747 = "「À không……về chi phí vận chuyển……không\nphải sao?」"

# 【ハチロク】
# display as 八六
# JP: 「ポーレット様の眉、このようになっておりましたよ？」
1975 = "「Lông mày của cô Paulette, ban nãy đã trở\nnên như thế này đó ạ?」"

# monologue
# JP: ハチロクが指で眉根を下げる。\nへちょーん、と。絵に描いたような困り顔だ。
2327 = "Hachiroku dùng ngón tay kéo cụp lông mày\nxuống.\nTrông ủ rũ. Một khuôn mặt rắc rối y như\ntrong tranh vẽ."

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ！　ごめんなさい。そういう顔、\nしちゃってたなら原因、コストとかのことじゃないです」
1753 = "「Dạ? A! Em xin lỗi. Nếu em có làm vẻ mặt\nđó,\nthì nguyên nhân không phải do chi phí hay\ngì đâu ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「違うのですか？　では、何が――」
1644 = "「Không phải sao ạ? Vậy thì, là do chuyện\ngì——」"

# 【ポーレット】
# display as 波萊特
# JP: 「あの……ええと――\x%l甲種輸送;#00ffc040;甲種輸送%l;#;」
1761 = "「Dạ……ờm thì——\\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#; ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l甲種輸送;#00ffc040;甲種輸送%l;#;？」
1385 = "「\\x%l甲種輸送;#00ffc040;Vận chuyển loại Giáp%l;#;?」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、多分、\x%l甲種輸送;#00ffc040;甲種輸送%l;#;って言葉に刷り込みがあって\n――パパ、その……結構な撮りテツでしたから」
1896 = "「Có lẽ em đã bị ám ảnh bởi từ \\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#;\n——Bố em, ừm……từng là một Tori-tetsu khá\ncuồng nhiệt ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ、そのようなご事情が」
1779 = "「A, ra là có lý do như vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　今のでわかるのか？」
1860 = "「Gì vậy? Em hiểu được ý cô ấy vừa nói\nsao?」"

# monologue
# JP: 僕にはわからん。\nどこが納得のポイントなのか。
2479 = "Tôi thì chịu.\nKhông hiểu điểm đáng thuyết phục ở đây là\ngì."

# 【ハチロク】
# display as 八六
# JP: 「キュウロクたちがしばしば聞かせてくれたのです。\n\x%l甲種輸送;#00ffc040;甲種輸送%l;#;のときには、撮りテツさんたちが凄いと」
1905 = "「Kyuroku và mọi người vẫn thường hay kể\ncho em nghe.\nRằng mỗi khi có \\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#;, các\nTori-tetsu sẽ kéo đến đông khủng khiếp.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l9600;#00ffc040;[キュウロク,4]9600形%l;#;――お前の後につくられた、\n確か、量産貨物機だったか？」
1376 = "「\\x%l9600;#00ffc040;Dòng 9600%l;#;——được chế tạo sau em,\nhình như là dòng đầu máy hàng hóa sản xuất\nhàng loạt phải không?」"

# 【ハチロク】
# display as 八六
# JP: 「はい。大傑作の貨物機です。日ノ本のあらゆる場所で、\nあらゆる貨物を。恐らくは今も、輸送している子達です」
1793 = "「Vâng. Một kiệt tác đầu máy hàng hóa ạ.\nCác em ấy đã vận chuyển đủ loại hàng hóa,\nđến khắp mọi nơi trên đất nước Hinamoto.\nCó lẽ ngay cả bây giờ, các em ấy vẫn đang\ntiếp tục công việc đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\nならば\x%l甲種輸送;#00ffc040;甲種輸送%l;#;に従事する機会も多かったのか」
1710 = "「Thì ra là vậy.\nVậy chắc hẳn các em ấy cũng có nhiều cơ\nhội tham gia \\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#; nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「左様でございますね」
1956 = "「Đúng là như vậy ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l甲種輸送;#00ffc040;甲種輸送%l;#;を撮るのって、撮りテツには一大イベントなん――ううんっ、らしいんですよ」
1830 = "「Việc chụp ảnh \\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#; là một\nsự kiện trọng đại\nđối với các Tori-tetsu——à không, nghe nói\nlà vậy đó ạ.」"

# monologue
# JP: “なんです”と出かけた言葉を飲み込んで、\nポーレットは僕らに教えてくれる。
2643 = "「Em thì chỉ thích đi tàu thôi, nhưng quả\nthực vẫn chịu ảnh hưởng\ntừ bố. Nên chỉ cần nghe đến \\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#;\nlà em lại vô tình...」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたしは乗るのが好きなだけですけど、パパの影響は\nやっぱりあって。\x%l甲種輸送;#00ffc040;甲種輸送%l;#;って聞いただけで、つい」
2092 = "「Cảm giác như máu nóng sôi sục lên sao?\nNhưng vì chuyển thành loại Ất, nên tâm\ntrạng hơi chùng xuống một chút.」"

# 【双鉄】
# display as 雙鐵
# JP: 「血が騒ぐ、といった感じか？\nそれが乙種となり、ややテンションが下がってしまった」
1883 = "「Em nghĩ là giống như vậy ạ. Dù bản thân\nem cũng không nhận ra——\nAa, xấu hổ quá đi mất.」"

# 【ポーレット】
# display as 波萊特
# JP: 「みたいな感じだと思います。自覚なかったですけど――\nああ、恥ずかしい」
1847 = "「Không đâu. Cô đã cho một gợi ý rất hay.\nCảm ơn cô.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや。良いヒントをくれた。ありがたい」
1965 = "「Không đâu. Cô đã cho một gợi ý rất hay.\nCảm ơn cô.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
# 1751 = "「哎？」" 

# monologue
# JP: ポケットから、借りっぱなしのカメラを取り出す。\nこいつも随分、僕の手に馴染んでくれた。
2508 = "Tôi lấy chiếc máy ảnh mượn mãi chưa trả ra\nkhỏi túi.\nThứ này cũng đã trở nên khá quen thuộc với\ntay tôi rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「甲種がそれほどならば、乙種にも価値はあるだろう。\n無論、僕も移送や整備の状況を逐次撮るつもりでいたが」
1825 = "「Nếu loại Giáp đã như vậy, thì loại Ất\nchắc chắn cũng có giá trị của nó.\nĐương nhiên, tôi cũng định sẽ chụp lại\ntoàn bộ quá trình vận chuyển và bảo\ndưỡng.」"

# monologue
# JP: 僕の言葉の終わりを待たず、\nぽん、とハチロクが手を打ち鳴らす。
2324 = "Chưa đợi tôi nói dứt lời,\nHachiroku đã vỗ tay cái bốp."

# 【ハチロク】
# display as 八六
# JP: 「ああ！　わかりました。乙種輸送のダイア情報を、\n撮りテツさんたちに流すのですね？」
1769 = "「A! Em hiểu rồi. Sẽ rò rỉ thông tin lịch\ntrình vận chuyển loại Ất\ncho các Tori-tetsu đúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり。情報発信の重要度は更に増しているし……\n撮りテツたちが力を貸してくれるのならば、ありがたい」
1967 = "「Đúng vậy. Tầm quan trọng của việc phát\ntán thông tin đang ngày càng tăng lên……\nNếu các Tori-tetsu có thể giúp một tay thì\ntốt quá.」"

# monologue
# JP: "蒸気のふるさと御一夜”を浸透させ、\nひいては、大九洲ＳＬ構想を成立させる。\n2434 = "將“蒸汽之鄉御一夜”的概念灌輸給大家，進而發展大九州蒸汽機車事業。" \n\n# monologue\n# JP: そのためにもっとも重要となってくるであろう要素は、\nとにもかくにも、知られることだ。\n2669 = "為了達到這個目的，最重要的莫過於要讓大眾得到相關的訊息。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それだけ長い距離の移送なら、撮って貰える機会も多い。\n撮って貰った写真はそのまま、知られるための種となる」\n2060 = "「運輸行駛距離很長，正好有很多機會讓他們拍照。他們拍下來的照片正好可以作為訊息傳播的工具」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「それ……うん。ちょっと、盲点でした」\n2052 = "「這……嗯。我還沒想到這一點」" \n\n# monologue\n# JP: よほど感心してくれたのか、ポーレットの声が熱っぽい。\n2445 = "從聲音聽得出來她非常激動，看來她對此深表贊同。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「すごくいいと思います。情報発信、毛利の[あき,1]安芸様とか、\n他の\x%lまいてつ;#00ffc040;まいてつ%l;#;さん達にも頼んでみます」\n1911 = "「我覺得這個想法很好。我會請毛利的安芸殿下和其他的\\x%lまいてつ;#00ffc040;掌車人%l;#;來幫忙擴散消息」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ――よろしく頼む」\n1795 = "「嗯，就拜託你了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……羽をむしられた鶏のようだな」\n2005 = "「簡直就像被拔了毛的雞一樣啊……」" \n\n# monologue\n# JP: （パシャっ）\n2862 = "（喀嚓）" \n\n# monologue\n# JP: 剥き出しになったボイラーと、\nジャッキによって持ち上げられた\x%l台枠;#00ffc040;台枠%l;#;と。\n2787 = "車身上只剩下暴露的鍋爐，還有用千斤頂支起來的\\x%l台枠;#00ffc040;車架%l;#;。" \n\n# monologue\n# JP: いま\x%l8620;#00ffc040;8620%l;#;にあるのはたったそれだけだ。\n\x%l動輪;#00ffc040;動輪%l;#;もシリンダも何もかも、綺麗さっぱり取り払われてる。\n2685 = "目前\\x%l8620;#00ffc040;８６２０%l;#;上剩下的就這些了。\\x%l動輪;#00ffc040;動輪%l;#;和汽缸之類的零附件早已被卸得一乾二淨。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「引き換え、こちらは床をうめつくさんばかりだ」\n1730 = "「反倒是地上，都快被堆滿了」" \n\n# monologue\n# JP: （パシャっ）\n# 2862 = "（喀嚓）" \n\n# monologue\n# JP: \x%l動輪;#00ffc040;動輪%l;#;群に、\x%l主連棒;#00ffc040;主連棒%l;#;、\x%l連結棒;#00ffc040;連結棒%l;#;、\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;に滑り棒――\n86 = "\\x%l動輪;#00ffc040;動輪%l;#;組、\\x%l主連棒;#00ffc040;主連杆%l;#;、\\x%l連結棒;#00ffc040;連杆%l;#;、\\x%lクロスヘッド;#00ffc040;十字頭%l;#;還有十字頭導杆——" \n\n# monologue\n# JP: 取り払われた部品たちは、ひとつひとつ、\n丁寧に並べ置かれている。\n2796 = "這些卸下來的零附件都被小心翼翼地分類排在一起。" \n\n# monologue\n# JP: （おっと――）\n2856 = "（啊——）" \n\n# monologue\n# JP: その部品群へ、\nガスランプを手に技工さんが歩み寄っていく。\n2244 = "一位提著噴燈的技工走近了零件堆。" \n\n# monologue\n# JP: 見知らぬ技工さんではあるが、\n熟練の雰囲気を漂わせている。\n2807 = "雖然我並不認識他，但是從氣質上能感受到他熟練的技藝。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「失礼。撮らせていただいても良いですか？」\n1637 = "「不好意思。請問我能給您拍張照片嗎？」" \n\n# monologue\n# JP: コクリと頷き。\n目線も声も僕には向かず、\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;に向けられている。\n2286 = "他沒有看我一眼，默默點了點頭。隨後看向了\\x%lクロスヘッド;#00ffc040;十字頭%l;#;。" \n\n# monologue\n# JP: 手のガスランプが、どんどんと\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;に\n近づけられて――\n2284 = "他手中的噴燈離\\x%lクロスヘッド;#00ffc040;十字頭%l;#;越來越近——" \n\n# monologue\n# JP: （どんっ）\n2854 = "（咚）" \n\n# 【日々姫】\n# display as 雙鐵＆日日姬\n# JP: 『「っ！？」\n「きゃっ――ごめんなさいっ――って、あ、にぃに」』\n2110 = "『「！？」\\n「呀——不好意思——呃，啊，阿哥」』" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「しっ」\n1799 = "「噓」" \n\n# monologue\n# JP: 日々姫の口を閉じさせて、\n驚きに手を止めさせてしまった技工さんへと黙礼する。\n2601 = "日日姬合上了嘴，向著因為驚訝而停下了手中工作的技工做了個道歉的手勢。" \n\n# monologue\n# JP: 技工さんは「大丈夫ですよ」と微笑んで、\nまたじわじわと、\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;にランプを寄せる。\n2579 = "技工回以一個微笑，示意“沒有關係”，隨後又漸漸把噴燈靠近\\x%lクロスヘッド;#00ffc040;十字頭%l;#;。" \n\n# monologue\n# JP: （じゅううっ）\n2864 = "（嗞嗞）" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わ」\n1749 = "「哇」" \n\n# monologue\n# JP: シャッターを切る指の隣で、日々姫がペンを走らせる。\n走らせながら、小声で僕に聞いてくる。\n2520 = "我按下快門，日日姬在我身邊飛快地素描著。她一邊畫一邊輕聲問我。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「にぃに、あれ、なにしとーと、焼き入れ？」\n2089 = "「阿哥，那是在整什麼呀？淬火？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ガスランプ程度の火では焼きなど入らなかろうよ。\nではなく――ほら」\n1802 = "「噴燈怎麼能達到淬火所需溫度。所以不是淬火——你看」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「わ」\n# 1749 = "「哇」" \n\n# monologue\n# JP: じわじわと、炙られる火で、\n\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;の黒が滲んで、溶け出していく。\n2664 = "火焰漸漸把\\x%lクロスヘッド;#00ffc040;十字頭%l;#;上的黑色汙漬燒化。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あれ――油だ」\n2079 = "「那是——油」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうだな。僕らが普段差してる油の、塊だろうな」\n1937 = "「是啊。就是我們平常添加的油的凝結物」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「あー、だよね。\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;でいいんだっけ、あれ？\nあそこ、必ず注油するもんね」\n1772 = "「啊，也是啊。那個東西，叫做\\x%lクロスヘッド;#00ffc040;十字頭%l;#;是吧？我記得一定要往那東西上面注油」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だな」\n1938 = "「是啊」" \n\n# monologue\n# JP: 名称の方は危なっかしいが、\n日々の作業は、しっかりと染み付いているようだ。\n2806 = "雖然她險些想不起十字頭的名字，但她還是對這些日常作業記憶深刻。" \n\n# monologue\n# JP: ピストンの往復運動を、\x%l動輪;#00ffc040;動輪%l;#;の回転に変換するための\n中継装置が\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;――当然、注油も欠かせない。\n81 = "\\x%lクロスヘッド;#00ffc040;十字頭%l;#;作為將活塞的往復運動轉換為\\x%l動輪;#00ffc040;動輪%l;#;的圓周運動的傳動裝置，其注油工作當然不可或缺。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「しかし……注油の度に清掃もしていたつもりだが」\n1648 = "「不過……每次注油後我記得都有清理過的」" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「うん……ちょっと……\n結構、これって恥ずかしかねぇ」\n1783 = "「嗯……總感覺……挺不好意思的」" \n\n# monologue\n# JP: 丁寧にランプで油を炙り、\n更に丁寧に拭き取っていく。\n2582 = "技工小心翼翼地用噴燈燒化油汙，接著更加小心地將油擦去。" \n\n# monologue\n# JP: 黒々としていた\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;は、見る見るうちに、\nいっそ涼しいばかりの鉄色を取り戻していく。\n2361 = "原本被油汙覆蓋得漆黑的\\x%lクロスヘッド;#00ffc040;十字頭%l;#;不知不覺間恢復了原本冰冷的鐵色。" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「……良し、っと。\nあんまりお邪魔しちゃ悪かとね」\n1401 = "「……畫好了。還是不要再打擾人家了」" \n\n# monologue\n# JP: やがて鉛筆の動きを止めて、\nスケッチブックをぱたんとたたみ、日々姫が立ち去る。\n2599 = "日日姬不再動筆，她把素描本啪嗒一聲合上，轉身就走。" \n\n# monologue\n# JP: (パシャっ)\n34 = "(喀嚓)" \n\n# monologue\n# JP: 確かにお邪魔をしては悪いが、\nあともう少しで磨き上がりそうだ。\n2711 = "確實繼續打擾人家不太好，不過看樣子他馬上就可以擦乾淨了。" \n\n# monologue\n# JP: 完全に磨き上がったところを撮れば、\n熟練の技の見事さが、見てくれる人にもより伝わろう。\n2586 = "把技工剛好完成工作的鏡頭拍下來，看到的人也能感受到技工技藝的精湛吧。" \n\n# 【技工】\n# display as 技工\n# JP: 「うん」\n# 1791 = "「嗯」" \n\n# monologue\n# JP: ――磨き上がった。\n1357 = "——終於擦乾淨了。" \n\n# monologue\n# JP: （パシャッ）\n# 2862 = "（喀嚓）" \n\n# monologue\n# JP: 技工さんは気持ちよさそうに腰を伸ばして、\n今までの顔と一転、笑顔で僕に振り返る。\n2583 = "技工終於舒服地伸了伸腰板，一改之前嚴肅的表情，轉過頭笑著看我。" \n\n# 【技工】\n# display as 技工\n# JP: 「よく手入れなさってますね。\n\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;は、こっちを取った方がいいでしょう」\n1682 = "「你們把車保養得不錯嘛。\\x%lクロスヘッド;#00ffc040;十字頭%l;#;用這個就可以了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あ」\n1763 = "「啊」" \n\n# monologue\n# JP: その一言で理解する。\nどうりで、見たことの無い顔のはずだ。\n2297 = "他這麼說我就懂了，難怪我對他的臉沒有印象。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「日ノ本車輌から来てくださった技術者さんでしたか」\n1868 = "「您是從日本車輛製造來的技術人員吧」" \n\n# 【技工】\n# display as 技工\n# JP: 「はい。豊河工場のＯＢ、[ふち]淵といいます」\n1786 = "「嗯。我是豐川工廠的前職員，敝姓淵」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「はじめまして、[ふち]淵さん。僕は――」\n1706 = "「初次見面，淵先生。我是——」" \n\n# 【技工】\n# display as 技工\n# JP: 「[みぎたそうてつ,3]右田双鉄さんですよね？\n拝見してます」\n1867 = "「您是右田雙鐵先生吧？幸會」" \n\n# monologue\n# JP: ポケットから取り出されるのは、\n丁寧に折りたたまれた――\n2281 = "他從口袋中拿出了一張被細心疊好的——" \n\n# monologue\n# JP: ああ、8620運転台通信の、プリントアウトだ。\n2383 = "哦，這是８６２０駕駛台通信的列印件。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「読んでいただけていたのですか」\n1869 = "「您有讀過這份期刊嗎」" \n\n# 【技工】\n# display as 技工\n# JP: 「もちろんですよ。\nここに来ている人達、ほとんどがそうじゃないですか？」\n1994 = "「當然了。能到這裡來的所有人，差不多都讀過吧？」" \n\n# monologue\n# JP: 言われてぐるりと見渡せば、\n見知らぬ顔と見知った顔とが入り混じっている。\n2726 = "聽他這麼一說，我四周觀望了一下，發現人群中有許多我沒見過的面孔。" \n\n# 【技工】\n# display as 技工\n# JP: 「[ちちぶ,2]知々夫の[みずた,1]水田さん、[しずおか,1]靜岡の[まはら,1]馬原さん、[にしつがる,2]西津輕の[かなや,1]金谷先生\n――誰も彼も、自分で納得しなきゃ動かん人たちだ」\n1645 = "「不論是秩父的水田先生、靜岡的馬原先生還是西津輕的金谷先生——要不是他們自己願意哪有人請得動哦」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「お知り合いなのですか？」\n1873 = "「您認識他們？」" \n\n# 【技工】\n# display as 技工\n# JP: 「[ていてつ,1]帝鉄時代は研修会などもありましたからね。\n顔を合わせるようなメンツは、まぁ似たり寄ったりで」\n1849 = "「帝國鐵路時代在研討會上和他們有過數面之緣。能在那種場合結識的人，基本上是物以類聚吧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なるほど」\n# 1712 = "「原來如此」" \n\n# monologue\n# JP: それだけ広い範囲の技師を一同に集めて行うのなら、\n参加者は恐らく“全国選りすぐり”というレベルだろう。\n2590 = "既然這研討會能把全國各地的技師召集過來，看來這些人都是“精英中的精英”。" \n\n# monologue\n# JP: そうした人たちが、ハチロクのために集ってくれてる――\nこれほど、頼もしいこともない。\n2795 = "這些人為了修復八六而齊聚一堂——真的沒有什麼比這更令人安心的了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ありがとうございます。本当に心強いです」\n2102 = "「非常感謝您。你們能來，我就放心了」" \n\n# 【技工】\n# display as 技工\n# JP: 「いやいや、礼など言われて恐縮します。\n自分の場合は、完全にこっちの都合での参加ですしね」\n1755 = "「哪裡哪裡，您言重了。就我而言，來這裡完全是出於個人原因」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「と、おっしゃいますと？」\n# 2059 = "「這話怎麼說？」" \n\n# monologue\n# JP: 微笑んだまま――けれども笑みの質が変わる。\nわずかに、淋しげな影が差す。\n2295 = "他臉上的微笑換了一種味道。我從中讀出了幾分寂寞。" \n\n# 【技工】\n# display as 技工\n# JP: 「見極めたい――と、そう思って確かめに来たんです。\n自分は、反対しましたから」\n1893 = "「我到這來——就是想要看看這工程能走到什麼地步。畢竟我當初是反對車架調換的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「反対、ですか？」\n1864 = "「您反對這個議案嗎？」" \n\n# 【技工】\n# display as 技工\n# JP: 「あの子の思い出がやはり、詰まった機体ですから。\n最後の願いとはいえど、バラしたいとは思えなかった」\n1993 = "「畢竟機體中承載著那孩子的回憶。就算這是她最後的心願，我也不願將她拆開來」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n2105 = "「！」" \n\n# 【技工】\n# display as 技工\n# JP: 「ですから、この目で、確かめようと来たんです」\n1918 = "「所以，我要親眼看看，親自來確認這個工程的進展」" \n\n# monologue\n# JP: ドクン、と心臓が跳ね上がる。\nドドドドと、早鐘のように鳴り響く。\n2715 = "突然我的心臟開始撲通撲通加速跳動，就像響起了警報一樣。" \n\n# 【技工】\n# display as 技工\n# JP: 「あの子の願いを――右田さん、ハチロクさん。\nあなた方に託せるものかを、確かめに」\n1909 = "「我要來確認——是否能把那孩子的心願託付給右田先生您，還有八六小姐」" \n\n# monologue\n# JP: 鼓動がガンガン耳を打つのに、\n血が凍りついたような気がする。\n2461 = "心跳聲不停地衝擊著我的耳膜，我感覺全身的血液都要凝固了。" \n\n# monologue\n# JP: どうして、僕は――\n今の今まで、ただの一度も……\n2670 = "為什麼我直到現在——一次都沒有……" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あの子――とは」\n2076 = "「那孩子指的是——」" \n\n# monologue\n# JP: 分かりきってる。\n聞くまでもない。\n2437 = "就算不問我也知道他指的是什麼。" \n\n# monologue\n# JP: 線路があり、設備があり、技師がいて――\n何故、58623が\x%l静態保存;#00ffc040;静態保存%l;#;をされていたのか……\n2872 = "５８６２３有路線，有設備，也不乏技師——儘管如此，為什麼它還會被靜態保存……" \n\n# monologue\n# JP: （その理由を――どうして、僕は……思いもしない――\nいや、最初から考えようとも……しなかったのだ）\n2869 = "（為什麼——我……從未想過其中的理由——不，從一開始……我就不願意去考慮）" \n\n# monologue\n# JP: そこを考えるのが怖い。\n直視したなら、カサブタが剥がれ落ちそうで。\n2499 = "我害怕去深究其中的緣由，因為這樣做可能會揭開心中的傷疤。" \n\n# monologue\n# JP: だから、ともかく口を動かす。\n現実を進めておく間には、過去を見ないでおけるから。\n2483 = "我催促自己繼續說下去。因為若是埋頭處理眼前的事務，怕是就又會和一段過去擦肩而過。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あの子とは――[ゴーハチロクニイサン,4]58623の……」\n2075 = "「那孩子——指的是５８６２３的……」" \n\n# monologue\n# JP: 頷き。\n安心したような。\n2280 = "他安心地點了點頭。" \n\n# 【技工】\n# display as 技工\n# JP: 「その意味でも、ハチロクさん――\nトップナンバー\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、やはり凄いですね」\n1854 = "「從這點上來說，首車\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;——八六小姐，果然不一般」" \n\n# monologue\n# JP: 淵さんの目が大きく動く。\n2653 = "淵先生看向了別的地方。" \n\n# monologue\n# JP: 視線の先には、ハチロクが――\n職人さんたちとなにやら打ち合せているハチロクがいる。\n2292 = "他的視線投向了八六那邊——八六正和鐵路專家們商量著什麼。" \n\n# 【技工】\n# display as 技工\n# JP: 「まだまだ何年でも稼働できそうに生き生きしてる。\n矛盾しますが――とても、最古の[トップナンバー,1]一体とは思えない」\n1821 = "「她還是那麼精神奕奕，看來還能運轉很多很多年。實在是矛盾——這怎麼看都不像是歷史最為悠久的首車的鐵路人偶」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あれは……」\n2057 = "「這是因為……」" \n\n# monologue\n# JP: 唇が、からからに乾いてしまった気がする。\n2472 = "感覺我的嘴唇彷彿幹得像貧瘠的土地一樣。" \n\n# monologue\n# JP: 言葉を発するそのために、\n張り付く口を、無理矢理に剥がしているようで。\n2514 = "我感覺要把黏起來的嘴強行撥開才能說出話一樣。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「長いこと――本当に長いこと眠っていたのです。\n眠っていて――つい最近に、再び目覚めた」\n1814 = "「她沉睡了很長很長一段時間。直到最近——才再次甦醒」" \n\n# monologue\n# JP: “だから、稼働時間は少ない”。\n続けようとした言葉は喉から出てこない。\n2488 = "我原想接著說“所以，她的運轉時間也並沒有那麼久”，但是這句話怎麼都說不出口。" \n\n# monologue\n# JP: “僕が知らないハチロクの過去を知らされる”――\nそんな事態を招きかねないことに気づいて、舌が固まる。\n2523 = "我收緊了嘴——因為我並不想從他那聽到“我所不知道的八六的過去”。" \n\n# 【技工】\n# display as 技工\n# JP: 「なるほど、眠り姫だったのですか。\n目覚めさせたのは、きっと、右田さんなのでしょうね」\n1713 = "「原來如此，還是個睡美人啊。那麼喚醒睡美人的，一定是右田先生您了」" \n\n# monologue\n# JP: あたたかな声。あたたかな笑み。\nそのあたたかさが、僕を息苦しくさせる。\n2291 = "他的聲音與笑容都洋溢著暖意，但這份溫暖卻讓我難以呼吸。" \n\n# 【技工】\n# display as 技工\n# JP: 「来て良かったです。話せて、良かった。\nあなた方になら、確かに――託せる」\n1904 = "「我很高興我能來到這裡、與您交談——看來我可以放心把那孩子的夢想託付給你們」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ」\n1395 = "「……」" \n\n# monologue\n# JP: 頭を、深々と下げられる。\n2529 = "我深深低下了頭。" \n\n# monologue\n# JP: そうされる資格など僕には無いのに、\n逃げ出すことも、否定することも出来ようもない。\n2524 = "我明明沒有資格繼承那孩子的夢想，但是我卻沒辦法否定，沒辦法從這裡逃走。" \n\n# 【技工】\n# display as 技工\n# JP: 「あの子の――こはるの願った最後の夢を。\nもう一度走りだすことを、どうか、ハチロクさんと共に」\n1834 = "「小春那孩子最後的夢想——再一次行駛在鐵軌上。請您與八六小姐務必一起替她實現」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「こはる――さん。ですか」\n1811 = "「她叫做小春是嗎」" \n\n# monologue\n# JP: きっと愛されていたのだと、\nその名を聞くだけで強く感じる。\n2728 = "聽這名字就能感覺到，她肯定備受愛戴。" \n\n# monologue\n# JP: 取り残される痛みがズキズキ、\n我がことのように僕を苛む。\n2403 = "她不能再次行駛的遺憾就像是我自己的感情一樣，不停刺痛著我的心。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「きっと、優しい\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だったのでしょうね」\n1818 = "「她肯定是一位很溫柔的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" \n\n# 【技工】\n# display as 技工\n# JP: 「優しく、誇り高い子でした。\n走ることを、一番の喜びにしていました」\n1813 = "「她既溫柔，又自傲。能行駛在鐵路上就是她最大的喜悅」" \n\n# monologue\n# JP: だからどうか、と――淵さんの目が言っている。\nその目を真っ直ぐ、受け止められない。\n2509 = "我從淵先生的目光中，讀出了他殷切的希望。但是我沒有辦法正視那熾熱的眼神。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「お任せ――ください」\n2023 = "「請——放心交給我吧」" \n\n# monologue\n# JP: それでも、口はそう動く。\n言葉を発し、笑みさえ見事に形取る。\n2316 = "儘管如此，我還是回答了他，甚至還面帶微笑。" \n\n# monologue\n# JP: （ああ……僕は――）\n2857 = "（啊……我一直都——）" \n\n# monologue\n# JP: 生きながらにして死んでいた。\n死んでいながら、生きてるフリを続けてた……\n2648 = "活得像行屍走肉一般。心已經死去，卻還假裝活著……" \n\n# monologue\n# JP: その日々はきっとまだ完全には終わってなくて、\nだから今もまた、こう出来ている。\n2486 = "我到現在也沒有完全擺脫這樣的生活，所以現在才變成這樣。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ハチロクとともに、僕は必ず。\n[ハチロクニイマル,3]8620を、そして[ゴーハチロクニイサン,4]58623を、もう何度でも、走らせます」\n1885 = "「我一定會和八六一起完成她的夢想。我會讓８６２０和５８６２３一次又一次行駛在鐵路上」" \n\n# monologue\n# JP: 心の底から、そう誓いたい。\n本心だけれど、本心ではない。\n2516 = "我打從心底這麼發誓，但是卻有些心虛。" \n\n# monologue\n# JP: 根深い疑い――あるいは恐怖が、\n自分自身の言葉を、思いを、信じ切らせてくれはしない。\n2537 = "我的心中有一種根深蒂固的懷疑——或者說是恐懼。這讓我無法完全相信我自己的話語和想法。" \n\n# 【技工】\n# display as 技工\n# JP: 「ありがたい」\n2101 = "「非常感謝」" \n\n# monologue\n# JP: 僕の手が、淵さんの手に包み込まれる。\nやけどしそうな熱さを感じる。\n2652 = "淵先生的雙手捂著我的手。我感覺他手中傳來的熱量彷彿要將我燙傷一般。" \n\n# monologue\n# JP: いや、違う――淵さんがひどく、驚いた顔――\n僕が、冷えきってしまっているのだ。\n2259 = "不對——淵先生的表情非常驚訝——是我的手太冷了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうするためにも――写真を、\nもう少し撮ってきますね」\n1979 = "「為了能完成她的夢想——我得去多拍拍照片」" \n\n# 【技工】\n# display as 技工\n# JP: 「ああ、ええ、そうですね」\n1776 = "「啊，嗯，說的是」" \n\n# monologue\n# JP: 一礼をして、歩き出す。\n2490 = "我向他行一禮，然後轉頭邁出步伐。" \n\n# monologue\n# JP: 動く。動こう。\n責任で自分を埋めてしまおう。\n2505 = "我得採取行動才行。我得讓自己扛起責任。" \n\n# monologue\n# JP: （そうだ、責任を負っているなら……\n僕は、投げ出さないで済む）\n2867 = "（是啊，只要我的肩上背負著責任……我就不會拋下這一切）" \n\n# monologue\n# JP: 縛られたなら、崩れずに済む。\n崩れずいれば、僕でも、少しは役立てる。\n2376 = "只要有任務在身，我就不會崩潰。這樣一來，即使是我這種人也能起到一點作用。" \n\n# monologue\n# JP: 汰斗さんが僕に教えてくれた。\n誰かの役に立つことこそが――\n2797 = "這些都是汰斗先生教會我的。我必須去幫助別人——" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「双鉄様っ！？　大丈夫ですか？」\n2098 = "「雙鐵少爺！？您沒事吧？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ハチロクか」\n1933 = "「是八六啊」" \n\n# monologue\n# JP: 不安げな顔。\n僕を支えてくれるてのひら。\n2409 = "她攙扶著我，滿臉擔憂。" \n\n# monologue\n# JP: 小さい、可愛い、温かい。\n素直に思えて――心の底から、ほっとする。\n2415 = "她的手好小，好可愛，好溫暖——這讓我長長地舒了一口氣。" \n\n# monologue\n# JP: （ああ……良かった。僕はそこまで――\nそこまで卑怯な恥知らずでは、無かったらしい）\n2860 = "（啊啊……太好了。看來我還沒有卑鄙不知廉恥到這個地步）" \n\n# monologue\n# JP: ぐらぐらと揺れる思考は、自分に疑いをかけていた。\n2526 = "我模糊的意識質疑著自己。" \n\n# monologue\n# JP: ハチロクに強い好意を抱いた理由がただの、\n幻想にあるのではなかったか――と。\n2813 = "難不成——我對八六產生的強烈好感，只是我的幻想罷了。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「お顔が――真っ青になってます。\nレールショップに……いえ、右田の家に戻りましょう」\n1872 = "「您的臉色——怎麼這麼蒼白。您先回鐵路商店……不，先回右田家吧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なにをバカな」\n1708 = "「別說傻話」" \n\n# monologue\n# JP: いつもの自分を必死で演じる。\nハチロクに、余計な不安を与えたくない。\n2518 = "我拚命地扮演著往常的自己，不想給八六帶去多餘的負擔和不安。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「この状態は、今日この日にしか撮れんのだろう？」\n2061 = "「過了今天就拍不到現在這個狀態的照片了吧？」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「それは左様でございますが――\nああ！　でしたら、わたくしが撮っておきます」\n1874 = "「您說的沒錯，但是——啊！既然這樣，我來替您拍照片吧」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いや――」\n1634 = "「不——」" \n\n# monologue\n# JP: 言われて、不意に思いつく。\n2727 = "聽她這麼說，我突然想到。" \n\n# monologue\n# JP: そうしたい――\nそうすればきっと、心のぐちゃぐちゃを整頓できる。\n2713 = "突然想這麼做——這樣一來，我就可以稍微整理一下腦海中混亂的思緒。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ならば、お前を撮らせてくれ。\nガスランプをひとつ、借りてこれるか？」\n2069 = "「還是讓我拍你吧。你能借來一盞噴燈嗎？」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「……かしこまりました」\n1399 = "「……好的」" \n\n# monologue\n# JP: 満足させて終わらせよう。\nそんな気持ちがハチロクの顔ににじみ出る。\n2444 = "從八六的表情看得出來，她想滿足我的要求，好讓我早點結束工作。" \n\n# monologue\n# JP: が、そんな表情すら愛らしい。\n僕はきちんと、そう感じている。\n2305 = "但是連她這樣的表情，在我眼中都是那麼惹人憐愛。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「それで、どのようにいたしましょうか？」\n1923 = "「於是，要拍什麼樣的照片呢？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ……っと、\x%l台枠;#00ffc040;台枠%l;#;そのものが一番いいな。\nあれなら、誰の邪魔にもならん」\n1766 = "「啊啊……這個嘛，還是拍\\x%l台枠;#00ffc040;車架%l;#;最好。這樣不會干擾到別人的工作」" \n\n# monologue\n# JP: 日ノ本車輌に送られていくのを待つだけの、\n歪み、傷つきまくった\x%l台枠;#00ffc040;台枠%l;#;。\n2801 = "那個將要送去日本車輛製造的傷痕累累、已經變形了的\\x%l台枠;#00ffc040;車架%l;#;。" \n\n# monologue\n# JP: 今は誰も見向きも触れもしてないそれに、\nハチロクを連れて、近寄っていく。\n2503 = "我帶著八六，走近那個誰都不會去看不會去摸的車架。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「適当な油汚れを、ガスランプで炙り溶かしだしてくれ。\nお前は綺麗な絵になるし、説明のための良い写真となる」\n1685 = "「你先用噴燈把這些油汙烤化吧。你本來就很上相，拍下來之後也方便解釋這是在做什麼工作」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「なんでしょう。\nあまり褒められた感じもいたしませんが」\n1980 = "「為什麼我感覺這並不像是在誇我呢」" \n\n# monologue\n# JP: 言いつつも、顔は素直にはにかんでいる。\n2424 = "她雖然這麼說，臉上卻泛起羞澀的笑容。" \n\n# monologue\n# JP: ハチロクはちょこちょこ動きまわって、\n\x%l台枠;#00ffc040;台枠%l;#;の内側にくるり、入り込む。\n2333 = "八六身手矯健地鑽進了\\x%l台枠;#00ffc040;車架%l;#;的內部。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「せっかくですので、\n普段は検修できないところにいたしましょう」\n2100 = "「難得有這個機會，就來看看平常沒有維修到的部位吧」" \n\n# monologue\n# JP: その目がス――と真剣になり、\nガスランプの火が、\x%l台枠;#00ffc040;台枠%l;#;の黒を染めていく。\n2417 = "她的表情非常認真，噴燈的火刺向了\\x%l台枠;#00ffc040;車架%l;#;上黑色的油塊。" \n\n# monologue\n# JP: （じゅっ――じわっ――）\n2863 = "（嗞——嗞——）" \n\n# monologue\n# JP: ああ、やはり。\nガスの火に照らされるハチロクの顔は、美しい。\n2386 = "啊，果然。煤氣燃燒產生的火焰照亮了八六的臉，真是美極了。" \n\n# monologue\n# JP: カメラレンズは世界の余分を切り落とし、\n僕とハチロクとだけを一瞬に閉ざしてくれる。\n2693 = "相機鏡頭好像將世界上的其他一切都排除在外，將我和八六定格在一瞬之中。" \n\n# monologue\n# JP: （パシャっ）\n# 2862 = "（喀嚓）" \n\n# monologue\n# JP: だから、シャッターも一度だけ。\n2564 = "所以，我只按了一次快門。" \n\n# monologue\n# JP: 心の中にもハチロクを、\nしっかりと焼き付けられるよう――っ！？\n2513 = "我想就這樣把八六的模樣印在我心中——嗯！？" \n\n# 【日々姫】\n# display as 日日姬\n# JP: 「なんねっ！？　こん臭いっ」\n1858 = "「怎麼了！？這是什麼臭味」" \n\n# monologue\n# JP: 異臭。\nハチロクが焦がし溶かした、油の向こうに。\n2249 = "一股惡臭擴散開來。是從八六燒糊融化的油那裡傳出來的。" \n\n# monologue\n# JP: この臭いを僕は知っている。\n僕は――間近に、いやというほど、嗅がされたから。\n2548 = "我聞到過這種臭味。我曾經被迫在近距離聞到過這味道。" \n\n# monologue\n# JP: （ああ……これは……\n髪の毛の、焼ける臭いだ――）\n2859 = "（啊……這是……毛髮被燒焦的味道——）" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「双鉄様っ――大丈夫ですか！？」\n2096 = "「雙鐵少爺——您沒事吧！？」" \n\n# monologue\n# JP: 火と雨。\n重さ。軋みと痛み。\n2667 = "火焰，雨水。身體沉重疼痛。摩擦聲。" \n\n# monologue\n# JP: 溢れてくるもの。鉄の味。\n髪の毛と――そうして、肉との、焼け焦げる臭い。\n2626 = "汩汩流出的什麼東西。鐵鏽味。毛髮——還有肉燒焦的臭味。" \n\n# monologue\n# JP: （ドサっ）\n# 2854 = "（咚）" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「双鉄様ーーーーっ！！！」\n2094 = "「雙鐵少爺——————！！！」" \n\n# monologue\n# JP: （カトン、トトン、\nタタン、タタン――）\n2855 = "（哐嘁、哐嘁、哐嘁、哐嘁——）" \n\n# monologue\n# JP: \x%l列車;#00ffc040;列車%l;#;の音。\nずっと、耳にし続けていた音。\n83 = "\\x%l列車;#00ffc040;列車%l;#;運行的聲音在耳畔轟隆作響。" \n\n# monologue\n# JP: けれどもハチロクと出会ってからは、\nほとんど、聞かずに済んでいた音――\n2607 = "明明自從與八六相遇之後，就基本沒有聽到過這聲音了——" \n\n# monologue\n# JP: （いや……）\n2846 = "（不……）" \n\n# monologue\n# JP: 苦笑、する。\nせざるを得ない。\n2474 = "我不得不苦笑了起來。" \n\n# monologue\n# JP: 事実を僕は、知ってしまったのだから。\n2391 = "因為我知道了這是為什麼。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「毎日のように聞いていたのだな。\nこれも――[ハチロク,3]8620が響かせる音だったのだから」\n1900 = "「我幾乎每天都在聽著這聲音啊。因為——這也是[八六,3]８６２０所帶給我的聲音」" \n\n# 【路子】\n# display as 路子\n# JP: 「ハチロク？」\n1700 = "「八六？」" \n\n# monologue\n# JP: 路子と、僕と、\x%l客車;#00ffc040;客車%l;#;にふたり。\n父さんと母さんの姿は無い。\n2495 = "我和路子兩人坐在\\x%l客車;#00ffc040;客運車廂%l;#;中，身邊沒有父親和母親的身影。" \n\n# monologue\n# JP: ホっとする。\n記憶ではなくてただの夢だと――確認出来て。\n2469 = "想到這並不是記憶中的景象，而是一場夢——我鬆了一口氣。" \n\n# 【路子】\n# display as 路子\n# JP: 「ハチロクって、あのお人形？」\n1699 = "「八六就是那個人偶？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「まぁ……な」\n2004 = "「算是……吧」" \n\n# monologue\n# JP: だから、不思議とも思わない。\n路子がハチロクを知っていたとて。\n2563 = "所以，我也不奇怪為什麼路子會知道八六的事。" \n\n# monologue\n# JP: 不思議とはまるで思わんが……\nひりひりと、喉が渇くような不安は覚える。\n2808 = "雖然我完全不覺得詫異……但是我總有一種讓喉嚨乾涸不已的不安。" \n\n# monologue\n# JP: （何故、尋ねるのだ――\nそんなことなら、路子には伝わっているだろうに）\n2871 = "（為什麼路子要這麼問——她應該知道才對呀）" \n\n# monologue\n# JP: 夢は深層心理のあらわれ――\nふっと浮かんだ考えが、何故だかひどく恐ろしい。\n2402 = "夢境就是深層心理的反映——但這不知怎地讓我萬分恐懼。" \n\n# monologue\n# JP: だから、とにかく話し続ける。\n言葉で僕を、隙間なく埋めてしまうため。\n2725 = "總之繼續跟路子說話吧。用話語來填滿我內心的空洞。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「人形ではなく、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。\n鉄道の運行を制御する……そういう――」\n1806 = "「她不是普通的人偶，而是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。就是負責管控鐵路車輛運行的——」" \n\n# monologue\n# JP: 思っているのに、言葉に詰まる。\n1367 = "“機器”這個詞浮現在我的腦海中。" \n\n# monologue\n# JP: 「機械だ」、とは口に出したくなくて、\n代わりの言葉を、けれどもうまく見つけられない。\n2301 = "但是我沒辦法將這個詞說出口，也找不到替代的詞彙。" \n\n# 【路子】\n# display as 路子\n# JP: 「鉄道の運行をせいぎょして――\nそれなのに、事故を起こしたの？」\n2030 = "「負責管控鐵路車輛——卻引發了事故？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それは――」\n2056 = "「這是因為——」" \n\n# monologue\n# JP: 知っている。ふたごだから。\n僕の知識の全ては路子も、共有している。\n2543 = "我知道路子腦海中有我掌握的知識，畢竟我們是雙胞胎兄妹。" \n\n# monologue\n# JP: なのにどうして――何度でも浮かんでしまう疑問を、\nもう何度でも、言葉で僕は底に沈める。\n2303 = "但是為什麼——這無數次浮現在我腦海的疑問，每次都讓我陷入失落的深淵。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「事故は起こすものじゃない。\n誰も望まず、それでも、起きてしまうものだ」\n1661 = "「事故並不是由誰引發的。而是明明沒有人希望它發生，卻偏偏還是會發生」" \n\n# 【路子】\n# display as 路子\n# JP: 「ふぅん」\n# 1791 = "「嗯」" \n\n# monologue\n# JP: そう。すでに路子は知っている。\nハチロクが、意図的な\x%l脱線転覆;#00ffc040;脱線転覆%l;#;を選んだことを。\n2629 = "沒錯。路子肯定早已知曉，八六是故意讓列車\\x%l脱線転覆;#00ffc040;脫軌傾覆%l;#;的。" \n\n# monologue\n# JP: 乗客乗員の全滅を防ぐそのために――\n犠牲を抑えるそのために、あえての事故を起こしたことを。\n2411 = "她是為了避免讓所有乘客與列車工作人員遇難——為了把犧牲降到最低才造成了這場事故。" \n\n# 【路子】\n# display as 路子\n# JP: 「そーちゃんはさ」\n1835 = "「小雙啊」" \n\n# monologue\n# JP: きょとん、と路子が首を傾げる。\n本当にわからないという顔をしている。\n2781 = "路子歪了歪頭。她好像真的不理解我的意思。" \n\n# 【路子】\n# display as 路子\n# JP: 「ゆるしたいって思ってる？\nゆるされたいって思ってる？」\n1686 = "「你想原諒她嗎？你想被原諒嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「…………どうだろうな」\n1393 = "「…………誰知道呢」" \n\n# monologue\n# JP: 両方であるという気もするし、両方違うという気もしてる。\nだから、必死に考える。\n2552 = "我覺得兩者都有，但又覺得兩者都不對。所以我絞盡腦汁地思考。" \n\n# monologue\n# JP: 知ってはいても、答えが無いから問うてきている――\nただそれだけのことと気づいて。\n2546 = "我終於明白——路子之所以一次次地提問，只是因為這些問題雖然我們心裡明白，卻又始終找不到答案。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……許すも許さないもなく。誰も……\n誰かに罪があったなど、思いたくないのかもしれん」\n1397 = "「……不是原諒不原諒的問題。我或許只是不想認為誰是有罪的」" \n\n# 【路子】\n# display as 路子\n# JP: 「それって、わすれちゃいたいってこと？」\n1881 = "「意思就是你想忘掉過去？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n# 2105 = "「！」" \n\n# monologue\n# JP: かも、知れん。\n思えば言葉が、紡げなくなる。\n2337 = "八成是這樣。想到這，我無言以對。" \n\n# monologue\n# JP: 忘れることは、路子を置き去りにすることだ。\n決して望まぬことであるのに――忘れたいとも、思ってる。\n2428 = "如果我忘卻了過去，就意味著我拋棄了路子。我絕對不能忘記過去——但是我的心中卻渴望如此。" \n\n# monologue\n# JP: （何故、だ――何故、僕は）\n2870 = "（為什麼——為什麼我）" \n\n# 【路子】\n# display as 路子\n# JP: 「わすれちゃいたいから……\nそーちゃんは、あのお人形を、好きになったの？」\n1804 = "「因為小雙想要忘卻過去……所以才會喜歡上那個人偶嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「――」\n1386 = "「——」" \n\n# monologue\n# JP: 言われたくない。聞きたくない。答えたくない。\nだから、路子に――全てを語ってもらいたい。\n2477 = "我不想被她指出這點，我不想聽，我不想回答。所以——我想要讓路子繼續說出一切。" \n\n# monologue\n# JP: 矛盾と混乱。路子と僕とで、それを増幅しあってる。\n吐き気がするほど気持ち悪くて、けれども耳を塞げない。\n2497 = "我和路子間的對話，加劇了我心中的矛盾和混亂。這讓我難受得想要嘔吐，但是卻沒辦法遮住耳朵。" \n\n# 【路子】\n# display as 路子\n# JP: 「そうなんだよね？\nでなければ、お人形なんて、好きになったりしないよね」\n1841 = "「就是這樣吧？不然小雙不可能喜歡上人偶呀」" \n\n# monologue\n# JP: 疑問と、確信が入り交じっている。\nそれは、僕の心のきっと、一番正直なあらわれだ。\n2510 = "我心中的疑問和確信交織在一起。這一定是我心中想法的最好體現。" \n\n# 【路子】\n# display as 路子\n# JP: 「一番こわいの、自分のものにしちゃったら、\nこわがらないですむもんね、思い出さないですむもんね」\n1735 = "「只要把自己最害怕的東西占為己有，就不用再害怕了，不用再回想起來了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「違う……と、思う」\n1688 = "「你說的……不對」" \n\n# monologue\n# JP: 声を、吐く。\n意思という指を喉に突っ込み、無理矢理のように吐き戻す。\n2538 = "我的意識就像一根手指一般插入我的喉嚨深處，強行讓我把話語吐了出來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「それも――少しは、あるかもしれんが――。\nそれだけでは、無い」\n1741 = "「可能——我確實有一點這樣的想法——但並不只是這樣」" \n\n# 【路子】\n# display as 路子\n# JP: 「ちがうの？　そうなの？　やっぱりなの？」\n1643 = "「不是嗎？真的嗎？確定不是嗎？」" \n\n# monologue\n# JP: 喉から――心の一番底から。\n2507 = "我從內心深處一點一點把話語醞釀出來，經過喉嚨傾吐而出。" \n\n# monologue\n# JP: 絞るようにして出した言葉を、\n路子は、嬉々として受け入れる。\n2778 = "路子欣然接受了我的話。" \n\n# 【路子】\n# display as 路子\n# JP: 「だけど、それもちがうよ？　そーちゃん。\nお人形だって、こわれちゃうんだよ？」\n1737 = "「可是這樣也不對呀，小雙。人偶也是會壞掉的哦」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n# 2105 = "「！」" \n\n# monologue\n# JP: 路子は、僕だ。\n僕の恐れを知っている。\n2776 = "路子就是我。她知道我心中的恐懼。" \n\n# monologue\n# JP: あるいは、それを、残酷に剥き出しに突きつけて――\nもしも過ちであるのなら、きっと、正そうとしてくれる。\n2558 = "或者說，她把赤裸裸的殘酷現實擺在我面前——如果其中有什麼錯誤，她會指正我。" \n\n# 【路子】\n# display as 路子\n# JP: 「“お人形になら置いてかれない”\n――そんなの、そーちゃんの思い込みだよ？」\n1391 = "「“人偶是不會拋下我的”——這只是小雙一廂情願的想法哦」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ――」\n1935 = "「是啊——」" \n\n# monologue\n# JP: やはり、かと。絶望とともに思ってしまう。\nそう思ってしまう自分自身に、深い絶望を感じてしまう。\n2504 = "我帶著絕望，認清了這個事實。同時也對這樣的自己感到絕望。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕は――だから――\nハチロクを好きになったのか？」\n1916 = "「所以——我才會喜歡上八六？」" \n\n# monologue\n# JP: 人形なのに。\n人形だから。\n2603 = "明明她是個人偶。正因為她是個人偶。" \n\n# monologue\n# JP: 僕を、たったひとり遺して、\n先に逝ったり決してしないと――そう信じたから？\n2390 = "因為我相信——她一定不會先我一步撒手西去，不會留下我一個人？" \n\n# 【路子】\n# display as 路子\n# JP: 「わからないの？　そーちゃんのことなのに」\n1932 = "「明明是小雙自己的感情，卻不清楚嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「わからないんだ。本当に。\n僕の、僕自身のことなのに」\n1886 = "「我不清楚啊。明明是自己的感情」" \n\n# 【路子】\n# display as 路子\n# JP: 「ふぅん？」\n1754 = "「哦？」" \n\n# monologue\n# JP: 路子が、力なく笑う。\n2782 = "路子無力地笑了笑。" \n\n# monologue\n# JP: 戸惑ったように、あきれたように、\nあるいは、同情するように。\n2588 = "既像是困惑，又像是無語，也可能是在同情我。" \n\n# 【路子】\n# display as 路子\n# JP: 「わからないよね。好きなんて。\nみちも、そーちゃんも、こどもだもんね」\n1992 = "「畢竟我和小雙都是小孩子，根本不懂“喜歡”是什麼意思」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「みちっ！？」\n2037 = "「路子！？」" \n\n# monologue\n# JP: 路子の姿が掻き消える。\n車輌に一人――僕だけがぽつんと取り残される。\n2783 = "路子突然在我眼前消失不見，只剩下我一個人孤零零留在車廂內。" \n\n# monologue\n# JP: 怖い。怖い。怖い。怖い。\n僕、ひとりだけ――あのときと、まるでおんなじに。\n2426 = "好可怕，好可怕，好可怕，好可怕。就和那時候一樣——只剩下我一個人。" \n\n# 【路子】\n# display as 路子\n# JP: 「でもね、そーちゃん。みち、知ってるの。\nだからひとつだけ、思い出させて――教えてあげる」\n1679 = "「但是小雙，我呀，知道這是怎麼一回事。所以要告訴你——讓你回想起來」" \n\n# monologue\n# JP: 声だけがする。\n姿は見えない。なにも見えない。\n2550 = "我能聽到她的聲音，但是卻看不到她的身影，什麼都看不到。" \n\n# monologue\n# JP: あのときも――ああ、あのときもそうだった。\n声なき声で、路子は、僕に話しかけてた。\n2804 = "那時候——啊，那時候也一樣。那時候路子跟我說了一句最平凡的話語。" \n\n# 【路子】\n# display as 路子\n# JP: 「わすれようなんてするから苦しくなるんだよ？\nわすれようとしてわすれるなんて――できっこないのに」\n1839 = "「就是因為你想要忘記，所以才會那麼痛苦哦。人是沒辦法刻意忘記某一件事的」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「路子――」\n2033 = "「路子——」" \n\n# monologue\n# JP: 手を、伸ばす。\nどこへなどというあても無く。\n2531 = "我漫無目的地伸出了手。" \n\n# monologue\n# JP: 路子にこの手は、\n決して、届きはしないと知って――\n2605 = "明明知道，這隻手注定無法觸碰到——" \n\n# monologue\n# JP: （きゅっ）\n2866 = "（抓緊）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n# 2105 = "「！」" \n\n# 【ハチロク】\n# display as ？？？\n# JP: 「双鉄様――」\n2095 = "「雙鐵少爺——」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ハチ……ロク」\n1696 = "「八……六」" \n\n# monologue\n# JP: 手を、にぎりしめてくれている。\n2422 = "她緊緊地抓著我的手。" \n\n# monologue\n# JP: 愛おしい――と反射で思い、\nその感覚に、けれど、疑いも感じてしまう。\n2556 = "我頓時覺得她是這麼惹人憐愛——卻又不禁心生疑惑。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「悪い夢を……見てらしたのですか？」\n1861 = "「您……做噩夢了嗎？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「どう、だろう――悪い夢かな」\n1859 = "「怎麼說呢——那算是噩夢嗎」" \n\n# monologue\n# JP: 全身がぬらつくほどに汗をかいてる。\n恐ろしかった――その感情すら、けれどもどこか薄寒い。\n2624 = "汗水弄得我全身都濕透了。那份感情實在恐怖——又讓我有些發寒。" \n\n# monologue\n# JP: 極度の不安と混乱が、僕の内側で渦をまき……\n自分自身に、強い確信を持てないでいる。\n2442 = "強烈的不安和混亂縈繞在我的心頭……我沒辦法得出一個明確的答案。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「わからないんだ。いい夢だったような気もする。\n路子の――妹の夢だったから」\n2018 = "「說不清楚。我感覺也能說是一場好夢，因為在夢裡見到了我的妹妹——路子」" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「まぁ」\n2058 = "「這樣啊」" \n\n# monologue\n# JP: 夢が、どんどん色あせていく。\nハチロクの手の熱さが僕を、今いるここに繋いでくれる。\n2347 = "剛才的夢漸漸在我的腦海中褪色。八六手中傳來的溫熱，把我拉回到了現實。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「でしたらきっと、いい夢だったのですよ」\n1927 = "「既然如此，那就一定是一場好夢」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そうかな――\nいいや――そうしていけば、いい話だな」\n1939 = "「是嗎——不——就當它是好夢吧」" \n\n# monologue\n# JP: 言葉で、不安を塗りつぶしていく。\nそのくらいなら、僕にも出来る。\n2534 = "我用言語覆蓋掉我心中的不安。這我還是能做到的。" \n\n# monologue\n# JP: 理性で、感情を制御する――\nそれこそが、人たる種族の、最大の強みなのだから。\n2677 = "用理性來控制感情——這正是人類這個種族最強大的地方。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「路子と僕は、ふたごだった。\nだから、あれはきっと、路子の姿をした僕だった」\n1895 = "「我和路子是雙胞胎兄妹。所以，那一定是化成路子模樣的我自己」" \n\n# monologue\n# JP: そう、過去の僕であり、僕の過去。\n僕が隠そうとしていたきっと、傷跡そのもの。\n2631 = "沒錯，她既是過去的我，也是我的過去。她想必就是我一直以來極力隱藏的傷疤。" \n\n# monologue\n# JP: ガスランプの火で炙りだされた――\n落ち着いてみれば、ただの慣れきった古傷だ。\n2340 = "冷靜下來看，那不過是被噴燈的火焰燒化遮蓋而顯現出來的——早已習慣了的舊傷疤。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「揺り戻しが、少し来ただけだ。\nそれで、不安に……いささか、不安定になってしまった」\n1733 = "「只是突然回憶起了過去而已。只是因為這個……稍微變得有些不安、情緒波動而已」" \n\n# monologue\n# JP: そう思えばいい。そうすればいい。\n大丈夫。今までだって、そうできていた。\n2798 = "這樣想就好了。就當作是這樣吧。沒關係，一直以來我都是這麼過來的。" \n\n# monologue\n# JP: 自分のことを自分で決める。\n当然のことを、すれば、いいのだ。\n2733 = "自己來決定自己的未來。這是理所應當的，只要這樣就好了。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「でしたら、不安を――\nどうか、わたくしにもお分けください」\n1924 = "「既然如此——請讓我分擔一點您的不安」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ハチロク……」\n1697 = "「八六……」" \n\n# monologue\n# JP: ハチロクの手が、僕の手を解き伸びてくる。\n僕の頭を掻き抱こうと、大きく大きく広げてくれる。\n2335 = "八六鬆開了我的手，隨後向我張開雙臂，彷彿想要把我擁入懷中，撫摸我的頭。" \n\n# monologue\n# JP: そこには確かなぬくもりがあり、心やすらぐ時間があろう。\n――が。\n2746 = "要是我就這樣投入她的懷抱，那將是多麼溫暖，多麼令人安心——但是。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いいや、平気だ。\n夢ごときで、お前を煩わせたくもない」\n1966 = "「沒事，我沒關係的。我可不想因為一場夢而勞煩你傷神」" \n\n# monologue\n# JP: 身を起こす。\nそうしたくなど、無いのだが。\n2541 = "我直起了身。雖然我並不想這麼做。" \n\n# 【ハチロク】\n# display as 八六\n# JP: 「双鉄様――」\n# 2095 = "「雙鐵少爺——」" \n\n# monologue\n# JP: 今は、その手に甘えられない。\n僕には、そうする資格が無い。\n2533 = "我現在不能去依賴她的懷抱。我沒有這麼做的資格。" \n\n# monologue\n# JP: ハチロクを好きという感情が、僕の卑怯な逃避でないと。\n――そうと、揺るぎなく決められるまで。\n2689 = "直到我可以毫不猶豫地確定我是真心喜歡她，確定我不是在怯懦地逃避為止。" \n