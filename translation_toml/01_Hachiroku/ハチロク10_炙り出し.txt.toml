[script]
# lines: 395 
# 【ポーレット】
# display as 波萊特
# JP: 「おはようございます！\n日ノ本車輌さんから返信、来てます」
1930 = "「Chào buổi sáng!\nCó thư phản hồi từ công ty Toa xe Hinamoto rồi ạ.」"
# monologue
# JP: レールショップに入るやいなや、\nポーレットが笑顔で迎えてくれる。
2251 = "Ngay khi vừa bước vào Rail Shop,\nPaulette đã tươi cười chào đón chúng tôi."
# monologue
# JP: ハチロクの肩がぴくん、と動く。
2330 = "Vai Hachiroku khẽ giật mình một cái."
# 【ハチロク】
# display as 八六
# JP: 「先方は、どのように？」
1675 = "「Bên đó phản hồi như thế nào ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「提示の内容で全てＯＫとのことです。\nそれでまず、先方が\\x%l台枠;#00ffc040;台枠%l;#;を送ってくれるそうです」
1673 = "「Họ nói rằng mọi nội dung đề xuất đều OK.\nVà trước tiên, bên đó sẽ gửi \\x%l台枠;#00ffc040;khung gầm%l;#; đến cho chúng ta.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　向こうが先送りしてくれるのか？」
1797 = "「Hửm? Bên đó sẽ gửi đến trước sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「もし大丈夫ならって、こっちから希望を出しました。\n万一……縁起でも無い話になっちゃいますけど――」
1888 = "「Bên mình đã đưa ra nguyện vọng là nếu được thì mong họ làm vậy.\nVạn nhất......dù nói ra thì hơi xui xẻo——」"
# monologue
# JP: ポーレットの声が、申し訳無さそうに沈み込む。
2644 = "Giọng Paulette trầm xuống, có vẻ đầy áy náy."
# 【ポーレット】
# display as 波萊特
# JP: 「[ハチロクニイマル,3]8620に[ゴーハチロクニイサン,4]58623の\\x%l台枠;#00ffc040;台枠%l;#;が移植出来ない場合にも――\nそれなら、\\x%l台枠;#00ffc040;台枠%l;#;一つの往復輸送費だけで済みますから」
2008 = "「Trong trường hợp không thể cấy ghép \\x%l台枠;#00ffc040;khung gầm%l;#; của 58623 cho 8620——\nthì lúc đó, chúng ta cũng chỉ mất chi phí vận chuyển hai chiều cho một cái \\x%l台枠;#00ffc040;khung gầm%l;#; thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
1712 = "「Thì ra là vậy.」"
# monologue
# JP: 最悪に備えることもまた、\n経営者の資質であり、責務だろうと理解する。
2545 = "Tôi hiểu rằng, việc chuẩn bị cho tình huống xấu nhất,\ncũng là một tư chất và trách nhiệm của người điều hành."
# monologue
# JP: 市長との兼職を解除してからこちら、\nポーレットはぐんぐんと、社長らしさを増してるようだ。
2735 = "Kể từ khi thôi kiêm nhiệm chức thị trưởng,\nPaulette ngày càng ra dáng một giám đốc hơn hẳn."
# monologue
# JP: （……あるいは、宝生稀咲との\n顔合わせが増えた影響も大きいのかもしれんな）
2824 = "（......Hoặc có lẽ, việc thường xuyên chạm mặt\nvới Houshou Kisaki cũng có ảnh hưởng lớn.）"
# monologue
# JP: 宝生稀咲はあれ以来、レールショップに機関庫に、\n頻繁に足を運んでいる。
2736 = "Kể từ dạo đó, Houshou Kisaki thường xuyên\nlui tới Rail Shop và xưởng đầu máy."
# monologue
# JP: 一番話す相手はやはり日々姫のようだが、ポーレットや僕、\nハチロクやれいなとも熱心に――っと？
2413 = "Người cô ấy nói chuyện nhiều nhất có vẻ vẫn là Hibiki, nhưng cô ấy cũng\nrất nhiệt tình với Paulette, tôi, Hachiroku và Reina——hửm?"
# 【双鉄】
# display as 雙鐵
# JP: 「れいなは整備か？」
1981 = "「Reina đang làm bảo dưỡng sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。今日もバーベキュー\\x%l列車;#00ffc040;列車%l;#;、\n九割がたは席埋まってますし、張り切ってくれてます」
1940 = "「Vâng. Hôm nay \\x%l列車;#00ffc040;tàu%l;#; BBQ cũng\nkín chỗ đến chín phần rồi, nên em ấy đang rất hăng hái ạ.」"
# monologue
# JP: 8620牽引時の、あの連日の満席状態。
2392 = "Tình trạng kín chỗ liên tục mỗi ngày trong thời gian 8620 kéo tàu."
# monologue
# JP: サービス開始直後の特需に過ぎなかったのかもしれないが、\nやはり、乗客減は気にかかる。
2810 = "Có thể đó chỉ là nhu cầu tăng đột biến ngay sau khi bắt đầu dịch vụ,\nnhưng quả thực, việc lượng khách giảm sút vẫn khiến tôi bận tâm."
# 【双鉄】
# display as 雙鐵
# JP: 「九割がた、か」
1851 = "「Chín phần, sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。九割がた。\nですから改装も、出来るだけ早く取り組めればって」
1949 = "「Vâng. Chín phần.\nVì vậy em muốn tiến hành việc cải tạo càng sớm càng tốt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1791 = "「Ừm.」"
# monologue
# JP: 危機感も、れいなが言ってた適材適所ということも、\nポーレットはすでにして理解してくれているようだ。
2696 = "Cảm giác khủng hoảng, và cả việc \"dụng nhân như dụng mộc\" mà Reina đã nói,\ncó vẻ Paulette đều đã hiểu rõ."
# 【ハチロク】
# display as 八六
# JP: 「しかしながら、\n焦ってことを仕損じては元も子もございません」
1738 = "「Tuy nhiên,\ndục tốc bất đạt, nếu hỏng việc thì xôi hỏng bỏng không đấy ạ.」"
# monologue
# JP: ハチロクの凛とした声。\nポーレットの顔もまた引き締まる。
2646 = "Giọng nói dõng dạc của Hachiroku vang lên.\nKhuôn mặt Paulette cũng trở nên nghiêm nghị."
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。先方からも、\nいくつか、決めて欲しい点があるって預かってます」
2021 = "「Đúng vậy nhỉ. Phía bên kia cũng\nnhờ em quyết định một vài điểm nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「移送手段に関してか？」
2088 = "「Liên quan đến phương tiện vận chuyển sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それもありますし、移送する中身についても」
1636 = "「Cũng có cái đó, và cả về nội dung cần vận chuyển nữa ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「というと？」
2059 = "「Nghĩa là sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%l台枠;#00ffc040;台枠%l;#;を単体で送るのか、\n\\x%l動輪;#00ffc040;動輪%l;#;や\\x%l先台車;#00ffc040;[せんだいしゃ,2]先台車%l;#;もつけるのか――ってことです」
1676 = "「Họ hỏi là chỉ gửi riêng \\x%l台枠;#00ffc040;khung gầm%l;#; thôi,\nhay là gửi kèm cả \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; và \\x%l先台車;#00ffc040;giá chuyển hướng trước%l;#; nữa——là vậy đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1791 = "「嗯」" 
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;形の\\x%l台枠;#00ffc040;台枠%l;#;には、車軸や\\x%l軸箱;#00ffc040;[じくはこ,1]軸箱%l;#;、\\x%l軸箱守;#00ffc040;[じくはこもり,2]軸箱守%l;#;といった\nパーツ群によって、\\x%l動輪;#00ffc040;動輪%l;#;が直接取り付けられている。
79 = "Trên \\x%l台枠;#00ffc040;khung gầm%l;#; của dòng \\x%l8620;#00ffc040;8620%l;#;, \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; được lắp đặt trực tiếp\nthông qua các cụm linh kiện như trục bánh xe, \\x%l軸箱;#00ffc040;hộp trục%l;#; và \\x%l軸箱守;#00ffc040;giá dẫn hướng hộp trục%l;#;."
# monologue
# JP: ずっと走ってなかったものだ、\nそのまま送って貰っても、調整はやはり必要だろうが……
2679 = "Một thứ đã không chạy trong thời gian dài,\ndù có gửi nguyên vẹn đến thì vẫn cần phải điều chỉnh lại, nhưng mà......"
# 【双鉄】
# display as 雙鐵
# JP: 「送ってもらった場合には、それをセットで使って、\nこちらからもセットで送り返す形になるか？」
2015 = "「Trong trường hợp họ gửi đến, chúng ta sẽ sử dụng nguyên bộ đó,\nrồi gửi trả lại nguyên bộ cho họ sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、好きに選んで――いいとこ取りをさせてもらって\nかまわないそうです。それこそ、ピンの一本まで」
1650 = "「Dạ không, họ bảo cứ chọn tùy thích——chọn lấy những phần tốt nhất\ncũng không sao đâu ạ. Thậm chí là đến từng cái chốt một.」"
# 【双鉄】
# display as 雙鐵
# JP: 「選択肢が増えることはありがたい――が……\nそうなると、移送コストは[かさ]嵩むのだよな？」
1951 = "「Có thêm lựa chọn thì cũng tốt——nhưng mà......\nnếu vậy thì chi phí vận chuyển sẽ tăng lên đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。場所も重量も――\\x%l動輪;#00ffc040;動輪%l;#;一つでも増えると……\n[へいしゅ,1]丙種輸送だとやっぱり、結構、[かさ]嵩んじゃいます」
1946 = "「Vâng. Cả về không gian lẫn trọng lượng——chỉ cần thêm một cái \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; thôi thì......\nNếu là vận chuyển loại Bính thì quả thực chi phí sẽ đội lên khá nhiều ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「へいしゅゆそう？」
1704 = "「Vận chuyển loại Bính?」"
# 【ハチロク】
# display as 八六
# JP: 「線路を使わず、船やトレーラーによって、\n車輌を運搬することです、双鉄様」
1836 = "「Là việc vận chuyển phương tiện bằng tàu thủy hoặc xe kéo\nmà không sử dụng đường ray ạ, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ……海軍と陸軍のイメージか？」
1784 = "「Ừm......giống như hình ảnh của hải quân và lục quân sao?」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
1751 = "「Dạ?」"
# monologue
# JP: ぽかん、とハチロクの口が開く。
2328 = "Hachiroku há hốc mồm ngơ ngác."
# monologue
# JP: 僕を見、ポーレットを見、また僕を見て。\nややあり、クスクスと笑い出す。
2407 = "Em ấy nhìn tôi, nhìn Paulette, rồi lại nhìn tôi.\nMột lúc sau, em ấy bật cười khúc khích."
# 【ハチロク】
# display as 八六
# JP: 「お間違えですよ？　双鉄様。\n兵隊さんの兵種ではなく、甲乙丙の[へいしゅ,1]丙種です」
2099 = "「Ngài nhầm rồi ạ? Ngài Soutetsu.\nKhông phải là binh chủng của quân đội, mà là loại Bính trong Giáp Ất Bính ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、そちらか。甲類、乙類の甲乙丙か」
1774 = "「Gì chứ, ra là vậy à. Giáp Ất Bính trong loại Giáp, loại Ất sao.」"
# monologue
# JP: 焼酎であれば類の違いは、蒸留方法の違いを示す。\n移送についても――そうか、同じことであるのか。
2299 = "Nếu là rượu shochu thì sự khác biệt về loại chỉ ra sự khác biệt về phương pháp chưng cất.\nVề việc vận chuyển——ra vậy, cũng tương tự thế sao."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、甲……\\x%l甲種輸送;#00ffc040;甲種輸送%l;#;、でいいのかな？　それか、\n乙種輸送かは、線路を使っての輸送のことだろう」
2081 = "「Nếu vậy, loại Giáp......\\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#;, có đúng không? Hoặc là,\nvận chuyển loại Ất, chắc là việc vận chuyển bằng đường ray nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「左様でございます、双鉄様。\n甲種、乙種ともに、線路を使って車輌を輸送します」
1875 = "「Đúng là như vậy ạ, ngài Soutetsu.\nCả loại Giáp và loại Ất đều sử dụng đường ray để vận chuyển phương tiện.」"
# monologue
# JP: 真面目な声で言いながら、\nハチロクの口元はいまだわずかに、ほころんでいる。
2320 = "Dù đang nói bằng một giọng điệu nghiêm túc,\nnhưng khóe miệng Hachiroku vẫn còn hơi hé mở."
# 【ハチロク】
# display as 八六
# JP: 「\\x%l甲種輸送;#00ffc040;甲種輸送%l;#;は、輸送される車輌が、貨物機関車により、\n自分の車輪で牽引されていく輸送法です」
1384 = "「\\x%l甲種輸送;#00ffc040;Vận chuyển loại Giáp%l;#; là phương pháp vận chuyển mà phương tiện được vận chuyển\nsẽ được đầu máy hàng hóa kéo đi bằng chính bánh xe của nó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。自分の車輪で――とあえていうなら。わかった。\n乙種は、\\x%l貨車;#00ffc040;貨車%l;#;か何かにまるごと乗せての輸送だな？」
1789 = "「Ừm. Cố tình nhấn mạnh là bằng chính bánh xe của nó——thì anh hiểu rồi.\nLoại Ất là đặt toàn bộ lên \\x%l貨車;#00ffc040;toa chở hàng%l;#; hay gì đó để vận chuyển đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「さすが。ご明察です、双鉄様」
1640 = "「Không hổ danh là ngài. Ngài thật sáng suốt ạ, ngài Soutetsu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そこも、決めて欲しいっておっしゃってました。\n[ゴーハチロクニイサン,4]58623、今は[とよかわ,1]豊河の工場にあるそうなんですけど――」
1829 = "「Bên đó cũng bảo là muốn chúng ta quyết định luôn phần đó.\nNghe nói hiện tại 58623 đang ở nhà máy Toyokawa——」"
# monologue
# JP: 言いながら、ポーレットは地図を指し示す。
2642 = "Vừa nói, Paulette vừa chỉ vào bản đồ."
# monologue
# JP: 豊河を出て、[なごや,2]名児耶――東名児耶港・錦城埠頭。\n愛智県を横断するように、まるまる、路線が生きている。
2446 = "Xuất phát từ Toyokawa, đi qua Nagoya——cảng Đông Nagoya, bến tàu Kinjo.\nNguyên một tuyến đường chạy vắt ngang tỉnh Aichi vẫn còn đang hoạt động."
# 【双鉄】
# display as 雙鐵
# JP: 「すごいな。これほど長い線路が残っているのか」
1996 = "「Tuyệt thật đấy. Vẫn còn sót lại một đoạn đường sắt dài đến thế này sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「[なごてつ,2]名児鉄ですね。\\x%l帝鉄;#00ffc040;帝鉄%l;#;の路線網がずたずたになって、\n相対的に価値が上昇したのが幸いしたって聞いてます」
2054 = "「Là đường sắt Nagoya ạ. Nghe nói nhờ mạng lưới đường sắt của \\x%l帝鉄;#00ffc040;Teitetsu%l;#; bị xé nát,\nmà giá trị tương đối của nó tăng lên nên mới may mắn còn tồn tại đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これも、山間を抜ける路線だな。\nあるいは、走行不能区域にもかかっているのかな」
2053 = "「Đây cũng là tuyến đường xuyên qua núi nhỉ.\nHoặc là, nó cũng nằm trong khu vực không thể chạy tàu chăng.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2097 = "「Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっとすまん。話を寄り道させてしまったな。\nええと――」
1800 = "「Ồ xin lỗi. Làm câu chuyện bị chệch hướng mất rồi.\nÀ ừm——」"
# 【ポーレット】
# display as 波萊特
# JP: 「港までを、\\x%l甲種輸送;#00ffc040;甲種輸送%l;#;か乙種輸送かも、\nこちらで選んで構わないっていう話です」
2019 = "「Họ nói rằng việc vận chuyển đến cảng bằng \\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#; hay loại Ất,\nbên mình cứ tùy ý lựa chọn ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。ハチロクとしてはどうだ？　甲種か乙種か。\nそれと、移送をしてもらう内容についても」
1757 = "「Ừm. Ý Hachiroku thế nào? Loại Giáp hay loại Ất.\nVà cả về nội dung nhờ họ vận chuyển nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「左様でございますね――甲種、乙種で移送コストは」
2087 = "「Dạ để xem nào——chi phí vận chuyển giữa loại Giáp và loại Ất thì」"
# 【ポーレット】
# display as 波萊特
# JP: 「そこはほとんど変わりません。\n実費でやってくださるってことですし」
1695 = "「Về điểm đó thì hầu như không khác biệt ạ.\nBên đó cũng bảo sẽ tính theo chi phí thực tế.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、乙種を希望します。\n移送時のリスクも、可能な限り軽減したく思います」
2080 = "「Nếu vậy, em xin chọn loại Ất ạ.\nEm cũng muốn giảm thiểu rủi ro khi vận chuyển ở mức tối đa có thể.」"
# monologue
# JP: \\x%l機関士;#00ffc040;機関士%l;#;の僕をたて、控えてくれていたのだろうか。\n水を向けられハチロクは、流れるように話し始める。
2694 = "Có lẽ em ấy đã nhường lời để tôn trọng \\x%l機関士;#00ffc040;người lái tàu%l;#; là tôi chăng.\nĐược tôi gợi ý, Hachiroku bắt đầu trình bày một cách trôi chảy."
# 【ハチロク】
# display as 八六
# JP: 「それと、コスト的に許せば、\\x%l動輪;#00ffc040;動輪%l;#;まわり一式と……\n\\x%l先台車;#00ffc040;[せんだいしゃ,2]先台車%l;#;も運んでいただけると、助かるのですが」
2070 = "「Với lại, nếu chi phí cho phép, mong họ gửi kèm toàn bộ cụm \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; và......\ncả \\x%l先台車;#00ffc040;giá chuyển hướng trước%l;#; nữa thì sẽ giúp ích rất nhiều ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「了解です――うん。了解です。\\x%l台枠;#00ffc040;台枠%l;#;改修に失敗したら、\nコストをどれほど抑えてたところで、無意味ですからね」
2000 = "「Đã rõ——vâng. Đã rõ ạ. Nếu sửa chữa \\x%l台枠;#00ffc040;khung gầm%l;#; thất bại,\nthì dù có tiết kiệm chi phí đến đâu cũng trở nên vô nghĩa mà.」"
# monologue
# JP: どこか、自身に言い聞かせているようなその口調。
2645 = "Một giọng điệu như thể cô ấy đang tự nhắc nhở chính mình vậy."
# monologue
# JP: 相当に費用がふくらむのだろうと想像するが、\n妥協できるような問題でも無い。
2809 = "Tôi có thể tưởng tượng chi phí sẽ đội lên khá nhiều,\nnhưng đây không phải là vấn đề có thể thỏa hiệp được."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、これで決まりとしよう。\n下回り一式を、乙種輸送で移送してもらう」
2078 = "「Nếu vậy, chúng ta quyết định thế này đi.\nNhờ họ gửi toàn bộ cụm gầm xe bằng vận chuyển loại Ất.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。先方にもそのように伝えます。\n下回り一式を、乙種……乙種で、ですね」
1823 = "「Vâng. Em sẽ truyền đạt lại với bên đó như vậy.\nToàn bộ cụm gầm xe, loại Ất......loại Ất, nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「ポーレット様……」
1974 = "「Cô Paulette......」"
# monologue
# JP: いかん、ハチロクの顔色までもが曇りそうだ。
2255 = "Không ổn rồi, sắc mặt của Hachiroku cũng sắp sầm lại mất thôi."
# monologue
# JP: 経営者としての懸念もわかるが、問われて答えた判断だ。\nここは、フリでも気持よく了解してもらいたい。
2555 = "Dù hiểu được nỗi lo của một người điều hành, nhưng đây là phán đoán được đưa ra khi được hỏi.\nLúc này, tôi muốn cô ấy dù giả vờ cũng hãy vui vẻ chấp nhận."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、\n出来るのならば、そう気に病んでくれるな」
1976 = "「Paulette,\nnếu được thì xin cô đừng quá phiền lòng như vậy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？」
1750 = "「Dạ!?」"
# monologue
# JP: 心底、びっくりしたような顔。
2405 = "Một khuôn mặt ngạc nhiên từ tận đáy lòng."
# monologue
# JP: ハチロクと僕とも顔を見合わせ、\nいささかあっけにとられてしまう。
2491 = "Tôi và Hachiroku đưa mắt nhìn nhau,\ncó chút sững sờ."
# 【ポーレット】
# display as 波萊特
# JP: 「気に病むって……何をです？」
2029 = "「Phiền lòng......chuyện gì cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや……移送コストのこと……ではないのか？」
1747 = "「À không......về chi phí vận chuyển......không phải sao?」"
# 【ハチロク】
# display as 八六
# JP: 「ポーレット様の眉、このようになっておりましたよ？」
1975 = "「Lông mày của cô Paulette, ban nãy đã trở nên như thế này đó ạ?」"
# monologue
# JP: ハチロクが指で眉根を下げる。\nへちょーん、と。絵に描いたような困り顔だ。
2327 = "Hachiroku dùng ngón tay kéo cụp lông mày xuống.\nTrông ủ rũ. Một khuôn mặt rắc rối y như trong tranh vẽ."
# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ！　ごめんなさい。そういう顔、\nしちゃってたなら原因、コストとかのことじゃないです」
1753 = "「Dạ? A! Em xin lỗi. Nếu em có làm vẻ mặt đó,\nthì nguyên nhân không phải do chi phí hay gì đâu ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「違うのですか？　では、何が――」
1644 = "「Không phải sao ạ? Vậy thì, là do chuyện gì——」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの……ええと――\\x%l甲種輸送;#00ffc040;甲種輸送%l;#;」
1761 = "「Dạ......ờm thì——\\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#; ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l甲種輸送;#00ffc040;甲種輸送%l;#;？」
1385 = "「\\x%l甲種輸送;#00ffc040;Vận chuyển loại Giáp%l;#;?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたし、多分、\\x%l甲種輸送;#00ffc040;甲種輸送%l;#;って言葉に刷り込みがあって\n――パパ、その……結構な撮りテツでしたから」
1896 = "「Có lẽ em đã bị ám ảnh bởi từ \\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#;\n——Bố em, ừm......từng là một Tori-tetsu khá cuồng nhiệt ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ、そのようなご事情が」
1779 = "「A, ra là có lý do như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　今のでわかるのか？」
1860 = "「Gì vậy? Em hiểu được ý cô ấy vừa nói sao?」"
# monologue
# JP: 僕にはわからん。\nどこが納得のポイントなのか。
2479 = "Tôi thì chịu.\nKhông hiểu điểm đáng thuyết phục ở đây là gì."
# 【ハチロク】
# display as 八六
# JP: 「キュウロクたちがしばしば聞かせてくれたのです。\n\\x%l甲種輸送;#00ffc040;甲種輸送%l;#;のときには、撮りテツさんたちが凄いと」
1905 = "「Kyuroku và mọi người vẫn thường hay kể cho em nghe.\nRằng mỗi khi có \\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#;, các Tori-tetsu sẽ kéo đến đông khủng khiếp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l9600;#00ffc040;[キュウロク,4]9600形%l;#;――お前の後につくられた、\n確か、量産貨物機だったか？」
1376 = "「\\x%l9600;#00ffc040;Dòng 9600%l;#;——được chế tạo sau em,\nhình như là dòng đầu máy hàng hóa sản xuất hàng loạt phải không?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。大傑作の貨物機です。日ノ本のあらゆる場所で、\nあらゆる貨物を。恐らくは今も、輸送している子達です」
1793 = "「Vâng. Một kiệt tác đầu máy hàng hóa ạ. Các em ấy đã vận chuyển đủ loại hàng hóa,\nđến khắp mọi nơi trên đất nước Hinamoto. Có lẽ ngay cả bây giờ, các em ấy vẫn đang tiếp tục công việc đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\nならば\\x%l甲種輸送;#00ffc040;甲種輸送%l;#;に従事する機会も多かったのか」
1710 = "「Thì ra là vậy.\nVậy chắc hẳn các em ấy cũng có nhiều cơ hội tham gia \\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#; nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「左様でございますね」
1956 = "「Đúng là như vậy ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%l甲種輸送;#00ffc040;甲種輸送%l;#;を撮るのって、撮りテツには一大イベントなん――ううんっ、らしいんですよ」
1830 = "「Việc chụp ảnh \\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#; là một sự kiện trọng đại đối với các Tori-tetsu——à không, nghe nói là vậy đó ạ.」"
# monologue
# JP: “なんです”と出かけた言葉を飲み込んで、\nポーレットは僕らに教えてくれる。
2643 = "Nuốt lại câu \"là một sự kiện trọng đại\" đang chực thốt ra,\nPaulette giải thích cho chúng tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしは乗るのが好きなだけですけど、パパの影響は\nやっぱりあって。\\x%l甲種輸送;#00ffc040;甲種輸送%l;#;って聞いただけで、つい」
2092 = "「Em thì chỉ thích đi tàu thôi, nhưng quả thực vẫn chịu ảnh hưởng\ntừ bố. Nên chỉ cần nghe đến \\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#; là em lại vô tình...」"
# 【双鉄】
# display as 雙鐵
# JP: 「血が騒ぐ、といった感じか？\nそれが乙種となり、ややテンションが下がってしまった」
1883 = "「Cảm giác như máu nóng sôi sục lên sao?\nNhưng vì chuyển thành loại Ất, nên tâm trạng hơi chùng xuống một chút.」"
# 【ポーレット】
# display as 波萊特
# JP: 「みたいな感じだと思います。自覚なかったですけど――\nああ、恥ずかしい」
1847 = "「Em nghĩ là giống như vậy ạ. Dù bản thân em cũng không nhận ra——\nAa, xấu hổ quá đi mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。良いヒントをくれた。ありがたい」
1965 = "「Không đâu. Cô đã cho một gợi ý rất hay. Cảm ơn cô.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？」
# 1751 = "「哎？」" 
# monologue
# JP: ポケットから、借りっぱなしのカメラを取り出す。\nこいつも随分、僕の手に馴染んでくれた。
2508 = "Tôi lấy chiếc máy ảnh mượn mãi chưa trả ra khỏi túi.\nThứ này cũng đã trở nên khá quen thuộc với tay tôi rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「甲種がそれほどならば、乙種にも価値はあるだろう。\n無論、僕も移送や整備の状況を逐次撮るつもりでいたが」
1825 = "「Nếu loại Giáp đã như vậy, thì loại Ất chắc chắn cũng có giá trị của nó.\nĐương nhiên, tôi cũng định sẽ chụp lại toàn bộ quá trình vận chuyển và bảo dưỡng.」"
# monologue
# JP: 僕の言葉の終わりを待たず、\nぽん、とハチロクが手を打ち鳴らす。
2324 = "Chưa đợi tôi nói dứt lời,\nHachiroku đã vỗ tay cái bốp."
# 【ハチロク】
# display as 八六
# JP: 「ああ！　わかりました。乙種輸送のダイア情報を、\n撮りテツさんたちに流すのですね？」
1769 = "「A! Em hiểu rồi. Sẽ rò rỉ thông tin lịch trình vận chuyển loại Ất\ncho các Tori-tetsu đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり。情報発信の重要度は更に増しているし……\n撮りテツたちが力を貸してくれるのならば、ありがたい」
1967 = "「Đúng vậy. Tầm quan trọng của việc phát tán thông tin đang ngày càng tăng lên......\nNếu các Tori-tetsu có thể giúp một tay thì tốt quá.」"
# monologue
# JP: "蒸気のふるさと御一夜”を浸透させ、\nひいては、大九洲ＳＬ構想を成立させる。
2434 = "Khắc sâu hình ảnh \"Quê hương của hơi nước Ohimitera\" vào tâm trí mọi người,\ntừ đó, hiện thực hóa khái niệm Đại Kyushu SL."
# monologue
# JP: そのためにもっとも重要となってくるであろう要素は、\nとにもかくにも、知られることだ。
2669 = "Để làm được điều đó, yếu tố quan trọng nhất,\ndù thế nào đi nữa, vẫn là phải được nhiều người biết đến."
# 【双鉄】
# display as 雙鐵
# JP: 「それだけ長い距離の移送なら、撮って貰える機会も多い。\n撮って貰った写真はそのまま、知られるための種となる」
2060 = "「Khoảng cách vận chuyển dài như vậy, thì cơ hội để được chụp ảnh cũng nhiều hơn.\nNhững bức ảnh được chụp lại đó sẽ trở thành hạt giống để mọi người biết đến.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それ……うん。ちょっと、盲点でした」
2052 = "「Cái đó......vâng. Em hơi thiếu sót rồi.」"
# monologue
# JP: よほど感心してくれたのか、ポーレットの声が熱っぽい。
2445 = "Có vẻ như cô ấy rất ấn tượng, giọng Paulette trở nên đầy nhiệt huyết."
# 【ポーレット】
# display as 波萊特
# JP: 「すごくいいと思います。情報発信、毛利の[あき,1]安芸様とか、\n他の\\x%lまいてつ;#00ffc040;まいてつ%l;#;さん達にも頼んでみます」
1911 = "「Em nghĩ ý tưởng đó rất tuyệt. Việc phát tán thông tin, em sẽ nhờ cả\nngài Aki của Mouri và những \\x%lまいてつ;#00ffc040;chủ tàu%l;#; khác giúp đỡ nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――よろしく頼む」
1795 = "「Ừm——trăm sự nhờ cô.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……羽をむしられた鶏のようだな」
2005 = "「......Trông cứ như một con gà bị vặt trụi lông vậy.」"
# monologue
# JP: （パシャっ）
2862 = "（Tách）"
# monologue
# JP: 剥き出しになったボイラーと、\nジャッキによって持ち上げられた\\x%l台枠;#00ffc040;台枠%l;#;と。
2787 = "Lò hơi bị phơi bày trơ trọi,\nvà \\x%l台枠;#00ffc040;khung gầm%l;#; đang được kích nâng lên."
# monologue
# JP: いま\\x%l8620;#00ffc040;8620%l;#;にあるのはたったそれだけだ。\n\\x%l動輪;#00ffc040;動輪%l;#;もシリンダも何もかも、綺麗さっぱり取り払われてる。
2685 = "Những gì còn lại trên \\x%l8620;#00ffc040;8620%l;#; hiện giờ chỉ có bấy nhiêu thôi.\n\\x%l動輪;#00ffc040;Bánh xe chủ động%l;#; hay xi-lanh, mọi thứ đều đã bị tháo dỡ sạch sẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「引き換え、こちらは床をうめつくさんばかりだ」
1730 = "「Đổi lại, dưới sàn nhà thì chất đầy đến mức gần như không còn chỗ trống.」"
# monologue
# JP: （パシャっ）
# 2862 = "（喀嚓）" 
# monologue
# JP: \\x%l動輪;#00ffc040;動輪%l;#;群に、\\x%l主連棒;#00ffc040;主連棒%l;#;、\\x%l連結棒;#00ffc040;連結棒%l;#;、\\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;に滑り棒――
86 = "Cụm \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;, \\x%l主連棒;#00ffc040;thanh nối chính%l;#;, \\x%l連結棒;#00ffc040;thanh truyền động%l;#;, \\x%lクロスヘッド;#00ffc040;đầu chữ thập%l;#; và thanh trượt——"
# monologue
# JP: 取り払われた部品たちは、ひとつひとつ、\n丁寧に並べ置かれている。
2796 = "Những linh kiện bị tháo rời,\nđược xếp đặt cẩn thận từng món một."
# monologue
# JP: （おっと――）
2856 = "（Ối——）"
# monologue
# JP: その部品群へ、\nガスランプを手に技工さんが歩み寄っていく。
2244 = "Một người thợ cơ khí cầm đèn khò trên tay,\ntiến lại gần đống linh kiện đó."
# monologue
# JP: 見知らぬ技工さんではあるが、\n熟練の雰囲気を漂わせている。
2807 = "Dù là một người thợ lạ mặt,\nnhưng lại toát lên một bầu không khí của sự lành nghề."
# 【双鉄】
# display as 雙鐵
# JP: 「失礼。撮らせていただいても良いですか？」
1637 = "「Xin lỗi. Tôi có thể chụp một bức ảnh được không?」"
# monologue
# JP: コクリと頷き。\n目線も声も僕には向かず、\\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;に向けられている。
2286 = "Ông ấy gật đầu cái rụp.\nÁnh mắt và giọng nói không hướng về phía tôi, mà hướng về \\x%lクロスヘッド;#00ffc040;đầu chữ thập%l;#;."
# monologue
# JP: 手のガスランプが、どんどんと\\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;に\n近づけられて――
2284 = "Ngọn đèn khò trên tay,\nđang ngày càng tiến sát lại gần \\x%lクロスヘッド;#00ffc040;đầu chữ thập%l;#;——"
# monologue
# JP: （どんっ）
2854 = "（Bịch）"
# 【日々姫】
# display as 雙鐵＆日日姬
# JP: 『「っ！？」\n「きゃっ――ごめんなさいっ――って、あ、にぃに」』
2110 = "『「!?」\n「Á——em xin lỗi——ơ, a, anh hai.」』"
# 【双鉄】
# display as 雙鐵
# JP: 「しっ」
1799 = "「Suỵt.」"
# monologue
# JP: 日々姫の口を閉じさせて、\n驚きに手を止めさせてしまった技工さんへと黙礼する。
2601 = "Tôi ra hiệu cho Hibiki im lặng,\nrồi gật đầu tạ lỗi với người thợ cơ khí vừa phải dừng tay vì giật mình."
# monologue
# JP: 技工さんは「大丈夫ですよ」と微笑んで、\nまたじわじわと、\\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;にランプを寄せる。
2579 = "Người thợ cơ khí mỉm cười như muốn nói \"Không sao đâu\",\nrồi lại từ từ, đưa ngọn đèn khò lại gần \\x%lクロスヘッド;#00ffc040;đầu chữ thập%l;#;."
# monologue
# JP: （じゅううっ）
2864 = "（Xèo xèo）"
# 【日々姫】
# display as 日日姬
# JP: 「わ」
1749 = "「Oa.」"
# monologue
# JP: シャッターを切る指の隣で、日々姫がペンを走らせる。\n走らせながら、小声で僕に聞いてくる。
2520 = "Ngay bên cạnh ngón tay đang bấm máy ảnh của tôi, Hibiki đưa bút phác họa thoăn thoắt.\nVừa vẽ, em ấy vừa thì thầm hỏi tôi."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、あれ、なにしとーと、焼き入れ？」
2089 = "「Anh hai, người ta đang làm gì vậy, tôi luyện hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ガスランプ程度の火では焼きなど入らなかろうよ。\nではなく――ほら」
1802 = "「Lửa của đèn khò thì làm sao mà tôi luyện được chứ.\nKhông phải đâu——nhìn kìa.」"
# 【日々姫】
# display as 日日姬
# JP: 「わ」
# 1749 = "「哇」" 
# monologue
# JP: じわじわと、炙られる火で、\n\\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;の黒が滲んで、溶け出していく。
2664 = "Dưới ngọn lửa được hơ nóng từ từ,\nmàu đen trên \\x%lクロスヘッド;#00ffc040;đầu chữ thập%l;#; bắt đầu nhòe đi và tan chảy ra."
# 【日々姫】
# display as 日日姬
# JP: 「あれ――油だ」
2079 = "「Đó là——dầu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。僕らが普段差してる油の、塊だろうな」
1937 = "「Đúng vậy. Chắc là những mảng dầu mà chúng ta thường tra vào bị đóng cục lại đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、だよね。\\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;でいいんだっけ、あれ？\nあそこ、必ず注油するもんね」
1772 = "「A, đúng rồi nhỉ. Cái đó gọi là \\x%lクロスヘッド;#00ffc040;đầu chữ thập%l;#; phải không?\nChỗ đó, lúc nào cũng phải tra dầu mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1938 = "「Đúng vậy.」"
# monologue
# JP: 名称の方は危なっかしいが、\n日々の作業は、しっかりと染み付いているようだ。
2806 = "Tuy trí nhớ về tên gọi có hơi nguy hiểm,\nnhưng có vẻ như những công việc hàng ngày đã in sâu vào tâm trí em ấy rồi."
# monologue
# JP: ピストンの往復運動を、\\x%l動輪;#00ffc040;動輪%l;#;の回転に変換するための\n中継装置が\\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;――当然、注油も欠かせない。
81 = "Thiết bị trung gian dùng để chuyển đổi chuyển động tịnh tiến của piston\nthành chuyển động quay của \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; chính là \\x%lクロスヘッド;#00ffc040;đầu chữ thập%l;#;——tất nhiên, việc tra dầu là không thể thiếu."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……注油の度に清掃もしていたつもりだが」
1648 = "「Nhưng mà......anh nhớ là mỗi lần tra dầu đều có lau chùi sạch sẽ rồi mà nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん……ちょっと……\n結構、これって恥ずかしかねぇ」
1783 = "「Vâng......hơi......\nThế này thì xấu hổ thật đấy.」"
# monologue
# JP: 丁寧にランプで油を炙り、\n更に丁寧に拭き取っていく。
2582 = "Cẩn thận dùng đèn khò hơ nóng dầu,\nrồi lại càng cẩn thận lau sạch đi."
# monologue
# JP: 黒々としていた\\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;は、見る見るうちに、\nいっそ涼しいばかりの鉄色を取り戻していく。
2361 = "\\x%lクロスヘッド;#00ffc040;Đầu chữ thập%l;#; vốn dĩ đen sì, chỉ trong chớp mắt,\nđã lấy lại được màu sắc nguyên bản của sắt thép lạnh lẽo."
# 【日々姫】
# display as 日日姬
# JP: 「……良し、っと。\nあんまりお邪魔しちゃ悪かとね」
1401 = "「......Xong rồi.\nLàm phiền người ta quá cũng không hay đâu nhỉ.」"
# monologue
# JP: やがて鉛筆の動きを止めて、\nスケッチブックをぱたんとたたみ、日々姫が立ち去る。
2599 = "Rồi em ấy ngừng đưa bút chì,\ngấp cuốn sổ phác họa lại cái \"pặc\", và rời đi."
# monologue
# JP: (パシャっ)
34 = "(Tách)"
# monologue
# JP: 確かにお邪魔をしては悪いが、\nあともう少しで磨き上がりそうだ。
2711 = "Đúng là làm phiền thì không hay,\nnhưng có vẻ như chỉ một chút nữa thôi là ông ấy sẽ đánh bóng xong."
# monologue
# JP: 完全に磨き上がったところを撮れば、\n熟練の技の見事さが、見てくれる人にもより伝わろう。
2586 = "Nếu chụp lại khoảnh khắc vừa được đánh bóng xong hoàn toàn,\nthì sự tuyệt vời của một tay nghề điêu luyện, sẽ được truyền tải rõ nét hơn đến những người xem ảnh."
# 【技工】
# display as 技工
# JP: 「うん」
# 1791 = "「嗯」" 
# monologue
# JP: ――磨き上がった。
1357 = "——Đã đánh bóng xong."
# monologue
# JP: （パシャッ）
# 2862 = "（喀嚓）" 
# monologue
# JP: 技工さんは気持ちよさそうに腰を伸ばして、\n今までの顔と一転、笑顔で僕に振り返る。
2583 = "Người thợ cơ khí vươn vai một cách sảng khoái,\nthay đổi hoàn toàn vẻ mặt từ nãy đến giờ, quay lại nhìn tôi với một nụ cười."
# 【技工】
# display as 技工
# JP: 「よく手入れなさってますね。\n\\x%lクロスヘッド;#00ffc040;クロスヘッド%l;#;は、こっちを取った方がいいでしょう」
1682 = "「Cậu bảo dưỡng tốt lắm.\n\\x%lクロスヘッド;#00ffc040;Đầu chữ thập%l;#; thì, nên lấy cái này sẽ tốt hơn đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1763 = "「A.」"
# monologue
# JP: その一言で理解する。\nどうりで、見たことの無い顔のはずだ。
2297 = "Chỉ một câu nói đó thôi, tôi đã hiểu ra.\nHèn chi, lại là một khuôn mặt mà tôi chưa từng thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本車輌から来てくださった技術者さんでしたか」
1868 = "「Ông là kỹ sư đến từ công ty Toa xe Hinamoto phải không ạ.」"
# 【技工】
# display as 技工
# JP: 「はい。豊河工場のＯＢ、[ふち]淵といいます」
1786 = "「Vâng. Tôi là Fuchi, cựu nhân viên của nhà máy Toyokawa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はじめまして、[ふち]淵さん。僕は――」
1706 = "「Rất vui được gặp ông, ông Fuchi. Cháu là——」"
# 【技工】
# display as 技工
# JP: 「[みぎたそうてつ,3]右田双鉄さんですよね？\n拝見してます」
1867 = "「Cậu là Migita Soutetsu phải không?\nTôi có xem qua rồi.」"
# monologue
# JP: ポケットから取り出されるのは、\n丁寧に折りたたまれた――
2281 = "Thứ được lấy ra từ trong túi,\nlà một tờ giấy được gấp gọn gàng——"
# monologue
# JP: ああ、8620運転台通信の、プリントアウトだ。
2383 = "A, là bản in của Bản tin buồng lái 8620."
# 【双鉄】
# display as 雙鐵
# JP: 「読んでいただけていたのですか」
1869 = "「Ông đã đọc nó sao ạ?」"
# 【技工】
# display as 技工
# JP: 「もちろんですよ。\nここに来ている人達、ほとんどがそうじゃないですか？」
1994 = "「Đương nhiên rồi.\nNhững người đến đây, hầu hết đều đã đọc qua mà, phải không?」"
# monologue
# JP: 言われてぐるりと見渡せば、\n見知らぬ顔と見知った顔とが入り混じっている。
2726 = "Nghe vậy, tôi đưa mắt nhìn quanh một vòng,\nnhững khuôn mặt lạ lẫm và quen thuộc đang đứng lẫn lộn với nhau."
# 【技工】
# display as 技工
# JP: 「[ちちぶ,2]知々夫の[みずた,1]水田さん、[しずおか,1]靜岡の[まはら,1]馬原さん、[にしつがる,2]西津輕の[かなや,1]金谷先生\n――誰も彼も、自分で納得しなきゃ動かん人たちだ」
1645 = "「Ông Mizuta ở Chichibu, ông Mahara ở Shizuoka, thầy Kanaya ở Tây Tsugaru\n——Bất kể là ai, họ đều là những người chỉ hành động khi bản thân cảm thấy bị thuyết phục.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お知り合いなのですか？」
1873 = "「Ông quen biết họ sao ạ?」"
# 【技工】
# display as 技工
# JP: 「[ていてつ,1]帝鉄時代は研修会などもありましたからね。\n顔を合わせるようなメンツは、まぁ似たり寄ったりで」
1849 = "「Thời \\x%l帝鉄;#00ffc040;Teitetsu%l;#; cũng có những buổi hội thảo tu nghiệp mà.\nNhững gương mặt thường gặp ở đó, chà, cũng na ná nhau thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
# 1712 = "「原來如此」" 
# monologue
# JP: それだけ広い範囲の技師を一同に集めて行うのなら、\n参加者は恐らく“全国選りすぐり”というレベルだろう。
2590 = "Nếu tập hợp các kỹ sư từ một phạm vi rộng lớn như vậy để tổ chức,\nthì những người tham gia có lẽ đều ở đẳng cấp \"tinh hoa toàn quốc\"."
# monologue
# JP: そうした人たちが、ハチロクのために集ってくれてる――\nこれほど、頼もしいこともない。
2795 = "Những người như vậy, đang tập hợp lại đây vì Hachiroku——\nKhông có gì đáng tin cậy hơn thế này nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。本当に心強いです」
2102 = "「Cháu cảm ơn ông. Thật sự rất vững tâm ạ.」"
# 【技工】
# display as 技工
# JP: 「いやいや、礼など言われて恐縮します。\n自分の場合は、完全にこっちの都合での参加ですしね」
1755 = "「Không không, cậu nói cảm ơn làm tôi ngại quá.\nTrường hợp của tôi, hoàn toàn là do lý do cá nhân nên mới tham gia thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、おっしゃいますと？」
# 2059 = "「這話怎麼說？」" 
# monologue
# JP: 微笑んだまま――けれども笑みの質が変わる。\nわずかに、淋しげな影が差す。
2295 = "Ông ấy vẫn mỉm cười——nhưng chất lượng của nụ cười đã thay đổi.\nMột bóng hình có phần cô đơn khẽ lướt qua."
# 【技工】
# display as 技工
# JP: 「見極めたい――と、そう思って確かめに来たんです。\n自分は、反対しましたから」
1893 = "「Tôi muốn nhìn cho rõ——với suy nghĩ đó, tôi đã đến đây để xác nhận.\nBởi vì, bản thân tôi đã từng phản đối chuyện này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「反対、ですか？」
1864 = "「Phản đối, sao ạ?」"
# 【技工】
# display as 技工
# JP: 「あの子の思い出がやはり、詰まった機体ですから。\n最後の願いとはいえど、バラしたいとは思えなかった」
1993 = "「Dù sao thì, cỗ máy đó cũng chứa đựng đầy ắp những kỷ niệm về đứa bé ấy.\nCho dù đó là tâm nguyện cuối cùng, tôi cũng không hề muốn tháo dỡ nó ra.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2105 = "「!」"
# 【技工】
# display as 技工
# JP: 「ですから、この目で、確かめようと来たんです」
1918 = "「Chính vì vậy, tôi đến đây để tận mắt xác nhận.」"
# monologue
# JP: ドクン、と心臓が跳ね上がる。\nドドドドと、早鐘のように鳴り響く。
2715 = "Trái tim tôi giật thót lên một cái \"Thịch\".\nRồi bắt đầu đập liên hồi như trống gõ."
# 【技工】
# display as 技工
# JP: 「あの子の願いを――右田さん、ハチロクさん。\nあなた方に託せるものかを、確かめに」
1909 = "「Tâm nguyện của đứa bé ấy——Cậu Migita, cô Hachiroku.\nTôi đến để xác nhận xem liệu có thể giao phó cho hai người được không.」"
# monologue
# JP: 鼓動がガンガン耳を打つのに、\n血が凍りついたような気がする。
2461 = "Nhịp tim đập thình thịch bên tai,\nnhưng tôi lại có cảm giác như máu trong người đang đông cứng lại."
# monologue
# JP: どうして、僕は――\n今の今まで、ただの一度も……
2670 = "Tại sao, tôi lại——\nCho đến tận bây giờ, chưa một lần nào......"
# 【双鉄】
# display as 雙鐵
# JP: 「あの子――とは」
2076 = "「Đứa bé ấy——là」"
# monologue
# JP: 分かりきってる。\n聞くまでもない。
2437 = "Quá rõ ràng rồi.\nKhông cần phải hỏi nữa."
# monologue
# JP: 線路があり、設備があり、技師がいて――\n何故、58623が\\x%l静態保存;#00ffc040;静態保存%l;#;をされていたのか……
2872 = "Có đường ray, có thiết bị, có kỹ sư——\nTại sao, 58623 lại bị \\x%l静態保存;#00ffc040;lưu tĩnh%l;#;......"
# monologue
# JP: （その理由を――どうして、僕は……思いもしない――\nいや、最初から考えようとも……しなかったのだ）
2869 = "（Lý do đó——tại sao, mình lại......không hề nghĩ đến——\nKhông, ngay từ đầu mình đã......không hề muốn nghĩ đến nó.）"
# monologue
# JP: そこを考えるのが怖い。\n直視したなら、カサブタが剥がれ落ちそうで。
2499 = "Tôi sợ phải nghĩ về điều đó.\nNếu nhìn thẳng vào nó, lớp vảy vết thương dường như sẽ bong tróc ra."
# monologue
# JP: だから、ともかく口を動かす。\n現実を進めておく間には、過去を見ないでおけるから。
2483 = "Vì vậy, tôi đành phải cử động miệng.\nBởi vì trong lúc để hiện thực tiếp diễn, tôi có thể không phải nhìn về quá khứ."
# 【双鉄】
# display as 雙鐵
# JP: 「あの子とは――[ゴーハチロクニイサン,4]58623の……」
2075 = "「Đứa bé ấy là——của 58623......」"
# monologue
# JP: 頷き。\n安心したような。
2280 = "Ông ấy gật đầu.\nNhư thể đã yên tâm phần nào."
# 【技工】
# display as 技工
# JP: 「その意味でも、ハチロクさん――\nトップナンバー\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、やはり凄いですね」
1854 = "「Về mặt đó, cô Hachiroku——\n\\x%lレイルロオド;#00ffc040;Railord%l;#; của số hiệu đầu tiên, quả nhiên là rất tuyệt vời.」"
# monologue
# JP: 淵さんの目が大きく動く。
2653 = "Đôi mắt của ông Fuchi di chuyển mạnh."
# monologue
# JP: 視線の先には、ハチロクが――\n職人さんたちとなにやら打ち合せているハチロクがいる。
2292 = "Nơi ánh mắt ông hướng đến, là Hachiroku——\nHachiroku đang bàn bạc chuyện gì đó với những người thợ."
# 【技工】
# display as 技工
# JP: 「まだまだ何年でも稼働できそうに生き生きしてる。\n矛盾しますが――とても、最古の[トップナンバー,1]一体とは思えない」
1821 = "「Cô ấy tràn đầy sức sống như thể có thể tiếp tục hoạt động thêm nhiều năm nữa.\nDù hơi mâu thuẫn——nhưng tôi không thể nào tin được cô ấy lại là người đầu tiên lâu đời nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あれは……」
2057 = "「Chuyện đó là......」"
# monologue
# JP: 唇が、からからに乾いてしまった気がする。
2472 = "Tôi có cảm giác đôi môi mình đã khô khốc lại."
# monologue
# JP: 言葉を発するそのために、\n張り付く口を、無理矢理に剥がしているようで。
2514 = "Để có thể thốt nên lời,\ntôi dường như phải miễn cưỡng tách đôi môi đang dính chặt vào nhau ra."
# 【双鉄】
# display as 雙鐵
# JP: 「長いこと――本当に長いこと眠っていたのです。\n眠っていて――つい最近に、再び目覚めた」
1814 = "「Cô ấy đã ngủ một thời gian dài——thực sự rất dài.\nNgủ thiếp đi——và chỉ mới tỉnh lại dạo gần đây thôi ạ.」"
# monologue
# JP: “だから、稼働時間は少ない”。\n続けようとした言葉は喉から出てこない。
2488 = "\"Vì vậy, thời gian hoạt động của cô ấy rất ít\".\nNhững lời định nói tiếp theo lại không thể thốt ra khỏi cổ họng."
# monologue
# JP: “僕が知らないハチロクの過去を知らされる”――\nそんな事態を招きかねないことに気づいて、舌が固まる。
2523 = "\"Bị cho biết về một quá khứ của Hachiroku mà tôi không hề hay biết\"——\nNhận ra mình có thể chuốc lấy tình huống đó, lưỡi tôi cứng đờ lại."
# 【技工】
# display as 技工
# JP: 「なるほど、眠り姫だったのですか。\n目覚めさせたのは、きっと、右田さんなのでしょうね」
1713 = "「Thì ra là vậy, là một nàng công chúa ngủ trong rừng sao.\nNgười đánh thức cô ấy, chắc chắn là cậu Migita nhỉ.」"
# monologue
# JP: あたたかな声。あたたかな笑み。\nそのあたたかさが、僕を息苦しくさせる。
2291 = "Một giọng nói ấm áp. Một nụ cười ấm áp.\nSự ấm áp đó, lại khiến tôi cảm thấy nghẹt thở."
# 【技工】
# display as 技工
# JP: 「来て良かったです。話せて、良かった。\nあなた方になら、確かに――託せる」
1904 = "「Đến đây đúng là một quyết định đúng đắn. Thật tốt vì đã được nói chuyện với cậu.\nNếu là hai người, thì quả thực——có thể giao phó được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
1395 = "「......」"
# monologue
# JP: 頭を、深々と下げられる。
2529 = "Ông ấy cúi đầu thật sâu."
# monologue
# JP: そうされる資格など僕には無いのに、\n逃げ出すことも、否定することも出来ようもない。
2524 = "Rõ ràng tôi không hề có tư cách để nhận được điều đó,\nnhưng tôi cũng chẳng thể trốn chạy, hay phủ nhận nó."
# 【技工】
# display as 技工
# JP: 「あの子の――こはるの願った最後の夢を。\nもう一度走りだすことを、どうか、ハチロクさんと共に」
1834 = "「Giấc mơ cuối cùng mà đứa bé ấy——Koharu đã hằng mong ước.\nĐược một lần nữa lăn bánh, xin cậu, hãy cùng với cô Hachiroku thực hiện nó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「こはる――さん。ですか」
1811 = "「Cô Koharu——sao ạ.」"
# monologue
# JP: きっと愛されていたのだと、\nその名を聞くだけで強く感じる。
2728 = "Chắc hẳn cô ấy đã được yêu thương rất nhiều,\nchỉ nghe cái tên thôi cũng đủ khiến tôi cảm nhận được điều đó."
# monologue
# JP: 取り残される痛みがズキズキ、\n我がことのように僕を苛む。
2403 = "Nỗi đau bị bỏ lại nhói lên từng cơn,\ndày vò tôi như thể đó là nỗi đau của chính mình."
# 【双鉄】
# display as 雙鐵
# JP: 「きっと、優しい\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だったのでしょうね」
1818 = "「Chắc hẳn, cô ấy là một \\x%lレイルロオド;#00ffc040;Railord%l;#; rất đỗi dịu dàng nhỉ.」"
# 【技工】
# display as 技工
# JP: 「優しく、誇り高い子でした。\n走ることを、一番の喜びにしていました」
1813 = "「Đó là một đứa trẻ dịu dàng, và đầy kiêu hãnh.\nViệc được chạy, chính là niềm vui lớn nhất của con bé.」"
# monologue
# JP: だからどうか、と――淵さんの目が言っている。\nその目を真っ直ぐ、受け止められない。
2509 = "Vì vậy xin cậu, đôi mắt của ông Fuchi như đang nói vậy.\nTôi không thể nhìn thẳng vào đôi mắt đó."
# 【双鉄】
# display as 雙鐵
# JP: 「お任せ――ください」
2023 = "「Xin cứ giao——cho cháu.」"
# monologue
# JP: それでも、口はそう動く。\n言葉を発し、笑みさえ見事に形取る。
2316 = "Dù vậy, miệng tôi vẫn tự động thốt lên.\nNói ra những lời đó, thậm chí còn nặn ra một nụ cười hoàn hảo."
# monologue
# JP: （ああ……僕は――）
2857 = "（A......mình——）"
# monologue
# JP: 生きながらにして死んでいた。\n死んでいながら、生きてるフリを続けてた……
2648 = "Đang sống mà như đã chết.\nĐã chết mà vẫn tiếp tục giả vờ như đang sống......"
# monologue
# JP: その日々はきっとまだ完全には終わってなくて、\nだから今もまた、こう出来ている。
2486 = "Những ngày tháng đó chắc chắn vẫn chưa hoàn toàn kết thúc,\nđó là lý do tại sao bây giờ tôi lại có thể làm như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクとともに、僕は必ず。\n[ハチロクニイマル,3]8620を、そして[ゴーハチロクニイサン,4]58623を、もう何度でも、走らせます」
1885 = "「Cùng với Hachiroku, cháu nhất định.\nSẽ để 8620, và cả 58623, được chạy thêm bao nhiêu lần nữa cũng được.」"
# monologue
# JP: 心の底から、そう誓いたい。\n本心だけれど、本心ではない。
2516 = "Tôi muốn thề như vậy từ tận đáy lòng.\nĐó là lời thật lòng, nhưng cũng không phải là lời thật lòng."
# monologue
# JP: 根深い疑い――あるいは恐怖が、\n自分自身の言葉を、思いを、信じ切らせてくれはしない。
2537 = "Một sự nghi ngờ thâm căn cố đế——hay có lẽ là nỗi sợ hãi,\nđã không cho phép tôi hoàn toàn tin vào lời nói và suy nghĩ của chính mình."
# 【技工】
# display as 技工
# JP: 「ありがたい」
2101 = "「Biết ơn cậu nhiều lắm.」"
# monologue
# JP: 僕の手が、淵さんの手に包み込まれる。\nやけどしそうな熱さを感じる。
2652 = "Bàn tay tôi được bao bọc trong đôi tay của ông Fuchi.\nTôi cảm nhận được một hơi nóng như muốn thiêu đốt."
# monologue
# JP: いや、違う――淵さんがひどく、驚いた顔――\n僕が、冷えきってしまっているのだ。
2259 = "Không, không phải——Ông Fuchi lộ vẻ mặt vô cùng ngạc nhiên——\nLà do tôi, tay tôi đã trở nên lạnh toát."
# 【双鉄】
# display as 雙鐵
# JP: 「そうするためにも――写真を、\nもう少し撮ってきますね」
1979 = "「Để làm được điều đó——cháu xin phép,\nđi chụp thêm vài bức ảnh nữa nhé.」"
# 【技工】
# display as 技工
# JP: 「ああ、ええ、そうですね」
1776 = "「À, ừm, được chứ.」"
# monologue
# JP: 一礼をして、歩き出す。
2490 = "Tôi cúi chào, rồi bước đi."
# monologue
# JP: 動く。動こう。\n責任で自分を埋めてしまおう。
2505 = "Hành động. Phải hành động thôi.\nHãy tự chôn vùi bản thân trong trách nhiệm."
# monologue
# JP: （そうだ、責任を負っているなら……\n僕は、投げ出さないで済む）
2867 = "（Đúng vậy, nếu đang gánh vác trách nhiệm......\nmình sẽ không thể từ bỏ giữa chừng.）"
# monologue
# JP: 縛られたなら、崩れずに済む。\n崩れずいれば、僕でも、少しは役立てる。
2376 = "Nếu bị trói buộc, mình sẽ không sụp đổ.\nNếu không sụp đổ, ngay cả mình cũng có thể giúp ích được đôi chút."
# monologue
# JP: 汰斗さんが僕に教えてくれた。\n誰かの役に立つことこそが――
2797 = "Ông Taito đã dạy tôi.\nTrở thành người có ích cho ai đó chính là——"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！？　大丈夫ですか？」
2098 = "「Ngài Soutetsu!? Ngài không sao chứ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクか」
1933 = "「Là Hachiroku sao.」"
# monologue
# JP: 不安げな顔。\n僕を支えてくれるてのひら。
2409 = "Khuôn mặt đầy vẻ bất an.\nBàn tay đang đỡ lấy tôi."
# monologue
# JP: 小さい、可愛い、温かい。\n素直に思えて――心の底から、ほっとする。
2415 = "Nhỏ nhắn, đáng yêu, ấm áp.\nTôi thành thật nghĩ vậy——và từ tận đáy lòng, tôi cảm thấy nhẹ nhõm."
# monologue
# JP: （ああ……良かった。僕はそこまで――\nそこまで卑怯な恥知らずでは、無かったらしい）
2860 = "（A......thật tốt quá. Có vẻ như mình chưa đến mức——\nchưa đến mức hèn nhát và vô liêm sỉ như vậy.）"
# monologue
# JP: ぐらぐらと揺れる思考は、自分に疑いをかけていた。
2526 = "Dòng suy nghĩ chao đảo đang tự gieo rắc sự nghi ngờ vào chính tôi."
# monologue
# JP: ハチロクに強い好意を抱いた理由がただの、\n幻想にあるのではなかったか――と。
2813 = "Rằng lý do khiến tôi dành tình cảm mãnh liệt cho Hachiroku,\nchỉ đơn thuần là một ảo tưởng mà thôi——."
# 【ハチロク】
# display as 八六
# JP: 「お顔が――真っ青になってます。\nレールショップに……いえ、右田の家に戻りましょう」
1872 = "「Mặt ngài——tái mét hết cả rồi.\nChúng ta về Rail Shop......không, về nhà Migita đi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにをバカな」
1708 = "「Em nói ngốc nghếch gì vậy.」"
# monologue
# JP: いつもの自分を必死で演じる。\nハチロクに、余計な不安を与えたくない。
2518 = "Tôi tuyệt vọng diễn lại hình ảnh của chính mình như mọi khi.\nTôi không muốn mang đến cho Hachiroku thêm sự bất an nào nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「この状態は、今日この日にしか撮れんのだろう？」
2061 = "「Tình trạng này, chỉ có ngày hôm nay mới chụp được thôi đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「それは左様でございますが――\nああ！　でしたら、わたくしが撮っておきます」
1874 = "「Điều đó thì đúng là vậy nhưng——\nA! Nếu thế, em sẽ chụp lại cho ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1634 = "「Không——」"
# monologue
# JP: 言われて、不意に思いつく。
2727 = "Nghe vậy, tôi chợt nảy ra một ý."
# monologue
# JP: そうしたい――\nそうすればきっと、心のぐちゃぐちゃを整頓できる。
2713 = "Tôi muốn làm như vậy——\nLàm vậy chắc chắn sẽ giúp tôi dọn dẹp được mớ hỗn độn trong lòng."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、お前を撮らせてくれ。\nガスランプをひとつ、借りてこれるか？」
2069 = "「Vậy thì, hãy để anh chụp em.\nEm có thể mượn một cái đèn khò đến đây được không?」"
# 【ハチロク】
# display as 八六
# JP: 「……かしこまりました」
1399 = "「......Em hiểu rồi ạ.」"
# monologue
# JP: 満足させて終わらせよう。\nそんな気持ちがハチロクの顔ににじみ出る。
2444 = "Hãy làm anh ấy thỏa mãn rồi kết thúc chuyện này thôi.\nCảm xúc đó hiện rõ trên khuôn mặt của Hachiroku."
# monologue
# JP: が、そんな表情すら愛らしい。\n僕はきちんと、そう感じている。
2305 = "Nhưng, ngay cả biểu cảm đó cũng thật đáng yêu.\nTôi thực sự cảm thấy như vậy."
# 【ハチロク】
# display as 八六
# JP: 「それで、どのようにいたしましょうか？」
1923 = "「Vậy, chúng ta sẽ làm thế nào ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……っと、\\x%l台枠;#00ffc040;台枠%l;#;そのものが一番いいな。\nあれなら、誰の邪魔にもならん」
1766 = "「À......ừm, chính \\x%l台枠;#00ffc040;khung gầm%l;#; đó là tốt nhất.\nNếu là chỗ đó thì sẽ không làm phiền ai cả.」"
# monologue
# JP: 日ノ本車輌に送られていくのを待つだけの、\n歪み、傷つきまくった\\x%l台枠;#00ffc040;台枠%l;#;。
2801 = "Một chiếc \\x%l台枠;#00ffc040;khung gầm%l;#; méo mó, đầy vết xước,\nchỉ đang chờ được gửi đến công ty Toa xe Hinamoto."
# monologue
# JP: 今は誰も見向きも触れもしてないそれに、\nハチロクを連れて、近寄っていく。
2503 = "Hiện tại chẳng có ai để ý hay chạm vào nó,\ntôi dẫn Hachiroku tiến lại gần."
# 【双鉄】
# display as 雙鐵
# JP: 「適当な油汚れを、ガスランプで炙り溶かしだしてくれ。\nお前は綺麗な絵になるし、説明のための良い写真となる」
1685 = "「Em hãy tìm một vết dầu mỡ nào đó, rồi dùng đèn khò hơ cho tan chảy ra nhé.\nEm sẽ tạo nên một bức tranh đẹp, và nó cũng sẽ là một bức ảnh tốt để minh họa.」"
# 【ハチロク】
# display as 八六
# JP: 「なんでしょう。\nあまり褒められた感じもいたしませんが」
1980 = "「Gì vậy chứ.\nEm chẳng cảm thấy như mình đang được khen chút nào cả.」"
# monologue
# JP: 言いつつも、顔は素直にはにかんでいる。
2424 = "Dù nói vậy, nhưng khuôn mặt em lại thoáng nét bẽn lẽn một cách thành thật."
# monologue
# JP: ハチロクはちょこちょこ動きまわって、\n\\x%l台枠;#00ffc040;台枠%l;#;の内側にくるり、入り込む。
2333 = "Hachiroku chạy lon ton vòng quanh,\nrồi xoay người chui tọt vào bên trong \\x%l台枠;#00ffc040;khung gầm%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「せっかくですので、\n普段は検修できないところにいたしましょう」
2100 = "「Nhân cơ hội này,\nchúng ta hãy làm ở những chỗ bình thường không thể kiểm tra sửa chữa được đi ạ.」"
# monologue
# JP: その目がス――と真剣になり、\nガスランプの火が、\\x%l台枠;#00ffc040;台枠%l;#;の黒を染めていく。
2417 = "Ánh mắt em ấy bỗng chốc trở nên nghiêm túc,\nngọn lửa từ chiếc đèn khò dần nhuộm lên màu đen của \\x%l台枠;#00ffc040;khung gầm%l;#;."
# monologue
# JP: （じゅっ――じわっ――）
2863 = "（Xèo——xèo——）"
# monologue
# JP: ああ、やはり。\nガスの火に照らされるハチロクの顔は、美しい。
2386 = "A, quả nhiên.\nKhuôn mặt Hachiroku được soi sáng bởi ngọn lửa từ đèn khò, thật đẹp."
# monologue
# JP: カメラレンズは世界の余分を切り落とし、\n僕とハチロクとだけを一瞬に閉ざしてくれる。
2693 = "Ống kính máy ảnh cắt bỏ đi những phần dư thừa của thế giới,\ngiam giữ chỉ riêng tôi và Hachiroku vào trong một khoảnh khắc."
# monologue
# JP: （パシャっ）
# 2862 = "（喀嚓）" 
# monologue
# JP: だから、シャッターも一度だけ。
2564 = "Vì vậy, tôi cũng chỉ bấm máy một lần duy nhất."
# monologue
# JP: 心の中にもハチロクを、\nしっかりと焼き付けられるよう――っ！？
2513 = "Để có thể khắc sâu hình ảnh Hachiroku,\nvào tận trong tim mình——!?"
# 【日々姫】
# display as 日日姬
# JP: 「なんねっ！？　こん臭いっ」
1858 = "「Cái gì vậy!? Mùi gì thối thế.」"
# monologue
# JP: 異臭。\nハチロクが焦がし溶かした、油の向こうに。
2249 = "Một mùi hôi lạ.\nPhía bên kia lớp dầu mỡ bị Hachiroku hơ cho tan chảy."
# monologue
# JP: この臭いを僕は知っている。\n僕は――間近に、いやというほど、嗅がされたから。
2548 = "Tôi biết mùi này.\nBởi vì tôi——đã từng phải ngửi nó ở một cự ly gần đến mức phát ngán."
# monologue
# JP: （ああ……これは……\n髪の毛の、焼ける臭いだ――）
2859 = "（A......đây là......\nmùi tóc bị cháy——）"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ――大丈夫ですか！？」
2096 = "「Ngài Soutetsu——ngài không sao chứ ạ!?」"
# monologue
# JP: 火と雨。\n重さ。軋みと痛み。
2667 = "Lửa và mưa.\nSức nặng. Tiếng cọt kẹt và nỗi đau."
# monologue
# JP: 溢れてくるもの。鉄の味。\n髪の毛と――そうして、肉との、焼け焦げる臭い。
2626 = "Thứ gì đó đang trào ra. Vị của sắt.\nMùi của tóc——và của thịt, đang cháy khét lẹt."
# monologue
# JP: （ドサっ）
# 2854 = "（咚）" 
# 【ハチロク】
# display as 八六
# JP: 「双鉄様ーーーーっ！！！」
2094 = "「Ngài Soutetsu————!!!」"
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2855 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch——）"
# monologue
# JP: \\x%l列車;#00ffc040;列車%l;#;の音。\nずっと、耳にし続けていた音。
83 = "Âm thanh của \\x%l列車;#00ffc040;đoàn tàu%l;#;.\nThứ âm thanh mà tôi đã nghe thấy suốt."
# monologue
# JP: けれどもハチロクと出会ってからは、\nほとんど、聞かずに済んでいた音――
2607 = "Thế nhưng kể từ khi gặp Hachiroku,\ntôi hầu như đã không còn phải nghe thấy âm thanh đó nữa——"
# monologue
# JP: （いや……）
2846 = "（Không......）"
# monologue
# JP: 苦笑、する。\nせざるを得ない。
2474 = "Tôi cười khổ.\nKhông thể không cười."
# monologue
# JP: 事実を僕は、知ってしまったのだから。
2391 = "Bởi vì tôi, đã biết được sự thật rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「毎日のように聞いていたのだな。\nこれも――[ハチロク,3]8620が響かせる音だったのだから」
1900 = "「Ngày nào anh cũng nghe thấy nó mà.\nBởi vì đây——cũng là âm thanh do 8620 tạo ra.」"
# 【路子】
# display as 路子
# JP: 「ハチロク？」
1700 = "「Hachiroku?」"
# monologue
# JP: 路子と、僕と、\\x%l客車;#00ffc040;客車%l;#;にふたり。\n父さんと母さんの姿は無い。
2495 = "Michiko và tôi, hai đứa trong \\x%l客車;#00ffc040;toa hành khách%l;#;.\nKhông thấy bóng dáng bố và mẹ đâu cả."
# monologue
# JP: ホっとする。\n記憶ではなくてただの夢だと――確認出来て。
2469 = "Tôi thở phào nhẹ nhõm.\nVì có thể xác nhận được——đây không phải là ký ức, mà chỉ là một giấc mơ."
# 【路子】
# display as 路子
# JP: 「ハチロクって、あのお人形？」
1699 = "「Hachiroku là con búp bê đó hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ……な」
2004 = "「Chà......đúng vậy.」"
# monologue
# JP: だから、不思議とも思わない。\n路子がハチロクを知っていたとて。
2563 = "Vì vậy, tôi không hề thấy kỳ lạ.\nCho dù Michiko có biết về Hachiroku đi chăng nữa."
# monologue
# JP: 不思議とはまるで思わんが……\nひりひりと、喉が渇くような不安は覚える。
2808 = "Hoàn toàn không thấy kỳ lạ nhưng......\ntôi lại cảm thấy một nỗi bất an bỏng rát như thiêu đốt cổ họng."
# monologue
# JP: （何故、尋ねるのだ――\nそんなことなら、路子には伝わっているだろうに）
2871 = "（Tại sao em ấy lại hỏi——\nNhững chuyện như vậy, đáng lẽ Michiko phải biết rồi chứ.）"
# monologue
# JP: 夢は深層心理のあらわれ――\nふっと浮かんだ考えが、何故だかひどく恐ろしい。
2402 = "Giấc mơ là sự thể hiện của tâm lý sâu thẳm bên trong——\nSuy nghĩ chợt lóe lên đó, không hiểu sao lại đáng sợ đến tột cùng."
# monologue
# JP: だから、とにかく話し続ける。\n言葉で僕を、隙間なく埋めてしまうため。
2725 = "Vì vậy, tôi cứ tiếp tục nói.\nĐể dùng lời nói lấp đầy bản thân mình không một kẽ hở."
# 【双鉄】
# display as 雙鐵
# JP: 「人形ではなく、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。\n鉄道の運行を制御する……そういう――」
1806 = "「Không phải búp bê, mà là \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nNgười điều khiển hoạt động của đường sắt......một người như vậy——」"
# monologue
# JP: 思っているのに、言葉に詰まる。
1367 = "Dù nghĩ vậy, nhưng tôi lại nghẹn lời."
# monologue
# JP: 「機械だ」、とは口に出したくなくて、\n代わりの言葉を、けれどもうまく見つけられない。
2301 = "Tôi không muốn thốt ra hai chữ \"cỗ máy\",\nnhưng lại không thể tìm được từ ngữ nào khác thay thế."
# 【路子】
# display as 路子
# JP: 「鉄道の運行をせいぎょして――\nそれなのに、事故を起こしたの？」
2030 = "「Điều khiển hoạt động của đường sắt——\nVậy mà, lại gây ra tai nạn sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
2056 = "「Đó là——」"
# monologue
# JP: 知っている。ふたごだから。\n僕の知識の全ては路子も、共有している。
2543 = "Em ấy biết. Vì chúng tôi là anh em sinh đôi.\nToàn bộ kiến thức của tôi, Michiko cũng cùng chia sẻ."
# monologue
# JP: なのにどうして――何度でも浮かんでしまう疑問を、\nもう何度でも、言葉で僕は底に沈める。
2303 = "Vậy mà tại sao——Những câu hỏi cứ lặp đi lặp lại,\nđã bao nhiêu lần, tôi dùng lời nói để dìm chúng xuống đáy sâu."
# 【双鉄】
# display as 雙鐵
# JP: 「事故は起こすものじゃない。\n誰も望まず、それでも、起きてしまうものだ」
1661 = "「Tai nạn không phải là thứ do ai gây ra.\nKhông một ai mong muốn, vậy mà, nó vẫn xảy ra.」"
# 【路子】
# display as 路子
# JP: 「ふぅん」
# 1791 = "「嗯」" 
# monologue
# JP: そう。すでに路子は知っている。\nハチロクが、意図的な\\x%l脱線転覆;#00ffc040;脱線転覆%l;#;を選んだことを。
2629 = "Đúng vậy. Michiko vốn đã biết rồi.\nRằng Hachiroku, đã cố tình lựa chọn \\x%l脱線転覆;#00ffc040;trật bánh lật tàu%l;#;."
# monologue
# JP: 乗客乗員の全滅を防ぐそのために――\n犠牲を抑えるそのために、あえての事故を起こしたことを。
2411 = "Để ngăn chặn việc toàn bộ hành khách và phi hành đoàn bị diệt vong——\nĐể hạn chế thương vong, cô ấy đã cố tình gây ra tai nạn đó."
# 【路子】
# display as 路子
# JP: 「そーちゃんはさ」
1835 = "「Anh Sou này.」"
# monologue
# JP: きょとん、と路子が首を傾げる。\n本当にわからないという顔をしている。
2781 = "Michiko ngơ ngác nghiêng đầu.\nKhuôn mặt em ấy hiện rõ vẻ không hiểu."
# 【路子】
# display as 路子
# JP: 「ゆるしたいって思ってる？\nゆるされたいって思ってる？」
1686 = "「Anh muốn tha thứ?\nHay anh muốn được tha thứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………どうだろうな」
1393 = "「............Ai mà biết được.」"
# monologue
# JP: 両方であるという気もするし、両方違うという気もしてる。\nだから、必死に考える。
2552 = "Tôi có cảm giác cả hai đều đúng, nhưng cũng có cảm giác cả hai đều sai.\nVì vậy, tôi tuyệt vọng suy nghĩ."
# monologue
# JP: 知ってはいても、答えが無いから問うてきている――\nただそれだけのことと気づいて。
2546 = "Dù đã biết, nhưng vì không có câu trả lời nên em ấy mới hỏi tôi——\nNhận ra rằng, chỉ đơn giản là vậy thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……許すも許さないもなく。誰も……\n誰かに罪があったなど、思いたくないのかもしれん」
1397 = "「......Không có tha thứ hay không tha thứ. Không một ai......\nCó lẽ anh không muốn nghĩ rằng có ai đó mang tội.」"
# 【路子】
# display as 路子
# JP: 「それって、わすれちゃいたいってこと？」
1881 = "「Vậy có nghĩa là, anh muốn quên đi sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2105 = "「！」" 
# monologue
# JP: かも、知れん。\n思えば言葉が、紡げなくなる。
2337 = "Có lẽ, là vậy.\nNghĩ đến đó, tôi không thể thốt nên lời nào nữa."
# monologue
# JP: 忘れることは、路子を置き去りにすることだ。\n決して望まぬことであるのに――忘れたいとも、思ってる。
2428 = "Quên đi, đồng nghĩa với việc bỏ rơi Michiko.\nĐó là điều tôi tuyệt đối không hề mong muốn——nhưng tôi cũng lại muốn quên đi."
# monologue
# JP: （何故、だ――何故、僕は）
2870 = "（Tại sao, chứ——tại sao, mình lại）"
# 【路子】
# display as 路子
# JP: 「わすれちゃいたいから……\nそーちゃんは、あのお人形を、好きになったの？」
1804 = "「Vì muốn quên đi nên......\nanh Sou mới thích con búp bê đó sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「――」
1386 = "「——」"
# monologue
# JP: 言われたくない。聞きたくない。答えたくない。\nだから、路子に――全てを語ってもらいたい。
2477 = "Tôi không muốn bị nói trúng tim đen. Không muốn nghe. Không muốn trả lời.\nVì vậy, tôi muốn Michiko——hãy nói ra tất cả."
# monologue
# JP: 矛盾と混乱。路子と僕とで、それを増幅しあってる。\n吐き気がするほど気持ち悪くて、けれども耳を塞げない。
2497 = "Mâu thuẫn và hỗn loạn. Michiko và tôi, đang cùng nhau khuếch đại những điều đó.\nKhó chịu đến mức buồn nôn, nhưng tôi lại không thể bịt tai lại."
# 【路子】
# display as 路子
# JP: 「そうなんだよね？\nでなければ、お人形なんて、好きになったりしないよね」
1841 = "「Là vậy đúng không?\nNếu không thì, anh đâu có lý do gì để thích một con búp bê chứ.」"
# monologue
# JP: 疑問と、確信が入り交じっている。\nそれは、僕の心のきっと、一番正直なあらわれだ。
2510 = "Sự nghi ngờ và niềm tin chắc chắn đan xen vào nhau.\nĐó chắc chắn là biểu hiện chân thật nhất, trong trái tim tôi."
# 【路子】
# display as 路子
# JP: 「一番こわいの、自分のものにしちゃったら、\nこわがらないですむもんね、思い出さないですむもんね」
1735 = "「Nếu biến thứ mình sợ nhất thành của riêng mình,\nthì sẽ không còn phải sợ nữa, không còn phải nhớ lại nữa mà nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「違う……と、思う」
1688 = "「Không phải......anh nghĩ vậy.」"
# monologue
# JP: 声を、吐く。\n意思という指を喉に突っ込み、無理矢理のように吐き戻す。
2538 = "Tôi nhả chữ ra.\nNhư thể thọc một ngón tay mang tên \"ý chí\" vào cổ họng, rồi gượng ép nôn chúng ra."
# 【双鉄】
# display as 雙鐵
# JP: 「それも――少しは、あるかもしれんが――。\nそれだけでは、無い」
1741 = "「Điều đó——có thể cũng có một chút——.\nNhưng không chỉ có vậy.」"
# 【路子】
# display as 路子
# JP: 「ちがうの？　そうなの？　やっぱりなの？」
1643 = "「Không phải sao? Là vậy sao? Quả nhiên là vậy sao?」"
# monologue
# JP: 喉から――心の一番底から。
2507 = "Từ cổ họng——từ tận đáy lòng."
# monologue
# JP: 絞るようにして出した言葉を、\n路子は、嬉々として受け入れる。
2778 = "Những lời tôi phải vắt kiệt sức mới thốt ra được,\nMichiko lại vui vẻ đón nhận."
# 【路子】
# display as 路子
# JP: 「だけど、それもちがうよ？　そーちゃん。\nお人形だって、こわれちゃうんだよ？」
1737 = "「Nhưng mà, như vậy cũng không đúng đâu? Anh Sou.\nBúp bê rồi cũng sẽ hỏng mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2105 = "「！」" 
# monologue
# JP: 路子は、僕だ。\n僕の恐れを知っている。
2776 = "Michiko, chính là tôi.\nEm ấy biết nỗi sợ hãi của tôi."
# monologue
# JP: あるいは、それを、残酷に剥き出しに突きつけて――\nもしも過ちであるのなら、きっと、正そうとしてくれる。
2558 = "Hay nói đúng hơn, em ấy tàn nhẫn phơi bày nó ra trước mắt tôi——\nNếu đó là một sai lầm, em ấy chắc chắn sẽ cố gắng sửa chữa nó."
# 【路子】
# display as 路子
# JP: 「“お人形になら置いてかれない”\n――そんなの、そーちゃんの思い込みだよ？」
1391 = "「\"Nếu là búp bê thì sẽ không bị bỏ lại\"\n——Đó chỉ là ảo tưởng của anh Sou thôi mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1935 = "「A——」"
# monologue
# JP: やはり、かと。絶望とともに思ってしまう。\nそう思ってしまう自分自身に、深い絶望を感じてしまう。
2504 = "Quả nhiên là vậy sao. Tôi nghĩ vậy cùng với sự tuyệt vọng.\nVà tôi cảm thấy tuyệt vọng sâu sắc với chính bản thân mình vì đã nghĩ như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は――だから――\nハチロクを好きになったのか？」
1916 = "「Anh——vì vậy——\nmới thích Hachiroku sao?」"
# monologue
# JP: 人形なのに。\n人形だから。
2603 = "Mặc dù cô ấy là búp bê.\nChính vì cô ấy là búp bê."
# monologue
# JP: 僕を、たったひとり遺して、\n先に逝ったり決してしないと――そう信じたから？
2390 = "Vì anh tin rằng——cô ấy sẽ tuyệt đối không bao giờ ra đi trước,\nđể lại anh cô độc một mình trên cõi đời này sao?"
# 【路子】
# display as 路子
# JP: 「わからないの？　そーちゃんのことなのに」
1932 = "「Anh không biết sao? Rõ ràng là chuyện của anh Sou mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わからないんだ。本当に。\n僕の、僕自身のことなのに」
1886 = "「Anh không biết. Thật sự đấy.\nMặc dù là chuyện của anh, của chính bản thân anh.」"
# 【路子】
# display as 路子
# JP: 「ふぅん？」
1754 = "「Hừm?」"
# monologue
# JP: 路子が、力なく笑う。
2782 = "Michiko cười yếu ớt."
# monologue
# JP: 戸惑ったように、あきれたように、\nあるいは、同情するように。
2588 = "Như đang bối rối, như đang cạn lời,\nhoặc cũng có thể, như đang thương hại."
# 【路子】
# display as 路子
# JP: 「わからないよね。好きなんて。\nみちも、そーちゃんも、こどもだもんね」
1992 = "「Không biết là phải thôi. Thích là gì cơ chứ.\nCả Michi và anh Sou, đều chỉ là những đứa trẻ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「みちっ！？」
2037 = "「Michi!?」"
# monologue
# JP: 路子の姿が掻き消える。\n車輌に一人――僕だけがぽつんと取り残される。
2783 = "Bóng dáng Michiko tan biến.\nTrong toa xe chỉ còn lại một mình——chỉ còn mình tôi trơ trọi bị bỏ lại."
# monologue
# JP: 怖い。怖い。怖い。怖い。\n僕、ひとりだけ――あのときと、まるでおんなじに。
2426 = "Sợ quá. Sợ quá. Sợ quá. Sợ quá.\nChỉ còn mình tôi——giống hệt như lúc đó."
# 【路子】
# display as 路子
# JP: 「でもね、そーちゃん。みち、知ってるの。\nだからひとつだけ、思い出させて――教えてあげる」
1679 = "「Nhưng mà này, anh Sou. Michi biết đấy.\nNên em sẽ nhắc cho anh nhớ——chỉ một điều thôi.」"
# monologue
# JP: 声だけがする。\n姿は見えない。なにも見えない。
2550 = "Chỉ có tiếng nói vang lên.\nKhông thấy bóng dáng đâu. Không thấy gì cả."
# monologue
# JP: あのときも――ああ、あのときもそうだった。\n声なき声で、路子は、僕に話しかけてた。
2804 = "Lúc đó cũng——a, lúc đó cũng vậy.\nBằng một giọng nói không thành tiếng, Michiko đã bắt chuyện với tôi."
# 【路子】
# display as 路子
# JP: 「わすれようなんてするから苦しくなるんだよ？\nわすれようとしてわすれるなんて――できっこないのに」
1839 = "「Vì cố gắng quên đi nên mới thấy đau khổ đấy?\nCố gắng quên đi để rồi quên đi——chuyện đó làm sao mà làm được chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「路子――」
2033 = "「Michiko——」"
# monologue
# JP: 手を、伸ばす。\nどこへなどというあても無く。
2531 = "Tôi đưa tay ra.\nMà chẳng biết phải vươn tới đâu."
# monologue
# JP: 路子にこの手は、\n決して、届きはしないと知って――
2605 = "Dù biết rằng bàn tay này,\nsẽ tuyệt đối không bao giờ chạm tới được Michiko——"
# monologue
# JP: （きゅっ）
2866 = "（Nắm chặt）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2105 = "「！」" 
# 【ハチロク】
# display as ？？？
# JP: 「双鉄様――」
2095 = "「Ngài Soutetsu——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチ……ロク」
1696 = "「Hachi......roku.」"
# monologue
# JP: 手を、にぎりしめてくれている。
2422 = "Em ấy đang nắm chặt lấy tay tôi."
# monologue
# JP: 愛おしい――と反射で思い、\nその感覚に、けれど、疑いも感じてしまう。
2556 = "Thật đáng yêu——tôi phản xạ nghĩ vậy,\nnhưng rồi, tôi lại cảm thấy nghi ngờ chính cảm giác đó."
# 【ハチロク】
# display as 八六
# JP: 「悪い夢を……見てらしたのですか？」
1861 = "「Ngài đã gặp......ác mộng sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「どう、だろう――悪い夢かな」
1859 = "「Sao, nhỉ——có lẽ là ác mộng.」"
# monologue
# JP: 全身がぬらつくほどに汗をかいてる。\n恐ろしかった――その感情すら、けれどもどこか薄寒い。
2624 = "Toàn thân tôi đẫm mồ hôi nhễ nhại.\nThật đáng sợ——nhưng ngay cả cảm giác đó, cũng có chút gì đó lạnh lẽo."
# monologue
# JP: 極度の不安と混乱が、僕の内側で渦をまき……\n自分自身に、強い確信を持てないでいる。
2442 = "Sự bất an và hỗn loạn tột độ đang cuộn xoáy bên trong tôi......\nTôi không thể có được niềm tin vững chắc vào chính bản thân mình."
# 【双鉄】
# display as 雙鐵
# JP: 「わからないんだ。いい夢だったような気もする。\n路子の――妹の夢だったから」
2018 = "「Anh không biết nữa. Cảm giác như đó là một giấc mơ đẹp.\nVì đó là giấc mơ về Michiko——về em gái anh.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2058 = "「Vậy sao ạ.」"
# monologue
# JP: 夢が、どんどん色あせていく。\nハチロクの手の熱さが僕を、今いるここに繋いでくれる。
2347 = "Giấc mơ dần dần phai nhạt.\nHơi ấm từ bàn tay Hachiroku đang níu giữ tôi lại với thực tại."
# 【ハチロク】
# display as 八六
# JP: 「でしたらきっと、いい夢だったのですよ」
1927 = "「Nếu vậy thì chắc chắn, đó là một giấc mơ đẹp đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうかな――\nいいや――そうしていけば、いい話だな」
1939 = "「Vậy sao——\nKhông——cứ coi như vậy đi, thế là được rồi.」"
# monologue
# JP: 言葉で、不安を塗りつぶしていく。\nそのくらいなら、僕にも出来る。
2534 = "Tôi dùng lời nói để bôi xóa đi sự bất an.\nNếu chỉ cỡ đó, thì tôi cũng làm được."
# monologue
# JP: 理性で、感情を制御する――\nそれこそが、人たる種族の、最大の強みなのだから。
2677 = "Dùng lý trí để kiểm soát cảm xúc——\nĐó chính là điểm mạnh lớn nhất của chủng loài mang tên con người mà."
# 【双鉄】
# display as 雙鐵
# JP: 「路子と僕は、ふたごだった。\nだから、あれはきっと、路子の姿をした僕だった」
1895 = "「Michiko và anh là anh em sinh đôi.\nVì vậy, đó chắc chắn là anh trong hình hài của Michiko.」"
# monologue
# JP: そう、過去の僕であり、僕の過去。\n僕が隠そうとしていたきっと、傷跡そのもの。
2631 = "Đúng vậy, là tôi của quá khứ, và là quá khứ của tôi.\nChắc chắn đó chính là vết sẹo mà tôi đã cố gắng che giấu."
# monologue
# JP: ガスランプの火で炙りだされた――\n落ち着いてみれば、ただの慣れきった古傷だ。
2340 = "Bị ngọn lửa từ chiếc đèn khò hơ cho lộ ra——\nBình tâm nghĩ lại, thì đó cũng chỉ là một vết thương cũ đã quá đỗi quen thuộc."
# 【双鉄】
# display as 雙鐵
# JP: 「揺り戻しが、少し来ただけだ。\nそれで、不安に……いささか、不安定になってしまった」
1733 = "「Chỉ là một chút ký ức dội lại thôi.\nVì thế nên, anh mới thấy bất an......hơi bất ổn một chút.」"
# monologue
# JP: そう思えばいい。そうすればいい。\n大丈夫。今までだって、そうできていた。
2798 = "Cứ nghĩ như vậy là được. Cứ làm như vậy là được.\nKhông sao đâu. Cho đến tận bây giờ, mình vẫn làm được như vậy mà."
# monologue
# JP: 自分のことを自分で決める。\n当然のことを、すれば、いいのだ。
2733 = "Tự mình quyết định chuyện của bản thân.\nChỉ cần làm những điều hiển nhiên đó, là được."
# 【ハチロク】
# display as 八六
# JP: 「でしたら、不安を――\nどうか、わたくしにもお分けください」
1924 = "「Nếu vậy, sự bất an đó——\nxin ngài hãy chia sẻ cho cả em nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク……」
1697 = "「Hachiroku......」"
# monologue
# JP: ハチロクの手が、僕の手を解き伸びてくる。\n僕の頭を掻き抱こうと、大きく大きく広げてくれる。
2335 = "Hachiroku buông tay tôi ra rồi vươn tới.\nDang rộng vòng tay, như muốn ôm lấy đầu tôi vào lòng."
# monologue
# JP: そこには確かなぬくもりがあり、心やすらぐ時間があろう。\n――が。
2746 = "Nơi đó chắc chắn sẽ có sự ấm áp, và một khoảng thời gian bình yên.\n——Nhưng."
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、平気だ。\n夢ごときで、お前を煩わせたくもない」
1966 = "「Không sao, anh ổn mà.\nAnh không muốn làm phiền em chỉ vì một giấc mơ.」"
# monologue
# JP: 身を起こす。\nそうしたくなど、無いのだが。
2541 = "Tôi ngồi dậy.\nDù bản thân chẳng hề muốn làm vậy chút nào."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様――」
# 2095 = "「雙鐵少爺——」" 
# monologue
# JP: 今は、その手に甘えられない。\n僕には、そうする資格が無い。
2533 = "Lúc này, tôi không thể dựa dẫm vào vòng tay đó.\nTôi không có tư cách để làm như vậy."
# monologue
# JP: ハチロクを好きという感情が、僕の卑怯な逃避でないと。\n――そうと、揺るぎなく決められるまで。
2689 = "Rằng tình cảm tôi dành cho Hachiroku không phải là một sự trốn tránh hèn nhát.\n——Cho đến khi tôi có thể xác định được điều đó một cách không lay chuyển."
