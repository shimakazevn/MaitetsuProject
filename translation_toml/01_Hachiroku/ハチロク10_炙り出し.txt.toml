1883 = "「感到熱血沸騰？結果我們採用了乙種方案，你感覺有些失落」" 

# 【ポーレット】
# display as 波萊特
# JP: 「みたいな感じだと思います。自覚なかったですけど――\nああ、恥ずかしい」
1847 = "「差不多是這種感覺。雖然這是我下意識的行為——啊啊，真是不好意思」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや。良いヒントをくれた。ありがたい」
1965 = "「沒事，我們反倒要感謝你給出了提示」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
# 1751 = "「哎？」" 

# monologue
# JP: ポケットから、借りっぱなしのカメラを取り出す。\nこいつも随分、僕の手に馴染んでくれた。
