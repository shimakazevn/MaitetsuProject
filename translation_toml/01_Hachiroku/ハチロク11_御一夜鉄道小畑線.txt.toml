2555 = "Khí nén bị xả ra đột ngột. \n\\x%l動輪;#00ffc040;Bánh xe chủ động%l;#; rít lên những tiếng chói\ntai."

# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
1782 = "「A!?」"

# 【ニイロク】
# display as 二六
# JP: 「っ！！！！？」
1739 = "「!!!!?」"

# monologue
