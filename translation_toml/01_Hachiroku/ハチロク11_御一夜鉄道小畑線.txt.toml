2617 = "就讓我們在此放鬆心情，感受這山巔的微風，品嘗這甘甜的清泉吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと……まぁ」
2186 = "「這……可真」" 

# 【ハチロク】
# display as 八六
# JP: 「まさか、まさかでございましたね」
2150 = "「言辭在此刻簡直蒼白無力」" 

# monologue
# JP: ……冷静に考えてみれば、まったくもって頷くしか無い。
1199 = "……冷靜想想，我也不得不點頭贊同。" 

