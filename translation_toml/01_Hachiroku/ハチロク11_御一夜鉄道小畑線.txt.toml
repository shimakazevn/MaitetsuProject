# JP: ――やがて大きな反動とともに、いきなり終わる。
1172 = "——Rồi sau đó là một lực giật lùi lớn, và\nđột ngột dừng lại."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、無事か。オリヴィ、ニイロク、赤井宮司は」
1681 = "「Hachiroku, không sao chứ. Olivy, Niiroku,\nông Akai thì sao」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、無傷でございます」
1962 = "「Em không bị thương gì ạ.」"

# 【ニイロク】
# display as 二六
# JP: 「はぁっ、はぁっ、はぁっ、はぁっ」
1747 = "「Hộc, hộc, hộc, hộc」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1781 = "「!!?」"

# monologue
# JP: 一際激しい呼気と排気に、\n背筋にゾクリ、寒気が走る。
2901 = "Tiếng hít thở và thở ra dồn dập khác\nthường,\nkhiến sống lưng tôi chạy dọc một luồng khí\nlạnh."

# monologue
# JP: いや、そういえばさっきの一瞬、\n苦痛に満ちた、呻きのような何かを聞いた気がした。
2802 = "Không, nhắc mới nhớ khoảnh khắc lúc nãy, \ntôi dường như đã nghe thấy một âm thanh\nnhư tiếng rên rỉ đầy đau đớn."

# 【双鉄】
# display as 雙鐵
# JP: 「ニイロク――どこか痛めたか！？」
1641 = "「Niiroku——có bị thương ở đâu không!?」"

# 【ニイロク】
# display as 二六
# JP: 「あ。違う。\nそこは平気。――清春が守ってくれた」
1784 = "「A. Không. \nChỗ đó không sao. ——Kiyoharu đã bảo vệ\ntôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？　しかし、今」
1805 = "「Hử!? Nhưng mà, vừa rồi」"

# 【赤井】
# display as 赤井
# JP: 「私も無事です。それよりも……オリヴィさんは」
1951 = "「Tôi cũng không sao. Quan trọng hơn là...\ncô Olivy」"

# monologue
# JP: 言われて、気づく。\n姿がどこにも――どこにも――っ！！？
2858 = "Nghe vậy, tôi mới nhận ra. \nBóng dáng em ấy không thấy đâu——không thấy\nđâu——!!?"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？　オリヴィっ！？　オリヴィ！！！」
2202 = "「!!? Olivy!? Olivy!!!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツー！　ハチロクー！！\nこっち！　おりてきてー！！」
2249 = "「Soutetsu! Hachiroku!! \nBên này! Xuống đây đi~!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1781 = "「啊！！？」" 

# monologue
# JP: 望んだ声が、車外から――
2904 = "Giọng nói mong chờ, vang lên từ bên ngoài\nxe——"

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1774 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと！　もう降りていたのか」
2104 = "「Thật không ngờ! Em ấy đã xuống xe từ lúc\nnào vậy.」"

# monologue
# JP: 安堵とともに、全身からドっと力が抜ける。\nしかし、ともかく停車措置だ。
2687 = "Cùng với sự nhẹ nhõm, toàn bộ sức lực\ntrong người tôi như tuôn trào ra ngoài.\nNhưng mà, dù sao thì cũng phải thực hiện\ncác biện pháp dừng tàu đã."

# monologue
# JP: \x%l自弁;#00ffc040;自弁%l;#;を運転位置へと戻し、\x%l単弁;#00ffc040;単弁%l;#;を緩\x%lブレーキ;#00ffc040;ブレーキ%l;#;に。\n\x%l逆転機;#00ffc040;逆転機%l;#;を\x%lミッドギア;#00ffc040;ミッドギア%l;#;へと戻して\x%l指差喚呼;#00ffc040;指差喚呼%l;#;して――
2684 = "Đưa \\x%l自弁;#00ffc040;van hãm tự động%l;#; về vị trí lái, chuyển \\x%l単弁;#00ffc040;van hãm đơn%l;#;\nsang chế độ nhả \\x%lブレーキ;#00ffc040;phanh%l;#;.\nĐưa \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; về \\x%lミッドギア;#00ffc040;số trung tính%l;#; rồi \\x%l指差喚呼;#00ffc040;chỉ tay hô xác nhận%l;#;\n——"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「すっごいねー！　ソーテツ、よく気づいたねー！\nハヤト直前でも、全然ゆるんでなかったねー」
2243 = "「Giỏi quá nha! Soutetsu, tinh mắt thật đó!\nNgay trước khi đến Hayato, anh cũng không\nhề lơ là chút nào nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや。平地にもどり、正直どこかゆるんではいた。\n逆に、それゆえ気づけたのかもしれんという気はする」
1619 = "「Không. Khi trở lại đồng bằng, thành thật\nmà nói tôi cũng có chút lơ là.\nNgược lại, chính vì thế mà tôi mới nhận ra\nđược cũng nên.」"

# monologue
# JP: 線路の不陸。
2816 = "Đường ray không bằng phẳng."

# monologue
# JP: はっきりとした――\nためらわずに非常\x%lブレーキ;#00ffc040;ブレーキ%l;#;をかけられたほどの。
2824 = "Rất rõ ràng—— \nĐủ để tôi không ngần ngại đạp phanh khẩn\ncấp \\x%lブレーキ;#00ffc040;phanh%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「はっきり気づいた、ハズ……なのだが――」
1961 = "「Đáng lẽ... tôi phải nhận ra rõ ràng\nchứ——」"

# monologue
# JP: しかし、不陸が見当たらない。\n線路はどこまでも平坦で……
2766 = "Nhưng, không thấy chỗ nào gồ ghề cả. \nĐường ray vẫn bằng phẳng tít tắp..."

# 【双鉄】
# display as 雙鐵
# JP: 「あるいは、異物を踏んだのか？」
2204 = "「Hay là, cán phải dị vật gì sao?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「んーん、ちがうよ？\nけど、そんな見方じゃわかんないかなー」
1622 = "「Không đâu, sai rồi! \nNhưng mà, nhìn như vậy thì không nhận ra\nđược đâu~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1771 = "「啊」" 

# monologue
# JP: 教わっている。
2682 = "Tôi đã được dạy."

# monologue
# JP: \x%l保線;#00ffc040;保線%l;#;とは、\nレールとキスして、そこから仕事が始まるものだと。
2695 = "Rằng \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, \nlà phải hôn lên đường ray, và công việc\nbắt đầu từ đó."

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま。わたくしもお供いたします」
2246 = "「Ngài Soutetsu. Em cũng sẽ đi cùng ngài.」"

# monologue
# JP: 何が見えるというのだろうか。
2425 = "Sẽ nhìn thấy được điều gì cơ chứ."

# monologue
# JP: とにもかくにも地面に這って、\n頬をぴったりレールへと――
2454 = "Dù sao thì cũng phải bò ra đất, \náp má sát vào đường ray——"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ……これは――」
2192 = "「Cái gì... thế này——」"

# 【ハチロク】
# display as 八六
# JP: 「地面が、浅く――これほど、広く――」
1837 = "「Mặt đất, nông thế này——mà lại rộng, đến\nthế này——」"

# monologue
# JP: 隆起……といえばいいのだろうか。\n地面が、わずかに盛り上がっている。
2945 = "Nói là phồng rộp lên... thì có đúng không\nnhỉ.\nMặt đất, đang hơi nhô lên một chút."

# monologue
# JP: 浅くはあるが、ドーム型……\nお皿を逆さに伏せているような形になってしまっている。
2958 = "Tuy nông nhưng lại có hình vòm... \nNó có hình dạng giống như một cái đĩa bị\núp ngược."

# 【双鉄】
# display as 雙鐵
# JP: 「これは……かなりの広範囲だな」
2200 = "「Cái này... phạm vi khá rộng đấy.」"

# monologue
# JP: 線路を巻き込んでいる範囲だけでも、\n50メートルほどの長さがあろう。
2468 = "Chỉ tính riêng phần bao quanh đường ray, \ncũng phải dài cỡ 50 mét."

# monologue
# JP: しかし、線路にかかる部分は隆起全体のほんの一部。\n隆起の円の何分の一かを、切り取っている形にすぎない。
2764 = "Nhưng phần dính dáng đến đường ray chỉ là\nmột phần nhỏ của toàn bộ khu vực bị phồng\nrộp.\nNó chỉ cắt ngang một phần mấy của vòng\ntròn phồng rộp mà thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、これは？」
1684 = "「Hachiroku, cái này là?」"

# 【ハチロク】
# display as 八六
# JP: 「……わたくしも、まったく初めて目にいたします。\n線路が持ちあがるという経験は、わたくしには――」
1278 = "「...Đây cũng là lần đầu tiên em nhìn thấy\nhiện tượng này.\nKinh nghiệm về việc đường ray bị nâng lên,\nem chưa từng——」"

# 【赤井】
# display as 赤井
# JP: 「寒さが厳しい地方では、新しい\x%l枕木;#00ffc040;枕木%l;#;の中の水分が凍結し、\nそれが線路を持ち上げるということもあると、伝聞では」
1834 = "「Ở những vùng lạnh giá, nước bên trong \\x%l枕木;#00ffc040;tà vẹt%l;#;\nmới bị đóng băng,\nvà điều đó có thể làm đường ray bị nâng\nlên, tôi từng nghe đồn như vậy.」"

# 【ニイロク】
# display as 二六
# JP: 「けど。いま。凍るわけない」
1651 = "「Nhưng mà. Bây giờ. Làm sao đóng băng\nđược.」"

# 【赤井】
# display as 赤井
# JP: 「ですね、ニイロク。それに、これほど広範囲に\n一度に発生するようなものとも思えません」
2038 = "「Đúng vậy, Niiroku. Hơn nữa, tôi không\nnghĩ hiện tượng này\nlại có thể xảy ra trên một phạm vi rộng\nnhư vậy cùng một lúc.」"

# monologue
# JP: ……つまり、ハチロクにも赤井宮司にもニイロクにも、\n原因がわからぬということか。
1203 = "...Nói cách khác, cả Hachiroku, ông Akai\nvà Niiroku,\nđều không biết nguyên nhân là gì sao."

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ、これはいったい――」
1867 = "「Olivy, cái này rốt cuộc là——」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかんない。\nオリヴィも、こんなのみるの、はじめてだから」
1627 = "「Không biết. \nĐây cũng là lần đầu tiên Olivy nhìn thấy\nthứ như thế này.」"

# monologue
# JP: 頼みの綱をあっさり切って、オリヴィはフルフル首を振る。\nそうしてじっと――真面目な瞳で、僕を見上げる。
2565 = "Chặt đứt tia hy vọng mong manh một cách\nphũ phàng, Olivy lắc đầu quầy quậy.\nRồi em ấy nhìn chằm chằm——nhìn lên tôi\nbằng đôi mắt nghiêm túc."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「もしできたら、\nムナカタに見てもらった方がいいと思う」
1875 = "「Nếu được, \nanh nên nhờ Munakata xem thử thì tốt hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すぐに交渉するよう、ポーレットに進言しよう」
2154 = "「A, tôi sẽ đề nghị Paulette nhanh chóng\nthương lượng việc này.」"

# monologue
# JP: オリヴィの高度な\x%l保線;#00ffc040;保線%l;#;技術が、宗方\x%l機関士;#00ffc040;機関士%l;#;由来のものなら、\n是非もない。
2589 = "Kỹ thuật \\x%l保線;#00ffc040;bảo trì đường ray%l;#; bậc cao của\nOlivy, nếu là bắt nguồn từ \\x%l機関士;#00ffc040;lái tàu%l;#;\nMunakata,\nthì không còn gì để bàn cãi."

# monologue
# JP: 今の僕らに、それ以上に頼れそうなツテは存在しない。
2606 = "Đối với chúng tôi hiện tại, không còn chỗ\nnào đáng tin cậy hơn thế nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「……宗方\x%l機関士;#00ffc040;機関士%l;#;に、\n高度な\x%l保線;#00ffc040;保線%l;#;技術と知識を有する方に見てもらわねば――」
1273 = "「...Phải nhờ \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, \nmột người có kỹ thuật và kiến thức \\x%l保線;#00ffc040;bảo trì đường ray%l;#;\nbậc cao xem xét giúp——」"

# monologue
# JP: そうしなければ、御一夜鉄道が存続の危機に陥る――\nこれは恐らく、そういう事態と思うから。
2446 = "Nếu không làm vậy, Đường sắt Ohito sẽ rơi\nvào nguy cơ sống còn——\nBởi vì tôi nghĩ, có lẽ đây chính là một\ntình huống như vậy."
