1721 = "「Nhưng mà——trước đó. Ở tuyến đường chuyên\ndụng của nhà máy luyện thép Tsurumi,\nem đã từng kéo hàng hóa đúng không?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーだよ、だからね。\nぼろチビたちは、フジミノブからいっしょなの！」
2012 = "「Đúng rồi đó, vì thế nên. \nMấy bé nhỏ rách rưới này đã đi cùng Olivy\ntừ hồi ở Fujiminobu rồi!」"

# 【双鉄】
# display as 雙鐵
