1807 = "「Hử!? \\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata và Olivy, \nđã từng làm việc cùng nhau từ hồi ở\nTsurumi sao?」"

# 【オリヴィ】
# display as 奥莉薇
