2118 = "「Hơn nữa... Munakata... tuy làm việc cùng\nnhau trong lúc \\x%l入換;#00ffc040;dồn toa%l;#; nhưng——\nchỉ là, như vậy thôi.」"

# monologue
# JP: （かくっ）
2993 = "（Khựng）"

