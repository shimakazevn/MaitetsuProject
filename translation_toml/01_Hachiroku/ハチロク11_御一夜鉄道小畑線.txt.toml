1996 = "「Đúng vậy đó! Mặc dù bây giờ thời gian\nOlivy\nkhông kéo mấy bé nhỏ rách rưới này đã trở\nnên dài hơn rất nhiều rồi.」"

# monologue
# JP: 声が、優しい。
2572 = "Giọng nói, thật dịu dàng."

