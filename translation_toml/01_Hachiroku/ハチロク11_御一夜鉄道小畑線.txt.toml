2187 = "「Thật không ngờ, những \\x%l客車;#00ffc040;toa hành khách%l;#; nhỏ\nbé này cũng đã\nhoạt động 100 năm rồi sao.」"

# 【オリヴィ】
# display as 奥莉薇
