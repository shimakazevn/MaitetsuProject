1765 = "「A... hèn chi ngôn từ của chú ấy không\ngiống người ở đây.\nChắc hẳn chú ấy từng thuộc \\x%l機関区;#00ffc040;kho đầu máy%l;#;\nShintsurumi đúng không ạ.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「すごいねハチロク！　だいせーかい！！\nだからねオリヴィ、み鉄でまた会ってびっくりしたの！」
1678 = "「Hachiroku giỏi quá! ĐOÁN ĐÚNG RỒI!! \nVì thế nên, lúc gặp lại ở Đường sắt Mikan,\nOlivy đã rất ngạc nhiên đó!」"

# 【赤井】
# display as 赤井
