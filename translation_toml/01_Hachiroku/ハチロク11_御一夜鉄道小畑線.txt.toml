[script]
# lines: 468 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「トーケツホゾン？　なぁに？　それ？」
1911 = "「封存？那是什麼意思啊？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、ふーん？　もっとギジュツテキに進むまで？\nそっかー、なるほどねー、そんなこともできるんだー」
1760 = "「啊——嗯？就是暫時睡到技術有所進步？原來是這樣啊，還可以這樣」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど。いい。いらない。トーケツホゾン。\nだってオリヴィ、いまのままでがんばりたいから！」
1731 = "「可是沒關係的，奧莉薇不需要封存。奧莉薇就想以現在的自己繼續努力！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だってトーケツホゾンして、オリヴィの\x%lタブレット;#00ffc040;タブレット%l;#;から、オリヴィのコピーみたいの？　つくれたとして」
1702 = "「即便封存了，以後能夠通過奧莉薇的\\x%lタブレット;#00ffc040;操作板%l;#;，重新製作一個什麼像是奧莉薇的複製品一樣的東西」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そういうふうに\x%lタブレット;#00ffc040;タブレット%l;#;が役にたっても。そのあと。\nオリヴィ、なにしたらいいのか――わかんなくなりそう」
1883 = "「如果說是以\\x%lタブレット;#00ffc040;操作板%l;#;這種方式做出了貢獻的話，那奧莉薇就不知道之後還能做什麼了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「すぐにそういうの作れるようになるなら、\nトーケツホゾンなんて、きっとしなくてがんばれるし」
1687 = "「再說如果真能很快做到這麼厲害的事情，那想必加把勁不封存也沒問題的」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「トーケツホゾンしなくちゃまてない、\n長い、長い時間がもし、ひつようになるならさ」
1885 = "「如果說還要很久很久的時間，非封存不可的話」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなだったら、きっともう、ムナカタいないし……\nハチロクも、ソーテツもみんなもいないかもでしょ？」
2107 = "「等到那時候，想必宗方已經不在了吧……說不定八六和雙鐵你們也都不在了，不是嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そしたら、きっと、走ってたってさみしいよ。\nだからオリヴィ、このままで――」
2226 = "「那樣的話，就是坐上機車也一定很寂寞的吧。所以奧莉薇要保持現在這樣——」" 

# 【ハチロク】
# display as ？？？
# JP: 「だんなさま――双鉄さま」
1855 = "「夫君——雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん――む……」
1792 = "「嗯——唔……」" 

# monologue
# JP: いつもの天井。が、光が違う。\n赤い――夕焼け、夕暮れ時か。
2770 = "熟悉的天花板，但光線與平常不同。滿眼赤紅——原來是夕陽，現在是傍晚啊。" 

# monologue
# JP: 僕を見ているすずの全部を、\n西日が赤く染めている。
2925 = "鈴注視著我，落日餘暉灑遍了她的全身。" 

# 【ハチロク】
# display as 鈴
# JP: 「気持ちよさそうに寝てらしたので、\nお起こしするのはしのびない、とも感じたのですが」
1965 = "「我見您睡得香甜，實在不忍擾您清夢」" 

# monologue
# JP: 首を動かし、時計を眺める。\n――予想通りの針位置だ。
2670 = "我動了動腦袋，瞄了一眼鐘——時間與我的猜想相差無幾。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレットが乗務を終える時間だな。\n報告にいかねば。起こしてくれてありがとう」
1284 = "「……波萊特的乘務任務也差不多該結束了。是該過去進行報告了。謝謝你叫我起來」" 

# monologue
# JP: 体を起こせば、\nすずはほっとしたような笑みを浮かべる。
2866 = "見我起身，鈴的笑容中也似乎透出了一絲安心。" 

# 【ハチロク】
# display as 鈴
# JP: 「妻として、当然のことでございます」
1947 = "「您客氣了，此乃為妻應盡之事」" 

# monologue
# JP: 頭を撫でれば、\nすずの頭が手のひらに吸い付いてくる。
2693 = "我輕撫她的頭，手心的感覺讓我多有留戀。" 

# monologue
# JP: 絹糸を霧にくぐらせたような触感が、\nさらさら静かに、指を、手のひらを喜ばせてくれる。
2616 = "就如帶著絲絲霧氣的蠶絲一般的觸感，靜靜地從掌心、指尖滑過，讓我愛不釋手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……いつまででも撫でていたいが、そうもいかんか」
1282 = "「……我真想再多摸一會，可時間好像不允許了啊」" 

# 【ハチロク】
# display as 鈴
# JP: 「でしたら、\nこの続きは帰宅いたしましてからまた、ということで」
2205 = "「那不妨，等您回來之後再繼續，不知意下如何」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしよう」
2216 = "「那就這樣吧」" 

# monologue
# JP: 名残りのひと撫でをすくい上げ、指の間に雨を降らせる。
2648 = "懷著絲絲不捨最後輕撫了一下，而後那秀髮就如細雨般由指間滑落。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィは、日々姫の部屋か？」
1863 = "「奧莉薇在日日姬房間嗎？」" 

# 【ハチロク】
# display as 鈴
# JP: 「はい。クウラアを効かせたお部屋の日々姫のベッドで、\n気持ちよさそうにすやすやと眠っておりました」
2008 = "「是的。日日姬房間開了空調，她正在那邊床上睡得安穩」" 

# 【双鉄】
# display as 雙鐵
# JP: 「体温は？」
2264 = "「體溫呢？」" 

# 【ハチロク】
# display as 鈴
# JP: 「夏掛けを直したときに少しおでこに触れたのですが、\nほの温かい程度で、安全に稼働できる範囲かと」
1830 = "「在給她蓋涼被的時候稍微摸了一下額頭，也就是微溫的程度，應該在安全範圍內」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら何よりだ。\n旅疲れで体調を崩さぬかと、そこがいささか心配だった」
2209 = "「那再好不過。若是舟車勞頓累壞了身體可就不好了，其實我還真是多少有些擔心來的」" 

# 【ハチロク】
# display as 鈴
# JP: 「まぁ、わたくしたち\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に旅疲れなど――」
1942 = "「您多慮了，舟車勞頓於我們\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;而言——」" 

# monologue
# JP: いたずらっぽく浮かんだ笑顔が、\nけれどもすぐに、困ったようなものへと変わる。
2497 = "剛剛還掛在臉上那些許頑皮的笑容，卻轉眼就變得有些為難的感覺。" 

# 【ハチロク】
# display as 鈴
# JP: 「……などとは、申せなくなってしまいましたね。\n不死鳥博士のお話を聞いてしまったあとでは」
1279 = "「……我本想說根本無所謂的。但聽過不死鳥博士的一番話以後，也很難再這樣講了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1797 = "「嗯」" 

# monologue
# JP: \x%lタブレット;#00ffc040;タブレット%l;#;――魂は必ず、\n時間とともに不可逆の消耗を重ねていく。
109 = "\\x%lタブレット;#00ffc040;操作板%l;#;——其中的靈魂，必然會隨時間流逝而產生、積累不可逆的損耗。" 

# monologue
# JP: 精神の疲れが人間の肉体を疲弊させるのと同様に、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のボディも決して、その影響を免れ得まい。
2611 = "就像人類精神層面的疲勞也會影響到肉體一樣，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的身體顯然也不能例外。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すずはどうだ？　疲れていないか？\n色々驚き、頭も使ったことと思うが」
2232 = "「鈴，你怎麼樣？有沒有覺得累？這一趟真是充滿了各式各樣的意外，應該消耗了不少腦力吧」" 

# 【ハチロク】
# display as 鈴
# JP: 「左様ですね。お話の直後には、動揺を……\nこころの激しいざわつきを、感じたように思いましたが」
2152 = "「誠如您所言。在剛聽到那番話之後……我的心中的確激盪洶湧，也頗感動搖」" 

# monologue
# JP: （ことっ）
2981 = "（依靠）" 

# monologue
# JP: すずの頭がよりかかってくる。
2921 = "鈴又把頭靠了過來。" 

# monologue
# JP: せっかく区切りをつけたのに、\n指はふたたび髪の間をくぐりはじめる。
2582 = "好不容易抽回的手，就又不由自主地沉在了她的秀髮間。" 

# 【ハチロク】
# display as 鈴
# JP: 「嬉しい気持ちが、戸惑いも疲れも消してくれたようです。\n喜びと希望とが、こんこんと湧き出てまいりますので」
1649 = "「但之後喜悅與希望源源不斷地湧出，那開心的感覺，將那些疑惑和疲勞都遠遠地趕跑了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「希望――か」
1933 = "「希望……嗎」" 

# monologue
# JP: 何が、希望を示したか。\n聞かずとも共有できている。
2841 = "而點亮了這希望的話語，也同樣早已銘刻在了我的心中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、ひとつの、[しゅ]種」
1220 = "「\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;是一個獨立的物種」" 

# monologue
# JP: 呟けば、すずは力強く頷き返す。\n種であるのなら――僕との間に、すずも、あるいは……
2663 = "我低聲囈語著，而八六也用力點了點頭。既然是一個物種——那鈴與我之間，或許……" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。希望だな。\n確かに、僕たちは希望も受け取った」
1815 = "「嗯，的確是希望。對我們而言是毫無疑問的希望」" 

# monologue
# JP: 仮説がもしも真であるなら、\n僕たち自身のレールもきっと、繋いでいける。
2845 = "若推論當真屬實，我們自身的鐵軌亦或可不至中斷。" 

# monologue
# JP: 僕達が走れなくなってしまったとても、\n次の世代に、\x%lタブレット;#00ffc040;タブレット%l;#;を受け渡すことができる。
2513 = "即便將來有一天我們無法繼續馳騁，那也可以將\\x%lタブレット;#00ffc040;操作板%l;#;傳承給下一代。" 

# 【双鉄】
# display as 雙鐵
# JP: 「未来に可能性がある以上……凍結にもまた希望があると\n――オリヴィも、受け取ってくれれば良かったのだが」
1879 = "「如果未來還有可以期待的可能性……封存便也意味著希望——如果奧莉薇也能接受的話自然是最好不過」" 

# monologue
# JP: 夢に見るほど、僕は衝撃を受けたのだろう。
2714 = "方才的夢境，也說明了這對我的衝擊之大。" 

# monologue
# JP: 最悪の場合、いよいよ危なくなってしまったら凍結を――\nその提案を、ほとんど即時に断られてしまったことに。
2721 = "最差的情況，就是拖到要變得危險了再進行封存——那個提案也基本上就是被當場否決了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凍結からの復活時、仮に僕らが寿命を迎えていたとて。\n右田の家や御一夜鉄道が、必ずオリヴィを歓迎しように」
2121 = "「而等奧莉薇從封存中醒來時，即便我們已不在此世，右田家和御一夜鐵路也仍舊會歡迎她的」" 

# 【ハチロク】
# display as 鈴
# JP: 「左様、ですね……」
1608 = "「一定，會的……」" 

# monologue
# JP: すずが、目を閉じ考え込む。
2922 = "鈴合起雙眼思考起來。" 

# 【ハチロク】
# display as 鈴
# JP: 「オリヴィちゃんはまだ、家族という絆の強さを、\nきっと――捉えきれていないものかと存じます」
1864 = "「奧莉薇她想必是還沒有完全理解過，家人之間那種密不可分的親情吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1997 = "「是啊」" 

# monologue
# JP: それは当然のことだろう。
2899 = "這也是理所當然的吧。" 

# monologue
# JP: 帝鉄式の中で運用されていた、\n特定のマスターを持たぬ、冥国式の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。
2575 = "她身處帝國鐵路那種環境中，還是沒有特定司機的美國式\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……オリヴィの育ちで、それをわかれという方が」
1265 = "「……以奧莉薇的經歷而言，根本就沒有體會的可能吧」" 

# 【ハチロク】
# display as 鈴
# JP: 「いいえ、双鉄さま。だんなさま」
2260 = "「非也，雙鐵少爺——夫君」" 

# monologue
# JP: きわめて珍しいことに。
2900 = "這倒真是極為罕見。" 

# monologue
# JP: 『いいえ』と正面――真正面から、\nすずが僕の言葉を遮り、否定する。
2923 = "鈴把“非也”直接地——直截了當地對我說出來，否定了我說的話。" 

# 【ハチロク】
# display as 鈴
# JP: 「わたくしとて同じことだったのです。双鉄さま」
2018 = "「曾經的我也是同樣啊。雙鐵少爺」" 

# monologue
# JP: すずの頭が小さく動く。\nこつんとおでこが、僕のおでこに当てられる。
2927 = "鈴輕輕地轉了轉頭，讓她的額頭輕輕地和我的額頭頂在一起。" 

# monologue
# JP: すずの思いを、瞬間、受け取れるような気がして、\n\x%l共感;#00ffc040;共感%l;#;とはこんなものかもしれぬと、ふと思う。
2838 = "而我似乎也在這一瞬間，理解了鈴心中的想法。以至於我不禁認為，\\x%l共感;#00ffc040;共鳴%l;#;是否也是這樣的感覺。" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまのお話を聞いて。時を重ねて、こころを重ねて。\nそうしなければ、わたくしも決して捉え得ませんでした」
2122 = "「聽雙鐵少爺教誨，共度時光，心繫一處，若非如此，我又怎能妄言有所體會」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1816 = "「嗯？」" 

# 【ハチロク】
# display as 鈴
# JP: 「命は、受け渡せるものということを。\n想いはきっと、引き継いでもらえるということを」
2069 = "「生命能夠不斷延續，與之同理，希望也一定是能不斷傳遞下去的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1757 = "「啊——」" 

# monologue
# JP: 父を、母を、路子を思う。\n僕は確かに命を受け継ぎ――思いを引き継いでいるのだと。
2656 = "我不禁想起我的父母和路子。正是他們授予了我生命——寄予我對未來的希望。" 

# monologue
# JP: 真闇姉を日々姫を、義父さん義母さんを、汰斗さんを思う。\n思いは、命は、守られ守り、育みあっていくものなのだと。
2658 = "我也想到了真闇姐、日日姬、養父母和汰斗老爺。他們挽救了我的生命，傾注著感情守護、養育了我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――それが、家族か」
1241 = "「——這就是家人啊」" 

# monologue
# JP: すずが小さく、強く頷く。\nうれしく、思う。
2928 = "鈴輕輕地點了點頭，其中卻蘊含著強烈的贊同。這種心意相通的感覺讓我甚是受用。" 

# monologue
# JP: 家族の形をすずが僕から、僕らから受け取ってくれている。\nならばその時点で、僕の生には、確かな意味が生じている。
2929 = "鈴透過我和我們感受到了家人的存在，而自那一刻起，我的生命也無疑具備了貨真價實的意義。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……いつか、すずが話してくれたことだが」
1292 = "「……鈴，你還記得之前說過的話嗎」" 

# 【ハチロク】
# display as 鈴
# JP: 「なにを、お話いたしましたでしょう」
1625 = "「不知您指的是哪句呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らは、どんどん欲深くなるな。\nこの上ない幸せを抱いてなお、更に更にと望んでしまう」
1958 = "「我們變得越來越貪心了。明明都已經無比幸福了，但卻又產生了更多的奢望」" 

# 【ハチロク】
# display as 鈴
# JP: 「はい。まことに左様ですね、双鉄さま」
2004 = "「是的。您說得沒錯，雙鐵少爺」" 

# monologue
# JP: ごくごく自然にキスをする。\n会話のように、呼吸のように。
2666 = "我們自然地吻在一起。如言語，如呼吸。" 

# monologue
# JP: すずは小さく唇を舐め、\n吐息のような言葉を続ける。
2926 = "鈴輕舐朱唇，以幾乎輕不可聞的聲音悠然啟齒。" 

# 【ハチロク】
# display as 鈴
# JP: 「……この欲がどれほど甘やかで、抗いがたいか。\n薄々感じられるがゆえに、きっと、固く蓋をしてしまう」
1290 = "「……這期冀是何等甜美，令人無從抗拒——而正因隱約感到，反而刻意迴避、視而不見」" 

# monologue
# JP: かつてのわたくしが、そうであったのとおんなじに――
2844 = "與我當初的歷程可謂如出一轍——" 

# monologue
# JP: すずがあえては語らぬ声を、\n僕のこころは確かに聞き取る。
2924 = "鈴未成聲的話語，直擊了我的心房。" 

# 【ハチロク】
# display as 鈴
# JP: 「ですからきっと、オリヴィちゃんには」
1974 = "「所以想必奧莉薇也……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わからせる必要などはないのだな。\n蓋を開く――素直になってもらう、それだけでいい」
2033 = "「沒有必要刻意去告訴她什麼。只要能夠不再迴避，坦率面對，就足夠了」" 

# 【ハチロク】
# display as 鈴
# JP: 「で、あるのではないかと、わたくしは」
1950 = "「我也正在想是否如此便好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
1798 = "「嗯！」" 

# 【ハチロク】
# display as 鈴
# JP: 「きゃ！」
1738 = "「呀！」" 

# monologue
# JP: すずを抱きかかえ立ち上がる。
2690 = "我直接抱著鈴站了起來。" 

# monologue
# JP: 寝ぼけ頭をスッキリできた。\n夢の残滓を振り払えた。
2798 = "睡意已然一掃而空，適才夢境的餘韻也已煙消雲散。" 

# 【双鉄】
# display as 雙鐵
# JP: 「蓋をどのように開けてもらうか――\nそれは恐らく、考えぬほうがいいのだろうな」
2132 = "「至於怎樣才能不再迴避——這恐怕還是不要刻意去想更好吧」" 

# 【ハチロク】
# display as 鈴
# JP: 「左様ですね。作為はきっと、北風になってしまうかと」
2148 = "「言之有理。刻意做什麼的話，恐怕只會適得其反」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、同じく感じている」
1956 = "「我也這麼覺得」" 

# monologue
# JP: ならば、この話はここまでだ。
2917 = "那這個話題也該到此為止了。" 

# monologue
# JP: オリヴィを照らす太陽に目処がついたら、\nそのときにまた、考え、動くこととしよう。
2805 = "等到打開奧莉薇心門契機的時候，再去考慮該如何行動吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、行くか。\n五分で身支度を整える」
2220 = "「那我們準備走吧，五分鐘之後出發」" 

# 【ハチロク】
# display as 鈴
# JP: 「オリヴィちゃんを起こしてまいりますか？」
2142 = "「要把奧莉薇叫起來嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……いや、今回は僕たちだけの方が良いだろう」
1262 = "「……不了吧，今天或許就我們兩個去比較好」" 

# 【ハチロク】
# display as 鈴
# JP: 「かしこまりました」
1874 = "「好的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、先に――」
2207 = "「那你就先——」" 

# 【ハチロク】
# display as 鈴
# JP: 「でしたら、ね？　双鉄さま」
2229 = "「那雙鐵少爺」" 

# monologue
# JP: “先に支度をして待っていてくれ”――\n出かけた言葉は、やわらかな指先に止められる。
2668 = "我剛想說“先準備好等我一下吧”——便被八六輕輕伸手擋住了雙唇。" 

# 【ハチロク】
# display as 鈴
# JP: 「お支度、お手伝いさせてくださいまし」
1920 = "「就請讓我服侍您更衣吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「カウキャッチャーの件は了解です。\n日々姫ちゃんに、双鉄くんからは？」
2237 = "「防撞梁的事我知道了。雙鐵君和日日姬說過了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「軽くは話してある。\n本人は、大いに意欲を示していたな」
2109 = "「簡單聊了一下。她本人對此頗有興趣」" 

# 【ポーレット】
# display as 波萊特
# JP: 「なら、わたしから日々姫ちゃんに正式に相談してみます。\nそっちは、期待してもらっていいって思います」
2214 = "「那回頭我去和她正式地談一下吧。這件事我覺得你應該可以放心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。オリヴィもさぞ喜ぼう」
1871 = "「好。想必奧莉薇也會很高興的吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで、もうひとつの話なんですけど――」
2131 = "「至於另外一件事——」" 

# monologue
# JP: ポーレットの声が硬くなる。\n続く言葉を、だから簡単に予想できてしまう。
2748 = "波萊特的聲音變得緊張起來。那她接下來的話便也不難推斷了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……ここまでの話は、\nわたしも、聞いてませんでした」
1289 = "「……這些內容我也是第一次聽說」" 

# monologue
# JP: 言って、\nポーレットは膝の上のれいなの髪をそうっと撫ぜる。
2580 = "她邊說，邊輕撫著坐在她腿上的玲奈的頭髮。" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいなは、知ってた？」
2059 = "「玲奈你知道嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「ほぇ？　なにをですかぁ？」
1748 = "「哎？是說什麼呀？」" 

# monologue
# JP: 見るからにうつらうつらとしてしまってたせいだろう。\nれいなは少し困ったような顔をしている。
2777 = "玲奈剛才似乎半夢半醒完全沒留意我們的談話，突然被這麼一問，她露出了些許困惑的表情。" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、種族として作られたかもしれないこと。\n\x%lタブレット;#00ffc040;タブレット%l;#;は繁殖……増殖？　できるかもしれないこと」
1915 = "「就是說\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;可能是作為一個全新的物種被創造出來的。\\x%lタブレット;#00ffc040;操作板%l;#;或許可以繁殖……或者說增殖？」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、はじめて聞きましたぁ」
2065 = "「玲奈頭一次聽說耶」" 

# monologue
# JP: れいなの顔は、にこにこだ。\n嬉しさだけしか、その表情からは感じられない。
2779 = "玲奈的臉上露出了滿滿的笑容。而那笑容裡，更是洋溢著無比的歡欣。" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいなは、びっくりしなかった？\n聞いて何か、思ったり変わったりしたこと、あった？」
2056 = "「玲奈不覺得吃驚嗎？聽了這些有沒有什麼想法發生了轉變呢？」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、びっくりはしてないですよぉ。\nお話聞いて、変わったりとかも別にないって思いますぅ」
2063 = "「玲奈沒覺得吃驚哦。聽了這些也沒有轉變什麼想法哎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうなの？」
2080 = "「真的？」" 

# 【れいな】
# display as 玲奈
# JP: 「だって、それってぇ、もう電車姫さまから\n聞いたことがあるお話と、中味はおんなじですよねぇ」
1661 = "「你看哦，剛才這些話，和之前電車公主殿下說的話內在含義其實是一樣的吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1745 = "「咦？」" 

# 【ハチロク】
# display as 八六
# JP: 「電車姫様から？」
2253 = "「電車公主殿下？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「中味――とは――っ！！」
1736 = "「含義——是指——啊！！」" 

# monologue
# JP: 言った瞬間、僕も気づく、\n中味。そうだ、まさしく中味だ。
2733 = "正要開口詢問，我自己便也意識到了。內在含義。沒錯，正是話語中隱藏的深意。" 

# 【双鉄】
# display as 雙鐵
# JP: 「電車姫様がおっしゃっていた、ロオドコアか！\nロオドコアの再精錬というのが、つまり」
1919 = "「就是電車公主和我們說起過的人偶核啊！而人偶核的二次提取，也就是……」" 

# 【ハチロク】
# display as 八六＆波萊特
# JP: 「あっ！」
1774 = "「啊！」" 

# 【れいな】
# display as 玲奈
# JP: 「ですですぅ。それが、『はんしょく』？　っていうのと、\nきっと、おんなじことですよねぇ」
2037 = "「沒錯沒錯。就是那個“繁殖”？肯定和她說的含義是一樣的吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな――そうだ。れいなは――」
2194 = "「這樣啊——就是這樣，玲奈你——」" 

# monologue
# JP: ポーレットがしばしば口にする褒め言葉。\nそれがまさしく真実なのだと、いまさらながらに思い知る。
2780 = "現在我分外覺得，波萊特一直褒獎玲奈的那些話，絕對都是發自真心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなは、かしこい。\n実に驚くべき――なんと冷静な判断だ」
2062 = "「玲奈好聰明。這冷靜的判斷讓我自愧不如」" 

# 【れいな】
# display as 玲奈
# JP: 「えっへへー。れいな、ほめられちゃいましたぁ」
1823 = "「嘿嘿——玲奈又被表揚啦」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん！　れいなはすごい！　とってもかしこい！！」
1802 = "「嗯！玲奈很厲害！好聰明！！」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ」
1819 = "「嘻嘻」" 

# monologue
# JP: 撫でられまくって、\nれいなは実にしあわせそうに瞳を細める。
2750 = "波萊特輕撫著玲奈的頭髮，玲奈也眯著眼睛，露出了頗為幸福的神色。" 

# monologue
# JP: というか、そうか――\n繁殖、と……その言葉を持ち出したのは、僕であったか。
2544 = "回頭想來——繁殖……這個說法還是我提出來的。" 

# monologue
# JP: （だから、不死鳥博士も僕らに理解しやすいように、\n言葉を選んで、合わせてくれた。が――）
2990 = "（所以不死鳥博士也是為了讓我們容易理解，特地選擇了措辭來配合我們。可是——）" 

# 【ハチロク】
# display as 八六
# JP: 「電車姫様がおっしゃっていた――\n『\x%lタブレット;#00ffc040;タブレット%l;#;からの、ロオドコアの再精錬』」
2251 = "「電車公主殿下所說的——“由\\x%lタブレット;#00ffc040;操作板%l;#;二次提取人偶核”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そう捉え直した方が、遥かに理解しやすくなるな。\nそれを可能にする一要素が、シーリング開封かもしれん」
1811 = "「嗯，回頭看來就容易理解多了。而其先決條件之一，或許就是開啟封印」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だとすると……」
1878 = "「如果是這樣的話……」" 

# monologue
# JP: 混乱が一つほどけたにもかかわらず、\nポーレットの声音は沈んでしまう。
2955 = "雖然在一片混亂中理清了一處頭緒，波萊特的聲音卻反而低沉了下去。" 

# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃん……\nちょっと、そのアプローチは厳しいかもしれませんね」
1720 = "「可奧莉薇的話……這一條可能會比較麻煩也未可知」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　何故だ？」
1818 = "「嗯？為什麼？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、詳しくは知りません。確かめてもいませんし。\nけど……その……噂だと――ええと――」
1686 = "「具體我也不是很清楚，也並不能斷言。可是……這個……據傳言的話——就是——」" 

# monologue
# JP: ちら、とポーレットがハチロクを見る。\nハチロクはすぐにうなずき返す。
2747 = "波萊特偷偷的瞟了一眼八六，而八六則對她點了點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまが、お茶を呑みたそうにしてらっしゃいます。\nれいな、お手伝いをお願いしてもかまいませんか？」
2245 = "「雙鐵少爺，您口渴了吧，我去給您泡茶。玲奈，可以來幫我一下嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「かまいませんよぉ。\nれいな、ポーレットの分もいれますねぇ」
1872 = "「好呀。那玲奈也給波萊特泡一杯吧」" 

# monologue
# JP: 気を利かせたハチロクが、\nれいなを連れてレールショプの奥へ消える。
2488 = "八六非常懂事地帶著玲奈一起走進了鐵路商店的後面。" 

# monologue
# JP: それを見届け、\nポーレットが声をひそめる。
2800 = "確認她們離開，波萊特才低聲地開口道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「旧型の冥国式\x%lレイルロオド;#00ffc040;レイルロオド%l;#;には、\nシーリングの機能自体が存在しない――そういう噂も」
2023 = "「有這樣一種說法，就是舊式的美國式\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，根本就沒有封印這一功能」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
2196 = "「這樣的嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大量生産の大量消費……\nそれが、冥国のものづくりの基本形ですから」
1851 = "「大量生產大量消耗……美國製造的風格大抵如此」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1791 = "「喔……」" 

# monologue
# JP: 言われてみれば、納得せざるを得ない気にもなる。
2579 = "她這麼一說，我突然覺得似乎無法反駁。" 

# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ――仮に噂が事実としても、\nそれが全ての可能性を閉ざすというわけでもあるまい」
1656 = "「但話說回來——就算那傳言不虛，也未必就能斷言全無可能了吧」" 

# monologue
# JP: シーリングの開封＝ロオドコア複製のキーという説自体が\n一仮説――希望的な立ち位置での仮説に過ぎない。
2940 = "開啟封印＝複製人偶核的關鍵，這一說法自身也只是推論——能夠給我們帶來希望的推論而已。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;自体は全世界で共通なのだ。\nゆえ、仮に『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;種族説』が真であるなら――」
1213 = "「\\x%lタブレット;#00ffc040;操作板%l;#;自身是全世界共通的，所以如果“\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;物種說”真的成立的話——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　ですよね。ロオドコアの精錬・複製のための\nロックは、最初期から埋め込まれている可能性が高い」
1776 = "「啊！也對哦。如果是為提取、複製人偶核所上的鎖的話，那這個功能很可能在一開始就已經做進了操作板裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ゆえ解除キーが外部要因……工場によって異なる、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の仕様に左右されるものとも思えん」
1793 = "「嗯。所以我並不認為這開鎖的機制會因工廠而異，或是受\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的式樣所左右」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あー……うん。ですよね！　\nならキーは、\x%lタブレット;#00ffc040;タブレット%l;#;自体に埋め込まれてるのかも！」
1763 = "「啊……嗯。有道理！所以這關鍵應該還是在\\x%lタブレット;#00ffc040;操作板%l;#;自身之中！」" 

# monologue
# JP: （ああ）
2985 = "（啊）" 

# monologue
# JP: ほっと落ち着き、すぐ弾む声に気付かされる。
2749 = "波萊特稍稍釋然，但又立刻發出開心的聲音，也令我想起了別的問題。" 

# monologue
# JP: 同性同士――ポーレットとれいなのような関係の場合も、\n恐らくだが、シーリングは開封されぬのだろうと。
2587 = "如果是同性之間——比如波萊特和玲奈這樣的話，恐怕是難以開啟封印的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だと思う。既にたどり着いてるアプローチかとも思うが、\n不死鳥博士と電車姫様にもお伝えして損はなかろう」
1955 = "「我也這樣覺得。既然大家都對此有了共識，那不妨把這些想法也告知不死鳥博士和電車公主殿下吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　それなら登呂流湯さんを、\n不死鳥博士さんに直接ご紹介するのも」
1780 = "「啊！還應該把登呂流浴場老闆直接介紹給不死鳥博士」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。あのふたりの対話から、\n新しい何かが見えてくる可能性は、高そうに思える」
2095 = "「確實。如果那兩位能直接交流的話，我覺得很可能會找到一些新的可能性」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね！　なら、わたし、そっちの方も、\nできるだけ早くでセッティングします」
1912 = "「對的！那我也儘快去和她們聯繫，安排一下時間」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よろしく頼む。\n――『オリヴィ関連はこれでひとくぎりかな』」
2265 = "「麻煩了。——“那關於奧莉薇的話題就先告一段落吧”」" 

# 【ハチロク】
# display as 八六
# JP: 「お茶が入りました、双鉄さま」
2247 = "「雙鐵少爺，茶泡好了」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい。どうぞぉ、ポーレットぉ」
1662 = "「來啦，請用吧，波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、ありがと」
1820 = "「嘻嘻，謝謝」" 

# monologue
# JP: タイミングをはかってくれていたのだろう。
2569 = "她們進來的時機還真是“趕巧”。" 

# monologue
# JP: 水を向けたら、その瞬間にお茶が出てきた――\nくだらぬことを思ってしまい、なんとも肩の力が抜ける。
2614 = "就好像剛一睏就來了個枕頭一樣——這略顯無聊的聯想卻讓我著實放鬆了下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「で、だ。明日からの僕たちの乗務だが――」
2231 = "「那，關於我們明天開始的乘務任務——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「み鉄さんと調整つきました。明日以降、月水金の13：00\nからで、8620での、[おこば,1]小畑線の試験運転に入ってください」
1929 = "「已經和橙鐵做了協調。從明天開始，在星期一三五下午一點，進行８６２０的大畑線試運營」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、路線名は[おこば,1]小畑線で決定したのか」
1787 = "「啊，線路名稱就定下來叫大畑線了啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です。日々姫ちゃんとも相談して、やっぱり、\n一番の売りを路線名にするのがいいだろうって」
2007 = "「是的。我和日日姬也商量過了。我們還是覺得這個這個名字最吸引人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ」
2096 = "「確實」" 

# monologue
# JP: ひねりはないが、明快である。
2807 = "簡單扼要，直奔主題。" 

# monologue
# JP: 日ノ本三大車窓の一つ――小畑の車窓。\nそれを観光の売りにするなら、最も相応しい線名だろう。
2718 = "日本三大車窗絕景之一的大畑站。以那裡的觀光為賣點的話，這個線路名稱自是最合適不過。" 

# 【ポーレット】
# display as 波萊特
# JP: 「で、十月一日からの営業権返還にともなっての、\n新しい観光列車の名前なんですけど」
2053 = "「然後就是在十月一日歸還經營權後，新的觀光列車的名字」" 

# monologue
# JP: うふふと笑って嬉しげに、ポーレットが一枚の紙――\nいや、イメージボードを取り出し、僕らに示してくる。
2751 = "波萊特開心地笑著拿出了一張紙遞給我們看——哦，原來是一張印象圖。" 

# 【ポーレット】
# display as 波萊特
# JP: 「この案。\n双鉄くんとハチロクちゃんは、どう思います？」
2189 = "「這個方案，雙鐵君和八六你們怎麼看？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……良く飲むなぁ」
1291 = "「……這水量還真不小」" 

# 【ハチロク】
# display as 八六
# JP: 「まことですね。御一夜から小畑まで、\nわずかに10.4キロだというのに」
2011 = "「是的呀。由御一夜至大畑，不過短短十點四公里而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、給水塔が残っているのはありがたい。\nこれがなければ、とてもこの山の先は越えられんなぁ」
1632 = "「不過這裡還保留著水塔實在是太好了。要是沒有這水塔的話，翻越這大山恐怕要難上加難了」" 

# 【ハチロク】
# display as 八六
# JP: 「で、ございますね」
2097 = "「確實如您所言」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツー！　ハチロクー！　給水まだーっ？？」
2248 = "「雙鐵！八六！水還沒加好嗎？？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、今終わる。すぐ戻る」
1695 = "「別急，馬上就好。我這就過來」" 

# monologue
# JP: 8620の運転台へと駆け戻り、\n給炭、給水の完了したことを報告する。
2691 = "我跑回８６２０的駕駛台，報告上煤、加水已經完成。" 

# monologue
# JP: オリヴィはうんうん頷いて、\nびしり、線路の先を指さす。
2564 = "奧莉薇不住地點著頭，而後颯爽地抬手指向線路前方。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「今までとおんなじ！　とにかく絶対とまらないこと！」
1646 = "「以前也說過很多次了！總之就是絕對不要停下來！」" 

# monologue
# JP: 今日これで、二十一度目の同じ注意だ。
2902 = "這已經是她今天第二十一次提醒我們同樣的內容了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「とまったら二度とあがれなくなるだけじゃないから。\nそのまま逆走しておっこちていっちゃうから」
1663 = "「停下來的話不光是有可能上不去的問題。而是搞不好有可能會反向溜逸的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解した」
1991 = "「明白」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「8620の\x%l粘着力;#00ffc040;粘着力%l;#;はオバケだけど、\nそれでも、怪しいっておもったらすぐに」
2240 = "「雖然８６２０的\\x%l粘着力;#00ffc040;黏著力%l;#;非比尋常，但一旦覺得情況不對也要馬上……」" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l砂撒き;#00ffc040;砂撒き%l;#;ですね。\n同時に、双鉄さまには\x%l加減弁;#00ffc040;加減弁%l;#;を絞っていただく」
1223 = "「\\x%l砂撒き;#00ffc040;放沙%l;#;。同時雙鐵少爺也要收\\x%l加減弁;#00ffc040;汽門%l;#;」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど、絶対にしぼりすぎない。\n上り勾配では、[りっこう,1]力行、\x%l力行;#00ffc040;力行%l;#;、また\x%l力行;#00ffc040;力行%l;#;」
1652 = "「但絕對不要收過頭。爬坡時候就是要\\x%l力行;#00ffc040;力行%l;#;，\\x%l力行;#00ffc040;力行%l;#;，還是\\x%l力行;#00ffc040;力行%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「上り勾配では[りっこう,1]力行あるのみ、了解だ」
2055 = "「爬坡時必須時刻保持力行，明白」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「当然だけど、助士は蒸気圧をタモチつづけて！\n勾配入る前から、バックを普段より気持ち厚く押さえる」
2067 = "「理所當然但還是強調一下，司爐必須保持蒸汽壓力充足！從上坡之前就要開始把內側鋪厚一些」" 

# 【赤井】
# display as 赤井
# JP: 「蒸気圧を落とさない。勾配に入る前から、\n\x%l火床;#00ffc040;火床%l;#;の石炭は、奥側を気持ち厚めに作る。了解しました」
2111 = "「維持蒸汽壓力不下降。從上坡前就開始把\\x%l火床;#00ffc040;火床%l;#;內側的煤炭鋪厚一些。明白」" 

# 【ニイロク】
# display as 二六
# JP: 「不要でしつこい助言。清春。電車\x%l運転士;#00ffc040;運転士%l;#;になるまえ。\n\x%l機関士;#00ffc040;機関士%l;#;。[こうばい,1]勾配路線――[ひたひこやま,4]肥田飛虎山線だって経験済み」
2197 = "「這樣的建議，並無必要。清春在轉做電車\\x%l運転士;#00ffc040;駕駛員%l;#;前，作為\\x%l機関士;#00ffc040;司機%l;#;，就有爬坡線路——日田彥山線——的駕駛經驗了」" 

# monologue
# JP: ニイロクがいれたフォローに、\nオリヴィの目がスっと細まる。
2436 = "二六開口為赤井宮司爭辯，奧莉薇卻不以為然地眯起了眼睛。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ブランクはこわいよ？　\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だって、\nしばらく走ってないだけでそんなこと忘れちゃうくらい」
2100 = "「空窗期很可怕的哦？即便是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，有一陣子不跑的話都說不定會忘掉」" 

# 【ニイロク】
# display as 二六
# JP: 「むぐっ」
1755 = "「唔」" 

# 【赤井】
# display as 赤井
# JP: 「実際、勾配線区での\x%l投炭;#00ffc040;投炭%l;#;は久々です。\nいただいたアドバイス、[ちょくせつ,1]直截的に助かっています」
1905 = "「實際上，在爬坡路段\\x%l投炭;#00ffc040;加煤%l;#;的確是久違了。這樣的意見確實是有立竿見影的幫助」" 

# monologue
# JP: ……御一夜からこの小畑までとて、十分すぎる登りだった。
1201 = "……從御一夜到這大畑，我們已經爬了不少的坡了。" 

# monologue
# JP: \x%lループ線;#00ffc040;ループ線%l;#;を、更に上まで登りきるための小休止駅、小畑駅。\n一息つけば、オリヴィの指導の的確さがじわり染みてくる。
2832 = "而在這為經接下來的\\x%lループ線;#00ffc040;展線%l;#;繼續向上攀登而小做休整的大畑站，我們借這喘息之機略加思考，更是深感奧莉薇指導之切實。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕達もとても助かっている。なにせ初めての経験だ。\n実際に走ってみると、勾配のキツさを痛感させられる」
1866 = "「奧莉薇的建議對我們也是裨益匪淺。畢竟我們這也是第一次親身經歷。實際開過才算對這坡度之難有了切身感受」" 

# 【ハチロク】
# display as 八六
# JP: 「まことに左様でございますね。[とうかいどう,2]東峡道――\n[せきがはら,2]堰ヶ原の勾配もなかなかのものと感じておりましたが」
2153 = "「誠如雙鐵少爺所言。儘管東海道——關原那裡的坡度在我看來已經相當險峻」" 

# monologue
# JP: ハチロクの声を聞いた瞬間、\nオリヴィの尖っていた口先が、にやりと笑う。
2842 = "聽到八六這麼說，奧莉薇突然輕笑起來。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オコバ、ずーっとスッゴイでしょ！」
1846 = "「大畑這裡要厲害得多了吧！」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。ご教導なしには越えられていたものかどうか……\nオリヴィちゃん、まことにありがとうございます」
2029 = "「正是。若非有奧莉薇如此切實的指導我們恐怕都未必能夠翻越……真是非常謝謝你，奧莉薇」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなのとーぜん！　今はオリヴィが教導で、\nおしえてあげるのオシゴトなんだから！」
2222 = "「那是自然！現在奧莉薇要做的就是指導你們的工作嘛！」" 

# monologue
# JP: 赤井宮司の気遣いから、ハチロクが見事に接続を取れば、\nオリヴィはすぐに機嫌を戻す。
2550 = "在赤井宮司和八六機敏的圓場和配合下，奧莉薇的心情又好了起來。" 

# monologue
# JP: 反面、ニイロクは少しふくれてしまっているようだ。
2458 = "但相反的，二六的臉上就現出了一絲不快。" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司もニイロクもありがとうございます。\nまさか\x%l機関助士;#00ffc040;機関助士%l;#;をしていただけるとは思いませんでした」
1636 = "「也要感謝赤井宮司和二六才是，我這是何德何能竟讓宮司屈尊給我做\\x%l機関助士;#00ffc040;司爐%l;#;」" 

# 【赤井】
# display as 赤井
# JP: 「いえ――」
2151 = "「言重了——」" 

# 【ニイロク】
# display as 二六
# JP: 「！」
1756 = "「唔！」" 

# monologue
# JP: 赤井宮司がチラとニイロクに視線を向ける。\n何故だろう。
2426 = "不知為何，赤井宮司在這時悄悄瞟了一眼二六。" 

# monologue
# JP: ニイロクは人差し指を口の前にたて、\n「しーっ」と、「ナイショ」と、ゼスチャーをみせる。
2827 = "而二六則是把食指豎在嘴前，做出了“噓”、“保密”的手勢。" 

# 【赤井】
# display as 赤井
# JP: 「……単純に、経験者がお手伝いをした方がよいか、と。\n[おこば,1]小畑越えの、初回の試験運転とお伺いしましたので」
1270 = "「……單純是覺得有個有經驗的人同行會比較好而已。畢竟這是首次翻越大畑的試運營」" 

# 【双鉄】
# display as 雙鐵
# JP: 「助かります」
1949 = "「您這真是幫了大忙了」" 

# monologue
# JP: 会話の間も、赤井宮司はせっせと\x%l投炭;#00ffc040;投炭%l;#;を続けてくれる。\nボイラー圧力計が、右に右にと振れ続ける。
2875 = "談話間，赤井宮司\\x%l投炭;#00ffc040;加煤%l;#;的手完全沒有閒著。而鍋爐的壓力表指針也在不停地往右跳著。" 

# monologue
# JP: バシュウ、と大きな音がして、\n安全弁が蒸気を吐き出す。
2953 = "隨著頗為響亮的“噗”聲，蒸汽從安全閥中噴湧而出。" 

# 【赤井】
# display as 赤井
# JP: 「おっと、お恥ずかしい」
1754 = "「哦喲，真不好意思」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ううん！　ショクニンゲーより安全第一！\nこれでいいと思う。どう？　ソーテツ？」
2034 = "「沒有的事！比起炫技，安全第一才是重點！現在這樣差不多了，你覺得呢？雙鐵？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　後進、フルギアっ！」
1800 = "「嗯！滿檔後退！」" 

# monologue
# JP: \x%l逆転機;#00ffc040;逆転機%l;#;ハンドルを後進位置にし、\n\x%l加減弁;#00ffc040;加減弁%l;#;テコをじわり、じわりと引き込んでいく。
2604 = "將\\x%l逆転機;#00ffc040;回動機%l;#;轉到後退位置後，我便開始專心慢慢拉動\\x%l加減弁;#00ffc040;汽門%l;#;操作杆。" 

# 【ニイロク】
# display as 二六
# JP: 「\x%lスイッチバック;#00ffc040;スイッチバック%l;#;」
1210 = "「\\x%lスイッチバック;#00ffc040;折返線%l;#;」" 

# 【赤井】
# display as 赤井
# JP: 「ですね、ニイロク。小畑駅から引き込み線に後退し、\nそこから前進、\x%lループ線;#00ffc040;ループ線%l;#;へと突入します」
2016 = "「是的，二六。從大畑站倒車退進支線，而後從那裡向前駛入\\x%lループ線;#00ffc040;展線%l;#;」" 

# 【ニイロク】
# display as 二六
# JP: 「どうして。そんな。面倒な？　こと」
2051 = "「為什麼，要搞得，這麼，麻煩？」" 

# 【赤井】
# display as 赤井
# JP: 「それは――」
2191 = "「這是——」" 

# 【ニイロク】
# display as 二六
# JP: 「それは？」
