[script]
# lines: 468 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「トーケツホゾン？　なぁに？　それ？」
1911 = "「Đóng băng bảo quản? Là gì vậy? Cái đó á?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、ふーん？　もっとギジュツテキに進むまで？\nそっかー、なるほどねー、そんなこともできるんだー」
1760 = "「A, hừm? Cho đến khi kỹ thuật tiến bộ hơn nữa sao? Ra là vậy, hiểu rồi, cũng có thể làm được chuyện như thế nhỉ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど。いい。いらない。トーケツホゾン。\nだってオリヴィ、いまのままでがんばりたいから！」
1731 = "「Nhưng mà. Thôi. Không cần đâu. Đóng băng bảo quản. Bởi vì Olivy, muốn cố gắng với hình hài hiện tại cơ!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だってトーケツホゾンして、オリヴィの\\x%lタブレット;#00ffc040;タブレット%l;#;から、オリヴィのコピーみたいの？　つくれたとして」
1702 = "「Bởi vì dù có đóng băng bảo quản, rồi từ \\x%lタブレット;#00ffc040;Tablet%l;#; của Olivy, tạo ra một bản sao của Olivy đi chăng nữa.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そういうふうに\\x%lタブレット;#00ffc040;タブレット%l;#;が役にたっても。そのあと。\nオリヴィ、なにしたらいいのか――わかんなくなりそう」
1883 = "「Cho dù \\x%lタブレット;#00ffc040;Tablet%l;#; có giúp ích được theo cách đó. Thì sau đó. Olivy, có lẽ sẽ không biết——mình nên làm gì nữa.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「すぐにそういうの作れるようになるなら、\nトーケツホゾンなんて、きっとしなくてがんばれるし」
1687 = "「Nếu ngay lập tức có thể tạo ra thứ như vậy, thì chắc chắn không cần đóng băng bảo quản vẫn có thể cố gắng được mà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「トーケツホゾンしなくちゃまてない、\n長い、長い時間がもし、ひつようになるならさ」
1885 = "「Nếu phải đóng băng bảo quản mới đợi được, nếu cần một khoảng thời gian rất, rất dài.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなだったら、きっともう、ムナカタいないし……\nハチロクも、ソーテツもみんなもいないかもでしょ？」
2107 = "「Nếu vậy thì, chắc chắn lúc đó, Munakata đã không còn nữa... Hachiroku, Soutetsu và mọi người có khi cũng không còn đúng không?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そしたら、きっと、走ってたってさみしいよ。\nだからオリヴィ、このままで――」
2226 = "「Nếu thế, chắc chắn, dù có chạy cũng sẽ buồn lắm. Nên Olivy, cứ như thế này thôi——」"
# 【ハチロク】
# display as ？？？
# JP: 「だんなさま――双鉄さま」
1855 = "「Phu quân——ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん――む……」
1792 = "「Ưm——ừm...」"
# monologue
# JP: いつもの天井。が、光が違う。\n赤い――夕焼け、夕暮れ時か。
2770 = "Vẫn là trần nhà quen thuộc. Nhưng, ánh sáng lại khác. Màu đỏ——hoàng hôn, là lúc chạng vạng sao."
# monologue
# JP: 僕を見ているすずの全部を、\n西日が赤く染めている。
2925 = "Toàn bộ bóng dáng Suzu đang nhìn tôi, đều bị nhuộm đỏ bởi ánh tà dương."
# 【ハチロク】
# display as 鈴
# JP: 「気持ちよさそうに寝てらしたので、\nお起こしするのはしのびない、とも感じたのですが」
1965 = "「Thấy ngài ngủ ngon quá, nên em cũng cảm thấy không nỡ đánh thức ngài dậy.」"
# monologue
# JP: 首を動かし、時計を眺める。\n――予想通りの針位置だ。
2670 = "Tôi cử động cổ, nhìn đồng hồ. ——Kim đồng hồ chỉ đúng như dự đoán."
# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレットが乗務を終える時間だな。\n報告にいかねば。起こしてくれてありがとう」
1284 = "「...Đến giờ Paulette kết thúc ca trực rồi. Phải đi báo cáo thôi. Cảm ơn em đã đánh thức tôi.」"
# monologue
# JP: 体を起こせば、\nすずはほっとしたような笑みを浮かべる。
2866 = "Khi tôi ngồi dậy, Suzu nở một nụ cười như trút được gánh nặng."
# 【ハチロク】
# display as 鈴
# JP: 「妻として、当然のことでございます」
1947 = "「Là vợ của ngài, đó là việc đương nhiên mà.」"
# monologue
# JP: 頭を撫でれば、\nすずの頭が手のひらに吸い付いてくる。
2693 = "Khi tôi xoa đầu em ấy, đầu Suzu liền cọ cọ vào lòng bàn tay tôi."
# monologue
# JP: 絹糸を霧にくぐらせたような触感が、\nさらさら静かに、指を、手のひらを喜ばせてくれる。
2616 = "Cảm giác như những sợi tơ lụa lướt qua màn sương mỏng, mềm mại và tĩnh lặng, mang lại niềm vui cho những ngón tay, cho lòng bàn tay tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……いつまででも撫でていたいが、そうもいかんか」
1282 = "「...Dù muốn xoa đầu em mãi, nhưng cũng không được rồi.」"
# 【ハチロク】
# display as 鈴
# JP: 「でしたら、\nこの続きは帰宅いたしましてからまた、ということで」
2205 = "「Nếu vậy thì, chúng ta sẽ tiếp tục sau khi về nhà nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしよう」
2216 = "「Quyết định vậy đi.」"
# monologue
# JP: 名残りのひと撫でをすくい上げ、指の間に雨を降らせる。
2648 = "Vớt vát chút luyến tiếc qua một cái xoa đầu cuối cùng, tôi để những sợi tóc rơi xuống như cơn mưa rào qua kẽ tay."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィは、日々姫の部屋か？」
1863 = "「Olivy đang ở phòng Hibiki sao?」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。クウラアを効かせたお部屋の日々姫のベッドで、\n気持ちよさそうにすやすやと眠っておりました」
2008 = "「Vâng. Trong căn phòng bật máy lạnh của Hibiki, em ấy đang ngủ rất say sưa và thoải mái trên giường.」"
# 【双鉄】
# display as 雙鐵
# JP: 「体温は？」
2264 = "「Nhiệt độ cơ thể thế nào?」"
# 【ハチロク】
# display as 鈴
# JP: 「夏掛けを直したときに少しおでこに触れたのですが、\nほの温かい程度で、安全に稼働できる範囲かと」
1830 = "「Lúc em chỉnh lại chăn mùa hè có chạm nhẹ vào trán em ấy, chỉ hơi ấm một chút, em nghĩ là vẫn trong phạm vi hoạt động an toàn ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら何よりだ。\n旅疲れで体調を崩さぬかと、そこがいささか心配だった」
2209 = "「Vậy thì tốt quá rồi. Tôi hơi lo em ấy sẽ bị ốm vì mệt mỏi sau chuyến đi.」"
# 【ハチロク】
# display as 鈴
# JP: 「まぁ、わたくしたち\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に旅疲れなど――」
1942 = "「Chà, \\x%lレイルロオド;#00ffc040;Railord%l;#; chúng em làm gì có chuyện mệt mỏi sau chuyến đi chứ——」"
# monologue
# JP: いたずらっぽく浮かんだ笑顔が、\nけれどもすぐに、困ったようなものへと変わる。
2497 = "Nụ cười tinh nghịch vừa thoáng hiện, nhưng ngay lập tức chuyển thành vẻ mặt có chút bối rối."
# 【ハチロク】
# display as 鈴
# JP: 「……などとは、申せなくなってしまいましたね。\n不死鳥博士のお話を聞いてしまったあとでは」
1279 = "「...Bây giờ em không thể nói như vậy được nữa rồi nhỉ. Sau khi nghe câu chuyện của Tiến sĩ Fushichou.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1797 = "「Ừm.」"
# monologue
# JP: \\x%lタブレット;#00ffc040;タブレット%l;#;――魂は必ず、\n時間とともに不可逆の消耗を重ねていく。
109 = "\\x%lタブレット;#00ffc040;Tablet%l;#;——Linh hồn chắc chắn sẽ, chịu sự hao mòn không thể đảo ngược theo thời gian."
# monologue
# JP: 精神の疲れが人間の肉体を疲弊させるのと同様に、\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のボディも決して、その影響を免れ得まい。
2611 = "Giống như sự mệt mỏi về tinh thần sẽ làm hao mòn thể xác con người, cơ thể của \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng tuyệt đối không thể thoát khỏi ảnh hưởng đó."
# 【双鉄】
# display as 雙鐵
# JP: 「すずはどうだ？　疲れていないか？\n色々驚き、頭も使ったことと思うが」
2232 = "「Suzu thì sao? Có mệt không? Chắc hẳn em đã rất ngạc nhiên và phải suy nghĩ nhiều.」"
# 【ハチロク】
# display as 鈴
# JP: 「左様ですね。お話の直後には、動揺を……\nこころの激しいざわつきを、感じたように思いましたが」
2152 = "「Đúng vậy nhỉ. Ngay sau câu chuyện đó, em cảm thấy... tâm trí mình xáo trộn mãnh liệt, nhưng」"
# monologue
# JP: （ことっ）
2981 = "（Cạch）"
# monologue
# JP: すずの頭がよりかかってくる。
2921 = "Đầu Suzu tựa vào tôi."
# monologue
# JP: せっかく区切りをつけたのに、\n指はふたたび髪の間をくぐりはじめる。
2582 = "Rõ ràng là đã dừng lại rồi, nhưng những ngón tay tôi lại bắt đầu luồn vào tóc em ấy."
# 【ハチロク】
# display as 鈴
# JP: 「嬉しい気持ちが、戸惑いも疲れも消してくれたようです。\n喜びと希望とが、こんこんと湧き出てまいりますので」
1649 = "「Cảm giác vui sướng dường như đã xóa tan mọi bối rối và mệt mỏi. Bởi vì niềm vui và hy vọng đang không ngừng tuôn trào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「希望――か」
1933 = "「Hy vọng——sao.」"
# monologue
# JP: 何が、希望を示したか。\n聞かずとも共有できている。
2841 = "Điều gì đã mang lại hy vọng. Không cần hỏi chúng tôi cũng có thể chia sẻ điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、ひとつの、[しゅ]種」
1220 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; là một chủng loài.」"
# monologue
# JP: 呟けば、すずは力強く頷き返す。\n種であるのなら――僕との間に、すずも、あるいは……
2663 = "Khi tôi lẩm bẩm, Suzu mạnh mẽ gật đầu đáp lại. Nếu là một chủng loài——thì giữa tôi và em, Suzu cũng, có lẽ..."
# 【双鉄】
# display as 雙鐵
# JP: 「うん。希望だな。\n確かに、僕たちは希望も受け取った」
1815 = "「Ừm. Là hy vọng nhỉ. Chắc chắn, chúng ta cũng đã nhận được hy vọng.」"
# monologue
# JP: 仮説がもしも真であるなら、\n僕たち自身のレールもきっと、繋いでいける。
2845 = "Nếu giả thuyết đó là sự thật, thì chắc chắn chúng ta cũng có thể nối tiếp con đường của chính mình."
# monologue
# JP: 僕達が走れなくなってしまったとても、\n次の世代に、\\x%lタブレット;#00ffc040;タブレット%l;#;を受け渡すことができる。
2513 = "Cho dù chúng ta không thể chạy được nữa, chúng ta vẫn có thể trao lại \\x%lタブレット;#00ffc040;Tablet%l;#; cho thế hệ tiếp theo."
# 【双鉄】
# display as 雙鐵
# JP: 「未来に可能性がある以上……凍結にもまた希望があると\n――オリヴィも、受け取ってくれれば良かったのだが」
1879 = "「Chừng nào tương lai còn có khả năng... thì việc đóng băng cũng mang lại hy vọng ——Giá như Olivy cũng chấp nhận điều đó thì tốt biết mấy.」"
# monologue
# JP: 夢に見るほど、僕は衝撃を受けたのだろう。
2714 = "Có lẽ tôi đã bị sốc đến mức mơ thấy nó."
# monologue
# JP: 最悪の場合、いよいよ危なくなってしまったら凍結を――\nその提案を、ほとんど即時に断られてしまったことに。
2721 = "Trong trường hợp xấu nhất, nếu tình hình trở nên nguy kịch thì hãy đóng băng—— Lời đề nghị đó, đã bị từ chối gần như ngay lập tức."
# 【双鉄】
# display as 雙鐵
# JP: 「凍結からの復活時、仮に僕らが寿命を迎えていたとて。\n右田の家や御一夜鉄道が、必ずオリヴィを歓迎しように」
2121 = "「Giả sử khi tỉnh dậy từ trạng thái đóng băng, chúng ta đã đi đến cuối cuộc đời. Thì nhà Migita và Đường sắt Ohito chắc chắn vẫn sẽ dang rộng vòng tay chào đón Olivy.」"
# 【ハチロク】
# display as 鈴
# JP: 「左様、ですね……」
1608 = "「Đúng, vậy nhỉ...」"
# monologue
# JP: すずが、目を閉じ考え込む。
2922 = "Suzu nhắm mắt suy nghĩ."
# 【ハチロク】
# display as 鈴
# JP: 「オリヴィちゃんはまだ、家族という絆の強さを、\nきっと――捉えきれていないものかと存じます」
1864 = "「Bé Olivy vẫn chưa, chắc chắn là——chưa thể hiểu hết được sức mạnh của sợi dây gắn kết gia đình.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1997 = "「A——」"
# monologue
# JP: それは当然のことだろう。
2899 = "Đó là điều đương nhiên."
# monologue
# JP: 帝鉄式の中で運用されていた、\n特定のマスターを持たぬ、冥国式の\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。
2575 = "Một \\x%lレイルロオド;#00ffc040;Railord%l;#; kiểu Meikoku không có Master cụ thể, được vận hành trong hệ thống của Teitetsu."
# 【双鉄】
# display as 雙鐵
# JP: 「……オリヴィの育ちで、それをわかれという方が」
1265 = "「...Bắt Olivy với hoàn cảnh trưởng thành như vậy phải hiểu được điều đó thì」"
# 【ハチロク】
# display as 鈴
# JP: 「いいえ、双鉄さま。だんなさま」
2260 = "「Không đâu, ngài Soutetsu. Phu quân.」"
# monologue
# JP: きわめて珍しいことに。
2900 = "Một điều cực kỳ hiếm thấy."
# monologue
# JP: 『いいえ』と正面――真正面から、\nすずが僕の言葉を遮り、否定する。
2923 = "Bằng từ \"Không\" trực diện——hoàn toàn trực diện, Suzu ngắt lời tôi, và phủ nhận."
# 【ハチロク】
# display as 鈴
# JP: 「わたくしとて同じことだったのです。双鉄さま」
2018 = "「Em cũng từng như vậy thôi. Ngài Soutetsu.」"
# monologue
# JP: すずの頭が小さく動く。\nこつんとおでこが、僕のおでこに当てられる。
2927 = "Đầu Suzu khẽ cử động. Trán em ấy chạm nhẹ vào trán tôi."
# monologue
# JP: すずの思いを、瞬間、受け取れるような気がして、\n\\x%l共感;#00ffc040;共感%l;#;とはこんなものかもしれぬと、ふと思う。
2838 = "Cảm giác như trong khoảnh khắc, tôi nhận được những suy nghĩ của Suzu, tôi chợt nghĩ, có lẽ \\x%l共感;#00ffc040;cộng cảm%l;#; chính là như thế này."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまのお話を聞いて。時を重ねて、こころを重ねて。\nそうしなければ、わたくしも決して捉え得ませんでした」
2122 = "「Lắng nghe câu chuyện của ngài Soutetsu. Cùng nhau trải qua thời gian, cùng nhau sẻ chia tâm hồn. Nếu không làm như vậy, em cũng tuyệt đối không thể nào hiểu được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1816 = "「Ừm?」"
# 【ハチロク】
# display as 鈴
# JP: 「命は、受け渡せるものということを。\n想いはきっと、引き継いでもらえるということを」
2069 = "「Rằng sinh mệnh, là thứ có thể trao lại. Rằng tâm tư, chắc chắn sẽ được kế thừa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1757 = "「A——」"
# monologue
# JP: 父を、母を、路子を思う。\n僕は確かに命を受け継ぎ――思いを引き継いでいるのだと。
2656 = "Nghĩ về cha, về mẹ, về Michi. Tôi chắc chắn đã nhận lấy sinh mệnh——và kế thừa tâm tư của họ."
# monologue
# JP: 真闇姉を日々姫を、義父さん義母さんを、汰斗さんを思う。\n思いは、命は、守られ守り、育みあっていくものなのだと。
2658 = "Nghĩ về chị Mayami, về Hibiki, về cha mẹ nuôi, về ông Taito. Tâm tư, sinh mệnh, là thứ được bảo vệ và bảo vệ lẫn nhau, cùng nhau nuôi dưỡng."
# 【双鉄】
# display as 雙鐵
# JP: 「――それが、家族か」
1241 = "「——Đó, chính là gia đình sao.」"
# monologue
# JP: すずが小さく、強く頷く。\nうれしく、思う。
2928 = "Suzu gật đầu thật khẽ, nhưng mạnh mẽ. Tôi cảm thấy vui mừng."
# monologue
# JP: 家族の形をすずが僕から、僕らから受け取ってくれている。\nならばその時点で、僕の生には、確かな意味が生じている。
2929 = "Suzu đã nhận lấy hình bóng của gia đình từ tôi, từ chúng tôi. Nếu vậy thì ngay tại thời điểm này, sự tồn tại của tôi đã mang một ý nghĩa xác đáng."
# 【双鉄】
# display as 雙鐵
# JP: 「……いつか、すずが話してくれたことだが」
1292 = "「...Có lần, Suzu đã từng nói với tôi.」"
# 【ハチロク】
# display as 鈴
# JP: 「なにを、お話いたしましたでしょう」
1625 = "「Em đã nói gì cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕らは、どんどん欲深くなるな。\nこの上ない幸せを抱いてなお、更に更にと望んでしまう」
1958 = "「Chúng ta, ngày càng trở nên tham lam nhỉ. Dù đang ôm trong tay niềm hạnh phúc tột cùng, nhưng vẫn cứ mong muốn nhiều hơn, nhiều hơn nữa.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。まことに左様ですね、双鉄さま」
2004 = "「Vâng. Đúng là như vậy, ngài Soutetsu.」"
# monologue
# JP: ごくごく自然にキスをする。\n会話のように、呼吸のように。
2666 = "Chúng tôi hôn nhau một cách vô cùng tự nhiên. Giống như một cuộc trò chuyện, giống như hơi thở."
# monologue
# JP: すずは小さく唇を舐め、\n吐息のような言葉を続ける。
2926 = "Suzu khẽ liếm môi, và tiếp tục thốt ra những lời nói như tiếng thở dài."
# 【ハチロク】
# display as 鈴
# JP: 「……この欲がどれほど甘やかで、抗いがたいか。\n薄々感じられるがゆえに、きっと、固く蓋をしてしまう」
1290 = "「...Lòng tham này ngọt ngào và khó cưỡng lại đến nhường nào. Vì lờ mờ cảm nhận được điều đó, nên chắc chắn người ta mới đậy nắp thật chặt.」"
# monologue
# JP: かつてのわたくしが、そうであったのとおんなじに――
2844 = "Giống hệt như em của ngày xưa——"
# monologue
# JP: すずがあえては語らぬ声を、\n僕のこころは確かに聞き取る。
2924 = "Dù Suzu không nói ra thành lời, nhưng trái tim tôi vẫn nghe thấy rõ ràng."
# 【ハチロク】
# display as 鈴
# JP: 「ですからきっと、オリヴィちゃんには」
1974 = "「Vì vậy, đối với bé Olivy, chắc chắn」"
# 【双鉄】
# display as 雙鐵
# JP: 「わからせる必要などはないのだな。\n蓋を開く――素直になってもらう、それだけでいい」
2033 = "「Không cần phải bắt em ấy hiểu ra nhỉ. Mở nắp ra——chỉ cần em ấy thành thật với bản thân là đủ rồi.」"
# 【ハチロク】
# display as 鈴
# JP: 「で、あるのではないかと、わたくしは」
1950 = "「Em nghĩ, có lẽ là như vậy ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
1798 = "「Ừm!」"
# 【ハチロク】
# display as 鈴
# JP: 「きゃ！」
1738 = "「Á!」"
# monologue
# JP: すずを抱きかかえ立ち上がる。
2690 = "Tôi bế thốc Suzu lên và đứng dậy."
# monologue
# JP: 寝ぼけ頭をスッキリできた。\n夢の残滓を振り払えた。
2798 = "Cái đầu ngái ngủ đã hoàn toàn tỉnh táo. Những tàn dư của giấc mơ đã bị xua tan."
# 【双鉄】
# display as 雙鐵
# JP: 「蓋をどのように開けてもらうか――\nそれは恐らく、考えぬほうがいいのだろうな」
2132 = "「Làm thế nào để em ấy mở nắp ra—— Chắc là, không nên suy nghĩ về điều đó thì tốt hơn nhỉ.」"
# 【ハチロク】
# display as 鈴
# JP: 「左様ですね。作為はきっと、北風になってしまうかと」
2148 = "「Đúng vậy ạ. Nếu cố tình làm vậy thì chắc chắn sẽ trở thành ngọn gió bấc mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も、同じく感じている」
1956 = "「Tôi cũng cảm thấy như vậy.」"
# monologue
# JP: ならば、この話はここまでだ。
2917 = "Nếu vậy, câu chuyện này đến đây là kết thúc."
# monologue
# JP: オリヴィを照らす太陽に目処がついたら、\nそのときにまた、考え、動くこととしよう。
2805 = "Khi nào tìm được mặt trời soi sáng cho Olivy, lúc đó chúng ta sẽ lại suy nghĩ và hành động tiếp."
# 【双鉄】
# display as 雙鐵
# JP: 「では、行くか。\n五分で身支度を整える」
2220 = "「Vậy thì, đi thôi. Tôi sẽ chuẩn bị xong trong năm phút.」"
# 【ハチロク】
# display as 鈴
# JP: 「オリヴィちゃんを起こしてまいりますか？」
2142 = "「Chúng ta có nên đánh thức bé Olivy không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……いや、今回は僕たちだけの方が良いだろう」
1262 = "「...Không, lần này chỉ có hai chúng ta thì tốt hơn.」"
# 【ハチロク】
# display as 鈴
# JP: 「かしこまりました」
1874 = "「Em hiểu rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、先に――」
2207 = "「Vậy nên, em hãy——」"
# 【ハチロク】
# display as 鈴
# JP: 「でしたら、ね？　双鉄さま」
2229 = "\"Hãy chuẩn bị trước rồi đợi tôi nhé\"—— Lời vừa định nói ra đã bị những đầu ngón tay mềm mại chặn lại."
# monologue
# JP: “先に支度をして待っていてくれ”――\n出かけた言葉は、やわらかな指先に止められる。
2668 = "「Hãy để em giúp ngài chuẩn bị nhé.」"
# 【ハチロク】
# display as 鈴
# JP: 「お支度、お手伝いさせてくださいまし」
1920 = "「Chuyện Cowcatcher em hiểu rồi. Thế còn Hibiki, anh Soutetsu đã nói chuyện chưa?」"
# 【ポーレット】
# display as 波萊特
# JP: 「カウキャッチャーの件は了解です。\n日々姫ちゃんに、双鉄くんからは？」
2237 = "「Tôi đã nói sơ qua rồi. Con bé tỏ ra rất hào hứng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「軽くは話してある。\n本人は、大いに意欲を示していたな」
2109 = "「Vậy thì, em sẽ chính thức bàn bạc với Hibiki. Chuyện đó, anh cứ yên tâm kỳ vọng nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら、わたしから日々姫ちゃんに正式に相談してみます。\nそっちは、期待してもらっていいって思います」
2214 = "「Vậy sao. Chắc hẳn Olivy cũng sẽ rất vui.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。オリヴィもさぞ喜ぼう」
1871 = "「Và, còn một chuyện nữa——」"
# 【ポーレット】
# display as 波萊特
# JP: 「それで、もうひとつの話なんですけど――」
2131 = "Giọng Paulette trở nên căng thẳng. Nên tôi có thể dễ dàng đoán được những lời tiếp theo."
# monologue
# JP: ポーレットの声が硬くなる。\n続く言葉を、だから簡単に予想できてしまう。
2748 = "「...Những chuyện từ nãy đến giờ, em cũng chưa được nghe.」"
# 【ポーレット】
# display as 波萊特
# JP: 「……ここまでの話は、\nわたしも、聞いてませんでした」
1289 = "Nói rồi, Paulette nhẹ nhàng vuốt tóc Reina đang nằm trên đùi."
# monologue
# JP: 言って、\nポーレットは膝の上のれいなの髪をそうっと撫ぜる。
2580 = "「Reina, em có biết không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「れいなは、知ってた？」
2059 = "「Hơ? Chuyện gì cơ ạ?」"
# 【れいな】
# display as 玲奈
# JP: 「ほぇ？　なにをですかぁ？」
1748 = "Có lẽ là do nãy giờ em ấy cứ ngủ gật. Trông Reina có vẻ hơi bối rối."
# monologue
# JP: 見るからにうつらうつらとしてしまってたせいだろう。\nれいなは少し困ったような顔をしている。
2777 = "「Chuyện \\x%lレイルロオド;#00ffc040;Railord%l;#; có thể được tạo ra như một chủng loài. Chuyện \\x%lタブレット;#00ffc040;Tablet%l;#; có thể sinh sản... nhân bản? được ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、種族として作られたかもしれないこと。\n\\x%lタブレット;#00ffc040;タブレット%l;#;は繁殖……増殖？　できるかもしれないこと」
1915 = "「Reina mới nghe lần đầu tiên luôn đó ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、はじめて聞きましたぁ」
2065 = "Khuôn mặt Reina tươi cười rạng rỡ. Từ biểu cảm đó, chỉ có thể cảm nhận được niềm vui."
# monologue
# JP: れいなの顔は、にこにこだ。\n嬉しさだけしか、その表情からは感じられない。
2779 = "Khuôn mặt Reina tươi cười rạng rỡ. Từ biểu cảm đó, chỉ có thể cảm nhận được niềm vui."
# 【ポーレット】
# display as 波萊特
# JP: 「れいなは、びっくりしなかった？\n聞いて何か、思ったり変わったりしたこと、あった？」
2056 = "「Reina không ngạc nhiên sao? Nghe xong em có suy nghĩ hay thay đổi gì không?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、びっくりはしてないですよぉ。\nお話聞いて、変わったりとかも別にないって思いますぅ」
2063 = "「Reina không ngạc nhiên đâu ạ. Nghe xong cũng không thấy có gì thay đổi cả đâu ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなの？」
2080 = "「Vậy sao?」"
# 【れいな】
# display as 玲奈
# JP: 「だって、それってぇ、もう電車姫さまから\n聞いたことがあるお話と、中味はおんなじですよねぇ」
1661 = "「Bởi vì, chuyện đó, giống y hệt như chuyện Reina đã từng nghe từ ngài Denshahime mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1745 = "「Hả?」"
# 【ハチロク】
# display as 八六
# JP: 「電車姫様から？」
2253 = "「Từ ngài Denshahime sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「中味――とは――っ！！」
1736 = "「Nội dung——là sao——!!」"
# monologue
# JP: 言った瞬間、僕も気づく、\n中味。そうだ、まさしく中味だ。
2733 = "Ngay khoảnh khắc thốt lên, tôi cũng nhận ra, Nội dung. Đúng vậy, chính xác là nội dung."
# 【双鉄】
# display as 雙鐵
# JP: 「電車姫様がおっしゃっていた、ロオドコアか！\nロオドコアの再精錬というのが、つまり」
1919 = "「Là Lõi Lord mà ngài Denshahime đã nói đến sao! Việc tinh luyện lại Lõi Lord, tức là」"
# 【ハチロク】
# display as 八六＆波萊特
# JP: 「あっ！」
1774 = "「A!」"
# 【れいな】
# display as 玲奈
# JP: 「ですですぅ。それが、『はんしょく』？　っていうのと、\nきっと、おんなじことですよねぇ」
2037 = "「Đúng vậy ạ. Đó là 'sinh sản'? Cái đó, chắc chắn là cùng một chuyện đúng không ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな――そうだ。れいなは――」
2194 = "「Đúng vậy——đúng rồi. Reina thật là——」"
# monologue
# JP: ポーレットがしばしば口にする褒め言葉。\nそれがまさしく真実なのだと、いまさらながらに思い知る。
2780 = "Lời khen ngợi mà Paulette thường hay nói. Đến bây giờ tôi mới nhận ra đó hoàn toàn là sự thật."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなは、かしこい。\n実に驚くべき――なんと冷静な判断だ」
2062 = "「Reina thông minh thật đấy. Thật đáng kinh ngạc——một phán đoán lạnh lùng làm sao.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへー。れいな、ほめられちゃいましたぁ」
1823 = "「E he he~. Reina được khen rồi này~」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん！　れいなはすごい！　とってもかしこい！！」
1802 = "「Ừm! Reina giỏi lắm! Rất là thông minh luôn!!」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ」
1819 = "「U hu hu~」"
# monologue
# JP: 撫でられまくって、\nれいなは実にしあわせそうに瞳を細める。
2750 = "Được vuốt ve thỏa thích, Reina nheo mắt lại trông vô cùng hạnh phúc."
# monologue
# JP: というか、そうか――\n繁殖、と……その言葉を持ち出したのは、僕であったか。
2544 = "Mà khoan, đúng rồi—— Sinh sản, và... người đưa ra từ đó, là tôi mà nhỉ."
# monologue
# JP: （だから、不死鳥博士も僕らに理解しやすいように、\n言葉を選んで、合わせてくれた。が――）
2990 = "（Vì vậy, Tiến sĩ Fushichou cũng đã chọn lọc từ ngữ và điều chỉnh, để chúng tôi dễ hiểu hơn. Nhưng——）"
# 【ハチロク】
# display as 八六
# JP: 「電車姫様がおっしゃっていた――\n『\\x%lタブレット;#00ffc040;タブレット%l;#;からの、ロオドコアの再精錬』」
2251 = "「Ngài Denshahime đã nói—— 'Việc tinh luyện lại Lõi Lord từ \\x%lタブレット;#00ffc040;Tablet%l;#;'」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そう捉え直した方が、遥かに理解しやすくなるな。\nそれを可能にする一要素が、シーリング開封かもしれん」
1811 = "「Ừm. Hiểu lại như vậy thì sẽ dễ nắm bắt hơn rất nhiều. Một yếu tố giúp biến điều đó thành hiện thực có lẽ là việc mở niêm phong.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だとすると……」
1878 = "「Nếu vậy thì...」"
# monologue
# JP: 混乱が一つほどけたにもかかわらず、\nポーレットの声音は沈んでしまう。
2955 = "Mặc dù đã tháo gỡ được một khúc mắc, nhưng giọng Paulette lại chùng xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃん……\nちょっと、そのアプローチは厳しいかもしれませんね」
1720 = "「Bé Olivy... Có lẽ cách tiếp cận đó sẽ hơi khó khăn đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　何故だ？」
1818 = "「Ừm? Tại sao vậy?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、詳しくは知りません。確かめてもいませんし。\nけど……その……噂だと――ええと――」
1686 = "「Em cũng không biết rõ lắm. Cũng chưa xác minh nữa. Nhưng... ừm... theo lời đồn thì——à thì——」"
# monologue
# JP: ちら、とポーレットがハチロクを見る。\nハチロクはすぐにうなずき返す。
2747 = "Paulette liếc nhìn Hachiroku. Hachiroku lập tức gật đầu đáp lại."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまが、お茶を呑みたそうにしてらっしゃいます。\nれいな、お手伝いをお願いしてもかまいませんか？」
2245 = "「Ngài Soutetsu có vẻ muốn uống trà rồi. Reina, em giúp chị một tay được không?」"
# 【れいな】
# display as 玲奈
# JP: 「かまいませんよぉ。\nれいな、ポーレットの分もいれますねぇ」
1872 = "「Được chứ ạ. Reina sẽ pha cho cả Paulette nữa nha.」"
# monologue
# JP: 気を利かせたハチロクが、\nれいなを連れてレールショプの奥へ消える。
2488 = "Tinh ý nhận ra, Hachiroku dẫn Reina đi vào sâu bên trong Rail Shop."
# monologue
# JP: それを見届け、\nポーレットが声をひそめる。
2800 = "Nhìn theo bóng hai người, Paulette hạ thấp giọng."
# 【ポーレット】
# display as 波萊特
# JP: 「旧型の冥国式\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;には、\nシーリングの機能自体が存在しない――そういう噂も」
2023 = "「Đối với \\x%lレイルロオド;#00ffc040;Railord%l;#; kiểu Meikoku đời cũ, bản thân chức năng niêm phong không hề tồn tại——cũng có tin đồn như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
2196 = "「Vậy sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「大量生産の大量消費……\nそれが、冥国のものづくりの基本形ですから」
1851 = "「Sản xuất hàng loạt, tiêu thụ hàng loạt... Đó là hình thức cơ bản của việc chế tạo ở Meikoku mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1791 = "「A——」"
# monologue
# JP: 言われてみれば、納得せざるを得ない気にもなる。
2579 = "Nghe vậy, tôi cũng cảm thấy có lý."
# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ――仮に噂が事実としても、\nそれが全ての可能性を閉ざすというわけでもあるまい」
1656 = "「Mặc dù vậy——cho dù tin đồn là thật, điều đó cũng không có nghĩa là mọi khả năng đều bị khép lại.」"
# monologue
# JP: シーリングの開封＝ロオドコア複製のキーという説自体が\n一仮説――希望的な立ち位置での仮説に過ぎない。
2940 = "Bản thân giả thuyết việc mở niêm phong = chìa khóa sao chép Lõi Lord cũng chỉ là một giả thuyết——một giả thuyết mang tính hy vọng."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%lタブレット;#00ffc040;タブレット%l;#;自体は全世界で共通なのだ。\nゆえ、仮に『\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;種族説』が真であるなら――」
1213 = "「Bản thân \\x%lタブレット;#00ffc040;Tablet%l;#; là thứ dùng chung trên toàn thế giới. Vì vậy, giả sử 'thuyết chủng loài \\x%lレイルロオド;#00ffc040;Railord%l;#;' là đúng thì——」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　ですよね。ロオドコアの精錬・複製のための\nロックは、最初期から埋め込まれている可能性が高い」
1776 = "「A! Đúng vậy nhỉ. Khóa dùng để tinh luyện và sao chép Lõi Lord rất có khả năng đã được nhúng vào từ những thời kỳ đầu tiên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ゆえ解除キーが外部要因……工場によって異なる、\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の仕様に左右されるものとも思えん」
1793 = "「Ừm. Vì vậy tôi không nghĩ chìa khóa giải trừ là yếu tố bên ngoài... hay phụ thuộc vào thông số kỹ thuật của \\x%lレイルロオド;#00ffc040;Railord%l;#; khác nhau tùy theo nhà máy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あー……うん。ですよね！　\nならキーは、\\x%lタブレット;#00ffc040;タブレット%l;#;自体に埋め込まれてるのかも！」
1763 = "「A... ừm. Đúng vậy! Nếu thế thì chìa khóa có thể đã được nhúng sẵn trong chính \\x%lタブレット;#00ffc040;Tablet%l;#; rồi!」"
# monologue
# JP: （ああ）
2985 = "（A）"
# monologue
# JP: ほっと落ち着き、すぐ弾む声に気付かされる。
2749 = "Vừa mới bình tĩnh lại, tôi chợt nhận ra giọng điệu vui vẻ đó."
# monologue
# JP: 同性同士――ポーレットとれいなのような関係の場合も、\n恐らくだが、シーリングは開封されぬのだろうと。
2587 = "Trong trường hợp giữa những người cùng giới——như mối quan hệ của Paulette và Reina, có lẽ, niêm phong cũng sẽ không được mở ra."
# 【双鉄】
# display as 雙鐵
# JP: 「だと思う。既にたどり着いてるアプローチかとも思うが、\n不死鳥博士と電車姫様にもお伝えして損はなかろう」
1955 = "「Tôi nghĩ vậy. Dù có thể đây là cách tiếp cận mà họ đã nghĩ đến rồi, nhưng báo cho Tiến sĩ Fushichou và ngài Denshahime biết cũng không thừa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　それなら登呂流湯さんを、\n不死鳥博士さんに直接ご紹介するのも」
1780 = "「A! Nếu vậy thì việc giới thiệu trực tiếp ông chủ Tororyu-yu cho Tiến sĩ Fushichou cũng」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。あのふたりの対話から、\n新しい何かが見えてくる可能性は、高そうに思える」
2095 = "「Đúng vậy. Từ cuộc đối thoại giữa hai người họ, khả năng tìm ra điều gì đó mới mẻ có vẻ rất cao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですよね！　なら、わたし、そっちの方も、\nできるだけ早くでセッティングします」
1912 = "「Đúng vậy nhỉ! Nếu thế, em cũng sẽ cố gắng sắp xếp chuyện đó càng sớm càng tốt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「よろしく頼む。\n――『オリヴィ関連はこれでひとくぎりかな』」
2265 = "「Nhờ em cả đấy. ——'Chuyện liên quan đến Olivy coi như tạm khép lại ở đây nhỉ'」"
# 【ハチロク】
# display as 八六
# JP: 「お茶が入りました、双鉄さま」
2247 = "「Trà pha xong rồi đây ạ, ngài Soutetsu.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。どうぞぉ、ポーレットぉ」
1662 = "「Vâng ạ. Của Paulette đây nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、ありがと」
1820 = "「U hu hu, cảm ơn em.」"
# monologue
# JP: タイミングをはかってくれていたのだろう。
2569 = "Có lẽ em ấy đã căn chuẩn thời gian rồi."
# monologue
# JP: 水を向けたら、その瞬間にお茶が出てきた――\nくだらぬことを思ってしまい、なんとも肩の力が抜ける。
2614 = "Vừa mới mở lời, ngay khoảnh khắc đó trà đã được bưng ra—— Nghĩ đến chuyện vớ vẩn đó, khiến tôi bất giác thở phào nhẹ nhõm."
# 【双鉄】
# display as 雙鐵
# JP: 「で、だ。明日からの僕たちの乗務だが――」
2231 = "「Thế, chuyện là. Về ca trực của chúng ta từ ngày mai——」"
# 【ポーレット】
# display as 波萊特
# JP: 「み鉄さんと調整つきました。明日以降、月水金の13：00\nからで、8620での、[おこば,1]小畑線の試験運転に入ってください」
1929 = "「Em đã điều chỉnh xong với bên Đường sắt Mikan rồi. Từ ngày mai trở đi, vào lúc 13:00 các ngày thứ Hai, thứ Tư, thứ Sáu anh hãy bắt đầu chạy thử nghiệm tuyến Okoba bằng đầu máy 8620 nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、路線名は[おこば,1]小畑線で決定したのか」
1787 = "「A, tên tuyến đường đã quyết định là tuyến Okoba rồi sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「です。日々姫ちゃんとも相談して、やっぱり、\n一番の売りを路線名にするのがいいだろうって」
2007 = "「Đúng vậy ạ. Em cũng đã bàn bạc với Hibiki, và quyết định rằng, lấy điểm nhấn thu hút nhất làm tên tuyến đường vẫn là tốt nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ」
2096 = "「Quả thực là vậy.」"
# monologue
# JP: ひねりはないが、明快である。
2807 = "Tuy không có gì mới mẻ, nhưng lại rất rõ ràng."
# monologue
# JP: 日ノ本三大車窓の一つ――小畑の車窓。\nそれを観光の売りにするなら、最も相応しい線名だろう。
2718 = "Một trong ba khung cảnh qua cửa sổ đẹp nhất Hinomoto——Khung cảnh qua cửa sổ của Okoba. Nếu lấy đó làm điểm nhấn du lịch, thì đó sẽ là cái tên phù hợp nhất cho tuyến đường."
# 【ポーレット】
# display as 波萊特
# JP: 「で、十月一日からの営業権返還にともなっての、\n新しい観光列車の名前なんですけど」
2053 = "「Và, cùng với việc hoàn trả quyền kinh doanh từ ngày 1 tháng 10, đây là tên của chuyến tàu du lịch mới.」"
# monologue
# JP: うふふと笑って嬉しげに、ポーレットが一枚の紙――\nいや、イメージボードを取り出し、僕らに示してくる。
2751 = "Cười u hu hu với vẻ đầy thích thú, Paulette lấy ra một tờ giấy—— không, là một tấm bảng phác thảo ý tưởng, và đưa cho chúng tôi xem."
# 【ポーレット】
# display as 波萊特
# JP: 「この案。\n双鉄くんとハチロクちゃんは、どう思います？」
2189 = "「Đề xuất này. Anh Soutetsu và Hachiroku thấy thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……良く飲むなぁ」
1291 = "「...Uống nhiều nước thật đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「まことですね。御一夜から小畑まで、\nわずかに10.4キロだというのに」
2011 = "「Đúng vậy nhỉ. Từ Ohimitera đến Okoba, mới chỉ có 10.4 kilomet thôi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、給水塔が残っているのはありがたい。\nこれがなければ、とてもこの山の先は越えられんなぁ」
1632 = "「Nhưng mà, may là vẫn còn tháp cấp nước. Nếu không có nó, chúng ta hoàn toàn không thể vượt qua được ngọn núi phía trước đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「で、ございますね」
2097 = "「Đúng là như vậy ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツー！　ハチロクー！　給水まだーっ？？」
2248 = "「Soutetsu! Hachiroku! Cấp nước xong chưa vậy??」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、今終わる。すぐ戻る」
1695 = "「À, xong ngay đây. Tôi quay lại ngay.」"
# monologue
# JP: 8620の運転台へと駆け戻り、\n給炭、給水の完了したことを報告する。
2691 = "Tôi vội vã chạy trở lại buồng lái của 8620, và báo cáo rằng việc cấp than, cấp nước đã hoàn tất."
# monologue
# JP: オリヴィはうんうん頷いて、\nびしり、線路の先を指さす。
2564 = "Olivy ừm ừm gật đầu, rồi chỉ thẳng về phía trước đường ray."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「今までとおんなじ！　とにかく絶対とまらないこと！」
1646 = "「Giống hệt như từ trước đến giờ! Nói chung là tuyệt đối không được dừng lại!」"
# monologue
# JP: 今日これで、二十一度目の同じ注意だ。
2902 = "Hôm nay đã là lần thứ hai mươi mốt em ấy nhắc nhở điều tương tự rồi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「とまったら二度とあがれなくなるだけじゃないから。\nそのまま逆走しておっこちていっちゃうから」
1663 = "「Nếu dừng lại thì không chỉ là không lên được nữa đâu. Mà sẽ cứ thế chạy lùi rồi rơi tọt xuống dưới luôn đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「了解した」
1991 = "「Đã rõ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「8620の\\x%l粘着力;#00ffc040;粘着力%l;#;はオバケだけど、\nそれでも、怪しいっておもったらすぐに」
2240 = "「\\x%l粘着力;#00ffc040;Lực bám đường%l;#; của 8620 tuy rất khủng, nhưng dù vậy, nếu thấy có gì đáng ngờ là phải ngay lập tức」"
# 【ハチロク】
# display as 八六
# JP: 「\\x%l砂撒き;#00ffc040;砂撒き%l;#;ですね。\n同時に、双鉄さまには\\x%l加減弁;#00ffc040;加減弁%l;#;を絞っていただく」
1223 = "「\\x%l砂撒き;#00ffc040;Phun cát%l;#; đúng không ạ. Đồng thời, ngài Soutetsu cũng phải bóp \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#; lại.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど、絶対にしぼりすぎない。\n上り勾配では、[りっこう,1]力行、\\x%l力行;#00ffc040;力行%l;#;、また\\x%l力行;#00ffc040;力行%l;#;」
1652 = "「Nhưng mà, tuyệt đối không được bóp quá chặt đâu đấy. Trên đoạn đường dốc lên, chỉ có \\x%l力行;#00ffc040;chạy kéo tải%l;#;, \\x%l力行;#00ffc040;chạy kéo tải%l;#;, và lại \\x%l力行;#00ffc040;chạy kéo tải%l;#; thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「上り勾配では[りっこう,1]力行あるのみ、了解だ」
2055 = "「Trên đoạn đường dốc lên chỉ có \\x%l力行;#00ffc040;chạy kéo tải%l;#;, đã rõ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「当然だけど、助士は蒸気圧をタモチつづけて！\n勾配入る前から、バックを普段より気持ち厚く押さえる」
2067 = "「Đương nhiên rồi, phụ lái cũng phải liên tục DUY TRÌ áp suất hơi nước nhé! Trước khi vào dốc, phải ép than ở phía trong dày hơn bình thường một chút.」"
# 【赤井】
# display as 赤井
# JP: 「蒸気圧を落とさない。勾配に入る前から、\n\\x%l火床;#00ffc040;火床%l;#;の石炭は、奥側を気持ち厚めに作る。了解しました」
2111 = "「Không được để áp suất hơi nước giảm. Trước khi vào dốc, phải rải than ở \\x%l火床;#00ffc040;buồng lửa%l;#; phía trong dày hơn một chút. Đã rõ.」"
# 【ニイロク】
# display as 二六
# JP: 「不要でしつこい助言。清春。電車\\x%l運転士;#00ffc040;運転士%l;#;になるまえ。\n\\x%l機関士;#00ffc040;機関士%l;#;。[こうばい,1]勾配路線――[ひたひこやま,4]肥田飛虎山線だって経験済み」
2197 = "「Lời khuyên dư thừa và dai dẳng. Kiyoharu. Trước khi trở thành \\x%l運転士;#00ffc040;người lái tàu%l;#; điện. Đã từng là \\x%l機関士;#00ffc040;người lái tàu%l;#; hơi nước. Tuyến đường dốc——Tuyến Hitahikoyama cũng đã từng có kinh nghiệm rồi.」"
# monologue
# JP: ニイロクがいれたフォローに、\nオリヴィの目がスっと細まる。
2436 = "Trước lời nói đỡ của Niiroku, đôi mắt Olivy khẽ nheo lại."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ブランクはこわいよ？　\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だって、\nしばらく走ってないだけでそんなこと忘れちゃうくらい」
2100 = "「Việc bỏ trống một thời gian dài đáng sợ lắm đấy? Ngay cả \\x%lレイルロオド;#00ffc040;Railord%l;#;, chỉ cần không chạy một thời gian là có thể quên mất những chuyện như vậy luôn đó.」"
# 【ニイロク】
# display as 二六
# JP: 「むぐっ」
1755 = "「Ưm.」"
# 【赤井】
# display as 赤井
# JP: 「実際、勾配線区での\\x%l投炭;#00ffc040;投炭%l;#;は久々です。\nいただいたアドバイス、[ちょくせつ,1]直截的に助かっています」
1905 = "「Thực tế thì, đã lâu lắm rồi tôi mới lại \\x%l投炭;#00ffc040;xúc than%l;#; trên tuyến đường dốc. Những lời khuyên vừa rồi, thực sự đã giúp ích cho tôi rất nhiều.」"
# monologue
# JP: ……御一夜からこの小畑までとて、十分すぎる登りだった。
1201 = "...Chỉ từ Ohimitera đến Okoba này thôi, độ dốc đã là quá đủ rồi."
# monologue
# JP: \\x%lループ線;#00ffc040;ループ線%l;#;を、更に上まで登りきるための小休止駅、小畑駅。\n一息つけば、オリヴィの指導の的確さがじわり染みてくる。
2832 = "Ga Okoba, trạm nghỉ chân nhỏ để tiếp tục leo lên \\x%lループ線;#00ffc040;đường ray vòng tròn%l;#; cao hơn nữa. Khi vừa kịp thở phào một cái, sự chỉ dẫn chính xác của Olivy mới dần thấm thía."
# 【双鉄】
# display as 雙鐵
# JP: 「僕達もとても助かっている。なにせ初めての経験だ。\n実際に走ってみると、勾配のキツさを痛感させられる」
1866 = "「Chúng tôi cũng được giúp đỡ rất nhiều. Dù sao thì đây cũng là lần đầu tiên trải nghiệm mà. Khi thực sự chạy thử, tôi mới cảm nhận sâu sắc độ khắc nghiệt của con dốc này.」"
# 【ハチロク】
# display as 八六
# JP: 「まことに左様でございますね。[とうかいどう,2]東峡道――\n[せきがはら,2]堰ヶ原の勾配もなかなかのものと感じておりましたが」
2153 = "「Quả đúng là như vậy nhỉ. Toukaido—— Độ dốc của Sekigahara em từng nghĩ cũng khá là ghê gớm rồi nhưng mà」"
# monologue
# JP: ハチロクの声を聞いた瞬間、\nオリヴィの尖っていた口先が、にやりと笑う。
2842 = "Ngay khoảnh khắc nghe thấy giọng nói của Hachiroku, khóe môi đang chu lên của Olivy liền nhếch lên thành một nụ cười ranh mãnh."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オコバ、ずーっとスッゴイでしょ！」
1846 = "「Okoba, lúc nào cũng SIÊU KHỦNG đúng không!」"
# 【ハチロク】
# display as 八六
# JP: 「はい。ご教導なしには越えられていたものかどうか……\nオリヴィちゃん、まことにありがとうございます」
2029 = "「Vâng. Nếu không có sự hướng dẫn, không biết chúng em có vượt qua được không nữa... Bé Olivy, thực sự vô cùng cảm ơn em.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなのとーぜん！　今はオリヴィが教導で、\nおしえてあげるのオシゴトなんだから！」
2222 = "「Chuyện đó là ĐƯƠNG NHIÊN rồi! Bây giờ Olivy là người hướng dẫn mà, nên việc chỉ dạy cho mọi người là CÔNG VIỆC của Olivy đó!」"
# monologue
# JP: 赤井宮司の気遣いから、ハチロクが見事に接続を取れば、\nオリヴィはすぐに機嫌を戻す。
2550 = "Nhờ sự tinh tế của ông Akai, Hachiroku đã bắt nhịp câu chuyện một cách hoàn hảo, Olivy lập tức vui vẻ trở lại."
# monologue
# JP: 反面、ニイロクは少しふくれてしまっているようだ。
2458 = "Trái lại, Niiroku có vẻ hơi hờn dỗi một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司もニイロクもありがとうございます。\nまさか\\x%l機関助士;#00ffc040;機関助士%l;#;をしていただけるとは思いませんでした」
1636 = "「Cảm ơn ông Akai và Niiroku rất nhiều. Không ngờ hai người lại chịu làm \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; cho chúng tôi.」"
# 【赤井】
# display as 赤井
# JP: 「いえ――」
2151 = "「Không có gì——」"
# 【ニイロク】
# display as 二六
# JP: 「！」
1756 = "「!」"
# monologue
# JP: 赤井宮司がチラとニイロクに視線を向ける。\n何故だろう。
2426 = "Ông Akai liếc nhìn Niiroku. Tại sao vậy nhỉ."
# monologue
# JP: ニイロクは人差し指を口の前にたて、\n「しーっ」と、「ナイショ」と、ゼスチャーをみせる。
2827 = "Niiroku đặt ngón trỏ lên môi, ra dấu \"Suỵt\", ý bảo \"Bí mật nhé\"."
# 【赤井】
# display as 赤井
# JP: 「……単純に、経験者がお手伝いをした方がよいか、と。\n[おこば,1]小畑越えの、初回の試験運転とお伺いしましたので」
1270 = "「...Đơn giản là, tôi nghĩ có người có kinh nghiệm phụ giúp thì sẽ tốt hơn. Vì tôi nghe nói đây là lần chạy thử nghiệm đầu tiên vượt qua dốc Okoba.」"
# 【双鉄】
# display as 雙鐵
# JP: 「助かります」
1949 = "「Giúp được nhiều lắm ạ.」"
# monologue
# JP: 会話の間も、赤井宮司はせっせと\\x%l投炭;#00ffc040;投炭%l;#;を続けてくれる。\nボイラー圧力計が、右に右にと振れ続ける。
2875 = "Trong lúc trò chuyện, ông Akai vẫn không ngừng \\x%l投炭;#00ffc040;xúc than%l;#; một cách cần mẫn. Kim đồng hồ đo áp suất lò hơi liên tục nhích dần sang bên phải."
# monologue
# JP: バシュウ、と大きな音がして、\n安全弁が蒸気を吐き出す。
2953 = "Phùuuu, một tiếng động lớn vang lên, van an toàn xả hơi nước ra ngoài."
# 【赤井】
# display as 赤井
# JP: 「おっと、お恥ずかしい」
1754 = "「Ây da, thật xấu hổ quá.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ううん！　ショクニンゲーより安全第一！\nこれでいいと思う。どう？　ソーテツ？」
2034 = "「Không đâu! An toàn là trên hết chứ không phải KỸ NĂNG! Thế này là được rồi. Thấy sao hả? Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　後進、フルギアっ！」
1800 = "「Ừm! Lùi lại, cài hết số!!」"
# monologue
# JP: \\x%l逆転機;#00ffc040;逆転機%l;#;ハンドルを後進位置にし、\n\\x%l加減弁;#00ffc040;加減弁%l;#;テコをじわり、じわりと引き込んでいく。
2604 = "Kéo tay gạt \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; về vị trí lùi, rồi từ từ, từ từ kéo \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#; lại."
# 【ニイロク】
# display as 二六
# JP: 「\\x%lスイッチバック;#00ffc040;スイッチバック%l;#;」
1210 = "「\\x%lスイッチバック;#00ffc040;Đường vòng zigzag%l;#;」"
# 【赤井】
# display as 赤井
# JP: 「ですね、ニイロク。小畑駅から引き込み線に後退し、\nそこから前進、\\x%lループ線;#00ffc040;ループ線%l;#;へと突入します」
2016 = "「Đúng vậy, Niiroku. Từ ga Okoba lùi lại đường nhánh, từ đó tiến lên, rồi tiến vào \\x%lループ線;#00ffc040;đường ray vòng tròn%l;#;.」"
# 【ニイロク】
# display as 二六
# JP: 「どうして。そんな。面倒な？　こと」
2051 = "「Tại sao. Phải làm. Việc phiền phức. Như vậy?」"
# 【赤井】
# display as 赤井
# JP: 「それは――」
2191 = "「Đó là vì——」"
# 【ニイロク】
# display as 二六
# JP: 「それは？」
2193 = "「Là vì?」"
# monologue
# JP: 引き込み線の最奥にまで8620を後退させる。\n――ここから先は、正念場。
2476 = "Lùi 8620 vào sâu tận cùng của đường nhánh. ——Từ đây trở đi, mới là thời khắc quyết định."
# monologue
# JP: 止まれば下がる、下がって落ちる、[やたけ,1]屋岳の峠。\n25～30パーミルの上り勾配が延々続く、最難関だ。
2466 = "Nếu dừng lại sẽ bị tụt xuống, tụt xuống sẽ rơi, đèo Yatake. Đoạn đường dốc lên từ 25 đến 30 phần nghìn kéo dài liên tục, là chướng ngại vật khó khăn nhất."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま」
2244 = "「Ngài Soutetsu.」"
# monologue
# JP: ハチロクの声も緊張している。\nゆえにわざと、制帽をぽんぽん叩いて、曲げる。
2485 = "Giọng nói của Hachiroku cũng đang căng thẳng. Vì thế tôi cố tình vỗ nhẹ vào mũ đồng phục của em ấy, làm nó hơi lệch đi."
# 【ハチロク】
# display as 八六
# JP: 「な、なにをなさるのですか、双鉄さまっ」
1941 = "「Ng, ngài làm gì vậy, ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕とお前と[ハチロク,3]8620だ。その上、オリヴィも、\n赤井宮司とニイロクまでもついてくれている。大丈夫だ」
2203 = "「Có tôi, em và 8620. Hơn nữa, còn có cả Olivy, ông Akai và Niiroku cũng đang đi cùng chúng ta. Sẽ ổn thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「――はい」
1239 = "「——Vâng.」"
# monologue
# JP: 制帽を整え直すハチロクの口の端に笑顔が浮かぶ。
2919 = "Một nụ cười nở trên môi Hachiroku khi em ấy chỉnh lại mũ đồng phục."
# monologue
# JP: （あの橋だって、越えたのだ）
2989 = "（Ngay cả cây cầu đó, chúng ta cũng đã vượt qua được mà）"
# monologue
# JP: もう一度だけ軽くハチロクの髪を撫ぜ、\nその手で\\x%l自弁;#00ffc040;自弁%l;#;をしっかり握る。
2671 = "Vuốt tóc Hachiroku nhẹ nhàng thêm một lần nữa, rồi dùng chính bàn tay đó nắm chặt lấy \\x%l自弁;#00ffc040;van hãm tự động%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l自弁;#00ffc040;自弁%l;#;、『運転』」
1228 = "「\\x%l自弁;#00ffc040;Van hãm tự động%l;#;, 'Lái'.」"
# monologue
# JP: ザゴっ、ザゴっと、ダイナミックな\\x%l投炭;#00ffc040;投炭%l;#;の音。
2537 = "Xoẹt, xoẹt, tiếng \\x%l投炭;#00ffc040;xúc than%l;#; vang lên đầy mạnh mẽ."
# monologue
# JP: 蒸気圧がまた、安全弁の噴出ギリギリまで高まっていく。
2849 = "Áp suất hơi nước lại tăng lên đến sát ngưỡng xả của van an toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l逆転機;#00ffc040;逆転機%l;#;、\\x%l前進フルギア;#00ffc040;前進フルギア%l;#;」
1234 = "「\\x%l逆転機;#00ffc040;Cần đảo chiều%l;#;, \\x%l前進フルギア;#00ffc040;cài hết số tiến%l;#;.」"
# monologue
# JP: ここから先、前方注視は崩せない。
2707 = "Từ đây trở đi, không thể lơ là việc chú ý phía trước."
# monologue
# JP: けれどもわかる。\nハチロクと僕は、同じ行き先を見据えてる。
2763 = "Nhưng tôi biết. Hachiroku và tôi, đang cùng nhìn về một đích đến."
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「出発！　進行！！」
1693 = "「Xuất phát! Tiến lên!!」"
# monologue
# JP: \\x%lバイパス弁;#00ffc040;バイパス弁%l;#;、シリンダー排水弁閉じ――
2941 = "\\x%lバイパス弁;#00ffc040;Van bypass%l;#;, đóng van xả nước ngưng xi lanh——"
# monologue
# JP: （ポーーーーーーーっ！！）
2986 = "（Tuúúúúúúú!）"
# monologue
# JP: 発車の\\x%l汽笛;#00ffc040;汽笛%l;#;を響かせたなら、\nここから先は不退転。
2705 = "Kéo \\x%l汽笛;#00ffc040;còi hơi nước%l;#; báo hiệu khởi hành, từ đây trở đi sẽ không có đường lùi."
# monologue
# JP: \\x%l動輪;#00ffc040;動輪%l;#;の回転を意識しながら、じわり、じわりと、\nけれどいつもよりは大きめに、\\x%l加減弁;#00ffc040;加減弁%l;#;を開いていく。
2652 = "Vừa ý thức đến vòng quay của \\x%l動輪;#00ffc040;bánh xe chủ động%l;#;, tôi vừa từ từ, từ từ, nhưng mở \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#; lớn hơn bình thường một chút."
# 【ニイロク】
# display as 二六
# JP: 「おお」
1750 = "「Ồ.」"
# 【赤井】
# display as 赤井
# JP: 「ニイロク。さっきの質問の、これが答えです」
1644 = "「Niiroku. Câu trả lời cho câu hỏi lúc nãy, chính là đây.」"
# monologue
# JP: \\x%l投炭;#00ffc040;投炭%l;#;の音は止まらない。
119 = "Tiếng \\x%l投炭;#00ffc040;xúc than%l;#; vẫn không ngừng vang lên."
# monologue
# JP: ザゴっ、ザゴっと、\nその響きだけで機関車を後押ししてくれる。
2542 = "Xoẹt, xoẹt, chỉ riêng âm thanh đó thôi cũng đủ tiếp thêm sức mạnh cho đầu máy tiến lên."
# 【ニイロク】
# display as 二六
# JP: 「――加速。助走」
1237 = "「——Tăng tốc. Lấy đà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「Yes！」
2269 = "「Yes!」"
# monologue
# JP: 発車後わずかに30秒。\n\\x%l加減弁;#00ffc040;加減弁%l;#;を満開にすると同時に、もう上り勾配がやってくる。
2793 = "Chỉ 30 giây sau khi xuất phát. Ngay khoảnh khắc mở \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#; hết cỡ, đoạn đường dốc lên đã xuất hiện."
# monologue
# JP: （ぐんっ！）
2994 = "（Gầm!）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「イキオイつけなきゃ！　加速しなくちゃ！\nオコバのループは越えられないっ！！」
1617 = "「Phải lấy ĐÀ! Phải tăng tốc! Nếu không thì không thể vượt qua vòng lặp của Okoba được đâu!!」"
# monologue
# JP: \\x%l力行;#00ffc040;力行%l;#;。\\x%l力行;#00ffc040;力行%l;#;。\\x%l力行;#00ffc040;力行%l;#;あるのみ。
115 = "\\x%l力行;#00ffc040;Chạy kéo tải%l;#;. \\x%l力行;#00ffc040;Chạy kéo tải%l;#;. Chỉ có \\x%l力行;#00ffc040;chạy kéo tải%l;#; mà thôi."
# monologue
# JP: けれど\\x%l逆転機;#00ffc040;逆転機%l;#;がフルギアのままでは、\n蒸気はいくらあってもたりない。
2452 = "Nhưng nếu \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; vẫn giữ ở mức cài hết số tiến, thì bao nhiêu hơi nước cũng không đủ."
# 【双鉄】
# display as 雙鐵
# JP: 「[カットオフ,5]逆転機締切率、20っ」
1827 = "「Tỷ lệ đóng \\x%l逆転機;#00ffc040;cần đảo chiều%l;#;, 20」"
# 【ハチロク】
# display as 八六
# JP: 「いえ、30で」
1633 = "「Không, 30 đi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？　カットオフ！　30」
1741 = "「Hử!? Tỷ lệ đóng! 30」"
# monologue
# JP: 締切率を大きくとれば、蒸気を節約できる分、\n\\x%l動輪;#00ffc040;動輪%l;#;を回す力は落ちる。
2503 = "Nếu tăng tỷ lệ đóng lên, dù tiết kiệm được hơi nước, nhưng lực làm quay \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; sẽ giảm xuống."
# monologue
# JP: そのバランスの最適解を――
2915 = "Giải pháp tối ưu cho sự cân bằng đó——"
# monologue
# JP: （しゅっ！　しゅっ！　ぼっ！　ぼっ！！）
2984 = "（Xình! Xịch! Phì! Phì!!）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケーハチロク！　ナイスはんだん！\nいいよ、このチョーシでのぼってこー！」
2268 = "「Okay Hachiroku! Phán đoán RẤT TỐT! Được rồi, cứ giữ nhịp ĐỘ này mà leo lên nhé!」"
# monologue
# JP: ――ハチロクは見事に見極めてくれた。
1171 = "——Hachiroku đã phán đoán một cách xuất sắc."
# monologue
# JP: 8620はゆっくりと、けれども少しも緩むことなく、\n小畑のループを、屋岳の峠を、ひた登っていく。
2996 = "8620 chầm chậm, nhưng không hề chùn bước, cứ thế leo lên vòng lặp của Okoba, lên đèo Yatake."
# 【ニイロク】
# display as 二六
# JP: 「\\x%lループ線;#00ffc040;ループ線%l;#;――なに、これ――こんなに。大きい」
1216 = "「\\x%lループ線;#00ffc040;Đường ray vòng tròn%l;#;——Gì, thế này——To. Đến thế.」"
# monologue
# JP: “上”の線路が垣間見え、\nその全容を、ようやく脳裏に描けたのだろう。
2952 = "Có lẽ Niiroku đã thoáng thấy đường ray ở \"phía trên\", và cuối cùng cũng hình dung được toàn cảnh của nó trong tâm trí."
# monologue
# JP: ニイロクの声は、ほとんど怯えに近く聞こえる。
2435 = "Giọng nói của Niiroku nghe gần như là đang sợ hãi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ！　オコバのループは、半径300メートル。それで、オヒトヨからのヒョーコーサ430メートルを駆け上がる」
2002 = "「Đúng vậy đó! Vòng lặp của Okoba có bán kính 300 mét. Hơn nữa, nó leo lên độ cao chênh lệch 430 mét so với Ohitoyo đấy!」"
# 【ニイロク】
# display as 二六
# JP: 「なに、それ。――。\nなんで。そんな、めちゃくちゃな。山越え」
2228 = "「Gì, thế. ——. Tại sao. Lại phải. Vượt núi. Một cách vô lý như vậy.」"
# 【赤井】
# display as 赤井
# JP: 「戦争に備え、海岸線を避けての配線だったと聞きます。\n国家の威信をかけて、死力を尽くして開通させた」
1964 = "「Nghe nói là để chuẩn bị cho chiến tranh, nên họ đã thiết kế tuyến đường tránh xa bờ biển. Đây là tuyến đường được thông xe bằng sự đánh cược uy tín của quốc gia, dốc toàn bộ sức lực để hoàn thành.」"
# monologue
# JP: 技術の粋を尽くしてもなお、この勾配だ。
2903 = "Dù đã vận dụng những tinh hoa kỹ thuật tốt nhất, nhưng độ dốc vẫn như thế này."
# monologue
# JP: 上りきれず、事故を起こして死者を出す。\nそうした汽車も片手では数えられなかったとも聞――！？
2738 = "Không thể leo lên hết, gây ra tai nạn và có người chết. Nghe nói số lượng những chuyến tàu như vậy đếm không xuể trên một bàn tay——!?"
# 【ハチロク】
# display as 八六
# JP: 「砂、撒きますっ！」
1983 = "「Phun cát ạ!」"
# monologue
# JP: 予兆とも呼べないほどの微細な違和。\nそれをハチロクが消し去ってくれる。
2913 = "Một sự khác thường vi tế đến mức không thể gọi là điềm báo. Hachiroku đã xóa tan điều đó giúp tôi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「助士！　給水！！」
1734 = "「Phụ lái! Cấp nước!!」"
# 【赤井】
# display as 赤井
# JP: 「ポンプ！」
2050 = "「Bơm!」"
# monologue
# JP: 赤井宮司が給水ポンプのバルブをひねる。\n途端、力がガクンと落ちる。
2887 = "Ông Akai vặn van bơm cấp nước. Ngay lập tức, sức mạnh giảm sút đột ngột."
# 【双鉄】
# display as 雙鐵
# JP: 「くっ！」
# 1756 = "「唔！」" 
# monologue
# JP: \\x%l加減弁;#00ffc040;加減弁%l;#;テコを大きく開けて急場をしのぎ、\n徐々に、じわじわ、様子をみつつ戻していく。
2679 = "Tôi mở rộng \\x%l加減弁;#00ffc040;van tiết lưu hơi%l;#; để vượt qua tình huống cấp bách, rồi từ từ, chầm chậm, vừa quan sát tình hình vừa khép lại."
# 【ニイロク】
# display as 二六
# JP: 「なに。今の。何が、起きたの？」
1697 = "「Gì vậy. Vừa rồi. Có chuyện gì, xảy ra vậy?」"
# monologue
# JP: （ざごっ！　ざごっ！！！）
2987 = "（Xoẹt! Xoẹt!!!）"
# monologue
# JP: 注水を終えるやいなやでまた\\x%l投炭;#00ffc040;投炭%l;#;。\nにもかかわらず、赤井宮司の声は涼しい。
2756 = "Vừa cấp nước xong lại tiếp tục \\x%l投炭;#00ffc040;xúc than%l;#;. Dù vậy, giọng nói của ông Akai vẫn rất điềm tĩnh."
# 【赤井】
# display as 赤井
# JP: 「急勾配を登るためには、大きな力が必要です。\n大きな力は、大量の蒸気からしか生み出せません」
2143 = "「Để leo lên con dốc đứng, cần một lực rất lớn. Lực lớn đó, chỉ có thể tạo ra từ một lượng lớn hơi nước.」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1797 = "「嗯」" 
# 【赤井】
# display as 赤井
# JP: 「大量の蒸気を使えば、注水が追いつかなくなり、\nボイラー内の水がなくなってしまいます」
1881 = "「Nếu sử dụng lượng lớn hơi nước, việc cấp nước sẽ không theo kịp, nước trong lò hơi sẽ cạn kiệt.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、注水ポンプで一気に大量注水するんだけど」
1976 = "「Vì vậy, phải dùng bơm cấp nước để cấp một lượng lớn nước cùng một lúc, nhưng mà」"
# 【赤井】
# display as 赤井
# JP: 「大量注水すればその分、ボイラーの温度は」
2239 = "「Nếu cấp một lượng lớn nước thì nhiệt độ của lò hơi sẽ」"
# 【ニイロク】
# display as 二六
# JP: 「下がる！　だから。蒸気が縮む？」
1614 = "「Giảm xuống! Vì vậy. Hơi nước sẽ co lại?」"
# 【赤井】
# display as 赤井
# JP: 「大正解です、ニイロク。そうして生じた出力低下を\n補うためには、大量の蒸気を送りこむしかありません」
1893 = "「Hoàn toàn chính xác, Niiroku. Và để bù đắp cho sự sụt giảm công suất sinh ra từ đó, chúng ta chỉ còn cách đưa vào một lượng lớn hơi nước.」"
# 【ニイロク】
# display as 二六
# JP: 「蒸気をつくらないと蒸気が足りない。\nけど、そうすると。蒸気、たくさん使うことになる」
1624 = "「Nếu không tạo ra hơi nước thì sẽ thiếu hơi nước. Nhưng, nếu làm vậy. Hơi nước, sẽ bị sử dụng rất nhiều.」"
# monologue
# JP: ニイロクは要点をとても端的に整理する。
2433 = "Niiroku tóm tắt những điểm chính một cách rất súc tích."
# 【ニイロク】
# display as 二六
# JP: 「矛盾。[アンビバレンツ,3]二律背反。演算。とても難しい。\n最適解――自分にも。すぐには導き出せない」
2085 = "「Mâu thuẫn. Hai mặt đối lập. Tính toán. Rất khó. Giải pháp tối ưu——Ngay cả tôi. Cũng không thể tìm ra ngay được.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね」
2075 = "「Đúng vậy nhỉ.」"
# monologue
# JP: ハチロクの声は未だに硬い。
2486 = "Giọng Hachiroku vẫn còn cứng nhắc."
# monologue
# JP: けれども、わかる。\n伝えなくてはいられぬ想いを。
2526 = "Nhưng, tôi hiểu. Đó là những tâm tư không thể không nói ra."
# 【ハチロク】
# display as 八六
# JP: 「ですから、人は、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は評するのです。\n『\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;は、生き物だ』と」
1971 = "「Chính vì thế, con người, \\x%lレイルロオド;#00ffc040;Railord%l;#; mới đánh giá rằng. '\\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#;, là một sinh vật sống'.」"
# 【ニイロク】
# display as 二六
# JP: 「――うん」
1238 = "「——Ừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク！　\\x%l砂撒き;#00ffc040;砂撒き%l;#;っ！」
1679 = "「Hachiroku! \\x%l砂撒き;#00ffc040;Phun cát%l;#;!」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄さまっ！」
1993 = "「Đã rõ, thưa ngài Soutetsu!」"
# monologue
# JP: \\x%l粘着力;#00ffc040;粘着力%l;#;を再び稼ぎ、25パーミルのループを抜ける。
2951 = "Lại một lần nữa gia tăng \\x%l粘着力;#00ffc040;lực bám đường%l;#;, vượt qua vòng lặp 25 phần nghìn."
# monologue
# JP: そこに待つのは、最高勾配――\n30.3パーミルの、ボイラー破りの、屋岳の坂だ。
2829 = "Chờ đợi phía trước, là độ dốc cao nhất—— Con dốc Yatake 30.3 phần nghìn, con dốc có thể phá vỡ cả lò hơi."
# 【赤井】
# display as 赤井
# JP: 「けれどニイロク。\nそれほど難しい\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;を操るからこそ」
1729 = "「Nhưng mà Niiroku à. Chính vì điều khiển một \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; khó khăn đến như vậy nên」"
# monologue
# JP: ――越えていく。\n屋岳の峠を。僕らの8620は越えていく。
1175 = "——Vượt qua thôi. Đèo Yatake. 8620 của chúng ta sẽ vượt qua."
# monologue
# JP: ただの一度も、\\x%l動輪;#00ffc040;動輪%l;#;を\\x%l空転;#00ffc040;空転%l;#;させることなく。\n蒸気を切らすこともなく。
2725 = "Không để \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; bị \\x%l空転;#00ffc040;quay trơn%l;#; dù chỉ một lần. Cũng không để cạn kiệt hơi nước."
# 【ニイロク】
# display as 二六
# JP: 「あ――わ――あっ！」
1758 = "「A——oa——á!」"
# 【ハチロク】
# display as 八六
# JP: 「これは――これは――この光景は――」
2185 = "「Đây là——đây là——quang cảnh này là——」"
# 【双鉄】
# display as 雙鐵
# JP: 「さすがは、日ノ本三大車窓の一つ……か」
2078 = "「Quả không hổ danh là, một trong ba khung cảnh qua cửa sổ đẹp nhất Hinomoto... sao.」"
# monologue
# JP: キャブの窓から見下ろせる。\n登ってきた線路が、くぐってきたトンネルが。
2626 = "Có thể nhìn xuống từ cửa sổ buồng lái. Đường ray vừa leo lên, đường hầm vừa chui qua."
# monologue
# JP: 通過してきた小畑の駅が。\nそうして、遥かに――
2911 = "Ga Okoba vừa đi qua. Và ở phía xa xa kia——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「見えるねー、オヒトヨ！」
2077 = "「Nhìn thấy rồi kìa, Ohitoyo!」"
# monologue
# JP: ――僕らの街が、御一夜が、\n小さく、けれども、確かに見える。
2664 = "——Thành phố của chúng ta, Ohimitera, nhỏ bé, nhưng chắc chắn là có thể nhìn thấy."
# 【ハチロク】
# display as 八六
# JP: 「まさに――まさしく[らせん,1]螺旋鉄道。\n天空路線でございますね」
2190 = "「Quả đúng là——chính xác là tuyến đường sắt xoắn ốc. Tuyến đường trên bầu trời nhỉ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ！　見た見た！　ヒビキのイメージボードでしょ！？\nほんっとにセンスいーよね、ヒビキって！！」
1778 = "「A! Thấy rồi thấy rồi! Bảng phác thảo ý tưởng của Hibiki đúng không!? Hibiki có gu thẩm mỹ thật sự rất TỐT luôn đó!!」"
# monologue
# JP: 右手側から、頷く気配。\n赤井宮司とニイロクも、強く同意してくれたのだろう。
2645 = "Từ phía bên phải, có dấu hiệu gật đầu. Chắc hẳn ông Akai và Niiroku cũng hoàn toàn đồng tình."
# 【双鉄】
# display as 雙鐵
# JP: 「『[らせん,1]螺旋鉄道・天空路線』か」
1246 = "「'Tuyến đường sắt xoắn ốc・Tuyến đường trên bầu trời' sao.」"
# monologue
# JP: 螺旋階段のごとき小畑の\\x%lループ線;#00ffc040;ループ線%l;#;と、\nそこから一直線に続く、30.3パーミルの駆け上がり。
2585 = "\\x%lループ線;#00ffc040;Đường ray vòng tròn%l;#; của Okoba giống như một cầu thang xoắn ốc, và đoạn dốc 30.3 phần nghìn chạy thẳng tắp từ đó."
# monologue
# JP: 抜けた瞬間開ける景色は、\nまさしく、天空の光景だ。
2821 = "Khung cảnh mở ra ngay khoảnh khắc vượt qua, chính xác là, quang cảnh của bầu trời."
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1753 = "「Ây da」"
# monologue
# JP: が、その光景は、一瞬にして流れ去る。
2769 = "Nhưng, quang cảnh đó, thoáng chốc đã trôi tuột đi."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l逆転機;#00ffc040;逆転機%l;#;！　\\x%lミッドギア;#00ffc040;ミッドギア%l;#;！！\n\\x%l加減弁;#00ffc040;加減弁%l;#;、とじーーーーーーーる」
1233 = "「\\x%l逆転機;#00ffc040;Cần đảo chiều%l;#;! \\x%lミッドギア;#00ffc040;Số trung tính%l;#;!! \\x%l加減弁;#00ffc040;Van tiết lưu hơi%l;#;, đóóóóóóng lạiiiii」"
# 【赤井】
# display as 赤井
# JP: 「ブロア[とめべん,1]止弁、開きます」
2262 = "「Mở van \\x%l止弁;#00ffc040;chặn%l;#; quạt hút lò hơi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l自弁;#00ffc040;自弁%l;#;、\\x%l常用;#00ffc040;常用%l;#;！」
1227 = "「\\x%l自弁;#00ffc040;Van hãm tự động%l;#;, \\x%l常用;#00ffc040;Phanh thường%l;#;!」"
# monologue
# JP: ……停止位置。よし。\n屋岳の駅で、また給水。
1195 = "...Vị trí dừng. Tốt. Tại ga Yatake, lại tiếp tục cấp nước."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「おつかれー！　みんな！　 ここから先はくだり勾配！\nヨシマツ抜けたら平地だよー」
1842 = "「Vất vả rồi, mọi người! Từ đây trở đi là dốc xuống! Qua khỏi Yoshimatsu là đồng bằng rồi đó~」"
# 【ハチロク】
# display as 八六
# JP: 「はぁ」
1746 = "「Phù」"
# monologue
# JP: ハチロクが安堵の息を吐く。\n汗がぶわあっと吹き出してくる。
2480 = "Hachiroku thở phào nhẹ nhõm. Mồ hôi tuôn ra như tắm."
# monologue
# JP: 道中、まだ半分も走れていない。\nここで緩むわけにはいかんが――
2665 = "Dọc đường, chúng tôi vẫn chưa đi được một nửa quãng đường. Không thể lơ là ở đây được, nhưng——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヤタケの水はね！　天然水のワキミズなんだよ！\nミズノミバもね、とってもレトロでかわいーよ！！」
2144 = "「Nước ở Yatake là! Nước SUỐI thiên nhiên đó nha! CHỖ UỐNG NƯỚC cũng, rất là hoài cổ và dễ thương luôn!!」"
# monologue
# JP: ――けれど、一息はつかねば保たぬ。
1168 = "——Nhưng mà, nếu không nghỉ ngơi một chút thì không trụ nổi mất."
# 【赤井】
# display as 赤井
# JP: 「双鉄君たちが、どうぞお先に」
2242 = "「Cậu Soutetsu và mọi người, cứ tự nhiên đi trước nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、お言葉に甘えます」
2218 = "「Vậy thì, chúng tôi xin nhận ý tốt này.」"
# monologue
# JP: ハチロクと手を取り合ってキャブから降りる。
2676 = "Tôi và Hachiroku nắm tay nhau bước xuống khỏi buồng lái."
# monologue
# JP: いまはひととき、こころをゆるめ、\n最高峰の風にふかれて、甘くて旨い水を飲もう。
2617 = "Bây giờ hãy thư giãn một chút, tận hưởng làn gió trên đỉnh cao nhất, và uống dòng nước ngọt lịm, mát lành."
# 【双鉄】
# display as 雙鐵
# JP: 「なんと……まぁ」
2186 = "「Thật là... chà」"
# 【ハチロク】
# display as 八六
# JP: 「まさか、まさかでございましたね」
2150 = "「Không ngờ, thật không ngờ luôn nhỉ.」"
# monologue
# JP: ……冷静に考えてみれば、まったくもって頷くしか無い。
1199 = "...Bình tĩnh suy nghĩ lại thì, hoàn toàn chỉ có thể gật đầu đồng ý."
# monologue
# JP: 運転中の僕らが前方注視で見ている光景を、\n\\x%l客車;#00ffc040;客車%l;#;の乗客は、どうしても見ることができないのだから。
2551 = "Khung cảnh mà chúng tôi nhìn thấy khi chú ý phía trước lúc đang lái tàu, hành khách trên \\x%l客車;#00ffc040;toa hành khách%l;#; tuyệt đối không thể nào nhìn thấy được."
# 【ニイロク】
# display as 二六
# JP: 「日ノ本三大車窓。\n[やたけ,1]屋岳第一トンネルを抜けたあとの、進行方向、左側」
1987 = "「Một trong ba khung cảnh qua cửa sổ đẹp nhất Hinomoto. Sau khi chui qua đường hầm Yatake thứ nhất, nhìn về phía bên trái theo hướng di chuyển.」"
# monologue
# JP: 前方注視の義務さえもない、単なる添乗。
2567 = "Đơn thuần chỉ là đi cùng, thậm chí không có nghĩa vụ phải chú ý phía trước."
# monologue
# JP: 僕らが誤認したものではない、\n正しき『日ノ本三大車窓』を、ニイロクは一人堪能する。
2600 = "Một trong ba khung cảnh qua cửa sổ đẹp nhất Hinomoto' thực sự, không phải là thứ mà chúng tôi đã nhận nhầm, Niiroku đang tận hưởng nó một mình."
# 【ニイロク】
# display as 二六
# JP: 「確かに。綺麗。けど。\n――さっき見た景色の方が。自分は。好き」
2076 = "「Đúng là. Đẹp thật. Nhưng mà. ——Khung cảnh nhìn thấy lúc nãy. Tôi. Thích hơn.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ま、それはキャブからしか見えない景色だからねー。\nがんばって峠越えした、ゴホービだから！」
1937 = "「Chà, đó là khung cảnh chỉ có thể nhìn thấy từ buồng lái thôi mà. Đó là PHẦN THƯỞNG cho sự cố gắng vượt đèo đó!」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 1797 = "「嗯」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどね、オリヴィ！　ここよりもっと好きな車窓！\n客席から見えるので、あるよー」
1726 = "「Nhưng mà nhé, Olivy! Có một khung cảnh qua cửa sổ thích hơn cả chỗ này cơ! Có thể nhìn thấy từ ghế hành khách luôn đó~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1771 = "「A」"
# 【ニイロク】
# display as 二六
# JP: 「どこ。それ」
2223 = "「Ở đâu. Vậy.」"
# monologue
# JP: ニイロクが、とても素直な興味を示す。
2438 = "Niiroku tỏ ra vô cùng hứng thú."
# monologue
# JP: 今日一日で、オリヴィとニイロクの距離が、\n随分縮まったような気もする。
2547 = "Chỉ trong một ngày hôm nay, khoảng cách giữa Olivy và Niiroku, dường như đã được rút ngắn đi rất nhiều."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヤツシロカイ！　夕方の、みかん鉄道の車窓からみる\nヤツシロカイは、セカイでイチバンの車窓なのっ！」
1674 = "「Biển Yatsushiro! Nhìn từ cửa sổ của Đường sắt Mikan vào buổi chiều tà, Biển Yatsushiro là khung cảnh qua cửa sổ ĐẸP NHẤT thế giới luôn đó!」"
# 【ハチロク】
# display as 八六＆二六
# JP: 「あ」\n「ふあ」
1772 = "「「A」 「Oa」」"
# monologue
# JP: ハチロクが、ニイロクが、ふたり同時に、\n幸せそうな声をだす。
2482 = "Hachiroku, Niiroku, cả hai người cùng lúc, thốt lên những âm thanh tràn ngập hạnh phúc."
# monologue
# JP: オリヴィから溢れだしたのだろう\\x%l共感;#00ffc040;共感%l;#;が、\nどれほど暖かなものなのか、だから、僕にも想像できる。
2783 = "Chắc hẳn là do \\x%l共感;#00ffc040;cộng cảm%l;#; tuôn trào từ Olivy, nó ấm áp đến nhường nào, vì vậy, tôi cũng có thể tưởng tượng được."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチロクとソーテツも、ニイロクとアカイグージも、\nぜったい、イッショにいったらいいよ！！」
1676 = "「Hachiroku và Soutetsu, Niiroku và ông Akai nữa, nhất định, mọi người CÙNG NHAU đi xem thử đi!!」"
# 【ハチロク】
# display as 八六
# JP: 「はい、必ずそうさせていただきますね」
1812 = "「Vâng, nhất định chúng tôi sẽ làm như vậy ạ.」"
# 【ニイロク】
# display as 二六
# JP: 「うん！！！」
1803 = "「Ừm!!!」"
# monologue
# JP: 幸せに満ち満ちている一声が、\nけれどもすぐに、どこか慌てたトーンに変わる。
2528 = "Một tiếng thốt lên tràn đầy hạnh phúc, nhưng ngay lập tức, chuyển sang một tông giọng có phần bối rối."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、けどけどオコバ線！　ラセン鉄道テンクー路線も、\nすっごく素敵だと思う！　きっと、お客さんたくさん」
1786 = "「A, nhưng mà nhưng mà tuyến Okoba! Tuyến đường trên BẦU TRỜI của tuyến đường sắt xoắn ốc, cũng RẤT LÀ tuyệt vời luôn đó! Chắc chắn, sẽ có rất nhiều hành khách.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1797 = "「嗯」" 
# monologue
# JP: オリヴィの言だ。それが本心なのはわかるが、\nどうにも口にするタイミングが悪い。
2566 = "Lời nói của Olivy. Dù biết đó là lời thật lòng, nhưng thời điểm nói ra lại không được tốt cho lắm."
# 【双鉄】
# display as 雙鐵
# JP: 「少しだけ、とってつけたように聞こえてしまうな」
2201 = "「Nghe có vẻ hơi gượng ép một chút nhỉ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなことない！　ホントにホント！\n\\x%l客車;#00ffc040;客車%l;#;も、とーーーってもキュートだし！」
2035 = "「Không có đâu! Là thật đó! Thật sự luôn! \\x%l客車;#00ffc040;Toa hành khách%l;#; cũng, CỰC KỲ dễ thương luôn!」"
# 【ニイロク】
# display as 二六
# JP: 「あ。それ。自分も思った。\n馬車みたい。小さい。かわいい」
1790 = "「A. Chuyện đó. Tôi cũng nghĩ vậy. Giống như xe ngựa. Nhỏ nhắn. Dễ thương.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でしょでしょ！？」
1994 = "「Đúng không đúng không!?」"
# 【ハチロク】
# display as 八六
# JP: 「実際に、馬車鉄道の\\x%l客車;#00ffc040;客車%l;#;をイメエジしたと、\n日々姫はいっていましたね」
1907 = "「Thực tế thì, Hibiki đã nói là lấy ý tưởng từ \\x%l客車;#00ffc040;toa hành khách%l;#; của đường sắt xe ngựa ngựa kéo mà.」"
# monologue
# JP: 螺旋階段を駆け上がり、天空の景色を眺め渡す。\nそこへと導く\\x%l客車;#00ffc040;客車%l;#;なら、天馬の馬車ということらしい。
2791 = "Chạy lên cầu thang xoắn ốc, ngắm nhìn khung cảnh bầu trời. Nếu là \\x%l客車;#00ffc040;toa hành khách%l;#; dẫn đến đó, thì có vẻ như đó là cỗ xe của thiên mã."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっかー、そーなんだー」
2195 = "「Ra là vậy~, thì ra là thế~」"
# monologue
# JP: そこは聞いていなかったのか、\nオリヴィは感心しきりの声をだす。
2423 = "Chắc là chưa nghe chuyện đó bao giờ, Olivy thốt lên giọng đầy thán phục."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィの連れてきたぼろチビたちが、\nこんなかわいくなるだなんて、ヒビキ、ほんとスゴイ！」
1865 = "「Mấy bé nhỏ rách rưới mà Olivy dẫn đến, lại trở nên dễ thương như thế này, Hibiki giỏi thật sự luôn!」"
# 【ニイロク】
# display as 二六
# JP: 「オリヴィ。\\x%l客車;#00ffc040;客車%l;#;。みかん鉄道で使ってた？」
1868 = "「Olivy. \\x%l客車;#00ffc040;Toa hành khách%l;#; này. Đã từng dùng ở Đường sắt Mikan sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「んーん、み鉄ではずーっと\\x%l入換;#00ffc040;入換%l;#;だったから」
2039 = "「Không đâu, ở Đường sắt Mikan lúc nào cũng chỉ \\x%l入換;#00ffc040;dồn toa%l;#; thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「ですけれど――その前。[つるみ,1]鶴巳の製鉄場の専用線では、\n貨物を牽いてらしたのですよね？」
1721 = "「Nhưng mà——trước đó. Ở tuyến đường chuyên dụng của nhà máy luyện thép Tsurumi, em đã từng kéo hàng hóa đúng không?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーだよ、だからね。\nぼろチビたちは、フジミノブからいっしょなの！」
2012 = "「Đúng rồi đó, vì thế nên. Mấy bé nhỏ rách rưới này đã đi cùng Olivy từ hồi ở Fujiminobu rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、この小型\\x%l客車;#00ffc040;客車%l;#;たちも１００年選手か」
2187 = "「Thật không ngờ, những \\x%l客車;#00ffc040;toa hành khách%l;#; nhỏ bé này cũng đã hoạt động 100 năm rồi sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーだよ！　もうオリヴィ、ぼろチビたちを\n牽いてない時間の方が、ずーっと長くなっちゃったけど」
1996 = "「Đúng vậy đó! Mặc dù bây giờ thời gian Olivy không kéo mấy bé nhỏ rách rưới này đã trở nên dài hơn rất nhiều rồi.」"
# monologue
# JP: 声が、優しい。
2572 = "Giọng nói, thật dịu dàng."
# monologue
# JP: ぼろといい、チビといいつつ、昔馴染みの\\x%l客車;#00ffc040;客車%l;#;たちを、\nオリヴィがどれほど愛しているかが、伝わってくる。
2956 = "Mặc dù gọi là rách rưới, là nhỏ bé, nhưng có thể cảm nhận được, Olivy yêu quý những \\x%l客車;#00ffc040;toa hành khách%l;#; thân quen từ xưa đến nhường nào."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「フジミノブでるとき、もたせてもらえて……\nツルミで、すてられちゃうかと思ったんだけど」
2250 = "「Lúc rời khỏi Fujiminobu, Olivy đã được mang theo... Cứ tưởng là đến Tsurumi, sẽ bị vứt bỏ rồi chứ.」"
# 【ニイロク】
# display as 二六
# JP: 「破棄されずに。すんだの。どうして？」
2211 = "「Không bị phá hủy. Mà vẫn còn. Tại sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタが守ってくれたんだよ！\n『キショーな\\x%l客車;#00ffc040;客車%l;#;だから』って。上の人にいって」
2000 = "「Munakata đã bảo vệ chúng đó! Chú ấy đã nói với cấp trên là 'Vì đây là những \\x%l客車;#00ffc040;toa hành khách%l;#; RẤT HIẾM'.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！？　宗方\\x%l機関士;#00ffc040;機関士%l;#;とオリヴィは、\n[つるみ,1]鶴巳時代から組んでいたのか？」
1807 = "「Hử!? \\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata và Olivy, đã từng làm việc cùng nhau từ hồi ở Tsurumi sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「んーん！　\nムナカタはツルミに技術指導にきてたの！」
1621 = "「Không đâu! Munakata đến Tsurumi để hướng dẫn kỹ thuật đó!」"
# 【ハチロク】
# display as 八六
# JP: 「ああ……道理で言葉がこちらのものではない訳ですね。\nそれこそ[しんつるみ,2]新鶴巳\\x%l機関区;#00ffc040;機関区%l;#;辺りのご所属だったのでしょうか」
1765 = "「A... hèn chi ngôn từ của chú ấy không giống người ở đây. Chắc hẳn chú ấy từng thuộc \\x%l機関区;#00ffc040;kho đầu máy%l;#; Shintsurumi đúng không ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「すごいねハチロク！　だいせーかい！！\nだからねオリヴィ、み鉄でまた会ってびっくりしたの！」
1678 = "「Hachiroku giỏi quá! ĐOÁN ĐÚNG RỒI!! Vì thế nên, lúc gặp lại ở Đường sắt Mikan, Olivy đã rất ngạc nhiên đó!」"
# 【赤井】
# display as 赤井
# JP: 「ああ……帝鉄務めの宿命ですね。去年は[さっぽろ,2]札歩路、\n今年は[ながさき,1]永崎――珍しいことでもありません」
1770 = "「A... đó là định mệnh của những người làm việc cho Teitetsu. Năm ngoái ở Sapporo, năm nay ở Nagazaki——chuyện đó cũng không có gì lạ cả.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でもでも、すごいグウゼンだよね！！\nムナカタとオリヴィみたいの、メズラシイよね！？」
1724 = "「Nhưng mà nhưng mà, thật sự là một sự TRÙNG HỢP ngẫu nhiên đúng không!! Chuyện như Munakata và Olivy, HIẾM LẮM đúng không!?」"
# 【赤井】
# display as 赤井
# JP: 「それは確かに。運命的な再会――\nと、いっても過言ではないほどの、低確率かと」
2199 = "「Điều đó thì đúng thật. Một cuộc hội ngộ định mệnh—— nói như vậy cũng không ngoa, xác suất thấp đến mức đó.」"
# 【オリヴィ】
# display as 奥莉薇＆他
# JP: 「ウンメーテキ！！！」\n「ふぁ」
1744 = "「「ĐỊNH MỆNH!!」 「Oa」」"
# monologue
# JP: ……ハチロクとニイロクも当てられたな、\nと、声から感じる。
1200 = "...Hachiroku và Niiroku cũng bị lây rồi, tôi cảm nhận được điều đó qua giọng nói."
# monologue
# JP: オリヴィの声自体ももう、\nかわいいくらいに上ずっている。
2835 = "Bản thân giọng nói của Olivy, cũng đang the thé lên một cách đáng yêu."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ、そんなことないよ！　そんなことない！！\nけっきょく……けっきょく……また、バラバラだし」
2032 = "「Kh, không có chuyện đó đâu! Không có chuyện đó đâu!! Rốt cuộc... rốt cuộc... lại mỗi người một ngả rồi.」"
# 【赤井】
# display as 赤井
# JP: 「あ――」
# 1757 = "「啊——」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それに……ムナカタ……\\x%l入換;#00ffc040;入換%l;#;でくんでたけど――\nただ、それだけだったし」
2118 = "「Hơn nữa... Munakata... tuy làm việc cùng nhau trong lúc \\x%l入換;#00ffc040;dồn toa%l;#; nhưng—— chỉ là, như vậy thôi.」"
# monologue
# JP: （かくっ）
2993 = "（Khựng）"
# 【ハチロク】
# display as 全員
# JP: 「！」
2266 = "「!」"
# 【双鉄】
# display as 雙鐵
# JP: 「非常ーーーーーーーーーーーっ！」
2113 = "「Khẩn cấppppppppppp!」"
# monologue
# JP: 圧縮空気が一気に抜ける。\n\\x%l動輪;#00ffc040;動輪%l;#;が軋み悲鳴をあげる。
2555 = "Khí nén bị xả ra đột ngột. \\x%l動輪;#00ffc040;Bánh xe chủ động%l;#; rít lên những tiếng chói tai."
# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
1782 = "「A!?」"
# 【ニイロク】
# display as 二六
# JP: 「っ！！！！？」
1739 = "「!!!!?」"
# monologue
# JP: 非常の位置をキープしたまま、\n体でハチロクを受け止める。
2654 = "Vẫn giữ nguyên vị trí phanh khẩn cấp, tôi dùng cơ thể đỡ lấy Hachiroku."
# monologue
# JP: つんのめるような衝動が――
2647 = "Một lực đẩy mạnh nhào về phía trước——"
# monologue
# JP: （がくんっ！）
2992 = "（Khục!）"
# monologue
# JP: ――やがて大きな反動とともに、いきなり終わる。
1172 = "——Rồi sau đó là một lực giật lùi lớn, và đột ngột dừng lại."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、無事か。オリヴィ、ニイロク、赤井宮司は」
1681 = "「Hachiroku, không sao chứ. Olivy, Niiroku, ông Akai thì sao」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、無傷でございます」
1962 = "「Em không bị thương gì ạ.」"
# 【ニイロク】
# display as 二六
# JP: 「はぁっ、はぁっ、はぁっ、はぁっ」
1747 = "「Hộc, hộc, hộc, hộc」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1781 = "「!!?」"
# monologue
# JP: 一際激しい呼気と排気に、\n背筋にゾクリ、寒気が走る。
2901 = "Tiếng hít thở và thở ra dồn dập khác thường, khiến sống lưng tôi chạy dọc một luồng khí lạnh."
# monologue
# JP: いや、そういえばさっきの一瞬、\n苦痛に満ちた、呻きのような何かを聞いた気がした。
2802 = "Không, nhắc mới nhớ khoảnh khắc lúc nãy, tôi dường như đã nghe thấy một âm thanh như tiếng rên rỉ đầy đau đớn."
# 【双鉄】
# display as 雙鐵
# JP: 「ニイロク――どこか痛めたか！？」
1641 = "「Niiroku——có bị thương ở đâu không!?」"
# 【ニイロク】
# display as 二六
# JP: 「あ。違う。\nそこは平気。――清春が守ってくれた」
1784 = "「A. Không. Chỗ đó không sao. ——Kiyoharu đã bảo vệ tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？　しかし、今」
1805 = "「Hử!? Nhưng mà, vừa rồi」"
# 【赤井】
# display as 赤井
# JP: 「私も無事です。それよりも……オリヴィさんは」
1951 = "「Tôi cũng không sao. Quan trọng hơn là... cô Olivy」"
# monologue
# JP: 言われて、気づく。\n姿がどこにも――どこにも――っ！！？
2858 = "Nghe vậy, tôi mới nhận ra. Bóng dáng em ấy không thấy đâu——không thấy đâu——!!?"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？　オリヴィっ！？　オリヴィ！！！」
2202 = "「!!? Olivy!? Olivy!!!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツー！　ハチロクー！！\nこっち！　おりてきてー！！」
2249 = "「Soutetsu! Hachiroku!! Bên này! Xuống đây đi~!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1781 = "「啊！！？」" 
# monologue
# JP: 望んだ声が、車外から――
2904 = "Giọng nói mong chờ, vang lên từ bên ngoài xe——"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1774 = "「啊！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「なんと！　もう降りていたのか」
2104 = "「Thật không ngờ! Em ấy đã xuống xe từ lúc nào vậy.」"
# monologue
# JP: 安堵とともに、全身からドっと力が抜ける。\nしかし、ともかく停車措置だ。
2687 = "Cùng với sự nhẹ nhõm, toàn bộ sức lực trong người tôi như tuôn trào ra ngoài. Nhưng mà, dù sao thì cũng phải thực hiện các biện pháp dừng tàu đã."
# monologue
# JP: \\x%l自弁;#00ffc040;自弁%l;#;を運転位置へと戻し、\\x%l単弁;#00ffc040;単弁%l;#;を緩\\x%lブレーキ;#00ffc040;ブレーキ%l;#;に。\n\\x%l逆転機;#00ffc040;逆転機%l;#;を\\x%lミッドギア;#00ffc040;ミッドギア%l;#;へと戻して\\x%l指差喚呼;#00ffc040;指差喚呼%l;#;して――
2684 = "Đưa \\x%l自弁;#00ffc040;van hãm tự động%l;#; về vị trí lái, chuyển \\x%l単弁;#00ffc040;van hãm đơn%l;#; sang chế độ nhả \\x%lブレーキ;#00ffc040;phanh%l;#;. Đưa \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; về \\x%lミッドギア;#00ffc040;số trung tính%l;#; rồi \\x%l指差喚呼;#00ffc040;chỉ tay hô xác nhận%l;#;——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「すっごいねー！　ソーテツ、よく気づいたねー！\nハヤト直前でも、全然ゆるんでなかったねー」
2243 = "「Giỏi quá nha! Soutetsu, tinh mắt thật đó! Ngay trước khi đến Hayato, anh cũng không hề lơ là chút nào nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。平地にもどり、正直どこかゆるんではいた。\n逆に、それゆえ気づけたのかもしれんという気はする」
1619 = "「Không. Khi trở lại đồng bằng, thành thật mà nói tôi cũng có chút lơ là. Ngược lại, chính vì thế mà tôi mới nhận ra được cũng nên.」"
# monologue
# JP: 線路の不陸。
2816 = "Đường ray không bằng phẳng."
# monologue
# JP: はっきりとした――\nためらわずに非常\\x%lブレーキ;#00ffc040;ブレーキ%l;#;をかけられたほどの。
2824 = "Rất rõ ràng—— Đủ để tôi không ngần ngại đạp phanh khẩn cấp \\x%lブレーキ;#00ffc040;phanh%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「はっきり気づいた、ハズ……なのだが――」
1961 = "「Đáng lẽ... tôi phải nhận ra rõ ràng chứ——」"
# monologue
# JP: しかし、不陸が見当たらない。\n線路はどこまでも平坦で……
2766 = "Nhưng, không thấy chỗ nào gồ ghề cả. Đường ray vẫn bằng phẳng tít tắp..."
# 【双鉄】
# display as 雙鐵
# JP: 「あるいは、異物を踏んだのか？」
2204 = "「Hay là, cán phải dị vật gì sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「んーん、ちがうよ？\nけど、そんな見方じゃわかんないかなー」
1622 = "「Không đâu, sai rồi! Nhưng mà, nhìn như vậy thì không nhận ra được đâu~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1771 = "「啊」" 
# monologue
# JP: 教わっている。
2682 = "Tôi đã được dạy."
# monologue
# JP: \\x%l保線;#00ffc040;保線%l;#;とは、\nレールとキスして、そこから仕事が始まるものだと。
2695 = "Rằng \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, là phải hôn lên đường ray, và công việc bắt đầu từ đó."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま。わたくしもお供いたします」
2246 = "「Ngài Soutetsu. Em cũng sẽ đi cùng ngài.」"
# monologue
# JP: 何が見えるというのだろうか。
2425 = "Sẽ nhìn thấy được điều gì cơ chứ."
# monologue
# JP: とにもかくにも地面に這って、\n頬をぴったりレールへと――
2454 = "Dù sao thì cũng phải bò ra đất, áp má sát vào đường ray——"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ……これは――」
2192 = "「Cái gì... thế này——」"
# 【ハチロク】
# display as 八六
# JP: 「地面が、浅く――これほど、広く――」
1837 = "「Mặt đất, nông thế này——mà lại rộng, đến thế này——」"
# monologue
# JP: 隆起……といえばいいのだろうか。\n地面が、わずかに盛り上がっている。
2945 = "Nói là phồng rộp lên... thì có đúng không nhỉ. Mặt đất, đang hơi nhô lên một chút."
# monologue
# JP: 浅くはあるが、ドーム型……\nお皿を逆さに伏せているような形になってしまっている。
2958 = "Tuy nông nhưng lại có hình vòm... Nó có hình dạng giống như một cái đĩa bị úp ngược."
# 【双鉄】
# display as 雙鐵
# JP: 「これは……かなりの広範囲だな」
2200 = "「Cái này... phạm vi khá rộng đấy.」"
# monologue
# JP: 線路を巻き込んでいる範囲だけでも、\n50メートルほどの長さがあろう。
2468 = "Chỉ tính riêng phần bao quanh đường ray, cũng phải dài cỡ 50 mét."
# monologue
# JP: しかし、線路にかかる部分は隆起全体のほんの一部。\n隆起の円の何分の一かを、切り取っている形にすぎない。
2764 = "Nhưng phần dính dáng đến đường ray chỉ là một phần nhỏ của toàn bộ khu vực bị phồng rộp. Nó chỉ cắt ngang một phần mấy của vòng tròn phồng rộp mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、これは？」
1684 = "「Hachiroku, cái này là?」"
# 【ハチロク】
# display as 八六
# JP: 「……わたくしも、まったく初めて目にいたします。\n線路が持ちあがるという経験は、わたくしには――」
1278 = "「...Đây cũng là lần đầu tiên em nhìn thấy hiện tượng này. Kinh nghiệm về việc đường ray bị nâng lên, em chưa từng——」"
# 【赤井】
# display as 赤井
# JP: 「寒さが厳しい地方では、新しい\\x%l枕木;#00ffc040;枕木%l;#;の中の水分が凍結し、\nそれが線路を持ち上げるということもあると、伝聞では」
1834 = "「Ở những vùng lạnh giá, nước bên trong \\x%l枕木;#00ffc040;tà vẹt%l;#; mới bị đóng băng, và điều đó có thể làm đường ray bị nâng lên, tôi từng nghe đồn như vậy.」"
# 【ニイロク】
# display as 二六
# JP: 「けど。いま。凍るわけない」
1651 = "「Nhưng mà. Bây giờ. Làm sao đóng băng được.」"
# 【赤井】
# display as 赤井
# JP: 「ですね、ニイロク。それに、これほど広範囲に\n一度に発生するようなものとも思えません」
2038 = "「Đúng vậy, Niiroku. Hơn nữa, tôi không nghĩ hiện tượng này lại có thể xảy ra trên một phạm vi rộng như vậy cùng một lúc.」"
# monologue
# JP: ……つまり、ハチロクにも赤井宮司にもニイロクにも、\n原因がわからぬということか。
1203 = "...Nói cách khác, cả Hachiroku, ông Akai và Niiroku, đều không biết nguyên nhân là gì sao."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ、これはいったい――」
1867 = "「Olivy, cái này rốt cuộc là——」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかんない。\nオリヴィも、こんなのみるの、はじめてだから」
1627 = "「Không biết. Đây cũng là lần đầu tiên Olivy nhìn thấy thứ như thế này.」"
# monologue
# JP: 頼みの綱をあっさり切って、オリヴィはフルフル首を振る。\nそうしてじっと――真面目な瞳で、僕を見上げる。
2565 = "Chặt đứt tia hy vọng mong manh một cách phũ phàng, Olivy lắc đầu quầy quậy. Rồi em ấy nhìn chằm chằm——nhìn lên tôi bằng đôi mắt nghiêm túc."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「もしできたら、\nムナカタに見てもらった方がいいと思う」
1875 = "「Nếu được, anh nên nhờ Munakata xem thử thì tốt hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すぐに交渉するよう、ポーレットに進言しよう」
2154 = "「A, tôi sẽ đề nghị Paulette nhanh chóng thương lượng việc này.」"
# monologue
# JP: オリヴィの高度な\\x%l保線;#00ffc040;保線%l;#;技術が、宗方\\x%l機関士;#00ffc040;機関士%l;#;由来のものなら、\n是非もない。
2589 = "Kỹ thuật \\x%l保線;#00ffc040;bảo trì đường ray%l;#; bậc cao của Olivy, nếu là bắt nguồn từ \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, thì không còn gì để bàn cãi."
# monologue
# JP: 今の僕らに、それ以上に頼れそうなツテは存在しない。
2606 = "Đối với chúng tôi hiện tại, không còn chỗ nào đáng tin cậy hơn thế nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「……宗方\\x%l機関士;#00ffc040;機関士%l;#;に、\n高度な\\x%l保線;#00ffc040;保線%l;#;技術と知識を有する方に見てもらわねば――」
1273 = "「...Phải nhờ \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, một người có kỹ thuật và kiến thức \\x%l保線;#00ffc040;bảo trì đường ray%l;#; bậc cao xem xét giúp——」"
# monologue
# JP: そうしなければ、御一夜鉄道が存続の危機に陥る――\nこれは恐らく、そういう事態と思うから。
2446 = "Nếu không làm vậy, Đường sắt Ohito sẽ rơi vào nguy cơ sống còn—— Bởi vì tôi nghĩ, có lẽ đây chính là một tình huống như vậy."
