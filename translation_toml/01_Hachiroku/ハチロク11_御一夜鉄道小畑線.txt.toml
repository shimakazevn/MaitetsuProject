2000 = "「Munakata đã bảo vệ chúng đó! \nChú ấy đã nói với cấp trên là 'Vì đây là\nnhững \\x%l客車;#00ffc040;toa hành khách%l;#; RẤT HIẾM'.」"

# 【双鉄】
# display as 雙鐵
