1770 = "「A... đó là định mệnh của những người làm\nviệc cho Teitetsu. Năm ngoái ở Sapporo,\nnăm nay ở Nagazaki——chuyện đó cũng không\ncó gì lạ cả.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「でもでも、すごいグウゼンだよね！！\nムナカタとオリヴィみたいの、メズラシイよね！？」
1724 = "「Nhưng mà nhưng mà, thật sự là một sự\nTRÙNG HỢP ngẫu nhiên đúng không!!\nChuyện như Munakata và Olivy, HIẾM LẮM\nđúng không!?」"

# 【赤井】
# display as 赤井
