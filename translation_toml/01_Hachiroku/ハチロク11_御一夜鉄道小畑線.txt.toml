2791 = "Chạy lên cầu thang xoắn ốc, ngắm nhìn\nkhung cảnh bầu trời.\nNếu là \\x%l客車;#00ffc040;toa hành khách%l;#; dẫn đến đó, thì có\nvẻ như đó là cỗ xe của thiên mã."

# 【オリヴィ】
# display as 奥莉薇
