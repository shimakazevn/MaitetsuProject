2821 = "翻越後一瞬間所展現出的景色，確實如同身處天空中一般。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1753 = "「哦喲」" 

# monologue
# JP: が、その光景は、一瞬にして流れ去る。
2769 = "然而，那幅光景，卻是稍縱即逝。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l逆転機;#00ffc040;逆転機%l;#;！　\x%lミッドギア;#00ffc040;ミッドギア%l;#;！！\n\x%l加減弁;#00ffc040;加減弁%l;#;、とじーーーーーーーる」
1233 = "「\\x%l逆転機;#00ffc040;回動機%l;#;！\\x%lミッドギア;#00ffc040;中位檔%l;#;！！\\x%l加減弁;#00ffc040;汽門%l;#;，關——閉」" 

# 【赤井】
# display as 赤井
