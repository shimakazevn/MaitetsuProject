2035 = "「Không có đâu! Là thật đó! Thật sự luôn! \n\\x%l客車;#00ffc040;Toa hành khách%l;#; cũng, CỰC KỲ dễ thương\nluôn!」"

# 【ニイロク】
# display as 二六
