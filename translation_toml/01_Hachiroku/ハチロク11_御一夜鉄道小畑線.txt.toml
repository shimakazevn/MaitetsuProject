2199 = "「Điều đó thì đúng thật. Một cuộc hội ngộ\nđịnh mệnh——\nnói như vậy cũng không ngoa, xác suất thấp\nđến mức đó.」"

# 【オリヴィ】
# display as 奥莉薇＆他
