# 【赤井】
# display as 赤井
# JP: 「ああ……帝鉄務めの宿命ですね。去年は[さっぽろ,2]札歩路、\n今年は[ながさき,1]永崎――珍しいことでもありません」
1770 = "「啊……這就是帝國鐵路職員的宿命啊。去年在札幌，今年到長崎——受到這樣調動的可是大有人在」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「でもでも、すごいグウゼンだよね！！\nムナカタとオリヴィみたいの、メズラシイよね！？」
1724 = "「可是可是，這也太碰巧了吧！！像宗方和奧莉薇這樣的，很少見的吧！？」" 

# 【赤井】
# display as 赤井
# JP: 「それは確かに。運命的な再会――\nと、いっても過言ではないほどの、低確率かと」
2199 = "「這的確。如此低的機率，簡直可以稱之為“命中注定的重逢”也不為過」" 

# 【オリヴィ】
# display as 奥莉薇＆他
# JP: 「ウンメーテキ！！！」\n「ふぁ」
1744 = "「命中注定的！！！」" 

# monologue
# JP: ……ハチロクとニイロクも当てられたな、\nと、声から感じる。
1200 = "……從八六和二六的聲音裡，可見她們也被奧莉薇情感的共鳴給嚇到了。" 

# monologue
# JP: オリヴィの声自体ももう、\nかわいいくらいに上ずっている。
2835 = "而奧莉薇自己的聲音，也顯得失措而可愛。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ、そんなことないよ！　そんなことない！！\nけっきょく……けっきょく……また、バラバラだし」
2032 = "「沒、沒有的事啦！沒有的事！！最後……最後……還不是又分開了」" 

# 【赤井】
# display as 赤井
# JP: 「あ――」
# 1757 = "「啊——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それに……ムナカタ……\x%l入換;#00ffc040;入換%l;#;でくんでたけど――\nただ、それだけだったし」
2118 = "「而且……雖然和宗方搭檔\\x%l入換;#00ffc040;調車%l;#;過——但也僅此而已」" 

# monologue
# JP: （かくっ）
2993 = "（衝擊）" 

# 【ハチロク】
# display as 全員
# JP: 「！」
2266 = "「！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「非常ーーーーーーーーーーーっ！」
2113 = "「緊急——————————！」" 

# monologue
# JP: 圧縮空気が一気に抜ける。\n\x%l動輪;#00ffc040;動輪%l;#;が軋み悲鳴をあげる。
2555 = "壓縮空氣瞬間排空，\\x%l動輪;#00ffc040;動輪%l;#;和鐵軌摩擦發出陣陣悲鳴。" 

# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
1782 = "「啊！？」" 

# 【ニイロク】
# display as 二六
# JP: 「っ！！！！？」
1739 = "「呀！！！！？」" 

# monologue
# JP: 非常の位置をキープしたまま、\n体でハチロクを受け止める。
2654 = "我一邊把剎車維持在緊急位置，一邊用身體擋住了八六。" 

# monologue
# JP: つんのめるような衝動が――
2647 = "慣性讓人站立不穩向前倒去——" 

# monologue
# JP: （がくんっ！）
2992 = "（衝擊！）" 

# monologue
# JP: ――やがて大きな反動とともに、いきなり終わる。
1172 = "——列車終於隨著一陣巨大的反作用力戛然而止。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、無事か。オリヴィ、ニイロク、赤井宮司は」
1681 = "「八六，你沒事吧。奧莉薇，二六還有赤井宮司，你們呢」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、無傷でございます」
1962 = "「我沒有受傷」" 

# 【ニイロク】
# display as 二六
# JP: 「はぁっ、はぁっ、はぁっ、はぁっ」
1747 = "「哈，哈，哈，哈」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1781 = "「啊！！？」" 

# monologue
# JP: 一際激しい呼気と排気に、\n背筋にゾクリ、寒気が走る。
2901 = "這分外激烈的吸氣與排氣，聽在耳中讓我不禁後背一涼。" 

# monologue
# JP: いや、そういえばさっきの一瞬、\n苦痛に満ちた、呻きのような何かを聞いた気がした。
2802 = "等一下，說來剛才確實有那麼一瞬間，我好像聽到了頗為痛苦、像呻吟一樣的聲音。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ニイロク――どこか痛めたか！？」
1641 = "「二六——你有哪裡痛嗎！？」" 

# 【ニイロク】
# display as 二六
# JP: 「あ。違う。\nそこは平気。――清春が守ってくれた」
1784 = "「啊，不是的。身體沒有問題——清春保護了我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？　しかし、今」
1805 = "「嗯！？可是剛才你——」" 

# 【赤井】
# display as 赤井
# JP: 「私も無事です。それよりも……オリヴィさんは」
1951 = "「我也沒事。倒是奧莉薇……」" 

# monologue
# JP: 言われて、気づく。\n姿がどこにも――どこにも――っ！！？
2858 = "被他一說我才發現，竟然——竟然找不到她！！？" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？　オリヴィっ！？　オリヴィ！！！」
2202 = "「這！！？奧莉薇！？奧莉薇！！！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツー！　ハチロクー！！\nこっち！　おりてきてー！！」
2249 = "「雙鐵！八六！！這邊！下來這邊！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1781 = "「啊！！？」" 

# monologue
# JP: 望んだ声が、車外から――
2904 = "這讓我望穿秋水的聲音卻是來自車外——" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1774 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと！　もう降りていたのか」
2104 = "「竟然已經先下車了啊！」" 

# monologue
# JP: 安堵とともに、全身からドっと力が抜ける。\nしかし、ともかく停車措置だ。
2687 = "我放下心來，渾身上下彷彿一下子沒了力氣。但還是得先把停車操作都做好。" 

# monologue
# JP: \x%l自弁;#00ffc040;自弁%l;#;を運転位置へと戻し、\x%l単弁;#00ffc040;単弁%l;#;を緩\x%lブレーキ;#00ffc040;ブレーキ%l;#;に。\n\x%l逆転機;#00ffc040;逆転機%l;#;を\x%lミッドギア;#00ffc040;ミッドギア%l;#;へと戻して\x%l指差喚呼;#00ffc040;指差喚呼%l;#;して――
2684 = "我把\\x%l自弁;#00ffc040;自剎%l;#;放回行駛位置，\\x%l単弁;#00ffc040;單剎%l;#;掛輕度\\x%lブレーキ;#00ffc040;剎車%l;#;，\\x%l逆転機;#00ffc040;回動機%l;#;切\\x%lミッドギア;#00ffc040;中位檔%l;#;，再做一遍\\x%l指差喚呼;#00ffc040;手勢復誦確認%l;#;——" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「すっごいねー！　ソーテツ、よく気づいたねー！\nハヤト直前でも、全然ゆるんでなかったねー」
2243 = "「雙鐵好厲害！真虧你注意得到唉！就算眼看著要到隼人了，也完全沒有放鬆呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや。平地にもどり、正直どこかゆるんではいた。\n逆に、それゆえ気づけたのかもしれんという気はする」
1619 = "「不是的。實話說，回到平地上其實是有點放鬆了。但或許正是因為這樣才反而注意到了」" 

# monologue
# JP: 線路の不陸。
2816 = "線路空吊。" 

# monologue
# JP: はっきりとした――\nためらわずに非常\x%lブレーキ;#00ffc040;ブレーキ%l;#;をかけられたほどの。
2824 = "而且很明顯——明顯到讓我毫不猶豫地拉了緊急\\x%lブレーキ;#00ffc040;剎車%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「はっきり気づいた、ハズ……なのだが――」
1961 = "「我應該是很清楚地感覺到了啊……可是——」" 

# monologue
# JP: しかし、不陸が見当たらない。\n線路はどこまでも平坦で……
2766 = "然而，並沒有找到空吊的地方。線路也非常平坦……" 

# 【双鉄】
# display as 雙鐵
# JP: 「あるいは、異物を踏んだのか？」
2204 = "「還是說壓到了異物嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「んーん、ちがうよ？\nけど、そんな見方じゃわかんないかなー」
1622 = "「不是，沒有哦？不過你那樣看肯定看不出來的吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1771 = "「啊」" 

# monologue
# JP: 教わっている。
2682 = "我想起了奧莉薇的教誨。" 

# monologue
# JP: \x%l保線;#00ffc040;保線%l;#;とは、\nレールとキスして、そこから仕事が始まるものだと。
2695 = "所謂\\x%l保線;#00ffc040;巡線%l;#;，是從習慣親吻鐵軌開始的工作。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま。わたくしもお供いたします」
2246 = "「雙鐵少爺，我也一同看一看」" 

# monologue
# JP: 何が見えるというのだろうか。
2425 = "不知會看到什麼情況呢。" 

# monologue
# JP: とにもかくにも地面に這って、\n頬をぴったりレールへと――
2454 = "但不管怎樣先趴到地上，臉頰貼到鐵軌上——" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ……これは――」
2192 = "「這是……什麼情況——」" 

# 【ハチロク】
# display as 八六
# JP: 「地面が、浅く――これほど、広く――」
1837 = "「地面，微微地——但是範圍，卻又很大——」" 

# monologue
# JP: 隆起……といえばいいのだろうか。\n地面が、わずかに盛り上がっている。
2945 = "隆起……或許這樣描述更合適吧。有一部分地面比周遭略微凸起了一些。" 

# monologue
# JP: 浅くはあるが、ドーム型……\nお皿を逆さに伏せているような形になってしまっている。
2958 = "雖然高度不高，但這一部分地面還是形成了像水壩一樣……或者說像倒扣的盤子一樣的形狀。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは……かなりの広範囲だな」
2200 = "「這範圍……著實不小啊」" 

# monologue
# JP: 線路を巻き込んでいる範囲だけでも、\n50メートルほどの長さがあろう。
2468 = "僅以線路範圍內而言，也有差不多五十公尺長了。" 

# monologue
# JP: しかし、線路にかかる部分は隆起全体のほんの一部。\n隆起の円の何分の一かを、切り取っている形にすぎない。
2764 = "然而線路範圍內的只是整個隆起範圍的一小部分。不過是從整個圓形的隆起區域的一邊淺淺切過而已。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、これは？」
1684 = "「八六，這是？」" 

# 【ハチロク】
# display as 八六
# JP: 「……わたくしも、まったく初めて目にいたします。\n線路が持ちあがるという経験は、わたくしには――」
1278 = "「……我也是第一次目睹如此情況。線路被整個抬起來的情況，我也從未——」" 

# 【赤井】
# display as 赤井
# JP: 「寒さが厳しい地方では、新しい\x%l枕木;#00ffc040;枕木%l;#;の中の水分が凍結し、\nそれが線路を持ち上げるということもあると、伝聞では」
1834 = "「在非常冷的地方，聽說會出現新\\x%l枕木;#00ffc040;枕木%l;#;中的水分被凍結，進而膨脹把線路抬高的情況」" 

# 【ニイロク】
# display as 二六
# JP: 「けど。いま。凍るわけない」
1651 = "「但是，現在，並沒有結冰」" 

# 【赤井】
# display as 赤井
# JP: 「ですね、ニイロク。それに、これほど広範囲に\n一度に発生するようなものとも思えません」
2038 = "「沒錯，二六。而且這麼大的面積，實在很難想像是突然一次性地發生的」" 

# monologue
# JP: ……つまり、ハチロクにも赤井宮司にもニイロクにも、\n原因がわからぬということか。
1203 = "……那也就是說，八六也好赤井宮司也好二六也好，都對這情況的原因毫無頭緒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ、これはいったい――」
1867 = "「奧莉薇，這究竟是——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかんない。\nオリヴィも、こんなのみるの、はじめてだから」
1627 = "「不知道。奧莉薇也是第一次見到這樣的情況」" 

# monologue
# JP: 頼みの綱をあっさり切って、オリヴィはフルフル首を振る。\nそうしてじっと――真面目な瞳で、僕を見上げる。
2565 = "奧莉薇的頭搖得像手搖鼓一樣，這根救命稻草就這樣斷了。而後，她又滿臉認真地抬頭直直盯著我說道。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「もしできたら、\nムナカタに見てもらった方がいいと思う」
1875 = "「如果可能的話，還是請宗方來看看比較好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すぐに交渉するよう、ポーレットに進言しよう」
2154 = "「說的是，我這就聯繫波萊特，請她去協調一下」" 

# monologue
# JP: オリヴィの高度な\x%l保線;#00ffc040;保線%l;#;技術が、宗方\x%l機関士;#00ffc040;機関士%l;#;由来のものなら、\n是非もない。
2589 = "如果說奧莉薇那高超的\\x%l保線;#00ffc040;巡線%l;#;技術都是師承宗方\\x%l機関士;#00ffc040;司機%l;#;，而她又對這情況毫無頭緒的話，那我們也別無選擇。" 

# monologue
# JP: 今の僕らに、それ以上に頼れそうなツテは存在しない。
2606 = "對我們而言，目前已經沒有比他更能寄予期望的人了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……宗方\x%l機関士;#00ffc040;機関士%l;#;に、\n高度な\x%l保線;#00ffc040;保線%l;#;技術と知識を有する方に見てもらわねば――」
1273 = "「……必須得讓宗方\\x%l機関士;#00ffc040;司機%l;#;——或者像他這樣擁有豐富\\x%l保線;#00ffc040;巡線%l;#;技術和知識的人來看看——」" 

# monologue
# JP: そうしなければ、御一夜鉄道が存続の危機に陥る――\nこれは恐らく、そういう事態と思うから。
2446 = "以如今的事態看來，我恐怕——御一夜鐵路或會陷入一場生死存亡的危機。" 
