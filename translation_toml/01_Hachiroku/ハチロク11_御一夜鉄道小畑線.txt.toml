2078 = "「真不愧是日本三大車窗絕景之一啊……」" 

# monologue
# JP: キャブの窓から見下ろせる。\n登ってきた線路が、くぐってきたトンネルが。
2626 = "從駕駛室向下放眼望去，我們駛過的線路，穿過的隧道——" 

