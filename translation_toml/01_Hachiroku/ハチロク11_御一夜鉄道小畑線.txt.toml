2956 = "Mặc dù gọi là rách rưới, là nhỏ bé, nhưng\ncó thể cảm nhận được,\nOlivy yêu quý những \\x%l客車;#00ffc040;toa hành khách%l;#; thân\nquen từ xưa đến nhường nào."

# 【オリヴィ】
