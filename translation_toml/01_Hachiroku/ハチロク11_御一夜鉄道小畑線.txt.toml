# 【双鉄】
# display as 雙鐵
# JP: 「\x%l自弁;#00ffc040;自弁%l;#;、\x%l常用;#00ffc040;常用%l;#;！」
1227 = "「\\x%l自弁;#00ffc040;自剎%l;#;，\\x%l常用;#00ffc040;常用%l;#;！」" 

# monologue
