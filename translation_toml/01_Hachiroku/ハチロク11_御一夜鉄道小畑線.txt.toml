2547 = "Chỉ trong một ngày hôm nay, khoảng cách\ngiữa Olivy và Niiroku,\ndường như đã được rút ngắn đi rất nhiều."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヤツシロカイ！　夕方の、みかん鉄道の車窓からみる\nヤツシロカイは、セカイでイチバンの車窓なのっ！」
1674 = "「Biển Yatsushiro! Nhìn từ cửa sổ của Đường\nsắt Mikan vào buổi chiều tà,\nBiển Yatsushiro là khung cảnh qua cửa sổ\nĐẸP NHẤT thế giới luôn đó!」"

# 【ハチロク】
# display as 八六＆二六
# JP: 「あ」\n「ふあ」
1772 = "「A」\n「Oa」"

# monologue
# JP: ハチロクが、ニイロクが、ふたり同時に、\n幸せそうな声をだす。
2482 = "Hachiroku, Niiroku, cả hai người cùng lúc,\nthốt lên những âm thanh tràn ngập hạnh\nphúc."

# monologue
# JP: オリヴィから溢れだしたのだろう\x%l共感;#00ffc040;共感%l;#;が、\nどれほど暖かなものなのか、だから、僕にも想像できる。
2783 = "Chắc hẳn là do \\x%l共感;#00ffc040;cộng cảm%l;#; tuôn trào từ\nOlivy,\nnó ấm áp đến nhường nào, vì vậy, tôi cũng\ncó thể tưởng tượng được."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチロクとソーテツも、ニイロクとアカイグージも、\nぜったい、イッショにいったらいいよ！！」
1676 = "「Hachiroku và Soutetsu, Niiroku và ông\nAkai nữa,\nnhất định, mọi người CÙNG NHAU đi xem thử\nđi!!」"

# 【ハチロク】
# display as 八六
# JP: 「はい、必ずそうさせていただきますね」
1812 = "「Vâng, nhất định chúng tôi sẽ làm như vậy\nạ.」"

# 【ニイロク】
# display as 二六
# JP: 「うん！！！」
1803 = "「Ừm!!!」"

# monologue
# JP: 幸せに満ち満ちている一声が、\nけれどもすぐに、どこか慌てたトーンに変わる。
2528 = "Một tiếng thốt lên tràn đầy hạnh phúc, \nnhưng ngay lập tức, chuyển sang một tông\ngiọng có phần bối rối."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、けどけどオコバ線！　ラセン鉄道テンクー路線も、\nすっごく素敵だと思う！　きっと、お客さんたくさん」
1786 = "「A, nhưng mà nhưng mà tuyến Okoba! Tuyến\nđường trên BẦU TRỜI của tuyến đường sắt\nxoắn ốc,\ncũng RẤT LÀ tuyệt vời luôn đó! Chắc chắn,\nsẽ có rất nhiều hành khách.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1797 = "「嗯」" 

