2364 = "即使像二六這樣性能優秀的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，也無法做到接收全部數據後就能馬上熟練執行乘務任務。" 

# monologue
# JP: まったくブランクな\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であるというこだまが、\n一線級になるまでは、それなりに時間がかかろうし――
2683 = "而近似於一張白紙的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;小玉，還要花很長時間才能成長到一線級別。" 

# 【双鉄】
# display as 雙鐵
