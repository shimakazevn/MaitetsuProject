2413 = "她並不像小玉那樣與奧莉薇相似。但即便如此——我也不可能會看錯。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「無論、手元で育てたくはありました。なにせ貴重な、\n一枚の\x%lタブレット;#00ffc040;タブレット%l;#;からの、ふたつのロオドコアの精製例」
1995 = "「當然，我很想親自撫養她。不管怎麼說，從一塊\\x%lタブレット;#00ffc040;操作板%l;#;中提取製造出兩個人偶核，這實在太罕見了」" 

# monologue
# JP: 不死鳥博士が、なにかいっている。\n聞こえているが、意味を取れない。
2779 = "雖然我聽清楚了不死鳥博士說了什麼，卻無法理解她的意思。" 

# monologue
# JP: ただひとつしか、ただひとつしか、ただひとつしか。\nこころに、言葉が浮かんでこない。
2377 = "只有一個，只有一個，只有一個。我大腦一片空白，不知道該說些什麼。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「『おうちかえる』と、いやもう、それしか口にしない。\nさすがにそれでは、育成も何もありませんですからな」
1618 = "「但是她開口就只有一句話，“我要回家”。這樣一來，我就沒辦法撫養她了」" 

# 【のぞみ】
# display as ？？？
# JP: 「おうち、ここ」
1830 = "「家，在這裡」" 

# monologue
# JP: 不死鳥博士の長広舌に焦れたのか\n焦れったそうに前に出て――っ！！
2380 = "可能不死鳥博士喋喋不休，她著急了吧，徑自急切地邁上前來——！！" 

