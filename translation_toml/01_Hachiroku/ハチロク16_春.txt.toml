# 【宗方】
# display as 宗方
# JP: 「恐縮です」
1581 = "「不勝榮幸」" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;の方も、その絡みで？」
1871 = "「您的\\x%l機関士;#00ffc040;司機%l;#;工作，也是因為這件事而告一段落的嗎？」" 

# monologue
# JP: 宗方さんは、ゆっくり頷く。
2466 = "宗方先生慢慢點頭。" 

# monologue
# JP: 確かに、出向で保線専門会社に勤めてくれるのであれば、\n本線の\x%l機関士;#00ffc040;機関士%l;#;もやるのは厳しかろう。
