2088 = "「雖然我看了地圖，掌握了距離，但這孩子真是的，一下就跑出來了」" 

# 【ハチロク】
# display as 八六
# JP: 「あ……あっ――」
1732 = "「啊……啊——」" 

# 【日々姫】
# display as 日日姬
