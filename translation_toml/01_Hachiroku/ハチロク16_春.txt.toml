1812 = "「宗方\\x%l機関士;#00ffc040;司機%l;#;——不，宗方先生。您現在已經引退了吧」" 

# monologue
# JP: 今度はしっかり、社長の顔だ。
2734 = "這次波萊特的表情非常認真，是身為社長的表情。" 

# monologue
# JP: ポーレットのタイミングの良い切り替えに、\n宗方さんの声もいくらか、やわらかになる。
