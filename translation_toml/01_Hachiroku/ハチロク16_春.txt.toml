2056 = "「那……是——」" 

# monologue
# JP: ロオドコア。\x%lタブレット;#00ffc040;タブレット%l;#;を\x%lタブレット;#00ffc040;タブレット%l;#;たらしめ\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を\x%lレイルロオド;#00ffc040;レイルロオド%l;#;たらしめている……
2307 = "人偶核。有了它，\\x%lタブレット;#00ffc040;操作板%l;#;才成其為\\x%lタブレット;#00ffc040;操作板%l;#;，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;才成其為\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;……" 

# monologue
# JP: いうなれば、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の“魂”というべき何物か。\nそれが、オリヴィの\x%lタブレット;#00ffc040;タブレット%l;#;から精製されて――
2298 = "也就是說，它可以稱作\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的“靈魂”。而用奧莉薇的\\x%lタブレット;#00ffc040;操作板%l;#;製造而成的話——" 

# 【こだま】
# display as 小玉
# JP: 「マスターマスター？\nロオドコアって、何？」
1235 = "「[主人,1]司機，[主人,1]司機？人偶核是什麼？」" 

# 【宗方】
# display as 宗方
# JP: 「……さぁな。俺は知らんし――\n多分、だがな。知らんでいる方がいい代物だろう」
1301 = "「……誰知道呢。我不清楚——不過，可能，你還是不要知道這件事比較好吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ！？」
1761 = "「嗚！？」" 

# monologue
# JP: ポーレットが真っ赤になって口を押さえて、青くなる。\n……社長としての責任感では、なかったようだ。
2619 = "波萊特捂住嘴，臉色一會紅一會白。……看來，剛剛她提問並不是因為身為社長的責任感。" 

# 【こだま】
# display as 小玉
# JP: 「そっか！　じゃ、こだまもしらんでいるっ！！」
1958 = "「是嗎！那小玉就不問了！！」" 

# 【宗方】
# display as 宗方
# JP: 「というか、いい加減に覚えてくれ。\n俺は、こだまのマスターじゃない」
2025 = "「話說，你也該記住了吧。我可不是你的主人」" 

# 【こだま】
# display as 小玉
# JP: 「わかった！　マスターはこだまのマスターじゃなーい」
1938 = "「明白了！[主人,1]司機不是小玉的[主人,1]司機」" 

# monologue
# JP: 元気な声に、れいながころころ笑い出す。
2694 = "聽到那充滿精神的聲音，玲奈笑出了聲。" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、こだまちゃん、おかしいですねぇ」
1696 = "「呵呵呵，小玉，好好笑」" 

# 【こだま】
# display as 小玉
# JP: 「え？　え？\nマスター、こだま、どっかおかしかった？」
1714 = "「哎？哎？[主人,1]司機，小玉有哪裡好笑嗎？」" 

# 【宗方】
# display as 宗方
# JP: 「……やれやれだ」
1286 = "「……哎呀呀」" 

# monologue
# JP: 宗方さんが、ガラにも無いことにおどけてみせる。\n話を、変えようとしてくれている。
2464 = "宗方先生在裝傻，這一點也不像他。他是在幫我轉移話題吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「はははっ」
1708 = "「哈哈哈」" 

# monologue
# JP: だから、笑う。\n僕だけではなく、みんなで笑う。
2548 = "所以，我笑了。不光是我，大家都笑了。" 

# monologue
