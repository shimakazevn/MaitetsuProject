2652 = "真是的，誰讓你跑這麼快。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、どうした？　怪我はないか――っ！！！」
1932 = "「日日姬，你怎麼了？沒受傷吧——！！！」" 

# 【ハチロク】
# display as 八六
