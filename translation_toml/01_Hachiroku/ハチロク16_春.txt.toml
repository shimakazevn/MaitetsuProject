# lines: 431 
# 【ハチロク】
# display as ？？？
# JP: 「……ぐすっ――――ふっ――――っぐすっ」
1288 = "「……Hức――――phù――――hức」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……む――」
1765 = "「Ưm……ư――」"
# 【ハチロク】
# display as ？？？
# JP: 「……ふっ――くっ……ふうっ――ぐずっ」
1289 = "「……Phù――hức……phù――hức」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ぁ――む。すず？」
1244 = "「――A――ưm. Suzu?」"
# 【ハチロク】
# display as 鈴
# JP: 「……ふっ――――んくっ――――ふっ」
1284 = "「……Phù――――hức――――phù」"
# monologue
# JP: 泣いている。\n眠ったままで、泣いている。
2423 = "Em ấy đang khóc.\nVừa ngủ vừa khóc."
# monologue
# JP: ――あの日から一年以上経つというのに、\n今も時折り、こうした夜が訪れる。
2597 = "――Đã hơn một năm trôi qua kể từ ngày đó,\nnhưng thỉnh thoảng những đêm như thế này vẫn ập đến."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1258 = "「…………」"
# monologue
# JP: だから、静かに髪を撫でる。\nすずが少しでも落ち着くように。
2544 = "Vì thế, tôi nhẹ nhàng vuốt ve mái tóc em.\nĐể Suzu có thể bình tĩnh lại dù chỉ một chút."
# monologue
# JP: 悲しくも懐かしい夢と、どうか穏やかに向き合えるよう\n――そんな願いを指先にこめ、艶やかな髪を梳かし続ける。
2711 = "Mong sao em có thể đối mặt với giấc mơ buồn bã nhưng đầy hoài niệm ấy một cách bình yên\n――Tôi gửi gắm mong ước đó vào những ngón tay, tiếp tục chải vuốt mái tóc óng ả của em."
# 【ハチロク】
# display as 鈴
# JP: 「…………ん…………」
1290 = "「…………Ưm…………」"
# monologue
# JP: ――いつか、寝息から嗚咽が消える。
2294 = "――Dần dần, tiếng nức nở biến mất khỏi hơi thở khi ngủ."
# 【ハチロク】
# display as 鈴
# JP: 「……ふっ」
1285 = "「……Phù」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1733 = "「A.」"
# monologue
# JP: 小さな声を漏らしてしまい、慌てて飲み込む。
2535 = "Tôi lỡ buột miệng thốt lên, vội vàng nuốt lại vào trong."
# 【ハチロク】
# display as 鈴
# JP: 「（すぅ……すぅ……）」
2104 = "「（Khò……khò……）」"
# monologue
# JP: ……どうやら起こさずに済んだようだ。
1226 = "……Có vẻ như tôi đã không đánh thức em ấy."
# monologue
# JP: ついさっき僕を驚かせた、その表情は変わらない。\n口の端に、おだやかな笑みをたたえている。
2441 = "Biểu cảm vừa khiến tôi giật mình lúc nãy vẫn không thay đổi.\nMột nụ cười bình yên đọng trên khóe môi."
# monologue
# JP: （……優しい夢に変わったのかな）
2803 = "（……Giấc mơ đã chuyển sang một giấc mơ êm đềm rồi chăng.）"
# monologue
# JP: 安心すれば、僕にも眠気が戻ってくる。
2514 = "Cảm thấy yên tâm, cơn buồn ngủ lại kéo đến với tôi."
# monologue
# JP: が――障子の外が、ほの明るい。\n時計は、四時を少し回った。
2324 = "Nhưng――bên ngoài cửa kéo shoji đã tờ mờ sáng.\nĐồng hồ chỉ mới hơn bốn giờ một chút."
# monologue
# JP: （中途半端な時間だな）
2822 = "（Một khoảng thời gian dở dang nhỉ.）"
# monologue
# JP: ……いまさら寝なおしてもかえってダルくなりそうだ。\nならば、すずの目覚めのときまで、笑顔を守り続けよう。
1223 = "……Bây giờ mà ngủ tiếp thì có khi lúc dậy lại càng mệt mỏi hơn.\nNếu vậy, tôi sẽ tiếp tục bảo vệ nụ cười này cho đến khi Suzu thức giấc."
# monologue
# JP: とても、静かだ。世界に僕らしかいないほど。\nこの季節、蔵はもう目覚めていように。
2447 = "Thật sự rất yên tĩnh. Tĩnh lặng đến mức tưởng chừng như trên thế giới này chỉ có hai chúng tôi.\nVào mùa này, chắc xưởng ủ rượu đã thức giấc rồi."
# 【ハチロク】
# display as 鈴
# JP: 「――そうてつ、さま」
1249 = "「――Ngài... Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1258 = "「……」" 
# monologue
# JP: “寝言に返事をしてはいけない”\nそんな言い伝えをふと思い出す。
2537 = "“Không được trả lời người đang nói mớ”\nTôi chợt nhớ đến một lời truyền miệng như vậy."
# monologue
# JP: 寝ているものの魂は、かくりよに行き遊んでいる、と。\nああ、ならば今。すずはあるいは、オリヴィと――
2556 = "Người ta bảo rằng linh hồn của người đang ngủ sẽ đi dạo chơi ở cõi âm.\nÀ, nếu vậy thì bây giờ. Biết đâu Suzu đang ở cùng Olivy――"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま」
2089 = "「Ngài Soutetsu.」"
# monologue
# JP: うっすら、すずの瞳が開く。\n眠たそうな目が、僕を見る。
2750 = "Suzu hé mở đôi mắt.\nĐôi mắt ngái ngủ nhìn tôi."
# 【ハチロク】
# display as 鈴
# JP: 「ありがとうございます。\nやさしく、なぜてくださいまして」
2028 = "「Em cảm ơn ngài.\nVì đã dịu dàng vuốt ve em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――起こしてしまったか」
1729 = "「À――tôi làm em thức giấc sao?」"
# 【ハチロク】
# display as 鈴
# JP: 「たぶん……自分で目覚めたものかと思います。\nとても、幸せな気持ちになれて、ふくらんで――」
1906 = "「Chắc là……do em tự tỉnh giấc thôi ạ.\nCảm giác vô cùng hạnh phúc, cứ thế dâng trào――」"
# monologue
# JP: すずの声は、どこかまだぼんやりしてて、甘やかだ。
2756 = "Giọng nói của Suzu vẫn còn chút mơ màng, ngọt ngào."
# 【双鉄】
# display as 雙鐵
# JP: 「やはり、幸せな夢だったのか」
1635 = "「Quả nhiên là em đã có một giấc mơ hạnh phúc nhỉ.」"
# monologue
# JP: 問えば、すずが身じろぎをする。\n布団の中で、僕にぴったりくっついてくる。
2513 = "Nghe tôi hỏi, Suzu khẽ cựa mình.\nTrong chăn, em nép sát vào người tôi."
# 【ハチロク】
# display as 鈴
# JP: 「やはり、ですか？」
1875 = "「Quả nhiên, là sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。最初はうなされていたようだったが――\n不意に、笑顔に変わったのでな」
1772 = "「Ừm. Ban đầu trông em có vẻ như đang gặp ác mộng――\nnhưng rồi đột nhiên lại mỉm cười.」"
# 【ハチロク】
# display as 鈴
# JP: 「ああ」
1766 = "「A.」"
# monologue
# JP: 甘いお菓子をひとつぶ口にふくんだように、\nすずのほっぺたが、ふわ、と和らぐ。
2754 = "Đôi má Suzu mềm mại giãn ra,\nnhư thể em vừa ngậm một viên kẹo ngọt trong miệng."
# 【ハチロク】
# display as 鈴
# JP: 「左様ですね。最初は、寂しい夢でした。\n寂しく、切なく――懐かしい夢」
1978 = "「Đúng là vậy ạ. Ban đầu là một giấc mơ cô đơn.\nCô đơn, đau đớn――và đầy hoài niệm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……オリヴィの夢、か？」
1295 = "「……Là giấc mơ về Olivy sao?」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。オリヴィちゃんの夢を、見ました」
1950 = "「Vâng. Em đã mơ thấy bé Olivy.」"
# monologue
# JP: その名を出しても、すずの声音は固くならない。
2784 = "Dù nhắc đến cái tên đó, giọng điệu của Suzu cũng không hề căng thẳng."
# monologue
# JP: オリヴィが僕たちといた頃とおんなじように、\n優しく、嬉しげに名を呼んでいる。
2432 = "Giống hệt như hồi Olivy còn ở bên chúng tôi,\nem gọi cái tên ấy một cách thật dịu dàng và vui vẻ."
# 【ハチロク】
# display as 鈴
# JP: 「わたくしずうっと、オリヴィちゃんとのお別れを、\n辛いことだと……そう、夢に見てしまっておりました」
1881 = "「Suốt một thời gian dài, em đã luôn mơ thấy cuộc chia tay với bé Olivy,\nnhư một điều gì đó thật đau đớn……đúng vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1766 = "「嗯」" 
# monologue
# JP: 実際あの頃、すずの落ち込みようは酷かった。\n石炭を見ては涙ぐみ、Ⅸ号の\x%l汽笛;#00ffc040;汽笛%l;#;を聞いては振り返り――
2641 = "Thực ra hồi đó, Suzu đã suy sụp rất nhiều.\nCứ nhìn thấy than đá là rơm rớm nước mắt, nghe thấy tiếng \x%l汽笛;#00ffc040;còi hơi nước%l;#; của số 9 là lại ngoảnh lại nhìn――"
# monologue
# JP: 会話の中で自然な笑顔が出て来るまでに、\n二ヶ月近くかかったように記憶している。
2542 = "Tôi nhớ là phải mất gần hai tháng,\nem ấy mới có thể nở một nụ cười tự nhiên trong lúc nói chuyện."
# 【ハチロク】
# display as 鈴
# JP: 「こうしてあげればよかっただとか、あんなことを\n言わなければ、とか――そんな思いばかりに囚われて」
1905 = "「Em cứ mãi bị ám ảnh bởi những suy nghĩ như――\ngiá mà lúc đó mình làm thế này cho em ấy, hay giá mà mình đừng nói những lời như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのか」
1664 = "「Ra là vậy à.」"
# monologue
# JP: ……してあげたかったこと。できていたかもしれないこと。\nそれは、たしかに無数にあろう。
1225 = "……Những điều muốn làm cho em ấy. Những điều có lẽ đã có thể làm được.\nChắc chắn là có vô số."
# monologue
# JP: その一言を聞いた途端に、\n僕の胸にも、いくらも浮かびあがってくるから。
2541 = "Bởi vì ngay khi nghe câu nói đó,\ntrong lòng tôi cũng trào dâng biết bao nhiêu suy nghĩ tương tự."
# 【ハチロク】
# display as 鈴
# JP: 「ですけれど――わたくし、思い出したのです。\nようやく、思い出せたのです」
1613 = "「Nhưng mà――em đã nhớ ra rồi.\nCuối cùng em cũng nhớ ra rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「何をだ？」
1878 = "「Nhớ ra chuyện gì?」"
# monologue
# JP: あえて、尋ねる。\n恐らくは僕も同じく、思い出していることだけれども。
2533 = "Tôi cố tình hỏi.\nMặc dù có lẽ tôi cũng đang nhớ lại cùng một chuyện."
# monologue
# JP: 後悔の念がわきおこるたび、いつだってそれを鮮やかに、消し去ってもらっているのだけれども。
2780 = "Mỗi khi cảm giác hối hận trào dâng, nó luôn bị xóa nhòa một cách sống động."
# 【ハチロク】
# display as 鈴
# JP: 「あのとき――オリヴィちゃんが、わたくしたちを置き、虹のレールをわたってしまった、あのときに」
1994 = "「Lúc đó――lúc bé Olivy bỏ lại chúng ta,\nbước qua đường ray cầu vồng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1766 = "「嗯」" 
# 【ハチロク】
# display as 鈴
# JP: 「オリヴィちゃんは、笑顔だったと――\nとても楽しげに笑っていたと――思い出せました」
1901 = "「Em nhớ ra là bé Olivy đã mỉm cười――\nem ấy đã cười rất vui vẻ――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだったな」
1779 = "「Ừ. Đúng là vậy nhỉ.」"
# 【ハチロク】
# display as 鈴
# JP: 「ですから、わたくし――」
1912 = "「Vì thế, em――」"
# monologue
# JP: なにかをいいかけ、\nけれどもすずは言葉を飲み込む。
2751 = "Suzu định nói điều gì đó,\nnhưng rồi lại nuốt lời vào trong."
# monologue
# JP: ふとんの中ですずの小さな手が動き。\n僕の指を、きゅっと、強めにつかまえてくる。
2424 = "Bàn tay nhỏ bé của Suzu cử động trong chăn.\nNắm lấy những ngón tay tôi, siết chặt lại."
# 【ハチロク】
# display as 鈴
# JP: 「オリヴィちゃんは、きっと、しあわせでしたよね？\n御一夜に来たことを、悔やまず、旅立ちましたよね？」
1803 = "「Bé Olivy, chắc chắn là đã rất hạnh phúc đúng không ạ?\nEm ấy đã ra đi mà không hề hối hận vì đã đến Ohimitera đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうであろうと信じているが――\nけれども、僕はオリヴィではない」
2087 = "「Tôi tin là như vậy――\nNhưng mà, tôi không phải là Olivy.」"
# 【ハチロク】
# display as 鈴
# JP: 「それは、もちろん左様ですけれど――」
2045 = "「Chuyện đó, tất nhiên là vậy rồi nhưng――」"
# monologue
# JP: 拗ねた声。\n求められていた答えを、僕は返せなかったらしい。
2434 = "Một giọng điệu hờn dỗi.\nCó vẻ như tôi đã không thể đưa ra câu trả lời mà em ấy mong muốn."
# monologue
# JP: だとしても、とても大事なことと思うから、\n僕の中にある本当だけを、言葉に変えて伝えていく。
2322 = "Dù vậy, vì tôi nghĩ đó là một điều rất quan trọng,\nnên tôi sẽ chỉ biến những sự thật trong lòng mình thành lời nói và truyền đạt lại."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、オリヴィの気持ちは推測しかできない。\nけれど、オリヴィとの時間を思い出すことは出来る」
1914 = "「Vì thế, chúng ta chỉ có thể suy đoán cảm xúc của Olivy.\nNhưng, chúng ta có thể nhớ lại những khoảng thời gian ở bên Olivy.」"
# 【ハチロク】
# display as 鈴
# JP: 「オリヴィちゃんとの――時間を」
2017 = "「Khoảng thời gian――ở bên bé Olivy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕らと過ごしていた時間、\nオリヴィがどれだけ笑っていたか」
1776 = "「Ừ, khoảng thời gian ở bên chúng ta,\nOlivy đã cười nhiều đến mức nào.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ」
# 1733 = "「啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「それはきっと、僕のどのような言葉より、\nオリヴィが幸せであったかを、測ってくれるかと思う」
1985 = "「Tôi nghĩ điều đó chắc chắn sẽ đong đếm được việc Olivy đã hạnh phúc ra sao,\nhơn bất kỳ lời nói nào của tôi.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい！\nきっと、左様ですね、双鉄さま」
1768 = "「Vâng!\nChắc chắn là vậy rồi, Ngài Soutetsu.」"
# monologue
# JP: またきゅっと、僕の指をにぎる力が強くなる――\nそれから静かに、すずの手は僕から離れる。
2419 = "Lực nắm lấy ngón tay tôi lại siết chặt thêm một chút――\nSau đó, tay Suzu lặng lẽ rời khỏi tay tôi."
# 【ハチロク】
# display as 鈴
# JP: 「オリヴィちゃんと、過ごした時間――」
# 2017 = "「與奧莉薇的——回憶」" 
# monologue
# JP: 祈りを捧げる者のごとくに、\nすずは自らの体の上に、両手を組んで目をとじる。
2749 = "Giống như một người đang dâng lời cầu nguyện,\nSuzu đan hai tay đặt lên ngực và nhắm mắt lại."
# 【ハチロク】
# display as 鈴
# JP: 「……とても、遠いできごとのよう。\nけれども昨日のことのよう」
1291 = "「……Cứ như là một chuyện đã xảy ra từ rất lâu rồi.\nNhưng cũng cứ như mới ngày hôm qua vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1957 = "「Đúng vậy.」"
# monologue
# JP: 僕も、すずに倣うとしよう。
2519 = "Tôi cũng sẽ làm theo Suzu."
# monologue
# JP: 目を閉じ、オリヴィと過ごした時間を――\n彼女の笑顔を、思い出せるだけ、思い出そう。
2774 = "Nhắm mắt lại, khoảng thời gian ở bên Olivy――\nTôi sẽ nhớ lại nụ cười của em ấy, nhiều nhất có thể."
# 【ハチロク】
# display as 鈴
# JP: 「あらっ」
1709 = "「Ôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
1866 = "「Sao vậy?」"
# monologue
# JP: 驚いた声に驚かされて目を開く。\nすずもまじまじ、僕を見ている。
2691 = "Bị giật mình bởi giọng nói ngạc nhiên ấy, tôi mở mắt ra.\nSuzu cũng đang nhìn tôi chằm chằm."
# 【双鉄】
# display as 雙鐵
# JP: 「……イヤなことでも、思い出してしまったのか？」
1279 = "「……Em nhớ ra chuyện gì không vui à?」"
# 【ハチロク】
# display as 鈴
# JP: 「いえ、イヤなことなど、ほんのわずかもございません。\nけれども――わたくし――」
1591 = "「Dạ không, không có một chút chuyện không vui nào cả.\nNhưng mà――em――」"
# monologue
# JP: くすりと、小さな笑みがこぼれる。
2444 = "Em ấy khẽ bật cười khúc khích."
# 【ハチロク】
# display as 鈴
# JP: 「笑顔だけ、思い出そうといたしましたのに。\nオリヴィちゃんの、変なお顔ばかりが思い出されて」
1934 = "「Rõ ràng là em chỉ định nhớ lại những nụ cười thôi.\nThế mà toàn nhớ lại những khuôn mặt kỳ quặc của bé Olivy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「変な顔、とは？」
1868 = "「Khuôn mặt kỳ quặc, là sao?」"
# 【ハチロク】
# display as 鈴
# JP: 「拗ねた顔。ふくれっつら。あっかんべぇ。寝ぼけ[まなこ]眼。\nお腹をすかせぐったりし。暑さに茹だりのぼせてしまい」
2102 = "「Khuôn mặt hờn dỗi. Phồng má. Lêu lêu. Đôi mắt ngái ngủ.\nBụng đói meo rã rời. Nóng nực đến mức như bị luộc chín.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1726 = "「À――」"
# 【ハチロク】
# display as 鈴
# JP: 「ことさらに思い出そうともいたしませんのに。\nそうしたお顔が、不思議と鮮やかに浮き上がってきて」
1935 = "「Em không hề cố ý nhớ lại đâu.\nNhưng những khuôn mặt đó lại hiện lên sống động một cách kỳ lạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……オリヴィは、それだけ笑顔でいてくれた。\nそのせいなのかもしれないな」
1281 = "「……Olivy đã luôn mỉm cười nhiều đến vậy.\nCó lẽ là vì thế chăng.」"
# 【ハチロク】
# display as 鈴
# JP: 「と、おっしゃいますと？」
1874 = "「Ý ngài là sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「例えば――そうだな……。\nああ。今まで食べた石炭で、特に印象に残ったものは？」
1982 = "「Ví dụ như――để xem nào…….\nÀ. Trong số những loại than em đã từng ăn, loại nào để lại ấn tượng đặc biệt nhất?」"
# 【ハチロク】
# display as 鈴
# JP: 「石炭、ですか？　左様ですね――」
1683 = "「Than đá, sao ạ? Để xem nào――」"
# monologue
# JP: 怪訝そうな顔をしつつも、\nすずは律儀に応えてくれる。
2785 = "Dù mang vẻ mặt hoài nghi,\nnhưng Suzu vẫn nghiêm túc trả lời tôi."
# 【ハチロク】
# display as 鈴
# JP: 「話の流れもございましょうが、真っ先に思い浮かぶのは、\nオリヴィちゃんから頂いた、セントレイリアの物ですね」
1993 = "「Theo mạch câu chuyện thì, thứ đầu tiên em nghĩ đến,\nlà loại than Centralia mà bé Olivy đã cho em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……聞かせてくれたな。\n今も燃え続けている冥国の廃炭鉱の話を」
1294 = "「……Em ấy từng kể cho chúng ta nghe rồi nhỉ.\nCâu chuyện về khu mỏ than bỏ hoang ở nước Mỹ hiện vẫn đang bốc cháy.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。そのお話を聞きながらいただいたせいでしょうか。\n焦げたような香りがとても印象的でした」
1949 = "「Vâng. Có lẽ là do em vừa ăn vừa nghe câu chuyện đó chăng.\nMùi hương cháy khét của nó rất ấn tượng ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「他はどうだ？　例えば、味の面では」
1648 = "「Thế còn những loại khác thì sao? Ví dụ như về mặt mùi vị.」"
# 【ハチロク】
# display as 鈴
# JP: 「味でしたら、旺宮でおもてなしいただきました、\n[ゆうばり,1]夕針産の[むえんたん,2]無煙炭が――澄み切った上等の苦味で」
2021 = "「Nếu là mùi vị thì, loại than vô khói sản xuất tại Yubari\nmà em được thiết đãi ở Omiya――có vị đắng thượng hạng rất thanh khiết.」"
# 【双鉄】
# display as 雙鐵
# JP: 「香り、味と来たら――\nふむ？　その他の、石炭の楽しみどころというのは」
2101 = "「Mùi hương, mùi vị rồi――\nHừm? Còn những điểm thú vị khác của than đá là gì nhỉ?」"
# 【ハチロク】
# display as 鈴
# JP: 「食感ですね。これは、八ツ城で頂きました[かったん,1]褐炭が、\n口の中でほろほろ崩れ、おもしろうございました」
2060 = "「Là kết cấu khi nhai ạ. Loại than nâu mà em được ăn ở Yatsushiro,\ntan vụn ra trong miệng, rất là thú vị.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――と、いうことだと思うのだ」
1248 = "「――Ý tôi là như vậy đấy.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい？」
1782 = "「Dạ?」"
# monologue
# JP: すずが傾げた小首が、僕の肩口にことりと当たる。
2753 = "Suzu nghiêng chiếc cổ nhỏ, khẽ tựa vào vai tôi."
# 【ハチロク】
# display as 鈴
# JP: 「『と、いうこと』とは、どのような――」
1885 = "「『Ý ngài là như vậy』 là như thế nào ạ――」"
# 【双鉄】
# display as 雙鐵
# JP: 「いつも食べている[れきせいたん,2]瀝青炭。それは日常にありすぎて、\n思い出そうとすればきっと、逆に思い出されなくなる」
1633 = "「Loại than bitum mà em vẫn thường ăn. Nó quá đỗi quen thuộc trong cuộc sống hàng ngày,\nnên nếu cố nhớ lại thì chắc chắn, ngược lại sẽ không thể nhớ ra được.」"
# 【ハチロク】
# display as 鈴
# JP: 「ああ――」
# 1726 = "「啊——」" 
# monologue
# JP: こくこく、すずが何度も頷く。
2759 = "Suzu gật đầu lia lịa."
# 【ハチロク】
# display as 鈴
# JP: 「確かに、左様でございます。オリヴィちゃんの笑顔は\nいつも、わたくしたちの一番近くに――日常に」
2000 = "「Quả thực là vậy ạ. Nụ cười của bé Olivy\nluôn ở gần chúng ta nhất――trở thành điều thường nhật.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。そうありながら、さまざまな顔を覚えている。\nさまざまな顔を、見せてもらえた――」
1955 = "「Đúng vậy. Dù là thế, nhưng chúng ta vẫn nhớ được rất nhiều khuôn mặt khác nhau.\nBởi vì em ấy đã cho chúng ta thấy rất nhiều khuôn mặt khác nhau――」"
# 【ハチロク】
# display as 鈴
# JP: 「はい」
# 1957 = "「是啊」" 
# monologue
# JP: 事実は、なによりも雄弁だ。\nそれが物語る声をまっすぐ、聞き取れたなら。
2305 = "Sự thật hùng hồn hơn bất cứ điều gì.\nNếu có thể trực tiếp lắng nghe những tiếng nói mà nó truyền tải."
# 【双鉄】
# display as 雙鐵
# JP: 「その分だけ、オリヴィと僕らはこころを許しあえていた。\nそうではないかと、僕は、思う」
1789 = "「Chính vì thế, Olivy và chúng ta mới có thể thấu hiểu nhau đến vậy.\nTôi nghĩ, là như thế đó.」"
# 【ハチロク】
# display as 鈴
# JP: 「でしたら」
2073 = "「Nếu vậy thì.」"
# monologue
# JP: すずの声音に、力がこもる。迷いが消える。
2755 = "Giọng nói của Suzu trở nên mạnh mẽ. Sự do dự đã biến mất."
# 【ハチロク】
# display as 鈴
# JP: 「オリヴィちゃんとわたくしたちの過ごした日々は――\nしあわせに、満ち満ちていたものだったのですね」
1804 = "「Những ngày tháng bé Olivy ở bên chúng ta――\nchắc chắn đã tràn ngập hạnh phúc nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「少なくとも僕は幸せだった」
2016 = "「Ít nhất thì tôi đã rất hạnh phúc.」"
# 【ハチロク】
# display as 鈴
# JP: 「わたくしもです。なぜこんなにも当たり前のことを、\nいままで忘れてしまっていたのか――」
1887 = "「Em cũng vậy. Tại sao một điều hiển nhiên như thế,\nmà từ trước đến giờ em lại quên mất cơ chứ――」"
# monologue
# JP: その一言を聞いた瞬間、\n小さな笑いが浮かんでしまう。
2693 = "Khoảnh khắc nghe thấy câu nói đó,\nmột nụ cười khẽ nở trên môi tôi."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま？」
2091 = "「Ngài Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「同じだなぁと、思っただけだ。僕とすず――\n人も\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、全く同じであるのだなぁ。と」
1674 = "「Tôi chỉ nghĩ là, chúng ta giống nhau quá thôi. Tôi và Suzu――\nCon người và \x%lレイルロオド;#00ffc040;Railord%l;#;, hoàn toàn giống hệt nhau.」"
# 【ハチロク】
# display as 鈴
# JP: 「おんなじ、ですか？」
1580 = "「Giống nhau, sao ạ?」"
# monologue
# JP: 路子のことを想い出す。\n路子の笑顔を家族の時間を、想い出す。
2528 = "Tôi nhớ về Michiko.\nNhớ về nụ cười của Michiko, nhớ về khoảng thời gian bên gia đình."
# monologue
# JP: 遠く、懐かしく、あたたかく。\nほんの少しだけ寂しいけれど――幸せなことと想い出す。
2738 = "Thật xa xôi, thật hoài niệm, thật ấm áp.\nDù có chút cô đơn――nhưng tôi nhớ đó là những điều hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「さよならを、それだけ大事に思うから――\nそうしたときに悲しみは、なかなか手から離れぬものさ」
1790 = "「Bởi vì chúng ta quá coi trọng lời tạm biệt――\nNên những lúc như vậy, nỗi buồn rất khó buông tay.」"
# 【ハチロク】
# display as 鈴
# JP: 「あぁ――」
1762 = "「A――」"
# monologue
# JP: すずの頭が、擦り寄ってくる。\nだからそのまま抱きしめる。
2752 = "Suzu dụi đầu vào tôi.\nThế nên tôi cứ vậy mà ôm lấy em."
# 【ハチロク】
# display as 鈴
# JP: 「きっと、左様です。\nそうして、だからこそ、わたくしの見た夢の中」
1577 = "「Chắc chắn là vậy rồi.\nVà, chính vì thế, trong giấc mơ mà em đã thấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1766 = "「嗯」" 
# monologue
# JP: 髪を、撫でる。\nこころを撫でてやれぬ代わりに、精一杯に優しく撫でる。
2532 = "Tôi vuốt ve mái tóc em.\nThay vì xoa dịu trái tim em, tôi cố gắng vuốt ve em thật dịu dàng."
# 【ハチロク】
# display as 鈴
# JP: 「オリヴィちゃんは、笑顔で教えてくれたのです。\n『もう、悲しみを手放すときだ』と」
1805 = "「Bé Olivy đã mỉm cười và nói với em.\nRằng 『Đã đến lúc phải buông bỏ nỗi buồn rồi』.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なのかもしれんな」
1907 = "「Có lẽ là vậy nhỉ.」"
# 【ハチロク】
# display as 鈴
# JP: 「うふふっ、今日は素敵な朝ですね！」
1695 = "「Fufu, hôm nay là một buổi sáng thật tuyệt vời!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1724 = "「Hửm.」"
# monologue
# JP: すずが起き出す。
2758 = "Suzu ngồi dậy."
# monologue
# JP: いつの間に、時計は五時を過ぎている。\nそろそろ起き出しても構わん時間だ。
2297 = "Không biết từ lúc nào, đồng hồ đã điểm quá năm giờ.\nCũng đến lúc nên dậy rồi."
# 【ハチロク】
# display as 鈴
# JP: 「朝食を、たまには作ってみませんか？\n双鉄さまとわたくしと、ふたりでみんなの朝食を」
1894 = "「Thi thoảng chúng ta thử làm bữa sáng xem sao nhé?\nNgài Soutetsu và em, hai chúng ta cùng làm bữa sáng cho mọi người.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはいい考えだな」
1781 = "「Ừ, ý kiến hay đấy.」"
# monologue
# JP: 真闇姉と日々姫とは、\n僕が一人で厨房に立つことを嫌がるが――
2659 = "Chị Mayami và Hibiki,\nrất ghét việc tôi đứng trong bếp một mình nhưng――"
# monologue
# JP: 夫婦で作るものならば、きっと喜んで食べてくれよう。
2317 = "Nếu là do hai vợ chồng cùng làm, chắc chắn họ sẽ vui vẻ thưởng thức."
# 【ハチロク】
# display as 鈴
# JP: 「それで、ですね？　双鉄さま」
2053 = "「Và còn nữa nhé? Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1782 = "「嗯？」" 
# monologue
# JP: 障子を開けて光をいれる、\nその手を止めて振り返り――
2608 = "Tôi dừng tay mở cửa kéo shoji để đón ánh sáng vào,\nvà ngoảnh lại nhìn――"
# monologue
# JP: すずはほんの少しだけ、\n甘えた瞳で、僕を見る。
2757 = "Suzu nhìn tôi,\nvới một ánh mắt hơi nũng nịu."
# 【ハチロク】
# display as 鈴
# JP: 「今日はわたくし、石炭を――\n双鉄さまに、砕いていただきたいのです」
1898 = "「Hôm nay em muốn, than đá――\nNgài Soutetsu sẽ đập vụn ra cho em ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お安い御用だ」
1661 = "「Chuyện nhỏ thôi.」"
# monologue
# JP: そんなことなら、いつなりと。
2736 = "Chuyện đó thì lúc nào cũng được."
# monologue
# JP: たまには使ってやる方が、\nアイスピックも、喜ぶだろう。
2331 = "Thi thoảng mang ra dùng,\nchắc cái dùi đục đá cũng sẽ vui lắm đây."
# 【日々姫】
# display as 日日姬
# JP: 「重か～！　重かと～っ！」
1808 = "「Nặng quá~! Nặng quá đi mất~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それでも加速だ。\n屋岳の登りに入ったときに、少しでも余裕を作れるよう」
1624 = "「Dù vậy vẫn phải tăng tốc.\nĐể có thêm chút dư dả khi bắt đầu leo dốc Yatake.」"
# 【日々姫】
# display as 日日姬
# JP: 「わかっとるけど――」
2048 = "「Em biết rồi nhưng mà――」"
# monologue
# JP: 湯医線ではもういっぱしの\x%l機関士;#00ffc040;機関士%l;#;となった日々姫でも、\n小畑線には、やはり苦戦を強いられる。
2587 = "Dù đã trở thành một \x%l機関士;#00ffc040;lái tàu%l;#; thực thụ trên tuyến Yui, nhưng Hibiki\nvẫn phải chật vật khi đối mặt với tuyến Okoba."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
# 2091 = "「雙鐵少爺？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
# 1709 = "「哎呀」" 
# monologue
# JP: （ざくっ――ガシュッ！　ざくっ！――ガショっ！！）
2815 = "（Phập――Xoảng! Phập!――Xoảng!!）"
# monologue
# JP: 石炭の消費が著しい。\x%l投炭;#00ffc040;投炭%l;#;の手は緩められない。\n超満員の\x%l客車;#00ffc040;客車%l;#;を牽いた、螺旋鉄道・天空路線――
2688 = "Lượng than tiêu thụ rất đáng kể. Không thể nới lỏng tay \x%l投炭;#00ffc040;xúc than%l;#;.\nKéo theo \x%l客車;#00ffc040;toa hành khách%l;#; chật kín người, trên tuyến đường sắt xoắn ốc - tuyến đường trên không――"
# monologue
# JP: オリヴィのさよなら列車は、結果的には小畑線を、\n大人気の観光列車へと飛躍させてくれたのだから。
2676 = "Kết quả là, chuyến tàu tạm biệt của Olivy đã giúp tuyến Okoba,\nvươn lên thành một tuyến tàu du lịch cực kỳ nổi tiếng."
# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1733 = "「啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1766 = "「嗯」" 
# monologue
# JP: あっという間に助士側窓を、保線基地の姿が流れて消える。\n規則正しく、線路の継ぎ目の衝動だけが伝わってくる。
2660 = "Chỉ trong chớp mắt, hình ảnh căn cứ bảo trì đường ray vụt qua và biến mất khỏi cửa sổ phía ghế phụ lái.\nChỉ còn lại những rung động đều đặn từ các khớp nối đường ray truyền đến."
# monologue
# JP: ……あの災害を記憶している者でさえ、\nここが隆起し陥没をした線路だとは、信じられぬだろう。
1215 = "……Ngay cả những người còn nhớ về thảm họa năm xưa,\nchắc cũng không thể tin được đây từng là đoạn đường ray bị đội lên và sụt lún."
# 【日々姫】
# display as 日日姬
# JP: 「\x%l制限;#00ffc040;制限%l;#;30――よしっ！」
1240 = "「\x%l制限;#00ffc040;Giới hạn tốc độ%l;#; 30――Tốt!」"
# monologue
# JP: 霧縞温泉駅をすぎれば、8620は登り始める。
2737 = "Qua ga Suối nước nóng Kirishima, 8620 bắt đầu leo dốc."
# monologue
# JP: \x%lドラフト;#00ffc040;ドラフト%l;#;音を響かせながら汗をかきかき、\nゆっくりゆっくり、屋岳の高みをひたすら目指す。
95 = "Vừa đổ mồ hôi hột vừa vang lên tiếng \x%lドラフト;#00ffc040;hút gió lò hơi%l;#;,\nchầm chậm, chầm chậm tiến thẳng lên đỉnh Yatake."
# 【日々姫】
# display as 日日姬
# JP: 「……にぃには、さ」
1307 = "「……Anh hai này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 1782 = "「嗯？」" 
# monologue
# JP: 前方注視を切らさぬままに、\n日々姫がポツリ、声を出す。
2584 = "Mắt vẫn không rời khỏi phía trước,\nHibiki khẽ cất tiếng."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにとハチロクはあると？\n日ノ本三大車窓ば、オリヴィと見たこと」
2081 = "「Anh hai và Hachiroku đã từng thấy chưa?\nMột trong ba khung cảnh qua cửa sổ đẹp nhất Hinomoto ấy, cùng với Olivy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――いや」
1730 = "「À――chưa.」"
# monologue
# JP: 思わずハチロクを見てしまう。
2517 = "Tôi bất giác nhìn sang Hachiroku."
# monologue
# JP: 前方注視をやはり崩さぬ横顔が――\nほんのわずかに、懐かしそうに微笑んでいる。
2414 = "Góc nghiêng của em ấy vẫn không hề rời mắt khỏi phía trước――\nnhưng lại nở một nụ cười thoáng chút hoài niệm."
# 【ハチロク】
# display as 八六
# JP: 「残念ながらただの一度も。オリヴィ先生の教導を\nいただいた時には、前方窓しか見られませんでしたので」
1861 = "「Đáng tiếc là chưa một lần nào. Khi được cô Olivy chỉ dạy,\nem chỉ có thể nhìn chằm chằm vào cửa sổ phía trước thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「そっか。そなんだ」
1960 = "「Ra vậy. Là vậy à.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　何故そんなことが気になった？」
1867 = "「Sao thế? Sao tự nhiên em lại tò mò chuyện đó?」"
# 【日々姫】
# display as 日日姬
# JP: 「ん。ちょっと、思いだしたけん。\nTop of the world――言うとったなぁって」
1722 = "「Ưm. Tự nhiên em nhớ lại thôi.\nTop of the world――chị ấy từng nói thế nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、[やつしろかい,3]八ツ城海の車窓をか」
1748 = "「À, khung cảnh biển Yatsushiro qua cửa sổ tàu ấy hả.」"
# 【日々姫】
# display as 日日姬
# JP: 「そ」
1836 = "「Đúng rồi.」"
# monologue
# JP: 前方注視を崩さぬままに、\n日々姫もまた、優しく笑う。
2577 = "Mắt vẫn nhìn thẳng về phía trước,\nHibiki cũng mỉm cười dịu dàng."
# 【日々姫】
# display as 日日姬
# JP: 「あの車窓、まっこと見事だったばってん――\n私、小畑線の景色もすごく、好きだから」
2067 = "「Khung cảnh qua cửa sổ lúc đó quả thực rất tuyệt vời nhưng――\nEm cũng rất thích cảnh sắc trên tuyến Okoba.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。僕も、ここの車窓は見事と思う」
1999 = "「Công nhận. Anh cũng thấy khung cảnh qua cửa sổ ở đây rất tuyệt.」"
# monologue
# JP: 小畑の車窓は、保線の車窓だ。森林火災を防ぐため、\n線路の両脇を、かなり広範に切り開いている。
2408 = "Khung cảnh qua cửa sổ ở Okoba là khung cảnh của sự bảo trì đường ray. Để phòng chống cháy rừng,\nhai bên đường ray đã được phát quang một khoảng khá rộng."
# monologue
# JP: 莫大なコストがかかるこの保線作業がもしもなければ、\n小畑線から見える景色は、また大きく変わることだろう。
2448 = "Nếu không có công tác bảo trì đường ray tốn kém khổng lồ này,\ncảnh sắc nhìn từ tuyến Okoba có lẽ sẽ thay đổi rất nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィも、世界で二位と――\nその位の評価はくれたかな？」
1585 = "「Chắc Olivy cũng sẽ đánh giá nơi này――\nđứng thứ hai trên thế giới nhỉ?」"
# 【日々姫】
# display as 日日姬
# JP: 「よね！　きっと」
1946 = "「Đúng không! Chắc chắn rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「さぁ、どうでしょう。\nわたくしは、少し違うかと感じますが」
1964 = "「Chà, ai biết được.\nEm thì lại cảm thấy hơi khác một chút.」"
# 【日々姫】
# display as 日日姬
# JP: 「ええっ？　――っと！」
1712 = "「Hả? ――Á!」"
# monologue
# JP: 決して無駄ではない無駄口を叩きつつ、\n日々姫は実に細やかに、8620の声を聞く。
2576 = "Vừa tán gẫu những câu chuyện không hề vô bổ,\nHibiki vừa lắng nghe tiếng nói của 8620 một cách cực kỳ tinh tế."
# monologue
# JP: \x%l加減弁;#00ffc040;加減弁%l;#;をじわりと絞り、ゆるゆる開き、\n\x%l動輪;#00ffc040;動輪%l;#;と勾配とを丁寧に、絶え間なくフィットさせ続ける。
2426 = "Từ từ siết \x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;, rồi lại nới lỏng ra,\nliên tục điều chỉnh sự ăn khớp giữa \x%l動輪;#00ffc040;bánh xe chủ động%l;#; và độ dốc một cách cẩn thận."
# 【日々姫】
# display as 日日姬
# JP: 「したら、ハチロクは――\nオリヴィば、なんていうたと思うと？」
2058 = "「Vậy, Hachiroku nghĩ――\nOlivy sẽ nói gì nào?」"
# 【ハチロク】
# display as 八六
# JP: 「左様、ですね。\nオリヴィちゃんでしたら、きっと――」
2046 = "「Để xem nào.\nNếu là bé Olivy, chắc chắn em ấy sẽ nói――」"
# 【日々姫】
# display as 日日姬
# JP: 「きっと？」
1578 = "「Chắc chắn?」"
# 【ハチロク】
# display as 八六
# JP: 「八ツ城海は世界一。でも――\n小畑の車窓は、日ノ本一、と」
1646 = "「Biển Yatsushiro là số một thế giới. Nhưng――\nKhung cảnh qua cửa sổ ở Okoba là số một Hinomoto.」"
# 【日々姫】
# display as 日日姬
# JP: 「あああ！　いいそう！\nそれ、オリヴィめちゃくちゃいいそう！！」
1741 = "「Aaa! Chắc chắn luôn!\nOlivy cực kỳ có khả năng sẽ nói câu đó!!」"
# monologue
# JP: 日々姫が笑う。楽しげに。\nそして、高らかに\x%l汽笛;#00ffc040;汽笛%l;#;を鳴らす。
2592 = "Hibiki bật cười. Một nụ cười vui vẻ.\nVà rồi, kéo một hồi \x%l汽笛;#00ffc040;còi hơi nước%l;#; vang dội."
# monologue
# JP: （ポーーーーーーーーっ！！）
2817 = "（Tuúúúúúúúúúúú!）"
# monologue
# JP: ――僕らの声を空の上まで、\n届けようとでもするかのように。
1178 = "――Như thể muốn truyền tải giọng nói của chúng tôi,\nlên tận bầu trời cao kia."
# 【こだま】
# display as ？？？
# JP: 「『Top of the ヒノモト！\nヒノモトイチのシャソーだったね！！』」
1254 = "「『Top of the Hinomoto!\nLà khung cảnh qua cửa sổ đẹp nhất Hinomoto nhỉ!!』」"
# 【双鉄】
# display as ３人
# JP: 「っ！！？」「っ！！？」\n「えええっ！？」
1689 = "「!!?」「!!?」\n「Hảảả!?」"
# monologue
# JP: 日々姫の声の――モノマネではない。\n驚きのあまり、\x%l運転台;#00ffc040;運転台%l;#;から飛び降りる。
2730 = "Không phải là giọng của Hibiki――hay bắt chước giọng em ấy.\nQuá đỗi ngạc nhiên, tôi nhảy phắt xuống khỏi \x%l運転台;#00ffc040;buồng lái%l;#;."
# 【宗方】
# display as ？？？
# JP: 「さっきのが日ノ本一なら、\n[やつしろかい,3]八ツ城海の車窓はどうなる」
1810 = "「Nếu lúc nãy là số một Hinomoto,\nthì khung cảnh qua cửa sổ ở biển Yatsushiro tính sao đây.」"
# 【こだま】
# display as ？？？
# JP: 「もちろん！　Top of the world!!」
2066 = "「Tất nhiên là! Top of the world!!」"
# monologue
# JP: ――声がする。
1186 = "――Có tiếng người nói."
# monologue
# JP: ありえぬこととわかっていても、\n人混みに姿を探してしま――っ！！！
2783 = "Dù biết đó là chuyện không tưởng,\nnhưng tôi vẫn bất giác đưa mắt tìm kiếm hình bóng ấy giữa đám đông――!!!"
# 【双鉄】
# display as 雙鐵
# JP: 「宗方さん！　宗方\x%l機関士;#00ffc040;機関士%l;#;！！」
1823 = "「Anh Munakata! \x%l機関士;#00ffc040;Lái tàu%l;#; Munakata!!」"
# 【宗方】
# display as 宗方
# JP: 「ああ、右田\x%l機関士;#00ffc040;機関士%l;#;」
1629 = "「À, \x%l機関士;#00ffc040;lái tàu%l;#; Migita.」"
# 【こだま】
# display as ？？？
# JP: 「マスター、この人だぁれ？」
1236 = "「Master, người này là ai vậy?」"
# 【宗方】
# display as 宗方
# JP: 「おれはマスターではない。\nで、この人たちは、御一夜鉄道のみなさんだ」
1884 = "「Tôi không phải là Master.\nVà, những người này là người của Đường sắt Ohito.」"
# 【こだま】
# display as ？？？
# JP: 「ふーん。やっぱりかー」
1760 = "「Hừm. Quả nhiên là vậy à~」"
# monologue
# JP: 大きな瞳が、僕らを見上げる。\nただそれだけで、時間が一瞬、止まってしまう。
2436 = "Đôi mắt to tròn ngước nhìn chúng tôi.\nChỉ bấy nhiêu thôi cũng khiến thời gian như ngừng đọng trong khoảnh khắc."
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1726 = "「啊——」" 
# 【日々姫】
# display as 日日姬
# JP: 「オリヴィじゃ――なか、と、ね」
1665 = "「Không phải――Olivy, nhỉ.」"
# monologue
# JP: オリヴィではない。\nぱっと見まるで、人間の子供と変わらぬ服装だ。
2412 = "Không phải là Olivy.\nThoạt nhìn, trang phục của cô bé chẳng khác gì một đứa trẻ con người."
# monologue
# JP: けれど、似ている。瞳が、鼻が、口元が。\nこのこは、いいや、この\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は――
2318 = "Nhưng mà, rất giống. Từ đôi mắt, chiếc mũi, cho đến khóe miệng.\nCô bé này, à không, \x%lレイルロオド;#00ffc040;Railord%l;#; này là――"
# monologue
# JP: （ぽっ！！）
2813 = "（Bốp!!）"
# 【こだま】
# display as ？？？
# JP: 「 [キューゴー,1]Ⅸ号！！！！」
1601 = "「Số 9!!!!」"
# 【宗方】
# display as 宗方
# JP: 「あ、おいこだまっっ！！」
1750 = "「A, này Kodama!!」"
# monologue
# JP: 宗方さんを声ごと全部置き去りにして、\nこだまと呼ばれた\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は一直線に駆けて――
2732 = "Bỏ lại anh Munakata cùng tiếng gọi của anh ấy ở phía sau,\n\x%lレイルロオド;#00ffc040;Railord%l;#; mang tên Kodama chạy thẳng một mạch――"
# 【宗方】
# display as 宗方
# JP: 「走るな！　ホームだぞ！！！」
1655 = "「Đừng có chạy! Đang ở sân ga đấy!!!」"
# 【こだま】
# display as 小玉
# JP: 「あ、ごめんっ」
1753 = "「A, xin lỗi.」"
# monologue
# JP: ピタリと止まって。
2437 = "Cô bé dừng phắt lại."
# monologue
# JP: （さささささっ）
2820 = "（Xoạt xoạt xoạt xoạt xoạt）"
# monologue
# JP: そこから驚くべき早歩きで、ホーム端へと向かっていく。
2633 = "Rồi từ đó, với những bước đi nhanh đến kinh ngạc, cô bé tiến về phía cuối sân ga."
# monologue
# JP: 湯医側から入線してくる『バーベキューオリヴィ』――\nⅨ号機関車の小さな機影を、一番近くで出迎えようと。
2403 = "Chuyến tàu 『BBQ Olivy』 đang tiến vào ga từ phía Yui――\nCô bé định đón bóng dáng nhỏ bé của đầu máy số 9 ở khoảng cách gần nhất."
# 【ハチロク】
# display as 八六
# JP: 「……ぁあ」
1287 = "「……A.」"
# monologue
# JP: 絞り出すような、うめきのようなハチロクの声。\n感極まった――そんな声。
2348 = "Giọng Hachiroku nghẹn ngào như đang rên rỉ.\nMột giọng nói――tràn ngập xúc động."
# monologue
# JP: 確かに、どうしても想い出す。想い出さないはずが無い。\n顔だけじゃない。仕草も、雰囲気も、発する言葉も――
2649 = "Quả thực, dù thế nào đi nữa thì cũng sẽ nhớ lại thôi. Không thể nào không nhớ lại được.\nKhông chỉ khuôn mặt. Mà cả cử chỉ, bầu không khí, và những lời nói thốt ra――"
# 【双鉄】
# display as 雙鐵
# JP: 「宗方さん……\nあの子は――こだまという子は」
1821 = "「Anh Munakata……\nĐứa trẻ đó――đứa trẻ tên Kodama đó là.」"
# 【宗方】
# display as 宗方
# JP: 「ああ、んんっ」
1751 = "「À, ừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1721 = "「!!」"
# monologue
# JP: 危ういところで我に返る。\nそれはそうだ。もしも僕の想像が正しいのであれば――
2526 = "May mà tôi bừng tỉnh lại đúng lúc.\nCũng phải thôi. Nếu như suy đoán của tôi là đúng thì――"
# 【双鉄】
# display as 雙鐵
# JP: 「立ち話もなんですので――レールショップへ、\nよかったらお寄りいただけませんか？」
1893 = "「Đứng nói chuyện ở đây cũng không tiện――Nếu được,\nanh có muốn ghé qua Cửa hàng Đường sắt một chút không?」"
# 【宗方】
# display as 宗方
# JP: 「……その節は、大変申し訳無いことを」
1306 = "「……Lần đó, tôi thực sự rất xin lỗi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、わたしがみかん鉄道さんの社長でも、\nやっぱり、同じ決断をしたと思いますから」
1592 = "「Không đâu, nếu tôi là giám đốc của Đường sắt Mikan,\ntôi nghĩ mình cũng sẽ đưa ra quyết định tương tự thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、お紅茶はいりましたよぉ」
1785 = "「Fufu, hồng trà pha xong rồi đây ạ~」"
# monologue
# JP: れいながトレーをもってくる。
2636 = "Reina bưng khay ra."
# monologue
# JP: 宗方にひっついたまま、\nこだまはきょとん、と。興味深げにれいなを見つめる。
2686 = "Vẫn bám chặt lấy Munakata,\nKodama ngơ ngác nhìn Reina với vẻ đầy thích thú."
# 【れいな】
# display as 玲奈
# JP: 「はぁい。どうぞ。\nおさとうとミルクもありますよぉ」
2027 = "「Vâng. Xin mời ạ.\nCó cả đường và sữa nữa nha~」"
# 【こだま】
# display as 小玉
# JP: 「ありがとー！」
2029 = "「Cảm ơn nha!」"
# 【電車姫】
# display as ？？？
# JP: 「すまんの。こちらから呼び出しておいて中座とは――\nおおっ？」
1837 = "「Xin lỗi nhé. Đã gọi mọi người đến mà ta lại rời đi giữa chừng――\nÔ?」"
# monologue
# JP: ディスプレイには、電車姫様。
2706 = "Trên màn hình hiển thị là Densha Hime."
# monologue
# JP: その端正なお顔に驚きが張り付いて、\nすぐさま笑みに変化する。
2439 = "Sự ngạc nhiên thoáng hiện trên khuôn mặt thanh tú của cô ấy,\nrồi ngay lập tức chuyển thành một nụ cười."
# 【電車姫】
# display as 電車公主
# JP: 「なんと、素晴らしきタイミングじゃの」
2051 = "「Chà, đúng là một thời điểm tuyệt vời.」"
# monologue
# JP: ――確かに、あまりのタイミング。\nとても偶然とは思えない。
1182 = "――Quả thực là thời điểm quá trùng hợp.\nKhó mà tin được đây chỉ là sự tình cờ."
# 【電車姫】
# display as 電車公主
# JP: 「おうおう、ひよこの話には聞いておったが……\nなるほど、オリヴィの面影があるの」
1991 = "「Ồ ồ, ta đã nghe Hiyoko kể rồi nhưng……\nRa là vậy, đúng là có nét giống Olivy.」"
# 【日々姫】
# display as 日日姬＆八六
# JP: 「っ！！」\n「ああ――」
1744 = "「!!」\n「A――」"
# monologue
# JP: ひよこ――即ち不死鳥博士。その名に心臓が跳ね上がる。\nどういうものかもわからぬ汗が、体の芯から滲み出て来る。
2788 = "Hiyoko――tức là Tiến sĩ Phượng Hoàng. Nghe đến cái tên đó, tim tôi đập thót lên.\nMột thứ mồ hôi không rõ là gì túa ra từ tận sâu trong cơ thể."
# monologue
# JP: けれども、当の“おもかげ”は、\n目を丸くして、きょろきょろと――
2327 = "Thế nhưng, “người có nét giống” đó,\nlại tròn xoe mắt, ngó nghiêng xung quanh――"
# 【電車姫】
# display as 電車公主
# JP: 「くふふっ、愛らしいのう。\nここじゃ、ここ。モニターの中じゃ」
1699 = "「Kufufu, đáng yêu quá đi mất.\nỞ đây, ở đây này. Ta ở trong màn hình đây.」"
# 【こだま】
# display as 小玉
# JP: 「ここ、どこ――わっ！！？　マスター！？　このひと、\nテレビのひとなのに、おしゃべりできるよ！？」
1794 = "「Ở đây, là đâu――Oái!!? Master!? Người này,\nrõ ràng là ở trong tivi mà lại biết nói chuyện kìa!?」"
# 【宗方】
# display as 宗方
# JP: 「だから、俺はマスターではない。\nで、そいつはいわゆるテレビ電話……みたいなもんだ」
1910 = "「Đã bảo tôi không phải là Master mà.\nVà, cái đó là điện thoại truyền hình……đại loại thế.」"
# 【こだま】
# display as 小玉
# JP: 「へー、これがテレビ電話！\nみかん鉄道にもつければいいのに！！」
1720 = "「Hê, đây là điện thoại truyền hình á!\nĐường sắt Mikan cũng nên lắp một cái đi!!」"
# monologue
# JP: ネット会議を、僕らはみかん鉄道さんとも交わしている。
2523 = "Chúng tôi cũng thường họp trực tuyến với Đường sắt Mikan."
# monologue
# JP: ならばこの子は会議に参加する立場に無い――\nああ、いや、というかそれ以前に、だ。
2747 = "Nếu vậy thì cô bé này không có tư cách tham gia cuộc họp――\nÀ không, nói đúng hơn là trước đó."
# 【電車姫】
# display as 電車公主
# JP: 「いとあどけないのぉ。の？　名はなんという？\nわらわに教えてくれんかの？」
2047 = "「Thật ngây thơ đáng yêu làm sao. Tên cháu là gì vậy?\nCó thể nói cho ta biết được không?」"
# 【こだま】
# display as 小玉
# JP: 「こだまのなまえは、こだまだよ！」
1846 = "「Tên của Kodama, là Kodama đó!」"
# 【ハチロク】
# display as 八六
# JP: 「こだま――」
1841 = "「Kodama――」"
# 【日々姫】
# display as 日日姬
# JP: 「こだま――うん！　かわいかお名前ねっ！」
1843 = "「Kodama――Ừm! Một cái tên thật đáng yêu nhỉ!」"
# 【こだま】
# display as 小玉
# JP: 「えへへ！　おねーちゃんありがとー！」
1710 = "「Ehehe! Cảm ơn chị gái nha!」"
# 【日々姫】
# display as 日日姬
# JP: 「日々姫でよかよ！　こだまちゃん！」
1847 = "「Cứ gọi chị là Hibiki là được rồi! Bé Kodama!」"
# 【こだま】
# display as 小玉
# JP: 「わかったー！　ヒビキー！！」
1942 = "「Biết rồi! Hibiki!!」"
# monologue
# JP: ――木魂。呼魂。こだま。
1176 = "――Mộc Hồn. Hô Hồn. Kodama (Tiếng vọng)."
# monologue
# JP: こだまの声の響きは確かに、\nオリヴィを懐かしく思い出させる。
2478 = "Sự vang vọng trong giọng nói của Kodama quả thực,\nđã gợi cho tôi những hoài niệm về Olivy."
# 【ポーレット】
# display as 波萊特
# JP: 「それで、あの――こだまちゃん、って。\nやっぱり、オリヴィちゃんの？」
2055 = "「Vậy, ừm――Bé Kodama.\nQuả nhiên là, của bé Olivy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1725 = "「!」"
# monologue
# JP: さすがは社長だ。\nいや、あるいはマニアの性であるのだろうか。
2284 = "Quả không hổ danh là Giám đốc.\nÀ không, hay có lẽ đó là bản tính của một người đam mê đường sắt chăng."
# monologue
# JP: この場でもなお、聞いてよいのか躊躇うことを、\n豪速球で、真正面から問いかけた。
2397 = "Một câu hỏi mà dù ở trong hoàn cảnh này vẫn khiến người ta do dự không biết có nên hỏi hay không,\ncô ấy lại ném thẳng một quả bóng tốc độ cao trực diện."
# 【電車姫】
# display as 電車公主
# JP: 「さて、の？」
2026 = "「Chà, ai biết được nhỉ?」"
# monologue
# JP: 電車姫様が扇子を広げる。\nその口元を覆い隠して、くふふと喉の奥で笑う。
2790 = "Densha Hime mở chiếc quạt giấy ra.\nChe khuất khóe miệng, cô ấy cười khúc khích trong cổ họng."
# 【電車姫】
# display as 電車公主
# JP: 「わらわが知るのは、ただただ噂話のみ。\n信憑性のカケラも感じぬ、ヨタ話ともいうべき、の」
1627 = "「Những gì ta biết, cũng chỉ là những lời đồn đại mà thôi.\nNên coi đó là những câu chuyện phiếm, chẳng có lấy một chút đáng tin cậy nào.」"
# 【ハチロク】
# display as 八六
# JP: 「それは――どのようなお噂なのでしょうか？」
2065 = "「Đó là――lời đồn đại như thế nào vậy ạ?」"
# 【電車姫】
# display as 電車公主
# JP: 「『百年以上を走り抜けた\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の\x%lタブレット;#00ffc040;タブレット%l;#;から、\n全く新しいロオドコアが精製された』であったかの？」
1611 = "「Hình như là 『Từ \x%lタブレット;#00ffc040;thẻ bảng%l;#; của một \x%lレイルロオド;#00ffc040;Railord%l;#; đã hoạt động hơn một trăm năm,\nmột Lõi Railord hoàn toàn mới đã được tinh chế ra』 thì phải?」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！！！」
2052 = "「!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それ……は――」
2056 = "「Chuyện đó……là――」"
# monologue
# JP: ロオドコア。\x%lタブレット;#00ffc040;タブレット%l;#;を\x%lタブレット;#00ffc040;タブレット%l;#;たらしめ\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を\x%lレイルロオド;#00ffc040;レイルロオド%l;#;たらしめている……
2307 = "Lõi Railord. Thứ làm cho \x%lタブレット;#00ffc040;thẻ bảng%l;#; trở thành \x%lタブレット;#00ffc040;thẻ bảng%l;#;\nlàm cho \x%lレイルロオド;#00ffc040;Railord%l;#; trở thành \x%lレイルロオド;#00ffc040;Railord%l;#;……"
# monologue
# JP: いうなれば、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の“魂”というべき何物か。\nそれが、オリヴィの\x%lタブレット;#00ffc040;タブレット%l;#;から精製されて――
2298 = "Nói cách khác, nó giống như là “linh hồn” của \x%lレイルロオド;#00ffc040;Railord%l;#; vậy.\nThứ đó, đã được tinh chế từ \x%lタブレット;#00ffc040;thẻ bảng%l;#; của Olivy――"
# 【こだま】
# display as 小玉
# JP: 「マスターマスター？\nロオドコアって、何？」
1235 = "「Master, Master?\nLõi Railord là gì vậy?」"
# 【宗方】
# display as 宗方
# JP: 「……さぁな。俺は知らんし――\n多分、だがな。知らんでいる方がいい代物だろう」
1301 = "「……Ai mà biết được. Tôi không biết――\nNhưng có lẽ. Tốt nhất là không nên biết về thứ đó đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はうっ！？」
1761 = "「Hau!?」"
# monologue
# JP: ポーレットが真っ赤になって口を押さえて、青くなる。\n……社長としての責任感では、なかったようだ。
2619 = "Mặt Paulette đỏ bừng, cô ấy đưa tay ôm miệng, rồi lại tái mét.\n……Có vẻ như đó không phải là do tinh thần trách nhiệm của một Giám đốc."
# 【こだま】
# display as 小玉
# JP: 「そっか！　じゃ、こだまもしらんでいるっ！！」
1958 = "「Ra vậy! Thế thì, Kodama cũng sẽ không thèm biết nữa!!」"
# 【宗方】
# display as 宗方
# JP: 「というか、いい加減に覚えてくれ。\n俺は、こだまのマスターじゃない」
2025 = "「Nói đúng hơn là, làm ơn nhớ cho kỹ giùm cái.\nTôi không phải là Master của Kodama.」"
# 【こだま】
# display as 小玉
# JP: 「わかった！　マスターはこだまのマスターじゃなーい」
1938 = "「Biết rồi! Master không phải là Master của Kodama~」"
# monologue
# JP: 元気な声に、れいながころころ笑い出す。
2694 = "Trước giọng nói tràn đầy năng lượng ấy, Reina bật cười khúc khích."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、こだまちゃん、おかしいですねぇ」
1696 = "「Fufu, bé Kodama, buồn cười quá nha~」"
# 【こだま】
# display as 小玉
# JP: 「え？　え？\nマスター、こだま、どっかおかしかった？」
1714 = "「Hả? Hả?\nMaster, Kodama có chỗ nào buồn cười hả?」"
# 【宗方】
# display as 宗方
# JP: 「……やれやれだ」
1286 = "「……Thiệt tình.」"
# monologue
# JP: 宗方さんが、ガラにも無いことにおどけてみせる。\n話を、変えようとしてくれている。
2464 = "Anh Munakata làm ra vẻ bông đùa không giống với bản tính thường ngày của anh ấy.\nAnh ấy đang cố gắng chuyển chủ đề."
# 【双鉄】
# display as 雙鐵
# JP: 「はははっ」
1708 = "「Hahaha.」"
# monologue
# JP: だから、笑う。\n僕だけではなく、みんなで笑う。
2548 = "Thế nên, tôi cười.\nKhông chỉ tôi, mà tất cả mọi người cùng cười."
# monologue
# JP: ――これほどの、いわば技術史が書き換わる程の出来事が、\n一切報道されていない、その現実の重みを深く感じつつ。
1184 = "――Một sự kiện lớn đến mức có thể viết lại cả lịch sử công nghệ,\nlại không hề được đưa tin, tôi cảm nhận sâu sắc sức nặng của hiện thực đó."
# 【ポーレット】
# display as 波萊特
# JP: 「宗方\x%l機関士;#00ffc040;機関士%l;#;――いえ、宗方さん。\n現役、引退されてしまったんですね」
1812 = "「\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata――À không, anh Munakata.\nAnh đã giải nghệ rồi nhỉ.」"
# monologue
# JP: 今度はしっかり、社長の顔だ。
2734 = "Lần này, cô ấy đã thể hiện rõ phong thái của một Giám đốc."
# monologue
# JP: ポーレットのタイミングの良い切り替えに、\n宗方さんの声もいくらか、やわらかになる。
2620 = "Sự chuyển đổi chủ đề đúng lúc của Paulette,\ncũng khiến giọng điệu của anh Munakata dịu đi đôi chút."
# 【宗方】
# display as 宗方
# JP: 「\x%l保線;#00ffc040;保線%l;#;の専門会社の方も、すぐ参加できずにすみません。\nですが」
1903 = "「Tôi cũng xin lỗi vì chưa thể tham gia ngay vào công ty chuyên về \x%l保線;#00ffc040;bảo trì đường ray%l;#;.\nNhưng mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。それは聞いています。みかん鉄道さんからの\n出向という形で、落ち着き次第でご参加いただけると」
1755 = "「À, vâng. Tôi đã nghe nói về chuyện đó rồi. Dưới hình thức biệt phái từ Đường sắt Mikan,\nngay khi sắp xếp ổn thỏa, anh sẽ tham gia cùng chúng tôi.」"
# 【宗方】
# display as 宗方
# JP: 「恐縮です」
1581 = "「Thật ngại quá.」"
# 【ポーレット】
# display as 波萊特
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;の方も、その絡みで？」
1871 = "「Việc anh làm \x%l機関士;#00ffc040;lái tàu%l;#; cũng là vì liên quan đến chuyện đó sao?」"
# monologue
# JP: 宗方さんは、ゆっくり頷く。
2466 = "Anh Munakata từ từ gật đầu."
# monologue
# JP: 確かに、出向で保線専門会社に勤めてくれるのであれば、\n本線の\x%l機関士;#00ffc040;機関士%l;#;もやるのは厳しかろう。
2647 = "Quả thực, nếu anh ấy làm việc cho công ty chuyên bảo trì đường ray dưới hình thức biệt phái,\nthì việc kiêm luôn cả vị trí \x%l機関士;#00ffc040;lái tàu%l;#; trên tuyến chính sẽ rất khó khăn."
# 【宗方】
# display as 宗方
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;の方は、教導を任されることになりました。\n御鉄さんから話をいただいていたおかげです」
2070 = "「Về phần \x%l機関士;#00ffc040;lái tàu%l;#;, tôi đã được giao nhiệm vụ chỉ dạy.\nCũng nhờ có lời đề nghị từ phía Đường sắt Ohito các cô cậu đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「宗方さんとお仕事ができないことは残念でしたが。\nみかん鉄道さんにとっては、よいことですよね」
2086 = "「Tuy rất tiếc vì không thể làm việc cùng anh Munakata.\nNhưng đối với Đường sắt Mikan thì đó là một điều tốt mà.」"
# 【宗方】
# display as 宗方
# JP: 「そう言ってもらえると――\nお世辞でしょうが、なんとも照れくさいもんですな」
1637 = "「Cậu nói vậy――\nDù chỉ là lời khách sáo, nhưng tôi cũng thấy ngại quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お世辞を言えるほど器用ではありませんよ」
1895 = "「Tôi không khéo léo đến mức biết nói lời khách sáo đâu.」"
# monologue
# JP: ……僕ら、御一夜鉄道は、オリヴィから既に受け取った。\n宗方さんが教えてくれた大事なことを、幾つも幾つも。
1221 = "……Đường sắt Ohito chúng tôi, đã nhận được từ Olivy.\nRất nhiều, rất nhiều những điều quan trọng mà anh Munakata đã truyền dạy."
# monologue
# JP: ゆえ、それを今まで評価してこなかったみ鉄さんが、\n改めて受け取る方が、正しく、鉄道のためになろう。
2605 = "Do đó, việc Đường sắt Mikan - những người từ trước đến nay chưa từng đánh giá cao điều đó,\nnay tiếp nhận lại nó, mới là điều đúng đắn và có ích cho ngành đường sắt."
# 【宗方】
# display as 宗方
# JP: 「……まさか、\nオリヴィに借りをつくるとは思わなかった」
1297 = "「……Không ngờ,\ntôi lại mang nợ Olivy.」"
# 【電車姫】
# display as 電車公主
# JP: 「ほう？　――借り、かの」
1759 = "「Hô? ――Mang nợ, sao.」"
# monologue
# JP: ……オリヴィが成し遂げてくれたことは、\n帝営放送のドキュメンタリーにまで取り上げられた。
1217 = "……Những gì Olivy đã hoàn thành,\nthậm chí còn được đài truyền hình quốc gia đưa tin làm phim tài liệu."
# monologue
# JP: 『勇敢なオリヴィのマスター』として、\n宗方さんは再評価され、引く手あまたの誘いを受けた。
2401 = "Với tư cách là 『Master của Olivy dũng cảm』,\nanh Munakata đã được đánh giá lại và nhận được vô số lời mời gọi."
# 【宗方】
# display as 宗方
# JP: 「借りですね。だから、返しますよ。\nこいつ――こだまに。オリヴィの遺した、全てのものに」
2050 = "「Là mang nợ đấy. Thế nên, tôi sẽ trả lại.\nCho con bé này――Kodama. Trả lại tất cả những gì Olivy đã để lại.」"
# 【電車姫】
# display as 電車公主
# JP: 「くふふっ、であらば、いつなりと相談には乗ろうぞ？」
1697 = "「Kufufu, nếu vậy, lúc nào ta cũng sẵn sàng cho ngươi lời khuyên nhé?」"
# 【宗方】
# display as 宗方
# JP: 「相談、ですか？」
1856 = "「Lời khuyên, sao ạ?」"
# 【電車姫】
# display as 電車公主
# JP: 「うむ。こだまの車両、破格の条件で手配しようぞ」
1774 = "「Ừm. Ta sẽ thu xếp toa xe cho Kodama với những điều kiện ưu đãi chưa từng có.」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
1738 = "「A!」"
# monologue
# JP: ハチロクが、納得したように小さく頷く。
2345 = "Hachiroku khẽ gật đầu như đã hiểu ra."
# 【ハチロク】
# display as 八六
# JP: 「こころがいまだ、随分とあどけないと感じましたが――\nこの子はまだ、白紙に近い状態なのですね？」
1879 = "「Em cảm thấy tâm trí của cô bé vẫn còn rất ngây thơ――\nĐứa trẻ này vẫn đang ở trạng thái gần như một tờ giấy trắng phải không ạ?」"
# 【電車姫】
# display as 電車公主
# JP: 「そう聞いておる。いかなる車両にも乗れるよう、\n車両を決めてからの……ふむ。教育・訓練を行うと」
1919 = "「Ta nghe nói vậy. Để có thể điều khiển bất kỳ toa xe nào,\nsau khi quyết định được toa xe……Hừm. Sẽ tiến hành giáo dục và huấn luyện.」"
# monologue
# JP: 教育・訓練。\nまるで人間に対するような言葉選びだ。
2559 = "Giáo dục, huấn luyện.\nCách dùng từ cứ như đang nói về con người vậy."
# monologue
# JP: こだまがどれほど大事に扱われているか、\nそんなことからも、伝わってくるように感じられる。
2490 = "Chỉ qua những lời đó thôi,\ncũng đủ thấy Kodama được đối xử trân trọng đến mức nào."
# 【電車姫】
# display as 電車公主
# JP: 「と、いうわけゆえ。\nの？　こだま。なにか、制御したい車両はあるかの？」
1921 = "「Lý do là vậy đó.\nSao nào? Kodama. Cháu có toa xe nào muốn điều khiển không?」"
# 【こだま】
# display as 小玉
# JP: 「あるよー！」
1965 = "「Có chứ~!」"
# monologue
# JP: 小気味よいほどの即答に、電車姫様が笑顔を浮かべる。\n口元を扇子で隠さぬままに、ニコニコされる。
2692 = "Trước câu trả lời nhanh gọn và dứt khoát ấy, Densha Hime mỉm cười.\nCô ấy cười rạng rỡ mà không hề dùng quạt che miệng."
# 【電車姫】
# display as 電車公主
# JP: 「ほほう、それはいかなる車両じゃ？\n[きゅうごう,1]Ⅸ号か？　[ハチロク,3]8620か？」
1704 = "「Hô hô, đó là toa xe như thế nào vậy?\nSố 9 ư? Hay là 8620?」"
# monologue
# JP: ふるふると、こだまは小さな首を振る。
2475 = "Kodama lắc lắc cái đầu nhỏ bé của mình."
# monologue
# JP: そして、ニッカリ――\nああ、オリヴィは、笑顔もこだまに遺したようだ。
2632 = "Rồi, nở một nụ cười rạng rỡ――\nÀ, có vẻ như Olivy cũng đã để lại nụ cười của mình cho Kodama."
# 【こだま】
# display as 小玉
# JP: 「あのね！　こだまは電車！\nとっきゅーけー電車の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;になるんだよ！」
1651 = "「Cháu nói cho mà nghe nhé! Kodama thích tàu điện!\nCháu sẽ trở thành \x%lレイルロオド;#00ffc040;Railord%l;#; của tàu điện tốc hành!」"
# 【日々姫】
# display as 日日姬
# JP: 「せっかくやけん！　家にとまっていけばよかとにー！」
1969 = "「Đã cất công đến đây rồi mà! Sao không ở lại nhà tụi em chơi!」"
# monologue
# JP: 日々姫が口を尖らせる。
2583 = "Hibiki bĩu môi."
# 【ハチロク】
# display as 八六
# JP: 「まぁまぁ、日々姫」
1806 = "「Thôi nào, Hibiki.」"
# monologue
# JP: 本気ではないと感じてだろう、\nハチロクの声は、幼子にいって聞かせるようだ。
2383 = "Có lẽ cảm nhận được rằng con bé không thực sự giận dỗi,\ngiọng nói của Hachiroku giống như đang dỗ dành một đứa trẻ."
# 【ハチロク】
# display as 八六
# JP: 「『御一夜で一番の温泉に泊まりたい』\nこだまちゃんが望んだことではございませんか」
1845 = "「『Muốn trọ lại suối nước nóng tốt nhất Ohimitera』\nĐó chẳng phải là mong muốn của bé Kodama sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「そりゃそーだけど……」
2007 = "「Thì đúng là vậy nhưng mà……」"
# monologue
# JP: 尻すぼみになる。\n沈黙する。
2442 = "Giọng nói nhỏ dần.\nRồi chìm vào im lặng."
# monologue
# JP: 足音だけが、人通りも少ない通りに響きわたる。
2379 = "Chỉ còn tiếng bước chân vang vọng trên con phố vắng người."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにと、ハチロクは――\nその…………」
2083 = "「Anh hai và Hachiroku――\nchuyện đó…………」"
# monologue
# JP: また、尻すぼみ。
2420 = "Lại ngập ngừng."
# monologue
# JP: 僕とて、わかっているつもりだ。\n日々姫が本当は何に対して、口を尖らせているのかを。
2521 = "Tôi cũng hiểu mà.\nThực sự thì Hibiki đang bĩu môi vì chuyện gì."
# 【ハチロク】
# display as 八六
# JP: 「こだまちゃんが、望んだことではございませんか」
2049 = "「Đó chẳng phải là mong muốn của bé Kodama sao.」"
# monologue
# JP: だから、ハチロクは繰り返す。\nおんなじ言葉を、ただ、繰り返す。
2547 = "Vì thế, Hachiroku lặp lại.\nChỉ đơn giản là lặp lại cùng một câu nói."
# 【日々姫】
# display as 日日姬
# JP: 「あー、うん。そだよね」
1727 = "「A, ừm. Đúng vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「けれど。\nああいや、“その上で”、だな」
1616 = "「Nhưng mà.\nÀ không, “hơn thế nữa” mới đúng.」"
# monologue
# JP: 自覚する。\n僕の声ははっきり、弾んでいる。
2539 = "Tôi tự nhận thức được.\nGiọng nói của tôi rõ ràng đang rất phấn khích."
# monologue
# JP: 無論、寂しい気持ちもあるが、\nその何倍も、何十倍も、何百倍も嬉しいゆえに。
2643 = "Tất nhiên là cũng có cảm giác cô đơn,\nnhưng niềm vui lại lớn hơn gấp bội, gấp chục lần, gấp trăm lần."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫には、まだ最高の絆が残っているではないか」
1930 = "「Chẳng phải Hibiki vẫn còn một mối liên kết tuyệt vời nhất sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「最高の絆――と？」
1962 = "「Mối liên kết tuyệt vời nhất――sao?」"
# 【ハチロク】
# display as 八六
# JP: 「ああ！　左様ですね。\n双鉄さまには叶いませんが、日々姫であれば」
1743 = "「A! Đúng vậy nhỉ.\nNgài Soutetsu thì không thể, nhưng nếu là Hibiki thì.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1738 = "「啊！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。日々姫であればきっとなれるさ。\nこだまの、未来のマスターに」
1778 = "「Ừm. Nếu là Hibiki thì chắc chắn có thể trở thành.\nMaster tương lai của Kodama.」"
# monologue
# JP: ニイロクほどに優秀な基本性能の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でも、\nデータをまるごと受け取っただけでは習熟に至らなかった。
2364 = "Ngay cả một \x%lレイルロオド;#00ffc040;Railord%l;#; có hiệu suất cơ bản xuất sắc như Niiroku,\ncũng không thể thành thạo chỉ bằng việc tiếp nhận toàn bộ dữ liệu."
# monologue
# JP: まったくブランクな\x%lレイルロオド;#00ffc040;レイルロオド%l;#;であるというこだまが、\n一線級になるまでは、それなりに時間がかかろうし――
2683 = "Một \x%lレイルロオド;#00ffc040;Railord%l;#; hoàn toàn là tờ giấy trắng như Kodama,\nsẽ phải mất một khoảng thời gian nhất định để trở thành hạng nhất――"
# 【双鉄】
# display as 雙鐵
# JP: 「老眼も、宗方さんのご引退の一因との話だ。\n現実問題、宗方さんとこだまの乗務は、ありえまい」
2015 = "「Nghe nói chứng lão thị cũng là một trong những nguyên nhân khiến anh Munakata giải nghệ.\nTrên thực tế, việc anh Munakata và Kodama cùng làm việc là điều không thể.」"
# 【日々姫】
# display as 日日姬
# JP: 「それでも……宗方さんには。添乗ででも、教導ででも、\nこだまちゃんのデビューの時には乗ってあげて欲しかと」
1663 = "「Dù vậy……em vẫn mong anh Munakata.\nDù là đi cùng hay chỉ dạy, hãy lên tàu cùng bé Kodama trong ngày ra mắt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1782 = "「嗯？」" 
# 【日々姫】
# display as 日日姬
# JP: 「こだまちゃんと組む\x%l運転士;#00ffc040;運転士%l;#;さんは、\nめっぽう緊張しちゃいそうやけど！」
1589 = "「Người \x%l運転士;#00ffc040;lái tàu%l;#; hợp tác cùng bé Kodama,\nchắc chắn sẽ căng thẳng lắm đây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ……まるで[ひとごと,2]他人事のような言い方だな」
1603 = "「Sao thế……cứ nói như thể chuyện của người khác vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「[ひとごと,2]他人事よ？　だってそれこそ、\nこだまちゃんが言うたことでしょお」
1943 = "「Chuyện của người khác mà? Bởi vì đó chính là,\nnhững gì bé Kodama đã nói đấy thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「あ！　――『[とっきゅうけい,2]特急形電車の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;』と」
1734 = "「A! ――『\x%lレイルロオド;#00ffc040;Railord%l;#; của tàu điện tốc hành』 nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そそ。私は蒸気\x%l機関士;#00ffc040;機関士%l;#;だし――\n術仙工場のこともあるけん、御一夜ば、離れられんし」
1839 = "「Đúng đúng. Em là \x%l機関士;#00ffc040;lái tàu%l;#; hơi nước mà――\nCòn chuyện của nhà máy Jutsusen nữa, em không thể rời khỏi Ohimitera được.」"
# monologue
# JP: 言って、日々姫は空を見上げる。
2716 = "Nói rồi, Hibiki ngước nhìn lên bầu trời."
# 【日々姫】
# display as 日日姬
# JP: 「電化なんて、湯医線でも[おこば,1]小畑線でもできんでしょう。\nどーやったって採算とれなくなるけん」
1987 = "「Việc điện khí hóa, cả tuyến Yui lẫn tuyến Okoba đều không thể làm được đâu.\nDù làm cách nào thì cũng không thể thu hồi vốn được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……それは、まぁ、そうかもしれんが」
1304 = "「……Chuyện đó thì, ừm, có lẽ là vậy.」"
# monologue
# JP: 全線電化。かつての帝鉄が掲げた目標。\nけれど鉄道を\x%l保線;#00ffc040;保線%l;#;を知るうち、それは叶わぬ夢だと知った。
2338 = "Điện khí hóa toàn tuyến. Mục tiêu mà Đường sắt Hoàng gia từng đề ra.\nNhưng khi tìm hiểu về \x%l保線;#00ffc040;bảo trì đường ray%l;#;, tôi nhận ra đó là một giấc mơ không thể thành hiện thực."
# monologue
# JP: 小畑線の様な極めて厳しい山線に、全線電化をしたとても、\n保線修復のコストで絶対、採算が取れなくなってしまうと。
2332 = "Đối với một tuyến đường núi cực kỳ hiểm trở như tuyến Okoba, dù có điện khí hóa toàn tuyến,\nthì chi phí bảo trì và sửa chữa đường ray chắc chắn sẽ khiến việc thu hồi vốn là điều không thể."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、湯医線でなら望みがあろう。\n沿線人口が順調に増え、[おおいた,1]大板方面に延伸し――」
1622 = "「Nhưng nếu là tuyến Yui thì vẫn còn hy vọng.\nDân số dọc tuyến đường đang tăng đều đặn, nếu kéo dài về phía Oita――」"
# 【日々姫】
# display as 日日姬
# JP: 「そうなるまでに、私も引退しちゃっとるけん」
1658 = "「Đến lúc đó thì em cũng giải nghệ mất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか。\nそれを言われると、時間的には厳しいかもしれんなぁ」
1764 = "「À……Ra vậy.\nNghe em nói thế, về mặt thời gian có lẽ sẽ hơi khó khăn nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「でしょ？」
1838 = "「Đúng không?」"
# monologue
# JP: とん、っと日々姫は大きな一歩。\n跳ねるというより地面を蹴った、そんな一歩だ。
2580 = "Bịch, Hibiki bước một bước dài.\nĐó là một bước chân đạp mạnh xuống đất hơn là một cú nhảy."
# 【日々姫】
# display as 日日姬
# JP: 「けど、うん。にぃにのおかげで、前向けた。\nわたし、こだまちゃんと走れるかもしれんって」
1620 = "「Nhưng mà, vâng. Nhờ có anh hai, em đã có thể hướng về phía trước.\nRằng có lẽ em sẽ được chạy cùng bé Kodama.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ！」
1784 = "「Hửm? À!」"
# monologue
# JP: じゃん、と日々姫は、スケッチブックを開いて見せる。\nまだ真っ白の――これからなんでも描けるページを。
2590 = "Tèn ten, Hibiki mở cuốn sổ phác thảo ra cho chúng tôi xem.\nMột trang giấy vẫn còn trắng tinh――một trang giấy mà từ giờ em ấy có thể vẽ bất cứ thứ gì lên đó."
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。ええ！　日々姫でしたら！」
1979 = "「Đúng vậy nhỉ. Vâng! Nếu là Hibiki thì chắc chắn được!」"
# 【日々姫】
# display as 日日姬
# JP: 「こだまちゃんの特急電車。\nわたし、勉強してデザインばして！」
1902 = "「Tàu điện tốc hành của bé Kodama.\nEm sẽ học hỏi và thiết kế nó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――素晴らしいな」
1246 = "「――Tuyệt vời lắm.」"
# monologue
# JP: 子供をつくる。子孫をのこす。\nその意味を、もう少しだけ、わかった気がする。
2675 = "Sinh con đẻ cái. Để lại hậu duệ.\nTôi có cảm giác mình đã hiểu thêm một chút về ý nghĩa của điều đó."
# monologue
# JP: こだまのことを語るとき、僕らはオリヴィを語っている。\nオリヴィは――こだまとともに、在り続けている。
2555 = "Khi nhắc đến Kodama, chúng tôi cũng đang nhắc đến Olivy.\nOlivy――vẫn đang tiếp tục tồn tại cùng với Kodama."
# 【ハチロク】
# display as 八六
# JP: 「はい。とても幸せな未来図ですね」
1954 = "「Vâng. Quả là một bức tranh tương lai ngập tràn hạnh phúc nhỉ.」"
# monologue
# JP: ……不死鳥博士の技術が定着するのであれば、\nハチロクと僕も子供をのこせる。
1218 = "……Nếu công nghệ của Tiến sĩ Phượng Hoàng được áp dụng rộng rãi,\ntôi và Hachiroku cũng có thể để lại những đứa con."
# monologue
# JP: \x%lタブレット;#00ffc040;タブレット%l;#;からの精製は、機能停止後と同義であろうが、\nそうであっても、僕らは、僕らで、未来を繋げる。
2509 = "Việc tinh chế từ \x%lタブレット;#00ffc040;thẻ bảng%l;#; có lẽ đồng nghĩa với việc chức năng đã ngừng hoạt động,\nnhưng dù vậy, chúng tôi vẫn có thể tự mình kết nối với tương lai."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
# 2091 = "「雙鐵少爺？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「すず」
2075 = "「Suzu.」"
# monologue
# JP: それが、嬉しい。\n寂しさよりも、何倍も、何十倍も、何百倍も。
2735 = "Điều đó, khiến tôi cảm thấy vui sướng.\nHơn cả sự cô đơn, gấp vạn lần, gấp chục lần, gấp trăm lần."
# monologue
# JP: いのちの意味は、決してひとつではなかろうが――\nその一欠片の本当を、僕とすずとで、掴んだ気がして。
2781 = "Ý nghĩa của sinh mệnh, tuyệt đối không chỉ có một――\nNhưng tôi có cảm giác, tôi và Suzu đã nắm bắt được một mảnh chân lý của điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「僕らも、きっと生命をつなごう」
1892 = "「Chúng ta cũng vậy, nhất định hãy cùng nhau tiếp nối sinh mệnh nhé.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。双鉄さま。\nわたくしは、必ず、双鉄さまと――」
1956 = "「Vâng. Ngài Soutetsu.\nEm nhất định, sẽ cùng Ngài Soutetsu――」"
# monologue
# JP: 言葉など、もう必要ない。\nすずと僕との視線がまっすぐ――
2610 = "Không cần đến lời nói nữa.\nÁnh mắt của tôi và Suzu hướng thẳng――"
# 【日々姫】
# display as 日日姬
# JP: 「あ？　私お邪魔？」
1757 = "「A? Em đang kỳ đà cản mũi hả?」"
# 【双鉄】
# display as ２人
# JP: 「っ！！？」\n「きゃっ！」
1746 = "「!!?」\n「Kya!」"
# monologue
# JP: ――まっすぐ日々姫に向けられる。
1180 = "――hướng thẳng về phía Hibiki."
# monologue
# JP: 日々姫はいたずらな笑顔を浮かべ、\nぺろりと小さく舌を出す。
2595 = "Hibiki nở một nụ cười tinh nghịch,\nkhẽ thè lưỡi ra."
# 【日々姫】
# display as 日日姬
# JP: 「なら、さき帰っとるけーん！！」
2063 = "「Nếu vậy thì, em về trước đây!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ！　おい、日々姫っ！？」
1740 = "「A! Này, Hibiki!?」"
# monologue
# JP: （どしっ！）
2816 = "（Bịch!）"
# 【日々姫】
# display as 日日姬
# JP: 「きゃっ！！？」
1686 = "「Kya!!?」"
# 【ひよこ】
# display as ？？？
# JP: 「おおっと」
# 1709 = "「哎呀」" 
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「日々姫！」\n「日々姫！？」
1927 = "「Hibiki!」\n「Hibiki!?」"
# monologue
# JP: ああもう、急に駆け出すからだ。
2652 = "Trời ạ, tự dưng chạy thục mạng làm gì cơ chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、どうした？　怪我はないか――っ！！！」
1932 = "「Hibiki, sao thế? Có bị thương không――!!!」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？　――あっっ！！」
2090 = "「Ngài Soutetsu? ――A!!」"
# 【ひよこ】
# display as 不死鳥
# JP: 「やぁ。ちょうどいいところへいらっしゃいましたな。\nいやいや、タクシーを拾えばよかった」
1687 = "「Chà. Hai người đến đúng lúc lắm.\nÂy da, biết thế tôi gọi taxi cho rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「不死鳥……博士」
1582 = "「Tiến sĩ……Phượng Hoàng.」"
# monologue
# JP: 不死鳥博士だ。\nそしてその影で、何か……誰かがこそこそしている。
2600 = "Là Tiến sĩ Phượng Hoàng.\nVà đằng sau cái bóng đó, có thứ gì đó……có ai đó đang lén lút."
# monologue
# JP: 人見知りをしているのだろうか？\n大して背丈の変わらない不死鳥博士に隠れるように――
2742 = "Chắc là đang sợ người lạ chăng?\nCứ như đang cố trốn sau lưng Tiến sĩ Phượng Hoàng, người có vóc dáng cũng chẳng cao hơn là bao――"
# 【ひよこ】
# display as 不死鳥
# JP: 「地図上で距離は把握しておりましたが。\nいやはやこの子が、もうまっしぐらに駆け出すもので」
2088 = "「Tôi đã nắm được khoảng cách trên bản đồ rồi.\nNhưng chà, đứa trẻ này cứ thế mà cắm đầu chạy thục mạng.」"
# 【ハチロク】
# display as 八六
# JP: 「あ……あっ――」
1732 = "「A……a――」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに――このこ――」
2079 = "「Anh hai――đứa bé này――」"
# monologue
# JP: 瞳の色は同じだけれど、\n髪は濃い金――茶色に近い。
2782 = "Màu mắt thì giống nhau,\nnhưng mái tóc lại có màu vàng đậm――gần như là màu nâu."
# monologue
# JP: 外見的に、こだまほどには似ていない。\nだからといって――見間違えよう筈もない。
2413 = "Về ngoại hình, không giống Olivy bằng Kodama.\nNhưng dù vậy――tôi cũng không thể nào nhìn nhầm được."
# 【ひよこ】
# display as 不死鳥
# JP: 「無論、手元で育てたくはありました。なにせ貴重な、\n一枚の\x%lタブレット;#00ffc040;タブレット%l;#;からの、ふたつのロオドコアの精製例」
1995 = "「Tất nhiên là tôi muốn tự tay nuôi dưỡng con bé rồi. Dù sao đây cũng là một trường hợp vô cùng quý giá,\ntinh chế ra hai Lõi Railord từ một \x%lタブレット;#00ffc040;thẻ bảng%l;#; duy nhất cơ mà.」"
# monologue
# JP: 不死鳥博士が、なにかいっている。\n聞こえているが、意味を取れない。
2779 = "Tiến sĩ Phượng Hoàng đang nói gì đó.\nTôi có nghe thấy, nhưng lại không thể hiểu được ý nghĩa."
# monologue
# JP: ただひとつしか、ただひとつしか、ただひとつしか。\nこころに、言葉が浮かんでこない。
2377 = "Chỉ có một điều duy nhất, chỉ có một điều duy nhất, chỉ có một điều duy nhất.\nHiện lên trong tâm trí tôi lúc này."
# 【ひよこ】
# display as 不死鳥
# JP: 「『おうちかえる』と、いやもう、それしか口にしない。\nさすがにそれでは、育成も何もありませんですからな」
1618 = "「『Muốn về nhà』, ôi trời, con bé chỉ nói mỗi câu đó thôi.\nThế này thì làm sao mà giáo dục hay huấn luyện gì được cơ chứ.」"
# 【のぞみ】
# display as ？？？
# JP: 「おうち、ここ」
1830 = "「Nhà, ở đây.」"
# monologue
# JP: 不死鳥博士の長広舌に焦れたのか\n焦れったそうに前に出て――っ！！
2380 = "Có lẽ vì sốt ruột trước bài diễn văn dài dòng của Tiến sĩ Phượng Hoàng,\ncô bé sốt sắng bước lên phía trước――!!"
# 【日々姫】
# display as ３人
# JP: 「おかえりっ！」「おかえり」\n「おかえりなさいっ」
1974 = "「Mừng em về nhà!」「Mừng em về nhà.」\n「Mừng em về nhà!」"
# 【のぞみ】
# display as ？？？
# JP: 「わわっ！？」
1707 = "「Oa oa!?」"
# monologue
# JP: 三人に一度に抱きしめられては、それはもちろん驚こう。\nけれど、離れることができない。
2283 = "Bị ba người ôm chầm lấy cùng một lúc, tất nhiên là cô bé sẽ ngạc nhiên rồi.\nNhưng mà, tôi không thể buông tay ra được."
# monologue
# JP: よくぞ帰ってきてくれたと、\n今はもう、その思いだけでいっぱいで――
2328 = "Thật tốt vì em đã trở về,\nlúc này đây, trong lòng tôi chỉ tràn ngập suy nghĩ đó――"
# monologue
# JP: （がらっ）
2818 = "（Cạch）"
# 【真闇】
# display as 真闇
# JP: 「なんねぇ。お店の真ん前で――あらまぁ」
1865 = "「Chuyện gì thế này. Ngay trước cửa tiệm――Ây da.」"
# monologue
# JP: ふんわり、いつもの真闇姉の声。\n僕らをつつんでくれる声。
2745 = "Một giọng nói dịu dàng, quen thuộc của chị Mayami.\nGiọng nói luôn bao bọc lấy chúng tôi."
# monologue
# JP: 抱きしめている腕の中、\n固くなっていた体がふわっと、やわらかになる。
2530 = "Trong vòng tay đang ôm chặt của tôi,\ncơ thể vốn đang cứng đờ bỗng trở nên mềm mại."
# 【真闇】
# display as 真闇
# JP: 「はじめまして、おチビちゃん。\nほんで、ね？　『おかえりなさい』」
1653 = "「Lần đầu gặp mặt, cô bé hạt tiêu.\nVà, ừm? 『Mừng em về nhà』 nhé.」"
# 【のぞみ】
# display as ？？？
# JP: 「うんっ！　ただいまっ！」
1769 = "「Vâng! Em đã về rồi đây!」"
# monologue
# JP: 動こうとするから手をゆるめれば、\nああ――本当に一直線だ。
2417 = "Cô bé định cử động nên tôi nới lỏng tay ra,\nÀ――Cô bé chạy thẳng một mạch."
# monologue
# JP: 駆けていく。\n迷うことなく、僕らの家へ帰ってく。
2612 = "Cô bé cắm cúi chạy.\nKhông chút do dự, trở về ngôi nhà của chúng tôi."
# 【のぞみ】
# display as ？？？
# JP: 「I'm back home!!!」
2105 = "「I'm back home!!!」"
