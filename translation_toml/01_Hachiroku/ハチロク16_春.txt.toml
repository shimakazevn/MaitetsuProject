1611 = "「似是“從馳騁百年以上的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的\\x%lタブレット;#00ffc040;操作板%l;#;中，提取製造出了全新的人偶核”云云？」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！！！」
2052 = "「這！！！！」" 

# 【双鉄】
# display as 雙鐵
