# JP: いのちの意味は、決してひとつではなかろうが――\nその一欠片の本当を、僕とすずとで、掴んだ気がして。
2781 = "雖然生命的意義絕不會只有一個——但我感覺，我和鈴彷彿抓住了某個真實的碎片。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らも、きっと生命をつなごう」
1892 = "「我們一定也能孕育新的生命」" 

# 【ハチロク】
# display as 鈴
# JP: 「はい。双鉄さま。\nわたくしは、必ず、双鉄さまと――」
1956 = "「是啊。雙鐵少爺。我一定會和你——」" 

# monologue
# JP: 言葉など、もう必要ない。\nすずと僕との視線がまっすぐ――
2610 = "此時無聲勝有聲。我和鈴對視著——" 

# 【日々姫】
# display as 日日姬
# JP: 「あ？　私お邪魔？」
1757 = "「啊？我當電燈泡了？」" 

# 【双鉄】
