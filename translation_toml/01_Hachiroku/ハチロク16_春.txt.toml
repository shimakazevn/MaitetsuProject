# monologue
# JP: 言って、日々姫は空を見上げる。
2716 = "說著，日日姬仰望天空。" 

# 【日々姫】
# display as 日日姬
# JP: 「電化なんて、湯医線でも[おこば,1]小畑線でもできんでしょう。\nどーやったって採算とれなくなるけん」
1987 = "「湯醫線和大畑線的電力化又沒辦法完成。反正是回不了本的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……それは、まぁ、そうかもしれんが」
1304 = "「……這個，是你說的這樣沒錯」" 

# monologue
# JP: 全線電化。かつての帝鉄が掲げた目標。\nけれど鉄道を\x%l保線;#00ffc040;保線%l;#;を知るうち、それは叶わぬ夢だと知った。
2338 = "全線電力化，是曾經的帝國鐵路提出的目標。但是，當我知道鐵路需要\\x%l保線;#00ffc040;巡線%l;#;之後，就明白了那是不可能實現的夢想。" 

# monologue
# JP: 小畑線の様な極めて厳しい山線に、全線電化をしたとても、\n保線修復のコストで絶対、採算が取れなくなってしまうと。
2332 = "像大畑線那種非常險峻的山道，即使實現了全線電力化，巡線修復的成本也會高到無法承受的地步。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、湯医線でなら望みがあろう。\n沿線人口が順調に増え、[おおいた,1]大板方面に延伸し――」
1622 = "「但是，湯醫線的話還有希望。如果沿線人口順利增加，能延伸到大分方向——」" 

# 【日々姫】
# display as 日日姬
# JP: 「そうなるまでに、私も引退しちゃっとるけん」
1658 = "「到那會兒，我早就引退了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか。\nそれを言われると、時間的には厳しいかもしれんなぁ」
1764 = "「嗯——對啊。這樣說來，時間可能太嚴峻了」" 

# 【日々姫】
# display as 日日姬
# JP: 「でしょ？」
1838 = "「對吧？」" 

# monologue
# JP: とん、っと日々姫は大きな一歩。\n跳ねるというより地面を蹴った、そんな一歩だ。
2580 = "日日姬向前走了一大步。那是咚的一聲，重重踏向地板的一步。" 

# 【日々姫】
# display as 日日姬
# JP: 「けど、うん。にぃにのおかげで、前向けた。\nわたし、こだまちゃんと走れるかもしれんって」
1620 = "「但是，嗯。多虧了阿哥，我才能這麼樂觀。說不定我能和小玉一起執行乘務呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ああ！」
1784 = "「嗯？對！」" 

# monologue
# JP: じゃん、と日々姫は、スケッチブックを開いて見せる。\nまだ真っ白の――これからなんでも描けるページを。
2590 = "日日姬說著，打開素描簿給我看。那是空白的紙頁——任她描繪的未來。" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。ええ！　日々姫でしたら！」
1979 = "「正是這樣。沒錯！日日姬一定行！」" 

# 【日々姫】
# display as 日日姬
# JP: 「こだまちゃんの特急電車。\nわたし、勉強してデザインばして！」
1902 = "「我會努力學習，好好設計小玉的特快電車的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――素晴らしいな」
1246 = "「——太棒了」" 

# monologue
# JP: 子供をつくる。子孫をのこす。\nその意味を、もう少しだけ、わかった気がする。
2675 = "結婚生子、繁衍不息。感覺我更深地了解了這個行為的意義。" 

# monologue
# JP: こだまのことを語るとき、僕らはオリヴィを語っている。\nオリヴィは――こだまとともに、在り続けている。
2555 = "提起小玉的時候，我們就等於是在提起奧莉薇。奧莉薇——她會一直與小玉同在。" 

# 【ハチロク】
# display as 八六
# JP: 「はい。とても幸せな未来図ですね」
1954 = "「是啊。這真是幸福的未來藍圖」" 

# monologue
# JP: ……不死鳥博士の技術が定着するのであれば、\nハチロクと僕も子供をのこせる。
1218 = "……如果不死鳥博士的技術能投入實際應用，我和八六之間，就能誕生出新的生命。" 

# monologue
# JP: \x%lタブレット;#00ffc040;タブレット%l;#;からの精製は、機能停止後と同義であろうが、\nそうであっても、僕らは、僕らで、未来を繋げる。
2509 = "想要由鐵路人偶的\\x%lタブレット;#00ffc040;操作板%l;#;提取製造出新的人偶核，就必須等鐵路人偶停止活動，但即便如此，我們也能讓未來延續下去。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
# 2091 = "「雙鐵少爺？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すず」
2075 = "「鈴」" 

# monologue
# JP: それが、嬉しい。\n寂しさよりも、何倍も、何十倍も、何百倍も。
2735 = "這讓我好高興。比起感到的寂寞，幾倍、幾十倍、幾百倍地高興。" 

