2328 = "你能回來真是太好了——我的心裡充滿了這個想法。" 

# monologue
# JP: （がらっ）
2818 = "（噹啷）" 

# 【真闇】
# display as 真闇
# JP: 「なんねぇ。お店の真ん前で――あらまぁ」
1865 = "「怎麼了。在人家店門口兒——哎呀」" 

# monologue
# JP: ふんわり、いつもの真闇姉の声。\n僕らをつつんでくれる声。
2745 = "那是真闇姐一如往常溫柔的聲音——一直以來溫暖著我們的聲音。" 

# monologue
# JP: 抱きしめている腕の中、\n固くなっていた体がふわっと、やわらかになる。
2530 = "我感到懷抱中僵硬的身體，忽然變得放鬆下來了。" 

# 【真闇】
# display as 真闇
# JP: 「はじめまして、おチビちゃん。\nほんで、ね？　『おかえりなさい』」
1653 = "「初次見面，小不點。是不是應該說“歡迎回來”？」" 

# 【のぞみ】
# display as ？？？
# JP: 「うんっ！　ただいまっ！」
1769 = "「嗯！我回來了！」" 

# monologue
# JP: 動こうとするから手をゆるめれば、\nああ――本当に一直線だ。
2417 = "她動了動，於是我放鬆了手。啊——她徑直地奔了過去。" 

# monologue
# JP: 駆けていく。\n迷うことなく、僕らの家へ帰ってく。
2612 = "毫不猶豫地，回到我們的家。" 

# 【のぞみ】
# display as ？？？
# JP: 「I'm back home!!!」
2105 = "「Ｉ＇ｍ　ｂａｃｋ　ｈｏｍｅ！！！」" 
