# 【宗方】
# display as 宗方
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;の方は、教導を任されることになりました。\n御鉄さんから話をいただいていたおかげです」
2070 = "「那邊的\\x%l機関士;#00ffc040;司機%l;#;也交給我來帶了。這都是多虧了御鐵這邊向我提出的邀請」" 

# 【双鉄】
# display as 雙鐵
# JP: 「宗方さんとお仕事ができないことは残念でしたが。\nみかん鉄道さんにとっては、よいことですよね」
2086 = "「雖然不能跟宗方先生一起工作很遺憾，但是這對於橙鐵路來說是件好事吧」" 

# 【宗方】
# display as 宗方
# JP: 「そう言ってもらえると――\nお世辞でしょうが、なんとも照れくさいもんですな」
1637 = "「你能這麼說——雖然可能是客套話，但是我總覺得有點不好意思」" 

# 【双鉄】
# display as 雙鐵
