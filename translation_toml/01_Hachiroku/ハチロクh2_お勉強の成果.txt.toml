# JP: 口の天井をぞろりと舐めて、内側全部を舌で這ってく。\n湧き出た僕のよだれを吸い込み、喉へと落とす。
1450 = "她舔了舔我的嘴巴上緣，用舌頭掃過我的口中。她吸掉了我淌出的唾液，吞了下去。" 

# 【ハチロク】
# display as 鈴
