1388 = "Tí tách, những giọt nước rỉ ra từ bên trong,\nchảy dọc theo chiếc quần lót, kéo thành sợi rồi rơi xuống."
# 【ハチロク】
# display as 鈴
# JP: 「そ、そこは、クリトリス、と申しまして。\n女の子の、性感のためだけの機能だそうです」
1167 = "「Đó, đó gọi là âm vật ạ.\nLà bộ phận chỉ dành riêng cho khoái cảm của con gái thôi ạ」"
