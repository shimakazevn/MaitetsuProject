# 【ハチロク】
# display as 鈴
# JP: 「ひゃんっ！　んっ！　あたって――あっ！\nコツって――奥っ――あふっ――おまんまん、のっ」
966 = "「Hya! Ưm! Chạm rồi——a!\nCộc một cái——sâu quá——a phù——cô bé, của em」"
# monologue
# JP: （ずぶっ！　ずにゅっ！　ずぼっ！　ぼちゅんっ！）
1719 = "（Phập! Sột sột! Phập! Bục!）"
# 【ハチロク】
# display as 鈴
# JP: 「はっ――あっ――双鉄さまっ――双鉄様ぁ」
979 = "「Ha——a——Ngài Soutetsu——Ngài Soutetsu」"
# monologue
# JP: 甘えた声、半開きの口、のぞいている舌。
1552 = "Giọng nói nũng nịu, đôi môi hé mở, chiếc lưỡi lấp ló."
# monologue
# JP: 請われるままか、望むまま――\nどちらでも同じキスをする。
1503 = "Là do được cầu xin, hay do mong muốn——\nDù là gì thì tôi cũng trao một nụ hôn tương tự."
# 【ハチロク】
# display as 鈴
# JP: 「あっ――んむっ――れるっ――むちゅっ」
993 = "「A——ưm mư——liếm——chu mút」"
# monologue
# JP: キスの間も、小刻みに腰を動かし続ける。
1548 = "Ngay cả khi đang hôn, tôi vẫn tiếp tục di chuyển hông nhịp nhàng."
# monologue
# JP: ハチロクの舌がその度ふるえ、\n僕の舌にもゆるい快感を与えてくれる。
1359 = "Lưỡi Hachiroku mỗi lần như thế lại run rẩy,\nmang đến cho lưỡi tôi một khoái cảm lâng lâng."
# 【ハチロク】
# display as 鈴
# JP: 「あ……ぷあっ……あ――キス――好き……」
1006 = "「A……phù a……a——Hôn——thích quá……」"
# 【双鉄H】
# display as 雙鐵
# JP: 「好きなのは、キスだけか？」
1027 = "「Em chỉ thích hôn thôi sao?」"
# monologue
# JP: （さすっ）
# 1759 = "（摸）" 
# 【ハチロク】
# display as 鈴
# JP: 「んひゅっ！　好き、すきすき、おてても、\n指――もっ」
1053 = "「Ưm hưm! Thích, thích lắm, cả bàn tay,\ncả ngón tay——nữa」"
# monologue
# JP: （ずばっ！　ぐりっ！　こりゅっ！）
1731 = "（Phập! Ngoáy! Lăn!）"
# 【ハチロク】
# display as 鈴
# JP: 「んああっ！　おちん、ちんっ――ごりって、\nおまんまん、して、くれる、おちんちん、もっ！」
1056 = "「Ưm a! Cậu, bé——cậu bé đang, ngoáy mạnh\ntrong cô bé, của em, em cũng thích!」"
# monologue
# JP: （ずぶっ！　ずばっ！　じゅにゅっ！　ずりゅんっ！）
1720 = "（Phập! Phập! Sột sột! Trượt!）"
# 【ハチロク】
# display as 鈴
# JP: 「好き！　あ――す、好きっ――ですぅっ――\nんっ！　双鉄様、のっ――全部――全部がっ！」
1028 = "「Thích! A——thi, thích——lắm ạ——\nƯm! Của ngài Soutetsu——tất cả——tất cả mọi thứ!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕も――すずの全部が好きだ」
1097 = "「Anh cũng——thích tất cả mọi thứ của Suzu」"
# 【ハチロク】
# display as 鈴
# JP: 「あっ！」
# 1015 = "「啊！」" 
# monologue
# JP: （きゅんっ！　きゅきゅっ！）
1733 = "（Siết! Siết chặt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 987 = "「唔！」" 
# monologue
# JP: 締め付け、ではなく、抱きついてくる、張り付いてくる。\n甘えて、もたれかかってくる。
1670 = "Không phải là siết chặt, mà là ôm lấy, bám chặt lấy.\nNũng nịu, dựa dẫm vào."
# monologue
# JP: すずの膣肉は僕の勃起を離さぬように、\nいっそひとつになってしまおうと溶けてくる。
1646 = "Lớp thịt âm đạo của Suzu như không muốn rời xa phần cương cứng của tôi,\nnhư muốn hòa làm một, tan chảy ra."
# 【双鉄H】
# display as 雙鐵
# JP: 「――ぅあっ」
719 = "「——ư a」"
# monologue
# JP: 息が、こぼれる。
1505 = "Hơi thở, buột ra."
# monologue
# JP: 甘く蠢く肉ヒダが、勃起を抱きしめ絞り続けて、\n体全部が緩んでしまって、声さえ制御できなくなる。
1616 = "Những nếp gấp thịt ngọt ngào cựa quậy, liên tục ôm ấp và siết chặt phần cương cứng,\nkhiến toàn thân tôi rã rời, đến mức không thể kiểm soát được giọng nói."
# 【双鉄H】
# display as 雙鐵
# JP: （これっ――は）
1767 = "（Thế này——thì）"
# monologue
# JP: 保たない。もうすぐ射精する。\nならば、すずも――すずも一緒に。
1549 = "Không trụ nổi nữa. Sắp xuất tinh mất rồi.\nVậy thì, Suzu cũng——Suzu cũng cùng nhau nhé."
# monologue
# JP: その願いだけでなんとか引き締め、\n願いと力を腰へと込める！
1489 = "Chỉ với mong muốn đó, tôi cố gắng kìm nén,\ndồn hết tâm nguyện và sức lực vào hông!"
# monologue
# JP: （ずっ――じゅっぶっ！　ずばっ！　ズパンっ！）
1718 = "（Phập——sột sột! Phập! Phập!）"
# 【ハチロク】
# display as 鈴
# JP: 「あひっ――んっ！　双鉄様っ！　双鉄さまぁっ！\nすごっ――奥っ――あたってっ――ごつんっって！」
995 = "「A hi——ưm! Ngài Soutetsu! Ngài Soutetsu!\nTuyệt quá——sâu quá——chạm vào rồi——cộc một cái!」"
# monologue
# JP: （ずばっ！　じゅぶるっ！　じゅっ！　ずちゅんっ！」
1730 = "（Phập! Sột sột! Chụt! Phập!）"
# monologue
# JP: すずの体はガクガク揺れてほとんど弾んでしまってる。
1645 = "Cơ thể Suzu rung bần bật, gần như nảy lên."
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ――すごっ――んっ――あっ――ああっ！\nくっ――来ますっ――まっしろなっ――おっきい、のっ」
976 = "「Phù a——tuyệt quá——ưm——a——a a!\nHự——đến đây——thứ gì đó trắng xóa——to lớnっ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕も、だ――」
1102 = "「Anh cũng, vậy——」"
# monologue
# JP: もう、止まらないし、止まれない。\n僕もハチロクも、ギリギリにまで上り詰めてる。
1344 = "Không dừng lại nữa, và cũng không thể dừng lại được.\nCả tôi và Hachiroku đều đã leo lên đến tận cùng giới hạn."
# monologue
# JP: どうせなら、一秒もズレず達したい。\nその欲望が、学んだ知識と交じり合い――
1612 = "Đằng nào cũng vậy, tôi muốn đạt đỉnh cùng một lúc không lệch một giây.\nDục vọng đó hòa quyện với những kiến thức đã học được——"
# monologue
# JP: （くりゅっ！）
1721 = "（Ấn!）"
# monologue
# JP: 少し強めに、クリトリスを、\n瞬間、きゅうんっ！　とすずの膣中がすぼまって！
1519 = "Tôi dùng lực ấn mạnh hơn một chút vào âm vật,\nNgay khoảnh khắc đó, bên trong âm đạo Suzu siết chặt lại cái \"kyuun\"!"
# 【ハチロク】
# display as 鈴
# JP: 「ひゅあっ！？\nんっ――んきゅううううううううううっ！！！」
964 = "「Hyu a!?\nƯm——ưm kyaaaa!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1200 = "「！」" 
# monologue
# JP: （どびゅっ！　びゅるっ！　びゅうっ！　びゅぶっ！）
1739 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: 出る。出てる。精液が。\n体全部の穴がゆるんで、すずの中へと入りたがっている。
1463 = "Ra rồi. Đang ra rồi. Tinh dịch.\nMọi lỗ chân lông trên cơ thể đều giãn ra, khao khát được tiến vào bên trong Suzu."
# monologue
# JP: セックスをして、ひとつになって、気持ちよくって。\nなのにもっとと、もっともっとと欲しくなってる。
1342 = "Làm tình, hòa làm một, thật sung sướng.\nVậy mà lại muốn nhiều hơn, khao khát nhiều hơn nữa."
# 【ハチロク】
# display as 鈴
# JP: 「ああっ――わかる――わかりますっ！　子宮――\nおなか――んっ――あついの――ひろがって――ふ、あ」
1011 = "「A a——em hiểu——em hiểu rồi! Tử cung——\nbụng em——ưm——nóng quá——đang lan tỏa ra——phù, a」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すず、すずっ」
1189 = "「Suzu, Suzu」"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま――あっ――双鉄、さまぁっ」
1195 = "「Ngài Soutetsu——a——Ngài Soutetsu」"
# monologue
# JP: だから、思い切りキスをする。
1531 = "Vì vậy, tôi trao em một nụ hôn mãnh liệt."
# monologue
# JP: 獣のように、感じるままに、\n繋がったまま、射精したまま、すずの口内を舐めまくる。
1494 = "Như một con thú, buông thả theo cảm xúc,\nvừa kết nối, vừa xuất tinh, vừa liếm láp khắp khoang miệng Suzu."
# monologue
# JP: （びゅうっ！　びゅっ――びゅるっ――びゅくっ）
1736 = "（Phụt! Phụt——phụt——phụt phụt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっっ――んっ――」
1031 = "「Ưm——ưm——」"
# 【ハチロク】
# display as 鈴
# JP: 「あ……んっ――ふっ――ふあっ――」
996 = "「A……ưm——phù——phù a——」"
# monologue
# JP: ようやく、射精が収まれば、\n疲れがどうっとやってくる。
1466 = "Cuối cùng, khi cơn xuất tinh lắng xuống,\nsự mệt mỏi ập đến."
# 【双鉄H】
# display as 雙鐵
# JP: 「う……あ」
1029 = "「Ư……a」"
# monologue
# JP: すずの隣に崩れ落ちれば、\nすずは甘えて、剥き出しの肌をくっつけてくる。
1522 = "Khi tôi ngã gục xuống bên cạnh Suzu,\nem nũng nịu, áp sát làn da trần trụi vào người tôi."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄様は、おつかれですか？」
1199 = "「Ngài Soutetsu, ngài mệt rồi sao?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？　多少は、な」
1064 = "「Hửm? Một chút thôi」"
# monologue
# JP: 本当はかなりぐったりしてる。
1363 = "Thực ra là khá rã rời rồi."
# monologue
# JP: だが、この目――わくわくする目に見つめられれば、\n疲れなど吹き飛ばしてしまえそうだ。
1334 = "Nhưng, khi bị ánh mắt này——ánh mắt đầy háo hức này nhìn chằm chằm,\nthì mệt mỏi có lẽ cũng tan biến hết."
# 【双鉄H】
# display as 雙鐵
# JP: 「――が、何ほどでもない。まだまだいけるさ」
716 = "「——Nhưng, chẳng thấm vào đâu. Anh vẫn còn làm được nữa」"
# 【ハチロク】
# display as 鈴
# JP: 「まぁ、良かった！」
1060 = "「A, may quá!」"
# monologue
# JP: 唇の端をぺろりと舐めて、\nすり、すり、と肌と肌とがこすられる。
1449 = "Liếm nhẹ khóe môi,\nem cọ cọ, chà xát làn da vào người tôi."
# 【ハチロク】
# display as 鈴
# JP: 「でしたら、セックスのお勉強の成果……\nもうひとつ、試してみてもよろしいですか？」
1177 = "「Vậy thì, thành quả học tập về chuyện làm tình……\nem có thể thử thêm một điều nữa được không ạ?」"
