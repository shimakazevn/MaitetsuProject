1084 = "「Chỉ dành riêng cho khoái cảm, sao——\nVậy nếu lần đầu tiên anh vuốt ve nó thì」"
# monologue
# JP: （さすっ――さすっ――）
1757 = "（Vuốt ve——vuốt ve——）"
# 【ハチロク】
# display as 鈴
