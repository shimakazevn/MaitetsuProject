1579 = "看到露出的肉棒，鈴的聲音開心又吃驚。" 

# monologue
# JP: （もみゅっ）
1759 = "（摸）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ――！」
985 = "「唔——！」" 

# 【ハチロク】
# display as 鈴
