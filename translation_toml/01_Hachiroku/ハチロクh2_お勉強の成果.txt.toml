1436 = "她的舌頭舔過我每一道齒縫，又伸直了來夠我的舌頭。" 

# 【ハチロク】
# display as 鈴
# JP: 「ちゅるっ！」
1021 = "「啾嚕！」" 

# 【双鉄H】
