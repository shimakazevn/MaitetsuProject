1639 = "鈴白淨的指尖，圓潤柔軟的手心，隔著我的褲子，一次又一次地檢查著我肉棒的外形。" 

# 【ハチロク】
# display as 鈴
# JP: 「どう……ですか？　こうすると、セックスのお相手は、\n期待と興奮をたかめてくださると読んだのですが」
1092 = "「怎麼樣……？書上說，這樣就能讓做愛的對象越來越期待和興奮」" 

# 【双鉄H】
# display as 雙鐵
