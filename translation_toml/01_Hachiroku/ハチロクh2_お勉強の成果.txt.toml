1627 = "這個女孩真就是鈴，她就跟鈴鐺一樣。她有著清脆穩重的聲音，也有著如此活潑可愛的一面。" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……」
997 = "「啊……」" 

# monologue
# JP: くちづける。\n僕のつけた名を求めてくれた、薄桃色の唇に。
1498 = "我吻了上去，吻了吻那對索求著我給予名字的——淡粉色的嘴唇。" 

# monologue
# JP: （にゅるっ）
1724 = "（咻嚕）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「！」
1200 = "「！」" 

# monologue
# JP: すずの短い舌がぐいぐい、僕の口内に侵入してくる。
1648 = "鈴短小的舌頭就伸進了我的嘴裡。" 

# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅっ……ちゅるっ……ん……\nれるっ……じゅっ……じゅる……れろっ」
1045 = "「嗯……啾……啾嚕……嗯……咻嚕……啾……啾嚕……咻嚕」" 

# 【双鉄H】
# display as 雙鐵
