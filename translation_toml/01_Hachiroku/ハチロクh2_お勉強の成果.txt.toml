1086 = "「就像火鉗一樣又硬又熱——而且蛋蛋還很重」" 

# monologue
# JP: すずの手に、まるごと全部が包まれている。
1420 = "她握住了我整個肉棒。" 

# monologue
# JP: 竿は輪にした手指で優しく掴まえられて、\n手のひらで、たまを支えて、ころがされてる。
1426 = "她用手指溫柔地環抱住了肉竿，手心托著蛋蛋搓了起來。" 

# 【ハチロク】
# display as 鈴
# JP: 「この中に……双鉄さまの精子が入って――\nその重みが、コレ、なのですよね？」
1068 = "「因為這裡……有您的精子在——所以才會這麼重吧？」" 

# monologue
# JP: （こりゅっ、もみゅっ）
1754 = "（揉、摸）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――だとは思うが……しかし……初めてのとき――\nあっ――あれほど、たくさん――射精、した、のに」
1033 = "「嗯——似的……但是……第一次做愛——啊——已經射了——那麼多了」" 

# 【ハチロク】
# display as 鈴
