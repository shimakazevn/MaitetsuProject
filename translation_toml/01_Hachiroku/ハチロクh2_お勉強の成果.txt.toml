[script]
# lines: 329 
# monologue
# JP: 一分の隙も無い制服姿。
1405 = "Bộ đồng phục hoàn hảo không chút tì vết."
# monologue
# JP: 床につくにはいささか不似合いな格好だが、\n今宵ばかりはそれしかないと納得できるし、嬉しく思う。
1586 = "Dù có hơi không phù hợp để lên giường,\nnhưng tôi hiểu rằng đêm nay chỉ có thể là trang phục này, và tôi cảm thấy vui vì điều đó."
# 【双鉄H】
# display as 雙鐵
# JP: 「新婚初夜、だものな」
1143 = "「Vì là đêm tân hôn, mà nhỉ」"
# monologue
# JP: その服が一番おまえらしい――と。\n僕の言葉を、ハチロクは覚えてくれてるのだろう。
1630 = "Bộ trang phục đó là hợp với em nhất——\nChắc hẳn Hachiroku vẫn nhớ những lời đó của tôi."
# 【ハチロク】
# display as 八六
# JP: 「――はい。新婚初夜でございます」
722 = "「——Vâng. Là đêm tân hôn ạ」"
# monologue
# JP: 背筋を伸ばし、僕を見て、\n深く、ハチロクが三つ指をつき頭を下げる。
1424 = "Hachiroku thẳng lưng, nhìn tôi,\nrồi cúi gập người, hai tay chạm sàn cung kính hành lễ."
# 【双鉄H】
# display as 雙鐵
# JP: 「よしてくれ。僕たちは夫婦で、対等だ」
913 = "「Đừng làm vậy. Chúng ta là vợ chồng, là bình đẳng mà」"
# 【ハチロク】
# display as 八六
# JP: 「夫婦ですから、妻から夫に感謝を伝える――\nそれは、とても自然なことかと存じます」
1139 = "「Chính vì là vợ chồng, nên người vợ mới bày tỏ lòng biết ơn với người chồng——\nEm nghĩ đó là một điều rất tự nhiên ạ」"
# monologue
# JP: くすり、と小さな笑みをこぼす。\n幸せそうな、満ちたりた。
1418 = "Em khẽ cười khúc khích.\nTrông thật hạnh phúc và mãn nguyện."
# 【ハチロク】
# display as 八六
# JP: 「わたくし、双鉄様の妻にしていただけて、\n本当に本当に幸せです。まことにありがとうございます」
1110 = "「Được trở thành vợ của ngài Soutetsu,\nem thực sự, thực sự rất hạnh phúc. Chân thành cảm ơn ngài」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕も、この上なく幸せだ」
1103 = "「Anh cũng vậy, không gì hạnh phúc hơn」"
# monologue
# JP: ハチロクに倣い、夫から妻へ。
1500 = "Bắt chước Hachiroku, người chồng cũng hành lễ với vợ."
# monologue
# JP: 産まれて初めての三つ指をつき、\n一杯に満ちた気持ちを込めて、頭をさげる。
1520 = "Lần đầu tiên trong đời, tôi chạm hai tay xuống sàn,\ncúi đầu với trái tim ngập tràn cảm xúc."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕の妻になってくれて、ありがとう」
1157 = "「Cảm ơn em, vì đã trở thành vợ anh」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様……」
1196 = "「Ngài Soutetsu……」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん、ハチロク」
1059 = "「Ừ, Hachiroku」"
# monologue
# JP: 二人自然に顔を寄せ合い、\nくちづけを――
1492 = "Hai chúng tôi tự nhiên sát lại gần nhau,\ntrao nhau nụ hôn——"
# monologue
# JP: （ぴとっ）
1740 = "（Chạm nhẹ）"
# 【双鉄H】
# display as 雙鐵
# JP: 「む？」
1063 = "「Hửm?」"
# monologue
# JP: かわそうとした瞬間に、\n真っ白な指が、僕の唇に触れてとどめる。
1391 = "Ngay khoảnh khắc định trao nụ hôn,\nnhững ngón tay trắng ngần đã chạm vào môi tôi, ngăn lại."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　今は夜、ふたりだけの時間です。\nですのでどうぞ、あなたがわたくしに下さった名で――」
1198 = "「Ngài Soutetsu? Bây giờ là ban đêm, thời gian chỉ dành cho hai chúng ta.\nVì vậy xin ngài, hãy gọi em bằng cái tên mà ngài đã ban cho em——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん。すず」
1061 = "「Ừ. Suzu」"
# 【ハチロク】
# display as 鈴
# JP: 「はい、双鉄様」
1128 = "「Vâng, thưa ngài Soutetsu」"
# monologue
# JP: 頬を可愛いピンクにそめて、\nハチロク――いや、すずが僕を見上げる。
1354 = "Đôi gò má ửng hồng đáng yêu,\nHachiroku——không, Suzu ngước nhìn tôi."
# monologue
# JP: この子は、鈴だ。改めて強くそう思う。\n凛と涼やかに響くのに、ころころこれほど、愛らしい。
1627 = "Cô bé này, chính là Suzu (chiếc chuông nhỏ). Tôi lại càng tin chắc điều đó.\nDù vang lên những âm thanh lanh lảnh và trong trẻo, nhưng lại vô cùng đáng yêu."
# 【ハチロク】
# display as 鈴
# JP: 「あ……」
997 = "「A……」"
# monologue
# JP: くちづける。\n僕のつけた名を求めてくれた、薄桃色の唇に。
1498 = "Tôi trao em nụ hôn.\nLên đôi môi phớt hồng đã mong muốn được gọi bằng cái tên tôi đặt cho."
# monologue
# JP: （にゅるっ）
1724 = "（Sượt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「！」
1200 = "「!」"
# monologue
# JP: すずの短い舌がぐいぐい、僕の口内に侵入してくる。
1648 = "Chiếc lưỡi ngắn của Suzu mạnh mẽ tiến vào khoang miệng tôi."
# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅっ……ちゅるっ……ん……\nれるっ……じゅっ……じゅる……れろっ」
1045 = "「Ưm……chụt……chu mút……ưm……\nliếm……chụt……chu mút……sột sột」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……あっ」
1043 = "「Ưm……a」"
# monologue
# JP: 歯の隙間、ひとつひとつを縦になぞって、\nそれから僕の舌へとぴとり張り付いてくる。
1436 = "Lướt dọc theo từng kẽ răng,\nrồi áp sát vào lưỡi tôi."
# 【ハチロク】
# display as 鈴
# JP: 「ちゅるっ！」
1021 = "「Chu mút!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？」
1201 = "「!?」"
# monologue
# JP: 強く、吸われる。
1413 = "Bị mút thật mạnh."
# monologue
# JP: 舌で舌を引っ張られるような感覚が、\n僕の背筋をぞくぞくさせて、体全部を熱くしていく。
1435 = "Cảm giác như lưỡi bị kéo đi bằng lưỡi,\nkhiến sống lưng tôi run lên, toàn thân nóng ran."
# 【ハチロク】
# display as 鈴
# JP: 「あむっ――ずっ――んぷっ――ちゅっ――\nんっ……あっ……れるっ……じゅるっ――ごくっ」
1013 = "「A mút——mút——ưm pư——chụt——\nưm……a……liếm……chu mút——ực」"
# monologue
# JP: 口の天井をぞろりと舐めて、内側全部を舌で這ってく。\n湧き出た僕のよだれを吸い込み、喉へと落とす。
1450 = "Liếm trọn vòm miệng, chiếc lưỡi luồn lách khắp bên trong.\nHút lấy dòng nước bọt tuôn trào của tôi rồi nuốt xuống cổ họng."
# 【ハチロク】
# display as 鈴
# JP: 「あ……ぷあっ」
1004 = "「A……phù a」"
# monologue
# JP: 満ち足りた顔。紅潮した頬。
1444 = "Khuôn mặt mãn nguyện. Đôi gò má ửng hồng."
# monologue
# JP: ふたりの間を繋ぐよだれを、\nすずはさりげなく吸い込んで、飲む。
1633 = "Sợi nước bọt kết nối giữa hai người,\nđược Suzu thản nhiên hút lấy rồi nuốt xuống."
# 【双鉄H】
# display as 雙鐵
# JP: 「なんだ……今のは――\nキスなのに、すごく……なんというか」
943 = "「Cái gì vậy……vừa rồi——\nTuy là hôn, nhưng lại rất……phải nói sao nhỉ」"
# 【ハチロク】
# display as 鈴
# JP: 「ご本に載っておりました。今のは、大人のキス。\nセックスのときの、キスでございます」
1108 = "「Có viết trong sách ạ. Vừa rồi là nụ hôn của người lớn.\nLà nụ hôn khi làm tình ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「本――そうか、勉強したのか」
1135 = "「Sách sao——ra vậy, em đã học hỏi rồi à」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。初めて愛していただいたときは、わたくし、\n何も知らず、双鉄様にしていただくばかりでしたので」
1124 = "「Vâng. Lần đầu tiên được ngài yêu thương, em\nchẳng biết gì cả, chỉ biết để ngài Soutetsu dẫn dắt thôi」"
# monologue
# JP: （さすっ）
1761 = "（Vuốt ve）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
987 = "「!」"
# monologue
# JP: ハチロクの中指になぞられて、\n大人のキス、セックスのキスの効力を知る。
1357 = "Bị ngón giữa của Hachiroku lướt qua,\ntôi mới hiểu được uy lực của nụ hôn người lớn, nụ hôn khi làm tình."
# monologue
# JP: 初めての時、精液をあれほど出したというのに、\n弾けば硬質な音をたてそうなほど、勃起している。
1590 = "Dù lần đầu đã xuất ra lượng tinh dịch nhiều đến thế,\nnhưng giờ tôi lại cương cứng đến mức búng vào có thể phát ra âm thanh cứng cáp."
# 【ハチロク】
# display as 鈴
# JP: 「今宵は、一生一度の――\n新婚初夜でございますから」
921 = "「Đêm nay là một lần duy nhất trong đời——\nVì là đêm tân hôn mà」"
# monologue
# JP: （くりっ）
1750 = "（Nắn nắn）"
# monologue
# JP: ズボンの上を這い登ってきた中指が、\n勃起のくびれの部分で止まる。
1569 = "Ngón giữa bò lên trên chiếc quần,\ndừng lại ở phần eo của chỗ cương cứng."
# monologue
# JP: 子猫の首を撫でてるように何度も何度も柔らかに、\n同じ部分をさすり続けて、僕をじらして乾かしていく。
1403 = "Mềm mại vuốt ve như đang vuốt cổ một chú mèo con, hết lần này đến lần khác,\nliên tục xoa nắn cùng một chỗ, khiến tôi bồn chồn đến khô cả cổ."
# 【ハチロク】
# display as 鈴
# JP: 「精一杯に双鉄様にご奉仕し、\n最高の心地よさを、是非味わっていただきたいのです」
1106 = "「Em muốn dốc hết sức để hầu hạ ngài Soutetsu,\nnhất định phải để ngài nếm trải sự sung sướng tuyệt đỉnh」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……\nそうしてもらえるのなら、嬉しい」
1047 = "「Ừm……\nNếu được em làm vậy, anh rất vui」"
# 【ハチロク】
# display as 鈴
# JP: 「左様ですか！」
1150 = "「Thật vậy sao ạ!」"
# monologue
# JP: パッと、すずの顔が輝く。
1644 = "Gương mặt Suzu bừng sáng."
# 【ハチロク】
# display as 鈴
# JP: 「でしたら、正座をしていただき、\nたたんだ足のまま、おまたを、開いていただけますか？」
1175 = "「Vậy thì, xin ngài hãy ngồi seiza,\nvà giữ nguyên đôi chân đang gập, dang rộng hai đùi ra được không ạ?」"
# monologue
# JP: 勉強したという参考書で、\nその姿勢をとっていたのだろう。
1401 = "Chắc hẳn tư thế đó\ncó trong cuốn sách tham khảo mà em ấy đã học."
# monologue
# JP: なんともすずらしい律儀な指示に、\n内心ほのぼのしながら従う。
1632 = "Lời chỉ dẫn nghiêm túc mang đậm chất Suzu,\nkhiến tôi vừa làm theo vừa cảm thấy ấm áp trong lòng."
# 【双鉄H】
# display as 雙鐵
# JP: 「こうか？」
1132 = "「Thế này à?」"
# 【ハチロク】
# display as 鈴
# JP: 「はい」
1048 = "「Vâng」"
# 【双鉄H】
# display as 雙鐵
# JP: 「！」
# 1200 = "「！」" 
# monologue
# JP: しずしずと、すずが僕へと近づいてきて、\n股間にすっぽり、おさまる形にぺたん、としゃがむ。
1649 = "Suzu nhẹ nhàng tiến lại gần tôi,\nrồi ngồi bệt xuống, vừa vặn lọt thỏm vào giữa hai chân tôi."
# 【ハチロク】
# display as 鈴
# JP: 「それでは――ご奉仕させていただきます」
1182 = "「Vậy thì——em xin phép được hầu hạ ngài」"
# 【双鉄H】
# display as 雙鐵
# JP: 「う、む」
1042 = "「Ừ, ừm」"
# monologue
# JP: ほのぼのどころの話ではない。
1629 = "Chẳng còn là chuyện ấm áp nữa rồi."
# monologue
# JP: この体勢が、僕をみあげるすずの目が、\nただそれだけで、ひどく淫靡だ。
1631 = "Tư thế này, cùng ánh mắt Suzu ngước nhìn tôi,\nchỉ bấy nhiêu thôi cũng đã vô cùng dâm đãng."
# monologue
# JP: （さすっ）
# 1761 = "（撫摸）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「う……あっ」
986 = "「Ư……a」"
# monologue
# JP: 喉の奥から、勝手におかしな声が出る。
1511 = "Một âm thanh kỳ lạ tự động phát ra từ sâu trong cổ họng tôi."
# monologue
# JP: さきほどよりも遥かに軽く、ほぼ触れられてるだけなのに、\nそれほどまでに、気持ち良い。
1351 = "Nhẹ nhàng hơn lúc nãy rất nhiều, gần như chỉ là chạm vào,\nnhưng lại mang đến cảm giác sung sướng tột độ."
# 【ハチロク】
# display as 鈴
# JP: 「このように……ん……双鉄様の、おちんちんの形を……\nやさしく、なぞると……ご本には、書いてありました」
1136 = "「Như thế này……ưm……hình dáng cậu bé, của ngài Soutetsu……\nnhẹ nhàng, vuốt ve……trong sách, đã viết như vậy ạ」"
# monologue
# JP: （さすっ――さわっ――）
1760 = "（Vuốt ve——chạm nhẹ——）"
# monologue
# JP: じれったいほどゆるやかに、\n丁寧に丁寧に、愛情を込めて。
1640 = "Chậm rãi đến mức sốt ruột,\ncẩn thận, cẩn thận, chan chứa tình yêu thương."
# monologue
# JP: すずの真っ白な指先が、丸くやわらかなてのひらが、\nズボンごし、僕の形を何度も何度も確かめる。
1639 = "Đầu ngón tay trắng muốt, lòng bàn tay tròn trịa mềm mại của Suzu,\nxuyên qua lớp quần, liên tục xác nhận hình dáng của tôi hết lần này đến lần khác."
# 【ハチロク】
# display as 鈴
# JP: 「どう……ですか？　こうすると、セックスのお相手は、\n期待と興奮をたかめてくださると読んだのですが」
1092 = "「Thế nào……ạ? Em đọc được rằng, làm như thế này, bạn tình\nsẽ càng thêm kỳ vọng và hưng phấn ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「その本は――確定的に正しい。\n僕は……興奮し、このうえないほど、たかまっている」
923 = "「Cuốn sách đó——chắc chắn là đúng rồi.\nAnh đang……hưng phấn, và kích thích đến mức không thể nào hơn được nữa」"
# 【ハチロク】
# display as 鈴
# JP: 「ああよかった！」
1183 = "「A, may quá!」"
# monologue
# JP: 行為とまるで似つかわしくない、あどけない笑顔。
1443 = "Một nụ cười ngây thơ, hoàn toàn không phù hợp với hành động đang làm."
# monologue
# JP: それがまた……背徳感をかきたてて、\n僕をいっそう、たかめてしまう。
1628 = "Điều đó lại càng……khơi dậy cảm giác tội lỗi,\nkhiến tôi càng thêm hưng phấn."
# 【ハチロク】
# display as 鈴
# JP: 「まぁ！　ビクンって、双鉄さまのおちんちん、\n自分でお返事してくださいました」
981 = "「Ây da! Cậu bé của ngài Soutetsu vừa giật nảy lên một cái,\ntự mình trả lời em luôn kìa」"
# 【双鉄H】
# display as 雙鐵
# JP: 「それは――切なくて、期待しすぎて高まりすぎて、\n悶えているのだ」
1067 = "「Đó là vì——nó đang bồn chồn, kỳ vọng quá nhiều và hưng phấn quá mức,\nđang quằn quại đấy」"
# 【ハチロク】
# display as 鈴
# JP: 「それほど心地よいのですか。　\n嬉しい、うふふ。では、次のお作法にすすみますね？」
1148 = "「Sung sướng đến thế cơ ạ.\nEm vui quá, ư fufu. Vậy thì, em xin phép chuyển sang bước tiếp theo nhé?」"
# monologue
# JP: （ちぃぃ……）
1745 = "（Kéo xuống……）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1200 = "「！」" 
# monologue
# JP: すずがジッパーを下げていく。\n手元を見ずに、僕の顔だけをじいっと見ながら。
1638 = "Suzu từ từ kéo khóa quần xuống.\nEm không nhìn xuống tay, mà chỉ chăm chú nhìn thẳng vào mặt tôi."
# monologue
# JP: これは照れくさい、恥ずかしい。\n恥ずかしいのに、喉がヒリつくほどに興奮させられる。
1584 = "Thật là ngượng ngùng, xấu hổ.\nDù xấu hổ, nhưng tôi lại hưng phấn đến mức cổ họng nóng rát."
# 【ハチロク】
# display as 鈴
# JP: 「まぁっ」
980 = "「Ái chà」"
# monologue
# JP: 開放された勃起を見、\nすずは嬉しさと驚きを混じえたような声を出す。
1579 = "Nhìn thấy phần cương cứng được giải phóng,\nSuzu thốt lên một tiếng xen lẫn niềm vui và sự kinh ngạc."
# monologue
# JP: （もみゅっ）
1759 = "（Nắn nắn）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――！」
985 = "「!」"
# 【ハチロク】
# display as 鈴
# JP: 「ポーカーのようです。硬くて、熱くて――\nそれに、たまたまはずっしり、重くて」
1086 = "「Giống như que cời than vậy. Vừa cứng, vừa nóng——\nHơn nữa, hai hòn bi lại nặng trĩu」"
# monologue
# JP: すずの手に、まるごと全部が包まれている。
1420 = "Toàn bộ được bao trọn trong bàn tay Suzu."
# monologue
# JP: 竿は輪にした手指で優しく掴まえられて、\n手のひらで、たまを支えて、ころがされてる。
1426 = "Phần thân được em nhẹ nhàng nắm lấy bằng những ngón tay vòng lại,\nlòng bàn tay nâng đỡ hai hòn bi, rồi lăn nhẹ."
# 【ハチロク】
# display as 鈴
# JP: 「この中に……双鉄さまの精子が入って――\nその重みが、コレ、なのですよね？」
1068 = "「Bên trong này……có chứa tinh trùng của ngài Soutetsu——\nSức nặng này, chính là nó, đúng không ạ?」"
# monologue
# JP: （こりゅっ、もみゅっ）
1754 = "（Lăn nhẹ, nắn nắn）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ――だとは思うが……しかし……初めてのとき――\nあっ――あれほど、たくさん――射精、した、のに」
1033 = "「Ưm——anh nghĩ là vậy……nhưng mà……lần đầu tiên——\na——anh đã xuất tinh, nhiều đến thế, rồi mà」"
# 【ハチロク】
# display as 鈴
# JP: 「わたくしのため、急ピッチでご生産くださったのですね。\n働きもののたまたまさんに、ご褒美を差し上げましょう」
1154 = "「Ngài đã sản xuất cấp tốc vì em đúng không ạ.\nEm phải thưởng cho hai hòn bi chăm chỉ này mới được」"
# monologue
# JP: （なぜりっ）
# 1761 = "（撫摸）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「――っ」
721 = "「——」"
# monologue
# JP: いい子いい子と撫でてくる。\n気持ち良い。確かに、ぞわぞわと気持ち良い。
1422 = "Em vuốt ve như đang dỗ dành một đứa trẻ ngoan.\nThật sung sướng. Quả thực, sung sướng đến râm ran."
# monologue
# JP: 気持ち良いのだがたまへの刺激は――\n気持ち良ければ良いほどに、僕を貪欲にしてしまう。
1337 = "Sung sướng thật đấy, nhưng sự kích thích vào hai hòn bi——\ncàng sung sướng bao nhiêu, lại càng khiến tôi trở nên tham lam bấy nhiêu."
# 【双鉄H】
# display as 雙鐵
# JP: 「す、ず――たまだけではなく」
1187 = "「Su, zu——đừng chỉ mỗi hai hòn bi」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。次ですね？」
1081 = "「Vâng. Tiếp theo nhỉ?」"
# monologue
# JP: （しゅこんっ！）
1751 = "（Vuốt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
1058 = "「Ưm!」"
# monologue
# JP: 待ち望んでいた竿への刺激に、腰がふるりと震えてしまう。
1555 = "Nhận được sự kích thích hằng mong đợi ở phần thân, eo tôi khẽ run lên."
# monologue
# JP: すずの指が作るわっかがすぼまって、\n僕の勃起を捕まえたまま、上下動する。
1641 = "Vòng tay Suzu khép lại,\nôm chặt lấy phần cương cứng của tôi, rồi di chuyển lên xuống."
# 【ハチロク】
# display as 鈴
# JP: 「しこ、しこ、しゅっ、しゅっ――\n速さは、これでよろしいでしょうか？」
1205 = "「Sục, sục, vuốt, vuốt——\nTốc độ thế này, đã được chưa ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「もう少し――速く、強くても大丈夫だ」
938 = "「Nhanh hơn——và mạnh hơn một chút cũng được」"
# 【ハチロク】
# display as 鈴
# JP: 「かしこまりました。しこしこ、しゅっしゅっ、\nしこしゅこ――きゅっ！」
1109 = "「Em rõ rồi ạ. Sục sục, vuốt vuốt,\nsục vuốt——siết!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んむっ！」
1054 = "「Ưm!」"
# monologue
# JP: 指の輪っかをいきなり強く締められて、\n脳まで一気に快感の線が突き抜ける！
1441 = "Vòng tay đột ngột siết chặt,\nmột luồng khoái cảm chạy dọc thẳng lên tận não!"
# 【ハチロク】
# display as 鈴
# JP: 「うふふ、双鉄様、良かったのですね？\n先走りのおつゆが――ほぉら、こんなにニチニチと」
972 = "「Ư fufu, ngài Soutetsu, thấy sướng đúng không ạ?\nDịch nhờn rỉ ra——ngài xem, dính nhớp thế này cơ mà」"
# monologue
# JP: （くりゅっ、りゅっ）
1748 = "（Ấn, miết）"
# monologue
# JP: 指先が、勃起の先の割れ目を押しこみ、弄んでくる。
1430 = "Đầu ngón tay ấn vào khe hở ở phần đỉnh cương cứng, trêu đùa."
# 【双鉄H】
# display as 雙鐵
# JP: 「あ――あっ、すず、すずっ」
990 = "「A——a, Suzu, Suzu」"
# monologue
# JP: 快感が強すぎて耐え難く、なのにどうにもじれったく、\n頭を思い切り掴みたくなる。
1485 = "Khoái cảm quá mạnh khó mà chịu đựng nổi, nhưng lại khiến tôi bồn chồn,\nmuốn nắm chặt lấy đầu em."
# monologue
# JP: だが、すずの思うままして欲しい――\nその欲望が、激しい衝動への防波堤となる。
1501 = "Nhưng tôi muốn để Suzu làm theo ý em——\nDục vọng đó trở thành đê chắn sóng kìm hãm sự bốc đồng mãnh liệt trong tôi."
# 【ハチロク】
# display as 鈴
# JP: 「……このおつゆも、おいしいのでしょうか？」
731 = "「……Dịch nhờn này, cũng ngon chứ ạ?」"
# monologue
# JP: （くちゅっ）
1763 = "（Chụt）"
# monologue
# JP: こそげるように先走りの汁をすくって、\nすずはくんくん、その匂いをかぎ――
1410 = "Suzu gạt lấy chút dịch nhờn rỉ ra,\nkhịt khịt mũi, ngửi mùi hương của nó——"
# monologue
# JP: （ぱくっ！）
1728 = "（Ngoạm!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「あっ」
1007 = "「A」"
# monologue
# JP: 指を、ではなく勃起を全部、\nすずは一気に小さな口に含んでしまう！
1429 = "Không phải ngón tay, mà là toàn bộ phần cương cứng,\nSuzu ngậm trọn vào chiếc miệng nhỏ bé của em cùng một lúc!"
# 【ハチロク】
# display as 鈴
# JP: 「れるっ――るっ――れろっ――じゅるるっ――\nんっ――んちゅっ――ちゅっ――ちゅううううっ」
1206 = "「Liếm——liếm——liếm——chu mút——\nưm——ưm chụt——chụt——chu mút」"
# 【双鉄H】
# display as 雙鐵
# JP: 「――っ――あっ」
720 = "「——a」"
# monologue
# JP: 舐められ、同時に吸われてる。
1453 = "Vừa bị liếm, lại vừa bị mút."
# monologue
# JP: 口の全部を僕の勃起に埋められて、\nそれでもすずは、うっとりと目を細めてる。
1350 = "Dù miệng đã bị phần cương cứng của tôi lấp đầy,\nSuzu vẫn say sưa nheo mắt lại."
# 【ハチロク】
# display as 鈴
# JP: 「ん――ちゅっ――ちゅるっ――んっ――こくっ――\nぷあっ――んっ――じゅ――れろおおおっ」
1038 = "「Ưm——chụt——chu mút——ưm——ực——\nphù a——ưm——chụt——liếm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あっ」
# 1007 = "「啊」" 
# monologue
# JP: 舌がべろりと、勃起の先端に張り付きながら動かされる。
1437 = "Chiếc lưỡi áp sát vào đỉnh phần cương cứng rồi chuyển động."
# monologue
# JP: 大好きなお菓子を口に含んで、\nなかなか噛まず、ぺろぺろ舐めて楽しむように。
1414 = "Giống như đang ngậm viên kẹo yêu thích trong miệng,\nmãi không chịu nhai, cứ liếm láp thưởng thức."
# monologue
# JP: （もみゅっ！）
1741 = "（Bóp!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？　待っ―うぁっ」
1202 = "「!? Đợi——u a」"
# monologue
# JP: 予告も無しにたまをもまれて、\n射精を強制されてるようで――
1408 = "Bị nắn bóp hai hòn bi không báo trước,\ncứ như bị ép buộc phải xuất tinh vậy——"
# monologue
# JP: 堪えようとして引く腰に、\nけれどもすずは、許さんとばかりに吸いつき続けっ。
1506 = "Tôi cố gắng kìm nén và lùi hông lại,\nnhưng Suzu vẫn tiếp tục mút mát như không cho phép tôi làm vậy."
# 【ハチロク】
# display as 鈴
# JP: 「じゅずずずずず～～ぬっ！\nじゅぽっ！　じゅ！　ぬぽっ！　ずじゅっ！」
1024 = "「Chu mút～～! \nChụt! Chụt! Chụt! Chụt!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん――ダメだ、このままだと――出るっ」
1032 = "「Ưm——không được, cứ thế này thì——ra mất」"
# monologue
# JP: 言った瞬間、すずの瞳がキラリと光り――
1635 = "Khoảnh khắc tôi vừa dứt lời, đôi mắt Suzu lóe sáng——"
# 【ハチロク】
# display as 鈴
# JP: 「じゅっ！　ずびょっ！　じゅぼっ！　ぼぢゅ！\nれるっ！　じゅるるるっ！　じゅぶっ！　ぼびゅっ！」
1022 = "「Chụt! Chụt! Chụt! Chụt!\nLiếm! Chu mút! Chụt! Chụt!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「出る――と、言っている――のにっ」
1112 = "「Anh đã nói——là ra——rồi màっ」"
# 【ハチロク】
# display as 鈴
# JP: 「はふはむはふはむおはひひははひ、ほーふぇふはま」
1014 = "「A fư ha mư a fư ha mư o ha hi hi ha ha hi, ngài Soutetsu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「――しゃべると、舌、がっ！」
717 = "「——Nói chuyện, thì lưỡi, sẽっ!」"
# 【ハチロク】
# display as 鈴
# JP: 「じゅるるうううううううううっ！」
1019 = "「Chu mút!!!」"
# monologue
# JP: すずが、吐き出すギリギリにまで頭を引いて――
1636 = "Suzu kéo đầu ra đến mức gần như nhả ra——"
# 【双鉄H】
# display as 雙鐵
# JP: 「え？」
984 = "「Hả?」"
# monologue
# JP: 何故だろう。\n切なげな目で僕を見て、そのまま動きを止め――っ！？
1565 = "Tại sao chứ.\nEm nhìn tôi bằng ánh mắt thiết tha, rồi cứ thế dừng mọi chuyển động——!?"
# 【ハチロク】
# display as 鈴
# JP: 「じゅにゅるるるるるるるるっ！！」
1020 = "「Chu mút!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 987 = "「唔！」" 
# monologue
# JP: （びゅっ！　びゅるっ！　びゅぶっ！　びゅううっ！！）
1738 = "（Phụt! Phụt! Phụt! Phụt!!）"
# monologue
# JP: 射精がすずの口の奥へとぶつかっていく。\nその感触がわかるほど、精液は濃く粘ついている。
1593 = "Tinh dịch bắn thẳng vào sâu trong miệng Suzu.\nTinh dịch đặc và dính nhớp đến mức tôi có thể cảm nhận được điều đó."
# 【ハチロク】
# display as 鈴
# JP: 「ん――こくっ――んくっ――ごくっ」
1039 = "「Ưm——ực——ưm——ực」"
# monologue
# JP: それを、すずが、飲んでいる。
1637 = "Suzu, đang uống nó."
# monologue
# JP: 嬉しげに、懸命に喉を動かして、\nそれで射精の勢いに負け、口の端から濁った白を滴らせ。
1439 = "Em vui sướng, ra sức nuốt xuống,\nnhưng không theo kịp tốc độ xuất tinh, dòng chất lỏng trắng đục rỉ ra từ khóe miệng."
# 【ハチロク】
# display as 鈴
# JP: 「あ……んっ――ごくんっ。ぷあ――あっ――\nあっ！？　そ、双鉄様、失礼しました」
1003 = "「A……ưm——ực. Phù a——a——\nA!? Ngài, ngài Soutetsu, em thất lễ rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「失礼？　なにがだ」
1073 = "「Thất lễ? Là sao?」"
# 【ハチロク】
# display as 鈴
# JP: 「そのっ――教本では、おくちからおちんちんを抜いて、\n精液を、お顔にかけていただくことになっていました」
1173 = "「Chuyện là——trong sách dạy, phải rút cậu bé ra khỏi miệng,\nrồi bắn tinh dịch lên mặt cơ ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1012 = "「À」"
# monologue
# JP: そうか、それでか。\nそれで一瞬、口から勃起を抜きかけた状態で躊躇したのか。
1378 = "Ra là vậy.\nThảo nào em lại do dự một thoáng khi rút phần cương cứng ra khỏi miệng."
# 【ハチロク】
# display as 鈴
# JP: 「なのに、わたくし、欲望に負け、\nついついおくちで受け止めて――」
1141 = "「Vậy mà, em lại thua trước dục vọng,\nlỡ dùng miệng đón nhận mất rồi——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「口に出し、飲んでもらえて、嬉しかった。\nすずに、包まれているような気がした」
925 = "「Anh rất vui vì được xuất vào miệng và được em nuốt lấy.\nCảm giác như được Suzu bao bọc vậy」"
# 【ハチロク】
# display as 鈴
# JP: 「あ――」
988 = "「A——」"
# monologue
# JP: すずの瞳が安堵に和らぐ。\nよほど不安に思ってたのだろう。
1642 = "Ánh mắt Suzu dịu đi trong sự an tâm.\nChắc hẳn em đã rất lo lắng."
# monologue
# JP: 生真面目な点は、とても可愛い魅力だが、\nこういうことは、杓子定規でもつまらなかろう。
1318 = "Sự nghiêm túc là một nét quyến rũ rất đáng yêu,\nnhưng những chuyện thế này, cứ rập khuôn thì sẽ nhàm chán lắm."
# 【双鉄H】
# display as 雙鐵
# JP: 「セックスは、僕たちふたりですることだ。\nお手本をなぞるだけでは、僕らの営みではなくなるさ」
929 = "「Làm tình, là chuyện của hai chúng ta.\nNếu chỉ bắt chước theo khuôn mẫu, thì đâu còn là chuyện của đôi ta nữa」"
# 【ハチロク】
# display as 鈴
# JP: 「セックスは――わたくしたちふたりの、営み。\n……本当に、左様でございますね。わたくしったら」
928 = "「Làm tình——là chuyện của hai chúng ta.\n……Quả thực, là vậy nhỉ. Em đúng là」"
# 【ハチロク】
# display as 鈴
# JP: 「では、ここから先は――双鉄様とわたくしの、\nお手本なしのセックスを、作っていければと思います」
1184 = "「Vậy thì, từ giờ trở đi——em muốn cùng ngài Soutetsu,\ntạo ra một cuộc làm tình không cần khuôn mẫu nào cả」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな」
1134 = "「Đúng vậy」"
# monologue
# JP: （ぐいっ！）
1744 = "（Nhấc bổng!）"
# 【ハチロク】
# display as 鈴
# JP: 「きゃっ！？」
968 = "「Kya!?」"
# monologue
# JP: 望みのままに腰を抱き寄せ\nすずの両足に僕の胴体を挟ませる。
1513 = "Tôi ôm sát lấy eo em như mong muốn\nđể hai chân Suzu kẹp lấy thân tôi."
# 【ハチロク】
# display as 鈴
# JP: 「あ……下着……」
998 = "「A……đồ lót……」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すずらしい、とても清楚なものだな。なのに」
1161 = "「Đúng là phong cách của Suzu, rất trong sáng. Thế mà」"
# monologue
# JP: （つ――）
1747 = "（Kéo——）"
# 【ハチロク】
# display as 鈴
# JP: 「んうっ！」
# 1054 = "「嗯嗚！」" 
# monologue
# JP: パンツの股間は、もうぐしょぐしょで透けそうだ。
1352 = "Phần đũng quần lót đã ướt sũng đến mức sắp nhìn xuyên thấu."
# monologue
