1739 = "（嗖！嗖！嗖！嗖！）" 

# monologue
# JP: 出る。出てる。精液が。\n体全部の穴がゆるんで、すずの中へと入りたがっている。
1463 = "射了，射精了。我身上所有的孔洞就鬆弛下來，一心只想深入鈴的身體。" 

# monologue
# JP: セックスをして、ひとつになって、気持ちよくって。\nなのにもっとと、もっともっとと欲しくなってる。
1342 = "做愛、合體，是這麼舒服。然而卻也讓人愈來愈不滿足。" 

# 【ハチロク】
# display as 鈴
# JP: 「ああっ――わかる――わかりますっ！　子宮――\nおなか――んっ――あついの――ひろがって――ふ、あ」
1011 = "「啊啊——明白——我明白！子宮——肚子——嗯——熱熱的——好多——呼，啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すず、すずっ」
1189 = "「鈴，鈴」" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま――あっ――双鉄、さまぁっ」
1195 = "「雙鐵少爺——啊——雙鐵少爺」" 

# monologue
# JP: だから、思い切りキスをする。
1531 = "所以要盡情地接吻。" 

# monologue
# JP: 獣のように、感じるままに、\n繋がったまま、射精したまま、すずの口内を舐めまくる。
1494 = "我像野獸一般遵循著內心的欲望，與她相連，奮力射精，同時舔遍鈴的口內。" 

# monologue
# JP: （びゅうっ！　びゅっ――びゅるっ――びゅくっ）
1736 = "（嗖嗚！嗖——嗖——嗖嗯）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んっっ――んっ――」
1031 = "「嗯——」" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……んっ――ふっ――ふあっ――」
996 = "「啊……——呼——呼啊——」" 

# monologue
# JP: ようやく、射精が収まれば、\n疲れがどうっとやってくる。
1466 = "射精終於停止，疲勞隨之襲來。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「う……あ」
1029 = "「嗚……啊」" 

# monologue
# JP: すずの隣に崩れ落ちれば、\nすずは甘えて、剥き出しの肌をくっつけてくる。
1522 = "我累倒在了鈴身邊。鈴黏著我，赤裸的肌膚緊緊貼著我。" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様は、おつかれですか？」
1199 = "「雙鐵少爺，您是累了嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？　多少は、な」
1064 = "「嗯？多少是吧」" 

# monologue
# JP: 本当はかなりぐったりしてる。
1363 = "其實相當累了。" 

# monologue
# JP: だが、この目――わくわくする目に見つめられれば、\n疲れなど吹き飛ばしてしまえそうだ。
1334 = "但是在她炯炯有神地注視下，疲勞彷彿都要煙消雲散了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「――が、何ほどでもない。まだまだいけるさ」
716 = "「——其實也沒有那麼累，我還可以」" 

# 【ハチロク】
# display as 鈴
# JP: 「まぁ、良かった！」
1060 = "「嗯，那就好！」" 

# monologue
# JP: 唇の端をぺろりと舐めて、\nすり、すり、と肌と肌とがこすられる。
1449 = "她舔了舔嘴角，然後在我身上蹭了蹭。" 

# 【ハチロク】
# display as 鈴
# JP: 「でしたら、セックスのお勉強の成果……\nもうひとつ、試してみてもよろしいですか？」
1177 = "「那我可以再嘗試一個……性愛學習的成果嗎？」" 
