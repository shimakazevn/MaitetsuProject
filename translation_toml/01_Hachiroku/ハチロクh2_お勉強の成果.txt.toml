# monologue
# JP: 一分の隙も無い制服姿。
1405 = "她一身完美無缺的制服打扮。" 

# monologue
# JP: 床につくにはいささか不似合いな格好だが、\n今宵ばかりはそれしかないと納得できるし、嬉しく思う。
1586 = "穿成這樣睡覺有點不協調，但今晚也只有這樣了，而且我覺得很不錯。" 

# 【双鉄H】
# display as 雙鐵
