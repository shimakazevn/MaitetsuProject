1424 = "她擺直了身子看著我，三指撐地，行了一個最敬禮。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「よしてくれ。僕たちは夫婦で、対等だ」
913 = "「不用了，夫妻間應該是平等的」" 

# 【ハチロク】
# display as 八六
