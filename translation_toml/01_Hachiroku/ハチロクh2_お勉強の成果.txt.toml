1517 = "Lướt ngón tay dọc theo khe hở hiện rõ,\nSuzu giật giật, run rẩy đầy thiết tha."
# 【双鉄H】
# display as 雙鐵
# JP: 「これほど、濡れるものなのか？」
944 = "「Có thể ướt đến mức này sao?」"
