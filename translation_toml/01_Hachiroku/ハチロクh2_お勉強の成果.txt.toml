# monologue
# JP: 産まれて初めての三つ指をつき、\n一杯に満ちた気持ちを込めて、頭をさげる。
1520 = "我第一次行三指撐地的最敬禮，懷著滿心的愛意對她鞠了一躬。" 

# 【双鉄H】
# display as 雙鐵
