1143 = "「畢竟今天是新婚初夜」" 

# monologue
# JP: その服が一番おまえらしい――と。\n僕の言葉を、ハチロクは覚えてくれてるのだろう。
1630 = "這套衣服是最配你的——我的這句話，八六一定記在腦海裡了。" 

# 【ハチロク】
# display as 八六
