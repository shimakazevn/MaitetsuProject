1127 = "「Vâng, con gái——khi cảm nhận được kích thích tình dục,\ncô bé sẽ trở nên ướt át ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ほう、おまんまんをか」
1085 = "「Ồ, cô bé sao」"
# monologue
# JP: （くぱあっ）
1753 = "（Tách ra）"
# monologue
# JP: パンツの上から、すじをぱっくりと押し開く。\n中身の形は、パンツに張り付きくっきり浮かぶ。
1529 = "Xuyên qua lớp quần lót, tôi ấn mở khe hở ra.\nHình dáng bên trong in hằn rõ nét lên lớp vải."
# 【双鉄H】
# display as 雙鐵
# JP: 「ならばすずは、おまんまんまで、\nやはり、人間と変わらんのだな」
1188 = "「Vậy thì Suzu, ngay cả cô bé,\nquả nhiên cũng không khác gì con người nhỉ」"
# 【ハチロク】
# display as 鈴
# JP: 「の、ようです。それも、ご本で勉強いたしました」
1080 = "「Có vẻ, là vậy ạ. Chuyện đó, em cũng đã học trong sách」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ほう。教えてもらえるか？」
1122 = "「Ồ. Dạy cho anh được không?」"
# monologue
