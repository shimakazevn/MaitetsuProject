# 【双鉄】
# display as 雙鐵
# JP: 「そういうわけで、登呂流湯のご主人に診断をお願いし、\nオリヴィの冷却中に、延命法についてをお伺いした」
2618 = "「於是，我們就拜託登呂流浴場的老闆進行診斷，並在給奧莉薇降溫時，打聽了一下延長壽命的方法」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、それ！　どんなお話したの？\nオリヴィもしりたい！」
2336 = "「啊，你們都講了些什麼？奧莉薇也想知道！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああうむ――うむ？」
2337 = "「啊，好——嗯？」" 

# monologue
# JP: 風だ。涼しい。\n何故かと思って目線を向ければ――
3047 = "一陣涼風拂過，甚是舒爽，我好奇地循風看去——" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ。そのうちわはオリヴィ自身を冷ますものだぞ。\n特に僕などあおがぬでも」
2459 = "「奧莉薇，那扇子是用來給你扇風的，就不用給我扇了吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ。十分にひえたからー！\nそれにね？　ぱたぱた～」
2448 = "「奧莉薇已經足夠涼快啦！還有還有，扇扇扇～」" 

# monologue
# JP: 今度は、ハチロク。
3309 = "接下來她又對著八六扇起來。" 

# monologue
# JP: ふわりとあがった前髪の下、\n嫉妬さえをも覚えるほどの笑顔が輝く。
3102 = "八六的瀏海輕輕飄起，露出無比燦爛的笑容，看得我甚至心生幾分醋意。" 

# 【ハチロク】
# display as 八六
# JP: 「うふふ、ありがとうございます。\nたいへん、ここちようございます」
2378 = "「嘻嘻，謝謝你奧莉薇，我也感到非常涼爽」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ね？　オリヴィ気持ちよくてうれしかったから、\nみんなにもお返ししたいんだ！」
2708 = "「看吧？奧莉薇感覺好涼爽好開心，所以也想報答一下大家！」" 

# monologue
# JP: （ぱたぱた）
3513 = "（扇風）" 

# 【真闇】
# display as 真闇
# JP: 「あらまぁ」
2399 = "「噢噢」" 

# monologue
# JP: （ぱたぱた）
# 3513 = "（扇風）" 

# 【日々姫】
# display as 日日姬
# JP: 「うーん、涼しか！！」
2364 = "「嗯，好涼快哎！！」" 

# monologue
# JP: （ぱたぱた）
# 3513 = "（扇風）" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――確かにここちいい。\nならば甘えよう。ありがとう」
2398 = "「噢噢——的確是涼爽舒心，那就拜託你扇風了，謝謝」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「どーいたしまして！」
2119 = "「不用不用！」" 

# monologue
# JP: ……ほんのわずかな冷気だけれど、\n頭をかなり冷やしてもらえる。
1586 = "……雖然只能感受到些許涼風，但是大腦也已因此冷靜了許多。" 

# monologue
# JP: 筋道立てて順序よく、登呂流湯のご主人から聞いた話を、\n僕なりに整頓し、伝えていけてるような気がする。
3271 = "感覺我已經能將老闆所說的情況條理清晰地整理一下，再告訴大家。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――つまり、鉄道の準エアクラ化。それを目指した者が\n多かったがゆえ、既存の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の延命技術は」
2148 = "「也就是說，許多業內人士改變了研究方向，轉而研究鐵路的半空凝機化，所以目前有關延長\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;壽命的技術——」" 

# 【真闇】
# display as 真闇
# JP: 「まともに研究もされんかった――ゆーことね？」
2513 = "「就根本沒人研究——是這意思嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「残念ながら、そうであるらしい」
2736 = "「聽老闆說就是這樣，很遺憾」" 

# 【日々姫】
# display as 日日姬
# JP: 「そんなん！　おかしかとよ！」
2806 = "「這！不對勁啊！」" 

# monologue
# JP: 日々姫の大声。立ち上がらんばかりの勢いだ。
3331 = "日日姬大声喊道，彷彿下一刻就要站起身來。" 

# 【日々姫】
# display as 日日姬
# JP: 「頭よか人たちが、なんでそぎゃん間違いしよると！？　\n鉄道ば、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;があってこそって」
2551 = "「怎麼腦子更靈光反倒在根本問題上犯糊塗呢！？要是沒了\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，那鐵路哪還是鐵路咧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっかな？\nオリヴィは、それって間違いじゃないと思うけど」
2653 = "「有嗎？奧莉薇覺得這麼想沒有錯呀」" 

# 【日々姫】
# display as 日日姬
# JP: 「えええっ！！？」
2283 = "「哎哎哎！！？」" 

# monologue
# JP: 日々姫が固まる。ハチロクも目をパチクリさせてる。\n僕も、同様に驚いてる。
3335 = "日日姬愣住了，八六也不停眨巴眼睛表示疑惑。而我，也一樣詫異不已。" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;のエアクラナビ化。\nそれをまさか、オリヴィが肯定しようとは――
3269 = "想不到奧莉薇自己竟然會贊成，讓\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;往空凝機導航的方向發展——" 

# 【真闇】
# display as 真闇
# JP: 「どぎゃんして、間違いじゃなかって、思うと？」
2178 = "「你為什麼會覺得沒錯呢？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2357 = "「嗯」" 

# monologue
# JP: オリヴィのうちわの動きが止まる。\n少し黙って――それから静かな言葉がつながる。
3206 = "奧莉薇停下了扇扇子的手，沉默片刻後沉聲答道。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……大九洲SL構想も成功してるし、広がってるし。\n今までのあり方の鉄道も、いるってもちろん思うけど」
1655 = "「……現在大九州蒸汽機車藍圖是成功了，也得到了大家認可。當然奧莉薇也覺得，一直以來的鐵路模式也沒有問題」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――！\n今までのあり方の鉄道“も”、ですか」
2303 = "「啊——！既往的鐵路“也”可行是嗎」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ。それと同時に、新しいあり方の鉄道も、\nきっとこれから必要になるんじゃないかなって思うの」
2498 = "「對。然後奧莉薇同時還覺得，以後肯定還需要全新的鐵路模式」" 

# monologue
# JP: そう聞かされて、僕の耳からもウロコが落ちる。
3305 = "我聽到這裡才如夢初醒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか。冷静に考えてみれば、\nそれらはお互い、否定しあう関係でもないか」
2296 = "「哦哦——對啊，冷靜想想就明白，二者也並非相互矛盾的關係」" 

# 【日々姫】
# display as 日日姬
# JP: 「ばってん――\n自動運転の鉄道なんかに、なんの面白みがあると？」
2550 = "「怎麼個意思——都整成自動的了，鐵路還有什麼樂趣啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、この場合求められるのは、\n面白みではなく、実用性だ」
2115 = "「不是，這時需要的不是樂趣，而是實用性」" 

# 【日々姫】
# display as 日日姬
# JP: 「やけん、そん実用性でエアクラに勝てんかったから、\n鉄道ば、大廃線でぼろぼろになったわけでしょお」
2243 = "「可鐵路不就是實用性抗不過空凝機，才徹底衰落鬧到大廢線的嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうなのだが――」
2760 = "「話是這麼說——」" 

# monologue
# JP: どのように伝えれば良いものか。\n悩んだわずかな沈黙に、オリヴィがはいと手を挙げる。
3308 = "我開始思索該如何向她解釋，也就在這時，奧莉薇舉起手來發言道。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、エアクラにはくわしくないんだけど――\n弱いとこがあるから、鉄道、生き残ってるわけでしょ？」
2454 = "「奧莉薇雖然不是很了解空凝機——但應該是因為空凝機也有缺點，鐵路才能生存下來的吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「で、ございますね。超重量物移送ができない。\n地磁気の乱れに弱い、暴風に弱い――などが、弱みかと」
2450 = "「奧莉薇所言極是，空凝機無法運輸過重的物品，並且較易受地磁紊亂和暴風影響——這些都是缺點」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら、そういう理由で勝てるところで、\n自動運転化を目指したりすればいいんだと思うな」
2823 = "「那奧莉薇覺得就該利用這些優勢，往自動駕駛的方向發展」" 

# 【日々姫】
# display as 日日姬
# JP: 「でも、そういうとこではもう勝てとるわけでしょお？\nなんでわざわざ、お金かけてまで自動運転化とか」
2234 = "「可是優勢不都已經有了嘛，怎麼還要再費工夫搞那什麼自動化」" 

# 【ハチロク】
# display as 八六
# JP: 「――新技術は、そうしたところでしか試し得ません」
1596 = "「——因為新的技術就只能在這些弱項上尋求突破」" 

# monologue
# JP: きっぱりと、ハチロクは日々姫の疑問を切り捨てる。
3097 = "八六斬釘截鐵地否定了日日姬的觀點。" 

# 【ハチロク】
# display as 八六
# JP: 「そうして、きっと。\n新技術は、鉄道の未来を切り開き得るからではないかと」
2733 = "「而這樣一來，新技術肯定就能為鐵路開闢全新的未來」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなむつかしいこと考えてないけど、\nだいたいイメージおんなじだと思う」
2445 = "「奧莉薇倒沒想這麼深奧，不過差不多也是這個想法」" 

# monologue
# JP: オリヴィの笑顔の同意を受けて、\nハチロクの言葉がなめらかさを増す。
3106 = "八六看到奧莉薇笑著表示贊同，聲音也變得更加有底氣。" 

# 【ハチロク】
# display as 八六
# JP: 「エアクラ自動車に遥かに勝る――例えば時速200キロで、\n[ていおう,1]帝央と[おおさか,1]逢坂とを結ぶ超高速電車がもしもあるなら」
2485 = "「如果能出現速度上遠超空凝機汽車的列車——比如能以時速２００公里往返於帝都中央車站和大阪的超高速列車」" 

# 【日々姫】
# display as 日日姬
# JP: 「それなら私も乗ってみたかと！　時速200キロとか、\nどんな景色が見えるのか、単純に興味あるし」
2654 = "「有的話我都想坐一坐嘞！真好奇時速２００公里能看到什麼樣的風景」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だけでなく、ビジネス利用も戻ってこよう。地上型――\nエアクラカーの平均巡航速度は時速60キロ程度なのだし」
2798 = "「這樣一來鐵路也能夠重新得到商業運輸的青睞，畢竟陸地型——空凝機車的時速只有６０公里左右」" 

# 【ハチロク】
# display as 八六
# JP: 「くわえて、定時性。遅れないことに関しましても、\n地上型のエアクラよりもやはり、鉄道に利がございます」
2197 = "「再加上列車是定時運作，就極少出現延遲這一方面來說，鐵路相比陸地型空凝機也具備更大優勢」" 

# 【日々姫】
# display as 日日姬
# JP: 「あー、そっか。それならわかる。そこまでいくんなら、\n『鉄道の実用性』ってお話にもなってくると思う」
2339 = "「啊，對呀，這下我就理解了，如果真能實現高速，鐵路的實用性就不再是競爭中的缺點了」" 

# monologue
# JP: 日々姫の小さな頷きを受け、\nオリヴィも嬉しげな顔になる。
3333 = "日日姬微微點了點頭，奧莉薇見狀也笑了起來。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどさ、時速２００キロなんて、今の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とか\n人間で、安全に運転できるか、わかんないでしょ？」
2238 = "「可是呀，如果時速提高到２００公里，還不知道現在的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;或者人類能不能實現安全駕駛對不對？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　だから自動運転！！？」
2333 = "「啊！所以才需要自動駕駛！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その技術も必要になってくるだろう。が、それは当然、\n一朝一夕、一足飛びに産み出されるものでもない」
2594 = "「或許也會需要這些技術輔助吧，當然這都不是一朝一夕就能實現的」" 

# 【日々姫】
# display as 日日姬
# JP: 「そっか――だからか」
2800 = "「這樣啊——所以才要」" 

# monologue
# JP: 今度は、深く、強い頷き。
3229 = "她這次則是強而有力地點了一下頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「だから、確実に勝てるとこ――\n試験ばできるとこで、試験しようって話になるとね」
2605 = "「所以才要在優勢領域穩紮穩打——可以搞實驗的地方放手嘗試的意思唄」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな、けれどそうするためには、\n無論、巨額の資金が必要になる」
2681 = "「沒錯，當然如此嘗試是需要巨額資金的」" 

# 【日々姫】
# display as 日日姬
# JP: 「そんなら、そいば――\n“今ある鉄道”。観光列車の収入でまかなう」
2804 = "「這要整的話——那就得靠“當下”的觀光列車收入嘞」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、運べれば理想的だな。無論、観光のみならず、\n周辺開発などを含めてやっていかねば叶わんだろうが」
2717 = "「真能如願實現是再好不過，當然不能只靠觀光，還得算上鐵路周邊的開髮帶來的效益才比較現實」" 

# 【日々姫】
# display as 日日姬
# JP: 「それもそうだろうけど。……お金儲けを考えるなら、\n観光列車自体にも、もっと伸ばせそうなとこあると思う」
2761 = "「話是這麼說……不過要考慮到積累資金的話，那我覺得觀光列車也得深挖潛力才成」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうと？」
2805 = "「這話怎麼說？」" 

# 【日々姫】
# display as 日日姬
# JP: 「例えば……[オクシデント・エクスプレス,3]西方急行みたいな、\n超豪華観光周遊列車を日ノ本にも走らせるとか」
2671 = "「比方說……就學[Ｏｃｃｉｄｅｎｔ·Ｅｘｐｒｅｓｓ,3]西方快車那種，在日本也開闢一條超豪華觀光周遊列車線路」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それたのしそー！」
2563 = "「感覺好好玩！」" 

# monologue
# JP: ぴょこん！　オリヴィが飛び起きかけて、\nけれどもすぐに、真闇姉の手に優しく穏やかに寝かされる。
3203 = "奧莉薇一個激靈想坐起來，但是她馬上又在真闇姐溫柔的安撫之下躺了回去。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「サッポロ、センダイ、テイオー、ナゴヤ、オーサカ、\nキョート、ヒロシマ、カゴシマ！　めぐってみたい！」
2166 = "「什麼札幌、仙台、帝都中央車站、名古屋、大阪、京都、廣島、鹿兒島！這些奧莉薇都想去轉轉！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「超富裕層をターゲットにしたハイクラス――\nいや、プレミアムステージの観光列車か」
2884 = "「面向超富裕階級的高級線路——不，應該稱之為專享觀光列車」" 

# 【ハチロク】
# display as 八六
# JP: 「日ノ本全土は、今すぐにはとても無理でも……\nたとえば、九洲だけでも巡らせられたのなら――」
2518 = "「就算目前無法實現覆蓋日本全境……如果能在某個地域開闢一段周遊路線，比如九州之類——」" 

# 【真闇】
# display as 真闇
# JP: 「……博太によーさん観光にきよる海外のお客さんば、\n九洲全土に、おまねきできるかもしれんねぇ」
1660 = "「……說不定就能讓那些專程來參觀博多２３景的國外旅客，對九州全域產生興趣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
# 2396 = "「噢噢——」" 

# 【日々姫】
# display as 日日姬
# JP: 「大九洲SL構想の発展系で、それならいけると思う。\n九洲らしか――九洲の粋を集めたデザインで」
2564 = "「感覺就當做大九州蒸汽機車藍圖未來發展的趨勢沒毛病，列車也要設計成擁有九州風格——集中九州精粹最好」" 

# monologue
# JP: 日々姫の瞳が、仕事の眼差し――\nデザイナーの目になっている。
3337 = "日日姬臉上浮現出對工作的嚮往——她現在展現出的，完全是設計師的眼光。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それオリヴィ乗ってみたいかも！　日々姫デザインの、\nちょーさいこーきゅーかんこーれっしゃ！」
2443 = "「奧莉薇也想坐一坐哇！試試日日姬設計的那個超高級觀光列車！」" 

# 【日々姫】
# display as 日日姬
# JP: 「乗ってみたい――だよね、うん。\nその気持ちを、デザインで、システムで引き起こせれば」
2658 = "「果然——大家都想坐坐看看呢，是吧。只要能靠列車款式，和運營模式引起大家的興趣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――だな。\n乗ってみたいを感じてもらえねば、話にならん」
2352 = "「嗯——沒錯。首先關鍵就在於能夠勾起人們的興趣」" 

# monologue
# JP: 超高級観光列車でも、新技術を用いた通勤列車でも。\nあるいは超高速電車であっても同じ。そこが根っこだ。
3140 = "即便是超高級觀光列車或者採用新技術的通勤列車，以及超高速電車，這一點都是繞不過去的重中之重。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……逆に言えば、『乗ってみたい』をエアクラに全て\nもっていかれたがゆえに、大廃線は起きてしまった」
1636 = "「……反過來說，正因為過去人們的興趣都被空凝機勾走了，才會導致大廢線的」" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、エアクラ側に行った人たちも間違いじゃなかとね。\nもう一度――鉄道側へのレールをしいてあげられれば」
2561 = "「想明白了的話，也就怪不得那些都跑去乘空凝機的人嘞，還是要把鐵路整好把人家請回來才行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――そうだな、きっと」
1597 = "「——沒錯，我們一定能實現」" 

# monologue
# JP: 今の会話で、僕にもわずかに見えてきたような気がする。
3470 = "通過這番交談，我也對我們的理想有了些許新的認識。" 

# monologue
# JP: 大九洲SL構想がつなぐレールを、\nさらにどこへと伸ばしていけばいいのか、その路線図が。
3466 = "這正是我們為大九州蒸汽機車藍圖所鋪設的鐵軌，所理應通入的下一個路線圖。" 

# 【真闇】
# display as 真闇
# JP: 「ばってん、そんレールば敷くのに、何年かかると？\nおねーちゃんの寿命でも、間に合いそうもなかけど」
2617 = "「於是，咱們得花多少年才能實現這個目標？感覺姐姐我都沒辦法活著看到那一天嘞」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っと、その話であったな」
2261 = "「呃，我們也該言歸正傳了」" 

# monologue
# JP: そうだ。全ては今いる場所から――足元からだ。
3248 = "對，千里之行始於足下——我們不能忘記這個道理。" 

# monologue
# JP: いかに遠大なレールであろうと、既存路線に\x%l接続;#00ffc040;接続%l;#;できねば、\n僕らにとっては無いのと変わらん。
3051 = "不管再長遠的路線圖，如果不能立足當下，讓現有線路上的列車得以\\x%l接続;#00ffc040;會車%l;#;，讓乘客得以換乘，便無異於一紙空談。" 

# 【双鉄】
# display as 雙鐵
# JP: 「登呂流湯さんは、そうした話をすることにより、\n逆説的に、僕らに教えてくれたのだ」
2132 = "「不過登呂流浴場的老闆通過這個話題，讓我們反其道而行之，想到了解決方案」" 

# 【真闇】
# display as 真闇
# JP: 「ああ」
2294 = "「哦」" 

# 【日々姫】
# display as 日日姬
# JP: 「逆説的にって？」
2230 = "「反其道而行之？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らが頼るべき人物像を。その方は、\n新技術より、既存鉄道や\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の活用こそを――」
2583 = "「我們應當尋找的救兵，應當是即便面對新技術，也依然專注研究利用當前鐵路與\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的人物——」" 

# 【日々姫】
# display as 日日姬
# JP: 「電車姫さま！！」
2881 = "「電車公主殿下！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり」
2664 = "「正是」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「って、ソーテツたち、デンシャヒメとコネあるの？」
2242 = "「可是雙鐵，你們能請得動她幫忙嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ある。\nあの方は[ハチロク,3]8620の熱心なファンだしな」
2370 = "「嗯，有辦法。畢竟她可是[八六,3]８６２０的死忠粉絲」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなのっ！？」
2715 = "「真的！？」" 

# 【日々姫】
# display as 日日姬
# JP: 「だけじゃなかとよー！\n列車デザインの相談、私、受けたことあるけんね」
2810 = "「還有嘞！她原來也就設計列車的問題諮詢過我」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Amazing!!」
2890 = "「Ａｍａｚｉｎｇ！！」" 

# monologue
# JP: オリヴィの瞳が輝く、\n頬がぱあっとバラ色になる。
3207 = "奧莉薇兩眼直放光，臉頰上轉眼間泛起兩朵紅雲。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま」
2880 = "「雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2358 = "「嗯！」" 

# monologue
# JP: そうだった。\n興奮させすぎてはいかん。
3247 = "對了，不能讓她激動過度。" 

# monologue
# JP: 今はともかく、オリヴィを休ませ、落ち着けることだ。
3364 = "現在的當務之急是先讓奧莉薇好好休息，恢復平靜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットにも聞いてもらったほうがいいと思うゆえ、\n連絡は明日以降にしようと思う」
2565 = "「感覺最好也要跟波萊特說一聲，不過明天到公司再說也無妨吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかったー」
# 2469 = "「好的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いい返事だ」
2711 = "「真懂事」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ！？」
# 2334 = "「啊！？」" 

# monologue
# JP: びくりと体をすくめられ、\n自分の右手がオリヴィを撫でようとしていたと気づく。
3205 = "奧莉薇一縮身子，我才發現自己正準備伸出右手去撫摸她的腦袋。" 

# monologue
# JP: いかん。相手はハチロクでも日々姫でもないというのに。\nというか――
3465 = "這可不對，對方又不是八六或者日日姬，另外——" 

# 【双鉄】
# display as 雙鐵
# JP: 「あわてて、この部屋に布団を敷いてしまったな。\n日々姫がよければ、僕は日々姫の部屋で寝るゆえ」
2216 = "「匆忙之中，不小心就讓奧莉薇睡在這個房間了，日日姬如果你不介意，我還是去你的房間睡吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ！　あのねソーテツ？\nオリヴィ、できたらみんなで寝たい」
2327 = "「啊！　話說雙鐵，可以的話奧莉薇想大家都睡在一起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「みんなでか」
2855 = "「都睡在一起嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「それは素敵な考えですね！\nわたくし、もちろん大賛成です」
2547 = "「很棒的主意！我當然舉雙手贊成」" 

# 【日々姫】
# display as 日日姬
# JP: 「なら、次の間もつなげんといけんねー。\n私、客ぶとんもってくる！」
2847 = "「那還得把隔間連起來嘞，我去整客用褥子！」" 

# 【真闇】
# display as 真闇
# JP: 「おねーちゃん、早起きやけん。\nみんなば起こしてしまうかもしれんけど」
2487 = "「姐姐我平時可都起很早的，可能會吵醒大家喲」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ぜんぜんへーき！　オリヴィだってはやおきするし」
2489 = "「完全沒問題！奧莉薇也要早起的」" 

# 【真闇】
# display as 真闇
# JP: 「そ？　やったら」
2634 = "「是嗎？那行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2357 = "「嗯」" 

# monologue
# JP: 布団を並べ、川の字で寝る。\n三人ではなく、五人での川。
3281 = "我們把被褥鋪好，以川字型躺在一起。當然，川是三豎，我們五個人當然就是五豎了。" 

# monologue
# JP: 川の字の外と内とに、さらに大きな流れを湛える、\nクマ川のような川の字で。
3128 = "其形態好像隈河一般，外二筆和內三筆之間容納了更寬廣的水流。" 
