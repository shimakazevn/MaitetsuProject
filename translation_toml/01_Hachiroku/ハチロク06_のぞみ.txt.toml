[script]
# lines: 518 
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫だそうです、双鉄くん！\nこっち、任せてもらってオッケーです」
2879 = "「雙鐵君，看來不要緊！這邊就交給我們吧」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、かんびょうがんばりますねぇ」
2690 = "「玲奈會努力照顧她的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2466 = "「好吧」" 

# monologue
# JP: 女湯から、ポーレットとれいなの声。
3255 = "從女浴室傳來了波萊特和玲奈的聲音。" 

# monologue
# JP: ほっとするのとほとんど同時に、\n落ち着いた声が近づいてくる。
3293 = "我心中一塊石頭終於落地，幾乎與之同時一個沉靜的聲音朝我這邊接近。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ゆーことやけん、ちくと」
2737 = "「聽著沒，外頭涼快去」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ――」
2299 = "「啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2469 = "「好的」" 

# monologue
# JP: 何故だか理由もわからぬままに、指示に従い外へと出れば、
3280 = "我們就這麼一頭霧水地按照她的指示來到外頭。" 

# 【ハチロク】
# display as 八六
# JP: 「やはり、わたくしはあちらに戻ったほうが」
2661 = "「果然我還是應該回到她身邊」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「いけん」
2122 = "「不行」" 

# monologue
# JP: ――出た瞬間に戻ろうとしたハチロクが、\nご主人にぴしゃりと止められる。
1550 = "——八六後腳剛出門就想扭頭回去，卻被老闆一手攔住。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「あぎゃん騒がれとったら、\n下がる温度も下がらんよーになる」
2176 = "「你擱這裡瞎嚷嚷，還降個什麼的溫吶」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし、騒いでなど！」
2589 = "「我哪有嚷嚷！」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ふぅん？」
2811 = "「還說？」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
2334 = "「啊！？」" 

# monologue
# JP: ……なるほど。この調子で取り乱されては、\nまったくもって落ち着くものも落ち着かなかろう。
1567 = "……也是，她這樣亂了陣腳，本來沒事都能給折騰得緊張起來。" 

# monologue
# JP: 大丈夫だと、ハチロクの頭を軽く撫ぜ――。\nうむ。ともかくも、まずは状況を確認しよう。
3306 = "我輕輕摸了摸她的腦袋好讓她平靜下來——好了，現在還是先問清情況。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでご主人。オリヴィの様子は」
2607 = "「所以老闆，奧莉薇現在是什麼情況」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「聞こえたとーりよ。故障ゆーよーな故障はなかけん、\nあのまま冷やして様子ば見るほかなかとよ」
2174 = "「你們不都聽到嘞，就沒什麼個像樣的故障，只能那樣先降著溫再瞧瞧了」" 

# 【ハチロク】
# display as 八六
# JP: 「それは――つまりはどのようなっ」
2825 = "「那她——到底是出了什麼問題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「落ち着けハチロク。\nすでに説明をいただいたことを再質問しているぞ」
2196 = "「八六你冷靜點，老闆才回答過你就別問第二遍了」" 

# 【ハチロク】
# display as 八六
# JP: 「え？」
2341 = "「啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「異常発熱を冷却し、現状でできる検査をいただいた。\n――そこまでは、お前も見ていたのだろう？」
2460 = "「她已經為異常發熱的奧莉薇實施降溫，並進行了目前能做的所有檢查。這些你不也都看到了？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
2357 = "「嗯」" 

# monologue
# JP: オリヴィの同意がなくてはということで、\n僕は検査に立ち会うことができなかった。
3349 = "沒得到奧莉薇的同意，我就不能在場旁觀檢查。" 

# monologue
# JP: が、聞いたことだけからでも、この程度は推測できる。\n立ち会ってなお理解できぬなら、混乱としか言い様も無い。
3057 = "不過就從得知的情況，還是能猜個差不多的，要是八六親眼見證了都還無法理解，只能說她的思考已經亂作一團。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その検査の結果、故障というほどの故障はなかった。\nが、異常発熱が続いているゆえ、冷却を続け、様子見」
2731 = "「而檢查的結果便是，並沒有發現不可忽視的故障，然而發熱沒有平息，只能繼續冷卻，保持觀察」" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
2305 = "「啊」" 

# monologue
# JP: それを解くため、淡々と事実を整頓していけば、\nようやくもってハチロクは、恥ずかしそうな声を出す。
3298 = "我為了讓八六理解，平靜地將事實一一羅列在她面前，於是八六也終於醒悟過來，很不好意思地說道。" 

# 【ハチロク】
# display as 八六
# JP: 「左様……ですね。明確な故障箇所が無いのでしたら、\n今は、本当に様子見だけしか、できない」
2555 = "「您說得對……既然沒有確切的故障，那我們就只能靜觀其變」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「やけん――直せるような“悪かとこ”ばありゃ、\nそいば直して、対応のしようもあるばってん――」
2856 = "「都說了——她要真有能修的毛病，那咱倒還真就有法兒了——」" 

# monologue
# JP: それが、無い。であるのならばオリヴィは……\n人間でいえば、老衰に近い状態なのかもしれない。
3167 = "可是卻找不到哪裡需要修理，也就是說奧莉薇……換成是人類來說，可能就處於類似衰老的狀態。" 

# monologue
# JP: 病気・怪我――そうした明確な原因がなくとも、\n全体的な老朽化、摩耗が、動作の全てを阻害する。
3138 = "即使沒有患病、損傷之確切的因素，全身的老化和磨損已經在影響她的身體機能。" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィ……ちゃん」
2442 = "「奧莉……薇」" 

# monologue
# JP: 祈るような、絞り出されるような声。\n思わず、ハチロクの肩を抱く。
3093 = "八六好不容易擠出的聲音就彷彿在向老天祈禱一般，我忍不住摟住了她的肩膀。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレットとれいながついていてくれるのだ。\nなにかあったら、すぐに\x%l共感;#00ffc040;共感%l;#;を飛ばしてくれるさ」
1651 = "「……有波萊特和玲奈陪在她身邊，真有什麼事馬上就能用\\x%l共感;#00ffc040;共鳴%l;#;通知你」" 

# 【ハチロク】
# display as 八六
# JP: 「は、い……左様ですね、双鉄さま」
2356 = "「嗯……雙鐵少爺您說得對」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに役割分担だ。全員で見守っていても仕方ない。\n話をきちんと聞くことが、きっとオリヴィの役に立つ」
2603 = "「所以我們也要有自己的擔當，都陪在她身邊也沒有意義。現在我們弄清了具體情況，也一定能夠對奧莉薇有所幫助」" 

# 【ハチロク】
# display as 八六
# JP: 「――はい」
1594 = "「——嗯」" 

# monologue
# JP: ゆっくりとした頷きには、ようやくハチロクらしさが覗く。\nふ、と、ご主人の口元も緩む。
3108 = "八六緩緩點了點頭，這才終於回到了她平時冷靜的狀態，而老闆也吁了一口氣，嘴角上揚。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「冷やして冷やして、安全な温度まで下がりゃあ、\nサーキットブレーカーば解除されるけん」
2113 = "「不斷降溫，等到了安全溫度，斷路器也就自個兒關上嘞」" 

# 【双鉄】
# display as 雙鐵
# JP: 「サーキットブレーカー」
2613 = "「斷路器？」" 

# 【ハチロク】
# display as 八六
# JP: 「回路遮断装置、のことでございます」
2510 = "「就是切斷迴路用的裝置」" 

# monologue
# JP: 単語自体は知っている。が――\nハチロクは説明することで、自分を落ち着けたいのだろう。
3464 = "這個東西我倒是知道的，不過八六這樣向我解釋，也是想讓自己恢復平靜。" 

# 【ハチロク】
# display as 八六
# JP: 「制御系の[ちゅうすう,1]中枢部や記憶域など、損傷が起きてしまうと\n復旧不可能な部分を、異常から保護するために遮断する」
2407 = "「在出現異常情況時，為了保護控制系統中樞、記憶模組這些一旦損壞便無法復原的部位，就要切斷迴路」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そん解釈で間違いなか。今回は、\n異常発熱から中枢部ば守るため、作動しよったとね」
2520 = "「就這麼解釋沒差。這回是為了保護中樞不受異常發熱侵害而啟動了斷路器的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2651 = "「是這麼回事」" 

# monologue
# JP: 黙って聞いて、やはり良かった。
3479 = "還好我選擇默默聽她們講解。" 

# monologue
# JP: 言葉を聞いた瞬間に浮かんだ推測が裏付けられたし、\n話して聞くうち、ハチロクも随分と落ち着いたようだ。
3133 = "剛才老闆提到這個詞時瞬間想到的推測得到了證實，而且八六說著說著也冷靜了許多。" 

# 【ハチロク】
# display as 八六
# JP: 「ですから水風呂で冷却し、安全な温度まで下げることは、\nきっと最適な対処であると、わたくしも理解いたします」
2600 = "「所以我也覺得，將她放在裝滿水的浴池中降溫，恢復安全體溫一定是目前最有效的處置方式」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、冷却には水風呂を使って――っ！\nひょっとしてそのために温泉施設を？」
2402 = "「噢，用浴池裝滿水降溫——啊！該不會建造溫泉設施就是為了處理這些問題？」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そぎゃんアホなこつあるわけも無か。だいたい、\n熱暴走した\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ば、こぎゃん時代じゃなけりゃ」
2527 = "「幹這等蠢事是傻還是彪啊？就說要不是擱咱這時代，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;過熱失控那還修個什麼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2396 = "「噢噢——」" 

# monologue
# JP: レイルロオドは最重要の保安装置で、それゆえに消耗品。\n……ハチロクに聞かされた言葉がまざまざ、蘇ってくる。
76 = "\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;是最關鍵的安全組件，也因此被作為消耗品使用……八六之前的一番話漸漸浮現在腦海中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、『こぎゃん時代』であるからこそ、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;修復の必要性は高まってるわけですよね？」
2130 = "「不過就因為是在“這時代”，修復\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;這一行不才是大有前景嗎？」" 

# monologue
# JP: 問えば、ほんのわずかな沈黙。
3433 = "老闆聽我這麼一問，先是沉默片刻。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……『聞きたい話』ゆーんは、その辺の？」
1609 = "「……“你想問的”就是這方面？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい。もしも差し支えなければ」
2646 = "「是的，只要您方便的話我洗耳恭聽」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「差し支えなんぞはなか。\nばってん――答えられそうなことも、思いつかんねぇ」
2762 = "「談不上不方便，可是這——咱也不知道有什麼好說的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのですか？」
2554 = "「您不知道？」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ウチはもう、れいなとハチロクば見るだけやけんね。\n界隈で何が起きてるだなんだは、まるきりわからん」
2271 = "「咱現在也就照顧照顧玲奈跟八六，哪裡還知道業界有個什麼變化不變化的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「でしたら……他の技師の方などとの交流も、\nほとんど無いような感じなのですか？」
2614 = "「於是……您和其他技工也都基本上不來往的嗎？」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「数えるほども無かとよ。\nそぎゃんこつばしたかったら、隠居しとらん」
2515 = "「就沒見過幾次，那什麼，咱要真不想閒著還能隱居在這裡是怎麼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\nそれは――そうですよね」
2650 = "「是這樣，要說——也的確是這個理」" 

# monologue
# JP: しかし、ここで引き下がれる話でもない。
3080 = "但是，也不是這麼簡單就能放棄的。" 

# monologue
# JP: なにか手段は――思うより先、\nハチロクが代わって尋ねてくれる。
3346 = "正當我思索該怎麼繼續詢問時，八六倒是開口替我打聽起了情況。" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、お心あたりは？　\x%lレイルロオド;#00ffc040;レイルロオド%l;#;修復の研究を\n深めてらっしゃいそうな、技師様や工房などについての」
2842 = "「那請問您是否知道，在哪裡有深入研究有關修復\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的技師或者是工房？」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……いかんせん、情報の古かけん」
1638 = "「……咱知道的可都是過時多少年了」" 

# 【ハチロク】
# display as 八六
# JP: 「それでもかまいませぬ。\n少しでも、なにか手がかりにつながるような」
2819 = "「那也無妨，只要有哪怕一點點線索也總是好的」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ん……」
2354 = "「嗯……」" 

# monologue
# JP: 登呂流湯のご主人はしばし目を閉じ考え込み、\nやがて、ゆるゆると首を横に振る。
3378 = "登呂流浴場老闆閉上眼睛思索了一會，最後還是緩緩搖了搖頭。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……先見の明ばある職人は、みぃんな、\nエアクラナビの開発の方に向かったけんねぇ」
1665 = "「……那些有先見之明的同行，全都轉行去開發空凝機導航了」" 

# 【ハチロク】
# display as 八六
# JP: 「エアクラナビ――で、ございますか」
2722 = "「空凝機導航——嗎」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「金やら名誉のためだけでのーて。\n鉄道の未来のために、そん[みち]路を選んだ者も、多かとよ」
2169 = "「他們可不全是為了金錢跟名譽，不少人也是考慮到鐵路的未來而改變方向的」" 

# 【ハチロク】
# display as 八六
# JP: 「え？」
# 2341 = "「啊？」" 

# monologue
# JP: その一言が、よっぽど意外だったのだろう。
3405 = "看來，八六是為老闆這番話感到相當震驚。" 

# monologue
# JP: 不機嫌そうによりかけていたハチロクの眉根が、\n驚き、あがる。
3218 = "她一改先前的不悅，原本皺著的眉頭一下揚了起來。" 

# 【ハチロク】
