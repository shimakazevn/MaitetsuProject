# 【双鉄】
# display as 雙鐵
# JP: 「僕も同意だ。ハチロク、すまんが、僕の財布から」
2575 = "「我也贊成。八六，麻煩你從我的錢包裡拿一下錢」" 

# 【ハチロク】
# display as 八六
# JP: 「のちほどで結構ですよ、双鉄さま。\nすぐに、行ってまいります」
2723 = "「等回來再說便是，我這就去買」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ、おい」
2340 = "「啊，等等」" 

# monologue
# JP: ……止める間もなく行ってしまった。
1579 = "……沒等我攔下她就過去了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへ～、ソフトクリーム、楽しみっ！」
2290 = "「哎嘿嘿，好期待！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら、僕らも店内に入るか？」
2753 = "「要不我們也進店裡看看？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ならって――なんで？」
2177 = "「你為什麼——要問奧莉薇？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、こう……なんだ、その――」
2263 = "「呃，這個……怎麼說呢——」" 

# monologue
# JP: 聞こうとし、危ういところで気づく。\n僕も結局オリヴィを、どこかでこども扱いしていると。
3178 = "問題剛到嘴邊，我這才注意到自己的錯誤。到頭來，我對待奧莉薇的態度依然摻雜了幾分對待孩子的感覺。" 

# monologue
# JP: が、オリヴィはじっと僕を見ている。\nここまで来たら、正直に伝える他にないだろう。
3169 = "可是奧莉薇卻目不轉睛地盯著我看。既然如此，我也只能實話實說了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ソフトクリームを作るところを、\n見てみたくないかと……少し、思って」
2591 = "「我是想……你會不會想去看看冰淇淋的製作過程」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あはは！　ありがと。でもね、オリヴィも、\n作ってるとこみたことくらいはあるよー」
2316 = "「啊哈哈！謝謝關心。可是奧莉薇好歹也是見過怎麼做冰淇淋的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
2801 = "「這樣啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど――はじめてのおきゅーりょーで、自分で買った\nソフトクリーム作ってもらうのは、見てみたいかも」
2128 = "「不過呢——等奧莉薇拿自己的薪水買冰淇淋的時候，應該會想看看人家怎麼做冰淇淋」" 

# monologue
# JP: 言って、オリヴィはにっぱり笑う。
3214 = "奧莉薇說罷，便莞爾一笑。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがとソーテツ！　いいこと教えてもらっちゃった。\nおきゅーりょーもらったら、オリヴィそーしてみるね！」
2764 = "「謝謝你，雙鐵！你這個主意很好。等奧莉薇拿到薪水，就去這樣做！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。きっとそのときのソフトクリームは、\n今日食べるものより、さらに甘く、おいしくなるぞ」
2366 = "「嗯，我想那時你拿到的冰淇淋，會比今天更加甜美可口」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほんとに！？　たのしみーっ！」
2713 = "「真的嗎！？好期待哦！」" 

# monologue
# JP: なんともかわいい。\nあどけなさとは、このことだ。
3227 = "她的一舉一動著實可愛，這便是人們常說的天真爛漫。" 

# monologue
# JP: お姫様だっこしていなければ、\nいいこいいこと、頭をなでくりまわしてやりたい。
3233 = "如果不是處於公主抱這樣的姿勢，我真想盡情撫摸她那可愛的小腦袋。" 

# 【ハチロク】
# display as 八六
# JP: 「おまたせいたしました」
2765 = "「讓你們久等了」" 

# monologue
# JP: 右手に白、左手にピンクのソフトクリームを大事にもって、\nハチロクがコンビニから戻ってくる。
3164 = "只見八六右手持白色的，左手持粉色的，她就這麼小心翼翼地拿著冰淇淋從便利商店那邊走了過來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、では行こう」
2374 = "「嗯，那我們繼續走吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「行こうって、ちょっとまって！\nオリヴィ、まだソフトクリームもらってないよ」
2773 = "「走什麼呀，等一等！奧莉薇還沒拿到冰淇淋呢」" 

# 【ハチロク】
# display as 八六
# JP: 「ああいえ、オリヴィちゃんは病み上がりなのですから。\nバニラとイチゴ、どちらを最初に召し上がりますか？」
2309 = "「啊不是，我這是考慮到你才剛剛康復不能吃太急，那你想先吃香草味還是草莓味？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「え？　っとね、それじゃあ――バニラ！」
2342 = "「啊？讓奧莉薇想想，那就要——香草的！」" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。はい、『あーん』」
2467 = "「好的。來，“啊——”」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ええっ！？　いいよそんなの。オリヴィ自分で」
2289 = "「哎哎！？不用啦，奧莉薇可以自己吃」" 

# 【ハチロク】
# display as 八六
# JP: 「早く食べないと溶けてしまいますよ？\nはい、『あーん』」
2111 = "「不快點吃掉可是會化的，來，“啊——”」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えっ？　え――ううぅ――」
2265 = "「呃？啊——嗚嗚——」" 

# monologue
# JP: こうなったハチロクは引き下がらない。
3116 = "八六這個態度，可是很難有人說動的。" 

# monologue
# JP: オリヴィもそれを察してか、\nおずおずと、それでも大きく口を開いて――
3076 = "似乎奧莉薇也發現了，她戰戰兢兢地張大自己的嘴巴——" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「『あーん』――はむっ！\nん――んんっ！　おいひいいいいいっ！」
1608 = "「“啊——”啊唔！嗯——嗯嗯！ 好好吃哎——！」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふ、よかった。\nふたくちめは、どちらを？」
2381 = "「嘻嘻，那就好。那你第二口想吃哪一個？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「もちろんストロベリー！　あーん――――はむっ！\nんんんんっ！　あまずっぱぁぁぁいっ！」
2696 = "「當然是草莓味！啊————啊唔！嗯嗯嗯！味道酸酸甜甜的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
2281 = "「哈哈」" 

# monologue
# JP: 食べやすいよう、ハチロクと呼吸をあわせつつ、\nペースを落としてゆっくり歩く。
3355 = "為了方便八六餵奧莉薇吃冰淇淋，我放慢速度，配合八六的步伐。" 

# monologue
# JP: しかし、まぁ……\nオリヴィも楽しげに食べてくれているからいいが――
3058 = "不過這……算了，看奧莉薇吃得這麼樂呵倒也無妨——" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「はむっ――ぺろっ――んふふふっ～\nでさ、溶けたらやだから、食べながらでいいんだけどさ」
2321 = "「啊嗚——（抹嘴）——嗯呵呵～不過，雖然在路上邊走邊吃是總比化了要好」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、なんでしょう？　オリヴィちゃん」
2362 = "「嗯，奧莉薇你的意思是？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あむっ――ん、うふっ――えと、さ。ハチロク。\nなんですぐ、オリヴィのこと赤ちゃんみたいに扱うの？」
2322 = "「啊嗚……嗯，嘻嘻——就是那個，八六，你為什麼動不動就要把奧莉薇當成小寶寶那樣看待呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「え？　――ああああっ！？」
2291 = "「哎？——啊啊啊啊！？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソフトクリーム！　気をつけてっ！！」
2685 = "「注意冰淇淋！　小心別弄掉了！！」" 

# 【ハチロク】
# display as 八六
# JP: 「あああ、ごめんなさいっ」
2320 = "「啊啊，對不起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「落ち着け、ハチロク」
2195 = "「八六你冷靜點」" 

# monologue
# JP: まさに気にしていたところを、\nオリヴィがずばり、とても軽やかに尋ねてくれた。
3350 = "沒想到奧莉薇毫不避諱，隨口就把我剛才想到的事情問了出來。" 

# monologue
# JP: こうしたところは、本当に大人だ。\n僕よりも、ハチロクよりも、きっと、ずうっと。
3436 = "而這正是她心智之成熟的表現，其程度理應是遠遠在我和八六之上。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーそー。おちつこー。\n別にせめたりしてるわけじゃないしさー――あむっ」
2500 = "「對對，冷靜冷靜，奧莉薇也沒有責備你的意思啦——啊嗚」" 

# monologue
# JP: オリヴィの言葉と仕草に、\n目に見えてハチロクは安堵する。
3211 = "奧莉薇的一番話以及她的表情，也讓八六大大地鬆了一口氣。" 

# monologue
# JP: そうして、ゆるゆる――\n実に面目なさそうに、言葉を絞り出していく。
3358 = "然後她表現得尤為內疚——就好像擠海綿一樣慢慢吐露自己的心聲。" 

# 【ハチロク】
# display as 八六
# JP: 「あの……わたくし、オリヴィちゃんを先輩として、\nきちんと敬意を、こころの底から持っております」
2457 = "「奧莉薇，你聽我說……我真的是發自內心將你視為資深老前輩，心懷敬畏的」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかってるよー。でなきゃオリヴィ、\nこんなことしてるわけないし――ぺろっ」
2451 = "「奧莉薇知道的啦，不然也不可能讓你餵著吃——（舔）」" 

# 【ハチロク】
# display as 八六
# JP: 「その上で――なぜ、そのような――赤ちゃん扱い、と\n思われてしまう態度をとってしまうかと申しますと」
2620 = "「既然如此，我又不小心露出這種態度——也就是將你視為小寶寶，究其原因在於——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん――はむ――\nん～っ、ぺろっ！」
2351 = "「嗯——啊嗚——嗯～（舔）！」" 

# monologue
# JP: 悩みながらも、おそらく反省もしながらも、\nソフトクリームを食べさせる手は、規則正しく動き続ける。
3107 = "八六看起來除了心存煩惱，很可能同時也在反省，同時依然以有規律的動作轉動手中的冰淇淋。" 

# 【ハチロク】
# display as 八六
# JP: 「……双鉄さま。あのことを――\nオリヴィちゃんにも説明さしあげて大丈夫でしょうか？」
1667 = "「……雙鐵少爺，我可以向奧莉薇——道出我們的煩惱嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はかまわん。というかむしろ――」
2572 = "「我不介意，反倒是——」" 

# monologue
# JP: 言って、気がつく。\nオリヴィは冥国製、海外製で、ハチロクよりも古いのだ。
3455 = "說到這裡我突然想到，奧莉薇是進口的美國式鐵路人偶，並且年代比八六更加久遠。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィは、\n僕らにはないアプローチを知っているかもしれん」
2154 = "「也許奧莉薇，會知道什麼我們想不到的辦法」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2329 = "「啊！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほーほーって、なんの？　――あっ」
2776 = "「辦法是說什麼？——啊」" 

# monologue
# JP: オリヴィが、食べようとして止まってしまう。\n目に見えるクリーム部分を、食べ尽くしてしまったために。
3210 = "奧莉薇想繼續吃卻又停了下來，這是因為上半部分的冰淇淋已經都給吃乾淨了。" 

# 【ハチロク】
# display as 八六
# JP: 「あとはコオンでございますね？\nどちらからにされますか？」
2504 = "「就只剩蛋卷了，你要先吃哪一個？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「んと――両方ちょーだい！\nかわりばんこに食べるから」
2346 = "「嗚——都給奧莉薇！奧莉薇要換著吃」" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。\nこぼさないよう、しっかり持って――あ！」
2473 = "「好的，小心要拿穩，可別弄掉了——啊！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あははは！　まただ！　赤ちゃんあつかいー！」
2314 = "「啊哈哈哈！　你又來了！　又把奧莉薇當成小寶寶！」" 

# monologue
# JP: オリヴィはけらけら笑いつつ、カリコリカリコリ――\nげっ歯類の小動物よろしく、コーンをみるみる食べていく。
3215 = "奧莉薇開懷大笑，同時開始小口吃起蛋卷——其動作宛如一隻憨態可掬的小松鼠。" 

# monologue
# JP: ……これはまぁ、この様子だけを見てしまうなら、\nこども扱いするなというのが厳しいように思えてしまうが。
1575 = "……我們對她的關注也往往集中於這些方面，感覺要注意不把她當小孩子看也並非一件易事。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「で？　ほーほーって？　なんのほーほー？」
2615 = "「於是呢？　你們說的方法是指什麼問題？」" 

# 【ハチロク】
# display as 八六
# JP: 「その……双鉄さまとわたくしが、\n夫婦として、こどもの親となる――そのために」
2506 = "「就是……雙鐵少爺與我已結為夫婦，於是便希望擁有孩子，為人父母——為此我們想要知道方法」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「こどもっ！？」
2488 = "「孩子！？」" 

# monologue
# JP: オリヴィの激しい驚きに、しかしハチロクは動じない。\nその反応を当然のことと受け止めている。
3119 = "八六面對瞠目結舌的奧莉薇卻表現得極其平靜，將她的態度視為再尋常不過的反應。" 

# 【ハチロク】
# display as 八六
# JP: 「こどもを、引き取らせていただく方法。\nあるいは、その――もしも、存在するなら」
2885 = "「領養孩子的方法，又或者——如果真的存在這個可能」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2357 = "「嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「引き取る以外の……どのような形でもいいのです。\nわたくしたちが、こどもを育てさせていただく方法を」
2872 = "「除了領養……我們是否還存在其他獲得孩子的途徑，倘若真有可能，不論什麼方法我們都願意一試」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー」
# 2305 = "「啊」" 

# monologue
# JP: ごくんと、最後のコーンをオリヴィは飲み下す。
3204 = "奧莉薇一口吞下了最後剩的一點蛋卷。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ごめん……オリヴィはそういうほーほー知らないや。\nけど――なんで、こどもを育てたいって思ったの？」
2609 = "「抱歉……奧莉薇不知道有什麼辦法。不過——你們為什麼想要孩子呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「その――わたくし。つい先日、双鉄さまのご友人様の\n赤ちゃんと、産まれて初めて、とても親しく接しまして」
2797 = "「這是因為——在不久之前，我有生以來第一次，在雙鐵少爺朋友那裡，見到了她的小寶寶，並和她有了一番親密接觸」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふぅん？」
2391 = "「噢」" 

# 【ハチロク】
# display as 八六
# JP: 「あの小さな手にふれていただき、ぬくもりを知って、\n――なにもかもが、まるく、やわらかであると感じて」
2593 = "「我觸碰了那嬌小的手，感受那溫熱的身體。小寶寶身上的每一個部分都是圓嘟嘟軟捏捏的」" 

# monologue
# JP: ……オリヴィは、余計な口を挟まない。
1572 = "……奧莉薇沒有再問什麼。" 

# monologue
# JP: ハチロクの説明を、\n静かに聞いていてくれる。
3231 = "她默不作聲，聽八六講到最後。" 

# 【ハチロク】
# display as 八六
# JP: 「――新しい命を授かる。命のレールをつないでいく。\nそれが、どれほど素敵なことかを、知ったのです」
1599 = "「——那一次經歷讓我認識到，孕育新生命，將生命的鐵軌延續下去是多麼美好的一件事」" 

# 【オリヴィ】
# display as 奥莉薇
