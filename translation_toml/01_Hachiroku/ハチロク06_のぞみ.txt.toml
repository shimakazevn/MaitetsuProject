[script]
# lines: 518 
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫だそうです、双鉄くん！\nこっち、任せてもらってオッケーです」
2879 = "「Có vẻ không sao đâu, anh Soutetsu!\nBên này cứ giao cho chúng tôi là được rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、かんびょうがんばりますねぇ」
2690 = "「Reina sẽ cố gắng chăm sóc cho chị ấy nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2466 = "「Vậy sao.」"
# monologue
# JP: 女湯から、ポーレットとれいなの声。
3255 = "Từ nhà tắm nữ, vang lên giọng của Paulette và Reina."
# monologue
# JP: ほっとするのとほとんど同時に、\n落ち着いた声が近づいてくる。
3293 = "Gần như cùng lúc với cảm giác nhẹ nhõm,\nmột giọng nói điềm tĩnh tiến lại gần."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ゆーことやけん、ちくと」
2737 = "「Là vậy đó, ra ngoài một chút đi.」"
# 【ハチロク】
# display as 八六
# JP: 「あっ――」
2299 = "「A――」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2469 = "「Vâng.」"
# monologue
# JP: 何故だか理由もわからぬままに、指示に従い外へと出れば、
3280 = "Không hiểu lý do tại sao, nhưng chúng tôi vẫn nghe theo chỉ thị bước ra ngoài."
# 【ハチロク】
# display as 八六
# JP: 「やはり、わたくしはあちらに戻ったほうが」
2661 = "「Quả nhiên là em vẫn nên quay lại bên đó thì hơn.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「いけん」
2122 = "「Không được.」"
# monologue
# JP: ――出た瞬間に戻ろうとしたハチロクが、\nご主人にぴしゃりと止められる。
1550 = "――Vừa ra khỏi cửa, Hachiroku đã định quay lại,\nnhưng bị bà chủ chặn đứng."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「あぎゃん騒がれとったら、\n下がる温度も下がらんよーになる」
2176 = "「Cứ làm ầm ĩ lên như thế,\nthì nhiệt độ đáng lẽ giảm được cũng chẳng giảm nổi đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくし、騒いでなど！」
2589 = "「Em đâu có làm ầm ĩ!」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ふぅん？」
2811 = "「Hừm?」"
# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
2334 = "「A!?」"
# monologue
# JP: ……なるほど。この調子で取り乱されては、\nまったくもって落ち着くものも落ち着かなかろう。
1567 = "……Ra là vậy. Cứ hoảng loạn với cái điệu bộ này,\nthì những người vốn dĩ đang bình tĩnh cũng chẳng thể nào bình tĩnh nổi."
# monologue
# JP: 大丈夫だと、ハチロクの頭を軽く撫ぜ――。\nうむ。ともかくも、まずは状況を確認しよう。
3306 = "Tôi khẽ xoa đầu Hachiroku, bảo em ấy không sao đâu――.\nỪm. Dù sao thì trước tiên cũng phải xác nhận tình hình đã."
# 【双鉄】
# display as 雙鐵
# JP: 「それでご主人。オリヴィの様子は」
2607 = "「Vậy thưa bà chủ. Tình trạng của Olivy thế nào rồi?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「聞こえたとーりよ。故障ゆーよーな故障はなかけん、\nあのまま冷やして様子ば見るほかなかとよ」
2174 = "「Như cậu đã nghe đấy. Chẳng có hỏng hóc gì đáng gọi là hỏng hóc cả,\nchỉ còn cách cứ ngâm lạnh như thế rồi theo dõi thêm thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「それは――つまりはどのようなっ」
2825 = "「Thế――tóm lại là bị làm sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「落ち着けハチロク。\nすでに説明をいただいたことを再質問しているぞ」
2196 = "「Bình tĩnh lại đi Hachiroku.\nEm đang hỏi lại những điều mà bà ấy vừa giải thích rồi đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
2341 = "「Hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「異常発熱を冷却し、現状でできる検査をいただいた。\n――そこまでは、お前も見ていたのだろう？」
2460 = "「Hạ nhiệt cho tình trạng phát sốt bất thường, và tiến hành các bước kiểm tra có thể làm hiện tại.\n――Đến đó thì em cũng đã nhìn thấy rồi đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2357 = "「Vâng.」"
# monologue
# JP: オリヴィの同意がなくてはということで、\n僕は検査に立ち会うことができなかった。
3349 = "Vì không có sự đồng ý của Olivy,\nnên tôi đã không thể có mặt lúc kiểm tra."
# monologue
# JP: が、聞いたことだけからでも、この程度は推測できる。\n立ち会ってなお理解できぬなら、混乱としか言い様も無い。
3057 = "Nhưng chỉ cần nghe qua thôi cũng có thể suy đoán được mức độ này.\nNếu đã có mặt mà vẫn không hiểu, thì chỉ có thể nói là do quá hoảng loạn mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「その検査の結果、故障というほどの故障はなかった。\nが、異常発熱が続いているゆえ、冷却を続け、様子見」
2731 = "「Kết quả kiểm tra cho thấy, không có hỏng hóc nào đáng kể.\nNhưng vì tình trạng phát sốt bất thường vẫn tiếp diễn, nên phải tiếp tục hạ nhiệt và theo dõi.」"
# 【ハチロク】
# display as 八六
# JP: 「あ」
2305 = "「A.」"
# monologue
# JP: それを解くため、淡々と事実を整頓していけば、\nようやくもってハチロクは、恥ずかしそうな声を出す。
3298 = "Để giải tỏa sự hoảng loạn đó, tôi điềm tĩnh sắp xếp lại các sự thật,\ncuối cùng Hachiroku cũng cất lên một giọng điệu xấu hổ."
# 【ハチロク】
# display as 八六
# JP: 「左様……ですね。明確な故障箇所が無いのでしたら、\n今は、本当に様子見だけしか、できない」
2555 = "「Đúng là…… vậy nhỉ. Nếu không có bộ phận nào bị hỏng rõ ràng,\nthì bây giờ, thực sự chỉ có thể theo dõi thêm thôi.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「やけん――直せるような“悪かとこ”ばありゃ、\nそいば直して、対応のしようもあるばってん――」
2856 = "「Thế nên――nếu có \"chỗ nào hỏng\" có thể sửa được,\nthì cứ sửa đi là xong chuyện rồi――」"
# monologue
# JP: それが、無い。であるのならばオリヴィは……\n人間でいえば、老衰に近い状態なのかもしれない。
3167 = "Nhưng lại không có. Nếu vậy thì Olivy……\nNói theo kiểu con người, có lẽ đang ở trong tình trạng gần như lão hóa."
# monologue
# JP: 病気・怪我――そうした明確な原因がなくとも、\n全体的な老朽化、摩耗が、動作の全てを阻害する。
3138 = "Bệnh tật, thương tích――dù không có nguyên nhân rõ ràng nào như vậy,\nnhưng sự xuống cấp và hao mòn toàn diện đang cản trở mọi hoạt động của em ấy."
# 【ハチロク】
# display as 八六
# JP: 「オリヴィ……ちゃん」
2442 = "「Bé…… Olivy.」"
# monologue
# JP: 祈るような、絞り出されるような声。\n思わず、ハチロクの肩を抱く。
3093 = "Một giọng nói như đang cầu nguyện, như bị vắt kiệt.\nTôi bất giác ôm lấy bờ vai của Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレットとれいながついていてくれるのだ。\nなにかあったら、すぐに\x%l共感;#00ffc040;共感%l;#;を飛ばしてくれるさ」
1651 = "「……Đã có Paulette và Reina ở bên cạnh rồi.\nNếu có chuyện gì, họ sẽ lập tức dùng \x%l共感;#00ffc040;cộng cảm%l;#; báo cho chúng ta biết thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「は、い……左様ですね、双鉄さま」
2356 = "「Vâng…… đúng vậy ạ, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに役割分担だ。全員で見守っていても仕方ない。\n話をきちんと聞くことが、きっとオリヴィの役に立つ」
2603 = "「Thế nên phải phân chia công việc. Tất cả cùng ở đó theo dõi cũng chẳng ích gì.\nLắng nghe mọi chuyện cẩn thận chắc chắn sẽ giúp ích được cho Olivy.」"
# 【ハチロク】
# display as 八六
# JP: 「――はい」
1594 = "「――Vâng.」"
# monologue
# JP: ゆっくりとした頷きには、ようやくハチロクらしさが覗く。\nふ、と、ご主人の口元も緩む。
3108 = "Cái gật đầu chậm rãi ấy, cuối cùng cũng cho thấy dáng vẻ thường ngày của Hachiroku.\nBà chủ cũng khẽ mỉm cười."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「冷やして冷やして、安全な温度まで下がりゃあ、\nサーキットブレーカーば解除されるけん」
2113 = "「Cứ làm mát đi, làm mát đến khi hạ xuống nhiệt độ an toàn,\nthì bộ ngắt mạch sẽ được giải phóng thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「サーキットブレーカー」
2613 = "「Bộ ngắt mạch sao.」"
# 【ハチロク】
# display as 八六
# JP: 「回路遮断装置、のことでございます」
2510 = "「Là thiết bị ngắt mạch điện ạ.」"
# monologue
# JP: 単語自体は知っている。が――\nハチロクは説明することで、自分を落ち着けたいのだろう。
3464 = "Bản thân từ đó thì tôi biết. Nhưng――\nCó lẽ Hachiroku muốn giải thích để tự trấn an bản thân."
# 【ハチロク】
# display as 八六
# JP: 「制御系の[ちゅうすう,1]中枢部や記憶域など、損傷が起きてしまうと\n復旧不可能な部分を、異常から保護するために遮断する」
2407 = "「Khi xảy ra hư hỏng ở những bộ phận không thể phục hồi như khu vực trung tâm của hệ thống điều khiển hay vùng nhớ,\nnó sẽ ngắt kết nối để bảo vệ chúng khỏi sự bất thường.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そん解釈で間違いなか。今回は、\n異常発熱から中枢部ば守るため、作動しよったとね」
2520 = "「Giải thích thế là chuẩn rồi. Lần này,\nnó hoạt động là để bảo vệ khu vực trung tâm khỏi tình trạng phát sốt bất thường đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2651 = "「Ra vậy.」"
# monologue
# JP: 黙って聞いて、やはり良かった。
3479 = "Im lặng lắng nghe, quả nhiên là một quyết định đúng đắn."
# monologue
# JP: 言葉を聞いた瞬間に浮かんだ推測が裏付けられたし、\n話して聞くうち、ハチロクも随分と落ち着いたようだ。
3133 = "Những suy đoán nảy ra trong đầu tôi ngay khoảnh khắc nghe thấy từ đó đã được xác nhận,\nvà trong lúc nói chuyện, Hachiroku có vẻ cũng đã bình tĩnh lại khá nhiều."
# 【ハチロク】
# display as 八六
# JP: 「ですから水風呂で冷却し、安全な温度まで下げることは、\nきっと最適な対処であると、わたくしも理解いたします」
2600 = "「Vì vậy, việc dùng bồn nước lạnh để hạ nhiệt độ xuống mức an toàn,\nchắc chắn là cách xử lý tối ưu nhất, em cũng hiểu điều đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、冷却には水風呂を使って――っ！\nひょっとしてそのために温泉施設を？」
2402 = "「Ồ, dùng bồn nước lạnh để hạ nhiệt――!\nKhông lẽ cơ sở suối nước nóng này được xây dựng vì mục đích đó sao?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そぎゃんアホなこつあるわけも無か。だいたい、\n熱暴走した\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ば、こぎゃん時代じゃなけりゃ」
2527 = "「Làm gì có chuyện ngu ngốc như vậy. Nói chung là,\n\x%lレイルロオド;#00ffc040;Railord%l;#; bị quá nhiệt ấy à, nếu không phải trong cái thời đại này thì...」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2396 = "「A――」"
# monologue
# JP: レイルロオドは最重要の保安装置で、それゆえに消耗品。\n……ハチロクに聞かされた言葉がまざまざ、蘇ってくる。
76 = "Railord là thiết bị bảo vệ an toàn quan trọng nhất, và do đó, cũng là một vật phẩm tiêu hao.\n……Những lời Hachiroku từng nói lại hiện về rõ mồn một trong tâm trí tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、『こぎゃん時代』であるからこそ、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;修復の必要性は高まってるわけですよね？」
2130 = "「Nhưng, chính vì là \"trong cái thời đại này\",\nnên sự cần thiết của việc phục hồi \x%lレイルロオド;#00ffc040;Railord%l;#; mới càng tăng cao đúng không?」"
# monologue
# JP: 問えば、ほんのわずかな沈黙。
3433 = "Tôi hỏi, và nhận lại một sự im lặng ngắn ngủi."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……『聞きたい話』ゆーんは、その辺の？」
1609 = "「……\"Chuyện cậu muốn hỏi\" là về cái đó à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。もしも差し支えなければ」
2646 = "「Vâng. Nếu bà không phiền.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「差し支えなんぞはなか。\nばってん――答えられそうなことも、思いつかんねぇ」
2762 = "「Phiền thì không phiền.\nNhưng mà――tôi cũng chẳng nghĩ ra điều gì có thể trả lời được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのですか？」
2554 = "「Vậy sao ạ?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ウチはもう、れいなとハチロクば見るだけやけんね。\n界隈で何が起きてるだなんだは、まるきりわからん」
2271 = "「Tôi giờ chỉ chăm lo cho Reina và Hachiroku thôi.\nChuyện gì đang xảy ra trong giới thì tôi hoàn toàn mù tịt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「でしたら……他の技師の方などとの交流も、\nほとんど無いような感じなのですか？」
2614 = "「Nếu vậy thì…… bà cũng hầu như không giao lưu gì\nvới các kỹ sư khác sao?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「数えるほども無かとよ。\nそぎゃんこつばしたかったら、隠居しとらん」
2515 = "「Đếm trên đầu ngón tay thôi.\nNếu muốn làm mấy chuyện đó thì tôi đã chẳng về ở ẩn rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。\nそれは――そうですよね」
2650 = "「Ra vậy.\nChuyện đó――cũng đúng nhỉ.」"
# monologue
# JP: しかし、ここで引き下がれる話でもない。
3080 = "Nhưng, đây không phải là chuyện có thể dễ dàng bỏ cuộc."
# monologue
# JP: なにか手段は――思うより先、\nハチロクが代わって尋ねてくれる。
3346 = "Còn cách nào khác không――trước khi tôi kịp suy nghĩ,\nHachiroku đã thay tôi hỏi."
# 【ハチロク】
# display as 八六
# JP: 「でしたら、お心あたりは？　\x%lレイルロオド;#00ffc040;レイルロオド%l;#;修復の研究を\n深めてらっしゃいそうな、技師様や工房などについての」
2842 = "「Nếu vậy, bà có biết ai không ạ? Những kỹ sư hay xưởng chế tạo\ncó vẻ đang nghiên cứu sâu về việc phục hồi \x%lレイルロオド;#00ffc040;Railord%l;#; ấy ạ.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……いかんせん、情報の古かけん」
1638 = "「……Ngặt nỗi, thông tin của tôi cũ rích rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「それでもかまいませぬ。\n少しでも、なにか手がかりにつながるような」
2819 = "「Thế cũng không sao đâu ạ.\nChỉ cần một chút thôi, thứ gì đó có thể dẫn đến manh mối cũng được.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ん……」
2354 = "「Ừm……」"
# monologue
# JP: 登呂流湯のご主人はしばし目を閉じ考え込み、\nやがて、ゆるゆると首を横に振る。
3378 = "Bà chủ nhà tắm Tororyu-yu nhắm mắt suy nghĩ một lúc,\nrồi từ từ lắc đầu."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……先見の明ばある職人は、みぃんな、\nエアクラナビの開発の方に向かったけんねぇ」
1665 = "「……Những người thợ có tầm nhìn xa trông rộng, tất cả,\nđều chuyển hướng sang phát triển điều hướng cho Aircra hết rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「エアクラナビ――で、ございますか」
2722 = "「Điều hướng cho Aircra――sao ạ.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「金やら名誉のためだけでのーて。\n鉄道の未来のために、そん[みち]路を選んだ者も、多かとよ」
2169 = "「Không chỉ vì tiền bạc hay danh vọng đâu.\nCũng có rất nhiều người chọn con đường đó vì tương lai của ngành đường sắt đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
# 2341 = "「啊？」" 
# monologue
# JP: その一言が、よっぽど意外だったのだろう。
3405 = "Chắc hẳn câu nói đó đã khiến em ấy vô cùng bất ngờ."
# monologue
# JP: 不機嫌そうによりかけていたハチロクの眉根が、\n驚き、あがる。
3218 = "Đôi lông mày đang nhíu lại vẻ khó chịu của Hachiroku,\nbỗng nhướng lên vì kinh ngạc."
# 【ハチロク】
# display as 八六
# JP: 「鉄道の未来のため――エアクラが[のび,1]野火の如くに広まり、\n大廃線の嵐が吹き荒れた……そんな時代にでしょうか？」
2728 = "「Vì tương lai của ngành đường sắt――vào cái thời đại mà Aircra lan rộng như cháy rừng,\nvà cơn bão đại bãi bỏ tuyến đường sắt đang hoành hành dữ dội đó sao ạ?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そぎゃん時代だったけん。鉄道を生き延びさせるため、\n智慧ば絞りに絞って、路ば見つけようとしとった」
2663 = "「Chính vì là trong cái thời đại đó. Để giúp ngành đường sắt sống sót,\nhọ đã vắt óc suy nghĩ, cố gắng tìm ra một con đường.」"
# monologue
# JP: 懐かしむように、あるいは何かを悔やむように。\n登呂流湯のご主人の目が伏せられる。
3432 = "Như thể đang hoài niệm, hoặc như đang hối hận điều gì đó.\nBà chủ nhà tắm Tororyu-yu cụp mắt xuống."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「右田のは――\n[レ　　イ　　ナ　　ナ,4]キハ０７ｓのダイレクト・コントローラーの扱いば」
2248 = "「Cậu nhà Migita――\nCậu có biết cách sử dụng bộ điều khiển trực tiếp của KiHa 07S không?」"
# monologue
# JP: ダイレクト・コントローラー。
3401 = "Bộ điều khiển trực tiếp."
# monologue
# JP: 通称、\x%lダイコン;#00ffc040;ダイコン%l;#;。\nキハ０７ｓの運転系統に採用されている、運転制御装置だ。
3060 = "Tên gọi phổ biến là \x%lダイコン;#00ffc040;điều khiển trực tiếp%l;#;.\nLà thiết bị điều khiển lái được áp dụng cho hệ thống lái của KiHa 07S."
# 【双鉄】
# display as 雙鐵
# JP: 「乗務可能なレベルではマスターしています。\nポーレットが乗務できないときには、代わりますので」
2412 = "「Tôi đã thành thạo ở mức có thể đảm nhiệm công việc.\nVì khi Paulette không thể lái, tôi sẽ thay thế cô ấy.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そんなら、[ハ　チ　ロ　ク,3]８６２０と[レ　　イ　　ナ　　ナ,4]キハ０７ｓ。\n慣れを除いて、運転しやすかとはどっちかねぇ」
2849 = "「Nếu vậy, giữa 8620 và KiHa 07S.\nBỏ qua sự quen thuộc, thì chiếc nào dễ lái hơn?」"
# 【双鉄】
# display as 雙鐵
# JP: 「慣れを除いて、ですか」
2120 = "「Bỏ qua sự quen thuộc sao ạ.」"
# monologue
# JP: ハチロクが、そわっと身じろぎをして僕を見る。\nなんとも、かわいい。
3098 = "Hachiroku khẽ cựa quậy cơ thể rồi nhìn tôi.\nTrông thật là dễ thương."
# monologue
# JP: これは言い方・伝え方をよほど考えねばだ。
3404 = "Kiểu này thì phải suy nghĩ kỹ cách nói và cách truyền đạt rồi đây."
# 【双鉄】
# display as 雙鐵
# JP: 「運転をしていて楽しいのは圧倒的に[ハチロクニイマル,3]８６２０です。\n機械ではなく、生き物を動かしているようにも感じます」
2756 = "「Về cảm giác lái thú vị thì 8620 áp đảo hoàn toàn.\nCảm giác như đang điều khiển một sinh vật sống chứ không phải là máy móc vậy.」"
# 【ハチロク】
# display as 八六＆登呂流浴場老闆
# JP: 「あ」\n「ふぅん？」
2306 = "「A」\n「Hừm?」"
# 【双鉄】
# display as 雙鐵
# JP: 「[レイナナエス,4]キハ０７ｓにもクセはあるのですが、扱いはずっと楽です。\nどこまでいっても、機械を操作している感覚ですね」
2878 = "「KiHa 07S cũng có những đặc điểm riêng, nhưng thao tác thì dễ dàng hơn nhiều.\nDù thế nào đi nữa, cảm giác vẫn là đang điều khiển máy móc.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「で？　運転しやすかとは」
2597 = "「Thế? Chiếc nào dễ lái hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「慣れを全く考えないなら、キハ０７ｓです。機械操作ゆえ、\nマニュアル通りの反復練習で身につけられる技術かと」
2480 = "「Nếu hoàn toàn không tính đến sự quen thuộc, thì là KiHa 07S. Vì là thao tác máy móc,\nnên chỉ cần lặp đi lặp lại theo sách hướng dẫn là có thể nắm vững kỹ thuật.」"
# 【ハチロク】
# display as 八六
# JP: 「それは左様でございましょうね。\n双鉄さまのお話しどおり、\x%l蒸機;#00ffc040;蒸機%l;#;は生き物ですので」
2701 = "「Điều đó là hiển nhiên rồi ạ.\nĐúng như lời ngài Soutetsu nói, \x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; là một sinh vật sống mà.」"
# monologue
# JP: 習熟困難、つまりは不便。
3492 = "Khó thành thạo, nói cách khác là bất tiện."
# monologue
# JP: そう言ってしまっているにも関わらず、\nハチロクの口調は誇らしげだ。
3341 = "Mặc dù tôi đã nói như vậy,\nnhưng giọng điệu của Hachiroku lại đầy vẻ tự hào."
# 【双鉄】
# display as 雙鐵
# JP: 「だな。日々の天候や状況によって、同じ操作でも\n挙動がまるで変わってくる。ゆえ実践でしか習熟できん」
2680 = "「Đúng vậy. Tùy thuộc vào thời tiết và tình hình mỗi ngày, mà dù cùng một thao tác\nnhưng phản ứng lại hoàn toàn khác nhau. Vì thế chỉ có thể thành thạo qua thực hành.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2643 = "「Vâng.」"
# monologue
# JP: 誇ってしまう気持ちは僕にも、よくわかる。
3489 = "Tôi cũng rất hiểu cảm giác tự hào đó của em ấy."
# monologue
# JP: そうした生き物くささ、手のかかりようもまた\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の大きな魅力のひとつだからだ。
3367 = "Bởi vì sự sống động và đòi hỏi nhiều công sức chăm sóc đó,\ncũng chính là một trong những sức hấp dẫn lớn nhất của \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「習熟に手間ばかかって、人員育成の時間も経費もかさむ。\nそぎゃんシステム、大廃線に、エアクラにとても抗えん」
2687 = "「Việc thành thạo tốn nhiều công sức, thời gian và chi phí đào tạo nhân sự cũng tăng lên.\nMột hệ thống như vậy, làm sao có thể chống lại đại bãi bỏ tuyến, chống lại Aircra được.」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
1612 = "「…………」"
# monologue
# JP: ――が、鉄道の生き残りということを考えるなら、\nまるで容赦の無いご主人の断定こそが、正解だ。
1552 = "――Nhưng, nếu xét đến sự sống còn của ngành đường sắt,\nthì lời khẳng định không chút khoan nhượng của bà chủ mới là câu trả lời chính xác."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「制御系は、機械的・非感覚的な方が高効率。\nそん発想をもう一歩推し進めたのが――[しゅかんせいぎょき,4]主幹制御器」
2763 = "「Hệ thống điều khiển càng mang tính máy móc, phi cảm giác thì hiệu suất càng cao.\nVà thứ đẩy mạnh ý tưởng đó lên một bước nữa chính là――Bộ điều khiển trung tâm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しゅかんせいぎょき――」
2139 = "「Bộ điều khiển trung tâm――」"
# 【ハチロク】
# display as 八六
# JP: 「いわゆる\x%lマスコン;#00ffc040;マスコン%l;#;。\nマスタアコントロオラアのことでございます」
2145 = "「Hay còn gọi là \x%lマスコン;#00ffc040;điều khiển trung tâm%l;#;.\nMaster Controller đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――聞かせてもらったことがあるな。帝鉄末期の\n\x%l電車;#00ffc040;電車%l;#;などには、すでに配備が開始されていたという」
2384 = "「A――Tôi đã từng nghe nói về nó rồi. Nghe nói vào cuối thời kỳ Đường sắt Hoàng gia,\nnó đã bắt đầu được trang bị trên các \x%l電車;#00ffc040;tàu điện%l;#; và những phương tiện tương tự.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「\x%lマスコン;#00ffc040;マスコン%l;#;ば、引き込めば速ぉ、\n押し戻せば遅ぉなるいう簡便な仕組みになっとる」
1592 = "「\x%lマスコン;#00ffc040;Điều khiển trung tâm%l;#; có cơ chế rất đơn giản, kéo về thì nhanh,\nđẩy tới thì chậm lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……率直にいって、楽そうに思えますね。\n運転時の肉体疲労を、大きく軽減できそうだ」
2793 = "「Cái đó…… nói thật thì, nghe có vẻ nhàn nhã nhỉ.\nChắc chắn sẽ giảm thiểu đáng kể sự mệt mỏi về thể chất khi lái tàu.」"
# monologue
# JP: 疲労は集中力の大敵だし、集中力の欠如は事故に繋がる。
3371 = "Mệt mỏi là kẻ thù lớn nhất của sự tập trung, và thiếu tập trung sẽ dẫn đến tai nạn."
# monologue
# JP: \x%lマスコン;#00ffc040;マスコン%l;#;は――なるほど、そうした意味でも\n経営の安定化に大きく寄与できそうな装置と感じる。
3143 = "\x%lマスコン;#00ffc040;Điều khiển trung tâm%l;#;――ra là vậy, xét theo ý nghĩa đó\nthì đây quả là một thiết bị có thể đóng góp to lớn cho sự ổn định của việc kinh doanh."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そんさらに先――ワンハンドル\x%lマスコン;#00ffc040;マスコン%l;#;いうもんも\n研究開発に着手されとったいう話もあったと」
2274 = "「Và xa hơn nữa――tôi nghe nói người ta cũng đã bắt tay vào nghiên cứu phát triển\nthứ gọi là \x%lマスコン;#00ffc040;điều khiển trung tâm%l;#; bằng một tay cầm.」"
# 【ハチロク】
# display as 八六
# JP: 「ワンハンドル・\x%lマスコン;#00ffc040;マスコン%l;#;――でございますか？\nそれは、いったいどのような」
2344 = "「\x%lマスコン;#00ffc040;Điều khiển trung tâm%l;#; bằng một tay cầm――sao ạ?\nĐó rốt cuộc là thứ như thế nào vậy ạ.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「引き込んで\x%l力行;#00ffc040;力行%l;#;。中立で\x%l惰行;#00ffc040;惰行%l;#;。押し込めば\x%lブレーキ;#00ffc040;ブレーキ%l;#;。\n――ワンハンドルで、そいばこなせる[しろもん,1]代物ゆーて」
2543 = "「Kéo về là \x%l力行;#00ffc040;chạy kéo tải%l;#;. Ở giữa là \x%l惰行;#00ffc040;chạy quán tính%l;#;. Đẩy tới là \x%lブレーキ;#00ffc040;phanh%l;#;.\n――Nghe nói đó là thứ có thể thực hiện tất cả những thao tác đó chỉ bằng một tay cầm.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ……そこまで――\nそのような領域までが、研究されていたのですか」
2277 = "「Ôi…… đến mức đó cơ ạ――\nViệc nghiên cứu đã đạt đến trình độ như vậy rồi sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……そこまで運転が簡略化されると」
2129 = "「Nhưng mà…… nếu việc lái tàu được đơn giản hóa đến mức đó thì.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
2329 = "「A!」"
# monologue
# JP: 思ったことが、伝わって――\nいや、違う。ハチロク自身も、僕と同じく思ったのだ。
3117 = "Suy nghĩ của tôi đã truyền đến em ấy――\nKhông, không phải. Chính Hachiroku cũng có cùng suy nghĩ với tôi."
# 【ハチロク】
# display as 八六
# JP: 「……わたくしたちが、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;がおらずとも。\n人間と\x%lマスコン;#00ffc040;マスコン%l;#;とだけで――ああ、いえ。だから」
1630 = "「……Dù không có chúng em, không có \x%lレイルロオド;#00ffc040;Railord%l;#;.\nChỉ cần con người và \x%lマスコン;#00ffc040;điều khiển trung tâm%l;#; là đủ――A, không. Vì vậy nên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、そうか」
2220 = "「Ra là vậy sao.」"
# monologue
# JP: 理解がようやく追いついてくる。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の役割は、運転の補助だけではない。
3301 = "Cuối cùng tôi cũng hiểu ra.\nVai trò của \x%lレイルロオド;#00ffc040;Railord%l;#; không chỉ là hỗ trợ lái tàu."
# monologue
# JP: 運転規模が拡大すればするほどに、\x%l共感;#00ffc040;共感%l;#;・情報共有による\n状況把握、および判断補助が、重要度を増すことになる。
3073 = "Quy mô vận hành càng mở rộng, thì việc nắm bắt tình hình và hỗ trợ phán đoán\nthông qua \x%l共感;#00ffc040;cộng cảm%l;#; và chia sẻ thông tin càng trở nên quan trọng hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「その域では、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が[ひとがた,1]人形をしている意味は減る。\nゆえ、エアクラナビ[がた]形の研究という道筋に――」
2410 = "「Ở lĩnh vực đó, ý nghĩa của việc \x%lレイルロオド;#00ffc040;Railord%l;#; mang hình dáng con người sẽ giảm đi.\nVì thế, hướng nghiên cứu chuyển sang hình thức điều hướng cho Aircra――」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そぎゃん風に考えたもんば、多かった。\n集中制御による効率化こそ、鉄道の生き残りの[みち]路、とね」
2694 = "「Có rất nhiều người đã suy nghĩ như vậy đấy.\nHọ cho rằng việc nâng cao hiệu suất thông qua điều khiển tập trung mới là con đường sống còn của ngành đường sắt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「集中制御……」
2875 = "「Điều khiển tập trung……」"
# monologue
# JP: 運転を人間一人で行えるようになり、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;はナビスタイルとなり、\x%l共感;#00ffc040;共感%l;#;能力に特化する。
3498 = "Việc lái tàu có thể được thực hiện bởi một người duy nhất,\n\x%lレイルロオド;#00ffc040;Railord%l;#; sẽ trở thành dạng điều hướng, chuyên biệt hóa vào khả năng \x%l共感;#00ffc040;cộng cảm%l;#;."
# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;情報を集中させれば、統括制御的な運用――例えば、\n情報集積拠点一箇所での、広範囲の運転指令が可能となる。
3240 = "Nếu tập trung thông tin \x%l共感;#00ffc040;cộng cảm%l;#; lại, thì việc vận hành mang tính điều khiển tổng quát――ví dụ như,\ncó thể ra lệnh lái tàu trên phạm vi rộng chỉ từ một cứ điểm thu thập thông tin duy nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「……最終的な目標地点は、なるほど、エアクラと同じ。\n\x%l運転士;#00ffc040;運転士%l;#;不要の、自動運転になるわけですか」
1656 = "「……Mục tiêu cuối cùng, ra là vậy, cũng giống như Aircra.\nTrở thành tự động lái, không cần đến \x%l運転士;#00ffc040;Lái tàu%l;#; nữa sao.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆＆八六
# JP: 「ほぉお」\n「そのような！」
2393 = "「Ồ」\n「Chuyện như vậy!」"
# monologue
# JP: ハチロクが切羽つまった声、悲鳴のような声を出す。
3095 = "Hachiroku cất lên một giọng nói dồn dập, như một tiếng hét."
# 【ハチロク】
# display as 八六
# JP: 「そのような鉄道は、もう鉄道ではございません。\n単なる輸送――移動のための手段ではないですか！」
2803 = "「Một đường sắt như vậy, không còn là đường sắt nữa.\nĐó chỉ đơn thuần là phương tiện để vận chuyển――để di chuyển thôi mà!」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そもそも鉄道は定点間大量輸送・移動の手段。\nやけん、公共交通機関として定着できた」
2221 = "「Vốn dĩ đường sắt là phương tiện vận chuyển, di chuyển khối lượng lớn giữa các điểm cố định.\nThế nên nó mới có thể bám rễ vững chắc như một phương tiện giao thông công cộng.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
2257 = "「Ưm!」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「鉄道の準エアクラ化――そいば、基本に立ち返る選択と\n……エアクラナビにころんだ連中は、考えとったろーね」
2868 = "「Việc bán Aircra hóa đường sắt――những kẻ chuyển sang làm điều hướng cho Aircra,\nchắc hẳn đã coi đó là một lựa chọn quay về với những giá trị cơ bản.」"
# 【ハチロク】
# display as 八六
# JP: 「かもしれませぬ、が――」
2155 = "「Có thể là vậy, nhưng――」"
# monologue
# JP: ハチロクの目が伏せられる。
3091 = "Hachiroku cụp mắt xuống."
# 【ハチロク】
# display as 八六
# JP: 「実際にたどられた歴史は……\nその判断が過ちだったと、示しているようにも思えます」
2548 = "「Lịch sử đã thực sự diễn ra……\nCó vẻ như đang chứng minh rằng phán đoán đó là sai lầm.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「よねぇ。やけん、大廃線は少しもとどまらず、\n鉄道ば、ほとんど死滅した」
2133 = "「Đúng vậy nhỉ. Vì thế nên đại bãi bỏ tuyến mới không hề dừng lại,\nvà ngành đường sắt, gần như đã bị diệt vong.」"
# monologue
# JP: 過去形、だ。\n少しの沈黙――長い沈黙。
3224 = "Là thì quá khứ.\nMột khoảng lặng ngắn――Một sự im lặng kéo dài."
# 【双鉄】
# display as 雙鐵
# JP: 「……ですので……今ある形の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の研究は、\n実質的に、途絶えてしまった、と？」
1643 = "「……Vì vậy nên…… việc nghiên cứu về hình thức hiện tại của \x%lレイルロオド;#00ffc040;Railord%l;#;,\nvề cơ bản, đã bị gián đoạn rồi sao?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「そこまではわからんばってん……あっちにいった連中も、\n鉄道ば、このままゆるゆる滅びるもんと」
2796 = "「Cái đó thì tôi không rõ…… nhưng những kẻ chuyển hướng sang bên kia,\nchắc cũng nghĩ rằng đường sắt sẽ cứ thế từ từ lụi tàn thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、鉄道はほろびませぬ」
2116 = "「Không đâu, đường sắt sẽ không lụi tàn.」"
# monologue
# JP: ハチロクの、確信に満ち満ちた声。
3103 = "Giọng nói của Hachiroku, tràn đầy sự tự tin."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまが[みち]路を示し、線路を伸ばして下さいましたから。\n伸ばした線路は、再び、繋がりはじめておりますから」
2477 = "「Vì ngài Soutetsu đã chỉ ra con đường, và kéo dài tuyến đường ray cho chúng em.\nNhững tuyến đường ray được kéo dài đó, đang bắt đầu kết nối lại với nhau rồi ạ.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「……そいば、どぎゃん路ね」
1664 = "「……Vậy, đó là con đường như thế nào?」"
# 【ハチロク】
# display as 八六
# JP: 「鉄道というシステムの効率化ではなく。\n人と鉄道と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;との絆をまっすぐに伸ばした路」
2587 = "「Không phải là tối ưu hóa hệ thống đường sắt.\nMà là con đường kéo dài trực tiếp mối liên kết giữa con người, đường sắt và \x%lレイルロオド;#00ffc040;Railord%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2347 = "「A――」"
# monologue
# JP: 絆。\nハチロクは、大九洲ＳＬ構想をそのように捉えていたのか。
3424 = "Mối liên kết.\nRa là Hachiroku đã nhìn nhận ý tưởng SL Đại Kyushu theo cách đó sao."
# monologue
# JP: （そうか……絆か）
3511 = "（Ra vậy…… Mối liên kết sao.）"
# monologue
# JP: じわじわ、嬉しい。お腹の底があたたかになる。\n鉄道とは――鉄路とは。絆をつなぐ、路なのか。
3294 = "Niềm vui chầm chậm dâng lên. Từ sâu thẳm trong lòng cảm thấy thật ấm áp.\nĐường sắt là――Tuyến đường sắt là. Con đường kết nối những mối liên kết sao."
# 【ハチロク】
# display as 八六
# JP: 「それが人に求められたものであったがゆえ、\n大九洲SL構想は、日ノ本広くに[でんぱ,1]伝播したのかと存じます」
2574 = "「Chính vì đó là điều mà mọi người khao khát,\nnên ý tưởng SL Đại Kyushu mới có thể lan truyền rộng rãi khắp Hinomoto như vậy ạ.」"
# monologue
# JP: 登呂流湯のご主人が、静かに頷く。\n言葉を紡ぎ出す口元が、ふっとやわらぐ。
3434 = "Bà chủ nhà tắm Tororyu-yu lặng lẽ gật đầu.\nKhóe miệng đang cất lời bỗng dịu lại."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「やったら。そいば。そのまま答えよ」
2853 = "「Nếu vậy. Thì đó. Hãy trả lời đúng như thế.」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
# 2341 = "「啊？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「答え、とは――なんのでしょうか？」
2556 = "「Câu trả lời, là――cho câu hỏi nào ạ?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「さっきの質問。\nそん答えを持っておるものがもしもおるなら――」
2508 = "「Câu hỏi lúc nãy của cậu.\nNếu có ai đó nắm giữ câu trả lời cho câu hỏi đó thì――」"
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「あ！」\n「あっ！」
2330 = "「A!」\n「A!」"
# monologue
# JP: ハチロクと目を見合わせる。\nそうか、そういうことならば――
3290 = "Tôi và Hachiroku nhìn nhau.\nRa vậy, nếu là như thế thì――"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、人と鉄道を再び繋ぐ[かすがい]鎹なのだと。\n最初から、そうわかっていた方」
2585 = "「Người đã biết ngay từ đầu rằng,\n\x%lレイルロオド;#00ffc040;Railord%l;#; chính là sợi dây kết nối con người và đường sắt lại với nhau.」"
# 【ハチロク】
# display as 八六
# JP: 「昔ながらの鉄道の復権をひたすら信じ、\nそれだけでなく、形を示し続けた方――」
2106 = "「Người luôn một lòng tin tưởng vào sự phục hưng của đường sắt truyền thống,\nvà không chỉ vậy, còn liên tục chứng minh điều đó bằng hành động――」"
# monologue
# JP: ただ一人しか思い浮かばない。\n『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の延命』を、その研究をする技師を――
3236 = "Tôi chỉ có thể nghĩ đến một người duy nhất.\nKỹ sư nghiên cứu về việc \"kéo dài tuổi thọ cho \x%lレイルロオド;#00ffc040;Railord%l;#;\"――"
# monologue
# JP: もしもあの方が知らんのならば、少なくとも日ノ本には、\nそうした者が一人もいないとさえ思える。
3243 = "Nếu người đó mà không biết, thì ít nhất là ở Hinomoto này,\ntôi nghĩ sẽ chẳng có một ai biết cả."
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「[ひろしま,1]廣島の」\n「まぁ！　まぁ、すぐに参ります！」
2641 = "「Của Hiroshima」\n「Ôi! Ôi, chúng ta phải đi ngay thôi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！　\x%l共感;#00ffc040;共感%l;#;か」
2323 = "「A! Là \x%l共感;#00ffc040;cộng cảm%l;#; sao.」"
# monologue
# JP: 問うたときには動き出してる。\nハチロクも僕も、登呂流湯のご主人も。
3453 = "Khi tôi hỏi thì mọi người đã bắt đầu di chuyển.\nCả Hachiroku, tôi, và bà chủ nhà tắm Tororyu-yu."
# monologue
# JP: ハチロクの歓喜の声が、すでに答えを示しているから。
3180 = "Vì giọng nói vui sướng của Hachiroku, đã chỉ ra câu trả lời rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィが意識を取り戻したのか！」
2449 = "「Olivy đã tỉnh lại rồi sao!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ごめんねー、ソーテツ、ありがとーねー」
2499 = "「Xin lỗi nha, Soutetsu, cảm ơn cậu nhiều nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「気にするな、困ったときはお互い様だ」
2201 = "「Đừng bận tâm, lúc khó khăn thì giúp đỡ lẫn nhau là chuyện đương nhiên mà.」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん、暑くはありませんか？」
2455 = "「Bé Olivy, em có thấy nóng không?」"
# monologue
# JP: 何十度目かの問いかけに、\nオリヴィはクスっと、呆れまじりの微笑をうかべる。
3216 = "Trước câu hỏi lặp lại không biết bao nhiêu lần đó,\nOlivy bật cười khúc khích, một nụ cười xen lẫn vẻ cạn lời."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっつくないよー、\nハチロクがいろいろ工夫してくれたからねー」
2118 = "「Không nóng đâu~,\nVì Hachiroku đã tốn bao công sức giúp em mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ」
2720 = "「Đúng là vậy nhỉ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「まさかオリヴィ、\nソーテツにお姫様だっこしてもらうとか思わなかったー」
2446 = "「Olivy không ngờ,\nlại được Soutetsu bế kiểu công chúa thế này đâu nha~」"
# 【ハチロク】
# display as 八六
# JP: 「それが一番、双鉄さまの体温をオリヴィちゃんに\n移さずにすむ姿勢であるかと思いますので」
2840 = "「Vì em nghĩ đó là tư thế tốt nhất,\nđể hạn chế truyền nhiệt độ cơ thể của ngài Soutetsu sang cho bé Olivy ạ.」"
# monologue
# JP: おんぶや普通の抱っこより、\n接触している範囲は狭い。
3124 = "So với cõng hay bế bình thường,\nthì phạm vi tiếp xúc sẽ hẹp hơn."
# monologue
# JP: が。オリヴィの体温は、今もってなお僕より高い。\n接触面積はむしろ広いほうがよいかとも多少は思うが――
3361 = "Nhưng mà. Nhiệt độ cơ thể của Olivy hiện tại vẫn cao hơn tôi.\nTôi lại hơi nghĩ rằng phạm vi tiếp xúc rộng hơn thì sẽ tốt hơn chứ――"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「お姫様だっこ、らくちんだねー、きもちいいねー。\nおんなのこがみんな憧れる理由、わかった気がするー」
2453 = "「Được bế kiểu công chúa, thoải mái thật đó nha~, dễ chịu thật đó nha~.\nOlivy cảm thấy mình đã hiểu lý do tại sao mọi cô gái đều ao ước rồi đó~」"
# 【ハチロク】
# display as 八六
# JP: 「あら、左様でございますか？\nうふふっ、それはよろしうございました」
2404 = "「Ôi, vậy sao ạ?\nUfufu, vậy thì tốt quá rồi ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「って、なんか引っかかる言い方だなー。\nあ！　ひょっとして、なんか他にも理由あるの？？」
2184 = "「Ơ kìa, cách nói chuyện nghe có vẻ ẩn ý thế nha~.\nA! Không lẽ, còn có lý do nào khác nữa sao??」"
# 【ハチロク】
# display as 八六
# JP: 「さぁ、どうでしょう？　もしも理由があるとしても、\nオリヴィちゃんが気づくべきときに、気づけばよいかと」
2795 = "「Chà, ai biết được nhỉ? Dù cho có lý do nào khác đi nữa,\nthì bé Olivy cứ đợi đến lúc cần nhận ra rồi hẵng nhận ra là được ạ.」"
# monologue
# JP: 思わせぶりな回答に、\nオリヴィの首が大きく傾ぐ。
3213 = "Trước câu trả lời đầy ẩn ý đó,\nOlivy nghiêng đầu thắc mắc."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「気づくべきとき？　って、今じゃないってこと？？」
2208 = "「Lúc cần nhận ra? Ý là không phải bây giờ sao??」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2357 = "「嗯」" 
# monologue
# JP: ハチロクが微笑む。\n幸せそうに、自信に満ちて。
3111 = "Hachiroku mỉm cười.\nTrông thật hạnh phúc, và tràn đầy tự tin."
# 【ハチロク】
# display as 八六
# JP: 「それを今、双鉄さまにだっこされた状態でわかられては、\nわたくし、はなはだ困ってしまいますので」
2483 = "「Nếu bây giờ, trong lúc đang được ngài Soutetsu bế mà chị nhận ra điều đó,\nthì em sẽ rất khó xử đấy ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あーあーなるほどー、そーかー、そういう理由かー。\nオリヴィわかった！　もう完全にわかったねー」
2390 = "「A~ a~ ra là vậy~, thế à~, là vì lý do đó sao~.\nOlivy hiểu rồi! Hoàn toàn hiểu rồi nha~」"
# monologue
# JP: ……わかっているのかいないのか、\nとぼけたような口調から僕には読み取れない。
1573 = "……Không biết là em ấy có hiểu thật hay không,\nnhưng với giọng điệu giả ngây giả ngô đó thì tôi không thể nào đoán được."
# monologue
# JP: が、ひとつだけはわかる。しみじみ感じる。
3078 = "Nhưng, có một điều mà tôi biết rõ. Tôi cảm nhận được sâu sắc."
# monologue
# JP: （とても――平和だ）
3507 = "（Thật là――bình yên.）"
# monologue
# JP: ならば、これで正解なのだ。
3483 = "Nếu vậy thì, đây chính là câu trả lời đúng."
# monologue
# JP: 過度な刺激や興奮はオリヴィの寿命を縮めかねない――\n登呂流湯さんからも、そうアドバイスをいただいたのだし。
3129 = "Sự kích thích hay hưng phấn quá mức có thể làm giảm tuổi thọ của Olivy――\nĐó là lời khuyên mà tôi đã nhận được từ bà chủ nhà tắm Tororyu-yu."
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん、なにかほしいものはありませんか？」
2456 = "「Bé Olivy, em có muốn ăn gì không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2375 = "「Hửm?」"
# monologue
# JP: 突然何を言い出すのかと思ってみれば、コンビニだ。\nここを過ぎればこの時間、もう自販機でしか物は買えない。
3282 = "Đang tự hỏi sao em ấy lại đột nhiên nói vậy, thì ra là thấy cửa hàng tiện lợi.\nNếu đi qua đây vào giờ này, thì chỉ còn cách mua đồ ở máy bán hàng tự động thôi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「とくにないよー。\nオリヴィ、まだおきゅーりょーももらってないし」
2679 = "「Không có gì đặc biệt đâu~.\nOlivy vẫn chưa được nhận lương nữa mà.」"
# 【ハチロク】
# display as 八六
# JP: 「お金のことは大丈夫ですよ？\n今回は、オリヴィちゃんにお見舞いのプレゼントです」
2203 = "「Chuyện tiền bạc thì không sao đâu ạ.\nLần này coi như là quà thăm bệnh tặng cho bé Olivy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほんと！！？」
2714 = "「Thật sao!!?」"
# monologue
# JP: オリヴィの顔がぱっと輝く。
3202 = "Khuôn mặt Olivy bừng sáng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ！　ね！　ソフトクリーム！\nオリヴィ、あれ一回でいいから食べてみたかったの！」
2839 = "「Vậy thì! Nha! Kem tươi đi!\nOlivy luôn muốn được ăn thử món đó một lần cho biết đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、食べたことがなかったのか？」
2553 = "「Sao cơ, em chưa từng ăn thử bao giờ à?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あるわけないよー！　オリヴィ、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だし」
2740 = "「Làm gì có chuyện đó chứ~! Olivy là \x%lレイルロオド;#00ffc040;Railord%l;#; mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
2388 = "「À……」"
# monologue
# JP: 言われればすぐ思い出す。みかん鉄道――というか、\n一般的な鉄道会社では、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に給与は出ない。
3303 = "Nghe em ấy nói tôi mới nhớ ra. Đường sắt Mikan――hay nói đúng hơn là,\ncác công ty đường sắt thông thường không hề trả lương cho \x%lレイルロオド;#00ffc040;Railord%l;#;."
# monologue
# JP: 人間の食べ物を取る機会自体も乏しかろうし……\nなるほど、嗜好品となると、食さない方が自然であるのか。
3343 = "Cơ hội được ăn thức ăn của con người vốn đã ít ỏi……\nRa vậy, đối với những món ăn chơi như thế này, thì việc chưa từng ăn qua cũng là lẽ tự nhiên thôi."
# 【ハチロク】
# display as 八六
# JP: 「ソフトクリイムですね、かしこまりました。\nバニラとストロベリイとチョコ、どれがお好みですか？」
2560 = "「Kem tươi nhỉ, em hiểu rồi ạ.\nCó vị vani, dâu tây và socola, bé Olivy thích vị nào?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「え！？　なやむ！！\nちょっと待ってちょっと待ってちょっと待って！」
2258 = "「Hả!? Khó chọn quá!!\nChờ chút chờ chút chờ chút nha!」"
# monologue
# JP: よほど決めかねてしまうのか、\nお姫様だっこされたまま、足がばたばた動き出す。
3403 = "Có vẻ như em ấy rất khó đưa ra quyết định,\ndù đang được bế kiểu công chúa, đôi chân vẫn vùng vẫy liên hồi."
# 【双鉄】
# display as 雙鐵
# JP: 「それほど悩むのであれば、全部試してみればどうだ？\n二個分は、僕からのお見舞いということで」
2180 = "「Nếu khó chọn đến vậy, thì thử hết cả ba luôn đi?\nHai cái còn lại cứ coi như là quà thăm bệnh của tôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええ！？　いいのっ！？」
2285 = "「Ê ê ê!? Được thật sao!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのくらいは何でもないさ」
2794 = "「Chút chuyện nhỏ ấy mà.」"
# monologue
# JP: ハチロクが、オリヴィがこれほどはしゃいでくれている。\nそう考えれば、実にまさしくお安いものだ。
3440 = "Hachiroku và Olivy đang vui vẻ đến thế này cơ mà.\nNghĩ vậy thì, cái giá này quả thực là quá rẻ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどけど、『冷たいもの食べ過ぎるとお腹いたくなる』\nでしょ！？　おかあさんがこどもによく注意してたよ？」
2241 = "「Nhưng mà, 'Ăn nhiều đồ lạnh quá sẽ bị đau bụng'\nđúng không!? Olivy thấy mấy bà mẹ hay nhắc nhở con cái như thế lắm nha?」"
# 【ハチロク】
# display as 八六
# JP: 「ああ、そのようなことはよく聞きますね。\nわたくしは、腹痛を経験したことはございませんが――」
2298 = "「À, chuyện đó thì đúng là nghe nói nhiều thật.\nDù em chưa từng bị đau bụng bao giờ――」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィもない。けど、さっきトラブったばっかだし、\nあんまり一気に、がんばりすぎない方がいいよね？」
2444 = "「Olivy cũng chưa. Nhưng mà, vừa mới xảy ra sự cố xong,\nchắc là không nên cố quá ăn một lúc nhiều như thế đâu nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは確かに。冷やす分には大丈夫なような気もするが、\n慎重を期しておくにこしたことはなかろう」
2152 = "「Cũng đúng. Dù tôi nghĩ ăn đồ lạnh để hạ nhiệt thì chắc không sao đâu,\nnhưng cẩn thận một chút vẫn hơn.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら！　ね？　いっこずついーい？\nバニラとね、ストロベリー！」
2852 = "「Vậy thì! Nha? Mỗi loại một cái được không?\nVani nè, và cả dâu tây nữa!」"
# 【ハチロク】
# display as 八六
# JP: 「もちろんですよ、オリヴィちゃん」
2695 = "「Tất nhiên là được rồi, bé Olivy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も同意だ。ハチロク、すまんが、僕の財布から」
2575 = "「Tôi cũng đồng ý. Hachiroku, xin lỗi nhưng lấy tiền từ ví của tôi nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「のちほどで結構ですよ、双鉄さま。\nすぐに、行ってまいります」
2723 = "「Để sau cũng được ạ, ngài Soutetsu.\nEm đi mua ngay đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、おい」
2340 = "「A, này.」"
# monologue
# JP: ……止める間もなく行ってしまった。
1579 = "……Chưa kịp cản thì em ấy đã đi mất rồi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへ～、ソフトクリーム、楽しみっ！」
2290 = "「Ehehe~, kem tươi, mong chờ quá đi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、僕らも店内に入るか？」
2753 = "「Vậy, chúng ta cũng vào trong tiệm nhé?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ならって――なんで？」
2177 = "「Vậy á――tại sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、こう……なんだ、その――」
2263 = "「À không, kiểu như…… gì nhỉ, chuyện đó――」"
# monologue
# JP: 聞こうとし、危ういところで気づく。\n僕も結局オリヴィを、どこかでこども扱いしていると。
3178 = "Định hỏi, nhưng may mà tôi kịp nhận ra.\nRằng rốt cuộc, ở một khía cạnh nào đó, tôi cũng đang coi Olivy như một đứa trẻ."
# monologue
# JP: が、オリヴィはじっと僕を見ている。\nここまで来たら、正直に伝える他にないだろう。
3169 = "Nhưng, Olivy vẫn đang nhìn chằm chằm vào tôi.\nĐã đến nước này rồi, thì chỉ còn cách nói thật thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ソフトクリームを作るところを、\n見てみたくないかと……少し、思って」
2591 = "「Tôi nghĩ…… chắc em sẽ muốn xem\ncách người ta làm kem tươi……」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あはは！　ありがと。でもね、オリヴィも、\n作ってるとこみたことくらいはあるよー」
2316 = "「Ahaha! Cảm ơn nha. Nhưng mà, Olivy cũng\ntừng thấy người ta làm kem rồi mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
2801 = "「Vậy sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど――はじめてのおきゅーりょーで、自分で買った\nソフトクリーム作ってもらうのは、見てみたいかも」
2128 = "「Nhưng mà――khi nào được nhận tháng lương đầu tiên, Olivy muốn tự mua\nvà xem người ta làm ly kem tươi của chính mình cơ.」"
# monologue
# JP: 言って、オリヴィはにっぱり笑う。
3214 = "Nói xong, Olivy nở một nụ cười rạng rỡ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがとソーテツ！　いいこと教えてもらっちゃった。\nおきゅーりょーもらったら、オリヴィそーしてみるね！」
2764 = "「Cảm ơn Soutetsu nha! Cậu vừa gợi ý cho Olivy một chuyện rất hay đó.\nKhi nào nhận được lương, Olivy nhất định sẽ thử làm vậy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。きっとそのときのソフトクリームは、\n今日食べるものより、さらに甘く、おいしくなるぞ」
2366 = "「Ừ. Chắc chắn ly kem lúc đó,\nsẽ còn ngọt ngào và ngon hơn cả ly kem hôm nay em ăn đấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほんとに！？　たのしみーっ！」
2713 = "「Thật sao!? Mong chờ quá đi~!」"
# monologue
# JP: なんともかわいい。\nあどけなさとは、このことだ。
3227 = "Đáng yêu quá đi mất.\nNgây thơ hồn nhiên chính là như thế này đây."
# monologue
# JP: お姫様だっこしていなければ、\nいいこいいこと、頭をなでくりまわしてやりたい。
3233 = "Nếu không phải đang bế kiểu công chúa,\nthì tôi đã xoa đầu khen em ấy là một cô bé ngoan rồi."
# 【ハチロク】
# display as 八六
# JP: 「おまたせいたしました」
2765 = "「Để hai người phải chờ lâu rồi ạ.」"
# monologue
# JP: 右手に白、左手にピンクのソフトクリームを大事にもって、\nハチロクがコンビニから戻ってくる。
3164 = "Tay phải cầm ly kem màu trắng, tay trái cầm ly kem màu hồng một cách cẩn thận,\nHachiroku bước ra từ cửa hàng tiện lợi."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、では行こう」
2374 = "「Ừm, vậy chúng ta đi thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「行こうって、ちょっとまって！\nオリヴィ、まだソフトクリームもらってないよ」
2773 = "「Đi thôi á, chờ chút đã!\nOlivy vẫn chưa được nhận kem tươi mà.」"
# 【ハチロク】
# display as 八六
# JP: 「ああいえ、オリヴィちゃんは病み上がりなのですから。\nバニラとイチゴ、どちらを最初に召し上がりますか？」
2309 = "「À không, vì bé Olivy mới vừa ốm dậy mà.\nVani và dâu tây, em muốn ăn vị nào trước?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「え？　っとね、それじゃあ――バニラ！」
2342 = "「Hả? Để xem nào, vậy thì――vani!」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。はい、『あーん』」
2467 = "「Chị hiểu rồi. Nào, 'A' đi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ええっ！？　いいよそんなの。オリヴィ自分で」
2289 = "「Hả!? Không cần đâu. Olivy tự ăn được mà.」"
# 【ハチロク】
# display as 八六
# JP: 「早く食べないと溶けてしまいますよ？\nはい、『あーん』」
2111 = "「Không ăn nhanh là nó chảy mất đấy nhé?\nNào, 'A' đi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えっ？　え――ううぅ――」
2265 = "「Hả? Hả――Ư ư――」"
# monologue
# JP: こうなったハチロクは引き下がらない。
3116 = "Một khi Hachiroku đã quyết định thì em ấy sẽ không bao giờ nhượng bộ."
# monologue
# JP: オリヴィもそれを察してか、\nおずおずと、それでも大きく口を開いて――
3076 = "Có lẽ Olivy cũng nhận ra điều đó,\nnên dù hơi ngần ngại, em ấy vẫn há miệng thật to――"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「『あーん』――はむっ！\nん――んんっ！　おいひいいいいいっ！」
1608 = "「'A'――ngoạm!\nƯm――ưm! Ngon quá đi mất~!」"
# 【ハチロク】
# display as 八六
# JP: 「うふふ、よかった。\nふたくちめは、どちらを？」
2381 = "「Ufufu, tốt quá rồi.\nMiếng thứ hai em muốn ăn vị nào?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「もちろんストロベリー！　あーん――――はむっ！\nんんんんっ！　あまずっぱぁぁぁいっ！」
2696 = "「Tất nhiên là dâu tây rồi! A――――ngoạm!\nƯm ưm ưm! Chua chua ngọt ngọt ngon quá đi~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
2281 = "「Fufu.」"
# monologue
# JP: 食べやすいよう、ハチロクと呼吸をあわせつつ、\nペースを落としてゆっくり歩く。
3355 = "Để Olivy dễ ăn hơn, tôi vừa điều chỉnh nhịp thở cho khớp với Hachiroku,\nvừa giảm tốc độ và bước đi thật chậm rãi."
# monologue
# JP: しかし、まぁ……\nオリヴィも楽しげに食べてくれているからいいが――
3058 = "Nhưng mà, ừm……\nThấy Olivy ăn ngon lành thế kia thì cũng tốt thôi, nhưng――"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「はむっ――ぺろっ――んふふふっ～\nでさ、溶けたらやだから、食べながらでいいんだけどさ」
2321 = "「Ngoạm――liếm――nfufufu~\nNè, Olivy không muốn kem bị chảy đâu, nên cứ vừa đi vừa ăn cũng được nha.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、なんでしょう？　オリヴィちゃん」
2362 = "「Vâng, có chuyện gì vậy? Bé Olivy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あむっ――ん、うふっ――えと、さ。ハチロク。\nなんですぐ、オリヴィのこと赤ちゃんみたいに扱うの？」
2322 = "「Ngoạm――ưm, ufufu――à ừm, nè. Hachiroku.\nTại sao lúc nào cậu cũng đối xử với Olivy như em bé vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「え？　――ああああっ！？」
2291 = "「Hả? ――A a a a!?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソフトクリーム！　気をつけてっ！！」
2685 = "「Kem tươi! Cẩn thận coi chừng rơi kìa!!」"
# 【ハチロク】
# display as 八六
# JP: 「あああ、ごめんなさいっ」
2320 = "「A a a, xin lỗi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「落ち着け、ハチロク」
2195 = "「Bình tĩnh lại đi, Hachiroku.」"
# monologue
# JP: まさに気にしていたところを、\nオリヴィがずばり、とても軽やかに尋ねてくれた。
3350 = "Đúng ngay cái điều mà tôi đang bận tâm,\nthì Olivy lại thản nhiên hỏi thẳng ra một cách rất nhẹ nhàng."
# monologue
# JP: こうしたところは、本当に大人だ。\n僕よりも、ハチロクよりも、きっと、ずうっと。
3436 = "Ở những khía cạnh như thế này, em ấy thực sự rất người lớn.\nChắc chắn là người lớn hơn cả tôi, và cả Hachiroku nữa."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーそー。おちつこー。\n別にせめたりしてるわけじゃないしさー――あむっ」
2500 = "「Đúng đúng. Bình tĩnh lại đi~.\nOlivy đâu có trách móc gì cậu đâu mà~――ngoạm.」"
# monologue
# JP: オリヴィの言葉と仕草に、\n目に見えてハチロクは安堵する。
3211 = "Trước lời nói và hành động của Olivy,\nHachiroku thở phào nhẹ nhõm thấy rõ."
# monologue
# JP: そうして、ゆるゆる――\n実に面目なさそうに、言葉を絞り出していく。
3358 = "Và rồi, chậm rãi――\nEm ấy vắt kiệt từng lời với vẻ mặt vô cùng xấu hổ."
# 【ハチロク】
# display as 八六
# JP: 「あの……わたくし、オリヴィちゃんを先輩として、\nきちんと敬意を、こころの底から持っております」
2457 = "「À ừm…… em luôn coi bé Olivy là tiền bối,\nvà luôn dành cho chị sự kính trọng từ tận đáy lòng ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかってるよー。でなきゃオリヴィ、\nこんなことしてるわけないし――ぺろっ」
2451 = "「Olivy biết mà~. Nếu không thì Olivy,\nđã chẳng làm mấy chuyện như thế này đâu~――liếm.」"
# 【ハチロク】
# display as 八六
# JP: 「その上で――なぜ、そのような――赤ちゃん扱い、と\n思われてしまう態度をとってしまうかと申しますと」
2620 = "「Dựa trên điều đó――lý do tại sao em lại có thái độ――\nkhiến chị nghĩ rằng em đang coi chị như em bé, là vì.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん――はむ――\nん～っ、ぺろっ！」
2351 = "「Ừm――ngoạm――\nƯm~, liếm!」"
# monologue
# JP: 悩みながらも、おそらく反省もしながらも、\nソフトクリームを食べさせる手は、規則正しく動き続ける。
3107 = "Dù đang bối rối, và có lẽ cũng đang tự kiểm điểm bản thân,\nnhưng bàn tay đút kem của em ấy vẫn tiếp tục di chuyển một cách nhịp nhàng."
# 【ハチロク】
# display as 八六
# JP: 「……双鉄さま。あのことを――\nオリヴィちゃんにも説明さしあげて大丈夫でしょうか？」
1667 = "「……Ngài Soutetsu. Chuyện đó――\nEm có thể giải thích cho bé Olivy nghe được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕はかまわん。というかむしろ――」
2572 = "「Tôi không bận tâm đâu. Hay nói đúng hơn là――」"
# monologue
# JP: 言って、気がつく。\nオリヴィは冥国製、海外製で、ハチロクよりも古いのだ。
3455 = "Nói xong, tôi mới chợt nhận ra.\nOlivy được sản xuất tại Mỹ, là hàng ngoại nhập, và còn lớn tuổi hơn cả Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィは、\n僕らにはないアプローチを知っているかもしれん」
2154 = "「Biết đâu Olivy,\nlại biết một phương pháp tiếp cận nào đó mà chúng ta không biết.」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2329 = "「啊！」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほーほーって、なんの？　――あっ」
2776 = "「Phương pháp gì cơ? ――A」"
# monologue
# JP: オリヴィが、食べようとして止まってしまう。\n目に見えるクリーム部分を、食べ尽くしてしまったために。
3210 = "Olivy định ăn tiếp nhưng lại khựng lại.\nVì em ấy đã ăn hết phần kem phía trên rồi."
# 【ハチロク】
# display as 八六
# JP: 「あとはコオンでございますね？\nどちらからにされますか？」
2504 = "「Chỉ còn lại phần ốc quế thôi nhỉ?\nChị muốn ăn cái nào trước?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「んと――両方ちょーだい！\nかわりばんこに食べるから」
2346 = "「Ưm――cho chị cả hai luôn đi!\nChị sẽ ăn luân phiên.」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。\nこぼさないよう、しっかり持って――あ！」
2473 = "「Vâng ạ.\nChị cầm cẩn thận kẻo rơi nhé――A!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あははは！　まただ！　赤ちゃんあつかいー！」
2314 = "「Ahahaha! Lại nữa rồi! Lại coi Olivy như em bé nữa rồi~!」"
# monologue
# JP: オリヴィはけらけら笑いつつ、カリコリカリコリ――\nげっ歯類の小動物よろしく、コーンをみるみる食べていく。
3215 = "Olivy vừa cười khanh khách, vừa nhai rồm rộp――\nnhư một con thú gặm nhấm nhỏ, thoáng chốc đã ăn hết phần ốc quế."
# monologue
# JP: ……これはまぁ、この様子だけを見てしまうなら、\nこども扱いするなというのが厳しいように思えてしまうが。
1575 = "……Chà, nếu chỉ nhìn bộ dạng này thôi,\nthì việc bảo đừng coi em ấy như trẻ con quả là một yêu cầu hơi khó."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「で？　ほーほーって？　なんのほーほー？」
2615 = "「Thế? Phương pháp gì cơ? Phương pháp làm gì?」"
# 【ハチロク】
# display as 八六
# JP: 「その……双鉄さまとわたくしが、\n夫婦として、こどもの親となる――そのために」
2506 = "「Chuyện đó…… ngài Soutetsu và em,\nvới tư cách là vợ chồng, muốn trở thành cha mẹ của những đứa trẻ――về chuyện đó.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「こどもっ！？」
2488 = "「Trẻ con á!?」"
# monologue
# JP: オリヴィの激しい驚きに、しかしハチロクは動じない。\nその反応を当然のことと受け止めている。
3119 = "Trước sự kinh ngạc tột độ của Olivy, Hachiroku vẫn không hề dao động.\nEm ấy coi phản ứng đó là một điều hiển nhiên."
# 【ハチロク】
# display as 八六
# JP: 「こどもを、引き取らせていただく方法。\nあるいは、その――もしも、存在するなら」
2885 = "「Phương pháp để nhận nuôi một đứa trẻ.\nHoặc là, ừm――nếu như có tồn tại.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2357 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「引き取る以外の……どのような形でもいいのです。\nわたくしたちが、こどもを育てさせていただく方法を」
2872 = "「Một phương pháp nào đó ngoài việc nhận nuôi…… hình thức nào cũng được.\nMiễn là có cách để chúng em có thể nuôi nấng một đứa trẻ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー」
# 2305 = "「啊」" 
# monologue
# JP: ごくんと、最後のコーンをオリヴィは飲み下す。
3204 = "Ực một tiếng, Olivy nuốt nốt miếng ốc quế cuối cùng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ごめん……オリヴィはそういうほーほー知らないや。\nけど――なんで、こどもを育てたいって思ったの？」
2609 = "「Xin lỗi nha…… Olivy không biết phương pháp nào như thế cả.\nNhưng mà――tại sao hai người lại muốn nuôi trẻ con vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「その――わたくし。つい先日、双鉄さまのご友人様の\n赤ちゃんと、産まれて初めて、とても親しく接しまして」
2797 = "「Chuyện đó――là vì em. Vài ngày trước, em đã được tiếp xúc rất gần gũi,\nvới em bé của một người bạn ngài Soutetsu, đó là lần đầu tiên trong đời em.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふぅん？」
2391 = "「Hừm?」"
# 【ハチロク】
# display as 八六
# JP: 「あの小さな手にふれていただき、ぬくもりを知って、\n――なにもかもが、まるく、やわらかであると感じて」
2593 = "「Được chạm vào bàn tay bé nhỏ đó, cảm nhận được hơi ấm đó,\n――Em cảm thấy mọi thứ trên cơ thể bé đều tròn trịa và mềm mại.」"
# monologue
# JP: ……オリヴィは、余計な口を挟まない。
1572 = "……Olivy không hề chen ngang nửa lời."
# monologue
# JP: ハチロクの説明を、\n静かに聞いていてくれる。
3231 = "Em ấy lặng lẽ,\nlắng nghe Hachiroku giải thích."
# 【ハチロク】
# display as 八六
# JP: 「――新しい命を授かる。命のレールをつないでいく。\nそれが、どれほど素敵なことかを、知ったのです」
1599 = "「――Được ban cho một sinh mệnh mới. Tiếp nối những đường ray sinh mệnh.\nEm đã hiểu được, đó là một điều tuyệt vời đến nhường nào.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2357 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「残念ながら\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のこの身では、\n赤ちゃんを授かることは、叶いませぬが――それでも」
2876 = "「Đáng tiếc là với cơ thể \x%lレイルロオド;#00ffc040;Railord%l;#; này,\nthì việc mang thai là điều không thể――nhưng dù vậy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
# 1612 = "「……」" 
# 【ハチロク】
# display as 八六
# JP: 「もしもできるのならば、双鉄さまとわたくしとで。\n小さな未来を育て、つないでみたいと――願ったのです」
2232 = "「Nếu có thể, em muốn cùng ngài Soutetsu.\nNuôi dưỡng và tiếp nối một mầm non tương lai bé nhỏ――em đã ước như vậy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……そっか。それでハチロクとソーテツは、\n赤ちゃんほしくなったんだ」
1646 = "「……Ra là vậy. Nên Hachiroku và Soutetsu,\nmới muốn có em bé.」"
# 【ハチロク】
# display as 八六＆雙鐵
# JP: 「はい」\n「うむ」
2644 = "「Vâng」\n「Ừm」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっかー。んー。ステキなゆめだと思うけどさー。\nでも……むつかしそうだよね、それって正直ー」
2799 = "「Vậy sao~. Ưm~. Olivy nghĩ đó là một giấc mơ tuyệt vời đấy~.\nNhưng mà…… nói thật thì, có vẻ rất khó khăn nhỉ~.」"
# monologue
# JP: オリヴィが、腕組みをして考え込む。
3212 = "Olivy khoanh tay trước ngực và trầm ngâm suy nghĩ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「多分それって……えんめーと、オリヴィのじゅみょー\nのばすのと、おんなじくらいむつかしいって思うんだ」
2755 = "「Chắc việc đó…… cũng khó ngang ngửa với việc,\nkéo dài tuổi thọ cho Olivy đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2375 = "「嗯？」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だからオリヴィ！　いっしょに方法探してあげる！\nそれならちょーど、fifty－fiftyになるでしょ？」
2599 = "「Nên là Olivy! Sẽ giúp hai người tìm cách!\nNhư vậy thì đúng là fifty-fifty (năm mươi-năm mươi) rồi nhỉ?」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
2400 = "「Ôi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうだな。そう考えると、\nお互いに気兼ねなく、お互いに頼れる」
2349 = "「Ừ――đúng vậy nhỉ. Nghĩ như vậy,\nchúng ta có thể thoải mái nhờ cậy lẫn nhau.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら決まりだね！」
2837 = "「Vậy là quyết định rồi nhé!」"
# monologue
# JP: カラリと笑って。オリヴィは手を差し伸べる。
3209 = "Nở một nụ cười rạng rỡ. Olivy chìa tay ra."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そしたら、約束のあくしゅしよー！\nソーテツはいま、手がふさがってるから」
2835 = "「Thế thì, hãy bắt tay giao ước nào!\nSoutetsu bây giờ đang bận tay rồi, nên là.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、喜んで」
2475 = "「Vâng, rất sẵn lòng ạ.」"
# monologue
# JP: いいつつ、ハチロクは手袋を外す。
3112 = "Vừa nói, Hachiroku vừa tháo găng tay ra."
# monologue
# JP: アイロンびしりのハンカチを出し、\n素早く手を拭き、オリヴィの手をそっと受け取る。
3223 = "Lấy ra một chiếc khăn tay được ủi phẳng phiu,\nlau nhanh tay mình, rồi nhẹ nhàng nắm lấy tay Olivy."
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん。\nあらためまして、どうぞよろしくお願いいたします」
2458 = "「Bé Olivy.\nMột lần nữa, mong chị giúp đỡ nhiều ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん、よろしくー」
2360 = "「Ừm, mong được giúp đỡ nha~」"
# monologue
# JP: 固く、握手。
3221 = "Một cái bắt tay thật chặt."
# monologue
# JP: やがて静かに手をほどき、\nオリヴィはとても嬉しげに僕を見上げる。
3359 = "Rồi nhẹ nhàng buông tay ra,\nOlivy ngước nhìn tôi với vẻ mặt vô cùng vui sướng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへ！　よかった！\nね、ソーテツ、もうちょっと急げる？」
2382 = "「Ehehe! Tốt quá rồi!\nNè, Soutetsu, cậu đi nhanh hơn chút nữa được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご要望とあらば走りもするが――なにかあるのか？」
2478 = "「Nếu em muốn thì tôi chạy cũng được――nhưng có chuyện gì sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヒビキとマクラ！　ちょっと心配してくれてたから、\n早くほーこくしたいかなって！」
2710 = "「Hibiki và Makura! Hai người đó đang lo lắng cho Olivy,\nnên Olivy muốn báo cáo cho họ biết thật nhanh!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば！」
2802 = "「Vậy sao, nếu thế thì!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ひゃっ！」
2256 = "「Á!」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄さま！」
2471 = "「Đã rõ thưa ngài Soutetsu!」"
# monologue
# JP: ハチロクと並び、走りはじめる。\nハチロクに無理のかからぬスピードで。
3288 = "Tôi chạy sóng vai cùng Hachiroku.\nVới một tốc độ không làm khó em ấy."
# monologue
# JP: 僕らの家へと、帰るため。
3400 = "Để trở về ngôi nhà của chúng tôi."
# 【真闇】
# display as 真闇
# JP: 「まくらまくら」
2657 = "「Gối đây gối đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「夏掛け夏掛け」
2416 = "「Chăn hè đây chăn hè đây.」"
# 【ハチロク】
# display as 八六
# JP: 「お布団、しきおわりました」
2750 = "「Em đã trải nệm xong rồi ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええ～！？　オリヴィ平気だよぉ」
2287 = "「Ê ê ê~!? Olivy không sao đâu mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、今日のところは大事をとろう」
2136 = "「Không được, hôm nay cứ cẩn thận thì hơn.」"
# monologue
# JP: （ぽふっ）
3509 = "（Bịch）"
# monologue
# JP: オリヴィを布団の上へと寝かせれば、\nあっという間に日々姫が夏掛けを腹へとかける。
3276 = "Vừa đặt Olivy nằm xuống nệm,\nchị Hibiki đã nhanh thoăn thoắt đắp chăn hè lên bụng em ấy."
# 【ハチロク】
# display as 八六
# JP: 「あ――日々姫。今日、オリヴィちゃんは熱暴走で\n倒れてしまったわけですから、むしろ暖めない方が」
2302 = "「A――chị Hibiki. Hôm nay bé Olivy bị ngất\nlà do quá nhiệt, nên thà đừng giữ ấm thì tốt hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「あわわ！？　そぎゃんと？　なら、夏掛けば」
2279 = "「A wa wa!? Vậy sao? Thế thì, lấy chăn hè ra――」"
# monologue
# JP: 日々姫があわてて剥がそうとした夏掛けが、\n縫い付けられているかのように動かなくなる。
3339 = "Chị Hibiki cuống cuồng định kéo chăn hè ra,\nnhưng chiếc chăn lại không nhúc nhích, cứ như bị khâu chặt vào nệm vậy."
# 【日々姫】
# display as 日日姬
# JP: 「あれっ？」
2423 = "「Ủa?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「とっちゃやぁ」
2202 = "「Đừng lấy đi mà~」"
# monologue
# JP: 子猫のごとくオリヴィが、夏掛けにしがみついている。
3208 = "Olivy đang bám chặt lấy chiếc chăn hè như một chú mèo con."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「これ、好きだから。なんかうれしいから」
2447 = "「Olivy thích cái này mà. Tự nhiên thấy vui vui.」"
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんと？　ばってん」
2633 = "「Vậy sao? Nhưng mà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「人間は、『おなかひやさないよーに』って、\nこれ、するんだよね。あきほちゃんに聞いたことある」
2452 = "「Con người hay đắp cái này,\nđể 'không bị lạnh bụng' đúng không. Olivy từng nghe Akiho nói thế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あきほちゃん？　とは――」
2181 = "「Akiho? Là ai――」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタんちのむすめさんだよ！\nもーおよめにいっちゃったけど、ちょーいーこ！」
2463 = "「Là con gái của nhà Munakata đó!\nDù đã đi lấy chồng rồi, nhưng là một cô bé siêu ngoan luôn!」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ……左様なのですね。\nでしたら、夏掛けを使っていただきたいところですが」
2292 = "「Chà…… ra là vậy.\nNếu thế thì em cũng muốn để chị dùng chăn hè, nhưng mà.」"
# monologue
# JP: ハチロクが、日々姫が、すがる視線で僕をみる。\nが……この判断は、実になかなか難しい。
3088 = "Hachiroku và chị Hibiki nhìn tôi bằng ánh mắt cầu cứu.\nNhưng…… quyết định chuyện này quả thực khá khó khăn."
# 【真闇】
# display as 真闇
# JP: 「ほんなら、お腹ば冷やさないよーにして。\n他んところは、きちんと冷やしたらきっとよかとよ」
2833 = "「Nếu vậy thì, cứ giữ cho bụng không bị lạnh.\nCòn những chỗ khác thì làm mát đàng hoàng là được thôi mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「そりゃそうだろうけど――どーやって？」
2754 = "「Điều đó thì đúng rồi――nhưng bằng cách nào?」"
# 【真闇】
# display as 真闇
# JP: 「例えば……そーね、こぎゃんして？」
2669 = "「Ví dụ như…… đúng rồi, làm thế này này?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わぁ！！」
2280 = "「Oa!!」"
# monologue
# JP: なるほど、さすがは真闇姉だ。
3142 = "Ra là vậy, không hổ danh là chị Mayami."
# monologue
# JP: 問題を一挙に解決し、\n同時にオリヴィを、思いっきりに喜ばせている。
3044 = "Chỉ một hành động đã giải quyết vấn đề,\nđồng thời làm cho Olivy vô cùng thích thú."
# monologue
# JP: （ぱたぱた）
3512 = "（Phạch phạch）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あははー！　うちわー！\nあのねオリヴィ、ぱたぱたしてもらうのはじめて！」
2313 = "「Ahaha~! Là quạt giấy~!\nNè nha, đây là lần đầu tiên Olivy được quạt cho thế này đó!」"
# 【真闇】
# display as 真闇
# JP: 「うふふ、喜んでもらえて、おねーちゃんも嬉しかと。\n涼しかとでしょー。寒くはなかと？」
2377 = "「Ufufu, em vui là chị cũng vui rồi.\nMát lắm đúng không. Có thấy lạnh không?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ううん、きもちいー！\nあのね、オリヴィ、すっごいしあわせ」
2109 = "「Không đâu, dễ chịu lắm~!\nNè nha, Olivy đang thấy vô cùng hạnh phúc luôn.」"
# 【真闇】
# display as 真闇
# JP: 「そ。おーちゃんがしあわせならね？\nおねーちゃんも、しあわせと」
2636 = "「Vậy sao. Bé O hạnh phúc thì?\nChị cũng hạnh phúc.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなんだ、えへへー」
2172 = "「Ra là vậy, ehehe~」"
# monologue
# JP: ……夏祭りのとき、右田一酒造元で配布するうちわ。\n毎年同じ柄なので、記憶もぱたぱた、あおがれる。
1577 = "……Chiếc quạt giấy được xưởng rượu Migita phân phát vào dịp lễ hội mùa hè.\nVì năm nào cũng cùng một họa tiết, nên những ký ức cũng như được quạt tung lên."
# monologue
# JP: 幼いころの日々姫も、ああして、ぱたぱた、\n真闇姉に、僕に、あおがれていた――
3329 = "Chị Hibiki hồi nhỏ cũng từng được chị Mayami,\nvà cả tôi quạt cho như thế――"
# 【日々姫】
# display as 日日姬
# JP: 「ねぇね、手、疲れんと？\n疲れたら、わたし、すぐに代わるけんっ」
2870 = "「Chị Hai, mỏi tay không?\nNếu mỏi thì để em thay cho nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「あああっ！」
2318 = "「A a a!」"
# monologue
# JP: 出遅れた、といわんばかりのハチロクの悲鳴。
3086 = "Tiếng kêu của Hachiroku như thể đang tiếc nuối vì chậm chân hơn một bước."
# 【ハチロク】
# display as 八六
# JP: 「でしたら……でしたらわたくしは、日々姫のあとで」
2848 = "「Nếu vậy…… nếu vậy thì em sẽ quạt sau chị Hibiki ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それならその次オリヴィも！\nオリヴィもぱたぱたしてみたい！」
2821 = "「Thế thì tiếp theo cho Olivy nữa nha!\nOlivy cũng muốn thử quạt xem sao!」"
# 【真闇】
# display as 真闇
# JP: 「あれまぁ」
2282 = "「Chà chà.」"
# monologue
# JP: くすくすと、満ち足りきったような微笑。
3414 = "Chị ấy cười khúc khích, một nụ cười vô cùng mãn nguyện."
# 【真闇】
# display as 真闇
# JP: 「ほんなら、五分交代で。\nかわりばんこにあおげばよかね？」
2826 = "「Nếu vậy thì, mỗi người năm phút.\nChúng ta thay phiên nhau quạt nhé?」"
# 【日々姫】
# display as ３人
# JP: 「わかった」「オッケー！」\n「かしこまりました」
2464 = "「Dạ」「Okay!」\n「Em hiểu rồi ạ.」"
# monologue
# JP: 三者三様の良い子のお返事。
3488 = "Ba câu trả lời ngoan ngoãn theo ba kiểu khác nhau."
# monologue
# JP: 真闇姉はまたとろけるように微笑んで。\nけれどもすぐに、表情を引き締めなおして僕を見る。
3415 = "Chị Mayami lại mỉm cười dịu dàng.\nNhưng ngay sau đó, chị ấy nghiêm mặt lại và nhìn tôi."
# 【真闇】
# display as 真闇
# JP: 「で、双ちゃん」
2616 = "「Thế, Sou-chan.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2357 = "「嗯」" 
# 【真闇】
# display as 真闇
# JP: 「おーちゃんが倒れたゆーんは、\nどぎゃん状況で、どぎゃん理由でのことやったと？」
2502 = "「Bé O bị ngất,\nlà trong tình huống nào, và vì lý do gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「直接的な原因は熱暴走による回路遮断だ。\n熱暴走の原因は――いまのところ、特定できていないが」
2704 = "「Nguyên nhân trực tiếp là ngắt mạch do quá nhiệt.\nNguyên nhân gây quá nhiệt thì――hiện tại, chưa thể xác định được nhưng」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えんめーの話、聞いたから。\nそれでオリヴィ、ちょっとこーふんしちゃったの」
2638 = "「Vì nghe nói về chuyện kéo dài tuổi thọ.\nNên Olivy, hơi hưng phấn một chút」"
# 【日々姫】
# display as 日日姬
# JP: 「えんめー、って？」
2531 = "「Kéo dài tuổi thọ, là sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィの寿命、延ばせるかもって。聞いたらオリヴィ、\nうれしくってかーってして――たおれちゃったみたい」
2512 = "「Tuổi thọ của Olivy, có thể kéo dài được. Nghe xong Olivy,\nvui quá nên đầu óc nóng bừng――rồi có vẻ ngất đi luôn」"
# 【日々姫】
# display as 日日姬
# JP: 「寿命延ばすって――え？\nえっ！？　なにそれっ！？」
2530 = "「Kéo dài tuổi thọ á――Hả?\nỂ!? Chuyện đó là sao!?」"
# monologue
# JP: 日々姫の顔が青くなる。\n倒れたことと寿命の話と――それが繋がったのだろう。
3327 = "Mặt Hibiki tái đi.\nChắc em ấy đã liên kết chuyện ngất xỉu với chuyện tuổi thọ――rồi."
# monologue
# JP: なればこそ、きちんと伝えなければならない。\n日々姫に、真闇姉に、力を貸してもらうためにも。
3482 = "Chính vì vậy, tôi phải giải thích cho đàng hoàng.\nCũng là để nhờ Hibiki và chị Mayami giúp đỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫、落ち着いて聞いてくれ。\nとにかく、順を追って話していくので」
2626 = "「Hibiki, bình tĩnh nghe anh nói.\nNói chung, anh sẽ kể lại theo trình tự」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――う、うん」
2300 = "「A――ừ, ừm」"
# 【双鉄】
# display as 雙鐵
# JP: 「まず、僕らと宗方\x%l機関士;#00ffc040;機関士%l;#;――みかん鉄道で、\nⅨ号に乗務していた\x%l機関士;#00ffc040;機関士%l;#;との会話内容を説明しよう」
2830 = "「Đầu tiên, anh sẽ giải thích nội dung cuộc trò chuyện giữa chúng ta và \x%l機関士;#00ffc040;Lái tàu%l;#; Munakata――\x%l機関士;#00ffc040;Lái tàu%l;#; từng làm việc trên đầu máy số 9 ở Đường sắt Mikan」"
# monologue
# JP: ……話していくうち、僕自身、\nかなりの混乱をきたしているなと思い知る。
1584 = "……Trong lúc nói, bản thân tôi,\ncũng nhận ra mình đang khá bối rối."
# monologue
# JP: あいまいなところや、事実の錯誤――\nハチロクとオリヴィとのフォローを幾度も、幾度も受ける。
3299 = "Những chỗ mơ hồ, hay nhầm lẫn sự thật――\nđã được Hachiroku và Olivy đỡ lời cho hết lần này đến lần khác."
# 【双鉄】
# display as 雙鐵
# JP: 「そういうわけで、登呂流湯のご主人に診断をお願いし、\nオリヴィの冷却中に、延命法についてをお伺いした」
2618 = "「Vì vậy, chúng tôi đã nhờ ông chủ nhà tắm Tororyu-yu chẩn đoán,\nvà trong lúc làm mát cho Olivy, đã hỏi về phương pháp kéo dài tuổi thọ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、それ！　どんなお話したの？\nオリヴィもしりたい！」
2336 = "「A, chuyện đó! Mọi người đã nói gì vậy?\nOlivy cũng muốn biết!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああうむ――うむ？」
2337 = "「À ừm――hửm?」"
# monologue
# JP: 風だ。涼しい。\n何故かと思って目線を向ければ――
3047 = "Gió. Mát quá.\nĐang tự hỏi tại sao, tôi đưa mắt nhìn sang thì――"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ。そのうちわはオリヴィ自身を冷ますものだぞ。\n特に僕などあおがぬでも」
2459 = "「Olivy. Chiếc quạt đó là để làm mát cho chính Olivy mà.\nKhông cần phải quạt cho tôi đâu」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ。十分にひえたからー！\nそれにね？　ぱたぱた～」
2448 = "「Olivy. Đủ mát rồi mà~!\nHơn nữa nhé? Phành phạch~」"
# monologue
# JP: 今度は、ハチロク。
3309 = "Lần này là, Hachiroku."
# monologue
# JP: ふわりとあがった前髪の下、\n嫉妬さえをも覚えるほどの笑顔が輝く。
3102 = "Dưới mái tóc mái bồng bềnh tung bay,\nnụ cười rạng rỡ đến mức khiến người ta phải ghen tị."
# 【ハチロク】
# display as 八六
# JP: 「うふふ、ありがとうございます。\nたいへん、ここちようございます」
2378 = "「Ufufu, cảm ơn cô.\nRất là, dễ chịu ạ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ね？　オリヴィ気持ちよくてうれしかったから、\nみんなにもお返ししたいんだ！」
2708 = "「Thấy chưa? Olivy thấy dễ chịu và vui lắm,\nnên cũng muốn đáp lễ mọi người!」"
# monologue
# JP: （ぱたぱた）
3513 = "（Phành phạch）"
# 【真闇】
# display as 真闇
# JP: 「あらまぁ」
2399 = "「Trời đất ơi」"
# monologue
# JP: （ぱたぱた）
# 3513 = "（扇風）" 
# 【日々姫】
# display as 日日姬
# JP: 「うーん、涼しか！！」
2364 = "「Ưm, mát quá!!」"
# monologue
# JP: （ぱたぱた）
# 3513 = "（扇風）" 
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――確かにここちいい。\nならば甘えよう。ありがとう」
2398 = "「Ra vậy――đúng là dễ chịu thật.\nVậy tôi không khách sáo đâu. Cảm ơn nhé」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「どーいたしまして！」
2119 = "「Không có chi!」"
# monologue
# JP: ……ほんのわずかな冷気だけれど、\n頭をかなり冷やしてもらえる。
1586 = "……Dù chỉ là một chút hơi lạnh,\nnhưng cũng đủ làm đầu óc tôi tỉnh táo hẳn."
# monologue
# JP: 筋道立てて順序よく、登呂流湯のご主人から聞いた話を、\n僕なりに整頓し、伝えていけてるような気がする。
3271 = "Những câu chuyện nghe được từ ông chủ nhà tắm Tororyu-yu,\ncó vẻ tôi đã sắp xếp và truyền đạt lại một cách mạch lạc, rõ ràng."
# 【双鉄】
# display as 雙鐵
# JP: 「――つまり、鉄道の準エアクラ化。それを目指した者が\n多かったがゆえ、既存の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の延命技術は」
2148 = "「――Nói cách khác, bán Aerocraft hóa đường sắt. Vì có quá nhiều người\nhướng tới mục tiêu đó, nên kỹ thuật kéo dài tuổi thọ cho \x%lレイルロオド;#00ffc040;Railord%l;#; hiện tại thì」"
# 【真闇】
# display as 真闇
# JP: 「まともに研究もされんかった――ゆーことね？」
2513 = "「Chẳng được nghiên cứu đàng hoàng――ý là vậy đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「残念ながら、そうであるらしい」
2736 = "「Đáng tiếc là, có vẻ như vậy」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなん！　おかしかとよ！」
2806 = "「Như vậy! Thật kỳ lạ!」"
# monologue
# JP: 日々姫の大声。立ち上がらんばかりの勢いだ。
3331 = "Tiếng hét lớn của Hibiki. Với khí thế như chực đứng bật dậy."
# 【日々姫】
# display as 日日姬
# JP: 「頭よか人たちが、なんでそぎゃん間違いしよると！？　\n鉄道ば、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;があってこそって」
2551 = "「Mấy người thông minh, sao lại phạm sai lầm như vậy chứ!?\nĐường sắt, phải có \x%lレイルロオド;#00ffc040;Railord%l;#; mới đúng chứ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっかな？\nオリヴィは、それって間違いじゃないと思うけど」
2653 = "「Vậy sao?\nOlivy thì nghĩ điều đó không sai đâu」"
# 【日々姫】
# display as 日日姬
# JP: 「えええっ！！？」
2283 = "「Ể ể ể!!?」"
# monologue
# JP: 日々姫が固まる。ハチロクも目をパチクリさせてる。\n僕も、同様に驚いてる。
3335 = "Hibiki cứng đờ người. Hachiroku cũng chớp chớp mắt.\nTôi cũng ngạc nhiên không kém."
# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;のエアクラナビ化。\nそれをまさか、オリヴィが肯定しようとは――
3269 = "Navi hóa Aerocraft cho \x%lレイルロオド;#00ffc040;Railord%l;#;.\nKhông ngờ Olivy lại tán thành điều đó――"
# 【真闇】
# display as 真闇
# JP: 「どぎゃんして、間違いじゃなかって、思うと？」
2178 = "「Sao em lại nghĩ, đó không phải là sai lầm?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2357 = "「嗯」" 
# monologue
# JP: オリヴィのうちわの動きが止まる。\n少し黙って――それから静かな言葉がつながる。
3206 = "Động tác quạt của Olivy dừng lại.\nIm lặng một chút――sau đó, những lời nhẹ nhàng tiếp nối."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……大九洲SL構想も成功してるし、広がってるし。\n今までのあり方の鉄道も、いるってもちろん思うけど」
1655 = "「……Kế hoạch Đại Kyushu SL cũng đã thành công, và đang mở rộng.\nTất nhiên Olivy nghĩ đường sắt theo cách từ trước đến nay vẫn cần thiết, nhưng mà」"
# 【ハチロク】
# display as 八六
# JP: 「あ――！\n今までのあり方の鉄道“も”、ですか」
2303 = "「A――!\nĐường sắt theo cách từ trước đến nay 'cũng', sao ạ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ。それと同時に、新しいあり方の鉄道も、\nきっとこれから必要になるんじゃないかなって思うの」
2498 = "「Đúng. Đồng thời, một hình thức đường sắt mới,\nchắc chắn từ nay về sau cũng sẽ cần thiết đấy」"
# monologue
# JP: そう聞かされて、僕の耳からもウロコが落ちる。
3305 = "Nghe vậy, tôi như bừng tỉnh ngộ."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか。冷静に考えてみれば、\nそれらはお互い、否定しあう関係でもないか」
2296 = "「A――ra vậy. Bình tĩnh suy nghĩ lại thì,\nchúng cũng không phải là mối quan hệ phủ định lẫn nhau nhỉ」"
# 【日々姫】
# display as 日日姬
# JP: 「ばってん――\n自動運転の鉄道なんかに、なんの面白みがあると？」
2550 = "「Nhưng mà――\nĐường sắt tự động lái thì có gì thú vị chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、この場合求められるのは、\n面白みではなく、実用性だ」
2115 = "「Không, trong trường hợp này thứ được đòi hỏi,\nkhông phải là sự thú vị, mà là tính thực dụng」"
# 【日々姫】
# display as 日日姬
# JP: 「やけん、そん実用性でエアクラに勝てんかったから、\n鉄道ば、大廃線でぼろぼろになったわけでしょお」
2243 = "「Thế nên, vì tính thực dụng không thắng nổi Aerocraft,\nđường sắt mới bị Đại bãi bỏ làm cho tơi tả đó thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうなのだが――」
2760 = "「Đúng là vậy nhưng――」"
# monologue
# JP: どのように伝えれば良いものか。\n悩んだわずかな沈黙に、オリヴィがはいと手を挙げる。
3308 = "Tôi đang suy nghĩ xem nên giải thích thế nào.\nTrong khoảnh khắc im lặng ngắn ngủi đó, Olivy giơ tay lên \"Có\"."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、エアクラにはくわしくないんだけど――\n弱いとこがあるから、鉄道、生き残ってるわけでしょ？」
2454 = "「Olivy thì không rành về Aerocraft lắm nhưng――\nvì nó có điểm yếu nên đường sắt mới tồn tại được đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「で、ございますね。超重量物移送ができない。\n地磁気の乱れに弱い、暴風に弱い――などが、弱みかと」
2450 = "「Đúng là vậy ạ. Không thể vận chuyển vật siêu nặng.\nDễ bị ảnh hưởng bởi rối loạn địa từ, dễ bị ảnh hưởng bởi bão táp――đó là những điểm yếu ạ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら、そういう理由で勝てるところで、\n自動運転化を目指したりすればいいんだと思うな」
2823 = "「Vậy thì, cứ nhắm vào những điểm có thể thắng đó,\nmà hướng tới tự động hóa là được thôi」"
# 【日々姫】
# display as 日日姬
# JP: 「でも、そういうとこではもう勝てとるわけでしょお？\nなんでわざわざ、お金かけてまで自動運転化とか」
2234 = "「Nhưng mà, ở những mảng đó thì đường sắt vốn đã thắng rồi mà?\nSao lại phải cất công tốn tiền để tự động hóa nữa chứ」"
# 【ハチロク】
# display as 八六
# JP: 「――新技術は、そうしたところでしか試し得ません」
1596 = "「――Công nghệ mới, chỉ có thể thử nghiệm ở những mảng đó thôi ạ」"
# monologue
# JP: きっぱりと、ハチロクは日々姫の疑問を切り捨てる。
3097 = "Hachiroku dứt khoát gạt bỏ thắc mắc của Hibiki."
# 【ハチロク】
# display as 八六
# JP: 「そうして、きっと。\n新技術は、鉄道の未来を切り開き得るからではないかと」
2733 = "「Và như thế, chắc chắn.\nCông nghệ mới sẽ mở ra tương lai cho đường sắt ạ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなむつかしいこと考えてないけど、\nだいたいイメージおんなじだと思う」
2445 = "「Olivy không nghĩ sâu xa đến thế đâu,\nnhưng chắc đại khái ý tưởng cũng giống vậy đó」"
# monologue
# JP: オリヴィの笑顔の同意を受けて、\nハチロクの言葉がなめらかさを増す。
3106 = "Nhận được sự đồng tình kèm nụ cười của Olivy,\nlời nói của Hachiroku càng thêm trôi chảy."
# 【ハチロク】
# display as 八六
# JP: 「エアクラ自動車に遥かに勝る――例えば時速200キロで、\n[ていおう,1]帝央と[おおさか,1]逢坂とを結ぶ超高速電車がもしもあるなら」
2485 = "「Vượt xa xe ô tô Aerocraft――ví dụ như nếu có một tuyến tàu điện siêu tốc\nnối liền Teiou và Ousaka với tốc độ 200km/h thì sao」"
# 【日々姫】
# display as 日日姬
# JP: 「それなら私も乗ってみたかと！　時速200キロとか、\nどんな景色が見えるのか、単純に興味あるし」
2654 = "「Thế thì em cũng muốn đi thử!\nTốc độ 200km/h, em chỉ đơn thuần tò mò không biết cảnh sắc sẽ như thế nào thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「だけでなく、ビジネス利用も戻ってこよう。地上型――\nエアクラカーの平均巡航速度は時速60キロ程度なのだし」
2798 = "「Không chỉ vậy, nhu cầu sử dụng cho công việc cũng sẽ quay lại. Loại chạy trên mặt đất――\nTốc độ hành trình trung bình của xe Aerocraft chỉ khoảng 60km/h thôi」"
# 【ハチロク】
# display as 八六
# JP: 「くわえて、定時性。遅れないことに関しましても、\n地上型のエアクラよりもやはり、鉄道に利がございます」
2197 = "「Thêm vào đó là tính đúng giờ. Về việc không bị chậm trễ,\nđường sắt vẫn có lợi thế hơn so với Aerocraft chạy trên mặt đất ạ」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、そっか。それならわかる。そこまでいくんなら、\n『鉄道の実用性』ってお話にもなってくると思う」
2339 = "「A, ra vậy. Thế thì em hiểu rồi. Nếu đạt đến mức đó,\nthì đúng là câu chuyện về 'tính thực dụng của đường sắt' rồi」"
# monologue
# JP: 日々姫の小さな頷きを受け、\nオリヴィも嬉しげな顔になる。
3333 = "Nhận được cái gật đầu nhè nhẹ của Hibiki,\nOlivy cũng lộ vẻ mặt vui mừng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどさ、時速２００キロなんて、今の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とか\n人間で、安全に運転できるか、わかんないでしょ？」
2238 = "「Nhưng mà này, tốc độ 200km/h,\nkhông biết con người hay \x%lレイルロオド;#00ffc040;Railord%l;#; hiện tại có thể lái an toàn được không nhỉ?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　だから自動運転！！？」
2333 = "「A! Nên mới cần tự động lái!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「その技術も必要になってくるだろう。が、それは当然、\n一朝一夕、一足飛びに産み出されるものでもない」
2594 = "「Chắc chắn sẽ cần đến công nghệ đó. Nhưng đương nhiên,\nkhông phải một sớm một chiều, một bước là tạo ra được ngay」"
# 【日々姫】
# display as 日日姬
# JP: 「そっか――だからか」
2800 = "「Ra vậy――bởi thế nên」"
# monologue
# JP: 今度は、深く、強い頷き。
3229 = "Lần này là một cái gật đầu mạnh mẽ và sâu sắc."
# 【日々姫】
# display as 日日姬
# JP: 「だから、確実に勝てるとこ――\n試験ばできるとこで、試験しようって話になるとね」
2605 = "「Nên mới nói là thử nghiệm ở những nơi chắc chắn thắng――\nở những nơi có thể thử nghiệm được đó hả」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな、けれどそうするためには、\n無論、巨額の資金が必要になる」
2681 = "「Đúng vậy, nhưng để làm được thế,\nđương nhiên sẽ cần một số vốn khổng lồ」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなら、そいば――\n“今ある鉄道”。観光列車の収入でまかなう」
2804 = "「Vậy thì, dùng cái đó――\n'đường sắt hiện có'. Trang trải bằng doanh thu từ tàu du lịch」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、運べれば理想的だな。無論、観光のみならず、\n周辺開発などを含めてやっていかねば叶わんだろうが」
2717 = "「Nếu làm được vậy thì lý tưởng quá. Đương nhiên, không chỉ dựa vào du lịch,\nmà còn phải kết hợp cả phát triển khu vực xung quanh thì mới thành hiện thực được」"
# 【日々姫】
# display as 日日姬
# JP: 「それもそうだろうけど。……お金儲けを考えるなら、\n観光列車自体にも、もっと伸ばせそうなとこあると思う」
2761 = "「Cũng đúng ha. ……Nếu nghĩ đến chuyện kiếm tiền,\nthì bản thân tàu du lịch chắc vẫn còn nhiều điểm có thể phát triển thêm」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうと？」
2805 = "「Nói vậy là sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「例えば……[オクシデント・エクスプレス,3]西方急行みたいな、\n超豪華観光周遊列車を日ノ本にも走らせるとか」
2671 = "「Ví dụ như…… chạy một chuyến tàu du lịch vòng quanh siêu sang trọng\nnhư [Occident Express,3]Tàu tốc hành Phương Tây ở Hinomoto chẳng hạn」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それたのしそー！」
2563 = "「Nghe vui quá nha~!」"
# monologue
# JP: ぴょこん！　オリヴィが飛び起きかけて、\nけれどもすぐに、真闇姉の手に優しく穏やかに寝かされる。
3203 = "Bật dậy! Olivy định nhảy dựng lên,\nnhưng ngay lập tức bị bàn tay của chị Mayami nhẹ nhàng, êm ái đặt nằm xuống."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「サッポロ、センダイ、テイオー、ナゴヤ、オーサカ、\nキョート、ヒロシマ、カゴシマ！　めぐってみたい！」
2166 = "「Sapporo, Sendai, Teiou, Nagoya, Ousaka,\nKyoto, Hiroshima, Kagoshima! Olivy muốn đi vòng quanh thử xem sao!」"
# 【双鉄】
# display as 雙鐵
# JP: 「超富裕層をターゲットにしたハイクラス――\nいや、プレミアムステージの観光列車か」
2884 = "「Nhắm đến giới siêu giàu, đẳng cấp cao――\nKhông, là tàu du lịch hạng siêu sang sao」"
# 【ハチロク】
# display as 八六
# JP: 「日ノ本全土は、今すぐにはとても無理でも……\nたとえば、九洲だけでも巡らせられたのなら――」
2518 = "「Toàn bộ Hinomoto thì bây giờ vẫn chưa thể ngay được……\nnhưng ví dụ như, chỉ chạy vòng quanh Kyushu thôi thì――」"
# 【真闇】
# display as 真闇
# JP: 「……博太によーさん観光にきよる海外のお客さんば、\n九洲全土に、おまねきできるかもしれんねぇ」
1660 = "「……Những vị khách nước ngoài đến Hakuta du lịch,\ncó khi sẽ được mời đi tham quan toàn bộ Kyushu luôn đó nha」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
# 2396 = "「噢噢——」" 
# 【日々姫】
# display as 日日姬
# JP: 「大九洲SL構想の発展系で、それならいけると思う。\n九洲らしか――九洲の粋を集めたデザインで」
2564 = "「Em nghĩ nếu là một phần mở rộng của Kế hoạch Đại Kyushu SL thì có thể làm được.\nĐậm chất Kyushu――với thiết kế hội tụ tinh hoa của Kyushu」"
# monologue
# JP: 日々姫の瞳が、仕事の眼差し――\nデザイナーの目になっている。
3337 = "Ánh mắt của Hibiki giờ là ánh mắt của công việc――\nánh mắt của một nhà thiết kế."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それオリヴィ乗ってみたいかも！　日々姫デザインの、\nちょーさいこーきゅーかんこーれっしゃ！」
2443 = "「Cái đó có khi Olivy cũng muốn đi thử! Chuyến tàu du lịch\nsiêu cao cấp do Hibiki thiết kế!」"
# 【日々姫】
# display as 日日姬
# JP: 「乗ってみたい――だよね、うん。\nその気持ちを、デザインで、システムで引き起こせれば」
2658 = "「Muốn đi thử――đúng không, ừm.\nNếu có thể khơi gợi được cảm giác đó bằng thiết kế, bằng hệ thống」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――だな。\n乗ってみたいを感じてもらえねば、話にならん」
2352 = "「Ừ――đúng vậy.\nNếu không làm cho họ cảm thấy muốn đi thử thì chẳng có ý nghĩa gì」"
# monologue
# JP: 超高級観光列車でも、新技術を用いた通勤列車でも。\nあるいは超高速電車であっても同じ。そこが根っこだ。
3140 = "Dù là tàu du lịch siêu cao cấp, hay tàu đi lại sử dụng công nghệ mới.\nHay thậm chí là tàu điện siêu tốc thì cũng vậy. Đó là cái gốc rễ."
# 【双鉄】
# display as 雙鐵
# JP: 「……逆に言えば、『乗ってみたい』をエアクラに全て\nもっていかれたがゆえに、大廃線は起きてしまった」
1636 = "「……Nói ngược lại, chính vì Aerocraft đã lấy đi toàn bộ\ncái cảm giác 'muốn đi thử' đó, nên mới xảy ra Đại bãi bỏ」"
# 【日々姫】
# display as 日日姬
# JP: 「なら、エアクラ側に行った人たちも間違いじゃなかとね。\nもう一度――鉄道側へのレールをしいてあげられれば」
2561 = "「Vậy thì, những người chuyển sang Aerocraft cũng không có lỗi.\nNếu chúng ta có thể――lát lại đường ray đưa họ về với đường sắt một lần nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「――そうだな、きっと」
1597 = "「――Đúng vậy, chắc chắn」"
# monologue
# JP: 今の会話で、僕にもわずかに見えてきたような気がする。
3470 = "Qua cuộc trò chuyện vừa rồi, tôi có cảm giác mình đã lờ mờ nhìn ra."
# monologue
# JP: 大九洲SL構想がつなぐレールを、\nさらにどこへと伸ばしていけばいいのか、その路線図が。
3466 = "Rằng những tuyến đường ray mà Kế hoạch Đại Kyushu SL kết nối,\nnên được kéo dài về đâu, tấm bản đồ tuyến đường đó."
# 【真闇】
# display as 真闇
# JP: 「ばってん、そんレールば敷くのに、何年かかると？\nおねーちゃんの寿命でも、間に合いそうもなかけど」
2617 = "「Nhưng mà, để lát được đường ray đó thì mất mấy năm đây?\nChắc tuổi thọ của chị cũng không kịp đợi đến lúc đó đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「っと、その話であったな」
2261 = "「À, đang nói dở chuyện đó nhỉ」"
# monologue
# JP: そうだ。全ては今いる場所から――足元からだ。
3248 = "Đúng vậy. Tất cả bắt đầu từ nơi ta đang đứng――từ dưới chân mình."
# monologue
# JP: いかに遠大なレールであろうと、既存路線に\x%l接続;#00ffc040;接続%l;#;できねば、\n僕らにとっては無いのと変わらん。
3051 = "Dù tuyến đường ray có dài bao xa đi chăng nữa, nếu không thể \x%l接続;#00ffc040;kết nối chuyển tàu%l;#; với các tuyến hiện có,\nthì đối với chúng ta cũng coi như không."
# 【双鉄】
# display as 雙鐵
# JP: 「登呂流湯さんは、そうした話をすることにより、\n逆説的に、僕らに教えてくれたのだ」
2132 = "「Ông chủ nhà tắm Tororyu-yu, thông qua câu chuyện đó,\nđã chỉ cho chúng ta một cách nghịch lý」"
# 【真闇】
# display as 真闇
# JP: 「ああ」
2294 = "「À」"
# 【日々姫】
# display as 日日姬
# JP: 「逆説的にって？」
2230 = "「Nghịch lý là sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕らが頼るべき人物像を。その方は、\n新技術より、既存鉄道や\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の活用こそを――」
2583 = "「Về hình mẫu nhân vật mà chúng ta nên cậy nhờ. Người đó,\nthay vì công nghệ mới, lại tận dụng đường sắt hiện có và \x%lレイルロオド;#00ffc040;Railord%l;#;――」"
# 【日々姫】
# display as 日日姬
# JP: 「電車姫さま！！」
2881 = "「Điện xá Công chúa điện hạ!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおり」
2664 = "「Chính xác」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「って、ソーテツたち、デンシャヒメとコネあるの？」
2242 = "「Khoan, mấy người Soutetsu, có quan hệ với Điện xá Công chúa sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ある。\nあの方は[ハチロク,3]8620の熱心なファンだしな」
2370 = "「Ừ. Có chứ.\nVị đó là fan cuồng của dòng [8620'86] mà」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなのっ！？」
2715 = "「Vậy luôn!?」"
# 【日々姫】
# display as 日日姬
# JP: 「だけじゃなかとよー！\n列車デザインの相談、私、受けたことあるけんね」
2810 = "「Đâu chỉ có vậy thôi đâu~!\nEm từng được nhờ tư vấn thiết kế tàu rồi đó nha」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「Amazing!!」
2890 = "「Amazing!!」"
# monologue
# JP: オリヴィの瞳が輝く、\n頬がぱあっとバラ色になる。
3207 = "Đôi mắt Olivy sáng rực,\nhai má ửng hồng."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま」
2880 = "「Ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2358 = "「!」"
# monologue
# JP: そうだった。\n興奮させすぎてはいかん。
3247 = "Đúng rồi.\nKhông được để em ấy hưng phấn quá."
# monologue
# JP: 今はともかく、オリヴィを休ませ、落ち着けることだ。
3364 = "Dù sao bây giờ, phải để Olivy nghỉ ngơi và bình tĩnh lại đã."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットにも聞いてもらったほうがいいと思うゆえ、\n連絡は明日以降にしようと思う」
2565 = "「Anh nghĩ cũng nên để Paulette nghe chuyện này,\nnên chắc từ ngày mai mới liên lạc」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかったー」
# 2469 = "「好的」" 
# 【双鉄】
# display as 雙鐵
# JP: 「いい返事だ」
2711 = "「Ngoan lắm」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ！？」
# 2334 = "「啊！？」" 
# monologue
# JP: びくりと体をすくめられ、\n自分の右手がオリヴィを撫でようとしていたと気づく。
3205 = "Em ấy giật mình co người lại,\ntôi mới nhận ra tay phải mình đang định xoa đầu Olivy."
# monologue
# JP: いかん。相手はハチロクでも日々姫でもないというのに。\nというか――
3465 = "Không được. Đối phương đâu phải Hachiroku hay Hibiki đâu chứ.\nMà nói đúng hơn thì――"
# 【双鉄】
# display as 雙鐵
# JP: 「あわてて、この部屋に布団を敷いてしまったな。\n日々姫がよければ、僕は日々姫の部屋で寝るゆえ」
2216 = "「Vội vàng quá nên anh trải luôn nệm ở phòng này rồi.\nNếu Hibiki không phiền, anh sẽ sang phòng em ngủ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ！　あのねソーテツ？\nオリヴィ、できたらみんなで寝たい」
2327 = "「A! Này Soutetsu?\nNếu được Olivy muốn ngủ chung với mọi người」"
# 【双鉄】
# display as 雙鐵
# JP: 「みんなでか」
2855 = "「Với mọi người sao」"
# 【ハチロク】
# display as 八六
# JP: 「それは素敵な考えですね！\nわたくし、もちろん大賛成です」
2547 = "「Đó là một ý tưởng tuyệt vời đấy ạ!\nTôi tất nhiên là cực kỳ tán thành rồi」"
# 【日々姫】
# display as 日日姬
# JP: 「なら、次の間もつなげんといけんねー。\n私、客ぶとんもってくる！」
2847 = "「Vậy thì, phải nối luôn phòng bên cạnh lại rồi~.\nĐể em đi lấy nệm cho khách!」"
# 【真闇】
# display as 真闇
# JP: 「おねーちゃん、早起きやけん。\nみんなば起こしてしまうかもしれんけど」
2487 = "「Chị hay dậy sớm lắm nha.\nCó khi lại làm mọi người thức giấc mất thôi」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ぜんぜんへーき！　オリヴィだってはやおきするし」
2489 = "「Không sao hết! Olivy cũng dậy sớm mà」"
# 【真闇】
# display as 真闇
# JP: 「そ？　やったら」
2634 = "「Vậy sao? Thế thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2357 = "「嗯」" 
# monologue
# JP: 布団を並べ、川の字で寝る。\n三人ではなく、五人での川。
3281 = "Trải nệm xếp hàng ngang, ngủ theo hình chữ Xuyên (川).\nKhông phải ba người, mà là chữ Xuyên năm người."
# monologue
# JP: 川の字の外と内とに、さらに大きな流れを湛える、\nクマ川のような川の字で。
3128 = "Cả bên ngoài lẫn bên trong chữ Xuyên, chứa đựng một dòng chảy còn lớn hơn nữa,\nmột chữ Xuyên hệt như dòng sông Kuma."
