# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、うん。\nちょっと、オリヴィ、はしゃぎすぎちゃったかも」
2184 = "「啊，嗯。奧莉薇可能是有點激動過度了」" 

# 【凪】
# display as 凪
