[script]
# lines: 581 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わーお」
2105 = "「哇哦」" 

# monologue
# JP: オリヴィが大きく口をあけ、\nそのままぽかん……と動かなくなる。
3200 = "奧莉薇張口結舌，就這麼一動不動，呆若木雞。" 

# monologue
# JP: 気持ちはわかる。\n実にわかる。
3267 = "我非常理解她的心情。甚至可以說是深有體會。" 

# 【流】
# display as 流
# JP: 「ほーう、これがワシらの先生か」
2247 = "「噢，這位就是我們的老師啊」" 

# 【治】
# display as 治
# JP: 「ちっちゃかのー。\nふかみのちっちゃかころを思い出すわい」
1988 = "「個頭可真小哇，瞅著好像深美小時候」" 

# 【堰】
# display as 堰
# JP: 「ふかみは、ちっちゃかころから背の高かったがの」
2584 = "「深美從小個子就不矮咯」" 

# 【ふかみ】
# display as 深美
# JP: 「もう！　おじいちゃんたちってば！」
2117 = "「哎呀！我的幾位爺爺就少說兩句嘛！」" 

# monologue
# JP: ……\x%l保線;#00ffc040;保線%l;#;ボランティアの三長老。\nあるいは、ふかみの“おじいちゃんたち”。
1305 = "……他們便是\\x%l保線;#00ffc040;巡線%l;#;志願者三長老，換個說法，也就是深美口中的“幾位爺爺”。" 

# monologue
# JP: 流さん、治さん、堰さんのお三方が一同に会する壮観は、\n僕もハチロクも、はじめて目にするものだ。
3380 = "而我和八六也是頭一次目睹流先生、治先生、堰先生齊聚一堂的壯觀景象。" 

# 【凪】
# display as 凪
# JP: 「めずらしかとよねー。ふかみちゃんのおじいちゃんたち、\nみーんないっぺんに集まるなんて」
2674 = "「能和小深的三位爺爺同時見面，可真難得嘞」" 

# monologue
# JP: ――どころか、凪にとってさえレアイベントであるらしい。
1281 = "——想不到這在凪看來都是很稀奇的事情。" 

# 【堰】
# display as 堰
# JP: 「少し前までは、\n誰ぞが発船所に残っとらんといけんかったけんのう」
2618 = "「畢竟直到前段時間，還必須有人守在發船點呢」" 

# 【治】
# display as 治
# JP: 「じゃあが、今は――」
2072 = "「可是現在——」" 

# 【流】
# display as 流
# JP: 「[みどり]翠の病気もよぅなったし、\n[せんどうれんちゅう,3]船頭連中も戻ってくるようになったしの」
2658 = "「翠的病情好轉許多，掌棹的人也回來了不少」" 

# 【ふかみ】
# display as 深美
# JP: 「そうなんです。だから、おじいちゃんたちもわたしも、\n前よりずっと、色んなことに時間を使えるようになって」
2408 = "「情況就是這樣，所以現在不管爺爺他們還是我，都能將更多精力放在其他事情上了」" 

# monologue
# JP: 笑顔でそういい、ふかみはぺこり――\n僕らに向かって頭をさげる。
3329 = "深美面帶笑容地說道。話音剛落——她便面朝我們鞠了一躬。" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんの、みなさんのおかげです。\n本当にありがとうございます！　です！」
2767 = "「這都是多虧了雙鐵哥哥還有大家相助。真的太謝謝你們了！嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「クマ川くだりの復調も、翠さんのご快癒も。\n全て、早瀬家のみなさんや凪の力でのことだろう」
1915 = "「不管隈河漂流的經營狀況好轉還是翠小姐的康復，理應全是早瀨家的各位和凪的功勞」" 

# 【凪】
# display as 凪
# JP: 「もちろんそりゃそうばい！\nばってん――それだけじゃやっぱり、足りんかったと」
2094 = "「咱們當然也沒少出力！可是——單憑咱們的努力肯定也是做不到這份上的」" 

# monologue
# JP: 凪の声。\n相も変わらず力強いが、どこか落ち着きも感じさせる。
3102 = "凪如是說道，儘管聲音依然精神抖擻，卻不失幾分冷靜。" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃんとかウチとかじーちゃんたちが\nどぎゃんと頑張っても、届かんことは届かんけんね」
1914 = "「不管小深和咱還有爺爺們再怎麼奮鬥，總歸還是有力不從心的事」" 

# 【ふかみ】
# display as 深美
# JP: 「ですです。工場誘致撤回とか、鉄道の復活とか、\n経済復興とか、そういうのわたしたちじゃ、無理でした」
2366 = "「就是，比如取消工廠落戶，重啟鐵路事業，復興經濟等等，這些可都是我們無能為力的」" 

# monologue
# JP: 言って。ふかみはもう一度――\n深く、長く、頭を下げる。
3396 = "語畢，深美再一次——深深向我們鞠躬，遲遲沒有起身。" 

# 【ふかみ】
# display as 深美
# JP: 「だからみんなに、ちゃんとお礼をいいたかったんです。\n本当に――ありがとうございます！」
2466 = "「所以我一直想正式向大家表達感激之情。真的——太謝謝大家了！」" 

# 【凪】
# display as 凪
# JP: 「凪さまからも！　ありがとばーい！」
2526 = "「本小姐也謝謝各位！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ……凪……」
2580 = "「深美……凪……」" 

# monologue
# JP: ふかみはともかく、あの凪が――このレールの上、\nなにも考えず倒木を発生させた、あの凪が……
3028 = "不說深美，就連凪都——想想當年，她可是毫無顧忌就讓倒下的樹木橫在這鐵軌上。" 

# monologue
# JP: 大人になったと、しみじみ感じる。\nそれほど長くを、僕らは揃って、歩き続けてこれたのだと。
3259 = "我切實地感到，她如今可真的是長大了。同時也從側面說明我們已經並肩走過了如此漫長的歲月。" 

# 【双鉄】
# display as 雙鐵
# JP: 「皆を僕が代表するのも[せんえつ,1]僭越だが――そういうことなら、\n喜んで[しゃじ,1]謝辞を受け取ろう、ゆえ、どうか頭をあげてくれ」
1992 = "「儘管以我代表大家或有些許不妥——既然各位一片盛情，我也自然不會推脫，只是請大家快快抬起頭來」" 

# 【ふかみ】
# display as 深美
# JP: 「よかったぁ」
2280 = "「太好了」" 

# monologue
# JP: ほにゃりと、ふかみが笑み崩れる。
3310 = "深美嫣然一笑。" 

# 【ふかみ】
# display as 深美
# JP: 「おかあさんがよくなってから、ずっとこうしたいって\n思ってたんです。でも、なかなか機会がなくて」
2678 = "「自從媽媽好起來以後，我早就想向大家道謝了，可是一直找不到機會」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2138 = "「哦——」" 

# monologue
# JP: 確かにだ。親しくなればなるほどに、感謝の意を\nきちんと伝える機会は、却って減ってしまう気がする。
3356 = "確實是這個道理，關係走得越近，反而越難有機會一表感激。" 

# monologue
# JP: 水臭いというような気持ちも、どこかにはある。\nが、良いことならば、積極的に真似するべきだ。
3432 = "雖然我也總覺得這樣未免有些拘謹見外，但既然值得效仿，就應當虛心學習。" 

# monologue
# JP: （ぺこっ）
3464 = "（點頭）" 

# 【ふかみ】
# display as 深美
# JP: 「って、え！？　双鉄おにいさん！？」
2088 = "「呃，哎！？雙鐵哥哥！？」" 

# 【凪】
# display as 凪
# JP: 「なにしとるばい！？」
1979 = "「你這是！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「感謝をしている。ふかみと、凪と、クマ川くだり――\nそしてそこからつながった、たくさんのご縁とお力とに」
2334 = "「對於深美、凪、隈河漂流的諸位——以及從中結下的無數緣分與助力，也請讓我在此深表感激」" 

# 【ふかみ】
# display as 深美
# JP: 「けどっ！？　あのっ――そのっ」
2076 = "「可是！？這個——我們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「工場誘致撤回も、鉄道の復活も、経済復興も。\n僕たちだけでもやはり、どれひとつとて叶わなかった」
1912 = "「不管取消引進工廠，還是重啟鐵路事業以及復興經濟。也絕非單憑我們一己之力能夠實現的」" 

# 【ふかみ】
# display as 深美
# JP: 「あ――」
2150 = "「啊——」" 

# monologue
# JP: こくん。――小さくだけれど、ふかみが頷く。\n凪はえっへん！　と胸を大きくそりかえらせる。
3316 = "深美微微——而肯定地點了點頭，而凪則是一臉驕傲地挺起胸膛。" 

# 【凪】
# display as 凪
# JP: 「そりゃそうばい！　凪さまもふかみちゃんも！\n頑張りまくって役にたったけんね！！」
2814 = "「那當然嘞！不管本小姐還是小深！可都是全力以赴做出了貢獻的！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2193 = "「嗯」" 

# monologue
# JP: 上手く運ぶ物事、というのは、\nきっとそうしたものなのだろう。
3383 = "若想順利完成一件事，想必就是需要這樣的過程。" 

# monologue
# JP: 自分に無理なくできることを、懸命に頑張る。\nそれが空回りすることなく、一つの方向に合わさっていく。
3145 = "在自己力所能及的範圍裡全力以赴，再讓所有人的付出共同作用在正確的方向上，不產生任何無用之功。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……御一夜を助けたいという願いは、\n御一夜を愛する全員に、間違いなく共通したものだった」
1384 = "「……想要拯救御一夜，這毫無疑問是所有深愛御一夜的人們共同的願望」" 

# monologue
# JP: それは例えば、宝生親子ら、\nエアクラ誘致推進派だった人たちにおいても、変わらない。
3126 = "即使換成寶生父女，以及曾經支持引進空凝機工廠的人們，也無一例外。" 

# monologue
# JP: であったがゆえ、僕らはこうして今もなお、\n同じ方向に――力を束ね続けていられる。
3035 = "也正因為心願相同，我們如今才能朝共同的方向——齊心協力並肩奮鬥。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまり結局、全員にとって“お互い様”だったわけだが。\nそれだけに――あらためて礼を言えて、よかったと思う」
1935 = "「也就是到頭來，這理應歸功於我們所有人，但是正因為如此——我也慶幸能有這個機會向大家正式表達感謝」" 

# 【ふかみ】
# display as 深美
# JP: 「そんなふうにいってもらえて――わたし、わたしも！\n思い切ってお礼を伝えて、とってもよかった、です！」
2846 = "「雙鐵哥哥都能這麼想——我、我也是的！這次能夠盡情傾訴內心的感激之情，真的太好了！嗯」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あのね！　ソーテツ」
2123 = "「哎呀，雙鐵！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2227 = "「嗯？」" 

# monologue
# JP: オリヴィが何かをいいたげだ。\nが――視線を返せば、珍しく口ごもってしまう。
3198 = "奧莉薇似乎有話想說，可是我一看過去，她卻不作聲了，著實反常。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いったいどうした？」
1970 = "「你怎麼了？」" 

# 【ハチロク】
# display as 八六
# JP: 「聞かせてください。オリヴィちゃん」
2295 = "「奧莉薇，說給我們聽聽吧」" 

# monologue
# JP: ハチロクの声。\nハチロクらしい思慮深さと、他者への敬意とを感じる声だ。
3062 = "八六如是說道。聲音飽含著體貼與敬意，著實符合她的性格。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、オリヴィちゃんのおっしゃることを、\n聞かせて欲しいと願っております」
2063 = "「只要出自奧莉薇之口，我都願意洗耳恭聽」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。というか、ここで『やっぱりいい』などと\n言われては、気になって保線講習に身が入らなくなる」
2428 = "「我也想聽，反倒是如果你突然不想說了，還會讓我沒辦法專心聽講」" 

# 【ふかみ】
# display as 深美
# JP: 「わたし、わたしも聞きたい！　です」
2773 = "「還有我，我也想聽奧莉薇說說！ 嗯」" 

# 【凪】
# display as 凪
# JP: 「凪さまも気になるばい。\nもったいぶらんと、早く聞かせてほしかとばーい！」
2524 = "「本小姐也想聽你講講。別賣關子啦，速速道來！」" 

# 【堰】
# display as 堰
# JP: 「じゃのお」
2194 = "「嗯嗯」" 

# monologue
# JP: ハチロクの一声が呼び水となる。
3068 = "八六的一句話可謂是一石激起千層浪。" 

# monologue
# JP: もごもごしていたオリヴィの口はにっこり笑顔に結ばれて、\nそうして、元気に開かれる。
3130 = "原本支支吾吾的奧莉薇轉眼露出笑容，再精神抖擻地開口說道。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あのね！　オリヴィ。オリヴィ、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だから、\nダイヒョーとかできる立場じゃないけど」
2803 = "「那奧莉薇說了！雖然奧莉薇身為\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，不能代表大家的意見，可是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ではないけれど？」
2068 = "「可是什麼？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「きっとね！　みかん鉄道のみんなも、センダイの\nひとたちも。絶対、ありがとーっていいたいって思うの」
2292 = "「奧莉薇覺得！不管是橙鐵路還是川內的人們，也一定都是懷著感謝之情的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう――とは、僕らにか？」
2411 = "「感謝——是對我們？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
2195 = "「嗯！」" 

# 【ハチロク】
# display as 八六
# JP: 「[せんだい,1]千内の方々やみかん鉄道のみなさまは、エアクラ工場を\n歓迎されている――という意味でございましょうか？」
1976 = "「你的意思是說，川內和橙鐵路的人們，因為空凝機工廠落戶在那邊而感謝我們嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ！　だって、　オリヴィが話をきいたハンイでは、\nみんなすっごくよろこんでた！　オヒトヨのおかげって」
2328 = "「對呀！畢竟以奧莉薇所知，大家可都非常高興的！都說是御一夜的功勞！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2233 = "「噢噢」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「センダイは、川とか舟とかでカンコーしてないから！\nそれに、コージョーユーチでレールもまたつながったし」
2613 = "「畢竟川內那邊沒有船舶漂流觀光之類的項目！而且為了引進工廠，線路也得以重新連通」" 

# 【ふかみ】
# display as 深美
# JP: 「あー……ですよね。きっと、川下りしてなかったら、\nわたしも稀咲さんの案に賛成してたかもしれないし」
2155 = "「啊……說來也是，如果不是家裡在經營漂流，我原來可能就支持稀咲小姐的方案了」" 

# 【凪】
# display as 凪
# JP: 「エアクラ工場そのものが悪物ってわけじゃなかけんね、\n御一夜とあわんかったってだけで」
2651 = "「空凝機工廠自身沒有過錯，只是不適合咱們御一夜」" 

# monologue
# JP: 凪とふかみが、しみじみ頷く。\nこれもまた、“上手く運んだ”ことなのだろう。
3099 = "凪和深美點了點頭，看起來感慨頗深。這可能也屬於一種“焉知非福”。" 

# monologue
# JP: 御一夜にはマッチしなかった一つの要素が、\nけれども千内においては、機能し、地域に貢献している。
3358 = "空凝機這個並不適合御一夜的技術，卻能在川內大顯身手，為當地做出貢獻。" 

# 【凪】
# display as 凪
# JP: 「エアクラ社、あのころはうちもふかみちゃんも、\n悪のゴンゲ！　みたいに思いこんどったもんね」
2514 = "「最開始咱和小深，也都把空凝科技公司認作萬惡之源呢」" 

# 【ふかみ】
# display as 深美
# JP: 「だっだよねー、けど、お話ししてみたら、エアクラ社の\n[うらかみ,1]浦上さんもすごくいいひと――って、あ！　こないだっ」
1959 = "「以前是這樣呀，可是認識了那裡的浦上小姐就知道，她也是非常溫柔善良的人——啊，對了！上一次」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃんも見たばい！？」
2344 = "「小深你也見過了！？」" 

# monologue
# JP: 凪とふかみが眼と眼を見交わす。\nふたりの頬が、パっとバラ色に染めあがる。
3095 = "凪和小深交換了一下眼神，二人的臉頰上瞬間飄起了紅雲。" 

# 【凪】
# display as 凪＆深美
# JP: 「わおわおーーーーーっ！」\n「きゃーーーーーーーっ！」
2103 = "「哇哇————！」\\n「呀——————！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
2206 = "「嗯！？」" 

# 【ふかみ】
# display as 深美
# JP: 「あのひと、やっぱりそうだったよね！\n浦上さんだったよね！！　絶対！」
2795 = "「那人果然就是她！絕對是浦上小姐沒錯吧！！」" 

# 【凪】
# display as 凪
# JP: 「にーさんだと思うとったらねーさんだったけん！\nびっくりしたばい！　ってか、そぎゃんこつより！」
2096 = "「咱瞅著像個哥哥，後頭才發現是姐姐嘞！嚇了咱一跳！不對，這些都不是重點」" 

# 【ふかみ】
# display as 深美
# JP: 「赤ちゃん！　赤ちゃんだっこしてた！\n浦上さん、すっごいおかあさんの顔になってた！」
2343 = "「小寶寶！浦上小姐懷裡抱著個小寶寶！那會兒她整個人都是一副母親的表情！」" 

# 【凪】
# display as 凪
# JP: 「稀咲ねーちゃんと一緒になって歩いとらんかったら、\n浦上さんってわからんかったと！　まるきり別人ばい！」
2684 = "「要不是跟稀咲姐在一起走，咱可都認不出她是浦上小姐了！簡直就跟換了個人一樣！」" 

# 【ふかみ】
# display as 深美
# JP: 「おかあさんになるってすごいんだねー、素敵！　\n赤ちゃん、ああん！　わたし、さわってみたかった！」
2594 = "「為人父母真的能給人帶來那麼大的轉變呀，真好！小寶寶，啊啊！我也好想去摸一摸！」" 

# 【凪】
# display as 凪
# JP: 「凪さまもさわってみたかったばってん！\nあぎゃんふにゃふにゃ、こわしちゃいそーばい！」
2523 = "「本小姐也想摸嘞！皮膚軟乎乎兒的，感覺吹彈可破！」" 

# monologue
# JP: （なんと、ふかみと凪もなのか）
3453 = "（想不到深美和凪也是一樣）" 

# monologue
# JP: 赤ちゃんは確かに極めてかわいく、\nお母さんは実に偉大なものとは僕も思うが――
3340 = "的確我也覺得小寶寶的確是可愛到無以復加，而母親也是極其偉大的存在——" 

# monologue
# JP: （ハチロクの――すずの、母になることへのあこがれは、\n子を作れないゆえ……というだけの理由でもないのか）
3449 = "（八六——鈴之所以嚮往成為母親，其中原因不只有因為自己無法生兒育女嗎……）" 

# 【ハチロク】
# display as 八六
# JP: 「平気ですよ？　凪。赤ちゃんは、やわらかいけれど、\nこわれたりくずれたりする[もろ]脆い存在ではございません」
1910 = "「不用擔心的，凪。小寶寶雖然身體柔軟，但可沒有那麼脆弱，不至於碰一碰摸一摸就會出問題」" 

# 【凪】
# display as 凪
# JP: 「って！？　ハチロク、赤ちゃんさわったとばい！？」
2179 = "「啊！？八六你碰過小寶寶咧！？」" 

# 【ふかみ】
# display as 深美
# JP: 「いつ、どこで、誰の赤ちゃんっ！？」
1953 = "「什麼時候，在哪裡，又碰得誰的小寶寶！？」" 

# monologue
# JP: 先輩風をびゅうびゅう吹かすハチロクにまで、\nふかみと凪は羨望と感心の視線を向ける。
3333 = "現在凪和深美，甚至將羨慕和佩服的目光投向了擺出前輩架子的八六。" 

# 【ハチロク】
# display as 八六
# JP: 「うふふ、それは――\nまぁ！」
2229 = "「嘻嘻，要說這個——哇！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、来た！」
2182 = "「啊，來了！」" 

# 【凪】
# display as 凪
# JP: 「赤ちゃんきたとばい！？」
2342 = "「小寶寶來了！？」" 

# 【ふかみ】
# display as 深美
# JP: 「え？　うそ！　だっこしたい！」
2191 = "「啊？真的！我想抱一抱！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2227 = "「嗯？」" 

# monologue
# JP: ハチロクとオリヴィが視線を動かす\nその方向を振り向き見れば――
3059 = "八六和奧莉薇看向了另一個方向，我也扭頭跟著看了過去——" 

# 【赤井】
# display as 赤井
# JP: 「いやいや、みなさんお早いですね。\nさすがは鉄道業界の方々だ」
2119 = "「哎呀，各位可來得真早，干鐵路這行的人就是守時呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司――\nいや、赤井元\x%l運転士;#00ffc040;運転士%l;#;。来てくださったのですね」
2712 = "「赤井宮司——不對，應該叫赤井前\\x%l運転士;#00ffc040;駕駛員%l;#;，您也來了呀」" 

# 【赤井】
# display as 赤井
# JP: 「最新の保線技術の講習ということですので――\n単なる好奇心で恐縮ですが」
2619 = "「畢竟聽說是有關最新巡線技術的講座——我這純屬好奇心使然，不好意思」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お運びいただけ、本当に嬉しく思います。\nありがとうございます」
2405 = "「您能來捧場，我真心感到高興。謝謝您」" 

# 【凪】
# display as 凪
# JP: 「わ！　赤井宮司、赤ちゃんばだっこ――うわわっ！？」
2108 = "「哇！赤井宮司怎麼還抱著個小寶寶——嗚哇哇！？」" 

# 【ふかみ】
# display as 深美
# JP: 「包帯！？　え？　やだ、どうしたの、たいへんっ」
2654 = "「繃帶！？啊？她這是怎麼回事，這麼嚴重」" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ？　凪、ふかみ。あのこはニイロク――\n赤井宮司が試験運転されていた列車の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です」
1907 = "「不是的，凪和深美都聽我說，這孩子名叫二六——是赤井宮司曾經負責試車的列車的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# 【ふかみ】
# display as 深美
# JP: 「レイル」
2833 = "「鐵路」" 

# 【凪】
# display as 凪
# JP: 「ロオド」
1951 = "「人偶」" 

# monologue
# JP: ……ハチロクが凪とふかみに事情説明をしてくれる。
1309 = "……八六向凪和深美解釋了一下。" 

# monologue
# JP: 間の悪さのせいとはいえど、凪とふかみに赤ちゃん扱いを\nされてしまって、ニイロクが気を悪くしないといいのだが。
3137 = "只能說太不湊巧，二六被凪和深美當成了小孩子，但願她的心情不會受到影響。" 

# 【ニイロク】
# display as 二六
# JP: 「…………」
1355 = "「……」" 

# monologue
# JP: ……見れば見るほど包帯だ。\nゆえ、表情が伺えん。どんな機嫌かまったくわからん。
1301 = "……仔細一看她這繃帶裹得還真是嚴實，所以完全看不出她臉上是什麼表情，也不知心境如何。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ニイロク！　きてくれたんだね！　ありがとー！」
1943 = "「二六！你都特地過來了呀！謝謝！」" 

# 【ニイロク】
# display as 二六
# JP: 「自分は。来てない。来たのは、清春。\n自分は、ただ、その付添い」
1903 = "「不是我要來。是清春，要過來。我只是陪他一起」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ツキソイでも！　いてくれるんならお話できるし！\nオリヴィ、知ってることぜーんぶ教えてあげるからね！」
2367 = "「就算是陪人來也好！來了就能好好聊一聊啦！奧莉薇會把自己會的全部教給你」" 

# 【ニイロク】
# display as 二六
# JP: 「……必要。ない」
1385 = "「……我不，需要」" 

# monologue
# JP: ボソリとニイロクはつぶやいて、\n頭全部を凪とふかみとの方へと向ける。
3037 = "二六冷冷說罷，再將整個腦袋扭向凪和深美。" 

# 【ニイロク】
# display as 二六
# JP: 「あのふたり。何で、来ている？」
2297 = "「她們倆，為什麼也來了？」" 

# 【凪】
# display as 凪
# JP: 「凪さまたちのことばい？」
1974 = "「你是說本小姐和小深？」" 

# monologue
# JP: 丁度説明が終ったのだろうか。\nニイロクの小声を、凪はきっちり聞きつける。
3344 = "看來是八六剛剛解釋清楚，凪正好把注意力轉到這邊，就把二六小聲說的話聽得一清二楚。" 

# 【凪】
# display as 凪
# JP: 「凪さま、オリヴィと組むかもしれんけんね！\n一緒の時間をできるだけ過ごすことは、大事ばい！」
2255 = "「因為本小姐或許會和奧莉薇搭檔駕駛！所以要儘可能在一起相處」" 

# 【ふかみ】
# display as 深美
# JP: 「わたしは。\x%l車掌;#00ffc040;車掌%l;#;さんになりたいです。から――。\n\x%l保線;#00ffc040;保線%l;#;の知識も、とっても大事になるって思って」
2448 = "「我是因為想當\\x%l車掌;#00ffc040;列車長%l;#;，所以，感覺掌握\\x%l保線;#00ffc040;巡線%l;#;的知識對自己來說很重要」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「フカミ！　いまいーこといったよ！」
2590 = "「深美！這話你可是說得很對！」" 

# 【ふかみ】
# display as 深美
# JP: 「え？！　わ、わたしっ？」
2136 = "「哎？！我、我說得對？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　\x%l車掌;#00ffc040;車掌%l;#;は線路支障あったら列車とめなきゃだし、\n止めたら何がおかしいのか、自分で見なきゃなんだから」
2196 = "「嗯！一旦線路出現情況，\\x%l車掌;#00ffc040;列車長%l;#;就必須要讓列車停下，而且還得在停車後自己去發現問題」" 

# 【ふかみ】
# display as 深美
# JP: 「あ」
2157 = "「啊」" 

# monologue
# JP: ふかみがこっくり、大きく頷く。\nそれを見て、オリヴィの笑顔はいっそう鮮やかに花開く。
3318 = "深美恍然大悟般地用力點了點頭，奧莉薇見狀，笑容更添幾分燦爛。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;も、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だってそう！　報告が正確なら、\n悪いとこトクテーするのも復旧も早くなるんだから！」
2757 = "「這對\\x%l機関士;#00ffc040;司機%l;#;和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;也是一個道理！只要上報的情況準確無誤，就能更快找出問題並且解決！」" 

# 【ニイロク】
# display as 二六
# JP: 「ん……」
2192 = "「嗯……？」" 

# monologue
# JP: “そうなの？”と言っているのか、ニイロクの首が傾ぐ。\n赤井宮司は、ゆっくりニイロクにうなずき返す。
3040 = "二六歪起腦袋，就好像在問“是這樣嗎？”，而赤井宮司則向她緩緩點了點頭。" 

# monologue
# JP: ……うすうす感じてはいたが、オリヴィは教官として、\n極めて高い適正を有しているようだ。
1323 = "……雖然我在冥冥之中早有這種認識，但現在看來，奧莉薇的確具備成為優秀老師的資質。" 

# 【赤井】
# display as 赤井
# JP: 「ご指導、大変に楽しみです。\nオリヴィ教官、どうぞよろしくおねがいいたします」
2699 = "「請多多關照，奧莉薇老師，煩請不吝賜教」" 

# monologue
# JP: 赤井宮司が頭を下げる。\nと、ニイロク――ハチロク、凪ふかみ――っと！　
3410 = "赤井宮司低頭向奧莉薇行禮。同時還有二六——八六、凪和深美——啊！" 

# monologue
# JP: 堰さんたちと同時に僕も頭をさげれば、\nオリヴィは実にうれしげな、照れくさそうな声を出す。
3248 = "我也急忙跟著堰先生他們一起行禮，奧莉薇見狀，發出的聲音也顯得半是高興，半是羞澀。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　がんばる！　オリヴィのしってること、\nぜんぶ、ぜぇんぶ教えてあげるっ！」
2202 = "「嗯！奧莉薇會努力的！會把自己知道的一切都教給大家！」" 

# monologue
# JP: そうしてとんっ！
3430 = "隨後只聽“咚”的一聲！" 

# monologue
# JP: 跳ねるような――というか、飛び跳ねた一歩を踏み出して、\n僕らへ振り向き、右手をかかげる。
3235 = "彷彿一躍而起——應該說奧莉薇就是跳躍般地邁出一步，再轉身看向我們，舉起自己的右手。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィせんせーの保線教室！\nはじまりはじまりーっ！」
2290 = "「奧莉薇老師的巡線課堂！現在宣布開講！」" 

# monologue
# JP: 歩く、歩く。
3236 = "往前走，再往前走。" 

# monologue
# JP: \x%l保線;#00ffc040;保線%l;#;の基本は歩くことゆえ、\nレールを見ながらともかく歩く。
3291 = "正因為走一遍是\\x%l保線;#00ffc040;巡線%l;#;的基礎，我們要做的只有一邊觀察鐵軌一邊不斷往前走。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ん、最初はこの辺かなー」
2226 = "「嗯，首先是這一片吧」" 

# 【流】
# display as 流
# JP: 「ほー」
2231 = "「噢」" 

# monologue
# JP: 堰さん――いや、流さんだ。\nが、感心したような声をだす。
3167 = "堰先生——不對，是流先生，他的聲音顯得非常欽佩。" 

# monologue
# JP: その理由なら僕にもわかる。\nここは保線支障――[ふんでい,1]噴泥を頻発してしまう場所だから。
3074 = "其中緣由我也理解，這裡是巡線中的常見問題——翻漿頻發的地段。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。\nなんでここか、わかってる顔の人たちはこっち！」
2221 = "「嗯，知道為什麼選擇這個地方的人到這邊來！」" 

# monologue
# JP: 堰さん、流さん、治さん。\nそれにハチロクと僕とが一箇所にまとめられる。
3168 = "堰先生、流先生和治先生，再加上我和八六都站到了一起。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「このグループは、オヒトヨ鉄道ユノイ線の\n保線知識があるグループでしょ？　だから、Bグループ」
2828 = "「那麼這一組就是對御一夜鐵路湯醫線的巡線有經驗心得的人沒錯吧？就叫Ｂ組」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2231 = "「噢」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、他のコたちがＡグループ！　そしたらね？\nグループたいこー！　\x%l保線;#00ffc040;保線%l;#;クイズのはじまりだよー！」
1996 = "「其他人就分在Ａ組！然後我們玩一個團隊競猜遊戲！是有關\\x%l保線;#00ffc040;巡線%l;#;知識的問題！」" 

# 【凪】
# display as 凪
# JP: 「\x%l保線;#00ffc040;保線%l;#;クイズ！\nわおわお、楽しみばい！　負けんばい！」
1339 = "「\\x%l保線;#00ffc040;巡線%l;#;競猜！哇耶，感覺很好玩！咱可不會落後的！」" 

# 【ふかみ】
# display as 深美
# JP: 「えええっ、\n経験者さんたちに勝てる気ぜんぜんしないんだけど――」
2131 = "「哎哎，跟內行競猜感覺沒有半點勝算呀——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そこはダイジョブ！　考えてあるよ～」
2755 = "「這個問題不用擔心！奧莉薇自有辦法～」" 

# monologue
# JP: オリヴィがえへん！　胸を張る。
3201 = "奧莉薇得意洋洋地挺起胸膛。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「最初のカイトーケンはAグループ！　そっちが誰も\n答えられなかったらBグループが答えてオッケ！　ね？」
2835 = "「開始先由Ａ組回答！如果Ａ組沒有人答對，才能交給Ｂ組！這樣好不好？」" 

# 【赤井】
# display as 赤井
# JP: 「なるほど。それならＡグループも回答しやすい。\n了解しました」
2764 = "「這樣安排啊，這樣的確Ａ組更好回答，學生明白」" 

# monologue
