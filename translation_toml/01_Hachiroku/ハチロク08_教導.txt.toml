1938 = "「Không đợi đến kỳ thay thế sao—— Việc 3 thanh \\x%l枕木;#00ffc040;tà vẹt%l;#; liên tiếp bị hỏng nguy hiểm đến vậy à?」"
# 【オリヴィ】
# display as 奥莉薇
