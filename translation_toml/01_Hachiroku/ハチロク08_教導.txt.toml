3206 = "奧莉薇說罷，便從凪的懷中探出頭來，俯瞰整條隈河。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「すごくきれー！\nここはきっと、ユノイ線のゴジマンだね～！」
2635 = "「真美！這裡一定是湯醫線的著名景點～！」" 

# 【ハチロク】
# display as 八六
