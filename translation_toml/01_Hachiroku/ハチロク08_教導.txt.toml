3134 = "只有二六將纏滿繃帶的頭埋在赤井宮司胸口，無法得知她的神情——但只要赤井宮司從容不迫，應該沒有問題。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それじゃ、今日の最後はここ！　\nクマ川第四橋梁！」
2816 = "「那麼今天要考察的最後一個地方是這裡！隈河第四大橋！」" 

