2209 = "「嗯，奧莉薇所言極是」" 

# 【ふかみ】
# display as 深美
# JP: 「8620の通過にあわせて、\n川下り船、この橋の下、くぐらせる。です」
2438 = "「我們還要配合８６２０過橋的時機，讓漂流船同時從橋下穿過，嗯」" 

