# 【流】
# display as 流
# JP: 「ワシらが何年も苦しんどったことを、\nこぎゃんとあっさり」
2410 = "「想不到困擾咱們多年的問題，到您手裡竟不費吹灰之力」" 

# 【治】
# display as 治
# JP: 「他んところも、これからも――\nどうぞ、よろしくおねがいいたします」
2385 = "「希望今後關於其他問題，也勞請老師來指點迷津」" 

# monologue
# JP: 三長老にならって僕も頭をさげる。
3249 = "我也跟三長老一起低頭行禮。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケ！　オリヴィ、がんばっちゃうよー！」
2864 = "「ＯＫ！奧莉薇會加把勁的！」" 

# 【ハチロク】
# display as 八六
