2609 = "「甚是有理，然而我們也年事已高，此番事業也需要後繼有人」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　それすごくいいと思う！\n土木の技術レベルは、セキたち、とっても高いし！」
2203 = "「嗯！奧莉薇覺得這樣非常好！畢竟你們的土木技術確實高超！」" 

# 【堰】
# display as 堰
# JP: 「ほ！　オリヴィ先生にほめてもらえるとは」
2143 = "「哦！承蒙奧莉薇老師誇獎」" 

