2476 = "「Và theo cẩm nang bảo trì đường ray kiểu Đường sắt Hoàng gia đó, 3 dấu X liên tiếp thì cái ở giữa phải thay ngay lập tức! Là vậy đó.」"
# 【双鉄】
# display as 雙鐵
