# 【凪】
# display as 凪
# JP: 「わ！　ほんとばい！\n割れて剥がれたみたいになっとーと！」
2110 = "「哇！還真是！好像是外層龜裂之後剝落下來的！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「橋梁上では\x%l枕木;#00ffc040;枕木%l;#;しか力の逃げ場ないからねー！\n\x%l枕木;#00ffc040;枕木%l;#;ワルくなると、レールも痛みやすくなっちゃう」
2616 = "「畢竟橋樑上就只有\\x%l枕木;#00ffc040;枕木%l;#;受力呀！一旦\\x%l枕木;#00ffc040;枕木%l;#;有了問題，鐵軌也容易跟著受損」" 

# 【ふかみ】
# display as 深美
# JP: 「なんか、痛々しくて、怖いみたい。です」
2631 = "「看著感覺鐵軌好可憐，也有點害怕，嗯」" 

# monologue
# JP: 確かに目立つ。が――
3341 = "的確痕跡是很顯眼，可是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……このシェリングに関しては、\n優先順位は低めで大丈夫か？」
1391 = "「……至於這個魚鱗紋，晚一點再處理不要緊嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「と、思う。オリヴィだったら、この橋梁のユーセン度は、\n真ん中の\x%l枕木;#00ffc040;枕木%l;#;こーかん、可変パッド、レール交換の順」
2421 = "「應該可以，在奧莉薇看來，這座橋的處理優先度應該是：首先更換中間的\\x%l枕木;#00ffc040;枕木%l;#;，其次加裝可調撐墊，再其次更換鐵軌」" 

# 【ふかみ】
# display as 深美
# JP: 「……あの……ええと」
1386 = "「……我想……提問」" 

# monologue
# JP: ふかみがおずおず、手をあげる。
3320 = "深美戰戰兢兢地舉起手來。" 

# monologue
# JP: オリヴィが笑顔で頷き返せば、\n控えめな質問が流れ出てくる。
3212 = "奧莉薇面帶笑容示意她繼續，深美於是拘謹地開口。" 

# 【ふかみ】
# display as 深美
# JP: 「どうして全部、まとめてやっちゃわないん、です？」
2596 = "「為什麼不一次性把問題都處理掉呢？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そこは人間のオシゴトだから。\n保線ブチョーのソーテツに答えてもらうね？」
2756 = "「這可都是人類負責的，所以就由我們的巡線部長雙鐵來回答吧」" 

# monologue
# JP: オリヴィ先生のご指名だ。
3204 = "奧莉薇老師點名要我回答。" 

# monologue
# JP: 先生のようにわかりやすく伝えられるよう、\n慎重になって言葉を選ぶ。
3264 = "我於是也效仿老師的作風，努力組織簡單易懂的措辭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……例えば。レール交換を考えよう。\n交換している間、レールは当然、外されるわけだよな」
1392 = "「……舉例來說，我們來更換鐵軌，既然要更換，我們肯定得把鐵軌先卸下來」" 

# 【ふかみ】
# display as 深美
# JP: 「はい」
# 2193 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまり、レール交換中は、\n当該区間を、全ての列車が走れなくなる」
1940 = "「也就是說，在我們更換鐵軌的時候，任何列車都不能在該路段行駛」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！」
# 2171 = "「啊！」" 

# monologue
# JP: ふかみがぐるり、あたりを見回す。
3324 = "深美環視一圈周圍。" 

# monologue
# JP: 橋梁上。\n当然ながら\x%l待避線;#00ffc040;待避線%l;#;など、存在しない。
3149 = "在這橋上，當然不存在什麼\\x%l待避線;#00ffc040;待避線%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、日常の\x%l保線;#00ffc040;保線%l;#;は、列車の走らない限られた時間内に、\n正確に、ミス無く行わねばならん」
2473 = "「於是我們平時\\x%l保線;#00ffc040;巡線%l;#;就必須趁沒有列車行駛的有限時間內對鐵路進行維護，還要保證根除問題，不出任何差錯」" 

# monologue
# JP: 言えば、ふかみがこっくり頷く。
3325 = "深美聽到我這麼一解釋，理解地點了點頭。" 

# 【ふかみ】
# display as 深美
# JP: 「だから、たくさんをまとめて――は難しくて、\nちょっとずつやるしかない――ですか？」
2464 = "「所以很難一次性處理所有問題，就只好一步步來了——是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。\n無論、それとは別に、予算の問題も関係してくるが」
2546 = "「正是如此，當然除了這個問題，和經費也不無關係」" 

# 【ふかみ】
# display as 深美
# JP: 「予算……お金」
2653 = "「經費……錢」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「\x%l保線;#00ffc040;保線%l;#;は、お金をカセゲないからねー」
2610 = "「畢竟\\x%l保線;#00ffc040;巡線%l;#;可賺不了錢呀」" 

# 【ふかみ】
# display as 深美
# JP: 「え？　それってどういう――」
2135 = "「哎？這話怎麼說——」" 

# 【ハチロク】
# display as 八六
# JP: 「そのことでしたら、わたくしにもご説明できるかと」
2838 = "「關於這方面，我也可以向你解釋」" 

# monologue
# JP: しず、とハチロクが手をあげる。\nオリヴィは、にこにこ笑顔でうなずき返す。
3073 = "八六連忙舉手，奧莉薇笑著同意由她來解釋。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l保線;#00ffc040;保線%l;#;が良くなれば乗り心地も安全性も向上する。\nしかし、それは集客にはつながりません」
2304 = "「如果\\x%l保線;#00ffc040;巡線%l;#;質量達標，也能提高乘客的舒適感和安全度，但是並不能直接對招攬客人起到正面影響」" 

# monologue
# JP: ごく端的な説明だ。
3222 = "她這番解釋的確是切中要點。" 

# monologue
# JP: 必要十分であるともいえるが、\nふかみはいまだ、微妙な表情。
3431 = "雖然已經足夠充分，但深美依然面露難色。" 

# 【ふかみ】
# display as 深美
# JP: 「そう……なの？」
2483 = "「是……這樣嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「では、考えてみてください。ふかみが観光に来たとして、\n次のどちらの路線の列車に乗車してみたいかを」
2817 = "「那麼你設想一下，如果是你前來觀光，以下兩種線路你會選擇哪一邊」" 

# 【ふかみ】
# display as 深美
# JP: 「うん」
# 2193 = "「嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l保線;#00ffc040;保線%l;#;の状態が素晴らしく、平凡な列車が走る路線と、\n\x%l保線;#00ffc040;保線%l;#;の状態はいまひとつながら、素敵な列車が走る」
1895 = "「一邊是\\x%l保線;#00ffc040;巡線%l;#;質量上佳，但是列車品相一般，另一邊是\\x%l保線;#00ffc040;巡線%l;#;品質難以令人滿意，但是列車很吸引人」" 

# 【ふかみ】
# display as 深美
# JP: 「あああ！　そっか！　うん、わたし、わかった！　です。\n『\x%l保線;#00ffc040;保線%l;#;はお金を稼げない』」
2238 = "「噢噢！是呀！對，我理解了！嗯。“\\x%l保線;#00ffc040;巡線%l;#;是賺不到錢的”」" 

# monologue
# JP: ――ふかみは、経営者だ。ここまでで理解できよう。
1284 = "——深美也是做生意的人，說到這一層她就明白了。" 

# monologue
# JP: が、いまだ微妙な顔をしている凪のため、\nもう少しだけ、あえての言葉を足してみる。
3142 = "可是看凪依舊是一頭霧水，為了讓她理解還是說得再細一點吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道において、安全は当然に確保されねばならん要素だ。\nゆえ、そこはどうやっても売りにならん」
2371 = "「就鐵路事業而言，安全這一要素當然是必須有保證的，所以無論如何也不能拿利益與之衡量」" 

# 【ふかみ】
# display as 深美
# JP: 「乗り心地もそうですよね。悪ければ文句はでるけど、\nいいからって、わざわざ乗りにきたりはしない」
2273 = "「坐車的舒適感也是同理，雖然不舒服會讓乘客產生怨言，但也不會有人特地衝著舒服來坐」" 

# 【凪】
# display as 凪
# JP: 「やけん……\x%l保線;#00ffc040;保線%l;#;じゃお金ばかせげんけん――\nどっか別で、お金かせがんといけんってことばい？」
2455 = "「所以……既然\\x%l保線;#00ffc040;巡線%l;#;賺不了錢——就只能靠別的方面賺錢貼補唄？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Just right！　そこがうまくまわらなくなると、\n鉄道会社はおしまいになっちゃうんだよ？」
2860 = "「Ｊｕｓｔ　ｒｉｇｈｔ！要是無法合理安排支出，這鐵路公司也開不下去呀」" 

# 【ふかみ】
# display as 深美
# JP: 「\x%l保線;#00ffc040;保線%l;#;にお金をかけすぎて……魅力ある列車を走らせたり\nできなくなると――誰も、乗らなくなっちゃうから」
2303 = "「如果\\x%l保線;#00ffc040;巡線%l;#;的開銷過大……導致沒有錢展現列車的魅力——那就沒有人願意來坐我們的列車了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「最高の\x%l保線;#00ffc040;保線%l;#;状態を常に維持したいのはやまやまだが、\nそうするためには、無限のコストがかかってしまう」
2841 = "「雖然我們也很想時刻保持上佳的\\x%l保線;#00ffc040;巡線%l;#;質量，但是真要這樣做，在金錢上可就是個無底洞了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、３連のＸマークのマンナカだけ変えるみたいに、\n安全を守ることだけをサイユーセンで、やるしかないの」
2462 = "「所以就像剛才三條枕木畫叉卻只更換中間那條一樣，我們只能優先確保安全不會出問題」" 

# 【凪】
# display as 凪
# JP: 「凪さま、ばっちりわかったばい！」
2751 = "「這下本小姐徹底明白嘞！」" 

# monologue
# JP: ようやく凪が凪らしく、全開の笑顔で、大声を出す。
3106 = "凪總算回到平時的狀態，滿面笑容大聲喊道。" 

# 【凪】
# display as 凪
# JP: 「そぎゃんして安全ば守りながら、節約して作ったお金で、\n素敵な列車ば走らせて、お金ば稼ぐ！！」
2360 = "「就是要這樣在確保安全的同時，省吃儉用留出錢來，花在列車上面，再拿列車吸引乘客賺錢！！」" 

# 【ハチロク】
# display as 八六
# JP: 「理想的です。そうしてお金を稼げるようになりましたら、\n\x%l保線;#00ffc040;保線%l;#;の質もあげられるようになり、好循環が生まれます」
2759 = "「這是最理想的情況，這樣一來取得的利益也可以用於提高\\x%l保線;#00ffc040;巡線%l;#;質量，形成良性循環」" 

# 【凪】
# display as 凪
# JP: 「したら、御一夜鉄道はこーじゅんかん！\nできとるばいね！　やけん、線路ものびたとばい！！」
2826 = "「那麼御一夜鐵路已經算是個良性循環嘞！所以才能延長線路！！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だね、けど、オリヴィの目から見てみると、\nもーちょっと\x%l保線;#00ffc040;保線%l;#;にお金かけた方がよさそうってこと！」
2495 = "「是呀，不過在奧莉薇看來，還是在\\x%l保線;#00ffc040;巡線%l;#;上多花點錢比較好！」" 

# 【ふかみ】
# display as 深美
# JP: 「はぁーーー」
# 2150 = "「啊——」" 

# monologue
# JP: ふかみが長い、感心しきりのため息を吐く。
3326 = "深美長吁一口氣，看起來感慨頗深。" 

# 【ふかみ】
# display as 深美
# JP: 「すごい、ですね。鉄道の経営って。クマ川くだりより、\n要素めちゃくちゃ多くて……ずっと複雑で難しい」
2633 = "「真厲害呀，經營鐵路比經營漂流要考量的因素多太多了……要複雜得多，難度也大」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ！　だから、台帳とかちゃんとつけて、キロクと\nケーケン、リレーしていくことがタイセツになるんだよ」
2351 = "「就是呀！所以必須認真記好手冊，將記錄和經驗傳承下去，這可是很重要的一環」" 

# 【凪】
# display as 凪
# JP: 「記録と、経験」
2692 = "「記錄和經驗」" 

# 【ハチロク】
# display as 八六
# JP: 「ですから、鉄道は『経験工学』と呼ばれるのです」
2469 = "「所以鐵路是一門由經驗鑄就的學問」" 

# monologue
# JP: 凪とふかみは眼と眼を見交わし、\n何度も何度も頷きあってる。
3098 = "凪和深美看向彼此，連連點頭。" 

# monologue
# JP: どうやら若い二人には、感じたことと学べたこととが、\nずいぶん多くあった様子だ。
3345 = "看來這兩位年輕人通過此行，長了眾多感悟與見識。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「フカミはさ、\x%l車掌;#00ffc040;車掌%l;#;になりたいんでしょ？」
2695 = "「說來深美，你不是想當\\x%l車掌;#00ffc040;列車長%l;#;嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「は、はい。です。なりたい、です。すごく。\nオリヴィちゃんのお話きいて、前より、もっと」
2485 = "「是、是的。嗯，我想成為列車長，嗯。剛才聽你講了這麼多，我更想當了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ならさ。もしも\x%l車掌;#00ffc040;車掌%l;#;になったら。フカミも――\n鉄道っていうレールの一部になるってことだから」
2821 = "「那麼如果你將來真當了\\x%l車掌;#00ffc040;列車長%l;#;，那麼你也算是——成為了鐵路這條鐵軌的一部分啦」" 

# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2157 = "「啊」" 

# monologue
# JP: ごく無造作に歩み寄り、\nオリヴィがふかみに手を差し伸べる。
3208 = "奧莉薇邁著輕快的步子靠近深美，朝她伸出了手。" 

# monologue
# JP: ふかみが静かにかがみこめば、\nいいこ、いいこと、軽くその髪が撫ぜられる。
3312 = "深美安靜地蹲了下來，於是奧莉薇開始輕輕撫摸她的頭髮。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィがムナカタを見て覚えたこと、フカミが\n覚えて――きっと誰かに伝えてくれたら、うれしいな！」
2752 = "「這些都是奧莉薇跟著宗方學會的，希望你也能學會——再傳授給其他人！」" 

# 【ふかみ】
# display as 深美
# JP: 「うん！　わたし！\nぜったい、ぜったいそうする、です！」
2205 = "「嗯！我一定！一定會照做的！嗯！」" 

# 【凪】
# display as 凪
# JP: 「凪さまもばい！！」
2525 = "「本小姐也是嘞！！」" 

# 【堰】
# display as 堰
# JP: 「双鉄！\nあと十五分で[レイナナ,4]キハ07sば来よるぞー！」
2849 = "「雙鐵！再過１５分鐘Ｋｉｈａ０７Ｓ就要開過來了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だ、そうだがオリヴィ」
2294 = "「奧莉薇，你也聽到了吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、ちょーどいいし、今日の\x%l保線;#00ffc040;保線%l;#;教室はおしまい！\nみんな、安全にタイヒしよー！」
2507 = "「時候正好，今天的\\x%l保線;#00ffc040;巡線%l;#;課堂就到此為止！大家要注意安全，遠離列車哦！」" 

# 【凪】
# display as 凪
# JP: 「わかったとばーい！」
2300 = "「好嘞！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わぉ！」
2106 = "「哇！」" 

# 【ふかみ】
# display as 深美
# JP: 「あん、待ってよう凪ちゃん」
2187 = "「啊，小凪等一下我啦」" 

# monologue
# JP: 凪がオリヴィを抱えなおして真っ先に橋を下り、\nふかみがその後をおいかける。
3093 = "凪再次抱起奧莉薇一馬當先走下了橋，深美連忙趕了上去。" 

# monologue
# JP: 僕らの後方を警戒していた治さんを見送って――
3256 = "我們先是目送一直瞭望後方的治先生下橋——" 

# 【赤井】
# display as 赤井
# JP: 「双鉄君。お疲れ様でした」
2845 = "「雙鐵先生，辛苦了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司こそお疲れ様です。\n今日は、本当に来てくださってありがとございました」
2404 = "「您才是辛苦了，赤井宮司。我真的非常感激您今天能前來聽講」" 

# monologue
# JP: オリヴィの教室を見守っていた赤井宮司とニイロクと、\n僕らは並んで、一番最後に退避する。
3032 = "之前一直在觀察奧莉薇講課的赤井宮司和二六跟我們一起，於最後下橋遠離列車。" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司たちには、ご退屈だったのではないかと、\nそこがいささか心配ですが」
2454 = "「我還有些擔心，此次講座或許會讓你們感到無趣」" 

# 【赤井】
# display as 赤井
# JP: 「退屈などととんでもない。可変パッドには心底\n感心しましたし――それに、ニイロクも」
2698 = "「談何無趣，可調撐墊可真是令我大開眼界——對二六而言也是一樣」" 

# monologue
# JP: 何かを促しているように、\n赤井宮司が、腕の中のニイロクを軽くゆする。
3043 = "他輕輕搖了搖懷中的二六，就像在催促她開口。" 

# monologue
# JP: が、ニイロクは、赤井宮司の胸板に、\n包帯をくっつけたまま――動かない。
3140 = "可是二六卻將頭緊貼著他的胸膛，一動也不動。" 

# 【ニイロク】
# display as 二六
# JP: 「いまは。まだいい。確証がもてない。\nそれに。自分も。整頓しきれていない」
2605 = "「現在，就先不說了，我還無法肯定。而且，我自己，也還沒有理清楚頭緒」" 

# 【赤井】
# display as 赤井
# JP: 「そうですか」
2763 = "「這樣啊」" 

# 【ニイロク】
# display as 二六
# JP: 「でも」
1918 = "「不過」" 

# monologue
# JP: 包帯の顔がぐりんと動く。
3219 = "她纏滿繃帶的臉面向我這邊。" 

# monologue
# JP: その下に隠された目が――\nおそらく僕を、はじめて、まっすぐ、見てくれる。
3244 = "想必她隱藏在繃帶之下的雙目，正目不轉睛地凝視著我。" 

# 【ニイロク】
# display as 二六
# JP: 「とても。気になることがある。だから。呼んで欲しい。\n次にもし。こういう機会があるなら。そのときも」
2518 = "「有件事，我非常在意。所以，如果下次還有類似的活動，希望還能再邀請我們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それならば、添乗に来て欲しい」
2479 = "「既然如此，我希望二位可以陪同我們執行乘務任務」" 

# monologue
# JP: ゆえ、僕の言葉もまっすぐに出る。\nオリヴィにとって、Ⅸ号にとって。
3280 = "於是，我也毫不猶豫地道出自己的心聲。這是我現在最真切的想法。" 

# monologue
# JP: そしておそらく、ニイロクにとっても、やはり。\nそれが最善の路となろうと、素直に思える。
3027 = "不管對於奧莉薇還是九號，甚至於二六而言，這應該是最正確的做法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「間もなく迎える、Ⅸ号機関車の湯医線営業運転に向け、\n一度でも多く――どうか、添乗に来て欲しい」
2382 = "「希望二位能在百忙之中，儘可能抽出時間，陪同指導九號機車即將開展的湯醫線商業運營」" 
