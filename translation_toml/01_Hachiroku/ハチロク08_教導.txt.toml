2549 = "「Mỗi lần kiểm tra bảo trì đường ray là sẽ kiểm tra toàn bộ \\x%l枕木;#00ffc040;tà vẹt%l;#; của từng khu vực một!」"
# 【ふかみ】
# display as 深美
