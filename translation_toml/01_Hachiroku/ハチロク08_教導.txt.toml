2519 = "「Rồi, cái nào bị nứt hay gì đó thì đánh dấu \"/\", đến lần kiểm tra năm sau, nếu vết nứt đó lan rộng ra thì sẽ đánh dấu X!」"
# 【双鉄】
# display as 雙鐵
