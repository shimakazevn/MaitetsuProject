2505 = "「Đây! \\x%l枕木;#00ffc040;Tà vẹt%l;#; ở đây, có 3 cái liên tiếp bị đánh dấu X đúng không? Cái ở giữa này, phải thay ngay nếu không sẽ nguy hiểm lắm đó!」"
# 【ふかみ】
# display as 深美
