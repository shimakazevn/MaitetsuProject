# 【流】
# display as 流
# JP: 「あああ！　そぎゃんわけでしたか。\nいや、記録ば、まっこと大切ですのう」
2167 = "「啊啊！原來是這麼一回事。哎呀，記錄可真是至關重要」" 

# 【治】
# display as 治
