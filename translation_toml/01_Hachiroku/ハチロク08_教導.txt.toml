3149 = "Trên cầu. Tất nhiên là không hề tồn tại thứ như \\x%l待避線;#00ffc040;đường tránh tàu%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、日常の\x%l保線;#00ffc040;保線%l;#;は、列車の走らない限られた時間内に、\n正確に、ミス無く行わねばならん」
2473 = "「Vì vậy, việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#; hàng ngày phải được thực hiện chính xác, không sai sót, trong khoảng thời gian giới hạn khi không có tàu chạy.」"
# monologue
# JP: 言えば、ふかみがこっくり頷く。
3325 = "Nghe vậy, Fukami gật đầu đồng tình."
# 【ふかみ】
# display as 深美
# JP: 「だから、たくさんをまとめて――は難しくて、\nちょっとずつやるしかない――ですか？」
2464 = "「Cho nên, gom lại làm một lúc—— là rất khó, chỉ có thể làm từng chút một thôi—— đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ。\n無論、それとは別に、予算の問題も関係してくるが」
2546 = "「Chính xác là vậy. Tất nhiên, ngoài ra còn liên quan đến vấn đề ngân sách nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「予算……お金」
2653 = "「Ngân sách…… Tiền bạc.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「\x%l保線;#00ffc040;保線%l;#;は、お金をカセゲないからねー」
2610 = "「\\x%l保線;#00ffc040;Bảo trì đường ray%l;#; thì không kiếm ra tiền được mà~」"
# 【ふかみ】
# display as 深美
# JP: 「え？　それってどういう――」
2135 = "「Hả? Ý cậu là sao——」"
# 【ハチロク】
# display as 八六
# JP: 「そのことでしたら、わたくしにもご説明できるかと」
2838 = "「Nếu là chuyện đó, tôi nghĩ mình cũng có thể giải thích được ạ.」"
# monologue
# JP: しず、とハチロクが手をあげる。\nオリヴィは、にこにこ笑顔でうなずき返す。
3073 = "Hachiroku khẽ giơ tay lên. Olivy mỉm cười gật đầu đáp lại."
# 【ハチロク】
# display as 八六
# JP: 「\x%l保線;#00ffc040;保線%l;#;が良くなれば乗り心地も安全性も向上する。\nしかし、それは集客にはつながりません」
2304 = "「\\x%l保線;#00ffc040;Bảo trì đường ray%l;#; tốt thì trải nghiệm đi tàu và độ an toàn cũng sẽ tăng lên. Tuy nhiên, điều đó không giúp thu hút thêm khách hàng.」"
# monologue
# JP: ごく端的な説明だ。
3222 = "Một lời giải thích vô cùng súc tích."
# monologue
# JP: 必要十分であるともいえるが、\nふかみはいまだ、微妙な表情。
3431 = "Có thể nói là đã đủ ý, nhưng Fukami vẫn mang vẻ mặt hơi khó hiểu."
# 【ふかみ】
# display as 深美
# JP: 「そう……なの？」
2483 = "「Vậy…… sao?」"
# 【ハチロク】
# display as 八六
# JP: 「では、考えてみてください。ふかみが観光に来たとして、\n次のどちらの路線の列車に乗車してみたいかを」
2817 = "「Vậy, thử nghĩ xem nhé. Giả sử Fukami đi du lịch, cô sẽ muốn đi chuyến tàu trên tuyến đường nào sau đây.」"
# 【ふかみ】
# display as 深美
# JP: 「うん」
# 2193 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「\x%l保線;#00ffc040;保線%l;#;の状態が素晴らしく、平凡な列車が走る路線と、\n\x%l保線;#00ffc040;保線%l;#;の状態はいまひとつながら、素敵な列車が走る」
1895 = "「Tuyến đường có tình trạng \\x%l保線;#00ffc040;bảo trì đường ray%l;#; tuyệt vời nhưng chỉ có những đoàn tàu bình thường chạy qua, hay tuyến đường có tình trạng \\x%l保線;#00ffc040;bảo trì đường ray%l;#; không tốt lắm nhưng lại có những đoàn tàu tuyệt đẹp chạy qua.」"
# 【ふかみ】
# display as 深美
# JP: 「あああ！　そっか！　うん、わたし、わかった！　です。\n『\x%l保線;#00ffc040;保線%l;#;はお金を稼げない』」
2238 = "「A a a! Ra vậy! Ừm, tớ, hiểu rồi! Ạ. 『\\x%l保線;#00ffc040;Bảo trì đường ray%l;#; không kiếm ra tiền được』.」"
# monologue
# JP: ――ふかみは、経営者だ。ここまでで理解できよう。
1284 = "——Fukami là một nhà kinh doanh. Nói đến đây chắc con bé đã hiểu."
# monologue
# JP: が、いまだ微妙な顔をしている凪のため、\nもう少しだけ、あえての言葉を足してみる。
3142 = "Nhưng, vì Nagi vẫn đang có vẻ mặt khó hiểu, nên tôi cố tình nói thêm một chút nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道において、安全は当然に確保されねばならん要素だ。\nゆえ、そこはどうやっても売りにならん」
2371 = "「Trong ngành đường sắt, an toàn là yếu tố đương nhiên phải được đảm bảo. Vì thế, dù thế nào cũng không thể lấy đó làm điểm bán hàng được.」"
# 【ふかみ】
# display as 深美
# JP: 「乗り心地もそうですよね。悪ければ文句はでるけど、\nいいからって、わざわざ乗りにきたりはしない」
2273 = "「Trải nghiệm đi tàu cũng vậy nhỉ. Nếu tệ thì sẽ bị phàn nàn, nhưng không ai cất công đến đi tàu chỉ vì trải nghiệm tốt cả.」"
# 【凪】
# display as 凪
# JP: 「やけん……\x%l保線;#00ffc040;保線%l;#;じゃお金ばかせげんけん――\nどっか別で、お金かせがんといけんってことばい？」
2455 = "「Vậy nên…… \\x%l保線;#00ffc040;Bảo trì đường ray%l;#; không kiếm ra tiền được—— Thì phải kiếm tiền từ chỗ khác, đúng không?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「Just right！　そこがうまくまわらなくなると、\n鉄道会社はおしまいになっちゃうんだよ？」
2860 = "「Just right! Nếu chỗ đó mà không xoay vòng suôn sẻ, thì công ty đường sắt sẽ tiêu tùng luôn đó?」"
# 【ふかみ】
# display as 深美
# JP: 「\x%l保線;#00ffc040;保線%l;#;にお金をかけすぎて……魅力ある列車を走らせたり\nできなくなると――誰も、乗らなくなっちゃうから」
2303 = "「Đổ quá nhiều tiền vào \\x%l保線;#00ffc040;bảo trì đường ray%l;#;…… dẫn đến không thể cho chạy những đoàn tàu hấp dẫn—— thì sẽ chẳng còn ai đi tàu nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「最高の\x%l保線;#00ffc040;保線%l;#;状態を常に維持したいのはやまやまだが、\nそうするためには、無限のコストがかかってしまう」
2841 = "「Tuy rất muốn luôn duy trì tình trạng \\x%l保線;#00ffc040;bảo trì đường ray%l;#; ở mức tốt nhất, nhưng để làm được điều đó thì sẽ tốn chi phí vô hạn.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、３連のＸマークのマンナカだけ変えるみたいに、\n安全を守ることだけをサイユーセンで、やるしかないの」
2462 = "「Vì vậy, giống như việc chỉ thay thanh ở giữa trong 3 dấu X liên tiếp, chúng ta chỉ có thể ưu tiên hàng đầu cho việc bảo vệ sự an toàn thôi.」"
# 【凪】
# display as 凪
# JP: 「凪さま、ばっちりわかったばい！」
2751 = "「Nagi đại nhân, hiểu rõ mồn một rồi nha!」"
# monologue
# JP: ようやく凪が凪らしく、全開の笑顔で、大声を出す。
3106 = "Cuối cùng Nagi cũng trở lại là Nagi, nở nụ cười rạng rỡ hết cỡ và nói lớn."
# 【凪】
# display as 凪
# JP: 「そぎゃんして安全ば守りながら、節約して作ったお金で、\n素敵な列車ば走らせて、お金ば稼ぐ！！」
2360 = "「Cứ như vậy vừa đảm bảo an toàn, vừa tiết kiệm tiền, để cho những đoàn tàu tuyệt đẹp chạy và kiếm tiền!!」"
# 【ハチロク】
# display as 八六
# JP: 「理想的です。そうしてお金を稼げるようになりましたら、\n\x%l保線;#00ffc040;保線%l;#;の質もあげられるようになり、好循環が生まれます」
2759 = "「Rất lý tưởng ạ. Nếu kiếm được tiền như vậy, thì chất lượng \\x%l保線;#00ffc040;bảo trì đường ray%l;#; cũng sẽ được nâng lên, tạo ra một vòng tuần hoàn tốt.」"
# 【凪】
# display as 凪
# JP: 「したら、御一夜鉄道はこーじゅんかん！\nできとるばいね！　やけん、線路ものびたとばい！！」
2826 = "「Thế thì, Đường sắt Ohito đang có vòng tuần hoàn tốt! Đúng không! Vì vậy nên đường ray mới được kéo dài ra!!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だね、けど、オリヴィの目から見てみると、\nもーちょっと\x%l保線;#00ffc040;保線%l;#;にお金かけた方がよさそうってこと！」
2495 = "「Đúng vậy, nhưng mà nhìn từ góc độ của Olivy, thì có vẻ nên đầu tư thêm chút tiền vào \\x%l保線;#00ffc040;bảo trì đường ray%l;#; đó!」"
# 【ふかみ】
# display as 深美
# JP: 「はぁーーー」
# 2150 = "「啊——」" 
# monologue
# JP: ふかみが長い、感心しきりのため息を吐く。
3326 = "Fukami thở dài một hơi thật dài, đầy vẻ thán phục."
# 【ふかみ】
# display as 深美
# JP: 「すごい、ですね。鉄道の経営って。クマ川くだりより、\n要素めちゃくちゃ多くて……ずっと複雑で難しい」
2633 = "「Đỉnh thật đấy. Kinh doanh đường sắt ấy. So với chuyến đi thuyền trên sông Kuma, thì có vô vàn yếu tố…… phức tạp và khó khăn hơn nhiều.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ！　だから、台帳とかちゃんとつけて、キロクと\nケーケン、リレーしていくことがタイセツになるんだよ」
2351 = "「Đúng vậy! Cho nên, việc ghi chép sổ sách đàng hoàng, và tiếp nối những ghi chép, kinh nghiệm, trở nên vô cùng quan trọng đó.」"
# 【凪】
# display as 凪
# JP: 「記録と、経験」
2692 = "「Ghi chép, và kinh nghiệm.」"
# 【ハチロク】
# display as 八六
# JP: 「ですから、鉄道は『経験工学』と呼ばれるのです」
2469 = "「Vì vậy, đường sắt mới được gọi là 『kỹ thuật kinh nghiệm』 ạ.」"
# monologue
# JP: 凪とふかみは眼と眼を見交わし、\n何度も何度も頷きあってる。
3098 = "Nagi và Fukami nhìn nhau, rồi gật đầu với nhau liên tục."
# monologue
# JP: どうやら若い二人には、感じたことと学べたこととが、\nずいぶん多くあった様子だ。
3345 = "Có vẻ như đối với hai cô gái trẻ, những điều cảm nhận và học hỏi được, thực sự rất nhiều."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「フカミはさ、\x%l車掌;#00ffc040;車掌%l;#;になりたいんでしょ？」
2695 = "「Fukami này, cậu muốn trở thành \\x%l車掌;#00ffc040;trưởng tàu%l;#; đúng không?」"
# 【ふかみ】
# display as 深美
# JP: 「は、はい。です。なりたい、です。すごく。\nオリヴィちゃんのお話きいて、前より、もっと」
2485 = "「V-vâng. Ạ. Tớ muốn trở thành, ạ. Rất muốn. Sau khi nghe Olivy nói chuyện, tớ lại càng muốn hơn trước.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ならさ。もしも\x%l車掌;#00ffc040;車掌%l;#;になったら。フカミも――\n鉄道っていうレールの一部になるってことだから」
2821 = "「Vậy thì. Nếu như cậu trở thành \\x%l車掌;#00ffc040;trưởng tàu%l;#;. Fukami cũng sẽ—— trở thành một phần của đường ray mang tên đường sắt đó.」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2157 = "「啊」" 
# monologue
# JP: ごく無造作に歩み寄り、\nオリヴィがふかみに手を差し伸べる。
3208 = "Vô cùng tự nhiên bước tới, Olivy đưa tay về phía Fukami."
# monologue
# JP: ふかみが静かにかがみこめば、\nいいこ、いいこと、軽くその髪が撫ぜられる。
3312 = "Fukami lặng lẽ cúi người xuống, Olivy nhẹ nhàng vuốt tóc cô bé, như đang khen ngợi \"ngoan quá, ngoan quá\"."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィがムナカタを見て覚えたこと、フカミが\n覚えて――きっと誰かに伝えてくれたら、うれしいな！」
2752 = "「Những gì Olivy học được khi quan sát Munakata, Fukami hãy ghi nhớ nhé—— rồi truyền lại cho ai đó, tớ sẽ vui lắm!」"
# 【ふかみ】
# display as 深美
# JP: 「うん！　わたし！\nぜったい、ぜったいそうする、です！」
2205 = "「Ừm! Tớ!\nTuyệt đối, tuyệt đối sẽ làm vậy, ạ!」"
# 【凪】
# display as 凪
# JP: 「凪さまもばい！！」
2525 = "「Nagi đại nhân cũng vậy nha!!」"
# 【堰】
# display as 堰
# JP: 「双鉄！\nあと十五分で[レイナナ,4]キハ07sば来よるぞー！」
2849 = "「Soutetsu!\n15 phút nữa là Kiha 07S đến đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だ、そうだがオリヴィ」
2294 = "「Ông ấy bảo vậy đó, Olivy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、ちょーどいいし、今日の\x%l保線;#00ffc040;保線%l;#;教室はおしまい！\nみんな、安全にタイヒしよー！」
2507 = "「Vậy thì vừa vặn luôn, lớp học \\x%l保線;#00ffc040;bảo trì đường ray%l;#; hôm nay kết thúc! Mọi người, cùng tránh vào nơi an toàn nào~!」"
# 【凪】
# display as 凪
# JP: 「わかったとばーい！」
2300 = "「Đã rõ rồi nha!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わぉ！」
2106 = "「Oa!」"
# 【ふかみ】
# display as 深美
# JP: 「あん、待ってよう凪ちゃん」
2187 = "「A, đợi em với, Nagi-chan……」"
# monologue
# JP: 凪がオリヴィを抱えなおして真っ先に橋を下り、\nふかみがその後をおいかける。
3093 = "Nagi bế lại Olivy rồi đi xuống cầu đầu tiên, Fukami vội vã đuổi theo sau."
# monologue
# JP: 僕らの後方を警戒していた治さんを見送って――
3256 = "Bọn tôi tiễn anh Osamu, người vẫn luôn cảnh giác phía sau chúng tôi——"
# 【赤井】
# display as 赤井
# JP: 「双鉄君。お疲れ様でした」
2845 = "「Cậu Soutetsu. Cậu vất vả rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司こそお疲れ様です。\n今日は、本当に来てくださってありがとございました」
2404 = "「Đền chủ Akai mới vất vả ạ. Thực sự cảm ơn ngài hôm nay đã cất công đến đây.」"
# monologue
# JP: オリヴィの教室を見守っていた赤井宮司とニイロクと、\n僕らは並んで、一番最後に退避する。
3032 = "Đền chủ Akai và Niiroku, những người nãy giờ vẫn quan sát lớp học của Olivy, cùng chúng tôi xếp hàng, lùi lại sau cùng."
# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司たちには、ご退屈だったのではないかと、\nそこがいささか心配ですが」
2454 = "「Tôi chỉ hơi lo là, không biết đền chủ Akai và mọi người có thấy nhàm chán không.」"
# 【赤井】
# display as 赤井
# JP: 「退屈などととんでもない。可変パッドには心底\n感心しましたし――それに、ニイロクも」
2698 = "「Nhàm chán gì chứ, hoàn toàn không đâu. Tôi thực sự rất ấn tượng với đệm lót có thể thay đổi hình dạng đấy——Hơn nữa, cả Niiroku cũng vậy.」"
# monologue
# JP: 何かを促しているように、\n赤井宮司が、腕の中のニイロクを軽くゆする。
3043 = "Như thể đang thúc giục điều gì đó, Đền chủ Akai khẽ lay Niiroku trong vòng tay mình."
# monologue
# JP: が、ニイロクは、赤井宮司の胸板に、\n包帯をくっつけたまま――動かない。
3140 = "Nhưng Niiroku vẫn áp chặt khuôn mặt quấn đầy băng gạc vào ngực đền chủ Akai——không nhúc nhích."
# 【ニイロク】
# display as 二六
# JP: 「いまは。まだいい。確証がもてない。\nそれに。自分も。整頓しきれていない」
2605 = "「Bây giờ. Thì chưa. Vẫn chưa có bằng chứng chắc chắn. Hơn nữa. Bản thân tôi. Cũng chưa sắp xếp lại được suy nghĩ.」"
# 【赤井】
# display as 赤井
# JP: 「そうですか」
2763 = "「Vậy sao.」"
# 【ニイロク】
# display as 二六
# JP: 「でも」
1918 = "「Nhưng mà.」"
# monologue
# JP: 包帯の顔がぐりんと動く。
3219 = "Khuôn mặt quấn băng gạc quay ngoắt lại."
# monologue
# JP: その下に隠された目が――\nおそらく僕を、はじめて、まっすぐ、見てくれる。
3244 = "Đôi mắt giấu dưới lớp băng gạc ấy—— có lẽ là lần đầu tiên, nhìn thẳng vào tôi."
# 【ニイロク】
# display as 二六
# JP: 「とても。気になることがある。だから。呼んで欲しい。\n次にもし。こういう機会があるなら。そのときも」
2518 = "「Có chuyện. Tôi rất để tâm. Nên là. Mong anh hãy gọi tôi. Nếu lần tới. Có cơ hội như thế này. Khi đó cũng vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それならば、添乗に来て欲しい」
2479 = "「Nếu vậy thì, tôi muốn cô đến đi cùng chuyến tàu.」"
# monologue
# JP: ゆえ、僕の言葉もまっすぐに出る。\nオリヴィにとって、Ⅸ号にとって。
3280 = "Do đó, những lời của tôi cũng được thốt ra một cách thẳng thắn. Vì Olivy, và vì Đầu máy số 9."
# monologue
# JP: そしておそらく、ニイロクにとっても、やはり。\nそれが最善の路となろうと、素直に思える。
3027 = "Và có lẽ, đối với cả Niiroku cũng vậy. Tôi thực sự nghĩ rằng, đó sẽ là con đường tốt nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「間もなく迎える、Ⅸ号機関車の湯医線営業運転に向け、\n一度でも多く――どうか、添乗に来て欲しい」
2382 = "「Hướng tới việc Đầu máy số 9 sắp đi vào hoạt động thương mại trên Tuyến Yui, dù chỉ thêm một lần thôi——cũng xin cô hãy đến đi cùng chuyến tàu.」"
