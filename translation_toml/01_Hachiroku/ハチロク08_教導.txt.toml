2688 = "「Nếu có thứ tiện lợi như vậy, thì với công sức chẳng khác gì thay \\x%l枕木;#00ffc040;tà vẹt%l;#;, chúng ta có thể sửa được chỗ võng này rồi!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「って、思うよ！　あ！　あと、\x%l枕木;#00ffc040;枕木%l;#;交換っていったら」
2423 = "「Tớ cũng nghĩ vậy! A! Nhắc đến chuyện thay \\x%l枕木;#00ffc040;tà vẹt%l;#; mới nhớ.」"
# monologue
