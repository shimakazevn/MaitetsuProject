2235 = "「噢噢！小深的幾位爺爺真要打遍天下無敵手嘞！！」" 

# 【ふかみ】
# display as 深美
# JP: 「わ。なんだか、わたしまで嬉しくなっちゃう」
2115 = "「哇，明明是爺爺們受到誇獎，結果連我都高興起來啦」" 

