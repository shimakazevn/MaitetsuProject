# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケ！　そのときにはオリヴィもいったげる！\nじゃ、ここのことはひとまずこれでオッケーだね？」
2862 = "「ＯＫ！到時候奧莉薇也會一起去！那麼關於這裡的問題就先這麼處理沒問題吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2193 = "「嗯」" 

# 【堰】
# display as 堰
