2528 = "「Nagi đại nhân, tò mò quá đi mất!!\nNó là cái gì vậy!?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん、あのねー」
2222 = "「Ừm, chuyện là vầy nè~」"
# monologue
