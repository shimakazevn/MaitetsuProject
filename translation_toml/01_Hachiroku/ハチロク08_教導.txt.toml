2616 = "「Trên cầu thì chỉ có \\x%l枕木;#00ffc040;tà vẹt%l;#; là nơi phân tán lực thôi mà! \\x%l枕木;#00ffc040;Tà vẹt%l;#; mà hỏng thì đường ray cũng dễ bị hư theo.」"
# 【ふかみ】
# display as 深美
# JP: 「なんか、痛々しくて、怖いみたい。です」
2631 = "「Cảm giác, đau đớn và đáng sợ quá. Ạ.」"
# monologue
