[script]
# lines: 581 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わーお」
2105 = "「Wow.」"
# monologue
# JP: オリヴィが大きく口をあけ、\nそのままぽかん……と動かなくなる。
3200 = "Olivy há hốc miệng, rồi cứ thế ngây người ra…… không nhúc nhích."
# monologue
# JP: 気持ちはわかる。\n実にわかる。
3267 = "Tôi hiểu cảm giác đó.\nThực sự rất hiểu."
# 【流】
# display as 流
# JP: 「ほーう、これがワシらの先生か」
2247 = "「Ồ, đây là giáo viên của chúng ta sao.」"
# 【治】
# display as 治
# JP: 「ちっちゃかのー。\nふかみのちっちゃかころを思い出すわい」
1988 = "「Nhỏ bé quá ta. Làm nhớ đến hồi bé Fukami còn nhỏ xíu ghê.」"
# 【堰】
# display as 堰
# JP: 「ふかみは、ちっちゃかころから背の高かったがの」
2584 = "「Fukami từ hồi nhỏ xíu đã cao rồi mà.」"
# 【ふかみ】
# display as 深美
# JP: 「もう！　おじいちゃんたちってば！」
2117 = "「Thiệt tình! Mấy ông nội này!」"
# monologue
# JP: ……\x%l保線;#00ffc040;保線%l;#;ボランティアの三長老。\nあるいは、ふかみの“おじいちゃんたち”。
1305 = "……Ba vị trưởng lão tình nguyện viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#;. Hay nói cách khác, là \"những người ông\" của Fukami."
# monologue
# JP: 流さん、治さん、堰さんのお三方が一同に会する壮観は、\n僕もハチロクも、はじめて目にするものだ。
3380 = "Khung cảnh tráng lệ khi cả ba ông Ryu, Osamu và Seki cùng tụ họp, đây là lần đầu tiên tôi và Hachiroku được chứng kiến."
# 【凪】
# display as 凪
# JP: 「めずらしかとよねー。ふかみちゃんのおじいちゃんたち、\nみーんないっぺんに集まるなんて」
2674 = "「Hiếm thấy thật đấy nha. Mấy người ông của bé Fukami, tất cả cùng tập trung lại một chỗ thế này.」"
# monologue
# JP: ――どころか、凪にとってさえレアイベントであるらしい。
1281 = "——Thậm chí, ngay cả với Nagi, đây có vẻ cũng là một sự kiện hiếm hoi."
# 【堰】
# display as 堰
# JP: 「少し前までは、\n誰ぞが発船所に残っとらんといけんかったけんのう」
2618 = "「Cho đến tận dạo trước, lúc nào cũng phải có người ở lại bến thuyền mà lị.」"
# 【治】
# display as 治
# JP: 「じゃあが、今は――」
2072 = "「Nhưng mà, bây giờ thì——」"
# 【流】
# display as 流
# JP: 「[みどり]翠の病気もよぅなったし、\n[せんどうれんちゅう,3]船頭連中も戻ってくるようになったしの」
2658 = "「Bệnh tình của Midori cũng khá hơn rồi, mấy người lái đò cũng bắt đầu quay lại làm việc nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「そうなんです。だから、おじいちゃんたちもわたしも、\n前よりずっと、色んなことに時間を使えるようになって」
2408 = "「Đúng vậy ạ. Cho nên, cả các ông và cháu, đã có thể dành thời gian cho nhiều việc hơn trước rất nhiều.」"
# monologue
# JP: 笑顔でそういい、ふかみはぺこり――\n僕らに向かって頭をさげる。
3329 = "Fukami cười nói vậy, rồi cúi người—— gập đầu chào chúng tôi."
# 【ふかみ】
# display as 深美
# JP: 「双鉄おにいさんの、みなさんのおかげです。\n本当にありがとうございます！　です！」
2767 = "「Tất cả là nhờ có anh Soutetsu, và mọi người. Thực sự cảm ơn mọi người rất nhiều! Ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「クマ川くだりの復調も、翠さんのご快癒も。\n全て、早瀬家のみなさんや凪の力でのことだろう」
1915 = "「Sự phục hồi của chuyến đi thuyền trên sông Kuma, hay việc cô Midori bình phục. Tất cả đều là nhờ công sức của gia đình nhà Hayase và Nagi mà.」"
# 【凪】
# display as 凪
# JP: 「もちろんそりゃそうばい！\nばってん――それだけじゃやっぱり、足りんかったと」
2094 = "「Tất nhiên là vậy rồi! Nhưng mà—— chỉ thế thôi thì quả nhiên là không đủ đâu.」"
# monologue
# JP: 凪の声。\n相も変わらず力強いが、どこか落ち着きも感じさせる。
3102 = "Giọng của Nagi. Vẫn mạnh mẽ như mọi khi, nhưng đâu đó lại mang đến cảm giác trưởng thành, điềm tĩnh hơn."
# 【凪】
# display as 凪
# JP: 「ふかみちゃんとかウチとかじーちゃんたちが\nどぎゃんと頑張っても、届かんことは届かんけんね」
1914 = "「Dù bé Fukami, hay tớ, hay mấy ông có cố gắng đến đâu đi nữa, thì việc không với tới được vẫn là không với tới được mà.」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。工場誘致撤回とか、鉄道の復活とか、\n経済復興とか、そういうのわたしたちじゃ、無理でした」
2366 = "「Đúng đúng. Việc hủy bỏ thu hút nhà máy, hay khôi phục đường sắt, hay phục hưng kinh tế, mấy chuyện đó bọn cháu, không thể làm được.」"
# monologue
# JP: 言って。ふかみはもう一度――\n深く、長く、頭を下げる。
3396 = "Nói xong. Fukami lại một lần nữa—— cúi đầu thật sâu, thật lâu."
# 【ふかみ】
# display as 深美
# JP: 「だからみんなに、ちゃんとお礼をいいたかったんです。\n本当に――ありがとうございます！」
2466 = "「Vì vậy, cháu muốn gửi lời cảm ơn đàng hoàng đến mọi người. Thực sự—— cảm ơn mọi người rất nhiều!」"
# 【凪】
# display as 凪
# JP: 「凪さまからも！　ありがとばーい！」
2526 = "「Nagi đại nhân cũng xin cảm ơn nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ……凪……」
2580 = "「Fukami…… Nagi……」"
# monologue
# JP: ふかみはともかく、あの凪が――このレールの上、\nなにも考えず倒木を発生させた、あの凪が……
3028 = "Fukami thì không nói, nhưng Nagi đó—— người đã từng gây ra vụ đổ cây trên đường ray này mà chẳng suy nghĩ gì, Nagi đó……"
# monologue
# JP: 大人になったと、しみじみ感じる。\nそれほど長くを、僕らは揃って、歩き続けてこれたのだと。
3259 = "Tôi thấm thía cảm nhận được rằng con bé đã lớn. Chúng tôi đã cùng nhau bước đi trên một chặng đường dài đến thế."
# 【双鉄】
# display as 雙鐵
# JP: 「皆を僕が代表するのも[せんえつ,1]僭越だが――そういうことなら、\n喜んで[しゃじ,1]謝辞を受け取ろう、ゆえ、どうか頭をあげてくれ」
1992 = "「Dù tôi đại diện cho mọi người thì có hơi tự cao—— nhưng nếu đã vậy, tôi rất vui lòng nhận lời cảm ơn này, vì thế, xin hai đứa hãy ngẩng đầu lên đi.」"
# 【ふかみ】
# display as 深美
# JP: 「よかったぁ」
2280 = "「May quá.」"
# monologue
# JP: ほにゃりと、ふかみが笑み崩れる。
3310 = "Fukami nở một nụ cười rạng rỡ, nhẹ nhõm."
# 【ふかみ】
# display as 深美
# JP: 「おかあさんがよくなってから、ずっとこうしたいって\n思ってたんです。でも、なかなか機会がなくて」
2678 = "「Từ khi mẹ khỏe lại, cháu đã luôn muốn làm thế này. Nhưng mãi mà chẳng có cơ hội.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2138 = "「A——」"
# monologue
# JP: 確かにだ。親しくなればなるほどに、感謝の意を\nきちんと伝える機会は、却って減ってしまう気がする。
3356 = "Đúng là vậy. Càng thân thiết, cơ hội để truyền đạt lòng biết ơn một cách đàng hoàng dường như lại càng ít đi."
# monologue
# JP: 水臭いというような気持ちも、どこかにはある。\nが、良いことならば、積極的に真似するべきだ。
3432 = "Đâu đó cũng có cảm giác khách sáo. Nhưng nếu là việc tốt, thì nên tích cực học theo."
# monologue
# JP: （ぺこっ）
3464 = "（Cúi đầu）"
# 【ふかみ】
# display as 深美
# JP: 「って、え！？　双鉄おにいさん！？」
2088 = "「Ơ, hả!? Anh Soutetsu!?」"
# 【凪】
# display as 凪
# JP: 「なにしとるばい！？」
1979 = "「Anh đang làm gì vậy!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「感謝をしている。ふかみと、凪と、クマ川くだり――\nそしてそこからつながった、たくさんのご縁とお力とに」
2334 = "「Anh đang cảm ơn. Cảm ơn Fukami, Nagi, và chuyến đi thuyền trên sông Kuma—— cùng vô số những nhân duyên và sự giúp đỡ được kết nối từ đó.」"
# 【ふかみ】
# display as 深美
# JP: 「けどっ！？　あのっ――そのっ」
2076 = "「Nhưng mà!? Cái đó—— chuyện đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「工場誘致撤回も、鉄道の復活も、経済復興も。\n僕たちだけでもやはり、どれひとつとて叶わなかった」
1912 = "「Việc hủy bỏ thu hút nhà máy, hay khôi phục đường sắt, hay phục hưng kinh tế. Nếu chỉ có chúng ta thì quả nhiên, chẳng có việc nào có thể trở thành hiện thực cả.」"
# 【ふかみ】
# display as 深美
# JP: 「あ――」
2150 = "「A——」"
# monologue
# JP: こくん。――小さくだけれど、ふかみが頷く。\n凪はえっへん！　と胸を大きくそりかえらせる。
3316 = "Gật. ——Fukami khẽ gật đầu. Nagi thì ưỡn ngực đầy tự hào!"
# 【凪】
# display as 凪
# JP: 「そりゃそうばい！　凪さまもふかみちゃんも！\n頑張りまくって役にたったけんね！！」
2814 = "「Đương nhiên rồi! Cả Nagi đại nhân và bé Fukami! Đều đã cố gắng hết sức và giúp ích rất nhiều mà!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2193 = "「Ừm.」"
# monologue
# JP: 上手く運ぶ物事、というのは、\nきっとそうしたものなのだろう。
3383 = "Những việc diễn ra suôn sẻ, chắc chắn là những việc như thế này."
# monologue
# JP: 自分に無理なくできることを、懸命に頑張る。\nそれが空回りすることなく、一つの方向に合わさっていく。
3145 = "Nỗ lực hết mình làm những việc nằm trong khả năng của bản thân. Những nỗ lực đó không hề uổng phí, mà cùng hội tụ về một hướng."
# 【双鉄】
# display as 雙鐵
# JP: 「……御一夜を助けたいという願いは、\n御一夜を愛する全員に、間違いなく共通したものだった」
1384 = "「……Mong muốn giúp đỡ Ohito, chắc chắn là điểm chung của tất cả những ai yêu mến Ohito.」"
# monologue
# JP: それは例えば、宝生親子ら、\nエアクラ誘致推進派だった人たちにおいても、変わらない。
3126 = "Ví dụ như hai cha con nhà Houshou, hay cả những người thuộc phe thúc đẩy thu hút Aircra, điều đó cũng không thay đổi."
# monologue
# JP: であったがゆえ、僕らはこうして今もなお、\n同じ方向に――力を束ね続けていられる。
3035 = "Chính vì vậy, chúng tôi mới có thể tiếp tục sát cánh bên nhau, cùng hướng về một mục tiêu như hiện tại."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり結局、全員にとって“お互い様”だったわけだが。\nそれだけに――あらためて礼を言えて、よかったと思う」
1935 = "「Tóm lại, đối với tất cả mọi người, đó là sự \"giúp đỡ lẫn nhau\". Nhưng chính vì thế—— tôi nghĩ thật tốt khi có thể nói lời cảm ơn một lần nữa.」"
# 【ふかみ】
# display as 深美
# JP: 「そんなふうにいってもらえて――わたし、わたしも！\n思い切ってお礼を伝えて、とってもよかった、です！」
2846 = "「Được anh nói như vậy—— em, em cũng! Em rất vui vì đã quyết tâm nói ra lời cảm ơn, ạ!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あのね！　ソーテツ」
2123 = "「Nè nha! Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2227 = "「Hửm?」"
# monologue
# JP: オリヴィが何かをいいたげだ。\nが――視線を返せば、珍しく口ごもってしまう。
3198 = "Olivy có vẻ muốn nói điều gì đó. Nhưng—— khi tôi nhìn lại, cô bé lại ấp úng một cách hiếm thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「いったいどうした？」
1970 = "「Rốt cuộc là sao vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「聞かせてください。オリヴィちゃん」
2295 = "「Hãy kể cho chúng tôi nghe đi. Olivy.」"
# monologue
# JP: ハチロクの声。\nハチロクらしい思慮深さと、他者への敬意とを感じる声だ。
3062 = "Giọng của Hachiroku. Một giọng nói mang đậm sự thấu đáo và lòng tôn trọng người khác đúng chất Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、オリヴィちゃんのおっしゃることを、\n聞かせて欲しいと願っております」
2063 = "「Tôi rất mong được lắng nghe, những điều Olivy muốn nói.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。というか、ここで『やっぱりいい』などと\n言われては、気になって保線講習に身が入らなくなる」
2428 = "「Tôi cũng vậy. Nói đúng hơn, nếu giờ em bảo 『Thôi bỏ đi』 thì tôi sẽ tò mò đến mức không thể tập trung vào khóa học bảo trì đường ray được mất.」"
# 【ふかみ】
# display as 深美
# JP: 「わたし、わたしも聞きたい！　です」
2773 = "「Em, em cũng muốn nghe! Ạ.」"
# 【凪】
# display as 凪
# JP: 「凪さまも気になるばい。\nもったいぶらんと、早く聞かせてほしかとばーい！」
2524 = "「Nagi đại nhân cũng tò mò lắm nha. Đừng có úp mở nữa, mau kể cho nghe đi!」"
# 【堰】
# display as 堰
# JP: 「じゃのお」
2194 = "「Đúng vậy.」"
# monologue
# JP: ハチロクの一声が呼び水となる。
3068 = "Một lời của Hachiroku đã khơi mào tất cả."
# monologue
# JP: もごもごしていたオリヴィの口はにっこり笑顔に結ばれて、\nそうして、元気に開かれる。
3130 = "Cái miệng đang ấp úng của Olivy nở một nụ cười rạng rỡ, và rồi, cô bé mở lời đầy sức sống."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あのね！　オリヴィ。オリヴィ、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だから、\nダイヒョーとかできる立場じゃないけど」
2803 = "「Nè nha! Olivy. Olivy là \\x%lレイルロオド;#00ffc040;Railord%l;#;, nên không có tư cách để đại diện hay gì đâu, nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ではないけれど？」
2068 = "「Nhưng mà sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「きっとね！　みかん鉄道のみんなも、センダイの\nひとたちも。絶対、ありがとーっていいたいって思うの」
2292 = "「Chắc chắn á! Mọi người ở Đường sắt Mikan, và cả những người ở Sendai nữa. Tuyệt đối, họ đều muốn nói lời cảm ơn đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう――とは、僕らにか？」
2411 = "「Cảm ơn—— là nói với chúng tôi sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
2195 = "「Vâng!」"
# 【ハチロク】
# display as 八六
# JP: 「[せんだい,1]千内の方々やみかん鉄道のみなさまは、エアクラ工場を\n歓迎されている――という意味でございましょうか？」
1976 = "「Ý em là, những người ở Sendai và Đường sắt Mikan, đang hoan nghênh nhà máy Aircra—— sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ！　だって、　オリヴィが話をきいたハンイでは、\nみんなすっごくよろこんでた！　オヒトヨのおかげって」
2328 = "「Đúng vậy! Bởi vì, theo những gì Olivy nghe được, mọi người đều rất vui mừng! Họ bảo là nhờ có Ohito đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2233 = "「Ồ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「センダイは、川とか舟とかでカンコーしてないから！\nそれに、コージョーユーチでレールもまたつながったし」
2613 = "「Bởi vì Sendai không có du lịch bằng sông hay thuyền! Hơn nữa, nhờ thu hút nhà máy mà đường ray lại được kết nối.」"
# 【ふかみ】
# display as 深美
# JP: 「あー……ですよね。きっと、川下りしてなかったら、\nわたしも稀咲さんの案に賛成してたかもしれないし」
2155 = "「A…… đúng vậy nhỉ. Chắc chắn, nếu không làm nghề chèo thuyền, có lẽ em cũng đã tán thành phương án của chị Kisaki rồi.」"
# 【凪】
# display as 凪
# JP: 「エアクラ工場そのものが悪物ってわけじゃなかけんね、\n御一夜とあわんかったってだけで」
2651 = "「Bản thân nhà máy Aircra đâu phải là thứ xấu xa gì, chỉ là không hợp với Ohito thôi.」"
# monologue
# JP: 凪とふかみが、しみじみ頷く。\nこれもまた、“上手く運んだ”ことなのだろう。
3099 = "Nagi và Fukami gật gù đồng cảm. Đây có lẽ cũng là một việc \"diễn ra suôn sẻ\"."
# monologue
# JP: 御一夜にはマッチしなかった一つの要素が、\nけれども千内においては、機能し、地域に貢献している。
3358 = "Một yếu tố không phù hợp với Ohito, nhưng ở Sendai, nó lại phát huy tác dụng và cống hiến cho khu vực."
# 【凪】
# display as 凪
# JP: 「エアクラ社、あのころはうちもふかみちゃんも、\n悪のゴンゲ！　みたいに思いこんどったもんね」
2514 = "「Công ty Aircra, hồi đó tớ và bé Fukami, đã cứ đinh ninh đó là hiện thân của cái ác! luôn đó.」"
# 【ふかみ】
# display as 深美
# JP: 「だっだよねー、けど、お話ししてみたら、エアクラ社の\n[うらかみ,1]浦上さんもすごくいいひと――って、あ！　こないだっ」
1959 = "「Đúng, đúng vậy ha. Nhưng mà, sau khi nói chuyện thử, cô Urakami của công ty Aircra cũng là một người rất tốt—— a! Hôm nọ.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃんも見たばい！？」
2344 = "「Bé Fukami cũng thấy rồi hả!?」"
# monologue
# JP: 凪とふかみが眼と眼を見交わす。\nふたりの頬が、パっとバラ色に染めあがる。
3095 = "Nagi và Fukami nhìn nhau. Hai má của hai cô bé bỗng chốc nhuộm màu hồng hào."
# 【凪】
# display as 凪＆深美
# JP: 「わおわおーーーーーっ！」\n「きゃーーーーーーーっ！」
2103 = "「Wow wow————!」\n「Kya———————!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
2206 = "「Hửm!?」"
# 【ふかみ】
# display as 深美
# JP: 「あのひと、やっぱりそうだったよね！\n浦上さんだったよね！！　絶対！」
2795 = "「Người đó, quả nhiên là vậy nhỉ! Là cô Urakami nhỉ!! Tuyệt đối luôn!」"
# 【凪】
# display as 凪
# JP: 「にーさんだと思うとったらねーさんだったけん！\nびっくりしたばい！　ってか、そぎゃんこつより！」
2096 = "「Tớ cứ tưởng là một anh trai nào đó, hóa ra lại là chị gái! Giật cả mình! Mà, khoan nói chuyện đó đã!」"
# 【ふかみ】
# display as 深美
# JP: 「赤ちゃん！　赤ちゃんだっこしてた！\n浦上さん、すっごいおかあさんの顔になってた！」
2343 = "「Em bé! Cô ấy đang bế em bé! Cô Urakami, trông ra dáng một người mẹ tuyệt vời lắm!」"
# 【凪】
# display as 凪
# JP: 「稀咲ねーちゃんと一緒になって歩いとらんかったら、\n浦上さんってわからんかったと！　まるきり別人ばい！」
2684 = "「Nếu không đi cùng chị Kisaki, thì tớ cũng không nhận ra đó là cô Urakami đâu! Cứ như một người hoàn toàn khác vậy!」"
# 【ふかみ】
# display as 深美
# JP: 「おかあさんになるってすごいんだねー、素敵！　\n赤ちゃん、ああん！　わたし、さわってみたかった！」
2594 = "「Làm mẹ thật tuyệt vời quá đi, thích ghê! Em bé, a a! Tớ cũng muốn sờ thử quá!」"
# 【凪】
# display as 凪
# JP: 「凪さまもさわってみたかったばってん！\nあぎゃんふにゃふにゃ、こわしちゃいそーばい！」
2523 = "「Nagi đại nhân cũng muốn sờ thử nè! Nhưng mà mềm nhũn thế kia, cảm giác như đụng vào là vỡ mất!」"
# monologue
# JP: （なんと、ふかみと凪もなのか）
3453 = "（Trời ạ, cả Fukami và Nagi cũng vậy sao.）"
# monologue
# JP: 赤ちゃんは確かに極めてかわいく、\nお母さんは実に偉大なものとは僕も思うが――
3340 = "Đúng là em bé cực kỳ dễ thương, và người mẹ thực sự vĩ đại, tôi cũng nghĩ vậy nhưng——"
# monologue
# JP: （ハチロクの――すずの、母になることへのあこがれは、\n子を作れないゆえ……というだけの理由でもないのか）
3449 = "（Niềm ao ước trở thành mẹ của Hachiroku—— của Suzu, không chỉ đơn thuần là vì không thể sinh con sao……）"
# 【ハチロク】
# display as 八六
# JP: 「平気ですよ？　凪。赤ちゃんは、やわらかいけれど、\nこわれたりくずれたりする[もろ]脆い存在ではございません」
1910 = "「Không sao đâu? Nagi. Em bé tuy mềm mại, nhưng không phải là sinh vật mỏng manh dễ vỡ đâu.」"
# 【凪】
# display as 凪
# JP: 「って！？　ハチロク、赤ちゃんさわったとばい！？」
2179 = "「Hả!? Hachiroku, chị đã sờ em bé rồi sao!?」"
# 【ふかみ】
# display as 深美
# JP: 「いつ、どこで、誰の赤ちゃんっ！？」
1953 = "「Khi nào, ở đâu, em bé của ai vậy!?」"
# monologue
# JP: 先輩風をびゅうびゅう吹かすハチロクにまで、\nふかみと凪は羨望と感心の視線を向ける。
3333 = "Fukami và Nagi hướng ánh mắt ngưỡng mộ và thán phục về phía Hachiroku, người đang ra dáng đàn chị."
# 【ハチロク】
# display as 八六
# JP: 「うふふ、それは――\nまぁ！」
2229 = "「Ufufu, chuyện đó thì——\nÁ!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、来た！」
2182 = "「A, đến rồi!」"
# 【凪】
# display as 凪
# JP: 「赤ちゃんきたとばい！？」
2342 = "「Em bé đến rồi hả!?」"
# 【ふかみ】
# display as 深美
# JP: 「え？　うそ！　だっこしたい！」
2191 = "「Hả? Đùa sao! Em muốn bế!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2227 = "「嗯？」" 
# monologue
# JP: ハチロクとオリヴィが視線を動かす\nその方向を振り向き見れば――
3059 = "Hachiroku và Olivy chuyển hướng nhìn. Khi tôi quay lại nhìn theo hướng đó thì——"
# 【赤井】
# display as 赤井
# JP: 「いやいや、みなさんお早いですね。\nさすがは鉄道業界の方々だ」
2119 = "「Chà chà, mọi người đến sớm thật đấy. Quả không hổ danh là những người trong ngành đường sắt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司――\nいや、赤井元\x%l運転士;#00ffc040;運転士%l;#;。来てくださったのですね」
2712 = "「Đền chủ Akai—— À không, cựu \\x%l運転士;#00ffc040;lái tàu%l;#; Akai. Ngài đã đến rồi.」"
# 【赤井】
# display as 赤井
# JP: 「最新の保線技術の講習ということですので――\n単なる好奇心で恐縮ですが」
2619 = "「Nghe nói là có buổi đào tạo về kỹ thuật bảo trì đường ray mới nhất—— Thật ngại quá, tôi chỉ đến vì tò mò thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お運びいただけ、本当に嬉しく思います。\nありがとうございます」
2405 = "「Ngài cất công đến đây, tôi thực sự rất vui. Cảm ơn ngài.」"
# 【凪】
# display as 凪
# JP: 「わ！　赤井宮司、赤ちゃんばだっこ――うわわっ！？」
2108 = "「Oa! Đền chủ Akai, đang bế em bé—— Uwaa!?」"
# 【ふかみ】
# display as 深美
# JP: 「包帯！？　え？　やだ、どうしたの、たいへんっ」
2654 = "「Băng gạc!? Hả? Trời ơi, sao thế này, nghiêm trọng quá.」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ？　凪、ふかみ。あのこはニイロク――\n赤井宮司が試験運転されていた列車の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です」
1907 = "「Không phải đâu? Nagi, Fukami. Cô bé đó là Niiroku—— \\x%lレイルロオド;#00ffc040;Railord%l;#; của đoàn tàu mà đền chủ Akai từng lái thử nghiệm đấy.」"
# 【ふかみ】
# display as 深美
# JP: 「レイル」
2833 = "「Rai」"
# 【凪】
# display as 凪
# JP: 「ロオド」
1951 = "「lord」"
# monologue
# JP: ……ハチロクが凪とふかみに事情説明をしてくれる。
1309 = "……Hachiroku giải thích tình hình cho Nagi và Fukami."
# monologue
# JP: 間の悪さのせいとはいえど、凪とふかみに赤ちゃん扱いを\nされてしまって、ニイロクが気を悪くしないといいのだが。
3137 = "Dù là do không đúng lúc, nhưng bị Nagi và Fukami đối xử như em bé, hy vọng Niiroku sẽ không cảm thấy khó chịu."
# 【ニイロク】
# display as 二六
# JP: 「…………」
1355 = "「…………」"
# monologue
# JP: ……見れば見るほど包帯だ。\nゆえ、表情が伺えん。どんな機嫌かまったくわからん。
1301 = "……Càng nhìn càng thấy toàn là băng gạc. Vì vậy, không thể đoán được biểu cảm. Hoàn toàn không biết tâm trạng cô ấy ra sao."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ニイロク！　きてくれたんだね！　ありがとー！」
1943 = "「Niiroku! Cậu đã đến rồi! Cảm ơn nha!」"
# 【ニイロク】
# display as 二六
# JP: 「自分は。来てない。来たのは、清春。\n自分は、ただ、その付添い」
1903 = "「Tôi. Không có đến. Người đến là Kiyoharu. Tôi, chỉ là, đi cùng thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ツキソイでも！　いてくれるんならお話できるし！\nオリヴィ、知ってることぜーんぶ教えてあげるからね！」
2367 = "「Đi cùng cũng được! Có cậu ở đây là chúng ta có thể nói chuyện rồi! Olivy sẽ dạy cho cậu tất tần tật những gì mình biết nha!」"
# 【ニイロク】
# display as 二六
# JP: 「……必要。ない」
1385 = "「……Không. Cần thiết.」"
# monologue
# JP: ボソリとニイロクはつぶやいて、\n頭全部を凪とふかみとの方へと向ける。
3037 = "Niiroku lầm bầm một câu, rồi quay hẳn đầu về phía Nagi và Fukami."
# 【ニイロク】
# display as 二六
# JP: 「あのふたり。何で、来ている？」
2297 = "「Hai người kia. Tại sao, lại đến đây?」"
# 【凪】
# display as 凪
# JP: 「凪さまたちのことばい？」
1974 = "「Cậu nói bọn này hả?」"
# monologue
# JP: 丁度説明が終ったのだろうか。\nニイロクの小声を、凪はきっちり聞きつける。
3344 = "Có lẽ Hachiroku vừa giải thích xong. Nagi nghe rõ mồn một tiếng lầm bầm của Niiroku."
# 【凪】
# display as 凪
# JP: 「凪さま、オリヴィと組むかもしれんけんね！\n一緒の時間をできるだけ過ごすことは、大事ばい！」
2255 = "「Nagi đại nhân đây có thể sẽ hợp tác với Olivy đó nha! Việc dành thời gian bên nhau nhiều nhất có thể là rất quan trọng đấy!」"
# 【ふかみ】
# display as 深美
# JP: 「わたしは。\x%l車掌;#00ffc040;車掌%l;#;さんになりたいです。から――。\n\x%l保線;#00ffc040;保線%l;#;の知識も、とっても大事になるって思って」
2448 = "「Em thì. Muốn trở thành \\x%l車掌;#00ffc040;trưởng tàu%l;#;. Nên——. Em nghĩ kiến thức về \\x%l保線;#00ffc040;bảo trì đường ray%l;#; cũng sẽ rất quan trọng.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「フカミ！　いまいーこといったよ！」
2590 = "「Fukami! Em vừa nói một câu rất hay đó!」"
# 【ふかみ】
# display as 深美
# JP: 「え？！　わ、わたしっ？」
2136 = "「Hả?! E-em á?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　\x%l車掌;#00ffc040;車掌%l;#;は線路支障あったら列車とめなきゃだし、\n止めたら何がおかしいのか、自分で見なきゃなんだから」
2196 = "「Đúng vậy! \\x%l車掌;#00ffc040;Trưởng tàu%l;#; phải dừng tàu khi có chướng ngại vật trên đường ray, và khi dừng lại, phải tự mình xem xét xem có gì bất thường mà.」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
2157 = "「A.」"
# monologue
# JP: ふかみがこっくり、大きく頷く。\nそれを見て、オリヴィの笑顔はいっそう鮮やかに花開く。
3318 = "Fukami gật đầu thật mạnh. Nhìn thấy điều đó, nụ cười của Olivy càng nở rộ tươi tắn hơn."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;も、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だってそう！　報告が正確なら、\n悪いとこトクテーするのも復旧も早くなるんだから！」
2757 = "「Cả \\x%l機関士;#00ffc040;lái tàu%l;#; và \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng vậy! Nếu báo cáo chính xác, thì việc xác định chỗ hỏng và khắc phục cũng sẽ nhanh hơn!」"
# 【ニイロク】
# display as 二六
# JP: 「ん……」
2192 = "「Ưm……」"
# monologue
# JP: “そうなの？”と言っているのか、ニイロクの首が傾ぐ。\n赤井宮司は、ゆっくりニイロクにうなずき返す。
3040 = "Niiroku nghiêng đầu, như thể đang hỏi \"Vậy sao?\". Đền chủ Akai chậm rãi gật đầu đáp lại Niiroku."
# monologue
# JP: ……うすうす感じてはいたが、オリヴィは教官として、\n極めて高い適正を有しているようだ。
1323 = "……Dù đã lờ mờ cảm nhận được, nhưng Olivy dường như có tố chất cực kỳ cao để làm một giáo quan."
# 【赤井】
# display as 赤井
# JP: 「ご指導、大変に楽しみです。\nオリヴィ教官、どうぞよろしくおねがいいたします」
2699 = "「Rất mong chờ sự chỉ bảo của cô. Giáo quan Olivy, xin hãy giúp đỡ chúng tôi.」"
# monologue
# JP: 赤井宮司が頭を下げる。\nと、ニイロク――ハチロク、凪ふかみ――っと！　
3410 = "Đền chủ Akai cúi đầu. Và rồi, Niiroku—— Hachiroku, Nagi, Fukami—— ơ!"
# monologue
# JP: 堰さんたちと同時に僕も頭をさげれば、\nオリヴィは実にうれしげな、照れくさそうな声を出す。
3248 = "Tôi cũng vội cúi đầu cùng lúc với nhóm ông Seki, Olivy liền cất giọng vừa thực sự vui sướng, vừa có chút ngượng ngùng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　がんばる！　オリヴィのしってること、\nぜんぶ、ぜぇんぶ教えてあげるっ！」
2202 = "「Vâng! Em sẽ cố gắng! Những gì Olivy biết, em sẽ dạy hết, dạy tất tần tật cho mọi người!」"
# monologue
# JP: そうしてとんっ！
3430 = "Và rồi, bịch!"
# monologue
# JP: 跳ねるような――というか、飛び跳ねた一歩を踏み出して、\n僕らへ振り向き、右手をかかげる。
3235 = "Như thể nảy lên—— hay đúng hơn là cô bé nhảy một bước, quay về phía chúng tôi, và giơ cao tay phải."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィせんせーの保線教室！\nはじまりはじまりーっ！」
2290 = "「Lớp học bảo trì đường ray của cô giáo Olivy! Bắt đầu bắt đầu thôi~!」"
# monologue
# JP: 歩く、歩く。
3236 = "Đi bộ, và đi bộ."
# monologue
# JP: \x%l保線;#00ffc040;保線%l;#;の基本は歩くことゆえ、\nレールを見ながらともかく歩く。
3291 = "Vì cơ bản của \\x%l保線;#00ffc040;bảo trì đường ray%l;#; là đi bộ, nên chúng tôi cứ vừa nhìn đường ray vừa đi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ん、最初はこの辺かなー」
2226 = "「Ưm, đầu tiên là quanh khu vực này nhỉ~」"
# 【流】
# display as 流
# JP: 「ほー」
2231 = "「Ồ.」"
# monologue
# JP: 堰さん――いや、流さんだ。\nが、感心したような声をだす。
3167 = "Ông Seki—— à không, là ông Ryu. Ông ấy thốt lên một tiếng đầy vẻ thán phục."
# monologue
# JP: その理由なら僕にもわかる。\nここは保線支障――[ふんでい,1]噴泥を頻発してしまう場所だから。
3074 = "Lý do thì tôi cũng hiểu. Vì đây là nơi thường xuyên xảy ra sự cố bảo trì đường ray—— hiện tượng phụt bùn."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。\nなんでここか、わかってる顔の人たちはこっち！」
2221 = "「Ừm. Những ai có vẻ mặt hiểu tại sao lại là chỗ này thì qua bên này!」"
# monologue
# JP: 堰さん、流さん、治さん。\nそれにハチロクと僕とが一箇所にまとめられる。
3168 = "Ông Seki, ông Ryu, ông Osamu. Cùng với Hachiroku và tôi được tập hợp lại một chỗ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「このグループは、オヒトヨ鉄道ユノイ線の\n保線知識があるグループでしょ？　だから、Bグループ」
2828 = "「Nhóm này, là nhóm có kiến thức bảo trì đường ray của tuyến Yui thuộc Đường sắt Ohito đúng không? Vậy nên, là nhóm B.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2231 = "「噢」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、他のコたちがＡグループ！　そしたらね？\nグループたいこー！　\x%l保線;#00ffc040;保線%l;#;クイズのはじまりだよー！」
1996 = "「Và, những người còn lại là nhóm A! Tiếp theo nha? Thi đấu giữa các nhóm! Câu đố \\x%l保線;#00ffc040;bảo trì đường ray%l;#; bắt đầu nha~!」"
# 【凪】
# display as 凪
# JP: 「\x%l保線;#00ffc040;保線%l;#;クイズ！\nわおわお、楽しみばい！　負けんばい！」
1339 = "「Câu đố \\x%l保線;#00ffc040;bảo trì đường ray%l;#;! Wow wow, mong chờ quá đi! Sẽ không thua đâu nha!」"
# 【ふかみ】
# display as 深美
# JP: 「えええっ、\n経験者さんたちに勝てる気ぜんぜんしないんだけど――」
2131 = "「Ểể, Cảm giác không thể nào thắng nổi những người có kinh nghiệm luôn ấy——」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そこはダイジョブ！　考えてあるよ～」
2755 = "「Vụ đó thì không sao! Đã tính cả rồi~」"
# monologue
# JP: オリヴィがえへん！　胸を張る。
3201 = "Olivy ưỡn ngực tự hào!"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「最初のカイトーケンはAグループ！　そっちが誰も\n答えられなかったらBグループが答えてオッケ！　ね？」
2835 = "「Quyền trả lời đầu tiên thuộc về nhóm A! Nếu bên đó không ai trả lời được thì nhóm B mới được trả lời, OK! Nhé?」"
# 【赤井】
# display as 赤井
# JP: 「なるほど。それならＡグループも回答しやすい。\n了解しました」
2764 = "「Ra là vậy. Thế thì nhóm A cũng dễ trả lời hơn. Đã rõ.」"
# monologue
# JP: 赤井宮司の声に感心の色が混じっている。\nなるほど――『回答しやすい』か。
3411 = "Giọng của đền chủ Akai pha lẫn sự thán phục. Ra là vậy—— \"dễ trả lời hơn\" sao."
# monologue
# JP: 確かに単に質問したなら、\n経験者ばかりが答えることとなっていこうし――
3342 = "Quả thực nếu chỉ đơn thuần đặt câu hỏi, thì toàn những người có kinh nghiệm sẽ trả lời mất——"
# monologue
# JP: （それに、『答えるために考えた』ことなら、\nただ単に『教えられる』ことより覚えやすかろう）
3460 = "（Hơn nữa, nếu là việc \"phải suy nghĩ để trả lời\", thì sẽ dễ nhớ hơn là chỉ đơn thuần \"được dạy cho\".）"
# 【双鉄】
# display as 雙鐵
# JP: 「……ああ、みかん鉄道さんでは、\nこども向け鉄道教室の類を開催しているのかもしれんな」
1376 = "「……À, ở Đường sắt Mikan, có lẽ họ cũng tổ chức những lớp học đường sắt dành cho trẻ em chăng.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
2848 = "「Ngài Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああいや――」
2166 = "「À không——」"
# monologue
# JP: いかん。考えが口から出ていたか。\nとはいえ、別段隠しだてするようなことでもない。
3022 = "Chết thật. Suy nghĩ buột miệng thốt ra rồi sao. Tuy nhiên, cũng chẳng phải chuyện gì cần phải giấu giếm."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィはなかなか凄いと、感心していた」
2441 = "「Tôi đang thán phục Olivy thực sự rất giỏi.」"
# 【ハチロク】
# display as 八六
# JP: 「はい！　さすがはオリヴィちゃんでございますね！」
2335 = "「Vâng! Quả không hổ danh là Olivy ạ!」"
# monologue
# JP: わがことのように喜んで、\nハチロクはピっ！　とまっすぐ右手をあげる。
3065 = "Vui mừng như thể đó là chuyện của chính mình, Hachiroku giơ thẳng tay phải lên tắp!"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまとわたくしも了解です！」
2847 = "「Ngài Soutetsu và em cũng đã hiểu rõ rồi ạ!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オケー！　そしたらいくよ～！　保線クイズ、第一問！『オヒトヨ鉄道ユノイ線にあるトンネルの数は』」
2868 = "「OK! Vậy thì bắt đầu nha~! Câu đố bảo trì đường ray, câu hỏi thứ nhất! 『Số lượng hầm chui trên tuyến Yui của Đường sắt Ohito là bao nhiêu?』」"
# 【凪】
# display as 凪
# JP: 「はいっ！」
2097 = "「Có!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「はいナギ！　もーわかったの？」
2015 = "「Vâng Nagi! Đã biết rồi sao?」"
# 【凪】
# display as 凪
# JP: 「わかったばーい！　こんなんらくしょーばい！！」
2638 = "「Biết rồi nha! Dễ ợt luôn!!」"
# 【ふかみ】
# display as 深美
# JP: 「って！　ダメだよ凪ちゃん！　カンタンすぎる！\nこれってきっと、ヒッカケ問題だよぉ」
1902 = "「Khoan! Không được đâu Nagi! Dễ quá mức rồi! Cái này chắc chắn là câu hỏi bẫy đó~」"
# 【凪】
# display as 凪
# JP: 「ええっ！？」
2128 = "「Hả!?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「はい！　ナギ？　こたえて～」
2819 = "「Vâng! Nagi? Trả lời đi~」"
# 【凪】
# display as 凪
# JP: 「あうあうあ――ええと――ええと～！\nえーい！　そのままいくばい！　『ゼロ』！！」
2169 = "「Au au a—— à ừm—— à ừm~! Ây da! Cứ thế mà trả lời thôi! 『Không có cái nào』!!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ぶー！！　残念はずれ！\nそれでは、モンダイのつづきです！！」
2398 = "「Bíp!! Rất tiếc, sai rồi! Vậy thì, tiếp tục câu hỏi nhé!!」"
# 【ふかみ】
# display as 深美
# JP: 「やっぱり～！　『ですが問題』だった～」
2443 = "「Biết ngay mà~! Là câu hỏi 『nhưng mà』~」"
# 【凪】
# display as 凪
# JP: 「あうあう、次はひっかからんよー気をつけるばい」
2170 = "「Au au, lần sau tớ sẽ cẩn thận không để bị lừa nữa đâu.」"
# 【ニイロク】
# display as 二六
# JP: 「（くすっ）」
2855 = "「(Phụt)」"
# monologue
# JP: うむ？　いや、空耳か？\n今、誰かが笑ったような気がしたが――
3144 = "Hửm? Không, mình nghe nhầm chăng? Vừa rồi, có cảm giác như ai đó đã cười——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「『トンネルの数は[ゼロ]０カショ、ですが。\nさて、橋。[きょうりょう,1]橋梁の数はいくつあるでしょー！」
2626 = "「『Số lượng hầm chui là 0, nhưng mà. Vậy, cầu. Số lượng cầu đường sắt là bao nhiêu nào!』」"
# 【治】
# display as 治
# JP: 「ふむ」
2139 = "「Hừm.」"
# monologue
# JP: 三老人が頷き合う。\nこれは、わかる。無論、僕にも――
3016 = "Ba vị trưởng lão gật gù với nhau. Câu này thì biết. Tất nhiên, cả tôi cũng——"
# 【凪】
# display as 凪
# JP: 「あれ？　あわわっ――\n一番最初が御一夜ば出て、踏切こえてすぐにあって」
2091 = "「Ủa? Awa wa—— Cái đầu tiên là ngay sau khi ra khỏi Ohito, qua khỏi đoạn giao cắt đường sắt là có liền.」"
# 【ハチロク】
# display as 八六
# JP: 「凪？　\x%l機関士;#00ffc040;機関士%l;#;がわからないでは、ことですよ？」
2020 = "「Nagi? \\x%l機関士;#00ffc040;Lái tàu%l;#; mà không biết thì không được đâu đấy?」"
# 【凪】
# display as 凪
# JP: 「ひえええ！　ぜぇんぶ場所はわかっとるばってん！\n数ば数えたことなかったばい！！」
2080 = "「Hieee! Tớ biết hết vị trí mà! Chỉ là chưa từng đếm thử bao giờ thôi!!」"
# monologue
# JP: 凪が指折り数えはじめる。\nが、オリヴィはぶっぶー、と無情の宣告。
3107 = "Nagi bắt đầu bẻ ngón tay đếm. Nhưng Olivy đã vô tình tuyên bố \"Bíp bíp\"."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ナギはいまオテツキしたからイッカイヤスミだよ！」
1973 = "「Nagi vừa trả lời sai nên bị mất lượt một lần nha!」"
# 【凪】
# display as 凪
# JP: 「ええええ！？　せっかく数えおわったとにー！」
2125 = "「Hảảảả!? Tớ cất công đếm xong rồi mà~!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ホカのこはどー？　フカミは？\nニイロクとアカイグージは？」
2818 = "「Những người khác thì sao? Fukami? Niiroku và đền chủ Akai thì sao?」"
# 【ふかみ】
# display as 深美
# JP: 「わたしは、無理、です。\n気にしたことも、まだ、なかったです」
2451 = "「Em thì, chịu thôi, ạ. Chưa từng, để ý đến chuyện đó bao giờ.」"
# 【赤井】
# display as 赤井
# JP: 「さぁて、どうでしたかねぇ」
2429 = "「Chà, là bao nhiêu nhỉ.」"
# 【ニイロク】
# display as 二六
# JP: 「知るわけない。乗ったこともない」
2426 = "「Làm sao mà biết được. Tôi còn chưa đi bao giờ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ！　Ａグループはざぁんねん！\nカイトーケンは、Ｂグループにうつりまーす！」
2825 = "「Vậy! Nhóm A rất tiếc nha! Quyền trả lời, chuyển sang cho nhóm B~!」"
# 【ハチロク】
# display as 八六
# JP: 「はい！　双鉄さまがお答えになられます」
2439 = "「Vâng! Ngài Soutetsu sẽ trả lời ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕がか」
2435 = "「Tôi á?」"
# monologue
# JP: 堰さんたちも、あたたかな目で頷いてくれている。\nならばここは、花を持たせてもらうとしよう。
3170 = "Nhóm ông Seki cũng đang gật đầu với ánh mắt ấm áp. Nếu vậy, tôi sẽ nhận lấy vinh dự này."
# 【双鉄】
# display as 雙鐵
# JP: 「種別を問わぬ総数ならば、六十九基だ」
2308 = "「Nếu tính tổng số không phân biệt loại nào thì là 69 cây cầu.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だいせーかーい！」
2315 = "「Hoàn toàn chính xác~!」"
# 【ふかみ】
# display as 深美
# JP: 「ええ！？　たった２５ｋｍくらいの長さなのに、\n７０近くも橋がかかってるの？」
2129 = "「Hả!? Chiều dài chỉ khoảng 25km thôi mà, có đến gần 70 cây cầu sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよだよ。ケッコーすごい川線だよね～\nタンジュンにわったら、３６０メートルごとに橋！」
2490 = "「Đúng đó đúng đó. Tuyến đường ven sông khá ấn tượng nhỉ~ Chia đơn giản ra thì cứ 360 mét lại có một cây cầu!」"
# monologue
# JP: ……そういわれると、確かに多いものと感じる。
1319 = "……Nghe nói vậy, quả thực tôi cũng thấy nhiều."
# monologue
# JP: 僕は湯医線でしか乗務をしたことが無いゆえ、\n当然の景色と感じていたが――
3335 = "Vì tôi chỉ làm nhiệm vụ trên tuyến Yui, nên cứ ngỡ đó là cảnh sắc đương nhiên——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「みごとセーカイしたソーテツにはボーナスクイズ！\n『ユノイ線にある\x%lポイント;#00ffc040;ポイント%l;#;のソウスウは？』」
1966 = "「Câu hỏi thưởng cho Soutetsu vì đã trả lời đúng! 『Tổng số \\x%lポイント;#00ffc040;ghi bẻ đường ray%l;#; trên tuyến Yui là bao nhiêu?』」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l石造機関庫;#00ffc040;石造機関庫%l;#;まわりを含めて御一夜に七つ。\n旧麻霧駅――麻霧信号所に三つで、合計十だ」
2031 = "「Bao gồm cả khu vực quanh \\x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#; thì ở Ohito có 7 cái. Ở ga cũ Makiri—— trạm tín hiệu Makiri có 3 cái, tổng cộng là 10.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ぶっぶー！　ハズレーーー！」
2395 = "「Bíp bíp! Sai rồi~~~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
2086 = "「Hửm!?」"
# 【堰】
# display as 堰
# JP: 「あとみっつあるじゃろ、双鉄。\n湯医の\x%l三角線;#00ffc040;三角線%l;#;まわりに」
2850 = "「Còn 3 cái nữa mà Soutetsu. Ở khu vực \\x%l三角線;#00ffc040;đường tam giác%l;#; Yui ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああっ！」
2171 = "「A!」"
# 【治】
# display as 治
# JP: 「じゃけん、合計は十三、じゃの？」
2331 = "「Vậy nên, tổng cộng là 13, đúng không?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「おじーちゃんセーカイ！　\x%l保線;#00ffc040;保線%l;#;ポイント１あげる！」
2602 = "「Ông trả lời đúng rồi! Cho ông 1 điểm \\x%l保線;#00ffc040;bảo trì đường ray%l;#; nha!」"
# 【流】
# display as 流
# JP: 「ほう」
# 2231 = "「噢」" 
# 【凪】
# display as 凪
# JP: 「\x%l保線;#00ffc040;保線%l;#;ポイント！？　それ何ばい！！？」
1340 = "「Điểm \\x%l保線;#00ffc040;bảo trì đường ray%l;#;!? Cái đó là gì vậy!!?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えっとね、クイズにあたるともらえるの！\nＡチームのこはセーカイひとつで３ポイント！」
2089 = "「À thì, trả lời đúng câu đố là được nhận đó! Người của nhóm A trả lời đúng một câu được 3 điểm!」"
# 【ふかみ】
# display as 深美
# JP: 「あ、それくらいなら勝ち目あるかも」
2190 = "「A, nếu vậy thì có lẽ cũng có cơ hội thắng đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「それでは、双鉄さまも現在１ポイントですね？」
2829 = "「Vậy thì, ngài Soutetsu hiện tại cũng đang có 1 điểm nhỉ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「んーん！　だっていっこセーカイしたけど\nいっこぶっぶーだったから」
1920 = "「Không không! Tại vì trả lời đúng một câu nhưng lại trả lời sai một câu mà.」"
# 【ハチロク】
# display as 八六
# JP: 「あら、それでは差し引き零点ですか」
2121 = "「Ôi, vậy thì bù trừ cho nhau là thành 0 điểm sao ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だねー！　ちなみにAチームのこは、\nお手つきしてもゲンテンなしで一回休みだけ！」
2566 = "「Đúng rồi~! Nhân tiện thì nhóm A, dù có trả lời sai cũng không bị trừ điểm, chỉ mất lượt một lần thôi!」"
# 【凪】
# display as 凪
# JP: 「よかったとばーい！」
2281 = "「May quá đi~!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それじゃあ\x%l保線;#00ffc040;保線%l;#;クイズ、次のモンダイ！\nじゃじゃんっ！」
2815 = "「Vậy thì câu đố \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, câu hỏi tiếp theo! Tèn ten!」"
# monologue
# JP: ……ポイント制度の影響だろうか、\nさっきより、ぎゅうっと空気が引き締まる。
1299 = "……Có lẽ do ảnh hưởng của chế độ tính điểm, không khí trở nên căng thẳng hơn lúc nãy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「『トンネルがなくて、橋梁がおおいユノイ線。\n\x%l保線;#00ffc040;保線%l;#;する上で、一番』」
1351 = "「『Tuyến Yui không có hầm chui, nhưng lại có rất nhiều cầu đường sắt. Trong việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, thứ nhất』」"
# 【凪】
# display as 凪
# JP: 「水ばい！　水に一番気をつけなくちゃいけんばい！」
2502 = "「Là nước! Phải cẩn thận nhất với nước!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「せーかーい！　ナギすごい！　３ポイント！！」
2253 = "「Chính xác~! Nagi giỏi quá! 3 điểm!!」"
# 【凪】
# display as 凪
# JP: 「やったばーい！」
# 2281 = "「太好嘞！」" 
# 【ふかみ】
# display as 深美
# JP: 「すごーい凪ちゃん！　かっこいい！！」
2339 = "「Nagi giỏi quá! Ngầu ghê!!」"
# monologue
# JP: 無邪気に拍手し。\nそしてふかみは興味深げに質問してくる。
3308 = "Fukami ngây thơ vỗ tay. Sau đó, cô bé tò mò đặt câu hỏi."
# 【ふかみ】
# display as 深美
# JP: 「でも、水って……洪水とかそういうこと？　なの？」
2073 = "「Nhưng mà, nước là…… lũ lụt hay gì đó đại loại vậy? Hả?」"
# 【凪】
# display as 凪
# JP: 「洪水はもちろんあぶなかとよね！　ばってん、\n普段の\x%l保線;#00ffc040;保線%l;#;では、地下水とかの方がやっかいばい！」
2578 = "「Lũ lụt thì tất nhiên là nguy hiểm rồi! Nhưng mà, trong việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#; thường ngày, nước ngầm các kiểu mới phiền phức cơ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2139 = "「哦」" 
# monologue
# JP: これは正直驚かされた。
3376 = "Thú thực, điều này làm tôi ngạc nhiên đấy."
# monologue
# JP: 当てずっぽうかとも、多少感じてしまっていたが、\n地下水の怖さを言いだしたなら、“わかっている”のだ。
3261 = "Tôi cũng hơi nghĩ là con bé đoán mò, nhưng khi đã nói ra được sự đáng sợ của nước ngầm thì chứng tỏ con bé \"thực sự hiểu\"."
# 【ふかみ】
# display as 深美
# JP: 「え――っと……それって、なんでなの？」
2084 = "「À—— ừm…… Cái đó, tại sao vậy?」"
# 【凪】
# display as 凪
# JP: 「そいば――うーん……と。\nどぎゃんして説明したらよかとかねー」
2595 = "「Cái đó thì—— ưm…… Nên giải thích thế nào cho dễ hiểu nhỉ~」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！　じゃ、いまナギが言ってくれたこと。\nオリヴィが、もーちょっとくわしくセツメーするね！」
2867 = "「OK! Vậy thì, về điều Nagi vừa nói. Olivy sẽ giải thích chi tiết hơn một chút nha!」"
# monologue
# JP: いいながら、\nオリヴィは左右を目視で確かめ、線路に立ち入る。
3197 = "Vừa nói, Olivy vừa quan sát kỹ hai bên trái phải rồi bước vào đường ray."
# monologue
# JP: この時間、全ての列車は走行しない。\nが――
3424 = "Vào giờ này, không có bất kỳ đoàn tàu nào chạy qua. Nhưng——"
# monologue
# JP: （すっ）
3463 = "（Soạt）"
# 【凪】
# display as 凪
# JP: 「わ、にーさん、なんばしよっと？」
2113 = "「Oa, anh Soutetsu, anh làm gì vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「堰おじいちゃんも」
2772 = "「Cả ông Seki nữa.」"
# monologue
# JP: 打ち合わせ通りに動けば、凪とふかみの驚いた声。
3257 = "Chúng tôi di chuyển theo đúng như đã bàn bạc, Nagi và Fukami liền cất tiếng kinh ngạc."
# monologue
# JP: ――オリヴィたちをはさみ、上り方向と下り方向。\nそれぞれに僕と堰さんが立ち、各々の前方を注視する。
1283 = "——Tôi và ông Seki đứng kẹp nhóm Olivy ở giữa, một người hướng lên, một người hướng xuống. Mỗi người đều chăm chú nhìn về phía trước."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「列車見張員だよ！　あーやって、保線作業者に危険が\nないよう、列車の接近を見張るお仕事！」
2806 = "「Đó là nhân viên canh gác tàu! Là công việc theo dõi tàu đang đến gần như thế kia để đảm bảo an toàn cho nhân viên bảo trì đường ray!」"
# 【凪】
# display as 凪
# JP: 「ほえー、\nいままでそんなんしてんの見たことなかったと！」
2241 = "「Ồ,\ntừ trước đến giờ tớ chưa thấy ai làm thế bao giờ!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「8620とキハ07sだけしか列車がなかったいままでと、\nユノイ線以外だって見るこれからはちがうからねー」
2840 = "「Bởi vì từ trước đến nay chỉ có mỗi tàu 8620 và Kiha 07S, nhưng từ giờ trở đi sẽ khác, chúng ta còn phải xem xét cả những tuyến khác ngoài tuyến Yui nữa mà~」"
# 【ふかみ】
# display as 深美
# JP: 「あ……そっか。ハチロクちゃんたちがこれから走る、\n肥颯線には、みかん鉄道さんの車輌も入ってくるかも」
2154 = "「A…… đúng rồi. Tuyến Hisatsu mà Hachiroku sắp chạy tới đây, có thể sẽ có cả xe của Đường sắt Mikan chạy vào nữa.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよー！　それに、\nオヒトヨ鉄道、もっと線路伸ばすんでしょ？」
2327 = "「Đúng đó! Hơn nữa, Đường sắt Ohito còn định kéo dài đường ray thêm nữa mà đúng không?」"
# 【凪】
# display as 凪
# JP: 「そうばい！\n日ノ本ぜーんぶに！　もっかいレール、走らせるばい！」
2567 = "「Đúng vậy! Sẽ cho đường ray chạy khắp toàn bộ Hinomoto một lần nữa!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら、そのときのためにも！　帝鉄式のやり方ちゃんと、\nおぼえておいたほうがいいから！」
2823 = "「Vậy thì, cũng là để chuẩn bị cho lúc đó! Tốt nhất là nên nhớ kỹ cách làm theo kiểu của Đường sắt Hoàng gia!」"
# 【凪】
# display as 凪
# JP: 「なっとくばーい！」
2420 = "「Thuyết phục luôn!」"
# monologue
# JP: オリヴィ式の教育法と凪の相性は抜群そうだ。
3343 = "Phương pháp giáo dục kiểu Olivy có vẻ rất hợp với Nagi."
# monologue
# JP: 前方注視を解けぬ僕にも、声からだけで、\n場の雰囲気がどんどん良くなっていることが伝わってくる。
3124 = "Dù tôi không thể rời mắt khỏi phía trước, nhưng chỉ qua giọng nói, tôi cũng cảm nhận được bầu không khí đang ngày càng tốt lên."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、ジッサイに線路のコーゾーみてみよー！\nまずは、[ろばん,1]路盤――これはジメンのことだねー」
2805 = "「Vậy, cùng xem cấu tạo thực tế của đường ray nào! Đầu tiên là nền đường—— tức là mặt đất đó.」"
# 【ふかみ】
# display as 深美
# JP: 「地面が[ろばん,1]路盤――\n積んである\x%lバラスト;#00ffc040;バラスト%l;#;とかも、路盤、です？」
2271 = "「Mặt đất là nền đường—— Vậy mấy viên \\x%lバラスト;#00ffc040;đá dăm%l;#; được xếp lên trên cũng là nền đường, ạ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「フカミ！　ナイス質問！　つんである\x%lバラスト;#00ffc040;バラスト%l;#;とかは、\n[どうしょう,1]道床っていうの、カンジで、道の、床って書くんだよ」
2585 = "「Fukami! Câu hỏi hay lắm! Đám \\x%lバラスト;#00ffc040;đá dăm%l;#; xếp lên đó, gọi là nền đá dăm, chữ Hán viết là đạo sàng, nghĩa là cái giường của con đường đó.」"
# 【ふかみ】
# display as 深美
# JP: 「どうしょう――道床」
2869 = "「Đạo sàng—— Nền đá dăm.」"
# 【凪】
# display as 凪
# JP: 「道の床やけん！　鉄道の床で、線路の床ばい！」
2356 = "「Là cái giường của con đường! Là cái giường của đường sắt, của đường ray!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ナギのゆーとーり！　そしたらね、次のクイズ！\n道床の上、レールの下」
2014 = "「Đúng như Nagi nói! Tiếp theo nè, câu đố tiếp theo! Ở trên nền đá dăm, ở dưới đường ray là gì?」"
# 【凪】
# display as 凪＆深美
# JP: 「\x%l枕木;#00ffc040;枕木%l;#;！」
1345 = "「\\x%l枕木;#00ffc040;Tà vẹt%l;#;!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「すごいすごい！　だーいせーかーい！」
2041 = "「Giỏi quá giỏi quá! Hoàn toàn chính xác~!」"
# 【凪】
# display as 凪＆深美
# JP: 「イェイ！」\n「いぇい」
2670 = "「Yay!」\n「Yay」"
# monologue
# JP: （パーン！）
3458 = "（Bốp!）"
# monologue
# JP: 小躍りせんばかりのオリヴィにのせられて、\n凪とふかみがハイタッチする。
3209 = "Bị cuốn theo sự phấn khích như muốn nhảy cẫng lên của Olivy, Nagi và Fukami đập tay ăn mừng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、\x%l枕木;#00ffc040;枕木%l;#;のうえ、イチバンてっぺんにレールがのって、\nこのゼンブで『線路』っていうことになるんだよ！」
2257 = "「Và, trên \\x%l枕木;#00ffc040;tà vẹt%l;#;, đường ray nằm ở vị trí cao nhất, tất cả những thứ này gộp lại được gọi là 『đường ray』 đó!」"
# 【ふかみ】
# display as 深美
# JP: 「路盤。道床。\x%l枕木;#00ffc040;枕木%l;#;。レール」
2720 = "「Nền đường. Nền đá dăm. \\x%l枕木;#00ffc040;Tà vẹt%l;#;. Đường ray.」"
# monologue
# JP: ひとつひとつを指差してでもいるのだろうか？\n教わったことをふかみが復唱・確認していく。
3314 = "Không biết con bé có đang chỉ tay vào từng thứ một không nhỉ? Fukami nhẩm lại và xác nhận những gì vừa được học."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうそう、でね？　さっきナギがいった、\n『チカスイが線路のキケン』っていうのは――」
2332 = "「Đúng rồi đúng rồi, tiếp theo nha? Cái mà Nagi vừa nói lúc nãy, 『nước ngầm là mối nguy hiểm đối với đường ray』 ấy——」"
# 【ふかみ】
# display as 深美
# JP: 「路盤の下とか近くとかに地下水が流れてると……\n路盤自体が下がって、線路が沈んじゃう。とか、です？」
2501 = "「Nếu nước ngầm chảy bên dưới hoặc gần nền đường thì…… bản thân nền đường sẽ bị lún xuống, làm đường ray cũng bị chìm theo. Kiểu vậy, ạ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「すごいねフカミ！　だいせーかい！！！」
2583 = "「Fukami giỏi quá nha! Hoàn toàn chính xác!!!」"
# 【ふかみ】
# display as 深美
# JP: 「すごく、ない、です。線路の構造わかったら……\nそしたら、わたし――クマ川くだりの一員、ですし」
2697 = "「Không, giỏi, đâu ạ. Nếu hiểu cấu tạo của đường ray thì…… với lại, em—— cũng là một thành viên của chuyến đi thuyền trên sông Kuma mà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっかー！　すごいんだね、クマ川くだり！」
2761 = "「Ra vậy~! Chuyến đi thuyền trên sông Kuma tuyệt thật đấy!」"
# 【ハチロク】
# display as 八六
# JP: 「うふふっ」
2228 = "「Ufufu.」"
# monologue
# JP: ハチロクの微笑。\nふりむけずとも、想像できる。
3128 = "Nụ cười mỉm của Hachiroku. Dù không quay lại, tôi cũng có thể tưởng tượng ra."
# monologue
# JP: ふかみも、凪も、堰さんたちも――\nどんなに誇らしげな表情を、揃って浮かべているのかが。
3426 = "Cả Fukami, Nagi và nhóm ông Seki nữa—— hẳn là ai nấy đều đang nở những nụ cười đầy tự hào."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でね？　ここ。その“チカスイのキケン”に、\nもろにやられてるとこっぽいんだよねー」
2460 = "「Tiếp nè? Chỗ này. Có vẻ như đang bị \"mối nguy hiểm từ nước ngầm\" đó tác động trực tiếp luôn đấy~」"
# 【堰】
# display as 堰
# JP: 「おお、やっぱりオリヴィ先生は、\nそいば一目でわかったとですか」
2141 = "「Ồ, quả nhiên là giáo quan Olivy, chỉ nhìn qua là hiểu ngay rồi.」"
# monologue
# JP: 堰さんが、僕の心をそのまま言葉にしてくれる。\nまさに此処こそ、ここ数年で――
3174 = "Ông Seki đã nói lên đúng suy nghĩ trong lòng tôi. Chính tại nơi này, trong vài năm qua——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかるよー！\nけっこーヒンパンに[ふんでい,1]噴泥、おきてるでしょ？」
2620 = "「Hiểu chứ~! Hiện tượng phụt bùn xảy ra khá thường xuyên đúng không?」"
# 【ふかみ】
# display as 深美
# JP: 「ふんでい……って？」
2662 = "「Phụt bùn…… là sao?」"
# 【凪】
# display as 凪
# JP: 「道床の底から、泥ばばーって吹き上げてきて、\n線路にぶしゃーってかかっちゃうことばい！」
2358 = "「Là bùn từ dưới đáy nền đá dăm phụt lên, rồi bắn tung tóe lên đường ray đó!」"
# 【ふかみ】
# display as 深美
# JP: 「\x%lバラスト;#00ffc040;バラスト%l;#;の底から泥が噴き出してくるの？\nそんなの――どうして？」
2572 = "「Bùn phụt ra từ dưới đáy \\x%lバラスト;#00ffc040;đá dăm%l;#; sao? Chuyện đó—— tại sao lại thế?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ゲンインはいろいろ考えられるけど、\nここの場合は、チカスイが一番あやしいとおもうの」
2039 = "「Có thể có nhiều nguyên nhân, nhưng trong trường hợp này, tớ nghĩ nước ngầm là đáng ngờ nhất.」"
# 【ふかみ】
# display as 深美
# JP: 「地下水が――。でも、湧き出したりとかしてない……\nですよね？　それでなんで、泥を噴き上げるんです？」
2262 = "「Nước ngầm——. Nhưng mà, nước đâu có trào ra hay gì đâu…… Đúng không ạ? Vậy tại sao bùn lại phụt lên?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わきだしてるのは、\n『そこからハイスイされてる』ってもいえるでしょ？」
2754 = "「Việc nước trào ra, cũng có thể nói là 『nước đang được thoát ra từ đó』 đúng không?」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　そうですね。はい」
2176 = "「A! Đúng vậy nhỉ. Vâng.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも、スイロがなくてハイスイされないから\n路盤の中にまじってドロをつくっちゃう」
1960 = "「Nhưng vì không có rãnh thoát nước nên nước không thoát đi được, nó sẽ trộn lẫn với nền đường tạo thành bùn.」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2157 = "「啊」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、列車はやっぱり重いから。\n通過するとき、ドロをぎゅーって押しつぶして」
2612 = "「Và, vì tàu hỏa rất nặng mà. Nên khi đi qua, nó sẽ ép chặt bùn xuống.」"
# 【ふかみ】
# display as 深美
# JP: 「そっか！　それで逃げ場をもとめて、出ていきやすい、\n道床――\x%lバラスト;#00ffc040;バラスト%l;#;の隙間から、ぶしゅー！」
2329 = "「Ra vậy! Thế là bùn tìm chỗ thoát, rồi phụt lên từ những khe hở dễ thoát nhất của nền đá dăm—— \\x%lバラスト;#00ffc040;đá dăm%l;#;!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だいせーかい！！」
2316 = "「Hoàn toàn chính xác!!」"
# 【治】
# display as 治
# JP: 「おお――」
2232 = "「Ồ——」"
# monologue
# JP: 感嘆の息。\n堰さんたちの言葉の温度が、ガラリと変わる。
3397 = "Tiếng thở dài thán phục. Giọng điệu của nhóm ông Seki thay đổi hoàn toàn."
# 【流】
# display as 流
# JP: 「そのとおりですわ。道床ば、\nどいだけ突き固めても、いっこうに治まりませんで」
2665 = "「Đúng là như vậy đó. Nền đá dăm, dù có đầm nện kỹ đến đâu thì cũng chẳng ăn thua gì.」"
# 【堰】
# display as 堰
# JP: 「水路も洗いなおしたとですが、どうにも見えんで。\n地下の深くからかとワシら思うとですが」
2839 = "「Chúng tôi cũng đã khơi thông lại rãnh nước rồi, nhưng vẫn chẳng thấy gì. Chúng tôi cứ nghĩ là do nước từ tít dưới sâu dưới lòng đất cơ.」"
# 【治】
# display as 治
# JP: 「オリヴィ先生。なんとか治められませんかのぅ」
2291 = "「Giáo quan Olivy. Cô có cách nào xử lý được không.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……ユノイ線ができてからずっととかだとムツカシそう。\nけど、急に起こるようになったとかなら」
1379 = "「……Nếu chuyện này xảy ra từ hồi tuyến Yui mới xây thì chắc khó giải quyết lắm. Nhưng nếu dạo gần đây mới bị thì có thể có cách.」"
# 【双鉄】
# display as 雙鐵
# JP: 「噴泥の発生はここ数年――\n確か、四年ほど前からだ。だよな？　ハチロク」
2663 = "「Hiện tượng phụt bùn mới xảy ra vài năm gần đây thôi—— Hình như là từ khoảng bốn năm trước. Đúng không? Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、保線台帳によりますと、四年前の六月に最初の\n噴泥が発生しております。その後は、二月に一度ほど」
2336 = "「Vâng, theo sổ theo dõi bảo trì đường ray, hiện tượng phụt bùn lần đầu tiên xảy ra vào tháng 6 bốn năm trước. Sau đó thì cứ khoảng hai tháng một lần.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「すごい！　保線台帳の中味ゼンブおぼえてるの！？」
2102 = "「Tuyệt quá! Cậu nhớ hết nội dung sổ theo dõi bảo trì đường ray luôn á!?」"
# 【ハチロク】
# display as 八六
# JP: 「今日、保線講習があるとのことでしたので、\n双鉄さまのご命令で、一時記憶をしておりますだけです」
2611 = "「Vì hôm nay có buổi học bảo trì đường ray, nên theo lệnh của ngài Soutetsu, tôi chỉ ghi nhớ tạm thời thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それでもすごいよ！　ユノイせんってだって、\n帝鉄時代からでしょお！？」
2794 = "「Thế cũng siêu lắm rồi! Tuyến Yui á, có từ thời Đường sắt Hoàng gia cơ mà!?」"
# 【ハチロク】
# display as 八六
# JP: 「いえ、台帳の付け始めが六年ほど前――双鉄さまが、\n\x%l保線部長;#00ffc040;保線部長%l;#;になられてからですので、大した分量では」
1923 = "「Không đâu, sổ bắt đầu ghi chép từ khoảng 6 năm trước—— từ khi ngài Soutetsu trở thành \\x%l保線部長;#00ffc040;trưởng bộ phận bảo trì đường ray%l;#;, nên khối lượng cũng không nhiều lắm đâu.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええ！？\n帝鉄時代の保線台帳、もしかしてなくしちゃったの！？」
2126 = "「Hảảả!? Sổ theo dõi bảo trì đường ray thời Đường sắt Hoàng gia, không lẽ bị mất rồi sao!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――ああ、いや！　大丈夫だ。多分、ある」
2081 = "「Ừm—— A, không! Không sao. Chắc là, vẫn còn.」"
# monologue
# JP: 汰斗さんに感謝する。\n次の間の蔵書・資料群。
3425 = "Thật biết ơn ông Taito. Kho sách và tài liệu ở phòng kế bên."
# monologue
# JP: おそらくは、あの中のどこかにあるはずだから。
3151 = "Chắc chắn là nó nằm đâu đó trong đống đó."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ならよかったー！　保線台帳は安全のカナメだからね！\nなにかあったら、すぐに見直せるよう[データベース,1]ＤＢ化するといいよ」
2809 = "「Vậy thì tốt rồi~! Sổ theo dõi bảo trì đường ray là mấu chốt của sự an toàn mà! Nên số hóa thành cơ sở dữ liệu để có gì là xem lại được ngay nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「言われてみればそのとおりだな。そこは予算と人員を\nかけるよう、ポーレットに進言してみよう」
2625 = "「Nghe em nói thì đúng là vậy. Tôi sẽ đề xuất với Paulette để phân bổ ngân sách và nhân sự cho việc đó.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ならオッケ！　で、ええと、\nここのサイショの噴泥が、四年前の六月、だっけ？」
2811 = "「Vậy là OK! Vậy, à ừm, lần phụt bùn đầu tiên ở đây, là vào tháng 6 bốn năm trước, đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね」
2544 = "「Đúng vậy ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、このシューヘンで、四年前の六月より前に、\nどんなおっきな工事とかがあったとか、わかる？」
2798 = "「Vậy, xung quanh đây, trước tháng 6 bốn năm trước, có công trình lớn nào được thi công không, mọi người biết không?」"
# 【ハチロク】
# display as 八六
# JP: 「……なるほど、保線台帳にはそのようなことも\n記録しておかなければならないのですね」
1394 = "「……Ra là vậy, trong sổ theo dõi bảo trì đường ray cũng phải ghi chép lại những chuyện như vậy nữa nhỉ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ってことは、キロクしてない？」
2768 = "「Nghĩa là, không có ghi chép lại hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「改善しよう。が、工事や建築等の記録自体であれば、\nすぐにあたれる。ふかみ、すまんがポーレットに」
2436 = "「Chúng tôi sẽ cải thiện. Nhưng nếu là hồ sơ về công trình hay xây dựng, thì có thể tra cứu ngay được. Fukami, phiền em gọi cho Paulette nhé.」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　はい！　電話します！　です！！」
2173 = "「A! Vâng! Em sẽ gọi ngay! Ạ!!」"
# monologue
# JP: 幸い、電波は通じるようだ。
3272 = "May quá, có vẻ sóng điện thoại vẫn bắt được."
# monologue
# JP: 待つことしばし――ふかみは、電話の中味を、\nそのまま僕らに伝えはじめる。
3366 = "Đợi một lát—— Fukami bắt đầu truyền đạt lại y nguyên nội dung cuộc điện thoại cho chúng tôi."
# 【ふかみ】
# display as 深美
# JP: 「四年前の六月。住宅一件新築、一件改築。\n五月。周辺に電線敷設。四月。クマゴルフリゾート」
2259 = "「Tháng 6 bốn năm trước. Xây mới một căn nhà, cải tạo một căn. Tháng 5. Lắp đặt đường dây điện xung quanh. Tháng 4. Khu nghỉ dưỡng Kuma Golf.」"
# monologue
# JP: オリヴィがすっと右手を挙げる。
3203 = "Olivy giơ tay phải lên tắp."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「まって。それってゴルフ場？」
2418 = "「Khoan đã. Đó là sân golf hả?」"
# 【ふかみ】
# display as 深美
# JP: 「ですです。[キノシタ,1]木下の廃駅の近くですから、\nここからは少し離れてますけど」
2333 = "「Đúng đúng. Ở gần nhà ga bỏ hoang Kinoshita, nên cách đây cũng hơi xa một chút.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも、アヤシーよね。ゴルフ場だし」
1962 = "「Nhưng mà, đáng ngờ lắm đó nha. Là sân golf mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……何故、ゴルフ場が噴泥の原因と怪しまれるのだ？」
1389 = "「……Tại sao, sân golf lại bị nghi ngờ là nguyên nhân gây phụt bùn?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だって、ゴルフ場ってフツー、\n森とか切り開いて！」
2615 = "「Bởi vì, sân golf bình thường, phải chặt phá rừng cây các thứ mà!」"
# 【堰】
# display as 堰
# JP: 「あああああああ！」
2164 = "「A a a a a a a!」"
# monologue
# JP: 瞬間、野太い奇声があがる。
3360 = "Đột nhiên, một tiếng thét kỳ lạ vang lên."
# 【堰】
# display as 堰
# JP: 「なるほどのー！　ゴルフに興味のなかったけん、\nまるっきり見落としとった！」
2037 = "「Ra là vậy! Tại không có hứng thú với golf, nên hoàn toàn bỏ sót mất!」"
# 【流】
# display as 流
# JP: 「森ば切り開くちゅうんは、おっきな水瓶いっこを\nまるまる、なくしてしまうようなもんばい！」
2547 = "「Chặt phá rừng cây, cũng giống như làm mất đi cả một bình chứa nước khổng lồ vậy đó!」"
# 【治】
# display as 治
# JP: 「それに、ゴルフ場いうたら池やらもあるじゃろうしの。\n水ば、どうためてどこにどう流しておるか――」
2668 = "「Hơn nữa, nhắc đến sân golf thì chắc chắn phải có hồ nước các kiểu. Nước được tích trữ thế nào, chảy đi đâu, chảy như thế nào——」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよね、カクニンして、ハイスイを整備してもらったら、\nもしかして、何かかわってくるかもしれないって思う」
2362 = "「Đúng đó, nếu xác nhận lại và nhờ họ làm hệ thống thoát nước đàng hoàng, thì có khi tình hình sẽ thay đổi cũng nên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その価値は大いにある。これもすぐに手配し、\nできるだけ早期に、僕とハチロクと――」
2624 = "「Rất đáng để thử. Việc này cũng sẽ được sắp xếp ngay, trong thời gian sớm nhất có thể, tôi và Hachiroku sẽ——」"
# 【堰】
# display as 堰
# JP: 「ワシらのうちからも一人行こう。\nそれと、できたら、オリヴィ先生も」
2437 = "「Một người trong số chúng tôi cũng sẽ đi. Và nếu được, mong giáo quan Olivy cũng đi cùng.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケ！　そのときにはオリヴィもいったげる！\nじゃ、ここのことはひとまずこれでオッケーだね？」
2862 = "「OK! Khi đó Olivy cũng sẽ đi cùng! Vậy, chuyện ở đây tạm thời thế là OK rồi nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2193 = "「嗯」" 
# 【堰】
# display as 堰
# JP: 「ありがとうございます、オリヴィ先生」
2414 = "「Cảm ơn cô rất nhiều, giáo quan Olivy.」"
# 【流】
# display as 流
# JP: 「ワシらが何年も苦しんどったことを、\nこぎゃんとあっさり」
2410 = "「Chuyện làm chúng tôi đau đầu suốt mấy năm nay, ngờ đâu lại được giải quyết nhẹ nhàng thế này.」"
# 【治】
# display as 治
# JP: 「他んところも、これからも――\nどうぞ、よろしくおねがいいたします」
2385 = "「Những chỗ khác nữa, và từ nay về sau—— Trăm sự nhờ cô giúp đỡ.」"
# monologue
# JP: 三長老にならって僕も頭をさげる。
3249 = "Tôi cũng cúi đầu theo ba vị trưởng lão."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケ！　オリヴィ、がんばっちゃうよー！」
2864 = "「OK! Olivy sẽ cố gắng hết mình~!」"
# 【ハチロク】
# display as 八六
# JP: 「すばらしいですオリヴィちゃん！\nまるで――まるで名探偵のようで」
2289 = "「Tuyệt vời quá Olivy! Cứ như—— cứ như một danh thám tử vậy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あはははは、オリヴィ、スイリなんてできないよー」
2161 = "「Ahahahaha, Olivy không biết suy luận gì đâu~」"
# monologue
# JP: 苦笑まじりに手をふられれば、\nハチロクはいとも不思議そうに小首を傾げる。
3214 = "Thấy cô bé vừa cười gượng vừa xua tay, Hachiroku liền nghiêng đầu vẻ vô cùng khó hiểu."
# 【ハチロク】
# display as 八六
# JP: 「けれど、いまされたのは、まさに推理そのものでは」
2070 = "「Nhưng mà, những gì em vừa làm, chính là suy luận đó thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ただのケーケン！　ムナカタがやっぱりゴルフ場の水で\nこまらされたことあったから！」
2060 = "「Chỉ là kinh nghiệm thôi! Tại vì Munakata cũng từng bị làm khó dễ bởi nước từ sân golf mà!」"
# 【流】
# display as 流
# JP: 「あああ！　そぎゃんわけでしたか。\nいや、記録ば、まっこと大切ですのう」
2167 = "「A a a! Ra là vậy sao. Chà, ghi chép lại, quả thật là rất quan trọng.」"
# 【治】
# display as 治
# JP: 「じゃのう、ワシらも年じゃ。こっちの方のことも、\n引き継ぎすることば考えんと」
2609 = "「Đúng vậy, chúng tôi cũng có tuổi rồi. Những việc bên này, cũng phải tính đến chuyện bàn giao lại thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　それすごくいいと思う！\n土木の技術レベルは、セキたち、とっても高いし！」
2203 = "「Vâng! Cháu nghĩ như vậy rất tốt đó! Trình độ kỹ thuật xây dựng của ông Seki và mọi người rất cao mà!」"
# 【堰】
# display as 堰
# JP: 「ほ！　オリヴィ先生にほめてもらえるとは」
2143 = "「Hô! Lại được giáo quan Olivy khen ngợi nữa.」"
# 【流】
# display as 流
# JP: 「素人ながらに、長年やってきた甲斐があったのう」
1993 = "「Tuy là dân nghiệp dư, nhưng bõ công làm bao nhiêu năm nay nhỉ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そのギジュツと、今までのキロクとかケーケンと、\n最新のチシキがあわさったら、ムテキだから！」
2419 = "「Kỹ thuật đó, cộng với những ghi chép, kinh nghiệm từ trước đến nay, và cả kiến thức mới nhất nữa thì sẽ là vô địch luôn!」"
# 【凪】
# display as 凪
# JP: 「おおお！　ふかみちゃんちのじーちゃんたち、\n無敵になるばい！！」
2235 = "「Ooo! Mấy người ông của bé Fukami, sắp trở nên vô địch rồi nha!!」"
# 【ふかみ】
# display as 深美
# JP: 「わ。なんだか、わたしまで嬉しくなっちゃう」
2115 = "「Oa. Sao tự nhiên, tớ cũng thấy vui lây luôn á.」"
# monologue
# JP: どころか、僕もだ。\nオリヴィの言葉は、笑顔は、やる気を大きく高めてくれる。
3112 = "Đâu chỉ thế, cả tôi cũng vậy. Lời nói và nụ cười của Olivy đã tiếp thêm động lực rất lớn cho chúng tôi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それじゃ！　次のポイントにむかっちゃおー！」
2830 = "「Vậy thì! Hướng đến địa điểm tiếp theo thôi nào~!」"
# monologue
# JP: 笑って言って、オリヴィが大きく一歩を踏み出す。
3213 = "Nói xong với nụ cười trên môi, Olivy bước một bước thật dài."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「みんなまだヘーキ？　歩ける？\n他にもあとちょっとチェックしたいとこが」
2277 = "「Mọi người vẫn ổn chứ? Còn đi được không? Còn vài chỗ nữa em muốn kiểm tra một chút.」"
# 【ニイロク】
# display as 二六
# JP: 「あっ！？」
2177 = "「A!?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！」
2085 = "「Ực!」"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ！？」
2293 = "「Olivy!?」"
# monologue
# JP: 苦しげな声にふりかえる。\nオリヴィはふらりとよろめいて――っ！！？
3202 = "Nghe thấy giọng nói đau đớn, tôi quay lại. Olivy lảo đảo, loạng choạng——!!?"
# monologue
# JP: （がしっ）
3455 = "（Chụp lấy）"
# 【凪】
# display as 凪
# JP: 「どぎゃんしたと？　つまづいちゃったと？」
1971 = "「Sao vậy? Bị vấp hả?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、うん。\nちょっと、オリヴィ、はしゃぎすぎちゃったかも」
2184 = "「A, ừm.\nChắc là Olivy, hơi phấn khích quá đà rồi.」"
# 【凪】
# display as 凪
# JP: 「無理したらいけんよ？\nオリヴィ、おばーちゃんなんやけんね」
2064 = "「Không được cố quá đâu nha? Olivy, là bà lão rồi mà lị.」"
# monologue
# JP: （ひょいっ）
3454 = "（Bế bổng）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わっ！？」
2111 = "「Oa!?」"
# 【ふかみ】
# display as 深美
# JP: 「あ、オリヴィちゃんいーなー」
2186 = "「A, Olivy thích ghê nha.」"
# monologue
# JP: いとも軽々。\n凪がオリヴィをお姫様だっこする。
3109 = "Vô cùng nhẹ nhàng. Nagi bế bổng Olivy theo kiểu bế công chúa."
# monologue
# JP: ……大人になったと、その仕草にまた、つくづく思う。\nなんともしみじみしてしまう。
1318 = "……Cử chỉ đó lại khiến tôi cảm nhận sâu sắc rằng con bé đã lớn. Thật sự cảm thấy bùi ngùi."
# 【ハチロク】
# display as 八六
# JP: 「うふふっ」
# 2228 = "「嘻嘻」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1994 = "「Hachiroku.」"
# monologue
# JP: 手を差し伸べる。
3254 = "Tôi đưa tay ra."
# monologue
# JP: と、ハチロクは実に微妙な――\n喜びと不満を交えたような顔になる。
3070 = "Thấy vậy, Hachiroku làm ra vẻ mặt vô cùng khó tả—— như thể vui sướng và bất mãn đan xen."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
# 1970 = "「你怎麼了？」" 
# 【ハチロク】
# display as 八六
# JP: 「いえ――その、わたくしも確かに、\nおばあちゃんではありますけれども」
1898 = "「Dạ không—— ừm, đúng là em, cũng là một bà lão rồi nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや？　ハチロクはいつでもレディさ。\n僕にとって、世界一可憐で美しい」
2402 = "「Đâu có? Hachiroku lúc nào cũng là một quý cô. Đối với tôi, em là người đáng yêu và xinh đẹp nhất thế giới.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2100 = "「Ôi chao.」"
# monologue
# JP: おばあちゃん扱いなどできようもない。\nこれほど可憐なハチロクの扱い方など、ひとつしかない。
3263 = "Sao tôi có thể đối xử với em ấy như một bà lão được chứ. Chỉ có một cách duy nhất để đối xử với một Hachiroku đáng yêu thế này thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「だから僕は、僕の姫君をエスコートをしたいと思った。\nいささか、戸惑わせてしまったようだが」
2468 = "「Vì thế, tôi muốn hộ tống nàng công chúa của mình. Có vẻ như đã làm em hơi bối rối rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、とんでもないことでございます。双鉄さま」
1900 = "「Không đâu, không có chuyện đó đâu ạ. Ngài Soutetsu.」"
# monologue
# JP: 手が伸びてくる。\n頭を下げれば、すぐに首へと絡みついてくる。
3216 = "Bàn tay em vươn ra. Khi tôi cúi đầu xuống, đôi tay ấy lập tức quàng qua cổ tôi."
# monologue
# JP: だからそのまま、抱き上げる。
3279 = "Và thế là, tôi bế bổng em lên."
# monologue
# JP: （ふわっ）
3448 = "（Nhẹ bẫng）"
# monologue
# JP: 途端に、腕が、こころが喜ぶ。\n僕にいちばんしっくり馴染む――その暖かさと重みとに。
3415 = "Ngay lập tức, đôi tay, và cả trái tim tôi đều vui sướng. Sự ấm áp và sức nặng ấy—— là thứ vừa vặn và quen thuộc nhất với tôi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄、さま――決して、決して、\nわたくしを離さないでくださいましね」
2844 = "「Ngài Soutetsu—— Tuyệt đối, tuyệt đối, đừng buông tay em ra nhé.」"
# monologue
# JP: （ぎゅっ）
3457 = "（Siết chặt）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、離すものか」
2217 = "「Ừ, sao tôi có thể buông ra được chứ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あはは、ハチロクってばおおげさなのー」
2162 = "「Ahaha, Hachiroku làm quá lên rồi đó~」"
# 【凪】
# display as 凪
# JP: 「おおげさばい！」
2347 = "「Làm quá nha!」"
# 【ふかみ】
# display as 深美
# JP: 「お、おおげさじゃないよぉ」
2148 = "「K-không có làm quá đâu.」"
# monologue
# JP: ふかみが膝をふるわせている。
3322 = "Đầu gối Fukami đang run lẩy bẩy."
# monologue
# JP: 横方向にころげでもせぬ限り、落ちはせぬだろうが――\nああいや。
3218 = "Chỉ cần không lăn ngang thì chắc cũng không rơi xuống đâu—— À không."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ。本当に怖かったら飛び込めばいい。\n飛び込み台だと思えば、この程度の高さ、ふかみなら」
2592 = "「Fukami. Nếu thực sự sợ quá thì cứ nhảy xuống đi. Cứ coi như cầu nhảy, độ cao cỡ này, với Fukami thì nhằm nhò gì.」"
# 【ふかみ】
# display as 深美
# JP: 「あ」
# 2157 = "「啊」" 
# monologue
# JP: 途端、ふかみの震えが止まる。\n正確な高さは知らぬが、１０メートルは無いはずだ。
3265 = "Ngay lập tức, Fukami ngừng run rẩy. Tuy không biết độ cao chính xác, nhưng chắc chắn không tới 10 mét."
# 【ふかみ】
# display as 深美
# JP: 「ですね、このへんだったら深さもあるし。\n全然。わたし飛び込めちゃいます」
1933 = "「Đúng nhỉ, chỗ này cũng khá sâu. Hoàn toàn ổn. Tớ nhảy xuống được luôn.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、みんな落ち着いたねー！」
2820 = "「Vậy, mọi người bình tĩnh lại rồi nha~!」"
# 【凪】
# display as 凪
# JP: 「へいちゃらばーい！」
2337 = "「Chuyện nhỏ như con thỏ!」"
# 【ふかみ】
# display as 深美
# JP: 「もう平気、です」
2444 = "「Đã ổn rồi, ạ.」"
# 【ハチロク】
# display as 八六
# JP: 「は、はい。\nわたくしも、話を聞く程度でしたら大丈夫です」
2487 = "「V-vâng. Em cũng vậy, nếu chỉ là nghe nói chuyện thì không sao ạ.」"
# 【ニイロク】
# display as 二六
# JP: 「…………」
# 1355 = "「……」" 
# monologue
# JP: ニイロクだけは、赤井宮司の胸に包帯を埋めているが――\n赤井宮司が落ち着いていれば、問題あるまい。
3134 = "Chỉ có Niiroku là vẫn vùi lớp băng gạc vào ngực đền chủ Akai—— Nhưng đền chủ Akai vẫn bình tĩnh thì chắc không có vấn đề gì."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それじゃ、今日の最後はここ！　\nクマ川第四橋梁！」
2816 = "「Vậy thì, điểm đến cuối cùng của ngày hôm nay là đây! Cầu đường sắt thứ tư sông Kuma!」"
# monologue
# JP: いって、凪の腕の中から、\nオリヴィは視線にぐるり、クマ川を巡らせる。
3206 = "Nói rồi, từ trong vòng tay Nagi, Olivy đưa mắt nhìn quanh sông Kuma."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「すごくきれー！\nここはきっと、ユノイ線のゴジマンだね～！」
2635 = "「Đẹp quá đi~! Đây chắc chắn là niềm tự hào của tuyến Yui rồi~!」"
# 【ハチロク】
# display as 八六
# JP: 「はい。そのとおりです、オリヴィちゃん」
2209 = "「Vâng. Đúng là vậy đó, Olivy.」"
# 【ふかみ】
# display as 深美
# JP: 「8620の通過にあわせて、\n川下り船、この橋の下、くぐらせる。です」
2438 = "「Chúng em sẽ căn thời gian 8620 đi qua, để thuyền xuôi dòng chui qua dưới gầm cây cầu này. Ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それすごいねー！\nオリヴィも下からハチロクみてみたい！」
2765 = "「Nghe tuyệt quá nha~! Olivy cũng muốn thử nhìn Hachiroku từ dưới lên xem sao!」"
# 【凪】
# display as 凪
# JP: 「なら、早く乗りにくるとよかばい！\n凪さま、そんときゃ船頭するけんね！！」
2799 = "「Vậy thì, cậu mau đến đi thuyền đi! Lúc đó Nagi đại nhân sẽ chèo thuyền cho nha!!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、そうだよね。早いうちにしないと、\nオリヴィとⅨ号でここ走るようになるんだもんね」
2181 = "「A, đúng rồi ha. Không đi sớm thì, Olivy sẽ phải chạy Đầu máy số 9 qua đây mất thôi.」"
# 【凪】
# display as 凪
# JP: 「そーばい！」
2354 = "「Đúng đó nha!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかったー！　じゃ、早いうちに、オリヴィ、\nユノイ線のゴジマン！　舟の上からもみせてもらうねー」
2302 = "「Biết rồi~! Vậy, Olivy sẽ đi sớm thôi, niềm tự hào của tuyến Yui! Cậu cho tớ xem từ trên thuyền luôn nha~」"
# monologue
# JP: 明るく笑って、けれども次の瞬間に、\nオリヴィは顔をひきしめる。
3211 = "Cô bé cười tươi rói, nhưng ngay khoảnh khắc tiếp theo, khuôn mặt Olivy trở nên nghiêm túc."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そのときのためにも――ナギ、ちょっとおろして？」
2593 = "「Cũng là để chuẩn bị cho lúc đó—— Nagi, thả tớ xuống chút được không?」"
# 【凪】
# display as 凪
# JP: 「よかとよー」
2299 = "「Được thôi~」"
# monologue
# JP: 両足が橋梁につくやいなやで、\nオリヴィはその身をふせて、顔をぺったりレールに付ける。
3210 = "Ngay khi hai chân vừa chạm mặt cầu, Olivy liền nằm rạp xuống, áp sát mặt vào đường ray."
# 【ふかみ】
# display as 深美
# JP: 「わ――すごい。\nまるで、レールにキスしてるみたい――です」
2099 = "「Oa—— ngầu quá. Cứ như thể, đang hôn đường ray vậy—— ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよだよ！　線路工手はレールにkissして一人前！\nこーしなきゃ、レールをちゃんと見られないから！」
2369 = "「Đúng đó đúng đó! Công nhân đường sắt phải hôn đường ray thì mới được công nhận là lành nghề! Nếu không làm vậy thì không thể nhìn rõ đường ray được đâu!」"
# 【凪】
# display as 凪
# JP: 「なら、凪様も一人前になると！」
2827 = "「Vậy thì, Nagi đại nhân cũng sẽ trở nên lành nghề!」"
# monologue
# JP: 単純明快。\n凪は即座にオリヴィに習い、レールにぺたりその顔を――
3091 = "Đơn giản, dễ hiểu. Nagi ngay lập tức học theo Olivy, áp mặt sát vào đường ray——"
# 【凪】
# display as 凪
# JP: 「お？　おお？　あそこから、\nレール、ちょこーっと沈んどるばい」
2146 = "「Ồ? Ồ ồ? Từ chỗ kia, đường ray, hơi bị lún xuống một chút kìa.」"
# 【ふかみ】
# display as 深美
# JP: 「え？　うそっ！？」
2134 = "「Hả? Đùa sao!?」"
# 【ハチロク】
# display as 八六
# JP: 「……ああ、まことに左様でございますね」
1375 = "「……A, quả đúng là như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2193 = "「嗯」" 
# monologue
# JP: レールにキスするようにして、初めて気づくその光景。\nなるほど、これが“平らでない”こと。つまり、不陸か。
3136 = "Phải hôn lên đường ray mới có thể nhận ra được quang cảnh đó. Ra là vậy, đây chính là \"không bằng phẳng\". Tức là, bị võng xuống sao."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ここ――この橋の保線不安、\n早くカイショーしないとだよねー」
2400 = "「Chỗ này—— Nỗi lo bảo trì đường ray của cây cầu này, phải nhanh chóng giải quyết thôi nhỉ~」"
# 【流】
# display as 流
# JP: 「ああ、オリヴィ先生は、\nさすがお気づきになられましたか」
2243 = "「Ồ, quả nhiên là giáo quan Olivy,\nnhận ra ngay nhỉ.」"
# monologue
# JP: 堰さんと治さんが列車見張りをしてくれているゆえ、\nオリヴィの話し相手は流さんだ。
3171 = "Vì ông Seki và ông Osamu đang làm nhiệm vụ canh gác tàu, nên người nói chuyện với Olivy là ông Ryu."
# 【流】
# display as 流
# JP: 「こん橋だけ、\n微妙～にですが、レールが全体に沈んでしもうて」
2843 = "「Chỉ có cây cầu này, là đường ray bị lún xuống một cách rất~ khó nhận biết.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。[ふりく,1]不陸だよねー。\nナガレは、ゲンインわかってる？」
2210 = "「Ừm. Là bị võng xuống nhỉ. Ryu, ông có biết nguyên nhân không?」"
# 【流】
# display as 流
# JP: 「……[はしまくらぎ,2]橋枕木ばふるぅなっとるんだと思います。\nばってんこればかりはなかなか手配がつきませんで」
1372 = "「……Tôi nghĩ là do tà vẹt cầu đã quá cũ rồi. Nhưng ngặt nỗi không thể xoay xở được loại này.」"
# 【堰】
# display as 堰
# JP: 「\x%l枕木;#00ffc040;枕木%l;#;[けいざい,1]繋材もじゃー！　あれも老朽化しとるけん、\n支える力が弱ぅなっておるのかもしれん」
2774 = "「Cả vật liệu liên kết \\x%l枕木;#00ffc040;tà vẹt%l;#; nữa! Cái đó cũng cũ nát rồi, có lẽ lực chống đỡ đã yếu đi.」"
# 【ハチロク】
# display as 八六
# JP: 「\x%l枕木;#00ffc040;枕木%l;#;[けいざい,1]繋材――この、\x%l枕木;#00ffc040;枕木%l;#;同士をつなぎ合わせている\n鉄の薄板――のことでございましたか」
2537 = "「Vật liệu liên kết \\x%l枕木;#00ffc040;tà vẹt%l;#;—— là tấm thép mỏng liên kết các thanh \\x%l枕木;#00ffc040;tà vẹt%l;#; với nhau này—— đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そう聞いたな」
2213 = "「À, tôi cũng từng nghe nói vậy.」"
# monologue
# JP: 橋梁上も、もちろん日常点検は重ねていた。\nが、今ふりかえれば『漫然と』していたのだと思い知る。
3336 = "Tất nhiên là chúng tôi cũng thường xuyên kiểm tra hàng ngày trên cầu. Nhưng giờ ngẫm lại mới thấy mình đã làm một cách \"hời hợt\"."
# 【双鉄】
# display as 雙鐵
# JP: 「石積みの[きょうきゃく,1]橋脚の上に、鋼鉄の[はしげた,1]橋桁。その上に\x%l枕木;#00ffc040;枕木%l;#;があり、\nレールが敷かれ、\x%l枕木;#00ffc040;枕木%l;#;同士は\x%l枕木;#00ffc040;枕木%l;#;[けいざい,1]繋材で連結されている」
2644 = "「Trên trụ cầu xây bằng đá là dầm cầu bằng thép. Trên đó có \\x%l枕木;#00ffc040;tà vẹt%l;#;, đường ray được trải lên, các \\x%l枕木;#00ffc040;tà vẹt%l;#; được nối với nhau bằng vật liệu liên kết \\x%l枕木;#00ffc040;tà vẹt%l;#;.」"
# monologue
# JP: \x%lバラスト;#00ffc040;バラスト%l;#;なしの構造さえ、しっかりと把握できてなかった。\n自分の不明、不勉強をただ、恥じ入るしかない。
3229 = "Đến cả cấu trúc không có \\x%lバラスト;#00ffc040;đá dăm%l;#; mà tôi cũng chưa nắm rõ. Chỉ biết tự cảm thấy xấu hổ vì sự thiếu hiểu biết và lười học hỏi của bản thân."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。\x%l枕木;#00ffc040;枕木%l;#;繋材も[はしまくらぎ,2]橋枕木もなんとかした方がいーね。\nけど、ゼンタイがシズんでる理由は、たぶん別だよー」
2219 = "「Ừm. Vật liệu liên kết \\x%l枕木;#00ffc040;tà vẹt%l;#; và tà vẹt cầu cũng nên xử lý thì hơn. Nhưng mà, lý do khiến toàn bộ bị lún xuống, có lẽ là do cái khác đó~」"
# 【双鉄】
# display as 雙鐵
# JP: 「別？」
2599 = "「Cái khác?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。たぶんね？」
2224 = "「Ừm. Chắc vậy nha?」"
# monologue
# JP: いって、トンっと、\nオリヴィはブーツの底で、橋桁の鉄を踏み鳴らす。
3207 = "Nói rồi, cộp một tiếng, Olivy dùng đế giày giậm mạnh lên phần thép của dầm cầu."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「０．５ミリか、１ミリか。\n[きょうきゃく,1]橋脚ソノモノが、すこ～しシズんだんだと思うの」
2278 = "「Khoảng 0.5 mm, hay 1 mm gì đó. Tớ nghĩ là bản thân trụ cầu đã lún xuống một chú~t xíu.」"
# 【ふかみ】
# display as 深美
# JP: 「あっ！」
# 2171 = "「啊！」" 
# 【凪】
# display as 凪
# JP: 「やけん！　橋のとこ全体が、\nぜーえんぶまとめてちょっとずつ沈みよったと！？」
2499 = "「Ra là vậy! Toàn bộ cây cầu, tất tần tật cùng lún xuống một chút sao!?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「って、かんがえるのがシゼンだと思う。\n\x%l枕木;#00ffc040;枕木%l;#;繋材も見た目悪いけど、四、五年はもちそうだし」
2666 = "「Tớ nghĩ suy luận như vậy là tự nhiên nhất. Vật liệu liên kết \\x%l枕木;#00ffc040;tà vẹt%l;#; tuy trông hơi tã nhưng chắc cũng trụ được 4, 5 năm nữa.」"
# 【流】
# display as 流
# JP: 「ゆーても……橋脚の[かさ]嵩上げなんぞ、\nわしらにゃあとても」
2694 = "「Nói thì nói vậy…… chứ việc nâng cao trụ cầu, đối với chúng tôi thì quả là……」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。無理だと思う。\nそんなの、お金がいくらあってもたりないし」
2215 = "「Ừm. Tớ cũng nghĩ là không thể. Làm cái đó thì có bao nhiêu tiền cũng không đủ đâu.」"
# 【流】
# display as 流
