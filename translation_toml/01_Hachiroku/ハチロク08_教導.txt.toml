# 【オリヴィ】
# display as 奥莉薇
# JP: 「だって、ゴルフ場ってフツー、\n森とか切り開いて！」
2615 = "「畢竟建設高爾夫球場，一般都要開山毀林什麼的呀！」" 

# 【堰】
# display as 堰
# JP: 「あああああああ！」
2164 = "「啊啊啊！」" 

# monologue
# JP: 瞬間、野太い奇声があがる。
3360 = "突然我們背後傳來粗壯的尖叫聲。" 

# 【堰】
# display as 堰
