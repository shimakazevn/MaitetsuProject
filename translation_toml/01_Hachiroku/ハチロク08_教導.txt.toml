2421 = "「Tớ, nghĩ vậy. Nếu là Olivy, độ ưu tiên của cây cầu này sẽ là, thay \\x%l枕木;#00ffc040;tà vẹt%l;#; ở giữa trước, rồi đến đệm có thể điều chỉnh, cuối cùng mới là thay đường ray.」"
# 【ふかみ】
# display as 深美
# JP: 「……あの……ええと」
1386 = "「……À…… ừm.」"
