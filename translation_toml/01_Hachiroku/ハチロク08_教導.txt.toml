2217 = "「嗯，我怎麼可能鬆開」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あはは、ハチロクってばおおげさなのー」
2162 = "「啊哈哈，八六你也太小題大做啦」" 

# 【凪】
# display as 凪
