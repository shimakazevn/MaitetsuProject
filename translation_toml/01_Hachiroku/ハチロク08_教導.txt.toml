2418 = "「慢著，說的是高爾夫球場？」" 

# 【ふかみ】
# display as 深美
# JP: 「ですです。[キノシタ,1]木下の廃駅の近くですから、\nここからは少し離れてますけど」
2333 = "「對對，是在木下的廢車站附近，離這裡有點距離」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも、アヤシーよね。ゴルフ場だし」
1962 = "「但是感覺最有可能出問題呀，畢竟是高爾夫球場」" 

