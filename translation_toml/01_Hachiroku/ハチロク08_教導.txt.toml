2668 = "「而且說到高爾夫球場，肯定少不了水池，那裡的水又是從哪裡獲得，如何排放——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよね、カクニンして、ハイスイを整備してもらったら、\nもしかして、何かかわってくるかもしれないって思う」
2362 = "「就是這樣，奧莉薇覺得應該去確認一下那裡，讓管理者做好排水措施，說不定情況就會改善」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その価値は大いにある。これもすぐに手配し、\nできるだけ早期に、僕とハチロクと――」
2624 = "「的確意義不菲，對此也會儘快做好安排，我和八六也會儘早前去考察，另外再——」" 

# 【堰】
# display as 堰
