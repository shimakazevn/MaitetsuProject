2289 = "「奧莉薇真棒！簡直——簡直就像名偵探一樣」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あはははは、オリヴィ、スイリなんてできないよー」
2161 = "「啊哈哈哈，奧莉薇可搞不來什麼推理分析」" 

