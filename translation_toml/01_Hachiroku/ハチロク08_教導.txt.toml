2064 = "「可別亂來噢，你都已經算老奶奶了」" 

# monologue
# JP: （ひょいっ）
3454 = "（抱起）" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わっ！？」
2111 = "「哇！？」" 

# 【ふかみ】
# display as 深美
