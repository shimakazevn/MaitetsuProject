[script]
# lines: 448 
# 【ハチロク】
# display as 八六
# JP: 「ああっ！」
1559 = "「A!」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうしたハチロク」
1725 = "「Sao vậy Hachiroku?」"
# monologue
# JP: 不意の歓声の理由を問えば、\nハチロクは、浮き立つ声で応えてくれる。
2293 = "Khi tôi hỏi lý do cho tiếng reo hò bất ngờ đó,\nHachiroku đáp lại bằng một giọng đầy hào hứng."
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様！　ただいまの停車駅、中慶北駅において、ようやく機関車交換がなりましたので」
2067 = "「Vâng thưa ngài Soutetsu! Tại ga dừng hiện tại, ga Bắc Trung Khánh, cuối cùng thì việc thay đầu máy cũng đã hoàn tất rồi ạ.」"
# 【志寰】
# display as 志寰
# JP: 「双鉄さん、日々姫さん、レイルロオド・ハチロク。\nさっきは、本当にありがとうございました」
2066 = "「Anh Soutetsu, chị Hibiki, Railord Hachiroku.\nVừa nãy thực sự cảm ơn mọi người rất nhiều.」"
# 【西瓜】
# display as 西瓜
# JP: 「おかげで遅延は二時間以内にまとまりそうです。\n先生たちのおかげです」
1774 = "「Nhờ vậy mà thời gian chậm trễ có vẻ đã được kiểm soát trong vòng hai tiếng.\nTất cả là nhờ các vị đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1525 = "「À——」"
# monologue
# JP: そうか、機関車・乗務員交代により、\n志寰君と西瓜が救援乗務から開放されたのか。
2327 = "Ra vậy, nhờ việc thay đổi đầu máy và kíp lái,\nChí Hoàn và Tây Qua đã được giải phóng khỏi nhiệm vụ cứu hộ rồi sao."
# monologue
# JP: ふたりともさすがに疲れた様子だが、\n達成感を滲ませる笑顔が、疲労の色さえ塗りつぶしている。
2642 = "Dù cả hai đều lộ rõ vẻ mệt mỏi,\nnhưng nụ cười ánh lên cảm giác thành tựu đã xóa nhòa đi cả sắc thái mệt nhọc đó."
# 【双鉄】
# display as 雙鐵
# JP: 「実に見事な救援だった。引出しもブレーキも、\nなんとなめらかな挙動かと、大いに感心させられた」
1899 = "「Thực sự là một cuộc cứu hộ xuất sắc. Cả lúc khởi hành lẫn lúc phanh hãm,\nchuyển động mượt mà đến mức khiến tôi vô cùng thán phục.」"
# 【志寰】
# display as 志寰
# JP: 「！！　双鉄さんに運転操作をほめていただけるなんて。\nとても強い励みになります！　ありがとうございます！」
1566 = "「!! Được anh Soutetsu khen ngợi kỹ năng lái tàu như vậy.\nThật sự là một sự khích lệ rất lớn đối với em! Cảm ơn anh rất nhiều!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
1595 = "「Hửm!?」"
# monologue
# JP: 僕の運転操作など、大したレベルとも思えんのだが……\nよほど良いとこ撮りの資料でも渡っているのだろうか？
2441 = "Kỹ năng lái tàu của tôi cũng đâu đến mức xuất sắc gì cho cam……\nChẳng lẽ Kisaki đã gửi cho họ những tài liệu quay lại những khoảnh khắc đẹp nhất của tôi sao?"
# monologue
# JP: まぁしかし、今は招聘されている立場ゆえ、\n謙遜するのも、逆に失礼になるかもしれん。
2227 = "Nhưng mà, hiện tại tôi đang ở vị thế của một khách mời,\nnếu khiêm tốn quá thì ngược lại có thể sẽ thành ra thất lễ."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の方も、志寰君を見習いたいと思った。\n技術の練磨――悉究に、いきつくところはないからな」
1532 = "「Bản thân tôi cũng muốn học hỏi từ Chí Hoàn.\nBởi vì việc rèn luyện kỹ thuật——sự tất cứu, là không có điểm dừng mà.」"
# 【志寰】
# display as 志寰
# JP: 「！！　とても光栄です！　僕はただ、基本通りのことを、\n基本通りにやっているだけかと思いますけど、それでも」
1900 = "「!! Em rất vinh hạnh! Em nghĩ mình chỉ làm theo những điều cơ bản,\nmột cách cơ bản nhất thôi, nhưng dù vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1555 = "「Ừ.」"
# monologue
# JP: 苦し紛れに選んだ言葉が、\n思わぬ納得を呼び込んでくれる。
2443 = "Những lời tôi chọn trong lúc bối rối,\nlại mang đến sự đồng tình ngoài mong đợi."
# monologue
# JP: 基本なら、白紙の状態から徹底的に、今もってなお、\nハチロクが僕の全身に、叩き込み続けてくれているゆえ。
2609 = "Nếu nói về \"cơ bản\", thì từ lúc tôi còn là một tờ giấy trắng cho đến tận bây giờ,\nHachiroku vẫn luôn không ngừng nhồi nhét nó vào từng tế bào của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、逆に、僕にとっての単なる基本動作が、\n志寰君には熟達した技量と映っているかもしれんのか」
1478 = "「Ra vậy, nói cách khác, những thao tác cơ bản đối với tôi,\ntrong mắt Chí Hoàn lại trở thành kỹ năng điêu luyện sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、あるかも！　\x%l指差喚呼;#00ffc040;指差喚呼%l;#;とかしないんだぁって、\n私、志寰君と西瓜ちゃんの運転、さっき見てて思ったし」
1552 = "「A, có thể lắm! Em vừa xem Chí Hoàn và Tây Qua lái tàu,\nđã thắc mắc sao họ không làm \x%l指差喚呼;#00ffc040;chỉ tay hô xác nhận%l;#; đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1555 = "「啊」" 
# monologue
# JP: 言われてみれば、だ。
2357 = "Nghe em ấy nói vậy mới để ý."
# monologue
# JP: 救援車の運転台内。\n志寰君も西瓜も\x%l指差喚呼;#00ffc040;指差喚呼%l;#;をしていなかったような気がする。
2366 = "Trong buồng lái của đầu máy cứu hộ.\nHình như Chí Hoàn và Tây Qua đều không thực hiện \x%l指差喚呼;#00ffc040;chỉ tay hô xác nhận%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「……状況が緊迫していたとはいえ、気づけんものだな。\n自分の見たいものしか見れていない、ということなのか」
1108 = "「……Dù lúc đó tình hình có căng thẳng, nhưng tôi lại chẳng hề nhận ra.\nQuả nhiên con người chỉ nhìn thấy những gì mình muốn thấy thôi sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「そいば、普通のことでしょお。私の場合は、\n目にうつるもの全部を見たい、ってだけのことだし」
1457 = "「Chuyện đó cũng bình thường mà. Còn với em,\nem chỉ đơn giản là muốn nhìn thấy tất cả những gì lọt vào tầm mắt thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ……しかし、運転操作について\n見逃したというのは……機関士としては恥ずかしい」
1537 = "「Ưm……nhưng mà, việc bỏ sót cả thao tác lái tàu thì……\nĐúng là đáng xấu hổ với tư cách một người lái tàu.」"
# 【日々姫】
# display as 八六＆日日姬
# JP: 「そうではないかと」\n「そぎゃんこつなかとよ」
2035 = "「Không phải vậy đâu ạ.」\n「Không đến mức đó đâu anh.」"
# monologue
# JP: ふたりが同時に僕の言葉をせき止めて、しばし見つめ合い、\nどうぞ、と日々姫が目線で譲る。
2263 = "Hai người đồng thanh ngắt lời tôi, rồi nhìn nhau một lúc,\nSau đó Hibiki đưa mắt nhường lời cho Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「あの場での双鉄様は、運行全体――事態解決のための\n方法を、ただ一心に見つめていらしただけのことです」
1630 = "「Lúc đó ngài Soutetsu chỉ tập trung vào toàn bộ quá trình vận hành——\nChỉ một lòng tìm cách giải quyết tình huống mà thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1543 = "「À——」"
# monologue
# JP: なるほど。言われればそうかもしれぬ。
2330 = "Ra vậy. Nghe cô ấy nói thì có lẽ đúng là thế."
# monologue
# JP: 思った途端、僕の中での昔っからの疑念がわずかに、\nゆるみほどける。
2610 = "Ngay khi nghĩ vậy, một nỗi nghi ngờ từ lâu trong tôi\nđã phần nào được gỡ bỏ."
# 【双鉄】
# display as 雙鐵
# JP: 「皆が僕を、レールを敷く者だと評価してくれるのは\n……あるいは、僕がそうした視線を持つ者だからか」
1636 = "「Mọi người đánh giá tôi là người lát đường ray\n……Có lẽ là vì tôi luôn nhìn nhận vấn đề dưới góc độ đó chăng.」"
# 【日々姫】
# display as 日日姬
# JP: 「きっと、そぎゃんね！\nもちろん、それだけのことでもなかと思うけど」
2045 = "「Chắc chắn là vậy rồi!\nTất nhiên, em nghĩ không chỉ có mỗi lý do đó đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ……自分の興味が、視線の先が、いったいどこへ\n向かっているかなど、気にしたこともなかったが」
1539 = "「Ưm……Sự quan tâm của mình, hay ánh mắt của mình rốt cuộc đang hướng về đâu,\ntrước giờ tôi chưa từng bận tâm đến.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふふっ」
1605 = "「Fufu.」"
# monologue
# JP: 日々姫が笑う。なぜだかとてもしあわせそうに――\nああ、いや。
2486 = "Hibiki mỉm cười. Không hiểu sao trông em ấy vô cùng hạnh phúc——\nÀ, không phải."
# monologue
# JP: “興味を持つ”という行為事態を拒んでいた過去の僕を\n知る日々姫ゆえ、この変化も喜んでくれているのか。
2482 = "Chính vì Hibiki biết rõ tôi trong quá khứ, một kẻ luôn từ chối việc \"có hứng thú\" với bất cứ thứ gì,\nnên em ấy mới vui mừng trước sự thay đổi này của tôi."
# 【ハチロク】
# display as 八六
# JP: 「うふふっ。そうしたお気付きもまた、\n仲国にこなければ得られなかったものかもしれませんね」
1611 = "「Fufu. Những nhận thức như vậy,\ncó lẽ nếu không đến Trung Quốc thì ngài đã chẳng thể có được nhỉ.」"
# monologue
# JP: ハチロクも、日々姫と同じくしあわせそうだ。\nそう感じれば、ふつふつ嬉しさが湧いてくる。
2290 = "Hachiroku cũng trông hạnh phúc hệt như Hibiki.\nNhận ra điều đó, một niềm vui sướng chợt trào dâng trong tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「だな。あるいはこれもまた、異文化交流の成果であり、\n僕自身への、思わぬ悉究であるのかもしれん」
1917 = "「Đúng vậy. Hoặc có lẽ đây cũng là thành quả của việc giao lưu văn hóa,\nvà là một sự tất cứu đầy bất ngờ đối với chính bản thân tôi.」"
# 【姜】
# display as 姜
# JP: 「禍転じて、佳きご視察のひとつとなったのであれば、\n当方にとっても大変に喜ばしいことです」
1631 = "「Trong cái rủi có cái may, nếu điều đó giúp ích cho chuyến khảo sát của mọi người,\nthì đối với chúng tôi đó cũng là một niềm vui lớn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「姜さん」
1658 = "「Cô Khương.」"
# monologue
# JP: 姜さんにも感謝の言葉しかないなぁと、\n今更ながら強く感じる。
2429 = "Đến tận lúc này tôi mới cảm nhận sâu sắc rằng,\ntôi thực sự chỉ có những lời biết ơn dành cho cô Khương."
# monologue
# JP: いつでもこの人は一番目立たぬところをしっかり支え、\n後補機として、行程の全てを成り立たせてくれている。
2491 = "Lúc nào cô ấy cũng âm thầm hỗ trợ vững chắc ở những nơi khuất lấp nhất,\nđóng vai trò như một đầu máy phụ đẩy phía sau, giúp toàn bộ hành trình diễn ra suôn sẻ."
# 【双鉄】
# display as 雙鐵
# JP: 「おかげさまで、まことに実り多き視察を\n重ねさせていただけていると感じます」
1467 = "「Nhờ có cô mà tôi cảm thấy\nchúng tôi đã có được những chuyến khảo sát vô cùng thiết thực và bổ ích.」"
# 【姜】
# display as 姜
# JP: 「なによりです。聖都でも同様に佳き視察をお重ね\n頂きたいと存じますので、ひとつ、ご相談があります」
2041 = "「Vậy thì tốt quá. Tôi cũng mong mọi người sẽ có những chuyến khảo sát thuận lợi tại Thịnh Đô,\nnhưng trước đó, tôi có một chuyện muốn bàn bạc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「相談ですか。なんでしょう」
1411 = "「Bàn bạc sao? Chuyện gì vậy?」"
# 【姜】
# display as 姜
# JP: 「ご視察の日程を、一日――いえ、半日だけでも、\n延長することは叶いませんか？」
2034 = "「Lịch trình khảo sát, liệu mọi người có thể kéo dài thêm một ngày——\nkhông, dù chỉ nửa ngày thôi, có được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！」
# 1559 = "「啊！」" 
# 【日々姫】
# display as 日日姬
# JP: 「あ痛っ！！？」
1522 = "「A đau!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫！？」
1797 = "「Hibiki!?」"
# 【日々姫】
# display as 日日姬
# JP: 「って、ごめん、邪魔して。\n平気やけん、続けて続けて」
1578 = "「A, xin lỗi vì đã cắt ngang.\nEm không sao đâu, mọi người cứ tiếp tục đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2033 = "「Vậy sao.」"
# monologue
# JP: 延長の二文字にいろめきたった日々姫が\n状況を忘れ立ち上がりかけ、ゆえに沈んだ。
2212 = "Vừa nghe đến hai chữ \"kéo dài\", Hibiki đã phấn khích đến mức\nquên mất hoàn cảnh mà đứng bật dậy, kết quả là ngã rầm xuống."
# monologue
# JP: まぁ寝台は柔らかなものだし、\n声からしてもまったく心配なさそうだが。
2226 = "Mà giường nằm cũng mềm,\nnghe giọng em ấy thì có vẻ chẳng có gì đáng lo cả."
# 【双鉄】
# display as 雙鐵
# JP: 「……可能であるなら、もちろん滞在を延長し、\nより多くをさせていただきたい気持ちはありますが――」
1077 = "「……Nếu có thể, tất nhiên chúng tôi cũng muốn kéo dài thời gian lưu trú\nđể có thể làm được nhiều việc hơn, nhưng mà——」"
# 【ハチロク】
# display as 八六
# JP: 「大変に残念ですが、明々後日、帰国予定日の\n翌日には、ポーレット様に帝都での会合のご予定が」
1435 = "「Rất tiếc, nhưng ngày kia, tức là một ngày sau ngày dự định về nước,\nThị trưởng Paulette đã có lịch họp ở Đế Đô rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「国交省のもので、ポーレットが出ないとまずい会合\nなのです。ので、僕が御一夜に戻っていないと」
1873 = "「Đó là cuộc họp của Bộ Đất đai, Hạ tầng, Giao thông và Du lịch, Paulette không thể không tham gia.\nDo đó, tôi bắt buộc phải có mặt ở Ohimitera.」"
# 【姜】
# display as 姜
# JP: 「理解しました。責任者不在の状況が発生してしまう――\nというわけですね」
1750 = "「Tôi hiểu rồi. Sẽ dẫn đến tình trạng không có người chịu trách nhiệm ở lại quản lý——\nlà vậy đúng không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「です。僕か日々姫がいなくては、万一何かがあった場合、事態を収拾できなくなりかねません」
1837 = "「Đúng vậy. Nếu không có tôi hoặc Hibiki ở đó, lỡ như có chuyện gì xảy ra, e rằng sẽ không có ai giải quyết tình hình.」"
# monologue
# JP: 赤井宮司は現役の神職であるお立場上、公共性が高くとも、\n一営利企業の管理職につくことを固辞される。
2618 = "Đền chủ Akai với tư cách là một thần quan đương nhiệm, dù công ty có tính chất phục vụ cộng đồng cao,\nông vẫn kiên quyết từ chối đảm nhận chức vụ quản lý của một doanh nghiệp vì lợi nhuận."
# monologue
# JP: 現場の知識なら凪は十分だが、経営面ではまだ知識不足。\nふかみは完全にその逆で――その他の面々も一長一短だ。
2311 = "Về kiến thức thực địa thì Nagi hoàn toàn nắm rõ, nhưng về mặt quản lý kinh doanh thì vẫn còn thiếu sót.\nFukami thì hoàn toàn ngược lại——những người khác cũng đều có điểm mạnh điểm yếu riêng."
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ、いや……その観点でいうのなら、\n日々姫のみが数日滞在を延長することは――」
1541 = "「Hửm? À, không……Nếu xét theo khía cạnh đó,\nthì việc chỉ có Hibiki ở lại thêm vài ngày——」"
# 【日々姫】
# display as 日日姬
# JP: 「冷静になったら、やっぱり無理と。私は私で、\nデザインの方のスケジュールがみっちりつまっとるけん」
1461 = "「Bình tĩnh nghĩ lại thì, chắc là không được đâu.\nBản thân em cũng có lịch trình thiết kế kín mít rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはそうか」
1568 = "「À, cũng đúng nhỉ.」"
# 【姜】
# display as 姜
# JP: 「残念ですが、日程延長がご無理とのこと了解しました。\nでは、少し強行軍とはなりますが――」
1423 = "「Thật đáng tiếc, tôi đã hiểu là mọi người không thể kéo dài lịch trình.\nVậy thì, hành trình tiếp theo sẽ có chút gấp gáp——」"
# monologue
# JP: 姜さんが、志寰君と、なにやら仲国語で打ち合わせ始める。\nすぐさま西瓜が、通訳・補足してくれる。
2397 = "Cô Khương và Chí Hoàn bắt đầu bàn bạc điều gì đó bằng tiếng Trung Quốc.\nNgay lập tức, Tây Qua đã dịch và giải thích lại cho chúng tôi."
# 【西瓜】
# display as 西瓜
# JP: 「……約90分到着が遅延しますので、今日、\n健為を見学にいくことが不可能となってしまったのです」
1074 = "「……Do thời gian đến nơi sẽ bị chậm trễ khoảng 90 phút, nên hôm nay,\nviệc đi tham quan Kiện Vi đã trở nên bất khả thi rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ケンイー、とは？」
2084 = "「Jianwei, là gì vậy?」"
# 【西瓜】
# display as 西瓜
# JP: 「健康の健に、物事を為すの為と書いて、健為です。\n蒸気機関車が現役で仕事をしている地方鉱山都市です」
1851 = "「Viết là chữ 'Kiện' trong 'khỏe mạnh', và chữ 'Vi' trong 'làm việc', đọc là Kiện Vi.\nĐó là một thành phố khai thác mỏ địa phương nơi đầu máy hơi nước vẫn đang hoạt động.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁまぁまぁ！　\x%l蒸機;#00ffc040;蒸機%l;#;といよいよ会えるのですね！\n今日の見学が不可能としても、それは、明日には？」
1513 = "「Trời ơi! Cuối cùng cũng được gặp \x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; rồi sao!\nDù hôm nay không thể tham quan, vậy thì, ngày mai thì sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「はい。もちろん見学していただく予定です。ので、\n明日のものだった予定を今日にずらしての組み換えを」
1817 = "「Vâng. Tất nhiên là chúng ta sẽ đi tham quan rồi ạ. Vì thế,\nchúng tôi đang sắp xếp dời lịch trình ngày mai sang hôm nay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1477 = "「Ra vậy.」"
# monologue
# JP: と、いうことは、明日丸一日分だった予定の一部を、\n今日の着後にもってくる形の組み換えとなる。
2248 = "Nói cách khác, một phần lịch trình của cả ngày mai\nsẽ được dời lên sau khi chúng tôi đến nơi vào hôm nay."
# monologue
# JP: であらば、予定の全行程はこなしきれぬであろうゆえ――
2639 = "Nếu vậy, e rằng chúng tôi sẽ không thể hoàn thành toàn bộ lịch trình dự kiến——"
# 【姜】
# display as 姜
# JP: 「優先すべき視察内容を、双鉄先生、日々姫女士、\nレイルロオド・ハチロクに決定頂きたく思います」
1761 = "「Tôi muốn anh Soutetsu, cô Hibiki,\nvà Railord Hachiroku quyết định xem nội dung khảo sát nào nên được ưu tiên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。どのような選択肢があるのでしょうか？」
1650 = "「Vâng. Chúng tôi có những lựa chọn nào vậy?」"
# 【姜】
# display as 姜
# JP: 「北琴から来た一般的な観光客が好みそうな場所として、\n『自然景』『歴史遺産』『演劇文化』『パンダ』などを」
1431 = "「Những địa điểm mà khách du lịch bình thường từ Bắc Cầm thường thích bao gồm:\n'Phong cảnh thiên nhiên', 'Di sản lịch sử', 'Văn hóa kịch nghệ', 'Gấu trúc', v.v.」"
# 【ハチロク】
# display as 八六＆日日姬
# JP: 「パンダ！！」
1864 = "「Gấu trúc!!」"
# monologue
# JP: ハチロク日々姫が異口同音の歓声をあげ、驚いたように\nお互いを見て、同時にはにかんだ笑みを浮かべる。
2272 = "Hachiroku và Hibiki đồng thanh reo lên, rồi cả hai ngạc nhiên\nnhìn nhau và cùng nở nụ cười bẽn lẽn."
# 【双鉄】
# display as 雙鐵
# JP: 「パンダというのは、\n仲国でもやはり人気のある動物なのですか？」
1994 = "「Gấu trúc,\nở Trung Quốc cũng là một loài động vật rất được yêu thích sao?」"
# 【姜】
# display as 姜
# JP: 「もちろん、大いに人気がありますね。この辺は、\n聖都での仕事も多い志寰君の方が詳しいでしょう」
2054 = "「Tất nhiên rồi, chúng rất được yêu thích. Về vấn đề này,\nChí Hoàn, người thường xuyên làm việc ở Thịnh Đô, chắc hẳn sẽ rành hơn.」"
# 【志寰】
# display as 志寰
# JP: 「国内外を問わず、観光客が聖都で一番訪れる場所が、\n聖都の、[ぱんだはんしょくきち,10]大熊猫保存研究中心基地です」
1412 = "「Dù là khách trong hay ngoài nước, địa điểm được ghé thăm nhiều nhất ở Thịnh Đô,\nchính là Cơ sở Nghiên cứu Bảo tồn Gấu trúc lớn Thịnh Đô.」"
# 【日々姫】
# display as 日日姬
# JP: 「パンダ基地！　有名！！　芸能人とかときどきいって、\nパンダの赤ちゃん抱っこしたりしてるとこでしょ？」
1861 = "「Cơ sở gấu trúc! Nổi tiếng lắm luôn!! Thỉnh thoảng lại có mấy người nổi tiếng đến đó,\nrồi bế mấy bé gấu trúc con đúng không?」"
# 【西瓜】
# display as 西瓜
# JP: 「そうですね。パンダの赤ちゃんを抱っこ出来る施設は、\n仲国全土で。つまり世界中でここ一箇所と聞いています」
2007 = "「Đúng vậy ạ. Cơ sở cho phép bế gấu trúc con,\nnghe nói trên toàn Trung Quốc, hay nói cách khác là trên toàn thế giới, chỉ có duy nhất một nơi này thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「赤ちゃんを抱っこ！？　パ、パンダの赤ちゃんを――\n抱っこ、できるのでございますか？？？」
1773 = "「Bế gấu trúc con!? B-Bế gấu trúc con——\nthật sự được bế sao ạ???」"
# monologue
# JP: なんと、ハチロクが異常な食いつきをみせている。
2295 = "Không ngờ Hachiroku lại tỏ ra hứng thú một cách lạ thường như vậy."
# monologue
# JP: ハチロク好みの配色は黒赤金と思っていたが……\nふぅむ、白黒もツボであるのか。
2428 = "Tôi cứ tưởng Hachiroku thích phối màu đen-đỏ-vàng cơ chứ……\nƯm, hóa ra trắng-đen cũng hợp gu em ấy sao."
# 【志寰】
# display as 志寰
# JP: 「残念ですけれど抱っこには、事前の申込みと審査と、\nとても高額の寄付金とが必要となります」
1416 = "「Rất tiếc nhưng để được bế, mọi người cần phải đăng ký trước, trải qua vòng xét duyệt,\nvà phải quyên góp một khoản tiền rất lớn.」"
# 【姜】
# display as 姜
# JP: 「もちろん、ご希望があればできるかぎりの交渉を」
1878 = "「Tất nhiên, nếu mọi người muốn, chúng tôi sẽ cố gắng thương lượng hết sức có thể.」"
# 【ハチロク】
# display as 八六
# JP: 「いえいえいえいえ！！？　そんな恐れ多い――\nと、申しますかそのような経験……わたくし、無理です」
1406 = "「Không không không không!!? Thật là vinh hạnh quá——\nnhưng mà trải nghiệm như vậy……em, không làm được đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「赤ちゃんクマの一体くらい、\n整備体でもあるのだし、問題なく抱っこできよう」
1442 = "「Chỉ là một bé gấu con thôi mà,\nem đang dùng thân chính, bế chắc chắn không thành vấn đề đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「そうではなくて――おそれおおくて、尊くて。\nわたくしきっと……回路を焼き切ってしまいます」
1408 = "「Không phải vậy đâu ạ——nó quá đỗi cao quý và thiêng liêng.\nEm chắc chắn sẽ……bị cháy mạch mất thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと」
1644 = "「Đến mức đó sao.」"
# monologue
# JP: ハチロクがそこまで動物好きとは思わなかった。\nコン駅長など、れいなや日々姫ばかりになついて――
2437 = "Tôi không ngờ Hachiroku lại yêu động vật đến thế.\nBởi vì Ga trưởng Kon toàn quấn lấy Reina và Hibiki thôi——"
# monologue
# JP: （ああいや、あるいは、\n動物好きだが、接し方などがわからんだけか？）
2660 = "（À không, có lẽ,\nem ấy thích động vật, nhưng chỉ là không biết cách tiếp xúc với chúng chăng?）"
# monologue
# JP: 右田は酒造だ。ペットは飼えん。帝鉄時代はそれこそ、\n動物と接する機会すらなかったろうし……
2347 = "Nhà Migita là xưởng nấu rượu. Không thể nuôi thú cưng được. Hồi ở Đường sắt Hoàng gia,\nchắc chắn em ấy cũng chẳng có cơ hội tiếp xúc với động vật……"
# 【日々姫】
# display as 日日姬
# JP: 「抱っこできなくても、いってみたかと！\nたくさんのパンダなんて、めったに見られんし！」
1688 = "「Dù không được bế thì em vẫn muốn đi thử!\nCơ hội được nhìn thấy nhiều gấu trúc cùng lúc hiếm lắm đấy!」"
# 【ハチロク】
# display as 八六
# JP: 「で、ございますよね！」
1597 = "「Đúng vậy nhỉ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。両者とも同じ希望か」
1531 = "「Hừm. Cả hai đều có chung nguyện vọng sao.」"
# monologue
# JP: 確認すれば、ハチロクはぶんぶんぶんぶん幾度も頷く。\n回路がすでに壊れてしまっているかの如く、強く激しく。
2440 = "Vừa xác nhận, Hachiroku đã gật đầu lia lịa liên tục.\nMạnh mẽ và mãnh liệt đến mức tưởng chừng như mạch điện của em ấy đã hỏng mất rồi."
# monologue
# JP: そこまで見たいものならば、僕に異論のあるはずもない。
2458 = "Nếu em ấy đã muốn xem đến vậy, tôi cũng chẳng có lý do gì để phản đối."
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことでこちらの意見はまとまりました。\n問題なければ、そのパンダ基地を視察したいのですが」
1747 = "「Vậy là ý kiến của chúng tôi đã thống nhất.\nNếu không có vấn đề gì, chúng tôi muốn đi khảo sát cơ sở gấu trúc đó.」"
# 【姜】
# display as 姜
# JP: 「承りました。では……」
1652 = "「Tôi đã hiểu. Vậy thì……」"
# monologue
# JP: また仲国語での打ち合わせ。\n西瓜は何度でも根気よく、通訳・補足をしてくれる。
2237 = "Lại là một cuộc thảo luận bằng tiếng Trung Quốc.\nTây Qua vẫn kiên nhẫn phiên dịch và bổ sung cho chúng tôi hết lần này đến lần khác."
# 【西瓜】
# display as 西瓜
# JP: 「到着予定時間とバスの時間を確認しています。\n先に一度、お宿で荷物を下ろしていただくかどうかを」
1452 = "「Họ đang xác nhận thời gian dự kiến đến nơi và lịch trình xe buýt.\nXem liệu mọi người có nên ghé qua nhà nghỉ để cất hành lý trước hay không.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにとハチロクが平気なら、私としては、\nパンダ基地の方に直行したかと」
2060 = "「Nếu anh hai và Hachiroku không thấy phiền, em muốn\nđi thẳng đến cơ sở gấu trúc luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな、旅の興奮もあるのかもしれんが――\n今のところは、特段の疲労なども感じていないし」
1809 = "「Đúng vậy, có lẽ do sự hào hứng của chuyến đi——\nnhưng hiện tại tôi cũng không cảm thấy mệt mỏi gì đặc biệt.」"
# 【ハチロク】
# display as 八六
# JP: 「早く到着すればその分長くパンダを見られるのですから。\nわたくしも、そのご判断を支持いたします」
1801 = "「Đến sớm thì sẽ có thêm nhiều thời gian để ngắm gấu trúc mà.\nEm cũng ủng hộ quyết định đó ạ.」"
# 【姜】
# display as 姜
# JP: 「わかりました。では、志寰君に乗車可能な一番早い\nパンダバスを予約手配してもらいます」
1647 = "「Tôi hiểu rồi. Vậy thì, tôi sẽ nhờ Chí Hoàn đặt vé chuyến\nxe buýt gấu trúc sớm nhất có thể.」"
# 【ハチロク】
# display as 八六
# JP: 「パンダバス！　バスまでパンダなのですか！？」
1860 = "「Xe buýt gấu trúc! Đến cả xe buýt cũng là gấu trúc sao!?」"
# 【姜】
# display as 姜
# JP: 「話によるとそのようですね。\n当方も、実物を見聞したことはまだ無いのですけれど」
1779 = "「Nghe nói là vậy.\nBản thân tôi cũng chưa từng được tận mắt chứng kiến.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁまぁまぁ！　わたくし、存じ上げませんでした。\n聖都はその名にふさわしい、パンダの都なのですね！」
1518 = "「Ôi trời ơi! Em hoàn toàn không biết luôn.\nThịnh Đô quả thật xứng danh là thủ đô của gấu trúc nhỉ!」"
# 【姜】
# display as 姜
# JP: 「らしいですね。\nひょっとすると、駅員もパンダかもしれません」
1889 = "「Có vẻ là vậy.\nBiết đâu, nhân viên nhà ga cũng là gấu trúc đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！　うふふふふっ。\nでしたらきっと、笹のきっぷが必要ですね」
1508 = "「Ôi! Ufufufu.\nNếu vậy chắc chắn phải dùng vé bằng lá trúc rồi nhỉ.」"
# monologue
# JP: 姜さんの真顔の冗談に、ハチロクがころころ笑いころげる。\n――なんとも、旅だ。旅の空気だ。
2394 = "Trước câu nói đùa tỉnh bơ của cô Khương, Hachiroku cười khúc khích không ngớt.\n——Thật đúng là một chuyến đi. Bầu không khí của một chuyến du lịch."
# monologue
# JP: 到着直前の空気の弛緩が、\n仕事も立場も、全てをひととき、溶かしたようだ。っと。
2361 = "Sự thư giãn trước khi đến nơi,\nnhư thể đã hòa tan mọi công việc và vị thế trong chốc lát."
# 【姜】
# display as 姜
# JP: 「ああ、到着の準備に入りましたね。\n乗車時にお預けしたカードを、お戻しください」
1584 = "「A, có vẻ họ đang chuẩn bị đến ga rồi.\nXin hãy trả lại thẻ mà tôi đã đưa cho mọi người lúc lên tàu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「『硬臥換票証』ですね。はい」
1045 = "「Là 'Giấy đổi vé giường nằm cứng' nhỉ. Đây ạ.」"
# monologue
# JP: 車掌さんが僕らの寝台に戻ってきて、\nカードときっぷを再交換する。
2312 = "Trưởng tàu quay lại giường nằm của chúng tôi,\nvà tiến hành đổi thẻ lấy vé một lần nữa."
# monologue
# JP: 志寰君がなにやら短く会話して、\nほっとしたような笑顔を浮かべる。
2412 = "Chí Hoàn trao đổi ngắn gọn vài câu,\nrồi nở nụ cười nhẹ nhõm."
# 【志寰】
# display as 志寰
# JP: 「よかった。回復運転もがんばっているようです。\nこれなら遅延は、90分を切れるかもしれません」
1640 = "「Tốt quá rồi. Có vẻ họ đang nỗ lực tăng tốc để bù lại thời gian.\nNhư thế này thì độ trễ có thể rút ngắn xuống dưới 90 phút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なによりだ」
2050 = "「Vậy thì còn gì bằng.」"
# monologue
# JP: 換票証の再交換は、\n下車の準備開始の格好の目印であるらしい。
2342 = "Việc đổi lại giấy đổi vé,\ncó vẻ là một dấu hiệu tốt cho thấy đã đến lúc chuẩn bị xuống tàu."
# monologue
# JP: どの寝台の脇の通路にも人がはみ出し、\n車内は一気に、喧騒の度を増している。
2235 = "Hành khách bắt đầu tràn ra lối đi cạnh các giường nằm,\nkhung cảnh trong xe bỗng chốc trở nên ồn ào và náo nhiệt hơn hẳn."
# 【姜】
# display as 姜
# JP: 「そろそろ身支度を整えましょう。大きな荷物を、\n寝台の下から引出してしまってかまいませんか」
1746 = "「Chúng ta cũng chuẩn bị hành lý thôi. Tôi kéo những hành lý lớn\ntừ dưới gầm giường ra nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、お願いします。助かります」
1586 = "「A, làm phiền cô. Cảm ơn cô nhiều.」"
# 【ハチロク】
# display as 八六
# JP: 「荷物整理が大変でしたら、\n上の寝台もどうぞお使いくださいましね？」
1867 = "「Nếu việc sắp xếp hành lý khó khăn quá,\nmọi người cứ thoải mái sử dụng giường tầng trên nhé?」"
# 【日々姫】
# display as 日日姬
# JP: 「ありがと、ハチロク」
2008 = "「Cảm ơn nhé, Hachiroku.」"
# 【西瓜】
# display as 西瓜
# JP: 「志寰、手伝う！」
1717 = "「Chí Hoàn, để em giúp!」"
# monologue
# JP: 僕らの寝台も一気ににぎわう。\nまったく耳慣れぬチャイムが響き、車内放送が流れ始める。
2435 = "Khu vực giường nằm của chúng tôi cũng lập tức trở nên náo nhiệt.\nMột tiếng chuông hoàn toàn xa lạ vang lên, và loa phát thanh trên tàu bắt đầu thông báo."
# monologue
# JP: ……仲国語のみの放送だけれど、意味は間違いようもない。\n間もなく終点、聖都着――だ。
1008 = "……Dù thông báo chỉ bằng tiếng Trung Quốc, nhưng ý nghĩa thì không thể nhầm lẫn được.\nSắp đến ga cuối, Thịnh Đô——rồi."
# 【ハチロク】
# display as 八六
# JP: 「パンダパトカア、パンダ門、パンダ自販機、パンダ交番、\nパンダ保育所、パンダ弁当、パンダ像、パンダタクシイ」
1863 = "「Xe cảnh sát gấu trúc, cổng gấu trúc, máy bán hàng tự động gấu trúc, đồn cảnh sát gấu trúc,\nnhà trẻ gấu trúc, cơm hộp gấu trúc, tượng gấu trúc, taxi gấu trúc.」"
# monologue
# JP: 夢見るように、憧れるように、\nハチロクがひたすらパンダを連呼していく。
2276 = "Như đang chìm trong một giấc mơ đầy khao khát,\nHachiroku không ngừng lặp đi lặp lại từ gấu trúc."
# 【ハチロク】
# display as 八六
# JP: 「百花繚乱のパンダバスたち、バンダ時計にパンダ帽、\nパンダリュックに、パンダコインにパンダ茶器！」
1502 = "「Những chiếc xe buýt gấu trúc muôn màu muôn vẻ, đồng hồ gấu trúc, mũ gấu trúc,\nbalo gấu trúc, đồng xu gấu trúc và cả bộ ấm trà gấu trúc nữa!」"
# monologue
# JP: 連呼される全てをスケッチしていたのだろう。\nスケッチブックを開き直して、日々姫も感嘆の息を吐く。
2478 = "Chắc em ấy đã phác thảo lại tất cả những thứ vừa được liệt kê.\nHibiki mở lại cuốn sổ phác thảo, buông một tiếng thở dài đầy cảm thán."
# 【日々姫】
# display as 日日姬
# JP: 「まっこと……ありとあらゆるパンダデザインの\n見本市とね、こん、聖都パンダ基地って」
2037 = "「Thật sự……Cơ sở gấu trúc Thịnh Đô này\ncứ như một hội chợ triển lãm đủ mọi thiết kế về gấu trúc vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「見てきた全てが珠玉のデザインとわたくしは感じました。\nけれど――ああ、双鉄さま、けれど、けれども！」
1733 = "「Em cảm thấy tất cả những gì mình nhìn thấy đều là những thiết kế tuyệt mỹ.\nNhưng mà——a, ngài Soutetsu, nhưng mà, nhưng mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1590 = "「Ừ.」"
# 【ハチロク】
# display as 八六
# JP: 「実物こそがまことの珠玉！！　ああああ、なんと！\nパンダはなんと！　愛らしい生き物なのでしょう！」
1433 = "「Bản thân gấu trúc mới thực sự là một viên ngọc quý!! Aaaaa, thật là!\nGấu trúc thật là! Một sinh vật đáng yêu làm sao!」"
# 【双鉄】
# display as 雙鐵
# JP: 「……来てよかったなぁ」
1067 = "「……Đến đây đúng là quyết định sáng suốt.」"
# monologue
# JP: つくづく思う。\n熱暴走でもしているのではないかと心配になる浮かれぶり。
2299 = "Tôi thực sự nghĩ vậy.\nSự phấn khích của em ấy khiến tôi có chút lo lắng không biết em ấy có bị quá tải nhiệt hay không."
# monologue
# JP: ハチロクのこんな姿を見れるのであれば、\n僕にはさほど興味を持てぬパンダの姿も愛しく思える。
2517 = "Chỉ cần được nhìn thấy dáng vẻ này của Hachiroku,\nthì dù là gấu trúc mà tôi không mấy hứng thú cũng trở nên thật đáng yêu."
# 【ハチロク】
# display as 八六
# JP: 「こどもパンダがこれほど動きまわるものとは――\nあああ、見てください！　ひとつのボオルを奪い合って」
1862 = "「Gấu trúc con lại năng động đến thế này sao——\nAaa, nhìn kìa! Chúng đang tranh nhau một quả bóng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「大変に活発なものだな」
1905 = "「Năng động thật đấy.」"
# monologue
# JP: 子パンダもだが、ハチロクも。
2505 = "Cả gấu trúc con lẫn Hachiroku."
# monologue
# JP: 混雑の中、少しでも近くでパンダを見ようと、\n人波にもまれるようにふらふら動き回っている。
2363 = "Giữa đám đông chen lấn, em ấy cứ chạy lăng xăng như bị cuốn theo dòng người,\ncố gắng tiến lại gần gấu trúc thêm một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「はぐれないように気をつけろよ」
1685 = "「Cẩn thận kẻo lạc đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「あああ！　双鉄さま！　見ました？　ころんって！\nこどもパンダが、ひっくり返ってころんって！！！」
1558 = "「Aaa! Ngài Soutetsu! Ngài thấy không? Nó ngã lăn quay kìa!\nBé gấu trúc con ngã lộn nhào lăn quay kìa!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「聞こえていないか。日々姫――も、スケッチに夢中か」
1402 = "「Không nghe thấy sao. Hibiki——cũng đang mải mê phác thảo à.」"
# monologue
# JP: ふふ、と小さな笑い声。
2401 = "Fufu, một tiếng cười nhỏ vang lên."
# monologue
# JP: 姜さんと志寰君がさりげなく、パンダに夢中な群衆から、\n日々姫をガードしてくれている。
2533 = "Cô Khương và Chí Hoàn đang khéo léo bảo vệ Hibiki\nkhỏi đám đông cuồng nhiệt vì gấu trúc."
# 【姜】
# display as 姜
# JP: 「もしはぐれたら、一時間後に先程のパンダ自販機の前で\n合流しましょう。こちらは、当方が安全確保します」
1655 = "「Nếu lỡ lạc nhau, một tiếng sau chúng ta sẽ tập trung\ntrước máy bán hàng tự động gấu trúc lúc nãy nhé. Phía bên này, chúng tôi sẽ đảm bảo an toàn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかりました。ありがとうございます。\nではそのように」
1653 = "「Tôi hiểu rồi. Cảm ơn mọi người.\nVậy quyết định thế nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「ね！　双鉄さま、双鉄さま――\nあら？　双鉄さま？　どちらでございましょう！？」
1891 = "「Nè! Ngài Soutetsu, ngài Soutetsu——\nỦa? Ngài Soutetsu? Ngài đang ở đâu vậy!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ！　ここだ！　今いく！！\n少しだけ待っていろ」
1573 = "「A, ừ! Tôi ở đây! Tới ngay đây!!\nĐợi một chút nhé.」"
# monologue
# JP: 予想以上にハチロクの動きは大きく、\n人波の度合いも激しい。
2296 = "Hachiroku di chuyển nhanh hơn tôi tưởng,\nvà dòng người cũng đông đúc hơn dự đoán."
# monologue
# JP: 日々姫のことは今は姜さんたちに任せて、\n僕はハチロクの引率に集中するべきだろう。
2479 = "Hibiki thì cứ giao cho cô Khương và mọi người,\ngiờ tôi nên tập trung vào việc dẫn dắt Hachiroku thì hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「待たせたな、ハチロク」
1421 = "「Để em phải đợi rồi, Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「あ。双鉄さま」
1585 = "「A. Ngài Soutetsu.」"
# monologue
# JP: 近くによれば、ハチロクが安堵の笑みを浮かべて――\n同時に僕も、理解する。
2515 = "Khi tôi đến gần, Hachiroku nở một nụ cười nhẹ nhõm——\nvà cùng lúc đó, tôi cũng đã hiểu."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、これはかわいらしいな」
1479 = "「Ra vậy, đúng là đáng yêu thật.」"
# 【ハチロク】
# display as 八六
# JP: 「うふふふっ。で、ございましょ？」
1606 = "「Ufufufu. Đúng không ạ?」"
# monologue
# JP: はしゃぎつかれたこどもパンダの、\nスイッチが切れてしまったらしい。
2448 = "Có vẻ như bé gấu trúc con đã chơi đùa đến kiệt sức,\nvà bị sập nguồn mất rồi."
# monologue
# JP: 半端な姿勢で寝こけたそのこを、\n飼育員さんが抱っこして、どこかへ運び去ろうとする。
2536 = "Nhân viên chăn nuôi bế bé gấu trúc đang ngủ gật\ntrong một tư thế lửng lơ ấy lên, và định mang đi đâu đó."
# 【ハチロク】
# display as 八六
# JP: 「なんとしあわせそうな眠りでしょう。\n笹のおふとんに寝かせてもらうのでしょうか？」
1893 = "「Một giấc ngủ trông thật hạnh phúc làm sao.\nLiệu bé có được ngủ trên chiếc giường làm bằng lá trúc không nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「笹？　笹は彼らの食べ物だろう？　ああいや――\n人間で考えれば、稲ワラの寝具などもあるにはあるか」
1923 = "「Lá trúc? Đó là thức ăn của chúng mà? À không——\nnếu nghĩ theo kiểu con người thì cũng có những chiếc giường làm từ rơm rạ nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、双鉄さまったら」
1903 = "「Trời ạ, ngài Soutetsu thật là.」"
# 【西瓜】
# display as 西瓜
# JP: 「子パンダが、おかあさんに抱っこされて眠る映像を、\n西瓜は、テレビの放送で見たことがあります」
1980 = "「Tây Qua đã từng xem cảnh gấu trúc con\nđược mẹ bế ngủ trên chương trình truyền hình rồi.」"
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「西瓜」「まぁまぁまぁ！　パンダのこどもは、おかあさん\nパンダの腕が寝台なのですね！　なんて愛らしい！！」
1949 = "「Tây Qua」「Ôi trời ơi! Gấu trúc con dùng vòng tay của gấu mẹ\nlàm giường ngủ sao! Đáng yêu quá đi mất!!」"
# monologue
# JP: 目にできるなら、確かに愛らしい光景だろうが、\n想像だけでは、さすがに僕は身悶えまでは出来かねる。
2546 = "Nếu được tận mắt chứng kiến thì chắc chắn đó là một khung cảnh rất đáng yêu,\nnhưng chỉ tưởng tượng thôi thì tôi không thể nào quắn quéo lên được như em ấy."
# monologue
# JP: それよりむしろ気にかかるのは――
2493 = "Hơn nữa, điều khiến tôi bận tâm hơn là——"
# 【双鉄】
# display as 雙鐵
# JP: 「西瓜は、志寰君と一緒に見学するものかと思ったが――\nああ！　いやっ、そうか。すまんな、僕らのためか」
1971 = "「Tôi cứ nghĩ Tây Qua sẽ đi tham quan cùng Chí Hoàn chứ——\nÀ! Không, ra là vậy. Xin lỗi nhé, vì chúng tôi sao.」"
# 【西瓜】
# display as 西瓜
# JP: 「すまなくないです。けれど双鉄先生とハチロクだけでは、\n仲国語話者とのコミュニケーションが難しいかと」
1732 = "「Không có gì phải xin lỗi đâu ạ. Nhưng nếu chỉ có thầy Soutetsu và Hachiroku,\nthì việc giao tiếp với người nói tiếng Trung Quốc sẽ rất khó khăn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。うかつだった。大変助かる。\n気にかけてくれてありがとう」
1916 = "「Đúng vậy. Tôi bất cẩn quá. Rất cảm ơn em.\nCảm ơn em đã quan tâm.」"
# 【西瓜】
# display as 西瓜
# JP: 「いえ。通訳と身の回りのお世話も、\n今回西瓜が命じられているお仕事ですし、それに――」
1533 = "「Không có gì ạ. Việc phiên dịch và chăm sóc mọi người\ncũng là nhiệm vụ mà Tây Qua được giao phó lần này, hơn nữa——」"
# monologue
# JP: 西瓜が、きょろきょろあたりを見回す。\nそうして僕に、なにやら言いたげに身を寄せてくる。
2580 = "Tây Qua dáo dác nhìn quanh.\nSau đó, cô bé xích lại gần tôi, vẻ như muốn nói điều gì đó."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
1724 = "「Sao vậy?」"
# 【西瓜】
# display as 西瓜
# JP: 「先生のご迷惑にならないようでしたら。西瓜は、\n双鉄先生に教えていただきたいことが、ひとつあります」
1941 = "「Nếu không phiền thầy. Tây Qua,\ncó một điều muốn thỉnh giáo thầy Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
1035 = "「——Ừm.」"
# monologue
# JP: 西瓜の声が緊張している。\n大事な話と直感する。
2587 = "Giọng Tây Qua lộ rõ vẻ căng thẳng.\nTrực giác mách bảo tôi đây là một chuyện quan trọng."
# 【双鉄】
# display as 雙鐵
# JP: 「答えられる質問かどうかは聞いてみないとわからんが。\n質問を受け付けること事態には、無論、何の問題もない」
1939 = "「Có trả lời được hay không thì phải nghe thử mới biết.\nNhưng tất nhiên, việc nhận câu hỏi thì chẳng có vấn đề gì cả.」"
# 【西瓜】
# display as 西瓜
# JP: 「でしたら、西瓜は双鉄先生――\nレイルロオド・ハチロクのマスターに質問します」
2057 = "「Nếu vậy, Tây Qua xin được hỏi thầy Soutetsu——\nMaster của Railord Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「！？」
1524 = "「!?」"
# monologue
# JP: ハチロクの名がここで出るとは思わなかった。
2283 = "Tôi không ngờ tên của Hachiroku lại được nhắc đến ở đây."
# monologue
# JP: ハチロクの意識もこどもパンダから引きがされたのか、\n小さく、息を飲むような音が聞こえる。
2286 = "Có vẻ sự chú ý của Hachiroku cũng bị kéo khỏi bé gấu trúc con,\ntôi nghe thấy một tiếng nín thở nhỏ."
# 【西瓜】
# display as 西瓜
# JP: 「双鉄先生はレールを敷かれる方と認識していました。\nハチロクとの共感で、その認識が正しいと理解しました」
2065 = "「Em luôn nghĩ thầy Soutetsu là người lát đường ray.\nThông qua cộng cảm với Hachiroku, em đã hiểu được nhận thức đó là chính xác.」"
# 【ハチロク】
# display as 八六
# JP: 「あっ」
# 1555 = "「啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「それは光栄だ」
1407 = "「Thật vinh hạnh.」"
# monologue
# JP: ハチロクがじわじわ赤くなる。\n僕への高い評価の証と素直に感じ、嬉しくなる。
2289 = "Hachiroku dần đỏ mặt.\nTôi cảm thấy vui mừng vì đó là minh chứng cho sự đánh giá cao dành cho mình."
# 【西瓜】
# display as 西瓜
# JP: 「西瓜は、志寰に自分の気持ちを伝えたいと考えます。\nけれど。そうしようと思うと、怖くなってしまうのです」
1984 = "「Tây Qua muốn bày tỏ tình cảm của mình với Chí Hoàn.\nNhưng. Cứ nghĩ đến việc đó, em lại cảm thấy sợ hãi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1540 = "「Hừm.」"
# monologue
# JP: 伝えたい気持ちがいかなるものであるのかを、\n尋ねなおすのもまた“余計なこと”に違いない。
2628 = "Hỏi lại xem tình cảm mà cô bé muốn truyền đạt là gì,\nchắc chắn sẽ là một việc \"thừa thãi\"."
# monologue
# JP: ならば、西瓜が話してくれることだけで、\n僕に見いだせる路を探そう。
2632 = "Nếu vậy, tôi sẽ chỉ dựa vào những gì Tây Qua nói\nđể tìm ra con đường mà mình có thể thấy được."
# 【双鉄】
# display as 雙鐵
# JP: 「西瓜は、何を、怖がっているのだ？」
1438 = "「Tây Qua, em đang sợ hãi điều gì?」"
# 【西瓜】
# display as 西瓜
# JP: 「何を――何を……」
1682 = "「Sợ điều gì——điều gì……」"
# monologue
# JP: 悉究、悉究、悉究と、西瓜が小さく、何度かつぶやく。\nその舌が唇をすばやく舐めて、また悉究が繰り返される。
2578 = "Tất cứu, tất cứu, tất cứu, Tây Qua lẩm bẩm nhỏ nhiều lần.\nCô bé liếm môi thật nhanh, rồi lại tiếp tục lẩm bẩm từ tất cứu."
# 【西瓜】
# display as 西瓜
# JP: 「……怖いのは、時間が経過してしまったから。\n志寰が、その間に変化したかもしれないと思うからです」
1084 = "「……Điều em sợ là, thời gian đã trôi qua quá lâu.\nEm nghĩ có thể Chí Hoàn đã thay đổi trong khoảng thời gian đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「志寰君が、\nどのように変化しているのを恐れているのだ？」
2043 = "「Em sợ Chí Hoàn\nđã thay đổi như thế nào?」"
# 【西瓜】
# display as 西瓜
# JP: 「………………。以前、志寰は。\n西瓜のことを――『好きだ』と言ってくれました」
1049 = "「………………. Trước đây, Chí Hoàn.\nĐã từng nói với Tây Qua rằng——'Tớ thích cậu'.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1526 = "「Ồ.」"
# 【ハチロク】
# display as 八六
# JP: 「！」
# 1559 = "「啊！」" 
# monologue
# JP: ハチロクがわずかに息を飲む。\nけれども、それ以上のなにごともない。
2268 = "Hachiroku khẽ nín thở.\nNhưng, cũng chỉ có vậy thôi."
# monologue
# JP: ハチロクの反応を特に気にした風もなく――\n西瓜は、静かな言葉を続ける。
2225 = "Không mảy may để tâm đến phản ứng của Hachiroku——\nTây Qua tiếp tục cất giọng đều đều."
# 【西瓜】
# display as 西瓜
# JP: 「西瓜は、答えを返さないまま逃げ出しました。\nそれから、一年と七ヶ月が経過してしまいました」
1985 = "「Tây Qua đã bỏ chạy mà không đưa ra câu trả lời.\nKể từ đó, một năm bảy tháng đã trôi qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「一年七ヶ月は、確かに長い時間だが――」
1398 = "「Một năm bảy tháng, quả thực là một khoảng thời gian dài——」"
# 【西瓜】
# display as 西瓜
# JP: 「っ！！！」
1523 = "「!!!」"
# monologue
# JP: ああ、いや、しかし、人のこころなどはわからない。\n志寰くんが西瓜を今も好きかなど……
2351 = "À, không, nhưng mà, lòng người thì không thể nào đoán trước được.\nViệc Chí Hoàn hiện tại có còn thích Tây Qua hay không……"
# monologue
# JP: 傍目から、好意があるようにしか見えずとも、\n僕には、何の保証もできない。
2323 = "Dù nhìn từ bên ngoài, có vẻ như cậu ấy vẫn còn tình cảm,\nnhưng tôi không thể đảm bảo bất cứ điều gì."
# 【双鉄】
# display as 雙鐵
# JP: 「……その期間に、志寰君の心がかわったかどうかは、\nやはり、本人に尋ねてみる他に知る手段がないだろう」
1076 = "「……Trong khoảng thời gian đó, trái tim Chí Hoàn có thay đổi hay không,\nquả nhiên không còn cách nào khác ngoài việc hỏi trực tiếp cậu ấy.」"
# 【西瓜】
# display as 西瓜
# JP: 「それはそうです。大変理に叶ったお答えです。\nけれど西瓜は、怖くて質問できないのです」
2005 = "「Đúng là vậy ạ. Đó là một câu trả lời rất hợp lý.\nNhưng Tây Qua, sợ hãi nên không thể hỏi được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……ううむ」
1072 = "「……Ưm.」"
# monologue
# JP: 堂々めぐりだ。\nいささか困ってハチロクに視線を向けてみる――
2335 = "Lại quay về vạch xuất phát rồi.\nHơi bối rối, tôi thử hướng ánh mắt về phía Hachiroku——"
# monologue
# JP: が、ハチロクもやはりよい手は思いつかんのか、\n静かに首をふるばかり、だ。
2530 = "Nhưng, có vẻ Hachiroku cũng không nghĩ ra cách nào hay,\nem ấy chỉ lặng lẽ lắc đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「――ならば、切り口を変えてみよう。志寰君が当時とは\nこころがわりしたと。その様に感じる根拠はあるのか？」
1037 = "「——Nếu vậy, hãy thử thay đổi góc độ xem. Em cảm thấy Chí Hoàn\nđã thay lòng đổi dạ so với lúc đó. Vậy em có căn cứ nào cho cảm giác ấy không?」"
# 【西瓜】
# display as 西瓜
# JP: 「例えばこのような行動のとき、\n志寰は、必ず西瓜と一緒に行動したがりました」
1844 = "「Ví dụ như trong những hoạt động thế này,\nChí Hoàn, nhất định sẽ muốn đi cùng Tây Qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1590 = "「嗯」" 
# 【西瓜】
# display as 西瓜
# JP: 「けれど今は……西瓜がお二人を追いかけるのを……\n志寰は、気にするそぶりも見せませんでした」
1500 = "「Nhưng bây giờ……việc Tây Qua chạy theo hai người……\nChí Hoàn, không hề tỏ ra bận tâm chút nào.」"
# monologue
# JP: それは……役割分担と通訳の必要性とを理解して――\nむしろ信頼のゆえのことではなかろうかと思う。
2635 = "Điều đó……tôi nghĩ là do cậu ấy hiểu được sự phân chia vai trò và sự cần thiết của việc phiên dịch——\nđúng hơn, đó là vì sự tin tưởng."
# monologue
# JP: でなくとも、『好きだ』と告げて逃げられて。その後も、\n常に一緒に行動したいと表明するのは……厳しかろう。
2321 = "Dù không phải vậy, thì sau khi tỏ tình 'Tớ thích cậu' và bị bỏ chạy. Sau đó,\nviệc tiếp tục bày tỏ muốn luôn hành động cùng nhau……cũng khó khăn lắm chứ."
# 【西瓜】
# display as 西瓜
# JP: 「姜秘書と志寰も、最近は距離が近いような気がします。\nその疑念は、西瓜の思考を無限ループに追い込みます」
1671 = "「Tây Qua cảm thấy dạo gần đây thư ký Khương và Chí Hoàn cũng có vẻ thân thiết.\nSự nghi ngờ đó, đã đẩy suy nghĩ của Tây Qua vào một vòng lặp vô tận.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1554 = "「À……」"
# monologue
# JP: なるほど、西瓜自身も、そうした疑念からでは決して\n求める解を導けないと、そこは自覚出来ているわけか。
2329 = "Ra vậy, bản thân Tây Qua cũng tự nhận thức được rằng, từ những nghi ngờ đó\nchắc chắn sẽ không thể tìm ra được câu trả lời mà mình mong muốn."
# monologue
# JP: ならば――うむ。\nさらに切り口を変えてみよう。
2460 = "Nếu vậy thì——ưm.\nHãy thử thay đổi góc độ một lần nữa xem sao."
# 【双鉄】
# display as 雙鐵
# JP: 「……西瓜と姜さんは、どのような関係なのだ？\n姜さんは、鉄道の現場で働いたことはなさそうだが」
1102 = "「……Tây Qua và cô Khương có quan hệ như thế nào vậy?\nTrông cô Khương không giống như từng làm việc ở hiện trường đường sắt.」"
# 【西瓜】
# display as 西瓜
# JP: 「姜秘書は、老師――志寰のお父さん、\n西瓜の以前のマスターの、お知り合いです」
1673 = "「Thư ký Khương là người quen của lão sư——tức là cha của Chí Hoàn,\ncũng là Master trước đây của Tây Qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1590 = "「嗯」" 
# 【西瓜】
# display as 西瓜
# JP: 「試験運転士であった老師と西瓜の報告を受ける側の\n一員に、姜先生が加わられたのは7年ほど前だそうです」
1670 = "「Nghe nói cô Khương đã tham gia vào nhóm tiếp nhận báo cáo của lão sư,\nmột lái tàu thử nghiệm, và Tây Qua vào khoảng 7 năm trước.」"
# monologue
# JP: ……試作機から営業運転に転用された西瓜の東富4　2000は、\nそのまま本線上での各種データを収拾報告し続けた。
1018 = "……Chiếc Đông Phú 4 2000 của Tây Qua sau khi chuyển từ máy thử nghiệm sang vận hành thương mại,\nvẫn tiếp tục thu thập và báo cáo các loại dữ liệu trên tuyến đường chính."
# 【西瓜】
# display as 西瓜
# JP: 「初めて姜秘書が老師と西瓜に会いに来たのが、５年前。\n報告に顕著な特異性が見られるとして、確認の為でした」
1674 = "「Lần đầu tiên thư ký Khương đến gặp lão sư và Tây Qua là vào 5 năm trước.\nVì nhận thấy có sự khác thường rõ rệt trong báo cáo, nên cô ấy đến để xác nhận.」"
# 【双鉄】
# display as 雙鐵
# JP: 「顕著な特異性とは？」
1805 = "「Sự khác thường rõ rệt là sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「異音に関する報告を、特筆すべき頻度と精度をもって、\n老師と西瓜は、あげつづけていたとのことでした」
1615 = "「Đó là việc lão sư và Tây Qua đã liên tục gửi các báo cáo về tiếng ồn bất thường,\nvới tần suất và độ chính xác đáng kinh ngạc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――共感を通じ、『自分には聞こえていない音』を西瓜から受け取っていると、ハチロクも言っていたか」
1545 = "「À——Hachiroku cũng từng nói, thông qua cộng cảm,\ncô ấy đã nhận được 'những âm thanh mà bản thân không thể nghe thấy' từ Tây Qua nhỉ.」"
# 【西瓜】
# display as 西瓜
# JP: 「はい。西瓜の聴覚ユニットは、明らかに設計を上回る、\n偶然の奇跡的な産物として出来上がったようなのです」
1820 = "「Vâng. Bộ phận thính giác của Tây Qua rõ ràng vượt xa thiết kế ban đầu,\ncó vẻ như nó được tạo ra như một sản phẩm kỳ diệu của sự tình cờ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。それは恵まれたな。\n音からは普通の耳の僕らでも、多くを教わる」
1600 = "「Hừm. Quả là một món quà trời ban.\nNgay cả với đôi tai bình thường như chúng tôi, âm thanh cũng mang lại rất nhiều thông tin.」"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜自身も、とても恵まれたと思います。\n音への興味は、西瓜の世界を大きく広げてくれました」
1972 = "「Bản thân Tây Qua cũng cảm thấy rất may mắn.\nSự hứng thú với âm thanh đã mở rộng thế giới của Tây Qua rất nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　どういうふうにだ？」
1604 = "「Hửm? Mở rộng như thế nào?」"
# 【西瓜】
# display as 西瓜
# JP: 「老師の学ぶ日ノ本語の響きに西瓜はひかれ、\n日ノ本語で会話できるようになりました」
1876 = "「Tây Qua đã bị thu hút bởi âm điệu tiếng Hinomoto mà lão sư học,\nvà từ đó đã có thể giao tiếp bằng tiếng Hinomoto.」"
# 【ハチロク】
# display as 八六
# JP: 「確かに、西瓜の日ノ本語はとても誠実で、\n美しく心地よく響きますね」
1884 = "「Quả thực, tiếng Hinomoto của Tây Qua rất chân thành,\nnghe rất êm tai và dễ chịu.」"
# 【西瓜】
# display as 西瓜
# JP: 「わあっ」
1506 = "「Oa.」"
# monologue
# JP: 西瓜が笑う。\n弾けるように。それでいて、とても安心したように。
2597 = "Tây Qua mỉm cười.\nMột nụ cười rạng rỡ. Nhưng đồng thời, cũng vô cùng an tâm."
# 【西瓜】
# display as 西瓜
# JP: 「ハチロクにそういってもらえると、自信になります。\nハチロクの日ノ本語は、澄み切って柔らかに響くから」
1454 = "「Được Hachiroku khen như vậy, Tây Qua thấy tự tin hơn hẳn.\nBởi vì tiếng Hinomoto của Hachiroku nghe rất trong trẻo và mềm mại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1526 = "「哦」" 
# monologue
# JP: 澄み切っていて、しかも柔らか。\nなるほど、言われてみればハチロクの声はそう響く。
2499 = "Trong trẻo, và còn mềm mại nữa.\nRa vậy, nghe cô bé nói thế mới thấy giọng của Hachiroku đúng là như vậy."
# monologue
# JP: 言われた当人は目をパチクリ、\n照れの余りか、フリーズ同然に陥ってしまったようだが。
2224 = "Người được khen thì chớp chớp mắt liên tục,\nchắc do quá xấu hổ nên trông như bị đứng hình luôn rồi."
# 【ハチロク】
# display as 八六
# JP: 「まぁ……あの――ええと――ありがとうございます」
2031 = "「Chà……ờm——ừm——cảm ơn cô.」"
# 【双鉄】
# display as 雙鐵
# JP: 「西瓜は――\n日ノ本語を話せるようになり、なにかが変ったか？」
2059 = "「Tây Qua này——\nsau khi biết nói tiếng Hinomoto, có điều gì thay đổi không?」"
# 【西瓜】
# display as 西瓜
# JP: 「はい。そのことにより、姜秘書は、老師と西瓜に新しい\n――志寰には初めての仕事をくださいました」
1835 = "「Vâng. Nhờ vậy mà thư ký Khương đã giao cho lão sư và Tây Qua một công việc mới\n——và đó cũng là công việc đầu tiên của Chí Hoàn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「仕事？」
1694 = "「Công việc?」"
# 【西瓜】
# display as 西瓜
# JP: 「老師がご退職され、志寰が西瓜の新しい正機関士と\nして配属されるまで、四ヶ月の空白期間が生じました」
1706 = "「Từ lúc lão sư nghỉ hưu cho đến khi Chí Hoàn được phân công\nlàm lái tàu chính thức mới của Tây Qua, có một khoảng thời gian trống 4 tháng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1590 = "「嗯」" 
# 【西瓜】
# display as 西瓜
# JP: 「その四ヶ月に、西瓜の東富4　2000の車体・機器更新が\n行われることとなり――そこに仕事を頂いたのです」
1628 = "「Trong 4 tháng đó, thân xe và thiết bị trên chiếc Đông Phú 4 2000 của Tây Qua\nđược tiến hành bảo dưỡng nâng cấp——và chúng em đã nhận được công việc trong lúc đó.」"
# 【ハチロク】
# display as 八六
# JP: 「どのようなお仕事でございましょうか？」
2039 = "「Đó là công việc như thế nào vậy?」"
# 【西瓜】
# display as 西瓜
# JP: 「日ノ本の鉄道の現況の視察。および――\n日ノ本の鉄道技士のスカウトのお仕事です」
1687 = "「Khảo sát hiện trạng đường sắt của Hinomoto. Và——\ncông việc chiêu mộ các kỹ sư đường sắt của Hinomoto.」"
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「！」\n「まぁ！」
1560 = "「!」\n「Ôi trời!」"
# monologue
# JP: なるほど――西瓜は日ノ本を既に視察していたのか。\nそうしてそれは、姜さんの命によってのこと、と。
2328 = "Ra vậy——Tây Qua đã từng đi khảo sát Hinomoto rồi sao.\nVà đó là theo lệnh của cô Khương."
# monologue
# JP: 理解できれば、繋がり始める。\n散らばっていた小さな疑問が、一つの答えを描き始める。
2423 = "Một khi đã hiểu, mọi thứ bắt đầu kết nối lại với nhau.\nNhững thắc mắc nhỏ nhặt rải rác bắt đầu vẽ nên một câu trả lời duy nhất."
# 【西瓜】
# display as 西瓜
# JP: 「姜秘書は、日ノ本の鉄道が復興しつつあることを\n多大な興味を持って注目なさっておられました」
1672 = "「Thư ký Khương rất quan tâm và chú ý đến việc\nđường sắt Hinomoto đang dần được phục hưng.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1590 = "「嗯」" 
# 【西瓜】
# display as 西瓜
# JP: 「それで、老師と志寰と西瓜を、日ノ本に送ったのです。\n4ヶ月。視察と、可能であればスカウトをと命じられて」
1763 = "「Vì vậy, cô ấy đã cử lão sư, Chí Hoàn và Tây Qua đến Hinomoto.\nTrong 4 tháng. Với nhiệm vụ khảo sát, và nếu có thể thì tiến hành chiêu mộ.」"
# monologue
# JP: 1年7ヶ月前……の4ヶ月前。\nなるほど、まさにナインスターズ初走行の直近だ。
2210 = "1 năm 7 tháng trước……của 4 tháng trước.\nRa vậy, đúng vào khoảng thời gian ngay trước chuyến chạy đầu tiên của Nine Stars."
# monologue
# JP: ……あの時期であれば、有力なまいてつや技術者などは、\nもう激しい囲い込み合戦の終わったあとであったと思うが。
1022 = "……Vào thời điểm đó, tôi nghĩ cuộc chiến tranh giành khốc liệt\nnhững chủ tàu và kỹ sư tài năng có lẽ đã kết thúc rồi chứ."
# 【双鉄】
# display as 雙鐵
# JP: 「成果はどうだった？」
2053 = "「Kết quả thế nào?」"
# 【西瓜】
# display as 西瓜
# JP: 「[ひろでん,1]廣電の[もうりあき,3]毛利安芸先生。[ごとうきゅう,2]後東急の[ごとうかいた,3]後東塊多先生。北開道\nから九洲まで、それぞれ復興の核となる人物を見ました」
1705 = "「Thầy Mouri Aki của Đường sắt điện Hiro. Thầy Goto Kaita của Đường sắt Goto Kyu. Từ Hokkaido\nđến Kyushu, chúng em đã được gặp gỡ những nhân vật nòng cốt trong công cuộc phục hưng ở mỗi nơi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう！　それは……大変に興味深そうな――\nいや――言葉を飾らず言えば、実に楽しそうな旅だな」
1529 = "「Ồ! Thật là……có vẻ rất thú vị——\nÀ không——nói một cách không hoa mỹ thì, đó thực sự là một chuyến đi rất vui vẻ nhỉ.」"
# 【西瓜】
# display as 西瓜
# JP: 「はい。大変楽しかったです。北開道や北淕、四國\nなどでは、キーパーソンに直接のお話も聞けました」
1816 = "「Vâng. Rất là vui ạ. Ở Hokkaido, Hokuriku, Shikoku\nvà nhiều nơi khác, chúng em còn được nghe chuyện trực tiếp từ những nhân vật chủ chốt.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、なんとすばらしいことでしょう」
1583 = "「Ôi, thật là một điều tuyệt vời.」"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜が録音の方の録り鉄――音鉄だと知ると、\nそれぞれのご自慢の鉄道音風景も聞かせてくれました」
1704 = "「Khi biết Tây Qua là người thích ghi âm tàu hỏa——tức là Tori-tetsu chuyên về âm thanh,\nmọi người đã cho em nghe những phong cảnh âm thanh đường sắt mà họ tự hào nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか。\n西瓜の耳は、そうした趣味でも磨かれていたのか」
1546 = "「À——ra vậy.\nĐôi tai của Tây Qua cũng được mài giũa qua những sở thích như thế sao.」"
# 【西瓜】
# display as 西瓜
# JP: 「あ」
# 1555 = "「啊」" 
# monologue
# JP: 西瓜が照れたのか下を向く。\n反動で、おさげがぴょこっと、嬉しげに揺れる。
2584 = "Không biết có phải do xấu hổ hay không mà Tây Qua cúi gằm mặt xuống.\nTheo phản xạ, bím tóc của cô bé khẽ giật giật, đung đưa đầy vui sướng."
# 【ハチロク】
# display as 八六
# JP: 「西瓜の耳で聞く鉄道の音風景！\nああ、どれほど素敵なものなのでしょう」
1986 = "「Phong cảnh âm thanh đường sắt được nghe qua đôi tai của Tây Qua!\nÔi, hẳn là tuyệt vời lắm.」"
# 【西瓜】
# display as 西瓜
# JP: 「……日ノ本の鉄道音風景は、素晴らしいの一言でした」
1060 = "「……Phong cảnh âm thanh đường sắt của Hinomoto, chỉ có thể diễn tả bằng một từ: tuyệt vời.」"
# 【ハチロク】
# display as 八六
# JP: 「特に印象に残っているのは、\nどのような音でございましょうか？」
1832 = "「Âm thanh nào để lại ấn tượng sâu sắc nhất\nđối với cô vậy?」"
# 【西瓜】
# display as 西瓜
# JP: 「[つってつ,2]津っ鐵のストーブ列車の車内から聞く、地吹雪の音。\nみちのく湯けむり鉄道の車内放送のオルゴールの音」
1625 = "「Tiếng bão tuyết nghe từ bên trong toa xe sưởi ấm của Đường sắt Tsutetsu.\nTiếng hộp nhạc phát ra từ loa thông báo trên tàu của Đường sắt Michinoku Yukemuri.」"
# monologue
# JP: 西瓜の声が、もう音楽だ。\nうっとりと、ここちよく鼓膜をくすぐってくる。
2588 = "Giọng nói của Tây Qua, tự bản thân nó đã là một bản nhạc.\nNó mơn trớn màng nhĩ một cách êm ái, khiến người ta say đắm."
# 【西瓜】
# display as 西瓜
# JP: 「[がくなん,1]岳楠鉄道の[でんれい,1]電鈴式の踏切の音。[たいしゃ,1]大社鉄道の古い車輌の、\n空気圧縮機がコココココと鳴く音」
1690 = "「Tiếng chuông điện ở ngã tư đường ngang của Đường sắt Gakunan. Tiếng máy nén khí\nkêu cọc cọc cọc cọc trên những toa xe cũ của Đường sắt Taisha.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ――」
# 1543 = "「啊——」" 
# monologue
# JP: 思い当たるところがあるのだろうか？\n耳に残る音があるのだろうか？
2217 = "Liệu em ấy có nhớ ra điều gì không?\nCó âm thanh nào còn đọng lại trong tai em ấy không?"
# monologue
# JP: うっとりとした様子のハチロクを、\nとてもうらやましく感じてしまう。
2301 = "Nhìn dáng vẻ say sưa của Hachiroku,\ntôi bỗng cảm thấy vô cùng ghen tị."
# 【西瓜】
# display as 西瓜
# JP: 「そうした中でも最高だったのが、クマ川くだり――\n船の上、鉄橋の真下から聞いた、8620の走行音と汽笛」
1933 = "「Và tuyệt vời nhất trong số đó, chính là chuyến đi thuyền trên sông Kuma——\nTiếng chạy tàu và tiếng còi của 8620 nghe từ trên thuyền, ngay dưới cây cầu sắt.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！　ありがとうございます！！」
1510 = "「Ôi! Cảm ơn cô rất nhiều!!」"
# 【西瓜】
# display as 西瓜
# JP: 「お礼を言うのはこちらの方です。あの日は霧雨で、\n偶然、西瓜たちだけの貸し切りの乗船になりました」
1735 = "「Người phải nói lời cảm ơn là Tây Qua mới đúng. Hôm đó trời mưa phùn,\ntình cờ lại trở thành chuyến đi thuyền bao trọn gói chỉ dành riêng cho nhóm Tây Qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは恵まれていたな。大変なぜいたくだ」
2052 = "「Thật may mắn làm sao. Quả là một sự xa xỉ.」"
# 【西瓜】
# display as 西瓜
# JP: 「はい、あれほどにめぐまれた録音は他にないです。\n霧雨は、完全に雑音を消してくれていましたし――」
1830 = "「Vâng, chưa từng có buổi ghi âm nào tuyệt vời đến thế.\nMưa phùn đã hoàn toàn xóa sạch mọi tạp âm——」"
# monologue
# JP: 西瓜は静かに目を閉じる。\n記憶の中に聞こえる音に、耳を傾けているかのように。
2600 = "Tây Qua lặng lẽ nhắm mắt lại.\nNhư thể đang lắng nghe những âm thanh vọng về từ trong ký ức."
# 【西瓜】
# display as 西瓜
# JP: 「女性の船頭さん達は、西瓜の録音に気づくと黙り込み。\n櫓と櫂の扱いも最小限にして――音を、くれたのです」
1451 = "「Các cô lái đò khi nhận ra Tây Qua đang ghi âm liền im lặng.\nHọ hạn chế tối đa việc sử dụng mái chèo——để dành trọn không gian cho âm thanh đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1543 = "「啊——」" 
# monologue
# JP: それだけの気遣いが瞬時に出来て、\n最低限の操船だけで、舟を完全に制御する――
2541 = "Có thể ngay lập tức tinh tế nhận ra điều đó,\nvà hoàn toàn kiểm soát con thuyền chỉ bằng những thao tác chèo tối thiểu——"
# monologue
# JP: ならばふかみ・凪コンビによる操船で――\n8620側は恐らく、僕・日々姫・ハチロクで間違いなかろう。
2425 = "Nếu vậy thì người lái đò chắc chắn là bộ đôi Fukami và Nagi——\nCòn phía 8620 có lẽ không ai khác ngoài tôi, Hibiki và Hachiroku."
# 【西瓜】
# display as 西瓜
# JP: 「真下から、なんの雑音も無く聞く8620の走行音――\nドラフト音にブラスト音。そして、高らかに轟く汽笛」
1707 = "「Tiếng chạy tàu của 8620 nghe từ ngay bên dưới mà không có chút tạp âm nào——\nTiếng hút gió lò hơi, tiếng khí thải xi lanh. Và cả tiếng còi hơi nước vang dội.」"
# monologue
# JP: ……それも一因となったのかもしれんと、ふと思う。\n数多いる有能極まる日ノ本鉄道人たちの中から――
1010 = "……Tôi chợt nghĩ, có lẽ đó cũng là một lý do.\nTrong số vô vàn những người làm đường sắt tài năng xuất chúng ở Hinomoto——"
# monologue
# JP: ハチロク以外は実績も経験もまだまだの僕たちが、\n今回の視察のメンバーとして、いわば抜擢されたのは。
2542 = "Ngoài Hachiroku ra, những người vẫn còn non kém cả về thành tích lẫn kinh nghiệm như chúng tôi,\nlại được đặc cách chọn làm thành viên cho chuyến khảo sát lần này."
# 【西瓜】
# display as 西瓜
# JP: 「あれほど鮮やかな鉄道音風景を、西瓜は他に知りません。\nあの音を志寰と一緒に聞けたのは、西瓜の一生の宝です」
1982 = "「Tây Qua chưa từng biết đến phong cảnh âm thanh đường sắt nào sống động đến thế.\nViệc được cùng Chí Hoàn lắng nghe âm thanh đó, là báu vật cả đời của Tây Qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。これは想像にすぎないが――\nきっと、志寰くんも、同じ感動を覚えたのではないかな」
1589 = "「Ừm. Đây chỉ là suy đoán của tôi thôi——\nnhưng chắc chắn Chí Hoàn cũng có chung cảm xúc đó.」"
# 【西瓜】
# display as 西瓜
# JP: 「あ」
# 1555 = "「啊」" 
# monologue
# JP: 西瓜が一気に赤くなる。\n今ならきっと、届く言葉を話せる気がする。
2593 = "Mặt Tây Qua lập tức đỏ bừng.\nTôi cảm thấy bây giờ chắc chắn những lời mình nói sẽ chạm được đến cô bé."
# 【双鉄】
# display as 雙鐵
# JP: 「今の西瓜の話を聞くと――正しく音を聞くためには、\n周囲の状況を整えることが大事であるのかと想像する」
1935 = "「Nghe câu chuyện vừa rồi của Tây Qua——tôi mường tượng ra rằng, để có thể lắng nghe âm thanh một cách trọn vẹn,\nviệc sắp xếp, điều chỉnh môi trường xung quanh là rất quan trọng.」"
# 【西瓜】
# display as 西瓜
# JP: 「はい、それはこの上なく大切です。どんなに素敵な音も、\n周囲が雑音だらけでは、残念に聞こえてしまいます」
1826 = "「Vâng, điều đó là vô cùng quan trọng. Dù âm thanh có tuyệt vời đến đâu,\nmà xung quanh toàn là tạp âm, thì nghe cũng sẽ rất đáng tiếc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、大事な音を聞くときには――\n雑音を消すための努力が必要になる？」
1783 = "「Nếu vậy, khi muốn lắng nghe một âm thanh quan trọng——\nchẳng phải sẽ cần nỗ lực để loại bỏ tạp âm sao?」"
# 【西瓜】
# display as 西瓜
# JP: 「雑音を消すための努力が必要です。場所を変えたり、\n時間をずらして、人が消えるのを待ってみたりなどの」
1919 = "「Đúng là cần phải nỗ lực loại bỏ tạp âm. Chẳng hạn như thay đổi địa điểm,\ndời thời gian, hoặc đợi cho đến khi không còn ai xung quanh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……ならば、それをすればいいのではないかな」
1089 = "「……Vậy thì, em cứ làm như thế là được mà.」"
# 【西瓜】
# display as 西瓜
# JP: 「え？」
1505 = "「Dạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「西瓜がやり慣れていることを。\n今回も、西瓜のやり方でやればいい」
1993 = "「Hãy làm những gì Tây Qua vốn đã quen thuộc.\nLần này cũng vậy, cứ làm theo cách của Tây Qua là được.」"
# 【ハチロク】
# display as 八六
# JP: 「！」
# 1559 = "「啊！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「志寰くんの声を、正しくまっすぐ聞くために、だ。\n西瓜の中や周辺にある雑音を、ひとつひとつ消していく」
1852 = "「Để có thể lắng nghe trọn vẹn và chân thực nhất giọng nói của Chí Hoàn.\nHãy loại bỏ từng chút một những tạp âm bên trong và xung quanh Tây Qua.」"
# 【西瓜】
# display as 西瓜
# JP: 「あ」
# 1555 = "「啊」" 
# monologue
# JP: 西瓜の瞳が大きく開く。\nその瞳のまま僕を見て、ハチロクの方へ視線を動かす。
2596 = "Đôi mắt Tây Qua mở to.\nCô bé cứ mở to mắt như vậy nhìn tôi, rồi chuyển ánh nhìn sang phía Hachiroku."
# monologue
# JP: ハチロクはごく穏やかな笑みを浮かべて、\n頷き、ひとつ。それだけ返す。
2274 = "Hachiroku nở một nụ cười vô cùng dịu dàng,\nvà khẽ gật đầu một cái. Chỉ đáp lại như vậy thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「恐怖も雑音だろうし、憶測も雑音だろう。\nそれを消すための努力を、もしも西瓜が出来るのならば」
1730 = "「Sợ hãi cũng là tạp âm, mà suy đoán cũng là tạp âm.\nNếu Tây Qua có thể nỗ lực để loại bỏ chúng.」"
# 【西瓜】
# display as 西瓜
# JP: 「西瓜はできます。努力できます。志寰の声を聞くことは。\n西瓜にとって――一番大事な音を聞くことですから」
1989 = "「Tây Qua có thể làm được. Em có thể nỗ lực. Bởi vì việc lắng nghe giọng nói của Chí Hoàn.\nĐối với Tây Qua——là việc lắng nghe âm thanh quan trọng nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2033 = "「這樣啊」" 
# monologue
# JP: 恋愛のことなどなにもわからん。\nけれどもそれを、西瓜の中にある方法論まで落とし込めた。
2604 = "Tôi chẳng hiểu gì về chuyện yêu đương cả.\nNhưng tôi đã có thể diễn giải nó thành phương pháp luận phù hợp với Tây Qua."
# monologue
# JP: ならば、僕にできることはここまでだ――\nっと。
2636 = "Nếu vậy, những gì tôi có thể làm cũng chỉ đến đây thôi——\nChắc vậy."
# 【ハチロク】
# display as 八六
# JP: 「パンダ……いつの間にどこかへいってしまいましたね」
1859 = "「Gấu trúc……không biết đã đi đâu mất từ lúc nào rồi nhỉ.」"
# 【西瓜】
# display as 西瓜
# JP: 「あ！　屋内に。――ちいさなパンダたちは、\n屋内の飼育施設にうつされたのかと思います」
1564 = "「A! Ở trong nhà.——Em nghĩ mấy bé gấu trúc con,\nđã được chuyển vào cơ sở chăn nuôi trong nhà rồi ạ.」"
# monologue
# JP: 西瓜がしまったという顔になる。\n申し訳なさそうな声が出てくる。
2591 = "Tây Qua lộ vẻ mặt như vừa làm hỏng chuyện.\nGiọng nói cũng đầy vẻ hối lỗi."
# 【西瓜】
# display as 西瓜
# JP: 「すみません、西瓜の相談のせいで、\nせっかくの貴重なご視察の機会を」
1470 = "「Xin lỗi mọi người, chỉ vì chuyện của Tây Qua,\nmà làm lỡ mất cơ hội khảo sát quý giá này.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにー！　ハチロクー！　西瓜ちゃーん！！」
2062 = "「Anh haiiiii! Hachirokuuu! Tây Qua ơiiii!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、日々姫。探しにきてくれたのか」
1726 = "「À, Hibiki. Em đến tìm bọn anh sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　パンダひっこんじゃったら、\n誰もおらんくなったけん、すぐ見つかった！」
1594 = "「Vâng! Bọn gấu trúc mà chui vào trong,\nlà chẳng còn ai ở ngoài này nữa, nên em tìm thấy mọi người ngay!」"
# monologue
# JP: 顔も声もニコニコしている。もうごきげんの塊だ。
2552 = "Cả nét mặt lẫn giọng nói đều tươi rói. Đúng là một cục năng lượng vui vẻ."
# 【双鉄】
# display as 雙鐵
# JP: 「よいスケッチができたようだな」
1888 = "「Có vẻ em đã vẽ được những bức phác thảo ưng ý nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「バッチリ！　それに、周りに集まってきた人たちから、\nいろーんなお話も聞けたし」
1496 = "「Hoàn hảo luôn! Hơn nữa, em còn được nghe đủ thứ chuyện\ntừ những người vây quanh nữa.」"
# 【姜】
# display as 姜
# JP: 「日々姫先生の絵はやはり大人気となりました。\n仲国国内、海外の方。様々な観光客が集まって」
1796 = "「Tranh của cô Hibiki quả nhiên rất được yêu thích.\nKhách du lịch trong nước, ngoài nước. Đủ mọi du khách xúm lại xem.」"
# 【志寰】
# display as 志寰
# JP: 「日ノ本語・仲国語・髑国語の多重通訳まで発生しました。\n観光客の仲・髑国語話者さんが買ってでてくれて」
1872 = "「Thậm chí còn có cả phiên dịch đa ngôn ngữ Hinomoto - Trung Quốc - Đức nữa.\nMột du khách biết tiếng Trung và tiếng Đức đã tình nguyện làm phiên dịch giúp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはすごいな――今回の視察、\n日々姫の取材力が本当にものをいってくれそうだ」
2049 = "「Thật tuyệt vời——chuyến khảo sát lần này,\nkhả năng thu thập thông tin của Hibiki thực sự đã phát huy tác dụng rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「見て描くことがわたしのお仕事やけん！\nゆーても、にぃにたちも見たり撮ったりしたんでしょ？」
1751 = "「Quan sát và vẽ lại là công việc của em mà!\nNói vậy chứ, anh hai và mọi người cũng đã xem và chụp ảnh rồi đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1590 = "「嗯」" 
# monologue
# JP: シャッターの方は、そうたくさんは切れなかったが、\nそれでも、だ。
2502 = "Về phần chụp ảnh thì tôi không chụp được nhiều lắm,\nnhưng dù vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「よい視察が出来たかと思う。\nここで見聞きしたこともまた、大きな学びだと感じる」
1753 = "「Anh nghĩ chúng ta đã có một chuyến khảo sát tốt.\nNhững gì nghe và thấy ở đây cũng là một bài học lớn.」"
# 【ハチロク】
# display as 八六
# JP: 「うふふっ、まことでございますね。\nとても尊く、可愛らしいものを見て、聞きました」
1609 = "「Ufufu, đúng vậy nhỉ.\nChúng ta đã được nhìn thấy, nghe thấy những điều vô cùng đáng quý và dễ thương.」"
# 【西瓜】
# display as 西瓜
# JP: 「…………」
1050 = "「…………」"
# monologue
# JP: 西瓜が赤面してしまう。\n途端、志寰君が目に見えておろおろしはじめる。
2592 = "Tây Qua đỏ bừng mặt.\nNgay lập tức, Chí Hoàn bắt đầu lộ rõ vẻ luống cuống."
# monologue
# JP: ……他人の気持ちはどこまでも想像するしかないが――\nこれならば西瓜は、すぐ雑音を消せそうに思う。
1005 = "……Cảm xúc của người khác thì chỉ có thể suy đoán thôi, nhưng——\nnhư thế này thì tôi nghĩ Tây Qua sẽ sớm loại bỏ được tạp âm thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「西瓜は、今日はどうだった？」
1977 = "「Tây Qua, hôm nay em thấy thế nào?」"
# monologue
# JP: ゆえに、尋ねる。\n西瓜もすぐに顔を上げ、僕をおじずに見つめ、答える。
2359 = "Vì vậy, tôi hỏi.\nTây Qua cũng lập tức ngẩng đầu lên, nhìn thẳng vào tôi không chút sợ sệt và trả lời."
# 【西瓜】
# display as 西瓜
# JP: 「西瓜にも、この上なく貴重で大切な視察の時間を\nいただけたものと理解しています」
1973 = "「Tây Qua cũng hiểu rằng mình đã có được\nmột khoảng thời gian khảo sát vô cùng quý giá và quan trọng.」"
# monologue
# JP: 深く、西瓜がお辞儀する。\n僕へ、ハチロクへ。そして日々姫に、姜さんに向け。
2582 = "Tây Qua cúi đầu thật sâu.\nChào tôi, Hachiroku. Rồi hướng về phía Hibiki và cô Khương."
# monologue
# JP: そうして伸ばし直した背で、\n志寰君へ、まっすぐまっすぐ、向き直る。
2534 = "Sau đó, cô bé thẳng lưng lên,\nvà quay sang đối diện trực tiếp với Chí Hoàn."
# 【西瓜】
# display as 西瓜
# JP: 「帰りましょう。志寰。\n西瓜は、志寰と。ふたりでお話がしたいです」
1719 = "「Chúng ta về thôi. Chí Hoàn.\nTây Qua, muốn nói chuyện riêng với Chí Hoàn.」"
# 【日々姫】
# display as 日日姬
# JP: 「へぇええ～　そぎゃんお話ししとったんだー」
1519 = "「Hểêê~ Mọi người đã nói chuyện như vậy sao.」"
# monologue
# JP: ベッドにごろりころげたままの日々姫の声には、\n少し、眠たさが混じり始める。
2376 = "Giọng nói của Hibiki khi đang nằm lăn lộn trên giường,\nbắt đầu xen lẫn chút buồn ngủ."
# monologue
# JP: 考えてみれば無理もない。三段寝台の、トラブルありの\n一夜のあとで、そのまま半日観光したのだから。
2356 = "Nghĩ lại thì cũng phải thôi. Sau một đêm đầy rắc rối trên chiếc giường ba tầng,\nrồi lại đi tham quan suốt nửa ngày trời cơ mà."
# 【日々姫】
# display as 日日姬
# JP: 「……西瓜ちゃん。\n気持ち、ちゃあんと伝えられるとよかね」
1062 = "「……Bé Tây Qua.\nMong là em ấy sẽ truyền đạt được trọn vẹn tình cảm của mình nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。あとわずか二日の視察といえど、\n妙にギクシャクなどされてしまっては、こちらも居辛い」
1493 = "「Đúng vậy. Dù chuyến khảo sát chỉ còn vỏn vẹn hai ngày,\nnhưng nếu cứ gượng gạo một cách kỳ lạ thì chúng ta cũng khó xử.」"
# 【日々姫】
# display as 日日姬＆八六
# JP: 「え"っ」\n「まぁ」
1511 = "「Hả?」\n「Trời ạ.」"
# monologue
# JP: ああ、これは――なにかを僕はやらかしたのか。\n思う間もなく、尖った声が飛んでくる。
2353 = "A, chuyện này——mình lại lỡ lời rồi sao.\nChưa kịp nghĩ xong, một giọng nói sắc lẹm đã bay tới."
# 【日々姫】
# display as 日日姬
# JP: 「わたしたちのことより、西瓜ちゃんたちのことでしょー。\n女の子の一世一代の、大事なこととよ？」
1748 = "「Quan trọng là chuyện của Tây Qua chứ đâu phải chuyện của chúng ta.\nĐó là chuyện hệ trọng cả đời của con gái đấy anh biết không?」"
# monologue
# JP: ハチロクも声には出さぬが、なんども大きく頷いている。
2269 = "Hachiroku tuy không lên tiếng nhưng cũng gật đầu lia lịa."
# monologue
# JP: ふむ、なるほど。\n恋とはかほど、女の子から冷静さを奪い取るものか。
2348 = "Hừm, ra là vậy.\nTình yêu quả là thứ cướp đi sự bình tĩnh của con gái."
# monologue
# JP: （……あの聡明な西瓜が、あれほど混乱したのだものな。\n他人ごととはいえ、日々姫・ハチロクも思い入れるか）
2657 = "（……Đến cả Tây Qua thông minh là thế mà còn rối bời như vậy.\nDù là chuyện của người khác, nhưng Hibiki và Hachiroku cũng rất đồng cảm sao.）"
# monologue
# JP: 納得できれば、釘を刺す必要を感じてしまう。\n恐らく無用なことであろうが、それでも、だ。
2629 = "Hiểu được điều đó, tôi cảm thấy cần phải răn đe một chút.\nDù có lẽ là thừa thãi, nhưng vẫn phải làm."
# 【双鉄】
# display as 雙鐵
# JP: 「だとしても、仕事は仕事だ。僕らには、\nよりよい視察を提言するという、職務がある」
1475 = "「Dù vậy, công việc vẫn là công việc. Chúng ta có nhiệm vụ\nđề xuất những phương án khảo sát tốt hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「あうっ」
1587 = "「Aư.」"
# 【ハチロク】
# display as 八六
# JP: 「それは……まことに左様でございますけれど」
2030 = "「Chuyện đó……quả thực là vậy, nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ僕の発言も軽率な上、失礼だった」
2006 = "「Tuy nhiên, phát ngôn của tôi cũng có phần khinh suất và thất lễ.」"
# monologue
# JP: そこは認める。反省する。\n本人達が不在の所で、見くびる様なことを言ってしまった。
2627 = "Tôi thừa nhận điều đó. Và tự kiểm điểm.\nTôi đã lỡ nói những lời có ý xem thường khi những người trong cuộc không có mặt."
# 【双鉄】
# display as 雙鐵
# JP: 「志寰君も西瓜もプロだ。私事で何があろうが、\n職責はきちんと果たしてくれると決まっていように」
1716 = "「Cả Chí Hoàn và Tây Qua đều là những người chuyên nghiệp. Dù có chuyện tư gì đi nữa,\nhọ chắc chắn vẫn sẽ hoàn thành tốt trách nhiệm công việc của mình.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、うん。よねっ！」
1548 = "「A, vâng. Đúng vậy!」"
# monologue
# JP: 日々姫が頷く。\nベッドが深く沈み込むほど、大きく強く。
2484 = "Hibiki gật đầu.\nMạnh đến mức làm chiếc giường lún sâu xuống."
# 【日々姫】
# display as 日日姬
# JP: 「やけん、私達も！\n私達のお仕事、きっちり果たさんといけんね」
1765 = "「Thế nên, chúng ta cũng vậy!\nPhải hoàn thành thật tốt công việc của mình mới được.」"
# 【ハチロク】
# display as 八六
# JP: 「で、ございますね。\n……これほどの接遇を頂いていることもございますし」
1828 = "「Đúng vậy nhỉ.\n……Hơn nữa chúng ta còn được tiếp đón chu đáo đến nhường này cơ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
1808 = "「Chính xác.」"
# 【日々姫】
# display as 日日姬
# JP: 「お姫様のベッド！」
1455 = "「Giường của công chúa!」"
# monologue
# JP: 部屋に一歩を踏み入れた瞬間のはしゃぎっぷりが、\nハチロクの一言によって、巻き戻される。
2280 = "Sự phấn khích ngay khoảnh khắc bước chân vào phòng,\nđã được tua lại nhờ một câu nói của Hachiroku."
# 【日々姫】
# display as 日日姬
# JP: 「ほんっとすごかね～　こんお部屋！\n仲国の時代劇とかに出てきそうだもん！！」
2032 = "「Căn phòng này~ Tuyệt vời thật đấy!\nCứ như bước ra từ phim cổ trang Trung Quốc vậy!!」"
# 【ハチロク】
# display as 八六
# JP: 「レイルロオドの身でありながら、天蓋付きの寝台に、\nまさか横たわれるとは、夢にも思っておりませんでした」
2021 = "「Thân là một Railord, mà lại được ngả lưng trên chiếc giường có rèm che thế này,\nem nằm mơ cũng không dám nghĩ tới.」"
# 【双鉄】
# display as 雙鐵
# JP: 「こうした宿が変わらず残っているのであれば――\n無論、需要もそれなり以上にあるのだろうな」
1781 = "「Nếu những nhà nghỉ như thế này vẫn còn tồn tại không đổi thay——\nThì chắc chắn nhu cầu cũng phải ở mức tương đối trở lên rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、うん」
1549 = "「A, vâng.」"
# monologue
# JP: 日々姫がスケッチブックを開き始める。\nスイッチが入り、眠気を押し戻したようだ。
2487 = "Hibiki bắt đầu mở cuốn sổ phác thảo ra.\nCó vẻ như công tắc đã được bật, xua tan đi cơn buồn ngủ."
# 【日々姫】
# display as 日日姬
# JP: 「その辺のお話は聞いたと。歴史ば、仲国観光の、\nやっぱりおっきなテーマのひとつみたい」
1739 = "「Em cũng có nghe nói về chuyện đó. Lịch sử,\nquả nhiên là một trong những chủ đề lớn của du lịch Trung Quốc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「歴史――史跡や名蹟などを見学するといった感じか？」
1839 = "「Lịch sử——kiểu như đi tham quan các di tích lịch sử và danh lam thắng cảnh sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。そう。おぼえてなかと？　このおじさん。\nパンダバスの中にまぎれて、おじさんのバスもあったの」
1598 = "「Vâng. Đúng vậy. Anh không nhớ sao? Chú này này.\nLẫn trong những chiếc xe buýt gấu trúc, cũng có cả xe buýt của chú ấy nữa.」"
# monologue
# JP: スケッチブックの中には、デフォルメされた、\n時代がかった服装に、飄々とした壮年男性が描かれている。
2526 = "Trong cuốn sổ phác thảo là hình ảnh một người đàn ông trung niên với phong thái ung dung,\nmặc trang phục cổ trang được vẽ cách điệu."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、覚えている。というか、[とほ,1]徒甫と添え書きも\nしてあったよな。仲国の、代表的な詩人だろう？」
1580 = "「À, anh nhớ rồi. Hình như còn có dòng chữ Đỗ Phủ kèm theo nữa nhỉ.\nLà một nhà thơ tiêu biểu của Trung Quốc đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「そ！　そん詩人のかつてのお家が史跡になって、\n周辺が公園として観光名所化されたりする位だって」
1684 = "「Đúng rồi! Ngôi nhà cũ của nhà thơ đó đã trở thành di tích lịch sử,\nvà khu vực xung quanh cũng được quy hoạch thành công viên thu hút khách du lịch luôn đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと。詩人のかつての住居に、\nそれほどたくさんの人が来るのか？」
2002 = "「Thật sao. Nơi ở cũ của một nhà thơ,\nmà lại có nhiều người đến thăm đến vậy à?」"
# 【日々姫】
# display as 日日姬
# JP: 「だって。年間何十万人も！　その他にも、ここ、\n聖都は三国志時代の蜀って国の、首都だったけん」
2047 = "「Nghe nói mỗi năm có hàng trăm nghìn người luôn! Ngoài ra, ở đây,\nThịnh Đô từng là thủ đô của nước Thục thời Tam Quốc nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……なるほど、仲国においての歴史観光は、\n日ノ本のそれの何百倍もの人気をもっているのだな」
1068 = "「……Ra vậy, du lịch lịch sử ở Trung Quốc,\ncó mức độ phổ biến gấp hàng trăm lần so với ở Hinomoto nhỉ.」"
# monologue
# JP: 日ノ本ではとても考えられんことだ。
2369 = "Ở Hinomoto thì thật khó mà tưởng tượng được."
# monologue
# JP: 天守閣の残る城跡ならば、さすがに観光名所だが、\n詩人――例えば俳人などの、ゆかりの土地や生家など……
2382 = "Nếu là tàn tích lâu đài còn sót lại tháp canh thì đúng là danh lam thắng cảnh,\nnhưng những nơi gắn liền với nhà thơ——ví dụ như nhà thơ Haiku, hay ngôi nhà họ sinh ra thì……"
# 【ハチロク】
# display as 八六
# JP: 「日ノ本では――あの名高い関臥原の古戦場さえ、\nほとんど見学する方もいないそうですものね」
1624 = "「Ở Hinomoto——ngay cả chiến trường cổ Quan Ngọa Nguyên nổi tiếng,\ncũng hầu như chẳng có ai đến tham quan cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1602 = "「Hửm?」"
# monologue
# JP: ハチロクも、僕と同じことを思ったらしい。\nが、なにゆえに、唐突極まる関臥原――ああ！
2278 = "Có vẻ Hachiroku cũng nghĩ giống tôi.\nNhưng, tại sao lại đột ngột nhắc đến Quan Ngọa Nguyên——A!"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。関臥原は、旧東峡道本線の駅だったか」
1480 = "「Ra vậy. Quan Ngọa Nguyên, là một ga trên Tuyến chính Đông Hạp Đạo cũ nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。急勾配を持つ難所です。帝鉄全盛期には、\n\x%l補機;#00ffc040;補機%l;#;の回送のためだけの迂回線が設けられたほどの」
1821 = "「Vâng. Đó là một khu vực hiểm trở với độ dốc lớn. Thời kỳ hoàng kim của Đường sắt Hoàng gia,\nhọ thậm chí còn thiết lập cả một tuyến đường vòng chỉ dành riêng cho việc đưa \x%l補機;#00ffc040;đầu máy phụ%l;#; về.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1527 = "「Ồ.」"
# monologue
# JP: 感心すれば、ふふっ、とハチロクは小さく笑う。
2513 = "Thấy tôi trầm trồ, Hachiroku khẽ cười fufu."
# 【ハチロク】
# display as 八六
# JP: 「\x%l補機;#00ffc040;補機%l;#;の付け外しの合間などには時間がありましたので。\n関臥原の観光については、少し、わたくし詳しいのです」
1616 = "「Vì em có nhiều thời gian rảnh rỗi trong lúc tháo lắp \x%l補機;#00ffc040;đầu máy phụ%l;#;.\nNên em cũng biết chút ít về việc tham quan Quan Ngọa Nguyên.」"
# monologue
# JP: ……関臥原の古戦場は観光地化を目指し、\nそこそこ以上の整備が行われているらしい。
1016 = "……Chiến trường cổ Quan Ngọa Nguyên dường như đang hướng tới việc trở thành một địa điểm du lịch,\nvà đã được quy hoạch ở mức độ tương đối.」"
# monologue
# JP: が――僕も日々姫もそうした事実をまったく知らずにいた。\nつまりはそこらが、日ノ本の歴史観光の弱さだろう。
2246 = "Nhưng——cả tôi và Hibiki đều hoàn toàn không biết gì về điều đó.\nNói cách khác, đó chính là điểm yếu của du lịch lịch sử ở Hinomoto."
# 【日々姫】
# display as 日日姬
# JP: 「それに比べて、仲国は本当に歴史観光が盛んみたい。\n春節や国慶節には、史跡めぐりの旅もよく行われるって」
1940 = "「So với điều đó, du lịch lịch sử ở Trung Quốc thực sự rất phát triển.\nVào dịp Lễ hội Mùa xuân hay Quốc khánh, các chuyến đi tham quan di tích lịch sử cũng diễn ra rất thường xuyên.」"
# 【ハチロク】
# display as 八六
# JP: 「シュンセツに、コッケイセツ――でございますか？」
1806 = "「Lễ hội Mùa xuân, và Quốc khánh——sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、仲国の大型連休。春節が日ノ本の旧正月で、\n国慶節は仲国の建国記念日。それぞれ一週間のお休み」
1575 = "「À, đó là những kỳ nghỉ lễ lớn ở Trung Quốc. Lễ hội Mùa xuân giống như Tết Nguyên đán của Hinomoto,\ncòn Quốc khánh là ngày kỷ niệm quốc khánh của Trung Quốc. Mỗi dịp đều được nghỉ một tuần.」"
# 【双鉄】
# display as 雙鐵
# JP: 「一週間の大型連休が年に二回か！\nそれは、さぞかし賑わおうな」
1400 = "「Kỳ nghỉ lễ lớn kéo dài một tuần mà có tận hai lần một năm sao!\nChắc chắn sẽ náo nhiệt lắm đây.」"
# 【日々姫】
# display as 日日姬
# JP: 「賑わうって。国内便の飛行機とエアクラで。\n鉄道旅行客は、年々減少しちゃってるって」
1877 = "「Náo nhiệt lắm. Bằng các chuyến bay nội địa và Aircra.\nNhưng lượng khách du lịch bằng đường sắt thì lại đang giảm dần qua từng năm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「大廃線はなくとも、鉄道離れは避けられんのか。\nああ――そういえば飛行機の客室乗務員さんも……」
1472 = "「Dù không có cuộc Đại bãi bỏ tuyến đường sắt, thì việc mọi người quay lưng với đường sắt vẫn là điều khó tránh khỏi sao.\nÀ——nhắc mới nhớ, cô tiếp viên hàng không trên máy bay cũng……」"
# 【ハチロク】
# display as 八六
# JP: 「！　おっしゃっておられましたね。[ほんこん,1]紅港の方……\n確か、『鉄道にはほとんど馴染みがない』と」
1563 = "「! Cô ấy có nói vậy nhỉ. Người Hồng Cảng……\nHình như là, 'Tôi hầu như không quen thuộc với đường sắt cho lắm'.」"
# 【日々姫】
# display as 日日姬
# JP: 「あるんだと思う。特に若い世代にほど――\n鉄道路線があるのに、利用していないって傾向が」
1754 = "「Em nghĩ là có đấy. Đặc biệt là thế hệ trẻ——\nDù có tuyến đường sắt, nhưng xu hướng là họ không sử dụng chúng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あるいは国土の広大さ故か。国内便で移動して、\n移動先でエアクラをレンタルしてが主流なのかもしれん」
1757 = "「Hoặc có lẽ do lãnh thổ quá rộng lớn. Di chuyển bằng chuyến bay nội địa,\nrồi thuê Aircra tại điểm đến có thể đang là xu hướng chủ đạo.」"
# monologue
# JP: 整頓される。\n要素と要素が、ひとつの形に繋がり始める。
2453 = "Mọi thứ đang được sắp xếp lại.\nCác yếu tố bắt đầu kết nối với nhau thành một hình hài rõ rệt."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、移動を単なる移動としないための要素を――\n『仲国版ナインスターズ』で、取り込みたいわけか」
1764 = "「Vì vậy, họ muốn đưa những yếu tố giúp việc di chuyển không chỉ đơn thuần là di chuyển——\nvào 'Nine Stars phiên bản Trung Quốc' sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「確かに、ナインスターズは九日間、\nお客様を飽きさせないで、楽しい旅に連れ出すと。けど」
1883 = "「Đúng là Nine Stars trong chín ngày,\nsẽ mang đến cho hành khách một chuyến đi thú vị mà không hề nhàm chán. Nhưng mà.」"
# 【ハチロク】
# display as 八六
# JP: 「で。ございますね。九洲周遊列車ですから――\n走りっぱなしになるわけではない」
1918 = "「Đúng vậy nhỉ. Vì là chuyến tàu du ngoạn Kyushu nên——\nkhông phải lúc nào cũng chạy liên tục.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。夜から早朝の時間帯を走り、日中から夕方は、\nたっぷりと観光下車をお楽しみいただくのが、基本だ」
1848 = "「Đúng thế. Chạy vào khoảng thời gian từ đêm đến sáng sớm, còn từ trưa đến chiều tối,\ncơ bản là để hành khách xuống tàu và tận hưởng việc tham quan.」"
# monologue
# JP: そうできなければ、ナインスターズは成立しない。\n全員が理解できているゆえ、空気が一気に重くなる。
2543 = "Nếu không làm được như vậy, Nine Stars sẽ không thể thành hình.\nVì tất cả đều hiểu rõ điều đó, nên bầu không khí bỗng chốc trở nên nặng nề."
# 【日々姫】
# display as 日日姬
# JP: 「……仲国全土の、例えば歴史遺産だけに絞ったとしても、\n周遊ってなると――」
1066 = "「……Dù chỉ tập trung vào các di sản lịch sử trên toàn lãnh thổ Trung Quốc,\nnhưng nếu nói đến việc đi vòng quanh thì——」"
# 【双鉄】
# display as 雙鐵
# JP: 「……拠点間の距離を短くとれば、ナインスターズ型も\n可能となるが……それでは、仲国らしさを余りにも欠く」
1107 = "「……Nếu rút ngắn khoảng cách giữa các điểm dừng, mô hình Nine Stars\ncũng có thể thực hiện được……Nhưng như vậy, lại quá thiếu đi bản sắc của Trung Quốc.」"
# 【ハチロク】
# display as 八六
# JP: 「かと申しまして――それぞれの拠点間の距離を、\n例えば、北琴－聖都の程度に設定しますと――」
1498 = "「Nhưng nếu nói vậy——khoảng cách giữa các điểm dừng,\nví dụ như được thiết lập ở mức từ Bắc Cầm đến Thịnh Đô thì——」"
# 【日々姫】
# display as 日日姬
# JP: 「７日間で仲国大陸半周くらいはできそう？\nばってん、乗車と観光の時間のバランスが……」
2081 = "「Trong 7 ngày có thể đi được nửa vòng lục địa Trung Quốc không nhỉ?\nNhưng mà, sự cân bằng giữa thời gian đi tàu và tham quan thì……」"
# 【双鉄】
# display as 雙鐵
# JP: 「20時間乗車、4時間観光のローテーションでは、\nいくら車内を快適・豪華に仕立てたところで」
1777 = "「Với vòng lặp 20 tiếng đi tàu, 4 tiếng tham quan,\nthì dù bên trong tàu có được thiết kế thoải mái, sang trọng đến đâu đi chăng nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「……ポーレット様でしたら、\nさぞやご堪能くださいましょうが」
1105 = "「……Nếu là Thịnh trưởng Paulette,\nchắc chắn cô ấy sẽ rất tận hưởng đấy.」"
# monologue
# JP: はぁ、と全員のため息が混じる。\nそれだけの長時間の連日乗車。
2378 = "Hà, tất cả cùng đồng thanh thở dài.\nPhải đi tàu liên tục trong một khoảng thời gian dài như vậy."
# monologue
# JP: 僕や日々姫でも恐らく保たない。\n飽きも来ようし、体力的にも厳しくなろう。
2326 = "Cả tôi và Hibiki e rằng cũng không chịu nổi.\nSẽ thấy nhàm chán, và thể lực cũng sẽ bị bào mòn."
# 【双鉄】
# display as 雙鐵
# JP: 「――マニアをターゲットには出来ない。\nそれは確実な滅びへの道だし、鉄道復権を遠ざける」
1033 = "「——Không thể lấy những người đam mê làm mục tiêu được.\nĐó chắc chắn là con đường dẫn đến diệt vong, và sẽ đẩy lùi sự phục hưng của đường sắt.」"
# 【日々姫】
# display as 日日姬
# JP: 「よねぇ」
1494 = "「Đúng vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「となると、だ」
1766 = "「Nếu vậy thì.」"
# monologue
# JP: ……日々姫のスケッチブックを見直す。\n自分のメモと、カメラに残した写真群とも。
1013 = "……Tôi xem lại cuốn sổ phác thảo của Hibiki.\nCùng với những ghi chép của bản thân, và những bức ảnh còn lưu trong máy ảnh."
# monologue
# JP: 要素を全て一度書き出し、\nあらためて眺め、考え直す。
2446 = "Viết ra tất cả các yếu tố một lần nữa,\nnhìn lại và suy nghĩ lại từ đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「……少し、材料が足りていないのかもしれんな」
1082 = "「……Có lẽ, chúng ta vẫn còn thiếu một chút tư liệu.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、うん。今のままでも、一応絵、\n描けるは描けると思うばってん――」
1571 = "「A, vâng. Với tình hình hiện tại, em nghĩ\nvẽ thì vẫn có thể vẽ được, nhưng mà——」"
# monologue
# JP: 頷き合う。\nその絵は、案は、決して納得できるものには仕上がらない。
2436 = "Chúng tôi gật đầu với nhau.\nBức tranh đó, hay phương án đó, chắc chắn sẽ không thể hoàn thiện một cách thỏa đáng."
# monologue
# JP: 僕たちはまだ、仲国の鉄道利用者の。あるいは鉄道を\n利用していない人たちの、声を、ほとんど聞けていない。
2434 = "Chúng tôi vẫn chưa nghe được nhiều ý kiến của những người sử dụng đường sắt ở Trung Quốc.\nHay thậm chí là của những người không sử dụng đường sắt."
# 【ハチロク】
# display as 八六
# JP: 「きっと描けます。日々姫なら。\n目にする誰もが、しあわせになれる素晴らしい絵を」
1794 = "「Chắc chắn sẽ vẽ được thôi. Nếu là Hibiki.\nMột bức tranh tuyệt vời khiến bất cứ ai nhìn thấy cũng cảm thấy hạnh phúc.」"
# 【日々姫】
# display as 日日姬
# JP: 「あはっ」
1556 = "「Aha.」"
# monologue
# JP: ハチロクがことさら明るい声をだす。\n室内の重い空気を、吹き飛ばそうとしてくれる。
2302 = "Hachiroku cất giọng đặc biệt tươi sáng.\nNhư muốn xua tan đi bầu không khí nặng nề trong phòng."
# 【ハチロク】
# display as 八六
# JP: 「その材料を集めるための時間だって、\nまだ二日間もあるのではございませんか」
1745 = "「Chẳng phải chúng ta vẫn còn tận hai ngày\nđể thu thập thêm tư liệu sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。……帰国準備やなんだもあるゆえ、\n実質的には、明日一日の猶予となろうが」
1915 = "「Đúng vậy.……Vì còn phải chuẩn bị cho việc về nước nữa,\nnên thực tế thì, chúng ta chỉ còn dư dả ngày mai thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「その一日を、蒸気機関車乗車に使えるのです」
1803 = "「Và một ngày đó, chúng ta có thể dành trọn để trải nghiệm đi tàu hơi nước.」"
# monologue
# JP: ぽふんと、ハチロクが姫君の寝台に横たわる。
2266 = "Pofun, Hachiroku nằm dài trên chiếc giường công chúa."
# monologue
# JP: 顔が見えなくなったかわりに――その声に、その息に、\n混じるワクワクが、より際立って伝わってくる。
2643 = "Thay vì không nhìn thấy khuôn mặt em ấy——thì sự phấn khích lẫn trong giọng nói,\ntrong từng hơi thở, lại được truyền tải một cách rõ rệt hơn."
# 【ハチロク】
# display as 八六
# JP: 「――きっと、多くを学べますとも」
1032 = "「——Chắc chắn, chúng ta sẽ học hỏi được rất nhiều điều.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん！　よねっ！\nよーし、私も鉛筆、たーくさん削っておかないと」
1592 = "「Vâng! Đúng thế nhỉ!\nĐược rồi, em cũng phải gọt thật nhiềềều bút chì mới được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。どんな\x%l蒸機;#00ffc040;蒸機%l;#;か、どんな路線か、楽しみだ」
1813 = "「Ừ. Thật đáng mong đợi xem đó sẽ là loại \x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; nào, và tuyến đường ra sao.」"
# monologue
# JP: 予備知識なし。\nつまりは、行き当たりばったりの旅。
2262 = "Không có bất kỳ kiến thức chuẩn bị nào.\nNói cách khác, đây là một chuyến đi tới đâu hay tới đó."
# monologue
# JP: いまのところは、\nそれは良い方向に出ていることが確信できる。
2228 = "Nhưng cho đến lúc này,\ntôi có thể tin chắc rằng mọi thứ đang diễn ra theo chiều hướng tốt."
# 【ハチロク】
# display as 八六
# JP: 「きっと、素晴らしい蒸気機関車で、路線で、\nお客様たちで、レイルロオドと機関士さんです」
1395 = "「Chắc chắn đó sẽ là một đầu máy hơi nước tuyệt vời, một tuyến đường tuyệt vời,\nvới những hành khách, Railord và người lái tàu tuyệt vời.」"
# monologue
# JP: ハチロクの声にも、眠さの色が濃く混じりはじめる。\nというか――僕も――
2287 = "Giọng của Hachiroku cũng bắt đầu nhuốm màu buồn ngủ đậm đặc.\nNói đúng hơn là——cả tôi cũng vậy——"
# monologue
# JP: ああ、横たわればずっしり来る。\n疲労が眠気の綿に変わって、全身を緩く包み込む。
2214 = "A, vừa ngả lưng xuống là cơn buồn ngủ ập đến nặng trĩu.\nSự mệt mỏi hóa thành những lớp bông ngái ngủ, nhẹ nhàng ôm lấy toàn bộ cơ thể."
# 【ハチロク】
# display as 八六
# JP: 「わたくし……ふぁあ――少しでも……\nレイルロオドと、お話……できると……良いのですけど」
1738 = "「Em……oáp——giá mà có thể……\ntrò chuyện……với Railord……dù chỉ một chút……thì tốt biết mấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「できるさ。必ず。だから、今は安心して眠るといい。\nおやすみハチロク。おやすみ日々姫」
1937 = "「Chắc chắn sẽ được thôi. Nên giờ em cứ yên tâm ngủ đi.\nNgủ ngon nhé Hachiroku. Ngủ ngon Hibiki.」"
# monologue
# JP: ふわっ、と、小さな息が聞こえる。
2211 = "Một tiếng thở hắt nhẹ nhàng vang lên."
# monologue
# JP: 笑いのような、あくびのような――\n安心しきった、だれかの息が。
2251 = "Như một tiếng cười, cũng như một cái ngáp——\nHơi thở của một ai đó, tràn ngập sự an tâm."
# 【ハチロク】
# display as 八六
# JP: 「はい。おやすみなさい。双鉄さま」
1646 = "「Vâng. Chúc ngài ngủ ngon. Ngài Soutetsu.」"
# 【日々姫】
# display as 日日姬
# JP: 「おやすみ、にぃに」
1831 = "「Ngủ ngon nhé, anh hai.」"
