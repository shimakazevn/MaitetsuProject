3805 = "試運營的結果報告，可是會左右今後全盤走向的重要事項。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まず、単純な運転台の形状の違いだな。\nとくに、\x%l逆転機;#00ffc040;逆転機%l;#;がレバー式なのに戸惑っていた」
3097 = "「首先，應該是駕駛台的形狀不同的關係吧。手把式的\\x%l逆転機;#00ffc040;回動機%l;#;讓她尤其不習慣」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そこって、やっぱり問題になるもんなんですか？」
3002 = "「這一點果然還是有問題嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「感覚がやはり変わってくるので、どうしても慎重になる。\nとはいえ、ここは経験でほどなく解消できよう」
3018 = "「這關係到駕駛的感覺，所以還是慎重為好。但這部分隨著經驗積累應該很快能克服」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っていうと、\n経験を積んでも解消できなさそうな問題も？」
3017 = "「這部分……那莫非還有積累經驗也不能克服的問題嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。目視の視界の問題だ。湯医線の標識・表示類は、\n全て左側運転台を想定して設置されているので――」
2484 = "「嗯，那就是視野的問題。湯醫線上的標誌、指示全都是以駕駛台位於左側為前提設置的——」" 

# monologue
# JP: 言い切るより先、\nポーレットが嬉しげに両手を合わせて鳴らす。
3722 = "然而在我說完之前，波萊特就開心地拍了拍雙手道。" 

# 【ポーレット】
# display as 波萊特
