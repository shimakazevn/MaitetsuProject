3781 = "能讓八六交口稱讚的實力背後，想必是日復一日水滴石穿的積累。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大したものだ。筋金入りのプロなのだなぁ」
3016 = "「這還真是不得了。的確是歷經千錘百鍊的專家啊」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、[めいこくしき,2]冥国式\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のこと、\n勘違いしてたって思いましたですよぉ」
2866 = "「玲奈感覺，自己誤解了美國式\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;了」" 

# monologue
