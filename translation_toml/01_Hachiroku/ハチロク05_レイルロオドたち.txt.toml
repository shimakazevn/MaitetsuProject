2933 = "「行駛自身並沒有問題，只是——為右撇子設計的駕駛台讓日日姬有些疲於應付」" 

# 【ポーレット】
# display as 波萊特
# JP: 「苦戦って――具体的には？」
2874 = "「疲於應付——具體是指？」" 

# monologue
# JP: と、いかん、集中せねば。
3442 = "啊不好，我也得集中精神才行。" 

# monologue
