2435 = "「啊！是要補足配合右撇子駕駛台用的標誌、指示吧？這件事奧莉薇也向我提過要求了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィから？」
2541 = "「奧莉薇也說了？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。必須のことだと思ったので、手配しました。\n湯医線全線、二週間と少しで改善できる予定です」
2776 = "「是的。我覺得這是必要的，就先準備起來了。給我兩個星期多一點的時間，應該就能完成了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――それだけの期間があれば、\nまず日々姫は運転台にフィットする――よな？」
2461 = "「嗯——有這麼長時間的話，正好先讓日日姬熟悉一下駕駛台——如何？」" 

# monologue
# JP: 問えば、ハチロクもすぐにうなずき返してくれる。
3644 = "我這邊剛開口發問，八六便立即點頭回應。" 

# 【ハチロク】
# display as 八六
# JP: 「と、思われます。凪と交代乗務できるかについては、\n\x%l機関士;#00ffc040;機関士%l;#;・凪での試験運転を待たなくてはなりませんが」
2672 = "「我也有此想法。至於能否與凪換位執行乘務任務，那要等凪擔當\\x%l機関士;#00ffc040;司機%l;#;進行過試運營之後才能決定」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……もし凪ちゃんがフィットできなくても、\n右田日々姫\x%l機関士;#00ffc040;機関士%l;#;で、営業運転は？」
1762 = "「……萬一小凪適應不了，也可以讓右田日日姬擔當\\x%l機関士;#00ffc040;司機%l;#;開始商業運營？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、開始できると判断する。\n三週間後であれば、まず間違いなく」
2296 = "「依我看來是可以的。畢竟有三個星期的時間，應該沒有問題」" 

# 【ポーレット】
# display as 波萊特
# JP: 「なら、そこを、営業運転開始の目標日に定めましょう。\n新『バーベキュー列車、もくもくオリヴィ号』の」
3051 = "「那就把新的“ＢＢＱ列車大快朵頤奧莉薇號”開始商業運營的目標時間定在那裡吧」" 

# monologue
# JP: いい判断だ。目標が明確化されれば、\n凪と日々姫にもいっそう気合が入ろうし――
3552 = "很妥當的判斷。定好一個明確的目標的話，凪和日日姬也會更加幹勁十足吧——" 

# monologue
# JP: 僕の気持ちも同様に、今の一言に引き締められる。
3864 = "隨著剛才這擲地有聲的話語，我也打起了十分的精神。" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た。では、三週間後には僕達も、\n御一夜－早戸間の乗務につけるように習熟せねばな」
2765 = "「明白。那我們也得在三個星期內，把御一夜至隼人段熟悉到可以執行乘務任務才行」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえ。そこはもう少し余裕をもってもらって\n大丈夫です。み鉄さんとの契約の関係もありますし」
2458 = "「啊，那邊倒不至於這麼急的。畢竟還和橙鐵有契約在」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか。そういえばそうだったな」
2419 = "「啊——這樣啊。倒也是」" 

# 【ポーレット】
# display as 波萊特
# JP: 「湯医線の営業運転の目処が完全についてから。改めて、\nオリヴィちゃんにも習熟運転に立ちあってもらって。で」
2912 = "「等到湯醫線的商業運營都穩定下來，到時再讓奧莉薇帶著你們去熟悉好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにその方がより安全だな。オリヴィは直近でも、\n補機有りでとはいえ、小畑を越えているのだし」
3010 = "「這樣的確更安全一些。雖說當時掛了補機，但奧莉薇也是能夠親自翻越過大畑的」" 

# monologue
# JP: 返事をしながら、手帳を繰って確かめる。
3586 = "我一邊回答，一邊翻開筆記本進行著確認。" 

# 【双鉄】
# display as 雙鐵
# JP: 「となると、み鉄さんとの契約が切れる……\nふむ。再来月頭からの営業運転が目標となるな」
3011 = "「這樣的話，和橙鐵的契約結束要到……嗯，那目標就是在下下個月初開始商業運營了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。オリヴィちゃんが早く来てくれたおかげで、\nそこは、かなり余裕ができちゃいました」
2781 = "「是的。託奧莉薇提早過來的福，這邊的時間安排就輕鬆了許多」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし……そうか。標識類を、\nオリヴィはすでにチェックしてくれていたのか」
2367 = "「可是……對哦。標誌之類的奧莉薇已經都檢查過了啊」" 

# monologue
# JP: いつ、どのように――\n思えばすぐに、答えに思い当たる。
3519 = "她是什麼時候、怎麼檢查的——稍微一想答案便顯而易見了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「徒歩での線見を――\nオリヴィは、何重にも活かしてくれたのだな」
2630 = "「徒步踏查——奧莉薇這一路究竟做了多少事情啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。その直後に報告という形で要請を受けました。\nあと、保線上の不安についての報告も、数点」
2363 = "「可不是。她那天回來之後馬上就以報告的形式向我提出了要求。同時也指出了巡線方面的幾處隱患」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういえば、オリヴィは言っていたな。\n『御一夜には\x%l保線;#00ffc040;保線%l;#;の専門家がいない』と」
2941 = "「話說回來，奧莉薇倒是的確說過，“御一夜鐵路這裡沒有\\x%l保線;#00ffc040;巡線%l;#;方面的專家”」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ボランティア頼みですから……\nやっぱり、専門家の見地とは差がありますよね」
2498 = "「因為都是靠志願者嘛……果然和專家的眼光還是有差距啊」" 

# 【ハチロク】
# display as 八六
# JP: 「と、おっしゃいますと、オリヴィちゃんは――\n専門家レベルの知識を持っているのですか？」
3065 = "「那照這麼說的話，奧莉薇她——莫非有著專家水準的經驗？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「これ、見てください。\n『簡単なものだけど』って、オリヴィちゃんから」
2291 = "「你們來看看這個。這些是奧莉薇她說“簡單寫了一點”的東西」" 

# monologue
# JP: 渡されるのは、A4数枚のペーパーだ。
3702 = "波萊特邊說，邊遞給了我們幾張Ａ４紙。" 

# monologue
# JP: ぱらぱらと軽く目を通す――\nだけのつもりが、熟読になる。
3780 = "聽她這麼說，那我就接過來打算隨便看看——卻不由自主地認真讀了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ――これ、は――」
2409 = "「唔——這、這是——」" 

# monologue
# JP: \x%l保線;#00ffc040;保線%l;#;の知識、そして経験のレベルが違う。
3514 = "她在\\x%l保線;#00ffc040;巡線%l;#;方面的知識和經驗與我們簡直是天壤之別。" 

# monologue
# JP: 初見で一度の、路線確認のついでの視察にも関わらず、\nオリヴィがチェックしてる個所の多くが――
3553 = "從這些內容裡，完全看不出這是奧莉薇第一次踏查這條線路，她所檢查確認的內容之多之細令我汗顏——" 

# 【ハチロク】
# display as 八六
# JP: 「過去に問題を起こしている個所がマアクされていますね。\nやはり、路盤自体に問題があるのでしょうか？」
3029 = "「過去出過問題的位置都做了標記。果然還是路基自身就有問題吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこまでは指摘されていないな。精査してほしい場所を\nひとまずざらっとチェックしただけのよう――うむ？」
2560 = "「她倒是沒把話說得那麼死。不過她倒似乎只是把需要進一步檢查的地方都大略檢查了——嗯？」" 

# 【ハチロク】
# display as 八六
# JP: 「あら？　クマ川第四橋梁にもチェックが」
2394 = "「咦？隈河第四大橋也檢查過了嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あそこでは、特段のトラブルは発生していない――\nああ、潜在不安があると指摘されているな」
3068 = "「那裡應該沒有過什麼明顯的問題啊——啊，她只是指出有潛在的隱患」" 

# 【ハチロク】
# display as 八六
# JP: 「『まくらぎけい[ざい]材要確認』『微細な[ふりく,1]不陸』\n『可変パッド推奨』……これは\x%l保線;#00ffc040;保線%l;#;の専門用語ですね」
1728 = "「“枕距護板需檢查”、“些許空吊”、“建議使用可調撐墊”……這些都是\\x%l保線;#00ffc040;巡線%l;#;的專業術語吧」" 

# monologue
# JP: ハチロクがはてなと首を傾げる。\n僕も当然、お手上げだ。
3385 = "八六略顯疑惑地歪著頭。而我也同樣只能舉手投降。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットやれいなは、意味がわかるのか？」
2837 = "「波萊特，玲奈，你們知道是什麼意思嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、『ふりく』だけならわかりますよぉ」
2865 = "「玲奈只知道“空吊”是什麼意思哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2403 = "「哦」" 

# 【れいな】
# display as 玲奈
# JP: 「『ふりく』は、『たいらじゃない』ってことですよぉ」
2732 = "「所謂“空吊”，就是“懸空”的意思哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――線路、ないしは\x%l枕木;#00ffc040;枕木%l;#;かその下の鋼材かに\n微細な凹凸が生じているというほどの意味か」
2466 = "「嗯，也就是說線路，或者說\\x%l枕木;#00ffc040;枕木%l;#;和下方的鋼材之間，產生了縫隙的意思吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「他のも急いで調べました。まくらぎけい[ざい]材っていうのは、まくらぎ同士を繋いでいる鉄板のことです」
2319 = "「其他的我也抓緊查了一下。所謂枕距護板，是指把枕木互相固定在一起的鐵板」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……言われてみれば、そんなものもあった――\nような気がするが」
2422 = "「啊……你這麼一說，似乎確實有這麼個東西……吧」" 

# monologue
# JP: 僕らがチェックしてるのは、\n\x%lバラスト;#00ffc040;バラスト%l;#;、およびまくら木の痛み具合。
3600 = "我們以前檢查過的，首先是\\x%lバラスト;#00ffc040;道砟%l;#;以及枕木的狀態。" 

# monologue
# JP: それから、レールに痛みがないか、歪んでいないか――\nといったところがせいぜいだ。
3399 = "再就是鐵軌是否有損傷，是否有歪曲——僅此而已。" 

# 【双鉄】
# display as 雙鐵
# JP: 「橋まくら木は痛み難いからな。\n注意がおろそかになっていたのかもしれん」
2517 = "「大概是因為橋枕不太容易損壞的關係吧，我們也的確是對那裡放鬆了警惕」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それが、[ふりく,1]不陸の原因なのかもしれませんね。\nで、可変パッドは、それを調整できる資材だそうですよ」
3057 = "「那或許就是造成空吊的原因。然後可調撐墊就是可以對形成空吊的縫隙進行支撐、填補的材料」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　そのような便利なものが出てきたのですか？」
2396 = "「哇！現在竟有這麼方便的東西了嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大廃線で、レールもまくら木も不足してますから。\n隙間産業的に生まれてきた――っていう話です」
2748 = "「據說是因為大廢線的關係，鐵軌和枕木的供給都有所欠缺，進而形成了這樣的產業」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、まさしく最新の知見だな。オリヴィは、\n100年選手でありながら、常に今を学んでいるのか」
2337 = "「原來如此，竟然還是種新產品。奧莉薇雖已是歷經百年磨練的老手，卻還是這麼與時俱進」" 

# 【ポーレット】
# display as 波萊特
# JP: 「すごい、ですよね。\nわたしも、見習いたい――見習わなくちゃって思います」
2881 = "「的確是很了不起。我也應該向她學習——不，是一定要向她學習才對」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットが\x%l保線;#00ffc040;保線%l;#;まで手を出すのはオーバーワークだ。\nそこは、\x%l保線部長;#00ffc040;保線部長%l;#;たる僕に任せてほしい」
3024 = "「連\\x%l保線;#00ffc040;巡線%l;#;都要波萊特來做的話這實在太過勞累了。還是交給身為\\x%l保線部長;#00ffc040;巡線部長%l;#;的我來處理吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですか？　それなら、双鉄くんにお任せします。\nでも、できるだけ無理のない範囲で」
2929 = "「至於嗎？不過既然雙鐵君都這麼說了，那就交給你吧。不過也儘量不要勉強自己哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2464 = "「嗯」" 

# monologue
# JP: ボランティアである堰さんたちの知識だけに頼り、\n\x%l保線;#00ffc040;保線%l;#;を知った気になっていた自分がひどく情けない。
3678 = "此前我僅是從身為志願者的堰先生他們那裡學到了一些知識，就自認為了解\\x%l保線;#00ffc040;巡線%l;#;，實在是太過坐井觀天，簡直無地自容。" 

# monologue
# JP: 堰さんたちは土と水との専門家だが、\n鉄道工学を専門的には学んでいない。
3475 = "堰先生雖是水土方面的專家，但卻並未專門學習過鐵路工程學。" 

# monologue
# JP: （ならば僕が率先しそれを学び、身につけ、\n堰さんたちにフィードバックするべきであったのだ）
3913 = "（那我更應該率先掌握這些知識，再回饋給堰先生他們才是）" 

# monologue
# JP: 基礎知識も経験も十二分なお三方だ。
3736 = "畢竟那三位無論是基礎知識還是經驗都無可挑剔。" 

# monologue
# JP: そうするだけで、御一夜鉄道の\x%l保線;#00ffc040;保線%l;#;レベルは、\n格段に跳ね上がっていたことだろう。
3743 = "相信有了這些新知識的補充，御一夜鐵路的\\x%l保線;#00ffc040;巡線%l;#;水準就能上一個大台階。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひとまずは、オリヴィに保線講習の講師を頼むか」
2935 = "「要先讓奧莉薇答應教授我們巡線的知識啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それ、いい考えだと思います。オリヴィちゃん――\nひとに知識を伝えるの、すごく上手ですよね？」
2693 = "「我覺得這是個好主意。奧莉薇她很擅長教人東西的吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは僕も感じる」
2475 = "「嗯，我也這麼覺得」" 

# monologue
# JP: 知識があっても、それを伝えるのが上手いとは限らない。
3426 = "即便掌握著知識，也未必一定能順利傳授給他人。" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;としての本職を完璧にこなすだけでなく、\nその周辺まで、これほど高いレベルで修めているとは――
3317 = "不僅能把\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的本職工作完成得盡善盡美，連相關的事務都達到如此高的水準——" 

# 【双鉄】
# display as 雙鐵
# JP: 「頭が下がる。そのような\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だから、\nあれほど鋭い指摘をできるものなのだろうな」
2884 = "「真是令人佩服得五體投地。畢竟也只有那樣的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，才會那樣一針見血地批評我吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「鋭い指摘？」
2227 = "「一針見血地批評？」" 

# 【れいな】
# display as 玲奈
# JP: 「って、なんですかぁ？」
3001 = "「這……是怎麼回事呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ズバリと言われてしまったのだ。\n『走れる者が、走れない者に走れというのは傲慢だ』と」
2479 = "「嗯，我被她直截了當地批評了，她說我“跑得快的人要跑不快的人快點跑就是一種傲慢”」" 

# 【ハチロク】
