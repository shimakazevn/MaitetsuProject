3734 = "玲奈面帶微笑，點頭附和著波萊特的話。她的這副樣子，真讓人看在眼裡，暖在心上。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それってわたし、凄いことだと思います。\nその強さが、御一夜を守ってくれたって、思ってます」
3003 = "「這一點真的是讓我很欽佩。我想就是多虧了你們的堅強，才能將御一夜守護至今」" 

# 【双鉄】
# display as 雙鐵
