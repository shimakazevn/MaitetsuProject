3329 = "不過奧莉薇和我都很冷靜。至少我們都在努力冷靜地對話。" 

# monologue
# JP: ならば、慌てる必要は無い。\n少しずつ、ゆっくり伝えていけばいい。
3850 = "那應該暫且不需要慌張，一點點和她把話說清楚就好了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「誰も、そんなことは言っていないさ」
2677 = "「我們誰也沒有說過這樣的話啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「言ってなくても、思ってるでしょ？\n思ってなくちゃ、壊れたあとのことなんて気にしないし」
2814 = "「沒有這樣說，但是這樣想的吧？要不是這樣想的話，怎麼會在意壞了之後的事情呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――しかし、どの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に対しても、\nどの車輌に対しても、備えておくべきことだろう」
2998 = "「這——可是，不管是哪個\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，或是哪台車輛，都應該為總歸會到來的一天做好相應的準備才對啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「――ハチロクに対しても？」
1718 = "「——八六也是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
3023 = "「這！？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ホンキのホンキで――ハチロクが機能停止したらって、\nソーテツ、ちゃんと考えてるの？」
2299 = "「假如八六活動停止的話，雙鐵你真的真的有認真考慮過嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「考えてはいる、つもり、だが――」
2685 = "「我是有想考慮的，只是——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチロクが機能停止したあと。そのあとのこと、\n考えてそなえたり、ソーテツ、してるの？」
2315 = "「八六活動停止的話，那之後的事情，雙鐵你考慮過，做過相應的準備嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それ――は」
3005 = "「這個……嘛」" 

# monologue
# JP: 答えようとして、言葉が出ない。\n思い知る――無理だ、それは出来ないことだと。
3625 = "我想要回答，卻只能張口結舌。其實我心裡很清楚——我無法回答，根本就做不到。" 

# monologue
# JP: ハチロクが稼働を停止したその後のことを――\n突き詰めきって想像するなど、とても、出来ない。
3383 = "八六活動停止之後的事情——當真對我刨根問底的話，我也還是無法想像，無從回答。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「同じわけないよね？　自分がマスターの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、\nカイシャの、ただの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が」
2615 = "「屬於自己的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，和屬於公司的普通\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，怎麼可能會被平等對待」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに……完全に同じではない。\nしかし、だからといってオリヴィのことを」
2879 = "「的確……不可能完全一樣。但這並不是說我就不重視你……」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！！！」
2555 = "「奧莉薇！！！」" 

# monologue
# JP: ハチロクが奥からすっ飛んでくる。
3368 = "八六也從後面趕了過來。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまは、そのような区別をする方ではございません。\nただ、今のお話は、ポーレット様の経営判断のご確認を」
3079 = "「雙鐵少爺不是因為這些就會對不同的鐵路人偶另眼相看的人。剛才他只是在和波萊特大人詢問經營決策而已」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けーえーはんだんっっ！！！」
2919 = "「經營決策！！！」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！？」
# 2442 = "「啊！！？」" 

# monologue
# JP: 怒号で、悲鳴だ。
3668 = "是怒吼，也是哀鳴。" 

# monologue
# JP: 弾けたような――思って、繋がる。\nああ、これが“地雷を踏む”という現象なのかと。
3633 = "我立刻就明白了目前的情況。這就是所謂的“踩雷”了吧。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いっつもそう！　ミノブでだって、ツルミでだって！\n――みかん鉄道は、きっとちがうって思ってたのにっ！」
2311 = "「全都是這樣！在身延是這樣，在鶴見也是這樣！——到了橙鐵路，奧莉薇以為終於不一樣了，卻還是這樣！」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんっ？」
2559 = "「奧莉薇？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、[メリケン,2]冥国式だから――マスターがいないから！\nいらなくなったら、すぐにぽいって捨てられてっ！！」
2605 = "「就因為奧莉薇是美國式！沒有定組的司機！用不到了就馬上說丟就丟！！」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！」
2550 = "「奧莉薇！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Ｄｏｎ’ｔ　ｔｏｕｃｈ！！！！」
3106 = "「Ｄｏｎ＇ｔ　ｔｏｕｃｈ！！！！」" 

# monologue
# JP: 冥語の鋭い叫びとともに、\n差し伸べられたハチロクの手がはねのけられる。
3512 = "奧莉薇邊用英語尖叫著，邊推開了八六伸過來的手。" 

# monologue
# JP: オリヴィは唇をぎゅっと結んで――\nその瞳から、大粒の涙をボロリと零す。
3509 = "奧莉薇緊咬著嘴唇——而從她的眼中，大滴的淚水如斷線的珍珠般落下。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……いいよね、ソーテツはお金持ちで、まいてつで。\nふつーの\x%l機関士;#00ffc040;機関士%l;#;、まいてつになんて、なれないんだから」
1758 = "「……真好啊，雙鐵是個不差錢的掌車人。普通的\\x%l機関士;#00ffc040;司機%l;#;哪做得了掌車人啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2382 = "「呃！」" 

# monologue
# JP: 走れる者と、走れない者。\nオリヴィに受けた指摘が、記憶の中から突き刺さる。
3823 = "跑得快的人，跑不快的人。奧莉薇對我的批評從記憶中直刺我的心頭。" 

# monologue
# JP: 確かに、冥国式であろうとなんであろうと、マスターが\nⅨ号ごとオリヴィを買い取れるのなら、まいてつだ。
3740 = "的確，不管是不是美國式，如果有司機把九號和奧莉薇一起買下的話，那就是掌車人了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチロクはいいよね。オヒトヨでいらなくなっても、\nマスター――ソーテツと、一緒に別に移れるんだから」
2316 = "「八六，你真讓人羨慕啊。就算御一夜不需要你了，還能和司機——和雙鐵一起到別處去」" 

# 【ハチロク】
# display as 八六
# JP: 「…………オリヴィ――ちゃん」
1733 = "「…………奧莉——薇」" 

# monologue
# JP: ハチロクの手が、そろそろと、\nそれでもオリヴィに近づこうとする。
3369 = "八六仍然沒有放棄，緩緩地又將手伸向了奧莉薇。" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん――あなたは――あの\x%l機関士;#00ffc040;機関士%l;#;さん……\nムナカタさんの、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に――」
2557 = "「奧莉薇，你是想要……成為那位\\x%l機関士;#00ffc040;司機%l;#;……宗方先生的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;嗎——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なりたいからなに？　なれっこないって知ってるし！\n同情なんて、ハチロクから絶対にされたくないしっ！」
2659 = "「想要又怎麼樣？結果都明擺在這裡了！奧莉薇絕對不想讓八六同情！」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ――」
# 2411 = "「啊——」" 

# monologue
# JP: 差し伸べようとしていた手が止まる。\nハチロクは何も話せなくなる。
3374 = "八六停住了伸出的手。同時也不再言語。" 

# monologue
# JP: だが――ここで黙るのは、認めることだ。
3721 = "然而——這時若是沉默，便是默認。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ」
2540 = "「奧莉薇」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！　ソーテツもハチロクとおんなじでしょ！？\nオリヴィたちのことなんて、わかるわけないっ」
2459 = "「嗚！雙鐵你和八六不也都一樣！根本就不理解像奧莉薇這樣的鐵路人偶的感受」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、わかるなどとは言えない。\nオリヴィのことを、僕はまだ、ほとんど知らない」
2819 = "「沒錯，我的確沒辦法強說自己理解。對奧莉薇，我也還知之甚少」" 

# monologue
# JP: ――それでも、黙るわけにはいかない。
1667 = "——但即便如此，也不能就這樣沉默下去，聽之任之。" 

# monologue
# JP: オリヴィが“恵まれなかった”\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、\n走れる僕らが、傲慢に認めてしまうわけにはいかない。
3602 = "我們作為“跑得快的人”，斷不能傲慢地將奧莉薇認定為“不走運”的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「みかん鉄道でもムナカタとずーっと組んで、安心できて。\nだから\x%l入換;#00ffc040;入換%l;#;でだって、オリヴィ、楽しかったのに――」
2499 = "「在橙鐵路一直都是和宗方搭檔，奧莉薇很安心。所以哪怕只是負責\\x%l入換;#00ffc040;調車%l;#;，奧莉薇也樂在其中毫無怨言——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ」
# 2540 = "「奧莉薇」" 

# monologue
# JP: 僕らは単に恵まれて、\n誰かに環境を与えられ。結ばれたというわけではない。
3606 = "我們能相遇相知相愛，並不單單是靠運氣好，也不是因為別人為我們創造出了合適的環境。" 

# monologue
# JP: ぶつかり、くじけ、それでも走り、結ばれた。\n結ばれるため――ともに、あの橋を越えてきたのだ。
3607 = "我們衝突過，消沉過，但還是不斷前行，許下共度一生的承諾。為了相伴一生，我們才攜手跨越了心中的那座橋。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ。おまえは――自分が毎年、\n全検を受けることを推奨される状態なのだと」
2539 = "「奧莉薇。以你目前的狀態，現在每年最好接受全檢，這件事你是否知情——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「知ってる！　そんなの！！\nムナカタにだっていわれたもんっ！」
2236 = "「不用你說奧莉薇也知道！！宗方又不是沒說過！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば何故、その残り少ないかもしれぬ時間を。\n泣いて喚いて、無駄に使うのだ」
2757 = "「既然這樣，那又為什麼要把這或許已所剩不多的時間，浪費在哭鬧消沉上呢」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！！？」
2267 = "「什！！？」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまっ！？　そのようなおっしゃり方」
3082 = "「雙鐵少爺！？此言甚是不妥」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かばうなハチロク。\nオリヴィは、僕らよりずっと大人なのだぞ」
2313 = "「八六你不用替我圓場。奧莉薇她可比我們都要成熟得多」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ――」
# 2411 = "「啊——」" 

# monologue
# JP: だから、話そう。\nきっと伝わると信じよう。
3649 = "所以就向她全盤托出吧。我相信她一定能夠理解。" 

# monologue
# JP: 冥国式という特性を覆し、ハチロクに賞賛されるに至った\nオリヴィという\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を、その克己心を信じよう。
3501 = "奧莉薇克服了她美國式的特徵，甚至在工作上能令八六都讚不絕口，我選擇相信她的自制力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道では\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にも給与が支給される。\n[くまぎん,1]隈銀では、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の口座開設も受け付けてくれる」
2638 = "「御一夜鐵路會向\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;支付工資。隈元銀行也接受\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的開戶申請」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……だから、なに？」
1750 = "「……所以你想說什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まいてつになるためには金が必要で、\nお前には、その金を稼ぐ手段があるといっているのだ」
2663 = "「成為掌車人需要資金，而你有獲取這些資金的手段」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なっ！！？」
3022 = "「這！！？」" 

# monologue
# JP: オリヴィの目が見開かれる。\n口が、ぽかんと大きく開く。
3507 = "奧莉薇瞠目結舌。" 

# monologue
# JP: けれどもすぐに、その目を口を固く閉じ、\nオリヴィは強く、首を振る。
3725 = "然而奧莉薇馬上就閉上了眼睛和嘴巴，用力搖了搖頭。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィのお給料でⅨ号買い取るのに何年かかるの？\n何百年でしょ！　そんなの間に合うわけないじゃない」
3092 = "「靠奧莉薇的工資買下九號要花多少年？怕是要幾百年！那哪裡來得及」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、方法を変えればいい。宗方さんを説得し、\n給与を合算できるなら期間は半分に短縮できよう」
3054 = "「那我們換個方法。說服宗方先生和你一起存錢的話，時間就能減半了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなのっ！　そんなの――ムナカタ聞いてくれないし、\nもしもマンガイチできたとしたって、時間が全然っ」
3021 = "「這！這——宗方他怎麼可能會答應，而且即便答應了，時間也還是根本不夠啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「延ばせばいい」
3049 = "「那就延長時間吧」" 

# 【オリヴィ】
# display as ３人
# JP: 「へっ！？」\n「えっ！？」
2444 = "「啊！？」\\n「咦！？」" 

# monologue
# JP: オリヴィと、ハチロクと、ポーレットまでが\n揃いも揃って、豆鉄砲を食らった鳩の顔になる。
3320 = "不光奧莉薇和八六，連波萊特都一起看著我目瞪口呆。" 

# 【れいな】
# display as 玲奈
# JP: 「そんなこと、できるんですかぁ？」
3012 = "「這種事情，真的做得到嗎？」" 

# monologue
# JP: その前を、とことこ横切る言葉でもって、\nれいながのんびり、いつもの調子で尋ねてくれる。
3732 = "玲奈還是一如往常，以悠然的節奏向我發問。而她的話，也不著痕跡地把前面的話題給翻了過去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は知らん。\nだが、試しもしないうちから諦めるのは愚かしかろう」
2679 = "「我其實還不知道。但連試都不試就放棄未免太不明智」" 

# 【ハチロク】
# display as 八六
# JP: 「けれどっ、お言葉ですが双鉄さま。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、消耗品で、保安部品でございます」
2372 = "「可是雙鐵少爺，還請容我多嘴。\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;是安全組件，也是消耗品」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ！　だから、えんめーなんてしないもんっ！\n悪くなったらこーかんするのがあたりまえだからっ」
2607 = "「就是！所以哪有什麼延壽的說法！按常理鐵路人偶壞了就只有替換一說」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大廃線で環境が激変し。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が稀少となり。\nそれでも、ずっと消耗品扱いを続けるものか？」
2514 = "「大廢線讓大環境產生了劇變，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;也變得稀少了起來。在這種情況下，難道還能一直把\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;當作消耗品嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あああっ！！！」
2437 = "「啊！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。そうだ、その研究は、どこかで誰かが始めている\n――そうでなければ、おかしいくらいのことだろう」
2480 = "「嗯，沒錯。這研究應該已經有人著手開始做了。倒不如說沒有人做才是不合常理」" 

# monologue
# JP: 列車のニコイチ。リニューアル。
3416 = "列車的回收拼裝和翻新。" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;システム故に存在しなかったその発想を、\n僕らはこの世に産み出した。
3454 = "因為\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;系統的原因而本不存在的這個概念，卻在我們的腦海中逐漸明晰。" 

# 【双鉄】
# display as 雙鐵
# JP: 「“可変パッド”、だったか？　それも同じだ。\n大廃線ゆえ、消耗ゆえに生まれるものも、必ずあるのだ」
2322 = "「其實和那個什麼“可調撐墊”是一樣的，因為大廢線的消耗而產生的東西，絕不會是個例」" 

# 【ハチロク】
# display as 八六
# JP: 「誰かが、きっと、始めている。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の……寿命を延ばす研究を――」
2622 = "「延長\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;壽命的研究——一定已經有人著手在做了」" 

# monologue
# JP: ハチロクの声に、静かな希望がみちている。
3386 = "八六的話語中，滿溢著無聲的希望。" 

# monologue
# JP: ゆえに、気づく。\n気づかなかった自分自身を、バカかと思う。
3771 = "而我也在這時回過神來。我以前竟然沒有想到這一點，自己也真是實打實的笨蛋。" 

# monologue
# JP: （そうか――ハチロクの寿命も延びれば……\nそれだけ、チャンスも増えるのだ）
3904 = "（是啊——如果此事成真的話……那八六的壽命也大有延長的可能）" 

# monologue
# JP: こどもを引取り僕らで育てる、\nその可能性だけには留まらない。
3647 = "或許也有可能，讓我們不僅僅只能透過領養這一種方法擁有孩子。" 

# monologue
# JP: もしもこの先、革命的な技術革新があるのなら、\nあるいは、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と人とがこどもを――
3785 = "若是能誕生革命性的技術，讓\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;與人類可以養育自己的後代——" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「できるの？　寿命――\nオリヴィ、ほんとにのばせるの？」
2549 = "「奧莉薇的壽命——真的能延長嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、僕は信じる。もしもまだ、誰も研究していないなら、\nその研究をはじめるように、僕らが提唱すればいい」
2688 = "「我相信可以。如果真的還沒有人著手這方面的研究的話，那就由我們來提出，我們來發起這項研究就好了」" 

# monologue
# JP: 必ず、そこに需要はある。\n確信するから、言い切れる。
3834 = "這世上一定有這方面的需求。而正因確信如此，我才能言之鑿鑿。" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、反対も出てこよう。が、そうした意見も組み入れ、\nよりよい方向に、僕らは必ず進んでいける」
2872 = "「當然，也一定會有反對的聲音。不過我們也會聽取那些意見，一定會向著最好的方向前進」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あはっ」
2427 = "「啊哈」" 

# monologue
# JP: オリヴィが、笑う。
3508 = "奧莉薇笑了。" 

# monologue
# JP: いかにもな作り笑いを浮かべ、\nそっと、さりげなく涙をぬぐう。
3365 = "儘管這笑容一看就知道是她強行擠出來的，而且，她還悄悄地擦掉了眼角的淚水。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あは……はっ、すっごい。すっごいねソーテツ！\nオリヴィが思ってたより――ずーっと、すっごい！」
2426 = "「啊哈……哈，好厲害。雙鐵好厲害！厲害到遠遠超出奧莉薇的想像了！」" 

# monologue
# JP: 作り笑いが、本物になる。
3522 = "她的笑容逐漸變得自然。" 

# monologue
# JP: オリヴィの顔に、仕草に、\n強さと明るさが戻りはじめる。
3470 = "堅強和開朗，也逐漸回到了她的臉上、舉止中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それほどでもない」
2406 = "「哪裡哪裡，不足掛齒」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それほどだよー！　そんなオバカな、すっごいこと！\n今まで、誰も――ムナカタだって――そんな、ことっ」
2906 = "「確實很厲害啊！這種毫無章法的想法真的超厲害！奧莉薇還從來沒聽誰提過這種事情！從宗方那裡也沒有！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2486 = "「嗯？」" 

# monologue
# JP: よほど感心してくれたのか、\nオリヴィの顔が真っ赤になってる。
3745 = "看來奧莉薇是真的被打動了，她的小臉漲得通紅。" 

# monologue
# JP: 息も弾んで……いささか、弾み過ぎてるようで――
3685 = "氣息也急促了起來……但我覺得是不是有點急促過頭了——" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら――オリヴィも、ゆ、め――みちゃおう、かな。\nジュミョー、のば、して――おかね――ため、て――」
3037 = "「那——奧莉薇，也，再多——抱一點希望，吧。多存一點錢，等壽命——延長——有，著落——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ？」
# 2559 = "「奧莉薇？」" 

# monologue
# JP: 違う。おかしい。\n足元が小刻みに動き出してる。
3322 = "不對，這不正常。她的腳步明顯變得虛浮起來。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それ――で、ムナ、カタ――」
2858 = "「然後——宗，方——」" 

# monologue
# JP: （ふらっ！）
3902 = "（搖晃！）" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！？」
2556 = "「奧莉薇！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ！！！」
# 2555 = "「奧莉薇！！！」" 

# monologue
# JP: ハチロクとともに抱きとめ――っ！！？
3611 = "我和八六一起抱住了奧莉薇——這！！？" 

# 【双鉄】
# display as 雙鐵
# JP: 「熱っ！？　なんだこの熱はっ」
2570 = "「好熱！？這個溫度是怎麼回事」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ごめ……たまに、なる、の――興奮、する、と――\n水――かけて――水、かけた、ら――おちつ、く」
2738 = "「抱歉……偶爾，是會，這樣——一興奮，的話——水——淋——淋，過水——就好，了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！　水だ！\nバケツにいっぱいの水を頼む！」
2836 = "「波萊特！水！快去打桶水來！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「は、はい！　れいなっ！」
2566 = "「好、好的！玲奈！」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！」
2568 = "「好噠！」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！　オリヴィちゃん！　しっかり！\n\x%l共感;#00ffc040;共感%l;#;！　\x%l共感;#00ffc040;共感%l;#;ひらいて！　オリヴィちゃん！！」
2551 = "「奧莉薇！奧莉薇！堅持住！\\x%l共感;#00ffc040;共鳴%l;#;！快打開\\x%l共感;#00ffc040;共鳴%l;#;！奧莉薇！！」" 

# monologue
# JP: ハチロクは僕より熱に強い。\n異常発熱したオリヴィを、それでも抱きかかえ支えている。
3396 = "八六顯然耐熱更勝於我。儘管奧莉薇的異常發熱著實嚴重，但她還是抱住奧莉薇支撐著她。" 

# 【れいな】
# display as 玲奈
# JP: 「おみず！　もってきましたぁ！」
2812 = "「水！水打來啦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、ハチロク、オリヴィを」
2471 = "「嗯，八六，那我要往奧莉薇身上澆了」" 

# 【ハチロク】
# display as 八六
# JP: 「濡れる程度かまいません、このままっ」
2242 = "「不要管我，我打濕了也不要緊，請趕快」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった！」
2575 = "「好的！」" 

# monologue
# JP: （ざばあっ！！！）
3899 = "（嘩啦！！！）" 

# monologue
# JP: ハチロクの同意が、僕の背中を押してくれる。
3394 = "八六都同意了，那我更沒什麼好猶豫的。" 

# monologue
# JP: 何度もあったという急変に、オリヴィが示した対処法なら、\nそれが最善と信じられる。
3658 = "既然奧莉薇說是已經遇到過不止一次的情況，那我相信她說的處理方法肯定是最妥當的。" 

# 【ポーレット】
# display as 波萊特
# JP: 「おまたせしましたっ！」
2257 = "「久等啦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
# 2465 = "「嗯！」" 

# monologue
# JP: （ざばあっ！！！）
# 3899 = "（嘩啦！！！）" 

# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 2411 = "「啊——」" 

# monologue
# JP: もうもうたる湯気の向こうで、\nオリヴィがうっすら瞳を開く。
3833 = "透過蒸騰而起的水氣，我看到奧莉薇微微張開了雙眼。" 

# monologue
# JP: 暴力的なまでに単純な手段ではあるが、\n確かに効果があるらしい。
3870 = "雖然方法單純到近乎暴力，但似乎確實有效。" 

# 【ポーレット】
# display as 波萊特
# JP: 「登呂流湯さん、すぐ電話します！！」
2700 = "「我馬上給登呂流浴場打電話！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、運んだ方が早い。ナビっ！！」
2254 = "「不，直接過去更快。Ｎａｖｉ！！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「レールの上！　下りてもらって大丈夫です！」
3072 = "「鐵軌上！直接降落在鐵軌上就好！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「助かる。いくぞ、オリヴィ。\nハチロクもついてきてくれ」
2949 = "「謝謝。奧莉薇，我們走。八六你也一起來」" 

# 【ハチロク】
# display as 八六
# JP: 「もちろんです。ね？　オリヴィちゃん、大丈夫。\nもうすぐ、すぐに、技師の先生のところにつきますから」
2927 = "「自不待言。奧莉薇，沒事的。我們馬上就帶你去技工老師那裡」" 

# monologue
# JP: 抱き上げ、驚く。\n体はいまだにかなり熱く――そうして、軽い。
3628 = "我抱起了奧莉薇，她的身體溫度還是很高——但她的體重之輕也讓我吃驚不小。" 

# monologue
# JP: （これほど小さく軽い体で――百年を）
3901 = "（她就是憑這嬌小輕柔的身體，挺過了一百餘年啊）" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま、参りましょう」
3083 = "「雙鐵少爺，出發吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2464 = "「嗯」" 

# monologue
# JP: 助けたい。\nただそれだけで、僕の全てが埋め尽くされる。
3646 = "我願傾盡所有保她平安。" 

# monologue
# JP: この手の中にかかえているのは命なのだと、そう思う。
3617 = "我堅信我現在抱在手中的，毫無疑問是一條生命。" 

# monologue
# JP: （ずしっ）
3893 = "（呼……）" 

# 【双鉄】
# display as 雙鐵
# JP: 「え？」
# 2388 = "「咦？」" 

# monologue
# JP: 思った瞬間、重くなる。\nまるでこどもが、いきなり熟睡するように――
3758 = "等我反應過來，手上也隨之一沉。就像小孩子突然睡著了一樣——" 

# monologue
# JP: 手の中はまだ熱いというのに、\nひやりと、なにか――冷たいものが背筋をよぎる。
3582 = "懷中雖然還是熱氣襲人，我的後背卻不由猛得一涼。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
3084 = "「雙鐵少爺？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2464 = "「嗯」" 

# monologue
# JP: ゆえ、駆ける。寝たのだとしても、そうでなくても、\n今僕にできることはただひとつ。
3605 = "我們加快了速度。不管她是不是真的睡著了，如今我們已別無選擇。" 

# monologue
# JP: ――登呂流湯さんに一刻も早く連れて行く。\nただそれだけしか無いのだから。
1671 = "——我們能做到的只有分秒必爭儘快將她送去登呂流浴場。僅此而已。" 
