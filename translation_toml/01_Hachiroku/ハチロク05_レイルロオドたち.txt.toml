# 【れいな】
# display as 玲奈
# JP: 「ヒマさえあれば機関庫にこもってますもんねぇ。\nれいなも、すごいなぁって思ってましたぁ」
2871 = "「畢竟她一有空就鑽進機車庫不出來。玲奈也覺得她真是好厲害哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2464 = "「嗯」" 

