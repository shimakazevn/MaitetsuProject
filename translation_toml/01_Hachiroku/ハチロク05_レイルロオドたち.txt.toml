3701 = "波萊特這樣說，對八六而言無異於雪中送炭。而我的臉上，或許也和八六一樣是釋然的表情吧。" 

# 【ポーレット】
# display as 波萊特
# JP: 「その経験があってそれでも。言われたことに反発せずに、\n素直に指摘を受け止められる」
3076 = "「雖然說奧莉薇不可能知道你們的這些經歷，但即便如此，你們還是默默地接受了批評而沒有反駁」" 

# monologue
