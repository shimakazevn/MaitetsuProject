[script]
# lines: 605 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほんとに！？　ムナカタとおはなししてきたのっ！？」
2890 = "「Thật á!? Cậu đã nói chuyện với Munakata rồi sao!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2464 = "「Ừm.」"
# monologue
# JP: 満面の――ああ、なんという笑顔だろう。
3444 = "Nụ cười rạng rỡ trên khuôn mặt――ôi, thật là một nụ cười rạng rỡ."
# monologue
# JP: 予想以上の食いつきに、内心、かなりホっとする。\nオリヴィとより打ち解けるための、よい契機となりそうだ。
3747 = "Phản ứng vượt ngoài mong đợi của cô ấy khiến tôi khá nhẹ nhõm. Có vẻ đây sẽ là cơ hội tốt để tôi và Olivy trở nên thân thiết hơn."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あの、さ。ソーテツ。\nムナカタ……その――えっと」
3006 = "「Cái đó, này. Soutetsu. Munakata......chuyện đó――ừm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　遠慮せずなんでも聞いてくれ」
2654 = "「Sao vậy? Cứ hỏi tự nhiên đi, đừng ngại.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタ……えっと……なんか――その――Ⅸ号のこと、\nとか――オリヴィのこと――なんか言ってた？」
2590 = "「Munakata......ừm......có――chuyện đó――nói gì về Đầu máy số 9, hay――về Olivy――không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「『本線を走らせてやって欲しい』と、言っていた。\nⅨ号のことも、オリヴィのことも」
2279 = "「Anh ấy nói 'Mong các cậu hãy để chúng chạy trên tuyến chính'. Cả Đầu máy số 9 và Olivy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「Ａｍａｚｉｎｇ！！！」
3104 = "「Amazing!!!」"
# monologue
# JP: ……僕が一瞬びくりとするほど、強い喜び感情の発露。\nが、ハチロクのいる台所からは、何の反応もかえらない。
3527 = "......Sự bộc lộ cảm xúc vui sướng mãnh liệt đến mức khiến tôi giật mình. Nhưng, từ phía nhà bếp nơi Hachiroku đang ở, lại không có phản ứng gì."
# monologue
# JP: ならばやはり今も、オリヴィとハチロクとの間には、\n少なくとも感情の\\x%l共感;#00ffc040;共感%l;#;は通じ合っていないのだろう。
3528 = "Nếu vậy thì hiện tại, giữa Olivy và Hachiroku, ít nhất là \\x%l共感;#00ffc040;cộng cảm%l;#; về mặt cảm xúc vẫn chưa được kết nối."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「他には！？　他にはなんてっ」
3033 = "「Còn gì nữa không!? Còn nói gì nữa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「他に、か。\nああ、環境のこともいっていたな」
3032 = "「Còn gì nữa à. À, anh ấy cũng có nhắc đến môi trường nữa.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「かんきょー？」
2870 = "「Môi trường?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。御一夜にはレイルロオド技師もいるし、\n術仙には車両工場もあるゆえ――」
2473 = "「Ừm. Ở Ohito có cả kỹ sư Railord, và ở Jutsusen cũng có nhà máy chế tạo toa xe nữa nên――」"
# monologue
# JP: そこまで言ってしまって、気づく。\nこれは微妙な話題であるかもしれん。
3808 = "Nói đến đó, tôi chợt nhận ra. Đây có lẽ là một chủ đề khá nhạy cảm."
# monologue
# JP: ……寿命のことは、軽々に触れるべきではないだろう。
3735 = "......Về chuyện tuổi thọ, có lẽ không nên đề cập đến một cách khinh suất."
# 【双鉄】
# display as 雙鐵
# JP: 「その――\nよい環境だと、宗方さんはおっしゃっていた」
2704 = "「Chuyện đó―― anh Munakata bảo là môi trường ở đây rất tốt.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「よいカンキョーかー」
2245 = "「Môi trường tốt à~」"
# monologue
# JP: オリヴィは満面の笑顔のままで、あたりを見回す。
3502 = "Olivy vẫn giữ nguyên nụ cười rạng rỡ, nhìn quanh một vòng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「確かに、ムナカタのゆーとーりかも！\nなによりお水ちょーおいしいし！　石炭も上質だし！」
2702 = "「Đúng là như lời Munakata nói đó! Hơn hết là nước ở đây cực kỳ ngon! Than cũng chất lượng nữa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばよかった」
2293 = "「Thế thì tốt rồi.」"
# monologue
# JP: 無理やりまとめた言葉をしかし、\nオリヴィは前向きに受け取ってくれたようだ。
3498 = "Dù là những lời tôi cố tình tóm tắt lại, nhưng có vẻ Olivy đã đón nhận chúng một cách tích cực."
# monologue
# JP: ならば、今は深入りせずにこのまま――
3851 = "Vậy thì, bây giờ cứ để thế này, không cần đi sâu thêm――"
# 【ハチロク】
# display as ？？？
# JP: 「Ⅸ号機関車の、\nわたくしからのチェック、完了いたしました」
2259 = "「Việc kiểm tra Đầu máy số 9 từ phía em đã hoàn tất rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
2405 = "「Hả!?」"
# monologue
# JP: ハチロクの声で我に返る。\nどうやらしばし、思い出に囚われてたいたようだ。
3387 = "Giọng nói của Hachiroku kéo tôi về thực tại. Có vẻ như tôi đã bị cuốn vào những ký ức một lúc lâu."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？　いかがされました？」
3085 = "「Ngài Soutetsu? Ngài sao vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、何ほどのこともない。\nただ――少しぼんやりしてしまっただけだ」
2476 = "「Không, không có gì đâu. Chỉ là――anh hơi thẫn thờ một chút thôi.」"
# monologue
# JP: 我ながら珍しいことと首を傾げればその途端、\n原因が、視界の中で大きく動く。
3543 = "Ngay khi tôi đang nghiêng đầu thắc mắc về sự đãng trí hiếm hoi của mình, thì nguyên nhân của nó đã nhảy bổ vào tầm mắt tôi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「どーよハチロク！\nオリヴィせんせーの点検整備は」
2649 = "「Thế nà~o Hachiroku! Công tác kiểm tra bảo dưỡng của cô giáo Olivy được chứ」"
# monologue
# JP: ――満面の、笑顔。\nそうとしか表現できないほどの眩しさ。
3510 = "――Nụ cười rạng rỡ, ngập tràn trên khuôn mặt. Chói lóa đến mức chỉ có thể diễn tả như vậy."
# monologue
# JP: （ああ、そうか、この笑顔で思い出したのか）
3896 = "(À, ra vậy, là nụ cười này đã khiến mình nhớ lại sao)"
# monologue
# JP: 宗方さんとの対話を伝えた――ただそれだけのことと、\n二ヶ月かけた検修を終えての、Ⅸ号の本線試験走行と。
3313 = "Truyền đạt lại cuộc nói chuyện với anh Munakata――chỉ có vậy thôi, và việc Đầu máy số 9 chạy thử trên tuyến chính sau hai tháng kiểm tu."
# monologue
# JP: オリヴィの中での価値は、ともに“最上”であることを、\n表情が、なにより雄弁に物語っている。
3335 = "Cả hai điều đó đều mang giá trị \"cao nhất\" đối với Olivy, biểu cảm của cô ấy đã nói lên điều đó một cách hùng hồn hơn bất cứ thứ gì."
# 【ハチロク】
# display as 八六
# JP: 「精緻。その一言を思いました。\nきめ細やかで、行き届いていて、見落としがない」
2225 = "「Tinh tế. Em chỉ có thể nghĩ đến từ đó. Tỉ mỉ, chu đáo và không bỏ sót bất cứ điều gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこまでか」
3070 = "「Đến mức đó sao.」"
# monologue
# JP: ハチロクの前に僕も主要部は点検したが、\n『しっかりしている』と、安心をした程度だった。
3458 = "Trước Hachiroku, tôi cũng đã kiểm tra các bộ phận chính, nhưng cũng chỉ dừng ở mức yên tâm vì 'làm rất chắc chắn' thôi."
# monologue
# JP: ハチロクがここまで絶賛するとは――\n今の僕にはまだ見えぬ領域が、この先遥かにあるのだろう。
3341 = "Hachiroku mà còn khen ngợi hết lời như vậy―― Có lẽ vẫn còn một cảnh giới xa xôi mà hiện tại tôi chưa thể nhìn thấu."
# 【ハチロク】
# display as 八六
# JP: 「付け焼き刃でできることではございません。\n普段からの、不断の積み重ねがあっての美しさです」
3066 = "「Đó không phải là chuyện ngày một ngày hai mà làm được. Đó là vẻ đẹp có được nhờ sự tích lũy không ngừng nghỉ từ ngày thường ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そりゃそーだよ！\nじゃなきゃ百年、走れないって！」
3061 = "「Chuyện đó là đương nhiên rồi! Nếu không thì làm sao mà chạy được cả trăm năm chứ!」"
# 【ハチロク】
# display as 八六
# JP: 「はい。まことにそのように感じました。オリヴィさん、オリヴィ先輩、オリヴィ先生とお呼びするべきと」
2880 = "「Vâng. Em thực sự cảm thấy như vậy. Đáng lẽ em nên gọi chị là chị Olivy, tiền bối Olivy, hay cô giáo Olivy mới phải.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2384 = "「Hô.」"
# monologue
# JP: これは思わぬ功名だ。凪さえ気にするほどに顕著であった、\nハチロクのオリヴィへのこども扱い。
3836 = "Đúng là một thành công ngoài mong đợi. Việc Hachiroku đối xử với Olivy như trẻ con rõ ràng đến mức ngay cả Nagi cũng phải bận tâm."
# monologue
# JP: 確かに最近、改善いちじるしくはあったが――\n仕事を見せる。それが、なによりの特効薬となりそうだ。
3330 = "Quả thực dạo gần đây đã có sự cải thiện đáng kể―― Cho xem công việc. Đó có vẻ là liều thuốc đặc hiệu hơn bất cứ thứ gì."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「別にいーよ？　オリヴィちゃんでも。\nそこんとこわかってくれてるなら、だいじょーぶ！」
3046 = "「Gọi bé Olivy cũng được mà? Chỉ cần cậu hiểu được điều đó là ổn rồi!」"
# 【ハチロク】
# display as 八六
# JP: 「うふふ、ありがとうございます。オリヴィちゃん」
2489 = "「Ufufu, cảm ơn chị. Bé Olivy.」"
# monologue
# JP: ほっとしたように微笑して。\nハチロクはすぐ、その表情を引き締め直す。
3393 = "Mỉm cười như trút được gánh nặng. Hachiroku ngay lập tức lấy lại vẻ mặt nghiêm túc."
# 【ハチロク】
# display as 八六
# JP: 「湯医線での試験走行にも期待しています。\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィ」
2796 = "「Em cũng rất mong chờ chuyến chạy thử trên Tuyến Yui. \\x%lレイルロオド;#00ffc040;Railord%l;#; Olivy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「了解しました！　ハチロク[きょうどう,1]教導\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;！\nミギタソーテツ教導\\x%l機関士;#00ffc040;機関士%l;#;！」
2576 = "「Đã rõ! \\x%lレイルロオド;#00ffc040;Railord%l;#; hướng dẫn Hachiroku! \\x%l機関士;#00ffc040;Lái tàu%l;#; hướng dẫn Migita Soutetsu!」"
# monologue
# JP: 新人のように元気な返事と、ピシっと整いきった敬礼。\n百年選手であるのになんとも、初々しくて愛らしい。
3524 = "Lời đáp dõng dạc như lính mới, cùng với cái chào nghiêm trang. Dù là lão tướng trăm năm tuổi nhưng lại toát lên vẻ ngây thơ và đáng yêu."
# monologue
# JP: 答礼をする背筋も伸びるが――\n勝手にほころびようとする頬を抑えるにも苦労する。
3835 = "Sống lưng tôi cũng vươn thẳng lên khi đáp lễ―― nhưng cũng phải vất vả lắm mới kìm được đôi má đang chực chờ nở nụ cười."
# 【双鉄】
# display as 雙鐵
# JP: 「で？　今日の\\x%l機関士;#00ffc040;機関士%l;#;はどちらに決まったのだ？」
3039 = "「Thế nào? Đã quyết định ai làm \\x%l機関士;#00ffc040;lái tàu%l;#; hôm nay chưa?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、それね。\nそれなんだけど、御一夜鉄道ってかわってるよねー」
2455 = "「A, chuyện đó hả. Về chuyện đó ấy, Đường sắt Ohito lạ thật đấy~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2486 = "「Hửm?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヒビキとナギの話し合いじゃ決まらなかったから\nオリヴィが決めていーって！」
2943 = "「Vì Hibiki và Nagi bàn bạc mãi không quyết định được nên bảo Olivy quyết định cũng được!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。で、どちらにするのだ？」
2786 = "「Vậy sao. Thế, em chọn ai?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「って、ソーテツもおどろかないんだ！！\n逆にオリヴィがおどろいちゃうよ！」
2852 = "「Ơ, Soutetsu cũng không ngạc nhiên luôn!! Ngược lại làm Olivy ngạc nhiên luôn đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「驚く……\nような要素が、今の会話のどこかにあったか？」
2379 = "「Ngạc nhiên...... Trong cuộc nói chuyện vừa rồi có yếu tố nào đáng để ngạc nhiên sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、その――」
2782 = "「Vâng, chuyện đó――」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィたち！　\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;！\nソーテツたち、人間！！」
2553 = "「Bọn Olivy! Là \\x%lレイルロオド;#00ffc040;Railord%l;#;! Bọn Soutetsu, là con người!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
2429 = "「À!」"
# monologue
# JP: なるほど、確かに言われてみれば、だ。\nハチロクも、どこか申し訳なさそうに頷いている。
3428 = "Ra là vậy, nghe nói thế mới thấy đúng. Hachiroku cũng gật đầu với vẻ hơi áy náy."
# monologue
# JP: が――
3437 = "Nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、同じ職場の仲間とみればおかしくなかろう。\nⅨ号機関車のことを最も熟知しているのは、オリヴィだ」
2374 = "「Tuy nhiên, nếu coi như đồng nghiệp cùng nơi làm việc thì cũng đâu có gì lạ. Người hiểu rõ nhất về Đầu máy số 9 là Olivy mà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「！」
2404 = "「!」"
# 【双鉄】
# display as 雙鐵
# JP: 「どのみち、どちらの\\x%l機関士;#00ffc040;機関士%l;#;でも試験運転は行うのだし、\n初回の組をオリヴィに任せるという判断は、ありだろう」
2239 = "「Đằng nào thì \\x%l機関士;#00ffc040;lái tàu%l;#; nào cũng phải chạy thử, quyết định giao phó nhóm đầu tiên cho Olivy cũng là hợp lý thôi.」"
# monologue
# JP: 何に驚かせてしまったのか、\n固まっていたオリヴィの顔が、ゆるゆる笑顔に解けていく。
3867 = "Không biết điều gì đã khiến cô ấy ngạc nhiên, khuôn mặt cứng đờ của Olivy dần dần giãn ra thành một nụ cười."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありなんだー。すごいねー。\nシャチョーとおんなじこと言ってるよー」
2886 = "「Hợp lý luôn á~. Giỏi ghê~ Nói y chang Giám đốc luôn á~」"
# 【ハチロク】
# display as 八六
# JP: 「ポーレット様も、確かにそうおっしゃいましょうね。\n御一夜鉄道の社風の源は、ポーレット様ですから」
2834 = "「Cô Paulette chắc chắn cũng sẽ nói vậy nhỉ. Vì cội nguồn văn hóa của Đường sắt Ohito là từ cô Paulette mà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「へー、そうなんだー」
2387 = "「Hê~, ra là vậy à~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの了承も得られているなら話は早い。\n決めてしまってくれ。無論、もしも決めづらいなら僕が」
2755 = "「Nếu đã được Paulette đồng ý thì dễ rồi. Em quyết định đi. Tất nhiên, nếu khó chọn quá thì để anh」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わー！　待って待って待って！　100年稼働してて\nはじめてのケーケンなんだから、オリヴィ決めたい！」 
2397 = "「Oa! Khoan khoan khoan! Hoạt động 100 năm nay đây là lần đầu tiên được trải nghiệm chuyện này, nên Olivy muốn tự quyết định!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
3047 = "「Vậy sao.」"
# monologue
# JP: オリヴィはやおら腕をくみ、\n眉根を顰めて考えはじめる。
3497 = "Olivy từ tốn khoanh tay, nhíu mày bắt đầu suy nghĩ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヒビキはてーねーでやさしーよね。あと、目がいい！\nオリヴィが見えないものまで見えるから、凄いって思う」
2762 = "「Hibiki thì cẩn thận và dịu dàng nhỉ. Với lại, mắt cũng tinh nữa! Nhìn thấy cả những thứ Olivy không thấy, giỏi ghê á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2464 = "「嗯」" 
# monologue
# JP: なかなか的確な人物評だ。
3435 = "Một đánh giá con người khá chính xác."
# monologue
# JP: ほんの一週間ほどとはいえど、右田の家でも職場でも、\n密度ある時間をともにすごしている効果であろう。
3871 = "Dù chỉ mới khoảng một tuần, nhưng dù ở nhà Migita hay nơi làm việc, chắc hẳn đó là kết quả của việc cùng nhau trải qua những khoảng thời gian gắn bó."
# monologue
# JP: （ならば――凪は不利かな）
3911 = "(Nếu vậy――Nagi có vẻ bất lợi nhỉ)"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ナギはせっかちだけどセンスいいから、物覚え速そう！\n体力も抜群だし、一瞬だけなら集中力もヒビキ以上かも」
2325 = "「Nagi tuy hấp tấp nhưng có năng khiếu, nên có vẻ học hỏi nhanh lắm! Thể lực cũng xuất sắc, nếu chỉ trong khoảnh khắc thì độ tập trung có khi còn hơn cả Hibiki nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2492 = "「Hô.」"
# monologue
# JP: これまた的を射ている気がして驚かされる。\n凪との接触時間など、かなり限られたものであろうに――
3839 = "Lại một nhận xét trúng phóc khiến tôi kinh ngạc. Thời gian tiếp xúc với Nagi có lẽ khá hạn chế mà――"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、凪の剣術修行につきあってやりでもしたのか？\nあるいは、一緒に遊びにいったとか」
2914 = "「Khoan đã, em có đi tập kiếm thuật với Nagi không đấy? Hay là, hai người đi chơi chung với nhau à.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ケンジュツシュギョー？　なぁにそれ？\nオリヴィそんなの知らないし、遊びにもいかないよ？」
2333 = "「Tập kiếm thuật? Là gì dạ? Olivy hổng biết mấy cái đó đâu, cũng hổng có đi chơi chung luôn á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　ではなぜ、そこまで細かに凪のことを」
2891 = "「Vậy sao? Thế tại sao, em lại hiểu rõ về Nagi đến mức đó.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなの！　一緒に線路あるけばわかるし！\nまる一日がかりだもーん」
3015 = "「Cái đó! Đi dọc đường ray chung là biết liền chứ gì! Mất cả một ngày trời luôn mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうか、徒歩での線見でか」
2436 = "「À! Ra vậy, là lúc đi bộ khảo sát đường ray sao.」"
# monologue
# JP: 感心したのに、オリヴィはぷぅと膨れてしまう。
3632 = "Dù tôi đang thán phục, Olivy lại phồng má hờn dỗi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「え～？　ソーテツがやっとけっていったのに、\n忘れてるとか！　それってちょっとヒドくない？」
2401 = "「Ể~? Rõ ràng là Soutetsu bảo làm mà, lại còn quên nữa chứ! Thế có quá đáng lắm không hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにそれは面目ないな。申し訳ない」
2294 = "「Quả thực là anh không còn mặt mũi nào. Xin lỗi em.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほえっ！？」
2399 = "「Hở!?」"
# monologue
# JP: 頭を下げれば、何故かあわてる。
3599 = "Tôi cúi đầu xin lỗi, cô ấy lại hoảng hốt không hiểu sao."
# monologue
# JP: \\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の表情が、\nこれほどくるくる変わるものとは思わなかった。
3621 = "Tôi không ngờ biểu cảm của \\x%lレイルロオド;#00ffc040;Railord%l;#; lại có thể thay đổi xoành xoạch đến mức này."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「じょーだんだから！　ただのじょーだん！！\nムナカタとお話したら、他のこと忘れちゃうのわかるし」
3074 = "「Đùa thôi mà! Chỉ là nói đùa thôi!! Nói chuyện với Munakata xong là quên béng mấy chuyện khác cũng dễ hiểu mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2464 = "「嗯」" 
# monologue
# JP: ……確かに、帰途でもハチロクとずっと話し込んでいた。
1705 = "......Quả thực, trên đường về tôi cũng mải mê nói chuyện với Hachiroku suốt."
# monologue
# JP: オリヴィは、毎年の全検が必要な程――\nそれ程に、老朽化著しい\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なのだということを。
3499 = "Rằng Olivy, cần phải kiểm tra toàn diện hàng năm―― Là một \\x%lレイルロオド;#00ffc040;Railord%l;#; đã xuống cấp nghiêm trọng đến mức đó."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それに、線路歩けたのもよかったし！　楽しかったし！\nオヒトヨ鉄道に\\x%l保線;#00ffc040;保線%l;#;の専門家いないのもわかったし」
2922 = "「Với lại, được đi bộ trên đường ray cũng thích lắm! Vui lắm luôn! Cũng biết được là Đường sắt Ohito không có chuyên gia \\x%l保線;#00ffc040;bảo trì đường ray%l;#; nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
3101 = "「!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あと、フカミ？　\nあのこもけっこー適正あるなって思ったよ？」
3034 = "「Còn nữa, Fukami hả? Cô bé đó cũng khá là có tố chất đó nha?」"
# 【ハチロク】
# display as 八六
# JP: 「ふかみ様、ですか？」
2785 = "「Fukami sao ạ?」"
# monologue
# JP: \\x%l保線;#00ffc040;保線%l;#;の話が気になるが、\nハチロクがより気にする話がふかみであるなら――
3868 = "Chuyện \\x%l保線;#00ffc040;bảo trì đường ray%l;#; cũng đáng bận tâm đấy, nhưng nếu Hachiroku lại quan tâm đến chuyện của Fukami hơn thì――"
# monologue
# JP: ああ、いや、そうか。緊急や安全に関わるような話なら、\nオリヴィは、その時点で当然に報告をあげている筈だ。
3446 = "À, không, ra là vậy. Nếu là chuyện liên quan đến khẩn cấp hay an toàn, thì Olivy chắc chắn đã báo cáo ngay lúc đó rồi."
# 【ハチロク】
# display as 八六
# JP: 「ふかみ様がどのような理由で、\n湯医線の線見にご同行されたのでしょうか？」
2839 = "「Fukami đã đi cùng chuyến khảo sát Tuyến Yui vì lý do gì vậy ạ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「え？　そりゃ\\x%l車掌;#00ffc040;車掌%l;#;見習いとしてでしょ？」
2391 = "「Hả? Thì với tư cách là \\x%l車掌;#00ffc040;trưởng tàu%l;#; tập sự chứ sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l車掌;#00ffc040;車掌%l;#;」
1714 = "「\\x%l車掌;#00ffc040;Trưởng tàu%l;#;」"
# 【ハチロク】
# display as 八六
# JP: 「見習い？」
2589 = "「Tập sự?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「って！　まだナイショだったんだー！！」
2918 = "「Á! Vẫn đang giữ bí mật mà~!!」"
# monologue
# JP: オリヴィは頭を抱えてしまう。\nしかし――これは聞かねばなるまい。
3513 = "Olivy ôm đầu rên rỉ. Nhưng――chuyện này không thể không hỏi cho rõ được."
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみが\\x%l車掌;#00ffc040;車掌%l;#;見習いとは――\nそして、僕らに内緒とはどういうことだ？」
2842 = "「Fukami là \\x%l車掌;#00ffc040;trưởng tàu%l;#; tập sự là sao―― Và giấu bọn anh nghĩa là thế nào?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あうあぅ～――あのね？　フカミね？\nナギたちがうらやましくなったんだって」
2428 = "「A ư~――Chuyện là vầy nè? Fukami á? Nói là ghen tị với bọn Nagi á.」"
# monologue
# JP: ……御一夜の観光復権は、確かに周辺と比してしまえば\n遅れ気味。とはいえ、実際は極めて堅調だ。
3555 = "......Sự phục hưng du lịch của Ohito, quả thực nếu so với các khu vực xung quanh thì có vẻ hơi chậm. Tuy nhiên, thực tế lại vô cùng vững chắc."
# monologue
# JP: クマ川くだりの復調に、ふかみの母・翠さんのご快癒に、\n船頭さんたちの復帰もあり、ふかみには余裕が出てきた。
3859 = "Sự khởi sắc của thuyền xuôi dòng sông Kuma, sự bình phục của mẹ Fukami - cô Midori, cùng với sự trở lại của các lái đò, Fukami đã có nhiều thời gian rảnh rỗi hơn."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それで、見習いの見習いとして、\\x%l車掌;#00ffc040;車掌%l;#;の勉強、\nヒビキとシャチョーに習ってこっそりはじめてたって」
2730 = "「Vì thế, với tư cách là tập sự của tập sự, Fukami đã âm thầm bắt đầu học làm \\x%l車掌;#00ffc040;trưởng tàu%l;#; từ Hibiki và Giám đốc á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほほう」
2491 = "「Hô hô.」"
# monologue
# JP: 凪の性格で隠し事はむつかしかろうし、\nふかみと凪には、親友同士ゆえのライバル心もあるようだ。
3340 = "Với tính cách của Nagi thì giấu giếm chuyện gì cũng khó, và giữa Fukami và Nagi dường như cũng có chút ganh đua của những người bạn thân."
# monologue
# JP: 凪に内緒にしておいたのは、まぁ納得のできるところだ。\nが――
3323 = "Việc giấu Nagi thì cũng có thể hiểu được. Nhưng――"
# 【ハチロク】
# display as 八六
# JP: 「とても素敵なお話だと思います。\nけれど……なぜ、わたくしたちに内緒で？」
2692 = "「Em nghĩ đó là một câu chuyện rất tuyệt vời. Nhưng......tại sao lại giấu chúng em?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もそこを疑問に思った。というか、\n実戦形式で訓練した方が成長もよほど早かろう」
2667 = "「Anh cũng thắc mắc điều đó. Hơn nữa, huấn luyện thực tế thì tiến bộ sẽ nhanh hơn nhiều chứ.」"
# 【ハチロク】
# display as 八六
# JP: 「で、ございますよね。実際、たとえ見習いであろうと、\n\\x%l車掌;#00ffc040;車掌%l;#;はぜひとも確保したいところですし」
3080 = "「Đúng vậy ạ. Thực tế thì dù là tập sự, chúng ta cũng rất muốn có một \\x%l車掌;#00ffc040;trưởng tàu%l;#; mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2817 = "「Đúng thế.」"
# monologue
# JP: オリヴィが来るまでの時間に、\n御一夜鉄道でも求人をかける計画はあった。
3461 = "Trong khoảng thời gian chờ Olivy đến, Đường sắt Ohito cũng đã có kế hoạch tuyển dụng."
# monologue
# JP: が、予想外に早くオリヴィが来た混乱もあり、\nその求人も、ようやく先日出せたばかりだ。
3344 = "Nhưng do sự hỗn loạn khi Olivy đến sớm hơn dự kiến, thông báo tuyển dụng đó mới được đăng vài ngày trước."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l機関士;#00ffc040;機関士%l;#;周りは赤井宮司にヘルプを頼めるとしても、\n\\x%l車掌;#00ffc040;車掌%l;#;の方は……永山夫人も未経験だしな」
2609 = "「Cho dù có thể nhờ đền chủ Akai giúp đỡ mảng \\x%l機関士;#00ffc040;lái tàu%l;#;, nhưng phía \\x%l車掌;#00ffc040;trưởng tàu%l;#; thì......phu nhân Nagayama cũng chưa có kinh nghiệm.」"
# 【ハチロク】
# display as 八六
# JP: 「もちろん理想は経験者ですが――ふかみ様でしたら、\n比較的早期に、実際の乗務につけますことかと」
2791 = "「Tất nhiên lý tưởng nhất là người có kinh nghiệm――nhưng nếu là Fukami, thì có thể bắt đầu làm việc thực tế khá sớm đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな」
2365 = "「Đúng vậy nhỉ.」"
# monologue
# JP: ふかみはまだまだ若い上、完全に御一夜密着だ。\n無論、クマ川下りとの兼務にはなろうが……
3706 = "Fukami vẫn còn rất trẻ, lại hoàn toàn gắn bó với Ohito. Tất nhiên là sẽ phải kiêm nhiệm cả việc chèo thuyền xuôi dòng sông Kuma......"
# monologue
# JP: そこを踏まえても、将来的な御一夜鉄道――というか、\n御一夜を支える柱のひとつに、育っていってくれそうだ。
3790 = "Dù vậy, em ấy có vẻ sẽ trưởng thành và trở thành một trong những trụ cột của Đường sắt Ohito trong tương lai――hay nói đúng hơn là của Ohito."
# 【双鉄】
# display as 雙鐵
# JP: 「もしもふかみが望むなら、今日からだって――\nああ、そうだ、電話を」
2584 = "「Nếu Fukami muốn, thì bắt đầu từ hôm nay cũng―― À, đúng rồi, gọi điện thoại」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「やめてあげて！」
2240 = "「Đừng làm vậy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「！？」
2385 = "「!?」"
# monologue
# JP: 思いもかけぬ強い口調に顔を向ければ、\nオリヴィは、怖いくらいに真剣な――
3503 = "Giọng điệu mạnh mẽ ngoài sức tưởng tượng khiến tôi quay sang, Olivy đang vô cùng nghiêm túc, đến mức đáng sợ――"
# monologue
# JP: 訴えかけてくるような目で、僕を見ている。
3853 = "Nhìn tôi bằng ánh mắt như đang muốn chất vấn."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……そういうのがヤだから、\nフカミ、ナイショにしてるんじゃない」
1749 = "「......Vì không thích như vậy, nên Fukami mới giữ bí mật đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2410 = "「Hử?」"
# monologue
# JP: ハチロクと顔を見合わせてしまう。
3612 = "Tôi và Hachiroku đưa mắt nhìn nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「そういうの――とは、いったいどういうことだ？」
2235 = "「Như vậy――rốt cuộc là sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えっと――\nフカミ、他にお仕事もってるんでしょ？」
2655 = "「Ừm―― Fukami, còn có công việc khác nữa đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ふかみのお母様が復帰されるまでは、\nクマ川くだり――ふかみの生家の船頭で経営者だったな」
2463 = "「Ừm. Cho đến khi mẹ Fukami quay lại làm việc, em ấy vừa là người chèo thuyền vừa là người quản lý thuyền xuôi dòng sông Kuma――nhà mẹ đẻ của em ấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、いまはおうちが上手くいってるけど、\n上手くいかなかったら戻るかも――なんでしょ？」
2772 = "「Vậy nên, bây giờ việc nhà đang suôn sẻ, nhưng nếu không suôn sẻ thì có thể em ấy sẽ phải quay về――đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだろうな」
3020 = "「Chắc là vậy rồi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だったら、長く続けられないかもしれないし。\n自分が\\x%l車掌;#00ffc040;車掌%l;#;に向いてるかどうかもわからないでしょ？」
2716 = "「Nếu vậy, có thể em ấy sẽ không làm được lâu. Và bản thân em ấy cũng chưa biết mình có hợp làm \\x%l車掌;#00ffc040;trưởng tàu%l;#; hay không đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2464 = "「嗯」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、たくさんメイワクかけないよーに、\n一番少ないひとたちだけに、きっと相談したんだよ」
2713 = "「Thế nên, để không gây nhiều rắc rối, chắc chắn em ấy chỉ bàn bạc với những người ít liên quan nhất thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
2420 = "「À......」"
# monologue
# JP: ならば、最初はポーレットに相談したのであろう。\nおそらくポーレットは快諾し――
3840 = "Nếu vậy, ban đầu chắc hẳn em ấy đã bàn bạc với Paulette. Có lẽ Paulette đã vui vẻ nhận lời――"
# monologue
# JP: ふかみの成長とともに実車を見せる必要が出て、\n日々姫も巻き込み、今に至ったのかと思われる。
3866 = "Cùng với sự trưởng thành của Fukami, cần phải cho em ấy thực hành trên tàu, nên mới kéo cả Hibiki vào, và dẫn đến hiện tại."
# 【双鉄】
# display as 雙鐵
# JP: 「……段階をふんで、じわじわと、\n自分の適正、やれるかどうかを見極めたのか」
1743 = "「......Từng bước một, từ từ, xác định xem mình có tố chất không, có làm được hay không sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうそう！\nなーんだ、ちゃんとソーテツもわかるじゃない！」
2818 = "「Đúng đúng! Gì chứ, Soutetsu cũng hiểu rõ quá trời nè!」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかるはわかるが……\nどうにも迂遠に思えてしまうな」
2767 = "「Hiểu thì hiểu nhưng...... Anh cứ thấy đi đường vòng thế nào ấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ウエン？」
2744 = "「Đường vòng?」"
# 【ハチロク】
# display as 八六
# JP: 「遠回り、あるいは些か、実際的ではない方法に思える\nというほどの意味です」
2733 = "「Ý là đi đường vòng, hoặc là một phương pháp có vẻ hơi không thực tế ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふーん？」
2402 = "「Hừm~?」"
# monologue
# JP: オリヴィの目が、疑わしげなものになる。\n伝わっていないことなら、無論、伝わるまで説明しよう。
3506 = "Ánh mắt Olivy trở nên đầy nghi ngờ. Nếu chưa hiểu, thì tất nhiên tôi sẽ giải thích cho đến khi hiểu thì thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「社外の人間であろうとも、ふかみは仲間だ。\n事情は僕らも知っているし、無論、それを尊重する」
3075 = "「Dù là người ngoài công ty, Fukami vẫn là đồng đội. Chúng anh cũng biết hoàn cảnh của em ấy, và tất nhiên là tôn trọng điều đó.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
1734 = "「............」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、やはり最初から実戦形式で訓練するのが、\n適正見極めもより早く出来、」
2706 = "「Vì vậy, việc huấn luyện thực tế ngay từ đầu, sẽ giúp đánh giá năng lực nhanh hơn,」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それはただ、\nソーテツが近道できるくらい強いってだけの話だよ」
2940 = "「Đó chỉ là, vì Soutetsu đủ giỏi để đi đường tắt thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2486 = "「嗯？」" 
# monologue
# JP: 冷たい、突き放したような声音。\nけれどもなぜか、とても親身なものに聞こえる。
3525 = "Giọng nói lạnh lùng, như muốn đẩy người ta ra xa. Nhưng không hiểu sao, lại nghe rất thân thiết."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そういうふうに周りを巻き込んで試して――ダメでも。\nソーテツ、『時間をセツヤクできた』くらいに思いそう」
3013 = "「Kéo theo mọi người xung quanh để thử nghiệm như vậy――dù có thất bại. Soutetsu chắc cũng chỉ nghĩ là 'tiết kiệm được thời gian' thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――そうだろう。\n実際、大いに時間を節約できている」
3014 = "「Cái đó――đúng là vậy. Thực tế thì tiết kiệm được rất nhiều thời gian mà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも、フカミはそー思えないの！\nだから、回り道でも！　できるやり方でがんばるのっ！」
2286 = "「Nhưng, Fukami thì không nghĩ thế đâu! Nên dù có phải đi đường vòng! Cậu ấy vẫn cố gắng bằng cách của mình!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2443 = "「!?」"
# monologue
# JP: 強い口調で、真剣な目だ。
3469 = "Giọng điệu mạnh mẽ, ánh mắt nghiêm túc."
# monologue
# JP: 尋ねれば、怒らせてしまうかもとも思うが\nだとしても、きちんと確認せねばなるまい。
3681 = "Tôi nghĩ nếu hỏi thì có thể sẽ làm cô ấy tức giận, nhưng dù vậy, tôi vẫn phải xác nhận cho rõ ràng."
# 【双鉄】
# display as 雙鐵
# JP: 「それは……\nなぜ、そのように思えないのだ？」
2377 = "「Chuyện đó...... Tại sao em ấy lại không nghĩ như vậy?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなの――そんなの。\n……自分の居場所、なくなるのがヤだからに決まってる」
3000 = "「Cái đó――cái đó. ......Chắc chắn là vì cậu ấy không muốn mất đi chỗ đứng của mình rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「居場所がなくなる」
2853 = "「Mất đi chỗ đứng.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「いったでしょ？　ソーテツ、フカミのこと、\n社外の人間でも仲間だとかなんとか」
3077 = "「Soutetsu vừa nói rồi mà? Chuyện của Fukami, dù là người ngoài công ty nhưng vẫn là đồng đội gì gì đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2464 = "「嗯」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「仲間なら、そこがいごこちいーんなら、ぜったい、\nなくしたり変えたりなんて、したくないでしょ？」
2752 = "「Nếu là đồng đội, nếu ở đó thoải mái, thì chắc chắn, sẽ không muốn đánh mất hay thay đổi nó đâu, đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2486 = "「嗯？」" 
# 【ハチロク】
# display as 八六
# JP: 「ああ――\nわたくし、理解できたかもしれません」
2414 = "「A―― Có lẽ em hiểu rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！！？」
2442 = "「!!?」"
# monologue
# JP: 思いもかけぬハチロクの声。\nオリヴィは、「続けて？」といわんばかりに小さく頷く。
3391 = "Giọng nói bất ngờ của Hachiroku. Olivy gật đầu nhè nhẹ như muốn nói \"Tiếp đi?\"."
# 【ハチロク】
# display as 八六
# JP: 「一度はじめて、けれども辞める。そうなったのなら――\n元の居心地いい関係が変わってしまうかもしれない」
2587 = "「Bắt đầu làm, rồi lại bỏ cuộc. Nếu chuyện đó xảy ra―― Thì mối quan hệ tốt đẹp ban đầu có thể sẽ bị thay đổi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だね」
2770 = "「Đúng rồi đó.」"
# monologue
# JP: オリヴィが大きく頷く。
3504 = "Olivy gật đầu thật mạnh."
# monologue
# JP: 『そんなことで変わるものとは思えない』――と、\n喉まででかけた言葉がそれで、せき止められる、
1684 = "\"Tôi không nghĩ nó sẽ thay đổi vì chuyện như vậy\"――những lời đã đến tận cổ họng đành phải nuốt ngược vào trong."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「っていうか、さ。全然変わらないのもイヤだよね？\nそれ……“いらなかった”っていわれてるみたいだし」
2287 = "「Nói đúng hơn là. Hoàn toàn không thay đổi cũng chán lắm đúng không? Cứ như......bị bảo là \"không cần thiết\" vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あぁ」
2423 = "「A.」"
# monologue
# JP: 実感のこもった声。\n生々しい温度を感じる言葉だ。
3778 = "Giọng nói chan chứa cảm xúc chân thật. Những lời nói mang theo hơi ấm sống động."
# monologue
# JP: ……そうか、あるいはオリヴィは、\nふかみの立場に、自身を重ねているのかもしれん。
1694 = "......Ra vậy, có lẽ Olivy, đang đặt bản thân mình vào vị trí của Fukami."
# 【双鉄】
# display as 雙鐵
# JP: 「――仮に環境が変わるのならば、その新環境で、\nまたベストを尽くして、居心地いい空間を作ればいい」
1720 = "「――Giả sử môi trường có thay đổi, thì trong môi trường mới đó, chỉ cần cố gắng hết sức để tạo ra một không gian thoải mái là được.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、ソーテツはそれができるの！\nハチロクも、かなりできちゃうほーだよね？」
2727 = "「Nên mới nói, Soutetsu làm được chuyện đó! Hachiroku cũng khá là giỏi vụ đó nhỉ?」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1734 = "「……」" 
# monologue
# JP: 疑問の形の断定に、\nハチロクは、同意も否定も返さない。
3541 = "Trước lời khẳng định mang hình thức câu hỏi, Hachiroku không đồng ý cũng chẳng phủ nhận."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどね？　Ⅸ号は時速80キロは出せないの。\nだったら、出せる最高速度で走らせるしかないじゃない」
2371 = "「Nhưng mà nhé? Đầu máy số 9 không thể chạy với vận tốc 80km/h. Vậy thì, chỉ còn cách chạy với tốc độ tối đa có thể thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2404 = "「哦！」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「これも、それとおんなじことだよ。\n近道をできない人は遠回りでも歩くの！　それだけっ！」
3007 = "「Chuyện này, cũng giống y chang vậy đó. Người không đi đường tắt được thì phải đi đường vòng thôi! Chỉ vậy thôi!」"
# monologue
# JP: ――すぐには言葉がでてこない。\nオリヴィの言ってくれたことは、真実だ。
1669 = "――Tôi không thốt nên lời ngay được. Những gì Olivy nói, là sự thật."
# monologue
# JP: 冷静になれば、あの賢いふかみが、自分の将来を考えて\n選ぶ方法が、ふかみにとって愚かなものである筈も無い。
3410 = "Bình tĩnh mà nghĩ, một cô bé thông minh như Fukami, phương pháp em ấy chọn khi suy nghĩ cho tương lai của mình, chắc chắn không thể là một cách ngốc nghếch đối với em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は……近道ができる者、\n速く走れる者なのか」
2665 = "「Tôi......là người có thể đi đường tắt, là người có thể chạy nhanh sao.」"
# monologue
# JP: 自覚はなかった。あるわけもない。\n僕はただ、そうしなければ生きられなかっただけだから。
3645 = "Tôi không hề nhận thức được điều đó. Cũng không có lý do gì để nhận thức. Bởi vì tôi chỉ đơn giản là không thể sống tiếp nếu không làm vậy."
# monologue
# JP: そして結果も――\nいつでもそれを求められてきたがゆえ、出し続けてきた。
3768 = "Và kết quả cũng vậy―― Vì luôn được yêu cầu, nên tôi cứ liên tục tạo ra nó."
# 【双鉄】
# display as 雙鐵
# JP: 「はたから見れば――そうか、\n僕らは、そういう存在に見えるのか」
2336 = "「Nhìn từ bên ngoài――ra vậy, chúng tôi trông như những tồn tại như thế sao.」"
# 【ハチロク】
# display as 八六
# JP: 「……自分にできることだからといって、\nそうしない他者を、迂遠と決めつけてしまうことは――」
1746 = "「......Chỉ vì bản thân mình làm được, mà lại quy chụp những người không làm thế là đi đường vòng thì――」"
# monologue
# JP: 困ったように、ハチロクが言葉を止めてしまう。\n気持ちは同じだ。
3372 = "Hachiroku bối rối dừng lời. Tâm trạng của tôi cũng vậy."
# monologue
# JP: ハチロクからは、僕らを、僕を、\n責めるような言葉はきっと、出しづらかろう。
3838 = "Hachiroku chắc chắn sẽ rất khó để thốt ra những lời trách móc chúng tôi, trách móc tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「それは、ある種の[ごうまん,1]傲慢なのだな。\n他者の選択を、その動機を、全く尊重していないがゆえ」
3009 = "「Đó, là một kiểu ngạo mạn nhỉ. Bởi vì hoàn toàn không tôn trọng lựa chọn, động cơ của người khác.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そこまでオリヴィいってないよ！！？　ただ、\n速く走れないこにも、それぞれじじょーがあるよって」
2543 = "「Olivy đâu có nói đến mức đó đâu!!? Chỉ là, những người không chạy nhanh được, cũng có lý do riêng của họ thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。ありがとう。\nオリヴィ先生には、大変大きな学びとなる教えを頂いた」
2482 = "「Ừ. Cảm ơn em. Anh đã học được một bài học vô cùng to lớn từ cô giáo Olivy đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしも、大いに思い至るところがございました。\nありがとうございます、オリヴィ先生」
2668 = "「Em cũng đã ngộ ra được rất nhiều điều. Cảm ơn chị, cô giáo Olivy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「やめてやめてやめてそんなのっ！」
2330 = "「Thôi thôi thôi đừng có làm thế mà!」"
# monologue
# JP: ふたりそろって頭を下げれば、\nオリヴィがぶんぶんと短いその手を振り回す。
3604 = "Khi cả hai chúng tôi cùng cúi đầu, Olivy vung vẩy đôi tay ngắn ngủn của mình."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オヒトヨ鉄道やっぱりヘン！\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;がお説教しちゃって、怒られないとか！」
2640 = "「Đường sắt Ohito đúng là kỳ lạ mà! \\x%lレイルロオド;#00ffc040;Railord%l;#; thuyết giáo mà không bị mắng gì cả!」"
# 【双鉄】
# display as 雙鐵
# JP: 「お説教ではなく適正な指導であろう。\n適任者がそれを、理解できてない者におこなっただけだ」
3004 = "「Đó không phải là thuyết giáo mà là sự hướng dẫn đúng đắn. Chỉ là người có chuyên môn đang chỉ dạy cho những người chưa hiểu rõ thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、それがもう逆なんだってば！！\n今日はソーテツたちがオリヴィたちを教導するの！」
2718 = "「Nên mới nói, chuyện đó ngược ngạo quá rồi đó!! Hôm nay Soutetsu mới là người hướng dẫn cho bọn Olivy cơ mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだったな」
2446 = "「À, đúng rồi nhỉ.」"
# monologue
# JP: 鉄道時計を取り出して見る。\nさすがに時間を使いすぎたか。
3641 = "Lấy đồng hồ đường sắt ra xem. Quả nhiên là tốn quá nhiều thời gian rồi."
# monologue
# JP: 日々姫も凪も、せかしに来なかったところをみると、\nあの二人も、それぞれの理由で動けんのだろう。
3663 = "Thấy cả Hibiki và Nagi đều không đến hối thúc, chắc hai đứa cũng không thể nhúc nhích vì lý do riêng của mình."
# monologue
# JP: （それほどに大事なことなのだな。\nどちらが最初に、Ⅸ号機関車を試験するかということが）
3910 = "(Chuyện đó quan trọng đến thế sao. Việc ai sẽ là người lái thử Đầu máy số 9 đầu tiên ấy)"
# monologue
# JP: ――単なる順番の問題などとは、もう思うまい。
1672 = "――Tôi không còn nghĩ đó chỉ là vấn đề thứ tự đơn thuần nữa."
# monologue
# JP: “決められぬなら僕が決める”――と。\nさっきの自分の発言も、傲慢だったと思い至るゆえ。
1682 = "\"Nếu không quyết định được thì để anh quyết định\"―― Bởi tôi chợt nhận ra câu nói lúc nãy của mình cũng thật ngạo mạn."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫でも、凪でも。今日のオリヴィが、\n気持ちよく走れそうな方を選んでくれればそれでいい」
2761 = "「Dù là Hibiki hay Nagi. Hôm nay Olivy cứ chọn người nào mà em cảm thấy có thể chạy cùng một cách thoải mái nhất là được.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うんっ！」
2465 = "「Vâng!」"
# monologue
# JP: オリヴィが小走りに走り出す。\nⅨ号のキャブに駆け上がり、とても明るい声を出す。
3496 = "Olivy chạy lóc cóc. Cô bé nhảy lên buồng lái Đầu máy số 9, cất giọng vô cùng vui vẻ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「待たせてごめんね！　それじゃ、走ろー！！！」
2739 = "「Xin lỗi vì để mọi người đợi nha! Vậy thì, chạy thôi!!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「お疲れ様でした」
2964 = "「Mọi người vất vả rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「おつかれさまでぇす」
2963 = "「Mọi người vất vả rồi nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2464 = "「嗯」" 
# monologue
# JP: オリヴィたちを先に帰しての試験報告。
3637 = "Báo cáo thử nghiệm sau khi để nhóm Olivy về trước."
# monologue
# JP: ポーレットが淹れてくれた紅茶にゆるめられ、\nほっ、と言葉が流れ出ていく。
3865 = "Được xoa dịu bởi tách hồng trà Paulette pha, phù, những lời nói cứ thế tuôn ra."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l客車;#00ffc040;客車%l;#;側では、なにかあったか？」
1712 = "「Bên \\x%l客車;#00ffc040;toa hành khách%l;#; có chuyện gì không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「いつものストーブ\\x%l客車;#00ffc040;客車%l;#;ですし、問題は全くありません。\n乗り心地にも特段の変化は感じなかったって、[ふち]淵さんは」
2496 = "「Vẫn là \\x%lストーブ客車;#00ffc040;toa xe sưởi ấm%l;#; như mọi khi nên hoàn toàn không có vấn đề gì. Bác Fuchi bảo cảm giác khi ngồi cũng không thấy có gì thay đổi đặc biệt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはよかった――」
3048 = "「Vậy thì tốt quá――」"
# monologue
# JP: 淵さん。8620の改修に力を貸し続けてくれた、\n日ノ本車輌、豊河工場OBの技師さんだ。
3712 = "Bác Fuchi. Kỹ sư cựu trào của nhà máy Toyokawa thuộc Nippon Sharyo, người đã liên tục giúp đỡ việc cải tạo 8620."
# monologue
# JP: 僕らの熱心な招請についに応じてくださり、\n昨年来、術仙\\x%l車輌工場;#00ffc040;車輌工場%l;#;長を務めていただいている。
3464 = "Cuối cùng bác ấy đã đáp lại lời mời nhiệt tình của chúng tôi, từ năm ngoái đã đảm nhận chức vụ Giám đốc \\x%l車輌工場;#00ffc040;Nhà máy chế tạo toa xe%l;#; Jutsusen."
# 【ポーレット】
# display as 波萊特
# JP: 「ただ、Ⅸ号が引いてきた\\x%l客車;#00ffc040;客車%l;#;をそのまま\n御一夜－[はやと,1]早戸間に流用するのは、難しいそうです」
2361 = "「Chỉ là, có vẻ khó mà sử dụng nguyên xi \\x%l客車;#00ffc040;toa hành khách%l;#; mà Đầu máy số 9 kéo về cho tuyến Ohito - Hayato được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。そのままでなければなんとかなるのか？」
2773 = "「Vậy sao. Thế nếu không để nguyên xi thì có cách nào không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。もともと輸送密度のある路線じゃないですし、\n車格の小ささを活かした観光\\x%l客車;#00ffc040;客車%l;#;に思い切って改装を」
2815 = "「Vâng. Vốn dĩ đây không phải là tuyến đường có mật độ vận chuyển cao, nên mạnh dạn cải tạo thành \\x%l客車;#00ffc040;toa hành khách%l;#; tham quan tận dụng lợi thế kích thước nhỏ gọn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、日々姫案件か」
3059 = "「Nếu vậy thì, là dự án của Hibiki à.」"
# 【ポーレット】
# display as 波萊特
# JP: 「です。近いうちにスケジュールをもらいたいって、\n淵さんおっしゃってました」
2779 = "「Đúng vậy. Bác Fuchi bảo, muốn xin lịch trình trong thời gian sớm nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「伝えておく。日々姫もさぞはりきるだろう」
3055 = "「Anh sẽ báo lại. Chắc Hibiki sẽ hào hứng lắm đây.」"
# monologue
# JP: 淵さんの就任以来、いままでは門前払いされていた、\n日々姫の『素人意見』が実現化するようになってきている。
3713 = "Kể từ khi bác Fuchi nhậm chức, những \"ý kiến nghiệp dư\" của Hibiki vốn luôn bị từ chối thẳng thừng, nay đã bắt đầu được hiện thực hóa."
# monologue
# JP: 今回の\\x%l客車;#00ffc040;客車%l;#;改装がどのような形に結実するのか、\n僕も単純に楽しみだ。
3774 = "Lần cải tạo \\x%l客車;#00ffc040;toa hành khách%l;#; này sẽ đơm hoa kết trái dưới hình thức nào đây, bản thân tôi cũng đơn thuần cảm thấy mong chờ."
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%l客車;#00ffc040;客車%l;#;側はそんな感じで問題なしだったんですけど――\n機関車側はどうでしたか？」
1711 = "「Phía \\x%l客車;#00ffc040;toa hành khách%l;#; đại khái là như vậy, không có vấn đề gì―― Còn phía đầu máy thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まずは、ハチロクのレビューをもらえるか？\n僕も聞きたい」
2233 = "「Trước tiên, cho anh nghe nhận xét của Hachiroku được không? Anh cũng muốn nghe.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。結論から申しますと、\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィの仕事は百点です」
2571 = "「Vâng. Nói thẳng kết luận thì, công việc của \\x%lレイルロオド;#00ffc040;Railord%l;#; Olivy đạt 100 điểm ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「ひゃくてん！　はじめての試験運転でですかぁ！？」
2849 = "「100 điểm! Lần chạy thử đầu tiên mà được vậy luôn á!?」"
# 【ハチロク】
# display as 八六
# JP: 「幾度かの添乗と、先日の徒歩での線見とから、\n綿密に演算をしていたのでしょうね」
2657 = "「Chắc hẳn cô ấy đã tính toán rất kỹ lưỡng, từ vài lần ngồi cùng và buổi đi bộ khảo sát hôm trước nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「Ⅸ号機関車でだったら、\nどこでどう何を操作するか、とかですかぁ」
2747 = "「Tính toán xem nếu là Đầu máy số 9, thì sẽ thao tác cái gì, ở đâu, như thế nào ấy hả?」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。そしてオリヴィちゃんの経験は、\nその演算と現実との誤差を、観測できないまでに抑えた」
2810 = "「Đúng vậy. Và kinh nghiệm của Olivy, đã triệt tiêu sai số giữa tính toán và thực tế đến mức không thể nhận ra.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら――」
3035 = "「Vậy thì――」"
# monologue
# JP: ポーレットの声のわずかな震えが、\nそれがどれほどの離れ業なのかを伝えてくれる。
3699 = "Giọng nói khẽ run của Paulette, cho thấy đó là một kỹ năng phi thường đến nhường nào."
# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんと[ハチロクニイマル,3]8620での[ゆのい,1]湯医線の走行を、\nオリヴィちゃんはⅨ号機関車で、そのまま再現した？」
2260 = "「Việc Hachiroku và 8620 chạy trên Tuyến Yui, đã được Olivy tái hiện lại y nguyên bằng Đầu máy số 9 sao?」"
# 【ハチロク】
# display as 八六
# JP: 「と、申しても過言ではないでしょうね。\n乗務に必要な範囲の\\x%l共感;#00ffc040;共感%l;#;にも、問題ございませんでした」
2696 = "「Nói vậy cũng không ngoa đâu ạ. \\x%l共感;#00ffc040;Cộng cảm%l;#; trong phạm vi cần thiết cho công việc cũng không có vấn đề gì.」"
# 【れいな】
# display as 玲奈
# JP: 「あー。ハチロクさんもそうでしたかぁ」
2413 = "「A~. Hachiroku cũng thấy vậy sao~」"
# monologue
# JP: 問題ない、という報告であるにもかかわず、\nれいなの声は、さみしげだ。
3364 = "Mặc dù báo cáo là không có vấn đề gì, nhưng giọng Reina lại có vẻ buồn bã."
# monologue
# JP: ならばつまりは、\\x%l共感;#00ffc040;共感%l;#;を通じ合ったのは、\n『鉄道の安全運行に必要な最低限』のみであったのだろう。
3843 = "Vậy tức là, những \\x%l共感;#00ffc040;cộng cảm%l;#; mà họ trao đổi với nhau, chỉ dừng lại ở mức \"tối thiểu cần thiết cho việc vận hành đường sắt an toàn\" thôi."
# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんがそこまで褒める、\n百点満点の試験運転だったなら」
2751 = "「Nếu chuyến chạy thử đạt 100 điểm tuyệt đối, đến mức được Hachiroku khen ngợi như vậy thì」"
# 【ハチロク】
# display as 八六
# JP: 「いえ、『\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィ』の仕事は満点でも、\n試験運転が満点であったとは申しておりません」
3087 = "「Không, dù công việc của '\\x%lレイルロオド;#00ffc040;Railord%l;#; Olivy' đạt điểm tối đa, nhưng em không nói là chuyến chạy thử đạt điểm tối đa đâu ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？」
2388 = "「Hả?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまが、もしもオリヴィと組んでいたのであれば。\n後者もきっと、満点であったかとも想像いたしますが」
2581 = "「Giả sử ngài Soutetsu hợp tác với Olivy. Thì em nghĩ vế sau chắc chắn cũng sẽ đạt điểm tối đa thôi ạ.」"
# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「あ」
# 2423 = "「啊」" 
# monologue
# JP: ポーレットとれいなが顔を見合わす。\nやはり、気になっていたらしい。
3698 = "Paulette và Reina nhìn nhau. Quả nhiên là họ cũng tò mò."
# 【ハチロク】
# display as 八六
# JP: 「本日の湯医線Ⅸ号機関車試走。\n\\x%l機関士;#00ffc040;機関士%l;#;は右田日々姫、\\x%l機関助士;#00ffc040;機関助士%l;#;は蓑笠凪の体制でした」
2270 = "「Chuyến chạy thử Đầu máy số 9 trên Tuyến Yui hôm nay. Được thực hiện với đội hình \\x%l機関士;#00ffc040;lái tàu%l;#; Migita Hibiki, \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; Minokasa Nagi ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「ほわ」
2403 = "「Hòa~」"
# monologue
# JP: れいなの、思わず飛び出してしまったというような声。\n喜びのせいか、驚きのせいか、僕にはまるで判別出来ぬ。
3731 = "Giọng Reina buột miệng thốt lên. Là do vui mừng hay ngạc nhiên, tôi hoàn toàn không thể phân biệt được."
# 【れいな】
# display as 玲奈
# JP: 「オリヴィさん、\n日々姫さんを\\x%l機関士;#00ffc040;機関士%l;#;さんに選んだんですねぇ」
2545 = "「Chị Olivy, đã chọn chị Hibiki làm \\x%l機関士;#00ffc040;lái tàu%l;#; nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、オリヴィが結局選んだのは、\n『くじ引き』という方法だけだ」
2252 = "「Không, cuối cùng Olivy chỉ chọn một cách duy nhất là 'rút thăm' thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「くじ引き」
2742 = "「Rút thăm.」"
# 【ハチロク】
# display as 八六
# JP: 「『どっちとも乗りたくて選べないから、くじ引き』と。\nうふふっ、本当にオリヴィちゃんらしい気の遣い方です」
2564 = "「'Vì ai cũng muốn đi cùng nên không chọn được, rút thăm thôi'. Ufufu, đúng là cách quan tâm rất ra dáng bé Olivy.」"
# monologue
# JP: ハチロクの、物真似めいた解説に、\nポーレットはわずかな笑みをたたえて、うなずき返す。
3380 = "Trước lời giải thích mang tính bắt chước của Hachiroku, Paulette khẽ mỉm cười và gật đầu đáp lại."
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんって、やっぱり大人――\nベテランの\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なんですね」
2547 = "「Bé Olivy, quả nhiên là người lớn―― Là một \\x%lレイルロオド;#00ffc040;Railord%l;#; kỳ cựu nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「実際、整備点検も見事の一言でございました。\nあの域にまで行き届いたものは、まず見られません」
2601 = "「Thực tế thì, việc kiểm tra bảo dưỡng cũng chỉ có thể dùng từ tuyệt vời để hình dung. Đạt đến trình độ chu toàn như vậy, trước giờ em chưa từng thấy.」"
# 【れいな】
# display as 玲奈
# JP: 「ヒマさえあれば機関庫にこもってますもんねぇ。\nれいなも、すごいなぁって思ってましたぁ」
2871 = "「Hễ rảnh rỗi là chị ấy lại giam mình trong kho đầu máy mà. Reina cũng thấy chị ấy giỏi lắm luôn á~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2464 = "「嗯」" 
# monologue
# JP: 乗務の無いとき、何をしていたのかと思えば――整備か。
3608 = "Lúc không làm việc, tôi cứ tự hỏi cô ấy làm gì――ra là bảo dưỡng sao."
# monologue
# JP: ハチロクの惜しみ無い賞賛の裏には、\nまさに不断の積み重ねがあるのだと実感する。
3781 = "Đằng sau những lời khen ngợi không ngớt của Hachiroku, tôi thực sự cảm nhận được sự tích lũy không ngừng nghỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「大したものだ。筋金入りのプロなのだなぁ」
3016 = "「Thật đáng nể. Đúng là một chuyên gia lão luyện.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、[めいこくしき,2]冥国式\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のこと、\n勘違いしてたって思いましたですよぉ」
2866 = "「Reina nghĩ là, mình đã hiểu lầm về \\x%lレイルロオド;#00ffc040;Railord%l;#; kiểu Mỹ rồi á~」"
# monologue
# JP: れいなとふたり、顔を見合わせて頷き合う。
3614 = "Tôi và Reina nhìn nhau gật đầu."
# monologue
# JP: と――何故かポーレットとハチロクとは、\n微妙な顔で、そちらも眼と眼を見交わしている。
3451 = "Nhưng――không hiểu sao Paulette và Hachiroku, lại nhìn nhau với vẻ mặt khá là khó xử."
# 【双鉄】
# display as 雙鐵
# JP: 「なにかあるのか？」
2793 = "「Có chuyện gì à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、その――働き詰めだと、やっぱり\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も\n消耗するって思いますから――」
2247 = "「Không, cái đó――tôi nghĩ nếu cứ làm việc quần quật, thì dù là \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng sẽ bị hao mòn――」"
# 【ハチロク】
# display as 八六
# JP: 「本当に整備が趣味で、\nそれが息抜きになっていればよいのですが……」
2582 = "「Nếu việc bảo dưỡng thực sự là sở thích, và cô ấy coi đó như một cách thư giãn thì tốt, nhưng......」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、そこは他人が口出しをすることでもなかろう。\nオリヴィは大人だと、ふたりも口をそろえていたろうに」
2244 = "「Không, chuyện đó người ngoài không nên can thiệp vào đâu. Hai người cũng vừa đồng thanh nói Olivy là người lớn rồi cơ mà.」"
# 【ハチロク】
# display as 八六＆波萊特
# JP: 「あ！」\n「あうっ、それもそうですよね、すみません」
2431 = "「A!」 「A ư, đúng là vậy nhỉ, xin lỗi anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あやまるようなことでもないとも思うが」
2262 = "「Anh nghĩ cũng không đến mức phải xin lỗi đâu.」"
# monologue
# JP: しかし……ハチロクだけではなくポーレットもか。
3427 = "Nhưng......không chỉ Hachiroku mà cả Paulette cũng vậy sao."
# monologue
# JP: オリヴィは大人とわかっていても、\nふとしたところで、こども扱いをしてしまう。
3424 = "Dù biết Olivy là người lớn, nhưng thỉnh thoảng họ vẫn vô tình đối xử với cô ấy như trẻ con."
# monologue
# JP: （あの外観や言動が、いわゆる母性を刺激するのか？\nあるいはオリヴィの中に、僕には解らぬそうした要素が）
3907 = "(Ngoại hình và lời nói đó kích thích cái gọi là tình mẫu tử sao? Hay là bên trong Olivy có yếu tố nào đó mà tôi không hiểu được)"
# 【れいな】
# display as 玲奈
# JP: 「それで、\n\\x%l機関士;#00ffc040;機関士%l;#;の差って、なにかあったんですかぁ？」
2719 = "「Vậy, sự khác biệt giữa các \\x%l機関士;#00ffc040;lái tàu%l;#; là gì vậy ạ?」"
# 【ハチロク】
# display as 八六
# JP: 「ああ、そうでした」
2448 = "「À, đúng rồi.」"
# monologue
# JP: ごくさりげなく、れいなが話を戻してくれる。\n幼いようで、ひどく大人で。
3728 = "Rất tự nhiên, Reina đã kéo câu chuyện quay lại. Trông thì có vẻ trẻ con, nhưng lại rất người lớn."
# monologue
# JP: ……外観と内面が一致しないということに、れいなを通じ、\n僕らは慣れ親しんでいるように思えるのだが。
1702 = "......Thông qua Reina, tôi tưởng chúng tôi đã quen với việc ngoại hình và nội tâm không đồng nhất rồi chứ."
# 【ハチロク】
# display as 八六
# JP: 「走行自体に問題はありませんでしたが、右利き――\n右側に\\x%l機関士;#00ffc040;機関士%l;#;の運転台ですので、日々姫は多少の苦戦を」
2933 = "「Bản thân việc chạy tàu thì không có vấn đề gì, nhưng vì thuận tay phải―― buồng lái của \\x%l機関士;#00ffc040;lái tàu%l;#; nằm bên phải, nên Hibiki có phần chật vật.」"
# 【ポーレット】
# display as 波萊特
# JP: 「苦戦って――具体的には？」
2874 = "「Chật vật――cụ thể là sao?」"
# monologue
# JP: と、いかん、集中せねば。
3442 = "Ái chà, không được, phải tập trung thôi."
# monologue
# JP: 試験結果の報告は、\n今後の全てを左右しかねん、重要事項なのだから。
3805 = "Báo cáo kết quả chạy thử, là một vấn đề quan trọng có thể quyết định mọi thứ trong tương lai."
# 【双鉄】
# display as 雙鐵
# JP: 「まず、単純な運転台の形状の違いだな。\nとくに、\\x%l逆転機;#00ffc040;逆転機%l;#;がレバー式なのに戸惑っていた」
3097 = "「Đầu tiên, đơn giản là sự khác biệt về hình dáng buồng lái. Đặc biệt là việc \\x%l逆転機;#00ffc040;cần đảo chiều%l;#; là dạng cần gạt khiến con bé lúng túng.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そこって、やっぱり問題になるもんなんですか？」
3002 = "「Chỗ đó, quả nhiên là sẽ thành vấn đề sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「感覚がやはり変わってくるので、どうしても慎重になる。\nとはいえ、ここは経験でほどなく解消できよう」
3018 = "「Vì cảm giác sẽ thay đổi, nên dù thế nào cũng phải cẩn thận. Tuy nhiên, vấn đề này có thể giải quyết nhanh chóng bằng kinh nghiệm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っていうと、\n経験を積んでも解消できなさそうな問題も？」
3017 = "「Nói vậy tức là, có những vấn đề dù tích lũy kinh nghiệm cũng không giải quyết được sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。目視の視界の問題だ。湯医線の標識・表示類は、\n全て左側運転台を想定して設置されているので――」
2484 = "「Ừm. Là vấn đề về tầm nhìn quan sát. Các loại biển báo, biển chỉ dẫn trên Tuyến Yui, đều được lắp đặt dựa trên giả định buồng lái nằm bên trái――」"
# monologue
# JP: 言い切るより先、\nポーレットが嬉しげに両手を合わせて鳴らす。
3722 = "Trước khi tôi kịp nói hết câu, Paulette đã vui vẻ vỗ tay vào nhau."
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　右利き運転台用に、標識・表示を補強ですね？\nそれは、オリヴィちゃんからも要請を受けてます」
2435 = "「A! Là gia cố thêm biển báo, biển chỉ dẫn cho buồng lái bên phải đúng không? Chuyện đó, bé Olivy cũng đã yêu cầu rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィから？」
2541 = "「Từ Olivy á?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。必須のことだと思ったので、手配しました。\n湯医線全線、二週間と少しで改善できる予定です」
2776 = "「Vâng. Vì tôi nghĩ đó là việc bắt buộc nên đã sắp xếp rồi. Dự kiến toàn Tuyến Yui sẽ được cải thiện trong vòng hơn hai tuần nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――それだけの期間があれば、\nまず日々姫は運転台にフィットする――よな？」
2461 = "「Hừm――với khoảng thời gian đó, thì trước tiên Hibiki sẽ làm quen được với buồng lái――nhỉ?」"
# monologue
# JP: 問えば、ハチロクもすぐにうなずき返してくれる。
3644 = "Vừa hỏi, Hachiroku liền gật đầu đáp lại ngay."
# 【ハチロク】
# display as 八六
# JP: 「と、思われます。凪と交代乗務できるかについては、\n\\x%l機関士;#00ffc040;機関士%l;#;・凪での試験運転を待たなくてはなりませんが」
2672 = "「Em cũng nghĩ vậy ạ. Còn về việc có thể đổi ca với Nagi hay không, thì phải đợi Nagi chạy thử với tư cách \\x%l機関士;#00ffc040;lái tàu%l;#; mới biết được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「……もし凪ちゃんがフィットできなくても、\n右田日々姫\\x%l機関士;#00ffc040;機関士%l;#;で、営業運転は？」
1762 = "「......Nếu Nagi không làm quen được, thì vẫn có thể để \\x%l機関士;#00ffc040;lái tàu%l;#; Migita Hibiki chạy thương mại chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、開始できると判断する。\n三週間後であれば、まず間違いなく」
2296 = "「Anh đánh giá là có thể bắt đầu được. Nếu là 3 tuần nữa, thì gần như chắc chắn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら、そこを、営業運転開始の目標日に定めましょう。\n新『バーベキュー列車、もくもくオリヴィ号』の」
3051 = "「Vậy, chúng ta hãy lấy đó làm ngày mục tiêu bắt đầu hoạt động thương mại nhé. Của chuyến tàu mới 『Chuyến tàu BBQ, Mokumoku Olivy』.」"
# monologue
# JP: いい判断だ。目標が明確化されれば、\n凪と日々姫にもいっそう気合が入ろうし――
3552 = "Quyết định hay đấy. Nếu mục tiêu được xác định rõ ràng, Nagi và Hibiki cũng sẽ càng thêm quyết tâm――"
# monologue
# JP: 僕の気持ちも同様に、今の一言に引き締められる。
3864 = "Tâm trạng của tôi cũng vậy, đã được xốc lại tinh thần nhờ câu nói vừa rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「心得た。では、三週間後には僕達も、\n御一夜－早戸間の乗務につけるように習熟せねばな」
2765 = "「Đã rõ. Vậy thì, 3 tuần nữa chúng ta cũng phải thành thạo để có thể đảm nhận tuyến Ohito - Hayato thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえ。そこはもう少し余裕をもってもらって\n大丈夫です。み鉄さんとの契約の関係もありますし」
2458 = "「À, không. Chuyện đó thì cứ từ từ cũng được. Vì còn liên quan đến hợp đồng với Đường sắt Mikan nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そうか。そういえばそうだったな」
2419 = "「À――ra vậy. Nhắc mới nhớ đúng là thế.」"
# 【ポーレット】
# display as 波萊特
# JP: 「湯医線の営業運転の目処が完全についてから。改めて、\nオリヴィちゃんにも習熟運転に立ちあってもらって。で」
2912 = "「Đợi đến khi hoạt động thương mại trên Tuyến Yui hoàn toàn ổn định đã. Rồi sau đó, sẽ nhờ bé Olivy hỗ trợ trong quá trình chạy làm quen. Vậy nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにその方がより安全だな。オリヴィは直近でも、\n補機有りでとはいえ、小畑を越えているのだし」
3010 = "「Quả thực làm vậy sẽ an toàn hơn. Dù sao thì gần đây Olivy cũng đã vượt qua đèo Kobata, dù là có đầu máy phụ hỗ trợ.」"
# monologue
# JP: 返事をしながら、手帳を繰って確かめる。
3586 = "Vừa trả lời, tôi vừa lật sổ tay ra để kiểm tra."
# 【双鉄】
# display as 雙鐵
# JP: 「となると、み鉄さんとの契約が切れる……\nふむ。再来月頭からの営業運転が目標となるな」
3011 = "「Vậy thì, khi hợp đồng với Đường sắt Mikan kết thúc...... Hừm. Mục tiêu sẽ là bắt đầu hoạt động thương mại từ đầu tháng sau nữa nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。オリヴィちゃんが早く来てくれたおかげで、\nそこは、かなり余裕ができちゃいました」
2781 = "「Đúng vậy. Nhờ bé Olivy đến sớm, nên chúng ta có khá nhiều thời gian rảnh rỗi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……そうか。標識類を、\nオリヴィはすでにチェックしてくれていたのか」
2367 = "「Nhưng mà......ra vậy. Về các loại biển báo, Olivy đã kiểm tra giúp rồi sao.」"
# monologue
# JP: いつ、どのように――\n思えばすぐに、答えに思い当たる。
3519 = "Lúc nào, và bằng cách nào―― Chỉ cần nghĩ một chút là tôi tìm ra ngay câu trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「徒歩での線見を――\nオリヴィは、何重にも活かしてくれたのだな」
2630 = "「Chuyến đi bộ khảo sát đường ray―― Olivy đã tận dụng nó một cách triệt để nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。その直後に報告という形で要請を受けました。\nあと、保線上の不安についての報告も、数点」
2363 = "「Vâng. Ngay sau đó tôi đã nhận được yêu cầu dưới dạng báo cáo. Ngoài ra, còn có vài báo cáo về những điểm đáng lo ngại trên tuyến đường sắt nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういえば、オリヴィは言っていたな。\n『御一夜には\\x%l保線;#00ffc040;保線%l;#;の専門家がいない』と」
2941 = "「Nhắc mới nhớ, Olivy từng nói. 'Ở Ohito không có chuyên gia \\x%l保線;#00ffc040;bảo trì đường ray%l;#;'.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ボランティア頼みですから……\nやっぱり、専門家の見地とは差がありますよね」
2498 = "「Vì chúng ta phụ thuộc vào tình nguyện viên mà...... Quả nhiên vẫn có sự khác biệt so với góc nhìn của chuyên gia.」"
# 【ハチロク】
# display as 八六
# JP: 「と、おっしゃいますと、オリヴィちゃんは――\n専門家レベルの知識を持っているのですか？」
3065 = "「Cô nói vậy, nghĩa là bé Olivy―― Có kiến thức ở trình độ chuyên gia sao ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「これ、見てください。\n『簡単なものだけど』って、オリヴィちゃんから」
2291 = "「Mọi người xem cái này đi. Bé Olivy bảo 'Chỉ là những thứ đơn giản thôi'.」"
# monologue
# JP: 渡されるのは、A4数枚のペーパーだ。
3702 = "Thứ được đưa cho tôi là vài tờ giấy A4."
# monologue
# JP: ぱらぱらと軽く目を通す――\nだけのつもりが、熟読になる。
3780 = "Tôi định chỉ lướt qua sơ sơ―― Nhưng rồi lại đọc một cách chăm chú."
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ――これ、は――」
2409 = "「Hừm――cái này, là――」"
# monologue
# JP: \\x%l保線;#00ffc040;保線%l;#;の知識、そして経験のレベルが違う。
3514 = "Kiến thức về \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, và mức độ kinh nghiệm hoàn toàn khác biệt."
# monologue
# JP: 初見で一度の、路線確認のついでの視察にも関わらず、\nオリヴィがチェックしてる個所の多くが――
3553 = "Mặc dù chỉ là lần đầu tiên, và chỉ là chuyến đi khảo sát nhân tiện xác nhận tuyến đường, nhưng phần lớn những điểm Olivy kiểm tra――"
# 【ハチロク】
# display as 八六
# JP: 「過去に問題を起こしている個所がマアクされていますね。\nやはり、路盤自体に問題があるのでしょうか？」
3029 = "「Những vị trí từng xảy ra sự cố trong quá khứ đều được đánh dấu. Quả nhiên là bản thân nền đường có vấn đề sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこまでは指摘されていないな。精査してほしい場所を\nひとまずざらっとチェックしただけのよう――うむ？」
2560 = "「Cũng chưa chỉ ra đến mức đó. Có vẻ như em ấy chỉ kiểm tra sơ qua những chỗ muốn khảo sát kỹ lưỡng thôi――hửm?」"
# 【ハチロク】
# display as 八六
# JP: 「あら？　クマ川第四橋梁にもチェックが」
2394 = "「Ủa? Cầu số 4 sông Kuma cũng được đánh dấu này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あそこでは、特段のトラブルは発生していない――\nああ、潜在不安があると指摘されているな」
3068 = "「Chỗ đó chưa từng xảy ra sự cố nào đặc biệt cả―― À, em ấy chỉ ra rằng có mối nguy tiềm ẩn.」"
# 【ハチロク】
# display as 八六
# JP: 「『まくらぎけい[ざい]材要確認』『微細な[ふりく,1]不陸』\n『可変パッド推奨』……これは\\x%l保線;#00ffc040;保線%l;#;の専門用語ですね」
1728 = "「'Cần kiểm tra vật liệu nối tà vẹt', 'Có dấu hiệu hụt đất nhỏ', 'Khuyến nghị dùng tấm đệm lót thay đổi'......Đây là thuật ngữ chuyên ngành của \\x%l保線;#00ffc040;bảo trì đường ray%l;#; nhỉ.」"
# monologue
# JP: ハチロクがはてなと首を傾げる。\n僕も当然、お手上げだ。
3385 = "Hachiroku nghiêng đầu vẻ khó hiểu. Tất nhiên, tôi cũng bó tay."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットやれいなは、意味がわかるのか？」
2837 = "「Paulette và Reina có hiểu ý nghĩa của nó không?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、『ふりく』だけならわかりますよぉ」
2865 = "「Reina thì chỉ biết 'hụt đất' thôi nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2403 = "「哦」" 
# 【れいな】
# display as 玲奈
# JP: 「『ふりく』は、『たいらじゃない』ってことですよぉ」
2732 = "「'Hụt đất' có nghĩa là 'không bằng phẳng' đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――線路、ないしは\\x%l枕木;#00ffc040;枕木%l;#;かその下の鋼材かに\n微細な凹凸が生じているというほどの意味か」
2466 = "「Hừm――nghĩa là có sự lồi lõm siêu nhỏ trên đường ray, \\x%l枕木;#00ffc040;tà vẹt%l;#; hoặc thép bên dưới sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「他のも急いで調べました。まくらぎけい[ざい]材っていうのは、まくらぎ同士を繋いでいる鉄板のことです」
2319 = "「Tôi cũng đã vội tra cứu những cái khác rồi. Vật liệu nối tà vẹt là tấm sắt nối các thanh tà vẹt lại với nhau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……言われてみれば、そんなものもあった――\nような気がするが」
2422 = "「À......nghe cô nói mới nhớ, hình như cũng có thứ đó―― thì phải.」"
# monologue
# JP: 僕らがチェックしてるのは、\n\\x%lバラスト;#00ffc040;バラスト%l;#;、およびまくら木の痛み具合。
3600 = "Những gì chúng tôi kiểm tra là \\x%lバラスト;#00ffc040;đá dăm%l;#;, và tình trạng hư hỏng của tà vẹt."
# monologue
# JP: それから、レールに痛みがないか、歪んでいないか――\nといったところがせいぜいだ。
3399 = "Sau đó là xem đường ray có bị hỏng hay cong vênh không―― cùng lắm là vậy thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「橋まくら木は痛み難いからな。\n注意がおろそかになっていたのかもしれん」
2517 = "「Tà vẹt trên cầu thì khó hỏng mà. Có lẽ chúng ta đã lơ là chú ý.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それが、[ふりく,1]不陸の原因なのかもしれませんね。\nで、可変パッドは、それを調整できる資材だそうですよ」
3057 = "「Đó có lẽ là nguyên nhân gây ra hụt đất nhỉ. Và tấm đệm lót thay đổi là vật liệu có thể điều chỉnh được điều đó đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！　そのような便利なものが出てきたのですか？」
2396 = "「Ôi! Đã có thứ tiện lợi như vậy rồi sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「大廃線で、レールもまくら木も不足してますから。\n隙間産業的に生まれてきた――っていう話です」
2748 = "「Vì vụ Đại phế tuyến nên đường ray và tà vẹt đều thiếu hụt. Nghe nói nó được sinh ra như một ngành công nghiệp ngách――」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、まさしく最新の知見だな。オリヴィは、\n100年選手でありながら、常に今を学んでいるのか」
2337 = "「Ra vậy, quả đúng là kiến thức mới nhất nhỉ. Olivy, dù đã 100 tuổi nhưng vẫn luôn học hỏi những điều mới mẻ sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「すごい、ですよね。\nわたしも、見習いたい――見習わなくちゃって思います」
2881 = "「Tuyệt thật đấy. Tôi cũng muốn noi gương――tôi nghĩ mình phải noi gương em ấy mới được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットが\\x%l保線;#00ffc040;保線%l;#;まで手を出すのはオーバーワークだ。\nそこは、\\x%l保線部長;#00ffc040;保線部長%l;#;たる僕に任せてほしい」
3024 = "「Paulette mà nhúng tay vào cả việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#; thì quá sức đấy. Chuyện đó, hãy giao cho tôi, \\x%l保線部長;#00ffc040;Trưởng bộ phận bảo trì đường ray%l;#;.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですか？　それなら、双鉄くんにお任せします。\nでも、できるだけ無理のない範囲で」
2929 = "「Vậy sao? Nếu thế thì nhờ cả vào cậu Soutetsu nhé. Nhưng hãy cố gắng làm trong khả năng thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2464 = "「嗯」" 
# monologue
# JP: ボランティアである堰さんたちの知識だけに頼り、\n\\x%l保線;#00ffc040;保線%l;#;を知った気になっていた自分がひどく情けない。
3678 = "Chỉ dựa vào kiến thức của những tình nguyện viên như bác Seki, mà đã tưởng mình hiểu về \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, tôi thấy mình thật thảm hại."
# monologue
# JP: 堰さんたちは土と水との専門家だが、\n鉄道工学を専門的には学んでいない。
3475 = "Bác Seki là chuyên gia về đất và nước, chứ không học chuyên sâu về kỹ thuật đường sắt."
# monologue
# JP: （ならば僕が率先しそれを学び、身につけ、\n堰さんたちにフィードバックするべきであったのだ）
3913 = "(Nếu vậy thì tôi phải là người tiên phong học hỏi, tiếp thu, rồi truyền đạt lại cho bác Seki mới đúng)"
# monologue
# JP: 基礎知識も経験も十二分なお三方だ。
3736 = "Cả ba người họ đều có thừa kiến thức cơ bản và kinh nghiệm."
# monologue
# JP: そうするだけで、御一夜鉄道の\\x%l保線;#00ffc040;保線%l;#;レベルは、\n格段に跳ね上がっていたことだろう。
3743 = "Chỉ cần làm vậy, trình độ \\x%l保線;#00ffc040;bảo trì đường ray%l;#; của Đường sắt Ohito chắc chắn sẽ tăng vọt lên một tầm cao mới."
# 【双鉄】
# display as 雙鐵
# JP: 「ひとまずは、オリヴィに保線講習の講師を頼むか」
2935 = "「Trước mắt, phải nhờ Olivy làm giảng viên cho khóa học bảo trì đường ray thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それ、いい考えだと思います。オリヴィちゃん――\nひとに知識を伝えるの、すごく上手ですよね？」
2693 = "「Tôi nghĩ đó là một ý hay. Bé Olivy―― rất giỏi trong việc truyền đạt kiến thức cho người khác nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは僕も感じる」
2475 = "「À, tôi cũng cảm thấy vậy.」"
# monologue
# JP: 知識があっても、それを伝えるのが上手いとは限らない。
3426 = "Có kiến thức chưa chắc đã truyền đạt giỏi."
# monologue
# JP: \\x%lレイルロオド;#00ffc040;レイルロオド%l;#;としての本職を完璧にこなすだけでなく、\nその周辺まで、これほど高いレベルで修めているとは――
3317 = "Không chỉ hoàn thành xuất sắc công việc chính của một \\x%lレイルロオド;#00ffc040;Railord%l;#;, mà còn thông thạo những kiến thức xung quanh ở trình độ cao như vậy――"
# 【双鉄】
# display as 雙鐵
# JP: 「頭が下がる。そのような\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だから、\nあれほど鋭い指摘をできるものなのだろうな」
2884 = "「Đáng khâm phục thật. Chính vì là một \\x%lレイルロオド;#00ffc040;Railord%l;#; như vậy, nên mới có thể đưa ra những lời phê bình sắc sảo đến thế nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「鋭い指摘？」
2227 = "「Phê bình sắc sảo?」"
# 【れいな】
# display as 玲奈
# JP: 「って、なんですかぁ？」
3001 = "「Là sao vậy ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ズバリと言われてしまったのだ。\n『走れる者が、走れない者に走れというのは傲慢だ』と」
2479 = "「Ừm. Bị nói thẳng thừng luôn. 'Kẻ chạy được mà bảo kẻ không chạy được chạy đi, thật là ngạo mạn'.」"
# 【ハチロク】
# display as 八六
# JP: 「いえ！」
2736 = "「Không ạ!」"
# monologue
# JP: 言い終わらぬうち、ハチロクがあわてて口を挟んでくる。
3636 = "Tôi chưa nói xong, Hachiroku đã vội vàng xen vào."
# 【ハチロク】
# display as 八六
# JP: 「そのように直接的な物言いではございませんでしたよ？\n趣旨としてはそのようなことを、もっと穏やかに」
2563 = "「Cách nói không trực tiếp như vậy đâu ạ? Ý thì đúng là vậy, nhưng nhẹ nhàng hơn nhiều.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あー」
2411 = "「A~」"
# monologue
# JP: ハチロクのフォロー、\nポーレットのどこか困ったような笑顔。
3779 = "Lời đỡ lời của Hachiroku, nụ cười có vẻ hơi bối rối của Paulette."
# monologue
# JP: それを目にしただけでももう、\nやはり指摘は正しいのだと、痛感させられる。
3346 = "Chỉ nhìn thấy điều đó thôi, tôi đã thấm thía rằng lời phê bình đó quả thực rất đúng."
# 【ポーレット】
# display as 波萊特
# JP: 「この短期間でそれが見えちゃうオリヴィちゃんは\n凄いですけど……だけど、それってほんの一面ですよね」
3019 = "「Bé Olivy nhìn thấu được điều đó trong thời gian ngắn như vậy đúng là giỏi thật......Nhưng mà, đó chỉ là một khía cạnh thôi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2486 = "「嗯？」" 
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんも、ハチロクちゃんも、大きな傷を乗り越えて――だから、今、走れてるわけじゃないですか」
3078 = "「Cậu Soutetsu và Hachiroku đều đã vượt qua vết thương lòng lớn lao――nên bây giờ mới có thể chạy được, không phải sao.」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 2411 = "「啊——」" 
# monologue
# JP: ポーレットの声に、ハチロクが救われたような顔になる。\n僕もあるいは、同じ表情をしているかもしれん。
3701 = "Nghe giọng Paulette, nét mặt Hachiroku như được cứu rỗi. Có lẽ tôi cũng đang mang vẻ mặt giống vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「その経験があってそれでも。言われたことに反発せずに、\n素直に指摘を受け止められる」
3076 = "「Dù đã trải qua những chuyện đó. Cậu vẫn không phản bác lại những gì bị nói, mà ngoan ngoãn chấp nhận lời phê bình.」"
# monologue
# JP: れいなもにこにこ、ポーレットの言葉に頷いている。\n見るだけでこころがやさしく、あたたかになる。
3734 = "Reina cũng mỉm cười, gật đầu đồng tình với lời của Paulette. Chỉ nhìn thôi cũng thấy lòng nhẹ nhàng, ấm áp."
# 【ポーレット】
# display as 波萊特
# JP: 「それってわたし、凄いことだと思います。\nその強さが、御一夜を守ってくれたって、思ってます」
3003 = "「Tôi nghĩ điều đó thật sự rất tuyệt vời. Tôi tin chính sức mạnh đó đã bảo vệ Ohito.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
2832 = "「Paulette.」"
# 【ハチロク】
# display as 八六
# JP: 「ポーレット様」
2833 = "「Cô Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だから、わたしは。わたしの立場からいったら、\n双鉄くんには、気にせず走ってほしいです」
2709 = "「Nên tôi. Từ lập trường của tôi mà nói, tôi muốn cậu Soutetsu cứ mặc kệ mà tiếp tục chạy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 2486 = "「嗯？」" 
# monologue
# JP: 『だから』の続きが、かなり意外だ。\n聞き返さざるを得ないほど。
1687 = "Vế sau của từ \"Nên\" khá là bất ngờ. Đến mức tôi không kìm được phải hỏi lại."
# 【双鉄】
# display as 雙鐵
# JP: 「それは――オリヴィの指摘を無視しろ、\nということか？」
3062 = "「Ý cô là――bảo tôi phớt lờ lời phê bình của Olivy sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうじゃないです。走れない人に走れっていうのは、\nやっぱりちょっと、無神経だって思います」
3044 = "「Không phải vậy. Bảo người không chạy được chạy đi, quả thật có chút vô tâm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな」
2603 = "「Đúng thế nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だから、そんなことは言わないで。\nけど、双鉄くんには、そのまま走ってほしいんです」
2715 = "「Vì vậy, đừng nói những lời như thế. Nhưng tôi muốn cậu Soutetsu cứ tiếp tục chạy như vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ――左様ですね。\nそれこそが、まさしく双鉄さまのお姿ですね」
2417 = "「A――Đúng vậy ạ. Đó mới chính là hình bóng đích thực của ngài Soutetsu.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、ですねぇ」
2487 = "「Ufufu, đúng vậy nha~」"
# monologue
# JP: ハチロクとれいなはわかったようだが。\n僕にはわからん。
3376 = "Hachiroku và Reina có vẻ đã hiểu. Nhưng tôi thì không."
# 【双鉄】
# display as 雙鐵
# JP: 「僕が走れば――\n走れない者は置き去りになってしまうのではないのか？」
2689 = "「Nếu tôi chạy―― Chẳng phải những người không chạy được sẽ bị bỏ lại phía sau sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「一時的には、そうなりますよね。\nけど、そうなる方がいいんです、きっと」
2894 = "「Tạm thời thì sẽ như vậy. Nhưng chắc chắn như vậy sẽ tốt hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「何故だ」
2851 = "「Tại sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それぞれのやり方で、それぞれのペースで。\nついていきたい気持ちがあるなら、追いかけますから」
2506 = "「Bằng cách riêng của mỗi người, theo tốc độ của mỗi người. Nếu có ý muốn theo kịp, họ sẽ đuổi theo thôi.」"
# monologue
# JP: 言って、ポーレットは自身の顔を指差してみせる。
3812 = "Nói rồi, Paulette chỉ vào chính khuôn mặt mình."
# 【ポーレット】
# display as 波萊特
# JP: 「いままでだって、わたしたち。\nそんな感じで、ここまできたんじゃないですか」
2323 = "「Từ trước đến nay, chúng ta cũng vậy mà. Chẳng phải chúng ta đã đi đến tận đây theo cách đó sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2411 = "「啊——」" 
# monologue
# JP: ようやく、理解が腑に落ちる。\n同じペースで同じ線路を、皆が走る必要などない。
3635 = "Cuối cùng tôi cũng hiểu ra. Mọi người không cần phải chạy cùng một tốc độ trên cùng một đường ray."
# monologue
# JP: 僕が先行し試走して、出てきた問題を埋める者もいれば、\n後続列車を走らせる者も、ダイアを\\x%l編成;#00ffc040;編成%l;#;する者もいる。
3674 = "Tôi đi trước chạy thử, có người sẽ giải quyết những vấn đề phát sinh, có người sẽ điều khiển chuyến tàu phía sau, cũng có người sẽ \\x%l編成;#00ffc040;lập biểu đồ chạy tàu%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか……走れる者は、走ることこそが役割なのか」
2684 = "「Ra vậy......Với người có thể chạy, thì chạy mới chính là vai trò của họ sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だと思います。速くは走れないみんなにも、\n走れる人には果たせない、それぞれの役割があるように」
2682 = "「Tôi nghĩ là vậy. Giống như những người không thể chạy nhanh, cũng có những vai trò riêng mà người chạy nhanh không thể làm được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さすが、社長だなポーレットは」
2835 = "「Quả không hổ danh là giám đốc nhỉ, Paulette.」"
# monologue
# JP: 心の底から感心しての一言に、はにかみながら――\nポーレットはそれでもきっちり応えてくれる。
3540 = "Trước lời khen ngợi từ tận đáy lòng, dù hơi ngượng ngùng―― Paulette vẫn đáp lại một cách rõ ràng."
# 【ポーレット】
# display as 波萊特
# JP: 「社長で市長も三期目ですから！\n多分これ、わたしの役割ってやつなんですよ」
2230 = "「Tôi là giám đốc kiêm thị trưởng nhiệm kỳ thứ 3 rồi mà! Có lẽ đây chính là vai trò của tôi đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、本当に」
2456 = "「À, đúng thật.」"
# monologue
# JP: 頷きが記憶を呼び覚ます。
3811 = "Cái gật đầu đã đánh thức ký ức."
# monologue
# JP: 社長としての、ポーレット――\nその判断にまつわる一つの気がかりを。
3697 = "Paulette, với tư cách là giám đốc―― Một mối bận tâm liên quan đến quyết định của cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「そういえば、みかん鉄道で聞いてきたのだ」
2944 = "「Nhắc mới nhớ, tôi có nghe được chuyện này ở Đường sắt Mikan.」"
# 【ポーレット】
# display as 波萊特
# JP: 「み[てつ]鉄さんのこと？\nで、報告うけてないことですか？」
2806 = "「Chuyện bên Đường sắt Mikan sao? Và là chuyện tôi chưa được báo cáo à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、微妙な話題と感じていたので、\n言うタイミングを計っていた」
2449 = "「Ừ, vì tôi cảm thấy đây là một chủ đề nhạy cảm, nên vẫn đang canh thời điểm để nói.」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、お紅茶のおかわりいれますねぇ」
2863 = "「Reina đi pha thêm hồng trà nha~」"
# 【ハチロク】
# display as 八六
# JP: 「ああ、れいな。わたくしも手伝います」
2451 = "「A, Reina. Chị cũng phụ một tay.」"
# monologue
# JP: ハチロクとれいなが外してくれる。\nその気遣いに、ほっとする。
3378 = "Hachiroku và Reina đã chủ động tránh đi. Sự tinh tế đó khiến tôi thở phào nhẹ nhõm."
# monologue
# JP: あのふたりもまた、古い\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;には違いない。\nゆえ、あまり聞かせたい話でもない。
3809 = "Hai người họ cũng là những \\x%lレイルロオド;#00ffc040;Railord%l;#; đời cũ. Do đó, tôi cũng không muốn họ nghe chuyện này lắm."
# 【ポーレット】
# display as 波萊特
# JP: 「……難しいお話ですか？」
1753 = "「......Là chuyện khó nói sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィの寿命のことだ。\n毎年の[ぜんけん,1]全検が推奨されるような状態だそうだが」
2789 = "「Là về tuổi thọ của Olivy. Nghe nói tình trạng của cô ấy được khuyến cáo nên kiểm tra toàn diện hàng năm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。それは承知してます」
2784 = "「Vâng. Tôi biết chuyện đó.」"
# monologue
# JP: ポーレットは少しも動揺しない。
3703 = "Paulette không hề dao động chút nào."
# monologue
# JP: ならばその芯には――\n宗方さんが想像していた、“経営判断”があるのだろう。
3847 = "Vậy thì trong thâm tâm cô ấy―― Chắc hẳn đã có \"quyết định kinh doanh\" như anh Munakata tưởng tượng."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道の一員として、御一夜鉄道のまいてつとして、\nポーレットだけがその決断の責を負うべきとは思わん」
2960 = "「Với tư cách là một thành viên của Đường sắt Ohito, là chủ tàu của Đường sắt Ohito, tôi không nghĩ chỉ mình Paulette phải chịu trách nhiệm cho quyết định đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 2423 = "「啊」" 
# monologue
# JP: ポーレットの表情がわずかに崩れる。\n安堵、困惑、その両方が覗いた気がする。
3700 = "Biểu cảm của Paulette hơi biến sắc. Tôi có cảm giác cô ấy vừa nhẹ nhõm, vừa bối rối."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、聞かせてくれ。\nオリヴィが仮に機能停止をした場合――」
2710 = "「Vì vậy, hãy cho tôi biết. Giả sử Olivy ngừng hoạt động――」"
# monologue
# JP: （ガラガランっ！）
3898 = "（Cạch cạch!）"
# 【双鉄】
# display as 雙鐵＆波萊特
# JP: 「っ！！！？」\n「なにっ！？」
2439 = "「!!!?」 「Gì vậy!?」"
# 【れいな】
# display as 玲奈
# JP: 「どうしたんですかぁ！？」
2653 = "「Có chuyện gì vậy ạ!?」"
# 【ハチロク】
# display as 八六
# JP: 「大きな物音がいたしましたが」
2691 = "「Em nghe thấy tiếng động lớn ạ.」"
# monologue
# JP: キッチンではない――なら――っ！！？
3326 = "Không phải ở nhà bếp――vậy thì――!!?"
# monologue
# JP: （がらららららっ！）
3897 = "（Cạch cạch cạch!）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――」
# 2411 = "「啊——」" 
# monologue
# JP: レールショップの扉を開けば、\nそこにオリヴィが立ちすくんでいる。
3630 = "Mở cửa cửa hàng đường sắt ra, Olivy đang đứng chết trân ở đó."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ。差し入れを持ってきてくれたのか」
2775 = "「Olivy. Em mang đồ tiếp tế đến cho bọn anh à.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「お風呂あがって、ヒビキと帰って――それでオリヴィ、整備しようと思って、そしたら、明かり、ついてて」
2544 = "「Tắm xong, về cùng Hibiki――rồi Olivy, định đi bảo dưỡng, xong thấy đèn sáng, nên」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ありがとう」
3008 = "「Vậy sao, cảm ơn em.」"
# monologue
# JP: 足元に転がる缶を拾う。ひとつ、ふたつ。
3619 = "Nhặt những chiếc lon lăn lóc dưới chân. Một cái, hai cái."
# monologue
# JP: すぐそこの自販機で買ってくれたものなのだろう。\nよく冷えていて、拾う手のひらが心地良い。
3837 = "Chắc em ấy mua ở máy bán hàng tự động ngay kia. Lon nước lạnh buốt, nhặt lên mát rượi cả lòng bàn tay."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それで、オリヴィ――聞くつもりとか、全然なくて、\nだけど、聞こえて」
2859 = "「Nên là, Olivy――hoàn toàn không định nghe lén đâu, nhưng mà, lại nghe thấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2464 = "「嗯」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あの――オリヴィ……\nオリヴィ――機能停止って」
2948 = "「Cái đó――Olivy...... Olivy――ngừng hoạt động là sao」"
# monologue
# JP: 聞かれたのであれば誤魔化すまい。\nなるべく誤解を招かぬように、言葉を慎重に選び出す。
3660 = "Nếu đã bị nghe thấy thì không thể giấu giếm được nữa. Tôi cẩn thận lựa lời để cố gắng không gây hiểu lầm."
# 【双鉄】
# display as 雙鐵
# JP: 「架空の話だ。オリヴィがもし将来的に機能停止を\nしてしまったら、どうするつもりか確認しようと」
2676 = "「Là chuyện giả định thôi. Anh định xác nhận xem nếu trong tương lai Olivy ngừng hoạt động thì sẽ định làm thế nào.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ――」
# 2411 = "「啊——」" 
# monologue
# JP: オリヴィが半歩あとずさる。\nというか、力なくよろけてしまう。
3511 = "Olivy lùi lại nửa bước. Hay nói đúng hơn là loạng choạng ngã khụy xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か！？　オリヴィ」
2542 = "「Em không sao chứ!? Olivy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツにも、そー見えるの？」
3086 = "「Soutetsu cũng thấy vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2486 = "「嗯？」" 
# monologue
# JP: 見たことのない表情だ。\nはじめて出会った時より、ひどい――
3620 = "（Tôi chưa từng thấy cô ấy có biểu cảm như vậy. Còn đau đớn hơn cả lần đầu tiên chúng tôi gặp mặt——）"
# monologue
# JP: オリヴィの強さと明るさが、\nごっそり抜け落ちてしまってる。
3505 = "（Sự mạnh mẽ và lạc quan của Olivy, đã hoàn toàn biến mất.）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、壊れそうに――\nもういらないこに、ソーテツの目にも、見えるの？」
3026 = "「Ngay cả anh Soutetsu cũng thấy... Olivy sắp hỏng, không còn giá trị lợi dụng nữa sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
2229 = "「Không——」"
# monologue
# JP: だが、オリヴィも僕も落ち着いている。\n少なくとも、落ち着いて会話をしようと努力している。
3329 = "（Nhưng cả Olivy và tôi đều đang giữ bình tĩnh. Ít nhất là đang cố gắng bình tĩnh để nói chuyện.）"
# monologue
# JP: ならば、慌てる必要は無い。\n少しずつ、ゆっくり伝えていけばいい。
3850 = "（Nếu vậy thì không cần phải hoảng hốt. Cứ từ từ, chậm rãi giải thích cho cô ấy hiểu là được.）"
# 【双鉄】
# display as 雙鐵
# JP: 「誰も、そんなことは言っていないさ」
2677 = "「Không ai nói như vậy cả.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「言ってなくても、思ってるでしょ？\n思ってなくちゃ、壊れたあとのことなんて気にしないし」
2814 = "「Dù không nói ra, nhưng trong lòng anh nghĩ vậy đúng không? Nếu không nghĩ thế, thì sao lại bận tâm đến chuyện sau khi hỏng hóc chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――しかし、どの\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に対しても、\nどの車輌に対しても、備えておくべきことだろう」
2998 = "「Chuyện đó——Nhưng mà, bất kể là \\x%lレイルロオド;#00ffc040;Railord%l;#; nào, hay toa xe nào, cũng đều phải chuẩn bị cho chuyện đó mà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「――ハチロクに対しても？」
1718 = "「——Cả Hachiroku cũng vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
3023 = "「っ!?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ホンキのホンキで――ハチロクが機能停止したらって、\nソーテツ、ちゃんと考えてるの？」
2299 = "「Anh Soutetsu đã thực sự, thực sự nghiêm túc nghĩ đến chuyện... nếu Hachiroku ngừng hoạt động chưa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「考えてはいる、つもり、だが――」
2685 = "「Tôi có định nghĩ đến, nhưng——」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチロクが機能停止したあと。そのあとのこと、\n考えてそなえたり、ソーテツ、してるの？」
2315 = "「Sau khi Hachiroku ngừng hoạt động. Chuyện sau đó, anh Soutetsu đã suy nghĩ và chuẩn bị chưa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それ――は」
3005 = "「Chuyện đó——thì」"
# monologue
# JP: 答えようとして、言葉が出ない。\n思い知る――無理だ、それは出来ないことだと。
3625 = "（Định trả lời, nhưng không thốt nên lời. Tôi nhận ra——điều đó là không thể, tôi không thể làm được.）"
# monologue
# JP: ハチロクが稼働を停止したその後のことを――\n突き詰めきって想像するなど、とても、出来ない。
3383 = "（Chuyện sau khi Hachiroku ngừng hoạt động—— tôi hoàn toàn không thể nào tưởng tượng cặn kẽ được.）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「同じわけないよね？　自分がマスターの\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、\nカイシャの、ただの\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が」
2615 = "「Đâu có giống nhau đúng không? \\x%lレイルロオド;#00ffc040;Railord%l;#; có Master riêng, và \\x%lレイルロオド;#00ffc040;Railord%l;#; bình thường của công ty.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに……完全に同じではない。\nしかし、だからといってオリヴィのことを」
2879 = "「Đúng là... không hoàn toàn giống nhau. Nhưng, không có nghĩa là tôi coi thường Olivy...」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！！！」
2555 = "「Olivy!!!」"
# monologue
# JP: ハチロクが奥からすっ飛んでくる。
3368 = "（Hachiroku lao ra từ phía trong.）"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまは、そのような区別をする方ではございません。\nただ、今のお話は、ポーレット様の経営判断のご確認を」
3079 = "「Ngài Soutetsu không phải là người phân biệt đối xử như vậy đâu. Ban nãy ngài ấy chỉ đang xác nhận lại quyết định kinh doanh của cô Paulette thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けーえーはんだんっっ！！！」
2919 = "「Quyết định kinh doanh!!!」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！？」
# 2442 = "「啊！！？」" 
# monologue
# JP: 怒号で、悲鳴だ。
3668 = "（Là tiếng gầm lên, cũng là tiếng hét thảm thiết.）"
# monologue
# JP: 弾けたような――思って、繋がる。\nああ、これが“地雷を踏む”という現象なのかと。
3633 = "（Giống như có thứ gì đó vỡ tung——tôi nhận ra và xâu chuỗi lại. À, ra đây chính là hiện tượng \"đạp mìn\" sao.）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「いっつもそう！　ミノブでだって、ツルミでだって！\n――みかん鉄道は、きっとちがうって思ってたのにっ！」
2311 = "「Lúc nào cũng vậy! Ở Minobu cũng thế, ở Tsurumi cũng thế! ——Cứ tưởng Đường sắt Mikan sẽ khác, vậy mà!」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんっ？」
2559 = "「Olivy?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、[メリケン,2]冥国式だから――マスターがいないから！\nいらなくなったら、すぐにぽいって捨てられてっ！！」
2605 = "「Vì Olivy là kiểu Mỹ——vì không có Master! Nên hễ không cần nữa là lập tức bị vứt bỏ không thương tiếc!!」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！」
2550 = "「Olivy!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「Ｄｏｎ’ｔ　ｔｏｕｃｈ！！！！」
3106 = "「Don't touch!!!!」"
# monologue
# JP: 冥語の鋭い叫びとともに、\n差し伸べられたハチロクの手がはねのけられる。
3512 = "（Cùng với tiếng thét chói tai bằng tiếng Mỹ, cô ấy hất văng bàn tay đang chìa ra của Hachiroku.）"
# monologue
# JP: オリヴィは唇をぎゅっと結んで――\nその瞳から、大粒の涙をボロリと零す。
3509 = "（Olivy mím chặt môi—— từ khóe mắt, những giọt nước mắt to tướng lã chã tuôn rơi.）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……いいよね、ソーテツはお金持ちで、まいてつで。\nふつーの\\x%l機関士;#00ffc040;機関士%l;#;、まいてつになんて、なれないんだから」
1758 = "「......Thích thật đấy, anh Soutetsu vừa giàu có, vừa là chủ tàu. \\x%l機関士;#00ffc040;Lái tàu%l;#; bình thường, làm sao mà trở thành chủ tàu được chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2382 = "「っ!」"
# monologue
# JP: 走れる者と、走れない者。\nオリヴィに受けた指摘が、記憶の中から突き刺さる。
3823 = "（Kẻ chạy được, và kẻ không thể chạy. Lời chỉ trích của Olivy như đâm xuyên qua ký ức của tôi.）"
# monologue
# JP: 確かに、冥国式であろうとなんであろうと、マスターが\nⅨ号ごとオリヴィを買い取れるのなら、まいてつだ。
3740 = "（Quả thực, bất kể là kiểu Mỹ hay gì đi nữa, nếu Master có thể mua lại cả đầu máy số 9 lẫn Olivy, thì đó chính là chủ tàu.）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチロクはいいよね。オヒトヨでいらなくなっても、\nマスター――ソーテツと、一緒に別に移れるんだから」
2316 = "「Hachiroku thích thật đấy. Dù Ohitoyo không cần nữa, thì vẫn có thể cùng Master——cùng anh Soutetsu chuyển đi nơi khác mà.」"
# 【ハチロク】
# display as 八六
# JP: 「…………オリヴィ――ちゃん」
1733 = "「............Olivy」"
# monologue
# JP: ハチロクの手が、そろそろと、\nそれでもオリヴィに近づこうとする。
3369 = "（Bàn tay của Hachiroku, rụt rè, nhưng vẫn cố gắng tiến lại gần Olivy.）"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん――あなたは――あの\\x%l機関士;#00ffc040;機関士%l;#;さん……\nムナカタさんの、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に――」
2557 = "「Olivy——cậu——muốn trở thành \\x%lレイルロオド;#00ffc040;Railord%l;#; của vị \\x%l機関士;#00ffc040;lái tàu%l;#; đó...... của ngài Munakata sao——」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なりたいからなに？　なれっこないって知ってるし！\n同情なんて、ハチロクから絶対にされたくないしっ！」
2659 = "「Muốn thì sao chứ? Biết thừa là không thể nào rồi! Olivy tuyệt đối không cần Hachiroku thương hại đâu!」"
# 【ハチロク】
# display as 八六
# JP: 「あっ――」
# 2411 = "「啊——」" 
# monologue
# JP: 差し伸べようとしていた手が止まる。\nハチロクは何も話せなくなる。
3374 = "（Bàn tay đang chìa ra khựng lại. Hachiroku không nói được lời nào nữa.）"
# monologue
# JP: だが――ここで黙るのは、認めることだ。
3721 = "（Nhưng——nếu im lặng lúc này, thì chẳng khác nào thừa nhận.）"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ」
2540 = "「Olivy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！　ソーテツもハチロクとおんなじでしょ！？\nオリヴィたちのことなんて、わかるわけないっ」
2459 = "「っ! Anh Soutetsu cũng giống Hachiroku thôi! Làm sao mà hiểu được cảm giác của bọn Olivy chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、わかるなどとは言えない。\nオリヴィのことを、僕はまだ、ほとんど知らない」
2819 = "「Đúng là tôi không thể nói là mình hiểu được. Tôi vẫn chưa biết nhiều về Olivy.」"
# monologue
# JP: ――それでも、黙るわけにはいかない。
1667 = "（——Dù vậy, tôi cũng không thể im lặng.）"
# monologue
# JP: オリヴィが“恵まれなかった”\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、\n走れる僕らが、傲慢に認めてしまうわけにはいかない。
3602 = "（Những kẻ chạy được như chúng tôi, không thể kiêu ngạo thừa nhận rằng Olivy là một \\x%lレイルロオド;#00ffc040;Railord%l;#; \"không may mắn\".）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「みかん鉄道でもムナカタとずーっと組んで、安心できて。\nだから\\x%l入換;#00ffc040;入換%l;#;でだって、オリヴィ、楽しかったのに――」
2499 = "「Ở Đường sắt Mikan cũng được bắt cặp với Munakata suốt, thấy an tâm lắm. Nên dù chỉ làm công việc \\x%l入換;#00ffc040;dồn toa%l;#;, Olivy cũng thấy vui mà——」"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ」
# 2540 = "「奧莉薇」" 
# monologue
# JP: 僕らは単に恵まれて、\n誰かに環境を与えられ。結ばれたというわけではない。
3606 = "（Chúng tôi chỉ đơn thuần là may mắn, được ai đó ban cho môi trường. Chứ không phải là do duyên số.）"
# monologue
# JP: ぶつかり、くじけ、それでも走り、結ばれた。\n結ばれるため――ともに、あの橋を越えてきたのだ。
3607 = "（Chúng tôi đã va vấp, nản chí, nhưng vẫn tiếp tục chạy và đến được với nhau. Để đến được với nhau——chúng tôi đã cùng nhau vượt qua cây cầu đó.）"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ。おまえは――自分が毎年、\n全検を受けることを推奨される状態なのだと」
2539 = "「Olivy. Cô——có biết rằng tình trạng của mình hiện tại, được khuyến cáo là năm nào cũng phải kiểm tra toàn diện không?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「知ってる！　そんなの！！\nムナカタにだっていわれたもんっ！」
2236 = "「Biết chứ! Mấy chuyện đó!! Munakata cũng từng nói rồi mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば何故、その残り少ないかもしれぬ時間を。\n泣いて喚いて、無駄に使うのだ」
2757 = "「Vậy tại sao, khoảng thời gian có lẽ chẳng còn lại bao nhiêu đó. Cô lại lãng phí nó vào việc khóc lóc ỉ ôi chứ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！！？」
2267 = "「っ!!?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまっ！？　そのようなおっしゃり方」
3082 = "「Ngài Soutetsu!? Sao ngài lại nói như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「かばうなハチロク。\nオリヴィは、僕らよりずっと大人なのだぞ」
2313 = "「Đừng bênh vực, Hachiroku. Olivy người lớn hơn chúng ta nhiều đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「あっ――」
# 2411 = "「啊——」" 
# monologue
# JP: だから、話そう。\nきっと伝わると信じよう。
3649 = "（Vì vậy, hãy nói ra. Hãy tin rằng cô ấy chắc chắn sẽ hiểu.）"
# monologue
# JP: 冥国式という特性を覆し、ハチロクに賞賛されるに至った\nオリヴィという\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を、その克己心を信じよう。
3501 = "（Hãy tin vào một \\x%lレイルロオド;#00ffc040;Railord%l;#; tên Olivy, người đã vượt qua đặc tính kiểu Mỹ và được Hachiroku khen ngợi, tin vào tinh thần kiềm chế của cô ấy.）"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道では\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にも給与が支給される。\n[くまぎん,1]隈銀では、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の口座開設も受け付けてくれる」
2638 = "「Ở Đường sắt Ohito, \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng được trả lương. Ngân hàng Kumagin cũng chấp nhận mở tài khoản cho \\x%lレイルロオド;#00ffc040;Railord%l;#; nữa.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……だから、なに？」
1750 = "「......Thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まいてつになるためには金が必要で、\nお前には、その金を稼ぐ手段があるといっているのだ」
2663 = "「Để trở thành chủ tàu thì cần tiền, và tôi đang nói là cô có cách để kiếm số tiền đó.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なっ！！？」
3022 = "「Hả!!?」"
# monologue
# JP: オリヴィの目が見開かれる。\n口が、ぽかんと大きく開く。
3507 = "（Olivy trợn tròn mắt. Miệng há hốc.）"
# monologue
# JP: けれどもすぐに、その目を口を固く閉じ、\nオリヴィは強く、首を振る。
3725 = "（Nhưng ngay sau đó, cô ấy nhắm chặt mắt, ngậm chặt miệng, và lắc đầu nguầy nguậy.）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィのお給料でⅨ号買い取るのに何年かかるの？\n何百年でしょ！　そんなの間に合うわけないじゃない」
3092 = "「Dùng tiền lương của Olivy để mua lại đầu máy số 9 thì mất bao nhiêu năm chứ? Phải hàng trăm năm mất! Làm sao mà kịp được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、方法を変えればいい。宗方さんを説得し、\n給与を合算できるなら期間は半分に短縮できよう」
3054 = "「Vậy thì đổi cách khác. Nếu thuyết phục được anh Munakata, và gộp chung tiền lương lại thì thời gian sẽ rút ngắn đi một nửa.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなのっ！　そんなの――ムナカタ聞いてくれないし、\nもしもマンガイチできたとしたって、時間が全然っ」
3021 = "「Chuyện đó! Chuyện đó——Munakata sẽ không nghe đâu, mà lỡ như, lỡ như có làm được đi nữa, thì thời gian cũng hoàn toàn không kịp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「延ばせばいい」
3049 = "「Thì kéo dài ra là được.」"
# 【オリヴィ】
# display as ３人
# JP: 「へっ！？」\n「えっ！？」
2444 = "「Hả!?」 「Hả!?」"
# monologue
# JP: オリヴィと、ハチロクと、ポーレットまでが\n揃いも揃って、豆鉄砲を食らった鳩の顔になる。
3320 = "（Cả Olivy, Hachiroku, và cả Paulette đều đồng loạt trưng ra vẻ mặt ngơ ngác như chim bồ câu trúng đạn súng đậu.）"
# 【れいな】
# display as 玲奈
# JP: 「そんなこと、できるんですかぁ？」
3012 = "「Chuyện đó, có làm được không ạ?」"
# monologue
# JP: その前を、とことこ横切る言葉でもって、\nれいながのんびり、いつもの調子で尋ねてくれる。
3732 = "（Cắt ngang qua đó, là lời hỏi han thong thả, mang đúng điệu bộ thường ngày của Reina.）"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は知らん。\nだが、試しもしないうちから諦めるのは愚かしかろう」
2679 = "「Tôi không biết. Nhưng chưa thử mà đã bỏ cuộc thì thật ngốc nghếch.」"
# 【ハチロク】
# display as 八六
# JP: 「けれどっ、お言葉ですが双鉄さま。\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、消耗品で、保安部品でございます」
2372 = "「Nhưng mà, thứ lỗi cho em, thưa ngài Soutetsu. \\x%lレイルロオド;#00ffc040;Railord%l;#; là vật tư tiêu hao, là linh kiện bảo đảm an toàn ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ！　だから、えんめーなんてしないもんっ！\n悪くなったらこーかんするのがあたりまえだからっ」
2607 = "「Đúng vậy! Cho nên mới không có chuyện kéo dài tuổi thọ đâu! Hỏng thì thay mới là chuyện đương nhiên mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「大廃線で環境が激変し。\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が稀少となり。\nそれでも、ずっと消耗品扱いを続けるものか？」
2514 = "「Đại bãi bỏ các tuyến đường sắt đã làm môi trường thay đổi chóng mặt. \\x%lレイルロオド;#00ffc040;Railord%l;#; trở nên khan hiếm. Vậy mà vẫn tiếp tục coi họ là vật tư tiêu hao sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あああっ！！！」
2437 = "「Aaa!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。そうだ、その研究は、どこかで誰かが始めている\n――そうでなければ、おかしいくらいのことだろう」
2480 = "「Ừm. Đúng vậy, chắc chắn ở đâu đó đã có người bắt đầu nghiên cứu chuyện này rồi ——Nếu không thì thật vô lý.」"
# monologue
# JP: 列車のニコイチ。リニューアル。
3416 = "（Lắp ráp lại từ các bộ phận của nhiều đoàn tàu khác nhau. Làm mới.）"
# monologue
# JP: \\x%lレイルロオド;#00ffc040;レイルロオド%l;#;システム故に存在しなかったその発想を、\n僕らはこの世に産み出した。
3454 = "（Ý tưởng vốn không tồn tại vì hệ thống \\x%lレイルロオド;#00ffc040;Railord%l;#;, nay đã được chúng tôi hiện thực hóa trên thế giới này.）"
# 【双鉄】
# display as 雙鐵
# JP: 「“可変パッド”、だったか？　それも同じだ。\n大廃線ゆえ、消耗ゆえに生まれるものも、必ずあるのだ」
2322 = "「\"Đệm lót có thể điều chỉnh\" đúng không? Nó cũng giống vậy thôi. Chắc chắn sẽ có những thứ ra đời vì sự hao mòn do Đại bãi bỏ các tuyến đường sắt gây ra.」"
# 【ハチロク】
# display as 八六
# JP: 「誰かが、きっと、始めている。\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の……寿命を延ばす研究を――」
2622 = "「Chắc chắn, đã có ai đó bắt đầu rồi. Nghiên cứu... kéo dài tuổi thọ của \\x%lレイルロオド;#00ffc040;Railord%l;#;——」"
# monologue
# JP: ハチロクの声に、静かな希望がみちている。
3386 = "（Giọng nói của Hachiroku tràn ngập niềm hy vọng tĩnh lặng.）"
# monologue
# JP: ゆえに、気づく。\n気づかなかった自分自身を、バカかと思う。
3771 = "（Chính vì vậy, tôi mới nhận ra. Tôi thấy bản thân mình thật ngốc nghếch khi không nhận ra điều đó sớm hơn.）"
# monologue
# JP: （そうか――ハチロクの寿命も延びれば……\nそれだけ、チャンスも増えるのだ）
3904 = "（Ra vậy——nếu tuổi thọ của Hachiroku cũng được kéo dài... Thì cơ hội cũng sẽ tăng lên bấy nhiêu.）"
# monologue
# JP: こどもを引取り僕らで育てる、\nその可能性だけには留まらない。
3647 = "（Không chỉ dừng lại ở khả năng nhận nuôi và nuôi nấng một đứa trẻ.）"
# monologue
# JP: もしもこの先、革命的な技術革新があるのなら、\nあるいは、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と人とがこどもを――
3785 = "（Nếu trong tương lai có một cuộc cách mạng công nghệ đột phá, thì biết đâu, \\x%lレイルロオド;#00ffc040;Railord%l;#; và con người có thể——）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「できるの？　寿命――\nオリヴィ、ほんとにのばせるの？」
2549 = "「Làm được sao? Tuổi thọ—— Olivy, thực sự có thể kéo dài được sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、僕は信じる。もしもまだ、誰も研究していないなら、\nその研究をはじめるように、僕らが提唱すればいい」
2688 = "「Tôi tin là vậy. Nếu vẫn chưa có ai nghiên cứu, thì chúng ta cứ việc đề xướng để bắt đầu nghiên cứu đó là được.」"
# monologue
# JP: 必ず、そこに需要はある。\n確信するから、言い切れる。
3834 = "（Chắc chắn là có nhu cầu. Vì tin chắc như vậy, nên tôi mới dám khẳng định.）"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、反対も出てこよう。が、そうした意見も組み入れ、\nよりよい方向に、僕らは必ず進んでいける」
2872 = "「Tất nhiên là sẽ có ý kiến phản đối. Nhưng chúng ta sẽ tiếp thu những ý kiến đó, và chắc chắn sẽ tiến lên theo hướng tốt đẹp hơn.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あはっ」
2427 = "「A ha」"
# monologue
# JP: オリヴィが、笑う。
3508 = "（Olivy cười.）"
# monologue
# JP: いかにもな作り笑いを浮かべ、\nそっと、さりげなく涙をぬぐう。
3365 = "（Nở một nụ cười gượng gạo rõ rệt, rồi khẽ khàng, tự nhiên lau đi giọt nước mắt.）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あは……はっ、すっごい。すっごいねソーテツ！\nオリヴィが思ってたより――ずーっと、すっごい！」
2426 = "「A ha... ha, tuyệt quá. Anh Soutetsu tuyệt quá! Tuyệt hơn——những gì Olivy nghĩ rất nhiều!」"
# monologue
# JP: 作り笑いが、本物になる。
3522 = "（Nụ cười gượng gạo đã trở thành nụ cười thật sự.）"
# monologue
# JP: オリヴィの顔に、仕草に、\n強さと明るさが戻りはじめる。
3470 = "（Sự mạnh mẽ và lạc quan đang bắt đầu quay trở lại trên khuôn mặt và cử chỉ của Olivy.）"
# 【双鉄】
# display as 雙鐵
# JP: 「それほどでもない」
2406 = "「Cũng không đến mức đó đâu.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それほどだよー！　そんなオバカな、すっごいこと！\n今まで、誰も――ムナカタだって――そんな、ことっ」
2906 = "「Đến mức đó đấy! Một chuyện ngốc nghếch nhưng tuyệt vời như vậy! Từ trước đến nay, chưa một ai——kể cả Munakata——nghĩ đến chuyện đó cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2486 = "「嗯？」" 
# monologue
# JP: よほど感心してくれたのか、\nオリヴィの顔が真っ赤になってる。
3745 = "（Có lẽ vì quá cảm kích, mà khuôn mặt Olivy đỏ bừng lên.）"
# monologue
# JP: 息も弾んで……いささか、弾み過ぎてるようで――
3685 = "（Hơi thở cũng gấp gáp... có vẻ như, gấp gáp hơi quá đà——）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら――オリヴィも、ゆ、め――みちゃおう、かな。\nジュミョー、のば、して――おかね――ため、て――」
3037 = "「Vậy thì——Olivy, cũng, thử mơ——mơ mộng một chút, xem sao. Kéo, dài, tuổi thọ——rồi tiết kiệm——tiền——」"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ？」
# 2559 = "「奧莉薇？」" 
# monologue
# JP: 違う。おかしい。\n足元が小刻みに動き出してる。
3322 = "（Không đúng. Có gì đó kỳ lạ. Đôi chân cô ấy bắt đầu run rẩy lẩy bẩy.）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それ――で、ムナ、カタ――」
2858 = "「Sau——đó, Muna, kata——」"
# monologue
# JP: （ふらっ！）
3902 = "（Lảo đảo!）"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！？」
2556 = "「Olivy!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ！！！」
# 2555 = "「奧莉薇！！！」" 
# monologue
# JP: ハチロクとともに抱きとめ――っ！！？
3611 = "（Tôi cùng Hachiroku vội vàng đỡ lấy cô ấy——!!?）"
# 【双鉄】
# display as 雙鐵
# JP: 「熱っ！？　なんだこの熱はっ」
2570 = "「Nóng quá!? Nhiệt độ gì thế này!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ごめ……たまに、なる、の――興奮、する、と――\n水――かけて――水、かけた、ら――おちつ、く」
2738 = "「Xin... thỉnh thoảng, lại bị, thế này——khi, hưng phấn, quá—— Nước——dội——dội nước, vào——sẽ bình tĩnh, lại」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！　水だ！\nバケツにいっぱいの水を頼む！」
2836 = "「Paulette! Nước! Lấy cho tôi một xô nước đầy!」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、はい！　れいなっ！」
2566 = "「V-Vâng! Reina!」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！」
2568 = "「Vâng ạ!」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！　オリヴィちゃん！　しっかり！\n\\x%l共感;#00ffc040;共感%l;#;！　\\x%l共感;#00ffc040;共感%l;#;ひらいて！　オリヴィちゃん！！」
2551 = "「Olivy! Olivy! Tỉnh lại đi! \\x%l共感;#00ffc040;Cộng cảm%l;#;! Mở \\x%l共感;#00ffc040;cộng cảm%l;#; ra! Olivy!!」"
# monologue
# JP: ハチロクは僕より熱に強い。\n異常発熱したオリヴィを、それでも抱きかかえ支えている。
3396 = "（Hachiroku chịu nhiệt giỏi hơn tôi. Cô ấy vẫn ôm chặt và đỡ lấy Olivy đang phát nhiệt bất thường.）"
# 【れいな】
# display as 玲奈
# JP: 「おみず！　もってきましたぁ！」
2812 = "「Nước đây! Em mang đến rồi ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、ハチロク、オリヴィを」
2471 = "「Ừm, Hachiroku, Olivy.」"
# 【ハチロク】
# display as 八六
# JP: 「濡れる程度かまいません、このままっ」
2242 = "「Cứ dội đi ạ, em ướt cũng không sao đâu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった！」
2575 = "「Được rồi!」"
# monologue
# JP: （ざばあっ！！！）
3899 = "（Ào ào!!!）"
# monologue
# JP: ハチロクの同意が、僕の背中を押してくれる。
3394 = "（Sự đồng ý của Hachiroku đã tiếp thêm sức mạnh cho tôi.）"
# monologue
# JP: 何度もあったという急変に、オリヴィが示した対処法なら、\nそれが最善と信じられる。
3658 = "（Nếu đây là cách xử lý do chính Olivy chỉ ra cho sự cố đột ngột đã xảy ra nhiều lần, thì tôi tin đó là cách tốt nhất.）"
# 【ポーレット】
# display as 波萊特
# JP: 「おまたせしましたっ！」
2257 = "「Xin lỗi đã để mọi người đợi lâu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
# 2465 = "「嗯！」" 
# monologue
# JP: （ざばあっ！！！）
# 3899 = "（嘩啦！！！）" 
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 2411 = "「啊——」" 
# monologue
# JP: もうもうたる湯気の向こうで、\nオリヴィがうっすら瞳を開く。
3833 = "（Phía sau làn hơi nước mù mịt, Olivy hé mở đôi mắt.）"
# monologue
# JP: 暴力的なまでに単純な手段ではあるが、\n確かに効果があるらしい。
3870 = "（Tuy là một phương pháp đơn giản đến mức thô bạo, nhưng có vẻ như nó thực sự mang lại hiệu quả.）"
# 【ポーレット】
# display as 波萊特
# JP: 「登呂流湯さん、すぐ電話します！！」
2700 = "「Tôi sẽ gọi điện cho nhà tắm Tororyu-yu ngay!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、運んだ方が早い。ナビっ！！」
2254 = "「Không, chở đi sẽ nhanh hơn. Navi!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「レールの上！　下りてもらって大丈夫です！」
3072 = "「Trên đường ray! Cứ hạ cánh xuống đó là được!」"
# 【双鉄】
# display as 雙鐵
# JP: 「助かる。いくぞ、オリヴィ。\nハチロクもついてきてくれ」
2949 = "「Giúp tôi nhiều lắm. Đi thôi, Olivy. Hachiroku cũng đi theo tôi nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「もちろんです。ね？　オリヴィちゃん、大丈夫。\nもうすぐ、すぐに、技師の先生のところにつきますから」
2927 = "「Tất nhiên rồi ạ. Thấy chưa? Olivy, không sao đâu. Sắp, sắp đến chỗ thầy kỹ sư rồi.」"
# monologue
# JP: 抱き上げ、驚く。\n体はいまだにかなり熱く――そうして、軽い。
3628 = "（Bế cô ấy lên, tôi giật mình. Cơ thể cô ấy vẫn còn khá nóng——và, rất nhẹ.）"
# monologue
# JP: （これほど小さく軽い体で――百年を）
3901 = "（Với cơ thể nhỏ bé và nhẹ bẫng này——mà đã sống suốt một trăm năm sao.）"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま、参りましょう」
3083 = "「Ngài Soutetsu, chúng ta đi thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2464 = "「嗯」" 
# monologue
# JP: 助けたい。\nただそれだけで、僕の全てが埋め尽くされる。
3646 = "（Muốn cứu cô ấy. Chỉ ý nghĩ đó thôi đã choán lấy toàn bộ tâm trí tôi.）"
# monologue
# JP: この手の中にかかえているのは命なのだと、そう思う。
3617 = "（Tôi nghĩ, thứ mình đang ôm trong vòng tay này chính là một sinh mệnh.）"
# monologue
# JP: （ずしっ）
3893 = "（Trĩu xuống）"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
# 2388 = "「咦？」" 
# monologue
# JP: 思った瞬間、重くなる。\nまるでこどもが、いきなり熟睡するように――
3758 = "（Ngay khoảnh khắc ý nghĩ đó lóe lên, cơ thể cô ấy bỗng trở nên nặng trĩu. Giống hệt như một đứa trẻ đột nhiên ngủ thiếp đi——）"
# monologue
# JP: 手の中はまだ熱いというのに、\nひやりと、なにか――冷たいものが背筋をよぎる。
3582 = "（Mặc dù trong vòng tay vẫn còn nóng hổi, nhưng một cảm giác ớn lạnh——lạnh toát chạy dọc sống lưng tôi.）"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
3084 = "「Ngài Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2464 = "「嗯」" 
# monologue
# JP: ゆえ、駆ける。寝たのだとしても、そうでなくても、\n今僕にできることはただひとつ。
3605 = "（Vì vậy, tôi chạy. Dù cô ấy có ngủ thiếp đi hay không, điều duy nhất tôi có thể làm lúc này chỉ có một.）"
# monologue
# JP: ――登呂流湯さんに一刻も早く連れて行く。\nただそれだけしか無いのだから。
1671 = "（——Đưa cô ấy đến nhà tắm Tororyu-yu càng sớm càng tốt. Chỉ có cách đó thôi.）"
