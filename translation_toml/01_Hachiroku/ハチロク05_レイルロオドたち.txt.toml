2719 = "「所以說，\\x%l機関士;#00ffc040;司機%l;#;不同會有什麼問題嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ、そうでした」
2448 = "「啊，剛說到一半」" 

# monologue
# JP: ごくさりげなく、れいなが話を戻してくれる。\n幼いようで、ひどく大人で。
3728 = "玲奈不著痕跡地把話題拉了回來。說來她也一樣是外表稚嫩內心成熟的鐵路人偶啊。" 

# monologue
# JP: ……外観と内面が一致しないということに、れいなを通じ、\n僕らは慣れ親しんでいるように思えるのだが。
1702 = "……我還以為我們與玲奈相處了這麼久，應該已經習慣了這種外表與內在的落差，可似乎並不盡然。" 

# 【ハチロク】
# display as 八六
