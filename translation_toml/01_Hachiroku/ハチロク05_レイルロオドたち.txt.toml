[script]
# lines: 605 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほんとに！？　ムナカタとおはなししてきたのっ！？」
2890 = "「真的嗎！？你們和宗方聊過了！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2464 = "「嗯」" 

# monologue
# JP: 満面の――ああ、なんという笑顔だろう。
3444 = "啊，奧莉薇臉上的笑容這是何等燦爛。" 

# monologue
# JP: 予想以上の食いつきに、内心、かなりホっとする。\nオリヴィとより打ち解けるための、よい契機となりそうだ。
3747 = "看她這更甚於我預期的喜悅，我心裡也著實大大地鬆了一口氣。這看來會成為和奧莉薇消除隔閡的好機會。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あの、さ。ソーテツ。\nムナカタ……その――えっと」
3006 = "「這個，雙鐵啊。宗方……他……唔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　遠慮せずなんでも聞いてくれ」
2654 = "「怎麼啦？別客氣儘管說吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタ……えっと……なんか――その――Ⅸ号のこと、\nとか――オリヴィのこと――なんか言ってた？」
2590 = "「宗方……他……有沒有——就是——說到過，九號啊，或者說奧莉薇啊，什麼的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『本線を走らせてやって欲しい』と、言っていた。\nⅨ号のことも、オリヴィのことも」
2279 = "「他對我們說了“請讓它們在幹線上馳騁”。這話說的是九號和奧莉薇一起哦」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Ａｍａｚｉｎｇ！！！」
3104 = "「Ａｍａｚｉｎｇ！！！」" 

# monologue
# JP: ……僕が一瞬びくりとするほど、強い喜び感情の発露。\nが、ハチロクのいる台所からは、何の反応もかえらない。
3527 = "她這突然爆發出的喜悅之情，當真嚇了我一跳。但在廚房那邊的八六卻並沒有任何反應。" 

# monologue
# JP: ならばやはり今も、オリヴィとハチロクとの間には、\n少なくとも感情の\x%l共感;#00ffc040;共感%l;#;は通じ合っていないのだろう。
3528 = "如此看來，奧莉薇和八六之間，至少是沒有進行感情層面的\\x%l共感;#00ffc040;共鳴%l;#;吧。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「他には！？　他にはなんてっ」
3033 = "「還有嗎！？還說了什麼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「他に、か。\nああ、環境のこともいっていたな」
3032 = "「還有啊……哦，也說到了環境的問題」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「かんきょー？」
2870 = "「環境？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。御一夜にはレイルロオド技師もいるし、\n術仙には車両工場もあるゆえ――」
2473 = "「嗯，因為御一夜這裡有鐵路人偶技工，術仙那邊還有車輛工廠——」" 

# monologue
# JP: そこまで言ってしまって、気づく。\nこれは微妙な話題であるかもしれん。
3808 = "話說到這裡我突然意識到，這些話題或許並不適合告訴她。" 

# monologue
# JP: ……寿命のことは、軽々に触れるべきではないだろう。
3735 = "畢竟——壽命的問題，還是不要輕率提及為好。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その――\nよい環境だと、宗方さんはおっしゃっていた」
2704 = "「所以——宗方先生說這邊還是個不錯的環境」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「よいカンキョーかー」
2245 = "「不錯的環境啊」" 

# monologue
# JP: オリヴィは満面の笑顔のままで、あたりを見回す。
3502 = "奧莉薇帶著滿臉的笑容環視四周。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「確かに、ムナカタのゆーとーりかも！\nなによりお水ちょーおいしいし！　石炭も上質だし！」
2702 = "「或許宗方說得沒錯！這邊的水那是真好喝！煤炭也很讚！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばよかった」
2293 = "「你喜歡就好」" 

# monologue
# JP: 無理やりまとめた言葉をしかし、\nオリヴィは前向きに受け取ってくれたようだ。
3498 = "奧莉薇似乎把我強行搪塞的話朝積極的方向理解了。" 

# monologue
# JP: ならば、今は深入りせずにこのまま――
3851 = "那目前便不應再深入，先到此為止——" 

# 【ハチロク】
# display as ？？？
# JP: 「Ⅸ号機関車の、\nわたくしからのチェック、完了いたしました」
2259 = "「九號機車的檢查，我已經做完了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
2405 = "「哦！？」" 

# monologue
# JP: ハチロクの声で我に返る。\nどうやらしばし、思い出に囚われてたいたようだ。
3387 = "八六的話語把我拉回了現實。看來剛才我是想得出神了。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？　いかがされました？」
3085 = "「雙鐵少爺？您還好吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、何ほどのこともない。\nただ――少しぼんやりしてしまっただけだ」
2476 = "「嗯，我很好，沒事。只是——稍微有點走神了」" 

# monologue
# JP: 我ながら珍しいことと首を傾げればその途端、\n原因が、視界の中で大きく動く。
3543 = "就在我為自己少有的心不在焉而感到疑惑並歪起腦袋時，那讓我失常的根源就活蹦亂跳地衝進了視野。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「どーよハチロク！\nオリヴィせんせーの点検整備は」
2649 = "「怎——麼樣八六！奧莉薇老師的清查整備做得不錯吧」" 

# monologue
# JP: ――満面の、笑顔。\nそうとしか表現できないほどの眩しさ。
3510 = "奧莉薇臉上掛著滿滿的笑容。那笑容簡直耀眼到無以復加。" 

# monologue
# JP: （ああ、そうか、この笑顔で思い出したのか）
3896 = "（啊，是這樣啊，我就是看著這笑容才聯想得出神了吧）" 

# monologue
# JP: 宗方さんとの対話を伝えた――ただそれだけのことと、\n二ヶ月かけた検修を終えての、Ⅸ号の本線試験走行と。
3313 = "一方面，是我把宗方的話轉告給了她，另一方面是歷經兩個月的檢修之後，九號即將在幹線上進行試運營。" 

# monologue
# JP: オリヴィの中での価値は、ともに“最上”であることを、\n表情が、なにより雄弁に物語っている。
3335 = "二者在奧莉薇心中都具備至高無上的價值。她現在的表情，便是無可辯駁的佐證。" 

# 【ハチロク】
# display as 八六
# JP: 「精緻。その一言を思いました。\nきめ細やかで、行き届いていて、見落としがない」
2225 = "「一言以蔽之，便是“精緻”。巨細無遺，細緻入微，無微不至」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこまでか」
3070 = "「那麼厲害嗎」" 

# monologue
# JP: ハチロクの前に僕も主要部は点検したが、\n『しっかりしている』と、安心をした程度だった。
3458 = "在八六之前，我也已經清查過主要的部位，不過就是覺得“做得很認真”，讓我很放心的程度而已。" 

# monologue
# JP: ハチロクがここまで絶賛するとは――\n今の僕にはまだ見えぬ領域が、この先遥かにあるのだろう。
3341 = "但八六竟如此盛讚——恐怕這程度已經到了遠超如今的我所能理解的領域了吧。" 

# 【ハチロク】
# display as 八六
# JP: 「付け焼き刃でできることではございません。\n普段からの、不断の積み重ねがあっての美しさです」
3066 = "「那絕非朝夕之功，必是歷經年月日積月累方能造就之美」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そりゃそーだよ！\nじゃなきゃ百年、走れないって！」
3061 = "「那是自然呀！不然哪開得了一百多年呢！」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。まことにそのように感じました。オリヴィさん、オリヴィ先輩、オリヴィ先生とお呼びするべきと」
2880 = "「的確。我也是打心裡覺得，應該以奧莉薇女士、奧莉薇前輩、奧莉薇老師來稱呼你才對」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2384 = "「呵」" 

# monologue
# JP: これは思わぬ功名だ。凪さえ気にするほどに顕著であった、\nハチロクのオリヴィへのこども扱い。
3836 = "這可真是不得了。當初八六把奧莉薇當小孩子對待的程度可是連凪都注意到了的。" 

# monologue
# JP: 確かに最近、改善いちじるしくはあったが――\n仕事を見せる。それが、なによりの特効薬となりそうだ。
3330 = "不過最近倒是的的確確大有改善——看來在工作上大顯身手便是無與倫比的特效藥了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「別にいーよ？　オリヴィちゃんでも。\nそこんとこわかってくれてるなら、だいじょーぶ！」
3046 = "「那倒是無所謂，就叫奧莉薇也沒什麼不好。態度端正了就沒問題啦！」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふ、ありがとうございます。オリヴィちゃん」
2489 = "「嘻嘻，那就多謝了。奧莉薇」" 

# monologue
# JP: ほっとしたように微笑して。\nハチロクはすぐ、その表情を引き締め直す。
3393 = "八六臉上現出了放心的微笑。不過一轉眼，她就又嚴肅了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「湯医線での試験走行にも期待しています。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィ」
2796 = "「期待你在湯醫線行駛測試的成果。\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;奧莉薇」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「了解しました！　ハチロク[きょうどう,1]教導\x%lレイルロオド;#00ffc040;レイルロオド%l;#;！\nミギタソーテツ教導\x%l機関士;#00ffc040;機関士%l;#;！」
2576 = "「好的！八六教練\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;！右田雙鐵教練\\x%l機関士;#00ffc040;司機%l;#;！」" 

# monologue
# JP: 新人のように元気な返事と、ピシっと整いきった敬礼。\n百年選手であるのになんとも、初々しくて愛らしい。
3524 = "她的答覆就像新人一般生機勃勃，敬禮也一絲不苟。雖已是歷經百年磨練的老手，這股初生牛犢的勁頭卻著實惹人憐愛。" 

# monologue
# JP: 答礼をする背筋も伸びるが――\n勝手にほころびようとする頬を抑えるにも苦労する。
3835 = "這也令我在行禮回應時不禁將腰桿挺得筆直，同時我還得強忍著笑容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「で？　今日の\x%l機関士;#00ffc040;機関士%l;#;はどちらに決まったのだ？」
3039 = "「那你想好今天由誰來做\\x%l機関士;#00ffc040;司機%l;#;了嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、それね。\nそれなんだけど、御一夜鉄道ってかわってるよねー」
2455 = "「啊，這個呀。要說這件事啊，你們御一夜鐵路好奇怪哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2486 = "「嗯？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヒビキとナギの話し合いじゃ決まらなかったから\nオリヴィが決めていーって！」
2943 = "「說什麼光讓日日姬和凪商量定不下來，所以讓奧莉薇來決定！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。で、どちらにするのだ？」
2786 = "「是說這個啊。那你選了誰呢？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「って、ソーテツもおどろかないんだ！！\n逆にオリヴィがおどろいちゃうよ！」
2852 = "「為什麼雙鐵也一點都不吃驚啊！把奧莉薇都搞得吃驚得不行啦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「驚く……\nような要素が、今の会話のどこかにあったか？」
2379 = "「吃驚……剛才說的話有什麼好吃驚的嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、その――」
2782 = "「是的，就是——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィたち！　\x%lレイルロオド;#00ffc040;レイルロオド%l;#;！\nソーテツたち、人間！！」
2553 = "「奧莉薇！是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;！雙鐵你們是人類！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
2429 = "「啊！」" 

# monologue
# JP: なるほど、確かに言われてみれば、だ。\nハチロクも、どこか申し訳なさそうに頷いている。
3428 = "原來如此，聽她這麼一說就不難理解了。八六也有些內疚地點著頭。" 

# monologue
# JP: が――
3437 = "可是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、同じ職場の仲間とみればおかしくなかろう。\nⅨ号機関車のことを最も熟知しているのは、オリヴィだ」
2374 = "「可是，以公司同事的角度來看就沒有問題了吧。畢竟最熟悉九號機車的就是奧莉薇了啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「！」
2404 = "「哦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どのみち、どちらの\x%l機関士;#00ffc040;機関士%l;#;でも試験運転は行うのだし、\n初回の組をオリヴィに任せるという判断は、ありだろう」
2239 = "「不管怎麼說，她們兩個總歸都是要進行試運營的，第一次由誰來操作交給奧莉薇來判斷，這也合情合理吧」" 

# monologue
# JP: 何に驚かせてしまったのか、\n固まっていたオリヴィの顔が、ゆるゆる笑顔に解けていく。
3867 = "雖然我不知道讓她驚訝的是哪一點，但她驚愕的面孔漸漸恢復了笑容。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありなんだー。すごいねー。\nシャチョーとおんなじこと言ってるよー」
2886 = "「真的可以交給奧莉薇呀，好厲害。竟然和社長說的一模一樣」" 

# 【ハチロク】
# display as 八六
# JP: 「ポーレット様も、確かにそうおっしゃいましょうね。\n御一夜鉄道の社風の源は、ポーレット様ですから」
2834 = "「波萊特大人確實是會這樣說的。畢竟御一夜鐵路的社風都是受波萊特大人的薰陶而來」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「へー、そうなんだー」
2387 = "「咦，是這樣啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの了承も得られているなら話は早い。\n決めてしまってくれ。無論、もしも決めづらいなら僕が」
2755 = "「既然波萊特也同意了那就好說了。那就儘快決定吧。當然，實在定不下來的話就由我來指定了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わー！　待って待って待って！　100年稼働してて\nはじめてのケーケンなんだから、オリヴィ決めたい！」 
2397 = "「哇！等一下等一下等一下！在鐵路上工作了一百多年還是頭一次有這樣的機會，奧莉薇要選！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
3047 = "「那好呀」" 

# monologue
# JP: オリヴィはやおら腕をくみ、\n眉根を顰めて考えはじめる。
3497 = "奧莉薇不緊不慢地把雙臂抱在胸前，眉頭緊鎖思考了起來。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヒビキはてーねーでやさしーよね。あと、目がいい！\nオリヴィが見えないものまで見えるから、凄いって思う」
2762 = "「日日姬細心又溫柔。還有眼光也不錯！有時連奧莉薇沒注意到的地方都能注意到，很厲害」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2464 = "「嗯」" 

# monologue
# JP: なかなか的確な人物評だ。
3435 = "可以說是很中肯的評判了。" 

# monologue
# JP: ほんの一週間ほどとはいえど、右田の家でも職場でも、\n密度ある時間をともにすごしている効果であろう。
3871 = "雖說只過去短短一個星期的時間，但不管是在右田家還是公司，她們這樣幾乎形影不離地相處看來還是頗有效果。" 

# monologue
# JP: （ならば――凪は不利かな）
3911 = "（這樣的話——對凪可能就頗為不利了）" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ナギはせっかちだけどセンスいいから、物覚え速そう！\n体力も抜群だし、一瞬だけなら集中力もヒビキ以上かも」
2325 = "「凪雖然毛毛躁躁的但是天份很好，東西也學得快！體力也很厲害，瞬間的注意力或許比日日姬更強」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2492 = "「噢？」" 

# monologue
# JP: これまた的を射ている気がして驚かされる。\n凪との接触時間など、かなり限られたものであろうに――
3839 = "這邊的評論也頗得要點，相當出乎我的意料。要說她和凪接觸的時間，那真是十分有限——" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、凪の剣術修行につきあってやりでもしたのか？\nあるいは、一緒に遊びにいったとか」
2914 = "「等等，你是陪凪去做過劍術練習了嗎？還是說和她一起去玩了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ケンジュツシュギョー？　なぁにそれ？\nオリヴィそんなの知らないし、遊びにもいかないよ？」
2333 = "「劍術練習？那是什麼？奧莉薇不明白你說的是什麼，也沒和她去玩啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　ではなぜ、そこまで細かに凪のことを」
2891 = "「真的嗎？那你怎麼對凪了解得那麼清楚」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなの！　一緒に線路あるけばわかるし！\nまる一日がかりだもーん」
3015 = "「這還用問嗎！一起沿著線路走一趟不就都知道了！那次可是走了一整天呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうか、徒歩での線見でか」
2436 = "「啊！是那天去徒步踏查啊」" 

# monologue
# JP: 感心したのに、オリヴィはぷぅと膨れてしまう。
3632 = "我的感慨卻似乎惹得奧莉薇有些不開心，小臉蛋氣得鼓鼓的。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「え～？　ソーテツがやっとけっていったのに、\n忘れてるとか！　それってちょっとヒドくない？」
2401 = "「哎？明明是雙鐵說要去的怎麼你自己還忘了！這可有點過分了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにそれは面目ないな。申し訳ない」
2294 = "「你說的沒錯，確實是我不好。抱歉」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほえっ！？」
2399 = "「哈唉！？」" 

# monologue
# JP: 頭を下げれば、何故かあわてる。
3599 = "我低頭鞠躬，奧莉薇卻不知為何突然慌亂起來。" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;の表情が、\nこれほどくるくる変わるものとは思わなかった。
3621 = "我從沒想到過，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的表情竟能如此多變。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じょーだんだから！　ただのじょーだん！！\nムナカタとお話したら、他のこと忘れちゃうのわかるし」
3074 = "「開玩笑啦！只是開玩笑的啦！！知道你們是光顧著和宗方聊的事情就沒想著其他的啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2464 = "「嗯」" 

# monologue
# JP: ……確かに、帰途でもハチロクとずっと話し込んでいた。
1705 = "……這話不假，回來的路上我和八六也是討論了一路。" 

# monologue
# JP: オリヴィは、毎年の全検が必要な程――\nそれ程に、老朽化著しい\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なのだということを。
3499 = "奧莉薇作為\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，已經老化到了需要每年進行全面檢查的程度。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それに、線路歩けたのもよかったし！　楽しかったし！\nオヒトヨ鉄道に\x%l保線;#00ffc040;保線%l;#;の専門家いないのもわかったし」
2922 = "「而且沿線路走過一次很有收穫！當然也很開心！也了解到御一夜鐵路這裡沒有\\x%l保線;#00ffc040;巡線%l;#;方面的專家」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
3101 = "「！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あと、フカミ？　\nあのこもけっこー適正あるなって思ったよ？」
3034 = "「還有那個叫……深美？奧莉薇覺得那孩子的素質也挺不錯的哦？」" 

# 【ハチロク】
# display as 八六
# JP: 「ふかみ様、ですか？」
2785 = "「是說深美小姐嗎？」" 

# monologue
# JP: \x%l保線;#00ffc040;保線%l;#;の話が気になるが、\nハチロクがより気にする話がふかみであるなら――
3868 = "雖然我更在意\\x%l保線;#00ffc040;巡線%l;#;的問題，但既然八六對深美更在意的話，那也不妨順著她——" 

# monologue
# JP: ああ、いや、そうか。緊急や安全に関わるような話なら、\nオリヴィは、その時点で当然に報告をあげている筈だ。
3446 = "啊，慢著，我懂了。如果是緊急情況或者事關安全的話，奧莉薇想必當場就會說出來了。" 

# 【ハチロク】
# display as 八六
# JP: 「ふかみ様がどのような理由で、\n湯医線の線見にご同行されたのでしょうか？」
2839 = "「深美小姐她，為什麼會和你們一起去進行湯醫線踏查呢？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「え？　そりゃ\x%l車掌;#00ffc040;車掌%l;#;見習いとしてでしょ？」
2391 = "「咦？那當然是因為學習做\\x%l車掌;#00ffc040;列車長%l;#;的需要囉？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l車掌;#00ffc040;車掌%l;#;」
1714 = "「\\x%l車掌;#00ffc040;列車長%l;#;」" 

# 【ハチロク】
# display as 八六
# JP: 「見習い？」
2589 = "「學習？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「って！　まだナイショだったんだー！！」
2918 = "「糟了！這個還要保密的的呀！！」" 

# monologue
# JP: オリヴィは頭を抱えてしまう。\nしかし――これは聞かねばなるまい。
3513 = "奧莉薇邊說邊懊惱地抱住了頭。不過，這話我可不能當作耳邊風。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみが\x%l車掌;#00ffc040;車掌%l;#;見習いとは――\nそして、僕らに内緒とはどういうことだ？」
2842 = "「深美要學習做\\x%l車掌;#00ffc040;列車長%l;#;這是怎麼回事——還有為什麼要對我們保密呢？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あうあぅ～――あのね？　フカミね？\nナギたちがうらやましくなったんだって」
2428 = "「啊嗚啊嗚～這個呀，深美她說哦，有點羨慕凪還有你們了」" 

# monologue
# JP: ……御一夜の観光復権は、確かに周辺と比してしまえば\n遅れ気味。とはいえ、実際は極めて堅調だ。
3555 = "御一夜旅遊業的復興與周邊地區相比確實是稍顯落後。但與以往相比，其實還是有了長足的進步。" 

# monologue
# JP: クマ川くだりの復調に、ふかみの母・翠さんのご快癒に、\n船頭さんたちの復帰もあり、ふかみには余裕が出てきた。
3859 = "隈河漂流經營狀況好轉，深美的母親翠小姐也已痊癒，同時隨著很多掌棹回歸崗位，深美就有了空閒。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それで、見習いの見習いとして、\x%l車掌;#00ffc040;車掌%l;#;の勉強、\nヒビキとシャチョーに習ってこっそりはじめてたって」
2730 = "「所以，就悄悄地跟著日日姬和社長開始熟悉、學習如何擔任\\x%l車掌;#00ffc040;列車長%l;#;了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほほう」
2491 = "「噢噢」" 

# monologue
# JP: 凪の性格で隠し事はむつかしかろうし、\nふかみと凪には、親友同士ゆえのライバル心もあるようだ。
3340 = "以凪那個性格怕是根本藏不住事，而且深美和凪雖是摯友，卻似乎也還是有著小小的競爭之心的。" 

# monologue
# JP: 凪に内緒にしておいたのは、まぁ納得のできるところだ。\nが――
3323 = "不想讓凪知道這我倒不是不能理解。不過——" 

# 【ハチロク】
# display as 八六
# JP: 「とても素敵なお話だと思います。\nけれど……なぜ、わたくしたちに内緒で？」
2692 = "「我覺得這是件大好事啊。但是……為什麼要對我們也保密呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もそこを疑問に思った。というか、\n実戦形式で訓練した方が成長もよほど早かろう」
2667 = "「我也對此頗有疑問。而且話說回來，實習訓練的進步速度遠比單純的學習更快吧」" 

# 【ハチロク】
# display as 八六
# JP: 「で、ございますよね。実際、たとえ見習いであろうと、\n\x%l車掌;#00ffc040;車掌%l;#;はぜひとも確保したいところですし」
3080 = "「雙鐵少爺所言極是。況且現在對於我們而言，哪怕是見習\\x%l車掌;#00ffc040;列車長%l;#;也是求之不得的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2817 = "「沒錯」" 

# monologue
# JP: オリヴィが来るまでの時間に、\n御一夜鉄道でも求人をかける計画はあった。
3461 = "在奧莉薇來之前，御一夜鐵路其實也在規劃著進行招聘。" 

# monologue
# JP: が、予想外に早くオリヴィが来た混乱もあり、\nその求人も、ようやく先日出せたばかりだ。
3344 = "但奧莉薇提前到來打亂了原本的計劃，那招聘啟事也才在前兩天剛剛發出去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l機関士;#00ffc040;機関士%l;#;周りは赤井宮司にヘルプを頼めるとしても、\n\x%l車掌;#00ffc040;車掌%l;#;の方は……永山夫人も未経験だしな」
2609 = "「就算\\x%l機関士;#00ffc040;司機%l;#;方面可以找赤井宮司幫忙想辦法，但\\x%l車掌;#00ffc040;列車長%l;#;就……永山夫人也沒有這方面的經驗」" 

# 【ハチロク】
# display as 八六
# JP: 「もちろん理想は経験者ですが――ふかみ様でしたら、\n比較的早期に、実際の乗務につけますことかと」
2791 = "「最理想的當然是能招到有經驗的人——但若是深美小姐的話，儘早開始乘務實習也未嘗不可」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だよな」
2365 = "「可不是」" 

# monologue
# JP: ふかみはまだまだ若い上、完全に御一夜密着だ。\n無論、クマ川下りとの兼務にはなろうが……
3706 = "深美不光年紀尚輕，還對御一夜了如指掌。當然，隈河漂流那邊也需要她兼顧。不過……" 

# monologue
# JP: そこを踏まえても、将来的な御一夜鉄道――というか、\n御一夜を支える柱のひとつに、育っていってくれそうだ。
3790 = "若能處理好這個問題，將來的發展大有可期。說不定會成為御一夜鐵路——或者說整個御一夜的頂樑柱之一。" 

# 【双鉄】
# display as 雙鐵
# JP: 「もしもふかみが望むなら、今日からだって――\nああ、そうだ、電話を」
2584 = "「如果說深美有這想法的話，馬上開始都沒有問題。啊，對，打個電話吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「やめてあげて！」
2240 = "「不要啦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
2385 = "「咦！？」" 

# monologue
# JP: 思いもかけぬ強い口調に顔を向ければ、\nオリヴィは、怖いくらいに真剣な――
3503 = "奧莉薇強烈的語氣讓我嚇了一跳。回頭一看，她的表情認真得有些嚇人——" 

# monologue
# JP: 訴えかけてくるような目で、僕を見ている。
3853 = "那看向我的眼神中滿是抗議。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……そういうのがヤだから、\nフカミ、ナイショにしてるんじゃない」
1749 = "「……就是不想你們這樣，深美才要對你們保密的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
2410 = "「唔？」" 

# monologue
# JP: ハチロクと顔を見合わせてしまう。
3612 = "我和八六面面相覷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういうの――とは、いったいどういうことだ？」
2235 = "「不想我們這樣——是不想我們怎麼樣呢？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えっと――\nフカミ、他にお仕事もってるんでしょ？」
2655 = "「怎麼說呢——深美她不是還有別的工作要做嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ふかみのお母様が復帰されるまでは、\nクマ川くだり――ふかみの生家の船頭で経営者だったな」
2463 = "「嗯。在深美的母親康復之前，她都是自家隈河漂流的經營者同時還兼任掌棹來著」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、いまはおうちが上手くいってるけど、\n上手くいかなかったら戻るかも――なんでしょ？」
2772 = "「是吧，現在她家裡的生意還算順風順水，但要是狀況又不好了的話肯定要回去的不是？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだろうな」
3020 = "「這麼說的確是這樣」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だったら、長く続けられないかもしれないし。\n自分が\x%l車掌;#00ffc040;車掌%l;#;に向いてるかどうかもわからないでしょ？」
2716 = "「所以說沒辦法保證能一直做下去啊。況且，她也還不知道自己適不適合當\\x%l車掌;#00ffc040;列車長%l;#;，你們說對不對？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2464 = "「嗯」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、たくさんメイワクかけないよーに、\n一番少ないひとたちだけに、きっと相談したんだよ」
2713 = "「所以她為了儘可能少給大家添麻煩，才沒有讓更多的人知道」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
2420 = "「啊……」" 

# monologue
# JP: ならば、最初はポーレットに相談したのであろう。\nおそらくポーレットは快諾し――
3840 = "這麼說的話，最先找的人應該是波萊特吧。她那自不必說，肯定是馬上答應了——" 

# monologue
# JP: ふかみの成長とともに実車を見せる必要が出て、\n日々姫も巻き込み、今に至ったのかと思われる。
3866 = "隨著深美的成長，她也就有了上車的需求，所以也拉上了日日姬，到了今天。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……段階をふんで、じわじわと、\n自分の適正、やれるかどうかを見極めたのか」
1743 = "「……一步一個腳印，穩紮穩打，逐步確認自己是不是適合，以及能不能做好」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうそう！\nなーんだ、ちゃんとソーテツもわかるじゃない！」
2818 = "「沒錯沒錯！雙鐵這不是也挺明白的嘛！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかるはわかるが……\nどうにも迂遠に思えてしまうな」
2767 = "「明白是明白……但總覺得太拐彎抹角了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ウエン？」
2744 = "「拐彎抹角？」" 

# 【ハチロク】
# display as 八六
# JP: 「遠回り、あるいは些か、実際的ではない方法に思える\nというほどの意味です」
2733 = "「所謂拐彎抹角，是指繞圈子，或者說多少有些不切實際的方法的意思」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふーん？」
2402 = "「哦——嗯？」" 

# monologue
