3380 = "八六在複述奧莉薇的話時還特地模仿了奧莉薇的樣子。波萊特看在眼中，面含些許笑意，點頭表示同意。" 

# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんって、やっぱり大人――\nベテランの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なんですね」
2547 = "「奧莉薇果然是很成熟——同時也經驗豐富的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# 【ハチロク】
# display as 八六
