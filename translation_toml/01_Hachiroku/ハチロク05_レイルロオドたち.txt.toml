2582 = "「如果真是把整備當作興趣，藉此調整狀態放鬆身心倒是還好……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そこは他人が口出しをすることでもなかろう。\nオリヴィは大人だと、ふたりも口をそろえていたろうに」
2244 = "「不過這也輪不到別人說三道四吧。你們兩個剛剛不是還說奧莉薇很成熟的嗎」" 

# 【ハチロク】
# display as 八六＆波萊特
# JP: 「あ！」\n「あうっ、それもそうですよね、すみません」
2431 = "「啊！」\\n「啊嗚，這倒也是，對不起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あやまるようなことでもないとも思うが」
2262 = "「也沒那麼嚴重啦，用不著道歉的」" 

