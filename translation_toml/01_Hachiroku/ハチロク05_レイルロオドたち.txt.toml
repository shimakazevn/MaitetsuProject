# 【ポーレット】
# display as 波萊特
# JP: 「はい。もともと輸送密度のある路線じゃないですし、\n車格の小ささを活かした観光\x%l客車;#00ffc040;客車%l;#;に思い切って改装を」
2815 = "「沒錯。這條線路的車次密度本就不高，發揮它車身小的特點改造為觀光\\x%l客車;#00ffc040;客運車廂%l;#;的話——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、日々姫案件か」
3059 = "「那日日姬的提案……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です。近いうちにスケジュールをもらいたいって、\n淵さんおっしゃってました」
2779 = "「是的。淵先生說，希望儘快安排好日程」" 

# 【双鉄】
# display as 雙鐵
# JP: 「伝えておく。日々姫もさぞはりきるだろう」
3055 = "「那我去和她說一下。日日姬想必會幹勁十足的吧」" 

# monologue
# JP: 淵さんの就任以来、いままでは門前払いされていた、\n日々姫の『素人意見』が実現化するようになってきている。
3713 = "淵先生自上任以來，還一次都沒正眼瞧過日日姬那“門外漢想法”，但這次也終於有了實現的機會。" 

# monologue
# JP: 今回の\x%l客車;#00ffc040;客車%l;#;改装がどのような形に結実するのか、\n僕も単純に楽しみだ。
3774 = "而我對於這次的\\x%l客車;#00ffc040;客運車廂%l;#;改裝會得到怎樣的結果，也是頗為好奇與期待。" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l客車;#00ffc040;客車%l;#;側はそんな感じで問題なしだったんですけど――\n機関車側はどうでしたか？」
1711 = "「\\x%l客車;#00ffc040;客運車廂%l;#;這邊大體就是這樣沒有什麼問題——機車那邊情況又如何呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まずは、ハチロクのレビューをもらえるか？\n僕も聞きたい」
2233 = "「不妨先聽聽八六的看法吧？說實話我也很好奇你會怎樣評價」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。結論から申しますと、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィの仕事は百点です」
2571 = "「好的。那不妨先說結論吧，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;奧莉薇的工作可以得滿分」" 

# 【れいな】
# display as 玲奈
# JP: 「ひゃくてん！　はじめての試験運転でですかぁ！？」
2849 = "「滿分？第一次試運營就滿分嗎！？」" 

# 【ハチロク】
# display as 八六
# JP: 「幾度かの添乗と、先日の徒歩での線見とから、\n綿密に演算をしていたのでしょうね」
2657 = "「想必是通過幾次陪同駕駛，以及前日進行的徒步踏查，得到了充分的訊息並進行了精密的計算吧」" 

# 【れいな】
# display as 玲奈
# JP: 「Ⅸ号機関車でだったら、\nどこでどう何を操作するか、とかですかぁ」
2747 = "「推算出在九號機車上的話，應該在哪裡怎麼操作的訊息嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。そしてオリヴィちゃんの経験は、\nその演算と現実との誤差を、観測できないまでに抑えた」
2810 = "「正是如此。而後奧莉薇又靈活運用她的經驗，將計算結果與實際操作間的誤差控制在無法發現的程度」" 

# 【ポーレット】
# display as 波萊特
# JP: 「なら――」
3035 = "「那——」" 

# monologue
# JP: ポーレットの声のわずかな震えが、\nそれがどれほどの離れ業なのかを伝えてくれる。
3699 = "波萊特的聲音都有些顫抖了。我也不難從這反應推斷出這是何等絕倫的技術。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんと[ハチロクニイマル,3]8620での[ゆのい,1]湯医線の走行を、\nオリヴィちゃんはⅨ号機関車で、そのまま再現した？」
2260 = "「也就是說奧莉薇用九號機車，把八六和８６２０在湯醫線上的行駛狀態完整重現了嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「と、申しても過言ではないでしょうね。\n乗務に必要な範囲の\x%l共感;#00ffc040;共感%l;#;にも、問題ございませんでした」
2696 = "「我認為此言並無言過其實之處。在乘務任務必要範圍內的\\x%l共感;#00ffc040;共鳴%l;#;也沒有任何問題」" 

# 【れいな】
# display as 玲奈
# JP: 「あー。ハチロクさんもそうでしたかぁ」
2413 = "「啊——八六小姐你也是這麼覺得的啊」" 

# monologue
# JP: 問題ない、という報告であるにもかかわず、\nれいなの声は、さみしげだ。
3364 = "儘管報告的內容都是沒有問題，但玲奈的語調中卻似有幾分落寞。" 

# monologue
# JP: ならばつまりは、\x%l共感;#00ffc040;共感%l;#;を通じ合ったのは、\n『鉄道の安全運行に必要な最低限』のみであったのだろう。
3843 = "那也就是說，通過\\x%l共感;#00ffc040;共鳴%l;#;進行的交流，也僅限於“確保鐵路安全運行所必須的最低限度”而已吧。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんがそこまで褒める、\n百点満点の試験運転だったなら」
2751 = "「既然八六都如此極力表揚，甚至給這次試運營打出滿分的話」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ、『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィ』の仕事は満点でも、\n試験運転が満点であったとは申しておりません」
3087 = "「非也，即便“\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;奧莉薇”的工作是滿分，並不代表這次試運營會同樣得到滿分」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
2388 = "「咦？」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまが、もしもオリヴィと組んでいたのであれば。\n後者もきっと、満点であったかとも想像いたしますが」
2581 = "「如果換作雙鐵少爺和奧莉薇搭檔的話，奧莉薇想必也是會得到滿分的吧」" 

# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「あ」
# 2423 = "「啊」" 

# monologue
# JP: ポーレットとれいなが顔を見合わす。\nやはり、気になっていたらしい。
3698 = "波萊特和玲奈面面相覷，想必也急著想知道八六究竟要說什麼。" 

# 【ハチロク】
# display as 八六
# JP: 「本日の湯医線Ⅸ号機関車試走。\n\x%l機関士;#00ffc040;機関士%l;#;は右田日々姫、\x%l機関助士;#00ffc040;機関助士%l;#;は蓑笠凪の体制でした」
2270 = "「今天九號機車在湯醫線上的行駛測試，是以\\x%l機関士;#00ffc040;司機%l;#;右田日日姬，\\x%l機関助士;#00ffc040;司爐%l;#;蓑笠凪的配置進行的」" 

# 【れいな】
# display as 玲奈
# JP: 「ほわ」
2403 = "「哦」" 

# monologue
# JP: れいなの、思わず飛び出してしまったというような声。\n喜びのせいか、驚きのせいか、僕にはまるで判別出来ぬ。
3731 = "玲奈這聲不假思索發出的聲音，究竟是驚是喜，我完全摸不到頭緒。" 

# 【れいな】
# display as 玲奈
# JP: 「オリヴィさん、\n日々姫さんを\x%l機関士;#00ffc040;機関士%l;#;さんに選んだんですねぇ」
2545 = "「奧莉薇小姐，選了日日姬小姐做\\x%l機関士;#00ffc040;司機%l;#;呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、オリヴィが結局選んだのは、\n『くじ引き』という方法だけだ」
2252 = "「不，奧莉薇最後選的是透過抽籤來決定」" 

# 【ポーレット】
# display as 波萊特
# JP: 「くじ引き」
2742 = "「抽籤」" 

# 【ハチロク】
# display as 八六
