3019 = "「這麼短時間就能發現這一點，奧莉薇確實不簡單……不過這也只是雙鐵君特定的一方面而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2486 = "「嗯？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんも、ハチロクちゃんも、大きな傷を乗り越えて――だから、今、走れてるわけじゃないですか」
3078 = "「雙鐵君和八六都是跨越了曾經的創傷，如今才能縱情馳騁，不是嗎」" 

# 【ハチロク】
# display as 八六
