# lines: 372 
# 【双鉄】
# display as 雙鐵
# JP: 「大変だったが、まこと充実した撮影だった。\nいいポスターになるのであろうな」
1415 = "「Tuy có chút vất vả, nhưng quả thực là một buổi chụp hình vô cùng mãn nguyện.\\nHẳn là sẽ có một bức áp phích tuyệt vời đây」"

# monologue
# JP: レイルロオドの戸籍創出・婚姻特区。\n御一夜市の新しい魅力をPRするための、ポスター撮影。
1790 = "Đặc khu Đăng ký Hộ tịch và Hôn nhân cho Railord.\\nBuổi chụp hình áp phích nhằm quảng bá cho sức hút mới của thành phố Ohitoyo."

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜の象徴のひとつ、赤井阿蘇神社の社殿と、\n白無垢のすず。伝えたい事を端的に示し、実に良かった」
1294 = "「Điện thờ của Đền Akai Aso, một trong những biểu tượng của Ohitoyo, kết hợp cùng Suzu trong bộ Shiromuku trắng ngần. Bức ảnh đã truyền tải một cách súc tích những điều cần thể hiện, thực sự rất tuyệt vời」"

# monologue
# JP: 撮影は全て、日々姫が仕切った。\nロケーションから構図から、衣装、小物に至るまで。
1687 = "Mọi công đoạn chụp hình đều do Hibiki đảm nhiệm.\\nTừ địa điểm, bố cục cho đến trang phục và cả những phụ kiện nhỏ nhất."

# monologue
# JP: カメラマン――ウーマンの方も素晴らしい実力だった。\n軽快なトークと明快な指示で、終始緊張せずにいられた。
1701 = "Nữ nhiếp ảnh gia cũng có một năng lực vô cùng xuất sắc.\\nNhờ những lời trò chuyện vui vẻ cùng tín hiệu hiển thị rõ ràng của cô ấy, chúng tôi có thể giữ được sự thoải mái suốt từ đầu đến cuối mà không hề bị căng thẳng."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様に、紋付きの羽織袴がお似合いになるとは\nわかっておりましたが、これ程とは」
1109 = "「Dẫu biết rằng trang phục Haori Hakama có thêu gia huy sẽ rất hợp với ngài Soutetsu,\\nnhưng thiếp không ngờ lại đến mức này...」"

# monologue
# JP: ほうっと、ため息。撮影を終えて程ない興奮もあろうが、\nすずの頬は、触れればきっとぽかぽかな程の紅色だ。
1799 = "Nàng khẽ thở phào một tiếng. Có lẽ một phần là do sự phấn khích chưa kịp tan sau buổi chụp, đôi má của Suzu đỏ ửng lên, nếu chạm vào hẳn là sẽ cảm nhận được hơi ấm nồng nàn."

# 【双鉄】
# display as 雙鐵
# JP: 「似合うとは、お前のための言葉だ」
1359 = "「Hai chữ 'phù hợp' đó, phải dành cho em mới đúng」"

# monologue
# JP: 頬から喉へ、胸元、腰を経、足先にまで視線を落とす。\n僕の喉からもほうっと、自然、ため息がこぼれ出る。
1664 = "Tôi khẽ đưa mắt nhìn từ đôi má xuống bờ cổ, qua khuôn ngực, vòng eo rồi dừng lại nơi gót chân nàng.\\nTừ sâu trong lồng ngực tôi, một tiếng thở dài trầm trồ cũng tự nhiên khẽ thốt ra."

# 【双鉄】
# display as 雙鐵
# JP: 「……完璧な美しさだ。これほど可憐な花嫁御寮は、\n世界のどこを探したところで、他におるまい」
845 = "「...Một vẻ đẹp hoàn mỹ. Một cô dâu đáng yêu kiều diễm đến nhường này, dù có lục tung cả thế gian này lên, chắc chắn cũng chẳng thể tìm thấy người thứ hai đâu」"

# 【ハチロク】
# display as 鈴
# JP: 「おおげさすぎます。双鉄さまったら」
1300 = "「Ngài cứ khéo nói quá lên rồi, ngài Soutetsu thật là...」"

# monologue
# JP: いたずらっぽくぷうと膨らむ頬の紅色が、更に濃くなる。\nその赤が、白無垢をいっそう引き立てる。
1598 = "Đôi má đang phồng lên đầy tinh nghịch kia lại càng đỏ ửng hơn.\\nSắc đỏ ấy lại càng làm tôn lên vẻ đẹp của bộ Shiromuku tinh khôi."

# 【双鉄】
# display as 雙鐵
# JP: 「このまま式を――\n今ひとたびの結婚式を、挙げたくなってしまうくらいだ」
1352 = "「Cứ thế này thì――\\nAnh lại muốn tổ chức hôn lễ, một lễ cưới thêm một lần nữa mất rồi」"

# 【ハチロク】
# display as 鈴
# JP: 「あ……」
1230 = "「A...」"

# monologue
# JP: すずにあわせて、僕にあわせて。\n撮影用に製作したゆえ、長持ちはせぬ衣装と聞いた。
1739 = "May theo số đo của Suzu, và của cả tôi nữa.\\nNghe nói vì đây là trang phục được chế tác riêng để chụp ảnh, nên nó sẽ không bền lâu."

# 【ハチロク】
# display as 鈴
# JP: 「お、おからかいにならないでください！\n双鉄さまったら」
1424 = "「X-Xin ngài đừng có trêu chọc em nữa!\\nSoutetsu-sama thật là」"

# 【双鉄】
# display as 雙鐵
# JP: 「からかってなど」
1206 = "「Anh đâu có trêu em」"

# monologue
# JP: だから持ち帰っても、捨てても構わぬと日々姫は言った。\nそれはつまりはそうした意味の気遣いだろうと思うゆえ。
1682 = "Vì thế nên Hibiki có bảo rằng mang về hay vứt đi đều được.\\nTôi nghĩ đó chính là sự chu đáo mang ý nghĩa như vậy."

# 【ハチロク】
# display as 鈴
# JP: 「きゃっ！？」
1145 = "「Kya!?」"

# monologue
# JP: ――押し倒す。\nシワになろうと構わぬ勢いで手をのばす。
820 = "――Tôi đè em xuống.\\nKhông màng đến việc áo sẽ bị nhăn, tôi vươn tay ra."

# 【双鉄】
# display as 雙鐵
# JP: 「無論、結婚式は生涯一度だ」
1347 = "「Dĩ nhiên, hôn lễ cả đời chỉ có một lần」"

# 【ハチロク】
# display as 鈴
# JP: 「あ！」
1244 = "「A!」"

# monologue
# JP: ぱっと、すずの顔が華やぐ。\n僕の手が性感を与えはじめるより早く。
1534 = "Gương mặt Suzu bỗng bừng sáng rạng rỡ.\\nCòn nhanh hơn cả việc bàn tay tôi bắt đầu mang lại cho em những khoái cảm."

# 【ハチロク】
# display as 鈴
# JP: 「左様ですね。結婚式は生涯一度。\n双鉄さまも、わたくしも、一度だけしか経験しないもの」
1302 = "「Đúng vậy ạ. Hôn lễ cả đời chỉ có một lần.\\nCả Soutetsu-sama lẫn em đều sẽ chỉ trải nghiệm điều đó một lần duy nhất mà thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、ふたりっきりの、ごっこ遊びになってしまうが」
1393 = "「Thế nên, dù chỉ là một trò chơi đóng vai của riêng hai chúng ta」"

# monologue
# JP: （さわっ、さすっ）
1995 = "（Sột soạt, mơn trớn）"

# 【ハチロク】
# display as 鈴
# JP: 「んっ！」
1268 = "「Ưm...!」"

# monologue
# JP: 裾を、割る。\n穢れなきものの象徴を、穢すそのため、指を這わせる。
1675 = "Tách tà áo ra.\\nHướng ngón tay luồn vào trong, để vấy bẩn thứ vốn là biểu tượng của sự thuần khiết."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、お前と[にせ,1]二世の[ちぎ]契りを結びたい。\n白無垢姿のお前を抱いて――今一度深く、刻みたい」
1316 = "「Anh muốn cùng em kết tóc se duyên.\\nMuốn được ôm lấy em trong bộ Shiromuku này――và một lần nữa, khắc sâu nó vào tâm khảm」"

# 【ハチロク】
# display as 鈴
# JP: 「はい、わたくしも契りとう――\n幾度でも、幾重にも。誓いを重ねとう存じます」
1357 = "「Vâng, thiếp cũng muốn kết duyên cùng chàng――\\nDù cho bao nhiêu lần, dù cho bao nhiêu lớp. Thiếp nguyện cùng chàng bồi đắp thêm lời thề nguyện」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、だ」
1328 = "「Vậy thì...」"

# 【ハチロク】
# display as 鈴
# JP: 「あ……んっ」
1235 = "「A... ưm」"

# monologue
# JP: まず唇で契りを交わす。\n口づける。
1702 = "Trước hết, trao nhau lời thề bằng đôi môi.\\nHòa quyện vào nụ hôn."

# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅっ――ん……ふ……ぁ……\nふっ――ちゅむっ――ちゅうっ――れるっ」
1252 = "「Ưm... chụt――ưm... phù... a...\\nphù――chụt――chụtt――mút...」"

# monologue
# JP: 無垢という言葉を投げ打つ舌使い。\nすずはめいっぱい舌を伸ばして、僕の口内に侵入してくる。
1819 = "Cách đưa lưỡi dường như muốn rũ bỏ hoàn toàn hai chữ thuần khiết.\\nSuzu vươn dài chiếc lưỡi hết cỡ, xâm nhập vào sâu bên trong khoang miệng tôi."

# 【ハチロク】
# display as 鈴
# JP: 「あむっ――ふっ――んっ――れうっ――りゅっ――\nちゅむっ――ちゅうっ――じゅりゅっ――」
1241 = "「Ưm――phù――ưm――mút――lếm――\\nchụt――chụtt――chùtt――」"

# monologue
# JP: 舌と舌とをくっつけあって溶かし合う。\nその快感が、脳をもゆるゆる蕩かしていく。
1765 = "Lưỡi quyện vào lưỡi, như muốn tan chảy vào nhau.\\nKhoái cảm ấy khiến cho cả đại não cũng dần trở nên tê dại, mông lung."

# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅむっ――ちゅずっ――じゅっ――（こくっ）\n――ちゅむっ――れるっ――れろっ――ちゅりゅっ」
1213 = "「Ưm... chụt――ưm... chùt――(ực)\\n――chụt――mút――lếm――chùtt」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん……ぷ」
1211 = "「Ưm... phù」"

# 【ハチロク】
# display as 鈴
# JP: 「ぷぁ……ぁ――」
1154 = "「Phù... ha... a――」"

# monologue
# JP: 名残を惜しむような声。\nその声がそのまま形になったかのように、つながる唾液。
1806 = "Tiếng thở dốc đầy vẻ luyến tiếc.\\nSợi chỉ bạc nối liền hai bờ môi, như thể hiện thực hóa thanh âm ấy."

# 【ハチロク】
# display as 鈴
# JP: 「あ――……ん――」
1233 = "「A――…… n――」"

# monologue
# JP: すずはさりげなく唾液を吸い込み。\nそうしてじっと、僕の目を見る。
1792 = "Suzu khẽ nuốt nước bọt.\\nRồi em ấy chăm chú nhìn thẳng vào mắt tôi."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま――契りは、これでおしまいですか？」
1418 = "「Soutetsu-sama―― Minh ước, đến đây là kết thúc rồi sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まさか。唇を交わすだけで為す誓いなら、\nすでに僕らは幾万度となくたてている。ゆえ――」
1296 = "「Làm sao có thể. Nếu là lời thề chỉ bằng cách chạm môi,\\nthì chúng ta đã lập ra hàng vạn lần rồi. Thế nên――」"

# monologue
# JP: （さすっ）
1994 = "（Sột soạt）"

# 【ハチロク】
# display as 鈴
# JP: 「はうっ」
1242 = "「Hau...」"

# monologue
# JP: 先程割った裾から上へと、\nゆっくりゆっくり指を這わせる。
1662 = "Từ vạt áo vừa vén lúc nãy,\\ntôi chậm rãi, thật chậm rãi lướt những ngón tay lên phía trên."

# 【ハチロク】
# display as 鈴
# JP: 「あ……や――はずかしい、です。\n双鉄、さま」
1232 = "「A…… ya―― xấu hổ, lắm ạ.\\nSoutetsu, sama」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば嬉しい。僕はお前の、\n羞恥に震える姿も美しく可憐と感じるゆえに」
1391 = "「Thế thì anh lại càng vui. Bởi vì anh thấy dáng vẻ run rẩy\\nvì ngượng ngùng của em cũng vô cùng xinh đẹp và đáng yêu」"

# 【ハチロク】
# display as 鈴
# JP: 「や……。そのような意地悪を――\nん……おっしゃらないで、ください、まし――」
1377 = "「Ya…… Ngài đừng――\\nN…… nói những lời trêu chọc như thế, nữa mà――」"

# monologue
# JP: ご要望に沿い唇を閉じ、\nかわりに指を、またじわじわと這い登らせる。
1669 = "Tôi mím môi theo ý muốn của em,\\nthay vào đó lại để những ngón tay chầm chậm bò lên cao hơn."

# monologue
# JP: （ぴちゅっ）
1984 = "「Pichu」"

# monologue
# JP: 太ももをつたう愛液が、僕の指先を濡らし始める。\n口づけただけで濡れたのかと――む？
1859 = "Dịch yêu thương tuôn chảy dọc đùi bắt đầu làm ướt đầu ngón tay tôi.\\nMới chỉ hôn thôi mà đã ướt thế này rồi sao―― Hử?"

# 【ハチロク】
# display as 鈴
# JP: 「あ……や――ふ、ぁ――\nはずかし――はずかしゅうございます」
1237 = "「A…… ya―― phu, a――\\nXấu hổ―― xấu hổ quá đi mất」"

# 【双鉄】
# display as 雙鐵
# JP: 「すず？」
1404 = "「Suzu?」"

# monologue
# JP: 指に絡まる雫が明らかに多すぎる。\nまるで……そう。遮る物が、何一つとて無いように。
1712 = "Những giọt nước vương trên ngón tay rõ ràng là quá nhiều.\\nGiống như…… đúng vậy. Như thể không còn một vật gì ngăn cách."

# 【双鉄】
# display as 雙鐵
# JP: 「すず」
1399 = "「Suzu」"

# 【ハチロク】
# display as 鈴
# JP: 「はい――なん、でしょう――\n双鉄、さま」
1251 = "「Vâng――có chuyện gì――\\nvậy ạ, ngài Soutetsu」"

# monologue
# JP: すずは和装。着付けを手伝ったのは日々姫一人。\nならば、すずは。恐らく――伝統にこだわったのだろう。
1800 = "Suzu đang mặc trang phục truyền thống. Người giúp cô ấy mặc đồ chỉ có mỗi Hibiki.\\nNếu đã vậy, Suzu... có lẽ――đã muốn tuân theo đúng truyền thống."

# 【双鉄】
# display as 雙鐵
# JP: 「股を大きく、開いて欲しい」
1320 = "「Tôi muốn em... hãy mở rộng đùi ra」"

# 【ハチロク】
# display as 鈴
# JP: 「っ！！？」
1152 = "「──!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「股を。大きく。開いて。欲しい。」
1322 = "「Tôi muốn. Em mở rộng. Đùi ra.」"

# 【ハチロク】
# display as 鈴
# JP: 「――――――」
828 = "「————」"

# monologue
# JP: 絶句。言葉は出てこない。\nただただ静かな呼気と吸気が幾度も重なる。
1715 = "Câm nín. Không một lời nào có thể thốt ra.\\nChỉ có những nhịp thở ra hít vào lặng lẽ liên tục chồng lên nhau."

# 【ハチロク】
# display as 鈴
# JP: 「――――ぅてつ、さ、ま……」
830 = "「――――Ngài So, u, tetsu……」"

# monologue
# JP: かぼそい声が、僕の名を呼ぶ。
1595 = "Một giọng nói yếu ớt cất lên gọi tên tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1218 = "「！」"

# 【ハチロク】
# display as 鈴
# JP: 「……………………」
834 = "「……………………」"

# monologue
# JP: 再び沈黙。呼吸が荒らぐ。そしてゆるゆる――\nすずは股間を、その太ももを割り開いていく。
1592 = "Lại một khoảng lặng. Hơi thở dồn dập hơn. Và rồi thật chậm rãi――\\nSuzu dần hé mở vùng nhạy cảm, dạng rộng đôi chân thon thả ra."

# 【双鉄】
# display as 雙鐵
# JP: 「ぁあ――」
1225 = "「A――」"

# 【ハチロク】
# display as 鈴
# JP: 「っ！」
# 1218 = "「唔！」" 

# monologue
# JP: 我知らず漏れてしまった声に、すずはビクリと体を震わす。\nけれど、その股を閉じはしない。
1738 = "Tiếng rên khẽ vô tình lọt ra khiến Suzu run rẩy khẽ khàng.\\nThế nhưng, cô ấy không hề khép chân lại."

# 【ハチロク】
