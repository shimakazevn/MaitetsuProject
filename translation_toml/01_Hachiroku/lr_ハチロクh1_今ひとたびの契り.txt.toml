# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、にっ――っ！！！！」
1330 = "「Thế nên, ――!!!!」"

# monologue
# JP: （ぱんっ！　ずぶっ！　ずばっ！　じゅぶうっ！！！）
1949 = "（Phành! Phập! Sầm! Phập! !!!）"

# 【ハチロク】
# display as 鈴
# JP: 「はっ――あっ――きます――白いの――まいりますっ\n――わらくひっ――もうすぐっ――もうすぐっ――」
1179 = "「Hà――a――đến rồi――dòng nước trắng――sắp ra rồiっ\\n――em――sắp rồiっ――sắp rồiっ――」"

# monologue
# JP: 膣がほとんど噛みに来ている。\n膣奥は真空地帯のように、亀頭を離すまいと吸い付く。
1769 = "Âm đạo gần như đang co bóp kẹp chặt lấy.\\nNơi sâu nhất của âm đạo tựa như một vùng chân không, mút chặt lấy quy đầu không chịu buông rời."

# 【双鉄】
# display as 雙鐵
# JP: 「す、ずっ――」
1396 = "「Su, zu――」"

# monologue
# JP: ゆえに、わかる。わかっているのだ。\nすずももうすぐ達すると、ふたりで同時に達したいと。
1670 = "Thế nên, tôi hiểu. Tôi biết rõ điều đó.\\nRằng Suzu cũng sắp lên đỉnh rồi, và hai đứa muốn cùng nhau chạm đỉnh."

# monologue
# JP: （ずばっ！　じゅぶっ！　じゅうっ！　ばちゅっ！！）
1955 = "（Sầm! Phập! Chùn! Bạch!!）"

# monologue
# JP: 気持ちよすぎて吐き気がする。射精したくて吐き気がする。\nけれど、堪える、必死に、必死に。
1627 = "Sướng đến mức muốn nôn ra. Muốn bắn tinh đến mức muốn nôn ra.\\nNhưng, tôi vẫn kìm lại, một cách tuyệt vọng, tuyệt vọng."

# 【ハチロク】
# display as 鈴
# JP: 「あっ！　あっ！　あっ！　あっ！　あっ　あっ！\nあっ！　あっ！　んっ！　はあっ！　んっ！　ふっ！」
1245 = "「A! A! A! A! A! A!\\nA! A! Ưm! Hà! Ưm! Phù!」"

# monologue
# JP: （じゅっ！　じゅぶっ！　ばちゅっ！　じゅぶううっ！）
1959 = "(Chụt! Chùn chụt! Phập! Chùn chụtttt!)"

# monologue
# JP: このかわいいものと、僕の妻と、\n同時に達し、契りを一層ふかめたい。
1651 = "Tôi muốn cùng sinh vật đáng yêu này và vợ của mình,\\ncùng lúc đạt đến đỉnh điểm, khắc sâu thêm nữa lời hẹn ước sắt son."

# 【双鉄】
# display as 雙鐵
# JP: 「くっ――あっ！」
1210 = "「Ưm―― A!」"

# monologue
# JP: 尻肉全部に力を込めて、穴という穴を引き締める。\nそうしながらも腰はひたすら、すずの最奥を貪り続ける。
1760 = "Dồn toàn bộ sức lực vào cơ mông, siết chặt lấy từng ngóc ngách.\\nNhưng vùng eo vẫn không ngừng tham lam càn quét nơi sâu thẳm nhất của Suzu."

# monologue
# JP: （ばちゅっ！　じにゅっ！！　ぎりゅっ！　ずばんっ！）
1993 = "(Phầm phập! Khít khao!! Chặt chẽ! Rầm!)"

# 【ハチロク】
# display as 鈴
# JP: 「ふやっ！　あっ！　あっ！　あっ！　あっ！　っ！！\nそうてつ！　さまっ！　わらくひっ！　わたくしっ！」
1156 = "「Hya! Ah! Ah! Ah! Ah! !!\\nCậu Soutetsu! Em! Em...!」"

# 【双鉄】
# display as 雙鐵
# JP: 「すずっ！！！！！！」
1402 = "「Suzu!!!!!!」"

# 【ハチロク】
# display as 鈴
# JP: 「そうてつさまぁっ！！！！！」
1421 = "「Cậu Soutetsu àaaaa!!!!!!」"

# monologue
# JP: （じゅぽっ――ずぶうううううううっ！　ぐりっっっ！）
1947 = "(Chùn chụt―― Phập sâu hoắtttttt! Kịch liệt!)"

# 【ハチロク】
# display as 鈴
# JP: 「ひゃぅぅぅぅぅぅぅうぅぅぅぅぅぅ～～～っ！！！」
1142 = "「Hyauuuuuuuuuuuuuuuu~~~!!!」"

# monologue
# JP: （ぶびゅっ！！！！　――どびゅっ！　びゅるっ！！）
1946 = "(Phụt!!!! ―― Bắn ra! Ồa ạt!!)"

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
1217 = "「Ực... Ah!!!」"

# monologue
# JP: （きゅうううううううううううっっ！！！！）
1999 = "(Siết chặt chẽẽẽẽẽẽẽẽẽ!!!!)"

# 【ハチロク】
# display as 鈴
# JP: 「ふああっ！！！」
1199 = "「Phù... Ahhh!!!」"

# monologue
# JP: （びゅるっ！　びゅうっ！　どびゅっ！　びゅっ！）
1945 = "(Bắn ra! Phụt phụt! Ồa ạt! Phóng ra!)"

# monologue
# JP: 精液が塊になって飛び出していく。\n糊のごとくに、すずの膣奥の更に奥へと張り付いていく。
1731 = "Tinh dịch bắn ra thành từng luồng đặc sệt.\\nNhư một lớp keo, bám chặt vào tận sâu, thật sâu bên trong tử cung của Suzu."

# 【ハチロク】
# display as 鈴
# JP: 「ふあっ――あっ――あひゅうっ――あひゅいのっ」
1176 = "「Phù... a... a... a hyu... a hyu...」"

# monologue
# JP: （びゅうっ！　どびゅっ――びゅるっ――ぶびゅうっ）
1985 = "（Phụt! Bắn ra... ực... phụt...）"

# 【双鉄】
# display as 雙鐵
# JP: 「く――あ――あ……うぁっ――」
1209 = "「Ư... a... a... ưm...」"

# monologue
# JP: 空っぽになり、なると同時に、\n止まっていた全てがまた動き出す。
1716 = "Cùng lúc với sự trống rỗng hoàn toàn ấy,\\nmọi thứ đang ngưng đọng bỗng dưng chuyển động trở lại."

# 【ハチロク】
# display as 鈴
# JP: 「ふぁ――ぁっ――あっ――あっ――」
1171 = "「Phù... a... a... a...」"

# monologue
# JP: （とさっ）
1934 = "（Rơi bịch）"

# monologue
# JP: 力を使い果たしたのだろう、すずも僕へと倒れ込む。\nぴたりくっつく薄い体は、汗にぬかるみ、ぽかぽか熱い。
1793 = "Có lẽ vì đã vắt kiệt sức lực, Suzu cũng đổ gục vào người tôi.\\nCơ thể mảnh mai dính chặt lấy tôi, nhễ nhại mồ hôi và ấm áp vô cùng."

# 【ハチロク】
# display as 鈴
# JP: 「はぁ――はぁ――はぁ――（ごくっ）\nそうてつ、さま――だんな、さま」
1170 = "「Hà... hà... hà... (ực)\\nCậu Soutetsu... Phu quân... của thiếp」"

# 【双鉄】
# display as 雙鐵
# JP: 「すず――すず。よくがんばったな。\nとても素敵で――このうえもなく愛らしかったぞ」
1397 = "「Suzu... Suzu. Em đã cố gắng lắm rồi.\\nTuyệt vời lắm... và cũng vô cùng đáng yêu nữa」"

# 【ハチロク】
# display as 鈴
# JP: 「えへっ――えへへっ。\nはうっ――ありがとう、ございます」
1200 = "「Hì hì... hì hì.\\nHơ... em cảm ơn anh nhiều lắm」"

# monologue
# JP: いいこいいこと髪を撫でれば、すずがはにかむ。\n照れてあまえて僕の胸へと、人差し指でなにか書く。
1674 = "Tôi xoa đầu khen em ấy ngoan, khiến Suzu ngượng ngùng.\\nEm ấy thẹn thùng nũng nịu nép vào ngực tôi, dùng ngón trỏ vẽ vẽ gì đó."

# 【ハチロク】
# display as 鈴
# JP: 「あの、ね？　双鉄さま」
1362 = "「Dạ, anh ơi? Cậu Soutetsu」"

# monologue
# JP: のの字のの字かと思いきや、指はどんどんずれていく。\n『だ　い　す　き』と――瞬間すずは、動きを止める。
1784 = "Tôi cứ ngỡ em ấy vẽ vòng tròn bâng quơ, nhưng ngón tay em cứ thế di chuyển.\\n『E m  y ê u  a n h』—— Khoảnh khắc ấy, Suzu bỗng dừng chuyển động."

# 【ハチロク】
# display as 鈴
# JP: 「わたくし、上手に――誓いを、契りを――\nいまひとたびの契りを――かわせましたか？」
1306 = "「Thiếp... đã hoàn thành thật tốt... lời thề, lời ước hẹn...\\nlời ước hẹn một lần nữa ấy... có phải không anh?」"

# monologue
# JP: 赤い瞳が僕を見る。すずの瞳に僕が映る。\n僕らはお互いを見つめ合い、呼吸をぴったり重ねてる。
1802 = "Đôi mắt đỏ ấy đang nhìn tôi. Tôi phản chiếu trong mắt của Suzu.\\nChúng tôi nhìn sâu vào mắt nhau, hơi thở hòa quyện làm một hoàn hảo."

# 【双鉄】
# display as 雙鐵
# JP: 「……ああ、この上無く素晴らしかった。\nお前の[はら]胎の奥の熱さが、言葉よりも雄弁に示していよう」
849 = "「...Ừm, không còn gì tuyệt vời hơn thế nữa.\\nSự ấm áp nơi sâu thẳm trong bụng em đã chứng minh điều đó còn rõ ràng hơn cả lời nói」"

# 【ハチロク】
# display as 鈴
# JP: 「ぁ……」
# 1230 = "「啊……」" 

# monologue
# JP: 下腹部を、そっと小さな手が撫ぜる。\nにっこり、瞳がアーチを描く。
1801 = "Một bàn tay nhỏ nhắn nhẹ nhàng vuốt ve phần bụng dưới.\\nĐôi mắt ấy khẽ híp lại thành hình vòng cung, nở một nụ cười rạng rỡ."

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ」
1269 = "「Ư hự~」"

# monologue
# JP: すずを転がす笑い声。僕の大好きな笑い声。\n全てが満ちて、静かに収まる。
1855 = "Tiếng cười khúc khích của Suzu vang lên. Tiếng cười mà tôi vô cùng yêu thích.\\nMọi thứ đều được lấp đầy, rồi lặng lẽ lắng xuống."

# 【双鉄】
# display as 雙鐵
# JP: 「……二世の契りの上に重ねた、二世の契りだ。\n生まれ変わってそのまた先も、僕たちは夫婦だ。確実に」
1327 = "「...Một lời thề nguyền kiếp sau chồng lên một lời thề nguyền kiếp sau khác.\\nDù có đầu thai hay đi xa hơn thế nữa, chắc chắn chúng ta vẫn sẽ là phu thê」"

# 【ハチロク】
# display as 鈴
# JP: 「はい」
1331 = "「Vâng」"

# monologue
# JP: レイルロオドに、人間に。生まれ変わりがあるのであらば。\nその一言を飲み込んで、代わりにそっと口づける。
1703 = "Cho dù có là Railord hay con người, nếu thực sự có sự luân hồi chuyển kiếp.\\nTôi nuốt ngược câu nói đó vào trong, thay vào đó là một nụ hôn thật khẽ."

# 【ハチロク】
# display as 鈴
# JP: 「…………。\nわたくし、うれしゅうございます」
838 = "「............\\nThiếp thân cảm thấy vô cùng hạnh phúc」"

# monologue
# JP: ほんの一瞬唇を舐め。すずが微笑む。ちいさく、しずかに。\n乱れた白無垢と咲いた笑顔にふっと、真白い蓮の花を思う。
1820 = "Khẽ liếm môi trong thoáng chốc, Suzu mỉm cười. Một nụ cười nhẹ nhàng và lặng lẽ.\\nNhìn bộ Bạch Vô Cấu có chút xộc xệch cùng nụ cười rạng rỡ của em, tôi chợt liên tưởng đến một đóa hoa sen trắng muốt."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま、旦那さま。どうぞ、願わくば幾久しく。\n機能停止のその先も――」
1422 = "「Soutetsu-sama, phu quân của thiếp. Xin chàng, nguyện cầu cho chúng ta mãi mãi bền lâu.\\nDù cho có vượt qua cả thời khắc ngừng hoạt động đi chăng nữa――」"

# monologue
# JP: お腹の上に小さな感触。\n三つ指をすずは綺麗に揃えて静かに頭を下げる。
1755 = "Một cảm giác nhỏ nhắn đặt lên bụng tôi.\\nSuzu khép ba ngón tay thật đẹp, lặng lẽ cúi đầu xuống."

# 【ハチロク】
# display as 鈴
# JP: 「そうてつさま――\nどうぞ、わたくしをあなたのお側に。あなたの、妻に」
1419 = "「Soutetsu-sama――\\nXin hãy để thiếp thân được ở bên cạnh chàng. Làm thê tử của chàng」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。\nそれは、僕の望みだ」
1346 = "「Dĩ nhiên rồi.\\nĐó cũng chính là mong ước của anh」"

# 【ハチロク】
# display as 鈴
# JP: 「あ――」
# 1225 = "「啊——」" 

# monologue
# JP: そうして僕らは言葉も想いも願いも溶かし。\nいまひとたびのキスをする。
1646 = "Và rồi, chúng tôi hòa quyện cả lời nói, tâm tư lẫn nguyện ước vào nhau.\\nĐể trao nhau thêm một nụ hôn nữa."
