[script]
# lines: 372 
# 【双鉄】
# display as 雙鐵
# JP: 「大変だったが、まこと充実した撮影だった。\nいいポスターになるのであろうな」
1415 = "「Tuy vất vả nhưng quả là một buổi chụp hình trọn vẹn.\nChắc chắn sẽ thành một tấm áp phích đẹp đây.」"
# monologue
# JP: レイルロオドの戸籍創出・婚姻特区。\n御一夜市の新しい魅力をPRするための、ポスター撮影。
1790 = "Đặc khu thiết lập hộ tịch và hôn nhân cho Railord.\nBuổi chụp hình áp phích nhằm quảng bá cho sức hấp dẫn mới của thành phố Ohimitera."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜の象徴のひとつ、赤井阿蘇神社の社殿と、\n白無垢のすず。伝えたい事を端的に示し、実に良かった」
1294 = "「Ngôi đền Akai Aso, một trong những biểu tượng của Ohimitera,\nvà Suzu trong trang phục Shiromuku. Thể hiện trực tiếp thông điệp muốn truyền tải, thật sự rất tuyệt.」"
# monologue
# JP: 撮影は全て、日々姫が仕切った。\nロケーションから構図から、衣装、小物に至るまで。
1687 = "Hibiki đã phụ trách toàn bộ buổi chụp hình.\nTừ địa điểm, bố cục, cho đến trang phục và đạo cụ."
# monologue
# JP: カメラマン――ウーマンの方も素晴らしい実力だった。\n軽快なトークと明快な指示で、終始緊張せずにいられた。
1701 = "Nữ nhiếp ảnh gia cũng có thực lực tuyệt vời.\nNhờ cách nói chuyện nhẹ nhàng và chỉ đạo rõ ràng, chúng tôi đã không hề căng thẳng từ đầu đến cuối."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄様に、紋付きの羽織袴がお似合いになるとは\nわかっておりましたが、これ程とは」
1109 = "「Em biết ngài Soutetsu mặc áo haori và quần hakama có gia huy sẽ rất hợp,\nnhưng không ngờ lại hợp đến mức này.」"
# monologue
# JP: ほうっと、ため息。撮影を終えて程ない興奮もあろうが、\nすずの頬は、触れればきっとぽかぽかな程の紅色だ。
1799 = "Suzu thở phào nhẹ nhõm. Có lẽ vẫn còn chút phấn khích sau buổi chụp hình,\nđôi má của em ấy ửng đỏ đến mức nếu chạm vào chắc chắn sẽ thấy âm ấm."
# 【双鉄】
# display as 雙鐵
# JP: 「似合うとは、お前のための言葉だ」
1359 = "「Từ 'hợp' là để dành cho em đấy.」"
# monologue
# JP: 頬から喉へ、胸元、腰を経、足先にまで視線を落とす。\n僕の喉からもほうっと、自然、ため息がこぼれ出る。
1664 = "Ánh mắt tôi trượt từ má xuống cổ, qua ngực, eo, rồi đến tận mũi chân.\nTừ cổ họng tôi, một tiếng thở dài cũng tự nhiên bật ra."
# 【双鉄】
# display as 雙鐵
# JP: 「……完璧な美しさだ。これほど可憐な花嫁御寮は、\n世界のどこを探したところで、他におるまい」
845 = "「……Một vẻ đẹp hoàn hảo. Một cô dâu đáng yêu nhường này,\ndù có tìm khắp thế giới cũng chẳng có người thứ hai đâu.」"
# 【ハチロク】
# display as 鈴
# JP: 「おおげさすぎます。双鉄さまったら」
1300 = "「Ngài nói quá rồi. Ngài Soutetsu thật là.」"
# monologue
# JP: いたずらっぽくぷうと膨らむ頬の紅色が、更に濃くなる。\nその赤が、白無垢をいっそう引き立てる。
1598 = "Đôi má phồng lên tinh nghịch càng thêm ửng đỏ.\nSắc đỏ ấy càng làm nổi bật bộ Shiromuku."
# 【双鉄】
# display as 雙鐵
# JP: 「このまま式を――\n今ひとたびの結婚式を、挙げたくなってしまうくらいだ」
1352 = "「Cứ thế này mà cử hành hôn lễ——\nAnh muốn tổ chức một lễ cưới ngay lúc này luôn đấy.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ……」
1230 = "「A……」"
# monologue
# JP: すずにあわせて、僕にあわせて。\n撮影用に製作したゆえ、長持ちはせぬ衣装と聞いた。
1739 = "Được may đo vừa vặn cho Suzu, và cho cả tôi.\nVì được làm riêng cho buổi chụp hình, nên nghe nói đây là những bộ trang phục không được bền cho lắm."
# 【ハチロク】
# display as 鈴
# JP: 「お、おからかいにならないでください！\n双鉄さまったら」
1424 = "「X-xin ngài đừng trêu em nữa!\nNgài Soutetsu thật là.」"
# 【双鉄】
# display as 雙鐵
# JP: 「からかってなど」
1206 = "「Anh đâu có trêu.」"
# monologue
# JP: だから持ち帰っても、捨てても構わぬと日々姫は言った。\nそれはつまりはそうした意味の気遣いだろうと思うゆえ。
1682 = "Thế nên Hibiki mới nói mang về hay vứt đi cũng không sao.\nTôi nghĩ đó chính là sự tinh tế mang ý nghĩa như vậy."
# 【ハチロク】
# display as 鈴
# JP: 「きゃっ！？」
1145 = "「Á!?」"
# monologue
# JP: ――押し倒す。\nシワになろうと構わぬ勢いで手をのばす。
820 = "——Tôi đè em ấy xuống.\nVươn tay ra với một lực bất chấp quần áo có bị nhăn nhúm."
# 【双鉄】
# display as 雙鐵
# JP: 「無論、結婚式は生涯一度だ」
1347 = "「Tất nhiên, lễ cưới chỉ có một lần trong đời.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ！」
1244 = "「A!」"
# monologue
# JP: ぱっと、すずの顔が華やぐ。\n僕の手が性感を与えはじめるより早く。
1534 = "Gương mặt Suzu bừng sáng.\nCòn nhanh hơn cả lúc bàn tay tôi bắt đầu mang lại khoái cảm."
# 【ハチロク】
# display as 鈴
# JP: 「左様ですね。結婚式は生涯一度。\n双鉄さまも、わたくしも、一度だけしか経験しないもの」
1302 = "「Đúng vậy ạ. Lễ cưới chỉ có một lần trong đời.\nCả ngài Soutetsu và em, đều chỉ trải qua một lần duy nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、ふたりっきりの、ごっこ遊びになってしまうが」
1393 = "「Vì vậy, đây sẽ trở thành một trò chơi đóng giả chỉ có hai chúng ta.」"
# monologue
# JP: （さわっ、さすっ）
1995 = "（Sờ nhẹ, vuốt ve）"
# 【ハチロク】
# display as 鈴
# JP: 「んっ！」
1268 = "「Ưm!」"
# monologue
# JP: 裾を、割る。\n穢れなきものの象徴を、穢すそのため、指を這わせる。
1675 = "Tôi vén vạt áo lên.\nĐể làm vấy bẩn biểu tượng của sự tinh khiết, những ngón tay tôi bắt đầu trườn tới."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、お前と[にせ,1]二世の[ちぎ]契りを結びたい。\n白無垢姿のお前を抱いて――今一度深く、刻みたい」
1316 = "「Anh muốn kết duyên vợ chồng với em.\nÔm em trong bộ Shiromuku này——khắc ghi thật sâu một lần nữa.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい、わたくしも契りとう――\n幾度でも、幾重にも。誓いを重ねとう存じます」
1357 = "「Vâng, em cũng muốn kết duyên——\nDù bao nhiêu lần, dù bao nhiêu kiếp. Em muốn cùng ngài thề non hẹn biển.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、だ」
1328 = "「Nếu vậy thì.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ……んっ」
1235 = "「A…… ưm.」"
# monologue
# JP: まず唇で契りを交わす。\n口づける。
1702 = "Trước tiên là trao nhau lời thề bằng đôi môi.\nTôi hôn em ấy."
# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅっ――ん……ふ……ぁ……\nふっ――ちゅむっ――ちゅうっ――れるっ」
1252 = "「Ưm…… chụt——ưm…… fu…… a……\nFu——chum——chuu——reru」"
# monologue
# JP: 無垢という言葉を投げ打つ舌使い。\nすずはめいっぱい舌を伸ばして、僕の口内に侵入してくる。
1819 = "Cách dùng lưỡi vứt bỏ hoàn toàn từ 'tinh khiết'.\nSuzu vươn dài lưỡi hết cỡ, xâm nhập vào khoang miệng tôi."
# 【ハチロク】
# display as 鈴
# JP: 「あむっ――ふっ――んっ――れうっ――りゅっ――\nちゅむっ――ちゅうっ――じゅりゅっ――」
1241 = "「Amu——fu——ưm——reu——ryu——\nChum——chuu——juryu——」"
# monologue
# JP: 舌と舌とをくっつけあって溶かし合う。\nその快感が、脳をもゆるゆる蕩かしていく。
1765 = "Hai chiếc lưỡi quấn lấy nhau, hòa quyện vào nhau.\nKhoái cảm đó khiến cả não bộ cũng dần tan chảy."
# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅむっ――ちゅずっ――じゅっ――（こくっ）\n――ちゅむっ――れるっ――れろっ――ちゅりゅっ」
1213 = "「Ưm…… chum——chuzu——ju——(ực)\n——chum——reru——rero——churyu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……ぷ」
1211 = "「Ưm…… pu.」"
# 【ハチロク】
# display as 鈴
# JP: 「ぷぁ……ぁ――」
1154 = "「Pua…… a——」"
# monologue
# JP: 名残を惜しむような声。\nその声がそのまま形になったかのように、つながる唾液。
1806 = "Một âm thanh như nuối tiếc.\nNước bọt kéo sợi như thể âm thanh đó đã thành hình."
# 【ハチロク】
# display as 鈴
# JP: 「あ――……ん――」
1233 = "「A——……ưm——」"
# monologue
# JP: すずはさりげなく唾液を吸い込み。\nそうしてじっと、僕の目を見る。
1792 = "Suzu khéo léo nuốt nước bọt vào.\nSau đó chăm chú nhìn vào mắt tôi."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま――契りは、これでおしまいですか？」
1418 = "「Ngài Soutetsu——lời thề, chỉ đến đây thôi sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさか。唇を交わすだけで為す誓いなら、\nすでに僕らは幾万度となくたてている。ゆえ――」
1296 = "「Làm gì có chuyện đó. Nếu chỉ là lời thề bằng đôi môi,\nthì chúng ta đã thề hàng vạn lần rồi. Vì vậy——」"
# monologue
# JP: （さすっ）
1994 = "（Vuốt ve）"
# 【ハチロク】
# display as 鈴
# JP: 「はうっ」
1242 = "「Hau.」"
# monologue
# JP: 先程割った裾から上へと、\nゆっくりゆっくり指を這わせる。
1662 = "Từ vạt áo vừa vén lên ban nãy,\ntôi chậm rãi, chậm rãi trườn ngón tay lên trên."
# 【ハチロク】
# display as 鈴
# JP: 「あ……や――はずかしい、です。\n双鉄、さま」
1232 = "「A…… ya——xấu hổ, quá.\nNgài, Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば嬉しい。僕はお前の、\n羞恥に震える姿も美しく可憐と感じるゆえに」
1391 = "「Thế thì anh rất vui. Bởi vì,\ndáng vẻ run rẩy vì xấu hổ của em, anh cũng thấy vô cùng xinh đẹp và đáng yêu.」"
# 【ハチロク】
# display as 鈴
# JP: 「や……。そのような意地悪を――\nん……おっしゃらないで、ください、まし――」
1377 = "「Không…… Xin ngài đừng trêu chọc em——\nƯm…… như vậy, nữa——」"
# monologue
# JP: ご要望に沿い唇を閉じ、\nかわりに指を、またじわじわと這い登らせる。
1669 = "Chiều theo ý em ấy, tôi khép môi lại,\nthay vào đó, những ngón tay lại tiếp tục từ từ trườn lên."
# monologue
# JP: （ぴちゅっ）
1984 = "（Lép nhép）"
# monologue
# JP: 太ももをつたう愛液が、僕の指先を濡らし始める。\n口づけただけで濡れたのかと――む？
1859 = "Dâm thủy chảy dọc đùi bắt đầu làm ướt đầu ngón tay tôi.\nChỉ mới hôn thôi mà đã ướt thế này rồi sao——hửm?"
# 【ハチロク】
# display as 鈴
# JP: 「あ……や――ふ、ぁ――\nはずかし――はずかしゅうございます」
1237 = "「A…… ya——fu, a——\nXấu hổ——em xấu hổ lắm ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すず？」
1404 = "「Suzu?」"
# monologue
# JP: 指に絡まる雫が明らかに多すぎる。\nまるで……そう。遮る物が、何一つとて無いように。
1712 = "Những giọt nước dính trên ngón tay tôi rõ ràng là quá nhiều.\nCứ như thể…… đúng vậy. Chẳng có lấy một vật cản nào."
# 【双鉄】
# display as 雙鐵
# JP: 「すず」
1399 = "「Suzu.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい――なん、でしょう――\n双鉄、さま」
1251 = "「Vâng——có chuyện, gì vậy ạ——\nNgài, Soutetsu.」"
# monologue
# JP: すずは和装。着付けを手伝ったのは日々姫一人。\nならば、すずは。恐らく――伝統にこだわったのだろう。
1800 = "Suzu đang mặc kimono. Người giúp mặc chỉ có một mình Hibiki.\nNếu vậy thì Suzu. Có lẽ——đã tuân theo đúng truyền thống."
# 【双鉄】
# display as 雙鐵
# JP: 「股を大きく、開いて欲しい」
1320 = "「Anh muốn em, mở rộng hai chân ra.」"
# 【ハチロク】
# display as 鈴
# JP: 「っ！！？」
1152 = "「!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「股を。大きく。開いて。欲しい。」
1322 = "「Anh muốn. Em mở rộng. Hai chân ra.」"
# 【ハチロク】
# display as 鈴
# JP: 「――――――」
828 = "「――――――」"
# monologue
# JP: 絶句。言葉は出てこない。\nただただ静かな呼気と吸気が幾度も重なる。
1715 = "Cạn lời. Không thốt nên lời.\nChỉ có những tiếng hít thở tĩnh lặng liên tục đan xen."
# 【ハチロク】
# display as 鈴
# JP: 「――――ぅてつ、さ、ま……」
830 = "「――――utetsu, sa, ma……」"
# monologue
# JP: かぼそい声が、僕の名を呼ぶ。
1595 = "Một giọng nói yếu ớt gọi tên tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「！」
1218 = "「!」"
# 【ハチロク】
# display as 鈴
# JP: 「……………………」
834 = "「……………………」"
# monologue
# JP: 再び沈黙。呼吸が荒らぐ。そしてゆるゆる――\nすずは股間を、その太ももを割り開いていく。
1592 = "Lại chìm vào im lặng. Nhịp thở trở nên gấp gáp. Rồi chầm chậm——\nSuzu dang rộng hai đùi, mở phơi bày vùng kín của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「ぁあ――」
1225 = "「Aa——」"
# 【ハチロク】
# display as 鈴
# JP: 「っ！」
# 1218 = "「唔！」" 
# monologue
# JP: 我知らず漏れてしまった声に、すずはビクリと体を震わす。\nけれど、その股を閉じはしない。
1738 = "Nghe tiếng tôi vô thức thốt ra, cơ thể Suzu khẽ run lên.\nNhưng em ấy không hề khép hai chân lại."
# 【ハチロク】
# display as 鈴
# JP: 「あの、大事な撮影と聞き及んでおりましたし、和装用の\n下着の準備もなく。万一にも下着の線が出るよりは、と」
1111 = "「Dạ, vì em nghe nói đây là một buổi chụp hình quan trọng, mà lại không chuẩn bị đồ lót\ndành riêng cho kimono. Thay vì lỡ như lộ đường viền đồ lót, thì em nghĩ……」"
# monologue
# JP: 言い訳めいていながらつややかに響く声。\n声のその度、かわいい割れ目もちいさく震える。
1857 = "Một giọng nói vang lên đầy quyến rũ như đang biện hộ.\nMỗi lần cất giọng, khe hở đáng yêu ấy lại khẽ rung lên."
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1257 = "「Ừm.」"
# monologue
# JP: 日々姫に頼めばそのような手配、\n恐らく一瞬で整えたろう。
1602 = "Nếu nhờ Hibiki sắp xếp chuyện đó,\ncó lẽ chỉ trong nháy mắt là xong ngay."
# monologue
# JP: 撮影が終わり帰宅するまででも、下着一枚はく時間、\nいくらでも作ることができたろう。なら――
1630 = "Ngay cả khi kết thúc buổi chụp hình và về nhà, thời gian để mặc một chiếc quần lót,\nthích thì lúc nào chẳng có. Vậy thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「まこと称賛されるべき、極めて合理的な判断だ」
1349 = "「Thật đáng khen ngợi, một quyết định vô cùng hợp lý.」"
# monologue
# JP: （くちっ）
2004 = "（Nhóp nhép）"
# monologue
# JP: “このときのため”。すずは服装を一切変えずに帰宅した。\n僕がしたのと、おんなじように。
827 = "“Chính là vì lúc này”. Suzu đã về nhà mà không hề thay đồ.\nCũng giống y như những gì tôi đã làm."
# 【双鉄】
# display as 雙鐵
# JP: 「すずは、本当に賢いな。\n僕にはもったいないほどだ。ん……」
1097 = "「Suzu, em thật sự rất thông minh.\nĐến mức quá lãng phí đối với anh. Ưm……」"
# 【ハチロク】
# display as 鈴
# JP: 「ふぁっ、あっ、あっ、あっ」
1159 = "「Fua, a, a, a.」"
# monologue
# JP: 黒髪に何度も何度も口づけて、鼻を心地よくくすぐられ。\n同時に指を、割れ目の可愛い筋に幾度も滑らせる。
1641 = "Tôi hôn đi hôn lại lên mái tóc đen nhánh, chiếc mũi được cọ xát thật dễ chịu.\nĐồng thời, tôi trượt ngón tay nhiều lần trên đường rãnh đáng yêu của khe hở."
# monologue
# JP: （しゅっ――しにゅ――くちっ――しゅっ――）
# 1984 = "（水聲）" 
# 【ハチロク】
# display as 鈴
# JP: 「んぅっ！　んっ！　あっ！　んふっ！\n双鉄、さま――そうてつさまぁ」
1262 = "「Nn! Nn! A! Nfu!\nNgài Soutetsu——Ngài Soutetsu~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1257 = "「嗯」" 
# monologue
# JP: すずが自ら腰を浮かして、気持ちいい場所、陰核に、\n僕の手指が触れるようにと可愛く踊る。
1818 = "Suzu tự mình nâng hông lên, uốn éo một cách đáng yêu\nđể ngón tay tôi chạm vào điểm sung sướng, âm vật của em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。もう少し長く大きく動かそう」
1274 = "「Anh hiểu rồi. Anh sẽ di chuyển dài và mạnh hơn một chút nhé.」"
# monologue
# JP: （しゅるうっ――しにゅうっ――ちゅむうっ――）
1982 = "（Sột soạt——xâm nhập——chụt——）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃっっ！？　あっ――ふあっ――んっ――\nきゅふっ！！　はぅっ――いい――いい、ですっ」
1147 = "「Hya!? A——fua——ưm——\nKyufu!! Hau——thích——thích, lắm ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1379 = "「Vậy sao.」"
# monologue
# JP: 中指を大きく動かす度に、関節が陰核をこするその度、\n面白いほど素直にすずの体がヒクつく。
1854 = "Mỗi lần tôi di chuyển ngón giữa thật mạnh, mỗi lần khớp ngón tay cọ xát vào âm vật,\ncơ thể Suzu lại giật nảy lên một cách thành thật đến thú vị."
# monologue
# JP: （くっ！）
1990 = "（Hự!）"
# 【ハチロク】
# display as 鈴
# JP: 「ぅきゅっ！？」
1167 = "「Ukyu!?」"
# monologue
# JP: （しにゅううううううううううううっっっっ）
1965 = "（Xâm nhậpppppppppppppppppppppppppppp）"
# 【ハチロク】
# display as 鈴
# JP: 「んんんんぅぅぅぅ～～～～～っ！！！」
1264 = "「Nnnnnnuuuuu~~~~~!!!」"
# monologue
# JP: 力を込めて食い込ませながら摺りあげてやれば、\nすずは素直にかわいい声を聞かせてくれる。
1648 = "Khi tôi dồn sức ấn sâu vào và vuốt ngược lên,\nSuzu ngoan ngoãn cất lên những âm thanh đáng yêu."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1238 = "「A.」"
# monologue
# JP: そうして、同時に気付かされる。\nすずのおまんまんの入り口は、物欲しそうに――
1609 = "Và rồi, đồng thời tôi cũng nhận ra.\nLối vào cô bé của Suzu, trông như đang thèm khát——"
# monologue
# JP: （ぴとっ）
2007 = "（Chạm nhẹ）"
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ」
1160 = "「Fua.」"
# monologue
# JP: 中指の先を押し当てたなら、ぴたりと張り付かれるような\n――ああ、いや、実際吸われているのか。
1654 = "Khi tôi ấn đầu ngón giữa vào, cảm giác như bị dính chặt lấy\n——À, không, thực tế là đang bị mút chặt."
# monologue
# JP: （ぴちゅっ）
1935 = "（Lép nhép）"
# 【ハチロク】
# display as 鈴
# JP: 「ゃあっ」
1141 = "「Yaa.」"
# monologue
# JP: （とん――とん――とん――とん）
1978 = "（Cốc——cốc——cốc——cốc）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ！？　ぁっ――あっ――んうっ！　ふっ……ぁ、\nじ、焦らさないでくださいましっ、んっ！　双鉄さまっ」
1149 = "「Hya!? A——a——ưm! Fu…… a,\nx-xin ngài đừng trêu chọc em nữa, ưm! Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1238 = "「啊」" 
# monologue
# JP: 礼儀は大事だ。\n膣口を丁寧にノックしたなら、[なか,1]膣内へご招待いただけた。
1724 = "Lễ nghi rất quan trọng.\nSau khi lịch sự gõ cửa âm đạo, tôi đã được mời vào bên trong."
# 【双鉄】
# display as 雙鐵
# JP: 「では、失礼する」
1395 = "「Vậy thì, xin thất lễ.」"
# monologue
# JP: （つぬっ）
1973 = "（Sụt）"
# 【ハチロク】
# display as 鈴
# JP: 「ふやっ！！？　ゆ、指っ――\n双鉄さまのお指が――んっ――ふぁっ」
1158 = "「Fuya!!? Ng-ngón tay——\nNgón tay của ngài Soutetsu——ưm——fua.」"
# monologue
# JP: （ああ）
1937 = "（A）"
# monologue
# JP: 驚いたような声がすぐさま快感に溶け、\nその愛らしさに気付かされる。
1599 = "Giọng nói ngạc nhiên ngay lập tức tan chảy vào khoái cảm,\nđiều đó khiến tôi nhận ra sự đáng yêu của em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「すずのおまんまんに入るのは……\n僕のおちんちんか舌かのどちらかだけだものな。普段は」
1290 = "「Bình thường, những thứ đi vào cô bé của Suzu……\nchỉ có dương vật hoặc lưỡi của anh thôi nhỉ.」"
# 【ハチロク】
# display as 鈴
# JP: 「は、はいっ――ですので、わたくし、\n少し、だけ――んっ！」
1336 = "「V-vâng——vì vậy, em,\nchỉ một chút——ưm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その珍しさを楽しもう。\n僕も、お前も――ゆっくりゆっくり」
1388 = "「Vậy thì, hãy cùng tận hưởng sự mới mẻ này.\nCả anh, và cả em——từ từ, chầm chậm thôi.」"
# monologue
# JP: （ずっ――るっ――にゅ――うっ）
1976 = "（Sụt——soạt——xâm——nhập）"
# 【ハチロク】
# display as 鈴
# JP: 「は、はひっ――はいっ。かしこまり、ましっ、んぁっ！\nんうっ――そう、てつ――さまぁ」
1278 = "「H-hahi——vâng. Đã rõ, rồi ạ, n a!\nN u——Sou, tetsu——sama~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1257 = "「嗯」" 
# monologue
# JP: 中指一本。時間をかけて挿入して、\n第二関節まで進んだところでひとまず止まる。
1856 = "Chỉ một ngón giữa. Tôi dành thời gian để từ từ đưa vào,\nđến đốt ngón tay thứ hai thì tạm dừng lại."
# 【双鉄】
# display as 雙鐵
# JP: 「……暖かというより熱い。……指一本でも狭いものだな。\n柔らかにぬかるんでるのに、包まれているというよりも」
861 = "「……Nóng hơn là ấm. ……Dù chỉ một ngón tay cũng thấy chật chội nhỉ.\nDù mềm mại ướt át, nhưng thay vì nói là được bao bọc thì.」"
# 【ハチロク】
# display as 鈴
# JP: 「ふえっ！？」
1202 = "「Fue!?」"
# monologue
# JP: （くっ）
2003 = "（Hự）"
# 【ハチロク】
# display as 鈴
# JP: 「んひゅっ！？」
1258 = "「Nhyu!?」"
# monologue
# JP: わずかに指を折り曲げ膣壁を刺激したなら、\nすずはかわいくいやいやをする。頭でも、体全部でも。
1659 = "Chỉ cần hơi cong ngón tay kích thích thành âm đạo,\nSuzu liền phản ứng lắc đầu đáng yêu. Cả đầu, và cả toàn thân."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ざらざら――いや、ツブツブとしているな。\nこれが僕の勃起を刺激してくれているのか」
1118 = "「Ra là vậy, ram ráp——không, là sần sùi nhỉ.\nĐây là thứ kích thích sự cương cứng của anh sao.」"
# 【ハチロク】
# display as 鈴
# JP: 「～～～～～～っ」
1435 = "「~~~~~~」"
# monologue
# JP: 心細くて甘えたい子猫のような声が漏れる。\n膣内も甘くわななき震え、締りが強くなったと感じる。
1813 = "Một giọng nói thốt ra như một chú mèo con bơ vơ muốn được nuông chiều.\nBên trong âm đạo cũng run rẩy ngọt ngào, tôi cảm thấy nó siết chặt hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「……勃起はひどく繊細なものと思っていたが――\n指先は、なお鋭敏な感覚を持つものかもしれんな」
854 = "「……Anh cứ nghĩ cương cứng là một thứ cực kỳ nhạy cảm——\nNhưng có lẽ đầu ngón tay còn có cảm giác nhạy bén hơn nữa.」"
# monologue
# JP: 伝わってくる感触をより詳細に確かめたくて、\nゆっくりゆっくり、指をわずかに折り曲げたまま――
1737 = "Muốn xác nhận chi tiết hơn cảm giác đang truyền đến,\ntôi từ từ, chầm chậm, giữ nguyên ngón tay hơi cong——"
# monologue
# JP: （つ――ぷっ――にゅ――むっ――）
2012 = "（Sụt——phụt——xâm——nhập——）"
# 【ハチロク】
# display as 鈴
# JP: 「ふぁっ――あっ――あっ――んうっ！！！？」
1173 = "「Fua——a——a——ưm!!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
1214 = "「Hửm.」"
# monologue
# JP: 指先、ひときわ粒だった肌触り。\n同時にすずの声が跳ねる。
1693 = "Đầu ngón tay chạm vào một bề mặt sần sùi đặc biệt.\nĐồng thời giọng nói của Suzu cũng nảy lên."
# 【双鉄】
# display as 雙鐵
# JP: 「ここか？」
1335 = "「Đây sao?」"
# monologue
# JP: （くにっ）
2013 = "（Chạm nhẹ）"
# 【ハチロク】
# display as 鈴
# JP: 「はひゅんっ！！」
1185 = "「Hahyun!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ここが勃起でも感じる部分か。\nすずの膣内の浅いところの天井側のツブツブの」
1116 = "「Ra vậy. Đây là phần mà dương vật cũng cảm nhận được sao.\nNhững hạt sần sùi ở phía trên trần, phần nông bên trong âm đạo của Suzu.」"
# 【ハチロク】
# display as 鈴
# JP: 「そ、そうてつさまっ」
1416 = "「S-Soutetsu-sama.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　おお」
1267 = "「Hửm? Ồ.」"
# monologue
# JP: すずの首筋が真っ赤になってる。\nぶわぶわ汗を浮かしてる。
1797 = "Cổ Suzu đỏ bừng.\nMồ hôi rịn ra nhễ nhại."
# 【ハチロク】
# display as 鈴
# JP: 「か、解説は恥ずかしゅうございます。\nどうぞお許しを――おまんまんの、中の、解説ばかりは」
1298 = "「G-giải thích thì xấu hổ lắm ạ.\nXin ngài tha cho em——đừng giải thích, bên trong, cô bé của em nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこまで照れさせてしまったか。\n夢中になるうち度を越したらしいな。申し訳ない」
1351 = "「Làm em xấu hổ đến vậy sao.\nCó vẻ như mải mê quá nên anh hơi quá đà rồi. Xin lỗi em.」"
# 【ハチロク】
# display as 鈴
# JP: 「いえ――いえ――。けれど……もしよろしければ、\nお口を動かす、その代わり」
1207 = "「Không——không đâu ạ——. Nhưng mà…… nếu được thì,\nthay vì dùng miệng」"
# monologue
# JP: こくり、と小さな音が聞こえる。\nすずが生唾を飲む音が。
1795 = "Một tiếng ực nhỏ vang lên.\nTiếng Suzu nuốt nước bọt."
# 【ハチロク】
# display as 鈴
# JP: 「お指を、どうか――とんとんとんって……\nそこの、ところで、とんとんとんって」
1363 = "「Xin ngài hãy dùng ngón tay——cốc cốc cốc……\nở, chỗ đó, cốc cốc cốc đi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「こうか？」
1383 = "「Thế này à?」"
# monologue
# JP: （ぷにっ――くにゅっ――ぷりゅっ――ぐにっ）
1931 = "（Puni——kunyu——puryu——guni）"
# 【ハチロク】
# display as 鈴
# JP: 「んん～～～～～～っ！！！！」
1265 = "「Nn~~~~~~!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1203 = "「Ồ.」"
# monologue
# JP: 劇的なまでのすずの反応。声こそ押し殺していても、\n体と膣は喜びの余りわななき震える。
1803 = "Phản ứng của Suzu thật mãnh liệt. Dù em ấy đã cố kìm nén giọng nói,\nnhưng cơ thể và âm đạo vẫn run rẩy vì sung sướng."
# 【双鉄】
# display as 雙鐵
# JP: 「じゅぶじゅぶずぼずぼするよりも、\nこのくにくにの方が良いのか」
1339 = "「Thay vì ra ra vào vào nhóp nhép,\nthì ấn ấn thế này thích hơn sao.」"
# 【ハチロク】
# display as 鈴
# JP: 「はいっ！　はいっ！　双鉄さまっ――どうか、んっ、\nどうか――いまの強さでっ、同じ速さでっ、とんとんと」
1333 = "「Vâng! Vâng! Ngài Soutetsu——xin ngài, ưm,\nxin ngài——giữ nguyên lực này, tốc độ này, cốc cốc cốc đi ạ.」"
# monologue
# JP: （ぶにゅ――くちゅっ――くむっ――ぬにゅっ）
1943 = "（Bunyu——kuchu——kumu——nunyu）"
# 【ハチロク】
# display as 鈴
# JP: 「ああっ――いいっ――きもちいいっ――\nそうてつ、さまっ――だんな、さまっ――」
1228 = "「Aa——thích——sướng quá——\nSou, tetsu, sama——phu, quân——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1257 = "「嗯」" 
# monologue
# JP: 愛おしい。指先ひとつでこれほどまでに踊ってくれる\nかわいい妻を、だからもっともっと喜ばせたくなる。
1718 = "Thật đáng yêu. Chỉ với một đầu ngón tay mà người vợ bé nhỏ đã uốn éo đến nhường này,\nkhiến tôi càng muốn làm em ấy sung sướng hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「な？　すず。\n僕のかわいい、僕だけのすず」
1398 = "「Phải không? Suzu.\nSuzu đáng yêu của anh, Suzu của riêng anh.」"
# 【ハチロク】
# display as 鈴
# JP: 「～～～っ」
1430 = "「~~~」"
# monologue
# JP: ゆえに鼓膜も刺激する。\nできる限りに低く甘くと意識しながら声を出す。
1681 = "Vì vậy, tôi kích thích cả màng nhĩ em ấy.\nCố ý cất giọng thật trầm và ngọt ngào nhất có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「このまま達して、かわいい姿を見せてくれ」
1283 = "「Cứ thế này mà lên đỉnh đi, cho anh xem dáng vẻ đáng yêu của em nào.」"
# 【ハチロク】
# display as 鈴
# JP: 「はうぅっ」
1186 = "「Hauu.」"
# monologue
# JP: しあわせそうに、ぴくんと甘く震えてくれる。\n声の間は指の動きを、あえて止めたにもかかわらず。
1554 = "Em ấy giật nảy lên và run rẩy ngọt ngào đầy hạnh phúc.\nMặc dù trong lúc nói, tôi đã cố tình dừng ngón tay lại."
# monologue
# JP: （くくっ――くにゅっ――くいっ――むにゅっ――）
1961 = "（Kuku——kunyu——kui——munyu——）"
# 【ハチロク】
# display as 鈴
# JP: 「はうっ！　それっっ――んふっ――響き、ますっ――\nとんとんとんっ――お指っ――そうてつ、さまのっ」
1187 = "「Hau! Cái đó——nfu——vang vọng, lắm ạ——\nCốc cốc cốc——ngón tay——của ngài Sou, tetsu.」"
# monologue
# JP: 包まれる中クニクニとかき分けまげる指先が、\nすずにはトントン響くらしい。なら――
1661 = "Đầu ngón tay đang cong lại vạch tìm bên trong sự bao bọc,\ndường như vang vọng cốc cốc đối với Suzu. Nếu vậy——"
# monologue
# JP: （ざりゅっ――くるっ――ぷにっ――くりゅっ）
1972 = "（Zaryu——kuru——puni——kuryu）"
# 【ハチロク】
# display as 鈴
# JP: 「はうっ！？　ひゅっ――んっ！　いいっ！\nおゆびっ――うごいてっ――くりゅんて――まわって」
1188 = "「Hau!? Hyu——ưm! Thích!\nNgón tay——đang chuyển động——xoay tròn——xoay vòng.」"
# monologue
# JP: （くにっ――くいっ――ぐにゅっ――ぐいっ）
1970 = "（Kuni——kui——gunyu——gui）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃああああっっ――はっ――んっ、あっ、\nそうてつ、さま――双鉄さま、双鉄さま、旦那さまぁ」
1139 = "「Hyaaaaa——ha——ưm, a,\nSou, tetsu, sama——Ngài Soutetsu, ngài Soutetsu, phu quân~」"
# 【双鉄】
# display as 雙鐵
# JP: 「すず？　そのまま指に集中するんだ」
1403 = "「Suzu? Cứ thế tập trung vào ngón tay anh đi.」"
# 【ハチロク】
# display as 鈴
# JP: 「はひっ――はいっ――んっ！！」
1181 = "「Hahi——vâng——ưm!!」"
# monologue
# JP: （ぐにゅ――じにゅっ――じぶっ――じゅぶっ――）
1987 = "（Gunyu——jinyu——jibu——jubu——）"
# monologue
# JP: おねだりされてる。すずの膣内の蠕動に。\nにゅるにゅる熱くまとわりついて、奥へ奥へと誘われる。
1811 = "Đang bị vòi vĩnh. Bởi sự nhu động bên trong âm đạo của Suzu.\nNó nhơm nhớp, nóng rực quấn lấy tôi, mời gọi tôi vào sâu, sâu hơn nữa."
# monologue
# JP: （くにゅっ――じゅるっ――くりゅんっ――ぐにっ）
1967 = "（Kunyu——juru——kuryun——guni）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ！　あっ！　あっ！　あっ！！\nわらくひっ、ひゃう！　もうっ、もう、もう、もうっ！」
1143 = "「Hya! A! A! A!!\nE-em, hyau! Sắp, sắp, sắp, sắp rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「もうちょっとだけ――我慢できぬか？」
1100 = "「Thêm một chút nữa thôi——em không nhịn được sao?」"
# monologue
# JP: （くちゅっ――むにゅっ――くちっ――ぐいっ）
1933 = "（Kuchu——munyu——kuchi——gui）"
# 【ハチロク】
# display as 鈴
# JP: 「ふえっ！？　がまっ――がまんっ――ん、ふっ、\nはぁっ――はっ――ふっ、あんっ！　も、もうっ我慢っ」
1163 = "「Fue!? Nhịn——nhịn——ưm, fu,\nha——ha——fu, an! Kh-không nhịn được nữa đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「限界か？　なら――」
1113 = "「Đến giới hạn rồi sao? Vậy thì——」"
# monologue
# JP: 中指の腹でぞろり粒立ちを擦りつけながら押しつぶす。
1657 = "Tôi dùng bụng ngón giữa chà xát và ấn mạnh vào những hạt sần sùi."
# monologue
# JP: （くりゅっ！　ぐくっ！！）
1963 = "（Kuryu! Guku!!）"
# 【ハチロク】
# display as 鈴
# JP: 「～～～～～～～～～～～～っ！！！！！！」
1437 = "「~~~~~~~~~~~~!!!!!!」"
# monologue
# JP: きゅうううんと一気に膣がしまっ――っ！！？？
1810 = "Âm đạo đột ngột siết chặt lại——!!??"
# monologue
# JP: （ぴゅっ！　ぴゅっぴゅっ！！）
1983 = "（Phụt! Phụt phụt!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！？」
1223 = "「!!!?」"
# 【ハチロク】
# display as 鈴
# JP: 「～～～～～～っ！！！！　――ぁ――はっ――あっ！」
1434 = "「~~~~~~!!!! ——a——ha——a!」"
# monologue
# JP: がくがく全身を震わせているすず自らは気づいてないのか、\nその股間から、膣口ではない小さな穴から――
1775 = "Suzu đang run rẩy bần bật toàn thân có lẽ không nhận ra,\ntừ vùng kín của em ấy, từ một lỗ nhỏ không phải cửa âm đạo——"
# monologue
# JP: （ぴゅっ！　ぴゅるっ！）
1944 = "（Phụt! Phụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ――あっ――あっ――（ごくっ）――\nはあっ――はあっ――はあっ――はあっ――」
1174 = "「Fua——a——a——(ực)——\nHa——ha——ha——ha——」"
# monologue
# JP: （ぴゅる――じゅわっ）
1966 = "（Phụt——ào）"
# 【ハチロク】
# display as 鈴
# JP: 「えっ！？」
1162 = "「Hả!?」"
# monologue
# JP: 絶頂しきりくったり力を失っていた小さな顔が持ち上がる。\nその目は股間のその先に、シーツにできた小さなシミに。
1796 = "Khuôn mặt nhỏ nhắn vừa lên đỉnh xong đang mất sức bỗng ngẩng lên.\nÁnh mắt hướng về phía trước vùng kín, nơi có một vết ướt nhỏ trên ga trải giường."
# 【ハチロク】
# display as 鈴
# JP: 「えっ！？　やっ――わたくし――そ、粗相をっ！？\nおもらっ――あうっ――異常排水だなんて、そんな」
1164 = "「Hả!? Không——em——đ-đã tè dầm sao!?\nTè dầm——au——xả nước bất thường thế này, sao lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、すず。これは正常な反応だ」
1086 = "「Không đâu, Suzu. Đây là phản ứng bình thường.」"
# 【ハチロク】
# display as 鈴
# JP: 「正常……なので、ございますか？」
1381 = "「Bình thường…… sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。潮吹きという現象らしい」
1256 = "「Ừ. Hình như gọi là hiện tượng squirting (triều xuy).」"
# monologue
# JP: すずの体に、すずに耽溺するがゆえ、\n僕も自然と知識を求め、セックスについて少しは学んだ。
1588 = "Vì đắm chìm vào cơ thể Suzu, đắm chìm vào Suzu,\ntôi cũng tự nhiên tìm tòi kiến thức và học hỏi một chút về tình dục."
# 【ハチロク】
# display as 鈴
# JP: 「しお……ふき……」
1342 = "「Triều…… xuy……」"
# 【双鉄】
# display as 雙鐵
# JP: 「くじらの潮吹きと同じ字を書く。\nその役割には諸説あるが」
1281 = "「Viết cùng chữ với cá voi phun nước.\nCó nhiều giả thuyết về vai trò của nó.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ……――んっ――ちゅむっ――ちゅうっ――っ」
1234 = "「A……——ưm——chum——chuu——」"
# monologue
# JP: キスをしながら、体をまさぐる。\n襟から割入り、小さな乳首を幾度もいじる。
1679 = "Vừa hôn, tôi vừa sờ soạng cơ thể em ấy.\nLuồn tay vào từ cổ áo, tôi vờn lấy núm vú nhỏ bé hết lần này đến lần khác."
# 【双鉄】
# display as 雙鐵
# JP: 「……挿入する際の潤滑を助けるためとの説が、\n有力であるとも書物でよんだ」
853 = "「……Anh từng đọc trong sách rằng giả thuyết nó giúp bôi trơn khi chèn vào\nlà có cơ sở nhất.」"
# 【ハチロク】
# display as 鈴
# JP: 「挿入の……わたしの、おまんまんに、双鉄さまの、\nおちんちんを――お迎えするための……しお、ふき」
1326 = "「Chèn vào…… để chào đón, dương vật của ngài Soutetsu,\nvào cô bé của em——triều, xuy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、すず」
1317 = "「Vì vậy, Suzu.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ――双鉄、さま……」
1229 = "「A——Ngài, Soutetsu……」"
# 【双鉄】
# display as 雙鐵
# JP: 「お互い服を、ぬらさぬようにしないとな」
1304 = "「Chúng ta phải cẩn thận để không làm ướt quần áo của nhau nhỉ.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい……」
1275 = "「Vâng……」"
# monologue
# JP: 打ち掛けを脱ぎ綺麗に畳んだすずを導き、\n僕の上へと跨がらせる。
1798 = "Tôi dẫn dắt Suzu, người vừa cởi chiếc áo khoác ngoài và gấp lại gọn gàng,\nngồi vắt vẻo lên người tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「今日は、お前から契って欲しい」
1090 = "「Hôm nay, anh muốn em là người chủ động trao lời thề.」"
# 【ハチロク】
# display as 鈴
# JP: 「かしこまりました。双鉄さま――\nんっ――」
1364 = "「Em hiểu rồi ạ. Ngài Soutetsu——\nƯm——」"
# monologue
# JP: 勃起はすでに完全な硬度を取り戻している。
1572 = "Sự cương cứng đã hoàn toàn khôi phục độ cứng."
# monologue
# JP: （ぷっ――ちゅうっ――）
2011 = "（Pu——chuu——）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1219 = "「!!」"
# monologue
# JP: ぼたぼたとよだれを垂らす小さな膣口にあたった瞬間、\nぬかるみきったその内側へと先端が吸われ喰い付かれる。
1743 = "Ngay khoảnh khắc chạm vào cửa âm đạo nhỏ bé đang nhỏ dãi ròng ráo,\nphần đầu dương vật bị hút và cắn chặt vào bên trong lớp bùn lầy lội đó."
# 【双鉄】
# display as 雙鐵
# JP: 「これ、は――」
1378 = "「Cái, này——」"
# monologue
# JP: 腰を一気に突き上げたい。その欲求がぶわりと膨らむ。\nすずのおまんまんはいつもより熱くうるおっている。
1635 = "Tôi muốn đẩy hông lên ngay lập tức. Ham muốn đó bùng lên dữ dội.\nCô bé của Suzu nóng bỏng và ướt át hơn mọi khi."
# 【ハチロク】
# display as 鈴
# JP: 「やっ、動かないでくださいましっ――んっ！」
1150 = "「Ya, xin ngài đừng cử động——ưm!」"
# monologue
# JP: （ちゅむっ――ぷりゅっ）
2008 = "（Chum——puryu）"
# 【双鉄】
# display as 雙鐵
# JP: 「動いていない――っ――勃起が勝手に――\n喜んで――そうして、震えてしまっているのだ」
1308 = "「Anh không có cử động——sự cương cứng tự ý——\nvui sướng——rồi run rẩy lên đấy chứ.」"
# 【ハチロク】
# display as 鈴
# JP: 「まぁ」
1168 = "「Chà.」"
# monologue
# JP: 幸せあふれる紅潮した笑み。あどけないような顔と裏腹、\nおまんまんは貪欲に蠢き、僕の先端を奥へと誘おうとする。
1625 = "Một nụ cười ửng hồng tràn ngập hạnh phúc. Trái ngược với khuôn mặt ngây thơ,\ncô bé lại ngọ nguậy đầy tham lam, cố gắng dụ dỗ phần đầu của tôi vào sâu bên trong."
# 【ハチロク】
# display as 鈴
# JP: 「ふっ――ぁ――。\nん……ふぁ……ぅ――ん…………あ！」
1153 = "「Fu——a——.\nƯm…… fua…… u——ưm………… a!」"
# monologue
# JP: （くくっ！）
# 1976 = "（步步深入）" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1218 = "「唔！」" 
# monologue
# JP: （くぷんっ！！）
1954 = "（Kupun!!）"
# monologue
# JP: すずの柳腰がじわりと沈む。\n沈んだところで、ぐりゅり、じゅぶりとわずかに動く。
1804 = "Vòng eo liễu rủ của Suzu từ từ chìm xuống.\nTại nơi chìm xuống, em ấy khẽ cử động guryuri, juburi."
# monologue
# JP: （ざりゅっ）
2022 = "（Zaryu）"
# 【ハチロク】
# display as 鈴
# JP: 「ふぁっ！　んぅっ――」
1198 = "「Fua! Nnu——」"
# monologue
# JP: すずの天井。浅いところの粒だったとこ。\n亀頭のくびれがそこをこすれば即座に理解する。
1809 = "Trần âm đạo của Suzu. Nơi có những hạt sần sùi ở phần nông.\nNgay khi rãnh quy đầu cọ xát vào đó, tôi lập tức hiểu ra."
# 【ハチロク】
# display as 鈴
# JP: 「ふうっ、ふうっ、ふうっ、ふうっ」
1161 = "「Fuu, fuu, fuu, fuu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、指で押し込む刺激はつまり、\n前後動により亀頭が与える刺げ」
1117 = "「Ra là vậy, kích thích khi ấn ngón tay vào tức là,\nkích thích do quy đầu tạo ra khi chuyển động tới lui.」"
# 【ハチロク】
# display as 鈴
# JP: 「っ！！！！！」
1222 = "「!!!!!」"
# monologue
# JP: （じゅぶりゅうううううううっっっっ！）
1992 = "（Juburyuuuuuuuu!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ゅおっ！？」
1204 = "「Uo!?」"
# monologue
# JP: 瞬間、すずが一気に沈む！
1808 = "Ngay khoảnh khắc đó, Suzu chìm hẳn xuống!"
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ！　あっ！　あっ！　～～～～っ！！！」
1195 = "「Fua! A! A! ~~~~!!!」"
# monologue
# JP: （ばちっ！）
1938 = "（Bachi!）"
# monologue
# JP: 肉と肉とがぶつかり合う音。\nぎゅうぎゅうやわやわ、僕の全部が包み込まれて絞られる。
1745 = "Tiếng da thịt va chạm vào nhau.\nSiết chặt, mềm mại, toàn bộ của tôi bị bao bọc và vắt kiệt."
# 【ハチロク】
# display as 鈴
# JP: 「そうてつ――さまっ――んっ――\nだんな、さまっ――」
1417 = "「Sou, tetsu——sama——ưm——\nPhu, quân——」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、ん」
1224 = "「U, ưm.」"
# monologue
# JP: 全てを収め大喜びで蠕動しているすずの膣内。\n送り込まれる快感に、声が裏返らないよう、必死で抑える。
1812 = "Bên trong âm đạo của Suzu đang ngọ nguậy đầy sung sướng khi chứa đựng tất cả.\nTôi tuyệt vọng kìm nén để giọng không bị lạc đi trước khoái cảm đang truyền đến."
# 【双鉄】
# display as 雙鐵
# JP: 「偉いぞ。上手に挿入できたな」
1093 = "「Giỏi lắm. Em cho vào rất khéo đấy.」"
# monologue
# JP: みちみちと音がしそうな圧迫感。\nすずが常より締まっているのか、僕の興奮のせいなのか。
1589 = "Cảm giác áp bức như sắp phát ra tiếng răng rắc.\nDo Suzu siết chặt hơn bình thường, hay do tôi đang hưng phấn."
# 【ハチロク】
# display as 鈴
# JP: 「うふふっ、わたくし、がんばりました」
1270 = "「Ufufu, em đã cố gắng hết sức rồi ạ.」"
# monologue
# JP: すずが声帯をふるわすだけで、勃起にも甘い振動がくる。\n密着感と蠕動に、動かなくても精がじわりとこみ上げる。
1805 = "Chỉ cần Suzu rung dây thanh quản, sự cương cứng cũng nhận được rung động ngọt ngào.\nCảm giác ôm sát và nhu động khiến tinh dịch rịn ra dù tôi không hề cử động."
# 【双鉄】
# display as 雙鐵
# JP: 「であらば、次のステップだ」
1389 = "「Vậy thì, bước tiếp theo nào.」"
# monologue
# JP: 動いて欲しい、ちんちんを気持ちよくしてほしい――と、、\n脳より深くから聞こえる声を、奥歯を噛んで押し込める。
1605 = "Muốn cử động, muốn làm cho dương vật sướng hơn——,\ntôi cắn chặt răng kìm nén tiếng nói vang lên từ sâu thẳm trong não."
# 【双鉄】
# display as 雙鐵
# JP: 「覚えているな？　ここ、だ」
1385 = "「Em nhớ chứ? Chỗ này, đây.」"
# monologue
# JP: 我慢しなければ震えてしまう指を伸ばして、\nすずのお腹の薄皮を、かるくかるぅく叩いてあげる。
1767 = "Tôi vươn ngón tay đang run rẩy nếu không kìm nén,\ngõ nhẹ, thật nhẹ lên lớp da mỏng trên bụng Suzu."
# monologue
# JP: （とんっ）
2010 = "（Cốc）"
# 【ハチロク】
# display as 鈴
# JP: 「あんっ！」
1243 = "「An!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1221 = "「!!!!」"
# monologue
# JP: その刺激にまたすずの膣内がきゅうんと締まり、\n一番奥はくぱついて、亀頭を更に呑もうと蠢く。
1789 = "Kích thích đó lại làm âm đạo Suzu siết chặt lại,\nphần sâu nhất mở ra, ngọ nguậy muốn nuốt trọn quy đầu hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「ここを――\nお前が一番気持ちよくなれる、秘密の場所を」
1382 = "「Nơi này——\nNơi bí mật, có thể làm em sung sướng nhất.」"
# monologue
# JP: いつも冷静なマスターらしく。誰より頼もしい夫らしく。\nすずの理想の僕であるべく、精一杯に格好をつける。
1673 = "Giống như một Master luôn bình tĩnh. Giống như một người chồng đáng tin cậy hơn bất kỳ ai.\nTôi cố gắng hết sức để thể hiện mình là hình mẫu lý tưởng của Suzu."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の勃起を自由に使って、\nお前の体の求めるままに、思う存分擦るがいい」
1096 = "「Cứ tự do sử dụng sự cương cứng của anh,\nchà xát thỏa thích theo những gì cơ thể em khao khát đi.」"
# 【ハチロク】
# display as 鈴
# JP: 「わたくしの、からだの……（ごくっ）」
1311 = "「Cơ thể, của em…… (ực)」"
# monologue
# JP: すずは生唾を飲み込んで――
1794 = "Suzu nuốt nước bọt——"
# 【ハチロク】
# display as 鈴
# JP: 「んっ！！」
1266 = "「Ưm!!」"
# monologue
# JP: （ぐりゅっ）
1986 = "（Guryu）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
# 1221 = "「唔！！！！」" 
# monologue
# JP: 僕が指差した場所ではなく、一番奥のくぱくぱに、\n亀頭をぐいっと深く押し当て――
1869 = "Không phải chỗ tôi chỉ, mà là phần mở ra đóng lại ở tít sâu bên trong,\nem ấy ấn mạnh quy đầu vào thật sâu——"
# 【ハチロク】
# display as 鈴
# JP: 「んぅぅ――くっ――ぁっ――」
1247 = "「Nnuu——ku——a——」"
# monologue
# JP: （ずろおおおおおおおおっっ）
2006 = "（Zurooooooooo）"
# monologue
# JP: ゆっくり、ゆっくり、すずの小さな体があがる。\n繋がったまま僕の根本は、おまんまんから吐かれてしまう。
1814 = "Chậm rãi, chậm rãi, cơ thể nhỏ bé của Suzu nhô lên.\nPhần gốc của tôi vẫn đang kết nối, bị nhả ra khỏi cô bé."
# 【ハチロク】
# display as 鈴
# JP: 「求めるままに――\n一番、気持ちよくなるようにっ――んぅっ！！」
1102 = "「Theo những gì em khao khát——\nĐể trở nên sung sướng nhất——ưm!!」"
# monologue
# JP: （ずっ――ずりゅっ――ずりゅっ――じゅぷっ）
1958 = "（Zu——zuryu——zuryu——jupu）"
# 【ハチロク】
# display as 鈴
# JP: 「はっ！　あっ！！　んっ――ここっ――またっ――\nやっぱり――いい――こっち――おちんちん――ぁうっ」
1197 = "「Ha! A!! Ưm——chỗ này——lại——\nquả nhiên——thích——bên này——dương vật——au.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、おちんちんの方がいいのか」
1380 = "「Vậy sao, dương vật thích hơn à.」"
# 【ハチロク】
# display as 鈴
# JP: 「ここ、だって――双鉄さまの――\n双鉄さまの――形――覚えて――んっ！！」
1384 = "「Chỗ này, vì——của ngài Soutetsu——\nhình dáng——của ngài Soutetsu——đã nhớ——ưm!!」"
# monologue
# JP: （ぐりゅっ！　ぐっ――ぞりっ！　くりゅんっ！）
2024 = "（Guryu! Gu——zori! Kuryun!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1220 = "「!!!」"
# monologue
# JP: 腰が、踊る。\n小さく沈み小さく跳ねて、円を描いて淫らに踊る。
1807 = "Vòng eo, đang nhảy múa.\nChìm xuống một chút, nảy lên một chút, vẽ thành những vòng tròn dâm đãng."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまのっ、おっきくっ、くびれて、いらっしゃる、\nとこっ――がっ――ぁっ！　ぐいって、ぐいってっ」
1423 = "「Chỗ, to lớn, thắt lại, của ngài Soutetsu,\nchỗ đó——đang——a! Cọ xát, cọ xát.」"
# monologue
# JP: （ぐりゅっ！　ずりっ！　ぐっ！　くくっ！！）
1936 = "（Guryu! Zuri! Gu! Kuku!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「――っっっ」
1216 = "「——」"
# monologue
# JP: 腰の動きはとても小さい。根本は完全に放置されてる。\nであるというのに気持ちいい。無様な声が出そうなほどに。
1817 = "Chuyển động của eo rất nhỏ. Phần gốc hoàn toàn bị bỏ mặc.\nThế mà lại sướng. Sướng đến mức tôi suýt thốt ra những âm thanh khó coi."
# 【ハチロク】
# display as 鈴
# JP: 「わたくしの、ここ――いじわる、され、てっ――\nわたくしっ、せつないっ――せつなく、てっ――」
1313 = "「Chỗ này, của em——bị, trêu chọc——\nem, khao khát——khao khát, lắm——」"
# monologue
# JP: （ぐっ――ぎゅりゅっ――じゅぶっ――ずりゅっ）
1974 = "（Gu——gyuryu——jubu——zuryu）"
# monologue
# JP: 膣全体が勃起に抱きつき吸い付いて奥へ奥へとざわめいて。\nけれどもすずはそれを無視して、同じとこだけを刺激して。
1774 = "Toàn bộ âm đạo ôm chặt, mút lấy sự cương cứng, râm ran đòi vào sâu hơn.\nNhưng Suzu lại phớt lờ điều đó, chỉ kích thích mãi một chỗ."
# 【双鉄】
# display as 雙鐵
# JP: 「ぁあっ――」
# 1225 = "「啊——」" 
# monologue
# JP: そのもどかしさが心地よく。ここち良いゆえ物足りぬ。\n一番奥を突きこみたくってえぐりたくって、焦がされる。
1788 = "Sự bứt rứt đó thật dễ chịu. Nhưng vì dễ chịu nên lại thấy thiếu thốn.\nMuốn đâm vào tận cùng, muốn ngoáy sâu vào trong, khao khát cháy bỏng."
# 【ハチロク】
# display as 鈴
# JP: 「んっ――ぁっ――んうっっ――ふっ――やっ――」
1249 = "「Ưm——a——nnu——fu——ya——」"
# monologue
# JP: （くっ――ぐいっ――ぐうっ――くにっ）
2009 = "（Ku——gui——guu——kuni）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1220 = "「唔！！！」" 
# monologue
# JP: 前後の動きが加わってきた。すずの口からよだれが\nだらだら、ぼとぼと落ち――
1816 = "Đã có thêm chuyển động tới lui. Nước dãi từ miệng Suzu\nchảy ròng ròng, nhỏ giọt——"
# 【ハチロク】
# display as 鈴
# JP: 「（じゅうううううっ）――んっ――（こくっ）\nふあっ――んっ――はっ――あっ――あっ！」
1428 = "「(Juuuuuu)——ưm——(ực)\nFua——ưm——ha——a——a!」"
# monologue
# JP: 恥ずかしいのかよだれをすすり、その間も腰は止まらない。
1815 = "Có lẽ vì xấu hổ nên em ấy húp nước dãi lại, trong lúc đó eo vẫn không ngừng di chuyển."
# monologue
# JP: （じにゅっ！　ぐりゅっっ――ぐっ――ぐいっ）
# 1974 = "（搖曳往復）" 
# monologue
# JP: 髪が、乳首が可愛くふるえる。\n甘えるように、もどかしそうに。
1601 = "Mái tóc, núm vú rung lên đáng yêu.\nNhư đang làm nũng, như đang bứt rứt."
# 【ハチロク】
# display as 鈴
# JP: 「ふぁっ――あっ――ンッ――きゅふっ――ぁ――ふ――\nそうてつ、さまっ――そうてつ、さまぁっ」
1178 = "「Fua——a——n——kyufu——a——fu——\nSou, tetsu, sama——Sou, tetsu, sama~」"
# 【双鉄】
# display as 雙鐵
# JP: 「すず！」
1400 = "「Suzu!」"
# monologue
# JP: （がしっ）
1964 = "（Chộp lấy）"
# 【ハチロク】
# display as 鈴
# JP: 「あっ！！！」
1246 = "「A!!!」"
# monologue
# JP: 腰を両手で押さえつけられ、淫らな踊りを止められて。\nけれどもすずははっきりとした歓喜を声に溢れさす。
1644 = "Bị tôi dùng hai tay giữ chặt eo, điệu nhảy dâm đãng bị buộc phải dừng lại.\nNhưng giọng nói của Suzu lại tràn ngập niềm vui sướng rõ ràng."
# 【ハチロク】
# display as 鈴
# JP: 「そうてつさま」
1420 = "「Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ここから先は、僕も動こう。\nおまえと、僕と――僕はふたりで、契りたい」
1253 = "「Ừ. Từ đây trở đi, anh cũng sẽ chuyển động.\nEm, và anh——anh muốn hai chúng ta cùng nhau trao lời thề.」"
# 【ハチロク】
# display as 鈴
# JP: 「はいっ！　はいっ！\nわたくし、うれしゅうございま」
1277 = "「Vâng! Vâng!\nEm, rất vui ạ.」"
# monologue
# JP: （ずぶうううううううううううっ！　ごつっ！！！）
2000 = "（Zubuuuuuuuuuuu! Gotsu!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「んゅうううううううううううっっっっ！」
1263 = "「Nyuuuuuuuuuuu!」"
# monologue
# JP: （きゅうううううううううっ！）
1998 = "（Kyuuuuuuuuu!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！！！！」
1215 = "「Kuha!!!!」"
# monologue
# JP: 一番奥と亀頭との、双方待ち焦がれていたキスが、\n腰から背骨、脳へと太い快感の棒を突き刺してくる。
1772 = "Nụ hôn mà cả nơi sâu nhất và quy đầu đều mòn mỏi chờ đợi,\nnhư một thanh khoái cảm thô to đâm xuyên từ eo lên cột sống, thẳng đến não bộ."
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ！　あっ！　あっ！　あっ！\nんうっ！　あっ！　ふっ！　ふやっ！！」
1194 = "「Fua! A! A! A!\nNnu! A! Fu! Fuya!!」"
# monologue
# JP: （ばちゅっ！　ごちゅっ！　じゅぶっ！　ずりゅっ！）
1951 = "（Bachu! Gochu! Jubu! Zuryu!）"
# 【双鉄】
# display as 雙鐵
# JP: 「すずっ！　ずずっ！　すずっ！　すずっ！！！」
1401 = "「Suzu! Suzu! Suzu! Suzu!!!」"
# monologue
# JP: 極めて単調な上下動。ぎゅうぎゅう勃起にしがみつく壁。\n奥へと当たる快感に、亀頭の傘が粒を擦っていく快感。
1576 = "Chuyển động lên xuống cực kỳ đơn điệu. Thành âm đạo bám chặt lấy sự cương cứng.\nKhoái cảm khi đâm vào tận cùng, khoái cảm khi vành quy đầu cọ xát vào những hạt sần sùi."
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ！　あっ――ふっ――んっ！\nそうてつ、さまっ――そうてつさまぁっ！」
1190 = "「Fua! A——fu——ưm!\nSou, tetsu, sama——Ngài Soutetsu!」"
# monologue
# JP: 接合部から泡立つ水音、どんどん濃くなる精の匂い。\nそうした全てがどろどろと、僕の睾丸に流れ込む。
1647 = "Tiếng nước sủi bọt từ nơi giao hợp, mùi tinh dịch ngày càng đậm đặc.\nTất cả những thứ đó sền sệt chảy vào tinh hoàn của tôi."
# monologue
# JP: （ばちゅっ！　じゅちゅっ！　ぱんっ！　ばちゅんっ！）
1988 = "（Bachu! Juchu! Pan! Bachun!）"
# monologue
# JP: ふたりの呼吸が重なりあう。律動も鼓動も重なりあってる。\nただ単調な動きだけれども、僕らは完全にシンクロしてる。
1559 = "Nhịp thở của hai người hòa vào nhau. Nhịp điệu và nhịp tim cũng hòa quyện.\nDù chỉ là chuyển động đơn điệu, nhưng chúng tôi đã hoàn toàn đồng điệu."
# 【ハチロク】
# display as 鈴
# JP: 「はっっ！　あっ！　ふあっ！　んくっ！　あっ！\nそうてつさまっ！　わたくしっ！　わたくしぃっ」
1192 = "「Ha! A! Fua! Nku! A!\nNgài Soutetsu! Em! Em~」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっている、すず。\n僕も――こみあげ――きって――いるっ――っ！」
1314 = "「Anh biết rồi, Suzu.\nAnh cũng——đang trào dâng——đến giới hạn——rồi!」"
# monologue
# JP: 射精をしたい、解き放ちたい。一番奥へと精を吐きたい。\n勃起も睾丸も満ち満ちていて、今すぐにでも屈服したい。
1637 = "Muốn xuất tinh, muốn giải phóng. Muốn phun tinh dịch vào nơi sâu nhất.\nSự cương cứng và tinh hoàn đều đã căng đầy, muốn khuất phục ngay lập tức."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、にっ――っ！！！！」
1330 = "「Vì, vậy——!!!!」"
# monologue
# JP: （ぱんっ！　ずぶっ！　ずばっ！　じゅぶうっ！！！）
1949 = "（Pan! Zubu! Zuba! Jubuu!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「はっ――あっ――きます――白いの――まいりますっ\n――わらくひっ――もうすぐっ――もうすぐっ――」
1179 = "「Ha——a——đến đây——màu trắng——đến đây ạ\n——e-em——sắp——sắp rồi——」"
# monologue
# JP: 膣がほとんど噛みに来ている。\n膣奥は真空地帯のように、亀頭を離すまいと吸い付く。
1769 = "Âm đạo gần như đang cắn chặt lấy.\nSâu bên trong âm đạo như một vùng chân không, mút chặt lấy quy đầu không buông."
# 【双鉄】
# display as 雙鐵
# JP: 「す、ずっ――」
1396 = "「Su, zu——」"
# monologue
# JP: ゆえに、わかる。わかっているのだ。\nすずももうすぐ達すると、ふたりで同時に達したいと。
1670 = "Vì vậy, tôi hiểu. Tôi hiểu rõ.\nSuzu cũng sắp lên đỉnh, và muốn cả hai cùng lên đỉnh."
# monologue
# JP: （ずばっ！　じゅぶっ！　じゅうっ！　ばちゅっ！！）
1955 = "（Zuba! Jubu! Juu! Bachu!!）"
# monologue
# JP: 気持ちよすぎて吐き気がする。射精したくて吐き気がする。\nけれど、堪える、必死に、必死に。
1627 = "Sướng đến buồn nôn. Muốn xuất tinh đến buồn nôn.\nNhưng tôi phải kìm nén, tuyệt vọng, tuyệt vọng kìm nén."
# 【ハチロク】
# display as 鈴
# JP: 「あっ！　あっ！　あっ！　あっ！　あっ　あっ！\nあっ！　あっ！　んっ！　はあっ！　んっ！　ふっ！」
1245 = "「A! A! A! A! A! A!\nA! A! Ưm! Ha! Ưm! Fu!」"
# monologue
# JP: （じゅっ！　じゅぶっ！　ばちゅっ！　じゅぶううっ！）
1959 = "（Ju! Jubu! Bachu! Jubuuu!）"
# monologue
# JP: このかわいいものと、僕の妻と、\n同時に達し、契りを一層ふかめたい。
1651 = "Với sinh vật đáng yêu này, với người vợ của tôi,\ntôi muốn cùng lúc lên đỉnh, khắc sâu thêm lời thề."
# 【双鉄】
# display as 雙鐵
# JP: 「くっ――あっ！」
1210 = "「Ku——a!」"
# monologue
# JP: 尻肉全部に力を込めて、穴という穴を引き締める。\nそうしながらも腰はひたすら、すずの最奥を貪り続ける。
1760 = "Tôi dồn toàn bộ sức mạnh vào cơ mông, thắt chặt mọi lỗ hổng.\nTrong khi làm vậy, eo vẫn không ngừng tham lam đâm vào nơi sâu nhất của Suzu."
# monologue
# JP: （ばちゅっ！　じにゅっ！！　ぎりゅっ！　ずばんっ！）
1993 = "（Bachu! Jinyu!! Giryu! Zuban!）"
# 【ハチロク】
# display as 鈴
# JP: 「ふやっ！　あっ！　あっ！　あっ！　あっ！　っ！！\nそうてつ！　さまっ！　わらくひっ！　わたくしっ！」
1156 = "「Fuya! A! A! A! A! !!\nSou, tetsu! Sama! E-em! Em!」"
# 【双鉄】
# display as 雙鐵
# JP: 「すずっ！！！！！！」
1402 = "「Suzu!!!!!!」"
# 【ハチロク】
# display as 鈴
# JP: 「そうてつさまぁっ！！！！！」
1421 = "「Ngài Soutetsu!!!!!」"
# monologue
# JP: （じゅぽっ――ずぶうううううううっ！　ぐりっっっ！）
1947 = "（Jupo——zubuuuuuuu! Guri!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃぅぅぅぅぅぅぅうぅぅぅぅぅぅ～～～っ！！！」
1142 = "「Hyauuuuuuuuuuuuuuuu~~~!!!」"
# monologue
# JP: （ぶびゅっ！！！！　――どびゅっ！　びゅるっ！！）
1946 = "（Bubyu!!!! ——Dobyu! Byuru!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
1217 = "「Kua!!!」"
# monologue
# JP: （きゅうううううううううううっっ！！！！）
1999 = "（Kyuuuuuuuuuuu!!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ふああっ！！！」
1199 = "「Fuaa!!!」"
# monologue
# JP: （びゅるっ！　びゅうっ！　どびゅっ！　びゅっ！）
1945 = "（Byuru! Byuu! Dobyu! Byu!）"
# monologue
# JP: 精液が塊になって飛び出していく。\n糊のごとくに、すずの膣奥の更に奥へと張り付いていく。
1731 = "Tinh dịch tuôn ra thành từng cục.\nNhư keo dính, bám chặt vào tận sâu bên trong âm đạo của Suzu."
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ――あっ――あひゅうっ――あひゅいのっ」
1176 = "「Fua——a——ahyuu——nóng quá.」"
# monologue
# JP: （びゅうっ！　どびゅっ――びゅるっ――ぶびゅうっ）
1985 = "（Byuu! Dobyu——byuru——bubyuu）"
# 【双鉄】
# display as 雙鐵
# JP: 「く――あ――あ……うぁっ――」
1209 = "「Ku——a——a…… ua——」"
# monologue
# JP: 空っぽになり、なると同時に、\n止まっていた全てがまた動き出す。
1716 = "Trống rỗng, và ngay lúc đó,\ntất cả những gì đang dừng lại lại bắt đầu chuyển động."
# 【ハチロク】
# display as 鈴
# JP: 「ふぁ――ぁっ――あっ――あっ――」
1171 = "「Fua——a——a——a——」"
# monologue
# JP: （とさっ）
1934 = "（Phịch）"
# monologue
# JP: 力を使い果たしたのだろう、すずも僕へと倒れ込む。\nぴたりくっつく薄い体は、汗にぬかるみ、ぽかぽか熱い。
1793 = "Có lẽ vì đã cạn kiệt sức lực, Suzu ngã gục vào người tôi.\nCơ thể mỏng manh dán chặt lấy tôi, nhễ nhại mồ hôi, nóng hầm hập."
# 【ハチロク】
# display as 鈴
# JP: 「はぁ――はぁ――はぁ――（ごくっ）\nそうてつ、さま――だんな、さま」
1170 = "「Ha——ha——ha——(ực)\nSou, tetsu, sama——phu, quân.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すず――すず。よくがんばったな。\nとても素敵で――このうえもなく愛らしかったぞ」
1397 = "「Suzu——Suzu. Em đã làm rất tốt.\nRất tuyệt vời——và đáng yêu không gì sánh bằng.」"
# 【ハチロク】
# display as 鈴
# JP: 「えへっ――えへへっ。\nはうっ――ありがとう、ございます」
1200 = "「Ehe——ehehe.\nHau——cảm ơn, ngài.」"
# monologue
# JP: いいこいいこと髪を撫でれば、すずがはにかむ。\n照れてあまえて僕の胸へと、人差し指でなにか書く。
1674 = "Khi tôi xoa đầu vuốt tóc khen ngợi, Suzu ngượng ngùng.\nEm ấy e thẹn làm nũng, dùng ngón trỏ viết chữ gì đó lên ngực tôi."
# 【ハチロク】
# display as 鈴
# JP: 「あの、ね？　双鉄さま」
1362 = "「Dạ, này? Ngài Soutetsu.」"
# monologue
# JP: のの字のの字かと思いきや、指はどんどんずれていく。\n『だ　い　す　き』と――瞬間すずは、動きを止める。
1784 = "Tôi cứ tưởng em ấy đang vẽ vòng tròn, nhưng ngón tay cứ trượt dần.\n『E m y ê u a n h』——ngay lúc đó Suzu dừng tay lại."
# 【ハチロク】
# display as 鈴
# JP: 「わたくし、上手に――誓いを、契りを――\nいまひとたびの契りを――かわせましたか？」
1306 = "「Em, đã làm tốt——lời thề, lời kết duyên——\nlời thề kết duyên một lần nữa——chưa ạ?」"
# monologue
# JP: 赤い瞳が僕を見る。すずの瞳に僕が映る。\n僕らはお互いを見つめ合い、呼吸をぴったり重ねてる。
1802 = "Đôi mắt đỏ nhìn tôi. Tôi phản chiếu trong đôi mắt của Suzu.\nChúng tôi nhìn nhau đắm đuối, nhịp thở hòa quyện làm một."
# 【双鉄】
# display as 雙鐵
# JP: 「……ああ、この上無く素晴らしかった。\nお前の[はら]胎の奥の熱さが、言葉よりも雄弁に示していよう」
849 = "「……Ừ, tuyệt vời không gì sánh bằng.\nSức nóng sâu bên trong tử cung của em, đã chứng minh hùng hồn hơn bất cứ lời nói nào.」"
# 【ハチロク】
# display as 鈴
# JP: 「ぁ……」
# 1230 = "「啊……」" 
# monologue
# JP: 下腹部を、そっと小さな手が撫ぜる。\nにっこり、瞳がアーチを描く。
1801 = "Một bàn tay nhỏ bé nhẹ nhàng xoa bụng dưới.\nMỉm cười, đôi mắt vẽ thành hình vòng cung."
# 【ハチロク】
# display as 鈴
# JP: 「うふふっ」
1269 = "「Ufufu.」"
# monologue
# JP: すずを転がす笑い声。僕の大好きな笑い声。\n全てが満ちて、静かに収まる。
1855 = "Tiếng cười lanh lảnh của Suzu. Tiếng cười mà tôi vô cùng yêu thích.\nTất cả đều trọn vẹn, và lặng lẽ lắng xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「……二世の契りの上に重ねた、二世の契りだ。\n生まれ変わってそのまた先も、僕たちは夫婦だ。確実に」
1327 = "「……Chồng lên lời thề kết duyên hai kiếp, là lời thề kết duyên hai kiếp.\nDù có tái sinh hay kiếp sau nữa, chúng ta vẫn là vợ chồng. Chắc chắn là vậy.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい」
1331 = "「Vâng.」"
# monologue
# JP: レイルロオドに、人間に。生まれ変わりがあるのであらば。\nその一言を飲み込んで、代わりにそっと口づける。
1703 = "Railord, con người. Nếu thực sự có kiếp sau.\nNuốt lại câu nói đó, thay vào đó tôi nhẹ nhàng trao một nụ hôn."
# 【ハチロク】
# display as 鈴
# JP: 「…………。\nわたくし、うれしゅうございます」
838 = "「………….\nEm, rất vui ạ.」"
# monologue
# JP: ほんの一瞬唇を舐め。すずが微笑む。ちいさく、しずかに。\n乱れた白無垢と咲いた笑顔にふっと、真白い蓮の花を思う。
1820 = "Khẽ liếm môi trong một thoáng. Suzu mỉm cười. Nụ cười nhỏ bé, tĩnh lặng.\nBộ Shiromuku xộc xệch và nụ cười rạng rỡ khiến tôi chợt nghĩ đến một đóa sen trắng muốt."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま、旦那さま。どうぞ、願わくば幾久しく。\n機能停止のその先も――」
1422 = "「Ngài Soutetsu, phu quân. Cầu mong, đôi ta mãi mãi bền lâu.\nKể cả sau khi ngừng hoạt động——」"
# monologue
# JP: お腹の上に小さな感触。\n三つ指をすずは綺麗に揃えて静かに頭を下げる。
1755 = "Một cảm giác nhỏ bé trên bụng.\nSuzu chụm ba ngón tay lại ngay ngắn và tĩnh lặng cúi đầu."
# 【ハチロク】
# display as 鈴
# JP: 「そうてつさま――\nどうぞ、わたくしをあなたのお側に。あなたの、妻に」
1419 = "「Ngài Soutetsu——\nXin ngài, hãy để em ở bên cạnh ngài. Làm người vợ, của ngài.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。\nそれは、僕の望みだ」
1346 = "「Tất nhiên rồi.\nĐó cũng là tâm nguyện của anh.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ――」
# 1225 = "「啊——」" 
# monologue
# JP: そうして僕らは言葉も想いも願いも溶かし。\nいまひとたびのキスをする。
1646 = "Và rồi, chúng tôi hòa tan cả lời nói, tâm tư lẫn nguyện ước.\nTrao nhau một nụ hôn thêm một lần nữa."
