1296 = "我的舌頭伸進甜米酒裡，往深處摸索過去。舔舐到了鈴的裂口表面。" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……の――旦那、様っ――んっ――そのように、\nされて、しまうと……わた、くし――濡れ、て――」
769 = "「啊……——夫君——這樣子的話……我——會濕的——」" 

# 【双鉄】
# display as 雙鐵
