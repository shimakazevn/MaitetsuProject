# monologue
# JP: わかっていても、どうしようもなく腰が求める。\nもっと奥でと、すずの最奥、子宮の中へと！
1318 = "Dù biết vậy, nhưng cái eo vẫn khao khát một cách vô thức.\nMuốn vào sâu hơn nữa, vào nơi sâu nhất của Suzu, vào tận trong tử cung!"
# 【ハチロク】
# display as 鈴
# JP: 「そうてつ――さまっ――ふぁっ――双鉄、さまあっ！」
946 = "「Ngài Soutetsu——huaa——Ngài Soutetsu!」"
# monologue
# JP: （ずぶううううううううううっ！！！　ごっ！！）
1528 = "（Phậpppppppppp!!! Cộc!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ぃっ――きゅうううううううううううっっっ！！！！」
736 = "「I——kyuuuuuuuuuuuuuuu!!!!」"
# monologue
# JP: （きゅむっ！！　きゅううううううううんっ！！！）
1555 = "（Siết chặt!! Siết chặtttttttttt!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 787 = "「啊！」" 
# monologue
# JP: （びゅうっ！　びゅるっ！　どびゅる！　びゅぶるっ！）
1573 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「あ――出てッ――んっ――熱、い――んくっ――ふ――\n双鉄、さまの――精子――あつい、のっ――ふ、ふぁ」
759 = "「A——ra rồi——ưm——nóng, quá——ưn ku——hu——\nTinh trùng——của Ngài Soutetsu——nóng, quá——hu, hua」"
# monologue
# JP: （びゅるっ！　どびゅっ！　びゅううっ！　びゅるっ！）
1577 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「お、まん、まん――ふぁ――おぼれ――おぼれ、りゅっ\n――んっ！　双鉄、さまの――精子、で、たぷたぷっ」
857 = "「Tiểu huyệt——hua——ngập——ngập, rồi\n——Ưm! Tinh trùng——của Ngài Soutetsu, đầy ăm ắp」"
# 【双鉄】
# display as 雙鐵
# JP: 「溺れてしまえ。僕に――どこまでも――どこまでもっ」
929 = "「Cứ ngập chìm đi. Trong anh——mãi mãi——mãi mãi」"
# 【ハチロク】
# display as 鈴
# JP: 「はいっ！　はいっ！　ん――双鉄、さまっ――\nわたくしの――だいすきなっ――だんな、さまぁっ！」
851 = "「Vâng! Vâng! Ưm——Ngài Soutetsu——\nPhu quân——mà em yêu nhất!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 787 = "「啊！」" 
# 【ハチロク】
# display as 鈴
# JP: 「ちゅっ！　ちゅむっ！　んっ――ちゅうっ――ふっ！\nれるっ――れろっ――ちゅううっ――ちゅむ、ちゅ！」
809 = "（Chụt! Chụt! Ưm——chụt——hu!\nLiếm——liếm——chụttttt——chụt, chụt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「あ……んっ――ふ……ん…………んっ」
774 = "「A......ưm——hu......ưm............ưm」"
# monologue
# JP: （びゅうっ――びゅっ――どびゅ――――ぴゅるっ）
1571 = "（Phụt——phụt——phụtttt——phụt）"
# 【ハチロク】
# display as 鈴
# JP: 「ふぁ……あ…………あまざけ、い、っぱい――上の、\nおくちも……した、の……おくち、も――ふぁ」
812 = "「Hua......a............đầy, ắp, rượu ngọt——Cái miệng,\nở trên......cái miệng, ở......dưới, cũng——hua」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
756 = "「Oops」"
# monologue
# JP: （とさっ！）
1564 = "（Bịch!）"
# monologue
# JP: 崩れたすずの体を受け止め、\n腕枕して一緒にごろり、横になる。
1282 = "Đỡ lấy cơ thể mềm nhũn của Suzu,\ntôi cho em gối đầu lên tay rồi cùng nhau nằm xuống."
# monologue
# JP: 気乱れまくった着物がふわり、広がって、\n桜の国に、金魚の国に、迷ったような気持ちにフとなる。
1221 = "Bộ kimono xộc xệch bung ra nhẹ nhàng,\nkhiến tôi có cảm giác như đang lạc vào vương quốc hoa anh đào, vương quốc cá vàng."
# 【双鉄】
# display as 雙鐵
# JP: 「可愛いな。僕の姫君は」
872 = "「Đáng yêu quá. Công chúa của anh」"
# 【ハチロク】
# display as 鈴
# JP: 「うふふっ」
846 = "「Ufufu」"
# monologue
# JP: ぽ、と色づく。\n着物より、桜よりもなお鮮やかに。
1211 = "Đôi má ửng hồng.\nCòn rực rỡ hơn cả kimono, hơn cả hoa anh đào."
# monologue
# JP: すずはその頬を朱に染めて、\nつん、っと僕のほっぺたを突く。
1427 = "Suzu với đôi má nhuộm đỏ,\nkhẽ chọc nhẹ vào má tôi."
# 【ハチロク】
# display as 鈴
# JP: 「可愛くなるのも、当然ですよ？\nわたくしだって――あなたに、恋を。していますから」
932 = "「Trở nên đáng yêu, cũng là điều đương nhiên thôi mà?\nBởi vì em——cũng đang, yêu ngài say đắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな――僕もだ。\n僕も、お前に恋をしている」
885 = "「Đúng vậy nhỉ——Anh cũng thế.\nAnh cũng, đang yêu em say đắm.」"
# monologue
# JP: だから前より、笑えて、泣けてる。\nそうであるのに、前よりもっと、頑張れている。
1308 = "Vì vậy, so với trước đây, tôi đã biết cười, biết khóc nhiều hơn.\nĐã vậy, tôi còn có thể cố gắng nhiều hơn trước nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「良いものなのだな。恋というのは」
866 = "「Quả là một điều tuyệt vời nhỉ. Tình yêu ấy.」"
# 【ハチロク】
# display as 鈴
# JP: 「左様ですね、まことに――――あっ」
886 = "「Đúng vậy ạ, thực sự là————a」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
845 = "「Hửm?」"
# 【ハチロク】
# display as 鈴
# JP: 「桜。ほら。双鉄さまのお[ぐし]髪にも」
900 = "「Hoa anh đào. Ngài xem. Trên tóc của Ngài Soutetsu cũng có này」"
# monologue
# JP: ほんのひとひら。小さな小さな桜色。\nいとおしそうに、すずは指先へと乗せて。
1408 = "Chỉ là một cánh hoa. Một sắc hồng anh đào nhỏ xíu.\nSuzu nâng niu nó trên đầu ngón tay một cách trìu mến."
# 【ハチロク】
# display as 鈴
# JP: 「えいっ！」
757 = "「Ây!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 781 = "「啊」" 
# monologue
# JP: いたずらっぽく微笑んで、それをぺろりと、\n舌へと乗せて口の中へと閉じ込める。
1213 = "Em mỉm cười tinh nghịch, rồi thè lưỡi liếm lấy nó,\nđưa vào miệng và ngậm lại."
# monologue
# JP: 誘われてるとわかるから、\n僕も喜んで、それに乗る。
1297 = "Vì biết mình đang bị quyến rũ,\nnên tôi cũng vui vẻ hùa theo."
# 【双鉄】
# display as 雙鐵
# JP: 「桜はこれほどに酔わせるものだ。\n異常燃焼を起こしてしまうぞ？」
899 = "「Hoa anh đào làm người ta say đắm đến thế này cơ mà.\nSẽ gây ra cháy bất thường mất thôi?」"
# 【ハチロク】
# display as 鈴
# JP: 「んっ――」
# 815 = "「嗯——」" 
# monologue
# JP: そして、キス。\n名目上は、酔いの要因を取り除くため。
1258 = "Và rồi, một nụ hôn.\nTrên danh nghĩa là để loại bỏ nguyên nhân gây say."
# 【ハチロク】
# display as 鈴
# JP: 「は、ちゅっ――む――ちゅむっ――ちゅう、ちゅっ！」
792 = "「Ha, chụt——mu——chụt——chụt, chụt!」"
# monologue
# JP: ……そしてもちろん、その内実は。\nもっと深くに、酔うために。
456 = "......Và tất nhiên, sự thật bên trong là.\nĐể say đắm sâu sắc hơn nữa."
# monologue
# JP: この桜色のひとときに――\nそうして、僕の愛する妻に。
1342 = "Trong khoảnh khắc nhuốm màu hoa anh đào này——\nVà, với người vợ yêu dấu của tôi."
