1304 = "我舔了舔她的陰蒂，告訴她“我要認真了”。她很可愛地驚叫了一下，看來是知道。" 

# 【双鉄】
# display as 雙鐵
# JP: （もうそろそろか）
1580 = "（差不多了吧）" 

