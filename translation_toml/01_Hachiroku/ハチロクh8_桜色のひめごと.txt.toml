1424 = "鈴的陰道很窄很淺，肯定不可能真抵達子宮，所以就瞄準中間天花板上，最敏感的部位！" 

# monologue
# JP: （ぞるるるるるっ！！！）
# 1547 = "（咻嚕——！！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ふあっ！？　そこっ！　あっ――あっ――んっ――！\nんく～～～～～～～～～～～～～～～～～っ！！！」
732 = "「呼啊！？那裡！啊——啊——！嗯～～～～～～～～～～～～～～～～～！！！」" 

# monologue
# JP: （きゅう！　きゅきゅううううううっ！！！）
1593 = "（緊！縮緊！！！）" 

# monologue
