1400 = "這樣下去會灑到被單上的，但是我不想停止動作，所以……" 

# 【双鉄】
# display as 雙鐵
# JP: （ずぞっ――ぞおおおおおおおおおおっ！）
1559 = "（嗯……唔哦——！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ！　あっ！？　吸われ――おまめっ…ふぁっ！\nおまんまん――ぁ……じゅるじゅる――音、やっ――ん」
708 = "「呀！啊！？吸——小豆豆…嗚啊！小妹妹——啊……啾嚕啾嚕的——聲音，啊——」" 

# 【双鉄】
# display as 雙鐵
