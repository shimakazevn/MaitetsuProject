[script]
# lines: 351 
# 【ハチロク】
# display as 鈴
# JP: 「さ、旦那様――どうぞ、こちらへ」
688 = "「Nào, phu quân——mời ngài, qua bên này」"
# monologue
# JP: 布団の上に正座して、ぽんぽん、と\n自分の傍らを叩く。
1195 = "Em ngồi quỳ trên tấm nệm, vỗ vỗ\nvào chỗ trống bên cạnh mình."
# monologue
# JP: 可愛い仕草に、たたずまいに。\nいたずらごころがフと湧いてくる。
1178 = "Trước cử chỉ đáng yêu, và dáng vẻ đó.\nTrong tôi chợt trào dâng cảm giác muốn trêu chọc."
# 【双鉄】
# display as 雙鐵
# JP: 「いや――ハチロク」
680 = "「Không——Hachiroku」"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄様？　いまは、わたくしたちふたりきりですよ？」
948 = "「Ngài Soutetsu? Bây giờ, chỉ có hai chúng ta thôi mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
815 = "「À——」"
# monologue
# JP: 桃の香に酔ってしまっていたらしい。\nこんな大事な約束をうっかりしてしまうとは。
1268 = "Có vẻ như tôi đã say đắm trong hương đào rồi.\nKhông ngờ lại lơ đãng quên mất một lời hứa quan trọng như vậy."
# monologue
# JP: ふたりのときは、僕だけの名で。\n僕のおんなに――初めてのとき、つけた名前で。
1103 = "Khi chỉ có hai người, hãy gọi bằng cái tên của riêng tôi.\nCái tên mà tôi đã đặt cho người phụ nữ của mình——vào lần đầu tiên ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「すず」
937 = "「Suzu」"
# 【ハチロク】
# display as 鈴
# JP: 「はい、なんでしょう？　旦那様」
853 = "「Vâng, có chuyện gì vậy ạ? Phu quân」"
# 【双鉄】
# display as 雙鐵
# JP: 「せっかくのひな祭りだ。\n甘酒のひとつも楽しまんでは、もったいなかろう」
908 = "「Hiếm khi mới có dịp Lễ hội Búp bê (Hinamatsuri).\nKhông thưởng thức chút rượu ngọt (Amazake) thì thật lãng phí.」"
# 【ハチロク】
# display as 鈴
# JP: 「甘酒、ですか？」
907 = "「Rượu ngọt, sao ạ?」"
# monologue
# JP: ふうむ？　と可愛く小首が傾ぐ。
1177 = "Hửm? Em đáng yêu nghiêng nhẹ đầu."
# monologue
# JP: さきほど達して、濡れているのが恥ずかしいのか、\n膝はぴったり、隙無く密着したままだ。
1353 = "Có lẽ vì xấu hổ khi vừa mới lên đỉnh và còn đang ướt át,\nđôi đầu gối em vẫn khép chặt, dán sát vào nhau không chút kẽ hở."
# 【ハチロク】
# display as 鈴
# JP: 「アルコール類は、異常燃焼の原因になりかねませんので\n……わたくしは、あまり得意では」
934 = "「Các loại đồ uống có cồn, có thể là nguyên nhân gây ra cháy bất thường\n......Nên em, không giỏi khoản này lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「知っている。ゆえ、飲むのは僕だが――\nすずにもたっぷり、楽しんで欲しいと思っている」
874 = "「Anh biết. Vì thế, người uống là anh nhưng——\nAnh cũng muốn Suzu được tận hưởng trọn vẹn.」"
# monologue
# JP: そうして、異常燃焼もしていただこう。\n心の中で呟きながら、甘酒入りの雛徳利へと手を伸ばす。
1094 = "Và rồi, hãy để em cũng cháy bất thường một chút nhé.\nVừa lẩm bẩm trong lòng, tôi vừa vươn tay lấy bình rượu Hina chứa đầy rượu ngọt."
# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ！？　あ……なにをっ」
713 = "「Hya!? A......ngài làm gì vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「動くな。\nうかつに動けば、布団を甘酒で汚してしまうぞ」
689 = "「Đừng động đậy.\nNếu bất cẩn cử động, rượu ngọt sẽ làm bẩn nệm đấy.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ」
781 = "「A」"
# monologue
# JP: 律儀なすずは、腿にますますの力をこめる。
1366 = "Suzu vốn dĩ ngoan ngoãn, càng dùng sức ép chặt hai đùi lại."
# monologue
# JP: ……白濁をした甘酒が、すずの小さな股の隙間に、\nなみなみと、溢れんばかりに満たされわずかに揺れている。
462 = "......Rượu ngọt trắng đục, rót vào giữa khe đùi nhỏ bé của Suzu,\nđầy ăm ắp như chực trào ra và khẽ sóng sánh."
# 【双鉄】
# display as 雙鐵
# JP: 「文献で読んだのだがな。\nこれは、わかめ酒という行為らしい」
870 = "「Anh có đọc được trong tài liệu.\nHành động này, có vẻ được gọi là rượu rong biển (Wakame-zake) đấy.」"
# 【ハチロク】
# display as 鈴
# JP: 「わかめ酒、でございますか？\n……はて。一体、どこにわかめが？」
919 = "「Rượu rong biển, sao ạ?\n......Kỳ lạ thật. Rốt cuộc, rong biển ở đâu ra chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――すずの場合は、わかめが無いか」
849 = "「À——Trong trường hợp của Suzu thì, không có rong biển nhỉ.」"
# 【ハチロク】
# display as 鈴
# JP: 「あら」
# 781 = "「啊」" 
# monologue
# JP: すずの瞳が一瞬僕の股間をとらえ、\nそれからうふふと、柔らかになる。
1137 = "Ánh mắt Suzu thoáng lướt qua đũng quần tôi,\nrồi em khẽ cười khúc khích, ánh mắt trở nên dịu dàng."
# 【ハチロク】
# display as 鈴
# JP: 「お股の毛を、きっと、わかめに見立てるのですね？\nけれど、わたくしのおまたはつるつるですので……」
888 = "「Chắc hẳn, ngài ví lông ở vùng kín như rong biển đúng không ạ?\nNhưng mà, vùng kín của em lại nhẵn nhụi nên......」"
# monologue
# JP: ん……とかわいい声を出し、すずは数秒考えこむ。
1167 = "Ưm......Suzu phát ra âm thanh đáng yêu, rồi trầm ngâm suy nghĩ vài giây."
# 【ハチロク】
# display as 鈴
# JP: 「しいて申せば――\nわれめ酒、ということとなりましょうか」
913 = "「Nói một cách gượng ép thì——\nCó lẽ nên gọi là rượu khe hở (Wareme-zake) chăng?」"
# 【双鉄】
# display as 雙鐵
# JP: 「われめ酒……うむ。\n言い得て妙。そのものずばりだ。素晴らしいな」
916 = "「Rượu khe hở......ừm.\nThật là một cách nói tinh tế. Rất đúng trọng tâm. Tuyệt vời lắm.」"
# 【ハチロク】
# display as 鈴
# JP: 「そ、そのようなことで褒められましても。\nなんだか、妙な気がしてしまいますけれど――」
926 = "「Ng, ngài có khen em vì chuyện đó thì.\nCũng có cảm giác hơi kỳ cục làm sao ấy——」"
# 【双鉄】
# display as 雙鐵
# JP: 「なに。すぐにもっと、妙な気持ちに溺れるさ」
864 = "「Gì chứ. Em sẽ sớm chìm đắm trong một cảm giác kỳ lạ hơn nữa thôi.」"
# 【ハチロク】
# display as 鈴
# JP: 「あっ！」
787 = "「A!」"
# monologue
# JP: 口を、静かに近づけていく。\n息をかけ、わざと水面を乱してみせる。
1288 = "Tôi từ từ ghé miệng lại gần.\nThổi nhẹ một hơi, cố tình làm xao động mặt nước."
# 【ハチロク】
# display as 鈴
# JP: 「お……お飲みに、なられるのですか？」
910 = "「Ngài......định uống, thật sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「飲まねば甘酒がもったいなかろう。\nが――まだだ」
682 = "「Không uống thì phí rượu ngọt mất.\nNhưng——vẫn chưa đâu.」"
# 【ハチロク】
# display as 鈴
# JP: 「まだ――とは――ひうっ！！？」
927 = "「Vẫn chưa——là sao——hiu!!?」"
# monologue
# JP: （ぺろっ）
1594 = "（Liếm nhẹ）"
# monologue
# JP: 甘酒の中へと舌を伸ばして、その更に奥。\nすずの割れ目の表面を、ぺちゃりぴちゃりと舐めさする。
1296 = "Tôi thò lưỡi vào trong rượu ngọt, rồi tiến sâu hơn nữa.\nLiếm láp chóp chép lên bề mặt khe hở của Suzu."
# 【ハチロク】
# display as 鈴
# JP: 「あ……の――旦那、様っ――んっ――そのように、\nされて、しまうと……わた、くし――濡れ、て――」
769 = "「A......ừm——Phu, quân——ưm——Bị ngài,\nlàm như, vậy thì......em——sẽ ướt, mất——」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
470 = "「............」"
# monologue
# JP: 承知の上だ、とこたえる代わりに、舌の動きを強くする。
1300 = "Thay cho câu trả lời \"Anh biết rõ điều đó mà\", tôi cử động lưỡi mạnh bạo hơn."
# 【ハチロク】
# display as 鈴
# JP: 「ん……ひゃ――あ……いや――ん。こぼ……れ、るっ、\nあ……し……ん――感じて、力……抜けそう――で」
816 = "「Ưm......hya——a......ưm——ưm. Tràn......ra, mất,\na......chân......ưm——cảm giác, như......sắp kiệt, sức——rồi」"
# monologue
# JP: すずが震える。\n鼻先に甘酒のつゆが飛び、甘いにおいに酔いそうになる。
1414 = "Suzu run rẩy.\nNhững giọt rượu ngọt bắn lên đầu mũi, khiến tôi như say đắm trong mùi hương ngọt ngào ấy."
# monologue
# JP: ……いや、もう既に甘酒の中に混じりこんでる、\nすずのおまんまんの雫が僕を、熱くし酔わせてるのだろう。
458 = "......Không, có lẽ chính những giọt mật từ tiểu huyệt của Suzu\nđã hòa quyện vào rượu ngọt, làm tôi nóng rực và say sưa."
# monologue
# JP: （ぴちゃ――ぺちゅっ――ちゅぶ――れるっ――）
1575 = "（Chóp chép——nhóp nhép——chụt——liếm láp——）"
# 【ハチロク】
# display as 鈴
# JP: 「あ……ん――ふっ――は、ぁ――双鉄、様の――舌、\nが……ん――おまんまん、の――お豆の、とこ、までっ」
767 = "「A......ưm——phù——ha, a——Lưỡi, của——Ngài, Soutetsu,\nđang......ưm——chạm đến, chỗ——hạt đậu, của——tiểu huyệt, rồi」"
# monologue
# JP: お豆のところ――クリトリス。
1227 = "Chỗ hạt đậu——âm vật."
# monologue
# JP: その繊細な部分を守る包皮の中まで、\n甘酒を染み渡らせたく、懸命に舌先を動かしてみる。
1403 = "Tôi muốn rượu ngọt thấm đẫm vào tận bên trong lớp bao quy đầu bảo vệ bộ phận nhạy cảm ấy,\nnên đã ra sức cử động đầu lưỡi."
# monologue
# JP: （くちゅっ――こしゅっ――くりゅっ――ねりゅっ――）
1538 = "（Nhóp nhép——chóp chép——liếm láp——mút mát——）"
# 【ハチロク】
# display as 鈴
# JP: 「は――ひっ――んっ――そ、そこは――双鉄さまっ――\nわたくし――そんなに――くり、くり、される――と！」
463 = "「Ha——hi——ưm——ch, chỗ đó——Ngài Soutetsu——\nEm——nếu cứ bị——kích thích, như vậy——thì!」"
# monologue
# JP: 鼻先にかかる甘酒の波が大きくなってる。
1464 = "Những gợn sóng rượu ngọt vỗ vào mũi tôi ngày càng lớn."
# monologue
# JP: このままでは布団にこぼれかねんが、\nさりとて責めも緩めたくない。で、あれば――
1400 = "Cứ thế này thì có thể sẽ tràn ra nệm mất,\nnhưng tôi cũng không muốn giảm bớt sự tấn công. Nếu vậy thì——"
# 【双鉄】
# display as 雙鐵
# JP: （ずぞっ――ぞおおおおおおおおおおっ！）
1559 = "（Hútttt——hútttttttttttttttttt!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ！　あっ！？　吸われ――おまめっ…ふぁっ！\nおまんまん――ぁ……じゅるじゅる――音、やっ――ん」
708 = "「Hya! A!? Bị mút rồi——hạt đậu... huaa!\nTiểu huyệt——a......tiếng——chóp chép——xấu hổ, quá——ưm」"
# 【双鉄】
# display as 雙鐵
# JP: （ごくんっ！）
1562 = "（Ực!）"
# 【ハチロク】
# display as 鈴
# JP: 「……あっ――ごくんっ――双鉄、様――だんなさま、が、\nんっ！　――　わたくし、わたくしの、われめ、ざけっ」
477 = "「......A——tiếng nuốt ực——Ngài, Soutetsu——phu quân, đã,\nƯm! —— Rượu, rượu khe hở của em, của em」"
# monologue
# JP: （れるううううううううううううっ！！！）
1547 = "（Liếm lútttttttttttttttttt!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「くひぃぃぃぃぃぃぃぃぃぃっ！！！」
811 = "「Kuhiiiiiiiiiiiiiii!!!」"
# monologue
# JP: 甘酒の量を減らしたところで、\n思う存分、舌を滑らす。
1351 = "Sau khi làm vơi bớt lượng rượu ngọt,\ntôi thỏa thích trượt dài chiếc lưỡi."
# monologue
# JP: すずは大きく体を震わせ、\n浅くなってる甘酒が、ほとんど眉まで雫を飛ばす。
1426 = "Suzu rùng mình dữ dội,\nlàm những giọt rượu ngọt đã vơi đi văng lên tận lông mày tôi."
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ――あっ――あっ――あっ――双鉄、さま、\n双鉄さま――そうてつさまぁっ！！」
728 = "「Huaa——a——a——a——Ngài, Soutetsu,\nNgài Soutetsu——Ngài Soutetsu!!」"
# monologue
# JP: 上ずった声で名前を呼ばれる。\n甘え縋られ、繰り返される。
1200 = "Em gọi tên tôi bằng giọng the thé.\nLàm nũng, nài nỉ và gọi đi gọi lại."
# monologue
# JP: すずはもう、絶頂したくて焦れている。\n僕の勃起も、狂おしいほどに硬直してる。
1416 = "Suzu đã nôn nóng muốn lên đỉnh lắm rồi.\nCôn thịt của tôi cũng đang cương cứng đến phát điên."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 470 = "「……」" 
# 【ハチロク】
# display as 鈴
# JP: 「ぁ！」
# 787 = "「啊！」" 
# monologue
# JP: 本気で行くぞ、の思いを込めて、\n舌でクリトリスに軽く触れれば、可愛い声が応じてくれる。
1304 = "Chứa đựng ý nghĩ \"Anh sẽ làm thật đấy\",\ntôi khẽ chạm lưỡi vào âm vật, và một giọng nói đáng yêu đã đáp lại."
# 【双鉄】
# display as 雙鐵
# JP: （もうそろそろか）
1580 = "（Chắc cũng đến lúc rồi nhỉ）"
# monologue
# JP: 心ゆくまで、すずに乱れてもらえるように。\nすずの銘酒を、独り占めして呑み干すために――
1341 = "Để Suzu có thể đắm chìm trong khoái cảm đến thỏa mãn.\nĐể độc chiếm và uống cạn loại danh tửu của Suzu——"
# monologue
# JP: （ずちゅるるるるるうううううううっ！！！）
1527 = "（Mút mátttttttttttttttttt!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひあっ！？　いやですぅ――わざと――ふ、ぁっ――\nんっ――わざと、そのようなっ――下品な、音――く！」
743 = "「Hia!? Không chịu đâu——cố tình——hu, a——\nƯm——cố tình, tạo ra âm thanh——dâm đãng, như vậy——khục!」"
# monologue
# JP: （れるっ！　れろっ！　じゅぶっ！　じゅるるるうっ！）
1549 = "（Liếm! Mút! Nhóp nhép! Chóp chépppp!）"
# 【ハチロク】
# display as 鈴
# JP: 「おまん――まん……ぁ……直、接――飲ん……で――\n双鉄、様、が――わたくし、わたくしの――おまんまん」
859 = "「Tiểu huyệt——......a......Uống, trực——tiếp......——\nNgài, Soutetsu, đang——tiểu huyệt, của em——của em」"
# monologue
# JP: （れるっ！　じゅぢゅっ！　れろんっ！　ずうりゅっ！）
1548 = "（Liếm! Nhóp nhép! Mút mát! Chóp chép!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひぁっ！　あっ！　あっ！　なか――なか――んっ――\nは――べろべろ――され、て――すすられ――て、あ！」
738 = "「Hia! A! A! Bên trong——bên trong——ưm——\nHa——bị liếm láp——vào——bị hút lấy——vào, a!」"
# monologue
# JP: 呼気と吐気とのペースが早い。\n舌先に乗る蜜は濃く、感じる温度は高くなってる。
1152 = "Nhịp hít vào thở ra của em ngày càng nhanh.\nMật ngọt đọng trên đầu lưỡi tôi trở nên đặc quánh, nhiệt độ cảm nhận được cũng tăng lên."
# monologue
# JP: 膣はひくひく蠢いて、僕の舌先を奥ヘ奥へと、\n懸命に誘おうとしてくれている。から――
1451 = "Âm đạo co bóp ngọ nguậy, cố gắng mời gọi đầu lưỡi tôi\nvào sâu, sâu hơn nữa. Vì vậy——"
# monologue
# JP: （にゅぼぉぉぉぉぉぉぉぉぉぉぉぉっっっ！）
1581 = "（Thọcccccccccccccccccccc!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゅあっ！！？」
740 = "「Hyua!!?」"
# monologue
# JP: 舌の全部を硬く尖らせ、\nすずの奥へと、子宮へと、思いっきりに突き出し伸ばす！
1280 = "Tôi gồng cứng và làm nhọn toàn bộ chiếc lưỡi,\ndốc sức vươn dài, thọc sâu vào bên trong Suzu, hướng tới tử cung!"
# monologue
# JP: すずの膣が小さく浅くあるとても、無論届きはしないゆえ、\n途中、天井、一番ゾロリとしているところを！
1424 = "Dù âm đạo của Suzu nhỏ và nông đến đâu, dĩ nhiên là lưỡi tôi không thể chạm tới đó được,\nnên trên đường đi, tôi nhắm vào trần âm đạo, nơi nhạy cảm nhất!"
# monologue
# JP: （ぞるるるるるっ！！！）
# 1547 = "（咻嚕——！！！）" 
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ！？　そこっ！　あっ――あっ――んっ――！\nんく～～～～～～～～～～～～～～～～～っ！！！」
732 = "「Huaa!? Chỗ đó! A——a——ưm——!\nƯn ku~~~~~~~~~~~~~~~~~!!!」"
# monologue
# JP: （きゅう！　きゅきゅううううううっ！！！）
1593 = "（Siết! Siết chặtttttt!!!）"
# monologue
# JP: 身を硬くして、おまんまんさえ引き絞らせて、\nすずが絶頂に身を震わせる。
1217 = "Cơ thể em cứng đờ, ngay cả tiểu huyệt cũng siết chặt lại,\nSuzu run rẩy vươn tới đỉnh điểm."
# monologue
# JP: 満足感と達成感とに満ち満ちながら、\n収縮してる膣道が、緩むまでじっと動かずに――っ！？
1276 = "Tràn ngập cảm giác thỏa mãn và thành tựu,\ntôi nằm yên bất động cho đến khi đường âm đạo đang co thắt nới lỏng ra——!?"
# 【ハチロク】
# display as 鈴
# JP: 「あっ！」
# 787 = "「啊！」" 
# monologue
# JP: （ちょ――ちょっ――ちょおおおっ！）
1550 = "（Tí tách——tí tách——tuôn trào!）"
# monologue
# JP: 緩んだかと思った瞬間、\n顔に温水がぶつかってくる。
1228 = "Ngay khoảnh khắc tôi nghĩ nó đã nới lỏng,\nmột dòng nước ấm áp đã đập thẳng vào mặt tôi."
# monologue
# JP: 慌てて舌を引き抜いて――
1273 = "Tôi vội vàng rút lưỡi ra——"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
951 = "「っ!」"
# 【ハチロク】
# display as 鈴
# JP: 「ふああっ！！！」
726 = "「Huaa!!!」"
# monologue
# JP: おまんまん全部を口で覆ってフタをする。\n口の最奥、喉にまで、びしびしと温水がぶつかってくる。
1285 = "Dùng miệng bao phủ và bịt kín toàn bộ tiểu huyệt.\nDòng nước ấm áp bắn tung tóe vào tận sâu trong miệng, chạm tới cả cổ họng tôi."
# 【ハチロク】
# display as 鈴
# JP: 「いや……ぁ……わたくし、粗相を……んっ――双鉄さま\n――旦那、様の――おくち、に――おもらし――してっ」
922 = "「Không......a......Em, đã lỡ thất lễ......ưm——Ngài Soutetsu\n——Vào miệng——của phu, quân——em đã——tiểu ra mất rồi」"
# monologue
# JP: （ちょおおおおおおおおおおおっ！）
1541 = "（Tuôn tràoooooooooooo!）"
# monologue
# JP: おもらし、たしかにおもらしだ。\n単なる蒸気排水とはいえ、いま放出すべきものじゃない。
443 = "Tiểu ra, đúng là tiểu ra thật rồi.\nDù chỉ đơn thuần là xả nước ngưng hơi nước, nhưng đây không phải là lúc nên xả."
# monologue
# JP: 恥じ入りまくる声とうらはら、すずのおもらしの勢いは、\nむしろさらに増し、喉から伝わり体の芯まで熱くする。
1454 = "Trái ngược với giọng nói vô cùng xấu hổ, lực tiểu của Suzu\nthậm chí còn mạnh hơn, truyền từ cổ họng và làm nóng bừng cả tâm can tôi."
# 【双鉄】
# display as 雙鐵
# JP: （んくっ！　ごくっ！　ごくっ！！　ごくんっ！！）
1561 = "（Ưn ku! Ực! Ực!! Ực!!）"
# 【ハチロク】
# display as 鈴
# JP: 「の、飲んで……は――ふ、か――だんな、さま――が、\nわたくしの、おも、らし――ごくごく――のん、で――」
681 = "「Đ, đừng uống......mà——hu, a——phu, quân——đang,\nuống ừng ực——nước, tiểu——của em——sao——」"
# monologue
# JP: 飲めば飲むほど、単なる蒸気排水に、\nそれだけではない味が混ざって濃くなってくる。
1362 = "Càng uống, dòng nước ngưng hơi nước đơn thuần ấy,\ncàng hòa lẫn với những hương vị khác và trở nên đậm đà hơn."
# monologue
# JP: 飲まされて。酔わされている。\n甘酒ではなく、すずそのものに。
1166 = "Bị ép uống. Bị làm cho say đắm.\nKhông phải vì rượu ngọt, mà là vì chính bản thân Suzu."
# 【ハチロク】
# display as 鈴
# JP: 「ふぁ……ぁァ――――――あっ……全部……ぜん、ぶ\n――わたくし――全部を――旦那様、の――おくち、に」
813 = "「Hua......aa——————a......Tất cả......toàn, bộ\n——Em——tất cả——vào miệng, của——phu quân」"
# monologue
# JP: （ちょろ――ちょっ――ちょおお……ちょろ――ぴゅっ）
1546 = "（Róc rách——tí tách——tuôn trào......róc rách——phụt）"
# 【双鉄】
# display as 雙鐵
# JP: （ごきゅんっ！！　――ちゅううううううううううっ！）
1558 = "（Ực!! ——Chụtttttttttttttttt!）"
# 【ハチロク】
# display as 鈴
# JP: 「いぅん！？　あ――吸、吸って――ひ――きゅ！　ふぁ\n――おもら、し――全部――残りも――吸いだされ、て」
746 = "「Iun!? A——Hút, hút mất rồi——hi——kyu! Hua\n——Nước, tiểu——tất cả——cả phần còn lại——cũng bị hút ra, hết」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぷぁっ！」
847 = "「Pua!」"
# 【ハチロク】
# display as 鈴
# JP: 「ん……はぁ……あ……そうてつ、さま――双鉄様ぁ」
823 = "「Ưm......haa......a......Ngài, Soutetsu——Ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
783 = "「À」"
# monologue
# JP: あれほど吸って飲んでなお、\n濡れに濡れてるすずの股から顔を離して、立ち上がる。
1164 = "Dù đã hút và uống nhiều đến thế,\ntôi rời mặt khỏi đũng quần ướt đẫm của Suzu và đứng dậy."
# monologue
# JP: 僕の勃起も、とっくのとうに限界硬度だ。\nすずの視線もそれをわかって、じっと見つめてくれている。
1293 = "Côn thịt của tôi cũng đã đạt đến giới hạn độ cứng từ lâu rồi.\nÁnh mắt Suzu cũng hiểu điều đó, và đang đăm đắm nhìn tôi."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄……さま。わたくしは――すず、は――」
947 = "「Ngài......Soutetsu. Em——Suzu, thì——」"
# monologue
# JP: こくりと真っ白な喉が蠢く。\nちろりとピンクの舌が覗いて、その唇を湿らせる。
1219 = "Chiếc cổ trắng ngần khẽ nuốt ực một cái.\nChiếc lưỡi màu hồng đào khẽ thò ra, làm ướt đôi môi ấy."
# 【ハチロク】
# display as 鈴
# JP: 「すずは――すずも。飲んでみたく……なりました。\n甘酒を……双鉄様の――濃くて、濁った……甘酒、を」
868 = "「Suzu——Suzu cũng. Muốn thử uống......rồi ạ.\nRượu ngọt......của Ngài Soutetsu——rượu ngọt......đặc và đục, ấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「……なるほどな」
474 = "「......Ra là vậy」"
# monologue
# JP: 一刻もはやく挿入し、思いっきりに射精をしたい気持ちは\n無論、焦がれるほどだ。
1256 = "Kể cả cảm giác muốn đút vào càng sớm càng tốt, và xuất tinh một cách thỏa thích\ntất nhiên là cháy bỏng rồi."
# monologue
# JP: が――かわいい妻のかわいいおねだり。\n無碍にするほど、僕とて愚かな男ではない。
1106 = "Nhưng——lời nài nỉ đáng yêu của người vợ đáng yêu.\nTôi đâu phải là gã đàn ông ngu ngốc đến mức phớt lờ điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、だ――」
933 = "「Nếu vậy, thì——」"
# monologue
# JP: （チィィィィ）
1551 = "（Xoẹtttt）"
# 【ハチロク】
# display as 鈴
# JP: 「あ！　わたくしがお脱がせいたしま――んっ！」
788 = "「A! Để em cởi cho ngài——ưm!」"
# monologue
# JP: 軽く、突く。\nすずの可憐な唇を、猛り狂ってる勃起の先で。
1277 = "Khẽ, chạm vào.\nChạm đầu côn thịt đang cuồng nộ vào đôi môi đáng yêu của Suzu."
# 【ハチロク】
# display as 鈴
# JP: 「あ……匂い、濃い……ん――（すん、すん）――\nはぁぁあ――胸、いっぱいに、双鉄様の……匂い、が」
778 = "「A......mùi, nồng quá......ưm——（Hít, hít）——\nHaaa——Trong lồng ngực, tràn ngập......mùi hương, của Ngài Soutetsu」"
# monologue
# JP: すずがうっとり囁くその度、\n唇の動きと震えが、勃起を伝わり脳を蕩かす。
1419 = "Mỗi lần Suzu say đắm thì thầm,\nchuyển động và sự rung rẩy của đôi môi truyền qua côn thịt, làm tan chảy não bộ tôi."
# monologue
# JP: ”口内でもいい、早く深くに挿入を――”\n体の切実な要請を、あえてギリギリと押し殺す。
446 = "\"Trong miệng cũng được, hãy đút vào sâu và nhanh lên——\"\nTôi cố gắng kìm nén sự thôi thúc mãnh liệt của cơ thể đến tận giới hạn."
# 【双鉄】
# display as 雙鐵
# JP: 「味わうのは、匂いだけでいいのか？」
687 = "「Chỉ thưởng thức mùi hương thôi là đủ rồi sao?」"
# 【ハチロク】
# display as 鈴
# JP: 「いいえ、旦那様。今宵のすずは、欲張りです。\n匂いだけでは、とても満足できませぬ――ちゅむっ」
685 = "「Không đâu, phu quân. Suzu đêm nay, tham lam lắm.\nChỉ với mùi hương thì không thể nào thỏa mãn được đâu——chụt」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 951 = "「！」" 
# monologue
# JP: 唇が亀頭に吸い付いてくる。
1196 = "Đôi môi mút chặt lấy quy đầu."
# monologue
# JP: 奥まで一気に含みはせずに、そのまま舌がちょんちょんと、\n亀頭の割れ目を舐め擦ってくる。
1176 = "Em không ngậm sâu vào ngay lập tức, mà cứ để chiếc lưỡi chạm nhẹ,\nliếm láp khe hở của quy đầu."
# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅっ――れろっ――れるっ――ちゅっ――\nちゅむ……ん……ぺろっ――れろっ――ちゅううっ！」
825 = "「Ưm......chụt——liếm——mút——chụt——\nchụt......ưm......liếm láp——mút mát——chụttttt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くうっ――」
758 = "「Kuu——」"
# monologue
# JP: 舐めながら、吸う。\n極めて単純な行為はそれゆえ、暴力的なまでの効果を示す。
1174 = "Vừa liếm, vừa mút.\nHành động cực kỳ đơn giản đó lại mang đến hiệu quả bạo lực đến không ngờ."
# monologue
# JP: 僕の勃起の先端はもうブキブキと膨れ震えて、\n射精したい、射精したいと身悶え汗を流してる。
1301 = "Đầu côn thịt của tôi đã sưng tấy và run rẩy,\nquằn quại và đổ mồ hôi hột với khao khát muốn xuất tinh, muốn xuất tinh."
# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅるっ――ちゅ――れるっ――れろ……ぺろっ\n――ふ……ん……ハムッ――はむっ――ちゅ、ちゅるる」
829 = "「Ưm......chụt——chụt——liếm——mút......liếm láp\n——hu......ưm......Ngậm——ngoạm——chụt, chụt chụt」"
# 【双鉄】
# display as 雙鐵
# JP: 「す……ずっ――」
# 815 = "「嗯——」" 
# monologue
# JP: 亀頭の先を唇だけで、何度も何度も甘噛みされる。\n舌先は弱火で炙るが如く、鈴口だけに刺激を与える。
1203 = "Em dùng môi cắn yêu đầu quy đầu hết lần này đến lần khác.\nĐầu lưỡi kích thích vào lỗ sáo như đang hơ trên ngọn lửa nhỏ."
# monologue
# JP: その繰り返しに、溶けて行く。\n理性が、我慢が、どろどろになって崩されていく。
1142 = "Sự lặp đi lặp lại đó khiến tôi tan chảy.\nLý trí, sự nhẫn nhịn, tất cả đều trở nên nhão nhoét và sụp đổ."
# 【双鉄】
# display as 雙鐵
# JP: 「すず――頼むっ」
936 = "「Suzu——Anh xin em đấy」"
# 【ハチロク】
# display as 鈴
# JP: 「は……むっ――ちゅ――ん――ほまはへふははひ、\nん……れるっ――ほーへふ……はまっ――ちゅっ！」
780 = "「Ha......ngoạm——chụt——ưm——ho ma ha he hu ha ha hi,\nƯm......liếm——ho he hu......ngoạm——chụt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「んうっ」
837 = "「Ưm u」"
# monologue
# JP: 咥えられたまま囁かれ、\n危うく声に振動に、射精をしてしまいそうにさえなる。
1182 = "Vừa ngậm lấy vừa thì thầm,\nchỉ một chút nữa thôi là sự rung động của giọng nói đó đã khiến tôi xuất tinh mất rồi."
# monologue
# JP: 任せてくれとささやきながら、\nけれどもすずの動きは変わらぬ繰り返しを――！？
1212 = "Dù thì thầm bảo hãy giao cho em,\nnhưng chuyển động của Suzu vẫn lặp đi lặp lại không đổi——!?"
# 【ハチロク】
# display as 鈴
# JP: 「ちむっ――れろっ――れるっ――るっ――ちゅむ――\nちゅうっ――はむっ――れろっ――れるる――ずじゅっ」
805 = "「Chụt——liếm——mút——mút——chụt——\nchụttttt——ngoạm——liếm——mút mát——nhóp nhép」"
# monologue
# JP: いや、違う。同じ動きを繰り返しつつ、\n甘噛の度、咥える深度が深くなってる。
1084 = "Không, không phải. Vừa lặp lại chuyển động cũ,\nmỗi lần cắn yêu, độ sâu khi ngậm lại tăng lên."
# monologue
# JP: そのじわじわが、焦れったすぎて気持ち良すぎて、\n腰が勝手に動き出すのを、必死になって食い止める。
1401 = "Sự chầm chậm đó quá đỗi sốt ruột và sung sướng,\ntôi tuyệt vọng kìm nén cái eo đang tự động muốn chuyển động."
# 【双鉄】
# display as 雙鐵
# JP: （すずは――すずだ。僕の、おんなだ。\n僕を生殺しで放置するなど――ありえん話しだ）
1595 = "（Suzu là——Suzu. Là người phụ nữ, của tôi.\nViệc em bỏ mặc tôi sống dở chết dở thế này——là chuyện không thể nào）"
# 【ハチロク】
# display as 鈴
# JP: 「あむっ――ちゅっ――ちゅるっ――えれっ――んっ――\nはぷっ――ちゅっ――ずじゅっ――ちゅる――はむっ」
786 = "「A mu——chụt——chụt——liếm——ưm——\nha pu——chụt——nhóp nhép——chụt——ngoạm」"
# 【双鉄】
# display as 雙鐵
# JP: 「ァぁっ――ン――くっ」
782 = "「Aaa——ưm——khục」"
# monologue
# JP: 信じてもなお、焦れったい。\n首筋に、背中にぶわぶわ汗が滲んで流れ落ちてく。
1455 = "Dù có tin tưởng, tôi vẫn thấy nôn nóng.\nMồ hôi rịn ra ở gáy, ở lưng rồi chảy ròng ròng."
# monologue
# JP: 気持ち良すぎて、もっと気持ちよくなりたくて、\n僕の全部が、もうカラカラに乾いてしまっ――っ！！？
1225 = "Quá sung sướng, muốn được sung sướng hơn nữa,\ntoàn bộ cơ thể tôi đã khô khốc cả rồi——!!?"
# 【ハチロク】
# display as 鈴
# JP: 「ずぢゅるるうううううううううううううううっっ！！」
722 = "「Mút mátttttttttttttttttttttt!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふうううううっ！？」
734 = "「Huuuuuu!?」"
# monologue
# JP: その瞬間は不意に来る！
1406 = "Khoảnh khắc đó bất ngờ ập đến!"
# monologue
# JP: すずはその、やわらかで短くかわいい舌を、\n僕の勃起専用の、レッドカーペットへと変化させっ！
1418 = "Suzu đã biến chiếc lưỡi mềm mại, ngắn ngủi và đáng yêu đó,\nthành tấm thảm đỏ dành riêng cho côn thịt của tôi!"
# 【ハチロク】
# display as 鈴
# JP: 「んむっ！　ん――むっ！！　じゅろろっ！　ちゅむ！　\n（すっ――ひっ）ちゅるっ！　れろおおおおおおっ！」
841 = "「Ưm mu! Ưm——mu!! Chóp chép! Chụt!\n（Su——hi）Chụt! Liếm láp!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁぁっっ」
# 783 = "「啊啊」" 
# monologue
# JP: 亀頭の先が口の奥を突き、なおも吸い。\n喉まで挿れて鼻で必死に吸気排気を繰り返し。
1466 = "Đầu quy đầu chạm đến tận cùng khoang miệng, nhưng em vẫn tiếp tục mút.\nĐút sâu đến tận cổ họng, em tuyệt vọng lặp đi lặp lại việc hít vào thở ra bằng mũi."
# monologue
# JP: そうしてすずはそうしながらさえ、\n舌を動かすことをやめずにっ！
1150 = "Và ngay cả khi đang làm vậy,\nSuzu vẫn không ngừng cử động lưỡi!"
# 【ハチロク】
# display as 鈴
# JP: 「ちゅろおおおっ！　にゅぼおおっ！　じゅぶうううっ！\nじゅぼおおおお！　じゅるるううっ！　じゅ！　ぼっ！」
803 = "「Chụtttt! Thọcccc! Nhóp nhépppp!\nNhóp nhépppp! Chóp chépppp! Nhóp! Nhép!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ！」
729 = "「Huaa!」"
# monologue
# JP: 最初は長く、大きくゆるく。\nそうして早く！　
1131 = "Lúc đầu thì dài, mạnh và chậm rãi.\nSau đó thì nhanh dần!"
# monologue
# JP: すずの頭が口全体が、僕の勃起をしごきにかかる！
1425 = "Đầu và toàn bộ khoang miệng của Suzu đang bắt đầu tuốt lấy côn thịt của tôi!"
# 【ハチロク】
# display as 鈴
# JP: 「じゅぼっ！　じゅぶっ！　れるっ！　れろおっ！\nじゅるるっ！　じゅ！　じゅぼっ！　ぶぢゅ！！」
798 = "「Nhóp nhép! Nhóp nhép! Liếm! Mút mát!\nChóp chép! Nhóp! Nhóp nhép! Bạch!!」"
# monologue
# JP: 淫猥な音を響かせながら、勃起を口でズボズボしながら、\n舌の動きも、不意の吸引も忘れない。
1175 = "Vừa tạo ra những âm thanh dâm đãng, vừa dùng miệng đút ra đút vào côn thịt,\nnhưng em cũng không quên cử động lưỡi và những cú mút bất ngờ."
# monologue
# JP: すずの両頬は真っ赤に染まり、瞳は潤んで僕を見上げて、\nその健気さに、さらに精液の水位があがる。
1423 = "Hai má Suzu đỏ bừng, đôi mắt ươn ướt ngước nhìn tôi,\nsự kiên cường đó càng làm mực tinh dịch dâng cao hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「く――ぁっ――すず！　すずっ！」
465 = "「Ku——a——Suzu! Suzu!」"
# 【ハチロク】
# display as 鈴
# JP: 「ん……でゅほっ――ちゅっ――ふっ――ろーろ――ん、\nふっ――ほふ、ひひ――ちゅむっ――ほーへふ、ははっ」
831 = "「Ưm......dyu ho——chụt——hu——ro ro——ưm,\nhu——ho hu, hi hi——chụt——ho he hu, ha ha」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ、ああ――」
791 = "「A, aa——」"
# 【ハチロク】
# display as 鈴
# JP: 「じゅぶっ！　じゅろっ！　じゅっ！　ちゅるるっ！\nじゅろっ！　じゅぶっ！　れるっ！　ちゅうううっ！」
807 = "「Nhóp nhép! Chóp chép! Nhóp! Chóp chép!\nChóp chép! Nhóp nhép! Liếm! Chụttttt!」"
# monologue
# JP: 瞳の奥側、延髄の裏、そこにチカチカ火花が走る。
1354 = "Sâu thẳm trong đôi mắt, phía sau tủy não, những tia lửa điện lóe lên."
# monologue
# JP: すずの口内はとろけ絡んで、\n僕の勃起も、もう一体とされてしまったような気がする。
1421 = "Khoang miệng của Suzu tan chảy và quấn quýt lấy,\ncôn thịt của tôi cũng có cảm giác như đã hòa làm một với em."
# 【ハチロク】
# display as 鈴
# JP: 「じゅぼっ！　じゅうっ！　じゅぼっ！　ぢゅるっ！\nぼっ！　ぢゅぼっ！　じゅばっ！　ぢゅぶうっ！！」
796 = "（Nhóp nhép! Chụt! Nhóp nhép! Chóp chép!\nBụp! Nhóp nhép! Nhóp nhép! Nhóp nhépppp!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「すず！　すず！　すず！　すずっ！！」
939 = "「Suzu! Suzu! Suzu! Suzu!!」"
# monologue
# JP: 再加速。\n一直線で単純な。
1135 = "Tiếp tục tăng tốc.\nMột đường thẳng tắp và đơn thuần."
# monologue
# JP: 僕の射精がすぐそこにあると、\nすずが誰より――恐らく僕より、わかってくれてる！
1093 = "Rằng tôi sắp sửa xuất tinh đến nơi rồi,\nSuzu là người hiểu rõ hơn bất cứ ai——có lẽ còn hiểu rõ hơn cả chính tôi!"
# monologue
# JP: （ぴたっ）
1552 = "（Khựng lại）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
952 = "「!!?」"
# monologue
# JP: 亀頭の先端だけを咥える――\nその状態まで頭を引いて、すずは動きをぴたりととめる。
1193 = "Em rút đầu lại cho đến khi——\nchỉ còn ngậm mỗi phần chóp quy đầu, rồi Suzu đột ngột dừng hẳn mọi chuyển động."
# monologue
# JP: その目がにぃ、と、\n幸せそうな、微笑の、優しさのアーチを描く。
1207 = "Đôi mắt em híp lại,\nvẽ nên một đường cong dịu dàng của nụ cười đong đầy hạnh phúc."
# 【ハチロク】
# display as 鈴
# JP: 「ほーへふはふぁっ――ん……ほーほ、\nわらふひひ……はふぁふぁぇ、ほ――」
724 = "「Ho he hu ha hua——ưm......ho ho,\nwa ra hu hi hi......ha hua hua e, ho——」"
# monologue
# JP: “どうぞ、わたくしに甘酒を”
447 = "\"Xin ngài, hãy ban cho em rượu ngọt\""
# monologue
# JP: 言われたことを理解して、\nぶわりよろこびが膨れ上がって――っ！！？
1274 = "Hiểu được những gì em nói,\nniềm sung sướng trong tôi chợt trào dâng mạnh mẽ——!!?"
# 【ハチロク】
# display as 鈴
# JP: 「じゅぼおおおおおおおおおおおおおおおおおっ！！！」
799 = "「Nhóp nhéppppppppppppppppppppppppp!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ！！！！」
467 = "「——!!!!」"
# monologue
# JP: （びゅくっ！　びゅっ！！　どびゅるっ！　びゅっ！！）
1567 = "（Phụt! Phụt!! Phụt! Phụt!!）"
# 【ハチロク】
# display as 鈴
# JP: 「んむっ！？　ん……ふ……ん――ごく――ごく――\nじゅうう――じゅる――ごくっ――ごくんっ！　ごくっ」
843 = "「Ưm mu!? Ưm......hu......ưm——ực——ực——\nchụttttt——chóp chép——ực——ực! Ực」"
# monologue
# JP: （びゅううう！　びゅっ！　びゅる！　びゅるんつ）
1572 = "（Phụtttt! Phụt! Phụt! Phụt）"
# 【ハチロク】
# display as 鈴
# JP: 「んくっ――ごくっ――ごきゅ――ごきゅん――じゅる」
839 = "「Ưn ku——ực——ực——ực——chóp chép」"
# monologue
# JP: すずが、飲んでる。\n僕から弾けた白濁液を――お雛祭りの甘酒を。
1413 = "Suzu đang uống.\nThứ chất lỏng trắng đục bắn ra từ tôi——chén rượu ngọt của Lễ hội Búp bê."
# monologue
# JP: 口の端からこぼれかければ慌てすすって、\n一滴たりとも残さぬように、懸命に飲んでくれている。
1361 = "Tinh dịch chực trào ra khỏi khóe miệng, em liền vội vàng mút lấy,\nem đang tuyệt vọng nuốt trọn để không bỏ sót một giọt nào."
# monologue
# JP: （びゅっ――びゅうう――びゅっ――ぴるっ――ぴっ）
1566 = "（Phụt——phụtttt——phụt——phụt——phụt）"
# 【ハチロク】
# display as 鈴
# JP: 「じゅるうううううううううううううううっ！！！」
802 = "「Chóp chépppppppppppppppppp!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くあああっ！？」
784 = "「Kuaaa!?」"
# monologue
# JP: （びゅっ！　びゅ――るっ！！）
1579 = "（Phụt! Phụ——t!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ずぞぞぞぞっ――――ごくん。……ん――ぷあっ！」
810 = "「Zuzozozo————ực. ......Ưm——pua!」"
# monologue
# JP: 甘酒を飲むというより、うどんをすするようにして。
1331 = "Hành động của em giống như đang húp mì Udon hơn là uống rượu ngọt."
# monologue
# JP: 僕の精液――尿道口で残っていた残滓までをも、すずは\n残らず飲み干して。口の回りを舌でぺろぺろ掃除する。
1191 = "Tinh dịch của tôi——thậm chí cả những giọt cặn còn sót lại ở lỗ niệu đạo, Suzu\ncũng nuốt sạch không chừa lại gì. Rồi em dùng lưỡi liếm láp dọn dẹp quanh miệng."
# 【ハチロク】
# display as 鈴
# JP: 「ん……ふぅ――。うふふ、ごちそうさまでした。\n大変、結構なお点前で」
830 = "「Ưm......huu——. Ufufu, cảm ơn ngài vì bữa ăn.\nQuả là một thức uống tuyệt hảo.」"
# monologue
# JP: にこりと、あどけないような笑み。\nそれを目にした瞬間に、すずの体を抱き上げている！
1188 = "Một nụ cười mỉm ngây thơ.\nNgay khoảnh khắc nhìn thấy nụ cười ấy, tôi liền bế bổng cơ thể Suzu lên!"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ！？　旦那様――双鉄さまっ！？」
715 = "「Hya!? Phu quân——Ngài Soutetsu!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「すず！　すず！　すずっ！　すずっ！！」
# 939 = "「鈴！鈴！鈴！鈴！！」" 
# monologue
# JP: 勢い余って、すずがくるりと回ってしまう。
1305 = "Dư đà, Suzu xoay một vòng."
# monologue
# JP: 体の上へ乗っかった、\nすずは僕へと、背中を向けてる。
1259 = "Em cưỡi lên người tôi,\nquay lưng lại với tôi."
# 【ハチロク】
# display as 鈴
# JP: 「あ……旦那様――\nこの姿勢だと、旦那様のお顔があまり」
776 = "「A......Phu quân——\nTư thế này, em không nhìn rõ mặt phu quân cho lắm」"
# monologue
# JP: すずは懸命に体をひねり、\nそれがあまりに可愛らしくて、迎えいれながらキスをする。
1417 = "Suzu tuyệt vọng vặn vẹo cơ thể,\ndáng vẻ ấy quá đỗi đáng yêu, khiến tôi vừa đón lấy em vừa trao một nụ hôn."
# 【ハチロク】
# display as 鈴
# JP: 「あ……ん……ちゅっ――んむっ――ちゅっ――っれろ、\nじゅるっ――ちゅむっ――ちゅるっ――れるうっ」
773 = "「A......ưm......chụt——ưm mu——chụt——liếm,\nchóp chép——chụt——chóp chép——liếm lútttt」"
# 【双鉄】
# display as 雙鐵
# JP: （ん……む――）
1560 = "（Ưm......mu——）"
# monologue
# JP: キスをしたその瞬間に、\nえづきたくなるほどの生臭さ、青臭さ。
1314 = "Ngay khoảnh khắc chạm môi,\nmột mùi tanh nồng, ngai ngái xộc lên khiến tôi muốn nôn ọe."
# monologue
# JP: これをあれほどうまそうに飲んでくれたかと思えばすぐに、\n短い舌を、僕の方から思いっきりにすすってる。
1186 = "Vừa nghĩ đến việc em đã uống thứ này một cách ngon lành đến thế,\ntôi liền chủ động mút lấy chiếc lưỡi ngắn ngủi ấy một cách mãnh liệt."
# 【ハチロク】
# display as 鈴
# JP: 「はむっ！？　ん――ひゅっ――ん……れるっ――ろっ、\nちゅ――ちゅむっ――ほーへふ……んっ――はふぁぁ」
754 = "「Ha mu!? Ưm——hyu——ưm......liếm——liếm,\nchu——chụt——ho he hu......ưm——ha huaa」"
# monologue
# JP: 甘えた声で僕の名を呼び、\nすずの体がどんどんどんどん熱くなる。
1184 = "Em gọi tên tôi bằng giọng nũng nịu,\ncơ thể Suzu dần dần, dần dần trở nên nóng rực."
# monologue
# JP: （ゆ、さっ――ゆさっ――すりっ――しりゅっ――）
1589 = "（Lắc lư——lắc lư——cọ xát——trơn tuột——）"
# monologue
# JP: すずの体が、動き始める。
1209 = "Cơ thể Suzu, bắt đầu chuyển động."
# monologue
# JP: おまたで潰す僕の勃起を、\n可憐な割れ目に食い込ますように、味わうように。
1199 = "Em dùng hai đùi ép chặt lấy côn thịt của tôi,\nnhư muốn nhét nó vào khe hở đáng yêu ấy, như muốn thưởng thức nó."
# 【ハチロク】
# display as 鈴
# JP: 「ちゅ……むっ――ん――ぷぁ――あっ！　双鉄、様……\nさっき――あれほど、お出しに、なったの……に――ん」
794 = "「Chu......mu——ưm——pua——a! Ngài Soutetsu......\nLúc nãy——ngài vừa mới xuất, nhiều đến thế......mà——ưm」"
# 【双鉄】
# display as 雙鐵
# JP: 「すずとひとつになれるのだ。どれ程射精をした後とても、\nすぐさま勃起は、最硬度まで回復するに決まってる」
921 = "「Được hòa làm một với Suzu mà. Dù có xuất tinh bao nhiêu lần đi chăng nữa,\nchắc chắn côn thịt sẽ ngay lập tức khôi phục lại độ cứng tối đa thôi.」"
# 【ハチロク】
# display as 鈴
# JP: 「う、うれしゅう――ございます――そうてつっ、さま。\nこん……なに――ふと、く――かた、く――あつ、くっ」
814 = "「V, vui quá——Ngài——Soutetsu.\nThế......này——to, quá——cứng, quá——nóng, quá」"
# 【双鉄】
# display as 雙鐵
# JP: 「これが、お前の[なか,1]膣内を抉る」
861 = "「Thứ này, sẽ khoét sâu vào bên trong âm đạo của em.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ」
# 781 = "「啊」" 
# monologue
# JP: きゅう、と吸われる感触がする。
1323 = "Có cảm giác bị mút chặt lấy."
# monologue
# JP: 密着してる膣前庭が、膣口のとろけた粘膜が、\n僕の勃起を欲しがって、きゅんきゅん収縮してくれている。
1389 = "Âm hộ đang dán sát, niêm mạc âm đạo tan chảy,\ndang thèm khát côn thịt của tôi, liên tục co bóp từng đợt."
# 【双鉄】
# display as 雙鐵
# JP: 「抉って、こすって、射精するまで止まらない。\nすずのちいさなおまんまんを、僕の形に変えてしまう」
876 = "「Khoét sâu, cọ xát, sẽ không dừng lại cho đến khi xuất tinh.\nAnh sẽ biến tiểu huyệt nhỏ bé của Suzu thành hình dạng của anh.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい！　はい――わたくしも、そう――望みますっ」
890 = "「Vâng! Vâng——em cũng, mong muốn——như vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん！」
844 = "「Ưm!」"
# monologue
# JP: （ずりゅっ！　ずりゅっ！　しりゅっ！　ずりゅんっ！）
1533 = "（Trơn tuột! Trơn tuột! Trơn tuột! Trơn tuột!）"
# monologue
# JP: すずの小さなおしりが踊る。\n前後に、淫靡に、けど単純に。
1422 = "Cặp mông nhỏ nhắn của Suzu nhảy múa.\nTiến lùi, dâm đãng, nhưng lại rất đơn thuần."
# monologue
# JP: 膣から溢れる蜜を潤滑油と働かせ、ねちょねちょすりすり、\n僕の勃起の上を、甘やかに強くスライドしていく。
1452 = "Dùng mật ngọt tràn ra từ âm đạo làm dầu bôi trơn, nhão nhoét cọ xát,\nem trượt lên trượt xuống trên côn thịt của tôi một cách ngọt ngào và mạnh mẽ."
# 【ハチロク】
# display as 鈴
