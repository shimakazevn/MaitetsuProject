477 = "「……啊——嗯——雙鐵少爺——夫君，嗯！——我，我的，裂口酒……」" 

# monologue
# JP: （れるううううううううううううっ！！！）
1547 = "（咻嚕——！！！）" 

# 【ハチロク】
# display as 鈴
