1341 = "為了讓鈴迷亂到心滿意足，為了獨享鈴釀造的醇酒——" 

# monologue
# JP: （ずちゅるるるるるうううううううっ！！！）
1527 = "（呲、啾嚕——！！！）" 

# 【ハチロク】
# display as 鈴
