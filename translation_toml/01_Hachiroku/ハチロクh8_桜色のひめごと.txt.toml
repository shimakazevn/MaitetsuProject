870 = "「我在文獻裡讀到過，這個好像叫裙帶菜酒」" 

# 【ハチロク】
# display as 鈴
# JP: 「わかめ酒、でございますか？\n……はて。一体、どこにわかめが？」
919 = "「裙帶菜酒？……那究竟哪裡有裙帶菜呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――すずの場合は、わかめが無いか」
849 = "「噢——你確實是沒有那個裙帶菜」" 

# 【ハチロク】
# display as 鈴
# JP: 「あら」
# 781 = "「啊」" 

# monologue
# JP: すずの瞳が一瞬僕の股間をとらえ、\nそれからうふふと、柔らかになる。
1137 = "剎那間，鈴看到了我的胯下，然後眼神就柔和了很多。" 

# 【ハチロク】
# display as 鈴
