# lines: 351 
# 【ハチロク】
# display as 鈴
# JP: 「さ、旦那様――どうぞ、こちらへ」
688 = "「來吧，夫君——來這邊」" 

# monologue
# JP: 布団の上に正座して、ぽんぽん、と\n自分の傍らを叩く。
1195 = "她正坐在被窩上，拍了拍自己身旁的位置。" 

# monologue
# JP: 可愛い仕草に、たたずまいに。\nいたずらごころがフと湧いてくる。
1178 = "她可愛的動作，醞釀出的氛圍。讓我不禁想惡作劇一下。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――ハチロク」
680 = "「不——八六」" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様？　いまは、わたくしたちふたりきりですよ？」
948 = "「雙鐵少爺？現在只有我們二人啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
815 = "「嗯——」" 

# monologue
# JP: 桃の香に酔ってしまっていたらしい。\nこんな大事な約束をうっかりしてしまうとは。
1268 = "我好像陶醉在桃子的香味中了，一不小心忘了這麼重要的約定。" 

# monologue
# JP: ふたりのときは、僕だけの名で。\n僕のおんなに――初めてのとき、つけた名前で。
1103 = "二人獨處的時候，要用屬於我的名字。第一次做愛時，給我的另一半取的名字。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すず」
937 = "「鈴」" 

# 【ハチロク】
# display as 鈴
# JP: 「はい、なんでしょう？　旦那様」
853 = "「在，怎麼了？夫君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「せっかくのひな祭りだ。\n甘酒のひとつも楽しまんでは、もったいなかろう」
908 = "「畢竟是女兒節啊，享受不到甜米酒就太可惜了」" 

# 【ハチロク】
# display as 鈴
# JP: 「甘酒、ですか？」
907 = "「甜米酒？」" 

# monologue
# JP: ふうむ？　と可愛く小首が傾ぐ。
1177 = "她可愛地歪了歪頭。" 

# monologue
# JP: さきほど達して、濡れているのが恥ずかしいのか、\n膝はぴったり、隙無く密着したままだ。
1353 = "看她緊閉雙膝，可能是因為剛才高潮了，覺得下體濕濕的很難為情吧。" 

# 【ハチロク】
# display as 鈴
# JP: 「アルコール類は、異常燃焼の原因になりかねませんので\n……わたくしは、あまり得意では」
934 = "「酒精飲品可能會導致異常燃燒……所以我不能喝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「知っている。ゆえ、飲むのは僕だが――\nすずにもたっぷり、楽しんで欲しいと思っている」
874 = "「我知道，所以就我喝。但我也想讓你好好享受」" 

# monologue
# JP: そうして、異常燃焼もしていただこう。\n心の中で呟きながら、甘酒入りの雛徳利へと手を伸ばす。
1094 = "也讓你異常燃燒一下吧。我一邊在心中嘟噥著，一邊向甜米酒的酒瓶伸出手。" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ！？　あ……なにをっ」
713 = "「呀！？啊……做什麼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「動くな。\nうかつに動けば、布団を甘酒で汚してしまうぞ」
689 = "「別動。亂動潑翻甜米酒的話，被單就要髒了」" 

# 【ハチロク】
# display as 鈴
# JP: 「あ」
781 = "「啊」" 

# monologue
# JP: 律儀なすずは、腿にますますの力をこめる。
1366 = "聽話的鈴大腿並得更加用力了。" 

# monologue
# JP: ……白濁をした甘酒が、すずの小さな股の隙間に、\nなみなみと、溢れんばかりに満たされわずかに揺れている。
462 = "……白濁的甜米酒，在鈴小小的大腿縫中，聚集起了一個滿到要溢出來似的小酒池。" 

# 【双鉄】
# display as 雙鐵
