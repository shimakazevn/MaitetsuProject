# JP: 上ずった声で名前を呼ばれる。\n甘え縋られ、繰り返される。
1200 = "她用很尖細的聲音叫喊著我。她向我頻頻撒嬌，頻頻反覆。" 

# monologue
# JP: すずはもう、絶頂したくて焦れている。\n僕の勃起も、狂おしいほどに硬直してる。
1416 = "鈴已經迫不及待要高潮了。我的肉棒也硬到狂躁不已。" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 470 = "「……」" 

# 【ハチロク】
# display as 鈴
# JP: 「ぁ！」
# 787 = "「啊！」" 

