# 【ハチロク】
# display as 鈴
# JP: 「ぃぃぃぃぃぃぃぃぃぃぃぃぃ～～～～～っ！！！！」
749 = "「咿～～～～～！！！！」" 

# monologue
# JP: すずはもう、体に力を入れられない。\nぐったりくずれ脱力しきり、そうであってもなお膣は！
1415 = "鈴已經徹底使不上力了。但即使精疲力竭，她的陰道還是非常強勁！" 

# monologue
# JP: （きゅうっ！　ぐにゅっ！　きゅむむ！　きゅう！）
1524 = "（吱嗚！咕溜！啾嗚！啾！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！」
755 = "「哈！」" 

# monologue
# JP: 僕の精液を絞り取ろうと、子宮をどぷどぷ満たさせようと、\n密着しつつ揉んで蠢き、性感の糸を張り巡らせる！
1453 = "陰道貼得是那麼緊，它揉搓著我的肉棒，在肉棒上塗滿銀絲，只想榨取我的精液，只想填滿她的子宮！" 

# monologue
# JP: （もみゅっ！　みゅにっ！　こしゅんっ！　くにゅっ！）
1586 = "（揉！扭呢！咻嗯！扭！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゃぎゅっ！？　ふっ――ふあっ！？　あっ――\nおっぱい――っ！　やっ、ちくびっ――くりゅ、ん、ふ」
706 = "「呀嗚！？呼——呼啊！？啊——乳房——！呀，乳頭——揉，嗯，呼」" 

# monologue
# JP: その強烈さを薄れさせたく、少しでも気をそらしたくって、\nすがるようにして乳首を揉めば、すずの体にも力が戻る。
1264 = "我堅持揉弄著她的乳頭，淡化著她的感覺，分散她的注意力。終於，她恢復了力氣。" 

# monologue
# JP: （もみゅ！　むにゅっ！　にゅるっ！　さすすす～～っ）
1584 = "（揉！嗯扭！扭！摸～～）" 

# 【ハチロク】
# display as 鈴
# JP: 「ふあっ！　あっ――ふっ――双鉄、さまっ――\n双鉄――さまぁっ！」
731 = "「呼啊！啊——呼——雙鐵少爺——雙鐵少爺——啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すず、すず！　すずっ！　すずっ！！」
940 = "「鈴，鈴！鈴！鈴！！」" 

# 【ハチロク】
# display as 鈴
# JP: 「はっ――あむっ――ちゅっ――ちゅむうっ――ん……\nしゅ、きっ――ほーへふ……はふぁ、しゅき、しゅきぃ」
751 = "「哈——啊姆——啾——啾嗯嗚——……喜歡——喜歡您……嗚啊，喜歡、喜歡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 470 = "「……」" 

# monologue
# JP: 僕もだ、と、言葉のかわりに舌を動かし、\nすずの小さな口内の、すみずみまでを舐めまくる。
1253 = "我也不說話，而是用舌頭舔遍了她小嘴裡的每一個角落。" 

# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅっ――んんんっ――ふあっ――ふっ――\nちゅっ――チュムッ――れるっ、れろおっ、ん、ちゅっ」
827 = "「嗯……啾——嗯嗯——呼啊——呼——啾——啾嗯——咻嚕，嗯，嗯，啾」" 

# monologue
# JP: 唾液にさえも、酔わされていく。\n体温と匂いに、散らされていく。
1162 = "唾液使我沉醉。體溫和氣味讓我升天。" 

# monologue
# JP: 僕という存在はもう消え失せて、つながっている部分から、\nすずの一部と――包み込まれてひとつになってく。
1266 = "我失去了我自己，在與她緊緊相連的部位上，成為了她身體部位中的一部分。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ふあっ――」
761 = "「啊——呼啊——」" 

# monologue
# JP: （ずっ！　じゅちゅっ！　ずるっ！　じゅにゅんっ！）
1537 = "（呲！呲啾！呲嚕！啾嗯！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひあっ！　あっ――ア――んくっ！！　ふっ！」
737 = "「咿啊！啊——啊——嗯！！呼！」" 

# monologue
# JP: ならば、もう。\n激しい動きは必要ない。
1409 = "那麼，不再需要激烈的活動。" 

# monologue
# JP: 鼓動に合わせ、呼吸に合わせ。\nすずが動くでも、僕が動くでもないように――
1411 = "配合心跳、配合呼吸。一切都配合到彷彿我們都沒在動一樣——" 

# monologue
# JP: （ずりゅ！　こんっ！！　こしゅんっ！　ずにゅっ！）
1534 = "（呲溜！嗯！！咻嗯！呲扭！）" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……きゅっ――んっ――ふあっ――あっ――そうてつ、さまっ――わたくし――わたくしの――だんな、さまっ」
771 = "「啊……呀——嗯——啊——雙鐵少爺——我——我的——夫君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 783 = "「啊啊」" 

# monologue
# JP: すずが、達する。僕の可愛い妻が達する。\nならば、僕も同時に達する。
1428 = "鈴高潮了。我可愛的妻子高潮了。我也要同時高潮。" 

# monologue
# JP: その当然の結末を幸せに迎えるために、\n腰に、勃起に――気持ちを単に、向け直す。
1340 = "為了幸福地迎接必然的結果，我把情緒都放在了腰和肉棒上。" 

# monologue
# JP: （きゅん！　きゅむううっ！　むにゅん！　もみゅん！）
1556 = "（啾！啾嗯——！嗯扭！揉！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「か――はっ！」
763 = "「啊——哈！」" 

# monologue
# JP: それだけで、勃起は喜びに激しく震える。
1368 = "肉棒開心得連連顫動。" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゅあっ！？　んっ――ビクって！　ぷくって！！　\n双鉄さま――のっ――おちん――ちんっ！！　ふあ！」
705 = "「呀啊！？嗯——又抖了！又脹了！！雙鐵少爺的——雞——雞！！呼啊！」" 

# monologue
# JP: （ずぶっ！　じゅぶっ！　じゅばっ！　じゅぼっ！！）
1529 = "（呲噗！啾！啾啪！啾啵！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「きゃふっ！？　あっ！　おまん、まんっ――んっ！！\nわたく、し――わたくしの――おまん、まんっ――ふぁ」
703 = "「呀呼！？啊！小妹妹——！！我——我的——小妹妹——嗚啊」" 

# monologue
# JP: （きゅううっ！　きゅむっ！　きゅむむっ！　みゅう！）
1525 = "（吱嗚！啾姆！啾姆！嗚！）" 

# monologue
# JP: 蠢く、肉が、ヒダが、繊細な部分の全てが。
1383 = "蠕動的肉、蠕動的肉褶，所有細膩的部位。" 

# monologue
# JP: 膣全体が収縮しながら勃起にべとりと絡みつき、\n強弱硬軟全てを交え、もみ込み刺激してくれるっ！
1317 = "整個陰道收縮，綿密地纏住肉棒，忽強忽弱、忽硬忽軟，擠揉刺激著我的肉棒！" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――ああっ！　すずっ！　すずっ！！」
764 = "「啊——啊啊！鈴！鈴！！」" 

# monologue
# JP: だから、イク。\nなにもなくても射精しまくる！
1309 = "所以我高潮了。就算已經空了，也要再次瘋狂射精！" 

# monologue
# JP: わかっていても、どうしようもなく腰が求める。\nもっと奥でと、すずの最奥、子宮の中へと！
1318 = "明知已經山窮水盡，卻又渴求柳暗花明。再深一點，深入鈴陰道的最深處——子宮！" 

# 【ハチロク】
# display as 鈴
# JP: 「そうてつ――さまっ――ふぁっ――双鉄、さまあっ！」
946 = "「雙鐵少爺——嗚啊——雙鐵少爺！」" 

# monologue
# JP: （ずぶううううううううううっ！！！　ごっ！！）
1528 = "（呲噗——！！！！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ぃっ――きゅうううううううううううっっっ！！！！」
736 = "「咿——嗯嗚——！！！！」" 

# monologue
# JP: （きゅむっ！！　きゅううううううううんっ！！！）
1555 = "（啾姆！！插入——！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 787 = "「啊！」" 

# monologue
# JP: （びゅうっ！　びゅるっ！　どびゅる！　びゅぶるっ！）
1573 = "（噗嚕！噗！咕噗！噗嚕！）" 

# 【ハチロク】
# display as 鈴
# JP: 「あ――出てッ――んっ――熱、い――んくっ――ふ――\n双鉄、さまの――精子――あつい、のっ――ふ、ふぁ」
759 = "「啊——出來了——好熱——嗯——呼——雙鐵少爺的——精子——好熱——呼，嗚啊」" 

# monologue
# JP: （びゅるっ！　どびゅっ！　びゅううっ！　びゅるっ！）
1577 = "（噗！咕噗！噗嚕！噗！）" 

# 【ハチロク】
# display as 鈴
# JP: 「お、まん、まん――ふぁ――おぼれ――おぼれ、りゅっ\n――んっ！　双鉄、さまの――精子、で、たぷたぷっ」
857 = "「小妹妹——嗚啊——泡——泡在精液裡——！雙鐵少爺的——精子，滿滿的都是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「溺れてしまえ。僕に――どこまでも――どこまでもっ」
929 = "「那就沉溺吧。沉溺在我的精液裡，永遠永遠」" 

# 【ハチロク】
# display as 鈴
# JP: 「はいっ！　はいっ！　ん――双鉄、さまっ――\nわたくしの――だいすきなっ――だんな、さまぁっ！」
851 = "「在！是！嗯——雙鐵少爺——我——最喜歡的——夫君！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 787 = "「啊！」" 

# 【ハチロク】
# display as 鈴
# JP: 「ちゅっ！　ちゅむっ！　んっ――ちゅうっ――ふっ！\nれるっ――れろっ――ちゅううっ――ちゅむ、ちゅ！」
809 = "「啾！啾姆！嗯——啾嗚——呼！咻嚕——嗯——啾嗚——啾嗯，啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ……んっ――ふ……ん…………んっ」
774 = "「啊……嗯——呼…………嗯」" 

# monologue
# JP: （びゅうっ――びゅっ――どびゅ――――ぴゅるっ）
1571 = "（噗嚕——噗——噗——噗）" 

# 【ハチロク】
# display as 鈴
# JP: 「ふぁ……あ…………あまざけ、い、っぱい――上の、\nおくちも……した、の……おくち、も――ふぁ」
812 = "「嗚啊……啊……滿滿都是甜米酒——然後又親了……親過了——嗚啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
756 = "「哎呀」" 

# monologue
# JP: （とさっ！）
1564 = "（嘟嚕！）" 

# monologue
# JP: 崩れたすずの体を受け止め、\n腕枕して一緒にごろり、横になる。
1282 = "我接住癱軟的鈴，讓她跟我一起躺下來，枕著我的手臂。" 

# monologue
# JP: 気乱れまくった着物がふわり、広がって、\n桜の国に、金魚の国に、迷ったような気持ちにフとなる。
1221 = "她零亂的和服散開成一片，讓我不知自己是在櫻花國，還是金魚國。" 

# 【双鉄】
# display as 雙鐵
# JP: 「可愛いな。僕の姫君は」
872 = "「我的小公主，你真可愛」" 

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ」
846 = "「嘻嘻」" 

# monologue
# JP: ぽ、と色づく。\n着物より、桜よりもなお鮮やかに。
1211 = "她臉紅了。比和服和櫻花都要更鮮艷。" 

# monologue
# JP: すずはその頬を朱に染めて、\nつん、っと僕のほっぺたを突く。
1427 = "鈴紅紅的臉頰碰了碰我的臉蛋。" 

# 【ハチロク】
# display as 鈴
# JP: 「可愛くなるのも、当然ですよ？\nわたくしだって――あなたに、恋を。していますから」
932 = "「那當然可愛啦。因為我是那麼得喜歡您啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな――僕もだ。\n僕も、お前に恋をしている」
885 = "「是啊——我也是。我也是那麼得喜歡你」" 

# monologue
# JP: だから前より、笑えて、泣けてる。\nそうであるのに、前よりもっと、頑張れている。
1308 = "所以我才比以前更敢笑敢淚。比以前更努力地做真實的自己。" 

# 【双鉄】
# display as 雙鐵
# JP: 「良いものなのだな。恋というのは」
866 = "「戀愛真是美好啊」" 

# 【ハチロク】
# display as 鈴
# JP: 「左様ですね、まことに――――あっ」
886 = "「是啊，真的是——啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
845 = "「嗯？」" 

# 【ハチロク】
# display as 鈴
# JP: 「桜。ほら。双鉄さまのお[ぐし]髪にも」
900 = "「櫻花，您看。您的頭髮上」" 

# monologue
# JP: ほんのひとひら。小さな小さな桜色。\nいとおしそうに、すずは指先へと乗せて。
1408 = "那是很小很小的一瓣櫻花。鈴憐愛地用手指捻起。" 

# 【ハチロク】
# display as 鈴
# JP: 「えいっ！」
757 = "「哎！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 781 = "「啊」" 

# monologue
# JP: いたずらっぽく微笑んで、それをぺろりと、\n舌へと乗せて口の中へと閉じ込める。
1213 = "她調皮地微笑，又把花瓣含進了嘴裡。" 

# monologue
# JP: 誘われてるとわかるから、\n僕も喜んで、それに乗る。
1297 = "我知道她是在邀請我，便很高興地湊了上去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「桜はこれほどに酔わせるものだ。\n異常燃焼を起こしてしまうぞ？」
899 = "「櫻花就這麼讓人陶醉，會發生異常燃燒的哦」" 

# 【ハチロク】
# display as 鈴
# JP: 「んっ――」
# 815 = "「嗯——」" 

# monologue
# JP: そして、キス。\n名目上は、酔いの要因を取り除くため。
1258 = "我們接吻。名義上是為了帶走醉意的來源。" 

# 【ハチロク】
# display as 鈴
# JP: 「は、ちゅっ――む――ちゅむっ――ちゅう、ちゅっ！」
792 = "「啊，啾——嗯——啾姆——啾，啾！」" 

# monologue
# JP: ……そしてもちろん、その内実は。\nもっと深くに、酔うために。
456 = "……不過事實上呢，卻是為了醉意更濃。" 

# monologue
# JP: この桜色のひとときに――\nそうして、僕の愛する妻に。
1342 = "為這櫻色的一刻而陶醉——也為了我心愛的妻子而陶醉。" 
