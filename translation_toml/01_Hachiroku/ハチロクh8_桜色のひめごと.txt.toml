1276 = "我懷著無比的滿足感和成就感，收縮的陰道一動也不動了好一會——" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ！」
# 787 = "「啊！」" 

# monologue
# JP: （ちょ――ちょっ――ちょおおおっ！）
1550 = "（哧——哧——哧！）" 

# monologue
