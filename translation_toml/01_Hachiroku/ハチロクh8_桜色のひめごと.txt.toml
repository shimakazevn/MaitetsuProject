# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
951 = "「！」" 

# 【ハチロク】
# display as 鈴
# JP: 「ふああっ！！！」
726 = "「呼哈！！！」" 

# monologue
# JP: おまんまん全部を口で覆ってフタをする。\n口の最奥、喉にまで、びしびしと温水がぶつかってくる。
1285 = "我用嘴給小妹妹加了層蓋。溫熱的水汩汩地衝進了嘴裡，衝進了喉嚨裡。" 

# 【ハチロク】
# display as 鈴
# JP: 「いや……ぁ……わたくし、粗相を……んっ――双鉄さま\n――旦那、様の――おくち、に――おもらし――してっ」
922 = "「討厭……嗯——雙鐵少爺……我，太大意了——向您嘴裡——失禁——了」" 

# monologue
# JP: （ちょおおおおおおおおおおおっ！）
1541 = "（咻——！）" 

# monologue
# JP: おもらし、たしかにおもらしだ。\n単なる蒸気排水とはいえ、いま放出すべきものじゃない。
443 = "“失禁”倒也沒說錯。雖然單純是蒸汽排水，但本來也不該現在排出。" 

# monologue
# JP: 恥じ入りまくる声とうらはら、すずのおもらしの勢いは、\nむしろさらに増し、喉から伝わり体の芯まで熱くする。
1454 = "雖然她的聲音裡滿是愧色，但失禁的勢頭反而增大了，從喉嚨流入肚子，讓我心裡暖烘烘的。" 

# 【双鉄】
# display as 雙鐵
# JP: （んくっ！　ごくっ！　ごくっ！！　ごくんっ！！）
1561 = "（嗯嗯！嗯！嗯！！嗯！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「の、飲んで……は――ふ、か――だんな、さま――が、\nわたくしの、おも、らし――ごくごく――のん、で――」
681 = "「不、不能喝啊……——呼——夫君——我的，排尿——全喝了——嗯——」" 

# monologue
# JP: 飲めば飲むほど、単なる蒸気排水に、\nそれだけではない味が混ざって濃くなってくる。
1362 = "純粹的蒸汽排水，越是喝越是帶上了一種不相同的味道，顯得愈來愈芳醇。" 

# monologue
# JP: 飲まされて。酔わされている。\n甘酒ではなく、すずそのものに。
1166 = "喝著喝著我就醉了。醉翁之意不在酒，在乎佳人是也。" 

# 【ハチロク】
# display as 鈴
# JP: 「ふぁ……ぁァ――――――あっ……全部……ぜん、ぶ\n――わたくし――全部を――旦那様、の――おくち、に」
813 = "「嗚啊……啊啊——啊……全部……哦嗯，噗——我——全部——向夫君——口腔」" 

# monologue
# JP: （ちょろ――ちょっ――ちょおお……ちょろ――ぴゅっ）
1546 = "（咻嚕——咻——咻……咻——噗）" 

# 【双鉄】
# display as 雙鐵
# JP: （ごきゅんっ！！　――ちゅううううううううううっ！）
1558 = "（啾！！——啾嗚——！）" 

# 【ハチロク】
# display as 鈴
# JP: 「いぅん！？　あ――吸、吸って――ひ――きゅ！　ふぁ\n――おもら、し――全部――残りも――吸いだされ、て」
746 = "「咿嗯！？啊——吸，吸——咿——嗯呀！嗚啊——小便——全部——一點不剩地——被吸掉了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぷぁっ！」
847 = "「噗啊！」" 

# 【ハチロク】
# display as 鈴
# JP: 「ん……はぁ……あ……そうてつ、さま――双鉄様ぁ」
823 = "「嗯……啊……啊……雙鐵少爺——雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
783 = "「啊啊」" 

# monologue
# JP: あれほど吸って飲んでなお、\n濡れに濡れてるすずの股から顔を離して、立ち上がる。
1164 = "喝了那麼多，我才從鈴濕潤的大腿間抬起頭，站了起來。" 

# monologue
# JP: 僕の勃起も、とっくのとうに限界硬度だ。\nすずの視線もそれをわかって、じっと見つめてくれている。
1293 = "我的肉棒早就硬到不能更硬了。鈴也明白，所以一直看著我的肉棒。" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄……さま。わたくしは――すず、は――」
947 = "「雙鐵少爺……我——我——」" 

# monologue
# JP: こくりと真っ白な喉が蠢く。\nちろりとピンクの舌が覗いて、その唇を湿らせる。
1219 = "她雪白的喉嚨吞嚥了一下，伸出粉紅色的舌頭舔了舔嘴唇。" 

# 【ハチロク】
# display as 鈴
# JP: 「すずは――すずも。飲んでみたく……なりました。\n甘酒を……双鉄様の――濃くて、濁った……甘酒、を」
868 = "「我——我也有點……想嚐嚐看了。甜米酒……雙鐵少爺的——又濃又渾濁的……甜米酒」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……なるほどな」
474 = "「……原來如此」" 

# monologue
# JP: 一刻もはやく挿入し、思いっきりに射精をしたい気持ちは\n無論、焦がれるほどだ。
1256 = "我也是，心急火燎地想插進她的身體，把精液都給釋放出去。" 

# monologue
# JP: が――かわいい妻のかわいいおねだり。\n無碍にするほど、僕とて愚かな男ではない。
1106 = "但是——可愛的妻子可愛的乞求。我也不是會置之不理的蠢男人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、だ――」
933 = "「那麼——」" 

# monologue
# JP: （チィィィィ）
1551 = "（哧——）" 

# 【ハチロク】
# display as 鈴
# JP: 「あ！　わたくしがお脱がせいたしま――んっ！」
788 = "「啊！我來幫您脫掉吧——嗯！」" 

# monologue
# JP: 軽く、突く。\nすずの可憐な唇を、猛り狂ってる勃起の先で。
1277 = "我把雄雄矗立的肉棒，輕輕抵在鈴可愛的嘴唇上。" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……匂い、濃い……ん――（すん、すん）――\nはぁぁあ――胸、いっぱいに、双鉄様の……匂い、が」
778 = "「啊……好濃的氣味……——（嗅、嗅）——蛤啊——心裡都是……您的氣味了」" 

# monologue
# JP: すずがうっとり囁くその度、\n唇の動きと震えが、勃起を伝わり脳を蕩かす。
1419 = "鈴每次出神地低聲私語，嘴唇的活動和顫抖，都會通過肉棒讓我神魂顛倒。" 

# monologue
# JP: ”口内でもいい、早く深くに挿入を――”\n体の切実な要請を、あえてギリギリと押し殺す。
446 = "“快點深深地插進去，插嘴裡也行啊——”我壓抑著身體表達出來的渴求。" 

# 【双鉄】
# display as 雙鐵
# JP: 「味わうのは、匂いだけでいいのか？」
687 = "「你想品味的只是氣味嗎？」" 

# 【ハチロク】
# display as 鈴
# JP: 「いいえ、旦那様。今宵のすずは、欲張りです。\n匂いだけでは、とても満足できませぬ――ちゅむっ」
685 = "「不對，夫君。今晚的我是很貪心的。已經不滿足於氣味了——啾姆」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 951 = "「！」" 

# monologue
# JP: 唇が亀頭に吸い付いてくる。
1196 = "她用嘴唇吸上了龜頭。" 

# monologue
# JP: 奥まで一気に含みはせずに、そのまま舌がちょんちょんと、\n亀頭の割れ目を舐め擦ってくる。
1176 = "她並非一口氣吞到底，而是用舌頭輕輕摩擦龜頭的裂口。" 

# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅっ――れろっ――れるっ――ちゅっ――\nちゅむ……ん……ぺろっ――れろっ――ちゅううっ！」
825 = "「嗯……啾——嗯——咻嚕——啾——啾嗯……（舔）——嗯——啾嗚！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くうっ――」
758 = "「唔——」" 

# monologue
# JP: 舐めながら、吸う。\n極めて単純な行為はそれゆえ、暴力的なまでの効果を示す。
1174 = "她一邊吸一邊舔。也正因為行為單純，才有著立竿見影的效果。" 

# monologue
# JP: 僕の勃起の先端はもうブキブキと膨れ震えて、\n射精したい、射精したいと身悶え汗を流してる。
1301 = "我肉棒的頂端已經脹得很難受，一直在抖動了。我渾身燥熱、大汗直流，心裡只有射精一個念頭。" 

# 【ハチロク】
# display as 鈴
# JP: 「ん……ちゅるっ――ちゅ――れるっ――れろ……ぺろっ\n――ふ……ん……ハムッ――はむっ――ちゅ、ちゅるる」
829 = "「嗯……啾嚕——啾——咻嚕——嗯……——呼……啊姆——姆——啾，啾嚕嚕」" 

# 【双鉄】
# display as 雙鐵
# JP: 「す……ずっ――」
# 815 = "「嗯——」" 

# monologue
# JP: 亀頭の先を唇だけで、何度も何度も甘噛みされる。\n舌先は弱火で炙るが如く、鈴口だけに刺激を与える。
1203 = "她的嘴唇無數次乖巧地夾住龜頭頂。舌尖給了尿道口有如小火烘烤一般的刺激。" 

# monologue
# JP: その繰り返しに、溶けて行く。\n理性が、我慢が、どろどろになって崩されていく。
1142 = "反覆的刺激讓我漸漸融化。理性和忍耐融化成液體，漸漸崩潰。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すず――頼むっ」
936 = "「鈴——拜託了」" 

# 【ハチロク】
# display as 鈴
# JP: 「は……むっ――ちゅ――ん――ほまはへふははひ、\nん……れるっ――ほーへふ……はまっ――ちゅっ！」
780 = "「啊……姆——啾——齋一赤，嗯……咻嚕——讓偶——呼……來——啾！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「んうっ」
837 = "「嗯嗚」" 

# monologue
# JP: 咥えられたまま囁かれ、\n危うく声に振動に、射精をしてしまいそうにさえなる。
1182 = "她叼著肉棒說話時聲音的震動，差一點就讓我射精了。" 

# monologue
# JP: 任せてくれとささやきながら、\nけれどもすずの動きは変わらぬ繰り返しを――！？
1212 = "她說要交給她來，但是她的動作卻一直沒有變化——！？" 

# 【ハチロク】
# display as 鈴
# JP: 「ちむっ――れろっ――れるっ――るっ――ちゅむ――\nちゅうっ――はむっ――れろっ――れるる――ずじゅっ」
805 = "「啾姆——嗯——咻嚕——嚕——啾嗯——啾嗚——姆——嗯——咻嚕——呲啾」" 

# monologue
# JP: いや、違う。同じ動きを繰り返しつつ、\n甘噛の度、咥える深度が深くなってる。
1084 = "不對，雖然是反覆同樣的動作，但每次輕咬都會含得更深一點。" 

# monologue
# JP: そのじわじわが、焦れったすぎて気持ち良すぎて、\n腰が勝手に動き出すのを、必死になって食い止める。
1401 = "這讓我很心急又很舒服，想按捺住抽插的心情實在太困難。" 

# 【双鉄】
# display as 雙鐵
# JP: （すずは――すずだ。僕の、おんなだ。\n僕を生殺しで放置するなど――ありえん話しだ）
1595 = "（鈴就是鈴，是我的女人。不可能讓我想高潮又不能高潮的）" 

# 【ハチロク】
# display as 鈴
# JP: 「あむっ――ちゅっ――ちゅるっ――えれっ――んっ――\nはぷっ――ちゅっ――ずじゅっ――ちゅる――はむっ」
786 = "「啊姆——啾——啾嚕——嗯、嗯——呲噗——啾——啾嚕——姆」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ァぁっ――ン――くっ」
782 = "「啊啊——嗯——嗯」" 

# monologue
# JP: 信じてもなお、焦れったい。\n首筋に、背中にぶわぶわ汗が滲んで流れ落ちてく。
1455 = "雖然有信心，但我還是很心急。脖頸處的汗水直往後背淌。" 

# monologue
# JP: 気持ち良すぎて、もっと気持ちよくなりたくて、\n僕の全部が、もうカラカラに乾いてしまっ――っ！！？
1225 = "實在是太舒服了，我甚至還想要更舒服，我全身都飢渴難耐了——嗯！！？" 

# 【ハチロク】
# display as 鈴
# JP: 「ずぢゅるるうううううううううううううううっっ！！」
722 = "「呲、啾嚕——！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふうううううっ！？」
734 = "「呼嗚——！？」" 

# monologue
# JP: その瞬間は不意に来る！
1406 = "那個瞬間不請自來！" 

# monologue
# JP: すずはその、やわらかで短くかわいい舌を、\n僕の勃起専用の、レッドカーペットへと変化させっ！
1418 = "鈴柔軟、短小又可愛的舌頭，成了我肉棒專用的紅地毯！" 

# 【ハチロク】
# display as 鈴
# JP: 「んむっ！　ん――むっ！！　じゅろろっ！　ちゅむ！　\n（すっ――ひっ）ちゅるっ！　れろおおおおおおっ！」
841 = "「嗯姆！嗯——姆！！呲啾——！啾嗯！（做——哈）啾嚕！咻嚕——！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁぁっっ」
# 783 = "「啊啊」" 

# monologue
# JP: 亀頭の先が口の奥を突き、なおも吸い。\n喉まで挿れて鼻で必死に吸気排気を繰り返し。
1466 = "龜頭伸進了口腔深處，但她還在用力地吸吮。喉嚨用插進去鼻子拚命地反覆吸氣排氣。" 

# monologue
# JP: そうしてすずはそうしながらさえ、\n舌を動かすことをやめずにっ！
1150 = "同時鈴還不忘一直用她的舌頭！" 

# 【ハチロク】
# display as 鈴
# JP: 「ちゅろおおおっ！　にゅぼおおっ！　じゅぶうううっ！\nじゅぼおおおお！　じゅるるううっ！　じゅ！　ぼっ！」
803 = "「啾嚕！扭啵！啾嗚嗚！啾啵！啾嚕——！啾！啵！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふあっ！」
729 = "「呼啊！」" 

# monologue
# JP: 最初は長く、大きくゆるく。\nそうして早く！　
1131 = "先是漫長又徹底的放鬆。然後突如其來！" 

# monologue
# JP: すずの頭が口全体が、僕の勃起をしごきにかかる！
1425 = "鈴的頭前前後後，用嘴幫我套弄！" 

# 【ハチロク】
# display as 鈴
# JP: 「じゅぼっ！　じゅぶっ！　れるっ！　れろおっ！\nじゅるるっ！　じゅ！　じゅぼっ！　ぶぢゅ！！」
798 = "「啾啵！啾！咻嚕！嗯！啾嚕！啾！啾啵！噗啾！！」" 

# monologue
# JP: 淫猥な音を響かせながら、勃起を口でズボズボしながら、\n舌の動きも、不意の吸引も忘れない。
1175 = "她一邊發出淫猥的聲音，用嘴來來回回捋肉棒，還不忘記舌頭的活動和冷不防的吮吸。" 

# monologue
# JP: すずの両頬は真っ赤に染まり、瞳は潤んで僕を見上げて、\nその健気さに、さらに精液の水位があがる。
1423 = "鈴的臉頰通紅，淚汪汪地仰視我。她的堅強更讓我精液的水位上升。" 

# 【双鉄】
# display as 雙鐵
# JP: 「く――ぁっ――すず！　すずっ！」
465 = "「——啊——鈴！鈴！」" 

# 【ハチロク】
# display as 鈴
# JP: 「ん……でゅほっ――ちゅっ――ふっ――ろーろ――ん、\nふっ――ほふ、ひひ――ちゅむっ――ほーへふ、ははっ」
831 = "「嗯……嗚嗯——啾——呼——嚕—嚕——呼——嘿，嘿嘿——啾姆——嗚—呼，哈」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ、ああ――」
791 = "「啊，啊啊——」" 

# 【ハチロク】
# display as 鈴
# JP: 「じゅぶっ！　じゅろっ！　じゅっ！　ちゅるるっ！\nじゅろっ！　じゅぶっ！　れるっ！　ちゅうううっ！」
807 = "「啾！啾嚕！啾！啾嚕嚕！啾嚕！啾！咻嚕！啾嗚！」" 

# monologue
# JP: 瞳の奥側、延髄の裏、そこにチカチカ火花が走る。
1354 = "眼睛的內側、延髓的背側，都彷彿有火花閃爍。" 

# monologue
# JP: すずの口内はとろけ絡んで、\n僕の勃起も、もう一体とされてしまったような気がする。
1421 = "鈴的嘴裡水汪汪的，我的肉棒似乎也相融成了一體。" 

# 【ハチロク】
# display as 鈴
# JP: 「じゅぼっ！　じゅうっ！　じゅぼっ！　ぢゅるっ！\nぼっ！　ぢゅぼっ！　じゅばっ！　ぢゅぶうっ！！」
796 = "「啾啵！吱吱！啾啵！啾嚕！啵！啾啵！啾啪！啾噗！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すず！　すず！　すず！　すずっ！！」
939 = "「鈴！鈴！鈴！鈴！！」" 

# monologue
# JP: 再加速。\n一直線で単純な。
1135 = "再加速。一路向前。" 

# monologue
# JP: 僕の射精がすぐそこにあると、\nすずが誰より――恐らく僕より、わかってくれてる！
1093 = "之後就是我的射精，鈴比誰——甚至比我都要明白！" 

# monologue
# JP: （ぴたっ）
1552 = "（啪嗒）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
952 = "「！！？」" 

# monologue
# JP: 亀頭の先端だけを咥える――\nその状態まで頭を引いて、すずは動きをぴたりととめる。
