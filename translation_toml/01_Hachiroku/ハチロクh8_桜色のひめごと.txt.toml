682 = "「不喝的話，甜米酒不就可惜了嗎。——但還不到時候」" 

# 【ハチロク】
# display as 鈴
# JP: 「まだ――とは――ひうっ！！？」
927 = "「還不到時候？——咿！！？」" 

# monologue
# JP: （ぺろっ）
1594 = "（舔）" 

