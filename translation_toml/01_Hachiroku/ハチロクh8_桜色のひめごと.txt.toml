1451 = "陰道不斷抽動，努力地把我的舌尖送往更深的部位。因此——" 

# monologue
# JP: （にゅぼぉぉぉぉぉぉぉぉぉぉぉぉっっっ！）
1581 = "（扭啵——！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゅあっ！！？」
740 = "「咿啊！！？」" 

