859 = "「小妹妹……啊……直接——對嘴飲……——雙鐵少爺——我，我的——小妹妹」" 

# monologue
# JP: （れるっ！　じゅぢゅっ！　れろんっ！　ずうりゅっ！）
1548 = "（咻嚕！呲啾呲啾！嗯嗯！呲溜！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひぁっ！　あっ！　あっ！　なか――なか――んっ――\nは――べろべろ――され、て――すすられ――て、あ！」
738 = "「咿啊！啊！啊！裡面——裡面————被舌頭——舔啊——吮吸——啊！」" 

# monologue
# JP: 呼気と吐気とのペースが早い。\n舌先に乗る蜜は濃く、感じる温度は高くなってる。
1152 = "呼吸的節奏很快。舌尖的蜜液很濃，溫度似乎也在升高。" 

