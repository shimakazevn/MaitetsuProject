743 = "「咿啊！？討厭——故意——呼，啊——嗯——故意，那樣——粗俗的，聲音——！" 

# monologue
# JP: （れるっ！　れろっ！　じゅぶっ！　じゅるるるうっ！）
1549 = "（咻嚕！嗯！啾噗！啾嚕——！）" 

# 【ハチロク】
# display as 鈴
