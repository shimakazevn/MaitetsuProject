888 = "「是把胯下的毛看成是裙帶菜吧？但是我的胯下光滑，沒有毛……」" 

# monologue
# JP: ん……とかわいい声を出し、すずは数秒考えこむ。
1167 = "嗯……她可愛地說道，又思考了幾秒鐘。" 

# 【ハチロク】
# display as 鈴
# JP: 「しいて申せば――\nわれめ酒、ということとなりましょうか」
913 = "「硬要說的話——就算是裂口酒吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「われめ酒……うむ。\n言い得て妙。そのものずばりだ。素晴らしいな」
916 = "「裂口酒……嗯。很精妙，也很貼切。這真是太好了」" 

# 【ハチロク】
# display as 鈴
# JP: 「そ、そのようなことで褒められましても。\nなんだか、妙な気がしてしまいますけれど――」
926 = "「這、這有什麼好誇獎的。感覺真是怪怪的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なに。すぐにもっと、妙な気持ちに溺れるさ」
864 = "「怎麼，馬上你還要沉浸在更奇怪的心情裡呢」" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ！」
787 = "「啊！」" 

# monologue
# JP: 口を、静かに近づけていく。\n息をかけ、わざと水面を乱してみせる。
1288 = "我的嘴靜靜地靠近。我吹口氣，攪開平靜的水面。" 

# 【ハチロク】
# display as 鈴
