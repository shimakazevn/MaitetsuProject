# lines: 475 
# 【ハチロク】
# display as 鈴
# JP: 「……ん……ちゅっ――ちゅむっ――ちゅう……ふ、ぁ\n……だんな、さま――双鉄、さまぁ」
532 = "「……Ưm……chụt——chụm——chụt……phù, a\n……phu, quân——ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
916 = "「Ừ.」"

# monologue
# JP: ウエディングドレスに包まれている花嫁を、\n自分の両手で、初夜の寝台まで連れていく。
1345 = "Bằng chính đôi tay mình, tôi bế cô dâu\nđang khoác trên mình bộ váy cưới,\nđưa đến chiếc giường tân hôn."

# monologue
# JP: このうえない、これほど幸せな瞬間を、けれども僕らは\n――これから、いくらも重ねていくのだ。
1741 = "Một khoảnh khắc hạnh phúc tột cùng không\ngì sánh bằng, nhưng chúng tôi\n——từ nay về sau, sẽ còn trải qua vô số lần\nnhư thế nữa."

# monologue
# JP: （ふわっ）
1952 = "（Nhẹ nhàng）"

# 【ハチロク】
# display as 鈴
# JP: 「あ――」
858 = "「A——」"

# monologue
# JP: すずをベッドへと下ろした瞬間、\n名残惜しそうな声に鼓膜をゆすられる。
1588 = "Khoảnh khắc tôi đặt Suzu xuống giường,\nmột giọng nói đầy tiếc nuối rung lên bên\nmàng nhĩ."

# monologue
# JP: ほんの一瞬の寂しさを、同じく感じてくれてると――\n実感できれば、愛おしさがただ膨らんでいく。
1549 = "Chỉ một thoáng cô đơn ngắn ngủi, em cũng\ncảm nhận giống như tôi——\nnhận ra điều đó, tình yêu thương trong tôi\nlại càng thêm đong đầy."

# 【双鉄】
# display as 雙鐵
# JP: 「すず」
1055 = "「Suzu.」"

# monologue
# JP: だから名を呼ぶ。
1577 = "Thế nên tôi gọi tên em."

# monologue
# JP: レイルロオドとしてのではない、\n僕の妻――僕の女としての名前を。
1281 = "Không phải với tư cách là một Railord,\nmà là tên gọi với tư cách là vợ tôi——người\nphụ nữ của tôi."

# 【ハチロク】
# display as 鈴
# JP: 「はい。旦那様」
947 = "「Vâng. Thưa phu quân.」"

# monologue
# JP: 答えとともに、ひらたい胸がわずかに上下し――\n無垢とも言うべき平坦が、僕の視線を釘付けにする。
1413 = "Cùng với lời đáp, khuôn ngực phẳng lì khẽ\nnhấp nhô——\nsự phẳng lặng có thể gọi là vô ngần ấy, đã\nghim chặt lấy ánh nhìn của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「そのドレス……こうしてまじまじ見てみると。\n美しく、清純なのに……ひどく、淫靡な気もしてくる」
768 = "「Bộ váy đó……nhìn kỹ lại thế này mới thấy.\nTuy rất đẹp, rất thanh thuần……nhưng cũng\nmang lại cảm giác vô cùng dâm đãng.」"

# monologue
# JP: たまらなくなり、スカートを大きくまくり上げ、\nパンツを腿まで引き下げる。
1536 = "Không thể kiềm chế được nữa, tôi tung vạt\nváy lên thật cao,\nvà kéo tuột chiếc quần lót xuống tận đùi."

# monologue
# JP: すずの割れ目は、おまんまんは――\nもうたっぷりとした雫を光らせ、滴らせてる。
1772 = "Khe hở của Suzu, cô bé của em——\nđã lấp lánh và rỏ xuống những giọt sương\nđẫm ướt."

# 【ハチロク】
# display as 鈴
# JP: 「それ……は――当然でございましょう」
1048 = "「Chuyện đó……thì——đương nhiên rồi ạ.」"

# monologue
# JP: (くくっ）
2034 = "（Kéo）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1083 = "「!!?」"

# monologue
# JP: すずがドレスの、おっぱいの脇の部分をつまんで\n静かに引き寄せ、ずらす。
1765 = "Suzu túm lấy phần viền ngực của chiếc váy,\nlặng lẽ kéo nó sang một bên."

# 【ハチロク】
# display as 鈴
# JP: 「ウェディングドレスは、婚礼の衣装。\n[おとめ,1]処女が妻に――女に変わるための衣装なのですから」
960 = "「Váy cưới, là trang phục của hôn lễ.\nLà trang phục để một thiếu nữ trở thành\nvợ——trở thành một người phụ nữ mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ、あ……」
880 = "「A, a……」"

# monologue
# JP: すずの言葉に納得しながら、\nけれども返事をうまく言葉に落とせない。
1555 = "Tôi hoàn toàn đồng tình với lời nói của\nSuzu,\nnhưng lại chẳng thể thốt nên lời đáp lại."

# monologue
# JP: 耳より舌より喉よりも、\n今は目だけに――意識が奪われてしまってるから。
1618 = "Bởi vì so với tai, lưỡi hay cổ họng,\nlúc này toàn bộ tâm trí tôi——đã bị tước\nđoạt bởi đôi mắt."

# 【双鉄】
# display as 雙鐵
# JP: （なん……だ、これは――）
2046 = "（Cái……gì, thế này——）"

# monologue
# JP: すずの乳首が、可愛い乳首が、\n肌色をしたシールのような何かに隠されてしまってる。
1770 = "Núm vú của Suzu, núm vú đáng yêu ấy,\nđã bị giấu đi bởi một thứ gì đó giống như\nmiếng dán màu da."

# monologue
# JP: 一刻も早く挿入したい――その強烈な欲望が、\nたかだかシール一枚に、釘付けられてしまってる。
1530 = "Muốn đút vào càng sớm càng tốt——khao khát\nmãnh liệt ấy,\nlại bị đóng đinh vào một miếng dán bé tẹo."

# 【双鉄】
# display as 雙鐵
# JP: （なんという邪魔くささだ。\n……だというのに――なんだ、これは――）
2033 = "（Thật là một thứ vướng víu.\n……Thế mà——cái cảm giác này, là sao đây——）"

# monologue
# JP: あるべき乳首がそこにない。
1754 = "Núm vú đáng lẽ phải ở đó lại không thấy\nđâu."

# monologue
# JP: けれどもじっくり見てみれば、\nシールの下に、ぼんやりと形が浮かぶ気がする。
1310 = "Nhưng nếu nhìn kỹ,\ncó vẻ như hình dáng của nó đang lờ mờ hiện\nra dưới lớp dán."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様？」
1076 = "「Ngài Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: （隠しているのに、いやらしい。\nいや、隠すからこそ――むしろ、いやらしさが）
2028 = "（Rõ ràng là đang che giấu, vậy mà lại thật\ndâm đãng.\nKhông, chính vì che giấu——nên sự dâm đãng\nmới càng）"

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様！？　――（すうっ）――双鉄様っ！！」
1075 = "「Ngài Soutetsu!? ——(Hít sâu)——Ngài\nSoutetsu!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぬっ！？」
857 = "「Hử!?」"

# 【ハチロク】
# display as 鈴
# JP: 「きゃっ！？」
821 = "「Á!?」"

# monologue
# JP: いきなりのすずの大声に、\n驚きの声があがってしまって、それがまたすずを驚かす。
1778 = "Tiếng gọi lớn bất ngờ của Suzu\nkhiến tôi giật mình kêu lên, và điều đó\nlại làm Suzu giật mình theo."

# monologue
# JP: いささか間の抜けた光景にホっと息が出て。\n……自分が息を、詰めていたのだと気付かされる。
1651 = "Một khung cảnh có phần ngớ ngẩn khiến tôi\nthở phào nhẹ nhõm.\n……Lúc này tôi mới nhận ra nãy giờ mình đã\nnín thở."

# 【ハチロク】
# display as 鈴
# JP: 「いったい、いかがなされたのですか？\n急に黙って、怖い目つきになられてしまって」
783 = "「Rốt cuộc, ngài bị làm sao vậy ạ?\nTự nhiên im lặng, ánh mắt lại còn trở nên\nđáng sợ nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うむ」
865 = "「À……ừm.」"

# monologue
# JP: 怖い目つきか。さもあらん。
1355 = "Ánh mắt đáng sợ sao. Cũng phải thôi."

# monologue
# JP: さきほどの僕は、恐らく獣――\n雌を求める雄そのものに、なってしまっていただろうから。
1340 = "Tôi ban nãy, có lẽ đã hóa thành một con\nthú——\nchẳng khác nào một con đực đang khao khát\ncon cái."

# 【双鉄】
# display as 雙鐵
# JP: 「それ……に、目を奪われてしまってな」
997 = "「Là vì……bị thứ đó, thu hút mất thôi.」"

# 【ハチロク】
# display as 鈴
# JP: 「それ――？」
1027 = "「Thứ đó——?」"

# monologue
# JP: まったくわかってないような、\nけれどもどこか、笑いを含んだような声。
1673 = "Giọng nói như thể chẳng hiểu gì cả,\nnhưng đâu đó, lại phảng phất ý cười."

# monologue
# JP: “女”を不意に強く感じて、\n勃起がビクリと動いてしまう。
1758 = "「À……ngài đang nói đến miếng dán ngực sao\nạ.」"

# 【ハチロク】
# display as 鈴
# JP: 「ああ……ニップレスのことでございますか」
866 = "「Miếng dán ngực.」"

# 【双鉄】
# display as 雙鐵
# JP: 「にっぷれす」
1042 = "「Là miếng dán——dùng để che núm vú lại ạ.\nHibiki và mọi người đã khuyên em 『Nếu mặc\nbộ váy đó thì nên dùng』.」"

# 【ハチロク】
# display as 鈴
# JP: 「乳首を隠す――そのための貼り物だとのことです。\n日々姫たちが、『そのドレスなら』とおすすめ下さって」
970 = "「Ra là vậy. Và rồi……chỉ cần lệch đi một\nchút,\nlà đã có thể nhìn thấy được rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。そうして……少しズレてしまっただけで、\n見えてしまうほどのものだからな」
788 = "「Ra là vậy. Và rồi……chỉ cần lệch đi một\nchút,\nlà đã có thể nhìn thấy được rồi.」"

# monologue
# JP: 実際、この方向に服がズレるなどまず無かろうが、\nそうした油断、それこそが、事故の最大の要因となる。
1816 = "Thực tế thì, việc quần áo bị lệch theo\nhướng này gần như là không thể xảy ra,\nnhưng sự chủ quan đó, mới chính là nguyên\nnhân lớn nhất dẫn đến tai nạn."

# monologue
# JP: 僕には気づけなかったリスクを未然につぶしてくれていた、\n日々姫に深く感謝する。
1532 = "Tôi thầm cảm ơn Hibiki sâu sắc,\nvì đã giúp tôi loại bỏ từ trong trứng nước\nmột rủi ro mà tôi không hề nhận ra."

# 【双鉄】
# display as 雙鐵
# JP: 「が、今はふたりきりだぞ？\n僕にまで、乳首を隠す必要などは――っ！」
775 = "「Nhưng mà, bây giờ chỉ có hai chúng ta\nthôi mà?\nĐâu cần thiết phải giấu núm vú ngay cả với\ntôi chứ——!」"

# monologue
# JP: いや、ある。ものすごくある。\nすずはそれを、僕よりよほどわかってて――
1280 = "Không, có đấy. Vô cùng cần thiết.\nSuzu hiểu rõ điều đó hơn tôi rất nhiều——"

# monologue
# JP: だから、にっぷれすなるものを、\nあえて――剥がさずに来てくれたのだ。
1574 = "Vì vậy, em mới cố tình——\nkhông bóc thứ gọi là miếng dán ngực đó ra\nmà đến đây."

# 【ハチロク】
# display as 鈴
# JP: 「必要などは……なんで、ございましょうか？」
1023 = "「Không cần thiết……là sao, cơ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「必要などは――」
1043 = "「Không cần thiết——」"

# monologue
# JP: （くにっ）
2020 = "（Bóp）"

# 【ハチロク】
# display as 鈴
# JP: 「んっ……」
900 = "「Ưm……」"

# monologue
# JP: すずの乳首のぷりぷり感を、\nにっぷれすの布めいた触感が、完全に覆ってしまってる。
1769 = "Cảm giác núm vú đàn hồi của Suzu,\nđã bị xúc giác như vải của miếng dán ngực\nche phủ hoàn toàn."

# 【双鉄】
# display as 雙鐵
# JP: 「必要などは――大いにある、な」
1025 = "「Đâu cần thiết——là vô cùng cần thiết đấy\nchứ.」"

# monologue
# JP: （くりっ――こしゅっ――くりゅ――さしゅっ）
2022 = "（Nắn——miết——xoa——vuốt）"

# 【ハチロク】
# display as 鈴
# JP: 「ん……ふ……ぁ……双鉄……さま――んっ……\nちく、び……なんだか……じれったい……です」
906 = "「Ưm……phù……a……ngài Soutetsu……ưm……\nnúm, vú……cảm giác……bứt rứt quá……ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕もだ」
870 = "「Ừ, tôi cũng vậy.」"

# monologue
# JP: 布地めいてる手触りは、なまじ感触が良いだけに、\nかえってもどかしさを募らせる。
1474 = "Xúc giác tựa như vải vóc ấy, chỉ vì cảm\ngiác mang lại quá tuyệt,\nmà lại càng làm tăng thêm sự bứt rứt."

# monologue
# JP: 早く剥がしてしまいたい。\nのだが、このまま愛撫を繰り返し――
1547 = "Muốn bóc nó ra ngay lập tức.\nNhưng mà, cứ lặp đi lặp lại việc ái ân thế\nnày——"

# monologue
# JP: （くりっ――しニュッ――こしゅっ――ぷにゅっ）
2021 = "（Nắn——ấn——miết——bóp）"

# 【ハチロク】
# display as 鈴
# JP: 「は……あっっ――指の、おなか――で、乳首、\nそんなに――優しく、やらしく、くに、くに、って」
528 = "「Hà……á——dùng đệm, ngón tay——mà nắn, bóp,\nnúm vú,\nnhẹ nhàng——dâm đãng——như thế.」"

# monologue
# JP: （ミュッ――むにっ――くりゅっ――もにゅっ）
2016 = "（Miết——nắn——xoa——bóp）"

# 【ハチロク】
# display as 鈴
# JP: 「そんな、に……した、ら――あっ――わた、くしっ、\nん……ふ――ぁ――おっぱい……おっぱいっ！」
1050 = "「Làm, như thế……thì——a——em,\nưm……phù——a——vú……vú mất!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっぱいが――どうした？」
763 = "「Vú——làm sao cơ?」"

# 【ハチロク】
# display as 鈴
# JP: 「こしゅこしゅ――され――て――感触、いつも、と――\nいつも、の……双鉄、さまの――指と、ちが、って――」
1014 = "「Bị——cọ xát——cảm giác, khác với, mọi khi——\nkhác với, ngón tay——của ngài Soutetsu……mọi\nkhi——」"

# 【双鉄】
# display as 雙鐵
# JP: 「違うのか。いつもよりも、今の方が良いか？」
757 = "「Khác sao. So với mọi khi, bây giờ thích\nhơn à?」"

# 【ハチロク】
# display as 鈴
# JP: 「いいえ、いいえ！　お指――じかの方が――好きっ――\nけどっ――これ――んっ！　じれっ、たい、の――が！」
759 = "「Không phải, không phải ạ! Ngón tay——chạm\ntrực tiếp——vẫn thích hơn——\nnhưng mà——cái này——ưm! Cảm giác, bứt rứt,\nnày——!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 916 = "「嗯」" 

# monologue
# JP: 手応えはもう十分だ。
1628 = "Phản ứng như vậy là quá đủ rồi."

# monologue
# JP: 満を持し、しつこい愛撫を繰り返していた指先を、\nすずの乳首からそうっと離す――と――
1320 = "Chuẩn bị kỹ càng, tôi nhẹ nhàng dời những\nđầu ngón tay\nvẫn luôn lặp đi lặp lại sự vuốt ve dai\ndẳng khỏi núm vú của Suzu——thì——"

# monologue
# JP: （ぷくんっ）
2007 = "（Phập phồng）"

# 【双鉄】
# display as 雙鐵
# JP: 「おお――」
856 = "「Ồ——」"

# 【ハチロク】
# display as 鈴
# JP: 「や……そのようなお声……ふ、ぁ……わたくし……\nちく、び……んっ――恥ずかしい……です」
816 = "「Á……giọng nói đó của ngài……phù, a……em……\nnúm, vú……ưm——xấu hổ quá……ạ.」"

# monologue
# JP: にっぷれすなるシールの形を、すずの乳首が変えている。
1768 = "Núm vú của Suzu đang làm biến dạng hình\ndáng của miếng dán ngực."

# monologue
# JP: 隠してくれるはずの存在を下からぐいと押し上げて、\nもっと触ってくださいと、健気な主張をしてくれている。
1442 = "Đẩy mạnh lên từ bên dưới sự tồn tại vốn dĩ\nđể che giấu nó,\nnhư đang dũng cảm đòi hỏi \"hãy chạm vào em\nnhiều hơn nữa đi\"."

# 【双鉄】
