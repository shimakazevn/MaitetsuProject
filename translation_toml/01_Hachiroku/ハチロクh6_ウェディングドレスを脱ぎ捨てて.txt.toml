1759 = "鈴主動搖晃腰，促進我的肉棒的活動。舌頭侵入的口內，我被鈴吸走了唾液。" 

# monologue
# JP: （ゆすっ！　じゅぶっ！！　じゅるっつ！　じにゅ！）
1975 = "（啾噝！啾！！啾嚕！盯喵！）" 

# 【ハチロク】
# display as 鈴
# JP: 「んっ――ふうっ――んっ！　んっ！　れるっ――\nじゅっ！　ふっ――んふっ――んっ！　んんっ！！」
889 = "「嗯——呼——！嗯！咻嚕——呲啾！呼——呼——！嗯嗯！！」" 

# monologue
# JP: 動きが、息が、どんどん早まり強まってく。
1625 = "活動、呼吸越來越快，越來越猛烈。" 

# monologue
# JP: （くっ――ぷくっ――きゅぽっ――きゅむっ）
1982 = "（嗯——噗唔——啾噗——呀唔）" 

# monologue
# JP: ほとんど離れることのない子宮の口と亀頭とは、\nそれでもお互いを喰い合うことで刺激しあって――
1481 = "幾乎沒有分開的子宮口和龜頭，互相吞食、互相刺激之下——" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ――くうっ！」
513 = "「——唔！」" 

# 【ハチロク】
# display as 鈴
# JP: 「れるっ――ちゅううっ――んっ――ふっ――んっ――\nふっ――っん！　ふうっ！　んっ　んんっ！！！」
838 = "「咻嚕——啾嗚——嗯——呼——呼——嗯！呼！嗯嗯嗯！！！」" 

# monologue
# JP: 強烈なもの、ささやかなもの。\nそうした全てが積み重なって、僕の脳内を染めていく。
1486 = "強烈的感覺、微弱的感覺。這些感覺累積起來，感染了我的大腦。" 

# monologue
# JP: すず。すず。すず。すず。すず。すず。すず。すず。\nただそれだけが、僕の全てを埋めていく。
1757 = "鈴。鈴。鈴。鈴。鈴。鈴。鈴。鈴。這個詞填滿了我的全部。" 

# 【ハチロク】
# display as 鈴
# JP: 「ンッ――ふっ――ふっ！　ふっ！　んふっ！　んっ――\nふっ！　ふっ！　ふっ！　ふううっ！！！」
885 = "「嗯——呼——呼！呼！嗯呼！嗯——呼！呼！呼！呼！！！」" 

# monologue
# JP: すずと僕とが、溶け合っていく。\nこのままひとつに――どこまでだって離れぬ一つに――
1764 = "鈴和我互相融化。就這樣成為一體——永不分離的一體吧——" 

# monologue
# JP: （ずっ――じゅぶっ！　じゅるっ！　ゆすずっ！！！）
1934 = "（呲——啾！啾嚕！啾噝呲！！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「んきゅっ！？　ん！！？」
932 = "「嗯嗚！？嗯！！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
873 = "「啊！！」" 

# monologue
# JP: リズムの微妙な食い違いが、腰の動きをランダムにして、\nすずの膣内のぞろぞろ部分を亀頭が不意に強くこすって。
1657 = "節奏有微妙的不同，腰的運動不再規律，鈴的陰道內不平滑的部分，突然被龜頭猛地摩擦。" 

# monologue
# JP: 驚き暴れたすずの舌により刺激され、\n僕の呼吸が、そしてリズムがまた乱されて快感を産む。
1357 = "吃了一驚的鈴舌頭活動得更劇烈了，我在刺激之下呼吸還有節奏又把控不住，快感再度湧來。" 

# monologue
# JP: （ずっ！　じじゅ！　ずりゅっ！　ゆさっ！！）
1950 = "（呲！啾！呲溜！沙！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「んっ！　ふっ――んひゅ！　んんっ！！！！」
940 = "「嗯！呼——咻！嗯嗯！！！！」" 

# monologue
# JP: 膣と勃起が、肌と肌とが、唇同士、舌と舌。\n全身全てがこれほど密着しあっていても僕らはズレて――
1811 = "陰道和肉棒，皮膚和皮膚，兩張嘴唇，舌頭和舌頭。我們全身上下如此緊貼，卻依然不能完全同調——" 

# 【双鉄】
# display as 雙鐵
# JP: （ああ、いや。\nそうなの、だな。それで――いいんだ）
1966 = "（啊，不對。也對，這樣才好）" 

# monologue
# JP: 異物同士で。男と女で。凸と凹とで――違ってて。\n違っているから――求めあえるし、セックスできる。
1490 = "彼此都是異物。男人和女人。凸凹也不一樣。我們不相同，所以才渴求對方，才能做愛。" 

# monologue
# JP: 夫婦になるとは、お互いを近づけるあうことではなく、\nきっと――違ってるお互い同士を、等価と認め合うことだ。
1387 = "夫婦並不是讓我們互相接近。而是讓我們接受一個不相同，卻與己等價的對方。" 

# monologue
# JP: （ゆさっ――じゅちゅっ――ずちゅっ！　ぶちゅっ！！）
2029 = "（沙——呲啾——啾！噗啾！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「んっ！　ふっ！　ふっ！　んっ！　ふっ！　ふあっ！\nんっ！　んくっ！　んっ！！！」
941 = "「嗯！呼！呼！嗯！呼！呼啊！嗯！嗯嗯！嗯！！！」" 

# monologue
# JP: 違っていいと思った瞬間、今度はリズムがぴったりと合う。\n加速していく。白熱してく。
1341 = "剛明白有差異才好，節奏就又對上了。越來越加速，越來越熱。" 

# monologue
# JP: つながりあって、くっつきあって、\nほんの少ししか動けぬままに僕らは互いを追い詰めていく。
1662 = "緊緊相連、緊緊相貼。儘管沒有什麼活動空間，我們還是儘可能越貼越緊。" 

# monologue
# JP: （きゅうっ！　きゅきゅっ！　くううっ！　きゅぽっ！）
1931 = "（吱嗚！嗯呀！咕嗚！啾啵！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ！！」
943 = "「嗯！！」" 

# monologue
# JP: 膣も子宮も求めてくれてる。\n亀頭に吸い付き勃起を締め付け離すまいとして張り付いて。
1810 = "陰道和子宮都渴求著我。吸著龜頭、綁著肉棒，絲毫不肯放開。" 

# monologue
# JP: その蠢きの全てをもって、\nただ一心に、僕の精子を飲み干したくてじたばたしてる。
1584 = "所有蠕動都是為了喝光我的精子，才這麼急切的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん――ちゅうっ――」
896 = "「嗯——啾嗚——」" 

# monologue
# JP: すず、と名前を呼びたくて。\nだけれどキスをほどきたくなく、想いを込めて舌を吸う。
1541 = "我想叫她的名字。但又不想鬆開嘴唇，就用吸舌頭的辦法讓她領會吧。" 

# 【ハチロク】
# display as 鈴
# JP: 「んっ！　ふっ！　ふっ！　んっ！　んっ！　ふうっ！　んっ！　ふうっ！！」
942 = "「嗯！呼！呼！嗯！嗯！呼！嗯！呼！！」" 

# monologue
# JP: （ばちゅっ！　ずちゅっ！　にゅぶっ！　ずぼびゅ！！）
1967 = "（啪啾！呲啾！喵呲噗！啪噗！！）" 

# monologue
# JP: 応えてなのか、そうでないのか、\nすずの全身が精一杯の動きをみせる。
1391 = "她回應我了嗎，還是沒有呢。無論如何，鈴的全身都儘可能活躍了起來。" 

# 【ハチロク】
# display as 鈴
# JP: 「んひゅっ！！！」
926 = "「嗯咻！！！」" 

# monologue
# JP: すずの喉奥がひゅっと動いて、\n僕の口内の唾液も息も全部が強く吸い取られ――っ！？
1771 = "鈴的喉嚨一動，我口內的唾液和呼吸都被用力吸走了——！？" 

# monologue
# JP: （きゅっ！　きゅむううううううううっ！！！）
1984 = "（嗯呀！嗯嗚——！！！）" 

# monologue
# JP: 強い締め付け、\n同時にすずが、甘く悶えて、うめきを上げるっ！
1812 = "陰道強烈的緊縮，還有鈴甜美的嬌喘！" 

# 【ハチロク】
# display as 鈴
# JP: 「んっ！！？　んっ！！！\nんうううううううううううううううううう～っ！！！！」
946 = "「嗯！！？嗯！！！嗯嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚嗚～！！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「んくっ！！！！」
935 = "「嗯嗯！！！！」" 

# monologue
# JP: （びゅっ！　びゅぶるっ！　びゅるるっ！　どびゅっ！）
2001 = "（噗！噗嚕！噗嚕！咕噗！）" 

# monologue
# JP: 射精、している。\n自分自身を崩して溶かし、すずの子宮へと送り込んでる。
1524 = "我在射精。我感到自己已經毀壞溶解，送進了鈴的子宮。" 

# 【ハチロク】
# display as 鈴
# JP: 「んんんん～～～っ！！　んっ、ふっ――ん！　ふうっ、\nん、れるっ――れろっ――じゅうう――ずじゅじゅ～！」
934 = "「嗯嗯嗯嗯～～～！！嗯，呼——！呼，嗯，咻嚕——嗯——吱吱嗯——呲啾呲啾～！」" 

# monologue
# JP: 下から、上から、すずはあくまで貪欲に、\n僕の全てを貪るように求めてくれる。
1630 = "無論下邊還是上邊，鈴都是那麼貪婪地渴求著我的一切。" 

# monologue
# JP: （びゅっ！　びゅるっ！　びゅううっ！　びゅっ！）
2006 = "（噗！噗！噗嚕！噗！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ――むっ――ちゅぶっ――んむっ――」
891 = "「嗯——咕——啾呲噗——咕——」" 

# monologue
# JP: （びゅっ！　ぶびゅるっ！　びゅうっ！　どびゅっ――）
2000 = "（噗！噗嚕！噗嚕！咕噗——）" 

# 【ハチロク】
# display as 鈴
# JP: 「んっ……ごきゅんんっ！！」
912 = "「嗯……啾嗯！！」" 

# monologue
# JP: ……やがて射精の波が過ぎ去り。\n僕の口内にあった唾液も――全てがすずに吸い尽くされて。
500 = "……射精的浪潮終於過去。我口內的唾液——也全部被鈴吸盡。" 

# 【ハチロク】
# display as 鈴
# JP: 「ぷあっ！　はっ――あっ――ん……ふあっ――\nはぁっ――はぁっ――はあっ――ふあああ～っ――！」
948 = "「噗啊！哈——啊——……呼啊——啊——啊——啊——呼、啊嗯～——！」" 

# monologue
# JP: ……すずを満たして、満たされる。
503 = "……我滿足了鈴，鈴滿足了我。" 

# monologue
# JP: キスをほどいた寂しさに、\nすぐさまぺとり、可愛い柔らかがくっついてくる。
1824 = "鬆開嘴唇的寂寞，立刻又被可愛柔軟的小嘴填上。" 

# 【ハチロク】
# display as 鈴
# JP: 「そうてつさま――そうてつさまぁ」
1069 = "「雙鐵少爺——雙鐵少爺」" 

# monologue
# JP: 鼻先でキス。ほっぺたでキス。
1515 = "我們用鼻尖接吻。用臉蛋接吻。" 

# monologue
# JP: 小さなかわいい顔がぺたぺた、\n甘えて僕にすがりついては、すりすり動く。
1396 = "她小巧可愛的臉蛋撒著嬌蹭著我。" 

# 【ハチロク】
# display as 鈴
# JP: 「わたくし……わた、くし――いま――いま……です、ね。\n双鉄様で――いっぱい――いっぱいになりまし、た」
990 = "「我……我——現在——現在……全、全都被您給填滿了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1080 = "「！」" 

# monologue
# JP: 体ひとつのことではない。\nそうわかるゆえ、促さず。
1415 = "她說的不是合體一事。我明白，所以我不催促。" 

# monologue
# JP: すずの自然な言葉だけ――\n誘導なしに、それを聞きたくてじっと待つ。
1780 = "鈴自然的言詞——我靜靜等待著她主動說完。" 

# 【ハチロク】
# display as 鈴
# JP: 「妹たちのことも――共感のことの、なにも、かも――\n[わたくしの半身,3]8620のことさえも、つながってる時、消えて、しまって」
958 = "「妹妹們的事——同感的事、一切的一切——連我[半身,3]8620的事，在於你相連的時候，全都消失了」" 

# monologue
# JP: そこには、罪悪感が無い。\n幸福感と――なんだろう、達成感に近いのだろうか？
1458 = "對此我沒有罪惡感。是幸福感——還有大概就是成就感嗎？" 

# monologue
# JP: 聞いて、褒めてと、自慢気な――\n子犬のような、無垢ななにかが溢れ出してる。
1416 = "她說著，夸著，有些自滿的樣子——像小狗一樣純真無瑕。" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様だけ。ただ、あなただけ。\n愛しい貴方で、わたくしのなかがいっぱいに――」
1072 = "「雙鐵少爺。只有您。我的心裡現在只有我愛的您——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕もだ」
# 870 = "「啊啊，我也是」" 

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ」
823 = "「呵呵」" 

# monologue
# JP: 驚きに目を丸くもせずに。\nわかっていたというように、ただただ静かにすずは微笑む。
1407 = "她沒有驚訝得瞪圓眼睛。她只是靜靜地笑著，似乎早就明白。" 

# 【双鉄】
# display as 雙鐵
# JP: （ああ――そうなのか）
1963 = "（啊啊——原來如此）" 

# monologue
# JP: だから、感じる。\nごくごく自然に、当然のことと受け入れる。
1581 = "所以才有感覺，才會那麼從容地接受。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らは、夫婦になったのだな」
996 = "「我們成為夫婦了」" 

# 【ハチロク】
# display as 鈴
# JP: 「左様ですね――いとしいあなた。\nわたくしの、たったひとりの旦那様――（ちゅっ）」
1015 = "「是啊——我愛的人，是只屬於我的夫君了——（啾）」" 

# monologue
# JP: 唇に軽いキスをして。\n軽やかに――
1421 = "她輕輕地吻我。輕輕地——" 

# monologue
# JP: （ずっ――りゅっ――うっ――――ずるっ――）
1940 = "（呲——溜——滑動——）" 

# 【ハチロク】
# display as 鈴
# JP: 「はっ――あっ――まだ――ふとっ――んっ――\nんっ――ふあっ――んくっ！！！」
852 = "「哈——啊——還——嗚嗯——嗯——呼啊——嗯！！！」" 

# monologue
# JP: ――とは、到底いかず。
491 = "——但實在是沒力氣了。" 

# monologue
# JP: ゆっくりゆっくり時間をかけて、すずは、僕から体を離す。
1749 = "過了很長時間，鈴才放開了我。" 

# 【ハチロク】
# display as 鈴
# JP: 「[ふつつかもの,2]不束者ではございますが。どうぞこの身を貴方の妻に。\n[いくひさ,1]幾久しく――あなたのお側に、お置きください」
963 = "「小女子不才，只盼夫君與我長相廝守、不離不散」" 

# 【双鉄】
# display as 雙鐵
# JP: 「幾久しく――か」
1067 = "「長相廝守啊——」" 

# monologue
# JP: いつまでも、いつまでも変わらぬように。
1622 = "永遠、永遠都不改變。" 

# monologue
# JP: それがどれほど儚い願いか、\n僕も、すずも、己自身の体をもって、思い知ってる。
1674 = "聽起來是那麼虛無縹緲，但我和鈴都有這種切身體會。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――無作法者の未熟者だが。\n深く、お前を愛している。その心だけは間違い無い」
517 = "「——在下尚不成熟，但深深愛著你。這份心意絕無虛假」" 

# monologue
# JP: だから、願い。思い続けていくのだろう。
1575 = "所以就讓這種心情持續下去吧。" 

# monologue
# JP: それが儚いものだからこそ、毎日毎夜毎時毎秒――\n言葉を重ね気持ちを重ねて、新たなものと誓い直して。
1614 = "正因為虛無縹緲，每天每夜每小時每秒——累積下的言詞和感情，都會化作更深的海誓山盟。" 

# 【双鉄】
# display as 雙鐵
# JP: 「幾久しく。だ。すず。\nお前か僕か、どちらかの時が果てるまで――いや」
969 = "「就是永遠，鈴，直到你和我哪一方走完時間的長河——不」" 

# 【ハチロク】
# display as 鈴
# JP: 「どちらかの時が、果ててさえ。なお」
787 = "「即便走完時間的長河，也不會變」" 

# monologue
# JP: 視線が混じる。それだけでいい。\nすずの言葉と、僕の言葉は、おんなじだ。
1512 = "我們只需要此刻視線的交會。我們的話是一樣的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうか。いつまでも僕の隣に」
1033 = "「請永遠陪伴我吧」" 

# 【ハチロク】
# display as 鈴
# JP: 「そうぞ。いつまでもあなたのお側に」
1024 = "「當然了，我永遠會陪伴著您」" 

# monologue
# JP: そうして、手と手を重ねあい。
1514 = "我們牽起手。" 

# monologue
# JP: ――僕らは、誓いのくちづけをする。
492 = "——用一吻定下誓言。" 
