1811 = "Âm đạo và cậu bé, da thịt và da thịt, môi\nvà môi, lưỡi và lưỡi.\nDù toàn thân áp sát vào nhau đến thế,\nchúng tôi vẫn có sự chệch nhịp——"

# 【双鉄】
# display as 雙鐵
# JP: （ああ、いや。\nそうなの、だな。それで――いいんだ）
1966 = "（A, không.\nLà vậy, nhỉ. Như thế——là được rồi.）"

# monologue
# JP: 異物同士で。男と女で。凸と凹とで――違ってて。\n違っているから――求めあえるし、セックスできる。
1490 = "Là những cá thể khác biệt. Là nam và nữ.\nLà lồi và lõm——chúng tôi khác nhau.\nChính vì khác nhau——mới khao khát nhau,\nmới có thể làm tình."

# monologue
# JP: 夫婦になるとは、お互いを近づけるあうことではなく、\nきっと――違ってるお互い同士を、等価と認め合うことだ。
1387 = "Trở thành vợ chồng, không phải là kéo nhau\nlại gần,\nmà chắc chắn là——công nhận giá trị ngang\nbằng của nhau, dù cho có khác biệt."

# monologue
# JP: （ゆさっ――じゅちゅっ――ずちゅっ！　ぶちゅっ！！）
2029 = "（Lắc——nhóp nhép——phập! Bạch!!）"

# 【ハチロク】
# display as 鈴
# JP: 「んっ！　ふっ！　ふっ！　んっ！　ふっ！　ふあっ！\nんっ！　んくっ！　んっ！！！」
941 = "「Ưm! Phù! Phù! Ưm! Phù! Phù a!\nƯm! Ưm hự! Ưm!!!」"

# monologue
# JP: 違っていいと思った瞬間、今度はリズムがぴったりと合う。\n加速していく。白熱してく。
1341 = "Khoảnh khắc nhận ra sự khác biệt là điều\ntốt, nhịp điệu lại ăn khớp hoàn hảo.\nTăng tốc. Nóng bỏng."

# monologue
# JP: つながりあって、くっつきあって、\nほんの少ししか動けぬままに僕らは互いを追い詰めていく。
1662 = "Kết nối với nhau, dính chặt lấy nhau,\ndù chỉ có thể cử động một chút xíu, chúng\ntôi vẫn dồn ép lẫn nhau."

# monologue
# JP: （きゅうっ！　きゅきゅっ！　くううっ！　きゅぽっ！）
1931 = "（Thít! Siết chặt! Ưm! Chụt!）"

# 【双鉄】
# display as 雙鐵
# JP: 「んっ！！」
943 = "「Ưm!!」"

# monologue
# JP: 膣も子宮も求めてくれてる。\n亀頭に吸い付き勃起を締め付け離すまいとして張り付いて。
1810 = "Cả âm đạo và tử cung đều đang khao khát.\nMút lấy quy đầu, siết chặt cậu bé, bám\nriết không chịu buông."

# monologue
# JP: その蠢きの全てをもって、\nただ一心に、僕の精子を飲み干したくてじたばたしてる。
1584 = "Với tất cả sự ngọ nguậy đó,\nchỉ một lòng một dạ giãy giụa muốn nuốt\ntrọn tinh trùng của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ん――ちゅうっ――」
896 = "「Ưm——chụt——」"

# monologue
# JP: すず、と名前を呼びたくて。\nだけれどキスをほどきたくなく、想いを込めて舌を吸う。
1541 = "Muốn gọi tên Suzu.\nNhưng lại không muốn dứt nụ hôn, tôi dồn\nhết tình cảm mút lấy chiếc lưỡi của em."

# 【ハチロク】
# display as 鈴
# JP: 「んっ！　ふっ！　ふっ！　んっ！　んっ！　ふうっ！　んっ！　ふうっ！！」
942 = "「Ưm! Phù! Phù! Ưm! Ưm! Phù! Ưm! Phù!!」"

# monologue
# JP: （ばちゅっ！　ずちゅっ！　にゅぶっ！　ずぼびゅ！！）
1967 = "（Bạch! Phập! Phập! Phụt!!）"

# monologue
# JP: 応えてなのか、そうでないのか、\nすずの全身が精一杯の動きをみせる。
1391 = "Không biết là đang đáp lại, hay là không,\ntoàn thân Suzu phô bày những chuyển động\nhết mình."

# 【ハチロク】
# display as 鈴
# JP: 「んひゅっ！！！」
926 = "「Ưm hứ!!!」"

# monologue
# JP: すずの喉奥がひゅっと動いて、\n僕の口内の唾液も息も全部が強く吸い取られ――っ！？
1771 = "Sâu trong cổ họng Suzu khẽ giật,\ntoàn bộ nước bọt và hơi thở trong miệng\ntôi bị hút mạnh đi——!?"

# monologue
# JP: （きゅっ！　きゅむううううううううっ！！！）
1984 = "（Thít! Siết chặt!!!）"

# monologue
# JP: 強い締め付け、\n同時にすずが、甘く悶えて、うめきを上げるっ！
1812 = "Một lực siết chặt mạnh mẽ,\nđồng thời Suzu quằn quại ngọt ngào, cất\ntiếng rên rỉ!"

# 【ハチロク】
# display as 鈴
# JP: 「んっ！！？　んっ！！！\nんうううううううううううううううううう～っ！！！！」
946 = "「Ưm!!? Ưm!!!\nƯm ư ư ư ư ư ư ư ư ư ư ư ư ư ư ư ư ư~!!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「んくっ！！！！」
935 = "「Ưm hự!!!!」"

# monologue
# JP: （びゅっ！　びゅぶるっ！　びゅるるっ！　どびゅっ！）
2001 = "（Phụt! Phụt! Phụt! Phụt!）"

# monologue
# JP: 射精、している。\n自分自身を崩して溶かし、すずの子宮へと送り込んでる。
1524 = "Đang, xuất tinh.\nPhá vỡ và hòa tan chính bản thân mình, đưa\nvào tử cung của Suzu."

# 【ハチロク】
# display as 鈴
# JP: 「んんんん～～～っ！！　んっ、ふっ――ん！　ふうっ、\nん、れるっ――れろっ――じゅうう――ずじゅじゅ～！」
934 = "「Ưm ưm ưm ưm~~~!! Ưm, phù——ưm! Phù,\nưm, mút——liếm——chùn chụt——rột rột~!」"

# monologue
# JP: 下から、上から、すずはあくまで貪欲に、\n僕の全てを貪るように求めてくれる。
1630 = "Từ dưới lên, từ trên xuống, Suzu vô cùng\ntham lam,\nkhao khát như muốn cắn nuốt tất cả của\ntôi."

# monologue
# JP: （びゅっ！　びゅるっ！　びゅううっ！　びゅっ！）
2006 = "（Phụt! Phụt! Phụt! Phụt!）"

# 【双鉄】
# display as 雙鐵
# JP: 「んっ――むっ――ちゅぶっ――んむっ――」
891 = "「Ưm——ưm——chụt——ưm——」"

# monologue
# JP: （びゅっ！　ぶびゅるっ！　びゅうっ！　どびゅっ――）
2000 = "（Phụt! Phụt! Phụt! Phụt——）"

# 【ハチロク】
# display as 鈴
# JP: 「んっ……ごきゅんんっ！！」
912 = "「Ưm……ực!!」"

# monologue
# JP: ……やがて射精の波が過ぎ去り。\n僕の口内にあった唾液も――全てがすずに吸い尽くされて。
500 = "……Cuối cùng cơn sóng xuất tinh cũng qua\nđi.\nNước bọt trong miệng tôi——cũng bị Suzu hút\ncạn."

# 【ハチロク】
# display as 鈴
# JP: 「ぷあっ！　はっ――あっ――ん……ふあっ――\nはぁっ――はぁっ――はあっ――ふあああ～っ――！」
948 = "「Phù a! Hà——a——ưm……phù a——\nhà——hà——hà——phù a a a~——!」"

# monologue
# JP: ……すずを満たして、満たされる。
503 = "……Lấp đầy Suzu, và được lấp đầy."

# monologue
# JP: キスをほどいた寂しさに、\nすぐさまぺとり、可愛い柔らかがくっついてくる。
1824 = "Sự cô đơn khi dứt nụ hôn,\nngay lập tức được lấp đầy bởi sự mềm mại\nđáng yêu áp sát vào."

# 【ハチロク】
# display as 鈴
# JP: 「そうてつさま――そうてつさまぁ」
1069 = "「Ngài Soutetsu——Ngài Soutetsu.」"

# monologue
# JP: 鼻先でキス。ほっぺたでキス。
1515 = "Hôn lên chóp mũi. Hôn lên má."

# monologue
# JP: 小さなかわいい顔がぺたぺた、\n甘えて僕にすがりついては、すりすり動く。
1396 = "Khuôn mặt nhỏ nhắn đáng yêu áp sát,\nnũng nịu bám lấy tôi, cọ cọ không ngừng."

# 【ハチロク】
# display as 鈴
# JP: 「わたくし……わた、くし――いま――いま……です、ね。\n双鉄様で――いっぱい――いっぱいになりまし、た」
990 = "「Em……em——bây giờ——bây giờ……\nđã được ngài Soutetsu——lấp đầy——lấp đầy\nhoàn toàn, rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1080 = "「！」" 

# monologue
# JP: 体ひとつのことではない。\nそうわかるゆえ、促さず。
1415 = "Không chỉ là thể xác.\nHiểu được điều đó, tôi không hối thúc em."

# monologue
# JP: すずの自然な言葉だけ――\n誘導なしに、それを聞きたくてじっと待つ。
1780 = "Chỉ là những lời nói tự nhiên của Suzu——\ntôi muốn nghe nó mà không cần dẫn dắt, nên\nchỉ im lặng chờ đợi."

# 【ハチロク】
# display as 鈴
# JP: 「妹たちのことも――共感のことの、なにも、かも――\n[わたくしの半身,3]8620のことさえも、つながってる時、消えて、しまって」
958 = "「Cả chuyện của các em gái——chuyện cộng\ncảm, mọi thứ——\nngay cả chuyện của [nửa kia của em,3]8620, khi kết nối với\nngài, cũng tan biến, mất.」"

# monologue
# JP: そこには、罪悪感が無い。\n幸福感と――なんだろう、達成感に近いのだろうか？
1458 = "Trong đó, không hề có cảm giác tội lỗi.\nCảm giác hạnh phúc và——gì nhỉ, gần giống\nvới cảm giác thành tựu chăng?"

# monologue
# JP: 聞いて、褒めてと、自慢気な――\n子犬のような、無垢ななにかが溢れ出してる。
1416 = "Hãy nghe đi, hãy khen em đi, một vẻ tự\nhào——\nnhư một chú cún con, một sự ngây thơ vô\ntội đang tuôn trào."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様だけ。ただ、あなただけ。\n愛しい貴方で、わたくしのなかがいっぱいに――」
1072 = "「Chỉ có ngài Soutetsu. Chỉ có ngài thôi.\nBên trong em đã tràn ngập hình bóng người\nem yêu——」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕もだ」
# 870 = "「啊啊，我也是」" 

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ」
823 = "「Ufufu.」"

# monologue
# JP: 驚きに目を丸くもせずに。\nわかっていたというように、ただただ静かにすずは微笑む。
1407 = "Không hề mở to mắt ngạc nhiên.\nNhư thể đã biết trước, Suzu chỉ lặng lẽ\nmỉm cười."

# 【双鉄】
# display as 雙鐵
# JP: （ああ――そうなのか）
1963 = "（A——ra là vậy sao.）"

# monologue
# JP: だから、感じる。\nごくごく自然に、当然のことと受け入れる。
1581 = "Thế nên, tôi mới cảm nhận được.\nĐón nhận nó một cách vô cùng tự nhiên, như\nmột điều hiển nhiên."

# 【双鉄】
# display as 雙鐵
# JP: 「僕らは、夫婦になったのだな」
996 = "「Chúng ta, đã trở thành vợ chồng rồi nhỉ.」"

# 【ハチロク】
# display as 鈴
# JP: 「左様ですね――いとしいあなた。\nわたくしの、たったひとりの旦那様――（ちゅっ）」
1015 = "「Đúng vậy ạ——người em yêu.\nPhu quân duy nhất của em——(Chụt)」"

# monologue
# JP: 唇に軽いキスをして。\n軽やかに――
1421 = "Đặt một nụ hôn nhẹ lên môi.\nThật nhẹ nhàng——"

# monologue
# JP: （ずっ――りゅっ――うっ――――ずるっ――）
1940 = "（Phập——trượt——ư——tuột——）"

# 【ハチロク】
# display as 鈴
# JP: 「はっ――あっ――まだ――ふとっ――んっ――\nんっ――ふあっ――んくっ！！！」
852 = "「Hà——a——vẫn còn——to——ưm——\nưm——phù a——ưm hự!!!」"

# monologue
# JP: ――とは、到底いかず。
491 = "——Nhưng mà, đâu có dễ dàng như vậy."

# monologue
# JP: ゆっくりゆっくり時間をかけて、すずは、僕から体を離す。
1749 = "Dành rất nhiều, rất nhiều thời gian, Suzu\ntừ từ tách cơ thể ra khỏi tôi."

# 【ハチロク】
# display as 鈴
# JP: 「[ふつつかもの,2]不束者ではございますが。どうぞこの身を貴方の妻に。\n[いくひさ,1]幾久しく――あなたのお側に、お置きください」
963 = "「Tuy em còn nhiều thiếu sót. Nhưng xin hãy\nnhận em làm vợ ngài.\nMãi mãi về sau——xin hãy để em ở bên cạnh\nngài.」"

# 【双鉄】
# display as 雙鐵
# JP: 「幾久しく――か」
1067 = "「Mãi mãi về sau——sao.」"

# monologue
# JP: いつまでも、いつまでも変わらぬように。
1622 = "Mong sao sẽ mãi mãi, mãi mãi không thay\nđổi."

# monologue
# JP: それがどれほど儚い願いか、\n僕も、すずも、己自身の体をもって、思い知ってる。
1674 = "Đó là một điều ước mong manh đến nhường\nnào,\ncả tôi và Suzu đều hiểu rõ hơn ai hết qua\nchính cơ thể của mình."

# 【双鉄】
# display as 雙鐵
# JP: 「――無作法者の未熟者だが。\n深く、お前を愛している。その心だけは間違い無い」
517 = "「——Tuy tôi là một kẻ thô lỗ, chưa trưởng\nthành.\nNhưng tôi yêu em sâu đậm. Chỉ riêng tấm\nlòng đó là không thể sai được.」"

# monologue
# JP: だから、願い。思い続けていくのだろう。
1575 = "Vì vậy, tôi ước nguyện. Và sẽ tiếp tục\nmong nhớ."

# monologue
# JP: それが儚いものだからこそ、毎日毎夜毎時毎秒――\n言葉を重ね気持ちを重ねて、新たなものと誓い直して。
1614 = "Chính vì nó mong manh, nên mỗi ngày, mỗi\nđêm, mỗi giờ, mỗi giây——\nchúng tôi lại trao nhau những lời nói,\nnhững tình cảm, và thề hẹn lại từ đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「幾久しく。だ。すず。\nお前か僕か、どちらかの時が果てるまで――いや」
969 = "「Mãi mãi về sau. Nhé. Suzu.\nCho đến khi thời gian của em hoặc tôi cạn\nkiệt——không.」"

# 【ハチロク】
# display as 鈴
# JP: 「どちらかの時が、果ててさえ。なお」
787 = "「Ngay cả khi thời gian của một trong hai\ncạn kiệt. Vẫn mãi như vậy.」"

# monologue
# JP: 視線が混じる。それだけでいい。\nすずの言葉と、僕の言葉は、おんなじだ。
1512 = "Ánh mắt giao nhau. Chỉ cần thế là đủ.\nLời của Suzu, và lời của tôi, là một."

# 【双鉄】
# display as 雙鐵
# JP: 「どうか。いつまでも僕の隣に」
1033 = "「Xin em. Hãy mãi ở bên cạnh tôi.」"

# 【ハチロク】
# display as 鈴
# JP: 「そうぞ。いつまでもあなたのお側に」
1024 = "「Vâng. Em sẽ mãi ở bên cạnh ngài.」"

# monologue
# JP: そうして、手と手を重ねあい。
1514 = "Và rồi, chúng tôi nắm lấy tay nhau."

# monologue
# JP: ――僕らは、誓いのくちづけをする。
492 = "——Chúng tôi trao nhau nụ hôn thề nguyện."
