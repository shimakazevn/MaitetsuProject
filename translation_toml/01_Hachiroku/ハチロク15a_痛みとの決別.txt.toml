# lines: 377 
# 【双鉄】
# display as 雙鐵
# JP: 「――わかった。僕はナビでレールショップに戻る。\nポーレットはすまんが――ああ、そうだ。手配を頼む」
1445 = "「——明白了。我會坐Ｎａｖｉ回鐵路商店。波萊特，就麻煩你——嗯，是的。你安排一下」" 

# monologue
# JP: 双鉄さまが電話を切ります。
2776 = "雙鐵少爺掛掉了電話。" 

# monologue
# JP: ほんの数分の電話の間に、手袋無しのそのお手が、\n真っ赤になってしまっています。
2617 = "明明他只打了幾分鐘電話，奧莉薇那隻沒戴手套的手就變得通紅。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はレールショップに戻る。ナビが恐らく一番早いゆえ、\n堰さんたちと、もし可能なら登呂流湯さんを連れてくる」
2012 = "「我先回鐵路商店了。乘Ｎａｖｉ應該是最快的。我會帶堰先生——如果可以的話會把登呂流浴場老闆一起帶來」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
1954 = "「好的」" 

# monologue
# JP: 動揺してはなりません。決して泣いてはなりませぬ。\nそれが伝わってしまったのなら――
2577 = "我絕對不能動搖，不能哭泣。要是我表現出動搖——" 

# monologue
# JP: 腕の中、ぐったりと倒れたままのオリヴィちゃんに\nどのような悪影響を及ぼすのやもしれませぬから。
2727 = "說不定給躺在懷裡的奧莉薇帶來的影響會更大。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィの体は冷やし続けることが必須のはずだ」
2010 = "「我們必須不斷冷卻奧莉薇的身體」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
2085 = "「是的」" 

# monologue
# JP: 抱きかかえているこの腕が、制服越しにも焼けそうな程。\nこれ程の高熱への対処なら、冷却以外に無いでしょう。
2596 = "抱著奧莉薇的手臂透過制服都能感到熱度。想對付這樣高的溫度只有不停進行冷卻。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、すずが可能な限り、この状態で見守って欲しい。\nが、すずに負担が出るようならば」
2210 = "「鈴，我希望你能儘可能看顧奧莉薇。不過前提是要保證你自己的安全」" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ、旦那さま。大丈夫です」
1744 = "「不用擔心我。我沒事的」" 

# monologue
# JP: ――わたくしをすずとお呼びくださった。\nこの状況下で、わたくしを、妻として頼ってくださった。
1400 = "——雙鐵少爺叫我鈴。說明現在他是把我當作妻子才拜託我的。" 

# monologue
# JP: ただそれだけのことが大きな力になります。\n双鉄さまのお声が、言葉が、わたくしの不安をくるみます。
2416 = "光是這個稱呼就給了我莫大的勇氣。雙鐵少爺的聲音和話語撫慰了我的不安。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしのことより、オリヴィちゃんのことを。\nオリヴィちゃんが守ろうとする、この線路のことを」
2105 = "「比起我，還是請您多擔心一下奧莉薇和奧莉薇想要守護的這條線路吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
1443 = "「——嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
1866 = "「啊」" 

# 【オリヴィ】
