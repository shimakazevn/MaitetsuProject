2466 = "可是她別說回答了，連一點反應都沒有。就算我用\\x%l共感;#00ffc040;共鳴%l;#;跟她重複一遍也沒有反應。" 

# monologue
# JP: 降り詰む不安を、だから振り払います。\n言葉を、希望を、傘にして。
2556 = "我只能用充滿希望的話語拂去心中不斷蔓延的不安。" 

# 【ハチロク】
# display as 八六
