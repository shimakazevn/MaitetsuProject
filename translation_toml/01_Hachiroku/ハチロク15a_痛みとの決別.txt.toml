1948 = "「Không đâu!? Mấy cái đó, Olivy,\nchỉ nhìn, những gì Munakata làm, rồi bắt chước theo thôi」"
# 【宗方】
# display as 宗方
# JP: 「お前の調査が、人的被害を防いだということも聞いた。\n井戸水の濁りの情報の早期共有が、自主避難を促したと」
2003 = "「Tôi cũng nghe nói cuộc khảo sát của cô đã ngăn chặn được thiệt hại về người.\nNhờ việc chia sẻ sớm thông tin nước giếng bị đục, đã thúc đẩy người dân chủ động sơ tán」"
# 【オリヴィ】
