1780 = "「Công tác khắc phục vô cùng xuất sắc. Hoàn toàn không cần tôi phải giám sát hay chỉ đạo,\nvề mặt an toàn cũng không có một chút tì vết nào. Vì thế, tôi mới bất ngờ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――」
# 1851 = "「啊——」" 
# 【宗方】
# display as 宗方
# JP: 「お前がどれほど\x%l保線;#00ffc040;保線%l;#;を真剣に学んでいたか。\nそれを的確に御鉄の皆さんに伝えてくれたかに、驚いた」
2038 = "「Tôi bất ngờ vì cô đã học hỏi về \\x%l保線;#00ffc040;bảo trì đường ray%l;#; nghiêm túc đến mức nào.\nVà còn truyền đạt lại một cách chính xác cho mọi người ở Đường sắt Ohito nữa chứ」"
# 【オリヴィ】
# display as 奥莉薇
