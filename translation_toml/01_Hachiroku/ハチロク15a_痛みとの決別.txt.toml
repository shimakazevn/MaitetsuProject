2023 = "「我明白了。那就拜託你了」" 

# monologue
# JP: （ガチャっ）
2796 = "（喀嚓）" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、電話！　誰からだったと！？」
2216 = "「阿哥，電話！誰打來的！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、みかん鉄道の」
1880 = "「啊，是橙鐵路的」" 

# monologue
# JP: (Trrrrr――)
32 = "(叮鈴鈴——)" 

# monologue
# JP: 再び鳴った電話の音に、一瞬びくりとしてしまう。\nが、ポーレットはいつもの動きで受話器を手に取る。
2580 = "我被再次響起的鈴聲嚇了一跳。幸好波萊特和平時一樣冷靜，她接通了電話。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。御一夜鉄道――あっ！　オリヴィちゃん！？\n双鉄くんね？　すぐかわり」
1997 = "「您好，這裡是御一夜鐵路——啊！奧莉薇！？讓雙鐵君接電話是吧？我馬上給他」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もしもし！　オリヴィ、僕だ、双鉄だ」
1890 = "「喂喂，奧莉薇，我是雙鐵」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツ、そっち、どう？\n事故状況、ショーサイ、どのくらい、わかってる？」
2234 = "「雙鐵，你那邊怎麼樣？知道詳細的事故情況了嗎？」" 

# monologue
# JP: 第一声から、オリヴィだ。\n声こそ弱々しいけれど、いつもどおりのオリヴィだ。
2782 = "電話對面剛出聲我就聽出是奧莉薇了。雖然聲音有點虛弱，但毫無疑問對面的人是她。" 

# monologue
# JP: 最重要を、最優先でひたすら果たそうと頑張っている。\nならばただ、僕も最善を尽くすことでこそ応えよう。
2510 = "她正努力想要完成最重要、最優先的任務。那我也必須竭盡全力幫助她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「発生したのは水蒸気爆発。発生地点は霧縞市[まきぞのちょう,2]巻園町\n[しゅくくぼた,3]祝久保田」
1911 = "「在霧島市牧園町宿窪田發生了蒸汽噴發」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「シュククボタ――\nって、ソーテツの、おじいちゃんの」
1965 = "「宿窪田——那不就是，像你一樣的那個爺爺家？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「安心してくれ。人的被害はゼロだ」
2053 = "「放心吧，沒有人員傷亡」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「え？」
1847 = "「哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィが重ねて来た調査が、警告になったのだ。\n『雪もあるし、念のため』と、地域で早期の自主避難を」
2209 = "「都是你無數次的調查起到了警告作用。地方推荐居民提前去避難了，說反正也有雪，以防萬一」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――やった。よかったぁ」
1858 = "「啊——太好了。真是太好了」" 

# monologue
# JP: ……オリヴィが築いた信頼関係。\nとても大きなその成果。
1424 = "……奧莉薇建立起來的信任取得了巨大成果。" 

# monologue
# JP: 褒めてやりたい、労いたい。\nが、僕はその任ではないし、今がその時でも無い。
2771 = "雖然我很想誇獎和犒勞她。但這件事不應該由我來做，現在也不是做這種事的時候。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そちらの現況についても教えてほしい」
1776 = "「你那邊情況怎麼樣了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「陥没、してる。ケッコー、派手。\nけど、アンシンして？　始発まで、には、復旧、させる」
1917 = "「塌陷，很嚴重。不過你，放心，我們會在，首班車出發，之前，修好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「陥没？」
1918 = "「塌陷？」" 

# monologue
# JP: 線路が、地面が、歪んでいると、\nオリヴィを助け起こした瞬間に見た光景を思い出す。
2564 = "我想起了去救奧莉薇的那一瞬看到的場景，地面和線路都扭曲了。" 

# monologue
# JP: 歪みではなく、陥没だったか――\n思った瞬間、頭の中にイメージが湧く。
2441 = "原來不是鐵軌扭曲了，是地面發生了塌陷啊——正當我這麼想的時候，腦海中出現了地面的想像。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、地中で大きな風船が膨れていたようなものか」
1982 = "「就跟有一個巨大的氣球在地底下膨脹一樣嗎」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ、だよ。――さす、が」
2115 = "「沒錯。不愧，是你」" 

# 【稀咲】
# display as 稀咲
# JP: 「風船？」
2107 = "「氣球？」" 

# monologue
# JP: 聡明極まる稀咲がけれど、怪訝そうな表情を浮かべている。
2700 = "聽到我這麼說，就連聰明無比的稀咲也露出了不解的表情。" 

# monologue
# JP: ならば、急ぐ気持ちを抑え、\nここは説明した方が、結局のところ早道だろう。
2602 = "既然這樣，我就應該壓抑住急迫的心情，先好好跟她們解釋清楚為上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「マグマが岩盤越しに地下水を熱して、蒸気に変える。\n膨れ上がった体積が、地中から地面を丸ごと持ち上げる」
1976 = "「就是岩漿隔著岩石加熱地下水，水變成了蒸汽。膨脹的蒸汽會頂起整個地面」" 

# 【凪】
# display as 凪
# JP: 「ばってん、ボーリング調査したとでしょお？\nそしたら、そんとき蒸気ばブシューってふきださんと？」
1764 = "「但是，咱們不是去鑽探過了嘛？那時候不也沒噴什麼蒸汽出來啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ボーリングできるような浅い地点ではなかったのだ。\n蒸気溜りが発生し、地表をまるごと持ち上げたのは」
2136 = "「現在蒸汽膨脹，影響地面的地點不是當時適合鑽探的淺層，而是深層」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1851 = "「啊——」" 

# monologue
# JP: 日々姫がささっと、スケッチブックに図を描いていく。
2613 = "日日姬唰唰地在素描簿上畫著示意圖。" 

# 【日々姫】
# display as 日日姬
# JP: 「地中のすごく深いところにおっきかおっきか風船ばある。\nアホ程おっきかけん、持ち上がる部分はちいちゃくなる」
1977 = "「就是說地底下特別深的地方產生了巨大的氣球，氣球大得不得了，但是地表隆起的部分卻比較小」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのイメージだと、僕も思う。で、何かの弾み――\n例えば、マグマと地下水の接触か何で、爆発が起きる」
1980 = "「就跟你想的一樣。然後有什麼契機的話——比如岩漿和地下水相碰，就會發生爆炸」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ。……その、バクハツが、岩盤とか、割って。\n割れた、とこから、蒸気、きっと、フキだした、の」
2114 = "「沒錯……爆炸會炸開岩層。然後從炸開的地方噴出蒸汽」" 

# 【れいな】
# display as 玲奈
# JP: 「それで蒸気が抜けて、風船がぺしゃーんてしちゃって、\nだから、もちあがってたとこがへこんだんですねぇ」
2163 = "「蒸汽都漏出去以後，氣球就癟了，地面原本隆起的地方也會塌下去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。無論、現時点ではただの推論にすぎぬが、\nそう考えれば、筋道は立つ」
2079 = "「是啊。雖然這只是我們根據現狀做出的推測，不過這麼考慮就都說得通了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、しょ？　ゲンイン、はっきり、してるから――\n修復、ゼッタイ、間に合わせる、からっ！」
2075 = "「是吧？因為我們，已經知道原因了，所以，一定趕得上，修好它！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ？」
1949 = "「奧莉薇？」" 

# monologue
# JP: 苦しげなのに、噛み付いてくるようなオリヴィの声。\nあまりの気迫に、一瞬びくりとしてしまう。
2512 = "她的聲音明明聽起來那麼苦悶，卻充滿了氣魄，我甚至嚇了一跳。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、列車――走らせ、なきゃ、ダメ。\nダイヤ、どおり、に――どうして、も」
2044 = "「所以，我們必須，讓列車行駛。無論如何，都要，按照，時刻表，行駛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今日、すぐにか？」
1760 = "「今天馬上就要行駛？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「う、ん――じゃないと――フーヒョー、ヒガイ――！\nお客さん――せ、っかく――天空――路線、に――」
1892 = "「嗯——不然——我們就——名聲——掃地了！難得讓——客人們——看看天空——線路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2241 = "「！」" 

# monologue
# JP: ――悲鳴のようにも聞こえる声。\n経験が、絞り出させたものだと感じさせる声。
1393 = "——奧莉薇就像悲鳴一樣擠出聲音如此說道。決不能讓客人失望，這似乎是她的經驗之談。" 

# monologue
# JP: しかし僕にも、僕が積んできた経験がある。\n“安全が最大の使命”を揺るがすことは、断じてできない。
2471 = "可是我也有從事鐵路工作以來積攢的經驗。那就是“安全就是鐵路工作最大的使命”，唯有安全必須保證。" 

# 【双鉄】
# display as 雙鐵
# JP: 「現時点では安全と断定できるだけの情報が無い。\nゆえ、ここで即答することはできない」
2135 = "「現在的訊息還不足以保證行駛安全。所以我沒辦法馬上答應你」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「け、ど――」
1832 = "「可、是——」" 

# monologue
# JP: ……“けど”の続きは、発せられぬまま飲み込まれる。\nオリヴィも\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
1425 = "……奧莉薇沒能繼續說下去，畢竟她也是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。" 

# monologue
# JP: どれほど気持ちが強かろうとも、\n安全確保の重要性を見失うようなことはない。
2398 = "不管她多麼期望列車按時行駛，也不會忘記保證安全的重要性。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。\n災害原因の究明には、どのくらいの時間が」
2124 = "「波萊特，查清發生災害的原因需要多久」" 

# 【ポーレット】
# display as 波萊特
# JP: 「すぐ問い合わせます。待って下さい」
2037 = "「我馬上去問。你稍等」" 

# 【双鉄】
# display as 雙鐵
# JP: 「この爆発に伴っての二次災害。あるいは、\n再度の爆発・噴火の恐れはどうかについても頼む」
2236 = "「順便確認一下這次噴發以後會不會產生次生災害，會不會再次爆炸或者噴發」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
2071 = "「明白了」" 

# monologue
# JP: 一息置いて――\n受話器に、オリヴィに向き直る。
2570 = "我深呼吸了一下，然後重新拿起話筒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この判断には、どうしても時間がかかってしまう。\n安全――ひいては人命に関わることゆえ、理解してくれ」
1732 = "「下這個判斷無論如何都需要時間。這攸關安全——特別是人身安全，請你理解」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん……」
1893 = "「嗯……」" 

# monologue
# JP: ほんの、一拍。\n声が途切れた隙間に、色濃く、にじみ出てくる。
2507 = "奧莉薇話音剛落，就顯出了她此刻有多麼疲勞。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「（はあっ……はあっ……）」
2245 = "「（蛤啊……蛤啊……）」" 

# monologue
# JP: 深い。深い。深い。疲労。\n――オリヴィは、どうしようもなく消耗している。
2504 = "奧莉薇此刻疲憊無比。她已經精疲力盡了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こちらの判断を待たず、陥没に対しての応急処置、\n可能であれば、復旧作業も、速やかに進めてもらいたい」
1909 = "「在等待我們這邊判斷的時候，希望你對塌陷做應急處理，如果可以也馬上進行修復工程」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。それは、もう、とっくに、着手、してる。\nハチロクが、目に、セキ、たち、手に、なって、くれて」
1901 = "「嗯，我們，早就，在做了。八六，是奧莉薇的，眼睛，奧莉薇的，手腳」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1866 = "「啊」" 

# monologue
# JP: なるほど、\x%l共感;#00ffc040;共感%l;#;を密にして、か。
2442 = "原來如此，她們的\\x%l共感;#00ffc040;共鳴%l;#;一直連接著嗎。" 

# monologue
# JP: それであれば、オリヴィは安静にしたままで、\n現場の指揮を取り続けることができる。
2756 = "那這樣奧莉薇就可以保持休息的狀態繼續指揮現場了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「陥没……ソウテイ、範囲。内……だよ？　だから、\nいまの、機材と――設備で――対応、完全に、でき、る」
1914 = "「塌陷……在，預料，範圍內。所以，現在的，器材——和設備——完全，能，對付」" 

# monologue
# JP: そのために増設をした保線基地。\n早期発見、早期対応。
2540 = "我們就是為了這個才增加了巡線基地。做到早發現、早處理。" 

# monologue
# JP: 準備が適切に機能する――\nそれも全ては、オリヴィと宗方さんとが、与えてくれた。
2541 = "我們的準備派上了用場——而這一切都是奧莉薇和宗方先生的功勞。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「8620……だって――走れる、から――\nあと、四、時間――時間……くれれ、ば」
2247 = "「８６２０……都還能——行駛——再給奧莉薇四、四個小時……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「であるなら、ダイアどおりも可能となるな。\nところで、ハチロクは」
2201 = "「那就能按照時刻表行駛了。說起來，八六呢？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――すぐ、呼ぶ、ね？」
1861 = "「啊——要馬上，叫她嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あっ、いや」
1876 = "「啊，不用了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
2231 = "「雙鐵君」" 

# monologue
# JP: ポーレットが軽く肩をつついで僕を呼び、\n手にしたメモを見せてくる。
2637 = "波萊特輕輕戳了戳我的肩膀，讓我看她手上拿的筆記。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1815 = "「原來如此」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま、おまたせいたしました」
2233 = "「雙鐵少爺，讓您久等了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ハチロク」
1442 = "「——八六」" 

# monologue
# JP: 夫婦ゆえ、\n平静を装っているその声からでも、はっきり感じる。
2481 = "因為我們是夫婦。所以不管她裝得有多平靜，我都能從她的聲音裡感覺到。" 

# monologue
# JP: オリヴィが、どれほど厳しい状態か。\nハチロクがこの一時を、どれほど大切に思っているかを。
2502 = "奧莉薇剛才的狀態有多危險。八六看到她轉危為安又是有多驚喜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「現時点では、まったく決定していないことだが、\nダイアどおりに列車を走らせる可能性もある」
2229 = "「雖然現在還不能下決定，但讓列車按照時刻表行駛的可能性是有的」" 

# monologue
# JP: けれど、僕には責任がある。\n安全に――最も安全な状態で、列車を運行させる責任が。
2474 = "可是，我肩上是有責任的。我有著讓列車以最安全的狀態行駛的責任。" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました」
# 2071 = "「明白了」" 

# monologue
# JP: そして誰よりハチロクは、\n僕の気持ちを、わかってくれる。
2690 = "而八六肯定比任何人都理解我此刻的心情。" 

# 【ハチロク】
# display as 八六
# JP: 「その場合、わたくしはどのように乗務すれば？」
1784 = "「假如可以行駛，我應該怎麼辦？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前が乗務に必要となった場合は、ナビを迎えにやる。\n三時間以内に、そちらの区切りをつけておけるか？」
1787 = "「假如需要你完成乘務，我會讓Ｎａｖｉ去接你的。你能在三小時之內完成那邊的工作嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「必ず、左様に整えます。\nですので、どうぞ双鉄さまは――」
2027 = "「我會如期完成。所以也請雙鐵少爺——」" 

# monologue
# JP: ふっ、と、短く、漏れ聞こえる音。\n声のような、排気のような。
2679 = "突然，我聽到短短的一聲，像她出聲抽泣，又像她吐了一口氣。" 

# monologue
# JP: ハチロクは――\n涙を流さず、泣いている。
2419 = "八六她正在哭，雖然沒有淚水。" 

# 【ハチロク】
# display as 八六
# JP: 「ですので、どうぞ双鉄さまは。\n双鉄さまの。最善のご判断と、ご指示とを」
2045 = "「所以，請雙鐵少爺給予我最準確的判斷和指示」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
2026 = "「我明白了」" 

# monologue
# JP: （カチャっ）
# 2796 = "（喀嚓）" 

# monologue
# JP: 声を震わせぬようにして。言葉を飲み込み、受話器を置く。\nオリヴィの貴重な時間を、決して無駄にせぬように。
2550 = "我努力不讓自己的聲音顫抖，吞下了想說的話，然後放下話筒。絕對不能讓奧莉薇寶貴的時間浪費一分一秒。" 

# monologue
# JP: 僕がハチロクを慰めるのは、ハチロクに慰めてもらうのは――全てが終わったあとでいい。
2684 = "等到一切都結束了，我們才可以互相安慰。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が冷静さを欠いている。あるいは公私混同をしている\nと感じたのなら、すぐに指摘して欲しい」
1782 = "「假如你感覺到我失去冷靜或者有夾帶私情的情況，一定要馬上指出來」" 

# monologue
# JP: 今の自分が冷静である自信がない。\nが、これは理性的判断だと、内心で叫ぶ僕もいる。
2567 = "我沒有自信相信現在的自己是冷靜的。不過我內心覺得這是理性的判斷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィはダイア通りの運行を強く主張している。\nその理由は、風評被害を最小限に留めるためだ」
1942 = "「奧莉薇強烈要求按照原定時刻表運行。認為這樣才能把差評降到最低」" 

# 【ポーレット】
# display as 波萊特
# JP: 「確かに、せっかく定着し始めた天空路線が、\n『噴火で止まる路線』と思われるのは、致命的です」
2150 = "「的確，如果讓剛走上正軌的天空線路的印象變成“會因為火山噴發而停止的線路”，對我們是致命的打擊」" 

# 【稀咲】
# display as 稀咲
# JP: 「湯医線と比し、小畑線の保線費用は極めて高い。\n観光集客が望めなくなれば、赤字の垂れ流しの始まりだ」
1842 = "「和湯醫線比起來，大畑線的巡線費用非常高。一旦遊客變少，赤字雪球就會越滾越大」" 

# 【真闇】
# display as 真闇
# JP: 「そぎゃんとなったら……また廃線？\nせっかく、復線して、繋げた線路ば」
2205 = "「那時候……又會廢線？這可是好不容易恢復的廢線咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは避けたい。ゆえ、ダイア通りに走らせたい。\nが、安全の確保こそが、常に僕らの第一の使命だ」
2011 = "「我們要避免的就是這種情況。所以我們要按照時刻表讓列車行駛。不過我們的第一使命是確保安全」" 

# monologue
# JP: みなが頷く。頷いてくれる。
2491 = "大家都點頭同意了我的話。" 

# 【日々姫】
# display as 日日姬
# JP: 「事故なんておこしちゃったら、\n線路、いくら繋いでも誰も乗らなくなっちゃうけん」
1726 = "「一旦發生了事故，管你有多少線路大家都不願意坐咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1898 = "「嗯」" 

# monologue
# JP: 公共交通機関としての、あるいは観光手段としての、\n“鉄道の信頼回復”。
2542 = "我們要恢復公眾對鐵路作為公共交通和旅遊交通工具的信賴。" 

# monologue
# JP: それは未だに、非常に力弱い歩みを、\nとぼとぼと重ねているのにすぎない現状なのだから。
2698 = "而我們現在每一步都非常艱難，苦苦掙扎。" 

# 【双鉄】
# display as 雙鐵
# JP: 「火山活動については、以下のような所見を頂いた。\nもちろん、速報であり、確定的なものではないが――」
2212 = "「關於火山活動的消息我得到了以下的意見，當然只是速報，不是最終結果――」" 

# monologue
# JP: ポーレットからもらったメモの要点を読み上げていく。
2581 = "我讀著波萊特交給我的筆記要點。" 

# monologue
# JP: 読み終え、しばし垂れ込める、\nひどく慎重そうな沈黙――
2731 = "讀完之後，我周圍籠罩著一股慎重的沉默——" 

# 【真闇】
# display as 真闇
# JP: 「『水蒸気爆発が、再度、同じ現場で起きる可能性は、\n低いものと推認される』――と？」
2088 = "「是說“可以認為蒸汽噴發在同一個位置再次發生的可能性很低”唄？」" 

# monologue
# JP: 真闇姉がその沈黙を静かに破れば、\nすぐさま呼応するのは、凪だ。
2621 = "最先打破沉默的是真闇姐，然後凪馬上呼應著她說。" 

# 【凪】
# display as 凪
# JP: 「そりゃそーばい！　だって穴ば開いたなら、\nそこに煙突できたよーなもんやけんね！！」
1974 = "「就是唄！開個洞不就等於裝了個煙囪嘛！！」" 

# 【ふかみ】
# display as 深美
# JP: 「わ！　ほんとだ。凪ちゃん、すごい」
1844 = "「哇！對啊。小凪真聰明」" 

# monologue
# JP: 凄まじきは凪の直観力だ。\n専門家からの説明と、内容面での差異は無い。
2430 = "凪的直覺還是那麼厲害。她和專家的解釋從內容來看基本一致。" 

# 【双鉄】
# display as 雙鐵
# JP: 「くわえ、マグマの噴出が全くなかった――つまり、\n単純に水蒸気だけが熱せられた爆発だったともある」
1809 = "「再加上完全沒有岩漿噴發——也就是可以認為單純是水蒸氣加熱引起的噴發」" 

# 【稀咲】
# display as 稀咲
# JP: 「……『新炎岳火口付近での火山活動の活発化の兆候も\n収束を見せはじめている』のか。――なら、これは」
1459 = "「……“新燃岳火山口附近的火山活躍度也顯示出降低的兆頭”——那也就是說——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『総合的に、噴火や水蒸気爆発等が小畑線の安全を\nただちに脅かす可能性は、極めて低いと推測できる』」
1455 = "「“總體來看，大畑線馬上受到火山噴發和蒸汽噴發等安全威脅的可能性很低”」" 

# monologue
# JP: 専門家からの意見をそのまま伝えれば、\n徐々に――頷きたちが応え始める。
2592 = "把專家的意見原封不動告訴大家之後，大家開始接連點頭。" 

# monologue
# JP: 即座は、日々姫と凪とれいなと。続いて、ポーレット\n稀咲、ニイロク――　一番最後に、真闇姉と、赤井宮司も。
2414 = "先是日日姬、凪和玲奈，然後是波萊特、稀咲、二六——最後是真闇姐和赤井宮司。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、同爆発による陥没の影響について、\nこれは、オリヴィから復旧可能との報告を受けている」
1831 = "「另外，關於噴發引起的塌陷，我從奧莉薇那裡收到了可以修復的報告」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、それなんですけど――自主避難した方々への\n応援の物資、一両を荷物車にして運べないでしょうか？」
1882 = "「啊，關於這個——要不要用行李車給主動避難的人們送去一車廂的救援物資？」" 

# 【稀咲】
# display as 稀咲
# JP: 「応援の物資？」
2057 = "「救援物資？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「水道の断線が発生して、山側は全面通行止め。\n井戸水も全く使えないそうなんです。だから――」
2148 = "「發生了水管斷裂，山那邊的路又禁止通行。井水似乎也不能喝了。所以——」" 

# 【真闇】
# display as 真闇
# JP: 「水なら、右田一酒造元からも提供できるけん。\n必要あれば、いくらでも」
1835 = "「右田一釀酒廠可以送水過去。要多少有多少」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。\nそれでどうでしょう？　双鉄くん」
2172 = "「謝謝。雙鐵君，這個主意怎麼樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、その分の重量増も含めて、\nこれも専門家の判断を待とう」
2203 = "「那我們就把物資增加的重量也算上，等待專家的判斷」" 

# 【ふかみ】
# display as 深美
# JP: 「専門家？　オリヴィちゃんよりくわしいひと、です？」
1969 = "「專家？有比奧莉薇還要懂這個的人嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1870 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。すでにお願いしてある。が、到着にはまだ\n時間がかかるゆえ、両天秤で、僕らは準備をすすめる」
1902 = "「嗯，我已經請他過來了。不過到這裡還要一段時間，所以做兩手準備，我們先準備起來吧」" 

# 【れいな】
# display as 玲奈
# JP: 「天空路線に列車を走らせるのと、\n運休させるのとの両方ですねぇ？」
2086 = "「是要做好天空線路開行和停運的兩手準備嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だ。まず走らせる場合だが――陥没地点の復旧が\n応急的なものとなってしまう可能性もあるゆえ」
2084 = "「是的。首先就算能開行，塌陷地點的修復措施可能也只是應急處理」" 

# 【日々姫】
# display as 日日姬
# JP: 「[じくじゅう,1]軸重！！　8620よりも、ずうっと軸重の軽かけん！！\nⅨ号！　Ⅸ号機関車ば走らせればよかとよ！！！」
2178 = "「軸重！！九號的軸重可比８６２０輕老多了！！讓九號機車上不就行了嘛！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1850 = "「哦！」" 

# 【凪】
# display as 凪
# JP: 「よか考えばい！　屋岳の峠ばⅨ号で越えれんよーなら、\n8620、\x%l補機;#00ffc040;補機%l;#;にすればよかばい！」
2187 = "「這主意好！萬一九號爬不過矢岳的坡，用８６２０當\\x%l補機;#00ffc040;補機%l;#;就得了唄！」" 

# monologue
# JP: 日々姫の、凪の、叫びのような強い声。\n静かな声が――すぐさまそれに呼応していく。
2786 = "馬上有人用冷靜的聲音回應了日日姬和凪興奮的叫喊。" 

# 【真闇】
# display as 真闇
# JP: 「救援物資も運ぶ列車を、Ⅸ号が牽引するとやったら――\nそこにさらに、プラスアルファもできるんじゃなかと？」
2060 = "「既然都要用九號牽引加了救援物資的列車——那能不能再加一輛？」" 

# 【稀咲】
# display as 稀咲
# JP: 「例えば、\x%l明智;#00ffc040;明智%l;#;から100年以上の長きを走り抜けた、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィの引退列車にする――とか？」
2100 = "「比如說從\\x%l明智;#00ffc040;明治%l;#;到現在有著一百年以上歷史的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;——奧莉薇的引退列車？」" 

# 【ふかみ】
# display as 深美
# JP: 「あ！　それいいです！　鉄道雑誌とかサイトとか、\nきっと、そっちをおっきなニュースにしてくれる、です」
1874 = "「啊！這個主意不錯！知道了這個消息，鐵路雜誌和網站一定會大為轟動的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その方向で、わたし、調整がんばります。\nううん――絶対にしてみせますっ！！」
2029 = "「我會試著往這個方向調整。不，我絕對要調整成這樣！！」" 

# 【れいな】
# display as 玲奈
# JP: 「湯医線はまかせてくださぁい。\nれいな、いくらでも代走しちゃいますよぉ」
2129 = "「湯醫線就交給玲奈吧。隨時接班都沒有問題的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「みんな――」
1921 = "「大家——」" 

# monologue
# JP: 一つになってる。\n気持ちが、一つに。
2590 = "所有人的心都往一處使了。" 

# monologue
# JP: オリヴィのため――\nそのためだけに、みんながレールを、繋げてくれる。
2489 = "大家為了奧莉薇，齊心協力將鐵軌拼接於一處。" 

# 【赤井】
# display as 赤井
# JP: 「しかし――天候だけはどうしようもない。\n雪が止み、日が照り、溶かしてくれれば良いのですが」
1749 = "「不過——只有天氣無法預料。要是雪停了，太陽能出來把雪化了就好了」" 

# 【凪】
# display as 凪
# JP: 「っ！！？」
1875 = "「啊！！？」" 

# 【ニイロク】
# display as 二六
# JP: 「Ⅸ号。\x%l粘着力;#00ffc040;粘着力%l;#;に。すぐれない。この雪で。屋岳の坂。\n\x%l空転;#00ffc040;空転%l;#;して。滑落したら。\x%l補機;#00ffc040;補機%l;#;が8620でも。危ない」
1755 = "「九號，\\x%l粘着力;#00ffc040;黏著力%l;#;不夠。這麼大的雪，爬不了矢岳的坡。要是發生\\x%l空転;#00ffc040;空轉%l;#;滑落，就算\\x%l補機;#00ffc040;補機%l;#;是８６２０，也很危險」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2080 = "「是啊」" 

# monologue
# JP: ――なんと、ありがたい指摘だろう。\n感情の渦に呑まれず、冷静に。
1399 = "——赤井宮司和二六提出的意見真是太及時了。我不能感情用事，一定要冷靜。" 

# monologue
# JP: 憎まれ役になろうとも、安全のため――\nこれこそ、鉄道員の、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の理想形だ。が――
2520 = "就算被人憎恨，我也要保證鐵路的安全，這才是鐵路工作者和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的理想形象，可是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこは、大丈夫かと見込んでいます」
2035 = "「我認為沒有問題」" 

# 【ニイロク】
# display as 二六
# JP: 「え？」
# 1847 = "「哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、設計した日々姫に確認をとらねば」
2141 = "「當然，得讓設計師日日姬確認一下」" 

# 【日々姫】
# display as 日日姬
# JP: 「いけると」
1811 = "「准行」" 

# monologue
# JP: 日々姫が頷く。力強く。
2615 = "日日姬用力點了點頭。" 

# 【ニイロク】
# display as 二六
# JP: 「あ！」
# 1870 = "「啊！」" 

# 【赤井】
# display as 赤井
# JP: 「ああ！　その手がっ！！」
1871 = "「啊！原來還有這一手！！」" 

# monologue
# JP: すぐさまポーレットが設計図面を引き出せば、\nニイロクもが喰いつくように演算を開始する。
2636 = "波萊特一拿出設計圖，二六就跟餓虎撲食一樣湊上去開始運算。" 

# 【日々姫】
# display as 日日姬
# JP: 「やけん、いこ！　にぃに！！」
1833 = "「可以，阿哥，咱趕緊！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ああ。専門家の承認を得られるのなら、\nこの方向で確定しよう」
1447 = "「——是啊。要是能得到專家的認可，我們就向這個方向努力」" 

# monologue
# JP: そうなれば、何一つの障害も残りはしない。
2750 = "這樣就把全部障礙都掃清了。" 

# monologue
# JP: 雪の屋岳の、30.3パーミルの勾配も、\n僕らなら、必ず越えて、たどりつける。
2670 = "矢岳的坡度有３０.３‰，就算是在下冰棒件下，我們也一定能爬上頂峰。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィが、Ⅸ号と僕らを待っている」
1940 = "「奧莉薇在等著九號和我們呢」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……ハチロク？\nハチロク――まだ、かなぁ？」
1468 = "「……八六？八六——還沒完嗎？」" 

# 【ハチロク】
# display as 八六
