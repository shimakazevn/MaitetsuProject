# JP: 指先を綺麗に整え、敬礼をして。\nそうしてオリヴィちゃんの手に、携帯電話を預けます。
2558 = "我向她端正地行禮。然後把手機塞給她。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「電話？」
2048 = "「手機？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。不死鳥博士とつながっております」
2081 = "「是的。正在和不死鳥博士通話中」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ、なんだ」
2192 = "「這樣啊」" 

# monologue
# JP: 受話器を持ち直すオリヴィちゃんをそのままに、\nわたくしは、隆起現場へと向かいます。
2508 = "奧莉薇重新拿好電話，站在原地。我則趕往現場。" 

# monologue
# JP: オリヴィちゃんが任されたこと。\nどうしても、それを果たし切――っ！！？
2530 = "我一定要完成奧莉薇交給我的任務——！！？" 

# 【ハチロク】
# display as 八六
# JP: 「きゃっっ！！？」
1836 = "「呀！！？」" 

# monologue
# JP: 風――暴風がいきなり上から――\nえっ！！？
2675 = "突然一陣暴風從天而降——哎！！？" 

# 【ハチロク】
# display as 八六
# JP: 「ヘリコプタアっ！？」
2152 = "「直升機！？」" 

# monologue
# JP: 認識をした瞬間に、エアクラ自動車と同等の――\n感情のない、情報だけの\x%l共感;#00ffc040;共感%l;#;もどきが送られてきます。
2547 = "我剛看清楚那是直升機，就傳來了和空凝機汽車一樣沒有感情只有訊息的\\x%l共感;#00ffc040;共鳴%l;#;。" 

# 【ハチロク】
# display as 八六
# JP: 「隈元県の防災ヘリ――霧縞市へ向かう途中――\n線路復旧のため――ああ！　堰さまたちを連れて！！」
2227 = "「隈元縣的救援直升機——正在前往霧島市的路上——為了恢復線路——啊！堰先生他們在上面！！」" 

# monologue
# JP: 求められている着地点は――保線基地裏。\nナビさんがいつも着陸するあの平坦地が好適でしょう。
2663 = "直升機請求的著陸地點是巡線基地後面。Ｎａｖｉ平時一直用來著陸的平地應該很適合。" 

# 【ハチロク】
# display as 八六
# JP: 「誘導します、続いてください」
2009 = "「我來指揮降落，請跟我來」" 

# monologue
# JP: ――こころが沸きます。沸きたちます。
1397 = "——我的心沸騰了。" 

# monologue
# JP: 堰様たちは必ずや、オリヴィちゃんの、\n素晴らしい手となりかわってくれることでしょうから。
2483 = "堰先生他們一定會代替奧莉薇，完美地完成任務。" 

# monologue
# JP: （もう少し、もう少しですよ、オリヴィちゃん）
2799 = "（奧莉薇，再等一會就好了）" 

# monologue
# JP: レールは、必ず繋げましょう。\n大事な誰かを、望んだ場所へと運んでいくため――
2757 = "鐵路一定會聯繫起來，能把重要的人運到期望的目的地。" 

# monologue
# JP: わたくしたちは、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は。\nそうするために、きっと、造られてきたのですから。
2538 = "我們\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;就是為了這個目標才誕生的。" 

# 【双鉄】
# display as 雙鐵
