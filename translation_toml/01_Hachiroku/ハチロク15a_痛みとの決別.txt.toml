[script]
# lines: 377 
# 【双鉄】
# display as 雙鐵
# JP: 「――わかった。僕はナビでレールショップに戻る。\nポーレットはすまんが――ああ、そうだ。手配を頼む」
1445 = "「——Anh hiểu rồi. Anh sẽ cưỡi Navi quay lại cửa hàng đường sắt.\nXin lỗi Paulette nhé——à, đúng rồi. Nhờ em sắp xếp giúp anh」"
# monologue
# JP: 双鉄さまが電話を切ります。
2776 = "Ngài Soutetsu cúp máy."
# monologue
# JP: ほんの数分の電話の間に、手袋無しのそのお手が、\n真っ赤になってしまっています。
2617 = "Chỉ trong vài phút gọi điện ngắn ngủi, đôi bàn tay không đeo găng của ngài ấy\nđã đỏ ửng cả lên."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はレールショップに戻る。ナビが恐らく一番早いゆえ、\n堰さんたちと、もし可能なら登呂流湯さんを連れてくる」
2012 = "「Anh sẽ quay lại cửa hàng đường sắt. Chắc Navi là nhanh nhất rồi,\nanh sẽ đưa chú Seki và nếu được thì cả chủ nhà tắm Tororyu-yu đến đây」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
1954 = "「Vâng」"
# monologue
# JP: 動揺してはなりません。決して泣いてはなりませぬ。\nそれが伝わってしまったのなら――
2577 = "Không được hoảng hốt. Tuyệt đối không được khóc.\nNếu để lộ ra những điều đó——"
# monologue
# JP: 腕の中、ぐったりと倒れたままのオリヴィちゃんに\nどのような悪影響を及ぼすのやもしれませぬから。
2727 = "Không biết sẽ gây ra ảnh hưởng xấu thế nào\nđến bé Olivy đang nằm bất tỉnh trong vòng tay tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィの体は冷やし続けることが必須のはずだ」
2010 = "「Chắc chắn phải liên tục làm mát cơ thể cho Olivy đấy」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2085 = "「Vâng」"
# monologue
# JP: 抱きかかえているこの腕が、制服越しにも焼けそうな程。\nこれ程の高熱への対処なら、冷却以外に無いでしょう。
2596 = "Đôi cánh tay đang ôm bé ấy của tôi nóng rát như muốn bỏng dù đã qua lớp đồng phục.\nĐể đối phó với mức nhiệt cao thế này, có lẽ không còn cách nào khác ngoài việc làm mát."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、すずが可能な限り、この状態で見守って欲しい。\nが、すずに負担が出るようならば」
2210 = "「Vì thế, anh muốn Suzu cố gắng theo dõi tình trạng này càng lâu càng tốt.\nNhưng, nếu thấy quá sức thì phải dừng lại ngay nhé」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、旦那さま。大丈夫です」
1744 = "「Không sao đâu ạ, thưa chồng. Em ổn mà」"
# monologue
# JP: ――わたくしをすずとお呼びくださった。\nこの状況下で、わたくしを、妻として頼ってくださった。
1400 = "——Ngài ấy đã gọi tôi là Suzu.\nTrong tình cảnh này, ngài ấy đã dựa dẫm vào tôi, với tư cách là một người vợ."
# monologue
# JP: ただそれだけのことが大きな力になります。\n双鉄さまのお声が、言葉が、わたくしの不安をくるみます。
2416 = "Chỉ điều đó thôi cũng đã tiếp thêm cho tôi một sức mạnh to lớn.\nGiọng nói, từng câu chữ của ngài Soutetsu, đã bao bọc lấy sự bất an trong tôi."
# 【ハチロク】
# display as 八六
# JP: 「わたくしのことより、オリヴィちゃんのことを。\nオリヴィちゃんが守ろうとする、この線路のことを」
2105 = "「Xin ngài hãy lo cho bé Olivy, thay vì lo cho em.\nHãy lo cho tuyến đường sắt mà bé Olivy đang cố gắng bảo vệ này」"
# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
1443 = "「——Ừ」"
# 【ハチロク】
# display as 八六
# JP: 「あ」
1866 = "「A」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
1461 = "「…………」"
# monologue
# JP: オリヴィちゃんを抱きかかえているわたくしを、\n双鉄さまが、まるごと抱きしめてくださいます。
2775 = "「……」"
# monologue
# JP: おおきくおおきく手を広げ、オリヴィちゃんとわたくしを、\nすっぽり、包んでくださいます。
2405 = "Ngài Soutetsu ôm trọn lấy tôi,\nkhi tôi đang ôm bé Olivy trong tay."
# 【双鉄】
# display as 雙鐵
# JP: 「少しの間、耐えてくれ。必ず戻る。\n救援の手も、できるかぎりに早く届ける」
1986 = "Ngài dang rộng vòng tay, ôm trọn lấy cả tôi và bé Olivy\nvào lòng."
# 【ハチロク】
# display as 八六
# JP: 「お待ちしております、双鉄さま」
2028 = "「Cố chịu đựng thêm một chút nhé. Anh nhất định sẽ quay lại.\nAnh sẽ đưa người đến cứu viện nhanh nhất có thể」"
# monologue
# JP: あっさりと、双鉄さまは手をほどきます。\n寂しい気持ちを押しつぶします。
2773 = "「Em sẽ đợi ngài, ngài Soutetsu」"
# monologue
# JP: 一刻を大切にすることこそが、\nオリヴィちゃんを助ける唯一の路でしょうから。
2399 = "Ngài Soutetsu dứt khoát buông tay ra.\nTôi cố kìm nén cảm giác cô đơn trong lòng."
# 【ハチロク】
# display as 八六
# JP: 「どうぞご安全に。\nお気をつけていってらっしゃいませ」
2157 = "Bởi vì trân trọng từng giây từng phút lúc này,\nmới là con đường duy nhất để cứu bé Olivy."
# monologue
# JP: わたくしの手に、お仕事用の携帯電話を持たせてくださり、\n双鉄さまが、小走りに保線基地へと向かわれます。
2774 = "「Chúc ngài thượng lộ bình an.\nNgài đi cẩn thận nhé」"
# monologue
# JP: その向こう側にある開けた場所から、\nナビに乗り込み、飛び立つために。
2646 = "Ngài Soutetsu đưa cho tôi chiếc điện thoại di động dùng cho công việc,\nrồi chạy vội về phía căn cứ bảo trì đường ray."
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん？　オリヴィちゃん？」
1946 = "Để lên chiếc Navi đang đỗ ở bãi đất trống phía bên kia,\nvà cất cánh."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
# 1461 = "「……」" 
# 【ハチロク】
# display as 八六
# JP: 「もう少しだけ我慢をしてくださいましね？\nきっと、すぐに良くなります」
1766 = "「Olivy? Olivy?」"
# monologue
# JP: 言い聞かせます。\nむしろ、私自身に向けて。決して絶望せぬように。
2746 = "「Em cố chịu đựng thêm chút nữa nhé?\nChắc chắn, em sẽ khỏe lại ngay thôi」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん無しでは、復旧工事もままなりません。\nわたくしたちには、オリヴィちゃんが必要なのです」
2113 = "Tôi tự nhủ.\nĐúng hơn là, tự nói với chính mình. Để bản thân không bao giờ tuyệt vọng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
# 1461 = "「……」" 
# monologue
# JP: けれど、返事は――わずかな反応もありません。\n\x%l共感;#00ffc040;共感%l;#;をそっと求めてみても、何の応えもありません。
2466 = "「Nếu không có em, công việc khắc phục sự cố sẽ không thể tiến hành được.\nChúng ta, rất cần có Olivy đấy」"
# monologue
# JP: 降り詰む不安を、だから振り払います。\n言葉を、希望を、傘にして。
2556 = "Nhưng, không có tiếng trả lời——thậm chí chẳng có lấy một chút phản ứng nào.\nDù tôi có khẽ thử kết nối \\x%l共感;#00ffc040;cộng cảm%l;#;, cũng chẳng nhận lại được hồi đáp."
# 【ハチロク】
# display as 八六
# JP: 「宗方様がおまかせくださったことですもの。\nオリヴィちゃんは、大丈夫。必ず、叶えられますとも」
2190 = "Vì thế, tôi gạt phăng đi nỗi bất an đang bủa vây.\nDùng lời nói, dùng hy vọng, làm chiếc ô che chắn."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
# 1461 = "「……」" 
# monologue
# JP: 宗方様のお名前にさえ、反応しない――\nいいえ、反応できない状況。
2518 = "「Đây là việc mà ngài Munakata đã giao phó mà.\nOlivy sẽ ổn thôi. Chắc chắn, em ấy sẽ hoàn thành được」"
# monologue
# JP: なにをどうすればいいのでしょうか。\n手がかりすらも無い以上、呼び続ける他にありません。
2434 = "Thậm chí đến cả tên ngài Munakata, bé ấy cũng không phản ứng——\nKhông, là trong tình trạng không thể phản ứng."
# 【ハチロク】
# display as 八六
# JP: 「ね？　オリヴィちゃん」
2073 = "Phải làm sao bây giờ.\nKhi không có lấy một manh mối nào, tôi chẳng còn cách nào khác ngoài việc tiếp tục gọi tên bé ấy."
# monologue
# JP: (Trrrr――）
33 = "「Đúng không? Olivy」"
# 【ハチロク】
# display as 八六
# JP: 「きゃっ！？」
1837 = "(Trrrr——)"
# monologue
# JP: 電話です。\n双鉄さまがお預けくださった――
2444 = "「Á!?」"
# monologue
# JP: まさか、こんなに早くに連絡があるとは、\nああいえ！　とにかくでませんと。
2630 = "Là tiếng điện thoại.\nChiếc điện thoại mà ngài Soutetsu đã giao cho tôi——"
# 【ハチロク】
# display as 八六
# JP: 「あの、もしもし」
2197 = "Không ngờ lại có liên lạc sớm đến vậy,\nà không! Dù sao thì cũng phải nghe máy đã."
# 【ひよこ】
# display as ？？？
# JP: 「ああ、ハチロク氏。オリヴィ氏は？」
1878 = "「Dạ, a lô」"
# 【ハチロク】
# display as 八六
# JP: 「不死鳥博士！」
1739 = "「A, cô Hachiroku. Cô Olivy sao rồi?」"
# monologue
# JP: 双鉄さまか、ポーレット様がご連絡くださったのでしょう。\nなんと心強い支援でしょうか――
2390 = "「Tiến sĩ Fushicho!」"
# monologue
# JP: 湧き出る勇気に溺れないよう、\n落ち着くことを第一に、オリヴィちゃんの状態を伝えます。
2549 = "Chắc hẳn ngài Soutetsu hoặc ngài Paulette đã liên lạc với cô ấy.\nThật là một sự hỗ trợ vững chắc biết bao——"
# 【ひよこ】
# display as 不死鳥
# JP: 「……稼動状態から一気に落ちてしまいましたか。\n大変に厳しい状態ですな」
1469 = "Để không bị chìm đắm trong dũng khí vừa trào dâng,\ntôi đặt việc bình tĩnh lên hàng đầu, và báo cáo tình trạng của bé Olivy."
# monologue
# JP: わたくしたちは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。鉄路の安全を担う物。\n故に、突然の機能停止など、本来起こり得ぬ構造です。
2539 = "「……Từ trạng thái đang hoạt động mà lại sập nguồn ngay lập tức sao.\nTình trạng này vô cùng nghiêm trọng đấy」"
# monologue
# JP: その“起こり得ぬ”が起きている。\nオリヴィちゃんの体はもはや、それほどまでに――
2692 = "Chúng tôi là \\x%lレイルロオド;#00ffc040;Railord%l;#;. Là những tồn tại gánh vác sự an toàn của đường sắt.\nDo đó, cấu tạo vốn dĩ không cho phép xảy ra việc đột ngột ngừng hoạt động."
# 【ひよこ】
# display as 不死鳥
# JP: 「自己メンテナンス用の工具は、手元にありますかな？」
1774 = "Thế mà điều \"không thể xảy ra\" đó lại đang xảy ra.\nCơ thể của bé Olivy giờ đây, đã đến mức——"
# 【ハチロク】
# display as 八六
# JP: 「もちろん、常備してございます！」
2142 = "「Cô có sẵn dụng cụ tự bảo trì ở đó không?」"
# 【ひよこ】
# display as 不死鳥
# JP: 「では、まずは[フォースリブート,4]強制再起動から試みますか」
2199 = "「Tất nhiên là em luôn mang theo bên mình ạ!」"
# monologue
# JP: ……ご指示通りに間違いなく。\n“まずは”。“それでは”。“でしたら”。“今度は”。
1430 = "「Vậy thì, trước tiên hãy thử [フォースリブート,4]khởi động lại bắt buộc xem sao」"
# monologue
# JP: ――なにをどれだけかさねても\nオリヴィちゃんは、ピクリとも動いてくれませぬ。
1391 = "……Tôi làm chính xác theo những gì được hướng dẫn.\n\"Trước tiên\". \"Vậy thì\". \"Nếu thế\". \"Lần này\"."
# monologue
# JP: 焼かれるようなこの熱だけが、\nオリヴィちゃんがまだ動こうとしていることを――！？
2463 = "——Dù có lặp lại bao nhiêu thao tác đi chăng nữa,\nbé Olivy vẫn không hề nhúc nhích dù chỉ một chút."
# 【ひよこ】
# display as 不死鳥
# JP: 「いかがしました？　ハチロク氏」
1805 = "Chỉ có hơi nóng như thiêu như đốt này,\nchứng tỏ bé Olivy vẫn đang cố gắng hoạt động——!?"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんの――体が――\n熱が、下がりはじめて――」
1943 = "「Sao rồi? Cô Hachiroku」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ふむ」
1898 = "「Cơ thể——của bé Olivy——\nđang bắt đầu hạ nhiệt rồi ạ——」"
# 【ハチロク】
# display as 八六
# JP: 「このままでは！　このままいてはオリヴィちゃんが！」
2191 = "「Hừm」"
# 【ひよこ】
# display as 不死鳥
# JP: 「落ち着きなさい。ハチロク氏しか、\nオリヴィ氏を助けられる者はいないのですから」
1797 = "「Cứ thế này thì! Cứ thế này thì bé Olivy sẽ!」"
# 【ハチロク】
# display as 八六
# JP: 「あっ！」
1870 = "「Bình tĩnh lại đi. Vì ngoài cô Hachiroku ra,\nkhông còn ai có thể cứu được cô Olivy lúc này đâu」"
# monologue
# JP: 自分は物だと、意識します。
2553 = "「A!」"
# monologue
# JP: 物なのですから、動揺しないと。\nそう考えて――こころを無理やり、整頓します。
2652 = "Tôi ý thức được rằng, bản thân mình là một đồ vật."
# 【ハチロク】
# display as 八六
# JP: 「大変失礼いたしました。\nもう大丈夫かと存じます」
1813 = "Vì là đồ vật, nên không được phép dao động.\nNghĩ vậy——tôi gắng gượng ép tâm trí mình phải bình tĩnh lại."
# 【ひよこ】
# display as 不死鳥
# JP: 「ふむ。オリヴィ氏の再起動を妨げている原因なら、\n消去法ではありますが、恐らく特定できました」
1896 = "「Em vô cùng xin lỗi.\nGiờ thì em ổn rồi ạ」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、それへの対処方法を――\nどうぞ、一刻も早くお教えください」
2206 = "「Hừm. Nếu là nguyên nhân cản trở việc khởi động lại của cô Olivy,\ndù dùng phương pháp loại trừ, nhưng có lẽ tôi đã xác định được rồi」"
# 【ひよこ】
# display as 不死鳥
# JP: 「オリヴィ氏の再起動を妨げているのは、\n『即時機能停止防止用の痛み』への、恐れかと」
1941 = "「Nếu vậy, cách xử lý là——\nXin hãy chỉ cho em càng sớm càng tốt ạ」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1870 = "「啊！」" 
# monologue
# JP: あの痛み。あの猛然たる痛みは、必要不可欠な安全装置。\n突然の機能停止を防止するための最終警告。
2752 = "「Thứ cản trở cô Olivy khởi động lại,\ncó lẽ là nỗi sợ hãi đối với 『cơn đau dùng để ngăn chặn việc ngừng hoạt động tức thời』」"
# monologue
# JP: 『これ以上稼働すると機能停止する』\n『速やかに非常停止し乗務を外れろ』と、命令してくる。
2686 = "Cơn đau đó. Cơn đau dữ dội đó, là một thiết bị an toàn không thể thiếu.\nLà lời cảnh báo cuối cùng để ngăn chặn việc đột ngột ngừng hoạt động."
# 【ひよこ】
# display as 不死鳥
# JP: 「ハチロク氏がさきほど言った『為すべきこと』。\nそれが恐らくは、通常はありえぬ恒常的な痛みを招いた」
1768 = "Nó ra lệnh rằng 『Nếu tiếp tục hoạt động sẽ bị ngừng hoạt động』\n『Hãy dừng khẩn cấp ngay lập tức và rời khỏi vị trí làm việc』."
# monologue
# JP: でしたら、あの苦痛――あの絶え間ない苦しみは、\nオリヴィちゃんと宗方様との、絆の深さ。
2753 = "「『Việc cần phải làm』 mà cô Hachiroku vừa nhắc tới lúc nãy.\nCó lẽ chính điều đó đã gây ra một cơn đau liên tục không thể có trong tình trạng bình thường」"
# 【ひよこ】
# display as 不死鳥
# JP: 「命令を拒絶し続けることは苛烈な負荷・痛みとなります。\nそのため、オリヴィ氏は極限にまで消耗し――」
1728 = "Nếu vậy, nỗi đau đớn đó——sự thống khổ không ngừng nghỉ đó,\nchính là độ sâu đậm trong mối liên kết giữa bé Olivy và ngài Munakata."
# monologue
# JP: “任されたことを果たすまで”決して終わることのない、\n想いという名の――余りに痛みを伴う、鎖。
2660 = "「Việc liên tục cự tuyệt mệnh lệnh sẽ trở thành một gánh nặng và cơn đau vô cùng khắc nghiệt.\nVì thế, cô Olivy đã bị vắt kiệt sức lực đến mức giới hạn——」"
# 【ハチロク】
# display as 八六
# JP: 「ああ」
# 1866 = "「啊」" 
# 【ひよこ】
# display as 不死鳥
# JP: 「ハチロク氏？　どうしました？」
1804 = "「Cô Hachiroku? Có chuyện gì vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんは、さきほど許してくださったのです。\nわたくしに――“その痛み”さえ、\x%l共感;#00ffc040;共感%l;#;することを」
1938 = "「Cô Hachiroku? Sao vậy?」"
# 【ひよこ】
# display as 不死鳥
# JP: 「っ！！！」
2242 = "「!!!」"
# monologue
# JP: 機能停止を阻害する――\nそのための痛みは、いわば、一番深くの痛み。
2764 = "Cản trở việc ngừng hoạt động——\nCơn đau dành cho việc đó, có thể nói là, cơn đau sâu thẳm nhất."
# monologue
# JP: でしたら、そこへの\x%l共感;#00ffc040;共感%l;#;は――
2695 = "Nếu vậy, việc \\x%l共感;#00ffc040;cộng cảm%l;#; đến mức đó là——"
# 【ひよこ】
# display as 不死鳥
# JP: 「[タブレット・レベル,2]全開放……」
1436 = "「[タブレット・レベル,2]Mở khóa toàn bộ……」"
# 【ハチロク】
# display as 八六
# JP: 「ですので、わたくしっ！」
2041 = "「Vì thế, em sẽ!」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ハチロク氏！　やめなさい！　今はいけない！！\nその状態のオリヴィ氏と深く\x%l共感;#00ffc040;共感%l;#;するなどっ！」
1800 = "「Cô Hachiroku! Dừng lại đi! Bây giờ không được đâu!!\nLại còn \\x%l共感;#00ffc040;cộng cảm%l;#; sâu với cô Olivy trong tình trạng đó nữa chứ!」"
# monologue
# JP: ……なにをどう説得しようとも、\nオリヴィちゃんは、鎖を離しはしないでしょう。
1428 = "……Dù có thuyết phục thế nào đi chăng nữa,\nchắc chắn bé Olivy cũng sẽ không chịu buông sợi dây xích đó ra đâu."
# monologue
# JP: でしたら、わたくしに出来ることなど――\nただひとつしかありません。
2600 = "Nếu vậy, việc mà tôi có thể làm——\nchỉ có duy nhất một cách này thôi."
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん。いま、まいります」
1947 = "「Olivy. Chị đến đây」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ハチロク氏！！！」
1795 = "「Cô Hachiroku!!!」"
# 【ハチロク】
# display as 八六
# JP: 「～～～っ！！！！」
2256 = "「~~~!!!!」"
# monologue
# JP: 迷わず、深くへ繋がります。
2566 = "Không chút do dự, tôi kết nối sâu vào trong."
# monologue
# JP: 普段であれば決して踏み込むことのない、\nオリヴィちゃんの、\x%l共感;#00ffc040;共感%l;#;の一番底の部分へ――っ！！？
2585 = "Tiến vào nơi sâu thẳm nhất trong \\x%l共感;#00ffc040;cộng cảm%l;#; của bé Olivy,\nnơi mà bình thường tuyệt đối không bao giờ bước vào——!!?"
# 【ハチロク】
# display as 八六
# JP: 「あっ――がっ――くっ――あぐ――ふっ――ぐっ！」
1857 = "「A——ga——ư——a ư——phu——gư!」"
# monologue
# JP: 痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛\n痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛
2659 = "Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau\nĐau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau Đau"
# 【ハチロク】
# display as 八六
# JP: 「はっ――あっ――ぎっ――くあっ――がっ！！」
2166 = "「Ha——a——gi——kua——ga!!」"
# monologue
# JP: わたくしの一番奥底に、痛みが刺さり増殖し、\n爆発的にふくらみながら、ただひとつを命令してきます。
2657 = "Cơn đau đâm xuyên và nhân lên ở tận cùng đáy lòng tôi,\nvừa bùng nổ phình to, vừa ra lệnh duy nhất một điều."
# monologue
# JP: 言語を越えて、\x%lタブレット;#00ffc040;タブレット%l;#;の奥に直接、\n『止まれ』『安全を確保せよ』と、響いてきます。
2748 = "Vượt qua cả ngôn từ, vang vọng trực tiếp vào sâu bên trong \\x%lタブレット;#00ffc040;Tablet%l;#;,\n『Dừng lại』 『Hãy đảm bảo an toàn』."
# 【ハチロク】
# display as 八六
# JP: 「はっ――っっ――ひぐっ――ふっ――ふううっ――！」
1845 = "「Ha————higu——fu——fuuu——!」"
# monologue
# JP: わたくしの奥で、わたくし自身を保護するものが、\nひっきりなしに、\x%l共感;#00ffc040;共感%l;#;を遮断するよう求めてきます。
2573 = "Sâu bên trong tôi, thứ bảo vệ chính bản thân tôi,\nkhông ngừng yêu cầu ngắt kết nối \\x%l共感;#00ffc040;cộng cảm%l;#;."
# 【ハチロク】
# display as 八六
# JP: 「オリ、ヴィ、ちゃ、ん――オリヴィ、ちゃん。\n――くっ――あ――も、う、朝――です、よ」
1937 = "「Oli, vy——Oli, vy.\n——Ư——a——trời, sáng——rồi, đó」"
# monologue
# JP: けれど――けれどもわかります。\nこのつながりを離したら、怖くて、二度とは戻れません。
2465 = "Nhưng——nhưng tôi hiểu rõ.\nNếu buông tay khỏi kết nối này, tôi sẽ sợ hãi, và không bao giờ có thể quay lại được nữa."
# 【ハチロク】
# display as 八六
# JP: 「起っきて――くだっ――さ、い――オリヴィ、ちゃん。\n双鉄さま、が――真闇、様、が――日々、姫が、待って」
2171 = "「Dậy——đi——nào——Oli, vy.\nNgài Soutetsu——chị Mayami——Hibiki, đang đợi đó」"
# monologue
# JP: だから必死にイメエジします。心の中に描き出します。\nいつもの朝を。いつものおうちを。
2587 = "Vì thế, tôi tuyệt vọng tưởng tượng. Vẽ ra trong tâm trí.\nBuổi sáng thường ngày. Ngôi nhà thường ngày."
# monologue
# JP: ――わたくしたちの、右田家を。
1394 = "——Nhà Migita, của chúng ta."
# 【ハチロク】
# display as 八六
# JP: 「日々、姫は、もう――先に、下に、おりて、しま、って。\n真闇、様は――すっかり――朝ごはん、整えっ、て――」
2063 = "「Hibi, ki, đã——xuống nhà, trước, mất, rồi.\nChị Mayami——đã chuẩn bị, xong xuôi——bữa sáng, rồi——」"
# monologue
# JP: 痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛\n痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛
# 2659 = "痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛" 
# 【ハチロク】
# display as 八六
# JP: 「あああああっ！！！」
1869 = "「Aaaaa!!!」"
# monologue
# JP: 集中が、イメエジが、すぐズタズタに切り裂かれます。\nそれでも、決して――痛みを、決して拒みません。
2575 = "Sự tập trung, hình ảnh tưởng tượng, ngay lập tức bị xé toạc thành từng mảnh.\nDù vậy, tôi tuyệt đối——tuyệt đối không cự tuyệt cơn đau này."
# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;、し――受け入れることで、分け合う、ことで\n少しでも、オリヴィちゃんの負荷を軽減できるならっ！
2716 = "\\x%l共感;#00ffc040;Cộng cảm%l;#;, và——bằng cách chấp nhận, bằng cách chia sẻ\nDù chỉ một chút thôi, nếu có thể giảm bớt gánh nặng cho bé Olivy!"
# 【ハチロク】
# display as 八六
# JP: 「双鉄、さま――も――オリヴィ、ちゃんを――\n待って、いま、す、よ――」
2232 = "「Ngài, Soutetsu——cũng——đang đợi——\nOli, vy——đó——」"
# monologue
# JP: ちくりと、胸が痛みます。\nオリヴィちゃんのものではなくて、わたくし自身の。
2677 = "Ngực tôi nhói đau.\nKhông phải của bé Olivy, mà là của chính bản thân tôi."
# monologue
# JP: けれど、取り繕う余裕などっ――\nこのささやかな嫉妬ごと――オリヴィちゃんに、日常を！
2472 = "Nhưng, làm gì có thời gian mà che giấu chứ——\nCả sự ghen tị nhỏ nhoi này——hãy mang lại cuộc sống thường ngày cho bé Olivy!"
# 【ハチロク】
# display as 八六
# JP: 「双、鉄――さま、はっ――どこか、楽しげな、\nお顔を、され、てっ――最上等、の、石炭、を――」
2230 = "「Ngài, Sou, tetsu——sẽ——với vẻ mặt, vui vẻ,\nđem đến——loại than đá, hảo hạng nhất——」"
# monologue
# JP: アイス、ピック、を、イメエジ、しま、す――\n細かく砕かれた、あの、石炭――
2561 = "Tôi, tưởng tượng, ra chiếc dùi, đục đá——\nLoại than đá, được đập nhỏ, đó——"
# monologue
# JP: わたくし、いつでも、羨ましく、てっ！！！
2560 = "Chị, lúc nào cũng, ghen tị, với em, đó!!!"
# monologue
# JP: （ガッ！　ガッ！！）
2797 = "（Phập! Phập!!）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「んあっ！！！」
1899 = "「Ưm á!!!」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！！？　――ああっ！？」
1945 = "「Olivy!!? ——A á!?」"
# monologue
# JP: 伝わってきます。流れてきます。オリヴィちゃんが。\nわたくしの全ても、オリヴィちゃんに。
2505 = "Cảm nhận được. Đang tuôn trào. Bé Olivy.\nTất cả của tôi, cũng đang truyền đến bé Olivy."
# monologue
# JP: なんと、綺麗な想いでしょうか。\n宗方様への、オリヴィちゃんの、純粋な――
2747 = "Thật là một tâm niệm đẹp đẽ làm sao.\nSự thuần khiết của bé Olivy dành cho ngài Munakata——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ？　あ――ハチ、ロク」
1883 = "「A? A——Hachi, roku」"
# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしです。オリヴィちゃん」
2117 = "「Vâng. Là em đây. Olivy」"
# monologue
# JP: 言葉とともに、オリヴィちゃんはオリヴィちゃんに、\nわたくしはわたくしにかえります。
2728 = "Cùng với lời nói, bé Olivy trở lại là bé Olivy,\nvà tôi trở lại là chính tôi."
# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;をつないだままなのに、苦痛が綺麗に消えています。魔法のように――ああいえ、そうではございません。
2769 = "Dù vẫn đang kết nối \\x%l共感;#00ffc040;cộng cảm%l;#;, nhưng cơn đau đã biến mất hoàn toàn. Cứ như có phép màu vậy——à không, không phải thế."
# monologue
# JP: （\x%l共感;#00ffc040;共感%l;#;を密にできる\x%lレイルロオド;#00ffc040;レイルロオド%l;#;がいるのなら。\nそのこと自体が、安全の担保となるから――）
2802 = "（Nếu có một \\x%lレイルロオド;#00ffc040;Railord%l;#; có thể \\x%l共感;#00ffc040;cộng cảm%l;#; mật thiết ở bên cạnh.\nChính điều đó đã là một sự đảm bảo an toàn rồi——）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチ……ロク――」
1794 = "「Hachi……roku——」"
# monologue
# JP: ぼーっとしているオリヴィちゃんの小さなお顔が、\n照れくさそうに、笑います。
2503 = "Khuôn mặt nhỏ nhắn của bé Olivy vẫn còn đang ngơ ngác,\nrồi mỉm cười ngại ngùng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ごめん――\nちょっと、ねぼーしちゃった」
1970 = "「Xin lỗi nha——\nChị, lỡ ngủ quên mất một chút」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！」
1944 = "「Olivy!」"
# monologue
# JP: 何を、申せばいいのでしょうか。\nああ、いえ、考えるまでもございません。
2751 = "Tôi nên nói gì đây.\nÀ không, chẳng cần phải suy nghĩ nữa."
# 【ハチロク】
# display as 八六
# JP: 「おはようございます。オリヴィちゃん」
2070 = "「Chào buổi sáng. Olivy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「おはよ――ええと――そうだ！？　状況！\n\x%l保線;#00ffc040;保線%l;#;の状況、どーなってるの？」
2068 = "「Chào buổi sáng——ờm——đúng rồi!? Tình hình!\nTình hình \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, sao rồi?」"
# 【ハチロク】
# display as 八六
# JP: 「いえ、まだ、隆起現場は――あっ」
2223 = "「À không, hiện trường sụt lún vẫn——A」"
# 【ひよこ】
# display as 不死鳥
# JP: 「～～～～っ！！」
1838 = "「~~~~!!」"
# 【ハチロク】
# display as 八六
# JP: 「わたくし、現場を見てまいります。\n\x%l共感;#00ffc040;共感%l;#;をつないだままで、オリヴィちゃんの目になります」
2016 = "「Em sẽ đi xem hiện trường.\nVẫn giữ kết nối \\x%l共感;#00ffc040;cộng cảm%l;#;, em sẽ làm đôi mắt cho Olivy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――オリヴィ、も――\nあれっ？」
1864 = "「A——Olivy, cũng——\nỦa?」"
# monologue
# JP: オリヴィちゃんは、手をあげようとし――\nけれど肩口までも運べず、そのままおろしてしまいます。
2506 = "Bé Olivy định giơ tay lên——\nNhưng không thể đưa lên tới vai, đành phải hạ xuống."
# monologue
# JP: 長く長く続いた熱が、そうありながらの無理な稼働が――\nオリヴィちゃんを、深く蝕んでしまっています。
2761 = "Cơn sốt kéo dài dằng dặc, cùng với việc cố gắng hoạt động quá sức——\nđã ăn mòn bé Olivy quá sâu."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「痛み、ない、のに――ちょっと……だるい、や――\nごめん、ハチロク？　お願い、できる？」
1746 = "「Rõ ràng, không thấy đau——nhưng hơi……uể oải, quá——\nXin lỗi nha, Hachiroku? Nhờ em, được không?」"
# 【ハチロク】
# display as 八六
# JP: 「お願いではなく、ご命令を。オリヴィちゃんは、\nこのチームの責任者で、指導者なのですから」
1743 = "「Đừng nhờ vả, xin hãy ra lệnh đi ạ. Vì Olivy,\nlà người phụ trách, là người chỉ đạo của đội này mà」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――うんっ！」
1855 = "「A——ừm!」"
# monologue
# JP: 双鉄さまのお言葉が、宗方様の託したものが――
2777 = "Lời nói của ngài Soutetsu, những gì ngài Munakata đã gửi gắm——"
# monologue
# JP: オリヴィちゃんを苦しめ続けた想いという名の鎖が今は、\nわたくしを、オリヴィちゃんを。わたくしたちを支えます。
2393 = "Sợi dây xích mang tên tâm niệm từng hành hạ bé Olivy, giờ đây,\nđang nâng đỡ tôi, nâng đỡ bé Olivy. Nâng đỡ cả hai chúng tôi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら、ね、ハチロク――オリヴィの、目に、なって？\n状況、全部しっかり見てきて、そうして、伝えて」
2194 = "「Vậy thì, Hachiroku——hãy làm, đôi mắt, của Olivy, nhé?\nHãy quan sát thật kỹ, toàn bộ tình hình, rồi, báo lại cho chị」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィ」
2020 = "「Đã rõ thưa ngài. \\x%lレイルロオド;#00ffc040;Railord%l;#; Olivy」"
# monologue
# JP: 指先を綺麗に整え、敬礼をして。\nそうしてオリヴィちゃんの手に、携帯電話を預けます。
2558 = "Tôi chỉnh lại tư thế ngón tay, giơ tay chào.\nSau đó, đặt chiếc điện thoại di động vào tay bé Olivy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「電話？」
2048 = "「Điện thoại?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。不死鳥博士とつながっております」
2081 = "「Vâng. Đang kết nối với Tiến sĩ Fushicho ạ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ、なんだ」
2192 = "「Vậy, sao」"
# monologue
# JP: 受話器を持ち直すオリヴィちゃんをそのままに、\nわたくしは、隆起現場へと向かいます。
2508 = "Để bé Olivy cầm lại ống nghe,\ntôi tiến về phía hiện trường sụt lún."
# monologue
# JP: オリヴィちゃんが任されたこと。\nどうしても、それを果たし切――っ！！？
2530 = "Nhiệm vụ mà bé Olivy được giao phó.\nDù thế nào đi nữa, cũng phải hoàn thành cho bằ——!!?"
# 【ハチロク】
# display as 八六
# JP: 「きゃっっ！！？」
1836 = "「Á!!?」"
# monologue
# JP: 風――暴風がいきなり上から――\nえっ！！？
2675 = "Gió——Một cơn cuồng phong bất ngờ ập xuống từ trên cao——\nHả!!?"
# 【ハチロク】
# display as 八六
# JP: 「ヘリコプタアっ！？」
2152 = "「Trực thăng!?」"
# monologue
# JP: 認識をした瞬間に、エアクラ自動車と同等の――\n感情のない、情報だけの\x%l共感;#00ffc040;共感%l;#;もどきが送られてきます。
2547 = "Ngay khoảnh khắc tôi nhận ra, một luồng \\x%l共感;#00ffc040;cộng cảm%l;#; giả lập\nchỉ có thông tin mà không có cảm xúc——giống hệt như ô tô Aircra——được gửi đến."
# 【ハチロク】
# display as 八六
# JP: 「隈元県の防災ヘリ――霧縞市へ向かう途中――\n線路復旧のため――ああ！　堰さまたちを連れて！！」
2227 = "「Trực thăng cứu nạn của tỉnh Kumamoto——Đang trên đường đến thành phố Kirishima——\nĐể khắc phục đường ray——A! Chở theo cả chú Seki nữa!!」"
# monologue
# JP: 求められている着地点は――保線基地裏。\nナビさんがいつも着陸するあの平坦地が好適でしょう。
2663 = "Điểm hạ cánh được yêu cầu là——Phía sau căn cứ bảo trì đường ray.\nBãi đất bằng phẳng mà Navi hay hạ cánh có lẽ là thích hợp nhất."
# 【ハチロク】
# display as 八六
# JP: 「誘導します、続いてください」
2009 = "「Tôi sẽ dẫn đường, hãy đi theo tôi」"
# monologue
# JP: ――こころが沸きます。沸きたちます。
1397 = "——Trái tim tôi sục sôi. Đang sục sôi."
# monologue
# JP: 堰様たちは必ずや、オリヴィちゃんの、\n素晴らしい手となりかわってくれることでしょうから。
2483 = "Chắc chắn chú Seki và mọi người sẽ thay thế bé Olivy,\ntrở thành những đôi bàn tay tuyệt vời nhất."
# monologue
# JP: （もう少し、もう少しですよ、オリヴィちゃん）
2799 = "(Chỉ một chút nữa thôi, một chút nữa thôi, Olivy)"
# monologue
# JP: レールは、必ず繋げましょう。\n大事な誰かを、望んだ場所へと運んでいくため――
2757 = "Nhất định chúng ta sẽ nối lại đường ray.\nĐể đưa một người quan trọng, đến nơi mà họ mong muốn——"
# monologue
# JP: わたくしたちは、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は。\nそうするために、きっと、造られてきたのですから。
2538 = "Bởi vì chúng tôi, những \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nChắc chắn được tạo ra, là vì mục đích đó."
# 【双鉄】
# display as 雙鐵
# JP: 「わかりました。\nそのように、どうかお願いいたします」
2023 = "「Anh hiểu rồi.\nCứ quyết định như vậy đi」"
# monologue
# JP: （ガチャっ）
2796 = "(Cạch)"
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、電話！　誰からだったと！？」
2216 = "「Anh hai, điện thoại! Ai gọi vậy!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、みかん鉄道の」
1880 = "「À, của Đường sắt Mikan」"
# monologue
# JP: (Trrrrr――)
32 = "(Trrrrr——)"
# monologue
# JP: 再び鳴った電話の音に、一瞬びくりとしてしまう。\nが、ポーレットはいつもの動きで受話器を手に取る。
2580 = "Tiếng điện thoại lại reo lên, khiến tôi giật mình trong chốc lát.\nNhưng Paulette vẫn với động tác thường ngày, nhấc ống nghe lên."
# 【ポーレット】
# display as 波萊特
# JP: 「はい。御一夜鉄道――あっ！　オリヴィちゃん！？\n双鉄くんね？　すぐかわり」
1997 = "「Vâng. Đường sắt Ohito xin nghe——Á! Olivy!?\nGặp anh Soutetsu hả? Chị chuyển máy ngay đây」"
# 【双鉄】
# display as 雙鐵
# JP: 「もしもし！　オリヴィ、僕だ、双鉄だ」
1890 = "「A lô! Olivy, anh đây, Soutetsu đây」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツ、そっち、どう？\n事故状況、ショーサイ、どのくらい、わかってる？」
2234 = "「Soutetsu, bên đó, sao rồi?\nTình hình tai nạn, chi tiết, đã nắm được, bao nhiêu, rồi?」"
# monologue
# JP: 第一声から、オリヴィだ。\n声こそ弱々しいけれど、いつもどおりのオリヴィだ。
2782 = "Ngay từ tiếng nói đầu tiên, đã là Olivy.\nDù giọng nói yếu ớt, nhưng vẫn là Olivy của ngày thường."
# monologue
# JP: 最重要を、最優先でひたすら果たそうと頑張っている。\nならばただ、僕も最善を尽くすことでこそ応えよう。
2510 = "Em ấy đang cố gắng hết sức để hoàn thành nhiệm vụ quan trọng nhất, ưu tiên nhất.\nNếu vậy, anh cũng phải đáp lại bằng cách dốc hết sức mình."
# 【双鉄】
# display as 雙鐵
# JP: 「発生したのは水蒸気爆発。発生地点は霧縞市[まきぞのちょう,2]巻園町\n[しゅくくぼた,3]祝久保田」
1911 = "「Sự cố xảy ra là nổ hơi nước. Địa điểm là Shukukubota,\nthị trấn Makizono, thành phố Kirishima」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「シュククボタ――\nって、ソーテツの、おじいちゃんの」
1965 = "「Shukukubota——\nĐó chẳng phải, nhà ông nội, của Soutetsu, sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「安心してくれ。人的被害はゼロだ」
2053 = "「Yên tâm đi. Không có thiệt hại về người」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「え？」
1847 = "「Hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィが重ねて来た調査が、警告になったのだ。\n『雪もあるし、念のため』と、地域で早期の自主避難を」
2209 = "「Những cuộc khảo sát liên tục của em, đã trở thành lời cảnh báo.\nKhu vực đó đã chủ động sơ tán sớm với lý do 『Trời có tuyết, cứ đề phòng cho chắc』」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――やった。よかったぁ」
1858 = "「A——Thành công rồi. Tốt quá」"
# monologue
# JP: ……オリヴィが築いた信頼関係。\nとても大きなその成果。
1424 = "……Mối quan hệ tin cậy mà Olivy đã dày công xây dựng.\nĐã mang lại một thành quả vô cùng to lớn."
# monologue
# JP: 褒めてやりたい、労いたい。\nが、僕はその任ではないし、今がその時でも無い。
2771 = "Tôi muốn khen ngợi, muốn an ủi em ấy.\nNhưng đó không phải là nhiệm vụ của tôi, và bây giờ cũng chưa phải lúc."
# 【双鉄】
# display as 雙鐵
# JP: 「そちらの現況についても教えてほしい」
1776 = "「Anh cũng muốn biết tình hình hiện tại bên em」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「陥没、してる。ケッコー、派手。\nけど、アンシンして？　始発まで、には、復旧、させる」
1917 = "「Sụt lún, rồi. Khá là, nghiêm trọng.\nNhưng, yên tâm đi? Trước chuyến tàu đầu tiên, sẽ, khắc phục, xong」"
# 【双鉄】
# display as 雙鐵
# JP: 「陥没？」
1918 = "「Sụt lún?」"
# monologue
# JP: 線路が、地面が、歪んでいると、\nオリヴィを助け起こした瞬間に見た光景を思い出す。
2564 = "Đường ray, mặt đất bị biến dạng,\nTôi nhớ lại cảnh tượng nhìn thấy khoảnh khắc đỡ Olivy dậy."
# monologue
# JP: 歪みではなく、陥没だったか――\n思った瞬間、頭の中にイメージが湧く。
2441 = "Không phải là biến dạng, mà là sụt lún sao——\nNgay khi nghĩ vậy, một hình ảnh hiện lên trong đầu tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、地中で大きな風船が膨れていたようなものか」
1982 = "「Ra vậy, giống như có một quả bóng bay khổng lồ phình to dưới lòng đất à」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ、だよ。――さす、が」
2115 = "「Đúng, vậy đó. ——Quả, nhiên」"
# 【稀咲】
# display as 稀咲
# JP: 「風船？」
2107 = "「Bóng bay?」"
# monologue
# JP: 聡明極まる稀咲がけれど、怪訝そうな表情を浮かべている。
2700 = "Dù vô cùng thông minh, nhưng Kisaki lại đang lộ vẻ mặt khó hiểu."
# monologue
# JP: ならば、急ぐ気持ちを抑え、\nここは説明した方が、結局のところ早道だろう。
2602 = "Nếu vậy, đành kìm nén sự nóng vội,\ngiải thích ở đây có lẽ lại là con đường ngắn nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「マグマが岩盤越しに地下水を熱して、蒸気に変える。\n膨れ上がった体積が、地中から地面を丸ごと持ち上げる」
1976 = "「Magma làm nóng nước ngầm qua lớp đá nền, biến thành hơi nước.\nThể tích phình to sẽ đẩy toàn bộ mặt đất từ dưới lên」"
# 【凪】
# display as 凪
# JP: 「ばってん、ボーリング調査したとでしょお？\nそしたら、そんとき蒸気ばブシューってふきださんと？」
1764 = "「Nhưng mà, chúng ta đã khoan khảo sát rồi mà?\nLúc đó có thấy hơi nước phụt ra đâu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ボーリングできるような浅い地点ではなかったのだ。\n蒸気溜りが発生し、地表をまるごと持ち上げたのは」
2136 = "「Nó không nằm ở độ sâu nông đến mức có thể khoan tới được.\nViệc hình thành túi hơi nước, và đẩy toàn bộ bề mặt lên là」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――」
1851 = "「A——」"
# monologue
# JP: 日々姫がささっと、スケッチブックに図を描いていく。
2613 = "Hibiki nhanh chóng vẽ một sơ đồ lên cuốn sổ phác thảo."
# 【日々姫】
# display as 日日姬
# JP: 「地中のすごく深いところにおっきかおっきか風船ばある。\nアホ程おっきかけん、持ち上がる部分はちいちゃくなる」
1977 = "「Dưới lòng đất rất sâu có một quả bóng bay siêu to khổng lồ.\nVì nó to kinh khủng, nên phần bị đẩy lên sẽ nhỏ lại」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのイメージだと、僕も思う。で、何かの弾み――\n例えば、マグマと地下水の接触か何で、爆発が起きる」
1980 = "「Anh cũng nghĩ giống hình ảnh đó. Và rồi, do một tác động nào đó——\nVí dụ như sự tiếp xúc giữa magma và nước ngầm, sẽ gây ra vụ nổ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ。……その、バクハツが、岩盤とか、割って。\n割れた、とこから、蒸気、きっと、フキだした、の」
2114 = "「Đúng. ……Vụ nổ, đó, làm nứt, lớp đá nền.\nTừ chỗ, nứt, hơi nước, chắc chắn, đã phun ra」"
# 【れいな】
# display as 玲奈
# JP: 「それで蒸気が抜けて、風船がぺしゃーんてしちゃって、\nだから、もちあがってたとこがへこんだんですねぇ」
2163 = "「Sau đó hơi nước thoát ra, quả bóng bay xẹp lép,\nnên chỗ bị đẩy lên mới lún xuống nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。無論、現時点ではただの推論にすぎぬが、\nそう考えれば、筋道は立つ」
2079 = "「Đúng vậy. Tất nhiên, hiện tại đây chỉ là suy luận,\nnhưng nếu nghĩ theo hướng đó thì hoàn toàn hợp lý」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、しょ？　ゲンイン、はっきり、してるから――\n修復、ゼッタイ、間に合わせる、からっ！」
2075 = "「Đúng, không? Nguyên nhân, đã rõ ràng, rồi——\nNên việc khắc phục, tuyệt đối, sẽ kịp, mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ？」
1949 = "「Olivy?」"
# monologue
# JP: 苦しげなのに、噛み付いてくるようなオリヴィの声。\nあまりの気迫に、一瞬びくりとしてしまう。
2512 = "Giọng nói của Olivy dù đau đớn, nhưng lại như muốn cắn xé.\nKhí phách quá đỗi mạnh mẽ ấy khiến tôi giật mình trong chốc lát."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、列車――走らせ、なきゃ、ダメ。\nダイヤ、どおり、に――どうして、も」
2044 = "「Vì thế, chuyến tàu——phải, cho chạy, mới được.\nĐúng như, biểu đồ chạy tàu——dù thế, nào đi nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「今日、すぐにか？」
1760 = "「Ngay hôm nay sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「う、ん――じゃないと――フーヒョー、ヒガイ――！\nお客さん――せ、っかく――天空――路線、に――」
1892 = "「Ư, m——Nếu không——Tin đồn, thiệt hại——!\nHành khách——khó khăn lắm——mới đến, tuyến đường——bầu trời——」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2241 = "「!」"
# monologue
# JP: ――悲鳴のようにも聞こえる声。\n経験が、絞り出させたものだと感じさせる声。
1393 = "——Giọng nói nghe như một tiếng thét.\nMột giọng nói khiến người ta cảm nhận được rằng, đó là thứ được vắt ra từ kinh nghiệm."
# monologue
# JP: しかし僕にも、僕が積んできた経験がある。\n“安全が最大の使命”を揺るがすことは、断じてできない。
2471 = "Nhưng tôi cũng có những kinh nghiệm mà bản thân đã tích lũy được.\nTuyệt đối không thể làm lung lay nguyên tắc \"An toàn là sứ mệnh lớn nhất\"."
# 【双鉄】
# display as 雙鐵
# JP: 「現時点では安全と断定できるだけの情報が無い。\nゆえ、ここで即答することはできない」
2135 = "「Hiện tại chưa có đủ thông tin để khẳng định là an toàn.\nVì thế, anh không thể trả lời ngay lúc này được」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「け、ど――」
1832 = "「Nhưn, g——」"
# monologue
# JP: ……“けど”の続きは、発せられぬまま飲み込まれる。\nオリヴィも\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
1425 = "……Phần tiếp theo của từ \"Nhưng\" đã bị nuốt ngược vào trong.\nOlivy cũng là một \\x%lレイルロオド;#00ffc040;Railord%l;#;."
# monologue
# JP: どれほど気持ちが強かろうとも、\n安全確保の重要性を見失うようなことはない。
2398 = "Dù mong muốn có mãnh liệt đến đâu,\ncũng không bao giờ đánh mất tầm quan trọng của việc đảm bảo an toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。\n災害原因の究明には、どのくらいの時間が」
2124 = "「Paulette.\nViệc điều tra nguyên nhân thảm họa sẽ mất khoảng bao lâu」"
# 【ポーレット】
# display as 波萊特
# JP: 「すぐ問い合わせます。待って下さい」
2037 = "「Em sẽ hỏi ngay đây. Anh đợi chút nhé」"
# 【双鉄】
# display as 雙鐵
# JP: 「この爆発に伴っての二次災害。あるいは、\n再度の爆発・噴火の恐れはどうかについても頼む」
2236 = "「Về thảm họa thứ cấp kèm theo vụ nổ này. Hoặc là,\nnguy cơ xảy ra nổ/phun trào lần nữa, nhờ em hỏi luôn nhé」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
2071 = "「Em hiểu rồi」"
# monologue
# JP: 一息置いて――\n受話器に、オリヴィに向き直る。
2570 = "Hít một hơi——\nTôi quay lại với ống nghe, với Olivy."
# 【双鉄】
# display as 雙鐵
# JP: 「この判断には、どうしても時間がかかってしまう。\n安全――ひいては人命に関わることゆえ、理解してくれ」
1732 = "「Việc đưa ra quyết định này, dù thế nào cũng sẽ mất thời gian.\nVì nó liên quan đến an toàn——hơn nữa là tính mạng con người, mong em hiểu cho」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん……」
1893 = "「Ưm……」"
# monologue
# JP: ほんの、一拍。\n声が途切れた隙間に、色濃く、にじみ出てくる。
2507 = "Chỉ một nhịp.\nTrong khoảng trống khi giọng nói ngắt quãng, sự mệt mỏi đậm đặc rỉ ra."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「（はあっ……はあっ……）」
2245 = "「(Hộc……hộc……)」"
# monologue
# JP: 深い。深い。深い。疲労。\n――オリヴィは、どうしようもなく消耗している。
2504 = "Sự mệt mỏi. Sâu thẳm. Sâu thẳm. Sâu thẳm.\n——Olivy đã kiệt sức đến mức không thể cứu vãn."
# 【双鉄】
# display as 雙鐵
# JP: 「こちらの判断を待たず、陥没に対しての応急処置、\n可能であれば、復旧作業も、速やかに進めてもらいたい」
1909 = "「Không cần đợi quyết định bên này, hãy sơ cứu chỗ sụt lún,\nnếu có thể, anh muốn em tiến hành công tác khắc phục càng sớm càng tốt」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。それは、もう、とっくに、着手、してる。\nハチロクが、目に、セキ、たち、手に、なって、くれて」
1901 = "「Ưm. Chuyện đó, đã, bắt tay vào làm, từ lâu, rồi.\nHachiroku, đã trở thành, đôi mắt, chú Seki, mọi người, đã trở thành, đôi tay, cho em」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1866 = "「啊」" 
# monologue
# JP: なるほど、\x%l共感;#00ffc040;共感%l;#;を密にして、か。
2442 = "Ra vậy, kết nối \\x%l共感;#00ffc040;cộng cảm%l;#; mật thiết sao."
# monologue
# JP: それであれば、オリヴィは安静にしたままで、\n現場の指揮を取り続けることができる。
2756 = "Nếu vậy, Olivy có thể vừa nằm nghỉ ngơi,\nvừa tiếp tục chỉ huy hiện trường."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「陥没……ソウテイ、範囲。内……だよ？　だから、\nいまの、機材と――設備で――対応、完全に、でき、る」
1914 = "「Sụt lún……Nằm trong, phạm vi. Dự tính……đó? Nên,\nvới máy móc, và——thiết bị, hiện tại——Hoàn toàn, có thể, đối phó, được」"
# monologue
# JP: そのために増設をした保線基地。\n早期発見、早期対応。
2540 = "Căn cứ bảo trì đường ray được mở rộng cũng là vì mục đích đó.\nPhát hiện sớm, xử lý sớm."
# monologue
# JP: 準備が適切に機能する――\nそれも全ては、オリヴィと宗方さんとが、与えてくれた。
2541 = "Sự chuẩn bị đang phát huy tác dụng một cách thích hợp——\nTất cả những điều đó, đều do Olivy và ngài Munakata mang lại."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「8620……だって――走れる、から――\nあと、四、時間――時間……くれれ、ば」
2247 = "「8620……cũng——có thể, chạy, được——\nNên, cho em, bốn, tiếng——tiếng nữa……thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「であるなら、ダイアどおりも可能となるな。\nところで、ハチロクは」
2201 = "「Nếu vậy, việc chạy đúng theo biểu đồ cũng có khả năng thực hiện được.\nNhân tiện, Hachiroku thì sao」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――すぐ、呼ぶ、ね？」
1861 = "「A——Em gọi, ngay, nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ、いや」
1876 = "「À, không cần đâu」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
2231 = "「Soutetsu」"
# monologue
# JP: ポーレットが軽く肩をつついで僕を呼び、\n手にしたメモを見せてくる。
2637 = "Paulette khẽ huých vai gọi tôi,\nrồi cho tôi xem tờ giấy ghi chú trên tay."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1815 = "「Ra vậy」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま、おまたせいたしました」
2233 = "「Ngài Soutetsu, đã để ngài phải đợi lâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ハチロク」
1442 = "「——Hachiroku」"
# monologue
# JP: 夫婦ゆえ、\n平静を装っているその声からでも、はっきり感じる。
2481 = "Vì là vợ chồng,\nnên dù qua giọng nói đang cố tỏ ra bình tĩnh, tôi vẫn cảm nhận được rõ ràng."
# monologue
# JP: オリヴィが、どれほど厳しい状態か。\nハチロクがこの一時を、どれほど大切に思っているかを。
2502 = "Tình trạng của Olivy nghiêm trọng đến mức nào.\nVà Hachiroku trân trọng khoảnh khắc này đến nhường nào."
# 【双鉄】
# display as 雙鐵
# JP: 「現時点では、まったく決定していないことだが、\nダイアどおりに列車を走らせる可能性もある」
2229 = "「Hiện tại, dù chưa có quyết định chính thức nào,\nnhưng vẫn có khả năng tàu sẽ chạy đúng theo biểu đồ」"
# monologue
# JP: けれど、僕には責任がある。\n安全に――最も安全な状態で、列車を運行させる責任が。
2474 = "Nhưng, tôi có trách nhiệm.\nTrách nhiệm vận hành tàu một cách an toàn——trong trạng thái an toàn nhất."
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました」
# 2071 = "「明白了」" 
# monologue
# JP: そして誰よりハチロクは、\n僕の気持ちを、わかってくれる。
2690 = "Và Hachiroku, hơn ai hết,\nhiểu được tâm trạng của tôi."
# 【ハチロク】
# display as 八六
# JP: 「その場合、わたくしはどのように乗務すれば？」
1784 = "「Trong trường hợp đó, em sẽ thực hiện nhiệm vụ như thế nào ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「お前が乗務に必要となった場合は、ナビを迎えにやる。\n三時間以内に、そちらの区切りをつけておけるか？」
1787 = "「Nếu cần em làm nhiệm vụ, anh sẽ cho Navi đến đón.\nTrong vòng ba tiếng nữa, em có thể thu xếp xong công việc bên đó không?」"
# 【ハチロク】
# display as 八六
# JP: 「必ず、左様に整えます。\nですので、どうぞ双鉄さまは――」
2027 = "「Chắc chắn, em sẽ sắp xếp ổn thỏa.\nVì thế, xin ngài Soutetsu hãy——」"
# monologue
# JP: ふっ、と、短く、漏れ聞こえる音。\n声のような、排気のような。
2679 = "Một âm thanh ngắn ngủi, khẽ lọt ra.\nGiống như tiếng nói, lại giống như tiếng thở hắt ra."
# monologue
# JP: ハチロクは――\n涙を流さず、泣いている。
2419 = "Hachiroku đang——\nkhóc, dù không rơi một giọt nước mắt."
# 【ハチロク】
# display as 八六
# JP: 「ですので、どうぞ双鉄さまは。\n双鉄さまの。最善のご判断と、ご指示とを」
2045 = "「Vì thế, xin ngài Soutetsu hãy.\nĐưa ra phán đoán và chỉ thị tốt nhất của ngài」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
2026 = "「Anh hiểu rồi」"
# monologue
# JP: （カチャっ）
# 2796 = "（喀嚓）" 
# monologue
# JP: 声を震わせぬようにして。言葉を飲み込み、受話器を置く。\nオリヴィの貴重な時間を、決して無駄にせぬように。
2550 = "Cố gắng để giọng nói không run rẩy. Nuốt những lời muốn nói vào trong, rồi đặt ống nghe xuống.\nTuyệt đối không được lãng phí khoảng thời gian quý giá của Olivy."
# monologue
# JP: 僕がハチロクを慰めるのは、ハチロクに慰めてもらうのは――全てが終わったあとでいい。
2684 = "Việc tôi an ủi Hachiroku, hay để Hachiroku an ủi tôi——đợi đến khi mọi chuyện kết thúc cũng được."
# 【双鉄】
# display as 雙鐵
# JP: 「僕が冷静さを欠いている。あるいは公私混同をしている\nと感じたのなら、すぐに指摘して欲しい」
1782 = "「Nếu mọi người cảm thấy anh đang thiếu bình tĩnh. Hoặc là đang lẫn lộn công tư\nthì hãy chỉ ra ngay nhé」"
# monologue
# JP: 今の自分が冷静である自信がない。\nが、これは理性的判断だと、内心で叫ぶ僕もいる。
2567 = "Tôi không tự tin rằng mình đang bình tĩnh.\nNhưng trong thâm tâm, cũng có một phần trong tôi đang gào thét rằng đây là phán đoán lý trí."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィはダイア通りの運行を強く主張している。\nその理由は、風評被害を最小限に留めるためだ」
1942 = "「Olivy đang cực lực yêu cầu vận hành đúng theo biểu đồ.\nLý do là để giảm thiểu tối đa thiệt hại do tin đồn」"
# 【ポーレット】
# display as 波萊特
# JP: 「確かに、せっかく定着し始めた天空路線が、\n『噴火で止まる路線』と思われるのは、致命的です」
2150 = "「Đúng là, tuyến đường bầu trời khó khăn lắm mới bắt đầu ổn định,\nnếu bị coi là 『tuyến đường phải dừng vì núi lửa phun trào』 thì sẽ chí mạng lắm」"
# 【稀咲】
# display as 稀咲
# JP: 「湯医線と比し、小畑線の保線費用は極めて高い。\n観光集客が望めなくなれば、赤字の垂れ流しの始まりだ」
1842 = "「So với tuyến Yui, chi phí bảo trì đường ray của tuyến Obata cực kỳ cao.\nNếu không thu hút được khách du lịch, thì đó sẽ là sự khởi đầu cho việc thâm hụt kéo dài」"
# 【真闇】
# display as 真闇
# JP: 「そぎゃんとなったら……また廃線？\nせっかく、復線して、繋げた線路ば」
2205 = "「Nếu chuyện đó xảy ra……lại phải bỏ tuyến sao?\nTuyến đường khó khăn lắm mới khôi phục, mới nối lại được mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは避けたい。ゆえ、ダイア通りに走らせたい。\nが、安全の確保こそが、常に僕らの第一の使命だ」
2011 = "「Anh muốn tránh điều đó. Nên mới muốn cho chạy đúng biểu đồ.\nNhưng, việc đảm bảo an toàn, luôn là sứ mệnh hàng đầu của chúng ta」"
# monologue
# JP: みなが頷く。頷いてくれる。
2491 = "Mọi người đều gật đầu. Đồng tình với tôi."
# 【日々姫】
# display as 日日姬
# JP: 「事故なんておこしちゃったら、\n線路、いくら繋いでも誰も乗らなくなっちゃうけん」
1726 = "「Nếu gây ra tai nạn,\nthì dù có nối bao nhiêu đường ray đi nữa cũng chẳng có ai đi đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1898 = "「嗯」" 
# monologue
# JP: 公共交通機関としての、あるいは観光手段としての、\n“鉄道の信頼回復”。
2542 = "Với tư cách là phương tiện giao thông công cộng, hay phương tiện du lịch,\n\"Khôi phục lòng tin vào đường sắt\"."
# monologue
# JP: それは未だに、非常に力弱い歩みを、\nとぼとぼと重ねているのにすぎない現状なのだから。
2698 = "Bởi vì hiện tại, chúng ta vẫn chỉ đang lê từng bước chân vô cùng yếu ớt,\nchậm chạp tiến lên mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「火山活動については、以下のような所見を頂いた。\nもちろん、速報であり、確定的なものではないが――」
2212 = "「Về hoạt động của núi lửa, anh đã nhận được những nhận định sau đây.\nTất nhiên, đây chỉ là tin nhanh, chưa phải là thông tin chính thức——」"
# monologue
# JP: ポーレットからもらったメモの要点を読み上げていく。
2581 = "Tôi đọc to những điểm chính trong tờ giấy ghi chú mà Paulette đưa cho."
# monologue
# JP: 読み終え、しばし垂れ込める、\nひどく慎重そうな沈黙――
2731 = "Đọc xong, một sự im lặng bao trùm trong chốc lát,\nmột sự im lặng vô cùng thận trọng——"
# 【真闇】
# display as 真闇
# JP: 「『水蒸気爆発が、再度、同じ現場で起きる可能性は、\n低いものと推認される』――と？」
2088 = "「『Khả năng xảy ra nổ hơi nước lần nữa tại cùng một địa điểm,\nđược suy đoán là rất thấp』——sao?」"
# monologue
# JP: 真闇姉がその沈黙を静かに破れば、\nすぐさま呼応するのは、凪だ。
2621 = "Khi chị Mayami nhẹ nhàng phá vỡ sự im lặng đó,\nngười lập tức hưởng ứng là Nagi."
# 【凪】
# display as 凪
# JP: 「そりゃそーばい！　だって穴ば開いたなら、\nそこに煙突できたよーなもんやけんね！！」
1974 = "「Đúng rồi còn gì! Vì nếu đã thủng một lỗ,\nthì chỗ đó chẳng khác nào cái ống khói rồi!!」"
# 【ふかみ】
# display as 深美
# JP: 「わ！　ほんとだ。凪ちゃん、すごい」
1844 = "「Oa! Đúng thật. Bé Nagi giỏi quá」"
# monologue
# JP: 凄まじきは凪の直観力だ。\n専門家からの説明と、内容面での差異は無い。
2430 = "Trực giác của Nagi thật đáng nể.\nHoàn toàn không có sự khác biệt về mặt nội dung so với lời giải thích từ các chuyên gia."
# 【双鉄】
# display as 雙鐵
# JP: 「くわえ、マグマの噴出が全くなかった――つまり、\n単純に水蒸気だけが熱せられた爆発だったともある」
1809 = "「Thêm vào đó, hoàn toàn không có sự phun trào magma——tức là,\ncũng có thể coi đây chỉ đơn thuần là vụ nổ do nước ngầm bị đun nóng」"
# 【稀咲】
# display as 稀咲
# JP: 「……『新炎岳火口付近での火山活動の活発化の兆候も\n収束を見せはじめている』のか。――なら、これは」
1459 = "「……『Dấu hiệu gia tăng hoạt động núi lửa gần miệng núi lửa Shin'endake\ncũng đang bắt đầu có dấu hiệu lắng xuống』 sao. ——Nếu vậy, điều này」"
# 【双鉄】
# display as 雙鐵
# JP: 「『総合的に、噴火や水蒸気爆発等が小畑線の安全を\nただちに脅かす可能性は、極めて低いと推測できる』」
1455 = "「『Đánh giá tổng thể, có thể suy đoán khả năng các vụ phun trào hay nổ hơi nước\nđe dọa trực tiếp đến sự an toàn của tuyến Obata là cực kỳ thấp』」"
# monologue
# JP: 専門家からの意見をそのまま伝えれば、\n徐々に――頷きたちが応え始める。
2592 = "Khi tôi truyền đạt lại nguyên văn ý kiến từ các chuyên gia,\ntừng người một——bắt đầu gật đầu đáp lại."
# monologue
# JP: 即座は、日々姫と凪とれいなと。続いて、ポーレット\n稀咲、ニイロク――　一番最後に、真闇姉と、赤井宮司も。
2414 = "Đầu tiên là Hibiki, Nagi và Reina. Tiếp theo là Paulette\nKisaki, Niiroku—— Cuối cùng là chị Mayami và cả Thầy cúng Akai."
# 【双鉄】
# display as 雙鐵
# JP: 「では、同爆発による陥没の影響について、\nこれは、オリヴィから復旧可能との報告を受けている」
1831 = "「Vậy thì, về ảnh hưởng của sụt lún do vụ nổ,\nanh đã nhận được báo cáo từ Olivy là có thể khắc phục được」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、それなんですけど――自主避難した方々への\n応援の物資、一両を荷物車にして運べないでしょうか？」
1882 = "「À, về chuyện đó——chúng ta có thể dùng một toa chở hàng\nđể vận chuyển hàng cứu trợ cho những người đã chủ động sơ tán được không?」"
# 【稀咲】
# display as 稀咲
# JP: 「応援の物資？」
2057 = "「Hàng cứu trợ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「水道の断線が発生して、山側は全面通行止め。\n井戸水も全く使えないそうなんです。だから――」
2148 = "「Nghe nói ống nước bị đứt, đường lên núi bị cấm qua lại hoàn toàn.\nNước giếng cũng không thể dùng được nữa. Vì thế——」"
# 【真闇】
# display as 真闇
# JP: 「水なら、右田一酒造元からも提供できるけん。\n必要あれば、いくらでも」
1835 = "「Nếu là nước, thì xưởng rượu Migita System cũng có thể cung cấp.\nCần bao nhiêu cũng có」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。\nそれでどうでしょう？　双鉄くん」
2172 = "「Cảm ơn chị rất nhiều.\nAnh thấy sao? Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、その分の重量増も含めて、\nこれも専門家の判断を待とう」
2203 = "「Vậy thì, bao gồm cả phần trọng lượng tăng thêm đó,\nchúng ta cũng hãy chờ phán đoán của chuyên gia xem sao」"
# 【ふかみ】
# display as 深美
# JP: 「専門家？　オリヴィちゃんよりくわしいひと、です？」
1969 = "「Chuyên gia? Có người rành hơn cả bé Olivy sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1870 = "「啊！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。すでにお願いしてある。が、到着にはまだ\n時間がかかるゆえ、両天秤で、僕らは準備をすすめる」
1902 = "「Ừm. Anh đã nhờ người đó rồi. Nhưng vẫn cần thêm thời gian để họ đến nơi,\nnên chúng ta cứ chuẩn bị cho cả hai phương án」"
# 【れいな】
# display as 玲奈
# JP: 「天空路線に列車を走らせるのと、\n運休させるのとの両方ですねぇ？」
2086 = "「Cả phương án cho tàu chạy trên tuyến đường bầu trời,\nvà phương án ngừng chạy đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だ。まず走らせる場合だが――陥没地点の復旧が\n応急的なものとなってしまう可能性もあるゆえ」
2084 = "「Đúng vậy. Đầu tiên là trong trường hợp cho tàu chạy——việc khắc phục điểm sụt lún\ncũng có khả năng chỉ là biện pháp sơ cứu tạm thời」"
# 【日々姫】
# display as 日日姬
# JP: 「[じくじゅう,1]軸重！！　8620よりも、ずうっと軸重の軽かけん！！\nⅨ号！　Ⅸ号機関車ば走らせればよかとよ！！！」
2178 = "「[じくじゅう,1]Tải trọng trục!! Nhẹ hơn 8620 rất nhiều!!\nĐầu máy số 9! Cứ cho đầu máy số 9 chạy là được mà!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
1850 = "「!」"
# 【凪】
# display as 凪
# JP: 「よか考えばい！　屋岳の峠ばⅨ号で越えれんよーなら、\n8620、\x%l補機;#00ffc040;補機%l;#;にすればよかばい！」
2187 = "「Ý kiến hay đó! Nếu đầu máy số 9 không qua được đèo Yadake,\nthì cứ dùng 8620 làm \\x%l補機;#00ffc040;đầu máy phụ%l;#; là xong!」"
# monologue
# JP: 日々姫の、凪の、叫びのような強い声。\n静かな声が――すぐさまそれに呼応していく。
2786 = "Giọng nói mạnh mẽ như hét lên của Hibiki và Nagi.\nNhững giọng nói điềm tĩnh——ngay lập tức hưởng ứng theo."
# 【真闇】
# display as 真闇
# JP: 「救援物資も運ぶ列車を、Ⅸ号が牽引するとやったら――\nそこにさらに、プラスアルファもできるんじゃなかと？」
2060 = "「Nếu để đầu máy số 9 kéo đoàn tàu chở cả hàng cứu trợ——\nThì chẳng phải chúng ta có thể làm thêm điều gì đó nữa sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「例えば、\x%l明智;#00ffc040;明智%l;#;から100年以上の長きを走り抜けた、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィの引退列車にする――とか？」
2100 = "「Ví dụ như, biến nó thành chuyến tàu giải nghệ của \\x%lレイルロオド;#00ffc040;Railord%l;#; Olivy,\nngười đã chạy suốt hơn 100 năm từ thời \\x%l明智;#00ffc040;Meiji%l;#;——chẳng hạn?」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　それいいです！　鉄道雑誌とかサイトとか、\nきっと、そっちをおっきなニュースにしてくれる、です」
1874 = "「A! Ý kiến hay đấy ạ! Các tạp chí và trang web đường sắt,\nchắc chắn sẽ đưa tin rầm rộ về chuyện đó cho xem」"
# 【ポーレット】
# display as 波萊特
# JP: 「その方向で、わたし、調整がんばります。\nううん――絶対にしてみせますっ！！」
2029 = "「Tôi sẽ cố gắng điều chỉnh theo hướng đó.\nKhông——nhất định tôi sẽ làm được!!」"
# 【れいな】
# display as 玲奈
# JP: 「湯医線はまかせてくださぁい。\nれいな、いくらでも代走しちゃいますよぉ」
2129 = "「Tuyến Yui cứ giao cho em.\nReina có thể chạy thay bao nhiêu chuyến cũng được ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「みんな――」
1921 = "「Mọi người——」"
# monologue
# JP: 一つになってる。\n気持ちが、一つに。
2590 = "Đã hòa làm một.\nTâm trí, đã hòa làm một."
# monologue
# JP: オリヴィのため――\nそのためだけに、みんながレールを、繋げてくれる。
2489 = "Vì Olivy——\nChỉ vì điều đó, mọi người đang cùng nhau nối lại đường ray."
# 【赤井】
# display as 赤井
# JP: 「しかし――天候だけはどうしようもない。\n雪が止み、日が照り、溶かしてくれれば良いのですが」
1749 = "「Nhưng——chỉ có thời tiết là không thể làm gì được.\nGiá như tuyết ngừng rơi, mặt trời chiếu rọi và làm tan băng tuyết thì tốt biết mấy」"
# 【凪】
# display as 凪
# JP: 「っ！！？」
1875 = "「Á!!?」"
# 【ニイロク】
# display as 二六
# JP: 「Ⅸ号。\x%l粘着力;#00ffc040;粘着力%l;#;に。すぐれない。この雪で。屋岳の坂。\n\x%l空転;#00ffc040;空転%l;#;して。滑落したら。\x%l補機;#00ffc040;補機%l;#;が8620でも。危ない」
1755 = "「Đầu máy số 9. \\x%l粘着力;#00ffc040;Lực bám đường%l;#;. Không tốt. Với tuyết thế này. Dốc Yadake.\nNếu bị \\x%l空転;#00ffc040;quay trơn%l;#;. Và trượt xuống. Dù \\x%l補機;#00ffc040;đầu máy phụ%l;#; là 8620. Cũng rất nguy hiểm」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2080 = "「Đúng vậy」"
# monologue
# JP: ――なんと、ありがたい指摘だろう。\n感情の渦に呑まれず、冷静に。
1399 = "——Một lời nhắc nhở thật đáng quý làm sao.\nKhông bị cuốn vào vòng xoáy cảm xúc, vô cùng điềm tĩnh."
# monologue
# JP: 憎まれ役になろうとも、安全のため――\nこれこそ、鉄道員の、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の理想形だ。が――
2520 = "Dù có bị ghét bỏ, nhưng vì sự an toàn——\nĐây chính là hình mẫu lý tưởng của một nhân viên đường sắt, của một \\x%lレイルロオド;#00ffc040;Railord%l;#;. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「そこは、大丈夫かと見込んでいます」
2035 = "「Về điểm đó, tôi cho rằng không có vấn đề gì」"
# 【ニイロク】
# display as 二六
# JP: 「え？」
# 1847 = "「哎？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「無論、設計した日々姫に確認をとらねば」
2141 = "「Tất nhiên, vẫn phải xác nhận lại với người thiết kế là Hibiki」"
# 【日々姫】
# display as 日日姬
# JP: 「いけると」
1811 = "「Làm được」"
# monologue
# JP: 日々姫が頷く。力強く。
2615 = "Hibiki gật đầu. Vô cùng mạnh mẽ."
# 【ニイロク】
# display as 二六
# JP: 「あ！」
# 1870 = "「啊！」" 
# 【赤井】
# display as 赤井
# JP: 「ああ！　その手がっ！！」
1871 = "「A! Thì ra là chiêu đó!!」"
# monologue
# JP: すぐさまポーレットが設計図面を引き出せば、\nニイロクもが喰いつくように演算を開始する。
2636 = "Paulette lập tức lấy bản vẽ thiết kế ra,\nNiiroku cũng lao vào bắt đầu tính toán như hổ đói."
# 【日々姫】
# display as 日日姬
# JP: 「やけん、いこ！　にぃに！！」
1833 = "「Vậy thì, đi thôi! Anh hai!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ああ。専門家の承認を得られるのなら、\nこの方向で確定しよう」
1447 = "「——Ừ. Nếu nhận được sự chấp thuận từ chuyên gia,\nchúng ta sẽ chốt theo hướng này」"
# monologue
# JP: そうなれば、何一つの障害も残りはしない。
2750 = "Nếu được như vậy, sẽ chẳng còn bất kỳ trở ngại nào nữa."
# monologue
# JP: 雪の屋岳の、30.3パーミルの勾配も、\n僕らなら、必ず越えて、たどりつける。
2670 = "Dù là con dốc 30.3 phần nghìn của đèo Yadake phủ đầy tuyết trắng,\nchúng ta, nhất định sẽ vượt qua và đến được đích."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィが、Ⅸ号と僕らを待っている」
1940 = "「Olivy, đang đợi đầu máy số 9 và chúng ta」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……ハチロク？\nハチロク――まだ、かなぁ？」
1468 = "「……Hachiroku?\nHachiroku——vẫn chưa, đến sao?」"
# 【ハチロク】
# display as 八六
# JP: 「もうすぐですよ、オリヴィちゃん。\nきっと――もうすぐ」
2239 = "「Sắp đến rồi ạ, Olivy.\nChắc chắn——sắp đến rồi」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あははっ――ハチロク、\nさっきから、『もうすぐ』ばっかり――」
1868 = "「Ahaha——Hachiroku à,\ntừ nãy đến giờ, em cứ nói 『Sắp đến rồi』 suốt thôi——」"
# 【ハチロク】
# display as 八六
# JP: 「けれど、きっともうすぐです。\n双鉄さまがなさることです。必ず、もうすぐ――――あ！」
2193 = "「Nhưng, chắc chắn là sắp đến rồi ạ.\nVì là ngài Soutetsu đích thân ra tay mà. Chắc chắn, sắp đến rồi――――A!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「どうしたの？　ハチロク」
1807 = "「Sao vậy? Hachiroku」"
# 【ハチロク】
# display as 八六
# JP: 「ナビからの\x%l共感;#00ffc040;共感%l;#;です！\nカメラ画像と複合データ、オリヴィちゃんにも――っ！」
2251 = "「Là \\x%l共感;#00ffc040;cộng cảm%l;#; từ Navi!\nHình ảnh từ camera và dữ liệu tổng hợp, em sẽ truyền cho cả Olivy——!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「う……ん。オリヴィ、もう受け取れないみたい。\nハチロク――だから、話して、きかせて？」
1895 = "「Ư……m. Có vẻ như Olivy, không thể nhận được nữa rồi.\nHachiroku——em kể, cho chị nghe, được không?」"
# 【ハチロク】
# display as 八六
# JP: 「はい……もうすぐです。ナビの\x%l共感;#00ffc040;共感%l;#;が届く距離――\nもうそこまで、Ⅸ号は、双鉄さまたちは来ておられます」
1952 = "「Vâng……sắp đến rồi ạ. Khoảng cách mà \\x%l共感;#00ffc040;cộng cảm%l;#; của Navi có thể vươn tới——\nĐầu máy số 9, ngài Soutetsu và mọi người đã đến ngay đó rồi ạ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「Ⅸ号？　なんでⅨ号がオコバ線、走ってるの？」
1757 = "「Đầu máy số 9? Tại sao đầu máy số 9 lại chạy trên tuyến Okoba?」"
# 【ハチロク】
# display as 八六
# JP: 「そこまでは……ああ、いえ！　カウキャッチャーです！\nⅨ号のカウキャッチャーがラッセルをして――」
2189 = "「Chuyện đó thì……À, không! Là bộ gạt vật cản!\nBộ gạt vật cản của đầu máy số 9 đang cào tuyết dọn đường——」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「カウキャッチャー……そっか。やっと、ついたんだ」
2214 = "「Bộ gạt vật cản……Ra vậy. Cuối cùng thì, cũng lắp vào rồi nhỉ」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。とても――美しうございます。\n美しく、力強く――そうありながら、かわいらしい」
2078 = "「Đúng vậy ạ. Vô cùng——đẹp đẽ.\nĐẹp đẽ, mạnh mẽ——nhưng vẫn, rất đáng yêu」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「さすが、ヒビキの仕事、だねー……、\nあー、こないかな。早く、オリヴィ、みて、みたい」
1738 = "「Quả không hổ là, tác phẩm của Hibiki, nhỉ……,\nA——, sao chưa đến nhỉ. Chị muốn, sớm được, nhìn thấy, quá」"
# 【ハチロク】
# display as 八六
# JP: 「まもなくですよ、8620も\x%l補機;#00ffc040;補機%l;#;でついておりますので」
2093 = "「Sắp đến rồi ạ, vì có cả 8620 làm \\x%l補機;#00ffc040;đầu máy phụ%l;#; đẩy phía sau nữa ạ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「8620もなの？　すごい、ごうか、だねー」
2248 = "「Cả 8620 nữa sao? Tuyệt quá, hoành tráng, quá nhỉ——」"
# 【ハチロク】
# display as 八六
# JP: 「\x%l補機;#00ffc040;補機%l;#;なしでは登れないのでしょう。今もかなりの苦戦を。\nプッシュ・プルで――\x%l客車;#00ffc040;客車%l;#;を挟んで、じり、じりと」
1906 = "「Chắc là không có \\x%l補機;#00ffc040;đầu máy phụ%l;#; thì không thể leo lên được ạ. Hiện tại cũng đang khá chật vật.\nĐang dùng phương pháp kéo đẩy——kẹp \\x%l客車;#00ffc040;toa hành khách%l;#; ở giữa, nhích từng, chút một」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ああ――だよね。あの坂で、雪、なんだもんねぇ。\n遅延、しちゃっても、しかた、ない、かぁ」
1860 = "「A——Đúng rồi nhỉ. Con dốc đó, lại còn, có tuyết, nữa chứ.\nDù có, bị trễ, thì cũng, hết cách, rồi nhỉ」"
# 【ハチロク】
# display as 八六
# JP: 「けれど、着実に登っております。Ⅸ号と、8620と――\nへばりつき這いずるように、じりじりとではありますが」
2228 = "「Nhưng, họ đang tiến lên một cách vững chắc. Cùng với đầu máy số 9, và 8620——\nDù chỉ nhích từng chút một, như đang bám sát mặt đất mà trườn lên」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「じりじりって――そんなに、ゆっくりなの？\nあ……間に貨物とか、挟んでる、とか？」
1730 = "「Nhích từng chút một——chậm, đến thế sao?\nA……Hay là ở giữa, có kẹp thêm, toa chở hàng, gì đó?」"
