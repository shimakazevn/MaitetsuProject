# display as 宗方
# JP: 「オウムか、お前は。\n俺がいるのがそんなに不思議か」
1772 = "「Cô là vẹt đấy à.\nThấy tôi ở đây có gì lạ lắm sao」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「フシ、ギ――っていうか、なんで？　ムナカタ、が――\nあ――ううん、そっか」
1735 = "「Không, lạ——ý tôi là, tại sao? Munakata, lại——\nA——À không, ra là vậy」"
# 【宗方】
# display as 宗方
# JP: 「ああ、そのとおりだ。御鉄さんから依頼を受けた。\n陥没の措置の監督と評価とをしてほしいと」
2116 = "「Ừ, đúng thế. Tôi nhận được yêu cầu từ Đường sắt Ohito.\nHọ muốn tôi giám sát và đánh giá các biện pháp khắc phục sự cố sụt lún」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっ、か……えへへっ、ソーテツ、よんでくれたんだ」
