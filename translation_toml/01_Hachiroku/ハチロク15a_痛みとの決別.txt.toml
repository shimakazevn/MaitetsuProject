# JP: 「ですね。\x%l編成;#00ffc040;編成%l;#;いつもと違います。馬車風客車が二両に、\n\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;も一両増結――えっ？」
1998 = "「Có vẻ vậy ạ. \\x%l編成;#00ffc040;Đoàn tàu%l;#; khác với thường ngày. Có hai toa hành khách kiểu xe ngựa,\nlại còn ghép thêm một \\x%lストーブ客車;#00ffc040;toa xe sưởi ấm%l;#;——Ủa?」"
