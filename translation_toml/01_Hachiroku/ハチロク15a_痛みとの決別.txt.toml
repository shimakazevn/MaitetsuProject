1998 = "「應該是。\\x%l編成;#00ffc040;編組%l;#;和平時不一樣，馬車風格的客運車廂兩節，加掛一節\\x%lストーブ客車;#00ffc040;暖爐客車%l;#;——咦？」" 

# 【オリヴィ】
