# 【ハチロク】
# display as 八六
# JP: 「お待ちしております、双鉄さま」
2028 = "「我會等您的，雙鐵少爺」" 

# monologue
# JP: あっさりと、双鉄さまは手をほどきます。\n寂しい気持ちを押しつぶします。
2773 = "雙鐵少爺一下子鬆開了懷抱。我努力壓制住不捨的心情。" 

# monologue
# JP: 一刻を大切にすることこそが、\nオリヴィちゃんを助ける唯一の路でしょうから。
2399 = "不能再磨蹭了，必須分秒必爭，才能拯救奧莉薇。" 

# 【ハチロク】
# display as 八六
# JP: 「どうぞご安全に。\nお気をつけていってらっしゃいませ」
2157 = "「祝您一路平安。路上小心」" 

# monologue
# JP: わたくしの手に、お仕事用の携帯電話を持たせてくださり、\n双鉄さまが、小走りに保線基地へと向かわれます。
2774 = "雙鐵少爺把工作用的手機塞到我手裡，就小跑著往巡線基地那邊趕了。" 

# monologue
