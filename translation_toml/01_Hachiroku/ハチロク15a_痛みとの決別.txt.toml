1739 = "「不死鳥博士！」" 

# monologue
# JP: 双鉄さまか、ポーレット様がご連絡くださったのでしょう。\nなんと心強い支援でしょうか――
2390 = "一定是雙鐵少爺或者波萊特大人跟她聯絡了吧。太好了，這種時候沒人比她更靠得住了——" 

# monologue
# JP: 湧き出る勇気に溺れないよう、\n落ち着くことを第一に、オリヴィちゃんの状態を伝えます。
2549 = "我努力不讓瞬間湧出的勇氣沖昏了頭，以冷靜傳達奧莉薇的現狀為第一要務。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「……稼動状態から一気に落ちてしまいましたか。\n大変に厳しい状態ですな」
1469 = "「……從啟動狀態一下子關閉了？那問題可就嚴重了」" 

# monologue
# JP: わたくしたちは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。鉄路の安全を担う物。\n故に、突然の機能停止など、本来起こり得ぬ構造です。
2539 = "我們\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;設計出來就是為了保證鐵路安全。所以原本是不該出現突然停止運作這樣的問題的。" 

# monologue
# JP: その“起こり得ぬ”が起きている。\nオリヴィちゃんの体はもはや、それほどまでに――
2692 = "而奧莉薇的狀況已經嚴峻到會發生這樣的問題了——" 

# 【ひよこ】
# display as 不死鳥
# JP: 「自己メンテナンス用の工具は、手元にありますかな？」
1774 = "「你現在手頭有自我維修用的工具嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「もちろん、常備してございます！」
2142 = "「當然，我一直帶在身上！」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「では、まずは[フォースリブート,4]強制再起動から試みますか」
2199 = "「那就先從強制重啟開始試試」" 

# monologue
# JP: ……ご指示通りに間違いなく。\n“まずは”。“それでは”。“でしたら”。“今度は”。
1430 = "……我聽從她的指示，先後試了好幾個方法。" 

# monologue
# JP: ――なにをどれだけかさねても\nオリヴィちゃんは、ピクリとも動いてくれませぬ。
1391 = "——可是不管怎麼做、嘗試了多少次，奧莉薇還是一動不動。" 

# monologue
# JP: 焼かれるようなこの熱だけが、\nオリヴィちゃんがまだ動こうとしていることを――！？
2463 = "只有這份熱量訴說著奧莉薇還在嘗試運轉——！？" 

# 【ひよこ】
# display as 不死鳥
# JP: 「いかがしました？　ハチロク氏」
1805 = "「八六女士，怎麼樣了？」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんの――体が――\n熱が、下がりはじめて――」
1943 = "「奧莉薇的身體——開始變涼了——」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ふむ」
1898 = "「嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「このままでは！　このままいてはオリヴィちゃんが！」
2191 = "「這樣下去，奧莉薇會——！」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「落ち着きなさい。ハチロク氏しか、\nオリヴィ氏を助けられる者はいないのですから」
1797 = "「八六女士，你冷靜一下，現在能救她的只有你了」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ！」
1870 = "「啊！」" 

# monologue
# JP: 自分は物だと、意識します。
2553 = "我努力讓自己意識到自己是一個物品。" 

# monologue
# JP: 物なのですから、動揺しないと。\nそう考えて――こころを無理やり、整頓します。
2652 = "物品是不會動搖的。一想到這裡，就能強行讓心靈重獲平靜。" 

# 【ハチロク】
# display as 八六
# JP: 「大変失礼いたしました。\nもう大丈夫かと存じます」
1813 = "「剛才真是失禮了。我已經冷靜下來了」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ふむ。オリヴィ氏の再起動を妨げている原因なら、\n消去法ではありますが、恐らく特定できました」
1896 = "「嗯。我恐怕已經用排除法確定奧莉薇女士為什麼不能重啟了」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、それへの対処方法を――\nどうぞ、一刻も早くお教えください」
2206 = "「那請你馬上告訴我該如何應對——」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「オリヴィ氏の再起動を妨げているのは、\n『即時機能停止防止用の痛み』への、恐れかと」
1941 = "「奧莉薇女士無法重啟恐怕是因為她懼怕“防止突然活動停止的疼痛”」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1870 = "「啊！」" 

# monologue
# JP: あの痛み。あの猛然たる痛みは、必要不可欠な安全装置。\n突然の機能停止を防止するための最終警告。
2752 = "這種突如其來的強烈痛苦，是鐵路人偶必不可少的安全裝置。是防止我們突然停止活動的最後一道警告。" 

# monologue
# JP: 『これ以上稼働すると機能停止する』\n『速やかに非常停止し乗務を外れろ』と、命令してくる。
2686 = "等於是命令我們“這樣繼續下去會停止活動”、“馬上緊急停車離開崗位”。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ハチロク氏がさきほど言った『為すべきこと』。\nそれが恐らくは、通常はありえぬ恒常的な痛みを招いた」
1768 = "「你剛才不是說她有要完成的事情嗎。恐怕就是那個導致了她非比尋常而又持續性的疼痛」" 

# monologue
# JP: でしたら、あの苦痛――あの絶え間ない苦しみは、\nオリヴィちゃんと宗方様との、絆の深さ。
2753 = "那也就是說，這連綿不絕的痛苦有多痛，奧莉薇和宗方先生之間的感情就有多麼深厚。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「命令を拒絶し続けることは苛烈な負荷・痛みとなります。\nそのため、オリヴィ氏は極限にまで消耗し――」
1728 = "「一直拒絕命令會導致她受到強烈的負荷和疼痛。所以才讓她的體力消耗到了極限——」" 

# monologue
# JP: “任されたことを果たすまで”決して終わることのない、\n想いという名の――余りに痛みを伴う、鎖。
2660 = "直到完成交給她的任務前，這份痛楚都不會結束。這份劇痛就是名為思念的枷鎖。" 

# 【ハチロク】
# display as 八六
# JP: 「ああ」
# 1866 = "「啊」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ハチロク氏？　どうしました？」
1804 = "「八六女士，怎麼了？」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんは、さきほど許してくださったのです。\nわたくしに――“その痛み”さえ、\x%l共感;#00ffc040;共感%l;#;することを」
1938 = "「奧莉薇剛才允許我和她\\x%l共感;#00ffc040;共鳴%l;#;，體會那份痛楚了」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「っ！！！」
2242 = "「！！！」" 

# monologue
# JP: 機能停止を阻害する――\nそのための痛みは、いわば、一番深くの痛み。
2764 = "防止停止活動的痛苦是最強烈的痛苦。" 

# monologue
# JP: でしたら、そこへの\x%l共感;#00ffc040;共感%l;#;は――
2695 = "而想要通過\\x%l共感;#00ffc040;共鳴%l;#;體會這個就只能——" 

# 【ひよこ】
# display as 不死鳥
# JP: 「[タブレット・レベル,2]全開放……」
1436 = "「[核心級,1]全面……」" 

# 【ハチロク】
# display as 八六
# JP: 「ですので、わたくしっ！」
2041 = "「所以我必須這麼做！」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ハチロク氏！　やめなさい！　今はいけない！！\nその状態のオリヴィ氏と深く\x%l共感;#00ffc040;共感%l;#;するなどっ！」
1800 = "「八六女士，快住手，現在不行！和這種狀態的奧莉薇女士全面\\x%l共感;#00ffc040;共鳴%l;#;太危險了！」" 

# monologue
# JP: ……なにをどう説得しようとも、\nオリヴィちゃんは、鎖を離しはしないでしょう。
1428 = "……恐怕不管我怎麼說，她都不會鬆開這個枷鎖吧。" 

# monologue
# JP: でしたら、わたくしに出来ることなど――\nただひとつしかありません。
2600 = "既然如此，我能做到的就只有這個。" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん。いま、まいります」
1947 = "「奧莉薇，我這就來」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ハチロク氏！！！」
1795 = "「八六女士！！！」" 

# 【ハチロク】
# display as 八六
# JP: 「～～～っ！！！！」
2256 = "「～～～！！！！」" 

# monologue
# JP: 迷わず、深くへ繋がります。
2566 = "我毫不猶豫地和她進行了深層次共鳴。" 

# monologue
# JP: 普段であれば決して踏み込むことのない、\nオリヴィちゃんの、\x%l共感;#00ffc040;共感%l;#;の一番底の部分へ――っ！！？
2585 = "我踏入了平時\\x%l共感;#00ffc040;共鳴%l;#;絕對不會進入的領域——奧莉薇意識的最深處——啊！！？" 

# 【ハチロク】
# display as 八六
# JP: 「あっ――がっ――くっ――あぐ――ふっ――ぐっ！」
1857 = "「啊——嘎——唔——啊嗚——嗚——咕！」" 

# monologue
# JP: 痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛\n痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛
2659 = "痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛" 

# 【ハチロク】
# display as 八六
# JP: 「はっ――あっ――ぎっ――くあっ――がっ！！」
2166 = "「蛤啊——啊——唔——咕——啊！！」" 

# monologue
# JP: わたくしの一番奥底に、痛みが刺さり増殖し、\n爆発的にふくらみながら、ただひとつを命令してきます。
2657 = "疼痛直接在我的身體最深處像爆炸一樣膨脹蔓延開來，在命令我。" 

# monologue
# JP: 言語を越えて、\x%lタブレット;#00ffc040;タブレット%l;#;の奥に直接、\n『止まれ』『安全を確保せよ』と、響いてきます。
2748 = "這是超越了語言的命令，直接通過我的\\x%lタブレット;#00ffc040;操作板%l;#;命令我“停下來”“確保安全”。" 

# 【ハチロク】
# display as 八六
# JP: 「はっ――っっ――ひぐっ――ふっ――ふううっ――！」
1845 = "「哈——唔——呼——呼啊――！」" 

# monologue
# JP: わたくしの奥で、わたくし自身を保護するものが、\nひっきりなしに、\x%l共感;#00ffc040;共感%l;#;を遮断するよう求めてきます。
2573 = "我的身體本能地為了保證自身安全，不斷地想要切斷\\x%l共感;#00ffc040;共鳴%l;#;。" 

# 【ハチロク】
# display as 八六
# JP: 「オリ、ヴィ、ちゃ、ん――オリヴィ、ちゃん。\n――くっ――あ――も、う、朝――です、よ」
1937 = "「奧莉薇——奧莉薇——嗚——啊——已經——早上了」" 

# monologue
# JP: けれど――けれどもわかります。\nこのつながりを離したら、怖くて、二度とは戻れません。
2465 = "可是——可是我很清楚。一旦我切斷共鳴，就會因為恐懼無法再次和她連接上了。" 

# 【ハチロク】
# display as 八六
# JP: 「起っきて――くだっ――さ、い――オリヴィ、ちゃん。\n双鉄さま、が――真闇、様、が――日々、姫が、待って」
2171 = "「請快點——起來吧——奧莉薇。雙鐵少爺——真闇小姐——日日姬——都在等你呢」" 

# monologue
# JP: だから必死にイメエジします。心の中に描き出します。\nいつもの朝を。いつものおうちを。
2587 = "所以我拚命在心中描繪、想像我們平時在家裡的早晨。" 

# monologue
# JP: ――わたくしたちの、右田家を。
1394 = "——想像我們家——右田家早上的情景。" 

# 【ハチロク】
# display as 八六
# JP: 「日々、姫は、もう――先に、下に、おりて、しま、って。\n真闇、様は――すっかり――朝ごはん、整えっ、て――」
2063 = "「日日姬——已經下樓了。真闇姐——都準備好——早餐了——」" 

# monologue
# JP: 痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛\n痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛
# 2659 = "痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛痛" 

# 【ハチロク】
# display as 八六
# JP: 「あああああっ！！！」
1869 = "「啊啊啊！！！」" 

# monologue
# JP: 集中が、イメエジが、すぐズタズタに切り裂かれます。\nそれでも、決して――痛みを、決して拒みません。
2575 = "我的集中力馬上就被疼痛扯得粉碎。但我依然沒有拒絕這份疼痛。" 

# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;、し――受け入れることで、分け合う、ことで\n少しでも、オリヴィちゃんの負荷を軽減できるならっ！
2716 = "要是能通過我的\\x%l共感;#00ffc040;共鳴%l;#;，接受和分擔這份痛楚，減少奧莉薇的負荷，我在所不惜！" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄、さま――も――オリヴィ、ちゃんを――\n待って、いま、す、よ――」
2232 = "「雙鐵少爺他——也在等你呢——」" 

# monologue
# JP: ちくりと、胸が痛みます。\nオリヴィちゃんのものではなくて、わたくし自身の。
2677 = "突然我感到一陣心痛。這不是奧莉薇的痛苦，而是我自己的。" 

# monologue
# JP: けれど、取り繕う余裕などっ――\nこのささやかな嫉妬ごと――オリヴィちゃんに、日常を！
2472 = "可是我沒有餘力去掩飾了——我要讓奧莉薇回歸日常，同時也取回我這份小小的嫉妒！" 

# 【ハチロク】
# display as 八六
# JP: 「双、鉄――さま、はっ――どこか、楽しげな、\nお顔を、され、てっ――最上等、の、石炭、を――」
2230 = "「雙鐵——少爺他——會露出有些高興的表情——拿來最高級的煤炭——」" 

# monologue
# JP: アイス、ピック、を、イメエジ、しま、す――\n細かく砕かれた、あの、石炭――
2561 = "我想像著碎冰錐的樣子，想像著被打碎的煤炭的樣子——" 

# monologue
# JP: わたくし、いつでも、羨ましく、てっ！！！
2560 = "我平時總是這麼羨慕著她！！！" 

# monologue
# JP: （ガッ！　ガッ！！）
2797 = "（喀！喀！！）" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「んあっ！！！」
1899 = "「嗯啊！！！」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！！？　――ああっ！？」
1945 = "「奧莉薇！！？啊！？」" 

# monologue
# JP: 伝わってきます。流れてきます。オリヴィちゃんが。\nわたくしの全ても、オリヴィちゃんに。
2505 = "奧莉薇的感情全部傳遞給了我，我的感情也全部傳遞給了她。" 

# monologue
# JP: なんと、綺麗な想いでしょうか。\n宗方様への、オリヴィちゃんの、純粋な――
2747 = "這就是奧莉薇對宗方先生的思念——竟然如此純粹。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ？　あ――ハチ、ロク」
1883 = "「啊？啊——八、六」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。わたくしです。オリヴィちゃん」
2117 = "「沒錯，是我。奧莉薇」" 

# monologue
# JP: 言葉とともに、オリヴィちゃんはオリヴィちゃんに、\nわたくしはわたくしにかえります。
2728 = "說完，奧莉薇和我混雜在一起的感覺消失了。" 

# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;をつないだままなのに、苦痛が綺麗に消えています。魔法のように――ああいえ、そうではございません。
2769 = "雖然我們依然維持著\\x%l共感;#00ffc040;共鳴%l;#;，可我卻一點也不覺得痛了。痛苦就像魔法一樣消失了——啊，不對。" 

# monologue
# JP: （\x%l共感;#00ffc040;共感%l;#;を密にできる\x%lレイルロオド;#00ffc040;レイルロオド%l;#;がいるのなら。\nそのこと自体が、安全の担保となるから――）
2802 = "（是因為身邊有可以密切\\x%l共感;#00ffc040;共鳴%l;#;的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;在，可以確保安全，自然就不會痛了——）" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチ……ロク――」
1794 = "「八……六——」" 

# monologue
# JP: ぼーっとしているオリヴィちゃんの小さなお顔が、\n照れくさそうに、笑います。
2503 = "奧莉薇愣了愣，然後她不好意思地笑了笑。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ごめん――\nちょっと、ねぼーしちゃった」
1970 = "「對不起——奧莉薇睡了個懶覺」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！」
1944 = "「奧莉薇！」" 

# monologue
# JP: 何を、申せばいいのでしょうか。\nああ、いえ、考えるまでもございません。
2751 = "這種時候我應該說些什麼呢？啊，不對，要說什麼根本不用考慮。" 

# 【ハチロク】
# display as 八六
# JP: 「おはようございます。オリヴィちゃん」
2070 = "「早安，奧莉薇」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「おはよ――ええと――そうだ！？　状況！\n\x%l保線;#00ffc040;保線%l;#;の状況、どーなってるの？」
2068 = "「早安——那個——對了！？\\x%l保線;#00ffc040;巡線%l;#;！\\x%l保線;#00ffc040;巡線%l;#;的狀況怎麼樣了？」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ、まだ、隆起現場は――あっ」
2223 = "「隆起現場還沒——啊」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「～～～～っ！！」
1838 = "「呃～～～～！！」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし、現場を見てまいります。\n\x%l共感;#00ffc040;共感%l;#;をつないだままで、オリヴィちゃんの目になります」
2016 = "「我去現場看看。我會保持\\x%l共感;#00ffc040;共鳴%l;#;，這樣奧莉薇也能看到」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――オリヴィ、も――\nあれっ？」
1864 = "「啊……“奧莉薇也能看到”？咦？」" 

# monologue
# JP: オリヴィちゃんは、手をあげようとし――\nけれど肩口までも運べず、そのままおろしてしまいます。
2506 = "奧莉薇試圖舉起手，可她卻連舉過肩膀都做不到，只能放下手。" 

# monologue
# JP: 長く長く続いた熱が、そうありながらの無理な稼働が――\nオリヴィちゃんを、深く蝕んでしまっています。
2761 = "長時間的高熱和強行運轉已經深深侵蝕了奧莉薇的身體。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「痛み、ない、のに――ちょっと……だるい、や――\nごめん、ハチロク？　お願い、できる？」
1746 = "「不痛——就是有點累——對不起，八六，能拜託你嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「お願いではなく、ご命令を。オリヴィちゃんは、\nこのチームの責任者で、指導者なのですから」
1743 = "「不用拜託我，請命令我吧。你才是這個隊伍的負責人和指導者嘛」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――うんっ！」
1855 = "「啊——嗯！」" 

# monologue
# JP: 双鉄さまのお言葉が、宗方様の託したものが――
2777 = "雙鐵少爺的話語、宗方先生託付給我們的思念——" 

# monologue
# JP: オリヴィちゃんを苦しめ続けた想いという名の鎖が今は、\nわたくしを、オリヴィちゃんを。わたくしたちを支えます。
2393 = "一直以來束縛著奧莉薇，讓她痛苦無比的枷鎖，如今成了我和奧莉薇的支柱。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら、ね、ハチロク――オリヴィの、目に、なって？\n状況、全部しっかり見てきて、そうして、伝えて」
2194 = "「那——八六，你來當奧莉薇的眼睛，好好去看看現場狀況，然後告訴奧莉薇」" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィ」
2020 = "「我明白了。\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;奧莉薇」" 

