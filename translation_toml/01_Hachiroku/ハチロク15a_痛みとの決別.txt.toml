# display as 宗方
# JP: 「”お前がいなかったことに”じゃない――\n“お前がいなかったのに”、だがな」
2001 = "「Không phải \"Bất ngờ vì cô không có ở đó\"——\nMà là \"Dù cô không có ở đó\", mọi thứ vẫn hoàn hảo」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「え？」
# 1847 = "「哎？」" 
# 【宗方】
# display as 宗方
