3004 = "「畢竟此事有可能關係到人命和地區安全，就不能勉強別人參與，以至於不情不願造成疏忽」" 

# 【凪】
# display as 凪
# JP: 「わかったと！\nなら、そこも含めてそのまま説明しとくばい！」
2746 = "「妥嘞！咱會把這些事都跟她掰扯清楚的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。それが一番間違いない」
2639 = "「嗯，這才是最正確的選擇」" 

