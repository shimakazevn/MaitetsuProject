[script]
# lines: 698 
# 【双鉄】
# display as 雙鐵
# JP: 「うぅ……今日は冷え込むな」
2549 = "「Ư……Hôm nay lạnh quá nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「山の方は雪になるかもしれないそうです。\n心配なことでございますね」
3058 = "「Nghe nói trên núi có thể có tuyết rơi đấy ạ. Thật đáng lo ngại nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、十一月末でもう雪か。\n[やたけ,1]屋岳へ上る最中に、降り初めがぶつからねばよいが」
2732 = "「Gì chứ, mới cuối tháng mười một mà đã có tuyết rồi sao. Chỉ mong là lúc đang lên Yatake, không gặp phải trận tuyết đầu mùa.」"
# 【ハチロク】
# display as 八六
# JP: 「――あら？　今なにか聞こえませんでしたか？」
1705 = "「——Ơ? Hình như em vừa nghe thấy tiếng gì đó?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　僕にはなにも」
2641 = "「Hửm? Tôi có nghe thấy gì đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしの気のせいでしょうか」
3066 = "「Chắc là em tưởng tượng rồi ạ.」"
# monologue
# JP: 小首をかしげるハチロクと並び居間へと入れば――
3849 = "Cùng Hachiroku đang nghiêng đầu bước vào phòng khách——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「んむっ！」
2599 = "「Ưm!」"
# monologue
# JP: オリヴィが、ちょうど体温計をくわえたところだ。
3600 = "Olivy vừa ngậm nhiệt kế vào miệng."
# 【双鉄】
# display as 雙鐵
# JP: 「おはよう、オリヴィ。体調はどうだ？」
2702 = "「Chào buổi sáng, Olivy. Tình hình sức khỏe sao rồi?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「むーっ」
2547 = "「Ư~」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、失礼。\n体温計をくわえていては、返事もできんな」
2651 = "「À, xin lỗi. Đang ngậm nhiệt kế thì làm sao mà trả lời được.」"
# monologue
# JP: 言えば、オリヴィはこっくり
3723 = "Nghe vậy, Olivy gật đầu cái rụp."
# 【ハチロク】
# display as 八六
# JP: 「ああ！　いけませんオリヴィちゃん！\n頭を動かしては体温が変わってしまうかもしれません！」
2565 = "「A! Không được đâu bé Olivy! Động đậy đầu có thể làm thay đổi nhiệt độ cơ thể đấy!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「んぐっ！」
# 2599 = "「嗯嗚！」" 
# monologue
# JP: ひどく慌てた――悲鳴のようなハチロクの声。\n途端、オリヴィがぴたりと固まる。
3579 = "Giọng Hachiroku vô cùng hoảng hốt——như một tiếng hét. Ngay lập tức, Olivy cứng đờ người lại."
# monologue
# JP: ……この２週間、オリヴィの体温は高止まりして、\n\x%l保線;#00ffc040;保線%l;#;にも出られぬ状況だ。
1685 = "……Hai tuần nay, nhiệt độ cơ thể Olivy vẫn luôn ở mức cao, đến mức không thể ra ngoài \\x%l保線;#00ffc040;bảo trì đường ray%l;#; được."
# monologue
# JP: （今の声掛けは迂闊だったな。オリヴィを刺激せぬよう、\nともかく静かに、焦らず過ごすのが一番だ。）
4128 = "（Lúc nãy tôi lỡ lời rồi. Để không kích động Olivy, tốt nhất là cứ giữ yên lặng, đừng nôn nóng.）"
# monologue
# JP: で、あるのなら、意識を他へと向けておこう。
3547 = "Vậy thì, hãy hướng sự chú ý sang chuyện khác."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。僕らも計っておこう」
2442 = "「Hachiroku. Chúng ta cũng đo thử đi.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、かしこまりました。双鉄さま」
2725 = "「Vâng, em rõ rồi ạ. Ngài Soutetsu.」"
# monologue
# JP: いつもの姿勢でハチロクの体温を計っていれば、\n僕らもまるで身動きできぬ。
3842 = "Đang đo nhiệt độ cho Hachiroku ở tư thế quen thuộc, nên chúng tôi cũng không thể nhúc nhích."
# monologue
# JP: 静かな時間がただただ流れ――
3768 = "Thời gian yên tĩnh cứ thế trôi qua——"
# monologue
# JP: （ピピピっ、ピピピっ）
4149 = "（Bíp bíp, bíp bíp）"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
2538 = "「Hửm.」"
# monologue
# JP: オリヴィの体温計が先に鳴る。
3922 = "Nhiệt kế của Olivy kêu trước."
# monologue
# JP: オリヴィはいつものごとく無造作に、\n体温計を口から抜いて――
3732 = "Olivy hững hờ như mọi khi, rút nhiệt kế ra khỏi miệng——"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2640 = "「Hửm?」"
# monologue
# JP: なんだ？　生唾を飲み込んだ音のような……
3857 = "Gì vậy? Giống như tiếng nuốt nước bọt……"
# monologue
# JP: が、ハチロクやオリヴィが食事以外で\n喉を鳴らすなど聞いたことも無いし――
3639 = "Nhưng, tôi chưa từng nghe thấy Hachiroku hay Olivy phát ra tiếng động từ cổ họng ngoài lúc ăn uống——"
# monologue
# JP: （いまのは、僕か？　\nオリヴィの体温を気にかけるあまり、無意識に――）
4154 = "（Lúc nãy là tôi sao? Vì quá lo lắng cho nhiệt độ của Olivy nên vô thức——）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あううっ！？　ひくすぎっ！？」
2566 = "「Auu!? Thấp quá!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「下がったのか？」
3248 = "「Giảm rồi sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えっ！？　ああ、あう――えと、あの――うん」
2536 = "「Hả!? A, ừm——ờm, thì——ừ.」"
# monologue
# JP: （ピピピっ、ピピピっ）
# 4149 = "（蜂鳴音）" 
# 【ハチロク】
# display as 八六
# JP: 「ほーへふはは」
3274 = "「Ho-he-fu-ha-ha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん」
2540 = "「A, ừ.」"
# monologue
# JP: いつもの手順で、ハチロクの口内温度を確かめる。
3864 = "Theo quy trình thường lệ, kiểm tra nhiệt độ trong miệng Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「38度2分か。気持ち低いが、非常に安定しているな」
3271 = "「38.2 độ sao. Hơi thấp một chút, nhưng rất ổn định.」"
# 【ハチロク】
# display as 八六
# JP: 「なによりです。\nそれでオリヴィちゃんは」
3196 = "「Thế thì tốt quá rồi.\nVậy bé Olivy thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、低すぎるといっていたようだが」
2647 = "「À, hình như cô ấy bảo là thấp quá thì phải.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――\nえと――うん」
2557 = "「A——\nỜm——ừ.」"
# monologue
# JP: オリヴィが差し出す体温計は――
3713 = "Nhiệt kế Olivy đưa ra là——"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと！？　36度7分か！\n無論、安定稼働圏内ではあるが……しかし」
3042 = "「Gì cơ!? 36.7 độ sao! Tất nhiên là vẫn trong phạm vi hoạt động ổn định…… nhưng mà.」"
# 【ハチロク】
# display as 八六
# JP: 「昨晩より、一気に五度近く下がっております」
3116 = "「So với đêm qua, đã giảm gần năm độ một lúc.」"
# monologue
# JP: ハチロクがすぐさまノートを開く。
3585 = "Hachiroku lập tức mở sổ tay ra."
# monologue
# JP: オリヴィの体温を記録している、\n折れ線グラフをじっと眺める。
3733 = "Chăm chú nhìn vào biểu đồ đường gấp khúc, ghi lại nhiệt độ cơ thể của Olivy."
# 【ハチロク】
# display as 八六
# JP: 「……今まで一度も無い低さです。従来の最低体温の\n39度6分と比しても、3度近くの落ち込みです」
1767 = "「……Đây là mức thấp chưa từng có. So với nhiệt độ thấp nhất trước đây là 39.6 độ, thì cũng đã giảm gần 3 độ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも！　カドーアンゼンケンなのはマチガイないし！\n今日オリヴィ、保線出て大丈夫でしょう？」
2345 = "「Nhưng mà! Vẫn trong phạm vi hoạt động an toàn mà! Hôm nay Olivy ra ngoài bảo trì đường ray chắc không sao đâu nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうなのだが――」
3092 = "「Thì đúng là vậy, nhưng mà——」"
# monologue
# JP: 熱が下がるとき、5度以上を一気にというのは……\n人間でも、40度以上の発熱であればあるにはあろうが――
4064 = "Khi hạ sốt, giảm một mạch hơn 5 độ thì…… Ngay cả con người, nếu sốt trên 40 độ thì cũng có thể xảy ra, nhưng——"
# monologue
# JP: しかし、それで……人間に換算すれば34～5度台にまで\n一気に落ち込んでしまうのは、逆に危ないような気もする。
3637 = "Nhưng, với mức đó…… nếu quy đổi sang con người thì giảm một mạch xuống còn 34-35 độ, ngược lại tôi cảm thấy có vẻ nguy hiểm."
# 【双鉄】
# display as 雙鐵
# JP: 「念のため、もう一日は様子見をして、\n登呂流湯さんに診てもらったほうが」
2396 = "「Để chắc chắn thì, nên theo dõi thêm một ngày nữa, rồi nhờ ông chủ nhà tắm Tororyu-yu khám cho thì hơn.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……オリヴィのジュミョー、熱高いときに動くと、\n負荷があがりすぎてケズレちゃうんでしょ？」
1757 = "「……Tuổi thọ của Olivy, nếu hoạt động lúc đang sốt cao, thì tải trọng sẽ tăng quá mức và bị giảm đi đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そう聞いたな」
2625 = "「Ừm. Tôi nghe nói vậy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だったら、\n低い分にはケズレないでしょ？　ジュミョー」
3230 = "「Nếu vậy thì, nhiệt độ thấp thì sẽ không bị giảm đúng không? Tuổi thọ ấy.」"
# 【ハチロク】
# display as 八六
# JP: 「理屈の上ではそうかもしれませんが」
2508 = "「Về mặt lý thuyết thì có thể là vậy, nhưng mà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それに！」
2455 = "「Hơn nữa!」"
# monologue
# JP: 珍しく強い口調で、\nオリヴィがハチロクの言葉を断ち切る。
4089 = "Bằng một giọng điệu mạnh mẽ hiếm thấy, Olivy cắt ngang lời Hachiroku."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「どれだけ診てもらったって、\nしてもらえることなんて、ナンニモ無いんだし」
2789 = "「Dù có khám bao nhiêu lần đi nữa, thì cũng chẳng làm được gì cả.」"
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「っ！」\n「あ」
2552 = "「!」\n「A」"
# monologue
# JP: ……確かに、それはそのとおりだ。\nオリヴィを蝕んでいるのは、人間でいえば老衰。
1682 = "……Đúng là, sự thật là vậy. Thứ đang bào mòn Olivy, nếu là con người thì chính là sự lão hóa."
# monologue
# JP: 余命をいかに延ばしていくかの方法さえも、\nいま出ている以外には無いとはっきり、聞かされている。
3778 = "Ngay cả cách để kéo dài phần đời còn lại, chúng tôi cũng đã được nghe rõ là không còn cách nào khác ngoài những gì hiện có."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だけじゃなくて――オリヴィがねてたあいだ、\nキキトリ調査、ぜんぜんできてないんでしょ？」
3053 = "「Không chỉ vậy đâu——Trong lúc Olivy ngủ, việc điều tra nghe ngóng, hoàn toàn không tiến triển gì đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それも……\n報告を受けている限りでは、その通りだ」
3138 = "「Chuyện đó thì…… Theo như báo cáo tôi nhận được thì đúng là vậy.」"
# monologue
# JP: 話し上手でひとなつっこいだけでなく、\nオリヴィは、実はかなりに聞き上手でもある。
3707 = "Không chỉ hoạt ngôn và thân thiện, Olivy thực ra còn rất giỏi lắng nghe."
# monologue
# JP: ゆえ、『いつものあの子は？』と門前払いされてしまうと\n――堰さんたちの報告は、苦笑交じりのものだった。
3884 = "Vì vậy, khi bị từ chối khéo bằng câu 『Cô bé hay đến đâu rồi?』 ——Báo cáo của ông Seki và mọi người xen lẫn những nụ cười khổ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そういうのってさ、一度とぎれちゃったら、\nフッカツがどんどんムツカシクなっちゃうでしょ？」
2521 = "「Mấy chuyện đó ấy mà, một khi đã bị gián đoạn, thì việc khôi phục lại sẽ ngày càng khó khăn đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、まぁ」
3009 = "「Chuyện đó thì, ừm.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから！　チョーシいいときいっとかないと！\nそしたら『最近ちょっとチョーシ悪くて』っていえるし」
2878 = "「Thế nên! Phải đi lúc đang khỏe chứ! Như vậy thì mới có thể nói là 『Dạo này cháu hơi mệt』 được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……事情を説明しておけば、\n堰さんたちが聞き取りを行いやすくもなる、か」
2942 = "「Ra là vậy…… Nếu giải thích rõ tình hình, thì ông Seki và mọi người cũng dễ bề nghe ngóng hơn, sao.」"
# monologue
# JP: 言いつつチラリ、ハチロクの顔を確かめてみる。\n困ったような、それでいて微笑ましそうな、微妙な表情。
3836 = "Vừa nói, tôi vừa liếc nhìn nét mặt của Hachiroku. Một biểu cảm tinh tế, có vẻ bối rối nhưng cũng có vẻ mỉm cười."
# monologue
# JP: やがてゆるゆる、静かな頷きが示される。
3511 = "Rồi từ từ, em ấy khẽ gật đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「では、くれぐれも無理のないよう行動してくれ。\n辛くなったらすぐ連絡を、ナビを迎えにいかせるゆえ」
3186 = "「Vậy thì, xin cô tuyệt đối đừng cố quá sức. Nếu thấy mệt thì liên lạc ngay, tôi sẽ bảo Navi đến đón.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムリなんてするわけないよー。\nオリヴィまだまだ、することたーくさんあるんだし！」
2816 = "「Không có chuyện cố quá sức đâu~. Olivy vẫn còn rấ~t nhiều việc phải làm mà!」"
# 【ハチロク】
# display as 八六
# JP: 「乗務が終わり次第で、\nわたくしたちも向かいますので、そのときにまた」
3044 = "「Ngay khi kết thúc công việc trên tàu, chúng tôi cũng sẽ đến đó, hẹn gặp lại lúc đó nhé.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった、まってる！\nもしも先に帰るよーなら連絡するね！」
2729 = "「Biết rồi, tôi sẽ đợi! Nếu về trước thì tôi sẽ liên lạc nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「了解した。現場までもナビに送らせよう」
2908 = "「Đã rõ. Tôi sẽ bảo Navi đưa cô đến tận hiện trường.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがと！　たすかる！！」
2658 = "「Cảm ơn nhé! Giúp được nhiều lắm!!」"
# monologue
# JP: ぱっと花咲く笑顔を浮かべ、オリヴィは――っ！？
3623 = "Nở nụ cười tươi như hoa, Olivy——!?"
# monologue
# JP: （ふらっ）
4142 = "（Lảo đảo）"
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「オリヴィっ」\n「オリヴィちゃんっ！？」
2682 = "「Olivy」\n「Bé Olivy!?」"
# monologue
# JP: （ぱしっ！）
4139 = "（Bộp!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2515 = "「!?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ！　ヘーキっ！　ヘーキだから！！」
2571 = "「A! Không sao! Không sao đâu!!」"
# monologue
# JP: 抱きとめようとした僕の体を、オリヴィは両手ではじき、\n元の姿勢でなんとか踏ん張る。
3718 = "Olivy dùng hai tay đẩy bật cơ thể tôi đang định đỡ lấy cô ấy ra, và cố gắng trụ vững ở tư thế ban đầu."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ちょっと――ずーっっとねてたのに、\nいきなり動いて、フラついちゃっただけだから！」
2494 = "「Chỉ là——ngủ suốt một thời gian dài, đột nhiên vận động nên hơi lảo đảo thôi mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう、か？」
3018 = "「Vậy, sao?」"
# monologue
# JP: 拒絶された、という感じはない。
3830 = "Tôi không có cảm giác bị từ chối."
# monologue
# JP: むしろオリヴィはなにかに怯え――\nまるで僕から逃げ出したようで、
3738 = "Đúng hơn là Olivy đang sợ hãi điều gì đó—— như thể đang trốn chạy khỏi tôi vậy,"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、オリヴィいってくる！！」
3180 = "「Vậy, Olivy đi đây!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、おいっ」
2580 = "「A, này.」"
# monologue
# JP: 走り去っていくその勢いも、さっき受け取った感覚を――\n“逃げ出すような”を補強する。
4045 = "Cái dáng vẻ chạy vụt đi đó, càng củng cố thêm cảm giác tôi vừa nhận được—— \"như thể đang trốn chạy\"."
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん――\n焦ってしまっているのでしょうか？」
2691 = "「Bé Olivy——\nCó phải đang vội vàng quá không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……まぁ、焦る気持ちは、もちろんあろう」
1763 = "「……À thì, cảm giác vội vàng thì chắc chắn là có rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「はい――」
2597 = "「Vâng——」"
# monologue
# JP: “追わないのですか？”と、ハチロクが目で問うてくる。
3574 = "\"Không đuổi theo sao ạ?\", Hachiroku dùng ánh mắt để hỏi."
# monologue
# JP: が……追ったところで、何を助けることもできない。\nオリヴィの貴重な時間を、そうして浪費させたくも無い。
3635 = "Nhưng…… dù có đuổi theo thì cũng chẳng giúp ích được gì. Tôi cũng không muốn làm lãng phí khoảng thời gian quý giá của Olivy như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「――追えば、かえって焦らせかねん。\nなにかあったら、ナビが報告をくれるだろうし」
3115 = "「——Nếu đuổi theo, e là sẽ càng làm cô ấy vội hơn. Có chuyện gì thì Navi sẽ báo cáo lại thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ、左様ですね。\nナビにまかせておくのが、一番よい方法かもしれません」
2632 = "「A, đúng vậy ạ.\nGiao cho Navi có lẽ là cách tốt nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2597 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「でしたらわたくしたちも、\nあわてず乗務に備えましょう」
3218 = "「Nếu vậy chúng ta cũng, chuẩn bị cho công việc trên tàu mà không cần vội vã thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2355 = "「Ừm.」"
# monologue
# JP: とはいえやはり、どこか気が急く。
4043 = "Mặc dù vậy, tôi vẫn cảm thấy có chút vội vàng."
# monologue
# JP: 乗務の時間は決まっているし、朝食を急いだところで、\nそれこそなにもかわらんのだが――
3527 = "Thời gian làm việc đã được định sẵn, dù có vội vàng ăn sáng, thì cũng chẳng thay đổi được gì——"
# 【日々姫】
# display as 日日姬
# JP: 「おはよー。にぃに、ハチロク、オリ――\nあれ？　オリヴィは？」
2905 = "「Chào buổi sáng. Anh hai, Hachiroku, Oli—— Ủa? Olivy đâu rồi?」"
# 【双鉄】
# display as 雙鐵
# JP: 「熱が下がって、すっ飛ぶように\x%l保線;#00ffc040;保線%l;#;に向かった」
2706 = "「Hạ sốt rồi, nên chạy bay đi \\x%l保線;#00ffc040;bảo trì đường ray%l;#; rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「ああ、やっと下がったんだー！\nよかったー！！」
2542 = "「A, cuối cùng cũng hạ sốt rồi sao!\nTốt quá rồi!!」"
# monologue
# JP: 心底、ほっとしている笑顔。\n見た瞬間に、僕のこころまでやわらかになる。
3742 = "Một nụ cười nhẹ nhõm từ tận đáy lòng. Ngay khoảnh khắc nhìn thấy, trái tim tôi cũng trở nên mềm mại."
# 【日々姫】
# display as 日日姬
# JP: 「ニイロクがお見舞に来てくれたのが\n効いたのかな」
2861 = "「Chắc là do Niiroku đến thăm nên mới có tác dụng chăng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ニイロクが？」
2367 = "「Niiroku á?」"
# 【日々姫】
# display as 日日姬
# JP: 「だよ？　昨日、赤井\x%l機関士;#00ffc040;機関士%l;#;といっしょに」
2920 = "「Đúng vậy? Hôm qua, cùng với \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; Akai đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「赤井\x%l機関士;#00ffc040;機関士%l;#;もか」
3155 = "「Cả \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; Akai nữa sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「実際にお見舞いしたのはニイロクだけだったけど。\n赤井\x%l機関士;#00ffc040;機関士%l;#;、買い物に付き合わされたって」
2342 = "「Nhưng người thực sự đến thăm chỉ có Niiroku thôi. \\x%l機関士;#00ffc040;Nhân viên cơ vụ%l;#; Akai bảo là bị kéo đi mua sắm cùng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2539 = "「À——」"
# monologue
# JP: 確かに、\x%l運転体;#00ffc040;運転体%l;#;では買い物にも不自由しよう。\n赤井\x%l機関士;#00ffc040;機関士%l;#;も、いつもながらとはいえご苦労なことだ。
3983 = "Đúng là, với \\x%l運転体;#00ffc040;kíp lái%l;#; thì việc mua sắm cũng bất tiện. \\x%l機関士;#00ffc040;Nhân viên cơ vụ%l;#; Akai, dù là chuyện thường ngày nhưng cũng vất vả thật."
# 【ハチロク】
# display as 八六
# JP: 「お見舞い……オリヴィちゃんは、\nその――お見舞いを、受け入れたのですか？」
2893 = "「Đến thăm…… Bé Olivy, ờm——đã chấp nhận cho vào thăm sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。体調いいからって」
2633 = "「Ừm. Bảo là sức khỏe tốt rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
# 2538 = "「哦」" 
# 【双鉄】
# display as 雙鐵
# JP: 「昨日から復調傾向にはあったのか」
2709 = "「Từ hôm qua đã có dấu hiệu hồi phục rồi sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「やけん、お見舞、あぎゃんと短かったのかなぁ？\n調子、また崩しちゃわないように――みたいな感じで」
2799 = "「Nên là, chuyến thăm mới ngắn ngủi như vậy sao nhỉ? Kiểu như để tránh làm sức khỏe lại xấu đi ấy——」"
# 【ハチロク】
# display as 八六
# JP: 「それほど短いお見舞いだったのですか？」
2959 = "「Chuyến thăm ngắn đến mức đó sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「短かかったと！　赤井\x%l機関士;#00ffc040;機関士%l;#;を放ってもおけんけん\nわたし、ここでお茶お出ししとったんだけど」
2497 = "「Ngắn lắm luôn! Em không thể bỏ mặc \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; Akai được nên đã pha trà mời ở đây, nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2538 = "「哦」" 
# 【日々姫】
# display as 日日姬
# JP: 「ニイロク、すぐおりてきて、『お邪魔した』って。\nあんまり早くて、赤井\x%l機関士;#00ffc040;機関士%l;#;も驚いた顔しとった」
2371 = "「Niiroku xuống ngay lập tức, rồi bảo 『Xin lỗi vì đã làm phiền』. Nhanh quá mức khiến \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; Akai cũng phải tròn mắt ngạc nhiên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、\x%l共感;#00ffc040;共感%l;#;であれこれやりとりしたのかな――っと」
3184 = "「Nếu vậy thì, chắc là họ đã trao đổi qua lại bằng \\x%l共感;#00ffc040;cộng cảm%l;#; chăng——」"
# monologue
# JP: 言えば、ハチロクが不満そうな表情になってしまう。
4018 = "Nghe tôi nói, Hachiroku lại tỏ vẻ bất mãn."
# monologue
# JP: 『イタイとかツライとかで心配かけたくないから』と、\nオリヴィが、ハチロクの見舞いを遠慮しているゆえ。
3670 = "Vì Olivy đã từ chối khéo chuyện Hachiroku đến thăm với lý do 『Không muốn làm cậu lo lắng vì thấy tôi đau đớn hay khổ sở』."
# 【日々姫】
# display as 日日姬
# JP: 「オリヴィの熱、さがってくれてほんっとよかった。\nまだまだ油断はできんと思うけど――ひと安心」
2804 = "「Olivy hạ sốt được thật sự là tốt quá rồi. Dù em nghĩ vẫn chưa thể chủ quan được——nhưng cũng yên tâm phần nào.」"
# monologue
# JP: 大きく伸びする日々姫の目元が、\nいささか腫れぼったく見える。
3913 = "Vùng mắt của Hibiki khi vươn vai thật lớn, trông có vẻ hơi sưng."
# 【双鉄】
# display as 雙鐵
# JP: 「あまりよく眠れなかったのか？」
2420 = "「Em ngủ không được ngon giấc sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「んーん、そぎゃんことなかとよ？\nばってん――ちょこちょこは起き出したけん」
2966 = "「Ưm ưm, không có chuyện đó đâu? Chỉ là——thỉnh thoảng em có thức dậy thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんの看病で、ですか？」
2923 = "「Là để chăm sóc bé Olivy sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「看病っていうほど大げさなものじゃなかとー。\nただ、寝苦しそうなとき、タオル絞って変えたくらいで」
2356 = "「Cũng không to tát đến mức gọi là chăm sóc đâu~. Chỉ là, lúc thấy cậu ấy có vẻ khó ngủ, em vắt khăn đổi cho cậu ấy thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ……」
2537 = "「A……」"
# monologue
# JP: 当然ながら、日々姫は\x%l共感;#00ffc040;共感%l;#;を受け取れない。
3979 = "Tất nhiên là, Hibiki không thể nhận được \\x%l共感;#00ffc040;cộng cảm%l;#;."
# monologue
# JP: その日々姫が感じた“寝苦しそう”なら、\nはっきりと外に出てくるほどのものだったのだろう。
3528 = "Nếu cái \"có vẻ khó ngủ\" mà Hibiki cảm nhận được, thì chắc hẳn nó đã thể hiện rất rõ ra bên ngoài rồi."
# 【ハチロク】
# display as 八六
# JP: 「わたくしも、交代要員に入れればよいのですが」
3075 = "「Giá mà em cũng có thể tham gia thay ca thì tốt biết mấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「オリヴィにかえって気ば使わせたらかわいそうやけん！\nうちとねぇねで回せとるけん、大丈夫」
2430 = "「Làm thế sẽ khiến Olivy phải bận tâm thêm thì tội nghiệp lắm! Có em với chị hai thay phiên nhau rồi, không sao đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「……はい」
1766 = "「……Vâng.」"
# 【日々姫】
# display as 日日姬
# JP: 「それに熱ばさがってくれたんなら、\nこのまま安定してくれるかもしれんし！」
3055 = "「Hơn nữa nếu đã hạ sốt rồi, thì có khi sẽ cứ thế mà ổn định lại luôn đó!」"
# 【ハチロク】
# display as 八六
# JP: 「そう――ですね。そうあることを――\nいえ、きっとそうなるに決まっておりま――きゃっ！？」
3084 = "「Đúng——vậy ạ. Mong là sẽ như thế—— Không, chắc chắn là sẽ như thế——Kya!?」"
# monologue
# JP: ふいに日々姫が、ハチロクの頬を軽ぅくつっつく。
3911 = "Đột nhiên Hibiki, khẽ chọc vào má Hachiroku."
# 【日々姫】
# display as 日日姬
# JP: 「ならほら！　そぎゃんと沈んだ顔せんと！\nにぃにに朝から見せたいお顔ば、そいでよかと？」
3197 = "「Thế thì kìa! Đừng có làm vẻ mặt xị ra như thế chứ! Đó là khuôn mặt cậu muốn cho anh hai xem từ sáng sớm sao?」"
# 【ハチロク】
# display as 八六
# JP: 「あ――いえ！」
2574 = "「A——Không ạ!」"
# monologue
# JP: ぴしゃん、ハチロクは両手で自分の頬を挟んで。\nそれからむにむに、上下に動かす。
3577 = "Bốp, Hachiroku dùng hai tay áp chặt vào má mình. Rồi nắn nắn, xoa lên xoa xuống."
# 【ハチロク】
# display as 八六
# JP: 「ですね。わたくしたちは、笑顔で、前向きに、\nいまわたくしたちに為せますことを」
3095 = "「Đúng vậy ạ. Chúng ta phải luôn mỉm cười, hướng về phía trước, và làm những gì chúng ta có thể làm lúc này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2960 = "「Đúng vậy.」"
# monologue
# JP: 今のやりとりからも感じる。\nオリヴィの高熱続きは、ハチロクをも神経質にしている。
3796 = "Từ cuộc trò chuyện vừa rồi cũng có thể cảm nhận được. Việc Olivy liên tục sốt cao cũng khiến Hachiroku trở nên nhạy cảm."
# monologue
# JP: ならば日々姫の教え通りに、僕も笑顔に。\n妻を勇気づけるためにも、出来る限りの笑顔になろう。
4073 = "Vậy thì làm theo lời Hibiki dạy, tôi cũng phải mỉm cười. Để tiếp thêm can đảm cho vợ mình, tôi sẽ cố gắng cười tươi nhất có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「ミスでもすれば、オリヴィを迎えに行くのが遅くなる。\nゆえ、きっちりと、僕らは僕らの仕事を果たそう」
3063 = "「Nếu mắc lỗi thì sẽ đón Olivy trễ mất. Thế nên, chúng ta hãy hoàn thành tốt công việc của mình nào.」"
# 【ハチロク】
# display as 八六
# JP: 「はい！　かしこまりました、双鉄さま」
2930 = "「Vâng! Em rõ rồi ạ, ngài Soutetsu.」"
# 【日々姫】
# display as 日日姬
# JP: 「さーてと、わたしは朝ごはん朝ごはん！」
3222 = "「Rồi, giờ thì em đi ăn sáng ăn sáng đây!」"
# monologue
# JP: 少しだけ芝居がかった大股で、\n日々姫の足は台所へと――
3916 = "Với những bước đi dài hơi mang tính diễn kịch, Hibiki hướng bước chân về phía nhà bếp——"
# monologue
# JP: （かさっ）
4135 = "（Sột soạt）"
# 【日々姫】
# display as 日日姬
# JP: 「わ！？」
2527 = "「Oa!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした日々姫？」
2902 = "「Có chuyện gì vậy Hibiki?」"
# 【日々姫】
# display as 日日姬
# JP: 「なんか踏んだ。クシャって――なにこれ？」
2713 = "「Em giẫm phải cái gì đó. Kêu cái rột——Cái gì đây?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2640 = "「嗯？」" 
# monologue
# JP: 日々姫がつまみあげたのは、\n小さなプラスチックのカップだ。
3910 = "Thứ Hibiki nhặt lên,\nlà một chiếc cốc nhựa nhỏ."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、これなに？」
3243 = "「Anh hai, cái gì đây?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もわからん。\n小さな菓子でもはいっていそうな容器だが」
2833 = "「Anh cũng không biết. Trông giống hộp đựng mấy loại bánh kẹo nhỏ ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにが食べてないんなら、ねぇねかな？」
2733 = "「Nếu anh hai không ăn thì là chị hai sao?」"
# 【ハチロク】
# display as 八六
# JP: 「真闇様が容器の類を落としっぱなしになさるとは\nとても思えませんが――」
2847 = "「Em không nghĩ là chị Mayami lại để rơi đồ chứa như thế này đâu ạ——」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。そもそも床に何かが落ちてるなど、\nふだんの[うち]家ではありえんことだ」
2506 = "「Cũng đúng. Vốn dĩ chuyện có đồ rơi trên sàn nhà, là điều không thể xảy ra trong nhà chúng ta bình thường.」"
# 【日々姫】
# display as 日日姬
# JP: 「よねぇ」
2780 = "「Đúng vậy nhỉ.」"
# monologue
# JP: 僕が感じた、なんとはなしの薄気味悪さを、\n日々姫も感じているのだろうか？
3870 = "Cảm giác rờn rợn khó tả mà tôi cảm nhận được, không biết Hibiki có cảm nhận được không?"
# monologue
# JP: 手がかりを探し求めるかのように、\n視線はきょろきょろ動きまわって――
3744 = "Như thể đang tìm kiếm manh mối, ánh mắt cô ấy cứ đảo quanh——"
# 【日々姫】
# display as 日日姬
# JP: 「あ」
2562 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにか気づいたのか？」
2949 = "「Em nhận ra điều gì sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「っていうか、にいに、時間」
2320 = "「Ý em là, anh hai, thời gian.」"
# 【双鉄】
# display as 雙鐵
# JP: 「むっ！」
2514 = "「Hửm!」"
# monologue
# JP: 焦らぬように、慌てぬように、ゆったりと――\nを、いささか徹底しすぎたようだ。
4084 = "Đừng vội vàng, đừng hoảng hốt, cứ thong thả—— Có vẻ như tôi đã quán triệt điều đó hơi quá đà rồi."
# monologue
# JP: 午後から乗務の日々姫と違い、\n今日の僕らは朝からだ。
3542 = "Khác với Hibiki làm việc trên tàu từ buổi chiều, hôm nay chúng tôi phải làm từ sáng."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま、まいりましょう」
3260 = "「Ngài Soutetsu, chúng ta đi thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2597 = "「嗯」" 
# monologue
# JP: ナビはオリヴィを送っているゆえ、\nレールショップまで走るしか無い。
4156 = "Navi đang đi đưa Olivy, nên chúng tôi chỉ còn cách chạy bộ đến cửa hàng đường sắt."
# 【日々姫】
# display as 日日姬
# JP: 「自転車使う？」
3071 = "「Dùng xe đạp không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「気持ちは嬉しいが、『二人乗り』は法令違反だ」
2714 = "「Cảm ơn ý tốt của em, nhưng 『chở hai』 là vi phạm pháp luật đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そか。うっかりしてた」
2576 = "「A, đúng rồi. Em quên mất.」"
# 【ハチロク】
# display as 八六
# JP: 「平気です。わたくし、走れます」
2333 = "「Không sao đâu ạ. Em có thể chạy được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「走れなくなったら、僕がおぶるなり抱くなりするさ。\n問題ない」
3074 = "「Nếu em không chạy được nữa thì anh sẽ cõng hoặc bế em. Không thành vấn đề.」"
# 【ハチロク】
# display as 八六
# JP: 「あら、それでしたら、\n足首ひとつ、くじくだけの価値はございますね」
2530 = "「Ôi chà, nếu vậy thì, cũng đáng để trẹo một bên mắt cá chân đấy ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「んふふっ」
2643 = "「Ưfufu.」"
# monologue
# JP: 吹き出したような笑い声。\n冬というのに日々姫はぱたぱた、自分の顔を仰いでみせる。
3908 = "Một tiếng cười như phụt ra. Dù đang là mùa đông nhưng Hibiki lại phẩy phẩy tay quạt cho khuôn mặt mình."
# 【日々姫】
# display as 日日姬
# JP: 「朝ごはん前から、ごちそーさま！」
2860 = "「Chưa ăn sáng mà đã no rồi nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2514 = "「呃！」" 
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
3261 = "「Ngài Soutetsu?」"
# monologue
# JP: そうだった。無駄話している時間はまったくない。\n身支度を手早く整える。
3890 = "Đúng rồi. Hoàn toàn không có thời gian để nói chuyện phiếm. Tôi nhanh chóng sửa soạn đồ đạc."
# 【双鉄】
# display as 雙鐵
# JP: 「では、いってくる」
3219 = "「Vậy, anh đi đây.」"
# 【ハチロク】
# display as 八六
# JP: 「いってまいります」
2839 = "「Em đi đây ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「いってらっしゃい、またあとでー！」
2309 = "「Hai người đi cẩn thận, lát gặp lại nha~!」"
# 【れいな】
# display as 玲奈
# JP: 「そうてつさぁん！！」
3254 = "「Anh Soutetsu~!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2640 = "「嗯？」" 
# monologue
# JP: 停止位置ぴたりに止めるなり、\nれいなががんがん、運転台の扉を叩く。
4001 = "Vừa dừng đúng vị trí, Reina đã đập rầm rầm vào cửa \\x%l運転台;#00ffc040;buồng lái%l;#;."
# monologue
# JP: 停車措置を終え、扉を開けば――
3844 = "Sau khi hoàn tất thủ tục đỗ xe, tôi mở cửa ra——"
# 【れいな】
# display as 玲奈
# JP: 「そうてつさぁん！　なにかあったみたいですよぉ」
3255 = "「Anh Soutetsu~! Hình như có chuyện gì đó xảy ra rồi ạ.」"
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「っ！！？」\n「！！？」
2386 = "「!!?」\n「!!?」"
# 【れいな】
# display as 玲奈
# JP: 「いまポーレット、オリヴィさんと電話してて、\n双鉄さんがかえってくるの、まってますぅ」
2976 = "「Bây giờ chị Paulette đang gọi điện thoại với chị Olivy, và đang đợi anh Soutetsu về đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
# 2562 = "「啊」" 
# monologue
# JP: 一瞬ギクリと凍った背中が、\n続いた言葉に溶かされる。
3986 = "Sống lưng tôi lạnh toát trong chốc lát, nhưng đã được xoa dịu bởi câu nói tiếp theo."
# 【双鉄】
# display as 雙鐵
# JP: 「……オリヴィ自身が、電話で話しているのだな？」
1769 = "「……Chính Olivy đang nói chuyện điện thoại sao?」"
# 【れいな】
# display as 玲奈
# JP: 「ですですぅ。ポーレットじゃわからないみたいで」
2769 = "「Đúng rồi ạ. Có vẻ chị Paulette không hiểu lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、隆起地点でなにか？」
3231 = "「Vậy là, có chuyện gì ở địa điểm phình lên sao?」"
# monologue
# JP: 問うてもれいなは、ふるふる首をふるばかり。\nそこまで細かく話を聞けてはいないのか。
3647 = "Tôi hỏi nhưng Reina chỉ lắc đầu quầy quậy. Có vẻ em ấy chưa nghe được chi tiết đến mức đó."
# 【れいな】
# display as 玲奈
# JP: 「ここ、れいなが手伝いますからぁ。\nそうてつさんは」
2993 = "「Chỗ này, Reina sẽ giúp một tay ạ.\nAnh Soutetsu thì」"
# 【ハチロク】
# display as 八六
# JP: 「早く話を聞いてあげてください」
2819 = "「Mau đi nghe chuyện đi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
2711 = "「Anh biết rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　双鉄くんっ」
2573 = "「A! Cậu Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいなから聞いた。かわれるか？」
2362 = "「Tôi nghe từ Reina rồi. Đổi máy được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「お願いします。あのね？　オリヴィちゃん。\nいま、双鉄くんとかわるから」
3190 = "「Nhờ cậu nhé. Này? Bé Olivy. Bây giờ chị đổi máy cho cậu Soutetsu nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「もしもし、僕だ。何があった」
2585 = "「Alo, tôi đây. Có chuyện gì vậy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツ！　あのね、今、\nソーテツのおじいちゃんの家なんだけど！」
3262 = "「Soutetsu! Nè, bây giờ, tôi đang ở nhà ông lão giống Soutetsu đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕と似た口調のご老人の家か」
2577 = "「À, nhà của ông lão có cách nói chuyện giống tôi sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「おじーちゃんち井戸水ひいてるんだけどね？\nおかしいの！　井戸水にスナ、まじってるの」
3153 = "「Nhà ông lão dùng nước giếng đúng không? Lạ lắm! Nước giếng bị lẫn cát đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「井戸水に砂？」
2380 = "「Nước giếng lẫn cát sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、これ」
3256 = "「Cậu Soutetsu, xem cái này đi.」"
# monologue
# JP: 急いで検索してくれたのだろう。\nポーレットがディスプレイに映る情報を示してくれる。
3944 = "Chắc là cô ấy đã vội vàng tìm kiếm giúp. Paulette chỉ cho tôi thông tin hiển thị trên màn hình."
# 【双鉄】
# display as 雙鐵
# JP: 「……つまり、地下水の流れが何らかの理由で\n変わった可能性があるのか」
1744 = "「……Tức là, dòng chảy của nước ngầm vì lý do nào đó mà có khả năng đã thay đổi sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「って、思うの。だけど、現場は今朝見たときには\n全然変化してなくて、それでオリヴィどうしていいか」
2684 = "「Chị cũng nghĩ vậy. Nhưng mà, hiện trường sáng nay lúc xem thì hoàn toàn không có gì thay đổi, nên Olivy không biết phải làm sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「現場には、僕とハチロクが急行する。\n堰さんたちにも来てもらえないか、すぐ照会する」
2843 = "「Tôi và Hachiroku sẽ đến hiện trường ngay. Tôi sẽ hỏi xem ông Seki và mọi người có thể đến được không.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2597 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィは、そのまま聞き取りを続けてくれるか？\nその、僕と似た口調の方のお名前は？」
2427 = "「Olivy, cô có thể tiếp tục nghe ngóng thêm được không? Ông lão có cách nói chuyện giống tôi tên là gì?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「イシダさんだよ！　イシダキョウジさん」
3029 = "「Là ông Ishida! Ishida Kyoji.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、その石田さんに、\n近辺で井戸水を使っている世帯がないかを確かめてくれ」
3165 = "「Vậy thì, nhờ cô hỏi ông Ishida xem, quanh đó có hộ nào dùng nước giếng nữa không nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「その前に、共同井戸――大きな井戸から複数世帯に\n水を送るタイプかどうかを確認してください」
2655 = "「Trước đó, hãy xác nhận xem đó có phải là giếng chung—— loại giếng lớn cung cấp nước cho nhiều hộ gia đình hay không nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2597 = "「嗯」" 
# monologue
# JP: オリヴィに問えば、オリヴィはすぐ、\nイシダさんからの答えを僕に伝えてくれる。
3497 = "Vừa hỏi Olivy, Olivy liền truyền đạt lại câu trả lời từ ông Ishida cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「共同井戸だそうだ」
2894 = "「Là giếng chung.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら、ポンプの電気代とか、そういうお金のやりとりが\nあります。だから、町会とかに名簿があると思います」
3232 = "「Nếu vậy thì sẽ có các khoản chi phí như tiền điện máy bơm. Nên tôi nghĩ là hội đồng khu phố sẽ có danh sách đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ、町会長さんを紹介してもらうなどでもいい。\n井戸水を使っている他の家庭がどうかを、確認するんだ」
2701 = "「Olivy, nhờ giới thiệu trưởng khu phố cũng được. Hãy xác nhận xem các hộ gia đình khác dùng nước giếng có sao không nhé.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ご近所でもスナでてるって、\nもうそこは聞いてるよ」
2692 = "「Hàng xóm cũng bị lẫn cát,\nchuyện đó thì tôi hỏi rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしいな。では、砂が出ている世帯の住所を、\n残らず聞き取っておいてくれ」
3022 = "「Tuyệt vời. Vậy thì, hãy ghi lại toàn bộ địa chỉ của những hộ gia đình có nước giếng bị lẫn cát nhé.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ！　わかった！\nスナでてるハンイのマップ作るんだ」
2570 = "「A! Hiểu rồi! Làm bản đồ phạm vi bị lẫn cát đúng không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。並行して、その他の異変がないかどうかも、\n無理ない範囲で聞き取り調査をしてくれるか？」
2772 = "「Ừ. Song song đó, cô có thể nghe ngóng xem có dấu hiệu bất thường nào khác trong phạm vi có thể không?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！　そうする」
3273 = "「Okay! Tôi sẽ làm vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「一時間後に、保線小屋――保線基地で合流しよう。\nそれまでに何かあったら、レールショップに連絡を」
3217 = "「Một tiếng nữa, chúng ta sẽ tập hợp ở túp lều bảo trì đường ray——căn cứ bảo trì đường ray. Từ giờ đến lúc đó nếu có chuyện gì thì liên lạc cho cửa hàng đường sắt nhé.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！」
2719 = "「Biết rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ではまた後ほど。よろしく頼む」
3220 = "「Vậy hẹn gặp lại sau. Nhờ cô nhé.」"
# monologue
# JP: （かちゃっ）
# 4135 = "（喀嚓）" 
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん。\nこれ、どの程度の話でしょうか？」
3257 = "「Cậu Soutetsu. Chuyện này nghiêm trọng đến mức nào vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「情報が足りなすぎる。ゆえ、より広範に情報を集めたい。霧縞市の防災課にも――」
2996 = "「Thông tin quá thiếu. Vì vậy, tôi muốn thu thập thông tin trên phạm vi rộng hơn. Cả phòng phòng chống thiên tai của thành phố Kirishima nữa——」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。すぐ担当者さんに連絡します」
2724 = "「Tôi hiểu rồi. Tôi sẽ liên lạc ngay với người phụ trách.」"
# monologue
# JP: ガスを疑った一件以来、情報共有は密にしてきた。
4020 = "Kể từ vụ nghi ngờ rò rỉ khí ga, chúng tôi đã chia sẻ thông tin rất chặt chẽ."
# monologue
# JP: この情報の持つ意味も、\n霧縞市の防災課なら、的確に評価してくれるものと。
3826 = "Ý nghĩa của thông tin này, chắc chắn phòng phòng chống thiên tai của thành phố Kirishima sẽ đánh giá chính xác được."
# monologue
# JP: （Prrrrrrr――Prrrrrrr）
4129 = "（Reng reng——Reng reng）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2551 = "「!」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、御一夜鉄道です――\nえ？　あ、はい。繋いでください」
2587 = "「Vâng, Đường sắt Ohito xin nghe—— Hả? À, vâng. Xin hãy nối máy.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま、オリヴィちゃんは！？」
3259 = "「Ngài Soutetsu, bé Olivy sao rồi ạ!?」"
# 【れいな】
# display as 玲奈
# JP: 「なにがどうなってるんですかぁ」
3040 = "「Chuyện gì đang xảy ra vậy ạ.」"
# 【凪】
# display as 凪
# JP: 「凪さま、いきなり[いれかえ,1]入換させられたばい！\n時間外労働もいーとこばい！！」
2458 = "「Bổn cô nương tự dưng bị bắt \\x%l調車;#00ffc040;dồn toa%l;#; này! Làm ngoài giờ cũng vừa phải thôi chứ!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまんが、本格的な時間外労働を頼むかもしれん」
2510 = "「Xin lỗi nhé, nhưng có lẽ sẽ phải nhờ cô làm ngoài giờ thực sự đấy.」"
# 【凪】
# display as 凪
# JP: 「へ？」
2388 = "「Hả?」"
# monologue
# JP: ポーレットはまだ電話中だ。
3945 = "Paulette vẫn đang gọi điện thoại."
# monologue
# JP: ゆえ、僕の口から、\n今得たばかりの情報を、正確さを第一として伝達していく。
3881 = "Thế nên, từ miệng tôi, những thông tin vừa nhận được sẽ được truyền đạt lại với độ chính xác được đặt lên hàng đầu."
# 【ハチロク】
# display as 八六
# JP: 「……井戸水に、砂が」
1747 = "「……Nước giếng, có cát.」"
# 【れいな】
# display as 玲奈
# JP: 「一軒だけじゃなく、何軒ものおうちで、ですかぁ」
2322 = "「Không chỉ một nhà, mà là nhiều nhà luôn sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2764 = "「Ừm.」"
# 【凪】
# display as 凪
# JP: 「つまり――それって、どういうことばい？」
3226 = "「Tức là——chuyện đó có nghĩa là sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「簡単にいえば」
3047 = "「Nói một cách đơn giản thì.」"
# 【ポーレット】
# display as 波萊特
# JP: 「電話、霧縞市の防災課からでした」
3264 = "「Điện thoại, là từ phòng phòng chống thiên tai của thành phố Kirishima.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2514 = "「呃！」" 
# monologue
# JP: ポーレットの雰囲気が変わっている。\n一番強い彼女へのスイッチが入った状態だ。
3943 = "Bầu không khí của Paulette đã thay đổi. Cô ấy đã bật công tắc chuyển sang trạng thái mạnh mẽ nhất của mình."
# monologue
# JP: ならば電話の内容は――
4074 = "Nếu vậy thì nội dung cuộc điện thoại là——"
# 【ポーレット】
# display as 波萊特
# JP: 「[きりしまやま,2]霧縞山――とくに、[しんえんだけ,2]新炎岳の火口周辺で、\n火山活動の活発化の兆候がみられるそうです」
2770 = "「Nghe nói ở núi Kirishima——đặc biệt là khu vực quanh miệng núi lửa Shin'endake, đang có dấu hiệu hoạt động núi lửa trở nên mạnh mẽ hơn.」"
# 【凪】
# display as 凪
# JP: 「[しんえんだけ,2]新炎岳って、どこばい？」
3146 = "「Núi Shin'endake, là ở đâu vậy?」"
# 【ポーレット】
# display as 波萊特
# JP: 「地図出します」
2859 = "「Tôi sẽ mở bản đồ.」"
# monologue
# JP: ディスプレイ上に地図が出される。\n赤い吹き出しで新炎岳がポイントされて分かりやすい。
4027 = "Bản đồ được hiển thị trên màn hình. Núi Shin'endake được đánh dấu bằng khung chú thích màu đỏ rất dễ nhìn."
# 【ハチロク】
# display as 八六
# JP: 「……わたくしたちの線路から、\n随分とはなれているように見えますが」
1759 = "「……Từ đường ray của chúng ta, trông có vẻ cách khá xa đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。隆起地点が、霧縞温泉駅－[はやと,1]早戸駅間。\nより厳密には、霧島温泉駅－[なかふくら,2]仲福良廃駅間だから――」
2964 = "「Đúng vậy. Địa điểm phình lên là đoạn giữa ga Kirishima Onsen và ga Hayato. Nói chính xác hơn là đoạn giữa ga Kirishima Onsen và ga bỏ hoang Nakafukura——」"
# 【れいな】
# display as 玲奈
# JP: 「直線距離で、12キロくらいはなれてるっぽいですねぇ」
3015 = "「Theo đường chim bay thì cách khoảng 12km đó ạ.」"
# 【凪】
# display as 凪
# JP: 「そんなら、線路ばもりあがっとるとこと、\n火山活動の活発化？　やらは、関係なかと？」
3224 = "「Vậy thì, chỗ đường ray bị phình lên với cái gì mà hoạt động núi lửa mạnh lên? Không liên quan sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「関係は多分、濃厚です」
3240 = "「Khả năng cao là có liên quan đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。そもそも、温泉自体が火山活動の表れだ。\n隆起地点を含めて一帯すべて、霧縞山の山体ともいえる」
2963 = "「Đúng vậy. Vốn dĩ, bản thân suối nước nóng đã là biểu hiện của hoạt động núi lửa. Có thể nói toàn bộ khu vực bao gồm cả địa điểm phình lên đều thuộc khối núi Kirishima.」"
# 【凪】
# display as 凪
# JP: 「ふわ！\n[きりしまさん,2]霧縞山って、めっちゃでっかか山ばいねぇ」
2526 = "「Oa! Núi Kirishima, là một ngọn núi siêu to khổng lồ luôn nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「砂の件も共有しました。霧縞市としては周辺地域、\n避難勧告まで含めての検討を行うそうです」
3241 = "「Tôi cũng đã chia sẻ vụ nước lẫn cát rồi. Về phía thành phố Kirishima, họ đang xem xét đến cả việc đưa ra khuyến cáo sơ tán cho các khu vực xung quanh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこまで緊急度の高い話なのか？」
2823 = "「Chuyện cấp bách đến mức đó sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは専門家が検討中とのことですが――\nわたしたちは、最悪を考えて行動しないと」
2951 = "「Chuyện đó thì các chuyên gia đang xem xét—— Nhưng chúng ta phải hành động với tình huống xấu nhất trong đầu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。鉄道は常に、『安全が第一の使命』なのだから」
2962 = "「Đúng vậy. Vì đường sắt luôn có 『sứ mệnh đặt an toàn lên hàng đầu』 mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「です」
# 2764 = "「對」" 
# 【凪】
# display as 凪
# JP: 「やったら！　凪さまたちは何すればよかと！？」
3177 = "「Vậy thì! Bổn cô nương phải làm gì đây!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしたちの仕事は鉄道です。鉄路を維持すること。\nそれは、地域の安全を担保することにも繋がります」
2840 = "「Công việc của chúng ta là đường sắt. Duy trì tuyến đường sắt. Điều đó cũng gắn liền với việc đảm bảo an toàn cho khu vực.」"
# 【双鉄】
# display as 雙鐵
# JP: 「万一災害が発生し、道路が寸断されたとしても――\n鉄路が生きているのなら、物資も人員も輸送できる」
2469 = "「Ngộ nhỡ thảm họa xảy ra, đường bộ bị chia cắt—— Nếu đường sắt vẫn còn hoạt động, thì có thể vận chuyển cả vật tư lẫn nhân lực.」"
# 【凪】
# display as 凪
# JP: 「やったら――線路が壊れたりせんよーに、\n警戒とかそういうことすればよかと？」
2829 = "「Vậy thì——để đường ray không bị hỏng, chỉ cần cảnh giác hay làm mấy việc tương tự là được hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nそれを、通常の乗務と平行でおこなっていきたい」
2965 = "「Đúng vậy. Tôi muốn tiến hành việc đó song song với công việc trên tàu thông thường.」"
# 【凪】
# display as 凪
# JP: 「ああ。やけんさっきにーさん、\n時間外労働ゆうとったんねー」
2649 = "「À. Hèn chi lúc nãy anh hai mới nói là làm ngoài giờ nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2597 = "「嗯」" 
# monologue
# JP: 凪が理解し、納得してくれた。
3597 = "Nagi đã hiểu và chấp nhận."
# monologue
# JP: ならばその圧倒的な行動力を空回りさせぬよう、\n行動指針を、しっかり定めて与えたい。
4071 = "Vậy thì để khả năng hành động áp đảo đó không bị lãng phí, tôi muốn định ra và giao cho em ấy một kim chỉ nam hành động rõ ràng."
# 【双鉄】
# display as 雙鐵
# JP: 「避難の判断等に関しては、\n専門家に任せておけるのだよな？」
2916 = "「Về việc quyết định sơ tán các thứ, chúng ta có thể giao cho các chuyên gia đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。情報はできるだけ密に共有できるようにと――\nその体制づくりも、御一夜市を入れてで進めます」
2774 = "「Vâng. Để có thể chia sẻ thông tin một cách chặt chẽ nhất—— việc xây dựng hệ thống đó, tôi sẽ tiến hành cùng với thành phố Ohito.」"
# 【双鉄】
# display as 雙鐵
# JP: 「よろしく頼む。\x%l保線;#00ffc040;保線%l;#;の方の具体的な行動指針は？」
3189 = "「Nhờ cô nhé. Còn kim chỉ nam hành động cụ thể cho phía \\x%l保線;#00ffc040;bảo trì đường ray%l;#; thì sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そっちは、双鉄くん――ううん、\n運輸部長兼\x%l保線部長;#00ffc040;保線部長%l;#;に、全権委任でお願いできますか？」
3143 = "「Bên đó thì, cậu Soutetsu——à không, Trưởng bộ phận Vận tải kiêm \\x%l保線部長;#00ffc040;Trưởng bộ phận bảo trì đường ray%l;#;, tôi có thể ủy quyền toàn bộ cho cậu được không?」"
# monologue
# JP: ――運輸部長の肩書までを出してきた、ということは、\n状況に応じ、車両運用を変えてもいいということだ。
3515 = "——Việc cô ấy đưa cả chức danh Trưởng bộ phận Vận tải ra, có nghĩa là tùy theo tình hình, tôi có thể thay đổi cách vận hành phương tiện."
# 【双鉄】
# display as 雙鐵
# JP: 「全権で、よろしいのですか？」
3024 = "「Giao toàn quyền, có được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。ですが、運用を変化させる場合は、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;たちと相談の上で、報告も入れてください」
2613 = "「Vâng. Nhưng nếu có thay đổi vận hành, hãy bàn bạc với các \\x%lレイルロオド;#00ffc040;Railord%l;#;, và nhớ báo cáo lại nhé.」"
# monologue
# JP: 照会ではなく、報告でいい。\nそれほどにポーレットは僕を信頼してくれている。
3627 = "Không phải hỏi ý kiến, mà chỉ cần báo cáo là được. Paulette tin tưởng tôi đến mức đó."
# monologue
# JP: それは同時に、ポーレットもフル稼働になる――\n非常時にも彼女の能力に頼れない可能性をも、示している。
4016 = "Đồng thời, điều đó cũng cho thấy Paulette sẽ phải hoạt động hết công suất—— và có khả năng trong lúc khẩn cấp, chúng tôi sẽ không thể dựa vào năng lực của cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「――謹んで拝命します」
2845 = "「——Tôi xin kính cẩn tuân mệnh.」"
# 【ポーレット】
# display as 波萊特
# JP: 「では、お任せします。情報共有は三時間おき定時で。\n状況に大きな変化があった場合には、逐次で願います」
3202 = "「Vậy, tôi giao phó cho cậu. Chia sẻ thông tin định kỳ mỗi ba tiếng một lần. Nếu tình hình có thay đổi lớn, xin hãy báo cáo ngay lập tức.」"
# 【双鉄】
# display as 雙鐵
# JP: 「承りました」
2906 = "「Tôi đã tiếp nhận.」"
# monologue
# JP: 一礼すればすぐさまに、\nポーレットは電話をかけはじめる。
3942 = "Cúi chào một cái, ngay lập tức, Paulette bắt đầu gọi điện thoại."
# monologue
# JP: 彼女は、彼女にしかできないことを。\n無論僕らも、同様にだ。
3752 = "Cô ấy làm những việc chỉ cô ấy mới làm được. Tất nhiên chúng tôi cũng vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなは、ポーレットの支援に回ってもらえるか？」
2995 = "「Reina có thể chuyển sang hỗ trợ Paulette được không?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、わかりましたぁ」
2730 = "「Vâng ạ, em hiểu rồi ạ~」"
# monologue
# JP: ポーレットの支えならばれいなの他には考えられない。
4044 = "Nếu là hỗ trợ Paulette thì ngoài Reina ra không ai khác có thể làm được."
# monologue
# JP: 稀咲とふかみも、\x%l保線;#00ffc040;保線%l;#;には回さぬ人材として――ああ、\n可能であれば真闇姉にもバックアップをお願いしよう。
4011 = "Kisaki và Fukami cũng là những nhân lực không thể chuyển sang \\x%l保線;#00ffc040;bảo trì đường ray%l;#;——À, nếu được thì tôi sẽ nhờ cả chị Mayami hỗ trợ phía sau nữa."
# 【凪】
# display as 凪
# JP: 「で！　凪さまたちは何すりゃよかとばい？」
3227 = "「Thế! Bổn cô nương phải làm gì đây?」"
# 【双鉄】
# display as 雙鐵
# JP: 「明確な異変が発生した以上、\n事態の変化があるまでは、常時警戒を敷くべきと思う」
2900 = "「Một khi đã xảy ra dấu hiệu bất thường rõ ràng, tôi nghĩ chúng ta nên thiết lập cảnh báo thường trực cho đến khi tình hình có thay đổi.」"
# 【凪】
# display as 凪
# JP: 「常時警戒？」
2331 = "「Cảnh báo thường trực?」"
# 【ハチロク】
# display as 八六
# JP: 「二十四時間の警戒態勢、ということでございますね」
2354 = "「Tức là tình trạng cảnh báo hai mươi bốn giờ đấy ạ.」"
# 【凪】
# display as 凪
# JP: 「二十四時間！！\nゆーことは、シフトば組むと？」
2374 = "「Hai mươi bốn giờ!!\nNói vậy là, phải xếp ca trực sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\x%l保線;#00ffc040;保線%l;#;ボランティアのみなさんにも出来る限り\n参加してもらって」
2609 = "「Ừm. Nhờ các tình nguyện viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#; tham gia càng nhiều càng tốt.」"
# 【凪】
# display as 凪
# JP: 「なら、[かおり,1]香織ちゃんにもお願いするばい！\nあのこ、なかなか根性あるけん」
3199 = "「Vậy thì, nhờ cả Kaori nữa! Con bé đó cũng khá là có nghị lực đấy.」"
# monologue
# JP: 丸山香織――ポーレットの厳しい選抜にようやく耐えて\n御一夜鉄道に加わった、新人の\x%l庫内手;#00ffc040;庫内手%l;#;・\x%l機関助士;#00ffc040;機関助士%l;#;見習いだ。
3747 = "Maruyama Kaori——Người cuối cùng cũng vượt qua được cuộc tuyển chọn gắt gao của Paulette để gia nhập Đường sắt Ohito, là một nhân viên \\x%l庫内手;#00ffc040;rửa lò%l;#; kiêm \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; tập sự mới."
# monologue
# JP: 凪よりさらに小柄ゆえ、\n体力的に、果たしてどうかと思っていたが――
3976 = "Vì cô bé còn nhỏ nhắn hơn cả Nagi, nên tôi tự hỏi về mặt thể lực thì liệu có ổn không——"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、凪が認めるほどの根性の持ち主か」
2470 = "「Vậy sao, cô bé có nghị lực đến mức Nagi cũng phải công nhận à.」"
# monologue
# JP: とはいえ、新人の、\nそれも女性を、不寝番にはとても回せん。
3549 = "Dù vậy, một người mới, lại còn là phụ nữ, thì tôi không thể nào sắp xếp vào ca trực đêm được."
# 【双鉄】
# display as 雙鐵
# JP: 「新人は乗務で手一杯だろとは思うが――\n凪がそこまで評価するなら、話すだけは話してみてくれ」
3252 = "「Tôi nghĩ người mới thì công việc trên tàu đã đủ bận rộn rồi—— Nhưng nếu Nagi đánh giá cao như vậy, thì cứ thử nói chuyện xem sao.」"
# 【凪】
# display as 凪
# JP: 「話すだけ……って、業務命令じゃなかと？」
2776 = "「Chỉ nói chuyện thôi sao…… Không phải là mệnh lệnh công việc à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「人命や地域の安全に関わるかもしれんことだからな。\n業務で無理やり、からの凡ミスなどは、防止したい」
3004 = "「Vì chuyện này có thể liên quan đến tính mạng con người và an toàn của khu vực. Tôi muốn ngăn chặn những sai lầm ngớ ngẩn do bị ép buộc làm việc.」"
# 【凪】
# display as 凪
# JP: 「わかったと！\nなら、そこも含めてそのまま説明しとくばい！」
2746 = "「Hiểu rồi! Vậy thì, tôi sẽ giải thích nguyên văn bao gồm cả chuyện đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。それが一番間違いない」
2639 = "「Ừm. Làm vậy là chắc chắn nhất.」"
# 【ニイロク】
# display as 二六
# JP: 「話。聞いた。うけた。\n自分も、できる手伝いは、やる」
2364 = "「Chuyện. Đã nghe. Đã nhận. Tôi cũng sẽ, giúp đỡ những gì có thể.」"
# 【赤井】
# display as 赤井
# JP: 「必要があれば、氏子さんにも協力をお願いできます」
2740 = "「Nếu cần thiết, tôi có thể nhờ các giáo dân giúp đỡ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。大変こころ強く思います」
3266 = "「Cảm ơn mọi người. Tôi cảm thấy rất vững tâm.」"
# monologue
# JP: 情報は、霧縞市側でも収集しようし、\nこちらが余計な手を出せば、混乱を招くだけとなろう。
4093 = "Thông tin thì phía thành phố Kirishima cũng sẽ thu thập, nếu chúng ta nhúng tay vào việc thừa thãi, thì chỉ chuốc lấy hỗn loạn mà thôi."
# monologue
# JP: ならば、いま構築すべきは最善の保線監視体制――\n未経験者たちと組ませる、経験者たちのローテーションだ。
4070 = "Vậy thì, điều cần xây dựng bây giờ là hệ thống giám sát bảo trì đường ray tốt nhất—— Sự luân phiên của những người có kinh nghiệm, kết hợp với những người chưa có kinh nghiệm."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。堰さんたちのどなたかと連絡を」
2445 = "「Hachiroku. Liên lạc với ông Seki hoặc ai đó trong nhóm đi.」"
# 【ハチロク】
# display as 八六
# JP: 「すでに手配してございます」
2848 = "「Em đã sắp xếp xong rồi ạ.」"
# monologue
# JP: ハチロクはすぐ、流さんと電話をつないでくれる。
3582 = "Hachiroku lập tức nối máy điện thoại với ông Nagare."
# monologue
# JP: 手短に要点だけを確認し、\n電話を切って、赤井\x%l機関士;#00ffc040;機関士%l;#;へと向き直る。
3854 = "Tôi xác nhận ngắn gọn những điểm chính, rồi cúp máy, quay sang \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; Akai."
# 【双鉄】
# display as 雙鐵
# JP: 「もう間もなく、流さんと治さんが来て下さいます」
2982 = "「Một lát nữa, ông Nagare và ông Osamu sẽ đến đây.」"
# 【赤井】
# display as 赤井
# JP: 「はい」
2718 = "「Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「赤井\x%l機関士;#00ffc040;機関士%l;#;には、お二方と凪と情報を出し合って、\n常時監視候補者のリスト作成をお願いしたく思います」
2851 = "「Tôi muốn nhờ \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; Akai cùng hai ông ấy và Nagi trao đổi thông tin, để lập danh sách các ứng viên giám sát thường trực.」"
# 【赤井】
# display as 赤井
# JP: 「わかりました」
2854 = "「Tôi hiểu rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「リスト作成が整い次第で、流さんか治さんにも、\n現場に向かってもらえないかを伺ってください」
2357 = "「Ngay khi lập xong danh sách, xin hãy hỏi xem ông Nagare hoặc ông Osamu có thể đến hiện trường được không.」"
# 【赤井】
# display as 赤井
# JP: 「その点も間違いなく受認しました。\n双鉄君たちは、すぐに現場に？」
2771 = "「Điểm đó tôi cũng đã tiếp nhận không sai sót. Cậu Soutetsu và mọi người sẽ đến hiện trường ngay sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「向かいます。オリヴィとその約束をしていますので」
2932 = "「Chúng tôi sẽ đi ngay. Vì đã hứa với Olivy rồi.」"
# 【ニイロク】
# display as 二六
# JP: 「なら。これ。オリヴィに。\n気休めにもならない。かもしれないけど」
3208 = "「Vậy. Cái này. Cho Olivy. Tuy có thể. Không giúp được gì.」"
# monologue
# JP: 大きなバッグ――クーラーバッグだ。
3746 = "Một chiếc túi lớn——túi giữ nhiệt."
# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
2567 = "「A!」"
# monologue
# JP: 見た瞬間に、今朝からの小さな違和感たちが、\nつながりを得て、ひとつの形を結びはじめる。
3503 = "Ngay khoảnh khắc nhìn thấy, những cảm giác sai sai nhỏ nhặt từ sáng nay, đã kết nối lại với nhau, bắt đầu hình thành một hình dáng."
# 【双鉄】
# display as 雙鐵
# JP: 「中味を見せてもらっても構わんか？」
3059 = "「Cho tôi xem bên trong được không?」"
# 【ニイロク】
# display as 二六
# JP: 「うん」
# 2597 = "「嗯」" 
# 【流】
# display as 流
# JP: 「長丁場になるかもしれん。\n双鉄、くれぐれも無理はせんようにの」
2954 = "「Có thể sẽ là một cuộc chiến trường kỳ đấy. Soutetsu, tuyệt đối đừng cố quá sức nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、流さん。ありがとうございました。\nご帰途も、どうぞご安全に」
2721 = "「Vâng, ông Nagare. Cháu cảm ơn ông. Trên đường về, ông cũng đi cẩn thận nhé.」"
# 【流】
# display as 流
# JP: 「降らんでくれればいいがのう。\nま、装備はあるけん、大丈夫じゃろ」
2408 = "「Chỉ mong là tuyết đừng rơi thôi. Nhưng mà, có mang theo trang bị rồi, chắc không sao đâu.」"
# monologue
# JP: ――シフトや何やの細部をみっちり打ち合わせ、\n流さんが御一夜へと帰っていく。
3843 = "——Sau khi bàn bạc kỹ lưỡng chi tiết về ca trực và các thứ khác, ông Nagare lên đường trở về Ohito."
# 【ハチロク】
# display as 八六
# JP: 「……ガソリンエンジンのトラックでは、\nかなりの時間がかかってしまいましょうね」
1741 = "「……Với xe tải động cơ xăng thì, chắc sẽ mất khá nhiều thời gian đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「資材を緊急に搬入してもらったからな。\n申し訳ないが、助かった」
3003 = "「Vì đã nhờ họ khẩn cấp chở vật tư đến mà. Tuy hơi có lỗi, nhưng thật sự đã giúp ích rất nhiều.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
1715 = "「…………」"
# monologue
# JP: 僕とハチロクの会話の間も、\nオリヴィは、居心地悪そうに突っ立っている。
3774 = "Trong lúc tôi và Hachiroku nói chuyện, Olivy vẫn đứng chôn chân ở đó với vẻ không thoải mái."
# monologue
# JP: さっきまでは流さんがいたゆえ、聞けなかったが――\nオリヴィのためにも、問題は早期に解消しよう。
3975 = "Lúc nãy vì có ông Nagare ở đây nên tôi không thể hỏi được—— Nhưng vì Olivy, tôi sẽ giải quyết vấn đề này sớm."
# 【双鉄】
# display as 雙鐵
# JP: 「で、だ。オリヴィ」
2875 = "「Vậy thì, Olivy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！」
# 2514 = "「呃！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「何故……誤魔化すようなことを？」
2424 = "「Tại sao…… lại làm ra chuyện lấp liếm như vậy?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ……う、ん。ごめんね？\nウソなんて、オリヴィもつきたくなかったんだけど」
2561 = "「A……ư, m. Xin lỗi nhé? Nói dối, Olivy cũng không muốn đâu.」"
# monologue
# JP: 言って、オリヴィが夜空を見上げる。
3724 = "Nói rồi, Olivy ngước nhìn bầu trời đêm."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――」
2554 = "「A——」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ……」
2522 = "「Ôi chà……」"
# monologue
# JP: 雪、だ。
3923 = "Là tuyết."
# monologue
# JP: オリヴィの見上げた空から、\nひらひら、雪が舞い降りてくる。
4097 = "Từ bầu trời mà Olivy đang ngước nhìn, những bông tuyết lả tả rơi xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「降ってきてしまったな。\n予報よりだいぶ遅れはしたが」
3159 = "「Rơi mất rồi.\nDù trễ hơn dự báo khá nhiều.」"
# monologue
# JP: 用意の傘を広げれば、ハチロクがそっと入ってくる。
3896 = "Tôi mở chiếc ô đã chuẩn bị sẵn, Hachiroku nhẹ nhàng bước vào."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィも。濡れるぞ」
2685 = "「Cả Olivy nữa. Ướt bây giờ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがと。けど、少しだけ冷やしたい」
3099 = "「Cảm ơn. Nhưng mà, tôi muốn làm mát một chút.」"
# monologue
# JP: （じゅっ）
4137 = "（Xèo）"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ――」
# 2554 = "「啊——」" 
# monologue
# JP: オリヴィが空に向けた手のひら。\nそこに乗った雪片が、一瞬のうちに解け消える。
3715 = "Lòng bàn tay Olivy hướng lên trời. Bông tuyết rơi trên đó, tan biến ngay trong chớp mắt."
# 【双鉄】
# display as 雙鐵
# JP: 「そこまで……体温があがっているのか」
2426 = "「Nhiệt độ cơ thể…… đã tăng đến mức đó rồi sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなの。っていうか、自分でわかるんだ。\nこれ、もう下がらないって」
2767 = "「Đúng vậy. Nói đúng hơn là, tự tôi biết được. Cái này, không thể hạ xuống được nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにを弱気な」
3142 = "「Đừng có nói mấy lời yếu đuối thế.」"
# 【ハチロク】
# display as 八六
# JP: 「ですよ、オリヴィちゃん。登呂流湯様で仮に無理でも、\n[おおみや,1]旺宮に――不死鳥博士のところにいけば」
2783 = "「Đúng đấy bé Olivy. Giả sử ở chỗ ngài Tororyu-yu không được, thì đến Omiya——chỗ Tiến sĩ Fushicho thì chắc chắn sẽ được.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「いっても同じ。\nこれ、\x%lタブレット;#00ffc040;タブレット%l;#;がもうボロボロなせいだから」
2474 = "「Đến đó cũng vậy thôi. Cái này, là do \\x%lタブレット;#00ffc040;thẻ bảng%l;#; đã tơi tả rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうと……自覚できるような何かがあるのか」
2743 = "「Cô có thể…… tự nhận thức được điều đó sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。時間、飛ぶんだ――寝てなかったのに、\n普通に行動してたはずなのに、間が記憶できてないの」
2626 = "「Ừm. Thời gian, bị nhảy cóc——Dù không hề ngủ, dù vẫn đang hoạt động bình thường, nhưng lại không thể nhớ được khoảng thời gian ở giữa.」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 2554 = "「啊——」" 
# 【双鉄】
# display as 雙鐵
# JP: 「そのことは、登呂流湯さんには？」
3169 = "「Chuyện đó, cô đã nói với ông Tororyu-yu chưa?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「はなしたよ！　トロルユも、フシチョーハカセとか\n電車姫さまとかにも、相談してくれたみたい」
3096 = "「Nói rồi! Tororyu-yu hình như cũng đã thảo luận với Tiến sĩ Fushicho và Công chúa Tàu điện rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「それで――その……」
2863 = "「Vậy thì——kết quả……」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。あのね？　それでもやっぱり。\n『とにかく安静にして様子見』しかできないって」
2617 = "「Ừm. Nè? Dù vậy thì. Họ bảo chỉ có thể 『cứ nghỉ ngơi tĩnh dưỡng rồi theo dõi tình hình』 thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
3154 = "「!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう、か」
3150 = "「Vậy, sao.」"
# monologue
# JP: \x%lタブレット;#00ffc040;タブレット%l;#;の損傷ならば、直せない。\n登呂流湯さんにも、不死鳥博士にも、他の誰にも。
3757 = "Nếu là \\x%lタブレット;#00ffc040;thẻ bảng%l;#; bị hỏng, thì không thể sửa được. Cả ông Tororyu-yu, Tiến sĩ Fushicho, hay bất kỳ ai khác cũng vậy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だからオリヴィ。オリヴィの中の、壊れちゃいけない\nところがもう、ダメになってるんだって、わかって」
2880 = "「Nên Olivy. Biết được rằng, cái phần không được phép hỏng bên trong Olivy, đã hỏng mất rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1715 = "「……」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そう考えたら――コワイとかサミシイとかより、\nやらなくちゃって、思ったの」
2303 = "「Nghĩ vậy thì——thay vì sợ hãi hay cô đơn, tôi lại nghĩ là mình phải làm việc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l保線;#00ffc040;保線%l;#;の――ここの、仕事をか？」
2935 = "「Công việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#;——ở đây sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ！　だってオリヴィ、マカされたから！」
2765 = "「Đúng vậy! Bởi vì Olivy, đã được giao phó mà!」"
# monologue
# JP: ぶるり、オリヴィの体が震える。
4047 = "Run rẩy, cơ thể Olivy run lên."
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん？　それ以上濡れると、体に毒です」
2419 = "「Bé Olivy? Nếu cứ để ướt thêm nữa thì sẽ có hại cho cơ thể đấy ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「体にドクって、だからオリヴィ――っ！」
2385 = "「Có hại cho cơ thể, thế nên Olivy——!」"
# monologue
# JP: ハチロクは、じっとオリヴィを見る。\nオリヴィも視線をそらさず、じっと見返す。
3580 = "Hachiroku chăm chú nhìn Olivy. Olivy cũng không né tránh ánh mắt, chăm chú nhìn lại."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……だね。ちょっとでも大事にした方が、\nちゃんとやりきれる可能性、あがるもんね」
1743 = "「……Đúng nhỉ. Chăm sóc bản thân thêm một chút, thì khả năng hoàn thành trọn vẹn công việc sẽ tăng lên mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな」
2634 = "「Ừ, đúng vậy.」"
# monologue
# JP: 今すぐにでも宗方さんを呼ぶべきか――\nそんな考えも頭をよぎる。
3929 = "Có nên gọi anh Munakata đến ngay bây giờ không—— Suy nghĩ đó thoáng qua trong đầu tôi."
# monologue
# JP: が……このまま熱が下がらなくとも、\nそれがすぐさま、機能停止に直結するとは限らない。
3633 = "Nhưng…… dù nhiệt độ không hạ xuống, thì cũng không hẳn là sẽ dẫn đến việc ngừng hoạt động ngay lập tức."
# monologue
# JP: （活動自体は出来ているのだし、休むべきを休ませて――\n不死鳥博士に、なんとか御一夜に運んでもらおう）
4147 = "（Vẫn có thể tự hoạt động được, cứ để cô ấy nghỉ ngơi những lúc cần thiết—— rồi nhờ Tiến sĩ Fushicho tìm cách đến Ohito.）"
# monologue
# JP: 決意をすれば、気持ちが落ち着く。\nやるべきことを、あとは順番にやっていくだけだ。
3500 = "Đưa ra quyết định, tâm trạng tôi bình tĩnh lại. Những việc cần làm, chỉ cần lần lượt thực hiện là được."
# 【双鉄】
# display as 雙鐵
# JP: 「流さんも言っていたが、長丁場になるかもしれん。\nできるだけ早く、ともかく専門家に診てもらおう」
2979 = "「Ông Nagare cũng đã nói, có thể sẽ là một cuộc chiến trường kỳ. Càng sớm càng tốt, dù sao cũng phải nhờ chuyên gia khám cho cô.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、診てもらっても」
3235 = "「Đã bảo là, dù có khám thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「諦めるには早すぎる。例えば明日、\x%lタブレット;#00ffc040;タブレット%l;#;に関する\n新しい知見が発見されるかもしれない」
2997 = "「Bỏ cuộc bây giờ là quá sớm. Ví dụ như ngày mai, có thể sẽ phát hiện ra kiến thức mới liên quan đến \\x%lタブレット;#00ffc040;thẻ bảng%l;#; thì sao.」"
# monologue
# JP: 言えば、オリヴィは苦笑する。
3722 = "Nghe vậy, Olivy cười khổ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……まぁ、可能性、ゼロじゃないけど」
1784 = "「……À thì, khả năng đó, cũng không phải là không có.」"
# monologue
# JP: そう、ゼロでは無い。\nならば、自暴自棄になる必要はない。
3770 = "Đúng vậy, không phải là không có. Vậy thì, không cần phải tuyệt vọng."
# monologue
# JP: 伝えるために――\nゆっくり、慎重に言葉を選ぶ。
3954 = "Để truyền đạt cho cô ấy hiểu—— tôi từ từ, thận trọng chọn lọc từng từ."
# 【双鉄】
# display as 雙鐵
# JP: 「今日オリヴィが頑張って聞き取りをしてくれたおかげで、\nここの常時監視体制が、急ピッチで整えられた」
2390 = "「Nhờ hôm nay Olivy đã cố gắng nghe ngóng, mà hệ thống giám sát thường trực ở đây đã được thiết lập nhanh chóng.」"
# monologue
# JP: 本当に皆、驚くほどに積極的に協力を申し出てくれた。\n御一夜の人たちだけでなく、湯医や術仙の人たちまでも。
3680 = "Thật sự mọi người đã chủ động đề nghị hợp tác một cách tích cực đến kinh ngạc. Không chỉ người dân Ohito, mà cả người dân Yui và Jutsusen nữa."
# monologue
# JP: 防災のため、鉄道輸送を維持するため――\nそれだけではなく、きっと、オリヴィの願いを叶えるため。
3536 = "Vì phòng chống thiên tai, vì duy trì vận tải đường sắt—— Không chỉ vậy, chắc chắn còn là vì muốn thực hiện mong ước của Olivy."
# 【双鉄】
# display as 雙鐵
# JP: 「その体制を最も有効に機能させるためには、\nオリヴィの知見が必要だ」
2348 = "「Để hệ thống đó hoạt động hiệu quả nhất, thì cần có kiến thức của Olivy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「う……ん――」
2594 = "「Ư……m——」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんにきちんと休んでもらって初めて、\nその知識と技術とを、チームで共有できるのです」
2699 = "「Chỉ khi bé Olivy được nghỉ ngơi đàng hoàng, thì kiến thức và kỹ thuật đó mới có thể chia sẻ cho cả đội được.」"
# monologue
# JP: とても静かなハチロクの声。
3573 = "Giọng nói của Hachiroku rất tĩnh lặng."
# monologue
# JP: オリヴィは――どこかぽかんとした表情で。\nそれからゆっくり、ゆっくりゆっくり、口を動かす。
3729 = "Olivy——với vẻ mặt có chút ngơ ngác. Rồi từ từ, từ từ từ từ, cô ấy mấp máy môi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィの知ってることを――チームで、共有」
2763 = "「Những điều Olivy biết——chia sẻ, cho cả đội.」"
# 【ハチロク】
# display as 八六
# JP: 「そうして皆が、オリヴィちゃんの目となり、手となる。\nオリヴィちゃんは、皆の頭脳になってください」
3148 = "「Và rồi mọi người sẽ trở thành đôi mắt, đôi tay của bé Olivy. Bé Olivy hãy trở thành bộ não của mọi người nhé.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどっ――でも、オリヴィ――\n今までそんなことしたことないし」
2502 = "「Nhưng mà——nhưng, Olivy—— từ trước đến giờ chưa từng làm chuyện như vậy.」"
# monologue
# JP: ……そうなのだろう。その素晴らしい能力を、経験を、\nオリヴィはいままで、末端でしか活用できていなかった。
1696 = "……Chắc là vậy rồi. Năng lực tuyệt vời đó, kinh nghiệm đó, Olivy từ trước đến nay chỉ có thể sử dụng ở cấp thấp nhất."
# monologue
# JP: チームを組む。その上に立ち、全体としての結果を求める。\n100年以上の経験から、そこだけは完全に抜け落ちていた。
3834 = "Lập thành một đội. Đứng trên đội đó, hướng tới kết quả của cả tập thể. Trong hơn 100 năm kinh nghiệm, chỉ duy nhất phần đó là hoàn toàn trống rỗng."
# 【ハチロク】
# display as 八六
# JP: 「いいえ、オリヴィちゃん。いいえ」
2321 = "「Không đâu, bé Olivy. Không đâu.」"
# monologue
# JP: けれど、僕らは確信している。\nだから、まよわず保証できる。
3551 = "Nhưng, chúng tôi tin chắc điều đó. Nên chúng tôi có thể đảm bảo không chút do dự."
# 【双鉄】
# display as 雙鐵
# JP: 「チームを機能させる準備であれば、もうできている。\nオリヴィと僕らが今まで、積み重ねてきた時間によって」
3057 = "「Nếu là chuẩn bị để đội hoạt động, thì đã xong rồi. Nhờ vào khoảng thời gian mà Olivy và chúng tôi đã tích lũy từ trước đến nay.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――」
# 2554 = "「啊——」" 
# 【双鉄】
# display as 雙鐵
# JP: 「チームを組むとはそういうことだ。オリヴィは、\n僕らの頭脳となりうるがゆえ、宗方さんに任されたのだ」
2887 = "「Lập đội chính là như vậy đó. Olivy, vì có thể trở thành bộ não của chúng tôi, nên mới được anh Munakata giao phó.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「できる、のかな。オリヴィが、みんなのズノーに……\nみんなが、オリヴィの、目とか、手とかに」
3020 = "「Liệu có làm được, không nhỉ. Olivy, trở thành bộ não của mọi người…… mọi người, trở thành mắt, thành tay của Olivy.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。出来ます。そうしてこれは――\nオリヴィちゃんにしか、出来ないことです」
2631 = "「Vâng. Chắc chắn được ạ. Và đây là điều—— chỉ có bé Olivy mới làm được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうするためにも、どうか延命の可能性にかけてくれ。\n僕ら全員が、ここで、オリヴィの代わりに監視するから」
2986 = "「Để làm được điều đó, xin cô hãy đánh cược vào khả năng kéo dài tuổi thọ. Tất cả chúng tôi, sẽ ở đây, giám sát thay cho Olivy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ぁ……。ん――。\nんっと――んとっ！　えとっ！！」
2559 = "「A……. Ưm——.\nỜm——ờm! Ờm!!」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
2524 = "「Ôi chà!」"
# monologue
# JP: とんっ、と、オリヴィが僕らの傘に飛び込んでくる。\nただそれだけで、比喩では無しに、暖かくなる。
3719 = "Bịch, Olivy lao vào ô của chúng tôi. Chỉ vậy thôi, không phải nói quá, tôi cảm thấy ấm áp hẳn lên."
# monologue
# JP: ……それほどの熱を発しながらもオリヴィは、\n何より明るい、オリヴィの笑顔を浮かべてくれる。
1690 = "……Dù đang tỏa ra lượng nhiệt lớn như vậy, nhưng Olivy, lại nở nụ cười tươi sáng nhất, nụ cười của riêng Olivy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！　じゃ、そーする！！！」
2727 = "「Hiểu rồi! Vậy, tôi sẽ làm thế!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば――今すぐにでもナビにおくらせ」
3152 = "「Vậy sao, nếu thế thì——để Navi đưa cô về ngay bây giờ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それはダメ！　だって今日、\n他にツゴーつく人、いなかったんでしょ？」
3175 = "「Như vậy không được! Vì hôm nay, không có ai khác rảnh rỗi cả đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……まぁ、そうなのだが――\nしかし、日々姫か真闇姉に頼めば」
3139 = "「Chuyện đó thì…… ừm, đúng là vậy—— Nhưng mà, nếu nhờ Hibiki hoặc chị Mayami.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムリさせちゃだめだよ！！　ヒビキ、乗務とデザインと、\nあと……オリヴィのカンビョーも、してくれてたから」
2329 = "「Không được ép họ đâu!! Hibiki, vừa làm việc trên tàu, vừa thiết kế, với lại…… còn chăm sóc Olivy nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……うむ」
1761 = "「……Ừm.」"
# monologue
# JP: そこは、動かしがたい事実だ。
4062 = "Đó là sự thật không thể chối cãi."
# monologue
# JP: 日々姫も真闇姉も、程度の差はあれ、\nいくらかの過労状態にあり、睡眠を十分にはとれていない。
3570 = "Cả Hibiki và chị Mayami, dù mức độ khác nhau, nhưng đều đang trong tình trạng làm việc quá sức, và không ngủ đủ giấc."
# 【ハチロク】
# display as 八六
# JP: 「『今夜はせめてぐっすり眠り、明日以降に備えてくれ』\n……左様におっしゃったのは、双鉄さまではないですか」
3258 = "「『Đêm nay ít nhất hãy ngủ một giấc thật ngon, để chuẩn bị cho những ngày tới』 ……Người nói câu đó, chẳng phải là ngài Soutetsu sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
2550 = "「Hửm.」"
# monologue
# JP: それは間違いない事実なのだが、まさかこのタイミングで、\nハチロクが指摘するとは思わなかった。
4085 = "Đó là sự thật không thể chối cãi, nhưng không ngờ vào lúc này, Hachiroku lại chỉ ra điều đó."
# monologue
# JP: ならば――あるいは。僕が認識しているよりも、\nオリヴィの状態は遥かに厳しいということなのかも――
3763 = "Nếu vậy thì——hoặc là. Tình trạng của Olivy, có lẽ còn nghiêm trọng hơn nhiều so với những gì tôi nhận thức được——"
# monologue
# JP: （いや、落ち着け双鉄。悲観に引きずられてどうするのだ。\n大方針は既にたてた。オリヴィも同意した。ならば――）
4124 = "（Không, bình tĩnh lại đi Soutetsu. Bị sự bi quan lôi kéo thì làm được gì. Phương hướng lớn đã định rồi. Olivy cũng đã đồng ý. Nếu vậy thì——）"
# 【双鉄】
# display as 雙鐵
# JP: 「……そうだったな。そのとおりだ」
1775 = "「……Đúng là vậy. Em nói đúng.」"
# monologue
# JP: 長く、ゆっくり息を吐く。\n真面目くさった顔を作るよう、意識する。
3875 = "Tôi thở ra một hơi dài, chậm rãi. Cố ý làm ra vẻ mặt nghiêm túc."
# 【双鉄】
# display as 雙鐵
# JP: 「で？\n体温は、どうやってごまかしたんだ？」
2885 = "「Thế?\nNhiệt độ cơ thể, cô đã lấp liếm bằng cách nào?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふぇ！？」
2532 = "「Hả!?」"
# monologue
# JP: 情報を得て悲観を捨てる、そのために、\n半ば無理やり話を戻せばオリヴィは驚いた声をだす。
3879 = "Để thu thập thông tin và gạt bỏ sự bi quan, tôi nửa ép buộc chuyển chủ đề, khiến Olivy phát ra tiếng kêu kinh ngạc."
# monologue
# JP: そうして小さく、\n照れくさそうな困ったような微笑をうかべ――
3960 = "Rồi cô ấy khẽ mỉm cười, một nụ cười ngượng ngùng và có chút bối rối——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「これ。ニイロクにどうしても、ってお願いしたの」
2928 = "「Cái này. Tôi đã năn nỉ Niiroku giúp bằng mọi giá.」"
# 【ハチロク】
# display as 八六
# JP: 「『ひとくちプルルンゼリイ』――あ！」
1712 = "「『Thạch dẻo một miếng』——A!」"
# monologue
# JP: ポケットからオリヴィが取り出したひとくちゼリー。\n容器は、なるほど。今朝床に落ちていた、そのものだ。
3711 = "Món thạch một miếng mà Olivy lấy ra từ túi. Ra là vậy. Chính là cái vỏ hộp rơi trên sàn sáng nay."
# 【ハチロク】
# display as 八六
# JP: 「これを、お口の中にあらかじめ仕込んでおいて？」
2423 = "「Cô ngậm sẵn cái này trong miệng à?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。何回か練習してからって思ったんだけど、\nソーテツとハチロク、いつもより早かったから」
2618 = "「Ừm. Tôi định luyện tập vài lần rồi mới làm, nhưng Soutetsu và Hachiroku lại đến sớm hơn mọi khi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「試験が足りずうまくいかずに、\n思ったよりも低すぎる体温が出てしまったわけか」
2898 = "「Vì chưa thử nghiệm đủ nên không suôn sẻ, thành ra nhiệt độ đo được lại thấp hơn dự tính sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「シッパイした！　って思ったけど――でも！\nソーテツもハチロクもいかせてくれて、嬉しかった！」
3250 = "「Tôi cứ tưởng là hỏng bét rồi! ——Nhưng mà! Soutetsu và Hachiroku vẫn cho tôi đi, tôi vui lắm!」"
# monologue
# JP: ありがとね、とオリヴィは屈託の無い笑顔を浮かべる。
3753 = "Cảm ơn nhé, Olivy nở nụ cười rạng rỡ không chút muộn phiền."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ゴマカシたってすぐにバレるの、カクゴしてたけど、\nこんなカタチでとは思わなかったなー」
3251 = "「Tôi đã chuẩn bị tinh thần là lấp liếm thì sẽ bị lộ ngay, nhưng không ngờ lại bị lộ theo cách này đó~」"
# monologue
# JP: 笑顔のままにそう言って、オリヴィは、\nニイロクから託されたクーラーボックスの中味を取り出す。
3716 = "Vẫn giữ nguyên nụ cười, Olivy lấy đồ bên trong chiếc hộp giữ nhiệt mà Niiroku gửi gắm ra."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ひんやりするヤツ！　ホレーザイ！　こんなにたくさん、\n『なんで？』ってことになっちゃうに決まってるのに」
3234 = "「Đồ làm mát! Túi đá! Nhiều thế này, chắc chắn sẽ bị hỏi là 『Tại sao?』 mà.」"
# 【ハチロク】
# display as 八六
# JP: 「いえ。なんで、とは聞きませんでしたよ？\n自明のことに思えましたので」
2347 = "「Không đâu. Chúng tôi không hỏi tại sao đâu ạ? Vì điều đó quá hiển nhiên rồi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなんだ」
# 3150 = "「這樣啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ニイロクも、何も言わなかった。\nただ、これをオリヴィにと、それだけだ」
2365 = "「Niiroku cũng không nói gì cả. Chỉ bảo đưa cái này cho Olivy, vậy thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……そーなんだ」
1785 = "「……Vậy sao.」"
# monologue
# JP: オリヴィがクっと下を向き、\nけれどもすぐにその顔を、慌てたように持ち上げ直す。
3726 = "Olivy cúi gầm mặt xuống, nhưng ngay lập tức ngẩng lên với vẻ hốt hoảng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ニーロクはなんにも悪くないよ！！？　オリヴィ、\nひとくちゼリー買ってきてって、たのんだだけだし」
2415 = "「Niiroku không có lỗi gì đâu!!? Olivy, chỉ nhờ cô ấy mua thạch một miếng thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっている。ニイロクは何も知らずに、\nただ、オリヴィの頼みを引き受けただけだ」
2856 = "「Tôi biết. Niiroku không biết gì cả, chỉ là nhận lời nhờ vả của Olivy thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっか、ならよかったー」
3149 = "「Vậy sao, thế thì tốt quá~」"
# monologue
# JP: ほっとしたようにオリヴィは、\n無数の保冷剤の中から一つを取り出し、首筋にあてる。
3730 = "Như trút được gánh nặng, Olivy lấy một túi đá trong vô số túi đá ra, áp lên cổ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー。冷たい、気持ちいー」
2579 = "「A~. Lạnh quá, sướng ghê~」"
# monologue
# JP: ……すべての想いを、優しさを、\nできるだけいい方向に持っていきたい。
1688 = "……Mọi tâm tư, mọi sự dịu dàng, tôi muốn hướng chúng đến một kết quả tốt đẹp nhất có thể."
# monologue
# JP: そう考えれば、言葉は自然と、穏やかになる。
3499 = "Nghĩ vậy, lời nói tự nhiên cũng trở nên ôn hòa."
# 【双鉄】
# display as 雙鐵
# JP: 「……今夜はこのまま、僕ら三人で当直につこう」
1753 = "「……Đêm nay cứ như vậy đi, ba chúng ta sẽ trực.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だね。三人いないと、コータイで休めないもんね」
2768 = "「Đúng nhỉ. Phải có ba người thì mới thay phiên nhau nghỉ được chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ」
2953 = "「Đúng là vậy.」"
# monologue
# JP: 現状を受け入れ、諦めず。\nいまいる場所からの最善を常に模索する――
3845 = "Chấp nhận hiện trạng, không bỏ cuộc. Luôn tìm kiếm điều tốt nhất từ nơi mình đang đứng——"
# monologue
# JP: そうあろうとしていた地点に、\n僕もオリヴィも、ようやく、立ち返ってこれた。
3517 = "Vị trí mà chúng tôi đã luôn cố gắng hướng tới đó, cả tôi và Olivy, cuối cùng cũng đã có thể quay trở lại."
# 【双鉄】
# display as 雙鐵
# JP: 「では、そう動こう。\nひとまず、僕らの当番時間となるのは、明朝[よじ,3]0400までだ」
3206 = "「Vậy thì, cứ thế mà làm. Trước mắt, thời gian trực của chúng ta là đến 0400 sáng mai.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「始発に間に合うよーに？」
2924 = "「Để kịp chuyến tàu đầu tiên hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。８時間３交代で回していく」
2961 = "「Ừm. Xoay vòng 3 ca, mỗi ca 8 tiếng.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら――\n[よじ,3]0400-[じゅうにじ,3]1200。1200-[にじゅうじ,3]2000。2000-0400、だね？」
3173 = "「Vậy thì——\n0400-1200. 1200-2000. 2000-0400, nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。で、僕ら担当の八時間も三交代とし、\n一人ずつ順番に休養をとろう」
2620 = "「Ừm. Và 8 tiếng do chúng ta phụ trách cũng sẽ chia làm 3 ca, mỗi người lần lượt nghỉ ngơi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかったー」
2710 = "「Hiểu rồi~」"
# monologue
# JP: ハチロクの言が効いたのだろう。\nオリヴィは、至極素直に頷いてくれる。
3530 = "Chắc là lời nói của Hachiroku đã có tác dụng. Olivy gật đầu một cách vô cùng ngoan ngoãn."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、順番は？　誰から休むの？？」
2883 = "「Vậy, thứ tự thì sao? Ai nghỉ trước??」"
# monologue
# JP: （ヒュォォォォ――）
4133 = "（Vù vù vù vù——）"
# monologue
# JP: ……風と雪とが、音を消します。
1698 = "……Gió và tuyết, đã xóa nhòa âm thanh."
# monologue
# JP: 保線基地の中、お眠りだろう双鉄さまの寝息さえ、\nわたくしの耳には届きません。
3920 = "Dù ở trong căn cứ bảo trì đường ray, nhưng ngay cả tiếng thở đều đều của ngài Soutetsu đang ngủ, cũng không thể truyền đến tai em."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「みんな、眠ってる時間だねー」
2654 = "「Giờ này mọi người đang ngủ hết rồi nhỉ~」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\n誰もが、夢の中にいる――」
3094 = "「Đúng vậy ạ.\nAi cũng đang chìm trong giấc mộng——」"
# monologue
# JP: 思えばふっと、不安になります。\n平日の夜。みなが在宅し、眠りに落ちている。
3824 = "Nghĩ lại, em chợt thấy bất an. Đêm ngày thường. Mọi người đều ở nhà và đang say giấc."
# monologue
# JP: この時間帯に、もしも災害が起きたのならば、\n被害はどれほど大きくなってしまうのでしょう。
3561 = "Trong khoảng thời gian này, nếu như có thảm họa xảy ra, thì thiệt hại sẽ lớn đến nhường nào chứ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ううっ」
2592 = "「Ưư.」"
# monologue
# JP: ぶるりと、オリヴィちゃんが震えます。
3721 = "Run rẩy, bé Olivy khẽ rùng mình."
# monologue
# JP: いけません。いまわたくしが見るべきは、\n悪い想像などではなく、目の前にある現実たちです。
3513 = "Không được. Điều em nên nhìn lúc này, không phải là những tưởng tượng tồi tệ, mà là hiện thực trước mắt."
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん、寒いのですか？」
2698 = "「Bé Olivy, em thấy lạnh sao ạ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ぜーんぜん！　あっついくらいだよー。\nハチロクこそ、寒くないのー？」
2546 = "「Không hề! Nóng muốn chết luôn đây này~. Hachiroku mới là người không thấy lạnh sao~?」"
# 【ハチロク】
# display as 八六
# JP: 「ええ、少しも。\nオリヴィちゃんの肩と、双鉄さまの傘がございますので」
2628 = "「Vâng, không lạnh chút nào ạ. Vì em có bờ vai của bé Olivy, và chiếc ô của ngài Soutetsu che chở mà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっか！　なら、もっとくっついてあげるね。\nぴとーーーーっ」
3151 = "「Vậy sao! Thế thì, tôi sẽ ôm sát cậu hơn nữa nhé. Áp sát~」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、なんとあたたかなことでしょう」
2529 = "「Ôi chà, thật là ấm áp làm sao.」"
# monologue
# JP: ……あたたかすぎます。\n双鉄さまがお使いになる、ゆたんぽよりもあたたかなほど。
1694 = "……Quá ấm áp luôn ạ. Thậm chí còn ấm hơn cả chiếc túi chườm nóng mà ngài Soutetsu hay dùng."
# 【ハチロク】
# display as 八六
# JP: 「では、わたくしもおかえしです。\nぴとっ」
3212 = "「Vậy thì, em cũng xin đáp lễ ạ.\nÁp sát.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「きもちいー！　ハチロクはひんやりだねー」
2985 = "「Thích quá~! Hachiroku mát lạnh ghê~」"
# monologue
# JP: わたくしの服でむき出しの部分など、ほんのわずか。
3869 = "Phần da thịt lộ ra ngoài trang phục của em, chỉ có một chút xíu."
# monologue
# JP: そのわずかである頬を頬へと押し付けたなら、\nオリヴィちゃんは、しあわせそうな声で笑って下さいます。
4008 = "Chỉ cần áp phần má nhỏ bé ấy vào má bé Olivy, bé ấy liền bật cười với giọng điệu vô cùng hạnh phúc."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどそれって、やっぱり冷え切ってるってことだよね？\nハチロクは、保線基地の中から見ててもいいよ？」
2500 = "「Nhưng mà như vậy, quả nhiên là cậu đang bị lạnh cóng rồi đúng không? Hachiroku, cậu cứ vào trong căn cứ bảo trì đường ray quan sát cũng được mà?」"
# 【ハチロク】
# display as 八六
# JP: 「その間、オリヴィちゃんは？」
3167 = "「Trong lúc đó, bé Olivy thì sao ạ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィは、ここを見てたい。\n何かあるとしたら、きっとここって思うから」
2687 = "「Olivy, muốn quan sát ở đây. Vì tôi nghĩ nếu có chuyện gì xảy ra, thì chắc chắn là ở đây.」"
# 【ハチロク】
# display as 八六
# JP: 「確かに、ここで何かあっても――この風と雪では、\n保線基地からでは音にさえ気づけないかもしれませんね」
3008 = "「Quả thực, dù ở đây có xảy ra chuyện gì——thì với gió và tuyết thế này, ở trong căn cứ bảo trì đường ray có lẽ cũng không thể nhận ra được âm thanh.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよねー。\n保線基地からだと、ここって全然見えないもんねー」
2785 = "「Đúng vậy nhỉ~. Từ căn cứ bảo trì đường ray nhìn ra, chỗ này hoàn toàn là góc khuất mà~」"
# monologue
# JP: 保全のための資材と道具とを揃え、\n簡易的にでも休憩できる広さと設備。
4063 = "Tập hợp đầy đủ vật tư và dụng cụ để bảo trì, với không gian và thiết bị đủ để nghỉ ngơi dù chỉ là tạm bợ."
# monologue
# JP: 双鉄さまは、ときおり“小屋”と呼ばわれますが、\nなかなかどうして、小さな物ではございません。
4086 = "Ngài Soutetsu thỉnh thoảng gọi nó là \"túp lều\", nhưng thực ra, nó không hề nhỏ bé chút nào."
# 【ハチロク】
# display as 八六
# JP: 「簡素とはいえ、やはり面積がありますものね。\nこの近くで広さを取れれば、一番よろしかったのですが」
3253 = "「Dù đơn giản, nhưng vẫn chiếm một diện tích nhất định nhỉ. Nếu có thể tìm được không gian rộng rãi gần đây thì tốt nhất rồi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ナイモノネダリしてもしょーがないよ。事故とかが、\nこっちのツゴーにあわせてくれるわけないんだし！」
2889 = "「Có đòi hỏi những thứ không có cũng vô ích thôi. Tai nạn các thứ, làm gì có chuyện nó xảy ra theo ý mình chứ!」"
# 【ハチロク】
# display as 八六
# JP: 「それは――まことに左様ですね」
3010 = "「Điều đó——quả thật là đúng như vậy ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だからオリヴィ。ここから見てる」
2879 = "「Thế nên Olivy. Sẽ quan sát từ đây.」"
# monologue
# JP: ぶるりと、オリヴィちゃんがまた震えます。
4046 = "Run rẩy, bé Olivy lại rùng mình một lần nữa."
# monologue
# JP: ――寒さではないとおっしゃいました。\nならばなおさら、よりそう相手が必要です。
1659 = "——Bé ấy đã nói là không phải vì lạnh. Vậy thì càng cần có người ở bên cạnh hơn nữa."
# 【ハチロク】
# display as 八六
# JP: 「でしたら、わたくしもここから見ます」
3210 = "「Nếu vậy, em cũng sẽ quan sát từ đây ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっか！」
2308 = "「Vậy sao!」"
# monologue
# JP: ――ぽかっ。あたたかみが増します。
3897 = "——Bịch. Hơi ấm tăng lên."
# monologue
# JP: オリヴィちゃんが、甘えるように、\nわたくしにもたれかかってきてくださいます。
3710 = "Bé Olivy, như thể đang làm nũng,\ntựa hẳn vào người em."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……最初ね？　オヒトヨ鉄道いけっていわれたとき。\nオリヴィ、捨てられたって思ったの」
1780 = "「……Lúc đầu ấy? Khi bị bảo là đến Đường sắt Ohito. Olivy, đã nghĩ là mình bị vứt bỏ rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「で、ございましょうね」
3141 = "「Chắc là vậy rồi ạ.」"
# monologue
# JP: オリヴィちゃんにとっての宗方様は、\nわたくしにとっての双鉄さま。
3766 = "Đối với bé Olivy, ngài Munakata cũng giống như ngài Soutetsu đối với em vậy."
# monologue
# JP: 一緒に居られるのであれば、世界のどこに追われようとも、\n何の恐れもございませぬが――
4023 = "Nếu được ở bên nhau, thì dù có bị đuổi đến tận cùng thế giới, cũng chẳng có gì phải sợ hãi——"
# 【ハチロク】
# display as 八六
# JP: 「……離れ離れに、なってしまったのですものね」
1779 = "「……Vậy mà lại phải, chia xa nhau mất rồi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ。だからすっごくイヤだったし、サミシかったし、\nみかん鉄道に帰りたいって、それだけだったの」
2773 = "「Đúng vậy. Nên tôi đã rất ghét, rất buồn, và chỉ muốn quay về Đường sắt Mikan thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2597 = "「嗯」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどね？　今はね、\n来てよかった！　って思ってる」
2344 = "「Nhưng mà nhé? Bây giờ thì, tôi nghĩ là thật tốt vì đã đến đây!」"
# monologue
# JP: ぽかっと。また、あたたかみ。
3829 = "Bịch. Lại thêm một luồng hơi ấm."
# monologue
# JP: オリヴィちゃんとわたくしと、\n姿勢を変えておりませんのに。
3919 = "Dù tư thế của bé Olivy và em, hoàn toàn không thay đổi."
# 【ハチロク】
# display as 八六
# JP: 「そのように思っていただけるのでしたら、\nわたくしも本当に幸せです」
3064 = "「Nếu bé Olivy nghĩ được như vậy, thì em cũng thực sự rất hạnh phúc ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　オリヴィもね、すっごくしあわせ！！」
2601 = "「Ừm! Olivy cũng vậy, rất là hạnh phúc luôn!!」"
# monologue
# JP: ――ああ、なんという笑顔でしょう。\n双鉄さまにお見せ出来ないのが申し訳ない――
1658 = "——A, thật là một nụ cười rạng rỡ làm sao. Thật tiếc vì không thể cho ngài Soutetsu cùng xem——"
# monologue
# JP: けれど、心のほんの少しは、浅ましいこととわかっても、\n独り占めできることを喜んでしまう――そんな笑顔。
3640 = "Nhưng, dù biết là hơi ích kỷ, trong thâm tâm em, vẫn cảm thấy vui sướng vì được độc chiếm nụ cười ấy——một nụ cười như vậy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィさ。\nもーいつ止まるかっていう状況でしょう？」
3079 = "「Olivy ấy mà. Giờ đang trong tình trạng không biết lúc nào sẽ dừng hoạt động đúng không?」"
# 【ハチロク】
# display as 八六
# JP: 「そのようなことは」
2817 = "「Làm gì có chuyện đó ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あるの。っていうか……」
2814 = "「Có đó. Nói đúng hơn là……」"
# monologue
# JP: オリヴィちゃんが、下を向きます。\nそうしてそっと、おそるおそると、わたくしを見ます。
3720 = "Bé Olivy, cúi gầm mặt xuống. Rồi khẽ khàng, rụt rè, ngước lên nhìn em."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「え、と――\x%l共感;#00ffc040;共感%l;#;。もう少し深く受け取ってみる？\nハチロクがもしイヤじゃなければ」
3170 = "「Ờ, thì——\\x%l共感;#00ffc040;cộng cảm%l;#;. Cậu có muốn thử tiếp nhận sâu hơn một chút không? Nếu Hachiroku không thấy phiền.」"
# 【ハチロク】
# display as 八六
# JP: 「イヤなはずなどございません！\nわたくしはむしろいつだって」
2815 = "「Làm sao em lại thấy phiền được chứ! Ngược lại, em lúc nào cũng sẵn lòng ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら！　ちょとだけ範囲ひろげて――\nほんの一瞬、ガマン、やめるね？」
3181 = "「Vậy thì! Mở rộng phạm vi ra một chút nhé—— Chỉ một khoảnh khắc thôi, tôi sẽ ngừng chịu đựng nhé?」"
# monologue
# JP: オリヴィちゃんの指先が、\nわたくしの指先をそっと捕まえ――
3714 = "Đầu ngón tay của bé Olivy, nhẹ nhàng nắm lấy đầu ngón tay em——"
# 【オリヴィ】
# display as 奥莉薇＆八六
# JP: 「っ」\n「っっっ！！！？」
2590 = "「!」\n「!!!?」"
# 【ハチロク】
# display as 八六
# JP: 「あっ――あっ――あっ――あっ――」
2555 = "「A——a——a——a——」"
# monologue
# JP: 吸気が――排気が――できなくなります。\n涙が、ぼろぼろと零れます。
3878 = "Em không thể hít vào——không thể thở ra——được nữa. Nước mắt, tuôn rơi lã chã."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……っ――ぁ――。\nごめん、ね？　おどろかせちゃったよね」
1760 = "「……A——.\nXin lỗi, nhé? Làm cậu giật mình rồi nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「おどろいた――ああ――はい――いえ――\nいえ――わたくしっ」
2652 = "「Giật mình——A——vâng——không——\nKhông——em」"
# monologue
# JP: 渦巻くような、それは苦痛。
3895 = "Một nỗi đau đớn cuộn trào như bão táp."
# monologue
# JP: 引き込まれ、呑まれてしまえば開放される――\nすべてを放棄してしまうことへの、余りにも甘美な[いざな]誘い。
3622 = "Nếu bị cuốn vào, bị nuốt chửng thì sẽ được giải thoát—— Một lời mời gọi quá đỗi ngọt ngào để từ bỏ tất cả."
# 【ハチロク】
# display as 八六
# JP: 「このような――このような状態で――\nオリヴィちゃんは――よく――いつもどおりに」
2700 = "「Trong tình trạng——trong tình trạng như thế này—— Bé Olivy——sao vẫn có thể——tỏ ra bình thường được chứ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そう思われたら、ハチロク、オリヴィを止めたでしょ？\nだから、ハチロクとはキョリおいてたの――ごめんね？」
3077 = "「Nếu để cậu biết, Hachiroku, cậu sẽ ngăn Olivy lại đúng không? Nên tôi mới giữ khoảng cách với Hachiroku——xin lỗi nhé?」"
# 【ハチロク】
# display as 八六
# JP: 「いえ。いいえ。\nごめんだなどと、そのような――」
2325 = "「Không. Không đâu ạ.\nSao bé lại phải xin lỗi chứ——」"
# monologue
# JP: どれほど止めたく思えども……\nわたくしには、きっと止められずにいたことでしょう。
3605 = "Dù em có muốn ngăn cản đến nhường nào…… Thì chắc chắn em cũng không thể nào ngăn cản được."
# monologue
# JP: かほど凄まじい苦痛に耐えて、\nその上でなお、果たしたいことがあるのなら――
3619 = "Chịu đựng nỗi đau đớn khủng khiếp đến nhường này, mà vẫn còn điều muốn hoàn thành cho bằng được——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けっこーオリヴィつらくって。だから、今日とかもう、\nここを見ながら止まってもいいかなっても思ったの」
2453 = "「Olivy cũng thấy khá là khó khăn. Nên hôm nay, tôi đã nghĩ, hay là cứ quan sát ở đây rồi dừng hoạt động luôn cũng được.」"
# 【ハチロク】
# display as 八六
# JP: 「は……い」
2593 = "「Vâ……ng.」"
# monologue
# JP: その考えを、否定することさえもうできません。
3866 = "Ngay cả việc phủ nhận suy nghĩ đó, em cũng không thể làm được nữa."
# monologue
# JP: あの苦しみに耐えろなどと――\nオリヴィちゃんに、もうわたくしは願えません。
3847 = "Bảo bé Olivy phải chịu đựng nỗi đau đớn đó—— Em không thể nào mở miệng cầu xin bé ấy được nữa."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど。ハチロクとソーテツが来てくれて話してくれて。\nそっかって思って。そしたら、オリヴィ、思い出したの」
2407 = "「Nhưng mà. Hachiroku và Soutetsu đã đến và nói chuyện với tôi. Tôi đã nghĩ ra là vậy. Và rồi, Olivy, đã nhớ ra.」"
# 【ハチロク】
# display as 八六
# JP: 「思い出した……なにを、ですか？」
2825 = "「Nhớ ra…… chuyện gì, cơ ạ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヒビキとマクラ。オリヴィがこのまま止まったら、\nふたりも、オリヴィも、とってもサミシイって思ったの」
2827 = "「Hibiki và Makura. Nếu Olivy cứ thế này mà dừng lại, thì cả hai người họ, và cả Olivy nữa, sẽ rất buồn.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ……ああ。\n――きっと、左様でございましょうね」
2596 = "「A……A.\n——Chắc chắn, là như vậy rồi ạ.」"
# monologue
# JP: 『オリヴィちゃんの望んだこと』と、\nわたくしの[あね,1]義姉と[いもうと,1]義妹も、やはり静かに受け入れましょう。
3777 = "Nếu là 『điều bé Olivy mong muốn』, thì chị gái và em gái nuôi của em, chắc chắn cũng sẽ lặng lẽ chấp nhận thôi."
# monologue
# JP: そうして、誰もいないところで――\nひそかにさみしく、泣くことでしょう。
4006 = "Và rồi, ở một nơi không có ai—— họ sẽ âm thầm rơi những giọt nước mắt cô đơn."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そのサミシイのはすごくヤだなって、オリヴィ思って。\nそしたら、ね？　もう少しだけがんばろーって思えたの」
2689 = "「Nỗi buồn đó, Olivy rất ghét. Nên là, cậu biết không? Tôi đã nghĩ mình phải cố gắng thêm một chút nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「――はい」
1706 = "「——Vâng.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「アンセーにしてるのが、ホントは一番クルシイの。\n時間どんどんすぎちゃって、何も出来ないって思うから」
2454 = "「Thực ra, việc cứ nằm im tĩnh dưỡng mới là điều đau khổ nhất. Vì tôi cảm thấy thời gian cứ trôi qua mà mình chẳng làm được gì cả.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2597 = "「嗯」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だけどみんなが、オリヴィにたよってくれるなら。\nみんなの目が、手が、オリヴィに変わってくれるなら」
2406 = "「Nhưng nếu mọi người, chịu dựa dẫm vào Olivy. Nếu ánh mắt, đôi tay của mọi người, chịu trở thành của Olivy.」"
# monologue
# JP: オリヴィちゃんの手がきゅっと、\n小さく、固く結ばれます。
3709 = "Đôi tay bé Olivy nắm chặt lại, nhỏ bé, nhưng đầy kiên định."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタがおしえてくれたこと。ダイジなこと。\nオリヴィが――みんなに伝えられるなら」
2738 = "「Những điều Munakata đã dạy cho tôi. Những điều quan trọng. Nếu Olivy——có thể truyền đạt lại cho mọi người.」"
# monologue
# JP: 触れ合う肌が、熱いと感じるほどになります。
4021 = "Làn da chạm vào nhau, nóng đến mức em có thể cảm nhận được rõ ràng."
# monologue
# JP: オリヴィちゃんの生命が燃える――\nその火の熱が、伝わってきます。
3874 = "Sinh mệnh của bé Olivy đang rực cháy—— Hơi nóng của ngọn lửa đó, đang truyền sang em."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それならオリヴィ、アンセーにしててもガマンできそう。\nフシギだよね。こんなにツラくてクルシイのにね」
2742 = "「Nếu vậy thì Olivy, dù có phải nằm im tĩnh dưỡng cũng có thể chịu đựng được. Kỳ lạ thật nhỉ. Rõ ràng là đau đớn và khổ sở đến thế này cơ mà.」"
# 【ハチロク】
# display as 八六
# JP: 「……みんなが、オリヴィちゃんのことを思っています。\nだから今、わたくしたちは、ここでこうしているのです」
1765 = "「……Mọi người, đều đang nghĩ về bé Olivy. Đó là lý do tại sao lúc này, chúng ta lại đang ở đây như thế này.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そだよね！　えへへー」
2781 = "「Đúng vậy nhỉ! Ehehe~」"
# monologue
# JP: いって、オリヴィちゃんは空を見ます。
3725 = "Nói rồi, bé Olivy ngước nhìn lên bầu trời."
# monologue
# JP: その眼差しの邪魔にならぬよう傘をずらせば、\nかわいい鼻先に雪が落ち、あっという間に溶けていきます。
3865 = "Em khẽ nghiêng chiếc ô để không che khuất tầm nhìn của bé ấy, một bông tuyết rơi xuống chiếc mũi xinh xắn, rồi tan biến trong chớp mắt."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタだけを好きだったらさ、オリヴィ、きっと……もうずうっと前に、『やりきった』て、思っちゃってた」
2737 = "「Nếu chỉ thích một mình Munakata thôi ấy, thì Olivy, chắc chắn…… đã nghĩ là mình 『đã hoàn thành trọn vẹn』 từ lâu lắm rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「そう、なのですか？」
2943 = "「Vậy, sao ạ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ？　だから。だからオリヴィ、オヒトヨに来て！\nオヒトヨに来れて、すごくよかったって思ってる！」
2918 = "「Đúng vậy đó? Thế nên. Thế nên Olivy, đến Ohito! Tôi nghĩ thật tốt vì đã có thể đến Ohito!」"
# 【ハチロク】
# display as 八六
# JP: 「ああ――」
# 2554 = "「啊——」" 
# monologue
# JP: 独り占めしたいなどとは、ほんの少しも、もう思いません。\n双鉄さまに、日々姫に真闇様に、凪にふかみに、稀咲様に。
4014 = "Em không còn chút suy nghĩ ích kỷ nào muốn độc chiếm nụ cười này nữa. Cho ngài Soutetsu, cho Hibiki, cho chị Mayami, cho Nagi, cho Fukami, cho cô Kisaki."
# monologue
# JP: ポーレット様に、れいなに、ニイロクに、赤井\x%l機関士;#00ffc040;機関士%l;#;に。\n縁ある全ての存在に、今の言葉を、ただ、届けたい。
4065 = "Cho cô Paulette, cho Reina, cho Niiroku, cho \\x%l機関士;#00ffc040;nhân viên cơ vụ%l;#; Akai. Em chỉ muốn truyền đạt lại những lời vừa rồi, cho tất cả những người có duyên gặp gỡ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチロクは、さ」
2446 = "「Hachiroku này,」"
# monologue
# JP: （きゅっ）
4141 = "（Nắm chặt）"
# monologue
# JP: オリヴィちゃんの指先が、\nもう一度わたくしをつかまえます。
3736 = "Đầu ngón tay bé Olivy,\nlại một lần nữa nắm lấy em."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あかちゃん？　とか。だから、欲しいの？\nダイジなものがふえることって、しあわせだから」
2413 = "「Em bé? Các thứ. Nên cậu mới muốn có đúng không? Vì có thêm những điều quan trọng, là một niềm hạnh phúc mà.」"
# 【ハチロク】
# display as 八六
# JP: 「さぁ……どうでしょう」
3145 = "「Chà…… sao nhỉ.」"
# monologue
# JP: オリヴィちゃんがわたくしの、\nわたくしと双鉄さまの願いを覚えていてくれた――
3781 = "Việc bé Olivy vẫn nhớ mong ước của em, mong ước của em và ngài Soutetsu——"
# monologue
# JP: ただそれだけで、どこか渇きが満たされます。\nですから、素直に。思い浮かぶことを、言葉にできます。
3565 = "Chỉ cần vậy thôi, cũng đủ để lấp đầy cơn khát trong em. Thế nên, em có thể thành thật. Nói ra những suy nghĩ nảy ra trong đầu mình."
# 【ハチロク】
# display as 八六
# JP: 「一番はじめは、あの小さくかわいらしいものを、\nわたくしも双鉄さまと育ててみたいと、ただそれだけで」
2312 = "「Lúc ban đầu, chỉ đơn giản là em cũng muốn cùng ngài Soutetsu nuôi nấng một sinh linh nhỏ bé và đáng yêu như vậy thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなの！？　そんなカンタンな理由だったの！？」
2944 = "「Vậy sao!? Chỉ vì một lý do đơn giản thế thôi sao!?」"
# 【ハチロク】
# display as 八六
# JP: 「ですね。だからオリヴィちゃんと出会ったときに、\nわたくし、失礼にも浮かれてしまったのかと思います」
2934 = "「Vâng ạ. Thế nên khi gặp bé Olivy, em nghĩ mình đã vô lễ mà tỏ ra quá phấn khích.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィがちっちゃくてかわいいから！？」
2779 = "「Vì Olivy nhỏ nhắn và dễ thương sao!?」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2597 = "「嗯」" 
# monologue
# JP: ごくごく素直に頷けば、\nオリヴィちゃんは、あきれたようなクスクス笑い。
3872 = "Khi em ngoan ngoãn gật đầu thừa nhận, bé Olivy liền bật cười khúc khích như thể bó tay."
# 【ハチロク】
# display as 八六
# JP: 「けれど、オリヴィちゃんに叱っていただけ――\nそこからわたくし、色々と考えるようになりました」
2403 = "「Nhưng mà, nhờ bị bé Olivy mắng—— mà từ đó em đã bắt đầu suy nghĩ rất nhiều điều.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「どんなことを？」
2432 = "「Những điều gì vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「言葉にするのは難しいのですが――いのちのことや、\n伝えていくこと。そうしたことの、意味を。でしょうか」
2588 = "「Thật khó để diễn đạt thành lời nhưng——về sinh mệnh, về việc truyền đạt lại. Về ý nghĩa của những điều đó. Chắc là vậy ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……そうなんだ」
1771 = "「……Vậy sao.」"
# monologue
# JP: 静かに、静かに。\nオリヴィちゃんは頷きます。
3727 = "Lặng lẽ, tĩnh lặng.\nBé Olivy gật đầu."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「伝えていくことの意味――って？」
2434 = "「Ý nghĩa của việc truyền đạt lại——là sao?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまとわたくしと、ふたりで積み重ねてきた時間を。\n誰か一人にでも、覚えていてほしいというような――」
2797 = "「Thời gian mà ngài Soutetsu và em, hai người đã cùng nhau tích lũy. Muốn có ít nhất một người, nhớ đến điều đó——kiểu như vậy ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかる！　それ！！！」
2686 = "「Hiểu! Cái đó!!!」"
# monologue
# JP: びっくりするほど大きな声。\nオリヴィちゃんは、うんうん何度も頷きます。
3717 = "Một giọng nói lớn đến kinh ngạc. Bé Olivy gật đầu liên tục, ra chiều rất đồng tình."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だからオリヴィ、マスター・\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のこと、\nずうっとうらやましいんだもん！」
2881 = "「Thế nên Olivy, mới luôn ghen tị với những Master và \\x%lレイルロオド;#00ffc040;Railord%l;#; đó!」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 2554 = "「啊——」" 
# monologue
# JP: 言われて、カチリ。\n思考のポイントが切り換わります。
4017 = "Nghe vậy, tách.\nĐiểm tư duy của em được chuyển đổi."
# monologue
# JP: 残すということ。伝えていくこと。\nそれは確かに、次世代にでなくとも、叶うのです。
3978 = "Việc để lại. Việc truyền đạt lại. Điều đó quả thực, không cần phải truyền cho thế hệ sau, cũng có thể thực hiện được."
# 【ハチロク】
# display as 八六
# JP: 「確かに……左様でございますね。\nもしもわたくしがレールの途中で倒れても――」
3093 = "「Quả thực…… là như vậy ạ. Giả sử em có gục ngã giữa chừng trên đường ray——」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でしょ？　ソーテツはハチロクのこと、\nぜったいぜったいぜったい忘れないでしょお？」
2787 = "「Đúng không? Soutetsu đối với Hachiroku, chắc chắn chắc chắn chắc chắn sẽ không bao giờ quên đúng không?」"
# monologue
# JP: 頷いています。体が勝手に。\nこころが、言葉を発しています。
3860 = "Em đang gật đầu. Cơ thể tự động phản ứng. Trái tim, đang cất lời."
# 【ハチロク】
# display as 八六
# JP: 「はい。決して」
2627 = "「Vâng. Tuyệt đối không ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、オリヴィも、マスターになってもらえなくても、\nムナカタの一番の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;になりたくて」
2876 = "「Nên là, Olivy cũng vậy, dù không được anh ấy nhận làm Master, nhưng vẫn muốn trở thành \\x%lレイルロオド;#00ffc040;Railord%l;#; số một của Munakata.」"
# monologue
# JP: オリヴィちゃんの視線がわたくしを外れます。\n隆起現場を、まるで愛おしむかのように、じいっと見ます。
3712 = "Ánh mắt bé Olivy rời khỏi em. Chăm chú nhìn vào hiện trường phình lên, như thể đang âu yếm nó vậy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「初めて頼んでもらえたこと、マカされたこと果たしたら、\nきっと、それに近づけるんじゃないかって、思って」
3147 = "「Lần đầu tiên được anh ấy nhờ vả, nếu hoàn thành điều được giao phó, thì chắc chắn, tôi sẽ tiến gần hơn đến điều đó, tôi nghĩ vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2597 = "「嗯」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だけど……えへへ。そっか。だからか、\nそう考えたら、全然フシギじゃなかったんだねー」
2341 = "「Nhưng mà…… ehehe. Vậy sao. Hèn chi, nghĩ như vậy thì, hoàn toàn không có gì kỳ lạ cả nhỉ~」"
# 【ハチロク】
# display as 八六
# JP: 「なにが、不思議ではないのですか？」
2439 = "「Có gì, không kỳ lạ cơ ạ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「みんなのことを思い出したら、がんばれること！\nそれって、だって。きっと、みんなもオリヴィのこと」
2327 = "「Việc cứ nghĩ đến mọi người là tôi lại có thể cố gắng! Điều đó, bởi vì. Chắc chắn, mọi người cũng nghĩ về Olivy.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、忘れません。少なくともわたくしは、\nなにがあっても、決してオリヴィちゃんのことを」
2605 = "「Vâng, em sẽ không quên đâu. Ít nhất là em, dù có chuyện gì xảy ra, cũng tuyệt đối không quên bé Olivy đâu.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへー。うれしいな、ありがとう」
2645 = "「Ehehe~. Vui quá, cảm ơn cậu.」"
# monologue
# JP: オリヴィちゃんの笑顔はとても柔らかです。
3728 = "Nụ cười của bé Olivy thật sự rất dịu dàng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うれしいんだけど、どうしてかなぁ？　\nやっぱり、それだけじゃたりないの」
3269 = "「Dù rất vui, nhưng sao lại thế nhỉ? Quả nhiên, chỉ vậy thôi thì vẫn chưa đủ.」"
# 【ハチロク】
# display as 八六
# JP: 「それも、ね？　オリヴィちゃん。\nきっと、少しもふしぎなことではありません」
2703 = "「Điều đó cũng vậy, bé Olivy à. Chắc chắn, không có gì kỳ lạ cả đâu ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わ」
2523 = "「Oa.」"
# monologue
# JP: オリヴィちゃんに、伝えたくって――\nわたくしの方からもたれかかります。
3828 = "Vì muốn truyền đạt cho bé Olivy hiểu—— em cũng chủ động tựa vào bé ấy."
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちは、よくばりなのです。\nあのひとの中のわたくしを、きっと一番にしたいのです」
2841 = "「Chúng ta, đều rất tham lam. Chắc chắn là muốn mình trở thành số một trong lòng người ấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あのひと」
2947 = "「Người ấy.」"
# monologue
# JP: オリヴィちゃんが思い浮かべるその方と、\nわたくしが思い浮かべる双鉄さまは、無論、全く違います。
4004 = "Người mà bé Olivy đang nghĩ đến, và ngài Soutetsu mà em đang nghĩ đến, tất nhiên, hoàn toàn khác nhau."
# monologue
# JP: けれど、それでも、わたくしたちは――\nきっとおなじく、求めています。
3629 = "Nhưng, dù vậy, chúng ta—— chắc chắn đều khao khát một điều giống nhau."
# 【ハチロク】
# display as 八六
# JP: 「他の誰かの記憶の中でのわたくしは、断片でも、影でも、\n声でも、匂いでも。どんな不細工な形でもかまいません」
2543 = "「Hình ảnh của em trong ký ức của những người khác, dù là mảnh ghép, là bóng dáng, là giọng nói, hay là mùi hương. Dù có méo mó thế nào cũng không sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2597 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「ほんのときおり、なにかのはずみで思い出して貰えれば。きっと、それだけでしあわせです。けれど、けれども」
2400 = "「Chỉ cần thỉnh thoảng, vì một lý do nào đó mà họ nhớ đến em. Chắc chắn, chỉ vậy thôi em cũng hạnh phúc rồi. Nhưng, nhưng mà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。そうだね。ちゃんと、思い出してもらいたい――\n全部覚えててもらいたい。ムナカタにだけは」
2624 = "「Ừm. Đúng vậy nhỉ. Muốn được nhớ đến một cách trọn vẹn—— Muốn được ghi nhớ tất cả. Chỉ riêng Munakata thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしもです。双鉄さまにだけは――」
2835 = "「Em cũng vậy ạ. Chỉ riêng ngài Soutetsu thôi——」"
# monologue
# JP: オリヴィちゃんが、『任されたことを果たそう』と、\nここまで頑張り抜いた理由を、ようやく理解できました。
3755 = "Lý do bé Olivy đã cố gắng hết sức mình đến tận lúc này, để 『hoàn thành điều được giao phó』, cuối cùng em cũng đã hiểu được."
# monologue
# JP: 双鉄さまとのこどもをわたくしが欲しがる理由を、\nようやく、理解できました。
3520 = "Lý do em khao khát có một đứa con với ngài Soutetsu, cuối cùng, em cũng đã hiểu được."
# 【ハチロク】
# display as 八六
# JP: 「いつかわたくしが機能停止をしてしまっても、その先も。\n双鉄さまの中でずうっと。想い出として生きていきたい」
2467 = "「Dù một ngày nào đó em có ngừng hoạt động, thì sau đó nữa. Em vẫn muốn sống mãi trong lòng ngài Soutetsu. Như một kỷ niệm.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2597 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「ふたりで重ねる時間を、絆を、わたくしたちは、\nだからいくらも、いくらでも求めてしまうのです」
2866 = "「Thời gian hai người cùng nhau tích lũy, sự gắn kết, chúng ta, thế nên mới khao khát có được bao nhiêu cũng không thấy đủ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　そうだよね。\nオリヴィも、オリヴィがとまっちゃったあとでも」
2603 = "「Ừm! Đúng vậy nhỉ. Cả Olivy cũng vậy, ngay cả sau khi Olivy đã dừng lại.」"
# monologue
# JP: （びゅううううううっ）
4134 = "（Vù vù vù vù vù vù）"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2567 = "「啊！」" 
# monologue
# JP: （ぼっ！）
4148 = "（Phụt!）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……いまのって、きっとにてるよね。\nちょっと前までの、きのうまでのオリヴィと」
1778 = "「……Lúc nãy, chắc chắn là rất giống nhỉ. Với Olivy của một lúc trước, của ngày hôm qua.」"
# 【ハチロク】
# display as 八六
# JP: 「いまの、ですか？」
3140 = "「Lúc nãy, sao ạ?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2597 = "「嗯」" 
# monologue
# JP: 暗闇の中\nオリヴィちゃんが頷く気配を感じます。
3672 = "Trong bóng tối, em cảm nhận được bé Olivy đang gật đầu."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「消えちゃう前にさ、一瞬だけパってかがやいて。\nそれでいいって思ってた。それをおぼえててほしいって」
2688 = "「Trước khi biến mất ấy, chỉ tỏa sáng rực rỡ trong một khoảnh khắc. Tôi đã nghĩ như vậy là đủ rồi. Muốn mọi người nhớ đến khoảnh khắc đó.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2597 = "「嗯」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でもさ。そんなして消えられちゃったら――\nマックラだもんね、残されちゃったこっちは」
2504 = "「Nhưng mà. Nếu cứ thế mà biến mất—— thì tối om mất, với những người bị bỏ lại.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\n真っ暗で――とても寂しく心細い」
2775 = "「Đúng vậy ạ.\nTối om——và vô cùng cô đơn, trống trải.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「時間とキズナ――\n消えちゃったら、もうカサネられなくなっちゃうもんね」
2334 = "「Thời gian và sự gắn kết—— Nếu biến mất rồi, thì sẽ không thể tích lũy thêm được nữa nhỉ.」"
# monologue
# JP: 烈風に吹き消されてしまったカンテラを、\nオリヴィちゃんが再び、大事に灯します。
3624 = "Chiếc đèn bão đã bị cơn gió mạnh thổi tắt, được bé Olivy cẩn thận thắp sáng lại một lần nữa."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オイル、足してきてあげよっと！\nあとなんか、風よけになるものも」
2806 = "「Phải đi châm thêm dầu thôi! Với cả tìm cái gì đó để chắn gió nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、わたくしが行ってまいります」
3221 = "「Nếu vậy, để em đi cho ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ううん。オリヴィ、少し歩きたいの。\nハチロクにここ、見ててもらって平気？」
2317 = "「Không đâu. Olivy, muốn đi dạo một chút. Nhờ Hachiroku trông chừng chỗ này có được không?」"
# 【ハチロク】
# display as 八六
# JP: 「そういうことでしたら」
3203 = "「Nếu bé đã nói vậy thì.」"
# monologue
# JP: （ボンっ！！！！！）
4136 = "（BÙM!!!!!）"
# 【ハチロク】
# display as 八六＆奥莉薇
# JP: 「えっ！？」\n「わっ！？」
2533 = "「Hả!?」\n「Oa!?」"
# monologue
# JP: なにかが爆発したような音――っ！！？
4104 = "Âm thanh như thể có thứ gì đó phát nổ——!!?"
# monologue
# JP: （ビリビリビリビリっ――）
4151 = "（Rung chuyển——）"
# monologue
# JP: 地鳴りがし、空気も激しく震えます。
4081 = "Mặt đất gầm gừ, không khí cũng rung chuyển dữ dội."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「バクハツっ！？　町の方っ！！！」
2925 = "「Nổ sao!? Ở phía thị trấn!!!」"
# 【ハチロク】
# display as 八六
# JP: 「いけません、オリヴィちゃん！\nあちらは、霧縞市のみなさんのお仕事です」
2697 = "「Không được đâu, bé Olivy! Bên đó là công việc của mọi người ở thành phố Kirishima ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ――」
# 2554 = "「啊——」" 
# monologue
# JP: 駆け出そうとしていたオリヴィちゃんが、止まります。\nくるり、わたくしへと振り向きます。
3951 = "Bé Olivy đang định lao đi liền dừng lại. Quay ngoắt lại nhìn em."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だったね。\nオリヴィたちは、オリヴィたちのおしごとっ！」
2766 = "「Đúng rồi nhỉ. Chúng ta, phải làm công việc của chúng ta!」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2597 = "「嗯」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ならっ！」
3188 = "「Vậy thì!」"
# monologue
# JP: オリヴィちゃんが、また駆け出します。\n保線基地のある方向へ。
3708 = "Bé Olivy, lại bắt đầu lao đi. Hướng về phía căn cứ bảo trì đường ray."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ！　ソーテツ起こしてくっ――っ！！！？」
2690 = "「Olivy! Sẽ đi đánh thức Soutetsu——!!!?」"
# monologue
# JP: （どさっ！）
4132 = "（Phịch!）"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！？」
2696 = "「Bé Olivy!?」"
# monologue
# JP: 滑って転倒しただけです。\n今のは、そういう倒れ方です。
3739 = "Chỉ là trượt chân ngã thôi. Cú ngã vừa rồi, là kiểu ngã như vậy."
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！　オリヴィちゃんっ！！\n返事を、返事をしてください！！」
2694 = "「Bé Olivy! Bé Olivy!!\nTrả lời, trả lời em đi!!」"
# monologue
# JP: なのに動いてくれません。\n返事は聞こえてきませんし、\x%l共感;#00ffc040;共感%l;#;も少しも受け取れません。
3644 = "Vậy mà bé ấy không hề nhúc nhích. Không nghe thấy tiếng trả lời, cũng không nhận được chút \\x%l共感;#00ffc040;cộng cảm%l;#; nào."
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！」
2693 = "「Bé Olivy!」"
# monologue
# JP: 必死に駆け寄り、\n倒れてしまったオリヴィちゃんを――っ！？
3861 = "Em tuyệt vọng chạy đến, đỡ lấy bé Olivy đang gục ngã——!?"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 2554 = "「啊——」" 
# monologue
# JP: 浅く積もり始めた雪が、みるみるうちに溶けていきます。\nオリヴィちゃんの倒れた形に――その周辺へと。
4082 = "Lớp tuyết mỏng vừa mới bắt đầu tích tụ, nhanh chóng tan chảy. Thành hình dáng bé Olivy đang nằm——và lan ra xung quanh."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――う……ぁ……」
2589 = "「A——ư……a……」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！！？」
2695 = "「Bé Olivy!!?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチ……ロク――あの、ね？\nオリ、ヴィ――オリヴィ、平気……だか、ら」
2440 = "「Hachi……roku——nè?\nOli, vy——Olivy, không sao……đâu, mà」"
# 【ハチロク】
# display as 八六
# JP: 「――はい」
# 1706 = "「——嗯」" 
# monologue
# JP: 平気なわけなどございません。\nけれど、平気でいなければ――
3762 = "Làm sao mà không sao được chứ. Nhưng mà, nếu không tỏ ra không sao thì——"
# monologue
# JP: オリヴィちゃんのお仕事を、\nわたくしが助けてさしあげなければ。
3671 = "Công việc của bé Olivy, em phải giúp bé ấy một tay mới được."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツ、おこ、して――それ、で――セキ、たち、\nここ――できる、だけ――たくさん――よん、でっ」
2417 = "「Soutetsu, đánh, thức——rồi, thì——Seki, và mọi người, đến đây——càng, đông——càng tốt——gọi, đến」"
# 【ハチロク】
# display as 八六
# JP: 「はい――。\nかしこまりました。オリヴィちゃん」
2717 = "「Vâng——.\nEm hiểu rồi. Bé Olivy.」"
# monologue
# JP: 零れそうになる涙を堪え、オリヴィちゃんを起こします。
3851 = "Em kìm nén những giọt nước mắt chực trào, đỡ bé Olivy dậy."
# monologue
# JP: この誇り高き\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を、\n地に伏せさせたままになど、決しておいてはなりません。
3932 = "Không thể nào để một \\x%lレイルロオド;#00ffc040;Railord%l;#; đầy kiêu hãnh này, cứ gục ngã trên mặt đất mãi được."
# 【ハチロク】
# display as 八六
# JP: 「言われたとおり。\n必ず、わたくし――いたします」
2831 = "「Đúng như lời bé nói.\nNhất định, em sẽ——làm.」"
