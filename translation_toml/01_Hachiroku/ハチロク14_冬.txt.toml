2995 = "「玲奈，你能去幫波萊特的忙嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、わかりましたぁ」
2730 = "「好，玲奈明白」" 

# monologue
# JP: ポーレットの支えならばれいなの他には考えられない。
4044 = "說到輔助波萊特，除了玲奈別無人選。" 

