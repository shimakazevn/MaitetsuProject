4011 = "而根據稀咲和深美的能力，最好也別安排她們去\\x%l保線;#00ffc040;巡線%l;#;……對了，如果真闇姐有空，也拜託她做我們的後援吧。" 

# 【凪】
# display as 凪
# JP: 「で！　凪さまたちは何すりゃよかとばい？」
3227 = "「那說這麼多！本小姐要幹什麼呀？」" 

# 【双鉄】
# display as 雙鐵
