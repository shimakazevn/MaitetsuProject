2932 = "「是的，我們已和奧莉薇約好要在那裡會合」" 

# 【ニイロク】
# display as 二六
# JP: 「なら。これ。オリヴィに。\n気休めにもならない。かもしれないけど」
3208 = "「那就，把這個，帶給奧莉薇，雖然可能，連一點心理作用都起不了」" 

# monologue
# JP: 大きなバッグ――クーラーバッグだ。
3746 = "她拿出了一個大大的挎包——是便攜冷藏包。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
2567 = "「啊！」" 

# monologue
# JP: 見た瞬間に、今朝からの小さな違和感たちが、\nつながりを得て、ひとつの形を結びはじめる。
3503 = "一看到這包，我今早萌生的種種不自然的感覺才終於聯繫在一起，形成一個完整的閉環。" 

# 【双鉄】
# display as 雙鐵
# JP: 「中味を見せてもらっても構わんか？」
3059 = "「能讓我看看裡頭裝了些什麼嗎？」" 

# 【ニイロク】
# display as 二六
# JP: 「うん」
# 2597 = "「嗯」" 

