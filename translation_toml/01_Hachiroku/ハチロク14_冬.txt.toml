# JP: 「ソーテツ、おこ、して――それ、で――セキ、たち、\nここ――できる、だけ――たくさん――よん、でっ」
2417 = "「你去、叫醒、雙鐵——然、後——去叫、堰先生、他們，到這裡來——人越多、越好」" 

# 【ハチロク】
# display as 八六
# JP: 「はい――。\nかしこまりました。オリヴィちゃん」
2717 = "「好的——我明白了，奧莉薇」" 

# monologue
# JP: 零れそうになる涙を堪え、オリヴィちゃんを起こします。
3851 = "我噙著淚水，將她扶起。" 

# monologue
# JP: この誇り高き\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を、\n地に伏せさせたままになど、決しておいてはなりません。
3932 = "決不能讓奧莉薇這個自尊心極強的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，就這麼一直趴在地上。" 

# 【ハチロク】
# display as 八六
# JP: 「言われたとおり。\n必ず、わたくし――いたします」
2831 = "「我一定會，如數完成你的要求」" 
