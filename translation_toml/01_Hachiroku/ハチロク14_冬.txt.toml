2737 = "「如果奧莉薇只是喜歡宗方一個人的話，那麼早在很久以前……就會覺得自己已經算“完成了使命”」" 

# 【ハチロク】
# display as 八六
# JP: 「そう、なのですか？」
2943 = "「是這樣嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよ？　だから。だからオリヴィ、オヒトヨに来て！\nオヒトヨに来れて、すごくよかったって思ってる！」
2918 = "「是呀，所以現在，奧莉薇真的好慶幸！慶幸自己能來到御一夜這裡！」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――」
# 2554 = "「啊——」" 

# monologue
# JP: 独り占めしたいなどとは、ほんの少しも、もう思いません。\n双鉄さまに、日々姫に真闇様に、凪にふかみに、稀咲様に。
4014 = "而現在，我已再無半點想要獨占的念頭。我真心希望雙鐵少爺、日日姬、真闇小姐、凪、深美、稀咲小姐……" 

# monologue
# JP: ポーレット様に、れいなに、ニイロクに、赤井\x%l機関士;#00ffc040;機関士%l;#;に。\n縁ある全ての存在に、今の言葉を、ただ、届けたい。
4065 = "還有波萊特小姐、玲奈、二六、赤井\\x%l機関士;#00ffc040;司機%l;#;，以及其他所有與御一夜密不可分的人們，都聽到她方才這句飽含喜悅的話語。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチロクは、さ」
2446 = "「八六，要說你……」" 

# monologue
# JP: （きゅっ）
4141 = "（握緊）" 

# monologue
# JP: オリヴィちゃんの指先が、\nもう一度わたくしをつかまえます。
3736 = "她再一次伸出指尖觸碰我。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あかちゃん？　とか。だから、欲しいの？\nダイジなものがふえることって、しあわせだから」
2413 = "「你也是因為這個，才想要孩子的嗎？因為多一樣值得珍惜的存在，也就意味著多一份幸福」" 

# 【ハチロク】
# display as 八六
# JP: 「さぁ……どうでしょう」
3145 = "「這個……我說不好」" 

# monologue
# JP: オリヴィちゃんがわたくしの、\nわたくしと双鉄さまの願いを覚えていてくれた――
3781 = "就連我……我和雙鐵少爺的願望，她都還記得一清二楚……" 

