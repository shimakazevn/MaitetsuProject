3843 = "我們具體討論了一下值班的安排及各種細節問題，然後流先生就出發返回御一夜了。" 

# 【ハチロク】
# display as 八六
# JP: 「……ガソリンエンジンのトラックでは、\nかなりの時間がかかってしまいましょうね」
1741 = "「……不過坐汽油動力的卡車，想必回程會多花不少時間」" 

