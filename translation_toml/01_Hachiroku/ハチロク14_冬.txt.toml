3854 = "我就簡單問了一下他們對主要情況的了解程度，而後掛上電話再次向赤井\\x%l機関士;#00ffc040;司機%l;#;開口。" 

# 【双鉄】
# display as 雙鐵
# JP: 「もう間もなく、流さんと治さんが来て下さいます」
2982 = "「流先生和治先生很快就會與我們會合」" 

# 【赤井】
# display as 赤井
# JP: 「はい」
2718 = "「好的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤井\x%l機関士;#00ffc040;機関士%l;#;には、お二方と凪と情報を出し合って、\n常時監視候補者のリスト作成をお願いしたく思います」
2851 = "「我希望赤井\\x%l機関士;#00ffc040;司機%l;#;能和凪還有流和治兩位先生交換意見，完成參與全天監視的成員候補名單」" 

# 【赤井】
# display as 赤井
# JP: 「わかりました」
2854 = "「我明白了」" 

# 【双鉄】
# display as 雙鐵
