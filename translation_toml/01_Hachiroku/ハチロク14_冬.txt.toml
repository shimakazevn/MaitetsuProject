[script]
# lines: 698 
# 【双鉄】
# display as 雙鐵
# JP: 「うぅ……今日は冷え込むな」
2549 = "「唔……今天氣溫可真低」" 

# 【ハチロク】
# display as 八六
# JP: 「山の方は雪になるかもしれないそうです。\n心配なことでございますね」
3058 = "「聽聞在山區有可能會下雪，著實令人擔心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、十一月末でもう雪か。\n[やたけ,1]屋岳へ上る最中に、降り初めがぶつからねばよいが」
2732 = "「如今才十一月底，竟會有雪，但願不會在登抵矢岳途中遭遇降雪」" 

# 【ハチロク】
# display as 八六
# JP: 「――あら？　今なにか聞こえませんでしたか？」
1705 = "「——哎呀？方才是不是聽到了什麼動靜？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　僕にはなにも」
2641 = "「嗯？我沒聽到」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしの気のせいでしょうか」
3066 = "「莫非是我聽錯了」" 

# monologue
# JP: 小首をかしげるハチロクと並び居間へと入れば――
3849 = "我和略顯疑惑的八六一同走進起居室——" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「んむっ！」
2599 = "「嗯嗚！」" 

# monologue
# JP: オリヴィが、ちょうど体温計をくわえたところだ。
3600 = "剛好撞見奧莉薇剛把體溫計含進嘴裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おはよう、オリヴィ。体調はどうだ？」
2702 = "「奧莉薇，早安。身體情況怎麼樣？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「むーっ」
2547 = "「唔——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、失礼。\n体温計をくわえていては、返事もできんな」
2651 = "「噢，抱歉，你正在測體溫，也不方便回答」" 

# monologue
# JP: 言えば、オリヴィはこっくり
3723 = "奧莉薇聽我這麼一說，便想點頭表示同意。" 

# 【ハチロク】
# display as 八六
# JP: 「ああ！　いけませんオリヴィちゃん！\n頭を動かしては体温が変わってしまうかもしれません！」
2565 = "「啊啊！奧莉薇你不能亂動！晃動腦袋或許會導致體溫發生變化！」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「んぐっ！」
# 2599 = "「嗯嗚！」" 

# monologue
# JP: ひどく慌てた――悲鳴のようなハチロクの声。\n途端、オリヴィがぴたりと固まる。
3579 = "八六的聲音顯得無比慌張，幾近於悲鳴。而奧莉薇見狀，也僵住不動了。" 

# monologue
# JP: ……この２週間、オリヴィの体温は高止まりして、\n\x%l保線;#00ffc040;保線%l;#;にも出られぬ状況だ。
1685 = "……從兩週之前，奧莉薇的體溫便開始居高不下，甚至無法參與\\x%l保線;#00ffc040;巡線%l;#;。" 

# monologue
# JP: （今の声掛けは迂闊だったな。オリヴィを刺激せぬよう、\nともかく静かに、焦らず過ごすのが一番だ。）
4128 = "（剛才貿然開口問候實屬莽撞。本應保持清靜，不對奧莉薇造成任何刺激，讓她好靜養身體才是。）" 

# monologue
# JP: で、あるのなら、意識を他へと向けておこう。
3547 = "但事已至此，目前就先轉移她的注意力吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。僕らも計っておこう」
2442 = "「八六，也給你測一下吧」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、かしこまりました。双鉄さま」
2725 = "「好的，雙鐵少爺」" 

# monologue
# JP: いつもの姿勢でハチロクの体温を計っていれば、\n僕らもまるで身動きできぬ。
3842 = "我便開始按照平時的動作給八六測體溫，於是我們也一樣動彈不得了。" 

# monologue
# JP: 静かな時間がただただ流れ――
3768 = "寂靜充斥了整個起居室。" 

# monologue
# JP: （ピピピっ、ピピピっ）
4149 = "（蜂鳴音）" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2538 = "「哦」" 

# monologue
# JP: オリヴィの体温計が先に鳴る。
3922 = "是奧莉薇的體溫計先響了。" 

# monologue
# JP: オリヴィはいつものごとく無造作に、\n体温計を口から抜いて――
3732 = "她一如往常，隨手將體溫計拔出——" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2640 = "「嗯？」" 

# monologue
# JP: なんだ？　生唾を飲み込んだ音のような……
3857 = "我怎麼聽到了好像咽口水般的聲音……" 

# monologue
# JP: が、ハチロクやオリヴィが食事以外で\n喉を鳴らすなど聞いたことも無いし――
3639 = "可是八六和奧莉薇除了吃東西，也從未聽到她們從喉嚨發出響聲——" 

# monologue
# JP: （いまのは、僕か？　\nオリヴィの体温を気にかけるあまり、無意識に――）
4154 = "（難道是我的聲音？是因為我過於關心奧莉薇的體溫，在無意中發出了聲音嗎）" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あううっ！？　ひくすぎっ！？」
2566 = "「啊嗚！？好低啊！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「下がったのか？」
3248 = "「降下來了？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えっ！？　ああ、あう――えと、あの――うん」
2536 = "「哎！？啊，呃——這個，那個——嗯」" 

# monologue
# JP: （ピピピっ、ピピピっ）
# 4149 = "（蜂鳴音）" 

# 【ハチロク】
# display as 八六
# JP: 「ほーへふはは」
3274 = "「ｃｅｈａｏｌｅ」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん」
2540 = "「哦，好」" 

# monologue
# JP: いつもの手順で、ハチロクの口内温度を確かめる。
3864 = "我按照平時的流程，確認八六口腔的溫度。" 

# 【双鉄】
# display as 雙鐵
# JP: 「38度2分か。気持ち低いが、非常に安定しているな」
3271 = "「３８.２度，稍稍顯低，但波動極其平穩」" 

# 【ハチロク】
# display as 八六
# JP: 「なによりです。\nそれでオリヴィちゃんは」
3196 = "「那就再好不過，於是奧莉薇呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、低すぎるといっていたようだが」
2647 = "「噢，她剛才好像說測出的體溫太低了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――\nえと――うん」
2557 = "「啊——這個——嗯」" 

# monologue
# JP: オリヴィが差し出す体温計は――
3713 = "奧莉薇把體溫計遞給我們看。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと！？　36度7分か！\n無論、安定稼働圏内ではあるが……しかし」
3042 = "「竟才３６.７度！雖然也處於安全範圍內……可是」" 

# 【ハチロク】
# display as 八六
# JP: 「昨晩より、一気に五度近く下がっております」
3116 = "「較諸昨晚，卻是陡然降低了將近五度」" 

# monologue
# JP: ハチロクがすぐさまノートを開く。
3585 = "八六立刻打開筆記本。" 

# monologue
# JP: オリヴィの体温を記録している、\n折れ線グラフをじっと眺める。
3733 = "她仔細觀察記錄有奧莉薇體溫變化的折線圖。" 

# 【ハチロク】
# display as 八六
# JP: 「……今まで一度も無い低さです。従来の最低体温の\n39度6分と比しても、3度近くの落ち込みです」
1767 = "「……從未出現如此低的體溫，即使和過去的最低體溫３９.６度相比，也有將近三度的落差」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも！　カドーアンゼンケンなのはマチガイないし！\n今日オリヴィ、保線出て大丈夫でしょう？」
2345 = "「不過！也還是處在安全範圍啦！那奧莉薇今天就可以去巡線了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうなのだが――」
3092 = "「話雖如此」" 

# monologue
# JP: 熱が下がるとき、5度以上を一気にというのは……\n人間でも、40度以上の発熱であればあるにはあろうが――
4064 = "這體溫下降能一口氣超過五度……雖說人類要是從四十度以上的高燒恢復正常也會有這麼大落差……" 

# monologue
# JP: しかし、それで……人間に換算すれば34～5度台にまで\n一気に落ち込んでしまうのは、逆に危ないような気もする。
3637 = "可是……要真以人類的標準來說就是一下降到了三十四或三十五度，總感覺這樣反而情況不妙。" 

# 【双鉄】
# display as 雙鐵
# JP: 「念のため、もう一日は様子見をして、\n登呂流湯さんに診てもらったほうが」
2396 = "「以防萬一，還是再靜養一天，去登呂流浴場檢查一下情況吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……オリヴィのジュミョー、熱高いときに動くと、\n負荷があがりすぎてケズレちゃうんでしょ？」
1757 = "「……可是奧莉薇如果在發高燒的時候行動，不是會由於負荷過高縮短壽命嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そう聞いたな」
2625 = "「嗯，是這麼說的」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だったら、\n低い分にはケズレないでしょ？　ジュミョー」
3230 = "「那麼如果體溫比較低的話，就不會影響壽命了吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「理屈の上ではそうかもしれませんが」
2508 = "「可能是這個道理沒錯」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それに！」
2455 = "「再說了！」" 

# monologue
# JP: 珍しく強い口調で、\nオリヴィがハチロクの言葉を断ち切る。
4089 = "難得見她以如此強硬的口氣，打斷了八六說話。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「どれだけ診てもらったって、\nしてもらえることなんて、ナンニモ無いんだし」
2789 = "「就算做再多檢查，又沒有辦法解決根本問題」" 

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「っ！」\n「あ」
2552 = "「唔！」\\n「啊」" 

# monologue
# JP: ……確かに、それはそのとおりだ。\nオリヴィを蝕んでいるのは、人間でいえば老衰。
1682 = "……一切都正如她所言，以人類的狀態來說，奧莉薇現在正處於衰老的過程中。" 

# monologue
# JP: 余命をいかに延ばしていくかの方法さえも、\nいま出ている以外には無いとはっきり、聞かされている。
3778 = "就算想方設法延長壽命，除了目前那些途徑，也再無其他措施可言。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だけじゃなくて――オリヴィがねてたあいだ、\nキキトリ調査、ぜんぜんできてないんでしょ？」
3053 = "「而且不止是這個問題——在奧莉薇臥床休息的這段時間，你們打聽消息不也是一點都不順利嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それも……\n報告を受けている限りでは、その通りだ」
3138 = "「這……按照大家的報告，的確是舉步維艱」" 

# monologue
# JP: 話し上手でひとなつっこいだけでなく、\nオリヴィは、実はかなりに聞き上手でもある。
3707 = "奧莉薇不僅很自來熟，並且能說會道，善於打聽情況。" 

# monologue
# JP: ゆえ、『いつものあの子は？』と門前払いされてしまうと\n――堰さんたちの報告は、苦笑交じりのものだった。
3884 = "所以這兩週堰先生他們經常面露苦笑向我們匯報，就因為見不到奧莉薇，不少人都讓他們吃了閉門羹。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そういうのってさ、一度とぎれちゃったら、\nフッカツがどんどんムツカシクなっちゃうでしょ？」
2521 = "「和大家好不容易建立的關係，一旦徹底斷了，可就很難再恢復了對不對？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、まぁ」
3009 = "「的確是這個理」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから！　チョーシいいときいっとかないと！\nそしたら『最近ちょっとチョーシ悪くて』っていえるし」
2878 = "「所以奧莉薇就得趁有精神的時候再去見大家！現在還能向他們解釋是最近身體不太好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……事情を説明しておけば、\n堰さんたちが聞き取りを行いやすくもなる、か」
2942 = "「是這樣……只要說明情況，以後堰先生他們也方便再去打聽消息」" 

# monologue
# JP: 言いつつチラリ、ハチロクの顔を確かめてみる。\n困ったような、それでいて微笑ましそうな、微妙な表情。
3836 = "我一邊說，一邊瞥了眼八六的表情，她像是有些為難，但也表現出幾分欣慰。" 

# monologue
# JP: やがてゆるゆる、静かな頷きが示される。
3511 = "不久，她就以緩慢的點頭表示了自己的意見。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、くれぐれも無理のないよう行動してくれ。\n辛くなったらすぐ連絡を、ナビを迎えにいかせるゆえ」
3186 = "「那好吧，切記不要勉強，如果覺得難受就立刻聯絡我們，我會派Ｎａｖｉ來接你」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムリなんてするわけないよー。\nオリヴィまだまだ、することたーくさんあるんだし！」
2816 = "「怎麼會勉強啦，還有好多事情等著奧莉薇去做呢！」" 

# 【ハチロク】
# display as 八六
# JP: 「乗務が終わり次第で、\nわたくしたちも向かいますので、そのときにまた」
3044 = "「等乘務任務執行完畢，我們也會前去會合，到時再見」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった、まってる！\nもしも先に帰るよーなら連絡するね！」
2729 = "「好，奧莉薇等著你們！如果有情況要先回來的話會通知你們的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解した。現場までもナビに送らせよう」
2908 = "「明白，我也直接派Ｎａｖｉ把你送過去吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがと！　たすかる！！」
2658 = "「多謝雙鐵！省得走啦！！」" 

# monologue
# JP: ぱっと花咲く笑顔を浮かべ、オリヴィは――っ！？
3623 = "只見奧莉薇眉開眼笑，然後——！？" 

# monologue
# JP: （ふらっ）
4142 = "（搖晃）" 

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「オリヴィっ」\n「オリヴィちゃんっ！？」
2682 = "「奧莉薇」\\n「奧莉薇！？」" 

# monologue
# JP: （ぱしっ！）
4139 = "（推開！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2515 = "「呃！？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ！　ヘーキっ！　ヘーキだから！！」
2571 = "「啊！沒事！奧莉薇不要緊！！」" 

# monologue
# JP: 抱きとめようとした僕の体を、オリヴィは両手ではじき、\n元の姿勢でなんとか踏ん張る。
3718 = "奧莉薇看我想要接住她，急忙用雙手推開我，好不容易又站穩了。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ちょっと――ずーっっとねてたのに、\nいきなり動いて、フラついちゃっただけだから！」
2494 = "「只是一直躺著沒活動，走起路來有點不適應而已！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう、か？」
3018 = "「真是這樣？」" 

# monologue
# JP: 拒絶された、という感じはない。
3830 = "感覺奧莉薇並非是拒絕被我抱住。" 

# monologue
# JP: むしろオリヴィはなにかに怯え――\nまるで僕から逃げ出したようで、
3738 = "她反而更像是在害怕什麼，逃一般地與我拉開距離。" 

# 【オリヴィ】
