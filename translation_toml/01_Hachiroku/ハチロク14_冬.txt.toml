4070 = "那我們現在的當務之急是完成最妥善的巡線監視體制——也就是以有經驗的人員為主，其他幫手為輔，輪流進行看守。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。堰さんたちのどなたかと連絡を」
2445 = "「八六，你去聯繫一下堰先生他們當中的隨便哪位」" 

# 【ハチロク】
# display as 八六
