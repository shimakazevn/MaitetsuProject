2470 = "「原來她的毅力之強大，甚至能得到你的認可嗎」" 

# monologue
# JP: とはいえ、新人の、\nそれも女性を、不寝番にはとても回せん。
3549 = "但她畢竟是新人，而且是女性，安排其通宵值班多有不妥。" 

