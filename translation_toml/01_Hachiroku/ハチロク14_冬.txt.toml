2740 = "「如果有需要，我會請求信徒協助」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。大変こころ強く思います」
3266 = "「非常感謝，有二位相助我們心裡也更加有底」" 

