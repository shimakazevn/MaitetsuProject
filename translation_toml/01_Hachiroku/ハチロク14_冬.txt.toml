2407 = "「但是後來，見到你和雙鐵，知道了你們的想法，奧莉薇也理解了，然後就又想到了」" 

# 【ハチロク】
# display as 八六
# JP: 「思い出した……なにを、ですか？」
2825 = "「想到……想到了什麼？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヒビキとマクラ。オリヴィがこのまま止まったら、\nふたりも、オリヴィも、とってもサミシイって思ったの」
2827 = "「想到了日日姬跟真闇，心想要是奧莉薇就這麼離開了，不管是她們，還是奧莉薇，一定都會感到很寂寞」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ……ああ。\n――きっと、左様でございましょうね」
2596 = "「嗯……嗯，一定是這樣」" 

