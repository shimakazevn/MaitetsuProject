3565 = "僅是知道了這一點，就令我感到無比充實與滿足，所以，我才能將浮上心頭的想法向她坦白。" 

# 【ハチロク】
# display as 八六
# JP: 「一番はじめは、あの小さくかわいらしいものを、\nわたくしも双鉄さまと育ててみたいと、ただそれだけで」
2312 = "「一開始，我只是覺得寶寶是那般嬌小可愛，於是也想和雙鐵少爺擁有屬於自己的孩子，將其撫養長大」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなの！？　そんなカンタンな理由だったの！？」
2944 = "「是這樣！？就只有這麼簡單的理由！？」" 

# 【ハチロク】
# display as 八六
# JP: 「ですね。だからオリヴィちゃんと出会ったときに、\nわたくし、失礼にも浮かれてしまったのかと思います」
2934 = "「是的，所以最開始與你相識的時候，我才會如此興奮，以至於對你多有不敬」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィがちっちゃくてかわいいから！？」
2779 = "「就因為奧莉薇太嬌小可愛了是嗎！？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2597 = "「嗯」" 

# monologue
# JP: ごくごく素直に頷けば、\nオリヴィちゃんは、あきれたようなクスクス笑い。
3872 = "我老實地點了點頭，而奧莉薇則是一臉無奈，笑了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「けれど、オリヴィちゃんに叱っていただけ――\nそこからわたくし、色々と考えるようになりました」
2403 = "「但是在被你訓斥之後，我便開始思考很多事情」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「どんなことを？」
2432 = "「你都在思考什麼？」" 

# 【ハチロク】
