3874 = "我能感受到——她的生命正在熊熊燃燒。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それならオリヴィ、アンセーにしててもガマンできそう。\nフシギだよね。こんなにツラくてクルシイのにね」
2742 = "「如果真的可以實現，那麼奧莉薇應該也能受得了一直靜養，想想可真奇怪，明明現在都已經是這樣痛苦難耐」" 

# 【ハチロク】
# display as 八六
