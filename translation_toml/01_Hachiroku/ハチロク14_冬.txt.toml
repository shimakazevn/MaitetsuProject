2454 = "「其實，靜養的時候才是最難受的，只能眼看著時間不斷流逝，自己卻無能為力」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2597 = "「嗯」" 

# 【オリヴィ】
# display as 奥莉薇
