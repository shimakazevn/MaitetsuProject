3202 = "「那就拜託你了，每隔三小時定期報告彼此的進展，如果情況有變，請一一通知我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「承りました」
2906 = "「明白」" 

# monologue
# JP: 一礼すればすぐさまに、\nポーレットは電話をかけはじめる。
3942 = "波萊特剛向我點頭示意，轉頭就開始打電話了。" 

# monologue
# JP: 彼女は、彼女にしかできないことを。\n無論僕らも、同様にだ。
3752 = "她有她才能履行的職責，而我們當然也是一樣。" 

# 【双鉄】
# display as 雙鐵
