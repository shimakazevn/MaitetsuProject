# JP: 『オリヴィちゃんの望んだこと』と、\nわたくしの[あね,1]義姉と[いもうと,1]義妹も、やはり静かに受け入れましょう。
3777 = "就算她再也回不到那個家了，我家的姐姐和妹妹也都會理解這是她自己的選擇，進而默默接受。" 

# monologue
# JP: そうして、誰もいないところで――\nひそかにさみしく、泣くことでしょう。
4006 = "而她們一定會在只有自己一個人的時候，再悄悄流下寂寞的眼淚。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そのサミシイのはすごくヤだなって、オリヴィ思って。\nそしたら、ね？　もう少しだけがんばろーって思えたの」
2689 = "「奧莉薇真的不想嚐到這種寂寞的感覺，然後就覺得，自己還是應該再加把勁」" 

# 【ハチロク】
# display as 八六
# JP: 「――はい」
1706 = "「——嗯」" 

# 【オリヴィ】
# display as 奥莉薇
