3709 = "奧莉薇將嬌小的手緊緊握在一起。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタがおしえてくれたこと。ダイジなこと。\nオリヴィが――みんなに伝えられるなら」
2738 = "「如果奧莉薇，能將宗方教給自己的一切，所有最核心的內容——都留給大家……」" 

# monologue
