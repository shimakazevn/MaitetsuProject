2354 = "「也就是二十四小時全天保持警惕」" 

# 【凪】
# display as 凪
# JP: 「二十四時間！！\nゆーことは、シフトば組むと？」
2374 = "「二十四小時！！那不就得晝夜輪班了？」" 

# 【双鉄】
# display as 雙鐵
