# JP: 「それはダメ！　だって今日、\n他にツゴーつく人、いなかったんでしょ？」
3175 = "「那可不行！畢竟今天，其他人都抽不出時間來待在這裡不是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……まぁ、そうなのだが――\nしかし、日々姫か真闇姉に頼めば」
3139 = "「這……話是這麼說，但是也可以找日日姬和真闇姐」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムリさせちゃだめだよ！！　ヒビキ、乗務とデザインと、\nあと……オリヴィのカンビョーも、してくれてたから」
2329 = "「不能再累著她們了！！日日姬要忙乘務和設計不說，而且還……一直照顧著奧莉薇」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ」
1761 = "「……嗯」" 

# monologue
# JP: そこは、動かしがたい事実だ。
4062 = "這些也是無可辯駁的事實。" 

# monologue
# JP: 日々姫も真闇姉も、程度の差はあれ、\nいくらかの過労状態にあり、睡眠を十分にはとれていない。
3570 = "儘管程度有別，但是日日姬和真闇姐也都多少有些過度勞累，並且睡眠時間也不充分。" 

# 【ハチロク】
# display as 八六
# JP: 「『今夜はせめてぐっすり眠り、明日以降に備えてくれ』\n……左様におっしゃったのは、双鉄さまではないですか」
3258 = "「雙鐵少爺……可是您對大家說今晚要好好休息，好在明天全心全意投入工作」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2550 = "「唔」" 

# monologue
# JP: それは間違いない事実なのだが、まさかこのタイミングで、\nハチロクが指摘するとは思わなかった。
4085 = "雖然我的確是這麼說過，但是令我始料未及的是，八六會在這個節骨眼上拆我的台。" 

# monologue
# JP: ならば――あるいは。僕が認識しているよりも、\nオリヴィの状態は遥かに厳しいということなのかも――
3763 = "如此說來，則有一個可能，便是奧莉薇身體情況的嚴重程度，已經遠遠超出了我的想像。" 

# monologue
# JP: （いや、落ち着け双鉄。悲観に引きずられてどうするのだ。\n大方針は既にたてた。オリヴィも同意した。ならば――）
4124 = "（不，我要冷靜，怎能在此時心生悲觀，整體方針已經有了，奧莉薇也答應了，既然如此——）" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうだったな。そのとおりだ」
1775 = "「……沒錯，八六說的對」" 

# monologue
# JP: 長く、ゆっくり息を吐く。\n真面目くさった顔を作るよう、意識する。
3875 = "我長呼一口氣，努力讓自己的表情顯得更認真一些。" 

# 【双鉄】
# display as 雙鐵
# JP: 「で？\n体温は、どうやってごまかしたんだ？」
2885 = "「所以，你能說說你是怎麼騙過我們的嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふぇ！？」
2532 = "「哎！？」" 

# monologue
# JP: 情報を得て悲観を捨てる、そのために、\n半ば無理やり話を戻せばオリヴィは驚いた声をだす。
3879 = "我需要獲知更多情況以摒棄悲觀，為此特地強行扭轉話題，奧莉薇聽罷也驚叫出聲。" 

# monologue
# JP: そうして小さく、\n照れくさそうな困ったような微笑をうかべ――
3960 = "然後她有些不知所措，靦腆地笑了起來。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「これ。ニイロクにどうしても、ってお願いしたの」
2928 = "「是用這個，是奧莉薇求二六幫忙的」" 

# 【ハチロク】
# display as 八六
# JP: 「『ひとくちプルルンゼリイ』――あ！」
1712 = "「“一口即吞軟布丁”——啊！」" 

# monologue
# JP: ポケットからオリヴィが取り出したひとくちゼリー。\n容器は、なるほど。今朝床に落ちていた、そのものだ。
3711 = "奧莉薇從口袋裡拿出幾個小口布丁，其包裝跟今早在家中地板上發現的容器一模一樣。" 

# 【ハチロク】
# display as 八六
# JP: 「これを、お口の中にあらかじめ仕込んでおいて？」
2423 = "「你是先將布丁放在口中？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。何回か練習してからって思ったんだけど、\nソーテツとハチロク、いつもより早かったから」
2618 = "「嗯，奧莉薇本想練幾次再嘗試的，沒想到你們今天比平時起得更早」" 

# 【双鉄】
# display as 雙鐵
# JP: 「試験が足りずうまくいかずに、\n思ったよりも低すぎる体温が出てしまったわけか」
2898 = "「於是由於缺乏經驗，測出的體溫就比預想更低是嗎」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「シッパイした！　って思ったけど――でも！\nソーテツもハチロクもいかせてくれて、嬉しかった！」
3250 = "「雖然奧莉薇也以為會穿幫！但是你們也都同意奧莉薇去工作，奧莉薇好高興！」" 

# monologue
# JP: ありがとね、とオリヴィは屈託の無い笑顔を浮かべる。
3753 = "她說著便眉開眼笑，向我們表示謝意。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ゴマカシたってすぐにバレるの、カクゴしてたけど、\nこんなカタチでとは思わなかったなー」
3251 = "「雖然奧莉薇想到了會露餡，真沒想到會是因為這個」" 

# monologue
# JP: 笑顔のままにそう言って、オリヴィは、\nニイロクから託されたクーラーボックスの中味を取り出す。
3716 = "奧莉薇滿面笑容，打開二六交給我們的便攜冷藏包。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ひんやりするヤツ！　ホレーザイ！　こんなにたくさん、\n『なんで？』ってことになっちゃうに決まってるのに」
3234 = "「都是能製冷的冰盒！一般看到這麼多冰盒，只會感到疑惑吧」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ。なんで、とは聞きませんでしたよ？\n自明のことに思えましたので」
2347 = "「不，我們當時可沒有任何疑問，因為情況可謂一目了然」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなんだ」
# 3150 = "「這樣啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ニイロクも、何も言わなかった。\nただ、これをオリヴィにと、それだけだ」
2365 = "「二六也沒告訴我們，只是要我們把這個帶給你」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……そーなんだ」
1785 = "「……這樣啊」" 

# monologue
# JP: オリヴィがクっと下を向き、\nけれどもすぐにその顔を、慌てたように持ち上げ直す。
3726 = "奧莉薇說著低下頭來，但她又連忙抬了起來。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ニーロクはなんにも悪くないよ！！？　オリヴィ、\nひとくちゼリー買ってきてって、たのんだだけだし」
2415 = "「你們可不能怪二六啊！！？她只是受奧莉薇所託去買了布丁」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかっている。ニイロクは何も知らずに、\nただ、オリヴィの頼みを引き受けただけだ」
2856 = "「我明白，二六只是幫你買了布丁，並不知道你要拿來做什麼」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっか、ならよかったー」
3149 = "「這樣呀，那就好」" 

# monologue
# JP: ほっとしたようにオリヴィは、\n無数の保冷剤の中から一つを取り出し、首筋にあてる。
3730 = "奧莉薇鬆了口氣，從數不清的冰盒裡取出一個，貼在脖子上。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー。冷たい、気持ちいー」
2579 = "「啊，好冰，好舒服」" 

# monologue
# JP: ……すべての想いを、優しさを、\nできるだけいい方向に持っていきたい。
1688 = "……我將儘可能讓大家的心意與溫柔，都得到好的結果。" 

# monologue
# JP: そう考えれば、言葉は自然と、穏やかになる。
3499 = "一想到這裡，脫口而出的言語便多了幾分平和。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……今夜はこのまま、僕ら三人で当直につこう」
1753 = "「……今晚就我們三個值班吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だね。三人いないと、コータイで休めないもんね」
2768 = "「對呀，起碼得有三個人才能輪流休息」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ」
2953 = "「正是此理」" 

# monologue
# JP: 現状を受け入れ、諦めず。\nいまいる場所からの最善を常に模索する――
3845 = "我們要以積極的態度面對現狀，永不放棄尋找目前最妥善的措施——" 

# monologue
# JP: そうあろうとしていた地点に、\n僕もオリヴィも、ようやく、立ち返ってこれた。
3517 = "不論是我還是奧莉薇，也終於回到了這一正確的心態。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、そう動こう。\nひとまず、僕らの当番時間となるのは、明朝[よじ,3]0400までだ」
3206 = "「那就這麼辦吧，總之我們的值班時間是從現在開始到明早０４００」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「始発に間に合うよーに？」
2924 = "「是為趕上首班車？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。８時間３交代で回していく」
2961 = "「沒錯，八小時一班三班倒」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら――\n[よじ,3]0400-[じゅうにじ,3]1200。1200-[にじゅうじ,3]2000。2000-0400、だね？」
3173 = "「那具體時段就是——０４００到１２００,１２００到２０００，２０００再到０４００對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。で、僕ら担当の八時間も三交代とし、\n一人ずつ順番に休養をとろう」
2620 = "「嗯，所以我們負責的這八個小時也換三次班，每次休息一個人吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかったー」
2710 = "「好——」" 

# monologue
# JP: ハチロクの言が効いたのだろう。\nオリヴィは、至極素直に頷いてくれる。
3530 = "也許是多虧了八六方才的話，奧莉薇聽話地點了點頭。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、順番は？　誰から休むの？？」
2883 = "「所以順序呢？誰先休息？？」" 

# monologue
# JP: （ヒュォォォォ――）
4133 = "（咻————）" 

# monologue
# JP: ……風と雪とが、音を消します。
1698 = "……風與雪蓋住了一切聲音。" 

# monologue
# JP: 保線基地の中、お眠りだろう双鉄さまの寝息さえ、\nわたくしの耳には届きません。
3920 = "明明雙鐵少爺應當已經在巡線基地小寐，但我的雙耳卻捕捉不到他的氣息。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「みんな、眠ってる時間だねー」
2654 = "「在這個時間，大家都在睡覺呢」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\n誰もが、夢の中にいる――」
3094 = "「誠如所言，大家都進入了夢鄉——」" 

# monologue
# JP: 思えばふっと、不安になります。\n平日の夜。みなが在宅し、眠りに落ちている。
3824 = "想到這裡，我忽然心生不安，今天是再尋常不過的工作日，所有人都已在家陷入酣睡。" 

# monologue
# JP: この時間帯に、もしも災害が起きたのならば、\n被害はどれほど大きくなってしまうのでしょう。
3561 = "假如在這個時間發生重大災害，後果將不堪設想。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ううっ」
2592 = "「嗚嗚」" 

# monologue
# JP: ぶるりと、オリヴィちゃんが震えます。
3721 = "奧莉薇突然打起冷顫。" 

# monologue
# JP: いけません。いまわたくしが見るべきは、\n悪い想像などではなく、目の前にある現実たちです。
3513 = "不好，比起不吉利的想像，我更應關注眼前的現實。" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん、寒いのですか？」
2698 = "「奧莉薇，你冷嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ぜーんぜん！　あっついくらいだよー。\nハチロクこそ、寒くないのー？」
2546 = "「哪有！熱乎著呢，那八六呢，你冷不冷？」" 

# 【ハチロク】
# display as 八六
# JP: 「ええ、少しも。\nオリヴィちゃんの肩と、双鉄さまの傘がございますので」
2628 = "「嗯，絲毫沒有寒冷的感覺，多虧了與你並肩站在一起，還有雙鐵少爺的傘遮蔽」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっか！　なら、もっとくっついてあげるね。\nぴとーーーーっ」
3151 = "「這樣啊！那我們就再靠緊一點吧，嘿————」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、なんとあたたかなことでしょう」
2529 = "「哇，竟有這般暖和」" 

# monologue
# JP: ……あたたかすぎます。\n双鉄さまがお使いになる、ゆたんぽよりもあたたかなほど。
1694 = "……簡直是暖到異常，溫度甚至超過了雙鐵少爺常用的熱水袋。" 

# 【ハチロク】
# display as 八六
# JP: 「では、わたくしもおかえしです。\nぴとっ」
3212 = "「那我也需要回禮，我貼」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「きもちいー！　ハチロクはひんやりだねー」
2985 = "「涼涼的好舒服！你的身體有點冰呀」" 

# monologue
# JP: わたくしの服でむき出しの部分など、ほんのわずか。
3869 = "我的身體幾乎完全被衣服裹住，少有與外界接觸的部位。" 

# monologue
# JP: そのわずかである頬を頬へと押し付けたなら、\nオリヴィちゃんは、しあわせそうな声で笑って下さいます。
4008 = "而我便將裸露在外的臉頰與她的臉頰貼在一起，於是奧莉薇便眉開眼笑，一臉幸福。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどそれって、やっぱり冷え切ってるってことだよね？\nハチロクは、保線基地の中から見ててもいいよ？」
2500 = "「可你這果然還是凍著了吧？要不你就待在巡線基地裡觀察吧」" 

# 【ハチロク】
# display as 八六
# JP: 「その間、オリヴィちゃんは？」
3167 = "「那你呢？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィは、ここを見てたい。\n何かあるとしたら、きっとここって思うから」
2687 = "「奧莉薇想盯緊這裡，感覺要出問題，應該也是出在這個地方」" 

# 【ハチロク】
# display as 八六
# JP: 「確かに、ここで何かあっても――この風と雪では、\n保線基地からでは音にさえ気づけないかもしれませんね」
3008 = "「的確就算這裡發生情況，以目前這個天氣，待在巡線基地裡可是一點動靜都察覺不到」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよねー。\n保線基地からだと、ここって全然見えないもんねー」
2785 = "「就是呀，而且這裡屬於死角，在巡線基地裡頭可觀察不到」" 

# monologue
# JP: 保全のための資材と道具とを揃え、\n簡易的にでも休憩できる広さと設備。
4063 = "這裡儲存有巡線需要的各種工具與材料，並且具有可供休息的空間，儘管結構簡樸，功能可謂一應俱全。" 

# monologue
# JP: 双鉄さまは、ときおり“小屋”と呼ばわれますが、\nなかなかどうして、小さな物ではございません。
4086 = "雖然雙鐵少爺偶爾會稱其為“小屋”，但是這巡線基地的空間可並不算狹窄。" 

# 【ハチロク】
# display as 八六
# JP: 「簡素とはいえ、やはり面積がありますものね。\nこの近くで広さを取れれば、一番よろしかったのですが」
3253 = "「雖然構造簡單，但還是要占不小的地皮，雖說要是能在更近一點的地方找到搭建基地的空間就好了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ナイモノネダリしてもしょーがないよ。事故とかが、\nこっちのツゴーにあわせてくれるわけないんだし！」
2889 = "「找不到也沒辦法啦，事故這些可由不得我們安排！」" 

# 【ハチロク】
# display as 八六
# JP: 「それは――まことに左様ですね」
3010 = "「的確，是這個道理」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だからオリヴィ。ここから見てる」
2879 = "「所以奧莉薇就站在這裡觀察」" 

# monologue
# JP: ぶるりと、オリヴィちゃんがまた震えます。
4046 = "說罷，奧莉薇的身體又顫抖起來。" 

# monologue
# JP: ――寒さではないとおっしゃいました。\nならばなおさら、よりそう相手が必要です。
1659 = "——她說並不是因為著涼了。那就更應該有人陪伴在她身邊。" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、わたくしもここから見ます」
3210 = "「那我也待在這裡一起觀察」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっか！」
2308 = "「一起是嘛！」" 

# monologue
# JP: ――ぽかっ。あたたかみが増します。
3897 = "於是身體更添一層溫暖。" 

# monologue
# JP: オリヴィちゃんが、甘えるように、\nわたくしにもたれかかってきてくださいます。
3710 = "奧莉薇就像與人撒嬌一般，緊緊依在我的身上，" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……最初ね？　オヒトヨ鉄道いけっていわれたとき。\nオリヴィ、捨てられたって思ったの」
1780 = "「……要說一開始，剛要奧莉薇去御一夜鐵路的時候，奧莉薇還以為自己是被拋棄了」" 

# 【ハチロク】
# display as 八六
# JP: 「で、ございましょうね」
3141 = "「這也是在所難免」" 

# monologue
# JP: オリヴィちゃんにとっての宗方様は、\nわたくしにとっての双鉄さま。
3766 = "宗方先生在奧莉薇心目中的地位，就如同我心目中的雙鐵少爺。" 

# monologue
# JP: 一緒に居られるのであれば、世界のどこに追われようとも、\n何の恐れもございませぬが――
4023 = "若能陪伴對方左右，即便是流落於天涯海角，也無所畏懼。" 

# 【ハチロク】
# display as 八六
# JP: 「……離れ離れに、なってしまったのですものね」
1779 = "「……畢竟你是要和宗方先生分別」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ。だからすっごくイヤだったし、サミシかったし、\nみかん鉄道に帰りたいって、それだけだったの」
2773 = "「對，所以奧莉薇當時感到好寂寞好牴觸，一心只想回到橙鐵路」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2597 = "「嗯」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどね？　今はね、\n来てよかった！　って思ってる」
2344 = "「不過現在就不一樣了，奧莉薇很慶幸自己能來到這邊」" 

# monologue
# JP: ぽかっと。また、あたたかみ。
3829 = "感覺又多了幾分溫暖。" 

# monologue
# JP: オリヴィちゃんとわたくしと、\n姿勢を変えておりませんのに。
3919 = "明明彼此的姿勢沒有任何變化。" 

# 【ハチロク】
# display as 八六
# JP: 「そのように思っていただけるのでしたら、\nわたくしも本当に幸せです」
3064 = "「若真能博得你如此好感，我自是幸福之至」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　オリヴィもね、すっごくしあわせ！！」
2601 = "「嗯！奧莉薇感覺也好幸福！！」" 

# monologue
# JP: ――ああ、なんという笑顔でしょう。\n双鉄さまにお見せ出来ないのが申し訳ない――
1658 = "——啊啊，何等燦爛的笑容，只可惜沒能讓雙鐵少爺一同目睹。" 

# monologue
# JP: けれど、心のほんの少しは、浅ましいこととわかっても、\n独り占めできることを喜んでしまう――そんな笑顔。
3640 = "可是在內心深處——卻又為能夠獨占這可愛的笑容萌生一絲膚淺的喜悅。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィさ。\nもーいつ止まるかっていう状況でしょう？」
3079 = "「要說奧莉薇現在，已經是隨時都有可能停止活動了對吧？」" 

# 【ハチロク】
# display as 八六
# JP: 「そのようなことは」
2817 = "「怎麼會呢」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あるの。っていうか……」
2814 = "「怎麼不會，不如說……」" 

# monologue
# JP: オリヴィちゃんが、下を向きます。\nそうしてそっと、おそるおそると、わたくしを見ます。
3720 = "奧莉薇突然低下頭來，再戰戰兢兢地看向我。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「え、と――\x%l共感;#00ffc040;共感%l;#;。もう少し深く受け取ってみる？\nハチロクがもしイヤじゃなければ」
3170 = "「那個——要不要加深一點\\x%l共感;#00ffc040;共鳴%l;#;的級別？當然前提是你願意」" 

# 【ハチロク】
# display as 八六
# JP: 「イヤなはずなどございません！\nわたくしはむしろいつだって」
2815 = "「怎麼會不願意呢！我可是歡迎之至」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら！　ちょとだけ範囲ひろげて――\nほんの一瞬、ガマン、やめるね？」
3181 = "「那奧莉薇就擴大一點共鳴範圍——稍微停止一下下忍耐了」" 

# monologue
# JP: オリヴィちゃんの指先が、\nわたくしの指先をそっと捕まえ――
3714 = "奧莉薇抬起了自己的手指，抵住了我的指尖——" 

# 【オリヴィ】
# display as 奥莉薇＆八六
# JP: 「っ」\n「っっっ！！！？」
2590 = "「嗚」\\n「嗚嗚！！！？」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ――あっ――あっ――あっ――」
2555 = "「啊——啊——啊——啊——」" 

# monologue
# JP: 吸気が――排気が――できなくなります。\n涙が、ぼろぼろと零れます。
3878 = "我陷入無法吸氣，也無法排氣的狀態，淚如泉湧無從自己。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……っ――ぁ――。\nごめん、ね？　おどろかせちゃったよね」
1760 = "「……嗚——啊，抱歉，嚇到你了吧」" 

# 【ハチロク】
# display as 八六
# JP: 「おどろいた――ああ――はい――いえ――\nいえ――わたくしっ」
2652 = "「嚇到我——啊——嗯——不是，我不是！」" 

# monologue
# JP: 渦巻くような、それは苦痛。
3895 = "方才是痛楚席捲我的全身。" 

# monologue
# JP: 引き込まれ、呑まれてしまえば開放される――\nすべてを放棄してしまうことへの、余りにも甘美な[いざな]誘い。
3622 = "只要放棄抵抗，任其吞噬意志便能得到解脫，這是太過甜美的誘惑，只需放棄一切便可讓痛苦隨之消失。" 

# 【ハチロク】
# display as 八六
# JP: 「このような――このような状態で――\nオリヴィちゃんは――よく――いつもどおりに」
2700 = "「奧莉薇，你居然——你居然身陷這種狀況，都還能——裝得像沒事人一樣」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そう思われたら、ハチロク、オリヴィを止めたでしょ？\nだから、ハチロクとはキョリおいてたの――ごめんね？」
3077 = "「要是讓你發現了，那你肯定會阻止奧莉薇不是嗎？所以之前才不讓你來看奧莉薇的——對不起」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ。いいえ。\nごめんだなどと、そのような――」
2325 = "「不用，不用的——怎麼會需要你道歉呢」" 

# monologue
# JP: どれほど止めたく思えども……\nわたくしには、きっと止められずにいたことでしょう。
3605 = "即便內心有一萬個念頭想要阻攔她……但是到最後，我肯定還是阻止不了她的。" 

# monologue
# JP: かほど凄まじい苦痛に耐えて、\nその上でなお、果たしたいことがあるのなら――
3619 = "只要她即使身負如此劇烈的痛楚，也還有渴望完成的使命——" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けっこーオリヴィつらくって。だから、今日とかもう、\nここを見ながら止まってもいいかなっても思ったの」
2453 = "「其實，奧莉薇已經撐不住了，所以今天本來是想……一直盯著這裡，就算在這裡停止活動我也心甘了」" 

# 【ハチロク】
# display as 八六
