3224 = "「那線路周邊的隆起，就跟那個什麼火山活動活躍週期沒什麼關係囉？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「関係は多分、濃厚です」
3240 = "「關係應該不小」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。そもそも、温泉自体が火山活動の表れだ。\n隆起地点を含めて一帯すべて、霧縞山の山体ともいえる」
2963 = "「沒錯，況且溫泉自身就是因火山活動形成的，這一帶包含發生隆起的地點在內，都屬於霧島山山體的一部分」" 

# 【凪】
# display as 凪
# JP: 「ふわ！\n[きりしまさん,2]霧縞山って、めっちゃでっかか山ばいねぇ」
2526 = "「哇！霧島山怎麼這麼大吶」" 

# 【ポーレット】
# display as 波萊特
# JP: 「砂の件も共有しました。霧縞市としては周辺地域、\n避難勧告まで含めての検討を行うそうです」
3241 = "「關於井水含沙的情況也通知對方了，霧島市政府甚至已經在討論是否需要向周邊區域發出避難通知」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこまで緊急度の高い話なのか？」
2823 = "「情況有這麼迫在眉睫嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは専門家が検討中とのことですが――\nわたしたちは、最悪を考えて行動しないと」
2951 = "「有關專家正在進行分析，但是我們必須將最壞的情況考慮在內」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。鉄道は常に、『安全が第一の使命』なのだから」
2962 = "「沒錯，我們鐵路必須時刻將安全放在第一位」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です」
# 2764 = "「對」" 

# 【凪】
# display as 凪
# JP: 「やったら！　凪さまたちは何すればよかと！？」
3177 = "「那咱們該做點什麼啊！？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしたちの仕事は鉄道です。鉄路を維持すること。\nそれは、地域の安全を担保することにも繋がります」
2840 = "「我們負責的是鐵路，具體來說就是確保鐵路暢通，而鐵路的暢通也能對保障當地安全起到積極作用」" 

# 【双鉄】
# display as 雙鐵
# JP: 「万一災害が発生し、道路が寸断されたとしても――\n鉄路が生きているのなら、物資も人員も輸送できる」
2469 = "「即便是發生自然災害，導致道路交通中斷，只要鐵路依然暢通，就能運輸人員物資」" 

# 【凪】
# display as 凪
# JP: 「やったら――線路が壊れたりせんよーに、\n警戒とかそういうことすればよかと？」
2829 = "「意思就是咱們得時刻保持警惕，防止線路被破壞？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nそれを、通常の乗務と平行でおこなっていきたい」
2965 = "「沒錯，與之同時，最好還要能夠照常完成乘務任務」" 

# 【凪】
# display as 凪
# JP: 「ああ。やけんさっきにーさん、\n時間外労働ゆうとったんねー」
2649 = "「噢，怪不得剛說要加班咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2597 = "「嗯」" 

# monologue
# JP: 凪が理解し、納得してくれた。
3597 = "凪表示理解，並接受了我的請求。" 

# monologue
# JP: ならばその圧倒的な行動力を空回りさせぬよう、\n行動指針を、しっかり定めて与えたい。
4071 = "那我就必須要為她定好行動方針，好充分發揮她過人的行動力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「避難の判断等に関しては、\n専門家に任せておけるのだよな？」
2916 = "「是否避難這些問題，是交給專家定奪對吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。情報はできるだけ密に共有できるようにと――\nその体制づくりも、御一夜市を入れてで進めます」
2774 = "「對，為了讓我們儘可能與對方互通情報，我會建議讓御一夜市也參與其中，共同探討如何建立防災體制」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よろしく頼む。\x%l保線;#00ffc040;保線%l;#;の方の具体的な行動指針は？」
3189 = "「那就交給你了，\\x%l保線;#00ffc040;巡線%l;#;的具體行動方針呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そっちは、双鉄くん――ううん、\n運輸部長兼\x%l保線部長;#00ffc040;保線部長%l;#;に、全権委任でお願いできますか？」
3143 = "「這些就，雙鐵君——不，我公司的運輸部長兼\\x%l保線部長;#00ffc040;巡線部長%l;#;，這些能否全權交由你來規劃？」" 

# monologue
