# 【オリヴィ】
# display as 奥莉薇
# JP: 「そだよね！　えへへー」
2781 = "「就是呀！哎嘿嘿」" 

# monologue
# JP: いって、オリヴィちゃんは空を見ます。
3725 = "奧莉薇說罷，又望向天空。" 

