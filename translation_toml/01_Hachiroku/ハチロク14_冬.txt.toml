3515 = "不止是巡線，她還提到了運輸部長，那也就是說，她准許我視情況調動車輛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「全権で、よろしいのですか？」
3024 = "「真要全權交由我負責？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。ですが、運用を変化させる場合は、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;たちと相談の上で、報告も入れてください」
2613 = "「嗯，但是如果出現調動車輛的需要，請你徵求\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;們的意見，並向我報告」" 

# monologue
# JP: 照会ではなく、報告でいい。\nそれほどにポーレットは僕を信頼してくれている。
3627 = "只需報告，而不用徵求她的同意，這也說明波萊特對我的信賴有多麼深厚。" 

# monologue
# JP: それは同時に、ポーレットもフル稼働になる――\n非常時にも彼女の能力に頼れない可能性をも、示している。
4016 = "而這同時也表明，她即將全神貫注埋頭於工作中，即使出現緊急狀況，也有可能無法得到她的助力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――謹んで拝命します」
2845 = "「我定竭盡全力，不辱使命」" 

# 【ポーレット】
# display as 波萊特
