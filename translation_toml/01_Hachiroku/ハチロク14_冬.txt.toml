3747 = "她提到的丸山香織，是歷經波萊特嚴格挑選，進入御一夜鐵路的\\x%l庫内手;#00ffc040;洗爐工%l;#;新人兼見習\\x%l機関助士;#00ffc040;司爐%l;#;。" 

