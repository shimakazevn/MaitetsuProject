[script]
# lines: 399 
# monologue
# JP: （Ｎゲージ、といったか）
2905 = "(\\x%lNゲージ;#00ffc040;N-gauge%l;#;, gọi là vậy nhỉ)"
# monologue
# JP: レールショップにいつでも展示してある、\n電気で動く鉄道模型。
2536 = "Mô hình đường sắt chạy bằng điện,\nlúc nào cũng được trưng bày ở cửa hàng đường sắt."
# monologue
# JP: 新たになった決意のもとで見てみれば、\n今までのように、“単なるおもちゃ”とは思えなくなる。
2478 = "Dưới quyết tâm mới mẻ này mà nhìn lại,\ntôi không còn thấy nó \"chỉ là một món đồ chơi\" như trước nữa."
# monologue
# JP: （細かなところまで良く作ってあるな。\n町の模型は……古い御一夜を模してあるのかな？）
2908 = "(Làm tỉ mỉ đến từng chi tiết nhỏ nhỉ.\nMô hình thị trấn này……là mô phỏng theo Ohimitera ngày xưa sao?)"
# monologue
# JP: 小さな頃の僕には、まるで余裕がなかった。
2699 = "Hồi còn nhỏ, tôi hoàn toàn không có tâm trí thảnh thơi."
# monologue
# JP: 御一夜の町は、楽しみ、親しみ、暮らす空間ではなくて、\n少しでも罪を贖う機会を探し求めるための場所だった。
2839 = "Thị trấn Ohimitera, không phải là không gian để tận hưởng, gần gũi hay sinh sống,\nmà là nơi để tôi tìm kiếm cơ hội chuộc tội dù chỉ là một chút."
# monologue
# JP: （……それでも懐かしく感じるものだな）
2865 = "(……Dù vậy vẫn cảm thấy hoài niệm thật đấy)"
# monologue
# JP: じっと見てると、心のどこかがあたたかになり――\n同時に、胸を潰されるような息苦しさも感じる。
2435 = "Nhìn chằm chằm vào nó, một nơi nào đó trong tim tôi trở nên ấm áp——\nĐồng thời, cũng cảm thấy nghẹt thở như bị đè nát lồng ngực."
# monologue
# JP: ……恨みを捨てて慣れ親しんだつもりでも\n恐怖は今なお、体の深くに染み付いている。
1369 = "……Dù đã định gạt bỏ oán hận để làm quen với nó\nnhưng nỗi sợ hãi vẫn in sâu vào tận xương tủy."
# monologue
# JP: （だが、慣れるのだ。\n体も心も、少しずつでも、慣らしていかねば――）
2883 = "(Nhưng, phải làm quen thôi.\nCả thể xác lẫn tâm hồn, dù từng chút một, cũng phải dần thích nghi——)"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、ずいぶんと熱心に見ておられるのですね」
2233 = "「Ngài Soutetsu, ngài xem chăm chú quá nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん」
1814 = "「Ừm.」"
# monologue
# JP: ハチロクの声で我に返る。
2416 = "Tiếng gọi của Hachiroku kéo tôi về thực tại."
# monologue
# JP: 模型に魅入ってしまうなぞ、\n大の男のするようなことでもなかろうが――
2853 = "Bị một mô hình cuốn hút,\nđâu phải là chuyện một người đàn ông trưởng thành nên làm——"
# 【双鉄】
# display as 雙鐵
# JP: 「どこか、不思議な懐かしさを感じてな。\n目を奪われてしまったようだ」
1677 = "「Cảm thấy có chút hoài niệm kỳ lạ.\nNên bị thu hút mất rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「不思議な懐かしさ、ですか？」
1678 = "「Hoài niệm kỳ lạ, sao ạ?」"
# monologue
# JP: よほど奇妙にでも聞こえたのか、\nハチロクは、はてなと首を傾げる。
2410 = "Có lẽ nghe quá đỗi kỳ lạ,\nnên Hachiroku nghiêng đầu thắc mắc."
# 【ハチロク】
# display as 八六
# JP: 「わたくしが現役だったころの町は、\nどこもこのような景色でしたが」
1834 = "「Thị trấn vào thời em còn đương chức,\nđâu đâu cũng là cảnh sắc như thế này mà.」"
# monologue
# JP: 言いながら、ハチロクの目も細まっていく。\n遠くを見つめているかのように。
2404 = "Vừa nói, mắt Hachiroku cũng nheo lại.\nNhư thể đang nhìn về một nơi xa xăm."
# 【ハチロク】
# display as 八六
# JP: 「鉄道と鉄道駅こそが、町の中心でした。\n町とは、駅によって作られるものだったのです」
2216 = "「Đường sắt và ga tàu, mới chính là trung tâm của thị trấn.\nThị trấn, được tạo nên từ những nhà ga.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうだったな」
1772 = "「A……Đúng là vậy nhỉ.」"
# monologue
# JP: 遠くへ出かける――\nその玄関は、確かにいつでも駅だった。
2451 = "Đi xa——\nCửa ngõ đó, quả thực lúc nào cũng là nhà ga."
# monologue
# JP: 親に買ってもらった切符で、路子と改札をくぐるのは、\n僕の町を出て行くという、ひとつの楽しいイベントだった。
2603 = "Cầm tấm vé được bố mẹ mua cho, cùng Michi bước qua cửa soát vé,\nrời khỏi thị trấn của mình, từng là một sự kiện vui vẻ."
# 【双鉄】
# display as 雙鐵
# JP: 「ありふれた光景だからこそ……かな。\n昔は、僕も――」
2018 = "「Chính vì là cảnh tượng quen thuộc……nhỉ.\nNgày xưa, tôi cũng——」"
# 【凪】
# display as 凪
# JP: 「お待たせばーい！　遅くなったばいっ！！」
1842 = "「Để mọi người đợi lâu rồi! Em đến muộn!!」"
# 【ふかみ】
# display as 深美
# JP: 「す、すみません。です。\n出かけようとしたら、ご予約の電話が入っちゃって」
1876 = "「X, xin lỗi mọi người.\nLúc em định ra ngoài thì lại có điện thoại đặt chỗ.」"
# monologue
# JP: 凪とふかみとの登場に、\n小さな疑問と淡い感傷は吹き飛んでいく。
2846 = "Sự xuất hiện của Nagi và Fukami,\nđã thổi bay những thắc mắc nhỏ nhoi và chút cảm thương nhạt nhòa."
# monologue
# JP: 見るべきはただ現実と、その先にある未来なのだと、\n元気いっぱいな姿が思いださせてくれる。
2519 = "Dáng vẻ tràn đầy năng lượng của họ đã nhắc nhở tôi rằng,\nđiều cần nhìn vào chỉ là hiện thực, và tương lai ở phía trước."
# 【双鉄】
# display as 雙鐵
# JP: 「いや。僕が即断出来なかったがための会合だ。\nバタバタさせてしまったのなら、申し訳ない」
1784 = "「Không. Cuộc họp này là do tôi không thể quyết định ngay lập tức.\nNếu làm hai người phải tất bật thì tôi xin lỗi.」"
# 【ふかみ】
# display as 凪＆深美
# JP: 『「ホントばい！」\n「いえ、そんな」』
2241 = "『「Thật đó!」\n「Dạ không, không có gì đâu ạ.」』"
# monologue
# JP: ふたりの口から、正反対の言葉が同時に飛び出せば、\n凪はきょとんとふかみを見つめる。
2401 = "Hai lời nói hoàn toàn trái ngược đồng thời thốt ra từ miệng hai người,\nNagi ngơ ngác nhìn Fukami."
# 【ふかみ】
# display as 深美
# JP: 「これ大事なお話って、わかってます。です。\nだから、仲間はずれにされたらきっと、寂しいですから」
1944 = "「Em biết đây là chuyện quan trọng.\nNên nếu bị cho ra rìa thì chắc chắn sẽ buồn lắm.」"
# 【凪】
# display as 凪
# JP: 「あ！　それもそうばい！　納得ばい！！」
1795 = "「A! Nói cũng đúng! Hợp lý!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「これで、全員そろいましたね」
2053 = "「Vậy là, mọi người đã đông đủ rồi nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「そろったですよぉ」
1707 = "「Đông đủ rồi nha~.」"
# monologue
# JP: ポーレットと、その膝の上のれいなとが、\n凪の頷きに声を重ねて、僕らの視線を集中させる。
2685 = "Paulette, và Reina đang ngồi trên đùi cô ấy,\nhòa giọng cùng cái gật đầu của Nagi, thu hút sự chú ý của chúng tôi."
# monologue
# JP: が、日々姫の視線だけ落ち着かぬ。\n椅子から腰を浮かせてきょろきょろ、あたりを見回す。
2697 = "Nhưng, chỉ có ánh mắt của Hibiki là không yên.\nEm ấy nhổm người lên khỏi ghế, dáo dác nhìn quanh."
# 【日々姫】
# display as 日日姬
# JP: 「ねぇね――こほんっ――\n姉さんは、来ないんですか？」
2222 = "「Chị hai——khụ——\nChị ấy, không đến sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、蔵の仕事を外せんらしい」
1877 = "「A, có vẻ công việc ở xưởng rượu không dứt ra được.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ。兄さん、今朝、姉さんと？」
2211 = "「A. Anh trai, sáng nay, gặp chị ấy à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。\n起きがけに顔をあわせて、少し話した」
1824 = "「Ừm.\nLúc mới dậy có chạm mặt, rồi nói chuyện một chút.」"
# 【日々姫】
# display as 日日姬
# JP: 「それでなんだ」
1911 = "「Ra là vậy.」"
# monologue
# JP: 納得顔で日々姫が椅子へと腰を戻せば、\nポーレットが小さく咳払いする。
2646 = "Hibiki với vẻ mặt hiểu ra vấn đề ngồi lại xuống ghế,\nPaulette hắng giọng nhẹ."
# 【ポーレット】
# display as 波萊特
# JP: 「なら、これでみなさん集まったということで――\n双鉄くん。よければ、昨日の話の続きを」
2210 = "「Vậy, vì mọi người đã tập trung đông đủ rồi——\nCậu Soutetsu. Nếu được, xin hãy tiếp tục câu chuyện ngày hôm qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。一晩じっくりと考えてみたのだが、\n僕は、\x%l機関士;#00ffc040;機関士%l;#;に専念したいと思う」
1808 = "「Ừm. Sau một đêm suy nghĩ kỹ càng,\ntôi muốn chuyên tâm làm \x%l機関士;#00ffc040;người lái tàu%l;#;.」"
# monologue
# JP: まず結論から切り出せば、\nガタっと、いくつかの椅子が鳴る。
2377 = "Vừa mở đầu bằng kết luận,\nvài chiếc ghế đã kêu cạch một tiếng."
# monologue
# JP: 日々姫の尖った口が何か言うより先に、\n続く言葉を発してしまう。
2813 = "Trước khi cái miệng chu lên của Hibiki kịp nói gì đó,\ntôi đã tiếp tục lời nói của mình."
# 【双鉄】
# display as 雙鐵
# JP: 「そうすれば、日々姫とポーレットの要望にも応えられる。\nゆえに、それこそが最善の道だと考えた」
2162 = "「Làm như vậy, sẽ có thể đáp ứng được mong muốn của Hibiki và Paulette.\nVì thế, tôi cho rằng đó chính là con đường tốt nhất.」"
# 【ポーレット】
# display as 日日姬＆波萊特
# JP: 『「え？」\n「え？」』
2245 = "『「Hả?」\n「Hả?」』"
# monologue
# JP: 声が重なり、お互いの顔が向き合えば、\nどうぞお先にと、ポーレットは軽く手を差し出す。
2717 = "Giọng nói cất lên cùng lúc, hai người nhìn nhau,\nPaulette khẽ đưa tay ra, ra hiệu mời đối phương nói trước."
# 【日々姫】
# display as 日日姬
# JP: 「それって、どういう……」
2158 = "「Chuyện đó, là sao cơ……」"
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜の人と暮らしを、もっと良く知るべきと――\n日々姫の意見を、僕は大いに参考にすべきものと感じた」
1926 = "「Nên hiểu rõ hơn về con người và cuộc sống ở Ohimitera——\nTôi cảm thấy ý kiến của Hibiki, là điều rất đáng để tham khảo.」"
# 【日々姫】
# display as 日日姬
# JP: 「ならっ」
2197 = "「Vậy thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、乗務を通じて果たしていきたいと考えた。\nそうした方が、おそらく“素顔”が見れるとも」
1955 = "「Vì thế, tôi muốn thực hiện điều đó thông qua việc làm nhiệm vụ trên tàu.\nLàm như vậy, có lẽ sẽ thấy được \"bộ mặt thật\" của họ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー」
1793 = "「A.」"
# monologue
# JP: それもそっか、と言わんばかりの、\nなんとも微妙な声と頷き。
2751 = "Như thể muốn nói \"Ra là vậy\",\nmột giọng điệu và cái gật đầu có phần vi diệu."
# monologue
# JP: 日々姫は、聡い。\nみなまでを言う必要も無いかもしれんが――
2630 = "Hibiki, rất thông minh.\nCó lẽ không cần phải nói hết mọi chuyện ra——"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫と一緒にいるときに見える顔と暮らしは、\n“日々姫に見せてくれるもの”となろうからな」
2092 = "「Khuôn mặt và cuộc sống mà tôi nhìn thấy khi ở cùng Hibiki,\nsẽ trở thành \"những thứ họ muốn cho Hibiki thấy\" mà.」"
# monologue
# JP: それが悪いとは思わない。\n御一夜に馴染み、信頼を得ている日々姫が見る顔。
2827 = "Tôi không nghĩ điều đó là xấu.\nKhuôn mặt mà một người đã hòa nhập và có được sự tin tưởng ở Ohimitera như Hibiki nhìn thấy."
# monologue
# JP: それはきっと、御一夜の素晴らしい一面であり、\n観光客に伝えていくべき魅力であろうと思うから。が――
2829 = "Đó chắc chắn, là một khía cạnh tuyệt vời của Ohimitera,\nvà là sức hấp dẫn nên truyền tải đến khách du lịch. Nhưng——"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃは……\nむき出しの素顔ば見たかとね」
2219 = "「Anh hai là……\nmuốn nhìn thấy bộ mặt thật không che đậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。日常使う鉄道の\x%l機関士;#00ffc040;機関士%l;#;などは、\n人というより、装置であり、あるいは背景だろうから」
2020 = "「Đúng vậy. \x%l機関士;#00ffc040;Người lái tàu%l;#; của tuyến đường sắt được sử dụng hàng ngày,\nthay vì là một con người, thì giống như một cỗ máy, hay một bối cảnh hơn.」"
# monologue
# JP: だから、誰も気にもせぬ。\n装わず、仮面をつけず、まさにむき出しの姿が見える。
2588 = "Vì thế, chẳng ai bận tâm cả.\nKhông ngụy trang, không đeo mặt nạ, có thể nhìn thấy dáng vẻ trần trụi nhất."
# monologue
# JP: ――日々姫が見ている“御一夜”とは、\nきっと別の御一夜を、そこから学べるように思う。
1345 = "——Tôi nghĩ mình có thể học được một Ohimitera khác,\nso với \"Ohimitera\" mà Hibiki đang nhìn thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「視点は、多い方が良いと思うのだ。\n御一夜を、より深く知りたいのなら」
2086 = "「Tôi nghĩ, có nhiều góc nhìn thì tốt hơn.\nNếu muốn hiểu sâu hơn về Ohimitera.」"
# 【日々姫】
# display as 日日姬
# JP: 「わかりました。納得しました。了解です！」
1940 = "「Em hiểu rồi. Đã thông suốt. Đã rõ!」"
# monologue
# JP: ふざけたような口調でいって、\n日々姫は軽く肩をすくめて、ポーレットを見る。
2637 = "Nói với giọng điệu đùa cợt,\nHibiki khẽ nhún vai, nhìn Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしも……わかっちゃったかな。\n勘違いだったら、ちょっと恥ずかしいんですけど――」
1928 = "「Tôi cũng……hiểu ra rồi nhỉ.\nNếu là hiểu lầm thì, hơi xấu hổ một chút——」"
# monologue
# JP: 照れ隠しのような苦笑を混じえ、\nけれど、その目は真剣だ。
2851 = "Xen lẫn nụ cười gượng như để che giấu sự xấu hổ,\nnhưng, ánh mắt ấy lại rất nghiêm túc."
# 【ポーレット】
# display as 波萊特
# JP: 「市政に対する意見とか要望とかも――\n双鉄くん、現場から上げようとしてくれてるんですね？」
2232 = "「Những ý kiến hay nguyện vọng đối với chính quyền thành phố——\nCậu Soutetsu, cậu định sẽ thu thập từ hiện trường đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。\nそういうこともできるのではないかと考えている」
1804 = "「Ừm.\nTôi đang nghĩ có lẽ mình cũng có thể làm được việc đó.」"
# monologue
# JP: ポーレットの視野は、僕のものよりよほど広い。\n今の短い言葉さえもが、それを明確に示している。
2684 = "Tầm nhìn của Paulette, rộng hơn tôi rất nhiều.\nNgay cả những lời ngắn gọn vừa rồi, cũng đã thể hiện rõ điều đó."
# monologue
# JP: なら、仮に僕が秘書を勤めてみたとても、\nその点では、たいした力になれんだろうし――
2587 = "Vậy thì, giả sử tôi có thử làm thư ký đi chăng nữa,\ntrong khía cạnh đó, chắc cũng chẳng giúp ích được gì nhiều——"
# 【双鉄】
# display as 雙鐵
# JP: 「それに加え、[ハチロクニイマル,3]8620が営業運転できるようになれば、\nキハ[レイナナ,1]07とれいなの負担も、分散されよう」
2078 = "「Thêm vào đó, nếu 8620 có thể đi vào vận hành thương mại,\nthì gánh nặng của Kiha 07 và Reina, cũng sẽ được san sẻ.」"
# monologue
# JP: 言えばれいなが、ふんわり頷く。
2712 = "Nghe vậy, Reina khẽ gật đầu."
# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ。ときどきでも代わってもらえたら\n時間のかかる検査とかできるようになりますからぁ」
2107 = "「Đúng vậy nha~. Nếu thỉnh thoảng có người thay ca cho\nthì sẽ có thể thực hiện những đợt kiểm tra tốn nhiều thời gian đó ạ~.」"
# 【ポーレット】
# display as 波萊特
# JP: 「本当ね、れいな」
2108 = "「Đúng vậy nhỉ, Reina.」"
# monologue
# JP: 穏やかな声、穏やかな手つき。\nポーレットは、れいなの髪を優しく撫でる。
2560 = "Giọng nói dịu dàng, cử chỉ ôn hòa.\nPaulette, nhẹ nhàng vuốt ve mái tóc của Reina."
# 【双鉄】
# display as 雙鐵
# JP: 「――現場で動くことからこそ、\n僕は一番、多くを学べるように思うのだ」
1399 = "「——Chính vì hoạt động ở hiện trường,\ntôi nghĩ mình sẽ học hỏi được nhiều nhất.」"
# monologue
# JP: 自分の主張を受け入れられてる。わかってもらえる。\nその実感が、僕の唇をなめらかにする。
2759 = "Chủ trương của mình được chấp nhận. Được thấu hiểu.\nCảm giác chân thực đó, khiến lời nói của tôi trôi chảy hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットが期待してくれたような政策なども、\nそうした方が、むしろヒントを見つけられそうだとも」
2039 = "「Những chính sách mà Paulette kỳ vọng,\nlàm như vậy, có khi lại dễ dàng tìm thấy manh mối hơn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね……それが一番いい形かもって、\n言われてみれば、感じます」
1685 = "「Đúng vậy nhỉ……nghe cậu nói thế,\ntôi cảm thấy đó có lẽ là cách tốt nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばよかった」
2185 = "「Vậy thì tốt rồi.」"
# 【凪】
# display as 凪
# JP: 「こいで話ば決まりばいっ！」
2169 = "「Vậy là chốt chuyện rồi nha!」"
# monologue
# JP: 凪が立つ。\n三本締めでもしてくれそうな勢いだが、早すぎる。
2805 = "Nagi đứng dậy.\nVới khí thế như chuẩn bị vỗ tay ba nhịp kết thúc, nhưng còn quá sớm."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、今少し待ってくれ。\nむしろ、二人にはこの先の部分で意見を聞きたいのだ」
1925 = "「Không, đợi một chút đã.\nĐúng hơn là, tôi muốn nghe ý kiến của hai người về phần tiếp theo này.」"
# 【ふかみ】
# display as 深美
# JP: 「わたしたちの意見、ですか？」
2079 = "「Ý kiến của bọn em, sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「二人だけでなく、\nみなの知恵を貸してもらいたいと考えている」
2056 = "「Không chỉ hai người,\nmà tôi muốn mượn trí tuệ của tất cả mọi người.」"
# monologue
# JP: あ、とポーレットの抑えたつぶやき。
2682 = "A, tiếng lẩm bẩm kìm nén của Paulette."
# monologue
# JP: 当然、考えてくれているのだろうが、\nこのことを、ポーレットに任せきりにはしたくない。
2517 = "Tất nhiên, chắc chắn cô ấy cũng đang suy nghĩ,\nnhưng tôi không muốn phó mặc toàn bộ chuyện này cho Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l客車;#00ffc040;客車%l;#;を――どうにか手に入れたいのだ」
1953 = "「\x%l客車;#00ffc040;Toa hành khách%l;#;——tôi muốn tìm cách kiếm được nó.」"
# 【ハチロク】
# display as 八六
# JP: 「観光の目玉とするのであれば、\x%l客車;#00ffc040;客車%l;#;の質を高めることは\n極めて重要となってくるかと存じます」
2090 = "「Nếu coi đây là điểm nhấn du lịch, thì việc nâng cao chất lượng của \x%l客車;#00ffc040;toa hành khách%l;#;\nlà vô cùng quan trọng ạ.」"
# monologue
# JP: 澄ました顔で、ハチロクが僕の言葉の不足を継ぎ足す。
2422 = "Với vẻ mặt nghiêm trang, Hachiroku bổ sung cho những lời còn thiếu sót của tôi."
# 【ハチロク】
# display as 八六
# JP: 「隙間から煙が流入してくるような\x%l客車;#00ffc040;客車%l;#;では、お客様の\nご気分もお召し物も真っ黒になってしまいますので」
1391 = "「Nếu là một \x%l客車;#00ffc040;toa hành khách%l;#; mà khói có thể tràn vào từ các khe hở, thì cả tâm trạng\nlẫn trang phục của hành khách đều sẽ trở nên đen kịt mất.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは……わたしも、\n理解しているつもりなんですけど――」
2151 = "「Chuyện đó……tôi cũng,\nhiểu rõ mà——」"
# monologue
# JP: 心苦しそうな声。
2683 = "Giọng nói có vẻ khổ tâm."
# monologue
# JP: れいなは不安になったのか、\n首を真上に、ポーレットのことを見つめてる。
2709 = "Reina có lẽ cảm thấy bất an,\nngóc đầu lên, nhìn chằm chằm vào Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「良い\x%l客車;#00ffc040;客車%l;#;を入手するのって――\nある面では、動力車の入手より難しいんです」
1914 = "「Việc kiếm được một \x%l客車;#00ffc040;toa hành khách%l;#; tốt——\nỞ một khía cạnh nào đó, còn khó hơn cả việc kiếm toa xe động lực nữa.」"
# monologue
# JP: ……\x%lまいてつ;#00ffc040;まいてつ%l;#;たちは、自分に必要な車輌を手放さない。\nそして\x%l客車;#00ffc040;客車%l;#;は、動力車よりも欲しがるものが限られている。
1361 = "……Các \x%lまいてつ;#00ffc040;Maitetsu%l;#; sẽ không từ bỏ phương tiện cần thiết cho mình.\nVà \x%l客車;#00ffc040;toa hành khách%l;#; thì, đối tượng mong muốn sở hữu nó còn hạn chế hơn cả toa xe động lực."
# monologue
# JP: 大廃線で、\x%l客車;#00ffc040;客車%l;#;のほとんどは廃棄・解体されて、\n現存している希少なものは、まずもって手放されない。
2488 = "Trong đợt Đại bãi bỏ tuyến, hầu hết \x%l客車;#00ffc040;toa hành khách%l;#; đều bị phế bỏ và tháo dỡ,\nnhững toa xe hiếm hoi còn sót lại, trước tiên là sẽ không bao giờ bị buông tay."
# 【ポーレット】
# display as 波萊特
# JP: 「――引退した\x%lまいてつ;#00ffc040;まいてつ%l;#;が放出することもありますけど、\nそういうのは、たいてい動力車もセットですから……」
1394 = "「——Mặc dù cũng có trường hợp các \x%lまいてつ;#00ffc040;Maitetsu%l;#; đã nghỉ hưu nhượng lại,\nnhưng những trường hợp đó, thường là đi kèm cả toa xe động lực theo bộ……」"
# monologue
# JP: 動力車の分、入手コストは上昇する。
2457 = "Vì có thêm toa xe động lực, nên chi phí để có được sẽ tăng lên."
# monologue
# JP: “質の良い\x%l客車;#00ffc040;客車%l;#;のみを、極力安価で”――という\n僕らの要求を満たすものは、めったには出てこないらしい。
1356 = "\"Chỉ cần \x%l客車;#00ffc040;toa hành khách%l;#; chất lượng tốt, với giá rẻ nhất có thể\"——Thứ đáp ứng được\nyêu cầu này của chúng tôi, có vẻ rất hiếm khi xuất hiện."
# 【ふかみ】
# display as 深美
# JP: 「ええと。セットで買って――動力車だけ別に売るとか、\n動力車を欲しいだれかと、共同で買ってわけるとか。は」
1852 = "「Ưm. Mua theo bộ——rồi bán riêng toa xe động lực,\nhoặc là cùng mua chung với ai đó muốn toa xe động lực rồi chia ra. Thì sao ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「その先のことを考えるとちょっと……\nあんまり、良くない評判がたっちゃいそうで」
2075 = "「Nghĩ đến chuyện sau này thì hơi……\nCó vẻ sẽ mang tiếng không tốt cho lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なぜだ？」
2044 = "「Tại sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「セットって、『一緒に使って欲しい』ってことですから。\nずっとコンビでやってきた、動力車と\x%l客車;#00ffc040;客車%l;#;でしょうし」
1968 = "「Vì bán theo bộ, nghĩa là 『muốn được sử dụng cùng nhau』 mà.\nChắc hẳn đó là toa xe động lực và \x%l客車;#00ffc040;toa hành khách%l;#; đã gắn bó với nhau suốt một thời gian dài.」"
# 【ハチロク】
# display as 八六
# JP: 「わかります」
1737 = "「Em hiểu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむぅ……ファン心理とか、思い入れとかいうヤツか」
1786 = "「Ưm……Tâm lý người hâm mộ, hay là sự gắn bó tình cảm sao.」"
# monologue
# JP: \x%lまいてつ;#00ffc040;まいてつ%l;#;が、どれほど実用に即していようと\n究極的には趣味の色合いが濃い世界なら……
2475 = "\x%lまいてつ;#00ffc040;Maitetsu%l;#;, dù có thực dụng đến mức nào đi chăng nữa\nnhưng xét cho cùng, nếu đó là một thế giới mang đậm màu sắc sở thích thì……"
# monologue
# JP: 確かに、その思い入れを踏みにじるのは、\nあまり上策でない気はしてくる。
2810 = "Quả thật, việc chà đạp lên sự gắn bó đó,\ncó vẻ không phải là thượng sách cho lắm."
# 【双鉄】
# display as 雙鐵
# JP: 「――まぁ、難しいだろうとは想像していた。\nだからこそ、知恵を借りたく思っている」
1680 = "「——Mà, tôi cũng đoán là sẽ khó khăn rồi.\nChính vì vậy, tôi mới muốn mượn trí tuệ của mọi người.」"
# 【日々姫】
# display as 日日姬
# JP: 「なら、まず最初に教えて欲しいんですけど」
1973 = "「Vậy, trước tiên em muốn hỏi.」"
# monologue
# JP: まっすぐに挙手。\n日々姫の目は、ポーレットへと向いている。
2632 = "Giơ tay thẳng tắp.\nÁnh mắt Hibiki hướng về phía Paulette."
# 【日々姫】
# display as 日日姬
# JP: 「\x%lまいてつ;#00ffc040;まいてつ%l;#;さんの引退を待つ以外で、\n\x%l客車;#00ffc040;客車%l;#;を手に入れる方法って全然無いんですか？」
2224 = "「Ngoài việc chờ các \x%lまいてつ;#00ffc040;Maitetsu%l;#; nghỉ hưu ra,\nthì hoàn toàn không còn cách nào khác để có được \x%l客車;#00ffc040;toa hành khách%l;#; sao ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは……」
2154 = "「Chuyện đó……」"
# 【凪】
# display as 凪
# JP: 「簡単ばい！　大廃線でたくさん捨てられたもんなら、\nそん捨てられたのば、拾ってもらってくればええばい！」
2208 = "「Đơn giản thôi! Nếu đợt Đại bãi bỏ tuyến đã có rất nhiều thứ bị vứt bỏ,\nthì cứ nhặt những thứ bị vứt bỏ đó về là được chứ gì!」"
# monologue
# JP: 凪の言葉に一瞬驚いた顔をして――
2686 = "Thoáng lộ vẻ ngạc nhiên trước lời của Nagi——"
# monologue
# JP: ポーレットは、“首を傾げる”と“頷く”との、\nその中間の動きを見せる。
2746 = "Paulette thể hiện một cử chỉ nằm ở giữa\nviệc \"nghiêng đầu\" và \"gật đầu\"."
# 【ポーレット】
# display as 波萊特
# JP: 「それは……方法の一つかもしれません。\nけど、放置車輌が現存する確率もすごい低いでしょうし」
2148 = "「Đó có lẽ……cũng là một cách.\nNhưng mà, xác suất để những phương tiện bị bỏ hoang còn tồn tại cũng rất thấp.」"
# 【凪】
# display as 凪
# JP: 「ほうちしゃりょう？　捨てられてるヤツのことばい？」
2013 = "「Phương tiện bị bỏ hoang? Là mấy cái bị vứt bỏ đó hả?」"
# 【れいな】
# display as 玲奈
# JP: 「そおですよぉ。スクラップ屋さんでそのままだとか、\n廃業した鉄道会社さんでそのまま放っておかれる子です」
2026 = "「Đúng vậy nha~. Là những bé bị để nguyên ở bãi phế liệu,\nhay bị bỏ mặc ở những công ty đường sắt đã ngừng hoạt động đó ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。廃棄された車輌の全てが、\nすぐさまに解体されるとは限らんわけか」
2065 = "「Ra là vậy. Toàn bộ phương tiện bị phế bỏ,\nkhông hẳn là sẽ bị tháo dỡ ngay lập tức nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、でも――」
2002 = "「Vâng, nhưng mà——」"
# 【ハチロク】
# display as 八六
# JP: 「廃棄された上に長期間の放置をされては――\n\x%l艤装;#00ffc040;[ぎそう,1]艤装%l;#;は当然、車輌そのものにも痛みが出るのでは？」
2070 = "「Đã bị phế bỏ mà còn bị bỏ hoang trong thời gian dài thì——\n\x%l艤装;#00ffc040;Trang thiết bị nội ngoại thất%l;#; thì khỏi phải bàn, ngay cả bản thân phương tiện cũng sẽ bị hư hỏng phải không?」"
# monologue
# JP: そうなんです、と頷くポーレットの傍らで、\nおずおず、ふかみが手をあげる。
2680 = "Bên cạnh Paulette đang gật đầu xác nhận \"Đúng là vậy\",\nFukami rụt rè giơ tay lên."
# 【ふかみ】
# display as 深美
# JP: 「あのぉ……ぎそう、って何。ですか？」
2112 = "「Ưm……Gisou, là gì. Vậy ạ?」"
# 【ハチロク】
# display as 八六
# JP: 「\x%l客車;#00ffc040;客車%l;#;であれば、座席やモケット、つり革やてすりなどの、\n車体に後付けをする装備類のことです」
1691 = "「Nếu là \x%l客車;#00ffc040;toa hành khách%l;#; thì đó là các trang thiết bị được lắp thêm vào thân xe,\nnhư ghế ngồi, vải bọc đệm, tay cầm hay tay vịn ạ.」"
# 【凪】
# display as 凪
# JP: 「もけっと？」
2014 = "「Vải bọc đệm?」"
# 【れいな】
# display as 玲奈
# JP: 「座席のシートに貼ってある布のことですよぉ。\nあの、てざわりが良くてあったかいやつですぅ」
1883 = "「Là loại vải được bọc trên ghế ngồi đó nha~.\nCái loại sờ vào rất thích và ấm áp ấy ạ~.」"
# 【ふかみ】
# display as 深美
# JP: 「あ、はい。わかりました」
1775 = "「A, vâng. Em hiểu rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「ちなみに、一般的な鉄道車輌は、車体、\x%l台枠;#00ffc040;台枠%l;#;、\x%l台車;#00ffc040;台車%l;#;、\nそれに\x%l艤装;#00ffc040;艤装%l;#;で成り立っていると考えて良いかと存じます」
2105 = "「Nhân tiện, có thể coi các phương tiện đường sắt thông thường được cấu thành từ thân xe, \x%l台枠;#00ffc040;khung gầm%l;#;, \x%l台車;#00ffc040;giá chuyển hướng%l;#;,\nvà \x%l艤装;#00ffc040;trang thiết bị nội ngoại thất%l;#; ạ.」"
# monologue
# JP: ここで説明しておく方が話が早いと考えたのか、\nあるいは単に話したいのか――
2411 = "Có lẽ em ấy nghĩ giải thích ở đây sẽ nhanh hơn,\nhoặc đơn giản là chỉ muốn nói——"
# 【ハチロク】
# display as 八六
# JP: 「まずは台車のことからご説明もうしあげましょう」
1706 = "「Trước tiên em xin phép giải thích về giá chuyển hướng.」"
# monologue
# JP: 聞かれた以上へぐいぐいと、\nハチロクの言葉は踏み込んでいく。
2417 = "Vượt xa khỏi những gì được hỏi,\nlời giải thích của Hachiroku ngày càng đi sâu vào chi tiết."
# 【ハチロク】
# display as 八六
# JP: 「これは車輪や動力伝達機構、ブレーキなどの走り装置\n――走行装置を持つ、車体から独立した機構を言います」
1993 = "「Đây là cơ cấu độc lập với thân xe, chứa các thiết bị phục vụ cho việc di chuyển\n——như bánh xe, cơ cấu truyền động lực, hay phanh ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1773 = "「Ồ.」"
# 【ハチロク】
# display as 八六
# JP: 「\x%l台車;#00ffc040;台車%l;#;の特徴は、車体に直結されず自由に動けることです。\n\x%l8620;#00ffc040;8620%l;#;の場合は、\x%l先輪;#00ffc040;先輪%l;#;が\x%l先台車;#00ffc040;先台車%l;#;として独立していますよね」
1386 = "「Đặc trưng của \x%l台車;#00ffc040;giá chuyển hướng%l;#; là nó không được kết nối trực tiếp với thân xe mà có thể di chuyển tự do.\nTrong trường hợp của \x%l8620;#00ffc040;8620%l;#;, \x%l先輪;#00ffc040;bánh dẫn hướng trước%l;#; được tách riêng thành một \x%l先台車;#00ffc040;giá chuyển hướng trước%l;#; độc lập đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1827 = "「Hửm?」"
# monologue
# JP: \x%l先輪;#00ffc040;先輪%l;#;とは、名の通り一番先頭についている、\n比較的小さな車輪のことだ。
2527 = "\x%l先輪;#00ffc040;Bánh dẫn hướng trước%l;#;, đúng như tên gọi, là bánh xe nằm ở vị trí đầu tiên,\ncó kích thước tương đối nhỏ."
# monologue
# JP: 言われてみれば、他の\x%l動輪;#00ffc040;動輪%l;#;たちと違って、\nあれは確かに独立している。
2830 = "Nghe em ấy nói mới để ý, khác với những \x%l動輪;#00ffc040;bánh xe chủ động%l;#; khác,\ncái đó quả thực được thiết kế độc lập."
# 【れいな】
# display as 玲奈
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;に車輪が固定されてるとカーブを曲がりづらいです。\nだから\x%l台車;#00ffc040;台車%l;#;は動ける分、とっても便利なのですよぉ」
1861 = "「Nếu bánh xe bị cố định vào \x%l台枠;#00ffc040;khung gầm%l;#; thì sẽ rất khó để ôm cua.\nNên việc \x%l台車;#00ffc040;giá chuyển hướng%l;#; có thể cử động được là vô cùng tiện lợi đó nha~.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1770 = "「A……」"
# monologue
# JP: 直感的には分かったような気がするが、どうも怪しい。\n後で\x%lピット;#00ffc040;ピット%l;#;に潜り込み、下から見上げ確認しよう。
2576 = "Về mặt trực giác thì có vẻ tôi đã hiểu, nhưng vẫn thấy mông lung thế nào ấy.\nLát nữa phải chui xuống \x%lピット;#00ffc040;hố kiểm tra%l;#; nhìn lên để xác nhận lại mới được."
# 【日々姫】
# display as 日日姬
# JP: 「ええ、と……」
2157 = "「À, ừm……」"
# 【凪】
# display as 凪
# JP: 「話がむつかしくてよくわからんばい！」
1850 = "「Chuyện khó hiểu quá, chả hiểu gì sất!」"
# monologue
# JP: 僕で、怪しいレベルの話だ。
2733 = "Đến tôi còn thấy mông lung cơ mà."
# monologue
# JP: 日々姫と凪は顔をしかめて、\nその傍らで、ふかみはこくこく、凪の言葉に同意している。
2627 = "Hibiki và Nagi nhăn mặt,\nbên cạnh đó, Fukami cũng gật đầu lia lịa đồng tình với lời của Nagi."
# 【ポーレット】
# display as 波萊特
# JP: 「\x%l台車;#00ffc040;台車%l;#;は、まぁ、\n足回りだって今は考えておいてください」
2054 = "「\x%l台車;#00ffc040;Giá chuyển hướng%l;#; thì, ừm,\nbây giờ mọi người cứ tạm hiểu nó là phần gầm xe đi.」"
# monologue
# JP: 見かねてか、ポーレットがフォローをしてくれる。
2681 = "Có lẽ vì không nhìn nổi nữa, Paulette đã lên tiếng giải vây."
# 【ポーレット】
# display as 波萊特
# JP: 「で、車体部分が、それに対するなら胴体です」
2046 = "「Và, phần thân xe, tương ứng với nó sẽ là phần thân mình.」"
# 【凪】
# display as 凪
# JP: 「そんくらいはわかるばい！\n\x%l客車;#00ffc040;客車%l;#;だったら、お客さんば乗りよるところが、車体ばい」
2152 = "「Cỡ đó thì em hiểu! \nNếu là \x%l客車;#00ffc040;toa hành khách%l;#; thì chỗ hành khách ngồi chính là thân xe chứ gì.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん、正解」
1821 = "「Ừm, chính xác.」"
# monologue
# JP: \x%l台車;#00ffc040;台車%l;#;と車体は、足周りと胴体――\nこのくらいざっくりな方が、僕らレベルでは分かり良い。
2592 = "\x%l台車;#00ffc040;Giá chuyển hướng%l;#; và thân xe, là phần gầm và phần thân mình——\nKhái quát chung chung thế này thì trình độ như chúng tôi mới dễ hiểu được."
# 【ポーレット】
# display as 波萊特
# JP: 「それで\x%l艤装;#00ffc040;[ぎそう,1]艤装%l;#;は、お洋服とかアクセサリーとかですね。\nだから、観光\x%l客車;#00ffc040;客車%l;#;だとここもすごく重要になります」
2082 = "「Và \x%l艤装;#00ffc040;trang thiết bị nội ngoại thất%l;#; thì giống như quần áo hay phụ kiện vậy.\nNên nếu là \x%l客車;#00ffc040;toa hành khách%l;#; du lịch thì phần này cũng rất quan trọng.」"
# monologue
# JP: ふむふむと、日々姫がスケッチブックを広げる。
2626 = "Hibiki gật gù rồi mở cuốn phác thảo ra."
# monologue
# JP: \x%l台車;#00ffc040;台車%l;#;、車体、\x%l艤装;#00ffc040;艤装%l;#;と描き込み――\n手の鉛筆ごと挙手をする。
2398 = "Em ấy vẽ \x%l台車;#00ffc040;giá chuyển hướng%l;#;, thân xe, \x%l艤装;#00ffc040;trang thiết bị nội ngoại thất%l;#; vào đó——\nRồi giơ tay lên cùng với cây bút chì."
# 【日々姫】
# display as 日日姬
# JP: 「だったら、ダイワク？　っていうのが――腰？」
2209 = "「Nếu vậy, Daiwaku? Cái đó là——phần hông hả?」"
# 【れいな】
# display as 八六＆玲奈
# JP: 『「左様です！」\n「そおですよぉ！」』
2250 = "『「Đúng vậy ạ!」\n「Đúng rồi đó nha~」』"
# monologue
# JP: よほど的を射た言葉だったのか、少し肩身が狭そうだった\nハチロク・れいながそろって嬉しげな声を出す。
2726 = "Có lẽ vì nói quá đúng trọng tâm, nên Hachiroku và Reina vốn đang hơi thu mình\nlại đồng loạt cất tiếng vui vẻ."
# 【ポーレット】
# display as 波萊特
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;は、車体と\x%l台車;#00ffc040;台車%l;#;とをつなぐ腰であり、\n同時に全体を支える骨でもあるとも言えますね」
1382 = "「\x%l台枠;#00ffc040;Khung gầm%l;#; là phần hông kết nối thân xe và \x%l台車;#00ffc040;giá chuyển hướng%l;#;,\nđồng thời cũng có thể coi là bộ xương nâng đỡ toàn bộ chiếc xe.」"
# 【日々姫】
# display as 日日姬
# JP: 「ふぅん、まぁ、当然って言ったら当然だけど、\nどこもかしこも重要なんだ」
1826 = "「Hừm, mà, nói hiển nhiên thì cũng hiển nhiên thật,\nchỗ nào cũng quan trọng cả.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。ですから、観光の軸になるような\x%l客車;#00ffc040;客車%l;#;と考えると、\n廃車輌は、もし見つけることが出来ても厳しそうかと」
2022 = "「Vâng. Vì vậy, nếu xét đến việc dùng làm \x%l客車;#00ffc040;toa hành khách%l;#; nòng cốt cho du lịch,\nthì những phương tiện phế bỏ, dù có tìm thấy, e là cũng khó mà đáp ứng được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……ううむ。そうなってしまうか」
1410 = "「……Ưm. Ra là vậy sao.」"
# monologue
# JP: 状態が良い車輌なら、\nそもそも廃棄されないだろうし――
2761 = "Nếu là phương tiện có tình trạng tốt,\nthì ngay từ đầu đã chẳng bị phế bỏ rồi——"
# 【双鉄】
# display as 雙鐵
# JP: 「本格的な改修となると……確かに。\n費用的にも設備的にも、現状では対応が難しそうだし」
1853 = "「Nếu phải đại tu toàn diện thì……Quả thực.\nCả về chi phí lẫn thiết bị, với tình hình hiện tại có vẻ rất khó đáp ứng.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。……ヘタすると、お金にものをいわせて、\n状態のいい\x%l客車;#00ffc040;客車%l;#;を無理やり買っちゃうほうが安いかも」
2024 = "「Đúng vậy. ……Không chừng, dùng tiền\nmua đứt một \x%l客車;#00ffc040;toa hành khách%l;#; có tình trạng tốt còn rẻ hơn ấy chứ.」"
# 【凪】
# display as 凪
# JP: 「ばってん、そぎゃんお金はどこにもなかばい？」
2178 = "「Nhưng mà, tiền nhiều thế thì đào đâu ra?」"
# 【ポーレット】
# display as 波萊特
# JP: 「なんですよねぇ」
2066 = "「Đó mới là vấn đề.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――待ってくれ。今の話だと……金さえあれば、\nそれでも出てくる\x%l客車;#00ffc040;客車%l;#;は、あるにはあるのか？」
1923 = "「Không——đợi đã. Theo lời cô vừa nói thì……chỉ cần có tiền,\nthì vẫn có \x%l客車;#00ffc040;toa hành khách%l;#; được bán ra sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは、はい。この世界にもコレクターさんは居ますし、\n予備車輌のストックをしてる会社さんもありますから」
2155 = "「Về chuyện đó thì, vâng. Trong giới này cũng có những nhà sưu tập,\nvà cũng có những công ty dự trữ sẵn phương tiện dự phòng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「コレクションと、備えのための車輌……\nどちらも、言うなれば虎の子か」
1961 = "「Bộ sưu tập, và phương tiện dự phòng……\nCả hai, có thể nói đều là những món bảo bối nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですよ。ですから、譲ってもらうのは――」
1888 = "「Đúng vậy đó. Thế nên, để họ nhượng lại thì——」"
# 【凪】
# display as 凪
# JP: 「トラの子なら、\nせんじんの谷に突き落とされるの待てば良かばい！」
1971 = "「Nếu là con của hổ,\nthì cứ đợi nó bị đẩy xuống thung lũng sâu là được chứ gì!」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、それライオン！」
1879 = "「Nagi, đó là sư tử mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1672 = "「Không——」"
# 【ふかみ】
# display as 深美
# JP: 「え？　ライオンじゃなかった。でしたっけ？」
1767 = "「Hả? Không phải sư tử sao. Đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや、そこは正しい。\n千尋の谷に突き落とされるのは、間違いなく獅子の子だ」
1681 = "「A, không, cái đó thì đúng rồi.\nBị đẩy xuống thung lũng sâu, chắc chắn là con của sư tử.」"
# monologue
# JP: ではなく。\nそこに引っかかったわけではなくて――
2558 = "Không phải thế.\nTôi đâu có vướng mắc ở chỗ đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、コレクターではないのだが……\nそういう心理も、あるいはあり得るのではないのか？」
2230 = "「Tôi, tuy không phải là nhà sưu tập nhưng……\nTâm lý kiểu đó, biết đâu cũng có thể xảy ra nhỉ?」"
# 【日々姫】
# display as 日日姬
# JP: 「そういう心理？」
2166 = "「Tâm lý kiểu đó?」"
# 【ハチロク】
# display as 八六
# JP: 「我が子を千尋の谷に突き落とす――ですか？」
1849 = "「Đẩy đứa con của mình xuống thung lũng sâu——sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。\n無論、実際に突き落とされてはたまらなかろうが――」
1996 = "「Đúng vậy.\nTất nhiên, nếu thực sự bị đẩy xuống thì gay go to——」"
# 【ハチロク】
# display as 八六
# JP: 「あ」
1794 = "「A.」"
# monologue
# JP: なるほどと、ハチロクの目が丸くなる。\nれいなも、大きくうなずいている。
2405 = "Hachiroku mở to mắt như đã hiểu ra.\nReina cũng, gật đầu thật mạnh."
# 【ハチロク】
# display as 八六
# JP: 「我が子が動き――活躍する姿を見たい」
1917 = "「Muốn thấy đứa con của mình chuyển động——tỏa sáng.」"
# 【日々姫】
# display as 日日姬
# JP: 「あるかも！　『こんな綺麗に使われるんなら』\n『こんなに愛してもらえるんなら』って、そういうの」
2062 = "「Có thể lắm! Kiểu như 『Nếu được sử dụng một cách đẹp đẽ như thế này』,\n『Nếu được yêu thương nhiều như thế này』 ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そっか……そういうのも、確かに――\nあ！　その逆もあるかもしれませんね」
2163 = "「Ra vậy……Trường hợp đó, quả thực——\nA! Có thể cũng có trường hợp ngược lại nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その逆？」
1734 = "「Ngược lại?」"
# 【ポーレット】
# display as 波萊特
# JP: 「[ハチロク,3]8620の魅力を伝えることができたら――\n『この機関車に、わたしの\x%l客車;#00ffc040;客車%l;#;を引いて欲しい』って」
1855 = "「Nếu có thể truyền tải được sức hấp dẫn của 8620——\n『Tôi muốn đầu máy này, kéo \x%l客車;#00ffc040;toa hành khách%l;#; của tôi』 chẳng hạn.」"
# 【れいな】
# display as 玲奈
# JP: 「あると思うです！」
1927 = "「Reina nghĩ là có đó nha!」"
# 【凪】
# display as 凪
# JP: 「なら、どぎゃんとして、[ハチロク,3]8620の魅力ば伝えるばい？」
2193 = "「Vậy, phải làm thế nào, để truyền tải sức hấp dẫn của 8620 đây?」"
# 【ハチロク】
# display as 八六
# JP: 「それは――」
2149 = "「Đó là——」"
# monologue
# JP: 凪の極めて素朴な疑問は、\n弾み出してたみなの言葉を詰まらせる。
2447 = "Câu hỏi vô cùng mộc mạc của Nagi,\nđã làm những lời nói đang tuôn trào của mọi người phải nghẹn lại."
# monologue
# JP: そして生まれた沈黙の中、\nふかみは再び、どこかおずおずと挙手をする。
2505 = "Và trong sự im lặng vừa bao trùm,\nFukami lại một lần nữa, rụt rè giơ tay lên."
# 【ふかみ】
# display as 深美
# JP: 「あと、どこの誰に伝えるかも……\nすごく大事。です。きっと」
2172 = "「Ngoài ra, truyền tải cho ai ở đâu cũng……\nrất quan trọng. Ạ. Chắc chắn vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「誰に、そして、どのようにか――」
1751 = "「Cho ai, và, bằng cách nào——」"
# monologue
# JP: 魅力を、伝える。\n今まであまり、考えたこともなかったことだが――
2538 = "Truyền tải, sức hấp dẫn.\nĐó là điều mà từ trước đến nay, tôi chưa từng nghĩ đến nhiều——"
# monologue
# JP: ああいや、そうか。
2567 = "A không, ra là vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。お前の絵や看板描きは、\nまさに、そうしたことだよな？」
1982 = "「Hibiki. Việc vẽ tranh hay vẽ bảng hiệu của em,\nchính xác là, làm việc đó đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「え？　あ！　うんっ、そっか。言われたら……うん。\n確かに、看板はもろ、魅力ば伝えるためだけに描くとね」
1769 = "「Hả? A! Ừm, ra vậy. Nghe anh nói thế……ừm.\nĐúng thật, bảng hiệu hoàn toàn là, được vẽ chỉ để truyền tải sức hấp dẫn mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば魅力を伝えるために――\n看板を描くとき、何をお前は心がけている？」
2179 = "「Vậy để truyền tải sức hấp dẫn——\nKhi vẽ bảng hiệu, em luôn tâm niệm điều gì?」"
# 【日々姫】
# display as 日日姬
# JP: 「私が心がけていること、は……」
2007 = "「Điều em luôn tâm niệm, là……」"
# monologue
# JP: ペラペラと、スケッチブックが開かれる。
2641 = "Xoạt xoạt, cuốn phác thảo được lật mở."
# monologue
# JP: そこに描かれた無数の線を確かめなおして――\n再びもちあげられる目は、強い光を宿してる。
2722 = "Kiểm tra lại vô số những đường nét được vẽ trên đó——\nĐôi mắt ngước lên lần nữa, chứa đựng một tia sáng mạnh mẽ."
# 【日々姫】
# display as 日日姬
# JP: 「一番ステキなところを探して――\nまず自分が、そのステキを本当に好きになること」
1958 = "「Tìm kiếm điểm tuyệt vời nhất——\nTrước tiên bản thân mình, phải thực sự yêu thích sự tuyệt vời đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1773 = "「哦哦」" 
# monologue
# JP: 少しわかる、と感じた瞬間、\nつながっていく。
2714 = "Khoảnh khắc cảm thấy hơi hiểu ra,\nmọi thứ đã được kết nối."
# monologue
# JP: そうか――だからか――
2526 = "Ra vậy——thảo nào——"
# 【双鉄】
# display as 雙鐵
# JP: 「その模型……\x%lNゲージ;#00ffc040;Nゲージ%l;#;が走っている町も、\nきっと、そうして作られたのだな」
2182 = "「Mô hình đó……thị trấn nơi \x%lNゲージ;#00ffc040;N-gauge%l;#; đang chạy,\nchắc chắn, cũng được tạo ra như vậy nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1754 = "「A.」"
# monologue
# JP: 抑えた、けれど嬉しげな声。\nポーレットの頬がバラ色になる。
2852 = "Giọng nói kìm nén, nhưng lại ánh lên niềm vui.\nĐôi gò má Paulette ửng hồng."
# 【ポーレット】
# display as 波萊特
# JP: 「だと思います。きっと、そうです。\nだって、パパは――御一夜を本当に愛してたから」
1936 = "「Tôi nghĩ là vậy. Chắc chắn, là vậy rồi.\nBởi vì, ba tôi——thực sự rất yêu Ohimitera.」"
# monologue
# JP: ……ポーレットの父は評価の高い市長だったと、\nナビにもらった情報をふと思い出す。
1373 = "……Ba của Paulette là một thị trưởng được đánh giá cao,\ntôi chợt nhớ lại thông tin nhận được từ Navi."
# monologue
# JP: 愛ゆえに、市政も模型もおそらくは、\n細やかな目配りに満ち満ちたものとなったのだろうか。
2665 = "Có lẽ chính vì tình yêu, mà cả việc điều hành thành phố lẫn mô hình này,\nđều tràn ngập sự quan tâm tỉ mỉ đến từng chi tiết chăng."
# 【ポーレット】
# display as 波萊特
# JP: 「パパ、すごくたくさんの写真撮ってたんです。\n御一夜の、それから、鉄道の」
2049 = "「Ba tôi, đã chụp rất nhiều ảnh.\nCủa Ohimitera, và cả của đường sắt nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「写真……」
2047 = "「Ảnh……」"
# monologue
# JP: ハチロクの目が、僕へ向く。
2424 = "Ánh mắt Hachiroku, hướng về phía tôi."
# monologue
# JP: 表情はいつもの澄ましたものだが、\n頬がわずかに紅潮している。
2777 = "Biểu cảm vẫn nghiêm trang như mọi khi,\nnhưng đôi má lại hơi ửng đỏ."
# 【ハチロク】
# display as 八六
# JP: 「で、でしたら、その――双鉄様に、\nお写真を撮っていただくというのはいかがでしょうか？」
1965 = "「V, vậy thì, ừm——Để ngài Soutetsu,\nchụp ảnh thì sao ạ?」"
# 【凪】
# display as 凪
# JP: 「あ！　それよかばい！」
1797 = "「A! Ý đó hay đấy!」"
# 【ふかみ】
# display as 深美
# JP: 「そう、思います。です。\n双鉄さんきっと、センスある。です」
1937 = "「Em cũng, nghĩ vậy. Ạ.\nAnh Soutetsu chắc chắn, rất có gu. Đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「センス？　僕にか？　写真のか？」
1758 = "「Có gu? Tôi á? Về nhiếp ảnh sao?」"
# monologue
# JP: 評価を求めて、日々姫を見る。
2582 = "Tôi nhìn Hibiki, tìm kiếm một sự đánh giá."
# monologue
# JP: 日々姫はなんとも困ったような顔をして――\nけれどもやがて、見るからにしぶしぶと頷いてみせる。
2636 = "Hibiki làm một vẻ mặt vô cùng khó xử——\nNhưng rồi, cũng miễn cưỡng gật đầu."
# 【日々姫】
# display as 日日姬
# JP: 「センスは、あるに決まっとるばい。\nにぃにぃは、私の絵ば最初に見出してくれたもん」
1756 = "「Gu thẩm mỹ, chắc chắn là có rồi.\nVì anh hai là người đầu tiên phát hiện ra tài năng hội họa của em mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
1882 = "「Là vậy sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そういうもんばい！　……っていうか、私が仮に、\n『センスなんか無か！』ってにぃにぃに言ったとして」
1889 = "「Là vậy đó! ……Mà này, giả sử em,\nnói với anh hai là 『Chẳng có gu gì sất!』 đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああいや。すまん。くだらんことを尋ねたのだな、僕は。\nセンスが例えなかろうが、ともかく、試すだけは試すさ」
1846 = "「A không. Xin lỗi. Tôi đã hỏi một câu ngớ ngẩn rồi.\nDù có gu hay không, thì tóm lại, tôi vẫn sẽ thử xem sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「よねぇ」
1986 = "「Thấy chưa.」"
# monologue
# JP: はあっと、ため息。\nそして日々姫はゆるゆると、ハチロクを見て、僕を見る。
2842 = "Haizz, thở dài.\nRồi Hibiki chầm chậm, nhìn Hachiroku, rồi nhìn tôi."
# 【日々姫】
# display as 日日姬
# JP: 「……万が一、兄さんに写真のセンスが無くっても。\n撮ることは、撮るために見ることは、役に立ちます」
2093 = "「……Ngộ nhỡ, anh trai thực sự không có gu chụp ảnh.\nThì việc chụp ảnh, việc quan sát để chụp, cũng rất có ích.」"
# monologue
# JP: 落ち着いた標準語でそう言って、\n日々姫はさらさら、スケッチブックにペンを走らせる。
2434 = "Nói bằng giọng chuẩn bình tĩnh,\nHibiki thoăn thoắt đưa bút trên cuốn phác thảo."
# monologue
# JP: あっという間に、僕のスケッチ。\nなんとも、とまどった顔をしている。
2381 = "Nhoáng một cái, đã xong bức phác họa của tôi.\nMang một vẻ mặt, vô cùng bối rối."
# 【日々姫】
# display as 日日姬
# JP: 「よく見ることは、ステキを知ること。\nステキを知るのは、大好きになるヒケツですから――」
1732 = "「Quan sát kỹ, là để hiểu được sự tuyệt vời.\nHiểu được sự tuyệt vời, là bí quyết để trở nên yêu thích——」"
# monologue
# JP: （パシャっ）
2890 = "(Tách)"
# 【ハチロク】
# display as 八六
# JP: 「そ、双鉄様！？\nこのようなところを、お撮りになっても」
2231 = "「Ng, ngài Soutetsu!?\nNgài có chụp những chỗ như thế này thì cũng.」"
# monologue
# JP: 慌てた顔のハチロクへ、カメラを持ったままの手を振る。
2572 = "Về phía Hachiroku đang mang vẻ mặt hoảng hốt, tôi xua xua bàn tay đang cầm máy ảnh."
# monologue
# JP: 常時携帯を出来るよう、ポーレットの父の遺品の中から、\n一番小さく軽いものを、と借りたカメラを。
2691 = "Để có thể mang theo mọi lúc, tôi đã mượn chiếc máy ảnh nhỏ và nhẹ nhất\ntrong số những di vật của ba Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「大事な整備だ。\n僕のことなど、気にするな」
2159 = "「Đang bảo dưỡng quan trọng mà.\nĐừng bận tâm đến tôi.」"
# 【ハチロク】
# display as 八六
# JP: 「は、はい――それは、もちろん左様ですけれど……」
1843 = "「V, vâng——Chuyện đó, tất nhiên là vậy rồi nhưng……」"
# monologue
# JP: 言いつつ、ハチロクはまた、\x%l8620;#00ffc040;8620%l;#;の\x%l炭水車;#00ffc040;炭水車%l;#;へと身を寄せる。
2836 = "Vừa nói, Hachiroku lại ngả người về phía \x%l炭水車;#00ffc040;toa tiếp than nước%l;#; của \x%l8620;#00ffc040;8620%l;#;."
# monologue
# JP: \x%lスクレイパー;#00ffc040;スクレイパー%l;#;を操って、油汚れをゴリゴリ落とし始めれば、\nその目はすぐに、作業だけへと集中していく。
2495 = "Điều khiển \x%lスクレイパー;#00ffc040;dao cạo xỉ than%l;#;, bắt đầu sột soạt cạo sạch vết dầu mỡ,\nánh mắt em ấy ngay lập tức, chỉ còn tập trung vào công việc."
# monologue
# JP: （なるほど……\n撮るために見る、というのは凄いことだな）
2885 = "(Ra là vậy……\nQuan sát để chụp ảnh, quả là một điều tuyệt vời)"
# monologue
# JP: 整備作業をするハチロクは、\n油と煤と熱との中で、薄汚れている印象だったが――
2833 = "Hachiroku khi làm công việc bảo dưỡng,\ntrong dầu mỡ, bồ hóng và sức nóng, mang lại ấn tượng hơi nhem nhuốc——"
# monologue
# JP: こうしてまじまじ見てみれば、運転している横顔よりも、\n今のハチロクの姿はむしろ、美しくある。
2389 = "Nhưng khi nhìn kỹ thế này, so với góc nghiêng lúc lái tàu,\ndáng vẻ hiện tại của Hachiroku lại càng đẹp hơn."
# monologue
# JP: （そういえば……\n汚れにくい加工をされているという話だったか）
2893 = "(Nhắc mới nhớ……\nNghe nói em ấy đã được xử lý để khó bị bám bẩn nhỉ)"
# monologue
# JP: 無論、\x%lナッパ服;#00ffc040;ナッパ服%l;#;も、\x%lスクレイパー;#00ffc040;スクレイパー%l;#;の持ち柄もすでに\n煤と油汚れにまみれ、ドロドロだ。
2718 = "Tất nhiên, cả \x%lナッパ服;#00ffc040;dịch vụ trang màu%l;#; lẫn cán của \x%lスクレイパー;#00ffc040;dao cạo xỉ than%l;#; đều đã\nlấm lem bồ hóng và dầu mỡ, bẩn thỉu nhầy nhụa."
# monologue
# JP: 重苦しさを感じるほどの油汚れの鈍い黒さが、\nハチロクの肌の白さを、闇の中で見る光のように輝かせる。
2497 = "Màu đen xỉn của vết dầu mỡ mang lại cảm giác nặng nề,\nlại làm cho làn da trắng ngần của Hachiroku tỏa sáng như ánh sáng trong đêm tối."
# monologue
# JP: （パシャ）
# 2890 = "（喀嚓）" 
# monologue
# JP: もう一枚。\n今度はハチロクは気づかない。
2432 = "Thêm một tấm nữa.\nLần này Hachiroku không hề hay biết."
# monologue
# JP: 撮るべきものを撮ってしまえば、\n僕も清掃の手伝いだ。
2804 = "Sau khi chụp xong những thứ cần chụp,\ntôi cũng xắn tay vào phụ dọn dẹp."
# monologue
# JP: （むわあっ）
2889 = "(Phừng)"
# 【双鉄】
# display as 雙鐵
# JP: 「うぉっ」
1759 = "「Oa.」"
# monologue
# JP: ボイラー周りに近づけば、\nもうそれだけで汗がぶおりと噴き出してくる。
2454 = "Vừa đến gần khu vực lò hơi,\nchỉ thế thôi mồ hôi đã túa ra như tắm."
# monologue
# JP: この鉄板の内側で、轟々と石炭を燃やしているのだ。\n熱く、暑いのは当然なのだが――
2506 = "Bên trong tấm sắt này, than đá đang cháy hừng hực.\nNóng bức là điều hiển nhiên nhưng——"
# monologue
# JP: （ぎゅっ――ごしっ――――バチっ！）
2887 = "(Chà——xát————Tách!)"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1755 = "「!」"
# monologue
# JP: ――煤を取るため、乾いた布で拭き取り続け、\n合間にうっかり肌が触れれば、痛いくらいの静電気。
2783 = "——Để lau sạch bồ hóng, tôi liên tục dùng khăn khô lau chùi,\ntrong lúc đó lỡ chạm vào da, tĩnh điện giật đau điếng."
# monologue
# JP: これがあるから、ボイラー周りは人間がやる他に無い。\nわかっているが……それでもやはり、暑く苦しい。
2666 = "Vì thế nên, khu vực quanh lò hơi chỉ có con người mới làm được.\nBiết là vậy nhưng……vẫn nóng bức và khó chịu quá."
# monologue
# JP: （しかし、それだからこそ磨き抜くのだ）
2882 = "(Nhưng, chính vì vậy mới phải đánh bóng thật kỹ)"
# monologue
# JP: 苦しいところの作業ほど、\n手を抜かずやりきることの効果は大きい。
2668 = "Những công việc càng vất vả,\nthì hiệu quả của việc làm đến nơi đến chốn, không lơ là càng lớn."
# monologue
# JP: そうした細部を積み重ねていくことのみが、\n全体としての美しさを、きっと醸しだすものだろうから。
2744 = "Chỉ có việc tích lũy những chi tiết nhỏ nhặt như vậy,\nmới có thể tạo nên vẻ đẹp tổng thể hoàn mỹ."
# monologue
# JP: （[ハチロク,3]8620を――こいつを、御一夜の顔にするのだ）
2894 = "(Phải biến 8620——biến nó, thành gương mặt đại diện cho Ohimitera)"
# monologue
# JP: その一心でともかく磨く。
2585 = "Với quyết tâm đó, tôi cứ thế đánh bóng."
# monologue
# JP: \x%l缶胴;#00ffc040;缶胴%l;#;の上へとあがり、煙突まわりも磨き終えれば、\n足裏は熱でしびれたようになり、下りることさえ難しい。
2500 = "Trèo lên trên \x%l缶胴;#00ffc040;thân lò%l;#;, đánh bóng xong khu vực quanh ống khói,\nlòng bàn chân tôi như tê dại vì nóng, ngay cả việc trèo xuống cũng khó khăn."
# 【双鉄】
# display as 雙鐵
# JP: 「く、あ――」
1789 = "「Kh, a——」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　お疲れ様です！」
2234 = "「Ngài Soutetsu! Ngài vất vả rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1794 = "「啊」" 
# monologue
# JP: ハチロクがタオルを両手に掲げて僕を見上げてる。
2408 = "Hachiroku giơ chiếc khăn bằng cả hai tay, ngước nhìn tôi."
# monologue
# JP: 少し離れて、キャブ内清掃を終えたのだろう日々姫の姿。\nスケッチブックを広げてやはり、僕を見ている。
2480 = "Cách đó một chút, là bóng dáng Hibiki có lẽ đã dọn dẹp xong buồng lái.\nEm ấy mở cuốn phác thảo ra, cũng đang nhìn tôi."
# monologue
# JP: （こうしたものも、面白いな）
2906 = "(Những khoảnh khắc thế này, cũng thú vị thật)"
# monologue
# JP: カメラを取り出し、パシャリと一枚。\nハチロクは一瞬驚くが、もはや文句を口にはしない。
2601 = "Rút máy ảnh ra, chụp tách một tấm.\nHachiroku thoáng ngạc nhiên, nhưng cũng không cằn nhằn nữa."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様、お疲れ様です」
2235 = "「Ngài Soutetsu, ngài vất vả rồi.」"
# monologue
# JP: 下りればすぐさま、乾いたタオルと笑顔のお迎え。
2755 = "Vừa bước xuống, tôi ngay lập tức được chào đón bằng một chiếc khăn khô và nụ cười."
# monologue
# JP: 清掃を終えた達成感が、\nそうしてもらうだけでもさらに高まっていく。
2523 = "Cảm giác thành tựu khi hoàn thành việc dọn dẹp,\nchỉ cần được như vậy thôi cũng đã dâng trào hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな」
1673 = "「Cảm ơn em nhé.」"
# monologue
# JP: 受け取るタオルで汗を拭えば、ハチロクはすぐ、\n今度は濡らして絞ったタオルを差し出してくれる。
2455 = "Dùng chiếc khăn nhận được lau mồ hôi, Hachiroku ngay lập tức,\nlần này đưa cho tôi một chiếc khăn ướt đã vắt ráo."
# 【双鉄】
# display as 雙鐵
# JP: 「く、ああ――生き返るとは、このことだ」
1790 = "「Kh, a——Sống lại là đây chứ đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「冷蔵庫でもあれば冷やせるのですが」
2095 = "「Nếu có tủ lạnh thì em đã có thể làm mát nó rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「機関庫内にか。素晴らしいな、それは。\n大幅黒字を出せるようになったら、要求してみよう」
1836 = "「Trong xưởng đầu máy sao. Tuyệt vời thật đấy.\nKhi nào thu được lợi nhuận lớn, tôi sẽ thử đề xuất xem sao.」"
# monologue
# JP: いいつつ、今度はコップを受け取る。
2806 = "Vừa nói, tôi vừa nhận lấy chiếc cốc."
# monologue
# JP: 生ぬるいを超え、湯冷ましほどの熱があっても、\n体にきいんと染み通ってくる。
2670 = "Dù đã vượt qua mức âm ấm, nóng cỡ nước đun sôi để nguội,\nnhưng vẫn ngấm sâu vào cơ thể."
# 【双鉄】
# display as 雙鐵
# JP: 「ぷはぁっ！　うまいっ」
1788 = "「Phù! Ngon quá.」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃ、お疲れ様～。\nね、どぎゃんと撮ったん？　見せて見せて」
2220 = "「Anh hai, vất vả rồi~.\nNè, anh chụp được gì thế? Cho em xem với, cho em xem với.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ。\nええと、画像再生は」
1828 = "「Hửm? A.\nƯm, xem lại ảnh thì.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、そんなちっちゃな液晶じゃなくて」
1799 = "「A, không phải xem trên cái màn hình LCD bé tí đó đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「んむ？」
2199 = "「Hửm?」"
# monologue
# JP: スケッチブックがたたまれている。\n日々姫の手には、代わりのように、黒くて薄い――
2739 = "Cuốn phác thảo đã được gấp lại.\nTrên tay Hibiki, thay vào đó là một thứ màu đen và mỏng——"
# 【双鉄】
# display as 雙鐵
# JP: 「タブレット、とか言うヤツか？　それは」
2160 = "「Cái gọi là máy tính bảng đó hả? Thứ đó ấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん、稀咲先輩の見て、便利そうって――\n私も、お仕事で使うようにしたんよ」
1817 = "「Vâng, thấy tiền bối Kisaki dùng có vẻ tiện lợi nên——\nEm cũng, bắt đầu dùng nó cho công việc rồi.」"
# monologue
# JP: 普段から、よほど使い込んでいるのだろうか、\n言葉の間にも、日々姫の手指はスイスイ動く。
2725 = "Bình thường chắc em ấy dùng nhiều lắm,\nnên trong lúc nói chuyện, những ngón tay của Hibiki vẫn lướt thoăn thoắt."
# monologue
# JP: カメラから小さなカードを取り出し、\nそれをなにやら、ソケットらしき隙間へと――
2549 = "Lấy chiếc thẻ nhỏ từ máy ảnh ra,\nrồi cắm nó vào một khe hở trông như khe cắm——"
# 【ハチロク】
# display as 八六
# JP: 「あっ――わたくし、ですね」
1792 = "「A——Là em, nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、これは便利なものだな」
1779 = "「Ồ, thứ này tiện lợi thật đấy.」"
# 【日々姫】
# display as 日日姬
# JP: 「へぇ。やっぱりにぃにぃ、センスあるばい」
1830 = "「Chà. Anh hai quả nhiên, rất có gu nha.」"
# monologue
# JP: センス云々はよくわからんが、\n撮りたいと思ったように撮れている。
2574 = "Gu hay không thì tôi không rõ,\nnhưng tôi đã chụp được đúng như những gì mình muốn."
# monologue
# JP: 『これがいいんですか？』とポーレットは言っていたが、\nこのカメラ、小さくとも性能は良いものだったようだ。
2850 = "Dù Paulette từng hỏi 『Cái này được không ạ?』,\nnhưng chiếc máy ảnh này, tuy nhỏ mà có võ đấy."
# 【ハチロク】
# display as 八六
# JP: 「ずいぶん……たくさんお撮りになられたのですね」
2168 = "「Ngài đã chụp……rất nhiều nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁな」
2171 = "「Ừm.」"
# monologue
# JP: こうして改めて見せつけられると、\n我ながら、のべつまくなしに撮りまくってる。
2832 = "Khi được xem lại thế này,\nđến tôi cũng thấy mình chụp nhiều vô tội vạ thật."
# monologue
# JP: 試験運転の乗務中には、さすがに一枚も撮っていないが、\n乗務前から今のいままで、それ以外はほぼ、写真で追える。
2485 = "Trong lúc làm nhiệm vụ chạy thử, đương nhiên là tôi không chụp tấm nào,\nnhưng từ trước khi làm nhiệm vụ cho đến tận bây giờ, những lúc khác gần như đều có thể theo dõi qua ảnh."
# 【双鉄】
# display as 雙鐵
# JP: 「1000枚や2000枚は撮れるとのことだったのでな。\n失敗写真は捨てればいいとも聞いていたから――ん？」
2058 = "「Nghe nói có thể chụp được 1000 hay 2000 tấm mà.\nTôi cũng nghe bảo ảnh hỏng thì cứ xóa đi là xong——Hửm?」"
# monologue
# JP: 振り向き見れば、\nハチロクの目が丸くなってる。
2815 = "Quay lại nhìn,\nthấy mắt Hachiroku đang tròn xoe."
# 【双鉄】
# display as 雙鐵
# JP: 「どうしたハチロク」
1910 = "「Sao thế Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「いえ……時代は本当に変わったのだな、と。今……\n目覚めてから一番強く、感じてしまっただけのことです」
2019 = "「Không ạ……Chỉ là em cảm thấy, thời đại thực sự đã thay đổi rồi. Bây giờ……\nTừ lúc tỉnh dậy đến giờ, đây là lần em cảm nhận được điều đó rõ rệt nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「時代の変化を――か？」
2004 = "「Sự thay đổi của thời đại——sao?」"
# 【ハチロク】
# display as 八六
# JP: 「だって、千枚をお撮りになるとか！\n二十四枚でしたのですよ？　一昔まえのフィルムは」
1988 = "「Bởi vì, ngài chụp đến cả ngàn tấm cơ mà!\nPhim ngày xưa, chỉ có hai mươi tư tấm thôi đó?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか。\nハチロクの頃はフィルムを使ったカメラだったのか」
1803 = "「A……Ra là vậy.\nThời của Hachiroku vẫn dùng máy ảnh phim nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「[きよみ,1]清美機関士もお写真をお撮りになられましたが――\nピントがどうの[ろしゅつ,1]露出がこうのと、大変でございました」
1693 = "「Lái tàu Kiyomi cũng từng chụp ảnh——\nNhưng nào là lấy nét, nào là phơi sáng, vất vả lắm ạ.」"
# monologue
# JP: モデルでもさせられ、\nよほどの苦労をしたのだろうか？
2779 = "Chắc em ấy từng bị bắt làm người mẫu,\nrồi phải chịu không ít khổ sở nhỉ?"
# monologue
# JP: 苦笑と郷愁が混じったような、なんとも人間くさい表情が、\nハチロクの顔にじんわり浮かぶ。
2420 = "Một biểu cảm vô cùng đậm chất con người, pha lẫn giữa nụ cười gượng và sự hoài niệm,\ntừ từ hiện lên trên khuôn mặt Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「その頃の写真は残ってないのか？」
2200 = "「Những bức ảnh thời đó không còn giữ lại sao?」"
# 【ハチロク】
# display as 八六
# JP: 「さぁ、どうでしょう？　わたくしの手元には一枚も……\n清美機関士がご健在なら、残っているかもしれません」
2156 = "「Chà, ai biết được ạ? Trong tay em thì không còn tấm nào……\nNếu lái tàu Kiyomi vẫn còn sống, thì có lẽ vẫn còn giữ lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。できれば見てみたいものだがな――っと」
1813 = "「Hừm. Nếu được thì tôi cũng muốn xem thử——」"
# monologue
# JP: 食いつくような日々姫の視線に、思い出す。
2644 = "Bắt gặp ánh mắt như muốn ăn tươi nuốt sống của Hibiki, tôi chợt nhớ ra."
# 【双鉄】
# display as 雙鐵
# JP: 「そういえば日々姫も」
2110 = "「Nhắc mới nhớ, Hibiki cũng.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。私も結構描いたと」
1807 = "「Vâng. Em cũng vẽ khá nhiều đó.」"
# monologue
# JP: 聞けばそそくさ、ハチロクの手にタブレットを預け、\n日々姫は自ら、スケッチブックを広げてくれる。
2753 = "Nghe vậy, Hibiki vội vàng giao máy tính bảng cho Hachiroku,\nrồi tự mình mở cuốn phác thảo ra."
# 【ハチロク】
# display as 八六
# JP: 「わ……これは……素晴らしいですね」
1763 = "「Oa……Bức này……Tuyệt vời quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。すごいな――\nああ……助士側の窓からは、こう見えるのか」
1816 = "「Ừm. Tuyệt thật——\nA……Từ cửa sổ bên phía phụ lái nhìn ra, là như thế này sao.」"
# monologue
# JP: 場所ならわかる。\n麻霧廃駅少し手前の、なだらかな下り勾配だ。
2508 = "Địa điểm thì tôi nhận ra.\nLà đoạn dốc thoai thoải ngay trước ga bỏ hoang Asagiri."
# monologue
# JP: なるほど、あそこならば給炭を休める――が。\nその数分にこれほど描くとは、いや、相当に凄まじい。
2461 = "Ra là vậy, nếu ở đó thì có thể nghỉ xúc than——Nhưng mà.\nChỉ trong vài phút mà vẽ được đến mức này, không, quả thực rất đáng nể."
# 【ハチロク】
# display as 八六
# JP: 「\x%l運転台;#00ffc040;運転台%l;#;からの景色なども、\n見て喜ばれるものですか？」
1903 = "「Những cảnh tượng nhìn từ \x%l運転台;#00ffc040;buồng lái%l;#;,\nmọi người xem có thích không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1755 = "「呃！」" 
# monologue
# JP: ごく何気ない質問に、\nけれども胸がズキリと痛む。
2383 = "Một câu hỏi hết sức bâng quơ,\nnhưng lại khiến ngực tôi nhói đau."
# monologue
# JP: が、それを様子に見せぬよう、息を整え心を鎮める。\n無意味な負担を、他の誰にも感じさせぬよう。
2387 = "Nhưng, để không biểu lộ ra ngoài, tôi điều chỉnh nhịp thở và trấn tĩnh lại.\nĐể không ai khác phải gánh chịu gánh nặng vô nghĩa này."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――それはもう。\n小さなころには、なんとしても見てみたいものだった」
1992 = "「A——Tất nhiên rồi.\nHồi còn nhỏ, dù thế nào tôi cũng muốn được nhìn thấy một lần.」"
# monologue
# JP: 無理そうだなとは感じていても、\n一番前方の\x%l客車;#00ffc040;客車%l;#;からなら、何か見えないかと期待するほど。
2848 = "Dù cảm thấy có vẻ bất khả thi,\nnhưng tôi vẫn kỳ vọng rằng từ \x%l客車;#00ffc040;toa hành khách%l;#; phía trước nhất, biết đâu có thể nhìn thấy điều gì đó."
# monologue
# JP: そうして、移動をした結果――\n事故の被害を、きっと大きくしてしまったほど。
2701 = "Và rồi, kết quả của việc di chuyển đó——\nChắc chắn đã khiến thiệt hại của vụ tai nạn trở nên trầm trọng hơn."
# 【ハチロク】
# display as 八六
# JP: 「でしたら……例えばれいなに同乗してもらうのも\n良いかもしれませんね」
2164 = "「Nếu vậy……Ví dụ như nhờ Reina đi cùng\ncó lẽ cũng là một ý hay nhỉ.」"
# monologue
# JP: ハチロクのなにげない一言に、\nほっと、救われたような気になる。
2415 = "Lời nói bâng quơ của Hachiroku,\nkhiến tôi thở phào nhẹ nhõm, như được cứu rỗi."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、\x%l運転体;#00ffc040;運転体%l;#;のれいなであれば、\n同乗をしてもらっても、大した窮屈さは感じんな」
1719 = "「Ra là vậy, nếu là Reina trong hình dáng \x%l運転体;#00ffc040;kíp lái%l;#;,\nthì dù có đi cùng, cũng không thấy quá chật chội.」"
# monologue
# JP: そうして、れいなにカメラ係をしてもらう。
2392 = "Và rồi, nhờ Reina làm phó nháy."
# monologue
# JP: 安全性をいささかも犠牲にすることなしに、\n\x%l運転台;#00ffc040;運転台%l;#;から見える景色を、写真に撮れる。
2483 = "Có thể chụp được khung cảnh nhìn từ \x%l運転台;#00ffc040;buồng lái%l;#;,\nmà không hề hy sinh một chút xíu nào sự an toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「とてもいい考えだと思う」
1945 = "「Tôi nghĩ đó là một ý kiến rất hay.」"
# monologue
# JP: そして同時に、嬉しく思う。
2720 = "Và đồng thời, tôi cũng cảm thấy rất vui."
# monologue
# JP: “安全は第一の使命”と、\nハチロクは、その考えをいつでも透徹してくれている。
1352 = "\"An toàn là sứ mệnh hàng đầu\",\nHachiroku luôn thấu triệt tư tưởng đó."
# 【ハチロク】
# display as 八六
# JP: 「では、もう少し習熟したら、\nそのようなことも試してみましょう」
2205 = "「Vậy, đợi khi thành thạo hơn một chút,\nchúng ta hãy thử làm như vậy nhé.」"
# monologue
# JP: 言いながら、ハチロクはタブレットを日々姫に返す。
2428 = "Vừa nói, Hachiroku vừa trả lại máy tính bảng cho Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「ね、にぃに。この写真データ、\nポーレットさんに送っといてよかと？」
1948 = "「Nè, anh hai. Dữ liệu ảnh này,\ngửi cho chị Paulette được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは無論、かまわんが」
2203 = "「Chuyện đó tất nhiên là không sao.」"
# 【ハチロク】
# display as 八六
# JP: 「郵便代が勿体無くはありませんか？\n毎日お会いしますのに」
2161 = "「Tiền bưu điện chẳng phải rất phí sao ạ?\nNgày nào chúng ta cũng gặp nhau mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「あははっ、送るって、手紙じゃなかよー。\nインターネット使って、アップして送るん」
1764 = "「Ahaha, gửi ở đây, không phải là gửi thư đâu.\nLà dùng Internet, tải lên rồi gửi đi đó.」"
# 【ハチロク】
# display as 八六
# JP: 「いんたあねっと」
2072 = "「In-tơ-nét.」"
# 【双鉄】
# display as 雙鐵
# JP: 「情報を電子的にやりとりできる、ネットワークだ。\n人間同士がつながりあうための、比較的新しい手段だな」
1985 = "「Là một mạng lưới, có thể trao đổi thông tin bằng phương thức điện tử.\nMột phương tiện tương đối mới để con người kết nối với nhau.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、そのようなものが出来たのですか」
1760 = "「Chà, người ta đã tạo ra được thứ như vậy rồi sao.」"
# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;通信があるからだろうか？\nカメラのときほど、ハチロクは驚いた様子を見せない。
2651 = "Có lẽ vì đã có giao tiếp bằng \x%l共感;#00ffc040;cộng cảm%l;#; chăng?\nHachiroku không tỏ ra ngạc nhiên như lúc thấy máy ảnh."
# 【ハチロク】
# display as 八六
# JP: 「それで……送ったお写真のデータを、\nポーレット様は、どのように扱われるのですか？」
2202 = "「Vậy……dữ liệu ảnh đã gửi,\nThị trưởng Paulette, sẽ xử lý thế nào ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ええと……確か」
2150 = "「Ưm……Hình như là.」"
# 【日々姫】
# display as 日日姬
# JP: 「御一夜鉄道の公式サイトで紹介するってゆっとった。\nちょっとまって、検索ですぐ出せるけん」
2109 = "「Chị ấy bảo sẽ giới thiệu trên trang web chính thức của Đường sắt Ohito.\nĐợi chút, tìm kiếm cái là ra ngay ấy mà.」"
# monologue
# JP: 日々姫の指がまた軽やかに動き回れば、\n画面上には、見慣れた姿が浮き上がってくる。
2633 = "Ngón tay Hibiki lại nhẹ nhàng lướt đi,\ntrên màn hình, một hình ảnh quen thuộc hiện lên."
# 【ハチロク】
# display as 八六
# JP: 「まぁ、キハ[レイナナ,1]07ですね」
1778 = "「Ôi, là Kiha 07 nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これは――見事な写真だな。\nいったい誰が――ああ」
2165 = "「Đây là——một bức ảnh tuyệt vời.\nRốt cuộc là ai——A.」"
# monologue
# JP: photo by kouzou hinai――\n写真の下端に明示してある。
2911 = "photo by kouzou hinai——\nĐược ghi rõ ở mép dưới bức ảnh."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットのお父上のお写真か。\nなるほど、本当にお好きだったのだな」
2040 = "「Là ảnh của ba Paulette sao.\nRa là vậy, ông ấy thực sự rất yêu thích nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「あー、\x%l列車;#00ffc040;列車%l;#;ってこの構図だとここまで絵になるとね。\n勉強になる」
1780 = "「A, \x%l列車;#00ffc040;tàu%l;#; mà chụp góc này thì lên hình đẹp đến mức này luôn á.\nHọc hỏi được nhiều rồi đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1814 = "「嗯」" 
# monologue
# JP: ナナメから、正面顔も側面も、\n綺麗に一枚に収まっている。
2548 = "Chụp từ góc chéo, cả mặt trước lẫn mặt bên,\nđều được thu gọn đẹp đẽ trong một bức ảnh."
# monologue
# JP: 少し低くに構えて撮ったらしい写真には、\nレイナナらしい可愛らしさに、動感と迫力が同居している。
2828 = "Bức ảnh có vẻ được chụp từ góc thấp,\nvừa mang nét đáng yêu đặc trưng của Kiha 07, vừa toát lên sự sống động và uy lực."
# monologue
# JP: （これは、まさしく勉強になる。\nそのうちポーレットに頼み、他の写真も見せてもらおう）
2907 = "(Bức này, quả thực rất đáng học hỏi.\nHôm nào phải nhờ Paulette, cho xem thêm những bức ảnh khác mới được)"
# 【ハチロク】
# display as 八六
# JP: 「本当に見事なお写真ですね。\nなのにわたくし――初めて見ました」
2060 = "「Quả là một bức ảnh tuyệt vời.\nThế mà em——bây giờ mới được thấy lần đầu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。僕は、電子機器に疎いからなぁ」
1933 = "「Tôi cũng vậy. Tôi mù tịt về đồ điện tử mà.」"
# monologue
# JP: 電波を発する機器の全てを、\nナビが極端に嫌うから――
2474 = "Tất cả các thiết bị phát ra sóng vô tuyến,\nNavi đều cực kỳ ghét——"
# monologue
# JP: どうせ使えぬものならば、と、その便利さに触れることを、\n半ば意識的に避け続けてきた。
2568 = "Đằng nào cũng không dùng được, nên việc tiếp xúc với sự tiện lợi của chúng,\ntôi vẫn luôn nửa ý thức tránh né."
# 【日々姫】
# display as 日日姬
# JP: 「実は、私も見るの初めて。ポーレットさんに聞くまで、\n御一夜鉄道の公式サイトがあるって、知らんかったし」
1710 = "「Thực ra, em cũng mới xem lần đầu. Trước khi nghe chị Paulette nói,\nem còn chẳng biết Đường sắt Ohito có trang web chính thức cơ.」"
# monologue
# JP: 日々姫の声に、ハチロクの眉根が潜まる。
2752 = "Nghe Hibiki nói, Hachiroku nhíu mày."
# 【ハチロク】
# display as 八六
# JP: 「それは……どうなのでしょうか？\n広報告知の手段としては――」
2167 = "「Chuyện này……là sao ạ?\nVới tư cách là một phương tiện quảng bá thông tin thì——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの\x%lまいてつ;#00ffc040;まいてつ%l;#;仲間たちは見てくれていよう。\nならば、当初の目的のためにはマッチしていようが――」
2041 = "「Chắc những người bạn \x%lまいてつ;#00ffc040;Maitetsu%l;#; của Paulette vẫn xem đấy.\nNếu vậy thì, nó vẫn phù hợp với mục đích ban đầu, nhưng——」"
# 【日々姫】
# display as 日日姬
# JP: 「でも、せっかくだし――そういう人たち以外にも」
1697 = "「Nhưng mà, hiếm có cơ hội——ngoài những người đó ra.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。是非とも見て欲しい」
1989 = "「Đúng vậy. Rất mong mọi người sẽ xem.」"
# monologue
# JP: 僕の写真はともかくも、\n日々姫の絵は、埋もれさせるにはもったいない。
2580 = "Ảnh của tôi thì không nói làm gì,\nnhưng tranh của Hibiki, để bị vùi lấp thì thật lãng phí."
# 【双鉄】
# display as 雙鐵
# JP: 「僕のような者にも見やすい形となると……\nやはり、紙媒体ということになるか」
2097 = "「Để những người như tôi cũng dễ dàng xem được thì……\nQuả nhiên, vẫn phải dùng ấn phẩm giấy sao.」"
# 【ハチロク】
# display as 八六
# JP: 「駅置きのビラなどですか？」
1698 = "「Là tờ rơi đặt ở ga tàu các loại sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「それって、やっぱりあんまり見てもらえんし」
2181 = "「Mấy thứ đó, chắc chắn cũng chẳng mấy ai thèm ngó tới đâu.」"
# monologue
# JP: 言って、にやっと、\nいたずらっぽく日々姫は笑う。
2642 = "Nói rồi, Hibiki toét miệng,\ncười một cách tinh nghịch."
# 【日々姫】
# display as 日日姬
# JP: 「ね、にぃに。どうせなら新聞ば作らん？」
1947 = "「Nè, anh hai. Tiện thể thì chúng ta làm báo luôn không?」"
# 【ハチロク】
# display as 八六
# JP: 「新聞ですか？」
1838 = "「Báo sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。手作りのミニ新聞。\nパソコンで編集して、プリンタで打ち出すの」
1820 = "「Vâng. Báo mini làm thủ công.\nChỉnh sửa trên máy tính, rồi in ra bằng máy in.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫に出来るのか？」
1980 = "「Hibiki làm được sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「当然！　そんなに大した手間でもなかよ？」
2204 = "「Tất nhiên! Cũng không tốn nhiều công sức lắm đâu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、良いな。\nポーレットの負担を増やさず、広報告知を手伝える」
2187 = "「Nếu vậy thì, tốt quá.\nKhông làm tăng gánh nặng cho Paulette, mà còn giúp ích cho việc quảng bá thông tin.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちで――新聞を一つ作るのですか」
1939 = "「Chúng ta——sẽ làm một tờ báo sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな。僕達で……\x%l8620;#00ffc040;8620%l;#;だけでなく、\n僕達チームの、業務報告のような新聞にしよう」
1997 = "「A, đúng vậy. Chúng ta……Không chỉ riêng \x%l8620;#00ffc040;8620%l;#;,\nmà hãy làm một tờ báo giống như báo cáo công việc của nhóm chúng ta đi.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、良さそげかも。にぃにの写真と、私の絵と、\nハチロクは……なんか、記事書いて、記事」
1800 = "「A, có vẻ hay đó. Ảnh của anh hai, tranh của em,\ncòn Hachiroku thì……viết bài đi, viết bài.」"
# 【ハチロク】
# display as 八六
# JP: 「記事など――とてもわたくしなどには」
1837 = "「Viết bài sao——người như em thì làm sao mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「書けるさ、ハチロクになら」
1873 = "「Viết được chứ, nếu là Hachiroku.」"
# monologue
# JP: 確信をもって、ハチロクの作業帽にぽん、と手を置く。
2569 = "Với vẻ đầy tự tin, tôi đặt tay cái bộp lên chiếc mũ bảo hộ của Hachiroku."
# monologue
# JP: 煤にまみれた油がべちゃり、手にくっついた感じがするが、\nそんなものは後で洗えば済む。
2590 = "Cảm giác dầu mỡ lấm lem bồ hóng dính nhơm nhớp vào tay,\nnhưng mấy thứ đó lát nữa rửa là sạch."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l帝鉄;#00ffc040;帝鉄%l;#;時代の思い出話などでもいいし、\n今の世の中を見て感じることを書いてもいい」
1871 = "「Kể lại những kỷ niệm thời \x%l帝鉄;#00ffc040;Teitetsu%l;#; cũng được,\nhay viết về những cảm nhận khi nhìn vào thế giới hiện tại cũng được.」"
# 【ハチロク】
# display as 八六
# JP: 「そのようなことで……よろしいのですか？」
1736 = "「Những chuyện như vậy……có được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのようなことがよろしいのさ。\nハチロクの目は独特だから、それを知るだけで面白い」
1886 = "「Những chuyện như vậy là được rồi.\nGóc nhìn của Hachiroku rất độc đáo, chỉ cần biết được điều đó thôi đã thú vị rồi.」"
# monologue
# JP: こっくり、ハチロクはゆっくり頷く。
2423 = "Gật đầu, Hachiroku chầm chậm gật đầu."
# monologue
# JP: 慎重そうな、怯えたような――\nけれどわくわくしてる瞳が、僕を見る。
2575 = "Trông có vẻ thận trọng, lại như đang e sợ——\nNhưng đôi mắt lấp lánh sự háo hức, nhìn tôi."
# 【ハチロク】
# display as 八六
# JP: 「わかりました。自信は全くございませんが――\n双鉄様が、そうおっしゃるなら」
1942 = "「Em hiểu rồi. Mặc dù hoàn toàn không có tự tin——\nNhưng nếu ngài Soutetsu, đã nói vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「じゃ、作っちゃおー！　私たちの新聞」
1717 = "「Vậy, làm luôn thôi! Tờ báo của chúng ta.」"
# monologue
# JP: スケッチブックにさらさらと、\n日々姫が線を書き連ねていく。
2847 = "Thoăn thoắt trên cuốn phác thảo,\nHibiki nối những đường nét lại với nhau."
# monologue
# JP: 見る間にそれは、\nひとつの暖かなロゴへとまとまる。
2814 = "Chẳng mấy chốc,\nnó đã thành hình một logo ấm áp."
# 【日々姫】
# display as 日日姬
# JP: 「名づけて！\n『[ハチロク,3]8620運転台通信！！』」
1745 = "「Đặt tên là!\n『Bản tin buồng lái 8620!!』」"
