[script]
# lines: 399 
# monologue
# JP: （Ｎゲージ、といったか）
2905 = "(N-gauge, mình nhớ là thế)"

# monologue
# JP: レールショップにいつでも展示してある、\n電気で動く鉄道模型。
2536 = "Mô hình đường sắt chạy bằng điện, thứ lúc nào cũng được trưng bày ở cửa hàng mô hình.\\n"

# monologue
# JP: 新たになった決意のもとで見てみれば、\n今までのように、“単なるおもちゃ”とは思えなくなる。
2478 = "Nếu nhìn nó bằng quyết tâm mới, mình sẽ không còn coi nó là \"đồ chơi đơn thuần\" như trước đây nữa.\\n"

# monologue
# JP: （細かなところまで良く作ってあるな。\n町の模型は……古い御一夜を模してあるのかな？）
2908 = "(Được làm tỉ mỉ đến từng chi tiết thật đấy.\\nCòn mô hình thị trấn này... có phải là mô phỏng lại Ohitoyo ngày xưa không nhỉ?)"

# monologue
# JP: 小さな頃の僕には、まるで余裕がなかった。
2699 = "Hồi còn nhỏ, mình chẳng hề có lấy một chút thảnh thơi."

# monologue
# JP: 御一夜の町は、楽しみ、親しみ、暮らす空間ではなくて、\n少しでも罪を贖う機会を探し求めるための場所だった。
2839 = "Với mình, thị trấn Ohitoyo không phải là nơi để tận hưởng, để gắn bó hay sinh sống, mà chỉ là nơi để tìm kiếm cơ hội chuộc lại dù chỉ là một chút tội lỗi.\\n"

# monologue
# JP: （……それでも懐かしく感じるものだな）
2865 = "(...Dẫu vậy, vẫn thấy hoài niệm làm sao)"

# monologue
# JP: じっと見てると、心のどこかがあたたかになり――\n同時に、胸を潰されるような息苦しさも感じる。
2435 = "Càng nhìn lâu, lòng mình lại thấy ấm áp—\\nnhưng đồng thời, cũng cảm thấy nghẹt thở như muốn bóp nghẹn lồng ngực.\\n"

# monologue
# JP: ……恨みを捨てて慣れ親しんだつもりでも\n恐怖は今なお、体の深くに染み付いている。
1369 = "...Dù cứ ngỡ mình đã trút bỏ được sự thù hận và quen dần với nơi này,\\nnhưng nỗi sợ hãi vẫn còn thấm sâu vào tận xương tủy."

# monologue
# JP: （だが、慣れるのだ。\n体も心も、少しずつでも、慣らしていかねば――）
2883 = "(Nhưng, phải làm quen thôi.\\nDù là cơ thể hay trái tim, cũng phải dần dần làm quen với nó thôi—)"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、ずいぶんと熱心に見ておられるのですね」
2233 = "\"Soutetsu-sama, ngài đang nhìn rất chăm chú thì phải.\""

# 【双鉄】
# display as 雙鐵
# JP: 「ん」
1814 = "\"Ừ\""

# monologue
# JP: ハチロクの声で我に返る。
2416 = "Giọng nói của Hachiroku kéo mình trở về thực tại."

# monologue
# JP: 模型に魅入ってしまうなぞ、\n大の男のするようなことでもなかろうが――
2853 = "Việc bị cuốn hút bởi một mô hình thế này,\\nchắc không phải là chuyện mà một người đàn ông trưởng thành nên làm—"

# 【双鉄】
# display as 雙鐵
# JP: 「どこか、不思議な懐かしさを感じてな。\n目を奪われてしまったようだ」
1677 = "「Anh cảm thấy một sự hoài niệm kỳ lạ ở đâu đó.\nCó vẻ như đôi mắt đã bị mê hoặc mất rồi」"

# 【ハチロク】
# display as 八六
# JP: 「不思議な懐かしさ、ですか？」
1678 = "「Một sự hoài niệm kỳ lạ sao ạ?」"

# monologue
# JP: よほど奇妙にでも聞こえたのか、\nハチロクは、はてなと首を傾げる。
2410 = "Không biết là nghe có vẻ kỳ quặc đến mức nào,\nHachiroku nghiêng đầu đầy khó hiểu."

# 【ハチロク】
# display as 八六
# JP: 「わたくしが現役だったころの町は、\nどこもこのような景色でしたが」
1834 = "「Thị trấn thời em còn hoạt động,\nnơi nào cũng mang dáng vẻ như thế này ạ」"

# monologue
# JP: 言いながら、ハチロクの目も細まっていく。\n遠くを見つめているかのように。
2404 = "Vừa nói, đôi mắt Hachiroku vừa nheo lại.\nNhư thể đang nhìn về nơi xa xăm nào đó."

# 【ハチロク】
# display as 八六
# JP: 「鉄道と鉄道駅こそが、町の中心でした。\n町とは、駅によって作られるものだったのです」
2216 = "「Đường sắt và nhà ga chính là trung tâm của thị trấn.\nThị trấn chính là nơi được tạo nên bởi các nhà ga ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうだったな」
1772 = "「À... đúng là vậy thật」"

# monologue
# JP: 遠くへ出かける――\nその玄関は、確かにいつでも駅だった。
2451 = "Đi đến những nơi xa xôi--\nCánh cửa bước ra thế giới đó, quả thực lúc nào cũng là nhà ga."

# monologue
# JP: 親に買ってもらった切符で、路子と改札をくぐるのは、\n僕の町を出て行くという、ひとつの楽しいイベントだった。
2603 = "Việc cùng Ruriko bước qua cổng soát vé với tấm vé được cha mẹ mua cho,\nđối với tôi là một sự kiện thú vị mỗi khi rời khỏi thị trấn của mình."

# 【双鉄】
# display as 雙鐵
# JP: 「ありふれた光景だからこそ……かな。\n昔は、僕も――」
2018 = "「Có lẽ chính vì là một khung cảnh bình thường... nhỉ.\nNgày xưa, anh cũng...」"

# 【凪】
# display as 凪
# JP: 「お待たせばーい！　遅くなったばいっ！！」
1842 = "「Xin lỗi vì đã bắt mọi người phải đợi! Em đến muộn rồi!!」"

# 【ふかみ】
# display as 深美
# JP: 「す、すみません。です。\n出かけようとしたら、ご予約の電話が入っちゃって」
1876 = "「Em, em xin lỗi ạ. Tại khi em định ra ngoài thì có điện thoại đặt trước gọi đến」"

# monologue
# JP: 凪とふかみとの登場に、\n小さな疑問と淡い感傷は吹き飛んでいく。
2846 = "Sự xuất hiện của Nagi và Fukami,\nđã thổi bay những nghi vấn nhỏ nhặt và cả những cảm xúc nhạt nhòa vừa rồi."

# monologue
# JP: 見るべきはただ現実と、その先にある未来なのだと、\n元気いっぱいな姿が思いださせてくれる。
2519 = "Dáng vẻ tràn đầy năng lượng ấy đã nhắc nhở cho tôi rằng,\nđiều cần phải nhìn vào chính là thực tại và tương lai ở phía trước."

# 【双鉄】
# display as 雙鐵
# JP: 「いや。僕が即断出来なかったがための会合だ。\nバタバタさせてしまったのなら、申し訳ない」
1784 = "「Không đâu. Chính vì anh không thể quyết định ngay nên mới cần cuộc họp này.\nNếu đã làm mọi người phải vất vả, thì anh mới là người phải xin lỗi」"

# 【ふかみ】
# display as 凪＆深美
# JP: 『「ホントばい！」\n「いえ、そんな」』
2241 = "『「Thật mà!」\\n「Dạ, đâu có đâu」』"

# monologue
# JP: ふたりの口から、正反対の言葉が同時に飛び出せば、\n凪はきょとんとふかみを見つめる。
2401 = "Khi hai câu nói trái ngược nhau cùng thốt ra từ miệng cả hai,\\nNagi ngơ ngác nhìn Fukami."

# 【ふかみ】
# display as 深美
# JP: 「これ大事なお話って、わかってます。です。\nだから、仲間はずれにされたらきっと、寂しいですから」
1944 = "「Em biết đây là chuyện quan trọng mà. Phải ạ.\\nNên nếu bị ra rìa thì chắc chắn sẽ buồn lắm ạ」"

# 【凪】
# display as 凪
# JP: 「あ！　それもそうばい！　納得ばい！！」
1795 = "「A! Cái đó cũng đúng nè! Chị phục rồi đó!!」"

# 【ポーレット】
# display as 波萊特
# JP: 「これで、全員そろいましたね」
2053 = "「Vậy là, chúng ta đã đông đủ rồi nhỉ」"

# 【れいな】
# display as 玲奈
# JP: 「そろったですよぉ」
1707 = "「Đông đủ rồi ạa」"

# monologue
# JP: ポーレットと、その膝の上のれいなとが、\n凪の頷きに声を重ねて、僕らの視線を集中させる。
2685 = "Paulette cùng Reina đang ngồi trên đùi cô,\\nhòa giọng theo cái gật đầu của Nagi, thu hút ánh nhìn của chúng tôi."

# monologue
# JP: が、日々姫の視線だけ落ち着かぬ。\n椅子から腰を浮かせてきょろきょろ、あたりを見回す。
2697 = "Nhưng chỉ có ánh mắt của Hibihime là không yên.\\nCô nhổm người khỏi ghế, ngó nghiêng nhìn quanh."

# 【日々姫】
# display as 日日姬
# JP: 「ねぇね――こほんっ――\n姉さんは、来ないんですか？」
2222 = "「Nè chị――khụ――\\nChị ấy, không đến sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、蔵の仕事を外せんらしい」
1877 = "「À, hình như chị ấy không rời tay khỏi công việc ở kho được」"

# 【日々姫】
# display as 日日姬
# JP: 「あ。兄さん、今朝、姉さんと？」
2211 = "「A. Anh hai, sáng nay, anh với chị ấy...?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。\n起きがけに顔をあわせて、少し話した」
1824 = "「Ừ.\\nAnh gặp chị ấy lúc vừa ngủ dậy, đã nói chuyện một chút」"

# 【日々姫】
# display as 日日姬
# JP: 「それでなんだ」
1911 = "「Thế ra là vậy」"

# monologue
# JP: 納得顔で日々姫が椅子へと腰を戻せば、\nポーレットが小さく咳払いする。
2646 = "Hibihime quay trở lại ghế với vẻ mặt đã hiểu rõ,\\nPaulette khẽ hắng giọng."

# 【ポーレット】
# display as 波萊特
# JP: 「なら、これでみなさん集まったということで――\n双鉄くん。よければ、昨日の話の続きを」
2210 = "「Vậy, coi như mọi người đã đông đủ――\\nSoutetsu-kun, nếu được, anh tiếp tục câu chuyện hôm qua đi」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。一晩じっくりと考えてみたのだが、\n僕は、\x%l機関士;#00ffc040;機関士%l;#;に専念したいと思う」
1808 = "\"Ừ. Anh đã suy nghĩ kỹ suốt cả đêm qua rồi, anh muốn toàn tâm toàn ý tập trung vào công việc \\x%l機関士;#00ffc040;lái tàu%l;#;.\""

# monologue
# JP: まず結論から切り出せば、\nガタっと、いくつかの椅子が鳴る。
2377 = "Vừa mới nói ra kết luận, thì vài chiếc ghế đã kêu cọt kẹt."

# monologue
# JP: 日々姫の尖った口が何か言うより先に、\n続く言葉を発してしまう。
2813 = "Trước khi đôi môi chu chu của Hibihime kịp thốt lên điều gì, anh đã nói tiếp những lời sau đó."

# 【双鉄】
# display as 雙鐵
# JP: 「そうすれば、日々姫とポーレットの要望にも応えられる。\nゆえに、それこそが最善の道だと考えた」
2162 = "\"Như vậy, anh có thể đáp ứng được cả yêu cầu của Hibihime và Paulette. Vì thế, anh nghĩ đó chính là con đường tốt nhất.\""

# 【ポーレット】
# display as 日日姬＆波萊特
# JP: 『「え？」\n「え？」』
2245 = "『\"Hả?\"\n\"Hả?\"』"

# monologue
# JP: 声が重なり、お互いの顔が向き合えば、\nどうぞお先にと、ポーレットは軽く手を差し出す。
2717 = "Khi những tiếng kêu chồng lên nhau và ánh mắt chạm nhau, Paulette nhẹ nhàng đưa tay ra ý bảo người kia nói trước."

# 【日々姫】
# display as 日日姬
# JP: 「それって、どういう……」
2158 = "\"Ý anh là sao...\""

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜の人と暮らしを、もっと良く知るべきと――\n日々姫の意見を、僕は大いに参考にすべきものと感じた」
1926 = "\"Anh cảm thấy mình cần tham khảo thật kỹ ý kiến của Hibihime rằng bản thân nên thấu hiểu hơn về con người và cuộc sống ở Oihito.\""

# 【日々姫】
# display as 日日姬
# JP: 「ならっ」
2197 = "\"Vậy thì...\""

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、乗務を通じて果たしていきたいと考えた。\nそうした方が、おそらく“素顔”が見れるとも」
1955 = "\"Do đó, anh nghĩ mình muốn thực hiện điều đó thông qua việc đi tàu. Làm như thế có lẽ sẽ thấy được 'bộ mặt thật' của mọi người.\""

# 【日々姫】
# display as 日日姬
# JP: 「あー」
1793 = "\"À...\""

# monologue
# JP: それもそっか、と言わんばかりの、\nなんとも微妙な声と頷き。
2751 = "Một tiếng cảm thán đầy vẻ như muốn nói 'Ra là vậy', kèm theo cái gật đầu đầy ẩn ý."

# monologue
# JP: 日々姫は、聡い。\nみなまでを言う必要も無いかもしれんが――
2630 = "Hibihime rất thông minh. Có lẽ chẳng cần phải nói hết mọi lời đâu—"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫と一緒にいるときに見える顔と暮らしは、\n“日々姫に見せてくれるもの”となろうからな」
2092 = "\"Bởi lẽ, bộ mặt và cuộc sống mà anh thể hiện khi ở bên Hibihime, có lẽ sẽ trở thành 'thứ mà anh chỉ cho mình em thấy' thôi.\""

# monologue
# JP: それが悪いとは思わない。\n御一夜に馴染み、信頼を得ている日々姫が見る顔。
2827 = "Anh không nghĩ điều đó là xấu. Đó là bộ mặt mà Hibihime, người đã quen thuộc và giành được sự tin tưởng ở Oihito, được nhìn thấy."

# monologue
# JP: それはきっと、御一夜の素晴らしい一面であり、\n観光客に伝えていくべき魅力であろうと思うから。が――
2829 = "Bởi vì anh nghĩ đó chắc chắn là một khía cạnh tuyệt vời của Ohitoyo, và là nét quyến rũ mà chúng ta nên truyền tải đến du khách. Thế nhưng――"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃは……\nむき出しの素顔ば見たかとね」
2219 = "「Anh hai... anh đã thấy gương mặt thật không chút che giấu của em rồi nhỉ」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。日常使う鉄道の\x%l機関士;#00ffc040;機関士%l;#;などは、\n人というより、装置であり、あるいは背景だろうから」
2020 = "「Đúng vậy. Những người như \\x%lthợ máy;#00ffc040;thợ máy%l;#; vận hành đường sắt hàng ngày có lẽ giống như một bộ phận thiết bị, hoặc là một phần của phông nền hơn là con người」"

# monologue
# JP: だから、誰も気にもせぬ。\n装わず、仮面をつけず、まさにむき出しの姿が見える。
2588 = "Vì thế, chẳng có ai để ý cả.\nKhông tô vẽ, không đeo mặt nạ, và người ta có thể nhìn thấy dáng vẻ trần trụi thực sự của họ."

# monologue
# JP: ――日々姫が見ている“御一夜”とは、\nきっと別の御一夜を、そこから学べるように思う。
1345 = "――Anh nghĩ rằng, từ đó, anh có thể học được một “Ohitoyo” khác,\nkhác với cái mà Hibiki nhìn thấy mỗi ngày."

# 【双鉄】
# display as 雙鐵
# JP: 「視点は、多い方が良いと思うのだ。\n御一夜を、より深く知りたいのなら」
2086 = "「Nếu muốn hiểu rõ hơn về Ohitoyo, thì càng có nhiều góc nhìn càng tốt, em nghĩ vậy」"

# 【日々姫】
# display as 日日姬
# JP: 「わかりました。納得しました。了解です！」
1940 = "「Em hiểu rồi. Em đã bị thuyết phục. Rõ ạ!」"

# monologue
# JP: ふざけたような口調でいって、\n日々姫は軽く肩をすくめて、ポーレットを見る。
2637 = "Nói bằng giọng điệu có phần tinh nghịch,\nHibiki khẽ nhún vai rồi nhìn về phía Paulette."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも……わかっちゃったかな。\n勘違いだったら、ちょっと恥ずかしいんですけど――」
1928 = "「Có lẽ... em cũng hiểu ra rồi.\nNếu em hiểu nhầm thì hơi xấu hổ một chút, nhưng mà――」"

# monologue
# JP: 照れ隠しのような苦笑を混じえ、\nけれど、その目は真剣だ。
2851 = "Cô cười khổ như để che giấu sự ngượng ngùng,\nnhưng ánh mắt cô lại vô cùng nghiêm túc."

# 【ポーレット】
# display as 波萊特
# JP: 「市政に対する意見とか要望とかも――\n双鉄くん、現場から上げようとしてくれてるんですね？」
2232 = "「Cả những ý kiến hay nguyện vọng đối với chính quyền thành phố nữa――\nSoutetsu-kun, anh đang định đưa những điều đó từ thực tế lên đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。\nそういうこともできるのではないかと考えている」
1804 = "「Ừ.\nAnh đang nghĩ rằng chúng ta cũng có thể làm những việc như vậy」"

# monologue
# JP: ポーレットの視野は、僕のものよりよほど広い。\n今の短い言葉さえもが、それを明確に示している。
2684 = "Tầm nhìn của Paulette rộng hơn anh rất nhiều.\nNgay cả một câu nói ngắn ngủi vừa rồi cũng đã chứng minh rõ ràng điều đó."

# monologue
# JP: なら、仮に僕が秘書を勤めてみたとても、\nその点では、たいした力になれんだろうし――
2587 = "Nếu vậy, giả sử anh có thử làm thư ký đi chăng nữa,\nthì về phương diện đó, anh cũng chẳng giúp ích được gì nhiều――"

# 【双鉄】
# display as 雙鐵
# JP: 「それに加え、[ハチロクニイマル,3]8620が営業運転できるようになれば、\nキハ[レイナナ,1]07とれいなの負担も、分散されよう」
2078 = "「Hơn nữa, nếu 8620 có thể chạy thương mại trở lại,\nthì gánh nặng cho Kiha 07 và Reina cũng sẽ được san sẻ」"

# monologue
# JP: 言えばれいなが、ふんわり頷く。
2712 = "Reina nhẹ nhàng gật đầu khi nghe tôi nói."

# 【れいな】
# display as 玲奈
# JP: 「そおですねぇ。ときどきでも代わってもらえたら\n時間のかかる検査とかできるようになりますからぁ」
2107 = "「Vâng ạ. Nếu thi thoảng anh có thể thay ca cho em,\nnhư vậy em sẽ có thời gian để thực hiện những cuộc kiểm tra tốn nhiều thời gian hơn ạ」"

# 【ポーレット】
# display as 波萊特
# JP: 「本当ね、れいな」
2108 = "「Phải rồi nhỉ, Reina」"

# monologue
# JP: 穏やかな声、穏やかな手つき。\nポーレットは、れいなの髪を優しく撫でる。
2560 = "Giọng nói dịu dàng, bàn tay cũng thật nhẹ nhàng.\nPaulette âu yếm vuốt mái tóc của Reina."

# 【双鉄】
# display as 雙鐵
# JP: 「――現場で動くことからこそ、\n僕は一番、多くを学べるように思うのだ」
1399 = "「――Chính vì trực tiếp làm việc tại hiện trường,\nnên ta nghĩ rằng mình có thể học hỏi được nhiều điều nhất」"

# monologue
# JP: 自分の主張を受け入れられてる。わかってもらえる。\nその実感が、僕の唇をなめらかにする。
2759 = "Cảm giác ý kiến của mình được chấp nhận. Rằng họ thấu hiểu mình.\nCảm giác đó khiến lời nói của tôi trở nên trôi chảy hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットが期待してくれたような政策なども、\nそうした方が、むしろヒントを見つけられそうだとも」
2039 = "「Những chính sách mà Paulette kỳ vọng vào em,\nlàm như thế này có lẽ lại càng dễ tìm ra gợi ý hơn」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね……それが一番いい形かもって、\n言われてみれば、感じます」
1685 = "「Vâng ạ…… nếu anh nói vậy, em cũng cảm thấy\nđó có lẽ là phương án tốt nhất」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならばよかった」
2185 = "「Vậy thì tốt quá」"

# 【凪】
# display as 凪
# JP: 「こいで話ば決まりばいっ！」
2169 = "「Chốt đơn thế này luôn nhé!」"

# monologue
# JP: 凪が立つ。\n三本締めでもしてくれそうな勢いだが、早すぎる。
2805 = "Nagi đứng bật dậy.\nKhí thế như muốn vỗ tay ba nhịp ăn mừng, nhưng làm vậy thì sớm quá rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「いや、今少し待ってくれ。\nむしろ、二人にはこの先の部分で意見を聞きたいのだ」
1925 = "「Không, chờ chút đã. \nThực ra, ta muốn lắng nghe ý kiến của hai người về những phần tiếp theo này nữa」"

# 【ふかみ】
# display as 深美
# JP: 「わたしたちの意見、ですか？」
2079 = "「Ý kiến của chúng em sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「二人だけでなく、\nみなの知恵を貸してもらいたいと考えている」
2056 = "「Không chỉ là hai người,\nta muốn mượn trí tuệ của tất cả mọi người nữa」"

# monologue
# JP: あ、とポーレットの抑えたつぶやき。
2682 = "Paulette khẽ thốt lên một tiếng ngạc nhiên."

# monologue
# JP: 当然、考えてくれているのだろうが、\nこのことを、ポーレットに任せきりにはしたくない。
2517 = "Đương nhiên là anh đã nghĩ đến rồi, nhưng anh không muốn phó mặc hoàn toàn việc này cho Paulette."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l客車;#00ffc040;客車%l;#;を――どうにか手に入れたいのだ」
1953 = "「Anh muốn—bằng mọi giá phải có được một toa xe khách.」"

# 【ハチロク】
# display as 八六
# JP: 「観光の目玉とするのであれば、\x%l客車;#00ffc040;客車%l;#;の質を高めることは\n極めて重要となってくるかと存じます」
2090 = "「Nếu muốn biến nó thành điểm nhấn du lịch, tôi cho rằng việc nâng cao chất lượng của toa xe khách là cực kỳ quan trọng ạ.」"

# monologue
# JP: 澄ました顔で、ハチロクが僕の言葉の不足を継ぎ足す。
2422 = "Hachiroku điềm nhiên bổ sung vào những gì tôi còn thiếu sót."

# 【ハチロク】
# display as 八六
# JP: 「隙間から煙が流入してくるような\x%l客車;#00ffc040;客車%l;#;では、お客様の\nご気分もお召し物も真っ黒になってしまいますので」
1391 = "「Bởi vì nếu là một toa xe khách mà khói từ khe hở tràn vào, thì tâm trạng cũng như trang phục của hành khách sẽ đều bị nhuộm đen hết ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それは……わたしも、\n理解しているつもりなんですけど――」
2151 = "「Chuyện đó…… em cũng hiểu mà, nhưng mà—」"

# monologue
# JP: 心苦しそうな声。
2683 = "Giọng nói đầy vẻ áy náy."

# monologue
# JP: れいなは不安になったのか、\n首を真上に、ポーレットのことを見つめてる。
2709 = "Reina có vẻ bất an, cậu bé ngẩng đầu lên, nhìn chằm chằm về phía Paulette."

# 【ポーレット】
# display as 波萊特
# JP: 「良い\x%l客車;#00ffc040;客車%l;#;を入手するのって――\nある面では、動力車の入手より難しいんです」
1914 = "「Việc kiếm được một toa xe khách tốt—về mặt nào đó, còn khó hơn cả việc kiếm được toa xe động lực đấy ạ.」"

# monologue
# JP: ……\x%lまいてつ;#00ffc040;まいてつ%l;#;たちは、自分に必要な車輌を手放さない。\nそして\x%l客車;#00ffc040;客車%l;#;は、動力車よりも欲しがるものが限られている。
1361 = "……Các Railord không dễ dàng từ bỏ những toa xe mà mình cần. Hơn nữa, toa xe khách lại là thứ mà số lượng người muốn có còn hạn chế hơn cả toa xe động lực."

# monologue
# JP: 大廃線で、\x%l客車;#00ffc040;客車%l;#;のほとんどは廃棄・解体されて、\n現存している希少なものは、まずもって手放されない。
2488 = "Sau cuộc Đại bãi bỏ đường sắt, hầu hết các toa xe khách đã bị vứt bỏ hoặc tháo dỡ, nên những chiếc còn sót lại hiếm hoi hiện nay, trước hết là họ không bao giờ chịu nhả ra."

# 【ポーレット】
# display as 波萊特
# JP: 「――引退した\x%lまいてつ;#00ffc040;まいてつ%l;#;が放出することもありますけど、\nそういうのは、たいてい動力車もセットですから……」
1394 = "「——Đôi khi cũng có những Railord đã giải nghệ chịu tung ra, nhưng loại đó thì thường là đi kèm cả toa xe động lực rồi……」"

# monologue
# JP: 動力車の分、入手コストは上昇する。
2457 = "Chi phí để mua thêm toa xe động lực sẽ khiến giá thành tăng lên."

# monologue
# JP: “質の良い\x%l客車;#00ffc040;客車%l;#;のみを、極力安価で”――という\n僕らの要求を満たすものは、めったには出てこないらしい。
1356 = "Có vẻ như, thứ đáp ứng được yêu cầu “chỉ cần toa xe khách chất lượng tốt với giá rẻ nhất có thể”—như chúng tôi mong muốn, là cực kỳ hiếm khi xuất hiện."

# 【ふかみ】
# display as 深美
# JP: 「ええと。セットで買って――動力車だけ別に売るとか、\n動力車を欲しいだれかと、共同で買ってわけるとか。は」
1852 = "「À thì. Có khi nào mình mua trọn bộ—rồi bán riêng toa xe động lực, hoặc là mua chung với ai đó đang cần toa xe động lực rồi chia ra không nhỉ. Ha.」"

# 【ポーレット】
# display as 波萊特
# JP: 「その先のことを考えるとちょっと……\nあんまり、良くない評判がたっちゃいそうで」
2075 = "「Nghĩ đến những chuyện sau đó thì...\\nEm sợ rằng tiếng tăm của anh sẽ không được tốt lắm」"

# 【双鉄】
# display as 雙鐵
# JP: 「なぜだ？」
2044 = "「Tại sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「セットって、『一緒に使って欲しい』ってことですから。\nずっとコンビでやってきた、動力車と\x%l客車;#00ffc040;客車%l;#;でしょうし」
1968 = "「Vì『set』có nghĩa là『muốn được sử dụng cùng nhau』 mà. \\nĐó là sự kết hợp đã gắn bó từ lâu giữa đầu máy xe lửa và\\x%l客車;#00ffc040;toa hành khách%l;#; mà, đúng không?」"

# 【ハチロク】
# display as 八六
# JP: 「わかります」
1737 = "「Tôi hiểu rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむぅ……ファン心理とか、思い入れとかいうヤツか」
1786 = "「Hừm... Cái gọi là tâm lý người hâm mộ, hay sự gắn bó tình cảm ấy nhỉ」"

# monologue
# JP: \x%lまいてつ;#00ffc040;まいてつ%l;#;が、どれほど実用に即していようと\n究極的には趣味の色合いが濃い世界なら……
2475 = "Dù\\x%lまいてつ;#00ffc040;Maitetsu%l;#; có thực dụng đến đâu đi nữa,\\nnhưng nếu suy cho cùng đây là một thế giới mang đậm màu sắc sở thích cá nhân thì..."

# monologue
# JP: 確かに、その思い入れを踏みにじるのは、\nあまり上策でない気はしてくる。
2810 = "Quả thật, việc chà đạp lên những tình cảm đó,\\ncó vẻ không phải là một nước đi hay."

# 【双鉄】
# display as 雙鐵
# JP: 「――まぁ、難しいだろうとは想像していた。\nだからこそ、知恵を借りたく思っている」
1680 = "「――Chà, anh cũng đã lường trước là nó sẽ khó khăn.\\nChính vì vậy, anh mới muốn mượn trí tuệ của em」"

# 【日々姫】
# display as 日日姬
# JP: 「なら、まず最初に教えて欲しいんですけど」
1973 = "「Vậy thì, trước hết em muốn biết điều này」"

# monologue
# JP: まっすぐに挙手。\n日々姫の目は、ポーレットへと向いている。
2632 = "Giơ tay thẳng tắp.\\nÁnh mắt của Hibihime hướng về phía Paulette."

# 【日々姫】
# display as 日日姬
# JP: 「\x%lまいてつ;#00ffc040;まいてつ%l;#;さんの引退を待つ以外で、\n\x%l客車;#00ffc040;客車%l;#;を手に入れる方法って全然無いんですか？」
2224 = "「Ngoài việc đợi\\x%lまいてつ;#00ffc040;Maitetsu%l;#; nghỉ hưu ra,\\nchẳng có cách nào khác để có được\\x%l客車;#00ffc040;toa hành khách%l;#; sao ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「それは……」
2154 = "「Chuyện đó...」"

# 【凪】
# display as 凪
# JP: 「簡単ばい！　大廃線でたくさん捨てられたもんなら、\nそん捨てられたのば、拾ってもらってくればええばい！」
2208 = "「Dễ ợt mà! Nếu sau đợt đại bãi bỏ tuyến đường sắt mà có nhiều toa bị vứt bỏ,\\nthì mình chỉ cần đi nhặt mấy cái đó về là được mà!」"

# monologue
# JP: 凪の言葉に一瞬驚いた顔をして――
2686 = "Paulette thoáng ngạc nhiên trước lời của Nagi――"

# monologue
# JP: ポーレットは、“首を傾げる”と“頷く”との、\nその中間の動きを見せる。
2746 = "Paulette thực hiện một cử động trung gian giữa việc “nghiêng đầu” và “gật đầu”."

# 【ポーレット】
# display as 波萊特
# JP: 「それは……方法の一つかもしれません。\nけど、放置車輌が現存する確率もすごい低いでしょうし」
2148 = "「Đó... có lẽ là một phương án. Nhưng xác suất để những toa tàu bị bỏ hoang vẫn còn tồn tại là cực kỳ thấp ạ.」"

# 【凪】
# display as 凪
# JP: 「ほうちしゃりょう？　捨てられてるヤツのことばい？」
2013 = "「Toa tàu bị bỏ hoang á? Ý em là mấy thứ bị vứt bỏ hả?」"

# 【れいな】
# display as 玲奈
# JP: 「そおですよぉ。スクラップ屋さんでそのままだとか、\n廃業した鉄道会社さんでそのまま放っておかれる子です」
2026 = "「Đúng vậy ạ. Là những cô bé vẫn bị để nguyên tại các bãi phế liệu, hoặc bị bỏ mặc tại những công ty đường sắt đã ngưng hoạt động.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。廃棄された車輌の全てが、\nすぐさまに解体されるとは限らんわけか」
2065 = "「Ra là vậy. Không phải toàn bộ toa tàu bị loại biên đều sẽ lập tức bị rã xác nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、でも――」
2002 = "「Vâng, nhưng mà――」"

# 【ハチロク】
# display as 八六
# JP: 「廃棄された上に長期間の放置をされては――\n\x%l艤装;#00ffc040;[ぎそう,1]艤装%l;#;は当然、車輌そのものにも痛みが出るのでは？」
2070 = "「Nếu đã bị loại biên lại còn bị bỏ hoang trong thời gian dài―― thì \\x%lThiết bị phụ trợ;#00ffc040;Thiết bị phụ trợ%l;#; đương nhiên là sẽ bị hư hại, và bản thân toa tàu cũng vậy phải không?」"

# monologue
# JP: そうなんです、と頷くポーレットの傍らで、\nおずおず、ふかみが手をあげる。
2680 = "Vừa gật đầu đồng tình, bên cạnh Paulette, Fukami ngập ngừng giơ tay lên."

# 【ふかみ】
# display as 深美
# JP: 「あのぉ……ぎそう、って何。ですか？」
2112 = "「Ưm... cho em hỏi, thiết bị phụ trợ... là gì ạ?」"

# 【ハチロク】
# display as 八六
# JP: 「\x%l客車;#00ffc040;客車%l;#;であれば、座席やモケット、つり革やてすりなどの、\n車体に後付けをする装備類のことです」
1691 = "「Với \\x%ltoa hành khách;#00ffc040;toa hành khách%l;#; thì đó là những trang bị được lắp đặt thêm vào thân xe, như ghế ngồi, vải bọc, tay nắm hay tay vịn ạ.」"

# 【凪】
# display as 凪
# JP: 「もけっと？」
2014 = "「Vải bọc ạ?」"

# 【れいな】
# display as 玲奈
# JP: 「座席のシートに貼ってある布のことですよぉ。\nあの、てざわりが良くてあったかいやつですぅ」
1883 = "「Chính là lớp vải được bọc trên ghế ngồi đó ạ. Cái loại mà sờ vào thấy êm ái và ấm áp ấy ạ.」"

# 【ふかみ】
# display as 深美
# JP: 「あ、はい。わかりました」
1775 = "「À, vâng. Em hiểu rồi ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「ちなみに、一般的な鉄道車輌は、車体、\x%l台枠;#00ffc040;台枠%l;#;、\x%l台車;#00ffc040;台車%l;#;、\nそれに\x%l艤装;#00ffc040;艤装%l;#;で成り立っていると考えて良いかと存じます」
2105 = "「Tiện thể, về các toa tàu đường sắt thông thường, tôi nghĩ có thể coi chúng được cấu thành từ thân xe, \\x%lkhung gầm;#00ffc040;khung gầm%l;#;, \\x%lbogie;#00ffc040;bogie%l;#;, và cả \\x%lthiết bị phụ trợ;#00ffc040;thiết bị phụ trợ%l;#; nữa ạ.」"

# monologue
# JP: ここで説明しておく方が話が早いと考えたのか、\nあるいは単に話したいのか――
2411 = "Có lẽ cô ấy nghĩ giải thích ngay tại đây sẽ giúp câu chuyện diễn ra nhanh hơn, hoặc đơn giản là cô ấy chỉ muốn nói mà thôi――"

# 【ハチロク】
# display as 八六
# JP: 「まずは台車のことからご説明もうしあげましょう」
1706 = "「Vậy trước tiên, hãy để tôi giải thích về bogie nhé.」"

# monologue
# JP: 聞かれた以上へぐいぐいと、\nハチロクの言葉は踏み込んでいく。
2417 = "Một khi đã bị hỏi, Hachiroku lại càng dấn tới,\nlời lẽ của em ấy cứ thế đi sâu vào lòng người."

# 【ハチロク】
# display as 八六
# JP: 「これは車輪や動力伝達機構、ブレーキなどの走り装置\n――走行装置を持つ、車体から独立した機構を言います」
1993 = "「Đây là bộ phận cơ khí tách biệt khỏi thân tàu, bao gồm bánh xe, cơ cấu truyền động, phanh và những thiết bị vận hành khác\n――người ta gọi đó là thiết bị chạy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1773 = "「Ồ.」"

# 【ハチロク】
# display as 八六
# JP: 「\x%l台車;#00ffc040;台車%l;#;の特徴は、車体に直結されず自由に動けることです。\n\x%l8620;#00ffc040;8620%l;#;の場合は、\x%l先輪;#00ffc040;先輪%l;#;が\x%l先台車;#00ffc040;先台車%l;#;として独立していますよね」
1386 = "「\\x%l台車;#00ffc040;Bogie%l;#; có đặc điểm là không gắn cố định trực tiếp vào thân tàu mà có thể di chuyển linh hoạt.\nTrường hợp của \\x%l8620;#00ffc040;8620%l;#;, phần \\x%l先輪;#00ffc040;bánh dẫn%l;#; phía trước hoạt động độc lập như một \\x%l先台車;#00ffc040;bogie dẫn hướng%l;#; đúng không nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1827 = "「Ừm?」"

# monologue
# JP: \x%l先輪;#00ffc040;先輪%l;#;とは、名の通り一番先頭についている、\n比較的小さな車輪のことだ。
2527 = "\\x%l先輪;#00ffc040;Bánh dẫn%l;#; đúng như tên gọi, là cặp bánh xe có kích thước tương đối nhỏ,\nđược lắp ở vị trí tiên phong đầu tàu."

# monologue
# JP: 言われてみれば、他の\x%l動輪;#00ffc040;動輪%l;#;たちと違って、\nあれは確かに独立している。
2830 = "Được nói đến mới để ý, khác với những chiếc \\x%l動輪;#00ffc040;bánh xe chủ động%l;#; khác,\nchúng quả thực là những bộ phận độc lập."

# 【れいな】
# display as 玲奈
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;に車輪が固定されてるとカーブを曲がりづらいです。\nだから\x%l台車;#00ffc040;台車%l;#;は動ける分、とっても便利なのですよぉ」
1861 = "「Nếu bánh xe bị cố định vào \\x%l台枠;#00ffc040;khung gầm%l;#; thì sẽ rất khó để vào cua.\nVì vậy, một chiếc \\x%l台車;#00ffc040;bogie%l;#; có thể chuyển động được sẽ rất hữu dụng đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1770 = "「À……」"

# monologue
# JP: 直感的には分かったような気がするが、どうも怪しい。\n後で\x%lピット;#00ffc040;ピット%l;#;に潜り込み、下から見上げ確認しよう。
2576 = "Trực giác mách bảo rằng mình đã hiểu, nhưng vẫn thấy mơ hồ quá.\nĐể lát nữa mình sẽ chui xuống \\x%lピット;#00ffc040;hầm kỹ thuật%l;#; xem xét từ bên dưới cho chắc."

# 【日々姫】
# display as 日日姬
# JP: 「ええ、と……」
2157 = "「Ừm, là thế này……」"

# 【凪】
# display as 凪
# JP: 「話がむつかしくてよくわからんばい！」
1850 = "「Chuyện khó hiểu quá, nghe chẳng hiểu gì cả!」"

# monologue
# JP: 僕で、怪しいレベルの話だ。
2733 = "Đến mức mình cũng thấy mơ hồ như vậy."

# monologue
# JP: 日々姫と凪は顔をしかめて、\nその傍らで、ふかみはこくこく、凪の言葉に同意している。
2627 = "Hibihime và Nagi nhăn mặt,\nbên cạnh đó, Fukami gật gù lia lịa, đồng tình với lời của Nagi."

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l台車;#00ffc040;台車%l;#;は、まぁ、\n足回りだって今は考えておいてください」
2054 = "「\\x%l台車;#00ffc040;Bogie%l;#; thì, ừm, \nbây giờ anh cứ tạm hiểu nó là bộ phận gầm bánh đi ạ.」"

# monologue
# JP: 見かねてか、ポーレットがフォローをしてくれる。
2681 = "Có lẽ vì không đành lòng nhìn, Paulette lên tiếng đỡ lời."

# 【ポーレット】
# display as 波萊特
# JP: 「で、車体部分が、それに対するなら胴体です」
2046 = "「Vậy thì, phần toa xe tương ứng với thân mình」"

# 【凪】
# display as 凪
# JP: 「そんくらいはわかるばい！\n\x%l客車;#00ffc040;客車%l;#;だったら、お客さんば乗りよるところが、車体ばい」
2152 = "「Chừng đó thì tôi biết chứ!\\nNếu là \\x%l客車;#00ffc040;toa hành khách%l;#; thì chỗ chở khách chính là phần thân xe đó」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん、正解」
1821 = "「Ừm, chính xác」"

# monologue
# JP: \x%l台車;#00ffc040;台車%l;#;と車体は、足周りと胴体――\nこのくらいざっくりな方が、僕らレベルでは分かり良い。
2592 = "\\x%l台車;#00ffc040;Bộ chuyển hướng%l;#; và thân xe, giống như phần chân và thân mình vậy――\\nGiải thích đại khái thế này lại dễ hiểu với trình độ của bọn mình."

# 【ポーレット】
# display as 波萊特
# JP: 「それで\x%l艤装;#00ffc040;[ぎそう,1]艤装%l;#;は、お洋服とかアクセサリーとかですね。\nだから、観光\x%l客車;#00ffc040;客車%l;#;だとここもすごく重要になります」
2082 = "「Và \\x%l艤装;#00ffc040;trang thiết bị%l;#; thì giống như quần áo hay phụ kiện vậy ạ.\\nThế nên với \\x%l客車;#00ffc040;toa hành khách%l;#; du lịch, phần này cũng vô cùng quan trọng」"

# monologue
# JP: ふむふむと、日々姫がスケッチブックを広げる。
2626 = "Hibihime gật gù rồi mở sổ phác thảo ra."

# monologue
# JP: \x%l台車;#00ffc040;台車%l;#;、車体、\x%l艤装;#00ffc040;艤装%l;#;と描き込み――\n手の鉛筆ごと挙手をする。
2398 = "Vừa vẽ \\x%l台車;#00ffc040;bộ chuyển hướng%l;#;, thân xe và \\x%l艤装;#00ffc040;trang thiết bị%l;#; vào――\\nCô bé vừa giơ tay cùng với cây bút chì trên tay."

# 【日々姫】
# display as 日日姬
# JP: 「だったら、ダイワク？　っていうのが――腰？」
2209 = "「Vậy thì, cái gọi là khung gầm? Có phải là――phần eo không?」"

# 【れいな】
# display as 八六＆玲奈
# JP: 『「左様です！」\n「そおですよぉ！」』
2250 = "『「Đúng là vậy ạ!」\\n「Đúng rồi đó ạ!」』"

# monologue
# JP: よほど的を射た言葉だったのか、少し肩身が狭そうだった\nハチロク・れいながそろって嬉しげな声を出す。
2726 = "Có lẽ vì trúng tim đen quá nên\\nHachiroku và Reina, vốn đang hơi thiếu tự tin, đều cùng cất tiếng vui sướng."

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;は、車体と\x%l台車;#00ffc040;台車%l;#;とをつなぐ腰であり、\n同時に全体を支える骨でもあるとも言えますね」
1382 = "「\\x%l台枠;#00ffc040;Khung gầm%l;#; vừa là phần eo nối giữa thân xe với \\x%l台車;#00ffc040;bộ chuyển hướng%l;#;,\\nđồng thời cũng có thể coi là bộ xương chống đỡ cho toàn bộ cấu trúc ạ」"

# 【日々姫】
# display as 日日姬
# JP: 「ふぅん、まぁ、当然って言ったら当然だけど、\nどこもかしこも重要なんだ」
1826 = "「Hừm, chà, nói là đương nhiên thì cũng đúng thật, nhưng\\nchỗ nào cũng quan trọng hết nhỉ」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。ですから、観光の軸になるような\x%l客車;#00ffc040;客車%l;#;と考えると、\n廃車輌は、もし見つけることが出来ても厳しそうかと」
2022 = "「Vâng. Vì vậy, nếu xét đến việc dùng những chiếc \\x%l客車;#00ffc040;toa hành khách%l;#; làm trục chính cho du lịch,\\nthì dù có tìm được những toa tàu cũ bị thải loại cũng e là không khả thi ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「……ううむ。そうなってしまうか」
1410 = "「……Ưm. Ra là vậy sao」"

# monologue
# JP: 状態が良い車輌なら、\nそもそも廃棄されないだろうし――
2761 = "Nếu là toa tàu có tình trạng tốt,\\nthì ngay từ đầu đã không bị loại biên rồi――"

# 【双鉄】
# display as 雙鐵
# JP: 「本格的な改修となると……確かに。\n費用的にも設備的にも、現状では対応が難しそうだし」
1853 = "「Nếu cải tạo quy mô lớn thì…… đúng là vậy.\\nXét cả về chi phí lẫn thiết bị, hiện tại rất khó để đáp ứng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。……ヘタすると、お金にものをいわせて、\n状態のいい\x%l客車;#00ffc040;客車%l;#;を無理やり買っちゃうほうが安いかも」
2024 = "「Đúng vậy ạ.…… tệ hơn thì, dùng tiền đè người, \\nmuốn mua bằng được những toa \\x%lkhách;#00ffc040;khách%l;#; có tình trạng tốt thì có khi lại rẻ hơn.」"

# 【凪】
# display as 凪
# JP: 「ばってん、そぎゃんお金はどこにもなかばい？」
2178 = "「Nhưng mà, tiền ở đâu ra mà làm rứa chứ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「なんですよねぇ」
2066 = "「Quả thật là vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――待ってくれ。今の話だと……金さえあれば、\nそれでも出てくる\x%l客車;#00ffc040;客車%l;#;は、あるにはあるのか？」
1923 = "「Không―― đợi đã. Theo như vừa nói…… nếu có tiền,\\nthì vẫn còn những toa \\x%lkhách;#00ffc040;khách%l;#; có thể xuất hiện, đúng chứ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「それは、はい。この世界にもコレクターさんは居ますし、\n予備車輌のストックをしてる会社さんもありますから」
2155 = "「Dạ, đúng ạ. Trên thế giới này cũng có những nhà sưu tầm, \\nvà cũng có những công ty dự trữ các toa tàu dự phòng nữa ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「コレクションと、備えのための車輌……\nどちらも、言うなれば虎の子か」
1961 = "「Sưu tầm, và dự trữ để phòng hờ……\\nnói cách khác, cả hai đều là báu vật không thể thay thế nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですよ。ですから、譲ってもらうのは――」
1888 = "「Đúng là vậy ạ. Cho nên, muốn được họ nhượng lại thì――」"

# 【凪】
# display as 凪
# JP: 「トラの子なら、\nせんじんの谷に突き落とされるの待てば良かばい！」
1971 = "「Nếu là báu vật, thì phải chờ bị ném xuống vực thẳm chứ!」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、それライオン！」
1879 = "「Nagi-chan, đó là sư tử mà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1672 = "「Không――」"

# 【ふかみ】
# display as 深美
# JP: 「え？　ライオンじゃなかった。でしたっけ？」
1767 = "「Hử? Không phải sư tử ạ. Có phải không nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや、そこは正しい。\n千尋の谷に突き落とされるのは、間違いなく獅子の子だ」
1681 = "「À, không, chỗ đó thì đúng rồi.\\nViệc bị ném xuống vực sâu nghìn trượng, chắc chắn là con sư tử đấy.」"

# monologue
# JP: ではなく。\nそこに引っかかったわけではなくて――
2558 = "Không phải là việc đó.\\nKhông phải là đang vướng bận vào chuyện đó đâu――"

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、コレクターではないのだが……\nそういう心理も、あるいはあり得るのではないのか？」
2230 = "\"Tôi không phải là nhà sưu tầm, nhưng......\\nChẳng lẽ lại không thể tồn tại kiểu tâm lý đó sao?\""

# 【日々姫】
# display as 日日姬
# JP: 「そういう心理？」
2166 = "\"Kiểu tâm lý đó ư?\""

# 【ハチロク】
# display as 八六
# JP: 「我が子を千尋の谷に突き落とす――ですか？」
1849 = "\"Kiểu như đẩy đứa con của mình xuống vực sâu nghìn trượng――phải không ạ?\""

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ。\n無論、実際に突き落とされてはたまらなかろうが――」
1996 = "\"Đúng vậy.\\nTất nhiên là nếu thực sự bị đẩy xuống thì không ổn chút nào――\""

# 【ハチロク】
# display as 八六
# JP: 「あ」
1794 = "\"A\""

# monologue
# JP: なるほどと、ハチロクの目が丸くなる。\nれいなも、大きくうなずいている。
2405 = "Hachiroku tròn mắt ra vẻ đã hiểu.\\nReina cũng gật đầu lia lịa."

# 【ハチロク】
# display as 八六
# JP: 「我が子が動き――活躍する姿を見たい」
1917 = "\"Muốn nhìn thấy đứa con của mình chuyển động――và hoạt động hết công suất.\""

# 【日々姫】
# display as 日日姬
# JP: 「あるかも！　『こんな綺麗に使われるんなら』\n『こんなに愛してもらえるんなら』って、そういうの」
2062 = "\"Có thể lắm chứ! Kiểu như 『Nếu được sử dụng đẹp đẽ thế này』\\n『Nếu được yêu thương nhiều đến thế này』, kiểu như vậy đó.\""

# 【ポーレット】
# display as 波萊特
# JP: 「そっか……そういうのも、確かに――\nあ！　その逆もあるかもしれませんね」
2163 = "\"Ra là vậy...... điều đó cũng có lý――\\nÀ! Cũng có thể có trường hợp ngược lại nữa đấy ạ.\""

# 【双鉄】
# display as 雙鐵
# JP: 「その逆？」
1734 = "\"Ngược lại?\""

# 【ポーレット】
# display as 波萊特
# JP: 「[ハチロク,3]8620の魅力を伝えることができたら――\n『この機関車に、わたしの\x%l客車;#00ffc040;客車%l;#;を引いて欲しい』って」
1855 = "\"Nếu có thể truyền tải được sức hấp dẫn của 8620――\\n『Tôi muốn đầu máy này kéo \\x%ltoa xe;#00ffc040;toa xe%l;#; của mình』, chẳng hạn.\""

# 【れいな】
# display as 玲奈
# JP: 「あると思うです！」
1927 = "\"Em nghĩ là có đó ạ!\""

# 【凪】
# display as 凪
# JP: 「なら、どぎゃんとして、[ハチロク,3]8620の魅力ば伝えるばい？」
2193 = "\"Vậy thì, chúng ta phải làm thế nào để truyền tải sức hấp dẫn của 8620 đây?\""

# 【ハチロク】
# display as 八六
# JP: 「それは――」
2149 = "\"Chuyện đó là――\""

# monologue
# JP: 凪の極めて素朴な疑問は、\n弾み出してたみなの言葉を詰まらせる。
2447 = "Câu hỏi cực kỳ ngây thơ của Nagi,\\nđã khiến những lời lẽ đang tuôn trào của mọi người bỗng chốc nghẹn lại."

# monologue
# JP: そして生まれた沈黙の中、\nふかみは再び、どこかおずおずと挙手をする。
2505 = "Trong sự im lặng vừa nảy sinh, \\nFukami lại rụt rè giơ tay lên."

# 【ふかみ】
# display as 深美
# JP: 「あと、どこの誰に伝えるかも……\nすごく大事。です。きっと」
2172 = "「Ngoài ra, truyền đạt cho ai... \\nrất quan trọng. Chắc chắn là vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「誰に、そして、どのようにか――」
1751 = "「Truyền đạt cho ai, và bằng cách nào――」"

# monologue
# JP: 魅力を、伝える。\n今まであまり、考えたこともなかったことだが――
2538 = "Truyền đạt sức hấp dẫn. \\nTừ trước đến nay mình chưa từng nghĩ đến chuyện đó――"

# monologue
# JP: ああいや、そうか。
2567 = "À không, phải rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。お前の絵や看板描きは、\nまさに、そうしたことだよな？」
1982 = "「Hibihime. Những bức vẽ và biển hiệu của em, \\nchính là về điều đó, phải không?」"

# 【日々姫】
# display as 日日姬
# JP: 「え？　あ！　うんっ、そっか。言われたら……うん。\n確かに、看板はもろ、魅力ば伝えるためだけに描くとね」
1769 = "「Hả? À! Ừm, đúng nhỉ. Nếu anh nói vậy thì... ừm. \\nĐúng là, biển hiệu hoàn toàn là để truyền tải sức hấp dẫn thôi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば魅力を伝えるために――\n看板を描くとき、何をお前は心がけている？」
2179 = "「Vậy thì để truyền tải sức hấp dẫn―― \\nkhi vẽ biển hiệu, em thường để tâm đến điều gì?」"

# 【日々姫】
# display as 日日姬
# JP: 「私が心がけていること、は……」
2007 = "「Điều em luôn để tâm, là...」"

# monologue
# JP: ペラペラと、スケッチブックが開かれる。
2641 = "Cuốn sổ phác thảo được lật sột soạt."

# monologue
# JP: そこに描かれた無数の線を確かめなおして――\n再びもちあげられる目は、強い光を宿してる。
2722 = "Xác nhận lại vô số nét vẽ trên đó―― \\nánh mắt ngước lên lần nữa chứa đựng một luồng sáng mạnh mẽ."

# 【日々姫】
# display as 日日姬
# JP: 「一番ステキなところを探して――\nまず自分が、そのステキを本当に好きになること」
1958 = "「Tìm kiếm điểm tuyệt vời nhất―― \\ntrước hết là chính mình phải thực sự yêu thích cái tuyệt vời đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1773 = "「哦哦」" 

# monologue
# JP: 少しわかる、と感じた瞬間、\nつながっていく。
2714 = "Khoảnh khắc cảm thấy mình hơi hiểu ra, \\nmọi thứ như được kết nối."

# monologue
# JP: そうか――だからか――
2526 = "Ra là vậy―― thảo nào――"

# 【双鉄】
# display as 雙鐵
# JP: 「その模型……\x%lNゲージ;#00ffc040;Nゲージ%l;#;が走っている町も、\nきっと、そうして作られたのだな」
2182 = "「Mô hình đó... \\x%lNゲージ;#00ffc040;N gauge%l;#; thị trấn nơi đoàn tàu chạy qua đó, \\nchắc hẳn cũng được tạo ra như vậy nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1754 = "\"A...\""

# monologue
# JP: 抑えた、けれど嬉しげな声。\nポーレットの頬がバラ色になる。
2852 = "Giọng nói kiềm chế, nhưng đầy vẻ vui mừng.\\nMá Paulette ửng hồng."

# 【ポーレット】
# display as 波萊特
# JP: 「だと思います。きっと、そうです。\nだって、パパは――御一夜を本当に愛してたから」
1936 = "\"Em nghĩ là vậy. Chắc chắn là thế rồi.\\nBởi vì, ba... ông ấy đã thực sự yêu thương Ohitoyo.\""

# monologue
# JP: ……ポーレットの父は評価の高い市長だったと、\nナビにもらった情報をふと思い出す。
1373 = "......Mình bất chợt nhớ lại thông tin Nagi từng kể, rằng cha của Paulette là một thị trưởng rất được kính trọng."

# monologue
# JP: 愛ゆえに、市政も模型もおそらくは、\n細やかな目配りに満ち満ちたものとなったのだろうか。
2665 = "Có lẽ, chính vì tình yêu đó mà cả chính sách thành phố lẫn những mô hình ấy đều chứa đựng sự quan tâm tinh tế đến từng chi tiết."

# 【ポーレット】
# display as 波萊特
# JP: 「パパ、すごくたくさんの写真撮ってたんです。\n御一夜の、それから、鉄道の」
2049 = "\"Ba đã chụp rất nhiều ảnh. Về Ohitoyo, và cả về những con tàu nữa.\""

# 【ハチロク】
# display as 八六
# JP: 「写真……」
2047 = "\"Ảnh sao...\""

# monologue
# JP: ハチロクの目が、僕へ向く。
2424 = "Ánh mắt Hachiroku hướng về phía tôi."

# monologue
# JP: 表情はいつもの澄ましたものだが、\n頬がわずかに紅潮している。
2777 = "Biểu cảm của cô bé vẫn điềm tĩnh như mọi khi, nhưng đôi má lại hơi ửng đỏ."

# 【ハチロク】
# display as 八六
# JP: 「で、でしたら、その――双鉄様に、\nお写真を撮っていただくというのはいかがでしょうか？」
1965 = "\"V-vậy thì, nếu là thế... anh Soutetsu, anh nghĩ sao về việc anh sẽ là người chụp những bức ảnh đó ạ?\""

# 【凪】
# display as 凪
# JP: 「あ！　それよかばい！」
1797 = "\"A! Ý hay đó!\""

# 【ふかみ】
# display as 深美
# JP: 「そう、思います。です。\n双鉄さんきっと、センスある。です」
1937 = "\"Em cũng nghĩ vậy. Chắc chắn là... anh Soutetsu có khiếu thẩm mỹ lắm.\""

# 【双鉄】
# display as 雙鐵
# JP: 「センス？　僕にか？　写真のか？」
1758 = "\"Khiếu thẩm mỹ? Là anh sao? Hay là những bức ảnh?\""

# monologue
# JP: 評価を求めて、日々姫を見る。
2582 = "Tôi nhìn Hibihime để tìm kiếm sự đánh giá."

# monologue
# JP: 日々姫はなんとも困ったような顔をして――\nけれどもやがて、見るからにしぶしぶと頷いてみせる。
2636 = "Hibihime lộ vẻ mặt vô cùng khó xử—thế nhưng chẳng bao lâu sau, cô bé lại gật đầu một cách miễn cưỡng."

# 【日々姫】
# display as 日日姬
# JP: 「センスは、あるに決まっとるばい。\nにぃにぃは、私の絵ば最初に見出してくれたもん」
1756 = "「Chắc chắn là anh có khiếu mà.\nAnh là người đầu tiên nhận ra tranh của em đó」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか？」
1882 = "「Thế sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「そういうもんばい！　……っていうか、私が仮に、\n『センスなんか無か！』ってにぃにぃに言ったとして」
1889 = "「Chứ sao nữa! ...Mà giả sử em có nói với anh là \n『Anh chẳng có chút khiếu thẩm mỹ nào cả!』 đi chăng nữa」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああいや。すまん。くだらんことを尋ねたのだな、僕は。\nセンスが例えなかろうが、ともかく、試すだけは試すさ」
1846 = "「À không. Anh xin lỗi. Anh hỏi câu ngớ ngẩn rồi.\nDù có khiếu hay không, thì ít nhất anh cũng sẽ thử một lần」"

# 【日々姫】
# display as 日日姬
# JP: 「よねぇ」
1986 = "「Đúng nhỉ」"

# monologue
# JP: はあっと、ため息。\nそして日々姫はゆるゆると、ハチロクを見て、僕を見る。
2842 = "Hibi hít một hơi, thở dài.\nRồi Hibi chậm rãi nhìn Hachiroku, rồi nhìn tôi."

# 【日々姫】
# display as 日日姬
# JP: 「……万が一、兄さんに写真のセンスが無くっても。\n撮ることは、撮るために見ることは、役に立ちます」
2093 = "「……Dù cho anh có không có khiếu chụp ảnh đi chăng nữa.\nViệc chụp ảnh, và nhìn ngắm để chụp, vẫn sẽ rất hữu ích」"

# monologue
# JP: 落ち着いた標準語でそう言って、\n日々姫はさらさら、スケッチブックにペンを走らせる。
2434 = "Nói bằng chất giọng chuẩn mực đầy bình tĩnh,\nHibi lướt cây bút trên tập phác thảo."

# monologue
# JP: あっという間に、僕のスケッチ。\nなんとも、とまどった顔をしている。
2381 = "Trong nháy mắt, bức phác thảo của tôi đã hiện ra.\nTrông tôi đang có vẻ mặt bối rối làm sao."

# 【日々姫】
# display as 日日姬
# JP: 「よく見ることは、ステキを知ること。\nステキを知るのは、大好きになるヒケツですから――」
1732 = "「Nhìn kỹ một thứ chính là biết được sự tuyệt vời của nó.\nBiết được điều tuyệt vời chính là bí quyết để yêu lấy nó――」"

# monologue
# JP: （パシャっ）
2890 = "（Tách）"

# 【ハチロク】
# display as 八六
# JP: 「そ、双鉄様！？\nこのようなところを、お撮りになっても」
2231 = "「Á, Soutetsu-sama!?\nNgài lại chụp vào lúc thế này...」"

# monologue
# JP: 慌てた顔のハチロクへ、カメラを持ったままの手を振る。
2572 = "Tôi vẫy tay vẫn còn cầm chiếc máy ảnh về phía Hachiroku đang bối rối."

# monologue
# JP: 常時携帯を出来るよう、ポーレットの父の遺品の中から、\n一番小さく軽いものを、と借りたカメラを。
2691 = "Chiếc máy ảnh này tôi mượn từ di vật của cha Paulette, \nchọn lấy cái nhỏ và nhẹ nhất để có thể mang theo bên mình mọi lúc."

# 【双鉄】
# display as 雙鐵
# JP: 「大事な整備だ。\n僕のことなど、気にするな」
2159 = "「Đó là khâu bảo trì quan trọng mà.\nĐừng bận tâm về anh làm gì」"

# 【ハチロク】
# display as 八六
# JP: 「は、はい――それは、もちろん左様ですけれど……」
1843 = "\"V-vâng... dĩ nhiên là vậy rồi, nhưng mà...\""

# monologue
# JP: 言いつつ、ハチロクはまた、\x%l8620;#00ffc040;8620%l;#;の\x%l炭水車;#00ffc040;炭水車%l;#;へと身を寄せる。
2836 = "Vừa nói, Hachiroku lại vừa áp sát người vào \\x%l8620;#00ffc040;8620%l;#; của phần \\x%ltoa than;#00ffc040;toa than%l;#;."

# monologue
# JP: \x%lスクレイパー;#00ffc040;スクレイパー%l;#;を操って、油汚れをゴリゴリ落とし始めれば、\nその目はすぐに、作業だけへと集中していく。
2495 = "Một khi đã cầm \\x%ldao cạo;#00ffc040;dao cạo%l;#; lên và bắt đầu cạo sạch những vết dầu mỡ cứng đầu, \\nánh mắt cô ấy lập tức trở nên tập trung cao độ vào công việc."

# monologue
# JP: （なるほど……\n撮るために見る、というのは凄いことだな）
2885 = "(Ra là vậy sao... \\nngắm nhìn để chụp lại, quả thực là một điều tuyệt vời)"

# monologue
# JP: 整備作業をするハチロクは、\n油と煤と熱との中で、薄汚れている印象だったが――
2833 = "Hachiroku khi đang làm công việc bảo trì, \\ntrông có vẻ lấm lem trong đám dầu mỡ, bồ hóng và hơi nóng—"

# monologue
# JP: こうしてまじまじ見てみれば、運転している横顔よりも、\n今のハチロクの姿はむしろ、美しくある。
2389 = "Nhưng khi ngắm nhìn kỹ thế này, dáng vẻ của Hachiroku lúc này \\ncòn đẹp hơn cả lúc cô ấy đang lái tàu."

# monologue
# JP: （そういえば……\n汚れにくい加工をされているという話だったか）
2893 = "(Nhắc mới nhớ... \\nhình như cô ấy từng nói mình được xử lý để khó bám bẩn thì phải)"

# monologue
# JP: 無論、\x%lナッパ服;#00ffc040;ナッパ服%l;#;も、\x%lスクレイパー;#00ffc040;スクレイパー%l;#;の持ち柄もすでに\n煤と油汚れにまみれ、ドロドロだ。
2718 = "Dĩ nhiên, cả \\x%lquần áo bảo hộ;#00ffc040;quần áo bảo hộ%l;#; lẫn cán cầm của \\x%ldao cạo;#00ffc040;dao cạo%l;#; đều đã \\nbám đầy bồ hóng và dầu mỡ, dính dớp cả rồi."

# monologue
# JP: 重苦しさを感じるほどの油汚れの鈍い黒さが、\nハチロクの肌の白さを、闇の中で見る光のように輝かせる。
2497 = "Sắc đen đục của những vết dầu mỡ nặng nề ấy, \\ncàng làm cho làn da trắng ngần của Hachiroku thêm tỏa sáng như ánh sáng giữa đêm tối."

# monologue
# JP: （パシャ）
# 2890 = "（喀嚓）" 

# monologue
# JP: もう一枚。\n今度はハチロクは気づかない。
2432 = "Thêm một tấm nữa. \\nLần này Hachiroku không hề hay biết."

# monologue
# JP: 撮るべきものを撮ってしまえば、\n僕も清掃の手伝いだ。
2804 = "Sau khi đã chụp được những gì cần chụp, \\ntôi cũng tham gia phụ giúp dọn dẹp."

# monologue
# JP: （むわあっ）
2889 = "(Nóng quá)"

# 【双鉄】
# display as 雙鐵
# JP: 「うぉっ」
1759 = "\"Á\""

# monologue
# JP: ボイラー周りに近づけば、\nもうそれだけで汗がぶおりと噴き出してくる。
2454 = "Vừa tiến lại gần khu vực nồi hơi, \\nmồ hôi đã túa ra như suối."

# monologue
# JP: この鉄板の内側で、轟々と石炭を燃やしているのだ。\n熱く、暑いのは当然なのだが――
2506 = "Bên trong lớp vỏ thép này, than đá đang rực cháy dữ dội. \\nNóng bức là điều hiển nhiên, nhưng mà—"

# monologue
# JP: （ぎゅっ――ごしっ――――バチっ！）
2887 = "(Siết chặt――chà xát――tách!)"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1755 = "「Ư！」"

# monologue
# JP: ――煤を取るため、乾いた布で拭き取り続け、\n合間にうっかり肌が触れれば、痛いくらいの静電気。
2783 = "――Để loại bỏ muội than, tôi cứ tiếp tục lau bằng một miếng vải khô,\nnếu sơ ý để da chạm vào nhau giữa chừng, những tia tĩnh điện sẽ đau nhói."

# monologue
# JP: これがあるから、ボイラー周りは人間がやる他に無い。\nわかっているが……それでもやはり、暑く苦しい。
2666 = "Chính vì điều này, khu vực quanh nồi hơi không còn cách nào khác ngoài để con người đảm nhiệm.\nTôi hiểu điều đó nhưng... dù vậy, nó vẫn rất nóng và ngột ngạt."

# monologue
# JP: （しかし、それだからこそ磨き抜くのだ）
2882 = "(Tuy nhiên, chính vì thế mà tôi mới phải mài giũa nó đến cùng)"

# monologue
# JP: 苦しいところの作業ほど、\n手を抜かずやりきることの効果は大きい。
2668 = "Càng là những công việc gian khổ,\nthì hiệu quả của việc không bỏ cuộc mà làm đến cùng lại càng lớn."

# monologue
# JP: そうした細部を積み重ねていくことのみが、\n全体としての美しさを、きっと醸しだすものだろうから。
2744 = "Chỉ có việc tích lũy những chi tiết như thế,\nmới chắc chắn tạo nên vẻ đẹp tổng thể cho toàn bộ máy."

# monologue
# JP: （[ハチロク,3]8620を――こいつを、御一夜の顔にするのだ）
2894 = "(Phải biến 8620――biến em ấy thành bộ mặt của Ohitoyo)"

# monologue
# JP: その一心でともかく磨く。
2585 = "Với tâm niệm đó, tôi cứ thế mà đánh bóng."

# monologue
# JP: \x%l缶胴;#00ffc040;缶胴%l;#;の上へとあがり、煙突まわりも磨き終えれば、\n足裏は熱でしびれたようになり、下りることさえ難しい。
2500 = "Leo lên trên \\x%lthân nồi;#00ffc040;thân nồi%l;#; rồi đánh bóng xong cả khu vực quanh ống khói,\nphần lòng bàn chân tôi đã tê rần vì nóng, đến việc bước xuống thôi cũng thấy khó khăn."

# 【双鉄】
# display as 雙鐵
# JP: 「く、あ――」
1789 = "「Ư, a――」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　お疲れ様です！」
2234 = "「Soutetsu-sama! Anh vất vả rồi ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1794 = "「啊」" 

# monologue
# JP: ハチロクがタオルを両手に掲げて僕を見上げてる。
2408 = "Hachiroku đang cầm khăn giơ lên bằng cả hai tay và ngước nhìn tôi."

# monologue
# JP: 少し離れて、キャブ内清掃を終えたのだろう日々姫の姿。\nスケッチブックを広げてやはり、僕を見ている。
2480 = "Ở cách đó một chút là Hibihime, có lẽ cô bé vừa dọn dẹp xong bên trong cabin.\nCô bé cũng đang mở sổ phác thảo và nhìn tôi."

# monologue
# JP: （こうしたものも、面白いな）
2906 = "(Những thứ thế này cũng thú vị thật)"

# monologue
# JP: カメラを取り出し、パシャリと一枚。\nハチロクは一瞬驚くが、もはや文句を口にはしない。
2601 = "Tôi lấy máy ảnh ra và chụp một tấm. \\nHachiroku giật mình trong giây lát, nhưng giờ đây cô ấy không còn buông lời cằn nhằn nào nữa."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、お疲れ様です」
2235 = "「Soutetsu-sama, anh vất vả rồi ạ.」"

# monologue
# JP: 下りればすぐさま、乾いたタオルと笑顔のお迎え。
2755 = "Vừa xuống tàu, tôi đã được đón chào ngay bằng một chiếc khăn khô và nụ cười rạng rỡ."

# monologue
# JP: 清掃を終えた達成感が、\nそうしてもらうだけでもさらに高まっていく。
2523 = "Cảm giác hoàn thành công việc vệ sinh, \\nchỉ cần được cô ấy chăm sóc như vậy thôi là lại càng dâng trào."

# 【双鉄】
# display as 雙鐵
# JP: 「すまんな」
1673 = "「Xin lỗi em nhé.」"

# monologue
# JP: 受け取るタオルで汗を拭えば、ハチロクはすぐ、\n今度は濡らして絞ったタオルを差し出してくれる。
2455 = "Khi tôi nhận lấy chiếc khăn để lau mồ hôi, Hachiroku lập tức \\nđưa cho tôi một chiếc khăn khác đã được làm ướt và vắt khô."

# 【双鉄】
# display as 雙鐵
# JP: 「く、ああ――生き返るとは、このことだ」
1790 = "「Ư... a, đúng là――được sống lại rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「冷蔵庫でもあれば冷やせるのですが」
2095 = "「Giá mà có tủ lạnh thì em đã có thể làm mát nó rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「機関庫内にか。素晴らしいな、それは。\n大幅黒字を出せるようになったら、要求してみよう」
1836 = "「Ngay trong khoang đầu máy sao? Ý tưởng tuyệt vời đấy. \\nĐợi khi nào chúng ta làm ăn có lãi đậm, anh sẽ đề xuất xem sao.」"

# monologue
# JP: いいつつ、今度はコップを受け取る。
2806 = "Vừa nói, tôi vừa nhận lấy chiếc cốc."

# monologue
# JP: 生ぬるいを超え、湯冷ましほどの熱があっても、\n体にきいんと染み通ってくる。
2670 = "Dù nước đã quá độ ấm, gần như chỉ còn là nước nguội, \\nnhưng nó vẫn thấm đượm vào cơ thể tôi một cách sảng khoái."

# 【双鉄】
# display as 雙鐵
# JP: 「ぷはぁっ！　うまいっ」
1788 = "「Phù! Ngon tuyệt.」"

# 【日々姫】
# display as 日日姬
# JP: 「にぃにぃ、お疲れ様～。\nね、どぎゃんと撮ったん？　見せて見せて」
2220 = "「Nii-nii, anh vất vả rồi ạ~. \\nNè, anh chụp như thế nào vậy? Cho em xem với, cho em xem với.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ。\nええと、画像再生は」
1828 = "「Hửm? À. \\nĐể xem, phát lại hình ảnh thì...」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、そんなちっちゃな液晶じゃなくて」
1799 = "「A, không phải cái màn hình bé tí đó đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「んむ？」
2199 = "「Ừm?」"

# monologue
# JP: スケッチブックがたたまれている。\n日々姫の手には、代わりのように、黒くて薄い――
2739 = "Sổ tay phác thảo đã được gấp lại.\nThay vào đó, trên tay Hibiki lại là một thứ màu đen mỏng manh――"

# 【双鉄】
# display as 雙鐵
# JP: 「タブレット、とか言うヤツか？　それは」
2160 = "「Cái đó, có phải gọi là máy tính bảng không?」"

# 【日々姫】
# display as 日日姬
# JP: 「うん、稀咲先輩の見て、便利そうって――\n私も、お仕事で使うようにしたんよ」
1817 = "「Ừ, em thấy tiền bối Kisaki dùng tiện quá nên――\nEm cũng bắt đầu dùng cho công việc rồi.」"

# monologue
# JP: 普段から、よほど使い込んでいるのだろうか、\n言葉の間にも、日々姫の手指はスイスイ動く。
2725 = "Có lẽ vì thường xuyên sử dụng nên dù đang nói chuyện,\nnhững ngón tay của Hibiki vẫn thoăn thoắt lướt trên màn hình."

# monologue
# JP: カメラから小さなカードを取り出し、\nそれをなにやら、ソケットらしき隙間へと――
2549 = "Lấy chiếc thẻ nhỏ ra khỏi máy ảnh,\nrồi nhét nó vào cái khe trông như ổ cắm――"

# 【ハチロク】
# display as 八六
# JP: 「あっ――わたくし、ですね」
1792 = "「Á――Là em, ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、これは便利なものだな」
1779 = "「Ồ, cái này tiện thật đấy」"

# 【日々姫】
# display as 日日姬
# JP: 「へぇ。やっぱりにぃにぃ、センスあるばい」
1830 = "「Hê. Đúng là anh, có mắt thẩm mỹ thật đấy」"

# monologue
# JP: センス云々はよくわからんが、\n撮りたいと思ったように撮れている。
2574 = "Tôi chẳng hiểu cái gọi là thẩm mỹ đó là gì,\nnhưng tôi đã chụp đúng những gì mình muốn."

# monologue
# JP: 『これがいいんですか？』とポーレットは言っていたが、\nこのカメラ、小さくとも性能は良いものだったようだ。
2850 = "『Anh thấy tấm này thế nào?』Paulette đã hỏi vậy,\nchiếc máy ảnh này tuy nhỏ nhưng hiệu năng có vẻ rất tốt."

# 【ハチロク】
# display as 八六
# JP: 「ずいぶん……たくさんお撮りになられたのですね」
2168 = "「Anh... chụp nhiều quá vậy ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁな」
2171 = "「Ừ thì」"

# monologue
# JP: こうして改めて見せつけられると、\n我ながら、のべつまくなしに撮りまくってる。
2832 = "Khi nhìn lại những bức ảnh này,\nchính tôi cũng thấy mình đã chụp liên tục không ngừng nghỉ."

# monologue
# JP: 試験運転の乗務中には、さすがに一枚も撮っていないが、\n乗務前から今のいままで、それ以外はほぼ、写真で追える。
2485 = "Trong lúc thực hiện chuyến chạy thử, tôi không hề chụp lấy một tấm nào,\nnhưng từ trước khi bắt đầu nhiệm vụ cho đến tận bây giờ, gần như mọi thứ đều được ghi lại qua những bức ảnh."

# 【双鉄】
# display as 雙鐵
# JP: 「1000枚や2000枚は撮れるとのことだったのでな。\n失敗写真は捨てればいいとも聞いていたから――ん？」
2058 = "\"Nghe bảo có thể chụp đến một hoặc hai ngàn tấm nên tôi mới làm vậy. Cũng nghe nói ảnh hỏng thì cứ bỏ đi là được nên—hử?\""

# monologue
# JP: 振り向き見れば、\nハチロクの目が丸くなってる。
2815 = "Quay đầu nhìn lại,\\nĐôi mắt Hachiroku tròn xoe."

# 【双鉄】
# display as 雙鐵
# JP: 「どうしたハチロク」
1910 = "\"Sao thế Hachiroku?\""

# 【ハチロク】
# display as 八六
# JP: 「いえ……時代は本当に変わったのだな、と。今……\n目覚めてから一番強く、感じてしまっただけのことです」
2019 = "\"Dạ... chỉ là em thấy thời đại này thực sự đã thay đổi quá nhiều. Từ lúc... thức tỉnh đến giờ, đây là lần đầu em cảm nhận điều đó rõ rệt đến thế.\""

# 【双鉄】
# display as 雙鐵
# JP: 「時代の変化を――か？」
2004 = "\"Thay đổi của thời đại sao?\""

# 【ハチロク】
# display as 八六
# JP: 「だって、千枚をお撮りになるとか！\n二十四枚でしたのですよ？　一昔まえのフィルムは」
1988 = "\"Bởi vì anh nói sẽ chụp cả ngàn tấm mà!\\nPhim ngày xưa chỉ chụp được có hai mươi bốn tấm thôi đấy ạ.\""

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか。\nハチロクの頃はフィルムを使ったカメラだったのか」
1803 = "\"À... ra là vậy.\\nThời của Hachiroku vẫn còn dùng máy ảnh phim sao?\""

# 【ハチロク】
# display as 八六
# JP: 「[きよみ,1]清美機関士もお写真をお撮りになられましたが――\nピントがどうの[ろしゅつ,1]露出がこうのと、大変でございました」
1693 = "\"Kiyomi-kikanshi cũng từng chụp ảnh cho em—nhưng vì vấn đề lấy nét rồi phơi sáng, mọi thứ thật sự rất vất vả.\""

# monologue
# JP: モデルでもさせられ、\nよほどの苦労をしたのだろうか？
2779 = "Chắc hẳn cô ấy đã phải chịu khổ nhiều khi bị bắt làm người mẫu ảnh nhỉ?"

# monologue
# JP: 苦笑と郷愁が混じったような、なんとも人間くさい表情が、\nハチロクの顔にじんわり浮かぶ。
2420 = "Biểu cảm vừa cười khổ vừa hoài niệm, đầy vẻ nhân tính,\\nchầm chậm hiện lên trên gương mặt Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「その頃の写真は残ってないのか？」
2200 = "\"Những bức ảnh thời đó không còn tấm nào sao?\""

# 【ハチロク】
# display as 八六
# JP: 「さぁ、どうでしょう？　わたくしの手元には一枚も……\n清美機関士がご健在なら、残っているかもしれません」
2156 = "\"Chà, biết sao được ạ? Trong tay em chẳng còn tấm nào...\\nNếu Kiyomi-kikanshi vẫn còn khỏe mạnh, biết đâu vẫn còn giữ chúng.\""

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。できれば見てみたいものだがな――っと」
1813 = "\"Hừm. Nếu được thì tôi cũng muốn xem thử—à mà này.\""

# monologue
# JP: 食いつくような日々姫の視線に、思い出す。
2644 = "Nhớ lại ánh nhìn như muốn ăn tươi nuốt sống của Hibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「そういえば日々姫も」
2110 = "\"Nhắc mới nhớ, Hibiki cũng...\""

# 【日々姫】
# display as 日日姬
# JP: 「うん。私も結構描いたと」
1807 = "「Ừ. Mình cũng đã vẽ khá nhiều rồi đó.」"

# monologue
# JP: 聞けばそそくさ、ハチロクの手にタブレットを預け、\n日々姫は自ら、スケッチブックを広げてくれる。
2753 = "Vừa nghe xong, cô ấy vội vàng trao chiếc máy tính bảng vào tay Hachiroku, rồi chính Hibihime tự mình mở cuốn sổ phác thảo ra."

# 【ハチロク】
# display as 八六
# JP: 「わ……これは……素晴らしいですね」
1763 = "「Oa…… cái này…… thật tuyệt vời ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。すごいな――\nああ……助士側の窓からは、こう見えるのか」
1816 = "「Ừ. Thật đáng kinh ngạc――\nÀ…… thì ra từ cửa sổ phía phụ lái, cảnh vật lại trông như thế này.」"

# monologue
# JP: 場所ならわかる。\n麻霧廃駅少し手前の、なだらかな下り勾配だ。
2508 = "Mình biết chỗ đó. \nLà đoạn dốc thoai thoải ngay trước ga bỏ hoang Makiri."

# monologue
# JP: なるほど、あそこならば給炭を休める――が。\nその数分にこれほど描くとは、いや、相当に凄まじい。
2461 = "Ra là vậy, ở đó thì có thể nghỉ tiếp than――nhưng. \nChỉ trong vài phút ngắn ngủi mà vẽ được đến mức này, không, thật sự là quá khủng khiếp."

# 【ハチロク】
# display as 八六
# JP: 「\x%l運転台;#00ffc040;運転台%l;#;からの景色なども、\n見て喜ばれるものですか？」
1903 = "「\\x%lBuồng lái;#00ffc040;Buồng lái%l;#; từ góc nhìn này, \nngười ta cũng thấy vui khi được ngắm nhìn phải không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1755 = "「呃！」" 

# monologue
# JP: ごく何気ない質問に、\nけれども胸がズキリと痛む。
2383 = "Chỉ là một câu hỏi rất đỗi bình thường, \nnhưng lồng ngực mình lại nhói đau."

# monologue
# JP: が、それを様子に見せぬよう、息を整え心を鎮める。\n無意味な負担を、他の誰にも感じさせぬよう。
2387 = "Nhưng để không lộ vẻ bối rối, mình hít một hơi sâu để bình tâm lại. \nĐể không ai khác phải cảm thấy bất kỳ gánh nặng vô nghĩa nào."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――それはもう。\n小さなころには、なんとしても見てみたいものだった」
1992 = "「À――đúng vậy. \nHồi còn nhỏ, dù thế nào mình cũng khao khát được một lần nhìn thấy nó.」"

# monologue
# JP: 無理そうだなとは感じていても、\n一番前方の\x%l客車;#00ffc040;客車%l;#;からなら、何か見えないかと期待するほど。
2848 = "Dẫu biết là khó lòng làm được, \nnhưng mình vẫn mong chờ xem liệu có thấy được gì không nếu đứng từ toa \\x%lkhách;#00ffc040;khách%l;#; phía trước nhất."

# monologue
# JP: そうして、移動をした結果――\n事故の被害を、きっと大きくしてしまったほど。
2701 = "Để rồi, hệ quả của việc di chuyển đó―― \nchính là thứ đã khiến thiệt hại của vụ tai nạn trở nên nghiêm trọng hơn."

# 【ハチロク】
# display as 八六
# JP: 「でしたら……例えばれいなに同乗してもらうのも\n良いかもしれませんね」
2164 = "「Nếu vậy thì…… ví dụ như nhờ Reina đồng hành cùng, \ncó lẽ cũng là một ý hay đấy ạ.」"

# monologue
# JP: ハチロクのなにげない一言に、\nほっと、救われたような気になる。
2415 = "Chỉ một lời nói vu vơ của Hachiroku, \nmà mình bỗng cảm thấy nhẹ nhõm như được cứu rỗi."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、\x%l運転体;#00ffc040;運転体%l;#;のれいなであれば、\n同乗をしてもらっても、大した窮屈さは感じんな」
1719 = "「Ra là vậy, \nvới Reina ở \\x%lthể điều khiển;#00ffc040;thể điều khiển%l;#;, \nthì việc có thêm người đồng hành cũng chẳng thấy chật chội chút nào.」"

# monologue
# JP: そうして、れいなにカメラ係をしてもらう。
2392 = "Và thế là, anh nhờ Reina phụ trách việc chụp ảnh."

# monologue
# JP: 安全性をいささかも犠牲にすることなしに、\n\x%l運転台;#00ffc040;運転台%l;#;から見える景色を、写真に撮れる。
2483 = "Mà không cần phải hy sinh sự an toàn dù chỉ một chút, anh vẫn có thể chụp lại những khung cảnh nhìn thấy từ \\n\\x%ltoa lái;#00ffc040;toa lái%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「とてもいい考えだと思う」
1945 = "「Anh nghĩ đó là một ý kiến rất hay.」"

# monologue
# JP: そして同時に、嬉しく思う。
2720 = "Và đồng thời, anh cũng cảm thấy rất vui."

# monologue
# JP: “安全は第一の使命”と、\nハチロクは、その考えをいつでも透徹してくれている。
1352 = "“An toàn là sứ mệnh hàng đầu” – \\nHachiroku lúc nào cũng giữ vững tư tưởng đó."

# 【ハチロク】
# display as 八六
# JP: 「では、もう少し習熟したら、\nそのようなことも試してみましょう」
2205 = "「Vậy thì, sau khi em thành thục hơn một chút, \\nchúng ta hãy thử làm việc đó nhé.」"

# monologue
# JP: 言いながら、ハチロクはタブレットを日々姫に返す。
2428 = "Vừa nói, Hachiroku vừa trả lại máy tính bảng cho Hibiki."

# 【日々姫】
# display as 日日姬
# JP: 「ね、にぃに。この写真データ、\nポーレットさんに送っといてよかと？」
1948 = "「Nè, nii-ni. Dữ liệu ảnh này, \\nem gửi cho chị Paulette được không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは無論、かまわんが」
2203 = "「Chuyện đó thì tất nhiên là được rồi, không vấn đề gì.」"

# 【ハチロク】
# display as 八六
