[script]
# lines: 297 
# 【双鉄H】
# display as 雙鐵
# JP: 「すず、念のため塩水を貰えるか？」
1210 = "「Suzu, cho tôi xin chút nước muối để phòng hờ được không?」"
# 【ハチロク】
# display as 鈴
# JP: 「もちろん、用意してございます。\n双鉄様までご病気させるわけにはまいりません」
1166 = "「Tất nhiên là em đã chuẩn bị sẵn rồi ạ.\nKhông thể để cả ngài Soutetsu cũng đổ bệnh được.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ありがとう」
1187 = "「Cảm ơn em.」"
# monologue
# JP: 塩水うがいを済ませて台所へと戻ってみれば、\n下げてきたばかりの食器を、すずは手早く洗い終えてる。
1482 = "Súc miệng bằng nước muối xong và quay lại bếp,\ntôi thấy Suzu đã nhanh nhẹn rửa xong đống bát đĩa vừa dọn xuống."
# 【ハチロク】
# display as 鈴
# JP: 「いかがでした？　真闇様と日々――」
1102 = "「Thế nào rồi ạ? Chị Mayami và Hibi——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「違うぞ。すず。[ねえ,1]義姉さんと日々姫だ」
939 = "「Sai rồi. Suzu. Là chị Mayami và Hibiki.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ」
1052 = "「A.」"
# monologue
# JP: 幸せそうに頬を染め、こほんと小さな咳払い。\nそうしてすずは、素直に呼称をあらためる。
1404 = "Đôi má ửng hồng hạnh phúc, em hắng giọng một cái nhẹ.\nRồi Suzu ngoan ngoãn đổi cách gọi."
# 【ハチロク】
# display as 鈴
# JP: 「いかがでしたか？\nお[ねえ,1]義姉さまと日々姫のご様子は」
1103 = "「Thế nào rồi ạ?\nTình hình của chị Mayami và Hibiki ấy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「熱はすっかり下がったようだ。\n食欲も完全に戻っているな」
1167 = "「Có vẻ đã hạ sốt hẳn rồi.\nCảm giác thèm ăn cũng đã hoàn toàn hồi phục.」"
# 【ハチロク】
# display as 鈴
# JP: 「うふふ、綺麗に食べてくださいましたものね」
1004 = "「Ufufu, mọi người đã ăn rất sạch sẽ mà.」"
# monologue
# JP: 下げた食器は、\n僕まで嬉しくなるほどに、どちらも見事に空っぽだった。
1508 = "Đống bát đĩa dọn xuống,\ncả hai phần đều trống trơn một cách hoàn hảo khiến tôi cũng phải vui lây."
# 【双鉄H】
# display as 雙鐵
# JP: 「ふたりとも、それぞれにすずを褒めていたぞ？\n『完全に、右田の味のおかゆだ』と」
1087 = "「Cả hai người đều khen Suzu đấy nhé?\n『Hoàn toàn là hương vị cháo của nhà Migita』.」"
# 【ハチロク】
# display as 鈴
# JP: 「真闇さ――お義姉さまに教わったレシピどおりです。\nわたくし、味覚にはあまり自信がございませんので」
1113 = "「Chị Mayami——em chỉ làm đúng theo công thức mà chị ấy dạy thôi ạ.\nEm không tự tin lắm vào vị giác của mình.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば僕が味見をさせてもらえばよかったな。\nせっかくのすずの手料理だというのに」
1202 = "「Vậy thì giá như tôi được nếm thử nhỉ.\nBữa ăn do chính tay Suzu nấu cơ mà.」"
# monologue
# JP: 言えば、うふふとすずが微笑む。
1602 = "Nghe tôi nói vậy, Suzu khẽ cười ufufu."
# 【ハチロク】
# display as 鈴
# JP: 「お義姉さまには、\nおかゆの他のレシピも教えていただいておりますよ？」
1177 = "「Em cũng đã được chị Mayami\ndạy cho những công thức nấu ăn khác ngoài cháo rồi đấy ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「おお」
1027 = "「Ồ.」"
# monologue
# JP: 言われてみればコンロの上の鍋からは、\n醤油っぽい、うまそうな匂いがふわり、漂ってくる。
1490 = "Nói mới để ý, từ chiếc nồi trên bếp,\ncó một mùi hương thơm lừng, giống mùi nước tương đang thoang thoảng bay tới."
# 【ハチロク】
# display as 鈴
# JP: 「できたてを食べていただきたく思いますので、\nあとは、煮含めるだけのところまでは仕上がってます」
1120 = "「Vì em muốn ngài được ăn lúc vừa mới nấu xong,\nnên mọi thứ đã chuẩn bị xong xuôi, chỉ chờ ninh cho ngấm gia vị nữa thôi ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「この匂い……そうか、肉じゃがか。\nそういえば、しばらく食べていないな」
1191 = "「Mùi này......ra vậy, là thịt hầm khoai tây à.\nNói mới nhớ, cũng một thời gian rồi tôi chưa ăn món này.」"
# monologue
# JP: 真闇姉、日々姫、ポーレット、ふかみ、稀咲と、\n流感により、立て続けに発熱し、寝込んでしまった。
1545 = "Chị Mayami, Hibiki, Paulette, Fukami, Kisaki,\nđều lần lượt phát sốt và nằm bẹp giường vì cúm."
# monologue
# JP: 僕とすず、凪、れいなとで、周囲の力も借りに借り、\nなんとかかんとかやりくりをして、乗り切ってきたが――
1439 = "Tôi và Suzu, Nagi, Reina đã phải mượn sức của những người xung quanh,\nxoay xở đủ đường mới vượt qua được, nhưng mà——"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄様たちには申し訳ないことに、\n店屋ものが続いてしまいましたものね」
1096 = "「Thật có lỗi với ngài Soutetsu và mọi người,\nvì cứ phải ăn đồ mua ngoài suốt.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「やむを得んことだった――というか、この激務の間に、\nすずはよく、料理までを学んでくれたな。とても嬉しい」
950 = "「Chuyện bất đắc dĩ thôi——mà phải nói là, trong lúc bận rộn tối tăm mặt mũi thế này,\nSuzu vẫn học được cả nấu ăn cơ đấy. Tôi vui lắm.」"
# 【ハチロク】
# display as 鈴
# JP: 「前々から、少しずつお義姉さまに習っていたのです。\nただ、お披露目をする自信がなかなかもてなくて」
1099 = "「Em đã học dần dần từ chị Mayami từ trước rồi ạ.\nChỉ là em chưa đủ tự tin để trổ tài thôi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「なるほど、今回の流感が、\n強制的にその機会を作ってくれたわけか」
975 = "「Ra vậy, đợt cúm lần này\nđã vô tình tạo ra cơ hội đó à.」"
# 【ハチロク】
# display as 鈴
# JP: 「そういうことになりますね」
1136 = "「Đúng là vậy đó ạ.」"
# monologue
# JP: ポーレットが今日から職務復帰を果たせたおかげで、\n僕とすずとは、その分の余裕をもたせてもらえた。
1392 = "Nhờ Paulette đã quay trở lại làm việc từ hôm nay,\nnên tôi và Suzu mới có thêm chút thời gian rảnh rỗi."
# monologue
# JP: 二三日のうちにはみんなも復帰できると、\nお医者様からお墨付きもいただけたし――
1593 = "Bác sĩ cũng đã đảm bảo rằng\ntrong hai ba ngày tới mọi người sẽ bình phục——"
# 【双鉄H】
# display as 雙鐵
# JP: 「皆が倒れてしまったときにはどうなることかと思ったが、\n乗り越えて見れば、災い転じて福となる形となったな」
1131 = "「Lúc mọi người ngã bệnh tôi đã lo không biết sẽ ra sao,\nnhưng vượt qua rồi mới thấy, đúng là trong cái rủi có cái may.」"
# 【ハチロク】
# display as 鈴
# JP: 「福、でございますか？」
1095 = "「Cái may, sao ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そのおかげですずの手料理をいただける。\nこれこそ、紛れも無い福だ」
1144 = "「Ừ, nhờ thế mà tôi mới được thưởng thức đồ ăn Suzu tự nấu.\nĐây chính là cái may không thể chối cãi.」"
# 【ハチロク】
# display as 鈴
# JP: 「そ、そんな――大げさでございますし、気が早いです。\nまだ、仕上がりがどうなるかもわかりませんのに」
1029 = "「L-Làm gì có chuyện đó——ngài nói quá rồi, với lại ngài vội vàng quá.\nVẫn chưa biết thành phẩm sẽ ra sao mà.」"
# monologue
# JP: 照れくさいのだろう。\nすずがふりふり、体を揺する。
1399 = "Chắc là em đang ngại ngùng.\nSuzu khẽ đung đưa cơ thể."
# monologue
# JP: かっぽう着の下から覗く黒と赤とのスカートが、\nすずの足、肌の白さと、膝の丸さとを引き立てる。
1524 = "Chiếc váy màu đen đỏ lấp ló dưới lớp tạp dề nấu ăn,\ncàng làm tôn lên đôi chân, làn da trắng nõn và đầu gối tròn trịa của Suzu."
# monologue
# JP: （ずくんっ）
1686 = "（Thịch）"
# monologue
# JP: ……体が、じわじわ熱くなる。\nすずは、可愛い。狂おしいほど。
748 = "......Cơ thể tôi, dần dần nóng lên.\nSuzu, thật đáng yêu. Đáng yêu đến phát điên."
# monologue
# JP: そうして僕は――いいや、僕らは。\nこの多忙中、ずっとセックスも出来て無かった。
1375 = "Và thế là tôi——không, chúng tôi.\nTrong suốt khoảng thời gian bận rộn này, vẫn chưa làm tình lần nào."
# 【双鉄H】
# display as 雙鐵
# JP: 「すず」
1207 = "「Suzu.」"
# monologue
# JP: （きゅっ）
1729 = "（Ôm）"
# 【ハチロク】
# display as 鈴
# JP: 「そ、双鉄様？」
1221 = "「Ng-Ngài Soutetsu?」"
# monologue
# JP: 予告も無しに抱きつけば、すずは驚いた声を出し――\nけれどもホうっと、幸せそうに僕に体を預けてくれる。
1386 = "Bị ôm bất ngờ không báo trước, Suzu thốt lên kinh ngạc——\nnhưng rồi em thở phào, hạnh phúc ngả người vào vòng tay tôi."
# 【ハチロク】
# display as 鈴
# JP: 「もう少しだけお待ちください。\n火をかけて、お料理をいただきましたら」
967 = "「Xin ngài đợi thêm một chút nữa thôi.\nBật bếp lên, ăn xong bữa cơm rồi chúng ta......」"
# 【双鉄H】
# display as 雙鐵
# JP: 「お料理の前に、すず。僕はお前をいただきたい。\nこんな状態では、せっかくの料理にも集中できない」
953 = "「Trước khi ăn cơm, Suzu. Tôi muốn ăn em.\nTrong tình trạng này, tôi chẳng thể nào tập trung vào bữa ăn được đâu.」"
# monologue
# JP: （ぐりっ）
1732 = "（Cọ xát）"
# 【ハチロク】
# display as 鈴
# JP: 「あっ」
# 1052 = "「啊」" 
# monologue
# JP: 股間を、股間に押し当てる。
1484 = "Tôi ép đũng quần mình vào hạ bộ của em."
# monologue
# JP: ただそれだけのごく単純な刺激にすずは、\n蕩けたような声を出す。
1420 = "Chỉ với một kích thích vô cùng đơn giản đó,\nSuzu đã thốt ra giọng nói như tan chảy."
# 【双鉄H】
# display as 雙鐵
# JP: 「かわいいな。すずは」
960 = "「Đáng yêu quá. Suzu của tôi.」"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄様……あ――んっ――ちゅっ――ちゅむっ――」
1223 = "「Ngài Soutetsu......a——ưm——chụt——chụm——」"
# monologue
# JP: キス。\n唇をついばむだけの。
1452 = "Một nụ hôn.\nChỉ đơn thuần là nhấm nháp đôi môi."
# monologue
# JP: けれどもすぐに、舌と舌。唾液と唾液がまじり始める。
1347 = "Nhưng ngay lập tức, lưỡi và lưỡi. Nước bọt và nước bọt bắt đầu hòa quyện."
# 【ハチロク】
# display as 鈴
# JP: 「は……んっ――ちゅうっ――れろっ――じゅっ――\nチュルッ――ちゅううっ――はむっ――こくっ」
753 = "「Hà......ưm——chụt——liếm——chụt——\nchụt——chùttt——ngấu——ực」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……ん。ふぅ。\nすずの唇は、最高のオードブルだ」
756 = "「......Ưm. Phù.\nMôi của Suzu, đúng là món khai vị tuyệt hảo nhất.」"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄、様……ん……ちゅるっ」
1224 = "「Ngài Soutetsu......ưm......chụt」"
# monologue
# JP: 口の端からたれかけたよだれをすすり上げ、\nその瞬間に、すずはハっと、何かに気づいた顔になる。
1408 = "Hút lấy vệt nước bọt sắp rỉ ra từ khóe miệng,\nđúng lúc đó, Suzu giật mình, khuôn mặt lộ vẻ nhận ra điều gì đó."
# 【ハチロク】
# display as 鈴
# JP: 「でも……あの……お[だいどこ,1]台所ですよ？\nお台所で、このようなこと」
957 = "「Nhưng mà......chỗ này......là nhà bếp đấy ạ?\nLàm chuyện này, ở trong bếp thì......」"
# 【双鉄H】
# display as 雙鐵
# JP: 「お台所は、セックスの主要な舞台の一つだ。\nすずの勉強にはなかったか？　裸エプロンというものが」
1092 = "「Nhà bếp là một trong những sân khấu chính của tình dục mà.\nSuzu chưa từng học qua sao? Cái gọi là tạp dề khỏa thân ấy.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ！　ございました、裸エプロン。なるほど、確かに、\nあの格好の方々は、お台所でセックスをされてましたね」
1059 = "「A! Có ạ, tạp dề khỏa thân. Ra là vậy, quả thực,\nnhững người mặc bộ dạng đó, đều làm tình trong bếp nhỉ.」"
# monologue
# JP: 納得をしてくれたのだろう。\nすずは静かに、深く頷く。
1589 = "Có lẽ em đã bị thuyết phục.\nSuzu im lặng, gật đầu thật sâu."
# 【ハチロク】
# display as 鈴
# JP: 「左様でしたか。裸エプロンのセックスも、\n妻の務め――大事な大事な、お台所仕事だったのですね」
1192 = "「Thì ra là vậy. Làm tình với tạp dề khỏa thân,\ncũng là nghĩa vụ của người vợ——là công việc bếp núc vô cùng quan trọng nhỉ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや、そこまでは言わんが」
1114 = "「Không, tôi đâu có nói đến mức đó.」"
# 【ハチロク】
# display as 鈴
# JP: 「ああ、ですが双鉄様！」
1023 = "「A, nhưng mà ngài Soutetsu!」"
# monologue
# JP: 切羽詰まったような声。\nそうしてすずはそのままに、自分の体に視線を落とす。
1398 = "Giọng nói như thể đang rất bối rối.\nRồi Suzu cứ thế cúi nhìn xuống cơ thể mình."
# 【ハチロク】
# display as 鈴
# JP: 「けれどもわたくし、ただの割烹着姿ですよ？\n裸エプロンのように、セックスのための衣装では――」
958 = "「Nhưng em, chỉ đang mặc tạp dề bình thường thôi mà?\nĐâu phải trang phục dành cho việc làm tình như tạp dề khỏa thân——」"
# 【双鉄】
# display as 雙鐵
# JP: 「着飾ったすずも可愛らしいが、僕が一番好きなのは、\n僕の日常の中に、そのまま居る、居てくれるすずだ」
1175 = "「Suzu ăn diện cũng rất đáng yêu, nhưng điều tôi thích nhất,\nlà một Suzu cứ như vậy, hiện diện trong cuộc sống thường ngày của tôi.」"
# monologue
# JP: （さすっ）
1737 = "（Vuốt ve）"
# monologue
# JP: 割烹着の隙間から手を入れる。
1487 = "Tôi luồn tay qua khe hở của chiếc tạp dề."
# monologue
# JP: 肌を、ではなく、割烹着のすぐ下にある、\nいつものすずの制服を、ゆっくりゆっくり撫で回す。
1468 = "Không phải chạm vào da thịt, mà là từ từ, chầm chậm vuốt ve\nbộ đồng phục thường ngày của Suzu ngay bên dưới lớp tạp dề."
# monologue
# JP: （さすっ――さわっ――ふにっ――もみゅ――）
1740 = "（Vuốt ve——chạm nhẹ——nắn——xoa——）"
# 【ハチロク】
# display as 鈴
# JP: 「あ……嬉しい、です。双鉄、様っ」
1049 = "「A......em vui lắm. Ngài Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すず……」
1206 = "「Suzu......」"
# monologue
# JP: （ふわっ）
1685 = "（Nhẹ nhàng）"
# 【ハチロク】
# display as 鈴
# JP: 「あ――」
1030 = "「A——」"
# monologue
# JP: 一番下から、大きくスカートを捲り上げる。
1464 = "Tôi tung vạt váy lên thật cao từ tận dưới cùng."
# 【双鉄H】
# display as 雙鐵
# JP: （おお）
1698 = "（Ồ）"
# monologue
# JP: すずに似合いの純白だが、\n横が紐になっている、かなりセクシーな下着を履いてる。
1358 = "Tuy là màu trắng tinh khôi rất hợp với Suzu,\nnhưng lại là kiểu đồ lót buộc dây hai bên khá gợi cảm."
# monologue
# JP: ならば、すずも――\n今夜ようやく、と期待をしてくれていたのだろう。
1538 = "Nếu vậy thì, Suzu cũng——\nchắc hẳn đã rất mong chờ đêm nay."
# 【双鉄H】
# display as 雙鐵
# JP: 「本当にかわいいな、お前は」
962 = "「Em thật sự rất đáng yêu đấy.」"
# monologue
# JP: （さすっ――）
1736 = "（Vuốt ve——）"
# 【ハチロク】
# display as 鈴
# JP: 「あ……双鉄、様ッ――」
1050 = "「A......Ngài Soutetsu——」"
# monologue
# JP: （さすっ――さすっ――こしゅっ――くりゅっ）
1735 = "（Vuốt ve——vuốt ve——cọ xát——miết）"
# 【ハチロク】
# display as 鈴
# JP: 「や……パンツの、上から、なのに――んっ――はっ――やっ――そんなに優しく――クリトリ、ス――っ！」」
992 = "「A......mặc dù, cách lớp quần lót——ưm——hà——á——mà ngài lại nhẹ nhàng như vậy——âm, vật——!」」"
# monologue
# JP: すずの場所なら、覚えてる。
1494 = "Chỗ nhạy cảm của Suzu, tôi vẫn luôn nhớ."
# monologue
# JP: クリトリスを優しく優しくなでなでしてから、\n縦筋にパンツを食い込ませるよう、指を動かす。
1522 = "Sau khi dịu dàng mơn trớn âm vật,\ntôi cử động ngón tay, ấn chiếc quần lót lún sâu vào rãnh dọc."
# monologue
# JP: （すにっ――しゅくっ――くいっ――ちゅくんっ）
1734 = "（Xoa——miết——nhấn——chụt）"
# 【ハチロク】
# display as 鈴
# JP: 「は――あっ――はずかし――おつゆ――\nしみ、ちゃうっ――わたくし、こんなにっ――」
1018 = "「Hà——a——xấu hổ quá——dịch nhờn——\nthấm ra mất——em, lại thế này——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、とろとろだな。すっかり出来上がってるようだ」
1139 = "「Ừ, ướt sũng rồi. Có vẻ như em đã hoàn toàn sẵn sàng.」"
# monologue
# JP: （しゅるっ）
1731 = "（Tuột）"
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ」
1011 = "「Phù」"
# monologue
# JP: 紐をほどけば、パンツが落ち――ず、\n股間に一瞬張り付き、落ちる。
1493 = "Vừa cởi dây buộc, chiếc quần lót không rơi xuống ngay——\nmà dính chặt vào đũng quần một thoáng, rồi mới rơi xuống."
# 【ハチロク】
# display as 鈴
# JP: 「やあっ！？　恥ずかしいっ、わたくし――こんなっ――\nんふっ！！？」
995 = "「Á!? Xấu hổ quá, em——thế này——\nưm hứ!!?」"
# monologue
# JP: （くちゅううううっっ）
1691 = "（Nhóp nhép）"
# 【双鉄H】
# display as 雙鐵
# JP: 「照れることはない。\n僕を求めて、これほど濡らしてくれたのだろう？」
969 = "「Không có gì phải xấu hổ cả.\nEm khao khát tôi, nên mới ướt át đến mức này đúng không?」"
# 【ハチロク】
# display as 鈴
# JP: 「は、はい、左様です――んっ――わたくし――だって、\nずっと、忙しくて――双鉄さまの、おちん、ちんっ――」
1133 = "「V-Vâng, đúng vậy ạ——ưm——em——tại vì,\ndạo này cứ bận rộn suốt——dương, vật của ngài Soutetsu——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな。だから、僕もこんなになっている」
1142 = "「Đúng vậy. Thế nên, tôi cũng trở nên thế này rồi.」"
# monologue
# JP: （ぐいっ）
1693 = "（Thúc）"
# 【ハチロク】
# display as 鈴
# JP: 「あ……熱い……です。それに――んっ――\nいつも、より――ふぁっ――硬い、みたい、でっ」
1089 = "「A......nóng quá......ạ. Với lại——ưm——\ncó vẻ——phù——cứng hơn, mọi khi, ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すずは、いつもより柔らかだな」
1208 = "「Suzu thì, mềm mại hơn mọi khi đấy.」"
# monologue
# JP: （しにゅっ――こしゅっ――すりっ――すりゅん――）
1733 = "（Miết——cọ xát——vuốt——trượt——）"
# monologue
# JP: 膣には、あえて指を挿れない。\nたっぷり蜜を絡ませて、ゆっくりゆっくり動かしていく。
1444 = "Tôi cố tình không đưa ngón tay vào âm đạo.\nĐể ngón tay thấm đẫm mật ngọt, rồi chầm chậm, chầm chậm di chuyển."
# 【ハチロク】
# display as 鈴
# JP: 「あ……いい、です――双鉄、さまっ――おてて、\nゆっくり、で――優しく、て――ふっ――あっ――え？」
1047 = "「A......thích, quá——ngài, Soutetsu——bàn tay ngài,\nthật chậm rãi——thật dịu dàng——phù——a——hả?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すず？」
1211 = "「Suzu?」"
# monologue
# JP: すずが、戸惑った顔になってる。\n体も固くなってしまう。
1596 = "Suzu lộ vẻ bối rối.\nCơ thể cũng trở nên cứng đờ."
# 【ハチロク】
# display as 鈴
# JP: 「あ、あの……双鉄様？　わたくし、そのっ」
1063 = "「A, dạ......ngài Soutetsu? Em, chuyện đó.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、かまわんさ。\nこのまま、一度イってしまった方がいい」
1054 = "「À, không sao đâu.\nCứ thế này, em lên đỉnh một lần trước cũng tốt.」"
# monologue
# JP: （くぱっ）
1738 = "（Mở rộng）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ！？　あっ――そうではなく――んひゅっ！？」
1000 = "「Á!? A——không phải vậy——ưm hứ!?」"
# monologue
# JP: （くちっ――くにっ――くりゅ――こしゅっ！）
1687 = "（Nhóp nhép——ấn——miết——cọ xát!）"
# monologue
# JP: すずのおまんまんを広げたままに、中指を使い、\nクリトリスから膣口までを本格的に攻めていく。
1462 = "Tôi dùng ngón giữa giữ cho cô bé của Suzu mở rộng,\nrồi bắt đầu tấn công dồn dập từ âm vật xuống đến cửa mình."
# monologue
# JP: （ちゅっ！　ちゅくっ！　くりゅっ！　こしゅっ）
1709 = "（Chụt! Chụt! Miết! Cọ xát）"
# 【ハチロク】
# display as 鈴
# JP: 「あ！　あっ！　ダメ、ですっ――双鉄――さまっ」
1057 = "「A! A! Không, được đâu——ngài Soutetsu——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「今さら、何を照れているのだ」
952 = "「Đến nước này rồi, em còn ngại ngùng gì nữa.」"
# monologue
# JP: （こしゅっ）
1688 = "（Cọ xát）"
# 【ハチロク】
# display as 鈴
# JP: 「んひっ――あっっ！？　だ、ダメっ――んふうっ」
1074 = "「Ưm hí——á!? Kh-Không được——ưm hự」"
# monologue
# JP: 可愛い包皮の上からゆるり、\nクリトリスを優しくコスってあげる。
1498 = "Từ bên trên lớp bao quy đầu nhỏ nhắn đáng yêu,\ntôi nhẹ nhàng chà xát âm vật của em."
# 【ハチロク】
# display as 鈴
# JP: 「違う、のです――あっ――今、は――そのっ――んっ！\nどうか――指っ――お手、をっ――お離し、くださいっ」
941 = "「Không phải, vậy đâu——a——bây giờ, thì——chuyện đó——ưm!\nXin ngài——hãy rút ngón tay——rút tay ra, đi ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だが、こんなにもヒクついてるぞ？\nこのまま指を離してはさぞ切なかろう」
947 = "「Nhưng mà, chỗ này đang giật liên hồi thế này cơ mà?\nCứ thế rút ngón tay ra chắc em sẽ hụt hẫng lắm.」"
# monologue
# JP: （こしゅっ、くちゅっ――くにゅっ、すりゅっ）
1690 = "（Cọ xát, nhóp nhép——ấn, miết）"
# monologue
# JP: 膣口はわななき甘えまくって、\n指先に蜜をすりつけてくる。
1618 = "Cửa âm đạo run rẩy như đang nũng nịu,\nkhông ngừng bôi mật ngọt lên đầu ngón tay tôi."
# monologue
# JP: そこの蜜を指でたっぷりと、\n尿道口の上をなぞって、クリトリスにまで伸ばしてあげる。
1480 = "Tôi dùng ngón tay quệt đầy thứ mật ngọt đó,\nvuốt dọc qua lỗ niệu đạo, rồi kéo dài lên tận âm vật."
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ――あっ、そ、それは――そう、なのっ――\nあひっ！？　んっ、ひっ――あっ――ダメ、もうっ」
1008 = "「Phù——a, c-cái đó——như thế, là——\ná!? Ưm, hí——a——không được, mất thôi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ダメじゃないさ。\n僕も、すずのイクところを見たい」
1154 = "「Không có gì là không được cả.\nTôi cũng muốn nhìn thấy dáng vẻ lúc Suzu lên đỉnh.」"
# monologue
# JP: （くりゅんっ！！）
1694 = "（Miết mạnh!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ふああああああああああああっ！！！\nあっ！？――ダメっ――やっ――――あ、ああっ……」
1010 = "「Phù a a a a a a a a a a a a a!!!\nA!?——Không được——á————a, aa......」"
# monologue
# JP: （ちゅろっ――ちょおおおおおっ！）
1706 = "（Chụt——róc rách!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「え？」
1026 = "「Hả?」"
# monologue
# JP: 生温かい雫がすずの尿道口から次々溢れる。
1523 = "Những giọt chất lỏng âm ấm liên tục tuôn ra từ lỗ niệu đạo của Suzu."
# monologue
# JP: と、いうか――\nあれ？　これは……
1336 = "Cơ mà——\nỦa? Đây là......"
# 【ハチロク】
# display as 鈴
# JP: 「や……ごめんなさいっ――ごめんな、さいっ――\nわ、わたくし――粗相――そそうを、してっ――んうっ」
759 = "「Á......em xin lỗi——em xin, lỗi——\ne-em——đã tè dầm——tè dầm mất rồi——ưm.」"
# monologue
# JP: （ちょおおおおお）
1702 = "（Róc rách）"
# monologue
# JP: おもらし、だ。\nすずはイきながらおもらししてる。
1395 = "Là tè dầm.\nSuzu vừa lên đỉnh vừa tè dầm."
# monologue
# JP: 目のフチにいっぱいの涙をためて、\nいやいやと、赤子のように首を振ってる。
1414 = "Khóe mắt đong đầy nước,\nem lắc đầu nguầy nguậy như một đứa trẻ."
# 【ハチロク】
# display as 鈴
# JP: 「わたくし、トップナンバーなのに――みんなの[きはん,1]規範と\nなるべきなのに――おまんまん、指でこしこしされてっ」
1122 = "「Em, rõ ràng là toa xe dẫn đầu——đáng lẽ phải làm tấm gương cho mọi người——\nthế mà, chỉ bị ngón tay chà xát cô bé thôi đã.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「慌てるな、すず」
944 = "「Đừng hoảng, Suzu.」"
# monologue
# JP: 落ち着かせたくて、ただそうしたくて。\n長い黒髪に鼻をうずめるように、囁く。
1441 = "Tôi muốn làm em bình tĩnh lại, chỉ muốn làm vậy thôi.\nVùi mũi vào mái tóc đen dài của em, tôi thì thầm."
# 【双鉄H】
# display as 雙鐵
# JP: 「[きはん,1]規範も何も、今のお前は、ただの女だ。\nこんな姿を見るのも、世界で一人、僕だけだ」
943 = "「Tấm gương gì chứ, em bây giờ, chỉ là một người phụ nữ thôi.\nVà người nhìn thấy dáng vẻ này của em, trên thế giới này, cũng chỉ có một mình tôi.」"
# 【ハチロク】
# display as 鈴
# JP: 「あ……は……ぁっ……双鉄、様っ」
1045 = "「A......hà......a......ngài Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だから――もっと良く見せてくれ」
1124 = "「Vì thế——hãy cho tôi nhìn kỹ hơn đi.」"
# monologue
# JP: （くっ）
1713 = "（Ưm）"
# 【ハチロク】
# display as 鈴
# JP: 「ふやっ！？　あっ！　だめっ――押したら――\nんっ――もっと――あっ、ふあっ――んんん～～～っ」
1064 = "「Phù á!? A! Không được——nếu ấn vào——\nưm——nữa——a, phù a——ưm ưm~~~」"
# monologue
# JP: （ぴゅるっ――ぴゅろっ――）
1717 = "（Phụt——phụt——）"
# monologue
# JP: 尿道口から出てきたものの、\n透き通った色をしてるし、匂いもしない。
1430 = "Mặc dù chảy ra từ lỗ niệu đạo,\nnhưng nó lại có màu trong suốt và không hề có mùi."
# monologue
# JP: というか、確か。\nすずの構造上――
1585 = "Nói đúng hơn thì, chắc chắn là vậy.\nDựa trên cấu tạo cơ thể của Suzu——"
# 【双鉄H】
# display as 雙鐵
# JP: 「泣くな、すず」
968 = "「Đừng khóc, Suzu.」"
# monologue
# JP: （ちゅっ）
1710 = "（Chụt）"
# 【ハチロク】
# display as 鈴
# JP: 「あ……」
1041 = "「A......」"
# monologue
# JP: 目のフチにそっと唇をつけ、\nすずの涙を掬って味わう。
1491 = "Tôi khẽ đặt môi lên khóe mắt,\nhứng lấy và nhấm nháp những giọt nước mắt của Suzu."
# monologue
# JP: そして、どろどろになった指先を――
1627 = "Và rồi, với những ngón tay đã ướt sũng nhầy nhụa——"
# monologue
# JP: （ぺろっ）
1745 = "（Liếm nhẹ）"
# 【ハチロク】
# display as 鈴
# JP: 「え！？　あっ――双鉄、さまっ――なめっ――」
1025 = "「Hả!? A——Ngài Soutetsu——liếm——」"
# monologue
# JP: （れろっ――れるっ――しゃぶっ――こくんっ）
1743 = "（Liếm——mút——mút——ực）"
# 【ハチロク】
# display as 鈴
# JP: 「あっ――お飲み……くださった――\n双鉄様が――双鉄様、わたくしの――お小、水」
1035 = "「A——ngài đã uống......mất rồi——\nNgài Soutetsu——Ngài Soutetsu, đã uống nước, tiểu——của em.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「お小水とは言うが、これは真水だろう」
1220 = "「Nói là nước tiểu, nhưng cái này là nước tinh khiết mà.」"
# 【ハチロク】
# display as 鈴
# JP: 「は……い。その、成分的には――\n使い切れなかった蒸気を冷却還元した排水ですので」
757 = "「Vâng......ạ. Thành phần của nó thì——\nlà nước thải từ hơi nước chưa dùng hết được làm lạnh và hoàn nguyên.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だよな。雑味も混じらぬし。\nこれは、上質なものだと思うぞ」
1138 = "「Đúng vậy nhỉ. Chẳng lẫn chút tạp chất nào.\nTôi nghĩ đây là thứ nước hảo hạng đấy.」"
# 【ハチロク】
# display as 鈴
# JP: 「上質……わたくしの――お小水、が」
936 = "「Hảo hạng......nước tiểu——của em, sao.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すず？」
# 1211 = "「鈴？」" 
# 【ハチロク】
# display as 鈴
# JP: 「はい、双鉄様」
1149 = "「Vâng, thưa ngài Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「！？」
1229 = "「!?」"
# monologue
# JP: どこで、何の、スイッチを押してしまったのだろうか。
1624 = "Tôi đã lỡ ấn phải công tắc gì, ở đâu vậy chứ."
# monologue
# JP: いつもと同じ返事であるのに、\n初めて耳にするような、濃厚な色気に満ち満ちている。
1410 = "Vẫn là câu trả lời như mọi khi,\nnhưng lại ngập tràn sắc dục nồng đậm, như thể lần đầu tiên tôi được nghe."
# 【ハチロク】
# display as 鈴
# JP: 「あの……わたくし――\nもう少し、だけ……残ってる感じが、あるのです」
1199 = "「Dạ......em——\ncảm giác, vẫn còn đọng lại......một chút xíu nữa ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「残ってる？」
974 = "「Vẫn còn đọng lại?」"
# monologue
# JP: （ぐっ）
1695 = "（Ưm）"
# 【双鉄H】
# display as 雙鐵
# JP: 「！」
1228 = "「!」"
# monologue
# JP: すずがおしりを丸出しのまま、\n流し台へと体を折ってもたれかかる。
1603 = "Suzu cứ thế để lộ hoàn toàn cặp mông,\ngập người tựa vào bồn rửa chén."
# monologue
# JP: まあるいお尻が、ほかほかにとろけるおまんまんが、\nぷりゅん、と可愛く突き出される。
1388 = "Cặp mông tròn trịa, cô bé nóng hổi mềm nhũn,\nđang chu ra một cách đáng yêu."
# 【ハチロク】
# display as 鈴
# JP: 「ですので……その……もしよろしければ、\n双鉄様、に」
1127 = "「Vì vậy......chuyện đó......nếu ngài không phiền,\nxin ngài Soutetsu, hãy......」"
# monologue
# JP: もじもじ、可愛くおしりが振られる。\nなるほど、わかった。
1405 = "Cặp mông khẽ đung đưa nũng nịu một cách đáng yêu.\nRa là vậy, tôi hiểu rồi."
# monologue
# JP: あからさますぎるほど僕を誘ってるポーズだが、\nねだられてるのは、挿入というわけじゃない。
1621 = "Một tư thế mời gọi tôi lộ liễu đến mức không thể rõ ràng hơn,\nnhưng thứ em đang đòi hỏi, không phải là đút vào."
# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ。[じか]直に味わわせていただこう」
1155 = "「Tất nhiên rồi. Hãy để tôi trực tiếp thưởng thức nhé.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい！」
1147 = "「Vâng ạ!」"
# monologue
# JP: 嬉しげな声。\nすずの期待に背かぬように――
1554 = "Một giọng nói đầy vẻ vui sướng.\nĐể không phụ lòng mong mỏi của Suzu——"
# monologue
# JP: （ちゅうっ）
1704 = "（Chụt）"
# 【ハチロク】
# display as 鈴
# JP: 「あっ――おくちっ――んっ――双鉄さまの、おくちが\n――ぴったり――おまんまん、にっ」
1037 = "「A——miệng ngài——ưm——miệng của ngài Soutetsu\n——đang áp sát——vào cô bé của em.」"
# monologue
# JP: むわりと熱い。\nおまんまん蜜がもう、口内にとろり流れ込んでくる。
1541 = "Hơi nóng bốc lên ngùn ngụt.\nMật ngọt từ cô bé đã chảy róc rách vào trong khoang miệng tôi."
# monologue
# JP: が、今僕が飲むべきものは、それじゃない。
1351 = "Nhưng, thứ tôi cần uống lúc này, không phải là nó."
# monologue
# JP: （とん、とん）
1742 = "（Gõ nhẹ, gõ nhẹ）"
# monologue
# JP: 舌先で軽くノックをすれば、\nすずのおまんまんはピクピク動く。
1376 = "Chỉ cần gõ nhẹ bằng đầu lưỡi,\ncô bé của Suzu liền giật giật liên hồi."
# 【ハチロク】
# display as 鈴
# JP: 「ひあっ！　あっ――せ、せかさないでくださいましっ」
1013 = "「Á! A——x-xin ngài đừng hối thúc em mà.」"
# monologue
# JP: まともなことを言う声は、けれども上ずり発情してる。\nそれほどまでに、すずが興奮してい――っ！！？
1416 = "Giọng nói thốt ra những lời đàng hoàng, nhưng lại cao vút lên vì phát tình.\nĐến mức đó sao, Suzu đang hưng phấn đến thế——!!?"
# monologue
# JP: （ちょろっ――ちょっ――ちょおおおおっ）
1697 = "（Róc rách——róc——róc rách!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？」
# 1229 = "「！？」" 
# monologue
# JP: もう少しだけ、と聞いたはずだが、\n結構な量の排水尿が僕の口へと注がれてくる。
1415 = "Rõ ràng em bảo là chỉ còn một chút xíu nữa thôi,\nnhưng một lượng lớn nước tiểu thải lại đang trút thẳng vào miệng tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「んぶっ――ングッ――ごくっ――こくっ」
1076 = "「Ưm——ừng ực——ực——ực」"
# monologue
# JP: ダイレクトに口を叩かれてみると、\nぬるいというより、むしろ熱い。
1590 = "Bị dội trực tiếp vào miệng thế này,\nthay vì nói là âm ấm, thì đúng hơn là nóng hổi."
# monologue
# JP: ただの濾過水であるはずなのに、\n飲めば飲むほど、体の芯が燃え盛るように熱くなる。
1515 = "Đáng lẽ chỉ là nước lọc thôi,\nnhưng càng uống, tận sâu trong cơ thể tôi càng nóng rực lên như thiêu như đốt."
# 【双鉄H】
# display as 雙鐵
# JP: 「ごくっ――ん――ぷっ――」
1069 = "「Ực——ưm——phù——」"
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ――あっ―あ……ああっ――\nわたくし――お小水――双鉄、様――にっ――んっ！」
1006 = "「Phù a——a——a......aa——\nem——đã tiểu——vào ngài, Soutetsu——mất rồi——ưm!」"
# monologue
# JP: （ぴゅ、るっ――ぴゅっ――）
1720 = "（Phụt, phụt——phụt——）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……くっ――――ぷああっ！」
1070 = "「Ưm......ưm————phù a!」"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄様が……全部……一滴も、残さずに――\nあっ……あっ――ふああああああんんんっ！！？」
1222 = "「Ngài Soutetsu......đã uống hết......không chừa lại, một giọt nào——\nA......a——phù a a a a a ưm ưm!!?」"
# monologue
# JP: ぶるりと、大きく大きくすずが震える。
1604 = "Suzu rùng mình, run rẩy dữ dội."
# monologue
# JP: 膣口がやらしく可愛くひくついて、\nとろりと濃い目の蜜がそこからこぼれだしてくる。
1619 = "Cửa âm đạo giật giật một cách dâm đãng và đáng yêu,\nnhững giọt mật đặc sệt đang rỉ ra từ đó."
# monologue
# JP: （おしっこを飲まれて……\nただそれだけで、イッたのか？）
1747 = "（Chỉ vì bị uống nước tiểu......\nmà em ấy đã lên đỉnh sao?）"
# monologue
# JP: なんだか圧倒されてしまって、\n同時に――素直に羨ましくなる。
1478 = "Chẳng hiểu sao tôi lại cảm thấy bị choáng ngợp,\nđồng thời——thực sự cảm thấy ghen tị."
# monologue
# JP: 勃起がビクビク身悶えし、\n早く早くと催促してくる。
1555 = "Cậu bé cương cứng đang giật nảy lên vì bứt rứt,\nliên tục thúc giục tôi nhanh lên, nhanh lên nữa."
# 【双鉄H】
# display as 雙鐵
# JP: 「すず――今度は、僕と一緒に」
1205 = "「Suzu——lần này, hãy cùng lên đỉnh với tôi nhé.」"
# 【ハチロク】
# display as 鈴
# JP: 「あっ――少しだけ、お待ちください――\nわ、わたくし――いま、そのっ――」
1039 = "「A——xin ngài, đợi một chút——\ne-em——bây giờ, chuyện đó——」"
# monologue
# JP: だが、待たない。\nというか、待てない。
1528 = "Nhưng, tôi không đợi nữa.\nĐúng hơn là, không thể đợi được nữa."
# monologue
# JP: 勃起をズボンから取り出した――\nその瞬間には、挿入してる！
1472 = "Vừa lôi cậu bé đang cương cứng ra khỏi quần——\nngay khoảnh khắc đó, tôi đã đút vào rồi!"
# 【ハチロク】
# display as 鈴
# JP: 「んひゅっ！？　ふあっ！？　ああああああああんっ！」
1073 = "「Ưm hứ!? Phù a!? A a a a a a a a a a!」"
# monologue
# JP: びくんびくんとすずが大きく体を揺らし、\nきゅんきゅんと、おまんまんが僕を激しく絞る！
1600 = "Suzu nảy lên từng hồi, cơ thể lắc lư dữ dội,\ncô bé siết chặt lấy tôi một cách mãnh liệt!"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1228 = "「！」" 
# monologue
# JP: （ずぶっ！　ジュブっ！　ばちゅっ！　ぱちゅんっ！！）
1681 = "（Phập! Phập! Bạch! Bạch!!）"
# 【ハチロク】
# display as 鈴
# JP: 「やっ！？　らめっ――れふっ――わらひっ――\nイって――イッてる――のっ――は、んふうううううっ」
998 = "「Á!? Không——được——em——\nđang——đang lên đỉnh——mà——hà, ưm hư ư ư ư ư ư」"
# monologue
# JP: （ずばっ！　じゅっ！　じゅるっ！　じゅばっ！！）
1701 = "（Phập! Phập! Chụt! Phập!!）"
# monologue
# JP: 腰が貪る。
1565 = "Hông tôi tham lam ra vào."
# monologue
# JP: わななきまくるすずの膣を、突いて、抉って\n思うがままにおもいっきりに味わいつくす。
1474 = "Đâm chọc, khoét sâu vào âm đạo đang run rẩy liên hồi của Suzu,\ntôi thỏa sức tận hưởng em theo ý muốn của mình."
# 【ハチロク】
# display as 鈴
# JP: 「はっ――あっ！　くっ――ごツンッ――て、\nしきゅ――うっ――ひっ――強っ――しゅ、ごっ」
1020 = "「Hà——a! Ưm——đâm mạnh——vào,\ntử cung——ưm——hí——mạnh quá——sướng, quá.」"
# monologue
# JP: 今までに無い強さと深さで、\nすずの子宮の入り口の戸をノックしている。
1448 = "Với sức mạnh và độ sâu chưa từng có từ trước đến nay,\ntôi đang gõ cửa lối vào tử cung của Suzu."
# monologue
# JP: すずの最奥に僕の体液と熱とをぶつけ、\n染み込ませながら刻印していく。
1457 = "Bắn chất lỏng và hơi nóng của tôi vào nơi sâu nhất của Suzu,\nvừa để nó ngấm vào, vừa khắc sâu dấu ấn của mình."
# 【ハチロク】
# display as 鈴
# JP: 「んっ――あっ――しきゅう――れっ――\nごつん――って、ごつんて、されて――んふうううっっ」
1067 = "「Ưm——a——tử cung——bị——\nđâm mạnh——bị đâm mạnh vào——ưm hư ư ư ư ư」"
# monologue
# JP: ほとんど半泣きになりながら、\nすずがまた大きく大きく体を震わ――っ！
1401 = "Gần như sắp khóc nấc lên,\nSuzu lại một lần nữa run rẩy dữ dội——!"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっ！」
1078 = "「Ưm!」"
# monologue
# JP: （びゅぶっっ！　びゅるっ！　びゅるっ！　びゅうっ！）
1725 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「あっ――来たっ――んっ！　やっ――あっ――\n精液っ――重、いっ――これ――しゅご――っ！！」
1031 = "「A——đến rồi——ưm! Á——a——\ntinh dịch——nặng, quá——thế này——sướng quá——!!」"
# monologue
# JP: すずが背中を弓なりにして、\nそれからくったり――
1598 = "Suzu uốn cong lưng như một cây cung,\nrồi rũ rượi——"
# monologue
# JP: （がしっっ！）
1726 = "（Chộp lấy!）"
# monologue
# JP: 崩れさせない。\n腰を思い切り捕まえてっ！
1470 = "Không để em gục ngã.\nTôi ôm chặt lấy eo em!"
# 【ハチロク】
# display as 鈴
# JP: 「えっ！？　そんな、立て続け――」
1061 = "「Hả!? Sao lại, liên tục thế này——」"
# monologue
# JP: （ずんっ！！！！）
1680 = "（Phập!!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「んっひゅううぅぅぅぅぅっ！！！」
1077 = "「Ưm hứ ư ư ư ư ư!!!」"
# monologue
# JP: 射精はしたが、勃起は全然衰えてない。\n射精を今もしつづけてるが、腰を止めようとは思えない。
1424 = "Tuy đã xuất tinh, nhưng cậu bé vẫn chưa hề xìu xuống.\nDù bây giờ vẫn đang tiếp tục xuất tinh, tôi cũng chẳng hề có ý định dừng hông lại."
# monologue
# JP: （んびゅっ！　ぐいっ！　びゅっ！　ずぶううっ！）
1712 = "（Phụt! Phập! Phụt! Phập!）"
# 【ハチロク】
# display as 鈴
# JP: 「イき――すぎっ――んっ――かふっ――\nわたく、し――回路――やけ、る――焼けちゃうっ」
1227 = "「Lên đỉnh——nhiều quá——ưm——á——\nmạch điện——của em——cháy——cháy mất thôi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ、すずっ」
1108 = "「Tôi cũng vậy, Suzu.」"
# monologue
# JP: 目と目の間、鼻の上、\nそこの裏側がずっとチカチカまたたいている。
1622 = "Khoảng giữa hai mắt, phía trên sống mũi,\nphía sau chỗ đó cứ nhấp nháy chớp giật liên hồi."
# monologue
# JP: 肌の全部がぶわぶわと汗を吹き出させ、\nほんのすこしでも体を冷やそうと必死になってる。
1454 = "Toàn bộ da thịt đang tuôn mồ hôi đầm đìa,\ntuyệt vọng cố gắng làm mát cơ thể dù chỉ một chút."
# monologue
# JP: （ずるううううううっ！）
1730 = "（Rút ra!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ！？　あっ――」
999 = "「Á!? A——」"
# monologue
# JP: （ばちゅんっ！！！）
1699 = "（Bạch!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃふううううううううんっ！！！」
996 = "「Á phù ư ư ư ư ư ư ư ư ưm!!!」"
# monologue
# JP: すずのお尻もどろどろだ。\n割烹着の下も恐らくは、ぐちょぐちょになっているだろう。
1597 = "Mông của Suzu cũng nhầy nhụa rồi.\nBên dưới lớp tạp dề nấu ăn có lẽ cũng đã ướt nhẹp hết cả."
# monologue
# JP: だけれど僕らは着衣のままで、\nぬらつきまくる肌と肌とで、重なりあって密着できない。
1349 = "Nhưng chúng tôi vẫn đang mặc quần áo,\nkhông thể áp sát những mảng da thịt trơn tuột vào nhau được."
# monologue
# JP: （ずるっ！）
1684 = "（Tuột!）"
# 【ハチロク】
# display as 鈴
# JP: 「んっ――あっ――抜けっ――ちゃ」
1068 = "「Ưm——a——tuột ra——mất rồi.」"
# monologue
# JP: （ずぶっ！　ずぱっ！　ずんっ！　ぱちゅんっ！）
1682 = "（Phập! Phập! Phập! Bạch!）"
# 【ハチロク】
# display as 鈴
# JP: 「はひっ！？　あっ――おちん、ちん――ンッ――\n射精、したのに――もっと――太――ん――はあんっ」
1015 = "「Hí!? A——dương, vật——ưm——\nđã xuất tinh, rồi mà——còn to——hơn——ưm——hà a.」"
# monologue
# JP: だから、性器と性器だけ、\n繋がりあえてる一点だけに集中している。
1500 = "Thế nên, tôi chỉ tập trung vào một điểm duy nhất,\nnơi bộ phận sinh dục của cả hai đang kết nối với nhau."
# monologue
# JP: 淋しげにアヌスが震えているが、\nそこにすら、指一本も今は触れない。
1625 = "Hậu môn đang run rẩy một cách cô đơn,\nnhưng giờ tôi chẳng thể chạm nổi một ngón tay vào đó."
# 【双鉄H】
# display as 雙鐵
# JP: 「すず――また――イく、ぞっ――\nんっ――僕の――全部、を――すずの、中、にっ」
1204 = "「Suzu——lại——lên đỉnh, nữa đây——\nưm——toàn bộ——của tôi——sẽ bắn vào trong, Suzu.」"
# 【ハチロク】
# display as 鈴
# JP: 「来てっ！　だしてくださいっ、双鉄さまあっ」
964 = "「Đến đi! Hãy bắn ra đi ạ, ngài Soutetsu.」"
# monologue
# JP: （きゅんっ！　きゅううううううんっ！！）
1708 = "（Thít! Siết chặt!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「かはっ！」
1181 = "「Hự!」"
# monologue
# JP: びろうどの肉ヒダがわななき張り付き、\nそれを亀頭でめくってはまたほじってく。
1393 = "Những nếp thịt mềm như nhung run rẩy bám chặt lấy,\ntôi dùng quy đầu lật chúng lên rồi lại khoét sâu vào trong."
# 【ハチロク】
# display as 鈴
# JP: 「あっ――ああっ――んっ！　双鉄さまっ――\nふあっ――双鉄、さまぁっ」
1033 = "「A——aa——ưm! Ngài Soutetsu——\nphù a——Ngài Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すず！　すずっ！　すずっ！　すずっ！！」
1209 = "「Suzu! Suzu! Suzu! Suzu!!」"
# monologue
# JP: 睾丸が、何十倍にも膨れ上がってる気さえする。
1465 = "Tôi thậm chí còn có cảm giác tinh hoàn đang phồng to lên gấp chục lần."
# monologue
# JP: 僕の思いが、全部が濃厚な精液となり、\nすずの中へと流れ込み、すずと一つになりたがってる！
1486 = "Tất cả tâm trí tôi, đều hóa thành dòng tinh dịch đậm đặc,\ntuôn chảy vào trong Suzu, khao khát được hòa làm một với em!"
# 【双鉄H】
# display as 雙鐵
# JP: 「イクぞ！　イクっ！　すずっ！！！」
1182 = "「Ra đây! Ra đây! Suzu!!!」"
# 【ハチロク】
# display as 鈴
# JP: 「は、はいっ！　奥っ！　一番おくに――んっ！\nごちゅんっって、してっ！」
1134 = "「V-Vâng! Sâu bên trong! Vào tận sâu nhất——ưm!\nHãy đâm thật mạnh, vào đi ạ!」"
# monologue
# JP: （ごりゅっ！！）
# 1694 = "（咕溜！！）" 
# 【ハチロク】
# display as 鈴
# JP: 「ふやっっ！？　これっ！――しゅごっ――\n～～～～～～～～～～っ！！！！」
1065 = "「Phù á!? Cái này!——Sướng quá——\n~~~~~~~~~~!!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んああああああっ！」
1075 = "「Ưm a a a a a!」"
# monologue
# JP: （びゅるるっ！　びゅっ！　びゅううっ！　どびゅる！）
1721 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひあっ――あっ――あちゅっ――しゅ、ごっ」
1012 = "「Hí a——a——nóng quá——sướng, quá.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん～～～～っっ！」
1085 = "「Ưm~~~~!」"
# monologue
# JP: 腰を思い切り抱き寄せて、\n腰を思い切り突き出している。
1489 = "Tôi ôm chặt lấy eo em,\nvà dốc toàn lực đẩy hông về phía trước."
# monologue
# JP: 一ミリの隙間もないどころか、\nおもいっきりに食い込ませつつ――
1328 = "Đừng nói là một khe hở dù chỉ một milimet,\ntôi còn đang ấn sâu hết mức có thể——"
# monologue
# JP: （びゅっ！　びゅるるっ！　びゅう！　びゅっ！）
1723 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ハチロク】
# display as 鈴
# JP: 「おなか……おまん、まん――たぷたぷ……ふ、あっ、\nおまんまん――精液で、ふ、あっ――おぼれ、ちゃうっ」
1178 = "「Bụng em......cô bé——đầy ắp rồi......phù, a,\ncô bé——sắp chết đuối, trong tinh dịch——phù, a——mất thôi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そう、だな。すず――」
1145 = "「Đúng, vậy nhỉ. Suzu——」"
# monologue
# JP: （とさっ）
1715 = "（Phịch）"
# monologue
# JP: 精液全部を、力の全てを出し切って、\nすずの小さな背中の上に、つながったまま崩れてしまう。
1461 = "Vắt kiệt toàn bộ tinh dịch, dốc cạn mọi sức lực,\ntôi gục xuống tấm lưng nhỏ bé của Suzu, trong khi hai đứa vẫn đang dính liền lấy nhau."
# 【ハチロク】
# display as 鈴
# JP: 「あ……双鉄、様――少し、だけ――」
1051 = "「A......Ngài Soutetsu——một chút, thôi——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？　ああ――」
1084 = "「Hửm? À——」"
# monologue
# JP: すずの希望を悟ってなんとか体を支え――\nすずはくるりと姿勢を変えて、僕と向き合う。
1475 = "Hiểu được ý muốn của Suzu, tôi cố gắng chống đỡ cơ thể——\nSuzu xoay người đổi tư thế, đối mặt với tôi."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄、様」
1225 = "「Ngài Soutetsu.」"
# monologue
# JP: すずの両手が、僕のほっぺたをはさんでくれる。
1601 = "Hai tay Suzu áp vào má tôi."
# monologue
# JP: 柔らかで、真っ白で、小さくて――\nだけれどとても力強く、僕を支えてくれる両手が。
1592 = "Mềm mại, trắng trẻo và nhỏ nhắn——\nnhưng lại vô cùng mạnh mẽ, đôi bàn tay ấy đang nâng đỡ lấy tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「すず、大好きだ。\n――愛してる」
1117 = "「Suzu, tôi rất thích em.\n——Tôi yêu em.」"
# monologue
# JP: （ちゅっ）
# 1710 = "（啾）" 
# monologue
# JP: キスをする。
1451 = "Chúng tôi trao nhau nụ hôn."
# monologue
# JP: 唇だけを重ね合い、\nお互いの手で、お互いの体を抱きしめる。
1384 = "Chỉ đơn thuần là đôi môi chạm nhau,\ndùng đôi tay của mình, ôm trọn lấy cơ thể đối phương."
# 【ハチロク】
# display as 鈴
# JP: 「愛しております。双鉄様を。\nわたくしの全てで――ただ、いっしんに」
1109 = "「Em cũng yêu ngài. Ngài Soutetsu.\nYêu ngài bằng tất cả những gì em có——chỉ một lòng một dạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん。知っている」
1081 = "「Ừ. Tôi biết.」"
# 【ハチロク】
# display as 鈴
# JP: 「わたくし――幸せでございます」
1118 = "「Em——đang rất hạnh phúc.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、僕もだ」
1055 = "「Ừ, tôi cũng vậy.」"
# monologue
# JP: 言葉を形であらわすように、\nすずの瞳が、とても柔らかなアーチを描く。
1599 = "Như muốn biến lời nói thành hình hài,\nđôi mắt Suzu cong lên thành một vòng cung vô cùng dịu dàng."
# 【ハチロク】
# display as 鈴
# JP: 「お小水をお飲みいただけることが、これほど……\nすさまじく……素晴らしいものとは、今まで、夢にも」
1119 = "「Việc được ngài uống nước tiểu, lại là một điều......\nmãnh liệt......tuyệt vời đến nhường này, từ trước đến nay, em chưa từng mơ tới.」"
# 【双鉄H】
# display as 雙鐵
# JP: （そこがか！）
1678 = "（Là chuyện đó sao!）"
# 【ハチロク】
# display as 鈴
# JP: 「ですので、次は――\n双鉄様のお小水を、ぜひ」
1128 = "「Vì vậy, lần tới——\nnhất định hãy cho em uống nước tiểu của ngài Soutetsu nhé.」"
# monologue
# JP: （さすっ）
1741 = "（Vuốt ve）"
# monologue
# JP: すずの手が、優しく優しく僕の下腹部をさすってくれる。
1595 = "Bàn tay Suzu dịu dàng, nhẹ nhàng vuốt ve vùng bụng dưới của tôi."
# monologue
# JP: それがすずの望みなら、\n無論、否やがあるはずもない。
1512 = "Nếu đó là mong muốn của Suzu,\nthì đương nhiên, tôi chẳng có lý do gì để từ chối cả."
# 【双鉄H】
# display as 雙鐵
# JP: 「いろいろ、試そう。\n次も、その次も、そのまた次も」
1200 = "「Hãy cùng thử nhiều thứ nhé.\nLần tới, lần tới nữa, và cả những lần sau nữa.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。ずうっと。ね？　双鉄様」
1079 = "「Vâng. Mãi mãi về sau. Nhé? Ngài Soutetsu.」"
# monologue
# JP: 見つめられれば、愛おしさだけが膨らんでいく。\n黒髪をそっと指で撫ぜ、かすかに絡めてはまた解いてく。
1412 = "Chỉ cần bị em nhìn chằm chằm, tình yêu thương trong tôi lại trào dâng.\nTôi khẽ vuốt ve mái tóc đen của em, để những ngón tay vương vấn rồi lại gỡ ra."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そうだな」
1083 = "「Ừ, đúng vậy nhỉ.」"
# monologue
# JP: 仕事に、生活に、セックスに。真面目で一生懸命で、\n誰より勉強熱心な、可愛い可愛い僕の奥さん。
1526 = "Trong công việc, trong cuộc sống, và cả trong chuyện chăn gối. Em luôn nghiêm túc, hết mình,\nham học hỏi hơn bất cứ ai, là người vợ vô cùng, vô cùng đáng yêu của tôi."
# monologue
# JP: 僕とすずとは、だからずうっと、\nこんな毎日を繰返してく。
1455 = "Thế nên, tôi và Suzu, sẽ mãi mãi,\nlặp lại những chuỗi ngày như thế này."
# 【双鉄H】
# display as 雙鐵
# JP: 「ずうっと、だ」
1185 = "「Mãi mãi về sau.」"
# monologue
# JP: そうして僕らは、誓い合うため、もう一度。
1510 = "Và rồi, để thề hẹn với nhau, chúng tôi thêm một lần nữa."
# monologue
# JP: ――ごくささやかなキスをする。
743 = "——Trao nhau một nụ hôn thật khẽ."
