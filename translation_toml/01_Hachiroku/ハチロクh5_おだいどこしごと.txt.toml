[script]
# lines: 297 
# 【双鉄H】
# display as 雙鐵
# JP: 「すず、念のため塩水を貰えるか？」
1210 = "「鈴，有沒有鹽水啊？」" 

# 【ハチロク】
# display as 鈴
# JP: 「もちろん、用意してございます。\n双鉄様までご病気させるわけにはまいりません」
1166 = "「當然有了。總不能讓您生病啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ありがとう」
1187 = "「謝謝」" 

# monologue
# JP: 塩水うがいを済ませて台所へと戻ってみれば、\n下げてきたばかりの食器を、すずは手早く洗い終えてる。
1482 = "我用鹽水漱完口，回到廚房一看，鈴已經俐落地洗完了撤下的餐具。" 

# 【ハチロク】
# display as 鈴
# JP: 「いかがでした？　真闇様と日々――」
1102 = "「怎樣？每天和真闇小姐——」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「違うぞ。すず。[ねえ,1]義姉さんと日々姫だ」
939 = "「不對，鈴。是你的義姐和日日姬」" 

# 【ハチロク】
# display as 鈴
# JP: 「あ」
1052 = "「啊」" 

# monologue
# JP: 幸せそうに頬を染め、こほんと小さな咳払い。\nそうしてすずは、素直に呼称をあらためる。
1404 = "她幸福地臉紅了，輕咳了一聲掩飾羞澀。於是鈴坦率地換了稱呼。" 

# 【ハチロク】
# display as 鈴
# JP: 「いかがでしたか？\nお[ねえ,1]義姉さまと日々姫のご様子は」
1103 = "「怎樣？義姐和日日姬的情況」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「熱はすっかり下がったようだ。\n食欲も完全に戻っているな」
1167 = "「發燒已經好轉了，食慾也完全回來了」" 

# 【ハチロク】
# display as 鈴
# JP: 「うふふ、綺麗に食べてくださいましたものね」
1004 = "「呵呵，畢竟吃得那麼乾淨」" 

# monologue
# JP: 下げた食器は、\n僕まで嬉しくなるほどに、どちらも見事に空っぽだった。
1508 = "撤下的餐具都是空空如也，讓我看了都高興。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ふたりとも、それぞれにすずを褒めていたぞ？\n『完全に、右田の味のおかゆだ』と」
1087 = "「她們倆都誇你的呢，『真是正宗右田口味的粥啊』」" 

# 【ハチロク】
# display as 鈴
# JP: 「真闇さ――お義姉さまに教わったレシピどおりです。\nわたくし、味覚にはあまり自信がございませんので」
1113 = "「我只是照搬了真闇小姐——義姐教的菜譜啦。我對味覺不太有自信」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば僕が味見をさせてもらえばよかったな。\nせっかくのすずの手料理だというのに」
1202 = "「那就讓我嘗味好了。畢竟是你親手做的飯菜啊」" 

# monologue
# JP: 言えば、うふふとすずが微笑む。
1602 = "鈴銀鈴般地笑了。" 

# 【ハチロク】
# display as 鈴
# JP: 「お義姉さまには、\nおかゆの他のレシピも教えていただいておりますよ？」
1177 = "「義姐還教了我粥以外的很多菜譜」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「おお」
1027 = "「哦」" 

# monologue
# JP: 言われてみればコンロの上の鍋からは、\n醤油っぽい、うまそうな匂いがふわり、漂ってくる。
1490 = "我聞到了爐子上的鍋散發出的香噴噴的醬油香氣。" 

# 【ハチロク】
# display as 鈴
# JP: 「できたてを食べていただきたく思いますので、\nあとは、煮含めるだけのところまでは仕上がってます」
1120 = "「我想讓您吃熱騰騰的菜，所以接下來還要燉煮和調味」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「この匂い……そうか、肉じゃがか。\nそういえば、しばらく食べていないな」
1191 = "「這味道……是馬鈴薯燉肉吧。有陣子沒吃這個了」" 

# monologue
# JP: 真闇姉、日々姫、ポーレット、ふかみ、稀咲と、\n流感により、立て続けに発熱し、寝込んでしまった。
1545 = "真闇姐，日日姬，波萊特，深美，稀咲，都患上流感，一個接一個地發燒，睡著了。" 

# monologue
# JP: 僕とすず、凪、れいなとで、周囲の力も借りに借り、\nなんとかかんとかやりくりをして、乗り切ってきたが――
1439 = "我、鈴、凪、玲奈靠著很多人的幫忙，所以才好不容易堅持了下來，但是——" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様たちには申し訳ないことに、\n店屋ものが続いてしまいましたものね」
1096 = "「很抱歉，讓你們幫忙一直開店了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「やむを得んことだった――というか、この激務の間に、\nすずはよく、料理までを学んでくれたな。とても嬉しい」
950 = "「事出有因嘛——不過在這麼繁忙的工作中，你還學習了烹飪，真讓我很高興」" 

# 【ハチロク】
# display as 鈴
# JP: 「前々から、少しずつお義姉さまに習っていたのです。\nただ、お披露目をする自信がなかなかもてなくて」
1099 = "「很早以前我就在跟義姐學習了，但是一直沒信心露兩手」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「なるほど、今回の流感が、\n強制的にその機会を作ってくれたわけか」
975 = "「原來如此，此次流感硬是給了你一個機會啊」" 

# 【ハチロク】
# display as 鈴
# JP: 「そういうことになりますね」
1136 = "「是啊」" 

# monologue
# JP: ポーレットが今日から職務復帰を果たせたおかげで、\n僕とすずとは、その分の余裕をもたせてもらえた。
1392 = "多虧波萊特今天能復職，讓我和鈴有空喘口氣了。" 

# monologue
# JP: 二三日のうちにはみんなも復帰できると、\nお医者様からお墨付きもいただけたし――
1593 = "醫生也保證二三天內其他人也能復歸。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「皆が倒れてしまったときにはどうなることかと思ったが、\n乗り越えて見れば、災い転じて福となる形となったな」
1131 = "「所有人倒下的時候我很擔心的，但風雨之後真是彩虹啊」" 

# 【ハチロク】
# display as 鈴
# JP: 「福、でございますか？」
1095 = "「彩虹嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、そのおかげですずの手料理をいただける。\nこれこそ、紛れも無い福だ」
1144 = "「是啊，能吃到你親手做的菜。這就是彩虹了，絕對沒錯」" 

# 【ハチロク】
# display as 鈴
# JP: 「そ、そんな――大げさでございますし、気が早いです。\nまだ、仕上がりがどうなるかもわかりませんのに」
1029 = "「哪有啦——太誇張、太性急了。還不知道做得怎麼樣呢」" 

# monologue
# JP: 照れくさいのだろう。\nすずがふりふり、体を揺する。
1399 = "她大概是害羞了。看她扭來扭去的。" 

# monologue
# JP: かっぽう着の下から覗く黒と赤とのスカートが、\nすずの足、肌の白さと、膝の丸さとを引き立てる。
1524 = "烹飪服下露出黑和紅的裙子，凸顯出了鈴的腿、白皙的皮膚和圓潤的膝蓋。" 

# monologue
# JP: （ずくんっ）
1686 = "（呼哧）" 

# monologue
# JP: ……体が、じわじわ熱くなる。\nすずは、可愛い。狂おしいほど。
748 = "……身體一點一點地變熱。鈴好可愛，簡直要讓我發瘋。" 

# monologue
# JP: そうして僕は――いいや、僕らは。\nこの多忙中、ずっとセックスも出来て無かった。
1375 = "另外我——不對，是我們在繁忙之中一直也沒有做愛。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すず」
1207 = "「鈴」" 

# monologue
# JP: （きゅっ）
1729 = "（抱）" 

# 【ハチロク】
# display as 鈴
# JP: 「そ、双鉄様？」
1221 = "「雙、雙鐵少爺？」" 

# monologue
# JP: 予告も無しに抱きつけば、すずは驚いた声を出し――\nけれどもホうっと、幸せそうに僕に体を預けてくれる。
1386 = "因為冷不防地被抱住，她發出了吃驚的聲音——但她還是高興地把身體交給了我。" 

# 【ハチロク】
# display as 鈴
# JP: 「もう少しだけお待ちください。\n火をかけて、お料理をいただきましたら」
967 = "「再等一下吧，煮好吃完了以後再……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「お料理の前に、すず。僕はお前をいただきたい。\nこんな状態では、せっかくの料理にも集中できない」
953 = "「享用飯菜之前，我想先享用你。這樣下去我沒辦法專心吃你烹飪的佳肴」" 

# monologue
# JP: （ぐりっ）
1732 = "（捏）" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ」
# 1052 = "「啊」" 

# monologue
# JP: 股間を、股間に押し当てる。
1484 = "我的下體頂在了她下體上。" 

# monologue
# JP: ただそれだけのごく単純な刺激にすずは、\n蕩けたような声を出す。
1420 = "如此單純的刺激就讓她聲音酥軟。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「かわいいな。すずは」
960 = "「你好可愛啊」" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様……あ――んっ――ちゅっ――ちゅむっ――」
1223 = "「雙鐵少爺……啊——啾——啾姆——」" 

# monologue
# JP: キス。\n唇をついばむだけの。
1452 = "我們接吻，像小鳥啄食一樣啄了啄嘴唇。" 

# monologue
# JP: けれどもすぐに、舌と舌。唾液と唾液がまじり始める。
1347 = "但很快我們的舌頭和唾液就交混在了一起。" 

# 【ハチロク】
# display as 鈴
# JP: 「は……んっ――ちゅうっ――れろっ――じゅっ――\nチュルッ――ちゅううっ――はむっ――こくっ」
753 = "「……嗯——啾嗚——嗯——啾——啾嚕——啾嗚——姆——捋」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……ん。ふぅ。\nすずの唇は、最高のオードブルだ」
756 = "「……嗯。嗚。鈴的嘴唇，是最棒的小吃」" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄、様……ん……ちゅるっ」
1224 = "「雙鐵少爺……啾嚕」" 

# monologue
# JP: 口の端からたれかけたよだれをすすり上げ、\nその瞬間に、すずはハっと、何かに気づいた顔になる。
1408 = "她的嘴角垂下涎水，突然，她似乎想起了什麼，抬起了頭。" 

# 【ハチロク】
# display as 鈴
# JP: 「でも……あの……お[だいどこ,1]台所ですよ？\nお台所で、このようなこと」
957 = "「但……我們是在廚房啊？怎麼能在廚房做這種事呢」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「お台所は、セックスの主要な舞台の一つだ。\nすずの勉強にはなかったか？　裸エプロンというものが」
1092 = "「廚房是做愛的主舞台之一。鈴學過嗎？有裸體圍裙這種東西」" 

# 【ハチロク】
# display as 鈴
# JP: 「あ！　ございました、裸エプロン。なるほど、確かに、\nあの格好の方々は、お台所でセックスをされてましたね」
1059 = "「啊！我有看過裸體圍裙。原來如此，確實在廚房做愛總會穿成那樣子吧」" 

# monologue
# JP: 納得をしてくれたのだろう。\nすずは静かに、深く頷く。
1589 = "這下她懂了吧。鈴安靜地，深深地點頭。" 

# 【ハチロク】
# display as 鈴
# JP: 「左様でしたか。裸エプロンのセックスも、\n妻の務め――大事な大事な、お台所仕事だったのですね」
1192 = "「這樣啊。穿裸體圍裙做愛也是妻子的任務——是很重要的廚房工作」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いや、そこまでは言わんが」
1114 = "「我可沒說到那個份上啊」" 

# 【ハチロク】
# display as 鈴
# JP: 「ああ、ですが双鉄様！」
1023 = "「哎呀，但是雙鐵少爺！」" 

# monologue
# JP: 切羽詰まったような声。\nそうしてすずはそのままに、自分の体に視線を落とす。
1398 = "她似乎很為難。她垂下頭，看著自己的身體。" 

# 【ハチロク】
# display as 鈴
# JP: 「けれどもわたくし、ただの割烹着姿ですよ？\n裸エプロンのように、セックスのための衣装では――」
958 = "「但是我穿的就是普通的烹飪服啊。不是裸體圍裙那樣為了做愛的服裝——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「着飾ったすずも可愛らしいが、僕が一番好きなのは、\n僕の日常の中に、そのまま居る、居てくれるすずだ」
1175 = "「精心打扮的鈴是很可愛，但我最喜歡的，是平日裡陪在我身邊的鈴」" 

# monologue
# JP: （さすっ）
1737 = "（摸）" 

# monologue
# JP: 割烹着の隙間から手を入れる。
1487 = "我的手探入了烹飪服的間隙。" 

# monologue
# JP: 肌を、ではなく、割烹着のすぐ下にある、\nいつものすずの制服を、ゆっくりゆっくり撫で回す。
1468 = "我慢慢地撫摸著烹飪服下鈴平時穿的制服。" 

# monologue
# JP: （さすっ――さわっ――ふにっ――もみゅ――）
1740 = "（撫摸——撫摸——揉——揉——）" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……嬉しい、です。双鉄、様っ」
1049 = "「啊……我好高興，雙鐵少爺……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すず……」
1206 = "「鈴……」" 

# monologue
# JP: （ふわっ）
1685 = "（呼哇）" 

# 【ハチロク】
# display as 鈴
# JP: 「あ――」
1030 = "「啊——」" 

# monologue
# JP: 一番下から、大きくスカートを捲り上げる。
1464 = "我從最下面捲起裙子。" 

# 【双鉄H】
# display as 雙鐵
# JP: （おお）
1698 = "（哦）" 

# monologue
# JP: すずに似合いの純白だが、\n横が紐になっている、かなりセクシーな下着を履いてる。
1358 = "內衣是最適合鈴的純白色，但是旁邊有系帶，相當性感。" 

# monologue
# JP: ならば、すずも――\n今夜ようやく、と期待をしてくれていたのだろう。
1538 = "看來鈴也很期待今晚久違的性愛吧。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「本当にかわいいな、お前は」
962 = "「你真的可愛死了」" 

# monologue
# JP: （さすっ――）
1736 = "（摸——）" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……双鉄、様ッ――」
1050 = "「啊……雙鐵少爺——」" 

# monologue
# JP: （さすっ――さすっ――こしゅっ――くりゅっ）
1735 = "（摸——摸——咕啾）" 

# 【ハチロク】
# display as 鈴
# JP: 「や……パンツの、上から、なのに――んっ――はっ――やっ――そんなに優しく――クリトリ、ス――っ！」」
992 = "「呀……明明隔著內褲——哈——哎——那麼溫柔地——摸陰蒂——！」」" 

# monologue
# JP: すずの場所なら、覚えてる。
1494 = "我記得鈴哪裡敏感。" 

# monologue
# JP: クリトリスを優しく優しくなでなでしてから、\n縦筋にパンツを食い込ませるよう、指を動かす。
1522 = "溫柔地撫摸陰蒂之後，我又把內褲按進了縫隙裡。" 

# monologue
# JP: （すにっ――しゅくっ――くいっ――ちゅくんっ）
1734 = "（摸——咻嗯——嗯——啾嗯）" 

# 【ハチロク】
# display as 鈴
# JP: 「は――あっ――はずかし――おつゆ――\nしみ、ちゃうっ――わたくし、こんなにっ――」
1018 = "「哈——啊——好難為情——黏液——要淌出來了——我，這麼——」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、とろとろだな。すっかり出来上がってるようだ」
1139 = "「是啊，已經黏糊糊的了。看來你已經準備好了」" 

# monologue
# JP: （しゅるっ）
1731 = "（捋）" 

# 【ハチロク】
# display as 鈴
# JP: 「ふあっ」
1011 = "「呼啊」" 

# monologue
# JP: 紐をほどけば、パンツが落ち――ず、\n股間に一瞬張り付き、落ちる。
1493 = "我解開帶子，內褲一瞬間緊緊貼在了胯下，然後才落下。" 

# 【ハチロク】
# display as 鈴
# JP: 「やあっ！？　恥ずかしいっ、わたくし――こんなっ――\nんふっ！！？」
995 = "「呀啊！？好難為情，我——這樣的——嗯呼！！？」" 

# monologue
# JP: （くちゅううううっっ）
1691 = "（咕啾——）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「照れることはない。\n僕を求めて、これほど濡らしてくれたのだろう？」
