3372 = "Trước phản ứng quá đỗi dễ hiểu đó, \ntôi cũng bật cười theo."

# 【双鉄】
# display as 雙鐵
# JP: 「様付けはいらん。恐らく[きょうどう,1]教導\x%l機関士;#00ffc040;機関士%l;#;こそは務めようが、\n僕がオリヴィのマスターになるわけではないしな」
2327 = "「Không cần phải thêm chữ 'sama' đâu. Có lẽ tôi sẽ đảm nhận vai trò \\x%l機関士;#00ffc040;thợ máy%l;#; hướng dẫn cho em, \nnhưng tôi không phải là master của Olivi đâu đấy.」"

# 【オリヴィ】
# display as 奥莉薇
