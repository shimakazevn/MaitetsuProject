2663 = "「Vậy, em nên gọi Soutetsu-sama là gì đây?\nMigita\\x%l機関士;#00ffc040;Thợ máy%l;#;? Soutetsu-san?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ――そうだな」
2225 = "「Ừm——cũng phải nhỉ.」"

# monologue
# JP: が、そういうことでも無いらしい。\nオリヴィのニコニコ顔には邪気のかけらも感じられない。
2927 = "Nhưng có vẻ không phải như vậy. Trên gương mặt tươi cười của Olivi, tôi không cảm thấy lấy một chút ác ý nào."

# monologue
