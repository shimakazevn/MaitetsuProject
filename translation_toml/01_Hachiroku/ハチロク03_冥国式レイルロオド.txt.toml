3425 = "（Ưm）"

# monologue
# JP: ハチロクが軽く僕に触れる。\nその目が『行くな』と告げている。
2957 = "Hachiroku khẽ chạm vào tôi.\nÁnh mắt cô ấy như muốn nói \"Đừng đi\"."

# 【ポーレット】
# display as 波萊特
# JP: 「それじゃ、今日はここまでにしましょう。\nわたしは、少し残業をしていきますね」
2641 = "「Vậy thì, hôm nay chúng ta dừng ở đây nhé.\nTôi sẽ ở lại làm thêm một chút.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしと双鉄さまも、\n始末書を済ませてしまいますので」
2376 = "「Em và ngài Soutetsu cũng\nphải hoàn thành bản kiểm điểm sự cố nữa\nạ.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなの？　なんか手伝う？」
2517 = "「Vậy sao? Có cần tôi giúp gì không nha?」"

# monologue
# JP: 思わぬ嬉しい問いかけに、\nけれどハチロクは、静かな笑顔で首を振る。
3082 = "Trước câu hỏi đầy thiện ý bất ngờ đó,\nHachiroku chỉ mỉm cười nhẹ nhàng lắc đầu."

# 【ハチロク】
# display as 八六
# JP: 「いいえ。気持ちだけで。\nオリヴィちゃんは、湯医線での初乗務でしたし」
1993 = "「Không cần đâu ạ. Chỉ cần cô có lòng là\nđược rồi.\nDù sao thì đây cũng là chuyến đi đầu tiên\ncủa Olivy trên tuyến Yui mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「しっかり休んで英気を養ってくれ。\nなにか聞きたいことが出てきたら、明日改めて確認する」
2300 = "「Cô cứ nghỉ ngơi cho khỏe đi.\nNếu có gì cần hỏi, ngày mai tôi sẽ xác\nnhận lại sau.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！　わかった！」
2705 = "「OK! Hiểu rồi nha!」"

# 【日々姫】
# display as 日日姬
# JP: 「そしたら、ね！　にぃに、ハチロク、またあとで！！」
2660 = "「Vậy nha! Anh hai, Hachiroku, hẹn gặp lại\nsau!!」"

# 【れいな】
# display as 玲奈
# JP: 「終わったら、れいなをむかえにきてくださいねぇ」
2533 = "「Xong việc thì nhớ đến đón Reina nha~」"

# 【ポーレット】
# display as 波萊特
# JP: 「もちろん。いいこで待っててね？」
2408 = "「Tất nhiên rồi. Em ngoan ngoãn chờ nhé?」"

# 【れいな】
# display as 玲奈
# JP: 「はぁい」
2313 = "「Vâng ạ~」"

# 【日々姫】
# display as 日日姬
# JP: 「じゃ、行こ！　オリヴィちゃん、れいなちゃん！\n温泉温泉！！」
2289 = "「Vậy đi thôi! Olivy, Reina!\nSuối nước nóng, suối nước nóng!!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オンセンオンセンー！！」
2491 = "「Suối nước nóng, suối nước nóng!!」"

# monologue
# JP: にぎにぎしくも楽しげに、\n油とススにまみれた一同が消えていく。
3270 = "Nhóm người dính đầy dầu mỡ và nhọ nồi\nồn ào, vui vẻ rời đi."

# monologue
# JP: 姿……足音も完全に消え去ったのを確かめて。\nハチロクに、問うべき言葉はもう決めてある。
3284 = "Sau khi chắc chắn bóng dáng…… và tiếng\nbước chân của họ đã hoàn toàn biến mất.\nTôi đã quyết định được những lời cần hỏi\nHachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィのことか？」
2430 = "「Là chuyện của Olivy sao?」"

# 【ハチロク】
# display as 八六
# JP: 「はい、左様です。双鉄さま」
2440 = "「Vâng, đúng vậy ạ. Ngài Soutetsu.」"

# monologue
# JP: 打てば響くで、答えが返る。\nポーレットは何も言わない。黙って僕らを見つめている。
2942 = "Tôi vừa dứt lời, Hachiroku đã lập tức đáp\nlại.\nPaulette không nói gì. Chỉ im lặng nhìn\nchúng tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「何があった？」
2432 = "「Đã có chuyện gì xảy ra?」"

# 【ハチロク】
# display as 八六
# JP: 「はい――」
2435 = "「Vâng——」"

# monologue
# JP: そう返事をし、\nけれどハチロクは、言いづらそうにうつむいてしまう。
3100 = "Trả lời xong,\nnhưng Hachiroku lại cúi gầm mặt xuống, có\nvẻ khó nói."

# 【ハチロク】
# display as 八六
# JP: 「……オリヴィは、\nみかん鉄道ではどのように扱われていたのですか？」
1574 = "「……Olivy,\nđã bị đối xử như thế nào ở Đường sắt Mikan\nvậy ạ?」"

# monologue
# JP: 扱われて――と。\nハチロクの選んだ言葉に、不安を強く感じてしまう。
3129 = "Bị đối xử——sao.\nCách dùng từ của Hachiroku khiến tôi cảm\nthấy vô cùng bất an."

# monologue
# JP: が、ポーレットは驚いたような様子も見せず、\n小首を傾げる。
3010 = "Nhưng Paulette không hề tỏ ra ngạc nhiên,\ncô ấy chỉ khẽ nghiêng đầu."

# 【ポーレット】
# display as 波萊特
# JP: 「えっと……ちょっと待ってね？\n正確に答えたほうが良さそうだから」
2382 = "「Ừm…… đợi một chút nhé?\nCó lẽ tôi nên trả lời chính xác thì hơn.」"

# monologue
# JP: 言って、棚から書類を持ち出す。\n相当分厚い。
3097 = "Nói rồi, cô ấy lấy ra một tập tài liệu từ\ntrên kệ.\nKhá là dày."

# monologue
# JP: 車両と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とを迎える準備を、\nポーレットが慎重に重ねていたことが垣間見える。
3262 = "Có thể thấy Paulette đã cẩn trọng chuẩn bị\ncho việc đón nhận toa xe và \\x%lレイルロオド;#00ffc040;Railord%l;#; đến\nmức nào."

# 【ポーレット】
# display as 波萊特
# JP: 「製造は[めいじ,1]明智45年。[めいこく,1]冥国の、\nオールドウィン・ロコモーティブワークス製です」
2076 = "「Được sản xuất vào năm Minh Trị 45. Do\nhãng Aldwin Locomotive Works\ncủa Mỹ chế tạo.」"

# 【双鉄】
# display as 雙鐵
# JP: 「オールドウィンだからオリヴィなのか？」
2258 = "「Vì là Aldwin nên mới tên là Olivy sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「多分……な気がしますけど。そこまでは記録に無いです。\n最初は、[ふじみのぶ,3]冨士実延鉄道で活躍したそうです」
2369 = "「Chắc là…… vậy. Trong ghi chép không nói\nrõ đến mức đó.\nBan đầu, cô ấy hoạt động ở Đường sắt Fuji\nMinobu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「[ふじみのぶ,3]冨士身延？」
2316 = "「Fuji Minobu?」"

# 【ハチロク】
# display as 八六
# JP: 「のちに[ていゆうか,2]帝有化され、[ていてつみのぶせん,4]帝鉄実延線となった路線ですね。\n比較的早期……確か、私鉄時代に電化された筈です」
2337 = "「Là tuyến đường sau này được quốc hữu hóa\nthành tuyến Minobu của Teitetsu đó ạ.\nNó được điện khí hóa khá sớm…… chắc là từ\nthời còn là đường sắt tư nhân.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか。\nでは、そこでのオリヴィの活躍は短かったのか？」
2445 = "「Vậy sao.\nThế thì thời gian Olivy hoạt động ở đó khá\nngắn nhỉ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「かもしれません」
2393 = "「Có lẽ vậy.」"

# monologue
# JP: ポーレットの指が書類をめくる。
3264 = "Ngón tay Paulette lật qua những trang tài\nliệu."

# 【ポーレット】
# display as 波萊特
# JP: 「あ……いえ、それでも――[しょうわ,1]正和11年までは走ってますね。\nそれから、[つるみせいてつぞうせん,5]鶴巳製鉄造船の専用線に移籍してます」
2176 = "「A…… không, dù vậy——cô ấy vẫn chạy cho đến\nnăm Chiêu Hòa 11.\nSau đó mới chuyển sang tuyến chuyên dụng\ncủa Tsurumi Seitetsu Zosen.」"

# 【ハチロク】
# display as 八六
# JP: 「製鉄会社の貨物機ですか！？　あの小さな体で」
2030 = "「Đầu máy chở hàng của công ty sản xuất\nthép sao!? Với thân hình nhỏ bé đó á?」"

# monologue
# JP: 確かにⅨ号機関車は、車格も小さいし出力も低そうだ。\n車軸配置も0-6-0。どう考えても旅客機向きだ。
3282 = "Quả thực đầu máy số 9 có kích thước nhỏ và\ncông suất có vẻ thấp.\nCách bố trí trục bánh xe cũng là 0-6-0.\nNghĩ thế nào cũng thấy hợp làm đầu máy chở\nkhách hơn."

# monologue
# JP: 製鉄造船専用線――資材輸送であれ、製品輸送であれ、\nなまなかな負担ではなかっただろう。
3325 = "Tuyến chuyên dụng cho sản xuất thép và\nđóng tàu——dù là vận chuyển vật liệu hay\nsản phẩm,\nthì gánh nặng cũng không hề nhỏ chút nào."

# 【ポーレット】
# display as 波萊特
# JP: 「そこでは、正和49年までを――長いですよね、本当に」
2550 = "「Ở đó, cô ấy làm việc đến tận năm Chiêu\nHòa 49——thực sự rất lâu nhỉ.」"

# monologue
# JP: 言って、ポーレットはファイルを閉じる。\nそこから先は、資料を見るまでも無いのだろう。
3265 = "Nói rồi, Paulette gấp kẹp tài liệu lại.\nChắc từ đoạn đó trở đi thì không cần xem\ntài liệu cũng biết rồi."

# 【ポーレット】
# display as 波萊特
# JP: 「で、そこからはみかん鉄道さんですね。\nみ[てつ]鉄さんでは、最初からずっと\x%l入換機;#00ffc040;入換機%l;#;だそうです」
2501 = "「Rồi sau đó là đến Đường sắt Mikan.\nNghe nói ở Đường sắt Mikan, cô ấy luôn làm\n\\x%l入換機;#00ffc040;đầu máy dồn toa%l;#; ngay từ đầu.」"

# 【ハチロク】
# display as 八六
# JP: 「……大変なご苦労をされているのですね。\nとても、そのようには見えませんでしたが」
1583 = "「……Cô ấy đã phải chịu đựng rất nhiều vất\nvả nhỉ.\nTrông cô ấy hoàn toàn không giống như vậy\nchút nào.」"

# monologue
# JP: あらためてそう聞かされると、頷くしかない。\nあれほど小さく、こどものように見えるというのに――
3190 = "Nghe kể lại như vậy, tôi chỉ biết gật gù.\nDù cô ấy nhỏ bé và trông như một đứa trẻ\nnhư thế——"

# 【双鉄】
# display as 雙鐵
# JP: 「[めいじ,1]明智45年から、百年以上だものな。\nずっと現役でいるだけでも、大変な偉業だろうに」
2507 = "「Từ năm Minh Trị 45 đến nay, đã hơn trăm\nnăm rồi mà.\nChỉ riêng việc luôn hoạt động trên tuyến\nđầu cũng đã là một kỳ tích rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そこは、冥国蒸機の強みですよね」
2623 = "「Đó chính là điểm mạnh của đầu máy hơi\nnước Mỹ đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「冥国蒸機」
2541 = "「Đầu máy hơi nước Mỹ.」"

# monologue
# JP: 言われて、そうだと思い出す。\n聞くならいまが良い機会だろう。
3350 = "Nghe vậy, tôi mới nhớ ra.\nNếu muốn hỏi thì đây chính là cơ hội tốt."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l運転体;#00ffc040;運転体%l;#;も\x%l整備体;#00ffc040;整備体%l;#;も無い、ワンボディなのには驚いた。\nあれは、冥国蒸機――いや」
1984 = "「Không có \\x%l運転体;#00ffc040;kíp lái%l;#; hay \\x%l整備体;#00ffc040;thân chính%l;#;, chỉ có\nmột cơ thể duy nhất khiến tôi rất ngạc\nnhiên.\nĐó là do đầu máy hơi nước Mỹ——không phải」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。冥国式\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の、最大の特徴です。\nそもそも、日ノ本式や詠・髑国式とは設計思想が違う」
2585 = "「Đúng vậy. Đó là đặc điểm lớn nhất của \\x%lレイルロオド;#00ffc040;Railord%l;#;\nkiểu Mỹ.\nVốn dĩ, tư tưởng thiết kế của họ đã khác\nvới kiểu Hinamoto, kiểu Anh hay kiểu Đức\nrồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。\nいったい、どのような設計思想で作られているのだ？」
2155 = "「Hô.\nRốt cuộc thì họ được chế tạo dựa trên tư\ntưởng thiết kế như thế nào?」"

# 【ポーレット】
# display as 波萊特
# JP: 「えっと――　一番簡単にいえば、大量生産、大量消費です。\n作りはシンプル。それで、互換性をとても大事にします」
2380 = "「Ừm—— Nói một cách đơn giản nhất thì là\nsản xuất hàng loạt, tiêu thụ hàng loạt.\nCấu tạo đơn giản. Vì vậy, họ rất coi trọng\ntính tương thích.」"

# 【双鉄】
# display as 雙鐵
# JP: 「互換性」
2511 = "「Tính tương thích.」"

# 【ハチロク】
# display as 八六
# JP: 「……冥国式\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、日ノ本や[えいこく,1]詠国、[どっこく,1]髑国式の\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と大きく異なり、交代乗務を常とします」
1580 = "「……\\x%lレイルロオド;#00ffc040;Railord%l;#; kiểu Mỹ khác biệt rất lớn so\nvới \\x%lレイルロオド;#00ffc040;Railord%l;#;\nkiểu Hinamoto, kiểu Anh hay kiểu Đức, họ\nthường xuyên thay ca làm nhiệm vụ ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2156 = "「哦」" 

# monologue
# JP: そういえば、オリヴィは逆に知りたがっていた。
3377 = "Nhắc mới nhớ, Olivy lại tò mò về điều\nngược lại."

# monologue
# JP: “日ノ本式――マスターシステム\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\nこれほど連携にすぐれるものか”と。
1532 = "「Nói cách khác, những \\x%lレイルロオド;#00ffc040;Railord%l;#; kiểu Mỹ như\nOlivy,\ncó thể bắt cặp với bất kỳ Master——à không,\nbất kỳ \\x%l機関士;#00ffc040;lái tàu%l;#; nào sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「つまり、オリヴィたち冥国式\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\nマスター、――いや、\x%l機関士;#00ffc040;機関士%l;#;が誰であれ、組めるのか」
2636 = "「Đúng vậy ạ. Tất nhiên, bọn em cũng có thể\nbắt cặp với bất kỳ ai\nvà hoàn thành tốt công việc ở mức tối\nthiểu, nhưng——」"

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。わたくしたちも、もちろんどなたとでも、\n最低限のお仕事はきっちりと果たせますが――」
2530 = "「Đúng vậy ạ. Tất nhiên, bọn em cũng có thể\nbắt cặp với bất kỳ ai\nvà hoàn thành tốt công việc ở mức tối\nthiểu, nhưng——」"

# monologue
# JP: ハチロクがじっと僕を見る。\nならば、続きは僕から言おう。
2963 = "Hachiroku nhìn chằm chằm vào tôi.\nVậy thì, để tôi nói tiếp phần còn lại."

# 【双鉄】
# display as 雙鐵
# JP: 「わかっている。お前が最高の性能を発揮できるのは\n僕と組んでいるときだ。そして、その逆もまた真実だ」
2386 = "「Tôi hiểu. Lúc cô có thể phát huy tối đa\nhiệu suất\nlà khi bắt cặp với tôi. Và ngược lại cũng\nđúng như vậy.」"

# 【ハチロク】
# display as 八六
# JP: 「はい」
2438 = "「Vâng.」"

# monologue
# JP: 乗務を重ね、同じ時間を重ねるうちに、\n僕たちは夫婦としてだけでなく――
3395 = "Cùng nhau làm nhiệm vụ, cùng nhau trải qua\nthời gian,\nchúng tôi không chỉ với tư cách là vợ\nchồng——"

# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;としても、\nお互いへの理解を深め続けてきた。
2907 = "Mà với tư cách là \\x%l機関士;#00ffc040;lái tàu%l;#; và \\x%lレイルロオド;#00ffc040;Railord%l;#;,\nchúng tôi cũng không ngừng thấu hiểu nhau\nsâu sắc hơn."

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまとともにあれれば。\nきっとわたくしは、どのような乗務でも」
2562 = "「Chỉ cần được ở bên ngài Soutetsu.\nThì dù là nhiệm vụ nào, em chắc chắn cũng\nsẽ làm được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ、ハチロク」
2368 = "「Tôi cũng vậy, Hachiroku.」"

# monologue
# JP: ハチロクの瞳に、僕が映る。\n僕の目に映るハチロクは、どれほど美しいことだろう。
3175 = "Hình bóng tôi phản chiếu trong đôi mắt\nHachiroku.\nHachiroku trong mắt tôi, mới xinh đẹp làm\nsao."

# 【ポーレット】
# display as 波萊特
# JP: 「で！　ですね？」
2672 = "「Thế! Nên là?」"

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「おっと」\n「あっ」
2159 = "「Ồ」\n「A」"

# 【ポーレット】
# display as 波萊特
# JP: 「冥国式のこは、そういう感じの最適化がされないんです。\nそのかわり誰とでも組めるし、どの車両にもすぐ乗れる」
2540 = "「Những cô bé kiểu Mỹ không được tối ưu hóa\ntheo kiểu như vậy.\nĐổi lại, họ có thể bắt cặp với bất kỳ ai\nvà lên bất kỳ toa xe nào ngay lập tức.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
2210 = "「À, ừm.」"

# monologue
# JP: そうだった。\nポーレットへと軽く会釈し、意識と話を元へと戻す。
3028 = "Đúng vậy.\nTôi khẽ gật đầu với Paulette, đưa tâm trí\nvà câu chuyện quay trở lại."

# 【双鉄】
# display as 雙鐵
# JP: 「互換性とは、そうした点も含めてという意味か。\n専門性を諦めて、そのかわりに汎用性を高める」
2401 = "「Tính tương thích là bao gồm cả những điểm\nđó sao.\nTừ bỏ tính chuyên môn, đổi lại là nâng cao\ntính đa dụng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。大量生産大量消費が前提ですから、\n機関車も\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、消費・交換をするものとして」
2477 = "「Đúng vậy. Vì tiền đề là sản xuất hàng\nloạt, tiêu thụ hàng loạt,\nnên cả đầu máy và \\x%lレイルロオド;#00ffc040;Railord%l;#; đều được coi là\nthứ có thể tiêu thụ và thay thế.」"

# 【双鉄】
# display as 雙鐵
# JP: 「専用設計を採らず、ボディもワンボディで済ませる。\n……安全面ではどうなのか、そこがいささか不安だが」
2409 = "「Không áp dụng thiết kế chuyên dụng, cơ\nthể cũng chỉ cần một là đủ.\n……Về mặt an toàn thì sao nhỉ, chỗ đó hơi\nđáng lo ngại.」"

# 【ポーレット】
# display as 波萊特
# JP: 「冥国では、それで十分なんだと思います。\n国土も広大で、輸送密度も相当に薄いはずですし」
2389 = "「Ở Mỹ, như vậy chắc là đủ rồi.\nLãnh thổ rộng lớn, mật độ vận chuyển chắc\nchắn cũng khá thưa thớt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。合理的……といえば極めて合理的だ。\nその視点に立てば逆に、日ノ本式の欠点も見えてくる」
2084 = "「Ra vậy. Hợp lý…… có thể nói là cực kỳ hợp\nlý.\nĐứng từ góc độ đó, ngược lại cũng thấy\nđược nhược điểm của kiểu Hinamoto.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですね」
# 2438 = "「是的」" 

# monologue
# JP: 車両を失くした\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を失くした車両。
3050 = "\\x%lレイルロオド;#00ffc040;Railord%l;#; mất đi toa xe.\nToa xe mất đi \\x%lレイルロオド;#00ffc040;Railord%l;#;."

# monologue
# JP: 日ノ本式では、そのほとんどが廃用を余儀なくされる。\nけれども冥国式ならば、再活用に困らない。
3115 = "Ở kiểu Hinamoto, hầu hết đều buộc phải bỏ\nđi.\nNhưng nếu là kiểu Mỹ, thì không cần lo\nlắng về việc tái sử dụng."

# 【ハチロク】
# display as 八六
# JP: 「ですが、鉄道輸送で最優先されるべきは常に安全です。\n長期的にみれば、日ノ本式の長所は際立つものかと」
2503 = "「Nhưng mà, ưu tiên hàng đầu trong vận tải\nđường sắt luôn là an toàn.\nNhìn về lâu dài, ưu điểm của kiểu Hinamoto\nsẽ nổi bật hơn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。それが、日ノ本人の一般的な感覚にも[がっち,1]合致\n――ああ、いや」
2454 = "「Đúng vậy. Điều đó cũng phù hợp với cảm\nnhận chung của người Hinamoto\n——à, không.」"

# monologue
# JP: 言葉を止めた瞬間に、\nハチロクとポーレットとが同時に頷く。
3118 = "Ngay khoảnh khắc tôi ngừng lời,\nHachiroku và Paulette đồng thời gật đầu."

# monologue
# JP: やはり、そうか。
3234 = "Quả nhiên là vậy sao."

# 【双鉄】
# display as 雙鐵
# JP: 「だから、冥国式の蒸機と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とは、\n日ノ本式のお手本にはなれなかったというわけか」
2399 = "「Nên đầu máy hơi nước và \\x%lレイルロオド;#00ffc040;Railord%l;#; kiểu Mỹ,\nđã không thể trở thành hình mẫu cho kiểu\nHinamoto sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。国は[えいこく,1]詠国式をお手本にしましたし、大手私鉄も\n[どっこく,1]髑国や詠国が主流。[めいこく,1]冥国式は、そもそも少数派でした」
2437 = "「Vâng. Quốc gia đã lấy kiểu Anh làm hình\nmẫu, các tuyến đường sắt tư nhân lớn\ncũng chủ yếu dùng kiểu Đức và Anh. Kiểu Mỹ\nvốn dĩ đã là thiểu số rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「開拓当初の北開道は、広大な土地と低い輸送密度ゆえに、冥国式をお手本として採用したとも聞いておりますが」
2388 = "「Em cũng nghe nói rằng ở Hokkaido thời kỳ\nđầu khai phá, do đất đai rộng lớn và mật\nđộ vận chuyển thấp nên họ đã áp dụng kiểu\nMỹ làm hình mẫu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。もとから特徴が際立つゆえの少数派であったのか。\nしかし、その中で100年以上もオリヴィは生き残った」
2231 = "「Hừm. Ra là thiểu số vì đặc điểm quá nổi\nbật ngay từ đầu sao.\nNhưng trong số đó, Olivy đã tồn tại được\nhơn 100 năm.」"

# 【ハチロク】
# display as 八六
# JP: 「見事なことと存じます。単なる幸運やめぐり合わせでは、\n決して果たし得ぬことであるかと」
2627 = "「Thật đáng ngưỡng mộ ạ. Nếu chỉ đơn thuần\nlà may mắn hay tình cờ,\nthì chắc chắn không thể nào làm được như\nvậy.」"

# monologue
# JP: ハチロクの素直な賞賛に、\nポーレットは強い頷きで応える。
3259 = "Trước lời khen ngợi chân thành của\nHachiroku,\nPaulette gật đầu mạnh mẽ đáp lại."

# 【ポーレット】
# display as 波萊特
# JP: 「Ⅸ号は、俗に言う[あたりがま,2]当り罐なんですよ。\n大量生産の品質のブレが、時々、大当たりを産むんです」
2014 = "「Đầu máy số 9 là thứ mà người ta thường\ngọi là Lò hơi trúng thưởng đấy.\nSự chênh lệch chất lượng trong sản xuất\nhàng loạt đôi khi lại tạo ra những giải\nđộc đắc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。であろうな」
2244 = "「Hừm. Chắc là vậy.」"

# monologue
# JP: ……大量生産・大量消費であるのなら、\n当然、解体部品も大量に発生するはずだ。
1541 = "……Nếu đã là sản xuất hàng loạt, tiêu thụ\nhàng loạt,\nthì tất nhiên cũng sẽ có một lượng lớn\nlinh kiện tháo dỡ."

# monologue
# JP: そうしたものから最上を選りすぐり交換すれば、\n生き残った“当り罐”の輝きも更に増そうし――
3308 = "Nếu chọn lọc những thứ tốt nhất từ đó để\nthay thế,\nthì ánh hào quang của Lò hơi trúng thưởng\nsống sót sẽ càng thêm rực rỡ——"

# 【双鉄】
# display as 雙鐵
# JP: 「それに、オリヴィの性格も大いに影響しているだろうな。\n明るくさっぱり、引きずらないで」
2548 = "「Hơn nữa, tính cách của Olivy chắc cũng\nảnh hưởng rất lớn.\nTươi sáng, dứt khoát, không để bụng.」"

# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
# 2202 = "「啊！？」" 

# monologue
# JP: ハチロクの声に、ぎょっとする。\nなにか、強い――恐怖のような何かを、感じた気がして。
2962 = "Giọng nói của Hachiroku khiến tôi giật\nmình.\nCảm giác như có một thứ gì đó mãnh\nliệt——giống như nỗi sợ hãi vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ハチロク」
2356 = "「Sao vậy? Hachiroku.」"

# monologue
# JP: 聞いた瞬間、思い出す。\nそういえば、さっきハチロクは――
3349 = "Khoảnh khắc nghe thấy, tôi chợt nhớ ra.\nNhắc mới nhớ, lúc nãy Hachiroku đã hỏi——"

# monologue
# JP: “オリヴィが、みかん鉄道でどう扱われていたのか”を\n――っ！
1528 = "\"Olivy đã bị đối xử như thế nào ở Đường\nsắt Mikan\"\n——っ!"

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィから、なにか――\n例えば、過去に関する\x%l共感;#00ffc040;共感%l;#;などを受け取ったのか？」
2039 = "「Cô đã nhận được gì đó từ Olivy——\nví dụ như \\x%l共感;#00ffc040;cộng cảm%l;#; về quá khứ chẳng hạn?」"

# 【ハチロク】
# display as 八六
# JP: 「……オリヴィは、ずっと\x%l共感;#00ffc040;共感%l;#;を閉ざしております」
1572 = "「……Olivy, luôn đóng kín \\x%l共感;#00ffc040;cộng cảm%l;#; ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ずっと？」
1978 = "「Luôn đóng kín sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　れいなもそういってました！\nそこのところは、すごくあのこも気にしてて」
2200 = "「A! Reina cũng nói vậy đấy!\nCon bé cũng rất bận tâm về chuyện đó.」"

# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;を閉ざす――とは、\n心を閉ざすのとおんなじような感覚だろうか？
3390 = "Đóng kín \\x%l共感;#00ffc040;cộng cảm%l;#;——\ncó giống như cảm giác đóng kín trái tim\nkhông nhỉ?"

# monologue
# JP: そう考れば、強い違和感が湧き上がってくる。\nあの明るさと芯の強さが、閉ざした心からなどと――
3163 = "Nghĩ vậy, một cảm giác không tự nhiên mãnh\nliệt trào dâng trong tôi.\nSự tươi sáng và kiên cường đó, lại xuất\nphát từ một trái tim đóng kín sao——"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。あるいは、\x%l共感;#00ffc040;共感%l;#;能力の不調などでは？\nあれだけ古い\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ともなると」
2217 = "「À. Hoặc có thể là do năng lực \\x%l共感;#00ffc040;cộng cảm%l;#; bị\ntrục trặc chăng?\nDù sao cũng là một \\x%lレイルロオド;#00ffc040;Railord%l;#; cũ như vậy\nrồi.」"

# 【ポーレット】
# display as 波萊特＆八六
# JP: 「っ！」\n「いえっ！」
2629 = "「っ!」\n「Không phải đâu ạ!」"

# monologue
# JP: 同時に、とても過敏な反応。\nけれど、全く正反対の。
2938 = "Cả hai đồng thời phản ứng rất nhạy cảm.\nNhưng lại hoàn toàn trái ngược nhau."

# monologue
# JP: ポーレットの顔はうつむいて、\nハチロクの目は、まっすぐ強く、僕を捉える。
3261 = "Paulette cúi gầm mặt xuống,\ncòn ánh mắt Hachiroku thì nhìn thẳng vào\ntôi một cách mạnh mẽ."

# 【ハチロク】
# display as 八六
# JP: 「オリヴィに、\x%l共感;#00ffc040;共感%l;#;能力はございます。添乗のときは、\n最低限の情報共有はもちろんおこなっておりましたし」
2285 = "「Olivy có năng lực \\x%l共感;#00ffc040;cộng cảm%l;#; ạ. Khi đi theo\ntàu,\ntất nhiên chúng em đã thực hiện chia sẻ\nthông tin ở mức tối thiểu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはそうか」
2205 = "「À, ra là vậy.」"

# 【ハチロク】
# display as 八六
# JP: 「それに――あわや衝突のあの一瞬。\nあの一瞬には、オリヴィちゃんの方から、\x%l共感;#00ffc040;共感%l;#;を」
2545 = "「Hơn nữa——trong khoảnh khắc suýt va chạm\nđó.\nKhoảnh khắc đó, chính Olivy đã truyền \\x%l共感;#00ffc040;cộng cảm%l;#;\nđến.」"

# monologue
# JP: ポーレットの妙な反応も気にはかかるが、\nハチロクの方が、やはり気になる。
3399 = "Phản ứng kỳ lạ của Paulette cũng khiến tôi\nbận tâm,\nnhưng chuyện của Hachiroku vẫn khiến tôi\nlo lắng hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「なんとだ？」
2048 = "「Nội dung là gì?」"

# 【ハチロク】
# display as 八六
# JP: 「詠語で“オフ・ザ・ライト”と。\nその意味と理由ごと、わたくしに伝わってまいりました」
2563 = "「Bằng tiếng Anh là \"Off the light\".\nCả ý nghĩa và lý do đều được truyền đến em\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、だから前照灯をとっさに消灯してくれたのか」
2216 = "「À, ra đó là lý do cô tắt đèn pha ngay lập\ntức sao.」"

# monologue
# JP: 理解はそのまま、オリヴィへの好感になる。
3396 = "Sự thấu hiểu đó lập tức biến thành thiện\ncảm dành cho Olivy."

# monologue
# JP: 自分の手柄をさりげなく、ハチロクの手柄としてくれた\n――その気遣いは、ささやかゆえに心地よい。
2896 = "Cô ấy đã khéo léo nhường công lao của mình\ncho Hachiroku\n——sự tinh tế đó, tuy nhỏ nhặt nhưng lại\nrất dễ chịu."

# 【ハチロク】
# display as 八六
# JP: 「そうして、同時に――感情も」
2551 = "「Và đồng thời——cả cảm xúc nữa ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！！？」
2020 = "「!!?」"

# monologue
# JP: 重い声。\nくっと、ハチロクが唇を噛む。
2950 = "Giọng nói nặng nề.\nHachiroku cắn chặt môi."

# monologue
# JP: そのまま数秒、うつむいて――\nやがてのろのろ、絞りだすような声を出す。
3091 = "Cô ấy cúi đầu như vậy vài giây——\nrồi chậm rãi cất giọng như cố vắt kiệt\ntừng chữ."

# 【ハチロク】
# display as 八六
# JP: 「真っ黒くまとわりつくような感情が――\nわたくしさえも知らないような――」
2668 = "「Một cảm xúc đen tối đeo bám dai dẳng——\nmà ngay cả em cũng chưa từng biết đến——」"

# monologue
# JP: ハチロクの体が小さく震える。\nゆえ、その肩を抱き寄せる。
2953 = "Cơ thể Hachiroku khẽ run lên.\nTôi liền ôm lấy bờ vai cô ấy."

# monologue
# JP: ハチロクは小さく息を吐き。\nそれから静かに、僕を見上げて、言葉をつなぐ。
2956 = "Hachiroku khẽ thở ra.\nSau đó, cô ấy tĩnh lặng ngước nhìn tôi và\nnói tiếp."

# 【ハチロク】
# display as 八六
# JP: 「恐らくは、どのような言葉にさえも出来ぬほどの。\n深く、濃く。黒く、底知れぬ――絶望が」
2362 = "「Có lẽ là một cảm xúc không thể diễn tả\nbằng bất kỳ ngôn từ nào.\nSâu thẳm, đặc quánh. Đen tối, không\nđáy——đó là sự tuyệt vọng.」"
