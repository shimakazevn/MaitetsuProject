3397 = "Cùng với sự tỉnh táo, \\nnhững giấc mơ và ký ức dần thay chỗ cho nhau."

# monologue
# JP: そうだ、昨日……\nオリヴィ――新しい\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が――
3038 = "Đúng rồi, ngày hôm qua……\\nOlivia――\\x%lRailord;#00ffc040;Railord%l;#; mới――"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「すごーいヒビキ！　卵わるの上手ー！」
2411 = "「Tuyệt thật đấy Hibiki! Cậu đập trứng giỏi quá!」"

# 【日々姫】
# display as 日日姬
# JP: 「えー、このくらい普通だよー」
2452 = "「Hì hì, thế này thì cũng thường thôi mà~」"

# 【ハチロク】
# display as 八六
# JP: 「いえ、\n日々姫の卵扱いは、とても鮮やかだと、わたくしも」
2008 = "「Không đâu, \\nHibiki xử lý trứng rất khéo léo, tôi cũng nghĩ vậy」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2156 = "「Ồ」"

# monologue
# JP: 明るい声だ。ホっとする。\n台所へ向う足取りも小走りになる。
3311 = "Một giọng nói tươi vui. Thật nhẹ nhõm. \\nBước chân ta cũng trở nên vội vã hơn khi hướng về phía nhà bếp."

# 【双鉄】
# display as 雙鐵
# JP: 「おはよう、みんな」
2269 = "「Chào buổi sáng, mọi người.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま！　おはようございます」
2688 = "「Soutetsu-sama! Chào buổi sáng ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「おはようにぃに」
2678 = "「Chào buổi sáng, Nii-ni.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ」
2177 = "「Á.」"

# monologue
# JP: いきなり入って声をかけたのがまずかったのか、\nオリヴィは怯えたような顔を――うむ？
2894 = "Không biết có phải do mình đường đột bước vào và cất tiếng hay không mà,\\nOli có vẻ sợ hãi――hửm?"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「おはよう！　あなたがソーテツサマだよねっ？」
2417 = "「Chào buổi sáng! Anh chính là Soutetsu-sama đúng không?」"

# monologue
# JP: さっきの顔は目の錯覚か？　と思うほど、\nオリヴィの表情も声も明るい。
3239 = "Oli tươi tỉnh cả mặt lẫn giọng đến mức mình cứ ngỡ biểu cảm vừa rồi chỉ là ảo giác.\\n"

# monologue
# JP: 自己紹介は昨日すませたつもりだったが……\nあのときのオリヴィは、それどころではなかったのだろう。
3181 = "Mình cứ tưởng đã giới thiệu xong xuôi từ hôm qua rồi chứ...\\nChắc là lúc đó Oli không còn tâm trí đâu mà quan tâm đến chuyện đó nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。改めて自己紹介をさせてもらおう。\n御一夜へようこそ、オリヴィ。僕は右田双鉄だ」
2238 = "「À phải. Để anh giới thiệu lại một lần nữa nhé.\\nChào mừng đến với Hitoyoshi, Oli. Anh là Migita Soutetsu.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがとう！　ソーテツサマ。\nオリヴィは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;で、今はⅨ号と組んでる。で！」
2589 = "「Cảm ơn anh! Soutetsu-sama.\\nOli là \\x%lRailord;#00ffc040;Railord%l;#;, hiện đang phối hợp với Unit 09. Và!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？」
2631 = "「Cái gì!?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ゆうべはほんっと！　ごめんなさい！！！」
2424 = "「Chuyện tối qua thật sự! Em xin lỗi anh rất nhiều!!!」"

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！？　なにもそんな」
2288 = "「Oli-chan!? Không cần phải đến mức đó đâu...」"

# 【日々姫】
# display as 日日姬
# JP: 「いけんよ、ハチロク」
2622 = "「Không được đâu, Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「え？」
2128 = "「Hả?」"

# monologue
