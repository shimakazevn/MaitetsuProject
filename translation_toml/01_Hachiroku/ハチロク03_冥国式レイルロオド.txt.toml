# lines: 507 
# 【双鉄】
# display as 雙鐵
# JP: 「……む？」
1566 = "「……Ưm?」"

# monologue
# JP: いつもと違う目覚めに戸惑い、しばし遅れて思い出す。
2883 = "Bối rối vì thức dậy ở một nơi khác với mọi\nkhi, mất một lúc tôi mới nhớ ra."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか――日々姫の部屋か」
2320 = "「Ra vậy——là phòng của Hibiki.」"

# monologue
# JP: 覚醒とともにゆるゆると、\nまどろみと記憶が入れ替わっていく。
3397 = "Cùng với sự tỉnh táo dần dần,\ncơn ngái ngủ và ký ức đang hoán đổi cho\nnhau."

# monologue
# JP: そうだ、昨日……\nオリヴィ――新しい\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が――
3038 = "Đúng rồi, hôm qua……\nOlivy——\\x%lレイルロオド;#00ffc040;Railord%l;#; mới đã——"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「すごーいヒビキ！　卵わるの上手ー！」
2411 = "「Tuyệt quá Hibiki! Đập trứng giỏi ghê!」"

# 【日々姫】
# display as 日日姬
# JP: 「えー、このくらい普通だよー」
2452 = "「Ể, cỡ này là bình thường thôi á~」"

# 【ハチロク】
# display as 八六
# JP: 「いえ、\n日々姫の卵扱いは、とても鮮やかだと、わたくしも」
2008 = "「Không đâu,\ncách Hibiki xử lý trứng rất điêu luyện, em\ncũng thấy vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2156 = "「Ồ.」"

# monologue
# JP: 明るい声だ。ホっとする。\n台所へ向う足取りも小走りになる。
3311 = "Giọng nói thật tươi sáng. Tôi thở phào nhẹ\nnhõm.\nBước chân hướng về phía nhà bếp cũng trở\nnên thoăn thoắt hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「おはよう、みんな」
2269 = "「Chào buổi sáng, mọi người.」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま！　おはようございます」
2688 = "「Ngài Soutetsu! Chào buổi sáng ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「おはようにぃに」
2678 = "「Chào buổi sáng anh hai.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ」
2177 = "「A.」"

# monologue
# JP: いきなり入って声をかけたのがまずかったのか、\nオリヴィは怯えたような顔を――うむ？
2894 = "Không biết có phải do tôi đột ngột bước\nvào và cất tiếng gọi hay không,\nmà Olivy lộ vẻ mặt sợ sệt——ưm?"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「おはよう！　あなたがソーテツサマだよねっ？」
2417 = "「Chào buổi sáng! Anh là ngài Soutetsu đúng\nkhông?」"

# monologue
# JP: さっきの顔は目の錯覚か？　と思うほど、\nオリヴィの表情も声も明るい。
3239 = "Đến mức khiến tôi tự hỏi liệu vẻ mặt vừa\nrồi có phải là ảo giác không,\nbiểu cảm và giọng nói của Olivy đều rất\ntươi sáng."

# monologue
# JP: 自己紹介は昨日すませたつもりだったが……\nあのときのオリヴィは、それどころではなかったのだろう。
3181 = "Tôi cứ nghĩ hôm qua đã giới thiệu bản thân\nxong rồi……\nNhưng có lẽ lúc đó Olivy không còn tâm trí\nnào để để ý."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。改めて自己紹介をさせてもらおう。\n御一夜へようこそ、オリヴィ。僕は右田双鉄だ」
2238 = "「À. Để anh giới thiệu lại bản thân nhé.\nChào mừng đến Ohito, Olivy. Anh là Migita\nSoutetsu.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがとう！　ソーテツサマ。\nオリヴィは\x%lレイルロオド;#00ffc040;レイルロオド%l;#;で、今はⅨ号と組んでる。で！」
2589 = "「Cảm ơn anh! Ngài Soutetsu.\nOlivy là \\x%lレイルロオド;#00ffc040;Railord%l;#;, hiện đang phụ trách Đầu\nmáy số 9. Và!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？」
2631 = "「Cái!?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ゆうべはほんっと！　ごめんなさい！！！」
2424 = "「Tối hôm qua thật sự! Xin lỗi mọi người\nạ!!!」"

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！？　なにもそんな」
2288 = "「Bé Olivy!? Không cần phải thế đâu.」"

# 【日々姫】
# display as 日日姬
# JP: 「いけんよ、ハチロク」
2622 = "「Không được đâu, Hachiroku.」"

# 【ハチロク】
# display as 八六
# JP: 「え？」
2128 = "「Hả?」"

# monologue
# JP: オリヴィが深々と下げる頭を、とっさにハチロクは\n止めようとして、しかし日々姫にたしなめられる。
3080 = "Olivy cúi gập đầu thật sâu, Hachiroku định\nvội vàng ngăn lại, nhưng lại bị Hibiki\nnhắc nhở."

# 【日々姫】
# display as 日日姬
# JP: 「こいば、かばったらいけんとこ」
2624 = "「Lúc này, không được bao che đâu á.」"

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 2177 = "「啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、カンジョーテキになっちゃって。\nカンゲーカイも、準備してくれてたってきいて」
2281 = "「Olivy, đã quá cảm xúc rồi.\nNghe nói mọi người còn chuẩn bị cả tiệc\nchào mừng nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。昨日の態度はよくなかった」
2428 = "「Đúng vậy. Thái độ hôm qua của em không\ntốt đâu.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あぅうっ」
2195 = "「A ư ư.」"

# monologue
# JP: かわいそうなくらいうろたえる。
3101 = "Em ấy hoảng hốt đến đáng thương."

# monologue
# JP: 怯えさせるつもりは全くないので、\nあわてて続く言葉を継ぎ足す。
2925 = "Tôi hoàn toàn không có ý định làm em ấy\nsợ,\nnên vội vàng nói thêm."

# 【双鉄】
# display as 雙鐵
# JP: 「が、それが自覚できているのならば問題なかろう。\n出社したら、ポーレットたちにも謝るといい」
2005 = "「Nhưng, nếu em đã tự nhận thức được điều\nđó thì không sao.\nLúc đến công ty, hãy xin lỗi cả nhóm\nPaulette nữa nhé.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」　
2235 = "「Vâng!」"

# monologue
# JP: 今度はパアッと、笑顔に変わる。
3088 = "Lần này, khuôn mặt em ấy bừng sáng, chuyển\nsang nụ cười."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがとー！　わかった！\nオリヴィぜったいそーするね！　ソーテツサマっ！」
2588 = "「Cảm ơn anh! Em biết rồi!\nOlivy chắc chắn sẽ làm vậy! Ngài\nSoutetsu!」"

# monologue
# JP: あまりにわかりやすい反応に、\n僕もつられて笑ってしまう。
3372 = "Trước phản ứng quá đỗi dễ đoán đó,\ntôi cũng bất giác bật cười theo."

# 【双鉄】
# display as 雙鐵
# JP: 「様付けはいらん。恐らく[きょうどう,1]教導\x%l機関士;#00ffc040;機関士%l;#;こそは務めようが、\n僕がオリヴィのマスターになるわけではないしな」
2327 = "「Không cần thêm chữ ngài đâu. Có lẽ anh sẽ\nlàm \\x%l機関士;#00ffc040;lái tàu%l;#; hướng dẫn,\nnhưng anh không phải là Master của Olivy\nđâu.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなんだ！」
2446 = "「Ra là vậy!」"

# monologue
# JP: あからさまにホッとしている反応と声。
3094 = "Một phản ứng và giọng điệu thở phào nhẹ\nnhõm rõ rệt."

# monologue
# JP: 気づかぬところで、なにかオリヴィに嫌われたかと、\n一瞬不安にさせられる。
3189 = "Khiến tôi thoáng bất an,\nkhông biết mình có làm gì khiến Olivy ghét\nmà không nhận ra không."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、ソーテツサマのことなんて呼べばいい？\nミギタ\x%l機関士;#00ffc040;機関士%l;#;？　ソーテツサン？」
2663 = "「Vậy, em nên gọi ngài Soutetsu là gì đây?\n\\x%l機関士;#00ffc040;Người lái tàu%l;#; Migita? Anh Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ――そうだな」
2225 = "「Ưm——xem nào.」"

# monologue
# JP: が、そういうことでも無いらしい。\nオリヴィのニコニコ顔には邪気のかけらも感じられない。
2927 = "Nhưng, có vẻ không phải vậy.\nTrên khuôn mặt tươi cười của Olivy không\nhề có chút ác ý nào."

# monologue
# JP: むしろ一瞬、邪推に近い感覚をもってしまった自分を、\n恥じ入る気持ちにさえさせられる。
2919 = "Ngược lại, tôi còn cảm thấy xấu hổ,\nvì bản thân đã thoáng có suy nghĩ gần như\nlà suy diễn ác ý."

# 【双鉄】
# display as 雙鐵
# JP: 「右田では日々姫と混同するゆえ、\n公的な場では、双鉄\x%l機関士;#00ffc040;機関士%l;#;で頼む」
2107 = "「Gọi Migita thì sẽ nhầm với Hibiki mất,\nnên ở những nơi công cộng, cứ gọi anh là \\x%l機関士;#00ffc040;người lái tàu%l;#;\nSoutetsu nhé.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツ\x%l機関士;#00ffc040;機関士%l;#;。じゃ、ヒビキはヒビキ\x%l機関士;#00ffc040;機関士%l;#;？」
2679 = "「\\x%l機関士;#00ffc040;Người lái tàu%l;#; Soutetsu. Vậy, Hibiki là \\x%l機関士;#00ffc040;người lái tàu%l;#;\nHibiki hả?」"

# 【日々姫】
# display as 日日姬
# JP: 「あはっ！　オッケー、仕事場でもよろしくね？\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィ」
2192 = "「A ha! OK, ở chỗ làm cũng mong được giúp\nđỡ nha?\n\\x%lレイルロオド;#00ffc040;Railord%l;#; Olivy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「リョーカイ！　ヒビキ\x%l機関士;#00ffc040;機関士%l;#;！！」
2420 = "「Đã rõ! \\x%l機関士;#00ffc040;Người lái tàu%l;#; Hibiki!!」"

# monologue
# JP: ……オリヴィと日々姫の相性はかなりよさそうだ。\nいくらか心が軽くなる。
1545 = "……Có vẻ Olivy và Hibiki khá hợp nhau.\nLòng tôi cũng nhẹ nhõm đi phần nào."

# 【双鉄】
# display as 雙鐵
# JP: 「ではそれで。\n私的な場では、好きに呼んでくれてかまわない」
2470 = "「Vậy quyết định thế nhé.\nCòn ở những nơi riêng tư, em muốn gọi sao\ncũng được.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！　じゃ、ソーテツとヒビキでっ！\n乗務のときはソーテツ\x%l機関士;#00ffc040;機関士%l;#;とヒビキ\x%l機関士;#00ffc040;機関士%l;#;っ！」
2709 = "「OK! Vậy, gọi là Soutetsu và Hibiki nha!\nKhi làm nhiệm vụ thì là \\x%l機関士;#00ffc040;người lái tàu%l;#;\nSoutetsu và \\x%l機関士;#00ffc040;người lái tàu%l;#; Hibiki!」"

# 【日々姫】
# display as 日日姬
# JP: 「私もそれで大歓迎！\nあらためてよろしくね、オリヴィ！」
2370 = "「Chị cũng rất hoan nghênh cách gọi đó!\nMột lần nữa mong được giúp đỡ nhé, Olivy!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「よろしくっ、ヒビキ！」
2587 = "「Mong được giúp đỡ nha, Hibiki!」"

# monologue
# JP: （パンっ！）
3429 = "（Đập tay!）"

# 【オリヴィ】
# display as 奥莉薇＆日日姬
# JP: 「イェイ！」\n「いぇいっ！」
2554 = "「Yeah!」\n「Yeah!」"

# monologue
# JP: 息もぴったりなハイタッチ。
2937 = "Một cú đập tay cực kỳ ăn ý."

# monologue
# JP: 凪もⅨ号の\x%l機関士;#00ffc040;機関士%l;#;になりたがっているが、\nこの相性が乗務に活きれば、日々姫が優勢かもしれん。
3108 = "Nagi cũng muốn trở thành \\x%l機関士;#00ffc040;người lái tàu%l;#; của\nĐầu máy số 9,\nnhưng nếu sự ăn ý này được phát huy trong\ncông việc, thì Hibiki có thể sẽ chiếm ưu\nthế hơn."

# 【ハチロク】
# display as 八六
# JP: 「あの……オリヴィちゃん？」
2581 = "「À ừm……bé Olivy?」"

# monologue
# JP: おずおずと、ハチロクがオリヴィに呼びかける。
2949 = "Hachiroku rụt rè gọi Olivy."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なに？」
2021 = "「Gì vậy?」"

# monologue
# JP: ギョっとする。\nオリヴィの返事はいかにもイヤイヤだ。
3134 = "Tôi giật mình.\nCâu trả lời của Olivy nghe rõ vẻ miễn\ncưỡng."

# monologue
# JP: が、ハチロクはひるまない。
3007 = "Nhưng, Hachiroku không hề chùn bước."

# 【ハチロク】
# display as 八六
# JP: 「わたくしのことは――\nその……呼び名は」
2661 = "「Còn em thì——\nờm……cách gọi là gì ạ.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチロクはハチロクでいーでしょ？　オリヴィの方が、\nけっこーセンパイの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なんだから」
2053 = "「Hachiroku thì cứ là Hachiroku thôi chứ\nsao? Dù sao thì Olivy,\ncũng là \\x%lレイルロオド;#00ffc040;Railord%l;#; tiền bối của em mà.」"

# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
2202 = "「A!?」"

# monologue
# JP: 困惑、狼狽、哀しみ――反省。\nハチロクの顔が、見る間に、さまざまに変化していく。
3047 = "Bối rối, lúng túng, buồn bã——rồi tự kiểm\nđiểm.\nKhuôn mặt Hachiroku biến đổi liên tục\ntrong nháy mắt."

# monologue
# JP: ああ、そうか、昨日のあの――凪にさえわかった――\n“こども扱い”を、オリヴィは怒っているのか。
3032 = "A, ra là vậy, chuyện hôm qua——đến cả Nagi\ncũng nhận ra——\nOlivy đang tức giận vì bị \"đối xử như trẻ\ncon\" sao."

# 【ハチロク】
# display as 八六
# JP: 「あの、わたくし――そのようなつもりでは。\nただ、昨晩の泣いている姿が……あまりに、か弱くて」
2621 = "「À ừm, em——không có ý đó đâu ạ.\nChỉ là, dáng vẻ khóc lóc đêm qua của\nchị……trông quá đỗi mỏng manh.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あうっ――\nそれは……まぁ、そー見えちゃうよね、うん」
2194 = "「A ư——\nChuyện đó……chà, trông cũng giống vậy thật\nnhỉ, ừm.」"

# 【ハチロク】
# display as 八六
# JP: 「ですから、ついつい。けれど、侮辱するつもりなど、\n決してございませんでした。どうぞ、ご容赦ください」
2260 = "「Do đó, em mới lỡ lời. Nhưng, em tuyệt đối\nkhông có ý,\nxúc phạm chị đâu ạ. Xin chị hãy lượng thứ\ncho em.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あう～っ、そんなに謝られちゃうと――\nゆうべはオリヴィ……よくなかったって自分で思うし」
2197 = "「A ư~, em xin lỗi nhiều như vậy thì——\nTối qua Olivy……chị cũng tự thấy mình không\ntốt mà.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら、どうぞ仲直りしていただけますと嬉しいです。\nいかがでしょう？　オリヴィさん」
2396 = "「Nếu vậy, em sẽ rất vui nếu chúng ta có\nthể làm hòa ạ.\nChị thấy sao ạ? Chị Olivy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん……別に、オリヴィ。\nその辺、ちょっとちゃんとしときたかっただけだし」
2224 = "「Ừm……Olivy cũng không có ý gì đâu.\nChỉ là, muốn làm rõ chuyện đó một chút\nthôi.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁよかった！」
2650 = "「Chà, may quá!」"

# monologue
# JP: 安心したような笑顔を浮かべ、\nハチロクはスっと右手を差し出す。
2955 = "Nở nụ cười nhẹ nhõm,\nHachiroku nhanh chóng đưa tay phải ra."

# 【ハチロク】
# display as 八六
# JP: 「それでは、乗務でも、プライベエトでも。\nこれから、改めてよろしくお願いいたしますね？」
2635 = "「Vậy thì, dù là trong công việc hay đời\ntư.\nTừ nay về sau, một lần nữa mong chị giúp\nđỡ nhé?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！　よろしくっ」
2305 = "「Biết rồi! Mong được giúp đỡ nha.」"

# monologue
# JP: そういって。けれどもハチロクが笑顔で差し出した手を、\nオリヴィはまだ受け取ろうとしない。
3074 = "Nói vậy. Nhưng Olivy vẫn chưa chịu nắm\nlấy,\nbàn tay mà Hachiroku đang mỉm cười đưa ra."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど、一緒に乗務なんてしないでしょ？\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;同士なんだし」
2006 = "「Nhưng mà, chúng ta đâu có làm nhiệm vụ\ncùng nhau đâu nhỉ?\nVì đều là \\x%lレイルロオド;#00ffc040;Railord%l;#; mà.」"

# 【ハチロク】
# display as 八六
# JP: 「え――」
2122 = "「Hả——」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、湯医線の習熟運転には、ハチロクも同乗する。\nみかん鉄道では、先任\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の同乗は無いのか？」
2449 = "「Không, trong chuyến chạy làm quen Tuyến\nYui, Hachiroku cũng sẽ đi cùng.\nỞ Đường sắt Mikan, không có chuyện \\x%lレイルロオド;#00ffc040;Railord%l;#;\ntiền nhiệm đi cùng sao?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！！！！」
2167 = "「!!!!」"

# monologue
# JP: びくりとオリヴィの背筋が伸びる。\nまなざしに必死の光が宿る。
3085 = "Olivy giật mình thẳng lưng lên.\nÁnh mắt lóe lên tia sáng tuyệt vọng."

# monologue
# JP: いかん、これは……オリヴィからしてみたら、\nみかん鉄道を軽視したように聞こえたのかも――
3030 = "Tiêu rồi, chuyện này……đối với Olivy mà\nnói,\ncó lẽ nghe như tôi đang coi thường Đường\nsắt Mikan vậy——"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなことない！　みかん鉄道でもちゃんとやってた！\nええと、今のは――今のは、その、オリヴィっ、えとっ」
2357 = "「Không phải vậy đâu! Ở Đường sắt Mikan\ncũng làm đàng hoàng mà!\nỜm, vừa nãy là——vừa nãy là, ờm, Olivy,\nờm.」"

# 【ハチロク】
# display as 八六
# JP: 「そもそもわたくしがいけないのです。先輩である\nオリヴィさんに対し、失礼な振る舞いをしてしまって」
2582 = "「Vốn dĩ là do em không tốt. Em đã có thái\nđộ thất lễ,\nvới một tiền bối như chị Olivy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！！」
2165 = "「!!」"

# monologue
# JP: まずいと感じ、その瞬間に理解がひらめく。
3177 = "Tôi cảm thấy không ổn, và ngay khoảnh khắc\nđó, tôi đã chợt hiểu ra."

# monologue
# JP: （ああ――そうか、トップナンバーであるゆえか）
3426 = "（A——ra là vậy, vì em ấy là chiếc đầu tiên\nsao.）"

# monologue
# JP: 国産量産第一号機\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、\n栄えある帝鉄8620形の、トップナンバー・\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。
3359 = "\\x%lレイルロオド;#00ffc040;Railord%l;#; chiếc đầu tiên, của mẫu 8620 thuộc\nĐường sắt Hoàng gia đầy vinh quang,\nchiếc \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; sản xuất hàng loạt\ntrong nước đầu tiên."

# monologue
# JP: ゆえハチロクは『理想的な長姉』であることを望まれて、\n自らも望んで、実際にそう振る舞い続けてきたのだろう。
3210 = "Vì thế, Hachiroku được kỳ vọng sẽ trở\nthành \"người chị cả lý tưởng\",\nbản thân em ấy cũng mong muốn như vậy, và\nthực tế đã luôn cư xử như thế."

# 【ハチロク】
# display as 八六
# JP: 「それがオリヴィさんを苛立たせてしまっただけで――\nですからきっと、ご本心からの言葉ではないと存じます」
2028 = "「Điều đó chỉ làm chị Olivy thêm bực bội\nthôi——\nDo đó em tin chắc, đó không phải là những\nlời thật lòng của chị đâu ạ.」"

# monologue
# JP: だから自然と、こうした振る舞い、物言いになる。\n思い返せば、れいなや、ナビに接するときでもそうだ。
3195 = "Nên tự nhiên, em ấy lại có cách cư xử và\nnói năng như vậy.\nNghĩ lại thì, ngay cả khi tiếp xúc với\nReina hay Navi cũng thế."

# monologue
# JP: （妹たちを導きかばい、ときとしてその盾になってきた。\nそれが恐らく、ハチロクの本性で、習い性でもあるのだ）
3443 = "（Dẫn dắt, bao bọc các em, và đôi khi trở\nthành lá chắn cho chúng.\nĐó có lẽ là bản tính, và cũng là thói quen\ncủa Hachiroku.）"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
1557 = "「…………」"

# monologue
# JP: けれど、オリヴィはハチロクの妹でも後輩でもない。\nハチロクよりも長くを走る、敬意を払うべき存在だ。
3274 = "Nhưng, Olivy không phải là em gái hay hậu\nbối của Hachiroku.\nLà một người đã chạy lâu hơn cả Hachiroku,\nmột sự tồn tại đáng được tôn trọng."

# monologue
# JP: にもかかわらず、今ハチロクがしていることこそ、\nまさにオリヴィが嫌悪している“こども扱い”そのものだ。
3307 = "Dù vậy, những gì Hachiroku đang làm lúc\nnày,\nchính xác là sự \"đối xử như trẻ con\" mà\nOlivy căm ghét."

# monologue
# JP: （これは――オリヴィがいないところで注意せねば。\nいや、あるいは今すぐの方が――）
3444 = "（Chuyện này——phải nhắc nhở em ấy lúc không\ncó Olivy mới được.\nKhông, hay là ngay bây giờ thì tốt hơn——）"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーだねっ」
2584 = "「Đúng vậy nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2125 = "「!?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「さっきからハチロク、ちょっとだけナマイキだったから。\nムカッとしてイジワルいっちゃっただけ。ごめんね？」
2335 = "「Tại nãy giờ Hachiroku, hơi xấc xược một\nchút.\nNên chị mới bực mình nói lời chọc ngoáy\nthôi. Xin lỗi nha?」"

# monologue
# JP: ――けれど、オリヴィは蒸し返さない。
1520 = "——Nhưng, Olivy không hề nhắc lại chuyện\ncũ."

# monologue
# JP: あっさりとまた笑顔に戻り、ハチロクに、\n今度は自分から、和解のための手を差し伸べる。
3096 = "Nhanh chóng trở lại với nụ cười, và lần\nnày,\nchính em ấy là người đưa tay ra để làm hòa\nvới Hachiroku."

# 【ハチロク】
# display as 八六
# JP: 「いえ、あやまるのはわたくしの方」
2162 = "「Không đâu, người phải xin lỗi là em mới\nđúng.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だったら、オアイコ！\nだから、ね？　今度こそナカナオリ！」
2652 = "「Nếu vậy thì, huề nhau!\nThế nên, nha? Lần này phải làm hòa thật\nđó!」"

# 【ハチロク】
# display as 八六
# JP: 「オリヴィさん――」
2282 = "「Chị Olivy——」"

# monologue
# JP: 短く、けれど暖かな握手。
3298 = "Một cái bắt tay ngắn ngủi, nhưng thật ấm\náp."

# monologue
# JP: 解いたその手でオリヴィは、\nハチロクのおでこをちょこんとつつく。
3075 = "Buông tay ra, Olivy\nkhẽ gõ nhẹ lên trán Hachiroku."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ちゃんでもいいよ？　そこんとこわかってくれてれば、\nハチロクの好きなように呼んでオッケー」
2332 = "「Gọi bằng bé cũng được nha? Chỉ cần em\nhiểu điều đó,\nthì Hachiroku muốn gọi sao cũng OK hết.」"

# 【ハチロク】
# display as 八六
# JP: 「は、はい。うれしいです。それでは――うふふっ。\nオリヴィちゃん、と呼ばせていただきますね？」
2212 = "「V-Vâng. Em rất vui ạ. Vậy thì——ufufu.\nCho phép em gọi chị là bé Olivy nhé?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー、こんどこそちゃんと、よろしくね！\nハチロク！」
2696 = "「OK, lần này mong được giúp đỡ đàng hoàng\nnha!\nHachiroku!」"

# 【ハチロク】
# display as 八六
# JP: 「はい、オリヴィちゃん」
2309 = "「Vâng, bé Olivy.」"

# monologue
# JP: オリヴィがハイタッチしようと手を持ち上げるが、\nハチロクはすぐには反応できない。
3084 = "Olivy giơ tay lên định đập tay,\nnhưng Hachiroku không thể phản ứng ngay\nlập tức."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あれっ？」
# 2128 = "「咦？」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ！」
2199 = "「A!」"

# monologue
# JP: が、さきほどの日々姫を思い出すことができたのだろう、\nおくれて右手を持ち上げたなら――
2944 = "Nhưng, có lẽ em ấy đã nhớ lại cảnh của\nHibiki lúc nãy,\nvà chậm chạp giơ tay phải lên——"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「イェイ！」
2553 = "「Yeah!」"

# monologue
# JP: （ぺしーん！）
3441 = "（Bốp!）"

# 【ハチロク】
# display as 八六
# JP: 「い。いぇい」
2552 = "「Ye. Yeah.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あははっ！　なにそれ！　ダメだよハチロク、\nこういうのは照れたらカッコワルイ！　もっかい！」
2189 = "「A haha! Gì vậy chứ! Không được đâu\nHachiroku,\nmấy lúc thế này mà xấu hổ là mất hình\ntượng lắm đó! Lại lần nữa nha!」"

# 【ハチロク】
# display as 八六
# JP: 「は、はい！」
2292 = "「V-Vâng!」"

# monologue
# JP: （パンっ！！）
3428 = "（Đập tay!!）"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「イェイ！」
# 2553 = "「耶！」" 

# 【ハチロク】
# display as 八六
# JP: 「いぇいっ！！」
2556 = "「Yeah!!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あははっ！　いいねっ！　その感じっ！」
2184 = "「A haha! Tốt lắm! Đúng cảm giác đó rồi!」"

# 【ハチロク】
# display as 八六
# JP: 「はいっ！」
# 2235 = "「嗯！」" 

# monologue
# JP: ああ、なんという爛漫さだろう。
3036 = "A, thật là ngây thơ và hồn nhiên làm sao."

# monologue
# JP: イヤなことはイヤとはっきり伝えた上で、\n生じたモヤを、笑顔でさっぱり吹き飛ばしてしまった。
3104 = "Sau khi nói rõ ràng điều mình không thích,\nem ấy lại dùng nụ cười để thổi bay đi\nnhững khúc mắc vừa nảy sinh."

# monologue
# JP: （驚くほどに切り換えが早い。まるでスイッチのオンオフ――いや、物としてはむしろその方が正常なのか？）
3438 = "（Sự chuyển đổi nhanh đến đáng ngạc nhiên.\nCứ như bật tắt công tắc vậy——không, với tư\ncách là một đồ vật thì có lẽ thế mới là\nbình thường chăng?）"

# 【日々姫】
# display as 日日姬
# JP: 「おまたせ！　焼けたよー！\nチーズオムレツあっちっち！！」
2011 = "「Để mọi người đợi lâu rồi! Chín rồi đây~!\nTrứng cuộn phô mai nóng hổi đây!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「お！」
2161 = "「Ồ!」"

# monologue
# JP: 日々姫も実に日々姫らしく、\n生まれはじめた暖かな空気をふくらます。
3229 = "Hibiki cũng rất đúng chất Hibiki,\nlàm cho bầu không khí ấm áp vừa chớm nở\ncàng thêm lan tỏa."

# monologue
# JP: いや――あるいはふたりが和解できると、\n僕より早く確信できていたのかもしれん。
3295 = "Không——hoặc có lẽ em ấy đã tin chắc rằng\nhai người họ sẽ làm hòa,\ncòn sớm hơn cả tôi."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わああ！　きれい～！　おいしそ～！\nこの家は、朝、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も人間のごはん食べるの？」
2144 = "「Oa! Đẹp quá~! Trông ngon ghê~!\nỞ nhà này, buổi sáng \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng ăn đồ ăn\ncủa con người sao?」"

# 【ハチロク】
# display as 八六
# JP: 「いいえ？　食卓は一緒ですけれど、\nわたくしは石炭をいただきます」
1995 = "「Không đâu ạ? Dù ngồi cùng bàn ăn,\nnhưng em sẽ ăn than ạ.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「やったぁ石炭！　ね？　オリヴィも食べていい？」
2312 = "「Tuyệt quá có than kìa! Nha? Olivy cũng ăn\nđược chứ?」"

# 【ハチロク】
# display as 八六
# JP: 「ええ、もちろん！　でしたら、食卓へ移動しましょう」
2248 = "「Vâng, tất nhiên rồi ạ! Nếu vậy, chúng ta\ndi chuyển sang bàn ăn thôi.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ね？　オリヴィどこすわったらいい？」
2645 = "「Nha? Olivy ngồi đâu thì được?」"

# 【ハチロク】
# display as 八六
# JP: 「そうですね……\n双鉄さまのお隣がわたくしですので――」
2620 = "「Xem nào……\nBên cạnh ngài Soutetsu là em rồi nên——」"

# 【日々姫】
# display as 日日姬
# JP: 「そっちに三人並びは狭かとでしょー！\nわたしの隣に座ればよかとよ」
1979 = "「Ba người ngồi bên đó thì chật lắm á!\nNgồi cạnh em là được rồi á.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、そーする！」
2656 = "「Vậy, quyết định thế nha!」"

# monologue
# JP: 席が決まればいそいそと、\nハチロクはまた黒光りする大粒の石炭を取り出す。
3133 = "Vừa chọn xong chỗ ngồi, Hachiroku\nlại hăm hở lấy ra một cục than lớn đen\nbóng."

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんの好きな方をとってくださいな」
2284 = "「Bé Olivy cứ lấy cục nào mình thích đi ạ.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、こっち。\nそれでね、あのね？　ソーテツ」
2655 = "「Vậy, cục này nha.\nVới lại nè, anh biết không? Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2249 = "「Ưm?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、おくちがちっちゃいから、\nまるかじりってちょっとニガテで」
2280 = "「Olivy, miệng nhỏ lắm,\nnên hơi khó nhai nguyên cục bự.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだったな。聞いている」
2214 = "「À, đúng rồi nhỉ. Anh có nghe nói.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「！」
2123 = "「!」"

# monologue
# JP: パアッと、オリヴィの頬がバラ色になる。
3083 = "Hai má Olivy bỗng chốc ửng hồng."

# monologue
# JP: なんだ、それほどに嬉しいのかと、\n僕のこころまであたたかになる。
3286 = "Gì chứ, em ấy vui đến thế sao,\nlàm lòng tôi cũng thấy ấm áp lây."

# 【双鉄】
# display as 雙鐵
# JP: 「アイスピックは――\nああ、そのまま持ち帰ってきていたか」
2522 = "「Dùi đập đá thì——\nÀ, anh cứ thế mang về luôn rồi.」"

# monologue
# JP: ならば、何の問題もない。\n昨日はいきなりで驚かせてしまったようだが――
3378 = "Nếu vậy thì không có vấn đề gì cả.\nHôm qua có vẻ hơi đột ngột nên làm em ấy\ngiật mình, nhưng mà——"

# monologue
