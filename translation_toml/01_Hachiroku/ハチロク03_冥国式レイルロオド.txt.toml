# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ハチロクが――」
2085 = "「Vậy ra, là Hachiroku đã――」"

# monologue
# JP: 思い出す。\n肩に一瞬、やわらかな負荷がかかったことを。
3376 = "Tôi chợt nhớ lại.\\nCảm giác có một áp lực mềm mại đè lên vai mình trong khoảnh khắc đó."

# monologue
# JP: あの瞬間にハチロクは、\n前照灯を消灯させてくれていたのか。
3165 = "Vào khoảnh khắc đó, liệu Hachiroku có thực sự đã tắt đèn pha đi không nhỉ."

# 【双鉄】
# display as 雙鐵
# JP: 「帝都育ちだ。……そんな経験もないだろうに。\nあるいは、どこかで訓練を受けたことがあるのか」
2290 = "「Lớn lên ở Đế đô... Em làm gì có kinh nghiệm đó chứ. Hay là, em đã từng được huấn luyện ở đâu đó rồi?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ああいうの――あのれんけーって、どこでもそう？\n[ヒノモト,2]日ノ本式の――マスターシステムの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;って」
2412 = "「Kiểu đó ấy—cái gọi là phối hợp đó—ở đâu cũng vậy sao? Kiểu của Hinomoto ấy—về hệ thống chủ tớ của \\x%lRailord;#00ffc040;Railord%l;#; này」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2177 = "「啊」" 

# monologue
# JP: そういえば、冥国式がどうのとさっき話に出てきた。
3351 = "Nhắc mới nhớ, vừa nãy có nhắc đến kiểu của Minh quốc gì đó."

# 【双鉄】
# display as 雙鐵
# JP: 「僕も他をよく知らんゆえ、断言はできんが――\n多分、どこでもそのようなものだと思う」
2383 = "「Ta cũng không rành nơi khác nên không thể khẳng định chắc chắn—nhưng có lẽ, ở đâu cũng như vậy thôi.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなのっ！？」
2516 = "「Ra là vậy sao!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「少なくとも、ポーレットとれいなのコンビはそうだ。\nあのコンビネーションは、僕ら以上であるかもしれん」
2560 = "「Ít nhất thì cặp đôi Paulette và Reina là như vậy. Sự phối hợp đó, có khi còn vượt xa cả chúng ta nữa.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふわー……そうなんだ、話半分に聞いてたけど。\nあ、\x%l投炭;#00ffc040;投炭%l;#;しといたほうがいいよ」
2131 = "「Oa... Ra là vậy, em cứ tưởng nghe cho biết thôi. À, anh nên \\x%lTiếp than;#00ffc040;tiếp than%l;#; đi thì hơn đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2529 = "「Phải nhỉ.」"

# monologue
# JP: 丁度、僕もそう感じていたところだ。\nハチロクもかくやというタイミングに驚かされる。
2968 = "Vừa hay, tôi cũng cảm thấy như vậy.\\nTôi ngạc nhiên trước thời điểm cô ấy làm, chẳng kém gì Hachiroku cả."

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィは、[ハチロクニイマルけい,4]8620形の乗務経験があるのか？」
2042 = "「Olivie, em có kinh nghiệm vận hành đầu máy 8620 sao?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ないよー！　みかん鉄道の現役蒸機は、Ⅸ号……は、\nもうオヒトヨだから、\x%lC56;#00ffc040;Ｃ５６%l;#;　[キューキュー,1]９９と、新しく来るこだけ」
2473 = "「Không có đâu! Đầu máy hơi nước đang hoạt động của đường sắt Mikan là số IX... Vì nó là Ohitoyo rồi, chỉ còn \\x%lC56;#00ffc040;C56%l;#; 99 và em mới đến thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確か、\x%lC12;#00ffc040;C12%l;#;だったか？」
2293 = "「好像是\\\\x%lC12;#00ffc040;Ｃ１２%l;#;吧？」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「知らなーい。聞いてないから」
1998 = "「Không biết. Em chưa nghe nói gì cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2625 = "「Ra là vậy.」"

# monologue
# JP: オリヴィが目に見えて不機嫌になる。\nこの辺の話題は、やはり微妙か。
3081 = "Olivie lộ rõ vẻ khó chịu.\\nChủ đề này quả nhiên vẫn khá nhạy cảm."

# 【双鉄】
# display as 雙鐵
# JP: 「機器点検の手際だけでなく、\x%l投炭;#00ffc040;投炭%l;#;指示も的確だったゆえ、\n[ハチロクけい,4]8620形――帝鉄蒸機の乗務経験が豊富なのかと思ったが」
1988 = "「Không chỉ thao tác kiểm tra thiết bị thành thạo, mà \\x%l投炭;#00ffc040;kỹ thuật tiếp than%l;#; cũng rất chuẩn xác, khiến ta cứ ngỡ em có kinh nghiệm dày dặn trên đầu máy hơi nước của Đế quốc — dòng 8620」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ないない。オリヴィはずっとⅨ号だけ。\nもったいないよね？　せっかく[メリケン,2]冥国式なのに」
2475 = "「Không có đâu ạ. Olivi từ trước đến nay chỉ đi mỗi chiếc số IX thôi.\nTiếc thật nhỉ? Dù rõ ràng là chuẩn thiết kế của Minh Quốc cơ mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「さっきも話に出てきたが、その[メリケン,2]冥国式というのは――」
2083 = "「Nãy giờ em cũng có nhắc đến, nhưng cái gọi là chuẩn Minh Quốc đó rốt cuộc là—」"

# 【日々姫】
# display as 日日姬
# JP: 「見てきたー！　オッケー！　衝突回避！\nで、故障も脱線もなんにもなし！」
2466 = "「Em đã đi xem rồi! Mọi thứ đều ổn! Tránh va chạm an toàn!\nKhông hỏng hóc, cũng không hề bị trật bánh!」"

# 【ハチロク】
# display as 八六
# JP: 「で、ございます。\n双鉄さま、おみごとな非常制動でございました」
2364 = "「Chính là như vậy ạ.\nThưa Soutetsu-sama, thao tác phanh khẩn cấp vừa rồi thật quá tuyệt vời」"

# monologue
# JP: いいざま、ハチロクの目と手が動く。
2946 = "Nhìn dáng vẻ đó, mắt và tay Hachiroku bắt đầu cử động."

# 【ハチロク】
# display as 八六
# JP: 「[こちら,3]運転台内も問題なかったようですね。\nそれでは速やかに、[ゆのい,1]湯医まで回復運転につとめましょう」
1551 = "「Bên trong buồng lái có vẻ cũng không còn vấn đề gì.\nVậy chúng ta hãy nhanh chóng tăng tốc để bù lại khoảng thời gian đã mất, hướng thẳng tới Yui thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2304 = "「Đúng vậy」"

# monologue
# JP: 試験運転であるとはいえど、遅延は縮小せねばならん。
3400 = "Dẫu chỉ là chạy thử nghiệm, nhưng vẫn phải hạn chế tối đa việc chậm trễ."

# monologue
# JP: 僕らが本線に居続けたなら、\nキハ07sは、定時になっても走り出せんのだから。
3278 = "Bởi nếu chúng ta cứ tiếp tục chiếm dụng đường chính,\nKiha 07s sẽ không thể bắt đầu khởi hành đúng giờ được."

# 【日々姫】
# display as 日日姬
# JP: 「あ、[じょうきあつ,2]蒸気圧たもってくれてる！」
2220 = "「A, áp suất hơi vẫn được duy trì ổn định kìa!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「もちろん！　じゃなきゃ走れないし！」
2670 = "「Tất nhiên rồi! Không thì làm sao mà chạy được chứ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l前進フルギア;#00ffc040;前進フルギア%l;#;！　\x%l自弁;#00ffc040;自弁%l;#;、運転！」
1554 = "「\\x%l前進フルギア;#00ffc040;Tiến hết tốc độ%l;#;! \\x%l自弁;#00ffc040;Phanh hãm tự động%l;#;, bắt đầu vận hành!」"

# monologue
# JP: \x%l喚呼;#00ffc040;喚呼%l;#;をすれば、\nハチロクもすぐ頷いてくれる。
3171 = "Mỗi khi tôi thực hiện \\x%l喚呼;#00ffc040;xướng báo%l;#;,\nHachiroku đều gật đầu đáp ứng ngay lập tức."

# 【ハチロク】
# display as 八六
# JP: 「れいなとの\x%l共感;#00ffc040;共感%l;#;得ました。出発よしです」
2118 = "「Em đã có được \\x%l共感;#00ffc040;sự đồng điệu%l;#; với Reina rồi ạ. Xuất phát thôi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2234 = "「嗯」" 

# monologue
# JP: ……今のオリヴィとの会話はよかった。\n災い転じて福となせそうな気もしている。
2992 = "……Cuộc hội thoại vừa rồi với Olivi thật tốt.\nCảm giác như chúng ta có thể chuyển bại thành thắng vậy."

# monologue
# JP: そうするためにも、まずは湯医へ。\nそうして、御一夜へ折り返して、だ！
3272 = "Để làm được điều đó, trước hết phải đến Yui đã.\nRồi sau đó, quay trở lại Ohitoyo!"

# 【双鉄】
# display as 雙鐵
# JP: 「出発！　進行！！」
2078 = "「Xuất phát! Tiến lên!!」"

# 【ポーレット】
# display as 波萊特
# JP: 「とにかく、事故にならなくてよかったです。\n安全な乗務をありがとうございました」
2537 = "「Dù sao thì, thật may là không có tai nạn nào xảy ra.\nCảm ơn anh vì chuyến đi an toàn.」"

# 【れいな】
# display as 玲奈
# JP: 「ほんとにほんとに、おつかれさまでぇす」
2518 = "「Thật sự, thật sự, vất vả cho anh rồi ạ」"

# 【日々姫】
# display as 日日姬＆奥莉薇
# JP: 「ふぁあ～」\n「はふぁ～」
2149 = "「Ngáp～」\n「Haa～」"

# monologue
# JP: 業務報告を終えるやいなやで、\n日々姫とオリヴィがぐったり崩れる。
2991 = "Ngay khi vừa báo cáo công việc xong,\nHibi-hime và Olivi liền đổ gục vì kiệt sức."

# 【日々姫】
# display as 日日姬
# JP: 「よーごーれーたー」
2261 = "「Bẩn hết rồi～」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「つーかーれーたー」
2535 = "「Mệt quá đi～」"

# monologue
# JP: 気持ちはわかる。
3087 = "Tôi hiểu cảm giác đó."

# monologue
# JP: ああした事例に接してしまうと、\n緩んだときに、一気に疲れがくるものだ。が――
2987 = "Một khi đã đối mặt với những sự việc như vậy,\nđến lúc thả lỏng, sự mệt mỏi sẽ ập đến cùng một lúc. Nhưng mà――"

# 【ハチロク】
# display as 八六
# JP: 「うふふ。日々姫もオリヴィちゃんも、\n本当によくがんばってくれました」
2253 = "「Ufufu. Cả Hibi-hime và bé Olivi,\nthật sự đã làm rất tốt rồi.」"

# monologue
# JP: ――ハチロクは、姿勢ひとつさえ弛めない。\nならば、僕も凛然としていねばならぬ。
1516 = "――Hachiroku, dù chỉ là tư thế cũng không hề lơi lỏng.\nNếu vậy, tôi cũng phải giữ vững sự trang nghiêm mới được."

# monologue
# JP: ハチロクのマスターとして、すずの夫として、\nそれが最低限の務めであろうし、マナーとも思う。
3358 = "Với tư cách là Master của Hachiroku, là chồng của Suzu,\nđó hẳn là bổn phận tối thiểu, và cũng là phép lịch sự nữa."

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま？」
2689 = "「Soutetsu-sama?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2177 = "「啊」" 

# monologue
# JP: ハチロクが手渡してくれたのは石炭だ。
2941 = "Thứ mà Hachiroku trao cho tôi chính là than đá."

# monologue
# JP: 今朝方教えてもらったとおりに、\n端の方から崩していく。
3185 = "Đúng như những gì được chỉ từ sáng sớm, tôi bắt đầu đập vỡ nó từ phía mép cạnh."

# monologue
# JP: （がっ！　がっ！！！）
# 3432 = "（喀！喀！！！）" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！！？」
2124 = "「Á!!?」"

# monologue
# JP: いかん。またビックリさせてしまった。
3373 = "Không xong rồi. Mình lại làm cô bé giật mình nữa rồi."

# monologue
# JP: これは――石炭を砕くときには、\n事前にいちいち、声をかけた方がいいかもしれん。
3385 = "Chắc là—khi đập than đá, có lẽ mình nên cẩn thận báo trước một tiếng mỗi lần thì tốt hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「今日はいろいろ助かった。\n礼というわけでもないが、よければどうだ？」
2023 = "「Hôm nay cảm ơn em vì đã giúp đỡ nhiều việc nhé.\\nCũng không hẳn là quà đáp lễ, nhưng nếu em thích thì dùng thử xem?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがと、もらうねー！」
2591 = "「Cảm ơn anh, em nhận nhé!」"

# monologue
# JP: 砕いた石炭のひとかけを、\nキラリ天井の光に照らし、それから嬉しげに口へと運ぶ。
3079 = "Cô bé đưa một mảnh than vừa đập vỡ lên, để ánh đèn trần chiếu rọi lấp lánh, rồi vui vẻ đưa vào miệng."

# monologue
# JP: 小さなこどもがコンペイトウを食べるようだ、と、\n思えば自然、頬がほころぶ。
3123 = "Trông cứ như một đứa trẻ nhỏ đang ăn kẹo konpeito vậy, nghĩ thế khiến má tôi tự nhiên giãn ra."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「おいし！　けど、いまはごはんよりお風呂かなー。\nこの駅って、お風呂どこにあるの？」
2302 = "「Ngon lắm! Nhưng mà, giờ em muốn đi tắm hơn là ăn. Ở ga này, phòng tắm nằm ở đâu thế ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、駅にはお風呂ないんですよ」
2221 = "「À, ở ga này không có phòng tắm đâu em」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えーっ！？　[きかんこ,2]機関庫あるのに！？」
2127 = "「Ể~~!? Rõ ràng là có cả nhà ga cơ mà!?」"

# 【ハチロク】
# display as 八六
# JP: 「そのかわり……といっては[さきさま,1]先様に申し訳ございませんが、\n[とろるゆ,3]登呂流湯様という温泉に、入れていただけますよ？」
2004 = "「Thay vào đó…… nói vậy thì có hơi thất lễ với người ta, nhưng em có thể đến suối nước nóng có tên là Tororyu-yu để tắm đấy?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オンセン！！？」
2492 = "「SUỐI NƯỚC NÓNG!!?」"

# monologue
# JP: オリヴィの瞳が輝く。
3073 = "Đôi mắt của Oliwi bừng sáng."

# monologue
# JP: 僕らには当然のこととなってしまっているけれど、\nなるほど冷静に考えたのなら、乗務後の温泉は贅沢だ。
3398 = "Với chúng ta thì điều này đã trở thành lẽ đương nhiên, nhưng\\nnếu suy nghĩ một cách bình tĩnh, tắm suối nước nóng sau khi làm nhiệm vụ quả là một sự xa xỉ."

# 【ハチロク】
# display as 八六
# JP: 「はい。正真正銘の天然温泉の大浴場。\n標準的な駅施設の沸かし湯よりも、何百倍も素敵かと」
2479 = "「Vâng. Một nhà tắm công cộng với suối nước nóng tự nhiên chính gốc.\\nSo với nước nóng đun sôi ở các cơ sở ga thông thường thì tuyệt vời hơn gấp trăm lần ạ」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いきたいいきたい！　トロルユ？\nそこ、つれてって！！」
2570 = "「Muốn đi, muốn đi! Troll-yu á?\\nĐưa em tới đó đi!!」"

# 【日々姫】
# display as 日日姬
# JP: 「おっけ！　じゃ、行こーっ！」
2706 = "「Được thôi! Vậy thì đi nào!」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、れいなもおともしますねぇ」
2255 = "「Ư hư hư, Reina cũng sẽ đi cùng mọi người ạ」"

# monologue
# JP: （む）
3425 = "(Hừm)"

# monologue
# JP: ハチロクが軽く僕に触れる。\nその目が『行くな』と告げている。
2957 = "Hachiroku khẽ chạm vào tôi.\\nĐôi mắt cô ấy như đang nói rằng: 'Đừng đi'."

# 【ポーレット】
# display as 波萊特
# JP: 「それじゃ、今日はここまでにしましょう。\nわたしは、少し残業をしていきますね」
2641 = "「Vậy thì hôm nay chúng ta dừng ở đây thôi.\\nTôi sẽ ở lại làm thêm giờ một chút」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしと双鉄さまも、\n始末書を済ませてしまいますので」
2376 = "「Tôi và Soutetsu-sama cũng sẽ\\nxử lý xong đống bản kiểm điểm ạ」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなの？　なんか手伝う？」
2517 = "「Vậy hả? Có cần tớ giúp gì không?」"

# monologue
# JP: 思わぬ嬉しい問いかけに、\nけれどハチロクは、静かな笑顔で首を振る。
3082 = "Trước câu hỏi bất ngờ đầy tử tế đó,\\nHachiroku chỉ lặng lẽ lắc đầu cùng một nụ cười dịu dàng."

# 【ハチロク】
# display as 八六
# JP: 「いいえ。気持ちだけで。\nオリヴィちゃんは、湯医線での初乗務でしたし」
1993 = "「Không đâu. Cảm ơn ý tốt của em.\\nDù sao thì Oli-chan cũng vừa mới thực hiện chuyến chạy tàu đầu tiên ở tuyến Yuisen mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「しっかり休んで英気を養ってくれ。\nなにか聞きたいことが出てきたら、明日改めて確認する」
2300 = "「Hãy nghỉ ngơi thật tốt để hồi phục sức lực đi.\\nNếu có điều gì muốn hỏi, mai chúng ta sẽ kiểm tra lại sau」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！　わかった！」
2705 = "「Ok! Em hiểu rồi!」"

# 【日々姫】
# display as 日日姬
# JP: 「そしたら、ね！　にぃに、ハチロク、またあとで！！」
2660 = "「Vậy thì, lát nữa gặp lại nha! Nii-ni, Hachiroku, lát nữa gặp lại!!」"

# 【れいな】
# display as 玲奈
# JP: 「終わったら、れいなをむかえにきてくださいねぇ」
2533 = "「Khi nào xong, anh hãy đến đón Reina nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「もちろん。いいこで待っててね？」
2408 = "「Tất nhiên rồi. Hãy đợi anh ngoan ngoãn nhé?」"

# 【れいな】
# display as 玲奈
# JP: 「はぁい」
2313 = "「Vâng ạ.」"

# 【日々姫】
# display as 日日姬
# JP: 「じゃ、行こ！　オリヴィちゃん、れいなちゃん！\n温泉温泉！！」
2289 = "「Vậy thì, đi thôi! Olivi-chan, Reina-chan!\\nOnsen, onsen nào!!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オンセンオンセンー！！」
2491 = "「ONSEN, ONSEN!!」"

# monologue
# JP: にぎにぎしくも楽しげに、\n油とススにまみれた一同が消えていく。
3270 = "Cả nhóm người lấm lem dầu mỡ và bồ hóng biến mất dần,\\nnhộn nhịp và tràn đầy vui vẻ."

# monologue
# JP: 姿……足音も完全に消え去ったのを確かめて。\nハチロクに、問うべき言葉はもう決めてある。
3284 = "Đảm bảo rằng bóng dáng... cả tiếng bước chân đã hoàn toàn biến mất.\\nTôi đã chọn sẵn câu hỏi cần dành cho Hachiroku."

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィのことか？」
2430 = "「Về Olivi sao?」"

# 【ハチロク】
# display as 八六
# JP: 「はい、左様です。双鉄さま」
2440 = "「Vâng, đúng vậy ạ. Thưa Soutetsu-sama.」"

# monologue
# JP: 打てば響くで、答えが返る。\nポーレットは何も言わない。黙って僕らを見つめている。
2942 = "Câu trả lời đáp lại ngay lập tức.\\nPaulette không nói gì cả. Cô ấy lặng lẽ nhìn chúng tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「何があった？」
2432 = "「Đã có chuyện gì vậy?」"

# 【ハチロク】
# display as 八六
# JP: 「はい――」
2435 = "「Vâng――」"

# monologue
# JP: そう返事をし、\nけれどハチロクは、言いづらそうにうつむいてしまう。
3100 = "Đáp lại như vậy,\\nnhưng Hachiroku lại cúi đầu, vẻ khó nói."

# 【ハチロク】
# display as 八六
# JP: 「……オリヴィは、\nみかん鉄道ではどのように扱われていたのですか？」
1574 = "「...Olivi, cô ấy đã được đối xử như thế nào\\ntại Đường sắt Mikan vậy ạ?」"

# monologue
# JP: 扱われて――と。\nハチロクの選んだ言葉に、不安を強く感じてしまう。
3129 = "Được đối xử―― ư.\\nTôi cảm thấy bất an sâu sắc trước từ ngữ mà Hachiroku đã chọn."

# monologue
# JP: が、ポーレットは驚いたような様子も見せず、\n小首を傾げる。
3010 = "Thế nhưng, Paulette không hề tỏ ra ngạc nhiên mà chỉ nghiêng đầu."

# 【ポーレット】
# display as 波萊特
# JP: 「えっと……ちょっと待ってね？\n正確に答えたほうが良さそうだから」
2382 = "「Ừm... đợi mình một chút nhé?\nCó vẻ như cần phải trả lời chính xác thì tốt hơn.」"

# monologue
# JP: 言って、棚から書類を持ち出す。\n相当分厚い。
3097 = "Nói rồi, cô lấy ra một xấp tài liệu từ trên kệ.\nKhá là dày."

# monologue
# JP: 車両と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とを迎える準備を、\nポーレットが慎重に重ねていたことが垣間見える。
3262 = "Có thể thấy rõ Paulette đã chuẩn bị kỹ lưỡng như thế nào\nđể đón nhận cả toa tàu và \\x%lRailord;#00ffc040;Railord%l;#;."

# 【ポーレット】
# display as 波萊特
# JP: 「製造は[めいじ,1]明智45年。[めいこく,1]冥国の、\nオールドウィン・ロコモーティブワークス製です」
2076 = "「Được sản xuất vào năm Meichi thứ 45. Là hàng của\nOldwin Locomotive Works, thuộc Minh Quốc.」"

# 【双鉄】
# display as 雙鐵
# JP: 「オールドウィンだからオリヴィなのか？」
2258 = "「Vì là Oldwin nên mới gọi là Olivi à?」"

# 【ポーレット】
# display as 波萊特
# JP: 「多分……な気がしますけど。そこまでは記録に無いです。\n最初は、[ふじみのぶ,3]冨士実延鉄道で活躍したそうです」
2369 = "「Có lẽ là... mình cũng nghĩ vậy. Nhưng hồ sơ không ghi rõ đến mức đó.\nBan đầu, cô ấy được cho là đã hoạt động tại Đường sắt Fujiminobu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「[ふじみのぶ,3]冨士身延？」
2316 = "「Fujiminobu?」"

# 【ハチロク】
# display as 八六
# JP: 「のちに[ていゆうか,2]帝有化され、[ていてつみのぶせん,4]帝鉄実延線となった路線ですね。\n比較的早期……確か、私鉄時代に電化された筈です」
2337 = "「Sau đó nó được quốc hữu hóa và trở thành tuyến Teitetsu Minobu đấy ạ.\nKhá là sớm... mình nhớ là đã được điện khí hóa từ thời còn là tư nhân.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか。\nでは、そこでのオリヴィの活躍は短かったのか？」
2445 = "「Ra là vậy sao.\nVậy thì thời gian hoạt động của Olivi ở đó khá ngắn nhỉ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「かもしれません」
2393 = "「Có thể là vậy.」"

# monologue
# JP: ポーレットの指が書類をめくる。
3264 = "Ngón tay Paulette lật từng trang tài liệu."

# 【ポーレット】
# display as 波萊特
# JP: 「あ……いえ、それでも――[しょうわ,1]正和11年までは走ってますね。\nそれから、[つるみせいてつぞうせん,5]鶴巳製鉄造船の専用線に移籍してます」
2176 = "「À... không, dù vậy thì cô ấy vẫn chạy đến tận năm Chính Hà thứ 11.\nSau đó, cô ấy được chuyển sang tuyến đường chuyên dụng của Công ty Công nghiệp Thép và Đóng tàu Tsurumi.」"

# 【ハチロク】
# display as 八六
# JP: 「製鉄会社の貨物機ですか！？　あの小さな体で」
2030 = "「Đầu máy chở hàng cho công ty thép sao!? Với thân hình nhỏ bé đó ư?」"

# monologue
# JP: 確かにⅨ号機関車は、車格も小さいし出力も低そうだ。\n車軸配置も0-6-0。どう考えても旅客機向きだ。
3282 = "Quả thực, đầu máy số IX có kích thước thân xe khá nhỏ và công suất có vẻ cũng thấp.\nCấu trúc trục bánh xe là 0-6-0. Dù nghĩ thế nào thì cũng hợp với tàu chở khách hơn."

# monologue
# JP: 製鉄造船専用線――資材輸送であれ、製品輸送であれ、\nなまなかな負担ではなかっただろう。
3325 = "Tuyến chuyên dụng thép và đóng tàu――dù là vận chuyển vật liệu hay vận chuyển sản phẩm, chắc hẳn đều là gánh nặng không hề nhỏ."

# 【ポーレット】
# display as 波萊特
# JP: 「そこでは、正和49年までを――長いですよね、本当に」
2550 = "「Ở đó, tính đến tận Chính Hà năm thứ 49――thật sự là một quãng thời gian dài nhỉ.」"

# monologue
# JP: 言って、ポーレットはファイルを閉じる。\nそこから先は、資料を見るまでも無いのだろう。
3265 = "Nói rồi, Paulette khép tập hồ sơ lại. Chắc hẳn phần sau đó không cần phải xem tài liệu nữa."

# 【ポーレット】
# display as 波萊特
# JP: 「で、そこからはみかん鉄道さんですね。\nみ[てつ]鉄さんでは、最初からずっと\x%l入換機;#00ffc040;入換機%l;#;だそうです」
2501 = "「Vậy, từ đó trở đi là phía Mikan Railway nhỉ. Ở Mikan, nghe nói ngay từ đầu đã luôn là \\x%lđầu máy dồn toa;#00ff0040;đầu máy dồn toa%l;#; rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「……大変なご苦労をされているのですね。\nとても、そのようには見えませんでしたが」
1583 = "「……Các cô đã phải trải qua những vất vả to lớn nhường ấy. Tôi đã không hề nhận ra điều đó chút nào.」"

# monologue
# JP: あらためてそう聞かされると、頷くしかない。\nあれほど小さく、こどものように見えるというのに――
3190 = "Khi được nghe kể lại như vậy, tôi chỉ còn biết gật đầu. Dù nhìn cô ấy nhỏ nhắn và trẻ con đến thế――"

# 【双鉄】
# display as 雙鐵
# JP: 「[めいじ,1]明智45年から、百年以上だものな。\nずっと現役でいるだけでも、大変な偉業だろうに」
2507 = "「Tính từ năm Akechi thứ 45, đã hơn một trăm năm rồi cơ mà. Chỉ riêng việc duy trì hoạt động đến tận bây giờ thôi đã là một kỳ tích vĩ đại rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そこは、冥国蒸機の強みですよね」
2623 = "「Đó chính là thế mạnh của Meikoku Steam, đúng không ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「冥国蒸機」
2541 = "「Meikoku Steam」"

# monologue
# JP: 言われて、そうだと思い出す。\n聞くならいまが良い機会だろう。
3350 = "Được nhắc đến, tôi mới sực nhớ ra. Nếu muốn hỏi thì đây chính là cơ hội tốt."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l運転体;#00ffc040;運転体%l;#;も\x%l整備体;#00ffc040;整備体%l;#;も無い、ワンボディなのには驚いた。\nあれは、冥国蒸機――いや」
1984 = "「Tôi đã rất ngạc nhiên khi thấy nó là thân liền khối, không có \\x%lthể vận hành;#00ff0040;thể vận hành%l;#; cũng chẳng có \\x%lthể bảo trì;#00ff0040;thể bảo trì%l;#;. Đó là do Meikoku Steam―― không, phải nói là...」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。冥国式\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の、最大の特徴です。\nそもそも、日ノ本式や詠・髑国式とは設計思想が違う」
2585 = "「Vâng đúng vậy. Đó là đặc điểm lớn nhất của \\x%lRailord;#00ff0040;Railord%l;#; kiểu Meikoku. Ngay từ đầu, tư duy thiết kế đã khác hẳn với kiểu Hinomoto hay kiểu Ei-Doku rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。\nいったい、どのような設計思想で作られているのだ？」
2155 = "「Ồ. Rốt cuộc thì nó được chế tạo dựa trên tư duy thiết kế như thế nào vậy?」"

# 【ポーレット】
# display as 波萊特
# JP: 「えっと――　一番簡単にいえば、大量生産、大量消費です。\n作りはシンプル。それで、互換性をとても大事にします」
2380 = "「À thì―― nói một cách đơn giản nhất, đó là sản xuất hàng loạt, tiêu thụ hàng loạt. Cấu tạo đơn giản. Và đặc biệt rất coi trọng tính tương thích.」"

# 【双鉄】
# display as 雙鐵
# JP: 「互換性」
2511 = "「Tính tương thích」"

# 【ハチロク】
# display as 八六
# JP: 「……冥国式\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、日ノ本や[えいこく,1]詠国、[どっこく,1]髑国式の\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と大きく異なり、交代乗務を常とします」
1580 = "「……\\x%lRailord;#00ffc040;Railord%l;#; kiểu Mekoku khác biệt rất lớn so với \\x%lRailord;#00ffc040;Railord%l;#; kiểu Hinomoto, Eikoku hay Dokoku, và thường xuyên phải thay ca làm việc」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2156 = "「哦」" 

# monologue
# JP: そういえば、オリヴィは逆に知りたがっていた。
3377 = "Nhắc mới nhớ, Oli có vẻ lại muốn biết điều ngược lại."

# monologue
# JP: “日ノ本式――マスターシステム\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\nこれほど連携にすぐれるものか”と。
1532 = "“Liệu hệ thống Master \\x%lRailord;#00ffc040;Railord%l;#; kiểu Hinomoto lại có thể phối hợp nhịp nhàng đến mức này sao?”"

# 【双鉄】
# display as 雙鐵
# JP: 「つまり、オリヴィたち冥国式\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\nマスター、――いや、\x%l機関士;#00ffc040;機関士%l;#;が誰であれ、組めるのか」
2636 = "「Nói cách khác, những \\x%lRailord;#00ffc040;Railord%l;#; kiểu Mekoku như Oli các cô, dù Master, à không, dù \\x%lKỹ sư;#00ffc040;Kỹ sư%l;#; là ai đi chăng nữa, thì cũng có thể ghép cặp được sao?」"

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。わたくしたちも、もちろんどなたとでも、\n最低限のお仕事はきっちりと果たせますが――」
2530 = "「Đúng là vậy ạ. Tất nhiên, dù là với bất kỳ ai, chúng tôi cũng đều có thể hoàn thành công việc ở mức tối thiểu một cách chỉn chu, nhưng mà――」"

# monologue
# JP: ハチロクがじっと僕を見る。\nならば、続きは僕から言おう。
2963 = "Hachiroku nhìn chằm chằm vào tôi.\\nVậy thì, để tôi nói tiếp phần còn lại."

# 【双鉄】
# display as 雙鐵
# JP: 「わかっている。お前が最高の性能を発揮できるのは\n僕と組んでいるときだ。そして、その逆もまた真実だ」
2386 = "「Anh hiểu mà. Em chỉ có thể phát huy hiệu suất tốt nhất khi đồng hành cùng anh. Và điều ngược lại cũng hoàn toàn đúng.」"

# 【ハチロク】
# display as 八六
# JP: 「はい」
2438 = "「Vâng」"

# monologue
# JP: 乗務を重ね、同じ時間を重ねるうちに、\n僕たちは夫婦としてだけでなく――
3395 = "Càng trải qua nhiều chuyến hành trình, càng dành nhiều thời gian bên nhau,\\nchúng tôi không chỉ với tư cách là vợ chồng——"

# monologue
# JP: \x%l機関士;#00ffc040;機関士%l;#;と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;としても、\nお互いへの理解を深め続けてきた。
2907 = "Mà với tư cách là \\x%lKỹ sư;#00ffc040;Kỹ sư%l;#; và \\x%lRailord;#00ffc040;Railord%l;#;,\\nchúng tôi vẫn không ngừng thấu hiểu nhau sâu sắc hơn."

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまとともにあれれば。\nきっとわたくしは、どのような乗務でも」
2562 = "「Chỉ cần được ở bên Soutetsu-sama.\\nChắc chắn dù là nhiệm vụ nào, em cũng sẽ...」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ、ハチロク」
2368 = "「Anh cũng vậy, Hachiroku」"

# monologue
# JP: ハチロクの瞳に、僕が映る。\n僕の目に映るハチロクは、どれほど美しいことだろう。
3175 = "Trong đôi mắt Hachiroku, bóng hình tôi phản chiếu.\\nHachiroku phản chiếu trong đôi mắt tôi, đẹp đẽ biết nhường nào."

# 【ポーレット】
# display as 波萊特
# JP: 「で！　ですね？」
2672 = "「Dạ! Phải không ạ?」"

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「おっと」\n「あっ」
2159 = "「Ái chà」\\n「A」"

# 【ポーレット】
# display as 波萊特
# JP: 「冥国式のこは、そういう感じの最適化がされないんです。\nそのかわり誰とでも組めるし、どの車両にもすぐ乗れる」
2540 = "「Loại Meikoku này không được tối ưu hóa theo cách đó.\\nThay vào đó, nó có thể kết hợp với bất kỳ ai và lên bất kỳ toa tàu nào ngay lập tức」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
2210 = "「À, ừm」"

# monologue
# JP: そうだった。\nポーレットへと軽く会釈し、意識と話を元へと戻す。
3028 = "Đúng vậy nhỉ.\\nTôi khẽ cúi đầu chào Paulette, rồi thu hồi ý thức và câu chuyện trở lại như ban đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「互換性とは、そうした点も含めてという意味か。\n専門性を諦めて、そのかわりに汎用性を高める」
2401 = "「Vậy ý cô là sự tương thích bao gồm cả những điểm đó sao?\\nTừ bỏ tính chuyên môn hóa để đổi lấy việc nâng cao tính đa dụng」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。大量生産大量消費が前提ですから、\n機関車も\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、消費・交換をするものとして」
2477 = "「Đúng là như vậy. Vì dựa trên tiền đề sản xuất hàng loạt và tiêu thụ hàng loạt,\\nnên cả đầu máy hơi nước lẫn \\x%lレイルロオド;#00ffc040;Railord%l;#; đều là những thứ dùng để tiêu thụ và thay thế」"

# 【双鉄】
# display as 雙鐵
# JP: 「専用設計を採らず、ボディもワンボディで済ませる。\n……安全面ではどうなのか、そこがいささか不安だが」
2409 = "「Không áp dụng thiết kế chuyên dụng, thân tàu cũng chỉ là loại nguyên khối.\\n……Về mặt an toàn thì sao nhỉ, điều đó khiến tôi hơi lo lắng」"

# 【ポーレット】
# display as 波萊特
# JP: 「冥国では、それで十分なんだと思います。\n国土も広大で、輸送密度も相当に薄いはずですし」
2389 = "「Ở Meikoku, tôi nghĩ như vậy là đủ rồi.\\nLãnh thổ rộng lớn và mật độ vận tải chắc hẳn cũng rất mỏng」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。合理的……といえば極めて合理的だ。\nその視点に立てば逆に、日ノ本式の欠点も見えてくる」
2084 = "「Ra là vậy. Hợp lý…… nếu nói về mặt hợp lý thì quả thực là cực kỳ hợp lý.\\nĐứng từ góc độ đó, ngược lại, nhược điểm của kiểu Hinomoto cũng dần lộ ra」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですね」
# 2438 = "「是的」" 

# monologue
# JP: 車両を失くした\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を失くした車両。
3050 = "Những \\x%lレイルロオド;#00ffc040;Railord%l;#; bị mất toa tàu.\\nNhững toa tàu bị mất \\x%lレイルロオド;#00ffc040;Railord%l;#;."

# monologue
# JP: 日ノ本式では、そのほとんどが廃用を余儀なくされる。\nけれども冥国式ならば、再活用に困らない。
3115 = "Với kiểu Hinomoto, hầu hết trong số đó buộc phải loại bỏ.\\nNhưng với kiểu Meikoku, việc tái sử dụng lại chẳng gặp khó khăn gì."

# 【ハチロク】
# display as 八六
# JP: 「ですが、鉄道輸送で最優先されるべきは常に安全です。\n長期的にみれば、日ノ本式の長所は際立つものかと」
2503 = "「Tuy nhiên, điều nên được ưu tiên hàng đầu trong vận tải đường sắt luôn là sự an toàn.\\nXét về lâu dài, tôi nghĩ ưu điểm của kiểu Hinomoto mới là nổi bật」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。それが、日ノ本人の一般的な感覚にも[がっち,1]合致\n――ああ、いや」
2454 = "「Quả thật là vậy. Điều đó cũng phù hợp với cảm nhận chung của người dân Hinomoto\\n――à, không」"

# monologue
# JP: 言葉を止めた瞬間に、\nハチロクとポーレットとが同時に頷く。
3118 = "Ngay khoảnh khắc tôi ngừng lời,\\nHachiroku và Paulette đồng loạt gật đầu."

# monologue
# JP: やはり、そうか。
3234 = "Quả nhiên là vậy sao."

# 【双鉄】
# display as 雙鐵
# JP: 「だから、冥国式の蒸機と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とは、\n日ノ本式のお手本にはなれなかったというわけか」
2399 = "「Vậy nên, đầu máy hơi nước và \\x%lレイルロオド;#00ffc040;Railord%l;#; kiểu Meikoku,\\nchẳng thể trở thành hình mẫu cho kiểu Hinomoto được, phải không」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。国は[えいこく,1]詠国式をお手本にしましたし、大手私鉄も\n[どっこく,1]髑国や詠国が主流。[めいこく,1]冥国式は、そもそも少数派でした」
2437 = "「Vâng. Quốc gia đã lấy kiểu mẫu của Vinh Quốc, và các công ty đường sắt tư nhân lớn cũng lấy Độc Quốc hoặc Vinh Quốc làm chủ đạo. Kiểu Minh Quốc vốn dĩ đã là thiểu số rồi」"

# 【ハチロク】
# display as 八六
# JP: 「開拓当初の北開道は、広大な土地と低い輸送密度ゆえに、冥国式をお手本として採用したとも聞いておりますが」
2388 = "「Em cũng nghe nói rằng thời kỳ đầu khai phá ở Bắc Khai Đạo, vì vùng đất rộng lớn và mật độ vận chuyển thấp nên họ đã chọn áp dụng kiểu mẫu của Minh Quốc」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。もとから特徴が際立つゆえの少数派であったのか。\nしかし、その中で100年以上もオリヴィは生き残った」
2231 = "「Hừm. Vậy ra nó là thiểu số ngay từ đầu do những đặc điểm nổi bật đó sao. Nhưng, trong số đó, Olivi vẫn sống sót được hơn 100 năm」"

# 【ハチロク】
# display as 八六
# JP: 「見事なことと存じます。単なる幸運やめぐり合わせでは、\n決して果たし得ぬことであるかと」
2627 = "「Em nghĩ đó là một kỳ tích ạ. Nếu chỉ nhờ vào may mắn hay cơ duyên đơn thuần thì chắc chắn không thể nào đạt được điều đó」"

# monologue
# JP: ハチロクの素直な賞賛に、\nポーレットは強い頷きで応える。
3259 = "Trước lời khen ngợi chân thành của Hachiroku, Paulette đáp lại bằng một cái gật đầu mạnh mẽ."

# 【ポーレット】
# display as 波萊特
# JP: 「Ⅸ号は、俗に言う[あたりがま,2]当り罐なんですよ。\n大量生産の品質のブレが、時々、大当たりを産むんです」
2014 = "「Số IX, thường được gọi là đầu máy 'trúng số' đấy ạ. Sự chênh lệch chất lượng trong sản xuất hàng loạt thỉnh thoảng lại tạo ra những món đồ cực phẩm」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。であろうな」
2244 = "「Hừm. Đúng là như vậy」"

# monologue
# JP: ……大量生産・大量消費であるのなら、\n当然、解体部品も大量に発生するはずだ。
1541 = "……Nếu là sản xuất hàng loạt và tiêu dùng hàng loạt, thì đương nhiên các linh kiện tháo dỡ cũng phải phát sinh với số lượng lớn."

# monologue
# JP: そうしたものから最上を選りすぐり交換すれば、\n生き残った“当り罐”の輝きも更に増そうし――
3308 = "Nếu chọn lọc và thay thế bằng những linh kiện tốt nhất từ những thứ đó, thì vẻ rạng rỡ của một chiếc “đầu máy trúng số” sống sót chắc chắn sẽ càng tăng thêm――"

# 【双鉄】
# display as 雙鐵
# JP: 「それに、オリヴィの性格も大いに影響しているだろうな。\n明るくさっぱり、引きずらないで」
2548 = "「Thêm vào đó, tính cách của Olivi chắc cũng ảnh hưởng rất lớn nhỉ. Luôn vui vẻ, sảng khoái và không bao giờ để bụng chuyện đã qua」"

# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
# 2202 = "「啊！？」" 

# monologue
# JP: ハチロクの声に、ぎょっとする。\nなにか、強い――恐怖のような何かを、感じた気がして。
2962 = "Hachiroku giật mình trước giọng nói của Hachiroku. Tôi cảm giác như mình vừa thoáng thấy một thứ gì đó mạnh mẽ――như là nỗi sợ hãi vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ハチロク」
2356 = "「Sao thế? Hachiroku」"

# monologue
# JP: 聞いた瞬間、思い出す。\nそういえば、さっきハチロクは――
3349 = "Nghe thấy câu hỏi, tôi chợt nhớ ra. Nhắc mới nhớ, vừa nãy Hachiroku đã――"

# monologue
# JP: “オリヴィが、みかん鉄道でどう扱われていたのか”を\n――っ！
1528 = "“Cách mà Olivi bị đối xử ở đường sắt Mikan”\n――っ！"

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィから、なにか――\n例えば、過去に関する\x%l共感;#00ffc040;共感%l;#;などを受け取ったのか？」
2039 = "「Có phải em đã nhận được điều gì đó từ Olivi――ví dụ như, \\x%l共感;#00ffc040;sự đồng cảm%l;#; về quá khứ chẳng hạn?」"

# 【ハチロク】
# display as 八六
# JP: 「……オリヴィは、ずっと\x%l共感;#00ffc040;共感%l;#;を閉ざしております」
1572 = "「……Olivie, từ trước đến nay luôn đóng kín \\x%lcảm ứng;#00ffc040;cảm ứng%l;#;」"

# 【双鉄】
# display as 雙鐵
# JP: 「ずっと？」
1978 = "「Từ trước đến nay sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　れいなもそういってました！\nそこのところは、すごくあのこも気にしてて」
2200 = "「A! Reina cũng từng nói vậy! \nCô bé đó cũng rất bận tâm về chuyện đó」"

# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;を閉ざす――とは、\n心を閉ざすのとおんなじような感覚だろうか？
3390 = "Đóng kín \\x%lcảm ứng;#00ffc040;cảm ứng%l;#;――phải chăng, \ncũng giống như cảm giác đóng kín trái tim?"

# monologue
# JP: そう考れば、強い違和感が湧き上がってくる。\nあの明るさと芯の強さが、閉ざした心からなどと――
3163 = "Nghĩ như vậy, một cảm giác vô cùng bất an trào dâng. \nSự tươi sáng và cốt cách kiên cường kia, sao có thể xuất phát từ một trái tim đã đóng kín――"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。あるいは、\x%l共感;#00ffc040;共感%l;#;能力の不調などでは？\nあれだけ古い\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ともなると」
2217 = "「À. Hay là do, \\x%lRailord;#00ffc040;Railord%l;#; khả năng \\x%lcảm ứng;#00ffc040;cảm ứng%l;#; bị trục trặc chăng? \nĐối với một \\x%lRailord;#00ffc040;Railord%l;#; cũ kỹ đến mức đó thì...」"

# 【ポーレット】
# display as 波萊特＆八六
# JP: 「っ！」\n「いえっ！」
2629 = "「Á!」\n「Không phải!」"

# monologue
# JP: 同時に、とても過敏な反応。\nけれど、全く正反対の。
2938 = "Đồng thời, là những phản ứng vô cùng nhạy cảm. \nNhưng, lại hoàn toàn trái ngược nhau."

# monologue
# JP: ポーレットの顔はうつむいて、\nハチロクの目は、まっすぐ強く、僕を捉える。
3261 = "Khuôn mặt Paulette cúi gằm xuống, \nánh mắt Hachiroku thì nhìn thẳng vào tôi, đầy mạnh mẽ."

# 【ハチロク】
# display as 八六
# JP: 「オリヴィに、\x%l共感;#00ffc040;共感%l;#;能力はございます。添乗のときは、\n最低限の情報共有はもちろんおこなっておりましたし」
2285 = "「Olivie vẫn có năng lực \\x%lcảm ứng;#00ffc040;cảm ứng%l;#;. Khi đi tàu, \ntối thiểu thì cô ấy vẫn thực hiện chia sẻ thông tin mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはそうか」
2205 = "「À, ra là vậy」"

# 【ハチロク】
# display as 八六
# JP: 「それに――あわや衝突のあの一瞬。\nあの一瞬には、オリヴィちゃんの方から、\x%l共感;#00ffc040;共感%l;#;を」
2545 = "「Hơn nữa――khoảnh khắc suýt chút nữa va chạm đó. \nChính trong khoảnh khắc đó, từ phía Olivie-chan, \ncảm ứng \\x%lcảm ứng;#00ffc040;cảm ứng%l;#; đã...」"

# monologue
# JP: ポーレットの妙な反応も気にはかかるが、\nハチロクの方が、やはり気になる。
3399 = "Dù phản ứng kỳ lạ của Paulette cũng làm tôi bận tâm, \nnhưng Hachiroku mới là người khiến tôi lo lắng hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「なんとだ？」
2048 = "「Là sao thế?」"

# 【ハチロク】
# display as 八六
# JP: 「詠語で“オフ・ザ・ライト”と。\nその意味と理由ごと、わたくしに伝わってまいりました」
2563 = "「Bằng tiếng Anh là “Off the light”. \nCả ý nghĩa lẫn lý do đó, đều đã được truyền tải đến cho em」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、だから前照灯をとっさに消灯してくれたのか」
2216 = "「À, ra là vậy, thảo nào cô lập tức tắt đèn pha đi giúp tôi.」"

# monologue
# JP: 理解はそのまま、オリヴィへの好感になる。
3396 = "Hiểu ra được điều đó, thiện cảm của tôi dành cho Olivi càng thêm lớn."

# monologue
# JP: 自分の手柄をさりげなく、ハチロクの手柄としてくれた\n――その気遣いは、ささやかゆえに心地よい。
2896 = "Cô ấy khéo léo biến công lao của chính mình thành của Hachiroku\\n――sự tinh tế đó, tuy nhỏ nhoi nhưng lại khiến lòng người dễ chịu."

# 【ハチロク】
# display as 八六
# JP: 「そうして、同時に――感情も」
2551 = "「Và đồng thời――cả cảm xúc nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！！？」
2020 = "「！！？」"

# monologue
# JP: 重い声。\nくっと、ハチロクが唇を噛む。
2950 = "Một giọng nói trầm nặng.\\nHachiroku cắn chặt môi."

# monologue
# JP: そのまま数秒、うつむいて――\nやがてのろのろ、絞りだすような声を出す。
3091 = "Cứ thế trong vài giây, cô ấy cúi mặt xuống――\\nRồi từ từ, cất tiếng như đang cố nặn từng lời ra."

# 【ハチロク】
# display as 八六
# JP: 「真っ黒くまとわりつくような感情が――\nわたくしさえも知らないような――」
2668 = "「Một loại cảm xúc đen tối cứ đeo bám lấy――\\nNgay cả bản thân ta cũng không hề hay biết――」"

# monologue
# JP: ハチロクの体が小さく震える。\nゆえ、その肩を抱き寄せる。
2953 = "Cơ thể Hachiroku khẽ run lên.\\nVì vậy, tôi ôm lấy vai cô ấy."

# monologue
# JP: ハチロクは小さく息を吐き。\nそれから静かに、僕を見上げて、言葉をつなぐ。
2956 = "Hachiroku khẽ thở hắt ra.\\nSau đó, cô lặng lẽ ngước nhìn tôi và tiếp lời."

# 【ハチロク】
# display as 八六
# JP: 「恐らくは、どのような言葉にさえも出来ぬほどの。\n深く、濃く。黒く、底知れぬ――絶望が」
2362 = "「Có lẽ là một thứ cảm xúc không thể diễn tả thành lời.\\nSâu sắc, đậm đặc. Đen tối, không đáy――một nỗi tuyệt vọng.」"
