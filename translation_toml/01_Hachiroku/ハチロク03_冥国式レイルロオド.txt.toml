3227 = "Hibiki và Olivy trao nhau nụ cười tươi\nrói.\nBên cạnh đó, Nagi trông có vẻ khá tiếc\nnuối."

# 【凪】
# display as 凪
# JP: 「あう～、凪さま、めぐりあわせの悪かとばい！」
2198 = "「Au~, Nagi xui xẻo quá đi mất á!」"

# 【双鉄】
# display as 雙鐵
# JP: 「でもなかろう。真打ちは後から登場するものだ」
2580 = "「Cũng chưa chắc đâu. Nhân vật chính thường\nxuất hiện sau cùng mà.」"

# 【凪】
# display as 凪
# JP: 「わおわお、にーさんよかこと言うばい！」
2133 = "「Wow wow, anh hai nói nghe lọt tai ghê á!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あははははっ！」
2183 = "「Ahahahaha!」"

# monologue
# JP: 凪のいつもの凪ぶしに、\nオリヴィが、いとも楽しげに笑い出す。
3375 = "Trước điệu bộ quen thuộc của Nagi,\nOlivy bật cười một cách vô cùng thích thú."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ナギもおもしろいねー！\n一緒に乗務、楽しみにしてるねー！」
2072 = "「Nagi cũng thú vị ghê nha!\nOlivy rất mong chờ được làm nhiệm vụ cùng\ncậu đó!」"

# 【凪】
# display as 凪
# JP: 「まっかせろばーい！」
2406 = "「Cứ giao cho em á!」"

# 【双鉄】
# display as 雙鐵
# JP: 「さて、と」
2671 = "「Rồi, vậy thì.」"

# monologue
# JP: 気を引き締める。\n見た目は幼くとも、オリヴィはハチロク以上のベテランだ。
3178 = "Tôi xốc lại tinh thần.\nDù vẻ ngoài trông trẻ con, nhưng Olivy lại\nlà một người dày dặn kinh nghiệm hơn cả\nHachiroku."

# monologue
# JP: 万が一にもしくじって、『御一夜鉄道はこんなものか』と\n思われたのなら、恐らく、オリヴィのためにもならない。
3317 = "Nhỡ may tôi làm hỏng việc, khiến cô ấy\nnghĩ \"Đường sắt Ohito chỉ đến thế này thôi\nsao\"\nthì e rằng cũng chẳng tốt đẹp gì cho\nOlivy."

# 【双鉄】
# display as 雙鐵
# JP: 「乗務だ。いくぞ」
2605 = "「Lên tàu thôi. Đi nào.」"

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄さま。\nいつもどおりに、ご安全に」
2310 = "「Vâng, thưa ngài Soutetsu.\nChúc ngài một chuyến đi an toàn như mọi\nkhi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
2234 = "「Ừm.」"

# monologue
# JP: ああ、そうだ。いつもどおりに――
3034 = "À, đúng rồi. Cứ như mọi khi——"

# monologue
# JP: 僕のとなりに、すずが、ハチロクがいてくれるなら、\n大丈夫。僕は必ず、僕のベストで乗務を果たせる。
3002 = "Chỉ cần có Suzu, có Hachiroku ở bên cạnh,\ntôi sẽ ổn thôi. Tôi chắc chắn sẽ hoàn\nthành nhiệm vụ với phong độ tốt nhất của\nmình."

# monologue
# JP: （ぽーーーーっ！）
3431 = "（Tuuuuu!）"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
# 1557 = "「……」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま。\x%l絶気;#00ffc040;絶気%l;#;を」
2686 = "「Ngài Soutetsu. Hãy \\x%l絶気;#00ffc040;cắt hơi%l;#; đi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。\x%l逆転機;#00ffc040;逆転機%l;#;、\x%lミッドギア;#00ffc040;ミッドギア%l;#;」
2229 = "「Ừm. \\x%l逆転機;#00ffc040;Cần đảo chiều%l;#;, \\x%lミッドギア;#00ffc040;số trung tính%l;#;.」"

# 【日々姫】
# display as 日日姬
# JP: 「ボイラー注水！」
2673 = "「Bơm nước vào lò hơi!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
# 1557 = "「……」" 

# monologue
# JP: 物理的にも、難易度的にも山場は越えた。
3121 = "Về mặt vật lý cũng như độ khó, chúng tôi\nđã vượt qua được đỉnh điểm rồi."

# monologue
# JP: オリヴィも集中しきってくれているのだろう。\n視線は背中を刺すようだったが、この調子なら――っ！
3078 = "Chắc hẳn Olivy cũng đang tập trung cao độ.\nÁnh mắt cô ấy như xuyên thấu lưng tôi,\nnhưng nếu cứ giữ vững phong độ này thì——っ!"

# 【ハチロク】
# display as ３人
# JP: 「双鉄さまっ！」「非常ーーーーーっ！！！！」\n「っ！！！」
2684 = "「Ngài Soutetsu!」「Phanh khẩn cấpppp!!!!」\n「っ!!!」"

# monologue
# JP: （ポーーーーーーーーーーーーーーーーーーっ！！！）
3430 = "（Tuúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúúú!!!）"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Ｗｈａｔ　ｈａｐｐｅｎｅｄ！！？」
2711 = "「What happened!!?」"

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 2199 = "「啊！」" 

# monologue
# JP: （ずしっ）
3436 = "（Bịch）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2168 = "「っ!?」"

# monologue
# JP: 左肩にいきなり荷重がかかる。\nが、ナニゴトかを確かめる余裕などないっ！
3127 = "Một sức nặng bất ngờ đè lên vai trái tôi.\nNhưng tôi làm gì có thời gian để xem đó là\nchuyện gì cơ chứ!"

# monologue
# JP: （がくんっ！！！！）
3424 = "（Kịch!!!!）"

# 【ハチロク】
# display as 八六
# JP: 「きゃっ！！？」
2116 = "「Á!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクっ！」
2055 = "「Hachiroku!」"

# monologue
# JP: ブレーキ弁は非常の位置に押し込んだまま、\n左手でハチロクを抱きとめる！
3191 = "Tay phải tôi vẫn ấn chặt van phanh ở vị\ntrí khẩn cấp,\ncòn tay trái thì vòng qua ôm lấy\nHachiroku!"

# monologue
# JP: （ギギィィィィィィィィーーーーーーッツ！！！！）
3434 = "（Kéééééééééééééééééééééééééééééét!!!!）"

# 【ハチロク】
# display as 八六
# JP: 「ぁぅっ！」
2196 = "「Á!」"

# 【双鉄】
# display as 雙鐵
# JP: 「くっ！！！」
2166 = "「Khục!!!」"

# monologue
# JP: 典型的な非常制動。\n他のすべてを投げ捨てて、止めることだけを求めた挙動。
3004 = "Một pha hãm phanh khẩn cấp điển hình.\nVứt bỏ mọi thứ khác, chỉ mong sao tàu dừng\nlại được."

# monologue
# JP: が…………\x%l制動;#00ffc040;制動%l;#;以外の衝撃は、無い。\nああ、ならば――
2921 = "Nhưng………… ngoài chấn động do \\x%l制動;#00ffc040;hãm phanh%l;#; ra\nthì không còn chấn động nào khác.\nÀ, nếu vậy thì——"

# 【日々姫】
# display as 日日姬
# JP: 「痛ったた～」
2303 = "「Đau quá đi~」"

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。大丈夫か日々姫」
2403 = "「Xin lỗi. Em không sao chứ, Hibiki?」"

