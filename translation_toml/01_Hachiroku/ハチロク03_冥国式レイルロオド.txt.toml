# display as 日日姬
# JP: 「大丈夫！　衝突してない！　\nっていうか、今のなに？　イノシシかなんか！？」
2472 = "「Em không sao! Không đâm phải gì cả!\nMà nãy là cái gì vậy? Lợn rừng hay gì á!?」"

# 【ハチロク】
# display as 八六
# JP: 「いえ、もっと大きな――恐らくはシカかと。\nいずれにいたしましても、良く逃げてくれました」
1997 = "「Không, lớn hơn thế——có lẽ là một con hươu\nạ.\nDù sao đi nữa thì may mà nó đã chạy thoát\nkịp.」"

# 【双鉄】
# display as 雙鐵
# JP: 「まったくだ」
2256 = "「Đúng vậy thật.」"

# monologue
# JP: 間に合わないと正直思った。\nいまさらぶわりと、背筋いっぱいに汗が出る。
3192 = "Thành thật mà nói, tôi cứ tưởng là không\nkịp rồi.\nGiờ mới thấy mồ hôi túa ra ướt đẫm cả\nlưng."

# monologue
# JP: あれだけの大動物にもしも衝突してしまっていたなら、\n要検査――8620は当面、走れなくなっていただろう。
3103 = "Nếu lỡ đâm phải một con vật lớn như vậy,\nthì sẽ phải kiểm tra toàn diện——và 8620 sẽ\nkhông thể chạy được trong một thời gian."

# 【双鉄】
# display as 雙鐵
# JP: 「……本当に、無事でよかった」
1576 = "「……Thật sự, may mà không sao.」"

# 【ハチロク】
# display as 八六
# JP: 「か、どうかはまだわかりません。\n双鉄さまはキャブ内を。日々姫は、わたくしを連れて」
2426 = "「Có sao hay không thì vẫn chưa biết được\nđâu ạ.\nNgài Soutetsu hãy kiểm tra bên trong buồng\nlái. Hibiki, hãy đưa em đi xem thử.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、だよね！　わかった！」
2207 = "「A, đúng rồi nhỉ! Đã rõ!」"

# monologue
# JP: 日々姫はさっとハチロクを抱き、キャブから出ていく。
3224 = "Hibiki vội vàng ôm lấy Hachiroku rồi rời\nkhỏi buồng lái."

# monologue
# JP: ならば僕は、\nとにもかくにも、再始動に向け――
3382 = "Vậy thì tôi,\ndù sao đi nữa, cũng phải chuẩn bị khởi\nđộng lại máy——"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ぅ……ぁ――」
2164 = "「Ư……a——」"

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ！！？」
2287 = "「Olivy!!?」"

# monologue
# JP: 苦しげな呻きに血の気が引く。\n咄嗟のことで、完全にうっかりしてしまっていた。
3280 = "Tiếng rên rỉ đau đớn khiến tôi lạnh toát\ncả người.\nSự việc xảy ra quá nhanh khiến tôi hoàn\ntoàn quên bẵng đi mất."

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫――…………か？」
2044 = "「Cô không sao——…………chứ?」"

# monologue
# JP: オリヴィは……なんというのか、突っ立っている。\n呆然と……ぽかんと口を開けている。
3076 = "Olivy…… nói sao nhỉ, cô ấy đang đứng sững\nra đó.\nNgẩn ngơ…… miệng há hốc."

# monologue
# JP: 見たところは、汚れも破損もないようだ。\n転倒をしなかったのは幸い――ああ、いやっ！？
2916 = "Nhìn bề ngoài thì có vẻ không bị bẩn hay\ntrầy xước gì.\nMay mà không bị ngã——à, không phải!?"

# 【双鉄】
# display as 雙鐵
# JP: 「転んで、どこか打ったりしたか？」
2433 = "「Cô bị ngã rồi va đập vào đâu à?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「え？」
# 2128 = "「咦？」" 

# monologue
# JP: びっくりした顔。\nぱちくり、まばたき。
3071 = "Vẻ mặt ngạc nhiên.\nChớp chớp mắt liên tục."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ううんっ！？　オリヴィそんなマヌケじゃないよ！\nソーテツ、『非常』って、ちゃんとさけんでくれたから」
1983 = "「Không phải nha!? Olivy đâu có ngốc đến\nthế!\nVì Soutetsu đã hô to 'Phanh khẩn cấp' rồi\nmà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2173 = "「À——」"

# monologue
# JP: さすがの経験というべきか。\n安心すれば、けれどもすぐさま次の疑問が湧いてくる。
3374 = "Quả đúng là người dày dặn kinh nghiệm có\nkhác.\nVừa thở phào nhẹ nhõm, thì ngay lập tức\nmột câu hỏi khác lại nảy lên trong đầu\ntôi."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、つい先程、\nなにか苦しげな声を――」
2112 = "「Nhưng mà, lúc nãy,\ntôi nghe thấy giọng cô có vẻ rất đau\nđớn——」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「っていうか、手を動かしながらしゃべろ？\n計器類はオリヴィが見てあげるから！」
2080 = "「Mà này, chúng ta vừa làm vừa nói chuyện\nđi nha?\nĐồng hồ đo các kiểu cứ để Olivy xem cho!」"

# monologue
# JP: 言いながら、思い出したようにオリヴィは、\n焚き口を開けその中を見る。
3077 = "Vừa nói, Olivy vừa như chợt nhớ ra điều gì\nđó,\ncô ấy mở cửa buồng đốt ra và nhìn vào bên\ntrong."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わお、ラッキー。っていうかヒビキがうまいのかな？\n\x%l火床;#00ffc040;火床%l;#;、あんな[きゅうせいどう,2]急制動だったのにキレイ」
2137 = "「Wow, may ghê. Hay là do Hibiki giỏi nhỉ?\n\\x%l火床;#00ffc040;Buồng lửa%l;#; vẫn còn nguyên vẹn dù vừa bị hãm\nphanh gấp như thế.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なによりだ」
2626 = "「Vậy thì tốt quá rồi.」"

# monologue
# JP: 言われたとおり、手を動かしつつ返事する。
3184 = "Tôi vừa làm theo lời cô ấy vừa trả lời."

# monologue
# JP: \x%l逆転機;#00ffc040;逆転機%l;#;を\x%lミッドギア;#00ffc040;ミッドギア%l;#;にいれたところだったのは幸運だった。\n\x%lバイパス弁;#00ffc040;バイパス弁%l;#;とシリンダー排水弁を開け――
99 = "Thật may là tôi vừa mới gạt \\x%l逆転機;#00ffc040;cần đảo chiều%l;#;\nvề \\x%lミッドギア;#00ffc040;số trung tính%l;#;.\nTôi mở \\x%lバイパス弁;#00ffc040;van bypass%l;#; và van xả nước ngưng\nxi-lanh——"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「さっきのね？　感心したから、きっと声が出ちゃったの。\n指示もなしに、あれだけれんけーできるんだ、って」
2571 = "「Chuyện lúc nãy á? Chắc là do ấn tượng quá\nnên lỡ phát ra tiếng đó.\nKiểu, không cần chỉ thị mà vẫn phối hợp ăn\ný đến thế cơ á.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
2174 = "「À……」"

# monologue
# JP: そんな余裕はなかったとはいえ……\n言われてみると、指示を飛ばすべきだったかもしれん。
2996 = "Dù lúc đó tôi không có thời gian để nghĩ\nnhiều……\nnhưng nghe cô ấy nói vậy, có lẽ tôi nên ra\nchỉ thị mới đúng."

# monologue
# JP: 絶叫せずに『非常』と\x%l喚呼;#00ffc040;喚呼%l;#;し、\nそれから\x%l汽笛;#00ffc040;汽笛%l;#;と、前照灯をハイビームに――
2891 = "Không hét lên mà phải \\x%l喚呼;#00ffc040;hô xác nhận%l;#; là\n\"Phanh khẩn cấp\",\nsau đó kéo \\x%l汽笛;#00ffc040;còi hơi nước%l;#;, và bật đèn pha\nlên chế độ chiếu xa——"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「『非常』ってソーテツが\x%lブレーキ;#00ffc040;ブレーキ%l;#;かけたら、\nスゴいよね！　ほんと同時！　\x%l汽笛;#00ffc040;汽笛%l;#;も、前照灯の消灯も」
2681 = "「Lúc Soutetsu hô 'Phanh khẩn cấp' rồi đạp \\x%lブレーキ;#00ffc040;phanh%l;#;\n,\nđỉnh thật đó nha! Gần như cùng lúc luôn!\nCả \\x%l汽笛;#00ffc040;còi hơi nước%l;#; lẫn việc tắt đèn pha nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「消灯？　ハイビームではなく？」
2676 = "「Tắt đèn á? Không phải là bật đèn pha\nchiếu xa sao?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だめだよそんなの！　強い光あてたらすくんじゃう！」
2658 = "「Không được đâu nha! Chiếu ánh sáng mạnh\nvào là nó sẽ bị đứng hình đó!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2173 = "「啊——」" 

# monologue
# JP: 考えてみれば当然か。
2914 = "Nghĩ kỹ thì cũng đúng."

# monologue
# JP: 僕とていきなり強い光をあてられたなら、\n目がくらみ、一歩も動けなくなるだろう。
3205 = "Kể cả là tôi, nếu đột nhiên bị chiếu ánh\nsáng mạnh vào mặt,\nchắc chắn cũng sẽ bị chói mắt và không thể\nnhúc nhích được bước nào."

# 【オリヴィ】
# display as 奥莉薇
