2919 = "Ngược lại, tôi còn thấy xấu hổ vì khoảnh khắc vừa rồi đã nảy sinh những suy đoán đầy hồ nghi."

# 【双鉄】
# display as 雙鐵
# JP: 「右田では日々姫と混同するゆえ、\n公的な場では、双鉄\x%l機関士;#00ffc040;機関士%l;#;で頼む」
2107 = "「Vì nếu gọi là Migita thì sẽ dễ nhầm lẫn với Hibiki,\nnên ở nơi công cộng, cứ gọi ta là Soutetsu\\x%l機関士;#00ffc040;Thợ máy%l;#; nhé.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツ\x%l機関士;#00ffc040;機関士%l;#;。じゃ、ヒビキはヒビキ\x%l機関士;#00ffc040;機関士%l;#;？」
2679 = "「Soutetsu\\x%l機関士;#00ffc040;Thợ máy%l;#;. Vậy, Hibiki thì gọi là Hibiki\\x%l機関士;#00ffc040;Thợ máy%l;#; sao?」"

# 【日々姫】
# display as 日日姬
# JP: 「あはっ！　オッケー、仕事場でもよろしくね？\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィ」
2192 = "「Aha! Okie, ở chỗ làm cũng nhờ cả vào anh nhé?\n\\x%lレイルロオド;#00ffc040;Railord%l;#; Olivi.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「リョーカイ！　ヒビキ\x%l機関士;#00ffc040;機関士%l;#;！！」
2420 = "「Rõ luôn! Thợ máy Hibiki!!」"

# monologue
# JP: ……オリヴィと日々姫の相性はかなりよさそうだ。\nいくらか心が軽くなる。
1545 = "……Có vẻ như Olivi và Hibiki rất hợp nhau. Tâm trí tôi cũng nhẹ nhõm hơn đôi chút."

# 【双鉄】
# display as 雙鐵
# JP: 「ではそれで。\n私的な場では、好きに呼んでくれてかまわない」
2470 = "「Vậy cứ quyết định thế đi.\nTrong không gian riêng tư, em cứ gọi thế nào tùy thích.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！　じゃ、ソーテツとヒビキでっ！\n乗務のときはソーテツ\x%l機関士;#00ffc040;機関士%l;#;とヒビキ\x%l機関士;#00ffc040;機関士%l;#;っ！」
2709 = "「Okie! Vậy, gọi là Soutetsu và Hibiki nhé!\nLúc làm việc thì là thợ máy Soutetsu và thợ máy Hibiki!」"

# 【日々姫】
# display as 日日姬
# JP: 「私もそれで大歓迎！\nあらためてよろしくね、オリヴィ！」
2370 = "「Tớ cũng hoàn toàn đồng ý!\nMột lần nữa, rất vui được gặp cậu, Olivi!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「よろしくっ、ヒビキ！」
2587 = "「Rất vui được gặp cậu, Hibiki!」"

# monologue
# JP: （パンっ！）
3429 = "（Chát!）"

# 【オリヴィ】
# display as 奥莉薇＆日日姬
# JP: 「イェイ！」\n「いぇいっ！」
2554 = "「Yeah!」\\n「Yeah!」"

# monologue
# JP: 息もぴったりなハイタッチ。
2937 = "Một cái đập tay đầy ăn ý."

# monologue
# JP: 凪もⅨ号の\x%l機関士;#00ffc040;機関士%l;#;になりたがっているが、\nこの相性が乗務に活きれば、日々姫が優勢かもしれん。
3108 = "Nagi cũng muốn trở thành \\x%lkỹ sư;#00ffc040;kỹ sư%l;#; của No.Ⅸ, nhưng nếu sự hòa hợp này được tận dụng trong công việc, có lẽ Hibihime sẽ chiếm ưu thế mỗi ngày."

# 【ハチロク】
# display as 八六
# JP: 「あの……オリヴィちゃん？」
2581 = "「Cái đó…… Olivie-chan?」"

# monologue
# JP: おずおずと、ハチロクがオリヴィに呼びかける。
2949 = "Hachiroku rụt rè gọi Olivie."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なに？」
2021 = "「Gì vậy?」"

# monologue
# JP: ギョっとする。\nオリヴィの返事はいかにもイヤイヤだ。
3134 = "Giật cả mình.\\nCâu trả lời của Olivie nghe đầy vẻ miễn cưỡng."

# monologue
# JP: が、ハチロクはひるまない。
3007 = "Nhưng Hachiroku không hề nao núng."

# 【ハチロク】
# display as 八六
# JP: 「わたくしのことは――\nその……呼び名は」
2661 = "「Về phần em――\\nừm…… cách gọi đó」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチロクはハチロクでいーでしょ？　オリヴィの方が、\nけっこーセンパイの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なんだから」
2053 = "「Hachiroku thì cứ gọi là Hachiroku thôi được mà nhỉ? Dù sao Olivie cũng là \\x%lRailord;#00ffc040;Railord%l;#; tiền bối của chị đấy」"

# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
2202 = "「Hả!?」"

# monologue
# JP: 困惑、狼狽、哀しみ――反省。\nハチロクの顔が、見る間に、さまざまに変化していく。
3047 = "Bối rối, hoảng loạn, đau buồn――và hối hận.\\nBiểu cảm trên gương mặt Hachiroku thay đổi liên tục trong nháy mắt."

# monologue
# JP: ああ、そうか、昨日のあの――凪にさえわかった――\n“こども扱い”を、オリヴィは怒っているのか。
3032 = "À, ra là vậy, chuyện hồi tối qua――đến cả Nagi còn nhận ra――\\nOlivie đang giận vì bị “đối xử như trẻ con” sao."

# 【ハチロク】
# display as 八六
# JP: 「あの、わたくし――そのようなつもりでは。\nただ、昨晩の泣いている姿が……あまりに、か弱くて」
2621 = "「Cái đó, em――em không có ý đó.\\nChỉ là, dáng vẻ khóc lóc tối qua của chị…… trông quá đỗi mong manh」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あうっ――\nそれは……まぁ、そー見えちゃうよね、うん」
2194 = "「A ư――\\nCái đó…… chà, trông như vậy thật nhỉ, ừm」"

# 【ハチロク】
# display as 八六
# JP: 「ですから、ついつい。けれど、侮辱するつもりなど、\n決してございませんでした。どうぞ、ご容赦ください」
2260 = "「Vì vậy, tôi mới vô ý như thế. Tuy nhiên, tôi tuyệt đối không hề có ý xúc phạm ngài. Xin hãy lượng thứ cho tôi.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あう～っ、そんなに謝られちゃうと――\nゆうべはオリヴィ……よくなかったって自分で思うし」
2197 = "「Au~, nếu cậu xin lỗi đến mức đó thì--\nThực ra mình cũng thấy tối qua mình... cư xử không tốt lắm.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら、どうぞ仲直りしていただけますと嬉しいです。\nいかがでしょう？　オリヴィさん」
2396 = "「Vậy thì, mình rất vui nếu bạn có thể làm hòa. \nBạn thấy sao? Olivi-san.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん……別に、オリヴィ。\nその辺、ちょっとちゃんとしときたかっただけだし」
2224 = "「Ừm... không có gì, Olivi đây mà. \nChỉ là mình muốn làm rõ chuyện đó thôi.」"

# 【ハチロク】
