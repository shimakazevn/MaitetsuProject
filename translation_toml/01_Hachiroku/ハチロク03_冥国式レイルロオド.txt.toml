3080 = "Hachiroku vội vàng ngăn đầu đang cúi sâu của Olivi lại, nhưng bị Hibihime ngăn cản."

# 【日々姫】
# display as 日日姬
# JP: 「こいば、かばったらいけんとこ」
2624 = "「Không được bao che cho kiểu này đâu.」"

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 2177 = "「啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、カンジョーテキになっちゃって。\nカンゲーカイも、準備してくれてたってきいて」
2281 = "「Olivi, cậu đang bị cảm xúc chi phối đấy. \nTôi nghe nói buổi tiệc chào mừng cũng là do cậu chuẩn bị mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。昨日の態度はよくなかった」
2428 = "「Phải đấy. Thái độ hôm qua của cậu không tốt chút nào.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あぅうっ」
2195 = "「Auu...」"

# monologue
# JP: かわいそうなくらいうろたえる。
3101 = "Cô bé bối rối đến đáng thương."

# monologue
# JP: 怯えさせるつもりは全くないので、\nあわてて続く言葉を継ぎ足す。
2925 = "Vì hoàn toàn không có ý định làm cô bé sợ hãi, \ntôi vội vã tiếp lời."

# 【双鉄】
# display as 雙鐵
# JP: 「が、それが自覚できているのならば問題なかろう。\n出社したら、ポーレットたちにも謝るといい」
2005 = "「Nhưng, nếu em đã tự nhận thức được điều đó thì không có vấn đề gì. \nKhi đến công ty, hãy xin lỗi cả Paulette nữa nhé.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」　
2235 = "「Vâng ạ!」"

# monologue
# JP: 今度はパアッと、笑顔に変わる。
3088 = "Lần này, khuôn mặt cô bé bừng sáng thành một nụ cười."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがとー！　わかった！\nオリヴィぜったいそーするね！　ソーテツサマっ！」
2588 = "「Cảm ơn anh! Em hiểu rồi! \nOlivi nhất định sẽ làm vậy! Soutetsu-sama!」"

# monologue
