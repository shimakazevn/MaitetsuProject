2458 = "「那麼，我就是這些人的代表了」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です。双鉄様こそ、その筆頭で、中心です」
2241 = "「是的。雙鐵少爺不僅是代表，而且還是中心」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2501 = "「！」" 

# monologue
# JP: 照れくさすぎてふざけたつもりの言葉を、\n真正面から真顔で返されてしまう。
