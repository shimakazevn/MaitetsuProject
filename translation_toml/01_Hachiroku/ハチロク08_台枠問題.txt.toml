2841 = "她沒有和平時一樣躺在腳邊，而是在正側面——臉對著臉的位置。" 

# 【ハチロク】
# display as 八六
# JP: 「すみません。少し、お話をしたかったもので」
2213 = "「抱歉。我有些話想和您說」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。今日は、いろいろと大きく動いたからな」
2178 = "「我也是。畢竟今天有了各種重大進展啊」" 

# 【ハチロク】
# display as 八六
# JP: 「大きく……まことに、左様ですね」
2465 = "「重大進展……一點也沒有錯」" 

# monologue
