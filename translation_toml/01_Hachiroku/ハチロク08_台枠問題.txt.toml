# 【ポーレット】
# display as 波萊特
# JP: 「結構……あります、[ハチロクけい,4]8620形の保存車」
2368 = "「確實……有很多８６２０型的保存車輛」" 

# monologue
# JP: ポーレットはもう、ディスプレイを睨みつけている。
3020 = "波萊特已經在看著螢幕了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「[ニイハチロクゴーイチ,4]28651、[ヨンハチロクヨンマル,4]48640、[ヨンハチロクナナヨン,4]48674、[ヨンハチロクキュウロク,4]48696、[ゴーハチロクニイサン,4]58623」
2503 = "「２８６５１、４８６４０、４８６７４、４８６９６、５８６２３」" 

# 【ハチロク】
# display as 八六
