# 【日々姫】
# display as 日日姬
# JP: 「そんなん。こーして」
2436 = "「這個嘛。就像這樣」" 

# monologue
# JP: 日々姫のオムライスが、\nプラスチックのスプーンでふたつに割られていく。
2992 = "日日姬的蛋包飯被塑膠勺子分成兩半。" 

# 【日々姫】
# display as 日日姬
