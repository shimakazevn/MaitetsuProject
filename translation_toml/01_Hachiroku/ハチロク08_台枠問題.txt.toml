2013 = "「咱這裡有鮭魚、干鰹魚和明太魚。小深想要什麼？」" 

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん先取って。どれでもいいよ？」
2127 = "「小凪先選三明治吧。吃什麼都可以哦」" 

# 【凪】
# display as 凪
# JP: 「じゃ、ハムとトマトのもらうばい」
2462 = "「那，咱要有火腿和番茄的」" 

# 【ふかみ】
# display as 深美
# JP: 「わたしは……ええっと、おかか、いい？」
2450 = "「那我……呃，可以吃干鰹魚飯糰嗎？」" 

# 【凪】
# display as 凪
# JP: 「よかばいよかばい」
2475 = "「隨便拿隨便拿」" 

# monologue
# JP: 食欲旺盛な二人に引き換え、僕の傍らからはまだ、\n石炭を噛み砕く、あの豪快な音が聞こえてこない。
