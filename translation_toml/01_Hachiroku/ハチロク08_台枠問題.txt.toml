2715 = "但聽到這裡，波萊特依舊還是一臉茫然的表情。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええと――かえっこ――\nすみません、少し、意味が――」
2001 = "「呃——吊換——不好意思，我有點不太懂——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。その点だったか」
2037 = "「啊，不好意思。關於這點」" 

# monologue
# JP: 普段流暢に話すから、ついつい、\nポーレットの日ノ本語力を自分と同等に思ってしまった。
3056 = "看波萊特平時說話這麼流利，令我在不知不覺間認為她的日語水準和自己一樣了。" 

# 【双鉄】
# display as 雙鐵
