2696 = "不過——是這樣啊。這是撒嬌啊。我是在向八六撒嬌嗎。" 

# 【双鉄】
# display as 雙鐵
# JP: 「願い、頼ることが甘えなら――\nそうだな、僕は、思い切りお前に甘えたい」
2101 = "「如果拜託、請求算是撒嬌的話——沒錯，我想盡情地向你撒嬌」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。どうぞお甘えください。いくらでも」
2098 = "「好的。請您盡情地撒嬌」" 

# monologue
# JP: ハチロクが僕を抱きしめる。
2745 = "八六抱住了我。" 

# monologue
# JP: 小さな体で、薄い体で――\nそれでも、やわらかに包み込む。
3049 = "用嬌小而弱不禁風的身體——溫柔地包容住我。" 

# 【ハチロク】
# display as 八六
# JP: 「それがどれほど切ないことでも――\nあなたのために、わたくしは未来を思いましょう」
2141 = "「就算這件事令我感到無比悲痛——但為了您，我會去放眼未來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕は、\n幸せな今を、お前と重ね続けよう」
2459 = "「那麼，我會將幸福的當下與你一同分享」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ」
# 2031 = "「啊」" 

# monologue
# JP: 抱きしめ返す。ハチロクを。\nおでこにおでこを軽くあて、そのままそっと、キスをする。
2913 = "我也抱住了八六，額頭輕輕地貼在她的額頭上，就這樣慢慢地親吻她。" 

# monologue
# JP: この一瞬を、この一瞬を。\n何度も、何度も――出来る限りに、重ねるように。
3030 = "為了最大限度地跟她共享這一瞬間。" 
