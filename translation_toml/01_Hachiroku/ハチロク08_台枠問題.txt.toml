2838 = "她似乎連鎖性地察覺到了。波萊特的表情頓時綻放出光彩！" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうか、そうですよね。\nすでに静態保存してる子からなら」
2124 = "「對了，原來是這樣。如果使用已經處於靜態保存狀態的車輛的車架……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。“\x%l台枠;#00ffc040;台枠%l;#;だけでももう一度走らせてやりたい”と\n――そう思ってくれる\x%lまいてつ;#00ffc040;まいてつ%l;#;さんを、見つけられれば」
