2826 = "因為她肌膚原本就很白皙，所以她的臉頰慢慢地顯現出紅色的手印。" 

# 【ポーレット】
# display as 波萊特
# JP: 「まずは、[ハチロクニイマル,3]8620を――\x%l台枠;#00ffc040;台枠%l;#;をきっと入手して、\nもう一度、走れるようにしてあげましょう！」
2497 = "「首先要得到８６２０的\\x%l台枠;#00ffc040;車架%l;#;，讓它能再一次跑起來吧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
2068 = "「嗯！」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様――おとなり、失礼してよろしいでしょうか？」
2479 = "「雙鐵少爺——我可以躺在您的身邊嗎？」" 

# 【双鉄】
# display as 雙鐵
