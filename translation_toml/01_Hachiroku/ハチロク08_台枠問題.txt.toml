2844 = "她發出了熱忱的聲音，宛如在回味自己的話一般用力點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「たくさんの方たちが、有能で素敵な方たちが――\nあの子に、力を与えてくださいます」
2260 = "「有這麼多的人，這麼多很厲害的人——幫助了她」" 

# monologue
# JP: まっすぐまっすぐ、ハチロクの目が僕を見る。
2763 = "八六的雙眼筆直看著我。" 

