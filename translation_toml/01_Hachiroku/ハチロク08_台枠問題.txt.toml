2761 = "八六的時間和我的時間不是對等的。就算我的一生結束了，八六也一定還會繼續運轉下去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、目先のことしか見えん。\nそう生きてきたし、これからもきっと、そう生きる」
2180 = "「我只能顧及當前的事情。我就是這樣一路走過來的，今後也一定不會有什麼改變」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
2221 = "「是」" 

# 【双鉄】
# display as 雙鐵
