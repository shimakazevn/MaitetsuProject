2112 = "「它收到了這麼多人的祈願，一定還能繼續跑下去的吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうするさ。そのためだったら、何でもしよう。\nそれこそが今、僕の一番強い願いだ」
1892 = "「一定會的。為此我什麼都願意去做。這是我現在最大的願望」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ。あの子のことが一番ですか」
2074 = "「嗯？您是說它在您心目中是最重要的嗎？」" 

# monologue
# JP: ぷっと、ハチロクの頬がふくれる。\nその頬を、指でつついて潰してしまう。
