2208 = "「所以看到你會放眼未來，我就放心了。因為我可以放心地專注於目前」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――」
2046 = "「嗯——」" 

# monologue
# JP: ほっとしたような、納得したような。\nけれども少し、さみしいようにも聞こえる吐息。
2846 = "她的吐息宛如放心，又宛如理解。但又似乎顯得有些寂寞。" 

# 【ハチロク】
# display as 八六
# JP: 「考えておけとおっしゃいますか？\nこの幸せが、終わった先を」
2161 = "「您是讓我去考慮這份幸福逝去過後的事嗎？」" 

# 【双鉄】
# display as 雙鐵
