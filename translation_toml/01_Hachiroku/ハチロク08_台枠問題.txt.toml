2250 = "「是５８６２３，雙鐵少爺。她是我在四國行駛的妹妹，雖然我們沒有直接見過面」" 

# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;の連携、連鎖によって、妹たちの動向を、\nハチロクはきっと、気にし続けていたのだろう。
3051 = "當年八六肯定有通過\\x%l共感;#00ffc040;共鳴%l;#;的網路、持續關注著妹妹們的動向。" 

# monologue
# JP: その目は優しく懐かしむ、やわらかな光に満ちている。
2849 = "她的眼神中充滿了溫柔、懷念而溫和的光彩。" 

