3170 = "雖然對於我這種只活在當下的人來說，今後的事想再多也是無濟於事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……いや、そうだな。\n僕も、その方が安心だ」
1598 = "「……不，沒錯。這樣我也比較放心」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様が、安心――ですか？」
2481 = "「雙鐵少爺覺得放心——是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2067 = "「嗯」" 

