# 【双鉄】
# display as 雙鐵
# JP: 「ああ。一番だ。\nお前ともつながっていることだからな」
2223 = "「是啊。最重要的。因為它和你是密不可分的啊」" 

# 【ハチロク】
# display as 八六
# JP: 「ふふっ」
2006 = "「呵呵」" 

# monologue
# JP: 幸せそうな、のんびりした笑み。
2857 = "她露出幸福而悠然的笑容。" 

