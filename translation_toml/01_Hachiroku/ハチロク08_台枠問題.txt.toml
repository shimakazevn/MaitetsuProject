# 【日々姫】
# display as 日日姬
# JP: 「なになに、何かあったと？」
1926 = "「什麼什麼，發生什麼事了嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、ございました」
2242 = "「是的」" 

# monologue
# JP: 鼻息も荒い日々姫の問いに、\nハチロクは、鼻たかだかな答えを返す。
3184 = "面對日日姬呼吸急促的提問，八六得意地回答道。" 

# 【ハチロク】
# display as 八六
# JP: 「つい先日。\n登呂流湯のお婆様に――ええと、確か――」
1971 = "「前幾天。登呂流浴場的婆婆——嗯，沒記錯的話——」" 

# 【双鉄】
# display as 雙鐵
