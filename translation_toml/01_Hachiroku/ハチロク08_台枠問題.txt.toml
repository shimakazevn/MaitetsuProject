# 【双鉄】
# display as 雙鐵
# JP: 「不安……か。どのような？」
1900 = "「不安……啊。什麼樣的不安？」" 

# 【ハチロク】
# display as 八六
# JP: 「これほどに幸せなめぐり合わせは――\nきっと、いつまでも続きはしないと、思えてしまって」
2107 = "「如此幸福的命運——我認為是不會永遠持續下去的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことを――」
2137 = "「就算——」" 

# monologue
# JP: 気にしたところで仕方がない、と、\n言いかけ、すぐに考えなおす。
