# 【ポーレット】
# display as 波萊特
# JP: 「と、とにかく！　ですね！！」
2382 = "「總、總而言之！就是！！」" 

# monologue
# JP: （パンっ！）
3199 = "（啪！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2017 = "「哦哦」" 

# monologue
# JP: ポーレットが自分の頬を、\n両手で挟むようにして叩く。
