1931 = "「他們……同意交換\\x%l台枠;#00ffc040;車架%l;#;了啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ありがたいな。\nご快諾を……喜んでまでいただけて」
2063 = "「嗯。真值得慶幸。能得到他們的欣然應允」" 

# monologue
# JP: 58623を静態保存していたのは、\n日ノ本車輌の蒸気部門の技術者有志――
3180 = "靜態保存５８６２３的是日本車輛的蒸汽部門的志願技術人員——" 

# monologue
# JP: 今は、廃止されてしまった部署を、\n最後の最後まで支え続けた方々だった。
3050 = "當初，他們支撐著如今已經被廢除的部門，直到最後一刻。" 

# 【双鉄】
# display as 雙鐵
