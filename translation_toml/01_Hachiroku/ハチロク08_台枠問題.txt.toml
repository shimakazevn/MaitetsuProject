1896 = "「不好意思，吃飯的事先放一放。現在需要立刻展開討論」" 

# monologue
# JP: 言いながらもう、立ち上がっている。
2910 = "我一邊說一邊站起。" 

# monologue
# JP: ハチロクも弁当づつみを素早くたたみ、\n僕へと頷きかけてくれる。
