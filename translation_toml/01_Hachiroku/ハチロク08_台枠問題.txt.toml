2435 = "「這不是命令。是請求」" 

# monologue
# JP: 僕が、先に逝ったそのとき。\n一緒に焼かれて欲しいなどとは、思うまい。
2912 = "我不希望當我先她一步而去的時候，讓她跟著我一起入土。" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;に願うことを、\nきっと、ハチロクにも同じく、願おう。
3152 = "這是我對\\x%l8620;#00ffc040;８６２０%l;#;，以及八六的期望。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前と過ごす時間をより幸せなものとするためにも。\n僕は、この一瞬だけを見つめたいのだ」
2322 = "「為了讓與你度過的時光更加幸福，我只想要抓住當前的瞬間」" 

# 【ハチロク】
# display as 八六
# JP: 「……甘えっ子のマスターですね、双鉄様は」
1616 = "「……雙鐵少爺真是位愛撒嬌的主人啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
2024 = "「唔！？」" 

# monologue
