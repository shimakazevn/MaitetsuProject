2713 = "但是笑容又突然黯淡了下去。" 

# 【ハチロク】
# display as 八六
# JP: 「けれど――やはり、大きなお金がかかるのですね」
1938 = "「但是——果然還是要花一大筆錢的，對吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そこまでを安芸様に頼るわけにもいかんしな」
2225 = "「是啊。畢竟也不能厚著臉皮去求安芸殿下無償幫忙啊」" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;と、58623と。\n両機それぞれの\x%l台枠;#00ffc040;台枠%l;#;の移送と、換装と。
82 = "\\x%l8620;#00ffc040;８６２０%l;#;和５８６２３。兩輛車各自的\\x%l台枠;#00ffc040;車架%l;#;的轉送與換裝。" 

