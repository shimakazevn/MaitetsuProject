# 【双鉄】
# display as 雙鐵
# JP: 「それだ！」
2125 = "「對啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
2014 = "「哎！？」" 

# 【双鉄】
# display as 雙鐵
