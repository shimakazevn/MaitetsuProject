2034 = "「啊！等等！阿哥！所以到底是在說什麼嘛！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。少し説明が足りなかったな」
2043 = "「啊，抱歉。我解釋得不夠清楚」" 

# monologue
