1589 = "「“只要它還能再一次跑起來”——啊。或許，與蒸汽機車打交道的人都會這麼想啊」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様も、ですか？」
2480 = "「雙鐵少爺也是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。多分……\nすでに、僕もだ」
2060 = "「嗯。或許……我可能早就是了」" 

# monologue
# JP: 関わる者、になっている。\nもっと深くまで関わりたいと、心からそう望んでもいる。
2816 = "和蒸汽機車打上了交道。並且發自內心希望與它有更加密切的關係。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[ハチロクニイマル,3]8620に寿命が来たなら――たとえ\x%l動輪;#00ffc040;動輪%l;#;一組だけでも、\n他の車輌の一部としても、走って欲しいと願うだろうさ」
