# 【ハチロク】
# display as 八六
# JP: 「辞任なさって――\n御一夜鉄道の社長に、ご専念を？」
2422 = "「辭去市長一職——專注於御一夜鐵路社長的工作上？」" 

# 【双鉄】
# display as 雙鐵
