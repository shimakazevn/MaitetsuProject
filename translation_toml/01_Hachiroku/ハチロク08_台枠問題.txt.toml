2908 = "我一時沒想到接下來該說什麼。" 

# monologue
# JP: 蓑笠老人の指摘に僕のあえかな希望は、\nさらに小さく、押し潰されてしまった気がして。
3096 = "蓑笠爺爺的話語似乎讓我脆弱的希望變得更飄渺了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――どなたか。\x%l台枠;#00ffc040;台枠%l;#;改修に関する案を――\n良い考えを、お持ちの方は――」
2454 = "「那麼——關於修復\\x%l台枠;#00ffc040;車架%l;#;的主意——還有沒有哪位能想到什麼好方法——」" 

# monologue
# JP: 問題発覚して以来、僕とハチロクとで\n必死になって頭をひねり、それでも出なかった妙案は……
3083 = "自從發現問題以來，我和八六不管怎麼絞盡腦汁都沒能想到什麼好方法……" 

# monologue
# JP: …………いくら待てども、\n場の誰からも、出てきてくれない。
1547 = "…………不管怎麼等，在場的人也沒有提出更好的方案。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええと……\n\x%l台枠;#00ffc040;台枠%l;#;改修に関しての案、じゃないんですけど――」
2004 = "「呃……雖然並不是關於修復\\x%l台枠;#00ffc040;車架%l;#;的主意——」" 

# monologue
# JP: やがて、おずおず。
2694 = "不久後，波萊特提心弔膽地——" 

# monologue
# JP: ひどく苦しげな顔をして、\nポーレットがその白い手をあげる。
2688 = "一臉極為為難的表情舉起了白皙的手。" 

# 【ポーレット】
# display as 波萊特
# JP: 「次善っていうか――どうしてもダメなときには……\n[ハチロクニイマル,3]8620、\x%l静態保存;#00ffc040;静態保存%l;#;――するのは、どうかって、思います」
2167 = "「應該說是次善之策——到了無論如何也沒辦法的時候……將８６２０靜態保存起來——怎麼樣呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l静態保存;#00ffc040;静態保存%l;#;……」
2494 = "「靜態保存……」" 

# 【凪】
# display as 凪
# JP: 「って、何ばい？」
2446 = "「那又是什麼？」" 

# monologue
# JP: ……ハチロクは、説明したくないのだろうか、\nひどく、唇が重そうだ。
1550 = "……八六或許是不想說明，她緊緊抿著自己的嘴唇。" 

# monologue
# JP: ややあって、れいなが、\nいつも以上にゆっくりとした言葉を紡ぐ。
2693 = "不久後玲奈用比以往還要緩慢的語速說道。" 

# 【れいな】
# display as 玲奈
# JP: 「\x%l列車;#00ffc040;列車%l;#;を動かさない状態で、保存することですよぉ。\n飾り物の記念品にして、大事にしてあげることですぅ」
2228 = "「是指將\\x%l列車;#00ffc040;列車%l;#;以不工作的狀態保存起來。作為裝飾用的紀念品珍藏」" 

# 【真闇】
# display as 真闇
# JP: 「あぁ」
2031 = "「啊」" 

# monologue
# JP: この場全ての空気を凝縮したように、\n重く――真闇姉の「あぁ」が響く。
3060 = "真闇姐這一聲“啊”就像是凝聚了這裡所有的空氣一般沉重。" 

# 【真闇】
# display as 真闇
# JP: 「\x%l石造機関庫;#00ffc040;石造機関庫%l;#;ば、例えばＳＬ記念館みたいにして――\nバーベキュー\x%l列車;#00ffc040;列車%l;#;と[ハチロクニイマル,3]8620とで、名物ふたつにしよっと？」
2297 = "「比如說，將\\x%l石造機関庫;#00ffc040;石製機車庫%l;#;改裝成類似蒸汽機車紀念館一樣——讓ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;和８６２０變成我們這裡的兩大地標？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「幸い、機関車変更による混乱はほとんど起きてません。\n\x%lキハ07;#00ffc040;キハ07%l;#;牽引のアンケートも、満足度凄く高かったですし」
2211 = "「所幸改變編組沒有導致混亂。關於\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;牽引的問卷調查反映出乘客滿意度也很高」" 

# 【双鉄】
# display as 雙鐵
# JP: 「バーベキュー\x%l列車;#00ffc040;列車%l;#;は、\x%l客車;#00ffc040;客車%l;#;が主役と……\n観光客さんの多くは理解してくださっているわけか」
2517 = "「ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;的核心是\\x%l客車;#00ffc040;客運車廂%l;#;……看來有很多旅客都明白了這點啊」" 

# monologue
# JP: それは嬉しく、ありがたくあり、\n同時に、やはり口惜しくも感じさせられる。
2924 = "我在因此感覺欣喜的同時，也不可避免地感到遺憾。" 

# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;も可愛らしく魅力的な車輌に間違いないのだが、\n\x%l8620;#00ffc040;8620%l;#;こそは、御一夜の観光復興の金看板だと――
3166 = "雖然\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;也是又可愛又具備魅力的車輛，但\\x%l8620;#00ffc040;８６２０%l;#;才是御一夜的旅遊復興的金字招牌——" 

# 【日々姫】
# display as 日日姬
# JP: 「満足度が高かったんは、\nお客さんたち、ポジションば取りよったからとよ」
2320 = "「滿意度很高是因為客人們站准了立場咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫――」
2218 = "「日日姬——」" 

# monologue
# JP: 日々姫らしからぬ険のある声。\n完全に剥き出しの隈元弁。
2982 = "日日姬一反常態，用毫不掩飾的隈元腔嚴厲地說道。" 

# monologue
# JP: 感情的な日々姫の姿は、\n子猫を守る母猫を僕に思わせる。
2996 = "日日姬衝動的樣子讓我聯想到保護小貓的母貓。" 

# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩が教えてくれたと。自分がやった選択を、\n間違ってないと思うため、人は、判断ば補正すったい」
2372 = "「稀咲學姐告訴過我。為了不讓自己覺得自己的選擇是錯的，人類會修正自己的判斷」" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃん、どぎゃんかこつね？」
2131 = "「小深，這又是什麼意思？」" 

# 【ふかみ】
# display as 深美
# JP: 「えと……お客さん、機関車変更をどうしようも無いから、\n本当は不満でも、自分を納得させた……って意味と思う」
2051 = "「嗯……應該是……乘客覺得更換牽引車是沒辦法的事情，所以就算內心有不滿也還是說服自己接受了……的意思吧」" 

# 【凪】
# display as 凪
# JP: 「なーるほど、\nわざわざ御一夜まで来てバーベキュー\x%l列車;#00ffc040;列車%l;#;ば乗って――」
1974 = "「原來如此，特地跑到御一夜來搭乘ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;——」" 

# 【ふかみ】
# display as 深美
# JP: 「そう、それで、『残念だった』って、思って帰るの、\nすごくヤダって思う――と思うの、わたしだったら」
2308 = "「沒錯，如果是我的話，肯定不希望帶著滿肚子遺憾回去的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……それは――そうした補正は、\n多少はあるかもしれませんけれど」
1614 = "「……這個——乘客或許多少會調整一下自己的心態，但是……」" 

# 【日々姫】
# display as 日日姬
# JP: 「バーベキュー\x%l列車;#00ffc040;列車%l;#;は、[ハチロク,3]8620あってのもんたい」
2516 = "「ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;的存在，離不開[八六,3]８６２０」" 

# monologue
# JP: 日々姫が、タブレットを操作する。\n画面に、動画が流れだす。
2991 = "日日姬操作著平板電腦上，隨後螢幕上開始播放影片。" 

# 【ポーレット】
# display as 波萊特
# JP: 「これは……え！？　うそ、もう十二万再生って」
2434 = "「這……哎！？不會吧，點擊量已經有十二萬了」" 

# 【日々姫】
# display as 日日姬
# JP: 「うそじゃなかとよ。\nアップロードして半月もせんで、もう十二万再生たい」
2244 = "「是真的。上傳後不到半個月就有十二萬的點擊量了」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2482 = "「雙鐵少爺？」" 

# monologue
# JP: ハチロクが目で問うてくる。
2756 = "八六用眼神詢問我。" 

# monologue
# JP: その目を視線で誘導し、\n日々姫のタブレットへと向けてやる。
2945 = "我用視線示意她去看日日姬的平板電腦。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大雑把に言えば、十二万人が、ネットを通じて、\n僕らの動画を見てくれた、ということだ」
2281 = "「概括點來說，就是有十二萬人透過網路看了我們的影片」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしたちの動画を……そんなにも多くの方々が？」
2259 = "「有這麼多人……看了我們的影片？」" 

# monologue
# JP: 僕らの、わたくしたちの、動画。\n\x%l8620;#00ffc040;8620%l;#;の、バーベキュー\x%l列車;#00ffc040;列車%l;#;のプロモーション動画。
2920 = "我們的，我們專屬的影片。\\x%l8620;#00ffc040;８６２０%l;#;的、ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;的宣傳影片。" 

# monologue
# JP: それは日々姫の友達――隈元の結婚式場でビデオ撮影の\nバイトをしているセミプロの子が、作ってくれたもの――
3154 = "這是日日姬的朋友——在隈元的結婚會場做攝影兼職的半職業攝影師為我們製作的——" 

# monologue
# JP: （しゅっ、しゅっ、しゅっ、しゅっ）
3197 = "（咻，咻，咻，咻）" 

# monologue
# JP: \x%l動輪;#00ffc040;動輪%l;#;を回す蒸気の音。\n\x%lカマ;#00ffc040;カマ%l;#;の中、真っ赤に燃える石炭たち。
2886 = "影片中傳出推動\\x%l動輪;#00ffc040;動輪%l;#;的蒸汽的聲音。畫面上顯示著在\\x%lカマ;#00ffc040;窯%l;#;內燃燒的赤紅的煤炭。" 

# monologue
# JP: それがストーブの火に変わり、\n肉が焼け、脂の滴る様子に重なる。
3034 = "然後畫面一轉，變成火爐裡的火。肉在爐火的炙烤下流淌著油脂。" 

# monologue
# JP: （ああ――）
3198 = "（啊——）" 

# monologue
# JP: そして、笑顔だ。\n日々姫が、僕さえもが笑っている。
2708 = "以及笑容。日日姬，還有我也在笑。" 

# monologue
# JP: ハチロクの、まるで太陽のような――\n純粋極まる、無垢な笑顔に照らしだされて。
2773 = "八六那宛如太陽一般的——純真無邪的笑容照耀著所有的人。" 

# 【日々姫】
# display as 日日姬
# JP: 「こん動画ば見た人は。運転台通信ば読んだ人は。\n絶対、[ハチロク,3]8620と一緒のバーベキュー\x%l列車;#00ffc040;列車%l;#;に乗りたくて」
2356 = "「看了這段影片的人和讀過駕駛台通信的人，肯定會想搭乘和[八六,3]８６２０配套的ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは――そうだと思います」
2188 = "「我覺得——沒有錯」" 

# 【日々姫】
# display as 日日姬
# JP: 「っ！？」
2502 = "「！？」" 

# monologue
# JP: ハっと、日々姫が息を呑む。\nそれほどまでに、ポーレットの声は苦しげだ。
3024 = "波萊特話語中那無從掩飾的悲痛，讓日日姬都不由得屏住了呼吸。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしだって、[ハチロクニイマル,3]8620が走ってくれれば……\nけど――それは、無理だから――だからっ」
2174 = "「我也希望８６２０還能繼續行駛下去……但是——我們已經束手無策了——束手無策了啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「無理じゃなかっ！　[あのこ,3]8620ば、絶対になおせるけん！\nね、にぃにっ」
1902 = "「不是的！我們絕對能修好８６２０！對吧，阿哥」" 

# monologue
# JP: すがってくる。日々姫が必死で――\n幼かった日にさえ見たことのない眼差しで。
2988 = "日日姬拚命地——以連我小時候都沒見過的眼神哀求我。" 

# monologue
# JP: 僕とて、無論頷きたい。\n頷きたいが――移送さえもが出来ぬ現実がそれを許さぬ。
2947 = "我當然也想點頭。雖然很想——但連轉運都無法做到的現實，讓我實在沒辦法同意。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕、は……」
2168 = "「我……」" 

# monologue
# JP: 答えられない。\nどうしても。
3032 = "無論如何也無法回答。" 

# monologue
# JP: 答えられないそのことが、\n\x%l8620;#00ffc040;8620%l;#;の運命を、望まぬ方へ進めてしまうと――
3076 = "而這也意味著，\\x%l8620;#00ffc040;８６２０%l;#;的命運正朝我們所不希望的方向發展——" 

# 【蓑笠】
# display as 蓑笠
# JP: 「腹ば、[す]空きましたなぁ」
2386 = "「肚子餓癟嘍」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2501 = "「！」" 

# monologue
# JP: ぽん、と蓑笠老人の声。\n重く垂れこめた沈黙の中、ころりと転がるような声。
3095 = "蓑笠爺爺的聲音突然響起。就像是在無比沉重的沉默中激起波瀾一般的聲音。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「少し早かとですが。お昼、どげんでしょうかねぇ」
2477 = "「雖然早了點，咱們午餐吃什麼好呢」" 

# 【ふかみ】
# display as 深美
# JP: 「お待たせ、しました。です」
1917 = "「久等了。嗯」" 

# 【凪】
# display as 凪
# JP: 「買ってきたばーい！」
2412 = "「買好吃的回來囉！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ。すまんな」
2039 = "「啊，嗯。辛苦你們了」" 

# monologue
# JP: レールショップに残った組と、外へ出た組。
2919 = "我們分成了看店小隊和外出小隊。" 

# monologue
# JP: 示し合わせたわけでもないが、\x%l8620;#00ffc040;8620%l;#;改修を諦めたものと\n諦めきれぬものとに分かれてしまったようだ。
3167 = "雖然並沒有商量過，但我們好像自動分成了“放棄修復\\x%l8620;#00ffc040;８６２０%l;#;”和“不願放棄”兩個陣營。" 

# 【凪】
# display as 凪
# JP: 「にーさん、何食べると？」
2086 = "「大哥哥要吃什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんでもいいぞ。余ったもので」
1928 = "「什麼都可以。剩下來的給我吧」" 

# 【凪】
# display as 凪
# JP: 「じゃ、[ひび,1]日々ねーちゃんからばい」
2461 = "「那，先從日日姐開始選吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「ありがと……\nええと、それじゃ、このオムライスいい？」
2406 = "「謝謝……嗯，那麼，我可以要這份蛋包飯嗎？」" 

# 【凪】
# display as 凪
# JP: 「よかばいよかばい！」
2476 = "「隨便拿隨便拿！」" 

# monologue
# JP: 凪の態度に、ご馳走されてるような気になる。\n無論お代は、僕の負担であるのだが。
2786 = "凪的態度搞得好像是她在請客一樣。當然錢是我出的。" 

# 【凪】
# display as 凪
# JP: 「ふかみちゃんは何にすっと？」
2128 = "「小深要吃什麼？」" 

# 【ふかみ】
# display as 深美
# JP: 「え……と、どうしようかな。\nおにぎりもいいし、サンドイッチも――」
2049 = "「嗯……吃、吃什麼好呢。飯糰也可以，三明治也——」" 

# 【凪】
# display as 凪
# JP: 「なら、残った方をうちが取るとよ。\nで、一個ずつかえっこするばい」
2449 = "「那咱就拿另一樣，然後咱們互相換一個得了」" 

# 【ふかみ】
# display as 深美
# JP: 「ありがと。そうしよ」
2407 = "「謝謝。就這樣好了」" 

# monologue
# JP: ふかみがサンドイッチのセットで、\n凪がおにぎりの詰め合わせ。
3027 = "深美選的是三明治套餐，凪則是什錦飯糰。" 

# monologue
# JP: 残った僕は――スパゲティナポリタンか。\n特段、食欲があるでなし、まぁ悪くない。
2792 = "剩下的我是——那不勒斯義大利麵啊。反正沒什麼食慾，也好。" 

# 【ハチロク】
# display as 八六
# JP: 「どこで、お食べになられるのですか？」
2081 = "「在哪裡吃呢？」" 

# monologue
