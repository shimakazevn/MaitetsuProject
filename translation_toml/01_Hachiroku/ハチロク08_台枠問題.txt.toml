2930 = "我往身旁掃了一眼，八六將裝著煤炭的便當盒打開著放在膝蓋上，一動也不動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、ハチロク。食べんのか？」
2156 = "「怎麼了，八六，你不吃嗎？」" 

