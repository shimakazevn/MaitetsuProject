[script]
# lines: 414 
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;の歪み――とは。\nそうか、そこまでのことなのか」
1580 = "「Sự biến dạng của \x%l台枠;#00ffc040;khung gầm%l;#;—— sao.\nRa vậy, nghiêm trọng đến mức đó cơ à.」"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の現況を精査した上での、ハチロクのレビュー。\nその細密な内容に、深刻さを実感させられる。
2870 = "Sau khi kiểm tra kỹ lưỡng tình trạng hiện tại của \x%l8620;#00ffc040;8620%l;#;, Hachiroku đưa ra báo cáo đánh giá.\nNội dung chi tiết đó khiến tôi nhận ra mức độ nghiêm trọng của vấn đề."
# 【ポーレット】
# display as 波萊特
# JP: 「……線路が分断されてしまってることが、\n鉄道に関する全てのことを、難しくしちゃうんです」
1603 = "「……Việc đường ray bị chia cắt,\nđã khiến mọi thứ liên quan đến đường sắt trở nên khó khăn hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2307 = "「Ừ.」"
# monologue
# JP: 湯医線内での営業のみなら、\n\x%l8620;#00ffc040;8620%l;#;に係る負担は、最小限のもので済む。
3087 = "Nếu chỉ kinh doanh trong phạm vi tuyến Yui,\ngánh nặng lên \x%l8620;#00ffc040;8620%l;#; sẽ được giữ ở mức tối thiểu."
# monologue
# JP: それだけを誤魔化し誤魔化し繰り返すなら、あと二年――\n擦り切れるまで、使い潰すことも可能だという。が……
3090 = "Nếu cứ chắp vá duy trì như vậy, thì thêm hai năm nữa——\ncũng có thể vắt kiệt sức nó cho đến khi hao mòn hoàn toàn. Nhưng……"
# 【双鉄】
# display as 雙鐵
# JP: 「[こくら,1]粉蔵まで――\n[ハチロクニイマル,3]8620を連れてはいけんのだな」
2134 = "「Đến Kokura——\nKhông thể mang 8620 theo được rồi nhỉ.」"
# 【凪】
# display as 凪
# JP: 「どうしてばい？　\x%l客車;#00ffc040;客車%l;#;みたいに、\nトレーラーで運べば済む話とよ」
2325 = "「Tại sao chứ? Cứ như \x%l客車;#00ffc040;toa hành khách%l;#;,\nvận chuyển bằng xe rơ-moóc là xong chuyện mà.」"
# monologue
# JP: 凪の疑問は非常に素朴で率直だ。
2787 = "Câu hỏi của Nagi vô cùng mộc mạc và thẳng thắn."
# monologue
# JP: が、その素朴さは、ハチロクのレビューの内容を、\n理解しきれなかったのだということを示してもいる。
2714 = "Nhưng, sự mộc mạc đó cũng cho thấy con bé\nchưa hoàn toàn hiểu hết nội dung báo cáo đánh giá của Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「[ハチロクニイマル,3]8620の\x%l台枠;#00ffc040;台枠%l;#;は[いただいわく,2]板台枠――25mmの[あつえんこうはん,3]圧延鋼板の縦幅――\nつまり、高さによって強度を取るという構造です」
2507 = "「\x%l台枠;#00ffc040;Khung gầm%l;#; của 8620 là khung gầm dạng tấm—— với chiều dọc là thép tấm cán nóng dày 25mm——\nTức là cấu trúc lấy chiều cao để tạo độ cứng cáp ạ.」"
# 【凪】
# display as 凪
# JP: 「？？？」
2515 = "「???」"
# monologue
# JP: 25mm厚の長い鋼板を二枚、並行に並べ縦に置き、\nその鋼板間を、横控や前膨張受等の鋼板群で繋ぎ合わせる。
2728 = "Hai tấm thép dài dày 25mm được đặt thẳng đứng song song với nhau,\ngiữa các tấm thép đó được kết nối bằng nhóm các tấm thép như thanh giằng ngang hay giá đỡ giãn nở phía trước."
# monologue
# JP: ハチロクが図面と口頭で説明してくれた、板\x%l台枠;#00ffc040;台枠%l;#;の構造が、\nけれども凪には、いまひとつ実感できんのだろう。
2770 = "Cấu trúc của \x%l台枠;#00ffc040;khung gầm%l;#; dạng tấm mà Hachiroku đã giải thích bằng bản vẽ và lời nói,\nnhưng có lẽ Nagi vẫn chưa thể hình dung ra được."
# 【ハチロク】
# display as 八六
# JP: 「屋根の修理等に使うハシゴの――そのハシゴの二本柱を、\n厚く縦幅のある鋼板と考えると解り良いかもしれません」
2215 = "「Hãy nghĩ về chiếc thang dùng để sửa mái nhà—— hai thanh dọc của chiếc thang đó,\nnếu coi là những tấm thép dày và rộng theo chiều dọc thì có lẽ sẽ dễ hiểu hơn ạ.」"
# monologue
# JP: ぐっと、ハチロクが説明を砕いたものにする。
2747 = "Hachiroku cố gắng giải thích một cách dễ hiểu hơn."
# monologue
# JP: が、それでもなお、\n凪の小首は大きく大きく傾いてしまう。
2727 = "Nhưng dù vậy,\nNagi vẫn nghiêng đầu đầy vẻ khó hiểu."
# 【凪】
# display as 凪
# JP: 「あんまり……解り良くなかとよ」
2011 = "「Không... dễ hiểu lắm đâu.」"
# 【ふかみ】
# display as 深美
# JP: 「う……ん。だよね。です」
2052 = "「Ư... m. Đúng vậy nhỉ. Ạ.」"
# monologue
# JP: ああ、ふかみもか。\nならば他にも、わかってない者もいるかもしれない。
2820 = "A, cả Fukami cũng vậy sao.\nNếu vậy có lẽ những người khác cũng không hiểu."
# monologue
# JP: よりいっそうに噛み砕くため、僕も頭をひねってみる。
3031 = "Để giải thích cặn kẽ hơn nữa, tôi cũng thử vắt óc suy nghĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「これを見てくれ」
1955 = "「Mọi người nhìn cái này đi.」"
# monologue
# JP: ポーレットからリモコンをふたつ借り受けて、\nそれぞれ、長辺を机の面にあわせて垂直に立てる。
2931 = "Tôi mượn hai chiếc điều khiển từ Paulette,\nrồi dựng đứng chúng lên, để cạnh dài vuông góc với mặt bàn."
# monologue
# JP: 並行にならべたリモコンたちの間に今は、\n梯子状にしたみっつの電池を置いておく。
2827 = "Giữa hai chiếc điều khiển đặt song song,\ntôi đặt ba cục pin thành hình chiếc thang."
# 【双鉄】
# display as 雙鐵
# JP: 「[いただいわく,2]板台枠というのは、まぁ、こんなようなものだ。\nこの上に、車体が乗ると考えてくれ」
2267 = "「Khung gầm dạng tấm thì, à ừm, đại loại là thế này.\nHãy tưởng tượng thân xe sẽ đặt lên trên cái này.」"
# monologue
# JP: 車体は――ひとまずティッシュの箱で良かろう。
3140 = "Thân xe thì—— tạm thời dùng hộp khăn giấy là được rồi."
# monologue
# JP: 上に乗せても、リモコンで模した板台枠は、\n一寸たりとも揺るがない。
2875 = "Dù đặt lên trên, khung gầm dạng tấm mô phỏng bằng điều khiển\nvẫn không hề lung lay dù chỉ một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「電池を、横板と考えてくれ。垂直に並列した板同士が、\n横板によっても支えられ――この構造が、重さを支える」
1954 = "「Hãy coi pin là những thanh ngang. Các tấm dựng thẳng đứng song song với nhau,\nđược chống đỡ bởi các thanh ngang—— Cấu trúc này sẽ chịu tải trọng.」"
# monologue
# JP: 形で見えることが大きいのだろうか。\nようやく、こっくり。凪もふかみも頷いてくる。
2810 = "Việc nhìn thấy hình dáng cụ thể có tác dụng lớn đến vậy sao.\nCuối cùng, Nagi và Fukami cũng gật gù đồng ý."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、\x%l台枠;#00ffc040;台枠%l;#;が歪んでしまうというのは――\nつまり、こういうことなのだ」
1941 = "「Nhưng, việc \x%l台枠;#00ffc040;khung gầm%l;#; bị biến dạng——\nTức là, chuyện như thế này đây.」"
# monologue
# JP: 垂直に並列していたリモコン達を手で傾けて、\nハの字へと。
2944 = "Tôi dùng tay làm nghiêng hai chiếc điều khiển đang dựng thẳng đứng song song,\ntạo thành hình chữ V ngược (bát - ハ)."
# 【ふかみ】
# display as 凪＆深美
# JP: 『「あっ！」\n「あっ！」』
2529 = "『「A!」\n「A!」』"
# monologue
# JP: おそらくこれで、伝わった。\nが、念のため、もういくらかの説明を足す。
3155 = "Có lẽ như vậy là đã hiểu rồi.\nNhưng để chắc chắn, tôi giải thích thêm một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;の歪みは、鋼板の自重をも負荷へと変えてしまう。\n横板である電池は、その負荷を支えようと頑張るが――」
1579 = "「Sự biến dạng của \x%l台枠;#00ffc040;khung gầm%l;#; sẽ biến trọng lượng của chính tấm thép thành gánh nặng.\nPin đóng vai trò là thanh ngang sẽ cố gắng chống đỡ gánh nặng đó nhưng——」"
# 【ふかみ】
# display as 深美
# JP: 「もし、負荷が。限界を、超しちゃったら……」
2104 = "「Nếu như, gánh nặng đó. Vượt quá, giới hạn thì……」"
# 【双鉄】
# display as 雙鐵
# JP: 「当然、こうなる」
2343 = "「Tất nhiên, sẽ thành thế này.」"
# monologue
# JP: 手を離す。
2965 = "Tôi buông tay ra."
# monologue
# JP: 支えをなくしたリモコンたちは、\n哀れ、ティッシュ箱の下に潰される。
2835 = "Những chiếc điều khiển mất đi điểm tựa,\nthật thảm hại, bị hộp khăn giấy đè bẹp dí."
# 【双鉄】
# display as 雙鐵
# JP: 「極端で大雑把な例えではあるが、\n[ハチロクニイマル,3]8620が今抱えている問題は、このようなものだ」
2478 = "「Dù đây là một ví dụ cực đoan và khái quát,\nnhưng vấn đề mà 8620 đang gặp phải hiện tại chính là như thế này.」"
# monologue
# JP: 神妙な顔で頷く凪とふかみへと、\nハチロクの静かな声が重なる。
2813 = "Hachiroku cất giọng nói tĩnh lặng xen vào,\nkhi Nagi và Fukami gật đầu với vẻ mặt nghiêm túc."
# 【ハチロク】
# display as 八六
# JP: 「現状、\x%l台枠;#00ffc040;台枠%l;#;の歪みはまだ致命的なものではありません。\n縦揺れが軽微であれば――営業運転にも耐えられます」
2349 = "「Hiện tại, sự biến dạng của \x%l台枠;#00ffc040;khung gầm%l;#; vẫn chưa đến mức chí mạng.\nNếu độ rung dọc ở mức nhẹ—— thì vẫn có thể chịu đựng được việc vận hành kinh doanh.」"
# 【凪】
# display as 凪
# JP: 「あ！　だからトレーラーで運べんと？」
2032 = "「A! Cho nên mới không vận chuyển bằng xe rơ-moóc được hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「正解だ。トレーラー移送では、振動を回避できんし、\n振動は、\x%l台枠;#00ffc040;台枠%l;#;の歪みを致命的な物へ追いやりかねん」
2305 = "「Chính xác. Việc di chuyển bằng xe rơ-moóc không thể tránh khỏi chấn động,\nvà sự chấn động đó có thể đẩy sự biến dạng của \x%l台枠;#00ffc040;khung gầm%l;#; đến mức chí mạng.」"
# 【ふかみ】
# display as 深美
# JP: 「それなら……[ハチロクニイマル,3]8620は――どうなる、です。か？」
2456 = "「Vậy thì…… 8620—— sẽ ra sao, ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「さて。そこだ」
2057 = "「Chà. Vấn đề là ở chỗ đó.」"
# monologue
# JP: 視線を感じる。\n日々姫やふかみは心配そうに――
2934 = "Tôi cảm nhận được những ánh nhìn.\nHibiki và Fukami đầy vẻ lo lắng——"
# monologue
# JP: そしてポーレットと赤井宮司は、冷静な目で。\n僕の言葉を恐らくは、見極めようと見つめている。
3157 = "Và Paulette cùng đền chủ Akai thì với ánh mắt điềm tĩnh.\nCó lẽ họ đang chăm chú để nhìn thấu lời nói của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「現状のまま営業運転を強行するという道については、\n完全に閉ざしてしまいたいと考えている」
2193 = "「Về con đường cứ giữ nguyên hiện trạng mà ép buộc vận hành kinh doanh,\ntôi muốn đóng lại hoàn toàn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「妥当な判断だと思います。\x%l保線;#00ffc040;[ほせん,1]保線%l;#;をどれほど頑張っても、\n線路上の異物を完全に根絶できる保証はありませんから」
2191 = "「Tôi nghĩ đó là một quyết định thỏa đáng. Dù có nỗ lực \x%l保線;#00ffc040;bảo trì đường ray%l;#; đến đâu,\ncũng không có gì đảm bảo có thể triệt tiêu hoàn toàn các vật thể lạ trên đường ray.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ですね――異物や異常が\x%l台枠;#00ffc040;台枠%l;#;破損に、\nひいては事故に繋がるリスクが、現状では高すぎます」
2303 = "「Đúng vậy—— Nguy cơ vật thể lạ hay sự cố bất thường dẫn đến hỏng \x%l台枠;#00ffc040;khung gầm%l;#;,\ntừ đó gây ra tai nạn, hiện tại là quá cao.」"
# monologue
# JP: 鉄道を良く知るふたりが声を合わせる。\n異論は、誰からも聞こえてこない。
3181 = "Hai người rất am hiểu về đường sắt cùng lên tiếng đồng tình.\nKhông ai đưa ra ý kiến phản đối."
# 【双鉄】
# display as 雙鐵
# JP: 「ので、僕としてはなんとか修復を出来ないか――\nと考えている」
2078 = "「Vì thế, tôi đang nghĩ xem liệu có cách nào sửa chữa được không——」"
# monologue
# JP: 日々姫と凪の強い頷き。\nが――反応は、それだけだ。
2987 = "Cái gật đầu mạnh mẽ của Hibiki và Nagi.\nNhưng—— phản ứng chỉ có vậy."
# monologue
# JP: 他の誰もが、ひどく神妙な顔をして、\nただただ、黙りこんでいる。
2779 = "Những người khác đều mang vẻ mặt vô cùng nghiêm trọng,\nchỉ lặng lẽ ngồi đó."
# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠さん」
2402 = "「Ông Minokasa.」"
# monologue
# JP: だから、\nただ一人、沈黙の質が異なっていると思われる――
2954 = "Chính vì thế,\nngười duy nhất mà tôi cảm thấy sự im lặng có phần khác biệt——"
# monologue
# JP: ハチロクの作った資料を最初から黙々読み続けている\n蓑笠さんへと、声を、そして、希望をかける。
2922 = "Tôi cất lời, và cũng đặt hy vọng vào ông Minokasa,\nngười vẫn luôn lặng lẽ đọc tài liệu Hachiroku chuẩn bị từ đầu đến giờ."
# 【双鉄】
# display as 雙鐵
# JP: 「いかがでしょうか？　\n御一夜で[ハチロクニイマル,3]8620の修復を行える可能性は――」
2163 = "「Ông thấy sao ạ?\nKhả năng tiến hành sửa chữa 8620 tại Ohito là——」"
# 【蓑笠】
# display as 蓑笠
# JP: 「こん[いただいわく,2]板台枠いう代物は――キツかカーブのときなど、\nたわむことを前提の設計ばされておられますな？」
2270 = "「Cái thứ gọi là khung gầm dạng tấm này—— lúc gặp những khúc cua gấp chẳng hạn,\nchẳng phải nó được thiết kế với tiền đề là có thể uốn cong sao?」"
# 【ハチロク】
# display as 八六
# JP: 「左様です。\x%l先台車;#00ffc040;[せんだいしゃ,2]先台車%l;#;で吸収しきれぬ横への力は、\n\x%l台枠;#00ffc040;台枠%l;#;自体がたわむことで吸収します」
2239 = "「Đúng vậy ạ. Lực tác động ngang mà \x%l先台車;#00ffc040;giá chuyển hướng trước%l;#; không thể hấp thụ hết,\nsẽ được hấp thụ bằng cách uốn cong chính bản thân \x%l台枠;#00ffc040;khung gầm%l;#; ạ.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「……こん素材ば、ありふれたもんじゃ無かとです。\n製鉄レベルからの特注ば、必要となられる気がします」
1608 = "「……Loại vật liệu này, không phải thứ phổ biến đâu.\nTôi e là cần phải đặt hàng sản xuất riêng từ khâu luyện thép đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「やはり、左様なこととなりますか」
2276 = "「Quả nhiên, sẽ thành ra như vậy sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「板台枠は、当時から品質の安定が難しかったそうで……\n\x%l帝鉄;#00ffc040;帝鉄%l;#;末期には殆どが[ぼうだいわく,2]棒台枠に取って代わられてたんです」
2268 = "「Khung gầm dạng tấm nghe nói từ thời đó đã rất khó ổn định chất lượng rồi……\nVào cuối thời kỳ \x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;, hầu hết đã được thay thế bằng khung gầm dạng thanh đấy.」"
# monologue
# JP: ……“やはり”というハチロクの言葉に感じた疑問が、\n顔に現れてしまったのだろうか。
1553 = "……Sự nghi vấn tôi cảm thấy trước từ \"quả nhiên\" của Hachiroku,\ncó lẽ đã hiện rõ trên mặt tôi rồi chăng."
# monologue
# JP: ポーレットは、ひとりごとめいた呟きで、\n僕の知識不足をそっと、補ってくれる。
3017 = "Paulette lẩm bẩm như nói một mình,\nnhẹ nhàng bù đắp cho sự thiếu hụt kiến thức của tôi."
# 【ハチロク】
# display as 八六
# JP: 「その場合――\nいかほどのお見積りとなりますでしょうか？」
2084 = "「Trong trường hợp đó——\nDự tính chi phí sẽ khoảng bao nhiêu ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「どう考えても、\n単位ば、億になりますでしょうなぁ」
1905 = "「Dù tính thế nào đi nữa,\nđơn vị chắc chắn sẽ lên đến hàng trăm triệu đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですか」
2248 = "「Vậy sao ạ.」"
# monologue
# JP: あっさりハチロクは頷くが――\n億単位の金を引っ張ることなど、現状、極めて困難だろう。
2754 = "Hachiroku gật đầu một cách nhẹ nhàng nhưng——\nVới tình hình hiện tại, việc xoay sở số tiền lên đến hàng trăm triệu quả là vô cùng khó khăn."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――」
2452 = "「Nếu vậy——」"
# monologue
# JP: 続く言葉を、すぐには出せない。
2908 = "Tôi không thể nói ngay những lời tiếp theo."
# monologue
# JP: 蓑笠老人の指摘に僕のあえかな希望は、\nさらに小さく、押し潰されてしまった気がして。
3096 = "Hy vọng mỏng manh của tôi trước sự chỉ ra của ông Minokasa,\ndường như đã bị đè bẹp, trở nên nhỏ bé hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――どなたか。\x%l台枠;#00ffc040;台枠%l;#;改修に関する案を――\n良い考えを、お持ちの方は――」
2454 = "「Nếu vậy—— có ai không. Về phương án sửa chữa \x%l台枠;#00ffc040;khung gầm%l;#;——\nAi có ý kiến hay thì——」"
# monologue
# JP: 問題発覚して以来、僕とハチロクとで\n必死になって頭をひねり、それでも出なかった妙案は……
3083 = "Kể từ khi phát hiện vấn đề, tôi và Hachiroku\nđã vắt óc suy nghĩ đến tuyệt vọng, nhưng vẫn không nghĩ ra diệu kế nào……"
# monologue
# JP: …………いくら待てども、\n場の誰からも、出てきてくれない。
1547 = "…………Dù chờ đợi bao lâu đi nữa,\ncũng không ai trong số những người ở đây đưa ra được."
# 【ポーレット】
# display as 波萊特
# JP: 「ええと……\n\x%l台枠;#00ffc040;台枠%l;#;改修に関しての案、じゃないんですけど――」
2004 = "「À ừm……\nTuy không phải là phương án liên quan đến việc sửa chữa \x%l台枠;#00ffc040;khung gầm%l;#; đâu, nhưng——」"
# monologue
# JP: やがて、おずおず。
2694 = "Một lúc sau, với vẻ rụt rè."
# monologue
# JP: ひどく苦しげな顔をして、\nポーレットがその白い手をあげる。
2688 = "Với khuôn mặt vô cùng đau khổ,\nPaulette giơ bàn tay trắng trẻo của mình lên."
# 【ポーレット】
# display as 波萊特
# JP: 「次善っていうか――どうしてもダメなときには……\n[ハチロクニイマル,3]8620、\x%l静態保存;#00ffc040;静態保存%l;#;――するのは、どうかって、思います」
2167 = "「Nói là 차 thiện thì đúng hơn—— Khi thực sự không còn cách nào khác……\nTôi nghĩ, hay là chúng ta —— \x%l静態保存;#00ffc040;lưu tĩnh%l;#; 8620?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l静態保存;#00ffc040;静態保存%l;#;……」
2494 = "「\x%l静態保存;#00ffc040;Lưu tĩnh%l;#;……」"
# 【凪】
# display as 凪
# JP: 「って、何ばい？」
2446 = "「Thế, là sao cơ?」"
# monologue
# JP: ……ハチロクは、説明したくないのだろうか、\nひどく、唇が重そうだ。
1550 = "……Hachiroku không muốn giải thích sao,\nđôi môi cô ấy có vẻ vô cùng nặng trĩu."
# monologue
# JP: ややあって、れいなが、\nいつも以上にゆっくりとした言葉を紡ぐ。
2693 = "Một lát sau, Reina,\ncất lên những lời nói chậm rãi hơn thường ngày."
# 【れいな】
# display as 玲奈
# JP: 「\x%l列車;#00ffc040;列車%l;#;を動かさない状態で、保存することですよぉ。\n飾り物の記念品にして、大事にしてあげることですぅ」
2228 = "「Là việc bảo tồn \x%l列車;#00ffc040;đoàn tàu%l;#; trong trạng thái không hoạt động đó ạ.\nBiến nó thành món đồ kỷ niệm trang trí, và trân trọng nó đó ạ.」"
# 【真闇】
# display as 真闇
# JP: 「あぁ」
2031 = "「A.」"
# monologue
# JP: この場全ての空気を凝縮したように、\n重く――真闇姉の「あぁ」が響く。
3060 = "Như thể ngưng tụ toàn bộ không khí nơi đây,\ntiếng \"A\" nặng trĩu—— của chị Mayami vang lên."
# 【真闇】
# display as 真闇
# JP: 「\x%l石造機関庫;#00ffc040;石造機関庫%l;#;ば、例えばＳＬ記念館みたいにして――\nバーベキュー\x%l列車;#00ffc040;列車%l;#;と[ハチロクニイマル,3]8620とで、名物ふたつにしよっと？」
2297 = "「Ví dụ như biến \x%l石造機関庫;#00ffc040;xưởng đầu máy bằng đá%l;#; thành một nơi giống như nhà lưu niệm SL——\nrồi biến \x%l列車;#00ffc040;đoàn tàu%l;#; BBQ và 8620 thành hai đặc sản nổi tiếng luôn sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「幸い、機関車変更による混乱はほとんど起きてません。\n\x%lキハ07;#00ffc040;キハ07%l;#;牽引のアンケートも、満足度凄く高かったですし」
2211 = "「May mắn là sự xáo trộn do việc thay đổi đầu máy xe lửa hầu như không xảy ra.\nKhảo sát về việc dùng \x%lキハ07;#00ffc040;Kiha 07%l;#; kéo tàu cũng cho thấy mức độ hài lòng rất cao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「バーベキュー\x%l列車;#00ffc040;列車%l;#;は、\x%l客車;#00ffc040;客車%l;#;が主役と……\n観光客さんの多くは理解してくださっているわけか」
2517 = "「\x%l列車;#00ffc040;Đoàn tàu%l;#; BBQ thì \x%l客車;#00ffc040;toa hành khách%l;#; mới là nhân vật chính……\nCó vẻ như phần lớn khách du lịch đều hiểu điều đó nhỉ.」"
# monologue
# JP: それは嬉しく、ありがたくあり、\n同時に、やはり口惜しくも感じさせられる。
2924 = "Điều đó thật đáng mừng, thật đáng biết ơn,\nnhưng đồng thời, quả thực cũng khiến tôi cảm thấy tiếc nuối."
# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;も可愛らしく魅力的な車輌に間違いないのだが、\n\x%l8620;#00ffc040;8620%l;#;こそは、御一夜の観光復興の金看板だと――
3166 = "\x%lキハ07;#00ffc040;Kiha 07%l;#; chắc chắn cũng là một toa xe đáng yêu và đầy sức hút,\nnhưng \x%l8620;#00ffc040;8620%l;#; mới chính là bảng hiệu vàng cho sự phục hưng du lịch của Ohito——"
# 【日々姫】
# display as 日日姬
# JP: 「満足度が高かったんは、\nお客さんたち、ポジションば取りよったからとよ」
2320 = "「Mức độ hài lòng cao là vì,\nkhách hàng họ tự điều chỉnh lại tâm lý của mình đó thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫――」
2218 = "「Hibiki——」"
# monologue
# JP: 日々姫らしからぬ険のある声。\n完全に剥き出しの隈元弁。
2982 = "Một giọng nói gay gắt không giống Hibiki chút nào.\nGiọng Kumamoto bộc lộ hoàn toàn."
# monologue
# JP: 感情的な日々姫の姿は、\n子猫を守る母猫を僕に思わせる。
2996 = "Dáng vẻ đầy cảm xúc của Hibiki,\nkhiến tôi liên tưởng đến một mèo mẹ đang bảo vệ mèo con."
# 【日々姫】
# display as 日日姬
# JP: 「稀咲先輩が教えてくれたと。自分がやった選択を、\n間違ってないと思うため、人は、判断ば補正すったい」
2372 = "「Chị Kisaki đã dạy em rồi. Để nghĩ rằng sự lựa chọn của mình\nkhông hề sai lầm, con người sẽ tự điều chỉnh lại phán đoán của mình.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、どぎゃんかこつね？」
2131 = "「Bé Fukami, thế là sao vậy?」"
# 【ふかみ】
# display as 深美
# JP: 「えと……お客さん、機関車変更をどうしようも無いから、\n本当は不満でも、自分を納得させた……って意味と思う」
2051 = "「À ừm…… Khách hàng, vì việc thay đổi đầu máy là chuyện không thể tránh khỏi,\nnên dù thực sự không hài lòng, họ vẫn tự thuyết phục bản thân…… chị nghĩ ý là vậy.」"
# 【凪】
# display as 凪
# JP: 「なーるほど、\nわざわざ御一夜まで来てバーベキュー\x%l列車;#00ffc040;列車%l;#;ば乗って――」
1974 = "「Ra là thế,\ncất công lặn lội đến tận Ohito để đi \x%l列車;#00ffc040;đoàn tàu%l;#; BBQ——」"
# 【ふかみ】
# display as 深美
# JP: 「そう、それで、『残念だった』って、思って帰るの、\nすごくヤダって思う――と思うの、わたしだったら」
2308 = "「Đúng vậy, rồi nghĩ rằng 『Thật đáng tiếc』 khi ra về,\nchắc chắn sẽ thấy rất tệ—— chị nghĩ vậy, nếu là chị.」"
# 【ポーレット】
# display as 波萊特
# JP: 「……それは――そうした補正は、\n多少はあるかもしれませんけれど」
1614 = "「……Chuyện đó—— Sự tự điều chỉnh tâm lý như vậy,\ncó lẽ cũng có một chút, nhưng mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「バーベキュー\x%l列車;#00ffc040;列車%l;#;は、[ハチロク,3]8620あってのもんたい」
2516 = "「\x%l列車;#00ffc040;Đoàn tàu%l;#; BBQ, là thứ phải có 8620 mới trọn vẹn.」"
# monologue
# JP: 日々姫が、タブレットを操作する。\n画面に、動画が流れだす。
2991 = "Hibiki thao tác trên máy tính bảng.\nTrên màn hình, một đoạn video bắt đầu phát."
# 【ポーレット】
# display as 波萊特
# JP: 「これは……え！？　うそ、もう十二万再生って」
2434 = "「Đây là…… Hả!? Đùa sao, đã mười hai vạn lượt xem rồi á.」"
# 【日々姫】
# display as 日日姬
# JP: 「うそじゃなかとよ。\nアップロードして半月もせんで、もう十二万再生たい」
2244 = "「Không đùa đâu.\nTải lên chưa đầy nửa tháng, đã có mười hai vạn lượt xem rồi đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2482 = "「Ngài Soutetsu?」"
# monologue
# JP: ハチロクが目で問うてくる。
2756 = "Hachiroku dùng ánh mắt dò hỏi."
# monologue
# JP: その目を視線で誘導し、\n日々姫のタブレットへと向けてやる。
2945 = "Tôi dùng ánh mắt dẫn dắt ánh nhìn của cô ấy,\nhướng về phía máy tính bảng của Hibiki."
# 【双鉄】
# display as 雙鐵
# JP: 「大雑把に言えば、十二万人が、ネットを通じて、\n僕らの動画を見てくれた、ということだ」
2281 = "「Nói một cách khái quát thì, mười hai vạn người, thông qua mạng internet,\nđã xem đoạn video của chúng ta.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちの動画を……そんなにも多くの方々が？」
2259 = "「Video của chúng ta…… mà lại có nhiều người xem đến vậy sao ạ?」"
# monologue
# JP: 僕らの、わたくしたちの、動画。\n\x%l8620;#00ffc040;8620%l;#;の、バーベキュー\x%l列車;#00ffc040;列車%l;#;のプロモーション動画。
2920 = "Đoạn video của chúng tôi, của chúng ta.\nVideo quảng bá \x%l列車;#00ffc040;đoàn tàu%l;#; BBQ của \x%l8620;#00ffc040;8620%l;#;."
# monologue
# JP: それは日々姫の友達――隈元の結婚式場でビデオ撮影の\nバイトをしているセミプロの子が、作ってくれたもの――
3154 = "Đó là tác phẩm do bạn của Hibiki—— một người bán chuyên đang làm thêm\ncông việc quay phim tại một trung tâm tiệc cưới ở Kumamoto, làm ra——"
# monologue
# JP: （しゅっ、しゅっ、しゅっ、しゅっ）
3197 = "（Xình xịch, xình xịch, xình xịch, xình xịch）"
# monologue
# JP: \x%l動輪;#00ffc040;動輪%l;#;を回す蒸気の音。\n\x%lカマ;#00ffc040;カマ%l;#;の中、真っ赤に燃える石炭たち。
2886 = "Âm thanh hơi nước làm quay \x%l動輪;#00ffc040;bánh xe chủ động%l;#;.\nBên trong \x%lカマ;#00ffc040;lò hơi%l;#;, những hòn than đang cháy đỏ rực."
# monologue
# JP: それがストーブの火に変わり、\n肉が焼け、脂の滴る様子に重なる。
3034 = "Cảnh đó chuyển sang ngọn lửa của chiếc lò sưởi,\nchồng chéo lên hình ảnh miếng thịt đang nướng, mỡ nhỏ giọt."
# monologue
# JP: （ああ――）
3198 = "（A——）"
# monologue
# JP: そして、笑顔だ。\n日々姫が、僕さえもが笑っている。
2708 = "Và rồi, là những nụ cười.\nHibiki, và cả tôi nữa, đều đang cười."
# monologue
# JP: ハチロクの、まるで太陽のような――\n純粋極まる、無垢な笑顔に照らしだされて。
2773 = "Được chiếu sáng bởi nụ cười của Hachiroku, tựa như ánh mặt trời——\nmột nụ cười vô cùng thuần khiết, ngây thơ không chút tì vết."
# 【日々姫】
# display as 日日姬
# JP: 「こん動画ば見た人は。運転台通信ば読んだ人は。\n絶対、[ハチロク,3]8620と一緒のバーベキュー\x%l列車;#00ffc040;列車%l;#;に乗りたくて」
2356 = "「Những người đã xem đoạn video này. Những người đã đọc bản tin buồng lái.\nTuyệt đối, đều muốn lên \x%l列車;#00ffc040;đoàn tàu%l;#; BBQ cùng với 8620.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは――そうだと思います」
2188 = "「Điều đó thì—— tôi cũng nghĩ vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「っ！？」
2502 = "「!?」"
# monologue
# JP: ハっと、日々姫が息を呑む。\nそれほどまでに、ポーレットの声は苦しげだ。
3024 = "Hibiki giật mình nín thở.\nBởi giọng nói của Paulette nghe đau khổ đến tột cùng."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしだって、[ハチロクニイマル,3]8620が走ってくれれば……\nけど――それは、無理だから――だからっ」
2174 = "「Cả tôi cũng muốn 8620 có thể chạy tiếp mà……\nNhưng—— điều đó, là không thể—— nên là.」"
# 【日々姫】
# display as 日日姬
# JP: 「無理じゃなかっ！　[あのこ,3]8620ば、絶対になおせるけん！\nね、にぃにっ」
1902 = "「Không phải là không thể! Chắc chắn sẽ sửa được 8620 mà!\nĐúng không, anh hai.」"
# monologue
# JP: すがってくる。日々姫が必死で――\n幼かった日にさえ見たことのない眼差しで。
2988 = "Cô bé đang bám víu vào tôi. Hibiki đang tuyệt vọng——\nvới ánh mắt mà ngay cả những ngày thơ ấu tôi cũng chưa từng thấy."
# monologue
# JP: 僕とて、無論頷きたい。\n頷きたいが――移送さえもが出来ぬ現実がそれを許さぬ。
2947 = "Tôi, tất nhiên là muốn gật đầu.\nMuốn gật đầu nhưng—— hiện thực không thể di dời con tàu đã không cho phép điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「僕、は……」
2168 = "「Anh, thì……」"
# monologue
# JP: 答えられない。\nどうしても。
3032 = "Không thể trả lời.\nDù thế nào đi nữa."
# monologue
# JP: 答えられないそのことが、\n\x%l8620;#00ffc040;8620%l;#;の運命を、望まぬ方へ進めてしまうと――
3076 = "Việc không thể trả lời đó,\nsẽ đẩy vận mệnh của \x%l8620;#00ffc040;8620%l;#; đi theo hướng không mong muốn——"
# 【蓑笠】
# display as 蓑笠
# JP: 「腹ば、[す]空きましたなぁ」
2386 = "「Bụng, đói rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2501 = "「!」"
# monologue
# JP: ぽん、と蓑笠老人の声。\n重く垂れこめた沈黙の中、ころりと転がるような声。
3095 = "Bộp một tiếng, giọng nói của ông Minokasa vang lên.\nGiữa sự im lặng nặng nề, một giọng nói nhẹ nhàng vang lên như một tiếng lăn tròn."
# 【蓑笠】
# display as 蓑笠
# JP: 「少し早かとですが。お昼、どげんでしょうかねぇ」
2477 = "「Tuy có hơi sớm. Bữa trưa, tính sao đây nhỉ.」"
# 【ふかみ】
# display as 深美
# JP: 「お待たせ、しました。です」
1917 = "「Để mọi người, phải đợi lâu rồi. Ạ.」"
# 【凪】
# display as 凪
# JP: 「買ってきたばーい！」
2412 = "「Bọn em mua về rồi đây~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ。すまんな」
2039 = "「À, ừm. Cảm ơn hai đứa nhé.」"
# monologue
# JP: レールショップに残った組と、外へ出た組。
2919 = "Nhóm ở lại Rail Shop, và nhóm đi ra ngoài."
# monologue
# JP: 示し合わせたわけでもないが、\x%l8620;#00ffc040;8620%l;#;改修を諦めたものと\n諦めきれぬものとに分かれてしまったようだ。
3167 = "Dù không hề bàn bạc trước, nhưng có vẻ như đã chia thành hai phe,\nmột phe đã từ bỏ việc sửa chữa \x%l8620;#00ffc040;8620%l;#; và phe kia thì không cam tâm từ bỏ."
# 【凪】
# display as 凪
# JP: 「にーさん、何食べると？」
2086 = "「Anh Soutetsu, anh ăn gì?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんでもいいぞ。余ったもので」
1928 = "「Anh ăn gì cũng được. Cứ lấy phần thừa cho anh.」"
# 【凪】
# display as 凪
# JP: 「じゃ、[ひび,1]日々ねーちゃんからばい」
2461 = "「Vậy, bắt đầu từ chị Hibiki nha.」"
# 【日々姫】
# display as 日日姬
# JP: 「ありがと……\nええと、それじゃ、このオムライスいい？」
2406 = "「Cảm ơn em……\nÀ ừm, vậy thì, chị lấy phần cơm cuộn trứng này được không?」"
# 【凪】
# display as 凪
# JP: 「よかばいよかばい！」
2476 = "「Được thôi được thôi!」"
# monologue
# JP: 凪の態度に、ご馳走されてるような気になる。\n無論お代は、僕の負担であるのだが。
2786 = "Thái độ của Nagi khiến tôi có cảm giác như đang được khao vậy.\nTất nhiên là tiền thì do tôi trả rồi."
# 【凪】
# display as 凪
# JP: 「ふかみちゃんは何にすっと？」
2128 = "「Bé Fukami thì ăn gì?」"
# 【ふかみ】
# display as 深美
# JP: 「え……と、どうしようかな。\nおにぎりもいいし、サンドイッチも――」
2049 = "「À…… ừm, ăn gì bây giờ nhỉ.\nCơm nắm cũng ngon, mà bánh mì sandwich cũng——」"
# 【凪】
# display as 凪
# JP: 「なら、残った方をうちが取るとよ。\nで、一個ずつかえっこするばい」
2449 = "「Vậy thì, phần còn lại tớ sẽ lấy nha.\nRồi mỗi đứa đổi cho nhau một cái là được.」"
# 【ふかみ】
# display as 深美
# JP: 「ありがと。そうしよ」
2407 = "「Cảm ơn cậu. Vậy đi ha.」"
# monologue
# JP: ふかみがサンドイッチのセットで、\n凪がおにぎりの詰め合わせ。
3027 = "Fukami chọn set bánh mì sandwich,\ncòn Nagi chọn phần cơm nắm thập cẩm."
# monologue
# JP: 残った僕は――スパゲティナポリタンか。\n特段、食欲があるでなし、まぁ悪くない。
2792 = "Phần còn lại của tôi là—— Mì Ý Napolitan à.\nCũng chẳng có cảm giác thèm ăn đặc biệt gì, thôi thì cũng không tệ."
# 【ハチロク】
# display as 八六
# JP: 「どこで、お食べになられるのですか？」
2081 = "「Ngài định dùng bữa ở đâu ạ?」"
# monologue
# JP: レールショップの近くにいるのも妙に気まずく、\nずんずん歩いてしまったが――
2829 = "Ở gần Rail Shop cũng có chút ngượng ngùng,\nnên chúng tôi cứ thế đi thẳng một mạch, nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ、ここからだと……御一夜[じょうし,1]城址の公園か？」
2026 = "「Ưm, từ đây thì…… công viên di tích thành Ohito chăng?」"
# 【ふかみ】
# display as 深美
# JP: 「それなら、発船所で落ちついて食べませんか？　です。\nお昼休憩、時間、たくさんになりました。ですし」
2457 = "「Nếu vậy, đến bến thuyền ăn cho thoải mái thì sao ạ? Ạ.\nGiờ nghỉ trưa, chúng ta, cũng có nhiều thời gian. Mà.」"
# 【凪】
# display as 凪
# JP: 「発船所だったらお茶入るばい。\n飲み物、買わんかったらよかったばい」
2348 = "「Nếu là bến thuyền thì có trà đó.\nBiết thế khỏi mua đồ uống là được rồi.」"
# 【ふかみ】
# display as 深美
# JP: 「あ、だねぇ。ちょっともったいなかった」
2045 = "「A, đúng nhỉ. Hơi phí một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「構わんさ、ジュース代くらい」
1907 = "「Không sao đâu, chỉ là chút tiền nước ép thôi mà.」"
# monologue
# JP: 素直にふかみの提案に乗る。
2939 = "Tôi ngoan ngoãn làm theo đề xuất của Fukami."
# monologue
# JP: 発船所までは少し歩くが、\n強い川風が顔を洗うようで心地いい。
3169 = "Dù phải đi bộ một đoạn mới đến bến thuyền,\nnhưng gió sông thổi mạnh táp vào mặt lại mang đến cảm giác dễ chịu."
# 【凪】
# display as 凪
# JP: 「シャケとおかかと明太ばい。\nふかみちゃん、なにが欲しかと？」
2013 = "「Có cá hồi, cá bào với trứng cá tuyết nè.\nBé Fukami, muốn ăn vị nào?」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん先取って。どれでもいいよ？」
2127 = "「Nagi cứ chọn trước đi. Vị nào cũng được mà?」"
# 【凪】
# display as 凪
# JP: 「じゃ、ハムとトマトのもらうばい」
2462 = "「Vậy, tớ lấy cái giăm bông với cà chua nha.」"
# 【ふかみ】
# display as 深美
# JP: 「わたしは……ええっと、おかか、いい？」
2450 = "「Tớ thì…… à ừm, cá bào, được không?」"
# 【凪】
# display as 凪
# JP: 「よかばいよかばい」
2475 = "「Được thôi được thôi.」"
# monologue
# JP: 食欲旺盛な二人に引き換え、僕の傍らからはまだ、\n石炭を噛み砕く、あの豪快な音が聞こえてこない。
2817 = "Trái ngược với hai cô bé đang thèm ăn, từ bên cạnh tôi vẫn chưa\nnghe thấy âm thanh nhai than đá sảng khoái quen thuộc."
# monologue
# JP: ちらりと見ればハチロクは、\n膝の上、石炭入りの弁当箱を広げたままで動かずにいる。
2930 = "Tôi liếc nhìn, Hachiroku vẫn đang mở hộp bento chứa than đá\nđặt trên đùi, bất động."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、ハチロク。食べんのか？」
2156 = "「Sao thế, Hachiroku. Em không ăn à?」"
# 【ハチロク】
# display as 八六
# JP: 「……静態保存のご提案。\n双鉄様は、いかがお考えになられましたか？」
1615 = "「……Về đề xuất \x%l静態保存;#00ffc040;lưu tĩnh%l;#;.\nNgài Soutetsu, ngài nghĩ sao về điều đó ạ?」"
# monologue
# JP: 率直極まる問いかけに、僕も率直な答えを返す。
2950 = "Trước câu hỏi vô cùng thẳng thắn, tôi cũng đưa ra câu trả lời chân thành."
# 【双鉄】
# display as 雙鐵
# JP: 「最悪の場合――どうしても修復できぬときには、\n最悪の中の最善であるかとは、正直思った」
2256 = "「Trong trường hợp xấu nhất—— khi thực sự không thể sửa chữa được nữa,\nthú thật tôi nghĩ đó là cách tốt nhất trong những tình huống tồi tệ nhất.」"
# 【ハチロク】
# display as 八六
# JP: 「……静態保存して、[ハチロクニイマル,3]8620を諦めますか？」
1605 = "「……Ngài sẽ \x%l静態保存;#00ffc040;lưu tĩnh%l;#; và từ bỏ 8620 sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、諦めぬ。\n諦めるという選択こそが、最悪中の最悪だ」
1909 = "「Không, tôi sẽ không từ bỏ.\nLựa chọn từ bỏ mới chính là điều tồi tệ nhất trong những điều tồi tệ.」"
# monologue
# JP: 思うがままを素直に言えば、\nけれどハチロクは戸惑ったように首を傾げる。
2949 = "Dù tôi đã nói thật những gì mình nghĩ,\nnhưng Hachiroku vẫn nghiêng đầu bối rối."
# 【ハチロク】
# display as 八六
# JP: 「静態保存をしながら……\n改修に望みをかけるのですか？」
2160 = "「Vừa \x%l静態保存;#00ffc040;lưu tĩnh%l;#;……\nvừa đặt hy vọng vào việc sửa chữa sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ともかく資金だ。\n資金があれば、より広範な選択も行い得る」
2065 = "「Ừm. Trước mắt là vấn đề vốn.\nNếu có vốn, chúng ta có thể thực hiện nhiều lựa chọn rộng mở hơn.」"
# monologue
# JP: ああ、と力のこもならない声。
2843 = "Cô ấy khẽ \"A\" một tiếng yếu ớt."
# 【ハチロク】
# display as 八六
# JP: 「真闇様のおっしゃられていた――\nＳＬ記念館、が集客の役に立つとお考えですか」
2165 = "「Ngài nghĩ rằng—— nhà lưu niệm SL mà chị Mayami nhắc đến,\nsẽ có tác dụng thu hút khách du lịch sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「立つさ。それであれば、形は多少変わっても、\n[ハチロクニイマル,3]8620とバーベキュー\x%l列車;#00ffc040;列車%l;#;の二枚看板を降ろさずに済む」
2390 = "「Có chứ. Nếu làm vậy, dù hình thức có chút thay đổi,\nchúng ta vẫn không phải gỡ bỏ hai tấm biển hiệu là 8620 và \x%l列車;#00ffc040;đoàn tàu%l;#; BBQ.」"
# 【ハチロク】
# display as 八六
# JP: 「それは――」
2432 = "「Chuyện đó——」"
# monologue
# JP: ハチロクがゆっくり、僕を見上げる。\n声と同様、その目にも力を感じない。
2744 = "Hachiroku từ từ ngước lên nhìn tôi.\nGiống như giọng nói, đôi mắt cô ấy cũng không hề có chút sức sống."
# 【ハチロク】
# display as 八六
# JP: 「それは――双鉄様。\nかなり、難しいお話なのではないか、と存じます」
2433 = "「Chuyện đó—— thưa ngài Soutetsu.\nEm nghĩ là, sẽ khá khó khăn đấy ạ.」"
# monologue
# JP: ハチロクを包む全てが、ひどく重い。
2755 = "Bầu không khí bao trùm lấy Hachiroku vô cùng nặng nề."
# monologue
# JP: 問答無用の説得力をそこから感じ――\nだからこそ、問いかけずにはいられなくなる。
2850 = "Tôi cảm nhận được sức thuyết phục không thể chối cãi từ điều đó——\nChính vì thế, tôi không thể không hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「何故だ」
2324 = "「Tại sao?」"
# 【ハチロク】
# display as 八六
# JP: 「以前にもお話ししたことがございますが――\nわたくしは、国産初の量産\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;です」
2182 = "「Như em đã từng nói trước đây——\nEm là \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; sản xuất hàng loạt nội địa đầu tiên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。聞いているし、本でも読んだ。\n『[ひのもと,2]日ノ本の[てつろ,1]鉄路に[ハチロクニイマル,3]8620の――』」
2023 = "「Ừm. Tôi có nghe rồi, cũng từng đọc trong sách nữa.\n『Trên đường sắt Hinomoto, không nơi nào là không thấy——』」"
# 【ハチロク】
# display as 八六
# JP: 「『――[きえい,1]機影、見えざるは無し』。それこそが、\nわたくしたち姉妹の最大の誇りでございました」
1587 = "「『——bóng dáng của 8620』. Đó chính là,\nniềm tự hào lớn nhất của chị em chúng em ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2067 = "「Ừm.」"
# 【ハチロク】
# display as 八六
# JP: 「逆に申しますと――[ハチロクニイマルけい,4]8620形は、[ヒノモト,2]日ノ本全土、\nどこでも見ることが出来る機関車であったのです」
1940 = "「Nói ngược lại thì—— Dòng 8620 là đầu máy xe lửa\nmà đi đâu trên khắp đất nước Hinomoto cũng có thể nhìn thấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2501 = "「！」" 
# monologue
# JP: “万能、それ故の平凡”\n本に書かれていたことを、今更ながらに思い出す。
2942 = "“Đa năng, nhưng cũng vì thế mà trở nên bình phàm”\nBây giờ tôi mới chợt nhớ lại những gì được viết trong sách."
# monologue
# JP: 量産性に極めて優れるということは――\n逆から見れば、尖った部分を保たぬということでもあると。
3159 = "Khả năng sản xuất hàng loạt cực kỳ xuất sắc——\nNhìn từ góc độ ngược lại, cũng có nghĩa là không có điểm gì nổi trội."
# 【ハチロク】
# display as 八六
# JP: 「トップナンバー機である[ハチロクニイマル,3]8620のアドバンテージは、\n丁寧に丁寧に作られたが故の、乗り味の良さです」
2414 = "「Ưu thế của 8620 với tư cách là cỗ máy số hiệu đầu tiên,\nchính là cảm giác thoải mái khi ngồi trên xe, nhờ được chế tạo vô cùng cẩn thận tỉ mỉ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「乗ってこそ、のアドバンテージだな、それは。\n静態保存では、完全に失われてしまう」
2135 = "「Đó là ưu thế chỉ có được khi ngồi lên nhỉ.\nNếu \x%l静態保存;#00ffc040;lưu tĩnh%l;#;, ưu thế đó sẽ hoàn toàn biến mất.」"
# 【ハチロク】
# display as 八六
# JP: 「止まってしまった[トップナンバー機,3]8620と、六百八十六機の妹達とには\n取り立てての差異はございません」
1958 = "「Giữa cỗ máy số hiệu đầu tiên 8620 đã ngừng chạy và 686 cỗ máy em gái,\nkhông có sự khác biệt nào đáng kể cả ạ.」"
# monologue
# JP: 言い切られれば、その通りだと、\n納得せざるを得なくなる。
2856 = "Bị khẳng định như vậy, tôi không thể không thừa nhận\nrằng cô ấy nói đúng."
# monologue
# JP: “トップナンバーであること自体”は、\n観光客の大多数には、何らの価値を示さぬだろう。
2716 = "“Bản thân việc là cỗ máy số hiệu đầu tiên”,\nđối với đại đa số khách du lịch, sẽ chẳng mang lại giá trị gì."
# 【ハチロク】
# display as 八六
# JP: 「ＳＬは、走ってこそです」
2400 = "「SL, chỉ khi chạy mới có ý nghĩa ạ.」"
# monologue
# JP: 現状では、自らを追い詰めるに等しくなってしまう言葉を、\nハチロクは少しもためらわずに言う。
2751 = "Với tình hình hiện tại, những lời đó chẳng khác nào tự dồn mình vào chân tường,\nnhưng Hachiroku vẫn nói ra mà không chút do dự."
# 【ハチロク】
# display as 八六
# JP: 「バーベキュー\x%l列車;#00ffc040;列車%l;#;にも、音や、熱や、煙たささえ……\n大きく寄与していたかと、わたくしは思っております」
2194 = "「Đối với \x%l列車;#00ffc040;đoàn tàu%l;#; BBQ, ngay cả âm thanh, sức nóng, hay khói bụi……\nEm nghĩ chúng cũng đã đóng góp một phần rất lớn ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――僕も完全に同感だ」
2169 = "「Điều đó—— tôi cũng hoàn toàn đồng tình.」"
# monologue
# JP: 静態保存では、観光振興に寄与しそうにない。\n\x%l台枠;#00ffc040;台枠%l;#;を改修する手段も見当たらない。
3178 = "\x%l静態保存;#00ffc040;Lưu tĩnh%l;#; thì có vẻ không giúp ích gì cho việc chấn hưng du lịch.\nCòn cách sửa chữa \x%l台枠;#00ffc040;khung gầm%l;#; thì cũng không tìm thấy."
# monologue
# JP: 退くも進むも塞がれたような息苦しさに――
3156 = "Cảm giác ngột ngạt như bị bít lối tiến thoái lưỡng nan——"
# 【日々姫】
# display as 日日姬
# JP: 「あ、よかった。\nにぃにもハチロクも待っとってくれたと？」
2041 = "「A, may quá.\nAnh hai và Hachiroku vẫn đang đợi sao?」"
# monologue
# JP: ――脳天気な声。\nそれでようやく、息を吐ける。
1532 = "——Một giọng nói vô tư lự.\nNhờ đó, cuối cùng tôi cũng có thể thở phào."
# monologue
# JP: 日々姫はハンカチで手を拭きながら近づいてくる。\n恐らくは、トイレに行っていたのだろう。
2984 = "Hibiki vừa lau tay bằng khăn tay vừa tiến lại gần.\nCó lẽ con bé vừa đi vệ sinh."
# 【日々姫】
# display as 日日姬
# JP: 「あ」
# 2031 = "「啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
2073 = "「Hửm?」"
# monologue
# JP: 日々姫の視線が、凪とふかみへ。
2994 = "Ánh mắt Hibiki hướng về phía Nagi và Fukami."
# monologue
# JP: 僕とハチロクとの会話が、邪魔をしてしまったのか――\nふたりはどこか慌てたように、食事を再開しはじめる。
2808 = "Cuộc trò chuyện giữa tôi và Hachiroku đã làm phiền họ sao——\nHai người có vẻ hơi luống cuống, bắt đầu ăn tiếp."
# 【日々姫】
# display as 日日姬
# JP: 「良かとね、替えっこ。\nね、にぃに。私たちも替えっこせん？」
2360 = "「Thích ghê, được đổi cho nhau.\nNè anh hai. Chúng ta cũng đổi cho nhau đi?」"
# monologue
# JP: ――脳天気、極まる提案。
1530 = "——Một lời đề nghị vô tư lự hết sức."
# monologue
# JP: 聞いた瞬間、肩からドっと力が抜けて、\n自分がいかに力んでいたかを知らされる。
3080 = "Khoảnh khắc nghe thấy, sức lực trên vai tôi như trút hết,\nkhiến tôi nhận ra nãy giờ mình đã căng thẳng đến mức nào."
# 【双鉄】
# display as 雙鐵
# JP: 「替えるといっても、どうやってだ。\nオムライスとスパゲティだぞ？」
2139 = "「Nói là đổi, nhưng đổi thế nào đây.\nCơm cuộn trứng với mì Ý cơ mà?」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなん。こーして」
2436 = "「Chuyện nhỏ. Thế này nè.」"
# monologue
# JP: 日々姫のオムライスが、\nプラスチックのスプーンでふたつに割られていく。
2992 = "Phần cơm cuộn trứng của Hibiki,\nbị chiếc thìa nhựa chia làm hai nửa."
# 【日々姫】
# display as 日日姬
# JP: 「半分取って？　で、にぃにの」
2186 = "「Anh lấy một nửa đi? Rồi phần của anh hai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それだ！」
2125 = "「Là nó!」"
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？」
2014 = "「Hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまんが、食事は中断してくれ。\nすぐ、検討をしたいのだ」
1896 = "「Xin lỗi, nhưng tạm dừng bữa ăn đã.\nAnh muốn thảo luận ngay bây giờ.」"
# monologue
# JP: 言いながらもう、立ち上がっている。
2910 = "Vừa nói tôi vừa đứng bật dậy."
# monologue
# JP: ハチロクも弁当づつみを素早くたたみ、\n僕へと頷きかけてくれる。
2731 = "Hachiroku cũng nhanh chóng gói hộp bento lại,\nvà gật đầu với tôi."
# 【日々姫】
# display as 日日姬
# JP: 「ちょっと待ってにぃに、\nそれって――どれ？　何？」
2377 = "「Chờ đã anh hai,\nđó là—— cái gì? Chuyện gì vậy?」"
# 【ポーレット】
# display as 波萊特
# JP: 「かえっこ――ですか？」
1997 = "「Đổi cho nhau—— sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。替えっこだ」
2123 = "「Ừm. Đổi cho nhau.」"
# monologue
# JP: そう伝えても、ポーレットの表情は冴えてくれない。
2877 = "Dù tôi đã nói vậy, nhưng vẻ mặt của Paulette vẫn không khá hơn."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「なるほど。静態であれば――」
1973 = "「Ra là vậy. Nếu là \x%l静態保存;#00ffc040;lưu tĩnh%l;#; thì——」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。\x%l台枠;#00ffc040;台枠%l;#;の歪みは、問題となりませんから」
2230 = "「Vâng. Sự biến dạng của \x%l台枠;#00ffc040;khung gầm%l;#; sẽ không còn là vấn đề nữa.」"
# monologue
# JP: 差しかけていた不安を、赤井宮司の声が退けてくれる。
3137 = "Giọng nói của đền chủ Akai đã xua tan đi sự bất an đang len lỏi trong tôi."
# monologue
# JP: が、それを聞いてもまだポーレットは、\n戸惑ったような顔のままだ。
2715 = "Nhưng nghe xong điều đó, Paulette vẫn\ngiữ nguyên vẻ mặt bối rối."
# 【ポーレット】
# display as 波萊特
# JP: 「ええと――かえっこ――\nすみません、少し、意味が――」
2001 = "「À ừm—— đổi cho nhau——\nXin lỗi, tôi hơi, không hiểu ý——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。その点だったか」
2037 = "「A, xin lỗi. Là về điểm đó à.」"
# monologue
# JP: 普段流暢に話すから、ついつい、\nポーレットの日ノ本語力を自分と同等に思ってしまった。
3056 = "Vì bình thường cô ấy nói rất trôi chảy, nên tôi vô tình\nnghĩ rằng trình độ tiếng Hinomoto của Paulette cũng ngang bằng mình."
# 【双鉄】
# display as 雙鐵
# JP: 「かえっこ、とは交換をするという意味だ。つまり」
2405 = "「Đổi cho nhau, nghĩa là hoán đổi. Tức là」"
# 【ポーレット】
# display as 波萊特
# JP: 「ああ、とりかえっこの“かえっこ”ですか。\n理解できました――えっ――あっ――ああっ！」
2020 = "「A, là \"đổi cho nhau\" trong tráo đổi cho nhau đó hả.\nTôi hiểu rồi—— ơ—— a—— a a!」"
# monologue
# JP: 理解が、連鎖してくれたらしい。\nポーレットの顔がパっと輝く！
2838 = "Có vẻ như cô ấy đã xâu chuỗi được vấn đề.\nKhuôn mặt Paulette bừng sáng!"
# 【ポーレット】
# display as 波萊特
# JP: 「そうか、そうですよね。\nすでに静態保存してる子からなら」
2124 = "「Ra vậy, đúng là thế nhỉ.\nNếu lấy từ cỗ máy đang được \x%l静態保存;#00ffc040;lưu tĩnh%l;#; thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。“\x%l台枠;#00ffc040;台枠%l;#;だけでももう一度走らせてやりたい”と\n――そう思ってくれる\x%lまいてつ;#00ffc040;まいてつ%l;#;さんを、見つけられれば」
2055 = "「Ừ. \"Chỉ cần \x%l台枠;#00ffc040;khung gầm%l;#; thôi cũng muốn cho nó chạy lại một lần nữa\"\n——Nếu tìm được \x%lまいてつ;#00ffc040;người sành toa xe%l;#; có suy nghĩ như vậy.」"
# 【日々姫】
# display as 日日姬
# JP: 「って！　ちょっ！　にぃに！\nだから、それってなにってば！！」
2034 = "「Á! Khoan đã! Anh hai!\nVậy rốt cuộc đó là cái gì cơ chứ!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。少し説明が足りなかったな」
2043 = "「A, xin lỗi. Anh giải thích hơi thiếu sót.」"
# monologue
# JP: ポーレットと赤井宮司が、\n基本線で賛意を示してくれた。
3019 = "Paulette và đền chủ Akai,\nvề cơ bản đã bày tỏ sự tán thành."
# monologue
# JP: 安堵がそのまま余裕に変わり、\n僕の視界を広げてくれる。
2866 = "Sự an tâm đó chuyển thành sự thong dong,\nmở rộng tầm nhìn của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクが話したとおり、[ハチロク,3]8620には同型機――\n同じ[ハチロクニイマルけい,4]8620形の姉妹がたくさんいたわけだ」
2289 = "「Như Hachiroku đã nói, 8620 có các cỗ máy cùng loại——\ncó rất nhiều chị em cùng dòng 8620.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん」
# 2067 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクを除いて、六百八十六機――恐らく、だが――\nその中には、静態保存をされているものもあるだろう」
2472 = "「Ngoại trừ Hachiroku, còn 686 cỗ máy nữa—— có lẽ, nhưng mà——\ntrong số đó, hẳn cũng có những cỗ máy đang được \x%l静態保存;#00ffc040;lưu tĩnh%l;#;.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ――ああっ！　その子と、かえっこ？」
2028 = "「A—— a a! Đổi cho nhau, với cỗ máy đó á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう出来ればと考えている。\n条件の合うような機体がもしもあれば、だが」
2398 = "「Anh đang nghĩ nếu làm được như vậy.\nNhưng mà, giả sử có cỗ máy nào phù hợp với điều kiện đó không đã.」"
# 【ポーレット】
# display as 波萊特
# JP: 「結構……あります、[ハチロクけい,4]8620形の保存車」
2368 = "「Khá nhiều…… đấy ạ, xe bảo tồn dòng 8620.」"
# monologue
# JP: ポーレットはもう、ディスプレイを睨みつけている。
3020 = "Paulette lúc này đang dán mắt vào màn hình."
# 【ポーレット】
# display as 波萊特
# JP: 「[ニイハチロクゴーイチ,4]28651、[ヨンハチロクヨンマル,4]48640、[ヨンハチロクナナヨン,4]48674、[ヨンハチロクキュウロク,4]48696、[ゴーハチロクニイサン,4]58623」
2503 = "「28651, 48640, 48674, 48696, 58623.」"
# 【ハチロク】
# display as 八六
# JP: 「[ゴーハチロクニイサン,4]58623！」
2506 = "「58623!」"
# monologue
# JP: 歓声！\nハチロクは小躍りせんばかりだ。
2749 = "Tiếng reo hò!\nHachiroku như chỉ chực nhảy cẫng lên."
# 【ハチロク】
# display as 八六
# JP: 「理想的です！　58623は、日ノ本車輌製造で作られた\n第一号機――オリジナルの再現度が極めて高い子です」
2094 = "「Lý tưởng quá! 58623 là cỗ máy số 1\nđược chế tạo tại Nippon Sharyo—— là một cỗ máy có độ tái hiện bản gốc cực kỳ cao ạ.」"
# 【凪】
# display as 凪
# JP: 「ひのもとしゃりょーせーぞー？」
2219 = "「Nippon Sharyo?」"
# 【ハチロク】
# display as 八六
# JP: 「鉄道車輌メーカーです。わたくしの妹たちは、[ていこく,1]帝國、\n[ひたち,1]陽立、[かわさき,1]川裂、[そうごう,1]綜合――様々なメーカーで作られたのです」
2437 = "「Là một nhà sản xuất toa xe đường sắt ạ. Các em gái của tôi được chế tạo bởi nhiều nhà sản xuất khác nhau\nnhư Teikoku, Hitachi, Kawasaki, Sogo——」"
# 【ふかみ】
# display as 深美
# JP: 「どうして、いろんなメーカー、で？」
2327 = "「Tại sao, lại do nhiều nhà sản xuất, vậy ạ?」"
# 【ハチロク】
# display as 八六
# JP: 「[ハチロク,3]8620は、鉄道黄金期に咲いた傑作量産機だからです。\n１メーカーでは製造がとても追いつかなかった」
2080 = "「Bởi vì 8620 là cỗ máy sản xuất hàng loạt kiệt tác nở rộ trong thời kỳ hoàng kim của đường sắt ạ.\nChỉ một nhà sản xuất thì không thể nào đáp ứng kịp nhu cầu chế tạo.」"
# monologue
# JP: だからどんどん外注に出された。
2956 = "Vì thế nên liên tục được gia công bên ngoài."
# monologue
# JP: のちには各メーカーでそれぞれに、個性が出てきて、\n独自改装なども加えられていったそうだが……
2863 = "Sau này, mỗi nhà sản xuất đều thể hiện cá tính riêng,\nvà thêm vào những cải tiến độc đáo của riêng mình, nhưng mà……"
# 【ハチロク】
# display as 八六
# JP: 「しかし、各メーカーとも、その１号機はオリジナル――\n[トップナンバー機,3]8620に出来るかぎり忠実に寄せて製造をしました」
1946 = "「Tuy nhiên, ở mỗi nhà sản xuất, cỗ máy số 1 đều là bản gốc——\nđược chế tạo bám sát cỗ máy số hiệu đầu tiên 8620 nhất có thể ạ.」"
# monologue
# JP: ハチロクの声は、\nなつかしげで、ほこらしげだ。
2762 = "Giọng nói của Hachiroku,\nđầy vẻ hoài niệm và tự hào."
# 【ハチロク】
# display as 八六
# JP: 「そうでなければ、納品基準を満たさなかった。\n……そうした時代が、鉄道にも確かに、あったのです」
1999 = "「Nếu không thì sẽ không đáp ứng được tiêu chuẩn giao hàng.\n……Ngành đường sắt cũng đã từng có một thời đại như thế đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、その――[ゴーハチ,1]58……なんだ？」
1920 = "「Tức là, cái đó—— 58…… gì cơ?」"
# 【ハチロク】
# display as 八六
# JP: 「[ゴーハチロクニイサン,4]58623です、双鉄様。\n直接の面識はありませんが、[しこく,1]四國を走った妹です」
2250 = "「Là 58623 thưa ngài Soutetsu.\nDù chưa từng gặp mặt trực tiếp, nhưng đó là đứa em gái đã chạy ở Shikoku ạ.」"
# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;の連携、連鎖によって、妹たちの動向を、\nハチロクはきっと、気にし続けていたのだろう。
3051 = "Thông qua sự liên kết, chuỗi \x%l共感;#00ffc040;cộng cảm%l;#;, động thái của các em gái,\nchắc chắn Hachiroku vẫn luôn dõi theo."
# monologue
# JP: その目は優しく懐かしむ、やわらかな光に満ちている。
2849 = "Đôi mắt ấy chan chứa ánh sáng dịu dàng, dịu dàng và đầy hoài niệm."
# 【ハチロク】
# display as 八六
# JP: 「その\x%l台枠;#00ffc040;台枠%l;#;は――原型をとどめていてくれるなら、\n最低限の調整で、[ハチロクニイマル,3]8620に換装できるかもしれないのです」
2113 = "「\x%l台枠;#00ffc040;Khung gầm%l;#; đó—— nếu vẫn giữ được nguyên bản,\nthì có thể chỉ cần điều chỉnh tối thiểu là có thể thay thế cho 8620 được ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「ええ！　それって、すごくないっ！？」
2019 = "「Wow! Thế thì, tuyệt quá đi chứ!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「すごいです。すごいんですよ、双鉄くん。\nこれ……すごい――可能性、きっと高いです」
2097 = "「Tuyệt thật. Tuyệt vời lắm đó, anh Soutetsu.\nCái này…… thật tuyệt—— khả năng thành công chắc chắn rất cao.」"
# monologue
# JP: その青は、おそらく興奮と希望とに、\nきらきらまぶしく、輝いている。
2834 = "Màu xanh đó, có lẽ vì phấn khích và hy vọng,\nđang lấp lánh rực rỡ, chói lòa."
# 【ポーレット】
# display as 波萊特
# JP: 「[ゴーハチロクニイサン,4]58623は、日ノ本車輌製造の本社――\n[なごや,2]名児耶で静態保存されています」
2505 = "「58623 đang được \x%l静態保存;#00ffc040;lưu tĩnh%l;#; tại trụ sở chính của Nippon Sharyo——\nở Nagoya.」"
# 【ハチロク】
# display as 八六
# JP: 「本社？　まだ会社が存続しているのですか？」
2383 = "「Trụ sở chính? Công ty vẫn còn tồn tại sao ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。\x%l電車;#00ffc040;電車%l;#;部門だけを存続させて、今も――\nですから」
2234 = "「Vâng. Họ chỉ giữ lại bộ phận \x%l電車;#00ffc040;tàu điện%l;#; và hiện tại vẫn——\nDo đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l電車;#00ffc040;電車%l;#;ならば――[あき,1]安芸様、毛利の姫様と？」
2487 = "「Nếu là \x%l電車;#00ffc040;tàu điện%l;#; thì—— Ngài Aki, công chúa nhà Mouri sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「[ひろしま,1]廣嶋毛利電鉄、\n日ノ本車輌製造の大株主って載ってます」
2091 = "「Trên này có ghi Đường sắt Điện Hiroshima Mouri,\nlà cổ đông lớn của Nippon Sharyo đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――安芸様に相談すれば」
2453 = "「Vậy thì—— Nếu bàn bạc với ngài Aki.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なんのつても無いより、もちろん。\nですけど――」
2302 = "「Tất nhiên là tốt hơn việc không có chút manh mối nào rồi.\nNhưng mà——」"
# monologue
# JP: くっと、一息。\nポーレットの目が、いつもの理知を取り戻す。
3018 = "Khẽ hít một hơi.\nÁnh mắt Paulette lấy lại vẻ lý trí thường ngày."
# monologue
# JP: 口調も、普段の……\n慎重そうなものへと戻る。
3125 = "Giọng điệu cũng trở về……\nvẻ thận trọng như mọi khi."
# 【ポーレット】
# display as 波萊特
# JP: 「これ、結構微妙な話題なんだって思います。\n[さきさま,1]先様にしても、記念すべき自社１号車輌ですから」
2190 = "「Tôi nghĩ đây là một chủ đề khá nhạy cảm đấy.\nĐối với bên đó, đây cũng là cỗ máy số 1 đáng kỷ niệm của công ty họ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか。そうだよな」
2030 = "「A…… Ra vậy. Đúng là thế nhỉ.」"
# monologue
# JP: ハチロクも――今のハチロクはともかくも、\n出会った頃の、あのハチロクであったなら……
2733 = "Hachiroku cũng vậy—— Hachiroku bây giờ thì không nói làm gì,\nnhưng nếu là Hachiroku hồi mới gặp nhau thì……"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の\x%l台枠;#00ffc040;台枠%l;#;を他の車輌のものと換えようなどと言ったら、\nきっと僕を睨み殺さんばかりの不満を表明しただろう。
2858 = "Nếu nói muốn đổi \x%l台枠;#00ffc040;khung gầm%l;#; của \x%l8620;#00ffc040;8620%l;#; bằng của xe khác,\nchắc chắn cô ấy sẽ lườm tôi cháy máy để bày tỏ sự bất mãn cho xem."
# 【ポーレット】
# display as 波萊特
# JP: 「ですから交渉……\nひとまずは、わたしに預けてもらえますか？」
2206 = "「Do đó, việc đàm phán……\nTạm thời cứ giao cho tôi được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしてもらえればありがたい。\n僕には……\x%lまいてつ;#00ffc040;まいてつ%l;#;の心の機微は恐らくわからん」
1988 = "「Được thế thì tốt quá.\nTôi e là…… không hiểu được những tinh tế trong tâm hồn của một \x%lまいてつ;#00ffc040;người sành toa xe%l;#; đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そんなことないです。\nそんなことないですよ――絶対」
1903 = "「Không có chuyện đó đâu.\nKhông có chuyện đó đâu—— Tuyệt đối không.」"
# monologue
# JP: 言って、ポーレットはハチロクを\nじっと見つめてから、僕を見る。
3126 = "Nói xong, Paulette chăm chú nhìn Hachiroku,\nrồi lại nhìn sang tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんや双鉄くんの力が必要なときは、\n頼りますから」
2489 = "「Khi nào cần đến sức của Hachiroku và anh Soutetsu,\ntôi sẽ nhờ cậy đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうしてくれ。\n僕の力なら、全て尽くそう」
2069 = "「Ừ, cứ làm thế đi.\nNếu cần sức của tôi, tôi sẽ dốc hết toàn lực.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしもです。なんなりとお申し付けください」
2176 = "「Em cũng vậy ạ. Xin cứ sai bảo bất cứ điều gì.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうさせてもらいます」
2072 = "「Vâng, tôi sẽ làm vậy.」"
# monologue
# JP: こっくり、ポーレットは深く頷く。\n頷いたその首が、ゆるり、なんともあいまいな角度に傾ぐ。
3021 = "Paulette gật đầu thật sâu.\nRồi cái đầu vừa gật ấy từ từ nghiêng đi một góc khó hiểu."
# 【ポーレット】
# display as 波萊特
# JP: 「……こう言ったら失礼かもしれませんけど――\nハチロクちゃん、少し、変わりましたか？」
1607 = "「……Nói thế này có thể hơi thất lễ nhưng——\nHachiroku, có phải đã thay đổi một chút không?」"
# 【れいな】
# display as 玲奈
# JP: 「れいなもびっくりしたですよぉ！\nちょっと前まで、物忘ればっかり」
2333 = "「Reina cũng bất ngờ lắm đó nha!\nMới trước đây thôi, chị ấy toàn hay quên.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ちょっ、れいな！」
2334 = "「Này, Reina!」"
# 【ハチロク】
# display as 八六
# JP: 「うふふっ、本当のことですから」
2007 = "「Ufufu, đó là sự thật mà ạ.」"
# monologue
# JP: れいなの無邪気を、\nハチロクはおおらかに包み込む。
2735 = "Sự ngây thơ của Reina,\nđược Hachiroku bao dung đón nhận."
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、取り戻したのです。本来のわたくしを――\n双鉄様に、取り戻させていただいたのです」
2196 = "「Em đã lấy lại được. Bản ngã thực sự của mình——\nChính ngài Soutetsu đã giúp em lấy lại được ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「なになに、何かあったと？」
1926 = "「Gì vậy gì vậy, có chuyện gì sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、ございました」
2242 = "「Vâng, có chuyện đó ạ.」"
# monologue
# JP: 鼻息も荒い日々姫の問いに、\nハチロクは、鼻たかだかな答えを返す。
3184 = "Trước câu hỏi đầy vẻ hưng phấn của Hibiki,\nHachiroku trả lời với vẻ đầy tự hào."
# 【ハチロク】
# display as 八六
# JP: 「つい先日。\n登呂流湯のお婆様に――ええと、確か――」
1971 = "「Mới hôm trước thôi.\nBà chủ nhà tắm Tororyu-yu đã—— à ừm, chắc là——」"
# 【双鉄】
# display as 雙鐵
# JP: 「シーリング、とおっしゃっていたな」
2093 = "「Bà ấy nói là, niêm phong nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「シーリング！？」
2122 = "「Niêm phong!?」"
# monologue
# JP: ポーレットが真っ赤になって下を向く。\n赤井宮司も、僕からついと目をそむけたように見える。
3023 = "Paulette đỏ bừng mặt cúi gằm xuống.\nĐền chủ Akai dường như cũng vội lảng tránh ánh mắt của tôi."
# 【れいな】
# display as 玲奈
# JP: 「しいりんぐって、なんですかぁ？」
2121 = "「Niêm phong là, cái gì vậy ạ?」"
# monologue
# JP: ならば頼ろうと思ったれいなに、逆に問われる。\nポーレットも赤井宮司も待っても何も答えない――
2936 = "Định nhờ Reina giải thích thì lại bị hỏi ngược lại.\nPaulette và đền chủ Akai thì cứ chờ mãi chẳng chịu nói gì——"
# monologue
# JP: だから、やむなく、聞いたままを教える。
2957 = "Vì thế, không còn cách nào khác, tôi đành truyền đạt lại những gì mình nghe được."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とマスターとの信頼関係が深まると、\n封印されていた機能が解放される――とのことだ」
1572 = "「Khi mối quan hệ tin tưởng giữa \x%lレイルロオド;#00ffc040;Railord%l;#; và Master trở nên sâu sắc hơn,\nchức năng bị niêm phong sẽ được giải phóng—— là vậy đó.」"
# 【れいな】
# display as 玲奈
# JP: 「え？　そおなんですかあ？」
2016 = "「Hả? Ra là vậy sao ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの、れいな――それは、その機能は、その……\n女性マスターだと、解放されないものなの」
2203 = "「À này, Reina—— cái đó, chức năng đó, ừm……\nNếu Master là nữ, thì sẽ không được giải phóng đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2076 = "「A.」"
# monologue
# JP: なるほど、道理だ。\nハチロクの前のマスター――確か、清美機関士。
2796 = "Ra là vậy, có lý lắm.\nMaster trước đây của Hachiroku—— hình như là lái tàu Kiyomi."
# monologue
# JP: その方が、僕とのものより浅い信頼関係しか、\nハチロクとの間に築けていなかったとは、とても思えん。
2927 = "Tôi không nghĩ rằng mối quan hệ tin tưởng giữa cô ấy và Hachiroku\nlại nông cạn hơn mối quan hệ giữa tôi và Hachiroku đâu."
# 【れいな】
# display as 玲奈
# JP: 「なぁんだ、そうなんですねぇ」
1927 = "「Gì chứ, thì ra là vậy à nha.」"
# monologue
# JP: れいながホっと、安心したような息を吐く。
3041 = "Reina thở phào một tiếng như đã an tâm."
# 【ポーレット】
# display as 波萊特
# JP: 「と、とにかく！　ですね！！」
2382 = "「Tóm, tóm lại! Là thế này!!」"
# monologue
# JP: （パンっ！）
3199 = "（Bốp!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2017 = "「Ồ.」"
# monologue
# JP: ポーレットが自分の頬を、\n両手で挟むようにして叩く。
3022 = "Paulette dùng hai tay,\nvỗ bộp vào hai bên má mình."
# monologue
# JP: もとより肌が白いので、\nみるみる頬が、手形に赤く染まっていく。
2826 = "Vốn dĩ da cô ấy đã trắng,\nnên hai má nhanh chóng ửng đỏ hình bàn tay."
# 【ポーレット】
# display as 波萊特
# JP: 「まずは、[ハチロクニイマル,3]8620を――\x%l台枠;#00ffc040;台枠%l;#;をきっと入手して、\nもう一度、走れるようにしてあげましょう！」
2497 = "「Trước tiên, chúng ta nhất định phải có được \x%l台枠;#00ffc040;khung gầm%l;#; cho 8620——\nđể nó có thể chạy lại một lần nữa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！」
2068 = "「Ừm!」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様――おとなり、失礼してよろしいでしょうか？」
2479 = "「Ngài Soutetsu—— Em có thể xin phép nằm cạnh ngài được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
2345 = "「Tất nhiên rồi.」"
# monologue
# JP: 頷けば、ハチロクが布団に潜り込んでくる。
2952 = "Tôi gật đầu, Hachiroku liền chui vào trong chăn."
# monologue
# JP: いつものように足元に、ではなく、\nすぐ真横――顔と顔とが並ぶところに。
2841 = "Không phải ở dưới chân như mọi khi,\nmà là ngay bên cạnh—— nơi hai khuôn mặt kề sát nhau."
# 【ハチロク】
# display as 八六
# JP: 「すみません。少し、お話をしたかったもので」
2213 = "「Xin lỗi ngài. Em có chút chuyện muốn nói ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ。今日は、いろいろと大きく動いたからな」
2178 = "「Tôi cũng vậy. Hôm nay có rất nhiều chuyện lớn xảy ra mà.」"
# 【ハチロク】
# display as 八六
# JP: 「大きく……まことに、左様ですね」
2465 = "「Chuyện lớn…… Quả đúng là vậy ạ.」"
# monologue
# JP: ハチロクが軽く頷けば、\nふわりと、甘い香りが鼻をくすぐる。
2766 = "Hachiroku khẽ gật đầu,\nmột mùi hương ngọt ngào thoang thoảng mơn trớn mũi tôi."
# monologue
# JP: シャンプーの匂いのような気もするし、\nハチロクの匂いなのだというような気もする。
2905 = "Có cảm giác như mùi dầu gội,\ncũng có cảm giác đó là mùi hương của riêng Hachiroku."
# 【ハチロク】
# display as 八六
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;……交換いただけるのですね」
1931 = "「\x%l台枠;#00ffc040;Khung gầm%l;#;…… họ đồng ý trao đổi rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ありがたいな。\nご快諾を……喜んでまでいただけて」
2063 = "「Ừ. Thật đáng biết ơn.\nHọ đã vui vẻ chấp thuận…… thậm chí còn rất sẵn lòng.」"
# monologue
# JP: 58623を静態保存していたのは、\n日ノ本車輌の蒸気部門の技術者有志――
3180 = "Những người đã \x%l静態保存;#00ffc040;lưu tĩnh%l;#; 58623,\nlà các kỹ sư tình nguyện của bộ phận hơi nước thuộc Nippon Sharyo——"
# monologue
# JP: 今は、廃止されてしまった部署を、\n最後の最後まで支え続けた方々だった。
3050 = "Họ là những người đã tiếp tục gồng gánh bộ phận nay đã bị giải thể đó,\ncho đến tận giây phút cuối cùng."
# 【双鉄】
# display as 雙鐵
# JP: 「『こいつがもう一度走れるのならば』――か。\nＳＬに関わるものは、みな、そのように思うのかもな」
1589 = "「『Nếu như cỗ máy này có thể chạy lại một lần nữa』—— sao.\nCó lẽ những ai gắn bó với SL đều có chung suy nghĩ như vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様も、ですか？」
2480 = "「Cả ngài Soutetsu cũng vậy sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。多分……\nすでに、僕もだ」
2060 = "「Chắc vậy. Có lẽ……\ntôi cũng đã như thế rồi.」"
# monologue
# JP: 関わる者、になっている。\nもっと深くまで関わりたいと、心からそう望んでもいる。
2816 = "Đã trở thành một người gắn bó.\nVà cũng thực tâm mong muốn được gắn bó sâu sắc hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「[ハチロクニイマル,3]8620に寿命が来たなら――たとえ\x%l動輪;#00ffc040;動輪%l;#;一組だけでも、\n他の車輌の一部としても、走って欲しいと願うだろうさ」
2513 = "「Nếu 8620 đến lúc cạn kiệt tuổi thọ—— dù chỉ là một bộ \x%l動輪;#00ffc040;bánh xe chủ động%l;#;,\nhay trở thành một phần của cỗ máy khác, tôi cũng sẽ mong nó tiếp tục chạy.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですか」
2247 = "「Vậy sao ạ.」"
# monologue
# JP: ハチロクが微笑む。\nまた、甘い匂いが鼻をくすぐる。
2741 = "Hachiroku mỉm cười.\nMùi hương ngọt ngào lại mơn trớn mũi tôi."
# monologue
# JP: そうしたいから手を伸ばし、\nつややかな髪へと指をすべらせる。
2933 = "Vì muốn làm vậy nên tôi vươn tay ra,\nluồn những ngón tay vào mái tóc óng ả của cô ấy."
# 【ハチロク】
# display as 八六
# JP: 「ん……」
2047 = "「Ưm……」"
# monologue
# JP: 心地よさそうに目を閉じて、\nそのまま、ハチロクはとても穏やかな声を出す。
2765 = "Hachiroku nhắm mắt lại vẻ đầy dễ chịu,\nrồi cất giọng vô cùng điềm đạm."
# 【ハチロク】
# display as 八六
# JP: 「たくさんの願いを受け取って。\nきっと、あの子はまた、走れるようになりますね」
2112 = "「Nhận được biết bao nhiêu lời nguyện cầu.\nChắc chắn, cỗ máy đó sẽ lại có thể chạy được nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうするさ。そのためだったら、何でもしよう。\nそれこそが今、僕の一番強い願いだ」
1892 = "「Sẽ như vậy thôi. Vì điều đó, tôi sẵn sàng làm mọi thứ.\nĐó chính là mong muốn mãnh liệt nhất của tôi lúc này.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ。あの子のことが一番ですか」
2074 = "「Chà. Cỗ máy đó là quan trọng nhất sao ạ?」"
# monologue
# JP: ぷっと、ハチロクの頬がふくれる。\nその頬を、指でつついて潰してしまう。
2776 = "Phồng, má Hachiroku phồng lên.\nTôi dùng ngón tay chọc cho xẹp lép."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。一番だ。\nお前ともつながっていることだからな」
2223 = "「Ừ. Quan trọng nhất.\nVì nó cũng gắn kết với em mà.」"
# 【ハチロク】
# display as 八六
# JP: 「ふふっ」
2006 = "「Fufu.」"
# monologue
# JP: 幸せそうな、のんびりした笑み。
2857 = "Một nụ cười nhàn nhã, trông thật hạnh phúc."
# monologue
# JP: それがふ、と、\n掻き消えるように薄れてしまう。
2713 = "Nhưng nụ cười ấy chợt mờ đi,\nnhư thể tan biến mất."
# 【ハチロク】
# display as 八六
# JP: 「けれど――やはり、大きなお金がかかるのですね」
1938 = "「Nhưng mà—— quả nhiên, sẽ tốn một khoản tiền lớn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そこまでを安芸様に頼るわけにもいかんしな」
2225 = "「Ừ. Chúng ta cũng không thể nhờ vả ngài Aki đến mức đó được.」"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;と、58623と。\n両機それぞれの\x%l台枠;#00ffc040;台枠%l;#;の移送と、換装と。
82 = "\x%l8620;#00ffc040;8620%l;#; và 58623.\nViệc di chuyển và hoán đổi \x%l台枠;#00ffc040;khung gầm%l;#; của cả hai cỗ máy."
# monologue
# JP: それにまつわる費用のすべては、当然僕ら――\nというか、御一夜鉄道株式会社の負担となる。
3151 = "Toàn bộ chi phí liên quan, tất nhiên sẽ do chúng tôi——\nhay nói đúng hơn là Công ty Cổ phần Đường sắt Ohito gánh vác."
# 【ハチロク】
# display as 八六
# JP: 「ポーレット様……御一夜鉄道に、\n市の補助金を申請するとおっしゃってましたが」
2316 = "「Thị trưởng Paulette…… đã nói là sẽ xin\ntiền trợ cấp của thành phố cho Đường sắt Ohito nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。市長を辞任する覚悟だろうな。\nそうしなければ、公私混同の批判を免れられんから」
2059 = "「Ừ. Chắc cô ấy đã chuẩn bị tinh thần từ chức thị trưởng rồi.\nNếu không làm vậy, sẽ không tránh khỏi những lời chỉ trích là nhập nhằng công tư.」"
# 【ハチロク】
# display as 八六
# JP: 「辞任なさって――\n御一夜鉄道の社長に、ご専念を？」
2422 = "「Từ chức thị trưởng——\nđể tập trung vào vị trí giám đốc Đường sắt Ohito sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;改修の件がどう転んでもいいように、\n道筋は、いろいろとつけておいたとのことだった」
2321 = "「Để việc sửa chữa \x%l台枠;#00ffc040;khung gầm%l;#; dù diễn biến ra sao cũng có thể ứng phó,\ncô ấy đã vạch sẵn rất nhiều đường hướng rồi.」"
# monologue
# JP: まぁ、とハチロクの口が驚きの形を描く。
2774 = "Hachiroku há hốc miệng ngạc nhiên."
# monologue
# JP: ハチロクの目は、僕や\x%l8620;#00ffc040;8620%l;#;を見るときほどには、\nポーレットのことを、しっかりとは見てなかったらしい。
2738 = "Có vẻ như ánh mắt của Hachiroku không dõi theo Paulette\nkỹ càng như khi cô ấy nhìn tôi hay \x%l8620;#00ffc040;8620%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなの改修だけでなく、\n政治工作もしっかりやってくれていたらしいぞ？」
1895 = "「Không chỉ việc cải tạo Reina,\nmà có vẻ công tác chính trị cô ấy cũng làm rất chu toàn đấy?」"
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対派の長老議員を次の市長に――\nその線で、反対派はきっちり固めきれるということだ。
3127 = "Đưa vị nghị sĩ lão thành thuộc phe phản đối thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#; lên làm thị trưởng nhiệm kỳ tới——\nTheo hướng đó, phe phản đối đã hoàn toàn đoàn kết lại."
# 【双鉄】
# display as 雙鐵
# JP: 「アクシデントが無いのなら、階段を一段ずつ踏めるなら\n――ポーレットは、あるいは真闇姉より有能かもしれん」
2102 = "「Nếu không có sự cố bất ngờ nào, nếu có thể bước từng bước vững chắc\n——Paulette, có lẽ còn tài năng hơn cả chị Mayami nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「本当に……左様ですね」
2367 = "「Thật sự…… đúng là vậy ạ.」"
# monologue
# JP: 熱っぽい声。\n自分の声を噛みしめるような深い頷き。
2844 = "Một giọng nói đầy nhiệt huyết.\nCô ấy gật đầu thật sâu, như đang ngẫm nghĩ lại chính lời nói của mình."
# 【ハチロク】
# display as 八六
# JP: 「たくさんの方たちが、有能で素敵な方たちが――\nあの子に、力を与えてくださいます」
2260 = "「Có rất nhiều người, những người tài giỏi và tuyệt vời——\nđang tiếp thêm sức mạnh cho cỗ máy đó.」"
# monologue
# JP: まっすぐまっすぐ、ハチロクの目が僕を見る。
2763 = "Ánh mắt Hachiroku nhìn thẳng vào tôi."
# monologue
# JP: 見られていると――見られるだけで、\n何故か、鼓動が速くなる。
3110 = "Bị nhìn như vậy—— chỉ bị nhìn thôi,\nmà không hiểu sao nhịp tim tôi lại đập nhanh hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「その筆頭が、僕なわけだな」
2458 = "「Người đứng đầu trong số đó, chính là tôi nhỉ.」"
# 【ハチロク】
# display as 八六
# JP: 「左様です。双鉄様こそ、その筆頭で、中心です」
2241 = "「Đúng vậy ạ. Ngài Soutetsu chính là người đứng đầu, là trung tâm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2501 = "「！」" 
# monologue
# JP: 照れくさすぎてふざけたつもりの言葉を、\n真正面から真顔で返されてしまう。
2999 = "Tôi định nói đùa vì quá ngượng,\nnhưng lại bị cô ấy đáp lại bằng một vẻ mặt vô cùng nghiêm túc."
# monologue
# JP: が――それを再び、ごまかそうとは思わない。\nハチロクの目が、本当だけを求めているから。
2710 = "Nhưng—— tôi không định lảng tránh điều đó nữa.\nBởi vì đôi mắt của Hachiroku, chỉ đang kiếm tìm sự thật."
# 【双鉄】
# display as 雙鐵
# JP: 「お前にそう思ってもらえるなら、光栄だ」
1957 = "「Nếu em nghĩ về tôi như vậy, thì thật là vinh hạnh.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしもですよ？　双鉄様のそのお言葉が、\nとても誇らしく、嬉しいのです」
2172 = "「Em cũng vậy ạ? Những lời đó của ngài Soutetsu,\nkhiến em vô cùng tự hào và hạnh phúc.」"
# monologue
# JP: 髪をやわらかく[くしけず]梳る手に、\n頭の方が擦り寄ってくる。
2852 = "Tôi dùng tay nhẹ nhàng vuốt ve mái tóc cô ấy,\nđầu cô ấy liền dụi sát vào tay tôi."
# monologue
# JP: いとけなく甘える仕草がなんとも、\n可愛らしいし、愛おしい。
2855 = "Cử chỉ làm nũng ngây thơ đó,\nthật đáng yêu và đáng mến làm sao."
# 【ハチロク】
# display as 八六
# JP: 「ですが――それだけに、\nわたくし、不安も感じるのです」
1936 = "「Nhưng mà—— chính vì thế,\nem cũng cảm thấy bất an.」"
# 【双鉄】
# display as 雙鐵
# JP: 「不安……か。どのような？」
1900 = "「Bất an…… sao. Như thế nào?」"
# 【ハチロク】
# display as 八六
# JP: 「これほどに幸せなめぐり合わせは――\nきっと、いつまでも続きはしないと、思えてしまって」
2107 = "「Sự hội ngộ hạnh phúc đến nhường này——\nEm cứ nghĩ rằng, chắc chắn nó sẽ không kéo dài mãi mãi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなことを――」
2137 = "「Chuyện đó——」"
# monologue
# JP: 気にしたところで仕方がない、と、\n言いかけ、すぐに考えなおす。
1541 = "Tôi định nói \"có bận tâm cũng chẳng ích gì\",\nnhưng ngay lập tức suy nghĩ lại."
# monologue
# JP: 僕のように、今だけしか無い人間には、\n先のことなど、考えるだけ無駄であるには違いないが。
3170 = "Đối với một kẻ chỉ biết có hiện tại như tôi,\nviệc nghĩ đến tương lai quả thực chỉ là vô ích."
# 【双鉄】
# display as 雙鐵
# JP: 「……いや、そうだな。\n僕も、その方が安心だ」
1598 = "「……Không, đúng vậy nhỉ.\nTôi cũng thấy như thế sẽ an tâm hơn.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様が、安心――ですか？」
2481 = "「Ngài Soutetsu thấy, an tâm—— sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 2067 = "「嗯」" 
# monologue
# JP: ハチロクと僕の時間は、違う。\n僕が生涯を終えたとて、きっと、ハチロクは動き続ける。
2761 = "Thời gian của Hachiroku và tôi là khác nhau.\nDù sinh mệnh của tôi kết thúc, chắc chắn Hachiroku vẫn sẽ tiếp tục hoạt động."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、目先のことしか見えん。\nそう生きてきたし、これからもきっと、そう生きる」
2180 = "「Tôi chỉ nhìn thấy những điều trước mắt.\nTôi đã sống như vậy, và từ nay về sau chắc chắn vẫn sẽ sống như thế.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
2221 = "「Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから未来を、お前が見てくれるなら安心だ。\n僕は思い切り目先だけ、一瞬だけを見つめられるから」
2208 = "「Vì vậy, nếu em chịu nhìn về tương lai thì tôi an tâm rồi.\nBởi vì tôi có thể thỏa sức tập trung vào hiện tại, vào khoảnh khắc này.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ――」
2046 = "「A——」"
# monologue
# JP: ほっとしたような、納得したような。\nけれども少し、さみしいようにも聞こえる吐息。
2846 = "Một tiếng thở hắt ra như nhẹ nhõm, như thấu hiểu.\nNhưng nghe cũng có chút gì đó cô đơn."
# 【ハチロク】
# display as 八六
# JP: 「考えておけとおっしゃいますか？\nこの幸せが、終わった先を」
2161 = "「Ngài bảo em hãy suy nghĩ trước sao ạ?\nVề tương lai sau khi niềm hạnh phúc này kết thúc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「命令ではない。ただの願いさ」
2435 = "「Không phải mệnh lệnh. Chỉ là một mong muốn thôi.」"
# monologue
# JP: 僕が、先に逝ったそのとき。\n一緒に焼かれて欲しいなどとは、思うまい。
2912 = "Khi tôi nhắm mắt xuôi tay trước.\nTôi không muốn em phải bị thiêu rụi cùng tôi."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;に願うことを、\nきっと、ハチロクにも同じく、願おう。
3152 = "Những gì tôi mong muốn ở \x%l8620;#00ffc040;8620%l;#;,\nchắc chắn, tôi cũng mong muốn điều tương tự ở Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「お前と過ごす時間をより幸せなものとするためにも。\n僕は、この一瞬だけを見つめたいのだ」
2322 = "「Để biến thời gian bên em trở nên hạnh phúc hơn nữa.\nTôi muốn chỉ nhìn vào khoảnh khắc này thôi.」"
# 【ハチロク】
# display as 八六
# JP: 「……甘えっ子のマスターですね、双鉄様は」
1616 = "「……Ngài đúng là một Master thích làm nũng nhỉ, ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
2024 = "「Hửm!?」"
# monologue
# JP: 甘えっ子、など、産まれて初めて受けた評価だ。
3082 = "Làm nũng, đây là lần đầu tiên trong đời tôi nhận được đánh giá như vậy."
# monologue
# JP: が――そうか。これが、甘えか。\n僕は、ハチロクに甘えているのか。
2696 = "Nhưng—— ra vậy. Đây là làm nũng sao.\nTôi, đang làm nũng với Hachiroku à."
# 【双鉄】
# display as 雙鐵
# JP: 「願い、頼ることが甘えなら――\nそうだな、僕は、思い切りお前に甘えたい」
2101 = "「Nếu mong muốn, dựa dẫm được coi là làm nũng——\nĐúng vậy nhỉ, tôi muốn thỏa sức làm nũng với em.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。どうぞお甘えください。いくらでも」
2098 = "「Vâng. Xin ngài cứ làm nũng đi ạ. Bao nhiêu cũng được.」"
# monologue
# JP: ハチロクが僕を抱きしめる。
2745 = "Hachiroku ôm lấy tôi."
# monologue
# JP: 小さな体で、薄い体で――\nそれでも、やわらかに包み込む。
3049 = "Bằng cơ thể nhỏ bé, mỏng manh ấy——\nnhưng vẫn dịu dàng bao bọc lấy tôi."
# 【ハチロク】
# display as 八六
# JP: 「それがどれほど切ないことでも――\nあなたのために、わたくしは未来を思いましょう」
2141 = "「Dù điều đó có đau đớn đến nhường nào——\nVì ngài, em sẽ hướng về tương lai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕は、\n幸せな今を、お前と重ね続けよう」
2459 = "「Vậy thì tôi sẽ,\ntiếp tục vun đắp hiện tại hạnh phúc này cùng với em.」"
# 【ハチロク】
# display as 八六
# JP: 「あっ」
# 2031 = "「啊」" 
# monologue
# JP: 抱きしめ返す。ハチロクを。\nおでこにおでこを軽くあて、そのままそっと、キスをする。
2913 = "Tôi ôm lấy Hachiroku.\nKhẽ chạm trán vào trán cô ấy, rồi cứ thế nhẹ nhàng đặt một nụ hôn."
# monologue
# JP: この一瞬を、この一瞬を。\n何度も、何度も――出来る限りに、重ねるように。
3030 = "Khoảnh khắc này, khoảnh khắc này.\nNhiều lần, nhiều lần nữa—— vun đắp nhiều nhất có thể."
