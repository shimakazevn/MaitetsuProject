# monologue
# JP: れいなの無邪気を、\nハチロクはおおらかに包み込む。
2735 = "八六大度地容忍了玲奈的天真無邪。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、取り戻したのです。本来のわたくしを――\n双鉄様に、取り戻させていただいたのです」
