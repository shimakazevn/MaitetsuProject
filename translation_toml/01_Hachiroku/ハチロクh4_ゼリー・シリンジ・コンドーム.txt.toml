945 = "「呼」" 

# monologue
# JP: 乗務を終えて湯につかり、\n夜風に吹かれ帰宅する。
1480 = "結束乘務工作，泡泡澡，在夜風中回家。" 

# monologue
# JP: いつもどおりの行程を経て部屋へと戻れば、\nいつもと少しだけ違う景色が、僕を待ってる。
1428 = "我走過熟悉的路回到房間，卻看到了和平時不太一樣的風景。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「なんだ？　このダンボールは」
871 = "「什麼啊？這個紙箱子」" 

# 【ハチロク】
# display as 鈴
# JP: 「まあ、届いたのですね」
889 = "「剛送到的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すず」
1102 = "「鈴」" 

# monologue
# JP: パジャマ姿に、濡れた黒髪。\nとても嬉しげにほころぶ笑顔。
1345 = "她穿著睡衣，黑髮濕濕的，笑得非常開心。" 

# monologue
# JP: 見ているだけで幸せになる愛くるしさだ。
1473 = "真是可愛到光是看著她就覺得幸福。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すずの荷物か？」
878 = "「你的東西嗎？」" 

# 【ハチロク】
# display as 鈴
# JP: 「ええ。\nたまにはお給金を使ってみようかと思いまして」
993 = "「嗯。我想偶爾用用工資」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いいことだな。\nそれで、何を買ったのだ？」
1092 = "「那好啊。但你買了什麼？」" 

# 【ハチロク】
# display as 鈴
# JP: 「うふふ、ご覧くださいな」
942 = "「呵呵，請看」" 

# monologue
# JP: いそいそと、すずは段ボールを開けていく。\n中にあるのは――
1351 = "她高高興興地打開紙箱子。我一看——" 

# 【ハチロク】
# display as 鈴
# JP: 「ゼリーと、シリンジと、コンドームです」
1049 = "「是潤滑油，針筒和保險套」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「シリンジ？　ああ、注射器か。\nコンドーム……とは、避妊具のことだよな？」
1098 = "「針筒？噢，注射器？保險套……就是避孕用品吧？」" 

# 【ハチロク】
# display as 鈴
# JP: 「ひにんぐ、ですか？」
1087 = "「避孕用品？」" 

# monologue
# JP: その位は知っているつもりだったが、\n急速に自信がなくなっていく。
1388 = "我以為自己知道這是什麼，但看到她的反應，我迅速沒信心了。" 

# monologue
# JP: 妊娠しないすずは避妊とは無縁だろうし……\n僕の知識に、何かの間違いがあるのかもしれん。
1540 = "鈴不會妊娠，根本不用避孕……我的知識可能是出了什麼錯吧。" 

# 【ハチロク】
# display as 鈴
# JP: 「ひにんぐとは、何でございましょうか？」
1086 = "「避孕用品是什麼？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「その……望まぬ妊娠を避けるための道具……\nかと思うのだが」
1081 = "「這個是……為了避免意外懷孕的道具……不過……」" 

# 【ハチロク】
# display as 鈴
# JP: 「まぁ。コンドームはそのようにも使うのですね」
882 = "「保險套就是這麼用的東西嘛」" 

# monologue
# JP: そのように“も”と、言ってもらえてホッとする。\nやはり、避妊を目的として購入したのでは無かったようだ。
1349 = "她這麼一說，我也就放心了。看來她不是為了避孕而買這些的。" 

# monologue
# JP: しかし、となると……
1291 = "但這麼看來……" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すずは、\nコンドームをどう使うために買ったのだ？」
1105 = "「鈴，你為什麼要買保險套啊？」" 

# 【ハチロク】
# display as 鈴
# JP: 「はい。その……\nわたくし、ですね？」
998 = "「嗯。那個……您知道嗎？」" 

# monologue
# JP: 言いながら、すずは布団を敷いていく。
1559 = "鈴鋪起了被褥。" 

# monologue
# JP: そしてその上に……いったいなんのためなのだろうか？\n年末に配り余ってしまった、タオルをきっちりと敷く。
1536 = "那……到底會有什麼緣故呢？她還鋪上了年末沒有發完的毛巾。" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様に……ご教示いただいたではございませんか」
1123 = "「雙鐵少爺……您可以指導一下我嗎」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕が？　何をだ」
1072 = "「要指導什麼？」" 

# 【ハチロク】
# display as 鈴
# JP: 「ですので……その、\nこのようなときの、心構えについてです」
1018 = "「就是……那個，這種時候要做怎樣的心理準備」" 

# monologue
# JP: すずはよじよじ、\nズボンを脱いできちんとたたみ脇へ置く。
1546 = "鈴慢慢地脫掉褲子，規規矩矩地疊好放在旁邊。" 

# monologue
# JP: そうして、上はきっちり着たまま――
1269 = "上身則是穿得好好的——" 

# monologue
# JP: （ころん）
1722 = "（躺倒）" 

# monologue
# JP: 敷いたばかりの布団の上に寝転んで、\n恥ずかしそうに、僕から視線を逸らしてしまう。
1347 = "她躺在了剛鋪好的被子上，羞澀地不敢看我的眼睛。" 

# 【ハチロク】
# display as 鈴
# JP: 「――セックスのとき、\nもっと新しい、気持ちいい場所を探せばいい、と」
674 = "「——上次做愛的時候，你說要找到新的舒服的部位」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、言ったな」
1045 = "「是啊」" 

# 【ハチロク】
# display as 鈴
# JP: 「その折――アナルセックスのこともお聞きしたので、\nわたくし、お勉強したのです」
1090 = "「那個時候——你說了肛交的事，我就去學習了一下」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「あ、なるほど」
980 = "「啊，原來如此」" 

# monologue
# JP: 思ったままに出た声が、\nくだらんダジャレになってしまってたと気づく。
1408 = "我想到什麼說什麼，不小心變成了屁眼的諧音。" 

# monologue
# JP: が、すずは全く気にもしないで、\nもぞもぞと手を――
1292 = "但鈴完全不介意，慢慢地把手——" 

# monologue
# JP: （くんっ）
1693 = "（嗯）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「！」
1128 = "「！」" 

# monologue
# JP: すずらしい、眩しいほどに清楚なパンツ。\nそのお尻――穴の部分を、かぁるく、指でくぼませて。
1551 = "鈴的內褲整潔乾淨，就像她的性格一樣。她把屁股上——洞的部分，輕輕用手剝開。" 

# monologue
# JP: そうしてすずは僕を見上げて、\n熱っぽい声で教えてくれる。
1541 = "鈴仰視著我，她說話的聲音帶著熱意。" 

# 【ハチロク】
# display as 鈴
# JP: 「アナル――肛門の中は、本来は排泄のための場所。\n膣とは違い、おちんちんを受け入れることは目的外です」
1064 = "「肛門——肛門本來是排泄的地方。跟陰道不一樣，不是插小雞雞的部位」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
999 = "「嗯」" 

# 【ハチロク】
# display as 鈴
# JP: 「ですのでアナルは、自ら[じゅんかつ,1]潤滑することができない。\nゼリーは、それを補うために使用するものだそうです」
1065 = "「肛門無法自己潤滑。潤滑油是用來代替的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ふむ。これをか」
996 = "「嗯。這個吧」" 

# 【ハチロク】
# display as 鈴
# JP: 「はい。ですので……」
994 = "「嗯。所以……」" 

# monologue
# JP: （ぐっ）
1682 = "（咕）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1128 = "「！」" 

# monologue
# JP: すずはパンツをはいたまま、\nそのまま引っ張り細くして、可愛いアナルを露出させる。
1558 = "鈴穿著內褲，拉開了一道細縫，露出了可愛的肛門。" 

# 【双鉄H】
# display as 雙鐵
# JP: （これは……すごいな）
1724 = "（這個……真厲害）" 

# monologue
# JP: 引っ張るせいで、\nおまんまんのスジにもパンツがぎっちり食い込んでいる。
1326 = "因為她拉著內褲，所以內褲也陷進了小妹妹的蜜縫中。" 

# monologue
# JP: 見えてはいけない場所を隠す。パンツの持ってる役割的には、\nむしろ、逆効果としか思えないような光景だ。
1301 = "內褲的作用是遮住隱私部位，現在看起來只讓我覺得有反效果。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「…………」
680 = "「…………」" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄様？」
1126 = "「雙鐵少爺？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「あ――すまん、見とれた」
959 = "「啊——抱歉，我看入迷了」" 

# 【ハチロク】
# display as 鈴
# JP: 「えっ！？　ええっ――あの、\nそんなに、まじまじと見ていただくと、さすがに――」
954 = "「哎！？嗯——那個，您看得那麼目不轉睛地，實在是——」" 

# monologue
# JP: すずが真っ赤に染まってく。\n染まりながらも、パンツをずらしてる手は動かない。
1550 = "鈴滿臉通紅。但拉著內褲的手卻沒有動。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そう言われても、見ずには塗れんさ」
873 = "「但我還是想看啊」" 

# monologue
# JP: 肌に触れたい。アナルに触れたい。\n健気なすずを反応させたい。
1410 = "我想撫摸她的肌膚，碰碰她的肛門，想讓堅強的鈴作出反應。" 

# monologue
# JP: ――僕の希望も、すずの希望に重なっている。
670 = "——我的希望，與鈴的希望重合了。" 

# monologue
# JP: （にゅるん）
1709 = "（扭嚕）" 

# monologue
# JP: 容器からゼリーを取り出し指に伸ばしてみれば、\n絡まず、粘つくこともなく、実にさらりと心地よい。
1406 = "我從容器中取出潤滑油，手指沾了沾，感覺不黏手，滑滑溜溜的很舒服。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、それでタオルを敷いたのか」
1127 = "「難怪要鋪毛巾」" 

# monologue
# JP: これほどさらさらした物ならば、\nまず間違いなく、あふれこぼれる。
1532 = "這麼濕滑的東西一定會淌出來的。" 

# monologue
# JP: すずらしい細やかな気遣いに感心し。\nすずらしい、慎ましやかなすぼまりへ指を伸ばしてく。
1404 = "我很佩服鈴一直這麼細緻入微。我手指伸向了靦腆的鈴靦腆的屁眼。" 

# monologue
# JP: （ちゅくっ）
1690 = "（啾嗯）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゃうっ！？」
932 = "「呀嗚！？」" 

# monologue
# JP: ゼリーをまぶした指先で、\nアナルの入り口をとんとん、軽くノックする。
1329 = "塗滿潤滑油的指尖，很輕地敲了敲肛門的入口。" 

# monologue
# JP: けれどもそれが、裏目に出る。\nすずはアナルをキュッとしめ、頑なに指を閉ざしてしまう。
1283 = "但是卻適得其反。鈴緊緊地收緊肛門，頑固地拒絕著手指。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すず。これでは中をほぐすことが出来んぞ」
1108 = "「鈴，這樣我怎麼幫你鬆弛呢」" 

# 【ハチロク】
# display as 鈴
# JP: 「は、はい。わかってはいるのですけれど――\nは、恥ずかしくて、その……力んで、しまって」
1042 = "「是、是。我明白道理，但是——太、太害羞了……所以忍不住」" 

# monologue
# JP: （にゅるんっ）
# 1709 = "（扭嚕）" 

# 【ハチロク】
# display as 鈴
# JP: 「ふあっ――あっ」
947 = "「呼啊——啊」" 

# monologue
# JP: 肛門の廻りをにゅるりと撫ぜれば、\n気持ちよさそうな声が聴こえる。
1421 = "我撫摸著肛門周圍，能聽到她享受的聲音。" 

# monologue
# JP: だが、緩まない。\nならば、別の手を使う他ない。
1286 = "但肛門依然緊繃。看來只能用別的手段了。" 

# monologue
# JP: （さすううううっ）
1716 = "（撫摸）" 

# 【ハチロク】
# display as 鈴
# JP: 「ふやっ！？」
988 = "「嗚呀！？」" 

# monologue
# JP: ゼリーをまぶした指でもはっきり感じるほどに、\nすずのおまんまんは濡れている。
1552 = "鈴的小妹妹已經濕到我滿手指的潤滑油也能清楚地感覺出來。" 

# 【ハチロク】
# display as 鈴
# JP: 「あ、あの――双鉄様？\nおまんまんには――んふっ――ゼリー――はっ」
1074 = "「請、請問——雙鐵少爺？小妹妹——呼——不需要潤滑油的——哈」" 

# monologue
# JP: （さすっ――さすっ――くちゅっ――こちゅ――）
1715 = "（摸——摸——咕啾——咕啾——）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「アナルセックスだけではきっと終わるまい。\nそれに――」
905 = "「只肛交肯定不夠。而且——」" 

# monologue
# JP: （ぐぐっ）
# 1682 = "（咕）" 

# 【ハチロク】
# display as 鈴
# JP: 「やっ――[なか,1]膣内に――ゼリーっ――冷た――くてっ\nんっ……ふあっ――あっ」
918 = "「呀——陰道裡的——潤滑油——好冰涼——嗯……呼啊——啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ゼリーを使って膣に挿れれば、それはそれで、\n新しい気持ちよさを見つけられるかもしれない」
1061 = "「用潤滑油再插入陰道，說不定能發現新的舒服的部位」" 

# 【ハチロク】
# display as 鈴
# JP: 「さ、さよう――です……ねっ――んっ――\n新しい……きもち――よ、さっ――ふあっ」
867 = "「也、也是——啊……嗯——新的……舒服的——部——呼啊」" 

# monologue
# JP: 膣に入れてる指を鉤にして動かせば、\nすずは可愛く反応し、蜜をとろとろに溢れさせてく。
1440 = "插進陰道的手指彎成勾形摳了摳，鈴就會有很可愛的反應，蜜液也會流出很多。" 

# monologue
# JP: これではゼリーは、すぐに流されてしまうだろう。\nが、それでいい。今だけは――本命は別の場所なのだから。
1529 = "這樣潤滑油很快就會被沖掉。但這樣也好，我現在的首要目標是另一個地方。" 

# 【双鉄H】
# display as 雙鐵
# JP: （ひくついている――緩んだようだな）
1719 = "（肛門動了動——看來是松點了吧）" 

# monologue
# JP: すずの小さな肛門は、\nまるで呼吸をしているようだ。
1553 = "鈴的小肛門，簡直像在呼吸一樣。" 

# monologue
# JP: おまんまんを撫でさする手は休めぬままに――
1397 = "我在撫摸小妹妹的手不停歇的同時——" 

# monologue
# JP: （つぷんっ）
1703 = "（戳）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゃああああああんっ！？」
928 = "「呀啊啊啊！？」" 

# monologue
# JP: 予告もせずにアナルに指を押しこめば、\nすずは驚きと快感の混じったような声を出す。
1423 = "我毫無預告地向肛門插進手指，就聽到鈴摻雜了驚訝和快感的聲音。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「入り口さえを越えてしまえば――\nすんなり行くな」
906 = "「只要突破入口——接下來就輕鬆了」" 

# monologue
# JP: （くちゅっ――つぷっ――）
1676 = "（咕啾——呲噗——）" 

# monologue
# JP: すずの肛内――アナルの奥は、\nぴっちりシンプルでまっすぐだ。
1554 = "鈴的肛內——肛門裡頭，非常緊實非常單純。" 

# monologue
# JP: おまんまんとは大きく違う、まるでゴムのような感触を、\n指先で味わいながら、ゼリーを壁に摺りこんでいく。
1530 = "這裡和小妹妹差別很大，簡直是橡膠一樣的觸覺，我用指尖一邊品味，一邊給肉壁抹上潤滑油。" 

# monologue
# JP: （にゅるっ――ぬっ――にゅっ――ぬうっ――）
1708 = "（扭嚕——扭唔——）" 

# 【ハチロク】
# display as 鈴
# JP: 「やっ――おしり――わたくし――おしりっ――\n双鉄さまにっ――ほじほじって――して――いただいて」
915 = "「呀——屁股——我的——屁股——被您——鑽來——鑽去——的」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「気持ちいいのか？」
1069 = "「舒服嗎？」" 

# 【ハチロク】
# display as 鈴
# JP: 「やっ――恥ずかしい――ですっ――んっ――おしり、\nなの、に、わたくし――やあっ――あっ――こん、なに」
914 = "「呀——好難為情——嗯——屁股，但是我——呀啊——啊——居然這麼——」" 

# monologue
# JP: 気持ちいいとは口に出さずに、\nけれどもそうだと認めてくれる。
1334 = "她沒有承認舒服，但卻用行為表示了默認。" 

# monologue
# JP: ならば、もっと奥までほじって塗ってやりたくなる。\nが、肛内はあまりに奥深く、中指でさえもとても足りない。
1382 = "我也想幫她把潤滑油塗得更深點。但是肛內實在太深，中指都不夠長。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか……このためのシリンジか」
890 = "「原來針筒是為了這個啊……」" 

# monologue
# JP: とても細身だ。\nよく見れば先端の針もない。
1538 = "針筒很細很長，而且針頭已經被去掉了。" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……は、はい。それをっ、使えば――んっ――\nアナルの、中のっ――もっと、深くまで――あっ」
966 = "「啊……是、是。如果用它——嗯——就能插在肛門中——更深點——啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「しかし、僕のすずの可愛い体に、\n器具だなんだを、差し込みたいとは思えんな」
875 = "「但是你的身體如此可愛，我不想拿道具插進你的身體」" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……双鉄様」
970 = "「啊……雙鐵少爺」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「故にだ、すず。\nなにか、他の方法を――ああ」
1010 = "「因此，鈴。有沒有別的辦法——哎呀」" 

# monologue
# JP: （きゅぽっ）
1675 = "（咕啵）" 

# monologue
# JP: 指を抜く。
1420 = "我抽出手指。" 

# monologue
# JP: ここまでほぐれ濡らしていれば、\nもうそれだけで十分だろうという気もするが――
1445 = "既然已經這麼鬆、這麼濕了，其實應該已經足夠了，但是——" 

# 【双鉄H】
# display as 雙鐵
# JP: 「コンドームも、ならば潤滑を良くするためか？」
881 = "「保險套也是為了更潤滑而準備的嗎？」" 

# 【ハチロク】
# display as 鈴
# JP: 「それだけではなく、雑菌の感染を防ぐためだそうです。\n排泄の穴は、やはり、排泄の穴ですので」
869 = "「也是為了防止細菌感染。畢竟是排泄用的洞」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「しかし、お前はめったに使わぬ部分なのだろう？」
876 = "「但那是你很少用上的部位吧？」" 

# 【ハチロク】
# display as 鈴
# JP: 「使わないから却って――ということもあるかもしれません。\nこればかりは、双鉄様のお体のためでございますので」
1073 = "「說不定越是不用越是危險呢——保險套是為了保護好您的身體」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「わかった」
1037 = "「明白了」" 

# monologue
# JP: ならば次には、肛内をきちんと洗浄し、\n邪魔物なしで、すずとアナルで繋がろう。
1270 = "下一次就要洗乾淨肛內，通過肛門與鈴毫無障礙地連通。" 

# monologue
# JP: が、今は初回で、僕らふたりは初心者だ。\nすずが勉強したことに、素直に従う方がいい。
1280 = "但今天是第一次，我和鈴都是初學者。鈴事先研究過了，我應該聽她的。" 

# monologue
# JP: （にゅる～っ）
1718 = "（濕滑）" 

# monologue
# JP: コンドームを着けたその上に、\nたっぷりとアナルゼリーを伸ばしてく。
1415 = "我戴上保險套，然後塗上滿滿的潤滑油。" 

# 【ハチロク】
# display as 鈴
# JP: 「あ……わたくしにさせてくださればよかったのに」
968 = "「啊……讓我來做不就好了嗎」" 

# monologue
# JP: 言いつつ、すずはよじよじとパンツを全部脱ぐ。\nたたんで枕の下にしまって――
1542 = "鈴俐落地脫下了內褲。疊好放在了枕頭下——" 

# 【双鉄H】
# display as 雙鐵
# JP: 「本当だな。着けてもらうのも良かったし、\n僕としても、すずのパンツを脱がせたかった」
1047 = "「是啊，雖然穿著做愛是很有感覺，但要我說的話，我也希望你把內褲脫掉」" 

# 【ハチロク】
# display as 鈴
# JP: 「でしたら、双鉄様」
1097 = "「那麼雙鐵少爺」" 

# monologue
# JP: 熱っぽい声。
1339 = "她的聲音帶著濕熱。" 

# monologue
# JP: すずの視線が、\nなだらかすぎる胸の上へと、僕の視線を誘導する。
1555 = "鈴的視線，將我的視線勾引到了她平坦的胸部。" 

# 【ハチロク】
# display as 鈴
# JP: 「パジャマの上は、双鉄様にお願いできますか？」
1062 = "「睡衣上身可以讓您來嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「わかった。\nだが可愛いパジャマだ。全部脱がせてはもったいない」
1036 = "「明白了。但這麼可愛的睡衣，全脫掉也太可惜了」" 

# monologue
# JP: ぷち、ぷち、と、前のボタンを外してく。
1399 = "我將前方的鈕扣一個個地解開。" 

# monologue
# JP: 徐々に胸元があらわになって、\nやがてちょこん、と、可愛い乳首が露出する。
1499 = "胸口慢慢地露了出來，可愛的乳頭終於顯現出了真容。" 

# 【双鉄H】
# display as 雙鐵
# JP: （なるほど――やってもらうこと、させてもらうことも、\nセックスの喜びの一つなのだな）
1649 = "（原來讓對方來做，也是做愛的喜悅之一）" 

# monologue
# JP: ならば、すずにもこの喜びを教えてあげたい。\n思いはすぐさま、とてもシンプルな言葉に変わる。
1411 = "我想讓鈴也體會到這種喜悅。想法馬上變成了非常質樸的話語。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すず。教えてくれ。このゼリーまみれのちんちんを、\nすずの、どこに挿れればいいか」
1107 = "「鈴，告訴我吧。塗滿潤滑油的小雞雞，插進你身體的哪裡才好呢」" 

# 【ハチロク】
# display as 鈴
# JP: 「はい……かしこまりました、双鉄様」
1039 = "「是……我明白了，雙鐵少爺」" 

# monologue
# JP: （くぽおっ）
1712 = "（拉開）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1128 = "「！」" 

# monologue
# JP: 真っ白な指が尻肉を割り、\nすぼまってた尻穴を広げてくれる。
1560 = "鈴雪白的手指分開兩瓣臀肉，打開了縮窄的屁眼。" 

# 【ハチロク】
# display as 鈴
# JP: 「すずは、アナルに――お尻の穴に、\n双鉄様のおちんちんを、挿れていただきたいのです」
1103 = "「鈴想要您的雞雞向肛門——屁眼裡插進來」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「わかった」
# 1037 = "「明白了」" 

# monologue
# JP: （くぷっ）
1700 = "（噗）" 

# 【ハチロク】
# display as 鈴
# JP: 「あひゅっ！！？」
971 = "「啊呀！！？」" 

# monologue
# JP: 亀頭をまずは押し当てる――\nだけのつもりが、つるん、と抵抗なく進み――
1592 = "龜頭先頂了上去——想不到竟然輕輕鬆鬆地就插了進去——" 

# 【双鉄H】
# display as 雙鐵
# JP: 「お――おっ――これはっ――」
677 = "「——嗯——這個——」" 

# monologue
# JP: （ずるるるるるるるるっ）
1666 = "（呲嚕——）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゃうっ！？　んっ――ひっ――\nずるって――おしり――あっ――これっ――深っ――」
935 = "「呀嗚！？嗯——哈——屁股——啊——插得——這麼——深——」" 

# monologue
# JP: （ぱちゅんっ！）
1689 = "（啪啾！）" 

# monologue
# JP: 腰と尻との当たる音。\n遅れて、ぎゅううっと、根本の部分に強い締め付け。
1504 = "腰和屁股碰上的聲音。緊接著她的屁眼就緊緊地夾住了肉棒。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すごい……ものだな――\n専門家の知恵と道具というものは――」
1015 = "「好厲害……——不愧是專家的智慧和道具——」" 

# monologue
# JP: ほぐしていたのも、もちろんあろう。\nわずかとはいえ経験もあり、そして期待もあったろう。
1364 = "屁眼肯定是松過的。而且她也有一點經驗了，也有一點期待吧。" 

# monologue
# JP: しかしそれでもゼリーが無ければ、\n恐らく途中で、また締められて苦しんだろう。
1288 = "但要是沒有潤滑油，中途恐怕還是會被勒到。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「指を挿れるだけでもあれほど大変だったというのに、\nどうだ……このスムーズさは」
1034 = "「明明之前插手指都那麼困難的，怎麼會這麼順暢……」" 

# monologue
# JP: （ぬろおおおおおおおおっ！！）
1685 = "（哧溜——！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ゃっ！？　双鉄、様っ――やぁっ――\nおちんちん――抜いちゃ――やぁ、です――んうっ」
938 = "「呀！？雙鐵少爺——啊——小雞雞——抽出——不要——嗚」" 

# monologue
# JP: （ずぱんっ！）
1659 = "（呲嗚！）" 

# 【ハチロク】
# display as 鈴
# JP: 「きゅふうううっっ！　あっ――ぬるって――\nこれっ――いいっ！！！」
931 = "「呀嗚——！啊——好滑——好——好棒！！！」" 

# monologue
# JP: 動く、動ける。\n窮屈すぎる入り口も、ぴっちりとした肛内も。
1313 = "動起來了、動得起來了。無論是窄小的入口，還是緊繃的肛內。" 

# 【双鉄H】
# display as 雙鐵
# JP: （膣とは……やはり違うものだな）
1672 = "（和陰道……果然不同）" 

# monologue
# JP: 複雑さが無い。締まってはいるが、単調だ。\nだが、それだけに――
1510 = "裡面沒有複雜的褶皺，雖然很緊但也很單調。但正因為如此——" 

# monologue
# JP: （ずろおおおおおおっ！）
1669 = "（呲溜——！）" 

# 【ハチロク】
# display as 鈴
# JP: 「ひあっ――あっ――んっ――抜け――て、くっ――」
927 = "「呀啊——啊——抽出去了——嗯——」" 

# monologue
# JP: （ぱちゅんっ！！）
1688 = "（啪啾！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「んっ！　くふううううっ」
1002 = "「嗯！嗚嗚——」" 

# monologue
# JP: 動かして、摩擦する。\nその単純な快感だけに、どこまでもどこまでも集中できる。
1432 = "抽插、摩擦。快感的純粹讓我無時無刻不集中。" 

# monologue
# JP: “尻穴を掘る”という慣用句があるとどこかで聞いたが、\nなるほど、これは――確かに、掘ってる感覚だ。
1426 = "我聽說過“挖屁眼”這樣的慣用語，原來如此，確實是挖的感覺。" 

# monologue
# JP: （ずっ――ずりゅっ――ずぷっ――じゅぼっ）
1656 = "（呲——呲溜——啾啵）" 

# 【ハチロク】
# display as 鈴
# JP: 「あ、熱っ――いっ――おしりっ――おなか、もっ――\nんっ――あっつい、ですっ――双鉄――さまぁっ」
985 = "「啊，熱熱的——在——屁股——肚子，也——嗯——好熱，啊——雙鐵少爺——」" 

# monologue
# JP: 動かすごとに高まっていく。
1520 = "越抽插，她就越興奮。" 

# monologue
# JP: これほど潤いなめらかなのに、\n肉と肉とは、摩擦で熱を帯びていく。
1531 = "這麼光滑水潤的屁眼，但肉和肉的摩擦還是產生了熱量。" 

# monologue
# JP: （ずるっ――ずぶっ！　にゅるっ――ばちゅんっ！！）
1667 = "（呲溜——呲噗！扭——！！）" 

# 【ハチロク】
# display as 鈴
# JP: 「いっ――あっ――知らない――こんなのっ――あっ――\n入ってる――のにっ――深、い――のにっ――んくっ」
1013 = "「在——啊——我都不知道——這樣——啊——進來了——這麼深——嗯」" 

# 【双鉄H】
# display as 雙鐵
# JP: （そうだな……これほど深く挿れても――）
1702 = "（對啊……就算插得這麼深——）" 

# monologue
# JP: 先端を迎えてくれる場所がない。\n子宮がちゅっとキスしてくれない。
1588 = "頂端還是碰不到什麼部位。子宮不會與頂端接吻。" 

# monologue
# JP: それは果てなく寂しいことで、\n繋がってるのに、もっと深くに繋がりたくなる。
1528 = "這是多麼寂寞的事啊，讓我想與她更進一步地緊緊相連。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すず――姿勢を変えるぞ？」
1026 = "「我們換個姿勢吧？」" 

# 【ハチロク】
# display as 鈴
# JP: 「あっ、は、はいっ――\n双鉄、さまの――お好き、にいっ！？――んふっ！」
983 = "「啊，是、是——就按您的——喜歡，咿！？——嗯呼！」" 

# monologue
# JP: （ぐいいいっ！）
1674 = "（咕吱！）" 

# 【ハチロク】
# display as 鈴
# JP: 「そんなっ――あっ――入った、ままっ――んふうっ！\nあっ――深っ――くはっあっ！」
1096 = "「那樣的——啊——還插在裡面就——呼！啊——深——蛤啊！」" 

# monologue
# JP: （ぐ――ぷんっ！）
1673 = "（咕——噗嗯！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？」
1129 = "「！？」" 

# monologue
# JP: すずを持ち上げ思いっきりに腰と腰とを密着すれば、\n最奥が無い――それが寂しいだけではないと思い知る。
1355 = "如果舉起鈴，用力地跟她靠緊，我就不會因為頂不到頭而覺得寂寞了。" 

# monologue
# JP: こんなに深く、こんなにぎっちり根本まで――\n完全に包み込まれる快感が、愛しい気持ちを高めてくれる。
1488 = "肉棒被這樣深刻而緊實、徹底地包裹的快感，讓我倍感喜愛。" 

# 【ハチロク】
# display as 鈴
# JP: 「双鉄、さま……キス……キス……」
1124 = "「雙鐵少爺……接吻……接吻……」" 

# monologue
# JP: 半開きの口。蕩けてる舌。
1316 = "半開的小嘴，靡軟的舌頭。" 

# monologue
# JP: それに思いきり口付けて、\nぬらつく快感と唾液とを、なすりつけるように交換しあう。
1392 = "我們盡情接吻，互相將濕滑的快感與唾液擦在對方的嘴上。" 

# 【ハチロク】
# display as 鈴
# JP: 「ん……あっ――んちゅっ――ぷあっ――あっ！？\nおしりの、中で――双鉄、さま――もっと、おっきく」
991 = "「嗯……啊——啾——噗啊——啊！？屁股中——雙鐵少爺的雞雞——更大了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「だな――たっぷりと――味わってくれ」
1043 = "「是啊——那就好好——品嘗吧」" 

# monologue
# JP: （ぬろ――おお――おお――おお――んっ！）
1684 = "（哧溜——哦——哦——哦——！）" 

# 【ハチロク】
# display as 鈴
# JP: 「やっ――双鉄、さまっ――そんな――ゆっ――っ、\nゆっ、くり――され――たらっ――ひあっ！」
919 = "「呀——雙鐵少爺——那樣的——慢點——可以——嗎——咿啊！」" 

# monologue
# JP: すずの体を持ち上げて、亀頭のくびれで、\n締まろうとする肛門をさらに広げてしまう。
1418 = "我抬起鈴的身體，用龜頭冠將想收縮的肛門撐得更開。" 

# monologue
# JP: 不安定極まる姿勢から、\n今度は一転！　一気に腰をっ！！
1450 = "極不穩定的姿勢煥然一新！現在可以一鼓作氣插進去！！" 

# 【ハチロク】
# display as 鈴
# JP: 「ひゃぐっ！？　あっ――えぐれっ――んっ――\nひゅあっ！！！」
933 = "「呀嗚！？啊——被鑽進來了——呀啊！！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――あっ――」
989 = "「嗯——啊——」" 

# monologue
# JP: 深い、深い。底がない。
1353 = "好深、好深，搆不到底。" 

# monologue
# JP: それが不安で、気持ちよくって、\nだからどこまでも繋がりたくてっ！
1402 = "我很不安，也覺得很舒服，所以想和她緊緊相合、永不分離！" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すずっ！　すずっ！！」
1104 = "「鈴！鈴！！」" 

# 【ハチロク】
# display as 鈴
# JP: 「そ、双鉄さまぁっ――ふやっ――これっ――\nしゅごっ――くひいいいっんっ！」
1121 = "「雙、雙鐵少爺——嗚呀——這下——好——好厲害嗯！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「もう少しだ――僕も――すず、\nもう少しだけ――我慢――して、くれっ――」
886 = "「再稍微——我也——鈴，再稍微——忍耐——一下——」" 

# monologue
# JP: （ずるっ――ずぷんっ！　ずっ！　ぎゅぷっ！）
