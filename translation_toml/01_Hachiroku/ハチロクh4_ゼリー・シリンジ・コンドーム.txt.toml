# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……うむ。\nそれは、僕の言葉だものな」
973 = "「啊啊……嗯。畢竟是我說的」" 

# monologue
# JP: 僕も男だ。\n二言はない。
1383 = "我也是男人。一言九鼎。" 

# monologue
# JP: 自分の言ったことには無論、責任を取る。
1508 = "自己說的話自己負責任。" 

# 【ハチロク】
# display as 鈴
# JP: 「うふふ、そんなに固くならないでくださいな、双鉄様？\n怖いことなど、何一つございませんから」
940 = "「呵呵，別那麼僵硬呀，雙鐵少爺？沒什麼可怕的啦」" 

# monologue
# JP: すずが、優しく僕を抱きしめ、\n背中をそうっとさすってくれ――っ！！！？
1549 = "鈴溫柔地擁抱我，輕輕地撫摸起我的後背——！！！？" 

# monologue
# JP: （つぷんっ！）
1664 = "（呲噗！）" 
