[script]
# lines: 314 
# 【双鉄H】
# display as 雙鐵
# JP: 「ふぅ」
945 = "「Phù」"
# monologue
# JP: 乗務を終えて湯につかり、\n夜風に吹かれ帰宅する。
1480 = "Kết thúc ca trực, ngâm mình trong nước nóng,\nrồi đón gió đêm trở về nhà."
# monologue
# JP: いつもどおりの行程を経て部屋へと戻れば、\nいつもと少しだけ違う景色が、僕を待ってる。
1428 = "Trải qua lịch trình quen thuộc trở về phòng,\nmột khung cảnh hơi khác lạ so với mọi khi đang chờ đón tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「なんだ？　このダンボールは」
871 = "「Gì đây? Thùng các-tông này」"
# 【ハチロク】
# display as 鈴
# JP: 「まあ、届いたのですね」
889 = "「A, giao đến rồi nhỉ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すず」
1102 = "「Suzu」"
# monologue
# JP: パジャマ姿に、濡れた黒髪。\nとても嬉しげにほころぶ笑顔。
1345 = "Trong bộ đồ ngủ, mái tóc đen còn ướt.\nNụ cười rạng rỡ đầy vui sướng."
# monologue
# JP: 見ているだけで幸せになる愛くるしさだ。
1473 = "Chỉ nhìn thôi cũng thấy hạnh phúc vì sự đáng yêu ấy."
# 【双鉄H】
# display as 雙鐵
# JP: 「すずの荷物か？」
878 = "「Đồ của Suzu à?」"
# 【ハチロク】
# display as 鈴
# JP: 「ええ。\nたまにはお給金を使ってみようかと思いまして」
993 = "「Vâng.\nEm nghĩ thỉnh thoảng cũng nên dùng đến tiền lương xem sao」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いいことだな。\nそれで、何を買ったのだ？」
1092 = "「Tốt đấy.\nVậy, em đã mua gì?」"
# 【ハチロク】
# display as 鈴
# JP: 「うふふ、ご覧くださいな」
942 = "「Ư fufu, ngài xem này」"
# monologue
# JP: いそいそと、すずは段ボールを開けていく。\n中にあるのは――
1351 = "Suzu hớn hở mở thùng các-tông ra.\nBên trong là——"
# 【ハチロク】
# display as 鈴
# JP: 「ゼリーと、シリンジと、コンドームです」
1049 = "「Gel bôi trơn, ống tiêm, và bao cao su ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「シリンジ？　ああ、注射器か。\nコンドーム……とは、避妊具のことだよな？」
1098 = "「Ống tiêm? À, kim tiêm à.\nBao cao su......là, dụng cụ tránh thai đúng không?」"
# 【ハチロク】
# display as 鈴
# JP: 「ひにんぐ、ですか？」
1087 = "「Dụng cụ tránh thai, là gì ạ?」"
# monologue
# JP: その位は知っているつもりだったが、\n急速に自信がなくなっていく。
1388 = "Tôi cứ tưởng mình biết rõ điều đó,\nnhưng sự tự tin bỗng chốc tan biến."
# monologue
# JP: 妊娠しないすずは避妊とは無縁だろうし……\n僕の知識に、何かの間違いがあるのかもしれん。
1540 = "Suzu không thể mang thai nên chắc chẳng liên quan gì đến việc tránh thai......\nCó lẽ kiến thức của tôi có chỗ nào đó sai sót chăng."
# 【ハチロク】
# display as 鈴
# JP: 「ひにんぐとは、何でございましょうか？」
1086 = "「Dụng cụ tránh thai, là gì vậy ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「その……望まぬ妊娠を避けるための道具……\nかと思うのだが」
1081 = "「À thì......là dụng cụ dùng để tránh việc mang thai ngoài ý muốn......\nanh nghĩ vậy」"
# 【ハチロク】
# display as 鈴
# JP: 「まぁ。コンドームはそのようにも使うのですね」
882 = "「Chà. Bao cao su cũng được dùng như vậy nữa cơ ạ」"
# monologue
# JP: そのように“も”と、言ってもらえてホッとする。\nやはり、避妊を目的として購入したのでは無かったようだ。
1349 = "Nghe em nói chữ \"cũng\", tôi thở phào nhẹ nhõm.\nQuả nhiên, em mua không phải với mục đích tránh thai."
# monologue
# JP: しかし、となると……
1291 = "Nhưng, nếu vậy thì......"
# 【双鉄H】
# display as 雙鐵
# JP: 「すずは、\nコンドームをどう使うために買ったのだ？」
1105 = "「Suzu,\nem mua bao cao su để làm gì?」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。その……\nわたくし、ですね？」
998 = "「Vâng. Chuyện là......\nem ấy mà?」"
# monologue
# JP: 言いながら、すずは布団を敷いていく。
1559 = "Vừa nói, Suzu vừa trải đệm ra."
# monologue
# JP: そしてその上に……いったいなんのためなのだろうか？\n年末に配り余ってしまった、タオルをきっちりと敷く。
1536 = "Rồi trên đó......rốt cuộc là để làm gì cơ chứ?\nEm trải gọn gàng những chiếc khăn tắm còn thừa từ đợt phát dịp cuối năm."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄様に……ご教示いただいたではございませんか」
1123 = "「Ngài Soutetsu......đã chỉ dạy cho em rồi mà」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕が？　何をだ」
1072 = "「Anh á? Chuyện gì cơ?」"
# 【ハチロク】
# display as 鈴
# JP: 「ですので……その、\nこのようなときの、心構えについてです」
1018 = "「Thì là......chuyện,\nchuẩn bị tâm lý cho những lúc thế này ấy ạ」"
# monologue
# JP: すずはよじよじ、\nズボンを脱いできちんとたたみ脇へ置く。
1546 = "Suzu lúi húi,\ncởi quần ra, gấp gọn gàng rồi đặt sang một bên."
# monologue
# JP: そうして、上はきっちり着たまま――
1269 = "Rồi, vẫn mặc nguyên áo——"
# monologue
# JP: （ころん）
1722 = "（Lăn ra）"
# monologue
# JP: 敷いたばかりの布団の上に寝転んで、\n恥ずかしそうに、僕から視線を逸らしてしまう。
1347 = "Em nằm lăn ra chiếc đệm vừa trải,\nxấu hổ né tránh ánh nhìn của tôi."
# 【ハチロク】
# display as 鈴
# JP: 「――セックスのとき、\nもっと新しい、気持ちいい場所を探せばいい、と」
674 = "「——Lúc làm tình,\nnên tìm kiếm những nơi sung sướng mới mẻ hơn」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、言ったな」
1045 = "「À, anh có nói vậy」"
# 【ハチロク】
# display as 鈴
# JP: 「その折――アナルセックスのこともお聞きしたので、\nわたくし、お勉強したのです」
1090 = "「Nhân dịp đó——em cũng đã nghe về quan hệ qua đường hậu môn,\nnên em đã tự mình tìm hiểu ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ、なるほど」
980 = "「À, ra là vậy」"
# monologue
# JP: 思ったままに出た声が、\nくだらんダジャレになってしまってたと気づく。
1408 = "Lời nói thốt ra theo phản xạ,\ntôi chợt nhận ra nó đã biến thành một câu chơi chữ ngớ ngẩn (anarunaru hodo)."
# monologue
# JP: が、すずは全く気にもしないで、\nもぞもぞと手を――
1292 = "Nhưng, Suzu hoàn toàn không bận tâm,\nem lúi húi đưa tay——"
# monologue
# JP: （くんっ）
1693 = "（Kéo）"
# 【双鉄H】
# display as 雙鐵
# JP: 「！」
1128 = "「!」"
# monologue
# JP: すずらしい、眩しいほどに清楚なパンツ。\nそのお尻――穴の部分を、かぁるく、指でくぼませて。
1551 = "Chiếc quần lót trong sáng đến chói mắt, đúng phong cách của Suzu.\nEm nhẹ nhàng dùng ngón tay ấn lõm phần mông——chỗ cái lỗ."
# monologue
# JP: そうしてすずは僕を見上げて、\n熱っぽい声で教えてくれる。
1541 = "Rồi Suzu ngước nhìn tôi,\nvà giải thích bằng giọng điệu nóng bỏng."
# 【ハチロク】
# display as 鈴
# JP: 「アナル――肛門の中は、本来は排泄のための場所。\n膣とは違い、おちんちんを受け入れることは目的外です」
1064 = "「Hậu môn——bên trong hậu môn, vốn dĩ là nơi để bài tiết.\nKhác với âm đạo, việc tiếp nhận cậu bé nằm ngoài mục đích của nó」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
999 = "「Ừm」"
# 【ハチロク】
# display as 鈴
# JP: 「ですのでアナルは、自ら[じゅんかつ,1]潤滑することができない。\nゼリーは、それを補うために使用するものだそうです」
1065 = "「Vì vậy hậu môn không thể tự bôi trơn được.\nGel được dùng để bù đắp cho điều đó ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ふむ。これをか」
996 = "「Hừm. Dùng cái này à」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。ですので……」
994 = "「Vâng. Vì vậy......」"
# monologue
# JP: （ぐっ）
1682 = "（Kéo）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1128 = "「！」" 
# monologue
# JP: すずはパンツをはいたまま、\nそのまま引っ張り細くして、可愛いアナルを露出させる。
1558 = "Suzu vẫn mặc nguyên quần lót,\ncứ thế kéo căng cho nó nhỏ lại, để lộ ra lỗ hậu môn đáng yêu."
# 【双鉄H】
# display as 雙鐵
# JP: （これは……すごいな）
1724 = "（Cái này......tuyệt thật）"
# monologue
# JP: 引っ張るせいで、\nおまんまんのスジにもパンツがぎっちり食い込んでいる。
1326 = "Do bị kéo căng,\nnên quần lót cũng hằn sâu vào khe hở của cô bé."
# monologue
# JP: 見えてはいけない場所を隠す。パンツの持ってる役割的には、\nむしろ、逆効果としか思えないような光景だ。
1301 = "Che giấu những nơi không được phép nhìn thấy. Xét về vai trò của quần lót,\nthì cảnh tượng này chỉ có thể coi là phản tác dụng."
# 【双鉄H】
# display as 雙鐵
# JP: 「…………」
680 = "「............」"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄様？」
1126 = "「Ngài Soutetsu?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ――すまん、見とれた」
959 = "「A——xin lỗi, anh nhìn đến mê mẩn mất rồi」"
# 【ハチロク】
# display as 鈴
# JP: 「えっ！？　ええっ――あの、\nそんなに、まじまじと見ていただくと、さすがに――」
954 = "「Hả!? Ơ——dạ,\nbị ngài nhìn chằm chằm như vậy, quả thực là——」"
# monologue
# JP: すずが真っ赤に染まってく。\n染まりながらも、パンツをずらしてる手は動かない。
1550 = "Suzu đỏ bừng mặt.\nDù đỏ mặt, nhưng bàn tay đang kéo quần lót xuống vẫn không hề nhúc nhích."
# 【双鉄H】
# display as 雙鐵
# JP: 「そう言われても、見ずには塗れんさ」
873 = "「Dù em nói vậy, nhưng không nhìn thì sao mà bôi được chứ」"
# monologue
# JP: 肌に触れたい。アナルに触れたい。\n健気なすずを反応させたい。
1410 = "Tôi muốn chạm vào làn da ấy. Muốn chạm vào lỗ hậu môn ấy.\nMuốn thấy phản ứng của một Suzu ngoan ngoãn, kiên cường."
# monologue
# JP: ――僕の希望も、すずの希望に重なっている。
670 = "——Mong muốn của tôi, cũng đang trùng khớp với mong muốn của Suzu."
# monologue
# JP: （にゅるん）
1709 = "（Trơn tuột）"
# monologue
# JP: 容器からゼリーを取り出し指に伸ばしてみれば、\n絡まず、粘つくこともなく、実にさらりと心地よい。
1406 = "Lấy gel từ trong hộp ra và thoa đều lên ngón tay,\nkhông hề bị rối, cũng không dính nhớp, mà thực sự rất mượt mà và dễ chịu."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、それでタオルを敷いたのか」
1127 = "「À, ra là vì vậy nên em mới trải khăn tắm」"
# monologue
# JP: これほどさらさらした物ならば、\nまず間違いなく、あふれこぼれる。
1532 = "Nếu là thứ mượt mà thế này,\nthì chắc chắn sẽ tràn ra ngoài."
# monologue
# JP: すずらしい細やかな気遣いに感心し。\nすずらしい、慎ましやかなすぼまりへ指を伸ばしてく。
1404 = "Tôi thầm thán phục sự chu đáo, tỉ mỉ đúng chất Suzu.\nVà đưa ngón tay về phía lỗ nhỏ khép nép, e lệ cũng rất giống em ấy."
# monologue
# JP: （ちゅくっ）
1690 = "（Chụt）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃうっ！？」
932 = "「Hya ư!?」"
# monologue
# JP: ゼリーをまぶした指先で、\nアナルの入り口をとんとん、軽くノックする。
1329 = "Bằng đầu ngón tay thoa đẫm gel,\ntôi gõ nhẹ \"cốc cốc\" vào cửa hậu môn."
# monologue
# JP: けれどもそれが、裏目に出る。\nすずはアナルをキュッとしめ、頑なに指を閉ざしてしまう。
1283 = "Nhưng điều đó lại phản tác dụng.\nSuzu siết chặt hậu môn lại, ngoan cố từ chối ngón tay tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「すず。これでは中をほぐすことが出来んぞ」
1108 = "「Suzu. Thế này thì anh không thể nới lỏng bên trong được đâu」"
# 【ハチロク】
# display as 鈴
# JP: 「は、はい。わかってはいるのですけれど――\nは、恥ずかしくて、その……力んで、しまって」
1042 = "「Vâ, vâng. Em cũng hiểu điều đó nhưng mà——\nX, xấu hổ quá, nên......em lỡ dùng sức mất rồi」"
# monologue
# JP: （にゅるんっ）
# 1709 = "（扭嚕）" 
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ――あっ」
947 = "「Phù a——a」"
# monologue
# JP: 肛門の廻りをにゅるりと撫ぜれば、\n気持ちよさそうな声が聴こえる。
1421 = "Vuốt ve trơn trượt quanh hậu môn,\ntôi nghe thấy giọng nói đầy vẻ sung sướng của em."
# monologue
# JP: だが、緩まない。\nならば、別の手を使う他ない。
1286 = "Nhưng, vẫn không lỏng ra.\nNếu vậy, chỉ còn cách dùng chiêu khác thôi."
# monologue
# JP: （さすううううっ）
1716 = "（Vuốt ve）"
# 【ハチロク】
# display as 鈴
# JP: 「ふやっ！？」
988 = "「Phu ya!?」"
# monologue
# JP: ゼリーをまぶした指でもはっきり感じるほどに、\nすずのおまんまんは濡れている。
1552 = "Dù ngón tay đang thoa đẫm gel vẫn có thể cảm nhận rõ ràng,\ncô bé của Suzu đang ướt đẫm."
# 【ハチロク】
# display as 鈴
# JP: 「あ、あの――双鉄様？\nおまんまんには――んふっ――ゼリー――はっ」
1074 = "「Dạ, dạ——ngài Soutetsu?\nCô bé thì——ưm hưm——không cần——gel đâu ạっ」"
# monologue
# JP: （さすっ――さすっ――くちゅっ――こちゅ――）
1715 = "（Vuốt ve——vuốt ve——nhóp nhép——nhóp nhép——）"
# 【双鉄H】
# display as 雙鐵
# JP: 「アナルセックスだけではきっと終わるまい。\nそれに――」
905 = "「Chắc chắn chúng ta sẽ không chỉ dừng lại ở việc quan hệ qua đường hậu môn đâu.\nHơn nữa——」"
# monologue
# JP: （ぐぐっ）
# 1682 = "（咕）" 
# 【ハチロク】
# display as 鈴
# JP: 「やっ――[なか,1]膣内に――ゼリーっ――冷た――くてっ\nんっ……ふあっ――あっ」
918 = "「Á——bên trong âm đạo——có gelっ——lạnh——quáっ\nƯm......phù a——a」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ゼリーを使って膣に挿れれば、それはそれで、\n新しい気持ちよさを見つけられるかもしれない」
1061 = "「Nếu dùng gel để đưa vào âm đạo, biết đâu đấy,\nchúng ta lại có thể tìm ra một sự sung sướng mới mẻ nào đó」"
# 【ハチロク】
# display as 鈴
# JP: 「さ、さよう――です……ねっ――んっ――\n新しい……きもち――よ、さっ――ふあっ」
867 = "「Đú, đúng——vậy......nhỉっ——ưm——\nSự sung sướng......mới——mẻっ——phù a」"
# monologue
# JP: 膣に入れてる指を鉤にして動かせば、\nすずは可愛く反応し、蜜をとろとろに溢れさせてく。
1440 = "Uốn cong ngón tay đang cắm trong âm đạo như chiếc móc rồi cử động,\nSuzu phản ứng lại thật đáng yêu, mật ngọt tuôn trào nhầy nhụa."
# monologue
# JP: これではゼリーは、すぐに流されてしまうだろう。\nが、それでいい。今だけは――本命は別の場所なのだから。
1529 = "Thế này thì gel sẽ nhanh chóng bị cuốn trôi mất thôi.\nNhưng, thế cũng tốt. Chỉ lúc này thôi——vì mục tiêu chính nằm ở nơi khác mà."
# 【双鉄H】
# display as 雙鐵
# JP: （ひくついている――緩んだようだな）
1719 = "（Đang giật giật——có vẻ lỏng ra rồi nhỉ）"
# monologue
# JP: すずの小さな肛門は、\nまるで呼吸をしているようだ。
1553 = "Lỗ hậu môn nhỏ bé của Suzu,\nnhư thể đang hít thở vậy."
# monologue
# JP: おまんまんを撫でさする手は休めぬままに――
1397 = "Bàn tay vuốt ve cô bé vẫn không hề ngơi nghỉ——"
# monologue
# JP: （つぷんっ）
1703 = "（Phập）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃああああああんっ！？」
928 = "「Hya a a a a a n!?」"
# monologue
# JP: 予告もせずにアナルに指を押しこめば、\nすずは驚きと快感の混じったような声を出す。
1423 = "Đẩy ngón tay vào lỗ hậu môn không báo trước,\nSuzu thốt lên một tiếng xen lẫn giữa sự kinh ngạc và khoái cảm."
# 【双鉄H】
# display as 雙鐵
# JP: 「入り口さえを越えてしまえば――\nすんなり行くな」
906 = "「Chỉ cần vượt qua được cửa vào——\nlà trơn tru ngay ấy mà」"
# monologue
# JP: （くちゅっ――つぷっ――）
1676 = "（Nhóp nhép——phập——）"
# monologue
# JP: すずの肛内――アナルの奥は、\nぴっちりシンプルでまっすぐだ。
1554 = "Bên trong hậu môn của Suzu——tận sâu bên trong,\nchật hẹp, đơn giản và thẳng tắp."
# monologue
# JP: おまんまんとは大きく違う、まるでゴムのような感触を、\n指先で味わいながら、ゼリーを壁に摺りこんでいく。
1530 = "Vừa dùng đầu ngón tay tận hưởng cảm giác như cao su, khác hẳn với cô bé,\ntôi vừa thoa gel lên vách thịt."
# monologue
# JP: （にゅるっ――ぬっ――にゅっ――ぬうっ――）
1708 = "（Trượt——nhét——ngoáy——nhét——）"
# 【ハチロク】
# display as 鈴
# JP: 「やっ――おしり――わたくし――おしりっ――\n双鉄さまにっ――ほじほじって――して――いただいて」
915 = "「Á——mông——của em——mông emっ——\nđang được ngài Soutetsuっ——ngoáy——vào——rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「気持ちいいのか？」
1069 = "「Sung sướng không em?」"
# 【ハチロク】
# display as 鈴
# JP: 「やっ――恥ずかしい――ですっ――んっ――おしり、\nなの、に、わたくし――やあっ――あっ――こん、なに」
914 = "「Á——xấu hổ——lắm ạっ——ưm——rõ ràng, là,\nmông, thế mà, em——á a——a——lại thế, này」"
# monologue
# JP: 気持ちいいとは口に出さずに、\nけれどもそうだと認めてくれる。
1334 = "Dù không nói ra miệng là sung sướng,\nnhưng em đã ngầm thừa nhận điều đó."
# monologue
# JP: ならば、もっと奥までほじって塗ってやりたくなる。\nが、肛内はあまりに奥深く、中指でさえもとても足りない。
1382 = "Vậy thì, tôi lại càng muốn ngoáy sâu hơn nữa để bôi gel cho em.\nNhưng, bên trong hậu môn quá sâu, ngay cả ngón giữa cũng không thể nào với tới được."
# 【双鉄H】
# display as 雙鐵
# JP: 「そうか……このためのシリンジか」
890 = "「Ra là vậy......ống tiêm là dùng cho việc này sao」"
# monologue
# JP: とても細身だ。\nよく見れば先端の針もない。
1538 = "Rất thon gọn.\nNhìn kỹ thì cũng không có kim tiêm ở đầu."
# 【ハチロク】
# display as 鈴
# JP: 「あ……は、はい。それをっ、使えば――んっ――\nアナルの、中のっ――もっと、深くまで――あっ」
966 = "「A......vâ, vâng. Nếu dùng cái đóっ——ưm——\nbên trong, hậu mônっ——có thể tiến sâu, hơn nữa——a」"
# 【双鉄H】
# display as 雙鐵
# JP: 「しかし、僕のすずの可愛い体に、\n器具だなんだを、差し込みたいとは思えんな」
875 = "「Nhưng mà, anh không muốn cắm ba cái dụng cụ gì đó,\nvào cơ thể đáng yêu của Suzu của anh đâu」"
# 【ハチロク】
# display as 鈴
# JP: 「あ……双鉄様」
970 = "「A......ngài Soutetsu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「故にだ、すず。\nなにか、他の方法を――ああ」
1010 = "「Chính vì vậy, Suzu à.\nPhải tìm cách khác thôi——à」"
# monologue
# JP: （きゅぽっ）
1675 = "（Bụp）"
# monologue
# JP: 指を抜く。
1420 = "Tôi rút ngón tay ra."
# monologue
# JP: ここまでほぐれ濡らしていれば、\nもうそれだけで十分だろうという気もするが――
1445 = "Đã nới lỏng và làm ướt đến mức này rồi,\ntôi có cảm giác chỉ cần thế là đủ, nhưng——"
# 【双鉄H】
# display as 雙鐵
# JP: 「コンドームも、ならば潤滑を良くするためか？」
881 = "「Vậy bao cao su, cũng là để bôi trơn tốt hơn sao?」"
# 【ハチロク】
# display as 鈴
# JP: 「それだけではなく、雑菌の感染を防ぐためだそうです。\n排泄の穴は、やはり、排泄の穴ですので」
869 = "「Không chỉ vậy, nghe nói còn để phòng tránh nhiễm khuẩn nữa ạ.\nLỗ bài tiết, dù sao cũng là lỗ bài tiết mà」"
# 【双鉄H】
# display as 雙鐵
# JP: 「しかし、お前はめったに使わぬ部分なのだろう？」
876 = "「Nhưng mà, em hiếm khi dùng đến bộ phận đó cơ mà?」"
# 【ハチロク】
# display as 鈴
# JP: 「使わないから却って――ということもあるかもしれません。\nこればかりは、双鉄様のお体のためでございますので」
1073 = "「Biết đâu vì không dùng nên ngược lại——cũng nên ạ.\nChuyện này, hoàn toàn là vì cơ thể của ngài Soutetsu thôi ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「わかった」
1037 = "「Anh hiểu rồi」"
# monologue
# JP: ならば次には、肛内をきちんと洗浄し、\n邪魔物なしで、すずとアナルで繋がろう。
1270 = "Vậy thì lần tới, anh sẽ vệ sinh sạch sẽ bên trong hậu môn,\nđể có thể kết nối với Suzu qua đường hậu môn mà không cần vật cản nào."
# monologue
# JP: が、今は初回で、僕らふたりは初心者だ。\nすずが勉強したことに、素直に従う方がいい。
1280 = "Nhưng, bây giờ là lần đầu tiên, cả hai chúng ta đều là người mới.\nTốt nhất là cứ ngoan ngoãn làm theo những gì Suzu đã học."
# monologue
# JP: （にゅる～っ）
1718 = "（Trơn tuột～）"
# monologue
# JP: コンドームを着けたその上に、\nたっぷりとアナルゼリーを伸ばしてく。
1415 = "Đeo bao cao su vào, rồi trên đó,\ntôi thoa một lớp gel bôi trơn hậu môn thật dày."
# 【ハチロク】
# display as 鈴
# JP: 「あ……わたくしにさせてくださればよかったのに」
968 = "「A......giá như ngài để em làm cho thì tốt biết mấy」"
# monologue
# JP: 言いつつ、すずはよじよじとパンツを全部脱ぐ。\nたたんで枕の下にしまって――
1542 = "Miệng nói vậy, nhưng Suzu lúi húi cởi hẳn chiếc quần lót ra.\nGấp lại rồi cất xuống dưới gối——"
# 【双鉄H】
# display as 雙鐵
# JP: 「本当だな。着けてもらうのも良かったし、\n僕としても、すずのパンツを脱がせたかった」
1047 = "「Đúng thật. Để em đeo cho cũng tốt,\nmà bản thân anh, cũng muốn tự tay cởi quần lót của Suzu nữa」"
# 【ハチロク】
# display as 鈴
# JP: 「でしたら、双鉄様」
1097 = "「Vậy thì, ngài Soutetsu」"
# monologue
# JP: 熱っぽい声。
1339 = "Giọng nói nóng bỏng."
# monologue
# JP: すずの視線が、\nなだらかすぎる胸の上へと、僕の視線を誘導する。
1555 = "Ánh mắt của Suzu,\ndẫn dắt ánh nhìn của tôi hướng lên khuôn ngực quá đỗi bằng phẳng của em."
# 【ハチロク】
# display as 鈴
# JP: 「パジャマの上は、双鉄様にお願いできますか？」
1062 = "「Áo ngủ này, em có thể nhờ ngài Soutetsu cởi giúp được không ạ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「わかった。\nだが可愛いパジャマだ。全部脱がせてはもったいない」
1036 = "「Anh hiểu rồi.\nNhưng bộ đồ ngủ này đáng yêu lắm. Cởi hết ra thì phí quá」"
# monologue
# JP: ぷち、ぷち、と、前のボタンを外してく。
1399 = "Cạch, cạch, tôi tháo từng chiếc cúc áo phía trước ra."
# monologue
# JP: 徐々に胸元があらわになって、\nやがてちょこん、と、可愛い乳首が露出する。
1499 = "Vùng ngực dần lộ ra,\nvà rồi, những nụ hoa đáng yêu nhô lên e ấp."
# 【双鉄H】
# display as 雙鐵
# JP: （なるほど――やってもらうこと、させてもらうことも、\nセックスの喜びの一つなのだな）
1649 = "（Ra là vậy——được người khác làm cho, hay được làm cho người khác,\ncũng là một trong những niềm vui của việc làm tình nhỉ）"
# monologue
# JP: ならば、すずにもこの喜びを教えてあげたい。\n思いはすぐさま、とてもシンプルな言葉に変わる。
1411 = "Nếu vậy, tôi cũng muốn cho Suzu biết niềm vui này.\nSuy nghĩ đó ngay lập tức biến thành một câu nói rất đơn giản."
# 【双鉄H】
# display as 雙鐵
# JP: 「すず。教えてくれ。このゼリーまみれのちんちんを、\nすずの、どこに挿れればいいか」
1107 = "「Suzu. Nói cho anh biết đi. Cậu bé đẫm gel này,\nanh nên cắm vào đâu của Suzu đây」"
# 【ハチロク】
# display as 鈴
# JP: 「はい……かしこまりました、双鉄様」
1039 = "「Vâng......em hiểu rồi ạ, ngài Soutetsu」"
# monologue
# JP: （くぽおっ）
1712 = "（Bụp）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1128 = "「！」" 
# monologue
# JP: 真っ白な指が尻肉を割り、\nすぼまってた尻穴を広げてくれる。
1560 = "Những ngón tay trắng ngần vạch hai cánh mông ra,\nmở rộng lỗ hậu môn đang khép chặt."
# 【ハチロク】
# display as 鈴
# JP: 「すずは、アナルに――お尻の穴に、\n双鉄様のおちんちんを、挿れていただきたいのです」
1103 = "「Suzu muốn, ngài Soutetsu cắm cậu bé của ngài\nvào hậu môn——vào lỗ mông của em ạ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「わかった」
# 1037 = "「明白了」" 
# monologue
# JP: （くぷっ）
1700 = "（Phập）"
# 【ハチロク】
# display as 鈴
# JP: 「あひゅっ！！？」
971 = "「A hyu!!?」"
# monologue
# JP: 亀頭をまずは押し当てる――\nだけのつもりが、つるん、と抵抗なく進み――
1592 = "Ban đầu tôi chỉ định ấn nhẹ quy đầu vào——\nnhưng nó lại trơn tuột, tiến vào mà không gặp chút trở ngại nào——"
# 【双鉄H】
# display as 雙鐵
# JP: 「お――おっ――これはっ――」
677 = "「Ô——ồ——cái nàyっ——」"
# monologue
# JP: （ずるるるるるるるるっ）
1666 = "（Trượt trượt trượt trượt trượt）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃうっ！？　んっ――ひっ――\nずるって――おしり――あっ――これっ――深っ――」
935 = "「Hya ư!? Ưm——hi——\ntrơn tuột——mông em——a——cái nàyっ——sâu quá——」"
# monologue
# JP: （ぱちゅんっ！）
1689 = "（Phập!）"
# monologue
# JP: 腰と尻との当たる音。\n遅れて、ぎゅううっと、根本の部分に強い締め付け。
1504 = "Tiếng hông và mông va chạm vào nhau.\nMột nhịp trễ, phần gốc bị siết chặt mạnh mẽ."
# 【双鉄H】
# display as 雙鐵
# JP: 「すごい……ものだな――\n専門家の知恵と道具というものは――」
1015 = "「Tuyệt thật......đấy——\nTrí tuệ và dụng cụ của chuyên gia quả là——」"
# monologue
# JP: ほぐしていたのも、もちろんあろう。\nわずかとはいえ経験もあり、そして期待もあったろう。
1364 = "Tất nhiên cũng nhờ đã nới lỏng từ trước.\nDù ít ỏi nhưng cũng có kinh nghiệm, và chắc hẳn cũng có cả sự kỳ vọng nữa."
# monologue
# JP: しかしそれでもゼリーが無ければ、\n恐らく途中で、また締められて苦しんだろう。
1288 = "Nhưng dù vậy, nếu không có gel,\ncó lẽ giữa chừng em ấy lại siết chặt lại và đau đớn mất thôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「指を挿れるだけでもあれほど大変だったというのに、\nどうだ……このスムーズさは」
1034 = "「Chỉ cắm ngón tay vào thôi mà đã khó khăn đến thế,\nnhìn xem......sự trơn tru này là sao chứ」"
# monologue
# JP: （ぬろおおおおおおおおっ！！）
1685 = "（Trượt ra!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ゃっ！？　双鉄、様っ――やぁっ――\nおちんちん――抜いちゃ――やぁ、です――んうっ」
938 = "「Á!? Ngài, Soutetsuっ——á——\ncậu bé——rút ra——không chịu, đâu——ưm」"
# monologue
# JP: （ずぱんっ！）
1659 = "（Phập!）"
# 【ハチロク】
# display as 鈴
# JP: 「きゅふうううっっ！　あっ――ぬるって――\nこれっ――いいっ！！！」
931 = "「Kyu fư ư ư! A——trơn tuột——\ncái nàyっ——thích quá!!!」"
# monologue
# JP: 動く、動ける。\n窮屈すぎる入り口も、ぴっちりとした肛内も。
1313 = "Di chuyển, có thể di chuyển được.\nCả cửa vào chật hẹp, lẫn bên trong hậu môn khít rịt."
# 【双鉄H】
# display as 雙鐵
# JP: （膣とは……やはり違うものだな）
1672 = "（So với âm đạo......quả nhiên là khác biệt nhỉ）"
# monologue
# JP: 複雑さが無い。締まってはいるが、単調だ。\nだが、それだけに――
1510 = "Không có sự phức tạp. Tuy siết chặt, nhưng lại đơn điệu.\nNhưng, chính vì thế——"
# monologue
# JP: （ずろおおおおおおっ！）
1669 = "（Trượt!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひあっ――あっ――んっ――抜け――て、くっ――」
927 = "「Hi a——a——ưm——tuột——ra, mất——」"
# monologue
# JP: （ぱちゅんっ！！）
1688 = "（Phập!!）"
# 【ハチロク】
# display as 鈴
# JP: 「んっ！　くふううううっ」
1002 = "「Ưm! Kư fư ư ư」"
# monologue
# JP: 動かして、摩擦する。\nその単純な快感だけに、どこまでもどこまでも集中できる。
1432 = "Di chuyển, và ma sát.\nChỉ với khoái cảm đơn thuần đó, tôi có thể tập trung đến tận cùng, tận cùng."
# monologue
# JP: “尻穴を掘る”という慣用句があるとどこかで聞いたが、\nなるほど、これは――確かに、掘ってる感覚だ。
1426 = "Đâu đó tôi từng nghe câu thành ngữ \"đào lỗ hậu môn\",\nra là vậy, cái này——quả thực, mang lại cảm giác đang đào xới."
# monologue
# JP: （ずっ――ずりゅっ――ずぷっ――じゅぼっ）
1656 = "（Phập——trượt——phập——chu mút）"
# 【ハチロク】
# display as 鈴
# JP: 「あ、熱っ――いっ――おしりっ――おなか、もっ――\nんっ――あっつい、ですっ――双鉄――さまぁっ」
985 = "「A, nóng——quá——mông emっ——bụng, cũngっ——\nưm——nóng, quá ạっ——Ngài, Soutetsu——」"
# monologue
# JP: 動かすごとに高まっていく。
1520 = "Càng cử động, sự hưng phấn càng tăng lên."
# monologue
# JP: これほど潤いなめらかなのに、\n肉と肉とは、摩擦で熱を帯びていく。
1531 = "Dù ướt át và trơn tru đến vậy,\nnhưng da thịt cọ xát vào nhau vẫn sinh ra nhiệt."
# monologue
# JP: （ずるっ――ずぶっ！　にゅるっ――ばちゅんっ！！）
1667 = "（Trượt——phập! Trơn tuột——phập!!）"
# 【ハチロク】
# display as 鈴
# JP: 「いっ――あっ――知らない――こんなのっ――あっ――\n入ってる――のにっ――深、い――のにっ――んくっ」
1013 = "「A——a——em không biết——cảm giác nàyっ——a——\nđang cắm vào——vậy màっ——sâu, quá——vậy màっ——ưm」"
# 【双鉄H】
# display as 雙鐵
# JP: （そうだな……これほど深く挿れても――）
1702 = "（Đúng vậy nhỉ......dù cắm sâu đến mức này——）"
# monologue
# JP: 先端を迎えてくれる場所がない。\n子宮がちゅっとキスしてくれない。
1588 = "Vẫn không có nơi nào chào đón phần đỉnh.\nTử cung không trao cho tôi nụ hôn \"chụt\" nào cả."
# monologue
# JP: それは果てなく寂しいことで、\n繋がってるのに、もっと深くに繋がりたくなる。
1528 = "Điều đó mang lại cảm giác trống trải vô tận,\ndù đang kết nối, nhưng lại muốn kết nối sâu sắc hơn nữa."
# 【双鉄H】
# display as 雙鐵
# JP: 「すず――姿勢を変えるぞ？」
1026 = "「Suzu——thay đổi tư thế nhé?」"
# 【ハチロク】
# display as 鈴
# JP: 「あっ、は、はいっ――\n双鉄、さまの――お好き、にいっ！？――んふっ！」
983 = "「A, v, vângっ——\ntheo ý, ngài Soutetsuっ!?——ưm hưm!」"
# monologue
# JP: （ぐいいいっ！）
1674 = "（Nhấc bổng!）"
# 【ハチロク】
# display as 鈴
# JP: 「そんなっ――あっ――入った、ままっ――んふうっ！\nあっ――深っ――くはっあっ！」
1096 = "「Thế nàyっ——a——vẫn đang cắm, bên trongっ——ưm hưm!\nA——sâu quá——kư ha a!」"
# monologue
# JP: （ぐ――ぷんっ！）
1673 = "（Bụp!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！？」
1129 = "「!?」"
# monologue
# JP: すずを持ち上げ思いっきりに腰と腰とを密着すれば、\n最奥が無い――それが寂しいだけではないと思い知る。
1355 = "Nhấc bổng Suzu lên và áp sát hông vào nhau hết sức có thể,\ntôi nhận ra việc không có điểm tận cùng——không chỉ mang lại cảm giác trống trải."
# monologue
# JP: こんなに深く、こんなにぎっちり根本まで――\n完全に包み込まれる快感が、愛しい気持ちを高めてくれる。
1488 = "Sâu đến thế này, khít rịt đến tận gốc rễ thế này——\nKhoái cảm được bao bọc hoàn toàn càng làm tăng thêm tình yêu thương trong tôi."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄、さま……キス……キス……」
1124 = "「Ngài Soutetsu......hôn em......hôn em......」"
# monologue
# JP: 半開きの口。蕩けてる舌。
1316 = "Đôi môi hé mở. Chiếc lưỡi mềm nhũn."
# monologue
# JP: それに思いきり口付けて、\nぬらつく快感と唾液とを、なすりつけるように交換しあう。
1392 = "Tôi hôn em say đắm,\ntrao đổi khoái cảm ướt át và nước bọt như đang chà xát vào nhau."
# 【ハチロク】
# display as 鈴
# JP: 「ん……あっ――んちゅっ――ぷあっ――あっ！？\nおしりの、中で――双鉄、さま――もっと、おっきく」
991 = "「Ưm......a——ưm chụt——phù a——a!?\nBên trong, mông em——ngài Soutetsu——càng lúc, càng to ra」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だな――たっぷりと――味わってくれ」
1043 = "「Đúng vậy——hãy tận hưởng——cho thỏa thích đi」"
# monologue
# JP: （ぬろ――おお――おお――おお――んっ！）
1684 = "（Trượt——ra——ra——ra——rồi!）"
# 【ハチロク】
# display as 鈴
# JP: 「やっ――双鉄、さまっ――そんな――ゆっ――っ、\nゆっ、くり――され――たらっ――ひあっ！」
919 = "「Á——ngài Soutetsuっ——chậm——như vậyっ,\nchậm, chạp——như vậyっ——hi a!」"
# monologue
# JP: すずの体を持ち上げて、亀頭のくびれで、\n締まろうとする肛門をさらに広げてしまう。
1418 = "Nhấc bổng cơ thể Suzu lên, dùng phần khấc quy đầu,\ntôi càng làm mở rộng thêm lỗ hậu môn đang chực siết lại."
# monologue
# JP: 不安定極まる姿勢から、\n今度は一転！　一気に腰をっ！！
1450 = "Từ tư thế cực kỳ chông chênh,\nlần này tôi đột ngột đổi hướng! Dồn toàn lực vào hông!!"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃぐっ！？　あっ――えぐれっ――んっ――\nひゅあっ！！！」
933 = "「Hya gư!? A——khoét sâuっ——ưm——\nhyu a!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――あっ――」
989 = "「Hự——a——」"
# monologue
# JP: 深い、深い。底がない。
1353 = "Sâu quá, sâu quá. Không có điểm dừng."
# monologue
# JP: それが不安で、気持ちよくって、\nだからどこまでも繋がりたくてっ！
1402 = "Điều đó khiến tôi bất an, nhưng lại vô cùng sung sướng,\nvì vậy tôi muốn kết nối với em đến tận cùng!"
# 【双鉄H】
# display as 雙鐵
# JP: 「すずっ！　すずっ！！」
1104 = "「Suzu! Suzu!!」"
# 【ハチロク】
# display as 鈴
# JP: 「そ、双鉄さまぁっ――ふやっ――これっ――\nしゅごっ――くひいいいっんっ！」
1121 = "「N, ngài Soutetsu——phu ya——cái nàyっ——\ntuyệt quá——kư hi i i ưm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「もう少しだ――僕も――すず、\nもう少しだけ――我慢――して、くれっ――」
886 = "「Một chút nữa thôi——anh cũng——Suzu,\nchịu đựng——thêm một chút nữa——thôiっ——」"
# monologue
# JP: （ずるっ――ずぷんっ！　ずっ！　ぎゅぷっ！）
1668 = "（Trượt——phập! Phập! Bụp!）"
# 【ハチロク】
# display as 鈴
# JP: 「が、がまん――しまっ――ひゅっ――がまんっ――\nだって――双鉄様っ――いっしょ――くふんっ！！」
1020 = "「E, em sẽ chịu đựng——sẽ chịuっ——hyu——chịu đựngっ——\nVì——ngài Soutetsuっ——cùng nhau——kư fưn!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！？」
1003 = "「Hự!?」"
# monologue
# JP: （ギュウううううっ！）
1651 = "（Siết chặt!）"
# 【ハチロク】
# display as 鈴
# JP: 「らめっ！　まだ――っ――がまっっ――んっ――\nふっっぅぅぅぅぅぅぅうぅぅぅっっ！！！」
866 = "「Không được! Vẫn chưa——っ——chịu đựngっ——ưm——\nPhù!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああっ！」
974 = "「A a!」"
# monologue
# JP: 肛門がひときわキツくしまって、\nすずが達したと教えてくれる！
1496 = "Hậu môn siết chặt lại một cách khác thường,\nbáo cho tôi biết Suzu đã đạt đỉnh!"
# monologue
# JP: その単純で暴力的な強い刺激に、\n僕の精液のタガも外れるっ！
1324 = "Trước sự kích thích mạnh mẽ, đơn thuần và bạo liệt đó,\nđê điều tinh dịch của tôi cũng vỡ tung!"
# monologue
# JP: （びゅるっ！　びゅっ！　びゅうううっ！　びゅううっ）
1699 = "（Phụt! Phụt! Phụt! Phụt）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃっ――やっ――らめっ――がまん――あっ――\nでき――ないっ――んっ――らってっ――おひりぃっ」
912 = "「Hya——á——không được——chịu đựng——a——\nkhông thể——đượcっ——ưm——vìっ——mông emっ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「構わん――思い切りイってくれっ」
1058 = "「Không sao đâu——hãy lên đỉnh thỏa thích đi」"
# monologue
# JP: （ぐいっ！！）
1680 = "（Nhấc bổng!!）"
# 【ハチロク】
# display as 鈴
# JP: 「きゃふっ！？　おまんまん――おまめっ――\nあた、って――んんん～～～～～～～っ！！」
926 = "「Kya fư!? Cô bé——hột leっ——\nchạm, vào rồi——ưm ưm～～～～～～～!!」"
# monologue
# JP: 立て続け。\nすずが大きく体を震わし、くったりとなる。
1547 = "Liên tiếp.\nSuzu rùng mình mạnh mẽ, rồi lả đi."
# monologue
# JP: だが、まだだ。\nアナルセックスはしたけれど――
1285 = "Nhưng, vẫn chưa xong.\nTuy đã quan hệ qua đường hậu môn nhưng——"
# 【双鉄H】
# display as 雙鐵
# JP: 「すず、しっかり掴まっていろ？」
1106 = "「Suzu, bám chặt vào nhé?」"
# 【ハチロク】
# display as 鈴
# JP: 「はへ？　あ……は……あっ」
909 = "「Hả? A......vâng......a」"
# monologue
# JP: すずの体を右手と体全部でしっかりささえ、\nずるり、勃起を全部抜く。
1424 = "Dùng tay phải và toàn thân đỡ chặt cơ thể Suzu,\ntôi từ từ rút toàn bộ phần cương cứng ra."
# monologue
# JP: そして左手は、素早くコンドームを外し落として――
1365 = "Rồi bằng tay trái, tôi nhanh chóng tháo bao cao su vứt đi——"
# monologue
# JP: （ずぶううううううううううっっ！！！）
1662 = "（Phập!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ああっ！　おちんちんっ！　双鉄様の、\n双鉄様のおちんちんっ！　んうっ！！」
975 = "「A a! Cậu bé! Của ngài Soutetsu,\ncậu bé của ngài Soutetsu! Ưm ư!!」"
# monologue
# JP: （きゅんっ！　きゅきゅんっ！！）
1692 = "（Siết! Siết chặt!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぅあ――――これ、は――っ」
962 = "「Ư a――――cái này, là——っ」"
# monologue
# JP: （きゅんっ！　きゅうううっっ！！）
1691 = "（Siết! Siết chặt!!）"
# monologue
# JP: すずの膣穴全体が、大歓迎で抱きついてくる。
1557 = "Toàn bộ lỗ âm đạo của Suzu dang rộng vòng tay chào đón, ôm chầm lấy tôi."
# monologue
# JP: びろうどのヒダが乱れに乱れ、\n亀頭に張り付きもみしだいてくる。
1332 = "Những nếp gấp nhung lụa rối bời,\nbám chặt lấy quy đầu, nhào nặn điên cuồng."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、おまんまん――\nすずの、最高の――おまんまん、だ」
977 = "「A a, cô bé——\ncô bé tuyệt vời nhất——của Suzu」"
# monologue
# JP: アナルはアナルで気持ちよかった。
1495 = "Hậu môn cũng có cái sướng riêng của nó."
# monologue
# JP: すずの体の一番深くを思い切りほじり、\nその上で繋がっている征服感と達成感と快感があった。が。
1327 = "Việc ngoáy sâu hết mức vào tận cùng cơ thể Suzu,\nmang lại cảm giác chinh phục, thành tựu và khoái cảm khi được kết nối. Nhưng."
# monologue
# JP: （ずっ！　ずぼっ！　ズブっ！　ぶちゅんっ！）
1670 = "（Phập! Phập! Phập! Phập!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「やはり――この方が――\nすずと、ひとつになってる気がする」
1055 = "「Quả nhiên——thế này——\nmới có cảm giác hòa làm một, với Suzu」"
# 【ハチロク】
# display as 鈴
# JP: 「わたくしも――わたくしもです――双鉄さまぁ」
1022 = "「Em cũng vậy——em cũng vậy——Ngài Soutetsu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「すず」
# 1102 = "「鈴」" 
# 【ハチロク】
# display as 鈴
# JP: 「ちゅっ――むっ――れるっ――ちゅうっ――れろっ、\nちゅむっ――にゅりゅっ――ちゅううっ」
987 = "「Chụt——ưm——liếm——chụt——liếm láp,\nchu mút——trượt——chụt」"
# monologue
# JP: 熱烈なキス。\n口内を舌に愛されて、膣内では勃起を愛してもらう。
1391 = "Một nụ hôn cuồng nhiệt.\nKhoang miệng được lưỡi em âu yếm, còn bên trong âm đạo thì phần cương cứng của tôi đang được nâng niu."
# monologue
# JP: 汗と汗とで、体同士もキスしてる。\nアナルほど深く挿入できず、けれども深く、繋がっている。
1458 = "Mồ hôi quyện vào mồ hôi, hai cơ thể cũng đang hôn nhau.\nDù không thể cắm sâu như hậu môn, nhưng chúng tôi lại đang kết nối sâu sắc hơn bao giờ hết."
# monologue
# JP: （にゅるっ――きゅううっ――ざわわっ）
1705 = "（Trượt——siết chặt——râm ran）"
# monologue
# JP: 止まっていても膣が勝手にわなないて、\n僕の新鮮な精液を、こんなにも健気にもとめてくれる。
1361 = "Dù tôi có dừng lại, âm đạo vẫn tự động run rẩy,\nngoan ngoãn khao khát tinh dịch tươi mới của tôi đến nhường này."
# monologue
# JP: すずのアナルでセックス、ではなく、\nすずと一緒に――体と心の全部を使ってセックスしてる。
1527 = "Không phải là làm tình với hậu môn của Suzu,\nmà là cùng với Suzu——làm tình bằng trọn vẹn thể xác và tâm hồn."
# 【ハチロク】
# display as 鈴
# JP: 「はぷっ――あっ――双鉄様――れるっ――\n双鉄、さまあっ」
1009 = "「Ha pư——a——Ngài Soutetsu——liếm——\nNgài Soutetsu」"
# monologue
# JP: 耳たぶを軽く甘咬みされて、\n噛まれた部分をとろとろの舌で癒してもらう。
1485 = "Em khẽ cắn yêu vào dái tai tôi,\nrồi dùng chiếc lưỡi mềm mại xoa dịu vết cắn ấy."
# monologue
# JP: すずの髪の毛が揺れて僕へと触れてくる。\nそんなことさえ、ぞくぞくと性感を高めてくれる。
1561 = "Mái tóc Suzu đung đưa chạm vào người tôi.\nChỉ một chút vậy thôi cũng đủ khiến khoái cảm râm ran dâng trào."
# 【双鉄H】
# display as 雙鐵
# JP: 「す――ずっ」
1099 = "「Su——zu」"
# monologue
# JP: （こちゅんっ）
1677 = "（Cộc）"
# 【ハチロク】
# display as 鈴
# JP: 「あっ――きたっ――ちゅって――おまんこ――\n一番、奥っ――にっ――子宮、に、――ちゅって」
958 = "「A——đến rồi——hôn đi——cô bé——\ntận cùng, bên trongっ——tử cung, hãy,——hôn đi」"
# monologue
# JP: 押し当て、さらにぐいと押し込む。
1587 = "Tôi ép chặt, rồi nhấn sâu thêm chút nữa."
# 【ハチロク】
# display as 鈴
# JP: 「ひゃああ！？　あっ――押されて――ぐり、って」
929 = "「Hya a a!? A——bị nhấn vào——ngoáy, rồi」"
# monologue
# JP: （きゅん、きゅううっ）
1653 = "（Siết, siết chặt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――あっ――」
# 989 = "「嗯——啊——」" 
# monologue
# JP: そのポイントから逃すまいとして、\nすずの膣内が張り付きしなだれかかってくる。
1341 = "Như không muốn để tôi thoát khỏi điểm đó,\nbên trong âm đạo Suzu bám riết lấy tôi, nũng nịu quấn quýt."
# monologue
# JP: アナルはまだ、僕には何も語ってくれはしないけど、\nすずのおまんまんはこんなにも、雄弁に欲を伝えてくれる。
1298 = "Hậu môn vẫn chưa nói với tôi điều gì,\nnhưng cô bé của Suzu lại đang truyền đạt dục vọng một cách hùng hồn đến thế này."
# 【双鉄H】
# display as 雙鐵
# JP: 「すず――イこう。一緒に、イこう」
1101 = "「Suzu——ra nào. Cùng nhau, ra nhé」"
# 【ハチロク】
# display as 鈴
# JP: 「は、はい――双鉄、さまっ――あっ――この――\nままっ――、一緒、にっ――んっ」
1041 = "「Vâ, vâng——ngài Soutetsuっ——a——cứ thế——\nnàyっ——, cùng, nhauっ——ưm」"
# monologue
# JP: 締め付けながら、すずがぐりぐり腰を動かす。
1441 = "Vừa siết chặt, Suzu vừa ngoáy tít hông."
# 【ハチロク】
# display as 鈴
# JP: 「こんど、は――わたくし――んっ――\nびゅうびゅう、くる、まで――ちゃんと――がまんっ」
1082 = "「Lần này, thì——em——ưm——\ncho đến khi, ngài bắn ra——em sẽ——chịu đựngっ」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いい子だ」
1016 = "「Ngoan lắm」"
# monologue
# JP: （ずっ――ずるっ――）
1655 = "（Phập——trượt——）"
# 【ハチロク】
# display as 鈴
# JP: 「やっ――おちんちん――いっちゃ――やぁっ」
949 = "「Á——cậu bé——đừng ra——nhé」"
# monologue
# JP: （ぐいっ！）
1681 = "（Nhấn mạnh!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃふっ！？　あっ！　それっ――そこっ！」
934 = "「Hya fư!? A! Đó——chỗ đó!」"
# monologue
# JP: （ずぶっ――ずっ――ずるっ――ずぷっ――）
1661 = "（Phập——phập——trượt——phập——）"
# 【ハチロク】
# display as 鈴
# JP: 「ふあっ――あっ――あっ――ああっ――」
946 = "「Phù a——a——a——a a——」"
# monologue
# JP: 目はぼんやりと熱っぽくって、\n体全部がぽかぽかしてて汗だくで。
1343 = "Ánh mắt em mờ đi vì nóng,\ntoàn thân cũng nóng ran và đẫm mồ hôi."
# monologue
# JP: さっきもイったばかりのすずは、もうどう見ても限界だ。\nだけれど僕は反対に……もう少しだけ強い刺激が――
1306 = "Suzu vừa mới lên đỉnh ban nãy, nhìn kiểu gì cũng thấy em đã đến giới hạn rồi.\nNhưng tôi thì ngược lại...... nếu có thêm một chút kích thích mạnh hơn nữa thì——"
# 【双鉄H】
# display as 雙鐵
# JP: （ああ、そうだった）
1687 = "（A, đúng rồi）"
# monologue
# JP: 手にしていたと思い出す。\nふたつめの――すずの快感のスイッチを。
1413 = "Tôi nhớ ra thứ mình đang cầm trên tay.\nThứ thứ hai——công tắc khoái cảm của Suzu."
# monologue
# JP: （つぷんっ！！！！）
1663 = "（Phập!!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃうんっ！？　おひりっ！？」
936 = "「Á ưm!? Mông em!?」"
# monologue
# JP: （きゅううううううううっ！！）
1714 = "（Thít chặt!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
956 = "「Ư!」"
# monologue
# JP: 問答無用のキツい締め付けっ！
1449 = "Một lực thít chặt không khoan nhượng!"
# monologue
# JP: （みりりりいりっ！）
1683 = "（Ư ư ư!）"
# 【ハチロク】
# display as 鈴
# JP: 「んひいいいいいいいいっ！！？」
1000 = "「Ư iiii!!?」"
# monologue
# JP: そこを強引に、引き剥がすように腰を押し下げっ――
1400 = "Tôi mạnh bạo ấn hông xuống như muốn xé toạc nơi đó ra——"
# monologue
# JP: （ずばんっ！！！）
1658 = "（Phập!!!）"
# 【ハチロク】
# display as 鈴
# JP: 「かはっ！」
1070 = "「Á!」"
# monologue
# JP: （きゅうううううううんっ！）
1713 = "（Siết chặt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
979 = "「Hự!」"
# 【ハチロク】
# display as 鈴
# JP: 「～～～～～～～～っ！！！」
1131 = "「~~~~~~~~!!!」"
# monologue
# JP: 声を出さずに、真っ赤になって震えて震えて、\nすずがイってる。
1544 = "Không thốt nên lời, khuôn mặt đỏ bừng, toàn thân run rẩy không ngừng,\nSuzu đang lên đỉnh."
# monologue
# JP: （びゅっ！　びゅるっ！　どびゅっ！　びゅううっ！）
1697 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: わななきまくる子宮口へと亀頭を押し付け、\n精液全部を、その内側へと閉じ込める。
1394 = "Tôi ép chặt quy đầu vào cửa tử cung đang run rẩy liên hồi,\nnhốt toàn bộ tinh dịch vào sâu bên trong em."
# 【ハチロク】
# display as 鈴
# JP: 「あ……ふ……あっ……あつい……です……\n双鉄……さま、の……ふっ――あっ――せい……えき」
965 = "「A......phù......a......nóng quá......\ntinh dịch......của......ngài Soutetsu......phù——a——」"
# monologue
# JP: （びゅっ！　びゅるる――びゅう――）
1695 = "（Phụt! Phụt——phụt——）"
# 【双鉄H】
# display as 雙鐵
# JP: 「く――あっ――」
955 = "「Ư——a——」"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄……さまぁ……」
1122 = "「Ngài Soutetsu......」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
# 999 = "「嗯」" 
# 【ハチロク】
# display as 鈴
# JP: 「えへへっ……ちゅっ――ちゅうっ」
952 = "「Ehehe......chụt——chụt」"
# monologue
# JP: すずの甘えたキスを受け止め、\nそのままゆっくり、布団の上へと寝かせて下ろす。
1548 = "Đón nhận nụ hôn nũng nịu của Suzu,\ntôi cứ thế nhẹ nhàng đặt em nằm xuống nệm."
# 【双鉄H】
# display as 雙鐵
# JP: 「ふうっ――」
944 = "「Phù——」"
# monologue
# JP: 僕も、崩れる。\nすずの隣に寝転がる。
1385 = "Tôi cũng kiệt sức.\nNằm ườn ra bên cạnh Suzu."
# monologue
# JP: なにかが、軽くひじに触れ――
1475 = "Có thứ gì đó, chạm nhẹ vào khuỷu tay tôi——"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん？　ああ……シリンジか。\n結局、使わずじまいだったな」
1004 = "「Hửm? A......ống tiêm à.\nRốt cuộc lại chẳng dùng đến.」"
# 【ハチロク】
# display as 鈴
# JP: 「それなのですが、双鉄様」
1051 = "「Về chuyện đó thì, ngài Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「むっ！？」
957 = "「Hử!?」"
# monologue
# JP: ついさっきまで性感ににごり溶けてた瞳が、\n一転キラキラ輝いている。
1305 = "Đôi mắt vừa mới mờ đục đi vì khoái cảm,\ngiờ lại bỗng chốc sáng long lanh."
# 【ハチロク】
# display as 鈴
# JP: 「わたくしのお勉強にありました。\n男の方も、アナルで気持よくなれるものなのだと」
1028 = "「Em đã từng học qua rồi.\nĐàn ông cũng có thể cảm thấy sướng ở hậu môn đó ạ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん？　いや、それはそうだろう。\n実際いまだって、僕はすずのアナルでたっぷり」
1007 = "「Hửm? Không, điều đó là hiển nhiên rồi.\nThực tế thì ngay lúc này, tôi cũng đã rất sung sướng với hậu môn của Suzu.」"
# 【ハチロク】
# display as 鈴
# JP: 「そうではなく」
1024 = "「Ý em không phải vậy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうではなく？」
1094 = "「Không phải vậy?」"
# monologue
# JP: すずが、僕の手からシリンジを取る。
1545 = "Suzu lấy ống tiêm từ tay tôi."
# monologue
# JP: そうして指で筒を作って、\nその中にグイとシリンジを――っ！！？
1337 = "Rồi em cuộn ngón tay lại thành hình ống,\nvà đâm mạnh ống tiêm vào trong đó——!!?"
# 【双鉄H】
# display as 雙鐵
# JP: 「すず――いや、お前、まさか」
1100 = "「Suzu——không, em, lẽ nào.」"
# 【ハチロク】
# display as 鈴
# JP: 「ご安心ください。双鉄様のかわいいかわいいお尻の穴に、\nシリンジなどはいれませんよ？　もったいないですから」
1075 = "「Xin ngài cứ yên tâm. Lỗ hậu môn đáng yêu của ngài Soutetsu,\nlàm sao em nỡ nhét ống tiêm vào chứ? Tiếc lắm ạ.」"
# monologue
# JP: すずの言葉に、ホっと――できない。
1556 = "Nghe Suzu nói vậy, tôi thở phào——không nổi."
# monologue
# JP: シリンジを離したその指に、\nすずはたっぷり、アナルゼリーを塗りたくってる。
1543 = "Bỏ ống tiêm ra, Suzu bôi đẫm\ngel bôi trơn hậu môn lên ngón tay mình."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄様？　さ、一緒に探してみましょう？\n双鉄様のまだご存じ無い、新しい、気持ちいい場所」
1125 = "「Ngài Soutetsu? Nào, chúng ta cùng tìm thử nhé?\nNơi sung sướng mới mẻ mà ngài Soutetsu vẫn chưa biết tới.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……うむ。\nそれは、僕の言葉だものな」
973 = "「A......ừm.\nĐó là lời tôi đã nói mà.」"
# monologue
# JP: 僕も男だ。\n二言はない。
1383 = "Tôi cũng là đàn ông.\nNói lời phải giữ lấy lời."
# monologue
# JP: 自分の言ったことには無論、責任を取る。
1508 = "Đương nhiên tôi sẽ chịu trách nhiệm với những gì mình đã nói."
# 【ハチロク】
# display as 鈴
# JP: 「うふふ、そんなに固くならないでくださいな、双鉄様？\n怖いことなど、何一つございませんから」
940 = "「Ufufu, xin ngài đừng cứng đơ ra như vậy chứ, ngài Soutetsu?\nKhông có gì đáng sợ đâu ạ.」"
# monologue
# JP: すずが、優しく僕を抱きしめ、\n背中をそうっとさすってくれ――っ！！！？
1549 = "Suzu dịu dàng ôm lấy tôi,\nnhẹ nhàng vuốt ve lưng tôi——!!!?"
# monologue
# JP: （つぷんっ！）
1664 = "（Phập!）"
