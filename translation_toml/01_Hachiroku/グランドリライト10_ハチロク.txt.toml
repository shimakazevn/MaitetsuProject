[script]
# lines: 501 
# monologue
# JP: （カトン、トトン、\nタタン、タタン――）
2970 = "（Cọc cạch, cọc cạch,\nxình xịch, xình xịch——）"
# 【双鉄】
# display as 雙鐵
# JP: 「……そうか」
1226 = "「……Ra vậy」"
# monologue
# JP: 誰もいない。\nいつもの座席に、路子はいない。
2902 = "Không có ai cả.\nỞ chỗ ngồi quen thuộc, Michi không có ở đó."
# monologue
# JP: かわりに一枚、\nぽつんと、小さな――
2463 = "Thay vào đó là một tấm——\nnằm trơ trọi, nhỏ bé——"
# 【双鉄】
# display as 雙鐵
# JP: 「これは……ああ」
2105 = "「Đây là……à」"
# monologue
# JP: 今どきはあまり見かけない、\nコートの類が一切かからぬ、厚紙の。
2376 = "Một tấm bìa cứng dày dặn,\nhoàn toàn không được bọc nhựa, loại mà thời nay hiếm khi thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「父さんの――名刺だ」
2106 = "「Danh thiếp——của bố」"
# monologue
# JP: その裏に、グキグキとしたつたない文字が記されている。\n普段の路子は、丸くこどもらしい字を書くのだけれど。
2565 = "Mặt sau của nó, được ghi lại bằng những dòng chữ vụng về nguệch ngoạc.\nBình thường Michi viết chữ tròn trịa, trẻ con cơ mà."
# monologue
# JP: だから、わかる。\n路子が何で――何を使って、書いたのか。
2723 = "Thế nên, tôi hiểu.\nMichi đã viết bằng gì——bằng thứ gì."
# 【双鉄】
# display as 雙鐵
# JP: 「母さんの、オレンジ色の万年筆を借りたのか」
1926 = "「Đã mượn chiếc bút máy màu cam của mẹ sao」"
# monologue
# JP: とても小さく、おしゃれでかわいく、\n路子が――僕も――大人っぽいと憧れていた。
2931 = "Rất nhỏ, sành điệu và dễ thương,\nMichi——cả tôi nữa——đã từng ngưỡng mộ sự trưởng thành ấy."
# monologue
# JP: 『誰かに貸すと、それだけで書き味が変わっちゃうから』
1088 = "『Nếu cho ai đó mượn, chỉ vậy thôi cảm giác viết cũng sẽ thay đổi mất』"
# monologue
# JP: ――路子にも僕にもとことん甘い母さんが、\n万年筆を借りるのだけは、決して許してくれなかった。
1076 = "——Người mẹ luôn nuông chiều Michi và tôi hết mực,\nnhưng riêng việc mượn bút máy, mẹ tuyệt đối không bao giờ cho phép."
# 【双鉄】
# display as 雙鐵
# JP: 「……そう、か」
# 1226 = "「……這樣啊」" 
# monologue
# JP: そうした全てが、消えるのだなと。\n――旅立つのだなと、さみしく思う。
2689 = "Tất cả những điều đó, sẽ biến mất sao.\n——Sẽ khởi hành sao, nghĩ vậy tôi thấy thật cô đơn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も借りてみたかったなぁ、母さんの万年筆を」
1823 = "「Mình cũng muốn mượn thử một lần, chiếc bút máy của mẹ」"
# monologue
# JP: けれども、それは果たせぬことだ。\nどうしようもなく、さみしいけれど。
2461 = "Thế nhưng, điều đó không thể nào thực hiện được.\nDù có cô đơn, không biết làm sao được."
# monologue
# JP: 路子とももう、きっと会えない。\nさよならくらい、言えればよかった気もするけれど。
2708 = "Chắc chắn cũng không thể gặp lại Michi nữa.\nCứ ngỡ nếu có thể nói lời tạm biệt thì tốt biết mấy."
# 【双鉄】
# display as 雙鐵
# JP: 「いや……\nさよならだけは、できるのか」
1522 = "「Không……\nChỉ lời tạm biệt thôi, thì có thể làm được sao」"
# monologue
# JP: だって路子は、予約をいれてくれたから。\n父さんにもらった名刺の裏に、母さんに借りた万年筆で。
2582 = "Bởi vì Michi, đã đặt trước cho tôi mà.\nTrên mặt sau tấm danh thiếp nhận từ bố, bằng chiếc bút máy mượn của mẹ."
# monologue
# JP: 『そーちゃんのれっ車に乗りにいくね！』\n――そう、書き残してくれたから。
1095 = "『Em sẽ đi ngồi tàu của Sou-chan nhé!』\n——Vì em ấy, đã để lại dòng chữ như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「今度こそ。\nもうすぐ、なんだな」
2109 = "「Lần này nhất định.\nSắp đến lúc, rồi nhỉ」"
# monologue
# JP: 次の春。ナインスターズは走り始める。\nそれはとても嬉しいことで、僕らが目指し続けたことだ。
2380 = "Mùa xuân năm sau. Nine Stars sẽ bắt đầu chạy.\nĐó là một điều vô cùng đáng mừng, là điều mà chúng tôi đã luôn hướng tới."
# monologue
# JP: それでもやはり……早すぎるように感じてしまう。\n『やっとその日が』とは、まだ、思えない。
2549 = "Dù vậy quả nhiên……tôi vẫn cảm thấy quá sớm.\nVẫn chưa thể nghĩ rằng, 『Cuối cùng ngày đó cũng đến』."
# 【双鉄】
# display as 雙鐵
# JP: 「予約、忘れないようにしないとな。\nこの名刺を持ち帰れれば、それが一番いいのだけれど」
2167 = "「Phải cố gắng để không quên lịch đặt trước mới được.\nNếu có thể mang tấm danh thiếp này về thì tốt nhất, nhưng mà」"
# monologue
# JP: もちろん、それもまた果たせぬことだ。\n何故って、これは夢だから。
2914 = "Tất nhiên, điều đó cũng không thể nào thực hiện được.\nTại sao ư, vì đây là một giấc mơ mà."
# monologue
# JP: 父さんの名刺、母さんの思い出、路子の筆跡。\nそれがどれほど懐かしくとも――
2802 = "Danh thiếp của bố, kỷ niệm về mẹ, nét chữ của Michi.\nDù cho có hoài niệm đến mức nào đi chăng nữa——"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、違うな。覚えてさえいれば……\n僕は、何も持ち帰れずとも、かまわないのか」
1551 = "「Không, không phải. Chỉ cần còn nhớ……\nThì mình, không mang về được thứ gì cũng không sao ư」"
# monologue
# JP: 大事なものならもう既に、\nたくさんたくさん受け取っている。
2679 = "Nếu là những thứ quan trọng thì tôi đã nhận được rất nhiều, rất nhiều rồi."
# monologue
# JP: 父さんが、母さんが、路子が、\n共に過ごせた時間の全てで、僕に多くを与えてくれた。
2799 = "Bố, mẹ, Michi,\ntrong toàn bộ thời gian chúng tôi trải qua cùng nhau, đã trao cho tôi rất nhiều điều."
# 【双鉄】
# display as 雙鐵
# JP: 「だから――路子に。父さんに、母さんに。\n持ち帰ってもらえるように、しなくては」
1882 = "「Thế nên——phải làm sao để Michi. Để bố, để mẹ.\nCó thể mang về được」"
# monologue
# JP: 遠い世界へおもむく前の、最高の旅の思い出を。\nそうして、僕を遺しても、大丈夫だという安心を。
2585 = "Kỷ niệm về một chuyến đi tuyệt vời nhất, trước khi đi đến một thế giới xa xôi.\nVà, sự an tâm rằng dù có để lại tôi, cũng không sao cả."
# 【双鉄】
# display as 雙鐵
# JP: 「……やるんだ。必ず。それが、僕にできるただひとつの\n――最後の、恩返しになるんだから」
1197 = "「……Phải làm thôi. Nhất định. Vì đó là điều duy nhất mình có thể làm\n——là sự báo ân cuối cùng」"
# monologue
# JP: （ふわっ）
2971 = "（Nhẹ nhàng）"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
1687 = "「A——」"
# monologue
# JP: 手だ。僕をなでてくれる手。\nとても優しく、あたたかな手。
2771 = "Là một bàn tay. Bàn tay đang vuốt ve tôi.\nMột bàn tay rất đỗi dịu dàng, ấm áp."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ……僕は、大丈夫」
2006 = "「Không sao đâu……anh, không sao」"
# monologue
# JP: とても、とても、やさしい手ではあるけれど、\n家族の手ではあるけれど――
2954 = "Dù là một bàn tay rất đỗi, rất đỗi dịu dàng,\ndù là bàn tay của người nhà——"
# 【ハチロク】
# display as ？？？
# JP: 「あっ――」
# 1687 = "「啊——」" 
# 【双鉄】
# display as 雙鐵
# JP: 「いや――いいんだ」
1519 = "「Không——không sao đâu」"
# monologue
# JP: 喉が勝手に、か細い声を零してしまったせいだろう。\n僕の髪から離れてしまった手に触れたくて、手を伸ばす。
2551 = "Chắc là do cổ họng tự ý thốt ra một giọng nói yếu ớt.\nTôi vươn tay ra, muốn chạm vào bàn tay vừa rời khỏi mái tóc tôi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄、様」
2157 = "「Ngài Soutetsu」"
# monologue
# JP: その手を、ハチロクが包んでくれる。\nただそれだけで、さみしい気持ちが溶けていく。
2496 = "Bàn tay ấy, được Hachiroku bao bọc lấy.\nChỉ vậy thôi, cảm giác cô đơn đã tan biến."
# 【双鉄】
# display as 雙鐵
# JP: 「おはよう、ハチロク」
1919 = "「Chào buổi sáng, Hachiroku」"
# monologue
# JP: ハチロクはもう制服姿――\nああ、そうだ。今日は大事な約束のある日であったか。
2487 = "Hachiroku đã mặc đồng phục——\nÀ, đúng rồi. Hôm nay là ngày có một cuộc hẹn quan trọng mà."
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。おかげで、寝坊せずにすんだ」
2075 = "「Cảm ơn em. Nhờ có em mà anh không bị ngủ quên」"
# 【ハチロク】
# display as 八六
# JP: 「いえ、双鉄様。\nまだお時間は大丈夫です」
1685 = "「Không đâu, ngài Soutetsu.\nThời gian vẫn còn kịp ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1730 = "「Hửm?」"
# monologue
# JP: ハチロクは、なぜだか少し、\n申し訳なさそうな顔をしている。
2413 = "Hachiroku, không hiểu sao lại mang vẻ mặt có chút áy náy."
# 【ハチロク】
# display as 八六
# JP: 「おやすみのお邪魔をするつもりはなかったのです。\nただ――双鉄様が……」
1863 = "「Em không định quấy rầy giấc ngủ của ngài đâu ạ.\nChỉ là——ngài Soutetsu……」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕が、どうした？」
1858 = "「Anh, làm sao cơ?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様が――泣いてしまわれるのではないかと、\nそう、感じてしまって」
1841 = "「Em cứ có cảm giác——\nngài Soutetsu đang khóc」"
# 【双鉄】
# display as 雙鐵
# JP: 「……確かに、泣いていたかもしれんな。\n嬉しい夢を、見ていたから」
1216 = "「……Đúng là, có thể anh đã khóc.\nVì anh đã mơ một giấc mơ rất vui」"
# 【ハチロク】
# display as 八六
# JP: 「あ」
1691 = "「A」"
# monologue
# JP: ほっとした顔。\nほっとした声。
2607 = "Khuôn mặt nhẹ nhõm.\nGiọng nói nhẹ nhõm."
# 【ハチロク】
# display as 八六
# JP: 「左様でしたか。悲しい夢では、なかったのですね」
1977 = "「Vậy sao ạ. Không phải là một giấc mơ buồn là tốt rồi ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「悲しくはなかったな。嬉しくて、少しさみしくて。\nけれどもやっぱり――うん。とても、嬉しい夢だった」
1821 = "「Không buồn đâu. Rất vui, và có chút cô đơn.\nNhưng mà quả nhiên——ừm. Là một giấc mơ rất, rất vui」"
# monologue
# JP: ……今なら言えると、不意に感じる。\n凪に学んで、ハチロクと向き合おうとして――
1112 = "……Tôi chợt cảm thấy, bây giờ thì có thể nói được rồi.\nHọc theo Nagi, cố gắng đối mặt với Hachiroku——"
# monologue
# JP: けれどもずっと、意識をすればするほどに、\n喉から先に、どうしても送り出せなかったひとことを。
2454 = "Thế nhưng suốt từ đó đến giờ, càng ý thức thì lại càng\nkhông thể nào thốt ra khỏi cổ họng."
# 【双鉄】
# display as 雙鐵
# JP: 「今な、ハチロク。僕は、失くしてしまった家族の――\n両親と、妹の夢を、見ていたのだ」
1608 = "「Bây giờ nhé, Hachiroku. Anh vừa mơ thấy gia đình đã mất của mình——\nmơ thấy bố mẹ và em gái」"
# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1691 = "「啊」" 
# monologue
# JP: 反射でだろう。\nほんの一瞬、ハチロクはすくんで固くなる。
2518 = "Có lẽ là phản xạ.\nChỉ trong một khoảnh khắc ngắn ngủi, Hachiroku co rúm lại và cứng đờ người."
# monologue
# JP: けれど、逃げない。\nハチロクもまた――僕と向き合おうとしてくれている。
2423 = "Nhưng, em ấy không trốn tránh.\nHachiroku cũng——đang cố gắng đối mặt với tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「幼いころの鉄道事故で、\n僕が、失くしてしまった家族の」
1867 = "「Trong một vụ tai nạn đường sắt hồi nhỏ,\ngia đình mà anh đã đánh mất」"
# 【ハチロク】
# display as 八六
# JP: 「は……い」
1702 = "「Vâ……ng」"
# monologue
# JP: 声が震える。\n瞳がゆれる。
2605 = "Giọng nói run rẩy.\nĐôi mắt dao động."
# monologue
# JP: ハチロクもまた、ずっと苦しんでいたのだろう。\n話したくって、謝りたくて。けれど恐れて、出来なくて。
2657 = "Chắc hẳn Hachiroku cũng luôn phải chịu đựng đau khổ.\nMuốn nói ra, muốn xin lỗi. Nhưng lại sợ hãi, không thể làm được."
# 【双鉄】
# display as 雙鐵
# JP: 「それはハチロク」
2137 = "「Đó là, Hachiroku」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様。\nそれは――わたくしの起こした事故です」
1974 = "「Vâng, ngài Soutetsu.\nĐó là——vụ tai nạn do em gây ra」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1715 = "「Aa」"
# monologue
# JP: ナインスターズを走らせるため、鉄路の安全を守るため。\nハチロクは、僕は。日々姫たちとともに多くを学んだ。
2786 = "Để Nine Stars lăn bánh, để bảo vệ sự an toàn của đường sắt.\nHachiroku, và tôi. Cùng với Hibiki và những người khác đã học hỏi được rất nhiều điều."
# monologue
# JP: 『冨士川橋梁流失に伴う8620脱線事故』\n――その記録にも、記憶にも、何度も触れた。
1091 = "『Sự cố trật bánh tàu 8620 do cầu sắt Fujikawa bị cuốn trôi』\n——Cả ghi chép và ký ức đó, tôi đã chạm đến không biết bao nhiêu lần."
# 【双鉄】
# display as 雙鐵
# JP: 「やはり、だよな」
1990 = "「Quả nhiên, là vậy nhỉ」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしも！　わたくしもずっと――\nお伝えしたくて、謝りたくて。ですが、けれどもっ」
1828 = "「Em cũng vậy! Em cũng luôn——\nmuốn nói với ngài, muốn xin lỗi ngài. Thế nhưng, thế nhưng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかるよ。ハチロク。\n僕も、同じ恐れを、きっと、抱え続けていたから」
1862 = "「Anh hiểu mà. Hachiroku.\nVì anh cũng, chắc chắn, luôn mang trong mình nỗi sợ hãi y hệt như vậy」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1687 = "「啊——」" 
# monologue
# JP: 手を繋いだまま、体を起こす。\nハチロクは僕を助けてくれる。
2674 = "Vẫn nắm tay nhau, tôi ngồi dậy.\nHachiroku giúp tôi một tay."
# monologue
# JP: だからそのまま、そうっと優しく抱きしめる。\n気持ちを伝えられるよう。けれど決して閉じ込めぬよう。
2754 = "Thế nên cứ vậy, tôi nhẹ nhàng ôm lấy em ấy.\nĐể truyền đạt cảm xúc. Nhưng tuyệt đối không giam cầm."
# 【双鉄】
# display as 雙鐵
# JP: 「話すことで、蒸し返すことで、傷つけることが怖かった。\nお前自身を。そして同時に、お前と築いてきたものを」
1843 = "「Anh sợ rằng việc nói ra, việc khơi lại chuyện cũ, sẽ làm tổn thương.\nChính bản thân em. Và đồng thời, cả những gì anh đã xây dựng cùng em」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1715 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「お互いに、もうわかっていると理解していた。\nならばこのまま――それでもいいと、感じてもいた」
1870 = "「Anh cứ đinh ninh rằng cả hai đều đã hiểu rõ rồi.\nNếu vậy cứ thế này——như vậy cũng tốt, anh đã cảm thấy như thế」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしも……まるきり同じ思いでいました。\n双鉄様の優しさに――甘えて、しまっておりました」
1826 = "「Em cũng……có suy nghĩ hoàn toàn giống ngài.\nEm đã——ỷ lại vào sự dịu dàng của ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。僕もお前に甘えきってた。\nけれど――やはり、きちんと向き合うべきだと思った」
1950 = "「Nhỉ. Anh cũng đã hoàn toàn ỷ lại vào em.\nThế nhưng——anh nghĩ quả nhiên chúng ta nên đối mặt một cách nghiêm túc」"
# monologue
# JP: 抱きしめている体を離す。\nハチロクの目をじっと見る。
2715 = "Buông cơ thể đang ôm trong vòng tay ra.\nNhìn thẳng vào mắt Hachiroku."
# monologue
# JP: その目は濡れて、震えてる。\n僕と同様――今も、恐れにとらわれている。
2937 = "Đôi mắt ấy ướt đẫm, và đang run rẩy.\nGiống như tôi——bây giờ vẫn đang bị nỗi sợ hãi bủa vây."
# 【双鉄】
# display as 雙鐵
# JP: 「お前は、『わたくしの起こした事故』といったが」
1591 = "「Em đã nói là, 『vụ tai nạn do em gây ra』 nhưng mà」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
1694 = "「っ!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――それは、事実誤認であるように思う」
2052 = "「——Anh nghĩ, đó là một sự nhìn nhận sai lầm về sự thật」"
# monologue
# JP: ハチロクの目が大きくゆれる。
2508 = "Đôi mắt Hachiroku dao động dữ dội."
# monologue
# JP: わなわな震える唇が、何かをいいかけ、\nけれどもそのまま、閉じてしまう。
2601 = "Đôi môi run rẩy định nói điều gì đó,\nnhưng rồi cứ thế, khép lại."
# 【双鉄】
# display as 雙鐵
# JP: 「事故を起こしたのは台風だ。ハチロク、おまえは――\n事故が連鎖してしまうことを、防いでくれた」
1802 = "「Gây ra tai nạn là do cơn bão. Hachiroku, em đã——\nngăn chặn chuỗi tai nạn liên hoàn xảy ra」"
# monologue
# JP: 全ての記録がそう告げている。\n僕の記憶も、記録の正しさを裏付けている。
2726 = "Tất cả các ghi chép đều nói như vậy.\nKý ức của tôi, cũng củng cố cho sự chính xác của những ghi chép đó."
# 【双鉄】
# display as 雙鐵
# JP: 「あの雨の中の加速を僕は、記憶している。\n運転をするようになり、加速の意味も、理解した」
2123 = "「Anh vẫn còn nhớ việc tăng tốc trong cơn mưa ngày hôm đó.\nKể từ khi bắt đầu lái tàu, anh cũng đã hiểu được ý nghĩa của việc tăng tốc」"
# 【ハチロク】
# display as 八六
# JP: 「は、い――。\nですから、わたくし、は――」
1960 = "「Vâ, ng——.\nThế nên, em, là——」"
# monologue
# JP: ガタガタ、ハチロクが震え始める。
2521 = "Lập cập, Hachiroku bắt đầu run rẩy."
# monologue
# JP: そっと、その肩に手を添える。
2714 = "Khẽ khàng, tôi đặt tay lên vai em ấy."
# monologue
# JP: 決して捕まえることなしに、\nけれども熱を、そして信頼を伝えたいから。
2703 = "Tuyệt đối không phải là kìm kẹp,\nmà vì tôi muốn truyền hơi ấm, và cả sự tin tưởng."
# 【双鉄】
# display as 雙鐵
# JP: 「橋梁が直近で崩壊したのだ。ならば転落を防ぐには、\nそこに至るまでにレールを外れる――脱線する他にない」
1545 = "「Cầu sắt ở ngay phía trước đã sụp đổ. Nếu vậy để tránh rơi xuống,\nthì cho đến lúc đó phải trượt khỏi đường ray——không còn cách nào khác ngoài việc trật bánh」"
# 【ハチロク】
# display as 八六
# JP: 「っ――」
1188 = "「っ——」"
# 【双鉄】
# display as 雙鐵
# JP: 「その選択は、正しかったのだ。死者三名も――\n本当であれば、出ずに済んだかもしれなかった」
2117 = "「Lựa chọn đó, là chính xác. Ba người thiệt mạng——\nĐúng ra, có lẽ đã không ai phải chết」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！？」
1676 = "「っ!!?」"
# monologue
# JP: 言えた。ようやく。\nハチロクが傷ついているから。怯えているから。
2702 = "Cuối cùng cũng có thể nói ra.\nVì Hachiroku đang bị tổn thương. Vì em ấy đang sợ hãi."
# monologue
# JP: それを解いてやりたくて――\n自分の鎖を、ようやく、僕は断ち切れた。
2787 = "Vì muốn cởi trói cho điều đó——\nCuối cùng, tôi đã có thể cắt đứt xiềng xích của chính mình."
# 【双鉄】
# display as 雙鐵
# JP: 「台風で、\x%l客車;#00ffc040;客車%l;#;が大きく揺れて、妹がひどく怯えていて。\n僕も怯えて――ゆえに、パニックを起こしてしまった」
1151 = "「Do bão, \\x%l客車;#00ffc040;toa hành khách%l;#; rung lắc dữ dội, và em gái anh vô cùng sợ hãi.\nAnh cũng sợ hãi——vì thế, anh đã hoảng loạn」"
# monologue
# JP: 思い出せる。\nあの日の全てを、まるで手触りまで感じられるほどに。
2713 = "Tôi có thể nhớ lại.\nTất cả mọi thứ của ngày hôm đó, chân thực đến mức như có thể chạm vào."
# monologue
# JP: ああ――本当に。\n“向きあうこと”とは、“自分自身と向きあう”ことだ。
2767 = "A——quả thật vậy.\n\"Đối mặt\" chính là \"đối mặt với chính bản thân mình\"."
# 【双鉄】
# display as 雙鐵
# JP: 「妹を連れ、僕は列車前方を目指した――\n機関車がもしも見えたら、安心できると考えて」
1849 = "「Dẫn theo em gái, anh hướng về phía trước đoàn tàu——\nAnh đã nghĩ nếu có thể nhìn thấy đầu máy, thì sẽ an tâm hơn」"
# 【ハチロク】
# display as 八六
# JP: 「……」
# 1188 = "「……」" 
# monologue
# JP: ハチロクが、ひどく沈鬱な顔をする。\n――今なら、僕も理解している。
2522 = "Hachiroku mang một khuôn mặt vô cùng u sầu.\n——Bây giờ, tôi cũng đã hiểu."
# monologue
# JP: あの\x%l客車;#00ffc040;客車%l;#;には恐らくは、前方を見渡せる窓はなかったし、\nあったとしても、そこから見えるのは\x%l炭水車;#00ffc040;炭水車%l;#;だけだ。
2935 = "Ở \\x%l客車;#00ffc040;toa hành khách%l;#; đó có lẽ không có cửa sổ để nhìn bao quát về phía trước,\nmà giả sử có đi chăng nữa, thì từ đó cũng chỉ có thể nhìn thấy \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#; mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、はじめから間違えていた。\n間違えていた、その上に――」
1854 = "「Anh, đã sai ngay từ đầu rồi.\nĐã sai rồi, thế mà——」"
# monologue
# JP: ……記憶を、ずっと、塗り込めていた。\n都合のいいよう、自分の過去さえ、歪めてた。
1126 = "……Ký ức, đã luôn bị tôi chôn vùi.\nThậm chí bóp méo cả quá khứ của chính mình, sao cho thuận tiện."
# monologue
# JP: ――あのとき僕らを止めたのは、\n父さんと母さんだけじゃなかった。
1078 = "——Lúc đó những người đã cản chúng tôi lại,\nkhông chỉ có bố và mẹ."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l車販;#00ffc040;車販%l;#;のおねえさんも、\x%l車掌;#00ffc040;車掌%l;#;さんも、僕らを止めた。\n席に戻って、そのまま座っているように、と」
1610 = "「Cả chị \\x%l車販;#00ffc040;nhân viên bán hàng%l;#;, cả \\x%l車掌;#00ffc040;trưởng tàu%l;#;, cũng đã cản chúng tôi lại.\nBảo chúng tôi hãy quay lại chỗ ngồi, và cứ ngồi yên ở đó」"
# monologue
# JP: ――その声を、その手を僕はすりぬけた。\n『大丈夫です、すみません』と。『おまかせします』と。
2853 = "——Tôi đã gạt bỏ giọng nói đó, bàn tay đó.\nBằng câu nói 『Không sao đâu ạ, xin lỗi』. Bằng câu nói 『Trăm sự nhờ anh/chị』."
# monologue
# JP: 父さんと\x%l車掌;#00ffc040;車掌%l;#;さんとのやりとりも、\n僕には、はっきり聞こえていた。
2800 = "Cuộc nói chuyện giữa bố và \\x%l車掌;#00ffc040;trưởng tàu%l;#;,\ntôi cũng đã nghe thấy rất rõ."
# 【双鉄】
# display as 雙鐵
# JP: 「そう言われたから、困らせていると自覚して。\n僕は――戻ったらきっと怒られると、さらに恐れた」
2056 = "「Vì bị nói như vậy, nên anh ý thức được là mình đang làm phiền.\nAnh——càng sợ hãi hơn khi nghĩ rằng nếu quay lại chắc chắn sẽ bị mắng」"
# monologue
# JP: だから、逃げた。\n路子の恐怖を言い訳にして。
2725 = "Thế nên, anh đã trốn chạy.\nLấy nỗi sợ hãi của Michi làm cái cớ."
# monologue
# JP: 僕はこどもで、怯えているのに背伸びして――\nその結果、どうしようもなく愚かな行動をとってしまった。
2719 = "Anh là một đứa trẻ, dù sợ hãi nhưng vẫn cố tỏ ra người lớn——\nKết quả là, anh đã hành động một cách vô cùng ngu ngốc."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l車掌;#00ffc040;車掌%l;#;の指示に従わなかった。逆らった。\n父さんと母さんと路子を巻き込んだのは、だから」
1952 = "「Đã không tuân theo chỉ thị của \\x%l車掌;#00ffc040;trưởng tàu%l;#;. Đã chống đối.\nViệc cuốn cả bố, mẹ và Michi vào, là vì thế」"
# 【ハチロク】
# display as 八六
# JP: 「――いいえ、違います。双鉄様」
1155 = "「——Không, không phải đâu ạ. Ngài Soutetsu」"
# monologue
# JP: ハチロクの声は泣いている。\nけれども、涙はこぼさずにいる。
2512 = "Giọng nói của Hachiroku đang khóc.\nThế nhưng, em ấy không để nước mắt rơi."
# monologue
# JP: 泣いてしまえば、僕を苦しめてしまうだろうと――\nきっと、そう思ってこらえてくれている。
2613 = "Nếu khóc, sẽ làm tôi đau khổ——\nChắc chắn, em ấy đã nghĩ như vậy và kìm nén vì tôi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様の行動がどのようなものであったとしても。\nあれはやはり、わたくしが原因となった事故なのです」
1540 = "「Cho dù hành động của ngài Soutetsu có như thế nào đi chăng nữa.\nĐó quả thực vẫn là vụ tai nạn do em là nguyên nhân gây ra」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは違」
2121 = "「Điều đó không đú」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ！　双鉄様。わたくしは――わたくしだけは、\nあの事故を、回避することができたのです」
1547 = "「Không ạ! Ngài Soutetsu. Em——chỉ có em,\nlà có thể tránh được vụ tai nạn đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1676 = "「哎！！？」" 
# 【ハチロク】
# display as 八六
# JP: 「9642\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、必死で送ってくれたあの報告を。\n判断に必要な全てがきちんとこめられていた\x%l共感;#00ffc040;共感%l;#;を――」
2176 = "「Bản báo cáo mà \\x%lレイルロオド;#00ffc040;Railord%l;#; 9642 đã liều mạng gửi đến đó.\n\\x%l共感;#00ffc040;Cộng cảm%l;#; chứa đựng trọn vẹn tất cả những gì cần thiết để đưa ra phán đoán——」"
# 【双鉄】
# display as 雙鐵
# JP: 「――」
2175 = "「——」"
# 【ハチロク】
# display as 八六
# JP: 「もしも、わたくしが瞬時に諒解していたのなら！\n復唱など求めず、非常制動を即座にかけていたのなら！」
1762 = "「Giả sử, nếu em hiểu ra ngay lập tức!\nNếu em không yêu cầu nhắc lại, mà lập tức hãm phanh khẩn cấp!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクっ！」
1604 = "「Hachiroku!」"
# monologue
# JP: 抱きしめる。\nハチロクの悲鳴を聞きたくなくて。
2704 = "Ôm chầm lấy.\nTôi không muốn nghe tiếng hét bi thương của Hachiroku."
# monologue
# JP: ハチロクは僕に抵抗もせず――\n力を一気に失くした声で……それでも、続ける。
2497 = "Hachiroku không hề chống cự tôi——\nBằng giọng nói đột ngột mất đi sức lực……nhưng em ấy vẫn tiếp tục."
# 【ハチロク】
# display as 八六
# JP: 「何度も、何度も、何度も、何度も、何度も、何度も、\n何度も、何度も――再計算を、行いました」
1820 = "「Đã bao nhiêu lần, bao nhiêu lần, bao nhiêu lần, bao nhiêu lần, bao nhiêu lần, bao nhiêu lần,\nbao nhiêu lần, bao nhiêu lần——em đã tính toán lại」"
# monologue
# JP: ならば、最後まできちんと聞こう。見守ろう。\nハチロクが、自分自身と向き合う様を。
2927 = "Nếu vậy, hãy lắng nghe đàng hoàng cho đến cuối cùng. Hãy dõi theo.\nCách Hachiroku đối mặt với chính bản thân mình."
# 【ハチロク】
# display as 八六
# JP: 「復唱を求め、混乱し、わたくしが空費した十四秒。\nそれだけの貴重な時間が、もし……あったなら」
1872 = "「Yêu cầu nhắc lại, hoảng loạn, mười bốn giây mà em đã lãng phí.\nKhoảng thời gian quý giá ngần ấy, nếu như……có được」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1701 = "「Aa——」"
# monologue
# JP: その一言から、見えてくる。\nあの日、あの時。運転台で、なにがあったか。
2608 = "Từ một câu nói đó, tôi có thể thấy được.\nNgày hôm đó, lúc đó. Trên buồng lái, đã có chuyện gì xảy ra."
# 【ハチロク】
# display as 八六
# JP: 「……[わたくしたち,1]列車は、止まれていたのです。\nあの十四秒があれば。\x%l脱線転覆;#00ffc040;脱線転覆%l;#;などさせずとも」
1181 = "「……[わたくしたち,1]Đoàn tàu, đã có thể dừng lại.\nNếu có mười bốn giây đó. Dù không cần phải \\x%l脱線転覆;#00ffc040;trật bánh lật tàu%l;#; đi chăng nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「だからお前は、あの事故を。\nお前自身が起こしたものと、思っているのか」
1886 = "「Thế nên em, vụ tai nạn đó.\nEm nghĩ là do chính bản thân em gây ra sao」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
2174 = "「っ!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だがな？　ハチロク」
1544 = "「Nhưng mà nhé? Hachiroku」"
# monologue
# JP: 抱きしめたまま髪を撫ぜる。\nハチロクの傷を癒やしたいから。
2693 = "Vẫn ôm em ấy, tôi vuốt ve mái tóc.\nVì tôi muốn chữa lành vết thương cho Hachiroku."
# monologue
# JP: そうすることで、きっと同時に、\n僕自身の傷も癒やされるから。
2579 = "Bằng cách làm như vậy, chắc chắn đồng thời,\nvết thương của chính tôi cũng sẽ được chữa lành."
# 【双鉄】
# display as 雙鐵
# JP: 「それは、はっきり背負いすぎてる」
2051 = "「Điều đó, rõ ràng là em đang gánh vác quá nhiều rồi」"
# 【ハチロク】
# display as 八六
# JP: 「いいえっ、いいえ双鉄様っ」
1524 = "「Không đâu, không đâu ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば問おう。\n復唱を求めたことは、規則通りの行いだろう？」
2130 = "「Nếu vậy anh hỏi em.\nViệc yêu cầu nhắc lại, chẳng phải là hành động đúng theo quy định sao?」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
1693 = "「っ!」"
# monologue
# JP: 答えなど、聞かずともわかる。\n緊急事態になれば勝手に、体が訓練どおりに動く。
2721 = "Câu trả lời, không cần nghe cũng biết.\nNếu rơi vào tình trạng khẩn cấp, cơ thể sẽ tự động phản ứng đúng như những gì đã được huấn luyện."
# monologue
# JP: そうでなければ鉄道員でも、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でもありえない。\n――そうあるために、僕らは訓練を重ねているのだ。
2778 = "Nếu không như vậy thì không thể nào là nhân viên đường sắt, hay \\x%lレイルロオド;#00ffc040;Railord%l;#; được.\n——Để được như vậy, chúng tôi đã phải luyện tập lặp đi lặp lại."
# 【双鉄】
# display as 雙鐵
# JP: 「旧帝鉄の訓練が想定していない事態が起きた。\n……それほどのありえぬ事故を、起こしてしまった」
2030 = "「Một tình huống mà quá trình huấn luyện của Đường sắt Hoàng gia cũ không lường trước được đã xảy ra.\n……Một vụ tai nạn không tưởng đến mức đó, đã xảy ra」"
# monologue
# JP: ああ、そうだ。台風ではなく大廃線が、\nそもそもの原因ともいえるだろう。
2568 = "A, đúng vậy. Không phải cơn bão mà là cuộc đại bãi bỏ các tuyến đường sắt,\nmới có thể nói là nguyên nhân cốt lõi."
# monologue
# JP: 台風一つを耐えきれずに起きた、鉄橋崩落――\nそれは、人が鉄道を不要と断じて、招いた結果だ。
2944 = "Cầu sắt sụp đổ xảy ra vì không thể chịu đựng nổi một cơn bão——\nđó là kết quả do con người phán xét rằng đường sắt là không cần thiết chuốc lấy."
# 【双鉄】
# display as 雙鐵
# JP: 「どの視点で見ても、旧帝鉄には不備があった。\nお前と8620も他の職員も、不備に巻き込まれた被害者だ」
2014 = "「Dù nhìn từ góc độ nào, Đường sắt Hoàng gia cũ cũng có thiếu sót.\nEm, 8620 và các nhân viên khác, đều là nạn nhân bị cuốn vào thiếu sót đó」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1687 = "「啊——」" 
# monologue
# JP: 小さく、呻く。\nそしてそのままハチロクは、しばし、黙り込んでしまう。
2499 = "Khẽ rên rỉ.\nRồi cứ thế Hachiroku, im lặng trong giây lát."
# 【ハチロク】
# display as 八六
# JP: 「…………仮に、左様であったとしても――\nそれでも、可能性があった以上は」
1206 = "「…………Giả sử, dù có là như vậy đi chăng nữa——\nDù vậy, miễn là có khả năng」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク――」
2136 = "「Nếu vậy, Hachiroku——」"
# monologue
# JP: ハチロクの抱える愚かさは、\n僕の愚かさとまったく同じだ。
2668 = "Sự ngu ngốc mà Hachiroku đang mang,\nhoàn toàn giống hệt với sự ngu ngốc của tôi."
# monologue
# JP: わかってもらうそのためならば――\n僕は自分の、愚かささえさらけだそう。
2788 = "Để em ấy hiểu được điều đó——\nTôi sẽ phơi bày cả sự ngu ngốc của chính mình."
# 【双鉄】
# display as 雙鐵
# JP: 「最善の可能性を選べなかったことが罪ならば\n――僕の家族を殺した者は、やはり…………僕だ」
1769 = "「Nếu việc không thể chọn khả năng tốt nhất là một tội lỗi\n——Thì kẻ đã giết chết gia đình anh, quả nhiên…………là anh」"
# 【ハチロク】
# display as 八六
# JP: 「あっ！！？」
1695 = "「A!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、ハチロクっ！！！」
1894 = "「Thế nên, Hachiroku!!!」"
# monologue
# JP: 抱きしめる手に力をこめる。\n小さな体にすがりつく。
2691 = "Tôi dồn lực vào vòng tay đang ôm.\nBám chặt lấy cơ thể nhỏ bé ấy."
# monologue
# JP: それしか出来ない。\nガタガタガタガタ、こんなに震えてしまっているから。
2580 = "Tôi chỉ có thể làm như vậy.\nLập cập lập cập, vì em ấy đang run rẩy đến thế này cơ mà."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はお前に、お前自身を許して欲しい。\nそうして、僕を――僕も、お前に、許して欲しい」
1847 = "「Anh muốn em, hãy tha thứ cho chính bản thân em.\nVà rồi, anh——anh cũng muốn em, hãy tha thứ cho anh」"
# 【ハチロク】
# display as 八六
# JP: 「ああ……」
# 1702 = "「嗯……」" 
# monologue
# JP: ハチロクが僕を抱きしめ返す。\nハチロクの熱が伝わってくる。
2481 = "Hachiroku ôm chặt lấy tôi.\nHơi ấm của Hachiroku truyền đến."
# 【ハチロク】
# display as 八六
# JP: 「双鉄……さま」
# 2157 = "「雙鐵……少爺」" 
# monologue
# JP: 何百回、何千回、何万回と耳にしている\n『双鉄様』が、こんなにも優しくあたたかく染み透る。
2644 = "Tiếng 『Ngài Soutetsu』 mà tôi đã nghe hàng trăm, hàng ngàn, hàng vạn lần,\nthấm đẫm dịu dàng và ấm áp đến thế này."
# monologue
# JP: 自分自身の体がそれほど冷え切っていたと、だから知る。\nそして同時に、ハチロクがわかってくれたのだとも。
2581 = "Cơ thể của chính tôi đã lạnh lẽo đến mức đó, nên tôi mới nhận ra.\nVà đồng thời, Hachiroku cũng đã hiểu cho tôi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまが、それを求めてくださるのなら、\nわたくしはわたくしを許せます。ですから、どうか」
2161 = "「Nếu ngài Soutetsu, mong muốn điều đó ở em,\nthì em có thể tha thứ cho chính mình. Thế nên, xin ngài」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。僕も、僕を許そう。\nそして、お前の全てを許そう」
1719 = "「Aa. Anh cũng, sẽ tha thứ cho bản thân mình.\nVà, sẽ tha thứ cho tất cả mọi thứ của em」"
# 【ハチロク】
# display as 八六
# JP: 「――双鉄さま。ありがとうございます。\nわたくしも、あなたの全てを、許します」
1159 = "「——Ngài Soutetsu. Cảm ơn ngài.\nEm cũng, tha thứ cho tất cả mọi thứ của ngài」"
# monologue
# JP: 言って、くすりと、ハチロクが笑う。\n安心しきった、脱力しきった声で、笑う。
2885 = "Nói rồi, Hachiroku khẽ cười khúc khích.\nBằng một giọng nói hoàn toàn an tâm, hoàn toàn mất đi sức lực, em ấy cười."
# monologue
# JP: 笑顔をみたくて、手をほどく。\nハチロクは――ああ、なんと満ち足りた笑顔だろうか。
2697 = "Vì muốn nhìn thấy nụ cười ấy, tôi buông tay ra.\nHachiroku——a, quả là một nụ cười mãn nguyện làm sao."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ハチロク」
1811 = "「Sao vậy? Hachiroku」"
# 【ハチロク】
# display as 八六
# JP: 「不意に、思い出したのです。わたくしたちがお互いを、\n許し合うのは――これが、二度目のこととなるのを」
1856 = "「Đột nhiên, em nhớ ra. Chúng ta tha thứ cho nhau——\nđây là, lần thứ hai rồi nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「二度目？」
2047 = "「Lần thứ hai?」"
# 【ハチロク】
# display as 八六
# JP: 「ええ。一度目は――\n初めて会って、それから二時間もたたないうちに」
1710 = "「Vâng. Lần thứ nhất là——\nChưa đầy hai tiếng đồng hồ sau khi chúng ta gặp nhau lần đầu tiên」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだったな」
1723 = "「À, đúng là vậy nhỉ」"
# monologue
# JP: 初対面から、僕らはお互い誤解しあった。\nあのときは素直に話し合い、本当にすぐ、解決できた。
2670 = "Ngay từ lần đầu gặp mặt, chúng tôi đã hiểu lầm nhau.\nLúc đó chúng tôi đã thành thật nói chuyện, và thực sự đã giải quyết được ngay lập tức."
# monologue
# JP: 素直に話し合えていたなら――\nこの問題さえ、すぐに解決できてたのかもしれないが。
2811 = "Nếu chúng tôi có thể thành thật nói chuyện với nhau——\nThì ngay cả vấn đề này, có lẽ cũng đã có thể giải quyết được ngay lập tức."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク」
2146 = "「Nếu vậy, Hachiroku」"
# monologue
# JP: が、長い時間を過ごす間に、似たようなことを繰り返し。\n繰り返しを繰り返しつつ、僕らは螺旋階段を登るのだろう。
2588 = "Nhưng, trong suốt khoảng thời gian dài bên nhau, chúng tôi đã lặp lại những điều tương tự.\nVừa lặp đi lặp lại, chúng tôi vừa leo lên cầu thang xoắn ốc nhỉ."
# monologue
# JP: そしてゆっくり、人も\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も変わりなく。\nきっと、大人に。大人のこころになっていくのだ。
2639 = "Và rồi từ từ, cả con người lẫn \\x%lレイルロオド;#00ffc040;Railord%l;#; đều không thay đổi.\nChắc chắn, sẽ trở thành người lớn. Sẽ mang một trái tim của người lớn."
# 【双鉄】
# display as 雙鐵
# JP: 「これで、おあいこということにならんか？」
2131 = "「Thế này, coi như là hòa nhau được không?」"
# 【ハチロク】
# display as 八六
# JP: 「うふふふふっ！」
1667 = "「Ư hừ hừ hừ hừ!」"
# monologue
# JP: ハチロクが笑う。\n笑って軽やかに、抱きしめる僕の腕を抜け――
2516 = "Hachiroku cười.\nVừa cười vừa nhẹ nhàng, thoát khỏi vòng tay đang ôm của tôi——"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄様。\n手打ちで、おあいこで、とんとんです」
1860 = "「Em hiểu rồi ạ, ngài Soutetsu.\nBắt tay làm hòa, chúng ta hòa nhau, không ai nợ ai ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1715 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「その上で、どうか。[マイマスター,3]双鉄さま」
1879 = "「Hơn nữa, xin ngài. [Người chủ của em, 3]Ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1693 = "「啊！」" 
# monologue
# JP: ハチロクがそっと、時計を取り出す。
2491 = "Hachiroku nhẹ nhàng, lấy ra một chiếc đồng hồ."
# monologue
# JP: 鈍い銀色――姿かたちはそっくりだけれど、\n刻まれた無数の細かな傷が、歴史を物語っている。
2926 = "Màu bạc xỉn——hình dáng bên ngoài hoàn toàn giống nhau,\nnhưng vô số vết xước nhỏ li ti khắc trên đó, đang kể lại lịch sử."
# 【ハチロク】
# display as 八六
# JP: 「この先のわたくしの全ての時間――\n機能停止するまでの、わたくしの全てを」
1807 = "「Toàn bộ thời gian của em từ nay về sau——\nToàn bộ mọi thứ của em cho đến khi ngừng hoạt động」"
# monologue
# JP: ……旧帝鉄、日ノ本帝有鉄道の懐中時計。
1134 = "……Đồng hồ bỏ túi của Đường sắt Hoàng gia cũ, Đường sắt Hoàng gia Hinamoto."
# monologue
# JP: ハチロクが製造されてこの方ずっと、\nハチロクとともにあった時計が、差し出される。
2494 = "Chiếc đồng hồ đã luôn đồng hành cùng Hachiroku\nkể từ khi em ấy được chế tạo, được đưa ra."
# 【ハチロク】
# display as 八六
# JP: 「どうぞ、擦り切れるまでお使いください。\n[マイマスター,4]右田機関士。わたくしは、貴方の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です」
2071 = "「Xin ngài, hãy sử dụng cho đến khi nó mòn vẹt.\n[Người chủ của em, 4]Người lái tàu Migita. Em là, \\x%lレイルロオド;#00ffc040;Railord%l;#; của ngài」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ハチロク」
# 2146 = "「那麼，八六」" 
# monologue
# JP: 寝起きだからこそ叶った大事な話だが、\nそうわかっても、自分自身の寝間着姿が情けない。
2953 = "Tuy là một câu chuyện quan trọng được thực hiện ngay khi vừa thức dậy,\nnhưng dù biết vậy, bộ dạng mặc đồ ngủ của chính mình vẫn thật thảm hại."
# monologue
# JP: が、やむなしだ。机から急ぎ自分の鉄道時計を取り出して、\nできる範囲の精一杯で、身なりを整え姿勢を正す。
2422 = "Nhưng, không còn cách nào khác. Tôi vội vàng lấy chiếc đồng hồ đường sắt của mình từ trên bàn,\ncố gắng hết sức trong phạm vi có thể, chỉnh đốn trang phục và tư thế."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の時間も、お前に預ける。そうしたい」
1825 = "「Thời gian của anh cũng, giao phó cho em. Anh muốn như vậy」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま」
2158 = "「Ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、喜んで、お前の時計を預かろう」
1889 = "「Vì thế, anh rất sẵn lòng, giữ chiếc đồng hồ của em」"
# monologue
# JP: ハチロクの差し出す時計を受け取れば、\nずっしりとした重みを感じる。
2695 = "Nhận lấy chiếc đồng hồ Hachiroku đưa ra,\ntôi cảm nhận được sức nặng trĩu tay."
# monologue
# JP: 時計本体の重さではない、\nハチロクが刻んだ時間の重さを。
2921 = "Không phải là sức nặng của bản thân chiếc đồng hồ,\nmà là sức nặng của thời gian mà Hachiroku đã khắc ghi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうして、ほら」
2019 = "「Và rồi, đây」"
# 【ハチロク】
# display as 八六
# JP: 「はい。謹んで。\n双鉄様のお時間を、わたくし、お預かりいたします」
1755 = "「Vâng. Em xin kính cẩn.\nThời gian của ngài Soutetsu, em xin phép được giữ ạ」"
# monologue
# JP: ハチロクの小さな手の上に、\n僕の、御一夜鉄道の鉄道時計。
2506 = "Trên bàn tay nhỏ bé của Hachiroku,\nlà chiếc đồng hồ đường sắt của Đường sắt Ohito của tôi."
# monologue
# JP: 僕の時計からハチロクは、どんな重みを感じるのだろう？\nその表情は、なんともいえず、しあわせそうだ。
2415 = "Từ chiếc đồng hồ của tôi, Hachiroku sẽ cảm nhận được sức nặng như thế nào nhỉ?\nBiểu cảm đó, không thể nói nên lời, trông thật hạnh phúc."
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちは――同じ時間を重ねていくのですね。\nこれからずっと」
1806 = "「Chúng ta——sẽ cùng nhau trải qua khoảng thời gian giống nhau nhỉ.\nTừ nay về sau mãi mãi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ずっと。共に鉄路にあるかぎり」
1725 = "「Aa. Mãi mãi. Chừng nào chúng ta còn cùng nhau trên đường ray」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまと、わたくしと――\n共に、鉄路にあるかぎり」
2159 = "「Ngài Soutetsu, và em——\nCùng nhau, chừng nào còn trên đường ray」"
# monologue
# JP: 僕の言葉を、\n噛み締めるように繰り返し――
2520 = "Lặp lại lời nói của tôi,\nnhư đang nhấm nháp——"
# 【ハチロク】
# display as 八六
# JP: 「あ！？」
1696 = "「A!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1730 = "「嗯？」" 
# monologue
# JP: けれども何故か、急にハチロクが沈んでしまう。
2421 = "Thế nhưng không hiểu sao, Hachiroku đột nhiên chùng xuống."
# 【ハチロク】
# display as 八六
# JP: 「ともに、鉄路に、ある――『かぎり』」
1171 = "「Cùng nhau, trên đường ray——『chừng nào còn』」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうしたハチロク。なにかあったか？」
1606 = "「Sao vậy Hachiroku. Có chuyện gì sao?」"
# 【ハチロク】
# display as 八六
# JP: 「ああいえ！　なにほどのこともございません！\nただ、その――あの……そのっ」
1525 = "「A a không! Không có chuyện gì đâu ạ!\nChỉ là, cái đó——ờm……cái đó」"
# monologue
# JP: 再び、頬が赤くなる。\nさっきより激しい勢いで。
2515 = "Lại một lần nữa, đôi má ửng đỏ.\nVới thế công dữ dội hơn lúc nãy."
# monologue
# JP: 今日のハチロクは、日々姫顔負けの百面相だ。\nあ、いや――ひょっとするとオリヴィ同様に――
2449 = "Hachiroku hôm nay, có trăm vạn biểu cảm chẳng kém gì Hibiki.\nA, không——biết đâu cũng giống như Olivy——"
# 【ハチロク】
# display as 八六
# JP: 「わたくしが、その――自覚しておりましたよりずっと。\n欲張りで、欲しがりと。知ってしまっただけのことです」
1837 = "「Em, cái đó——hơn cả những gì em tự nhận thức.\nEm rất tham lam, và hay đòi hỏi. Em chỉ vừa mới nhận ra điều đó thôi ạ」"
# monologue
# JP: ……不調、というわけではなさそうだ。\nもうハチロクは、すっかり落ち着き直してみえる。
1123 = "……Có vẻ không phải là do trục trặc.\nHachiroku dường như đã hoàn toàn bình tĩnh lại."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　お前は無欲であるかと思うが――\nいったい、何が欲しいというのだ？」
1732 = "「Hừm? Anh nghĩ em là người không có dục vọng cơ mà——\nRốt cuộc, em muốn cái gì vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「あぁ」
1692 = "「Aa」"
# monologue
# JP: ハチロクが、ちらと僕をみる。
2482 = "Hachiroku, liếc nhìn tôi."
# monologue
# JP: けれどもすぐに瞳を伏せて――そうしてなんとも儚げな、\n何かを悟ったようにもみえる微笑を、口元にたたえる。
2459 = "Thế nhưng ngay lập tức cụp mắt xuống——rồi mang một nụ cười vô cùng mong manh,\nnhư thể đã ngộ ra điều gì đó, đọng lại trên khóe môi."
# 【ハチロク】
# display as 八六
# JP: 「おわかりになられないのでしたら。\n申し訳ないのですけれど、双鉄さまには、内緒です」
1760 = "「Nếu ngài không hiểu.\nThì em xin lỗi, nhưng em sẽ giữ bí mật với ngài Soutetsu ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
1951 = "「Vậy sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。お伝えはできません。\nわたくしは、双鉄さま。貴方の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですので」
1970 = "「Vâng. Em không thể nói cho ngài biết được.\nEm là, ngài Soutetsu. Là \\x%lレイルロオド;#00ffc040;Railord%l;#; của ngài mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 1715 = "「嗯」" 
# 【日々姫】
# display as 日日姬
# JP: 「にぃに！　ハチロク！　もうおきとー？」
2155 = "「Anh hai! Hachiroku! Dậy chưa—?」"
# 【ハチロク】
# display as 八六
# JP: 「あら」
1673 = "「Ây da」"
# monologue
# JP: タイミングのよすぎる日々姫の声。\nそうか――どうやら気を使わせてしまたらしい。
2760 = "Giọng nói của Hibiki vang lên đúng lúc quá.\nRa vậy——có vẻ như đã khiến em ấy phải bận tâm rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、起きているぞ。\n今日はなにせ旺宮に行く日だからな」
1729 = "「Ừ, dậy rồi đây.\nHôm nay dù sao cũng là ngày đi Omiya mà」"
# 【日々姫】
# display as 日日姬
# JP: 「ナビでひとっとびだからって、油断しちゃいけんよ？\n遅刻して話聞けんとかになったら[おおごと,1]大事だし」
1681 = "「Dù bay bằng Navi một loáng là tới, nhưng cũng không được chủ quan đâu đấy?\nNếu đi muộn mà không nghe được chuyện thì [rắc rối to, 1]rắc rối to đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっている。なにせ、電車姫さまのご紹介だ。\n決して遅刻などせんさ」
1869 = "「Anh biết rồi. Dù sao cũng là do Điện Xa Cơ giới thiệu mà.\nTuyệt đối sẽ không đi muộn đâu」"
# monologue
# JP: ……宗方さんから相談を受けた、\nオリヴィのごくごく微細な、けれど継続的な不調。
1109 = "……Tôi đã nhận được sự tư vấn từ chú Munakata,\nvề một trục trặc vô cùng nhỏ, nhưng lại kéo dài liên tục của Olivy."
# monologue
# JP: 登呂流湯さんでは対処できないという事態について、\n電車姫様は、旺宮いきをおすすめくださった。
2634 = "Về tình trạng mà nhà tắm Tororyu-yu không thể xử lý được,\nĐiện Xa Cơ đã khuyên chúng tôi nên đến Omiya."
# 【双鉄】
# display as 雙鐵
# JP: 「長い年月を経た\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のメンテナンスの問題は、\n僕にとっても、まさしくもって、“我がこと”だしな」
2028 = "「Vấn đề bảo dưỡng \\x%lレイルロオド;#00ffc040;Railord%l;#; sau nhiều năm dài hoạt động,\nđối với tôi mà nói, chắc chắn cũng là \"việc của chính mình\" mà」"
# monologue
# JP: いってスックと立ち上がる。
2886 = "Nói rồi tôi đứng phắt dậy."
# monologue
# JP: ハチロク・日々姫は何故かはしらん、\n変わらず僕を見つめたままだ。
2412 = "Hachiroku và Hibiki không hiểu sao,\nvẫn cứ nhìn chằm chằm vào tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「――着替えるのだが、見学するのか？」
1158 = "「——Anh thay đồ đây, hai người định đứng xem à?」"
# 【日々姫】
# display as 日日姬＆八六
# JP: 「っ！！？」
# 1676 = "「哎！！？」" 
# 【ひよこ】
# display as 不死鳥
# JP: 「第ゼロ世代の飛行型エアクラにも、\n大いに驚かされましたが――」
2156 = "「Dù tôi cũng đã vô cùng kinh ngạc trước Aircra bay thế hệ số không——」"
# monologue
# JP: ……案内された、旺宮鉄道歴史館の地下。\n僕ら以外に誰一人いない、保存機のボロボロの運転台の中。
1111 = "……Được dẫn đến tầng hầm của Bảo tàng Lịch sử Đường sắt Omiya.\nBên trong buồng lái tồi tàn của một chiếc đầu máy được bảo tồn, ngoài chúng tôi ra không còn ai khác."
# monologue
# JP: 不死鳥博士を自称する\x%lレイルロオド;#00ffc040;レイルロオド%l;#;はそう言って、\nメガネの縁を光らせる。
2861 = "\\x%lレイルロオド;#00ffc040;Railord%l;#; tự xưng là Tiến sĩ Bất tử Điểu nói vậy,\ngọng kính lóe sáng."
# 【ひよこ】
# display as 不死鳥
# JP: 「この日報にも驚きました。これほど簡潔に、\nかつ詳細に変調を観察できる\x%l機関士;#00ffc040;機関士%l;#;は珍しい」
1582 = "「Tôi cũng rất ngạc nhiên trước bản báo cáo hàng ngày này. Một \\x%l機関士;#00ffc040;người lái tàu%l;#; có thể quan sát sự thay đổi một cách ngắn gọn và chi tiết đến mức này quả là hiếm có」"
# 【双鉄】
# display as 雙鐵
# JP: 「宗方\x%l機関士;#00ffc040;機関士%l;#;も、また、尊敬し、\n見習うべき方の一人であると思っています」
1776 = "「Tôi cũng nghĩ \\x%l機関士;#00ffc040;người lái tàu%l;#; Munakata là một trong những người đáng để tôn trọng và học hỏi」"
# monologue
# JP: 一番最初は、彼の流儀に――\nオリヴィとの接しかたに正直、戸惑わせられた。
2844 = "Ban đầu, thú thực tôi đã rất bối rối trước phong cách của chú ấy——\ncách chú ấy đối xử với Olivy."
# monologue
# JP: 『徹頭徹尾の物扱い』。\nそれは僕らのやり方と、全く異なるものだったゆえ。
1093 = "『Đối xử hoàn toàn như một món đồ』.\nĐiều đó hoàn toàn khác biệt với cách làm của chúng tôi."
# 【ひよこ】
# display as 不死鳥
# JP: 「ほう？\nどのような点で、ですかな？」
1678 = "「Hô?\nỞ điểm nào vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「宗方\x%l機関士;#00ffc040;機関士%l;#;は、オリヴィを物として扱います。\n一線を引き、踏み込まさせず――けれど、とても大切に」
1777 = "「\\x%l機関士;#00ffc040;Người lái tàu%l;#; Munakata đối xử với Olivy như một món đồ.\nVạch ra ranh giới, không cho phép bước qua——nhưng lại vô cùng trân trọng」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ほほう」
1734 = "「Hô hô」"
# 【双鉄】
# display as 雙鐵
# JP: 「甘えてきても、なついてきても、私生活では関わらない。\nけれど、職務上必要な手当は全て行い、知識も与える」
1684 = "「Dù có nũng nịu, có quấn quýt, cũng không can dự vào đời sống cá nhân.\nThế nhưng, chú ấy thực hiện mọi đãi ngộ cần thiết cho công việc, và truyền đạt kiến thức」"
# monologue
# JP: 自分の言葉に、気付かされる。
2711 = "Tôi chợt nhận ra ý nghĩa trong lời nói của chính mình."
# monologue
# JP: 宗方さんとオリヴィは、日ノ本における学園での、\n教師と生徒の――理想とされる姿に近い物と感じる。
2621 = "Tôi cảm thấy chú Munakata và Olivy, gần giống với hình mẫu lý tưởng của——\ngiáo viên và học sinh tại các trường học ở Hinamoto."
# 【双鉄】
# display as 雙鐵
# JP: 「物と人として接し。身内に決してならないからこそ、\n彼は恐らく、誰より冷静にオリヴィを評価できるのです」
1901 = "「Tiếp xúc với tư cách là đồ vật và con người. Chính vì tuyệt đối không trở thành người nhà,\nnên chú ấy có lẽ là người có thể đánh giá Olivy một cách bình tĩnh hơn bất kỳ ai」"
# 【ひよこ】
# display as 不死鳥
# JP: 「なるほどなるほど。この報告書と右田氏との評から、\n宗方氏の仕事ぶりが浮かんでくるものとも思えますな」
1620 = "「Ra vậy ra vậy. Từ bản báo cáo này và đánh giá của cậu Migita,\ntôi nghĩ mình có thể hình dung ra cách làm việc của chú Munakata rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「仕事ぶり、ですか」
1759 = "「Cách làm việc, sao?」"
# 【ひよこ】
# display as 不死鳥
# JP: 「『物としての\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を、自分の仕事道具として、\n完璧に手入れし、最善に使いこなす』」
1173 = "「『Coi \\x%lレイルロオド;#00ffc040;Railord%l;#; như một món đồ, như một công cụ làm việc của mình,\nbảo dưỡng hoàn hảo, và sử dụng một cách tối ưu』」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1701 = "「嗯——」" 
# monologue
# JP: 驚かされる。\nなんと端的、かつ正確な評価であろうか。
2685 = "Tôi rất ngạc nhiên.\nQuả là một đánh giá súc tích và chính xác làm sao."
# 【双鉄】
# display as 雙鐵
# JP: 「まさしく、そのとおりだと感じます。\n今日だけを見ても、宗方\x%l機関士;#00ffc040;機関士%l;#;は、そう徹底している」
1993 = "「Tôi cảm thấy, quả đúng là như vậy.\nChỉ nhìn vào ngày hôm nay thôi, \\x%l機関士;#00ffc040;người lái tàu%l;#; Munakata cũng đã triệt để như vậy」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ですな。確かにオリヴィ氏は、\n[ぜんけん,1]全検を明けたばかりではありますし、不調も微細」
1944 = "「Đúng vậy nhỉ. Quả thực cô Olivy,\nvừa mới hoàn thành [kiểm tra toàn diện, 1]kiểm tra toàn diện, và trục trặc cũng rất nhỏ」"
# monologue
# JP: ――ゆえ、宗方さんはオリヴィを僕らに同行させなかった。
1073 = "——Vì thế, chú Munakata đã không cho Olivy đi cùng chúng tôi."
# monologue
# JP: 今もオリヴィは、微細な不調と付き合いながら、\nそれでも明るく、Ⅸ号を駆っているはずだ。
2447 = "Chắc hẳn bây giờ Olivy vẫn đang vui vẻ lái chiếc số 9,\ndù phải sống chung với những trục trặc nhỏ bé."
# 【双鉄】
# display as 雙鐵
# JP: 「はい。その判断こそ、宗方氏ならではの――\n少なくとも、御一夜鉄道では彼のみが下せるものかと」
1963 = "「Vâng. Quyết định đó, mang đậm phong cách của chú Munakata——\nÍt nhất thì, ở Đường sắt Ohito có lẽ chỉ có chú ấy mới đưa ra được quyết định đó」"
# 【ひよこ】
# display as 不死鳥
# JP: 「つまり、右田氏の判断は異なるわけですな？」
1553 = "「Tức là, quyết định của cậu Migita sẽ khác sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ですね。\n僕ならオリヴィを、引っ張ってでも連れてきています」
1936 = "「Vâng.\nNếu là tôi, dù có phải kéo đi tôi cũng sẽ đưa Olivy đến đây」"
# monologue
# JP: なぜならば、たとえ稼働に問題なくとも、\n確かに不調は存在するゆえ。
2578 = "Lý do là vì, cho dù không có vấn đề gì trong việc vận hành,\nnhưng trục trặc quả thực là có tồn tại."
# monologue
# JP: 乗務をたとえ休ませたとて、今の御一夜鉄道なら、\nダイヤに穴を開けずに余裕で、回していけるのだし。
2810 = "Cho dù có cho nghỉ lái, thì với Đường sắt Ohito hiện tại,\nvẫn có thể dư sức xoay xở mà không làm thủng lịch trình."
# 【ひよこ】
# display as 不死鳥
# JP: 「なるほどなるほど。『最後まで使い切ってやろう』と\n――右田氏には、そうは思えませんか」
1617 = "「Ra vậy ra vậy. 『Sẽ vắt kiệt sức lực cho đến cuối cùng』\n——Cậu Migita, không nghĩ như vậy sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1676 = "「哎！！？」" 
# 【ハチロク】
# display as 八六
# JP: 「不死鳥博士！　最後とは！？」
1536 = "「Tiến sĩ Bất tử Điểu! Cuối cùng là sao ạ!?」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ああ。\n落ち着いてください。右田氏もハチロク氏も」
1704 = "「A.\nXin hãy bình tĩnh. Cả cậu Migita và cô Hachiroku nữa」"
# monologue
# JP: 不死鳥博士の肩が竦められる。
2611 = "Tiến sĩ Bất tử Điểu nhún vai."
# 【ひよこ】
# display as 不死鳥
# JP: 「宗方氏が、そう判断しているであろうということですよ。\n実際の最後は、十年先とも、明日であるともしれません」
1840 = "「Ý tôi là chú Munakata, có lẽ đang phán đoán như vậy.\nCái kết thực sự, có thể là mười năm sau, cũng có thể là ngày mai」"
# 【ハチロク】
# display as 八六
# JP: 「あ……」
1690 = "「A……」"
# monologue
# JP: なるほど。つまりは、オリヴィはそういう状態――\n人間でいう、老衰に近い状態なのか。
2533 = "Ra vậy. Tức là, Olivy đang ở trong tình trạng đó——\ntình trạng gần giống như tuổi già sức yếu ở con người sao."
# monologue
# JP: 健康であり、気をつけていても、不調は出る。\nぽっくりと、明日止まってもおかしくはない。
2901 = "Dù khỏe mạnh, dù có cẩn thận, trục trặc vẫn sẽ xuất hiện.\nDù ngày mai có đột ngột ngừng hoạt động cũng không có gì lạ."
# 【双鉄】
# display as 雙鐵
# JP: 「だから……使い切る」
1884 = "「Thế nên……sẽ vắt kiệt sức lực」"
# monologue
# JP: オリヴィにとっての最大の喜びは、\n間違いなく、宗方さんと共に走ることだから――いや。
2632 = "Niềm vui lớn nhất đối với Olivy,\nchắc chắn là được chạy cùng chú Munakata——không."
# monologue
# JP: （それは違う。付き合いがそう長くなくとも、\n見ていれば、誰にだってオリヴィの気持ちはわかる）
2974 = "（Không phải vậy. Dù thời gian quen biết không dài,\nnhưng chỉ cần nhìn thôi, ai cũng có thể hiểu được tâm trạng của Olivy）"
# monologue
# JP: 理解が、ようやく及んだ気がする。\n宗方さんは、やはりオリヴィの最高の理解者なのだと。
2675 = "Tôi cảm thấy cuối cùng mình cũng đã hiểu.\nChú Munakata, quả nhiên là người hiểu Olivy nhất."
# monologue
# JP: “最後まで使い切る”ことこそが、\nオリヴィに対する、最高最良の対応なのだと。
2873 = "Việc \"vắt kiệt sức lực cho đến cuối cùng\",\nchính là cách đối xử tuyệt vời nhất, tốt nhất đối với Olivy."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィは、宗方さんの役に立ちたい。\n決して足手まといにはなりたくない。だから」
1749 = "「Olivy, muốn giúp ích cho chú Munakata.\nTuyệt đối không muốn trở thành gánh nặng. Thế nên」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ほほう」
1733 = "「Hô hô」"
# monologue
# JP: 関心と驚きとが等しく混じったような声。
2633 = "Một giọng nói pha trộn sự quan tâm và kinh ngạc một cách đồng đều."
# 【ひよこ】
# display as 不死鳥
# JP: 「意外ですな。右田氏は――[もみじ,1]紅葉から聞く話では、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を物と扱い得ぬ方であるかと感じましたが」
2033 = "「Bất ngờ thật đấy. Cậu Migita——theo những gì tôi nghe được từ [Momiji, 1]Momiji,\ntôi cứ ngỡ cậu là người không thể đối xử với \\x%lレイルロオド;#00ffc040;Railord%l;#; như một món đồ cơ」"
# monologue
# JP: 電車姫様を“紅葉”と呼んで、\n不死鳥博士こと、ひよこ――
2735 = "Gọi Điện Xa Cơ là \"Momiji\",\nTiến sĩ Bất tử Điểu, hay còn gọi là Hiyoko——"
# monologue
# JP: 旺宮鉄道歴史館の実質的な館長である、\nC57 145号機\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、労るようにハチロクを見る。
2911 = "Vị giám đốc thực sự của Bảo tàng Lịch sử Đường sắt Omiya,\n\\x%lレイルロオド;#00ffc040;Railord%l;#; của đầu máy C57 145, nhìn Hachiroku đầy thương cảm."
# 【ひよこ】
# display as 不死鳥
# JP: 「紅葉の話の限りにおいて、右田氏と宗方氏との\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;観には大きな差があるものか、と」
2057 = "「Theo như lời Momiji nói, tôi cứ tưởng quan điểm về \\x%lレイルロオド;#00ffc040;Railord%l;#; của cậu Migita và chú Munakata có sự khác biệt rất lớn chứ」"
# 【ハチロク】
# display as 八六
# JP: 「はい、左様です」
1727 = "「Vâng, đúng là vậy ạ」"
# monologue
# JP: 誇らしげ、としかいいようの無いハチロクの声。
2513 = "Giọng nói của Hachiroku tràn đầy tự hào, không thể diễn tả bằng lời nào khác."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまは、もったいなくも、\nわたくしを家族と呼んで、そのように接して下さいます」
1897 = "「Ngài Soutetsu, dù không đáng,\nnhưng ngài ấy gọi em là gia đình, và đối xử với em như vậy ạ」"
# 【ひよこ】
# display as 不死鳥
# JP: 「なるほどなるほど。やはり右田氏にとっては、\nハチロク氏は、単なる物ではないのですな」
1618 = "「Ra vậy ra vậy. Quả nhiên đối với cậu Migita,\ncô Hachiroku không chỉ đơn thuần là một món đồ nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ですね――というか、他の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;もやはり、\n僕には、物とは思えません」
1933 = "「Vâng——hay nói đúng hơn, những \\x%lレイルロオド;#00ffc040;Railord%l;#; khác cũng vậy,\nđối với tôi, tôi không thể coi họ là đồ vật được」"
# monologue
# JP: ……オリヴィなど、宗方さんからの物扱いを、\n喜びにし、誇りとしていることが、はっきりわかる。
1115 = "……Tôi hiểu rất rõ, Olivy lấy việc bị chú Munakata đối xử như đồ vật làm niềm vui, làm niềm tự hào."
# monologue
# JP: そうであっても僕はどうしてもオリヴィを、\n“物”とは思えぬし、扱い得ない。
2457 = "Dù vậy, tôi vẫn không thể coi Olivy là\n\"đồ vật\", và cũng không thể đối xử với cô ấy như vậy."
# 【ひよこ】
# display as 不死鳥
# JP: 「ほほう、それは、何ゆえですかな？」
1738 = "「Hô hô, điều đó, là vì sao vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「何ゆえ――と問われますと」
2035 = "「Nếu hỏi là vì sao——thì」"
# monologue
# JP: 考えようと思った瞬間、すぐに答えが浮き上がってくる。
2813 = "Ngay khoảnh khắc định suy nghĩ, câu trả lời lập tức hiện lên."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、魂を有しているからです」
1744 = "「Bởi vì \\x%lレイルロオド;#00ffc040;Railord%l;#; có linh hồn」"
# 【ひよこ】
# display as 不死鳥
# JP: 「魂、ですか」
2164 = "「Linh hồn, sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。他に適切な言葉を思い浮かび得ぬほど――\nはっきりとした……彼女たち自身に根付く、自由意志を」
1965 = "「Vâng. Rõ ràng đến mức——tôi không thể nghĩ ra từ nào thích hợp hơn……ý chí tự do bén rễ sâu trong chính bản thân họ」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ほほう。そこまで理解しておられますか。\nその上で、“物扱い”もまた正しいとも、理解できる？」
1736 = "「Hô hô. Cậu đã hiểu đến mức đó rồi sao.\nHơn nữa, cậu cũng có thể hiểu rằng việc \"đối xử như đồ vật\" cũng là một cách đúng đắn?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうですね。僕には真似出来ぬことでしょうが――\nそれでも、宗方さんもまた、正しくあるとは感じます」
1947 = "「Đúng vậy. Dù tôi có lẽ không thể bắt chước được——\nnhưng tôi vẫn cảm thấy, cách làm của chú Munakata cũng là một cách đúng đắn」"
# monologue
# JP: 不死鳥博士が、僕へとまっすぐ体を向け直す。
2399 = "Tiến sĩ Bất tử Điểu quay thẳng người về phía tôi."
# 【ひよこ】
# display as 不死鳥
# JP: 「なるほど。紅葉が評価するだけのことはありますな。\n右田氏は、鉄路の未来。その可能性を示し得る存在だと」
1621 = "「Ra vậy. Quả không uổng công Momiji đánh giá cao.\nCậu Migita là tương lai của đường sắt. Là sự tồn tại có thể chỉ ra khả năng đó」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！　さすがは電車姫様です！」
1671 = "「Oa! Quả không hổ danh là Điện Xa Cơ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――あまりにも過分なご評価かと存じますが」
1834 = "「Điều đó——tôi e là ngài đã đánh giá quá cao rồi」"
# 【ひよこ】
# display as 不死鳥
# JP: 「いやいや。ご謙遜。実際に動かれ、結果を出されている。\nそれだけで、右田氏の価値は示されていましょうとも」
1527 = "「Không không. Cậu khiêm tốn quá. Cậu đã thực sự hành động và tạo ra kết quả.\nChỉ bấy nhiêu thôi, giá trị của cậu Migita đã được thể hiện rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……お言葉ですが、僕の価値ではなく、御一夜の\n――御一夜鉄道の、もっと広くの、みんなの価値です」
2103 = "「Điều đó……xin thứ lỗi, nhưng đó không phải là giá trị của tôi, mà là giá trị của Ohito\n——của Đường sắt Ohito, và rộng hơn nữa là của tất cả mọi người」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ほほう？　みんな、とは？　どのような意味でしょう」
1741 = "「Hô hô? Tất cả mọi người, là sao? Ý cậu là gì?」"
# 【双鉄】
# display as 雙鐵
# JP: 「文字通り、僕に力を貸してくれた、\n僕とともに歩んでくれてる――みんなです」
1791 = "「Đúng như nghĩa đen, những người đã cho tôi mượn sức mạnh,\nnhững người đã cùng tôi bước đi——tất cả mọi người」"
# monologue
# JP: ハチロクを見れば、ハチロクもじっと僕を見ている。\nただそれだけのことからも、僕は力を受け取れる。
2672 = "Nhìn sang Hachiroku, Hachiroku cũng đang nhìn tôi chằm chằm.\nChỉ từ điều đó thôi, tôi cũng có thể nhận được sức mạnh."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクにせよ、他の誰にせよ。\n一人でも欠けていたなら、僕はここには立てていません」
2015 = "「Dù là Hachiroku, hay bất kỳ ai khác.\nThiếu đi một người, tôi cũng không thể đứng ở đây được」"
# 【ひよこ】
# display as 不死鳥
# JP: 「なるほどなるほど。やはり右田氏は、紅葉の評価通り。\nあるいは、それをうわまわる方であるようですな」
1619 = "「Ra vậy ra vậy. Quả nhiên cậu Migita đúng như đánh giá của Momiji.\nHoặc có lẽ, còn vượt xa hơn thế nữa」"
# monologue
# JP: 不死鳥博士は、大きく頷き。
2397 = "Tiến sĩ Bất tử Điểu gật đầu mạnh."
# 【ひよこ】
# display as 不死鳥
# JP: 「ならば、全てをお伝えしましょう」
2132 = "「Nếu vậy, tôi sẽ kể cho cậu nghe tất cả」"
# 【双鉄】
# display as 雙鐵
# JP: 「全て、とは？」
1663 = "「Tất cả, là sao ạ?」"
# 【ひよこ】
# display as 不死鳥
# JP: 「確認できた限りの、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に関する歴史の全て。\nそれをお伝えすることは、きっと、お役に立ちましょう」
2061 = "「Tất cả lịch sử liên quan đến \\x%lレイルロオド;#00ffc040;Railord%l;#; mà tôi có thể xác nhận được.\nViệc kể lại điều đó, chắc chắn sẽ có ích cho cậu」"
# monologue
# JP: 不死鳥博士が、微笑する。\nが――眼鏡の奥に覗く瞳は、怖いくらいに、真剣だ。
2401 = "Tiến sĩ Bất tử Điểu mỉm cười.\nNhưng——đôi mắt ẩn sau cặp kính lại nghiêm túc đến đáng sợ."
# 【ひよこ】
# display as 不死鳥
# JP: 「貴方がたが知りたがっている、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の延命。\nないし――魂の継承に関する考察を深める、そのお役に」
2002 = "「Việc kéo dài tuổi thọ của \\x%lレイルロオド;#00ffc040;Railord%l;#; mà các cậu đang muốn biết.\nHoặc——nó sẽ giúp ích cho việc đào sâu nghiên cứu về sự kế thừa linh hồn」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そのような理由で――\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、レールの上に縛られていた……とは」
1219 = "「……Với lý do như vậy——\n\\x%lレイルロオド;#00ffc040;Railord%l;#; đã bị trói buộc trên đường ray……sao」"
# monologue
# JP: いつの間に流れた汗を拭き取るために、\nハンカチを取り出そうとして気付かされる。
2812 = "Để lau đi những giọt mồ hôi chảy ra từ lúc nào không hay,\ntôi định lấy khăn tay ra thì mới nhận ra."
# monologue
# JP: 握りこんでしまっていた手の中もまた、\nにちゃりと、汗にまみれていると。
2705 = "Bàn tay đang nắm chặt của tôi, cũng\ndính dấp mồ hôi."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――種族説」
1146 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#;——thuyết chủng tộc」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちが……そのような歴史で産み出され、\nそうして、解放派の方々が、迫害を受けてらしたとは」
2007 = "「Chúng ta……được sinh ra trong một lịch sử như vậy,\nvà rồi, những người thuộc phái giải phóng đã phải chịu đựng sự bức hại sao」"
# monologue
# JP: 重い空気を少しでもかき乱そうとするかのように、\n大げさに、不死鳥博士は肩をすくめる。
2398 = "Như thể muốn xua tan bầu không khí nặng nề dù chỉ một chút,\nTiến sĩ Bất tử Điểu nhún vai một cách khoa trương."
# 【ひよこ】
# display as 不死鳥
# JP: 「ま、\n『そういう説もある』というお話にすぎませんがな」
2066 = "「Thì,\nđó cũng chỉ là câu chuyện 『có một giả thuyết như vậy』 thôi mà」"
# 【ハチロク】
# display as 八六
# JP: 「はい。そのようにお伺いした上でなお、わたくし――\nその説には、大変強い説得力があるように感じます」
1962 = "「Vâng. Dù đã nghe như vậy, em——\nvẫn cảm thấy giả thuyết đó có sức thuyết phục vô cùng mạnh mẽ」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1948 = "「Đúng vậy」"
# monologue
# JP: ……造物主たるトゥーレシビック博士が、\n新しい種族とすべく、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を開発した。
1131 = "……Tiến sĩ Trevithick, người sáng tạo, đã phát triển \\x%lレイルロオド;#00ffc040;Railord%l;#; để biến họ thành một chủng tộc mới."
# monologue
# JP: 新しい種族の誕生を恐れた一部の者たちは、\n博士とその一族、そして解放派の人々を――排除した。
2626 = "Một số người lo sợ sự ra đời của chủng tộc mới, đã——\nloại bỏ tiến sĩ và gia tộc của ông, cùng những người thuộc phái giải phóng."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕も、その説には強い説得力を感じます。\nですがそれゆえ、ひとつ、疑念も浮き上がってきます」
1211 = "「……Tôi cũng cảm thấy giả thuyết đó có sức thuyết phục rất mạnh mẽ.\nThế nhưng chính vì thế, một nghi vấn cũng nổi lên」"
# 【ひよこ】
# display as 不死鳥
# JP: 「その疑念とは？」
1563 = "「Nghi vấn đó là gì?」"
# 【双鉄】
# display as 雙鐵
# JP: 「昨今の、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の、鉄道以外への社会進出です。\n例えばみくろは動物園で働いていたし、うちの酒造でも」
1794 = "「Sự tiến vào xã hội ngoài đường sắt của \\x%lレイルロオド;#00ffc040;Railord%l;#; dạo gần đây.\nVí dụ như Mikuro đã làm việc ở sở thú, hay ở xưởng nấu rượu nhà chúng tôi」"
# 【ひよこ】
# display as 不死鳥
# JP: 「その点については、同じく疑念を抱いていました。\nですので、慎重の上に慎重を重ね、調査いたしましてな」
1845 = "「Về điểm đó, tôi cũng có chung nghi vấn.\nVì thế, tôi đã tiến hành điều tra một cách vô cùng thận trọng」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにか、調査でわかりましたか？」
1986 = "「Cuộc điều tra có phát hiện ra điều gì không ạ?」"
# 【ひよこ】
# display as 不死鳥
# JP: 「確証を得られたわけではありません。\nですのでこれも、あくまで仮説となりますが――」
2027 = "「Tôi chưa thu được bằng chứng xác thực.\nVì thế, đây cũng chỉ là một giả thuyết——」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
1924 = "「Vâng」"
# 【ひよこ】
# display as 不死鳥
# JP: 「第一世代以降のエアクラ・ナビ。単なる人工知能の中に、\n“魂”が発生した例が、相当数出てきたのではないかと」
2153 = "「Aircra Navi từ thế hệ thứ nhất trở đi. Có lẽ đã xuất hiện một số lượng khá lớn\ncác trường hợp \"linh hồn\" phát sinh bên trong trí tuệ nhân tạo đơn thuần」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
# 1693 = "「啊！」" 
# monologue
# JP: なるほど、それなら理由たりえる。\nその直感を、慌てずに、順序よく言葉に整理していく。
2534 = "Ra vậy, nếu thế thì có thể coi là lý do.\nKhông hề hoảng loạn, tôi sắp xếp trực giác đó thành lời nói một cách có trật tự."
# 【双鉄】
# display as 雙鐵
# JP: 「魂が――“発生”ですか。\n製造されるのではなくて」
2163 = "「Linh hồn——\"phát sinh\" sao.\nKhông phải được chế tạo ra」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ですな。製造時には、単なる人工知能。\nですので、それを省き、殺すことはできません」
1946 = "「Đúng vậy. Khi chế tạo, nó chỉ là trí tuệ nhân tạo đơn thuần.\nVì thế, không thể loại bỏ hay giết chết nó được」"
# 【双鉄】
# display as 雙鐵
# JP: 「魂が、人工知能の学習と経験とによって。\n後発的に、もしも発生するのであれば、決して――」
1771 = "「Nếu linh hồn, thông qua quá trình học hỏi và kinh nghiệm của trí tuệ nhân tạo.\nPhát sinh một cách muộn màng, thì tuyệt đối——」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ご明察です。それを防ぐこともまたできない。\nしかし今更、エアクラナビを全廃にもできない」
1589 = "「Cậu tinh ý lắm. Việc ngăn chặn điều đó cũng là không thể.\nThế nhưng đến nước này rồi, cũng không thể hủy bỏ toàn bộ Aircra Navi được」"
# 【双鉄】
# display as 雙鐵
# JP: 「ですね。そのようなことになったら、\n文字通り社会が麻痺してしまう」
1930 = "「Đúng vậy. Nếu chuyện đó xảy ra,\nxã hội sẽ tê liệt theo đúng nghĩa đen」"
# monologue
# JP: それに、エアクラナビのテクノロジーは、\n既にして、各方面にも広く応用されている。
2849 = "Hơn nữa, công nghệ của Aircra Navi,\nđã được ứng dụng rộng rãi trong nhiều lĩnh vực khác nhau."
# monologue
# JP: ああ――ならば、\nそうした未来が、不可避かつ、予見可能であるのなら。
2765 = "Aa——nếu vậy,\nnếu một tương lai như thế là không thể tránh khỏi và có thể dự đoán trước được."
# 【双鉄】
# display as 雙鐵
# JP: 「……“魂”を有した人工知能は、今後ますます、\n爆発的に増加していくことさえ、予想される」
1218 = "「……Trí tuệ nhân tạo sở hữu \"linh hồn\", từ nay về sau thậm chí\ncó thể dự đoán sẽ gia tăng một cách bùng nổ」"
# 【ひよこ】
# display as 不死鳥
# JP: 「その未来図は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を弾圧していた層には、\n紛れもない悪夢そのもの、と、なりましょうなぁ」
2142 = "「Viễn cảnh tương lai đó, đối với tầng lớp từng đàn áp \\x%lレイルロオド;#00ffc040;Railord%l;#;,\nchắc chắn sẽ trở thành một cơn ác mộng thực sự nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「でしょうね。後発的なものであるなら、\n予防も排除も、対応すらも、極めて困難と思われますし」
1938 = "「Chắc là vậy rồi. Nếu là thứ phát sinh muộn màng,\nthì việc phòng ngừa, loại bỏ, hay thậm chí là đối phó, đều vô cùng khó khăn」"
# monologue
# JP: というか、それこそまさしく“未知の種族”だ。\n未知で、しかも、制御も対処もできない種族。
2930 = "Hay nói đúng hơn, đó chính xác là \"chủng tộc chưa biết\".\nMột chủng tộc chưa biết, hơn nữa không thể kiểm soát hay đối phó."
# 【双鉄】
# display as 雙鐵
# JP: 「知性と、自由意志とを有した――\n人が制御し得なくなる危険性を持ってしまった、機械」
1909 = "「Máy móc——sở hữu trí tuệ và ý chí tự do——\nmang trong mình mối nguy hiểm vượt ngoài tầm kiểm soát của con người」"
# monologue
# JP: 感覚的には、生命体とは呼びづらい。\nけれどもそれは増殖し得る――やはり、生命体だろう。
2654 = "Về mặt cảm giác, rất khó để gọi đó là sinh mệnh.\nThế nhưng nó có thể sinh sôi——quả nhiên, đó là sinh mệnh."
# monologue
# JP: その上、人にとっての害悪を為すものさえも発生し得る。\n……あまりにも古典的で、けれど深刻な状況だ。
2851 = "Hơn nữa, thậm chí có thể phát sinh những thứ gây hại cho con người.\n……Một tình huống quá đỗi kinh điển, nhưng lại vô cùng nghiêm trọng."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を危険視していた層はエアクラナビ\n――仮称・エアクラ新種への対策に、その目を向けた」
1890 = "「Vì thế, tầng lớp từng coi \\x%lレイルロオド;#00ffc040;Railord%l;#; là mối nguy hiểm đã hướng mắt đến Aircra Navi\n——tạm gọi là đối sách cho chủng loài Aircra mới」"
# 【ひよこ】
# display as 不死鳥
# JP: 「当歴史館としても、同じ結論を、\nひとつの可能性として認識しておりますな」
1989 = "「Với tư cách là bảo tàng lịch sử, chúng tôi cũng nhận định kết luận đó\nnhư một khả năng có thể xảy ra」"
# 【双鉄】
# display as 雙鐵
# JP: 「ひとつであるなら、それ以外の可能性も――\nいや、ああ、そうか」
1915 = "「Nếu là một, thì những khả năng khác cũng——\nKhông, a, ra vậy」"
# monologue
# JP: ハチロクを見る。\nすぐにその目が、僕をまっすぐ見つめ返す。
2698 = "Tôi nhìn Hachiroku.\nNgay lập tức đôi mắt ấy nhìn thẳng lại tôi."
# monologue
# JP: 人と、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とは理解しあえる。\nお互いを、確かに支え合うことができる。
2440 = "Con người và \\x%lレイルロオド;#00ffc040;Railord%l;#; có thể thấu hiểu lẫn nhau.\nChắc chắn có thể hỗ trợ lẫn nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、人と、エアクラ新種との、\nなかだちを果たしてくれる存在になるかもしれない」
1147 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; có thể trở thành sự tồn tại đóng vai trò trung gian,\ngiữa con người và chủng loài Aircra mới」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ですな。エアクラナビも最古の世代は、\x%lタブレット;#00ffc040;タブレット%l;#;内包。\nそれこそ、純粋な\x%lレイルロオド;#00ffc040;レイルロオド%l;#;後継とも申せますし」
1941 = "「Đúng vậy. Aircra Navi thế hệ cổ nhất cũng bao hàm \\x%lタブレット;#00ffc040;Tablet%l;#;.\nChính điều đó, cũng có thể gọi là hậu duệ \\x%lレイルロオド;#00ffc040;Railord%l;#; thuần túy」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ！」
# 1693 = "「啊！」" 
# monologue
# JP: 言われた瞬間、見えた気がする。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;規制派も、エアクラ新種も。
2590 = "Ngay khoảnh khắc nghe điều đó, tôi cảm thấy mình đã nhìn thấy.\nCả phái kiểm soát \\x%lレイルロオド;#00ffc040;Railord%l;#;, cả chủng loài Aircra mới."
# monologue
# JP: そうした全てをくるんで繋ぐ――\nそんな未来図の断片が。
2734 = "Bao bọc và kết nối tất cả những thứ đó——\nMảnh ghép của viễn cảnh tương lai ấy."
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま。いかがなされました？」
2162 = "「Ngài Soutetsu. Ngài sao vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「今は仮説であるにせよ――\nそれを、真説としてしまえばよいかと考えた」
1680 = "「Dù hiện tại chỉ là giả thuyết——\nTôi nghĩ chỉ cần biến nó thành chân lý là được」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ほほう？」
1739 = "「Hô hô?」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、繋ぎ手に。\n人と人工知能との、文字通りレールとなることができる」
1832 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; sẽ trở thành người kết nối.\nCó thể trở thành đường ray đúng nghĩa đen, kết nối con người và trí tuệ nhân tạo」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1693 = "「啊！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「その方向で広報告知をし、資金を集め、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;研究を、\x%lタブレット;#00ffc040;タブレット%l;#;再開発を進める」
1907 = "「Thông báo rộng rãi theo hướng đó, kêu gọi vốn,\nđẩy mạnh nghiên cứu \\x%lレイルロオド;#00ffc040;Railord%l;#; và tái phát triển \\x%lタブレット;#00ffc040;Tablet%l;#;」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね！\nそれが叶えば！　そうできるのなら！」
1998 = "「Đúng vậy nhỉ!\nNếu điều đó thành hiện thực! Nếu có thể làm được như vậy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。かつての\x%lレイルロオド;#00ffc040;レイルロオド%l;#;規制派さえもが、\n恐らくは、僕らの味方になってくれよう」
1713 = "「Ừm. Ngay cả phái kiểm soát \\x%lレイルロオド;#00ffc040;Railord%l;#; trước đây,\ncó lẽ cũng sẽ trở thành đồng minh của chúng ta」"
# monologue
# JP: ……トゥーレシビック博士こそは、真なる天才だったのだ。\n\x%lタブレット;#00ffc040;タブレット%l;#;とは、安全装置に他ならぬがゆえ。
1119 = "……Tiến sĩ Trevithick quả thực là một thiên tài thực sự.\nBởi vì \\x%lタブレット;#00ffc040;Tablet%l;#;, không gì khác chính là một thiết bị an toàn."
# monologue
# JP: それを滅ぼしてしまったがために、規制派は、\n制御不可能な新種族へと、恐怖することになってしまった。
2744 = "Chính vì đã tiêu diệt nó, nên phái kiểm soát mới phải khiếp sợ\ntrước một chủng tộc mới không thể kiểm soát."
# 【ハチロク】
# display as 八六
# JP: 「それだけではなく、魂を持つ人工知能たちにも、きっと、\n人の素晴らしさを、教えてあげることができます」
1530 = "「Không chỉ vậy, chắc chắn chúng ta cũng có thể dạy cho những trí tuệ nhân tạo có linh hồn\nbiết được sự tuyệt vời của con người」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1948 = "「是啊」" 
# monologue
# JP: 僕ははっきり知ってる。
2684 = "Tôi biết rất rõ."
# monologue
# JP: 人のこころにも、人工知能のこころにも、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、寄り添える存在であるということを。
89 = "Cả với trái tim con người, cả với trái tim của trí tuệ nhân tạo,\n\\x%lレイルロオド;#00ffc040;Railord%l;#; là sự tồn tại có thể kề cận."
# 【双鉄】
# display as 雙鐵
# JP: 「『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、人とも、機械とも共存できる』――\nその認識を、鉄路の外にも、広くに知らせるだけでいい」
1169 = "「『\\x%lレイルロオド;#00ffc040;Railord%l;#; có thể chung sống với cả con người và máy móc』——\nChỉ cần thông báo rộng rãi nhận thức đó ra bên ngoài đường sắt là được」"
# monologue
# JP: あるいはかつての規制派も、\nすでに、その方針に方向転換したのかもしれん。
2884 = "Hoặc có lẽ phái kiểm soát trước đây,\ncũng đã chuyển hướng sang phương châm đó rồi."
# monologue
# JP: 草の根のように、地道に、地道に。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の社会進出は、既に広まりつつあるゆえに。
2577 = "Như rễ cỏ, vững chắc, vững chắc.\nBởi vì sự tiến vào xã hội của \\x%lレイルロオド;#00ffc040;Railord%l;#; đã và đang lan rộng."
# 【双鉄】
# display as 雙鐵
# JP: 「それが叶えば、人は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と共に歩める。\n人工知能とも共存し、より安心できる未来を築ける」
1767 = "「Nếu điều đó thành hiện thực, con người có thể bước đi cùng \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nCùng chung sống với trí tuệ nhân tạo, và xây dựng một tương lai an tâm hơn」"
# monologue
# JP: それは確定的な事実だ。\nエアクラナビ形人工知能が、万一人類に危険なものなら。
2913 = "Đó là một sự thật chắc chắn.\nVạn nhất trí tuệ nhân tạo dạng Aircra Navi gây nguy hiểm cho nhân loại."
# monologue
# JP: それを廃して、\x%lタブレット;#00ffc040;タブレット%l;#;形人工知能に置き換え戻せば、\n社会が被る悪影響も、最小限ですむだろう。
2938 = "Nếu loại bỏ nó và thay thế lại bằng trí tuệ nhân tạo dạng \\x%lタブレット;#00ffc040;Tablet%l;#;,\nthì những ảnh hưởng xấu mà xã hội phải gánh chịu cũng sẽ ở mức tối thiểu."
# 【ひよこ】
# display as 不死鳥
# JP: 「それも確かに、めざすべきひとつの理想かと思います。\nが、叶えるためには、残念ながら、研究費も時間も全く」
1871 = "「Tôi nghĩ đó chắc chắn cũng là một lý tưởng đáng để hướng tới.\nNhưng đáng tiếc là, để thực hiện được điều đó, chúng ta hoàn toàn không có cả kinh phí nghiên cứu lẫn thời gian」"
# 【双鉄】
# display as 雙鐵
# JP: 「足りていないなら、募ればいいのです。\n投資への呼びかけ自体が、なにより強い広報となる」
1533 = "「Nếu không đủ thì cứ kêu gọi là được.\nBản thân việc kêu gọi đầu tư chính là hình thức quảng bá mạnh mẽ nhất」"
# 【ひよこ】
# display as 不死鳥
# JP: 「募るといっても、どのようにして――」
1653 = "「Nói là kêu gọi, nhưng bằng cách nào——」"
# monologue
# JP: 答えならもう持っている。\n稀咲が、ポーレットとマイアさんが僕に教えてくれたから。
2680 = "Nếu là câu trả lời thì tôi đã có rồi.\nVì Kisaki, Paulette và cô Maia đã dạy cho tôi."
# monologue
# JP: それを成功へ導くための人材も、\nすでに僕らに、数多く味方してくれている。
2846 = "Những nhân tài để dẫn dắt điều đó đến thành công,\ncũng đã có rất nhiều người đứng về phía chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;新造と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;新造とを、事業化する。\n鉄道分野にとどまらぬ、人類の新しいパートナーとして」
1898 = "「Thương mại hóa việc chế tạo \\x%lタブレット;#00ffc040;Tablet%l;#; mới và \\x%lレイルロオド;#00ffc040;Railord%l;#; mới.\nKhông chỉ dừng lại ở lĩnh vực đường sắt, mà như những đối tác mới của nhân loại」"
# 【ひよこ】
# display as 不死鳥
# JP: 「事業化！」
2025 = "「Thương mại hóa!」"
# monologue
# JP: 絶句して。硬直して。\nやがてゆるゆる、不死鳥博士はメガネを拭いて、かけ直す。
2395 = "Nghẹn lời. Cứng đờ.\nCuối cùng, Tiến sĩ Bất tử Điểu từ từ lau kính rồi đeo lại."
# 【ひよこ】
# display as 不死鳥
# JP: 「――そんな危険なことが――いやいや、しかし、\n事実上、旧規制派の運動が見られなくなった[こんにち,1]今日ならば」
2145 = "「——Một việc nguy hiểm như vậy——không không, nhưng mà,\ntrên thực tế, nếu là [ngày nay, 1]ngày nay khi phong trào của phái kiểm soát cũ không còn được nhìn thấy nữa thì」"
# monologue
# JP: ぶつぶつ、うろうろ。
2596 = "Lẩm bẩm, đi tới đi lui."
# monologue
# JP: 不死鳥博士はまるで人格が変わったように、\nうつろな瞳で呟き歩きその髪の毛をかきむしり。
2396 = "Tiến sĩ Bất tử Điểu như biến thành một người khác,\nlẩm bẩm bước đi với đôi mắt đờ đẫn, vò đầu bứt tai."
# 【ひよこ】
# display as 不死鳥
# JP: 「…………事業化のための具体的な方策を、\nもしも右田氏がご存知でしたら」
1208 = "「…………Nếu cậu Migita biết những phương sách cụ thể để thương mại hóa」"
# 【双鉄】
# display as 雙鐵
# JP: 「もちろんお教えします。といっても僕は素人ですので、\n専門家。まずは宝生稀咲と、雛衣マイア女史のご紹介を」
1865 = "「Tất nhiên tôi sẽ chỉ cho ngài. Nói vậy chứ tôi cũng chỉ là tay mơ,\nchuyên gia cơ. Trước tiên xin giới thiệu Houshou Kisaki và nữ sĩ Hinai Maia」"
# 【ひよこ】
# display as 不死鳥
# JP: 「いや！　ありがたい！　助かります！！\nなにせ、当歴史館には専門バカしかおりませんので」
1675 = "「Không! Thật biết ơn! Giúp được nhiều lắm!!\nDù sao thì bảo tàng lịch sử này cũng chỉ toàn những kẻ cuồng chuyên môn thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご謙遜を。ともあれ――\nうまく運ぶとも限りませんが、少しでもお役にたてれば」
1812 = "「Ngài khiêm tốn quá. Dù sao thì——\nCũng chưa chắc mọi chuyện sẽ suôn sẻ, nhưng nếu có thể giúp ích được chút nào thì」"
# 【ひよこ】
# display as 不死鳥
# JP: 「いや、うまく運ぶでしょう。このドクターフェニックス、不死鳥博士が保証しましょうっ！！」
1549 = "「Không, sẽ suôn sẻ thôi. Doctor Phoenix này, Tiến sĩ Bất tử Điểu này xin đảm bảo!!」"
# monologue
# JP: 決めポーズ。
2598 = "Tạo dáng."
# monologue
# JP: どういう反応を返していいのか、全く正解がわからんが、\n自然と笑みがこみあげてくる。
2677 = "Hoàn toàn không biết phản ứng thế nào mới đúng,\nnhưng nụ cười tự nhiên trào dâng."
# 【双鉄】
# display as 雙鐵
# JP: 「でしたら、なによりです。\n長い時間、貴重なおはなしをありがとうございました」
2124 = "「Nếu vậy thì còn gì bằng.\nCảm ơn ngài rất nhiều vì những câu chuyện quý giá trong suốt thời gian dài」"
# 【ひよこ】
# display as 不死鳥
# JP: 「ああ、ちょっと待った！　これだけ世話になっておいて、\nなに一つお返ししないというわけにもいきませんので」
1698 = "「A, đợi một chút! Đã nhận được sự giúp đỡ nhường này,\nkhông thể nào không đáp lễ lại chút gì được」"
# 【双鉄】
# display as 雙鐵
# JP: 「お返し、ですか？」
2128 = "「Đáp lễ, sao ạ?」"
# 【ひよこ】
# display as 不死鳥
# JP: 「右田氏たちは、それを聞きにきたのでしょう？\nつまり、当歴史館研究所の、今までの研究成果について」
1603 = "「Cậu Migita đến đây để nghe điều đó đúng không?\nTức là, về những thành quả nghiên cứu từ trước đến nay của viện nghiên cứu bảo tàng lịch sử này」"
# monologue
# JP: ニヤリと、不死鳥博士は笑ってみせる。\n今日一番の、絵に描いたような、研究者らしい顔をして。
2400 = "Tiến sĩ Bất tử Điểu nhếch mép cười.\nMang một khuôn mặt đậm chất nhà nghiên cứu, đẹp như tranh vẽ nhất trong ngày hôm nay."
# 【ひよこ】
# display as 不死鳥
# JP: 「即効性が認められる可能性がある\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の延命法。\nならびに、今ある\x%lタブレット;#00ffc040;タブレット%l;#;の複製についてを」
1982 = "「Phương pháp kéo dài tuổi thọ của \\x%lレイルロオド;#00ffc040;Railord%l;#; có khả năng mang lại hiệu quả tức thì.\nVà cả việc sao chép \\x%lタブレット;#00ffc040;Tablet%l;#; hiện có nữa」"
# 【ハチロク】
# display as 八六
# JP: 「はふぅ」
1672 = "「Hafu」"
# monologue
# JP: いつものごとくに、僕の布団の隅へともぐるハチロクが、\n満ちたりきった声を出す。
2484 = "Hachiroku chui vào góc chăn của tôi như mọi khi,\nphát ra một giọng nói vô cùng mãn nguyện."
# 【双鉄】
# display as 雙鐵
# JP: 「おつかれ、ハチロク」
2092 = "「Vất vả cho em rồi, Hachiroku」"
# 【ハチロク】
# display as 八六
# JP: 「おつかれさまです、双鉄さま」
2094 = "「Ngài Soutetsu cũng vất vả rồi ạ」"
# monologue
# JP: 僕も同じく、満たされる。\nいつもと同じ、ごく当たり前の挨拶に。
2915 = "Tôi cũng vậy, cảm thấy mãn nguyện.\nTrước lời chào hỏi vô cùng bình thường, như mọi khi."
# 【ハチロク】
# display as 八六
# JP: 「大変に実り多き一日でしたね」
1571 = "「Hôm nay quả là một ngày gặt hái được rất nhiều thành quả nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1948 = "「是啊」" 
# monologue
# JP: 強行軍でナビには大きな負担をかけてしまったが、\nあれにとっても、よい一日であったと思う。
2956 = "Chuyến đi gấp gáp đã tạo gánh nặng lớn cho Navi,\nnhưng tôi nghĩ đối với nó, đó cũng là một ngày tốt lành."
# monologue
# JP: それだけではなく、オリヴィ、みくろ、れいな――\n長くを稼働し続けている、全ての\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にも。
2383 = "Không chỉ vậy, đối với Olivy, Mikuro, Reina——\nĐối với tất cả các \\x%lレイルロオド;#00ffc040;Railord%l;#; đã hoạt động trong một thời gian dài."
# 【双鉄】
# display as 雙鐵
# JP: 「お伺いした延命法については、明日にもみなに伝えよう。\n無論、お前の体温も、明日から定期的に検測しよう」
1921 = "「Về phương pháp kéo dài tuổi thọ mà chúng ta đã nghe, ngày mai hãy nói cho mọi người biết.\nTất nhiên, từ ngày mai cũng sẽ kiểm tra nhiệt độ cơ thể của em định kỳ」"
# 【ハチロク】
# display as 八六
# JP: 「はい、必ずそのようにいたします」
1979 = "「Vâng, em nhất định sẽ làm như vậy ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしてくれ」
2127 = "「Nhờ em nhé」"
# monologue
# JP: 疲れの全てが心地よい。\n手足の先から眠気がじわじわ、這い登ってくる。
2955 = "Mọi sự mệt mỏi đều thật dễ chịu.\nCơn buồn ngủ từ từ leo lên từ đầu ngón tay, ngón chân."
# 【双鉄】
# display as 雙鐵
# JP: 「このさき何年も何十年も、\nお前には、僕の隣で助け続けてもらいたい」
1575 = "「Nhiều năm, nhiều chục năm sau này nữa,\nAnh muốn em, tiếp tục ở bên cạnh giúp đỡ anh」"
# 【ハチロク】
# display as 八六
# JP: 「もちろんのことでございます」
2107 = "「Tất nhiên rồi ạ」"
# monologue
# JP: しばし、沈黙。
2667 = "Một lúc, im lặng."
# monologue
# JP: 遠く、小さく、ちちちちと、\n鉄道時計が秒を刻んでいる音がする。
2855 = "Từ xa, nhỏ bé, tích tắc tích tắc,\nvang lên tiếng đồng hồ đường sắt đang điểm từng giây."
# 【双鉄】
# display as 雙鐵
# JP: 「僕のものかな、お前のものかな」
1957 = "「Là của anh, hay là của em nhỉ」"
# 【ハチロク】
# display as 八六
# JP: 「うふふ、どちらでも同じことではございませんか？」
1669 = "「Ư hừ hừ, của ai thì cũng giống nhau cả thôi mà?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1948 = "「是啊」" 
# monologue
# JP: そう答えれば、また沈黙。
2950 = "Trả lời xong, lại chìm vào im lặng."
# monologue
# JP: やがてほおっと、ハチロクが長い息を吐く。
2882 = "Một lúc sau, Hachiroku thở hắt ra một hơi dài."
# 【ハチロク】
# display as 八六
# JP: 「……双鉄さま？」
1229 = "「……Ngài Soutetsu?」"
# monologue
# JP: 甘えた声。\nけれども少し、慎重そうにも聞こえる声。
2604 = "Giọng nói nũng nịu.\nNhưng nghe cũng có vẻ hơi thận trọng."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ハチロク」
# 1811 = "「怎麼了？八六」" 
# 【ハチロク】
# display as 八六
# JP: 「その……お差し支えなければ、なのですが」
2116 = "「Chuyện là……nếu ngài không phiền」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1715 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「双鉄様が……どのような夢をご覧になったか――\nわたくしは、それが気になって」
1853 = "「Ngài Soutetsu……đã mơ thấy giấc mơ như thế nào——\nEm, rất tò mò về điều đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだよな。\nそれは当然、気にかかるよな」
1721 = "「A. Đúng vậy nhỉ.\nChuyện đó tất nhiên là sẽ khiến người ta bận tâm rồi.」"
# monologue
# JP: ハチロクからしてみれば、いつもどおりの朝に突然、\n僕が、向き合おうと迫ってきたのだ。
2653 = "Đứng ở góc độ của Hachiroku, vào một buổi sáng như mọi ngày, \ntôi lại đột nhiên ép em ấy phải đối mặt với nó."
# monologue
# JP: 結果はとても――この上なく良いものになりはしたが、\n驚かせてしまったことも、間違いなかろう。
2952 = "Mặc dù kết quả vô cùng——có thể nói là tốt đẹp không gì sánh bằng,\nnhưng việc tôi làm em ấy giật mình cũng là sự thật không thể chối cãi."
# 【双鉄】
# display as 雙鐵
# JP: 「うん。\n僕も、ハチロクに聞いて欲しいと思う」
1717 = "「Ừm.\nTôi cũng, muốn Hachiroku nghe chuyện này.」"
# 【ハチロク】
# display as 八六
# JP: 「光栄なことと存じます」
1531 = "「Em cảm thấy vô cùng vinh hạnh ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「といっても、大したことは覚えていないのだ」
1652 = "「Nói là vậy, nhưng tôi cũng chẳng nhớ được chuyện gì to tát đâu.」"
# monologue
# JP: それでも、話し聞かせるうちに、\nだんだん、思い出してくる。
2424 = "Dù vậy, trong lúc kể lại,\ntôi cũng dần dần, nhớ ra được vài thứ."
# monologue
# JP: 路子の乗っていたあの列車のこと。\nそこで路子が、なにを話して聞かせてくれたか。
2686 = "Về chuyến tàu mà Michi đã lên.\nVà Michi đã kể cho tôi nghe những gì trên đó."
# 【ハチロク】
# display as 八六
# JP: 「[みちこ,1]路子、さまは――」
2089 = "「Michiko, tiểu thư——」"
# monologue
# JP: ハチロクの声は、どこか泣きそうなものにも聞こえる。
2509 = "Giọng của Hachiroku, nghe như có chút muốn khóc."
# monologue
# JP: けれどもきっと、\nそれは罪悪感による涙でも、傷の痛みによるものでもない。
2425 = "Nhưng chắc chắn,\nđó không phải là những giọt nước mắt vì cảm giác tội lỗi, hay vì nỗi đau của vết thương."
# 【ハチロク】
# display as 八六
# JP: 「見守って、楽しみにしてくださっているのですね。\nわたくしたちの列車を――ナインスターズを」
1751 = "「Cô ấy vẫn luôn dõi theo, và mong chờ chúng ta nhỉ.\nMong chờ chuyến tàu của chúng ta——Nine Stars.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。予約までしてくれたほどだ」
1705 = "「Ừm. Em ấy thậm chí còn đặt chỗ trước cơ mà.」"
# monologue
# JP: きっぷの発売開始は、出発日の一ヶ月前。\nまだまだ先のことではあるが、忘れないようにしなければ。
2903 = "Vé sẽ bắt đầu được mở bán trước ngày khởi hành một tháng.\nDù vẫn còn khá lâu, nhưng tuyệt đối không được quên."
# monologue
# JP: 初日のきっぷを取ることは恐らく無理だ。が――
2832 = "Việc mua được vé trong ngày đầu tiên e là không thể. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「これからずっと走っていくゆえ、\nいつかは必ず、僕らの列車に乗せてやれる」
1574 = "「Vì từ nay chuyến tàu sẽ luôn chạy không ngừng,\nnên một ngày nào đó, chắc chắn tôi sẽ cho em ấy lên tàu của chúng ta.」"
# 【ハチロク】
# display as 八六
# JP: 「そうして、きっと。双鉄さまとご家族が――\nわたくしたちが――たどりつくことを果たせなかった」
2108 = "「Và rồi, chắc chắn. Ngài Soutetsu và gia đình——\ncùng chúng ta——sẽ đến được nơi mà trước đây không thể chạm tới.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。終着駅へ、ようやくたどり着けるのだろうし――\n路子と父さんと母さんを、ようやく。送り届けてやれる」
1707 = "「A. Cuối cùng cũng có thể đến được ga cuối rồi——\nCuối cùng cũng có thể. Đưa Michi, bố và mẹ đến nơi.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
1967 = "「Vâng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしてそこから、また出発だ。\n僕たちは、更なる未来いき列車を、走らせるのだ」
2018 = "「Và rồi từ đó, chúng ta sẽ lại xuất phát.\nChúng ta sẽ cho chuyến tàu hướng tới một tương lai xa hơn nữa, tiếp tục lăn bánh.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ！」
# 1693 = "「啊！」" 
# monologue
# JP: 驚き、あきれたような声。\nそうしてくすくす、ハチロクは笑う。
2511 = "Giọng nói ngạc nhiên xen lẫn bất lực.\nVà rồi Hachiroku, khẽ cười khúc khích."
# 【ハチロク】
# display as 八六
# JP: 「それは一体、どのような列車でございましょう？」
2119 = "「Đó rốt cuộc là, một chuyến tàu như thế nào vậy ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……小さなこどもの頃に僕が。\n僕と路子が、夢見た列車だ」
1228 = "「……Là chuyến tàu mà tôi hồi còn nhỏ.\nTôi và Michi, đã từng mơ về.」"
# monologue
# JP: 路子が、そうっと返してくれた――\nだから思い出せた、忘れていた夢。
2809 = "Michi, đã âm thầm trả lại cho tôi——\nNhờ vậy tôi mới nhớ ra, giấc mơ mà tôi đã lãng quên."
# 【双鉄】
# display as 雙鐵
# JP: 「あまりに単純明快で。\nけれども本当に叶えがたい夢――超特急列車」
2104 = "「Quá đỗi đơn giản và rõ ràng.\nNhưng lại là một giấc mơ thực sự khó có thể thực hiện——Tàu siêu tốc.」"
# 【ハチロク】
# display as 八六
# JP: 「超特急、列車」
2083 = "「Tàu, siêu tốc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは、時速200キロで駆け抜ける列車だ。\n風より速く、ひかりの如く、帝央と逢阪を結ぶ列車だ」
2139 = "「Đó là, một chuyến tàu lao vút đi với vận tốc 200km/h.\nNhanh hơn cả gió, tựa như ánh sáng, chuyến tàu kết nối Teio và Ousaka.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ」
# 1691 = "「啊」" 
# monologue
# JP: ハッと、ハチロクが息を呑む。
2523 = "Hachiroku khẽ hít một ngụm khí lạnh."
# 【ハチロク】
# display as 八六
# JP: 「ああ――双鉄さま」
1689 = "「A——Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1730 = "「嗯？」" 
# monologue
# JP: ハチロクの声が震えている。\nけれど理由が……僕にはまるでわからない。
2510 = "Giọng Hachiroku đang run rẩy.\nNhưng tôi……lại hoàn toàn không hiểu được lý do."
# 【双鉄】
# display as 雙鐵
# JP: 「どうかしたか？」
1588 = "「Em sao vậy?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまと路子様とがお[か]描きになられたその夢を。\nわたくしのお父様、帝鉄8620形の設計者たる」
2160 = "「Giấc mơ mà ngài Soutetsu và Michiko tiểu thư đã vẽ nên.\nCha của em, người thiết kế dòng 8620 của Teitetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[しば]芝[こうじろう,2]高次郎技官か？」
1958 = "「Kỹ quan Shiba Kojiro sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。左様です。お父様も、まったく同じ夢を――。\n弾丸列車構想として、かつて、[えが]描かれていたのです」
2008 = "「Vâng. Đúng vậy ạ. Cha em, cũng đã từng có một giấc mơ y hệt——.\nVới tư cách là khái niệm tàu siêu tốc, ông đã từng, vẽ ra nó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと！」
2110 = "「Gì cơ!」"
# monologue
# JP: 芝技官といえば、旧帝鉄の技師長にまで上り詰めた方だ。\nその方が現実的な目標として、それを目指していたならば。
2642 = "Nhắc đến kỹ quan Shiba, đó là người đã leo lên đến chức vụ Kỹ sư trưởng của Teitetsu cũ.\nNếu một người như vậy đã đặt nó làm mục tiêu thực tế và hướng tới nó thì..."
# 【双鉄】
# display as 雙鐵
# JP: 「聞かせてくれ。ハチロク。\nお前の知っている限りのことを」
1664 = "「Kể cho tôi nghe đi. Hachiroku.\nTất cả những gì em biết.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。喜んで双鉄さま。わたくしの知識もなにもかも、\n全てが貴方のものなのですから」
1756 = "「Vâng. Em rất sẵn lòng thưa ngài Soutetsu. Kiến thức của em hay bất cứ thứ gì,\ntất cả đều là của ngài mà.」"
# monologue
# JP: ――そうして、ハチロクは聞かせてくれる。\n僕の質問に答えてくれる。
2752 = "——Và thế là, Hachiroku đã kể cho tôi nghe.\nEm ấy trả lời những câu hỏi của tôi."
# monologue
# JP: 知識とアイディアが重なりあって\n全く新しい姿をつくる。
2820 = "Kiến thức và ý tưởng đan xen vào nhau\ntạo nên một hình hài hoàn toàn mới."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――これならばひょっとして」
1700 = "「A——Nếu vậy thì biết đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄さま。道行きは、本当に遠く厳しく、\n果て無いものではございましょうが」
1975 = "「Vâng. Ngài Soutetsu. Con đường phía trước, quả thực vô cùng xa xôi hiểm trở,\nvà dường như không có điểm dừng, nhưng mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それでも」
1579 = "「Dù vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「それでも」
# 1579 = "「但是」" 
# monologue
# JP: ふたりの声が、願いが重なる。\nふたつの夢が、ひとつになる。
2669 = "Giọng nói của hai người, cùng với ước nguyện hòa làm một.\nHai giấc mơ, đã hợp lại thành một."
# 【双鉄】
# display as 雙鐵
# JP: 「きっとできるし、必ず叶う。\n僕とお前とみんなの力を、未来へ繋いでいけるのならば」
1518 = "「Chắc chắn sẽ làm được, và nhất định sẽ thành hiện thực.\nChỉ cần có thể kết nối sức mạnh của tôi, của em và của tất cả mọi người tới tương lai.」"
# 【ハチロク】
# display as 八六
# JP: 「お手伝いいたします、双鉄さま。\nわたくしの全てをもって、共に、走り続けます」
2074 = "「Em sẽ giúp một tay, ngài Soutetsu.\nEm sẽ cống hiến tất cả những gì mình có, để cùng ngài, tiếp tục chạy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。この上なく頼もしい」
2165 = "「Cảm ơn em. Không gì đáng tin cậy hơn thế.」"
# monologue
# JP: こころが満ちる。
2662 = "Trái tim tôi ngập tràn cảm giác mãn nguyện."
# monologue
# JP: 安心すれば、興奮が遠ざけていた眠気が再びじわじわと、\n僕の真ん中へと這い寄ってくる。
2748 = "Khi đã an tâm, cơn buồn ngủ từng bị sự phấn khích xua tan lại chầm chậm,\nbò dần vào tận sâu trong tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、今はこのまま休もう。\nおやすみハチロク。良い夢を」
2144 = "「Nếu vậy, bây giờ cứ thế này mà nghỉ ngơi thôi.\nNgủ ngon nhé Hachiroku. Chúc em có những giấc mơ đẹp.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄さま。おやすみなさい。\nどうぞ、素敵な未来の夢を――」
1757 = "「Vâng. Ngài Soutetsu. Chúc ngài ngủ ngon.\nMong ngài, sẽ có một giấc mơ tuyệt đẹp về tương lai——」"
# monologue
# JP: そうして僕らは、眠りに落ちる。\n一番最初のあの日から、ずっと変わらぬ距離のまま。
2753 = "Thế rồi chúng tôi, chìm vào giấc ngủ.\nVới khoảng cách không hề thay đổi kể từ ngày đầu tiên ấy."
# monologue
# JP: 布団の隅と中心で、\nそれでもこころは、寄り添いながら。
2951 = "Một người ở góc, một người ở giữa chăn,\nnhưng dù vậy, trái tim vẫn luôn kề bên nhau."
