[script]
# lines: 449 
# 【凪】
# display as 凪
# JP: 「あ、にーさんばい！　撮って撮って」
1846 = "「A, anh hai ơi! Chụp đi, chụp cho em đi」"

# 【れいな】
# display as 玲奈
# JP: 「わぁ、いいですねぇ。\n双鉄さんにお写真、わたしもとってほしいですぅ」
1805 = "\"Oa, tuyệt quá đi ạ.\\nEm cũng muốn được anh Soutetsu chụp ảnh cho nữa\""

# monologue
# JP: 窓から大きく手が振られる。
2553 = "Một bàn tay vẫy thật mạnh từ khung cửa sổ."

# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;の中には立ち入らぬように努めていたが、\nこうも無邪気に名指しされては無視も出来ない。
2994 = "Tôi đã cố gắng không bước vào bên trong \\x%ltoa khách;#00ffc040;toa khách%l;#;,\\nnhưng bị gọi đích danh một cách ngây thơ thế này thì chẳng thể làm ngơ được."

# 【ふかみ】
# display as 深美
# JP: 「双鉄さん、あの――\n今日は乗せてくれてありがとう、です」
2271 = "\"Anh Soutetsu, chuyện là--\\nCảm ơn anh vì đã cho em đi cùng chuyến tàu hôm nay, ạ\""

# 【双鉄】
# display as 雙鐵
# JP: 「いや、こちらこそ乗ってくれてありがとう」
1812 = "\"Không, anh mới là người phải cảm ơn em vì đã đi cùng\""

# monologue
# JP: 凪、ふかみ、そしてれいなにポーレット。\n試験運転の\x%l客車;#00ffc040;客車%l;#;側メンバーは、全員出席してくれている。
2550 = "Nagi, Fukami, Reina và cả Paulette.\\nTất cả thành viên phụ trách phía \\x%ltoa khách;#00ffc040;toa khách%l;#; cho chuyến chạy thử nghiệm đều đã có mặt đông đủ."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとれいなには、\nかなり神経を使わせてしまうと思うが、よろしく頼む」
1970 = "\"Với Paulette và Reina, anh nghĩ sẽ phải khiến hai em khá căng thẳng đấy,\\nnhưng nhờ cả hai nhé\""

# monologue
# JP: 湯医駅には、\x%l転車台;#00ffc040;転車台%l;#;が無い。
2810 = "Ga Yui không có \\x%lbàn xoay;#00ffc040;bàn xoay%l;#;."

# monologue
# JP: 代替として、\x%l三角線;#00ffc040;[さんかくせん,2]三角線%l;#;という折り返しのための線路を\n大至急扱いで増設を予定してるとのことだが――
2496 = "Thay vào đó, họ dự kiến sẽ khẩn cấp xây thêm một đoạn đường ray để quay đầu gọi là \\x%ldường tam giác;#00ffc040;đường tam giác%l;#;—"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんこそ、大変じゃないですか？\nいきなりの三両\x%l編成;#00ffc040;編成%l;#;で」
1978 = "\"Chẳng phải chính anh Soutetsu mới là người vất vả sao?\\nĐột nhiên phải điều khiển cả \\x%lđoàn tàu;#00ffc040;đoàn tàu%l;#; ba toa như vậy\""

# 【双鉄】
# display as 雙鐵
# JP: 「そこは、ハチロクのフォローもある。\n二両も三両も、僕のやることに大差はない」
2221 = "\"Về phần đó thì đã có Hachiroku hỗ trợ rồi.\\nViệc chạy hai toa hay ba toa đối với anh cũng không khác biệt lắm đâu\""

# monologue
# JP: 機関車単機なら単純な後進――バック運転で戻れるが、\n\x%l客車;#00ffc040;客車%l;#;を押してバックするのは、負担が大きくなるそうだ。
2580 = "Nếu chỉ có đầu máy đơn lẻ thì có thể lùi về—chạy lùi đơn giản, nhưng\\nviệc đẩy \\x%ltoa khách;#00ffc040;toa khách%l;#; để lùi lại sẽ gây áp lực rất lớn."

# monologue
# JP: ゆえ、\x%l8620;#00ffc040;8620%l;#;-\x%l客車;#00ffc040;客車%l;#;-\x%lキハ07;#00ffc040;キハ07%l;#;と連結し、御一夜駅への戻りには、\n\x%lキハ07;#00ffc040;キハ07%l;#;に牽引をお願いすることとなる。
2720 = "Do đó, đoàn tàu sẽ được nối theo thứ tự \\x%l8620;#00ffc040;8620%l;#;-\\x%ltoa khách;#00ffc040;toa khách%l;#;-\\x%lKiha 07;#00ffc040;Kiha 07%l;#;, và khi trở về ga Onihito,\\nchúng ta sẽ nhờ \\x%lKiha 07;#00ffc040;Kiha 07%l;#; đảm nhận việc kéo tàu."

# 【ポーレット】
# display as 波萊特
# JP: 「それは、わたしたちも同じですよ？\n二両も三両も、引っ張るのに大差ありません」
2165 = "\"Điều đó đối với bọn em cũng vậy thôi ạ?\\nKéo hai toa hay ba toa cũng chẳng khác biệt là bao\""

# 【れいな】
# display as 玲奈
# JP: 「そうですよぉ？　れいな、こうみえても\n力持ちなんですからぁ」
2071 = "\"Đúng đó ạ? Nhìn Reina thế này thôi\\nchứ em khỏe lắm đấy nhé\""

# 【双鉄】
# display as 雙鐵
# JP: 「頼もしいな。よろしく頼む」
2153 = "“Đáng tin cậy thật đấy. Nhờ cả vào hai người nhé.”"

# 【ポーレット】
# display as 波萊特
# JP: 「行きは、わたしたちも\x%l客車;#00ffc040;客車%l;#;乗車をするんですよね？」
1966 = "“Chiều đi, chúng em cũng sẽ lên toa \\x%l客車;#00ffc040;toa hành khách%l;#; đúng không ạ?”"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ふたりには専門家としてのチェックを頼みたい」
1887 = "“Phải, anh muốn nhờ hai người kiểm tra với tư cách là chuyên gia.”"

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
1696 = "“Em đã rõ.”"

# 【れいな】
# display as 玲奈
# JP: 「れいな、がんばりますですよぉ！」
2096 = "“Reina sẽ cố gắng hết sức ạ!”"

# monologue
# JP: 水を得た魚。
2622 = "Như cá gặp nước."

# monologue
# JP: 自信満々なれいなとポーレットに引き換え、\nふかみはまるで、俎上の鯉のごとくに不安げだ。
2914 = "Trái ngược với vẻ tự tin của Reina và Paulette, \\nFukami trông bất an chẳng khác nào cá nằm trên thớt."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとれいなの、専門家としての目だけでなく、\n一般客に近い目からのレビューも欲しいと考えている」
1986 = "“Anh không chỉ muốn nhờ đôi mắt chuyên gia của Paulette và Reina, \\nmà còn muốn cả những nhận xét từ góc nhìn của một hành khách thông thường nữa.”"

# 【ふかみ】
# display as 深美
# JP: 「はい。です」
2034 = "“Vâng. Em hiểu rồi ạ.”"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、できれば緊張せず、\n普通に楽しんで、感想を聞かせてもらえれば嬉しい」
1996 = "“Thế nên, nếu có thể, anh rất vui nếu hai em đừng quá căng thẳng, \\nhãy cứ tận hưởng và cho anh biết cảm nhận của mình.”"

# 【ふかみ】
# display as 深美
# JP: 「はい。です。わたし――\n力まないで。感想、すごく、双鉄さんに伝えます、です」
1905 = "“Vâng. Em hiểu. Em sẽ――\\nKhông gồng mình nữa ạ. Em sẽ truyền đạt lại cảm nhận, thật chân thật, cho anh Soutetsu.”"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1865 = "“Ừ.”"

# monologue
# JP: どうみてもふかみは力みまくってしまっているが、\n凪と一緒だ、すぐに普段のふかみに戻ってくれるだろう。
2803 = "Dù nhìn thế nào thì Fukami vẫn đang quá gồng mình, \\nnhưng vì có Nagi ở đó, chắc cô ấy sẽ sớm trở lại là Fukami thường ngày thôi."

# monologue
# JP: ああ、いや、そうか。\n緊張をほぐしてやるためにも――
2888 = "À, không, đúng rồi. \\nĐể giúp cô ấy thư giãn hơn――"

# 【双鉄】
# display as 雙鐵
# JP: 「リクエストされていたな。\n写真を撮るから、並んで、笑ってくれ」
2011 = "“Anh có nhận được yêu cầu rồi. \\nAnh sẽ chụp ảnh, nên hai người đứng vào đây và cười lên nào.”"

# 【ポーレット】
# display as 波萊特
# JP: 「あ――嬉しいですけど、\n時間、大丈夫なんですか？」
1854 = "\"À――vui thật đấy, nhưng mà\\nthời gian, có ổn không ạ?\""

# 【双鉄】
# display as 雙鐵
# JP: 「――うむ」
# 1865 = "「嗯」" 

# monologue
# JP: まだ二十分近く余裕があるし、\n僕の担当箇所ならばもう、きっちり点検を終えている。
2973 = "Vẫn còn dư gần hai mươi phút, và\\nphần việc của anh thì đã kiểm tra xong xuôi cả rồi."

# monologue
# JP: そうでなければ、\nカメラを持ってぶらつきなどはとても出来ない。が――
2918 = "Nếu không thì,\\nanh đã chẳng thể nào mang máy ảnh đi dạo lòng vòng như thế này được. Thế nhưng――"

# 【双鉄】
# display as 雙鐵
# JP: 「準備をしすぎてしすぎるということもない。\n撮ったら、すぐに戻るさ」
2080 = "\"Chuẩn bị kỹ lưỡng bao nhiêu cũng không bao giờ là thừa.\\nChụp xong, anh sẽ quay lại ngay.\""

# monologue
# JP: ――緊張し過ぎも、緩みすぎもよろしくない。
2659 = "――Quá căng thẳng hay quá buông lỏng đều không tốt."

# monologue
# JP: ポーレットの声で引き締めなおし、けれども今は、\nふかみの緊張を解くためにも、できるかぎりの笑顔でいる。
2795 = "Dùng lời của Paulette để tự xốc lại tinh thần, nhưng lúc này,\\nđể giúp Fukami bớt căng thẳng, anh vẫn luôn giữ nụ cười hết mức có thể."

# 【双鉄】
# display as 雙鐵
# JP: 「で、どうする？　そのままか？\nそれとも、記念写真風に撮るか？」
2256 = "\"Rồi, em tính sao? Cứ để nguyên như vậy à?\\nHay là chụp theo kiểu ảnh kỷ niệm?\""

# 【ふかみ】
# display as 深美
# JP: 「わ！　あ――ちょっとだけ待ってください。です」
1798 = "\"Oa! À――chờ em một chút xíu thôi ạ. Chỉ một chút thôi!\""

# monologue
# JP: わたわた、ふかみが身体を縮めて\n何やらポーチをいじり始める。
2805 = "Lúng túng, Fukami co người lại\\nvà bắt đầu lục lọi gì đó trong túi nhỏ."

# 【凪】
# display as 凪
# JP: 「ふかみちゃーん、髪の毛なんていじっても、\nそうそう代わり映えするもんじゃなかばい」
1944 = "\"Fukami-chan ơi, dù em có vuốt lại tóc tai thế nào,\\nthì cũng chẳng thay đổi được bao nhiêu đâu mà.\""

# 【ふかみ】
# display as 深美
# JP: 「で、でも――左右のバランスとか――\n枝毛とかあっても、恥ずかしいし」
1704 = "\"Nh-nhưng mà――cân bằng hai bên này nọ――\\nVới lại, nếu có tóc chẻ ngọn thì xấu hổ lắm.\""

# monologue
# JP: 熱心に髪を整えるふかみの影でこっそりと、\nポーレットもコンパクトを出し覗きこんでる。
2954 = "Trong lúc Fukami đang mải miết chỉnh trang lại mái tóc,\\nPaulette cũng lặng lẽ lấy hộp phấn ra soi gương."

# monologue
# JP: れいなは……と見れば目があって、\nにっこりおっとり微笑みかけられる。
2894 = "Nhìn về phía Reina... thì thấy ánh mắt hai người chạm nhau,\\ncô ấy mỉm cười dịu dàng, khoan thai."

# 【れいな】
# display as 玲奈
# JP: 「双鉄さんのおかげで、\n素敵な\x%l客車;#00ffc040;客車%l;#;をいただいちゃいましたねぇ」
2175 = "\"Nhờ có anh Soutetsu,\\nmà chúng ta có được những toa \\x%ltoa tàu;#00ffc040;toa tàu%l;#; tuyệt vời quá đi.\""

# 【双鉄】
# display as 雙鐵
# JP: 「僕のおかげ――では全然無いがな」
2174 = "\"Nhờ anh――thì hoàn toàn không phải đâu nhé.\""

# monologue
# JP: ポーレット、ハチロク、日々姫。\nそれにおそらく、れいなも凪もふかみも、真闇姉も。
3004 = "Paulette, Hachiroku, Hibiki.\\nCùng với đó, có lẽ là cả Reina, Nagi, Fukami, và cả chị Mayami nữa."

# monologue
# JP: 誰かの力がもしわずかでも欠けてたなら、\nこれほど上手く、事は運んでくれなかっただろう。
2916 = "Nếu thiếu đi dù chỉ một chút sức lực của bất kỳ ai,\\nthì mọi chuyện có lẽ đã chẳng thể suôn sẻ đến thế này."

# 【双鉄】
# display as 雙鐵
# JP: 「が……素敵な\x%l客車;#00ffc040;客車%l;#;であることは違いない」
1690 = "「Ưm... Quả thực đây là một toa \\x%l客車;#00ffc040;toa hành khách%l;#; tuyệt vời mà.」"

# 【れいな】
# display as 玲奈
# JP: 「ですよねぇ」
2030 = "「Phải không ạ?」"

# monologue
# JP: れいなが車内を見渡す視線に、つい引っ張られ――\n“綺麗なものだ”と、素直に感じる。
2702 = "Bị cuốn theo ánh nhìn của Reina khi em ấy đảo mắt quanh toa tàu――\\ntôi thành thật cảm thấy, “Nơi này thật đẹp làm sao.”"

# 【双鉄】
# display as 雙鐵
# JP: 「ストーブの存在感が、大きいな」
2050 = "「Sự hiện diện của chiếc lò sưởi thật ấn tượng nhỉ.」"

# monologue
# JP: だから、助かる。
2462 = "Nhờ vậy mà, tôi được cứu rỗi."

# monologue
# JP: この\x%l客車;#00ffc040;客車%l;#;の持つ、懐かしい雰囲気と木の匂いとに、\n古い記憶を――そのカサブタを剥がされずに済む。
2968 = "Trong bầu không khí hoài cổ và hương gỗ của \\x%l客車;#00ffc040;toa hành khách%l;#; này,\\nnhững ký ức cũ kỹ――không còn bị lớp vảy của thời gian khơi gợi lại nữa."

# 【れいな】
# display as 玲奈
# JP: 「れいな、\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;って初めてですよぉ」
2099 = "「Reina, đây là lần đầu tiên em thấy \\x%lストーブ客車;#00ffc040;toa tàu có lò sưởi%l;#; đó ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。相当に希少なものなのだろうな」
2027 = "「Ừ. Chắc hẳn nó thuộc loại cực kỳ quý hiếm đấy.」"

# 【れいな】
# display as 玲奈
# JP: 「ですよねぇ。すごく丁寧に整備されてますしぃ」
1949 = "「Phải không anh. Nó còn được bảo dưỡng vô cùng cẩn thận nữa chứ ạ.」"

# monologue
# JP: 整備が良くて、希少な\x%l客車;#00ffc040;客車%l;#;。\nそれを無償同然に頂けたのだ、不満などあろう筈もない。
2490 = "Một \\x%l客車;#00ffc040;toa hành khách%l;#; quý hiếm được bảo dưỡng chu đáo.\\nĐã nhận được nó với giá gần như cho không thế này, thì chẳng có gì để mà phàn nàn cả."

# monologue
# JP: 九洲とはいえ御一夜は、冬には雪も降る土地だ。\nその頃になら、きっとストーブも活躍しよう。
2671 = "Dù là vùng Kyushu, nhưng Hitoyoshi vẫn là nơi có tuyết rơi vào mùa đông.\\nĐến lúc đó, chắc hẳn chiếc lò sưởi này sẽ phát huy tác dụng thôi."

# 【ふかみ】
# display as 深美
# JP: 「お、お待たせしました。です」
1896 = "「X... xin lỗi đã để mọi người đợi.」"

# monologue
# JP: ふかみの声に視線を戻せば、\nみな、わくわくとこちらを見ている。
2902 = "Quay ánh nhìn trở lại theo tiếng gọi của Fukami,\\nmọi người, ai nấy đều đang nhìn về phía này với vẻ đầy háo hức."

# monologue
# JP: ああ、これがいい。\n余計な作為を一切混じえず撮る方がいい。
2601 = "À, thế này là tốt rồi.\\nChụp mà không cần thêm thắt gì cả, như vậy mới là tốt nhất."

# monologue
# JP: （パシャっ）
3046 = "(Tách)"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　いま、もう撮っちゃったんですか！？」
1789 = "【Hina】「Ơ? Anh chụp xong rồi ạ!?」"

# 【凪】
# display as 凪
# JP: 「見せてばーい！」
2147 = "【Hina】「Cho em xem với!」"

# 【ふかみ】
# display as 深美
