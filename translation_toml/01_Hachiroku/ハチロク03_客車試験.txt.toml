2715 = "Thế nên, em đã nghĩ. Vào lúc đó. \nSau khi \\x%l8620;#00ffc040;8620%l;#; được khôi phục, khi mọi người cùng bàn bạc xem sẽ làm gì tiếp theo."

# monologue
# JP: 双鉄さん――きっと、\nポーレットさんの秘書になっちゃうって思ってました。
2707 = "Em đã nghĩ anh Soutetsu―― chắc chắn, \nsẽ trở thành thư ký cho Paulette-san mất thôi."

# monologue
# JP: （なのに……双鉄さんは、\x%l運転士;#00ffc040;運転士%l;#;を頑張るって、\nポーレットさんのお誘い、断っちゃって）
3037 = "（Vậy mà…… anh Soutetsu lại muốn nỗ lực làm \\x%lngười lái tàu;#00ffc040;người lái tàu%l;#;, \nanh ấy đã từ chối lời mời của Paulette-san）"

# monologue
# JP: どうしてかなって、不思議に思って。すごく思って。\nわたし、いっぱい考えました。
2967 = "Em tự hỏi tại sao lại như vậy. Thắc mắc mãi. \nEm đã suy nghĩ về điều đó rất nhiều."

# monologue
# JP: ハチロクちゃんはお人形で、日々姫ちゃんは妹さんです。\nだから……ひょっとして、もしかして――
2514 = "Hachiroku là Railord, còn Hibiki-hime là em gái. \nVậy nên... biết đâu được, nhỡ đâu――"

# monologue
# JP: （双鉄さん……\n他に、誰か好きな人が……いるのかも、って）
3052 = "(Anh Soutetsu... \nLiệu có phải là... đang thích một ai khác... không nhỉ)"

# monologue
# JP: ひょっとしてもしかして、千分の一、一万分の一――\n[ごうがしゃ,2]恒河沙分の一くらいの確率で……
2621 = "Nhỡ đâu biết đâu được, xác suất một phần nghìn, một phần vạn―― \nHay thậm chí là một phần Hằng Hà Sa số cơ chứ..."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、なのかもしれないし――\nそのまた、[なゆた,2]那由多分の一くらいの確率で」
1692 = "\"Có khi nào là Nagi-chan không nhỉ―― \nHay là, với xác suất một phần Na-do-tha?\""

# 【凪】
# display as 凪
# JP: 「呼びよったと？」
1716 = "\"Đang gọi đấy à?\""

# 【ふかみ】
# display as 深美
# JP: 「ひゃっ！？」
1778 = "\"Áaa!?\""

# monologue
# JP: 凪ちゃん、ほっぺたが、ひらぺったく赤ぁくなってます。\n窓に、べったりと顔をくっつけちゃってたみたいです。
2645 = "Má của Nagi-chan đỏ bừng, phẳng lì. \nHình như cô bé vừa áp sát mặt vào cửa sổ."

# 【ふかみ】
# display as 深美
# JP: 「ええと……わたし、いま――\n声、出ちゃってた？」
2219 = "\"Ờm... em vừa mới―― \nlỡ miệng phát ra tiếng sao?\""

# 【凪】
# display as 凪
# JP: 「凪ちゃん、って呼ばれたきがして振り向いたばい」
1793 = "\"Anh nghe thấy có người gọi 'Nagi-chan' nên mới quay lại đấy.\""

# 【ふかみ】
# display as 深美
# JP: 「ぁ……えと――」
1829 = "\"A... ừm――\""

# 【れいな】
# display as 玲奈
# JP: 「凪さんと、ナユタさん、って言ってましたよぉ」
1771 = "\"Anh vừa nói là 'Nagi-san' với 'Nayuta-san' đó ạ.\""

# 【凪】
# display as 凪
# JP: 「ナユタって誰ばい？」
2251 = "\"Nayuta là ai thế?\""

# 【ふかみ】
# display as 深美
# JP: 「誰でもなくて、あの――ええと――」
2184 = "\"Chẳng là ai cả, kiểu như là... ừm――\""

# monologue
# JP: ポーレットさん、わたしたちの方、\nにこにこってして見てるです。
2793 = "Paulette-san đang nhìn về phía chúng ta, \nmỉm cười rạng rỡ."

# monologue
# JP: ヘンなこと……まで……は、\nなら、しゃべっちゃわなかったみたい――かな？　
2618 = "Chuyện kỳ lạ... cho đến... lúc này, \nchắc là... vẫn chưa lỡ miệng nói ra đâu―― nhỉ?"

# 【ふかみ】
# display as 深美
# JP: 「あの、それより――ええと、\n凪ちゃん、何、見てたの？　熱心に」
2178 = "「Này, hơn nữa――ừm, Nagi-chan, em đang nhìn gì mà chăm chú thế?」"

# 【凪】
# display as 凪
# JP: 「何って、外ばい？　窓の外」
2154 = "「Nhìn gì ư, nhìn ra ngoài ấy? Ngoài cửa sổ ấy.」"

# 【ふかみ】
# display as 深美
# JP: 「え、けど……」
1781 = "「Ơ, nhưng mà...」"

# monologue
# JP: わたしも凪ちゃんもいっつもは、\n湯医まで、この湯医線に乗って学園に通ってます。
2696 = "Cả em và Nagi-chan bình thường vẫn luôn\\ndùng tuyến Yui này để đến trường."

# monologue
# JP: 夏休み期間には、\n確かにあんまり、乗る機会とかないですけど――
2757 = "Trong kỳ nghỉ hè,\\nđúng là hiếm khi có dịp đi, nhưng mà――"

# 【ふかみ】
# display as 深美
# JP: 「……同じ景色でしょ？」
1382 = "「……Chẳng phải vẫn là cùng một cảnh sắc sao?」"

# 【凪】
# display as 凪
# JP: 「同じ景色でもちがうばい！　ほらっ」
1671 = "「Dù là cùng một cảnh sắc nhưng nó khác biệt đấy! Nhìn này.」"

# 【ふかみ】
# display as 深美
# JP: 「わ――」
1796 = "「Oa――」"

# monologue
# JP: 煙がモクって、窓の外に流れています。\nさっきよりもずっと近くて、はっきりしてます。
2831 = "Khói cuộn lên, trôi bên ngoài cửa sổ.\\nNó gần và rõ ràng hơn lúc nãy nhiều."

# monologue
# JP: 思ってたよりもっと黒くて、まるで、雨雲が近くまで――\nあ！　わかった。さっきの、“煙が低い”って。
2767 = "Nó đen hơn em tưởng, cứ như là, những đám mây mưa ở ngay sát gần――\\nÀ! Em hiểu rồi. Cái “khói bay thấp” lúc nãy là vậy."

# 【ふかみ】
# display as 深美
# JP: 「ポーレットさん、これ」
2076 = "「Paulette-san, đây này.」"

# 【ポーレット】
# display as 波萊特
# JP: 「低いし、近い。煙――すごい迫力ね。\n今日は煙がわからないって……こういうことか」
1969 = "「Thấp, và gần nữa. Khói――thật ấn tượng quá.\\nHóa ra 'hôm nay không thể nhìn thấy khói'... là ý này đây.」"

# 【れいな】
# display as 玲奈
# JP: 「ほんとですねぇ。\nれいな、こんなの初めて見ましたよぉ」
2025 = "「Đúng thật ạ.\\nReina lần đầu tiên nhìn thấy cảnh tượng này đấy ạ.」"

# 【凪】
# display as 凪
# JP: 「ＳＬも、なかなかおもしろかもんばい！」
2159 = "「Tàu hơi nước cũng thú vị phết đấy chứ!」"

# monologue
# JP: 凪ちゃんがおもしろそうに言うから、\nちょっと、不思議に思います。
2901 = "Vì thấy Nagi-chan nói vẻ hào hứng,\\nnên em thấy hơi lạ."

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、\x%l機関助士;#00ffc040;機関助士%l;#;さんのお手伝いしてるでしょ？\nそのときは、煙って見えないの？」
1938 = "「Nagi-chan, em đang phụ giúp cho \\x%l機関助士;#00ffc040;trợ lý lái tàu%l;#; đúng không?\nLúc đó, em không bị khói che khuất tầm nhìn sao?」"

# 【凪】
# display as 凪
# JP: 「見えるは見えるけど、こぎゃんとノンキに見れんばい。\n乗務中の煙ば、邪魔で危ないばっかりたい」
2119 = "「Thấy thì vẫn thấy, nhưng mà không có nhàn nhã để mà ngắm đâu.\nKhói khi đang vận hành vừa vướng víu lại vừa nguy hiểm lắm đó.」"

# monologue
# JP: 目の前に煙があるみたいに、\n凪ちゃんが手を、ぱたぱたってします。
2643 = "Như thể đang có làn khói ngay trước mắt mình,\nNagi-chan khua khua tay."

# 【凪】
# display as 凪
# JP: 「ただでさえ助士側の前は狭いけん、\n重か煙ばまとわりつくと、なんも見えんようになるばい」
2058 = "「Vốn dĩ chỗ ngồi của trợ lý đã chật hẹp rồi,\nkhói nặng nề bám lấy nữa thì chẳng nhìn thấy gì luôn.」"

# 【ふかみ】
# display as 深美
# JP: 「わ、大変そう」
1804 = "「Oa, nghe vất vả thật đấy.」"

# 【凪】
# display as 凪
# JP: 「そぎゃんときは、\x%l運転台;#00ffc040;運転台%l;#;の横にも煙ば流れてきよるけん、\n目隠しされてるみたいになるとよ」
2126 = "「Những lúc như thế, khói cũng tràn cả sang bên \\x%l運転台;#00ffc040;buồng lái%l;#; nữa,\nnên cứ như là bị bịt mắt lại vậy đó.」"

# 【ふかみ】
# display as 深美
# JP: 「目隠しって……すごく危なそう」
2157 = "「Bịt mắt ư... nghe nguy hiểm quá vậy.」"

# 【凪】
# display as 凪
# JP: 「やけんね？」
2023 = "「Nên là, thế này nhé?」"

# monologue
# JP: （ポーーーーーーっ！）
# 3047 = "（嗚————！）" 

# 【ふかみ】
# display as 深美
# JP: 「わっ！？」
1801 = "「Á!?」"

# monologue
# JP: \x%l汽笛;#00ffc040;汽笛%l;#;がなって、\nクって、スピードがあがったような気がします。
102 = "\\x%l汽笛;#00ffc040;Còi hơi nước%l;#; vang lên,\nem có cảm giác như tàu vừa tăng tốc đột ngột."

# 【凪】
# display as 凪
# JP: 「こぎゃんして、\x%lカマ;#00ffc040;カマ%l;#;の火ばごうごうに燃して、\n不完全ねんしょーば解消させるばいっ！」
2230 = "「Phải làm thế này, đốt lửa cho \\x%lカマ;#00ffc040;đầu máy%l;#; cháy rực lên,\nđể giải quyết tình trạng đốt cháy không hoàn toàn này!」"

# 【ふかみ】
# display as 深美
# JP: 「あー」
1831 = "「A...」"

# monologue
# JP: 凪ちゃんのお話で、まとわりついてくる“重い煙”\nって、不完全燃焼の煙なんだってわかりました。
2904 = "Qua lời kể của Nagi-chan, em đã hiểu ra “làn khói nặng nề” bám lấy kia\nchính là khói do đốt cháy không hoàn toàn."

# monologue
# JP: だからスピードをあげてたくさん蒸気を使って、\n蒸気をどんどん作れるようにしてるんだろうって思います。
2713 = "Em nghĩ chắc là nhờ tăng tốc và dùng thật nhiều hơi nước,\nnên đầu máy mới có thể tạo ra hơi nước liên tục như vậy."

# 【ポーレット】
# display as 波萊特
# JP: 「ああ……ほら、れいな」
1857 = "「À... kìa, Reina.」"

# 【れいな】
# display as 玲奈
# JP: 「わぁあ！　煙が白くなってきましたぁ」
1800 = "「Oa! Khói chuyển sang màu trắng rồi kìa!」"

# monologue
# JP: 本当です。\n白くなって、軽くなったのか、どんどん上に流れてます。
2868 = "Thật vậy. \\nVì chuyển sang màu trắng và nhẹ đi, nên nó cứ thế bay lên cao."

# monologue
# JP: 窓から見えなくなってくるのはちょっと寂しいですけど\nこれでもっと安全運転になるなら、良かったです。
2955 = "Mặc dù hơi buồn một chút khi không còn nhìn thấy từ cửa sổ nữa\\nnhưng nếu như vậy mà lái xe an toàn hơn thì cũng tốt rồi."

# 【れいな】
# display as 玲奈
# JP: 「とってもおもしろいですねぇ。\nあ！　――ね、ポーレット、見てくださぁい」
2123 = "「Thú vị thật đấy ạ. \\nÀ! Này, Paulette, nhìn kìa ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わ――ほんと、すごい。\nね、ふかみちゃん、凪ちゃん…………も――？」
1803 = "「Oa— thật sự, tuyệt thật. \\nNày, Fukami-chan, Nagi-chan…………cả— nữa à?」"

# 【ふかみ】
# display as 深美
# JP: 「え？」
1787 = "「Hả?」"

# 【凪】
# display as 凪
# JP: 「おわあっ！？　こりゃあ、すごかとねぇ」
1817 = "「Á à!? Cái này, tuyệt quá đi mất.」"

# monologue
# JP: 言われて、見てみて、ビックリ……してます。
2903 = "Được bảo, nhìn thử, mình ngạc nhiên... đến mức đứng hình luôn."

# monologue
# JP: ストーブから、なんにも燃やしていないのに、\nもくもくもくもくもく白い煙が、出て、来…………て？
2752 = "Từ chiếc lò sưởi, dù chẳng đốt gì cả mà\\nkhói trắng cứ thế nghi ngút nghi ngút, tỏa ra, rồi...?"

# 【ポーレット】
# display as 波萊特
# JP: 「じゃない！　何これっ！？　何か燃えてるのっ！！？」
1679 = "「Không phải! Cái gì thế này!? Có cái gì đang cháy à!!?」"

# 【れいな】
# display as 玲奈
# JP: 「あわわ！　言われてみればおかしいのですぅ！」
1833 = "「Awa-wa! Được nhắc mới để ý, chuyện này lạ quá đi mất!」"

# monologue
# JP: ポーレットさんとれいなちゃんが、\nストーブの側に駆け寄ります！
2791 = "Paulette-san và Reina-chan\\nlao nhanh về phía lò sưởi!"

# monologue
# JP: 煙、どんどん、もくもくと、\nストーブから広がって、こっちまで来て――
2834 = "Khói, cứ thế, nghi ngút, nghi ngút,\\ntỏa ra từ lò sưởi, lan đến tận đây—"

# 【ふかみ】
# display as 深美
# JP: 「こほっ――けほっ！」
1794 = "「Khụ— khụ khụ!」"

# 【凪】
# display as 凪
# JP: 「ふかみちゃんっ！」
1945 = "「Fukami-chan!」"

# monologue
# JP: 凪ちゃんが来て、背中をとんとんしてくれます、けど――\nこれ、煙……なくならないと――
2646 = "Nagi-chan đến và vỗ nhẹ vào lưng mình, nhưng mà――\nKhói này…… nếu không tan hết――"

# 【ポーレット】
# display as 波萊特
# JP: 「れいな、どう？」
2106 = "「Reina, sao rồi?」"

# 【れいな】
# display as 玲奈
# JP: 「燃えてないです、なんにも――からっぽですよぅ！\nだけど、煙がどんどんどんどん」
1700 = "「Không cháy, không có gì cả―― trống rỗng hết ạ!\nNhưng mà, khói cứ mãi, cứ mãi...」"

# monologue
# JP: 苦しい、です。\n煙――すごく、イガイガってして――
2617 = "Khó thở, quá.\nKhói―― cảm giác, thật là ngứa họng――"

# 【ふかみ】
# display as 深美
# JP: 「げほっ！　ごほっ！！」
1795 = "「Khụ! Khụ khụ!!」"

# 【凪】
# display as 凪
# JP: 「窓開けるばいっ！」
1791 = "「Mở cửa sổ ra mau!」"

# 【ふかみ】
# display as 深美
# JP: 「っ！！？」
1780 = "「!!?」"

# monologue
# JP: ダメって、言おうと――\n窓なんて開けたら――って思って、けど――
2559 = "Định nói là không được――\nĐịnh nói là nếu mở cửa sổ ra thì――, nhưng mà――"

# monologue
# JP: （ザアっ）
3043 = "(Rào)"

# 【ふかみ】
# display as 深美
# JP: 「あ」
# 1831 = "「啊」" 

# monologue
# JP: 冷たい風が吹き込んできて、\n喉をスウって、開けてもらった気がします。
2533 = "Gió lạnh thổi ùa vào,\ncảm giác như cổ họng được làm dịu lại, được thông suốt."

# monologue
# JP: 息がしたくて、もっと楽になりたくて、\n風の方、涼しい方へ――
2814 = "Mình muốn hít thở, muốn cảm thấy dễ chịu hơn,\nnên cứ hướng về phía có gió, phía mát mẻ――"

# 【ポーレット】
# display as 波萊特
# JP: 「ダメ！　窓から頭出したらぶつけるっ」
1685 = "「Không được! Thò đầu ra ngoài cửa sổ là đập trúng đấy」"

# 【ふかみ】
# display as 深美
# JP: 「きゃっ！」
1777 = "「Á!」"

# monologue
# JP: ひっぱられて、倒されて、上からぎゅうってされてます！
2925 = "Bị kéo lại, bị đè xuống, và bị ôm chặt từ phía trên!"

# 【凪】
# display as 凪
# JP: 「わ！？　ちょっと、何ばいっ！！」
1861 = "「Á!? Khoan đã, làm cái gì vậy hả!!」"

# 【ポーレット】
# display as 波萊特
# JP: 「れいな！　窓閉めて安全姿勢！\nのち\x%l共感;#00ffc040;共感%l;#;！　非常停止を要請！」
2103 = "「Reina! Đóng cửa sổ và giữ tư thế an toàn!\nSau đó\\x%l共感;#00ffc040;Đồng cảm%l;#;! Yêu cầu dừng khẩn cấp!」"

# 【れいな】
# display as 玲奈
# JP: 「窓閉め良し――安全姿勢良し！\nハチロクさんに\x%l共感;#00ffc040;共感%l;#;――非常停止、要請します！！」
2137 = "「Đóng cửa sổ xong rồi—tư thế an toàn xong rồi!\nVới Hachiroku-san\\x%l共感;#00ffc040;Đồng cảm%l;#;—yêu cầu dừng khẩn cấp!!」"

# monologue
# JP: （ガタんっ！！）
3042 = "（Rầm!!）"

# 【凪】
# display as 凪
# JP: 「うわっ！？　ふかみちゃんっ」
1818 = "「Á!? Fukami-chan」"

# 【ふかみ】
# display as 深美
# JP: 「凪、ちゃんっ――」
1935 = "「Nagi, chan—」"

# 【ポーレット】
# display as 波萊特
# JP: 「しゃべらないで。平気。押さえてるから」
1750 = "「Đừng nói chuyện. Mình ổn. Đang giữ chặt rồi đây」"

# 【ふかみ】
# display as 深美
# JP: 「あ――あっ――」
1821 = "「Á—á—」"

# monologue
# JP: すごい、揺れ。\n\x%l非常;#00ffc040;非常%l;#;ブレーキって、こんなに、ガクンって――
2562 = "Cú rung lắc này thật kinh khủng.\nPhanh\\x%l非常;#00ffc040;Khẩn cấp%l;#;... lại có thể dừng gắt như thế sao—"

# monologue
# JP: ポーレットさんに倒して、押さえてもらえてなかったら、\nわたし、ぜったい、ころんで――きっと、怪我してました。
2931 = "Nếu Paulette-san không đẩy mình ra và giữ lấy, thì chắc chắn là mình đã ngã—và nhất định sẽ bị thương rồi."

# monologue
# JP: 線路の、車輪の――これって、悲鳴みたいです。
2890 = "Tiếng đường ray, tiếng bánh xe—cảm giác như nó đang gào thét vậy."

# monologue
# JP: 聞いてるだけで、胸までキイって苦しくて、\nなんだか、どんどん怖くなります。
2577 = "Chỉ cần nghe thôi mà lồng ngực mình đã thắt lại, cảm thấy sợ hãi dần dần."

# monologue
# JP: シィンって。\nいきなり、静かになります。
2970 = "Phựt một cái.\nĐột nhiên, mọi thứ trở nên tĩnh lặng."

# monologue
# JP: 少しホっとして息を吐いたら、しゅーっ、しゅーっ、って、\n窓の外、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の音がしてるの、聞こえてきます。
2656 = "Khi mình nhẹ nhõm thở phào một chút, thì nghe thấy tiếng xì xì... bên ngoài cửa sổ, âm thanh của\\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; bắt đầu vang lên."

# 【れいな】
# display as 玲奈
# JP: 「……速度ゼロ。停止、しましたぁ」
1389 = "「...Tốc độ bằng không. Đã dừng lại rồi ạ」"

# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫？　怪我はない？　ふかみちゃん、凪ちゃん」
1947 = "「Ổn chứ? Không bị thương chỗ nào chứ? Fukami-chan, Nagi-chan」"

# 【ふかみ】
# display as 深美
# JP: 「あ……はっ――はぁあっ」
1825 = "「A…… ha――hả…」"

# monologue
# JP: 汗が、どーって出てきます。
2947 = "Mồ hôi cứ thế vã ra như tắm."

# monologue
# JP: しゃべれなくって、深呼吸して――\n凪ちゃんの手が、背中、とんとんしてくれてます。
2820 = "Chẳng nói nên lời, mình hít thở sâu――\nTay Nagi-chan đang vỗ vỗ lên lưng mình."

# 【ふかみ】
# display as 深美
# JP: 「あ……ん――あっ――ありがとう。です。\nわたし……平気――怪我、とか――無い、です」
1826 = "「A…… ưm――a――cảm ơn. Cậu. \nMình…… không sao――không có――bị thương gì đâu」"

# 【凪】
# display as 凪
# JP: 「はぁぁぁ～　良かったばーい」
1785 = "「Haaa～ May quá đi mất」"

# monologue
# JP: くったり崩れてそう言って。
2649 = "Nagi-chan xụi lơ người rồi nói vậy."

# monologue
# JP: それからびょんって、\n跳ねるみたいに、凪ちゃんはいっぺんに立ち上がります。
2989 = "Sau đó, cô bé bật dậy như lò xo vậy,\nđứng thẳng người lên ngay lập tức."

# 【凪】
# display as 凪
# JP: 「これって一体どういうことばい？\nなんで、煙ば\x%l客車;#00ffc040;客車%l;#;の中に入ってきたと？」
2222 = "「Chuyện này rốt cuộc là sao chứ?\nTại sao khói lại lọt được vào trong \\x%ltoa tàu;#00ffc040;toa tàu%l;#; vậy?」"

# monologue
# JP: (ぱたぱた……ぱたぱた……）
3045 = "(phạch phạch…… phạch phạch……）"

# 【ハチロク】
# display as 八六
# JP: 「ふむ……燃焼の痕跡はございませんね。\n……でしたら、やはり」
1863 = "「Hừm…… không có dấu vết của sự cháy ạ.\n……Nếu vậy, quả nhiên là」"

# 【ふかみ】
# display as 深美
# JP: 「あの、わたし――もう大丈夫。です」
1772 = "「Nè, mình――đã ổn rồi. Cậu」"

# 【双鉄】
# display as 雙鐵
# JP: 「無理はいかん。せめて、汗が引くまで休め」
1686 = "「Đừng cố quá. Ít nhất hãy nghỉ ngơi cho đến khi ráo mồ hôi đi」"

# monologue
# JP: いくつか並べた椅子をベッドに、僕の膝をまくらに、\nふかみは、横になっている。
2607 = "Lấy mấy cái ghế xếp lại thành giường, gối đầu lên đùi mình,\nFukami đang nằm đó."

# monologue
# JP: うちわでいくら[あお]扇いでやっても、\n顔は変わらず真っ赤なままで、汗もなかなか引いてくれん。
2460 = "Dù mình có lấy quạt ra quạt bao nhiêu đi chăng nữa,\nkhuôn mặt cô bé vẫn đỏ bừng, mồ hôi cũng chẳng chịu rút."

# 【双鉄】
# display as 雙鐵
# JP: 「すまなかったな。\nこんなことになるとは夢にも思っていなかった」
2121 = "「Thật xin lỗi nhé.\nAnh nằm mơ cũng không ngờ mọi chuyện lại thành ra thế này」"

# 【ふかみ】
# display as 深美
# JP: 「いえ……あの――双鉄さん、悪くない。です」
1811 = "「Không…… chuyện đó―― anh Soutetsu, không tệ đâu. Em nghĩ vậy」"

# monologue
# JP: 目を合わせてもくれんから、よほど怒らせたかと思ったが、\nどうやらそうでもないようだ。
2605 = "Vì cô bé không chịu nhìn thẳng vào tôi, nên tôi cứ ngỡ là mình đã chọc giận cô bé dữ lắm, nhưng\\n xem ra không phải như vậy."

# 【ふかみ】
# display as 深美
# JP: 「ええと……わたし、お母さんも、ノド、強くないから。\nそれでちょっと――おおげさになっちゃっただけ。です」
1737 = "「À thì…… em, cả mẹ em nữa, cổ họng đều không khỏe cho lắm.\\n Thế nên là em hơi―― làm quá lên một chút thôi. Em xin lỗi」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうだとしても、試験運転中に倒れさせたのは私の、\n御一夜鉄道株式会社の責任です」
1683 = "「Dù là vậy đi nữa, việc để em ngất đi trong lúc chạy thử nghiệm vẫn là trách nhiệm của tôi,\\n của Công ty Cổ phần Đường sắt Ohitoyo」"

# 【ふかみ】
# display as 深美
# JP: 「そんなのっ！」
2166 = "「Làm sao mà thế được cơ chứ!」"

# monologue
# JP: ポーレットが頭を下げかけたその瞬間、\nふかみががばりと起き上がる。
2611 = "Đúng lúc Paulette định cúi đầu nhận lỗi,\\n Fukami chồm người dậy một cách đột ngột."

# 【ふかみ】
# display as 深美
# JP: 「それなら――それなら！　わたしも、責任ある。です。\nそうじゃなきゃ、仲間はずれで――寂しい。です」
2232 = "「Nếu vậy thì―― nếu vậy thì! Em cũng có trách nhiệm. Là vậy đó.\\n Nếu không thì, bị gạt ra khỏi nhóm―― buồn lắm. Em buồn lắm」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1834 = "「Á」"

# monologue
# JP: 言ってふかみは、軽く咳き込んでしまう。\n慌てて叩き支えた背中は、汗でぐっしょり湿ってる。
2871 = "Nói rồi Fukami khẽ ho khan.\\n Tôi vội vàng vỗ nhẹ vào lưng cô bé, tấm lưng ấy đã ướt đẫm mồ hôi."

# 【凪】
# display as 凪
# JP: 「ふかみちゃん」
1942 = "「Fukami-chan」"

# 【ふかみ】
# display as 深美
# JP: 「うん」
# 1865 = "「嗯」" 

# monologue
# JP: すぐさま凪がすっ飛んできて、\nふかみを一度立たせてから、しっかり椅子に座り直させる。
2554 = "Nagi lao đến ngay lập tức,\\n đỡ Fukami đứng dậy một chút rồi dìu cô bé ngồi lại xuống ghế thật tử tế."

# 【ふかみ】
# display as 深美
# JP: 「普通の人、乗れない――試験乗車。させてもらえたの。\nだって、仲間だから。って、思うから。だから」
2177 = "「Người bình thường, không được lên tàu―― nhưng em lại được cho phép tham gia chuyến chạy thử nghiệm.\\n Bởi vì, vì mọi người nghĩ rằng em là đồng đội. Nên là」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうね。ふかみちゃん。ごめんね――ありがと」
2029 = "「Phải rồi. Fukami-chan. Chị xin lỗi nhé―― và cảm ơn em」"

# monologue
# JP: ポーレットが、軽くふかみの頭を抱けば、\nはーーーーっと長い息が吐かれる。
2796 = "Khi Paulette nhẹ nhàng ôm lấy đầu Fukami,\\n một tiếng thở dài thườn thượt vang lên."

# monologue
# JP: 顔の赤みがゆるやかに薄れ、荒かった息も整ってきた。\n……どうやら、落ち着いてくれたらしい。
2807 = "Vẻ ửng đỏ trên khuôn mặt dần nhạt đi, hơi thở dồn dập cũng đã ổn định lại.\\n ……Có vẻ như cô bé đã bình tĩnh lại rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「で、だ。ハチロク」
2259 = "「Và, này. Hachiroku」"

# 【ハチロク】
# display as 八六
# JP: 「はい。原因は完全に究明出来たかと思います」
1893 = "「Vâng. Em nghĩ rằng mình đã làm rõ hoàn toàn nguyên nhân rồi ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「もうか、早いな」
2031 = "「Nhanh vậy sao, giỏi thật đấy」"

# 【ハチロク】
# display as 八六
# JP: 「恐ろしく単純な事態ですので」
1976 = "「Vì đó là một sự việc cực kỳ đơn giản thôi mà」"

# monologue
# JP: 言いながら、ハチロクはティッシュの箱を持ってくる。
2530 = "Vừa nói, Hachiroku vừa mang hộp khăn giấy tới."

# monologue
# JP: ひとつ、ふたつ。\n机の上に縦に並べる。
2991 = "Một cái, hai cái.\\nCô đặt chúng thẳng hàng trên mặt bàn."

# 【ハチロク】
# display as 八六
# JP: 「前の青い箱を\x%l8620;#00ffc040;8620%l;#;。\n後ろの赤い箱を、\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;とお考え下さい」
2185 = "「Hãy coi hộp màu xanh phía trước là \\x%l8620;#00ffc040;8620%l;#;.\\nCòn hộp màu đỏ phía sau là \\x%lストーブ客車;#00ffc040;Toa xe lò sưởi%l;#; đi ạ」"

# monologue
# JP: ぽん、ぽん、と、\n今度は丸いマグネットが置かれていく。
2990 = "Bộp, bộp.\\nLần này, những miếng nam châm tròn được đặt lên trên."

# monologue
# JP: 青い箱の上と、赤い箱の上とにそれぞれ――ああ。
2458 = "Mỗi cái đặt trên hộp màu xanh và hộp màu đỏ――À ra là vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「そのマグネットは、煙突か？」
2253 = "「Mấy miếng nam châm đó là ống khói à?」"

# 【ハチロク】
# display as 八六
# JP: 「左様です。\x%l8620;#00ffc040;8620%l;#;にも、\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;にも、\nそれぞれ、排気用の煙突が据え付けられています」
2062 = "「Đúng vậy ạ.\\x%l8620;#00ffc040;8620%l;#; và cả \\x%lストーブ客車;#00ffc040;Toa xe lò sưởi%l;#;,\\nđều được lắp đặt ống xả khói riêng biệt ạ」"

# 【凪】
# display as 凪
# JP: 「\x%l客車;#00ffc040;客車%l;#;に、煙突なんて立っとったと？」
1370 = "「\\x%l客車;#00ffc040;Toa hành khách%l;#; mà cũng có ống khói dựng đứng á?」"

# 【双鉄】
# display as 雙鐵
# JP: 「立つ、というほど目立つものではないな。\n天井ギリギリのところに、T字型のがついている」
1723 = "「Cũng không đến mức gọi là dựng đứng cho nổi bật đâu.\\nNó được gắn ở sát mép trần xe, hình chữ T ấy」"

# 【凪】
# display as 凪
# JP: 「ぜーんぜん気づかんかったばい」
1919 = "「Tớ chẳng hề nhận ra luôn đó」"

# 【双鉄】
# display as 雙鐵
# JP: 「ホームから普通に見ると、気づきづらいかもしれん」
1959 = "「Nếu nhìn từ sân ga một cách bình thường thì, có lẽ sẽ hơi khó để nhận ra đấy」"

# monologue
# JP: それこそストーブを焚かんかぎりは、\n\x%l客車;#00ffc040;客車%l;#;の方の煙突からは、煙が吐かれることも――
2584 = "Đó là lý do nếu không đốt lò sưởi, thì từ ống khói của toa xe\\n\\x%l客車;#00ffc040;toa xe%l;#; cũng sẽ chẳng có làn khói nào thoát ra cả――"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか……\nひょっとして、煙突から逆流したのか？」
1839 = "「À, ra vậy……\\nChẳng lẽ nào, khói đã trào ngược từ ống khói sao?」"

# 【ハチロク】
# display as 八六
# JP: 「左様であるかと。\n煙突以外に、流入の経路は考えられませんし」
2064 = "「Có lẽ là vậy ạ.\\nNgoài ống khói ra, không thể nghĩ ra lộ trình nào khác khiến khói tràn vào được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに……か」
2055 = "「Quả thật là…… vậy sao.」"

# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;が届いた直後から、\n徹底的に整備点検はしてきたつもりだ。
99 = "Kể từ lúc toa xe \\x%l客車;#00ffc040;toa xe%l;#; được chuyển tới,\\nanh cứ ngỡ mình đã bảo trì và kiểm tra kỹ lưỡng rồi chứ."

# monologue
# JP: 煙も水もふんだんに浴びせ、\n中に入り込んでこないと、機関庫内では確認している。
2609 = "Đã xịt bao nhiêu khói và nước,\\nanh vẫn luôn xác nhận trong kho đầu máy rằng chúng không thể lọt vào bên trong."

# 【日々姫】
# display as 日日姬
# JP: 「ちょっ、待ってにぃに――兄さん。\nその……逆流、って――そんなこと、起こるんですか？」
2145 = "「Chờ, chờ đã Nii-ni――anh trai.\\nCái đó…… trào ngược, là sao ạ――chuyện như thế, thật sự xảy ra được ư?」"

# 【ハチロク】
# display as 八六
# JP: 「ごく単純な話なのです。\n左様ですね――このティッシュを、煙とお考えください」
1733 = "「Chuyện này rất đơn giản thôi ạ.\\nVâng, hãy coi tờ giấy ăn này là khói nhé.」"

# monologue
# JP: ティッシュが一枚抜き取られ、\n青い箱の煙突部分から、すぐに下におり横へ流れる。
2522 = "Một tờ giấy ăn được rút ra,\\nngay lập tức từ phần ống khói của chiếc hộp màu xanh, nó rơi xuống dưới rồi trôi ngang."

# 【ハチロク】
# display as 八六
# JP: 「不完全燃焼が発生し、煙によって視界が大きく遮られ、\nわたくしたちは、出力を上げ\x%lカマ;#00ffc040;カマ%l;#;を活性化させました」
2113 = "「Khi quá trình đốt không hoàn toàn xảy ra, tầm nhìn bị khói che khuất đáng kể,\\nchúng em đã tăng công suất để kích hoạt \\x%lカマ;#00ffc040;đầu máy%l;#;.」"

# 【日々姫】
# display as 日日姬
# JP: 「それは、うまくいったよね？」
2220 = "「Thế là mọi chuyện suôn sẻ rồi đúng không?」"

# 【ハチロク】
# display as 八六
# JP: 「ええ。煙はおかげで上を向き――\n速力と上空の風に挟まれ、車体の天井を這ったのです」
2036 = "「Vâng. Nhờ vậy mà khói hướng lên trên――\\nbị kẹp giữa tốc độ và luồng gió trên cao, nó đã bò dọc theo trần của toa xe ạ.」"

# monologue
# JP: 気流と、速度と、煙の質と――\nそれがおそらく、妙に噛み合ってしまったのだろう。
2772 = "Luồng khí, tốc độ, và chất lượng của khói――\\ncó lẽ tất cả những thứ đó, đã vô tình trùng khớp với nhau một cách kỳ lạ."

# monologue
# JP: 二枚目のティッシュは、箱表面をなぞりつつ、\n青箱の上から赤箱上の煙突めがけて、一直線に進んでいく。
2886 = "Tờ giấy ăn thứ hai, vừa lướt trên bề mặt hộp,\\nvừa đi thẳng từ trên đỉnh hộp xanh nhắm tới ống khói phía trên hộp đỏ."

# 【ハチロク】
# display as 八六
# JP: 「煙突内部も徹底的にご清掃いただいていたことが、\nかえって災いとなってしまったようです」
1985 = "「Việc anh đã cẩn thận vệ sinh sạch sẽ bên trong ống khói,\\nchẳng ngờ lại vô tình gây ra tai hại như vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
# 1865 = "「嗯」" 

# monologue
# JP: 煙が煙突に入り込む、その流れが一度生まれてしまえば、\n入った煙は障害なしに、\x%l客車;#00ffc040;客車%l;#;内部へ到達する。
2835 = "Khói bay vào ống khói, một khi luồng khí đó đã hình thành,\nkhói đi vào sẽ không gặp vật cản, trực tiếp ập vào bên trong \\x%ltoa tàu;#00ffc040;toa tàu%l;#;."

# monologue
# JP: 事態がそういう構図であるなら、\nいかに対策するか――だが…………
2679 = "Nếu tình hình đúng như cấu trúc đó,\nthì phải đối sách thế nào đây――nhưng mà…………"

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、一度ストーブを外し、\n煙突の出口を密閉するのではどうだろうか？」
2067 = "「Ví dụ như, liệu chúng ta có thể tháo lò sưởi ra,\nvà bịt kín lối ra của ống khói lại được không?」"

# 【ハチロク】
# display as 八六
# JP: 「相手が煙ですからね。\nそれこそ、溶接をして塞ぎでもしないことには……」
2261 = "「Đối phương là khói mà.\nTrừ khi mình hàn kín lại, không thì khó mà ngăn nổi……」"

# monologue
# JP: 言って、ハチロクは眉根を顰める。
2529 = "Nói xong, Hachiroku khẽ nhíu mày."

# 【ハチロク】
# display as 八六
# JP: 「ストーブが簡単に外せる構造かどうかも、\n確認しなくてはいけませんね」
2224 = "「Chúng ta cũng phải kiểm tra xem\nliệu cấu tạo của lò sưởi có dễ tháo rời hay không nữa ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか……外したことで別の隙間が発生しては、\nまるきり意味の無いことになるな。なら――」
1850 = "「À, đúng rồi…… nếu tháo ra mà lại tạo thêm khe hở khác,\nthì hoàn toàn chẳng có ý nghĩa gì cả. Vậy thì――」"

# 【ポーレット】
# display as 波萊特
# JP: 「あの……双鉄くん」
2180 = "「Cái đó…… Soutetsu-kun.」"

# monologue
# JP: 煙突の入り口、Ｔ字の両端を塞いでしまえば――\nその提案が、しかし未然に塞がれる。
2726 = "Nếu chặn lối vào của ống khói, bịt cả hai đầu chữ T――\nđề xuất đó, tuy nhiên, đã bị chặn đứng ngay từ trong trứng nước."

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、ストーブを使えなくなるようなこと――\n出来れば、しなくてすむ方法でいきたいんですけど」
1913 = "「Em, em không muốn làm gì khiến cho lò sưởi không thể sử dụng được――\nnếu có thể, em muốn tìm một cách nào đó mà không cần phải làm vậy ạ.」"

# 【凪】
# display as 凪
# JP: 「そうばい！　せっかくもらったものばい！\nそのまま、大切に使うばい！」
1950 = "「Đúng vậy đó! Món quà đó là người ta đã cất công tặng mà!\nPhải trân trọng và sử dụng nó như thế mới đúng chứ!」"

# 【ふかみ】
# display as 深美
# JP: 「わたしも、あの――そうして欲しいって、思う、です」
1982 = "「Em cũng, cái đó――em cũng nghĩ, mình nên làm như vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いやまぁ、仮説だ。\n仮の案を検討しているだけのことだ」
1988 = "「Không, ừm, chỉ là giả thuyết thôi.\nAnh chỉ đang xem xét các phương án tạm thời mà thôi.」"

# monologue
# JP: そう言いながら内心で、\n煙突封鎖関連案を、すべてまるごとボツにする。
2974 = "Vừa nói vậy, trong lòng tôi\nliền gạt bỏ hoàn toàn mọi phương án liên quan đến việc phong tỏa ống khói."

# monologue
# JP: 安芸様のご厚意を踏みにじるように取られるのなら、\nそれはもちろん、本意では無い。
2845 = "Nếu bị cho là giẫm đạp lên tấm lòng của ngài Aki,\nthì đó tất nhiên, không phải là ý muốn của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――\nその他、だと……」
2242 = "「Vậy thì――\nThế còn, những thứ khác thì sao...」"

# 【ふかみ】
# display as 深美
# JP: 「あの……ええと、\n窓、ずっと開けておけるようにするって、どうでしょう」
1909 = "「À... ừm,\nNếu chúng ta giữ cho cửa sổ mở suốt, thì anh thấy sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ずっと？　雨の日もか？」
1673 = "「Suốt luôn á? Cả những ngày mưa à?」"

# 【ふかみ】
# display as 深美
# JP: 「あ……雨――そっか」
1830 = "「À... Mưa―― ra vậy」"

# 【ハチロク】
# display as 八六
# JP: 「いえ……それは存外――トンネルの無いこの路線なら、\n良い方策かもしれません」
2056 = "「Không... thực ra thì―― với tuyến đường không có đường hầm này,\nđó có thể là một phương án tốt đấy」"

# 【凪】
# display as 凪
# JP: 「雨ば、どぎゃんとするばい？」
2239 = "「Thế còn mưa thì tính sao đây?」"

# 【ハチロク】
# display as 八六
# JP: 「何も全開にせずとも良いのです。\n雨よけのひさしをつけ、その近くだけ開けるなどすれば」
1734 = "「Đâu nhất thiết phải mở hoàn toàn đâu ạ.\nChỉ cần lắp thêm mái che mưa, rồi mở hé ở gần đó là được mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……それなら、\n確かに、外気を取り入れることはできようが――」
1755 = "「Ra là vậy... Nếu làm thế,\nquả thật có thể đón được gió trời vào, nhưng――」"

# 【日々姫】
# display as 日日姬
# JP: 「煙、黒くて重いヤツになったら、\nそれ、窓から入ってきちゃわない？」
2258 = "「Nếu khói trở nên đen và nặng hơn,\nchẳng phải nó sẽ bay ngược vào cửa sổ sao?」"

# 【ハチロク】
# display as 八六
# JP: 「それには――このような対策がございます」
2054 = "「Về vấn đề đó―― chúng ta có biện pháp này ạ」"

# monologue
# JP: 文庫を二冊。
2508 = "Hai cuốn sách bìa mềm."

# monologue
# JP: 青いボックス前方の右と左に、\n目隠しのようにハチロクは立てる。
2520 = "Hachiroku dựng đứng chúng lên như hai tấm chắn ở phía trước bên trái và phải của hộp màu xanh."

# 【ハチロク】
# display as 八六
# JP: 「\x%l除煙板;#00ffc040;[じょえんばん,2]除煙板%l;#;――デフというものがあります。\nこれを立てれば、煙は強制的に上方へと誘導されます」
1376 = "「\\x%lTấm chắn khói;#00ffc040;Tấm chắn khói%l;#;―― người ta gọi đó là Deflector (tấm chắn khói).\nKhi dựng cái này lên, khói sẽ bị ép buộc đẩy lên phía trên cao」"

# 【凪】
# display as 凪
# JP: 「そぎゃん便利なものがあっと？」
2236 = "「Có thứ tiện lợi đến vậy sao?」"

# 【ハチロク】
# display as 八六
# JP: 「はい、わたくしが作られたころには無かったのですが、\n妹たちの時代になって、急速に発展しました」
2044 = "「Vâng, thời điểm em được tạo ra thì chưa có đâu ạ, nhưng\nđến thời của các em gái, nó đã phát triển rất nhanh chóng」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは、[ハチロクニイマル,3]8620にも装着できるのか？」
2241 = "「Liệu nó có thể lắp cho đầu 8620 được không?」"

# 【ハチロク】
# display as 八六
# JP: 「[ハチロク,3]8620形の妹に装着している子は居ましたから。\nおそらくは、問題なく」
1353 = "「Có vài người em gái thuộc đầu máy 8620 đã được trang bị thiết bị này rồi ạ.\\nCó lẽ là sẽ không có vấn đề gì đâu.」"

# monologue
# JP: ハチロクの声に、\nポーレットも小さく頷く。
2992 = "Trước lời của Hachiroku,\\nPaulette cũng khẽ gật đầu."

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l除煙板;#00ffc040;[じょえんばん,2]除煙板%l;#;なら……そうね――\n蓑笠さんに図面を渡してお願いすれば」
1377 = "「Nếu là \\x%ltấm chắn khói;#00ffc040;tấm chắn khói%l;#;... vậy thì--\\nNếu mình đưa bản vẽ cho ông Minokasa và nhờ ông ấy...」"

# 【ハチロク】
# display as 八六
# JP: 「はい、ご制作いただける範囲であるかと」
2039 = "「Vâng, em nghĩ là trong phạm vi mà ông ấy có thể chế tác được ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「しかしその場合……黒い煙が上に行き、\n\x%l客車;#00ffc040;客車%l;#;煙突から入ってくる危険が発生するよな」
1707 = "「Nhưng trong trường hợp đó... khói đen sẽ bị thổi ngược lên cao,\\nvà có nguy cơ chui ngược vào từ ống khói của \\x%ltoa hành khách;#00ffc040;toa hành khách%l;#; đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1831 = "「啊」" 

# monologue
# JP: そこは考え落としていたのか、\nハチロクが、しまったという顔になる。
2846 = "Có vẻ như Hachiroku đã quên mất điều đó,\\ncô bé lộ rõ vẻ mặt như vừa nhận ra mình đã lỡ lời."

# 【ハチロク】
# display as 八六
# JP: 「不完全燃焼の煙は――左様ですね、重いですから……\n扇風機でも、追い出せず、溜まってしまうかも」
2094 = "「Khói do cháy không hoàn toàn thì-- đúng là vậy nhỉ, vì nó nặng nên...\\nNgay cả với quạt máy, có lẽ cũng không đẩy ra ngoài hết được mà sẽ bị tích tụ lại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「扇風機？」
2277 = "「Quạt máy?」"

# 【ハチロク】
# display as 八六
# JP: 「ああ、そうでした。\nわたくし、そのことをもったいぶっていたのでしたね」
1849 = "「À, đúng rồi ạ.\\nEm đã định giữ bí mật chuyện này để tạo bất ngờ, thế mà...」"

# monologue
# JP: ハチロクが、少し早口になる。
2524 = "Hachiroku nói hơi nhanh hơn một chút."

# 【ハチロク】
# display as 八六
# JP: 「\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;の床下には、蓄電池が設置されてます。\n配線も容易にできるよう整えられているようです」
1358 = "「Dưới gầm sàn của \\x%ltoa tàu lò sưởi;#00ffc040;toa tàu lò sưởi%l;#; đã có lắp đặt sẵn bình ắc quy rồi ạ.\\nHệ thống dây điện cũng có vẻ được chuẩn bị để dễ dàng đấu nối.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと！　それは――」
2143 = "「Không thể tin được! Chuyện đó là--」"

# monologue
# JP: 安芸様が『似合いの客車』と笑って言ったその意味が、\n僕にもようやく、心底理解できた気がする。
2628 = "Cuối cùng tôi cũng hiểu được tận đáy lòng ý nghĩa của câu nói 'toa tàu phù hợp' mà ngài Aki đã cười và bảo."

# monologue
# JP: 扇風機を使える\x%l客車;#00ffc040;客車%l;#;なら、\nこれほど夏の御一夜に、似合い、ありがたいものも無い。
2979 = "Nếu là \\x%ltoa hành khách;#00ffc040;toa hành khách%l;#; có thể sử dụng quạt máy,\\nthì chẳng còn gì phù hợp và đáng quý hơn cho mùa hè ở Ohitoyo này nữa."

# 【ポーレット】
# display as 波萊特
# JP: 「それなら、確かに。\n簡単に設置できますね、扇風機」
2250 = "「Nếu vậy thì đúng thật.\\nQuạt máy lắp đặt cũng đơn giản nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「と。思ったのです。\nしかし、黒煙を車内に溜めてしまうようだと……」
2041 = "「Em đã nghĩ như vậy.\\nNhưng nếu để khói đen tích tụ trong toa xe thì...」"

# 【双鉄】
# display as 雙鐵
# JP: 「扇風機でも、力不足か」
2276 = "「Kể cả quạt máy cũng không đủ sức sao.」"

# 【凪】
# display as 凪
# JP: 「っていうか、煙を入れて追い出すって時点でダメばい。\n世の中、ふかみちゃんより喉の弱かひともおるけんね」
1980 = "「Mà nè, ngay từ việc đưa khói vào rồi mới đuổi ra đã là không ổn rồi.\\nTrên đời này còn có những người họng yếu hơn cả Fukami-chan đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「あっ」
# 1831 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ……もっともだな。返す言葉も無い」
1879 = "「Ừm... em nói đúng. Anh không còn gì để phản bác.」"

# monologue
# JP: ハチロクもポーレットも、日々姫までもが\n力なく下を向いてしまう。
2512 = "Cả Hachiroku, Paulette, và cả Hibihime nữa\\nđều bất lực cúi đầu xuống."

# monologue
# JP: ふかみも申し訳なさそうに、首をふるふるふるだけだ。\nならばれいな――っと……ああ。
2801 = "Fukami cũng chỉ biết lắc đầu vẻ đầy hối lỗi.\\nNếu vậy thì Reina――à... ừm."

# 【れいな】
# display as 玲奈
# JP: 「すやぁあ……むにゃぁあ」
1862 = "「Khò... khò... chẹp chẹp...」"

# 【ポーレット】
# display as 波萊特
# JP: 「ちょっ、れいなったら」
1856 = "「Chết thật, lại là Reina nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、ちょうどいい潮時だろう。\nトラブル直後で、僕らはみんな、疲れているのだ」
2070 = "「Không, có lẽ đây là lúc thích hợp nhất.\\nNgay sau khi gặp sự cố, tất cả chúng ta đều đã quá mệt mỏi rồi.」"

# monologue
# JP: もう一度ふかみの顔色を確かめる。
2694 = "Tôi nhìn lại sắc mặt của Fukami một lần nữa."

# monologue
# JP: 健康そうに頬は赤らみ、\n見た目には問題なさそうだ、が――
2908 = "Đôi má cô ấy ửng hồng trông rất khỏe mạnh,\\nnhìn qua thì có vẻ không vấn đề gì, nhưng mà――"

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、ひとまずゆっくり休んで切り替えよう。\nふかみは特に無理の無いよう。何かあったらすぐに呼べ」
2149 = "「Dù sao thì, tạm thời hãy nghỉ ngơi thư giãn để lấy lại tinh thần đã.\\nFukami đặc biệt đừng cố quá sức. Có chuyện gì thì gọi anh ngay nhé.」"

# 【ふかみ】
# display as 深美
# JP: 「は、はい――です」
1901 = "「V, vâng――ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それでいいかな、ポーレット」
2225 = "「Như vậy được chứ, Paulette?」"

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。それならわたし、関連資料を」
1695 = "「Em hiểu rồi. Vậy để em, chuẩn bị các tài liệu liên quan ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみは“特に”無理の無いよう――といったぞ？\n他のみんなにも、普通に無理はしてほしくないのだが」
2270 = "「Fukami đã bảo là “đặc biệt” không được làm quá sức rồi cơ mà?\\nAnh cũng chẳng muốn mọi người phải cố quá sức đâu」"

# monologue
# JP: 少しふざけた口調でいえば、\nポーレットも自分の頭を軽く叩いて、おどけて答える。
2637 = "Khi tôi nói với giọng hơi đùa cợt,\\nPaulette cũng nhẹ nhàng gõ lên đầu mình, rồi đáp lại một cách tinh nghịch."

# 【ポーレット】
# display as 波萊特
# JP: 「そうでした。それじゃあわたしも、\n今日のところは、無理しないように休みます」
2182 = "「À, đúng rồi nhỉ. Vậy thì, hôm nay em cũng sẽ\\nnghỉ ngơi để không làm quá sức ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、それではな」
1886 = "「Ừm, vậy nhé」"

# 【凪】
# display as 凪
# JP: 「よーっし！　ふかみちゃん、帰るばい」
1904 = "「Được rồi! Fukami-chan, về thôi nào」"

# 【双鉄】
# display as 雙鐵
# JP: 「っと、うっかりしていた。\n送ったほうが――」
