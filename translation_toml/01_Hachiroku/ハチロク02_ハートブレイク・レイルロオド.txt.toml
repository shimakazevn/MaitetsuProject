[script]
# lines: 513 
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、ポーレットに相談してみよう」
2547 = "「Dù sao thì, thử bàn bạc với Paulette xem sao.」"
# 【ハチロク】
# display as 鈴
# JP: 「左様でございますね。ポーレット様は、\n行政についても専門家でいらっしゃるのですから」
2405 = "「Đúng vậy nhỉ. Chị Paulette, cũng là một chuyên gia về hành chính mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。こどもを迎えるということについて、\n僕らの知識は、とても狭い」
2286 = "「Ừm. Về việc đón nhận một đứa trẻ, kiến thức của chúng ta còn rất hạn hẹp.」"
# monologue
# JP: ……一番単純に考えるなら、\n『養子を迎える』という選択になろう。
1508 = "......Nếu suy nghĩ một cách đơn giản nhất, thì sẽ là lựa chọn \"nhận con nuôi\"."
# monologue
# JP: その可否、難しさ、必要な準備やこころがまえ。\nあるいは、その他の選択肢――
2931 = "Tính khả thi, độ khó, những chuẩn bị cần thiết và tâm lý. Hoặc là, những lựa chọn khác——"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットならより広く、多くを知っていようし、\nもし知らずとも、専門家を紹介してくれよう」
2497 = "「Nếu là Paulette thì chắc sẽ biết nhiều và rộng hơn, nếu không biết thì cô ấy cũng sẽ giới thiệu chuyên gia cho chúng ta.」"
# 【ハチロク】
# display as 鈴
# JP: 「はい。そのようにしていただけましたら、\nわたくしも、とても嬉しうございます」
2435 = "「Vâng. Nếu được như vậy, em cũng sẽ rất vui ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ではそれで。\n相談は……仕事終わりにの方が良いだろう」
2663 = "「Vậy quyết định thế nhé. Bàn bạc thì......chắc để sau giờ làm việc sẽ tốt hơn.」"
# 【ハチロク】
# display as 鈴
# JP: 「かしこまりました。\nきっと、そのようにいたしましょう」
2418 = "「Em hiểu rồi ạ. Chúng ta hãy làm như vậy nhé.」"
# monologue
# JP: すずが笑顔で頷いてくれる。\nならば、プライベートの話はここまで。
3417 = "Suzu mỉm cười gật đầu với tôi. Vậy thì, chuyện riêng tư đến đây là kết thúc."
# monologue
# JP: ここから先は仕事モード――\nと行きたいのだが、そうスッキリは切り替えられない。
3196 = "Từ giờ trở đi là chế độ làm việc—— Tôi muốn như vậy, nhưng lại không thể chuyển đổi cái rụp được."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま？」
2694 = "「Ngài Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
2178 = "「Ừm.」"
# monologue
# JP: すずも同じ気持ちとわかる。\nいつものように、一度ぎゅうっと手を握り合う。
3314 = "Tôi biết Suzu cũng có cùng cảm giác. Như mọi khi, chúng tôi nắm chặt tay nhau một lần."
# 【ハチロク】
# display as 八六
# JP: 「今日も一日ご安全に、右田\\x%l機関士;#00ffc040;機関士%l;#;」
2085 = "「Hôm nay cũng chúc ngài một ngày bình an, \\x%l機関士;#00ffc040;người lái tàu%l;#; Migita.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご安全に。\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・ハチロク」
1982 = "「Chúc em bình an. \\x%lレイルロオド;#00ffc040;Railord%l;#; Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「では、参りましょう」
2669 = "「Vậy, chúng ta đi thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2178 = "「嗯」" 
# monologue
# JP: 手を解き、レールショップの扉をくぐる。
3162 = "Buông tay ra, chúng tôi bước qua cánh cửa của Rail Shop."
# 【双鉄】
# display as 雙鐵
# JP: 「おはよう」
2228 = "「Chào buổi sáng.」"
# 【れいな】
# display as 玲奈＆凪
# JP: 「双鉄さぁん！　大変ですよぉ！」\n「にーさん！　えらいことばい！！」
2691 = "「Anh Soutetsu! Có chuyện lớn rồi ạ~」 「Anh hai! Chuyện lớn rồi á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おうっ！？」
2209 = "「Ồ!?」"
# monologue
# JP: レールショップに入るなり、\nれいなが、凪が、すっとんで来る。
3158 = "Vừa bước vào Rail Shop, Reina và Nagi đã lao đến."
# 【ハチロク】
# display as 八六
# JP: 「まぁ騒がしい。なにごとですか？」
2017 = "「Ồ ồn ào quá. Có chuyện gì vậy?」"
# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ！　急に来ることになったんですよぉ」
2633 = "「Chuyện là thế này nha! Tự nhiên lại quyết định đến đó ạ~」"
# 【凪】
# display as 凪
# JP: 「やけん！　準備！　まるで整ってなかとばい！！」
2408 = "「Bởi vậy! Chuẩn bị! Vẫn chưa đâu vào đâu hết trơn á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「来る、とは何がだ？」
2422 = "「Đến, là cái gì đến?」"
# 【れいな】
# display as 玲奈
# JP: 「[きゅうごう,1]Ⅸ号ですよぉ！\nみかん鉄道さんの、Ⅸ号機関車！！」
2294 = "「Là Đầu máy số 9 đó ạ~ Đầu máy số 9 của Đường sắt Mikan á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？」
1991 = "「Cái gì!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです！　来てくれるんです！ \nあの小さくてかわいい機関車と\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が」
2482 = "「Đúng vậy đó! Họ sẽ đến đấy! Cái đầu máy nhỏ nhắn dễ thương và \\x%lレイルロオド;#00ffc040;Railord%l;#; đó.」"
# monologue
# JP: ポーレットも奥からやってくる。\nその足取りは、夢見るようにふわふわだ。
3262 = "Paulette cũng từ trong đi ra. Bước chân của em ấy lâng lâng như đang mơ vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「交渉は難航している――と聞いていたが」
2083 = "「Anh nghe nói——cuộc đàm phán đang gặp khó khăn mà.」"
# monologue
# JP: みかん鉄道のⅨ号は、100年物の……しかももう何十年も、\n\\x%l入換機;#00ffc040;入換機%l;#;としてしか作動していない極めて古い\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;だ。
3224 = "Đầu máy số 9 của Đường sắt Mikan là một \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; cực kỳ cũ kỹ đã 100 năm tuổi......hơn nữa đã mấy chục năm nay, nó chỉ hoạt động với tư cách là \\x%l入換機;#00ffc040;đầu máy dồn toa%l;#;."
# monologue
# JP: 『いつ壊れてもおかしくないものをお譲りできない』と、\nそうした理由で、固辞されているという話だったが――
3351 = "Nghe nói họ đã kiên quyết từ chối với lý do, \"Không thể nhượng lại một thứ có thể hỏng bất cứ lúc nào\"——"
# 【ポーレット】
# display as 波萊特
# JP: 「みかん鉄道さんと御一夜鉄道を本当の意味で繋ぐために、\n[きゅう]Ⅸ号がどうしても必要って、粘り強くお話したんです」
1974 = "「Em đã kiên trì thuyết phục họ rằng, để thực sự kết nối Đường sắt Mikan và Đường sắt Ohito, thì Đầu máy số 9 là vô cùng cần thiết.」"
# monologue
# JP: （粘り強く、か）
3456 = "（Kiên trì, à.）"
# monologue
# JP: 微妙な空気が、レールショップに一瞬、満ちる。
3203 = "Một bầu không khí vi diệu bao trùm lấy Rail Shop trong thoáng chốc."
# monologue
# JP: こと鉄道に関しての、ポーレットの驚異的な粘り腰。\nみながそれを知っているゆえ、どうしても。
3025 = "Sự kiên trì đáng kinh ngạc của Paulette trong những vấn đề liên quan đến đường sắt. Vì mọi người đều biết điều đó, nên không thể tránh khỏi."
# 【ポーレット】
# display as 波萊特
# JP: 「そしたら、それを聞きつけてくれたオリヴィちゃんが、\n多分自分から、御一夜移籍を志願してくれたんですよ！」
2409 = "「Thế rồi, bé Olivy nghe được chuyện đó, có lẽ đã tự mình tình nguyện chuyển đến Ohito đấy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィとは？」
2234 = "「Olivy là ai?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　Ⅸ号の\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のこです。明るくて元気で、\nとってもかわいいこなんですよ！」
2156 = "「A! Là \\x%lレイルロオド;#00ffc040;Railord%l;#; của Đầu máy số 9. Một cô bé tươi sáng, hoạt bát, và cực kỳ dễ thương luôn đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;自らがか」
2636 = "「Hô. \\x%lレイルロオド;#00ffc040;Railord%l;#; tự mình tình nguyện sao.」"
# monologue
# JP: “多分”の一言がやや気にかかるが、\nそれはなんとも心強い。
3427 = "Dù chữ \"có lẽ\" hơi khiến tôi bận tâm, nhưng điều đó cũng thật đáng mừng."
# monologue
# JP: １００年稼働した\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の経験ならば、\nきっと御一夜鉄道にも、素晴らしいものを伝えてくれよう。
3053 = "Kinh nghiệm của một \\x%lレイルロオド;#00ffc040;Railord%l;#; đã hoạt động 100 năm, chắc chắn sẽ mang lại những điều tuyệt vời cho Đường sắt Ohito."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、正真正銘の朗報なのだな。\n随分といきなりなので、驚かされてしまいはしたが」
2680 = "「Nếu vậy, đây đúng là một tin vui thực sự rồi. Dù hơi đột ngột nên anh có chút bất ngờ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです、本当にいきなりだったんです。\n始発の準備をしてるとき、電話がかかってきて」
2283 = "「Đúng vậy, thực sự rất đột ngột luôn. Lúc em đang chuẩn bị cho chuyến tàu đầu tiên thì nhận được điện thoại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「始発の乗務前にか？」
2429 = "「Trước khi làm nhiệm vụ trên chuyến tàu đầu tiên sao?」"
# monologue
# JP: 夜は1927御一夜温泉着で運転終了となる御一夜鉄道だが、\n朝練へ向う学園生を運ぶため、始発は早く0527だ。
3129 = "Đường sắt Ohito kết thúc chuyến chạy lúc 19:27 khi đến Suối nước nóng Ohito vào buổi tối, nhưng để chở học sinh đi tập luyện buổi sáng, chuyến đầu tiên xuất phát rất sớm lúc 05:27."
# monologue
# JP: 発車準備は、その二時間近く前から始まっている。
3342 = "Việc chuẩn bị xuất phát bắt đầu từ gần hai tiếng trước đó."
# 【双鉄】
# display as 雙鐵
# JP: 「どう考えても異常事態ではないか。\nそのような時間に、いったい誰から？」
2635 = "「Dù nghĩ thế nào cũng thấy đây là tình huống bất thường mà. Vào giờ đó, rốt cuộc là ai gọi?」"
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんからです！\n凄いテンションで『いますぐ御一夜にいくー！』って」
2431 = "「Là bé Olivy gọi ạ! Bé ấy phấn khích lắm, bảo là 『Em sẽ đến Ohito ngay bây giờ~!』」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと」
2303 = "「Trời đất.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それで『どういうこと？』って聞いたら、切れちゃって。\nだけどわたし、乗務があるからすぐには折り返せなくて」
2360 = "「Thế là em hỏi 『Chuyện là sao?』 thì bị ngắt máy. Nhưng em còn phải làm nhiệm vụ nên không gọi lại ngay được.」"
# 【れいな】
# display as 玲奈
# JP: 「それで、御一夜温泉駅に戻ってきたら、\nついさっき、また電話がかかってきたんですよぉ」
2505 = "「Rồi sau đó, lúc tụi em quay lại ga Suối nước nóng Ohito, thì vừa nãy lại có điện thoại gọi tới đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「その\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の、オリヴィからか？」
2648 = "「Từ \\x%lレイルロオド;#00ffc040;Railord%l;#; Olivy đó sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「いいえ。みかん鉄道の社長さんからです。\n『調印と引き渡しを早めることはできないか？』って」
1965 = "「Dạ không. Từ giám đốc của Đường sắt Mikan ạ. Bác ấy hỏi 『Có thể đẩy nhanh việc ký kết và bàn giao được không?』」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな。調印もまだの話だよな」
2298 = "「Phải rồi. Chuyện ký kết vẫn chưa đâu vào đâu mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、まだです。ですから今日来てもらって、\nそこで調印！　っていう流れになったんです」
2447 = "「Vâng, vẫn chưa ạ. Nên em mới bảo họ đến trong hôm nay, rồi ký kết tại đây luôn! Mọi chuyện là như vậy đó.」"
# 【ハチロク】
# display as 八六＆雙鐵
# JP: 「はい？」\n「今日だと！！？」
2626 = "「Hả?」 「Trong hôm nay á!!?」"
# monologue
# JP: 声が重なり、目を見合わせる。\nハチロクが話したそうに見えるから、ひとつ頷く。
3159 = "Chúng tôi đồng thanh rồi nhìn nhau. Thấy Hachiroku có vẻ muốn nói, tôi gật đầu một cái."
# monologue
# JP: ハチロクは、ポーレットを見て、僕を見て――\nそれからゆっくり、慎重そうな声をだす。
3066 = "Hachiroku nhìn Paulette, rồi nhìn tôi—— Sau đó, em ấy chậm rãi cất giọng đầy thận trọng."
# 【ハチロク】
# display as 八六
# JP: 「それは……随分と……その――\n例を見ないこと、なのではないか、と」
2632 = "「Chuyện đó......có hơi......ờm—— Chưa từng có tiền lệ, phải không ạ.」"
# monologue
# JP: トップの経営判断だ。\nハチロクは言葉を選んでいるが、その必要も感じない。
3404 = "Đó là quyết định kinh doanh của cấp cao nhất. Hachiroku đang cẩn trọng lựa lời, nhưng tôi thấy không cần thiết."
# monologue
# JP: 異論や疑問があるのなら、率直にぶつけてかまわない。\nそれが許されるのが、御一夜鉄道の長所なのだから。
3069 = "Nếu có ý kiến phản đối hay thắc mắc gì, cứ thẳng thắn bày tỏ. Bởi vì được phép làm vậy chính là điểm mạnh của Đường sắt Ohito mà."
# 【双鉄】
# display as 雙鐵
# JP: 「なぜ、そこまで急速に話が進むのだ？　無論――\n念願の\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;が来るのだから、基本線は大歓迎だが」
2337 = "「Tại sao mọi chuyện lại tiến triển nhanh đến vậy? Tất nhiên—— Được đón \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; hằng mong ước thì về cơ bản là anh rất hoan nghênh.」"
# 【ハチロク】
# display as 八六
# JP: 「みかん鉄道様を疑いたくはございませんが……\nなにか……致命的な故障が発生した、などの可能性は」
2395 = "「Em không muốn nghi ngờ Đường sắt Mikan nhưng...... Liệu có khả năng......đã xảy ra một sự cố hỏng hóc chí mạng nào đó không.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　そこでしたら、契約書にドラフト段階から、\nみかん鉄道さんが特別条項をいれてくれてます」
2158 = "「A! Về chuyện đó thì, ngay từ giai đoạn dự thảo hợp đồng, Đường sắt Mikan đã đưa vào một điều khoản đặc biệt rồi.」"
# 【ハチロク】
# display as 八六
# JP: 「特別条項――どのようなですか？」
2513 = "「Điều khoản đặc biệt——như thế nào ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「引き渡し後一年以内に、車両・\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に起因する、\n営業運転不能となる瑕疵が発生した場合は、白紙撤回」
2216 = "「Trong vòng một năm sau khi bàn giao, nếu phát sinh lỗi do toa xe hoặc \\x%lレイルロオド;#00ffc040;Railord%l;#;, dẫn đến việc không thể vận hành thương mại, thì hợp đồng sẽ bị hủy bỏ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「一年！？　破格の長期保証だな、それは」
1948 = "「Một năm!? Bảo hành dài hạn phá giá luôn rồi đó.」"
# monologue
# JP: となれば、御一夜鉄道側のリスクはかなり小さくできる。
3405 = "Nếu vậy, rủi ro phía Đường sắt Ohito sẽ được giảm thiểu đáng kể."
# monologue
# JP: みかん鉄道という鉄道会社がいかに信頼を、\n御一夜鉄道との繋がりを大事にしているかも伝わってくる。
3179 = "Điều đó cũng cho thấy công ty Đường sắt Mikan coi trọng sự tin tưởng, và mối liên kết với Đường sắt Ohito đến mức nào."
# monologue
# JP: （が、それは逆から見れば――譲渡後の機能停止を、\n現実的な可能性として心配しているということでもある）
3459 = "（Nhưng nhìn từ góc độ ngược lại——điều đó cũng có nghĩa là họ đang lo lắng, việc ngừng hoạt động sau khi chuyển nhượng là một khả năng thực tế.）"
# monologue
# JP: 無論、百年物の蒸機だ。\nどれほど手をかけたとしても、その懸念は決して消せまい。
3135 = "Tất nhiên, đây là một đầu máy hơi nước trăm tuổi. Dù có chăm chút đến đâu, thì mối lo ngại đó cũng không bao giờ biến mất."
# 【双鉄】
# display as 雙鐵
# JP: 「……\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;ブームと、払拭とがなければ、\nこのまま\\x%l入換;#00ffc040;入換%l;#;で、生涯を終えていたであろう車両か」
1559 = "「......Nếu không có trào lưu \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; và sự xóa bỏ những định kiến, thì có lẽ nó đã kết thúc cuộc đời mình với công việc \\x%l入換;#00ffc040;dồn toa%l;#; này rồi nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい！　そんなもったいないことにならないで、\n本当に素晴らしいことって思います！」
2296 = "「Vâng! Không phải chịu cảnh lãng phí như vậy, em nghĩ đó thực sự là một điều tuyệt vời!」"
# monologue
# JP: ポーレットは恐ろしく前向きだ。\nある意味、完全に舞い上がっている。
3265 = "Paulette lạc quan một cách đáng sợ. Theo một nghĩa nào đó, em ấy đang hoàn toàn bay bổng."
# monologue
# JP: ハチロクもそう感じてだろう。\n一呼吸を置き、慎重そうに、現実的な問いを発する。
3310 = "Chắc Hachiroku cũng cảm thấy vậy. Em ấy dừng lại một nhịp, rồi thận trọng đặt ra một câu hỏi thực tế."
# 【ハチロク】
# display as 八六
# JP: 「今日、ということは、自走でくるのでございますか？\nそれとも、他の機関車での\\x%l甲種輸送;#00ffc040;甲種輸送%l;#;で？」
2410 = "「Hôm nay, nghĩa là họ sẽ tự chạy đến sao ạ? Hay là dùng \\x%l甲種輸送;#00ffc040;vận chuyển loại Giáp%l;#; bằng đầu máy khác?」"
# 【ポーレット】
# display as 波萊特
# JP: 「自走で、お尻に[ほき,1]補機をつけてくる予定って聞きました。\n[おこば,1]小畑を越えたら\\x%l補機;#00ffc040;補機%l;#;は切り離して戻るって」
2578 = "「Em nghe nói là tự chạy, có gắn thêm \\x%l補機;#00ffc040;đầu máy phụ%l;#; ở đuôi. Qua khỏi Okoba thì sẽ tháo \\x%l補機;#00ffc040;đầu máy phụ%l;#; ra cho quay về.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、それも異例だな。[おこば,1]小畑を越えたなら、\n御一夜まで一緒に来て休めばいいのに」
2629 = "「Chà, thế cũng khác thường nhỉ. Đã qua Okoba rồi, thì cứ đến thẳng Ohito nghỉ ngơi luôn cũng được mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「次の乗務の準備があるんだと思います。\nみかん鉄道さんも、決して余裕があるわけじゃないし」
2342 = "「Chắc là phải chuẩn bị cho nhiệm vụ tiếp theo ạ. Đường sắt Mikan cũng không hề dư dả thời gian đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「\\x%l補機;#00ffc040;補機%l;#;をつけての自走で[おこば,1]小畑を越えられるなら――\n状態的には、全く問題なさそうですね」
2258 = "「Nếu có thể tự chạy qua Okoba với \\x%l補機;#00ffc040;đầu máy phụ%l;#;—— thì về mặt tình trạng, có vẻ hoàn toàn không có vấn đề gì nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うんっ」
2423 = "「Vâng.」"
# monologue
# JP: ポーレットの笑顔が輝く。
3269 = "Nụ cười của Paulette rạng rỡ."
# 【ポーレット】
# display as 波萊特
# JP: 「そこは大丈夫。直近でも、車両・\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ともに、\nコンディションの確認はさせてもらってるから」
2630 = "「Chuyện đó thì không sao. Gần đây em cũng đã được xác nhận, tình trạng của cả toa xe lẫn \\x%lレイルロオド;#00ffc040;Railord%l;#; rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ますます安心だな。\nが――」
2661 = "「Vậy thì, càng yên tâm hơn rồi. Nhưng mà——」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、\n何故、そのときにご調印されなかったのですか？」
2674 = "「Nếu vậy, tại sao lúc đó ngài lại không ký kết ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんが納得してくれるのに、\n多分、すごく時間がかかるだろうって思ってたんです」
2353 = "「Bởi vì em nghĩ, có lẽ sẽ mất rất nhiều thời gian, để bé Olivy chịu đồng ý.」"
# 【双鉄】
# display as 雙鐵
# JP: 「来ることに、不満を表明していたのか？」
1971 = "「Bé ấy đã tỏ ra bất mãn với việc đến đây sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうじゃなくって、みかん鉄道愛が凄いこなんです。\n視察のときも、熱心にみかん鉄道の魅力を教えてくれて」
1957 = "「Không phải vậy đâu, bé ấy yêu Đường sắt Mikan lắm. Lúc em đi thị sát, bé ấy cũng nhiệt tình giới thiệu về sức hấp dẫn của Đường sắt Mikan nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　聞いていた話では、[きゅうごう,1]Ⅸ号機関車は現在、\nみかん鉄道の\\x%l入換機;#00ffc040;入換機%l;#;だろう？　その\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が何故」
2200 = "「Ưm? Theo những gì anh nghe được, thì Đầu máy số 9 hiện tại, đang là \\x%l入換機;#00ffc040;đầu máy dồn toa%l;#; của Đường sắt Mikan mà nhỉ? Tại sao \\x%lレイルロオド;#00ffc040;Railord%l;#; của nó lại」"
# 【ポーレット】
# display as 波萊特
# JP: 「案内をしてくれる予定だった\\x%l車掌;#00ffc040;車掌%l;#;さんが急病で、\n急遽代理に――っていうお話でしたけど」
2576 = "「Nghe bảo là do \\x%l車掌;#00ffc040;trưởng tàu%l;#; dự định hướng dẫn cho em bị ốm đột xuất, nên bé ấy được cử làm người thay thế khẩn cấp——」"
# monologue
# JP: クスクスと、ポーレットは実に楽しげな微笑を浮かべる。
3270 = "Cười khúc khích, Paulette nở một nụ cười vô cùng vui vẻ."
# monologue
# JP: それだけで、オリヴィなる\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の案内が、\nどれほど豊かなものだったのか、とても容易に想像できる。
3000 = "Chỉ cần vậy thôi, cũng rất dễ để tưởng tượng ra, sự hướng dẫn của \\x%lレイルロオド;#00ffc040;Railord%l;#; tên Olivy đó phong phú đến nhường nào."
# 【ポーレット】
# display as 波萊特
# JP: 「多分、志願してくれたんだと思います。みかん鉄道の\n魅力、ものすごい一生懸命伝えようとしてくれてたから」
2387 = "「Em nghĩ có lẽ bé ấy đã tự nguyện đó ạ. Bởi vì bé ấy, đã vô cùng cố gắng truyền tải sức hấp dẫn của Đường sắt Mikan mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。であるがゆえに、\n納得して来てもらうための時間を設けようとしたのか」
2057 = "「Ra là vậy. Chính vì thế, em mới định dành thời gian để bé ấy đồng ý đến đây à.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。その方が、長期的にはいいと思って」
2284 = "「Vâng. Em nghĩ làm vậy sẽ tốt hơn về mặt dài hạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1978 = "「Cũng phải.」"
# monologue
# JP: 実に、ポーレットらしい配慮だ。\n先に調印をすませてしまい、それから命令するよりも――
3074 = "Quả là một sự chu đáo đậm chất Paulette. Thay vì ký kết trước rồi mới ra lệnh——"
# monologue
# JP: 説得し、納得をしてもらってからの調印の方が、\n移籍後の関係づくりも、きっとスムーズに進むだろう。
3343 = "Thuyết phục và nhận được sự đồng ý rồi mới ký kết, thì việc xây dựng mối quan hệ sau khi chuyển nhượng chắc chắn sẽ diễn ra suôn sẻ hơn."
# 【ハチロク】
# display as 八六
# JP: 「わたくしたち\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は物ですのに……\nそこまでのおこころづかいを、ありがとうございます」
2351 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; chúng em chỉ là vật vô tri vô giác mà...... Cảm ơn ngài đã chu đáo đến vậy ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「物であっても、人であっても。\nみんなが気持ちよく働けるのが、安全の源だと思うから」
2390 = "「Dù là vật hay là người. Tôi nghĩ việc mọi người có thể làm việc thoải mái chính là cội nguồn của sự an toàn mà.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。まことに左様でございますね」
2439 = "「Vâng. Quả đúng là như vậy ạ.」"
# 【凪】
# display as 凪
# JP: 「って！　のんびり話してる場合じゃなかと！\nそいで余計にバタバタしたら、逆に危なかとよ～っ！！」
2654 = "「Đó! Giờ đâu phải lúc nói chuyện thong thả đâu! Cứ vậy rồi lỡ luống cuống thêm thì lại càng nguy hiểm hơn á~!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「あう」
2148 = "「Au.」"
# monologue
# JP: 凪がせっつく一言に、\nポーレットの笑顔が困り顔へと変わってしまう。
3347 = "Trước lời hối thúc của Nagi, nụ cười của Paulette liền biến thành vẻ mặt bối rối."
# 【ポーレット】
# display as 波萊特
# JP: 「そこは、ほんとごめんなさい。\nでも、先方からのどうしてもっていう希望だったから」
2639 = "「Chuyện đó, em thực sự xin lỗi. Nhưng vì phía bên kia cứ khăng khăng yêu cầu như vậy.」"
# 【れいな】
# display as 玲奈
# JP: 「どうして、\nこんなに急に来てくれることになったんでしょうかぁ？」
2003 = "「Tại sao, họ lại đột nhiên đến gấp như vậy nhỉ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「きっと、それだけやる気を出してくれてるってこと！\nだから、お迎えもできるだけ準備してあげないと！」
2549 = "「Chắc chắn là vì họ đang rất có động lực đó! Nên chúng ta cũng phải chuẩn bị đón tiếp chu đáo nhất có thể mới được!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2481 = "「Ưm.」"
# monologue
# JP: どうせ移籍をするのなら、早くから働いたほうがいい。\nそういう気持ちは僕にも十分に共感できるし、頼もしい。
3205 = "Đằng nào cũng chuyển nhượng, thì bắt đầu làm việc sớm vẫn hơn. Tôi hoàn toàn có thể đồng cảm với tâm trạng đó, và thấy thật đáng tin cậy."
# monologue
# JP: 意欲に応え、一日も早く馴染んでもらうそのためにも、\n歓迎会を、急ごしらえとは感じさせないものにしたい。
3280 = "Để đáp lại sự nhiệt tình đó, và cũng để họ sớm hòa nhập, tôi muốn tổ chức một buổi tiệc chào mừng không mang cảm giác làm qua loa."
# 【双鉄】
# display as 雙鐵
# JP: 「Ⅸ号機関車は、何時着予定なのだ？」
1975 = "「Đầu máy số 9 dự kiến mấy giờ đến?」"
# 【ポーレット】
# display as 波萊特
# JP: 「さすがに営業運転終わってからの方がいいと思って、\n21時以降ってことでお願いして――そしたら2100予定に」
2368 = "「Quả nhiên em nghĩ nên đợi sau khi kết thúc vận hành thương mại thì hơn, nên đã nhờ họ đến sau 21 giờ——và dự kiến là 21:00.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、頼もしいこと。一分一秒も無駄にせず、\n早く御一夜鉄道で働きたいと思ってくれているのですね」
2556 = "「Chà, đáng tin cậy thật. Chắc hẳn họ không muốn lãng phí một phút một giây nào, và muốn làm việc ở Đường sắt Ohito càng sớm càng tốt đây mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その時間なら全員で迎えられるか。日々姫も呼ぼう。\n今日は休みだが、仲間はずれはイヤがるだろう」
2634 = "「Giờ đó thì tất cả mọi người có thể ra đón được nhỉ. Gọi cả Hibiki nữa. Hôm nay em ấy nghỉ, nhưng chắc sẽ không thích bị cho ra rìa đâu.」"
# 【ハチロク】
# display as 八六
# JP: 「もしもお運びいただけるようなら、\n真闇様にも来ていただけたほうが」
2392 = "「Nếu có thể mời được, thì chị Mayami cũng nên đến ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。真闇姉が来てくれるなら心強い。\nそれと――」
1977 = "「Đúng vậy. Có chị Mayami đến thì yên tâm hơn hẳn. Với lại——」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！　ふかみちゃんも呼ぶばい！」
2292 = "「Fukami! Phải gọi cả Fukami nữa á!」"
# 【ポーレット】
# display as 波萊特
# JP: 「せっかくだから、稀咲も。\n来てくれるかはわからないけど」
2462 = "「Nhân dịp này, gọi cả Kisaki nữa. Dù không biết em ấy có đến hay không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2073 = "「Được đó.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、とーってもにぎやかになりますねぇ」
2100 = "「Ufufu, sẽ rộn ràng lắm đây nha~」"
# monologue
# JP: れいなの笑顔がムードを作る。\nあたたかく、にぎやかで、御一夜らしい優しい空気を。
3426 = "Nụ cười của Reina tạo nên bầu không khí. Một bầu không khí ấm áp, náo nhiệt, dịu dàng đậm chất Ohito."
# monologue
# JP: 歓迎会を、このまま準備できるのならば、\nきっと喜んでもらえるし、向こうも安心できるだろう。
3072 = "Nếu có thể chuẩn bị tiệc chào mừng như thế này, chắc chắn họ sẽ rất vui, và bên kia cũng sẽ yên tâm hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「で？　準備のためにやるべき作業のリストはあるか」
2397 = "「Vậy? Có danh sách những việc cần làm để chuẩn bị chưa?」"
# 【ポーレット】
# display as 波萊特
# JP: 「これから！　今からすぐにやります。\nその間に双鉄くんには、連絡の手配を頼めますか？」
2699 = "「Bây giờ đây! Em sẽ làm ngay bây giờ. Trong lúc đó, nhờ cậu Soutetsu liên lạc với mọi người được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2416 = "「Đã rõ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「みんなの連絡が終わる頃までにはリストを作りますから。\n来れるのが誰かが決まり次第、人員配置を決めましょう」
2384 = "「Em sẽ lập danh sách xong trước khi cậu liên lạc xong. Ngay khi xác định được ai có thể đến, chúng ta sẽ phân bổ nhân sự.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしよう」
2301 = "「Cứ làm vậy đi.」"
# monologue
# JP: ふわふわ状態を脱却すれば、やはりポーレットは頼もしい。
3223 = "Quả nhiên, khi thoát khỏi trạng thái bay bổng, Paulette lại rất đáng tin cậy."
# monologue
# JP: 大方針が定まれば、\n各自がそれぞれ行うことも、自然と定まる。
2903 = "Khi phương hướng lớn đã được định ra, những việc mỗi người cần làm cũng tự nhiên được xác định."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、連絡も手分けしよう。\n凪はふかみを頼む。ハチロクは日々姫を頼めるか？」
2668 = "「Vậy thì, chia nhau ra liên lạc đi. Nagi gọi cho Fukami nhé. Hachiroku gọi cho Hibiki được không?」"
# 【凪】
# display as 凪
# JP: 「まーかせーろばーい！」
2054 = "「Cứ giao cho em á!」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました」
2373 = "「Em hiểu rồi ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなは、ええっとぉ」
2516 = "「Reina thì, ờm~」"
# 【ポーレット】
# display as 波萊特
# JP: 「リスト作りを手伝って？　どんな歓迎なら嬉しいか。\nれいなの気持ちで考えて、わたしにおしえて？」
2309 = "「Giúp chị lập danh sách nhé? Xem đón tiếp thế nào thì vui. Em cứ thử đặt mình vào vị trí đó rồi nói cho chị nghe nha?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　れいな、がんばりますねぇ」
2250 = "「Vâng ạ! Reina sẽ cố gắng nha~」"
# monologue
# JP: みんなが笑顔で歓迎のための準備をしている。\nこれが御一夜鉄道なのだと、じわり、感じる。
3027 = "Mọi người đều mỉm cười chuẩn bị cho buổi chào mừng. Tôi dần cảm nhận được, đây chính là Đường sắt Ohito."
# 【双鉄】
# display as 雙鐵
# JP: 「今日の今日だ。\nさすがに稀咲は、先約などがあるかもしれんが――」
2523 = "「Chuyện gấp gáp ngay trong ngày. Quả nhiên Kisaki có thể đã có hẹn trước rồi, nhưng mà——」"
# monologue
# JP: もし可能なら十分だけ、いや、五分だけでもいいから\n顔を出してもらえないかを、頼んでみよう。
2912 = "Nếu được thì mười phút, không, chỉ năm phút thôi cũng được, thử nhờ em ấy ghé qua xem sao."
# monologue
