2982 = "Nhìn phản ứng do câu nói của Hibiki mang lại——những nụ cười tủm tỉm, thì có lẽ mức độ giao tiếp vừa rồi cũng được tính là tình tứ rồi."
# 【双鉄】
# display as 雙鐵
