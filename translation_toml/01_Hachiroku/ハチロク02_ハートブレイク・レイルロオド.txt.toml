2134 = "「Ư! Bởi vậy! Chú mau đi đi! Nếu ký kết xong thì Olivy, sẽ không còn là người của Đường sắt Mikan nữa!」"
# 【宗方】
# display as 宗方
# JP: 「そうか。わかった」
2567 = "「Vậy sao. Ta hiểu rồi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ――」
2140 = "「A——」"
# monologue
# JP: ガツ、と蹴るような足音を立て、\n大きな体が、Ⅸ号機関車から降りてくる。
3425 = "Cùng với tiếng bước chân mạnh bạo như giậm xuống đất, một thân hình to lớn bước xuống từ Đầu máy số 9."
# 【凪】
# display as 凪
# JP: 「やっと来たばい！\nいらっしゃーい！　ようこそ御一夜鉄道へ！！」
2544 = "「Cuối cùng cũng đến rồi á! Chào mừng~! Chào mừng đến với Đường sắt Ohito!!」"
# 【ふかみ】
# display as 深美
# JP: 「蒸気のふるさと御一夜は、Ⅸ号機関車とオリヴィさんを、\n大歓迎でお迎えします！　です！！」
2564 = "「Quê hương hơi nước Ohito, nhiệt liệt chào mừng Đầu máy số 9 và cô Olivy! ạ!!」"
# monologue
# JP: （パンッ！！！）
3452 = "（Pang!!!）"
# monologue
# JP: ライトがつけられ、歓迎パネルが照らされる。
3289 = "Đèn được bật sáng, chiếu rọi tấm bảng chào mừng."
# 【凪】
# display as 凪
