# 【ポーレット】
# display as 波萊特
# JP: 「え？　――あっ、はい。わかりました。双鉄く――\n右田\\x%l機関士;#00ffc040;機関士%l;#;。そっち、おねがいできますか？」
2166 = "「Dạ? ——A, vâng. Cháu hiểu rồi. Cậu Soutetsu—— \\x%l機関士;#00ffc040;Người lái tàu%l;#; Migita. Bên đó, nhờ cậu được không?」"
# 【双鉄】
# display as 雙鐵
