3406 = "Thế này là được rồi. Dù sao thì, nếu mọi người hành động và đánh lạc hướng sự chú ý, thì Olivy......có lẽ cũng sẽ dễ bộc lộ cảm xúc hơn."
# 【ハチロク】
# display as 八六
