2378 = "「Tôi là Hachiroku, \\x%lRailord;#00ffc040;Railord%l;#; chuyên trách đầu máy 8620 của đường sắt Oyoshi.\\nOlivi-chan. Rất mong nhận được sự giúp đỡ từ em nhé?」"

# 【オリヴィ】
