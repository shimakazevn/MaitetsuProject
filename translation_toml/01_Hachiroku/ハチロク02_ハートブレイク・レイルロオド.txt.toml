# JP: 「うん。わかっとー。どぎゃん形になってもいいよう、\nねぇねぇと稀咲センパイにお願いしとく」
2187 = "\"Vâng. Em hiểu mà. Em sẽ nhờ Nee-nee và chị Kisaki chuẩn bị sẵn sàng, bất kể kết quả thế nào ạ.\""

# 【双鉄】
# display as 雙鐵
# JP: 「助かる、頼む」
2670 = "\"Cảm ơn em, nhờ cả vào hai người.\""

# monologue
# JP: 日々姫が静かに皆のところへ戻ってく。\n皆もすぐ、日々姫のところに集まっていく。
3217 = "Hibihime lặng lẽ quay trở lại bên mọi người.\\nMọi người cũng nhanh chóng tụ họp quanh Hibihime."

# monologue
# JP: これでいい。とにかく動き、注意が他に逸れてくれれば、\nオリヴィも……感情を出しやすくなるかもしれん。
3406 = "Như vậy là được rồi. Chỉ cần họ di chuyển và thu hút sự chú ý, có lẽ... Olly cũng sẽ dễ dàng bộc lộ cảm xúc hơn."

# 【ハチロク】
# display as 八六
# JP: 「この小さな体で助士役も務めてきたのですね？\n疲れたでしょう。双鉄さま？　石炭などを振る舞っては」
2007 = "\"Anh đã phải đảm nhận cả vai trò trợ lái với cơ thể nhỏ bé này sao? Chắc hẳn anh mệt lắm rồi đúng không, Soutetsu-sama? Em nên đãi anh chút than đá thôi.\""

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　それはいい考えだな」
2127 = "\"À! Đó đúng là một ý hay đấy.\""

# monologue
# JP: 泣きそうなこには、甘い物。
3275 = "Với người sắp khóc, thì nên cho đồ ngọt."

# monologue
# JP: ならば泣きそうな\x%l蒸気機関車;#00ffc040;蒸気機関車%l;\x%lレイルロオド;#;#00ffc040;レイルロオド%l;#;には、\n石炭が一番の役にたつだろう。
3413 = "Vậy thì với \\x%lđầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;\\x%lRailord;#;#00ffc040;Railord%l;#; sắp khóc, thì\\nthan đá chắc chắn sẽ là thứ hữu hiệu nhất."

# 【ハチロク】
# display as 八六
# JP: 「いっとう上等の瀝青炭を、\nわたくし、用意してございますので」
2385 = "\"Em đã chuẩn bị sẵn loại than bitum thượng hạng nhất\\ndành cho ngài rồi ạ.\""

# monologue
# JP: 用意……というか、おそらくは、\nつまみ食い用に取り置きしていた一品だろう。
3407 = "Chuẩn bị... hay đúng hơn, có lẽ đây là phần cô ấy dành riêng để ăn vụng."

# monologue
# JP: それをハチロクは惜しげもなく、\nかつ上品に、僕へと手渡す。
3286 = "Hachiroku không chút tiếc nuối, vẫn giữ vẻ thanh lịch, trao nó cho tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2199 = "「嗯？」" 

# 【ハチロク】
# display as 八六
# JP: 「さきほどの。稀咲様からの」
2522 = "\"Cái này là của lúc nãy. Từ phía Kisaki-sama.\""

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そういう話だったな」
2128 = "\"À, chuyện đó à.\""

# monologue
# JP: この状況で、よくぞそこまで気が回るものだ。
3010 = "Trong tình cảnh này, mà cậu vẫn có thể chu đáo được đến mức đó."

# monologue
# JP: ハチロクに感謝し感心し、\n稀咲から預かったアイスピックで――
3089 = "Tôi vừa biết ơn vừa thán phục Hachiroku, rồi bằng chiếc dùi đá mà Kisaki đã gửi gắm—"

# monologue
# JP: （ガっ！　ガっ！！！）
3455 = "（Gạ! Gạ!!!）"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あぁっ！」
2147 = "「Á!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？」
2091 = "「Cái gì!?」"

# monologue
# JP: アイスピックが、堰を砕いてしまったかのように、\nオリヴィが涙をぼとぼと落とす。
3092 = "Chiếc dùi đá như thể làm vỡ đập, khiến nước mắt Orii rơi lã chã."

# monologue
# JP: それでも、視線は動かない。\nレールショップの裏口にじいっと――
2922 = "Dẫu vậy, ánh nhìn của cô ấy vẫn không hề lay chuyển.\\nVẫn chăm chăm nhìn vào cửa sau của tiệm đường sắt—"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ！　――あっ！！？」
2151 = "「A! ——A!!?」"

# monologue
# JP: 出てきた。\nが、ポーレットの姿だけだ。
3218 = "Cô ấy ra rồi.\\nNhưng, chỉ có mỗi mình Paulette."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタ――ムナカタは？\nやだっ、どうして来てくれないの！？」
2265 = "「Munakata——Munakata đâu?\\nKhông chịu đâu, tại sao anh ấy không đến chứ!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！　ポーレット！\nすまん、来てくれっ！！」
2498 = "「Paulette! Paulette!\\nXin lỗi cô, hãy đến đây đi!!」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい――」
2239 = "「Vâng——」"

# monologue
# JP: ポーレットが小走りにやってきてくれる。\nが、その表情ははっきり暗――っ！！？
3261 = "Paulette chạy lon ton đến chỗ tôi.\\nNhưng, biểu cảm trên gương mặt cô ấy lại tối sầm lại rõ rệt——!!?"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタは！　ムナカタはどこっ！？\nね！　ムナカタはっ！？」
2274 = "「Munakata đâu! Munakata đang ở đâu!?\\nNày! Munakata đâu rồi!?」"

# 【ポーレット】
# display as 波萊特
# JP: 「宗方さんは……調印がすんだらすぐに――その――\n正面玄関から出て、エアクラタクシーで」
2271 = "「Anh Munakata……sau khi ký kết xong là ngay lập tức——cái đó——\\nđi ra từ cửa chính, rồi bắt taxi bay đi rồi.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「やだあああっ！」
1960 = "「Không đâuuuu!」"

# 【ハチロク】
# display as 八六
# JP: 「あっ！」
# 2152 = "「啊！」" 

# monologue
# JP: オリヴィが駆ける。
3045 = "Olivie lao đi."

# 【稀咲】
# display as 稀咲
# JP: 「え！？」
2159 = "「Ơ!?」"

# 【真闇】
# display as 真闇
# JP: 「ひゃっ！」
2088 = "「Á!」"

# monologue
# JP: 転びそうになり持ち直し、\n脇目もふらず一直線に改札から出て――
3402 = "Suýt chút nữa thì ngã nhưng cô bé lấy lại thăng bằng,\nkhông hề ngoái nhìn mà lao thẳng ra khỏi cửa soát vé――"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「やだ！　やだやだやだ！　ムナカタ！　ムナカタ！\nオリヴィのこと、おいてかないで！　連れてって！！」
1961 = "「Không chịu đâu! Không chịu, không chịu, không chịu! Munakata! Munakata!\nĐừng bỏ rơi Olivie! Mang em đi với!!」"

# monologue
# JP: 悲痛――\nとは、ああ、この声か。
3193 = "Đau đớn tột cùng――\nA, ra là cảm giác khi nghe tiếng gọi này sao."

# monologue
# JP: 聞いているだけで辛くなる。\n置いていかれる――あの苦しみを、揺さぶられてしまう。
3348 = "Chỉ cần nghe thôi cũng thấy nhói lòng.\nBị bỏ rơi――nỗi khổ đó, nó khiến trái tim tôi rung động."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いいこにするから！　もう絶対ワガママいわないから！\nどんな石炭も食べるから！　\x%l入換;#00ffc040;入換%l;#;だってがんばるから！」
2235 = "「Em sẽ ngoan mà! Từ nay em sẽ tuyệt đối không nhõng nhẽo nữa!\nThan loại nào em cũng ăn được hết! \\x%lHoán vị;#00ffc040;Hoán vị%l;#; em cũng sẽ cố gắng mà!」"

# monologue
# JP: （そっ）
3221 = "（Khẽ khàng）"

# 【ハチロク】
# display as 八六
# JP: 「――双鉄さま」
1525 = "「――Anh Soutetsu」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2175 = "「嗯——」" 

# monologue
# JP: すずが、僕に寄り添ってくれる。\nごくさり気なく、僕の腕に手を添えてくれる。
3416 = "Suzu nép sát vào người tôi.\nCô bé khẽ chạm tay vào cánh tay tôi một cách rất tự nhiên."

# monologue
# JP: 大丈夫だ。僕はもう一人ではない。\nだから――　一人になってしまったこを、助けなければ。
3243 = "Không sao cả. Mình không còn cô đơn nữa.\nVậy nên―― mình phải cứu lấy cô bé đang bị bỏ lại phía sau thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。宗方さんの乗ったというタクシーは……」
2499 = "「Paulette. Chiếc taxi mà anh Munakata đã đi là……」"

# 【ポーレット】
# display as 波萊特
# JP: 「すぐでした。まるで……その――逃げる、みたいに」
2005 = "「Đi ngay lập tức. Giống như là…… kiểu như――đang chạy trốn vậy」"

# 【双鉄】
# display as 雙鐵
# JP: 「――そうか」
1524 = "\"――Ra là vậy.\""

# monologue
