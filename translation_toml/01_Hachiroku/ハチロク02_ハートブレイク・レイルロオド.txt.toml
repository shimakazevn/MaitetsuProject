3309 = "Nhận ra sự bất thường, cả Hibiki, Nagi, Fukami, chị Mayami, Kisaki—— và ngay cả Reina cũng không biết phải làm sao, chỉ đứng chôn chân tại chỗ."
# 【双鉄】
# display as 雙鐵
