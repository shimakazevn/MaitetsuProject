2060 = "「Cứ làm vậy đi. Xin lỗi, nhưng mọi người cứ đứng chờ ở đây nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。よろしくおねがいします」
2246 = "「Em hiểu rồi. Trăm sự nhờ cậu nhé.」"
