# 【れいな】
# display as 玲奈
# JP: 「ふわ、\\x%lブレーキ;#00ffc040;ブレーキ%l;#;強かったですねぇ」
2118 = "「Oa, \\x%lブレーキ;#00ffc040;phanh%l;#; mạnh quá nha~」"
# monologue
# JP: 停止位置ぴたりはぴたりだが、\n慌てふためき帳尻あわせをしたような\\x%lブレーキ;#00ffc040;ブレーキ%l;#;扱い。
3432 = "Tuy dừng đúng vị trí, nhưng cách xử lý \\x%lブレーキ;#00ffc040;phanh%l;#; lại như thể đang cuống cuồng cố bù đắp cho sai sót."
# monologue
# JP: \\x%l客車;#00ffc040;客車%l;#;が空ゆえ止まったが――\n満両だったら、確実にオーバーランしていただろう。
3409 = "Nhờ \\x%l客車;#00ffc040;toa hành khách%l;#; trống nên mới dừng lại được—— Nếu đầy khách, chắc chắn sẽ bị chạy quá đà."
# 【凪】
# display as 凪
# JP: 「いらっしゃーい！　ようこそ御一夜鉄道へ！！！」
2473 = "「Chào mừng~! Chào mừng đến với Đường sắt Ohito!!!」"
# 【ふかみ】
# display as 深美
# JP: 「蒸気のふるさと御一夜は、\nⅨ号機関車とオリヴィさんをお待ちしてました！」
2563 = "「Quê hương hơi nước Ohito, đã chờ đợi Đầu máy số 9 và cô Olivy từ lâu rồi ạ!」"
