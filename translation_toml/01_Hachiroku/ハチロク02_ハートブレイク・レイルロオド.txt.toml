3077 = "\\x%l機関士;#00ffc040;Người lái tàu%l;#; Munakata được Paulette dẫn vào Rail Shop, và khuất dạng mà không thèm ngoảnh lại nhìn."
# 【オリヴィ】
# display as ？？？
# JP: 「ふ、くっ」
2137 = "「Phu, hức.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2103 = "「!!?」"
# monologue
