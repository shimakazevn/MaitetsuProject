3048 = "Đôi mắt to tròn ngấn lệ như chực trào ra, nhưng em ấy vẫn đứng lặng im——nhìn đăm đăm về hướng hai người vừa khuất bóng."
# 【ハチロク】
# display as 八六
# JP: 「あなたがオリヴィさんですね？　はじめまして。\nようこそ、御一夜鉄道へ」
2023 = "「Cô là cô Olivy đúng không ạ? Lần đầu gặp mặt. Chào mừng cô đến với Đường sắt Ohito.」"
# 【オリヴィ】
# display as ？？？
# JP: 「んっ――――――」
2175 = "「Ưm——————」"
# monologue
