# 【ハチロク】
# display as 八六
# JP: 「異常事態かもしれません。\n双鉄さま、運転台に声をかけてみましょう」
1981 = "「Có thể là tình huống bất thường ạ. Ngài Soutetsu, chúng ta thử gọi vọng vào buồng lái xem sao.」"
# 【双鉄】
# display as 雙鐵
