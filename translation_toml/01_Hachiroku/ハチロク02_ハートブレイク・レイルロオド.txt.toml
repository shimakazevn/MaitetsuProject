2452 = "「Thế sao? Về ngoại hình thì đúng là tiêu chuẩn của một \\x%lレイルロオド;#00ffc040;Railord%l;#;――\nkhông, tất nhiên là \\x%lレイルロオド;#00ffc040;Railord%l;#; nào trông cũng đều rất tuyệt vời rồi.」"

