2152 = "「A!」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま。まいります」
2693 = "「Ngài Soutetsu. Tàu đến rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――む？」
2240 = "「Ừm——hửm?」"
# monologue
