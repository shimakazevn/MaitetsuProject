# 【真闇】
# display as 真闇
# JP: 「どぎゃん事情か――あん人――\n[むなかた,1]宗方さんに、少しは聞けたと？」
2656 = "「Chuyện cụ thể là sao――người đó―― \nanh Soutetsu, anh có nghe được chút gì không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、本当に少しだけですけど、聞くには聞けました。\nかんしゃく起こしちゃったそうです、オリヴィちゃん」
2198 = "「Anh, thực sự chỉ nghe được một chút thôi. \nNghe nói Ollie-chan đã nổi cơn thịnh nộ đấy」"

# 【稀咲】
# display as 稀咲
# JP: 「かんしゃく」
2528 = "「Nổi cơn thịnh nộ」"

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜鉄道への移籍話をききつけたらもう、\n『オリヴィを捨てるんだ！』ってなっちゃったらしくて」
2580 = "「Nghe tin về chuyện chuyển nhượng sang Đường sắt Hitoyoshi, cô ấy liền nghĩ ngay rằng \n『Mình bị vứt bỏ rồi!』」"

# 【れいな】
# display as 玲奈＆凪
# JP: 「あぁ……」\n「むぅ……」
2142 = "「À...」\n「Ưm...」"

# monologue
# JP: れいなの顔と凪の顔とが同時に歪む。
3293 = "Gương mặt của Reina và Nagi cùng lúc méo xệch đi."

# 【凪】
# display as 凪
# JP: 「なーんか、気分のよくなか話ばいねー。\n御一夜鉄道、ゴミ箱扱いされとるみたいばい」
2640 = "「Chuyện nghe chẳng vui vẻ chút nào nhỉ. \nCứ như thể Đường sắt Hitoyoshi bị coi là thùng rác vậy」"

# 【れいな】
# display as 玲奈＆雙鐵
# JP: 「えええっ！？」\n「一理あるな」
2105 = "「Ế ê ê !?」\n「Cũng có lý đấy」"

# monologue
# JP: が――凪の率直な言葉に頷き返したのは、僕だけだ。\n……なるほど、これが、母性を刺激されている状態か。
3288 = "Thế nhưng――người gật đầu đồng tình với lời nói thẳng thắn của Nagi lại chỉ có mình tôi. \n...Hiểu rồi, đây chính là trạng thái bị kích thích bản năng làm mẹ sao."

# monologue
# JP: れいなは本当に驚いてしまった様子だし、他の面子も、\n『今はあんまり厳しいことは』とでも言いたげな目だ。
3295 = "Reina có vẻ thực sự bị sốc, và những người còn lại cũng nhìn tôi với ánh mắt như muốn nói, 『Đừng quá khắt khe vào lúc này』."

# 【ポーレット】
# display as 波萊特
# JP: 「そんなつもり――こっちを悪くいうつもりじゃなくて。\nただ、オリヴィちゃん。ショックすぎたんだと思います」
2237 = "「Tôi không có ý đó――không phải là nói xấu gì cả.\\nChỉ là, Ollie-chan... tôi nghĩ cô ấy đã quá sốc rồi.」"

# 【凪】
# display as 凪
# JP: 「そぎゃんと？」
2446 = "「Ra là vậy sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃん、みかん鉄道愛が本当に深いから……\nだから、移籍。すぐに割り切るなんて、きっと無理で」
2213 = "「Vì Ollie-chan thực sự rất yêu mến Đường sắt Mikan……\\nNên chuyện chuyển công tác, bảo cô ấy chấp nhận ngay lập tức thì chắc chắn là không thể rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「が、ポーレットは、最初からそれを予期して、\n調印までの時間を長くとったといっていただろう？」
2074 = "「Nhưng chẳng phải Paulette đã dự liệu điều đó ngay từ đầu, và cố tình kéo dài thời gian cho đến khi ký kết hay sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。けど――わたしもオリヴィちゃんのこと、\n無意識に、こどものイメージで見ちゃってて」
2177 = "「Vâng. Nhưng――tôi cũng... vô tình nhìn nhận Ollie-chan như một đứa trẻ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2207 = "「À――」"

# 【ポーレット】
# display as 波萊特
# JP: 「だから“きっと単純”って、どっかでバイアスかかって。\nそれで、自分の都合いいように解釈を作っちゃいました」
2401 = "「Nên tôi đã bị định kiến ở đâu đó rằng “chắc chắn là đơn giản thôi”.\\nVì thế, tôi đã tự diễn giải theo cách thuận tiện cho mình.」"

# 【双鉄】
# display as 雙鐵
# JP: 「思い込みで判断を誤ったか」
2584 = "「Đã phán đoán sai lầm vì suy diễn chủ quan sao.」"

# monologue
# JP: 一日も早く来て欲しい。ポーレットはそう願っていた。\nそこに、『一日も早く行きたい』という電話があって……
3268 = "Cô muốn cô ấy đến càng sớm càng tốt. Paulette đã mong đợi như vậy.\\nNgay lúc đó, lại có một cuộc điện thoại với nội dung 『Muốn đi càng sớm càng tốt』……"

# monologue
# JP: ポーレットの鉄道愛の深さを知っているがゆえ、\nその誤認は、無理からぬものかとも思ってしまう。
3232 = "Chính vì biết rõ tình yêu sâu đậm mà Paulette dành cho đường sắt, nên tôi lại thấy sự hiểu lầm đó cũng là điều khó tránh khỏi."

# 【真闇】
# display as 真闇
# JP: 「ほうたら実際のとこ――かんしゃくに付き合いきれんで、\nオリヴィちゃんば、みかん鉄道から投げ出されたと？」
2642 = "「Vậy thực sự thì――là do không thể chịu nổi những cơn giận dỗi, nên Ollie-chan mới bị đuổi khỏi Đường sắt Mikan sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「っていう感じではなかったです。多分。\nたぶん……本当に、多分なんですけど――」
2369 = "「Không hẳn là như vậy đâu ạ. Có lẽ là thế.\\nCó lẽ…… thực sự là, chỉ là có lẽ thôi――」"

# monologue
# JP: ポーレットがまた黙りこむ。
3264 = "Paulette lại im lặng."

# 【れいな】
# display as 玲奈
# JP: 「そのままいたら、余計にお別れが辛くなるだけだから。\nもっとたくさん、オリヴィさんを傷つけちゃうから」
2554 = "「Vì nếu cứ ở lại đó, việc chia ly sẽ chỉ càng trở nên đau đớn hơn thôi.\\nVì sẽ càng làm tổn thương Ollie-san nhiều hơn nữa.」"

# monologue
# JP: 沈黙にふんわりと、れいなが言葉をのせる。
3296 = "Reina nhẹ nhàng đặt những lời nói vào khoảng lặng."

# monologue
# JP: ポーレットの手が『ありがとう』と、\nれいなの髪をふんわり撫ぜる。
3263 = "Bàn tay Paulette thay cho lời『Cảm ơn』,\\nnhe nhàng vuốt ve mái tóc của Reina."

# 【ポーレット】
# display as 波萊特
# JP: 「そういう感じに、わたしも受け取りました。\n良く言えば、『わたし達に託してくれた』って」
2344 = "「Tôi cũng đón nhận theo hướng đó.\\nNếu nói theo cách tích cực, thì là 『Họ đã gửi gắm lại cho chúng ta』」"

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。[きゅう]Ⅸ号機関車とオリヴィちゃ――\nオリヴィくんの譲渡は、簡単に覆せるものではないから」
2056 = "「Ra là vậy. Vì việc chuyển nhượng đầu máy số IX và Olivi-cha—\\nkhông, Olivi-kun, không phải là chuyện có thể dễ dàng thay đổi」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。そこは路線貸与と代替の、最優先の希望条件だ。\n余剰の\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;が出次第、速やかに――と」
2426 = "「Phải. Đó là điều kiện ưu tiên hàng đầu trong việc cho thuê tuyến đường và thay thế.\\nNgay khi có đầu máy hơi nước dư thừa, chúng ta sẽ tiến hành ngay—là vậy đấy」"

# monologue
# JP: ゆえ、ポーレットはⅨ号の譲渡を強く望み――\nみかん鉄道は『いくらなんでも老朽すぎる』と固辞をした。
3192 = "Vì thế, Paulette tha thiết mong muốn có được đầu máy số IX—\\nnhưng đường sắt Mikan đã kiên quyết từ chối với lý do 『Dù thế nào thì nó cũng quá cũ kỹ rồi』."

# monologue
# JP: オリヴィが“ききつけた”というその話も、あるいは\n断り方や、代替機の検討といった話であったのかもしれん。
3041 = "Chuyện mà Olivi “nghe phong phanh” được đó, có lẽ cũng chỉ là câu chuyện về cách từ chối hoặc cân nhắc về chiếc máy thay thế mà thôi."

# 【真闇】
# display as 真闇
# JP: 「あー。そぎゃんと事情――会社と会社の話なら、\n理由がなんでも、信頼にかかわってくることやけんねぇ」
2165 = "「À. Nếu là tình huống như vậy—chuyện giữa công ty với công ty,\\nthì dù lý do là gì, nó cũng liên quan đến sự tín nhiệm đấy nhỉ」"

# 【ふかみ】
# display as 深美
# JP: 「そういう事情で……お別れは絶対にさけられないなら。\nそれならわたしも、『早い方が』って、思うかも、です」
2219 = "「Vì hoàn cảnh như vậy... nếu chia ly là điều tuyệt đối không thể tránh khỏi.\\nVậy thì em cũng nghĩ rằng, 『thà sớm một chút thì tốt hơn』」"

# monologue
# JP: ふかみの言葉をじっと聞き。\nそうして凪が、ようやく頷く。
2960 = "Lặng lẽ lắng nghe những lời của Fukami.\\nRồi sau đó, Nagi mới chậm rãi gật đầu."

# 【凪】
# display as 凪
# JP: 「……そぎゃん事情でたくされた？　なら、\nオリヴィば、ちゃんと立ち直らせてあげんといけんね！」
1546 = "「...Được gửi gắm vì hoàn cảnh như vậy sao? Thế thì, \\nchúng ta phải giúp Olivi vực dậy thật tốt thôi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2178 = "「嗯」" 

# monologue
# JP: つまるところは、『大人の事情』だ。
3382 = "Nói tóm lại, đó chính là 『vấn đề của người lớn』."

# monologue
# JP: ……が、大人の事情を納得できる精神年齢でないゆえに、\nオリヴィは、恐らく暴発してしまったのだろう。
1504 = "……Nhưng vì tinh thần của Olivi vẫn chưa đủ chín chắn để chấp nhận những vấn đề của người lớn đó,\\nnên có lẽ, cô bé đã bộc phát mất rồi."

# 【れいな】
# display as 玲奈
# JP: 「あ」
2144 = "「A」"

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　れいな」
2520 = "「Sao vậy? Reina」"

# 【れいな】
# display as 玲奈
# JP: 「ハチロクさんも、ねむっちゃったみたいですぅ。\nオリヴィさんの髪ずっと撫でてあげてたら……ふぁ～あ」
2038 = "「Hachiroku cũng ngủ thiếp đi rồi. Chị ấy cứ vuốt tóc chị Olivia mãi……ưm～」"

# 【凪】
# display as 凪
# JP: 「言うてるれいなも大あくびばい！」
2028 = "「Reina nói người ta mà chính mình cũng ngáp dài kìa!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。もうれいなたちは寝る時間だよな」
2133 = "「Ừ. Reina và mọi người cũng đến giờ đi ngủ rồi đấy nhỉ.」"

# 【れいな】
# display as 玲奈
# JP: 「そぉですねぇ。でも、れいなまだ平気ですよぉ」
2282 = "「Vâng ạ. Nhưng mà, Reina vẫn còn thức được mà.」"

# monologue
# JP: 気持ちは嬉しい。が、明日も始発の乗務がある。\nそうそう長くは引き止められない。
3176 = "Thật lòng rất cảm kích. Nhưng ngày mai vẫn còn chuyến tàu sáng sớm.\\nKhông thể giữ mọi người lại quá lâu được."

# 【双鉄】
# display as 雙鐵
# JP: 「では、あともう少しだけ付き合ってくれ。\nいきさつはまぁ理解したが――明日からはどうする？」
2685 = "「Vậy, cho anh xin thêm một chút thời gian nhé.\\nAnh cũng hiểu đại khái sự tình rồi――từ ngày mai tính sao đây?」"

# monologue
# JP: 尋ねれば生まれる、わずかな沈黙。\nそれを程なく破ってくれたのは、真闇姉だ。
3006 = "Vừa hỏi xong, một khoảng lặng nhỏ liền xuất hiện.\\nNgười phá vỡ sự tĩnh lặng đó ngay sau đó là chị Mayami."

# 【真闇】
# display as 真闇
# JP: 「構えたらそれだけ壁になるけんね。\nおねーちゃんとしては『ふつーに』が、良か様に思うと」
2572 = "「Càng để tâm thì càng tự tạo ra bức tường ngăn cách thôi.\\nVới tư cách là chị gái, chị thấy cứ 'bình thường' là tốt nhất.」"

# 【稀咲】
# display as 稀咲
# JP: 「だね。普通に――共に仕事をするプロとプロとして。\n双鉄ならその辺は大丈夫そうだけれど」
1980 = "「Đúng vậy. Một cách bình thường――như những người làm việc chuyên nghiệp với nhau.\\nSoutetsu thì chắc không vấn đề gì với việc đó đâu nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2178 = "「嗯」" 

# monologue
# JP: 凪とふかみは――と思ってみれば
3171 = "Nghĩ đến Nagi và Fukami――thì"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、とってもらっていい？\nわたしそのテリーヌまだ食べてない」
2288 = "「Nagi-chan, lấy giúp mình được không?\\nMình vẫn chưa ăn món terrine đó.」"

# 【凪】
# display as 凪
# JP: 「照り犬！？　凪さま、わんちゃん食べちゃったと！？」
2688 = "「Chó terri ư!? Nagi-sama, người ăn cả cún cưng rồi ư!?」"

# 【ふかみ】
# display as 深美
# JP: 「違うよ凪ちゃん。テリーヌっていうのは……ええと」
1955 = "「Không phải đâu Nagi-chan. Terrine nghĩa là…… ừm」"

# 【稀咲】
# display as 稀咲
# JP: 「ムース状にした食材の蒸し焼きのこと。だけど本来は、\nテリーヌ容器そのままで出されたものだけが、テリーヌ」
2420 = "「Là món nguyên liệu được nghiền thành mousse rồi đem hấp. Nhưng vốn dĩ,\\nchỉ món nào được phục vụ nguyên trong khuôn terrine mới gọi là terrine.」"

# 【ふかみ】
# display as 深美
# JP: 「わ、教えてくれてありがとうございます。\nなんだって、凪ちゃん！」
2111 = "「Ồ, cảm ơn chị đã chỉ cho em.\\nRa là vậy, Nagi-chan!」"

# 【凪】
# display as 凪
# JP: 「わんちゃんじゃなきゃよかとばい！\nふかみちゃん、これおいしいけんね、残したら損ばい！」
2123 = "「Không phải chó con là tốt rồi!\\nFukami-chan, cái này ngon lắm đấy, không ăn hết là phí lắm nha!」"

# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんはこっちのマリネまだでしょう？」
2029 = "「Nagi-chan vẫn chưa ăn món salad này đúng không?」"

# 【凪】
# display as 凪
# JP: 「まだばい！　わけっこするばい！」
2478 = "「Vẫn chưa nè! Chia nhau ăn đi!」"

# 【ふかみ】
# display as 深美
# JP: 「うん！」
2179 = "「Ừm!」"

# monologue
# JP: ……会の終わりが近づいてを悟ってのことだろう。\n急速に、食事の片付けにはいっている。
1511 = "……Chắc là do nhận ra buổi tiệc sắp tàn.\\nHọ đang nhanh chóng thu dọn đồ ăn."

# monologue
# JP: まぁ、ポーレットや僕を信頼し、\n判断を任せてくれているがゆえ――のこととも言えよう。
2911 = "Chà, cũng có thể nói đó là vì họ tin tưởng Paulette và tôi, \\nnên mới phó mặc quyết định cho chúng tôi——"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとれいなも、その方針でいいか？」
2496 = "「Paulette và Reina, hai người cũng đồng ý với phương châm đó chứ?」"

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。とーってもいいと思いますぅ。\nふつーにしてもらえたら、きっと一番らくですよぉ」
2436 = "「Vâng ạ. Em nghĩ là rất tuyệt luôn ạ.\\nNếu cứ đối xử như bình thường thì chắc chắn sẽ thoải mái nhất đấy ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「経験者のお墨付きはありがたい。\nポーレットは――うむ？　ポーレット？」
2449 = "「Có lời đảm bảo từ người có kinh nghiệm thì thật nhẹ nhõm.\\nCòn Paulette thì—— ừm? Paulette?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ああいえ。少しわたし、うじうじモード……\nちょっと、自己批判にはいっちゃってました」
2149 = "「A, không có gì. Tôi vừa hơi... rơi vào chế độ u sầu...\\nMột chút tự phê bình bản thân thôi mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2126 = "「哦」" 

# monologue
# JP: 反省、といわんばかりに、\nポーレットは自らの頭を、小さく作った拳で叩く。
3057 = "Như thể để tự kiểm điểm,\\nPaulette khẽ đấm tay vào đầu mình."

# 【ポーレット】
# display as 波萊特
# JP: 「『共に仕事をするプロとプロとして』ですよね。うん。\nそれでＯＫです。わたしもそうしますし、双鉄くんも」
2440 = "「『Với tư cách là những chuyên gia làm việc cùng nhau』 đúng không nào. Ừm.\\nVậy là OK rồi. Tôi cũng sẽ làm như thế, và cả Soutetsu-kun nữa」"

# 【双鉄】
# display as 雙鐵
# JP: 「心得た。あとは日々姫だが――」
2375 = "「Đã rõ. Còn về Hibihime thì——」"

# 【日々姫】
# display as 日日姬
# JP: 「寝るとこ」
2536 = "「Neru-toko (Nơi để ngủ)」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2199 = "「嗯？」" 

# monologue
# JP: ネルトコ、とはいったいなんだ。\n意味がつかめず、間の抜けた声を零してしまう。
3177 = "Neru-toko, rốt cuộc là cái gì cơ chứ.\\nTôi không hiểu ý nghĩa của từ đó, lỡ thốt ra một tiếng ngẩn ngơ."

# 【日々姫】
# display as 日日姬
# JP: 「にぃにのお部屋。オリヴィとハチロクが寝とるでしょ？\nけど、まだにぃに信頼関係もなーんもなかけん」
2628 = "「Phòng của anh hai. Oli và Hachiroku đang ngủ ở đó đúng không?\nNhưng mà, giữa anh hai và họ vẫn chưa có chút lòng tin nào cả」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2208 = "「Ừ」"

# monologue
# JP: まったく無かった視点だが、\n言われてみれば、頷くしかない。
3163 = "Một góc nhìn hoàn toàn mới,\nnhưng khi nghe cô bé nói vậy, tôi chỉ biết gật đầu đồng tình."

# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。オリヴィもそれは不安だろうな。\nでは、僕は次の間かどこかで」
2532 = "「Quả thật là vậy. Oli chắc cũng đang bất an về chuyện đó. \nVậy thì, anh sẽ ngủ ở phòng bên cạnh hay đâu đó khác」"

# 【日々姫】
# display as 日日姬
# JP: 「ゆーか、今夜はわたしがにぃにの部屋で寝るけん。\nにぃには、わたしの部屋で寝てよかとよ」
2682 = "「Mà nè, tối nay em sẽ ngủ ở phòng của anh hai.\nAnh hai cứ ngủ ở phòng của em là được mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕はそれで構わんが――日々姫はいいのか？」
2356 = "「Anh thì sao cũng được, nhưng---Hibihime ổn chứ?」"

# 【日々姫】
# display as 日日姬
# JP: 「全然よかよ。それに……少しだけ心配やけん。\n明日の朝が」
2263 = "「Ổn hoàn toàn luôn. Hơn nữa…… em thấy hơi lo một chút.\nVề chuyện sáng mai」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2208 = "「噢噢」" 

# monologue
# JP: 日々姫の懸念がすぐ理解できる。\nなるほど――確かにそこは不安だ。
3189 = "Tôi có thể hiểu ngay nỗi lo của Hibihime.\nRa là vậy---quả thật đó là điều đáng lo ngại."

# monologue
# JP: 『ハチロクがこども扱いしていたから』と、\nあの凪が、はっきり感じたほどなのだから。
3100 = "Đến cả Nagi, người vốn nhạy bén, còn cảm nhận rõ ràng rằng\n『Hachiroku đã đối xử với Oli như một đứa trẻ』."

# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロクとオリヴィの関係が、か」
1542 = "「……Mối quan hệ giữa Hachiroku và Oli, sao」"

# 【日々姫】
# display as 日日姬
# JP: 「うん。少しだけだけど」
2183 = "「Ừm. Chỉ một chút thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。ならば、見てやってくれ」
2569 = "「Anh hiểu rồi. Vậy thì, nhờ em để mắt tới họ nhé」"

# 【日々姫】
# display as 日日姬
# JP: 「わかった！　任せて！！」
2251 = "「Vâng ạ! Cứ giao cho em!!」"

# monologue
# JP: 支えられてる。\n家族はもちろん、仲間たちのたくさんの手にも。
3023 = "Tôi đang được nâng đỡ.\nKhông chỉ bởi gia đình, mà còn bởi rất nhiều đôi tay của những người đồng đội."

# monologue
# JP: そう感じるから、確信できる。\nオリヴィもきっと、ほどなく僕らの仲間になれる。
3381 = "Vì cảm nhận được điều đó, tôi có thể tin chắc rằng.\nOli rồi cũng sẽ sớm trở thành một phần trong gia đình chúng ta thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「では、解散だな。明日もよろしく」
2660 = "「Vậy thì giải tán nhé. Ngày mai nhờ mọi người cả đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、その前に。せっかくですから。\n主役とハチロクちゃんが不在なのは、残念だけど」
2161 = "「À, khoan đã. Nhân tiện dịp này mà. \\nDù hơi tiếc là nhân vật chính và Hachiroku-chan không có ở đây.」"

# monologue
# JP: ポーレットがグラスを構えてみせる。\nそういうことかと、みなが手に手にグラスを取る。
3272 = "Paulette giơ ly lên. \\nHiểu ý cô ấy, mọi người cũng lần lượt cầm ly của mình lên."

# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんとⅨ号機関車が、\n御一夜鉄道に来てくれたことを祝して――」
2501 = "「Để chúc mừng việc Olivi-chan và đầu máy số IX \\nđã đến với đường sắt Hitoyoshi—」"

# 【日々姫】
# display as 日日姬
# JP: 「わたしたちに、\n新しい仲間ができたことを祝って――」
2341 = "「Để chúc mừng việc chúng ta \\nđã có thêm những thành viên mới—」"

# monologue
# JP: ポーレットが、日々姫が、\nみんながそろって僕を見る。
3260 = "Paulette, Hibiki, \\ntất cả mọi người đều đồng loạt nhìn về phía tôi."

# monologue
# JP: ガラではないし、立場でもない、が、光栄だ。\n喜んで音頭を取らせてもらおう。
3431 = "Không phải phong cách của tôi, cũng chẳng phải vị thế của tôi, nhưng thật là vinh dự. \\nTôi xin vui lòng được dẫn dắt lời chúc này."

# 【双鉄】
# display as 雙鐵
# JP: 「――乾杯」
1520 = "「——Cạn ly」"
