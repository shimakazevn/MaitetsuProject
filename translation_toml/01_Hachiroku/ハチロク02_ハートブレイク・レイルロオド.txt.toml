3049 = "Không màng đến việc váy bị lấm bẩn, cô quỳ gối xuống đất, \nchậm rãi, nhẹ nhàng xoa lưng cho Oli. "

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うぇぇ――ひっくっ――うえっ――うぅぅぅぅぅ～」
2173 = "「Oa… hic… ư… oà… hu hu hu~」"

# monologue
# JP: 言葉に、ならない。\n哀しみが、ただただうめきとなって溢れる。
3060 = "Không thốt nên lời. \nNỗi đau thương chỉ còn là tiếng rên rỉ nghẹn ngào."

# 【ハチロク】
# display as 八六
# JP: 「大丈夫。どんなに泣いてもかまいませんよ？」
2484 = "「Không sao đâu. Cô cứ khóc thỏa thích cũng chẳng sao cả.」"

# monologue
# JP: ハチロクは、その慟哭を包もうとする。\n優しく優しく手を動かして、オリヴィに寄り添い続けてる。
2940 = "Hachiroku cố gắng ôm trọn lấy nỗi thống khổ ấy. \nCô nhẹ nhàng di chuyển đôi tay, kiên trì ở bên cạnh an ủi Oli."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……う、うっ――ふっ――っふう――ふううっ――ぅ」
