[script]
# lines: 513 
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、ポーレットに相談してみよう」
2547 = "「Dù sao đi nữa, hãy thử bàn bạc với Paulette xem sao.」"

# 【ハチロク】
# display as 鈴
# JP: 「左様でございますね。ポーレット様は、\n行政についても専門家でいらっしゃるのですから」
2405 = "「Dạ, quả đúng là vậy ạ. Cô Paulette cũng là một chuyên gia về các vấn đề hành chính mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。こどもを迎えるということについて、\n僕らの知識は、とても狭い」
2286 = "「Ừm. Về việc đón một đứa trẻ về, kiến thức của bọn mình vẫn còn rất hạn hẹp.」"

# monologue
# JP: ……一番単純に考えるなら、\n『養子を迎える』という選択になろう。
1508 = "……Nếu xét theo hướng đơn giản nhất thì,\\ncó lẽ đó là lựa chọn 『nhận con nuôi』."

# monologue
# JP: その可否、難しさ、必要な準備やこころがまえ。\nあるいは、その他の選択肢――
2931 = "Việc đó có khả thi hay không, những khó khăn, những chuẩn bị cần thiết và sự chuẩn bị tâm lý.\\nHoặc là, những lựa chọn khác nữa――"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットならより広く、多くを知っていようし、\nもし知らずとも、専門家を紹介してくれよう」
2497 = "「Paulette chắc sẽ biết nhiều và rộng hơn, nếu cô ấy không biết thì cũng sẽ giới thiệu cho ta những chuyên gia khác.」"

# 【ハチロク】
# display as 鈴
# JP: 「はい。そのようにしていただけましたら、\nわたくしも、とても嬉しうございます」
2435 = "「Vâng ạ. Nếu được như vậy thì em cũng cảm thấy rất vui ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ではそれで。\n相談は……仕事終わりにの方が良いだろう」
2663 = "「Vậy cứ thế đi.\\nChuyện đó... tốt nhất là đợi sau khi xong việc hãy bàn thì hơn」"

# 【ハチロク】
# display as 鈴
# JP: 「かしこまりました。\nきっと、そのようにいたしましょう」
2418 = "「Vâng, em đã rõ.\\nChắc chắn rồi, chúng ta sẽ làm như vậy ạ」"

# monologue
# JP: すずが笑顔で頷いてくれる。\nならば、プライベートの話はここまで。
3417 = "Suzu gật đầu với nụ cười rạng rỡ.\\nVậy là, chuyện cá nhân tạm dừng ở đây."

# monologue
# JP: ここから先は仕事モード――\nと行きたいのだが、そうスッキリは切り替えられない。
3196 = "Từ giờ trở đi là chế độ làm việc――\\nmuốn là vậy, nhưng tâm trí tôi vẫn chưa thể thoát ra hoàn toàn."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま？」
2694 = "「Soutetsu-sama?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
2178 = "「Ừ」"

# monologue
# JP: すずも同じ気持ちとわかる。\nいつものように、一度ぎゅうっと手を握り合う。
3314 = "Tôi hiểu Suzu cũng cảm thấy như vậy.\\nNhư thường lệ, cả hai nắm chặt tay nhau một cái."

# 【ハチロク】
# display as 八六
# JP: 「今日も一日ご安全に、右田\x%l機関士;#00ffc040;機関士%l;#;」
2085 = "「Chúc một ngày làm việc an toàn, anh tài xế\\x%lMigi-ta;#00ffc040;Tài xế%l;#;」"

# 【双鉄】
# display as 雙鐵
# JP: 「ご安全に。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・ハチロク」
1982 = "「Chúc an toàn.\\x%lRailord;#00ffc040;Railord%l;#;・Hachiroku」"

# 【ハチロク】
# display as 八六
# JP: 「では、参りましょう」
2669 = "「Vậy, chúng ta đi thôi」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2178 = "「嗯」" 

# monologue
# JP: 手を解き、レールショップの扉をくぐる。
3162 = "Buông tay nhau ra, tôi bước qua cánh cửa của Rail Shop."

# 【双鉄】
# display as 雙鐵
# JP: 「おはよう」
2228 = "「Chào buổi sáng」"

# 【れいな】
# display as 玲奈＆凪
# JP: 「双鉄さぁん！　大変ですよぉ！」\n「にーさん！　えらいことばい！！」
2691 = "「Soutetsu-saaan! Nguy to rồi ạ!」\\n「Anh hai! Chuyện lớn rồi!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おうっ！？」
2209 = "「Ốiっ!?」"

# monologue
# JP: レールショップに入るなり、\nれいなが、凪が、すっとんで来る。
3158 = "Vừa mới bước vào Rail Shop,\\nReina và Nagi đã lao thẳng tới chỗ tôi."

# 【ハチロク】
# display as 八六
# JP: 「まぁ騒がしい。なにごとですか？」
2017 = "「Chà, ồn ào quá đấy. Có chuyện gì vậy?」"

# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ！　急に来ることになったんですよぉ」
2633 = "「Thì là... bọn em bị bắt tới đây gấp đó ạ!」"

# 【凪】
# display as 凪
# JP: 「やけん！　準備！　まるで整ってなかとばい！！」
2408 = "「Đúng vậy! Công tác chuẩn bị... chẳng đâu vào đâu cả!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「来る、とは何がだ？」
2422 = "「Tới á? Cái gì tới cơ?」"

# 【れいな】
# display as 玲奈
# JP: 「[きゅうごう,1]Ⅸ号ですよぉ！\nみかん鉄道さんの、Ⅸ号機関車！！」
2294 = "「Số IX đấy ạ!\\nĐầu máy số IX của đường sắt Mikan!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？」
1991 = "「Cái gì!?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです！　来てくれるんです！ \nあの小さくてかわいい機関車と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が」
2482 = "「Đúng vậy ạ! Họ sẽ tới! \\nCả đầu máy nhỏ bé dễ thương đó và cả \\x%lレイルロオド;#00ffc040;Railord%l;#; nữa」"

# monologue
# JP: ポーレットも奥からやってくる。\nその足取りは、夢見るようにふわふわだ。
3262 = "Paulette cũng đi từ phía trong ra.\\nBước chân cô ấy nhẹ bẫng như đang mơ."

# 【双鉄】
# display as 雙鐵
# JP: 「交渉は難航している――と聞いていたが」
2083 = "「Tôi nghe nói cuộc đàm phán đang rơi vào bế tắc cơ mà」"

# monologue
# JP: みかん鉄道のⅨ号は、100年物の……しかももう何十年も、\n\x%l入換機;#00ffc040;入換機%l;#;としてしか作動していない極めて古い\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;だ。
3224 = "Đầu máy số IX của đường sắt Mikan là loại... đã hơn 100 tuổi, hơn nữa suốt hàng chục năm qua nó chỉ hoạt động như một \\x%l入換機;#00ffc040;đầu máy dồn toa%l;#; cực kỳ cổ lỗ sĩ."

# monologue
# JP: 『いつ壊れてもおかしくないものをお譲りできない』と、\nそうした理由で、固辞されているという話だったが――
3351 = "Đã từng nghe kể rằng họ kiên quyết từ chối với lý do rằng: 『Chúng tôi không thể nhượng lại thứ có thể hỏng hóc bất cứ lúc nào』— vậy mà—"

# 【ポーレット】
# display as 波萊特
# JP: 「みかん鉄道さんと御一夜鉄道を本当の意味で繋ぐために、\n[きゅう]Ⅸ号がどうしても必要って、粘り強くお話したんです」
1974 = "「Em đã kiên trì thuyết phục rằng, để thực sự kết nối đường sắt Mikan và đường sắt Hitoyoshi, thì đầu máy số IX là không thể thiếu」"

# monologue
# JP: （粘り強く、か）
3456 = "（Kiên trì, sao...）"

# monologue
# JP: 微妙な空気が、レールショップに一瞬、満ちる。
3203 = "Một bầu không khí gượng gạo lan tỏa khắp tiệm đường sắt trong chốc lát."

# monologue
# JP: こと鉄道に関しての、ポーレットの驚異的な粘り腰。\nみながそれを知っているゆえ、どうしても。
3025 = "Vì ai nấy đều biết rõ sự kiên trì kinh ngạc của Paulette mỗi khi liên quan đến đường sắt, nên..."

# 【ポーレット】
# display as 波萊特
# JP: 「そしたら、それを聞きつけてくれたオリヴィちゃんが、\n多分自分から、御一夜移籍を志願してくれたんですよ！」
2409 = "“Vậy là, sau khi nghe tin đó, Olivi-chan,\ncó lẽ đã tự mình xin được chuyển đến Ohana đấy!”"

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィとは？」
2234 = "“Olivi là ai?”"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　Ⅸ号の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のこです。明るくて元気で、\nとってもかわいいこなんですよ！」
2156 = "“À! Đó là bé \\x%lレイルロオド;#00ffc040;Railord%l;#; của đầu tàu số IX. Bé ấy hoạt bát, năng nổ,\nvà cực kỳ đáng yêu luôn ạ!”"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;自らがか」
2636 = "“Ồ. Vậy là chính bản thân \\x%lレイルロオド;#00ffc040;Railord%l;#; đó đã chủ động sao”"

# monologue
# JP: “多分”の一言がやや気にかかるが、\nそれはなんとも心強い。
3427 = "Dù từ “có lẽ” khiến tôi hơi bận tâm một chút,\nnhưng đó quả là một tin đáng mừng."

# monologue
# JP: １００年稼働した\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の経験ならば、\nきっと御一夜鉄道にも、素晴らしいものを伝えてくれよう。
3053 = "Với kinh nghiệm của một \\x%lレイルロオド;#00ffc040;Railord%l;#; đã vận hành suốt 100 năm,\nchắc chắn cô bé sẽ mang đến những điều tuyệt vời cho Đường sắt Ohana."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、正真正銘の朗報なのだな。\n随分といきなりなので、驚かされてしまいはしたが」
2680 = "“Vậy thì, đây quả thực là một tin tốt lành.\nDù có chút bất ngờ vì nó đến đột ngột quá”"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです、本当にいきなりだったんです。\n始発の準備をしてるとき、電話がかかってきて」
2283 = "“Vâng, quả thực là đột ngột lắm ạ.\nLúc em đang chuẩn bị cho chuyến tàu đầu tiên thì có cuộc gọi đến”"

# 【双鉄】
# display as 雙鐵
# JP: 「始発の乗務前にか？」
2429 = "“Trước khi bắt đầu ca trực chuyến tàu đầu tiên sao?”"

# monologue
# JP: 夜は1927御一夜温泉着で運転終了となる御一夜鉄道だが、\n朝練へ向う学園生を運ぶため、始発は早く0527だ。
3129 = "Dù Đường sắt Ohana kết thúc lịch trình vào lúc 19:27 khi đến suối nước nóng Ohana,\nnhưng vì phải chở học sinh đi học sớm, chuyến đầu tiên bắt đầu từ lúc 05:27."

# monologue
# JP: 発車準備は、その二時間近く前から始まっている。
3342 = "Công tác chuẩn bị khởi hành đã bắt đầu từ gần hai tiếng trước đó."

# 【双鉄】
# display as 雙鐵
# JP: 「どう考えても異常事態ではないか。\nそのような時間に、いったい誰から？」
2635 = "“Dù nghĩ thế nào thì đó cũng là tình huống bất thường mà.\nVào giờ đó, rốt cuộc là ai đã gọi?”"

# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんからです！\n凄いテンションで『いますぐ御一夜にいくー！』って」
2431 = "“Là Olivi-chan ạ!\nBé ấy cực kỳ phấn khích, hét lên: ‘Em muốn đến Ohana ngay bây giờ!’”"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと」
2303 = "“Ra vậy”"

# 【ポーレット】
# display as 波萊特
# JP: 「それで『どういうこと？』って聞いたら、切れちゃって。\nだけどわたし、乗務があるからすぐには折り返せなくて」
2360 = "“Thế là em hỏi ‘Ý em là sao?’, nhưng cuộc gọi bị ngắt mất.\nNhưng vì em phải đi làm ca trực nên không thể gọi lại ngay được”"

# 【れいな】
# display as 玲奈
# JP: 「それで、御一夜温泉駅に戻ってきたら、\nついさっき、また電話がかかってきたんですよぉ」
2505 = "\"Thế rồi, khi vừa quay lại ga suối nước nóng Ohitoyo, \\nvừa nãy lại có một cuộc điện thoại gọi tới đấy ạ.\""

# 【双鉄】
# display as 雙鐵
# JP: 「その\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の、オリヴィからか？」
2648 = "\"Có phải từ Olivie, cô Railord đó không?\""

# 【ポーレット】
# display as 波萊特
# JP: 「いいえ。みかん鉄道の社長さんからです。\n『調印と引き渡しを早めることはできないか？』って」
1965 = "\"Không phải ạ. Là từ chủ tịch của đường sắt Mikan. \\nÔng ấy hỏi rằng: 'Không thể đẩy nhanh tiến độ ký kết và bàn giao được sao?'\""

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。調印もまだの話だよな」
2298 = "\"Ra vậy. Việc ký kết vẫn chưa xong mà.\""

# 【ポーレット】
# display as 波萊特
# JP: 「はい、まだです。ですから今日来てもらって、\nそこで調印！　っていう流れになったんです」
2447 = "\"Vâng, vẫn chưa ạ. Vì vậy nên họ mới đến vào hôm nay, \\nvà luồng công việc sẽ là đến nơi rồi ký kết luôn!\""

# 【ハチロク】
# display as 八六＆雙鐵
# JP: 「はい？」\n「今日だと！！？」
2626 = "\"Hả?\"\\n\"Hôm nay á!!?\""

# monologue
# JP: 声が重なり、目を見合わせる。\nハチロクが話したそうに見えるから、ひとつ頷く。
3159 = "Chúng tôi đồng thanh lên tiếng rồi nhìn nhau.\\nHachiroku có vẻ muốn nói gì đó, nên tôi gật đầu ra hiệu."

# monologue
# JP: ハチロクは、ポーレットを見て、僕を見て――\nそれからゆっくり、慎重そうな声をだす。
3066 = "Hachiroku nhìn Paulette, rồi nhìn tôi——\\nSau đó, cô khẽ cất giọng với vẻ thận trọng."

# 【ハチロク】
# display as 八六
# JP: 「それは……随分と……その――\n例を見ないこと、なのではないか、と」
2632 = "\"Điều đó là…… thực sự…… cái đó——\\nchẳng phải là tiền lệ chưa từng có hay sao ạ?\""

# monologue
# JP: トップの経営判断だ。\nハチロクは言葉を選んでいるが、その必要も感じない。
3404 = "Đó là quyết định quản lý của người đứng đầu.\\nHachiroku đang cân nhắc ngôn từ, nhưng tôi thấy chẳng cần thiết phải vậy."

# monologue
# JP: 異論や疑問があるのなら、率直にぶつけてかまわない。\nそれが許されるのが、御一夜鉄道の長所なのだから。
3069 = "Nếu có dị nghị hay thắc mắc, cứ việc thẳng thắn đặt câu hỏi.\\nBởi vì sự cho phép đó chính là ưu điểm của đường sắt Ohitoyo."

# 【双鉄】
# display as 雙鐵
# JP: 「なぜ、そこまで急速に話が進むのだ？　無論――\n念願の\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;が来るのだから、基本線は大歓迎だが」
2337 = "\"Tại sao câu chuyện lại tiến triển nhanh đến mức đó? Tất nhiên——\\nchúng ta cơ bản rất hoan nghênh vì con tàu \\x%lđầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;#; mà ta hằng mong ước sắp tới rồi.\""

# 【ハチロク】
# display as 八六
# JP: 「みかん鉄道様を疑いたくはございませんが……\nなにか……致命的な故障が発生した、などの可能性は」
2395 = "\"Tôi không có ý nghi ngờ đường sắt Mikan…… \\nnhưng liệu có khả năng nào như…… xảy ra hỏng hóc nghiêm trọng không?\""

