2252 = "「Nếu là phúc lợi cho fan, thì việc không kéo \\x%l汽笛;#00ffc040;còi hơi nước%l;#; là...... Hơn nữa, liệu người ta có gắn \\x%l重油並燃装置;#00ffc040;thiết bị đốt bỏ dầu nặng%l;#; cho đầu máy hơi nước thời Meiji không nhỉ?」"
# 【凪】
# display as 凪
# JP: 「[にゅうせん,1]入線ばーい！！！　よぉ来たばーい！！」
2643 = "「Tiến vào đường ray rồi á!!! Đến rồi á!!」"
# 【ふかみ】
# display as 深美
# JP: 「わぁぁ、かわいい\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;！　です！\n\\x%l客車;#00ffc040;客車%l;#;もとっても小さい、かわいい！」
2113 = "「Oa, \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; dễ thương quá! ạ! \\x%l客車;#00ffc040;Toa hành khách%l;#; cũng rất nhỏ, dễ thương lắm!」"
# 【ポーレット】
