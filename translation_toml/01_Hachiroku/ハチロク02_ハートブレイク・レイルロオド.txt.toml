1559 = "「……Nếu không nhờ cơn sốt \\x%lđầu máy hơi nước;#00ffc040;đầu máy hơi nước%l;#; và sự thanh tẩy đó, thì có lẽ con tàu này đã kết thúc cuộc đời trong kiếp \\x%lđầu máy dồn toa;#00ffc040;đầu máy dồn toa%l;#; rồi」"

# 【ポーレット】
# display as 波萊特
