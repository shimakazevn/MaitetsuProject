2327 = "「Mọi người ở Đường sắt Ohito đang chào đón chúng ta đấy. Vậy mà......Olivy. Cô định làm ô uế danh tiếng của Đường sắt Mikan sao.」"
# 【オリヴィ】
# display as 奥莉薇
