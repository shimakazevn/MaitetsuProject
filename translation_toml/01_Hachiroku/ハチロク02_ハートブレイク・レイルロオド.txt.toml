3173 = "Lời thì thầm gần như không phát ra tiếng và cái vẫy tay của tôi, đã được Hibiki phản hồi lại một cách nhanh chóng."
# 【双鉄】
# display as 雙鐵
# JP: 「凪と一緒に、Ⅸ号の様子をチェックしてくれ。\nふかみとれいなには\\x%l客車;#00ffc040;客車%l;#;のチェックを」
2020 = "「Em cùng với Nagi, hãy kiểm tra tình trạng của Đầu máy số 9 nhé. Còn Fukami và Reina thì kiểm tra \\x%l客車;#00ffc040;toa hành khách%l;#;.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。わかった」
2192 = "「Vâng. Em hiểu rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それから――」
2504 = "「Sau đó——」"
# 【日々姫】
# display as 日日姬
