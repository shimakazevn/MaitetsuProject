2388 = "「Là \\x%l重油並燃装置;#00ffc040;thiết bị đốt bỏ dầu nặng%l;#; trong lời đồn đó. Có lẽ họ đã cố tình tạo ra khói đen bằng cái đó đấy.」"
# 【ハチロク】
# display as 八六
