# JP: いくら小型の機関車とはいえ、助士無しでの運用などは、\n異例も異例のことだからだ。
3003 = "Dù là đầu máy nhỏ đến đâu, thì việc vận hành mà không có phụ lái, là chuyện vô cùng, vô cùng hiếm thấy."
# monologue
