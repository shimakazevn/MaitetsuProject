2052 = "「Có con muỗi đậu vào em. Tiếc là anh đánh trượt mất rồi.」"
# monologue
# JP: いえばクスクス、\nハチロクは、さも愉快そうに笑い出す。
3350 = "Nghe vậy, Hachiroku cười khúc khích, trông có vẻ rất thích thú."
# 【ハチロク】
# display as 八六
# JP: 「まぁ、わたくし\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですのよ？\n蚊にとまられても、それこそ痛くも痒くもありません」
2076 = "「Trời ạ, em là \\x%lレイルロオド;#00ffc040;Railord%l;#; đó ngài biết không? Dù có bị muỗi đốt, thì cũng chẳng hề hấn gì đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだが――」
2575 = "「Tuy là vậy nhưng mà——」"
