2576 = "\"Người dự định hướng dẫn chúng ta là\\x%ltrưởng tàu;#00ffc040;trưởng tàu%l;#; bị ốm đột xuất,\\nnên cô ấy đã thay thế khẩn cấp――đó là câu chuyện mà em nghe được ạ.\""

