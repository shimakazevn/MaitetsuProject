2998 = "À, đúng là một chuyên nghiệp. Cô bé này, rốt cuộc cũng vẫn là một \\x%lRailord;#00ffc040;Railord%l;#;.\\nKhoảnh khắc đó, tôi thấy sống lưng mình thẳng lại."

