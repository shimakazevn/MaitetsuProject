3459 = "（Nhưng nhìn từ góc độ ngược lại――đó cũng là họ đang lo ngại việc phương tiện ngừng hoạt động sau khi chuyển nhượng là một khả năng thực tế）"

# monologue
# JP: 無論、百年物の蒸機だ。\nどれほど手をかけたとしても、その懸念は決して消せまい。
3135 = "Dĩ nhiên, đó là đầu máy hơi nước trăm năm tuổi mà.\\nDù có chăm chút kỹ lưỡng đến đâu, nỗi lo đó cũng không bao giờ biến mất."

# 【双鉄】
# display as 雙鐵
