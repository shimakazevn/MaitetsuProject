2918 = "Nếu vậy, đi thôi.\\nTrước mắt, anh sẽ tạm thời trở thành người đồng hành với tư cách là \\x%l機関士;#00ffc040;người lái tàu%l;#; của em."

# monologue
# JP: 支えになれるかはわからんが、\n一人で泣かせておくのは、ダメだ。
3429 = "Anh không rõ mình có thể là điểm tựa cho em không, nhưng\\nđể em khóc một mình thế này thì không được."

# 【れいな】
# display as 玲奈
# JP: 「ふえぇ……」
2170 = "\"Hu hu...\""

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？」
# 2159 = "「啊！？」" 

# monologue
# JP: 思わぬ声に、足が止まる。\nれいな――れいなが、何故かぐしゃぐしゃの顔をしている。
2967 = "Nghe tiếng khóc bất ngờ, tôi khựng lại.\\nReina――Tại sao mặt mũi Reina lại nhòe nhoẹt hết cả thế kia?"

# 【ポーレット】
# display as 波萊特
# JP: 「ど、どうしたの？　れいな、どこか痛むの？」
2332 = "\"S-sao thế? Reina, em thấy đau ở đâu à?\""

# 【れいな】
# display as 玲奈
# JP: 「痛ま、ない――です。ごめん、な、さぁい。れいな、\n全然、れいな、ちっとも、かなしく、ない、のに――」
1951 = "\"Em không, không đau đâu ạ. Em xin, lỗi. Reina, \\nhoàn toàn, Reina, một chút cũng không, buồn, nhưng mà――\""

# monologue
# JP: ああそうなのか、と……\nれいなには悪い気もするが、ほんの少しだけほっとする。
3174 = "À ra là vậy, tôi...\\nTuy cảm thấy có lỗi với Reina, nhưng tôi cũng thấy nhẹ nhõm hơn một chút."

# monologue
# JP: あの泣き声――あの慟哭に揺すぶられるのは、\n僕のこころだけではなくて――いや――
3281 = "Tiếng khóc đó――cái tiếng khóc than đó làm rung động\\nkhông chỉ trái tim tôi――không, không phải――"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。平気か？」
2040 = "\"Hachiroku. Em ổn chứ?\""

# 【ハチロク】
# display as 八六
