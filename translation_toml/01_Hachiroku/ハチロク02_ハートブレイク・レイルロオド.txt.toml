1509 = "……Không sao đâu, Reina. \nVì có Paulette ở đây, cậu không hề cô đơn."

# monologue
# JP: そうして、僕らも。\nこうして、お互い、支えあえているのだから。
3157 = "Và cứ thế, cả chúng ta nữa. \nChúng ta cũng đang nương tựa vào nhau thế này mà."

# 【双鉄】
# display as 雙鐵
# JP: 「だが――オリヴィは、あのこは、一人だ。\n少なくとも今、この瞬間は」
2010 = "「Nhưng mà――Oli-vi, đứa trẻ đó, đang một mình. \nÍt nhất là ngay lúc này, giây phút này.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。ですので、わたくしたちで」
2285 = "「Vâng. Vì vậy, chúng ta hãy...」"

# monologue
# JP: 自然と急ぐ。小走りになる。
3182 = "Tự nhiên rảo bước. Rồi chạy nhanh dần."

# 【稀咲】
# display as 稀咲
# JP: 「歓迎会はひとまずバラしで。構わないね？」
2673 = "「Tạm thời giải tán buổi tiệc chào mừng nhé. Không phiền chứ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまんが頼む」
2197 = "「À, xin lỗi, nhờ cả vào cô/em.」"

# 【真闇】
# display as 真闇
# JP: 「こっちこそ。双ちゃん、お願いね？」
2354 = "「Chính em mới phải nhờ vả. Soutetsu, nhờ anh nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2178 = "「嗯」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ぅぅぅ～～っ――うっ――\nひうっ――うえぇぇぇぇ～～」
2174 = "「Ưưư～～～～ ư... \nHìu... oaaa～～～」"

# 【双鉄】
# display as 雙鐵
# JP: 「これは――」
2622 = "「Đây là――」"

# monologue
# JP: 泣き崩れている。うずくまってる。
3062 = "Cô bé đang gục khóc. Đang ngồi thu mình lại."

# monologue
# JP: 胎児のように――\n外界すべてを拒絶して、自分ひとりを守る姿勢で。
3095 = "Như một bào thai――\nKhước từ mọi thứ bên ngoài, ở trong tư thế tự bảo vệ bản thân mình."

# 【双鉄】
# display as 雙鐵
# JP: 「これは……いったい、\nどこからどう声をかければいいものか」
2624 = "「Việc này... rốt cuộc thì, \nphải cất lời từ đâu và như thế nào đây」"

# 【ハチロク】
# display as 八六
# JP: 「…………大丈夫。ね？　大丈夫」
1555 = "「............Không sao đâu. Nhé? Không sao mà.」"

# monologue
# JP: ハチロクは、オリヴィのとなりに座り込む。
2942 = "Hachiroku ngồi xuống bên cạnh Oli-vi."

# monologue
