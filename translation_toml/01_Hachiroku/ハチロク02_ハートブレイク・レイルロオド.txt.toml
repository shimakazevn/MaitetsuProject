2629 = "「Trời, chuyện đó cũng thật hiếm thấy. Đã qua được Obata rồi thì cứ đi cùng tới Oyorogi rồi nghỉ ngơi luôn cũng được mà」"

# 【ポーレット】
# display as 波萊特
