# monologue
# JP: 声にもなってなかった呻きが、やがて泣き声に戻り始める。\n石のようだった背中がぶるり、小さく震える。
3064 = "Tiếng rên rỉ không thành lời, cuối cùng cũng bắt đầu trở lại thành tiếng khóc. Tấm lưng vốn cứng đơ như đá khẽ run lên bần bật."
# 【ハチロク】
# display as 八六
# JP: 「……どうします？　泣き止んで、立ち上がりますか？\nそれとも、もう少し泣いていきますか？」
1551 = "「......Cô tính sao? Sẽ nín khóc và đứng lên chứ? Hay là, muốn khóc thêm một lúc nữa?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！！！」
2139 = "「!!!」"
# monologue
# JP: ハチロクの声。\nいつもと変わらぬ、落ち着き払った。
2944 = "Giọng của Hachiroku. Vẫn điềm tĩnh như mọi khi."
# monologue
# JP: それが刺激となったのか、\nオリヴィは、決然と涙を拭って、立ち上がる。
2916 = "Có lẽ điều đó đã trở thành một sự kích thích, Olivy dứt khoát lau nước mắt và đứng dậy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「みか――っ！？\nああっ――」
2461 = "「Mi——!? A a——」"
# monologue
# JP: ぼろぼろ、大粒の涙が落ちる。\nそれでも。オリヴィは言葉を続ける。
3032 = "Những giọt nước mắt to tròn lã chã rơi. Dù vậy. Olivy vẫn tiếp tục nói."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「元っ！　みかん鉄道っ――レイル、ロオド――オリヴィ――[きゅうごう,1]Ⅸ号機関車、と――着任、しま、したっ」
2050 = "「Nguyên! Đường sắt Mikan——Rail, lord——Olivy——cùng Đầu máy số 9——đã, đến, nhận nhiệm vụ!」"
# monologue
# JP: ああ、プロなのだ。このこもやはり、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。\n感じた瞬間、背筋が伸びる。
2998 = "A, đúng là chuyên nghiệp. Cô bé này quả nhiên cũng là một \\x%lレイルロオド;#00ffc040;Railord%l;#;. Ngay khoảnh khắc nhận ra điều đó, tôi liền thẳng lưng lên."
# monologue
# JP: 僕も一人のプロとして、みかん鉄道の名を汚すまいとする、\nオリヴィの姿勢に、応えよう。
3046 = "Tôi cũng phải đáp lại thái độ không muốn làm ô uế danh tiếng của Đường sắt Mikan của Olivy, với tư cách là một người chuyên nghiệp."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道運輸部長、\\x%l保線部長;#00ffc040;保線部長%l;#;。\n兼、8620号のまいてつ蒸気\\x%l機関士;#00ffc040;機関士%l;#;、右田双鉄だ」
2376 = "「Trưởng phòng Vận tải Đường sắt Ohito, \\x%l保線部長;#00ffc040;Trưởng bộ phận bảo trì đường ray%l;#;. Kiêm chủ tàu 8620, \\x%l機関士;#00ffc040;người lái tàu%l;#; hơi nước, Migita Soutetsu.」"
# 【ハチロク】
# display as 八六
# JP: 「御一夜鉄道8620専用\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、ハチロクです。\nオリヴィちゃん。これからよろしくお願いしますね？」
2378 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của 8620 Đường sắt Ohito, Hachiroku. Bé Olivy. Từ nay mong được em giúp đỡ nhé?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「っ！！！」
# 2139 = "「唔！！！」" 
# monologue
# JP: ギリっ、と音が聞こえた気がした。
3165 = "Tôi có cảm giác như nghe thấy tiếng nghiến răng ken két."
# monologue
# JP: 歯をくいしばり、燃えるような目でハチロクをみて、\nそれでもオリヴィは、差し出された手を一瞬は受けとる。
3044 = "Cắn chặt răng, nhìn Hachiroku bằng đôi mắt rực lửa, nhưng Olivy vẫn nắm lấy bàn tay đang đưa ra trong thoáng chốc."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それで、仕事――オリヴィ、の、仕事は――」
2665 = "「Vậy, công việc——công việc, của Olivy là——」"
# 【双鉄】
# display as 雙鐵
# JP: 「今日の仕事は休むことだ。\n明日、レクチャーの後から働いてもらう。できるか？」
2015 = "「Công việc hôm nay là nghỉ ngơi. Ngày mai, sau khi nghe hướng dẫn thì mới bắt đầu làm việc. Có làm được không?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「できる。よ。もちろんっ」
2072 = "「Làm được. chứ. Tất nhiên rồi.」"
# monologue
# JP: いいながら、一瞬キツく目が閉じられる。\n涙を、まぶたで――噛み殺してでもいるかのように。
3011 = "Vừa nói, em ấy vừa nhắm chặt mắt lại trong thoáng chốc. Như thể đang cố dùng mí mắt——để kìm nén những giọt nước mắt."
# monologue
# JP: 誇りを、ならば尊重しよう。\nその言を、信じた上で行動しよう。
3360 = "Lòng kiêu hãnh, vậy thì hãy tôn trọng nó. Hãy hành động dựa trên việc tin tưởng vào lời nói đó."
# 【双鉄】
# display as 雙鐵
# JP: 「頼もしい。それでは、明日のためにも今は休んでくれ。\n宿泊先は手配してある。案内しよう」
2317 = "「Thật đáng tin cậy. Vậy thì, để chuẩn bị cho ngày mai, bây giờ hãy nghỉ ngơi đi. Chỗ ở đã được sắp xếp rồi. Anh sẽ dẫn đường.」"
# 【れいな】
# display as 玲奈
# JP: 「……オリヴィさん、泣き疲れてぐっすりみたいですぅ。\nでもハチロクさん、念のためそばで様子をみてる、って」
1548 = "「......Cô Olivy, có vẻ đã khóc mệt nên ngủ say rồi ạ. Nhưng chị Hachiroku bảo, để phòng hờ chị ấy sẽ ở bên cạnh theo dõi tình hình nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。眠りという形でもなんでも、\nともかくこころを落ち着けてくれたのなら、なによりだ」
2637 = "「Vậy sao. Dù là dưới hình thức giấc ngủ hay gì đi nữa, chỉ cần em ấy bình tâm lại được thì tốt quá rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「ですねぇ」
2295 = "「Đúng vậy nhỉ~」"
# monologue
# JP: ほにゃりと笑うれいなも、すっかり落ち着いたようだ。\nが、ポーレットにずっとべったりくっついている。
3278 = "Reina mỉm cười nhẹ nhõm, có vẻ cũng đã hoàn toàn bình tĩnh lại. Nhưng, em ấy vẫn cứ bám dính lấy Paulette."
# monologue
# JP: あの慟哭は――それほど心を揺さぶった。\n置き去りにされる恐怖と辛さに、満ち満ちていた。
3408 = "Tiếng khóc than đó——đã làm lay động tâm can đến nhường nào. Nó chứa đầy sự sợ hãi và đau đớn khi bị bỏ lại."
# 【真闇】
# display as 真闇
# JP: 「で？」
2686 = "「Thế?」"
# monologue
# JP: 真闇姉は、言ってすぐさま寿司を頬張る。\n実にさりげない気づかいだ。
3322 = "Chị Mayami vừa nói xong liền nhét ngay miếng sushi vào miệng. Quả là một sự tinh ý rất tự nhiên."
# monologue
# JP: けれど、ポーレットは言葉を探しているのだろうか。\n真闇姉が寿司を喉へと落としてもなお、返事をできない。
2929 = "Nhưng, có lẽ Paulette đang tìm từ ngữ thích hợp chăng. Ngay cả khi chị Mayami đã nuốt xong miếng sushi, em ấy vẫn chưa thể trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「……料理、引き取らせてもらえてよかったな。\nキャンセルで廃棄などでは、あまりに申し訳がたたない」
1550 = "「......May mà chúng ta vẫn nhận lấy đống đồ ăn này nhỉ. Nếu hủy bỏ rồi đem vứt đi thì thật quá có lỗi.」"
# 【真闇】
# display as 真闇
# JP: 「その辺は、馴染みやけんね。\n歓迎会やれるときに改めて、ってもお願いして」
2042 = "「Chuyện đó thì, do quen biết cả mà. Chị cũng nhờ họ là khi nào tổ chức tiệc chào mừng thì làm lại rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「大変助かる。ありがとう」
2229 = "「Giúp được nhiều lắm. Cảm ơn chị.」"
# 【真闇】
# display as 真闇
# JP: 「おねーちゃんに手伝えるんは、\nこぎゃんことくらいやけん」
2262 = "「Chị cũng chỉ giúp được mấy việc cỡ này thôi á.」"
# monologue
# JP: 恐らく真闇姉は、事態の急変があることを――\nこの展開をも考慮して、準備をしてくれていたのだろう。
3031 = "Có lẽ chị Mayami đã dự đoán trước được sự thay đổi đột ngột của tình hình—— và đã chuẩn bị sẵn sàng cho cả diễn biến này rồi."
# monologue
# JP: 冷静になり振り返るのなら、今回のあまりに急な移籍話。\nトラブル由来と想定する方が、自然であった気もしてくる。
3301 = "Nếu bình tĩnh nhìn lại, thì chuyện chuyển nhượng quá đỗi gấp gáp lần này. Việc cho rằng nó bắt nguồn từ một rắc rối nào đó, có vẻ tự nhiên hơn."
# 【稀咲】
# display as 稀咲
# JP: 「できるといいね。歓迎会。なるべく早く」
2011 = "「Mong là có thể tổ chức được nhỉ. Tiệc chào mừng ấy. Càng sớm càng tốt.」"
# monologue
# JP: こんなときまで稀咲はピザだ。\n二つ折りにし、器用に口に運んでいる。
3331 = "Đến tận lúc này mà Kisaki vẫn ăn pizza. Em ấy gập đôi miếng bánh lại, rồi khéo léo đưa vào miệng."
# 【凪】
# display as 凪
# JP: 「すぐできるばい！\nちびっこなんて、一晩泣いたらけろりやけんね！」
2681 = "「Làm được ngay thôi á! Mấy đứa nhóc á, khóc một đêm xong là lại tươi tỉnh ngay ấy mà!」"
# 【ふかみ】
# display as 深美
# JP: 「けど……見た目が小さいだけで、あのオリヴィちゃんて、\nハチロクちゃんよりもっと年上――なんです、よね？」
2081 = "「Nhưng mà......chỉ là ngoại hình nhỏ bé thôi, chứ bé Olivy đó, còn lớn tuổi hơn cả Hachiroku——đúng không, ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。確か、\\x%l明智;#00ffc040;明智%l;#;の最後あたりに、\n[めいこく,1]冥国で作られて輸入されてきた蒸機と聞く」
2479 = "「Đúng vậy. Anh nhớ không lầm thì, khoảng cuối thời \\x%l明智;#00ffc040;Meiji%l;#;, nghe nói đó là đầu máy hơi nước được sản xuất ở Mỹ rồi nhập khẩu về.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんと？　ハチロクがこども扱いしとったから、\nすっかり勘違いしちゃったばい」
2534 = "「Vậy sao á? Tại Hachiroku cứ đối xử như trẻ con, nên em hiểu lầm luôn á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2178 = "「嗯」" 
# monologue
# JP: 言われてみれば――確かに……オリヴィが泣いてしまって\n以降ははっきり、こども扱いだった気もする。
3349 = "Nhắc mới nhớ——đúng là......từ lúc Olivy khóc, tôi có cảm giác Hachiroku đã đối xử với em ấy như một đứa trẻ."
# monologue
# JP: 少なくとも普段のハチロクならば、\n先輩\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に対して、ああした態度は取らんだろう。
3357 = "Ít nhất là với Hachiroku bình thường, chắc chắn sẽ không có thái độ như vậy với một \\x%lレイルロオド;#00ffc040;Railord%l;#; tiền bối."
# 【日々姫】
# display as 日日姬
# JP: 「ま、甘やかしたくなる気持ちはわかると。\nあのこ――オリヴィちゃん、かわゆかけんね」
1964 = "「Nhưng mà, em cũng hiểu cảm giác muốn nuông chiều bé đó á. Bé đó——Olivy ấy, dễ thương mà.」"
# monologue
# JP: うん、と一斉にみなが頷く。\nその頷きの強さに一瞬、戸惑わされる。
2947 = "Ừm, mọi người đồng loạt gật đầu. Sự đồng tình mạnh mẽ đó khiến tôi thoáng bối rối."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　外観的には、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;として標準的――\nいや無論、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は皆、外観に優れてはいるが」
2452 = "「Vậy sao? Về mặt ngoại hình, thì cũng là tiêu chuẩn của một \\x%lレイルロオド;#00ffc040;Railord%l;#;—— À không, tất nhiên là \\x%lレイルロオド;#00ffc040;Railord%l;#; nào cũng có ngoại hình xuất sắc rồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「顔がどうこうじゃなくて、守ってあげたくなる感じ？\nその辺が、こう、可愛さにつながっているっていうか～」
1952 = "「Không phải là khuôn mặt ra sao, mà là cảm giác muốn che chở ấy? Kiểu như, điều đó tạo nên sự dễ thương á~」"
# 【ふかみ】
# display as 深美
# JP: 「わかります！　母性を刺激される感じですよね。\nだっこして、いいこいいこしてあげたくなっちゃう」
2372 = "「Em hiểu! Cảm giác như kích thích bản năng làm mẹ ấy nhỉ. Cứ muốn ôm vào lòng, rồi vuốt ve dỗ dành thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ……」
2141 = "「A......」"
# monologue
# JP: ふかみの言葉に、\n何故かポーレットがうなだれてしまう。
3271 = "Nghe câu nói của Fukami, chẳng hiểu sao Paulette lại cúi gằm mặt xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「多分、わたしも――それ、です。\n母性刺激されて……ちゃんと、冷静に判断できなかった」
2364 = "「Có lẽ, em cũng——như vậy, ạ. Bị kích thích bản năng làm mẹ......nên đã không thể phán đoán một cách bình tĩnh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
2013 = "「Ra là vậy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だと思います。舞い上がらないで――たとえ電話ででも、\nもっと多くから、それぞれの説明を求めるべきでした」
2366 = "「Em nghĩ là vậy. Đáng lẽ em không nên phấn khích quá——dù là qua điện thoại, em cũng nên yêu cầu giải thích rõ ràng từ nhiều phía hơn.」"
# monologue
# JP: ようやく整頓できたのだろう。\nポーレットの口調は重くはあるが、明瞭だ。
3311 = "Cuối cùng cũng sắp xếp xong suy nghĩ rồi nhỉ. Giọng điệu của Paulette tuy nặng nề, nhưng rất rõ ràng."
# 【真闇】
# display as 真闇
# JP: 「どぎゃん事情か――あん人――\n[むなかた,1]宗方さんに、少しは聞けたと？」
2656 = "「Tình hình thế nào rồi á——người đó—— chú Munakata ấy, em có nghe ngóng được chút gì không á?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、本当に少しだけですけど、聞くには聞けました。\nかんしゃく起こしちゃったそうです、オリヴィちゃん」
2198 = "「Vâng, dù thực sự chỉ một chút thôi, nhưng em cũng đã hỏi được. Nghe nói là bé Olivy đã nổi cáu ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「かんしゃく」
2528 = "「Nổi cáu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜鉄道への移籍話をききつけたらもう、\n『オリヴィを捨てるんだ！』ってなっちゃったらしくて」
2580 = "「Vừa nghe tin chuyển nhượng đến Đường sắt Ohito là bé ấy đã, 『Mọi người định vứt bỏ Olivy!』 rồi phản ứng gay gắt luôn ạ.」"
# 【れいな】
# display as 玲奈＆凪
# JP: 「あぁ……」\n「むぅ……」
2142 = "「A......」 「Ưm......」"
# monologue
# JP: れいなの顔と凪の顔とが同時に歪む。
3293 = "Khuôn mặt của Reina và Nagi đồng thời nhăn nhó."
# 【凪】
# display as 凪
# JP: 「なーんか、気分のよくなか話ばいねー。\n御一夜鉄道、ゴミ箱扱いされとるみたいばい」
2640 = "「Cứ thấy, câu chuyện này không vui vẻ gì á. Cứ như Đường sắt Ohito bị coi là thùng rác vậy á.」"
# 【れいな】
# display as 玲奈＆雙鐵
# JP: 「えええっ！？」\n「一理あるな」
2105 = "「Hả!?」 「Cũng có lý.」"
# monologue
# JP: が――凪の率直な言葉に頷き返したのは、僕だけだ。\n……なるほど、これが、母性を刺激されている状態か。
3288 = "Nhưng——người gật đầu đồng tình với lời nói thẳng thắn của Nagi, chỉ có mình tôi. ......Ra là vậy, đây là trạng thái bị kích thích bản năng làm mẹ sao."
# monologue
# JP: れいなは本当に驚いてしまった様子だし、他の面子も、\n『今はあんまり厳しいことは』とでも言いたげな目だ。
3295 = "Reina có vẻ thực sự ngạc nhiên, còn những người khác thì, đều mang ánh mắt như muốn nói 『Bây giờ đừng nên khắt khe quá』."
# 【ポーレット】
# display as 波萊特
# JP: 「そんなつもり――こっちを悪くいうつもりじゃなくて。\nただ、オリヴィちゃん。ショックすぎたんだと思います」
2237 = "「Không phải ý đó đâu——không phải là có ý nói xấu bên mình đâu. Chỉ là, bé Olivy. Em nghĩ là bé ấy đã quá sốc thôi.」"
# 【凪】
# display as 凪
# JP: 「そぎゃんと？」
2446 = "「Vậy á?」"
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃん、みかん鉄道愛が本当に深いから……\nだから、移籍。すぐに割り切るなんて、きっと無理で」
2213 = "「Bé Olivy, yêu Đường sắt Mikan rất nhiều...... Nên chuyện chuyển nhượng. Chắc chắn là không thể chấp nhận ngay được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、ポーレットは、最初からそれを予期して、\n調印までの時間を長くとったといっていただろう？」
2074 = "「Nhưng, chẳng phải Paulette đã dự đoán được điều đó từ đầu, và cố tình kéo dài thời gian cho đến lúc ký kết sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。けど――わたしもオリヴィちゃんのこと、\n無意識に、こどものイメージで見ちゃってて」
2177 = "「Vâng. Nhưng——cả em nữa, về chuyện của bé Olivy, em cũng vô thức nhìn bé ấy với hình ảnh của một đứa trẻ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2207 = "「A——」"
# 【ポーレット】
# display as 波萊特
# JP: 「だから“きっと単純”って、どっかでバイアスかかって。\nそれで、自分の都合いいように解釈を作っちゃいました」
2401 = "「Nên em đã bị định kiến ở đâu đó rằng \"chắc chắn bé ấy rất đơn giản\". Rồi tự mình đưa ra cách giải thích có lợi cho bản thân.」"
# 【双鉄】
# display as 雙鐵
# JP: 「思い込みで判断を誤ったか」
2584 = "「Em đã phán đoán sai lầm do định kiến sao.」"
# monologue
# JP: 一日も早く来て欲しい。ポーレットはそう願っていた。\nそこに、『一日も早く行きたい』という電話があって……
3268 = "Mong họ đến càng sớm càng tốt. Paulette đã mong muốn như vậy. Đúng lúc đó, lại có cuộc điện thoại bảo là 『Muốn đi càng sớm càng tốt』......"
# monologue
# JP: ポーレットの鉄道愛の深さを知っているがゆえ、\nその誤認は、無理からぬものかとも思ってしまう。
3232 = "Vì biết rõ tình yêu đường sắt sâu đậm của Paulette, nên tôi cũng nghĩ sự hiểu lầm đó là điều khó tránh khỏi."
# 【真闇】
# display as 真闇
# JP: 「ほうたら実際のとこ――かんしゃくに付き合いきれんで、\nオリヴィちゃんば、みかん鉄道から投げ出されたと？」
2642 = "「Vậy thực tế thì——vì không chịu nổi tính khí thất thường, nên bé Olivy, đã bị Đường sắt Mikan tống khứ đi á?」"
# 【ポーレット】
# display as 波萊特
# JP: 「っていう感じではなかったです。多分。\nたぶん……本当に、多分なんですけど――」
2369 = "「Em không nghĩ là như vậy đâu. Có lẽ. Có lẽ......thực sự, chỉ là có lẽ thôi nhưng mà——」"
# monologue
# JP: ポーレットがまた黙りこむ。
3264 = "Paulette lại chìm vào im lặng."
# 【れいな】
# display as 玲奈
# JP: 「そのままいたら、余計にお別れが辛くなるだけだから。\nもっとたくさん、オリヴィさんを傷つけちゃうから」
2554 = "「Nếu cứ ở lại đó, thì lúc chia tay sẽ càng đau khổ hơn thôi. Sẽ càng làm tổn thương cô Olivy nhiều hơn nữa nha~」"
# monologue
# JP: 沈黙にふんわりと、れいなが言葉をのせる。
3296 = "Reina nhẹ nhàng cất lời, xua tan đi sự im lặng."
# monologue
# JP: ポーレットの手が『ありがとう』と、\nれいなの髪をふんわり撫ぜる。
3263 = "Bàn tay Paulette nhẹ nhàng vuốt tóc Reina, như muốn nói lời 『Cảm ơn em』."
# 【ポーレット】
# display as 波萊特
# JP: 「そういう感じに、わたしも受け取りました。\n良く言えば、『わたし達に託してくれた』って」
2344 = "「Em cũng có cảm giác như vậy. Nói một cách tốt đẹp thì, là 『Họ đã gửi gắm bé ấy cho chúng ta』.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね。[きゅう]Ⅸ号機関車とオリヴィちゃ――\nオリヴィくんの譲渡は、簡単に覆せるものではないから」
2056 = "「Ra là vậy. Việc chuyển nhượng Đầu máy số 9 và bé Olivy—— à không, cô Olivy, không phải là chuyện dễ dàng bị hủy bỏ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。そこは路線貸与と代替の、最優先の希望条件だ。\n余剰の\\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;が出次第、速やかに――と」
2426 = "「Đúng vậy. Đó là điều kiện ưu tiên hàng đầu của việc cho thuê và thay thế tuyến đường mà. Ngay khi có \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; dư thừa, thì phải nhanh chóng——」"
# monologue
# JP: ゆえ、ポーレットはⅨ号の譲渡を強く望み――\nみかん鉄道は『いくらなんでも老朽すぎる』と固辞をした。
3192 = "Vì thế, Paulette đã tha thiết mong muốn được nhượng lại Đầu máy số 9—— Còn Đường sắt Mikan thì kiên quyết từ chối vì 『Dù nói thế nào thì nó cũng quá cũ kỹ rồi』."
# monologue
# JP: オリヴィが“ききつけた”というその話も、あるいは\n断り方や、代替機の検討といった話であったのかもしれん。
3041 = "Chuyện mà Olivy \"nghe được\" đó, có lẽ cũng là chuyện về cách từ chối, hoặc xem xét máy thay thế cũng nên."
# 【真闇】
# display as 真闇
# JP: 「あー。そぎゃんと事情――会社と会社の話なら、\n理由がなんでも、信頼にかかわってくることやけんねぇ」
2165 = "「A. Hoàn cảnh như vậy á——nếu là chuyện giữa công ty với công ty, thì dù lý do là gì, cũng sẽ ảnh hưởng đến lòng tin á.」"
# 【ふかみ】
# display as 深美
# JP: 「そういう事情で……お別れは絶対にさけられないなら。\nそれならわたしも、『早い方が』って、思うかも、です」
2219 = "「Với hoàn cảnh như vậy......nếu cuộc chia ly là điều tuyệt đối không thể tránh khỏi. Thì em cũng sẽ nghĩ, 『Càng sớm càng tốt』, ạ.」"
# monologue
# JP: ふかみの言葉をじっと聞き。\nそうして凪が、ようやく頷く。
2960 = "Lặng lẽ lắng nghe những lời của Fukami. Sau đó Nagi, cuối cùng cũng gật đầu."
# 【凪】
# display as 凪
# JP: 「……そぎゃん事情でたくされた？　なら、\nオリヴィば、ちゃんと立ち直らせてあげんといけんね！」
1546 = "「......Được gửi gắm với hoàn cảnh như vậy á? Nếu vậy, thì phải giúp Olivy vực dậy tinh thần đàng hoàng mới được á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2178 = "「嗯」" 
# monologue
# JP: つまるところは、『大人の事情』だ。
3382 = "Suy cho cùng, đó là \"chuyện của người lớn\"."
# monologue
# JP: ……が、大人の事情を納得できる精神年齢でないゆえに、\nオリヴィは、恐らく暴発してしまったのだろう。
1504 = "......Nhưng, vì độ tuổi tinh thần chưa đủ để hiểu được chuyện của người lớn, nên Olivy, có lẽ đã bùng nổ mất rồi."
# 【れいな】
# display as 玲奈
# JP: 「あ」
2144 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　れいな」
2520 = "「Sao vậy? Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「ハチロクさんも、ねむっちゃったみたいですぅ。\nオリヴィさんの髪ずっと撫でてあげてたら……ふぁ～あ」
2038 = "「Chị Hachiroku cũng ngủ mất tiêu rồi nha~ Cứ vuốt tóc cho cô Olivy suốt nên......oáp~」"
# 【凪】
# display as 凪
# JP: 「言うてるれいなも大あくびばい！」
2028 = "「Reina vừa nói vừa ngáp to tướng kìa á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。もうれいなたちは寝る時間だよな」
2133 = "「À. Cũng đến giờ đi ngủ của nhóm Reina rồi nhỉ.」"
# 【れいな】
# display as 玲奈
# JP: 「そぉですねぇ。でも、れいなまだ平気ですよぉ」
2282 = "「Đúng vậy nha~ Nhưng mà, Reina vẫn ổn mà~」"
# monologue
# JP: 気持ちは嬉しい。が、明日も始発の乗務がある。\nそうそう長くは引き止められない。
3176 = "Anh rất vui vì tấm lòng của em. Nhưng ngày mai em còn phải làm nhiệm vụ trên chuyến tàu đầu tiên nữa. Không thể giữ em lại lâu được."
# 【双鉄】
# display as 雙鐵
# JP: 「では、あともう少しだけ付き合ってくれ。\nいきさつはまぁ理解したが――明日からはどうする？」
2685 = "「Vậy, nán lại thêm chút xíu nữa thôi nhé. Anh cũng hiểu qua tình hình rồi——từ ngày mai sẽ tính sao đây?」"
# monologue
# JP: 尋ねれば生まれる、わずかな沈黙。\nそれを程なく破ってくれたのは、真闇姉だ。
3006 = "Vừa hỏi xong thì một sự im lặng ngắn ngủi bao trùm. Người phá vỡ nó ngay sau đó, là chị Mayami."
# 【真闇】
# display as 真闇
# JP: 「構えたらそれだけ壁になるけんね。\nおねーちゃんとしては『ふつーに』が、良か様に思うと」
2572 = "「Càng đề phòng thì sẽ càng tạo ra khoảng cách á. Theo ý chị thì cứ \"bình thường\" là tốt nhất á.」"
# 【稀咲】
# display as 稀咲
# JP: 「だね。普通に――共に仕事をするプロとプロとして。\n双鉄ならその辺は大丈夫そうだけれど」
1980 = "「Đúng vậy. Cứ bình thường——như những người chuyên nghiệp làm việc cùng nhau. Nếu là Soutetsu thì chắc không vấn đề gì đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2178 = "「嗯」" 
# monologue
# JP: 凪とふかみは――と思ってみれば
3171 = "Còn Nagi và Fukami thì sao——tôi thử nhìn sang"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん、とってもらっていい？\nわたしそのテリーヌまだ食べてない」
2288 = "「Nagi, lấy hộ mình với được không? Mình chưa ăn món Terrine đó.」"
# 【凪】
# display as 凪
# JP: 「照り犬！？　凪さま、わんちゃん食べちゃったと！？」
2688 = "「Chó nướng!? Nagi đại nhân, đã ăn thịt cún con rồi sao á!?」"
# 【ふかみ】
# display as 深美
# JP: 「違うよ凪ちゃん。テリーヌっていうのは……ええと」
1955 = "「Không phải đâu Nagi. Terrine là......ờm.」"
# 【稀咲】
# display as 稀咲
# JP: 「ムース状にした食材の蒸し焼きのこと。だけど本来は、\nテリーヌ容器そのままで出されたものだけが、テリーヌ」
2420 = "「Là món nướng hấp các nguyên liệu được xay nhuyễn như mousse. Nhưng vốn dĩ, chỉ những món được dọn ra nguyên trong khay Terrine, mới được gọi là Terrine.」"
# 【ふかみ】
# display as 深美
# JP: 「わ、教えてくれてありがとうございます。\nなんだって、凪ちゃん！」
2111 = "「Oa, cảm ơn chị đã chỉ cho tụi em ạ. Là vậy đó, Nagi!」"
# 【凪】
# display as 凪
# JP: 「わんちゃんじゃなきゃよかとばい！\nふかみちゃん、これおいしいけんね、残したら損ばい！」
2123 = "「Không phải cún con là được rồi á! Fukami, món này ngon lắm á, để thừa là uổng lắm á!」"
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃんはこっちのマリネまだでしょう？」
2029 = "「Nagi chưa ăn món gỏi ướp bên này đúng không?」"
# 【凪】
# display as 凪
# JP: 「まだばい！　わけっこするばい！」
2478 = "「Chưa á! Chia nhau ăn đi á!」"
# 【ふかみ】
# display as 深美
# JP: 「うん！」
2179 = "「Ừm!」"
# monologue
# JP: ……会の終わりが近づいてを悟ってのことだろう。\n急速に、食事の片付けにはいっている。
1511 = "......Chắc là do nhận ra buổi tiệc sắp kết thúc rồi. Hai đứa đang nhanh chóng dọn dẹp thức ăn."
# monologue
# JP: まぁ、ポーレットや僕を信頼し、\n判断を任せてくれているがゆえ――のこととも言えよう。
2911 = "Chà, cũng có thể nói là do hai đứa tin tưởng Paulette và tôi, nên đã giao phó quyền quyết định cho chúng tôi——"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとれいなも、その方針でいいか？」
2496 = "「Paulette và Reina cũng đồng ý với phương hướng đó chứ?」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ。とーってもいいと思いますぅ。\nふつーにしてもらえたら、きっと一番らくですよぉ」
2436 = "「Vâng ạ~ Em thấy rất tuyệt nha~ Cứ đối xử bình thường thì chắc chắn sẽ thoải mái nhất đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「経験者のお墨付きはありがたい。\nポーレットは――うむ？　ポーレット？」
2449 = "「Có sự đảm bảo của người từng trải thì tốt quá rồi. Paulette thì sao——ưm? Paulette?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ああいえ。少しわたし、うじうじモード……\nちょっと、自己批判にはいっちゃってました」
2149 = "「A, không có gì. Em chỉ hơi lẩn thẩn chút...... Đang tự trách bản thân một tẹo thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 2126 = "「哦」" 
# monologue
# JP: 反省、といわんばかりに、\nポーレットは自らの頭を、小さく作った拳で叩く。
3057 = "Như muốn nói là đang kiểm điểm, Paulette lấy nắm đấm nhỏ gõ nhẹ lên đầu mình."
# 【ポーレット】
# display as 波萊特
# JP: 「『共に仕事をするプロとプロとして』ですよね。うん。\nそれでＯＫです。わたしもそうしますし、双鉄くんも」
2440 = "「\"Như những người chuyên nghiệp làm việc cùng nhau\" đúng không. Vâng. Vậy là OK rồi. Em cũng sẽ làm như vậy, và cả cậu Soutetsu nữa nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た。あとは日々姫だが――」
2375 = "「Đã rõ. Còn lại là Hibiki nhưng mà——」"
# 【日々姫】
# display as 日日姬
# JP: 「寝るとこ」
2536 = "「Chỗ ngủ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2199 = "「嗯？」" 
# monologue
# JP: ネルトコ、とはいったいなんだ。\n意味がつかめず、間の抜けた声を零してしまう。
3177 = "Chỗ ngủ, rốt cuộc là sao. Không hiểu ý em ấy, tôi buột miệng thốt lên một âm thanh ngớ ngẩn."
# 【日々姫】
# display as 日日姬
# JP: 「にぃにのお部屋。オリヴィとハチロクが寝とるでしょ？\nけど、まだにぃに信頼関係もなーんもなかけん」
2628 = "「Phòng của anh hai. Olivy và Hachiroku đang ngủ ở đó đúng không á? Nhưng mà, anh hai với con bé đã có chút lòng tin nào đâu á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2208 = "「A.」"
# monologue
# JP: まったく無かった視点だが、\n言われてみれば、頷くしかない。
3163 = "Một góc nhìn mà tôi hoàn toàn không nghĩ tới, nhưng nghe em ấy nói vậy, tôi cũng đành gật gù đồng ý."
# 【双鉄】
# display as 雙鐵
# JP: 「確かにだ。オリヴィもそれは不安だろうな。\nでは、僕は次の間かどこかで」
2532 = "「Đúng vậy thật. Chắc Olivy cũng sẽ bất an lắm. Vậy, anh sẽ sang phòng bên cạnh hay đâu đó.」"
# 【日々姫】
# display as 日日姬
# JP: 「ゆーか、今夜はわたしがにぃにの部屋で寝るけん。\nにぃには、わたしの部屋で寝てよかとよ」
2682 = "「Hay là, đêm nay em sẽ ngủ ở phòng anh hai á. Anh hai qua phòng em ngủ là được á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕はそれで構わんが――日々姫はいいのか？」
2356 = "「Anh thì sao cũng được——nhưng Hibiki có ổn không?」"
# 【日々姫】
# display as 日日姬
# JP: 「全然よかよ。それに……少しだけ心配やけん。\n明日の朝が」
2263 = "「Hoàn toàn ổn á. Hơn nữa......em cũng hơi lo. Sáng ngày mai á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2208 = "「噢噢」" 
# monologue
# JP: 日々姫の懸念がすぐ理解できる。\nなるほど――確かにそこは不安だ。
3189 = "Tôi hiểu ngay nỗi lo của Hibiki. Ra là vậy——đúng là chuyện đó đáng lo thật."
# monologue
# JP: 『ハチロクがこども扱いしていたから』と、\nあの凪が、はっきり感じたほどなのだから。
3100 = "\"Vì Hachiroku cứ đối xử như trẻ con\", đến mức Nagi còn cảm nhận rõ ràng như vậy mà."
# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロクとオリヴィの関係が、か」
1542 = "「......Mối quan hệ giữa Hachiroku và Olivy, sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。少しだけだけど」
2183 = "「Vâng. Dù chỉ một chút thôi á.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。ならば、見てやってくれ」
2569 = "「Anh hiểu rồi. Vậy thì, nhờ em để mắt tới nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「わかった！　任せて！！」
2251 = "「Vâng! Cứ giao cho em!!」"
# monologue
# JP: 支えられてる。\n家族はもちろん、仲間たちのたくさんの手にも。
3023 = "Tôi đang được chống đỡ. Không chỉ bởi gia đình, mà còn bởi rất nhiều bàn tay của những người đồng đội."
# monologue
# JP: そう感じるから、確信できる。\nオリヴィもきっと、ほどなく僕らの仲間になれる。
3381 = "Chính vì cảm nhận được điều đó, nên tôi có thể tin chắc rằng. Olivy cũng sẽ sớm trở thành đồng đội của chúng tôi thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「では、解散だな。明日もよろしく」
2660 = "「Vậy, giải tán nhé. Ngày mai cũng nhờ mọi người.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、その前に。せっかくですから。\n主役とハチロクちゃんが不在なのは、残念だけど」
2161 = "「A, trước đó đã. Dù sao cũng lỡ rồi. Tuy hơi tiếc vì nhân vật chính và Hachiroku không có ở đây.」"
# monologue
# JP: ポーレットがグラスを構えてみせる。\nそういうことかと、みなが手に手にグラスを取る。
3272 = "Paulette nâng ly lên. Hiểu ý, mọi người cũng lần lượt nâng ly của mình lên."
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんとⅨ号機関車が、\n御一夜鉄道に来てくれたことを祝して――」
2501 = "「Chúc mừng bé Olivy và Đầu máy số 9, đã đến với Đường sắt Ohito——」"
# 【日々姫】
# display as 日日姬
# JP: 「わたしたちに、\n新しい仲間ができたことを祝って――」
2341 = "「Chúc mừng chúng ta, đã có thêm những người đồng đội mới——」"
# monologue
# JP: ポーレットが、日々姫が、\nみんながそろって僕を見る。
3260 = "Paulette, Hibiki, và tất cả mọi người đều đồng loạt nhìn tôi."
# monologue
# JP: ガラではないし、立場でもない、が、光栄だ。\n喜んで音頭を取らせてもらおう。
3431 = "Dù không hợp tính cách, cũng không phải lập trường của tôi, nhưng thật vinh hạnh. Tôi rất sẵn lòng bắt nhịp."
# 【双鉄】
# display as 雙鐵
# JP: 「――乾杯」
1520 = "「——Cạn ly.」"
