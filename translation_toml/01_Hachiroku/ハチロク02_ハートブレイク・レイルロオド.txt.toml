3439 = "Đầu tiên là tấm bảng chào mừng của Nagi và Fukami 『Chào mừng! Đến với quê hương hơi nước Ohito』——Không có vấn đề gì."
# 【双鉄】
# display as 雙鐵
# JP: 「歓迎パネル――よしっ！\nホーム飾り付け、よしっ！」
2475 = "「Bảng chào mừng——Tốt! Trang trí sân ga, tốt!」"
