3449 = "（Nói cách khác, dù có \\x%l補機;#00ffc040;đầu máy phụ%l;#; đi chăng nữa, nhưng có thể vượt qua Yatake với tình trạng đó, thì \\x%l機関士;#00ffc040;người lái tàu%l;#; Munakata và Olivy——chắc hẳn phải có tay nghề rất đáng nể.）"
# 【ポーレット】
# display as 波萊特
