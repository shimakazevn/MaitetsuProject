2410 = "「Hôm nay, ý là họ sẽ tự chạy đến sao? Hay là được \\x%lvận chuyển loại giáp;#00ffc040;vận chuyển loại giáp%l;#; bằng đầu máy khác?」"

# 【ポーレット】
