2191 = "「Vâng. Em cũng đã vẽ xong bản đồ minh họa Ga Suối nước nóng Ohito rồi á! Trong lúc chờ ký kết xong, em định sẽ hướng dẫn bé ấy tham quan ga.」"
# 【双鉄】
# display as 雙鐵
