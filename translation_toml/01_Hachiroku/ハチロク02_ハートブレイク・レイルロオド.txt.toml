2258 = "「Nếu có thể tự chạy qua được Obata với \\x%lĐầu máy phụ (Hoki);#00ffc040;Đầu máy phụ (Hoki)%l;#; đi kèm thì――về trạng thái, có vẻ hoàn toàn không vấn đề gì rồi」"

# 【ポーレット】
# display as 波萊特
# JP: 「うんっ」
2423 = "\"Ưm.\""

# monologue
# JP: ポーレットの笑顔が輝く。
3269 = "Nụ cười của Paulette rạng rỡ hẳn lên."

# 【ポーレット】
