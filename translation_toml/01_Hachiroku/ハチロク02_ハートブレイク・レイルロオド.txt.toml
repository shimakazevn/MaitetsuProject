2630 = "\"Về phần đó thì anh yên tâm. Ngay cả gần đây, em cũng đã xác nhận tình trạng của cả\\x%l đầu tàu;#00ffc040;đầu tàu%l;#; lẫn\\n\\x%lRailord;#00ffc040;Railord%l;#; rồi.\""

