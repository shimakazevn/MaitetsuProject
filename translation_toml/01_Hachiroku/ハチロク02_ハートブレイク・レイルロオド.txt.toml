2185 = "\"Vâng. Vì bên cạnh em đã có Soutetsu-sama rồi ạ.\\nThế nên, em nghĩ cứ để Reina cho cô ấy là được ạ.\""

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2178 = "「嗯」" 

# monologue
# JP: ポーレットがれいなを抱きしめている。\n抱きしめ、ゆっくり、いいこいいこと撫ぜている。
3266 = "Paulette đang ôm chặt lấy Reina.\\nCô ôm, rồi chầm chậm, nhẹ nhàng xoa đầu an ủi."

# 【れいな】
# display as 玲奈
# JP: 「れいな、ただ――れいな、おひっこし――\nおひっこしのときのさみしさ――おもいだしちゃって」
2518 = "\"Reina chỉ là――Reina, lúc chuyển nhà――\\nCái cảm giác cô đơn lúc chuyển nhà――em lại nhớ ra\""

# 【ポーレット】
# display as 波萊特
# JP: 「うん。わかる。\nおひっこしは、お別れがたくさんだものね。さみしいね」
2189 = "\"Ừ, chị hiểu mà.\\nChuyển nhà đồng nghĩa với việc phải chia tay rất nhiều người nhỉ. Buồn thật đấy.\""

# 【れいな】
# display as 玲奈
# JP: 「ふわぁああああん、ポーレットぉ」
2172 = "\"Hu oaaa, Paulette ơi\""

# monologue
