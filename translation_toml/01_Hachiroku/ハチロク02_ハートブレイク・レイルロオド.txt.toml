2578 = "「Nghe bảo là sẽ tự chạy, và gắn thêm \\x%lĐầu máy phụ (Hoki);#00ffc040;Đầu máy phụ (Hoki)%l;#; ở phía sau ạ. Họ bảo qua khỏi Obata thì \\x%lĐầu máy phụ (Hoki);#00ffc040;Đầu máy phụ (Hoki)%l;#; sẽ tách ra quay về」"

