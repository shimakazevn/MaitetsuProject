2311 = "「Nhờ Paulette đã tìm hiểu trước sở thích của bên đó nên cũng đỡ lắm. À này——cho anh cái này, Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 2199 = "「嗯？」" 
# monologue
# JP: 稀咲が何かを、僕に無造作に手渡して――うむ？
