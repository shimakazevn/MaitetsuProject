2376 = "「Trưởng phòng vận tải đường sắt Oyoshi,\\x%lTrưởng phòng bảo trì;#00ffc040;Trưởng phòng bảo trì%l;#;.\\nKiêm thợ lái tàu hơi nước Maitetsu số 8620, Migita Soutetsu đây.」"

