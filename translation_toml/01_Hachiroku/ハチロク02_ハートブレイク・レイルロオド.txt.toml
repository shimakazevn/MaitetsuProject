# display as 八六
# JP: 「うふふ、写真も良い歓迎になりますね」
2098 = "「Ufufu, chụp ảnh cũng là một cách chào mừng hay đấy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2481 = "「沒錯」" 
