3282 = "Để phòng hờ, tôi cầm theo bình chữa cháy ở cuối sân ga, rồi chạy chậm về phía buồng lái——!?"
# 【オリヴィ】
# display as ？？？
# JP: 「行って！　さっさとチョーインしてきて！！」
2025 = "「Đi đi! Mau đi ký kết đi!!」"
# 【宗方】
# display as ？？？
# JP: 「いい加減にしろ。今朝からなんだ。\nお前のわがままに[おんてつ,1]御鉄さんまで巻き込んでいるんだぞ」
2647 = "「Vừa phải thôi. Từ sáng đến giờ rồi. Sự ích kỷ của cô đang kéo cả Đường sắt Ohito vào đấy.」"
# 【オリヴィ】
# display as ？？？
# JP: 「それでムナカタこまる？　こまらないでしょ？\nムナカタ、ひとりでみかん鉄道に帰るんだからっ！」
2641 = "「Vậy thì Munakata có gặp rắc rối không? Không đúng chứ? Munakata, dù sao thì chú cũng sẽ về Đường sắt Mikan một mình mà!」"
# 【宗方】
# display as 宗方
