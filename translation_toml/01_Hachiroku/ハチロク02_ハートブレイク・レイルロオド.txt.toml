2216 = "「Nếu trong vòng một năm sau khi bàn giao, phát sinh khiếm khuyết khiến phương tiện/\\x%lRailord;#00ffc040;Railord%l;#; không thể vận hành thương mại, thì hợp đồng sẽ bị hủy bỏ hoàn toàn」"

# 【双鉄】
