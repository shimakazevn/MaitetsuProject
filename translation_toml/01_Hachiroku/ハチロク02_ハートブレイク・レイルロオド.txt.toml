3166 = "Phát huy hết mức có thể \"chất\" riêng của Đường sắt Ohito, để chào đón Đầu máy số 9 và \\x%lレイルロオド;#00ffc040;Railord%l;#; một cách ấm áp và vui vẻ."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　ともかく電話をしてみねば、だな」
2181 = "「Ưm! Dù sao thì cũng phải gọi điện thoại cái đã.」"
# 【凪】
# display as 凪
# JP: 「にーさん、これでよかと！？」
2226 = "「Anh hai, thế này được chưa á!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから逆だといっている」
2402 = "「Anh đã bảo là ngược rồi mà.」"
# 【凪】
# display as 凪
# JP: 「ふかみちゃん！　また逆だって言われたと！」
2289 = "「Fukami! Lại bị bảo là ngược nữa kìa á!」"
# 【ふかみ】
# display as 深美
# JP: 「え？　でもさっき入れ替わったばっかりなのに」
2163 = "「Hả? Nhưng mà vừa nãy mới đổi chỗ xong mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「逆なのは位置ではなく、上下だ。\n凪の持ってるパネルの上下が逆なのだ」
1958 = "「Ngược không phải là vị trí, mà là trên dưới. Tấm bảng Nagi đang cầm bị ngược trên dưới đó.」"
# 【凪】
# display as 凪
# JP: 「ほぇっ！？　あ、ホントばい！\nよいしょっ――っと！　これでよかとよね！」
2110 = "「Hở!? A, thật nè á! Ây da——! Thế này là được rồi đúng không á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。よかと、だ」
2195 = "「Ừm. Được rồi đó.」"
# 【凪】
# display as 凪
# JP: 「やったばーい！　これでお迎え準備ばっちりばい！！」
2243 = "「Tuyệt quá á! Vậy là chuẩn bị đón tiếp xong xuôi hết rồi á!!」"
# monologue
# JP: この時間でも、まだ陽の名残をかすかに感じる。\n夏は、もうすぐそこまで来ている。
3097 = "Dù đã đến giờ này, nhưng vẫn còn vương vấn chút hơi ấm của ánh nắng. Mùa hè, đã đến rất gần rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「っと――」
2124 = "「Ây da——」"
# monologue
# JP: （ぺちっ）
3453 = "（Bốp!）"
