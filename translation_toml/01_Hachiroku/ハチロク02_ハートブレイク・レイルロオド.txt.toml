2187 = "「Vâng. Em biết rồi á. Dù mọi chuyện có ra sao, em cũng sẽ nhờ chị Mayami và tiền bối Kisaki lo liệu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「助かる、頼む」
2670 = "「Giúp được anh nhiều lắm, nhờ em nhé.」"
