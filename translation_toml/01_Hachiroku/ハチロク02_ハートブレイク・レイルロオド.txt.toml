2200 = "\"Hửm? Theo những gì ta nghe được, đầu tàu số IX hiện tại là\\n\\x%lđầu máy dồn toa;#00ffc040;đầu máy dồn toa%l;#; của đường sắt Mikan đúng không? Tại sao\\x%lRailord;#00ffc040;Railord%l;#; đó lại...\""

