# lr_ハチロクh3_通販失敗いたしましたにゃん.txt 
[info]
0 = ""

[characters]
1571 = "「Nếu em mong muốn điều đó.\nTôi chắc chắn sẽ giúp em đón nhận \"lần\nsau\".」"
1607 = "Soutetsu"

[character_subs]
1797 = "Suzu"
1829 = "Soutetsu"

[script]
# lines: 344 
# 【ハチロク】
# display as 鈴
# JP: 「あ……の、双鉄さま？」
1431 = "「A……ừm, ngài Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
1317 = "「Hửm?」"

# monologue
# JP: 姿が見えぬ。障子の向こうからの声しかしない。\nしかもその声が、どうにもなんとも不安げだ。
1714 = "Không thấy bóng dáng đâu. Chỉ nghe thấy\ntiếng nói từ bên kia vách ngăn.\nHơn nữa giọng nói ấy, nghe có vẻ vô cùng\nbất an."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
1357 = "「Sao vậy?」"

# 【ハチロク】
# display as 鈴
# JP: 「あの……ですね？　いんたあねっとのお買い物……\n通信販売についてお伺いしたいのですが」
1448 = "「À……ừm? Mua sắm trên internet……\nEm muốn hỏi ngài về việc mua hàng qua\nmạng」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、珍しい石炭でも見つけたか？」
1324 = "「À, em tìm thấy loại than hiếm nào sao?」"

# 【ハチロク】
# display as 鈴
# JP: 「いいえ、そのようなことではなくて――\nそうではなくて……ええと、ですね……」
1123 = "「Không, không phải chuyện đó——\nKhông phải vậy……ờm, là……」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1317 = "「嗯？」" 

# monologue
# JP: すずらしくもなく歯切れが悪い。\n違和感はすぐに心配となる。
1716 = "Lấp lửng không giống Suzu chút nào.\nCảm giác khác lạ nhanh chóng biến thành sự\nlo lắng."

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。例えどのような質問だろうとも安心してくれ。\n僕は常にお前の味方だ。何でも怯えずに聞かせてほしい」
1408 = "「Rồi ngài đi bộ, kết quả ra sao ạ?」"

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま」
1480 = "「Hệ thống này? Lẽ nào.」"

# monologue
# JP: 安心したのか、障子からひょこっとすずが耳を出す――
1798 = "Không hề ngượng ngùng, em ấy trả lời một\ncách thẳng thắn.\nKhông tệ chút nào."

# 【双鉄】
# display as 雙鐵
# JP: 「って！？　耳っ――ネコミミっ！！？」
1209 = "「Hachiroku cũng từng nói là được ông Taito\nmua lại nhỉ.\nVậy thì chúng ta, có lẽ là những kẻ giống\nnhau đấy.」"

# 【ハチロク】
# display as 鈴
# JP: 「きゃっ！？　あっ！！！？」
1202 = "「Kya!? A!!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「危ないっ！」
1154 = "「Nguy hiểm!」"

# 【ハチロク】
# display as 鈴
# JP: 「ひゃうっ！」
1191 = "「Hyau!」"

# monologue
# JP: （とさっ！！！！）
1897 = "（Phịch!!!!）"

# monologue
# JP: ひどく驚き、驚かせ、\nすずの足をもつれさせてしまったようだ。
1727 = "Quá đỗi kinh ngạc, và làm em ấy giật mình,\ncó vẻ như tôi đã làm Suzu vấp chân."

# 【ハチロク】
# display as 鈴
# JP: 「そうてつ、さま……かばってくださり――\nありがとうございます」
1485 = "「Quả nhiên là cái ác.\nCả \\x%lエアクラ;#00ffc040;Aircra%l;#;, và cả nhà máy sản xuất \\x%lエアクラ;#00ffc040;Aircra%l;#;\nnữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや――」
1210 = "「À, không——」"

# monologue
# JP: 僕が驚かしたせいで倒れさせてしまった。\n『大丈夫、なんでも話せ』といっていたにも関わらず。
1749 = "Vì tôi làm em ấy giật mình nên mới ngã.\nDù đã nói \"Không sao, cứ nói mọi chuyện\nđi\" vậy mà."

# 【双鉄】
# display as 雙鐵
# JP: 「……寝間着に着替えようとしていたのが幸いしたな」
870 = "「……May mà em đang định thay đồ ngủ」"

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ、左様ですね」
1320 = "「Là chuyện đó đấy.\nTôi từ Đế Đô trở về là để ngăn chặn điều\nđó.」"

# monologue
# JP: 済まなかったといってしまえば、すずは却って畏まる。\nゆえに反らした話題にも、優しく微笑み答えてくれる。
1782 = "Nếu nói xin lỗi, Suzu sẽ lại càng khép\nnép.\nThế nên em ấy cũng dịu dàng mỉm cười đáp\nlại chủ đề tôi đã lảng tránh."

# 【ハチロク】
# display as 鈴
# JP: 「おふとんも、\nちょうどよいクッションになってくれました」
1426 = "「Ừ. Tôi có hứng thú, lại nghĩ mình có thời\ngian và thể lực,\ntrong khi tiền bạc thì chẳng có một đồng\nnào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nで、だ――話を戻すけれども」
1129 = "「Nhỉ.\nVậy, ừm——quay lại câu chuyện」"

# 【ハチロク】
# display as 鈴
# JP: 「はうっ」
1238 = "「Hau」"

# monologue
# JP: すずがびくりと身をすくめれば、\nネコミミもまた小さく揺れる。
1772 = "Suzu khẽ giật mình co rúm người lại,\nđôi tai mèo cũng khẽ rung rinh."

# 【双鉄】
# display as 雙鐵
# JP: 「通信販売うんぬんというのは――\nそのランジェリーのことか？」
1142 = "「Chuyện mua hàng qua mạng gì đó là——\nVề bộ đồ lót đó sao?」"

# 【ハチロク】
# display as 鈴
# JP: 「あ……」
1256 = "「Đó là cơ chế chia sẻ theo thời gian thực\nnhững thông tin đa dạng mà mỗi cá thể thu\nthập được,\nrồi xử lý tối ưu hóa theo tập hợp——đúng\nkhông?」"

# monologue
# JP: 倒れた拍子に重なり合った姿勢のままで、\nすずは自らの体を見下ろす。
1595 = "Vẫn giữ nguyên tư thế nằm đè lên nhau lúc\nngã,\nSuzu cúi xuống nhìn cơ thể mình."

# 【ハチロク】
# display as 鈴
# JP: 「その……もっと大人っぽい下着なのかと思ってしまって。\nレエスが黒を引き立てる、大人の女性によく似合う」
1445 = "「Đúng vậy. Nỗi đau đó——\nvà cả sự oán hận không có nơi trút bỏ vì\nnó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1322 = "「À……」"

# monologue
# JP: 思い当たる。\nいつだったか日々姫に通販雑誌を見せられて……
1721 = "Tôi nhớ ra rồi.\nKhông biết từ khi nào Hibiki đã cho xem\ncuốn tạp chí mua sắm……"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、僕が『こういうものも素敵だな』と\n褒めた下着によく似ているな。ただ一点――いや二点か」
1155 = "「Đã rõ.\nBắt đầu dò tìm địa điểm hạ cánh trên mặt\nnước tối ưu nhất.」"

# 【ハチロク】
# display as 鈴
# JP: 「二点？　でしたら……このお耳――ネコさんのおみみと、\n首元の――」
1151 = "「Hai điểm? Nếu vậy……đôi tai này——tai của\nbạn mèo, và ở cổ——」"

# monologue
# JP: （ちりん）
1914 = "Đột nhiên em ấy lại ấp úng.\nTôi chờ đợi một lúc. Nhưng sự im lặng vẫn\ntiếp diễn."

# 【ハチロク】
# display as 鈴
# JP: 「小さな鈴でございますね？\nわたくし、うっかり見落としてしまっていて」
1450 = "「Vâng, đúng vậy thưa ngài Soutetsu. Chúng\nem\nđề xuất \\x%lダイアグラム;#00ffc040;biểu đồ chạy tàu%l;#; và kiểm soát cả \\x%l運転計画;#00ffc040;kế hoạch hoạt động%l;#;\nnữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うっかりか」
1402 = "「Dò tìm hoàn tất. Bắt đầu hạ cánh ngay lập\ntức chứ?」"

# monologue
# JP: すずははっきり落ち込んでいる。ゆえ、\n可愛さ、健気さに抱きしめたくなる気持ちをグッと抑える。
1809 = "Suzu lộ rõ vẻ thất vọng. Vì thế,\ntôi cố kìm nén cảm giác muốn ôm chầm lấy\nsự đáng yêu, dũng cảm ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「サイズに気が行ってしまったか？\n雑誌をみなで見ていたときに、僕が褒めた下着には…」
1140 = "「Em đã để ý đến kích cỡ sao?\nBộ đồ lót mà anh khen lúc mọi người cùng\nxem tạp chí…」"

# 【ハチロク】
# display as 鈴
# JP: 「はい、左様でございます。\nわたくしに合う小柄用の物は、残念ながら無かったので」
1344 = "「Chiến dịch thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「似たデザインで、お前にも合うサイズをと――\nそればかりに気を取られ、慣れぬネットで必死に探し」
1400 = "「Thiết kế tương tự, và kích cỡ vừa với\nem——\nChỉ mải chú ý đến điều đó, em đã liều mạng\ntìm kiếm trên mạng internet không quen\nthuộc」"

# 【ハチロク】
# display as 鈴
# JP: 「『やっと見つけ出しました！』と、その喜びで\n細部をわたくし、確認しないで申込みをしてしまって」
1379 = "「'Cuối cùng cũng tìm thấy rồi!', với niềm\nvui sướng đó\nem đã không kiểm tra chi tiết mà đăng ký\nmua luôn」"

# monologue
# JP: ちりんと、再び鈴がなる。\n首から頭の上の耳へと、すずは細い指を滑らせる。
1812 = "Leng keng, tiếng chuông lại vang lên.\nSuzu trượt ngón tay thon thả từ cổ lên đôi\ntai trên đỉnh đầu."

# 【ハチロク】
# display as 鈴
# JP: 「荷物が届いて、嬉しくて……ついつい中身を確認せずに、\n試着を始めてしまったのです」
1416 = "「Nếu Hachiroku đã tự hào đến vậy. Thì\nphương tiện động lực……\nmà em điều khiển sao? Tôi cũng muốn được\nđi thử một lần.」"

# 【双鉄】
# display as 雙鐵
# JP: 「試着の途中で、ネコミミと鈴に気づいたわけか」
1387 = "「Và giữa chừng mặc thử, em mới nhận ra tai\nmèo và chuông sao」"

# 【ハチロク】
# display as 鈴
# JP: 「はい……ブラジャアから身につけたのが敗因です。\nせめて最初に、パンツを手にとっていたのなら……」
1342 = "「Vâng……mặc áo lót trước là nguyên nhân\nthất bại.\nÍt nhất nếu ban đầu em cầm quần lót lên\nthì……」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。その格好でいる事情はわかった」
1156 = "「Ra vậy. Anh hiểu lý do em ở trong bộ dạng\nđó rồi」"

# monologue
# JP: 大変かわいい失敗な上、結果オーライとしか思えんのだが、\nすずは思いつめた顔をしていた。ゆえ――
1599 = "Một thất bại vô cùng đáng yêu, hơn nữa kết\nquả lại tốt đẹp,\nnhưng Suzu lại làm vẻ mặt trầm ngâm. Thế\nnên——"

# 【双鉄】
# display as 雙鐵
# JP: 「で、僕に聞きたいこととは、一体何だ？」
1390 = "「Vậy, rốt cuộc em muốn hỏi anh chuyện gì?」"

# 【ハチロク】
# display as 鈴
# JP: 「はい」
1383 = "「Đó cũng là lúc em được ngài Taito mua\nlại.」"

# monologue
# JP: ほっとした顔。話を戻して大正解だ。\nあまりに可愛らしい故、すぐにも押し倒したくもあるが。
1658 = "Khuôn mặt nhẹ nhõm. Đưa câu chuyện trở lại\nlà một quyết định hoàn toàn chính xác.\nVì quá đáng yêu, nên tôi cũng muốn đè em\nấy ra ngay lập tức."

# 【ハチロク】
# display as 鈴
# JP: 「下着で……しかも、肌に触れさせてしまったものは……\n返品、きっとできませんよね？」
1447 = "「Vâng. Chắc chắn là em đã nhận được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「返品するなら、僕が買い取る」
1336 = "「Nếu trả lại thì anh sẽ mua lại」"

# 【ハチロク】
# display as 鈴
# JP: 「ひえっ！？　えっ！？　買い取る？\n……お買取になられて――双鉄さまが、これを？」
1275 = "「Hie!? Hả!? Mua lại?\n……Ngài mua lại——ngài Soutetsu, thứ này\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おいおい、僕が身につけてどうするというのだ」
1294 = "「Chỉ vì lòng tự ái ngu ngốc mà cô định\nvĩnh viễn từ bỏ nhiệm vụ của mình sao.\n\\x%lレイルロオド;#00ffc040;Railord%l;#; hóa ra cũng chẳng phải là một tồn\ntại đáng nể như lời đồn nhỉ.」"

# 【ハチロク】
# display as 鈴
# JP: 「どうなさるもなにも――」
1358 = "「Chắc chắn là đau gấp mấy lần những gì\nHachiroku tưởng tượng đấy.\nKhông phải là cái gõ nhẹ hay cái cốc đầu\nđâu, mà là một cú giáng trời giáng! luôn.」"

# monologue
# JP: すずの瞳が一瞬細まる。\n弄ぶべきネズミを見つけたネコそのものであるかのように。
1808 = "Đôi mắt Suzu nheo lại trong tích tắc.\nCứ như một chú mèo tìm thấy con chuột để\nđùa giỡn vậy."

# 【ハチロク】
# display as 鈴
# JP: 「大変、素敵でございましょう？」
1367 = "「Chắc chắn là, rất tuyệt đúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1207 = "「!?」"

# monologue
# JP: 冗談を言っている目ではない。着せるつもりだ。\n理解は冷や汗を吹き出させ、脳は全力で稼働する
1656 = "Đó không phải là ánh mắt đang nói đùa. Em\nấy định bắt tôi mặc thật.\nSự hiểu ra khiến tôi toát mồ hôi lạnh, não\nbộ hoạt động hết công suất."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　だな！　これはこれで大変に素敵なのだ」
1313 = "「Ừm! Đúng vậy! Thế này cũng rất tuyệt mà」"

# 【ハチロク】
# display as 鈴
# JP: 「で！　ございますよね！！」
1362 = "「Xin ngài cứ yên tâm? Ngài Soutetsu. Em\nkhông hề,\ngiận dữ hay cảm thấy khó chịu một chút nào\nđâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや！　僕がではなくすずが着ている状態がだ！\nゆえ、僕が買取り、すずにプレゼントしようかと」
1112 = "「Không! Ý anh là trạng thái Suzu đang mặc\ncơ!\nThế nên, anh định mua lại và tặng nó cho\nSuzu」"

# 【ハチロク】
# display as 鈴
# JP: 「え？　わたくしに……プレゼント？…………あ！\nあ……あーあーあー！　いやだ、もう、わたくしったら」
1245 = "「Hả? Tặng……cho em?…………A!\nA……a a a! Thôi đi, trời ạ, em thật là」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかってもらえればそれでいい」
1141 = "「Không phải vậy đâu Hachiroku.」"

# monologue
# JP: 大きな危機を、恐らく脱した。\n妙な緊張がふうっと抜ける。
1753 = "Có lẽ đã thoát khỏi một cuộc khủng hoảng\nlớn.\nSự căng thẳng kỳ lạ vụt tan biến."

# 【ハチロク】
# display as 鈴
# JP: 「と申しますか、お買い取りいただく必要はございません。\n双鉄さまのお気に召すなら、もちろんこのまま。けど…」
1364 = "「Nói sao nhỉ, ngài không cần phải mua lại\nđâu ạ.\nNếu ngài Soutetsu thích, tất nhiên cứ để\nthế này. Nhưng mà…」"

# monologue
# JP: ちろりと、すずが上目遣いに僕をみる。\n甘えるように、あるいは何かを、試すみたいに。
1802 = "Suzu liếc mắt nhìn tôi.\nNhư đang nũng nịu, hay như đang thử thách\nđiều gì đó."

# 【ハチロク】
# display as 鈴
# JP: 「あの雑誌の、大人っぽい下着とは大違いですよ？」
1178 = "「Nó khác xa với bộ đồ lót trưởng thành\ntrên tạp chí đó nhỉ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「なに。あの雑誌の下着に寄せたいのなら、\nそのネコミミと鈴とを外してしまえばいいのだ」
1457 = "「Kẻ nào đó!?」"

# 【ハチロク】
# display as 鈴
# JP: 「わたくしも、それは考えたのです。\nですけれど――」
1372 = "「Em cũng đã nghĩ đến chuyện đó.\nThế nhưng——」"

# monologue
# JP: （ぴょこん）
1972 = "（Bật ra）"

# 【双鉄】
# display as 雙鐵
# JP: 「しっぽか！！！！」
1455 = "「Vâng, tất nhiên rồi ạ.\nVì em là một \\x%lレイルロオド;#00ffc040;Railord%l;#; mà.」"

# monologue
# JP: ネコミミと鈴と胸元に意識の全てを奪われて、\nすずが揺らしてくれるまで、まったく見えていなかった。
1710 = "Bị tai mèo, chuông và khuôn ngực cướp đi\ntoàn bộ sự chú ý,\ncho đến khi Suzu lắc lư, tôi hoàn toàn\nkhông nhìn thấy nó."

# 【ハチロク】
# display as 鈴
# JP: 「はい。おしっぽです。しかもこれ、\nガッチリ縫い止められていて、外せないのでございます」
1343 = "「Vâng. Là đuôi ạ. Hơn nữa cái này,\nđược khâu chặt lắm, không thể tháo ra được\nạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1323 = "「Dù có vậy đi chăng nữa! Em cũng không\nthèm đi \\x%lエアクラ;#00ffc040;Aircra%l;#;っ」"

# 【ハチロク】
# display as 鈴
# JP: 「ですので、例えお耳と鈴を外してみても、\n大人っぽい気品とは、遠く離れてしまっていて」
1393 = "「Vì vậy, ngay cả khi xảy ra sự cố vận\nhành,\nchúng em vẫn có thể lập và đề xuất biểu đồ\nchạy tàu tạm thời trong thời gian cực\nngắn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1111 = "「Không」"

# monologue
# JP: 繋がった。ネコミミのまま。その上ですずの意向を尊重し\nすずを傷つけず満足させてセックスに至る、その道筋が。
1732 = "Đã kết nối được rồi. Giữ nguyên tai mèo.\nTrên cơ sở tôn trọng ý muốn của Suzu,\nlàm Suzu thỏa mãn mà không làm tổn thương\nem ấy và tiến tới ân ái, con đường đó."

# 【双鉄】
# display as 雙鐵
# JP: 「ネコミミと鈴としっぽと、大人っぽい気品と魅力。\nその全てを共存させる方法ならある」
1454 = "「Tai mèo, chuông, đuôi, và khí chất, sức\nquyến rũ trưởng thành.\nCó cách để tất cả những thứ đó cùng tồn\ntại」"

# 【ハチロク】
# display as 鈴
# JP: 「！！？　そのような方法があるのですね？\nさすがは双鉄さまです。わたくし、まったく気づけずに」
1231 = "「!!? Có cách như vậy sao ạ?\nQuả không hổ danh là ngài Soutetsu. Em,\nhoàn toàn không nhận ra」"

# 【双鉄】
# display as 雙鐵
# JP: 「例えば――そうだな、大人のシャム猫。\n落ち着いてのんびりしている姿には、気品があろう？」
1421 = "「Vì ngài……\nLại bảo là sẽ cho em đi \\x%lエアクラ;#00ffc040;Aircra%l;#; cơ chứ.」"

# 【ハチロク】
# display as 鈴
# JP: 「え？　ええと……。はい、左様ですね。\n落ち着いた綺麗なネコには、優美さと気品を感じます」
1247 = "「Chỉ bằng mắt thường sao? Vậy thì có khác\ngì con người.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、お前もそれに習えばいい。すなわち。\nその下着を身に着けている時は、ネコとして振る舞えば」
1458 = "「Nếu vậy, em cũng học theo là được. Tức\nlà.\nKhi mặc bộ đồ lót đó, hãy cư xử như một\ncon mèo」"

# 【ハチロク】
# display as 鈴
# JP: 「ネコとして……ふるまう…………」
1406 = "「Cư xử……như một con mèo…………」"

# monologue
# JP: ぴたりと、すずが止まってしまう。
1783 = "Suzu đột nhiên khựng lại."

# 【ハチロク】
# display as 鈴
# JP: 「わたくし――狐と雀とには多少親しんでおりますが、\nネコのことは、さほどくわしくございませんので……」
1180 = "「Em——tuy có phần thân thiết với cáo và\nchim sẻ,\nnhưng về mèo thì em không rành lắm……」"

# 【双鉄】
# display as 雙鐵
# JP: 「ネコの気品とは、すなわち、媚びぬ気品だ」
1394 = "「Khí chất của mèo, tức là, khí chất không\nxu nịnh」"

# 【ハチロク】
# display as 鈴
# JP: 「媚びぬ――媚びない気品、でございますか？」
1403 = "「Không xu nịnh——khí chất không xu nịnh,\nsao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「人間に媚びず、言うことを聞かず、気ままに振る舞う。\nであるが故、気まぐれに甘えられるとひときわ可愛い」
1119 = "「Không xu nịnh con người, không nghe lời,\ncư xử tùy hứng.\nChính vì thế, khi nũng nịu tùy hứng lại\ncàng đáng yêu hơn」"

# 【ハチロク】
# display as 鈴
# JP: 「言いうことを聞かず、気ままに振る舞う。\n気まぐれに――それが可愛らしさにつながる……」
1116 = "「Không nghe lời, cư xử tùy hứng.\nTùy hứng——điều đó dẫn đến sự đáng yêu……」"

# monologue
# JP: すずは可愛く小首をかしげ、
1803 = "——Sự thật đang đắp nặn thêm cho những suy\nđoán."

# 【ハチロク】
# display as 鈴
# JP: 「にゃん？」
1300 = "「Nyan?」"

# 【双鉄】
# display as 雙鐵
# JP: 「！！！！」
1254 = "「!!!!」"

# 【ハチロク】
# display as 鈴
# JP: 「にゃにゃ！？」
1298 = "「Nyanya!?」"

# monologue
# JP: 反応した。心も体も全力で。\n不意打ちの、あまりの可愛らし――っ！？
1757 = "Đã phản ứng lại. Cả trái tim và cơ thể dốc\ntoàn lực.\nSự tấn công bất ngờ, quá đỗi đáng yêu——!?"

# monologue
# JP: （むぎゅっ）
1907 = "Sự kết thúc của thời kỳ Đại bãi bỏ tuyến\nđường sắt,\ncũng đồng nghĩa với sự kết thúc của thời\nđại đường sắt."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま。これは何にゃあ？」
1484 = "「Ngài Soutetsu. Cái này là gì nya?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ――」
1255 = "「Có thể sao ạ!?」"

# monologue
# JP: ごく無造作に――というより雑に。ネコらしく。\nすずはジッパーを引き下ろし、僕の勃起を外へ出す。
1644 = "Vô cùng tự nhiên——hay nói đúng hơn là cẩu\nthả. Giống như một con mèo.\nSuzu kéo khóa quần xuống, lôi sự cương\ncứng của tôi ra ngoài."

# 【ハチロク】
# display as 鈴
# JP: 「にゃんでいきなり、\nこんなにおっきくしちゃってるにゃあ？」
1360 = "「Sao tự nhiên lại to thế này nya?」"

# monologue
# JP: これはかわいい。あのすずが懸命にネコになりきろうとし、\nしかも相当上手にミッションを達成してくれている。
1654 = "「Ngăn ngừa tai nạn, sao——」"

# monologue
# JP: （大人らしい優美さとは、却って離れてしまったが――）
1985 = "Giấu giếm cũng chẳng để làm gì.\nNhưng Hachiroku là một \\x%lレイルロオド;#00ffc040;Railord%l;#;."

# monologue
# JP: そこを指摘してこのひとときを打ち崩すほど愚かでない。\nすずがネコなら、その愛らしさと思う存分戯れるまでだ。
1771 = "Tôi không ngu ngốc đến mức chỉ ra điều đó\nvà phá hỏng khoảnh khắc này.\nNếu Suzu là mèo, tôi sẽ đùa giỡn với sự\nđáng yêu đó cho đến khi thỏa mãn."

# 【双鉄】
# display as 雙鐵
# JP: 「僕が勃起をした理由なら決まりきってる。\nすずがあまりに愛らしく、愛おしく美しくあるからだ」
1420 = "「Lý do anh cương cứng thì đã rõ ràng rồi.\nLà vì Suzu quá đỗi đáng yêu, quá đỗi yêu\nkiều và xinh đẹp」"

# 【ハチロク】
# display as 鈴
# JP: 「にゃん」
1295 = "「Nyan」"

# monologue
# JP: うれしげに語尾を弾ませて、\nすずは甘えてすりすりと、その鼻先を僕の胸へと――
1615 = "Đuôi câu vui sướng nảy lên,\nSuzu nũng nịu cọ cọ mũi vào ngực tôi——"

# 【ハチロク】
# display as 鈴
# JP: 「ぺろっ」
1492 = "「Đúng vậy ạ. Thưa ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あぅっ」
1268 = "「Hừm.」"

# monologue
# JP: 舐められ、声を漏らしてしまう。\nすずの瞳が、にやーっと細まる。
1626 = "Bị liếm, tôi bật ra tiếng kêu.\nĐôi mắt Suzu nheo lại cười gian xảo."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま、だらしないお顔かわいいにゃあ。\nにゃんだかもっと、ペロペロしたくなっちゃうにゃあ」
1483 = "「Khuôn mặt buông thả của ngài Soutetsu\nđáng yêu quá nya.\nTự nhiên lại muốn liếm láp nhiều hơn nữa\nnya」"

# monologue
# JP: あーんと大きく口を開いて、\n唾液でもはやテラテラになってる舌先を僕に見せつける。
1784 = "Há miệng thật to,\nkhoe cho tôi thấy đầu lưỡi đã ướt sũng\nnước bọt."

# 【ハチロク】
# display as 鈴
# JP: 「ちゅっ――ちゅむっ――ちゅっ――ぺろっ――\nれろっ――ちゅうっ――れろっ――れるっ」
1281 = "「Chụt——chụt——chụt——liếm——\nliếm——chụt——liếm——liếm」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ふぁ――」
1262 = "「Em cũng nghĩ giống tôi nhỉ.」"

# monologue
# JP: すずは舌先と唇で、僕を丹念に愛撫していく。\n僕の胸にまだまざまざ残る、”あの日の事故”の[きずあと]痕を。
1649 = "Suzu dùng đầu lưỡi và đôi môi âu yếm tôi\nmột cách tỉ mỉ.\nNgay cả vết sẹo của \"vụ tai nạn ngày hôm\nđó\" vẫn còn in hằn trên ngực tôi."

# 【ハチロク】
# display as 鈴
# JP: 「ぺろっ――ぺりゅっ――ぬろっ――ちゅっ――\nぺろっ――ちゅるっ――ちゅうっ――れりゅっ――」
1411 = "「Liếm——liếm——liếm——chụt——\nliếm——chụt——chụt——liếm——」"

# 【双鉄】
# display as 雙鐵
# JP: 「すず……すず――」
1464 = "「Suzu……Suzu——」"

# monologue
# JP: それが嬉しい。ネコになるきることにより、\n普段は瞳さえ逸しがちな、傷痕をも愛してくれることが。
1660 = "「Ngài……Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「その調子だ、すず――\nもっと気ままに――もっと自由に」
1470 = "「Cứ thế đi, Suzu——\nTùy hứng hơn nữa——tự do hơn nữa」"

# 【ハチロク】
# display as 鈴
# JP: 「ん……れろっ――ぺるっ――ぺろっ――ちゅるっ――\nちゅるっ――ちゅっ――れろっ――かぷっ！」
1306 = "「Vâng. Từ nay em sẽ không phạm sai lầm\nnữa.\nDù là không biết, nhưng em đã thất lễ\nrồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うぁっ！」
1302 = "「Ua!」"

# monologue
# JP: 軽く噛まれて気持ちよすぎて、かなり大きな声が出て。\nすずはちゅぱっと唇を話し、嬉しげな目で僕をみる。
1612 = "Bị cắn nhẹ quá sướng, tôi bật ra tiếng kêu\nkhá lớn.\nSuzu chu môi chụt một cái, nhìn tôi bằng\nánh mắt vui sướng."

# 【ハチロク】
# display as 鈴
# JP: 「んふふっ。かわいいかわいい甘えっ子の双鉄さまのこと。\nすずがもーっと、たくさん可愛がってあげますねにゃあ」
1318 = "「Chính vì không giận nên mới thế ạ.\nMột cái tát tay thừa thãi. Em đã dành cho\nngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
1236 = "「Hừ hừ」"

# monologue
# JP: 素顔のすずが出かけて慌ててネコの影へとに隠れた。\n嬉しさが、愛おしさが。その瞬間に何百倍にも
1801 = "Khuôn mặt thật của Suzu ló ra rồi vội vàng\ntrốn sau bóng dáng con mèo.\nNiềm vui sướng, sự yêu thương. Trong\nkhoảnh khắc đó tăng lên gấp trăm lần"

# 【ハチロク】
# display as 鈴
# JP: 「にゃっ！」
1299 = "「Ở thành phố này sao?\nHọ định dùng nhà máy để làm ô nhiễm nguồn\nnước của dòng sông này ư?」"

# monologue
# JP: （しゅこんっ！！！！）
1945 = "（Nắm chặt!!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「ぅぉっっ」
1251 = "「Uo」"

# 【ハチロク】
# display as 鈴
# JP: 「ちゅむっ――ちゅううううっ」
1285 = "「Ừm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁぁっ――」
1269 = "「Hửm?」"

# monologue
# JP: すずの小さな手が筒になり、いつもの力で、\nいつもの温度で、けれどいつもとまるで違った感触で――
1800 = "Bàn tay nhỏ bé của Suzu cuộn lại thành\nhình ống, với lực đạo như mọi khi,\nvới nhiệt độ như mọi khi, nhưng lại mang\nđến cảm giác hoàn toàn khác biệt——"

# monologue
# JP: （しこっ――しこっ――しゅこっ――しゅこっ――）
1975 = "Một đôi mắt tăm tối.\nNhìn vào đó, tôi có cảm giác như mình cũng\nsắp bị cuốn theo."

# 【双鉄】
# display as 雙鐵
# JP: 「手袋……手袋一枚で、これほど違う――\n違った感触がするものなのか――」
1397 = "「Mạnh đến thế cơ ạ?」"

# monologue
# JP: （しこ――しこっ――しゅっ、しゅっ――しこ――しこ）
1976 = "（Xoa——xoa——vuốt, vuốt——xoa——xoa）"

# monologue
# JP: 密着感とぬらつきがなく、\nなめらかにフィットしてくる肌触りがある。
1746 = "Không có cảm giác dính chặt và ướt át,\nthay vào đó là cảm giác mượt mà ôm sát lấy\nlàn da."

# 【ハチロク】
# display as 鈴
# JP: 「ちゅぱっ――ちゅっ――ちゅうううううっ」
1289 = "「Vậy là tốt rồi.\nCơ thể em cũng đang lên tiếng 'Có thực mới\nvực được đạo' kìa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「くぁっ」
1301 = "「Kua」"

# monologue
# JP: （しゅっ！　しこっ！　しにゅっ！　しゅこんっ！！）
1899 = "（Vuốt! Xoa nắn! Tuốt lượn! Vuốt ve!!）"

# 【ハチロク】
# display as 鈴
# JP: 「ちゅるっ――ちゅっ――ちゅっ――ちゅぱっ――\nちゅうっ――ちゅうっ――ちゅうっ――ちゅうっ」
1292 = "「Chụt——chụt——chụt——chụt——\nchụt——chụt——chụt——chụt」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ……ぁ……」
1260 = "「A……a……」"

# monologue
# JP: 乳首、乳首に吸い付かれてる。\nすずがあたかも赤子のように、僕の乳首をねぶっている。
1647 = "Nhũ hoa, nhũ hoa đang bị mút mát.\nSuzu đang bú nhũ hoa của tôi hệt như một\nđứa trẻ sơ sinh."

# 【ハチロク】
# display as 鈴
# JP: 「ちゅうっ――ちゅうっ――れるっ――ちゅうっ――\nちゅむっ――れるっ――ちゅむっ――れりゅんっ！」
1278 = "「Này này, em nói thế dễ gây hiểu lầm lắm\nđấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふぁっ！」
# 1302 = "「嗚哇！」" 

# monologue
# JP: （しこっ！　しこっ！　しこっ！　しこっ！\nしこっ！　しこっ！　しこっ！　しこっ！！）
1939 = "（Xoa nắn! Xoa nắn! Xoa nắn! Xoa nắn!\nXoa nắn! Xoa nắn! Xoa nắn! Xoa nắn!!）"

# monologue
# JP: 乳首を吸われ、乳輪の形を舌でなぞられて――\nそうされながら勃起はしこしこ、規則正しく刺激され――
1640 = "Bị mút nhũ hoa, bị lưỡi vờn quanh quầng\nvú——\ntrong lúc đó sự cương cứng vẫn liên tục\nđược kích thích đều đặn——"

# 【ハチロク】
# display as 鈴
# JP: 「ちゅむっ……ちゅっ――ちゅううっ――ちゅーっ――\nちゅっ――ちゅうっ――ちゅむっ――（こくっ）」
1290 = "「Chụt……chụt——chụttttt——chụttttt——\nchụt——chụttttt——chụt——（ngậm lấy）」"

# monologue
# JP: （しこっ！　しゅっ！　しゅっ！　しこっ！\nしにゅっ！　ちゅにっ！　にちゅっ！　ぬちちゅっ！）
1943 = "Sự chuyển đổi cảm xúc nhanh chóng đó có lẽ\nlà vì em ấy là một đồ vật chăng——\nHoặc cũng có thể về mặt tính cách, em ấy\ngiống tôi."

# monologue
# JP: 乳首を唾液で蕩かされ、なおもしつこく甘く吸われる。\n僕から溢れた先走り汁が、絹の手袋を汚し―て濡らす。
