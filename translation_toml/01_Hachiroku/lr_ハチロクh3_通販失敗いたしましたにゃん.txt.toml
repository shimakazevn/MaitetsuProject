1801 = "Suzu với gương mặt mộc vừa định lộ ra liền hốt hoảng trốn lại vào cái bóng của chú mèo.\\nNiềm hạnh phúc, sự yêu thương. Vào khoảnh khắc ấy, nó đã nhân lên gấp hàng trăm lần"

