1612 = "Cú ngoạm nhẹ đầy đê mê khiến tôi bật thốt lên một tiếng khá lớn.\\nSuzu rời môi ra đầy quyến luyến, rồi nhìn tôi với đôi mắt tràn ngập niềm vui."

