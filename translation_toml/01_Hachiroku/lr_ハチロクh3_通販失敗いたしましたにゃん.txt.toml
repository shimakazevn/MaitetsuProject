1778 = "Dù vậy tôi vẫn liều mạng khoét sâu vào âm đạo đang co rút, nhu động, run rẩy và bám chặt lấy. Có lẽ vì quy đầu đang phình to ra, nên tôi cảm nhận rất rõ những hạt sần sùi bên trong âm đạo."
