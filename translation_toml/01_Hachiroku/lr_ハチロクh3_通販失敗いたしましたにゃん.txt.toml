1711 = "Vừa cọ xát vào những hạt nhỏ sần sùi bằng chuyển động nhỏ như đang lay động, vừa dùng đầu ngón tay liếm láp nhũ hoa đáng yêu hết lần này đến lần khác——"
# monologue
# JP: （じゅぶうううううううううううっ！！――ごっ！）
1909 = "（Phậpppppppppppp!! ——Cộc!）"
