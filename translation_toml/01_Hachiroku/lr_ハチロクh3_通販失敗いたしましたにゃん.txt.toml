[script]
# lines: 344 
# 【ハチロク】
# display as 鈴
# JP: 「あ……の、双鉄さま？」
1431 = "「A... n-này, ngài Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
1317 = "「Hửm?」"

# monologue
# JP: 姿が見えぬ。障子の向こうからの声しかしない。\nしかもその声が、どうにもなんとも不安げだ。
1714 = "Không thấy bóng dáng đâu. Chỉ có tiếng nói vọng ra từ phía sau cánh cửa kéo.\\nHơn nữa, giọng điệu ấy nghe thế nào cũng thật đầy vẻ bất an."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
1357 = "「Có chuyện gì sao?」"

# 【ハチロク】
# display as 鈴
# JP: 「あの……ですね？　いんたあねっとのお買い物……\n通信販売についてお伺いしたいのですが」
1448 = "「Dạ... chuyện là thế này ạ? Việc mua sắm trên mạng...\\nEm muốn hỏi một chút về phương thức mua hàng từ xa ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、珍しい石炭でも見つけたか？」
1324 = "「À, em lại tìm thấy loại than đá nào hiếm gặp nữa sao?」"

# 【ハチロク】
# display as 鈴
# JP: 「いいえ、そのようなことではなくて――\nそうではなくて……ええと、ですね……」
1123 = "「Không, không phải chuyện như vậy đâu ạ――\\nKhông phải thế... Ơ kìa, chuyện là...」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1317 = "「嗯？」" 

# monologue
# JP: すずらしくもなく歯切れが悪い。\n違和感はすぐに心配となる。
1716 = "Giọng Suzu ngập ngừng chẳng chút tự nhiên.\\nCảm giác là lạ nhanh chóng chuyển thành sự lo lắng."

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。例えどのような質問だろうとも安心してくれ。\n僕は常にお前の味方だ。何でも怯えずに聞かせてほしい」
1408 = "「Không sao đâu. Dẫu cho đó có là câu hỏi thế nào đi nữa thì em cứ yên tâm.\\nAnh luôn luôn đứng về phía em. Có chuyện gì cứ hỏi, đừng sợ hãi」"

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま」
1480 = "「Ngài Soutetsu」"

# monologue
# JP: 安心したのか、障子からひょこっとすずが耳を出す――
1798 = "Như đã trút bỏ được gánh nặng, Suzu khẽ nhô đôi tai ra khỏi cánh cửa kéo――"

# 【双鉄】
# display as 雙鐵
# JP: 「って！？　耳っ――ネコミミっ！！？」
1209 = "「Hả?! Tai――Tai mèo kìa!!?」"

# 【ハチロク】
# display as 鈴
# JP: 「きゃっ！？　あっ！！！？」
1202 = "「Á?! Ối!!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「危ないっ！」
1154 = "「Nguy hiểm quá!」"

# 【ハチロク】
# display as 鈴
# JP: 「ひゃうっ！」
1191 = "「Hya!」"

# monologue
# JP: （とさっ！！！！）
1897 = "（Rầm!!!!）"

# monologue
# JP: ひどく驚き、驚かせ、\nすずの足をもつれさせてしまったようだ。
1727 = "Có vẻ như việc tôi giật mình và làm cô bé hoảng hốt\\nđã khiến Suzu bị vấp chân."

# 【ハチロク】
# display as 鈴
# JP: 「そうてつ、さま……かばってくださり――\nありがとうございます」
1485 = "「Cậu Soutetsu... cảm ơn cậu vì đã đỡ lấy tôi――\\ncảm ơn cậu rất nhiều.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや――」
1210 = "「À, không, có gì đâu――」"

# monologue
# JP: 僕が驚かしたせいで倒れさせてしまった。\n『大丈夫、なんでも話せ』といっていたにも関わらず。
1749 = "Chính vì tôi làm cô bé giật mình nên mới khiến cô bé bị ngã.\\nMặc dù trước đó tôi đã bảo 『Không sao đâu, cứ nói hết cho anh nghe』."

# 【双鉄】
# display as 雙鐵
# JP: 「……寝間着に着替えようとしていたのが幸いしたな」
870 = "「...Cũng may là em đang định thay đồ ngủ đấy nhỉ.」"

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ、左様ですね」
1320 = "「Ufufu, đúng là vậy ạ.」"

# monologue
# JP: 済まなかったといってしまえば、すずは却って畏まる。\nゆえに反らした話題にも、優しく微笑み答えてくれる。
1782 = "Nếu tôi nói lời xin lỗi, Suzu ngược lại sẽ cảm thấy e dè, khép nép hơn.\\nVì vậy, ngay cả khi tôi lảng sang chuyện khác, cô bé vẫn mỉm cười dịu dàng đáp lại."

# 【ハチロク】
# display as 鈴
# JP: 「おふとんも、\nちょうどよいクッションになってくれました」
1426 = "「Đệm futon cũng\\nvừa vặn làm một tấm đệm đỡ êm ái rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nで、だ――話を戻すけれども」
1129 = "「Phải rồi.\\nVậy thì――quay lại chuyện lúc nãy nhé.」"

# 【ハチロク】
# display as 鈴
# JP: 「はうっ」
1238 = "「Hau.」"

# monologue
# JP: すずがびくりと身をすくめれば、\nネコミミもまた小さく揺れる。
1772 = "Suzu rùng mình thon thót, làm\\ntai mèo cũng khẽ đung đưa theo."

# 【双鉄】
# display as 雙鐵
# JP: 「通信販売うんぬんというのは――\nそのランジェリーのことか？」
1142 = "「Mua sắm qua mạng gì đó――\\nÝ em là bộ nội y đó sao?」"

# 【ハチロク】
# display as 鈴
# JP: 「あ……」
1256 = "「A...」"

# monologue
# JP: 倒れた拍子に重なり合った姿勢のままで、\nすずは自らの体を見下ろす。
1595 = "Giữ nguyên tư thế đè lên nhau khi ngã nhào,\\nSuzu cúi xuống nhìn cơ thể mình."

# 【ハチロク】
# display as 鈴
# JP: 「その……もっと大人っぽい下着なのかと思ってしまって。\nレエスが黒を引き立てる、大人の女性によく似合う」
1445 = "「Anh... anh cứ nghĩ đó phải là bộ đồ lót trông người lớn hơn cơ.\\nKiểu như ren đen làm nổi bật sự quyến rũ, rất hợp với những phụ nữ trưởng thành ấy」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1322 = "「A...」"

# monologue
# JP: 思い当たる。\nいつだったか日々姫に通販雑誌を見せられて……
1721 = "Nghĩ lại thì.\\nKhông biết từ lúc nào Hibiki đã cho cô xem cuốn tạp chí mua sắm qua mạng..."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、僕が『こういうものも素敵だな』と\n褒めた下着によく似ているな。ただ一点――いや二点か」
1155 = "「Ra là vậy, nó rất giống bộ đồ lót mà anh từng khen là 『những thứ như thế này cũng tuyệt thật đấy』 nhỉ. Chỉ có một điểm――à không, hai điểm khác biệt thì phải」"

# 【ハチロク】
# display as 鈴
# JP: 「二点？　でしたら……このお耳――ネコさんのおみみと、\n首元の――」
1151 = "「Hai điểm ạ? Có phải là... chiếc tai này――tai mèo này,\\nvà ở cổ――」"

# monologue
# JP: （ちりん）
1914 = "（Kính coong）"

# 【ハチロク】
# display as 鈴
# JP: 「小さな鈴でございますね？\nわたくし、うっかり見落としてしまっていて」
1450 = "「Là chiếc chuông nhỏ này đúng không ạ?\\nEm đã vô ý sơ suất không để mắt tới」"

# 【双鉄】
# display as 雙鐵
# JP: 「うっかりか」
1402 = "「Vô ý thật sao」"

# monologue
# JP: すずははっきり落ち込んでいる。ゆえ、\n可愛さ、健気さに抱きしめたくなる気持ちをグッと抑える。
1809 = "Suzu lộ rõ vẻ thất vọng. Vì thế,\\ntôi phải cố kìm nén cảm giác muốn ôm chầm lấy cô bé vì sự đáng yêu và kiên cường này."

# 【双鉄】
# display as 雙鐵
# JP: 「サイズに気が行ってしまったか？\n雑誌をみなで見ていたときに、僕が褒めた下着には…」
1140 = "「Có phải em chỉ mải chú ý đến kích cỡ không?\\nLúc mọi người cùng xem cuốn tạp chí đó, bộ đồ lót anh khen...」"

# 【ハチロク】
# display as 鈴
# JP: 「はい、左様でございます。\nわたくしに合う小柄用の物は、残念ながら無かったので」
1344 = "「Vâng, đúng là như vậy ạ.\\nThật đáng tiếc là không có cỡ nhỏ phù hợp với vóc dáng của em」"

# 【双鉄】
# display as 雙鐵
# JP: 「似たデザインで、お前にも合うサイズをと――\nそればかりに気を取られ、慣れぬネットで必死に探し」
1400 = "「Chỉ vì cứ mải để tâm đến việc tìm một chiếc có thiết kế tương tự, và kích cỡ lại phải vừa vặn với em nữa――\\nnên ta mới cuống cuồng tìm kiếm trên cái mạng internet không quen thuộc này」"

# 【ハチロク】
# display as 鈴
# JP: 「『やっと見つけ出しました！』と、その喜びで\n細部をわたくし、確認しないで申込みをしてしまって」
1379 = "「Để rồi khi 『Cuối cùng cũng tìm ra rồi!』, chính niềm vui sướng đó\\nđã khiến em chủ quan mà đặt mua ngay mà chẳng thèm kiểm tra lại chi tiết」"

# monologue
# JP: ちりんと、再び鈴がなる。\n首から頭の上の耳へと、すずは細い指を滑らせる。
1812 = "Tiếng chuông lại khẽ ngân lên một tiếng leng keng.\\nSuzu lướt những ngón tay thon nhỏ từ cổ lên tận đôi tai trên đỉnh đầu."

# 【ハチロク】
# display as 鈴
# JP: 「荷物が届いて、嬉しくて……ついつい中身を確認せずに、\n試着を始めてしまったのです」
1416 = "「Khi gói hàng được giao đến, em đã vui mừng đến mức…… cứ thế mặc thử luôn\\n mà chẳng thèm kiểm tra xem bên trong có những gì」"

# 【双鉄】
# display as 雙鐵
# JP: 「試着の途中で、ネコミミと鈴に気づいたわけか」
1387 = "「Nói vậy là trong lúc đang mặc thử, em mới nhận ra có cả tai mèo và chuông đeo cổ à?」"

# 【ハチロク】
# display as 鈴
# JP: 「はい……ブラジャアから身につけたのが敗因です。\nせめて最初に、パンツを手にとっていたのなら……」
1342 = "「Vâng…… Sai lầm chí mạng của em là lại bắt đầu mặc từ áo ngực trước.\\n Giá mà lúc đầu, em cầm chiếc quần lót lên trước thì……」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。その格好でいる事情はわかった」
1156 = "「Ra là vậy. Ta hiểu lý do vì sao em lại ở trong bộ dạng này rồi」"

# monologue
# JP: 大変かわいい失敗な上、結果オーライとしか思えんのだが、\nすずは思いつめた顔をしていた。ゆえ――
1599 = "Dù đây là một sai sót cực kỳ đáng yêu, và kết quả thì chẳng có gì để phàn nàn,\\n nhưng gương mặt Suzu trông vẫn vô cùng căng thẳng. Chính vì thế――"

# 【双鉄】
# display as 雙鐵
# JP: 「で、僕に聞きたいこととは、一体何だ？」
1390 = "「Vậy, điều em muốn hỏi ta rốt cuộc là chuyện gì?」"

# 【ハチロク】
# display as 鈴
# JP: 「はい」
1383 = "「Vâng」"

# monologue
# JP: ほっとした顔。話を戻して大正解だ。\nあまりに可愛らしい故、すぐにも押し倒したくもあるが。
1658 = "Gương mặt cô ấy thoáng hiện vẻ nhẹ nhõm. Đổi chủ đề đúng là một quyết định sáng suốt.\\n Dù vì cô ấy quá đỗi dễ thương, khiến ta chỉ muốn lập tức đẩy ngã cô ấy ra ngay."

# 【ハチロク】
# display as 鈴
# JP: 「下着で……しかも、肌に触れさせてしまったものは……\n返品、きっとできませんよね？」
1447 = "「Đồ lót…… mà lại còn để chạm vào da thịt thế này rồi……\\n thì chắc chắn là không thể trả lại hàng được nữa, đúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「返品するなら、僕が買い取る」
1336 = "「Nếu muốn trả hàng, ta sẽ mua lại nó」"

# 【ハチロク】
# display as 鈴
# JP: 「ひえっ！？　えっ！？　買い取る？\n……お買取になられて――双鉄さまが、これを？」
1275 = "「Hở?! Ể?! Mua lại ạ?\\n……Ngài mua lại――Soutetsu-sama, ngài mua cái này để làm gì cơ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おいおい、僕が身につけてどうするというのだ」
1294 = "「Kìa kìa, ta mà mặc cái này thì ra cái thể thống gì chứ」"

# 【ハチロク】
# display as 鈴
# JP: 「どうなさるもなにも――」
1358 = "「Dù có thế nào đi nữa――」"

# monologue
# JP: すずの瞳が一瞬細まる。\n弄ぶべきネズミを見つけたネコそのものであるかのように。
1808 = "Đôi mắt của Suzu nheo lại trong thoáng chốc.\\nGiống hệt như một chú mèo vừa tìm thấy con chuột để vờn nghịch."

# 【ハチロク】
# display as 鈴
# JP: 「大変、素敵でございましょう？」
1367 = "「Chẳng phải sẽ rất tuyệt vời sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1207 = "「-!?」"

# monologue
# JP: 冗談を言っている目ではない。着せるつもりだ。\n理解は冷や汗を吹き出させ、脳は全力で稼働する
1656 = "Ánh mắt của em ấy không hề có vẻ gì là đang đùa cả. Em ấy thực sự định bắt mình mặc nó.\\nSự nhận thức đó khiến mồ hôi lạnh toát ra, và đại não của tôi lập tức hoạt động hết công suất."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　だな！　これはこれで大変に素敵なのだ」
1313 = "「Ừm! Đúng vậy! Bản thân bộ đồ này đúng là cực kỳ tuyệt vời luôn.」"

# 【ハチロク】
# display as 鈴
# JP: 「で！　ございますよね！！」
1362 = "「Đúng! Là như vậy mà!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや！　僕がではなくすずが着ている状態がだ！\nゆえ、僕が買取り、すずにプレゼントしようかと」
1112 = "「Không! Ý anh không phải là anh mặc, mà là khi Suzu mặc nó cơ!\\nThế nên, hay là anh mua đứt bộ này rồi tặng lại cho Suzu nhé?」"

# 【ハチロク】
# display as 鈴
# JP: 「え？　わたくしに……プレゼント？…………あ！\nあ……あーあーあー！　いやだ、もう、わたくしったら」
1245 = "「Hả? Tặng... tặng cho em sao?............ Ơ!\\nƠ... ơ kìa! Ghét thật đấy, thiệt tình, em lại nghĩ đi đâu rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかってもらえればそれでいい」
1141 = "「Em hiểu cho là tốt rồi.」"

# monologue
# JP: 大きな危機を、恐らく脱した。\n妙な緊張がふうっと抜ける。
1753 = "Có vẻ như tôi đã thoát được một kiếp nạn lớn.\\nSự căng thẳng kỳ lạ vừa rồi khẽ tan biến."

# 【ハチロク】
# display as 鈴
# JP: 「と申しますか、お買い取りいただく必要はございません。\n双鉄さまのお気に召すなら、もちろんこのまま。けど…」
1364 = "「Mà thực ra, anh không cần phải mua lại đâu ạ.\\nNếu anh Soutetsu đã thích thì cứ để thế này cũng được. Nhưng mà...」"

# monologue
# JP: ちろりと、すずが上目遣いに僕をみる。\n甘えるように、あるいは何かを、試すみたいに。
1802 = "Suzu khẽ ngước mắt lên nhìn tôi.\\nNhư thể đang làm nũng, hoặc giả như là đang thử lòng điều gì đó."

# 【ハチロク】
# display as 鈴
# JP: 「あの雑誌の、大人っぽい下着とは大違いですよ？」
1178 = "「Bộ này khác xa với kiểu nội y trưởng thành trong cuốn tạp chí đó đấy nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「なに。あの雑誌の下着に寄せたいのなら、\nそのネコミミと鈴とを外してしまえばいいのだ」
1457 = "「Có sao đâu. Nếu em muốn nó giống với nội y trong cuốn tạp chí đó,\\nthì chỉ cần tháo cái tai mèo với chiếc chuông này ra là được mà.」"

# 【ハチロク】
# display as 鈴
# JP: 「わたくしも、それは考えたのです。\nですけれど――」
1372 = "「Chính em cũng đã nghĩ đến điều đó.\\nThế nhưng mà――」"

# monologue
# JP: （ぴょこん）
1972 = "（Nhúc nhích）"

# 【双鉄】
# display as 雙鐵
# JP: 「しっぽか！！！！」
1455 = "「Là đuôi cơ à!!!!」"

# monologue
# JP: ネコミミと鈴と胸元に意識の全てを奪われて、\nすずが揺らしてくれるまで、まったく見えていなかった。
1710 = "Mải dồn hết sự chú ý vào đôi tai mèo, chiếc chuông và cả vùng trước ngực,\\ntôi hoàn toàn không hề nhận ra cho đến khi Suzu lắc lắc nó."

