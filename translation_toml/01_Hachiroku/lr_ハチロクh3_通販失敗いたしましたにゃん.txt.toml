1454 = "「Đôi tai mèo, chiếc chuông, cái đuôi, cùng với sự quý phái và quyến rũ mang dáng dấp người lớn.\\nCó một cách để tất cả những điều đó cùng tồn tại đấy」"

# 【ハチロク】
# display as 鈴
