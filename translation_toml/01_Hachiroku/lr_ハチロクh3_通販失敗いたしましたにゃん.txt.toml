1201 = "「Hyau!? Hua——ngực——nhũ hoa—— của ngài Soutetsu——ưm——ngón tay——ngón tay」"
# monologue
# JP: （きゅ！　きゅんっ！　きゅううっ！　きゅむっ）
1940 = "（Siết! Thắt lại! Siết chặtttt! Bóp chặt）"
# monologue
# JP: かわいい乳首を指で弄れば、すずは膣内でも返事する。\n乳首もいいけど射精もと、甘くわななきおねだりしてくる。
1750 = "Khi tôi dùng ngón tay trêu đùa nhũ hoa đáng yêu, Suzu cũng đáp lại từ bên trong âm đạo. Ngọt ngào run rẩy vòi vĩnh rằng nhũ hoa cũng thích nhưng hãy xuất tinh đi."
# 【ハチロク】
# display as 鈴
