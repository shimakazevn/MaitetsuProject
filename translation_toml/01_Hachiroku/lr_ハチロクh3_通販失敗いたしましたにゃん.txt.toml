1231 = "「!!? Có một phương pháp như vậy thật sao ạ?\\nQuả không hổ danh là Anh Soutetsu. Vậy mà em hoàn toàn không hề nhận ra」"

# 【双鉄】
# display as 雙鐵
# JP: 「例えば――そうだな、大人のシャム猫。\n落ち着いてのんびりしている姿には、気品があろう？」
1421 = "「Ví dụ như―― xem nào, một chú mèo Xiêm trưởng thành.\\nDáng vẻ điềm tĩnh, ung dung của nó chẳng phải rất có khí chất quý phái sao?」"

# 【ハチロク】
# display as 鈴
