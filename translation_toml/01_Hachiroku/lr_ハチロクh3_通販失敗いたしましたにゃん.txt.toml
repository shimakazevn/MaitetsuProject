# monologue
# JP: （ずっ！　でゅぶっ！　じゅぼっ！　じゅりゅっ！！）
1959 = "（Phập! Phập! Phập! Phập!!）"
# monologue
# JP: 一直線に腰を動かす。膣の最奥にごつりとぶつけ、\nスタンプしてからまた剥がす動きを繰り返す。
1699 = "Chuyển động hông theo một đường thẳng. Đâm sầm vào nơi sâu nhất của âm đạo, đóng dấu rồi lại lặp lại chuyển động bóc ra."
