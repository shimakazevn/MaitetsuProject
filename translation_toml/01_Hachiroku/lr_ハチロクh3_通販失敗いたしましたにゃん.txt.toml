1180 = "「Bản thân tôi――tuy có đôi chút thân thuộc với loài cáo và chim sẻ,\\nnhưng về loài mèo thì tôi lại không hiểu rõ cho lắm……」"

# 【双鉄】
# display as 雙鐵
