# monologue
# JP: だらだらと垂れ流されてたよだれをすすり、飲み干して。\nすずもくったり、体の力を全て抜く。
1799 = "Hút lấy dòng nước dãi đang chảy ròng ròng, rồi nuốt ực. Suzu cũng rã rời, toàn thân mất hết sức lực."
# 【ハチロク】
# display as 鈴
# JP: 「ふにゃあ～」
1229 = "「Hunyaa~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
# 1236 = "「哈哈」" 
# monologue
# JP: 愛くるしい声。弛緩して、ネコの気持ちが戻ってきたのか、\nそれとも自然とあふれた声か――どちらにしても愛おしい。
1652 = "Giọng nói đáng yêu. Đã thư giãn, cảm giác của mèo đã trở lại, hay là âm thanh phát ra tự nhiên——dù là gì thì cũng thật đáng yêu."
# 【双鉄】
# display as 雙鐵
# JP: 「すず」
1465 = "「Suzu」"
# monologue
# JP: 引き抜き、隣に寝転んで、ようやくキスをし、髪を撫ぜ。
1705 = "Rút ra, nằm lăn ra bên cạnh, cuối cùng cũng được hôn, và vuốt tóc em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「……こうした感じも、悪くはないな」
868 = "「......Cảm giác như thế này, cũng không tệ nhỉ」"
# 【ハチロク】
# display as 鈴
# JP: 「……こうした感じ、でございますか？」
866 = "「......Cảm giác như thế này, sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1309 = "「Ừ」"
# monologue
# JP: 盛りだくさんで、充足感あるセックスだった。\nそんな思いで、僕の舌先もなめらかになる。
1707 = "Một cuộc ân ái ngập tràn và đầy thỏa mãn. Với suy nghĩ đó, đầu lưỡi của tôi cũng trở nên trơn tru hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「自由きままなネコすずも。それを強引に躾ける感じも。\n結局は堪能し尽くしたそのネコ下着も、たまになら」
1121 = "「Cả Suzu mèo tự do tùy hứng. Cả cảm giác cưỡng ép trừng phạt điều đó. Rốt cuộc thì bộ đồ lót mèo đã được tận hưởng triệt để đó, thỉnh thoảng mặc thì」"
# 【ハチロク】
# display as 鈴
# JP: 「左様です、双鉄様。たまにでしたら、\nこのネコ下着も、ええ、ええ！　全く悪くないのです」
1482 = "「Đúng vậy ạ, ngài Soutetsu. Nếu thỉnh thoảng thì, bộ đồ lót mèo này cũng, vâng, vâng! Hoàn toàn không tệ chút nào ạ」"
# monologue
# JP: すずらしくもない凄い早口。
1743 = "Suzu nói nhanh thoăn thoắt không giống em ấy chút nào."
# 【ハチロク】
# display as 鈴
# JP: 「にゃっ」
# 1295 = "「喵」" 
# monologue
# JP: そうして何故か、とってつけられるネコの語尾――！！
1769 = "Thế rồi không hiểu sao, lại cố tình thêm đuôi câu của mèo——!!"
# 【双鉄】
# display as 雙鐵
# JP: 「い、いや、すず、ちょっと待て」
1446 = "「K, không, Suzu, chờ chút đã」"
# monologue
# JP: それはつまりはネコとなり、わがままを言う意思表――！
1796 = "Điều đó tức là hóa thành mèo, thể hiện ý muốn nũng nịu đòi hỏi——!"
# monologue
# JP: （しゅるるっ）
1919 = "（Roạt）"
# monologue
# JP: すずが足から下着を外す。\nかわいいしっぽを一度見せつけ、ニッコリ笑う。
1811 = "Suzu cởi đồ lót ra khỏi chân. Khoe chiếc đuôi đáng yêu một lần, rồi mỉm cười rạng rỡ."
# 【ハチロク】
# display as 鈴
# JP: 「ですので――ね？\nさ、双鉄さま？　まずはこれから……着てみてにゃ！」
1389 = "「Thế nên——nhé? Nào, ngài Soutetsu? Trước tiên ngài hãy......mặc thử cái này xem nya!」"
