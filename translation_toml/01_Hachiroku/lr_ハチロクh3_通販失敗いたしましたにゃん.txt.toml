1247 = "「Dạ? Ưm…… Vâng, đúng là như vậy ạ.\\nỞ những chú mèo ngoan ngoãn, xinh đẹp, em có thể cảm nhận được sự thanh lịch và quý phái」"

# 【双鉄】
# display as 雙鐵
