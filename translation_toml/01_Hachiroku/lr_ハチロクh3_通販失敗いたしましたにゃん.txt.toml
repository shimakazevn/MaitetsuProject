1219 = "「Hua——ha——a——sướng——quá——ạ—— Ưm——ngực——nhũ hoa cũng——cô bé, cũng」"
# monologue
# JP: （さすっ――こっ――くにっ――ぢゅちゅっ）
1973 = "（Vuốt ve——cộc——vê nhẹ——nhóp nhép）"
