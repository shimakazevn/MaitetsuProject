# monologue
# JP: 呼気を抑えてあえぐ口から、赤い舌先がちろちろ覗く。\nキスをしたいが下着が邪魔で足を開けず重なれない。
1648 = "Từ đôi môi đang cố kìm nén nhịp thở mà rên rỉ, đầu lưỡi đỏ hồng lấp ló. Tôi muốn hôn, nhưng vướng đồ lót nên không thể tách chân em ấy ra để áp sát vào."
# monologue
# JP: （ふにっ――くにっ）
1950 = "（Nắn bóp——vê nhẹ）"
# 【ハチロク】
# display as 鈴
