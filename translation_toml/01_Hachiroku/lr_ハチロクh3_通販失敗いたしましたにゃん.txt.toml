1197 = "「Xin hãy đính chính lại sự nhận thức sai\nlệch đó——」"

# monologue
# JP: （きゅうっっっ！！！）
1952 = "（Siết chặtttt!!!）"

# monologue
# JP: 縮小し蠕動し戦慄き張り付く膣をそれでもひたすら抉る。\n亀頭が膨れあがっているのか、膣内の粒立ちを強く感じる。
1778 = "Dù vậy tôi vẫn liều mạng khoét sâu vào âm\nđạo đang co rút, nhu động, run rẩy và bám\nchặt lấy.\nCó lẽ vì quy đầu đang phình to ra, nên tôi\ncảm nhận rất rõ những hạt sần sùi bên\ntrong âm đạo."

# monologue
# JP: （ひゅぼっ！　ばちゅっ！　じゅぶっ！　ばつんっ！！）
# 1962 = "（疾風驟雨）" 

# 【ハチロク】
# display as 鈴
# JP: 「ふあっ！　あっ！　あっ！　あっ！\nあっ！　あっ！　あっ！　あっ！！」
1223 = "「Hua! A! A! A!\nA! A! A! A!!」"

# monologue
# JP: そこを可愛がる余裕さえない。射精に向けて射精に向けて、\nただただ直線的な動きで、僕らはひたすら加速していく。
1741 = "Thậm chí không còn tâm trí đâu mà âu yếm\nnơi đó. Hướng tới xuất tinh, hướng tới\nxuất tinh,\nbằng những chuyển động thẳng tắp, chúng\ntôi liều mạng tăng tốc."

# monologue
# JP: （ばちゅっ！　ずぶっ！　ばつっ！　ずばっ！！！）
1930 = "Em ấy nhìn sang trái phải.\nSự gay gắt trong ánh mắt đã dịu đi phần\nnào."

# 【ハチロク】
# display as 鈴
# JP: 「ひあっ！　んっ！　んきゅっ！　ふあっ！\nわらく、ひっ、すず、はっ！　すずはっ！　もうっ――」
1199 = "「Hya! Ưm! Ưm kyu! Hua!\nEm, Suzu, ha! Suzu! Hết——」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ――っ！\nすずっ！　イク、ぞっ！！」
1307 = "「Ưm——!\nSuzu! Ra, đây!!」"

# 【ハチロク】
# display as 鈴
# JP: 「ひゃうっ！　ひゃっ！　ぃっ！　そうへふ、はわっ\nあっ！　んぐっ！　ひへっ――きてっ――んきゅう」
1195 = "「Hyau! Hya! I! Ngài Soutetsu, hawa\nA! Ưm gu! Hihe——đến đây——ưm kyuu」"

# monologue
# JP: （きゅううううううううううっっっっっ！）
# 1952 = "（收緊）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んんっ！」
1312 = "「Ưm ưm!」"

# monologue
# JP: （ぼぢゅうううううっ！！！！――ごつ！　ごりゅっ！）
1966 = "（Phậppppppp!!!! ——Cộc! Ngoáy!）"

# 【ハチロク】
# display as 鈴
# JP: 「～～～～～～～～～～～～～～～～っ！！！！！！」
1497 = "「~~~~~~~~~~~~~~~~!!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ！」
1270 = "「Ư……m.」"

# monologue
# JP: （ぶびゅっ！　どびゅっ！　びゅるっ！　ぶぢゅっ！）
# 1921 = "（噴薄而出）" 

# 【ハチロク】
# display as 鈴
# JP: 「ぁっ――ぁっ――あっ――あっ――ふぁ――ふかっ――\nおくっ――おくっ――あちゅい――あちゅいの――」
1266 = "「A——a——a——a——hua——huka——\nsâu——sâu——nóng——nóng quá——」"

# monologue
# JP: （びゅるっ！　びゅっ！　ぶびゅっ！　びゅううっ！）
# 1928 = "（奔湧不住）" 

# 【ハチロク】
# display as 鈴
# JP: 「おまんまんっ――おくっ――あっ！　ふあっ！　あ！\nおなか――たたいて――あついの――びゅうっ、って」
1348 = "「Cướp đi đường sắt khỏi cuộc sống của\nngười dân, gây ra thời kỳ Đại bãi bỏ tuyến\nđường sắt.\nNhững tội lỗi mà \\x%lエアクラ;#00ffc040;Aircra%l;#; đã gây ra, em\ntuyệt đối sẽ không tha thứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「す……ず――」
1463 = "「Thời gian không thể quay lại.\nNhưng, có lẽ lần sau em sẽ không bị cuốn\nvào nữa.」"

# monologue
# JP: （びゅっ――びゅるっ――びゅうう――びゅっ――ぴ）
# 1932 = "（尾韻悠長）" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ……ぁ――ふぁ――あ……あぁ」
1261 = "「A……a——hua——a……aa」"

# monologue
# JP: 射精しつくした。睾丸が今度こそ空になった。\n僕の中にはもうなにも――思考くらいしか残っていない。
1795 = "Không biết có gì thú vị,\nmà Hachiroku lại cười khúc khích."

# 【ハチロク】
# display as 鈴
# JP: 「ふぁ――あ……ぁ……あ……――\nん……じゅるるっ――ごくっ――ぷぁ」
1220 = "「Hua——a……a……a……——\nƯm……chụt——ực——pua」"

# monologue
# JP: だらだらと垂れ流されてたよだれをすすり、飲み干して。\nすずもくったり、体の力を全て抜く。
1799 = "Hút lấy dòng nước dãi đang chảy ròng ròng,\nrồi nuốt ực.\nSuzu cũng rã rời, toàn thân mất hết sức\nlực."

# 【ハチロク】
# display as 鈴
# JP: 「ふにゃあ～」
1229 = "「Hunyaa~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
# 1236 = "「哈哈」" 

# monologue
# JP: 愛くるしい声。弛緩して、ネコの気持ちが戻ってきたのか、\nそれとも自然とあふれた声か――どちらにしても愛おしい。
1652 = "Giọng nói đáng yêu. Đã thư giãn, cảm giác\ncủa mèo đã trở lại,\nhay là âm thanh phát ra tự nhiên——dù là gì\nthì cũng thật đáng yêu."

# 【双鉄】
# display as 雙鐵
# JP: 「すず」
1465 = "「Suzu」"

# monologue
# JP: 引き抜き、隣に寝転んで、ようやくキスをし、髪を撫ぜ。
1705 = "Rút ra, nằm lăn ra bên cạnh, cuối cùng\ncũng được hôn, và vuốt tóc em ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「……こうした感じも、悪くはないな」
868 = "「……Cảm giác như thế này, cũng không tệ\nnhỉ」"

# 【ハチロク】
# display as 鈴
# JP: 「……こうした感じ、でございますか？」
866 = "「……Cảm giác như thế này, sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1309 = "「Vâng. Em hiểu rồi thưa ngài Soutetsu——\n!? Cái gì? \\x%l共感;#00ffc040;Cộng cảm%l;#;!?」"

# monologue
# JP: 盛りだくさんで、充足感あるセックスだった。\nそんな思いで、僕の舌先もなめらかになる。
1707 = "Một cuộc ân ái ngập tràn và đầy thỏa mãn.\nVới suy nghĩ đó, đầu lưỡi của tôi cũng trở\nnên trơn tru hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「自由きままなネコすずも。それを強引に躾ける感じも。\n結局は堪能し尽くしたそのネコ下着も、たまになら」
1121 = "「Cả Suzu mèo tự do tùy hứng. Cả cảm giác\ncưỡng ép trừng phạt điều đó.\nRốt cuộc thì bộ đồ lót mèo đã được tận\nhưởng triệt để đó, thỉnh thoảng mặc thì」"

# 【ハチロク】
# display as 鈴
# JP: 「左様です、双鉄様。たまにでしたら、\nこのネコ下着も、ええ、ええ！　全く悪くないのです」
1482 = "「Đúng vậy ạ, ngài Soutetsu. Nếu thỉnh\nthoảng thì,\nbộ đồ lót mèo này cũng, vâng, vâng! Hoàn\ntoàn không tệ chút nào ạ」"

# monologue
# JP: すずらしくもない凄い早口。
1743 = "Suzu nói nhanh thoăn thoắt không giống em\nấy chút nào."

# 【ハチロク】
# display as 鈴
# JP: 「にゃっ」
# 1295 = "「喵」" 

# monologue
# JP: そうして何故か、とってつけられるネコの語尾――！！
1769 = "Thế rồi không hiểu sao, lại cố tình thêm\nđuôi câu của mèo——!!"

# 【双鉄】
# display as 雙鐵
# JP: 「い、いや、すず、ちょっと待て」
1446 = "「K, không, Suzu, chờ chút đã」"

# monologue
# JP: それはつまりはネコとなり、わがままを言う意思表――！
1796 = "Điều đó tức là hóa thành mèo, thể hiện ý\nmuốn nũng nịu đòi hỏi——!"

# monologue
# JP: （しゅるるっ）
1919 = "Em gái——"

# monologue
# JP: すずが足から下着を外す。\nかわいいしっぽを一度見せつけ、ニッコリ笑う。
1811 = "Một tiếng thở phào nhẹ nhõm."

# 【ハチロク】
# display as 鈴
# JP: 「ですので――ね？\nさ、双鉄さま？　まずはこれから……着てみてにゃ！」
1389 = "「Thế nên——nhé?\nNào, ngài Soutetsu? Trước tiên ngài\nhãy……mặc thử cái này xem nya!」"
