1598 = "Việc giả vờ bình tĩnh, hay dừng chuyển động hông đều rất khó khăn. Bên trong âm đạo Suzu cứ run rẩy liên hồi, cưỡng ép tôi xuất tinh."
# 【双鉄】
# display as 雙鐵
