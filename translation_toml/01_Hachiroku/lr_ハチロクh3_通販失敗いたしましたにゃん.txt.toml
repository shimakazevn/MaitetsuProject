1119 = "「Chúng không nịnh bợ con người, chẳng thèm nghe lời, cứ thích gì làm nấy.\\nNhưng cũng chính vì vậy, những lúc chúng tùy hứng làm nũng lại trở nên đáng yêu vô cùng.」"

# 【ハチロク】
