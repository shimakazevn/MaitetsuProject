[script]
# lines: 344 
# 【ハチロク】
# display as 鈴
# JP: 「あ……の、双鉄さま？」
1431 = "「A......ừm, ngài Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
1317 = "「Hửm?」"
# monologue
# JP: 姿が見えぬ。障子の向こうからの声しかしない。\nしかもその声が、どうにもなんとも不安げだ。
1714 = "Không thấy bóng dáng đâu. Chỉ nghe thấy tiếng nói từ bên kia vách ngăn. Hơn nữa giọng nói ấy, nghe có vẻ vô cùng bất an."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
1357 = "「Sao vậy?」"
# 【ハチロク】
# display as 鈴
# JP: 「あの……ですね？　いんたあねっとのお買い物……\n通信販売についてお伺いしたいのですが」
1448 = "「À......ừm? Mua sắm trên internet...... Em muốn hỏi ngài về việc mua hàng qua mạng」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、珍しい石炭でも見つけたか？」
1324 = "「À, em tìm thấy loại than hiếm nào sao?」"
# 【ハチロク】
# display as 鈴
# JP: 「いいえ、そのようなことではなくて――\nそうではなくて……ええと、ですね……」
1123 = "「Không, không phải chuyện đó—— Không phải vậy......ờm, là......」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1317 = "「嗯？」" 
# monologue
# JP: すずらしくもなく歯切れが悪い。\n違和感はすぐに心配となる。
1716 = "Lấp lửng không giống Suzu chút nào. Cảm giác khác lạ nhanh chóng biến thành sự lo lắng."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。例えどのような質問だろうとも安心してくれ。\n僕は常にお前の味方だ。何でも怯えずに聞かせてほしい」
1408 = "「Không sao đâu. Cho dù là câu hỏi gì đi nữa thì cứ yên tâm. Anh luôn đứng về phía em. Hãy kể cho anh nghe mọi chuyện, đừng sợ hãi」"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま」
1480 = "「Ngài Soutetsu」"
# monologue
# JP: 安心したのか、障子からひょこっとすずが耳を出す――
1798 = "Có lẽ đã an tâm hơn, Suzu ló tai ra từ vách ngăn——"
# 【双鉄】
# display as 雙鐵
# JP: 「って！？　耳っ――ネコミミっ！！？」
1209 = "「Hả!? Tai——tai mèo!!?」"
# 【ハチロク】
# display as 鈴
# JP: 「きゃっ！？　あっ！！！？」
1202 = "「Kya!? A!!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「危ないっ！」
1154 = "「Nguy hiểm!」"
# 【ハチロク】
# display as 鈴
# JP: 「ひゃうっ！」
1191 = "「Hyau!」"
# monologue
# JP: （とさっ！！！！）
1897 = "（Phịch!!!!）"
# monologue
# JP: ひどく驚き、驚かせ、\nすずの足をもつれさせてしまったようだ。
1727 = "Quá đỗi kinh ngạc, và làm em ấy giật mình, có vẻ như tôi đã làm Suzu vấp chân."
# 【ハチロク】
# display as 鈴
# JP: 「そうてつ、さま……かばってくださり――\nありがとうございます」
1485 = "「Ngài, Soutetsu......đã đỡ lấy em—— Cảm ơn ngài」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや――」
1210 = "「À, không——」"
# monologue
# JP: 僕が驚かしたせいで倒れさせてしまった。\n『大丈夫、なんでも話せ』といっていたにも関わらず。
1749 = "Vì tôi làm em ấy giật mình nên mới ngã. Dù đã nói \"Không sao, cứ nói mọi chuyện đi\" vậy mà."
# 【双鉄】
# display as 雙鐵
# JP: 「……寝間着に着替えようとしていたのが幸いしたな」
870 = "「......May mà em đang định thay đồ ngủ」"
# 【ハチロク】
# display as 鈴
# JP: 「うふふっ、左様ですね」
1320 = "「Ư hừ hừ, đúng vậy nhỉ」"
# monologue
# JP: 済まなかったといってしまえば、すずは却って畏まる。\nゆえに反らした話題にも、優しく微笑み答えてくれる。
1782 = "Nếu nói xin lỗi, Suzu sẽ lại càng khép nép. Thế nên em ấy cũng dịu dàng mỉm cười đáp lại chủ đề tôi đã lảng tránh."
# 【ハチロク】
# display as 鈴
# JP: 「おふとんも、\nちょうどよいクッションになってくれました」
1426 = "「Chăn nệm, cũng đã trở thành tấm đệm đỡ rất tốt」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。\nで、だ――話を戻すけれども」
1129 = "「Nhỉ. Vậy, ừm——quay lại câu chuyện」"
# 【ハチロク】
# display as 鈴
# JP: 「はうっ」
1238 = "「Hau」"
# monologue
# JP: すずがびくりと身をすくめれば、\nネコミミもまた小さく揺れる。
1772 = "Suzu khẽ giật mình co rúm người lại, đôi tai mèo cũng khẽ rung rinh."
# 【双鉄】
# display as 雙鐵
# JP: 「通信販売うんぬんというのは――\nそのランジェリーのことか？」
1142 = "「Chuyện mua hàng qua mạng gì đó là—— Về bộ đồ lót đó sao?」"
# 【ハチロク】
# display as 鈴
# JP: 「あ……」
1256 = "「A......」"
# monologue
# JP: 倒れた拍子に重なり合った姿勢のままで、\nすずは自らの体を見下ろす。
1595 = "Vẫn giữ nguyên tư thế nằm đè lên nhau lúc ngã, Suzu cúi xuống nhìn cơ thể mình."
# 【ハチロク】
# display as 鈴
# JP: 「その……もっと大人っぽい下着なのかと思ってしまって。\nレエスが黒を引き立てる、大人の女性によく似合う」
1445 = "「Chuyện là......em cứ nghĩ nó là bộ đồ lót trưởng thành hơn cơ. Ren làm nổi bật màu đen, rất hợp với phụ nữ trưởng thành」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1322 = "「À......」"
# monologue
# JP: 思い当たる。\nいつだったか日々姫に通販雑誌を見せられて……
1721 = "Tôi nhớ ra rồi. Không biết từ khi nào Hibiki đã cho xem cuốn tạp chí mua sắm......"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、僕が『こういうものも素敵だな』と\n褒めた下着によく似ているな。ただ一点――いや二点か」
1155 = "「Vậy sao, nó rất giống bộ đồ lót mà anh đã khen 'Thứ này cũng tuyệt nhỉ'. Chỉ có một điểm——không, hai điểm chăng」"
# 【ハチロク】
# display as 鈴
# JP: 「二点？　でしたら……このお耳――ネコさんのおみみと、\n首元の――」
1151 = "「Hai điểm? Nếu vậy......đôi tai này——tai của bạn mèo, và ở cổ——」"
# monologue
# JP: （ちりん）
1914 = "（Leng keng）"
# 【ハチロク】
# display as 鈴
# JP: 「小さな鈴でございますね？\nわたくし、うっかり見落としてしまっていて」
1450 = "「Là chiếc chuông nhỏ đúng không ạ? Em, đã lỡ không chú ý」"
# 【双鉄】
# display as 雙鐵
# JP: 「うっかりか」
1402 = "「Lỡ không chú ý sao」"
# monologue
# JP: すずははっきり落ち込んでいる。ゆえ、\n可愛さ、健気さに抱きしめたくなる気持ちをグッと抑える。
1809 = "Suzu lộ rõ vẻ thất vọng. Vì thế, tôi cố kìm nén cảm giác muốn ôm chầm lấy sự đáng yêu, dũng cảm ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「サイズに気が行ってしまったか？\n雑誌をみなで見ていたときに、僕が褒めた下着には…」
1140 = "「Em đã để ý đến kích cỡ sao? Bộ đồ lót mà anh khen lúc mọi người cùng xem tạp chí...」"
# 【ハチロク】
# display as 鈴
# JP: 「はい、左様でございます。\nわたくしに合う小柄用の物は、残念ながら無かったので」
1344 = "「Vâng, đúng là vậy ạ. Thật đáng tiếc là không có loại dành cho người nhỏ nhắn vừa với em」"
# 【双鉄】
# display as 雙鐵
# JP: 「似たデザインで、お前にも合うサイズをと――\nそればかりに気を取られ、慣れぬネットで必死に探し」
1400 = "「Thiết kế tương tự, và kích cỡ vừa với em—— Chỉ mải chú ý đến điều đó, em đã liều mạng tìm kiếm trên mạng internet không quen thuộc」"
# 【ハチロク】
# display as 鈴
# JP: 「『やっと見つけ出しました！』と、その喜びで\n細部をわたくし、確認しないで申込みをしてしまって」
1379 = "「'Cuối cùng cũng tìm thấy rồi!', với niềm vui sướng đó em đã không kiểm tra chi tiết mà đăng ký mua luôn」"
# monologue
# JP: ちりんと、再び鈴がなる。\n首から頭の上の耳へと、すずは細い指を滑らせる。
1812 = "Leng keng, tiếng chuông lại vang lên. Suzu trượt ngón tay thon thả từ cổ lên đôi tai trên đỉnh đầu."
# 【ハチロク】
# display as 鈴
# JP: 「荷物が届いて、嬉しくて……ついつい中身を確認せずに、\n試着を始めてしまったのです」
1416 = "「Hàng được giao đến, em vui quá......thế là không kiểm tra bên trong mà đã bắt đầu mặc thử」"
# 【双鉄】
# display as 雙鐵
# JP: 「試着の途中で、ネコミミと鈴に気づいたわけか」
1387 = "「Và giữa chừng mặc thử, em mới nhận ra tai mèo và chuông sao」"
# 【ハチロク】
# display as 鈴
# JP: 「はい……ブラジャアから身につけたのが敗因です。\nせめて最初に、パンツを手にとっていたのなら……」
1342 = "「Vâng......mặc áo lót trước là nguyên nhân thất bại. Ít nhất nếu ban đầu em cầm quần lót lên thì......」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。その格好でいる事情はわかった」
1156 = "「Ra vậy. Anh hiểu lý do em ở trong bộ dạng đó rồi」"
# monologue
# JP: 大変かわいい失敗な上、結果オーライとしか思えんのだが、\nすずは思いつめた顔をしていた。ゆえ――
1599 = "Một thất bại vô cùng đáng yêu, hơn nữa kết quả lại tốt đẹp, nhưng Suzu lại làm vẻ mặt trầm ngâm. Thế nên——"
# 【双鉄】
# display as 雙鐵
# JP: 「で、僕に聞きたいこととは、一体何だ？」
1390 = "「Vậy, rốt cuộc em muốn hỏi anh chuyện gì?」"
# 【ハチロク】
# display as 鈴
# JP: 「はい」
1383 = "「Vâng」"
# monologue
# JP: ほっとした顔。話を戻して大正解だ。\nあまりに可愛らしい故、すぐにも押し倒したくもあるが。
1658 = "Khuôn mặt nhẹ nhõm. Đưa câu chuyện trở lại là một quyết định hoàn toàn chính xác. Vì quá đáng yêu, nên tôi cũng muốn đè em ấy ra ngay lập tức."
# 【ハチロク】
# display as 鈴
# JP: 「下着で……しかも、肌に触れさせてしまったものは……\n返品、きっとできませんよね？」
1447 = "「Đồ lót......hơn nữa, lại là thứ đã chạm vào da thịt...... Chắc chắn không thể trả lại được đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「返品するなら、僕が買い取る」
1336 = "「Nếu trả lại thì anh sẽ mua lại」"
# 【ハチロク】
# display as 鈴
# JP: 「ひえっ！？　えっ！？　買い取る？\n……お買取になられて――双鉄さまが、これを？」
1275 = "「Hie!? Hả!? Mua lại? ......Ngài mua lại——ngài Soutetsu, thứ này sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おいおい、僕が身につけてどうするというのだ」
1294 = "「Này này, anh mặc vào thì làm được gì chứ」"
# 【ハチロク】
# display as 鈴
# JP: 「どうなさるもなにも――」
1358 = "「Làm gì là sao——」"
# monologue
# JP: すずの瞳が一瞬細まる。\n弄ぶべきネズミを見つけたネコそのものであるかのように。
1808 = "Đôi mắt Suzu nheo lại trong tích tắc. Cứ như một chú mèo tìm thấy con chuột để đùa giỡn vậy."
# 【ハチロク】
# display as 鈴
# JP: 「大変、素敵でございましょう？」
1367 = "「Chắc chắn là, rất tuyệt đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1207 = "「!?」"
# monologue
# JP: 冗談を言っている目ではない。着せるつもりだ。\n理解は冷や汗を吹き出させ、脳は全力で稼働する
1656 = "Đó không phải là ánh mắt đang nói đùa. Em ấy định bắt tôi mặc thật. Sự hiểu ra khiến tôi toát mồ hôi lạnh, não bộ hoạt động hết công suất."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　だな！　これはこれで大変に素敵なのだ」
1313 = "「Ừm! Đúng vậy! Thế này cũng rất tuyệt mà」"
# 【ハチロク】
# display as 鈴
# JP: 「で！　ございますよね！！」
1362 = "「Đúng! Là vậy nhỉ!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや！　僕がではなくすずが着ている状態がだ！\nゆえ、僕が買取り、すずにプレゼントしようかと」
1112 = "「Không! Ý anh là trạng thái Suzu đang mặc cơ! Thế nên, anh định mua lại và tặng nó cho Suzu」"
# 【ハチロク】
# display as 鈴
# JP: 「え？　わたくしに……プレゼント？…………あ！\nあ……あーあーあー！　いやだ、もう、わたくしったら」
1245 = "「Hả? Tặng......cho em?............A! A......a a a! Thôi đi, trời ạ, em thật là」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかってもらえればそれでいい」
1141 = "「Em hiểu là tốt rồi」"
# monologue
# JP: 大きな危機を、恐らく脱した。\n妙な緊張がふうっと抜ける。
1753 = "Có lẽ đã thoát khỏi một cuộc khủng hoảng lớn. Sự căng thẳng kỳ lạ vụt tan biến."
# 【ハチロク】
# display as 鈴
# JP: 「と申しますか、お買い取りいただく必要はございません。\n双鉄さまのお気に召すなら、もちろんこのまま。けど…」
1364 = "「Nói sao nhỉ, ngài không cần phải mua lại đâu ạ. Nếu ngài Soutetsu thích, tất nhiên cứ để thế này. Nhưng mà...」"
# monologue
# JP: ちろりと、すずが上目遣いに僕をみる。\n甘えるように、あるいは何かを、試すみたいに。
1802 = "Suzu liếc mắt nhìn tôi. Như đang nũng nịu, hay như đang thử thách điều gì đó."
# 【ハチロク】
# display as 鈴
# JP: 「あの雑誌の、大人っぽい下着とは大違いですよ？」
1178 = "「Nó khác xa với bộ đồ lót trưởng thành trên tạp chí đó nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なに。あの雑誌の下着に寄せたいのなら、\nそのネコミミと鈴とを外してしまえばいいのだ」
1457 = "「Gì chứ. Nếu muốn giống bộ đồ lót trên tạp chí đó, thì cứ tháo tai mèo và chuông ra là được mà」"
# 【ハチロク】
# display as 鈴
# JP: 「わたくしも、それは考えたのです。\nですけれど――」
1372 = "「Em cũng đã nghĩ đến chuyện đó. Thế nhưng——」"
# monologue
# JP: （ぴょこん）
1972 = "（Bật ra）"
# 【双鉄】
# display as 雙鐵
# JP: 「しっぽか！！！！」
1455 = "「Cả đuôi nữa sao!!!!」"
# monologue
# JP: ネコミミと鈴と胸元に意識の全てを奪われて、\nすずが揺らしてくれるまで、まったく見えていなかった。
1710 = "Bị tai mèo, chuông và khuôn ngực cướp đi toàn bộ sự chú ý, cho đến khi Suzu lắc lư, tôi hoàn toàn không nhìn thấy nó."
# 【ハチロク】
# display as 鈴
# JP: 「はい。おしっぽです。しかもこれ、\nガッチリ縫い止められていて、外せないのでございます」
1343 = "「Vâng. Là đuôi ạ. Hơn nữa cái này, được khâu chặt lắm, không thể tháo ra được ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1323 = "「Hừm」"
# 【ハチロク】
# display as 鈴
# JP: 「ですので、例えお耳と鈴を外してみても、\n大人っぽい気品とは、遠く離れてしまっていて」
1393 = "「Vì thế, cho dù có thử tháo tai và chuông ra, thì nó cũng khác xa với khí chất trưởng thành」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1111 = "「Không」"
# monologue
# JP: 繋がった。ネコミミのまま。その上ですずの意向を尊重し\nすずを傷つけず満足させてセックスに至る、その道筋が。
1732 = "Đã kết nối được rồi. Giữ nguyên tai mèo. Trên cơ sở tôn trọng ý muốn của Suzu, làm Suzu thỏa mãn mà không làm tổn thương em ấy và tiến tới ân ái, con đường đó."
# 【双鉄】
# display as 雙鐵
# JP: 「ネコミミと鈴としっぽと、大人っぽい気品と魅力。\nその全てを共存させる方法ならある」
1454 = "「Tai mèo, chuông, đuôi, và khí chất, sức quyến rũ trưởng thành. Có cách để tất cả những thứ đó cùng tồn tại」"
# 【ハチロク】
# display as 鈴
# JP: 「！！？　そのような方法があるのですね？\nさすがは双鉄さまです。わたくし、まったく気づけずに」
1231 = "「!!? Có cách như vậy sao ạ? Quả không hổ danh là ngài Soutetsu. Em, hoàn toàn không nhận ra」"
# 【双鉄】
# display as 雙鐵
# JP: 「例えば――そうだな、大人のシャム猫。\n落ち着いてのんびりしている姿には、気品があろう？」
1421 = "「Ví dụ——đúng rồi, một cô mèo Xiêm trưởng thành. Dáng vẻ điềm tĩnh, thong thả chẳng phải rất có khí chất sao?」"
# 【ハチロク】
# display as 鈴
# JP: 「え？　ええと……。はい、左様ですね。\n落ち着いた綺麗なネコには、優美さと気品を感じます」
1247 = "「Hả? Ờm....... Vâng, đúng vậy nhỉ. Một cô mèo xinh đẹp, điềm tĩnh, mang lại cảm giác thanh lịch và khí chất」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、お前もそれに習えばいい。すなわち。\nその下着を身に着けている時は、ネコとして振る舞えば」
1458 = "「Nếu vậy, em cũng học theo là được. Tức là. Khi mặc bộ đồ lót đó, hãy cư xử như một con mèo」"
# 【ハチロク】
# display as 鈴
# JP: 「ネコとして……ふるまう…………」
1406 = "「Cư xử......như một con mèo............」"
# monologue
# JP: ぴたりと、すずが止まってしまう。
1783 = "Suzu đột nhiên khựng lại."
# 【ハチロク】
# display as 鈴
# JP: 「わたくし――狐と雀とには多少親しんでおりますが、\nネコのことは、さほどくわしくございませんので……」
1180 = "「Em——tuy có phần thân thiết với cáo và chim sẻ, nhưng về mèo thì em không rành lắm......」"
# 【双鉄】
# display as 雙鐵
# JP: 「ネコの気品とは、すなわち、媚びぬ気品だ」
1394 = "「Khí chất của mèo, tức là, khí chất không xu nịnh」"
# 【ハチロク】
# display as 鈴
# JP: 「媚びぬ――媚びない気品、でございますか？」
1403 = "「Không xu nịnh——khí chất không xu nịnh, sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「人間に媚びず、言うことを聞かず、気ままに振る舞う。\nであるが故、気まぐれに甘えられるとひときわ可愛い」
1119 = "「Không xu nịnh con người, không nghe lời, cư xử tùy hứng. Chính vì thế, khi nũng nịu tùy hứng lại càng đáng yêu hơn」"
# 【ハチロク】
# display as 鈴
# JP: 「言いうことを聞かず、気ままに振る舞う。\n気まぐれに――それが可愛らしさにつながる……」
1116 = "「Không nghe lời, cư xử tùy hứng. Tùy hứng——điều đó dẫn đến sự đáng yêu......」"
# monologue
# JP: すずは可愛く小首をかしげ、
1803 = "Suzu đáng yêu nghiêng đầu,"
# 【ハチロク】
# display as 鈴
# JP: 「にゃん？」
1300 = "「Nyan?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！！！！」
1254 = "「!!!!」"
# 【ハチロク】
# display as 鈴
# JP: 「にゃにゃ！？」
1298 = "「Nyanya!?」"
# monologue
# JP: 反応した。心も体も全力で。\n不意打ちの、あまりの可愛らし――っ！？
1757 = "Đã phản ứng lại. Cả trái tim và cơ thể dốc toàn lực. Sự tấn công bất ngờ, quá đỗi đáng yêu——!?"
# monologue
# JP: （むぎゅっ）
1907 = "（Xoẹt）"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま。これは何にゃあ？」
1484 = "「Ngài Soutetsu. Cái này là gì nya?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ――」
1255 = "「A——」"
# monologue
# JP: ごく無造作に――というより雑に。ネコらしく。\nすずはジッパーを引き下ろし、僕の勃起を外へ出す。
1644 = "Vô cùng tự nhiên——hay nói đúng hơn là cẩu thả. Giống như một con mèo. Suzu kéo khóa quần xuống, lôi sự cương cứng của tôi ra ngoài."
# 【ハチロク】
# display as 鈴
# JP: 「にゃんでいきなり、\nこんなにおっきくしちゃってるにゃあ？」
1360 = "「Sao tự nhiên lại to thế này nya?」"
# monologue
# JP: これはかわいい。あのすずが懸命にネコになりきろうとし、\nしかも相当上手にミッションを達成してくれている。
1654 = "Thật đáng yêu. Suzu ấy đang cố gắng hết sức để trở thành một con mèo, hơn nữa còn hoàn thành nhiệm vụ một cách vô cùng xuất sắc."
# monologue
# JP: （大人らしい優美さとは、却って離れてしまったが――）
1985 = "（Mặc dù lại khác xa với sự thanh lịch của người trưởng thành——）"
# monologue
# JP: そこを指摘してこのひとときを打ち崩すほど愚かでない。\nすずがネコなら、その愛らしさと思う存分戯れるまでだ。
1771 = "Tôi không ngu ngốc đến mức chỉ ra điều đó và phá hỏng khoảnh khắc này. Nếu Suzu là mèo, tôi sẽ đùa giỡn với sự đáng yêu đó cho đến khi thỏa mãn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕が勃起をした理由なら決まりきってる。\nすずがあまりに愛らしく、愛おしく美しくあるからだ」
1420 = "「Lý do anh cương cứng thì đã rõ ràng rồi. Là vì Suzu quá đỗi đáng yêu, quá đỗi yêu kiều và xinh đẹp」"
# 【ハチロク】
# display as 鈴
# JP: 「にゃん」
1295 = "「Nyan」"
# monologue
# JP: うれしげに語尾を弾ませて、\nすずは甘えてすりすりと、その鼻先を僕の胸へと――
1615 = "Đuôi câu vui sướng nảy lên, Suzu nũng nịu cọ cọ mũi vào ngực tôi——"
# 【ハチロク】
# display as 鈴
# JP: 「ぺろっ」
1492 = "「Liếm」"
# 【双鉄】
# display as 雙鐵
# JP: 「あぅっ」
1268 = "「Au」"
# monologue
# JP: 舐められ、声を漏らしてしまう。\nすずの瞳が、にやーっと細まる。
1626 = "Bị liếm, tôi bật ra tiếng kêu. Đôi mắt Suzu nheo lại cười gian xảo."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さま、だらしないお顔かわいいにゃあ。\nにゃんだかもっと、ペロペロしたくなっちゃうにゃあ」
1483 = "「Khuôn mặt buông thả của ngài Soutetsu đáng yêu quá nya. Tự nhiên lại muốn liếm láp nhiều hơn nữa nya」"
# monologue
# JP: あーんと大きく口を開いて、\n唾液でもはやテラテラになってる舌先を僕に見せつける。
1784 = "Há miệng thật to, khoe cho tôi thấy đầu lưỡi đã ướt sũng nước bọt."
# 【ハチロク】
# display as 鈴
# JP: 「ちゅっ――ちゅむっ――ちゅっ――ぺろっ――\nれろっ――ちゅうっ――れろっ――れるっ」
1281 = "「Chụt——chụt——chụt——liếm—— liếm——chụt——liếm——liếm」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ふぁ――」
1262 = "「A——ha——」"
# monologue
# JP: すずは舌先と唇で、僕を丹念に愛撫していく。\n僕の胸にまだまざまざ残る、”あの日の事故”の[きずあと]痕を。
1649 = "Suzu dùng đầu lưỡi và đôi môi âu yếm tôi một cách tỉ mỉ. Ngay cả vết sẹo của \"vụ tai nạn ngày hôm đó\" vẫn còn in hằn trên ngực tôi."
# 【ハチロク】
# display as 鈴
# JP: 「ぺろっ――ぺりゅっ――ぬろっ――ちゅっ――\nぺろっ――ちゅるっ――ちゅうっ――れりゅっ――」
1411 = "「Liếm——liếm——liếm——chụt—— liếm——chụt——chụt——liếm——」"
# 【双鉄】
# display as 雙鐵
# JP: 「すず……すず――」
1464 = "「Suzu......Suzu——」"
# monologue
# JP: それが嬉しい。ネコになるきることにより、\n普段は瞳さえ逸しがちな、傷痕をも愛してくれることが。
1660 = "Điều đó khiến tôi hạnh phúc. Nhờ hóa thân thành mèo, em ấy yêu thương cả vết sẹo mà bình thường hay lảng tránh ánh nhìn."
# 【双鉄】
# display as 雙鐵
# JP: 「その調子だ、すず――\nもっと気ままに――もっと自由に」
1470 = "「Cứ thế đi, Suzu—— Tùy hứng hơn nữa——tự do hơn nữa」"
# 【ハチロク】
# display as 鈴
# JP: 「ん……れろっ――ぺるっ――ぺろっ――ちゅるっ――\nちゅるっ――ちゅっ――れろっ――かぷっ！」
1306 = "「Ưm......liếm——liếm——liếm——chụt—— chụt——chụt——liếm——ngoạm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うぁっ！」
1302 = "「Ua!」"
# monologue
# JP: 軽く噛まれて気持ちよすぎて、かなり大きな声が出て。\nすずはちゅぱっと唇を話し、嬉しげな目で僕をみる。
1612 = "Bị cắn nhẹ quá sướng, tôi bật ra tiếng kêu khá lớn. Suzu chu môi chụt một cái, nhìn tôi bằng ánh mắt vui sướng."
# 【ハチロク】
# display as 鈴
# JP: 「んふふっ。かわいいかわいい甘えっ子の双鉄さまのこと。\nすずがもーっと、たくさん可愛がってあげますねにゃあ」
1318 = "「Ư hừ hừ. Ngài Soutetsu bé bỏng nũng nịu đáng yêu quá đi. Suzu sẽ yêu thương ngài nhiều thật nhiều nha nya」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ」
1236 = "「Hừ hừ」"
# monologue
# JP: 素顔のすずが出かけて慌ててネコの影へとに隠れた。\n嬉しさが、愛おしさが。その瞬間に何百倍にも
1801 = "Khuôn mặt thật của Suzu ló ra rồi vội vàng trốn sau bóng dáng con mèo. Niềm vui sướng, sự yêu thương. Trong khoảnh khắc đó tăng lên gấp trăm lần"
# 【ハチロク】
# display as 鈴
# JP: 「にゃっ！」
1299 = "「Nya!」"
# monologue
# JP: （しゅこんっ！！！！）
1945 = "（Nắm chặt!!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅぉっっ」
1251 = "「Uo」"
# 【ハチロク】
# display as 鈴
# JP: 「ちゅむっ――ちゅううううっ」
1285 = "「Chụt——chụttttt」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁぁっ――」
1269 = "「Aaaa——」"
# monologue
# JP: すずの小さな手が筒になり、いつもの力で、\nいつもの温度で、けれどいつもとまるで違った感触で――
1800 = "Bàn tay nhỏ bé của Suzu cuộn lại thành hình ống, với lực đạo như mọi khi, với nhiệt độ như mọi khi, nhưng lại mang đến cảm giác hoàn toàn khác biệt——"
# monologue
# JP: （しこっ――しこっ――しゅこっ――しゅこっ――）
1975 = "（Xoa nắn——xoa nắn——vuốt ve——vuốt ve——）"
# 【双鉄】
# display as 雙鐵
# JP: 「手袋……手袋一枚で、これほど違う――\n違った感触がするものなのか――」
1397 = "「Găng tay......chỉ một chiếc găng tay, mà lại mang đến cảm giác khác biệt—— khác biệt đến thế này sao——」"
# monologue
# JP: （しこ――しこっ――しゅっ、しゅっ――しこ――しこ）
1976 = "（Xoa——xoa——vuốt, vuốt——xoa——xoa）"
# monologue
# JP: 密着感とぬらつきがなく、\nなめらかにフィットしてくる肌触りがある。
1746 = "Không có cảm giác dính chặt và ướt át, thay vào đó là cảm giác mượt mà ôm sát lấy làn da."
# 【ハチロク】
# display as 鈴
# JP: 「ちゅぱっ――ちゅっ――ちゅうううううっ」
1289 = "「Chụt——chụt——chụttttt」"
# 【双鉄】
# display as 雙鐵
# JP: 「くぁっ」
1301 = "「Kua」"
# monologue
# JP: （しゅっ！　しこっ！　しにゅっ！　しゅこんっ！！）
1899 = "（Vuốt! Xoa nắn! Tuốt lượn! Vuốt ve!!）"
# 【ハチロク】
# display as 鈴
# JP: 「ちゅるっ――ちゅっ――ちゅっ――ちゅぱっ――\nちゅうっ――ちゅうっ――ちゅうっ――ちゅうっ」
1292 = "「Chụt——chụt——chụt——chụt—— chụt——chụt——chụt——chụt」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ……ぁ……」
1260 = "「A......a......」"
# monologue
# JP: 乳首、乳首に吸い付かれてる。\nすずがあたかも赤子のように、僕の乳首をねぶっている。
1647 = "Nhũ hoa, nhũ hoa đang bị mút mát. Suzu đang bú nhũ hoa của tôi hệt như một đứa trẻ sơ sinh."
# 【ハチロク】
# display as 鈴
# JP: 「ちゅうっ――ちゅうっ――れるっ――ちゅうっ――\nちゅむっ――れるっ――ちゅむっ――れりゅんっ！」
1278 = "「Chụt——chụt——liếm——chụt—— chụt——liếm——chụt——liếm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぁっ！」
# 1302 = "「嗚哇！」" 
# monologue
# JP: （しこっ！　しこっ！　しこっ！　しこっ！\nしこっ！　しこっ！　しこっ！　しこっ！！）
1939 = "（Xoa nắn! Xoa nắn! Xoa nắn! Xoa nắn! Xoa nắn! Xoa nắn! Xoa nắn! Xoa nắn!!）"
# monologue
# JP: 乳首を吸われ、乳輪の形を舌でなぞられて――\nそうされながら勃起はしこしこ、規則正しく刺激され――
1640 = "Bị mút nhũ hoa, bị lưỡi vờn quanh quầng vú—— trong lúc đó sự cương cứng vẫn liên tục được kích thích đều đặn——"
# 【ハチロク】
# display as 鈴
# JP: 「ちゅむっ……ちゅっ――ちゅううっ――ちゅーっ――\nちゅっ――ちゅうっ――ちゅむっ――（こくっ）」
1290 = "「Chụt......chụt——chụttttt——chụttttt—— chụt——chụttttt——chụt——（ngậm lấy）」"
# monologue
# JP: （しこっ！　しゅっ！　しゅっ！　しこっ！\nしにゅっ！　ちゅにっ！　にちゅっ！　ぬちちゅっ！）
1943 = "（Xoa nắn! Vuốt! Vuốt! Xoa nắn! Tuốt lượn! Chụt! Chụt! Chụt!）"
# monologue
# JP: 乳首を唾液で蕩かされ、なおもしつこく甘く吸われる。\n僕から溢れた先走り汁が、絹の手袋を汚し―て濡らす。
1583 = "Nhũ hoa bị nước bọt làm cho tan chảy, vẫn tiếp tục bị mút mát ngọt ngào dai dẳng. Dòng dịch nhờn tràn ra từ tôi làm vấy bẩn và ướt đẫm chiếc găng tay lụa."
# monologue
# JP: （こ……れは――ああ――\n僕がすずに――乳を与えているかのようだな）
1982 = "（Cái......này là——aa—— Cứ như thể tôi đang——cho Suzu bú sữa vậy）"
# monologue
# JP: 出るはずもないすずの母乳を吸い求めつつ、\nこうしてすずの小さな手で、導いてもらったこともあった。
1638 = "Vừa đòi bú dòng sữa mẹ không thể nào chảy ra của Suzu, cũng có lúc tôi được bàn tay nhỏ bé của Suzu dẫn dắt như thế này."
# 【ハチロク】
# display as 鈴
# JP: 「ちゅむっ――ちゅっ――ぱくっ――あむっ――\nちゅっ――ちゅううっ――ちゅるっ――ちゅ～～」
1277 = "「Chụt——chụt——ngoạm——a ưm—— chụt——chụttttt——chụt——chụttttt~~」"
# monologue
# JP: （しこっ――しにゅっ――しこっ――にちゅっつ――\nしちゅっ――ぬこっ――にちゅっ――しにゅっ――）
1974 = "（Xoa nắn——tuốt lượn——xoa nắn——chụt—— chụt——vuốt ve——chụt——tuốt lượn——）"
# monologue
# JP: 唇を使い乳首を刺激し、すずもまるきり乳を求める動きだ。\nその分わずかに、手のほうがおろそかになっている。
1637 = "Dùng môi kích thích nhũ hoa, chuyển động của Suzu hoàn toàn là đang đòi sữa. Đổi lại, bàn tay có chút lơ là hơn."
# monologue
# JP: （いや、ここが潮時か――授乳手コキならばまだしも……\nいうなれば与乳手コキで達してしまうというのはどうも）
1901 = "（Không, đến lúc rồi sao——Nếu là dùng tay sóc lọ cho con bú thì còn đỡ...... Nhưng nói cách khác, việc đạt cực khoái nhờ cho bú bằng tay thì hơi）"
# 【ハチロク】
# display as 鈴
# JP: 「ちゅむっ――ちゅうっ――ちゅるっ――ちゅっ――\nちゅむっ――れろっ――れるうっ――ちゅうう～～」
1283 = "「Chụt——chụttttt——chụt——chụt—— chụt——liếm——liếm——chụttttt~~」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1203 = "「っ!」"
# monologue
