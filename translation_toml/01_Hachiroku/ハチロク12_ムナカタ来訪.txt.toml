[script]
# lines: 530 
# monologue
# JP: ホームについた列車から、大柄な男が降りてくる。
2531 = "列車進站停靠，從上面走下一位身材高大的男性。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタっ！！！」
1834 = "「宗方！！！」" 

# monologue
# JP: 途端、オリヴィが駆けていく。
2639 = "奧莉薇立即衝了上去。" 

# monologue
# JP: 飼い主を見つけた迷子の子犬がそうするように、一直線に、\n満面の笑顔を輝かせながら。
2647 = "她滿面笑容，徑直朝向宗方撲了過去，活像一隻走丟的小狗發現了自己的主人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……強いな、オリヴィは」
1150 = "「……奧莉薇可真堅強」" 

# monologue
# JP: 見ているだけのこちらの胸さえ傷んだほどの……\n実質的には、置き去り同然の別れ方をし。
2801 = "想想不久之前她幾乎等於是被宗方所拋棄，那時她的慟哭可是令我們都心痛不已……" 

# monologue
# JP: あれほど泣いて、落ち込み、拗ねて――
3032 = "那淚雨滂沱，低落消沉，任性執拗都還歷歷在目——" 

# 【双鉄】
# display as 雙鐵
# JP: 「にもかかわらず、か」
1640 = "「可重逢之際她卻依然是這般興奮」" 

# 【ハチロク】
# display as 八六
# JP: 「……だからこそ、なのかもしれません」
1163 = "「……或許正是因為，發生了那麼多事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1722 = "「嗯」" 

# monologue
# JP: すず――いや、ハチロクもおなじことを考えていた。\nしかも僕より、さらに深く。
3034 = "鈴——不，此時她是八六——也懷著與我相同的想法，並且比我更加深思熟慮。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。だからこそ、か」
2020 = "「正因如此，也對」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。オリヴィちゃんがああ振る舞わねば、\nしこりはずっと、残り続けてしまいましょうから」
1727 = "「嗯，如果她不採取那樣的態度，只會讓彼此一直藕斷絲連」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だからこそ、オリヴィは全てを忘れ喜ぶのだな。\n宗方\x%l機関士;#00ffc040;機関士%l;#;と――わだかまりなく話したいから」
2022 = "「正因為這樣，她才會選擇放下一切坦率地表達自己的喜悅，只因為想要和宗方\\x%l機関士;#00ffc040;司機%l;#;像曾經一樣友好相處」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
1696 = "「啊！」" 

# monologue
# JP: 根負けした――と言わんばかりに、\n宗方\x%l機関士;#00ffc040;機関士%l;#;が歩みを止める。
2666 = "宗方\\x%l機関士;#00ffc040;司機%l;#;面對一直在腳邊抱著他嬉鬧的奧莉薇，也像是放棄抵抗一般停下了腳步。" 

# monologue
# JP: 足元にじゃれつきつづけるオリヴィの帽子に、\n無造作に、その分厚い手がぼふ、と置かれる。
2556 = "只見他伸出厚厚的大手，一下放在了奧莉薇的帽子上。" 

# 【宗方】
# display as 宗方
# JP: 「[おんてつ,1]御鉄さんで、よくしてもらっているようだな」
2058 = "「看來你在御鐵這邊過得很好」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「～～～っ！　うんっ！！！」
1690 = "「唔～～～！嗯！！！」" 

# monologue
# JP: 無愛想な短い言葉。\nおもいっきりに深い頷き。
2489 = "他看似冰冷的短短一句話，卻引得奧莉薇全力點頭以表肯定。" 

# monologue
# JP: ただそれだけで、空気が一気に晴れ渡る。\n光がぱっと差し込むように、周囲の全てがあたたかになる。
2553 = "只是這簡單的一幕，便讓周圍轉眼間布滿溫情，彷彿被撒上一片陽光一般，讓一切都顯得如此溫馨。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「みんな、とっても良くしてくれる！\nそれにねっ」
1774 = "「大家都待奧莉薇很好！還有就是——」" 

# 【宗方】
# display as 宗方
# JP: 「ああ、右田\x%l機関士;#00ffc040;機関士%l;#;。\nお久しぶり――というほどでもないか」
1754 = "「噢，右田\\x%l機関士;#00ffc040;司機%l;#;，久違久違——好像也算不上」" 

# monologue
# JP: が――宗方\x%l機関士;#00ffc040;機関士%l;#;は僕らの姿を認めるなり、\nスタスタこちらに近づいてくる。
2563 = "可是宗方\\x%l機関士;#00ffc040;司機%l;#;一看見我們，便立刻快步朝我們走來。" 

# monologue
# JP: オリヴィも慌てて口をつぐんで、\nけれど気にした風もなく、その足取りをパタパタと追う。
2622 = "奧莉薇也連忙閉上嘴跟了過來，但似乎也並未對他的態度感到失落。" 

# 【双鉄】
# display as 雙鐵
# JP: 「遠路はるばるありがとうございます。宗方\x%l機関士;#00ffc040;機関士%l;#;。\n[はやと,1]早戸までお迎えにあがろうと思っていたのですが――」
1826 = "「宗方\\x%l機関士;#00ffc040;司機%l;#;，感謝您不辭辛苦遠道而來，我們原想前往隼人迎接」" 

# 【宗方】
# display as 宗方
# JP: 「いや、問題の地点を[せんけん,1]線見したくもあったし、\n話をもらった……別件というか、関連というか」
2040 = "「無需勞煩，我也想親自對有問題的地方踏查一番。另外你們找我商談的另一件事……或者該說與此事不無關係」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい、保線専門会社の件ですね。急な話で恐縮でしたが、\n前向きなご検討をいただけているようで、何よりです」
1732 = "「嗯，是關於專業巡線公司一事是嗎，唐突提議不勝惶恐，看您似乎並不反對，自是感激不盡」" 

# 【宗方】
# display as 宗方
# JP: 「率直にいって、興味深く思っている。\n詳しく話を聞きたいと」
1840 = "「實話講來，我也頗感興趣，於是也想進一步了解其內容」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご説明の準備は出来ているかと思います。\nよろしければ、こちらへ」
1919 = "「我們也已做好準備為您介紹詳情，若無不便之處，請讓我們帶路」" 

# 【宗方】
# display as 宗方
# JP: 「ああ」
1796 = "「好」" 

# monologue
# JP: 僕が先頭、隣にハチロク。
2814 = "我和八六並肩走在最前面。" 

# monologue
# JP: 続いて宗方\x%l機関士;#00ffc040;機関士%l;#;で、\nその周辺をまたちょこちょこと――
2525 = "其後是宗方\\x%l機関士;#00ffc040;司機%l;#;，以及圍著他轉來轉去的——" 

# 【宗方】
# display as 宗方
# JP: 「オリヴィ――っと、いや。\nすまん、すみません、右田\x%l機関士;#00ffc040;機関士%l;#;」
1786 = "「奧莉薇——啊，不了，這個，右田\\x%l機関士;#00ffc040;司機%l;#;，請容我問個問題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい。なんでしょう」
1925 = "「我在，您請講」" 

# monologue
# JP: 振り返り見れば、\n宗方\x%l機関士;#00ffc040;機関士%l;#;が困ったような顔をしている。
2826 = "我轉過身看去，宗方\\x%l機関士;#00ffc040;司機%l;#;顯得有些不知所措。" 

# monologue
# JP: オリヴィがなにかしたのかと一瞬思うが、\nどうにも……そんな様子でもない。
2819 = "我最先以為是奧莉薇的舉動有什麼問題，可是看起來……似乎並不是因為這個。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1739 = "「嗯？」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま。旧帝鉄では、経営レベルの会議にはまず、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は同席いたしませんので」
2252 = "「雙鐵少爺，按照前帝國鐵路的慣例，在攸關營運方針的重要會議上，是不會讓\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;出席的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1751 = "「噢」" 

# monologue
# JP: ゆえ、宗方\x%l機関士;#00ffc040;機関士%l;#;はオリヴィの同席を止めようとして、\nしかし、オリヴィの今の所属を思い出した。
2835 = "所以宗方\\x%l機関士;#00ffc040;司機%l;#;應該原本是想攔下奧莉薇，但又突然意識到奧莉薇現在不歸自己調遣。" 

# monologue
# JP: そこで僕に、というわけか――
2839 = "所以就要徵求我的意見是嗎。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご配慮ありがとうございます。ですが、今回の会議には、\nオリヴィにもハチロクにも同席してもらいます」
1909 = "「感謝您如此關懷備至，只是本次會議，也需要奧莉薇和八六出席」" 

# 【宗方】
# display as 宗方
# JP: 「これも？\n御社のトップナンバー・レイロオドはともかくとして」
1606 = "「包括奧莉薇？只是貴公司的首車鐵路人偶的話倒還不難理解」" 

# monologue
# JP: 心底、驚いているような声。\n文化の違いとはこういうことかと、つくづく思う。
2486 = "他明顯非常吃驚，也令我再一次認識到彼此在文化與認識方面的差異。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道は、オリヴィの蓄積してきた知識を\n積極的に活用したいと考えていますので」
1760 = "「因為我們御一夜鐵路，打算積極運用奧莉薇積攢至今的豐富知識」" 

# 【宗方】
# display as 宗方
# JP: 「蓄積？」
2070 = "「積攢至今？」" 

# monologue
# JP: 戸惑ったように動いた視線は、\nけれどもすぐに、ふっと落ち着きの色を帯びる。
2743 = "宗方司機起初依然表現得十分困惑，但他也很快平靜下來並表示理解。" 

# 【宗方】
# display as 宗方
# JP: 「ああ、そうか。\n車歴なら百年を越えているのか」
1715 = "「啊，是這個意思，按說其車齡也達百年之上」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよだよ！　オリヴィ！\nハチロクよりもベテランなんだからっ！」
1860 = "「就是呀～！　奧莉薇可比八六的資歷還要老呢！」" 

# 【宗方】
# display as 宗方
# JP: 「……\x%lレイルロオド;#00ffc040;レイルロオド%l;#;など、\n普通は二、三十年で解体されるものだ」
1139 = "「……一般來說，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;都是使用二三十年便要拆解」" 

# monologue
# JP: そのまままじまじ、\n宗方\x%l機関士;#00ffc040;機関士%l;#;はオリヴィの顔を見つめる。
2664 = "宗方\\x%l機関士;#00ffc040;司機%l;#;說罷，便開始端詳奧莉薇的臉龐。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふあっ！」
1665 = "「呃啊！」" 

# monologue
# JP: 途端、オリヴィは視線をそらして、\nひどくもじもじし始める。
2642 = "奧莉薇見狀立刻撇開視線，其舉動變得尤為忸怩。" 

# 【宗方】
# display as 宗方
# JP: 「……\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の車歴など気にもしなかったが――\nそうか。言われてみれば、百年以上の蓄積か」
1159 = "「……我倒是從未關注\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的車齡，不過如此說來，它確實積攢了百年以上的經驗」" 

# monologue
# JP: （ぼふっ）
2902 = "然後——" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！！」
1689 = "「唔！！！」" 

# monologue
# JP: もう一度、さっきよりすこし乱暴に、\nオリヴィの帽子の上に、分厚い手のひらが乗せられる。
2482 = "他再一次將厚重的手掌置於奧莉薇的帽子上，動作相比剛才更顯粗魯幾分。" 

# 【ハチロク】
# display as 八六
# JP: 「……この上ない賞賛、でございますね」
1169 = "「……這對她真是至高無上的褒獎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1849 = "「對」" 

# monologue
# JP: 『お前も大したものだったのだな』\n――そんな言葉が、語られぬままに伝わってくる。
2899 = "無需明言，從如此簡單一個動作便能知曉，他是在肯定奧莉薇的過人之處。" 

# monologue
# JP: オリヴィの顔がどんどん赤く――いや、いかん！\nこのままでは体温を上昇させすぎてしまう。
2635 = "奧莉薇的臉越來越泛紅——不，情況不妙！這樣下去她的體溫會過高的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、そういう事情ですので」
2078 = "「總之事情就是這樣」" 

# 【宗方】
# display as 宗方
# JP: 「承知した。\nいや、余計なことで時間を取らせてすまなかった」
1988 = "「明白，這個，抱歉耽誤了時間」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いえ――」
2039 = "「無需介意」" 

# monologue
# JP: 線路を渡り、裏口からレールショップに入っていけば――
2809 = "我們來到鐵軌另一側，從後門進入鐵路商店——" 

# 【ポーレット】
# display as 波萊特
# JP: 「宗方\x%l機関士;#00ffc040;機関士%l;#;、ようこそいらっしゃいました」
1827 = "「宗方\\x%l機関士;#00ffc040;司機%l;#;，真誠歡迎您的光臨」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、御一夜鉄道へようこそですよぉ」
1746 = "「嘻嘻，歡迎來到御一夜鐵路」" 

# 【稀咲】
# display as 稀咲
# JP: 「コーヒーと紅茶、どちらがお好みですか？」
2137 = "「請問您是喜歡喝咖啡還是紅茶？」" 

# 【宗方】
# display as 宗方
# JP: 「ああ――その――恐縮です。\nその、コーヒーの方を」
1661 = "「呃——這個，實屬惶恐，我喝咖啡」" 

# 【稀咲】
# display as 稀咲
# JP: 「よかった！　どうぞ、淹れたてですよ？」
2222 = "「那正好！您請用，剛泡好的」" 

# monologue
# JP: 下にも置かぬもてなしだ。
2469 = "一系列招待實在是再周到不過。" 

# monologue
# JP: ポーレットとれいなの歓迎ならば常のことだが、\nそこに稀咲も加わると、迫力さえをも感じてしまう。
3045 = "雖然波萊特和玲奈用這種歡迎的態度是再常見不過，但是再算上稀咲，甚至能感受到一股不由分說的魄力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうぞ、こちらの席に」
1903 = "「您請這邊坐」" 

# 【宗方】
# display as 宗方
# JP: 「ああ――うむ。あ、いや、ありがとうございます」
1692 = "「啊——嗯，啊，這個，感謝各位」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへ～っ」
1681 = "「哎嘿嘿」" 

# monologue
# JP: それがごくごく当然と、\nオリヴィは宗方\x%l機関士;#00ffc040;機関士%l;#;の隣に座り――
2963 = "而奧莉薇也彷彿理所當然一般，坐在了宗方\\x%l機関士;#00ffc040;司機%l;#;身旁。" 

# monologue
# JP: （ずっ――ずずっ）
3075 = "（拉近，拉近）" 

# monologue
# JP: イスをずらして、ずらして、ずらして、\n距離を少しずつ詰めていく。
2957 = "而且她不斷挪動椅子，一點又一點拉近與他的距離。" 

# 【宗方】
# display as 宗方
# JP: 「ああ……その……こういう空気は慣れんですし、\n保線現場も早く確かめたいので――その、本題を」
1694 = "「啊……這個……我一來不太適應這種氛圍，二來希望能儘早動身查看巡線地點，不知能否儘快進入正題」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。ふふっ、やっぱりお仕事最優先。\nオリヴィちゃんのお話どおりの方ですね」
1799 = "「好的。嘻嘻，果然正如奧莉薇所講，您是將工作放在第一位的」" 

# 【宗方】
# display as 宗方
# JP: 「あ――」
2174 = "「這」" 

# monologue
# JP: ポリっ、と軽く顎を掻き、宗方\x%l機関士;#00ffc040;機関士%l;#;が苦笑する。\nオリヴィの方へ顔を向け。
2662 = "宗方\\x%l機関士;#00ffc040;司機%l;#;不好意思地撓了撓下巴，面露苦笑，再扭頭看向奧莉薇。" 

# 【宗方】
# display as 宗方
# JP: 「っ！！？」
1667 = "「呃！！？」" 

# monologue
# JP: 思わぬ近さに驚いて、\nそうして、ハハハと笑い出す。
2493 = "他被已經近在眼前的奧莉薇嚇了一跳，隨後只好開懷一笑掩飾過去。" 

# 【宗方】
# display as 宗方
# JP: 「それなら、ネコをかぶっても仕方ない。\n俺は、どこにでもいる\x%l保線;#00ffc040;保線%l;#;上がりの\x%l機関士;#00ffc040;機関士%l;#;です」
2212 = "「那我也無需再向各位客套，我只是一介隨處可見的有幾分\\x%l保線;#00ffc040;巡線%l;#;經驗的\\x%l機関士;#00ffc040;司機%l;#;」" 

# 【稀咲】
# display as 稀咲
# JP: 「どこにでもいる、では無いでしょう。保線技術講習会に、\n帝鉄時代からほとんど欠かさず参加してらっしゃるとか」
1848 = "「尋常實屬謙虛，據我聽聞自從帝國鐵路時代，無論規模大小幾乎所有的巡線技術講座，您都未曾缺席」" 

# 【宗方】
# display as 宗方
# JP: 「！」
2185 = "「這！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「み鉄さんでも、保線部の相談役だとお伺いしました。\nどこにでもいる方には、なかなか出来ないことかと」
2083 = "「而且我聽說您在橙鐵就是巡線部門的顧問，若真是尋常司機，恐難擔此任」" 

# 【宗方】
# display as 宗方
# JP: 「……」
1132 = "「……」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！？　オリヴィじゃないよ！\nそこまでクワシク話してないよ！」
1670 = "「咦！！？奧莉薇可沒說過！沒跟大家講這麼細的！」" 

# 【稀咲】
# display as 稀咲
# JP: 「ああ、失礼。自己紹介が遅れてしまいました。\nボクは、隈元銀行御一夜支店長の宝生稀咲です」
1705 = "「啊，不好意思，我還沒做自我介紹。我是隈元銀行御一夜支行行長，名叫寶生稀咲」" 

# 【宗方】
# display as 宗方
# JP: 「あ、これは失礼。俺――自分は宗方[じんろく,1]甚六。\nみかん鉄道\x%l機関士;#00ffc040;機関士%l;#;です」
1708 = "「啊，恕我有失問候，我是宗方甚六，是橙鐵路的機車\\x%l機関士;#00ffc040;司機%l;#;」" 

# monologue
# JP: 稀咲の差し出す名刺は薄紫――\n『銀行だけの肩書』のものだ。
2938 = "稀咲遞出的名片是淡紫色，也就是只代表她銀行一方的身份。" 

# monologue
# JP: ならば今日は、純粋な銀行支店長として、\n銀行のみの利害を重視し、調査をすすめる腹なのだろう。
3033 = "那麼她今天是打算純粹以支行行長的身份，單純從銀行的利益出發，調查情況嗎。" 

# 【稀咲】
# display as 稀咲
# JP: 「本件――保線専門の請負会社の設立計画については、\n当行が主体となって、調査をすすめています」
2243 = "「關於本次議題——成立專業巡線外包公司的計劃，將以我行為主體，調查有關事宜」" 

# 【宗方】
# display as 宗方
# JP: 「“調査”。なるほど」
1124 = "「“調查”嗎，原來是這樣」" 

# monologue
# JP: ――稀咲提案の、保線専門の請負会社。\nその目的は、保線技術・人的資源の集約と最適化だ。
3027 = "這個由稀咲提議發起，專業負責巡線的外包公司，其目的就在於集中巡線技術和相關人力資源，併合理分配。" 

# monologue
# JP: 鉄道各社が保線部門をそれぞれ抱えているよりも、\n専門会社に集中させて運用する方が、効率がいい。
2878 = "比起鐵路公司各自成立部門負責巡線，當然是組建專業公司集中分配人手效率更佳。" 

# 【宗方】
# display as 宗方
# JP: 「しかし、銀行さんがどうしてそんな？」
1634 = "「可是你們銀行又為何要發起這個項目？」" 

# monologue
# JP: 効率化うんぬんについては理解してくれているのだろう。\n宗方さんの質問は、最初から根っこの部分へ向かう。
2921 = "看來宗方先生很快便也理解其中的優勢所在，所以他一開口發問便直奔關鍵。" 

# 【宗方】
# display as 宗方
# JP: 「このご時世、鉄道で儲けるのは厳しいでしょうに」
1979 = "「明明就當下，想憑藉鐵路盈利是無比困難的」" 

# 【稀咲】
# display as 稀咲
# JP: 「確かに。ので御一夜市、御一夜鉄道とヴィジョンを\n共有し、シナジーある展開をと考えている最中です」
1900 = "「您所言不虛，所以此次我行計劃與御一夜市以及御一夜鐵路共同展望前景，通力合作以起到相互促進的作用」" 

# 【宗方】
# display as 宗方
# JP: 「ビジョンを共有する？」
1596 = "「共同展望前景？」" 

# 【稀咲】
# display as 稀咲
# JP: 「そこは、雛衣市長から」
2181 = "「這是雛衣市長提出的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜市がすすめる、“蒸気のふるさと”構想を、\n更に推し進めていこうという発想です」
1847 = "「將目前御一夜市正在開展的“蒸汽之鄉御一夜”計劃，做進一步升級」" 

# 【宗方】
# display as 宗方
# JP: 「と、いうことは――」
2127 = "「言下之意便是」" 

# monologue
# JP: 宗方さんが、また顎をかく。\n考え事をするときのクセなのだろう。
2703 = "宗方先生又撓了撓下巴，這或許是他思考時的習慣。" 

# 【宗方】
# display as 宗方
# JP: 「術仙車両工場だけにとどまらず、\x%l保線;#00ffc040;保線%l;#;についても、\n御一夜回りに集積させ。言うなら“鉄道の御一夜”と？」
1525 = "「不止術仙車輛工廠，也要將\\x%l保線;#00ffc040;巡線%l;#;相關的產業聚集於御一夜周邊，說白了也就是將御一夜打造為“鐵路之都”？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そのとおりです」
1593 = "「先生所言極是」" 

# monologue
# JP: ポーレットの頷きには満足感だけが漂っている。\nオリヴィの話しどおり、そして稀咲の調査どおり。
2894 = "波萊特點了點頭，並且表現得無比滿意，這個態度是針對奧莉薇所言，以及稀咲的調查。" 

# monologue
# JP: 宗方さんは学習意欲が高く、状況把握能力の高い――\n極めて現場向きの、仕事のできる人間だろうと感じられる。
2805 = "我也能感受到，宗方先生的確是認真上進，並且一點就通，非常適合實地工作，能力著實令人佩服。" 

# 【ポーレット】
# display as 波萊特
# JP: 「かつて御一夜は、鉄道の一大\x%lターミナル駅;#00ffc040;ターミナル駅%l;#;でした。\n復線により、その再現を目指していくと同時に」
1886 = "「御一夜曾經也是鐵路的一大\\x%lターミナル駅;#00ffc040;總站%l;#;，我們希望藉恢復廢線這個機會，重現當年風采」" 

# 【れいな】
# display as 玲奈
# JP: 「昔の[こくら,1]粉蔵みたいに、九洲の鉄道ぜぇんぶをお手当できる。\nポーレットは御一夜をそういうふうにしたいんですよぉ」
1658 = "「同時，要讓御一夜像曾經的小倉一樣，能夠撐起整個九州的鐵路，這就是波萊特的願望」" 

# monologue
# JP: 帝鉄文化を知らぬがゆえに、\nいつものように、いつもと全く変わらずに。
2875 = "正因為這裡沒有受到帝國鐵路文化的薰陶，這談話的走向才會如此自然，一如往常。" 

# monologue
# JP: ポーレットの上機嫌につられたれいなが、\nポーレットの言葉の続きをひきとり、つむぐ。
2549 = "受波萊特營造的陽光氣氛帶動，玲奈毫不做作地接過她的話，繼續往下說。" 

# 【ハチロク】
# display as 八六＆奥莉薇
# JP: 「！」\n「れいな」
1687 = "「唔！」\\n「玲奈」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、なんですかぁ？？？」
1734 = "「嗯，有什麼問題嗎？？？」" 

# monologue
# JP: 思わず息を呑むハチロク・オリヴィにも、\nれいなは変わらぬにこにこ顔だ。
2519 = "八六跟奧莉薇紛紛倒吸了一口氣，可玲奈卻依舊是滿面笑容。" 

# 【宗方】
# display as 宗方
# JP: 「[こくら,1]粉蔵のイメージか……粉蔵と比べ、御一夜は物流経路で\nかなりのハンディを背負いそうだが」
1955 = "「打造類似小倉的形象……可是相比小倉，御一夜僅屬於運輸要道，其中差距可想而知」" 

# monologue
# JP: が、宗方さんはれいなの言葉を――御一夜鉄道の文化を、\n少なくとも表面上は、気にせず受け入れてくれている。
2565 = "可是宗方先生對玲奈的發言——對我們御一夜鐵路的文化並沒有表現出排斥，至少表面上他是示以理解的。" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、その通りですね」
1744 = "「嘻嘻，先生言之有理」" 

# monologue
# JP: ポーレットの顔がほころび、稀咲の眉も僅かにあがる。\n見かけによらぬ柔軟性――これは、思わぬ収穫だ。
2893 = "波萊特眉開眼笑，而稀咲的眉頭也微微上揚。所謂人不可貌相，他的通權達變也是令我頗感意外與受用。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですので当初は、実績を積みつつ、\n人的資源のみを集約していくことを、目標とします」
1949 = "「所以我們最初的目標在於集結人力資源，同時穩紮穩打積累口碑」" 

# monologue
# JP: 車両デザイン・改修に関しても\x%l保線;#00ffc040;保線%l;#;に関しても。\n実績を積み、人を集めて、受注する仕事を拡大していく。
2471 = "不管是車輛設計、修復，還是\\x%l保線;#00ffc040;巡線%l;#;，我們都要先建立口碑，聚集人才，才能一步步擴大影響。" 

# monologue
# JP: 鉄道事業そのものの信頼感を回復し、将来性を期待させ、\nそれを復線の動きにつなげ、路線網を復活させていく。
2918 = "目的在於讓大眾對鐵路行業重建信任，重燃希望，進而掀起恢復廢線的風潮，最終恢復整個線路網。" 

# 【稀咲】
# display as 稀咲
# JP: 「最終的な構想としては、粉蔵、鹿兒島の車両工場を復活。\n術仙を三拠点の中心にしたい、という絵図面になるね」
2092 = "「而終極理想則是重建小倉和鹿兒島的車輛工廠，並且讓術仙成為這個鐵三角的核心」" 

# 【宗方】
# display as 宗方
# JP: 「ほう、それは遠大な」
1758 = "「噢，這可真是志向遠大」" 

# 【れいな】
# display as 玲奈
# JP: 「九洲で成功したら、うふふぅ」
1819 = "「如果能在九州實現了，嘻嘻」" 

# monologue
# JP: れいなが笑う。
2908 = "玲奈莞爾一笑。" 

# monologue
# JP: 笑ってぽーんと、\n‘遠大”をまるごと、さらに大きな風呂敷で包む。
3043 = "隨後這個“遠大志向”，便將擴大至整個版圖。" 

# 【れいな】
# display as 玲奈
# JP: 「きっと、日ノ本の他のところも、\nみぃんな真似して、おんなじことをしてくれますよぉ」
2234 = "「那麼日本的其他地方，也會紛紛效仿啦」" 

# 【宗方】
# display as 宗方
# JP: 「！」
1686 = "「唔！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜鉄道自身も、将来的な延伸を計画してます。\n最優先は、御一夜－八ツ城の川線の復線。それから」
2089 = "「而我們御一夜鐵路也計劃於未來進一步延伸，首先是恢復御一夜至八代的河岸線路，然後再……」" 

# 【宗方】
# display as 宗方
# JP: 「ちょ、ちょっと待ってくれ――待ってください」
2173 = "「這、這個等一下，請容我說一句」" 

# monologue
# JP: 宗方さんが顎を激しくしごくようにし、首を振る。
2720 = "宗方先生用力搓了搓下巴，隨後搖頭說道。" 

# 【宗方】
# display as 宗方
# JP: 「そこまで大きな話になると、俺――\n私には、どうにも、夢物語にしか聞こえなくなる」
2143 = "「貴公司的計劃如此宏大，在我看來——恕我直言，未免過於異想天開」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、すいません。興奮して、ついつい余計なことまで」
1707 = "「啊，實在抱歉，怪我過於激動，都讓話題偏離正軌了」" 

# monologue
# JP: ポーレットがペコリと頭を下げる、れいなも下げる。
2890 = "波萊特向他彎腰致歉，玲奈也隨之效仿。" 

# 【宗方】
# display as 宗方
# JP: 「いや、俺の頭が固く、古いだけのことだろう」
1520 = "「不不，多半是怪我思想陳腐，頭腦愚鈍」" 

# monologue
# JP: 宗方さんも頭を下げて――オリヴィまでがそれに合わせる。
2695 = "宗方先生也彎腰致歉，就連奧莉薇也跟著低下頭來。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なんかごめんね。ムナカタ、そういう人だから」
1793 = "「奧莉薇都覺得有點對不起大家，宗方他就是這個脾氣」" 

# 【宗方】
# display as 宗方
# JP: 「おい」
1720 = "「喂」" 

# monologue
# JP: 怒ったふりの、けれども怒気をふくまぬ言葉。\nほんのり、空気がやわらかになる。
2919 = "看似訓斥，可是言語中怒氣全無，氣氛頓時緩和了許多。" 

# 【ポーレット】
# display as 波萊特
# JP: 「とにかく保線専門の請負会社は、単体での計画ではなく、\n他との連携を前提にした、実現可能な計画なんです」
2079 = "「總之成立這個專業巡線公司並非獨立的計劃，而是考慮以此為起點為其他項目鋪磚引路，具有一定可行性」" 

# 【宗方】
# display as 宗方
# JP: 「そこは理解できた――かと思います」
1936 = "「我自認算是理解了你們的想法」" 

# 【稀咲】
# display as 稀咲
# JP: 「双方の希望が合致すれば、同社立ち上げメンバーとして、\n来年４月以降、宗方氏の招聘を、我々は検討しています」
1880 = "「彼此意願若能一致，我們也會考慮自明年四月起，聘用先生為初始成員，共同著手計劃的實行」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Really！！？」
2279 = "「Ｒｅａｌｌｙ！！？」" 

# monologue
# JP: オリヴィの喉から歓喜の声。\n宗方氏の意向が確定するまで、ぬか喜びをさせぬよう――
2637 = "奧莉薇立刻發出喜出望外的聲音，可是原本為了不讓她空歡喜一場——" 

# monologue
# JP: そう配慮をしていたのだが、\nこの状況では、やむを得まい。
2810 = "我們還專門在詢問宗方先生意向之前對措辭多加注意，然而談及此事會令她期待也是在所難免。" 

# 【ポーレット】
# display as 波萊特
# JP: 「同時に\x%l機関士;#00ffc040;機関士%l;#;・\x%l機関助士;#00ffc040;機関助士%l;#;の指導を主務とした御一夜鉄道\n[しょくたく,1]嘱託職員としても勤務して貰えればと思っています」
2104 = "「與之同時，我們也希望能夠委託您成為我們御一夜鐵路的合同工，主要負責指導\\x%l機関士;#00ffc040;司機%l;#;以及\\x%l機関助士;#00ffc040;司爐%l;#;」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！！」
1674 = "「哇！！！」" 

# monologue
# JP: オリヴィの目が、こぼれそうなほどまんまるになる。\nが――こちらの方が、当然すぎる要望だ。
2557 = "只見奧莉薇把眼睛睜得圓滾滾的，幾乎愣在原地，但這對我們來說卻是再正常不過的想法。" 

# monologue
# JP: （懸念であった\x%lレイルロオド;#00ffc040;レイルロオド%l;#;扱いの違いについても、\n大きな問題にはならなさそうである以上――）
3078 = "（既然我們最擔心的問題，也就是有關對待\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的觀念差異不會帶來太大影響）" 

# monologue
# JP: 帝鉄全盛期に教導を任され、今なお現役である\x%l機関士;#00ffc040;機関士%l;#;。
2710 = "宗方先生在帝國鐵路全盛期便被委任教導工作，如今也仍然是在一線活躍的\\x%l機関士;#00ffc040;司機%l;#;。" 

# monologue
# JP: 新人を増員、育成していかねばならぬ\nこれからの御一夜鉄道に、これほど好適な人材も無かろう。
2753 = "對於今後必須不斷發展培養新人的御一夜鐵路而言，當然是不可或缺的人才。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それならそれなら！　それならさ！！」
1976 = "「既然這麼說！那就那就！！」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！？」
1794 = "「奧莉薇！？」" 

# monologue
# JP: 宗方\x%l機関士;#00ffc040;機関士%l;#;の前であるのに、\nもうオリヴィは、完全に僕らの前でのオリヴィだ。
2858 = "明明是當著宗方\\x%l機関士;#00ffc040;司機%l;#;的麵，可奧莉薇已經完全回到和我們在一起時的狀態。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;！　\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のケンシューとか\nケンキューするしせつも、オヒトヨとかジュツセンに！」
2191 = "「還有\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;！包括\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的檢修，以及研究設施，也全部聚集在御一夜或者術仙多好！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！！！」
1703 = "「啊！！！」" 

# 【れいな】
# display as 玲奈
# JP: 「でもでも、とろるゆのおばあさん、\nそういうのしてくれなさそうって思いますぅ」
1635 = "「可是玲奈感覺，登呂流浴場的婆婆不會願意出面的」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だからトロルユのおばーさんには、ムナカタとおなじ！\n現場じゃなくて、アドバイザー役をやってもらうの！！」
1946 = "「所以就讓婆婆和宗方一樣不用親臨現場！只需要做顧問就好了！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうか、第一線の研究員を、\n不死鳥博士――[おおみや,1]旺宮から派遣してもらうなどして」
1684 = "「哦！對啊，另外有關直接負責研究的人員，可以向不死鳥博士，也就是大宮那邊請求派遣人手」" 

# 【ハチロク】
# display as 八六
# JP: 「それは……ありかもしれませんね。[おおみや,1]旺宮ー[ひろしま,1]廣島ー御一夜に、\nまがりなりにも、交流が発生しはじめたのですし」
2176 = "「這些主意……的確是可行的，畢竟大宮、廣島以及御一夜之間，多多少少也已經開始開展合作了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「でしょでしょ！？　わざわざオーミヤおくらなくても\nケンシューできるなら、お仕事きっとたくさん来るし！」
1862 = "「就是嘛！？如果我們能自己進行檢修不用再送去大宮，一定也會有很多人前來委託我們的！」" 

# monologue
# JP: こく、と何かを飲み下す音。\n顔を向ければ、稀咲がコーヒーカップを置いている。
3042 = "隨之傳來一聲響亮的喝水聲，一看是稀咲將咖啡杯放在了桌上。" 

# 【稀咲】
# display as 稀咲
# JP: 「……\x%lレイルロオド;#00ffc040;レイルロオド%l;#;検修というのにはどの程度の需要が？\nその単価と利益率、九洲内での現在の需給動向は？」
1130 = "「……\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的檢修究竟有多大市場？另外還有定價和利潤率，以及在九州內的供需趨勢又如何」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その辺は精査したことないです。けど……第一印象では、\nこれ、多分、いけそうなアイディアな気がします」
2178 = "「這些方面我們是沒有詳細調查過，不過……以我的第一印象，這個想法應該是可行的」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「フシチョーハカセだって絶対キョーリョクしてくれる！\nだって、オリヴィとかハチロクとかのデータ」
1529 = "「不死鳥博士也是一定不可能拒絕的！因為她還要收集奧莉薇和八六的數據」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1682 = "「哦……」" 

# monologue
# JP: そこまでは、僕も迂闊にも気づいてなかった。\nしかし、確かにその通りだ。
2860 = "是我疏忽，沒能考慮到這些方面，奧莉薇的想法的確有道理。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、九洲に拠点を作るということは、\n九洲の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に関するデータを大量に――」
1850 = "「對啊，如果能在九州建立這個中心，就能收集到大量關於九州\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的資料」" 

# 【ハチロク】
# display as 八六
# JP: 「不死鳥博士が直接的に収集できるようになる――\nということでもあるのですね」
2085 = "「而且這樣一來，也方便不死鳥博士搜集第一手資料」" 

# monologue
# JP: 実際、御一夜鉄道では旺宮を使っていなかった。\n同様の小規模鉄道事業者も決して少なくはなかろう。
2477 = "之前我們御一夜鐵路也沒有和大宮建立合作關係，肯定也有很多小規模的鐵路運營商亦是如此。" 

# monologue
# JP: そうしてそうした小規模鉄道事業者ほど、\n老朽化した\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を稼働させている率は、高い。
2970 = "而規模一小，更是只能讓年事已高的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;負責運營。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはまさに……不死鳥博士が最も欲しがっている\n情報のひとつに違いない」
2097 = "「而這些資料對博士而言……無疑是最最求之不得的」" 

# 【ハチロク】
# display as 八六
# JP: 「ですので、“絶対協力してくれる”。そしてそれは、\n延命などの研究に大きく寄与する可能性を持つ」
1944 = "「所以她“一定不可能拒絕”。而這些數據也很可能會助力於延長壽命等方面的研究」" 

# 【れいな】
# display as 玲奈
# JP: 「ふわわぁ！　すごいですぅ、オリヴィさん。\nれいな、そんなことぜぇんぜん思いつきませんでしたぁ」
1672 = "「哇哇！奧莉薇小姐真的好有遠見，玲奈可是一點都沒想到這些方面」" 

# monologue
# JP: ごくごく素直な賞賛に、オリヴィの顔が笑み崩れる。
2641 = "奧莉薇聽到玲奈誠摯的讚賞，喜笑顏開。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「メイジからずっと走ってきてるから！　その分たくさん、\n見て、聞いて、\x%l共感;#00ffc040;共感%l;#;してきたし、それにっ！」
1790 = "「奧莉薇可是從明治年代一直工作到了現在！期間目睹耳聞，\\x%l共感;#00ffc040;共鳴%l;#;所感，再加上！」" 

# monologue
# JP: オリヴィがイスから立ち上がり、\n宗方\x%l機関士;#00ffc040;機関士%l;#;にぱっ！　と近寄る。
2629 = "奧莉薇從椅子上站起身，一個箭步來到宗方\\x%l機関士;#00ffc040;司機%l;#;身邊。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「コーシューカイとかそういうのには、ムナカタ、\nオリヴィもついていっていいっていってくれたから！」
2086 = "「而且那些講座之類的活動，宗方也都允許奧莉薇同行的！」" 

# monologue
# JP: 驚きにだろう。やはり丸くなっていた宗方\x%l機関士;#00ffc040;機関士%l;#;の目が、\n理解の色に落ち着いていく。
2665 = "宗方\\x%l機関士;#00ffc040;司機%l;#;起初略顯吃驚，但也很快便示以理解。" 

# monologue
# JP: ならばあるいは、鉄道事業者の経営についてなど――\nそうした講習も、宗方さんは受講していたのかもしれん。
2830 = "或許其他諸如關於鐵路商業經營之類的講座，宗方先生也都有參加。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、オリヴィの知ってるダイジなことは、\nぜーんぶムナカタが教えてくれたんだよ！！」
1943 = "「所以奧莉薇知道的這些核心知識，全都是宗方教的！！」" 

# 【宗方】
# display as 宗方
# JP: 「……買い被りすぎだ」
1170 = "「……這就是言過其實了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへー」
1750 = "「嘿嘿」" 

# monologue
# JP: 宗方\x%l機関士;#00ffc040;機関士%l;#;が立ちあがり、\nほんの一瞬、オリヴィの帽子に手のひらを置く。
2663 = "宗方\\x%l機関士;#00ffc040;司機%l;#;站起身，又一次將手放在奧莉薇的帽子上，再很快收手。" 

# monologue
# JP: そして表情を引き締めて、\nまっすぐポーレットに向き直る。
2903 = "然後只見他神情嚴肅，面向波萊特認真地說道。" 

# 【宗方】
# display as 宗方
# JP: 「――み鉄には世話になりました。\n定年までは勤めきり、恩を返したいと思っています」
2010 = "「橙鐵對我有恩，我會一直堅守崗位直至退休」" 

# 【ポーレット】
# display as 波萊特
# JP: 「失礼ですが、ご定年をお迎えになられるのは」
2194 = "「那不知您是否方便告訴我們具體的退休時間」" 

# 【宗方】
# display as 宗方
# JP: 「再来年の三月になります」
1934 = "「我是在後年三月份退休」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でしたら。もちろん再来年までお待ちします。\n定年明けの四月から勤務いただく形で――」
2217 = "「那我們當然願意等到後年，希望屆時您能在四月份到崗工作」" 

# 【稀咲】
# display as 稀咲
# JP: 「それまでの間も、可能でしたら月一ペース程度で、\n外部顧問のような形での関与を願えればと」
1805 = "「如果可行，懇請您現在就以外部顧問之類的身份參與其中，最好每月都能安排一次答疑解惑的機會」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　はい、そうです。そうしていただけましたら、\nわたくしどもとしては一番、助かります」
1702 = "「啊！正是有此想法，如果您願意接受，那就真是幫了我們一個大忙」" 

# monologue
# JP: ポーレットの誠意と、稀咲の現実的なセンスと。\nその双方が、見事に噛み合い機能している。
2892 = "波萊特的誠意加上稀咲從現實出發的思量，二者的配合幾乎天衣無縫，熱情盡顯。" 

# monologue
# JP: それを好感してくれたのか、宗方さんの引き締まった顔が、\nふ、と緩む。
2997 = "見此，宗方先生嚴肅的面容上流露出幾分笑意，或許他也對此頗有好感。" 

# 【宗方】
# display as 宗方
# JP: 「……定年退職した後でも、私が蓄積した経験が、\n御社や鉄道の役に立つなら、嬉しいことです」
1147 = "「……即使在退休以後，若是我長年累積的知識經驗尚能為貴公司，以及鐵路事業發揮餘熱，自是何樂而不為」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でしたら！」
2209 = "「那您願意接受！」" 

# 【宗方】
# display as 宗方
# JP: 「ポストや報酬については、今日の仕事振りを見てもらい、\n提示を貰うような形でどうでしょうか？」
2103 = "「至於職位和報酬，不妨請貴公司根據我今天的表現，再行判斷如何？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「お金のことでしたらっ」
2117 = "「薪資方面的話！」" 

# 【稀咲】
# display as 稀咲
# JP: 「もちろん、そのようにご相談させていただければと」
1924 = "「我們當然願意依此與您商討」" 

# monologue
# JP: 興奮気味のポーレットの声を遮って、\nお金についてを、稀咲が引き取る。
2936 = "稀咲趕緊接過話，代替激動的波萊特談論薪水問題，以免波萊特不小心報上過高酬金。" 

# monologue
# JP: ポーレットが軽々に報酬を弾み過ぎぬよう、ここだけは、\n銀行家でなく、御一夜鉄道経営顧問になってくれている。
2554 = "只有在商討這些問題時，她不會再保持銀行家的態度，而是作為御一夜鐵路的經營顧問為我們出謀劃策。" 

# 【宗方】
# display as 宗方
# JP: 「なら。そういうことで」
2239 = "「那麼，事情就算這麼談妥了」" 

# monologue
# JP: 軽く一礼。\n宗方さんが振り向けば、オリヴィもすぐにその後を追う。
2705 = "宗方先生向我們點頭行禮，隨即轉身向外走，奧莉薇也馬上跟了上去。" 

# 【宗方】
# display as 宗方
# JP: 「右田\x%l機関士;#00ffc040;機関士%l;#;。早速で悪いが、\n連絡をもらった支障個所に連れていってくれ」
1642 = "「右田\\x%l機関士;#00ffc040;司機%l;#;，事不宜遲，還勞你帶我到出問題的地點一探究竟」" 

# monologue
# JP: 小畑を越えた8620を早戸駅の留置線にいれ、\nエアクラトラックで三十分ほど戻って隆起現場へ。
2811 = "我們駕駛８６２０翻過大畑，停在隼人站的存車線後，再坐空凝機卡車大約三十分鐘，便抵達了發生隆起的地點。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「どーお？　ムナカタ」
1836 = "「宗方，看出什麼端倪沒有？」" 

# monologue
# JP: 何十度目か。全く同じオリヴィの問い。
2627 = "奧莉薇已經提了大概幾十次相同的問題。" 

# 【宗方】
# display as 宗方
# JP: 「……目星はいくつか」
1162 = "「……我已想到幾種可能」" 

# monologue
# JP: 『焦るな』ではない言葉がついに、\n宗方\x%l機関士;#00ffc040;機関士%l;#;の口から出て来る。
3025 = "這一次不同於以前，宗方\\x%l機関士;#00ffc040;司機%l;#;終於給出了“不要著急”之外的答案。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いくつかって！？」
2192 = "「還有好幾種！？」" 

# 【宗方】
# display as 宗方
# JP: 「この広範な隆起なら、モグラや木の根の可能性は消せる。\n\x%l枕木;#00ffc040;枕木%l;#;の凍結膨張も、この気温では発生しない」
2246 = "「隆起面積如此之大，便能排除是鼴鼠所為或由樹根引起的可能，並且以此地的氣溫，\\x%l枕木;#00ffc040;枕木%l;#;也不會出現凍結膨脹的現象」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
1723 = "「嗯！」" 

# 【宗方】
# display as 宗方
# JP: 「だから、\n水脈、ガス、地中流動あたりがひとまず怪しい」
1950 = "「所以目前來看，原因最有可能出在，地下徑流或者瓦斯，以及地基液化」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「チチューリュードー？」
1761 = "「地基液化？」" 

# 【宗方】
# display as 宗方
# JP: 「地盤が流れて動き、その影響が地表にでることだ。\nたしか、このあたりは――」
1864 = "「就是地基發生像流體一樣的運動，進而導致地表出現隆起，我記得這附近應該——」" 

# 【ハチロク】
# display as 八六
# JP: 「鹿兒島県[きりしま,1]霧縞市[はやとちょう,2]早戸町、でございます」
2133 = "「該地位於鹿兒島縣霧島市隼人町」" 

# 【宗方】
# display as 宗方
# JP: 「[きりしま,1]霧縞なら温泉地、火山帯だ。\n今あげた可能性の、どれも十分にありえるな」
1765 = "「地處霧島，也就是火山帶，多有溫泉。那麼我剛才提到的幾個因素都是完全有可能的」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうなんだ！」
1995 = "「是這樣呀！」" 

# monologue
# JP: ハチロクからの適時・正確な報告に、\n礼のひとつも返ってこない。
2569 = "可是對於八六適時得當的說明，宗方先生甚至都沒有表示感謝。" 

# monologue
# JP: この辺はやはり文化の違いを思ってしまうが、\nハチロクもオリヴィも、まったく気にする風もない。
2802 = "感覺這些果然也都是文化差異所致，但是不管八六還是奧莉薇都毫不在意。" 

# 【宗方】
# display as 宗方
# JP: 「これから掘る全ての地点、計測して記録しておけ」
1961 = "「接下來我動過土的所有地點，你都要進行測量並記錄下來」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！」
1980 = "「明白！」" 

# monologue
# JP: （『物』としての\x%lレイルロオド;#00ffc040;レイルロオド%l;#;か）
3071 = "（將\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;視作物品嗎）" 

# monologue
# JP: ……宗方さんの接し方を見ていれば、わかってくる。\n宗方さんはオリヴィを、確かによく使いこなしている。
1097 = "……一看宗方先生的態度便能理解其中的道理，他的確是經常使喚奧莉薇做事。" 

# monologue
# JP: 手に馴染むペンばかりを酷使してしまうのと同様に、\n細かなことでも大きなことでも――
2484 = "他對待鐵路人偶就像對待一樣用得順手的工具一樣，不論事情大小都會下意識去使用，造成過度磨損……" 

# 【宗方】
# display as 宗方
# JP: 「ガンスコ」
1869 = "「巡線鏟」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
1802 = "「好！」" 

# monologue
# JP: オリヴィは飛ぶように駆け、ガンスコを――
2644 = "奧莉薇飛也似地衝過去拿宗方先生要的巡線鏟——" 

# monologue
# JP: \x%lバラスト;#00ffc040;バラスト%l;#;ごと掘り返せる、先端にフォークがついている\n保線用のスコップを、抱えて戻る。
2760 = "巡線鏟就是尖端呈叉子形狀，能連\\x%lバラスト;#00ffc040;道砟%l;#;一起將土翻起的巡線專用的鏟子——很快她便抱著巡線鏟跑了回來。" 

# 【宗方】
# display as 宗方
# JP: 「持ってろ」
2177 = "「這些你拿好」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
# 1723 = "「嗯！」" 

# monologue
# JP: カメラと書類バサミをオリヴィに預け、\n宗方さんは無造作にガンスコを隆起部分――
2713 = "宗方先生將相機和資料夾交給奧莉薇，開始用鏟子在隆起的地方挖了起來。" 

# monologue
# JP: 線路を避けた、犬走りのあたりから掘り進んでいく。
2914 = "當然他沒有從鐵軌這邊開挖，而是從土墩下部的平坦區域入手。" 

# monologue
# JP: （ざくっ！　ざくっ！　ざくっ！　ざくっ！）
3066 = "（一陣翻土聲）" 

# monologue
# JP: （パシャ）
3068 = "（喀嚓）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1752 = "「噢噢」" 

# monologue
# JP: 『記録』とは、位置情報だけではないのか。
2538 = "原來這巡線的“記錄”，不單單只有發生問題的位置嗎。" 

# monologue
# JP: それが当然といった仕草でオリヴィは、\n宗方さんの作業の様子を撮影している。
2962 = "而奧莉薇也一副習以為常的樣子，將宗方先生的一系列動作拍攝下來。" 

# 【宗方】
# display as 宗方
# JP: 「……わからんな」
1156 = "「……從這裡弄不清楚」" 

# monologue
# JP: 宗方さんが他の地点へ移動する。
2717 = "宗方先生於是走向其他地點。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ここ、埋め戻す？」
2184 = "「這裡需要填好嗎？」" 

# 【宗方】
# display as 宗方
# JP: 「埋め戻せ」
1572 = "「你去填」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！」
1797 = "「好嘞！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そのくらいは僕がやろう」
1717 = "「啊，這點事就讓我來吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがと！　ソーテツ！！」
1768 = "「多謝你啦，雙鐵！！」" 

# monologue
# JP: 引き受けるやいなやで、\n嬉しげにオリヴィは宗方\x%l機関士;#00ffc040;機関士%l;#;へとすっとんで行く。
2620 = "奧莉薇一把工作交給我，就興高采烈地緊跟宗方\\x%l機関士;#00ffc040;司機%l;#;去下一個地點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし……」
1536 = "「不過……」" 

# monologue
# JP: （ざくっ――ざくっ――）
# 3066 = "（一陣翻土聲）" 

# monologue
# JP: ……実によく働く。宗方さんも、オリヴィも。\n感心させられると同時に、理解もさせられる。
1103 = "……宗方先生和奧莉薇在工作中都毫不拖沓，態度非常積極，這令我無比佩服，同時也對二人的關係有了進一步理解。" 

# monologue
# JP: オリヴィは、働くことが、使われることが幸せなのだ。\nそれが宗方さんにであれば、おそらく、何より――
2979 = "能夠投身於工作，被命令做事於奧莉薇而言屬於一種幸福，更何況對方是宗方先生，想必此刻她心中更是充滿喜悅。" 

# 【ハチロク】
# display as 八六
# JP: 「あの……双鉄さま？」
2132 = "「話說……雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1739 = "「嗯？」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしにも、お手伝いをさせてください」
2136 = "「請允許我幫您一起填土」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そのままでかまわない。つまり、宗方さんの\n作業の様子を、観察、記録してほしい」
1539 = "「不，你就別幫忙了，我想讓你仔細觀察並記錄宗方先生的行動」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1696 = "「啊！」" 

# monologue
# JP: ほっとしたようなハチロクの声。\nついで、トーンがひそっ、と落ちる。
2511 = "八六如釋重負地鬆了口氣，同時也示以理解。" 

# 【ハチロク】
# display as 八六
# JP: 「左様でございましたね。\nそれは、双鉄さまの大事なお仕事でございますものね」
2250 = "「雙鐵少爺所言極是，這才是您此行的關鍵所在」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1722 = "「嗯」" 

# monologue
# JP: 埋め戻しをしながらでも見るは見れるが、やはり気が散る。\n報告のため、ハチロクには観察に集中してほしい。
3044 = "雖然我也可以一邊填土一邊觀察，但還是容易分心。為了完成報告，我希望由她來專心致志進行觀察。" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。必ずや、双鉄さまにかわって」
1932 = "「我明白了，我一定會替您履行職責」" 

# 【双鉄】
# display as 雙鐵
# JP: 「よろしく頼む」
1959 = "「拜託了」" 

# monologue
# JP: となれば、僕も埋め戻しだけでは申し訳ない。\n宗方\x%l機関士;#00ffc040;機関士%l;#;はいかにも壮健そうに見えるが、定年間際だ。
2849 = "既然如此，我也不該只接手填土的工作，儘管宗方\\x%l機関士;#00ffc040;司機%l;#;看起來身強體健，但也是臨近退休之人。" 

# monologue
# JP: この残暑の中、一番キツイ肉体労働を\n彼だけにさせるというのは、人間として間違っていよう。
2583 = "在這秋老虎肆虐的時節，我身為年輕男性，豈有讓他一人負責最辛苦粗活的道理。" 

# 【双鉄】
# display as 雙鐵
# JP: 「埋め戻しました。他にも、手伝いできることがあれば」
1929 = "「我把土填好了，請問還有什麼我能幫忙的」" 

# 【宗方】
# display as 宗方
# JP: 「いや、掘る方には手は出さないでくれ。\nさっきも言ったが、ガスの可能性もある」
1541 = "「不，挖土你就別來了。剛才我也說過，有可能是地下聚集了瓦斯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1695 = "「啊」" 

# monologue
# JP: 宗方さんへと近づいていた足が、思わず止まる。\nオリヴィは、べったりと宗方\x%l機関士;#00ffc040;機関士%l;#;にくっついたままだ。
2864 = "朝宗方先生走去的我停在了半路上，而奧莉薇依然緊緊纏著宗方\\x%l機関士;#00ffc040;司機%l;#;不放。" 

# monologue
# JP: 物であるゆえ、気にせず使える。\n――そうした信頼もあるのだと、思わぬところで思い知る。
2874 = "正因為將對方視為物品，才能毫無顧慮隨意使用。我不經意間意外發現，這樣的關係其中也飽含信賴。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーだよ！　ガスが吹き出たらアブナイし！\nこっちはムナカタとオリヴィにまかせていーよ！！」
1858 = "「就是呀！要是真噴出瓦斯來很危險的！這些就交給宗方和奧莉薇吧！！」" 

# 【宗方】
# display as 宗方
# JP: 「汗」
1963 = "「擦汗」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うんっ！」
# 1723 = "「嗯！」" 

# monologue
# JP: 確かにこの件に関し、僕らには経験も知識も無い。
2916 = "的確我們在這些方面一無所知且毫無經驗。" 

# monologue
# JP: ガスの危険は無視できないし、オリヴィの言にははっきり、\n『邪魔しないで』という響きも感じて――ああ、いや。
2910 = "瓦斯噴發的危險不容小覷，而且奧莉薇這句話，明顯給人一種“不要打擾他們”的印象……啊，那我和八六就——" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、周辺情報の収集はどうでしょうか。\n今の仮説を元にして、この地域の地勢や歴史など」
2232 = "「那麼我們要不要去搜集一些周圍的訊息。就從現在的推測出發，調查這片區域的地勢和歷史之類」" 

# 【宗方】
# display as 宗方
# JP: 「それは助かる」
2057 = "「的確會有很大幫助，非常感謝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロク。僕は見る方にもどるゆえ」
2230 = "「那麼八六，拜託你去查一下，我繼續觀察」" 

# 【ハチロク】
# display as 八六
# JP: 「ですが、双鉄さま」
2251 = "「雙鐵少爺，可是」" 

# monologue
# JP: 困ったように下がった眉毛。\n見た瞬間に、昨夜の記憶が蘇る。
2516 = "八六表現得有些不知所措，看到她低垂的眉毛，我才想起昨晚的事情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！\nそうか、保線記録が廃棄されていたのだったか」
1700 = "「啊！對了，我都忘了巡線記錄已經被銷毀」" 

# 【宗方】
# display as 宗方
# JP: 「廃棄？」
2240 = "「銷毀？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、左様です。この[やません,1]山線――元帝鉄[ひさつ,1]肥颯線、\n御一夜ー早戸間は、軍用路線だったとのことで」
2025 = "「正是，因為這條山路——原帝國鐵路肥薩線，本是御一夜至隼人的軍用鐵路專線」" 

# 【宗方】
# display as 宗方＆奥莉薇
# JP: 「ああ」\n「グンヨーロセン？」
2182 = "「這樣啊」\\n「“軍用鐵路專線”？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「文字通り、\x%l大戦;#00ffc040;大戦%l;#;に備えるために国家計画として[ふせつ,1]敷設\nされた路線だ。海沿いでは、艦砲射撃の危険があるゆえ」
2257 = "「顧名思義，就是為應對那場\\x%l大戦;#00ffc040;大戰%l;#;而按照國家計劃鋪設的鐵路，畢竟海岸有遭到軍艦炮擊的危險」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、だからこんな山の中にも、\nめっちゃくちゃキツイ線路しいたんだねー、ナットクー」
1713 = "「啊，所以即使在這大山中，都要鋪設這麼險峻的線路哇，能理解」" 

# monologue
# JP: オリヴィの感心の声にふと、かつての自分を思い出す。\n海沿いを走る東峡道線と、山間を抜ける忠央線。
2633 = "奧莉薇的感嘆聲突然令我想起了過去的自己，海岸邊的東海道本線，以及穿山而過的中央線。" 

# monologue
# JP: 艦砲射撃のおそれがあったがゆえの両線敷設と――\nそれを教えてくれたのは、出会った頃のハチロクだったか。
2876 = "正是考慮到遭遇炮轟的可能才特地鋪設了兩條線路——就是跟八六剛認識的時候她告訴我的。" 

# 【ハチロク】
# display as 八六
# JP: 「今はみかん鉄道様の[せんだい,1]千内－[やつしろ,2]八ツ城を含む旧鹿兒島本線と、\n旧[ひさつ,1]肥颯線との関係は、帝都まわりで申しましたら」
2091 = "「而現在橙鐵路包含川內至八代路段的前鹿兒島本線與前肥薩線的關係，單從帝都周邊的路段而言」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そっくりだな。\n[とうかいどう,2]東峡道線と[ちゅうおう,1]忠央線との関係に」
1736 = "「嗯，的確和東海道線與中央線的關係非常相似，都是出於軍需」" 

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1695 = "「啊」" 

# monologue
# JP: ハチロクの顔が、瞬時にとろける。\n幸せ色だけで塗りつぶされる。
2520 = "八六轉眼間喜笑顏開，無比幸福。" 

# monologue
# JP: ふたり同時に、おなじ思い出を振り返っていた。\nそれだけのことが、かくも嬉しい。
2812 = "我和八六一同回首了那段記憶，僅是如此便令人欣喜萬分。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも、コッカケーカク？　でやったことなら、\nちゃんと記録、のこってるんじゃないの？」
1567 = "「但既然是按照那個什麼國家計劃建設的，不就更應該留下完整的紀錄嗎？」" 

# 【双鉄】
# display as 雙鐵＆宗方
# JP: 「それは――」\n「逆だ、オリヴィ」
2169 = "「這——」\\n「剛好相反，奧莉薇」" 

# monologue
# JP: ざく、ざく、ざく。\nまた別の地点を掘り返しながら、宗方さんが言う。
2693 = "宗方先生一邊在別的地點挖土調查，一邊向她解釋。" 

# monologue
# JP: であれば僕は、もちろん黙る。\nオリヴィにも、僕らと同種の幸せを味わってほしいゆえ。
3030 = "那我當然不會打擾他們，畢竟我想讓奧莉薇日後也品味到與我們相同的幸福。" 

# 【宗方】
# display as 宗方
# JP: 「敗戦国となったから、資料の全てを廃棄した。\n責任逃れの、よくある手段だ」
2101 = "「自從戰敗以後，一切資料就被銷毀了，這是逃脫責任的常用手段」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「？？？　シリョーをのこしといた方が、まけた原因、\nあとでちゃあんと分析できない？　次にいかせない？」
1718 = "「啊？？？如果把資料都保存好，不就能在以後分析戰敗的原因，吸取經驗教訓嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2185 = "「這！」" 

# monologue
# JP: 言われて、気づく。オリヴィは冥国製――\n先の\x%l大戦;#00ffc040;大戦%l;#;の戦勝国で製造された\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
2976 = "聽到她這些話我才反應過來，奧莉薇是美國式——也就是在先前那場\\x%l大戦;#00ffc040;大戰%l;#;的戰勝國製造的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。" 

# monologue
# JP: ぱっと出てくる基本発想の違いが……なるほど、\nあるいは勝敗をわけた一因であるのかもしれん。
2584 = "在關鍵時刻的著眼點就不一樣……或許這些思維方式的差距，也屬於決定勝負的原因之一。" 

# 【宗方】
# display as 宗方
# JP: 「追い詰められれば自分のことしか考えられない。\n人間は――少なくとも俺は、そういう程度だ」
1552 = "「人在窮途末路之時，是只顧得上保全自我的，至少我就只有這點本事」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうなんだー」
1611 = "「原來是這樣」" 

# monologue
# JP: 受け入れる。自嘲が多分に混じった言葉を、\nオリヴィは、ただ、フォローもせずに受け入れる。
2631 = "奧莉薇沒有護著宗方先生，只是坦然接受他這番略有自嘲意味的話。" 

# 【宗方】
# display as 宗方
# JP: 「そのツケは逃げそこねたヤツに回る。\n要領のいい連中は、いつだって食い逃げし続ける」
2095 = "「而被迫擔責的都是沒能脫身的，這幫左右逢源的人一向都是占盡甜頭再逃之夭夭」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヨーリョー！\nヒノモトの人たち、すっごくいいよねー！」
1872 = "「左右逢源！果然日本人就是有智慧呀！」" 

# 【宗方】
# display as 宗方
# JP: 「うん？」
# 1739 = "「嗯？」" 

# monologue
# JP: カラリと晴れた、一点の曇りも混じらぬオリヴィの声。\n会話のズレに、思わずだろう。宗方さんの手が止まる。
2634 = "奧莉薇的腔調顯得無比積極開朗，而宗方先生對於對話的錯位也是頗感意外，不禁停下手來。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「タイセン前につくって、いまもこーんなしっかりしてる\n線路だもん！　ヨーリョー悪くちゃ、作れないよ！！」
2050 = "「畢竟這條線路明明是在大戰前建成，如今卻還是這麼經久耐用，不是有智慧怎麼能做得到呢！！」" 

# 【宗方】
# display as 宗方
# JP: 「アホだな、お前は」
1574 = "「你可真夠傻的」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええっ！？」
1679 = "「哎哎哎！？」" 

# monologue
# JP: 情け容赦の無い指摘。\nけれど、オリヴィを見る瞳は優しい。
2697 = "宗方先生儘管嘴上毫不留情，但是看向奧莉薇的目光卻極其和藹。" 

# monologue
# JP: アホと呼ばれたオリヴィも、\nそれさえ嬉しいことかのように、ニコニコしている。
2965 = "而奧莉薇即使聽到他說自己傻，也依然滿面笑容，反倒顯得非常高興。" 

# 【宗方】
# display as 宗方
# JP: 「が、まぁ、お前の言う通りだ。\n確かに、この配線も[せこう,1]施行も、見事の一言だ」
1538 = "「不過，你說的也對，這條路線不管配線還是工程，都可謂是巧奪天工」" 

# monologue
# JP: 言って、ふと、宗方さんの目が僕に向く。
2725 = "宗方先生說罷，又突然看向我。" 

# 【宗方】
# display as 宗方
# JP: 「右田さんは大廃線前。御社社長が復線させたがっている、\n[かわせん,1]川線――[おひとよ,2]御一夜ー[やつしろ,2]八ツ城間に乗ったことは？」
1650 = "「右田先生，對於貴公司社長渴望恢復的那條河岸線路——御一夜至八代段，你在大廢線之前可有過搭車途經過？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いえ……残念ながら。\nしかし、地図や資料では確認しています」
1882 = "「很遺憾……並沒有。但是我已在地圖和資料上看過該路線」" 

# 【宗方】
# display as 宗方
# JP: 「なら、気づいたろう。\nあれは――あれも、信じられないくらい丁寧な配線だ」
2231 = "「那麼想必你也注意到，這一段——應該說和這一段一樣，其配線真是巧妙至極，令人嘆為觀止」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう……なのですか？」
2053 = "「當真如此……？」" 

# monologue
# JP: ハチロクと目を見合わせてしまう。
2823 = "我跟八六不禁對視了一眼。" 

# monologue
# JP: 復線について協議を重ねていた時期に、\nむしろ、僕らは半ばあきれていたものだった。
2581 = "在就恢復廢線一事進行商討的時期，我們反倒是對這條線心存質疑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「べったりとクマ川に沿い、左岸を走ってたかと思えば、\n右岸へ移り、また左岸。なんでこんな配線を、と――」
2001 = "「最開始還是緊貼隈河左岸行進，然後又很快跨河至右岸鋪設，再回到左岸，我們原本無法理解為何如此配線——」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1696 = "「啊！」" 

# monologue
# JP: またハチロクと目を見合わせる。
2509 = "八六再一次和我交換眼神。" 

# monologue
# JP: もしもあれが、\n『信じられないくらい丁寧な配線』であるのなら――
2653 = "如果這樣配線是所謂的“巧妙至極”——" 

# 【双鉄】
# display as 雙鐵
# JP: 「理由があってのことなのですね？　\nわざわざいくつも鉄橋を架けた、あの配線には」
2238 = "「那麼這條線特地架設鐵橋來回於河岸兩邊，也是有其道理在的嗎？」" 

# 【宗方】
# display as 宗方
# JP: 「単純に、地盤がしっかりしている側に配線している」
1721 = "「單純是選擇地基穩固的位置進行鋪設而已」" 

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「あ！」\n「まぁ！」
1697 = "「啊！」\\n「哇！」" 

# 【宗方】
# display as 宗方
# JP: 「[しょうわ,1]正和二十年。国が帝鉄への予算を極端に削減したあの年、\nクマ川はかつてないほどに荒れ狂った」
2015 = "「正和二十年，同年國家也大幅度削減了撥給帝國鐵路的經費，隈河在這一年發生了前所未有的洪澇災害」" 

# 【双鉄】
# display as 雙鐵
# JP: 「七月のクマ川洪水ですね。資料では見ました」
1865 = "「就是於七月發生的隈河洪水，我也在資料上見過」" 

# 【宗方】
# display as 宗方
# JP: 「その大水害の時でさえ、川線の線路には被害がなかった。\nあれは、そういう配線だ」
1610 = "「即便發生了規模如此之大的洪澇災害，也沒有對河岸線路造成任何損害，其配線之完備可見一斑」" 

# 【ハチロク】
# display as 八六
# JP: 「ま、ぁ……」
2171 = "「這……」" 

# monologue
# JP: ハチロクが恥じ入った顔をしている。
2517 = "八六表現得有些無地自容。" 

# monologue
# JP: 『線路たるもの、直線が基本で究極でしょうに』と、\nあれほど口を尖らせていたゆえのことだろう。
2913 = "畢竟過去她一直認為“直線鋪設可是配線的常識與不二選擇”，也因此對這條線心存不滿。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし、不明でございました」
1839 = "「實乃我孤陋寡聞」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大変に勉強になりました」
1769 = "「多謝宗方先生指教」" 

# monologue
# JP: 大いに感心すると同時に、悪寒を覚える。\n川線同様、この山線も軍用路線。
2817 = "我在無比佩服的同時，也萌生一種不祥的預感，這條山路跟河岸線路一樣都是軍用鐵路專線。" 

# monologue
# JP: 綿密に計画されて、\n丁寧に配線されたものであるなら――
2853 = "既然是經過周密計劃，費盡心思鋪設完成的路線——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、このタブレットを使い、ナビとも連携し、\nこの周辺の地下水流や、火山活動の情報収集をしてくれ」
1594 = "「八六，你馬上用這平板與Ｎａｖｉ聯繫，合作調查這一帶的地下徑流，以及火山活動的訊息」" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄さま」
1801 = "「好的，雙鐵少爺，我這就去辦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「やはり、僕も掘ります。場所と深さを指示してもらい、\nオリヴィに監視してもらうのでどうでしょう？」
2007 = "「果然我還是得一起挖，您看這樣行不行，就跟我預先說明地點和大致深度，並讓奧莉薇監督我的行為」" 

# 【宗方】
# display as 宗方
# JP: 「リスクを理解してなら、止めん。\nオリヴィ、見てやれ」
1972 = "「既然你對危險心中有數，那我自不會阻攔。奧莉薇，你就去盯著他吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！　ムナカタ！　指示ちょーだい！」
1985 = "「明白！請求宗方指示！」" 

# monologue
# JP: ……イヤな予感は、どんどんふくらむ。\n叶うならこれに、蓋をしたい。
1098 = "……不祥的預感越來越強烈，我想儘快排除這個可能性。" 

# monologue
# JP: その可能性を高めるために、恐らくこれが、\n現状最適の人員配置であろうと信じる。
2895 = "為落實這一想法，如此安排人手理應是目前最合適的選擇。" 

# 【宗方】
# display as 宗方
# JP: 「では続けるぞ。\n日暮れまでに、少しでも多く材料を得ておきたい」
2216 = "「那我們就繼續吧，得趕在日落之前儘可能獲取更多線索」" 

# monologue
# JP: ……“原因は絞りこめるが特定できない”。
1093 = "……“雖然能夠判斷原因可能出在哪些方面，卻無法確定具體原因”。" 

# monologue
# JP: 僕らの出した報告に、ポーレットが返す言葉は、\n極めて単純明快だ。
2754 = "對於我們給出的報告，波萊特的回答也是直戳了當。" 

# 【ポーレット】
# display as 波萊特
# JP: 「でしたら当面、御一夜鉄道としては、\nどのように対処すればいいんでしょうか？」
2224 = "「那目前來說，我們御一夜鐵路又該作何措施？」" 

# 【宗方】
# display as 宗方
# JP: 「可能性をひとつひとつあたっていく。\nまずは、ガス」
1927 = "「我建議依次查明所有可能因素，首先是瓦斯」" 

# monologue
# JP: それに対する宗方さんも、また明快だ。
2966 = "而宗方先生給出的答案一樣簡單明瞭。" 

# 【宗方】
# display as 宗方
# JP: 「ガスなら一番話が早い。地中ガス専門の調査会社に、\n依頼して調査してもらえばいいだけですね」
2048 = "「瓦斯是最省心的，只需委託專門調查地下瓦斯的公司即可」" 

# 【ポーレット】
# display as 波萊特
# JP: 「近隣自治体などとの調整は？」
2228 = "「那需要通知附近市鎮的自治團體嗎？」" 

# 【宗方】
# display as 宗方
# JP: 「ひとまずは霧縞市に話せばいいんじゃないですかね？\n市で処理しきれなければ、自動的に県にいくでしょう」
1938 = "「我覺得先向霧島市匯報就可以了吧？如果市級組織無法應對，應該也會主動上報給縣級」" 

# 【ポーレット】
# display as 波萊特
# JP: 「なるほど」
2128 = "「言之有理」" 

# 【宗方】
# display as 宗方
# JP: 「ガスならそのまま専門家にまかせればいいんですが\n――ガスじゃないと、やっかいですね」
1815 = "「如果真是瓦斯的問題，交給專家處理便是，但如果瓦斯不是原因所在，事情可能就比較棘手了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「さっき言ってた――『チチューリュードー』？」
1856 = "「就是你剛才說過的“地基液化”？」" 

# 【宗方】
# display as 宗方
# JP: 「の場合は、こちらからの問題解決方法はない。\nただ、収まってくれるのを待つだけだ」
1813 = "「如果是因地基液化導致隆起，那就沒有可行的解決辦法，只能坐待地殼恢復穩定」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですか？」
2062 = "「真是如此？」" 

# monologue
# JP: 宗方さんの解答はただ、頷きだけだ。\n工夫の余地も妥協の余地も、全く無いと伝わってくる。
2731 = "宗方先生點了點頭作為回應，由此可見，當真沒有任何處置或妥協的餘地。" 

# 【双鉄】
# display as 雙鐵
# JP: 「解決できないのなら――\n当座の対処としては、どうすれば？」
1817 = "「如果真無法解決問題，那目前我們有什麼應急措施嗎？」" 

# 【宗方】
# display as 宗方
# JP: 「継続監視と、周辺情報の収集。それしかない」
1627 = "「只有繼續觀察，並搜集周邊的訊息，除此之外別無他法」" 

# 【双鉄】
# display as 雙鐵
# JP: 「継続監視と」
2080 = "「繼續觀察」" 

# 【ハチロク】
# display as 八六
# JP: 「情報収集」
1563 = "「以及搜集訊息」" 

# monologue
# JP: ハチロクと顔を見合わせたなら、\nオリヴィがふふん！　と誇らしげな声を出す。
2824 = "我跟八六面面相覷，這時奧莉薇突然眉飛色舞地說道。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「保線小屋たてればいーんだよ！\nそれで、できるだけ長い時間ミハリするの！！」
1630 = "「只要搭個巡線小屋就行啦！然後派人儘可能長時間駐留於此觀察情況！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2068 = "「確實有道理」" 

# monologue
# JP: ……常設の保線員を置くことは難しかろうが、\n交代制で詰めていくことなら不可能でない。
1109 = "……雖然要我們安排專職的巡線員是有一定難度，但如果是派人交替看守還是有可能實現的。" 

# monologue
# JP: 小畑線の保線体制の再整備は、\nどのみち必要なことでもあるし――
2528 = "再說這大畑線的巡線體制，遲早也是需要重建的。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは、なんとかできると思います」
2111 = "「若是這樣，我想還有辦法實現」" 

# monologue
# JP: 視線で問いかけるまでもなく、\nポーレットも同意の言葉をくれる。
2898 = "無需我用眼色徵求意見，波萊特立即就答應下來。" 

# 【ハチロク】
# display as 八六
# JP: 「もう一つの、周辺情報の収集、とおっしゃいますのは」
2235 = "「那麼說到另一項收集周邊訊息」" 

# 【宗方】
# display as 宗方
# JP: 「あのあたりは山を抜けた[ひらち,1]平地だ。\n人家も店も周辺にある」
2175 = "「這一帶屬於山外的平地，附近也有民家和店鋪」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。つまりは聞き込みを？」
1906 = "「意思是，讓我們四處打聽？」" 

# 【宗方】
# display as 宗方
# JP: 「聞き込みを行い、ビラを配布する。\n『水や地面に異変があったらこちらへご連絡を』と」
1953 = "「打聽消息，分發傳單，拜託他們一旦發現水和地面出現異常就立即聯繫我們」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それなら一度ですみますね。\nなんとかできそう」
2226 = "「那看來只需去一次便可，應該不是問題」" 

# 【宗方】
# display as 宗方
# JP: 「いや、数週間もおけばそんな話はすっかり忘れる。\nので、できれば一～二週おきに、定期調査を」
1532 = "「不行，不出幾個星期人們就會忘得一乾二淨，所以最好是每隔一到兩星期，定期進行調查」" 

# 【双鉄】
# display as 雙鐵
# JP: 「週単位で――ですか」
2255 = "「需要每星期都去嗎」" 

# 【宗方】
# display as 宗方
# JP: 「これは、初回の調査で協力的だったところだけでいい。\n話し相手がほしい老人などは、喜んで応じてくれがちだ」
1565 = "「以後就只需要再找第一次調查時願意協助的人們，比如喜歡與人攀談的老年人，大多都會樂於幫助我們」" 

# monologue
# JP: 力強い指示が続く。
2723 = "宗方先生繼續發出詳盡可靠的指示。" 

# monologue
# JP: ほぼ間違いなくそうした措置を、宗方さんは経験している。\nその感覚が、不安をいくらか和らげてくれる。
2975 = "而這些措施毫無疑問都來自於他長年累月的經驗，他準確的判斷也令我的擔憂緩和了些許。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それであれば――継続可能かもしれません」
2106 = "「若是如此，或許可以保持定期調查」" 

# monologue
# JP: 申し訳ないが、凪や日々姫にも手伝ってもらおう。\n人当たりの良さが、ここでは大きな武器となろう。
2923 = "看來還得勞煩凪和日日姬幫忙，她們和藹可親的性格一定會起到很大作用。" 

# 【宗方】
# display as 宗方
# JP: 「訪問は必ずふたり一組。\nトラブルがあれば、すぐに警察に通報。これも徹底」
2131 = "「訪問時必須二人一組，一旦出現意外情況必須立刻報警，這也是必須執行的」" 

# 【れいな】
# display as 玲奈
# JP: 「とらぶるなんてあるんですかぁ？」
2190 = "「還會出現意外嗎？」" 

# 【宗方】
# display as 宗方
# JP: 「無いとは断言できないがゆえの、対策だ。\n安全が第一の使命なことは、どの状況でも変わらん」
2021 = "「正因為無法排除其可能，才需採取對策，無論何時何地，我們必須將安全放在第一位」" 

# 【れいな】
# display as 玲奈
# JP: 「わ、そうですねぇ。ほんとですぅ」
1676 = "「哇，的確是這個道理」" 

# monologue
# JP: こくこくうなずくれいなを膝に乗せたまま、\nポーレットはメモを書きつらねていく。
2586 = "坐在波萊特膝上的玲奈不斷點頭，而波萊特正在記錄宗方先生的指示。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふたり一組……ってなると――」
1810 = "「如果是二人一組……」" 

# monologue
# JP: ペンの動きがふと止まる。
2649 = "她突然停下了筆。" 

# 【ポーレット】
# display as 波萊特
# JP: 「調査にあたるものには、\x%l保線;#00ffc040;保線%l;#;の専門知識が必須ですか？\nそれとも、場合によってはアルバイトを雇うなどして」
