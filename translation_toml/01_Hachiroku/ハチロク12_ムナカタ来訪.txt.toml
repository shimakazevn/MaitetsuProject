# 【オリヴィ】
# display as 奥莉薇
# JP: 「再来年からは！　ムナカタもおんなじ会社で、\nいっしょだよー！！」
2072 = "「Từ năm sau nữa! Munakata cũng sẽ làm cùng\ncông ty,\ncùng nhau làm việc đó~!!」"

# 【宗方】
# display as 宗方
