[script]
# lines: 530 
# monologue
# JP: ホームについた列車から、大柄な男が降りてくる。
2531 = "Từ chuyến tàu vừa đến sân ga, một người đàn ông to lớn bước xuống."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタっ！！！」
1834 = "「Munakata!!!」"
# monologue
# JP: 途端、オリヴィが駆けていく。
2639 = "Ngay lập tức, Olivy chạy ùa tới."
# monologue
# JP: 飼い主を見つけた迷子の子犬がそうするように、一直線に、\n満面の笑顔を輝かせながら。
2647 = "Giống như một chú chó con đi lạc tìm thấy chủ, chạy thẳng một mạch, với nụ cười rạng rỡ nở rộ trên môi."
# 【双鉄】
# display as 雙鐵
# JP: 「……強いな、オリヴィは」
1150 = "「...Mạnh mẽ thật đấy, Olivy」"
# monologue
# JP: 見ているだけのこちらの胸さえ傷んだほどの……\n実質的には、置き去り同然の別れ方をし。
2801 = "Thậm chí khiến trái tim của những người chỉ đứng nhìn như chúng tôi cũng phải đau nhói... Về cơ bản, đó là một cuộc chia tay giống như bị bỏ rơi."
# monologue
# JP: あれほど泣いて、落ち込み、拗ねて――
3032 = "Em ấy đã khóc, đã suy sụp, đã hờn dỗi đến nhường nào——"
# 【双鉄】
# display as 雙鐵
# JP: 「にもかかわらず、か」
1640 = "「Dù vậy, sao」"
# 【ハチロク】
# display as 八六
# JP: 「……だからこそ、なのかもしれません」
1163 = "「...Có lẽ chính vì vậy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1722 = "「Ừm」"
# monologue
# JP: すず――いや、ハチロクもおなじことを考えていた。\nしかも僕より、さらに深く。
3034 = "Suzu——không, Hachiroku cũng đang nghĩ giống tôi. Hơn nữa còn sâu sắc hơn tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。だからこそ、か」
2020 = "「Ra là vậy. Chính vì thế, sao」"
# 【ハチロク】
# display as 八六
# JP: 「はい。オリヴィちゃんがああ振る舞わねば、\nしこりはずっと、残り続けてしまいましょうから」
1727 = "「Vâng. Nếu bé Olivy không cư xử như vậy, thì khúc mắc sẽ mãi mãi tồn tại mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だからこそ、オリヴィは全てを忘れ喜ぶのだな。\n宗方\\x%l機関士;#00ffc040;機関士%l;#;と――わだかまりなく話したいから」
2022 = "「Vì thế, Olivy mới quên đi tất cả và vui mừng như vậy nhỉ. Vì em ấy muốn nói chuyện với \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata——mà không có bất kỳ vướng bận nào.」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
1696 = "「A!」"
# monologue
# JP: 根負けした――と言わんばかりに、\n宗方\\x%l機関士;#00ffc040;機関士%l;#;が歩みを止める。
2666 = "Như thể đã chịu thua—— \\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata dừng bước."
# monologue
# JP: 足元にじゃれつきつづけるオリヴィの帽子に、\n無造作に、その分厚い手がぼふ、と置かれる。
2556 = "Lên chiếc mũ của Olivy đang không ngừng làm nũng dưới chân, bàn tay dày cộp của chú ấy vô tình đặt lên, một cái xoa đầu nhẹ."
# 【宗方】
# display as 宗方
# JP: 「[おんてつ,1]御鉄さんで、よくしてもらっているようだな」
2058 = "「Ở Đường sắt Ohito, có vẻ cháu được đối xử rất tốt nhỉ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「～～～っ！　うんっ！！！」
1690 = "「~~~! Vâng!!!」"
# monologue
# JP: 無愛想な短い言葉。\nおもいっきりに深い頷き。
2489 = "Lời nói ngắn gọn, cộc lốc. Cái gật đầu thật sâu, hết sức mình."
# monologue
# JP: ただそれだけで、空気が一気に晴れ渡る。\n光がぱっと差し込むように、周囲の全てがあたたかになる。
2553 = "Chỉ bấy nhiêu thôi, bầu không khí đã bừng sáng. Giống như ánh sáng đột ngột chiếu rọi, mọi thứ xung quanh trở nên ấm áp."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「みんな、とっても良くしてくれる！\nそれにねっ」
1774 = "「Mọi người, đối xử với cháu RẤT TỐT! Hơn nữa nhé」"
# 【宗方】
# display as 宗方
# JP: 「ああ、右田\\x%l機関士;#00ffc040;機関士%l;#;。\nお久しぶり――というほどでもないか」
1754 = "「À, \\x%l機関士;#00ffc040;lái tàu%l;#; Migita. Đã lâu không gặp——cũng không hẳn là lâu lắm nhỉ.」"
# monologue
# JP: が――宗方\\x%l機関士;#00ffc040;機関士%l;#;は僕らの姿を認めるなり、\nスタスタこちらに近づいてくる。
2563 = "Nhưng——\\x%l機関士;#00ffc040;lái tàu%l;#; Munakata vừa nhận ra chúng tôi, đã bước nhanh về phía này."
# monologue
# JP: オリヴィも慌てて口をつぐんで、\nけれど気にした風もなく、その足取りをパタパタと追う。
2622 = "Olivy cũng vội vàng ngậm miệng lại, nhưng không có vẻ gì là bận tâm, em ấy lạch bạch chạy theo sau."
# 【双鉄】
# display as 雙鐵
# JP: 「遠路はるばるありがとうございます。宗方\\x%l機関士;#00ffc040;機関士%l;#;。\n[はやと,1]早戸までお迎えにあがろうと思っていたのですが――」
1826 = "「Cảm ơn chú đã lặn lội đường xa đến đây. \\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata. Cháu định đến tận Hayato để đón chú nhưng mà——」"
# 【宗方】
# display as 宗方
# JP: 「いや、問題の地点を[せんけん,1]線見したくもあったし、\n話をもらった……別件というか、関連というか」
2040 = "「Không, tôi cũng muốn đi khảo sát trước địa điểm xảy ra vấn đề, và cũng vì chuyện mà cậu đã nói... gọi là chuyện khác, hay chuyện liên quan nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、保線専門会社の件ですね。急な話で恐縮でしたが、\n前向きなご検討をいただけているようで、何よりです」
1732 = "「Vâng, là chuyện về công ty chuyên \\x%l保線;#00ffc040;bảo trì đường ray%l;#;. Thật ngại quá vì chuyện quá gấp gáp, nhưng chú đang xem xét nó một cách tích cực, như vậy là tốt quá rồi.」"
# 【宗方】
# display as 宗方
# JP: 「率直にいって、興味深く思っている。\n詳しく話を聞きたいと」
1840 = "「Thành thật mà nói, tôi thấy rất hứng thú. Tôi muốn nghe chi tiết hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご説明の準備は出来ているかと思います。\nよろしければ、こちらへ」
1919 = "「Cháu nghĩ là đã chuẩn bị xong phần giải thích rồi. Nếu chú không phiền, xin mời lối này.」"
# 【宗方】
# display as 宗方
# JP: 「ああ」
1796 = "「À」"
# monologue
# JP: 僕が先頭、隣にハチロク。
2814 = "Tôi đi đầu, bên cạnh là Hachiroku."
# monologue
# JP: 続いて宗方\\x%l機関士;#00ffc040;機関士%l;#;で、\nその周辺をまたちょこちょこと――
2525 = "Tiếp theo là \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, và xung quanh chú ấy lại là Olivy đang lăng xăng——"
# 【宗方】
# display as 宗方
# JP: 「オリヴィ――っと、いや。\nすまん、すみません、右田\\x%l機関士;#00ffc040;機関士%l;#;」
1786 = "「Olivy——à, không. Xin lỗi, xin lỗi cậu, \\x%l機関士;#00ffc040;lái tàu%l;#; Migita.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。なんでしょう」
1925 = "「Vâng. Có chuyện gì vậy ạ」"
# monologue
# JP: 振り返り見れば、\n宗方\\x%l機関士;#00ffc040;機関士%l;#;が困ったような顔をしている。
2826 = "Ngoảnh lại nhìn, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata đang có vẻ mặt bối rối."
# monologue
# JP: オリヴィがなにかしたのかと一瞬思うが、\nどうにも……そんな様子でもない。
2819 = "Thoáng nghĩ hay là Olivy đã làm gì đó, nhưng có vẻ... không phải như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1739 = "「Hửm?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま。旧帝鉄では、経営レベルの会議にはまず、\n\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は同席いたしませんので」
2252 = "「Ngài Soutetsu. Ở Teitetsu cũ, trong các cuộc họp cấp quản lý, \\x%lレイルロオド;#00ffc040;Railord%l;#; thường không được tham dự ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1751 = "「A」"
# monologue
# JP: ゆえ、宗方\\x%l機関士;#00ffc040;機関士%l;#;はオリヴィの同席を止めようとして、\nしかし、オリヴィの今の所属を思い出した。
2835 = "Vì vậy, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata định ngăn Olivy tham dự, nhưng rồi chú ấy nhớ ra nơi Olivy đang trực thuộc hiện tại."
# monologue
# JP: そこで僕に、というわけか――
2839 = "Và thế là chú ấy quay sang tôi, ra là vậy——"
# 【双鉄】
# display as 雙鐵
# JP: 「ご配慮ありがとうございます。ですが、今回の会議には、\nオリヴィにもハチロクにも同席してもらいます」
1909 = "「Cảm ơn sự tinh tế của chú. Nhưng trong cuộc họp lần này, cháu muốn cả Olivy và Hachiroku cùng tham dự.」"
# 【宗方】
# display as 宗方
# JP: 「これも？\n御社のトップナンバー・レイロオドはともかくとして」
1606 = "「Cả nhóc này sao? Railord số một của quý công ty thì không nói làm gì」"
# monologue
# JP: 心底、驚いているような声。\n文化の違いとはこういうことかと、つくづく思う。
2486 = "Giọng nói thể hiện sự ngạc nhiên từ tận đáy lòng. Sự khác biệt về văn hóa là như thế này đây, tôi thực sự cảm nhận được điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道は、オリヴィの蓄積してきた知識を\n積極的に活用したいと考えていますので」
1760 = "「Đường sắt Ohito muốn tích cực tận dụng những kiến thức mà Olivy đã tích lũy được.」"
# 【宗方】
# display as 宗方
# JP: 「蓄積？」
2070 = "「Tích lũy?」"
# monologue
# JP: 戸惑ったように動いた視線は、\nけれどもすぐに、ふっと落ち着きの色を帯びる。
2743 = "Ánh mắt đảo quanh bối rối, nhưng ngay lập tức, lấy lại vẻ bình tĩnh."
# 【宗方】
# display as 宗方
# JP: 「ああ、そうか。\n車歴なら百年を越えているのか」
1715 = "「À, ra vậy. Lịch sử hoạt động của nhóc này đã hơn một trăm năm rồi sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよだよ！　オリヴィ！\nハチロクよりもベテランなんだからっ！」
1860 = "「Đúng vậy đúng vậy! Olivy! Là một người dày dặn kinh nghiệm hơn cả Hachiroku đó nha!」"
# 【宗方】
# display as 宗方
# JP: 「……\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;など、\n普通は二、三十年で解体されるものだ」
1139 = "「...\\x%lレイルロオド;#00ffc040;Railord%l;#; thì, bình thường chỉ hai, ba mươi năm là bị tháo dỡ rồi.」"
# monologue
# JP: そのまままじまじ、\n宗方\\x%l機関士;#00ffc040;機関士%l;#;はオリヴィの顔を見つめる。
2664 = "Cứ thế chằm chằm, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata nhìn thẳng vào mặt Olivy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふあっ！」
1665 = "「Phu a!」"
# monologue
# JP: 途端、オリヴィは視線をそらして、\nひどくもじもじし始める。
2642 = "Ngay lập tức, Olivy ngoảnh mặt đi, và bắt đầu vặn vẹo đầy bối rối."
# 【宗方】
# display as 宗方
# JP: 「……\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の車歴など気にもしなかったが――\nそうか。言われてみれば、百年以上の蓄積か」
1159 = "「...Tôi chưa bao giờ để tâm đến lịch sử hoạt động của \\x%lレイルロオド;#00ffc040;Railord%l;#; nhưng—— Ra là vậy. Nói mới nhớ, là sự tích lũy của hơn một trăm năm sao.」"
# monologue
# JP: （ぼふっ）
2902 = "（Bụp）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！！」
1689 = "「!!!」"
# monologue
# JP: もう一度、さっきよりすこし乱暴に、\nオリヴィの帽子の上に、分厚い手のひらが乗せられる。
2482 = "Lại một lần nữa, mạnh bạo hơn lúc nãy một chút, bàn tay dày cộp đặt lên chiếc mũ của Olivy."
# 【ハチロク】
# display as 八六
# JP: 「……この上ない賞賛、でございますね」
1169 = "「...Một lời khen ngợi không gì sánh bằng nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1849 = "「Ừm」"
# monologue
# JP: 『お前も大したものだったのだな』\n――そんな言葉が、語られぬままに伝わってくる。
2899 = "Nhóc cũng cừ lắm đấy chứ' ——Dù không nói ra, nhưng lời đó vẫn truyền đạt được."
# monologue
# JP: オリヴィの顔がどんどん赤く――いや、いかん！\nこのままでは体温を上昇させすぎてしまう。
2635 = "Khuôn mặt Olivy ngày càng đỏ bừng——Không, không ổn rồi! Cứ thế này thì nhiệt độ cơ thể em ấy sẽ tăng quá cao mất."
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、そういう事情ですので」
2078 = "「Dù sao thì, tình hình là như vậy.」"
# 【宗方】
# display as 宗方
# JP: 「承知した。\nいや、余計なことで時間を取らせてすまなかった」
1988 = "「Tôi hiểu rồi. Không, xin lỗi vì đã làm mất thời gian của cậu bằng những chuyện bao đồng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いえ――」
2039 = "「Không đâu ạ——」"
# monologue
# JP: 線路を渡り、裏口からレールショップに入っていけば――
2809 = "Băng qua đường ray, đi vào Rail Shop từ cửa sau thì——"
# 【ポーレット】
# display as 波萊特
# JP: 「宗方\\x%l機関士;#00ffc040;機関士%l;#;、ようこそいらっしゃいました」
1827 = "「\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata, chào mừng chú đã đến đây.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、御一夜鉄道へようこそですよぉ」
1746 = "「U hu hu, chào mừng chú đến với Đường sắt Ohito nha~」"
# 【稀咲】
# display as 稀咲
# JP: 「コーヒーと紅茶、どちらがお好みですか？」
2137 = "「Chú thích uống cà phê hay trà đen ạ?」"
# 【宗方】
# display as 宗方
# JP: 「ああ――その――恐縮です。\nその、コーヒーの方を」
1661 = "「A——à——ngại quá. Vậy, cho tôi xin một tách cà phê.」"
# 【稀咲】
# display as 稀咲
# JP: 「よかった！　どうぞ、淹れたてですよ？」
2222 = "「May quá! Xin mời, cà phê vừa mới pha xong đấy ạ.」"
# monologue
# JP: 下にも置かぬもてなしだ。
2469 = "Một sự tiếp đón vô cùng chu đáo."
# monologue
# JP: ポーレットとれいなの歓迎ならば常のことだが、\nそこに稀咲も加わると、迫力さえをも感じてしまう。
3045 = "Sự chào đón của Paulette và Reina thì là chuyện thường tình rồi, nhưng khi có cả Kisaki tham gia, tôi thậm chí còn cảm thấy có chút áp lực."
# 【双鉄】
# display as 雙鐵
# JP: 「どうぞ、こちらの席に」
1903 = "「Xin mời chú ngồi ghế này.」"
# 【宗方】
# display as 宗方
# JP: 「ああ――うむ。あ、いや、ありがとうございます」
1692 = "「A——ừm. À không, cảm ơn cậu.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへ～っ」
1681 = "「E he he~」"
# monologue
# JP: それがごくごく当然と、\nオリヴィは宗方\\x%l機関士;#00ffc040;機関士%l;#;の隣に座り――
2963 = "Coi đó là điều hiển nhiên, Olivy ngồi xuống cạnh \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata và——"
# monologue
# JP: （ずっ――ずずっ）
3075 = "（Kéo——kéo kéo）"
# monologue
# JP: イスをずらして、ずらして、ずらして、\n距離を少しずつ詰めていく。
2957 = "Em ấy nhích ghế, nhích ghế, nhích ghế, từng chút một thu hẹp khoảng cách."
# 【宗方】
# display as 宗方
# JP: 「ああ……その……こういう空気は慣れんですし、\n保線現場も早く確かめたいので――その、本題を」
1694 = "「A... ừm... tôi không quen với bầu không khí thế này cho lắm, với lại tôi cũng muốn nhanh chóng kiểm tra hiện trường \\x%l保線;#00ffc040;bảo trì đường ray%l;#; nên——ừm, vào vấn đề chính đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。ふふっ、やっぱりお仕事最優先。\nオリヴィちゃんのお話どおりの方ですね」
1799 = "「Cháu hiểu rồi. Fufu, quả nhiên công việc là ưu tiên hàng đầu. Chú đúng là người y hệt như những gì bé Olivy đã kể.」"
# 【宗方】
# display as 宗方
# JP: 「あ――」
2174 = "「A——」"
# monologue
# JP: ポリっ、と軽く顎を掻き、宗方\\x%l機関士;#00ffc040;機関士%l;#;が苦笑する。\nオリヴィの方へ顔を向け。
2662 = "Gãi nhẹ cằm, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata cười khổ. Quay mặt về phía Olivy."
# 【宗方】
# display as 宗方
# JP: 「っ！！？」
1667 = "「!!?」"
# monologue
# JP: 思わぬ近さに驚いて、\nそうして、ハハハと笑い出す。
2493 = "Bất ngờ vì khoảng cách quá gần, rồi sau đó, chú ấy bật cười ha hả."
# 【宗方】
# display as 宗方
# JP: 「それなら、ネコをかぶっても仕方ない。\n俺は、どこにでもいる\\x%l保線;#00ffc040;保線%l;#;上がりの\\x%l機関士;#00ffc040;機関士%l;#;です」
2212 = "「Nếu vậy thì, tôi cũng không cần phải giả vờ nữa. Tôi chỉ là một \\x%l機関士;#00ffc040;lái tàu%l;#; đi lên từ \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, có thể bắt gặp ở bất cứ đâu thôi.」"
# 【稀咲】
# display as 稀咲
# JP: 「どこにでもいる、では無いでしょう。保線技術講習会に、\n帝鉄時代からほとんど欠かさず参加してらっしゃるとか」
1848 = "「Đâu thể bắt gặp ở bất cứ đâu được ạ. Nghe nói chú hầu như không bỏ sót một buổi hội thảo kỹ thuật bảo trì đường ray nào, từ hồi còn ở Teitetsu đến giờ.」"
# 【宗方】
# display as 宗方
# JP: 「！」
2185 = "「!」"
# 【ポーレット】
# display as 波萊特
# JP: 「み鉄さんでも、保線部の相談役だとお伺いしました。\nどこにでもいる方には、なかなか出来ないことかと」
2083 = "「Cháu nghe nói ở Đường sắt Mikan, chú cũng là cố vấn của bộ phận bảo trì đường ray. Một người có thể bắt gặp ở bất cứ đâu thì khó mà làm được như vậy lắm ạ.」"
# 【宗方】
# display as 宗方
# JP: 「……」
1132 = "「...」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！？　オリヴィじゃないよ！\nそこまでクワシク話してないよ！」
1670 = "「!!? Không phải Olivy đâu nha! Olivy không kể CHI TIẾT đến mức đó đâu!」"
# 【稀咲】
# display as 稀咲
# JP: 「ああ、失礼。自己紹介が遅れてしまいました。\nボクは、隈元銀行御一夜支店長の宝生稀咲です」
1705 = "「A, thất lễ quá. Cháu giới thiệu bản thân hơi muộn. Cháu là Houshou Kisaki, Giám đốc chi nhánh Ohimitera của Ngân hàng Kumamoto.」"
# 【宗方】
# display as 宗方
# JP: 「あ、これは失礼。俺――自分は宗方[じんろく,1]甚六。\nみかん鉄道\\x%l機関士;#00ffc040;機関士%l;#;です」
1708 = "「A, tôi mới là người thất lễ. Tôi——tên là Munakata Jinroku. \\x%l機関士;#00ffc040;Lái tàu%l;#; của Đường sắt Mikan.」"
# monologue
# JP: 稀咲の差し出す名刺は薄紫――\n『銀行だけの肩書』のものだ。
2938 = "Tấm danh thiếp Kisaki đưa ra có màu tím nhạt—— Là loại danh thiếp mang 'chức danh của ngân hàng'."
# monologue
# JP: ならば今日は、純粋な銀行支店長として、\n銀行のみの利害を重視し、調査をすすめる腹なのだろう。
3033 = "Nếu vậy thì hôm nay, với tư cách thuần túy là một giám đốc chi nhánh ngân hàng, cô ấy sẽ đặt lợi ích của ngân hàng lên hàng đầu để tiến hành khảo sát."
# 【稀咲】
# display as 稀咲
# JP: 「本件――保線専門の請負会社の設立計画については、\n当行が主体となって、調査をすすめています」
2243 = "「Về vấn đề này——kế hoạch thành lập công ty chuyên thầu bảo trì đường ray, ngân hàng chúng tôi đang đóng vai trò chủ đạo trong việc tiến hành khảo sát.」"
# 【宗方】
# display as 宗方
# JP: 「“調査”。なるほど」
1124 = "「'Khảo sát'. Ra là vậy.」"
# monologue
# JP: ――稀咲提案の、保線専門の請負会社。\nその目的は、保線技術・人的資源の集約と最適化だ。
3027 = "——Công ty chuyên thầu bảo trì đường ray do Kisaki đề xuất. Mục đích của nó là tập trung và tối ưu hóa kỹ thuật bảo trì đường ray cùng nguồn nhân lực."
# monologue
# JP: 鉄道各社が保線部門をそれぞれ抱えているよりも、\n専門会社に集中させて運用する方が、効率がいい。
2878 = "Thay vì mỗi công ty đường sắt tự duy trì một bộ phận bảo trì đường ray riêng, việc tập trung vào một công ty chuyên môn để vận hành sẽ mang lại hiệu quả cao hơn."
# 【宗方】
# display as 宗方
# JP: 「しかし、銀行さんがどうしてそんな？」
1634 = "「Nhưng mà, tại sao phía ngân hàng lại quan tâm đến việc đó?」"
# monologue
# JP: 効率化うんぬんについては理解してくれているのだろう。\n宗方さんの質問は、最初から根っこの部分へ向かう。
2921 = "Có lẽ chú ấy đã hiểu về vấn đề tối ưu hóa hiệu quả. Câu hỏi của Munakata nhắm thẳng vào gốc rễ của vấn đề ngay từ đầu."
# 【宗方】
# display as 宗方
# JP: 「このご時世、鉄道で儲けるのは厳しいでしょうに」
1979 = "「Thời buổi này, kiếm tiền từ đường sắt khó khăn lắm mà.」"
# 【稀咲】
# display as 稀咲
# JP: 「確かに。ので御一夜市、御一夜鉄道とヴィジョンを\n共有し、シナジーある展開をと考えている最中です」
1900 = "「Đúng là vậy. Vì thế chúng tôi đang trong quá trình chia sẻ tầm nhìn với thành phố Ohimitera, và Đường sắt Ohito, để cùng nhau phát triển tạo ra sức mạnh tổng hợp.」"
# 【宗方】
# display as 宗方
# JP: 「ビジョンを共有する？」
1596 = "「Chia sẻ tầm nhìn?」"
# 【稀咲】
# display as 稀咲
# JP: 「そこは、雛衣市長から」
2181 = "「Về phần đó, xin mời Thị trưởng Hinai.」"
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜市がすすめる、“蒸気のふるさと”構想を、\n更に推し進めていこうという発想です」
1847 = "「Ý tưởng là thúc đẩy mạnh mẽ hơn nữa dự án 'Quê hương của hơi nước', mà thành phố Ohimitera đang tiến hành.」"
# 【宗方】
# display as 宗方
# JP: 「と、いうことは――」
2127 = "「Nói như vậy, có nghĩa là——」"
# monologue
# JP: 宗方さんが、また顎をかく。\n考え事をするときのクセなのだろう。
2703 = "Munakata lại gãi cằm. Chắc hẳn đó là thói quen mỗi khi suy nghĩ."
# 【宗方】
# display as 宗方
# JP: 「術仙車両工場だけにとどまらず、\\x%l保線;#00ffc040;保線%l;#;についても、\n御一夜回りに集積させ。言うなら“鉄道の御一夜”と？」
1525 = "「Không chỉ dừng lại ở nhà máy chế tạo toa xe Jutsu-sen, mà cả về \\x%l保線;#00ffc040;bảo trì đường ray%l;#;, cũng sẽ tập trung xung quanh Ohimitera. Có thể gọi là 'Ohimitera của đường sắt' sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そのとおりです」
1593 = "「Đúng là như vậy ạ.」"
# monologue
# JP: ポーレットの頷きには満足感だけが漂っている。\nオリヴィの話しどおり、そして稀咲の調査どおり。
2894 = "Cái gật đầu của Paulette chỉ toát lên sự mãn nguyện. Đúng như lời Olivy nói, và đúng như khảo sát của Kisaki."
# monologue
# JP: 宗方さんは学習意欲が高く、状況把握能力の高い――\n極めて現場向きの、仕事のできる人間だろうと感じられる。
2805 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata có tinh thần ham học hỏi cao, khả năng nắm bắt tình hình nhạy bén—— Có thể cảm nhận được chú ấy là một người cực kỳ phù hợp với công việc thực tế, một người rất có năng lực."
# 【ポーレット】
# display as 波萊特
# JP: 「かつて御一夜は、鉄道の一大\\x%lターミナル駅;#00ffc040;ターミナル駅%l;#;でした。\n復線により、その再現を目指していくと同時に」
1886 = "「Trước đây, Ohimitera từng là một \\x%lターミナル駅;#00ffc040;ga đầu mối%l;#; đường sắt lớn. Thông qua việc khôi phục các tuyến đường, chúng cháu hướng tới việc tái hiện lại điều đó, đồng thời」"
# 【れいな】
# display as 玲奈
# JP: 「昔の[こくら,1]粉蔵みたいに、九洲の鉄道ぜぇんぶをお手当できる。\nポーレットは御一夜をそういうふうにしたいんですよぉ」
1658 = "「Giống như Kokura ngày xưa, có thể bảo dưỡng cho toàn bộ đường sắt ở Kyushu. Paulette muốn biến Ohimitera thành một nơi như vậy đó ạ~」"
# monologue
# JP: 帝鉄文化を知らぬがゆえに、\nいつものように、いつもと全く変わらずに。
2875 = "Vì không biết văn hóa của Teitetsu, nên như mọi khi, hoàn toàn không có gì thay đổi."
# monologue
# JP: ポーレットの上機嫌につられたれいなが、\nポーレットの言葉の続きをひきとり、つむぐ。
2549 = "Reina bị cuốn theo tâm trạng vui vẻ của Paulette, đã tiếp lời và nói ra những suy nghĩ của Paulette."
# 【ハチロク】
# display as 八六＆奥莉薇
# JP: 「！」\n「れいな」
1687 = "「「!」 「Reina」」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、なんですかぁ？？？」
1734 = "「Vâng ạ, có chuyện gì vậy ạ???」"
# monologue
# JP: 思わず息を呑むハチロク・オリヴィにも、\nれいなは変わらぬにこにこ顔だ。
2519 = "Ngay cả khi Hachiroku và Olivy bất giác nín thở, Reina vẫn giữ nụ cười tươi rói không đổi."
# 【宗方】
# display as 宗方
# JP: 「[こくら,1]粉蔵のイメージか……粉蔵と比べ、御一夜は物流経路で\nかなりのハンディを背負いそうだが」
1955 = "「Hình ảnh của Kokura sao... So với Kokura, Ohimitera có vẻ sẽ phải gánh chịu khá nhiều bất lợi về tuyến đường logistics đấy.」"
# monologue
# JP: が、宗方さんはれいなの言葉を――御一夜鉄道の文化を、\n少なくとも表面上は、気にせず受け入れてくれている。
2565 = "Nhưng, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata đã đón nhận lời nói của Reina——văn hóa của Đường sắt Ohito, ít nhất là ngoài mặt, mà không hề bận tâm."
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、その通りですね」
1744 = "「U hu hu, đúng là như vậy ạ.」"
# monologue
# JP: ポーレットの顔がほころび、稀咲の眉も僅かにあがる。\n見かけによらぬ柔軟性――これは、思わぬ収穫だ。
2893 = "Gương mặt Paulette rạng rỡ, lông mày Kisaki cũng khẽ nhướng lên. Sự linh hoạt không thể đánh giá qua vẻ bề ngoài——đây là một thu hoạch ngoài mong đợi."
# 【ポーレット】
# display as 波萊特
# JP: 「ですので当初は、実績を積みつつ、\n人的資源のみを集約していくことを、目標とします」
1949 = "「Vì vậy, trong giai đoạn đầu, vừa tích lũy thành tích, chúng cháu đặt mục tiêu chỉ tập trung vào nguồn nhân lực trước ạ.」"
# monologue
# JP: 車両デザイン・改修に関しても\\x%l保線;#00ffc040;保線%l;#;に関しても。\n実績を積み、人を集めて、受注する仕事を拡大していく。
2471 = "Về cả thiết kế, cải tạo toa xe, lẫn \\x%l保線;#00ffc040;bảo trì đường ray%l;#;. Tích lũy thành tích, thu hút nhân tài, và mở rộng quy mô công việc nhận thầu."
# monologue
# JP: 鉄道事業そのものの信頼感を回復し、将来性を期待させ、\nそれを復線の動きにつなげ、路線網を復活させていく。
2918 = "Khôi phục niềm tin vào chính ngành đường sắt, khơi dậy kỳ vọng vào tương lai, biến điều đó thành động lực khôi phục các tuyến đường, và hồi sinh mạng lưới đường sắt."
# 【稀咲】
# display as 稀咲
# JP: 「最終的な構想としては、粉蔵、鹿兒島の車両工場を復活。\n術仙を三拠点の中心にしたい、という絵図面になるね」
2092 = "「Tầm nhìn cuối cùng là khôi phục các nhà máy chế tạo toa xe ở Kokura và Kagoshima. Jutsu-sen sẽ trở thành trung tâm của ba cứ điểm, đó là bản thiết kế của chúng tôi.」"
# 【宗方】
# display as 宗方
# JP: 「ほう、それは遠大な」
1758 = "「Chà, đó quả là một kế hoạch dài hạn.」"
# 【れいな】
# display as 玲奈
# JP: 「九洲で成功したら、うふふぅ」
1819 = "「Nếu thành công ở Kyushu, u hu hu~」"
# monologue
# JP: れいなが笑う。
2908 = "Reina cười."
# monologue
# JP: 笑ってぽーんと、\n‘遠大”をまるごと、さらに大きな風呂敷で包む。
3043 = "Cười rồi 'bộp' một cái, gói gọn toàn bộ sự 'dài hạn' đó bằng một tấm khăn gói đồ lớn hơn nữa."
# 【れいな】
# display as 玲奈
# JP: 「きっと、日ノ本の他のところも、\nみぃんな真似して、おんなじことをしてくれますよぉ」
2234 = "「Chắc chắn, những nơi khác ở Hinomoto cũng, sẽ bắt chước theo, và làm những điều tương tự đó ạ~」"
# 【宗方】
# display as 宗方
# JP: 「！」
1686 = "「!」"
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜鉄道自身も、将来的な延伸を計画してます。\n最優先は、御一夜－八ツ城の川線の復線。それから」
2089 = "「Bản thân Đường sắt Ohito cũng đang lên kế hoạch mở rộng trong tương lai. Ưu tiên hàng đầu là khôi phục Tuyến sông Ohimitera - Yatsushiro. Sau đó」"
# 【宗方】
# display as 宗方
# JP: 「ちょ、ちょっと待ってくれ――待ってください」
2173 = "「Ch, chờ một chút đã——xin hãy đợi một chút.」"
# monologue
# JP: 宗方さんが顎を激しくしごくようにし、首を振る。
2720 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata vuốt mạnh cằm và lắc đầu."
# 【宗方】
# display as 宗方
# JP: 「そこまで大きな話になると、俺――\n私には、どうにも、夢物語にしか聞こえなくなる」
2143 = "「Khi câu chuyện trở nên lớn lao đến mức đó, với tôi—— với tôi, nó nghe chẳng khác nào một câu chuyện viển vông.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、すいません。興奮して、ついつい余計なことまで」
1707 = "「A, cháu xin lỗi. Cháu phấn khích quá, nên lỡ lời nói hơi nhiều.」"
# monologue
# JP: ポーレットがペコリと頭を下げる、れいなも下げる。
2890 = "Paulette cúi đầu xin lỗi, Reina cũng cúi đầu theo."
# 【宗方】
# display as 宗方
# JP: 「いや、俺の頭が固く、古いだけのことだろう」
1520 = "「Không, chỉ là do đầu óc tôi cứng nhắc và cổ hủ quá thôi.」"
# monologue
# JP: 宗方さんも頭を下げて――オリヴィまでがそれに合わせる。
2695 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata cũng cúi đầu——và thậm chí cả Olivy cũng làm theo."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なんかごめんね。ムナカタ、そういう人だから」
1793 = "「Có gì xin lỗi nha. Munakata là người như vậy đó.」"
# 【宗方】
# display as 宗方
# JP: 「おい」
1720 = "「Này」"
# monologue
# JP: 怒ったふりの、けれども怒気をふくまぬ言葉。\nほんのり、空気がやわらかになる。
2919 = "Lời nói giả vờ tức giận, nhưng lại không chứa chút giận dữ nào. Bầu không khí trở nên dịu nhẹ đi một chút."
# 【ポーレット】
# display as 波萊特
# JP: 「とにかく保線専門の請負会社は、単体での計画ではなく、\n他との連携を前提にした、実現可能な計画なんです」
2079 = "「Tóm lại, công ty chuyên thầu bảo trì đường ray không phải là một kế hoạch đơn lẻ, mà là một kế hoạch khả thi, dựa trên tiền đề hợp tác với các bên khác ạ.」"
# 【宗方】
# display as 宗方
# JP: 「そこは理解できた――かと思います」
1936 = "「Điểm đó thì tôi đã hiểu——tôi nghĩ vậy.」"
# 【稀咲】
# display as 稀咲
# JP: 「双方の希望が合致すれば、同社立ち上げメンバーとして、\n来年４月以降、宗方氏の招聘を、我々は検討しています」
1880 = "「Nếu mong muốn của cả hai bên đều thống nhất, chúng tôi đang xem xét việc mời chú Munakata về làm thành viên sáng lập công ty từ tháng 4 năm sau.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「Really！！？」
2279 = "「Really!!?」"
# monologue
# JP: オリヴィの喉から歓喜の声。\n宗方氏の意向が確定するまで、ぬか喜びをさせぬよう――
2637 = "Tiếng hoan hô bật ra từ cổ họng Olivy. Cho đến khi ý định của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata được xác nhận, để không làm em ấy mừng hụt——"
# monologue
# JP: そう配慮をしていたのだが、\nこの状況では、やむを得まい。
2810 = "Dù đã cân nhắc như vậy, nhưng trong tình huống này, cũng đành chịu thôi."
# 【ポーレット】
# display as 波萊特
# JP: 「同時に\\x%l機関士;#00ffc040;機関士%l;#;・\\x%l機関助士;#00ffc040;機関助士%l;#;の指導を主務とした御一夜鉄道\n[しょくたく,1]嘱託職員としても勤務して貰えればと思っています」
2104 = "「Đồng thời, chúng cháu cũng hy vọng chú có thể làm việc như một nhân viên \\x%l嘱託;#00ffc040;hợp đồng%l;#; của Đường sắt Ohito, với nhiệm vụ chính là hướng dẫn \\x%l機関士;#00ffc040;lái tàu%l;#; và \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！！」
1674 = "「!!!」"
# monologue
# JP: オリヴィの目が、こぼれそうなほどまんまるになる。\nが――こちらの方が、当然すぎる要望だ。
2557 = "Mắt Olivy mở to đến mức như sắp rơi ra ngoài. Nhưng——đây mới là yêu cầu hiển nhiên hơn cả."
# monologue
# JP: （懸念であった\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;扱いの違いについても、\n大きな問題にはならなさそうである以上――）
3078 = "（Vì có vẻ như sự khác biệt trong cách đối xử với \\x%lレイルロオド;#00ffc040;Railord%l;#; vốn là điều đáng lo ngại, cũng sẽ không thành vấn đề lớn——）"
# monologue
# JP: 帝鉄全盛期に教導を任され、今なお現役である\\x%l機関士;#00ffc040;機関士%l;#;。
2710 = "Một \\x%l機関士;#00ffc040;lái tàu%l;#; được giao phó việc hướng dẫn vào thời kỳ hoàng kim của Teitetsu, và hiện tại vẫn đang làm việc."
# monologue
# JP: 新人を増員、育成していかねばならぬ\nこれからの御一夜鉄道に、これほど好適な人材も無かろう。
2753 = "Đối với Đường sắt Ohito trong tương lai, khi cần phải tuyển thêm và đào tạo nhân viên mới, không có nhân tài nào phù hợp hơn chú ấy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それならそれなら！　それならさ！！」
1976 = "「Nếu vậy nếu vậy! Nếu vậy thì!!」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！？」
1794 = "「Bé Olivy!?」"
# monologue
# JP: 宗方\\x%l機関士;#00ffc040;機関士%l;#;の前であるのに、\nもうオリヴィは、完全に僕らの前でのオリヴィだ。
2858 = "Dù đang ở trước mặt \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, nhưng Olivy đã hoàn toàn trở lại là Olivy khi ở trước mặt chúng tôi."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;！　\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のケンシューとか\nケンキューするしせつも、オヒトヨとかジュツセンに！」
2191 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#;! Cơ sở bảo dưỡng hay nghiên cứu \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng nên đặt ở Ohitoyo hoặc Jutsu-sen đi!」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！！！」
1703 = "「A!!!」"
# 【れいな】
# display as 玲奈
# JP: 「でもでも、とろるゆのおばあさん、\nそういうのしてくれなさそうって思いますぅ」
1635 = "「Nhưng mà nhưng mà, bà lão ở Tororyu-yu, Reina nghĩ bà ấy sẽ không chịu làm những việc như vậy đâu ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だからトロルユのおばーさんには、ムナカタとおなじ！\n現場じゃなくて、アドバイザー役をやってもらうの！！」
1946 = "「Vì thế nên bà lão ở Tororyu-yu cũng giống như Munakata vậy! Không phải ở hiện trường, mà sẽ đảm nhận vai trò cố vấn!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうか、第一線の研究員を、\n不死鳥博士――[おおみや,1]旺宮から派遣してもらうなどして」
1684 = "「A! Đúng rồi, chúng ta có thể nhờ Tiến sĩ Fushichou——từ Omiya cử các nhà nghiên cứu hàng đầu đến hỗ trợ.」"
# 【ハチロク】
# display as 八六
# JP: 「それは……ありかもしれませんね。[おおみや,1]旺宮ー[ひろしま,1]廣島ー御一夜に、\nまがりなりにも、交流が発生しはじめたのですし」
2176 = "「Điều đó... có thể khả thi đấy ạ. Dù sao thì giữa Omiya, Hiroshima và Ohimitera, cũng đã bắt đầu có sự giao lưu rồi mà.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でしょでしょ！？　わざわざオーミヤおくらなくても\nケンシューできるなら、お仕事きっとたくさん来るし！」
1862 = "「Đúng không đúng không!? Nếu không cần gửi đến tận Omiya mà vẫn có thể bảo dưỡng được, thì chắc chắn sẽ có rất nhiều công việc đổ về!」"
# monologue
# JP: こく、と何かを飲み下す音。\n顔を向ければ、稀咲がコーヒーカップを置いている。
3042 = "Ực, tiếng nuốt thứ gì đó. Quay sang nhìn, Kisaki đang đặt tách cà phê xuống."
# 【稀咲】
# display as 稀咲
# JP: 「……\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;検修というのにはどの程度の需要が？\nその単価と利益率、九洲内での現在の需給動向は？」
1130 = "「...Nhu cầu về việc bảo dưỡng \\x%lレイルロオド;#00ffc040;Railord%l;#; ở mức độ nào? Đơn giá, tỷ suất lợi nhuận, và xu hướng cung cầu hiện tại ở Kyushu ra sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「その辺は精査したことないです。けど……第一印象では、\nこれ、多分、いけそうなアイディアな気がします」
2178 = "「Về những phần đó thì cháu chưa từng xem xét kỹ. Nhưng... ấn tượng ban đầu thì, đây, có lẽ, là một ý tưởng rất có triển vọng.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「フシチョーハカセだって絶対キョーリョクしてくれる！\nだって、オリヴィとかハチロクとかのデータ」
1529 = "「Tiến sĩ Fushichou chắc chắn cũng sẽ HỢP TÁC! Bởi vì, dữ liệu của Olivy, Hachiroku và mọi người」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1682 = "「A——」"
# monologue
# JP: そこまでは、僕も迂闊にも気づいてなかった。\nしかし、確かにその通りだ。
2860 = "Đến tận lúc đó, ngay cả tôi cũng sơ suất không nhận ra. Nhưng, quả thực đúng là như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、九洲に拠点を作るということは、\n九洲の\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に関するデータを大量に――」
1850 = "「Đúng rồi, việc xây dựng cứ điểm ở Kyushu có nghĩa là, một lượng lớn dữ liệu về \\x%lレイルロオド;#00ffc040;Railord%l;#; ở Kyushu sẽ——」"
# 【ハチロク】
# display as 八六
# JP: 「不死鳥博士が直接的に収集できるようになる――\nということでもあるのですね」
2085 = "「Tiến sĩ Fushichou sẽ có thể trực tiếp thu thập được—— Có nghĩa là như vậy đúng không ạ.」"
# monologue
# JP: 実際、御一夜鉄道では旺宮を使っていなかった。\n同様の小規模鉄道事業者も決して少なくはなかろう。
2477 = "Thực tế, Đường sắt Ohito đã không sử dụng Omiya. Chắc chắn cũng có không ít các doanh nghiệp đường sắt quy mô nhỏ tương tự như vậy."
# monologue
# JP: そうしてそうした小規模鉄道事業者ほど、\n老朽化した\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を稼働させている率は、高い。
2970 = "Và đối với những doanh nghiệp đường sắt quy mô nhỏ đó, tỷ lệ vận hành các \\x%lレイルロオド;#00ffc040;Railord%l;#; đã cũ kỹ là rất cao."
# 【双鉄】
# display as 雙鐵
# JP: 「それはまさに……不死鳥博士が最も欲しがっている\n情報のひとつに違いない」
2097 = "「Đó chắc chắn... là một trong những thông tin mà Tiến sĩ Fushichou đang khao khát nhất.」"
# 【ハチロク】
# display as 八六
# JP: 「ですので、“絶対協力してくれる”。そしてそれは、\n延命などの研究に大きく寄与する可能性を持つ」
1944 = "「Vì thế nên, 'chắc chắn sẽ hợp tác'. Và điều đó, có khả năng đóng góp to lớn vào các nghiên cứu như kéo dài tuổi thọ.」"
# 【れいな】
# display as 玲奈
# JP: 「ふわわぁ！　すごいですぅ、オリヴィさん。\nれいな、そんなことぜぇんぜん思いつきませんでしたぁ」
1672 = "「Oa! Chị Olivy giỏi quá đi. Reina hoàn toàn không nghĩ ra được chuyện như vậy đâu ạ.」"
# monologue
# JP: ごくごく素直な賞賛に、オリヴィの顔が笑み崩れる。
2641 = "Trước lời khen ngợi vô cùng chân thành, khuôn mặt Olivy rạng rỡ hẳn lên."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「メイジからずっと走ってきてるから！　その分たくさん、\n見て、聞いて、\\x%l共感;#00ffc040;共感%l;#;してきたし、それにっ！」
1790 = "「Bởi vì chị đã chạy suốt từ thời Meiji mà! Vì thế nên chị đã nhìn thấy, nghe thấy, và \\x%l共感;#00ffc040;cộng cảm%l;#; rất nhiều, hơn nữa nhé!」"
# monologue
# JP: オリヴィがイスから立ち上がり、\n宗方\\x%l機関士;#00ffc040;機関士%l;#;にぱっ！　と近寄る。
2629 = "Olivy đứng dậy khỏi ghế, nhanh chóng! tiến lại gần \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「コーシューカイとかそういうのには、ムナカタ、\nオリヴィもついていっていいっていってくれたから！」
2086 = "「Những buổi HỘI THẢO hay những thứ tương tự, Munakata cũng đã cho phép Olivy đi cùng mà!」"
# monologue
# JP: 驚きにだろう。やはり丸くなっていた宗方\\x%l機関士;#00ffc040;機関士%l;#;の目が、\n理解の色に落ち着いていく。
2665 = "Có lẽ là do ngạc nhiên. Đôi mắt vốn đang tròn xoe của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, dần chuyển sang ánh nhìn thấu hiểu."
# monologue
# JP: ならばあるいは、鉄道事業者の経営についてなど――\nそうした講習も、宗方さんは受講していたのかもしれん。
2830 = "Nếu vậy thì có lẽ, về quản lý doanh nghiệp đường sắt hay những thứ tương tự—— Những bài giảng đó, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata cũng đã từng tham gia."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、オリヴィの知ってるダイジなことは、\nぜーんぶムナカタが教えてくれたんだよ！！」
1943 = "「Vì thế nên, những điều QUAN TRỌNG mà Olivy biết, tất cả đều là do Munakata dạy cho đó!!」"
# 【宗方】
# display as 宗方
# JP: 「……買い被りすぎだ」
1170 = "「...Đánh giá quá cao rồi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへー」
1750 = "「E he he~」"
# monologue
# JP: 宗方\\x%l機関士;#00ffc040;機関士%l;#;が立ちあがり、\nほんの一瞬、オリヴィの帽子に手のひらを置く。
2663 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata đứng dậy, trong một thoáng, đặt lòng bàn tay lên chiếc mũ của Olivy."
# monologue
# JP: そして表情を引き締めて、\nまっすぐポーレットに向き直る。
2903 = "Rồi chú ấy nghiêm mặt lại, quay thẳng về phía Paulette."
# 【宗方】
# display as 宗方
# JP: 「――み鉄には世話になりました。\n定年までは勤めきり、恩を返したいと思っています」
2010 = "「——Tôi đã chịu nhiều ân huệ của Đường sắt Mikan. Tôi muốn làm việc đến lúc nghỉ hưu để báo đáp ân tình đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「失礼ですが、ご定年をお迎えになられるのは」
2194 = "「Xin thất lễ, nhưng thời điểm chú nghỉ hưu là」"
# 【宗方】
# display as 宗方
# JP: 「再来年の三月になります」
1934 = "「Tháng 3 năm sau nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「でしたら。もちろん再来年までお待ちします。\n定年明けの四月から勤務いただく形で――」
2217 = "「Nếu vậy. Tất nhiên chúng cháu sẽ đợi đến năm sau nữa. Bắt đầu làm việc từ tháng 4 sau khi chú nghỉ hưu——」"
# 【稀咲】
# display as 稀咲
# JP: 「それまでの間も、可能でしたら月一ペース程度で、\n外部顧問のような形での関与を願えればと」
1805 = "「Trong khoảng thời gian từ giờ đến lúc đó, nếu có thể, khoảng một tháng một lần, chúng tôi hy vọng chú có thể tham gia dưới hình thức cố vấn bên ngoài.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　はい、そうです。そうしていただけましたら、\nわたくしどもとしては一番、助かります」
1702 = "「A! Vâng, đúng vậy ạ. Nếu chú có thể làm như vậy, đối với chúng cháu sẽ là một sự giúp đỡ lớn nhất.」"
# monologue
# JP: ポーレットの誠意と、稀咲の現実的なセンスと。\nその双方が、見事に噛み合い機能している。
2892 = "Sự chân thành của Paulette, và ý thức thực tế của Kisaki. Cả hai yếu tố đó đang kết hợp và phát huy tác dụng một cách hoàn hảo."
# monologue
# JP: それを好感してくれたのか、宗方さんの引き締まった顔が、\nふ、と緩む。
2997 = "Có lẽ vì có ấn tượng tốt với điều đó, khuôn mặt nghiêm nghị của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, khẽ giãn ra."
# 【宗方】
# display as 宗方
# JP: 「……定年退職した後でも、私が蓄積した経験が、\n御社や鉄道の役に立つなら、嬉しいことです」
1147 = "「...Sau khi nghỉ hưu, nếu những kinh nghiệm tôi tích lũy được, có thể giúp ích cho quý công ty và ngành đường sắt, thì tôi rất sẵn lòng.」"
# 【ポーレット】
# display as 波萊特
# JP: 「でしたら！」
2209 = "「Nếu vậy thì!」"
# 【宗方】
# display as 宗方
# JP: 「ポストや報酬については、今日の仕事振りを見てもらい、\n提示を貰うような形でどうでしょうか？」
2103 = "「Về vị trí và thù lao, xin hãy xem xét cách làm việc của tôi ngày hôm nay, rồi đưa ra đề xuất, như vậy được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「お金のことでしたらっ」
2117 = "「Nếu là chuyện tiền bạc thì」"
# 【稀咲】
# display as 稀咲
# JP: 「もちろん、そのようにご相談させていただければと」
1924 = "「Tất nhiên rồi, chúng tôi muốn bàn bạc với chú theo hướng đó.」"
# monologue
# JP: 興奮気味のポーレットの声を遮って、\nお金についてを、稀咲が引き取る。
2936 = "Cắt ngang giọng nói đầy phấn khích của Paulette, Kisaki tiếp nhận phần nói về tiền bạc."
# monologue
# JP: ポーレットが軽々に報酬を弾み過ぎぬよう、ここだけは、\n銀行家でなく、御一夜鉄道経営顧問になってくれている。
2554 = "Để tránh việc Paulette đưa ra mức thù lao quá hời một cách dễ dãi, chỉ riêng điểm này, cô ấy không phải là nhân viên ngân hàng, mà đang đóng vai trò cố vấn quản lý của Đường sắt Ohito."
# 【宗方】
# display as 宗方
# JP: 「なら。そういうことで」
2239 = "「Nếu vậy. Thì quyết định như thế đi.」"
# monologue
# JP: 軽く一礼。\n宗方さんが振り向けば、オリヴィもすぐにその後を追う。
2705 = "Khẽ cúi chào. Khi \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata quay người lại, Olivy cũng lập tức đi theo sau."
# 【宗方】
# display as 宗方
# JP: 「右田\\x%l機関士;#00ffc040;機関士%l;#;。早速で悪いが、\n連絡をもらった支障個所に連れていってくれ」
1642 = "「\\x%l機関士;#00ffc040;Lái tàu%l;#; Migita. Ngại quá vì phải đi ngay, nhưng phiền cậu dẫn tôi đến chỗ xảy ra sự cố mà cậu đã liên lạc.」"
# monologue
# JP: 小畑を越えた8620を早戸駅の留置線にいれ、\nエアクラトラックで三十分ほど戻って隆起現場へ。
2811 = "Đưa chiếc 8620 vừa vượt qua Okoba vào đường ray lưu đỗ ở ga Hayato, chúng tôi quay lại hiện trường phồng rộp bằng xe tải Aircra mất khoảng ba mươi phút."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「どーお？　ムナカタ」
1836 = "「Sao rồi? Munakata」"
# monologue
# JP: 何十度目か。全く同じオリヴィの問い。
2627 = "Đã là lần thứ mấy chục rồi. Vẫn cùng một câu hỏi đó của Olivy."
# 【宗方】
# display as 宗方
# JP: 「……目星はいくつか」
1162 = "「...Cũng có vài manh mối.」"
# monologue
# JP: 『焦るな』ではない言葉がついに、\n宗方\\x%l機関士;#00ffc040;機関士%l;#;の口から出て来る。
3025 = "Cuối cùng thì những lời không phải là 'Đừng nôn nóng' cũng thốt ra từ miệng \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「いくつかって！？」
2192 = "「Vài manh mối là sao!?」"
# 【宗方】
# display as 宗方
# JP: 「この広範な隆起なら、モグラや木の根の可能性は消せる。\n\\x%l枕木;#00ffc040;枕木%l;#;の凍結膨張も、この気温では発生しない」
2246 = "「Với diện tích phồng rộp rộng thế này, có thể loại trừ khả năng do chuột chũi hay rễ cây. Việc \\x%l枕木;#00ffc040;tà vẹt%l;#; đóng băng và giãn nở cũng không thể xảy ra ở nhiệt độ này.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
1723 = "「Ừm!」"
# 【宗方】
# display as 宗方
# JP: 「だから、\n水脈、ガス、地中流動あたりがひとまず怪しい」
1950 = "「Vì vậy, mạch nước ngầm, khí gas, hoặc dòng chảy ngầm dưới lòng đất là những khả năng đáng ngờ nhất lúc này.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「チチューリュードー？」
1761 = "「DÒNG CHẢY NGẦM?」"
# 【宗方】
# display as 宗方
# JP: 「地盤が流れて動き、その影響が地表にでることだ。\nたしか、このあたりは――」
1864 = "「Là hiện tượng nền đất trôi đi và dịch chuyển, ảnh hưởng của nó bộc lộ lên bề mặt. Nếu tôi nhớ không lầm, khu vực này là——」"
# 【ハチロク】
# display as 八六
# JP: 「鹿兒島県[きりしま,1]霧縞市[はやとちょう,2]早戸町、でございます」
2133 = "「Là thị trấn Hayato, thành phố Kirishima, tỉnh Kagoshima ạ.」"
# 【宗方】
# display as 宗方
# JP: 「[きりしま,1]霧縞なら温泉地、火山帯だ。\n今あげた可能性の、どれも十分にありえるな」
1765 = "「Nếu là Kirishima thì là vùng suối nước nóng, vành đai núi lửa. Những khả năng tôi vừa nêu, khả năng nào cũng hoàn toàn có thể xảy ra.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうなんだ！」
1995 = "「Ra là vậy!」"
# monologue
# JP: ハチロクからの適時・正確な報告に、\n礼のひとつも返ってこない。
2569 = "Trước báo cáo kịp thời và chính xác của Hachiroku, không hề có một lời cảm ơn nào đáp lại."
# monologue
# JP: この辺はやはり文化の違いを思ってしまうが、\nハチロクもオリヴィも、まったく気にする風もない。
2802 = "Điểm này quả thực khiến tôi nghĩ đến sự khác biệt về văn hóa, nhưng cả Hachiroku và Olivy đều không có vẻ gì là bận tâm."
# 【宗方】
# display as 宗方
# JP: 「これから掘る全ての地点、計測して記録しておけ」
1961 = "「Từ giờ trở đi, hãy đo đạc và ghi chép lại tất cả những điểm sẽ đào.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！」
1980 = "「Rõ rồi!」"
# monologue
# JP: （『物』としての\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;か）
3071 = "（\\x%lレイルロオド;#00ffc040;Railord%l;#; với tư cách là một 'vật dụng' sao）"
# monologue
# JP: ……宗方さんの接し方を見ていれば、わかってくる。\n宗方さんはオリヴィを、確かによく使いこなしている。
1097 = "...Nhìn cách đối xử của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, tôi cũng hiểu ra phần nào. \\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata quả thực sử dụng Olivy rất thành thạo."
# monologue
# JP: 手に馴染むペンばかりを酷使してしまうのと同様に、\n細かなことでも大きなことでも――
2484 = "Giống như việc chỉ sử dụng đến mức lạm dụng cây bút quen tay, dù là chuyện nhỏ nhặt hay to tát——"
# 【宗方】
# display as 宗方
# JP: 「ガンスコ」
1869 = "「Gansuko.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
1802 = "「Vâng!」"
# monologue
# JP: オリヴィは飛ぶように駆け、ガンスコを――
2644 = "Olivy chạy như bay, lấy Gansuko——"
# monologue
# JP: \\x%lバラスト;#00ffc040;バラスト%l;#;ごと掘り返せる、先端にフォークがついている\n保線用のスコップを、抱えて戻る。
2760 = "Mang theo chiếc xẻng chuyên dụng cho bảo trì đường ray, có phần mũi dạng nĩa để đào cả \\x%lバラスト;#00ffc040;đá ba-lát%l;#; quay trở lại."
# 【宗方】
# display as 宗方
# JP: 「持ってろ」
2177 = "「Cầm lấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
# 1723 = "「嗯！」" 
# monologue
# JP: カメラと書類バサミをオリヴィに預け、\n宗方さんは無造作にガンスコを隆起部分――
2713 = "Giao máy ảnh và kẹp tài liệu cho Olivy, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata thản nhiên dùng Gansuko đào phần bị phồng rộp——"
# monologue
# JP: 線路を避けた、犬走りのあたりから掘り進んでいく。
2914 = "Tránh phần đường ray, chú ấy bắt đầu đào từ khu vực lối đi dành cho chó."
# monologue
# JP: （ざくっ！　ざくっ！　ざくっ！　ざくっ！）
3066 = "（Phập! Phập! Phập! Phập!）"
# monologue
# JP: （パシャ）
3068 = "（Tách）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1752 = "「A——」"
# monologue
# JP: 『記録』とは、位置情報だけではないのか。
2538 = "Ghi chép' không chỉ là thông tin vị trí sao."
# monologue
# JP: それが当然といった仕草でオリヴィは、\n宗方さんの作業の様子を撮影している。
2962 = "Bằng một cử chỉ coi đó là điều hiển nhiên, Olivy dang chụp ảnh lại quá trình làm việc của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata."
# 【宗方】
# display as 宗方
# JP: 「……わからんな」
1156 = "「...Không rõ nguyên nhân.」"
# monologue
# JP: 宗方さんが他の地点へ移動する。
2717 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata di chuyển sang địa điểm khác."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ここ、埋め戻す？」
2184 = "「Chỗ này, lấp lại nhé?」"
# 【宗方】
# display as 宗方
# JP: 「埋め戻せ」
1572 = "「Lấp lại đi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！」
1797 = "「Rõ rồi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そのくらいは僕がやろう」
1717 = "「A, việc cỏn con đó cứ để tôi làm cho.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがと！　ソーテツ！！」
1768 = "「Cảm ơn nha! Soutetsu!!」"
# monologue
# JP: 引き受けるやいなやで、\n嬉しげにオリヴィは宗方\\x%l機関士;#00ffc040;機関士%l;#;へとすっとんで行く。
2620 = "Vừa mới nhận lời xong, Olivy đã vui vẻ chạy tót đến chỗ \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし……」
1536 = "「Nhưng mà...」"
# monologue
# JP: （ざくっ――ざくっ――）
# 3066 = "（一陣翻土聲）" 
# monologue
# JP: ……実によく働く。宗方さんも、オリヴィも。\n感心させられると同時に、理解もさせられる。
1103 = "...Thực sự làm việc rất chăm chỉ. Cả \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata và Olivy. Vừa thán phục, đồng thời tôi cũng hiểu ra."
# monologue
# JP: オリヴィは、働くことが、使われることが幸せなのだ。\nそれが宗方さんにであれば、おそらく、何より――
2979 = "Olivy hạnh phúc khi được làm việc, khi được sử dụng. Nếu người đó là \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, thì có lẽ, hơn bất cứ điều gì——"
# 【ハチロク】
# display as 八六
# JP: 「あの……双鉄さま？」
2132 = "「Dạ... ngài Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1739 = "「嗯？」" 
# 【ハチロク】
# display as 八六
# JP: 「わたくしにも、お手伝いをさせてください」
2136 = "「Xin hãy để em giúp ngài một tay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、そのままでかまわない。つまり、宗方さんの\n作業の様子を、観察、記録してほしい」
1539 = "「Không, em cứ đứng đó là được rồi. Tóm lại, tôi muốn em quan sát và ghi chép lại quá trình làm việc của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata.」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1696 = "「啊！」" 
# monologue
# JP: ほっとしたようなハチロクの声。\nついで、トーンがひそっ、と落ちる。
2511 = "Giọng Hachiroku nghe như trút được gánh nặng. Tiếp đó, tông giọng trầm xuống thì thầm."
# 【ハチロク】
# display as 八六
# JP: 「左様でございましたね。\nそれは、双鉄さまの大事なお仕事でございますものね」
2250 = "「Đúng là như vậy nhỉ. Đó là công việc quan trọng của ngài Soutetsu mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1722 = "「嗯」" 
# monologue
# JP: 埋め戻しをしながらでも見るは見れるが、やはり気が散る。\n報告のため、ハチロクには観察に集中してほしい。
3044 = "Dù vừa lấp đất vừa quan sát cũng được, nhưng quả nhiên vẫn sẽ bị phân tâm. Để phục vụ cho việc báo cáo, tôi muốn Hachiroku tập trung vào việc quan sát."
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。必ずや、双鉄さまにかわって」
1932 = "「Em hiểu rồi ạ. Nhất định, em sẽ thay mặt ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「よろしく頼む」
1959 = "「Nhờ em cả đấy.」"
# monologue
# JP: となれば、僕も埋め戻しだけでは申し訳ない。\n宗方\\x%l機関士;#00ffc040;機関士%l;#;はいかにも壮健そうに見えるが、定年間際だ。
2849 = "Nếu vậy, tôi cũng thấy áy náy nếu chỉ lấp đất. \\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata tuy trông có vẻ tráng kiện, nhưng cũng sắp đến tuổi nghỉ hưu rồi."
# monologue
# JP: この残暑の中、一番キツイ肉体労働を\n彼だけにさせるというのは、人間として間違っていよう。
2583 = "Trong cái nắng nóng oi ả cuối hè này, để một mình chú ấy làm công việc chân tay nặng nhọc nhất thì xét về mặt tình người, thật không phải đạo."
# 【双鉄】
# display as 雙鐵
# JP: 「埋め戻しました。他にも、手伝いできることがあれば」
1929 = "「Cháu lấp xong rồi ạ. Ngoài ra, nếu có việc gì cần giúp đỡ」"
# 【宗方】
# display as 宗方
# JP: 「いや、掘る方には手は出さないでくれ。\nさっきも言ったが、ガスの可能性もある」
1541 = "「Không, xin đừng nhúng tay vào việc đào bới. Như tôi đã nói lúc nãy, cũng có khả năng là khí gas.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1695 = "「A」"
# monologue
# JP: 宗方さんへと近づいていた足が、思わず止まる。\nオリヴィは、べったりと宗方\\x%l機関士;#00ffc040;機関士%l;#;にくっついたままだ。
2864 = "Đôi chân đang tiến lại gần \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata bất giác dừng lại. Olivy vẫn bám chặt lấy \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata không rời."
# monologue
# JP: 物であるゆえ、気にせず使える。\n――そうした信頼もあるのだと、思わぬところで思い知る。
2874 = "Vì là vật dụng, nên có thể sử dụng mà không cần bận tâm. ——Thì ra cũng có sự tin tưởng như vậy, tôi chợt nhận ra điều đó ở một khía cạnh không ngờ tới."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーだよ！　ガスが吹き出たらアブナイし！\nこっちはムナカタとオリヴィにまかせていーよ！！」
1858 = "「Đúng vậy đó! Nếu khí gas phun ra thì NGUY HIỂM LẮM! Bên này cứ giao cho Munakata và Olivy là được rồi!!」"
# 【宗方】
# display as 宗方
# JP: 「汗」
1963 = "「Mồ hôi」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うんっ！」
# 1723 = "「嗯！」" 
# monologue
# JP: 確かにこの件に関し、僕らには経験も知識も無い。
2916 = "Quả thực trong chuyện này, chúng tôi không có kinh nghiệm cũng như kiến thức."
# monologue
# JP: ガスの危険は無視できないし、オリヴィの言にははっきり、\n『邪魔しないで』という響きも感じて――ああ、いや。
2910 = "Mối nguy hiểm từ khí gas là không thể xem thường, và trong lời nói của Olivy rõ ràng có mang âm hưởng 'Đừng làm kỳ đà cản mũi'——a, không phải."
# 【双鉄】
# display as 雙鐵
# JP: 「では、周辺情報の収集はどうでしょうか。\n今の仮説を元にして、この地域の地勢や歴史など」
2232 = "「Vậy thì, việc thu thập thông tin xung quanh thì sao ạ. Dựa trên giả thuyết hiện tại, về địa thế và lịch sử của khu vực này chẳng hạn」"
# 【宗方】
# display as 宗方
# JP: 「それは助かる」
2057 = "「Thế thì tốt quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロク。僕は見る方にもどるゆえ」
2230 = "「Nếu vậy Hachiroku. Tôi sẽ quay lại việc quan sát」"
# 【ハチロク】
# display as 八六
# JP: 「ですが、双鉄さま」
2251 = "「Nhưng mà, ngài Soutetsu.」"
# monologue
# JP: 困ったように下がった眉毛。\n見た瞬間に、昨夜の記憶が蘇る。
2516 = "Đôi lông mày cụp xuống đầy vẻ bối rối. Nhìn thấy biểu cảm đó, ký ức đêm qua lập tức ùa về."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！\nそうか、保線記録が廃棄されていたのだったか」
1700 = "「A! Đúng rồi, hồ sơ bảo trì đường ray đã bị tiêu hủy rồi nhỉ.」"
# 【宗方】
# display as 宗方
# JP: 「廃棄？」
2240 = "「Tiêu hủy?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、左様です。この[やません,1]山線――元帝鉄[ひさつ,1]肥颯線、\n御一夜ー早戸間は、軍用路線だったとのことで」
2025 = "「Vâng, đúng vậy ạ. \\x%lTuyến núi%l;#; này——nguyên là Tuyến Hisatsu của Teitetsu, đoạn Ohimitera - Hayato, được cho là tuyến đường sắt quân sự」"
# 【宗方】
# display as 宗方＆奥莉薇
# JP: 「ああ」\n「グンヨーロセン？」
2182 = "「「A」 「Tuyến đường quân sự?」」"
# 【双鉄】
# display as 雙鐵
# JP: 「文字通り、\\x%l大戦;#00ffc040;大戦%l;#;に備えるために国家計画として[ふせつ,1]敷設\nされた路線だ。海沿いでは、艦砲射撃の危険があるゆえ」
2257 = "「Đúng như tên gọi, đây là tuyến đường được xây dựng theo kế hoạch quốc gia để chuẩn bị cho \\x%l大戦;#00ffc040;Đại chiến%l;#;. Vì nếu đi dọc bờ biển sẽ có nguy cơ bị pháo hạm bắn phá」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、だからこんな山の中にも、\nめっちゃくちゃキツイ線路しいたんだねー、ナットクー」
1713 = "「A~, thảo nào mà ở tận trong sâu trong núi thế này, lại có một tuyến đường sắt ĐỈNH CỦA CHÓP như vậy, HIỂU RỒI~」"
# monologue
# JP: オリヴィの感心の声にふと、かつての自分を思い出す。\n海沿いを走る東峡道線と、山間を抜ける忠央線。
2633 = "Nghe giọng điệu thán phục của Olivy, tôi chợt nhớ lại bản thân mình trước kia. Tuyến Toukaido chạy dọc bờ biển, và Tuyến Chuuou băng qua những dãy núi."
# monologue
# JP: 艦砲射撃のおそれがあったがゆえの両線敷設と――\nそれを教えてくれたのは、出会った頃のハチロクだったか。
2876 = "Việc xây dựng cả hai tuyến đường là do lo ngại nguy cơ bị pháo hạm bắn phá—— Người đã cho tôi biết điều đó, là Hachiroku hồi chúng tôi mới gặp nhau thì phải."
# 【ハチロク】
# display as 八六
# JP: 「今はみかん鉄道様の[せんだい,1]千内－[やつしろ,2]八ツ城を含む旧鹿兒島本線と、\n旧[ひさつ,1]肥颯線との関係は、帝都まわりで申しましたら」
2091 = "「Mối quan hệ giữa Tuyến chính Kagoshima cũ (hiện tại bao gồm đoạn Sendai - Yatsushiro của Đường sắt Mikan) và Tuyến Hisatsu cũ, nếu so sánh với khu vực thủ đô thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そっくりだな。\n[とうかいどう,2]東峡道線と[ちゅうおう,1]忠央線との関係に」
1736 = "「A, giống hệt nhỉ. Mối quan hệ giữa Tuyến Toukaido và Tuyến Chuuou.」"
# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1695 = "「啊」" 
# monologue
# JP: ハチロクの顔が、瞬時にとろける。\n幸せ色だけで塗りつぶされる。
2520 = "Khuôn mặt Hachiroku ngay lập tức tan chảy. Chỉ còn lại một màu hạnh phúc."
# monologue
# JP: ふたり同時に、おなじ思い出を振り返っていた。\nそれだけのことが、かくも嬉しい。
2812 = "Cả hai chúng tôi cùng lúc, nhớ về cùng một kỷ niệm. Chỉ vậy thôi, cũng đủ khiến tôi vui sướng nhường này."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも、コッカケーカク？　でやったことなら、\nちゃんと記録、のこってるんじゃないの？」
1567 = "「Nhưng mà, KẾ HOẠCH QUỐC GIA? Nếu là việc được thực hiện bởi cái đó, thì chẳng phải ghi chép vẫn còn được lưu lại đàng hoàng sao? Để sau này còn phân tích nguyên nhân thất bại? Không thể áp dụng cho lần sau sao?」"
# 【双鉄】
# display as 雙鐵＆宗方
# JP: 「それは――」\n「逆だ、オリヴィ」
2169 = "「「Chuyện đó thì——」 「Ngược lại đấy, Olivy」」"
# monologue
# JP: ざく、ざく、ざく。\nまた別の地点を掘り返しながら、宗方さんが言う。
2693 = "Phập, phập, phập. \\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata vừa đào một địa điểm khác, vừa nói."
# monologue
# JP: であれば僕は、もちろん黙る。\nオリヴィにも、僕らと同種の幸せを味わってほしいゆえ。
3030 = "Nếu vậy thì tôi, tất nhiên sẽ im lặng. Vì tôi muốn Olivy cũng được nếm trải niềm hạnh phúc giống như chúng tôi."
# 【宗方】
# display as 宗方
# JP: 「敗戦国となったから、資料の全てを廃棄した。\n責任逃れの、よくある手段だ」
2101 = "「Vì trở thành nước bại trận, nên toàn bộ tài liệu đã bị tiêu hủy. Đó là thủ đoạn trốn tránh trách nhiệm thường thấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「？？？　シリョーをのこしといた方が、まけた原因、\nあとでちゃあんと分析できない？　次にいかせない？」
1718 = "「??? Nếu LƯU GIỮ TÀI LIỆU, chẳng phải sau này sẽ dễ dàng phân tích nguyên nhân thất bại sao? Không thể áp dụng cho lần sau sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2185 = "「這！」" 
# monologue
# JP: 言われて、気づく。オリヴィは冥国製――\n先の\\x%l大戦;#00ffc040;大戦%l;#;の戦勝国で製造された\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
2976 = "Nghe vậy, tôi mới nhận ra. Olivy được sản xuất tại Meikoku—— là một \\x%lレイルロオド;#00ffc040;Railord%l;#; được chế tạo ở quốc gia chiến thắng trong cuộc \\x%l大戦;#00ffc040;Đại chiến%l;#; trước."
# monologue
# JP: ぱっと出てくる基本発想の違いが……なるほど、\nあるいは勝敗をわけた一因であるのかもしれん。
2584 = "Sự khác biệt trong tư duy cơ bản bộc lộ ngay lập tức... ra là vậy, có lẽ đó cũng là một trong những nguyên nhân quyết định thắng bại."
# 【宗方】
# display as 宗方
# JP: 「追い詰められれば自分のことしか考えられない。\n人間は――少なくとも俺は、そういう程度だ」
1552 = "「Khi bị dồn vào chân tường, người ta chỉ nghĩ đến bản thân mình thôi. Con người——ít nhất là tôi, cũng chỉ ở mức độ đó.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうなんだー」
1611 = "「Ra là vậy~」"
# monologue
# JP: 受け入れる。自嘲が多分に混じった言葉を、\nオリヴィは、ただ、フォローもせずに受け入れる。
2631 = "Chấp nhận. Lời nói mang đậm tính tự trào, Olivy chỉ đơn giản đón nhận mà không hề nói lời an ủi."
# 【宗方】
# display as 宗方
# JP: 「そのツケは逃げそこねたヤツに回る。\n要領のいい連中は、いつだって食い逃げし続ける」
2095 = "「Hậu quả của việc đó sẽ đổ lên đầu những kẻ không kịp chạy trốn. Còn những kẻ khôn lỏi, lúc nào cũng tiếp tục ăn quỵt rồi chuồn mất.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヨーリョー！\nヒノモトの人たち、すっごくいいよねー！」
1872 = "「KHÔN LỎI! Người Hinomoto, giỏi thật sự luôn đó~!」"
# 【宗方】
# display as 宗方
# JP: 「うん？」
# 1739 = "「嗯？」" 
# monologue
# JP: カラリと晴れた、一点の曇りも混じらぬオリヴィの声。\n会話のズレに、思わずだろう。宗方さんの手が止まる。
2634 = "Giọng nói của Olivy trong trẻo, quang đãng, không một chút vẩn đục. Có lẽ do sự lệch pha trong cuộc trò chuyện. Bàn tay của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata bất giác dừng lại."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「タイセン前につくって、いまもこーんなしっかりしてる\n線路だもん！　ヨーリョー悪くちゃ、作れないよ！！」
2050 = "「Bởi vì, tuyến đường sắt được xây dựng từ trước Đại chiến, đến tận bây giờ vẫn vô cùng chắc chắn thế này mà! Nếu không khôn lỏi thì làm sao mà xây được chứ!!」"
# 【宗方】
# display as 宗方
# JP: 「アホだな、お前は」
1574 = "「Ngốc thật đấy, nhóc con.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええっ！？」
1679 = "「Ế ế ế!?」"
# monologue
# JP: 情け容赦の無い指摘。\nけれど、オリヴィを見る瞳は優しい。
2697 = "Lời chỉ trích không chút nương tình. Nhưng, ánh mắt nhìn Olivy lại rất dịu dàng."
# monologue
# JP: アホと呼ばれたオリヴィも、\nそれさえ嬉しいことかのように、ニコニコしている。
2965 = "Bị mắng là ngốc, nhưng Olivy vẫn cười rạng rỡ, như thể ngay cả điều đó cũng khiến em ấy vui mừng."
# 【宗方】
# display as 宗方
# JP: 「が、まぁ、お前の言う通りだ。\n確かに、この配線も[せこう,1]施行も、見事の一言だ」
1538 = "「Nhưng mà, đúng như lời nhóc nói. Quả thực, cách thiết kế và \\x%l施行;#00ffc040;thi công%l;#; tuyến đường này, chỉ có thể nói là quá tuyệt vời.」"
# monologue
# JP: 言って、ふと、宗方さんの目が僕に向く。
2725 = "Vừa nói, ánh mắt của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata chợt hướng về phía tôi."
# 【宗方】
# display as 宗方
# JP: 「右田さんは大廃線前。御社社長が復線させたがっている、\n[かわせん,1]川線――[おひとよ,2]御一夜ー[やつしろ,2]八ツ城間に乗ったことは？」
1650 = "「Cậu Migita. Trước khi Đại bãi bỏ các tuyến đường sắt diễn ra. Tuyến sông mà ngài Giám đốc quý công ty đang muốn khôi phục—— đoạn Ohimitera - Yatsushiro, cậu đã từng đi qua chưa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いえ……残念ながら。\nしかし、地図や資料では確認しています」
1882 = "「Dạ chưa... thật đáng tiếc. Nhưng cháu đã xem qua trên bản đồ và tài liệu rồi ạ.」"
# 【宗方】
# display as 宗方
# JP: 「なら、気づいたろう。\nあれは――あれも、信じられないくらい丁寧な配線だ」
2231 = "「Nếu vậy thì cậu cũng nhận ra rồi chứ. Đó——tuyến đường đó cũng, được thiết kế cẩn thận đến mức khó tin.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう……なのですか？」
2053 = "「Là... vậy sao ạ?」"
# monologue
# JP: ハチロクと目を見合わせてしまう。
2823 = "Tôi bất giác nhìn sang Hachiroku."
# monologue
# JP: 復線について協議を重ねていた時期に、\nむしろ、僕らは半ばあきれていたものだった。
2581 = "Hồi còn đang bàn bạc về việc khôi phục tuyến đường sắt, ngược lại, chúng tôi đã từng ngán ngẩm về nó."
# 【双鉄】
# display as 雙鐵
# JP: 「べったりとクマ川に沿い、左岸を走ってたかと思えば、\n右岸へ移り、また左岸。なんでこんな配線を、と――」
2001 = "「Cứ bám sát dòng sông Kuma, lúc thì chạy bên tả ngạn, rồi lại chuyển sang hữu ngạn, rồi lại về tả ngạn. Tại sao lại thiết kế đường ray như vậy——」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1696 = "「啊！」" 
# monologue
# JP: またハチロクと目を見合わせる。
2509 = "Lại một lần nữa nhìn sang Hachiroku."
# monologue
# JP: もしもあれが、\n『信じられないくらい丁寧な配線』であるのなら――
2653 = "Nếu đó là, 'một thiết kế cẩn thận đến mức khó tin'——"
# 【双鉄】
# display as 雙鐵
# JP: 「理由があってのことなのですね？　\nわざわざいくつも鉄橋を架けた、あの配線には」
2238 = "「Chắc hẳn phải có lý do đúng không ạ? Việc cố tình xây dựng nhiều cây cầu sắt như vậy, cho thiết kế đường ray đó.」"
# 【宗方】
# display as 宗方
# JP: 「単純に、地盤がしっかりしている側に配線している」
1721 = "「Đơn giản là, họ thiết kế đường ray ở phía có nền đất vững chắc hơn thôi.」"
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「あ！」\n「まぁ！」
1697 = "「「A!」 「Chà!」」"
# 【宗方】
# display as 宗方
# JP: 「[しょうわ,1]正和二十年。国が帝鉄への予算を極端に削減したあの年、\nクマ川はかつてないほどに荒れ狂った」
2015 = "「Năm \\x%l正和;#00ffc040;Showa%l;#; thứ 20. Cái năm mà nhà nước cắt giảm cực độ ngân sách dành cho Teitetsu, sông Kuma đã cuộn trào giận dữ chưa từng thấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「七月のクマ川洪水ですね。資料では見ました」
1865 = "「Trận lũ lụt sông Kuma vào tháng 7 đúng không ạ. Cháu có đọc qua trong tài liệu rồi.」"
# 【宗方】
# display as 宗方
# JP: 「その大水害の時でさえ、川線の線路には被害がなかった。\nあれは、そういう配線だ」
1610 = "「Ngay cả trong trận đại hồng thủy đó, tuyến đường sông vẫn không hề hấn gì. Đó, là một thiết kế đường ray như vậy đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「ま、ぁ……」
2171 = "「Trời, ạ...」"
# monologue
# JP: ハチロクが恥じ入った顔をしている。
2517 = "Hachiroku đang mang vẻ mặt đầy xấu hổ."
# monologue
# JP: 『線路たるもの、直線が基本で究極でしょうに』と、\nあれほど口を尖らせていたゆえのことだろう。
2913 = "Chắc hẳn là do em ấy từng chu mỏ lên mà chê bai rằng, 'Đường ray thì cơ bản và tối ưu nhất phải là đường thẳng chứ'."
# 【ハチロク】
# display as 八六
# JP: 「わたくし、不明でございました」
1839 = "「Em, thật là thiển cận quá ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「大変に勉強になりました」
1769 = "「Cháu đã học hỏi được rất nhiều điều.」"
# monologue
# JP: 大いに感心すると同時に、悪寒を覚える。\n川線同様、この山線も軍用路線。
2817 = "Cùng với sự thán phục, một cơn ớn lạnh chạy dọc sống lưng. Giống như tuyến sông, tuyến núi này cũng là tuyến đường quân sự."
# monologue
# JP: 綿密に計画されて、\n丁寧に配線されたものであるなら――
2853 = "Nếu nó đã được lên kế hoạch tỉ mỉ, và thiết kế đường ray một cách cẩn thận——"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、このタブレットを使い、ナビとも連携し、\nこの周辺の地下水流や、火山活動の情報収集をしてくれ」
1594 = "「Hachiroku, hãy dùng Tablet này, kết hợp với Navi, thu thập thông tin về mạch nước ngầm và hoạt động núi lửa xung quanh đây nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄さま」
1801 = "「Đã rõ, thưa ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「やはり、僕も掘ります。場所と深さを指示してもらい、\nオリヴィに監視してもらうのでどうでしょう？」
2007 = "「Cháu cũng sẽ tham gia đào. Chú cứ chỉ định vị trí và độ sâu, rồi để Olivy giám sát, như vậy được không ạ?」"
# 【宗方】
# display as 宗方
# JP: 「リスクを理解してなら、止めん。\nオリヴィ、見てやれ」
1972 = "「Nếu cậu đã hiểu rõ rủi ro thì tôi không cản. Olivy, giám sát cậu ấy nhé.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！　ムナカタ！　指示ちょーだい！」
1985 = "「Rõ rồi! Munakata! Cho chỉ thị đi!」"
# monologue
# JP: ……イヤな予感は、どんどんふくらむ。\n叶うならこれに、蓋をしたい。
1098 = "...Linh cảm chẳng lành, ngày càng phình to. Nếu được, tôi muốn đậy nắp nó lại."
# monologue
# JP: その可能性を高めるために、恐らくこれが、\n現状最適の人員配置であろうと信じる。
2895 = "Để nâng cao khả năng đó, tôi tin rằng, đây có lẽ là cách bố trí nhân sự tối ưu nhất hiện tại."
# 【宗方】
# display as 宗方
# JP: 「では続けるぞ。\n日暮れまでに、少しでも多く材料を得ておきたい」
2216 = "「Vậy thì tiếp tục thôi. Từ giờ đến lúc mặt trời lặn, phải thu thập thêm càng nhiều manh mối càng tốt.」"
# monologue
# JP: ……“原因は絞りこめるが特定できない”。
1093 = "...\"Có thể khoanh vùng nguyên nhân nhưng không thể xác định chính xác\"."
# monologue
# JP: 僕らの出した報告に、ポーレットが返す言葉は、\n極めて単純明快だ。
2754 = "Trước báo cáo mà chúng tôi đưa ra, lời đáp lại của Paulette, vô cùng đơn giản và rõ ràng."
# 【ポーレット】
# display as 波萊特
# JP: 「でしたら当面、御一夜鉄道としては、\nどのように対処すればいいんでしょうか？」
2224 = "「Nếu vậy thì trước mắt, Đường sắt Ohito, nên đối phó như thế nào ạ?」"
# 【宗方】
# display as 宗方
# JP: 「可能性をひとつひとつあたっていく。\nまずは、ガス」
1927 = "「Lần lượt kiểm tra từng khả năng một. Trước tiên, là khí gas.」"
# monologue
# JP: それに対する宗方さんも、また明快だ。
2966 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata đáp lại cũng rất rõ ràng."
# 【宗方】
# display as 宗方
# JP: 「ガスなら一番話が早い。地中ガス専門の調査会社に、\n依頼して調査してもらえばいいだけですね」
2048 = "「Nếu là khí gas thì giải quyết nhanh nhất. Chỉ cần thuê một công ty chuyên khảo sát khí gas ngầm, nhờ họ đến kiểm tra là xong.」"
# 【ポーレット】
# display as 波萊特
# JP: 「近隣自治体などとの調整は？」
2228 = "「Việc điều phối với các chính quyền địa phương lân cận thì sao ạ?」"
# 【宗方】
# display as 宗方
# JP: 「ひとまずは霧縞市に話せばいいんじゃないですかね？\n市で処理しきれなければ、自動的に県にいくでしょう」
1938 = "「Tạm thời cứ báo cáo với thành phố Kirishima trước đi. Nếu thành phố không xử lý được, tự động họ sẽ chuyển lên tỉnh thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なるほど」
2128 = "「Cháu hiểu rồi.」"
# 【宗方】
# display as 宗方
# JP: 「ガスならそのまま専門家にまかせればいいんですが\n――ガスじゃないと、やっかいですね」
1815 = "「Nếu là khí gas thì cứ giao cho chuyên gia là xong, nhưng——nếu không phải khí gas, thì phiền phức đấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「さっき言ってた――『チチューリュードー』？」
1856 = "「Cái mà lúc nãy chú nói——'DÒNG CHẢY NGẦM' á?」"
# 【宗方】
# display as 宗方
# JP: 「の場合は、こちらからの問題解決方法はない。\nただ、収まってくれるのを待つだけだ」
1813 = "「Trong trường hợp đó, chúng ta không có cách nào để giải quyết vấn đề. Chỉ còn cách chờ đợi nó tự lắng xuống thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですか？」
2062 = "「Vậy sao ạ?」"
# monologue
# JP: 宗方さんの解答はただ、頷きだけだ。\n工夫の余地も妥協の余地も、全く無いと伝わってくる。
2731 = "Câu trả lời của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata chỉ là một cái gật đầu. Truyền đạt rõ ràng rằng hoàn toàn không có chỗ cho sự thỏa hiệp hay giải pháp nào khác."
# 【双鉄】
# display as 雙鐵
# JP: 「解決できないのなら――\n当座の対処としては、どうすれば？」
1817 = "「Nếu không thể giải quyết—— Vậy trước mắt, chúng ta phải làm gì?」"
# 【宗方】
# display as 宗方
# JP: 「継続監視と、周辺情報の収集。それしかない」
1627 = "「Tiếp tục giám sát, và thu thập thông tin xung quanh. Chỉ có cách đó thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「継続監視と」
2080 = "「Tiếp tục giám sát và」"
# 【ハチロク】
# display as 八六
# JP: 「情報収集」
1563 = "「Thu thập thông tin.」"
# monologue
# JP: ハチロクと顔を見合わせたなら、\nオリヴィがふふん！　と誇らしげな声を出す。
2824 = "Không cần tôi và Hachiroku nhìn nhau, Olivy đã hừm! một tiếng đầy tự hào."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「保線小屋たてればいーんだよ！\nそれで、できるだけ長い時間ミハリするの！！」
1630 = "「Xây chòi bảo trì đường ray là được mà! Rồi cố gắng CANH GÁC càng lâu càng tốt!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2068 = "「Ra là vậy.」"
# monologue
# JP: ……常設の保線員を置くことは難しかろうが、\n交代制で詰めていくことなら不可能でない。
1109 = "...Việc bố trí nhân viên bảo trì đường ray thường trực có lẽ sẽ khó khăn, nhưng nếu phân công trực theo ca thì không phải là không thể."
# monologue
# JP: 小畑線の保線体制の再整備は、\nどのみち必要なことでもあるし――
2528 = "Việc tổ chức lại hệ thống bảo trì đường ray cho tuyến Okoba, đằng nào cũng là việc cần thiết——"
# 【ポーレット】
# display as 波萊特
# JP: 「それは、なんとかできると思います」
2111 = "「Chuyện đó, cháu nghĩ có thể xoay xở được.」"
# monologue
# JP: 視線で問いかけるまでもなく、\nポーレットも同意の言葉をくれる。
2898 = "Không cần tôi phải đưa mắt hỏi, Paulette cũng đã lên tiếng đồng tình."
# 【ハチロク】
# display as 八六
# JP: 「もう一つの、周辺情報の収集、とおっしゃいますのは」
2235 = "「Việc còn lại, thu thập thông tin xung quanh, ý chú là sao ạ」"
# 【宗方】
# display as 宗方
# JP: 「あのあたりは山を抜けた[ひらち,1]平地だ。\n人家も店も周辺にある」
2175 = "「Khu vực đó là \\x%l平地;#00ffc040;đồng bằng%l;#; sau khi vượt qua núi. Xung quanh có nhà dân và cửa hàng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。つまりは聞き込みを？」
1906 = "「Ra là vậy. Tức là đi hỏi thăm dò la sao?」"
# 【宗方】
# display as 宗方
# JP: 「聞き込みを行い、ビラを配布する。\n『水や地面に異変があったらこちらへご連絡を』と」
1953 = "「Đi hỏi thăm, và phát tờ rơi. Nội dung là 'Nếu thấy có bất thường về nước hoặc mặt đất, xin vui lòng liên hệ'.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それなら一度ですみますね。\nなんとかできそう」
2226 = "「Nếu vậy thì chỉ cần làm một lần là xong nhỉ. Chắc là làm được thôi.」"
# 【宗方】
# display as 宗方
# JP: 「いや、数週間もおけばそんな話はすっかり忘れる。\nので、できれば一～二週おきに、定期調査を」
1532 = "「Không, để vài tuần là người ta quên sạch ngay. Nên nếu được, hãy tiến hành khảo sát định kỳ, khoảng một đến hai tuần một lần.」"
# 【双鉄】
# display as 雙鐵
# JP: 「週単位で――ですか」
2255 = "「Tính theo tuần——sao ạ.」"
# 【宗方】
# display as 宗方
# JP: 「これは、初回の調査で協力的だったところだけでいい。\n話し相手がほしい老人などは、喜んで応じてくれがちだ」
1565 = "「Chỉ cần đến những nơi đã hợp tác tốt trong lần khảo sát đầu tiên là được. Những người già muốn có người trò chuyện thường sẽ rất sẵn lòng tiếp đón.」"
# monologue
# JP: 力強い指示が続く。
2723 = "Những chỉ thị mạnh mẽ liên tục được đưa ra."
# monologue
# JP: ほぼ間違いなくそうした措置を、宗方さんは経験している。\nその感覚が、不安をいくらか和らげてくれる。
2975 = "Gần như chắc chắn \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata đã từng có kinh nghiệm xử lý những biện pháp như vậy. Cảm giác đó giúp tôi vơi bớt phần nào sự bất an."
# 【双鉄】
# display as 雙鐵
# JP: 「それであれば――継続可能かもしれません」
2106 = "「Nếu vậy thì——có lẽ chúng ta có thể duy trì được.」"
# monologue
# JP: 申し訳ないが、凪や日々姫にも手伝ってもらおう。\n人当たりの良さが、ここでは大きな武器となろう。
2923 = "Thật ngại quá, nhưng chắc phải nhờ Nagi và Hibiki giúp một tay rồi. Sự hòa đồng, thân thiện của hai đứa sẽ là một vũ khí lớn ở đây."
# 【宗方】
# display as 宗方
# JP: 「訪問は必ずふたり一組。\nトラブルがあれば、すぐに警察に通報。これも徹底」
2131 = "「Khi đến thăm, bắt buộc phải đi theo nhóm hai người. Nếu có rắc rối, phải báo cảnh sát ngay lập tức. Phải tuân thủ triệt để điều này.」"
# 【れいな】
# display as 玲奈
# JP: 「とらぶるなんてあるんですかぁ？」
2190 = "「Có thể có rắc rối gì sao ạ?」"
# 【宗方】
# display as 宗方
# JP: 「無いとは断言できないがゆえの、対策だ。\n安全が第一の使命なことは、どの状況でも変わらん」
2021 = "「Đó là biện pháp phòng ngừa, vì không thể khẳng định chắc chắn là không có. An toàn là sứ mệnh hàng đầu, dù trong bất kỳ hoàn cảnh nào cũng không thay đổi.」"
# 【れいな】
# display as 玲奈
# JP: 「わ、そうですねぇ。ほんとですぅ」
1676 = "「Oa, đúng vậy nhỉ. Đúng là thế ạ.」"
# monologue
# JP: こくこくうなずくれいなを膝に乗せたまま、\nポーレットはメモを書きつらねていく。
2586 = "Vẫn để Reina đang gật gù trên đùi, Paulette liên tục ghi chép lại."
# 【ポーレット】
# display as 波萊特
# JP: 「ふたり一組……ってなると――」
1810 = "「Đi theo nhóm hai người... nếu vậy thì——」"
# monologue
# JP: ペンの動きがふと止まる。
2649 = "Động tác bút chợt dừng lại."
# 【ポーレット】
# display as 波萊特
# JP: 「調査にあたるものには、\\x%l保線;#00ffc040;保線%l;#;の専門知識が必須ですか？\nそれとも、場合によってはアルバイトを雇うなどして」
2236 = "「Những người tham gia khảo sát, có bắt buộc phải có kiến thức chuyên môn về \\x%l保線;#00ffc040;bảo trì đường ray%l;#; không ạ? Hay tùy trường hợp, có thể thuê người làm thêm cũng được」"
# 【宗方】
# display as 宗方
# JP: 「一人は必ず、\\x%l保線;#00ffc040;保線%l;#;・土木の経験者を。『水が臭う』\n『地面が凹んだ』など、わかりやすい話とは限らない」
2261 = "「Một người trong nhóm bắt buộc phải là người có kinh nghiệm về \\x%l保線;#00ffc040;bảo trì đường ray%l;#; hoặc thổ mộc. Những lời phàn nàn không phải lúc nào cũng dễ hiểu như 'Nước có mùi' hay 'Mặt đất bị lún'.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは……もう少し具体的にお願いできますか？」
2172 = "「Chuyện đó... chú có thể giải thích cụ thể hơn một chút được không ạ?」"
# 【宗方】
# display as 宗方
# JP: 「わかりやすくいうと……」
2074 = "「Nói một cách dễ hiểu thì...」"
# monologue
# JP: そこで、宗方さんが悩んでしまう。\n例え話は不得意らしい。
2715 = "Tới đây, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata lại tỏ ra bối rối. Có vẻ như chú ấy không giỏi lấy ví dụ cho lắm."
# monologue
# JP: 視線で問えば、すぐ頷きがかえってくる。
2846 = "Tôi đưa mắt hỏi, và lập tức nhận được cái gật đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「例えば『庭木が急に枯れてしまった』。その話を\n『園芸のことか』と聞き流すようでは極めて厳しい」
2029 = "「Ví dụ như 'Cây trong vườn tự nhiên chết khô'. Nghe chuyện đó mà lại bỏ ngoài tai nghĩ rằng 'Chắc là chuyện làm vườn' thì cực kỳ gay go.」"
# 【れいな】
# display as 玲奈
# JP: 「それも、\\x%l保線;#00ffc040;保線%l;#;に関係してくるおはなしですかぁ？」
2179 = "「Chuyện đó cũng, liên quan đến \\x%l保線;#00ffc040;bảo trì đường ray%l;#; sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論。害虫やら農薬の誤散布やら、\n単なる園芸の話であろう確率の方が高かろう。が――」
2052 = "「Tất nhiên rồi. Mặc dù xác suất cao đó chỉ là chuyện làm vườn bình thường, như do sâu bệnh hay phun nhầm thuốc trừ sâu. Nhưng——」"
# 【宗方】
# display as 宗方
# JP: 「ガスの発生や地下水の流れの変動、地中温度の変化など\nの可能性にも気づかないのでは、話にもならん」
1807 = "「Nếu không nhận ra khả năng đó có thể là do rò rỉ khí gas, biến động dòng chảy ngầm, hay thay đổi nhiệt độ lòng đất, thì chẳng làm ăn được gì đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そっか――それなら経験者必須ですね。なるほどです」
1997 = "「Ra là vậy——Nếu thế thì bắt buộc phải có người có kinh nghiệm rồi. Cháu hiểu rồi ạ.」"
# 【宗方】
# display as 宗方
# JP: 「ご納得いただけたならありがたい」
1902 = "「Cảm ơn vì đã thấu hiểu.」"
# monologue
# JP: 宗方さんはホッとした様な顔になり、\nけれどもすぐに、その表情を引き締め直す。
2730 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata mang vẻ mặt nhẹ nhõm, nhưng ngay lập tức, nét mặt lại trở nên nghiêm nghị."
# 【宗方】
# display as 宗方
# JP: 「\\x%l保線;#00ffc040;保線%l;#;は、\n自然そのものを相手にした終わりなき戦いです」
1119 = "「\\x%l保線;#00ffc040;Bảo trì đường ray%l;#; là, một cuộc chiến không hồi kết với chính tự nhiên.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1593 = "「先生所言極是」" 
# 【宗方】
# display as 宗方
# JP: 「コストと労力のバランスは常に工面が必要でしょう。\nが、最重要部には惜しみなく労力を注ぎこまねば――」
2242 = "「Việc cân đối giữa chi phí và công sức luôn luôn là cần thiết. Nhưng, đối với những khu vực trọng yếu nhất, phải dốc toàn lực mà không được tiếc rẻ——」"
# monologue
# JP: 宗方さんの手が動く。
2701 = "Bàn tay \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata chuyển động."
# monologue
# JP: 顎にいくのかと思った指は、\n自らの首を掻き切るような動きをみせる。
2867 = "Tưởng chừng như sẽ đưa lên cằm, nhưng ngón tay lại làm động tác như cứa ngang cổ mình."
# 【宗方】
# display as 宗方
# JP: 「これは、絶対に事故になります」
1517 = "「Nếu không, tuyệt đối sẽ xảy ra tai nạn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「お言葉、心します」
1935 = "「Cháu sẽ ghi nhớ lời chú.」"
# 【双鉄】
# display as 雙鐵
# JP: 「原因不明の隆起地点の監視・情報収集は最重要と――\n必ず、全社に徹底します」
1852 = "「Việc giám sát và thu thập thông tin tại khu vực phồng rộp không rõ nguyên nhân là ưu tiên hàng đầu—— Cháu sẽ đảm bảo toàn bộ công ty tuân thủ triệt để.」"
# monologue
# JP: やはり、それほどの危機であるのだ。\n意識しなおせば、頭は目まぐるしく回転していく。
2869 = "Quả nhiên, đó là một mối nguy hiểm đến mức như vậy. Nhận thức lại điều đó, đầu óc tôi quay cuồng suy nghĩ."
# monologue
# JP: ふかみの祖父たち三人と、僕、オリヴィ。\nペアの片方として計算できそうな面子は、そのくらいか。
3009 = "Ba người ông của Fukami, tôi, và Olivy. Những người có thể tính vào một nửa của các cặp đi khảo sát, chỉ có chừng đó thôi sao."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「サライネンの四月までは、\nヒトのやりくり大変そーだねー」
2124 = "「Cho đến tháng 4 năm sau nữa, việc xoay xở nhân sự có vẻ vất vả lắm đây~」"
# monologue
# JP: 同じことを考えていたのか、\nオリヴィがためいき混じりの声を――うむ？
2624 = "Có lẽ cũng đang nghĩ giống tôi, Olivy cất tiếng thở dài——hửm?"
# 【双鉄】
# display as 雙鐵
# JP: 「再来年の四月まで？」
1883 = "「Đến tháng 4 năm sau nữa sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だって！　ムナカタ！！\nそしたらオヒトヨくるんでしょ！！」
2049 = "「Đúng rồi! Munakata!! Lúc đó chú sẽ đến Ohitoyo mà!!」"
# 【宗方】
# display as 宗方
# JP: 「！」
1666 = "「!」"
# monologue
# JP: 虚をつかれたのか、\nムナカタさんが一瞬ギクリと止まってしまう。
2691 = "Bị đánh trúng điểm mù, ông Munakata giật mình khựng lại trong giây lát."
# monologue
# JP: 逆にポーレットは、いいタイミングとでもいいたげに、\nほっとしたような一息を吐く。
2969 = "Ngược lại, Paulette như thể chớp đúng thời cơ, thở phào nhẹ nhõm một tiếng."
# 【ポーレット】
# display as 波萊特
# JP: 「保線専門の請負会社の件は、銀行主導の話ですから、\nそちらからのご連絡をお待ちください」
2003 = "「Về công ty chuyên thầu bảo trì đường ray, vì đây là dự án do ngân hàng chủ đạo, nên xin chú hãy đợi liên lạc từ phía họ.」"
# 【宗方】
# display as 宗方
# JP: 「はい」
# 1796 = "「好」" 
# 【ポーレット】
# display as 波萊特
# JP: 「他方、指導を主体とした嘱託としての御一夜鉄道への\n勤務については、ぜひお願いできれば、と考えています」
1626 = "「Mặt khác, về việc làm nhân viên hợp đồng tại Đường sắt Ohito với nhiệm vụ chính là hướng dẫn, chúng cháu rất mong chú có thể nhận lời.」"
# 【宗方】
# display as 宗方
# JP: 「それだけでも食っていけるだけの仕事量と報酬は、\nいただけますか？」
2221 = "「Chỉ với công việc đó, liệu khối lượng công việc và thù lao có đủ để tôi trang trải cuộc sống không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「保線専門会社の計画が頓挫した場合は、御一夜鉄道嘱託\nで\\x%l保線;#00ffc040;保線%l;#;も見て頂きたいので、ほぼフル勤務となりまして」
1590 = "「Trong trường hợp kế hoạch thành lập công ty chuyên bảo trì đường ray bị đổ bể, chúng cháu cũng muốn nhờ chú quản lý cả phần \\x%l保線;#00ffc040;bảo trì đường ray%l;#; với tư cách là nhân viên hợp đồng của Đường sắt Ohito, nên gần như sẽ là làm việc toàn thời gian ạ」"
# monologue
# JP: ポーレットが電卓を出す。\n紙を見ながらキーを叩いて、宗方さんにそっと差し出す。
2891 = "Paulette lấy máy tính ra. Vừa nhìn vào tờ giấy vừa bấm máy, rồi nhẹ nhàng đẩy về phía \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata."
# monologue
# JP: 宗方さんが受け取るやいなやでオリヴィが覗きにかかるが、\n叱咤も制止も見られない。
2699 = "Ngay khi \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata vừa nhận lấy, Olivy đã chúi mũi vào xem, nhưng không hề bị la mắng hay ngăn cản."
# 【宗方】
# display as 宗方
# JP: 「これでしたら。そのときから、お世話になれれば」
2113 = "「Nếu được thế này. Thì từ lúc đó, mong được quý công ty chiếu cố.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ」
# 1695 = "「啊」" 
# monologue
# JP: 言葉が洩れて、\nオリヴィの口が、そのまましばし、動かなくなる。
2645 = "Lời nói buột miệng thốt ra, miệng Olivy cứ thế há hốc, không cử động trong chốc lát."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「――よかったぁ」
1148 = "「——Tốt quá rồi」"
# monologue
# JP: 噛みしめるような、とても静かな歓喜の声。
2941 = "Một giọng nói tràn ngập niềm vui tĩnh lặng, như đang tận hưởng dư vị."
# monologue
# JP: オリヴィらしからぬ表れ方は、\nそれだけにかえって、感情の強さを思わせる。
2506 = "Cách biểu hiện không giống Olivy chút nào, chính vì vậy, nó càng cho thấy cảm xúc đó mãnh liệt đến nhường nào."
# 【ハチロク】
# display as 八六
# JP: 「……再来年の春には、\n桜、少しだけ、遅れてくれると良いのですが」
1154 = "「...Vào mùa xuân năm sau nữa, Giá như hoa anh đào, nở muộn hơn một chút thì tốt biết mấy.」"
# 【宗方】
# display as 宗方
# JP: 「桜？」
2012 = "「Hoa anh đào sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。御一夜の桜は見事なものです。\n桜吹雪の中を走るⅨ号も、きっと、ひときわ可憐かと」
2027 = "「Vâng. Hoa anh đào ở Ohimitera đẹp tuyệt trần ạ. Đầu máy số IX chạy giữa cơn mưa hoa anh đào, chắc chắn, cũng sẽ vô cùng kiều diễm.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「Wow！！」
2280 = "「Wow!!」"
# monologue
# JP: ぴょん、とオリヴィが飛び跳ねる。
2632 = "Bật dậy, Olivy nhảy cẫng lên."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そのときはⅨ号！　カウキャッチャーもついてるし！\nだからムナカタ！　オリヴィといっしょに！！」
1604 = "「Lúc đó là đầu máy số IX! Còn được gắn cả Cowcatcher nữa! Vì thế nên Munakata! Nhất định phải đi cùng Olivy nha!!」"
# monologue
# JP: いって、けれども、言葉が止まる。\n満面の笑顔が少し歪んで、どこか悲しげなものになる。
3007 = "Nói xong, nhưng, lời nói chợt dừng lại. Nụ cười rạng rỡ hơi méo mó, xen lẫn chút gì đó buồn bã."
# 【ハチロク】
# display as 八六
# JP: 「どうかしましたか！？　オリヴィちゃん」
1795 = "「Có chuyện gì vậy!? Bé Olivy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど、うん。\nやっぱりそれ、なし！！」
1537 = "「Nhưng mà, ừm. Quả nhiên là, thôi bỏ đi!!」"
# 【ハチロク】
# display as 八六
# JP: 「なしって――いったい、どうしてですか？」
2051 = "「Bỏ đi là——rốt cuộc, tại sao vậy?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、そのときまでにニイロクに全部ヒキツグ！\nでもって、乗務からインタイするよ！」
1792 = "「Cho đến lúc đó, Olivy sẽ BÀN GIAO lại toàn bộ cho Niiroku! Rồi sau đó, sẽ NGHỈ HƯU khỏi việc lái tàu!」"
# 【宗方】
# display as 宗方
# JP: 「お前、\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が何を勝手な」
1820 = "「Nhóc, \\x%lレイルロオド;#00ffc040;Railord%l;#; mà tự tiện nói cái gì vậy」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、それはわたしたちからオリヴィちゃんに、\n前から話していたことなんです」
1522 = "「Không đâu, chuyện đó là do chúng cháu đã nói với bé Olivy từ trước rồi ạ.」"
# 【宗方】
# display as 宗方
# JP: 「！？」
1556 = "「!?」"
# monologue
# JP: 驚きのあまりにだろう。
2922 = "Có lẽ là do quá ngạc nhiên."
# monologue
# JP: イスから浮きかけてしまっていた腰を、\n気まずげに、宗方さんは落ち着け直す。
2480 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata bối rối ngồi phịch xuống ghế, chiếc ghế mà chú ấy vừa định nhổm dậy."
# 【宗方】
# display as 宗方
# JP: 「ああ……\nそれ、っていうのは――いったい、どういう」
1662 = "「A... Chuyện đó, nghĩa là——rốt cuộc, ý là sao」"
# 【ポーレット】
# display as 波萊特
# JP: 「乗務するのが無理そうになったら、\nいつでも引退を決めていいって」
1923 = "「Nếu cảm thấy không thể tiếp tục lái tàu được nữa, thì em ấy có thể quyết định nghỉ hưu bất cứ lúc nào.」"
# 【宗方】
# display as 宗方
# JP: 「っ！！？」
# 1667 = "「呃！！？」" 
# monologue
# JP: ああ、これほどにこの人も、\n感情をあらわした顔になるのか――
2575 = "A, hóa ra người này, cũng có thể bộc lộ cảm xúc rõ ràng đến thế này sao——"
# monologue
# JP: ひどくこわばった顔がゆるゆる、\nオリヴィの方に向き直る。
2488 = "Khuôn mặt vô cùng căng thẳng dần dần giãn ra, quay sang phía Olivy."
# 【宗方】
# display as 宗方
# JP: 「お前、そこまで――」
1577 = "「Nhóc, đến mức đó——」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。わかってたけど、いろいろ細かい検査受けたら、\nもう乗務とか、ながく続けるのはキビシイみたい」
1738 = "「Ừm. Dù đã biết trước rồi, nhưng sau khi kiểm tra chi tiết nhiều thứ, có vẻ như việc tiếp tục lái tàu... lâu dài nữa là RẤT KHÓ KHĂN.」"
# 【宗方】
# display as 宗方
# JP: 「だが……お前……引退とは――\nⅨ号を下りて、それから、どうする」
1632 = "「Nhưng... nhóc... nghỉ hưu là—— Xuống khỏi đầu máy số IX, rồi sau đó, sẽ làm gì」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あのね！？　ポーレット」
2034 = "「Nghe này nhé!? Paulette」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん！　もちろん！　オリヴィちゃん！」
1725 = "「Ừm! Tất nhiên rồi! Bé Olivy!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！」
1803 = "「!!」"
# monologue
# JP: パっと、オリヴィの頬が薔薇色になる。
2636 = "Bừng sáng, đôi má Olivy ửng hồng."
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんには、後進の\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の指導と、\n\\x%l保線;#00ffc040;保線%l;#;のアシスタントをお願いします」
1920 = "「Bé Olivy sẽ được giao nhiệm vụ hướng dẫn cho các \\x%lレイルロオド;#00ffc040;Railord%l;#; thế hệ sau, và làm trợ lý cho công tác \\x%l保線;#00ffc040;bảo trì đường ray%l;#;.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁあ、それなら、引退したら、オリヴィさん、\n宗方さんと、一緒のおしごとするんですねぇ」
1678 = "「Oa, nếu vậy thì, sau khi nghỉ hưu, chị Olivy, sẽ làm việc cùng với chú Munakata đó nha~」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「はうっ！！」
1673 = "「Hau!!」"
# monologue
# JP: 薔薇色の頬が真っ赤に染まる。
2638 = "Đôi má ửng hồng đỏ bừng lên."
# monologue
# JP: オリヴィはけれどしらんふりして、\nいつもの調子で、宗方さんへと問いかける。
2498 = "Nhưng Olivy vờ như không có chuyện gì, với điệu bộ thường ngày, quay sang hỏi \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ってことだけど、いいかな？　ムナカタ」
1550 = "「Chuyện là vậy đó, được không? Munakata」"
# 【宗方】
# display as 宗方
# JP: 「いいも何も、雇われる身だ。\n雇い主の人事案に、意見が出せるはずもない」
1568 = "「Được hay không cái gì, tôi là người làm thuê mà. Làm sao có thể có ý kiến với kế hoạch nhân sự của chủ lao động được.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよね！！！！」
1548 = "「Đúng không đúng không!!!!」"
# monologue
# JP: グっ、とガッツポーズして、\nオリヴィが小さく体を縮める。
2628 = "Nắm chặt tay tạo dáng chiến thắng, Olivy khẽ thu người lại."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「Yeah！！！！！！！」
2281 = "「Yeah!!!!!!!」"
# monologue
# JP: そうして、弾ける！
2530 = "Và rồi, bung xõa!"
# monologue
# JP: 体いっぱい、全てをバネにし飛び上がり、\n笑顔をあたりに振りまき、咲かせる。
2558 = "Dùng toàn bộ cơ thể như một chiếc lò xo bật nhảy lên, tung rắc nụ cười nở rộ khắp không gian."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「早くそのときがこないかなーっ！」
2061 = "「Mong cho ngày đó mau đến quá đi~!」"
# 【宗方】
# display as 宗方
# JP: 「オリヴィ、お前は」
1788 = "「Olivy, nhóc thật là」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「？」
# 1739 = "「嗯？」" 
# monologue
# JP: 宗方さんが立ち上がる。
2722 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata đứng dậy."
# monologue
# JP: きょとんと止まるオリヴィの帽子に、\nその分厚い手を、ゆっくりと置く。
2551 = "Lên chiếc mũ của Olivy đang đứng đực ra, bàn tay dày cộp đó, chậm rãi đặt xuống."
# 【宗方】
# display as 宗方
# JP: 「いい会社に、世話になっているんだな」
1575 = "「Nhóc đang được một công ty tốt, chiếu cố đấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うんっ！！！」
1726 = "「Vâng!!!」"
# monologue
# JP: オリヴィはもう、どこが目かさえわからん笑顔だ。
2651 = "Olivy cười rạng rỡ đến mức không còn thấy mắt đâu nữa."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「再来年からは！　ムナカタもおんなじ会社で、\nいっしょだよー！！」
2072 = "「Từ năm sau nữa! Munakata cũng sẽ làm cùng công ty, cùng nhau làm việc đó~!!」"
# 【宗方】
# display as 宗方
# JP: 「そうなるな」
2056 = "「Sẽ là như vậy nhỉ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへーーっ！」
1749 = "「E he he~~!」"
# 【宗方】
# display as 宗方
# JP: 「少し気は早いですが」
2249 = "「Mặc dù có hơi sớm một chút」"
# monologue
# JP: 宗方さんが、僕らの方へと向き直る。
2726 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata, quay về phía chúng tôi."
# monologue
# JP: 姿勢をただし――
2492 = "Chỉnh lại tư thế——"
# 【宗方】
# display as 宗方
# JP: 「そのときになりましたら。\nみなさん、どうぞよろしくお願いします」
2115 = "「Khi thời điểm đó đến. Mọi người, mong được chiếu cố.」"
# 【ポーレット】
# display as 波萊特
# JP: 「こちらこそです！」
1922 = "「Chúng cháu cũng vậy ạ!」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、よろしくおねがいしまぁす」
1747 = "「U hu hu~, mong được chú chiếu cố ạ~」"
# 【ハチロク】
# display as 八六
# JP: 「そのときには、\n双鉄さまともども、どうぞよろしくご指導ください」
1866 = "「Lúc đó, cùng với ngài Soutetsu, mong được chú chỉ giáo ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「知識と経験とを伝授いただけますこと、\n楽しみにしています」
1941 = "「Chúng cháu rất mong chờ, được chú truyền đạt lại những kiến thức và kinh nghiệm.」"
# 【宗方】
# display as 宗方
# JP: 「ありがとうございます。\nでだ、オリヴィ」
1908 = "「Cảm ơn mọi người. Vậy thì, Olivy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なぁに？　ムナカタ！」
1555 = "「Chuyện gì vậy? Munakata!」"
# monologue
# JP: オリヴィの目がキラキラ輝く。
2626 = "Đôi mắt Olivy sáng lấp lánh."
# 【宗方】
# display as 宗方
# JP: 「俺は今は、お前になにかを頼める立場でもないが」
2248 = "「Mặc dù hiện tại tôi không ở vị trí có thể nhờ vả nhóc chuyện gì」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なくないよ！　ムナカタはいつだって、\nオリヴィになんだって命令できるタチバだよ！」
1896 = "「Không có chuyện đó đâu! Munakata lúc nào cũng, ở VỊ TRÍ có thể ra lệnh bất cứ điều gì cho Olivy mà!」"
# 【宗方】
# display as 宗方
# JP: 「ふっ――」
1668 = "「Hừm——」"
# monologue
# JP: 宗方さんが鼻から漏らしたのは笑いの息だ。
2707 = "Tiếng cười bật ra từ mũi \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata."
# monologue
# JP: 失笑、苦笑――そうしたものの間にきっと、\n本当の、喜びの笑いも混じっている。
2496 = "Giữa tiếng cười gượng, cười khổ——chắc chắn, cũng có xen lẫn cả nụ cười vui sướng thực sự."
# 【宗方】
# display as 宗方
# JP: 「なら一つだけ。あの隆起地点、お前も細かく見てほしい。\n何かあれば、[おんてつ,1]御鉄さんに報告すると同時に――」
2233 = "「Vậy thì nhờ nhóc một việc. Địa điểm phồng rộp đó, nhóc cũng hãy theo dõi sát sao nhé. Nếu có gì bất thường, hãy báo cáo cho Đường sắt Ohito, đồng thời——」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！　ムナカタにも絶対にホーコクするね！」
1982 = "「Rõ rồi! Nhất định sẽ BÁO CÁO cho cả Munakata nữa!」"
# 【宗方】
# display as 宗方
# JP: 「ああ、任せた」
1729 = "「À, trông cậy vào nhóc đấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！！」
# 1689 = "「唔！！！」" 
# monologue
# JP: その一言に、オリヴィの背筋が真っ直ぐになる。
2928 = "Chỉ một lời đó, sống lưng Olivy đã thẳng tắp."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！　オリヴィ！　マカされた！！」
1984 = "「Rõ rồi! Olivy! ĐÃ NHẬN NHIỆM VỤ!!」"
# 【宗方】
# display as 宗方
# JP: 「さて、それじゃ失礼します。\n明日も乗務があるもので」
2219 = "「Thôi, tôi xin phép cáo từ. Ngày mai tôi vẫn còn ca trực」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええ！？」
1680 = "「Ế ế ế!?」"
# monologue
# JP: 瞬時に、オリヴィの笑顔が消える。
2643 = "Nụ cười của Olivy tắt ngấm ngay lập tức."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタ、どっか泊まるんじゃないの？\nもうだって、ヤツシロいくエアクラバスないでしょう？」
1571 = "「Munakata, chú không trọ lại đâu sao? Vì bây giờ làm gì còn xe buýt Aircra nào đi Yatsushiro nữa đâu?」"
# 【宗方】
# display as 宗方
# JP: 「そうか？　なら、鹿兒島まわりで一泊して」
1996 = "「Vậy sao? Nếu thế thì tôi sẽ vòng qua Kagoshima trọ lại một đêm rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、もし一泊されるのでしたら」
1685 = "「A, nếu chú định trọ lại một đêm thì」"
# monologue
# JP: オリヴィが期待の瞳で僕を見る。\nハチロクも静かに頷いてくれる。
2623 = "Olivy nhìn tôi với ánh mắt đầy mong đợi. Hachiroku cũng lặng lẽ gật đầu."
# monologue
# JP: ナビは何も言わないが、\n僕の頼みを断ることなどありえまい。
3046 = "Navi tuy không nói gì, nhưng chắc chắn em ấy sẽ không từ chối lời nhờ vả của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「右田の家の客間でよければ、いかがです？　明日早朝、\nご指定の時間に飛行型エアクラでお送りします」
1808 = "「Nếu không chê phòng khách nhà Migita, chú thấy sao ạ? Sáng sớm ngày mai, cháu sẽ đưa chú về bằng Aircra bay theo giờ chú yêu cầu」"
# 【宗方】
# display as 宗方
# JP: 「それなら小一時間か――だが、お言葉に甘えていいなら、\nこのまま送ってもらった方が助かります」
2109 = "「Nếu vậy thì mất khoảng một tiếng nhỉ——Nhưng, nếu cậu không phiền, thì đưa tôi về ngay bây giờ luôn sẽ giúp tôi rất nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1664 = "「A」"
# monologue
# JP: ぷくーーーーっっとオリヴィが膨れてしまう。
2625 = "Olivy phồng má lên phụng phịu."
# monologue
# JP: 気を使ったつもりであったが……\nこの答えは、うむ、たしかに予想できてしかるべきだった。
2820 = "Tôi đã cố ý tinh tế một chút nhưng... Câu trả lời này, ừm, đúng là hoàn toàn có thể đoán trước được."
# 【ハチロク】
# display as 八六
# JP: 「でしたら、ね？　双鉄さま」
1974 = "「Nếu vậy thì, ngài Soutetsu nhỉ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1739 = "「嗯？」" 
# monologue
# JP: ハチロクの声にほっとする。\nこの声ならば確実に、僕を助ける手段を思いついている。
2513 = "「Giọng nói của Hachiroku khiến tôi thở phào nhẹ nhõm. Với giọng điệu này, chắc chắn em ấy đã nghĩ ra cách để giúp tôi.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さまのエアクラナビは、確か今、ほんの少し――\nそう、発声機関の不調をうったえてらしたかと」
2044 = "「Navi trên Aircra của ngài Soutetsu, hình như lúc nãy có hơi—— Đúng rồi, cô ấy có phàn nàn về việc cơ quan phát âm bị trục trặc thì phải.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　あ！　ああ！　そうだ！\nゆえに、ナビをサポートする\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が」
1740 = "「Hửm? A! A! Đúng rồi! Vì thế nên, cần có một \\x%lレイルロオド;#00ffc040;Railord%l;#; để hỗ trợ Navi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーだった！」
1789 = "「Đúng rồi đó!」"
# monologue
# JP: オリヴィはぴょこんと跳ねて、\n一直線にレールショップを飛び出していく。
2640 = "Olivy bật nhảy một cái, rồi lao thẳng một mạch ra khỏi cửa hàng đường sắt."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ！　先に乗ってるね！！」
2207 = "「Olivy! Lên tàu trước nha!!」"
