2233 = "「Vậy thì nhờ nhóc một việc. Địa điểm phồng\nrộp đó, nhóc cũng hãy theo dõi sát sao\nnhé.\nNếu có gì bất thường, hãy báo cáo cho\nĐường sắt Ohito, đồng thời——」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！　ムナカタにも絶対にホーコクするね！」
