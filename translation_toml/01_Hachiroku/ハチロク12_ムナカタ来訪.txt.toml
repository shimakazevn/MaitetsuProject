# JP: 「？」
# 1739 = "「嗯？」" 

# monologue
# JP: 宗方さんが立ち上がる。
2722 = "宗方先生站起身，奧莉薇則是愣在原地。" 

# monologue
# JP: きょとんと止まるオリヴィの帽子に、\nその分厚い手を、ゆっくりと置く。
2551 = "只將他將其厚重的手掌，緩緩放在奧莉薇的帽子上" 

# 【宗方】
# display as 宗方
# JP: 「いい会社に、世話になっているんだな」
1575 = "「你可真是找到了一家好公司」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うんっ！！！」
1726 = "「嗯！！！」" 

# monologue
# JP: オリヴィはもう、どこが目かさえわからん笑顔だ。
2651 = "如今奧莉薇的笑容實在光彩奪目，幾乎令人難以直視。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「再来年からは！　ムナカタもおんなじ会社で、\nいっしょだよー！！」
2072 = "「等到後年，你也會和奧莉薇一起，在這家公司上班啦！！」" 

# 【宗方】
# display as 宗方
# JP: 「そうなるな」
2056 = "「的確是這樣」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへーーっ！」
1749 = "「嘿嘿——！」" 

# 【宗方】
# display as 宗方
# JP: 「少し気は早いですが」
2249 = "「雖然現在談及這些還有些為時尚早」" 

# monologue
# JP: 宗方さんが、僕らの方へと向き直る。
2726 = "宗方先生說著又面向我們。" 

# monologue
# JP: 姿勢をただし――
2492 = "他端正姿勢——" 

# 【宗方】
# display as 宗方
# JP: 「そのときになりましたら。\nみなさん、どうぞよろしくお願いします」
2115 = "「若能平安無事迎來那一天，屆時還請各位多多指教」" 

# 【ポーレット】
# display as 波萊特
# JP: 「こちらこそです！」
1922 = "「我們才是要請您多多指教！」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、よろしくおねがいしまぁす」
1747 = "「嘻嘻，請宗方先生多多關照」" 

# 【ハチロク】
# display as 八六
# JP: 「そのときには、\n双鉄さまともども、どうぞよろしくご指導ください」
1866 = "「屆時還請您無需顧慮，對我和雙鐵少爺嚴加指導」" 

# 【双鉄】
# display as 雙鐵
# JP: 「知識と経験とを伝授いただけますこと、\n楽しみにしています」
1941 = "「我非常期待將來就各種知識經驗，向先生討教」" 

# 【宗方】
# display as 宗方
# JP: 「ありがとうございます。\nでだ、オリヴィ」
1908 = "「感謝各位歡迎，那，奧莉薇」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なぁに？　ムナカタ！」
1555 = "「什麼事呀宗方！」" 

# monologue
# JP: オリヴィの目がキラキラ輝く。
2626 = "奧莉薇又變得兩眼放光。" 

# 【宗方】
# display as 宗方
# JP: 「俺は今は、お前になにかを頼める立場でもないが」
2248 = "「雖然如今，我也再無任何權利向你提出請求」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なくないよ！　ムナカタはいつだって、\nオリヴィになんだって命令できるタチバだよ！」
1896 = "「怎麼會呢！不論何時何地，你都可以向奧莉薇發號施令！」" 

# 【宗方】
# display as 宗方
# JP: 「ふっ――」
1668 = "「呼——」" 

# monologue
# JP: 宗方さんが鼻から漏らしたのは笑いの息だ。
2707 = "宗方先生呼出的這口氣帶著滿滿的笑意。" 

# monologue
# JP: 失笑、苦笑――そうしたものの間にきっと、\n本当の、喜びの笑いも混じっている。
2496 = "似是苦笑，抑或啞然失笑，但肯定也少不了代表喜悅的成分。" 

# 【宗方】
# display as 宗方
# JP: 「なら一つだけ。あの隆起地点、お前も細かく見てほしい。\n何かあれば、[おんてつ,1]御鉄さんに報告すると同時に――」
2233 = "「那麼我就只拜託你一件事，那個發生隆起的地點，希望你也要仔細觀察，一旦出現情況，在向御鐵匯報的同時——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！　ムナカタにも絶対にホーコクするね！」
1982 = "「明白！奧莉薇還會向你匯報情況的！」" 

# 【宗方】
# display as 宗方
# JP: 「ああ、任せた」
1729 = "「嗯，就交給你了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！！」
# 1689 = "「唔！！！」" 

# monologue
# JP: その一言に、オリヴィの背筋が真っ直ぐになる。
2928 = "短短的一句話，令奧莉薇立即挺直腰桿。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！　オリヴィ！　マカされた！！」
1984 = "「明白！放心包在奧莉薇身上！！」" 

# 【宗方】
# display as 宗方
# JP: 「さて、それじゃ失礼します。\n明日も乗務があるもので」
2219 = "「那我就先行告退，明天還有乘務任務需要執行」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええ！？」
1680 = "「哎哎！？」" 

# monologue
# JP: 瞬時に、オリヴィの笑顔が消える。
2643 = "奧莉薇轉眼間又表現得非常失望。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタ、どっか泊まるんじゃないの？\nもうだって、ヤツシロいくエアクラバスないでしょう？」
1571 = "「你不找個地方住一晚嗎？現在不是都已經沒有返回八代的空凝機公車了？」" 

# 【宗方】
# display as 宗方
# JP: 「そうか？　なら、鹿兒島まわりで一泊して」
1996 = "「是這樣嗎？那我就在鹿兒島附近投宿好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、もし一泊されるのでしたら」
1685 = "「哦，如果您需要找地方住下」" 

# monologue
# JP: オリヴィが期待の瞳で僕を見る。\nハチロクも静かに頷いてくれる。
2623 = "奧莉薇以滿懷期待的眼神看向我，而八六也默默地點了點頭。" 

# monologue
# JP: ナビは何も言わないが、\n僕の頼みを断ることなどありえまい。
3046 = "雖然Ｎａｖｉ沒有發言，但她一定不會拒絕我的請求。" 

# 【双鉄】
# display as 雙鐵
# JP: 「右田の家の客間でよければ、いかがです？　明日早朝、\nご指定の時間に飛行型エアクラでお送りします」
1808 = "「如果方便，可否請先生在右田家的客房留宿一晚。我們會在明天一早派航空型空凝機將您送回，時間可由您隨意指示」" 

# 【宗方】
# display as 宗方
# JP: 「それなら小一時間か――だが、お言葉に甘えていいなら、\nこのまま送ってもらった方が助かります」
2109 = "「若是如此，返程則需要將近一個小時，那我可否承蒙好意，請您現在安排將我送回呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1664 = "「呃」" 

# monologue
# JP: ぷくーーーーっっとオリヴィが膨れてしまう。
2625 = "奧莉薇又不滿地鼓起臉頰。" 

# monologue
# JP: 気を使ったつもりであったが……\nこの答えは、うむ、たしかに予想できてしかるべきだった。
2820 = "我本意是想照顧奧莉薇的感受……但是我也確實該料到對方會得出如此結論。" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、ね？　双鉄さま」
1974 = "「既然如此，雙鐵少爺我們不妨……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1739 = "「嗯？」" 

# monologue
# JP: ハチロクの声にほっとする。\nこの声ならば確実に、僕を助ける手段を思いついている。
2513 = "八六的聲音令我心中一塊石頭落地，她肯定是想到了助我說服宗方先生的辦法。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまのエアクラナビは、確か今、ほんの少し――\nそう、発声機関の不調をうったえてらしたかと」
2044 = "「現在雙鐵少爺的空凝機導航似乎存在些許問題，依其自述，是發聲組件出現故障」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　あ！　ああ！　そうだ！\nゆえに、ナビをサポートする\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が」
1740 = "「嗯？啊！哦哦！沒錯！所以需要\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;輔助Ｎａｖｉ工作」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーだった！」
1789 = "「奧莉薇也想起來了！」" 

# monologue
# JP: オリヴィはぴょこんと跳ねて、\n一直線にレールショップを飛び出していく。
2640 = "奧莉薇縱身一躍，頭也不回地衝出鐵路商店。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ！　先に乗ってるね！！」
2207 = "「那奧莉薇就先過去了！！」" 
