[script]
# lines: 530 
# monologue
# JP: ホームについた列車から、大柄な男が降りてくる。
2531 = "Từ chuyến tàu vừa đến sân ga, một người\nđàn ông to lớn bước xuống."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタっ！！！」
1834 = "「Munakata!!!」"

# monologue
# JP: 途端、オリヴィが駆けていく。
2639 = "Ngay lập tức, Olivy chạy ùa tới."

# monologue
# JP: 飼い主を見つけた迷子の子犬がそうするように、一直線に、\n満面の笑顔を輝かせながら。
2647 = "Giống như một chú chó con đi lạc tìm thấy\nchủ, chạy thẳng một mạch,\nvới nụ cười rạng rỡ nở rộ trên môi."

# 【双鉄】
# display as 雙鐵
# JP: 「……強いな、オリヴィは」
1150 = "「...Mạnh mẽ thật đấy, Olivy」"

# monologue
# JP: 見ているだけのこちらの胸さえ傷んだほどの……\n実質的には、置き去り同然の別れ方をし。
2801 = "Thậm chí khiến trái tim của những người\nchỉ đứng nhìn như chúng tôi cũng phải đau\nnhói...\nVề cơ bản, đó là một cuộc chia tay giống\nnhư bị bỏ rơi."

# monologue
# JP: あれほど泣いて、落ち込み、拗ねて――
3032 = "Em ấy đã khóc, đã suy sụp, đã hờn dỗi đến\nnhường nào——"

# 【双鉄】
# display as 雙鐵
# JP: 「にもかかわらず、か」
1640 = "「Dù vậy, sao」"

# 【ハチロク】
# display as 八六
# JP: 「……だからこそ、なのかもしれません」
1163 = "「...Có lẽ chính vì vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1722 = "「Ừm」"

# monologue
# JP: すず――いや、ハチロクもおなじことを考えていた。\nしかも僕より、さらに深く。
3034 = "Suzu——không, Hachiroku cũng đang nghĩ\ngiống tôi.\nHơn nữa còn sâu sắc hơn tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。だからこそ、か」
2020 = "「Ra là vậy. Chính vì thế, sao」"

# 【ハチロク】
# display as 八六
# JP: 「はい。オリヴィちゃんがああ振る舞わねば、\nしこりはずっと、残り続けてしまいましょうから」
1727 = "「Vâng. Nếu bé Olivy không cư xử như vậy, \nthì khúc mắc sẽ mãi mãi tồn tại mất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だからこそ、オリヴィは全てを忘れ喜ぶのだな。\n宗方\x%l機関士;#00ffc040;機関士%l;#;と――わだかまりなく話したいから」
2022 = "「Vì thế, Olivy mới quên đi tất cả và vui\nmừng như vậy nhỉ.\nVì em ấy muốn nói chuyện với \\x%l機関士;#00ffc040;lái tàu%l;#;\nMunakata——mà không có bất kỳ vướng bận\nnào.」"

# 【ハチロク】
# display as 八六
# JP: 「あ！」
1696 = "「A!」"

# monologue
# JP: 根負けした――と言わんばかりに、\n宗方\x%l機関士;#00ffc040;機関士%l;#;が歩みを止める。
2666 = "Như thể đã chịu thua—— \n\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata dừng bước."

# monologue
# JP: 足元にじゃれつきつづけるオリヴィの帽子に、\n無造作に、その分厚い手がぼふ、と置かれる。
2556 = "Lên chiếc mũ của Olivy đang không ngừng\nlàm nũng dưới chân,\nbàn tay dày cộp của chú ấy vô tình đặt\nlên, một cái xoa đầu nhẹ."

# 【宗方】
# display as 宗方
# JP: 「[おんてつ,1]御鉄さんで、よくしてもらっているようだな」
2058 = "「Ở Đường sắt Ohito, có vẻ cháu được đối xử\nrất tốt nhỉ.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「～～～っ！　うんっ！！！」
1690 = "「~~~! Vâng!!!」"

# monologue
# JP: 無愛想な短い言葉。\nおもいっきりに深い頷き。
2489 = "Lời nói ngắn gọn, cộc lốc. \nCái gật đầu thật sâu, hết sức mình."

# monologue
# JP: ただそれだけで、空気が一気に晴れ渡る。\n光がぱっと差し込むように、周囲の全てがあたたかになる。
2553 = "Chỉ bấy nhiêu thôi, bầu không khí đã bừng\nsáng.\nGiống như ánh sáng đột ngột chiếu rọi, mọi\nthứ xung quanh trở nên ấm áp."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「みんな、とっても良くしてくれる！\nそれにねっ」
1774 = "「Mọi người, đối xử với cháu RẤT TỐT! \nHơn nữa nhé」"

# 【宗方】
# display as 宗方
# JP: 「ああ、右田\x%l機関士;#00ffc040;機関士%l;#;。\nお久しぶり――というほどでもないか」
1754 = "「À, \\x%l機関士;#00ffc040;lái tàu%l;#; Migita. \nĐã lâu không gặp——cũng không hẳn là lâu\nlắm nhỉ.」"

# monologue
# JP: が――宗方\x%l機関士;#00ffc040;機関士%l;#;は僕らの姿を認めるなり、\nスタスタこちらに近づいてくる。
2563 = "Nhưng——\\x%l機関士;#00ffc040;lái tàu%l;#; Munakata vừa nhận ra chúng\ntôi,\nđã bước nhanh về phía này."

# monologue
# JP: オリヴィも慌てて口をつぐんで、\nけれど気にした風もなく、その足取りをパタパタと追う。
2622 = "Olivy cũng vội vàng ngậm miệng lại, \nnhưng không có vẻ gì là bận tâm, em ấy\nlạch bạch chạy theo sau."

# 【双鉄】
# display as 雙鐵
# JP: 「遠路はるばるありがとうございます。宗方\x%l機関士;#00ffc040;機関士%l;#;。\n[はやと,1]早戸までお迎えにあがろうと思っていたのですが――」
1826 = "「Cảm ơn chú đã lặn lội đường xa đến đây. \\x%l機関士;#00ffc040;Lái tàu%l;#;\nMunakata.\nCháu định đến tận Hayato để đón chú nhưng\nmà——」"

# 【宗方】
# display as 宗方
# JP: 「いや、問題の地点を[せんけん,1]線見したくもあったし、\n話をもらった……別件というか、関連というか」
2040 = "「Không, tôi cũng muốn đi khảo sát trước\nđịa điểm xảy ra vấn đề,\nvà cũng vì chuyện mà cậu đã nói... gọi là\nchuyện khác, hay chuyện liên quan nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい、保線専門会社の件ですね。急な話で恐縮でしたが、\n前向きなご検討をいただけているようで、何よりです」
1732 = "「Vâng, là chuyện về công ty chuyên \\x%l保線;#00ffc040;bảo trì đường ray%l;#;\n. Thật ngại quá vì chuyện quá gấp gáp,\nnhưng chú đang xem xét nó một cách tích\ncực, như vậy là tốt quá rồi.」"

# 【宗方】
# display as 宗方
# JP: 「率直にいって、興味深く思っている。\n詳しく話を聞きたいと」
1840 = "「Thành thật mà nói, tôi thấy rất hứng thú.\nTôi muốn nghe chi tiết hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ご説明の準備は出来ているかと思います。\nよろしければ、こちらへ」
1919 = "「Cháu nghĩ là đã chuẩn bị xong phần giải\nthích rồi.\nNếu chú không phiền, xin mời lối này.」"

# 【宗方】
# display as 宗方
# JP: 「ああ」
1796 = "「À」"

# monologue
# JP: 僕が先頭、隣にハチロク。
2814 = "Tôi đi đầu, bên cạnh là Hachiroku."

# monologue
# JP: 続いて宗方\x%l機関士;#00ffc040;機関士%l;#;で、\nその周辺をまたちょこちょこと――
2525 = "Tiếp theo là \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, \nvà xung quanh chú ấy lại là Olivy đang\nlăng xăng——"

# 【宗方】
# display as 宗方
# JP: 「オリヴィ――っと、いや。\nすまん、すみません、右田\x%l機関士;#00ffc040;機関士%l;#;」
1786 = "「Olivy——à, không. \nXin lỗi, xin lỗi cậu, \\x%l機関士;#00ffc040;lái tàu%l;#; Migita.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい。なんでしょう」
1925 = "「Vâng. Có chuyện gì vậy ạ」"

# monologue
# JP: 振り返り見れば、\n宗方\x%l機関士;#00ffc040;機関士%l;#;が困ったような顔をしている。
2826 = "Ngoảnh lại nhìn, \n\\x%l機関士;#00ffc040;lái tàu%l;#; Munakata đang có vẻ mặt bối rối."

# monologue
# JP: オリヴィがなにかしたのかと一瞬思うが、\nどうにも……そんな様子でもない。
2819 = "Thoáng nghĩ hay là Olivy đã làm gì đó, \nnhưng có vẻ... không phải như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1739 = "「Hửm?」"

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま。旧帝鉄では、経営レベルの会議にはまず、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は同席いたしませんので」
2252 = "「Ngài Soutetsu. Ở Teitetsu cũ, trong các\ncuộc họp cấp quản lý,\n\\x%lレイルロオド;#00ffc040;Railord%l;#; thường không được tham dự ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1751 = "「A」"

# monologue
# JP: ゆえ、宗方\x%l機関士;#00ffc040;機関士%l;#;はオリヴィの同席を止めようとして、\nしかし、オリヴィの今の所属を思い出した。
2835 = "Vì vậy, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata định ngăn Olivy\ntham dự,\nnhưng rồi chú ấy nhớ ra nơi Olivy đang\ntrực thuộc hiện tại."

# monologue
# JP: そこで僕に、というわけか――
2839 = "Và thế là chú ấy quay sang tôi, ra là\nvậy——"

# 【双鉄】
# display as 雙鐵
# JP: 「ご配慮ありがとうございます。ですが、今回の会議には、\nオリヴィにもハチロクにも同席してもらいます」
1909 = "「Cảm ơn sự tinh tế của chú. Nhưng trong\ncuộc họp lần này,\ncháu muốn cả Olivy và Hachiroku cùng tham\ndự.」"

# 【宗方】
# display as 宗方
# JP: 「これも？\n御社のトップナンバー・レイロオドはともかくとして」
1606 = "「Cả nhóc này sao? \nRailord số một của quý công ty thì không\nnói làm gì」"

# monologue
# JP: 心底、驚いているような声。\n文化の違いとはこういうことかと、つくづく思う。
2486 = "Giọng nói thể hiện sự ngạc nhiên từ tận\nđáy lòng.\nSự khác biệt về văn hóa là như thế này\nđây, tôi thực sự cảm nhận được điều đó."

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道は、オリヴィの蓄積してきた知識を\n積極的に活用したいと考えていますので」
1760 = "「Đường sắt Ohito muốn tích cực tận dụng \nnhững kiến thức mà Olivy đã tích lũy\nđược.」"

# 【宗方】
# display as 宗方
# JP: 「蓄積？」
2070 = "「Tích lũy?」"

# monologue
# JP: 戸惑ったように動いた視線は、\nけれどもすぐに、ふっと落ち着きの色を帯びる。
2743 = "Ánh mắt đảo quanh bối rối, \nnhưng ngay lập tức, lấy lại vẻ bình tĩnh."

# 【宗方】
# display as 宗方
# JP: 「ああ、そうか。\n車歴なら百年を越えているのか」
1715 = "「À, ra vậy. \nLịch sử hoạt động của nhóc này đã hơn một\ntrăm năm rồi sao.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよだよ！　オリヴィ！\nハチロクよりもベテランなんだからっ！」
1860 = "「Đúng vậy đúng vậy! Olivy! \nLà một người dày dặn kinh nghiệm hơn cả\nHachiroku đó nha!」"

# 【宗方】
# display as 宗方
# JP: 「……\x%lレイルロオド;#00ffc040;レイルロオド%l;#;など、\n普通は二、三十年で解体されるものだ」
1139 = "「...\\x%lレイルロオド;#00ffc040;Railord%l;#; thì, \nbình thường chỉ hai, ba mươi năm là bị\ntháo dỡ rồi.」"

# monologue
# JP: そのまままじまじ、\n宗方\x%l機関士;#00ffc040;機関士%l;#;はオリヴィの顔を見つめる。
2664 = "Cứ thế chằm chằm, \n\\x%l機関士;#00ffc040;lái tàu%l;#; Munakata nhìn thẳng vào mặt Olivy."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふあっ！」
1665 = "「Phu a!」"

# monologue
# JP: 途端、オリヴィは視線をそらして、\nひどくもじもじし始める。
2642 = "Ngay lập tức, Olivy ngoảnh mặt đi, \nvà bắt đầu vặn vẹo đầy bối rối."

# 【宗方】
# display as 宗方
# JP: 「……\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の車歴など気にもしなかったが――\nそうか。言われてみれば、百年以上の蓄積か」
1159 = "「...Tôi chưa bao giờ để tâm đến lịch sử\nhoạt động của \\x%lレイルロオド;#00ffc040;Railord%l;#; nhưng——\nRa là vậy. Nói mới nhớ, là sự tích lũy của\nhơn một trăm năm sao.」"

# monologue
# JP: （ぼふっ）
2902 = "（Bụp）"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！！」
1689 = "「!!!」"

# monologue
# JP: もう一度、さっきよりすこし乱暴に、\nオリヴィの帽子の上に、分厚い手のひらが乗せられる。
2482 = "Lại một lần nữa, mạnh bạo hơn lúc nãy một\nchút,\nbàn tay dày cộp đặt lên chiếc mũ của\nOlivy."

# 【ハチロク】
# display as 八六
# JP: 「……この上ない賞賛、でございますね」
1169 = "「...Một lời khen ngợi không gì sánh bằng\nnhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1849 = "「Ừm」"

# monologue
# JP: 『お前も大したものだったのだな』\n――そんな言葉が、語られぬままに伝わってくる。
2899 = "「Ừm」"

# monologue
# JP: オリヴィの顔がどんどん赤く――いや、いかん！\nこのままでは体温を上昇させすぎてしまう。
2635 = "Nhóc cũng cừ lắm đấy chứ' \n——Dù không nói ra, nhưng lời đó vẫn truyền\nđạt được."

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、そういう事情ですので」
2078 = "「Dù sao thì, tình hình là như vậy.」"

# 【宗方】
# display as 宗方
# JP: 「承知した。\nいや、余計なことで時間を取らせてすまなかった」
1988 = "「Tôi hiểu rồi. \nKhông, xin lỗi vì đã làm mất thời gian của\ncậu bằng những chuyện bao đồng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いえ――」
2039 = "「Không đâu ạ——」"

# monologue
# JP: 線路を渡り、裏口からレールショップに入っていけば――
2809 = "Băng qua đường ray, đi vào Rail Shop từ\ncửa sau thì——"

# 【ポーレット】
# display as 波萊特
# JP: 「宗方\x%l機関士;#00ffc040;機関士%l;#;、ようこそいらっしゃいました」
1827 = "「\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata, chào mừng chú đã đến\nđây.」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、御一夜鉄道へようこそですよぉ」
1746 = "「U hu hu, chào mừng chú đến với Đường sắt\nOhito nha~」"

# 【稀咲】
# display as 稀咲
# JP: 「コーヒーと紅茶、どちらがお好みですか？」
2137 = "「Chú thích uống cà phê hay trà đen ạ?」"

# 【宗方】
# display as 宗方
# JP: 「ああ――その――恐縮です。\nその、コーヒーの方を」
1661 = "「A——à——ngại quá. \nVậy, cho tôi xin một tách cà phê.」"

# 【稀咲】
# display as 稀咲
# JP: 「よかった！　どうぞ、淹れたてですよ？」
2222 = "「May quá! Xin mời, cà phê vừa mới pha xong\nđấy ạ.」"

# monologue
# JP: 下にも置かぬもてなしだ。
2469 = "Một sự tiếp đón vô cùng chu đáo."

# monologue
# JP: ポーレットとれいなの歓迎ならば常のことだが、\nそこに稀咲も加わると、迫力さえをも感じてしまう。
3045 = "Sự chào đón của Paulette và Reina thì là\nchuyện thường tình rồi,\nnhưng khi có cả Kisaki tham gia, tôi thậm\nchí còn cảm thấy có chút áp lực."

# 【双鉄】
# display as 雙鐵
# JP: 「どうぞ、こちらの席に」
1903 = "「Xin mời chú ngồi ghế này.」"

# 【宗方】
# display as 宗方
# JP: 「ああ――うむ。あ、いや、ありがとうございます」
1692 = "「A——ừm. À không, cảm ơn cậu.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへ～っ」
1681 = "「E he he~」"

# monologue
# JP: それがごくごく当然と、\nオリヴィは宗方\x%l機関士;#00ffc040;機関士%l;#;の隣に座り――
2963 = "Coi đó là điều hiển nhiên, \nOlivy ngồi xuống cạnh \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata\nvà——"

# monologue
# JP: （ずっ――ずずっ）
3075 = "（Kéo——kéo kéo）"

# monologue
# JP: イスをずらして、ずらして、ずらして、\n距離を少しずつ詰めていく。
2957 = "Em ấy nhích ghế, nhích ghế, nhích ghế, \ntừng chút một thu hẹp khoảng cách."

# 【宗方】
# display as 宗方
# JP: 「ああ……その……こういう空気は慣れんですし、\n保線現場も早く確かめたいので――その、本題を」
1694 = "「A... ừm... tôi không quen với bầu không\nkhí thế này cho lắm,\nvới lại tôi cũng muốn nhanh chóng kiểm tra\nhiện trường \\x%l保線;#00ffc040;bảo trì đường ray%l;#; nên——ừm, vào\nvấn đề chính đi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。ふふっ、やっぱりお仕事最優先。\nオリヴィちゃんのお話どおりの方ですね」
1799 = "「Cháu hiểu rồi. Fufu, quả nhiên công việc\nlà ưu tiên hàng đầu.\nChú đúng là người y hệt như những gì bé\nOlivy đã kể.」"

# 【宗方】
# display as 宗方
# JP: 「あ――」
2174 = "「A——」"

# monologue
# JP: ポリっ、と軽く顎を掻き、宗方\x%l機関士;#00ffc040;機関士%l;#;が苦笑する。\nオリヴィの方へ顔を向け。
2662 = "Gãi nhẹ cằm, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata cười khổ. \nQuay mặt về phía Olivy."

# 【宗方】
# display as 宗方
# JP: 「っ！！？」
1667 = "「!!?」"

# monologue
# JP: 思わぬ近さに驚いて、\nそうして、ハハハと笑い出す。
2493 = "Bất ngờ vì khoảng cách quá gần, \nrồi sau đó, chú ấy bật cười ha hả."

# 【宗方】
# display as 宗方
# JP: 「それなら、ネコをかぶっても仕方ない。\n俺は、どこにでもいる\x%l保線;#00ffc040;保線%l;#;上がりの\x%l機関士;#00ffc040;機関士%l;#;です」
2212 = "「Nếu vậy thì, tôi cũng không cần phải giả\nvờ nữa.\nTôi chỉ là một \\x%l機関士;#00ffc040;lái tàu%l;#; đi lên từ \\x%l保線;#00ffc040;bảo trì đường ray%l;#;\n, có thể bắt gặp ở bất cứ đâu thôi.」"

# 【稀咲】
# display as 稀咲
# JP: 「どこにでもいる、では無いでしょう。保線技術講習会に、\n帝鉄時代からほとんど欠かさず参加してらっしゃるとか」
1848 = "「Đâu thể bắt gặp ở bất cứ đâu được ạ. Nghe\nnói chú hầu như không bỏ sót một buổi hội\nthảo kỹ thuật bảo trì đường ray nào,\ntừ hồi còn ở Teitetsu đến giờ.」"

# 【宗方】
# display as 宗方
# JP: 「！」
2185 = "「!」"

# 【ポーレット】
# display as 波萊特
# JP: 「み鉄さんでも、保線部の相談役だとお伺いしました。\nどこにでもいる方には、なかなか出来ないことかと」
2083 = "「Cháu nghe nói ở Đường sắt Mikan, chú cũng\nlà cố vấn của bộ phận bảo trì đường ray.\nMột người có thể bắt gặp ở bất cứ đâu thì\nkhó mà làm được như vậy lắm ạ.」"

# 【宗方】
# display as 宗方
# JP: 「……」
1132 = "「...」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！？　オリヴィじゃないよ！\nそこまでクワシク話してないよ！」
1670 = "「!!? Không phải Olivy đâu nha! \nOlivy không kể CHI TIẾT đến mức đó đâu!」"

# 【稀咲】
# display as 稀咲
# JP: 「ああ、失礼。自己紹介が遅れてしまいました。\nボクは、隈元銀行御一夜支店長の宝生稀咲です」
1705 = "「A, thất lễ quá. Cháu giới thiệu bản thân\nhơi muộn.\nCháu là Houshou Kisaki, Giám đốc chi nhánh\nOhimitera của Ngân hàng Kumamoto.」"

# 【宗方】
# display as 宗方
# JP: 「あ、これは失礼。俺――自分は宗方[じんろく,1]甚六。\nみかん鉄道\x%l機関士;#00ffc040;機関士%l;#;です」
1708 = "「A, tôi mới là người thất lễ. Tôi——tên là\nMunakata Jinroku.\n\\x%l機関士;#00ffc040;Lái tàu%l;#; của Đường sắt Mikan.」"

# monologue
# JP: 稀咲の差し出す名刺は薄紫――\n『銀行だけの肩書』のものだ。
2938 = "Tấm danh thiếp Kisaki đưa ra có màu tím\nnhạt——\nLà loại danh thiếp mang 'chức danh của\nngân hàng'."

# monologue
# JP: ならば今日は、純粋な銀行支店長として、\n銀行のみの利害を重視し、調査をすすめる腹なのだろう。
3033 = "Nếu vậy thì hôm nay, với tư cách thuần túy\nlà một giám đốc chi nhánh ngân hàng,\ncô ấy sẽ đặt lợi ích của ngân hàng lên\nhàng đầu để tiến hành khảo sát."

# 【稀咲】
# display as 稀咲
# JP: 「本件――保線専門の請負会社の設立計画については、\n当行が主体となって、調査をすすめています」
2243 = "「Về vấn đề này——kế hoạch thành lập công ty\nchuyên thầu bảo trì đường ray,\nngân hàng chúng tôi đang đóng vai trò chủ\nđạo trong việc tiến hành khảo sát.」"

# 【宗方】
# display as 宗方
# JP: 「“調査”。なるほど」
1124 = "「'Khảo sát'. Ra là vậy.」"

# monologue
# JP: ――稀咲提案の、保線専門の請負会社。\nその目的は、保線技術・人的資源の集約と最適化だ。
3027 = "——Công ty chuyên thầu bảo trì đường ray do\nKisaki đề xuất.\nMục đích của nó là tập trung và tối ưu hóa\nkỹ thuật bảo trì đường ray cùng nguồn nhân\nlực."

# monologue
# JP: 鉄道各社が保線部門をそれぞれ抱えているよりも、\n専門会社に集中させて運用する方が、効率がいい。
2878 = "Thay vì mỗi công ty đường sắt tự duy trì\nmột bộ phận bảo trì đường ray riêng,\nviệc tập trung vào một công ty chuyên môn\nđể vận hành sẽ mang lại hiệu quả cao hơn."

# 【宗方】
# display as 宗方
# JP: 「しかし、銀行さんがどうしてそんな？」
1634 = "「Nhưng mà, tại sao phía ngân hàng lại quan\ntâm đến việc đó?」"

# monologue
# JP: 効率化うんぬんについては理解してくれているのだろう。\n宗方さんの質問は、最初から根っこの部分へ向かう。
2921 = "Có lẽ chú ấy đã hiểu về vấn đề tối ưu hóa\nhiệu quả.\nCâu hỏi của Munakata nhắm thẳng vào gốc rễ\ncủa vấn đề ngay từ đầu."

# 【宗方】
# display as 宗方
# JP: 「このご時世、鉄道で儲けるのは厳しいでしょうに」
1979 = "「Thời buổi này, kiếm tiền từ đường sắt khó\nkhăn lắm mà.」"

# 【稀咲】
# display as 稀咲
# JP: 「確かに。ので御一夜市、御一夜鉄道とヴィジョンを\n共有し、シナジーある展開をと考えている最中です」
1900 = "「Đúng là vậy. Vì thế chúng tôi đang trong\nquá trình chia sẻ tầm nhìn với thành phố\nOhimitera,\nvà Đường sắt Ohito, để cùng nhau phát\ntriển tạo ra sức mạnh tổng hợp.」"

# 【宗方】
# display as 宗方
# JP: 「ビジョンを共有する？」
1596 = "「Chia sẻ tầm nhìn?」"

# 【稀咲】
# display as 稀咲
# JP: 「そこは、雛衣市長から」
2181 = "「Về phần đó, xin mời Thị trưởng Hinai.」"

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜市がすすめる、“蒸気のふるさと”構想を、\n更に推し進めていこうという発想です」
1847 = "「Ý tưởng là thúc đẩy mạnh mẽ hơn nữa dự án\n'Quê hương của hơi nước',\nmà thành phố Ohimitera đang tiến hành.」"

# 【宗方】
# display as 宗方
# JP: 「と、いうことは――」
2127 = "「Nói như vậy, có nghĩa là——」"

# monologue
# JP: 宗方さんが、また顎をかく。\n考え事をするときのクセなのだろう。
2703 = "Munakata lại gãi cằm. \nChắc hẳn đó là thói quen mỗi khi suy nghĩ."

# 【宗方】
# display as 宗方
# JP: 「術仙車両工場だけにとどまらず、\x%l保線;#00ffc040;保線%l;#;についても、\n御一夜回りに集積させ。言うなら“鉄道の御一夜”と？」
1525 = "「Không chỉ dừng lại ở nhà máy chế tạo toa\nxe Jutsu-sen, mà cả về \\x%l保線;#00ffc040;bảo trì đường ray%l;#;,\ncũng sẽ tập trung xung quanh Ohimitera. Có\nthể gọi là 'Ohimitera của đường sắt' sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そのとおりです」
1593 = "「Đúng là như vậy ạ.」"

# monologue
# JP: ポーレットの頷きには満足感だけが漂っている。\nオリヴィの話しどおり、そして稀咲の調査どおり。
2894 = "Cái gật đầu của Paulette chỉ toát lên sự\nmãn nguyện.\nĐúng như lời Olivy nói, và đúng như khảo\nsát của Kisaki."

# monologue
# JP: 宗方さんは学習意欲が高く、状況把握能力の高い――\n極めて現場向きの、仕事のできる人間だろうと感じられる。
2805 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata có tinh thần ham học hỏi\ncao, khả năng nắm bắt tình hình nhạy bén——\nCó thể cảm nhận được chú ấy là một người\ncực kỳ phù hợp với công việc thực tế, một\nngười rất có năng lực."

# 【ポーレット】
# display as 波萊特
# JP: 「かつて御一夜は、鉄道の一大\x%lターミナル駅;#00ffc040;ターミナル駅%l;#;でした。\n復線により、その再現を目指していくと同時に」
1886 = "「Trước đây, Ohimitera từng là một \\x%lターミナル駅;#00ffc040;ga đầu mối%l;#;\nđường sắt lớn.\nThông qua việc khôi phục các tuyến đường,\nchúng cháu hướng tới việc tái hiện lại\nđiều đó, đồng thời」"

# 【れいな】
# display as 玲奈
# JP: 「昔の[こくら,1]粉蔵みたいに、九洲の鉄道ぜぇんぶをお手当できる。\nポーレットは御一夜をそういうふうにしたいんですよぉ」
1658 = "「Giống như Kokura ngày xưa, có thể bảo\ndưỡng cho toàn bộ đường sắt ở Kyushu.\nPaulette muốn biến Ohimitera thành một nơi\nnhư vậy đó ạ~」"

# monologue
# JP: 帝鉄文化を知らぬがゆえに、\nいつものように、いつもと全く変わらずに。
2875 = "Vì không biết văn hóa của Teitetsu, \nnên như mọi khi, hoàn toàn không có gì\nthay đổi."

# monologue
# JP: ポーレットの上機嫌につられたれいなが、\nポーレットの言葉の続きをひきとり、つむぐ。
2549 = "Reina bị cuốn theo tâm trạng vui vẻ của\nPaulette,\nđã tiếp lời và nói ra những suy nghĩ của\nPaulette."

# 【ハチロク】
# display as 八六＆奥莉薇
# JP: 「！」\n「れいな」
1687 = "「!」\n「Reina」"

# 【れいな】
# display as 玲奈
# JP: 「はぁい、なんですかぁ？？？」
1734 = "「Vâng ạ, có chuyện gì vậy ạ???」"

# monologue
# JP: 思わず息を呑むハチロク・オリヴィにも、\nれいなは変わらぬにこにこ顔だ。
2519 = "Ngay cả khi Hachiroku và Olivy bất giác\nnín thở,\nReina vẫn giữ nụ cười tươi rói không đổi."

# 【宗方】
# display as 宗方
# JP: 「[こくら,1]粉蔵のイメージか……粉蔵と比べ、御一夜は物流経路で\nかなりのハンディを背負いそうだが」
1955 = "「Hình ảnh của Kokura sao... So với Kokura,\nOhimitera\ncó vẻ sẽ phải gánh chịu khá nhiều bất lợi\nvề tuyến đường logistics đấy.」"

# monologue
# JP: が、宗方さんはれいなの言葉を――御一夜鉄道の文化を、\n少なくとも表面上は、気にせず受け入れてくれている。
2565 = "Nhưng, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata đã đón nhận lời\nnói của Reina——văn hóa của Đường sắt\nOhito,\nít nhất là ngoài mặt, mà không hề bận tâm."

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、その通りですね」
1744 = "「U hu hu, đúng là như vậy ạ.」"

# monologue
# JP: ポーレットの顔がほころび、稀咲の眉も僅かにあがる。\n見かけによらぬ柔軟性――これは、思わぬ収穫だ。
2893 = "Gương mặt Paulette rạng rỡ, lông mày\nKisaki cũng khẽ nhướng lên.\nSự linh hoạt không thể đánh giá qua vẻ bề\nngoài——đây là một thu hoạch ngoài mong\nđợi."

# 【ポーレット】
# display as 波萊特
# JP: 「ですので当初は、実績を積みつつ、\n人的資源のみを集約していくことを、目標とします」
1949 = "「Vì vậy, trong giai đoạn đầu, vừa tích lũy\nthành tích,\nchúng cháu đặt mục tiêu chỉ tập trung vào\nnguồn nhân lực trước ạ.」"

# monologue
# JP: 車両デザイン・改修に関しても\x%l保線;#00ffc040;保線%l;#;に関しても。\n実績を積み、人を集めて、受注する仕事を拡大していく。
2471 = "Về cả thiết kế, cải tạo toa xe, lẫn \\x%l保線;#00ffc040;bảo trì đường ray%l;#;\n.\nTích lũy thành tích, thu hút nhân tài, và\nmở rộng quy mô công việc nhận thầu."

# monologue
# JP: 鉄道事業そのものの信頼感を回復し、将来性を期待させ、\nそれを復線の動きにつなげ、路線網を復活させていく。
2918 = "Khôi phục niềm tin vào chính ngành đường\nsắt, khơi dậy kỳ vọng vào tương lai,\nbiến điều đó thành động lực khôi phục các\ntuyến đường, và hồi sinh mạng lưới đường\nsắt."

# 【稀咲】
# display as 稀咲
# JP: 「最終的な構想としては、粉蔵、鹿兒島の車両工場を復活。\n術仙を三拠点の中心にしたい、という絵図面になるね」
2092 = "「Tầm nhìn cuối cùng là khôi phục các nhà\nmáy chế tạo toa xe ở Kokura và Kagoshima.\nJutsu-sen sẽ trở thành trung tâm của ba cứ\nđiểm, đó là bản thiết kế của chúng tôi.」"

# 【宗方】
# display as 宗方
# JP: 「ほう、それは遠大な」
1758 = "「Chà, đó quả là một kế hoạch dài hạn.」"

# 【れいな】
# display as 玲奈
# JP: 「九洲で成功したら、うふふぅ」
1819 = "「Nếu thành công ở Kyushu, u hu hu~」"

# monologue
# JP: れいなが笑う。
2908 = "Reina cười."

# monologue
# JP: 笑ってぽーんと、\n‘遠大”をまるごと、さらに大きな風呂敷で包む。
3043 = "Cười rồi 'bộp' một cái, \ngói gọn toàn bộ sự 'dài hạn' đó bằng một\ntấm khăn gói đồ lớn hơn nữa."

# 【れいな】
# display as 玲奈
# JP: 「きっと、日ノ本の他のところも、\nみぃんな真似して、おんなじことをしてくれますよぉ」
2234 = "「Chắc chắn, những nơi khác ở Hinomoto\ncũng,\nsẽ bắt chước theo, và làm những điều tương\ntự đó ạ~」"

# 【宗方】
# display as 宗方
# JP: 「！」
1686 = "「!」"

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜鉄道自身も、将来的な延伸を計画してます。\n最優先は、御一夜－八ツ城の川線の復線。それから」
2089 = "「Bản thân Đường sắt Ohito cũng đang lên kế\nhoạch mở rộng trong tương lai.\nƯu tiên hàng đầu là khôi phục Tuyến sông\nOhimitera - Yatsushiro. Sau đó」"

# 【宗方】
# display as 宗方
# JP: 「ちょ、ちょっと待ってくれ――待ってください」
2173 = "「Ch, chờ một chút đã——xin hãy đợi một\nchút.」"

# monologue
# JP: 宗方さんが顎を激しくしごくようにし、首を振る。
2720 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata vuốt mạnh cằm và lắc đầu."

# 【宗方】
# display as 宗方
# JP: 「そこまで大きな話になると、俺――\n私には、どうにも、夢物語にしか聞こえなくなる」
2143 = "「Khi câu chuyện trở nên lớn lao đến mức\nđó, với tôi——\nvới tôi, nó nghe chẳng khác nào một câu\nchuyện viển vông.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、すいません。興奮して、ついつい余計なことまで」
1707 = "「A, cháu xin lỗi. Cháu phấn khích quá, nên\nlỡ lời nói hơi nhiều.」"

# monologue
# JP: ポーレットがペコリと頭を下げる、れいなも下げる。
2890 = "Paulette cúi đầu xin lỗi, Reina cũng cúi\nđầu theo."

# 【宗方】
# display as 宗方
# JP: 「いや、俺の頭が固く、古いだけのことだろう」
1520 = "「Không, chỉ là do đầu óc tôi cứng nhắc và\ncổ hủ quá thôi.」"

# monologue
# JP: 宗方さんも頭を下げて――オリヴィまでがそれに合わせる。
2695 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata cũng cúi đầu——và thậm chí\ncả\nOlivy cũng làm theo."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「なんかごめんね。ムナカタ、そういう人だから」
1793 = "「Có gì xin lỗi nha. Munakata là người như\nvậy đó.」"

# 【宗方】
# display as 宗方
# JP: 「おい」
1720 = "「Này」"

# monologue
# JP: 怒ったふりの、けれども怒気をふくまぬ言葉。\nほんのり、空気がやわらかになる。
2919 = "Lời nói giả vờ tức giận, nhưng lại không\nchứa chút giận dữ nào.\nBầu không khí trở nên dịu nhẹ đi một chút."

# 【ポーレット】
# display as 波萊特
# JP: 「とにかく保線専門の請負会社は、単体での計画ではなく、\n他との連携を前提にした、実現可能な計画なんです」
2079 = "「Tóm lại, công ty chuyên thầu bảo trì\nđường ray không phải là một kế hoạch đơn\nlẻ,\nmà là một kế hoạch khả thi, dựa trên tiền\nđề hợp tác với các bên khác ạ.」"

# 【宗方】
# display as 宗方
# JP: 「そこは理解できた――かと思います」
1936 = "「Điểm đó thì tôi đã hiểu——tôi nghĩ vậy.」"

# 【稀咲】
# display as 稀咲
# JP: 「双方の希望が合致すれば、同社立ち上げメンバーとして、\n来年４月以降、宗方氏の招聘を、我々は検討しています」
1880 = "「Nếu mong muốn của cả hai bên đều thống\nnhất, chúng tôi đang xem xét việc\nmời chú Munakata về làm thành viên sáng\nlập công ty từ tháng 4 năm sau.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Really！！？」
2279 = "「Really!!?」"

# monologue
# JP: オリヴィの喉から歓喜の声。\n宗方氏の意向が確定するまで、ぬか喜びをさせぬよう――
2637 = "Tiếng hoan hô bật ra từ cổ họng Olivy. \nCho đến khi ý định của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata\nđược xác nhận, để không làm em ấy mừng\nhụt——"

# monologue
# JP: そう配慮をしていたのだが、\nこの状況では、やむを得まい。
2810 = "Dù đã cân nhắc như vậy, \nnhưng trong tình huống này, cũng đành chịu\nthôi."

# 【ポーレット】
# display as 波萊特
# JP: 「同時に\x%l機関士;#00ffc040;機関士%l;#;・\x%l機関助士;#00ffc040;機関助士%l;#;の指導を主務とした御一夜鉄道\n[しょくたく,1]嘱託職員としても勤務して貰えればと思っています」
2104 = "「Đồng thời, chúng cháu cũng hy vọng chú có\nthể làm việc như một nhân viên \\x%l嘱託;#00ffc040;hợp đồng%l;#;\ncủa Đường sắt Ohito,\nvới nhiệm vụ chính là hướng dẫn \\x%l機関士;#00ffc040;lái tàu%l;#; và\n\\x%l機関助士;#00ffc040;phụ lái tàu%l;#;.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！！」
1674 = "「!!!」"

# monologue
# JP: オリヴィの目が、こぼれそうなほどまんまるになる。\nが――こちらの方が、当然すぎる要望だ。
2557 = "Mắt Olivy mở to đến mức như sắp rơi ra\nngoài.\nNhưng——đây mới là yêu cầu hiển nhiên hơn\ncả."

# monologue
# JP: （懸念であった\x%lレイルロオド;#00ffc040;レイルロオド%l;#;扱いの違いについても、\n大きな問題にはならなさそうである以上――）
3078 = "（Vì có vẻ như sự khác biệt trong cách đối\nxử với \\x%lレイルロオド;#00ffc040;Railord%l;#; vốn là điều đáng lo ngại,\ncũng sẽ không thành vấn đề lớn——）"

# monologue
# JP: 帝鉄全盛期に教導を任され、今なお現役である\x%l機関士;#00ffc040;機関士%l;#;。
2710 = "Một \\x%l機関士;#00ffc040;lái tàu%l;#; được giao phó việc hướng dẫn\nvào thời\nkỳ hoàng kim của Teitetsu, và hiện tại vẫn\nđang làm việc."

# monologue
# JP: 新人を増員、育成していかねばならぬ\nこれからの御一夜鉄道に、これほど好適な人材も無かろう。
2753 = "Đối với Đường sắt Ohito trong tương lai,\nkhi cần phải tuyển thêm và đào tạo nhân\nviên mới,\nkhông có nhân tài nào phù hợp hơn chú ấy."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それならそれなら！　それならさ！！」
1976 = "「Nếu vậy nếu vậy! Nếu vậy thì!!」"

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！？」
1794 = "「Bé Olivy!?」"

# monologue
# JP: 宗方\x%l機関士;#00ffc040;機関士%l;#;の前であるのに、\nもうオリヴィは、完全に僕らの前でのオリヴィだ。
2858 = "Dù đang ở trước mặt \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, \nnhưng Olivy đã hoàn toàn trở lại là Olivy\nkhi ở trước mặt chúng tôi."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;！　\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のケンシューとか\nケンキューするしせつも、オヒトヨとかジュツセンに！」
2191 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#;! Cơ sở bảo dưỡng hay nghiên cứu \\x%lレイルロオド;#00ffc040;Railord%l;#;\ncũng nên đặt ở Ohitoyo hoặc Jutsu-sen đi!」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！！！」
1703 = "「A!!!」"

# 【れいな】
# display as 玲奈
# JP: 「でもでも、とろるゆのおばあさん、\nそういうのしてくれなさそうって思いますぅ」
1635 = "「Nhưng mà nhưng mà, bà lão ở Tororyu-yu, \nReina nghĩ bà ấy sẽ không chịu làm những\nviệc như vậy đâu ạ.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だからトロルユのおばーさんには、ムナカタとおなじ！\n現場じゃなくて、アドバイザー役をやってもらうの！！」
1946 = "「Vì thế nên bà lão ở Tororyu-yu cũng giống\nnhư Munakata vậy!\nKhông phải ở hiện trường, mà sẽ đảm nhận\nvai trò cố vấn!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうか、第一線の研究員を、\n不死鳥博士――[おおみや,1]旺宮から派遣してもらうなどして」
1684 = "「A! Đúng rồi, chúng ta có thể nhờ Tiến sĩ\nFushichou——từ Omiya\ncử các nhà nghiên cứu hàng đầu đến hỗ\ntrợ.」"

# 【ハチロク】
# display as 八六
# JP: 「それは……ありかもしれませんね。[おおみや,1]旺宮ー[ひろしま,1]廣島ー御一夜に、\nまがりなりにも、交流が発生しはじめたのですし」
2176 = "「Điều đó... có thể khả thi đấy ạ. Dù sao\nthì giữa Omiya, Hiroshima và Ohimitera,\ncũng đã bắt đầu có sự giao lưu rồi mà.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「でしょでしょ！？　わざわざオーミヤおくらなくても\nケンシューできるなら、お仕事きっとたくさん来るし！」
1862 = "「Đúng không đúng không!? Nếu không cần gửi\nđến tận Omiya\nmà vẫn có thể bảo dưỡng được, thì chắc\nchắn sẽ có rất nhiều công việc đổ về!」"

# monologue
# JP: こく、と何かを飲み下す音。\n顔を向ければ、稀咲がコーヒーカップを置いている。
3042 = "Ực, tiếng nuốt thứ gì đó. \nQuay sang nhìn, Kisaki đang đặt tách cà\nphê xuống."

# 【稀咲】
# display as 稀咲
# JP: 「……\x%lレイルロオド;#00ffc040;レイルロオド%l;#;検修というのにはどの程度の需要が？\nその単価と利益率、九洲内での現在の需給動向は？」
1130 = "「...Nhu cầu về việc bảo dưỡng \\x%lレイルロオド;#00ffc040;Railord%l;#; ở\nmức độ nào?\nĐơn giá, tỷ suất lợi nhuận, và xu hướng\ncung cầu hiện tại ở Kyushu ra sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「その辺は精査したことないです。けど……第一印象では、\nこれ、多分、いけそうなアイディアな気がします」
2178 = "「Về những phần đó thì cháu chưa từng xem\nxét kỹ. Nhưng... ấn tượng ban đầu thì,\nđây, có lẽ, là một ý tưởng rất có triển\nvọng.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「フシチョーハカセだって絶対キョーリョクしてくれる！\nだって、オリヴィとかハチロクとかのデータ」
1529 = "「Tiến sĩ Fushichou chắc chắn cũng sẽ HỢP\nTÁC!\nBởi vì, dữ liệu của Olivy, Hachiroku và\nmọi người」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1682 = "「A——」"

# monologue
# JP: そこまでは、僕も迂闊にも気づいてなかった。\nしかし、確かにその通りだ。
2860 = "Đến tận lúc đó, ngay cả tôi cũng sơ suất\nkhông nhận ra.\nNhưng, quả thực đúng là như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、九洲に拠点を作るということは、\n九洲の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;に関するデータを大量に――」
1850 = "「Đúng rồi, việc xây dựng cứ điểm ở Kyushu\ncó nghĩa là,\nmột lượng lớn dữ liệu về \\x%lレイルロオド;#00ffc040;Railord%l;#; ở Kyushu\nsẽ——」"

# 【ハチロク】
# display as 八六
# JP: 「不死鳥博士が直接的に収集できるようになる――\nということでもあるのですね」
2085 = "「Tiến sĩ Fushichou sẽ có thể trực tiếp thu\nthập được——\nCó nghĩa là như vậy đúng không ạ.」"

# monologue
# JP: 実際、御一夜鉄道では旺宮を使っていなかった。\n同様の小規模鉄道事業者も決して少なくはなかろう。
2477 = "Thực tế, Đường sắt Ohito đã không sử dụng\nOmiya.\nChắc chắn cũng có không ít các doanh\nnghiệp đường sắt quy mô nhỏ tương tự như\nvậy."

# monologue
# JP: そうしてそうした小規模鉄道事業者ほど、\n老朽化した\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を稼働させている率は、高い。
2970 = "Và đối với những doanh nghiệp đường sắt\nquy mô nhỏ đó,\ntỷ lệ vận hành các \\x%lレイルロオド;#00ffc040;Railord%l;#; đã cũ kỹ là rất\ncao."

# 【双鉄】
# display as 雙鐵
# JP: 「それはまさに……不死鳥博士が最も欲しがっている\n情報のひとつに違いない」
2097 = "「Đó chắc chắn... là một trong những thông\ntin\nmà Tiến sĩ Fushichou đang khao khát nhất.」"

# 【ハチロク】
# display as 八六
# JP: 「ですので、“絶対協力してくれる”。そしてそれは、\n延命などの研究に大きく寄与する可能性を持つ」
1944 = "「Vì thế nên, 'chắc chắn sẽ hợp tác'. Và\nđiều đó,\ncó khả năng đóng góp to lớn vào các nghiên\ncứu như kéo dài tuổi thọ.」"

# 【れいな】
# display as 玲奈
# JP: 「ふわわぁ！　すごいですぅ、オリヴィさん。\nれいな、そんなことぜぇんぜん思いつきませんでしたぁ」
1672 = "「Oa! Chị Olivy giỏi quá đi. \nReina hoàn toàn không nghĩ ra được chuyện\nnhư vậy đâu ạ.」"

# monologue
# JP: ごくごく素直な賞賛に、オリヴィの顔が笑み崩れる。
2641 = "Trước lời khen ngợi vô cùng chân thành,\nkhuôn mặt Olivy rạng rỡ hẳn lên."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「メイジからずっと走ってきてるから！　その分たくさん、\n見て、聞いて、\x%l共感;#00ffc040;共感%l;#;してきたし、それにっ！」
1790 = "「Bởi vì chị đã chạy suốt từ thời Meiji mà!\nVì thế nên chị đã nhìn thấy,\nnghe thấy, và \\x%l共感;#00ffc040;cộng cảm%l;#; rất nhiều, hơn nữa\nnhé!」"

# monologue
# JP: オリヴィがイスから立ち上がり、\n宗方\x%l機関士;#00ffc040;機関士%l;#;にぱっ！　と近寄る。
2629 = "Olivy đứng dậy khỏi ghế, \nnhanh chóng! tiến lại gần \\x%l機関士;#00ffc040;lái tàu%l;#;\nMunakata."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「コーシューカイとかそういうのには、ムナカタ、\nオリヴィもついていっていいっていってくれたから！」
2086 = "「Những buổi HỘI THẢO hay những thứ tương\ntự, Munakata\ncũng đã cho phép Olivy đi cùng mà!」"

# monologue
# JP: 驚きにだろう。やはり丸くなっていた宗方\x%l機関士;#00ffc040;機関士%l;#;の目が、\n理解の色に落ち着いていく。
2665 = "Có lẽ là do ngạc nhiên. Đôi mắt vốn đang\ntròn xoe của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata,\ndần chuyển sang ánh nhìn thấu hiểu."

# monologue
# JP: ならばあるいは、鉄道事業者の経営についてなど――\nそうした講習も、宗方さんは受講していたのかもしれん。
2830 = "Nếu vậy thì có lẽ, về quản lý doanh nghiệp\nđường sắt hay những thứ tương tự——\nNhững bài giảng đó, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata cũng\nđã từng tham gia."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、オリヴィの知ってるダイジなことは、\nぜーんぶムナカタが教えてくれたんだよ！！」
1943 = "「Vì thế nên, những điều QUAN TRỌNG mà\nOlivy biết,\ntất cả đều là do Munakata dạy cho đó!!」"

# 【宗方】
# display as 宗方
# JP: 「……買い被りすぎだ」
1170 = "「...Đánh giá quá cao rồi.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えへへー」
1750 = "「E he he~」"

# monologue
# JP: 宗方\x%l機関士;#00ffc040;機関士%l;#;が立ちあがり、\nほんの一瞬、オリヴィの帽子に手のひらを置く。
2663 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata đứng dậy, \ntrong một thoáng, đặt lòng bàn tay lên\nchiếc mũ của Olivy."

# monologue
# JP: そして表情を引き締めて、\nまっすぐポーレットに向き直る。
2903 = "Rồi chú ấy nghiêm mặt lại, \nquay thẳng về phía Paulette."

# 【宗方】
# display as 宗方
# JP: 「――み鉄には世話になりました。\n定年までは勤めきり、恩を返したいと思っています」
2010 = "「——Tôi đã chịu nhiều ân huệ của Đường sắt\nMikan.\nTôi muốn làm việc đến lúc nghỉ hưu để báo\nđáp ân tình đó.」"

# 【ポーレット】
# display as 波萊特
# JP: 「失礼ですが、ご定年をお迎えになられるのは」
2194 = "「Xin thất lễ, nhưng thời điểm chú nghỉ hưu\nlà」"

# 【宗方】
# display as 宗方
# JP: 「再来年の三月になります」
1934 = "「Tháng 3 năm sau nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「でしたら。もちろん再来年までお待ちします。\n定年明けの四月から勤務いただく形で――」
2217 = "「Nếu vậy. Tất nhiên chúng cháu sẽ đợi đến\nnăm sau nữa.\nBắt đầu làm việc từ tháng 4 sau khi chú\nnghỉ hưu——」"

# 【稀咲】
# display as 稀咲
# JP: 「それまでの間も、可能でしたら月一ペース程度で、\n外部顧問のような形での関与を願えればと」
1805 = "「Trong khoảng thời gian từ giờ đến lúc đó,\nnếu có thể, khoảng một tháng một lần,\nchúng tôi hy vọng chú có thể tham gia dưới\nhình thức cố vấn bên ngoài.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　はい、そうです。そうしていただけましたら、\nわたくしどもとしては一番、助かります」
1702 = "「A! Vâng, đúng vậy ạ. Nếu chú có thể làm\nnhư vậy,\nđối với chúng cháu sẽ là một sự giúp đỡ\nlớn nhất.」"

# monologue
# JP: ポーレットの誠意と、稀咲の現実的なセンスと。\nその双方が、見事に噛み合い機能している。
2892 = "Sự chân thành của Paulette, và ý thức thực\ntế của Kisaki.\nCả hai yếu tố đó đang kết hợp và phát huy\ntác dụng một cách hoàn hảo."

# monologue
# JP: それを好感してくれたのか、宗方さんの引き締まった顔が、\nふ、と緩む。
2997 = "Có lẽ vì có ấn tượng tốt với điều đó,\nkhuôn mặt nghiêm nghị của \\x%l機関士;#00ffc040;lái tàu%l;#;\nMunakata,\nkhẽ giãn ra."

# 【宗方】
# display as 宗方
# JP: 「……定年退職した後でも、私が蓄積した経験が、\n御社や鉄道の役に立つなら、嬉しいことです」
1147 = "「...Sau khi nghỉ hưu, nếu những kinh\nnghiệm tôi tích lũy được,\ncó thể giúp ích cho quý công ty và ngành\nđường sắt, thì tôi rất sẵn lòng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「でしたら！」
2209 = "「Nếu vậy thì!」"

# 【宗方】
# display as 宗方
# JP: 「ポストや報酬については、今日の仕事振りを見てもらい、\n提示を貰うような形でどうでしょうか？」
2103 = "「Về vị trí và thù lao, xin hãy xem xét\ncách làm việc của tôi ngày hôm nay,\nrồi đưa ra đề xuất, như vậy được không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「お金のことでしたらっ」
2117 = "「Nếu là chuyện tiền bạc thì」"

# 【稀咲】
# display as 稀咲
# JP: 「もちろん、そのようにご相談させていただければと」
1924 = "「Tất nhiên rồi, chúng tôi muốn bàn bạc với\nchú theo hướng đó.」"

# monologue
# JP: 興奮気味のポーレットの声を遮って、\nお金についてを、稀咲が引き取る。
2936 = "Cắt ngang giọng nói đầy phấn khích của\nPaulette,\nKisaki tiếp nhận phần nói về tiền bạc."

# monologue
# JP: ポーレットが軽々に報酬を弾み過ぎぬよう、ここだけは、\n銀行家でなく、御一夜鉄道経営顧問になってくれている。
2554 = "Để tránh việc Paulette đưa ra mức thù lao\nquá hời một cách dễ dãi, chỉ riêng điểm\nnày,\ncô ấy không phải là nhân viên ngân hàng,\nmà đang đóng vai trò cố vấn quản lý của\nĐường sắt Ohito."

# 【宗方】
# display as 宗方
# JP: 「なら。そういうことで」
2239 = "「Nếu vậy. Thì quyết định như thế đi.」"

# monologue
# JP: 軽く一礼。\n宗方さんが振り向けば、オリヴィもすぐにその後を追う。
2705 = "Khẽ cúi chào. \nKhi \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata quay người lại, Olivy\ncũng lập tức đi theo sau."

# 【宗方】
# display as 宗方
# JP: 「右田\x%l機関士;#00ffc040;機関士%l;#;。早速で悪いが、\n連絡をもらった支障個所に連れていってくれ」
1642 = "「\\x%l機関士;#00ffc040;Lái tàu%l;#; Migita. Ngại quá vì phải đi ngay,\nnhưng phiền cậu dẫn tôi đến chỗ xảy ra sự\ncố mà cậu đã liên lạc.」"

# monologue
# JP: 小畑を越えた8620を早戸駅の留置線にいれ、\nエアクラトラックで三十分ほど戻って隆起現場へ。
2811 = "Đưa chiếc 8620 vừa vượt qua Okoba vào\nđường ray lưu đỗ ở ga Hayato,\nchúng tôi quay lại hiện trường phồng rộp\nbằng xe tải Aircra mất khoảng ba mươi\nphút."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「どーお？　ムナカタ」
1836 = "「Sao rồi? Munakata」"

# monologue
# JP: 何十度目か。全く同じオリヴィの問い。
2627 = "Đã là lần thứ mấy chục rồi. Vẫn cùng một\ncâu hỏi đó của Olivy."

# 【宗方】
# display as 宗方
# JP: 「……目星はいくつか」
1162 = "「...Cũng có vài manh mối.」"

# monologue
# JP: 『焦るな』ではない言葉がついに、\n宗方\x%l機関士;#00ffc040;機関士%l;#;の口から出て来る。
3025 = "「Vài manh mối là sao!?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いくつかって！？」
2192 = "「Với diện tích phồng rộp rộng thế này, có\nthể loại trừ khả năng do chuột chũi hay rễ\ncây.\nViệc \\x%l枕木;#00ffc040;tà vẹt%l;#; đóng băng và giãn nở cũng\nkhông thể xảy ra ở nhiệt độ này.」"

# 【宗方】
# display as 宗方
# JP: 「この広範な隆起なら、モグラや木の根の可能性は消せる。\n\x%l枕木;#00ffc040;枕木%l;#;の凍結膨張も、この気温では発生しない」
2246 = "「Ừm!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
1723 = "「Vì vậy, \nmạch nước ngầm, khí gas, hoặc dòng chảy\nngầm dưới lòng đất là những khả năng đáng\nngờ nhất lúc này.」"

# 【宗方】
# display as 宗方
# JP: 「だから、\n水脈、ガス、地中流動あたりがひとまず怪しい」
1950 = "「DÒNG CHẢY NGẦM?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「チチューリュードー？」
1761 = "「Là hiện tượng nền đất trôi đi và dịch\nchuyển, ảnh hưởng của nó bộc lộ lên bề\nmặt.\nNếu tôi nhớ không lầm, khu vực này là——」"

# 【宗方】
# display as 宗方
# JP: 「地盤が流れて動き、その影響が地表にでることだ。\nたしか、このあたりは――」
1864 = "「Là thị trấn Hayato, thành phố Kirishima,\ntỉnh Kagoshima ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「鹿兒島県[きりしま,1]霧縞市[はやとちょう,2]早戸町、でございます」
2133 = "「Nếu là Kirishima thì là vùng suối nước\nnóng, vành đai núi lửa.\nNhững khả năng tôi vừa nêu, khả năng nào\ncũng hoàn toàn có thể xảy ra.」"

# 【宗方】
# display as 宗方
# JP: 「[きりしま,1]霧縞なら温泉地、火山帯だ。\n今あげた可能性の、どれも十分にありえるな」
1765 = "「Ra là vậy!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうなんだ！」
1995 = "「Ra là vậy!」"

# monologue
# JP: ハチロクからの適時・正確な報告に、\n礼のひとつも返ってこない。
2569 = "Trước báo cáo kịp thời và chính xác của\nHachiroku,\nkhông hề có một lời cảm ơn nào đáp lại."

# monologue
# JP: この辺はやはり文化の違いを思ってしまうが、\nハチロクもオリヴィも、まったく気にする風もない。
2802 = "Điểm này quả thực khiến tôi nghĩ đến sự\nkhác biệt về văn hóa,\nnhưng cả Hachiroku và Olivy đều không có\nvẻ gì là bận tâm."

# 【宗方】
# display as 宗方
# JP: 「これから掘る全ての地点、計測して記録しておけ」
1961 = "「Từ giờ trở đi, hãy đo đạc và ghi chép lại\ntất cả những điểm sẽ đào.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！」
1980 = "「Rõ rồi!」"

# monologue
# JP: （『物』としての\x%lレイルロオド;#00ffc040;レイルロオド%l;#;か）
3071 = "（\\x%lレイルロオド;#00ffc040;Railord%l;#; với tư cách là một 'vật dụng'\nsao）"

# monologue
# JP: ……宗方さんの接し方を見ていれば、わかってくる。\n宗方さんはオリヴィを、確かによく使いこなしている。
1097 = "...Nhìn cách đối xử của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata,\ntôi cũng hiểu ra phần nào.\n\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata quả thực sử dụng Olivy\nrất thành thạo."

# monologue
# JP: 手に馴染むペンばかりを酷使してしまうのと同様に、\n細かなことでも大きなことでも――
2484 = "Giống như việc chỉ sử dụng đến mức lạm\ndụng cây bút quen tay,\ndù là chuyện nhỏ nhặt hay to tát——"

# 【宗方】
# display as 宗方
# JP: 「ガンスコ」
1869 = "「Gansuko.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
1802 = "「Vâng!」"

# monologue
# JP: オリヴィは飛ぶように駆け、ガンスコを――
2644 = "Olivy chạy như bay, lấy Gansuko——"

# monologue
# JP: \x%lバラスト;#00ffc040;バラスト%l;#;ごと掘り返せる、先端にフォークがついている\n保線用のスコップを、抱えて戻る。
2760 = "Mang theo chiếc xẻng chuyên dụng cho bảo\ntrì đường ray,\ncó phần mũi dạng nĩa để đào cả \\x%lバラスト;#00ffc040;đá ba-lát%l;#;\nquay trở lại."

# 【宗方】
# display as 宗方
# JP: 「持ってろ」
2177 = "「Cầm lấy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
# 1723 = "「嗯！」" 

# monologue
# JP: カメラと書類バサミをオリヴィに預け、\n宗方さんは無造作にガンスコを隆起部分――
2713 = "Giao máy ảnh và kẹp tài liệu cho Olivy, \n\\x%l機関士;#00ffc040;lái tàu%l;#; Munakata thản nhiên dùng Gansuko\nđào phần bị phồng rộp——"

# monologue
# JP: 線路を避けた、犬走りのあたりから掘り進んでいく。
2914 = "Tránh phần đường ray, chú ấy bắt đầu đào\ntừ khu vực lối đi dành cho chó."

# monologue
# JP: （ざくっ！　ざくっ！　ざくっ！　ざくっ！）
3066 = "（Phập! Phập! Phập! Phập!）"

# monologue
# JP: （パシャ）
3068 = "（Tách）"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1752 = "「A——」"

# monologue
# JP: 『記録』とは、位置情報だけではないのか。
2538 = "「A——」"

# monologue
# JP: それが当然といった仕草でオリヴィは、\n宗方さんの作業の様子を撮影している。
2962 = "Ghi chép' không chỉ là thông tin vị trí\nsao."

# 【宗方】
# display as 宗方
# JP: 「……わからんな」
1156 = "「...Không rõ nguyên nhân.」"

# monologue
# JP: 宗方さんが他の地点へ移動する。
2717 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata di chuyển sang địa điểm\nkhác."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ここ、埋め戻す？」
2184 = "「Chỗ này, lấp lại nhé?」"

# 【宗方】
# display as 宗方
# JP: 「埋め戻せ」
1572 = "「Lấp lại đi.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！」
1797 = "「Rõ rồi!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そのくらいは僕がやろう」
1717 = "「A, việc cỏn con đó cứ để tôi làm cho.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ありがと！　ソーテツ！！」
1768 = "「Cảm ơn nha! Soutetsu!!」"

# monologue
# JP: 引き受けるやいなやで、\n嬉しげにオリヴィは宗方\x%l機関士;#00ffc040;機関士%l;#;へとすっとんで行く。
2620 = "Vừa mới nhận lời xong, \nOlivy đã vui vẻ chạy tót đến chỗ \\x%l機関士;#00ffc040;lái tàu%l;#;\nMunakata."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし……」
1536 = "「Nhưng mà...」"

# monologue
# JP: （ざくっ――ざくっ――）
# 3066 = "（一陣翻土聲）" 

# monologue
# JP: ……実によく働く。宗方さんも、オリヴィも。\n感心させられると同時に、理解もさせられる。
1103 = "...Thực sự làm việc rất chăm chỉ. Cả \\x%l機関士;#00ffc040;lái tàu%l;#;\nMunakata và Olivy.\nVừa thán phục, đồng thời tôi cũng hiểu ra."

# monologue
# JP: オリヴィは、働くことが、使われることが幸せなのだ。\nそれが宗方さんにであれば、おそらく、何より――
2979 = "Olivy hạnh phúc khi được làm việc, khi\nđược sử dụng.\nNếu người đó là \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata, thì có\nlẽ, hơn bất cứ điều gì——"

# 【ハチロク】
# display as 八六
# JP: 「あの……双鉄さま？」
2132 = "「Dạ... ngài Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1739 = "「嗯？」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしにも、お手伝いをさせてください」
2136 = "「Xin hãy để em giúp ngài một tay.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そのままでかまわない。つまり、宗方さんの\n作業の様子を、観察、記録してほしい」
1539 = "「Không, em cứ đứng đó là được rồi. Tóm\nlại,\ntôi muốn em quan sát và ghi chép lại quá\ntrình làm việc của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata.」"

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1696 = "「啊！」" 

# monologue
# JP: ほっとしたようなハチロクの声。\nついで、トーンがひそっ、と落ちる。
2511 = "Giọng Hachiroku nghe như trút được gánh\nnặng.\nTiếp đó, tông giọng trầm xuống thì thầm."

# 【ハチロク】
# display as 八六
# JP: 「左様でございましたね。\nそれは、双鉄さまの大事なお仕事でございますものね」
2250 = "「Đúng là như vậy nhỉ. \nĐó là công việc quan trọng của ngài\nSoutetsu mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1722 = "「嗯」" 

# monologue
# JP: 埋め戻しをしながらでも見るは見れるが、やはり気が散る。\n報告のため、ハチロクには観察に集中してほしい。
3044 = "Dù vừa lấp đất vừa quan sát cũng được,\nnhưng quả nhiên vẫn sẽ bị phân tâm.\nĐể phục vụ cho việc báo cáo, tôi muốn\nHachiroku tập trung vào việc quan sát."

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました。必ずや、双鉄さまにかわって」
1932 = "「Em hiểu rồi ạ. Nhất định, em sẽ thay mặt\nngài Soutetsu」"

# 【双鉄】
# display as 雙鐵
# JP: 「よろしく頼む」
1959 = "「Nhờ em cả đấy.」"

# monologue
# JP: となれば、僕も埋め戻しだけでは申し訳ない。\n宗方\x%l機関士;#00ffc040;機関士%l;#;はいかにも壮健そうに見えるが、定年間際だ。
2849 = "Nếu vậy, tôi cũng thấy áy náy nếu chỉ lấp\nđất.\n\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata tuy trông có vẻ tráng\nkiện, nhưng cũng sắp đến tuổi nghỉ hưu\nrồi."

# monologue
# JP: この残暑の中、一番キツイ肉体労働を\n彼だけにさせるというのは、人間として間違っていよう。
2583 = "Trong cái nắng nóng oi ả cuối hè này, để\nmột mình chú ấy làm công việc chân tay\nnặng nhọc nhất\nthì xét về mặt tình người, thật không phải\nđạo."

# 【双鉄】
# display as 雙鐵
# JP: 「埋め戻しました。他にも、手伝いできることがあれば」
1929 = "「Cháu lấp xong rồi ạ. Ngoài ra, nếu có\nviệc gì cần giúp đỡ」"

# 【宗方】
# display as 宗方
# JP: 「いや、掘る方には手は出さないでくれ。\nさっきも言ったが、ガスの可能性もある」
1541 = "「Không, xin đừng nhúng tay vào việc đào\nbới.\nNhư tôi đã nói lúc nãy, cũng có khả năng\nlà khí gas.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1695 = "「A」"

# monologue
# JP: 宗方さんへと近づいていた足が、思わず止まる。\nオリヴィは、べったりと宗方\x%l機関士;#00ffc040;機関士%l;#;にくっついたままだ。
2864 = "Đôi chân đang tiến lại gần \\x%l機関士;#00ffc040;lái tàu%l;#;\nMunakata bất giác dừng lại.\nOlivy vẫn bám chặt lấy \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata\nkhông rời."

# monologue
# JP: 物であるゆえ、気にせず使える。\n――そうした信頼もあるのだと、思わぬところで思い知る。
2874 = "Vì là vật dụng, nên có thể sử dụng mà\nkhông cần bận tâm.\n——Thì ra cũng có sự tin tưởng như vậy, tôi\nchợt nhận ra điều đó ở một khía cạnh không\nngờ tới."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーだよ！　ガスが吹き出たらアブナイし！\nこっちはムナカタとオリヴィにまかせていーよ！！」
1858 = "「Đúng vậy đó! Nếu khí gas phun ra thì NGUY\nHIỂM LẮM!\nBên này cứ giao cho Munakata và Olivy là\nđược rồi!!」"

# 【宗方】
# display as 宗方
# JP: 「汗」
1963 = "「Mồ hôi」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うんっ！」
# 1723 = "「嗯！」" 

# monologue
# JP: 確かにこの件に関し、僕らには経験も知識も無い。
2916 = "Quả thực trong chuyện này, chúng tôi không\ncó kinh nghiệm cũng như kiến thức."

# monologue
# JP: ガスの危険は無視できないし、オリヴィの言にははっきり、\n『邪魔しないで』という響きも感じて――ああ、いや。
2910 = "Mối nguy hiểm từ khí gas là không thể xem\nthường, và trong lời nói của Olivy rõ ràng\ncó mang âm hưởng 'Đừng làm kỳ đà cản\nmũi'——a, không phải."

# 【双鉄】
# display as 雙鐵
# JP: 「では、周辺情報の収集はどうでしょうか。\n今の仮説を元にして、この地域の地勢や歴史など」
2232 = "「Vậy thì, việc thu thập thông tin xung\nquanh thì sao ạ.\nDựa trên giả thuyết hiện tại, về địa thế\nvà lịch sử của khu vực này chẳng hạn」"

# 【宗方】
# display as 宗方
# JP: 「それは助かる」
2057 = "「Thế thì tốt quá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロク。僕は見る方にもどるゆえ」
2230 = "「Nếu vậy Hachiroku. Tôi sẽ quay lại việc\nquan sát」"

# 【ハチロク】
# display as 八六
# JP: 「ですが、双鉄さま」
2251 = "「Nhưng mà, ngài Soutetsu.」"

# monologue
# JP: 困ったように下がった眉毛。\n見た瞬間に、昨夜の記憶が蘇る。
2516 = "Đôi lông mày cụp xuống đầy vẻ bối rối. \nNhìn thấy biểu cảm đó, ký ức đêm qua lập\ntức ùa về."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！\nそうか、保線記録が廃棄されていたのだったか」
1700 = "「A! \nĐúng rồi, hồ sơ bảo trì đường ray đã bị\ntiêu hủy rồi nhỉ.」"

# 【宗方】
# display as 宗方
# JP: 「廃棄？」
2240 = "「Tiêu hủy?」"

# 【ハチロク】
# display as 八六
# JP: 「はい、左様です。この[やません,1]山線――元帝鉄[ひさつ,1]肥颯線、\n御一夜ー早戸間は、軍用路線だったとのことで」
2025 = "「Vâng, đúng vậy ạ. \\x%lTuyến núi%l;#;\nnày——nguyên là Tuyến Hisatsu của Teitetsu,\nđoạn Ohimitera - Hayato, được cho là tuyến\nđường sắt quân sự」"

# 【宗方】
# display as 宗方＆奥莉薇
# JP: 「ああ」\n「グンヨーロセン？」
2182 = "「A」\n「Tuyến đường quân sự?」"

# 【双鉄】
# display as 雙鐵
# JP: 「文字通り、\x%l大戦;#00ffc040;大戦%l;#;に備えるために国家計画として[ふせつ,1]敷設\nされた路線だ。海沿いでは、艦砲射撃の危険があるゆえ」
2257 = "「Đúng như tên gọi, đây là tuyến đường được\nxây dựng theo kế hoạch quốc gia\nđể chuẩn bị cho \\x%l大戦;#00ffc040;Đại chiến%l;#;. Vì nếu đi dọc\nbờ biển sẽ có nguy cơ bị pháo hạm bắn phá」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、だからこんな山の中にも、\nめっちゃくちゃキツイ線路しいたんだねー、ナットクー」
1713 = "「A~, thảo nào mà ở tận trong sâu trong núi\nthế này,\nlại có một tuyến đường sắt ĐỈNH CỦA CHÓP\nnhư vậy, HIỂU RỒI~」"

# monologue
# JP: オリヴィの感心の声にふと、かつての自分を思い出す。\n海沿いを走る東峡道線と、山間を抜ける忠央線。
2633 = "Nghe giọng điệu thán phục của Olivy, tôi\nchợt nhớ lại bản thân mình trước kia.\nTuyến Toukaido chạy dọc bờ biển, và Tuyến\nChuuou băng qua những dãy núi."

# monologue
# JP: 艦砲射撃のおそれがあったがゆえの両線敷設と――\nそれを教えてくれたのは、出会った頃のハチロクだったか。
2876 = "Việc xây dựng cả hai tuyến đường là do lo\nngại nguy cơ bị pháo hạm bắn phá——\nNgười đã cho tôi biết điều đó, là\nHachiroku hồi chúng tôi mới gặp nhau thì\nphải."

# 【ハチロク】
# display as 八六
# JP: 「今はみかん鉄道様の[せんだい,1]千内－[やつしろ,2]八ツ城を含む旧鹿兒島本線と、\n旧[ひさつ,1]肥颯線との関係は、帝都まわりで申しましたら」
2091 = "「Mối quan hệ giữa Tuyến chính Kagoshima cũ\n(hiện tại bao gồm đoạn Sendai - Yatsushiro\ncủa Đường sắt Mikan)\nvà Tuyến Hisatsu cũ, nếu so sánh với khu\nvực thủ đô thì」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そっくりだな。\n[とうかいどう,2]東峡道線と[ちゅうおう,1]忠央線との関係に」
1736 = "「A, giống hệt nhỉ. \nMối quan hệ giữa Tuyến Toukaido và Tuyến\nChuuou.」"

# 【ハチロク】
# display as 八六
# JP: 「あ」
# 1695 = "「啊」" 

# monologue
# JP: ハチロクの顔が、瞬時にとろける。\n幸せ色だけで塗りつぶされる。
2520 = "Khuôn mặt Hachiroku ngay lập tức tan chảy.\nChỉ còn lại một màu hạnh phúc."

# monologue
# JP: ふたり同時に、おなじ思い出を振り返っていた。\nそれだけのことが、かくも嬉しい。
2812 = "Cả hai chúng tôi cùng lúc, nhớ về cùng một\nkỷ niệm.\nChỉ vậy thôi, cũng đủ khiến tôi vui sướng\nnhường này."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも、コッカケーカク？　でやったことなら、\nちゃんと記録、のこってるんじゃないの？」
1567 = "「Nhưng mà, KẾ HOẠCH QUỐC GIA? Nếu là việc\nđược thực hiện bởi cái đó,\nthì chẳng phải ghi chép vẫn còn được lưu\nlại đàng hoàng sao? Để sau này còn phân\ntích nguyên nhân thất bại? Không thể áp\ndụng cho lần sau sao?」"

# 【双鉄】
# display as 雙鐵＆宗方
# JP: 「それは――」\n「逆だ、オリヴィ」
2169 = "「Chuyện đó thì——」\n「Ngược lại đấy, Olivy」"

# monologue
# JP: ざく、ざく、ざく。\nまた別の地点を掘り返しながら、宗方さんが言う。
2693 = "Phập, phập, phập. \n\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata vừa đào một địa điểm\nkhác, vừa nói."

# monologue
# JP: であれば僕は、もちろん黙る。\nオリヴィにも、僕らと同種の幸せを味わってほしいゆえ。
3030 = "Nếu vậy thì tôi, tất nhiên sẽ im lặng. \nVì tôi muốn Olivy cũng được nếm trải niềm\nhạnh phúc giống như chúng tôi."

# 【宗方】
# display as 宗方
# JP: 「敗戦国となったから、資料の全てを廃棄した。\n責任逃れの、よくある手段だ」
2101 = "「Vì trở thành nước bại trận, nên toàn bộ\ntài liệu đã bị tiêu hủy.\nĐó là thủ đoạn trốn tránh trách nhiệm\nthường thấy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「？？？　シリョーをのこしといた方が、まけた原因、\nあとでちゃあんと分析できない？　次にいかせない？」
1718 = "「??? Nếu LƯU GIỮ TÀI LIỆU, chẳng phải sau\nnày sẽ dễ dàng phân tích nguyên nhân thất\nbại sao? Không thể áp dụng cho lần sau\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2185 = "「這！」" 

# monologue
# JP: 言われて、気づく。オリヴィは冥国製――\n先の\x%l大戦;#00ffc040;大戦%l;#;の戦勝国で製造された\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。
2976 = "Nghe vậy, tôi mới nhận ra. Olivy được sản\nxuất tại Meikoku——\nlà một \\x%lレイルロオド;#00ffc040;Railord%l;#; được chế tạo ở quốc gia\nchiến thắng trong cuộc \\x%l大戦;#00ffc040;Đại chiến%l;#; trước."

# monologue
# JP: ぱっと出てくる基本発想の違いが……なるほど、\nあるいは勝敗をわけた一因であるのかもしれん。
2584 = "Sự khác biệt trong tư duy cơ bản bộc lộ\nngay lập tức... ra là vậy,\ncó lẽ đó cũng là một trong những nguyên\nnhân quyết định thắng bại."

# 【宗方】
# display as 宗方
# JP: 「追い詰められれば自分のことしか考えられない。\n人間は――少なくとも俺は、そういう程度だ」
1552 = "「Khi bị dồn vào chân tường, người ta chỉ\nnghĩ đến bản thân mình thôi.\nCon người——ít nhất là tôi, cũng chỉ ở mức\nđộ đó.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうなんだー」
1611 = "「Ra là vậy~」"

# monologue
# JP: 受け入れる。自嘲が多分に混じった言葉を、\nオリヴィは、ただ、フォローもせずに受け入れる。
2631 = "Chấp nhận. Lời nói mang đậm tính tự trào, \nOlivy chỉ đơn giản đón nhận mà không hề\nnói lời an ủi."

# 【宗方】
# display as 宗方
# JP: 「そのツケは逃げそこねたヤツに回る。\n要領のいい連中は、いつだって食い逃げし続ける」
2095 = "「Hậu quả của việc đó sẽ đổ lên đầu những\nkẻ không kịp chạy trốn.\nCòn những kẻ khôn lỏi, lúc nào cũng tiếp\ntục ăn quỵt rồi chuồn mất.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ヨーリョー！\nヒノモトの人たち、すっごくいいよねー！」
1872 = "「KHÔN LỎI! \nNgười Hinomoto, giỏi thật sự luôn đó~!」"

# 【宗方】
# display as 宗方
# JP: 「うん？」
# 1739 = "「嗯？」" 

# monologue
# JP: カラリと晴れた、一点の曇りも混じらぬオリヴィの声。\n会話のズレに、思わずだろう。宗方さんの手が止まる。
2634 = "Giọng nói của Olivy trong trẻo, quang\nđãng, không một chút vẩn đục.\nCó lẽ do sự lệch pha trong cuộc trò\nchuyện. Bàn tay của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata bất\ngiác dừng lại."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「タイセン前につくって、いまもこーんなしっかりしてる\n線路だもん！　ヨーリョー悪くちゃ、作れないよ！！」
2050 = "「Bởi vì, tuyến đường sắt được xây dựng từ\ntrước Đại chiến, đến tận bây giờ vẫn vô\ncùng chắc chắn thế này mà! Nếu không khôn\nlỏi thì làm sao mà xây được chứ!!」"

# 【宗方】
# display as 宗方
# JP: 「アホだな、お前は」
1574 = "「Ngốc thật đấy, nhóc con.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええっ！？」
1679 = "「Ế ế ế!?」"

# monologue
# JP: 情け容赦の無い指摘。\nけれど、オリヴィを見る瞳は優しい。
2697 = "Lời chỉ trích không chút nương tình. \nNhưng, ánh mắt nhìn Olivy lại rất dịu\ndàng."

# monologue
# JP: アホと呼ばれたオリヴィも、\nそれさえ嬉しいことかのように、ニコニコしている。
2965 = "Bị mắng là ngốc, \nnhưng Olivy vẫn cười rạng rỡ, như thể ngay\ncả điều đó cũng khiến em ấy vui mừng."

# 【宗方】
# display as 宗方
# JP: 「が、まぁ、お前の言う通りだ。\n確かに、この配線も[せこう,1]施行も、見事の一言だ」
1538 = "「Nhưng mà, đúng như lời nhóc nói. \nQuả thực, cách thiết kế và \\x%l施行;#00ffc040;thi công%l;#; tuyến\nđường này, chỉ có thể nói là quá tuyệt\nvời.」"

# monologue
# JP: 言って、ふと、宗方さんの目が僕に向く。
2725 = "Vừa nói, ánh mắt của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata chợt\nhướng\nvề phía tôi."

# 【宗方】
# display as 宗方
# JP: 「右田さんは大廃線前。御社社長が復線させたがっている、\n[かわせん,1]川線――[おひとよ,2]御一夜ー[やつしろ,2]八ツ城間に乗ったことは？」
1650 = "「Cậu Migita. Trước khi Đại bãi bỏ các\ntuyến đường sắt diễn ra. Tuyến sông mà\nngài Giám đốc quý công ty đang muốn khôi\nphục——\nđoạn Ohimitera - Yatsushiro, cậu đã từng\nđi qua chưa?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いえ……残念ながら。\nしかし、地図や資料では確認しています」
1882 = "「Dạ chưa... thật đáng tiếc. \nNhưng cháu đã xem qua trên bản đồ và tài\nliệu rồi ạ.」"

# 【宗方】
# display as 宗方
# JP: 「なら、気づいたろう。\nあれは――あれも、信じられないくらい丁寧な配線だ」
2231 = "「Nếu vậy thì cậu cũng nhận ra rồi chứ. \nĐó——tuyến đường đó cũng, được thiết kế cẩn\nthận đến mức khó tin.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう……なのですか？」
2053 = "「Là... vậy sao ạ?」"

# monologue
# JP: ハチロクと目を見合わせてしまう。
2823 = "Tôi bất giác nhìn sang Hachiroku."

# monologue
# JP: 復線について協議を重ねていた時期に、\nむしろ、僕らは半ばあきれていたものだった。
2581 = "Hồi còn đang bàn bạc về việc khôi phục\ntuyến đường sắt,\nngược lại, chúng tôi đã từng ngán ngẩm về\nnó."

# 【双鉄】
# display as 雙鐵
# JP: 「べったりとクマ川に沿い、左岸を走ってたかと思えば、\n右岸へ移り、また左岸。なんでこんな配線を、と――」
2001 = "「Cứ bám sát dòng sông Kuma, lúc thì chạy\nbên tả ngạn,\nrồi lại chuyển sang hữu ngạn, rồi lại về\ntả ngạn. Tại sao lại thiết kế đường ray\nnhư vậy——」"

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1696 = "「啊！」" 

# monologue
# JP: またハチロクと目を見合わせる。
2509 = "Lại một lần nữa nhìn sang Hachiroku."

# monologue
# JP: もしもあれが、\n『信じられないくらい丁寧な配線』であるのなら――
2653 = "Nếu đó là, \n'một thiết kế cẩn thận đến mức khó tin'——"

# 【双鉄】
# display as 雙鐵
# JP: 「理由があってのことなのですね？　\nわざわざいくつも鉄橋を架けた、あの配線には」
2238 = "「Chắc hẳn phải có lý do đúng không ạ? \nViệc cố tình xây dựng nhiều cây cầu sắt\nnhư vậy, cho thiết kế đường ray đó.」"

# 【宗方】
# display as 宗方
# JP: 「単純に、地盤がしっかりしている側に配線している」
1721 = "「Đơn giản là, họ thiết kế đường ray ở phía\ncó nền đất vững chắc hơn thôi.」"

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「あ！」\n「まぁ！」
1697 = "「A!」\n「Chà!」"

# 【宗方】
# display as 宗方
# JP: 「[しょうわ,1]正和二十年。国が帝鉄への予算を極端に削減したあの年、\nクマ川はかつてないほどに荒れ狂った」
2015 = "「Năm \\x%l正和;#00ffc040;Showa%l;#; thứ 20. Cái năm mà nhà nước cắt\ngiảm cực độ ngân sách dành cho Teitetsu,\nsông Kuma đã cuộn trào giận dữ chưa từng\nthấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「七月のクマ川洪水ですね。資料では見ました」
1865 = "「Trận lũ lụt sông Kuma vào tháng 7 đúng\nkhông ạ. Cháu có đọc qua trong tài liệu\nrồi.」"

# 【宗方】
# display as 宗方
# JP: 「その大水害の時でさえ、川線の線路には被害がなかった。\nあれは、そういう配線だ」
1610 = "「Ngay cả trong trận đại hồng thủy đó,\ntuyến đường sông vẫn không hề hấn gì.\nĐó, là một thiết kế đường ray như vậy\nđấy.」"

# 【ハチロク】
# display as 八六
# JP: 「ま、ぁ……」
2171 = "「Trời, ạ...」"

# monologue
# JP: ハチロクが恥じ入った顔をしている。
2517 = "Hachiroku đang mang vẻ mặt đầy xấu hổ."

# monologue
# JP: 『線路たるもの、直線が基本で究極でしょうに』と、\nあれほど口を尖らせていたゆえのことだろう。
2913 = "「Em, thật là thiển cận quá ạ.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくし、不明でございました」
1839 = "「Cháu đã học hỏi được rất nhiều điều.」"

# 【双鉄】
# display as 雙鐵
# JP: 「大変に勉強になりました」
1769 = "「Cháu đã học hỏi được rất nhiều điều.」"

# monologue
# JP: 大いに感心すると同時に、悪寒を覚える。\n川線同様、この山線も軍用路線。
2817 = "Cùng với sự thán phục, một cơn ớn lạnh\nchạy dọc sống lưng.\nGiống như tuyến sông, tuyến núi này cũng\nlà tuyến đường quân sự."

# monologue
# JP: 綿密に計画されて、\n丁寧に配線されたものであるなら――
2853 = "Nếu nó đã được lên kế hoạch tỉ mỉ, \nvà thiết kế đường ray một cách cẩn thận——"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、このタブレットを使い、ナビとも連携し、\nこの周辺の地下水流や、火山活動の情報収集をしてくれ」
1594 = "「Hachiroku, hãy dùng Tablet này, kết hợp\nvới Navi,\nthu thập thông tin về mạch nước ngầm và\nhoạt động núi lửa xung quanh đây nhé.」"

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄さま」
1801 = "「Đã rõ, thưa ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「やはり、僕も掘ります。場所と深さを指示してもらい、\nオリヴィに監視してもらうのでどうでしょう？」
2007 = "「Cháu cũng sẽ tham gia đào. Chú cứ chỉ\nđịnh vị trí và độ sâu,\nrồi để Olivy giám sát, như vậy được không\nạ?」"

# 【宗方】
# display as 宗方
# JP: 「リスクを理解してなら、止めん。\nオリヴィ、見てやれ」
1972 = "「Nếu cậu đã hiểu rõ rủi ro thì tôi không\ncản.\nOlivy, giám sát cậu ấy nhé.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！　ムナカタ！　指示ちょーだい！」
1985 = "「Rõ rồi! Munakata! Cho chỉ thị đi!」"

# monologue
# JP: ……イヤな予感は、どんどんふくらむ。\n叶うならこれに、蓋をしたい。
1098 = "...Linh cảm chẳng lành, ngày càng phình\nto.\nNếu được, tôi muốn đậy nắp nó lại."

# monologue
# JP: その可能性を高めるために、恐らくこれが、\n現状最適の人員配置であろうと信じる。
2895 = "Để nâng cao khả năng đó, tôi tin rằng, \nđây có lẽ là cách bố trí nhân sự tối ưu\nnhất hiện tại."

# 【宗方】
# display as 宗方
# JP: 「では続けるぞ。\n日暮れまでに、少しでも多く材料を得ておきたい」
2216 = "「Vậy thì tiếp tục thôi. \nTừ giờ đến lúc mặt trời lặn, phải thu thập\nthêm càng nhiều manh mối càng tốt.」"

# monologue
# JP: ……“原因は絞りこめるが特定できない”。
1093 = "...\"Có thể khoanh vùng nguyên nhân nhưng\nkhông thể xác định chính xác\"."

# monologue
# JP: 僕らの出した報告に、ポーレットが返す言葉は、\n極めて単純明快だ。
2754 = "Trước báo cáo mà chúng tôi đưa ra, lời đáp\nlại của Paulette,\nvô cùng đơn giản và rõ ràng."

# 【ポーレット】
# display as 波萊特
# JP: 「でしたら当面、御一夜鉄道としては、\nどのように対処すればいいんでしょうか？」
2224 = "「Nếu vậy thì trước mắt, Đường sắt Ohito, \nnên đối phó như thế nào ạ?」"

# 【宗方】
# display as 宗方
# JP: 「可能性をひとつひとつあたっていく。\nまずは、ガス」
1927 = "「Lần lượt kiểm tra từng khả năng một. \nTrước tiên, là khí gas.」"

# monologue
# JP: それに対する宗方さんも、また明快だ。
2966 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata đáp lại cũng rất rõ ràng."

# 【宗方】
# display as 宗方
# JP: 「ガスなら一番話が早い。地中ガス専門の調査会社に、\n依頼して調査してもらえばいいだけですね」
2048 = "「Nếu là khí gas thì giải quyết nhanh nhất.\nChỉ cần thuê một công ty chuyên khảo sát\nkhí gas ngầm,\nnhờ họ đến kiểm tra là xong.」"

# 【ポーレット】
# display as 波萊特
# JP: 「近隣自治体などとの調整は？」
2228 = "「Việc điều phối với các chính quyền địa\nphương lân cận thì sao ạ?」"

# 【宗方】
# display as 宗方
# JP: 「ひとまずは霧縞市に話せばいいんじゃないですかね？\n市で処理しきれなければ、自動的に県にいくでしょう」
1938 = "「Tạm thời cứ báo cáo với thành phố\nKirishima trước đi.\nNếu thành phố không xử lý được, tự động họ\nsẽ chuyển lên tỉnh thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「なるほど」
2128 = "「Cháu hiểu rồi.」"

# 【宗方】
# display as 宗方
# JP: 「ガスならそのまま専門家にまかせればいいんですが\n――ガスじゃないと、やっかいですね」
1815 = "「Nếu là khí gas thì cứ giao cho chuyên gia\nlà xong,\nnhưng——nếu không phải khí gas, thì phiền\nphức đấy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「さっき言ってた――『チチューリュードー』？」
1856 = "「Cái mà lúc nãy chú nói——'DÒNG CHẢY NGẦM'\ná?」"

# 【宗方】
# display as 宗方
# JP: 「の場合は、こちらからの問題解決方法はない。\nただ、収まってくれるのを待つだけだ」
1813 = "「Trong trường hợp đó, chúng ta không có\ncách nào để giải quyết vấn đề.\nChỉ còn cách chờ đợi nó tự lắng xuống\nthôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですか？」
2062 = "「Vậy sao ạ?」"

# monologue
# JP: 宗方さんの解答はただ、頷きだけだ。\n工夫の余地も妥協の余地も、全く無いと伝わってくる。
2731 = "Câu trả lời của \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata chỉ là\nmột cái gật đầu.\nTruyền đạt rõ ràng rằng hoàn toàn không có\nchỗ cho sự thỏa hiệp hay giải pháp nào\nkhác."

# 【双鉄】
# display as 雙鐵
# JP: 「解決できないのなら――\n当座の対処としては、どうすれば？」
1817 = "「Nếu không thể giải quyết—— \nVậy trước mắt, chúng ta phải làm gì?」"

# 【宗方】
# display as 宗方
# JP: 「継続監視と、周辺情報の収集。それしかない」
1627 = "「Tiếp tục giám sát, và thu thập thông tin\nxung quanh. Chỉ có cách đó thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「継続監視と」
2080 = "「Tiếp tục giám sát và」"

# 【ハチロク】
# display as 八六
# JP: 「情報収集」
1563 = "「Thu thập thông tin.」"

# monologue
# JP: ハチロクと顔を見合わせたなら、\nオリヴィがふふん！　と誇らしげな声を出す。
2824 = "Không cần tôi và Hachiroku nhìn nhau, \nOlivy đã hừm! một tiếng đầy tự hào."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「保線小屋たてればいーんだよ！\nそれで、できるだけ長い時間ミハリするの！！」
1630 = "「Xây chòi bảo trì đường ray là được mà! \nRồi cố gắng CANH GÁC càng lâu càng tốt!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2068 = "「Ra là vậy.」"

# monologue
# JP: ……常設の保線員を置くことは難しかろうが、\n交代制で詰めていくことなら不可能でない。
1109 = "...Việc bố trí nhân viên bảo trì đường ray\nthường trực có lẽ sẽ khó khăn,\nnhưng nếu phân công trực theo ca thì không\nphải là không thể."

# monologue
# JP: 小畑線の保線体制の再整備は、\nどのみち必要なことでもあるし――
2528 = "Việc tổ chức lại hệ thống bảo trì đường\nray cho tuyến Okoba,\nđằng nào cũng là việc cần thiết——"

# 【ポーレット】
# display as 波萊特
# JP: 「それは、なんとかできると思います」
2111 = "「Chuyện đó, cháu nghĩ có thể xoay xở\nđược.」"

# monologue
# JP: 視線で問いかけるまでもなく、\nポーレットも同意の言葉をくれる。
2898 = "Không cần tôi phải đưa mắt hỏi, \nPaulette cũng đã lên tiếng đồng tình."

# 【ハチロク】
# display as 八六
# JP: 「もう一つの、周辺情報の収集、とおっしゃいますのは」
2235 = "「Việc còn lại, thu thập thông tin xung\nquanh, ý chú là sao ạ」"

# 【宗方】
# display as 宗方
# JP: 「あのあたりは山を抜けた[ひらち,1]平地だ。\n人家も店も周辺にある」
2175 = "「Khu vực đó là \\x%l平地;#00ffc040;đồng bằng%l;#; sau khi vượt qua\nnúi.\nXung quanh có nhà dân và cửa hàng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。つまりは聞き込みを？」
1906 = "「Ra là vậy. Tức là đi hỏi thăm dò la sao?」"

# 【宗方】
# display as 宗方
# JP: 「聞き込みを行い、ビラを配布する。\n『水や地面に異変があったらこちらへご連絡を』と」
1953 = "「Đi hỏi thăm, và phát tờ rơi. \nNội dung là 'Nếu thấy có bất thường về\nnước hoặc mặt đất, xin vui lòng liên hệ'.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それなら一度ですみますね。\nなんとかできそう」
2226 = "「Nếu vậy thì chỉ cần làm một lần là xong\nnhỉ.\nChắc là làm được thôi.」"

# 【宗方】
# display as 宗方
# JP: 「いや、数週間もおけばそんな話はすっかり忘れる。\nので、できれば一～二週おきに、定期調査を」
1532 = "「Không, để vài tuần là người ta quên sạch\nngay.\nNên nếu được, hãy tiến hành khảo sát định\nkỳ, khoảng một đến hai tuần một lần.」"

# 【双鉄】
# display as 雙鐵
# JP: 「週単位で――ですか」
2255 = "「Tính theo tuần——sao ạ.」"

# 【宗方】
# display as 宗方
# JP: 「これは、初回の調査で協力的だったところだけでいい。\n話し相手がほしい老人などは、喜んで応じてくれがちだ」
1565 = "「Chỉ cần đến những nơi đã hợp tác tốt\ntrong lần khảo sát đầu tiên là được.\nNhững người già muốn có người trò chuyện\nthường sẽ rất sẵn lòng tiếp đón.」"

# monologue
# JP: 力強い指示が続く。
2723 = "Những chỉ thị mạnh mẽ liên tục được đưa\nra."

# monologue
# JP: ほぼ間違いなくそうした措置を、宗方さんは経験している。\nその感覚が、不安をいくらか和らげてくれる。
2975 = "Gần như chắc chắn \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata đã từng\ncó kinh nghiệm xử lý những biện pháp như\nvậy.\nCảm giác đó giúp tôi vơi bớt phần nào sự\nbất an."

# 【双鉄】
# display as 雙鐵
# JP: 「それであれば――継続可能かもしれません」
2106 = "「Nếu vậy thì——có lẽ chúng ta có thể duy\ntrì được.」"

# monologue
# JP: 申し訳ないが、凪や日々姫にも手伝ってもらおう。\n人当たりの良さが、ここでは大きな武器となろう。
2923 = "Thật ngại quá, nhưng chắc phải nhờ Nagi và\nHibiki giúp một tay rồi.\nSự hòa đồng, thân thiện của hai đứa sẽ là\nmột vũ khí lớn ở đây."

# 【宗方】
# display as 宗方
# JP: 「訪問は必ずふたり一組。\nトラブルがあれば、すぐに警察に通報。これも徹底」
2131 = "「Khi đến thăm, bắt buộc phải đi theo nhóm\nhai người.\nNếu có rắc rối, phải báo cảnh sát ngay lập\ntức. Phải tuân thủ triệt để điều này.」"

# 【れいな】
# display as 玲奈
# JP: 「とらぶるなんてあるんですかぁ？」
2190 = "「Có thể có rắc rối gì sao ạ?」"

# 【宗方】
# display as 宗方
# JP: 「無いとは断言できないがゆえの、対策だ。\n安全が第一の使命なことは、どの状況でも変わらん」
2021 = "「Đó là biện pháp phòng ngừa, vì không thể\nkhẳng định chắc chắn là không có.\nAn toàn là sứ mệnh hàng đầu, dù trong bất\nkỳ hoàn cảnh nào cũng không thay đổi.」"

# 【れいな】
# display as 玲奈
# JP: 「わ、そうですねぇ。ほんとですぅ」
1676 = "「Oa, đúng vậy nhỉ. Đúng là thế ạ.」"

# monologue
# JP: こくこくうなずくれいなを膝に乗せたまま、\nポーレットはメモを書きつらねていく。
2586 = "Vẫn để Reina đang gật gù trên đùi, \nPaulette liên tục ghi chép lại."

# 【ポーレット】
# display as 波萊特
# JP: 「ふたり一組……ってなると――」
1810 = "「Đi theo nhóm hai người... nếu vậy thì——」"

# monologue
# JP: ペンの動きがふと止まる。
2649 = "Động tác bút chợt dừng lại."

# 【ポーレット】
# display as 波萊特
# JP: 「調査にあたるものには、\x%l保線;#00ffc040;保線%l;#;の専門知識が必須ですか？\nそれとも、場合によってはアルバイトを雇うなどして」
2236 = "「Những người tham gia khảo sát, có bắt\nbuộc phải có kiến thức chuyên môn về \\x%l保線;#00ffc040;bảo trì đường ray%l;#;\nkhông ạ?\nHay tùy trường hợp, có thể thuê người làm\nthêm cũng được」"

# 【宗方】
# display as 宗方
# JP: 「一人は必ず、\x%l保線;#00ffc040;保線%l;#;・土木の経験者を。『水が臭う』\n『地面が凹んだ』など、わかりやすい話とは限らない」
2261 = "「Một người trong nhóm bắt buộc phải là\nngười có kinh nghiệm về \\x%l保線;#00ffc040;bảo trì đường ray%l;#;\nhoặc thổ mộc. Những lời phàn nàn\nkhông phải lúc nào cũng dễ hiểu như 'Nước\ncó mùi' hay 'Mặt đất bị lún'.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それは……もう少し具体的にお願いできますか？」
2172 = "「Chuyện đó... chú có thể giải thích cụ thể\nhơn một chút được không ạ?」"

# 【宗方】
# display as 宗方
# JP: 「わかりやすくいうと……」
2074 = "「Nói một cách dễ hiểu thì...」"

# monologue
# JP: そこで、宗方さんが悩んでしまう。\n例え話は不得意らしい。
2715 = "Tới đây, \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata lại tỏ ra bối\nrối.\nCó vẻ như chú ấy không giỏi lấy ví dụ cho\nlắm."

# monologue
# JP: 視線で問えば、すぐ頷きがかえってくる。
2846 = "Tôi đưa mắt hỏi, và lập tức nhận được cái\ngật đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「例えば『庭木が急に枯れてしまった』。その話を\n『園芸のことか』と聞き流すようでは極めて厳しい」
2029 = "「Ví dụ như 'Cây trong vườn tự nhiên chết\nkhô'. Nghe chuyện đó\nmà lại bỏ ngoài tai nghĩ rằng 'Chắc là\nchuyện làm vườn' thì cực kỳ gay go.」"

# 【れいな】
# display as 玲奈
# JP: 「それも、\x%l保線;#00ffc040;保線%l;#;に関係してくるおはなしですかぁ？」
2179 = "「Chuyện đó cũng, liên quan đến \\x%l保線;#00ffc040;bảo trì đường ray%l;#;\nsao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論。害虫やら農薬の誤散布やら、\n単なる園芸の話であろう確率の方が高かろう。が――」
2052 = "「Tất nhiên rồi. Mặc dù xác suất cao đó chỉ\nlà chuyện làm vườn bình thường,\nnhư do sâu bệnh hay phun nhầm thuốc trừ\nsâu. Nhưng——」"

# 【宗方】
# display as 宗方
# JP: 「ガスの発生や地下水の流れの変動、地中温度の変化など\nの可能性にも気づかないのでは、話にもならん」
1807 = "「Nếu không nhận ra khả năng đó có thể là\ndo rò rỉ khí gas, biến động dòng chảy\nngầm, hay thay đổi nhiệt độ lòng đất,\nthì chẳng làm ăn được gì đâu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そっか――それなら経験者必須ですね。なるほどです」
1997 = "「Ra là vậy——Nếu thế thì bắt buộc phải có\nngười có kinh nghiệm rồi. Cháu hiểu rồi\nạ.」"

# 【宗方】
# display as 宗方
# JP: 「ご納得いただけたならありがたい」
1902 = "「Cảm ơn vì đã thấu hiểu.」"

# monologue
# JP: 宗方さんはホッとした様な顔になり、\nけれどもすぐに、その表情を引き締め直す。
2730 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata mang vẻ mặt nhẹ nhõm, \nnhưng ngay lập tức, nét mặt lại trở nên\nnghiêm nghị."

# 【宗方】
# display as 宗方
# JP: 「\x%l保線;#00ffc040;保線%l;#;は、\n自然そのものを相手にした終わりなき戦いです」
1119 = "「\\x%l保線;#00ffc040;Bảo trì đường ray%l;#; là, \nmột cuộc chiến không hồi kết với chính tự\nnhiên.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1593 = "「先生所言極是」" 

# 【宗方】
# display as 宗方
# JP: 「コストと労力のバランスは常に工面が必要でしょう。\nが、最重要部には惜しみなく労力を注ぎこまねば――」
2242 = "「Việc cân đối giữa chi phí và công sức\nluôn luôn là cần thiết.\nNhưng, đối với những khu vực trọng yếu\nnhất, phải dốc toàn lực mà không được tiếc\nrẻ——」"

# monologue
# JP: 宗方さんの手が動く。
2701 = "Bàn tay \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata chuyển động."

# monologue
# JP: 顎にいくのかと思った指は、\n自らの首を掻き切るような動きをみせる。
2867 = "Tưởng chừng như sẽ đưa lên cằm, \nnhưng ngón tay lại làm động tác như cứa\nngang cổ mình."

# 【宗方】
# display as 宗方
# JP: 「これは、絶対に事故になります」
1517 = "「Nếu không, tuyệt đối sẽ xảy ra tai nạn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「お言葉、心します」
1935 = "「Cháu sẽ ghi nhớ lời chú.」"

# 【双鉄】
# display as 雙鐵
# JP: 「原因不明の隆起地点の監視・情報収集は最重要と――\n必ず、全社に徹底します」
1852 = "「Việc giám sát và thu thập thông tin tại\nkhu vực phồng rộp không rõ nguyên nhân là\nưu tiên hàng đầu——\nCháu sẽ đảm bảo toàn bộ công ty tuân thủ\ntriệt để.」"

# monologue
# JP: やはり、それほどの危機であるのだ。\n意識しなおせば、頭は目まぐるしく回転していく。
2869 = "Quả nhiên, đó là một mối nguy hiểm đến mức\nnhư vậy.\nNhận thức lại điều đó, đầu óc tôi quay\ncuồng suy nghĩ."

# monologue
# JP: ふかみの祖父たち三人と、僕、オリヴィ。\nペアの片方として計算できそうな面子は、そのくらいか。
3009 = "Ba người ông của Fukami, tôi, và Olivy. \nNhững người có thể tính vào một nửa của\ncác cặp đi khảo sát, chỉ có chừng đó thôi\nsao."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「サライネンの四月までは、\nヒトのやりくり大変そーだねー」
2124 = "「Cho đến tháng 4 năm sau nữa, \nviệc xoay xở nhân sự có vẻ vất vả lắm\nđây~」"

# monologue
# JP: 同じことを考えていたのか、\nオリヴィがためいき混じりの声を――うむ？
2624 = "Có lẽ cũng đang nghĩ giống tôi, \nOlivy cất tiếng thở dài——hửm?"

# 【双鉄】
# display as 雙鐵
# JP: 「再来年の四月まで？」
1883 = "「Đến tháng 4 năm sau nữa sao?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だって！　ムナカタ！！\nそしたらオヒトヨくるんでしょ！！」
2049 = "「Đúng rồi! Munakata!! \nLúc đó chú sẽ đến Ohitoyo mà!!」"

# 【宗方】
# display as 宗方
# JP: 「！」
1666 = "「!」"

# monologue
# JP: 虚をつかれたのか、\nムナカタさんが一瞬ギクリと止まってしまう。
2691 = "Bị đánh trúng điểm mù, \nông Munakata giật mình khựng lại trong\ngiây lát."

# monologue
# JP: 逆にポーレットは、いいタイミングとでもいいたげに、\nほっとしたような一息を吐く。
2969 = "Ngược lại, Paulette như thể chớp đúng thời\ncơ,\nthở phào nhẹ nhõm một tiếng."

# 【ポーレット】
# display as 波萊特
# JP: 「保線専門の請負会社の件は、銀行主導の話ですから、\nそちらからのご連絡をお待ちください」
2003 = "「Về công ty chuyên thầu bảo trì đường ray,\nvì đây là dự án do ngân hàng chủ đạo,\nnên xin chú hãy đợi liên lạc từ phía họ.」"

# 【宗方】
# display as 宗方
# JP: 「はい」
# 1796 = "「好」" 

# 【ポーレット】
# display as 波萊特
# JP: 「他方、指導を主体とした嘱託としての御一夜鉄道への\n勤務については、ぜひお願いできれば、と考えています」
1626 = "「Mặt khác, về việc làm nhân viên hợp đồng\ntại Đường sắt Ohito với nhiệm vụ chính là\nhướng dẫn,\nchúng cháu rất mong chú có thể nhận lời.」"

# 【宗方】
# display as 宗方
# JP: 「それだけでも食っていけるだけの仕事量と報酬は、\nいただけますか？」
2221 = "「Chỉ với công việc đó, liệu khối lượng\ncông việc và thù lao\ncó đủ để tôi trang trải cuộc sống không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「保線専門会社の計画が頓挫した場合は、御一夜鉄道嘱託\nで\x%l保線;#00ffc040;保線%l;#;も見て頂きたいので、ほぼフル勤務となりまして」
1590 = "「Trong trường hợp kế hoạch thành lập công\nty chuyên bảo trì đường ray bị đổ bể,\nchúng cháu cũng muốn nhờ chú\nquản lý cả phần \\x%l保線;#00ffc040;bảo trì đường ray%l;#; với tư\ncách là nhân viên hợp đồng của Đường sắt\nOhito, nên gần như sẽ là làm việc toàn\nthời gian ạ」"

# monologue
# JP: ポーレットが電卓を出す。\n紙を見ながらキーを叩いて、宗方さんにそっと差し出す。
2891 = "Paulette lấy máy tính ra. \nVừa nhìn vào tờ giấy vừa bấm máy, rồi nhẹ\nnhàng đẩy về phía \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata."

# monologue
# JP: 宗方さんが受け取るやいなやでオリヴィが覗きにかかるが、\n叱咤も制止も見られない。
2699 = "Ngay khi \\x%l機関士;#00ffc040;lái tàu%l;#; Munakata vừa nhận lấy,\nOlivy đã chúi mũi vào xem,\nnhưng không hề bị la mắng hay ngăn cản."

# 【宗方】
# display as 宗方
# JP: 「これでしたら。そのときから、お世話になれれば」
2113 = "「Nếu được thế này. Thì từ lúc đó, mong\nđược quý công ty chiếu cố.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ」
# 1695 = "「啊」" 

# monologue
# JP: 言葉が洩れて、\nオリヴィの口が、そのまましばし、動かなくなる。
2645 = "Lời nói buột miệng thốt ra, \nmiệng Olivy cứ thế há hốc, không cử động\ntrong chốc lát."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「――よかったぁ」
1148 = "「——Tốt quá rồi」"

# monologue
# JP: 噛みしめるような、とても静かな歓喜の声。
2941 = "Một giọng nói tràn ngập niềm vui tĩnh\nlặng, như đang tận hưởng dư vị."

# monologue
# JP: オリヴィらしからぬ表れ方は、\nそれだけにかえって、感情の強さを思わせる。
2506 = "Cách biểu hiện không giống Olivy chút nào,\nchính vì vậy, nó càng cho thấy cảm xúc đó\nmãnh liệt đến nhường nào."

# 【ハチロク】
# display as 八六
# JP: 「……再来年の春には、\n桜、少しだけ、遅れてくれると良いのですが」
1154 = "「...Vào mùa xuân năm sau nữa, \nGiá như hoa anh đào, nở muộn hơn một chút\nthì tốt biết mấy.」"

# 【宗方】
# display as 宗方
# JP: 「桜？」
2012 = "「Hoa anh đào sao?」"

# 【ハチロク】
# display as 八六
# JP: 「はい。御一夜の桜は見事なものです。\n桜吹雪の中を走るⅨ号も、きっと、ひときわ可憐かと」
2027 = "「Vâng. Hoa anh đào ở Ohimitera đẹp tuyệt\ntrần ạ.\nĐầu máy số IX chạy giữa cơn mưa hoa anh\nđào, chắc chắn, cũng sẽ vô cùng kiều\ndiễm.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Wow！！」
2280 = "「Wow!!」"

# monologue
# JP: ぴょん、とオリヴィが飛び跳ねる。
2632 = "Bật dậy, Olivy nhảy cẫng lên."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そのときはⅨ号！　カウキャッチャーもついてるし！\nだからムナカタ！　オリヴィといっしょに！！」
1604 = "「Lúc đó là đầu máy số IX! Còn được gắn cả\nCowcatcher nữa!\nVì thế nên Munakata! Nhất định phải đi\ncùng Olivy nha!!」"

# monologue
# JP: いって、けれども、言葉が止まる。\n満面の笑顔が少し歪んで、どこか悲しげなものになる。
3007 = "Nói xong, nhưng, lời nói chợt dừng lại. \nNụ cười rạng rỡ hơi méo mó, xen lẫn chút\ngì đó buồn bã."

# 【ハチロク】
# display as 八六
# JP: 「どうかしましたか！？　オリヴィちゃん」
1795 = "「Có chuyện gì vậy!? Bé Olivy」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど、うん。\nやっぱりそれ、なし！！」
1537 = "「Nhưng mà, ừm. \nQuả nhiên là, thôi bỏ đi!!」"

# 【ハチロク】
# display as 八六
# JP: 「なしって――いったい、どうしてですか？」
2051 = "「Bỏ đi là——rốt cuộc, tại sao vậy?」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、そのときまでにニイロクに全部ヒキツグ！\nでもって、乗務からインタイするよ！」
1792 = "「Cho đến lúc đó, Olivy sẽ BÀN GIAO lại\ntoàn bộ cho Niiroku!\nRồi sau đó, sẽ NGHỈ HƯU khỏi việc lái\ntàu!」"

# 【宗方】
# display as 宗方
# JP: 「お前、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が何を勝手な」
1820 = "「Nhóc, \\x%lレイルロオド;#00ffc040;Railord%l;#; mà tự tiện nói cái gì vậy」"

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、それはわたしたちからオリヴィちゃんに、\n前から話していたことなんです」
1522 = "「Không đâu, chuyện đó là do chúng cháu đã\nnói với bé Olivy\ntừ trước rồi ạ.」"

# 【宗方】
# display as 宗方
# JP: 「！？」
1556 = "「!?」"

# monologue
# JP: 驚きのあまりにだろう。
2922 = "Có lẽ là do quá ngạc nhiên."

# monologue
# JP: イスから浮きかけてしまっていた腰を、\n気まずげに、宗方さんは落ち着け直す。
2480 = "\\x%l機関士;#00ffc040;Lái tàu%l;#; Munakata bối rối ngồi phịch xuống\nghế,\nchiếc ghế mà chú ấy vừa định nhổm dậy."

# 【宗方】
# display as 宗方
# JP: 「ああ……\nそれ、っていうのは――いったい、どういう」
1662 = "「A... \nChuyện đó, nghĩa là——rốt cuộc, ý là sao」"

# 【ポーレット】
# display as 波萊特
# JP: 「乗務するのが無理そうになったら、\nいつでも引退を決めていいって」
1923 = "「Nếu cảm thấy không thể tiếp tục lái tàu\nđược nữa,\nthì em ấy có thể quyết định nghỉ hưu bất\ncứ lúc nào.」"

# 【宗方】
# display as 宗方
# JP: 「っ！！？」
# 1667 = "「呃！！？」" 

# monologue
# JP: ああ、これほどにこの人も、\n感情をあらわした顔になるのか――
2575 = "A, hóa ra người này, \ncũng có thể bộc lộ cảm xúc rõ ràng đến thế\nnày sao——"

# monologue
# JP: ひどくこわばった顔がゆるゆる、\nオリヴィの方に向き直る。
2488 = "Khuôn mặt vô cùng căng thẳng dần dần giãn\nra,\nquay sang phía Olivy."

# 【宗方】
# display as 宗方
# JP: 「お前、そこまで――」
1577 = "「Nhóc, đến mức đó——」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん。わかってたけど、いろいろ細かい検査受けたら、\nもう乗務とか、ながく続けるのはキビシイみたい」
1738 = "「Ừm. Dù đã biết trước rồi, nhưng sau khi\nkiểm tra chi tiết nhiều thứ,\ncó vẻ như việc tiếp tục lái tàu... lâu dài\nnữa là RẤT KHÓ KHĂN.」"

# 【宗方】
# display as 宗方
# JP: 「だが……お前……引退とは――\nⅨ号を下りて、それから、どうする」
1632 = "「Nhưng... nhóc... nghỉ hưu là—— \nXuống khỏi đầu máy số IX, rồi sau đó, sẽ\nlàm gì」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あのね！？　ポーレット」
2034 = "「Nghe này nhé!? Paulette」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん！　もちろん！　オリヴィちゃん！」
1725 = "「Ừm! Tất nhiên rồi! Bé Olivy!」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「！！」
1803 = "「!!」"

# monologue
# JP: パっと、オリヴィの頬が薔薇色になる。
2636 = "Bừng sáng, đôi má Olivy ửng hồng."

# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんには、後進の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の指導と、\n\x%l保線;#00ffc040;保線%l;#;のアシスタントをお願いします」
1920 = "「Bé Olivy sẽ được giao nhiệm vụ hướng dẫn\ncho các \\x%lレイルロオド;#00ffc040;Railord%l;#; thế hệ sau,\nvà làm trợ lý cho công tác \\x%l保線;#00ffc040;bảo trì đường ray%l;#;\n.」"

# 【れいな】
# display as 玲奈
# JP: 「わぁあ、それなら、引退したら、オリヴィさん、\n宗方さんと、一緒のおしごとするんですねぇ」
1678 = "「Oa, nếu vậy thì, sau khi nghỉ hưu, chị\nOlivy,\nsẽ làm việc cùng với chú Munakata đó nha~」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「はうっ！！」
1673 = "「Hau!!」"

# monologue
# JP: 薔薇色の頬が真っ赤に染まる。
2638 = "Đôi má ửng hồng đỏ bừng lên."

# monologue
# JP: オリヴィはけれどしらんふりして、\nいつもの調子で、宗方さんへと問いかける。
2498 = "Nhưng Olivy vờ như không có chuyện gì, \nvới điệu bộ thường ngày, quay sang hỏi \\x%l機関士;#00ffc040;lái tàu%l;#;\nMunakata."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ってことだけど、いいかな？　ムナカタ」
1550 = "「Chuyện là vậy đó, được không? Munakata」"

# 【宗方】
# display as 宗方
# JP: 「いいも何も、雇われる身だ。\n雇い主の人事案に、意見が出せるはずもない」
1568 = "「Được hay không cái gì, tôi là người làm\nthuê mà.\nLàm sao có thể có ý kiến với kế hoạch nhân\nsự của chủ lao động được.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよね！！！！」
1548 = "「Đúng không đúng không!!!!」"

# monologue
# JP: グっ、とガッツポーズして、\nオリヴィが小さく体を縮める。
2628 = "Nắm chặt tay tạo dáng chiến thắng, \nOlivy khẽ thu người lại."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Yeah！！！！！！！」
2281 = "「Yeah!!!!!!!」"

# monologue
# JP: そうして、弾ける！
2530 = "Và rồi, bung xõa!"

# monologue
# JP: 体いっぱい、全てをバネにし飛び上がり、\n笑顔をあたりに振りまき、咲かせる。
2558 = "Dùng toàn bộ cơ thể như một chiếc lò xo\nbật nhảy lên,\ntung rắc nụ cười nở rộ khắp không gian."

