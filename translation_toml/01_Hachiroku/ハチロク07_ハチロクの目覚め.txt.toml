[script]
# lines: 443 
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様、お気をつけて。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;作動不能区域内でのフォローは出来ませんので」
1666 = "「Ngài Soutetsu, xin hãy cẩn thận.\nTôi không thể hỗ trợ ngài trong khu vực \x%lエアクラ;#00ffc040;Aerocraft%l;#; không thể hoạt động đâu ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「線路沿いを行くのだ。迷う方が難しい。\n帰りは、逆側に出るのでよろしく頼む」
1507 = "「Tôi sẽ đi dọc theo đường ray. Muốn lạc cũng khó.\nLúc về tôi sẽ ra ở phía bên kia, nhờ cô nhé」"
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「了解いたしました」
1523 = "「Tôi đã hiểu ạ」"
# monologue
# JP: ナビと別れて、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;の作動不能区域内へと踏み込んでいく。
2305 = "Chia tay Navi,\ntôi bước vào khu vực \x%lエアクラ;#00ffc040;Aerocraft%l;#; không thể hoạt động."
# monologue
# JP: （ザクっ）
2647 = "（Lạo xạo）"
# monologue
# JP: 晴れぬ気分に合わせたように、\n空にも雲がかかりだしてる。
2614 = "Như hùa theo tâm trạng u ám của tôi,\nbầu trời cũng bắt đầu kéo mây."
# monologue
# JP: が、日差しが既にたっぷりと\x%lバラスト;#00ffc040;バラスト%l;#;の石を温めたのか、\n線路脇を歩いていると、じっとり汗がにじみ出てくる。
1954 = "Tuy nhiên, có vẻ như ánh nắng đã sưởi ấm những viên \x%lバラスト;#00ffc040;đá ba-lát%l;#; khá nhiều,\nnên khi đi dọc theo đường ray, mồ hôi tôi túa ra nhễ nhại."
# 【双鉄】
# display as 雙鐵
# JP: 「暑さには耐性が出来たと思っていたのだがな」
1513 = "「Tôi cứ tưởng mình đã chịu được cái nóng rồi chứ」"
# monologue
# JP: 実際も、まるで暑いとは感じていない。
2033 = "Thực tế thì, tôi hoàn toàn không cảm thấy nóng."
# monologue
# JP: 走行中の\x%l運転台;#00ffc040;運転台%l;#;と比べてしまえば、\n炎天下でも、屋外は、むしろ涼しく感じる。
2063 = "Nếu so sánh với \x%l運転台;#00ffc040;buồng lái%l;#; lúc tàu đang chạy,\nthì ngoài trời dù nắng gắt vẫn còn thấy mát mẻ chán."
# 【双鉄】
# display as 雙鐵
# JP: 「……いや、単純に、これは運動で出る汗か？」
1049 = "「……Không, đơn giản là mồ hôi chảy ra do vận động thôi sao?」"
# monologue
# JP: ひたすら歩く。線路沿いを。\n術仙炭鉱廃駅を越え、反対側の作動不能区域外を目指して。
2280 = "Cứ thế đi mãi. Dọc theo đường ray.\nVượt qua ga phế tích Mỏ than Jutsusen, hướng tới bên ngoài khu vực không thể hoạt động ở phía đối diện."
# monologue
# JP: それが今日、\nポーレットから僕に与えられた、ただひとつの仕事だ。
2587 = "Đó là công việc duy nhất,\nmà Paulette giao cho tôi ngày hôm nay."
# 【双鉄】
# display as 雙鐵
# JP: 「……レールショップまわりで、\n混乱が起きていなければいいが――」
1066 = "「……Xung quanh Cửa hàng Đường sắt,\nhy vọng không xảy ra hỗn loạn gì――」"
# monologue
# JP: 車輌故障に伴っての、機関車変更。\nバーベキュー\x%l列車;#00ffc040;列車%l;#;の主体はあくまで\x%l客車;#00ffc040;客車%l;#;――
2079 = "Đổi đầu máy do sự cố phương tiện.\nChủ thể của \x%l列車;#00ffc040;tàu%l;#; BBQ suy cho cùng vẫn là \x%l客車;#00ffc040;toa hành khách%l;#;――"
# monologue
# JP: ゆえ、そう大きな混乱も起きないだろうと、\nポーレットは僕の背を押した、が。
2392 = "Vì vậy, Paulette đã khích lệ tôi rằng\nchắc sẽ không xảy ra hỗn loạn gì lớn đâu, nhưng mà."
# 【双鉄】
# display as 雙鐵
# JP: 「……それでも、[ハチロク,3]8620は[きんかんばん,2]金看板だ。\n期待してくれたお客様は、当然不満を感じるだろう」
1058 = "「……Dù vậy, [8620'86] vẫn là biển vàng hút khách.\nNhững vị khách đặt kỳ vọng đương nhiên sẽ cảm thấy bất mãn rồi」"
# monologue
# JP: だから、\n\x%l機関士;#00ffc040;機関士%l;#;として直接苦情に対応したいし、お詫びしたい。
2316 = "Vì vậy,\ntôi muốn trực tiếp giải quyết khiếu nại và xin lỗi với tư cách là \x%l機関士;#00ffc040;Lái tàu%l;#;."
# monologue
# JP: そう申し出ても、\nポーレットは許可をくれなかった。
1943 = "Dù tôi đã đề nghị như vậy,\nnhưng Paulette không cho phép."
# 【双鉄】
# display as 雙鐵
# JP: 「……『巡回検査をお願いします』か」
1037 = "「……'Nhờ anh đi kiểm tra tuần tra' sao」"
# monologue
# JP: 目視によるレールの検測。\n歪みやたわみ、傷や障害の有無の確認。
2433 = "Kiểm tra đường ray bằng mắt thường.\nXác nhận xem có bị cong vênh, trầy xước hay có chướng ngại vật nào không."
# monologue
# JP: \x%l保線;#00ffc040;保線%l;#;ボランティアの堰さんたち――\n凪のお祖父様たちが、普段から行って下さっていることだ。
2588 = "Đây là công việc mà đội tình nguyện \x%l保線;#00ffc040;bảo trì đường ray%l;#; của ông Seki――\ntức là các ông của Nagi, vẫn thường xuyên làm."
# 【双鉄】
# display as 雙鐵
# JP: 「やってみると――\n予想以上に神経を使う仕事だな、これは」
1258 = "「Làm thử mới thấy――\nCông việc này đòi hỏi sự tập trung cao độ hơn mình tưởng」"
# monologue
# JP: 無論僕らも、運転しながら意識していることではあるが、\n徒歩で間近に行う方がもちろん、細かに見れる。
2608 = "Đương nhiên trong lúc lái tàu chúng tôi cũng luôn để ý,\nnhưng đi bộ đến gần quan sát thì chắc chắn sẽ nhìn thấy chi tiết hơn."
# monologue
# JP: そして細かに見れる分、\n小さな違和も、いちいち計測、記録をしていくことになる。
2367 = "Và vì có thể nhìn thấy chi tiết,\nnên dù là một sự khác thường nhỏ nhất, cũng phải đo đạc và ghi chép lại cẩn thận."
# 【双鉄】
# display as 雙鐵
# JP: 「ここは確かに、僕のような若者がやるべき場所か」
1629 = "「Nơi này đúng là, chỗ dành cho những người trẻ như mình làm」"
# monologue
# JP: 堰さんはガソリン自動車を有しているが、\nこの森深さ、近辺までしか恐らく入ってこれまいし――
2094 = "Dù ông Seki có xe ô tô chạy xăng,\nnhưng với khu rừng rậm rạp này, có lẽ cũng chỉ vào được đến khu vực lân cận――"
# monologue
# JP: ここに至るまでの移動に神経や体力を使っては、\n\x%l保線;#00ffc040;保線%l;#;作業の大変さも、いっそう増してしまうだろう。
2532 = "Nếu phải tốn công sức và thể lực để di chuyển đến tận đây,\nthì công việc \x%l保線;#00ffc040;bảo trì đường ray%l;#; sẽ càng thêm vất vả."
# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、やはり……\n頭を冷やせ、と。そういう意味でもあるのだろうな」
1604 = "「Dù vậy, quả nhiên……\nlà để mình bình tĩnh lại. Chắc cũng có ý nghĩa đó nữa」"
# monologue
# JP: 思えば途端、\n自嘲の苦笑がこみ上げてくる。
2193 = "Vừa nghĩ vậy,\nmột nụ cười gượng gạo tự trào dâng lên."
# monologue
# JP: \x%l保線;#00ffc040;保線%l;#;が如何に重要か、僕とて重々承知している。\n承知している筈であるのに――
2269 = "Tôi hoàn toàn nhận thức được tầm quan trọng của việc \x%l保線;#00ffc040;bảo trì đường ray%l;#;.\nLẽ ra tôi phải nhận thức được điều đó――"
# 【双鉄】
# display as 雙鐵
# JP: 「バカか、僕は。漫然と歩いてしまうなど。\n……戻って、きちんと見なおさねば」
1508 = "「Mình đúng là đồ ngốc. Lại đi dạo một cách vô định thế này.\n……Phải quay lại kiểm tra cho đàng hoàng mới được」"
# monologue
# JP: この有り様だ。\nお客様と対面などをもしすれば、失礼を犯しかねなかった。
2454 = "Với bộ dạng này.\nNếu đối mặt với khách hàng, có khi tôi lại phạm lỗi thất lễ mất."
# monologue
# JP: ポーレットの判断は正しかった――と、\n今更ながらに認識すれば、自然と足も止まってしまう。
1919 = "Quyết định của Paulette là đúng đắn――\nBây giờ mới nhận ra điều đó, bước chân tôi tự nhiên dừng lại."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、頭を冷やしてからだ。\n気がかりがあっては、見るべきものも見落としかねん」
1583 = "「Vậy thì, phải làm cái đầu lạnh lại đã.\nNếu cứ vướng bận trong lòng, có khi lại bỏ sót những thứ cần xem」"
# monologue
# JP: いや――僕はもう既に、見るべきものを……\n見落としてはいけない何かを、捉え損ねたのかもしれない。
1906 = "Không――tôi đã bỏ lỡ mất thứ cần phải xem……\nMột thứ gì đó tuyệt đối không được bỏ sót."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクを……混乱させてしまったな」
1510 = "「Tôi đã…… làm Hachiroku bối rối rồi」"
# monologue
# JP: 口から出してしまった言葉に、情けなくなる。\nさきほどよりも強い自嘲を感じてしまう。
2303 = "Nghe những lời mình vừa thốt ra, tôi thấy thật thảm hại.\nCảm giác tự trào phúng còn mạnh mẽ hơn lúc nãy."
# monologue
# JP: 混乱させた――どころでは無い、\n僕は、ハチロクを泣かせたのだ。
1902 = "Đâu chỉ làm em ấy bối rối――\nTôi, đã làm Hachiroku khóc."
# 【双鉄】
# display as 雙鐵
# JP: 「泣きたくて泣いたのではない……\n自分が泣いていることに、気づかぬような泣き方だった」
1439 = "「Không phải vì muốn khóc mà khóc……\nĐó là kiểu khóc mà ngay cả bản thân cũng không nhận ra mình đang khóc」"
# monologue
# JP: ……僕自身、\n事故の直後に、ああいう風に泣いてしまったことがある。
1007 = "……Bản thân tôi,\nngay sau vụ tai nạn, cũng từng khóc như vậy."
# monologue
# JP: 路子を傷つけ、\nああいう風に泣かせてしまったこともある。
2312 = "Tôi cũng từng làm tổn thương Michiko,\nvà khiến con bé khóc như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「あれは……どうしようも無くなってしまったときの、\n泣き方だ」
1597 = "「Đó là…… kiểu khóc,\nkhi người ta rơi vào đường cùng」"
# monologue
# JP: 自分の力では全く問題が解決できない。\nそれどころか、何一つできることさえ見つからない。
1933 = "Sức lực của bản thân hoàn toàn không thể giải quyết được vấn đề.\nThậm chí, còn không tìm thấy dù chỉ một việc mình có thể làm."
# monologue
# JP: そうした時に、涙は勝手にこぼれ落ちていく。\n行き場の失くなった絶望感が、形になって溢れたように。
2090 = "Những lúc như thế, nước mắt sẽ tự động tuôn rơi.\nGiống như cảm giác tuyệt vọng không lối thoát, đã thành hình và trào ra vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕は。\nハチロクを――絶望させてしまったのか」
1656 = "「Nếu vậy, tôi.\nĐã đẩy Hachiroku――vào sự tuyệt vọng sao」"
# monologue
# JP: 疑問ではなく、確信している。\nハチロクには、魂があると知っているから。
2582 = "Không phải là nghi vấn, mà tôi chắc chắn điều đó.\nVì tôi biết, Hachiroku có linh hồn."
# monologue
# JP: そして魂を有する以上、人と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の間に、\n理解し得ぬほどの感情の差が、発生するとは思えないから。
2332 = "Và một khi đã có linh hồn, tôi không nghĩ giữa con người và \x%lレイルロオド;#00ffc040;Railord%l;#;,\nlại có sự chênh lệch về cảm xúc đến mức không thể thấu hiểu được."
# 【双鉄】
# display as 雙鐵
# JP: 「だというのに――」
1284 = "「Thế mà――」"
# monologue
# JP: 何故、何に。\n僕は、絶望をさせてしまったのか。
2221 = "Tại sao, vì điều gì.\nMà tôi lại khiến em ấy tuyệt vọng như vậy."
# monologue
# JP: どうして僕はハチロクに、あんな泣き方をさせたのか……\nどれほど頭を捻ってみても、僕にはまるでわからない。
2407 = "Tại sao tôi lại khiến Hachiroku khóc như thế……\nDù có vắt óc suy nghĩ bao nhiêu, tôi cũng hoàn toàn không hiểu nổi."
# 【双鉄】
# display as 雙鐵
# JP: 「くそっ」
1387 = "「Chết tiệt」"
# monologue
# JP: 立ち止まっても解決できない。迷ったままでは進めない。\nどうしていいのか……僕もまたわからなくなっている。
2233 = "Đứng lại cũng không giải quyết được gì. Cứ lạc lối thì không thể bước tiếp.\nPhải làm sao đây…… tôi lại rơi vào trạng thái không biết phải làm gì nữa rồi."
# monologue
# JP: ハチロクに聞けば一番良さそうにも思えるが、\nそれがハチロクを、かえって傷つけてしまうかもしれない。
2609 = "Nghĩ kỹ thì hỏi Hachiroku có vẻ là cách tốt nhất,\nnhưng làm vậy có khi lại càng làm em ấy tổn thương hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「追うな、と――言われてしまったしな」
1582 = "「Em ấy cũng đã bảo――đừng đuổi theo rồi mà」"
# monologue
# JP: 熱暴走をしていると、そうハチロクは言っていた。\n数時間もあればクールダウンを出来る、とも。
2029 = "Hachiroku đã nói, em ấy đang bị quá nhiệt.\nVà chỉ cần vài giờ là có thể làm mát lại được."
# 【双鉄】
# display as 雙鐵
# JP: 「……熱、か。僕も知恵熱でも出しそうだ」
1078 = "「……Quá nhiệt sao. Mình chắc cũng sắp sốt vì suy nghĩ quá nhiều rồi đây」"
# monologue
# JP: これほどに、誰かの気持ちを追おうとするなど、\n今まで一度も無かったことだ。
2604 = "Việc cố gắng thấu hiểu cảm xúc của một ai đó đến nhường này,\nlà điều chưa từng có từ trước đến nay."
# monologue
# JP: 路子とはふたご同士であったから、\n気持ちなど、追わずとも手に取るように把握できてた。
2229 = "Vì tôi và Michiko là anh em sinh đôi,\nnên chẳng cần phải cố hiểu, tôi cũng nắm rõ cảm xúc của con bé như lòng bàn tay."
# 【双鉄】
# display as 雙鐵
# JP: 「路子がいれば相談も……いや、そもそも路子がいれば、\nハチロクと出会うことなど―――っ！」
1457 = "「Nếu có Michiko ở đây thì có thể bàn bạc…… Không, vốn dĩ nếu có Michiko,\nthì chuyện gặp gỡ Hachiroku đã――!」"
# monologue
# JP: 足が、いきなり竦んでしまう。\n強い吐き気と、ごうごうという耳鳴りと。
2467 = "Đôi chân, bỗng chốc cứng đờ.\nCảm giác buồn nôn dữ dội, cùng tiếng ù tai ầm ầm."
# monologue
# JP: 封じ込めてた恐怖がぞわりと、\n記憶の底から這い出してきて、雨の景色を思い出させる。
2044 = "Nỗi sợ hãi bị kìm nén bỗng trỗi dậy,\nbò ra từ tận đáy ký ức, gợi lại khung cảnh ngày mưa ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「――――――ぁあ」
1018 = "「――――――A」"
# monologue
# JP: 線路の、上だ。\n普通だったら入ることが無い、線路の真上。
2307 = "Trên, đường ray.\nNơi mà bình thường chẳng ai được phép bước vào, ngay trên đường ray."
# monologue
# JP: そこに、僕は横たわってた。\n路子を助け損ねた腕には、なんの力も入らなかった。
2385 = "Ở đó, tôi đang nằm sõng soài.\nĐôi tay đã vuột mất cơ hội cứu Michiko, chẳng còn chút sức lực nào."
# 【双鉄】
# display as 雙鐵
# JP: 「だが……全ては過去の話だ」
1286 = "「Nhưng…… tất cả đã là chuyện quá khứ」"
# monologue
# JP: 雨降りじゃない。激しい風も吹いてない。\n怒号にも似た声もしないし、鉄と血の臭いもしない。
2426 = "Trời không mưa. Gió dữ cũng không thổi.\nKhông có tiếng gào thét, cũng chẳng có mùi sắt và máu."
# monologue
# JP: 体が動く。首も、目線を動かすことも出来る。\n痛みも無い。声だって出る。無数のうめきも、聞こえない。
2560 = "Cơ thể cử động được. Cổ và ánh mắt cũng có thể di chuyển.\nKhông thấy đau. Giọng nói cũng phát ra được. Những tiếng rên rỉ vô tận cũng không nghe thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「……大丈夫だ。\n少なくとも今、僕は、自分の足で立っている」
1073 = "「……Không sao đâu.\nÍt nhất lúc này, mình đang đứng trên đôi chân của chính mình」"
# monologue
# JP: わざわざ言葉にしなければ、それすら怪しく感じてしまう。
2502 = "Nếu không cất lời, thì ngay cả điều đó cũng trở nên mơ hồ."
# monologue
# JP: 水底に引きずり込まれたように、\n感覚全てが茫としていて、現実感がひどく薄くて。
2259 = "Giống như bị kéo xuống đáy nước,\nmọi giác quan đều mờ mịt, cảm giác hiện thực nhạt nhòa đến đáng sợ."
# 【双鉄】
# display as 雙鐵
# JP: 「くっ……あっ――」
1396 = "「Hức…… A――」"
# monologue
# JP: 息を吸い、吐く。\nそのことをまず、意識する。
2062 = "Hít vào, thở ra.\nTrước tiên, phải ý thức được điều đó."
# monologue
# JP: 指先が、バネ仕掛けのように握りこまれてる。\nそれを、ゆっくり、ゆっくり広げる。
2291 = "Những ngón tay đang cuộn chặt lại như chiếc lò xo.\nTôi từ từ, từ từ mở chúng ra."
# 【双鉄】
# display as 雙鐵
# JP: 「――完全に、割り切ったつもりでいたのだが」
1024 = "「――Cứ ngỡ là, mình đã hoàn toàn dứt bỏ được rồi chứ」"
# monologue
# JP: ハチロクを助けると決めたとき。\n\x%l機関士;#00ffc040;機関士%l;#;になると、自らの意思で選んだ、あのとき。
2085 = "Khi quyết định cứu Hachiroku.\nKhi tự mình lựa chọn trở thành \x%l機関士;#00ffc040;Lái tàu%l;#;, vào lúc đó."
# monologue
# JP: 僕は過去から踏み出した、\nそう出来ていたつもりでいたのに――
2236 = "Tôi đã bước ra khỏi quá khứ,\ncứ ngỡ mình đã làm được điều đó, vậy mà――"
# 【双鉄】
# display as 雙鐵
# JP: 「くそっ――」
1386 = "「Chết tiệt――」"
# monologue
# JP: 喉が渇く。\n頭は熱に浮かされて、なのに体が冷えきっている。
2258 = "Khát nước quá.\nĐầu óc nóng bừng, nhưng cơ thể lại lạnh toát."
# monologue
# JP: 昔の僕が、帰ってきてる。\n生きていながら死んでた、あの頃の、小さな僕が。
2224 = "Con người cũ của tôi, đang quay trở lại.\nĐứa trẻ ngày đó, sống mà như đã chết."
# 【ハチロク】
# display as ？？？
# JP: 「大丈夫ですか！？　双鉄様」
1662 = "「Ngài Soutetsu, ngài không sao chứ ạ!?」"
# monologue
# JP: 愕然とする。\n幻聴までを聞いてしまって。
2252 = "Tôi bàng hoàng.\nĐến mức nghe thấy cả ảo thanh."
# monologue
# JP: 泣かせるほどに傷つけてしまったハチロクに、\nこんなときだけ、都合よく頼ろうとする自分の心が――
2274 = "Đã làm tổn thương Hachiroku đến mức khiến em ấy phải khóc,\nvậy mà chỉ những lúc thế này, trái tim tôi lại ích kỷ muốn dựa dẫm vào em ấy――"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！」
1664 = "「Ngài Soutetsu!」"
# monologue
# JP: （ガシっ）
2646 = "（Bám chặt）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1678 = "「!!?」"
# monologue
# JP: 熱いと感じる。
2256 = "Tôi cảm thấy hơi ấm."
# monologue
# JP: ハチロクの手から伝わる熱が――\n僕に、世界を戻してくれる。
2012 = "Hơi ấm truyền từ bàn tay Hachiroku――\nđã đưa thế giới trở lại với tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロクか」
1072 = "「……Là Hachiroku sao」"
# 【ハチロク】
# display as 八六
# JP: 「はい、わたくしです。双鉄様」
1548 = "「Vâng, là tôi đây ạ. Ngài Soutetsu」"
# monologue
# JP: まだ繋がっている手を握る。\n小さく、柔らかく、温かい。
2266 = "Nắm lấy bàn tay vẫn đang đan vào nhau.\nNhỏ bé, mềm mại và ấm áp."
# monologue
# JP: ああ、間違いの無い現実なのだ、と、\nそう思うのだが、理解が追いついて来てくれない。
2071 = "À, đây là hiện thực không thể nhầm lẫn được,\ntôi nghĩ vậy, nhưng tâm trí vẫn chưa theo kịp."
# 【双鉄】
# display as 雙鐵
# JP: 「どうして、ハチロクがここにいるのだ？」
1339 = "「Tại sao, Hachiroku lại ở đây?」"
# 【ハチロク】
# display as 八六
# JP: 「ナビに尋ねて――\nそうしたら、迎えにきて、送り届けてくれたのです」
1500 = "「Tôi đã hỏi Navi――\nrồi cô ấy đến đón và đưa tôi đến đây ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1628 = "「Ra vậy」"
# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;をつなぎ合えるせいなのか。\n\x%l共感;#00ffc040;共感%l;#;を重ねるそのことで、お互いを理解しあうのか。
2345 = "Có phải vì có thể kết nối \x%l共感;#00ffc040;cộng cảm%l;#; với nhau không.\nViệc liên tục \x%l共感;#00ffc040;cộng cảm%l;#; đã giúp họ thấu hiểu nhau sao."
# monologue
# JP: いつの間に、ハチロクはナビとも仲良くなったと――\nどこか、ぼんやりと感じてる。
2477 = "Không biết từ lúc nào, Hachiroku đã thân thiết với cả Navi――\ntôi mơ hồ cảm nhận được điều đó."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様がずいぶん先行されていると脅されていたので。\n急ぎ足で来たら、予想よりずっと早くに追いつけました」
1681 = "「Navi cứ dọa là ngài Soutetsu đã đi xa lắm rồi.\nNên tôi vội vã chạy đến, ai ngờ lại đuổi kịp sớm hơn dự đoán nhiều ạ」"
# monologue
# JP: 少しおどけてそういって、\nハチロクが不器用に笑ってくれる。
2027 = "Nói đùa một chút,\nHachiroku cười gượng gạo với tôi."
# monologue
# JP: 笑顔が嬉しい。\n体に、心に、あたたかなものが戻ったようで、ほっとする。
2116 = "Nụ cười ấy khiến tôi vui sướng.\nCảm giác như có thứ gì đó ấm áp đang dần quay lại trong cơ thể, trong tâm hồn, khiến tôi nhẹ nhõm."
# 【双鉄】
# display as 雙鐵
# JP: 「残念ながら、先行するほど進めなかった。\n戻ったり、止まったりしてしまったのでな」
1609 = "「Tiếc là, tôi chẳng đi được bao xa.\nCứ đi rồi lại quay lại, lại dừng bước mất rồi」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、そうだったのですか」
1411 = "「Ôi, vậy sao ạ」"
# monologue
# JP: 真似して少しおどけてみれば。\nハチロクはまた、笑ってくれる。
2231 = "Bắt chước em ấy đùa lại một chút.\nHachiroku lại cười với tôi."
# monologue
# JP: 一言、一言。\n交わす言葉が、体の芯に温かなものを与えてくれる。
2201 = "Từng lời, từng lời.\nNhững câu chữ trao đổi mang lại hơi ấm cho tận sâu thẳm cơ thể tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、おかげで助かった」
1260 = "「Nhưng mà, nhờ có em tôi mới được cứu」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
1403 = "「A――」"
# monologue
# JP: ごく何気なく出てきた一言。
2275 = "Một câu nói thốt ra thật vô tình."
# monologue
# JP: 考えもなく零してしまった一言に、\nけれど、ハチロクがぎくりと固まる。
1947 = "Dù chỉ là lỡ lời buông ra không suy nghĩ,\nnhưng Hachiroku lại giật mình cứng đờ."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ハチロク」
1489 = "「Sao vậy? Hachiroku」"
# 【ハチロク】
# display as 八六
# JP: 「いえ――わたくし。\n……恐らくは、“そのこと”で、ここに来たのです」
1393 = "「Dạ không――tôi.\n……Có lẽ, tôi đến đây là vì 'chuyện đó' ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1676 = "「!」"
# 【ハチロク】
# display as 八六
# JP: 「お伺いして、大丈夫でしょうか？\nさきほどは……その……ひどい、ご様子に見えましたが」
1382 = "「Tôi hỏi chuyện này, có được không ạ?\nLúc nãy…… ừm…… trông ngài có vẻ rất tồi tệ」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1020 = "「――À」"
# monologue
# JP: 不安気な声、気遣う表情。
2114 = "Giọng nói bất an, vẻ mặt đầy lo lắng."
# monologue
# JP: ならば、僕の様子は本当にひどく。\nハチロクの言う“そのこと”は、正鵠を射ることだろう。
2456 = "Nếu vậy, bộ dạng của tôi lúc nãy chắc tệ lắm.\n'Chuyện đó' mà Hachiroku nói, hẳn là đánh trúng tim đen rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕ならば、大丈夫だ。どころか、むしろ――\n話してしまったほうが、スッキリできるかもしれん」
1504 = "「Tôi thì, không sao đâu. Ngược lại――\ncó khi nói ra lại thấy nhẹ nhõm hơn cũng nên」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら……」
1525 = "「Nếu vậy……」"
# monologue
# JP: ハチロクの目が僕を見る。\nまっすぐ、強く――僕を見る。
2025 = "Ánh mắt Hachiroku nhìn tôi.\nThẳng thắn, mạnh mẽ――nhìn tôi."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様に、お伺いさせていただきます。\n何故、双鉄様が――」
1640 = "「Xin phép cho tôi được hỏi ngài Soutetsu.\nTại sao, ngài Soutetsu lại――」"
# monologue
# JP: 瞳が、一瞬ゆらいでしまう。
2109 = "Đôi mắt em ấy, thoáng chút dao động."
# monologue
# JP: 喉に声が、べたりと張り付きでもしたかのように、\n整った顔が、わずかに歪む。
2117 = "Giọng nói như dính chặt vào cổ họng,\ngương mặt thanh tú khẽ nhăn lại."
# 【ハチロク】
# display as 八六
# JP: 「何故、双鉄様が――\n『鉄道事故を恐れている』かを」
1571 = "「Tại sao, ngài Soutetsu lại――\n'Sợ hãi tai nạn đường sắt' ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1421 = "「À」"
# monologue
# JP: 頷く。\nそれだけで、言葉が勝手に喉を出て行く。
2313 = "Gật đầu.\nChỉ vậy thôi, những lời nói tự nhiên tuôn ra khỏi miệng."
# 【双鉄】
# display as 雙鐵
# JP: 「理由は、極めて単純だ。\n僕も――鉄道事故の被害者なのだ」
1578 = "「Lý do, cực kỳ đơn giản.\nTôi cũng――là nạn nhân của tai nạn đường sắt」"
# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 1676 = "「！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「十年以上も昔のことだ。両親と、僕と、ふたごの妹と。\n鉄道旅行を、家族で楽しむ計画だった」
1649 = "「Chuyện từ hơn mười năm trước rồi. Bố mẹ, tôi, và đứa em gái sinh đôi.\nCả gia đình đã lên kế hoạch đi du lịch bằng tàu hỏa」"
# monologue
# JP: どこへ行こうとしていたのかも、思い出せない。
2237 = "Định đi đâu, tôi cũng chẳng nhớ nữa."
# monologue
# JP: そんな細かなことまでは、\n最初から聞かなかったのかもしれない。
1916 = "Những chi tiết nhỏ nhặt như vậy,\ncó lẽ ngay từ đầu tôi đã không thèm hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「ＳＬに乗れるということが、僕らには楽しみで楽しみで。\n楽しみ過ぎて眠れなくなって、当日、そろって寝坊した」
1652 = "「Việc được đi tàu SL, với chúng tôi là niềm háo hức tột độ.\nHáo hức đến mất ngủ, để rồi hôm đó, cả đám cùng ngủ quên」"
# monologue
# JP: ああ、そうだ。あの日は、僕も寝坊をしていたんだ。
2070 = "À, đúng rồi. Ngày hôm đó, tôi cũng ngủ quên."
# monologue
# JP: でも、路子よりほんの数分早く起きて――\nだから寝坊の責任を、路子ひとりに押し付けた。
1912 = "Nhưng, tôi dậy sớm hơn Michiko vài phút――\nNên đã đổ hết lỗi ngủ quên lên đầu Michiko."
# 【双鉄】
# display as 雙鐵
# JP: 「おかげで、楽しみにしていた機関車を見ることもなく、\n大慌てで乗り込んで――それでも、旅行は楽しかった」
1427 = "「Nhờ vậy mà, chẳng kịp ngắm nghía chiếc đầu máy hằng mong đợi,\ncứ thế cuống cuồng leo lên tàu――Dù vậy, chuyến đi vẫn rất vui」"
# monologue
# JP: 父さんがたくさん、話してくれた。\n母さんはにこにこ笑ってた。
2420 = "Bố đã kể rất nhiều chuyện.\nMẹ thì luôn mỉm cười."
# monologue
# JP: 路子はもちろん、となりに座って――\n旅をしていて、いつもどおりで……幸せだった。
2547 = "Michiko tất nhiên, ngồi ngay cạnh tôi――\nCùng nhau đi du lịch, như mọi khi…… thật hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「やがて、父が教えてくれた。もうすぐ冨士が見えると。\n鉄橋の上から、綺麗な冨士を眺められると」
1564 = "「Rồi, bố bảo. Sắp nhìn thấy núi Phú Sĩ rồi.\nTừ trên cầu sắt, có thể ngắm nhìn ngọn Phú Sĩ tuyệt đẹp」"
# 【ハチロク】
# display as 八六
# JP: 「っ！？」
1679 = "「!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、\x%l列車;#00ffc040;列車%l;#;は、台風の中に突っ込んでしまった。\nひどく揺れ、乗客は騒ぎ、路子は――僕も、怯えた」
1293 = "「Nhưng, \x%l列車;#00ffc040;đoàn tàu%l;#; lại đâm sầm vào tâm bão.\nRung lắc dữ dội, hành khách hoảng loạn, Michiko――và cả tôi, đều khiếp sợ」"
# monologue
# JP: ああ、そうだ。\n路子ひとりが怯えるなどは、ありえなかった。
2342 = "À, đúng rồi.\nLàm gì có chuyện chỉ mình Michiko sợ chứ."
# monologue
# JP: 僕も怯えた。ふたごの路子と等しく怯えた。\nだからそれを、少しでも和らげたくて、動いてしまった。
2599 = "Tôi cũng sợ. Sợ chẳng kém gì cô em sinh đôi Michiko.\nNên để vơi đi phần nào nỗi sợ ấy, tôi đã nhúc nhích."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は――怖くて。とても、じっとしていられなかった。\nそれで……両親の制止も聞かず――先頭車輌に」
1515 = "「Tôi――rất sợ. Chẳng thể nào ngồi yên được.\nThế là…… bỏ ngoài tai lời can ngăn của bố mẹ――tôi chạy lên toa dẫn đầu」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様を被害者にしたその事故は――\n[ふじがわきょうりょう,4]冨士川橋梁の手前で、発生したものですか？」
1663 = "「Vụ tai nạn khiến ngài Soutetsu trở thành nạn nhân đó――\ncó phải xảy ra ngay trước cầu sắt sông Fujikawa không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1421 = "「嗯」" 
# monologue
# JP: 探偵めいた言葉に一瞬驚かされてしまうが、\nすぐ、「当然か」と思い直す。
2202 = "Lời nói như thám tử ấy khiến tôi thoáng giật mình,\nnhưng rồi nhanh chóng nghĩ lại, 'Cũng phải thôi'."
# monologue
# JP: \x%l帝鉄;#00ffc040;帝鉄%l;#;末期に鉄道事故がどれほど多発したといえ、\nあれはきっと……相当のレアケースに違いないから。
2156 = "Dù cho cuối thời \x%l帝鉄;#00ffc040;Đường sắt Hoàng gia (Teitetsu)%l;#; tai nạn đường sắt có xảy ra nhiều đến đâu,\nthì vụ đó chắc chắn…… cũng là một trường hợp cực kỳ hiếm gặp."
# 【双鉄】
# display as 雙鐵
# JP: 「脱線・転覆にも関わらず、被害者は、とても少なかった。\n大人二名、子供一名……死者は、わずかに、三名だった」
1326 = "「Mặc dù bị trật bánh lật tàu, nhưng số nạn nhân lại rất ít.\nHai người lớn, một trẻ em…… số người chết, vỏn vẹn chỉ có ba người」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！？」
# 1678 = "「！！？」" 
# monologue
# JP: なのに、ハチロクは硬直する。\nいや、その全身は、さっきからずっと強ばっていた。
2058 = "Vậy mà, Hachiroku lại cứng đờ người.\nKhông, toàn thân em ấy, từ nãy đến giờ vẫn luôn căng cứng."
# monologue
# JP: ただ――顔から表情の全てが消えるまで、\n僕にはそうと、まるきり気づけてなかっただけだ。
2052 = "Chỉ là――cho đến khi mọi biểu cảm trên khuôn mặt em ấy biến mất hoàn toàn,\ntôi mới hoàn toàn không nhận ra điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「僕が移動を――先頭車輌に向かわなければ……\n死者数は、ゼロで済んでいたのかもしれん」
1448 = "「Nếu tôi không di chuyển――không đi lên toa dẫn đầu……\nthì có lẽ số người chết đã là con số không」"
# monologue
# JP: 内心深くで思っていても――\n口には、出せずに、いた言葉。
2583 = "Dù nghĩ tận sâu trong đáy lòng――\nnhưng tôi chưa từng, thốt ra thành lời."
# monologue
# JP: それを素直に、口にしている。\nそうしなければいけないと強く感じている。
2425 = "Giờ đây tôi đang thành thật, nói ra điều đó.\nTôi cảm nhận mãnh liệt rằng mình phải làm vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「あれは――本当に事故だったのだ」
1638 = "「Đó――thực sự là một tai nạn」"
# monologue
# JP: 理屈としてはわかってたこと。\n幼い頃に出会った少女が、教え諭してくれたこと。
2084 = "Về lý thuyết thì tôi đã hiểu.\nĐó là điều mà cô bé tôi gặp thuở nhỏ, đã dạy cho tôi."
# monologue
# JP: それを今、心の底から本当だったと痛感している。\n事故などは――そうだ、事故などは。
2128 = "Giờ đây, tôi thấm thía từ tận đáy lòng rằng điều đó là sự thật.\nTai nạn――đúng vậy, tai nạn."
# 【双鉄】
# display as 雙鐵
# JP: 「事故など、誰が。\n起こしたくて、起こすものか」
1270 = "「Tai nạn, thì có ai.\nMuốn xảy ra, là xảy ra được đâu chứ」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ――双鉄様――いいえ」
1250 = "「Không đâu――ngài Soutetsu――không đâu ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1679 = "「！？」" 
# monologue
# JP: ハチロクが、じりじりと後ずさっている。\nいけない、今ここで離れては。
1995 = "Hachiroku đang từ từ lùi lại.\nKhông được, không thể rời đi ngay lúc này."
# monologue
# JP: 思うのに、僕の両足は釘付けられてる。\n全身が、わなないてしまって動けないでいる。
1991 = "Nghĩ vậy, nhưng hai chân tôi như bị đóng đinh.\nToàn thân run rẩy không thể nhúc nhích."
# 【ハチロク】
# display as 八六
# JP: 「あの事故は――\n冨士川橋梁崩落に伴う、[ハチロクニイマル,3]8620脱線・転覆事故、のみは」
1375 = "「Vụ tai nạn đó――\nchỉ riêng vụ trật bánh lật tàu của dòng [8620'86] kéo theo sự sụp đổ của cầu sắt sông Fujikawa」"
# monologue
# JP: 他人ごとのように聞いている。\nああ、あの事故には、そんな名前がつけられたのか、と。
2242 = "Tôi nghe như chuyện của người khác.\nÀ, ra vụ tai nạn đó, được đặt tên như vậy sao."
# monologue
# JP: 事実を、認識できている。疑いの余地も感じていない。\nなのに、感覚と現実が、うまく、つながり合ってくれない。
2295 = "Tôi nhận thức được sự thật. Không cảm thấy có chỗ nào đáng ngờ.\nVậy mà, cảm giác và hiện thực, lại không thể kết nối với nhau."
# 【ハチロク】
# display as 八六
# JP: 「あれは――わたくしの起こしてしまった事故なのです。\n崩落をした鉄橋に、突っ込むよりもましと考え――」
1542 = "「Đó là――vụ tai nạn do chính tôi gây ra ạ.\nVì nghĩ rằng thà làm vậy còn hơn lao vào cây cầu sắt đang sập――」"
# monologue
# JP: そうだったのかと、聞いている。\n当事者の声を、思いがけずに、聞けている。
2205 = "Tôi nghe, và nghĩ ra là vậy sao.\nKhông ngờ lại được nghe, chính tiếng nói của người trong cuộc."
# 【ハチロク】
# display as 八六
# JP: 「わたくしは――意図的な\x%l脱線転覆;#00ffc040;脱線転覆%l;#;を進言し。\n結果……結果――双鉄様の、ご家族を――」
1543 = "「Tôi đã――kiến nghị chủ động \x%l脱線転覆;#00ffc040;trật bánh lật tàu%l;#;.\nKết quả…… kết quả là――đã khiến gia đình của, ngài Soutetsu――」"
# monologue
# JP: ハチロクの唇が結ばれる。
2008 = "Đôi môi Hachiroku mím chặt."
# monologue
# JP: ゆるゆる、力なくほどけ――\nそして言葉が、苦しく、吐かれる。
2412 = "Từ từ, buông lỏng trong vô lực――\nRồi những lời nói, đầy đau khổ, được thốt ra."
# 【ハチロク】
# display as 八六
# JP: 「わたくし、が――死な、せ、て――」
1540 = "「Là tôi, đã――làm, họ, chết――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクっ！！！」
1337 = "「Hachiroku!!!」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
1677 = "「!!!」"
# monologue
# JP: 駆け出す。ハチロクが脱兎のごとく。\n追わないでくれと――それすら言わずに。
2014 = "Em ấy bỏ chạy. Nhanh như thỏ. \nThậm chí còn chẳng kịp nói――đừng đuổi theo."
# monologue
# JP: 小黒い森に飲み込まれていく後ろ姿を、\nけれども僕は――追えないでいる。
2292 = "Bóng lưng nhỏ bé ấy dần bị khu rừng tăm tối nuốt chửng,\nnhưng tôi――vẫn không thể đuổi theo."
# 【双鉄】
# display as 雙鐵
# JP: 「あ……あっ――くそっ」
1406 = "「A…… a――chết tiệt」"
# monologue
# JP: 自問している。そんな場合じゃないと、知りつつ。\n思考がぐるぐる渦巻いて、ただ一点から抜けだせずにいる。
2610 = "Tôi đang tự hỏi bản thân. Dù biết bây giờ không phải lúc.\nSuy nghĩ cứ xoay mòng mòng, chỉ mãi quẩn quanh ở một điểm không thể thoát ra."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;が事故車輌と知って、\nハチロクが、鉄道事故を起こした\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だと知って。
2464 = "Biết được \x%l8620;#00ffc040;8620%l;#; là phương tiện gây tai nạn,\nbiết được Hachiroku là \x%lレイルロオド;#00ffc040;Railord%l;#; đã gây ra tai nạn đường sắt."
# monologue
# JP: （どうして、僕は……“どんな事故か”を\nただの一度も、気にしようとさえ、しなかったのか）
2648 = "（Tại sao, tôi lại…… chưa một lần,\nthậm chí là mảy may quan tâm xem đó là 'tai nạn như thế nào' chứ）"
# monologue
# JP: 思考の渦は、ただ一点に収束していく。\nその他には、可能性さえも思いつけない。
2284 = "Vòng xoáy suy nghĩ, chỉ hội tụ lại ở một điểm duy nhất.\nNgoài ra, tôi không thể nghĩ ra bất kỳ khả năng nào khác."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……くそ。\nそう、だったのか」
1410 = "「A…… chết tiệt.\nRa là, vậy sao」"
# monologue
# JP: 偶然ではなく、必然だった。\nこの状況も、僕の逃避も。
1910 = "Không phải ngẫu nhiên, mà là tất yếu.\nCả tình huống này, và cả sự trốn tránh của tôi."
# monologue
# JP: それをようやく理解して。その現実と向き合って。\nだから、僕は――
2297 = "Cuối cùng cũng hiểu ra điều đó. Đối mặt với hiện thực đó.\nVì vậy, tôi――"
# 【双鉄】
# display as 雙鐵
# JP: 「……追い、かけるんだ――進むんだ」
1068 = "「……Phải đuổi, theo thôi――phải bước tiếp」"
# monologue
# JP: わかっている。\nわかっているのに、動けない。
1990 = "Tôi biết.\nBiết là vậy, nhưng không thể nhúc nhích."
# monologue
# JP: 体が、わななき続けている。\n立っているだけで精一杯で――
2561 = "Cơ thể, vẫn không ngừng run rẩy.\nChỉ đứng thôi cũng đã cạn kiệt sức lực――"
# monologue
# JP: （ぽっ――ぽっ）
2639 = "（Lộp bộp――lộp bộp）"
# monologue
# JP: 頬に冷たい何かが当たり、\n見る見る、それは雨になる。
2357 = "Thứ gì đó lạnh lẽo chạm vào má,\nchớp mắt, nó đã hóa thành cơn mưa."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1407 = "「A」"
# monologue
# JP: 冷える。強張りがわずかに緩む。\n少し、動く。動く――動けるようになる。
2218 = "Lạnh buốt. Sự căng cứng khẽ dịu đi.\nCử động một chút. Cử động――đã có thể cử động rồi."
# monologue
# JP: 僕を戒めていた雨を、\n御一夜の雨が、洗い流してくれたかのように。
2584 = "Cơn mưa từng răn đe tôi,\nnhư thể đã được cơn mưa của Ohigawa gột rửa sạch sẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――」
1327 = "「Hachiroku――」"
# monologue
# JP: ならば、歩こう。\n一歩ずつでも、前へと、進もう。
2337 = "Nếu vậy, hãy bước đi thôi.\nDù chỉ từng bước một, cũng hãy tiến về phía trước."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1331 = "「Hachiroku」"
# 【ハチロク】
# display as 八六
# JP: 「……双鉄様」
1079 = "「……Ngài Soutetsu」"
# monologue
# JP: 探すほどもなく、再び出会う。\n雨のそぼふる、森浅く。
2384 = "Chẳng cần tìm kiếm lâu, lại gặp nhau.\nDưới cơn mưa lất phất, nơi bìa rừng."
# 【双鉄】
# display as 雙鐵
# JP: 「よかった――戻ってきてくれたのだな」
1436 = "「Tốt quá rồi――em đã quay lại」"
# 【ハチロク】
# display as 八六
# JP: 「逃げ出したところで――\nわたくしは、どこにも行けませんので」
1476 = "「Dù có chạy trốn――\ntôi cũng chẳng có nơi nào để đi cả」"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1038 = "「…………」"
# monologue
# JP: どこにでも行ける。お前が本当に望むのならば。\n――そう思う。
2250 = "Em có thể đi bất cứ đâu. Nếu em thực sự muốn.\n――Tôi nghĩ vậy."
# monologue
# JP: 思うが言えば、ハチロクを失ってしまう気がして、\nうまい言い方を思いつけない。
1941 = "Nghĩ là vậy nhưng nếu nói ra, tôi có cảm giác sẽ mất đi Hachiroku,\nnên chẳng thể nghĩ ra cách nói nào cho khéo."
# 【ハチロク】
# display as 八六
# JP: 「わたくしは――」
1490 = "「Tôi――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。お前は――誰も死なせてなどいない」
1329 = "「Hachiroku. Em――chẳng làm ai chết cả」"
# 【ハチロク】
# display as 八六
# JP: 「いいえっ！？」
1261 = "「Không đúng!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「聞いてくれ、ハチロク」
1333 = "「Nghe anh nói này, Hachiroku」"
# monologue
# JP: いや――僕にとっての“うまい言い方”を見つけたとても、\nどう伝わるかわからない。
1899 = "Không――cho dù có tìm ra 'cách nói khéo' đối với tôi đi chăng nữa,\ncũng chẳng biết sẽ truyền đạt thế nào."
# monologue
# JP: それが怖い。\n言葉も、怖い――産まれて初めて、痛感している。
2080 = "Điều đó thật đáng sợ.\nLời nói, cũng đáng sợ――lần đầu tiên trong đời, tôi thấm thía điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……僕は、ずっと疑問に思っていたんだ」
1070 = "「……Anh, vẫn luôn thắc mắc」"
# monologue
# JP: しかし竦めば、ハチロクは自らを責め続ける。\nだからただ、思いつくままを口にしていく。
1938 = "Nhưng nếu chùn bước, Hachiroku sẽ tiếp tục tự trách mình.\nNên tôi cứ thế nói ra những gì nghĩ được trong đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道史を知れば知るほど、不思議に思った。\nなぜ、[たいと,1]汰斗さんが[ハチロクニイマル,3]8620とお前とを引き取ったのか」
1469 = "「Càng tìm hiểu về lịch sử đường sắt, anh càng thấy kỳ lạ.\nTại sao, ông Taito lại nhận nuôi [8620'86] và em」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1038 = "「…………」" 
# monologue
# JP: ハチロクは何も言わない。\n反論しない。
1999 = "Hachiroku không nói gì.\nKhông phản bác."
# monologue
# JP: 当然、理解しているだろうし――\nあるいは自身も、疑問視していたのかもしれない。
2119 = "Đương nhiên, chắc em ấy cũng hiểu――\nHoặc có lẽ bản thân em ấy, cũng từng đặt câu hỏi về điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「大廃線の末期には、ほとんどの車輌が[いき,1]遺棄された。\n希少なトップナンバー機さえ、その例外とならなかった」
1429 = "「Vào cuối thời kỳ Đại bãi bỏ, hầu hết các phương tiện đều bị vứt bỏ.\nNgay cả những chiếc mang số hiệu đầu tiên hiếm hoi cũng không ngoại lệ」"
# monologue
# JP: 例えば、ハチロクが言及していた、\x%l6200;#00ffc040;6200%l;#;。
2368 = "Ví dụ như chiếc \x%l6200;#00ffc040;[6200'62]%l;#; mà Hachiroku từng nhắc đến."
# monologue
# JP: レアリティと観光価値とで考えるなら、\n\x%l6200;#00ffc040;6200%l;#;と\x%l8620;#00ffc040;8620%l;#;は、ほぼ同等なのではなかろうか？
2362 = "Nếu xét về độ hiếm và giá trị du lịch,\nthì \x%l6200;#00ffc040;[6200'62]%l;#; và \x%l8620;#00ffc040;8620%l;#; gần như tương đương nhau đúng không?"
# 【双鉄】
# display as 雙鐵
# JP: 「選ぼうと思えば、どんな車輌も選べた筈だ。\nなのに何故、汰斗さんは――事故車輌の[ハチロクニイマル,3]8620を選んだか」
1451 = "「Nếu muốn chọn, lẽ ra ông ấy có thể chọn bất cứ phương tiện nào.\nVậy tại sao, ông Taito lại――chọn [8620'86], một phương tiện gây tai nạn」"
# monologue
# JP: その上、塩漬けにしてしまった。
1913 = "Hơn nữa, còn đem cất xó nó."
# monologue
# JP: 改修資金がどの程度必要であったかなど、\n\x%l帝鉄;#00ffc040;帝鉄%l;#;勤務をしていた汰斗さんには、見通せていたろうに。
2350 = "Ông Taito từng làm việc cho \x%l帝鉄;#00ffc040;Đường sắt Hoàng gia (Teitetsu)%l;#;,\nhẳn phải lường trước được cần bao nhiêu vốn liếng để cải tạo chứ."
# 【ハチロク】
# display as 八六
# JP: 「それ、は」
1651 = "「Chuyện, đó」"
# monologue
# JP: 苦しげに出るハチロクの言葉には、\nしかし、いくらかの温度が戻っている。
2022 = "Trong những lời nói đầy đau khổ của Hachiroku,\ntuy nhiên, đã có chút hơi ấm quay trở lại."
# monologue
# JP: 現実的なこと、今のこと、\nそれを考えている間は、過去から意識を外しておける。
2087 = "Những chuyện thực tế, những chuyện của hiện tại,\ntrong lúc suy nghĩ về chúng, có thể tạm gác lại ý thức về quá khứ."
# 【ハチロク】
# display as 八六
# JP: 「……事故車輌なら、ただ同然に――\n――ああ……いえ」
1052 = "「……Nếu là phương tiện gây tai nạn, thì gần như cho không――\n――A…… không phải」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。ならば、九洲や四國から引き取ればいいんだ。\nわざわざ帝都からの移送コストをかけることはない」
1420 = "「Ừ. Nếu vậy, nhận từ Kyushu hay Shikoku là được mà.\nĐâu cần cất công tốn phí vận chuyển từ Đế đô về làm gì」"
# monologue
# JP: 御一夜を、どころか、隈元、九洲を代表する酒、\nクマ焼酎。
2607 = "Rượu Kuma Shochu,\nkhông chỉ đại diện cho Ohigawa, mà còn là Kumamoto, là Kyushu."
# monologue
# JP: その古くからの蔵元を、右田の家を、\n傾けてしまうほどの、大きな散財。
2483 = "Một khoản tiêu pha khổng lồ,\nđến mức làm chao đảo cả xưởng rượu lâu đời ấy, cả nhà Migita."
# 【双鉄】
# display as 雙鐵
# JP: 「コスト面を、汰斗さんはあえて度外視した。\n借金をしてまで御一夜に、お前と、\x%l8620;#00ffc040;8620%l;#;と――」
1562 = "「Về mặt chi phí, ông Taito đã cố tình phớt lờ.\nThậm chí phải vay nợ để đưa em, và \x%l8620;#00ffc040;8620%l;#; về Ohigawa――」"
# monologue
# JP: 言って、気づく。
2522 = "Nói rồi, tôi nhận ra."
# monologue
# JP: そうなのだ。\nその意味では――僕らは全て、同じなのだと。
2043 = "Đúng vậy.\nTheo nghĩa đó――tất cả chúng tôi, đều giống nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「そして、僕とを引き取った。\nあの事故の……いうなれば、被害者たちを」
1524 = "「Và, nhận nuôi cả anh nữa.\nNói cách khác là…… những nạn nhân của vụ tai nạn đó」"
# 【ハチロク】
# display as 八六
# JP: 「被害、者……」
1373 = "「Nạn, nhân……」"
# monologue
# JP: 僕の言葉を繰り返し、\nハチロクは、ゆるゆると力なく首を振る。
2124 = "Lặp lại lời tôi,\nHachiroku từ từ lắc đầu yếu ớt."
# 【ハチロク】
# display as 八六
# JP: 「いいえ……いいえ。双鉄様は――\nあるいは[ハチロクニイマル,3]8620も、確かに被害者でございましょうが――」
1252 = "「Không đâu…… không đâu. Ngài Soutetsu――\nhoặc [8620'86] cũng vậy, chắc chắn là nạn nhân rồi, nhưng mà――」"
# 【双鉄】
# display as 雙鐵
# JP: 「違うぞ、ハチロク」
1302 = "「Sai rồi, Hachiroku」"
# monologue
# JP: ただひとりの加害者ならば――むしろ、僕。\n言いたい気持ちをグっと抑える。
2139 = "Nếu chỉ có một người là kẻ gây ra――thì đúng hơn, đó là tôi.\nTôi kìm nén cảm giác muốn nói ra điều đó."
# monologue
# JP: ハチロクをもう、泣かせたくない。\nまず僕が前を向き示さねば、ハチロクの顔もあがらない。
2234 = "Không muốn làm Hachiroku khóc thêm nữa.\nTrước tiên tôi phải hướng về phía trước, nếu không Hachiroku cũng chẳng thể ngẩng mặt lên được."
# 【双鉄】
# display as 雙鐵
# JP: 「お前の下した判断は――\n最悪の被害を、未然に食い止めたのだ」
1426 = "「Quyết định mà em đưa ra――\nđã ngăn chặn thiệt hại tồi tệ nhất từ trong trứng nước」"
# monologue
# JP: 冨士川橋梁が崩落し、\x%l8620;#00ffc040;8620%l;#;は走っていた。\nそのままだったら、崩落した鉄橋に突っ込んでいた。
2600 = "Cầu sắt sông Fujikawa bị sập, và \x%l8620;#00ffc040;8620%l;#; vẫn đang chạy.\nNếu cứ để nguyên, nó đã đâm sầm vào cây cầu sắt sập đó rồi."
# monologue
# JP: 台風で荒れ狂う川に落ちれば――\n乗員も、乗客も、全員が死亡していただろう。
2514 = "Nếu rơi xuống dòng sông đang cuồn cuộn vì bão――\nPhi hành đoàn, hành khách, tất cả đều sẽ bỏ mạng."
# 【双鉄】
# display as 雙鐵
# JP: 「被害を最小に食い止めたのは、\nお前の判断だったのだ」
1431 = "「Chính quyết định của em,\nđã giảm thiểu thiệt hại xuống mức thấp nhất」"
# monologue
# JP: 被害はあるいは、ゼロであったのかもしれない。\n僕が、動いたりしなければ――
2135 = "Thiệt hại có khi, đã là con số không.\nNếu tôi, không di chuyển――"
# monologue
# JP: 状況を理解できた今、後悔は鋭さを増し心を刻む。\nけれども痛みを、前を向くことで無視し続ける。
2191 = "Bây giờ khi đã hiểu rõ tình hình, sự hối hận càng thêm sắc bén cứa vào tim.\nNhưng tôi tiếp tục phớt lờ nỗi đau bằng cách hướng về phía trước."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。僕が認めよう」
1340 = "「Hachiroku. Anh sẽ công nhận điều đó」"
# monologue
# JP: 手を、伸ばす。\n震わせないよう、普段どおりにと全神経を集中させて。
2225 = "Đưa tay, ra.\nTập trung toàn bộ tâm trí để không bị run, cứ như bình thường."
# monologue
# JP: ハチロクは、まったく動かない。\n僕の手を、今度は避けようとはしない。
2004 = "Hachiroku, hoàn toàn không nhúc nhích.\nLần này, em ấy không định né tránh tay tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「お前は、間違ったことをしていない。\nお前の下した判断は、正解だった」
1300 = "「Em, không làm gì sai cả.\nQuyết định mà em đưa ra, là chính xác」"
# 【ハチロク】
# display as 八六
# JP: 「お言葉は……とても、ありがたく存じます。\nけれど――」
1673 = "「Những lời đó…… tôi thực sự, rất biết ơn.\nNhưng mà――」"
# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんも――恐らく、同じように考えたのだろう。\n『自分が、ただ一人の加害者なのだ』と」
1561 = "「Ông Taito――có lẽ, cũng nghĩ như vậy.\nRằng 'Mình, là kẻ gây ra tai nạn duy nhất'」"
# 【ハチロク】
# display as 八六
# JP: 「っ！？」
# 1679 = "「！？」" 
# monologue
# JP: ハチロクが、ハっと息を呑む。\n僕の話を聞いてくれる――思えば、言葉にも力がこもる。
2016 = "Hachiroku, nín thở cái thóp.\nEm ấy chịu lắng nghe tôi nói――nghĩ vậy, lời nói cũng thêm phần mạnh mẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「だが。そうではない。\n汰斗さんも、また、加害者ではない」
1290 = "「Nhưng. Không phải vậy.\nÔng Taito, cũng không phải là kẻ gây ra tai nạn」"
# monologue
# JP: 今を逃せば、またドアが閉まる――\n直感するから、必死になって考える。
2206 = "Nếu bỏ lỡ lúc này, cánh cửa sẽ lại đóng sập――\nTrực giác mách bảo thế, nên tôi tuyệt vọng suy nghĩ."
# monologue
# JP: ハチロクの、感情的な反発・否定を引き起こさずに、\n最後まできちんと聞いてもらえる、伝え方を。
2248 = "Cách truyền đạt sao cho,\nkhông gây ra sự phản kháng hay phủ định mang tính cảm xúc từ Hachiroku, để em ấy nghe đến cùng."
# 【双鉄】
# display as 雙鐵
# JP: 「電気が――[ひのもと,2]日ノ本に急速に普及していった。\nその時期の、石油ランプの業者が例えば、あるとする」
1281 = "「Điện――đã phổ biến nhanh chóng ở Hinomoto.\nVí dụ như, có một người thợ làm đèn dầu thời kỳ đó」"
# 【ハチロク】
# display as 八六
# JP: 「……はい」
1063 = "「……Vâng」"
# monologue
# JP: 不思議そうな顔ひとつせず、\nハチロクはただ、頷いてくれる。
2030 = "Không hề tỏ vẻ khó hiểu,\nHachiroku chỉ gật đầu."
# monologue
# JP: 電気は\x%lエアクラ;#00ffc040;エアクラ%l;#;、ランプは鉄道。\nその例えだと、恐らく察してくれたがゆえに。
2617 = "Điện là \x%lエアクラ;#00ffc040;Aerocraft%l;#;, đèn dầu là đường sắt.\nChắc có lẽ em ấy đã hiểu được ẩn ý đó."
# 【双鉄】
# display as 雙鐵
# JP: 「誰もが電気に親しんで、ランプの需要が激減し、\n部品の調達さえも難しくなった……そんなころだ」
1672 = "「Ai ai cũng quen dùng điện, nhu cầu đèn dầu giảm mạnh,\nthậm chí việc tìm mua linh kiện cũng trở nên khó khăn…… vào thời điểm đó」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1421 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「いつものようにランプが灯され――\nしかし、地震が起きてしまった」
1587 = "「Đèn dầu được thắp sáng như mọi khi――\nNhưng, một trận động đất đã xảy ra」"
# monologue
# JP: そう、あれはそうした事故だった。
2386 = "Đúng vậy, đó là một tai nạn như thế."
# monologue
# JP: 自然現象が発生させた――\nただそれだけの、事故だったのだ。
1976 = "Do hiện tượng tự nhiên gây ra――\nChỉ là một tai nạn, như thế thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ランプは心を持っていた。だから懸命に努力した。\n『このまま落ちれば、すぐに延焼を呼んでしまう』と」
1588 = "「Đèn dầu có trái tim. Nên nó đã nỗ lực hết mình.\n'Nếu cứ thế rơi xuống, chắc chắn sẽ gây cháy lan mất'」"
# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1038 = "「…………」" 
# 【双鉄】
# display as 雙鐵
# JP: 「だからランプは我が身を揺らし、燃えにくい場所に\n落下した。結果、延焼は防がれた。が――」
1520 = "「Thế nên đèn dầu tự lắc mình, rơi xuống nơi\nkhó bắt lửa. Kết quả là, hỏa hoạn đã được ngăn chặn. Nhưng――」"
# 【ハチロク】
# display as 八六
# JP: 「被害者が……それでも、出てしまったのですね」
1325 = "「Nạn nhân…… dù vậy, vẫn xuất hiện đúng không ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1565 = "「Ừ」"
# monologue
# JP: その被害者は、妹と家族の手を引いて、\nのこのこと火に、飛び込んでいったバカものだ。
2593 = "Nạn nhân đó, là một kẻ ngốc nghếch dắt tay em gái và gia đình,\nlơ ngơ lao thẳng vào đống lửa."
# monologue
# JP: 何度でも湧く自責を幾度でも噛み潰す。\n僕が僕を責めればそれは、またハチロクをも責めてしまう。
2268 = "Bao nhiêu lần tự trách trào dâng là bấy nhiêu lần tôi nuốt ngược vào trong.\nNếu tôi tự trách mình, thì cũng đồng nghĩa với việc trách cứ Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、近隣への延焼は防がれた。\n[あまた,1]数多の被害を、ランプの決断は食い止めたのだ」
1296 = "「Tuy nhiên, việc cháy lan sang khu vực xung quanh đã được ngăn chặn.\nQuyết định của chiếc đèn dầu đã cứu vãn được vô số thiệt hại」"
# 【ハチロク】
# display as 八六
# JP: 「だからといって――\n被害者が出てしまったことには、変わりありません」
1478 = "「Cho dù là vậy――\nViệc có người thương vong, vẫn không thể thay đổi được」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。僕らは、決してその過去を変えられない」
1305 = "「Đúng vậy. Chúng ta, tuyệt đối không thể thay đổi quá khứ đó」"
# monologue
# JP: そうかと、思う。\n汰斗さんは、だから僕に、きっと教えてくれたのだ。
2150 = "Ra là vậy, tôi nghĩ.\nĐó là lý do ông Taito, chắc chắn đã dạy cho tôi."
# monologue
# JP: 僕と、ハチロクと、\x%l8620;#00ffc040;8620%l;#;に――\nきっと、伝えたいと願ったがゆえ。
2579 = "Cho tôi, Hachiroku, và \x%l8620;#00ffc040;8620%l;#;――\nChắc chắn, là vì ông ấy muốn truyền đạt điều đó."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、過去を糧とし、前へと進むことは出来る。\n僕はそう教わって、そのようにしてきたつもりだ」
1522 = "「Nhưng, ta có thể lấy quá khứ làm bài học để tiến về phía trước.\nAnh đã được dạy như thế, và anh vẫn luôn làm như vậy」"
# 【ハチロク】
# display as 八六
# JP: 「過去を――繰り返さぬため、ですか」
1570 = "「Để không lặp lại――quá khứ, phải không ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「それもある。これほど、直接的な形になるとは、\n夢にも思っていなかったがな」
1267 = "「Cũng có thể nói vậy. Dù anh chưa từng nằm mơ thấy nó\nlại thành hình một cách trực tiếp đến mức này」"
# monologue
# JP: 皮肉のようで、必然だ。\n思えば自然に、抜けたような笑いがこぼれる。
2585 = "Nghe như mỉa mai, nhưng lại là tất yếu.\nNghĩ vậy, một nụ cười nhẹ nhõm tự nhiên nở trên môi."
# monologue
# JP: つられ、ハチロクも小さく笑う。\n自嘲にまみれ力なく――それでも、笑いはやはり笑いだ。
1997 = "Bị cuốn theo, Hachiroku cũng cười khẽ.\nĐầy tự trào và yếu ớt――nhưng nụ cười vẫn là nụ cười."
# 【双鉄】
# display as 雙鐵
# JP: 「事故を悔やんで立ち止まっても、\n被害者は、まったく報われまいよ」
1480 = "「Dù có hối hận về tai nạn mà dừng bước,\nthì nạn nhân cũng chẳng được đền đáp gì đâu」"
# monologue
# JP: 自分自身に、誰より強く言い聞かせる。\n良く見る夢を、思い出す。
2355 = "Tự nhủ với bản thân mình, mạnh mẽ hơn bất cứ ai.\nNhớ lại giấc mơ thường thấy."
# monologue
# JP: 『終着駅に』と、路子が望む……\nそれは、おそらくこういう意味だ。
2546 = "'Đến nhà ga cuối cùng', Michiko mong ước……\nCó lẽ, ý nghĩa của nó là như thế này."
# 【双鉄】
# display as 雙鐵
# JP: 「同じ傷を、もう誰にも負わせないようにしなければ。\nそうすることが、生き残った者の――最善だと僕は思う」
1497 = "「Phải làm sao để không ai phải chịu chung vết thương đó nữa.\nAnh nghĩ đó là――điều tốt nhất mà những người sống sót có thể làm」"
# 【ハチロク】
# display as 八六
# JP: 「であるのならば――わたくしたちを、\nこのまま眠らせてしまった方が良いのでは？」
1528 = "「Nếu vậy――chẳng phải cứ để chúng tôi,\nngủ yên như thế này sẽ tốt hơn sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1678 = "「！！？」" 
# monologue
# JP: まるきり、頭になかった発想。\nそれを、ハチロクに突きつけられる。
2007 = "Một ý tưởng hoàn toàn không có trong đầu tôi.\nLại bị Hachiroku chỉ ra."
# 【ハチロク】
# display as 八六
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;を損傷したものを無理やり復旧されるより……\n別の手段で交通を確保し、観光を振興した方が」
1598 = "「Thay vì gượng ép phục hồi thứ đã bị hỏng \x%l台枠;#00ffc040;khung gầm%l;#;……\nthì đảm bảo giao thông bằng phương tiện khác, rồi thúc đẩy du lịch sẽ tốt hơn」"
# monologue
# JP: コスト、時間、今まで積み重ねてきたものたち。\nそれを白紙に戻すのならば、ハチロクの案には一理ある。
2505 = "Chi phí, thời gian, những thứ đã dày công tích lũy từ trước đến nay.\nNếu đưa tất cả trở về con số không, thì ý kiến của Hachiroku cũng có lý."
# monologue
# JP: いや――それを白紙に戻す勇気を持つことこそが、\n僕らに出来る“教訓の活かし方”なのかもしれない。
1901 = "Không――có dũng khí để đưa nó về con số không,\ncó lẽ mới chính là 'cách tận dụng bài học' mà chúng tôi có thể làm."
# 【双鉄】
# display as 雙鐵
# JP: 「[ハチロクニイマル,3]8620を修復することは――単なるエゴ……か？」
1668 = "「Việc sửa chữa [8620'86]――chỉ là sự ích kỷ…… sao?」"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を直したい、事故の傷から立ち直らせて、\n喜びの中、おもいっきりに走らせてやりたい――
2195 = "Muốn sửa chữa \x%l8620;#00ffc040;8620%l;#;, muốn nó đứng lên từ vết thương của vụ tai nạn,\nmuốn cho nó chạy hết mình trong niềm vui sướng――"
# 【双鉄】
# display as 雙鐵
# JP: 「あるいは――僕は――\n自分自身の代償に…………」
1635 = "「Hoặc là――tôi――\nđang trả giá cho chính bản thân mình…………」"
# monologue
# JP: 思ってしまえば、浮かされていたような熱が消え去る。\n現実が、べたりと肌に張り付いてくる。
2192 = "Vừa nghĩ đến đó, cơn sốt bừng bừng bỗng tan biến.\nThực tại, lạnh ngắt bám chặt vào da thịt."
# monologue
# JP: ひどく、寒い。\n自覚はすぐに震えと代わり、祓えなくなる。
2125 = "Lạnh, lạnh quá.\nSự nhận thức lập tức biến thành cơn run rẩy, không thể xua tan."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様――っ！？」
1661 = "「Ngài Soutetsu――!?」"
# monologue
# JP: ハチロクの手が伸びてくる。
2002 = "Bàn tay Hachiroku vươn tới."
# monologue
# JP: 僕に触れ、一瞬すくみ――\nそれから、ぎゅっと、強く、僕の腕を捕まえる。
2122 = "Chạm vào tôi, thoáng khựng lại――\nRồi sau đó, siết chặt, nắm lấy cánh tay tôi thật mạnh."
# 【ハチロク】
# display as 八六
# JP: 「すみません。わたくし、気が付かなくて――\nこんなに、冷えきってしまうまで」
1348 = "「Xin lỗi ngài. Tôi, không nhận ra――\ncho đến khi ngài, lạnh toát thế này」"
# 【双鉄】
# display as 雙鐵
# JP: 「気にするな。僕自身さえ気づかなかった」
1256 = "「Đừng bận tâm. Chính anh cũng không nhận ra mà」"
# monologue
# JP: 森に遮られているとはいえど、この雨だ。\n体が冷えぬわけが無い。
1992 = "Dù được khu rừng che chắn, nhưng mưa thế này.\nCơ thể làm sao không lạnh cho được."
# monologue
# JP: ただ冷えていると気づけぬほどに――\n僕は、なんらかの熱を帯びていた、それだけだ。
2054 = "Chỉ là tôi không nhận ra mình đang lạnh đến nhường nào――\nBởi vì tôi, đang mang trong mình một sức nóng nào đó, chỉ vậy thôi."
# 【ハチロク】
# display as 八六
# JP: 「――とにかく、歩いて、ここを出ましょう」
1027 = "「――Dù sao thì, hãy đi bộ, ra khỏi đây thôi ạ」"
# monologue
# JP: 唇がキュっと結ばれる。ハチロクの手が、僕を引く。\n引かれて、ようやく思い出す。
2298 = "Đôi môi mím chặt. Bàn tay Hachiroku, kéo tôi đi.\nBị kéo đi, cuối cùng tôi cũng nhớ ra."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットに……[けんそく,1]検測を頼まれていたのだが」
1288 = "「Paulette đã…… nhờ anh kiểm tra đo đạc mà」"
# 【ハチロク】
# display as 八六
# JP: 「明日にでもまた行いましょう。\nわたくしもお手伝いいたします」
1531 = "「Để ngày mai làm lại cũng được ạ.\nTôi cũng sẽ phụ giúp ngài」"
# monologue
# JP: ハチロクが、強く僕を引く。\n立ち止まることを許さぬ強さに、泣きそうになる。
2018 = "Hachiroku, kéo tôi đi thật mạnh.\nSự mạnh mẽ không cho phép tôi dừng lại ấy, khiến tôi muốn khóc."
# 【ハチロク】
# display as 八六
# JP: 「明日も、あさってもその次の日も――\nわたくしたちは、乗務の予定を持たないのですから」
1530 = "「Dù là ngày mai, ngày mốt hay ngày sau nữa――\nChúng ta, cũng đâu có lịch trình làm nhiệm vụ trên tàu đâu ạ」"
# monologue
# JP: (ちゃぷん）
32 = "(Bùm)"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1408 = "「A……」"
# monologue
# JP: 湯の温かさが骨身に染みる。\n染みるが、心は冷えきっている。
2416 = "Hơi ấm của nước nóng thấm vào tận xương tủy.\nThấm đẫm, nhưng cõi lòng thì lạnh buốt."
# monologue
# JP: （エゴ……か）
2650 = "（Ích kỷ…… sao）"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を\x%l台枠;#00ffc040;台枠%l;#;損傷から復活させる。
1969 = "Phục hồi \x%l8620;#00ffc040;8620%l;#; khỏi tổn thương \x%l台枠;#00ffc040;khung gầm%l;#;."
# monologue
# JP: それが本当に御一夜にとっての最善なのか、\nわからなくなる。
2235 = "Điều đó có thực sự là tốt nhất cho Ohigawa hay không,\ntôi không còn biết nữa."
# monologue
# JP: （\x%l8620;#00ffc040;8620%l;#;が復活すれば……\nハチロクも喜んでくれると、思ったのだが――）
2643 = "（Tôi cứ nghĩ nếu \x%l8620;#00ffc040;8620%l;#; được phục hồi……\nthì Hachiroku cũng sẽ vui mừng――）"
# monologue
# JP: が、覆い隠してた傷口を、生血が出るまで広げてしまった。
2474 = "Nhưng, tôi đã vô tình xé toạc vết thương đang che giấu ấy, cho đến khi máu tươi rỉ ra."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の復活は、ハチロクにとっては、\n忘れ得ぬ痛みを見せつけられるだけのことかもしれない。
2525 = "Việc phục hồi \x%l8620;#00ffc040;8620%l;#;, đối với Hachiroku,\ncó lẽ chỉ là phơi bày ra nỗi đau không thể nào quên."
# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、ハチロク」
1334 = "「Này, Hachiroku」"
# monologue
# JP: 言葉を選ぶ余力も無いから、\nただただ、浮かんだままに聞く。
2288 = "Không còn sức lực để chọn lựa ngôn từ nữa,\nnên tôi cứ thế hỏi những gì nảy ra trong đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;を、仮にこのまま廃車にしたら……\nお前は、それからどうするつもりだ」
1445 = "「Giả sử cứ để \x%l8620;#00ffc040;8620%l;#; thành xe phế liệu thế này……\nSau đó em định làm gì」"
# monologue
# JP: ちぷ、と小さな小さな水音。\n長い沈黙。
2397 = "Tí tách, một tiếng nước rất nhỏ.\nSự im lặng kéo dài."
# 【ハチロク】
# display as 八六
# JP: 「どう、とおっしゃられても……」
1473 = "「Ngài hỏi tôi định làm gì, thì……」"
# monologue
# JP: やがて、ゆるゆるとした言葉が届く。
2473 = "Cuối cùng, những lời nói chậm rãi cũng truyền đến."
# 【ハチロク】
# display as 八六
# JP: 「\x%l8620;#00ffc040;8620%l;#;が廃車になるなら、わたくしも一緒に――」
1447 = "「Nếu \x%l8620;#00ffc040;8620%l;#; thành xe phế liệu, thì tôi cũng sẽ cùng――」"
# 【双鉄】
# display as 雙鐵
# JP: 「馬鹿な。そのようなことは僕が許さん」
1605 = "「Ngốc nghếch. Anh sẽ không cho phép chuyện đó xảy ra đâu」"
# 【ハチロク】
# display as 八六
# JP: 「っ」
1391 = "「Ư」"
# monologue
# JP: さっきより少し強い水音。
2098 = "Tiếng nước vang lên mạnh hơn lúc nãy một chút."
# monologue
# JP: それがどういう意味合いなのか――\n目を向けようとは、今は、なぜだか思えない。
2595 = "Điều đó mang ý nghĩa gì――\nBây giờ, không hiểu sao tôi không muốn hướng mắt nhìn."
# 【双鉄】
# display as 雙鐵
# JP: 「そうすれば、お前は自由になるのだ。\n自由になったら、何をしたいか、聞かせて欲しい」
1654 = "「Nếu vậy, em sẽ được tự do.\nKhi được tự do rồi, em muốn làm gì, hãy nói cho anh nghe」"
# monologue
# JP: 言って、すぐ、\nまずい質問をしてしまったかと、不安にかられる。
2041 = "Vừa nói xong, ngay lập tức,\ntôi bị bủa vây bởi sự bất an, tự hỏi liệu mình có hỏi một câu tồi tệ không."
# monologue
# JP: “希望を話せ”という僕の“希望”は、\nハチロクを不安定にしたと、聞かされたのに――
2101 = "Dù đã được nghe kể rằng 'hy vọng' của tôi là 'hãy nói ra hy vọng',\nlại khiến Hachiroku trở nên bất ổn――"
# 【ハチロク】
# display as 八六
# JP: 「そのように、もし、なりましたら――」
1459 = "「Nếu như, chuyện đó xảy ra――」"
# monologue
# JP: だが、ハチロクの口調に咎めるような調子は無い。
1934 = "Nhưng, trong giọng điệu của Hachiroku không có vẻ gì là trách móc."
# monologue
# JP: ただただ、僕の声と同様に、\n疲れきってる気だるさだけが、漂っている。
2111 = "Chỉ là, giống như giọng nói của tôi,\nmột sự mệt mỏi rã rời đang bao trùm."
# 【ハチロク】
# display as 八六
# JP: 「――双鉄様は、きっと、御一夜を去られますよね？」
1028 = "「――Ngài Soutetsu, chắc chắn sẽ rời khỏi Ohigawa đúng không ạ?」"
# monologue
# JP: そうなったら。
2138 = "Nếu chuyện đó xảy ra."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;改修をこのまま諦めて――\n工場誘致撤回の火を、仮に、小さくしてしまうのなら。
2131 = "Nếu cứ thế từ bỏ việc cải tạo \x%l8620;#00ffc040;8620%l;#;――\nGiả sử, ngọn lửa phản đối thu hút nhà máy bị thu nhỏ lại."
# 【双鉄】
# display as 雙鐵
# JP: 「さて、どうなるかな。[ぎふ,1]義父の命に従って――\n[よそ,1]他所にやられるかもれんし、ここに残されるかもしれん」
1398 = "「Chà, sao nhỉ. Tuân theo lệnh của bố nuôi――\nCó thể anh sẽ bị đưa đi nơi khác, cũng có thể bị giữ lại đây」"
# 【ハチロク】
# display as 八六
# JP: 「そうして、何をなさるのですか？」
1574 = "「Và rồi, ngài sẽ làm gì ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「以前と変わらぬ仕事だろうな。\n酒問屋の仕事全般――仕入れや、営業やなんやかやだ」
1312 = "「Chắc là công việc không đổi so với trước đây thôi.\nToàn bộ công việc của đại lý bán buôn rượu――nhập hàng, kinh doanh, vân vân」"
# 【ハチロク】
# display as 八六
# JP: 「それは――」
1636 = "「Vậy thì――」"
# monologue
# JP: （ぱちゃり）
2640 = "（Tõm）"
# monologue
# JP: 水音。\n今度は想像しやすい。
2485 = "Tiếng nước.\nLần này thì dễ hình dung hơn."
# monologue
# JP: おそらくハチロクは両手で湯船のお湯をすくって、\n顔を洗うかなにかしたのだ。
2010 = "Có lẽ Hachiroku đã dùng hai tay vớt nước trong bồn,\nrửa mặt hay làm gì đó."
# 【ハチロク】
# display as 八六
# JP: 「わたくしに……お手伝いできる仕事でしょうか？」
1626 = "「Đó có phải là công việc…… mà tôi có thể giúp được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
1655 = "「Tất nhiên rồi」"
# monologue
# JP: 思いがけない問いかけに、心が、ぽっと温かくなる。\n言葉が、柔らかに滑らかになる。
2276 = "Câu hỏi bất ngờ khiến trái tim tôi ấm lên.\nLời nói cũng trở nên mềm mại và trôi chảy hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「お前がともに居てくれるなら、何をしてても心強いさ」
1377 = "「Nếu có em ở bên cạnh, làm gì anh cũng thấy vững tâm」"
# 【ハチロク】
# display as 八六
# JP: 「でしたら、わたくしは――」
1526 = "「Nếu vậy, tôi――」"
# monologue
# JP: （ざぶっ）
# 2640 = "（嘩啦）" 
# monologue
# JP: 水音がどんどん近づいてくる。\nハチロクが僕へと寄ってくる。
2375 = "Tiếng nước ngày càng gần.\nHachiroku đang tiến lại phía tôi."
# monologue
# JP: なぜだか無性に恥ずかしくなり、\n思わず背中を向けてしま――っ！
2208 = "Không hiểu sao tôi lại thấy xấu hổ vô cùng,\nbất giác quay lưng lại――!"
# monologue
# JP: （ぴとっ）
2651 = "（Chạm nhẹ）"
# monologue
# JP: 背中だ。\nハチロクの、小さな背中。
2347 = "Là lưng.\nTấm lưng nhỏ bé của Hachiroku."
# monologue
# JP: それが、僕の背中にあたる。\n背中合わせに、僕らは湯船につかり続ける。
2108 = "Nó chạm vào lưng tôi.\nChúng tôi tiếp tục ngâm mình trong bồn tắm, lưng tựa vào nhau."
# 【ハチロク】
# display as 八六
# JP: 「そうすることを、もしも許していただけるなら。\nわたくしは――双鉄様のお役に立ちたく、願います」
1461 = "「Nếu ngài cho phép tôi làm điều đó.\nTôi――mong muốn được giúp ích cho ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
1625 = "「Chuyện đó――」"
# monologue
# JP: 嬉しい。\n単純に、ものすごく。
2246 = "Vui quá.\nĐơn giản là, vô cùng vui sướng."
# monologue
# JP: その嬉しさが鮮やかすぎて、\n少し怖くて――尋ねてしまう。
2586 = "Niềm vui đó quá đỗi rõ ràng,\nđến mức tôi hơi sợ――và buột miệng hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「――僕に対する贖罪だの、罪悪感だののゆえなら」
1022 = "「――Nếu là vì muốn chuộc lỗi với anh, hay vì cảm giác tội lỗi」"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、双鉄様――いいえ、まったく」
1255 = "「Không đâu, ngài Soutetsu――không đâu, hoàn toàn không ạ」"
# monologue
# JP: ひどく、驚いたような声。\nハチロクの背中が硬くなる。
2169 = "Giọng nói cực kỳ kinh ngạc.\nLưng Hachiroku cứng đờ."
# 【ハチロク】
# display as 八六
# JP: 「そのようなことは、まるで思っておりませんでした。\nただ――わたくしは――わたくしは」
1501 = "「Tôi hoàn toàn không nghĩ như vậy đâu ạ.\nChỉ là――tôi――tôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1676 = "「！」" 
# monologue
# JP: 背中はますます緊張し、\nどんどんどんどん、熱くなる。
2301 = "Lưng em ấy ngày càng căng thẳng,\nvà dần dần, nóng lên."
# monologue
# JP: その熱が僕へ伝われば、\n僕もつられて、ひどく、緊張してしまう。
2603 = "Hơi nóng đó truyền sang tôi,\nkhiến tôi cũng bị cuốn theo, trở nên vô cùng căng thẳng."
# 【ハチロク】
# display as 八六
# JP: 「わたくしは――ただ――双鉄様、と――\n双鉄様の、おそばに……いれば――」
1499 = "「Tôi――chỉ là――cùng ngài Soutetsu, và――\nở bên cạnh…… ngài Soutetsu――thì――」"
# monologue
# JP: 言葉が、そこで続かなくなる。
2103 = "Lời nói, đến đó thì đứt đoạn."
# monologue
# JP: 振り向きたくて、振り向けなくて――\nだから、言葉を送り込む。
2253 = "Muốn quay lại, mà không thể quay lại――\nVì vậy, tôi truyền lời nói đến em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はだ。ハチロク。心強いより何よりも。\nお前が一緒にいると、楽しい」
1343 = "「Anh thì. Hachiroku. Hơn cả sự vững tâm hay bất cứ điều gì.\nChỉ cần có em ở bên, anh thấy rất vui」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしも、です――双鉄様」
1493 = "「Tôi cũng vậy――ngài Soutetsu」"
# monologue
# JP: ハチロクの声は、そう言いながらも、苦しげだ。
1989 = "Dù nói vậy, giọng Hachiroku vẫn nhuốm vẻ đau khổ."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様と一緒にいると――\nわたくしは――心が弾み、とても、幸せを感じるのです」
1379 = "「Được ở bên ngài Soutetsu――\ntôi――trái tim nhảy múa, cảm thấy vô cùng hạnh phúc」"
# 【双鉄】
# display as 雙鐵
# JP: 「幸せな声には、聞こえんが」
1297 = "「Nhưng nghe chẳng giống giọng điệu hạnh phúc chút nào」"
# 【ハチロク】
# display as 八六
# JP: 「だって――わたくしは――わたくしは――」
1425 = "「Bởi vì――tôi――tôi――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1407 = "「啊」" 
# monologue
# JP: そうだったなと、いまさら思う。\n何度も何度も、僕たちは、同じ場所へと戻ってしまう。
2289 = "Đến giờ tôi mới nhận ra, đúng là vậy.\nHết lần này đến lần khác, chúng tôi lại quay về chốn cũ."
# monologue
# JP: 傷口に触れ、痛みに怯え――\nそうして、きっと竦んでしまう。
2214 = "Chạm vào vết thương, khiếp sợ nỗi đau――\nVà rồi, chắc chắn sẽ chùn bước."
# 【双鉄】
# display as 雙鐵
# JP: 「事故が無ければ、僕達は出会わなかったのだ」
1455 = "「Nếu không có tai nạn, chúng ta đã không gặp nhau」"
# monologue
# JP: ついさっき――\n線路で、恐れとともに思った事実。
2222 = "Mới vừa nãy thôi――\nSự thật mà tôi đã nghĩ đến cùng với nỗi sợ hãi trên đường ray."
# 【双鉄】
# display as 雙鐵
# JP: 「出会わなければ、僕はお前を知り得なかった。\n事故と、過去と――これほどまでには向き合えなかった」
1454 = "「Nếu không gặp nhau, anh đã không thể biết đến em.\nTai nạn, và quá khứ――anh đã không thể đối mặt đến mức này」"
# monologue
# JP: けれども今は、むしろ恵みだと感じてさえいる。
1951 = "Nhưng bây giờ, tôi thậm chí còn cảm thấy đó là một ân huệ."
# monologue
# JP: 汰斗さんが、僕らを揃って引き取った――\nその意図を、きっと紡げると感じてる。
2383 = "Ông Taito đã nhận nuôi cả hai chúng tôi――\nTôi cảm thấy chắc chắn mình có thể dệt nên ý định đó."
# 【双鉄】
# display as 雙鐵
# JP: 「だからといって、すぐに割り切れるわけでもない。\n答えをぽんと、お前に差し出してやれるでもない」
1472 = "「Dù vậy, cũng không thể dứt bỏ ngay lập tức được.\nCũng không thể dễ dàng đưa ra câu trả lời cho em được」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1421 = "「嗯」" 
# monologue
# JP: ハチロクの背中からふっと、力が抜ける。\nとても小さく、やわらかい。
2257 = "Tấm lưng Hachiroku chợt buông thõng.\nRất nhỏ bé, và mềm mại."
# monologue
# JP: そのあたたかみは、僕に勇気を与えてくれる。
2170 = "Hơi ấm ấy, mang lại cho tôi dũng khí."
# 【双鉄】
# display as 雙鐵
# JP: 「傷は痛むし、罪悪感は拭えはしない。\nそれでも、僕は――お前と出会えて、幸せなのだ」
1315 = "「Vết thương sẽ đau, cảm giác tội lỗi không thể xóa nhòa.\nDù vậy, anh――rất hạnh phúc vì được gặp em」"
# monologue
# JP: あまりに単純すぎること。\nそれゆえ、見ようとしなかったこと。
1923 = "Một điều quá đỗi đơn giản.\nChính vì thế, tôi đã không cố gắng nhìn nhận nó."
# monologue
# JP: 真正面から見据えれば、\n過去にまつわる影がどこかへ、引っ込んでいく。
2055 = "Nếu nhìn thẳng vào nó,\nnhững bóng đen của quá khứ sẽ lùi lại nơi nào đó."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様も、なのですか？」
1665 = "「Ngài Soutetsu cũng vậy sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。僕もだ。\n無論、そこには、過去も何も、全く関係してこない」
1418 = "「Ừ. Anh cũng vậy.\nĐương nhiên, ở đó, quá khứ hay gì đi nữa, hoàn toàn không liên quan」"
# monologue
# JP: 背中で感じる。\nハチロクは小さく頷いて――僕の言葉を、わかってくれる。
2311 = "Cảm nhận qua tấm lưng.\nHachiroku khẽ gật đầu――em ấy đã hiểu những lời tôi nói."
# 【双鉄】
# display as 雙鐵
# JP: 「出会ってずっと――この瞬間も。ハチロクと一緒にいて。\nともに懸命に頑張ることが、僕は幸せでとても楽しい」
1484 = "「Từ lúc gặp nhau――đến tận khoảnh khắc này. Được ở cùng Hachiroku.\nĐược cùng nhau nỗ lực hết mình, anh thấy rất hạnh phúc và vui vẻ」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしもです、双鉄様」
1494 = "「Tôi cũng vậy, ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕らは、お互い、お互いの役にたっている」
1646 = "「Vậy thì chúng ta, đang giúp ích cho nhau」"
# monologue
# JP: それでいいのだと、強く感じる。\nそうできるだけで、いいのだと。
2282 = "Tôi cảm nhận mãnh liệt rằng, như vậy là đủ rồi.\nChỉ cần có thể làm như vậy, là đủ rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「周りに認められるなら。誰かの役に立つのなら。\n動機がたとえエゴでも欲でも、それは幸いに変わるのだ」
1381 = "「Nếu được mọi người xung quanh công nhận. Nếu có thể giúp ích cho ai đó.\nDù động cơ có là sự ích kỷ hay dục vọng, nó cũng sẽ biến thành niềm hạnh phúc」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1421 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;の修復のことも――だから、\nポーレット達、みんなに[はか]諮ってもらおう」
1309 = "「Chuyện sửa chữa \x%l8620;#00ffc040;8620%l;#; cũng vậy――thế nên,\nhãy hỏi ý kiến của Paulette và mọi người đi」"
# 【ハチロク】
# display as 八六
# JP: 「ああ……左様ですね。\n考えてみれば、それが、当然のことなのですね」
1414 = "「A…… đúng vậy nhỉ.\nNghĩ lại thì, đó là chuyện đương nhiên mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1421 = "「嗯」" 
# monologue
# JP: 背中が、笑う。\n嬉しげに、そうしてどこか、さみしげに。
2100 = "Tấm lưng, đang cười.\nTrông thật vui vẻ, và đâu đó, cũng phảng phất nỗi buồn."
# 【ハチロク】
# display as 八六
# JP: 「あの子はもう、わたくしの[ハチロクニイマル,3]8620ではなく――\n御一夜の\x%l8620;#00ffc040;8620%l;#;に、なったのですから」
1580 = "「Đứa trẻ đó giờ đã không còn là [8620'86] của tôi nữa――\nmà đã trở thành \x%l8620;#00ffc040;8620%l;#; của Ohigawa rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。だが同時に、お前の[ハチロクニイマル,3]8620でもある。\nそれは変わらぬ――決して、変わり得ぬことだ」
1538 = "「Đúng vậy. Nhưng đồng thời, nó cũng là [8620'86] của em.\nĐiều đó sẽ không thay đổi――tuyệt đối, không thể thay đổi được」"
# monologue
# JP: どくんと、大きく鼓動する。\n僕の鼓動だ、ハチロクのものであるはずがない。
2300 = "Thịch một cái, nhịp đập mạnh mẽ.\nLà nhịp tim của tôi, không thể nào là của Hachiroku được."
# monologue
# JP: だけれど、どきどき、どきどきと――\n自分の鼓動をハチロクと、共有してると感じてしまう。
1944 = "Nhưng mà, thình thịch, thình thịch――\nTôi có cảm giác như đang chia sẻ nhịp đập của mình với Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も、お前を――」
1468 = "「Anh cũng, xem em――」"
# 【ハチロク】
# display as 八六
# JP: 「ぁっ」
# 1407 = "「啊」" 
# monologue
# JP: 誰かの。誰かに。\n単純な所有欲であり、独占欲。
2359 = "Của ai đó. Đối với ai đó.\nChỉ đơn thuần là ham muốn sở hữu, là dục vọng độc chiếm."
# monologue
# JP: まさしくそれこそ欲で、エゴだ。\nあまりにあからさまで剥き出しの。
2590 = "Quả thực đó chính là dục vọng, là sự ích kỷ.\nQuá đỗi trắng trợn và trần trụi."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク……僕は」
1328 = "「Hachiroku…… anh」"
# monologue
# JP: されど、それを隠さずぶつける。\nハチロクになら、ハチロクにだけは、そう出来る。
1949 = "Dù vậy, tôi vẫn không che giấu mà bộc lộ nó ra.\nNếu là Hachiroku, chỉ với Hachiroku, tôi mới có thể làm vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「――僕には、お前が必要だ」
1026 = "「――Anh, cần em」"
# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
# 1677 = "「！！！」" 
# monologue
# JP: 理屈ではなく、利害ではなく、感情で。
2581 = "Không phải lý lẽ, không phải lợi ích, mà bằng cảm xúc."
# monologue
# JP: ハチロクをもしも失うのなら――\n僕は、生きてない僕へと戻る。
2134 = "Nếu như đánh mất Hachiroku――\nTôi sẽ quay lại làm cái xác không hồn."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、ハチロク。これからも僕の側にいてくれ」
1518 = "「Thế nên, Hachiroku. Từ nay về sau, hãy ở bên cạnh anh nhé」"
# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄さま――わたくしこそ――\nそれこそ、わたくしの望みです」
1441 = "「Vâng. Ngài Soutetsu――chính tôi――\nđó mới chính là mong ước của tôi ạ」"
# monologue
# JP: 声が、震える。\nもう、涙声になっている。
2112 = "Giọng nói, run rẩy.\nĐã nghẹn ngào trong nước mắt rồi."
# 【ハチロク】
# display as 八六
# JP: 「ずっとあなたの――あなたのお側に。\nわたくしが壊れる、その日まで――」
1503 = "「Mãi mãi ở bên ngài――ở bên cạnh ngài.\nCho đến ngày, tôi hỏng hóc――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロク、そうしよう」
1643 = "「Nếu vậy Hachiroku, quyết định thế nhé」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
1443 = "「Vâng, ngài Soutetsu」"
# monologue
# JP: そうすることが自然と感じて、\nそうしたくって、湯船の中で振り返る。
2244 = "Cảm thấy làm như vậy là lẽ tự nhiên,\nmuốn làm như vậy, nên tôi quay lại trong bồn tắm."
# monologue
# JP: ハチロクの体を抱きしめて、\n僕の全部で、包み込む。
2264 = "Ôm chặt lấy cơ thể Hachiroku,\nbao bọc lấy em ấy bằng tất cả những gì tôi có."
# 【ハチロク】
# display as 八六
# JP: 「あ……」
1404 = "「A……」"
# monologue
# JP: ただただ、幸せそうな声。\nハチロクがくたり、僕の手の中で力を抜く。
2019 = "Chỉ là, một giọng nói ngập tràn hạnh phúc.\nHachiroku rũ xuống, buông lỏng sức lực trong vòng tay tôi."
# monologue
# JP: けれども次の瞬間に、\nぎくりと、体が硬くなる。
1937 = "Thế nhưng khoảnh khắc tiếp theo,\ncơ thể em ấy giật nảy và cứng đờ."
# 【ハチロク】
# display as 八六
# JP: 「え？　あ――あれ？」
1402 = "「Hả? A――ủa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、ハチロク――っ！？」
1487 = "「Sao vậy, Hachiroku――!?」"
# monologue
# JP: 湯船に、赤。\n出血したかと思うが、僕の体はどこも傷んでいない。
2398 = "Trong bồn tắm, màu đỏ.\nTôi tưởng chảy máu, nhưng cơ thể tôi không hề bị thương chỗ nào."
# 【ハチロク】
# display as 八六
# JP: 「あれ？　わたくし――これ……なんでしょう？」
1401 = "「Ủa? Tôi――cái này…… là sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「お前か、これは？」
1627 = "「Của em sao, cái này?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。おそらくは――\nなんでしょう――違和感、と、言えばいいのか」
1416 = "「Vâng. Có lẽ là――\nSao nhỉ――nên gọi là, cảm giác khác lạ chăng」"
# 【双鉄】
# display as 雙鐵
# JP: 「少し待て！」
1304 = "「Đợi chút!」"
# monologue
# JP: ここは登呂流湯。\nまさに、不幸中の幸いだ。
2591 = "Đây là nhà tắm Tororyu-yu.\nĐúng là, trong cái rủi có cái may."
# 【双鉄】
# display as 雙鐵
# JP: 「ご主人！　ご主人！　\n申し訳ない！　すぐに来てくれ！！」
1592 = "「Ông chủ! Ông chủ!\nXin lỗi! Mau đến đây giúp tôi với!!」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「なんねぇ、大声で」
1488 = "「Có chuyện gì mà lớn tiếng thế」"
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクに異変が起きたのだ」
1336 = "「Hachiroku có chuyện lạ rồi」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ええ？」
1606 = "「Hả?」"
# monologue
# JP: すりガラスの向こう、ご主人の動きが慌ただしくなる。
2578 = "Qua lớp kính mờ, hành động của ông chủ trở nên vội vã."
# monologue
# JP: ならば、任せておけばいい。\nああ、いや――だが、預ける前に。
2336 = "Nếu vậy, cứ giao cho ông ấy là được.\nÀ, không――nhưng mà, trước khi gửi gắm."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
# 1331 = "「八六」" 
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1403 = "「啊——」" 
# monologue
# JP: もう一度強く抱きしめる。
2216 = "Tôi ôm chặt lấy em ấy thêm một lần nữa."
# monologue
# JP: ハチロクの熱を、少しでも失わせないよう。\n不安があるなら、それを少しでも拭えるように。
2406 = "Để hơi ấm của Hachiroku, không bị mất đi dù chỉ một chút.\nNếu có bất an, cũng mong có thể xoa dịu đi phần nào."
