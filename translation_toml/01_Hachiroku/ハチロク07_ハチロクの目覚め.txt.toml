2439 = "登呂流浴場老闆"

[script]
# lines: 443 
# 【ナビ】
# display as Ｎａｖｉ
# JP: 「双鉄様、お気をつけて。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;作動不能区域内でのフォローは出来ませんので」
1666 = "「雙鐵少爺，請您多加注意。在接下來的\\x%lエアクラ;#00ffc040;空凝機%l;#;無法工作的區域內，我無法給予您適當的輔助」" 

# 【双鉄】
# display as 雙鐵
# JP: 「線路沿いを行くのだ。迷う方が難しい。\n帰りは、逆側に出るのでよろしく頼む」
1507 = "「我沿著線路走就行，不可能會走錯路的。我回去的時候會從另一側出來，你在那邊等我」" 

# 【ナビ】
# display as Ｎａｖｉ
# JP: 「了解いたしました」
1523 = "「收到指令」" 

# monologue
# JP: ナビと別れて、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;の作動不能区域内へと踏み込んでいく。
2305 = "我與Ｎａｖｉ告別，踏入了\\x%lエアクラ;#00ffc040;空凝機%l;#;無法工作的區域內。" 

# monologue
# JP: （ザクっ）
2647 = "（沙沙）" 

# monologue
# JP: 晴れぬ気分に合わせたように、\n空にも雲がかかりだしてる。
2614 = "雲朵遍布在空中，彷彿映照出了我心中的不快。" 

# monologue
# JP: が、日差しが既にたっぷりと\x%lバラスト;#00ffc040;バラスト%l;#;の石を温めたのか、\n線路脇を歩いていると、じっとり汗がにじみ出てくる。
1954 = "但是，陽光似乎早就已經把\\x%lバラスト;#00ffc040;道砟%l;#;的碎石充分加熱，使得走在線路一旁的我汗流浹背。" 

# 【双鉄】
# display as 雙鐵
# JP: 「暑さには耐性が出来たと思っていたのだがな」
1513 = "「我還以為我早都對這炎熱的天氣產生抗性了」" 

# monologue
# JP: 実際も、まるで暑いとは感じていない。
2033 = "其實，我幾乎沒有感覺到熱。" 

# monologue
# JP: 走行中の\x%l運転台;#00ffc040;運転台%l;#;と比べてしまえば、\n炎天下でも、屋外は、むしろ涼しく感じる。
2063 = "和行駛中的\\x%l運転台;#00ffc040;駕駛台%l;#;比起來，只要是在戶外就算是清涼的，哪怕我正走在炎炎烈日之下。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……いや、単純に、これは運動で出る汗か？」
1049 = "「……不，這八成只是因為運動出的汗吧？」" 

# monologue
# JP: ひたすら歩く。線路沿いを。\n術仙炭鉱廃駅を越え、反対側の作動不能区域外を目指して。
2280 = "我沿著線路一直向前走。走過了術仙煤礦廢車站，朝著無法工作的區域另一側前進。" 

# monologue
# JP: それが今日、\nポーレットから僕に与えられた、ただひとつの仕事だ。
2587 = "這是今天波萊特交給我的一項任務。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……レールショップまわりで、\n混乱が起きていなければいいが――」
1066 = "「……希望鐵路商店附近別出什麼亂子——」" 

# monologue
# JP: 車輌故障に伴っての、機関車変更。\nバーベキュー\x%l列車;#00ffc040;列車%l;#;の主体はあくまで\x%l客車;#00ffc040;客車%l;#;――
2079 = "因為先前的車輛故障，我們變更了編組。" 

# monologue
# JP: ゆえ、そう大きな混乱も起きないだろうと、\nポーレットは僕の背を押した、が。
2392 = "波萊特鼓勵我說，ＢＢＱ\\x%l列車;#00ffc040;列車%l;#;的主體只是\\x%l客車;#00ffc040;客運車廂%l;#;，所以應該不會引起什麼大的混亂——但是。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……それでも、[ハチロク,3]8620は[きんかんばん,2]金看板だ。\n期待してくれたお客様は、当然不満を感じるだろう」
1058 = "「……再怎麼說，[八六,3]８６２０也算是金字招牌。對此有所期待的客人肯定會產生不滿情緒吧」" 

# monologue
# JP: だから、\n\x%l機関士;#00ffc040;機関士%l;#;として直接苦情に対応したいし、お詫びしたい。
2316 = "所以，我作為\\x%l機関士;#00ffc040;司機%l;#;理應親自前往賠禮道歉。" 

# monologue
# JP: そう申し出ても、\nポーレットは許可をくれなかった。
1943 = "但是就算我跟波萊特說了我的想法，她也沒有同意。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……『巡回検査をお願いします』か」
1037 = "「……“麻煩你去巡迴檢查”啊」" 

# monologue
# JP: 目視によるレールの検測。\n歪みやたわみ、傷や障害の有無の確認。
2433 = "用肉眼檢查鐵軌是否有歪曲變形，是否有磨損。" 

# monologue
# JP: \x%l保線;#00ffc040;保線%l;#;ボランティアの堰さんたち――\n凪のお祖父様たちが、普段から行って下さっていることだ。
2588 = "這是志願\\x%l保線;#00ffc040;巡線%l;#;員堰先生一行人——也就是凪的祖父他們的日常工作。" 

# 【双鉄】
# display as 雙鐵
# JP: 「やってみると――\n予想以上に神経を使う仕事だな、これは」
1258 = "「不親自嘗試還真是不知道——這工作比想像中還要費神」" 

# monologue
# JP: 無論僕らも、運転しながら意識していることではあるが、\n徒歩で間近に行う方がもちろん、細かに見れる。
2608 = "雖然我們在駕駛的時候也會有意去觀察，不過徒步沿鐵軌近距離觀察自然能看得更仔細。" 

# monologue
# JP: そして細かに見れる分、\n小さな違和も、いちいち計測、記録をしていくことになる。
2367 = "正因為能觀察得更加仔細，哪怕是小小的異樣，都要精確測量並記錄下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ここは確かに、僕のような若者がやるべき場所か」
1629 = "「這片區域確實應該派我這樣的年輕人來」" 

# monologue
# JP: 堰さんはガソリン自動車を有しているが、\nこの森深さ、近辺までしか恐らく入ってこれまいし――
2094 = "堰老爺子雖然有汽油引擎車，但是這片森林這麼大，八成只能開到附近——" 

# monologue
# JP: ここに至るまでの移動に神経や体力を使っては、\n\x%l保線;#00ffc040;保線%l;#;作業の大変さも、いっそう増してしまうだろう。
2532 = "走到這裡已經消耗了我相當的體力和精力，這給我的\\x%l保線;#00ffc040;巡線%l;#;工作又增加了幾分負擔。" 

# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、やはり……\n頭を冷やせ、と。そういう意味でもあるのだろうな」
1604 = "「話說回來，讓我做這份工作……八成有幾分想讓我冷靜下來的意思」" 

# monologue
# JP: 思えば途端、\n自嘲の苦笑がこみ上げてくる。
2193 = "想到這，我的臉上浮現出了自嘲的苦笑。" 

# monologue
# JP: \x%l保線;#00ffc040;保線%l;#;が如何に重要か、僕とて重々承知している。\n承知している筈であるのに――
2269 = "我早就已經對\\x%l保線;#00ffc040;巡線%l;#;的重要性有著深刻的認識。不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「バカか、僕は。漫然と歩いてしまうなど。\n……戻って、きちんと見なおさねば」
1508 = "「我真是蠢。竟然漫不經心地走了一程。……得回頭去認真檢查才行」" 

# monologue
# JP: この有り様だ。\nお客様と対面などをもしすれば、失礼を犯しかねなかった。
2454 = "看我現在這樣，如果讓我去與旅客面對面交談，很可能會有所冒犯。" 

# monologue
# JP: ポーレットの判断は正しかった――と、\n今更ながらに認識すれば、自然と足も止まってしまう。
1919 = "事到如今，我不禁感嘆波萊特的判斷是正確的，於是我不自覺地停下了腳步。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、頭を冷やしてからだ。\n気がかりがあっては、見るべきものも見落としかねん」
1583 = "「看來，得讓腦子冷卻一下才行。像這樣胡思亂想，很容易漏掉什麼本來應該注意到的訊息」" 

# monologue
# JP: いや――僕はもう既に、見るべきものを……\n見落としてはいけない何かを、捉え損ねたのかもしれない。
1906 = "不對——我或許……早就已經漏掉了一些不可忽視的細節了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクを……混乱させてしまったな」
1510 = "「我讓八六……陷入混亂了啊」" 

# monologue
# JP: 口から出してしまった言葉に、情けなくなる。\nさきほどよりも強い自嘲を感じてしまう。
2303 = "我自己說出來的話都讓我自己感到無地自容。簡直是比剛才更一針見血的自嘲。" 

# monologue
# JP: 混乱させた――どころでは無い、\n僕は、ハチロクを泣かせたのだ。
1902 = "不只是讓八六陷入了混亂——我甚至把她弄哭了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「泣きたくて泣いたのではない……\n自分が泣いていることに、気づかぬような泣き方だった」
1439 = "「她不是想哭才哭的……那時候她甚至沒有發覺自己在哭」" 

# monologue
# JP: ……僕自身、\n事故の直後に、ああいう風に泣いてしまったことがある。
1007 = "……我在遭遇事故之後，也有像她那樣哭泣過。" 

# monologue
# JP: 路子を傷つけ、\nああいう風に泣かせてしまったこともある。
2312 = "我還傷過路子的心，弄得路子也像那樣哭泣過。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あれは……どうしようも無くなってしまったときの、\n泣き方だ」
1597 = "「自己真的無論如何都無能為力的時候……才會像那樣哭泣」" 

# monologue
# JP: 自分の力では全く問題が解決できない。\nそれどころか、何一つできることさえ見つからない。
1933 = "以一己之力完全無法解決問題。甚至完全不知道自己能做什麼。" 

# monologue
# JP: そうした時に、涙は勝手にこぼれ落ちていく。\n行き場の失くなった絶望感が、形になって溢れたように。
2090 = "在這種時候，淚水就會不自主地流下。就像是無處發洩的絕望感化作淚水奪眶而出一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕は。\nハチロクを――絶望させてしまったのか」
1656 = "「那麼我是——令八六陷入絕望了吧」" 

# monologue
# JP: 疑問ではなく、確信している。\nハチロクには、魂があると知っているから。
2582 = "這並不是疑問，而是確信。因為我知道，八六她也是擁有靈魂的。" 

# monologue
# JP: そして魂を有する以上、人と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の間に、\n理解し得ぬほどの感情の差が、発生するとは思えないから。
2332 = "既然她擁有靈魂，那麼人和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;之間，便不可能產生什麼無法理解的情感差異。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だというのに――」
1284 = "「但是——」" 

# monologue
# JP: 何故、何に。\n僕は、絶望をさせてしまったのか。
2221 = "我到底是為什麼、做了什麼，會令她如此絕望。" 

# monologue
# JP: どうして僕はハチロクに、あんな泣き方をさせたのか……\nどれほど頭を捻ってみても、僕にはまるでわからない。
2407 = "為什麼我會讓八六流下那絕望的淚水……我絞盡腦汁也無法找到答案。" 

# 【双鉄】
# display as 雙鐵
# JP: 「くそっ」
1387 = "「可惡」" 

# monologue
# JP: 立ち止まっても解決できない。迷ったままでは進めない。\nどうしていいのか……僕もまたわからなくなっている。
2233 = "我就這樣杵在這裡也沒辦法解決問題，就這樣不停煩惱也不會有半點改善的跡象。我仍然不知道……我應該怎麼辦。" 

# monologue
# JP: ハチロクに聞けば一番良さそうにも思えるが、\nそれがハチロクを、かえって傷つけてしまうかもしれない。
2609 = "雖然我直接去問八六可能是最好的選擇，但是這樣說不定反而會傷害八六。" 

# 【双鉄】
# display as 雙鐵
# JP: 「追うな、と――言われてしまったしな」
1582 = "「畢竟，她那時候對我說“不要來追我”」" 

# monologue
# JP: 熱暴走をしていると、そうハチロクは言っていた。\n数時間もあればクールダウンを出来る、とも。
2029 = "八六還說那是因為她過熱失控了，過幾個小時就可以冷卻下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……熱、か。僕も知恵熱でも出しそうだ」
1078 = "「……過熱失控嗎。我好像也快要想得發燒了」" 

# monologue
# JP: これほどに、誰かの気持ちを追おうとするなど、\n今まで一度も無かったことだ。
2604 = "長這麼大，我就沒有像現在一樣這麼在意過誰的感受。" 

# monologue
# JP: 路子とはふたご同士であったから、\n気持ちなど、追わずとも手に取るように把握できてた。
2229 = "我和路子是雙胞胎兄妹，就算我不用刻意去揣測，都可以知道她的心中所想。" 

# 【双鉄】
# display as 雙鐵
# JP: 「路子がいれば相談も……いや、そもそも路子がいれば、\nハチロクと出会うことなど―――っ！」
1457 = "「如果路子在的話倒是可以跟她商量……不對，如果路子在的話，我根本不可能與八六相遇——呃！」" 

# monologue
# JP: 足が、いきなり竦んでしまう。\n強い吐き気と、ごうごうという耳鳴りと。
2467 = "突然腳步變得無比沉重，我不禁覺得一陣反胃，耳邊嗡嗡作響。" 

# monologue
# JP: 封じ込めてた恐怖がぞわりと、\n記憶の底から這い出してきて、雨の景色を思い出させる。
2044 = "原本封存在記憶深處的恐怖湧了上來，讓我想起了曾經雨中的光景。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――――――ぁあ」
1018 = "「————啊」" 

# monologue
# JP: 線路の、上だ。\n普通だったら入ることが無い、線路の真上。
2307 = "我躺在鐵路上，在那條我平時根本不會踏入的鐵路正上方。" 

# monologue
# JP: そこに、僕は横たわってた。\n路子を助け損ねた腕には、なんの力も入らなかった。
2385 = "沒能拯救路子的雙手使不上一點勁。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが……全ては過去の話だ」
1286 = "「但是……這都是過去的事了」" 

# monologue
# JP: 雨降りじゃない。激しい風も吹いてない。\n怒号にも似た声もしないし、鉄と血の臭いもしない。
2426 = "現在沒有下雨，沒有吹起嚇人的強風。耳邊沒有怒吼一般的嘶鳴，鼻腔中也沒有鐵和血液的味道。" 

# monologue
# JP: 体が動く。首も、目線を動かすことも出来る。\n痛みも無い。声だって出る。無数のうめきも、聞こえない。
2560 = "身體能動。脖子和視線可以轉動。也感覺不到痛楚。也可以發出聲音。也聽不到數不清的呻吟聲。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……大丈夫だ。\n少なくとも今、僕は、自分の足で立っている」
1073 = "「……沒問題。至少現在，我能用自己的腳站著」" 

# monologue
# JP: わざわざ言葉にしなければ、それすら怪しく感じてしまう。
2502 = "若是不刻意說出來，我甚至連這樣的自信都沒有。" 

# monologue
# JP: 水底に引きずり込まれたように、\n感覚全てが茫としていて、現実感がひどく薄くて。
2259 = "我感覺就像是要被拽入水底一樣，所有感官都變得模糊，現實感極為淡薄。" 

# 【双鉄】
# display as 雙鐵
# JP: 「くっ……あっ――」
1396 = "「呼……哈——」" 

# monologue
# JP: 息を吸い、吐く。\nそのことをまず、意識する。
2062 = "吸氣，吐氣。把注意力都集中在呼吸上。" 

# monologue
# JP: 指先が、バネ仕掛けのように握りこまれてる。\nそれを、ゆっくり、ゆっくり広げる。
2291 = "我的指尖就像在壓彈簧一樣捏緊，然後慢慢地、慢慢地鬆開。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――完全に、割り切ったつもりでいたのだが」
1024 = "「——我明明已經跟過去做了了斷」" 

# monologue
# JP: ハチロクを助けると決めたとき。\n\x%l機関士;#00ffc040;機関士%l;#;になると、自らの意思で選んだ、あのとき。
2085 = "在我決定要幫助八六的時候，在我自己選擇了要成為\\x%l機関士;#00ffc040;司機%l;#;的時候。" 

# monologue
# JP: 僕は過去から踏み出した、\nそう出来ていたつもりでいたのに――
2236 = "我已經從過去的陰影中走出來了，我明明覺得已經做到了——" 

# 【双鉄】
# display as 雙鐵
# JP: 「くそっ――」
1386 = "「可惡——」" 

# monologue
# JP: 喉が渇く。\n頭は熱に浮かされて、なのに体が冷えきっている。
2258 = "我感覺喉嚨冒煙，大腦燙得可怕，但是身體卻直髮冷。" 

# monologue
# JP: 昔の僕が、帰ってきてる。\n生きていながら死んでた、あの頃の、小さな僕が。
2224 = "我又變回了以前的我——那個曾是行屍走肉的小時候的我。" 

# 【ハチロク】
# display as ？？？
# JP: 「大丈夫ですか！？　双鉄様」
1662 = "「雙鐵少爺您沒事吧！？」" 

# monologue
# JP: 愕然とする。\n幻聴までを聞いてしまって。
2252 = "我怔住了，怎麼耳邊傳來了幻聽。" 

# monologue
# JP: 泣かせるほどに傷つけてしまったハチロクに、\nこんなときだけ、都合よく頼ろうとする自分の心が――
2274 = "我明明傷八六那麼深，以至於惹她哭泣，為什麼到了這時候我還厚顏無恥地想要依靠她——" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様っ！」
1664 = "「雙鐵少爺！」" 

# monologue
# JP: （ガシっ）
2646 = "（攙扶）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1678 = "「！！？」" 

# monologue
# JP: 熱いと感じる。
2256 = "我感受到了一陣溫熱。" 

# monologue
# JP: ハチロクの手から伝わる熱が――\n僕に、世界を戻してくれる。
2012 = "八六手中傳來的溫暖——把我拉回了現實。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ハチロクか」
1072 = "「……是八六嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、わたくしです。双鉄様」
1548 = "「是的，是我。雙鐵少爺」" 

# monologue
# JP: まだ繋がっている手を握る。\n小さく、柔らかく、温かい。
2266 = "我握住了她的手，這手是那麼小，那麼柔軟，那麼溫暖。" 

# monologue
# JP: ああ、間違いの無い現実なのだ、と、\nそう思うのだが、理解が追いついて来てくれない。
2071 = "啊，沒有錯，這是現實。但我還是沒能及時理解現狀。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうして、ハチロクがここにいるのだ？」
1339 = "「八六，你怎麼會在這裡？」" 

# 【ハチロク】
# display as 八六
# JP: 「ナビに尋ねて――\nそうしたら、迎えにきて、送り届けてくれたのです」
1500 = "「我問了Ｎａｖｉ少爺您在哪——於是Ｎａｖｉ就送我到這來接您」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1628 = "「這樣啊」" 

# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;をつなぎ合えるせいなのか。\n\x%l共感;#00ffc040;共感%l;#;を重ねるそのことで、お互いを理解しあうのか。
2345 = "是因為她和Ｎａｖｉ之間存在著\\x%l共感;#00ffc040;共鳴%l;#;嗎。是因為她們之間不斷的\\x%l共感;#00ffc040;共鳴%l;#;，得以讓她們互相理解了嗎。" 

# monologue
# JP: いつの間に、ハチロクはナビとも仲良くなったと――\nどこか、ぼんやりと感じてる。
2477 = "總感覺——她們倆不知不覺間變得要好了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様がずいぶん先行されていると脅されていたので。\n急ぎ足で来たら、予想よりずっと早くに追いつけました」
1681 = "「Ｎａｖｉ嚇我說您已經出發許久了。我趕緊跑了過來，結果沒過多久就追上了您，比我預想的還要快」" 

# monologue
# JP: 少しおどけてそういって、\nハチロクが不器用に笑ってくれる。
2027 = "八六稍顯風趣地如此說完後，笨拙地笑了。" 

# monologue
# JP: 笑顔が嬉しい。\n体に、心に、あたたかなものが戻ったようで、ほっとする。
2116 = "她笑得真開心。我感覺心靈和身體都慢慢恢復了溫度，鬆了一口氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「残念ながら、先行するほど進めなかった。\n戻ったり、止まったりしてしまったのでな」
1609 = "「讓你失望了啊，我明明提前出發了，但卻沒走多遠。誰叫我一下走、一下停、一下又回頭呢」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、そうだったのですか」
1411 = "「啊，原來如此」" 

# monologue
# JP: 真似して少しおどけてみれば。\nハチロクはまた、笑ってくれる。
2231 = "我學著她開了個玩笑，結果再次見到了她的笑容。" 

# monologue
# JP: 一言、一言。\n交わす言葉が、体の芯に温かなものを与えてくれる。
2201 = "我一句，她一句。我們之間的每一句話，都帶給了我溫暖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、おかげで助かった」
1260 = "「不過，你幫了我大忙」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――」
1403 = "「啊——」" 

# monologue
# JP: ごく何気なく出てきた一言。
2275 = "我沒有多加思考地隨口一說。" 

# monologue
# JP: 考えもなく零してしまった一言に、\nけれど、ハチロクがぎくりと固まる。
1947 = "但是這句話，引得八六僵住了身體。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　ハチロク」
1489 = "「怎麼了？八六」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ――わたくし。\n……恐らくは、“そのこと”で、ここに来たのです」
1393 = "「呃不——我……恐怕是為了“那件事”才來到這裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1676 = "「！」" 

# 【ハチロク】
# display as 八六
# JP: 「お伺いして、大丈夫でしょうか？\nさきほどは……その……ひどい、ご様子に見えましたが」
1382 = "「可否容我多嘴詢問？剛才……那個……我看見您很難受的樣子……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ああ」
1020 = "「——啊」" 

# monologue
# JP: 不安気な声、気遣う表情。
2114 = "她的表情和聲音中充滿了不安與擔憂。" 

# monologue
# JP: ならば、僕の様子は本当にひどく。\nハチロクの言う“そのこと”は、正鵠を射ることだろう。
2456 = "看樣子，剛才我的樣子的確很糟糕。看來她猜的“那件事”，完全正中紅心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕ならば、大丈夫だ。どころか、むしろ――\n話してしまったほうが、スッキリできるかもしれん」
1504 = "「我沒事。倒不如說——把其中的緣由說出來的話，反而能讓我放鬆一些吧」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら……」
1525 = "「既然如此……」" 

# monologue
# JP: ハチロクの目が僕を見る。\nまっすぐ、強く――僕を見る。
2025 = "八六的雙眼看著我。她的目光——直勾勾地看著我。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様に、お伺いさせていただきます。\n何故、双鉄様が――」
1640 = "「那就容我多問幾句。為何雙鐵少爺——」" 

# monologue
# JP: 瞳が、一瞬ゆらいでしまう。
2109 = "她的目光一瞬間掠過一縷不安。" 

# monologue
# JP: 喉に声が、べたりと張り付きでもしたかのように、\n整った顔が、わずかに歪む。
2117 = "她精緻的五官稍稍擰在了一起，就像想要說的話卡住了喉嚨一樣。" 

# 【ハチロク】
# display as 八六
# JP: 「何故、双鉄様が――\n『鉄道事故を恐れている』かを」
1571 = "「為何雙鐵少爺——會說自己“害怕鐵路事故”……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1421 = "「嗯」" 

# monologue
# JP: 頷く。\nそれだけで、言葉が勝手に喉を出て行く。
2313 = "我點了點頭，話語不受控制地脫口而出。" 

# 【双鉄】
# display as 雙鐵
# JP: 「理由は、極めて単純だ。\n僕も――鉄道事故の被害者なのだ」
1578 = "「理由其實很簡單。我——曾經是鐵路事故的受害者」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 1676 = "「！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「十年以上も昔のことだ。両親と、僕と、ふたごの妹と。\n鉄道旅行を、家族で楽しむ計画だった」
1649 = "「那是十多年前的事了。那時候，我、我的父母、還有我的雙胞胎妹妹，打算一家人一起去享受鐵路旅遊」" 

# monologue
# JP: どこへ行こうとしていたのかも、思い出せない。
2237 = "我已經記不起當時我們要去哪裡。" 

# monologue
# JP: そんな細かなことまでは、\n最初から聞かなかったのかもしれない。
1916 = "也許我從一開始就沒有問到底要去哪裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ＳＬに乗れるということが、僕らには楽しみで楽しみで。\n楽しみ過ぎて眠れなくなって、当日、そろって寝坊した」
1652 = "「那時候我們對乘坐蒸汽機車滿懷期待。期待得都睡不著覺，弄得當天全都睡過了頭」" 

# monologue
# JP: ああ、そうだ。あの日は、僕も寝坊をしていたんだ。
2070 = "啊，對啊。那天我也睡懶覺了。" 

# monologue
# JP: でも、路子よりほんの数分早く起きて――\nだから寝坊の責任を、路子ひとりに押し付けた。
1912 = "不過，那天我比路子要早起幾分鐘——於是我把睡懶覺的責任都推脫到了路子身上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おかげで、楽しみにしていた機関車を見ることもなく、\n大慌てで乗り込んで――それでも、旅行は楽しかった」
1427 = "「因為起床晚了，弄得我們原本期待的機車都沒來得及看多幾眼就上了車——儘管如此，旅行一路還是很快樂」" 

# monologue
# JP: 父さんがたくさん、話してくれた。\n母さんはにこにこ笑ってた。
2420 = "父親一路跟我說了很多。母親則是在一旁笑眯眯地看著我們。" 

# monologue
# JP: 路子はもちろん、となりに座って――\n旅をしていて、いつもどおりで……幸せだった。
2547 = "路子當然是坐在我旁邊——我們在旅途上，和往常一樣……沉浸在幸福當中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「やがて、父が教えてくれた。もうすぐ冨士が見えると。\n鉄橋の上から、綺麗な冨士を眺められると」
1564 = "「沒過多久，父親告訴我，馬上就能看見富士山了，只要列車開上鐵橋就可以一覽富士山的美麗風景」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！？」
1679 = "「！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、\x%l列車;#00ffc040;列車%l;#;は、台風の中に突っ込んでしまった。\nひどく揺れ、乗客は騒ぎ、路子は――僕も、怯えた」
1293 = "「但是，後來\\x%l列車;#00ffc040;列車%l;#;一頭衝進了颱風之中。車身劇烈地搖晃，乘客們都慌了，路子很害怕——我也一樣」" 

# monologue
# JP: ああ、そうだ。\n路子ひとりが怯えるなどは、ありえなかった。
2342 = "是啊，怎麼可能只有路子一個人害怕。" 

# monologue
# JP: 僕も怯えた。ふたごの路子と等しく怯えた。\nだからそれを、少しでも和らげたくて、動いてしまった。
2599 = "那時候的我和路子一樣害怕。所以我為了紓解心中的恐懼，採取了行動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は――怖くて。とても、じっとしていられなかった。\nそれで……両親の制止も聞かず――先頭車輌に」
1515 = "「我那時——害怕得不行。根本不敢站在原地不動。於是……我不顧父母的阻止——走向了前方的車廂」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様を被害者にしたその事故は――\n[ふじがわきょうりょう,4]冨士川橋梁の手前で、発生したものですか？」
1663 = "「雙鐵少爺遭遇的那場事故——莫非就發生在富士川橋樑之前？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1421 = "「嗯」" 

# monologue
# JP: 探偵めいた言葉に一瞬驚かされてしまうが、\nすぐ、「当然か」と思い直す。
2202 = "我一瞬間為她宛如偵探般的話而震驚，不過我馬上轉念一想，這也難怪。" 

# monologue
# JP: \x%l帝鉄;#00ffc040;帝鉄%l;#;末期に鉄道事故がどれほど多発したといえ、\nあれはきっと……相当のレアケースに違いないから。
2156 = "就算\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;末期鐵路事故頻發，但是那場事故……一定算是非常嚴重的個別案例。" 

# 【双鉄】
# display as 雙鐵
# JP: 「脱線・転覆にも関わらず、被害者は、とても少なかった。\n大人二名、子供一名……死者は、わずかに、三名だった」
1326 = "「儘管發生了列車脫軌傾覆，但是受害者非常少——遇難者僅有三名……其中兩名成人，一名兒童」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！？」
# 1678 = "「！！？」" 

# monologue
# JP: なのに、ハチロクは硬直する。\nいや、その全身は、さっきからずっと強ばっていた。
2058 = "可是，八六卻變得渾身僵硬。不，她的身體從剛才開始就已經是這副樣子了。" 

# monologue
# JP: ただ――顔から表情の全てが消えるまで、\n僕にはそうと、まるきり気づけてなかっただけだ。
2052 = "只是——在表情從她臉上徹底消失之前，我都完全沒有注意到而已。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が移動を――先頭車輌に向かわなければ……\n死者数は、ゼロで済んでいたのかもしれん」
1448 = "「如果——我沒有走去前方車廂的話……可能就不會有人遇難了」" 

# monologue
# JP: 内心深くで思っていても――\n口には、出せずに、いた言葉。
2583 = "這句話一直藏在我的內心中——從來沒有從口中說出過。" 

# monologue
# JP: それを素直に、口にしている。\nそうしなければいけないと強く感じている。
2425 = "現在我毫不保留地說了出口。我潛意識裡告訴自己我必須要說出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あれは――本当に事故だったのだ」
1638 = "「那——真的只是一場事故」" 

# monologue
# JP: 理屈としてはわかってたこと。\n幼い頃に出会った少女が、教え諭してくれたこと。
2084 = "在我年幼之時遇到的某位少女，教會了我這樣一個道理。" 

# monologue
# JP: それを今、心の底から本当だったと痛感している。\n事故などは――そうだ、事故などは。
2128 = "如今，我對這個道理有著切膚之痛。所謂的事故——對，所謂的事故。" 

# 【双鉄】
# display as 雙鐵
# JP: 「事故など、誰が。\n起こしたくて、起こすものか」
1270 = "「事故——怎麼可能是有人故意引發的」" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ――双鉄様――いいえ」
1250 = "「不——雙鐵少爺——不是那樣的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
# 1679 = "「！？」" 

# monologue
# JP: ハチロクが、じりじりと後ずさっている。\nいけない、今ここで離れては。
1995 = "八六一點一點向後退。不好，不能讓她離開我。" 

# monologue
# JP: 思うのに、僕の両足は釘付けられてる。\n全身が、わなないてしまって動けないでいる。
1991 = "儘管我心中這麼想，但是我的雙腳像是被釘在地上了一樣。我的全身不停地打冷顫，沒辦法移動半步。" 

# 【ハチロク】
# display as 八六
# JP: 「あの事故は――\n冨士川橋梁崩落に伴う、[ハチロクニイマル,3]8620脱線・転覆事故、のみは」
1375 = "「只有那場事故——緊隨富士川橋樑坍塌發生的，８６２０脫軌傾覆事故是個例外」" 

# monologue
# JP: 他人ごとのように聞いている。\nああ、あの事故には、そんな名前がつけられたのか、と。
2242 = "我彷彿事不關己一般，一邊聽她說一邊想“啊，人們是用這個名字來稱呼那場事故的啊”。" 

# monologue
# JP: 事実を、認識できている。疑いの余地も感じていない。\nなのに、感覚と現実が、うまく、つながり合ってくれない。
2295 = "我知道這是事實。沒有絲毫質疑的餘地。但是，我的感覺和現實並沒有很好地串聯在一起。" 

# 【ハチロク】
# display as 八六
# JP: 「あれは――わたくしの起こしてしまった事故なのです。\n崩落をした鉄橋に、突っ込むよりもましと考え――」
1542 = "「是我——導致了那場事故的發生。我那時認為採取這個行動比讓列車駛下坍塌的鐵橋要好——」" 

# monologue
# JP: そうだったのかと、聞いている。\n当事者の声を、思いがけずに、聞けている。
2205 = "我一邊聽，一邊心想“原來是這樣”。想不到能聽到當事者的聲音。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは――意図的な\x%l脱線転覆;#00ffc040;脱線転覆%l;#;を進言し。\n結果……結果――双鉄様の、ご家族を――」
1543 = "「是我——是我提議要主動使列車\\x%l脱線転覆;#00ffc040;脫軌傾覆%l;#;。結果……結果——導致雙鐵少爺的家人——」" 

# monologue
# JP: ハチロクの唇が結ばれる。
2008 = "八六將嘴唇抿了起來。" 

# monologue
# JP: ゆるゆる、力なくほどけ――\nそして言葉が、苦しく、吐かれる。
2412 = "然後她的雙唇慢慢地失去了力氣——痛苦的話語從她口中傾瀉而出。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし、が――死な、せ、て――」
1540 = "「是我——害死了他們——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクっ！！！」
1337 = "「八六！！！」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
1677 = "「！！！」" 

# monologue
# JP: 駆け出す。ハチロクが脱兎のごとく。\n追わないでくれと――それすら言わずに。
2014 = "八六扭頭就跑，連“不要來追我”——這句話都沒說出口。" 

# monologue
# JP: 小黒い森に飲み込まれていく後ろ姿を、\nけれども僕は――追えないでいる。
2292 = "我眼看她小小的背影融入幽暗的森林中，但是我——並沒有追上去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ……あっ――くそっ」
1406 = "「啊……啊——可惡」" 

# monologue
# JP: 自問している。そんな場合じゃないと、知りつつ。\n思考がぐるぐる渦巻いて、ただ一点から抜けだせずにいる。
2610 = "雖然我知道現在不是做這種事的時候，但我還是在心中責問自己。思緒像漩渦一樣不停旋轉，無法擺脫某個中心點。" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;が事故車輌と知って、\nハチロクが、鉄道事故を起こした\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だと知って。
2464 = "知道了那時發生事故的列車就是\\x%l8620;#00ffc040;８６２０%l;#;，也知道了八六是導致這場事故的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。" 

# monologue
# JP: （どうして、僕は……“どんな事故か”を\nただの一度も、気にしようとさえ、しなかったのか）
2648 = "（為什麼，我從來都沒有去了解八六遭遇的……是“怎樣的事故”）" 

# monologue
# JP: 思考の渦は、ただ一点に収束していく。\nその他には、可能性さえも思いつけない。
2284 = "我混亂的思維逐漸收斂到一點。我覺得，除此之外不會有別的可能。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……くそ。\nそう、だったのか」
1410 = "「啊啊……可惡。原來，是這樣」" 

# monologue
# JP: 偶然ではなく、必然だった。\nこの状況も、僕の逃避も。
1910 = "不管是現在我狼狽的樣子，還是我逃避的行為，都不是偶然，而是必然。" 

# monologue
# JP: それをようやく理解して。その現実と向き合って。\nだから、僕は――
2297 = "我終於理解了這一點，抬起頭決定面對現實。所以我要——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……追い、かけるんだ――進むんだ」
1068 = "「……我得追上她——我得向前走」" 

# monologue
# JP: わかっている。\nわかっているのに、動けない。
1990 = "儘管我已經下定決心，但仍然無法挪動身體。" 

# monologue
# JP: 体が、わななき続けている。\n立っているだけで精一杯で――
2561 = "身體還在不住顫抖。僅僅是站起來就已經是極限了——" 

# monologue
# JP: （ぽっ――ぽっ）
2639 = "（啪嗒——啪嗒）" 

# monologue
# JP: 頬に冷たい何かが当たり、\n見る見る、それは雨になる。
2357 = "有什麼冰冷的東西打到了臉上，轉眼間就下起了雨。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1407 = "「啊」" 

# monologue
# JP: 冷える。強張りがわずかに緩む。\n少し、動く。動く――動けるようになる。
2218 = "我冷靜下來了。僵硬的身體得以稍稍放鬆。我一點一點向前移動——慢慢開始可以挪動身子。" 

# monologue
# JP: 僕を戒めていた雨を、\n御一夜の雨が、洗い流してくれたかのように。
2584 = "這場御一夜的雨，彷彿洗去了那場一直將我束縛的雨。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク――」
1327 = "「八六——」" 

# monologue
# JP: ならば、歩こう。\n一歩ずつでも、前へと、進もう。
2337 = "既然這樣，那就出發吧。哪怕是一步一步挪動，我也要向前走。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
1331 = "「八六」" 

# 【ハチロク】
# display as 八六
# JP: 「……双鉄様」
1079 = "「……雙鐵少爺」" 

# monologue
# JP: 探すほどもなく、再び出会う。\n雨のそぼふる、森浅く。
2384 = "沒用多久，我就找到了她。她沒有走到森林深處，雨也還在淅瀝地下著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よかった――戻ってきてくれたのだな」
1436 = "「太好了——你回來了」" 

# 【ハチロク】
# display as 八六
# JP: 「逃げ出したところで――\nわたくしは、どこにも行けませんので」
1476 = "「就算我要逃走——我也無處可去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1038 = "「…………」" 

# monologue
# JP: どこにでも行ける。お前が本当に望むのならば。\n――そう思う。
2250 = "我心想——明明只要你願意，你哪都可以去。" 

# monologue
# JP: 思うが言えば、ハチロクを失ってしまう気がして、\nうまい言い方を思いつけない。
1941 = "但是如果我這麼說，總感覺八六就會離我而去，所以我找不到合適的表達方法。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは――」
1490 = "「我——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。お前は――誰も死なせてなどいない」
1329 = "「八六。你——沒有害死任何人」" 

# 【ハチロク】
# display as 八六
# JP: 「いいえっ！？」
1261 = "「不！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「聞いてくれ、ハチロク」
1333 = "「八六你聽我說」" 

# monologue
# JP: いや――僕にとっての“うまい言い方”を見つけたとても、\nどう伝わるかわからない。
1899 = "不——就算我想到了對我而言的“合適的表達方法”，我也不知道應該怎麼向她開口。" 

# monologue
# JP: それが怖い。\n言葉も、怖い――産まれて初めて、痛感している。
2080 = "因為要和她說這些實在是令我害怕。長這麼大——第一次深感語言的可怖之處。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……僕は、ずっと疑問に思っていたんだ」
1070 = "「……我的腦中，一直有一個疑問」" 

# monologue
# JP: しかし竦めば、ハチロクは自らを責め続ける。\nだからただ、思いつくままを口にしていく。
1938 = "但是如果我畏縮不言，八六肯定會一直自責下去。所以，我把我的想法直接說了出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道史を知れば知るほど、不思議に思った。\nなぜ、[たいと,1]汰斗さんが[ハチロクニイマル,3]8620とお前とを引き取ったのか」
1469 = "「對鐵路歷史了解得越多，我就越覺得不可思議。為什麼汰斗老爺會把８６２０和你給收留了下來」" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1038 = "「…………」" 

# monologue
# JP: ハチロクは何も言わない。\n反論しない。
1999 = "八六什麼也沒說，也沒有反駁。" 

# monologue
# JP: 当然、理解しているだろうし――\nあるいは自身も、疑問視していたのかもしれない。
2119 = "她肯定已經有所理解——又或者說，連她自己都在懷疑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大廃線の末期には、ほとんどの車輌が[いき,1]遺棄された。\n希少なトップナンバー機さえ、その例外とならなかった」
1429 = "「在大廢線時代末期，絕大多數的列車都被廢棄。連屈指可數的首車都未能倖免」" 

# monologue
# JP: 例えば、ハチロクが言及していた、\x%l6200;#00ffc040;6200%l;#;。
2368 = "比如，八六曾經說過的\\x%l6200;#00ffc040;６２００%l;#;。" 

# monologue
# JP: レアリティと観光価値とで考えるなら、\n\x%l6200;#00ffc040;6200%l;#;と\x%l8620;#00ffc040;8620%l;#;は、ほぼ同等なのではなかろうか？
2362 = "根據稀有度和觀光價值來考慮，\\x%l6200;#00ffc040;６２００%l;#;和\\x%l8620;#00ffc040;８６２０%l;#;不是應該幾乎平起平坐的嗎？" 

# 【双鉄】
# display as 雙鐵
# JP: 「選ぼうと思えば、どんな車輌も選べた筈だ。\nなのに何故、汰斗さんは――事故車輌の[ハチロクニイマル,3]8620を選んだか」
1451 = "「如果他願意，應該可以任意選擇車輛。但是，為什麼汰斗老爺他——偏偏選擇了８６２０這輛事故車輛」" 

# monologue
# JP: その上、塩漬けにしてしまった。
1913 = "並且一直保存著。" 

# monologue
# JP: 改修資金がどの程度必要であったかなど、\n\x%l帝鉄;#00ffc040;帝鉄%l;#;勤務をしていた汰斗さんには、見通せていたろうに。
2350 = "曾經在\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;工作的汰斗老爺不可能不知道需要花費多少資金來維修它。" 

# 【ハチロク】
# display as 八六
# JP: 「それ、は」
1651 = "「那是因為」" 

# monologue
# JP: 苦しげに出るハチロクの言葉には、\nしかし、いくらかの温度が戻っている。
2022 = "八六的聲音中夾雜著痛苦的音色，但是其中又恢復了幾分溫度。" 

# monologue
# JP: 現実的なこと、今のこと、\nそれを考えている間は、過去から意識を外しておける。
2087 = "在考慮著現實和現狀的期間，她的注意力不再集中在過去。" 

# 【ハチロク】
# display as 八六
# JP: 「……事故車輌なら、ただ同然に――\n――ああ……いえ」
1052 = "「……事故車輛幾乎不要錢————啊……不對」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ならば、九洲や四國から引き取ればいいんだ。\nわざわざ帝都からの移送コストをかけることはない」
1420 = "「嗯。那麼從九州或者四國認領不就好了，何必費心傷財將你從帝都運送過來」" 

# monologue
# JP: 御一夜を、どころか、隈元、九洲を代表する酒、\nクマ焼酎。
2607 = "隈燒酒不僅是代表御一夜，甚至代表了隈元與九州。" 

# monologue
# JP: その古くからの蔵元を、右田の家を、\n傾けてしまうほどの、大きな散財。
2483 = "而那筆巨大的開銷甚至耗空了歷史悠久的釀酒廠，乃至整個右田家。" 

# 【双鉄】
# display as 雙鐵
# JP: 「コスト面を、汰斗さんはあえて度外視した。\n借金をしてまで御一夜に、お前と、\x%l8620;#00ffc040;8620%l;#;と――」
1562 = "「汰斗老爺已經把金錢開銷置之度外。不惜借錢——將你和\\x%l8620;#00ffc040;８６２０%l;#;接到了御一夜——」" 

# monologue
# JP: 言って、気づく。
2522 = "話剛出口，我就注意到了。" 

# monologue
# JP: そうなのだ。\nその意味では――僕らは全て、同じなのだと。
2043 = "原來是這樣啊。在這個層面上——我和她是完全一樣的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そして、僕とを引き取った。\nあの事故の……いうなれば、被害者たちを」
1524 = "「於是，我和你一起被收養了。同樣身為那起事故的……受害者」" 

# 【ハチロク】
# display as 八六
# JP: 「被害、者……」
1373 = "「受害者……」" 

# monologue
# JP: 僕の言葉を繰り返し、\nハチロクは、ゆるゆると力なく首を振る。
2124 = "她重複了一次我的話，然後無力地慢慢搖頭。" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ……いいえ。双鉄様は――\nあるいは[ハチロクニイマル,3]8620も、確かに被害者でございましょうが――」
1252 = "「不……不是這樣的。雙鐵少爺——還有８６２０，雖然從某種意義上說都是受害者，但是——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「違うぞ、ハチロク」
1302 = "「你想錯了，八六」" 

# monologue
# JP: ただひとりの加害者ならば――むしろ、僕。\n言いたい気持ちをグっと抑える。
2139 = "如果要說確實有加害者存在的話——那個人應該是我。但是我忍住這句話沒有說出口。" 

# monologue
# JP: ハチロクをもう、泣かせたくない。\nまず僕が前を向き示さねば、ハチロクの顔もあがらない。
2234 = "我已經不想再讓八六哭泣了。我得讓她看到我積極的一面，不然沒辦法讓她振作精神。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前の下した判断は――\n最悪の被害を、未然に食い止めたのだ」
1426 = "「因為你的決策——才沒有造成更慘重的後果」" 

# monologue
# JP: 冨士川橋梁が崩落し、\x%l8620;#00ffc040;8620%l;#;は走っていた。\nそのままだったら、崩落した鉄橋に突っ込んでいた。
2600 = "那時富士川橋樑已經坍塌，而\\x%l8620;#00ffc040;８６２０%l;#;在全速前進。如果不採取措施，列車就要駛下坍塌的橋樑。" 

# monologue
# JP: 台風で荒れ狂う川に落ちれば――\n乗員も、乗客も、全員が死亡していただろう。
2514 = "要是列車落入了颱風中湍急的河水裡——不管是乘客還是車組成員，都將無一倖免。" 

# 【双鉄】
# display as 雙鐵
# JP: 「被害を最小に食い止めたのは、\nお前の判断だったのだ」
1431 = "「多虧你的決策，才得以把受害規模控制到最小」" 

# monologue
# JP: 被害はあるいは、ゼロであったのかもしれない。\n僕が、動いたりしなければ――
2135 = "如果我沒有擅自走動的話——也許真的能做到零傷亡。" 

# monologue
# JP: 状況を理解できた今、後悔は鋭さを増し心を刻む。\nけれども痛みを、前を向くことで無視し続ける。
2191 = "想到這，後悔就像尖銳的針，不停刺痛我的心。但我逼著自己向前看，以此掩蓋心中的痛苦。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク。僕が認めよう」
1340 = "「八六，我認同你所做的一切」" 

# monologue
# JP: 手を、伸ばす。\n震わせないよう、普段どおりにと全神経を集中させて。
2225 = "我向八六伸出手。我集中所有的注意力，讓手不至於發抖。" 

# monologue
# JP: ハチロクは、まったく動かない。\n僕の手を、今度は避けようとはしない。
2004 = "八六她一動不動。這次，她沒有逃避我伸出的手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前は、間違ったことをしていない。\nお前の下した判断は、正解だった」
1300 = "「你並沒有做錯。你的判斷是正確的」" 

# 【ハチロク】
# display as 八六
# JP: 「お言葉は……とても、ありがたく存じます。\nけれど――」
1673 = "「非常感謝您……說出這番話。但是——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんも――恐らく、同じように考えたのだろう。\n『自分が、ただ一人の加害者なのだ』と」
1561 = "「汰斗老爺——八成想得和我一樣。“我是事故中唯一的加害者”」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！？」
# 1679 = "「！？」" 

# monologue
# JP: ハチロクが、ハっと息を呑む。\n僕の話を聞いてくれる――思えば、言葉にも力がこもる。
2016 = "八六深吸了一口氣。看她能將我的話聽進去——我說話都有了底氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが。そうではない。\n汰斗さんも、また、加害者ではない」
1290 = "「但是，事實並非如此。汰斗老爺也不是加害者」" 

# monologue
# JP: 今を逃せば、またドアが閉まる――\n直感するから、必死になって考える。
2206 = "我下意識感覺到——如果我錯過了這個機會，她的心扉又會再次關上。所以我絞盡腦汁組織著語言。" 

# monologue
# JP: ハチロクの、感情的な反発・否定を引き起こさずに、\n最後まできちんと聞いてもらえる、伝え方を。
2248 = "我得想一個不會激起她牴觸情緒的表達方法，好讓她聽我把話說完。" 

# 【双鉄】
# display as 雙鐵
# JP: 「電気が――[ひのもと,2]日ノ本に急速に普及していった。\nその時期の、石油ランプの業者が例えば、あるとする」
1281 = "「以前，電燈——在日本迅速普及。就拿那時候的石油燈工作者為例」" 

# 【ハチロク】
# display as 八六
# JP: 「……はい」
1063 = "「……嗯」" 

# monologue
# JP: 不思議そうな顔ひとつせず、\nハチロクはただ、頷いてくれる。
2030 = "八六隻是點了點頭，臉上沒有一絲疑惑。" 

# monologue
# JP: 電気は\x%lエアクラ;#00ffc040;エアクラ%l;#;、ランプは鉄道。\nその例えだと、恐らく察してくれたがゆえに。
2617 = "電燈相當於\\x%lエアクラ;#00ffc040;空凝機%l;#;，石油燈就相當於鐵路。之所以選擇這個例子，是因為我覺得她應該能理解當中的含義。" 

# 【双鉄】
# display as 雙鐵
# JP: 「誰もが電気に親しんで、ランプの需要が激減し、\n部品の調達さえも難しくなった……そんなころだ」
1672 = "「電燈普及以後，所有人喜歡上了它，導致石油燈的需求量急劇減少，就連零件供應都變得稀缺……」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1421 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いつものようにランプが灯され――\nしかし、地震が起きてしまった」
1587 = "「石油燈就像以往一樣被點亮——但是，突然有一天發生了地震」" 

# monologue
# JP: そう、あれはそうした事故だった。
2386 = "沒錯，這就是一場事故。" 

# monologue
# JP: 自然現象が発生させた――\nただそれだけの、事故だったのだ。
1976 = "僅僅是一場由自然因素引發的事故。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ランプは心を持っていた。だから懸命に努力した。\n『このまま落ちれば、すぐに延焼を呼んでしまう』と」
1588 = "「石油燈擁有心靈。所以它拚命堅持，心想“如果就直接掉下去，肯定會燒起一片大火”」" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
# 1038 = "「…………」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だからランプは我が身を揺らし、燃えにくい場所に\n落下した。結果、延焼は防がれた。が――」
1520 = "「所以石油燈自己搖了搖身子，掉到了不容易著火的地方。結果，成功防止了火焰蔓延，但是——」" 

# 【ハチロク】
# display as 八六
# JP: 「被害者が……それでも、出てしまったのですね」
1325 = "「儘管如此……還是存在受害者」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1565 = "「沒錯」" 

# monologue
# JP: その被害者は、妹と家族の手を引いて、\nのこのこと火に、飛び込んでいったバカものだ。
2593 = "那個受害者，就是我這個牽著妹妹和家人的手，盲目衝進火中的蠢材。" 

# monologue
# JP: 何度でも湧く自責を幾度でも噛み潰す。\n僕が僕を責めればそれは、またハチロクをも責めてしまう。
2268 = "我數次將泛起的自責咽回腹中。如果我就此自責，那也就意味著我在責怪八六。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、近隣への延焼は防がれた。\n[あまた,1]数多の被害を、ランプの決断は食い止めたのだ」
1296 = "「但是，這樣就防止了火勢蔓延到周圍。石油燈的決定拯救了多數的潛在受害者」" 

# 【ハチロク】
# display as 八六
# JP: 「だからといって――\n被害者が出てしまったことには、変わりありません」
1478 = "「就算是這樣——也不能否認出現了受害者的事實」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。僕らは、決してその過去を変えられない」
1305 = "「你說得對。我們肯定沒辦法改變過去」" 

# monologue
# JP: そうかと、思う。\n汰斗さんは、だから僕に、きっと教えてくれたのだ。
2150 = "對啊，所以汰斗老爺才會那樣教育我。" 

# monologue
# JP: 僕と、ハチロクと、\x%l8620;#00ffc040;8620%l;#;に――\nきっと、伝えたいと願ったがゆえ。
2579 = "這一定是他想要傳達給我、八六和\\x%l8620;#00ffc040;８６２０%l;#;的訊息。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だが、過去を糧とし、前へと進むことは出来る。\n僕はそう教わって、そのようにしてきたつもりだ」
1522 = "「所以，只要我們以過去為鑑，就能向前進步。汰斗老爺這樣教育了我，我也是這麼做的」" 

# 【ハチロク】
# display as 八六
# JP: 「過去を――繰り返さぬため、ですか」
1570 = "「為了不再犯和過去相同的錯誤嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それもある。これほど、直接的な形になるとは、\n夢にも思っていなかったがな」
1267 = "「也有這層意思。我做夢都沒有想到會以如此直接的形式知道」" 

# monologue
# JP: 皮肉のようで、必然だ。\n思えば自然に、抜けたような笑いがこぼれる。
2585 = "這很像是諷刺，但也是必然的結果。想到這，我不自覺地展露出了笑容。" 

# monologue
# JP: つられ、ハチロクも小さく笑う。\n自嘲にまみれ力なく――それでも、笑いはやはり笑いだ。
1997 = "八六也跟著我一起微微笑了。她的笑容略顯無力，夾雜著幾分自嘲——但是她確實笑了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「事故を悔やんで立ち止まっても、\n被害者は、まったく報われまいよ」
1480 = "「就算止步不前，因為事故而自怨自艾，受害者也不會得到補償」" 

# monologue
# JP: 自分自身に、誰より強く言い聞かせる。\n良く見る夢を、思い出す。
2355 = "最應該聽這句話的人，就是我自己。我想起了我時常做的夢。" 

# monologue
# JP: 『終着駅に』と、路子が望む……\nそれは、おそらくこういう意味だ。
2546 = "路子期盼著“到達終點站”……說不定就是這個意思。" 

# 【双鉄】
# display as 雙鐵
# JP: 「同じ傷を、もう誰にも負わせないようにしなければ。\nそうすることが、生き残った者の――最善だと僕は思う」
1497 = "「我們不能再讓人們承受同樣的痛苦。我覺得對於生還者來說——這是最好的選擇」" 

# 【ハチロク】
# display as 八六
# JP: 「であるのならば――わたくしたちを、\nこのまま眠らせてしまった方が良いのでは？」
1528 = "「既然這樣——那我們豈不是就這樣沉睡過去更好？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
# 1678 = "「！！？」" 

# monologue
# JP: まるきり、頭になかった発想。\nそれを、ハチロクに突きつけられる。
2007 = "八六將一個我從來沒有想過的思考角度展現在了我的面前。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l台枠;#00ffc040;台枠%l;#;を損傷したものを無理やり復旧されるより……\n別の手段で交通を確保し、観光を振興した方が」
1598 = "「與其強行將破損的\\x%l台枠;#00ffc040;車架%l;#;修好……不如用別的方式保證交通，振興御一夜」" 

# monologue
# JP: コスト、時間、今まで積み重ねてきたものたち。\nそれを白紙に戻すのならば、ハチロクの案には一理ある。
2505 = "若要將這一路走來的開銷、時間、付出的所有努力都化為一張白紙，八六的話確實有一定的道理。" 

# monologue
# JP: いや――それを白紙に戻す勇気を持つことこそが、\n僕らに出来る“教訓の活かし方”なのかもしれない。
1901 = "不——鼓起勇氣將這一切都化作白紙，也許正是我們“吸取教訓”的正確方式。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[ハチロクニイマル,3]8620を修復することは――単なるエゴ……か？」
1668 = "「難道……修復８６２０只是單純出於我的自我滿足？」" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を直したい、事故の傷から立ち直らせて、\n喜びの中、おもいっきりに走らせてやりたい――
2195 = "想要修好\\x%l8620;#00ffc040;８６２０%l;#;，想要從事故的陰影中走出來，想要帶著喜悅看著它行駛在鐵軌上——" 

# 【双鉄】
# display as 雙鐵
# JP: 「あるいは――僕は――\n自分自身の代償に…………」
1635 = "「還是說——我——想要犧牲自己來…………」" 

# monologue
# JP: 思ってしまえば、浮かされていたような熱が消え去る。\n現実が、べたりと肌に張り付いてくる。
2192 = "想到這，我大腦感到的炙熱彷彿被抽走了。只剩下冰冷的現實緊緊貼在我的肌膚上。" 

# monologue
# JP: ひどく、寒い。\n自覚はすぐに震えと代わり、祓えなくなる。
2125 = "好冷。認識到這一點的我，渾身止不住地顫抖。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様――っ！？」
1661 = "「雙鐵少爺——！？」" 

# monologue
# JP: ハチロクの手が伸びてくる。
2002 = "八六向我伸出了手。" 

# monologue
# JP: 僕に触れ、一瞬すくみ――\nそれから、ぎゅっと、強く、僕の腕を捕まえる。
2122 = "她觸碰到了我，一瞬間猶豫了一下——然後用力地緊緊抓住了我的手臂。" 

# 【ハチロク】
# display as 八六
# JP: 「すみません。わたくし、気が付かなくて――\nこんなに、冷えきってしまうまで」
1348 = "「十分抱歉。我沒注意到——少爺您的身體已經變得這麼冰涼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「気にするな。僕自身さえ気づかなかった」
1256 = "「不用在意。我自己都沒察覺到」" 

# monologue
# JP: 森に遮られているとはいえど、この雨だ。\n体が冷えぬわけが無い。
1992 = "儘管頭上有樹木的遮蓋，但這畢竟是在下雨，身體不可能不發涼。" 

# monologue
# JP: ただ冷えていると気づけぬほどに――\n僕は、なんらかの熱を帯びていた、それだけだ。
2054 = "只是因為，我的胸中有什麼在發熱——導致我沒有察覺到身體的冰冷而已。" 

# 【ハチロク】
# display as 八六
# JP: 「――とにかく、歩いて、ここを出ましょう」
1027 = "「——總之我們先走起來吧，先離開這裡」" 

# monologue
# JP: 唇がキュっと結ばれる。ハチロクの手が、僕を引く。\n引かれて、ようやく思い出す。
2298 = "我緊緊抿住雙唇。八六的手拉著我。被她這麼一拉，我便想起來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットに……[けんそく,1]検測を頼まれていたのだが」
1288 = "「但是波萊特……拜託我檢查線路」" 

# 【ハチロク】
# display as 八六
# JP: 「明日にでもまた行いましょう。\nわたくしもお手伝いいたします」
1531 = "「明天再來吧。明天我會跟您一起檢查」" 

# monologue
# JP: ハチロクが、強く僕を引く。\n立ち止まることを許さぬ強さに、泣きそうになる。
2018 = "八六用力地拉著我邁開步子，絲毫沒有讓我站在原地的意思，這不禁讓我有點想哭。" 

# 【ハチロク】
# display as 八六
# JP: 「明日も、あさってもその次の日も――\nわたくしたちは、乗務の予定を持たないのですから」
1530 = "「明天也好，後天也好，大後天也好——反正我們都沒有乘務排班預定」" 

# monologue
# JP: (ちゃぷん）
32 = "(撲通）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1408 = "「啊啊……」" 

# monologue
# JP: 湯の温かさが骨身に染みる。\n染みるが、心は冷えきっている。
2416 = "熱水的溫度滲透到了我的身子裡，儘管如此，我的心卻還是冷的。" 

# monologue
# JP: （エゴ……か）
2650 = "（自我滿足……嗎）" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;を\x%l台枠;#00ffc040;台枠%l;#;損傷から復活させる。
1969 = "修好\\x%l8620;#00ffc040;８６２０%l;#;破損的\\x%l台枠;#00ffc040;車架%l;#;。" 

# monologue
# JP: それが本当に御一夜にとっての最善なのか、\nわからなくなる。
2235 = "我已經不知道這樣做，對御一夜來說到底是不是最好的選擇。" 

# monologue
# JP: （\x%l8620;#00ffc040;8620%l;#;が復活すれば……\nハチロクも喜んでくれると、思ったのだが――）
2643 = "（我原以為只要\\x%l8620;#00ffc040;８６２０%l;#;恢復運行……八六就能高興起來——）" 

# monologue
# JP: が、覆い隠してた傷口を、生血が出るまで広げてしまった。
2474 = "結果，我一不小心把她一直藏著的傷口揭開了個洞，血流如注。" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の復活は、ハチロクにとっては、\n忘れ得ぬ痛みを見せつけられるだけのことかもしれない。
2525 = "讓\\x%l8620;#00ffc040;８６２０%l;#;重獲新生，這對八六來說或許只是將她無法忘卻的傷痛再次擺在她眼前。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なぁ、ハチロク」
1334 = "「八六啊」" 

# monologue
# JP: 言葉を選ぶ余力も無いから、\nただただ、浮かんだままに聞く。
2288 = "我現在已經沒有選擇合適的言語的餘力，只是想到什麼就問她什麼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;を、仮にこのまま廃車にしたら……\nお前は、それからどうするつもりだ」
1445 = "「如果\\x%l8620;#00ffc040;８６２０%l;#;真的被徹底廢棄了……你以後打算怎麼辦」" 

# monologue
# JP: ちぷ、と小さな小さな水音。\n長い沈黙。
2397 = "浴池中傳來“嘩啦”一聲水聲。接著是長時間的沉默。" 

# 【ハチロク】
# display as 八六
# JP: 「どう、とおっしゃられても……」
1473 = "「就算您問我要怎麼辦……」" 

# monologue
# JP: やがて、ゆるゆるとした言葉が届く。
2473 = "終於，她緩緩地開口。" 

# 【ハチロク】
# display as 八六
# JP: 「\x%l8620;#00ffc040;8620%l;#;が廃車になるなら、わたくしも一緒に――」
1447 = "「如果\\x%l8620;#00ffc040;８６２０%l;#;被廢棄，那我也一起——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「馬鹿な。そのようなことは僕が許さん」
1605 = "「說什麼傻話。我不會允許的」" 

# 【ハチロク】
# display as 八六
# JP: 「っ」
1391 = "「呃」" 

# monologue
# JP: さっきより少し強い水音。
2098 = "她動了動身子，這次發出的水聲比剛才更加響亮。" 

# monologue
# JP: それがどういう意味合いなのか――\n目を向けようとは、今は、なぜだか思えない。
2595 = "那其中到底蘊含著什麼意義——現在的我，不知為何並不想看向八六那邊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうすれば、お前は自由になるのだ。\n自由になったら、何をしたいか、聞かせて欲しい」
1654 = "「那樣一來，你就自由了。我想知道，你自由以後會想要做什麼」" 

# monologue
# JP: 言って、すぐ、\nまずい質問をしてしまったかと、不安にかられる。
2041 = "剛說完，我馬上就覺得我這個問題問得真不是時候，不由感到了一絲不安。" 

# monologue
# JP: “希望を話せ”という僕の“希望”は、\nハチロクを不安定にしたと、聞かされたのに――
2101 = "她明明才告訴我，正因我讓她“說出心中的希望”，才使她陷入了不穩定的狀態——" 

# 【ハチロク】
# display as 八六
# JP: 「そのように、もし、なりましたら――」
1459 = "「如果那一天到來的話——」" 

# monologue
# JP: だが、ハチロクの口調に咎めるような調子は無い。
1934 = "但八六的語調並不像是要責備我。" 

# monologue
# JP: ただただ、僕の声と同様に、\n疲れきってる気だるさだけが、漂っている。
2111 = "她的聲音和我一樣，充滿了過度疲勞帶來的倦怠。" 

# 【ハチロク】
# display as 八六
# JP: 「――双鉄様は、きっと、御一夜を去られますよね？」
1028 = "「——雙鐵少爺，您一定會離御一夜而去吧？」" 

# monologue
# JP: そうなったら。
2138 = "如果是那樣的話。" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;改修をこのまま諦めて――\n工場誘致撤回の火を、仮に、小さくしてしまうのなら。
2131 = "如果就這樣放棄\\x%l8620;#00ffc040;８６２０%l;#;的維修工作——如果阻止工廠落戶的勢頭有所減弱的話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて、どうなるかな。[ぎふ,1]義父の命に従って――\n[よそ,1]他所にやられるかもれんし、ここに残されるかもしれん」
1398 = "「哈，誰知道呢。或許會按照養父的意願跑到別的地方去，也說不定會留下來」" 

# 【ハチロク】
# display as 八六
# JP: 「そうして、何をなさるのですか？」
1574 = "「然後，您打算做些什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「以前と変わらぬ仕事だろうな。\n酒問屋の仕事全般――仕入れや、営業やなんやかやだ」
1312 = "「做以前做的事唄。在酒行裡從事各種工作——比如進貨、經營之類的」" 

# 【ハチロク】
# display as 八六
# JP: 「それは――」
1636 = "「那——」" 

# monologue
# JP: （ぱちゃり）
2640 = "（嘩啦）" 

# monologue
# JP: 水音。\n今度は想像しやすい。
2485 = "耳邊又傳來了水聲，這次很容易想像到發生了什麼事。" 

# monologue
# JP: おそらくハチロクは両手で湯船のお湯をすくって、\n顔を洗うかなにかしたのだ。
2010 = "八六應該是雙手捧起浴池裡的水洗了洗臉。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしに……お手伝いできる仕事でしょうか？」
1626 = "「這份工作……我可以幫上忙嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
1655 = "「那當然」" 

# monologue
# JP: 思いがけない問いかけに、心が、ぽっと温かくなる。\n言葉が、柔らかに滑らかになる。
2276 = "我沒有料到她會這樣反問我，不過我的心卻感覺暖暖的。於是我溫柔地對她說道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前がともに居てくれるなら、何をしてても心強いさ」
1377 = "「只要你在我身邊，不管做什麼我都會充滿動力」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、わたくしは――」
1526 = "「既然如此，我——」" 

# monologue
# JP: （ざぶっ）
# 2640 = "（嘩啦）" 

# monologue
# JP: 水音がどんどん近づいてくる。\nハチロクが僕へと寄ってくる。
2375 = "水聲離我越來越近。聽得出來八六一點一點在靠近我。" 

# monologue
# JP: なぜだか無性に恥ずかしくなり、\n思わず背中を向けてしま――っ！
2208 = "我不知怎的有些害羞，不禁轉了轉身子背對著她——！" 

# monologue
# JP: （ぴとっ）
2651 = "（貼上）" 

# monologue
# JP: 背中だ。\nハチロクの、小さな背中。
2347 = "是後背。是八六那嬌小的後背。" 

# monologue
# JP: それが、僕の背中にあたる。\n背中合わせに、僕らは湯船につかり続ける。
2108 = "她的後背與我的後背貼在了一起。我們背對背，泡在浴池裡。" 

# 【ハチロク】
# display as 八六
# JP: 「そうすることを、もしも許していただけるなら。\nわたくしは――双鉄様のお役に立ちたく、願います」
1461 = "「如果雙鐵少爺准許我這麼做的話，我——想要陪在您身邊幫您的忙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
1625 = "「這——」" 

# monologue
# JP: 嬉しい。\n単純に、ものすごく。
2246 = "我很高興。" 

# monologue
# JP: その嬉しさが鮮やかすぎて、\n少し怖くて――尋ねてしまう。
2586 = "這感情過於鮮活，以至於我有些害怕——不禁開口問她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――僕に対する贖罪だの、罪悪感だののゆえなら」
1022 = "「——如果你心中有罪惡感，想藉此向我贖罪的話」" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ、双鉄様――いいえ、まったく」
1255 = "「不是的，雙鐵少爺——不，完全不是這樣」" 

# monologue
# JP: ひどく、驚いたような声。\nハチロクの背中が硬くなる。
2169 = "從她的聲音聽得出來她被嚇了一大跳。連她的後背都僵硬了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「そのようなことは、まるで思っておりませんでした。\nただ――わたくしは――わたくしは」
1501 = "「我從未有那樣的想法。我只是——只是——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1676 = "「！」" 

# monologue
# JP: 背中はますます緊張し、\nどんどんどんどん、熱くなる。
2301 = "我能感覺到她的後背越來越緊張，並且逐漸變熱。" 

# monologue
# JP: その熱が僕へ伝われば、\n僕もつられて、ひどく、緊張してしまう。
2603 = "那熱傳到了我身上，弄得我和她一起緊張了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは――ただ――双鉄様、と――\n双鉄様の、おそばに……いれば――」
1499 = "「我只是——想著——能陪在——雙鐵少爺身邊……的話……」" 

# monologue
# JP: 言葉が、そこで続かなくなる。
2103 = "她沒有繼續說下去。" 

# monologue
# JP: 振り向きたくて、振り向けなくて――\nだから、言葉を送り込む。
2253 = "我想要轉過身去，但是卻做不到——所以我繼續跟她說。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はだ。ハチロク。心強いより何よりも。\nお前が一緒にいると、楽しい」
1343 = "「其實我呢，別說什麼動力，只要八六你和我在一起——我就很開心了」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしも、です――双鉄様」
1493 = "「我也一樣——雙鐵少爺」" 

# monologue
# JP: ハチロクの声は、そう言いながらも、苦しげだ。
1989 = "儘管八六這麼說，但是她的語氣中夾雜著痛苦。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様と一緒にいると――\nわたくしは――心が弾み、とても、幸せを感じるのです」
1379 = "「只要和雙鐵少爺在一起——我就會——覺得很快樂，非常幸福」" 

# 【双鉄】
# display as 雙鐵
# JP: 「幸せな声には、聞こえんが」
1297 = "「但聽起來怎麼不像是幸福的聲音呢」" 

# 【ハチロク】
# display as 八六
# JP: 「だって――わたくしは――わたくしは――」
1425 = "「因為——我——我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1407 = "「啊」" 

# monologue
# JP: そうだったなと、いまさら思う。\n何度も何度も、僕たちは、同じ場所へと戻ってしまう。
2289 = "我現在才終於心領神會。我們一次又一次地回到了原點。" 

# monologue
# JP: 傷口に触れ、痛みに怯え――\nそうして、きっと竦んでしまう。
2214 = "我們不停觸碰著傷口，懼怕痛苦——然後就這樣止步不前。" 

# 【双鉄】
# display as 雙鐵
# JP: 「事故が無ければ、僕達は出会わなかったのだ」
1455 = "「如果沒有發生那場事故，我們就不會相遇」" 

# monologue
# JP: ついさっき――\n線路で、恐れとともに思った事実。
2222 = "我剛才在線路邊上時還在害怕這件事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「出会わなければ、僕はお前を知り得なかった。\n事故と、過去と――これほどまでには向き合えなかった」
1454 = "「如果我們沒有相遇，我就不會有機會認識你。我就不會像現在這樣——面對那場事故和過去」" 

# monologue
# JP: けれども今は、むしろ恵みだと感じてさえいる。
1951 = "但是，現在我甚至感覺到這是一種幸運。" 

# monologue
# JP: 汰斗さんが、僕らを揃って引き取った――\nその意図を、きっと紡げると感じてる。
2383 = "汰斗老爺將我們兩個一併收留——其中的用意，一定可以如願。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だからといって、すぐに割り切れるわけでもない。\n答えをぽんと、お前に差し出してやれるでもない」
1472 = "「就算如此，我也不可能一下子想個明白。也沒辦法隨隨便便就給你一個答案」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1421 = "「嗯」" 

# monologue
# JP: ハチロクの背中からふっと、力が抜ける。\nとても小さく、やわらかい。
2257 = "我感覺到八六嬌小而柔軟的後背逐漸放鬆了下來。" 

# monologue
# JP: そのあたたかみは、僕に勇気を与えてくれる。
2170 = "從她那傳來的溫度給了我勇氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「傷は痛むし、罪悪感は拭えはしない。\nそれでも、僕は――お前と出会えて、幸せなのだ」
1315 = "「傷口會作痛，罪惡感也不會消失。儘管如此，和你相遇——我感覺很幸福」" 

# monologue
# JP: あまりに単純すぎること。\nそれゆえ、見ようとしなかったこと。
1923 = "事實實在太過單純，以至於我都沒有正視過它。" 

# monologue
# JP: 真正面から見据えれば、\n過去にまつわる影がどこかへ、引っ込んでいく。
2055 = "只要正視它，纏繞著過去的陰影就會躲到一邊。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様も、なのですか？」
1665 = "「雙鐵少爺，您也是這麼認為的嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。僕もだ。\n無論、そこには、過去も何も、全く関係してこない」
1418 = "「嗯。我也是這麼認為的。當然，其中的感情和過去完全沒有關係」" 

# monologue
# JP: 背中で感じる。\nハチロクは小さく頷いて――僕の言葉を、わかってくれる。
2311 = "我通過後背感覺到八六輕輕點了點頭——我知道她已經理解了我說的話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「出会ってずっと――この瞬間も。ハチロクと一緒にいて。\nともに懸命に頑張ることが、僕は幸せでとても楽しい」
1484 = "「從與你相遇——直到現在。能和你在一起，和你一起拚命地努力，我覺得既幸福又快樂」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしもです、双鉄様」
1494 = "「我也一樣，雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕らは、お互い、お互いの役にたっている」
1646 = "「那我們兩個，都為對方派上了用場」" 

# monologue
# JP: それでいいのだと、強く感じる。\nそうできるだけで、いいのだと。
2282 = "我深刻地感受到，我們之間這樣就好，只要做到這點就已經很好了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「周りに認められるなら。誰かの役に立つのなら。\n動機がたとえエゴでも欲でも、それは幸いに変わるのだ」
1381 = "「只要能得到周圍人的認可，只要能幫助到別人，不管動機是出於自我滿足還是欲望，到最後都會得到幸福」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1421 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;の修復のことも――だから、\nポーレット達、みんなに[はか]諮ってもらおう」
1309 = "「修復\\x%l8620;#00ffc040;８６２０%l;#;的工作也是一樣——所以，我們得跟波萊特他們，得跟大家一起商量對策」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ……左様ですね。\n考えてみれば、それが、当然のことなのですね」
1414 = "「嗯……確實如此。仔細想想，這是理所應當的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1421 = "「嗯」" 

# monologue
# JP: 背中が、笑う。\n嬉しげに、そうしてどこか、さみしげに。
2100 = "她在我背後開心地笑了，但是我察覺到其中有幾分寂寞。" 

# 【ハチロク】
# display as 八六
# JP: 「あの子はもう、わたくしの[ハチロクニイマル,3]8620ではなく――\n御一夜の\x%l8620;#00ffc040;8620%l;#;に、なったのですから」
1580 = "「畢竟那孩子已經不是屬於我的８６２０——而是屬於御一夜的\\x%l8620;#00ffc040;８６２０%l;#;了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。だが同時に、お前の[ハチロクニイマル,3]8620でもある。\nそれは変わらぬ――決して、変わり得ぬことだ」
1538 = "「是啊。但它同時還是屬於你的８６２０。這點——是無論如何都絕不會改變的」" 

# monologue
# JP: どくんと、大きく鼓動する。\n僕の鼓動だ、ハチロクのものであるはずがない。
2300 = "我聽到了“撲通”一聲強烈的心跳。這聲音來自於我的胸腔，而不是八六。" 

# monologue
# JP: だけれど、どきどき、どきどきと――\n自分の鼓動をハチロクと、共有してると感じてしまう。
1944 = "但是我能感覺到八六與我心跳的共鳴——“撲通、撲通”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、お前を――」
1468 = "「對我來說，你也——」" 

# 【ハチロク】
# display as 八六
# JP: 「ぁっ」
# 1407 = "「啊」" 

# monologue
# JP: 誰かの。誰かに。\n単純な所有欲であり、独占欲。
2359 = "某個人，屬於另一人，這是單純的佔有慾。" 

# monologue
# JP: まさしくそれこそ欲で、エゴだ。\nあまりにあからさまで剥き出しの。
2590 = "這正是赤裸裸的欲望，也是自我滿足。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク……僕は」
1328 = "「八六……我」" 

# monologue
# JP: されど、それを隠さずぶつける。\nハチロクになら、ハチロクにだけは、そう出来る。
1949 = "但是，只要對方是八六，我就可以不用遮遮掩掩，毫不保留地告訴她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――僕には、お前が必要だ」
1026 = "「——我需要你」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
# 1677 = "「！！！」" 

# monologue
# JP: 理屈ではなく、利害ではなく、感情で。
2581 = "這不是藉口，無關利益，而是我心中真摯的感情。" 

# monologue
# JP: ハチロクをもしも失うのなら――\n僕は、生きてない僕へと戻る。
2134 = "如果我失去了八六——我，就會變回那個行屍走肉一般的我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、ハチロク。これからも僕の側にいてくれ」
1518 = "「所以呀，八六。從今以後，請你繼續陪在我身邊」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄さま――わたくしこそ――\nそれこそ、わたくしの望みです」
1441 = "「好的。雙鐵少爺——這——正是我心中的期望」" 

# monologue
# JP: 声が、震える。\nもう、涙声になっている。
2112 = "她的聲音在顫抖。言語中夾雜著抽噎聲。" 

# 【ハチロク】
# display as 八六
# JP: 「ずっとあなたの――あなたのお側に。\nわたくしが壊れる、その日まで――」
1503 = "「我想要一直——陪在您的身邊。直到我壞掉的那一天——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロク、そうしよう」
1643 = "「那就這樣定了，八六」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様」
1443 = "「好的，雙鐵少爺」" 

# monologue
# JP: そうすることが自然と感じて、\nそうしたくって、湯船の中で振り返る。
2244 = "我很自然地，委身於心中的衝動在浴池中轉過身去。" 

# monologue
# JP: ハチロクの体を抱きしめて、\n僕の全部で、包み込む。
2264 = "我抱住了八六的身體，用我的全部將她擁入懷中。" 

# 【ハチロク】
# display as 八六
# JP: 「あ……」
1404 = "「啊……」" 

# monologue
# JP: ただただ、幸せそうな声。\nハチロクがくたり、僕の手の中で力を抜く。
2019 = "八六發出了幸福的聲音。她在我的懷中漸漸撤去力氣，依偎在我身上。" 

# monologue
# JP: けれども次の瞬間に、\nぎくりと、体が硬くなる。
1937 = "但是下一個瞬間，她突然身體僵直了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「え？　あ――あれ？」
1402 = "「哎？啊——哎呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、ハチロク――っ！？」
1487 = "「怎麼了，八六——！？」" 

# monologue
# JP: 湯船に、赤。\n出血したかと思うが、僕の体はどこも傷んでいない。
2398 = "浴池裡的水，變紅了。我開始還以為是哪裡出血了，但是我身上並沒有傷口。" 

# 【ハチロク】
# display as 八六
# JP: 「あれ？　わたくし――これ……なんでしょう？」
1401 = "「哎呀？我——這……是怎麼回事？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前か、これは？」
1627 = "「這是你的血？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。おそらくは――\nなんでしょう――違和感、と、言えばいいのか」
1416 = "「嗯。八成是——但是為什麼呢——總感覺有哪裡不對勁」" 

# 【双鉄】
# display as 雙鐵
# JP: 「少し待て！」
1304 = "「你等一下！」" 

# monologue
# JP: ここは登呂流湯。\nまさに、不幸中の幸いだ。
2591 = "還好這裡是登呂流浴場，真是不幸中的萬幸。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご主人！　ご主人！　\n申し訳ない！　すぐに来てくれ！！」
1592 = "「老闆！老闆！不好意思！麻煩馬上過來一下！！」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「なんねぇ、大声で」
1488 = "「怎麼了，喊這麼大聲」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクに異変が起きたのだ」
1336 = "「八六的身體好像不太對勁啊」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ええ？」
1606 = "「說什麼？」" 

# monologue
# JP: すりガラスの向こう、ご主人の動きが慌ただしくなる。
2578 = "透過磨砂玻璃，我看出來老闆有些手忙腳亂。" 

# monologue
# JP: ならば、任せておけばいい。\nああ、いや――だが、預ける前に。
2336 = "既然這樣，接下來只要交給老闆就好了。啊，不對——在把八六託付給老闆之前。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
# 1331 = "「八六」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 1403 = "「啊——」" 

# monologue
# JP: もう一度強く抱きしめる。
2216 = "我再一次緊緊抱住八六。" 

# monologue
# JP: ハチロクの熱を、少しでも失わせないよう。\n不安があるなら、それを少しでも拭えるように。
2406 = "為了儘可能不讓溫度從她身上流失。如果她心中感到不安，也希望我能儘可能為她撫平。" 
