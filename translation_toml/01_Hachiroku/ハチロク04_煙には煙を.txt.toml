2784 = "Từ đầu đến cuối \x%l客車;#00ffc040;toa hành khách%l;#;, ánh mắt Fukami chầm chậm\nlướt qua như đang ngắm nhìn một món bảo vật."
# 【ふかみ】
# display as 深美
# JP: 「絶対、評判になるよね、この\x%l列車;#00ffc040;列車%l;#;。\nそれで、御一夜――またにぎやかな町になるよね」
2393 = "「Chắc chắn \x%l列車;#00ffc040;chuyến tàu%l;#; này sẽ nổi tiếng lắm đây.\nRồi Ohito――sẽ lại trở thành một thị trấn nhộn nhịp nhỉ.」"
# 【凪】
# display as 凪
