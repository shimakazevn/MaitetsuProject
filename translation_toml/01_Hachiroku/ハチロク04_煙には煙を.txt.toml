# display as 深美
# JP: 「わっ！」
1946 = "「Oa!」"
# 【凪】
# display as 凪
# JP: 「肉ば乗せたら、派手に火ぃ立ちよったねぇ！」
2323 = "「Vừa đặt thịt lên là lửa bùng lên dữ dội luôn nha!」"
# monologue
