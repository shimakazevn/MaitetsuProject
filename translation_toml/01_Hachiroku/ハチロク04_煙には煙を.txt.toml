2986 = "Tớ cảm thấy hơi nhột nhột, vui vui,\nvà cũng có chút gì đó ngượng ngùng nha."
# 【凪】
# display as 凪
# JP: 「それにしても」
2358 = "「Mà nhắc mới nhớ.」"
# 【ふかみ】
# display as 深美
# JP: 「だね」
2180 = "「Ừm.」"
