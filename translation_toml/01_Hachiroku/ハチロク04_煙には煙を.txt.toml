2026 = "「Vì có rất nhiều việc chỉ chị Paulette mới làm được.\nNên những việc khác mọi người mới chia nhau ra làm.」"
# 【凪】
# display as 凪
# JP: 「なるほど、言われたら納得ばい。\nにーさん、いろいろ考えておるとねぇ」
1894 = "「Ra là vậy, cậu nói thế tớ mới hiểu nha.\nAnh Soutetsu cũng suy nghĩ nhiều bề ghê ha.」"
# 【ふかみ】
# display as 深美
# JP: 「だよね。双鉄さん。\n凄く、いろいろ考えて……見てくれてる……のに」
2179 = "「Đúng vậy ha. Anh Soutetsu.\nRất chịu khó suy nghĩ……quan sát……vậy mà.」"
# monologue
# JP: ふかみちゃん、はーって長か息ば吐く。\nなんか……なんだか、ため息みたいに聞こえるばい。
2790 = "Fukami thở hắt ra một hơi thật dài.\nNghe cứ……như là đang thở dài ấy nha."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、やっぱり暑かと？」
2076 = "「Fukami, cậu vẫn thấy nóng hả?」"
# 【ふかみ】
# display as 深美
# JP: 「ううん、平気。\nええと――あ！」
1831 = "「Không, tớ không sao.\nỪm――a!」"
# 【凪】
# display as 凪
# JP: 「お、来よったばーい！！！」
1950 = "「Ồ, tới rồi nha!!!」"
# monologue
