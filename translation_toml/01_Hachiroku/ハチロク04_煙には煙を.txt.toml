1934 = "「Để quý khách phải đợi lâu, từ bây giờ chúng ta sẽ bắt đầu tiệc BBQ.\nChúng tôi sẽ phục vụ lần lượt từ những hành khách ngồi phía trước.」"
# monologue
# JP: 大きか声でアナウンスして、アテンダントのおばさんが、\n肉やら野菜やら乗せたトレーば押してくる。
2909 = "Sau khi dõng dạc thông báo, cô nhân viên phục vụ\nđẩy chiếc khay chở đầy thịt và rau củ tới."
# 【永山】
# display as 永山
# JP: 「お席を立っての記念撮影は、肉を焼く時にお願いします。\nまず、座席番号1A～1D、2A～2Dのお客様、どうぞ」
2061 = "「Nếu quý khách muốn rời ghế để chụp ảnh kỷ niệm, xin vui lòng thực hiện lúc nướng thịt.\nTrước tiên, xin mời quý khách ở các ghế từ 1A~1D, 2A~2D.」"
# 【乗客Ａ】
# display as 乘客Ａ
# JP: 「待ってました！\nおっ――これは旨そうな肉ですねぇ」
2306 = "「Đợi mãi!\nỒ――thịt trông ngon quá nhỉ.」"
# 【永山】
# display as 永山
# JP: 「特産のブランド和牛、『[くまもとあかおう,3]隈元赤王』です。\n旨味と甘み、豊かな食感をお楽しみいただけます」
2391 = "「Đây là loại thịt bò Wagyu đặc sản mang thương hiệu 『Kumamoto Akaou』.\nQuý khách có thể thưởng thức vị ngon ngọt và kết cấu phong phú của thịt.」"
# 【乗客Ｂ】
# display as 乘客Ｂ
# JP: 「パパ！　早く焼いて焼いて！」
2268 = "「Ba ơi! Mau nướng đi, nướng đi!」"
# 【乗客Ａ】
# display as 乘客Ａ
# JP: 「良し来たっ！」
2051 = "「Tới luôn!」"
# monologue
# JP: （ぼうっ！）
3096 = "（Bùng!）"
