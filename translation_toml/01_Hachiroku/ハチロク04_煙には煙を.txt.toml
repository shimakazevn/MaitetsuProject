1997 = "「Chà, có cái vỏ nhựa che lại rồi,\nthì khó mà đập vỡ để bấm được nha.」"
# 【ふかみ】
# display as 深美
# JP: 「ほんと……全部のことが、\nちゃんと役にたってるんだよね」
2171 = "「Thật sự……tất cả mọi thứ,\nđều đang phát huy tác dụng nhỉ.」"
# 【凪】
