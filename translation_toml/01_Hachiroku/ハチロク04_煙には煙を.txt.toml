# display as 乘客Ａ
# JP: 「ん？　ああ――非常停止ボタン、と書いてあるね。\n危なくなったときだけに押すボタンだよ」
2016 = "「Hử? À――trên đó có ghi là Nút dừng khẩn cấp kìa.\nĐó là nút chỉ được bấm khi gặp nguy hiểm thôi con ạ.」"
# 【乗客Ｂ】
# display as 乘客Ｂ
# JP: 「ふうん、じゃあ、今はおしちゃいけないんだね」
1953 = "「Hừm, vậy là bây giờ không được bấm nhỉ.」"
