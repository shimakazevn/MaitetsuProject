# 【ハチロク】
# display as 八六
# JP: 「[ロクセンニヒャクケイ,4]6200形――\x%l6200;#00ffc040;[ネルソン,3]6200%l;#;お姉さま達は、\nニイルセンという[えいこく,1]詠国の会社からの輸入蒸気なのです」
1533 = "「Các chị mẫu 6200――\x%l6200;#00ffc040;6200%l;#;,\nlà đầu máy hơi nước nhập khẩu từ một công ty của Anh tên là Neilson ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――ニイルセンがなまって、\nネルソンという愛称となったのか」
1967 = "「À――từ Neilson đọc chệch đi,\nthành biệt danh Nelson sao.」"
# monologue
# JP: 左様ですねと頷いて、\nハチロクは、遠くを見るようなまなざしになる。
2681 = "Gật đầu đáp \"Đúng vậy ạ\",\nánh mắt Hachiroku như đang nhìn về một nơi xa xăm."
# 【ハチロク】
# display as 八六
# JP: 「とても優美なシルエットで、“[とうかいどう,2]東峡道の名月”とも。\nキャブの窓がむき出しの――半月の形をしているのです」
2046 = "「Hình dáng của chị ấy rất thanh nhã, còn được gọi là \"Danh nguyệt của Tokaido\".\nVì cửa sổ buồng lái để trần――có hình bán nguyệt ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「え、なにそれロマンチック。\n見たいし、描いてみたいかも」
1986 = "「Ơ, nghe lãng mạn thế.\nEm cũng muốn xem thử, có khi còn muốn vẽ lại nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなも、お会いしてみたいですぅ」
2273 = "「Reina cũng muốn được gặp chị ấy nha~」"
# 【ハチロク】
# display as 八六
# JP: 「まさしくロマンチックという言葉がぴったりです」
2235 = "「Quả thực từ lãng mạn rất phù hợp với chị ấy ạ.」"
# monologue
# JP: うっとりと、少し酔いでもしたかのような声。
2663 = "Giọng nói say sưa, như thể đang bị mê hoặc."
# 【ハチロク】
# display as 八六
# JP: 「ネルソンお姉さまなら――確かに、観光に最適ですね」
2307 = "「Nếu là chị Nelson――thì quả thực rất phù hợp cho du lịch ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「最適は言いすぎだろう。\nお前、\x%l8620;#00ffc040;[ハチロクニイマル,3]8620%l;#;がいるのだからな」
2209 = "「Nói phù hợp nhất thì hơi quá rồi đấy.\nVì còn có em, \x%l8620;#00ffc040;8620%l;#; ở đây mà.」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ」
1947 = "「Trời.」"
# monologue
# JP: 本心からの言葉なのだが、\nハチロクの耳には世辞とでも聞こえてしまったらしい。
2838 = "Dù là lời nói thật lòng,\nnhưng lọt vào tai Hachiroku lại như một lời tâng bốc."
# monologue
# JP: クスクス笑って、\nそれからゆっくり、大きく頷く。
2752 = "Em ấy cười khúc khích,\nrồi từ từ, gật đầu thật mạnh."
# 【ハチロク】
# display as 八六
# JP: 「ネルソンお姉さまが来てくださるのかもしれないのなら、\n大丈夫、勇気百倍で頑張りぬけます」
2308 = "「Nếu có thể chị Nelson sẽ đến,\nthì em không sao đâu, em sẽ cố gắng hết mình với lòng dũng cảm nhân lên gấp trăm lần.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ああよかった！　じゃ、増発の手配を開始しますね」
2011 = "「A, may quá! Vậy, em sẽ bắt đầu sắp xếp tăng chuyến nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「う――む」
1958 = "「Ư――m.」"
# monologue
# JP: ずるずる、話が逸れてしまった。
3025 = "Cứ thế, câu chuyện đã đi chệch hướng."
# monologue
# JP: が、ハチロクが大丈夫というのなら、\nそれは大丈夫なのだろう。
2642 = "Nhưng, nếu Hachiroku nói không sao,\nthì chắc là không sao thật."
# monologue
# JP: （とはいえ……いささかスッキリせんな）
3098 = "(Tuy nói vậy……nhưng vẫn có chút gì đó chưa được giải tỏa)"
# monologue
# JP: “頑張る”という一言が、\nどうにもハチロクらしく聞こえず――
1522 = "Từ \"cố gắng\",\nnghe chẳng giống phong cách của Hachiroku chút nào――"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　ひょっとしてお疲れなのですか？」
2442 = "「Ngài Soutetsu? Không lẽ ngài mệt sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1819 = "「Không――」"
# monologue
# JP: いかん、考えこんでしまった。
2620 = "Không được, lại chìm vào suy nghĩ rồi."
# monologue
# JP: こんなことでハチロクに負担をかけては、\nそれこそ本末転倒だ。
2743 = "Vì chuyện này mà tạo thêm gánh nặng cho Hachiroku,\nthì đúng là lợi bất cập hại."
# 【双鉄】
# display as 雙鐵
# JP: 「頑張らねばと――僕も思っていただけだ。\nまずは、観光振興のため、そして御一夜を守るため」
1920 = "「Anh cũng chỉ đang nghĩ――mình phải cố gắng thôi.\nTrước hết là vì chấn hưng du lịch, và vì bảo vệ Ohito.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\nここまで――上手く来たのですから」
2195 = "「Đúng vậy ạ.\nĐến mức này――mọi chuyện vẫn đang diễn ra tốt đẹp mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2009 = "「嗯」" 
# monologue
# JP: 上手く――本当に上手くここまで回ってきている。
2712 = "Tốt đẹp――mọi thứ vẫn đang vận hành rất tốt đẹp cho đến lúc này."
# monologue
# JP: ならば不安に止まるより、\n循環をよりよいものへと運ぶため動くべきだろう。
3052 = "Vậy thì thay vì cứ mãi bất an,\nnên hành động để thúc đẩy vòng tuần hoàn này theo hướng tốt hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットと相談の上、乗務と訓練の新しいシフトを\n作成してもらえるか？」
2328 = "「Em có thể bàn bạc với Paulette, lập một ca làm việc mới\ncho việc trực và huấn luyện được không?」"
# 【ハチロク】
# display as 八六
# JP: 「承りました、双鉄様」
2136 = "「Em hiểu rồi, thưa ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その間僕は、整備清掃をしておこう」
2392 = "「Trong lúc đó, anh sẽ đi dọn dẹp bảo dưỡng.」"
# monologue
# JP: どんな些細なものであれ、\n不安があるなら自分の目と手で潰しておけばいいことだ。
2624 = "Dù là chuyện nhỏ nhặt đến đâu,\nnếu có gì bất an thì cứ tự tay, tự mắt mình giải quyết là được."
# monologue
# JP: それこそがまさしくハチロクの言う、\n“安全が第一の使命”を果たす行いだろう。
3038 = "Đó mới chính là hành động thực hiện\n\"sứ mệnh an toàn là trên hết\" như lời Hachiroku nói."
# 【ハチロク】
# display as 八六
# JP: 「それでは双鉄様、またのちほど」
2429 = "「Vậy thưa ngài Soutetsu, hẹn gặp lại ngài sau ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2009 = "「嗯」" 
# monologue
# JP: 軽く会釈し、ハチロクはあっさりと奥へ引っ込む。\nその足取りは、軽快だ。
3033 = "Khẽ gật đầu chào, Hachiroku thản nhiên đi vào trong.\nBước chân của em ấy thật nhẹ nhàng."
# monologue
# JP: （あんなに小さな歩幅であるのに――\nここまで、僕らを引っ張ってきてくれたのだ）
3093 = "(Sải bước chân nhỏ bé như vậy――\nmà đã dẫn dắt chúng tôi đến tận đây)"
# monologue
# JP: ならばこの先――\nハチロクの認める\x%l機関士;#00ffc040;機関士%l;#;として、僕はハチロクを助けたい。
3049 = "Vậy thì từ nay về sau――\nvới tư cách là \x%l機関士;#00ffc040;lái tàu%l;#; được Hachiroku công nhận, tôi muốn giúp đỡ em ấy."
# monologue
# JP: 素直に思えば、\n根拠もなかった不安感はすぐに消えていく。
2846 = "Khi nghĩ như vậy một cách chân thành,\ncảm giác bất an vô cớ cũng lập tức tan biến."
# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
# 2055 = "「好！」" 
# monologue
# JP: この目と手とを、そうあるために――\nまずは、大きく伸ばして使おう。
2950 = "Để sử dụng đôi mắt và đôi tay này đúng mục đích――\nTrước tiên, hãy vươn vai thật rộng và bắt tay vào việc thôi."
# monologue
# JP: （ぐいっ！）
3094 = "（Giật!）"
# 【日々姫】
# display as 日日姬
# JP: 「むぎゅっ！」
1935 = "「Úi!」"
# monologue
# JP: こそこそと、レールショップを出ようとしてた\n日々姫の腕を掴まえる。
2835 = "Tôi tóm lấy cánh tay của Hibiki,\nkhi em ấy đang lén lút định chuồn khỏi cửa hàng đường sắt."
# 【双鉄】
# display as 雙鐵
# JP: 「これから清掃をしたいのだが、\n日々姫、手伝ってもらえるか？」
2124 = "「Bây giờ anh muốn đi dọn dẹp,\nHibiki, em giúp anh một tay được không?」"
# 【日々姫】
# display as 日日姬
# JP: 「あー……ええっと――そのぉ」
1971 = "「A……ừm――cái đó.」"
# monologue
# JP: 出入口を見て、僕を見て。\nそして日々姫ははぁっ、と長い息を吐く。
2903 = "Nhìn lối ra vào, rồi lại nhìn tôi.\nSau đó, Hibiki thở hắt ra một hơi dài."
# 【日々姫】
# display as 日日姬
# JP: 「手伝いますよ。手伝います。\n私――兄さんの妹ですから」
2131 = "「Em giúp. Em giúp là được chứ gì.\nEm――là em gái của anh trai mà.」"
