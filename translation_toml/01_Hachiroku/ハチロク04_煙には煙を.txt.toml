[script]
# lines: 394 
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、遅くまで付きあわせて」
1824 = "「Xin lỗi nhé, bắt hai người thức khuya thế này.」"
# 【ふかみ】
# display as 凪＆深美
# JP: 『「まっことばい！」\n「いいえ、そんな」』
2476 = "『「Đúng đó nha!」\n「Dạ không, có gì đâu ạ.」』"
# monologue
# JP: 正反対の声と声とが、\x%l客車;#00ffc040;客車%l;#;の壁に吸い込まれていく。
2652 = "Hai giọng nói mang ý nghĩa trái ngược nhau, bị hút vào bức tường của \x%l客車;#00ffc040;toa hành khách%l;#;."
# 【ふかみ】
# display as 深美
# JP: 「どうせ夜は、川下りありません、し。\n夜、あんまり\x%l列車;#00ffc040;列車%l;#;に乗ることないから――面白い。です」
1914 = "「Dù sao buổi tối cũng không có thuyền xuôi dòng.\nBan đêm, em ít khi đi \x%l列車;#00ffc040;tàu%l;#; nên――cũng thú vị lắm ạ.」"
# 【凪】
# display as 凪
# JP: 「あ、そりゃそーばい」
1989 = "「À, chuyện đó thì đúng á.」"
# monologue
# JP: ふかみが言えば、凪がぐるりと意見を変えてそれに乗る。\n最近しばしば見かける気がする光景だ。
2944 = "Nghe Fukami nói, Nagi liền đổi ý hùa theo.\nDạo gần đây tôi thấy cảnh này hơi bị thường xuyên đấy."
# monologue
# JP: このふたり、精神面でのリーダーシップは、\nあるいはふかみが取っているのかもしれん。
2856 = "Hai người này, về mặt tinh thần,\ncó lẽ Fukami mới là người dẫn dắt."
# 【ハチロク】
# display as 八六
# JP: 「いかがでした？　ブザーは鳴りませんでしたが」
2111 = "「Thế nào rồi? Còi báo động không kêu nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「煙、全然入ってこなかった？」
2258 = "「Khói không lọt vào chút nào luôn à?」"
# monologue
# JP: それぞれの持ち場の点検を終え、\nハチロクと日々姫とも\x%l客車;#00ffc040;客車%l;#;内へとやってくる。
2978 = "Sau khi kiểm tra xong vị trí của mình,\ncả Hachiroku và Hibiki đều đi vào trong \x%l客車;#00ffc040;toa hành khách%l;#;."
# monologue
# JP: わざと黒煙を立たせる試験までしたせいもあり、\n僕と同じく日々姫も全身、いつも以上に煤けてる。
2744 = "Phần vì chúng tôi đã cố tình tạo khói đen để thử nghiệm,\nnên Hibiki cũng giống như tôi, toàn thân bám đầy nhọ nồi hơn thường ngày."
# 【ふかみ】
# display as 深美
# JP: 「煙は、ちょっとも――入ってこなかった。です、し、\nケムイとも、感じなかった。です」
2257 = "「Khói, không hề lọt vào――một chút nào luôn ạ. Và,\nem cũng không cảm thấy ngột ngạt gì cả.」"
# 【凪】
# display as 凪
# JP: 「大変だったのは、\nブザー押したいの我慢するくらいだったばい！」
1962 = "「Khó khăn nhất là,\nphải nhịn cái sự thèm bấm còi báo động á!」"
# monologue
# JP: 凪の視線が、壁際の、\n仮設してある非常ブザーのボタンを眺め――
2702 = "Ánh mắt Nagi nhìn về phía nút còi báo động khẩn cấp\nđược lắp tạm thời trên tường――"
# monologue
# JP: （ブーーーーーーーーっ！）
3091 = "（Biiiiiiiiiiiiiiiiiiiip!）"
# monologue
# JP: ――たかと思うと、思い切り押す。
1519 = "――Rồi con bé nhấn mạnh một cái."
# monologue
# JP: 走行してない、静まりきった今ならば、\n\x%l運転台;#00ffc040;運転台%l;#;で鳴ったブザーが、この\x%l客車;#00ffc040;客車%l;#;にまで響いて届く。
2962 = "Bây giờ tàu không chạy, mọi thứ im ắng,\ntiếng còi vang lên từ \x%l運転台;#00ffc040;buồng lái%l;#; vọng đến tận \x%l客車;#00ffc040;toa hành khách%l;#; này."
# 【ハチロク】
# display as 八六
# JP: 「まぁ、まだ押し足りないのですか？\n運転前にも、さんざ押されたではありませんか」
1937 = "「Chà, em vẫn chưa bấm đã sao?\nTrước khi chạy em đã bấm bao nhiêu lần rồi mà.」"
# 【凪】
# display as 凪
# JP: 「練習と本番ば、まるきり別たい！」
2314 = "「Luyện tập với thực tế là hai chuyện hoàn toàn khác nhau nha!」"
# 【ハチロク】
# display as 八六
# JP: 「ああ」
1976 = "「A.」"
# monologue
# JP: 苦笑と微笑の、ちょうど真ん中。
2670 = "Nằm chính giữa ranh giới của nụ cười gượng và mỉm cười."
# monologue
# JP: 凪より小さいハチロクは、\nなんとも大人びた笑みで、凪の無邪気さを受け止める。
2924 = "Hachiroku tuy nhỏ nhắn hơn Nagi,\nnhưng lại đón nhận sự ngây thơ của Nagi bằng một nụ cười rất ra dáng người lớn."
# 【ハチロク】
# display as 八六
# JP: 「確かに、練習と本番はまるで別物ですね。\n同じように走ったつもりでも、再現できませんでしたか」
2301 = "「Đúng là, luyện tập và thực tế hoàn toàn khác nhau nhỉ.\nDù định chạy giống hệt nhau, nhưng cũng không thể tái hiện lại được sao.」"
# monologue
# JP: 煙が流入してきたら、即座にブザーを押して貰う。
2818 = "Nếu có khói bay vào, phải bấm còi báo động ngay lập tức."
# monologue
# JP: すぐに非常停止をし、\x%lカマ;#00ffc040;カマ%l;#;はそのまま維持をして、\n煙の様子を確認しにいく――そんな計画だったのだ。が。
3056 = "Dừng khẩn cấp ngay lập tức, giữ nguyên \x%lカマ;#00ffc040;lò hơi%l;#;,\nrồi đi kiểm tra tình trạng khói――kế hoạch vốn là vậy. Nhưng."
# 【双鉄】
# display as 雙鐵
# JP: 「――せっかく録画までしたのにな」
1536 = "「――Mất công ghi hình lại luôn mà.」"
# monologue
# JP: ポーレットから借りてストーブの前に据え付けていた、\n小さなムービーカメラを止める。
2854 = "Tôi tắt chiếc máy quay phim nhỏ mượn từ Paulette\nđược lắp đặt trước lò sưởi."
# monologue
# JP: 流入がまるでなかったのなら、\n再生するだけ時間の無駄となってしまおう。
2878 = "Nếu hoàn toàn không có khói lọt vào,\nthì có phát lại cũng chỉ tốn thời gian vô ích thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ままならんもんだ。\n煙の流入が無いこと自体は、喜ぶべきことなんだがなぁ」
1823 = "「Chẳng đâu vào đâu cả.\nViệc không có khói bay vào vốn dĩ là chuyện đáng mừng mà.」"
# 【ハチロク】
# display as 八六
# JP: 「夜ですし……\n外がさほど暑く無いことが影響したのかもしれません」
2282 = "「Trời cũng tối rồi……\nCó lẽ việc bên ngoài không quá nóng đã ảnh hưởng đến kết quả.」"
# 【日々姫】
# display as 日日姬
# JP: 「そっか、天気とか気温も影響してくるんだ」
2071 = "「Ra vậy, thời tiết và nhiệt độ cũng ảnh hưởng đến nó à.」"
# monologue
# JP: それは当然のことなのだけれど、\nここまで顕著に現れるとは、正直思っていなかった。
3062 = "Đó là điều hiển nhiên,\nnhưng thú thật tôi không ngờ nó lại thể hiện rõ rệt đến mức này."
# monologue
# JP: 風向きや温度だけでなく、営業運転となるのなら、\n客の数により重量も、毎日変化してくるであろうし――
2619 = "Không chỉ hướng gió hay nhiệt độ, nếu đi vào hoạt động thương mại,\ntrọng lượng cũng sẽ thay đổi mỗi ngày tùy theo số lượng hành khách――"
# 【双鉄】
# display as 雙鐵
# JP: 「……日によってこれほど煙の流れが変わるなら、\n煙突の改修などでは対処しきれないかもしれんな」
1555 = "「……Nếu hướng khói thay đổi nhiều thế này tùy theo ngày,\nthì có sửa chữa ống khói cũng chưa chắc đã giải quyết được vấn đề.」"
# 【ハチロク】
# display as 八六
# JP: 「かもしれませんが――\nでしたら、どのような方策を？」
2141 = "「Có thể là vậy――\nNếu thế, ngài có kế sách gì không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ……」
1991 = "「Hừm……」"
# monologue
# JP: ポーレットの顔が頭に浮かぶが、うかつに頼めば、\n恐らくそのため、睡眠時間を削ってしまうに違いない。
3002 = "Khuôn mặt Paulette hiện lên trong đầu tôi, nhưng nếu tùy tiện nhờ vả,\nchắc chắn cô ấy sẽ cắt bớt thời gian ngủ để làm việc đó."
# monologue
# JP: かといって、そう簡単に良さそうな案も浮かんでこない。\nならば他。他に、アイディアをくれそうなのは――
3063 = "Nói thì nói vậy, nhưng tôi cũng chẳng nghĩ ra được phương án nào khả thi.\nVậy thì tìm người khác. Người khác có thể cho tôi ý tưởng là――"
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉や、蓑笠さん、あとボイラ屋の[はた]秦さんなどに、\n相談してみるのも良いかもしれんな」
2142 = "「Có lẽ nên bàn bạc với chị Mayami, bác Minokasa,\nvà cả anh Hata bên tiệm nồi hơi nữa.」"
# 【ハチロク】
# display as 八六
# JP: 「わかりました。\nでは、とりあえずはそのようにいたしましょ――」
2138 = "「Em hiểu rồi.\nVậy thì, tạm thời cứ quyết định như thế nhé――」"
# monologue
# JP: （ぐ～っ）
3088 = "（Rột~）"
# 【ハチロク】
# display as 八六
# JP: 「いいえ、わたくしではございませんよ？」
1821 = "「Không, không phải em đâu nhé?」"
# monologue
# JP: 尋ねる前の、即座の否定。\nその傍らの日々姫も首を横に振ってる。
2839 = "Lời phủ nhận ngay lập tức, trước cả khi tôi kịp hỏi.\nHibiki bên cạnh cũng lắc đầu."
# 【凪】
# display as 凪
# JP: 「お腹へったばーい！」
2326 = "「Đói bụng quá nha!」"
# monologue
# JP: なら誰が――思うより先、あっけらかんと凪が笑う。\nその横でふかみがうつむき、頬を恥ずかしげに染めている。
2709 = "Vậy thì ai――chưa kịp nghĩ xong, Nagi đã cười vô tư lự.\nBên cạnh, Fukami cúi gằm mặt, hai má đỏ bừng vì xấu hổ."
# 【双鉄】
# display as 雙鐵
# JP: 「だな。店が閉まっては約束も果たせなくなる。\n時間も時間だ。話は、食事しながらの方が良いか」
1841 = "「Cũng phải. Quán mà đóng cửa thì không thực hiện được lời hứa mất.\nCũng muộn rồi. Vừa ăn vừa nói chuyện thì tốt hơn.」"
# 【凪】
# display as 凪
# JP: 「やったー！　待ってましたばーい！」
2044 = "「Tuyệt quá! Chờ nãy giờ luôn nha!」"
# 【ふかみ】
# display as 深美
# JP: 「あの……ほんとに、ばんごはん。\nごちそうになっちゃって――いい――です、か？」
2412 = "「Dạ……thật sự, bữa tối.\nBọn em được mời ăn――có sao――không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。試験につきあってもらっているしな」
2283 = "「Đương nhiên rồi. Các em đã đồng hành cùng bài kiểm tra mà.」"
# monologue
# JP: ふかみが協力を申し出てくれた上、他に適任者もいない。\n素直に嬉しくありがたく、同時に申し訳無さも感じる。
2942 = "Fukami đã ngỏ lời giúp đỡ, vả lại cũng không có ai thích hợp hơn.\nTôi thực sự rất vui và biết ơn, đồng thời cũng cảm thấy có lỗi."
# monologue
# JP: 煙の流入の監視というのは……\n炭鉱のカナリアじみた仕事だと、どうも感じてしまうので。
2741 = "Vì việc giám sát khói tràn vào này……\nTôi cứ có cảm giác nó giống như công việc của con chim hoàng yến trong hầm mỏ vậy."
# 【日々姫】
# display as 日日姬
# JP: 「今日はねぇね――姉さんがおでかけだから、\n私たち、何もなくても外食の予定だったし」
1848 = "「Hôm nay chị hai――chị Mayami đi vắng,\nnên dù không có chuyện này thì bọn anh cũng định đi ăn ngoài mà.」"
# monologue
# JP: 言って日々姫は、少しおどけて鼻の頭を指先でこする。
3026 = "Nói rồi Hibiki hơi đùa giỡn lấy đầu ngón tay cọ cọ chóp mũi."
# 【日々姫】
# display as 日日姬
# JP: 「っていっても、お風呂入るまではススついてるから、\nそんなにおしゃれなお店とかにはいけないけど」
2437 = "「Nói vậy chứ, trước khi tắm rửa sạch sẽ thì người ngợm dính đầy nhọ nồi,\nnên không thể đến mấy quán sang trọng được đâu.」"
# 【凪】
# display as 凪
# JP: 「おしゃれなお店とか、ウチが無理ばいっ！」
2410 = "「Mấy quán sang trọng á, tớ chịu thua nha!」"
# monologue
# JP: 凪のその声に、ふかみが笑う。\nそしてぺこりと頭をさげる。
2997 = "Nghe Nagi nói vậy, Fukami bật cười.\nSau đó em ấy cúi đầu chào."
# 【ふかみ】
# display as 深美
# JP: 「それなら……お言葉に甘えて、\nごちそうになっちゃいます、です」
2423 = "「Nếu vậy……bọn em xin nhận lòng tốt này,\ncảm ơn anh chị đã thiết đãi ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「決まりね！　じゃ、ちょっとだけ待ってて、\n着替えてくるから」
2415 = "「Quyết định vậy nhé! Vậy chờ anh chị một chút,\nanh chị đi thay đồ đã.」"
# 【ふかみ】
# display as 深美
# JP: 「双鉄さんは……ええと、いいんですか？\nその、着替え。とか」
2439 = "「Anh Soutetsu……ừm, anh không sao chứ?\nViệc thay đồ ấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「男の着替えだ。三分もあればことたりる。\n話が済んでからでよかろう」
2280 = "「Đàn ông thay đồ thì 3 phút là xong.\nNói chuyện xong rồi thay cũng được.」"
# 【凪】
# display as 凪
# JP: 「話って、まだ他にあるばい？」
2397 = "「Chuyện gì nữa, còn chuyện khác à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あるとも。何を食べるか――」
2418 = "「Có chứ. Ăn món gì――」"
# 【凪】
# display as 凪
# JP: 「肉っ！」
2325 = "「Thịt!」"
# monologue
# JP: 言い切らぬうち、\n凪先生は立上がっての力説だ。
2853 = "Tôi chưa kịp nói hết câu,\ncô giáo Nagi đã đứng bật dậy và nhấn mạnh."
# 【凪】
# display as 凪
# JP: 「ガッツリ肉ば食べたかよー！\nふかみちゃんは、どぎゃんと？」
2119 = "「Muốn ăn thật nhiều thịt nha!\nFukami thấy sao?」"
# 【ふかみ】
# display as 深美
# JP: 「わたしは……別に、好き嫌いない、し。\n凪ちゃんと双鉄さんたちが、食べたいもので。です」
2122 = "「Mình thì……cũng không kén ăn gì cả.\nNagi và mọi người muốn ăn gì thì ăn nấy ạ.」"
# 【凪】
# display as 凪
# JP: 「なら、肉でよかと？」
2414 = "「Vậy, ăn thịt nha?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。焼肉ならば、ススの汚れも目立つまいしな。\nどこか、おすすめの店はあるのか？」
2005 = "「Được. Nếu là thịt nướng thì vết nhọ nồi cũng không bị chú ý lắm.\nEm có quán nào muốn giới thiệu không?」"
# 【凪】
# display as 凪
# JP: 「あるばい！　うちから少しのとこにある、\n『[ぎゅうしゃ,1]牛炙』さんって知っとっと？」
2212 = "「Có chứ nha! Cách nhà tớ một chút,\nanh có biết quán \"Gyusha\" không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。お肉屋さんもやっているところだな」
1999 = "「Ừm. Quán đó có bán cả thịt tươi nữa nhỉ.」"
# 【凪】
# display as 凪
# JP: 「そこば改装したとき、爺ちゃんとか職人さん達と一緒に\n焼肉ばごちそうになったばい！　うまかったばい！！」
2420 = "「Lúc chỗ đó sửa chữa, tớ với ông nội và mấy chú thợ\nđược mời ăn thịt nướng ở đó đó nha! Ngon tuyệt cú mèo luôn!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そこにするとしよう」
2428 = "「Vậy thì quyết định quán đó đi.」"
# monologue
# JP: 改装したとき蓑笠さんたちがご馳走に――という話なら、\nおそらくは改装工事の打ち上げとか前祝いとかだろう。
3015 = "Nghe kể lúc sửa chữa nhóm bác Minokasa được thiết đãi――\nthì có lẽ là tiệc mừng công hay ăn mừng trước khi thi công gì đó."
# monologue
# JP: そうした席なら、よほど良い肉が振る舞われ…………
2746 = "Nếu là tiệc như vậy, chắc hẳn họ đã dọn ra loại thịt rất ngon…………"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2441 = "「Ngài Soutetsu?」"
# monologue
# JP: ハチロクの声に片手を上げて、時間をもらって考える。\nああ……そうか、なるほど、焼肉か。
2849 = "Nghe Hachiroku gọi, tôi giơ một tay lên xin chút thời gian để suy nghĩ.\nÀ……ra là vậy, thịt nướng à."
# 【双鉄】
# display as 雙鐵
# JP: 「凪。そのご馳走というのは、蓑笠さん達――\n職人さん達が改装を請け負ったからのご馳走か？」
1876 = "「Nagi. Bữa tiệc đó, có phải vì nhóm bác Minokasa――\nnhóm thợ mộc đã nhận thầu việc sửa chữa nên mới được thiết đãi không?」"
# 【凪】
# display as 凪
# JP: 「そうばい！　御一夜の職人だけで、\n改装一式引き受けてお店ば綺麗にしたとよ」
2073 = "「Đúng vậy nha! Chỉ toàn thợ mộc ở Ohito,\nnhận trọn gói sửa chữa làm cho quán đẹp lên đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠さん、今日はご在宅か？」
2334 = "「Bác Minokasa, hôm nay có nhà không?」"
# 【凪】
# display as 凪
# JP: 「おると思うばい。あ！　晩御飯ならご馳走になるって、\nちゃあんと伝えておいてあっとよ？」
2120 = "「Chắc là có nha. A! Bữa tối được đãi á,\ntớ đã báo trước đàng hoàng rồi nha?」"
# monologue
# JP: 食事をこれからしたとして――
2729 = "Chuyện đi ăn tính sau đi――"
# monologue
# JP: 登呂流湯を借りる二十三時までの間には、\nある程度の時間は空くだろう。
2714 = "Từ giờ đến 23 giờ lúc thuê Tororyu-yu,\nchắc cũng còn dư ra một khoảng thời gian."
# 【双鉄】
# display as 雙鐵
# JP: 「凪、\nすまんが蓑笠さんに、電話をしてもらえるか？」
1885 = "「Nagi,\nphiền em gọi điện thoại cho bác Minokasa được không?」"
# 【凪】
# display as 凪
# JP: 「良かよ。爺ちゃんになんの話ばい？」
2339 = "「Được nha. Nói chuyện gì với ông nội vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まだ、ぼんやりとしたアイディアなのだが――」
2438 = "「Vẫn chỉ là một ý tưởng lờ mờ thôi, nhưng――」"
# monologue
# JP: イメージは頭にあるのだが、\n細かな部分を具体化できるほどではない。
3060 = "Dù hình ảnh đã có trong đầu,\nnhưng chưa đến mức có thể cụ thể hóa những phần chi tiết."
# monologue
# JP: だから、根っこの部分だけ、\nざっくり、そのままの言葉に落とす。
2858 = "Vì vậy, tôi chỉ lấy phần cốt lõi,\nnói tóm tắt lại bằng lời."
# 【双鉄】
# display as 雙鐵
# JP: 「煙には煙で――\n封じ込めが出来ないか、ご相談させていただきたいのだ」
2133 = "「Lấy khói trị khói――\nTôi muốn thảo luận xem có thể dùng cách này để phong tỏa không.」"
# 【ハチロク】
# display as 八六
# JP: 「なるほど。煙をもって煙を制するわけですね？」
1892 = "「Ra là vậy. Lấy khói chế ngự khói đúng không ạ?」"
# monologue
# JP: すぐさま、ハチロクがわかってくれる。\nならばこの案、実現可能なものかもしれん。
2655 = "Hachiroku lập tức hiểu ra ngay.\nNếu vậy thì phương án này, có lẽ là khả thi."
# 【ハチロク】
# display as 八六
# JP: 「けれど……\x%l客車;#00ffc040;客車%l;#;の室温は相当なことになるかと\n思われますが」
1858 = "「Nhưng mà……nhiệt độ phòng của \x%l客車;#00ffc040;toa hành khách%l;#; chắc sẽ\ntăng lên đáng kể đấy ạ.」"
# 【ふかみ】
# display as 深美
# JP: 「あ。それって、つまり――」
1974 = "「A. Chuyện đó, nghĩa là――」"
# 【日々姫】
# display as 日日姬
# JP: 「お待たせー――って、\nどうしたの？　なにかあった？」
1839 = "「Để mọi người chờ lâu――ủa,\nsao vậy? Có chuyện gì à?」"
# monologue
# JP: 日々姫だ。\n良い所に戻ってきてくれた。
2906 = "Là Hibiki.\nEm ấy quay lại đúng lúc thật."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫にも意見を聞きたい。ストーブの件なのだが。\n煙をもって煙を制せないかと考えている」
2126 = "「Anh cũng muốn nghe ý kiến của Hibiki. Về vụ lò sưởi ấy mà.\nAnh đang nghĩ xem có thể lấy khói trị khói được không.」"
# monologue
# JP: ハチロクのうまくまとまった言葉を借りれば、\nえっ！？　と日々姫は目を丸くする。
2847 = "Mượn lời tóm tắt ngắn gọn của Hachiroku,\nHibiki trợn tròn mắt thốt lên \"Hả!?\"."
# 【日々姫】
# display as 日日姬
# JP: 「煙で煙って――にぃに――兄さん、正気ですか？\n夏の御一夜の、しかもこの広さの室内ですよ？」
1855 = "「Khói trị khói á――anh hai――anh Soutetsu, anh tỉnh táo không đấy?\nMùa hè ở Ohito, mà phòng lại rộng chừng này cơ mà?」"
# monologue
# JP: 日々姫の疑問の声にあわせて、ふかみも頷く。\n取り残された形で一人、凪はぽかんと首を傾げる。
2939 = "Hưởng ứng giọng điệu nghi ngờ của Hibiki, Fukami cũng gật đầu.\nBị bỏ lại một mình, Nagi ngơ ngác nghiêng đầu."
# 【凪】
# display as 凪
# JP: 「みんな、何の話ばしよっと？」
2041 = "「Mọi người, đang nói chuyện gì vậy nha?」"
# 【双鉄】
# display as 雙鐵
# JP: 「つまりだな。ストーブを炊き、そこから煙を\n出してしまえば、外の煙を防げるのではという考えだ」
1842 = "「Nói tóm lại là thế này. Đốt lò sưởi, rồi cho khói\ntừ đó tỏa ra, anh nghĩ có thể sẽ ngăn được khói từ bên ngoài vào.」"
# 【凪】
# display as 凪
# JP: 「面白そうばい！　客車の中で、焼肉ばすっとね？」
2053 = "「Nghe thú vị nha! Ở trong toa hành khách, làm thịt nướng á?」"
# monologue
# JP: 理屈で一番遅れた理解を、直感で一気に進めてしまう――\n実に凪らしい一言に、僕も大きく頷き返す。
3044 = "Sự thấu hiểu lý thuyết chậm chạp nhất, lại được thúc đẩy bằng trực giác trong nháy mắt――\nMột câu nói mang đậm phong cách của Nagi, tôi cũng gật đầu mạnh mẽ đáp lại."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。基本的にはそうした線で考えている」
2003 = "「Ừm. Về cơ bản anh đang suy nghĩ theo hướng đó.」"
# 【ふかみ】
# display as 深美
# JP: 「そういうこと……。です？」
2201 = "「Là như vậy…….sao ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「確かに面白そうだけど……\n焼肉も、やっぱり暑くてケムくない？」
2300 = "「Nghe thì thú vị thật đấy nhưng mà……\nThịt nướng thì vẫn nóng và nhiều khói mà, đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「熱の方は、対策を考える必要があろうが――\n煙の方は大丈夫ではないかと、僕としては見込んでいる」
2266 = "「Về độ nóng thì chắc chắn phải nghĩ cách giải quyết rồi――\nNhưng về khói thì anh dự đoán là sẽ ổn thôi.」"
# 【ふかみ】
# display as 深美
# JP: 「どうして。です、か？」
2239 = "「Tại sao. Lại thế, ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あらかじめ、焼肉をする\x%l列車;#00ffc040;列車%l;#;とわかっているのなら、\n乗客はケムさを、ある程度覚悟してくれると思うからだ」
1922 = "「Bởi vì nếu đã biết trước đây là \x%l列車;#00ffc040;chuyến tàu%l;#; để nướng thịt,\nanh nghĩ hành khách sẽ phần nào chuẩn bị tinh thần cho việc bị ám khói.」"
# monologue
# JP: 少し考え、\nハチロクはゆっくりと頷いてくれる。
2813 = "Suy nghĩ một chút,\nHachiroku từ từ gật đầu."
# 【ハチロク】
# display as 八六
# JP: 「その点は左様でしょうか。\x%l除煙板;#00ffc040;[デフ,2]除煙板%l;#;を\x%l8620;#00ffc040;8620%l;#;に設置すれば、\n\x%l8620;#00ffc040;8620%l;#;の煙の殆どを、上へ逃がせることにもなりますし」
2387 = "「Điểm đó thì đúng là vậy ạ. Nếu lắp đặt \x%l除煙板;#00ffc040;tấm chắn khói%l;#; cho \x%l8620;#00ffc040;8620%l;#;,\nthì phần lớn khói của \x%l8620;#00ffc040;8620%l;#; sẽ được thoát lên trên.」"
# 【日々姫】
# display as 日日姬
# JP: 「ん、と……それで上に逃げた煙は、焼肉の煙に防がれて、\n流入しないで、そのまま流れていくわけで――」
1995 = "「Ừm, và……khói thoát lên trên sẽ bị khói thịt nướng cản lại,\nkhông tràn vào mà cứ thế bay đi luôn――」"
# monologue
# JP: 日々姫がスケッチブックを広げ、\nメモの代わりの絵を描いていく。
2899 = "Hibiki mở sổ phác thảo ra,\nvẽ hình minh họa thay cho việc ghi chép."
# 【日々姫】
# display as 日日姬
# JP: 「だったら\x%l客車;#00ffc040;客車%l;#;のまわりはほとんどケムくなくなって――\nあ！　それなら、窓をあけっぱなしに出来ちゃうの？」
2421 = "「Nếu vậy thì xung quanh \x%l客車;#00ffc040;toa hành khách%l;#; sẽ hầu như không còn khói nữa――\nA! Thế thì có thể mở toang cửa sổ được luôn sao?」"
# 【ふかみ】
# display as 深美
# JP: 「なるほど。です、最初からケムいって覚悟してて、\nしかも、外の煙はほとんどが上に逃げる、なら……」
1893 = "「Ra là vậy. Ừm, nếu ngay từ đầu đã chuẩn bị tinh thần là sẽ có khói,\nhơn nữa phần lớn khói bên ngoài lại thoát lên trên, thì……」"
# monologue
# JP: 不意にふかみの手が動く。\n自分の身体をストン、と撫でる。
2625 = "Đột nhiên tay Fukami cử động.\nEm ấy vuốt nhẹ dọc theo cơ thể mình."
# 【ふかみ】
# display as 深美
# JP: 「焼肉\x%l列車;#00ffc040;列車%l;#;……っていうことにするなら、エプロン――\n服が汚れないようつけて貰っておかしくない。です、し」
2062 = "「Nếu gọi là \x%l列車;#00ffc040;Chuyến tàu%l;#; Thịt nướng……thì việc phát tạp dề――\nđể quần áo không bị bẩn cũng không có gì lạ. Cả,」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、それっていい、すごくいい！　それなら煙も……\nススがもしかして出ちゃっても、結構大丈夫そうかも」
1981 = "「A, ý tưởng đó hay, hay lắm! Nếu vậy thì khói cũng……\nDù nhọ nồi có lỡ dính vào thì chắc cũng không sao đâu.」"
# 【凪】
# display as 凪
# JP: 「よかばい！　ぜーったい乗ってみたかとばいっ！」
2054 = "「Tuyệt quá nha! Nhất định tớ muốn ngồi thử một lần á!」"
# monologue
# JP: 僕には無かった視点が、\nさらなる案を、新たな共感を呼んでくれる。
2758 = "Những góc nhìn mà tôi chưa từng nghĩ tới,\nđã gợi mở thêm nhiều phương án và sự đồng tình mới."
# 【ハチロク】
# display as 八六
# JP: 「確かに。良い案かと思いますが――\nさきほども申しましたとおり、厳重な熱対策は必須かと」
2299 = "「Đúng vậy. Em nghĩ đó là một phương án hay――\nNhưng như em đã nói lúc nãy, việc có biện pháp chống nóng nghiêm ngặt là bắt buộc ạ.」"
# monologue
# JP: しかし、ハチロクは流されない。
2644 = "Tuy nhiên, Hachiroku không hề bị cuốn theo."
# 【ハチロク】
# display as 八六
# JP: 「熱で倒れる新人助士を、わたくしは何人も見てきました。\n窓開け程度では、夏場の燃焼の熱の防止にはなりません」
2128 = "「Em đã từng chứng kiến nhiều phụ lái mới bị ngất xỉu vì nóng rồi.\nChỉ mở cửa sổ thôi thì không thể chống lại sức nóng tỏa ra từ việc đốt than vào mùa hè đâu ạ.」"
# monologue
# JP: その冷静な判断が後ろにあると思えるからこそ、\n思いつくままの言葉を紡げる。
2920 = "Chính vì biết có sự phán đoán điềm tĩnh đó ở phía sau hậu thuẫn,\ntôi mới có thể tự do thốt ra những suy nghĩ nảy ra trong đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「そこは工夫だ。扇風機に、例えば氷を組み合わせれば、\n簡易的な冷風扇とできるだろう」
2386 = "「Cái đó thì phải tìm cách thôi. Chẳng hạn như kết hợp quạt máy với đá lạnh,\nchúng ta có thể tạo ra một chiếc quạt hơi lạnh tự chế.」"
# 【ハチロク】
# display as 八六
# JP: 「熱気は、冷気の壁となります。\nストーブが熱した空気は、冷風を跳ね返してしまうかと」
2265 = "「Hơi nóng sẽ tạo thành một bức tường ngăn hơi lạnh.\nKhông khí bị lò sưởi làm nóng sẽ dội ngược luồng gió lạnh lại mất ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――ああ、そうだ。\n熱気も、煙突から逃してしまえばいい」
2422 = "「Nếu vậy――à, đúng rồi.\nCho cả hơi nóng thoát ra ngoài qua ống khói là được.」"
# 【ハチロク】
# display as 八六
# JP: 「と、おっしゃいますと？」
2115 = "「Ngài nói vậy, là sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「台所の、コンロのまわりに立ててあるような防熱板。\nあれで、ストーブの周りを囲ってしまう」
2092 = "「Giống như tấm chắn nhiệt được dựng quanh bếp ga trong nhà bếp ấy.\nDùng cái đó quây kín xung quanh lò sưởi lại.」"
# monologue
# JP: 肉を焼くための、一面だけは低くして、\nその他はもう、煙突まで包むくらいで構わない。
2966 = "Chỉ để thấp một mặt dùng để nướng thịt,\nnhững mặt còn lại cứ quây kín lên tận ống khói cũng không sao."
# 【双鉄】
# display as 雙鐵
# JP: 「ストーブが必要となる季節には、防熱板を除去する。\nそれならば、最小限の改修で済むのではなかろうか」
1886 = "「Vào mùa cần dùng lò sưởi, chúng ta sẽ tháo tấm chắn nhiệt ra.\nNếu vậy, chắc chỉ cần cải tạo ở mức tối thiểu thôi nhỉ.」"
# monologue
# JP: ささっと、日々姫の鉛筆が動く。
2900 = "Tiếng bút chì của Hibiki sột soạt vang lên."
# 【日々姫】
# display as 日日姬
# JP: 「ん……いけるんじゃない？　それなら。\n見た目は、ちょっとダイナミックさを減らしちゃうけど」
1993 = "「Ưm……có vẻ khả thi đấy? Nếu làm thế.\nTuy vẻ ngoài sẽ hơi kém phần sinh động một chút.」"
# 【ふかみ】
# display as 深美
# JP: 「いいと思う。です。\n試す価値は――絶対。あるって、思う。です」
2139 = "「Mình nghĩ là được. Đấy.\nGiá trị để thử――chắc chắn. Là có, mình nghĩ vậy.」"
# 【凪】
# display as 凪
# JP: 「試験\x%l列車;#00ffc040;列車%l;#;の一番\x%l列車;#00ffc040;列車%l;#;！\nふかみちゃんと一緒に、絶対、乗せてもらうばい！！」
2236 = "「\x%l列車;#00ffc040;Chuyến tàu%l;#; thử nghiệm đầu tiên!\nTớ nhất định sẽ ngồi cùng Fukami nha!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうだろうか、ハチロク」
2110 = "「Em thấy sao, Hachiroku?」"
# monologue
# JP: ハチロクのまぶたが静かに下りる。
2680 = "Đôi mi của Hachiroku lặng lẽ khép lại."
# monologue
# JP: 目を閉じたまま――\n言葉はますます慎重そうな響きを帯びる。
2765 = "Vẫn nhắm nghiền mắt――\nGiọng nói của em ấy mang âm hưởng ngày càng thận trọng hơn."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様がご提案くださった、非常通報ブザー、\nあれも常設し、安全対策といたしましょう」
2069 = "「Chiếc còi báo động khẩn cấp mà ngài Soutetsu đề xuất,\nhãy lắp đặt cố định luôn, coi như một biện pháp an toàn ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。確かにそれは有効に機能しそうだな」
2008 = "「Ừm. Quả thực cái đó có vẻ sẽ phát huy tác dụng tốt đấy.」"
# monologue
# JP: 万が一熱にあたってご気分の悪い方が出た場合、\nそれならすぐに緊急停止をかけられる。
3006 = "Ngộ nhỡ có người cảm thấy khó chịu vì bị say nắng,\nthì có thể cho dừng khẩn cấp ngay lập tức."
# monologue
# JP: 湯医線の短さであれば、\x%lキハ07;#00ffc040;キハ07%l;#;の救援も機能しようし、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;が飛べる場所ならば、ナビも使える。
2947 = "Với chiều dài ngắn ngủi của Tuyến Yui, việc cứu hộ bằng \x%lキハ07;#00ffc040;KiHa 07%l;#; cũng sẽ phát huy tác dụng,\nvà nếu là nơi \x%lエアクラ;#00ffc040;Aircra%l;#; có thể bay tới, thì cũng có thể dùng Navi."
# 【ハチロク】
# display as 八六
# JP: 「そこから先は、技術面や営業面……\n蓑笠様、ポーレット様とのご相談かと」
2247 = "「Còn những phần sau đó, về mặt kỹ thuật hay kinh doanh……\nCó lẽ cần thảo luận với bác Minokasa và cô Paulette ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロク、\n\x%l除煙板;#00ffc040;[デフ,2]除煙板%l;#;の図面を起こしてくれ」
2425 = "「Nếu vậy Hachiroku,\nem phác thảo bản vẽ \x%l除煙板;#00ffc040;tấm chắn khói%l;#; giúp anh nhé.」"
# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄様」
2135 = "「Đã rõ thưa ngài Soutetsu.」"
# monologue
# JP: ハチロクが賛成をしてくれるなら、\nこの案、きっとモノになる。
2876 = "Nếu Hachiroku đã tán thành,\nthì phương án này nhất định sẽ thành công."
# 【ハチロク】
# display as 八六
# JP: 「ですが――」
1856 = "「Nhưng mà――」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
1959 = "「Hử?」"
# monologue
# JP: ツ、とハチロクの視線が動く。\n追えば、すぐさま理由がわかる。
2671 = "Xẹt, ánh mắt Hachiroku khẽ di chuyển.\nNhìn theo, tôi lập tức hiểu ra lý do."
# monologue
# JP: 凪が椅子へと崩れ落ち、\nその全身で、空腹感をアピールしている。
2701 = "Nagi đang ngã gục xuống ghế,\ndùng toàn thân để thể hiện sự đói lả."
# 【ハチロク】
# display as 八六
# JP: 「図面起こしは、\nお食事の後といたしませんか？」
1944 = "「Việc phác thảo bản vẽ,\nđể sau khi ăn xong được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……上手く撮れたな。\nセルフシャッターを使うのは初めてだったが」
1557 = "「……Chụp đẹp thật đấy.\nMặc dù đây là lần đầu anh dùng chế độ hẹn giờ chụp tự động.」"
# monologue
# JP: 撮った写真を確認すれば、\n日々姫も覗きこんでくる。
2824 = "Vừa kiểm tra lại bức ảnh đã chụp,\nHibiki cũng ngó vào xem."
# 【日々姫】
# display as 日日姬
# JP: 「う～私ちょっと引きつってるかも。\nせっかくの記念写真なのに」
1961 = "「Ư~ mặt em có vẻ hơi cứng thì phải.\nĐã cất công chụp ảnh kỷ niệm rồi mà.」"
# 【ハチロク】
# display as 八六
# JP: 「大丈夫。とてもかわいらしく写ってますよ？\n誇らしげで、少し緊張してらして」
2225 = "「Không sao đâu. Em lên hình trông đáng yêu lắm đó nha?\nVừa đầy tự hào, lại xen chút căng thẳng nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お前もな」
1862 = "「Cả em nữa đấy.」"
# monologue
# JP: 自己紹介のような言葉に、\n帽子ごし、思わず頭を撫でてしまう。
2763 = "Nghe những lời như thể đang tự miêu tả chính mình,\ntôi bất giác xoa đầu em ấy qua lớp mũ."
# monologue
# JP: 少しくすぐったそうな顔をして、\nけれどもすぐさまハチロクは、帽子と表情を引き締め直す。
2657 = "Hachiroku làm ra vẻ hơi nhột,\nnhưng ngay lập tức em ấy chỉnh lại mũ và lấy lại vẻ mặt nghiêm túc."
# 【ハチロク】
# display as 八六
# JP: 「さて、まさしく日々姫の言葉通りの、\n記念すべき一号\x%l列車;#00ffc040;列車%l;#;です」
2430 = "「Nào, đúng như lời Hibiki đã nói,\nđây là \x%l列車;#00ffc040;chuyến tàu%l;#; số 1 vô cùng đáng nhớ ạ.」"
# monologue
# JP: 凛とした声。\n日々姫の背筋もぴいんと伸びる。
2668 = "Giọng nói dõng dạc.\nSống lưng Hibiki cũng vươn thẳng lên."
# 【ハチロク】
# display as 八六
# JP: 「試験走行を重ねる間に、双鉄様も日々姫も、\n極めて質の高い成長を重ねてくださったと感じています」
2312 = "「Trong suốt quá trình chạy thử nghiệm, em cảm thấy cả ngài Soutetsu và Hibiki,\nđều đã có những bước trưởng thành với chất lượng cực kỳ cao ạ.」"
# monologue
# JP: 頷きかけて、引き締める。\n思い上がってはいかんと思うが……成長できた実感もある。
2855 = "Tôi khẽ gật đầu, rồi chấn chỉnh lại tinh thần.\nDù biết không được tự kiêu nhưng……tôi cũng cảm nhận được sự trưởng thành của bản thân."
# monologue
# JP: \x%l除煙板;#00ffc040;除煙板%l;#;。吸い込み煙突。扇風機。\n装備する度のトラブルは、着実に僕を鍛えてくれた。
73 = "\x%l除煙板;#00ffc040;Tấm chắn khói%l;#;. Ống khói hút. Quạt máy.\nNhững rắc rối mỗi khi lắp đặt thiết bị, đã rèn giũa tôi một cách vững chắc."
# 【ハチロク】
# display as 八六
# JP: 「試験運転の後期には、満席の\x%l客車;#00ffc040;客車%l;#;も引いています。\nしかし――」
2340 = "「Vào giai đoạn cuối của quá trình chạy thử, chúng ta cũng đã kéo \x%l客車;#00ffc040;toa hành khách%l;#; kín chỗ.\nTuy nhiên――」"
# monologue
# JP: ハチロクの目が僕を見る。\nわかっていると頷き返す。
2667 = "Ánh mắt Hachiroku nhìn tôi.\nTôi gật đầu đáp lại như muốn nói đã hiểu."
# monologue
# JP: 営業運転の今日からは、運転に関し為される全ては、\n\x%l機関士;#00ffc040;機関士%l;#;である、僕の責任となるのだと。
2801 = "Kể từ ngày hôm nay khi bắt đầu hoạt động thương mại, mọi vấn đề liên quan đến việc lái tàu,\nđều sẽ thuộc trách nhiệm của tôi, với tư cách là một \x%l機関士;#00ffc040;lái tàu%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「試験と本番は別物だ。\n全てゼロから重ねるつもりで挑まねばならん」
2238 = "「Thử nghiệm và thực tế là hai chuyện khác nhau.\nPhải bước vào với tâm thế bắt đầu lại mọi thứ từ con số không.」"
# monologue
# JP: だからハチロクの言葉を引き継ぎ、\n僕の言葉で、チームを、自身を、引き締める。
2861 = "Chính vì vậy, tôi tiếp nối lời của Hachiroku,\ndùng lời nói của chính mình để xốc lại tinh thần cho cả đội và bản thân."
# 【双鉄】
# display as 雙鐵
# JP: 「栄えある一番\x%l列車;#00ffc040;列車%l;#;だ。多少のトラブルには目をつぶり、\nとにかく走りきらせたい気持ちも、正直持ってる。が」
2389 = "「Đây là \x%l列車;#00ffc040;chuyến tàu%l;#; số 1 đầy vinh quang. Thú thực là anh cũng có suy nghĩ\nmuốn nhắm mắt làm ngơ trước vài rắc rối nhỏ để cố chạy cho xong. Nhưng,」"
# 【日々姫】
# display as 日日姬
# JP: 「それでも――安全が第一の使命だから」
1864 = "「Dù vậy――an toàn vẫn là sứ mệnh đặt lên hàng đầu.」"
# monologue
# JP: 日々姫も、わかってくれている。\nハチロクの臆病なほどの安全姿勢が、なにゆえなのかを。
2895 = "Hibiki cũng đã hiểu được.\nLý do vì sao Hachiroku lại có thái độ đề cao an toàn đến mức rụt rè như vậy."
# monologue
# JP: 例え苦情にまみれようとも、事故を起こさぬことこそが、\n鉄道運輸の、最高最大の栄誉なのだと。
2797 = "Cho dù có bị phàn nàn đi chăng nữa, thì việc không để xảy ra tai nạn\nmới chính là vinh dự cao quý và to lớn nhất của ngành vận tải đường sắt."
# 【双鉄】
# display as 雙鐵
# JP: 「ちいさな異常も見逃さず、止めることを恐れず行こう。\n今後走行を重ねるための、これは一歩にすぎんのだから」
1830 = "「Không được bỏ qua dù chỉ là một điểm bất thường nhỏ, và đừng ngại việc dừng tàu lại.\nBởi vì đây cũng chỉ là một bước đệm để tiếp tục những chuyến đi sau này thôi.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。了解」
2004 = "「Vâng. Đã rõ.」"
# 【ハチロク】
# display as 八六
# JP: 「承りました。[マイ・マスター,2]双鉄様」
2166 = "「Em đã hiểu. Thưa ngài Soutetsu, [マイ・マスター,2]Master của em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2455 = "「!」"
# monologue
# JP: オーナーではなく、マスターと。
2753 = "Không phải chủ sở hữu, mà là Master."
# monologue
# JP: ハチロクの認める\x%l機関士;#00ffc040;機関士%l;#;なのだと、\n初めて、はっきりと言ってもらえた。
2676 = "Lần đầu tiên, em ấy nói rõ ràng rằng,\ntôi là \x%l機関士;#00ffc040;lái tàu%l;#; được Hachiroku công nhận."
# 【ハチロク】
# display as 八六
# JP: 「――れいなから\x%l共感;#00ffc040;共感%l;#;が入りました。\n\x%l客車;#00ffc040;客車%l;#;側、着席誘導完了です」
1539 = "「――Reina vừa truyền \x%l共感;#00ffc040;cộng cảm%l;#; đến ạ.\nPhía \x%l客車;#00ffc040;toa hành khách%l;#;, đã hoàn tất việc hướng dẫn ổn định chỗ ngồi.」"
# 【日々姫】
# display as 日日姬
# JP: 「よおしっ！」
2055 = "「Được rồi!」"
# monologue
# JP: 日々姫がワンスコをその手に掴む。\n焚き口のフタが開けばパっと、炎が逆巻く。
2896 = "Hibiki nắm lấy chiếc xẻng xúc than.\nKhi nắp cửa lò mở ra, ngọn lửa bùng lên cuồn cuộn."
# monologue
# JP: もうハチロクの指示がなくとも大丈夫。\n発車にあわせてきっちり\x%lカマ;#00ffc040;カマ%l;#;を仕上げてくれる。
2719 = "Dù không có chỉ thị của Hachiroku cũng không sao.\nEm ấy đã chuẩn bị \x%lカマ;#00ffc040;lò hơi%l;#; hoàn hảo để sẵn sàng khởi hành."
# 【双鉄】
# display as 雙鐵
# JP: 「後方確認」
2304 = "「Xác nhận phía sau.」"
# monologue
# JP: キャブの窓から身を乗り出せば、\nポーレットの手の\x%l緑旗;#00ffc040;緑旗%l;#;が左右に大きく振られる。
2831 = "Nhoài người ra khỏi cửa sổ buồng lái,\ntôi thấy \x%l緑旗;#00ffc040;lá cờ xanh lá%l;#; trên tay Paulette vẫy mạnh sang hai bên."
# monologue
# JP: 「確認した」と\x%l汽笛;#00ffc040;汽笛%l;#;を短く鳴らし答えれば、\n整った敬礼を送ってもらえる。
2844 = "Kéo một hồi \x%l汽笛;#00ffc040;còi hơi nước%l;#; ngắn để đáp lại \"Đã xác nhận\",\ncô ấy liền gửi lại một cái chào nghiêm trang."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
2440 = "「Ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2009 = "「Ừ.」"
# monologue
# JP: 大きな大きなハンドベルを抱えたハチロクを、\nその体ごと抱えて窓へ差し出す。
2834 = "Tôi bế thốc Hachiroku cùng chiếc chuông tay thật to\nđang ôm trong lòng, đưa em ấy ra ngoài cửa sổ."
# monologue
# JP: （ガラーーーン！　ガラーーーンっ！）
3090 = "（Kenggg! Kenggg!）"
# monologue
# JP: ハンドベルの音。\n途端、無数の光が閃く。
2992 = "Tiếng chuông tay vang lên.\nNgay lập tức, vô số ánh đèn lóe sáng."
# monologue
# JP: ホームに集ったたくさんの人達が手にするカメラが、\n一斉のフラッシュで\x%l8620;#00ffc040;8620%l;#;と\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;を照らしだす。
2995 = "Những chiếc máy ảnh trên tay dòng người tụ tập ở sân ga,\nđồng loạt chớp flash soi sáng \x%l8620;#00ffc040;8620%l;#; và \x%lストーブ客車;#00ffc040;toa xe sưởi ấm%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「『バーベキュートレイン　もくもく[ハチロク,3]8620』１号、\n発車準備良し」
1544 = "「Chuyến số 1 của 『Chuyến tàu Thịt nướng Mokumoku 8620』,\nđã chuẩn bị khởi hành xong.」"
# 【ハチロク】
# display as 八六
# JP: 「[ハチロク,3]8620　1号、発車準備良し！」
1531 = "「8620 chuyến số 1, đã chuẩn bị khởi hành xong!」"
# monologue
# JP: ハチロクを席へ戻した腕で、ブレーキ解除、\x%l前進フルギア;#00ffc040;前進フルギア%l;#;。\n\x%l加減弁;#00ffc040;加減弁%l;#;テコを握りこむ。
2829 = "Bằng chính cánh tay vừa đặt Hachiroku trở lại ghế, tôi nhả phanh, \x%l前進フルギア;#00ffc040;cài hết số tiến%l;#;.\nNắm chặt tay gạt \x%l加減弁;#00ffc040;van tiết lưu hơi%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「本線信号――」
2090 = "「Tín hiệu tuyến chính――」"
# monologue
# JP: いつもの様に目視、指差し。\n一瞬、ハチロクと視線を交わす。
2733 = "Mắt nhìn, tay chỉ như mọi khi.\nTrong một khoảnh khắc, tôi và Hachiroku giao ánh mắt."
# 【ハチロク】
# display as 雙鐵＆八六
# JP: 『「出発！　進行！！」\n「出発！　進行！！」』
2474 = "『「Xuất phát! Tiến lên!!」\n「Xuất phát! Tiến lên!!」』"
# monologue
# JP: （がやがや、ざわざわ）
3086 = "（Xôn xao, ồn ào）"
# 【永山】
# display as 永山
# JP: 「はい、どうぞ。冷たいお水とおしぼりとエプロンです。\nおしぼりは、首の周りに巻くとスッキリ涼しいですよ」
1863 = "「Vâng, xin mời. Nước lạnh, khăn ướt và tạp dề đây ạ.\nQuấn khăn ướt quanh cổ sẽ thấy mát mẻ sảng khoái lắm đấy.」"
# 【凪】
# display as 凪
# JP: 「ありがとばーい！」
2359 = "「Cảm ơn nha!」"
# monologue
# JP: 顔ばごしごし拭いてから、言われたとおりに首に巻いたら、\nひゃっこくてまっこと気持ちよか！
2871 = "Lau mặt thật mạnh, rồi quấn quanh cổ như lời cô ấy nói,\nmát lạnh sảng khoái cực kỳ nha!"
# 【永山】
# display as 永山
# JP: 「お水のおかわりはサービスですから。\nいつでもいってくださいね」
2222 = "「Nước được phục vụ miễn phí nên muốn uống thêm\ncứ gọi tôi bất cứ lúc nào nhé.」"
# 【ふかみ】
# display as 深美
# JP: 「ありがとうございます」
2446 = "「Em cảm ơn ạ.」"
# monologue
# JP: お辞儀してタオルば受け取って、\n汗、丁寧にぬぐいよる。
2789 = "Cúi đầu nhận lấy chiếc khăn,\ncẩn thận lau đi những giọt mồ hôi."
# monologue
# JP: ふかみちゃん、結構汗ばかくほうやけん、\nお水、もらうなりごくごく飲んどる。
2760 = "Fukami thuộc tuýp người khá dễ đổ mồ hôi,\nnên vừa nhận được nước là uống ừng ực luôn."
# 【ふかみ】
# display as 深美
# JP: 「凪ちゃん。あの人、感じいいよね」
2075 = "「Nagi. Người đó, thân thiện ghê nhỉ.」"
# 【凪】
# display as 凪
# JP: 「どこの人と？\nポーレットねえちゃんの知り合いばい？」
1957 = "「Người ở đâu vậy?\nNgười quen của chị Paulette hả?」"
# 【ふかみ】
# display as 深美
# JP: 「そうだって。[ゆうれいでら,2]幽霊寺の奥さんで、\n昔、食堂車に乗ってた人だって話だよ？」
2048 = "「Hình như vậy đó. Là phu nhân của chùa Yurei,\nnghe nói ngày xưa từng làm việc trên toa ăn thì phải?」"
# 【凪】
# display as 凪
# JP: 「ふーん、なら適材適所いうヤツとねぇ」
1955 = "「Hừm, vậy là đúng người đúng việc rồi nha.」"
# 【ふかみ】
# display as 深美
# JP: 「だよね。けど、凪ちゃんがガイドさんでも、\nきっと人気出るって思うけど」
2173 = "「Đúng thế. Nhưng mà, nếu Nagi làm hướng dẫn viên,\nmình nghĩ chắc chắn cũng sẽ rất được yêu thích đó.」"
# monologue
# JP: 確かにガイド、楽しそうでやってみたいって\n気もするばってん――
3061 = "Đúng là làm hướng dẫn viên có vẻ vui, tớ cũng muốn thử xem sao,\nnhưng mà――"
# 【凪】
# display as 凪
# JP: 「ウチもなかなか売れっ子やけん。\nこれ以上お仕事ば増やしたら、さすがに身がもたんもん」
1943 = "「Tớ dạo này cũng khá đắt sô đó nha.\nNhận thêm việc nữa thì sức đâu mà kham nổi.」"
# 【ふかみ】
# display as 深美
# JP: 「だよねぇ、焼肉\x%l列車;#00ffc040;列車%l;#;――じゃないや。\nええと、バーベキュートレインになったんだよね」
2182 = "「Cũng đúng ha, \x%l列車;#00ffc040;chuyến tàu%l;#; thịt nướng――à không.\nỪm, đổi tên thành chuyến tàu BBQ rồi nhỉ.」"
# 【凪】
# display as 凪
# JP: 「そうばい。\n名前、その方がかっこよかばい！」
2070 = "「Đúng đó nha.\nTên đó nghe ngầu hơn nhiều nha!」"
# 【ふかみ】
# display as 深美
# JP: 「だよね。\n日々姫さんって、センスいいよね。やっぱり」
2176 = "「Đúng vậy ha.\nChị Hibiki có gu thẩm mỹ tốt thật đấy. Quả nhiên là vậy.」"
# 【凪】
# display as 凪
# JP: 「センスばなんだはよーわからんけど、\nわかりやすくてかっこよかばい！」
2436 = "「Gu thẩm mỹ là gì thì tớ không rõ lắm,\nnhưng mà dễ hiểu với ngầu là được nha!」"
# 【ふかみ】
# display as 深美
# JP: 「だよね。だから、バーベキュートレイン。\nきっとうまくいくよね」
2174 = "「Đúng vậy ha. Cho nên, chuyến tàu BBQ.\nChắc chắn sẽ thành công tốt đẹp thôi.」"
# 【凪】
# display as 凪
# JP: 「うまくいかせるばい！　それで、\n川下りにもどーんとお客さん引っ張るばい！」
1941 = "「Phải làm cho nó thành công chứ! Rồi từ đó,\nkéo thêm cả một đống khách đi thuyền xuôi dòng luôn nha!」"
# 【ふかみ】
# display as 深美
# JP: 「うんっ」
# 2009 = "「嗯」" 
# monologue
# JP: やる気ば出たのか、\nふかみちゃん、きょろきょろってしよる。
2728 = "Có lẽ vì đã lấy lại được tinh thần,\nFukami ngó nghiêng xung quanh."
# 【ふかみ】
# display as 深美
# JP: 「そんなに、暑そうにしてる人いないね」
2049 = "「Có vẻ không có ai thấy nóng lắm nhỉ.」"
# 【凪】
# display as 凪
# JP: 「風がわーって入ってくる分、\n外よりむしろ涼しか気がするけんねぇ」
1918 = "「Có gió lùa vào nên\ntớ thấy còn mát hơn cả ở ngoài đó nha.」"
# 【ふかみ】
# display as 深美
# JP: 「だよね、不思議。\nストーブ、カンカンに燃えているのに」
2186 = "「Đúng thế ha, lạ thật.\nMặc dù lò sưởi đang cháy hừng hực.」"
# 【凪】
# display as 凪
# JP: 「防熱板ば頑張っとるけん。\nさすが爺ちゃんの特製ばい！」
2203 = "「Là nhờ tấm chắn nhiệt đó nha.\nQuả không hổ danh đồ ông nội đặc chế!」"
# 【ふかみ】
# display as 深美
# JP: 「うん」
# 2009 = "「嗯」" 
# monologue
# JP: またきょろきょろ。\nふかみちゃん、なんだか気合いれすぎたい。
2779 = "Lại ngó nghiêng.\nFukami có vẻ hơi căng thẳng quá mức rồi nha."
# 【凪】
# display as 凪
# JP: 「ふかみちゃん、そぎゃんと力むと、\nふかみちゃんが倒れちゃいそうでおっかなか」
2078 = "「Fukami này, cậu mà cứ gồng mình lên như thế,\ntớ sợ cậu xỉu mất đó nha.」"
# 【ふかみ】
# display as 深美
# JP: 「あ……そうだね。リラックス、リラックス」
1969 = "「A……cũng phải ha. Thư giãn, thư giãn nào.」"
