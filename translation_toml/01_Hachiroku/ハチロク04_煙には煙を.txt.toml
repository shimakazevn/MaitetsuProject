# JP: すうって、息ば吸いて吐く。\nふかみちゃん、それでちょっとは落ち着いたみたいばい。
2787 = "Hít một hơi thật sâu rồi thở ra.\nFukami có vẻ đã bình tĩnh lại đôi chút rồi nha."
# 【ふかみ】
# display as 深美
# JP: 「ポーレットさんもれいなちゃんもいないから、\n\x%l客車;#00ffc040;客車%l;#;で何かあったら私達が頑張らなきゃって、それで」
2229 = "「Vì không có chị Paulette và bé Reina ở đây,\nnên nhỡ trong \x%l客車;#00ffc040;toa hành khách%l;#; có chuyện gì thì bọn mình phải cố gắng xử lý, nên là.」"
# 【凪】
# display as 凪
# JP: 「言われたら、一番\x%l列車;#00ffc040;列車%l;#;にもポーレットねえちゃんたち\n乗っとらんねぇ」
2395 = "「Nhắc mới nhớ, chuyến \x%l列車;#00ffc040;tàu%l;#; đầu tiên chị Paulette và mọi người\ncũng không đi nha.」"
# monologue
# JP: 試験のときも、ぜーんぜん乗っておらんかったし――
2757 = "Hồi chạy thử cũng không đi lần nào luôn――"
