2109 = "「Làm gì có. Không phải đâu. Hoàn toàn ngược lại ấy.\nAnh Soutetsu đang giúp giảm bớt gánh nặng cho chị Paulette đó.」"
# 【凪】
# display as 凪
# JP: 「ふぅん？」
2014 = "「Hửm?」"
