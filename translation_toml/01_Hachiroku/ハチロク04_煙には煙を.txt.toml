2105 = "「Làm cho thị trấn Ohito nhộn nhịp lên,\nrồi kéo thêm nhiều khách đi thuyền xuôi dòng nữa nha!」"
# 【ふかみ】
# display as 深美
# JP: 「だね、凪ちゃん！」
2181 = "「Đúng vậy, Nagi!」"
# monologue
