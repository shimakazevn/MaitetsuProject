[script]
# lines: 394 
# 【双鉄】
# display as 雙鐵
# JP: 「すまんな、遅くまで付きあわせて」
1824 = "「不好意思，讓你們陪我到這麼晚」" 

# 【ふかみ】
# display as 凪＆深美
# JP: 『「まっことばい！」\n「いいえ、そんな」』
2476 = "『「就是說啊！」\\n「請不用這麼客氣」』" 

# monologue
# JP: 正反対の声と声とが、\x%l客車;#00ffc040;客車%l;#;の壁に吸い込まれていく。
2652 = "兩道意思截然相反的聲音被\\x%l客車;#00ffc040;客運車廂%l;#;的牆壁所吸收。" 

# 【ふかみ】
# display as 深美
# JP: 「どうせ夜は、川下りありません、し。\n夜、あんまり\x%l列車;#00ffc040;列車%l;#;に乗ることないから――面白い。です」
1914 = "「反正晚上沒人去漂流。因為我很少晚上坐\\x%l列車;#00ffc040;列車%l;#;——所以我感覺很有趣。嗯」" 

# 【凪】
# display as 凪
# JP: 「あ、そりゃそーばい」
1989 = "「啊，那倒也是咧」" 

# monologue
# JP: ふかみが言えば、凪がぐるりと意見を変えてそれに乗る。\n最近しばしば見かける気がする光景だ。
2944 = "深美這麼一說，凪也改變了意見附和道。最近好像經常能看見這樣的情景。" 

# monologue
# JP: このふたり、精神面でのリーダーシップは、\nあるいはふかみが取っているのかもしれん。
2856 = "或許是深美在她們兩人中發揮了精神面上的主導作用。" 

# 【ハチロク】
# display as 八六
# JP: 「いかがでした？　ブザーは鳴りませんでしたが」
2111 = "「怎麼樣？蜂鳴器完全沒有響」" 

# 【日々姫】
# display as 日日姬
# JP: 「煙、全然入ってこなかった？」
2258 = "「煙一點都沒進來？」" 

# monologue
# JP: それぞれの持ち場の点検を終え、\nハチロクと日々姫とも\x%l客車;#00ffc040;客車%l;#;内へとやってくる。
2978 = "結束各自管轄區域的檢查後，我和八六還有日日姬一起進到了\\x%l客車;#00ffc040;客運車廂%l;#;裡。" 

# monologue
# JP: わざと黒煙を立たせる試験までしたせいもあり、\n僕と同じく日々姫も全身、いつも以上に煤けてる。
2744 = "因為還特地進行了產生黑煙的實驗的關係，日日姬也和我一樣全身黑漆漆的。" 

# 【ふかみ】
# display as 深美
# JP: 「煙は、ちょっとも――入ってこなかった。です、し、\nケムイとも、感じなかった。です」
2257 = "「煙一點都沒進來。也不覺得熏人。嗯」" 

# 【凪】
# display as 凪
# JP: 「大変だったのは、\nブザー押したいの我慢するくらいだったばい！」
1962 = "「唯一不好的事，就是好想按蜂鳴器卻不得不忍住咧！」" 

# monologue
# JP: 凪の視線が、壁際の、\n仮設してある非常ブザーのボタンを眺め――
2702 = "凪的視線看向牆邊臨時安裝的緊急蜂鳴器——" 

# monologue
# JP: （ブーーーーーーーーっ！）
3091 = "（嗚————————！）" 

# monologue
# JP: ――たかと思うと、思い切り押す。
1519 = "——然後用力一按。" 

# monologue
# JP: 走行してない、静まりきった今ならば、\n\x%l運転台;#00ffc040;運転台%l;#;で鳴ったブザーが、この\x%l客車;#00ffc040;客車%l;#;にまで響いて届く。
2962 = "現在列車沒有運行，整輛車都是靜悄悄的，所以在\\x%l運転台;#00ffc040;駕駛台%l;#;響起的蜂鳴器的聲音會傳到這節\\x%l客車;#00ffc040;客運車廂%l;#;裡。" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、まだ押し足りないのですか？\n運転前にも、さんざ押されたではありませんか」
1937 = "「呀，還沒按夠嗎？在發車前不是按過很多次了嗎」" 

# 【凪】
# display as 凪
# JP: 「練習と本番ば、まるきり別たい！」
2314 = "「練習和正式上場那可是兩回事！」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ」
1976 = "「啊」" 

# monologue
# JP: 苦笑と微笑の、ちょうど真ん中。
2670 = "八六的臉上掛起了介於苦笑和微笑之間的笑容。" 

# monologue
# JP: 凪より小さいハチロクは、\nなんとも大人びた笑みで、凪の無邪気さを受け止める。
2924 = "比凪還嬌小的八六以分外成熟的微笑容忍了凪天真無邪的舉動。" 

# 【ハチロク】
# display as 八六
# JP: 「確かに、練習と本番はまるで別物ですね。\n同じように走ったつもりでも、再現できませんでしたか」
2301 = "「確實，練習和正式上場不是一回事。所以就算想要做到完全一致也是無法重現的」" 

# monologue
# JP: 煙が流入してきたら、即座にブザーを押して貰う。
2818 = "我們囑咐她，只要煙湧進來，立刻按下蜂鳴器。" 

# monologue
# JP: すぐに非常停止をし、\x%lカマ;#00ffc040;カマ%l;#;はそのまま維持をして、\n煙の様子を確認しにいく――そんな計画だったのだ。が。
3056 = "隨後馬上緊急停車，將\\x%lカマ;#00ffc040;窯%l;#;保持原樣，之後去確認煙的情況——本來計劃是這樣的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――せっかく録画までしたのにな」
1536 = "「——明明還難得錄了像的」" 

# monologue
# JP: ポーレットから借りてストーブの前に据え付けていた、\n小さなムービーカメラを止める。
2854 = "我關掉了從波萊特那裡借來並架在暖爐前的迷你攝影機。" 

# monologue
# JP: 流入がまるでなかったのなら、\n再生するだけ時間の無駄となってしまおう。
2878 = "既然沒有煙流入，再錄下去也不過是回看時候多浪費點時間而已。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ままならんもんだ。\n煙の流入が無いこと自体は、喜ぶべきことなんだがなぁ」
1823 = "「不可能萬事如意啊。雖然沒有煙流入本來就是件好事」" 

# 【ハチロク】
# display as 八六
# JP: 「夜ですし……\n外がさほど暑く無いことが影響したのかもしれません」
2282 = "「畢竟是晚上……可能是因為外面還不算很熱」" 

# 【日々姫】
# display as 日日姬
# JP: 「そっか、天気とか気温も影響してくるんだ」
2071 = "「對哦，天氣和氣溫之類的因素也會造成影響啊」" 

# monologue
# JP: それは当然のことなのだけれど、\nここまで顕著に現れるとは、正直思っていなかった。
3062 = "雖然這是理所當然的事，但老實說，我沒想到會有這麼明顯。" 

# monologue
# JP: 風向きや温度だけでなく、営業運転となるのなら、\n客の数により重量も、毎日変化してくるであろうし――
2619 = "不僅是風向和溫度，如果開始商業運營的話，每一天車的重量都會隨客人的數量而變化——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……日によってこれほど煙の流れが変わるなら、\n煙突の改修などでは対処しきれないかもしれんな」
1555 = "「……如果不同的環境會導致煙的情況有這麼巨大的變化，我們或許無法透過改裝煙囪來解決問題」" 

# 【ハチロク】
# display as 八六
# JP: 「かもしれませんが――\nでしたら、どのような方策を？」
2141 = "「或許如此——那麼您有何方案？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ……」
1991 = "「嗯……」" 

# monologue
# JP: ポーレットの顔が頭に浮かぶが、うかつに頼めば、\n恐らくそのため、睡眠時間を削ってしまうに違いない。
3002 = "腦海裡浮現出波萊特的臉，但若是隨便拜託她的話，恐怕她會為此減少睡眠時間來工作。" 

# monologue
# JP: かといって、そう簡単に良さそうな案も浮かんでこない。\nならば他。他に、アイディアをくれそうなのは――
3063 = "雖說如此，我也想不到又簡單又合適的方案。那麼得找別人。其他能給好主意的人有——" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉や、蓑笠さん、あとボイラ屋の[はた]秦さんなどに、\n相談してみるのも良いかもしれんな」
2142 = "「或許找真闇姐和蓑笠先生，還有鍋爐店的秦先生他們談一談比較好」" 

# 【ハチロク】
# display as 八六
# JP: 「わかりました。\nでは、とりあえずはそのようにいたしましょ――」
2138 = "「我知道了。那麼目前就先這樣——」" 

# monologue
# JP: （ぐ～っ）
3088 = "（咕～）" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ、わたくしではございませんよ？」
1821 = "「不、不是我發出的哦」" 

# monologue
# JP: 尋ねる前の、即座の否定。\nその傍らの日々姫も首を横に振ってる。
2839 = "我沒來得及問她就否認了。旁邊的日日姬也搖搖頭。" 

# 【凪】
# display as 凪
# JP: 「お腹へったばーい！」
2326 = "「肚子餓癟囉！」" 

# monologue
# JP: なら誰が――思うより先、あっけらかんと凪が笑う。\nその横でふかみがうつむき、頬を恥ずかしげに染めている。
2709 = "到底是誰——我剛這麼想，凪就滿不在乎地笑了。旁邊的深美低著頭，羞紅了臉。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。店が閉まっては約束も果たせなくなる。\n時間も時間だ。話は、食事しながらの方が良いか」
1841 = "「也好。關店了就沒辦法完成約定了。畢竟現在也不早了，我們一邊吃一邊談比較好」" 

# 【凪】
# display as 凪
# JP: 「やったー！　待ってましたばーい！」
2044 = "「太好啦！咱等不及了！」" 

# 【ふかみ】
# display as 深美
# JP: 「あの……ほんとに、ばんごはん。\nごちそうになっちゃって――いい――です、か？」
2412 = "「那個……我們真的可以一起去吃晚餐嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。試験につきあってもらっているしな」
2283 = "「當然。你們都幫忙做測試了」" 

# monologue
# JP: ふかみが協力を申し出てくれた上、他に適任者もいない。\n素直に嬉しくありがたく、同時に申し訳無さも感じる。
2942 = "深美自己提出要幫忙，而且也沒其他合適的人。我在衷心感到高興以及感激的同時，也有幾分愧疚。" 

# monologue
# JP: 煙の流入の監視というのは……\n炭鉱のカナリアじみた仕事だと、どうも感じてしまうので。
2741 = "因為我覺得監視煙流入的工作……就像是煤礦裡的金絲雀一樣。" 

# 【日々姫】
# display as 日日姬
# JP: 「今日はねぇね――姉さんがおでかけだから、\n私たち、何もなくても外食の予定だったし」
1848 = "「今天阿姐——姐姐不在家，所以我們本來就打算在外面吃的」" 

# monologue
# JP: 言って日々姫は、少しおどけて鼻の頭を指先でこする。
3026 = "說完日日姬有些搞怪地用指尖摩擦鼻尖。" 

# 【日々姫】
# display as 日日姬
# JP: 「っていっても、お風呂入るまではススついてるから、\nそんなにおしゃれなお店とかにはいけないけど」
2437 = "「雖然這麼說，但因為沒洗澡之前全身都是煤灰，所以不能去太講究的店」" 

# 【凪】
# display as 凪
# JP: 「おしゃれなお店とか、ウチが無理ばいっ！」
2410 = "「那些有講究的店咱還應付不來吶！」" 

# monologue
# JP: 凪のその声に、ふかみが笑う。\nそしてぺこりと頭をさげる。
2997 = "聽見凪這句話，深美笑了，隨後她鞠了一躬。" 

# 【ふかみ】
# display as 深美
# JP: 「それなら……お言葉に甘えて、\nごちそうになっちゃいます、です」
2423 = "「那麼……我們就接受各位的好意了。嗯」" 

# 【日々姫】
# display as 日日姬
# JP: 「決まりね！　じゃ、ちょっとだけ待ってて、\n着替えてくるから」
2415 = "「那就說好了！麻煩你們等一下，我去換件衣服」" 

# 【ふかみ】
# display as 深美
# JP: 「双鉄さんは……ええと、いいんですか？\nその、着替え。とか」
2439 = "「雙鐵先生……呃，不用換衣服嗎？嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「男の着替えだ。三分もあればことたりる。\n話が済んでからでよかろう」
2280 = "「男人換衣服三分鐘就夠了。談完後再換也不遲」" 

# 【凪】
# display as 凪
# JP: 「話って、まだ他にあるばい？」
2397 = "「還有其他事要談？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あるとも。何を食べるか――」
2418 = "「那當然。比如吃什麼好——」" 

# 【凪】
# display as 凪
# JP: 「肉っ！」
2325 = "「肉！」" 

# monologue
# JP: 言い切らぬうち、\n凪先生は立上がっての力説だ。
2853 = "我還沒說完，凪老師就跳起來大聲主張道。" 

# 【凪】
# display as 凪
# JP: 「ガッツリ肉ば食べたかよー！\nふかみちゃんは、どぎゃんと？」
2119 = "「想吃好多好多肉！小深你怎麼想的？」" 

# 【ふかみ】
# display as 深美
# JP: 「わたしは……別に、好き嫌いない、し。\n凪ちゃんと双鉄さんたちが、食べたいもので。です」
2122 = "「我……反正不挑剔。小凪和雙鐵先生吃什麼，我就吃什麼。嗯」" 

# 【凪】
# display as 凪
# JP: 「なら、肉でよかと？」
2414 = "「那就決定吃肉啦？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。焼肉ならば、ススの汚れも目立つまいしな。\nどこか、おすすめの店はあるのか？」
2005 = "「嗯。烤肉的話也可以讓煤灰的汙漬不會顯得很顯眼。有什麼推薦的不錯的店嗎？」" 

# 【凪】
# display as 凪
# JP: 「あるばい！　うちから少しのとこにある、\n『[ぎゅうしゃ,1]牛炙』さんって知っとっと？」
2212 = "「有的有的！知道離咱家不遠的“牛炙”嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。お肉屋さんもやっているところだな」
1999 = "「嗯。同時還開肉店的那間對吧」" 

# 【凪】
# display as 凪
# JP: 「そこば改装したとき、爺ちゃんとか職人さん達と一緒に\n焼肉ばごちそうになったばい！　うまかったばい！！」
2420 = "「那邊裝修的時候，他們招待咱跟爺爺還有工匠們在那裡吃過烤肉！賊香！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、そこにするとしよう」
2428 = "「那麼就去那裡吧」" 

# monologue
# JP: 改装したとき蓑笠さんたちがご馳走に――という話なら、\nおそらくは改装工事の打ち上げとか前祝いとかだろう。
3015 = "裝修時蓑笠先生他們去過——那麼或許是裝修工程的慶功會或者提前慶賀之類的吧。" 

# monologue
# JP: そうした席なら、よほど良い肉が振る舞われ…………
2746 = "在那種場合下，想必是吃到了特別好的肉…………" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2441 = "「雙鐵少爺？」" 

# monologue
# JP: ハチロクの声に片手を上げて、時間をもらって考える。\nああ……そうか、なるほど、焼肉か。
2849 = "我舉起一隻手制止了八六的聲音，讓她給我時間思考。啊……嗯，原來如此，烤肉啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪。そのご馳走というのは、蓑笠さん達――\n職人さん達が改装を請け負ったからのご馳走か？」
1876 = "「凪。之所以招待你們，是因為蓑笠先生他們——工匠們承包了裝修工作嗎？」" 

# 【凪】
# display as 凪
# JP: 「そうばい！　御一夜の職人だけで、\n改装一式引き受けてお店ば綺麗にしたとよ」
2073 = "「對！御一夜的工匠承接了裝修工作，把店弄得漂漂亮亮的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠さん、今日はご在宅か？」
2334 = "「蓑笠先生今天在家嗎？」" 

# 【凪】
# display as 凪
# JP: 「おると思うばい。あ！　晩御飯ならご馳走になるって、\nちゃあんと伝えておいてあっとよ？」
2120 = "「應該在。啊！咱已經說過了晚餐有人請客」" 

# monologue
# JP: 食事をこれからしたとして――
2729 = "吃飯的事現在先不提——" 

# monologue
# JP: 登呂流湯を借りる二十三時までの間には、\nある程度の時間は空くだろう。
2714 = "午夜十一點我們還要去登呂流浴場，在此之前應該還有一些時間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪、\nすまんが蓑笠さんに、電話をしてもらえるか？」
1885 = "「凪，能麻煩你給蓑笠先生打個電話嗎？」" 

# 【凪】
# display as 凪
# JP: 「良かよ。爺ちゃんになんの話ばい？」
2339 = "「行啊。和爺爺要聊什麼啊？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まだ、ぼんやりとしたアイディアなのだが――」
2438 = "「雖然還只是個很模糊的想法——」" 

# monologue
# JP: イメージは頭にあるのだが、\n細かな部分を具体化できるほどではない。
3060 = "雖然大腦中有了模糊的構思，但還不能具體細化。" 

# monologue
# JP: だから、根っこの部分だけ、\nざっくり、そのままの言葉に落とす。
2858 = "所以我先說了大致的關鍵部分。" 

# 【双鉄】
# display as 雙鐵
# JP: 「煙には煙で――\n封じ込めが出来ないか、ご相談させていただきたいのだ」
2133 = "「我想和他商量一下——能不能用煙來封住煙」" 

# 【ハチロク】
# display as 八六
# JP: 「なるほど。煙をもって煙を制するわけですね？」
1892 = "「原來如此。以煙制煙，對吧？」" 

# monologue
# JP: すぐさま、ハチロクがわかってくれる。\nならばこの案、実現可能なものかもしれん。
2655 = "八六一下子心領神會。那麼這個方案或許能夠實現。" 

# 【ハチロク】
# display as 八六
# JP: 「けれど……\x%l客車;#00ffc040;客車%l;#;の室温は相当なことになるかと\n思われますが」
1858 = "「但是……\\x%l客車;#00ffc040;客運車廂%l;#;的室溫應該會變得很高」" 

# 【ふかみ】
# display as 深美
# JP: 「あ。それって、つまり――」
1974 = "「啊。也就是說——」" 

# 【日々姫】
# display as 日日姬
# JP: 「お待たせー――って、\nどうしたの？　なにかあった？」
1839 = "「久等了——咦，怎麼了？發生了什麼事？」" 

# monologue
# JP: 日々姫だ。\n良い所に戻ってきてくれた。
2906 = "是日日姬。她回來得正是時候。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫にも意見を聞きたい。ストーブの件なのだが。\n煙をもって煙を制せないかと考えている」
2126 = "「我也想聽聽日日姬的意見。關於暖爐那件事。我想能不能以煙制煙」" 

# monologue
# JP: ハチロクのうまくまとまった言葉を借りれば、\nえっ！？　と日々姫は目を丸くする。
2847 = "我直接借用了八六的說辭，日日姬嚇得瞪大了眼睛。" 

# 【日々姫】
# display as 日日姬
# JP: 「煙で煙って――にぃに――兄さん、正気ですか？\n夏の御一夜の、しかもこの広さの室内ですよ？」
1855 = "「以煙——阿哥——哥哥，你是認真的嗎？現在御一夜可是夏天，而且車廂很狹窄啊」" 

# monologue
# JP: 日々姫の疑問の声にあわせて、ふかみも頷く。\n取り残された形で一人、凪はぽかんと首を傾げる。
2939 = "深美也配合日日姬的質疑點頭。只剩下凪一個人不解地歪著腦袋。" 

# 【凪】
# display as 凪
# JP: 「みんな、何の話ばしよっと？」
2041 = "「大家這是說什麼東西呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまりだな。ストーブを炊き、そこから煙を\n出してしまえば、外の煙を防げるのではという考えだ」
1842 = "「也就是說。點燃暖爐，使煙從裡面冒出來，或許就能擋住外面的煙」" 

# 【凪】
# display as 凪
# JP: 「面白そうばい！　客車の中で、焼肉ばすっとね？」
2053 = "「好有意思！在客運車廂裡烤肉是嘛？」" 

# monologue
# JP: 理屈で一番遅れた理解を、直感で一気に進めてしまう――\n実に凪らしい一言に、僕も大きく頷き返す。
3044 = "道理遲遲理解不了也不打緊，憑直覺照樣直奔要點——實在是很有凪的風格，我也不由地用力點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。基本的にはそうした線で考えている」
2003 = "「嗯。基本上我是打算這樣」" 

# 【ふかみ】
# display as 深美
# JP: 「そういうこと……。です？」
2201 = "「是這樣……嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「確かに面白そうだけど……\n焼肉も、やっぱり暑くてケムくない？」
2300 = "「確實是很有趣……但烤肉也一樣又熱又熏人吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「熱の方は、対策を考える必要があろうが――\n煙の方は大丈夫ではないかと、僕としては見込んでいる」
2266 = "「熱的話需要想想辦法——但我認為煙的話應該沒問題」" 

# 【ふかみ】
# display as 深美
# JP: 「どうして。です、か？」
2239 = "「為什麼、呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あらかじめ、焼肉をする\x%l列車;#00ffc040;列車%l;#;とわかっているのなら、\n乗客はケムさを、ある程度覚悟してくれると思うからだ」
1922 = "「只要事先明白是用來烤肉的\\x%l列車;#00ffc040;列車%l;#;，乘客也會做好在一定程度上“會熏人”的心理準備了」" 

# monologue
# JP: 少し考え、\nハチロクはゆっくりと頷いてくれる。
2813 = "想了一會後，八六慢慢地點點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「その点は左様でしょうか。\x%l除煙板;#00ffc040;[デフ,2]除煙板%l;#;を\x%l8620;#00ffc040;8620%l;#;に設置すれば、\n\x%l8620;#00ffc040;8620%l;#;の煙の殆どを、上へ逃がせることにもなりますし」
2387 = "「這個沒有錯。將\\x%l除煙板;#00ffc040;集煙板%l;#;裝在\\x%l8620;#00ffc040;８６２０%l;#;上的話，\\x%l8620;#00ffc040;８６２０%l;#;的煙絕大部分會被排到上空」" 

# 【日々姫】
# display as 日日姬
# JP: 「ん、と……それで上に逃げた煙は、焼肉の煙に防がれて、\n流入しないで、そのまま流れていくわけで――」
1995 = "「嗯……所以被排到上空的煙被烤肉的煙擋住無法流入，就這樣散去——」" 

# monologue
# JP: 日々姫がスケッチブックを広げ、\nメモの代わりの絵を描いていく。
2899 = "日日姬攤開素描簿以畫來代替筆記。" 

# 【日々姫】
# display as 日日姬
# JP: 「だったら\x%l客車;#00ffc040;客車%l;#;のまわりはほとんどケムくなくなって――\nあ！　それなら、窓をあけっぱなしに出来ちゃうの？」
2421 = "「那麼\\x%l客車;#00ffc040;客運車廂%l;#;周圍幾乎不會熏人——啊！那麼窗戶也可以一直大開是嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「なるほど。です、最初からケムいって覚悟してて、\nしかも、外の煙はほとんどが上に逃げる、なら……」
1893 = "「原來如此。嗯，一開始就做好了“會熏人”的心理準備，而且外面的煙幾乎都被排到上空的話……」" 

# monologue
# JP: 不意にふかみの手が動く。\n自分の身体をストン、と撫でる。
2625 = "不經意間，深美將手放到自己身上，來回摩挲著。" 

# 【ふかみ】
# display as 深美
# JP: 「焼肉\x%l列車;#00ffc040;列車%l;#;……っていうことにするなら、エプロン――\n服が汚れないようつけて貰っておかしくない。です、し」
2062 = "「如果變成烤肉\\x%l列車;#00ffc040;列車%l;#;……讓乘客們穿上圍裙——防止弄髒衣服，也不會顯得奇怪」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、それっていい、すごくいい！　それなら煙も……\nススがもしかして出ちゃっても、結構大丈夫そうかも」
1981 = "「啊，不錯，很不錯的主意！那麼就算有煙……有煤灰冒出來或許也沒關係」" 

# 【凪】
# display as 凪
# JP: 「よかばい！　ぜーったい乗ってみたかとばいっ！」
2054 = "「好棒！咱一定要坐一次！」" 

# monologue
# JP: 僕には無かった視点が、\nさらなる案を、新たな共感を呼んでくれる。
2758 = "她們提出了我意想不到的新方案，這又引來新的共鳴。" 

# 【ハチロク】
# display as 八六
# JP: 「確かに。良い案かと思いますが――\nさきほども申しましたとおり、厳重な熱対策は必須かと」
2299 = "「確實。我也覺得是好主意——但是正如我剛才所說，需要做好應對高溫的方案」" 

# monologue
# JP: しかし、ハチロクは流されない。
2644 = "但是，只有八六沒有隨波逐流。" 

# 【ハチロク】
# display as 八六
# JP: 「熱で倒れる新人助士を、わたくしは何人も見てきました。\n窓開け程度では、夏場の燃焼の熱の防止にはなりません」
2128 = "「我已經見過好幾名因為高溫而暈倒的新人司爐了。光是開窗戶，是無法應對在夏季燃燒所帶來的高溫的」" 

# monologue
# JP: その冷静な判断が後ろにあると思えるからこそ、\n思いつくままの言葉を紡げる。
2920 = "正因為我知道身後的她會做出冷靜的判斷，所以我才能將自己想到的話說出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこは工夫だ。扇風機に、例えば氷を組み合わせれば、\n簡易的な冷風扇とできるだろう」
2386 = "「這個就要想想辦法了。比如說，將風扇和冰塊組合起來，就能做成簡易的冷風扇」" 

# 【ハチロク】
# display as 八六
# JP: 「熱気は、冷気の壁となります。\nストーブが熱した空気は、冷風を跳ね返してしまうかと」
2265 = "「熱氣會擋住冷氣。暖爐的熱氣有可能會把冷風給擋回去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――ああ、そうだ。\n熱気も、煙突から逃してしまえばいい」
2422 = "「那麼——啊，對了。讓熱氣也從煙囪裡排出就好了」" 

# 【ハチロク】
# display as 八六
# JP: 「と、おっしゃいますと？」
2115 = "「您的意思是？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「台所の、コンロのまわりに立ててあるような防熱板。\nあれで、ストーブの周りを囲ってしまう」
2092 = "「廚房灶台旁邊好像有隔熱板。用它圍在暖爐周圍」" 

# monologue
# JP: 肉を焼くための、一面だけは低くして、\nその他はもう、煙突まで包むくらいで構わない。
2966 = "用來烤肉的一面放低一點，其他的地方連著煙囪一起包住也無所謂。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ストーブが必要となる季節には、防熱板を除去する。\nそれならば、最小限の改修で済むのではなかろうか」
1886 = "「到了需要的季節就挪走隔熱板。這樣應該可以儘可能減少改裝的工作量」" 

# monologue
# JP: ささっと、日々姫の鉛筆が動く。
2900 = "日日姬的鉛筆“沙沙”地在紙上游走。" 

# 【日々姫】
# display as 日日姬
# JP: 「ん……いけるんじゃない？　それなら。\n見た目は、ちょっとダイナミックさを減らしちゃうけど」
1993 = "「嗯……應該可以吧？雖然外表會顯得有些死板」" 

# 【ふかみ】
# display as 深美
# JP: 「いいと思う。です。\n試す価値は――絶対。あるって、思う。です」
2139 = "「我覺得不錯。嗯。絕對有一試的價值。嗯」" 

# 【凪】
# display as 凪
# JP: 「試験\x%l列車;#00ffc040;列車%l;#;の一番\x%l列車;#00ffc040;列車%l;#;！\nふかみちゃんと一緒に、絶対、乗せてもらうばい！！」
2236 = "「測試\\x%l列車;#00ffc040;列車%l;#;的首班\\x%l列車;#00ffc040;列車%l;#;！咱一定要和小深一起坐！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうだろうか、ハチロク」
2110 = "「怎麼樣，八六」" 

# monologue
# JP: ハチロクのまぶたが静かに下りる。
2680 = "八六靜靜地合上眼瞼。" 

# monologue
# JP: 目を閉じたまま――\n言葉はますます慎重そうな響きを帯びる。
2765 = "她閉著眼睛——說的話也更加慎重了。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様がご提案くださった、非常通報ブザー、\nあれも常設し、安全対策といたしましょう」
2069 = "「將雙鐵少爺提議的緊急警報蜂鳴器也裝上，以確保安全吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。確かにそれは有効に機能しそうだな」
2008 = "「嗯。確實那個應該會派上用場」" 

# monologue
# JP: 万が一熱にあたってご気分の悪い方が出た場合、\nそれならすぐに緊急停止をかけられる。
3006 = "萬一乘客因中暑導致身體不舒服，也可以緊急停車。" 

# monologue
# JP: 湯医線の短さであれば、\x%lキハ07;#00ffc040;キハ07%l;#;の救援も機能しようし、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;が飛べる場所ならば、ナビも使える。
2947 = "湯醫線很短，所以也可以利用\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;救援，如果\\x%lエアクラ;#00ffc040;空凝機%l;#;能飛到，還可以讓Ｎａｖｉ來運送。" 

# 【ハチロク】
# display as 八六
# JP: 「そこから先は、技術面や営業面……\n蓑笠様、ポーレット様とのご相談かと」
2247 = "「然後就是技術方面和經營方面……得和蓑笠先生與波萊特小姐談談」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならばハチロク、\n\x%l除煙板;#00ffc040;[デフ,2]除煙板%l;#;の図面を起こしてくれ」
2425 = "「那麼八六，把\\x%l除煙板;#00ffc040;集煙板%l;#;的構造圖畫出來」" 

# 【ハチロク】
# display as 八六
# JP: 「かしこまりました、双鉄様」
2135 = "「我明白了，雙鐵少爺」" 

# monologue
# JP: ハチロクが賛成をしてくれるなら、\nこの案、きっとモノになる。
2876 = "既然八六贊成了，那麼這個方案肯定能成功。" 

# 【ハチロク】
# display as 八六
# JP: 「ですが――」
1856 = "「但是——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
1959 = "「唔？」" 

# monologue
# JP: ツ、とハチロクの視線が動く。\n追えば、すぐさま理由がわかる。
2671 = "八六的視線移往別的方向。我跟著望過去，然後立刻明白了其中的緣由。" 

# monologue
# JP: 凪が椅子へと崩れ落ち、\nその全身で、空腹感をアピールしている。
2701 = "凪整個人癱倒在椅子上，用全身的動作來表達自己的飢餓。" 

# 【ハチロク】
# display as 八六
# JP: 「図面起こしは、\nお食事の後といたしませんか？」
1944 = "「咱能吃好飯後再畫那個什麼構造圖嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……上手く撮れたな。\nセルフシャッターを使うのは初めてだったが」
1557 = "「……拍得很好啊。雖然我還是第一次用自動定時快門」" 

# monologue
# JP: 撮った写真を確認すれば、\n日々姫も覗きこんでくる。
2824 = "我在確認拍好的照片，日日姬也湊過來看。" 

# 【日々姫】
# display as 日日姬
# JP: 「う～私ちょっと引きつってるかも。\nせっかくの記念写真なのに」
1961 = "「唔～我表情可能有點僵硬呢。明明難得拍一次紀念照」" 

# 【ハチロク】
# display as 八六
# JP: 「大丈夫。とてもかわいらしく写ってますよ？\n誇らしげで、少し緊張してらして」
2225 = "「沒問題。拍得很可愛。自豪中又帶著一點緊張」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前もな」
1862 = "「你也一樣」" 

# monologue
# JP: 自己紹介のような言葉に、\n帽子ごし、思わず頭を撫でてしまう。
2763 = "她這番彷彿自我介紹一般的話語，讓我忍不住隔著帽子撫摸她的頭。" 

# monologue
# JP: 少しくすぐったそうな顔をして、\nけれどもすぐさまハチロクは、帽子と表情を引き締め直す。
2657 = "八六似乎有些不好意思，又很快整理好帽子和表情。" 

# 【ハチロク】
# display as 八六
# JP: 「さて、まさしく日々姫の言葉通りの、\n記念すべき一号\x%l列車;#00ffc040;列車%l;#;です」
