# JP: 「そぎゃんこつっ！」「そんなこと！」\n「そのようなこと！」
2668 = "「淨瞎扯！」「沒有的事！」\\n「絕無此意！」" 

# monologue
# JP: 三者三様の即時の否定。\n聞いた瞬間、オリヴィの笑顔に明るさが増す。
3106 = "三個人都馬上開口否定，只是用詞各不相同。而見到她們的反應，奧莉薇臉上的笑容越來越燦爛。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　もちろん今はちがうってわかってる。\nオリヴィのことも、大事にしてもらえてるって」
2371 = "「嗯！當然現在知道不是這樣啦。也知道大家都很看重奧莉薇的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「なら、よかった」
2864 = "「那就太好了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、最後の乗務の日までがんばるね！\nオリヴィ、あと何年乗ってていーの？」
2416 = "「奧莉薇只要還在執行乘務任務就會全力以赴的！所以還可以開幾年呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　\nあ！　そうじゃないの、オリヴィちゃん」
2299 = "「咦！？啊！不是那個意思啦，奧莉薇」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えっ！？」
2297 = "「咦！？」" 

# monologue
# JP: オリヴィの声音が、顔が、\nその一瞬で固まってしまう。
3512 = "這次目瞪口呆的又輪到了奧莉薇。" 

# monologue
# JP: ゆえに、僕にもようやくわかる。
3131 = "不過我也總算明白了。" 

# monologue
# JP: （そうか……オリヴィは、怖がりなのか）
3578 = "（原來……奧莉薇其實還是蠻膽小的啊）" 

# monologue
# JP: 僕と路子もそうだった。
3335 = "我和路子又何嘗不是如此。" 

# monologue
# JP: 怖がりだから――何かをしてれば、早く決めれば、\n怖さから逃げ出せるような気がして……
3234 = "因為膽小——所以遇事都想要儘快做個決定，而後便能逃離那不確定的恐懼……" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ、オリヴィ」
2643 = "「沒事的，奧莉薇」" 

# monologue
# JP: そう感じれば、声が出ている。
3100 = "一想到這裡，我便不由自主地開了口。" 

# 【双鉄】
# display as 雙鐵
# JP: 「安心していい。\nポーレットはな？　ああ見えても敏腕経営者なのだ」
2575 = "「放心好了。其實你看波萊特這個樣子，其實對經營是頗有見解的」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ……ぅ」
2325 = "「啊……唔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「たとえ乗務ができなくなっても、それ以外できっと、\nオリヴィのことを使い倒す腹づもりにきまってる」
2466 = "「就算不能執行乘務任務了，她肯定也給你做了其他安排，只怕你一點空閒都落不到哦」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「！」
2329 = "「啊！」" 

# monologue
# JP: ぱっと、表情が晴れ渡る。\nやはり、僕らと――幼いころの僕らと同じだ。
3274 = "她的表情瞬間恢復了開朗。果然，她和當年的我們是如此的相似。" 

# monologue
# JP: ならば、同じ過ちを繰り返させたりせぬように、\nたったひとこと、伝えればいい。
3521 = "那為了不讓她重蹈我們的覆轍，有句話我就一定要對她說。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、先走らずに、落ち着いて最後まで聞くといい。\n大丈夫、悪い話にはきっとならない」
2553 = "「所以不要急，冷靜聽她把話說完。放心，肯定都是妥當的安排啦」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うんっ！」
# 2369 = "「嗯！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……双鉄くんの言ったとおり。乗務引退後も、\nオリヴィちゃんには働いて貰えればと考えています」
1724 = "「……雙鐵君說得沒錯。即便奧莉薇不做乘務工作了，也會有其他工作交給你」" 

# monologue
# JP: ポーレットも、ほっとした声だ。
3378 = "波萊特的聲音裡也透著安心。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「引退――乗務で役にたてなくなって。\nそのあとも……居場所、オリヴィ、もらえるの？」
2250 = "「即便不做乘務工作了，那之後，這裡也能有奧莉薇的一席之地嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんが、それを希望してくれるなら」
2266 = "「只要你樂意接受」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「キボウする！　オリヴィ、なにすればいいの！？\nなにができるの？」
2691 = "「當然樂意！那奧莉薇要做什麼呢！？奧莉薇還能做什麼呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜鉄道には、他の鉄道会社にあるような、\n帝鉄時代からの経験の引き継ぎが存在しません」
2490 = "「御一夜鐵路和其他鐵路公司不同，並沒有沿襲自帝國鐵路時代的經驗」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、\x%l保線;#00ffc040;保線%l;#;とかみてるとそんな感じっぽいよね。\nけど、ハチロクとれいなもベテランでしょ？」
2347 = "「啊，\\x%l保線;#00ffc040;巡線%l;#;什麼的看下來確實是這個感覺。不過八六和玲奈不也都很有經驗嗎？」" 

# monologue
# JP: 不思議そうなオリヴィと目があえば、\nハチロクは静かに首を振る。
3264 = "奧莉薇略感奇怪地看向八六，八六便向她輕輕地搖了搖頭。" 

# 【ハチロク】
# display as 八六
# JP: 「いえ。オリヴィちゃんと触れ合ううちに知りました。\nわたくしの知る“鉄道”は、ごく限られた一部のみです」
2905 = "「非也。和奧莉薇接觸後我才明白，我對“鐵路”的了解，其實不過管中窺豹而已」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ。\nれいな、鉱山鉄道のこでしたからぁ」
2681 = "「玲奈也是哦。畢竟玲奈是在礦山鐵路工作的」" 

# monologue
# JP: 国産量産第一号機種のトップナンバー\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、\n鉱山鉄道で働き続けていた\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と。
3560 = "首款國產量產車型的首車\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，和一直在礦山鐵路工作的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。" 

# monologue
# JP: 立場はまったく違えども、\n「限定された環境でしか運用されなかった」点は同じだ。
3527 = "雖然經歷完全不同，但“只在特定環境中工作過”這一點卻是相同的。" 

# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんには、私達の知らない鉄道に関する、\n経験と知識の蓄積があります」
2725 = "「而奧莉薇擁有的鐵路相關的經驗與知識，很多是我們完全不了解的」" 

# monologue
# JP: ゆえ、ポーレットの提案には全面的に同意できる。\nだけでなく、もっと多くもと望んでしまう。
3346 = "所以，我們自然都對波萊特的提案雙手贊成。不僅如此，我們想要的或許還比這更多。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィは最新の保線技術の知識も有している。\n僕はそれを、御一夜鉄道にも伝えて欲しいと願っている」
2418 = "「奧莉薇掌握著最新的巡線技術和知識，我們希望你能把這些傳授給御一夜鐵路」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　ですよね。そこはわたし、事前調査で\n知らなかったから、びっくりしてるし、うれしいです」
2334 = "「啊！沒錯。這些我在事前的調查中並未了解到，真是又驚又喜」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ホセンのこともね！\nムナカタ見てておぼえたんだよ！」
2470 = "「巡線這些呀！其實都是從宗方那學來噠！」" 

# monologue
# JP: 笑顔が弾ける。\nオリヴィはもう、小躍りせんばかりだ。
3265 = "奧莉薇簡直要笑開了花，完全是一副恨不得手舞足蹈的樣子。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「いいよ！　オリヴィなんでも伝える！　引退したら！\nううん、引退をする前だって――あしたにだって！！」
2425 = "「好的！等奧莉薇不做乘務工作了都教給你們！不，也不用等那麼久——明天開始都可以！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは助かる。では、保線技術講習については、\nのちほど相談させてくれ」
2816 = "「這可太好了。那關於巡線技術的講座，我們回頭再細談吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！」
2913 = "「ＯＫ！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「で、ですね？　オリヴィちゃんの同意を\n得られたところで、その――」
2870 = "「那接下來，既然已經得到了奧莉薇的同意——」" 

# monologue
# JP: ポーレットの視線が大きく動く。\nその先では、赤井宮司が苦笑している。
3379 = "波萊特的視線在眾人身上掃過，而最終落在了正在苦笑的赤井宮司身上。" 

# 【赤井】
# display as 赤井
# JP: 「なるほど――私が呼ばれた理由は察しました」
2257 = "「原來如此——我也明白會叫上我的理由了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「お話が早くて助かります。なら――あの噂……\n赤井阿蘇神社の境内の、包帯の少女の噂は、やっぱり」
2729 = "「能夠打開天窗說亮話那就太好了。那——關於那個傳言，就是赤井阿蘇神社裡裹著繃帶的少女的傳言，果然……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「包帯の少女の噂？」
2753 = "「裹著繃帶的少女的傳言？」" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃににもいったことあるでしょお！\n稀咲センパイとわたしも会ったって」
2506 = "「我之前和稀咲學姐見到過的啊，不是跟阿哥你說過的嘛！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2328 = "「啊」" 

# monologue
# JP: くだらない怪談話の類と決めつけ聞き流していたが……\nポーレットと赤井宮司との話の中味から推測するに――
3406 = "當時我知識把它當作無聊的靈異話題而沒有放在心上……但從波萊特和赤井宮司的言辭中推斷的話——" 

# 【赤井】
# display as 赤井
# JP: 「私から答えられることではありません、\nそれは、みなさんの目で確かめてみてください」
2813 = "「這不是我可以信口開河的事。還請各位親眼目睹，一看便知」" 

# monologue
# JP: 壁掛け時計をちらりと見、\n赤井宮司は立ち上がってしまう。
3490 = "赤井宮司隨即瞟了一眼牆上的掛鐘，而後便起身。" 

# 【赤井】
# display as 赤井
# JP: 「現役最古級の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が遊びにきたなら、\nさすがにあれも、大いに興味を持つことでしょうから」
2742 = "「若是仍在現役最古老的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;之一前來來訪，這總歸能令其興致叢生了吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふーん、あのグージさん、\n帝鉄の\x%l運転士;#00ffc040;運転士%l;#;さんだったんだー」
2390 = "「噢，那位宮司，以前是帝國鐵路的\\x%l運転士;#00ffc040;駕駛員%l;#;啊」" 

# 【ハチロク】
# display as 八六
# JP: 「だ、そうですね。なんでも、特急形電車の試作機の、\n試験\x%l運転士;#00ffc040;運転士%l;#;をつとめていらしたとか」
2572 = "「據說是的。好像說他是特快電車測試車的\\x%l運転士;#00ffc040;試車員%l;#;」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わお！　スゴウデなんだ！！」
2307 = "「哇哦！那可不得了唉！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。ご助言の質も実に高い。僕らも御一夜鉄道も、\nあの方にはずいぶん助けていただいている」
2695 = "「的確。他給我們的建議也都非常有幫助。我們和御一夜鐵路都從他那裡獲益良多」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、その“ホータイの少女”っていうのは、\nあのグージさんとこの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;？」
2878 = "「那麼說，那位“裹著繃帶的少女”，就是那位宮司家的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;囉？」" 

# 【ハチロク】
# display as 八六
# JP: 「と、いう噂らしいのですが……」
2571 = "「據傳如此，不過……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「異論があるのか？」
2833 = "「還有什麼問題嗎？」" 

# monologue
# JP: 問えば、ハチロクはらしくもなく、\nひどくあいまいな頷きをみせる。
3470 = "被我這麼一問，八六卻少見地不置可否，只是曖昧地點了點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「赤井阿蘇神社には、双鉄さまとご一緒に、\nわたくしも、何度もお邪魔しておりますよね？」
2761 = "「要說赤井阿蘇神社，我已經和雙鐵少爺一同造訪過多次了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2368 = "「嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「けれどわたくし――ただの一度も、\n\x%l共感;#00ffc040;共感%l;#;を通じたことが」
2271 = "「可我卻從未收到過\\x%l共感;#00ffc040;共鳴%l;#;——一次都沒有」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……ああ、そうだ。\n“共感を閉ざす”というヤツではないのか」
2811 = "「這……啊，說不定。會不會只是對方“關閉了共鳴”呢」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ！」
# 2329 = "「啊！」" 

# monologue
# JP: いった瞬間、恥ずかしそうな顔をして、\nオリヴィがぺろり舌を出す。
3341 = "我話剛出口，奧莉薇就滿臉害羞地吐了吐舌頭。" 

# monologue
# JP: ハチロクが小さく笑えば、\nオリヴィもまた、微笑み返す。
3191 = "八六見狀輕笑起來，而奧莉薇也向她回以微笑。" 

# monologue
# JP: （ああ――そういえば、\n寿命云々ですっかり頭から飛んでしまっていたが……）
3580 = "（啊——話說回來，光顧著說壽命這些事了，都快忘了還有那麼一茬……）" 

# monologue
# JP: オリヴィが、\x%l共感;#00ffc040;共感%l;#;を、こころを閉ざしてしまっていた――
3141 = "之前奧莉薇關閉了\\x%l共感;#00ffc040;共鳴%l;#;，封閉了自己的內心——" 

# monologue
# JP: その状況は、いまの様子を見るかぎり、\nいつの間に、自然と解消されたのだろう。
3166 = "以目前的情況看來，不知何時那隔閡似已消於無形了吧。" 

# 【ハチロク】
# display as 八六
# JP: 「はい。オリヴィちゃんがかつてそうしていたように、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\x%l共感;#00ffc040;共感%l;#;を閉ざすことも可能です」
2604 = "「是的。的確有可能是像奧莉薇之前那樣，有\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;在，但關閉了\\x%l共感;#00ffc040;共鳴%l;#;」" 

# monologue
# JP: 僕の推測をハチロクは、\nおだやかな言葉と笑顔とで裏付ける。
3184 = "八六以波瀾不驚的言語和笑容，印證了我的推測。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。『かつて』ならば、幸いなことだ」
2359 = "「嗯。“之前”啊，很好很好」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。今ではオリヴィちゃんは感情域までの\x%l共感;#00ffc040;共感%l;#;を、\nわたくしたちに許可してくださっております」
2600 = "「是的。現在奧莉薇已經連感情部分都允許我們和她\\x%l共感;#00ffc040;共鳴%l;#;了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
2318 = "「啊——」" 

# monologue
# JP: そういわれてふと想い出す。\nオリヴィがムナカタさんを語ったときの――電車姫様。
