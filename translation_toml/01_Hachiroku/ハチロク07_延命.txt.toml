[script]
# lines: 522 
# 【電車姫】
# display as 電車公主
# JP: 「なんじゃ、いよいよ決定稿を見られるものかと\n少しは期待しておったのじゃが」
2715 = "「竟是如此，余原本期待終可一窺決定稿全貌呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「〆切ギリギリまで磨き上げたいとのことです。\n『それまで待っていていただきたい』と、日々姫から」
2522 = "「我們也是想在期限內做到盡善盡美。所以日日姬才託我帶話說“還請再稍加耐心等待”」" 

# 【電車姫】
# display as 電車公主
# JP: 「くふふっ、これはわらわがいささか先走ってしもうたの。\n無論、その日を楽しみに待たせてもらおうぞ」
2383 = "「嘻嘻，如此講來倒是余稍顯心急了。那且容余繼續期待罷」" 

# 【双鉄】
# display as 雙鐵
# JP: 「恐れ入ります」
2152 = "「不勝惶恐，必不負期待」" 

# monologue
# JP: ――6年間。日々姫が描き出してきたデザインたちは、\n僕らと電車姫様との距離を、確実に大きく縮めてくれた。
1588 = "——在這六年中，日日姬所完成的一個又一個設計方案，的確是大大拉近了我們和電車公主殿下的距離。" 

# 【電車姫】
# display as 電車公主
# JP: 「で、じゃ。\n雛衣から照会のあった件じゃがの」
2736 = "「至於雛衣先前提及之事」" 

# monologue
# JP: かなり踏み込んだ質問を、直接電車姫様にぶつける――\nそれが許される程度にまでも。
3451 = "而究竟拉近到什麼程度呢？從我們可以就如此程度的問題直接向她求助便可見一斑。" 

# 【電車姫】
# display as 電車公主
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の延命に関わる研究助成もしておるぞ？\nなにせ、この身にもかかわることゆえの」
2197 = "「余早已在支持\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;延壽的研究。畢竟，此事與余亦是息息相關」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、やっぱり！\nだよねー、そーなんだ！」
2319 = "「啊——果然！也是呢，嗯，合情合理！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「って、オリヴィちゃん！？」
2420 = "「奧莉薇，注意禮貌！？」" 

# monologue
# JP: 電車姫様への、あまりにも親しげな口調にだろう。
3161 = "以如此口吻與電車公主殿下對話，未免有失禮數。" 

# monologue
# JP: ネット会議の真っ最中にもかかわらず、\nポーレットが慌ててオリヴィの方へと――
3171 = "以至波萊特都顧不得網路會議還在進行，開口提醒奧莉薇——" 

# 【電車姫】
# display as 電車公主
# JP: 「[ひない,1]雛衣、構わぬ」
2901 = "「雛衣，無礙」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ？」
2300 = "「咦？」" 

# 【電車姫】
# display as 電車公主
# JP: 「お家騒動を防ぐため、みな[ていさい,1]体裁を守らねばならぬ。\nゆえ、何も揺るがぬ。誰が、何を申したとしても、の」
2502 = "「恪守體統，本是為穩固家業免諸手足之爭。又豈會因外人隻言片語而動搖」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう……ですか？\n電車姫様がそうおっしゃるなら、わたしからは何も」
2614 = "「是這樣嗎？不過電車公主殿下既然這樣說，我們也就不再多言了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィもなんにもいわないよー。人様のおうちの\nジジョーには、首つっこんじゃだめなんだもーん」
2858 = "「那奧莉薇也不多說了。別人家裡的事，外人的確不該插嘴」" 

# 【電車姫】
# display as 電車公主
# JP: 「ふふ。と、申してもおるしの」
2379 = "「嘻嘻。所言甚是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2374 = "「嗯？」" 

# monologue
# JP: どうやら、口調どうこうの問題ではないようだ。
3411 = "看來並不是口吻如何的問題。" 

# monologue
# JP: ならば、“ひとさまのおうちの事情”だの、“お家騒動”\nだのやらが、ポーレットが慌てた理由であろう……か？
3522 = "那麼波萊特覺得不妥出言提醒的，應該就是“別人家裡的事”、“家業手足”的問題了吧？" 

# 【ハチロク】
# display as 八六
# JP: 「あの……双鉄さま？」
2812 = "「這……雙鐵少爺？」" 

# monologue
# JP: ハチロクに聞こうと思った瞬間、\nハチロクの方から聞かれてしまう。
3344 = "我還正打算問八六，卻不想八六開口來問我了。" 

# monologue
# JP: すがる瞳で見上げられ、答えを教えてやりたくなるが――
3468 = "被她以求助的眼神盯著問的話，我也不禁想要解釋給她聽，只不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「残念ながら、僕もわからん」
2486 = "「很遺憾，我也不清楚」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、左様なのですね」
2315 = "「哦，這倒也並不意外」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ」
2316 = "「唔嘻嘻」" 

# monologue
# JP: わかっているのかいないのか、いつものにこにこ顔をして、\nれいなはポーレットの膝の上に収まってる。
3392 = "玲奈臉上還是掛著平時一樣的笑容坐在波萊特腿上，只是從她的表情上完全判斷不出她到底是知道還是不知道。" 

# monologue
# JP: （……ポーレットとオリヴィは、\n何かをわかってる様子だが――）
3567 = "（……波萊特和奧莉薇好像是知道些什麼的樣子——）" 

# monologue
# JP: しかしオリヴィの言葉のとおり、\n僕らがそこに、首を突っ込んで良いものだとも思えない。
3132 = "不過正如奧莉薇所言，我們這些外人的確不該對這些說三道四。" 

# 【電車姫】
# display as 電車公主
# JP: 「くふふっ」
2285 = "「呵呵」" 

# monologue
# JP: 電車姫様は、いとも楽しげな笑いを零す。\nその口元はけれどもすぐに、扇によって隠されてしまう。
3535 = "電車公主殿下滿面笑容似乎頗顯樂在其中。不過轉眼便又舉起了扇子半掩住了面孔。" 

# 【電車姫】
# display as 電車公主
# JP: 「思いもかけず、オリヴィは[しょせい,1]処世の[すべ]術に明るいようじゃの。\nいずこで学んだ？」
2415 = "「奧莉薇倒是對處世之道頗有心得，著實超出余想像。卻不知是於何處習得？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタからだよ！　オリヴィが知ってる大事なことは、\nぜーんぶムナカタをみてべんきょーしたんだ」
2612 = "「是跟宗方學的！奧莉薇知道的重要的東西都是照著宗方有樣學樣的」" 

# 【電車姫】
# display as 電車公主
# JP: 「！」
2313 = "「哦！」" 

# monologue
# JP: ほんの一瞬――電車姫様が息を呑む。
3536 = "電車公主殿下的氣息甚至也為之短暫地一滯。" 

# 【電車姫】
# display as 電車公主
# JP: 「……なるほどの。左様であったか」
1686 = "「……原來如此，竟如這般」" 

# monologue
# JP: ああ、やはりかと。その眼差しの動きに思う。\nオリヴィが、いかに宗方\x%l機関士;#00ffc040;機関士%l;#;を敬愛しているか――
3417 = "看著她的眼神，彷彿在說“啊，果然是這樣”。足以見奧莉薇對宗方\\x%l機関士;#00ffc040;司機%l;#;的敬愛之情——" 

# monologue
# JP: 今のほんの一言だけで、輝くような笑顔だけでも、\n電車姫様にも、はっきり伝わるものなのだと。
3174 = "僅透過適才的隻言片語，以及開口時的璀璨笑容，想必電車公主殿下已是看在眼裡，瞭然於心了吧。" 

# 【電車姫】
# display as 電車公主
# JP: 「なれば、その教えを授けたムナカタとやらに、\nわらわも感謝せねばならぬの」
2434 = "「如此說來，余也應向那位名曰宗方之人，就其言傳身教表達感謝才是」" 

# monologue
# JP: 瞳に束の間うかんでみえた、淋しげな陰りをかき消して、\n電車姫様の視線が左に動く。
3537 = "電車公主殿下的眼中閃過一絲落寞的陰影，但她隨即將視線向左移去。" 

# monologue
# JP: とたん、カメラが捉える範囲の外で、\nバタバタと足音が遠ざかっていく。
3301 = "幾乎同時，在攝影機視野之外，一陣腳步聲響起並漸漸遠去。" 

# 【電車姫】
# display as 電車公主
# JP: 「[おおみや,1]旺宮の旧帝鉄\x%lレイルロオド;#00ffc040;レイルロオド%l;#;工機部――\n現・旺宮\x%lレイルロオド;#00ffc040;レイルロオド%l;#;研究所には、資金を投下しておる」
2203 = "「余有向在大宮的前帝國鐵路\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;工程機械部——現稱大宮\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;研究所提供資金支持」" 

# 【双鉄】
# display as 雙鐵
# JP: 「研究所、ですか？」
2706 = "「研究所……嗎？」" 

# 【電車姫】
# display as 電車公主
# JP: 「であるぞ。大廃線への抗い方は、わらわらのような、\n営業運転の継続という形のみには、とどまらぬ」
2673 = "「然也。若言對抗大廢線，僅靠余等維繫的商業運營，無異於螳臂當車」" 

# 【ポーレット】
# display as 波萊特
# JP: 「[てつれき,1]鉄歴――[おおみや,1]旺宮の、鉄道歴史館！」
2885 = "「鐵歷——大宮的鐵路歷史館！」" 

# 【電車姫】
# display as 電車公主
# JP: 「左様じゃ。状態のよい\x%l静態保存;#00ffc040;静態保存%l;#;機を集め、集客・展示し、\n鉄道の歴史を伝えるとともに、資金を稼ぐ」
2629 = "「正是此地。收集狀態良好的\\x%l静態保存;#00ffc040;靜態保存%l;#;機車並向招攬而來的顧客進行展示，宣傳鐵路的歷史，同時積攢資金」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――でしたら、ひょっとして……\nその収益を、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;研究に？」
2320 = "「啊——那是不是說……以其收益，貼補\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;研究？」" 

# 【電車姫】
# display as 電車公主
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;研究にも、であるがの。くふふっ、さても\n変わり者はおるものじゃ、人にも、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にも」
1624 = "「\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;研究，確是如此。嘻嘻，然總有異乎尋常者，無論人類，抑或\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「変わり者……とは」
2687 = "「異乎尋常者……是指？」" 

# 【電車姫】
# display as 電車公主
# JP: 「旺宮の、文字通りの看板娘じゃ。\nほうっておいても、いずれ、まみえるときもあろうが」
2216 = "「便是大宮的當家花旦，字面之意。不過想必你們遲早會與之相見罷」" 

# monologue
# JP: ふぁさっと小さく扇子が動けば、電車姫様の髪も揺れる。
3540 = "電車公主殿下輕搖手中的扇子，秀髮也隨之飄擺。" 

# 【電車姫】
# display as 電車公主
# JP: 「機会をみつけ、一度は、会いにいってみるがよい。\nためになるぞ？　わらわの紹介と告げて構わぬ」
2154 = "「不妨尋個機會，前去拜見何如。想必於你們有所裨益。彼時報余名號便是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご厚意、ありがとうございます。それではできるだけ\n早い時期に、必ずお伺いいたしたく思います」
2246 = "「十分感謝您的好意。我們定會儘快安排時間前去拜訪」" 

# 【電車姫】
# display as 電車公主
# JP: 「うむ」
2368 = "「嗯」" 

# monologue
# JP: 機嫌よさそうなひとあおぎ。\n電車姫様の瞳がス――と細まる
3538 = "電車公主殿下眯起了眼睛，心情看起來不錯。" 

# 【電車姫】
# display as 電車公主
# JP: 「さて。[ひとがた、にんぎょうがた,5]人形/人形形\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の新造技術は、\nもとより[ひとくせい,2]秘匿性の高い技術であった」
2773 = "「說來，製造人形／人偶形\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的技術，原本便是高度保密」" 

# monologue
# JP: パチ、と扇子が閉じられる。
3283 = "她邊說，邊“啪”地合起了扇子。" 

# monologue
# JP: パチ、パチ、パチ。小さく繰り返される開け閉めの音は、\nいくらかのいらだちを伝えてくるようだ。
3455 = "而隨後她反覆把扇子打開又合起，似乎也顯露出些許對目前話題的不快。" 

# 【電車姫】
# display as 電車公主
# JP: 「その上に大廃線じゃ。現状、少なくとも日ノ本の\n国内では、完全に再現不能の技術となってしまっておる」
2726 = "「而後又是大廢線。以至如今，至少於日本國內，已徹底無法復現」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の新造は不可能と聞いてはいましたが――コストやニーズではなく、技術面で不可能なのですか？」
2513 = "「我也聽說過現在已經不能製造新的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，但沒想到竟然不是費用和需求的問題，而是技術層面上就做不到了嗎？」" 

# 【電車姫】
# display as 電車公主
# JP: 「それらの問題も無論ある。が、純粋な技術面でもまた、\nどうにもならぬ。ロオドコアをまるで再現できぬのじゃ」
2844 = "「那些方面雖亦有問題，但純就技術層面而言，亦已無力回天。日本國內早已不再具備復現人偶核之能力」" 

# 【ハチロク】
# display as 八六
# JP: 「ロオド――コア？」
2173 = "「人偶——核？」" 

# monologue
# JP: ハチロクの口調。\nまったく知らぬことがらのようだ。
3458 = "聽八六這個口氣，似乎是對此一無所知。" 

# monologue
# JP: れいなも、オリヴィもポカンとした顔――\nポーレットだけは、目をらんらんと輝かせている。
3390 = "玲奈和奧莉薇也是一頭霧水——只有波萊特與眾不同，兩眼放光。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ロオドコアって――なんですか？　それ」
2850 = "「那個是叫人偶核嗎？」" 

# 【電車姫】
# display as 電車公主
# JP: 「仮称じゃ。正式名称の存在しない――\n『\x%lタブレット;#00ffc040;タブレット%l;#;を\x%lタブレット;#00ffc040;タブレット%l;#;たらしめる何か』のこと」
1662 = "「“實現\\x%lタブレット;#00ffc040;操作板%l;#;功能之物”——並無正式名稱，暫稱如此而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;を――\x%lタブレット;#00ffc040;タブレット%l;#;たらしめる」
2444 = "「實現\\x%lタブレット;#00ffc040;操作板%l;#;功能——的東西」" 

# 【ハチロク】
# display as 八六
# JP: 「……」
1670 = "「……」" 

# monologue
# JP: 無意識にだろう。ハチロクが首元の\x%lタブレット;#00ffc040;タブレット%l;#;に触れる。\n\x%lタブレット;#00ffc040;タブレット%l;#;……確かに、極めて定義の難しいものだ。
3121 = "不知是有意還是無意，八六碰了碰頸間的\\x%lタブレット;#00ffc040;操作板%l;#;。\\x%lタブレット;#00ffc040;操作板%l;#;……還確實是個很難簡單定義的東西。" 

# monologue
# JP: 単なる認証・起動、あるいは記憶媒体ではないものとは、\n僕もハッキリ感じてはいたが――
3298 = "就連我都很清楚地覺得，那絕不只是認證、啟動，抑或存儲介質這麼單純的東西。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;を再現……あるいは新造しようとしても、\n果たせない――というほどの意味でしょうか？」
2839 = "「那也就是說，復現操作板……或者說製造新的\\x%lタブレット;#00ffc040;操作板%l;#;已經不可能了，對嗎？」" 

# 【電車姫】
# display as 電車公主
# JP: 「[さと]聡いの、右田は。うむむ、いかん。\nいささか、口をすべらせすぎてしまったようじゃ」
2281 = "「右田，你當真是一點就透。唔，余竟如此信口開河，不妥不妥」" 

# monologue
# JP: 扇子がパっ、と開かれて、\n電車姫様の口元を覆い隠す。
3525 = "隨後，她又“啪”地打開扇子，輕掩朱唇。" 

# monologue
# JP: 『このお話はここまで』と、\n仕草が極めて雄弁に、かつ断定的に告げてくる。
3277 = "她的言行等於是在以不容反駁的語氣對我們說“這個話題到此為止”。" 

# 【電車姫】
# display as 電車公主
# JP: 「の？　雛衣。前回オリヴィが受けた検査の結果。\nそれをわらわが、取り寄せてみても構わぬか？」
2881 = "「那，雛衣？先前奧莉薇所做檢查之結果，可否與余參閱一二？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　あ、えとっ」
2296 = "「咦！？　啊，這個啊」" 

# monologue
# JP: 話をあまりにいきなり振られ、あわててしまったのだろう。
3363 = "沒想到話題突然被拋向了自己，波萊特顯得有一點點慌張。" 

# monologue
# JP: ポーレットは一瞬しどろもどろになって――\nけれどもすぐに、頷き、落ち着きを取り戻す。
3169 = "以至於多少有些語無倫次——但她轉眼便點了點頭，恢復了平靜。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしは、そうしてもらった方がいいって思います。\nですから、オリヴィちゃんも良ければ」
2515 = "「我也覺得應該給您過目。只要奧莉薇不介意的話」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「って、そんなことまでオリヴィに聞いてくれるの！？」
2356 = "「啊？這些都要徵求奧莉薇的意見！？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「もちろん。だって、オリヴィちゃん自身のことだから」
2690 = "「當然啦。這可是你自己的事情嘛」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうだけど――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にそんなこと聞くなんて、\nオヒトヨ鉄道ってほんっとに……」
2770 = "「話是沒錯——但你這麼問\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;……果然御一夜鐵路就是這樣……」" 

# monologue
# JP: そこまで言って、不意にオリヴィは言葉を止める。\n瞳がニヤっと、少しいたずらげな形に変わる。
3479 = "說到這裡，奧莉薇卻突然停了下來。隨後眼神一閃，露出一絲頑皮的神色。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「もしだよ？　もし今、オリヴィがイヤっていったら、\nそのときポーレットってどーするの？」
2852 = "「那假如呢？假如現在奧莉薇說不要的話，波萊特會怎麼辦？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうなっちゃったら……そうね、わたしは電車姫様に、\n『今すぐにはご容赦ください』って、お願いします」
2759 = "「要真是那樣的話……嗯，我大概會請求電車公主殿下稍作等待」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「今すぐにはって？」
2714 = "「稍作等待？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんに理解して納得してもらえるよう、\n説明するための時間を下さい――っていう意味」
2169 = "「也就是說，請她給我一些時間，讓我向奧莉薇解釋，讓你可以理解、接受」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「リカイとナットク？」
2686 = "「理解、接受？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう」
2606 = "「是的」" 

# monologue
# JP: 首をかしげたオリヴィへと、\nポーレットはやわらかに微笑みかける。
3263 = "奧莉薇歪著小腦袋表示不解，波萊特則是回以熱情的微笑。" 

# 【ポーレット】
# display as 波萊特
# JP: 「今回の書類、\nわたしは、電車姫様に見ていただくべきと思うの」
2824 = "「這次的資料，我覺得應該讓電車公主殿下過目」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2368 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど、何かの理由でオリヴィちゃんが嫌がるのなら、\nお話して、嫌がる理由を知って、それを取り除きたい」
2268 = "「可如果你因為一些原因不想給她看的話，那就把話說透，搞清楚其中的理由，並打消你的顧慮」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「とりのぞけなかったら？」
2754 = "「要是沒能打消奧莉薇的顧慮呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「…他の誰かに説明をお願いする。双鉄君に日々姫ちゃん。\n真闇さん。ハチロクちゃん、れいなにも」
1723 = "「……那就再換個人試試，讓雙鐵君或者日日姬來。再不行還有真闇小姐、八六和玲奈呢」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、そのときにはがんばりますねぇ！」
2683 = "「玲奈，到時會好好加油的！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん。お願い、いまはだいじょうぶだと思うけど」
2373 = "「嗯，麻煩了。不過現在應該還不需要」" 

# 【れいな】
# display as 玲奈
# JP: 「そぉですかー」
2820 = "「這樣哦」" 

# monologue
# JP: むん！　と張り切ったれいなの顔が、\nポーレットになでられ、すぐにニコニコ顔へと戻る。
3376 = "波萊特捏了捏玲奈那繃得緊緊的小臉。放鬆下來的玲奈臉上又恢復了往常的笑容。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それって――」
2834 = "「那——」" 

# monologue
# JP: 不意に、オリヴィの口調が変わる。トーンが落ちる。
3117 = "不知不覺間，奧莉薇的語調也平緩了下來。" 

# monologue
# JP: ついさっきまで口元に浮かんでいた、\nいたずらっぽいような表情も、掻き消えている。
3204 = "剛剛還掛在嘴角上那一絲略顯調皮的表情，也消失得無影無蹤。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……よってたかって説得して、言うこと聞かせるんなら、\n最初から命令の方が早くない？」
1721 = "「……這麼一大群人來說服奧莉薇聽你們的話，一開始就直接下命令不是要快得多嘛？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2827 = "「這！」" 

# monologue
# JP: ああ――これは……オリヴィは今、\n重ねて、思い出しているのかもしれない。
3228 = "啊——奧莉薇這是……觸景生情想起那時的情景了吧。" 

# monologue
# JP: みかん鉄道から御一夜鉄道に移籍した――\nあの日の、自らの決断を。
3310 = "從橙鐵路轉屬來到御一夜鐵路那一天，自己做出的決定。" 

# 【ポーレット】
# display as 波萊特
# JP: 「もし誰も、オリヴィちゃんに大事さを伝えられなくて。\nオリヴィちゃんが、ずっと『嫌だ』って拒むのだとして」
2432 = "「如果誰都不能讓奧莉薇理解這件事的重要性，奧莉薇還是一直都“不想”的話」" 

# monologue
# JP: ポーレットもそう感じたのだろうか、\n言葉が、いっそう慎重になる。
3375 = "波萊特想必也察覺到了吧，言辭也因而越來越謹慎。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……このくらいに大事なこと、絶対にやるべきことなら、最終的には、わたしも、命令をすることになると思う」
1710 = "「……考慮到這件事的重要性，還是有做的必要，最終我可能會以命令的形式加以處理」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「でしょう！？　ならおんなじ！」
2587 = "「是吧！？那不還是一樣嘛！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
2810 = "「這——」" 

# 【ハチロク】
# display as 八六
# JP: 「果たしておんなじ、でございましょうか？\n頭ごなしの命令と、ご説明をしていただいての、命令が」
2149 = "「一開始不分青紅皂白的命令和擺事實講道理之後的命令，這兩者真的能劃等號嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「え？」
# 2300 = "「咦？」" 

# monologue
# JP: ほっとしていたようなオリヴィの表情が、真顔に戻る。
3259 = "奧莉薇剛剛有所放鬆的表情，又變得嚴肅了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「電車姫様のご照会を受け、もしもポーレット様が、\nオリヴィちゃんに何も尋ねず、それに応じていたときと」
2451 = "「對電車公主殿下過目的請求，如果波萊特大人不與奧莉薇做任何確認直接應允」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「――うん」
1635 = "「——嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんに確認し、その疑問を受けとめて、\nこうしてみんなでお話して、そののちに下る、命令と」
2291 = "「和先與奧莉薇商量，了解奧莉薇的疑問，再博採眾議之後下達命令」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
# 1670 = "「……」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんにとって、両者は全く同じでしょうか？\n説明に注がれた言葉は、思いは。無意味で無価値と」
2395 = "「在奧莉薇看來，兩者當真毫無差別嗎？解釋與溝通中的言辭與想法，都是沒有意義沒有價值的嗎」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなことない！　ムイミじゃないし、\nムカチなんかじゃ、絶対にない！」
2650 = "「沒這回事！並不是沒有意義，絕不會沒有價值！」" 

# monologue
# JP: ハチロクの言葉をうけて反発し――\nオリヴィは、あ、の形のままで口の動きを止める。
3266 = "奧莉薇聽到八六這樣說不假思索地反駁——但說到這裡，卻又戛然而止。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「……そっか、うん。そうだよね。全然ちがう。\n何がちがうか、オリヴィ、すぐにはわかんないけど」
1720 = "「……這樣啊，嗯。確實，完全不一樣。只是這其中的區別，奧莉薇沒能馬上想明白而已」" 

# monologue
# JP: 小さく頷き――\nオリヴィは、少し恥ずかしそうにポーレットを見る。
3267 = "奧莉薇輕輕地點了點頭，而後略顯羞愧地看向了波萊特。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だけど、オリヴィに聞いてくれてありがとう。\nそれで、説明もしてくれて、ありがとう」
2163 = "「不過，還是謝謝你來詢問奧莉薇的意見。也謝謝你們這樣貼心的說明」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、どういたしまして。それじゃ、\n御一夜鉄道社長として――もう一回、聞きますね？」
2382 = "「嘻嘻，不客氣。那我以御一夜鐵路社長的身份再問一次囉？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2368 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんが前回[おおみや,1]旺宮で受けた検査の結果を、\nわたしは、電車姫様に確認してもらいたいと思います」
2532 = "「我想要把奧莉薇之前去大宮接受檢查的結果，交給電車公主殿下過目」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2368 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうすることで、オリヴィちゃんの延命方法が\n見つかる可能性を、あげられるって考えるからです」
2542 = "「我認為，此舉可以提高找到延長奧莉薇壽命方法的可能性」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2368 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんの能力と経験を弊社は高く評価しており、\n稼働期間の延長は、社にとって有益であると判断します」
2524 = "「我公司對奧莉薇的能力和經驗都有著很高的評價，如果能延長工作年限，想必可以為公司帶來積極影響」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
2369 = "「嗯！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だから。――オリヴィちゃんの検査記録を、\n電車姫様にみてもらっても、いいですか？」
2561 = "「所以，我可以把奧莉薇的檢查記錄，交給電車公主殿下過目嗎？」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「～～～っ！　うんっ！！！」
2920 = "「～～～唔！嗯！！！」" 

# monologue
# JP: 思いっきりの笑顔で強く頷いて。\nオリヴィは、その笑顔のままハチロクを向く。
3269 = "奧莉薇開心地用力點了點頭，而後笑著轉頭看向八六。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほんとに違う！　セツメーをちゃんとしてもらえると、\nおんなじ『うん！』でも、全然ちがうっ！」
2700 = "「真的是不一樣！有了被尊重的感覺，即便都是“嗯！”說起來的感覺都完全不一樣！」" 

# 【ハチロク】
# display as 八六
# JP: 「それは大変――まことに、よろしゅうございました」
2877 = "「那還真是——的確是甚好的」" 

# 【電車姫】
# display as 電車公主
# JP: 「まことに、の」
2696 = "「的確如此」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2284 = "「呃！」" 

# monologue
# JP: オリヴィを説得している間に、\n手配をすませておいたのだろう。
3273 = "她應該是趁我們說服奧莉薇的時候，把事情都辦妥了吧。" 

# monologue
# JP: 画面外から伸びてきた手が渡した書類を、\nぱらぱらと、電車姫様は驚くべき速度で繰っていく。
3534 = "電車公主殿下接過畫面外伸來的手中的文件，開始以驚人的速度翻閱了起來。" 

# 【電車姫】
# display as 電車公主
# JP: 「雛衣の経営手段には、多いに評価できる面が数多あると、\nわらわも改めて理解できたことは、有意であった」
2899 = "「雛衣之經營手段多有大受好評之處，余此番亦深有體會，著實頗有意義」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！？　ありがとうございます――以上に、すみません。\n内々の話で、電車姫様の貴重なお時間を――」
2343 = "「啊！？殿下過獎——適才我公司內部事務討論卻讓殿下久等，十分抱歉」" 

# 【電車姫】
# display as 電車公主
# JP: 「浪費と思わば、[さえぎ]遮っておる。御一夜鉄道という組織の\nつながりの強さを目の当たりにできたことも、良かった」
2739 = "「若余當真覺得無聊，便早出言打斷了。得親眼目睹御一夜鐵路眾人相處之融洽，實幸事也」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ……あの、\nそういっていただけますと、恐縮、です」
2308 = "「哈……承殿下貴言，不勝惶恐」" 

# 【電車姫】
# display as 電車公主
# JP: 「さて。オリヴィの状態をざらりと見せてもらったが――\n法定検査を、なんとか“通した”といった状態であるの」
2767 = "「言歸正傳。余已搭眼看過奧莉薇的狀態——以法定檢查基準而言，可算“勉強通過”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2827 = "「這！」" 

# monologue
# JP: オリヴィを目の前にしてそこまでハッキリ――\n一瞬思うが、けれども誰も反応しない。
3408 = "當著奧莉薇的面竟然說得如此直接——但左右一看，似乎除我以外都並沒有什麼特別的反應。" 

# monologue
# JP: ハチロクも、れいなも、オリヴィ自身も。\nならばそれは、自明のことであるのかもしれん。
3188 = "八六如此，玲奈如此，奧莉薇自己亦如此。如此看來，她們自己其實也都心知肚明吧。" 

# 【電車姫】
# display as 電車公主
# JP: 「『毎年の全検を強く推奨』とは――毎年全検を受けねば、\n“なんとか通す”ことすらも不可能になるとの意であろ」
1664 = "「“強烈建議每年全檢”——換言之，若非每年接受全檢，“勉強通過”抑或難以保證」" 

# monologue
# JP: パチン、パチンと、小刻みに電車姫様の扇子が鳴らされる。
3533 = "電車公主殿下手中的扇子開開合合，發出“啪啪”的聲響。" 

# 【電車姫】
# display as 電車公主
# JP: 「……すまぬの。ここまで悪くては、試すことすらできぬ。\nできるのはただ、一般的な助言のみとなろうの」
1701 = "「……抱歉。狀況此般不濟，只怕嘗試亦無從談起。余只得提些一般性的建議」" 

# 【ポーレット】
# display as 波萊特＆雙鐵
# JP: 「試すって？」\n「一般的な助言とは、延命に関するご助言でしょうか？」
2377 = "「嘗試是指？」\\n「一般性的建議，是關於延長壽命的建議嗎?」" 

# 【電車姫】
# display as 電車公主
# JP: 「ふむ」
# 2368 = "「嗯」" 

# monologue
# JP: ゆるり、扇子が開かれる。\nその口元が隠されて、瞳でしか表情が伺えなくなる。
3539 = "電車公主殿下緩緩地展開扇子，輕掩口鼻。而我們也只能從餘下的雙眼中一窺她的表情了。" 

# 【電車姫】
# display as 電車公主
# JP: 「正確には、『状況の悪化を防ぎやすくする方法』かの？\n人間でいうところの、『健康法』のようなものじゃ」
2634 = "「正確而言，或應為“應可防狀況惡化之方法”？以人類而言，或與“保健方法”相似」" 

# 【ハチロク】
# display as 八六
# JP: 「健康法……でございますか」
2218 = "「保健方法……嗎」" 

# 【電車姫】
# display as 電車公主
# JP: 「それをしていても病気にはなるし怪我もするし死ぬ。\nが、なにもせぬよりは健康でいられる確率を上昇させる」
2252 = "「即便全部照做，亦仍可能生病、受傷，當然也會死。然，較之不做有更大可能保持健康狀態」" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;にとっての病気と怪我は、\n故障、破損となるのだろうか。
3448 = "而生病和受傷換到\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;身上的話，就是故障和損壞吧。" 

# monologue
# JP: その発生の確率を、もしも少しでも下げられるなら――
3445 = "而如果能降低這些情況發生的機率，哪怕一點點——" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ケンコーでいられる可能性！\nちょっとでも、１％でもあがるなら、それ知りたい！！」
2219 = "「保持健康的可能性！如果能提升的話，哪怕只有１％，奧莉薇也想知道！！」" 

# 【電車姫】
# display as 電車公主
# JP: 「なれば教えようぞ？　ちょうど、情報の一般公開に向け、\n[りんしょう,1]臨床データを増やしたいところでもあったしの」
2847 = "「那便如此說定。亦可同時收集些許臨床數據以便日後向公眾公開」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！　じゃ、オリヴィそのデータ提供したい！\nそうしてもいい？　ポーレット？」
2915 = "「ＯＫ！那奧莉薇就提供這些數據吧！這樣可以嗎，波萊特？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「もちろん。そうしてもらえると会社としても助かる」
2689 = "「當然可以。這樣對公司也能有所幫助」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さま」
2895 = "「雙鐵少爺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。もしハチロクも、その\x%lレイルロオド;#00ffc040;レイルロオド%l;#;健康法を、\n試せるのであれば、ぜひ、データを提供させて下さい」
2364 = "「嗯。我們也願意提供數據，不知能否也能讓八六嘗試那個\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;保健方法呢」" 

# 【れいな】
# display as 玲奈
# JP: 「ポーレットぉ。れいなも、そうしていいですかぁ？」
2664 = "「波萊特，玲奈也想試試，可以嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「もちろん！」
2692 = "「當然！」" 

# 【電車姫】
# display as 電車公主
# JP: 「くふふっ、『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;健康法』か。単純明快な\n名じゃの。正式発表のときの候補にさせてもらうぞ」
2286 = "「呵呵，“\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;保健方法”嗎。此名著實簡單明瞭，不妨列做正式名稱之候補」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい――電車姫さまのお言葉をつなげただけですので。\nどうぞ、ご随意にお取扱いいただけましたらと」
2817 = "「這名字不過是由電車公主殿下的話語中拼摘而來，大可隨意使用」" 

# 【電車姫】
# display as 電車公主
# JP: 「なれば、『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;健康法』を教えよう。\nなに――ごくごく単純で簡単なものじゃ」
2825 = "「這般。余便將“\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;保健方法”教予你們。實乃極其簡單明瞭之法」" 

# monologue
# JP: ……健康法の教示を受ければ、その簡便さに驚かされる。
1603 = "……我們在聽聞這保健方法的內容後，也對其簡單便利頗感驚訝。" 

# monologue
# JP: そして同時に、僕が今まで――ハチロクの夫たる僕でさえ、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の健康に、配慮してなかったと思い知る。
3452 = "而與此同時，我也深刻意識到，作為八六的丈夫，我迄今為止竟完全沒有擔心過身為\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的她的健康情況。" 

# monologue
# JP: （\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は機械で、物だと――整備点検を任せて\nおけば大丈夫だと、どこかで思い込んでしまっていたか）
3587 = "（看來我還是存在這種固定觀念，以為\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;乃是機械，是物品——只要整備清查到位，便應沒有問題）" 

# 【電車姫】
# display as 電車公主
# JP: 「――簡単であろ？　明日。いな、\n今日からでもすぐに試してみるがよい」
1643 = "「——著實簡單否？何不自明日——不，應自今日起便著手嘗試」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。必ず、毎日実践します」
2245 = "「十分感謝。必定每日堅持不放鬆」" 

# 【ポーレット】
# display as 波萊特
# JP: 「本当に、ありがとうございます！　わたし――なんか、\nなんていうのか、目からウロコがボロボロ落ちました」
2697 = "「真是十分感謝。奇怪，為什麼聽到這麼開心的事情，我的淚水反而止不住呢」" 

# 【電車姫】
# display as 電車公主
# JP: 「なれば、ウロコの落ちた目で別件を見てもらえるかの？\n雛衣、右田。いま少し時間を、かまわぬか？」
2894 = "「雖在你喜極而泣之時略難啟齒，但雛衣，右田，還有件事，占用你們些許時間可好？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしは、大丈夫ですけれど」
2539 = "「我沒有問題的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もです」
2508 = "「我也一樣」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん、れいな？\nわたくしたちは、先に、お仕事に戻りましょう」
2421 = "「奧莉薇，玲奈，我們先回去工作吧」" 

# monologue
# JP: 気を利かせ、\nハチロクがオリヴィとれいなを連れて外へ出ていく。
3457 = "聰明伶俐的八六，見狀便帶著奧莉薇和玲奈先離開了。" 

# monologue
# JP: ドアが閉まる音が響いた途端、\n電車姫様の瞳がスウっと――刃物のように鋭く細まる。
3294 = "就在關門的響聲傳入耳中的時候，電車公主殿下的眼神突然變得犀利了起來。" 

# 【電車姫】
# display as 電車公主
# JP: 「さて、雛衣。\n賢明で優秀な経営者たるそこもとに、ひとつ、聞きたい」
2900 = "「雛衣，汝深諳經營之道，精明而優秀。余卻有一事要問」" 

# 【ポーレット】
# display as 波萊特
# JP: 「懸命はともかく……優秀とはまるで思えませんけれど。\nわたしにお答えできることなら、何なりと」
2242 = "「努力是自不在話下啦……但優秀我還遠談不上。若是我能確定的事情，請不吝開口」" 

# 【電車姫】
# display as 電車公主
# JP: 「なれば、問おう」
2845 = "「那余便問了」" 

# monologue
# JP: パチリ、電車姫様は扇子を一瞬強く閉じ、\n乾いた音を響かせる。
3532 = "電車公主殿下乾脆俐落地合起了扇子，只留清脆的聲音傳入我們耳中。" 

# 【電車姫】
# display as 電車公主
# JP: 「毎年の全検など、御一夜鉄道の資本力では\nとても果たせることではないと――わかっておろう？」
2745 = "「若言每年之全檢，以御一夜鐵路之資本實力，幾無負擔之可能——汝亦心知肚明否？」" 

# monologue
# JP: （ピピピっ！　ピピピっ！）
3591 = "（蜂鳴音！）" 

# 【ハチロク】
# display as 八六
# JP: 「ふぁ、ほーへふふぁは」
2916 = "「ａ，ｃｅｈａｏｌｅ」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、鳴ったな。\nでは体温を確認してみよう」
2349 = "「啊，在叫了。來，我看看體溫如何了」" 

# 【ハチロク】
# display as 八六
# JP: 「ふぁい、おねふぁひひはひふぁふ」
2917 = "「ｈａｏｄｅ，ｂａｉｔｕｏｌｅ」" 

# monologue
# JP: 口にくわえた体温計を抜いて、取る。
3333 = "我伸手去取八六口中的體溫計。" 

# monologue
# JP: 簡単にできそうなことではあるが、\nハチロクは、そっと目を閉じ、僕に体温計を向けてくる。
3526 = "雖然並不是什麼費事的動作，八六卻把臉朝向我閉上了眼睛，讓我伸手就能拿到體溫計。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでは、抜くぞ？　噛まんようにな」
2869 = "「那我拿囉？不要咬」" 

# 【ハチロク】
# display as 八六
# JP: 「ほほほへへほひはふ」
2918 = "「ｎｉｎｊｉｕｆａｎｇｘｉｎｎａｂａ」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2861 = "「那好」" 

# monologue
# JP: （つぽっ）
3584 = "（拔出）" 

# monologue
# JP: なんの苦もなく、体温計はハチロクの口内から僕の手へ
3337 = "我毫不費力地把體溫計從八六嘴裡拔出，拿在了手裡。" 

# 【ハチロク】
# display as 八六
# JP: 「あっ！？　双鉄さま、少々おまちくださいまし」
2346 = "「啊！？雙鐵少爺，還請稍等片刻」" 

# monologue
# JP: ハチロクがあわてたように体温計を奪い取り、\n僕にくるりと背中を向けて――
3190 = "八六略顯慌忙地從我手中拿走了體溫計，然後轉過身去——" 

# monologue
# JP: （ああ、よだれでテラテラだったのが恥ずかしいのか）
3583 = "（啊，她這是覺得黏在體溫計上的口水不好意思了嗎）" 

# monologue
# JP: ハンカチで丁寧に体温計をぬぐいとる――\nそんな仕草が、実にあいらしく愛おしい。
3474 = "見她用手帕仔細地把體溫計擦拭乾淨——這小心思著實惹人憐愛。" 

# 【ハチロク】
# display as 八六
# JP: 「はい、おまたせいたしました」
2422 = "「好了，讓您久等了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。だが――今ふいたので、\n多少は温度があがってしまった可能性がある」
2361 = "「嗯。不過啊——你剛才這麼一擦，溫度說不定也會有所變化呢」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ」
2328 = "「啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「って、イチャイチャしてないで温度みよーよ！\nハチロク何度！？　オリヴィ、ちょーど40度だったよ！」
2206 = "「你們啊，別在那秀恩愛快看溫度啦！八六到底幾度呀！？奧莉薇正好四十度哦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2312 = "「哦」" 

# monologue
# JP: ご指摘、まさにそのとおり。\n今のは確かに、状況をわすれたイチャイチャだった。
3278 = "她說的一點都沒錯。現在確實不是我們兩個你儂我儂的場合。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクは……ふむ、38度4分か」
2228 = "「八六是……嗯，３８.４度」" 

# monologue
# JP: ……電車姫様からいただいたご助言を記したメモを見る。
1605 = "……我對照了一下記有電車公主殿下建議的筆記本。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクは、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;\x%lレイルロオド;#;#00ffc040;レイルロオド%l;#;の標準値の中だな。\nオリヴィも同様であるが、警戒域にかなり近い」
2231 = "「八六的體溫在\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;\\x%lレイルロオド;#;#00ffc040;鐵路人偶%l;#;的中間值區間。奧莉薇也在這個區間裡，不過離警戒線很近了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「アンセー時に41度をこえたらやすませたほーがいい、\nだっけ？　なら、１度もヨユーあるし、平気だよー」
2609 = "「是說安靜時如果超過四十一度就要休息來著？那還差一度呢，沒事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……かもしれんが、\n大事にしておく方がいいことは間違いない」
1698 = "「……或許吧，不過小心駛得萬年船」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「まあねー。\nでも今日はもう乗務もないし、ヨユーでしょ！」
2221 = "「倒也沒錯。不過今天又沒有乘務任務，沒問題噠！」" 

# 【ハチロク】
# display as 八六
# JP: 「乗務がなくとも、\n21時から緊急の会議がございますよ？」
2468 = "「就算沒有乘務任務，晚上九點時候還有緊急會議要出席呢？」" 

# monologue
# JP: 言った笑顔が、\n急激な勢いでくもり始める。
3480 = "說著說著，八六臉上的笑意就被嚴肅給取代了。" 

# 【ハチロク】
# display as 八六
# JP: 「頭を使いすぎての発熱などあったらいかがしましょう？\n念のため、会議への出席を見合わせることも――」
2757 = "「要是用腦過度再發熱可怎麼辦？安全起見，出席會議還是推遲為好——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「赤ちゃんあつかいー」
2262 = "「又拿奧莉薇當小寶寶了——」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ！？　あのっ――いえ、わたくし、その」
2345 = "「啊！？這——不是的，我只是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィも病み上がりだ。心配が多少、過保護気味に\nなってしまうのは、勘弁してやってもらえると嬉しい」
2413 = "「奧莉薇也是大病初癒，大家擔心你，難免有一點保護過度，就不要計較了吧」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「カンベンもなにもおこってないよー。\nハチロクがうっかりしちゃっただけなの、わかってるし」
2772 = "「說什麼計較不計較，奧莉薇又沒生氣。八六也不是有意的，奧莉薇這點還是知道的」" 

# 【ハチロク】
# display as 八六
# JP: 「すみません。心配をするにしても、伝え方、ですよね。\nわたくし、何度も同じ過ちを繰り返してしまって」
