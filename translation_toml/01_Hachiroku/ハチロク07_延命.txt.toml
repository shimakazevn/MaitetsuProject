[script]
# lines: 522 
# 【電車姫】
# display as 電車公主
# JP: 「なんじゃ、いよいよ決定稿を見られるものかと\n少しは期待しておったのじゃが」
2715 = "「Gì chứ, ta cứ mong đợi là cuối cùng cũng được\nchiêm ngưỡng bản thiết kế chính thức cơ đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「〆切ギリギリまで磨き上げたいとのことです。\n『それまで待っていていただきたい』と、日々姫から」
2522 = "「Cô ấy muốn trau chuốt cho đến sát hạn chót ạ.\nHibiki có nhắn là 'mong ngài hãy đợi đến lúc đó' ạ」"
# 【電車姫】
# display as 電車公主
# JP: 「くふふっ、これはわらわがいささか先走ってしもうたの。\n無論、その日を楽しみに待たせてもらおうぞ」
2383 = "「Kufufu, ra là ta đã hơi cầm đèn chạy trước ô tô rồi.\nĐương nhiên, ta sẽ vui vẻ chờ đợi đến ngày đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「恐れ入ります」
2152 = "「Thật vinh hạnh cho chúng tôi ạ」"
# monologue
# JP: ――6年間。日々姫が描き出してきたデザインたちは、\n僕らと電車姫様との距離を、確実に大きく縮めてくれた。
1588 = "――6 năm qua. Những thiết kế mà Hibiki tạo ra,\nđã thực sự kéo gần khoảng cách giữa chúng tôi và Điện xá Công chúa điện hạ một cách đáng kể."
# 【電車姫】
# display as 電車公主
# JP: 「で、じゃ。\n雛衣から照会のあった件じゃがの」
2736 = "「Thế thì.\nVề chuyện mà Hinai đã hỏi thăm」"
# monologue
# JP: かなり踏み込んだ質問を、直接電車姫様にぶつける――\nそれが許される程度にまでも。
3451 = "Đặt những câu hỏi khá sâu sát, trực tiếp với Điện xá Công chúa điện hạ――\nĐến mức độ được phép làm như vậy."
# 【電車姫】
# display as 電車公主
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の延命に関わる研究助成もしておるぞ？\nなにせ、この身にもかかわることゆえの」
2197 = "「Ta cũng có tài trợ cho các nghiên cứu liên quan đến việc kéo dài tuổi thọ của \x%lレイルロオド;#00ffc040;Railord%l;#; đấy?\nDù sao thì, chuyện đó cũng liên quan đến chính bản thân ta mà」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、やっぱり！\nだよねー、そーなんだ！」
2319 = "「A, quả nhiên là vậy!\nĐúng mà ha, ra là thế!」"
# 【ポーレット】
# display as 波萊特
# JP: 「って、オリヴィちゃん！？」
2420 = "「Này, Olivy!?」"
# monologue
# JP: 電車姫様への、あまりにも親しげな口調にだろう。
3161 = "Có lẽ là vì giọng điệu quá đỗi thân mật với Điện xá Công chúa điện hạ."
# monologue
# JP: ネット会議の真っ最中にもかかわらず、\nポーレットが慌ててオリヴィの方へと――
3171 = "Bất chấp việc đang giữa cuộc họp trực tuyến,\nPaulette cuống cuồng hướng về phía Olivy――"
# 【電車姫】
# display as 電車公主
# JP: 「[ひない,1]雛衣、構わぬ」
2901 = "「Hinai, không sao đâu」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ？」
2300 = "「Dạ?」"
# 【電車姫】
# display as 電車公主
# JP: 「お家騒動を防ぐため、みな[ていさい,1]体裁を守らねばならぬ。\nゆえ、何も揺るがぬ。誰が、何を申したとしても、の」
2502 = "「Để tránh gia đình xào xáo, mọi người đều phải giữ thể diện.\nVì thế, không có gì bị lung lay cả. Cho dù ai có nói gì đi nữa」"
# 【ポーレット】
# display as 波萊特
# JP: 「そう……ですか？\n電車姫様がそうおっしゃるなら、わたしからは何も」
2614 = "「Vậy…… sao ạ?\nNếu Điện xá Công chúa điện hạ đã nói thế, thì tôi không ý kiến gì nữa」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィもなんにもいわないよー。人様のおうちの\nジジョーには、首つっこんじゃだめなんだもーん」
2858 = "「Olivy cũng không nói gì nữa đâu~. Chuyện nhà người ta,\nthì không được chọc ngoáy vào mà~」"
# 【電車姫】
# display as 電車公主
# JP: 「ふふ。と、申してもおるしの」
2379 = "「Fufu. Em ấy cũng nói vậy mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
2374 = "「Hửm?」"
# monologue
# JP: どうやら、口調どうこうの問題ではないようだ。
3411 = "Có vẻ như, không phải là vấn đề về giọng điệu."
# monologue
# JP: ならば、“ひとさまのおうちの事情”だの、“お家騒動”\nだのやらが、ポーレットが慌てた理由であろう……か？
3522 = "Nếu vậy, 'chuyện nhà người ta', hay 'gia đình xào xáo'\ngì đó, mới là lý do khiến Paulette hoảng hốt chăng……?"
# 【ハチロク】
# display as 八六
# JP: 「あの……双鉄さま？」
2812 = "「Ừm…… ngài Soutetsu?」"
# monologue
# JP: ハチロクに聞こうと思った瞬間、\nハチロクの方から聞かれてしまう。
3344 = "Đúng lúc tôi định hỏi Hachiroku,\nthì lại bị Hachiroku hỏi ngược lại."
# monologue
# JP: すがる瞳で見上げられ、答えを教えてやりたくなるが――
3468 = "Bị ngước nhìn bằng ánh mắt cầu cứu, tôi rất muốn nói cho em ấy câu trả lời nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「残念ながら、僕もわからん」
2486 = "「Tiếc là, anh cũng không biết」"
# 【ハチロク】
# display as 八六
# JP: 「まぁ、左様なのですね」
2315 = "「Ôi, ra là vậy ạ」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ」
2316 = "「Ufufu~」"
# monologue
# JP: わかっているのかいないのか、いつものにこにこ顔をして、\nれいなはポーレットの膝の上に収まってる。
3392 = "Không biết là có hiểu hay không, với nụ cười tủm tỉm như mọi khi,\nReina đang ngoan ngoãn ngồi trên đùi Paulette."
# monologue
# JP: （……ポーレットとオリヴィは、\n何かをわかってる様子だが――）
3567 = "（……Paulette và Olivy,\ncó vẻ như đang hiểu ra điều gì đó nhưng――）"
# monologue
# JP: しかしオリヴィの言葉のとおり、\n僕らがそこに、首を突っ込んで良いものだとも思えない。
3132 = "Nhưng đúng như lời Olivy nói,\ntôi cũng không nghĩ chúng tôi nên chọc ngoáy vào chuyện đó."
# 【電車姫】
# display as 電車公主
# JP: 「くふふっ」
2285 = "「Kufufu」"
# monologue
# JP: 電車姫様は、いとも楽しげな笑いを零す。\nその口元はけれどもすぐに、扇によって隠されてしまう。
3535 = "Điện xá Công chúa điện hạ, bật cười vô cùng thích thú.\nNhưng ngay sau đó, khóe miệng ngài đã bị chiếc quạt che khuất."
# 【電車姫】
# display as 電車公主
# JP: 「思いもかけず、オリヴィは[しょせい,1]処世の[すべ]術に明るいようじゃの。\nいずこで学んだ？」
2415 = "「Thật không ngờ, Olivy có vẻ rất am hiểu nghệ thuật đối nhân xử thế nhỉ.\nHọc ở đâu ra vậy?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ムナカタからだよ！　オリヴィが知ってる大事なことは、\nぜーんぶムナカタをみてべんきょーしたんだ」
2612 = "「Từ Munakata đó!\nNhững điều quan trọng mà Olivy biết, toàn bộ đều là học từ Munakata đấy」"
# 【電車姫】
# display as 電車公主
# JP: 「！」
2313 = "「!」"
# monologue
# JP: ほんの一瞬――電車姫様が息を呑む。
3536 = "Chỉ một khoảnh khắc――Điện xá Công chúa điện hạ nín thở."
# 【電車姫】
# display as 電車公主
# JP: 「……なるほどの。左様であったか」
1686 = "「……Ra là vậy. Thế à」"
# monologue
# JP: ああ、やはりかと。その眼差しの動きに思う。\nオリヴィが、いかに宗方\x%l機関士;#00ffc040;機関士%l;#;を敬愛しているか――
3417 = "À, quả nhiên là vậy. Tôi thầm nghĩ khi nhìn thấy ánh mắt ấy chuyển động.\nOlivy kính yêu \x%l機関士;#00ffc040;Lái tàu%l;#; Munakata đến nhường nào――"
# monologue
# JP: 今のほんの一言だけで、輝くような笑顔だけでも、\n電車姫様にも、はっきり伝わるものなのだと。
3174 = "Chỉ bằng một câu nói vừa rồi, chỉ bằng nụ cười rạng rỡ ấy,\ncũng đủ để truyền đạt rõ ràng đến Điện xá Công chúa điện hạ."
# 【電車姫】
# display as 電車公主
# JP: 「なれば、その教えを授けたムナカタとやらに、\nわらわも感謝せねばならぬの」
2434 = "「Nếu vậy, với cái người tên Munakata đã truyền dạy những điều đó,\nta cũng phải gửi lời cảm ơn mới được」"
# monologue
# JP: 瞳に束の間うかんでみえた、淋しげな陰りをかき消して、\n電車姫様の視線が左に動く。
3537 = "Xua đi nét u buồn thoáng hiện trong đôi mắt,\nánh nhìn của Điện xá Công chúa điện hạ chuyển sang trái."
# monologue
# JP: とたん、カメラが捉える範囲の外で、\nバタバタと足音が遠ざかっていく。
3301 = "Ngay lập tức, bên ngoài phạm vi camera có thể ghi hình,\ntiếng bước chân vội vã lùi xa dần."
# 【電車姫】
# display as 電車公主
# JP: 「[おおみや,1]旺宮の旧帝鉄\x%lレイルロオド;#00ffc040;レイルロオド%l;#;工機部――\n現・旺宮\x%lレイルロオド;#00ffc040;レイルロオド%l;#;研究所には、資金を投下しておる」
2203 = "「Bộ phận Cơ khí \x%lレイルロオド;#00ffc040;Railord%l;#; Đường sắt Hoàng gia cũ ở Omiya――\nNay là Viện nghiên cứu \x%lレイルロオド;#00ffc040;Railord%l;#; Omiya, ta đang đầu tư vốn vào đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「研究所、ですか？」
2706 = "「Viện nghiên cứu, sao ạ?」"
# 【電車姫】
# display as 電車公主
# JP: 「であるぞ。大廃線への抗い方は、わらわらのような、\n営業運転の継続という形のみには、とどまらぬ」
2673 = "「Đúng vậy. Cách chống lại Đại bãi bỏ, không chỉ dừng lại\nở hình thức tiếp tục vận hành kinh doanh như chúng ta đâu」"
# 【ポーレット】
# display as 波萊特
# JP: 「[てつれき,1]鉄歴――[おおみや,1]旺宮の、鉄道歴史館！」
2885 = "「Tetsureki――Bảo tàng Lịch sử Đường sắt ở Omiya!」"
# 【電車姫】
# display as 電車公主
# JP: 「左様じゃ。状態のよい\x%l静態保存;#00ffc040;静態保存%l;#;機を集め、集客・展示し、\n鉄道の歴史を伝えるとともに、資金を稼ぐ」
2629 = "「Đúng thế. Thu thập các cỗ máy \x%l静態保存;#00ffc040;bảo quản tĩnh%l;#; còn tốt, thu hút khách tham quan và trưng bày,\nvừa truyền bá lịch sử đường sắt, vừa kiếm thêm nguồn vốn」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――でしたら、ひょっとして……\nその収益を、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;研究に？」
2320 = "「A――nếu vậy, không lẽ……\nlợi nhuận đó, được dùng cho nghiên cứu \x%lレイルロオド;#00ffc040;Railord%l;#; sao?」"
# 【電車姫】
# display as 電車公主
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;研究にも、であるがの。くふふっ、さても\n変わり者はおるものじゃ、人にも、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にも」
1624 = "「Dành cho cả nghiên cứu \x%lレイルロオド;#00ffc040;Railord%l;#; nữa đấy. Kufufu, quả thật\nluôn có những kẻ lập dị, dù là con người hay \x%lレイルロオド;#00ffc040;Railord%l;#;」"
# 【双鉄】
# display as 雙鐵
# JP: 「変わり者……とは」
2687 = "「Kẻ lập dị…… là sao ạ」"
# 【電車姫】
# display as 電車公主
# JP: 「旺宮の、文字通りの看板娘じゃ。\nほうっておいても、いずれ、まみえるときもあろうが」
2216 = "「Đúng nghĩa là cô gái biển hiệu của Omiya đấy.\nDù cứ để mặc đó, thì sớm muộn gì cũng có lúc chạm mặt thôi」"
# monologue
# JP: ふぁさっと小さく扇子が動けば、電車姫様の髪も揺れる。
3540 = "Chiếc quạt nhỏ khẽ phe phẩy, mái tóc của Điện xá Công chúa điện hạ cũng đung đưa theo."
# 【電車姫】
# display as 電車公主
# JP: 「機会をみつけ、一度は、会いにいってみるがよい。\nためになるぞ？　わらわの紹介と告げて構わぬ」
2154 = "「Tìm cơ hội, đi gặp một lần thử xem sao.\nSẽ có ích đấy? Cứ nói là do ta giới thiệu cũng không sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「ご厚意、ありがとうございます。それではできるだけ\n早い時期に、必ずお伺いいたしたく思います」
2246 = "「Xin cảm ơn nhã ý của ngài. Vậy thì chúng tôi nhất định\nsẽ đến thăm vào một ngày sớm nhất có thể ạ」"
# 【電車姫】
# display as 電車公主
# JP: 「うむ」
2368 = "「Ừm」"
# monologue
# JP: 機嫌よさそうなひとあおぎ。\n電車姫様の瞳がス――と細まる
3538 = "Một cái quạt có vẻ đầy mãn nguyện.\nĐôi mắt của Điện xá Công chúa điện hạ khẽ――nheo lại."
# 【電車姫】
# display as 電車公主
# JP: 「さて。[ひとがた、にんぎょうがた,5]人形/人形形\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の新造技術は、\nもとより[ひとくせい,2]秘匿性の高い技術であった」
2773 = "「Nào. Công nghệ chế tạo mới \x%lレイルロオド;#00ffc040;Railord%l;#; hình người,\nvốn dĩ đã là một công nghệ có tính bảo mật cao」"
# monologue
# JP: パチ、と扇子が閉じられる。
3283 = "Cạch, chiếc quạt gập lại."
# monologue
# JP: パチ、パチ、パチ。小さく繰り返される開け閉めの音は、\nいくらかのいらだちを伝えてくるようだ。
3455 = "Lạch, cạch, lạch. Âm thanh đóng mở lặp đi lặp lại nhè nhẹ,\nnhư đang truyền tải một sự bực dọc nào đó."
# 【電車姫】
# display as 電車公主
# JP: 「その上に大廃線じゃ。現状、少なくとも日ノ本の\n国内では、完全に再現不能の技術となってしまっておる」
2726 = "「Thêm vào đó là Đại bãi bỏ. Hiện tại, ít nhất là trong nội bộ Hinomoto,\nnó đã trở thành một công nghệ hoàn toàn không thể tái hiện lại được nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の新造は不可能と聞いてはいましたが――コストやニーズではなく、技術面で不可能なのですか？」
2513 = "「Tôi từng nghe nói việc chế tạo mới \x%lレイルロオド;#00ffc040;Railord%l;#; là bất khả thi――hóa ra không phải do chi phí hay nhu cầu, mà là bất khả thi về mặt kỹ thuật sao ạ?」"
# 【電車姫】
# display as 電車公主
# JP: 「それらの問題も無論ある。が、純粋な技術面でもまた、\nどうにもならぬ。ロオドコアをまるで再現できぬのじゃ」
2844 = "「Đương nhiên cũng có những vấn đề đó. Nhưng về mặt kỹ thuật thuần túy,\ncũng bó tay. Hoàn toàn không thể tái tạo lại Lõi Lord được」"
# 【ハチロク】
# display as 八六
# JP: 「ロオド――コア？」
2173 = "「Lõi――Lord?」"
# monologue
# JP: ハチロクの口調。\nまったく知らぬことがらのようだ。
3458 = "Giọng điệu của Hachiroku.\nCó vẻ như em ấy hoàn toàn không biết gì về chuyện này."
# monologue
# JP: れいなも、オリヴィもポカンとした顔――\nポーレットだけは、目をらんらんと輝かせている。
3390 = "Cả Reina và Olivy đều ngơ ngác――\nChỉ có Paulette là hai mắt sáng rực rỡ."
# 【ポーレット】
# display as 波萊特
# JP: 「ロオドコアって――なんですか？　それ」
2850 = "「Lõi Lord――là gì vậy ạ? Cái đó ấy」"
# 【電車姫】
# display as 電車公主
# JP: 「仮称じゃ。正式名称の存在しない――\n『\x%lタブレット;#00ffc040;タブレット%l;#;を\x%lタブレット;#00ffc040;タブレット%l;#;たらしめる何か』のこと」
1662 = "「Chỉ là tên gọi tạm thôi. Một thứ không có tên chính thức――\nLà 'thứ khiến \x%lタブレット;#00ffc040;Thẻ bảng%l;#; trở thành \x%lタブレット;#00ffc040;Thẻ bảng%l;#;'」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;を――\x%lタブレット;#00ffc040;タブレット%l;#;たらしめる」
2444 = "「Thứ khiến \x%lタブレット;#00ffc040;Thẻ bảng%l;#;――trở thành \x%lタブレット;#00ffc040;Thẻ bảng%l;#;」"
# 【ハチロク】
# display as 八六
# JP: 「……」
1670 = "「……」"
# monologue
# JP: 無意識にだろう。ハチロクが首元の\x%lタブレット;#00ffc040;タブレット%l;#;に触れる。\n\x%lタブレット;#00ffc040;タブレット%l;#;……確かに、極めて定義の難しいものだ。
3121 = "Chắc là trong vô thức. Hachiroku chạm vào chiếc \x%lタブレット;#00ffc040;Thẻ bảng%l;#; trên cổ.\n\x%lタブレット;#00ffc040;Thẻ bảng%l;#;…… quả thực là một thứ vô cùng khó định nghĩa."
# monologue
# JP: 単なる認証・起動、あるいは記憶媒体ではないものとは、\n僕もハッキリ感じてはいたが――
3298 = "Nó không đơn thuần chỉ là phương tiện xác thực, khởi động, hay lưu trữ ký ức,\ntôi cũng cảm nhận rõ điều đó nhưng――"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;を再現……あるいは新造しようとしても、\n果たせない――というほどの意味でしょうか？」
2839 = "「Ý ngài là dù có cố gắng tái tạo…… hay chế tạo mới \x%lタブレット;#00ffc040;Thẻ bảng%l;#;,\ncũng không thể thực hiện được――đúng không ạ?」"
# 【電車姫】
# display as 電車公主
# JP: 「[さと]聡いの、右田は。うむむ、いかん。\nいささか、口をすべらせすぎてしまったようじゃ」
2281 = "「Cậu nhạy bén đấy, Migita. Ưm, không được rồi.\nCó vẻ như ta đã hơi lỡ lời quá đà rồi」"
# monologue
# JP: 扇子がパっ、と開かれて、\n電車姫様の口元を覆い隠す。
3525 = "Chiếc quạt xòe ra cái phạch,\nche đi khóe miệng của Điện xá Công chúa điện hạ."
# monologue
# JP: 『このお話はここまで』と、\n仕草が極めて雄弁に、かつ断定的に告げてくる。
3277 = "'Chuyện này đến đây là kết thúc',\nCử chỉ đó đang thông báo một cách vô cùng hùng hồn và quả quyết."
# 【電車姫】
# display as 電車公主
# JP: 「の？　雛衣。前回オリヴィが受けた検査の結果。\nそれをわらわが、取り寄せてみても構わぬか？」
2881 = "「Sao hả? Hinai. Kết quả kiểm tra lần trước của Olivy.\nTa lấy về xem thử có được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　あ、えとっ」
2296 = "「Dạ!? À, ừm thì」"
# monologue
# JP: 話をあまりにいきなり振られ、あわててしまったのだろう。
3363 = "Chắc là do bị hỏi quá đột ngột nên cô ấy luống cuống."
# monologue
# JP: ポーレットは一瞬しどろもどろになって――\nけれどもすぐに、頷き、落ち着きを取り戻す。
3169 = "Paulette lắp bắp trong giây lát――\nnhưng ngay sau đó gật đầu, lấy lại bình tĩnh."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしは、そうしてもらった方がいいって思います。\nですから、オリヴィちゃんも良ければ」
2515 = "「Tôi nghĩ làm vậy thì tốt hơn ạ.\nThế nên, nếu Olivy cũng đồng ý」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「って、そんなことまでオリヴィに聞いてくれるの！？」
2356 = "「Này, đến cả chuyện đó mà cũng hỏi ý Olivy sao!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「もちろん。だって、オリヴィちゃん自身のことだから」
2690 = "「Tất nhiên rồi. Vì đó là chuyện của chính bản thân Olivy mà」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そうだけど――\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にそんなこと聞くなんて、\nオヒトヨ鉄道ってほんっとに……」
2770 = "「Đúng là vậy nhưng――đi hỏi \x%lレイルロオド;#00ffc040;Railord%l;#; mấy chuyện đó,\nĐường sắt Ohigawa đúng là……」"
# monologue
# JP: そこまで言って、不意にオリヴィは言葉を止める。\n瞳がニヤっと、少しいたずらげな形に変わる。
3479 = "Nói đến đó, Olivy bất chợt dừng lại.\nÁnh mắt ánh lên nét cười tủm tỉm, có chút tinh nghịch."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「もしだよ？　もし今、オリヴィがイヤっていったら、\nそのときポーレットってどーするの？」
2852 = "「Giả sử nhé? Giả sử bây giờ, Olivy nói không chịu,\nthì lúc đó Paulette sẽ làm gì?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなっちゃったら……そうね、わたしは電車姫様に、\n『今すぐにはご容赦ください』って、お願いします」
2759 = "「Nếu vậy thì…… xem nào, tôi sẽ thưa với Điện xá Công chúa điện hạ,\n'Xin ngài thứ lỗi cho lúc này'」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「今すぐにはって？」
2714 = "「Lúc này là sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんに理解して納得してもらえるよう、\n説明するための時間を下さい――っていう意味」
2169 = "「Nghĩa là, xin hãy cho tôi thời gian giải thích,\nđể Olivy hiểu và đồng tình――」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「リカイとナットク？」
2686 = "「Hiểu và đồng tình?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そう」
2606 = "「Đúng vậy」"
# monologue
# JP: 首をかしげたオリヴィへと、\nポーレットはやわらかに微笑みかける。
3263 = "Với Olivy đang nghiêng đầu thắc mắc,\nPaulette nở nụ cười dịu dàng."
# 【ポーレット】
# display as 波萊特
# JP: 「今回の書類、\nわたしは、電車姫様に見ていただくべきと思うの」
2824 = "「Tài liệu lần này,\ntôi nghĩ nên để Điện xá Công chúa điện hạ xem qua」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2368 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「けど、何かの理由でオリヴィちゃんが嫌がるのなら、\nお話して、嫌がる理由を知って、それを取り除きたい」
2268 = "「Nhưng nếu vì lý do nào đó mà Olivy không muốn,\ntôi muốn trò chuyện, tìm hiểu lý do đó, và gỡ bỏ nó」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「とりのぞけなかったら？」
2754 = "「Nếu không gỡ bỏ được thì sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「…他の誰かに説明をお願いする。双鉄君に日々姫ちゃん。\n真闇さん。ハチロクちゃん、れいなにも」
1723 = "「…Tôi sẽ nhờ người khác giải thích. Soutetsu, Hibiki.\nChị Mayami. Hachiroku, cả Reina nữa」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、そのときにはがんばりますねぇ！」
2683 = "「Reina, lúc đó sẽ cố gắng nha~!」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん。お願い、いまはだいじょうぶだと思うけど」
2373 = "「Ừm. Trông cậy vào em, nhưng chị nghĩ bây giờ thì không sao đâu」"
# 【れいな】
# display as 玲奈
# JP: 「そぉですかー」
2820 = "「Vậy sao ạ~」"
# monologue
# JP: むん！　と張り切ったれいなの顔が、\nポーレットになでられ、すぐにニコニコ顔へと戻る。
3376 = "Hừm! Gương mặt đang hừng hực khí thế của Reina,\nđược Paulette xoa xoa, liền trở lại vẻ tươi cười ngay lập tức."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それって――」
2834 = "「Vậy thì――」"
# monologue
# JP: 不意に、オリヴィの口調が変わる。トーンが落ちる。
3117 = "Bất chợt, giọng điệu của Olivy thay đổi. Trầm xuống."
# monologue
# JP: ついさっきまで口元に浮かんでいた、\nいたずらっぽいような表情も、掻き消えている。
3204 = "Vẻ mặt tinh nghịch vừa mới hiện trên khóe môi lúc nãy,\ncũng đã biến mất tăm."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……よってたかって説得して、言うこと聞かせるんなら、\n最初から命令の方が早くない？」
1721 = "「……Xúm lại thuyết phục, để bắt người ta nghe lời,\nthì thà ra lệnh ngay từ đầu chẳng phải nhanh hơn sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2827 = "「!」"
# monologue
# JP: ああ――これは……オリヴィは今、\n重ねて、思い出しているのかもしれない。
3228 = "À――cái này…… có lẽ bây giờ Olivy,\nđang liên tưởng, và nhớ lại."
# monologue
# JP: みかん鉄道から御一夜鉄道に移籍した――\nあの日の、自らの決断を。
3310 = "Chuyển từ Đường sắt Mikan sang Đường sắt Ohigawa――\nQuyết định của chính mình, vào ngày hôm đó."
# 【ポーレット】
# display as 波萊特
# JP: 「もし誰も、オリヴィちゃんに大事さを伝えられなくて。\nオリヴィちゃんが、ずっと『嫌だ』って拒むのだとして」
2432 = "「Nếu không ai có thể truyền đạt được tầm quan trọng cho Olivy hiểu.\nGiả sử Olivy cứ mãi từ chối 'Không muốn'」"
# monologue
# JP: ポーレットもそう感じたのだろうか、\n言葉が、いっそう慎重になる。
3375 = "Chắc Paulette cũng cảm nhận được điều đó,\nlời nói của cô ấy càng trở nên thận trọng hơn."
# 【ポーレット】
# display as 波萊特
# JP: 「……このくらいに大事なこと、絶対にやるべきことなら、最終的には、わたしも、命令をすることになると思う」
1710 = "「……Một việc quan trọng đến mức này, nếu tuyệt đối phải làm, thì cuối cùng, tôi nghĩ mình cũng sẽ phải ra lệnh thôi」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でしょう！？　ならおんなじ！」
2587 = "「Thấy chưa!? Vậy thì cũng giống nhau thôi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
2810 = "「Không――」"
# 【ハチロク】
# display as 八六
# JP: 「果たしておんなじ、でございましょうか？\n頭ごなしの命令と、ご説明をしていただいての、命令が」
2149 = "「Thật sự là giống nhau, sao ạ?\nGiữa việc ra lệnh vô cớ, và việc ra lệnh sau khi đã giải thích rõ ràng」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「え？」
# 2300 = "「咦？」" 
# monologue
# JP: ほっとしていたようなオリヴィの表情が、真顔に戻る。
3259 = "Vẻ mặt nhẹ nhõm của Olivy, trở lại nghiêm túc."
# 【ハチロク】
# display as 八六
# JP: 「電車姫様のご照会を受け、もしもポーレット様が、\nオリヴィちゃんに何も尋ねず、それに応じていたときと」
2451 = "「Khi nhận được yêu cầu từ Điện xá Công chúa điện hạ, giả sử cô Paulette,\nkhông hỏi han gì Olivy mà cứ thế đáp ứng」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「――うん」
1635 = "「――Ừm」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんに確認し、その疑問を受けとめて、\nこうしてみんなでお話して、そののちに下る、命令と」
2291 = "「Và việc xác nhận với Olivy, tiếp nhận những thắc mắc đó,\nrồi mọi người cùng nói chuyện thế này, sau đó mới đưa ra mệnh lệnh」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「…………」
# 1670 = "「……」" 
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃんにとって、両者は全く同じでしょうか？\n説明に注がれた言葉は、思いは。無意味で無価値と」
2395 = "「Đối với Olivy, hai việc đó hoàn toàn giống nhau sao?\nNhững lời giải thích, những tâm tư ấy. Là vô nghĩa và vô giá trị sao」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そんなことない！　ムイミじゃないし、\nムカチなんかじゃ、絶対にない！」
2650 = "「Không có chuyện đó đâu! Không phải vô nghĩa,\ncàng không thể nào là vô giá trị!」"
# monologue
# JP: ハチロクの言葉をうけて反発し――\nオリヴィは、あ、の形のままで口の動きを止める。
3266 = "Phản bác lại lời của Hachiroku――\nOlivy há hốc miệng chữ A, ngừng cử động."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「……そっか、うん。そうだよね。全然ちがう。\n何がちがうか、オリヴィ、すぐにはわかんないけど」
1720 = "「……Ra vậy, ừm. Đúng thế nhỉ. Hoàn toàn khác nhau.\nKhác nhau chỗ nào thì, Olivy không hiểu ngay được nhưng mà」"
# monologue
# JP: 小さく頷き――\nオリヴィは、少し恥ずかしそうにポーレットを見る。
3267 = "Gật đầu nhè nhẹ――\nOlivy nhìn Paulette với vẻ hơi xấu hổ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だけど、オリヴィに聞いてくれてありがとう。\nそれで、説明もしてくれて、ありがとう」
2163 = "「Nhưng mà, cảm ơn đã hỏi ý kiến Olivy nha.\nVà, cảm ơn đã giải thích cho Olivy nữa」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、どういたしまして。それじゃ、\n御一夜鉄道社長として――もう一回、聞きますね？」
2382 = "「Ufufu, không có chi. Vậy thì,\nvới tư cách là giám đốc Đường sắt Ohigawa――tôi hỏi lại lần nữa nhé?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2368 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんが前回[おおみや,1]旺宮で受けた検査の結果を、\nわたしは、電車姫様に確認してもらいたいと思います」
2532 = "「Kết quả kiểm tra lần trước của Olivy ở Omiya,\ntôi muốn để Điện xá Công chúa điện hạ xác nhận」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2368 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「そうすることで、オリヴィちゃんの延命方法が\n見つかる可能性を、あげられるって考えるからです」
2542 = "「Vì tôi nghĩ rằng làm như vậy,\nsẽ tăng khả năng tìm ra phương pháp kéo dài tuổi thọ cho Olivy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん」
# 2368 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんの能力と経験を弊社は高く評価しており、\n稼働期間の延長は、社にとって有益であると判断します」
2524 = "「Công ty chúng tôi đánh giá cao năng lực và kinh nghiệm của Olivy,\nviệc kéo dài thời gian hoạt động được đánh giá là có lợi cho công ty」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！」
2369 = "「Vâng!」"
# 【ポーレット】
# display as 波萊特
# JP: 「だから。――オリヴィちゃんの検査記録を、\n電車姫様にみてもらっても、いいですか？」
2561 = "「Vậy nên. ――Hồ sơ kiểm tra của Olivy,\nđể Điện xá Công chúa điện hạ xem qua, có được không?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「～～～っ！　うんっ！！！」
2920 = "「~~~! Vâng!!!」"
# monologue
# JP: 思いっきりの笑顔で強く頷いて。\nオリヴィは、その笑顔のままハチロクを向く。
3269 = "Gật đầu thật mạnh với nụ cười tươi rạng rỡ.\nOlivy giữ nguyên nụ cười đó quay sang Hachiroku."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほんとに違う！　セツメーをちゃんとしてもらえると、\nおんなじ『うん！』でも、全然ちがうっ！」
2700 = "「Đúng là khác thật! Được giải thích đàng hoàng,\nthì dù cùng là 'Vâng!' nhưng cảm giác hoàn toàn khác luôn!」"
# 【ハチロク】
# display as 八六
# JP: 「それは大変――まことに、よろしゅうございました」
2877 = "「Vậy thì thật là――thật sự rất tốt ạ」"
# 【電車姫】
# display as 電車公主
# JP: 「まことに、の」
2696 = "「Thật sự, rất tốt」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2284 = "「!」"
# monologue
# JP: オリヴィを説得している間に、\n手配をすませておいたのだろう。
3273 = "Chắc là trong lúc chúng tôi đang thuyết phục Olivy,\ncô ấy đã sắp xếp xong xuôi rồi."
# monologue
# JP: 画面外から伸びてきた手が渡した書類を、\nぱらぱらと、電車姫様は驚くべき速度で繰っていく。
3534 = "Nhận lấy tập tài liệu từ bàn tay vươn ra ngoài khung hình,\nĐiện xá Công chúa điện hạ lật giở với tốc độ đáng kinh ngạc."
# 【電車姫】
# display as 電車公主
# JP: 「雛衣の経営手段には、多いに評価できる面が数多あると、\nわらわも改めて理解できたことは、有意であった」
2899 = "「Phương pháp quản lý của Hinai có rất nhiều điểm đáng khen ngợi,\nta lại một lần nữa hiểu được điều đó, thật là có ý nghĩa」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！？　ありがとうございます――以上に、すみません。\n内々の話で、電車姫様の貴重なお時間を――」
2343 = "「A!? Xin cảm ơn ngài――hơn thế nữa, tôi xin lỗi.\nChuyện nội bộ của chúng tôi đã làm mất thời gian quý báu của Điện xá Công chúa điện hạ――」"
# 【電車姫】
# display as 電車公主
# JP: 「浪費と思わば、[さえぎ]遮っておる。御一夜鉄道という組織の\nつながりの強さを目の当たりにできたことも、良かった」
2739 = "「Nếu thấy lãng phí, ta đã ngắt lời rồi. Việc được tận mắt chứng kiến\nsự gắn kết bền chặt của tổ chức Đường sắt Ohigawa, cũng là một điều tốt」"
# 【ポーレット】
# display as 波萊特
# JP: 「はうっ……あの、\nそういっていただけますと、恐縮、です」
2308 = "「Hau…… ừm,\nngài nói vậy, tôi thật ngại quá」"
# 【電車姫】
# display as 電車公主
# JP: 「さて。オリヴィの状態をざらりと見せてもらったが――\n法定検査を、なんとか“通した”といった状態であるの」
2767 = "「Nào. Ta đã xem qua tình trạng của Olivy rồi――\nĐúng là ở trạng thái 'vừa vặn qua' kỳ kiểm tra theo luật định nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2827 = "「這！」" 
# monologue
# JP: オリヴィを目の前にしてそこまでハッキリ――\n一瞬思うが、けれども誰も反応しない。
3408 = "Nói thẳng thừng đến thế ngay trước mặt Olivy――\nTôi thoáng nghĩ vậy, nhưng không ai phản ứng gì."
# monologue
# JP: ハチロクも、れいなも、オリヴィ自身も。\nならばそれは、自明のことであるのかもしれん。
3188 = "Cả Hachiroku, Reina, và chính bản thân Olivy.\nNếu vậy thì đó, có lẽ là chuyện hiển nhiên rồi."
# 【電車姫】
# display as 電車公主
# JP: 「『毎年の全検を強く推奨』とは――毎年全検を受けねば、\n“なんとか通す”ことすらも不可能になるとの意であろ」
1664 = "「'Đề xuất mạnh mẽ kiểm tra toàn diện hàng năm' nghĩa là――nếu không kiểm tra toàn diện hàng năm,\nthì việc 'vừa vặn qua' cũng sẽ trở nên bất khả thi đúng không」"
# monologue
# JP: パチン、パチンと、小刻みに電車姫様の扇子が鳴らされる。
3533 = "Lạch cạch, lạch cạch, chiếc quạt của Điện xá Công chúa điện hạ nhịp nhàng gõ nhẹ."
# 【電車姫】
# display as 電車公主
# JP: 「……すまぬの。ここまで悪くては、試すことすらできぬ。\nできるのはただ、一般的な助言のみとなろうの」
1701 = "「……Xin lỗi nhé. Tệ đến mức này thì, thậm chí còn chẳng thể thử nghiệm được.\nĐiều ta có thể làm, chỉ là đưa ra những lời khuyên chung chung thôi」"
# 【ポーレット】
# display as 波萊特＆雙鐵
# JP: 「試すって？」\n「一般的な助言とは、延命に関するご助言でしょうか？」
2377 = "「Thử nghiệm là sao ạ?」\n「Lời khuyên chung chung, có phải là lời khuyên về việc kéo dài tuổi thọ không ạ?」"
# 【電車姫】
# display as 電車公主
# JP: 「ふむ」
# 2368 = "「嗯」" 
# monologue
# JP: ゆるり、扇子が開かれる。\nその口元が隠されて、瞳でしか表情が伺えなくなる。
3539 = "Chầm chậm, chiếc quạt mở ra.\nKhóe miệng bị che đi, chỉ có thể đoán được biểu cảm qua đôi mắt."
# 【電車姫】
# display as 電車公主
# JP: 「正確には、『状況の悪化を防ぎやすくする方法』かの？\n人間でいうところの、『健康法』のようなものじゃ」
2634 = "「Chính xác thì là, 'phương pháp giúp dễ dàng ngăn chặn tình trạng xấu đi' nhỉ?\nNói theo ngôn ngữ loài người thì, giống như 'bí quyết sống khỏe' vậy」"
# 【ハチロク】
# display as 八六
# JP: 「健康法……でございますか」
2218 = "「Bí quyết sống khỏe…… sao ạ」"
# 【電車姫】
# display as 電車公主
# JP: 「それをしていても病気にはなるし怪我もするし死ぬ。\nが、なにもせぬよりは健康でいられる確率を上昇させる」
2252 = "「Dù có làm theo thì vẫn có thể bị bệnh, bị thương và chết.\nNhưng so với không làm gì, thì nó sẽ làm tăng xác suất được khỏe mạnh」"
# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;にとっての病気と怪我は、\n故障、破損となるのだろうか。
3448 = "Bệnh tật và thương tích đối với \x%lレイルロオド;#00ffc040;Railord%l;#;,\nchắc là hỏng hóc, hư hại nhỉ."
# monologue
# JP: その発生の確率を、もしも少しでも下げられるなら――
3445 = "Nếu có thể giảm thiểu xác suất xảy ra những điều đó, dù chỉ một chút――"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ケンコーでいられる可能性！\nちょっとでも、１％でもあがるなら、それ知りたい！！」
2219 = "「Khả năng được khỏe mạnh!\nDù chỉ một chút, dù chỉ tăng thêm 1% thôi, Olivy cũng muốn biết!!」"
# 【電車姫】
# display as 電車公主
# JP: 「なれば教えようぞ？　ちょうど、情報の一般公開に向け、\n[りんしょう,1]臨床データを増やしたいところでもあったしの」
2847 = "「Vậy ta sẽ chỉ cho nhé? Vừa hay, để chuẩn bị công bố thông tin rộng rãi,\nta cũng đang muốn tăng thêm dữ liệu lâm sàng」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！　じゃ、オリヴィそのデータ提供したい！\nそうしてもいい？　ポーレット？」
2915 = "「Ok! Vậy, Olivy muốn cung cấp dữ liệu đó!\nLàm vậy được không? Paulette?」"
# 【ポーレット】
# display as 波萊特
# JP: 「もちろん。そうしてもらえると会社としても助かる」
2689 = "「Tất nhiên rồi. Em làm vậy thì công ty cũng được nhờ」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄さま」
2895 = "「Ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。もしハチロクも、その\x%lレイルロオド;#00ffc040;レイルロオド%l;#;健康法を、\n試せるのであれば、ぜひ、データを提供させて下さい」
2364 = "「Ừ. Nếu Hachiroku cũng có thể thử,\nbí quyết sống khỏe cho \x%lレイルロオド;#00ffc040;Railord%l;#; đó, thì nhất định hãy cho chúng tôi cung cấp dữ liệu」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレットぉ。れいなも、そうしていいですかぁ？」
2664 = "「Paulette ơi~. Reina cũng, làm vậy được không ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「もちろん！」
2692 = "「Tất nhiên rồi!」"
# 【電車姫】
# display as 電車公主
# JP: 「くふふっ、『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;健康法』か。単純明快な\n名じゃの。正式発表のときの候補にさせてもらうぞ」
2286 = "「Kufufu, 'Bí quyết sống khỏe cho \x%lレイルロオド;#00ffc040;Railord%l;#;' sao. Cái tên\nđơn giản dễ hiểu nhỉ. Ta sẽ lấy làm ứng cử viên cho lúc công bố chính thức」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい――電車姫さまのお言葉をつなげただけですので。\nどうぞ、ご随意にお取扱いいただけましたらと」
2817 = "「Vâng――tôi chỉ ghép lại từ những lời của Điện xá Công chúa điện hạ thôi ạ.\nXin ngài cứ tùy ý sử dụng」"
# 【電車姫】
# display as 電車公主
# JP: 「なれば、『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;健康法』を教えよう。\nなに――ごくごく単純で簡単なものじゃ」
2825 = "「Vậy thì, ta sẽ chỉ cho 'Bí quyết sống khỏe cho \x%lレイルロオド;#00ffc040;Railord%l;#;'.\nGì chứ――đó là một phương pháp cực kỳ đơn giản và dễ dàng thôi」"
# monologue
# JP: ……健康法の教示を受ければ、その簡便さに驚かされる。
1603 = "……Khi được truyền đạt bí quyết sống khỏe, chúng tôi vô cùng ngạc nhiên vì sự đơn giản của nó."
# monologue
# JP: そして同時に、僕が今まで――ハチロクの夫たる僕でさえ、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の健康に、配慮してなかったと思い知る。
3452 = "Và đồng thời, tôi nhận ra cho đến nay――ngay cả tôi, chồng của Hachiroku,\ncũng chưa từng quan tâm đến sức khỏe của \x%lレイルロオド;#00ffc040;Railord%l;#;."
# monologue
# JP: （\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は機械で、物だと――整備点検を任せて\nおけば大丈夫だと、どこかで思い込んでしまっていたか）
3587 = "（Có lẽ ở đâu đó trong thâm tâm, tôi đã mặc định \x%lレイルロオド;#00ffc040;Railord%l;#; là máy móc, là đồ vật――\nchỉ cần giao cho việc bảo dưỡng kiểm tra là ổn thôi）"
# 【電車姫】
# display as 電車公主
# JP: 「――簡単であろ？　明日。いな、\n今日からでもすぐに試してみるがよい」
1643 = "「――Đơn giản đúng không? Ngày mai. Không,\nngay từ hôm nay hãy thử ngay đi」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。必ず、毎日実践します」
2245 = "「Xin cảm ơn ngài. Chúng tôi nhất định sẽ thực hành mỗi ngày」"
# 【ポーレット】
# display as 波萊特
# JP: 「本当に、ありがとうございます！　わたし――なんか、\nなんていうのか、目からウロコがボロボロ落ちました」
2697 = "「Thật sự, rất cảm ơn ngài! Tôi――sao nhỉ,\nnói thế nào đây, như được sáng mắt ra vậy」"
# 【電車姫】
# display as 電車公主
# JP: 「なれば、ウロコの落ちた目で別件を見てもらえるかの？\n雛衣、右田。いま少し時間を、かまわぬか？」
2894 = "「Nếu vậy, các ngươi có thể dùng đôi mắt đã sáng tỏ đó xem qua chuyện khác được không?\nHinai, Migita. Dành thêm chút thời gian nữa, có phiền không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしは、大丈夫ですけれど」
2539 = "「Tôi thì, không sao ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もです」
2508 = "「Tôi cũng vậy」"
# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん、れいな？\nわたくしたちは、先に、お仕事に戻りましょう」
2421 = "「Olivy, Reina?\nChúng ta, hãy quay lại làm việc trước đi」"
# monologue
# JP: 気を利かせ、\nハチロクがオリヴィとれいなを連れて外へ出ていく。
3457 = "Nhanh ý nhận ra,\nHachiroku dẫn Olivy và Reina ra ngoài."
# monologue
# JP: ドアが閉まる音が響いた途端、\n電車姫様の瞳がスウっと――刃物のように鋭く細まる。
3294 = "Ngay khi tiếng đóng cửa vang lên,\nánh mắt của Điện xá Công chúa điện hạ vụt――nheo lại sắc lẹm như lưỡi dao."
# 【電車姫】
# display as 電車公主
# JP: 「さて、雛衣。\n賢明で優秀な経営者たるそこもとに、ひとつ、聞きたい」
2900 = "「Nào, Hinai.\nTa muốn hỏi một điều, với tư cách là một nhà quản lý khôn ngoan và xuất sắc như ngươi」"
# 【ポーレット】
# display as 波萊特
# JP: 「懸命はともかく……優秀とはまるで思えませんけれど。\nわたしにお答えできることなら、何なりと」
2242 = "「Nỗ lực thì có thể…… chứ xuất sắc thì tôi không dám nhận đâu ạ.\nNếu là điều tôi có thể trả lời, xin ngài cứ hỏi」"
# 【電車姫】
# display as 電車公主
# JP: 「なれば、問おう」
2845 = "「Vậy thì, ta sẽ hỏi」"
# monologue
# JP: パチリ、電車姫様は扇子を一瞬強く閉じ、\n乾いた音を響かせる。
3532 = "Cạch, Điện xá Công chúa điện hạ khép quạt lại thật mạnh trong tích tắc,\ntạo ra một âm thanh khô khốc."
# 【電車姫】
# display as 電車公主
# JP: 「毎年の全検など、御一夜鉄道の資本力では\nとても果たせることではないと――わかっておろう？」
2745 = "「Kiểm tra toàn diện hàng năm, với tiềm lực vốn của Đường sắt Ohigawa\nthì không thể nào thực hiện được――ngươi biết chứ?」"
# monologue
# JP: （ピピピっ！　ピピピっ！）
3591 = "（Tít tít! Tít tít!）"
# 【ハチロク】
# display as 八六
# JP: 「ふぁ、ほーへふふぁは」
2916 = "「A, ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、鳴ったな。\nでは体温を確認してみよう」
2349 = "「À, kêu rồi kìa.\nVậy để xem nhiệt độ thế nào nhé」"
# 【ハチロク】
# display as 八六
# JP: 「ふぁい、おねふぁひひはひふぁふ」
2917 = "「Vâng, nhờ ngài ạ」"
# monologue
# JP: 口にくわえた体温計を抜いて、取る。
3333 = "Tôi rút chiếc nhiệt kế em ấy đang ngậm trong miệng ra."
# monologue
# JP: 簡単にできそうなことではあるが、\nハチロクは、そっと目を閉じ、僕に体温計を向けてくる。
3526 = "Dù là việc có vẻ đơn giản,\nnhưng Hachiroku khẽ nhắm mắt lại, hướng chiếc nhiệt kế về phía tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、抜くぞ？　噛まんようにな」
2869 = "「Vậy thì, rút ra nhé? Đừng có cắn đấy」"
# 【ハチロク】
# display as 八六
# JP: 「ほほほへへほひはふ」
2918 = "「Ngài cứ yên tâm ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2861 = "「Vậy sao」"
# monologue
# JP: （つぽっ）
3584 = "（Bóp）"
# monologue
# JP: なんの苦もなく、体温計はハチロクの口内から僕の手へ
3337 = "Không chút khó khăn, chiếc nhiệt kế từ miệng Hachiroku chuyển sang tay tôi."
# 【ハチロク】
# display as 八六
# JP: 「あっ！？　双鉄さま、少々おまちくださいまし」
2346 = "「A!? Ngài Soutetsu, xin hãy đợi một chút ạ」"
# monologue
# JP: ハチロクがあわてたように体温計を奪い取り、\n僕にくるりと背中を向けて――
3190 = "Hachiroku vội vàng giật lấy chiếc nhiệt kế,\nquay ngoắt lưng lại với tôi――"
# monologue
# JP: （ああ、よだれでテラテラだったのが恥ずかしいのか）
3583 = "（À, chắc là xấu hổ vì dính đầy nước bọt đây mà）"
# monologue
# JP: ハンカチで丁寧に体温計をぬぐいとる――\nそんな仕草が、実にあいらしく愛おしい。
3474 = "Dùng khăn tay cẩn thận lau sạch chiếc nhiệt kế――\nCử chỉ đó, thật sự rất đáng yêu và dễ thương."
# 【ハチロク】
# display as 八六
# JP: 「はい、おまたせいたしました」
2422 = "「Vâng, để ngài đợi lâu rồi ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。だが――今ふいたので、\n多少は温度があがってしまった可能性がある」
2361 = "「Ừ. Nhưng mà――vì em vừa lau xong,\nnên có khả năng nhiệt độ đã tăng lên một chút đấy」"
# 【ハチロク】
# display as 八六
# JP: 「あっ」
2328 = "「A」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「って、イチャイチャしてないで温度みよーよ！\nハチロク何度！？　オリヴィ、ちょーど40度だったよ！」
2206 = "「Này, đừng có tình tứ nữa, xem nhiệt độ đi~!\nHachiroku mấy độ!? Olivy vừa tròn 40 độ đấy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2312 = "「Ồ」"
# monologue
# JP: ご指摘、まさにそのとおり。\n今のは確かに、状況をわすれたイチャイチャだった。
3278 = "Em ấy nhắc nhở hoàn toàn chính xác.\nLúc nãy đúng là chúng tôi đã quên mất hoàn cảnh mà tình tứ với nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクは……ふむ、38度4分か」
2228 = "「Hachiroku là…… hừm, 38 độ 4 sao」"
# monologue
# JP: ……電車姫様からいただいたご助言を記したメモを見る。
1605 = "……Tôi nhìn vào tờ ghi chú lời khuyên của Điện xá Công chúa điện hạ."
# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクは、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;\x%lレイルロオド;#;#00ffc040;レイルロオド%l;#;の標準値の中だな。\nオリヴィも同様であるが、警戒域にかなり近い」
2231 = "「Hachiroku thì, nằm trong mức tiêu chuẩn của \x%lレイルロオド;#00ffc040;Railord%l;#; \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;.\nOlivy cũng vậy, nhưng khá gần mức báo động rồi」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「アンセー時に41度をこえたらやすませたほーがいい、\nだっけ？　なら、１度もヨユーあるし、平気だよー」
2609 = "「Lúc nghỉ ngơi mà vượt quá 41 độ thì nên cho nghỉ phép,\nđúng không? Vậy thì, vẫn còn dư dả 1 độ lận, không sao đâu~」"
# 【双鉄】
# display as 雙鐵
# JP: 「……かもしれんが、\n大事にしておく方がいいことは間違いない」
1698 = "「……Có thể là vậy, nhưng\ncẩn thận vẫn hơn là điều chắc chắn」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「まあねー。\nでも今日はもう乗務もないし、ヨユーでしょ！」
2221 = "「Cũng đúng ha~.\nNhưng hôm nay hết lịch làm việc trên tàu rồi, dư sức qua cầu mà!」"
# 【ハチロク】
# display as 八六
# JP: 「乗務がなくとも、\n21時から緊急の会議がございますよ？」
2468 = "「Dù không làm việc trên tàu,\nnhưng 21 giờ chúng ta có cuộc họp khẩn cấp đấy ạ?」"
# monologue
# JP: 言った笑顔が、\n急激な勢いでくもり始める。
3480 = "Nụ cười khi nói ra điều đó,\nbắt đầu xịu xuống với tốc độ chóng mặt."
# 【ハチロク】
# display as 八六
# JP: 「頭を使いすぎての発熱などあったらいかがしましょう？\n念のため、会議への出席を見合わせることも――」
2757 = "「Nhỡ đâu dùng não quá nhiều lại bị sốt thì sao ạ?\nĐể đề phòng, hay là chúng ta hoãn việc tham dự cuộc họp――」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「赤ちゃんあつかいー」
2262 = "「Lại đối xử như em bé rồi~」"
# 【ハチロク】
# display as 八六
# JP: 「あっ！？　あのっ――いえ、わたくし、その」
2345 = "「A!? Cái đó――không phải, tôi, ừm thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィも病み上がりだ。心配が多少、過保護気味に\nなってしまうのは、勘弁してやってもらえると嬉しい」
2413 = "「Olivy cũng mới ốm dậy mà. Lo lắng hơi thái quá một chút,\nmong em thông cảm cho cô ấy」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「カンベンもなにもおこってないよー。\nハチロクがうっかりしちゃっただけなの、わかってるし」
2772 = "「Có giận dỗi gì đâu mà thông cảm chứ~.\nOlivy biết Hachiroku chỉ lỡ lời thôi mà」"
# 【ハチロク】
# display as 八六
# JP: 「すみません。心配をするにしても、伝え方、ですよね。\nわたくし、何度も同じ過ちを繰り返してしまって」
2565 = "「Xin lỗi ạ. Dù là lo lắng thì cũng phải biết cách truyền đạt nhỉ.\nTôi cứ lặp đi lặp lại cùng một sai lầm mãi thôi」"
# monologue
# JP: 小さく頷き、自分のおでこをコツン、と叩き。\nハチロクは、真正面からもう一度オリヴィに向き直る。
3193 = "Khẽ gật đầu, Hachiroku gõ nhẹ 'cốc' lên trán mình.\nRồi em ấy quay lại đối mặt trực tiếp với Olivy một lần nữa."
# 【ハチロク】
# display as 八六
# JP: 「けれど、本当に無理をしないでくださいね？\n朝も会議、夜も会議では誰でも疲れてしまいますので」
2162 = "「Nhưng mà, cô đừng có gắng gượng quá nhé?\nSáng họp, tối lại họp thì ai cũng mệt mỏi cả thôi ạ」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「平気！　もしねむくなったらねちゃうし、\nかえりたくなったらかえるから」
2644 = "「Không sao đâu! Nếu buồn ngủ thì Olivy sẽ ngủ,\nmuốn về thì sẽ về mà」"
# monologue
# JP: あははと笑い、オリヴィはキョトンと首をかしげる。
3268 = "Cười ahaha, Olivy ngơ ngác nghiêng đầu."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど、なんで今日は朝も夜も会議なの？\nそんなの、まとめちゃったほーがよくない？」
2161 = "「Nhưng mà, sao hôm nay sáng họp tối cũng họp vậy?\nGộp lại luôn không phải tốt hơn sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「朝の会議で、電車姫様にいただいたご助言を元に、\nポーレットはもうひとつ会議を開催せねばと決めたのだ」
2487 = "「Dựa trên lời khuyên của Điện xá Công chúa điện hạ trong cuộc họp buổi sáng,\nPaulette đã quyết định phải tổ chức thêm một cuộc họp nữa」"
# 【ハチロク】
# display as 八六
# JP: 「あ……\nわたくしたちが先に退出したあとのお話ですか？」
2327 = "「A……\nLà chuyện sau khi chúng tôi rời đi trước sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。で、出席を求めたい人たちに照会をした。\n結果、今夜の開催が一番都合がよいということとなった」
2367 = "「Ừ. Sau đó, anh đã hỏi ý kiến những người muốn mời tham dự.\nKết quả là, tối nay là thời điểm thuận tiện nhất」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふーん。みんなけっこーいそがしそーなのに、\nフットワーク軽いんだ？」
2311 = "「Hừm~. Mọi người có vẻ khá bận rộn mà,\nlinh hoạt ghê ha?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それだけ、\n御一夜鉄道を重要視してくれているということだろう」
2814 = "「Điều đó chứng tỏ,\nhọ rất coi trọng Đường sắt Ohigawa đấy」"
# 【真闇】
# display as 真闇
# JP: 「そーちゃーん、おまたせー。\nおねーちゃんたち、準備よかとよー」
2455 = "「Sou-chan~, để em đợi lâu rồi~.\nBọn chị, chuẩn bị xong rồi nha~」"
# 【日々姫】
# display as 日日姬
# JP: 「みんないけるー？　まだかかるー？」
2401 = "「Mọi người xong chưa~? Còn lâu không~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2541 = "「Ối chà」"
# monologue
# JP: ウワサをすればなんとやら、だ。\nハチロクとオリヴィを見れば、笑顔の頷きが返される。
3511 = "Vừa nhắc Tào Tháo là Tào Tháo đến ngay.\nNhìn sang Hachiroku và Olivy, cả hai đều mỉm cười gật đầu đáp lại."
# 【双鉄】
# display as 雙鐵
# JP: 「僕らも大丈夫だ！　すぐに行く」
2521 = "「Bọn anh cũng xong rồi! Sẽ ra ngay đây」"
# 【ポーレット】
# display as 波萊特
# JP: 「今日は、突然のお願いにもかかわらず、\n皆様のご臨席をいただき、本当にありがとうございます」
2182 = "「Hôm nay, mặc dù yêu cầu đường đột,\nnhưng vô cùng cảm ơn mọi người đã đến tham dự」"
# monologue
# JP: ポーレットの声を受け、オリヴィはぐるり周囲を見回す。
3493 = "Nghe tiếng Paulette, Olivy nhìn quanh một vòng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あのオジさんだれ？　オリヴィはじめてみるよね？」
2849 = "「Ông chú kia là ai vậy? Olivy mới gặp lần đầu đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ、赤井宮司か」
2376 = "「Hửm? À, đền chủ Akai đó」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「グージ？」
2441 = "「Đền chủ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「赤井阿蘇神社の責任者さんだ」
2465 = "「Là người phụ trách của Đền Akai Aso」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ジンジャ？　なんでジンジャの人が」
2710 = "「Đền thờ? Sao người của đền thờ lại」"
# 【ポーレット】
# display as 波萊特
# JP: 「本日は、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・オリヴィの今後の運用計画に\nつき、みなさまのご意見をいただきたく思っております」
2183 = "「Hôm nay, về kế hoạch vận hành sắp tới của \x%lレイルロオド;#00ffc040;Railord%l;#; Olivy,\ntôi rất mong nhận được ý kiến đóng góp từ mọi người」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なにこれ、オリヴィの話なの！？」
2177 = "「Cái gì thế này, là chuyện của Olivy sao!?」"
# monologue
# JP: びっくり固まるオリヴィに、\nポーレットは申し訳なさそうな声をだす。
3271 = "Thấy Olivy ngạc nhiên cứng đờ người,\nPaulette cất giọng có vẻ áy náy."
# 【ポーレット】
# display as 波萊特
# JP: 「そう、オリヴィちゃん。今日、電車姫様にもご相談して、\nわたしの考え、伝えておいた方がいいって思ったの」
2608 = "「Đúng vậy, Olivy. Hôm nay, sau khi bàn bạc với Điện xá Công chúa điện hạ,\ntôi nghĩ tốt nhất là nên truyền đạt lại suy nghĩ của mình」"
# monologue
# JP: ……毎年全検を推奨される状態の、つまりは、\nあと何年稼働できるかの保証もつかない、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。
1610 = "……Ở tình trạng được khuyến cáo kiểm tra toàn diện hàng năm, tức là,\nmột \x%lレイルロオド;#00ffc040;Railord%l;#; không có gì đảm bảo có thể hoạt động thêm bao nhiêu năm nữa."
# monologue
# JP: 電車姫様は、オリヴィの運用計画をポーレットに聞き、\nその上で、早く公開するべきであるとのご助言を下さった。
3531 = "Điện xá Công chúa điện hạ đã nghe kế hoạch vận hành Olivy từ Paulette,\nvà dựa trên đó, ngài đã khuyên nên công bố sớm."
# 【ポーレット】
# display as 波萊特
# JP: 「一番最初は、オリヴィちゃんと個別でって思ったの。\nけど、話したい内容には、別の人の事情も絡んでくる」
2616 = "「Lúc đầu, tôi định nói chuyện riêng với Olivy.\nNhưng nội dung muốn nói lại liên quan đến hoàn cảnh của người khác nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、どの順番で誰に話すか。それをずうっと\n決めあぐね――今日までかかってしまったそうだ」
2555 = "「Paulette đã phân vân mãi xem nên nói chuyện với ai theo thứ tự nào.\n――Nên mới kéo dài đến tận hôm nay đấy」"
# 【ハチロク】
# display as 八六
# JP: 「それで……\nいっそのこと、と。全員を一同にお集めに？」
2550 = "「Thế nên……\nthà rằng. Tập hợp tất cả mọi người lại cùng một lúc sao ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そう。本当は[もとただ,1]元忠さんとか、[せき]堰さんたちにも\nご出席いただければ一番よかったんだけど――」
2596 = "「Đúng vậy. Thực ra tôi nghĩ, nếu có thể mời cả ông Mototada và ông Seki đến dự thì là tốt nhất rồi——」"
# 【ふかみ】
# display as 深美
# JP: 「おじいちゃんたち、観光船協会の慰安旅行があって。\nでも、いつでも電話して大丈夫って、です」
2679 = "「Ông nội và mọi người đi tham gia chuyến du lịch giải khuây của hiệp hội thuyền du lịch rồi.\nNhưng mà, gọi điện lúc nào cũng được, ạ......」"
# 【稀咲】
# display as 稀咲
# JP: 「父も、今日は空いてなかった。けど、なにかあれば、\nこちらもいつでも、携帯で直に連絡できるから」
2443 = "「Bố tôi hôm nay cũng không rảnh. Nhưng nếu có chuyện gì,\nbên này cũng có thể liên lạc trực tiếp qua điện thoại bất cứ lúc nào.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます」
2776 = "「Cảm ơn mọi người.」"
# monologue
# JP: 参席者に。そしておそらく、参席できなかった方々の\nご配慮にも、ポーレットは深々と頭を下げる。
3374 = "Hướng về những người tham dự. Và có lẽ cũng là để cảm tạ sự quan tâm của những người không thể đến dự,\nPaulette cúi đầu thật sâu."
# 【ポーレット】
# display as 波萊特
# JP: 「そういう事情で、こういう形になっちゃったの。\n驚かせちゃって、ごめんね？」
2717 = "「Vì những lý do đó nên mới thành ra thế này.\nLàm em bất ngờ rồi, xin lỗi nha?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「へーき！　ビックリしただけだし。こうやって\nソーダンしてもらえるの、うれしいってわかったし！」
2645 = "「Không sao! Chỉ là hơi bất ngờ chút thôi. Được mọi người\nthảo luận cùng thế này, Olivy thấy vui lắm!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう」
2775 = "「Cảm ơn em.」"
# monologue
# JP: 今度はそっと、オリヴィだけに頭をさげて。\nそしてポーレットは、表情をキリリと引き締め直す。
3349 = "Lần này, cô ấy khẽ cúi đầu riêng với Olivy.\nSau đó, Paulette điều chỉnh lại nét mặt, trở nên nghiêm túc."
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんの運用にあたって推奨される毎年の全検。\nこれに応じることは、御一夜鉄道の資産では不可能です」
2399 = "「Việc kiểm tra toàn diện hàng năm được khuyến nghị cho quá trình vận hành của Olivy.\nVới tài sản hiện tại của Đường sắt Ohito thì không thể đáp ứng được.」"
# 【稀咲】
# display as 稀咲
# JP: 「毎年どころか、隔年でもこれは無理だろう。四年に一度、れいな、ハチロクの全検もあることも考えると――」
2240 = "「Đừng nói là hàng năm, hai năm một lần cũng là không thể. Nếu xét đến việc bốn năm một lần còn có đợt kiểm tra toàn diện của Reina và Hachiroku nữa thì——」"
# monologue
# JP: 稀咲の指が、\n想像上のそろばん玉を操っているのか、僅かに動く。
3428 = "Ngón tay Kisaki khẽ động,\nnhư thể đang gảy những hạt bàn tính trong tưởng tượng."
# 【稀咲】
# display as 稀咲
# JP: 「――三年に一度が限界だね。\nそれでも利益を、相当に吐き出すことになる」
1630 = "「——Ba năm một lần là giới hạn rồi.\nDù vậy cũng sẽ ngốn một lượng lợi nhuận tương đối lớn.」"
# 【凪】
# display as 凪
# JP: 「ほええ！？　\n全検って、そぎゃんと凄かお金かかると！？」
2386 = "「Hảả!? \nKiểm tra toàn diện mà tốn nhiều tiền đến vậy sao!?」"
# 【ふかみ】
# display as 深美
# JP: 「ちょ、凪ちゃん！　今そんな話したら」
2453 = "「Này, Nagi! Sao em lại nói chuyện đó lúc này chứ......」"
# 【凪】
# display as 凪
# JP: 「あっ！？」
2340 = "「A!?」"
# monologue
# JP: ふかみに止められ、凪が両手で口を覆う。\nその視線の先、オリヴィは、困ったように笑ってる。
3459 = "Bị Fukami cản lại, Nagi lấy hai tay che miệng.\nPhía trước ánh mắt cô bé, Olivy đang cười gượng gạo."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「お金とか、その辺のことなら。全然足りないだろうけど、\nそれならオリヴィ、おきゅーりょーとかいらないし」
2760 = "「Nếu là chuyện tiền bạc thì... Dù chắc chắn là không đủ đâu,\nnhưng nếu vậy thì Olivy không cần nhận lương cũng được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それはそれ、これはこれです。お給料はちゃんと、\nオリヴィちゃん自身が、好きに使って下さい」
2818 = "「Việc nào ra việc đó. Tiền lương thì em cứ giữ lấy,\nOlivy hãy dùng theo ý thích của mình đi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど――」
2273 = "「Nhưng mà——」"
# 【ポーレット】
# display as 波萊特
# JP: 「お給料を楽しく使って、ストレスを解消してもらって。\nお仕事の質がよくなれば、それほど安い投資はないから」
2889 = "「Vui vẻ tiêu xài tiền lương để giải tỏa căng thẳng.\nNếu chất lượng công việc nhờ đó mà tốt lên thì đây là một khoản đầu tư quá hời rồi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そう……なの？」
2585 = "「Vậy... sao?」"
# monologue
# JP: オリヴィの視線が向くのは稀咲だ。
3262 = "Ánh mắt Olivy hướng về phía Kisaki."
# monologue
# JP: 誰が御一夜鉄道の金庫番なのか、\n早くも理解したのだろう。
3412 = "Có lẽ cô bé đã sớm hiểu được,\nai mới là người giữ két sắt của Đường sắt Ohito."
# 【稀咲】
# display as 稀咲
# JP: 「そのとおりだね。キミの給与は、\nキミが自由に使うべきだと、ボクも支持する」
2709 = "「Đúng là vậy đấy. Tiền lương của em,\ntôi cũng ủng hộ việc em nên tự do sử dụng.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わかった！」
2583 = "「Đã rõ!」"
# 【真闇】
# display as 真闇
# JP: 「ね？　なーちゃん？」
2543 = "「Thấy chưa? Na-chan?」"
# monologue
# JP: 真闇姉が、凪になにやら耳打ちをする。
3124 = "Chị Mayami thì thầm to nhỏ gì đó vào tai Nagi."
# 【凪】
# display as 凪
# JP: 「そりゃよかばい！」
2865 = "「Thế thì tuyệt quá nè!」"
# monologue
# JP: 失言にしょぼくれていた凪の顔が、\nみるみるうちに元気な明るさをとりもどす。
3233 = "Khuôn mặt ỉu xìu vì lỡ lời của Nagi\nnhanh chóng lấy lại vẻ tươi sáng đầy sức sống."
# 【凪】
# display as 凪
# JP: 「オリヴィ今度！　クマ川くだりに遊びにくるばい！\n歓迎のしるしに、凪さま直々に船頭するけん！！」
2393 = "「Lần tới Olivy! Hãy đến chơi chuyến đi thuyền trên sông Kuma nha!\nĐể chào mừng, Nagi đại nhân đây sẽ đích thân chèo thuyền cho cậu!!」"
# 【ふかみ】
# display as 深美
# JP: 「あ！　それいい！！　なら、わたしはともはりして、\nあと、川遊び！　川遊びの仕方も教えてあげる！」
2339 = "「A! Ý hay đó!! Vậy thì chị sẽ phụ trách chèo lái,\nvới cả, trò chơi trên sông! Chị sẽ dạy em cách chơi đùa trên sông nữa!」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほんと！？　うれしい！　たのしそー！」
2702 = "「Thật sao!? Vui quá! Có vẻ thú vị lắm đây!」"
# 【真闇】
# display as 真闇
# JP: 「うふふっ」
2380 = "「Ufufu.」"
# monologue
# JP: オリヴィの笑顔につられ、笑顔があふれる。\nほっと安心した空気が流れる。
3242 = "Bị cuốn theo nụ cười của Olivy, những nụ cười cũng ngập tràn xung quanh.\nMột bầu không khí nhẹ nhõm, an tâm lan tỏa."
# 【ポーレット】
# display as 波萊特
# JP: 「だけど――ね？　オリヴィちゃん」
2160 = "「Nhưng mà—— này? Olivy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なに？」
2496 = "「Sao thế?」"
# monologue
# JP: ポーレットが、オリヴィだけをまっすぐ見つめる。\nこのひとことを、どう伝えるか――。
3377 = "Paulette nhìn thẳng vào một mình Olivy.\nLàm thế nào để truyền đạt câu nói này đây——."
# monologue
# JP: そこもまた、非常に悩んでいるところだと、\nポーレットは電車姫様に吐露していたが。
3138 = "Đó cũng là điều mà Paulette đã vô cùng trăn trở,\nnhư cô ấy đã thổ lộ với Công chúa Tàu điện."
# 【ポーレット】
# display as 波萊特
# JP: 「毎年の全検が推奨される状態なのに、検査なしでの――\n何年もの乗務は、回避したいっても、思っているの」
2194 = "「Dù đang trong tình trạng được khuyến nghị kiểm tra toàn diện hàng năm, nhưng việc làm nhiệm vụ trên tàu suốt nhiều năm——\nmà không qua kiểm tra, chị vẫn nghĩ là nên tránh.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そりゃそうだよね。アブナイもん」
2815 = "「Chuyện đó là tất nhiên rồi. Nguy hiểm lắm mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
2292 = "「A!」"
# monologue
# JP: あまりにもあっさりとした同意の言葉。
3509 = "Một lời đồng ý quá đỗi dễ dàng."
# monologue
# JP: 逆に驚き固まるポーレットの目の前で、\nオリヴィは穏やかに笑ってさえいる。
3510 = "Trước mặt Paulette đang sững sờ kinh ngạc,\nOlivy thậm chí còn mỉm cười điềm tĩnh."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィだってそこまでバカじゃないからさ。\nⅨ号だけがめあてってことも、さいしょから考えてた」
2414 = "「Olivy cũng đâu ngốc đến mức đó chứ.\nNgay từ đầu em đã nghĩ mục tiêu của mọi người chỉ là Đầu máy số 9 thôi.」"
# 【日々姫】
# display as ３人
# JP: 「そぎゃんこつっ！」「そんなこと！」\n「そのようなこと！」
2668 = "「Làm gì có chuyện đó!」「Không phải vậy đâu!」\n「Làm gì có chuyện như vậy chứ!」"
# monologue
# JP: 三者三様の即時の否定。\n聞いた瞬間、オリヴィの笑顔に明るさが増す。
3106 = "Ba người ngay lập tức phủ nhận theo ba cách khác nhau.\nKhoảnh khắc nghe thấy điều đó, nụ cười của Olivy càng thêm rạng rỡ."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん！　もちろん今はちがうってわかってる。\nオリヴィのことも、大事にしてもらえてるって」
2371 = "「Vâng! Tất nhiên bây giờ em biết là không phải vậy rồi.\nMọi người cũng rất trân trọng Olivy mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら、よかった」
2864 = "「Vậy thì tốt quá.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、最後の乗務の日までがんばるね！\nオリヴィ、あと何年乗ってていーの？」
2416 = "「Vì vậy, em sẽ cố gắng cho đến ngày làm nhiệm vụ cuối cùng!\nOlivy còn được lái thêm mấy năm nữa?」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　\nあ！　そうじゃないの、オリヴィちゃん」
2299 = "「Hả!? \nA! Không phải ý đó đâu, Olivy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「えっ！？」
2297 = "「Hả!?」"
# monologue
# JP: オリヴィの声音が、顔が、\nその一瞬で固まってしまう。
3512 = "Giọng nói, khuôn mặt của Olivy,\ntrong khoảnh khắc đó chợt cứng đờ."
# monologue
# JP: ゆえに、僕にもようやくわかる。
3131 = "Vì vậy, cuối cùng tôi cũng hiểu ra."
# monologue
# JP: （そうか……オリヴィは、怖がりなのか）
3578 = "（Ra vậy…… Olivy, thực ra rất nhút nhát sao.）"
# monologue
# JP: 僕と路子もそうだった。
3335 = "Tôi và Michiko cũng từng như vậy."
# monologue
# JP: 怖がりだから――何かをしてれば、早く決めれば、\n怖さから逃げ出せるような気がして……
3234 = "Bởi vì sợ hãi—— nên cứ nghĩ rằng nếu làm điều gì đó, nếu quyết định thật nhanh,\nthì có thể trốn thoát khỏi nỗi sợ ấy……"
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ、オリヴィ」
2643 = "「Không sao đâu, Olivy.」"
# monologue
# JP: そう感じれば、声が出ている。
3100 = "Cảm nhận được điều đó, tôi đã cất tiếng."
# 【双鉄】
# display as 雙鐵
# JP: 「安心していい。\nポーレットはな？　ああ見えても敏腕経営者なのだ」
2575 = "「Em cứ yên tâm.\nPaulette ấy à? Trông thế thôi chứ cô ấy là một nhà quản lý tài ba đấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ……ぅ」
2325 = "「A……ư.」"
# 【双鉄】
# display as 雙鐵
# JP: 「たとえ乗務ができなくなっても、それ以外できっと、\nオリヴィのことを使い倒す腹づもりにきまってる」
2466 = "「Dù cho không thể làm nhiệm vụ trên tàu nữa, thì ngoài việc đó ra,\nchắc chắn cô ấy đã có dự định bóc lột sức lao động của Olivy đến cùng rồi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「！」
2329 = "「!」"
# monologue
# JP: ぱっと、表情が晴れ渡る。\nやはり、僕らと――幼いころの僕らと同じだ。
3274 = "Biểu cảm của cô bé bỗng bừng sáng.\nQuả nhiên, giống hệt như chúng tôi—— giống hệt như chúng tôi thuở nhỏ."
# monologue
# JP: ならば、同じ過ちを繰り返させたりせぬように、\nたったひとこと、伝えればいい。
3521 = "Nếu vậy, để không lặp lại sai lầm tương tự,\nchỉ cần truyền đạt một lời là đủ."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、先走らずに、落ち着いて最後まで聞くといい。\n大丈夫、悪い話にはきっとならない」
2553 = "「Vì thế, đừng vội vàng, cứ bình tĩnh nghe cho đến cuối.\nKhông sao đâu, chắc chắn sẽ không phải là chuyện xấu đâu.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うんっ！」
# 2369 = "「嗯！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「……双鉄くんの言ったとおり。乗務引退後も、\nオリヴィちゃんには働いて貰えればと考えています」
1724 = "「……Đúng như lời anh Soutetsu nói. Kể cả sau khi nghỉ việc trên tàu,\nchị vẫn muốn Olivy tiếp tục làm việc.」"
# monologue
# JP: ポーレットも、ほっとした声だ。
3378 = "Giọng của Paulette cũng đầy nhẹ nhõm."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「引退――乗務で役にたてなくなって。\nそのあとも……居場所、オリヴィ、もらえるの？」
2250 = "「Nghỉ việc—— Không còn có ích trên tàu nữa.\nSau đó…… Olivy vẫn, có chỗ đứng sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんが、それを希望してくれるなら」
2266 = "「Nếu Olivy mong muốn điều đó.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「キボウする！　オリヴィ、なにすればいいの！？\nなにができるの？」
2691 = "「Tất nhiên là mong muốn rồi! Olivy phải làm gì đây!?\nEm có thể làm được gì?」"
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜鉄道には、他の鉄道会社にあるような、\n帝鉄時代からの経験の引き継ぎが存在しません」
2490 = "「Đường sắt Ohito không giống như các công ty đường sắt khác,\nkhông có sự kế thừa kinh nghiệm từ thời Đường sắt Hoàng gia.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あー、\x%l保線;#00ffc040;保線%l;#;とかみてるとそんな感じっぽいよね。\nけど、ハチロクとれいなもベテランでしょ？」
2347 = "「A, nhìn cách \x%l保線;#00ffc040;bảo trì đường ray%l;#; thì có vẻ đúng là vậy nhỉ.\nNhưng mà, Hachiroku và Reina cũng là cựu binh mà?」"
# monologue
# JP: 不思議そうなオリヴィと目があえば、\nハチロクは静かに首を振る。
3264 = "Bắt gặp ánh mắt có vẻ khó hiểu của Olivy,\nHachiroku khẽ lắc đầu."
# 【ハチロク】
# display as 八六
# JP: 「いえ。オリヴィちゃんと触れ合ううちに知りました。\nわたくしの知る“鉄道”は、ごく限られた一部のみです」
2905 = "「Không đâu. Trong quá trình tiếp xúc với Olivy, tôi mới nhận ra.\n“Đường sắt” mà tôi biết, chỉ là một phần rất nhỏ bé mà thôi.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ。\nれいな、鉱山鉄道のこでしたからぁ」
2681 = "「Reina cũng vậy đó ạ.\nVì Reina là đứa trẻ của đường sắt khai thác mỏ mà.」"
# monologue
# JP: 国産量産第一号機種のトップナンバー\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と、\n鉱山鉄道で働き続けていた\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と。
3560 = "\x%lレイルロオド;#00ffc040;Railord%l;#; số hiệu đầu tiên của dòng máy sản xuất hàng loạt nội địa, và\n\x%lレイルロオド;#00ffc040;Railord%l;#; đã liên tục làm việc trên tuyến đường sắt mỏ."
# monologue
# JP: 立場はまったく違えども、\n「限定された環境でしか運用されなかった」点は同じだ。
3527 = "Dù lập trường hoàn toàn khác nhau,\nnhưng điểm chung là \"chỉ được vận hành trong những môi trường hạn chế\"."
# 【ポーレット】
# display as 波萊特
# JP: 「オリヴィちゃんには、私達の知らない鉄道に関する、\n経験と知識の蓄積があります」
2725 = "「Olivy có sự tích lũy về kinh nghiệm và kiến thức\nliên quan đến đường sắt mà chúng tôi không hề biết.」"
# monologue
# JP: ゆえ、ポーレットの提案には全面的に同意できる。\nだけでなく、もっと多くもと望んでしまう。
3346 = "Vì thế, tôi hoàn toàn đồng ý với đề xuất của Paulette.\nKhông chỉ vậy, tôi còn mong đợi nhiều hơn thế."
# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィは最新の保線技術の知識も有している。\n僕はそれを、御一夜鉄道にも伝えて欲しいと願っている」
2418 = "「Olivy cũng có kiến thức về kỹ thuật bảo trì đường ray mới nhất.\nTôi cũng mong em có thể truyền đạt điều đó cho Đường sắt Ohito.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　ですよね。そこはわたし、事前調査で\n知らなかったから、びっくりしてるし、うれしいです」
2334 = "「A! Đúng vậy. Điểm này trong lúc khảo sát trước tôi không hề biết,\nnên tôi rất ngạc nhiên và cũng rất vui.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ホセンのこともね！\nムナカタ見てておぼえたんだよ！」
2470 = "「Cả chuyện bảo trì đường ray nữa nha!\nEm đã học được khi quan sát Munakata đó!」"
# monologue
# JP: 笑顔が弾ける。\nオリヴィはもう、小躍りせんばかりだ。
3265 = "Nụ cười rạng rỡ.\nOlivy lúc này như chỉ chực nhảy cẫng lên."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「いいよ！　オリヴィなんでも伝える！　引退したら！\nううん、引退をする前だって――あしたにだって！！」
2425 = "「Được thôi! Olivy sẽ truyền đạt tất cả! Sau khi nghỉ hưu!\nÀ không, kể cả trước khi nghỉ hưu—— ngay ngày mai cũng được!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは助かる。では、保線技術講習については、\nのちほど相談させてくれ」
2816 = "「Thế thì giúp ích nhiều lắm. Vậy, về khóa đào tạo kỹ thuật bảo trì đường ray,\nđể sau chúng ta bàn bạc thêm nhé.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オッケー！」
2913 = "「OK!」"
# 【ポーレット】
# display as 波萊特
# JP: 「で、ですね？　オリヴィちゃんの同意を\n得られたところで、その――」
2870 = "「Vậy thì, tiếp theo nhé? Vì đã nhận được\nsự đồng ý của Olivy, nên——」"
# monologue
# JP: ポーレットの視線が大きく動く。\nその先では、赤井宮司が苦笑している。
3379 = "Ánh mắt Paulette chuyển hướng.\nPhía trước ánh nhìn ấy, đền chủ Akai đang cười gượng."
# 【赤井】
# display as 赤井
# JP: 「なるほど――私が呼ばれた理由は察しました」
2257 = "「Ra là vậy—— Tôi đã hiểu lý do mình được gọi đến rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「お話が早くて助かります。なら――あの噂……\n赤井阿蘇神社の境内の、包帯の少女の噂は、やっぱり」
2729 = "「Ông hiểu nhanh như vậy thì đỡ quá. Vậy thì—— lời đồn đó...\nLời đồn về cô gái quấn băng gạc trong khuôn viên đền Akai Aso, quả nhiên là...」"
# 【双鉄】
# display as 雙鐵
# JP: 「包帯の少女の噂？」
2753 = "「Lời đồn về cô gái quấn băng gạc?」"
# 【日々姫】
# display as 日日姬
# JP: 「にぃににもいったことあるでしょお！\n稀咲センパイとわたしも会ったって」
2506 = "「Em đã từng kể cho anh hai nghe rồi mà!\nCả em và chị Kisaki đều đã gặp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2328 = "「啊」" 
# monologue
# JP: くだらない怪談話の類と決めつけ聞き流していたが……\nポーレットと赤井宮司との話の中味から推測するに――
3406 = "Tôi cứ tưởng đó là thể loại chuyện ma quái vớ vẩn nên đã bỏ ngoài tai...\nNhưng suy luận từ nội dung cuộc nói chuyện giữa Paulette và đền chủ Akai thì——"
# 【赤井】
# display as 赤井
# JP: 「私から答えられることではありません、\nそれは、みなさんの目で確かめてみてください」
2813 = "「Đây không phải chuyện tôi có thể trả lời,\nmọi người hãy tự mình kiểm chứng tận mắt đi.」"
# monologue
# JP: 壁掛け時計をちらりと見、\n赤井宮司は立ち上がってしまう。
3490 = "Đền chủ Akai liếc nhìn chiếc đồng hồ treo tường,\nrồi đứng dậy."
# 【赤井】
# display as 赤井
# JP: 「現役最古級の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が遊びにきたなら、\nさすがにあれも、大いに興味を持つことでしょうから」
2742 = "「Nếu \x%lレイルロオド;#00ffc040;Railord%l;#; thuộc hàng lâu đời nhất còn đang hoạt động đến chơi,\nthì chắc hẳn con bé đó cũng sẽ rất hứng thú đấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ふーん、あのグージさん、\n帝鉄の\x%l運転士;#00ffc040;運転士%l;#;さんだったんだー」
2390 = "「Hừm, vị đền chủ đó,\ntừng là \x%l運転士;#00ffc040;lái tàu%l;#; của Đường sắt Hoàng gia sao~」"
# 【ハチロク】
# display as 八六
# JP: 「だ、そうですね。なんでも、特急形電車の試作機の、\n試験\x%l運転士;#00ffc040;運転士%l;#;をつとめていらしたとか」
2572 = "「Nghe nói là vậy ạ. Nghe đâu ngài ấy từng đảm nhiệm vị trí\n\x%l運転士;#00ffc040;lái tàu%l;#; thử nghiệm cho nguyên mẫu tàu điện tốc hành.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「わお！　スゴウデなんだ！！」
2307 = "「Wow! Đỉnh thật đấy!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。ご助言の質も実に高い。僕らも御一夜鉄道も、\nあの方にはずいぶん助けていただいている」
2695 = "「Đúng vậy. Lời khuyên của ngài ấy cũng rất chất lượng. Cả chúng tôi và Đường sắt Ohito,\nđều nhận được sự giúp đỡ rất nhiều từ ngài ấy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、その“ホータイの少女”っていうのは、\nあのグージさんとこの\x%lレイルロオド;#00ffc040;レイルロオド%l;#;？」
2878 = "「Vậy thì, \"cô gái quấn băng gạc\" đó,\nlà \x%lレイルロオド;#00ffc040;Railord%l;#; của vị đền chủ đó hả?」"
# 【ハチロク】
# display as 八六
# JP: 「と、いう噂らしいのですが……」
2571 = "「Theo lời đồn thì là vậy, nhưng mà……」"
# 【双鉄】
# display as 雙鐵
# JP: 「異論があるのか？」
2833 = "「Em có ý kiến khác sao?」"
# monologue
# JP: 問えば、ハチロクはらしくもなく、\nひどくあいまいな頷きをみせる。
3470 = "Khi được hỏi, Hachiroku lại tỏ ra không giống mình ngày thường,\ncô khẽ gật đầu một cách vô cùng mơ hồ."
# 【ハチロク】
# display as 八六
# JP: 「赤井阿蘇神社には、双鉄さまとご一緒に、\nわたくしも、何度もお邪魔しておりますよね？」
2761 = "「Đền Akai Aso, em đã cùng ngài Soutetsu\nđến thăm rất nhiều lần rồi đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2368 = "「嗯」" 
# 【ハチロク】
# display as 八六
# JP: 「けれどわたくし――ただの一度も、\n\x%l共感;#00ffc040;共感%l;#;を通じたことが」
2271 = "「Nhưng em—— chưa từng một lần,\nnhận được sự \x%l共感;#00ffc040;cộng cảm%l;#; nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……ああ、そうだ。\n“共感を閉ざす”というヤツではないのか」
2811 = "「Cái đó…… A, đúng rồi.\nChẳng phải là \"đóng cửa cộng cảm\" sao?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あっ！」
# 2329 = "「啊！」" 
# monologue
# JP: いった瞬間、恥ずかしそうな顔をして、\nオリヴィがぺろり舌を出す。
3341 = "Ngay khoảnh khắc đó, với vẻ mặt ngượng ngùng,\nOlivy thè lưỡi ra."
# monologue
# JP: ハチロクが小さく笑えば、\nオリヴィもまた、微笑み返す。
3191 = "Hachiroku mỉm cười,\nOlivy cũng cười đáp lại."
# monologue
# JP: （ああ――そういえば、\n寿命云々ですっかり頭から飛んでしまっていたが……）
3580 = "（A—— nhắc mới nhớ,\nchuyện tuổi thọ các thứ làm mình quên béng mất……）"
# monologue
# JP: オリヴィが、\x%l共感;#00ffc040;共感%l;#;を、こころを閉ざしてしまっていた――
3141 = "Olivy đã đóng cửa \x%l共感;#00ffc040;cộng cảm%l;#;, khép kín trái tim mình——"
# monologue
# JP: その状況は、いまの様子を見るかぎり、\nいつの間に、自然と解消されたのだろう。
3166 = "Tình trạng đó, nhìn vào biểu hiện bây giờ,\ncó lẽ đã được giải tỏa một cách tự nhiên từ lúc nào không hay."
# 【ハチロク】
# display as 八六
# JP: 「はい。オリヴィちゃんがかつてそうしていたように、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\x%l共感;#00ffc040;共感%l;#;を閉ざすことも可能です」
2604 = "「Vâng. Giống như Olivy đã từng làm trước đây,\n\x%lレイルロオド;#00ffc040;Railord%l;#; cũng có thể đóng cửa \x%l共感;#00ffc040;cộng cảm%l;#; ạ.」"
# monologue
# JP: 僕の推測をハチロクは、\nおだやかな言葉と笑顔とで裏付ける。
3184 = "Hachiroku chứng thực suy đoán của tôi,\nbằng những lời lẽ điềm đạm cùng một nụ cười."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。『かつて』ならば、幸いなことだ」
2359 = "「Hừm. Nếu là \"trước đây\" thì thật may mắn.」"
# 【ハチロク】
# display as 八六
# JP: 「はい。今ではオリヴィちゃんは感情域までの\x%l共感;#00ffc040;共感%l;#;を、\nわたくしたちに許可してくださっております」
2600 = "「Vâng. Bây giờ Olivy đã cho phép chúng ta\n\x%l共感;#00ffc040;cộng cảm%l;#; đến tận vùng cảm xúc rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――」
2318 = "「A——」"
# monologue
# JP: そういわれてふと想い出す。\nオリヴィがムナカタさんを語ったときの――電車姫様。
3282 = "Nghe vậy tôi chợt nhớ ra.\nKhi Olivy kể về Munakata—— Công chúa Tàu điện."
# monologue
# JP: あの反応は、あるいは“感情レベルの共感”を、\nオリヴィから受け取ったゆえであったのかもしれぬと。
3518 = "Phản ứng đó, có lẽ là do ngài ấy đã nhận được\n\"sự cộng cảm ở mức độ cảm xúc\" từ Olivy chăng."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、ちょっとだけ最初はスネちゃってたから。\n乗務のとき、必要な分だけ\x%l共感;#00ffc040;共感%l;#;しとけばいいって思って」
2460 = "「Ban đầu Olivy có hơi hờn dỗi một chút.\nEm nghĩ lúc làm nhiệm vụ trên tàu, chỉ cần \x%l共感;#00ffc040;cộng cảm%l;#; những thứ cần thiết là đủ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2368 = "「嗯」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だから、相当なイキオイで\x%l共感;#00ffc040;共感%l;#;拒否してたんだけど――\nけど、\x%l共感;#00ffc040;共感%l;#;拒否をしてるってことは、相手にわかるの」
2558 = "「Vì vậy, em đã từ chối \x%l共感;#00ffc040;cộng cảm%l;#; một cách rất quyết liệt——\nNhưng mà, việc từ chối \x%l共感;#00ffc040;cộng cảm%l;#; thì đối phương vẫn có thể biết được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 2374 = "「嗯？」" 
# 【ハチロク】
# display as 八六
# JP: 「“包帯の少女”の話は、\nわたくしも以前から、聞いてはおりましたので――」
1667 = "「Chuyện về \"cô gái quấn băng gạc\",\nem cũng đã nghe nói từ trước rồi nên——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうか。少女が\x%lレイルロオド;#00ffc040;レイルロオド%l;#;か否かを知るため、\nハチロクは既に、\x%l共感;#00ffc040;共感%l;#;を求めていたのだな？」
2330 = "「A! Ra vậy. Để biết cô gái đó có phải là \x%lレイルロオド;#00ffc040;Railord%l;#; hay không,\nHachiroku đã thử \x%l共感;#00ffc040;cộng cảm%l;#; rồi đúng không?」"
# monologue
# JP: ――それがよしんば拒まれたとして、『拒まれたこと』を\nハチロクは把握できる仕組みになっている。
1592 = "——Giả sử có bị từ chối đi chăng nữa, thì cơ chế là\nHachiroku vẫn có thể nắm bắt được việc \"đã bị từ chối\"."
# 【ハチロク】
# display as 八六
# JP: 「はい。ですので――その少女が仮に\x%lレイルロオド;#00ffc040;レイルロオド%l;#;で\nあったとしても、はたして乗務の役にたつものかどうか」
2590 = "「Vâng. Do đó—— giả sử cô gái đó là \x%lレイルロオド;#00ffc040;Railord%l;#;\nđi chăng nữa, thì liệu cô ấy có thể giúp ích cho việc làm nhiệm vụ trên tàu hay không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2328 = "「啊」" 
# monologue
# JP: なるほど、そういう懸念もあるか。
3215 = "Ra vậy, cũng có mối lo ngại như thế sao."
# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;能力が故障などしているのであれば、目隠しも同じ。\n保安上、とても乗務にはついてもらえない。
3460 = "Nếu khả năng \x%l共感;#00ffc040;cộng cảm%l;#; bị hỏng hóc, thì cũng giống như bị bịt mắt.\nVề mặt an ninh, không thể nào để cô ấy làm nhiệm vụ trên tàu được."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でもさ。そのこ、当時のサイシンエーの特急形電車の\nしかも試験機の専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なんでしょ？」
2278 = "「Nhưng mà. Cô bé đó, là \x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của nguyên mẫu\ntàu điện tốc hành tối tân nhất thời bấy giờ cơ mà?」"
# 【ハチロク】
# display as 八六
# JP: 「断言はできませんが――\nそうである可能性は低くないかと」
2893 = "「Không thể khẳng định chắc chắn nhưng——\nkhả năng đó cũng không hề thấp đâu ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら、オリヴィとかハチロクには無いキノー！\nもってたりするかもしれないし」
2859 = "「Vậy thì, có thể cô ấy có chức năng\nmà Olivy hay Hachiroku không có!」"
# 【ハチロク】
# display as 八六
# JP: 「ああ！　確かに、例えば極秘の試験用に、存在把握自体\nをされない機能を有していた可能性もございますね」
2337 = "「A! Quả thực, ví dụ như để phục vụ cho các cuộc thử nghiệm tuyệt mật, có khả năng\ncô ấy sở hữu chức năng không để người khác nắm bắt được sự tồn tại của mình.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それに、たまたまそのタイミングで、\x%l共感;#00ffc040;共感%l;#;が通じない\nくらい遠くに、でかけたりとかあるかもだし」
2719 = "「Thêm nữa, có khi tình cờ đúng lúc đó, cô ấy đi đâu đó xa\nđến mức không thể \x%l共感;#00ffc040;cộng cảm%l;#; được thì sao.」"
# 【ハチロク】
# display as 八六
# JP: 「そういわれますと、確かに、その可能性もございますね。\nわたくし、まったく思いつきもいたしませんでした」
2237 = "「Nghe em nói vậy, quả thực cũng có khả năng đó.\nEm hoàn toàn không nghĩ đến điều đó luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……その辺のことは、\n本人に直接聞いて確かめてみればよかろう」
1719 = "「……Về chuyện đó,\ncứ trực tiếp hỏi và xác nhận với chính chủ là được.」"
# 【ハチロク】
# display as 八六
# JP: 「あ――」
# 2318 = "「啊——」" 
# monologue
# JP: \x%l共感;#00ffc040;共感%l;#;能力をもたぬ僕さえ、気配を感じる。\nかなり近くに――確かに、いる。
3299 = "Ngay cả tôi, một người không có khả năng \x%l共感;#00ffc040;cộng cảm%l;#;, cũng cảm nhận được sự hiện diện.\nKhá gần—— Chắc chắn, đang ở đây."
# monologue
# JP: “興味を持つはず”とは聞かされていたが、\nこれほどまでとは思ってなか――っ！！
3528 = "Dù đã nghe nói là \"chắc chắn sẽ hứng thú\",\nnhưng tôi không ngờ lại đến mức này——!!"
# 【ニイロク】
# display as ？？？
# JP: 「…………」
# 1670 = "「……」" 
# monologue
# JP: 物陰からじっと、こちらを見ている。\n顔面全てに包帯をまいた、おそらくは――
3104 = "Từ trong bóng tối, có người đang chăm chú nhìn về phía này.\nKhuôn mặt quấn kín băng gạc, có lẽ là——"
# monologue
# JP: いや、ほぼ間違いない。\n\x%l運転体;#00ffc040;運転体%l;#;の、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が。
3135 = "Không, gần như chắc chắn rồi.\nLà một \x%lレイルロオド;#00ffc040;Railord%l;#; trong \x%l運転体;#00ffc040;kíp lái%l;#;."
# monologue
# JP: （さて、と――会えたはいいが）
3594 = "（Vậy thì—— gặp được thì tốt rồi nhưng）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「こんにちわ。オリヴィ[めいこく,1]冥国式の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なんだけど、\nあなた、[ひのもと,2]日ノ本式だよね？　何の専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;？」
2209 = "「Xin chào. Olivy là \x%lレイルロオド;#00ffc040;Railord%l;#; kiểu Mỹ,\nbạn là kiểu Hinomoto nhỉ? \x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của xe nào vậy?」"
# 【ニイロク】
# display as ？？？
# JP: 「！」
2317 = "「!」"
# monologue
# JP: 豪速球の、ど真ん中だ。\nなるほどこれが冥国式かと、ズレた感想を抱いてしまう。
3410 = "Một cú ném thẳng vào giữa trọng tâm.\nThì ra đây là phong cách Mỹ sao, tôi bất giác có suy nghĩ lệch lạc như vậy."
# monologue
# JP: 包帯の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、これは予想外だったのだろう、\nその表情はわからぬが、どうにも戸惑っているようだ。
3438 = "\x%lレイルロオド;#00ffc040;Railord%l;#; quấn băng gạc có lẽ cũng không ngờ tới điều này,\ndù không nhìn thấy biểu cảm nhưng có vẻ cô ấy đang rất bối rối."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あれ？　ゴメン。話せないの？　それでホータイ？\nだったら、\x%l共感;#00ffc040;共感%l;#;どうかなぁ？」
2301 = "「Hả? Xin lỗi nha. Cậu không nói được à? Nên mới quấn băng gạc?\nVậy thì, \x%l共感;#00ffc040;cộng cảm%l;#; thì sao nhỉ?」"
# 【ハチロク】
# display as 八六
# JP: 「きゃ！！」
2283 = "「Á!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうしたハチロク？」
2495 = "「Sao thế Hachiroku?」"
# 【ハチロク】
# display as 八六
# JP: 「いえ――いまオリヴィちゃんが大きな声で、\n『おはなししよー！』と、\x%l共感;#00ffc040;共感%l;#;を」
2641 = "「Không có gì ạ—— chỉ là lúc nãy Olivy lớn tiếng gọi\n『Nói chuyện đi!』 qua \x%l共感;#00ffc040;cộng cảm%l;#; thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2387 = "「Ồ.」"
# monologue
# JP: 包帯の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、ハチロクがビクつくほどの\n刺激にも、全く反応しなかった。
3553 = "\x%lレイルロオド;#00ffc040;Railord%l;#; quấn băng gạc hoàn toàn không có phản ứng gì\ntrước kích thích khiến cả Hachiroku cũng phải giật mình."
# monologue
# JP: ならば、\x%l共感;#00ffc040;共感%l;#;を完全に遮断しているのか。\nあるいは共感能力自体が壊れているのか――
3162 = "Nếu vậy, cô ấy đã hoàn toàn cắt đứt \x%l共感;#00ffc040;cộng cảm%l;#; sao.\nHay là bản thân khả năng cộng cảm đã bị hỏng——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「\x%l共感;#00ffc040;共感%l;#;もダメ？　そしたら――あ！　ヒツダン！\nね？　ソーテツってペンとメモ」
1627 = "「\x%l共感;#00ffc040;Cộng cảm%l;#; cũng không được luôn? Vậy thì—— a! Bút đàm!\nNè? Soutetsu, cho em mượn bút và giấy ghi chú đi.」"
# 【ニイロク】
# display as ？？？
# JP: 「必要ない。自分は、しゃべれる」
2648 = "「Không cần thiết. Tôi, có thể nói chuyện.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっか！　よかった！　じゃ、アラタメテ～！\nオリヴィはオリヴィ！　よろしくね！！」
2822 = "「Vậy sao! Tốt quá! Vậy, làm lại từ đầu nha~!\nOlivy là Olivy! Rất vui được gặp bạn!!」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしは、ハチロク。\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、\n御一夜鉄道8620の専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;でございます」
2533 = "「Tôi là Hachiroku. \x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của\n\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; 8620 thuộc Đường sắt Ohito.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は右田双鉄。このハチロクのマスターだ」
2538 = "「Tôi là Migita Soutetsu. Master của Hachiroku.」"
# 【ニイロク】
# display as ？？？
# JP: 「知ってる。清春から、話は聞いてる。\n今日来る。あってみなさいって。言われた」
2882 = "「Tôi biết. Kiyoharu đã kể cho tôi nghe rồi.\nNói là hôm nay mọi người sẽ đến. Bảo tôi thử gặp xem sao.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「キヨハル？」
2670 = "「Kiyoharu?」"
# 【ハチロク】
# display as 八六
# JP: 「赤井宮司の、下のお名前でございます」
2463 = "「Là tên của đền chủ Akai ạ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなんだ！　じゃ、グージはミドルネーム？」
2821 = "「Vậy sao! Thế Guji là tên đệm à?」"
# 【ニイロク】
# display as ？？？
# JP: 「違う。宮司は、その神社の[ちょう]長、という意味の[しょくしょう,1]職称。\n駅長。みたいなもの」
2151 = "「Không phải. Đền chủ là chức danh chỉ người đứng đầu ngôi đền đó.\nGiống như, trưởng ga vậy.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「I see!　わかった！　ありがとー！\nアナタ、セツメー上手だね！　ね？　お名前は？？」
2911 = "「I see! Em hiểu rồi! Cảm ơn nha!\nCậu giải thích giỏi ghê! Nè? Cậu tên gì vậy??」"
# 【ニイロク】
# display as 二六
# JP: 「自分は。ニイロク。[きゅうていてつしけんがたとっきゅうけいでんしゃ,10]旧帝鉄試験形特急系電車クハ２６の、\n専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――だったものだ」
2529 = "「Tôi là. Niiroku. Từng là \x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của\ntàu điện tốc hành nguyên mẫu Kuha 26 thuộc Đường sắt Hoàng gia cũ.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ニーロク！　あえてうれしい！　よろしくね！！」
2172 = "「Niiroku! Rất vui được gặp cậu! Xin chỉ giáo nha!!」"
# monologue
# JP: オリヴィが笑顔で右手を差し出す。\nが、ニイロクはその手を受け取ろうとしない。
3260 = "Olivy mỉm cười đưa tay phải ra.\nNhưng Niiroku không có ý định bắt lấy tay cô bé."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「あれれ？　どうかしたの？」
2306 = "「Ủa? Sao vậy?」"
# 【ニイロク】
# display as 二六
# JP: 「自分は、キヨハルの命令だから、顔を出しただけ。\n別に、馴れ合うつもりは無い」
2525 = "「Tôi chỉ lộ diện vì lệnh của Kiyoharu thôi.\nKhông có ý định làm thân đâu.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん、別にオリヴィもナレアイするつもりないよ？\nただ、お仕事の話できないかなーって思っただけ」
2412 = "「Ừm, Olivy cũng không định làm thân đâu?\nChỉ là nghĩ xem có thể nói chuyện công việc được không thôi.」"
# 【ニイロク】
# display as 二六
# JP: 「お仕事？」
2472 = "「Công việc?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そ。オリヴィが運転台を引退したあとの、\nⅨ号機関車の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;をするお仕事」
2449 = "「Đúng vậy. Sau khi Olivy nghỉ làm ở buồng lái,\nsẽ cần người làm \x%lレイルロオド;#00ffc040;Railord%l;#; cho đầu máy số 9.」"
# monologue
# JP: ごくごくさらりとオリヴィは、\nポーレットの腹案――僕らも同意した案を出す。
3270 = "Olivy vô cùng nhẹ nhàng đưa ra dự định của Paulette——\ncũng là phương án mà chúng tôi đã đồng ý."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「キョーミない？　また走ったら、楽しいよ？」
2212 = "「Cậu không có hứng thú sao? Được chạy lại vui lắm đó nha?」"
# 【ニイロク】
# display as 二六
# JP: 「興味ない。自分は、キヨハルとしか乗務しない」
2649 = "「Không hứng thú. Tôi chỉ làm nhiệm vụ trên tàu với Kiyoharu thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「ならキヨハルと乗務すれば？\nＳＬの運転、覚えてもらって」
2854 = "「Vậy thì cậu làm nhiệm vụ cùng Kiyoharu đi?\nĐể chú ấy học lái đầu máy hơi nước là được mà.」"
# 【ニイロク】
# display as 二六
# JP: 「覚える必要はない。\nキヨハルも、蒸気\x%l機関士;#00ffc040;機関士%l;#;出身」
2646 = "「Không cần phải học.\nKiyoharu vốn xuất thân là \x%l機関士;#00ffc040;lái tàu%l;#; hơi nước.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっか。それなら何の問題もなさそー！\nすぐにってハナシでもないし、考えといてっ」
2823 = "「Vậy sao. Thế thì chẳng có vấn đề gì cả!\nCũng không phải chuyện gấp gáp gì, cậu cứ suy nghĩ đi nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、おい。もういいのか？」
2353 = "「A, này. Thế là xong rồi à?」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「とりあえずよくない？　ソーテツとハチロク、\nいま他に、ニイロクと話したいこと、ある？」
2819 = "「Tạm thời vậy là được rồi mà? Soutetsu và Hachiroku,\nbây giờ còn chuyện gì muốn nói với Niiroku nữa không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕は――」
2829 = "「Không, tôi thì——」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしも――特には」
2510 = "「Em cũng—— không có gì đặc biệt.」"
# monologue
# JP: 無論、尋ねたいことはある。\nが――考えてみれば、今すぐに聞けそうなことはない。
3407 = "Tất nhiên là có chuyện muốn hỏi.\nNhưng—— nghĩ lại thì, không có gì có thể hỏi ngay lúc này cả."
# monologue
# JP: ならば……ここはオリヴィの提案どおり、\n今はひとまず、引き上げるのもよいかもしれん。
3520 = "Nếu vậy…… cứ làm theo đề xuất của Olivy,\ntạm thời rút lui lúc này cũng tốt."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「じゃ、そういうことで。またね？　ニイロク！」
2863 = "「Vậy, chốt thế nha. Hẹn gặp lại nhé? Niiroku!」"
# 【ニイロク】
# display as 二六
# JP: 「……理解できない。問題だらけ。\n考えるまでもない。乗務できない」
1703 = "「……Không thể hiểu nổi. Đầy rẫy vấn đề.\nKhông cần phải suy nghĩ. Tôi không thể làm nhiệm vụ trên tàu được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 2827 = "「這！」" 
# monologue
# JP: 感心をする他にない。\nオリヴィは、意識的にか、ごく自然にか――
3513 = "Chỉ còn biết thán phục.\nOlivy, không biết là có ý thức hay rất tự nhiên——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なんで？　乗務できないの？\nモンダイ、なんなの？？」
2671 = "「Tại sao? Không làm nhiệm vụ được á?\nVấn đề là gì vậy??」"
# monologue
# JP: ――いまは聞けぬとあきらめかけたその領域まで、\nこの短時間で、会話を運んできてしまったのだから。
1590 = "——Chỉ trong một thời gian ngắn, cô bé đã đưa cuộc trò chuyện\nđến tận lĩnh vực mà tôi vừa định từ bỏ vì nghĩ không thể hỏi lúc này."
# 【ニイロク】
# display as 二六
# JP: 「……自分の顔は、壊れている。表情が少しも動かない。\n観光列車の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、務められない」
1694 = "「……Khuôn mặt của tôi, đã bị hỏng rồi. Không thể biểu cảm được chút nào.\nTôi không thể đảm nhiệm vai trò \x%lレイルロオド;#00ffc040;Railord%l;#; của tàu du lịch được.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「なら、ブアイソでとーせばよくない？\nクールキャラでさ、ツンツンってして」
2867 = "「Vậy thì cứ tỏ ra lạnh lùng luôn không được sao?\nKiểu nhân vật cool ngầu, lạnh lùng ấy.」"
# 【ニイロク】
# display as 二六＆雙鐵
# JP: 「なっ――」\n「ほう」
2174 = "「Cái——」\n「Ồ.」"
# monologue
# JP: 思わずもれた感心の息に、\nハチロクも頷きをあわせてくれる。
3330 = "Bất giác thốt lên tiếng thở dài thán phục,\nHachiroku cũng gật đầu đồng tình với tôi."
# 【ハチロク】
# display as 八六
# JP: 「それは……よいかもしれませんね。ふかみが\x%l車掌;#00ffc040;車掌%l;#;を\nつとめられるようになれば、きっと上手にバランスを」
2874 = "「Đó…… có lẽ là một ý hay đấy. Nếu Fukami có thể\nđảm nhận vị trí \x%l車掌;#00ffc040;trưởng tàu%l;#;, chắc chắn sẽ cân bằng lại được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2651 = "「Đúng vậy.」"
# monologue
# JP: \x%l車掌;#00ffc040;車掌%l;#;無し、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が接客もという体制でなら、\nなるほど、無表情は厳しかろう。
3284 = "Nếu không có \x%l車掌;#00ffc040;trưởng tàu%l;#;, \x%lレイルロオド;#00ffc040;Railord%l;#; phải kiêm luôn việc tiếp khách,\nthì quả thực, vô cảm sẽ rất khó khăn."
# monologue
# JP: が、ふかみは接客名人だ。あの話術なら間違いなく、\n無表情さえ、チャームポイントと捉えさせてくれるだろう。
3172 = "Nhưng, Fukami là bậc thầy tiếp khách. Với tài ăn nói đó, chắc chắn\ncon bé sẽ biến sự vô cảm thành điểm nhấn quyến rũ cho xem."
# 【ニイロク】
# display as 二六
# JP: 「――自分は、整備[ボディ]体を失った。\n運転[ボディ]体。この体しか存在しない」
1640 = "「——Tôi, đã mất thân chính rồi.\nKíp lái. Chỉ còn lại cơ thể này thôi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィ、引退して運転台に乗らなくなっても、\n整備するしできるよ？　そこはブンギョーでオッケー！」
2417 = "「Dù Olivy nghỉ hưu không lên buồng lái nữa,\nnhưng vẫn có thể bảo dưỡng được mà? Chia việc ra là OK thôi!」"
# 【ニイロク】
# display as 二六
# JP: 「っ――自分は、最新鋭特急系電車の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;。\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の運転支援なんて」
1638 = "「——Tôi là \x%lレイルロオド;#00ffc040;Railord%l;#; của tàu điện tốc hành tối tân nhất.\nLàm sao có thể hỗ trợ lái \x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; được.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「Ⅸ号は[めいじ,1]明智製のSLだから。操作すっごくシンプルだし。\nサイシンのスペックなら、ヨユーで覚えられると思う」
2168 = "「Đầu máy số 9 là SL sản xuất từ thời Minh Trị mà. Thao tác cực kỳ đơn giản.\nVới thông số kỹ thuật tối tân, chắc chắn cậu sẽ học được dễ dàng thôi.」"
# 【ニイロク】
# display as 二六
# JP: 「――それでも。自分は」
1634 = "「——Dù vậy. Tôi...」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それでも――ジブンは？」
2255 = "「Dù vậy—— cậu vẫn?」"
# 【ニイロク】
# display as 二六
# JP: 「…………」
# 1670 = "「……」" 
# monologue
# JP: ニイロクが沈黙してしまう。\nしばし待ち――オリヴィは淡々と言葉を発する。
3148 = "Niiroku rơi vào im lặng.\nĐợi một lát—— Olivy cất lời một cách điềm đạm."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「それでもリユウ、さがしちゃう？\n走らないで、ジブンをとじこめとくための」
2256 = "「Dù vậy cậu vẫn cố tìm lý do sao?\nĐể không phải chạy, để nhốt mình lại.」"
# 【ニイロク】
# display as 二六＆八六
# JP: 「っ！！？」\n「まぁ！」
2548 = "「!!?」\n「Trời ạ!」"
# monologue
# JP: ニイロクが――ハチロクまでもが、息を呑む。
3113 = "Niiroku—— và cả Hachiroku, đều nín thở."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「けどさー。\nそうやって走らないの、もったいないよ？」
2275 = "「Nhưng mà nè.\nCứ như vậy mà không chạy nữa, chẳng phải rất phí phạm sao?」"
# 【ニイロク】
# display as 二六
# JP: 「――簡単に言う」
1632 = "「——Nói thì dễ.」"
# monologue
# JP: 分厚い包帯の上からでも、ニイロクの動揺が――\nあるいは怒りが、見えた気がする。
3327 = "Dù qua lớp băng gạc dày cộp, tôi vẫn cảm nhận được sự dao động——\nhay có lẽ là sự tức giận của Niiroku."
# monologue
# JP: が、止めない。ハチロクにも止める様子はない。
3130 = "Nhưng, tôi không ngăn lại. Hachiroku cũng không có vẻ gì là sẽ ngăn cản."
# monologue
# JP: （任せる他ない。\nこれは――オリヴィの仕事なのだから）
3586 = "（Chỉ có thể để cô bé tự lo liệu thôi.\nVì đây là—— công việc của Olivy mà.）"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「だって、カンタンでしょ？　オゼンダテしてあるし。\nあとは、走るか、走らないかってだけのはなしだし」
2582 = "「Thì đúng là dễ mà? Mọi thứ đã được dọn sẵn rồi.\nCòn lại chỉ là chuyện chạy, hay không chạy thôi.」"
# 【ニイロク】
# display as 二六
# JP: 「だから――自分はもう走れないと」
2546 = "「Thế nên—— tôi đã nói là mình không thể chạy được nữa rồi.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オリヴィさ、ニイロクよりもずっと古くて、\n冥国製で、性能的にはヒカクに全然ならないけど」
2214 = "「Olivy ấy nha, cũ hơn Niiroku rất nhiều,\nlà hàng sản xuất ở Mỹ, về mặt hiệu suất thì hoàn toàn không thể so sánh được.」"
# 【ニイロク】
# display as 二六
# JP: 「…………」
# 1670 = "「……」" 
# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも次にアブナクなるまでは、本線走っていーんだよ！\nオリヴィみたいなおんぼろだって、走れるんだよ？」
2195 = "「Nhưng cho đến khi gặp nguy hiểm lần tiếp theo, thì vẫn được chạy trên tuyến chính đấy!\nCả một cỗ máy tàn tạ như Olivy mà vẫn còn chạy được đó nha?」"
# 【ニイロク】
# display as 二六
# JP: 「…………」
# 1670 = "「……」" 
# monologue
# JP: ニイロクは、もう反論しない。
3145 = "Niiroku, không còn phản bác nữa."
# monologue
# JP: 包帯の下の顔を俯かせ、\nじっと動かず、話を聞いているだけだ。
3224 = "Cô ấy cúi gầm khuôn mặt dưới lớp băng gạc,\nđứng bất động, chỉ lặng lẽ lắng nghe."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「で、そうして走ったら、オキューリョーもらえるんだ！\nオキューリョー、なんにつかってもいいんだよ？」
2675 = "「Và, cứ chạy như thế thì sẽ được nhận tiền lương đấy!\nTiền lương, dùng vào việc gì cũng được luôn?」"
# 【ニイロク】
# display as 二六
# JP: 「っ！！？」
2828 = "「!!?」"
# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2329 = "「啊！」" 
# monologue
# JP: ハチロクが驚いた顔になる。\nが、給料がもらえることになんで今さらハチロクが――！
3181 = "Hachiroku lộ vẻ kinh ngạc.\nNhưng, việc nhận được tiền lương thì sao đến giờ Hachiroku lại——!"
# 【双鉄】
# display as 雙鐵
# JP: 「ひょっとして、\x%l共感;#00ffc040;共感%l;#;か？」
2746 = "「Lẽ nào là, \x%l共感;#00ffc040;cộng cảm%l;#; sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい。ニイロクから――情報共有を求める鋭い\x%l共感;#00ffc040;共感%l;#;が」
2594 = "「Vâng. Từ Niiroku—— một luồng \x%l共感;#00ffc040;cộng cảm%l;#; sắc bén yêu cầu chia sẻ thông tin.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
2258 = "「Ra là vậy.」"
# monologue
# JP: 驚かされる。
3508 = "Thật đáng ngạc nhiên."
# monologue
# JP: それほど完全に\x%l共感;#00ffc040;共感%l;#;を抑制、\nないし遮断していたという話にも、もちろんなのだが――
3355 = "Việc cô ấy đã kìm nén, hay thậm chí cắt đứt hoàn toàn \x%l共感;#00ffc040;cộng cảm%l;#; đến mức đó, thì đã đành một nhẽ——"
# 【双鉄】
# display as 雙鐵
# JP: 「……\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が給与をもらえるというのは、\nその抑制を外すほど、衝撃的な話であるのか」
1706 = "「……Việc \x%lレイルロオド;#00ffc040;Railord%l;#; được nhận lương,\nlại là chuyện chấn động đến mức khiến cô ấy phải gỡ bỏ sự kìm nén đó sao?」"
# monologue
# JP: 思わずこぼれた一言に、\nくすりと小さな笑いがかぶさる。
3325 = "Câu nói bất giác thốt ra của tôi,\nđược đáp lại bằng một tiếng cười khúc khích nhỏ."
# 【ハチロク】
# display as 八六
# JP: 「――お伺いしますが。\n双鉄さまは、ナビにお給料をお支払になったことは？」
1644 = "「——Em xin hỏi một câu ạ.\nNgài Soutetsu đã bao giờ trả lương cho Navi chưa?」"
# 【双鉄】
# display as 雙鐵
# JP: 「……なるほどな」
1685 = "「……Ra vậy.」"
# monologue
# JP: 上空、ぶん、と聞えよがしな風切音。
3111 = "Từ trên cao, vù vù, tiếng gió rít vang lên như cố ý để tôi nghe thấy."
# monologue
# JP: 残念ながら、ナビには金の使いようもなかろうが――\n最上級のオイルかなにか、提供させてもらうとしよう。
3309 = "Thật đáng tiếc, Navi cũng chẳng có cách nào tiêu tiền——\nCó lẽ tôi sẽ cung cấp cho cô ấy loại dầu cao cấp nhất hay gì đó tương tự vậy."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「オキューリョー、キヨハルのためにも使えるよ？\nキヨハル、きっとよろこんじゃうよ！？」
2562 = "「Tiền lương, cũng có thể dùng cho Kiyoharu đó nha?\nKiyoharu, chắc chắn sẽ rất vui đấy!?」"
# 【ニイロク】
# display as 二六
# JP: 「……自分、が、キヨハルを。\n――キヨハルの、ために」
1697 = "「……Tôi, cho Kiyoharu.\n——Vì, Kiyoharu.」"
# monologue
# JP: 小刻みに、抑えきれぬようにニイロクが震えはじめる。
3097 = "Niiroku bắt đầu run rẩy từng cơn, như thể không kìm nén được nữa."
# monologue
# JP: その胸中を覆っているのは驚きなのか、感動なのか、\nあるいは異なる感情なのか、僕にはまるで計り知れん。
3514 = "Sự ngạc nhiên, cảm động, hay một thứ cảm xúc nào khác đang bủa vây trong lòng cô ấy,\ntôi hoàn toàn không thể đoán biết được."
# 【オリヴィ】
# display as 奥莉薇
# JP: 「どーしても乗務がイヤならさ、\x%l保線;#00ffc040;保線%l;#;でもいいから。\nオリヴィ――知ってること、少しでも伝えたいから！」
2430 = "「Nếu cậu nhất quyết không muốn làm nhiệm vụ trên tàu, thì \x%l保線;#00ffc040;bảo trì đường ray%l;#; cũng được.\nOlivy—— muốn truyền đạt những gì mình biết, dù chỉ là một chút thôi!」"
# 【ニイロク】
# display as 二六＆八六
# JP: 「！」\n「あ――」
2293 = "「!」\n「A——」"
# monologue
# JP: ハチロクが、ニイロクが、ほとんど同時にオリヴィを見る。
3186 = "Hachiroku và Niiroku gần như đồng thời nhìn Olivy."
# monologue
# JP: 僕も……見とれる。オリヴィに。\nなんと綺麗な――晴れ晴れと優しい笑みであろうか。
3340 = "Tôi cũng…… mải mê ngắm nhìn Olivy.\nMột nụ cười rạng rỡ và dịu dàng—— đẹp đẽ biết bao."
# 【ハチロク】
# display as 八六
# JP: 「伝えることは……のこす、こと」
2224 = "「Truyền đạt lại…… chính là, lưu giữ lại.」"
# monologue
# JP: その呟きが、ハチロク自身の感情なのか、\nオリヴィから来た\x%l共感;#00ffc040;共感%l;#;なのか、それも、僕にはわからない。
3506 = "Tiếng lầm bầm đó, là cảm xúc của chính Hachiroku,\nhay là \x%l共感;#00ffc040;cộng cảm%l;#; đến từ Olivy, tôi cũng không thể biết được."
# monologue
# JP: が――
3129 = "Nhưng——"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「いいたいことは、それでゼンブ！\nあとはさ、ニイロクとグージで考えて？」
2419 = "「Những gì em muốn nói, chỉ có vậy thôi!\nCòn lại thì, Niiroku và đền chủ cứ suy nghĩ nhé?」"
# 【ニイロク】
# display as 二六
# JP: 「あ……うっ――」
2324 = "「A…… ư——」"
# monologue
# JP: 一瞬、ニイロクの手が動きかけ――\nが、何もせず、元の位置へと戻される。
3237 = "Trong một khoảnh khắc, tay Niiroku định cử động——\nnhưng, cô ấy không làm gì cả, rồi lại hạ tay xuống vị trí cũ."
# monologue
# JP: ならば、この辺が潮時だろう。
3334 = "Nếu vậy, đến lúc rút lui rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「いきなり押しかけたのに、話してくれてありがとう。\n赤井宮司にも、どうか、よろしく伝えて欲しい」
2520 = "「Đột ngột đến làm phiền mà cậu vẫn chịu nói chuyện, cảm ơn nhé.\nNhờ cậu gửi lời hỏi thăm của chúng tôi đến đền chủ Akai.」"
# 【ニイロク】
# display as 二六
# JP: 「ん――。\nうん。わかった。伝える」
2358 = "「Ưm——.\nỪ. Hiểu rồi. Sẽ chuyển lời.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、帰ろう。\nハチロク、オリヴィ」
2856 = "「Vậy thì, về thôi.\nHachiroku, Olivy.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、かしこまりました双鉄さま。\nそれではニイロク、いずれ、また」
2426 = "「Vâng, em rõ rồi thưa ngài Soutetsu.\nVậy thì Niiroku, hẹn khi khác gặp lại.」"
# 【オリヴィ】
# display as 奥莉薇
# JP: 「バイバイニーロク！　いつでもきてねー！」
2567 = "「Bye bye Niiroku! Cứ đến chơi bất cứ lúc nào nha~!」"
# 【ニイロク】
# display as 二六
# JP: 「…………」
# 1670 = "「……」" 
# monologue
# JP: ニイロクは無言で、手を振り返しもしない。\nけれども、僕には信じられる。
3149 = "Niiroku im lặng, cũng không vẫy tay chào lại.\nNhưng mà, tôi tin tưởng."
# monologue
# JP: オリヴィが伝えようとしたこと。\nその一番大事な部分はきっと、伝わっていると。
3261 = "Những gì Olivy muốn truyền đạt.\nPhần quan trọng nhất trong đó, chắc chắn đã được thấu hiểu."
