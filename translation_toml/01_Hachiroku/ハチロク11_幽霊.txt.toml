# display as 雙鐵
# JP: 「僕は、お前を嫌ったりしない。\nむしろ、とても強い好意を変わらず、抱いているよ」
1926 = "「我完全沒有討厭你。相反，應該說一直對你有著強烈的好感才對」" 

# 【ハチロク】
# display as 八六
# JP: 「とても、強い……好意」
1876 = "「強烈的……好感」" 

# monologue
# JP: ハチロクの頬がじわりと赤くなる。\n可愛らしくて、嬉しくて。だから、言葉が素直に続く。
2435 = "八六的臉頰緩緩地泛起了紅暈，看起來是那麼可愛，那麼令人喜悅。所以我也繼續袒露著心聲。" 

# monologue
# JP: ――声で言葉で、ハチロクの笑顔をふくらませたい。\nそんな思いが、唇を滑らかにしてくれる。
2601 = "想要用我的聲音，我的話語，讓八六綻放更多的笑容。心裡這樣想著，開口便再無猶豫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。お前といれば楽しいし。\n笑顔をみれば、もっと喜ばせてやりたくもなる」
1986 = "「是啊。和你在一起很開心。看到你的笑容，就不禁想讓你更開心一些」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、何故です？」
1975 = "「既然這樣，那又為何？」" 

# monologue
# JP: ハチロクの目は、わずかも僕から離れない。
2436 = "八六的視線牢牢地鎖定在我的身上。" 

# monologue
# JP: らしくない、とさえ感じるまでの素直さで、\nあどけないほどまっすぐまっすぐ、聞いてくる。
2524 = "她率直得有些一反常態，就這麼單刀直入地追問了下去。這態度甚至略顯天真。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、わたくしをお避けになられましたよね？\nそれで、わたくし――」
2169 = "「雙鐵少爺是在有意迴避我吧？所以，我才——」" 

# monologue
# JP: 一瞬、唇が結ばれる。
2809 = "說到這裡，八六咬了咬嘴唇，頓了一下。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくし……双鉄様に、\nやはり、恨まれ、憎まれているものであるかと」
1935 = "「我才會覺得，雙鐵少爺大概真的在記恨我吧」" 

# monologue
# JP: “なにをバカな”、とまた言いかけて、\nすんでのところで言葉を飲み込む。
1378 = "“說什麼傻話”差點脫口而出，還好在千鈞一髮的時候又咽了回去。" 

# monologue
# JP: ――うかつな言葉で、二度とハチロクを脅かすまい。
1362 = "——怎麼能連續兩次對八六說出這種不過腦子的話呢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あの痕跡で……髪が焼け焦げてしまう臭いで、\n僕が思い出し――それで、傷ついたと考えたのか？」
1681 = "「你是不是覺得我看到那個痕跡，聞到頭發燒焦的味道，就被勾起了回憶——然後心靈就受創了？」" 

# 【ハチロク】
# display as 八六
# JP: 「だって――お倒れにまでなられましたし」
1820 = "「因為——您當時都暈倒了啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。だが……」
2129 = "「這倒不假，不過……」" 

# monologue
# JP: 難しい。\nどう伝えればいいものか。
2532 = "好糾結，該怎麼跟她說好呢。" 

# monologue
# JP: 悩みもそのまま、\n素直な言葉に、こぼれてしまう。
2638 = "於是，我索性就把煩惱也不加掩飾地直接說了出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「倒れてしまったのは……\n正直、いろいろ重なってしまって、という類のものだよ」
2093 = "「說實話，我之所以會暈倒，是因為有太多事情趕在了一起」" 

# 【ハチロク】
# display as 八六
# JP: 「その、いろいろを――\nわたくしは、双鉄様にお話しいただきたいです」
1929 = "「我希望雙鐵少爺能跟我談談，那“太多事情”具體包括了什麼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1806 = "「嗯」" 

# monologue
# JP: 問いがあまりに直球だから、\n答える言葉も、迷わずにすむ。
2520 = "她問得實在是太直接，倒也省了我斟酌的工夫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「考えてしまったんだ。\n自分が、何故、ハチロク――お前を好きかということを」
1954 = "「我認真想了想，自己究竟是為什麼會喜歡八六你」" 

# 【ハチロク】
# display as 八六
# JP: 「ぁぅっ」
1779 = "「啊！」" 

# monologue
# JP: 頬だけでなく、顔も体も赤くなる。
2735 = "紅暈從八六的臉頰散開，由臉部擴及全身。" 

# monologue
# JP: 恥ずかしそうに下を向きかけ――\nけれどもすぐに、僕の目に視線を戻してくる。
2526 = "她略顯羞赧地低下了頭，然而視線卻迅速地再次鎖定了我的眼睛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それで、事故の痕跡……\nあれが、ひどく[こた]堪えてしまった」
2059 = "「而那場事故的痕跡，讓我很痛苦」" 

# monologue
# JP: 説明が、うまくできていない。
2791 = "表述似乎有些詞不達意。" 

# monologue
# JP: そう感じるが、言葉を選べば感覚とズレてしまう気もして\n――だからそのまま話し続ける。
2868 = "雖然清楚自己的感受，但化作言辭，就總覺得有些許偏差——於是我不再糾結，繼續說了下去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、つまりは……\n取り残されてしまうことが、怖いんだ」
1923 = "「我呢……其實是在害怕大家都離我而去」" 

# 【ハチロク】
# display as 八六
# JP: 「取り残されて、しまうこと」
2176 = "「離您而去……嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。怖い。\nこうして話し、思うだけでも……このざまだ」
1992 = "「是啊，好可怕。光是這樣一說、一想，就已經嚇成這副樣子了」" 

# monologue
# JP: 手を、持ち上げれば、\nハチロクの目はひどく悲しげに曇ってしまう。
2620 = "我稍微抬了抬手。八六看在眼裡，目光中泛起了深深的悲傷。" 

# monologue
# JP: 僕の指先が痙攣したように、\n小さく、震え続けているから。
2619 = "我的手指如同痙攣一般，微微地顫抖個不停。" 

# 【双鉄】
# display as 雙鐵
# JP: 「路子も、母も、父も――僕より先にいってしまった。\nことに路子は。じわじわ、ゆっくり、遠ざかっていった」
2109 = "「路子、母親、父親，他們都先我而去了。特別是路子，我能感覺到她是怎樣漸漸遠去的」" 

# monologue
# JP: 震えが、体にまでも広がる。\n怖いし、気持ちが悪いし、寒い。
2891 = "顫抖逐漸蔓延至全身。可怕，難受，寒意徹骨。" 

# monologue
# JP: けれど、ハチロクは聞いてくれてる。\nならば詰まらず、吐き出せそうだし――吐き出したい。
2694 = "然而，八六還在傾聽，不由得我不說——況且我自己也想把這些說出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あの瞬間に、そういうものが一気に戻ってしまって――\nだから、自分をまったく信じられなくなった」
2141 = "「那一瞬間，這些場景如走馬燈般閃過我眼前。所以，我的自信消失得無影無蹤」" 

# 【ハチロク】
# display as 八六
# JP: 「ん……」
1798 = "「嗯……」" 

# monologue
# JP: ――ああ、繋がっていないのか。
1359 = "——啊，好像她並沒有理解。" 

# monologue
# JP: ハチロクの微妙な表情が僕に、\n言葉の不足を教えてくれる。
2442 = "八六那複雜的表情，讓我明白自己的話語是多麼詞不達意。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまり、僕がお前を好きな理由だ。\nそれが、恐怖からかと思って――」
2053 = "「總而言之，關於我會喜歡你的理由，我擔心自己會不會是因為恐懼才——」" 

# monologue
# JP: 言いかけ、いきなり理解する。
2810 = "說到這裡，我一下子明白了。" 

# monologue
# JP: （なるほど……これか――）
2913 = "（原來如此，是這樣啊……）" 

# monologue
# JP: さっき、ハチロクの言葉が詰まった理由。\nそれを恐らく、僕も今まさに体感している。
2460 = "剛才八六遲遲不肯開口的原因，恐怕正是我現在感受到的這種進退兩難的感覺。" 

# monologue
# JP: “口にしたのなら、嫌われてしまうかもしれない”\n思ってしまえば……喉が痺れてしまったようで。
2343 = "一想到“若是說出來，可能就會被討厭”，喉嚨就會像麻痺了一樣。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？」
2175 = "「雙鐵少爺？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――大丈夫だ」
1942 = "「我沒事」" 

# monologue
# JP: だが、話して欲しいと、ハチロクが望んでくれている。\nであれば、それに応えたい。
2692 = "然而，八六在期待著我說出來。既然如此，我不願辜負她的期待。" 

# monologue
# JP: 深呼吸して、あせらずに、\nひとこと、ひとこと、言葉にしていく。
2675 = "深呼吸，理平情緒，按部就班，一件一件地說。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、自分を疑っている。お前を好きになったのは――\nお前にならば、取り残されないと思ったからかと」
1925 = "「我在懷疑自己——我之所以會喜歡上你，會不會是因為覺得你不會離我而去」" 

# 【ハチロク】
# display as 八六
# JP: 「……わたくしが、何故、双鉄様を取り残さないと？」
2028 = "「為什麼，我就不會離雙鐵少爺而去呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは、お前が――」
2148 = "「那是因為，你——」" 

# monologue
# JP: それは錯覚で幻想だったと、淵さんに思い知らされた。
2820 = "跟淵先生交流後，我已經知道那不過是錯覺與幻想而已。" 

# monologue
# JP: そうと知らされた今もなお、\n僕にはとても、自分の誤解を笑い飛ばせる軽さを持てない。
2757 = "而正因為如今已被點醒，我越來越不能對自己的這個誤解一笑了之。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前が、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だから――\n僕よりずっと、死から遠いと……錯覚していたからだ」
1821 = "「因為你是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。我誤以為你的壽命會比我長很多」" 

# 【ハチロク】
# display as 八六
# JP: 「錯覚、と――」
2089 = "「誤以為……嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それは今は理解している。[ゴーハチロクニイサン,4]58623が――\n何故、\x%l静態保存;#00ffc040;静態保存%l;#;されていたかを知らされたので」
1990 = "「是啊，不過現在我已經理解了。因為我知道了５８６２３採用靜態保存方式的原因」" 

# 【ハチロク】
# display as 八六
# JP: 「それで」
1959 = "「所以呢」" 

# monologue
# JP: ハチロクが、微笑む。\nとても小さく。
2446 = "八六露出了一絲不易察覺的微笑。" 

# 【ハチロク】
# display as 八六
# JP: 「いかがでございますか？」
2051 = "「結論是什麼呢？」" 

# monologue
# JP: ささやかな声とほほ笑みなのに、\n包み込まれたような気がする。
2529 = "她輕聲細語，笑容含蓄，卻給人一種包容的感覺。" 

# monologue
# JP: ただホっとする。\n問われた意味を、まったく理解できていないのに。
2408 = "儘管我完全沒理解她的提問，也仍然讓我覺得很安心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いかが、とは――どういうことだ？」
2050 = "「結論……是指什麼的結論呢？」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、妹たちより古くからあるレイルロオドです。\n今日壊れるか、明日壊れるか、それもしれない存在です」
1680 = "「作為鐵路人偶，我可比妹妹們降生得更早。也許今天就會壞掉，也許明天就會壞掉，誰也不能保證」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――うむ」
1418 = "「……嗯」" 

# monologue
# JP: 血が、凍りつく感覚がある。\nけれども、それは表に出さない。
2351 = "一股寒意湧上心頭，血液彷彿隨之凝固，但斷然不能表現出來。" 

# monologue
# JP: 僕の変化が知られれば、きっと影響を与えてしまう。\nハチロクの言葉をそのまま、全部聞きたいと思うから。
2534 = "如果八六察覺到我的變化，一定會受到影響。而我很想聽她說完。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしが明日壊れるとして――\n双鉄様の“好き”も、壊れてしまわれますか？」
1843 = "「如果我真的在明天壞掉，雙鐵少爺的這份“喜歡”，也會隨之消失嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1650 = "「不會……」" 

# monologue
# JP: ありえない。そんなことなど。
2844 = "這種事情，我怎麼可能做得出。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前が仮に、明日、僕を置いていくなら――」
1841 = "「如果你明天真的要離我而去——」" 

# monologue
# JP: ぐらりと、揺れる。\n想像だけで、仮定だけで、これほど強く恐怖している。
2776 = "腳下不由得一踉蹌。即便只是想像，只是假設，也令我感到如此恐懼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、お前になんでもしてやる。\nお前が笑顔で――安心して、僕を、置いていけるよう」
1958 = "「我願意為你赴湯蹈火做任何事，讓你能帶著笑容，安心地先我而去」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様――」
2165 = "「雙鐵少爺……」" 

# monologue
# JP: ハチロクの、小さな小さな手が伸びてくる。\n僕をつかまえ、その胸の中へ掻き抱く。
2425 = "八六伸出她那玲瓏的雙手，抱住了我，將我緊緊擁入她的懷中。" 

# monologue
# JP: 抗おうなどとは思わない。\nハチロクの体の熱が、伝わってくる。
2479 = "又有誰會拒絕這樣的擁抱呢。八六的體溫隨擁抱撲面而來。" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、双鉄様のお疑いは、\nきっと、意味をなさぬものですよ」
2155 = "「那雙鐵少爺的懷疑，一定是沒有意義的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……うん」
# 1418 = "「……嗯」" 

# monologue
# JP: じんわりとする。\n理解する。
2842 = "這樣的想法伴隨著暖意，在我心中擴散開來。" 

# monologue
# JP: この温かみが教えてくれる。
2895 = "點醒我的，正是這份暖意。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのだな」
2045 = "「確實啊」" 

# monologue
# JP: 例えば誤解が錯覚が、\nハチロクへの“好き”の種を撒いたのだとしても。
2473 = "即便是誤解與錯覺播下了“喜歡”八六這份感情的種子。" 

# monologue
# JP: 根付き、芽吹いて育ったそれは、\n揺るぎないほど強い現実になって、今、ここにある。
2761 = "而這份感情隨後生根發芽，現在則無可動搖地存在於我的心間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「意味が無いのだな。過去を、未来を疑うことは。\nこの一瞬が、僕らの全てなのだから」
1913 = "「懷疑過去和未來都沒有意義。目前這一瞬間，才是我們的全部啊」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしは……\nきっと、そのように認識しております」
1915 = "「我……想必也是這樣認為的」" 

# monologue
# JP: 僕を抱く手が強くなる。\n声からも、ハチロクのぬくもりを受け取れる。
2611 = "我又被抱得更緊了些。而從八六的聲音裡，我也同樣感受到了那份暖意。" 

# 【ハチロク】
# display as 八六
# JP: 「今日壊れても、明日壊れても悔いぬよう。\n今、このときを――わたくしは、大切に扱いたいと」
2027 = "「為了讓自己不管什麼時候壞掉都可以不留遺憾，我會分外珍惜如今的時光」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1806 = "「嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様は――」
2164 = "「雙鐵少爺——」" 

# monologue
# JP: 優しく、優しく、ハチロクの小さな指に撫でられる。
2432 = "八六的纖纖玉指，無比溫柔地輕撫著我。" 

# monologue
# JP: 絡まってしまった心を、\nきっと、ほぐそうとしてくれている。
2642 = "是想以這樣的方式，疏散我心頭的糾結吧。" 

# 【ハチロク】
