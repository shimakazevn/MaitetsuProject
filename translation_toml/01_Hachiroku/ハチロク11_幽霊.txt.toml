# monologue
# JP: あるけれど、触れることの出来ぬもの。\n自分の言葉が、ハチロクの波が、イメージを固める。
2541 = "Tồn tại, nhưng không thể chạm tới. \nLời nói của tôi, những gợn sóng của\nHachiroku, đang củng cố hình ảnh đó."

# 【双鉄】
# display as 雙鐵
# JP: 「意識でさえも触れられぬなら、縛っているのは無意識だ。\nお前が言った、深層心理というやつかもしれん」
2072 = "「Nếu ngay cả ý thức cũng không thể chạm\ntới, thì thứ đang trói buộc tôi chính là\nvô thức.\nCó lẽ đó chính là tâm lý sâu thẳm mà em đã\nnói.」"

# 【ハチロク】
# display as 八六
# JP: 「触れることのできない、意識……？」
1909 = "「Ý thức... không thể chạm tới sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。\nだからきっと、意識的には解きほぐせない」
1987 = "「Chắc là vậy. \nNên chắc chắn, không thể tháo gỡ nó bằng ý\nthức được.」"

# monologue
# JP: そこまで思えば、自覚する。\n僕はやはり、そもそもからして、忘れたくなどないのだと。
2599 = "Nghĩ đến đó, tôi chợt nhận ra. \nQuả nhiên, ngay từ đầu, tôi vốn dĩ không\nhề muốn quên đi."

# monologue
# JP: ……ずっと忘れずにいることが、\n例えば路子を、縛ってしまうことだとしても。
2762 = "...Việc cứ mãi không quên, \ncho dù điều đó, có trói buộc lấy Michi đi\nchăng nữa."

# 【ハチロク】
# display as 八六
# JP: 「触れねば、解けぬものですか？」
1882 = "「Nếu không chạm vào, thì không thể tháo gỡ\nđược sao ạ?」"

# monologue
# JP: 今日のハチロクは、驚くほどにあどけない。
2421 = "Hachiroku hôm nay, ngây thơ đến lạ lùng."

# monologue
# JP: 普段であれば聞かれそうもない素朴なことを、\n次々、僕に問いかけてくる。
2784 = "Em ấy liên tục đặt ra cho tôi những câu\nhỏi ngây ngô,\nmà bình thường có lẽ em ấy sẽ chẳng bao\ngiờ hỏi."

# 【ハチロク】
# display as 八六
# JP: 「触れぬままでも――自然と、ほどける。\nそんなことも、起こりえないのでございましょうか？」
1724 = "「Cứ để mặc không chạm vào——rồi nó sẽ tự\nnhiên tháo gỡ.\nChuyện như vậy, không thể nào xảy ra sao\nạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「どう、かな――」
2094 = "「Sao, nhỉ——」"

# monologue
# JP: そして、問いかけは僕の目線を向けさせる。
2755 = "Và rồi, câu hỏi đó khiến tôi phải đưa mắt\nnhìn."

# monologue
# JP: 普段であれば考えようとすることさえもない“当然”に\n光をあてて、形を確かめなおさせてくる。
2782 = "Nó soi rọi ánh sáng vào những điều \"hiển\nnhiên\" mà bình thường tôi chẳng bao giờ\nthèm nghĩ tới,\nvà bắt tôi phải xác nhận lại hình dạng của\nchúng."

# 【双鉄】
# display as 雙鐵
# JP: 「何かの弾みで緩めば、ほどける……\nそんなことなら、あるかもしれんな」
2070 = "「Nếu vì một động lực nào đó mà nó nới lỏng\nra, thì sẽ tháo gỡ được...\nChuyện như vậy, có lẽ cũng có thể xảy ra.」"

# 【ハチロク】
# display as 八六
# JP: 「どのようにすれば――ゆるむのでしょうか？」
2154 = "「Làm thế nào để——nó nới lỏng ra được ạ?」"

# monologue
# JP: （ぽちゃん）
2918 = "（Tõm）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2182 = "「！」" 

# monologue
# JP: すわり心地がしっくり来ていないのだろうか？\nハチロクはわずかに尻を浮かせて、体の位置を整える。
2357 = "Có phải do ngồi không được thoải mái\nkhông?\nHachiroku hơi nhấc mông lên một chút, điều\nchỉnh lại tư thế."

# monologue
# JP: 肌と肌とがこすれあうことのここちよさ――\nそれはそのまま、問いの答えだ。
2772 = "Sự dễ chịu khi làn da cọ xát vào nhau—— \nĐó, chính là câu trả lời cho câu hỏi."

# 【双鉄】
# display as 雙鐵
# JP: 「あたたかくなれば、やわらげば、緩む気がする。\n木の芽や、氷と同じように」
1948 = "「Tôi cảm thấy nếu trở nên ấm áp hơn, mềm\nmại hơn, thì nó sẽ nới lỏng ra.\nGiống như mầm cây hay băng tuyết vậy.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら――」
1973 = "「Nếu vậy thì——」"

# 【双鉄】
# display as 雙鐵
# JP: 「どのようにすれば、あたたまるのかな」
2078 = "「Làm thế nào để trở nên ấm áp hơn nhỉ.」"

# monologue
# JP: 僕がしばりつけてる『かすか』は、\n僕をしばりつけてる『かすか』は、事故への恐怖だ。
2616 = "Thứ 'mờ ảo' mà tôi đang trói buộc, \nthứ 'mờ ảo' đang trói buộc tôi, chính là\nnỗi sợ hãi về vụ tai nạn."

# monologue
# JP: ひとり遺されることへの恐れで、\nガチガチに強張りきっている。
2753 = "Vì nỗi sợ bị bỏ lại một mình, \nmà nó đã trở nên cứng đờ và căng thẳng tột\nđộ."

# 【双鉄】
# display as 雙鐵
# JP: 「……あたためようと――\n懸命に何かしてしまうなら、逆効果な気が、僕はする」
1950 = "「...Để sưởi ấm nó—— \nTôi cảm thấy nếu cứ cố gắng làm gì đó một\ncách tuyệt vọng, thì sẽ phản tác dụng.」"

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1779 = "「啊！」" 

# monologue
# JP: ハチロクの背が硬くなる。\n恐らくは、そうしかけていたことに気づいて。
2431 = "Lưng Hachiroku cứng lại. \nCó lẽ là do em ấy nhận ra mình vừa định\nlàm như vậy."

# monologue
# JP: ならば……やっぱりそういうことだ。
2536 = "Nếu vậy... quả nhiên là như thế."

# 【双鉄】
# display as 雙鐵
# JP: 「必要なのはきっと、『あたためられる』ことではなく、\n『あたたまる』ことだ」
1947 = "「Thứ cần thiết chắc chắn không phải là\n'được sưởi ấm',\nmà là 'trở nên ấm áp'.」"

# monologue
# JP: じわじわ、自然に――\n『かすか』自体の、その内側から。
2347 = "Chầm chậm, tự nhiên—— \nTừ chính bên trong của thứ 'mờ ảo' đó."

# 【双鉄】
# display as 雙鐵
# JP: 「だから、時間をかけるしかないかと思う。\n少しずつ――できることから、重ねていくしか」
1962 = "「Nên tôi nghĩ chỉ còn cách dành thời gian\ncho nó thôi.\nTừng chút một——chỉ có thể tích lũy từ\nnhững việc mình có thể làm.」"

# 【ハチロク】
# display as 八六
# JP: 「……左様、ですね。きっと」
1424 = "「...Đúng, vậy nhỉ. Chắc chắn rồi.」"

# monologue
# JP: ハチロクが体の力を抜く。
2439 = "Hachiroku thả lỏng cơ thể."

# monologue
# JP: 途端、ひとつになれた気がする。\n僕にもたれかかる背中は、ぴたり、吸い付くようで。
2744 = "Ngay lập tức, tôi có cảm giác như chúng\ntôi đã hòa làm một.\nTấm lưng tựa vào tôi, áp sát vừa vặn, như\nhút chặt lấy."

# 【ハチロク】
# display as 八六
# JP: 「まずは、[あの子,3]8620をまた走らせて」
1705 = "「Trước tiên, hãy để 8620 chạy lại đã.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。そうして……」
1998 = "「Đúng vậy. Và rồi...」"

# monologue
# JP: 思い出す。\nどうして、忘れてしまっていたのか。
2511 = "Nhớ lại rồi. \nTại sao, tôi lại quên mất cơ chứ."

# monologue
# JP: 路子の、僕の願ったことなど、たったひとつだ。\nそれは全く変わっていない。
2825 = "Điều Michi mong muốn, điều tôi mong muốn,\nchỉ có một mà thôi.\nĐiều đó hoàn toàn không thay đổi."

# 【双鉄】
# display as 雙鐵
# JP: 「終着駅に。\n――いつか、必ず」
2052 = "「Đến nhà ga cuối cùng. \n——Một ngày nào đó, nhất định.」"
