[script]
# lines: 422 
# monologue
# JP: 作業服姿の検査係さんが、聴診器のようなものを、\n移送されてきた\x%l台枠;#00ffc040;台枠%l;#;に当てていきます。
2726 = "穿著工作服的檢查員們拿著像聽診器一樣的東西，在運來的\\x%l台枠;#00ffc040;車架%l;#;上四處查探著。" 

# 【ハチロク】
# display as 八六
# JP: 「これで……たったこれだけで、\n目に見えない[かし,1]瑕疵の有無が、確認できるのですか？」
1709 = "「光靠這樣……就能找出肉眼看不到的瑕疵了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「とのことだ。非破壊検査――超音波[たんしょう,1]探傷というらしい」
2004 = "「是的。好像是被稱為超音波探傷的無損檢查方法」" 

# 【ハチロク】
# display as 八六
# JP: 「ちょうおんぱ？　でございますか？」
1888 = "「您剛才說“超音波”？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「人間の耳には聞こえぬほどに高い波長の――\n人の耳に聞こえる範囲を超えてしまった音波のことだ」
1858 = "「就是指頻率高到人耳感知不到——也就是超出人耳聽覺範圍的聲波」" 

# monologue
# JP: 言ってふと、双鉄様がわたくしのことをご覧になります。
2874 = "雙鐵少爺邊說，邊毫無徵兆地把視線轉到了我身上。" 

# monologue
# JP: やっと視線をあわせていただけ、嬉しくなって、\n言葉も弾んでしまいます。
2739 = "終於又和雙鐵少爺四目相對，我在開心之餘，語氣也變得輕快起來。" 

# 【ハチロク】
# display as 八六
# JP: 「……超音波は、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の耳にも聞こえないもののようですね」
1391 = "「\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的耳朵似乎也是聽不到超音波的呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――そうか」
2132 = "「這樣啊」" 

# monologue
# JP: 素っ気ないほどに短い答え。\n視線も逸れてしまいます。
2734 = "簡短到似乎是不假思索的回答。視線也隨之轉向了別處。" 

# monologue
# JP: どこか辛そうな横顔が、\nわたくしを不安定にします。
2372 = "他的側臉中似乎露出一絲不適，我不由得不安起來。" 

# 【ハチロク】
# display as 八六
# JP: （……わたくし、また、\n何か良くないことを言ってしまったのでしょうか？）
2920 = "（我是不是又說了什麼不該說的話？）" 

# monologue
# JP: あの日、からです。\nあの日――双鉄様が、お倒れになってしまわれた日。
2569 = "從那天雙鐵少爺暈倒的那天開始，就一直是這樣。" 

# monologue
# JP: わたくしがガスランプで\x%l台枠;#00ffc040;台枠%l;#;を炙り、\n油に封じられていた……誰かの髪を、焼き溶かした日。
2852 = "那天，我用噴燈灼燒\\x%l台枠;#00ffc040;車架%l;#;，火焰融掉了封在油層中的不知是誰的頭髮。" 

# 【ハチロク】
# display as 八六
# JP: （あの日から……双鉄様は、少し、変わってしまわれた。\n少しだけ――なにかが、離れてしまったようで……）
2919 = "（從那天開始，雙鐵少爺就變得有些不太一樣了。我們之間也似乎變得不是那麼親密無間……）" 

# monologue
# JP: もちろん、多少は離れても、\n\x%l機関士;#00ffc040;機関士%l;#;と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;です。
2701 = "當然，即便如此，\\x%l機関士;#00ffc040;司機%l;#;與\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的關係也並不會改變。" 

# monologue
# JP: ましてや今は、\x%l8620;#00ffc040;8620%l;#;の\x%l台枠;#00ffc040;台枠%l;#;交換のため\n数多の確認・指示が飛び交う、まっただなかです。
2651 = "更何況目前，正是為更換\\x%l8620;#00ffc040;８６２０%l;#;的\\x%l台枠;#00ffc040;車架%l;#;而要進行大量確認、發出大量指示的當口。" 

# 【ハチロク】
# display as 八六
# JP: 「この検査で問題が出なければ、\nいよいよ――\x%l台枠;#00ffc040;台枠%l;#;の交換となりますね」
2133 = "「這項檢查順利完成以後，就終於要開始更換\\x%l台枠;#00ffc040;車架%l;#;了啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。本当にいよいよだ。\n新\x%l台枠;#00ffc040;台枠%l;#;に組み込む部品については――」
2001 = "「是啊，真是好事多磨。關於需要裝到新\\x%l台枠;#00ffc040;車架%l;#;上的零件——」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、選別を終えております」
2095 = "「請您放心，分選工作已經完成」" 

# monologue
# JP: 話しかければ、こうして答えていただけます。
2497 = "只要我主動搭話，還是能得到與平常一樣的回應。" 

# 【ハチロク】
# display as 八六
# JP: 「ポーレット様たちや、[ぎこう,1]技工の皆様方にもご確認いただき、\n以降は、手順確認をし、組み付けて試験という流れです」
2026 = "「波萊特小姐她們和技工們也都已經確認過。之後就是確認步驟，進行組裝以及測試的流程了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ご苦労だったな」
2114 = "「辛苦你們了」" 

# 【ハチロク】
# display as 八六
# JP: 「いえ、当然のことをしたまでですので」
1765 = "「哪裡，我只是做了分內的事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
1393 = "「——唔」" 

# monologue
# JP: 普段通りに接して言葉をかわして――けれども、今も。\n双鉄様の瞳が腕が動きかけ、そこで止まってしまいます。
2545 = "對話內容與以往並無二致。然而就像剛才那樣，雙鐵少爺的目光與手只是略微動了一下，便停了下來，再無進一步動作。" 

# monologue
# JP: 少し前までの双鉄様なら、「そんなことはない」と、\nきっとおっしゃり――頭を撫ぜてくださったでしょうに。
2637 = "換做是幾天之前的雙鐵少爺，他會邊說“哪有的事”，邊撫摸我的頭。" 

# 【ハチロク】
# display as 八六
# JP: （前と変わらず近くにいるのに、\n前ほど近く感じられない）
2931 = "（雖然一樣是近在眼前，但心裡的感覺卻不一樣了）" 

# monologue
# JP: 怖くなります。ちりちりします。\n変わってしまった……だけのことなら、まだ良いのです。
2593 = "恐懼與不安揮之不去。若只是有所改變，倒也還罷了。" 

# monologue
# JP: けれども、もしも。\n何かが――失われてしまったのなら。
2499 = "可是，如果雙鐵少爺是失去了什麼東西……" 

# 【ハチロク】
# display as 八六
# JP: （あのとき……\nやはり、双鉄様は――事故のことを……）
2930 = "（那時，雙鐵少爺應該是想起了……）" 

# monologue
# JP: 思い出されたのかもしれません。いえ――\nお忘れになったことなど、[ひととき,1]一時たりとも無いでしょう。
2700 = "當年那起事故的情景吧。不，應該說，他片刻也未曾忘記過。" 

# monologue
# JP: 双鉄様は強いお心で、それでも過去にフタをして。\nあのガスランプが――きっとそのフタを焼ききったのです。
2870 = "雙鐵少爺的內心相當堅強，卻仍將過去掩藏了起來。而那天我手中的噴燈，想必是燒掉了那層遮蓋的帷幔。" 

# 【ハチロク】
# display as 八六
# JP: （もしも、そうなら……\n双鉄様は、わたくしを――）
2927 = "（若真是這樣的話，雙鐵少爺，究竟會對我……）" 

# 【双鉄】
# display as 雙鐵
# JP: 「終わったようだぞ」
1831 = "「好像結束了哦」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ――」
1773 = "「啊……」" 

# monologue
# JP: 双鉄様のお声に顔を持ち上げ直せば、\n検査係さんが、\x%l台枠;#00ffc040;台枠%l;#;から離れたところです。
2872 = "雙鐵少爺的聲音把我拉回了現實。抬起頭來，看到檢查員們已經離開了\\x%l台枠;#00ffc040;車架%l;#;周圍。" 

# monologue
# JP: 聴診器のような部品の根元のモニタの表示を、\n技工さん――日ノ本車輌の淵様に見せてらっしゃいます。
2370 = "他們正在把連在形似聽診器的工具末端的顯示器拿給技工——也就是日本車輛製造的淵先生看。" 

# 【技工】
# display as 技工
# JP: 「お待たせしました。右田さん。ハチロクさん」
2096 = "「讓二位久等了，右田先生，八六小姐」" 

# monologue
# JP: 足取りが随分と軽やかです。\nお顔も、見るからにホっとされています。
2373 = "他的步調相當輕快。而安心感，更是直接寫在了臉上。" 

# 【技工】
# display as 技工
# JP: 「旧\x%l帝鉄;#00ffc040;帝鉄%l;#;[ゴーハチロクニイサン,4]58623号[だいわく,1]台枠。移送時損傷、全く無しです。\nこれで、安心してお引き渡しできます」
1720 = "「前\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;５８６２３號車架，經檢驗，在移送過程中完全未發生損傷。總算可以安心交給你們了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。\n検査のご手配までいただいて――」
2136 = "「連檢查都勞您代勞，實在是萬分感謝」" 

# 【技工】
# display as 技工
# JP: 「いえ。これもこちらの都合です。\n\x%l台枠;#00ffc040;台枠%l;#;だけでも、再び走ってもらいたい一心ですよ」
1850 = "「客氣了，都是我們主動要求的。哪怕只有\\x%l台枠;#00ffc040;車架%l;#;，只要能在鐵軌上再次馳騁，也算是了了我們的一樁心願」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1806 = "「嗯」" 

# monologue
# JP: ――かすかに、双鉄様の笑顔が硬くなります。
2871 = "雙鐵少爺的笑容，似乎變得有一絲僵硬。" 

# monologue
# JP: 緊張をして引き締まる……そういう類の硬さではなく、\n感情をまるで、引き算したようなものに見えます。
2476 = "卻並非是因緊張而繃住那樣的僵硬，反倒像是遺失了所有的感情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「最善を尽くします。\n引き継いで――さらに先へと、繋げられるよう」
1919 = "「我們一定全力以赴。繼承好這輛車——並把它帶向未來」" 

# 【技工】
# display as 技工
# JP: 「こはるの想いを。\nどうぞ、よろしくお願いいたします」
1855 = "「小春的夙願，就拜託您二位了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1835 = "「好的」" 

# monologue
# JP: またです。
2478 = "又是這樣。" 

# monologue
# JP: 笑顔のままで、けれどさきほどよりもっと――\nあたたかみと柔らかさとが、薄れたようで。
2777 = "臉上雖然仍掛著笑容，然而與剛才相比，其中的柔情與暖意，似乎都已難尋蹤跡。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん。\n手が空いたら、少し時間いいですか？」
2163 = "「雙鐵君，手頭有空的話，可以借一步說話嗎？」" 

# monologue
# JP: 入り口の方からポーレット様の声。\n聞いてほうっと、双鉄様の顔に温度が戻ります。
2415 = "入口方向傳來波萊特小姐的聲音。而雙鐵少爺聽後，笑容中也恢復了幾分放鬆與溫度。" 

# monologue
# JP: ああ――双鉄様、いつの間に、\n青ざめてまでいらしたのでしょう。
2505 = "啊——雙鐵少爺的臉色，究竟是何時變得如此蒼白的？" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。\n――すみませんが、淵さん」
1784 = "「啊，嗯。不好意思，淵先生」" 

# 【技工】
# display as 技工
# JP: 「自分でしたら大丈夫です。行ってらしてください」
1649 = "「不必在意我，您有事就先去忙吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます。\nハチロク、しばらく任せた」
2178 = "「非常感謝。八六，這邊你先盯一下吧」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、ご安心ください、双鉄様」
1839 = "「好的，您就放心吧，雙鐵少爺」" 

# monologue
# JP: わたくしの声に振り向きもせず、\n足早に、双鉄様はポーレット様の方へと向かわれます。
2515 = "在我回答他時，雙鐵少爺也並沒有轉過頭來，而是直接快步走向了波萊特小姐。" 

# monologue
# JP: “逃げ出すように”――と、そんな言葉が、\n頭をよぎってしまいます。
1377 = "“就像是逃走一樣”——這樣一句話，不禁浮現在我的腦海裡。" 

# 【技工】
# display as 技工
# JP: 「……いかんなぁ。押し付けすぎて、\nプレッシャーを与えちゃったかな」
1417 = "「……不行啊。我是不是催得太緊，讓他有壓力了呀」" 

# monologue
# JP: ぼりぼり、頭をかかれます。\n清潔な感じは受けません。
2376 = "他邊說邊喀哧喀哧地抓起了頭，給人一種邋遢的感覺。" 

# monologue
# JP: 少し離れたくなりますが――\n言われたことに、興味を覚えて我慢します。
2867 = "雖然想跟他保持距離，但他的話又讓我覺得頗有興趣，便忍下了這衝動。" 

# 【ハチロク】
# display as 八六
# JP: 「押し付けすぎ――でございますか？」
1688 = "「催得太緊……了嗎？」" 

# 【技工】
# display as 技工
# JP: 「ウチの子のことを、ついつい……ね」
1647 = "「一提到我們家那孩子，就忍不住……你懂吧」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ」
# 1773 = "「啊……」" 

# monologue
# JP: その顔と、その声と。\nただ、それだけで伝わってきます。
2855 = "那表情，那聲音，早已將他心中所想表露無遺。" 

# 【ハチロク】
# display as 八六
# JP: 「妹を……大事にしていてくださったのですね。\nありがとうございます」
1891 = "「您很重視我的妹妹呀。實在是感激不盡」" 

# 【技工】
# display as 技工
# JP: 「いや――」
1763 = "「哪有……」" 

# monologue
# JP: 何かをいいかけ、\nけれども淵様は口を閉じます。
2679 = "淵先生張了張嘴，欲言又止。" 

# monologue
# JP: くしゃり、曲がった表情は、\n懐かしそうで淋しげで、けれどもどこか、嬉しげです。
2699 = "略顯怪異而扭曲的表情，摻雜著懷念與失落，又在不經意間透出一絲喜悅。" 

# 【技工】
# display as 技工
# JP: 「――キミにも、迷惑をかけてしまったかな。\n右田さん、どうも気を使ってくれてたみたいだし」
1903 = "「想必也給你添了麻煩吧。我看右田先生，最近似乎是在顧及我的感受」" 

# 【ハチロク】
# display as 八六
# JP: 「気、ですか？　双鉄様が？」
2173 = "「雙鐵少爺，在顧及您的感受？」" 

# 【技工】
# display as 技工
# JP: 「その話をしてからね、キミへの態度も、いくらか……\n距離を置いたような感じになったように思えて」
2064 = "「自從那次談過以後，對你的態度……感覺好像多了一些距離感」" 

# 【ハチロク】
# display as 八六
# JP: 「っ！」
2135 = "「這！」" 

# monologue
# JP: 顔に、出てしまったのでしょう。\n淵様は、「やはり」という感じに苦笑されます。
2878 = "難道是我的心思顯露在臉上了嗎？淵先生發出的苦笑就像是在說“果然是這樣”。" 

# 【技工】
# display as 技工
# JP: 「キミらの[なかむつ,1]仲睦まじい様子に、むしろ和んでいたのだが。\nかといって、こちらからどうこういうのも妙だしねぇ」
1715 = "「其實我看到你們兩個之前親密無間的樣子，反倒覺得非常溫馨。不過這種事我也不好插嘴」" 

# 【ハチロク】
# display as 八六
# JP: 「それは――双鉄様にそのお話をされたのは、\nいつ、のことでございましょうか」
2152 = "「那次——您和雙鐵少爺談是什麼時候的事呢」" 

# 【技工】
# display as 技工
