# monologue
# JP: さくさく雪駄の音を立て、ご住職が夜に溶けていく。
2383 = "伴著竹皮草屐的聲音，住持的身影融入了夜色中。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　『かすか』というのは」
2174 = "「雙鐵少爺，您說的“微”……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
1786 = "「啊，嗯」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「牛乳はおおまけに負けて三本で八十円。\n全部あわせて、千円でよか」
2034 = "「牛奶給你們打個折三瓶算八十，全部加在一起給一千得了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……すみません。お言葉に甘えます」
1774 = "「啊……不好意思，承蒙好意」" 

# monologue
# JP: 千円マイナス八十円の割ることのニは、\n入浴料だ。
2865 = "除掉那八十，剩下的是我們兩個的浴資。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「よかとよ。どうせ閉めるとこやし」
2019 = "「沒事。反正都快打烊了」" 

# monologue
# JP: ご主人の皺くちゃの指が、女湯ののれんを指さす。\nならばいつもと同様に、まとめて入れということだろう。
2750 = "老闆抬起滿是皺紋的手，指了指女浴室。看來和往常一樣，是讓我們一起去那邊的意思。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「さっぱりと流した方が良さそうな顔ば、しとるんけん」
2043 = "「瞧瞧你那面孔，是該好好沖一把了」" 

# monologue
# JP: それがお決まりであるかのように、\n背中あわせに、僕とハチロクは湯船に浸かる。
2613 = "我和八六如同有著心照不宣的默契一般，背靠背地坐進了浴池裡。" 

# monologue
# JP: すごく、ひさしぶりのような気がする。\nハチロクのちいさな背中は、とても温かで柔らかい。
2346 = "一時間，一股久違的感覺湧上心頭。八六那纖弱的後背，是那樣的溫暖而柔軟。" 

# 【ハチロク】
# display as 八六
# JP: 「なんだか……\nとても久しぶりのような気がいたします」
1911 = "「感覺……已經好久沒有這樣子了」" 

# monologue
# JP: 嬉しくなる。\nハチロクも、僕と同じことを感じてくれた。
2509 = "喜從中來。原來八六也是和我同樣的感覺。" 

# monologue
# JP: ならばと、尋ねてみたくなる。
2640 = "既然如此，我忍不住開口問道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の背中は、どんな感触がする？」
1945 = "「我的後背感覺怎樣？」" 

# 【ハチロク】
# display as 八六
# JP: 「大きいです。\n大きく、厚く、少し、硬くて――頼もしいです」
1879 = "「很寬闊。又寬闊，又厚實，有一點點硬——感覺很可靠」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 2132 = "「這樣啊」" 

# 【ハチロク】
# display as 八六
# JP: 「あら」
1778 = "「啊呀」" 

# monologue
# JP: 楽しげなくすくす笑いに、自覚する。
2765 = "聽到八六略帶調皮的笑聲，我才意識到。" 

# monologue
# JP: ハチロクの言葉を聞いて、体が勝手に力んでしまった。\n僕の背中は、今、随分と硬くなってる。
2768 = "聽著八六的話，我就下意識地繃緊了身體。我的後背，現在應該是硬得如鐵板一塊吧。" 

# 【ハチロク】
# display as 八六
# JP: 「それで、双鉄様――」
2157 = "「那，雙鐵少爺——」" 

# monologue
# JP: ちゃぷりと、水音。
2826 = "輕柔的水聲響起。" 

# monologue
# JP: ハチロクが湯を手ですくったのだろう。\nささやかな波が広がっていく。
2604 = "應該是八六在用手捧起浴池裡的水吧。點點波瀾隨之四下散開。" 

# 【ハチロク】
# display as 八六
# JP: 「『かすか』とは、何でございましょうか？」
1900 = "「您說的“微”，究竟是指什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。『かすか』とは――」
1802 = "「嗯。所謂“微”啊——」" 

# monologue
# JP: ハチロクが立てた波はどんどん小さく、遠くなる。
2428 = "八六激起的波瀾擴至遠處，漸漸平息。" 

# monologue
# JP: それこそ、『かすか』のように思えて、\n感じるままの言葉を繰り出す。
2723 = "眼前景象與腦海裡的“微”重疊在一處，我趁這感覺還未散去，開口說道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「触れれば、壊れてしまうようなもののことだ。\n故に触れることは出来ないが、それは確かにそこにある」
1857 = "「就是如果去伸手觸碰，便會被破壞的東西。雖然因此而不能觸碰，但它卻毫無疑問是存在的」" 

# 【ハチロク】
# display as 八六
# JP: 「それが――『かすか』」
2144 = "「那就是“微”啊」" 

# monologue
# JP: かすか。\n幽。
2581 = "微，幽。" 

# monologue
# JP: あるけれど、触れることの出来ぬもの。\n自分の言葉が、ハチロクの波が、イメージを固める。
2541 = "存在，卻無法觸碰之物。自己的話語，與八六的波瀾，使腦海裡的印象越來越清晰。" 

# 【双鉄】
# display as 雙鐵
# JP: 「意識でさえも触れられぬなら、縛っているのは無意識だ。\nお前が言った、深層心理というやつかもしれん」
2072 = "「若是連意識都無從觸及的話，那被它束縛自然也毫無自覺。或許那就是你所說的“深層心理”」" 

# 【ハチロク】
# display as 八六
# JP: 「触れることのできない、意識……？」
1909 = "「意識，無從觸及……？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だろうな。\nだからきっと、意識的には解きほぐせない」
1987 = "「是啊。所以恐怕，是沒有辦法刻意去解開的」" 

# monologue
# JP: そこまで思えば、自覚する。\n僕はやはり、そもそもからして、忘れたくなどないのだと。
2599 = "想到這裡，我才發現，自己其實從來都沒有想要忘掉一絲一毫。" 

# monologue
# JP: ……ずっと忘れずにいることが、\n例えば路子を、縛ってしまうことだとしても。
2762 = "而這未曾忘卻的存在，即便它將路子緊緊地束縛住……" 

# 【ハチロク】
# display as 八六
# JP: 「触れねば、解けぬものですか？」
1882 = "「必須去觸碰，才能將其解開嗎？」" 

# monologue
# JP: 今日のハチロクは、驚くほどにあどけない。
2421 = "八六今天真是天真得讓我驚訝。" 

# monologue
# JP: 普段であれば聞かれそうもない素朴なことを、\n次々、僕に問いかけてくる。
2784 = "若是平常，很難想像她會問這種單純的問題，今天卻像連珠炮一樣問個不停。" 

# 【ハチロク】
# display as 八六
# JP: 「触れぬままでも――自然と、ほどける。\nそんなことも、起こりえないのでございましょうか？」
1724 = "「即使不去觸碰，也會自然解開——難道就沒有這樣的可能嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どう、かな――」
2094 = "「誰……知道呢」" 

# monologue
# JP: そして、問いかけは僕の目線を向けさせる。
2755 = "而我也開始認真思考這一連串的問題。" 

# monologue
# JP: 普段であれば考えようとすることさえもない“当然”に\n光をあてて、形を確かめなおさせてくる。
2782 = "若在平常，這都是“理所當然”到根本不會去思考的事，如今卻暴露在陽光下，讓我再探究竟。" 

# 【双鉄】
# display as 雙鐵
# JP: 「何かの弾みで緩めば、ほどける……\nそんなことなら、あるかもしれんな」
2070 = "「若是有什麼契機能先加以紓解的話……說不定就會有解開的可能了」" 

# 【ハチロク】
# display as 八六
# JP: 「どのようにすれば――ゆるむのでしょうか？」
2154 = "「那要怎樣做，才能紓解呢？」" 

# monologue
# JP: （ぽちゃん）
2918 = "（嘩啦）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2182 = "「！」" 

# monologue
# JP: すわり心地がしっくり来ていないのだろうか？\nハチロクはわずかに尻を浮かせて、体の位置を整える。
2357 = "不知是不是覺得坐得不舒服了，八六輕輕地抬了抬臀部，調整了一下位置。" 

# monologue
# JP: 肌と肌とがこすれあうことのここちよさ――\nそれはそのまま、問いの答えだ。
2772 = "肌膚相親的觸感——這就是這問題的答案吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あたたかくなれば、やわらげば、緩む気がする。\n木の芽や、氷と同じように」
1948 = "「我覺得只要給予其溫暖，使其軟化，就能夠紓解吧。像樹木發芽、冰雪融化那樣」" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら――」
1973 = "「既然這樣——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どのようにすれば、あたたまるのかな」
2078 = "「要怎樣做，才能溫暖它呢」" 

# monologue
# JP: 僕がしばりつけてる『かすか』は、\n僕をしばりつけてる『かすか』は、事故への恐怖だ。
2616 = "我所束縛著的“微”，束縛著我的“微”，就是對事故的恐懼。" 

# monologue
# JP: ひとり遺されることへの恐れで、\nガチガチに強張りきっている。
2753 = "而對獨自被拋下的恐懼，又讓我時刻緊張到無以復加。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……あたためようと――\n懸命に何かしてしまうなら、逆効果な気が、僕はする」
1950 = "「我覺得，要是太刻意地給予溫暖，只會適得其反」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 1779 = "「啊！」" 

# monologue
# JP: ハチロクの背が硬くなる。\n恐らくは、そうしかけていたことに気づいて。
2431 = "八六的後背緊繃了起來。我意識到，她大概正打算這樣做。" 

# monologue
# JP: ならば……やっぱりそういうことだ。
2536 = "如此想來，果然是這麼回事吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「必要なのはきっと、『あたためられる』ことではなく、\n『あたたまる』ことだ」
1947 = "「我真正需要的，想必不是“被溫暖”，而是“溫暖起來”」" 

# monologue
# JP: じわじわ、自然に――\n『かすか』自体の、その内側から。
2347 = "一步步地，自然地——由內至外。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、時間をかけるしかないかと思う。\n少しずつ――できることから、重ねていくしか」
1962 = "「所以，我覺得應該只能多花些時間了。日積月累——從力所能及的事開始，一點點做起」" 

# 【ハチロク】
# display as 八六
# JP: 「……左様、ですね。きっと」
1424 = "「……我想，一定就是這樣吧」" 

# monologue
# JP: ハチロクが体の力を抜く。
2439 = "八六的身體又放鬆了下來。" 

# monologue
# JP: 途端、ひとつになれた気がする。\n僕にもたれかかる背中は、ぴたり、吸い付くようで。
2744 = "緊靠在一起的後背，如相互吸引一般緊密無間，彷彿此刻彼此已融為一體。" 

# 【ハチロク】
# display as 八六
# JP: 「まずは、[あの子,3]8620をまた走らせて」
1705 = "「先從讓[那孩子,3]８６２０再次行駛開始」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。そうして……」
1998 = "「是啊，然後……」" 

# monologue
# JP: 思い出す。\nどうして、忘れてしまっていたのか。
2511 = "回憶閃現。我怎麼會忘記了這麼重要的事情呢。" 

# monologue
# JP: 路子の、僕の願ったことなど、たったひとつだ。\nそれは全く変わっていない。
2825 = "路子託付於我的事情，不過只有一件而已，自始至終未曾改變。" 

# 【双鉄】
# display as 雙鐵
# JP: 「終着駅に。\n――いつか、必ず」
2052 = "「總有一日，我會抵達終點站」" 
