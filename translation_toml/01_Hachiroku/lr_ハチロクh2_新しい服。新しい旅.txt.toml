# JP: 「わらひっ！　もうっ――あうっ――限界、限界っ！\nっ――けど――いっしょ、いっしょに、ね、いっしょ」
1583 = "「Tôi... không chịu nổi nữa――ư...――giới hạn, chạm giới hạn rồi!\\nNhưng... cùng nhau, chúng ta cùng nhau... nhé, cùng nhau...」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、わかっている。僕も一緒だ」
1507 = "「Anh biết rồi. Anh cũng vậy, chúng ta sẽ cùng nhau」"

# monologue
# JP: 圧倒的な征服感が優越感が、\n僕の内部でぶくぶく膨れ、精へと交じる。
2029 = "Cảm giác chinh phục và ưu việt mãnh liệt dâng trào,\\nNó đang cuộn trào, sục sôi bên trong tôi, hòa quyện vào dòng tinh túy."

# 【双鉄】
# display as 雙鐵
# JP: 「だからな、すず」
1590 = "「Thế nên là, Suzu à」"

# monologue
# JP: （ばちゅっ！　じゅぶっ！　ばちゅっ！　じゅばっ！）
2207 = "（Bành bạch! Nhóp nhép! Bành bạch! Phầm phập!）"

# monologue
# JP: 肉と肉とのぶつかる音が単調に、徐々に小刻みになる。\n膣は締め付けながら震えて、痙攣に近いほどになる。
2060 = "Tiếng va chạm da thịt đơn điệu dồn dập, nhịp độ ngày một nhanh hơn.\\nThành âm đạo co thắt kịch liệt rồi run rẩy, run rẩy đến mức gần như co giật."

# 【ハチロク】
# display as 鈴
# JP: 「んふううううううっ！　んっ！　はあっ――らめっ、\nもううううっ！」
1495 = "「Ưm... ưm... hự...! Ưm! Ha...――không được, VN không chịu nổi nữa rồi...!」"

# 【双鉄】
# display as 雙鐵
# JP: 「安心して、いけ」
1338 = "「Cứ yên tâm, ra đi em」"

# monologue
# JP: （ぐりゅうううううううっ！！！！！）
2209 = "（Xoành xoạchhhhhh！！！！！）"

# 【ハチロク】
# display as 鈴
# JP: 「んひゅうううううううっっっっ！！！」
1496 = "「Ư... ưm... a... ha... aaa... hự...!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「くっ！！！」
1484 = "「Ư... !!!」"

# monologue
# JP: （びゅぶっ！　びゅるっ！　びゅうっ！　どびっ！！）
# 2179 = "（噴薄而出）" 

# 【ハチロク】
# display as 鈴
# JP: 「ふぁ！　あっ！　あっ！　あっ！！！」
1433 = "「Phạ! Á! Á! Á!!!」"

# monologue
# JP: すずの最奥――人間ならば子宮がきっとあるところ。\nそこをめがけて、僕の精液が送られていく。
2011 = "Nơi sâu thẳm nhất của Suzu―― nơi mà nếu là con người thì chắc chắn sẽ là tử cung.\\nNhắm thẳng vào đó, tinh dịch của tôi được bắn vào bên trong."

# 【ハチロク】
# display as 鈴
# JP: 「ふぁっ！　あっ！　あっ！　あうっ！　あっ！\nあついのっ！　たくさん、そうてつ、さまのっ！」
1432 = "「Phạ! Á! Á! A...! Á!\\nNóng quá...! Nhiều quá, của ngài Soutetsu...!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ――あっ――すず、すずっ！」
1418 = "「...―― Á―― Suzu, Suzu!」"

# monologue
# JP: "孕ませた”――そんなありえぬ錯覚が、\n吐き気に近い快感と共に脳を揺すぶる。\n1098 = "\"Khiến cô ấy mang thai\"―― một ảo giác không thể xảy ra như vậy,\\nđang làm rung chuyển đại não cùng với thứ khoái cảm cận kề sự buồn nôn."

# monologue
# JP: ありえぬことと理性は冷たい悲観に震え、\nけれど体は、その倒錯に一層喜び、ゆえに震える。
1837 = "Lý trí run rẩy trước sự bi quan lạnh lẽo rằng đó là điều không thể,\\nnhưng cơ thể lại càng hoan hỉ trước sự đảo lộn đó, và chính vì vậy mà run lên bần bật."

# monologue
# JP: （どぶっ――ドビュッ――どぶっ――びゅりゅっ）
2185 = "(Phụt―― Phụt... ực―― Phụt―― Ực... ực)"

# 【ハチロク】
# display as 鈴
# JP: 「ふぁ……ぁ――あ…………ふぁぁ……」
1425 = "「Phạ...... a―― a............ phạaa......」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん――くっ――ぁっ！」
1486 = "「Ưm―― Ư...―― A...!」"

# monologue
# JP: （ずりゅんっ）
2173 = "(Rút... uột)"

# monologue
# JP: 精液を吐き出しつくした性器が無様にすずの膣から抜ける。\n同時にぺたん、無造作に、すずがその上に腰掛けてくる。
1844 = "Cơ quan sinh dục đã xuất hết tinh dịch tuột ra khỏi âm đạo của Suzu một cách thảm hại.\\nCùng lúc đó, Suzu ngồi phịch xuống bên trên nó một cách tự nhiên."

# 【ハチロク】
# display as 鈴
# JP: 「ふぁ――あ……あ……ん――。\nふっ――うふっ――うふふふふっ」
1424 = "「Phạ―― a... a... ưm――.\\nHử...―― Ư hử...―― Ư hự hự hự...」"

# monologue
# JP: 脱力しきった、あどけない笑み。
2054 = "Một nụ cười ngây thơ, khi đã hoàn toàn kiệt sức."

# 【ハチロク】
# display as 鈴
# JP: 「このお洋服っ――んっ――このお洋服は――\nほんとうに、素敵――素敵なお洋服ですね」
1663 = "「Bộ quần áo này―― ưm―― bộ quần áo này――\\nthật sự, tuyệt vời―― là một bộ quần áo tuyệt vời nhỉ」"

# monologue
# JP: 整いきらぬ息でけれども、すずは微笑み言葉をつむぐ。
1834 = "Dù hơi thở vẫn chưa kịp ổn định, Suzu vẫn mỉm cười và cất lời."

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、素敵だ――」
1642 = "「Quả thực, tuyệt vời thật đấy――」"

# 【ハチロク】
# display as 鈴
# JP: 「ですよね、うふふっ」
1547 = "「Đúng không ạ, ư hự...」"

# monologue
# JP: 何か言おうとしていたことが、瞬時に吹き飛ぶ。\nすずが余りに妖艶で、なのにあどけなく笑うがゆえに。
1999 = "Những gì tôi định nói bỗng chốc bay biến sạch sẽ.\\nBởi lẽ Suzu trông quá đỗi kiều mị, nhưng lại cười một cách ngây thơ đến thế."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまとわたくしの、いつものおうちの中でさえ。\nわたくしたちを、新しい旅に連れ出してくれましたもの」
1627 = "「Dù là ngay trong ngôi nhà quen thuộc của Soutetsu-sama và em.\\nNó vẫn đưa chúng ta vào một cuộc hành trình mới」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1485 = "「Hửm――」"

# monologue
# JP: 確かにだ。いつもの部屋でいつものようにセックスをして。\nけれども今日は、新しい体験を――旅をした。
1882 = "Quả thực là như vậy. Vẫn làm tình như mọi khi, trong căn phòng quen thuộc.\\nThế nhưng hôm nay lại là một trải nghiệm mới――một chuyến hành trình mới."

# 【双鉄】
# display as 雙鐵
# JP: 「そう……だな。うん」
1339 = "「Đúng... vậy nhỉ. Ừm」"

# monologue
# JP: “孕ませた”――馬鹿げ、忌まわしく、幸せに満ちた錯覚。\nあの快感と自己嫌悪との、圧倒的な感情量。
1097 = "\"Làm cho mang thai\"――một ảo tưởng ngớ ngẩn, kiêng kị, nhưng lại tràn ngập hạnh phúc.\\nLượng cảm xúc áp đảo giữa khoái cảm đó và sự tự ghê tởm bản thân."

# 【双鉄】
# display as 雙鐵
# JP: 「僕はこの部屋で、新しい経験を、旅を得た。\nお前もそうであったのならば――」
1648 = "「Anh đã có được một trải nghiệm mới, một chuyến hành trình mới ngay trong căn phòng này.\\nNếu em cũng cảm thấy như vậy thì――」"

# 【ハチロク】
# display as 鈴
# JP: 「申しましたよ？　この服は、わたくしたちを、\n新しい旅に連れ出してくれたのだと」
1570 = "「Em đã nói rồi mà? Bộ trang phục này, đã đưa chúng ta,\\nđến với một cuộc hành trình mới」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだったな」
1504 = "「Ái chà. Đúng thế thật nhỉ」"

# monologue
# JP: 手をのばし、頭を撫でる。何度も。何度も。\nならば恐らく、あの瞬間に、すずも、何かを――
1943 = "Tôi đưa tay ra, xoa đầu em. Hết lần này đến lần khác. Hết lần này đến lần khác.\\nVậy thì có lẽ, vào khoảnh khắc đó, Suzu cũng đã cảm nhận được điều gì đó――"

# 【双鉄】
# display as 雙鐵
# JP: 「良い旅だったか？」
1672 = "「Đó có phải là một chuyến đi tuyệt vời không?」"

# 【ハチロク】
# display as 鈴
# JP: 「もちろんのことでございます」
1576 = "「Dạ tất nhiên rồi ạ」"

# monologue
# JP: 笑顔が、溶かす。僕のこころに巣食おうとした、\nなにか黒くて、愚かで忌まわしいものを。
1886 = "Nụ cười ấy như làm tan chảy... thứ gì đó đen tối, ngu ngốc và ghê tởm đang chực chờ làm tổ trong tâm trí tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば」
1665 = "「Ra vậy, nếu đã thế」"

# monologue
# JP: ”孕ませた”という愚かな錯覚。圧倒的な多幸感。\nその根源にあるのであろう”孕ませたい”という望み。
1096 = "Ảo tưởng ngu xuẩn rằng mình đã \"làm cô ấy mang thai\". Cảm giác hạnh phúc ngập tràn đến choáng ngợp.\\nVà cả khát khao \"muốn làm cô ấy mang thai\" có lẽ chính là cội nguồn của tất cả."

# 【双鉄】
# display as 雙鐵
# JP: 「僕と同じだ」
1671 = "「Cũng giống như tôi vậy」"

# 【ハチロク】
# display as 鈴
# JP: 「うふふっ、当然でございましょう？　だってふたりの。\n双鉄さまとわたくしの、旅なのですから」
1511 = "「Ư hừ, đó là điều hiển nhiên mà phải không ạ? Bởi vì đây là chuyến đi của hai ta.\\nChuyến hành trình của Soutetsu-sama và em mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「……」
# 1113 = "「……」" 

# monologue
# JP: 肯定される。全てを、すずに。\n決して叶わぬ愚かな願いも、全て、まるごと。
1794 = "Mọi thứ đều được chấp nhận. Tất cả, bởi Suzu.\\nNgay cả những nguyện ước ngu muẩn vĩnh viễn chẳng thể thành hiện thực, thảy đều được trọn vẹn ôm ấp."

# 【双鉄】
# display as 雙鐵
# JP: 「だな。当然だ。\n僕とお前と、一緒に重ねる旅なのだから」
1619 = "「Phải rồi. Hiển nhiên là vậy.\\nBởi đây là chuyến hành trình mà anh và em, chúng ta sẽ cùng nhau đắp bồi」"

# monologue
# JP: ただ単純に、それだけのこと。思えば気持ちが軽くなる。\n思わせてくれるすずの笑顔が、どこまでだって愛おしい。
1793 = "Chỉ đơn thuần có vậy mà thôi. Nghĩ được thế, lòng tôi chợt nhẹ nhõm hẳn đi.\\nNụ cười của Suzu, thứ mang lại cho tôi cảm xúc này, sao mà đáng yêu đến vô ngần."

# 【ハチロク】
# display as 鈴
# JP: 「はい。うふふっ。ですのでわたくし、このお洋服。\n昨日よりももっと気に入りました」
1606 = "「Vâng. Ư hừ. Chính vì vậy mà bộ quần áo này,\\nem lại càng thích nó hơn cả ngày hôm qua rồi ạ」"

# monologue
# JP: 愛らしすぎて、ほんの少しだけからかいたくなる。\nこころが、唇も軽くする。
1892 = "Vì cô ấy quá đỗi đáng yêu, khiến tôi chợt muốn trêu chọc một chút.\\nTâm trạng thoải mái kéo theo lời nói cũng bật ra thật dễ dàng."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、すず。そのデンでいくのなら――\n新しい服でセックスすればその度ごとに、僕らはきっと」
1682 = "「Vậy thì, Suzu. Nếu cứ theo đà đó thì――\\nMỗi lần ta làm chuyện ấy trong một bộ đồ mới, chúng ta chắc chắn sẽ...」"

# 【ハチロク】
# display as 鈴
# JP: 「まぁ、双鉄さまったら。けど――そうですね。ふふっ」
1447 = "「Kìa, Soutetsu-sama thật là. Nhưng mà―― đúng là vậy nhỉ. Hì hì」"

# monologue
# JP: すずの口元が小さく笑う。\n笑いよりもっと小さく小さく、その舌先がぺろりと動く。
2111 = "Khóe miệng Suzu khẽ mỉm cười.\\nNhỏ bé hơn cả nụ cười ấy, đầu lưỡi cô ấy khẽ liếm qua bờ môi."

# 【ハチロク】
# display as 鈴
# JP: 「次にはどんなお洋服で、どんな新しい旅をしたいと。\nね？　双鉄さま。今、お考えになられてますか？」
1593 = "「Lần tới sẽ là bộ quần áo nào, và chuyến hành trình mới nào đang chờ đón.\\nNè? Soutetsu-sama. Hiện tại, anh có đang suy nghĩ về điều đó không ạ?」"
