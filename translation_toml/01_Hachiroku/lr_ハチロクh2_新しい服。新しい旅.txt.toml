[script]
# lines: 339 
# 【ハチロク】
# display as 鈴
# JP: 「大変たのしうございましたね」
1614 = "「Thật sự rất vui ngài nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな、ほんの少しだけ疲れはしたが――\n疲れの何倍、何十倍も充実していた」
1620 = "「Ừ, tuy có hơi mệt một chút nhưng——\nsự trọn vẹn này còn lớn hơn gấp nhiều, gấp chục lần sự mệt mỏi đó.」"
# monologue
# JP: 旅そのものも楽しかったが、すずが良かった。\n普段は見れぬ表情も、おめかしも存分に堪能できた。
2005 = "Bản thân chuyến du lịch cũng rất vui, nhưng Suzu mới là điều tuyệt vời nhất.\nTôi đã được tận hưởng trọn vẹn những biểu cảm hiếm thấy và cả bộ dạng ăn diện của em ấy."
# 【ハチロク】
# display as 鈴
# JP: 「お布団、敷けておりますよ？」
1701 = "「Chăn đệm, đã trải xong rồi ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは助かる。ありがとう」
1654 = "「Vậy thì tốt quá. Cảm ơn em.」"
# 【ハチロク】
# display as 鈴
# JP: 「妻として当然のつとめです」
1612 = "「Đó là bổn phận đương nhiên của một người vợ ạ.」"
# monologue
# JP: 促されるまま、着替えもせずに横になる。\nとたん、シーツを汚してしまわないかと心配になる。
1950 = "Theo lời giục giã, tôi nằm xuống mà không hề thay đồ.\nNgay lập tức, tôi lại lo lắng không biết có làm bẩn ga trải giường hay không."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまご自身がお感じになられておりますより、\nもう少しだけ、深くお疲れのように思えます」
1341 = "「Có vẻ như ngài Soutetsu đang mệt mỏi sâu sắc hơn một chút\nso với những gì ngài tự cảm nhận đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……かもしれんな」
1117 = "「……Có lẽ vậy.」"
# monologue
# JP: けれどもすずは気にもせず、ただ穏やかに僕を見つめる。\n今は休んでくださいましと、声なき声が伝わってくる。
1817 = "Nhưng Suzu không bận tâm, chỉ dịu dàng nhìn tôi.\nMột giọng nói vô thanh truyền đến, như muốn bảo tôi bây giờ hãy nghỉ ngơi đi."
# 【ハチロク】
# display as 鈴
# JP: 「汗だけ流してまいりましたら、ご飯の支度をいたします。\nそれまでの間、少しだけでも」
1331 = "「Để em đi tắm gội qua cho hết mồ hôi rồi sẽ chuẩn bị bữa cơm.\nTrong lúc đó, xin ngài hãy nghỉ ngơi dù chỉ một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1322 = "「Không.」"
# monologue
# JP: 横たわったまま見上げれば、すずの体の曲線も、\n決して完全な平板ではないと、ごく控えめに主張してくる。
2094 = "Vẫn nằm đó ngước nhìn lên, đường cong trên cơ thể Suzu,\nnhư đang ngầm khẳng định một cách khiêm tốn rằng nó tuyệt đối không hề phẳng lì."
# 【ハチロク】
# display as 鈴
# JP: 「え？」
1450 = "「Dạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「汗を流すというのなら――」
1531 = "「Nếu muốn tắm gội cho hết mồ hôi thì——」"
# monologue
# JP: そこに気づけば、可憐が途端、色香に変わる。\n普段と違うおめかしを、いつもの布団に引き込みたくなる。
1798 = "Khi nhận ra điều đó, sự đáng yêu bỗng chốc biến thành sự quyến rũ.\nTôi bỗng muốn kéo em ấy với bộ dạng ăn diện khác hẳn ngày thường vào chiếc nệm quen thuộc."
# 【双鉄】
# display as 雙鐵
# JP: 「いますぐにここで――僕の上で流せばいい」
1669 = "「Ngay bây giờ ở đây——tắm trên người anh là được.」"
# 【ハチロク】
# display as 鈴
# JP: 「ぁ」
1467 = "「A.」"
# monologue
# JP: 手首を掴む。戸惑いではない、甘やかな声。\nすずには無いはずの体臭か、けれども僕の芯まで届く。
1958 = "Tôi nắm lấy cổ tay em ấy. Không phải là sự bối rối, mà là một giọng nói ngọt ngào.\nLà mùi cơ thể lẽ ra không tồn tại ở Suzu, nhưng lại chạm đến tận sâu trong tâm trí tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「おいで、すず」
1683 = "「Lại đây, Suzu.」"
# 【ハチロク】
# display as 鈴
# JP: 「んっ」
1491 = "「Ưm.」"
# monologue
# JP: (とさっ）
41 = "(Phịch)"
# monologue
# JP: 抵抗もない――どころか自ら、嬉しげに倒れ込んでくる。\n重なる熱がこころをもまた重ねてくれていると感じる。
1884 = "Không hề kháng cự——thậm chí em ấy còn chủ động ngã vào người tôi một cách vui sướng.\nHơi nóng hòa quyện khiến tôi cảm thấy hai trái tim cũng đang đồng điệu."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄、さま――旦那様」
1698 = "「Ngài Soutetsu——phu quân.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1491 = "「嗯」" 
# monologue
# JP: 重なったまま、すずがもぞもぞと身を捩る。\n柔らかな肌に、僕の形を幾度も幾度も食い込ませていく。
2102 = "Trong khi vẫn đè lên nhau, Suzu cựa quậy uốn éo cơ thể.\nLàn da mềm mại của em ấy cọ xát vào hình dáng của tôi hết lần này đến lần khác."
# 【ハチロク】
# display as 鈴
# JP: 「その……あの。おまたが、大きく――\n固くなっていらっしゃるようなのですが」
1652 = "「Cái đó…… ừm. Vùng kín của ngài, có vẻ như——\nđang trở nên to và cứng thì phải.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕は勃起している」
1539 = "「Ừ, anh đang cương cứng.」"
# 【ハチロク】
# display as 鈴
# JP: 「！」
1454 = "「!」"
# monologue
# JP: 数え切れぬほど交わりあって、なおもその頬は朱に染まる。\n可愛らしさが、こころを、言葉をなめらかにする。
1835 = "Đã ân ái không biết bao nhiêu lần, vậy mà đôi má ấy vẫn ửng đỏ.\nSự đáng yêu ấy khiến trái tim, khiến những lời nói trở nên trôi chảy."
# 【双鉄】
# display as 雙鐵
# JP: 「痛くなるほどに勃起しているが、\nこれは決して、疲れマラなどという代物では無い」
1354 = "「Cương cứng đến mức phát đau,\nnhưng đây tuyệt đối không phải là loại cương cứng do mệt mỏi đâu.」"
# 【ハチロク】
# display as 鈴
# JP: 「つかれ……なんと申されたのですか？」
1632 = "「Cương cứng…… do gì cơ ạ?」"
# monologue
# JP: だから穢して――下賤な言葉で照れさせたくなる。\nどれほど泥に塗れようとも、白く咲く花を愛でたいがゆえ。
1972 = "Vì thế tôi muốn vấy bẩn——muốn dùng những từ ngữ thô tục để làm em ấy xấu hổ.\nBởi vì dù có nhuốm bùn nhơ đến đâu, tôi vẫn muốn yêu thương bông hoa nở trắng ngần ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「疲れマラ。極度の肉体疲労が勃起を強要することがある。\nその現象を、俗に疲れマラと称するのだ」
1635 = "「Cương cứng do mệt mỏi. Đôi khi sự mệt mỏi tột độ của cơ thể lại cưỡng ép sự cương cứng.\nHiện tượng đó, người ta thường gọi là cương cứng do mệt mỏi.」"
# 【ハチロク】
# display as 鈴
# JP: 「まぁ、それでは……」
1444 = "「Trời, nếu vậy thì……」"
# monologue
# JP: すずの頭が小さく動く。\n眼差しが、吐息が熱っぽく勃起をくすぐってくる。
2107 = "Đầu Suzu khẽ chuyển động.\nÁnh mắt, hơi thở nóng rực đang trêu chọc sự cương cứng của tôi."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまは、今のおまたのこの状態を――\n別の言葉で、お示しになっておられるのですね？」
1592 = "「Ngài Soutetsu, trạng thái vùng kín của ngài lúc này——\nNgài đang dùng từ khác để ám chỉ nó đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そのとおりだ」
1505 = "「Ừm. Đúng là vậy.」"
# 【ハチロク】
# display as 鈴
# JP: 「……」
1113 = "「……」"
# monologue
# JP: 理解を得ての喜びだろうか、それとも性的興奮だろうか？\nすずは熱っぽい息を吐く。
1807 = "Là niềm vui khi thấu hiểu, hay là sự hưng phấn tình dục?\nSuzu thở ra một hơi nóng hổi."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまは、おまたをこれほど固く、熱く、\n強張らせていらっしゃいますのに――」
1602 = "「Mặc dù vùng kín của ngài Soutetsu đang cứng, nóng,\nvà căng tràn đến nhường này——」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1454 = "「唔！」" 
# monologue
# JP: つつ――と。すずの真白い指が僕の勃起の形をなぞる。\nなぞった流れでジッパーを、じりじり緩く引き下げていく。
2106 = "Chạm——. Ngón tay trắng muốt của Suzu miết dọc theo hình dáng sự cương cứng của tôi.\nTheo đà miết đó, em ấy từ từ, chầm chậm kéo khóa quần xuống."
# 【ハチロク】
# display as 鈴
# JP: 「疲れによってではないとおっしゃる。でしたら、ね？\nどうか旦那様、わたくしに教えてくださいまし」
1598 = "「Ngài nói rằng không phải do mệt mỏi. Nếu vậy thì, nhé?\nXin phu quân, hãy cho thiếp biết đi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅっ――」
1451 = "「Ư——」"
# monologue
# JP: 勃起が、外へと導きだされる。\nすずの綺麗な顔と、無骨な勃起が等しく並ぶ。
2031 = "Sự cương cứng, được dẫn dắt ra bên ngoài.\nKhuôn mặt xinh đẹp của Suzu, và sự cương cứng thô kệch xếp ngang hàng nhau."
# 【ハチロク】
# display as 鈴
# JP: 「なにが、いったい双鉄さまを、\nこれほどに昂ぶらせたのでございましょう――？」
1645 = "「Rốt cuộc là điều gì, đã khiến ngài Soutetsu,\nnhưng phấn đến nhường này——?」"
# monologue
# JP: ひそやかな声。ふーっ、と。僕をくすぐる吐息。\nただそれだけで、僕は容易く濡らされる。
1905 = "Giọng nói thầm thì. Phù——. Hơi thở mơn trớn tôi.\nChỉ bấy nhiêu thôi, cũng đủ làm tôi dễ dàng ướt át."
# 【双鉄】
# display as 雙鐵
# JP: 「お前がだ、すず。ここから見上げたお前の体が。\nお前の熱が、あるはずもない体臭が――」
1361 = "「Là em đấy, Suzu. Cơ thể em khi anh ngước nhìn từ đây.\nSức nóng của em, và cả mùi cơ thể lẽ ra không tồn tại——」"
# monologue
# JP: 手を伸ばし、すずを捕まえ思い切り勃起に押し付けたい。\nその欲望を、より強い快感を期待するゆえじいっと堪える。
1953 = "Tôi muốn vươn tay ra, bắt lấy Suzu và ấn mạnh vào sự cương cứng.\nTôi cố gắng kìm nén ham muốn đó, vì mong đợi một khoái cảm mãnh liệt hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「――僕を焦かせて乾かして。お前が欲しいと抱きたいと。\nここまで熱く、昂ぶらせたのだ」
1120 = "「——Làm anh cháy bỏng, làm anh khao khát. Rằng anh muốn em, muốn ôm lấy em.\nĐã khiến anh nóng bỏng và hưng phấn đến nhường này.」"
# 【ハチロク】
# display as 鈴
# JP: 「見上げた体が……でございますか？」
1551 = "「Cơ thể khi ngước nhìn…… sao ạ?」"
# monologue
# JP: どこかきょとんとしたような、それでいながら嬉しげな声。
1898 = "Một giọng nói có chút ngơ ngác, nhưng lại pha lẫn sự vui sướng."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまに昂ぶっていただけますような……\nそれほどの魅力、見た目には無いものかと存じますが」
1400 = "「Để có thể khiến ngài Soutetsu hưng phấn như vậy……\nEm nghĩ vẻ ngoài của em không có sức hấp dẫn đến thế đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「見た目には、か」
1534 = "「Vẻ ngoài sao.」"
# monologue
# JP: その言葉にさえ、勃起が震える。\n羞恥と自負と謙遜と、幾つもの重なり合う気持ちを感じて。
1912 = "Chỉ với câu nói đó thôi, sự cương cứng cũng rung lên.\nTôi cảm nhận được sự đan xen của nhiều cảm xúc: xấu hổ, tự hào và khiêm tốn."
# 【双鉄】
# display as 雙鐵
# JP: 「もちろん僕は、お前の体が――\n見た目以上に僕を蕩かすものだと深く、知っている」
1624 = "「Tất nhiên anh biết rất rõ, cơ thể của em——\nCòn làm anh tan chảy hơn cả vẻ bề ngoài của nó.」"
# 【ハチロク】
# display as 鈴
# JP: 「はうっ」
1472 = "「Hau.」"
# monologue
# JP: 勃起に触れる声音は息は、\n降り注がれる油となって、僕の欲望を激しく焦がす。
2035 = "Giọng nói, hơi thở chạm vào sự cương cứng,\nnhư dầu đổ thêm vào lửa, thiêu đốt ham muốn của tôi một cách dữ dội."
# 【双鉄】
# display as 雙鐵
# JP: 「だが、見た目にだって、いつも僕は、\n蕩かされ魅了されているよ」
1623 = "「Nhưng mà, ngay cả vẻ bề ngoài, anh vẫn luôn,\nbị tan chảy và mê hoặc đấy.」"
# monologue
# JP: 触れたい。撫でたい。押し付けたい。\nが、その欲望の何倍も、すずからして欲しい欲が上回る。
1956 = "Muốn chạm vào. Muốn vuốt ve. Muốn ấn vào.\nNhưng ham muốn muốn Suzu chủ động làm cho tôi còn lớn hơn gấp nhiều lần."
# 【双鉄】
# display as 雙鐵
# JP: 「お前という魂の、僕がもっとも愛するものの、\nその内面に調和した、これほど美しい器なのだから」
1513 = "「Linh hồn của em, thứ mà anh yêu thương nhất,\nđây là một vỏ bọc vô cùng xinh đẹp, hoàn toàn hài hòa với nội tâm đó.」"
# 【ハチロク】
# display as 鈴
# JP: 「……」
# 1113 = "「……」" 
# monologue
# JP: 声ではなく息。甘やかな。思わずもらしてしまったものか、\nあるいは平静を装うために、隠そうとしたものであろうか。
2108 = "Không phải giọng nói mà là hơi thở. Ngọt ngào. Là vô tình thốt ra,\nhay là đang cố che giấu để tỏ ra bình tĩnh đây."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の目には、な。\n描き出されるごくごく微細な陰影さえも」
1516 = "「Trong mắt anh thì là vậy.\nNgay cả những bóng đen vô cùng nhỏ bé được vẽ ra.」"
# 【ハチロク】
# display as 鈴
# JP: 「『ごくごく微細』……で、ございますか」
1110 = "「『Vô cùng nhỏ bé』…… sao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！！？」
1502 = "「!!?」"
# monologue
# JP: （きゅむっ！）
2195 = "（Bóp chặt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！？」
1459 = "「!!!?」"
# monologue
# JP: 待ち焦がれていた強い刺激が、\n全く予想もしていなかった形で僕を包み込む。
2127 = "Sự kích thích mạnh mẽ mà tôi mòn mỏi chờ đợi,\nlại bao bọc lấy tôi theo một cách hoàn toàn không ngờ tới."
# 【ハチロク】
# display as 鈴
# JP: 「ごくごく微細な陰影に『さえ』、\nこれほどに大きく固くされるのですから」
1529 = "「『Ngay cả』 những bóng đen vô cùng nhỏ bé,\ncũng có thể làm cho nó to và cứng đến nhường này cơ mà.」"
# monologue
# JP: すずの指先が強気に動き、僕の醜い勃起を包む。\n包む――というか、――これは――かな、り、――っ。
2103 = "Đầu ngón tay Suzu mạnh bạo di chuyển, bao trọn lấy sự cương cứng xấu xí của tôi.\nBao trọn——hay đúng hơn là, ——cái này——khá, là, ——ư."
# 【双鉄】
# display as 雙鐵
# JP: 「す、ずっ――強い。少し、痛いぞ」
1674 = "「Su, zu——Mạnh quá. Hơi, đau đấy.」"
# 【ハチロク】
# display as 鈴
# JP: 「痛くしているのでございます」
1611 = "「Em cố tình làm đau đấy ạ.」"
# monologue
# JP: ぺろりと、すずの舌先が動く。\n獲物を狙っているかのように、僕を妖しく誘うように。
2089 = "Đầu lưỡi Suzu thè ra liếm mép.\nNhư thể đang nhắm vào con mồi, như thể đang quyến rũ tôi một cách đầy ma mị."
# 【ハチロク】
# display as 鈴
# JP: 「陰影を産む凹凸すらない、人であるなら未成熟だろう\nこの体に、かくも熱くお昂りになられる」
1337 = "「Thậm chí không có những đường cong tạo ra bóng tối, nếu là con người thì chắc là chưa trưởng thành,\nthế mà ngài lại hưng phấn cuồng nhiệt vì cơ thể này đến vậy.」"
# monologue
# JP: ふーーーーっと、今度は意図的な息。\n情欲の火を煽らんとする、甘くて蠱惑的な息。
2056 = "Phù——, lần này là một hơi thở có chủ ý.\nMột hơi thở ngọt ngào và đầy mê hoặc, nhằm thổi bùng ngọn lửa tình dục."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまの、とてもいけないおちんちんに、\nお仕置きをして差し上げるため、わずかに、痛く」
1403 = "「Vì dương vật của ngài Soutetsu rất là hư hỏng,\nnên để trừng phạt, em sẽ làm cho nó hơi đau một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、すず、それは誤解だ」
1327 = "「Không, Suzu, em hiểu lầm rồi.」"
# monologue
# JP: このままお仕置きして欲しい――強く望みもするけれど、\n誤解を抱えられたまま、すずとの愛を交わしたく無い。
1836 = "（Mặc dù tôi cũng rất muốn cứ thế này mà trừng phạt em ấy——\nnhưng tôi không muốn ân ái với Suzu trong khi em ấy vẫn còn hiểu lầm.）"
# 【双鉄】
# display as 雙鐵
# JP: 「陰影が控えめだから、お前に興奮しているのではない。\n仮に。逆に、陰影がどれほどに豊かなものであろうと」
1554 = "「Tôi không phải vì cơ thể em ít đường cong mà nảy sinh ham muốn. Giả sử. Cho dù cơ thể em có đường cong gợi cảm đến mức nào đi chăng nữa」"
# 【ハチロク】
# display as 鈴
# JP: 「あ」
# 1467 = "「啊」" 
# monologue
# JP: 触れる代わりに、その目を見つめる。\n眼差しで、すずの瞳を愛撫する。
1961 = "Thay vì chạm vào, tôi nhìn thẳng vào mắt em.\nDùng ánh mắt âu yếm ve vuốt đôi mắt ướt át của Suzu."
# 【双鉄】
# display as 雙鐵
# JP: 「あるいはお前の外観が、その美しさを欠こうとも。\nそれがお前の器であるなら――僕は、等しく興奮しよう」
1364 = "「Hay cho dù vẻ ngoài của em có khiếm khuyết đi chăng nữa.\nChỉ cần đó là cơ thể chứa đựng linh hồn em——thì tôi vẫn sẽ hưng phấn như vậy thôi」"
# 【ハチロク】
# display as 鈴
# JP: 「双鉄、さま」
1699 = "「Ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、お前という存在そのものを愛しているのだ。\nより深くまで近づきたくて――お前に欲情しているのだ」
1579 = "「Thứ tôi yêu chính là bản thân sự tồn tại của em.\nVì muốn được đến gần em hơn nữa——nên tôi mới khao khát em」"
# 【ハチロク】
# display as 鈴
# JP: 「わたくしも、です――\n双鉄さま、だんなさま」
1556 = "「Em cũng vậy——\nNgài Soutetsu, phu quân của em」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1454 = "「唔！」" 
# monologue
# JP: 指の握りが、ふうわり緩む。\n開放された勃起に向けて、眼差しも優しく注がれる。
1896 = "Lực nắm của những ngón tay khẽ nới lỏng.\nÁnh mắt dịu dàng cũng đổ dồn vào sự cương cứng vừa được giải phóng."
# 【ハチロク】
# display as 鈴
# JP: 「ぁー……」
1460 = "「A——」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1415 = "「っ!!!」"
# monologue
# JP: すずが大きく口をあけ、勃起にだらりと唾液を垂らす。\n垂らした唾液を舌先で、ぺろぺろゆるく舐め伸ばしていく。
1855 = "Suzu há to miệng, để nước bọt nhỏ ròng ròng xuống dương vật đang cương cứng.\nRồi dùng đầu lưỡi liếm láp, dàn đều thứ nước bọt vừa nhỏ xuống."
# 【ハチロク】
# display as 鈴
# JP: 「ちゅっ――ちゅむっ――ぺろっ――ぺろっ――\nちゅっ――ちゅるっ――ぺろっ――ぺちゃっ――」
1475 = "「（Chụt——chụt——liếm——liếm——\nchụt——chụt——liếm——chụt——）」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅ……ぁ――す、ず」
1412 = "「Ư……a——Su, zu」"
# 【ハチロク】
# display as 鈴
# JP: 「んふふっ」
1423 = "「Ưm hừm」"
# monologue
# JP: すずの舌先が僕から離れる。\n唇は笑みの形に結ばれ――
2105 = "Đầu lưỡi của Suzu rời khỏi người tôi.\nĐôi môi nở một nụ cười mỉm——"
# monologue
# JP: （しにゅっ！）
2169 = "（Xoẹt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅうっ」
1452 = "「Ưm」"
# monologue
# JP: 指が再び、今度は強すぎず弱すぎず、\n僕を熟知している強さで、勃起をぴったり包んでくれる。
1872 = "Những ngón tay lại một lần nữa, lần này với lực đạo không quá mạnh cũng không quá yếu,\ndùng lực đạo thấu hiểu tôi rõ nhất, bao bọc lấy sự cương cứng."
# monologue
# JP: （しにゅっ――にちゃっ――しゅこっ――しこっ――）
2190 = "（Xoa nắn——tuốt lượn——vuốt ve——）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ぁっ――っ――」
1462 = "「A——a——っ——」"
# monologue
# JP: 声が、出る。\n喉を唇を歯を閉じて。閉じていてなお、溢れ出てくる。
1965 = "Âm thanh, bật ra.\nDù đã khép chặt môi răng và cổ họng. Dù đã khép chặt nhưng vẫn trào ra."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまと、一番深くにまじりあいたいから。\n一番近くで、双鉄さまを感じたいから」
1564 = "「Vì em muốn được hòa quyện sâu nhất cùng ngài Soutetsu.\nVì em muốn được cảm nhận ngài Soutetsu ở khoảng cách gần nhất」"
# monologue
# JP: 鼓膜からも、ゆるい快感が流し込まれる。\n震えがこころに染みとおり、僕をじわじわ酔わせてく。
1890 = "Khoái cảm êm ái chảy vào từ màng nhĩ.\nSự run rẩy thấm đẫm trái tim, dần dần làm tôi say đắm."
# 【ハチロク】
# display as 鈴
# JP: 「だからわたくしは双鉄さまを、これほど強く、浅ましく、\n求め、欲しがってしまうのです」
1586 = "「Thế nên em mới khao khát, thèm muốn ngài Soutetsu một cách mãnh liệt và nông cạn đến thế này」"
# monologue
# JP: （しにゅっ――しゅこっ――しゅぷっ――ちみゅっ）
2191 = "（Xoa nắn——vuốt ve——liếm láp——chụt）"
# monologue
# JP: 手と鼓膜との快感に、水っぽい音が加わっていく。\nすずの全てに、僕は濡らされ溶かされていく。
2125 = "Lẫn trong khoái cảm từ bàn tay và màng nhĩ là những âm thanh ướt át.\nTôi đang bị thấm ướt và hòa tan bởi tất cả những gì thuộc về Suzu."
# 【ハチロク】
# display as 鈴
# JP: 「ですけれど、ね？　双鉄さま」
1353 = "「Thế nhưng, ngài biết không? Ngài Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
1414 = "「っ」"
# monologue
# JP: ぴたり。その指が止まってしまう。\n刺激を失い、けれども勃起はそれゆえびくびく身悶える。
1899 = "Đột nhiên. Những ngón tay ấy dừng lại.\nMất đi kích thích, sự cương cứng vì thế mà run rẩy quằn quại."
# 【ハチロク】
# display as 鈴
# JP: 「奥深くない浅い部分も。ごく単純な、薄くて軽い所でも。\nやはり変わらず双鉄さまを、わたくしは求めております」
1360 = "「Ngay cả những phần nông cạn không sâu sắc. Ngay cả những nơi mỏng manh, nhẹ nhàng và vô cùng đơn giản.\nEm vẫn luôn khao khát ngài Soutetsu không đổi thay」"
# monologue
# JP: （しゅこっ！！！）
2192 = "（Vuốt ve!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅぅっ」
# 1452 = "「唔」" 
# monologue
# JP: 不意打ちめいた強い刺激が、喉から声を絞り出す。\n勃起の中の精液も、ぐいぐい水位をあげられる。
2046 = "Kích thích mạnh mẽ như đánh úp bất ngờ vắt kiệt âm thanh từ cổ họng tôi.\nLượng tinh dịch bên trong sự cương cứng cũng đang cuồn cuộn dâng cao."
# 【ハチロク】
# display as 鈴
# JP: 「わたくしの指で喘ぎを漏らす、可愛い貴方が好きだから。\nもっと欲しいと焦れて甘える、その眼差しが好きだから」
1515 = "「Vì em thích dáng vẻ đáng yêu của ngài khi bật ra tiếng rên rỉ dưới những ngón tay em.\nVì em thích ánh mắt nũng nịu, khao khát nhiều hơn nữa của ngài」"
# monologue
# JP: （しゅこっ――しゅこっ――びちゅっ――しゅこっ）
2196 = "（Vuốt ve——vuốt ve——chụt——vuốt ve）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ――ぁっ――んっ――くっ」
1464 = "「A——a——ưm——ư」"
# 【ハチロク】
# display as 鈴
# JP: 「わたくしだけが知る性の匂いを独り占めしていたいから。\n交換し合う唾液の甘さで、お口も喉も焼かれたいから」
1398 = "「Vì em muốn độc chiếm hương vị tình dục mà chỉ riêng em biết.\nVì em muốn khoang miệng và cổ họng bị thiêu đốt bởi sự ngọt ngào của nước bọt trao nhau」"
# monologue
# JP: 指の力が強くなる。上下の動きが早くなる。\nじわじわと――決壊させない、そのギリギリを見極めて。
1874 = "Lực của những ngón tay mạnh hơn. Chuyển động lên xuống nhanh hơn.\nDần dần——em ấy nhìn thấu ranh giới mong manh để không làm đê vỡ."
# 【ハチロク】
# display as 鈴
# JP: 「魂だけのことではなく、こころでも、体でも、五感でも、\nあたたかさでも。わたくしの全てで双鉄さまを――んっ」
1326 = "「Không chỉ linh hồn, mà cả trái tim, cơ thể, ngũ quan, hay sự ấm áp.\nBằng tất cả những gì em có, ngài Soutetsu——ưm」"
# monologue
# JP: （とろおおおおおおおおおっ）
2178 = "（Phụt）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁあ――」
1461 = "「A——」"
# monologue
# JP: 手の上下動をゆるめぬままに、さらなる唾液がたらされる。\n性器と指は混じり合いつつ泡立って、淫靡な音を響かせる。
1876 = "Không hề nới lỏng chuyển động lên xuống của bàn tay, em ấy tiếp tục nhỏ thêm nước bọt.\nDương vật và những ngón tay hòa quyện vào nhau sủi bọt, vang lên những âm thanh dâm đãng."
# 【ハチロク】
# display as 鈴
# JP: 「……わたくしは。満たされたいし、満たしたい。\n双鉄様と――あなたと、セックスしたいのです」
1121 = "「……Em. Muốn được thỏa mãn, và muốn thỏa mãn ngài.\nEm muốn ân ái với ngài Soutetsu——với anh」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ、すずっ。だから――っ！！！？」
1557 = "「Anh cũng vậy, Suzu. Thế nên——!!!?」"
# 【ハチロク】
# display as 鈴
# JP: 「（ぐぽおおおおおおっ）――ん……んっ！」
1714 = "「（Ngậm lấy）——ưm……ưm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「！！！」
1455 = "「!!!」"
# monologue
# JP: セックスしよう。性器と性器で繋がり合おう。\n言葉を願いを、けれども深い口淫に止められる。
1957 = "Hãy ân ái thôi. Hãy để bộ phận sinh dục hòa quyện vào nhau.\nLời nói và mong muốn ấy, lại bị chặn lại bởi màn khẩu dâm sâu thẳm."
# 【ハチロク】
# display as 鈴
# JP: 「じゅぶっ！　ぶちゅっ！　じゅにゅっ！　じゅぬっ！」
1479 = "「Chụt! Phụt! Chụt! Chụt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁぁぁぁあああっ」
1470 = "「Aaaaaa」"
# 【ハチロク】
# display as 鈴
# JP: 「（ぬとおおおっ――れるっ――じゅるるるるっ）\nじゅぶっ！　ぼちゅっ！　じゅぶっ！　じゅばっ！」
1716 = "「（Liếm——liếm——liếm）\nChụt! Phụt! Chụt! Phụt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅ――あ！　すずっ、すずっ！！」
1482 = "「Ư——a! Suzu, Suzu!!」"
# monologue
# JP: 小さく熱い口内で、舐られつつかれ吸われたあげくに\n情け容赦なく唇と喉奥によって責められる。
1868 = "Trong khoang miệng nhỏ bé nóng bỏng, sau khi bị liếm láp, mút mát,\ntôi lại bị đôi môi và sâu trong cổ họng tấn công không thương tiếc."
# 【ハチロク】
# display as 鈴
# JP: 「じゅっ！　じゅぽっ！　じゅぶっ！　じゅぽっ！\nじゅるっ！　じゅぶっ！　じゅむっ！　ぶぢゅっ！」
1481 = "「Chụt! Chụt! Chụt! Chụt!\nLiếm! Chụt! Ưm! Phụt!」"
# monologue
# JP: 下品な水音を立てるほど――あのすずが夢中になって、\n僕の勃起を貪っている。
2020 = "Đến mức phát ra những âm thanh ướt át thô tục——Suzu ấy đang say sưa,\nngấu nghiến sự cương cứng của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「だめ、だ――すずっっ」
1320 = "「Không được, đâu——Suzu」"
# 【ハチロク】
# display as 鈴
# JP: 「あむっ――じゅずっ！　れろおおっ――はむっ、はむっ、\nじゅぶっ！　じゅぼっ！　じゅびゅっ！　じゅぶっ！！」
1466 = "「A ưm——chụt! Liếm——a ưm, a ưm,\nchụt! Chụt! Chụt! Chụt!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ、ぁ、ぁ、あっ」
1463 = "「A, a, a, a」"
# monologue
# JP: その事実だけで精液たちが、この上ないほどいきり立つ。\nこのまま口内を蹂躙したいと、足並みを揃え要求してくる。
1827 = "Chỉ với sự thật ấy thôi cũng đủ làm bầy tinh binh sục sôi tột độ.\nChúng đồng lòng yêu cầu muốn cứ thế mà chà đạp khoang miệng em ấy."
# 【ハチロク】
# display as 鈴
# JP: 「（れるううううううっ）――きゅぷっ！　ちゅぱっ――\nじゅぼっ！　じゅっ！　じゅぶっ！　ぶっ！　じゅち！」
1715 = "「（Liếm————）——Chụt! Chụt——\nChụt! Chụt! Chụt! Phụt! Chụt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「す、ずっ――」
1676 = "「Su, zu——」"
# monologue
# JP: 舌を唾液を喉奥を、口内全部に唇を、\nフルに使って緩急つけ、すずは容赦なく責め続けてくる。
2081 = "Lưỡi, nước bọt, sâu trong cổ họng, đôi môi ôm trọn khoang miệng,\nem ấy sử dụng tất cả để tạo nhịp điệu nhanh chậm, tiếp tục tấn công không khoan nhượng."
# 【双鉄】
# display as 雙鐵
# JP: 「す、ずっ。ダメだ。\n――このままだと、もうっ――っ！？」
1681 = "「Su, zu. Không được đâu.\n——Cứ thế này thì, anh——!?」"
# 【ハチロク】
# display as 鈴
# JP: 「――っ」
1104 = "「——Ưm」"
# monologue
# JP: ぴたりと、すずの動きがとまる。\n慌ててまぶたを持ち上げ見れば、すずの瞳は嬉しげだ。
2110 = "Đột nhiên, chuyển động của Suzu dừng lại.\nTôi vội vàng hé mắt nhìn, đôi mắt của Suzu ngập tràn niềm vui."
# 【ハチロク】
# display as 鈴
# JP: 「ほうへふはふぁ、ほうほほほふぁふぁ、\nふぁひひょはおふひひしゃへひははっへふははひはへ」
