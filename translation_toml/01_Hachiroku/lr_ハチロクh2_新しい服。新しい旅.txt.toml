2173 = "（Trượt）"
# monologue
# JP: 精液を吐き出しつくした性器が無様にすずの膣から抜ける。\n同時にぺたん、無造作に、すずがその上に腰掛けてくる。
1844 = "Bộ phận sinh dục đã nôn sạch tinh dịch tuột khỏi âm đạo Suzu một cách khó coi.\nCùng lúc đó, Suzu vô lực ngồi bệt xuống trên nó."
# 【ハチロク】
# display as 鈴
# JP: 「ふぁ――あ……あ……ん――。\nふっ――うふっ――うふふふふっ」
1424 = "「Haa——a……a……ưm——.\nHư——ư hừ——ư hừ hừ hừ」"
# monologue
# JP: 脱力しきった、あどけない笑み。
2054 = "Nụ cười ngây thơ, rã rời."
# 【ハチロク】
# display as 鈴
# JP: 「このお洋服っ――んっ――このお洋服は――\nほんとうに、素敵――素敵なお洋服ですね」
1663 = "「Bộ quần áo này——ưm——bộ quần áo này——\nthật sự, rất tuyệt——một bộ quần áo tuyệt vời nhỉ」"
# monologue
# JP: 整いきらぬ息でけれども、すずは微笑み言葉をつむぐ。
1834 = "Dù nhịp thở chưa ổn định, Suzu vẫn mỉm cười và cất lời."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、素敵だ――」
1642 = "「Đúng vậy, rất tuyệt——」"
# 【ハチロク】
# display as 鈴
# JP: 「ですよね、うふふっ」
1547 = "「Đúng không ạ, ư hừ hừ」"
# monologue
# JP: 何か言おうとしていたことが、瞬時に吹き飛ぶ。\nすずが余りに妖艶で、なのにあどけなく笑うがゆえに。
1999 = "Những điều định nói bỗng chốc bay biến.\nVì Suzu quá đỗi yêu kiều, vậy mà lại cười một cách ngây thơ đến thế."
# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまとわたくしの、いつものおうちの中でさえ。\nわたくしたちを、新しい旅に連れ出してくれましたもの」
1627 = "「Ngay cả khi ở trong ngôi nhà quen thuộc của ngài Soutetsu và em.\nNó đã đưa chúng ta, đến một chuyến đi mới」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1485 = "「Aa——」"
# monologue
# JP: 確かにだ。いつもの部屋でいつものようにセックスをして。\nけれども今日は、新しい体験を――旅をした。
1882 = "Quả thật vậy. Ân ái như mọi khi trong căn phòng quen thuộc.\nNhưng hôm nay, chúng tôi đã có một trải nghiệm mới——một chuyến đi."
# 【双鉄】
# display as 雙鐵
# JP: 「そう……だな。うん」
1339 = "「Đúng……vậy. Ừm」"
# monologue
# JP: “孕ませた”――馬鹿げ、忌まわしく、幸せに満ちた錯覚。\nあの快感と自己嫌悪との、圧倒的な感情量。
1097 = "\"Đã làm cho mang thai\" ——Ảo giác ngu ngốc, đáng ghê tởm, nhưng ngập tràn hạnh phúc.\nLượng cảm xúc áp đảo giữa khoái cảm đó và sự chán ghét bản thân."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はこの部屋で、新しい経験を、旅を得た。\nお前もそうであったのならば――」
1648 = "「Anh đã có một trải nghiệm mới, một chuyến đi trong căn phòng này.\nNếu em cũng vậy thì——」"
# 【ハチロク】
# display as 鈴
# JP: 「申しましたよ？　この服は、わたくしたちを、\n新しい旅に連れ出してくれたのだと」
1570 = "「Em đã nói rồi mà? Bộ quần áo này, đã đưa chúng ta,\nđến một chuyến đi mới」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうだったな」
1504 = "「Aa. Đúng vậy nhỉ」"
# monologue
# JP: 手をのばし、頭を撫でる。何度も。何度も。\nならば恐らく、あの瞬間に、すずも、何かを――
1943 = "Vươn tay ra, xoa đầu em ấy. Nhiều lần. Nhiều lần.\nNếu vậy có lẽ, trong khoảnh khắc đó, Suzu cũng, điều gì đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「良い旅だったか？」
1672 = "「Một chuyến đi tuyệt vời chứ?」"
# 【ハチロク】
# display as 鈴
# JP: 「もちろんのことでございます」
1576 = "「Tất nhiên rồi ạ」"
# monologue
# JP: 笑顔が、溶かす。僕のこころに巣食おうとした、\nなにか黒くて、愚かで忌まわしいものを。
1886 = "Nụ cười, làm tan chảy. Thứ gì đó đen tối, ngu ngốc và đáng ghê tởm\nđịnh làm tổ trong tim tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ならば」
1665 = "「Vậy sao, nếu vậy」"
# monologue
# JP: ”孕ませた”という愚かな錯覚。圧倒的な多幸感。\nその根源にあるのであろう”孕ませたい”という望み。
1096 = "Ảo giác ngu ngốc \"đã làm cho mang thai\". Cảm giác hạnh phúc áp đảo.\nKhao khát \"muốn làm cho mang thai\" có lẽ là cội nguồn của nó."
# 【双鉄】
# display as 雙鐵
# JP: 「僕と同じだ」
1671 = "「Giống như anh thôi」"
# 【ハチロク】
# display as 鈴
# JP: 「うふふっ、当然でございましょう？　だってふたりの。\n双鉄さまとわたくしの、旅なのですから」
1511 = "「Ư hừ hừ, đương nhiên rồi ạ? Vì là của hai người mà.\nVì là chuyến đi của ngài Soutetsu và em mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「……」
# 1113 = "「……」" 
# monologue
# JP: 肯定される。全てを、すずに。\n決して叶わぬ愚かな願いも、全て、まるごと。
1794 = "Được khẳng định. Tất cả, bởi Suzu.\nNgay cả khao khát ngu ngốc không bao giờ thành hiện thực, tất cả, trọn vẹn."
# 【双鉄】
# display as 雙鐵
# JP: 「だな。当然だ。\n僕とお前と、一緒に重ねる旅なのだから」
1619 = "「Nhỉ. Đương nhiên rồi.\nVì là chuyến đi mà anh và em, cùng nhau trải qua mà」"
# monologue
# JP: ただ単純に、それだけのこと。思えば気持ちが軽くなる。\n思わせてくれるすずの笑顔が、どこまでだって愛おしい。
1793 = "Chỉ đơn giản, là vậy thôi. Nghĩ vậy thấy lòng nhẹ nhõm hơn.\nNụ cười của Suzu khiến tôi nghĩ như vậy, thật đáng yêu biết bao."
# 【ハチロク】
# display as 鈴
# JP: 「はい。うふふっ。ですのでわたくし、このお洋服。\n昨日よりももっと気に入りました」
1606 = "「Vâng. Ư hừ hừ. Thế nên em, bộ quần áo này.\nEm thích nó hơn ngày hôm qua rồi」"
# monologue
# JP: 愛らしすぎて、ほんの少しだけからかいたくなる。\nこころが、唇も軽くする。
1892 = "Vì quá đáng yêu, nên tôi muốn trêu chọc một chút.\nTrái tim, làm đôi môi cũng nhẹ nhàng hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、すず。そのデンでいくのなら――\n新しい服でセックスすればその度ごとに、僕らはきっと」
1682 = "「Nếu vậy, Suzu. Nếu đi theo hướng đó thì——\nMỗi lần ân ái trong bộ quần áo mới, chúng ta chắc chắn sẽ」"
# 【ハチロク】
# display as 鈴
# JP: 「まぁ、双鉄さまったら。けど――そうですね。ふふっ」
1447 = "「Trời ạ, ngài Soutetsu thật là. Nhưng mà——đúng vậy nhỉ. Hừ hừ」"
# monologue
# JP: すずの口元が小さく笑う。\n笑いよりもっと小さく小さく、その舌先がぺろりと動く。
2111 = "Khóe miệng Suzu khẽ cười.\nNhỏ hơn cả nụ cười, đầu lưỡi em ấy khẽ liếm."
# 【ハチロク】
# display as 鈴
# JP: 「次にはどんなお洋服で、どんな新しい旅をしたいと。\nね？　双鉄さま。今、お考えになられてますか？」
1593 = "「Lần tới ngài muốn mặc bộ quần áo nào, và muốn có chuyến đi mới như thế nào.\nNhỉ? Ngài Soutetsu. Ngài đang nghĩ gì vậy?」"
