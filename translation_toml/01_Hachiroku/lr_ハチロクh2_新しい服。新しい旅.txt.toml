# lines: 339 
# 【ハチロク】
# display as 鈴
# JP: 「大変たのしうございましたね」
1614 = "「Thực sự là một chuyến đi vô cùng vui vẻ ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな、ほんの少しだけ疲れはしたが――\n疲れの何倍、何十倍も充実していた」
1620 = "「Phải nhỉ, dù hơi mệt một chút――\\nnhưng niềm vui sướng lại gấp nhiều lần, à không, gấp hàng chục lần sự mệt mỏi ấy」"

# monologue
# JP: 旅そのものも楽しかったが、すずが良かった。\n普段は見れぬ表情も、おめかしも存分に堪能できた。
2005 = "Bản thân chuyến du lịch đã rất vui rồi, nhưng có Suzu đi cùng lại càng tuyệt vời hơn.\\nTôi đã được chiêm ngưỡng trọn vẹn những biểu cảm và cả dáng vẻ diện đồ lộng lẫy ngày thường hiếm khi thấy của cô ấy."

# 【ハチロク】
# display as 鈴
# JP: 「お布団、敷けておりますよ？」
1701 = "「Đệm giường, em đã trải sẵn rồi ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは助かる。ありがとう」
1654 = "「Thế thì tốt quá. Cảm ơn em nhé」"

# 【ハチロク】
# display as 鈴
# JP: 「妻として当然のつとめです」
1612 = "「Đó là nghĩa vụ đương nhiên của một người vợ mà ạ」"

# monologue
# JP: 促されるまま、着替えもせずに横になる。\nとたん、シーツを汚してしまわないかと心配になる。
1950 = "Theo lời giục giã, tôi nằm xuống giường mà chưa kịp thay đồ.\\nNgay lập tức, tôi lại lo lắng không biết mình có làm bẩn ga trải giường hay không."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまご自身がお感じになられておりますより、\nもう少しだけ、深くお疲れのように思えます」
1341 = "「Có vẻ như so với những gì ngài tự cảm nhận,\\nSoutetsu-sama đang mệt mỏi sâu sắc hơn một chút đấy ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「……かもしれんな」
1117 = "「...Có lẽ là vậy thật」"

# monologue
# JP: けれどもすずは気にもせず、ただ穏やかに僕を見つめる。\n今は休んでくださいましと、声なき声が伝わってくる。
1817 = "Thế nhưng Suzu chẳng hề bận tâm, chỉ dịu dàng lặng nhìn tôi.\\nNhư muốn nhắn nhủ không lời rằng, giờ ngài hãy nghỉ ngơi đi nhé."

# 【ハチロク】
# display as 鈴
# JP: 「汗だけ流してまいりましたら、ご飯の支度をいたします。\nそれまでの間、少しだけでも」
1331 = "「Để em đi tắm rửa sạch mồ hôi rồi sẽ chuẩn bị bữa tối nhé.\\nTrong lúc chờ đợi, ngài hãy chợp mắt một lát đi ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1322 = "「Không」"

# monologue
# JP: 横たわったまま見上げれば、すずの体の曲線も、\n決して完全な平板ではないと、ごく控えめに主張してくる。
2094 = "Nằm ngửa nhìn lên, những đường cong trên cơ thể Suzushiro khẽ khàng khẳng định rằng chúng tuyệt nhiên chẳng hề bằng phẳng chút nào."

# 【ハチロク】
# display as 鈴
# JP: 「え？」
1450 = "「Hả?」"

# 【双鉄】
# display as 雙鐵
# JP: 「汗を流すというのなら――」
1531 = "「Nếu muốn đổ mồ hôi thì――」"

# monologue
# JP: そこに気づけば、可憐が途端、色香に変わる。\n普段と違うおめかしを、いつもの布団に引き込みたくなる。
1798 = "Một khi đã nhận ra điều đó, vẻ đáng yêu lập tức hóa thành nét kiều mị quyến rũ. Tôi bỗng muốn kéo nàng thiếu nữ trong bộ trang phục lộng lẫy khác thường ngày này vào tấm đệm quen thuộc."

# 【双鉄】
# display as 雙鐵
# JP: 「いますぐにここで――僕の上で流せばいい」
1669 = "「――Thì hãy đổ ngay tại đây, ngay trên người tôi này」"

# 【ハチロク】
# display as 鈴
# JP: 「ぁ」
1467 = "「A...」"

# monologue
# JP: 手首を掴む。戸惑いではない、甘やかな声。\nすずには無いはずの体臭か、けれども僕の芯まで届く。
1958 = "Tôi nắm lấy cổ tay em. Tiếng thốt lên ngọt ngào, không chút bối rối. Dù cơ thể của một Railord vốn không nên có mùi hương, nhưng hương thơm ấy vẫn chạm đến tận sâu thẳm tâm can tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「おいで、すず」
1683 = "「Lại đây nào, Suzushiro」"

# 【ハチロク】
# display as 鈴
# JP: 「んっ」
1491 = "「Ưm...」"

# monologue
# JP: (とさっ）
41 = "(Rầm/Ngã nhào）"

# monologue
# JP: 抵抗もない――どころか自ら、嬉しげに倒れ込んでくる。\n重なる熱がこころをもまた重ねてくれていると感じる。
1884 = "Không một chút phản kháng――ngược lại, em ấy còn tựa như đang vui sướng mà ngã nhào vào lòng tôi. Sức nóng giao hòa khiến tôi cảm nhận được tâm hồn hai đứa cũng đang hòa vào làm một."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄、さま――旦那様」
1698 = "「Soutetsu-sama――Phu quân của em」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1491 = "「嗯」" 

# monologue
# JP: 重なったまま、すずがもぞもぞと身を捩る。\n柔らかな肌に、僕の形を幾度も幾度も食い込ませていく。
2102 = "Vẫn trong tư thế áp sát vào nhau, Suzushiro khẽ ngọ nguậy, uốn éo cơ thể. Làn da mềm mại của em hết lần này đến lần khác lún sâu vào da thịt tôi."

# 【ハチロク】
# display as 鈴
# JP: 「その……あの。おまたが、大きく――\n固くなっていらっしゃるようなのですが」
1652 = "「Cái đó... à ừm. Chỗ ấy của anh... dường như đang to lên――\\nvà trở nên cứng hơn rồi ạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、僕は勃起している」
1539 = "「A, anh đang cương cứng rồi.」"

# 【ハチロク】
# display as 鈴
# JP: 「！」
1454 = "「!」"

# monologue
# JP: 数え切れぬほど交わりあって、なおもその頬は朱に染まる。\n可愛らしさが、こころを、言葉をなめらかにする。
1835 = "Dẫu cho đã hòa quyện vào nhau không biết bao nhiêu lần, đôi gò má ấy vẫn cứ ửng hồng.\\nSự đáng yêu ấy khiến trái tim lay động, khiến lời nói cứ thế tuôn ra thật trơn tru."

# 【双鉄】
# display as 雙鐵
# JP: 「痛くなるほどに勃起しているが、\nこれは決して、疲れマラなどという代物では無い」
1354 = "「Cương đến mức phát đau, thế nhưng,\\nđây tuyệt đối không phải là thứ gọi là 'cương do mệt mỏi' đâu.」"

# 【ハチロク】
# display as 鈴
# JP: 「つかれ……なんと申されたのですか？」
1632 = "「Mệt mỏi... anh vừa nói cái gì cơ ạ?」"

# monologue
# JP: だから穢して――下賤な言葉で照れさせたくなる。\nどれほど泥に塗れようとも、白く咲く花を愛でたいがゆえ。
1972 = "Chính vì thế mà ta lại muốn vấy bẩn nàng――muốn dùng những từ ngữ thô tục để khiến nàng bối rối.\\nBởi dẫu cho có lấm lem bùn đất đến đâu, ta vẫn muốn nâng niu đóa hoa đang nở rộ sắc trắng ngần ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「疲れマラ。極度の肉体疲労が勃起を強要することがある。\nその現象を、俗に疲れマラと称するのだ」
1635 = "「Cương do mệt mỏi. Khi cơ thể kiệt sức đến cực độ, nó đôi khi sẽ ép cậu nhỏ phải cương lên.\\nHiện tượng đó, dân gian thường gọi là 'cương do mệt mỏi'.」"

# 【ハチロク】
# display as 鈴
# JP: 「まぁ、それでは……」
1444 = "「Trời ạ, vậy thì...」"

# monologue
# JP: すずの頭が小さく動く。\n眼差しが、吐息が熱っぽく勃起をくすぐってくる。
2107 = "Đầu của Suzu khẽ cử động.\\nÁnh mắt ấy, hơi thở ấy đầy nóng bỏng như đang mơn trớn lấy sự cương cứng này."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまは、今のおまたのこの状態を――\n別の言葉で、お示しになっておられるのですね？」
1592 = "「Soutetsu-sama, trạng thái hiện tại của chỗ đó của anh――\\nanh đang muốn dùng một từ ngữ khác để biểu thị nó, đúng không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そのとおりだ」
1505 = "「Ừm. Đúng là như vậy.」"

# 【ハチロク】
# display as 鈴
# JP: 「……」
1113 = "「……」"

# monologue
# JP: 理解を得ての喜びだろうか、それとも性的興奮だろうか？\nすずは熱っぽい息を吐く。
1807 = "Đó là niềm vui vì đã thấu hiểu, hay là sự hưng phấn đầy dục vọng?\\nSuzu thở ra những hơi thở đầy nóng bỏng."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまは、おまたをこれほど固く、熱く、\n強張らせていらっしゃいますのに――」
1602 = "「Soutetsu-sama, chỗ đó của anh đã cứng ngắc, nóng rực\\nvà căng phồng lên đến nhường này rồi, vậy mà――」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1454 = "「唔！」" 

# monologue
# JP: つつ――と。すずの真白い指が僕の勃起の形をなぞる。\nなぞった流れでジッパーを、じりじり緩く引き下げていく。
2106 = "Khẽ chạm nhẹ. Ngón tay trắng ngần của Suzu vuốt ve theo hình dáng cậu nhỏ đang cương cứng của tôi.\\nTheo đà vuốt ve đó, cô ấy từ từ kéo khóa quần xuống một cách chậm rãi."

# 【ハチロク】
# display as 鈴
# JP: 「疲れによってではないとおっしゃる。でしたら、ね？\nどうか旦那様、わたくしに教えてくださいまし」
1598 = "「Anh lại bảo không phải do mệt mỏi. Vậy thì, đúng chứ ạ?\\nXin chồng yêu hãy chỉ bảo cho thiếp biết đi nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぅっ――」
1451 = "「Ư...――」"

# monologue
# JP: 勃起が、外へと導きだされる。\nすずの綺麗な顔と、無骨な勃起が等しく並ぶ。
2031 = "Dương vật cương cứng được dẫn dắt ra bên ngoài.\\nKhuôn mặt xinh đẹp của Suzu và sự thô kệch của dương vật đặt cạnh nhau một cách tương phản."

# 【ハチロク】
# display as 鈴
# JP: 「なにが、いったい双鉄さまを、\nこれほどに昂ぶらせたのでございましょう――？」
1645 = "「Điều gì, rốt cuộc là điều gì đã khiến Soutetsu-sama\\nở trạng thái phấn khích đến nhường này vậy ạ――?」"

# monologue
# JP: ひそやかな声。ふーっ、と。僕をくすぐる吐息。\nただそれだけで、僕は容易く濡らされる。
1905 = "Giọng nói thì thầm. Phù... Tiếng thở hắt ra như đang trêu đùa tôi.\\nChỉ cần bấy nhiêu thôi, tôi đã dễ dàng bị kích thích đến ướt át."

# 【双鉄】
# display as 雙鐵
# JP: 「お前がだ、すず。ここから見上げたお前の体が。\nお前の熱が、あるはずもない体臭が――」
1361 = "「Là vì em đó, Suzu. Cơ thể của em khi nhìn từ góc độ này.\\nHơi ấm của em, và cả mùi hương cơ thể dù vốn dĩ không thể có tồn tại――」"

# monologue
# JP: 手を伸ばし、すずを捕まえ思い切り勃起に押し付けたい。\nその欲望を、より強い快感を期待するゆえじいっと堪える。
1953 = "Tôi muốn vươn tay ra, giữ chặt Suzu rồi ấn mạnh cô ấy vào phần dương vật đang cương cứng của mình.\\nNhưng vì kỳ vọng vào một khoái cảm mãnh liệt hơn, tôi cố kiềm chế dục vọng đó lại."

# 【双鉄】
# display as 雙鐵
# JP: 「――僕を焦かせて乾かして。お前が欲しいと抱きたいと。\nここまで熱く、昂ぶらせたのだ」
1120 = "「――Nó thiêu đốt tôi, khiến tôi khao khát. Nó bảo rằng tôi muốn có em, muốn ôm lấy em.\\nChính nó đã khiến tôi nóng rực và hưng phấn đến mức này」"

# 【ハチロク】
# display as 鈴
# JP: 「見上げた体が……でございますか？」
1551 = "「Cơ thể khi nhìn từ dưới lên... sao ạ?」"

# monologue
# JP: どこかきょとんとしたような、それでいながら嬉しげな声。
1898 = "Giọng nói của cô ấy có chút ngơ ngác, nhưng đồng thời lại ẩn chứa niềm vui sướng."

# 【ハチロク】
# display as 鈴
# JP: 「双鉄さまに昂ぶっていただけますような……\nそれほどの魅力、見た目には無いものかと存じますが」
1400 = "「Em không nghĩ rằng vẻ bề ngoài này của mình...\\nlại có đủ sức quyến rũ để làm Soutetsu-sama phải hưng phấn đến vậy đâu」"

# 【双鉄】
# display as 雙鐵
# JP: 「見た目には、か」
1534 = "「Chỉ là vẻ bề ngoài thôi sao?」"

# monologue
# JP: その言葉にさえ、勃起が震える。\n羞恥と自負と謙遜と、幾つもの重なり合う気持ちを感じて。
1912 = "Ngay cả trước những lời đó, dương vật vẫn khẽ rung lên.\\nTôi có thể cảm nhận được nhiều tầng cảm xúc đan xen: xấu hổ, tự hào xen lẫn sự khiêm tốn."

# 【双鉄】
# display as 雙鐵
# JP: 「もちろん僕は、お前の体が――\n見た目以上に僕を蕩かすものだと深く、知っている」
1624 = "「Tất nhiên là tôi biết rất rõ, cơ thể của em――\\ncòn có thể làm tôi mê đắm hơn rất nhiều so với những gì thể hiện ở vẻ bề ngoài」"

# 【ハチロク】
# display as 鈴
# JP: 「はうっ」
1472 = "「Hưm...」"

# monologue
# JP: 勃起に触れる声音は息は、\n降り注がれる油となって、僕の欲望を激しく焦がす。
2035 = "Giọng nói và hơi thở chạm vào dương vật đang cương cứng\\nchẳng khác nào dầu đổ vào lửa, thiêu đốt dục vọng trong tôi một cách dữ dội."

# 【双鉄】
# display as 雙鐵
# JP: 「だが、見た目にだって、いつも僕は、\n蕩かされ魅了されているよ」
1623 = "「Nhưng ngay cả vẻ bề ngoài ấy, lúc nào anh cũng\\nbị làm cho say đắm và mê mẩn đấy thôi」"

# monologue
# JP: 触れたい。撫でたい。押し付けたい。\nが、その欲望の何倍も、すずからして欲しい欲が上回る。
1956 = "Muốn chạm vào. Muốn vuốt ve. Muốn áp chặt vào.\\nNhưng khát khao muốn Suzu chủ động làm điều đó với mình lại lớn gấp nhiều lần ham muốn kia."

# 【双鉄】
# display as 雙鐵
# JP: 「お前という魂の、僕がもっとも愛するものの、\nその内面に調和した、これほど美しい器なのだから」
1513 = "「Bởi vì đây là một chiếc bình tuyệt đẹp, vô cùng hài hòa với nội tâm bên trong của em — linh hồn mà anh yêu thương nhất」"

# 【ハチロク】
# display as 鈴
# JP: 「……」
# 1113 = "「……」" 

# monologue
# JP: 声ではなく息。甘やかな。思わずもらしてしまったものか、\nあるいは平静を装うために、隠そうとしたものであろうか。
2108 = "Không phải tiếng nói mà là hơi thở. Thật ngọt ngào. Là do vô tình thốt ra, hay là đang cố che giấu để tỏ ra bình tĩnh?"

# 【双鉄】
# display as 雙鐵
# JP: 「僕の目には、な。\n描き出されるごくごく微細な陰影さえも」
1516 = "「Trong mắt anh,\\nngay cả những đường nét đổ bóng vô cùng nhỏ bé ấy cũng vậy」"

# 【ハチロク】
# display as 鈴
# JP: 「『ごくごく微細』……で、ございますか」
1110 = "「'Vô cùng nhỏ bé'...... sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「！！？」
1502 = "「!!?」"

# monologue
# JP: （きゅむっ！）
2195 = "（Ngoạm!）"

# 【双鉄】
# display as 雙鐵
