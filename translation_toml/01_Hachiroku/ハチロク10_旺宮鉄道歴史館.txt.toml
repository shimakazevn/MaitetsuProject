2582 = "「此乃北海道之特產，並且適宜\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;飲用，二位若不嫌棄，品嚐一下如何？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それではいただきます」
2311 = "「噢，那我就不客氣了」" 

