# 【双鉄】
# display as 雙鐵
# JP: 「遺言を……オリヴィから受け取れるよう、\nそうしておけというような話か」
2427 = "「您的意思是大概是……讓我們做好隨時都能聽取奧莉薇遺言的準備是嗎」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ああ、遺言とはかなり近いニュアンスかもしれませんな。\n遺言と、遺産相続、その両方をあわせたような――」
2309 = "「噢，跟遺言差不太多但也不算完全一樣吧，遺言和遺囑合二為一，大概比較精確」" 

# 【ハチロク】
# display as 鈴
# JP: 「\x%l共感;#00ffc040;共感%l;#;は……文字通りの“共感”なのです。\nお互いが得たものを、共有しあう――そうしたものです」
1491 = "「\\x%l共感;#00ffc040;共鳴%l;#;正如其字面意思……是共享彼此獲得的各種訊息與認知」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2269 = "「嗯」" 

# 【ハチロク】
# display as 鈴
# JP: 「ですので、どこまで共有するかは細かに定められます。\n一般的には、一番親しくなったとしても、感情まで」
2485 = "「所以關於共鳴的級別也是有細緻劃分的，一般來說即便發展為親密無間的關係，也只會產生情感層面的共鳴」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2269 = "「嗯」" 

# monologue
# JP: わかる気がする。\n僕も、ふたごであったゆえ。
3519 = "我能明白她的意思，畢竟我曾經也有路子這個雙胞胎妹妹。" 

# monologue
# JP: 路子と僕はつながっていて、けれども全ては重ねずに。\nだからあのとき――路子に突き放してもらえたがゆえ。
3689 = "路子和我在冥冥之中也存在某種聯繫，但並非彼此的一切都緊密聯繫在一起，所以最終我才能擺脫當初的陰影。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、タブレットレベルとは――文字通り、\n\x%lタブレット;#00ffc040;タブレット%l;#;の中身全て――全領域の\x%l共感;#00ffc040;共感%l;#;、か？」
2894 = "「那麼核心級\\x%l共感;#00ffc040;共鳴%l;#;的意思也很明顯，是對包括人偶核——也就是\\x%lタブレット;#00ffc040;操作板%l;#;的全部領域實行\\x%l共感;#00ffc040;共鳴%l;#;，對嗎？」" 

# 【ハチロク】
# display as 鈴
# JP: 「で。ございます。おたがいが得てきた全て。\n忘れたいことも、幸せな記憶も、大切な時間も、全ての」
2556 = "「正是。將雙方迄今為止獲得的一切，包括不好的遭遇、幸福的記憶、寶貴的時光，全部進行共享」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……ただごとではあるまいな」
2830 = "「這的確……非同小可」" 

# monologue
# JP: 自分のすべてを、まるごとさらけ出す。\nそれを許すというのなら、究極の信頼関係だ。
3568 = "毫無保留，將自己全部託付於對方，若能容許這個級別的共鳴，這說明兩位鐵路人偶彼此之間一定建立了至高無上的信任。" 

# monologue
# JP: 『墓場までもっていきたい大切なもの』は、\n僕の中にさえ、確実にある。
3445 = "就連我，也同樣存在“想要保守一輩子的秘密”。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ま、ただごとではありませんな。先に話した――\n凍結状態にあるとよ氏さえ、[タブレットレベル,2]全開放は拒みましたからな」
2831 = "「這的確絕非易事，就連我剛才提到處於假死狀態的台與女士，也都拒絕進行[核心級,1]全面共鳴」" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1511 = "「……」" 

# monologue
# JP: で、あろうとしか思えない。\n自分のすべてを遺すことが、どれほど研究に有益でも――
3469 = "我也只能表示理解。哪怕她的見聞與記憶會對今後的研究大有裨益——" 

# 【ハチロク】
# display as 鈴
# JP: 「再び目覚めて元気になることを――\n信じて、お眠りにつかれたのでしょうから」
2467 = "「我認為台與小姐應該也心懷能夠再次甦醒，與身體康復的希望」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ」
1528 = "「……嗯」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ですので、全開放の\x%l共感;#00ffc040;共感%l;#;などは、ほぼ全ての\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、一度もせずに機能停止に至ります」
2481 = "「所以有史以來，基本所有\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;都不曾開放全面\\x%l共感;#00ffc040;共鳴%l;#;，直至停止活動終其一生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なのでしょうね」
2034 = "「不難想像」" 

# monologue
# JP: 頷いてしまってハっとする。僕の答えを、すずは重視する。\nゆえ、今の同意は事実上の拒否回答も同然だ。
3615 = "等到我點頭之後才意識到，鈴非常重視我的態度。所以我剛才的認同，無異於是拒絕了博士的請求。" 

# monologue
# JP: が、これはもう、“僕とすず”だけの問題ではない。\nオリヴィはもちろん、もっと広く・深くに関わる問題だ。
3238 = "但是這已經不是只屬於我和鈴的問題了，也不止於奧莉薇，我們要面對的是一個涉及各個方各面的問題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
2117 = "「八六」" 

# monologue
# JP: ゆえ、あえてハチロクの、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;としての名を呼ぶ。
3565 = "正因為如此，我特地以\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的名稱來稱呼她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前の判断を、僕は信じる。\nお前とオリヴィとの最善を、お前自身に考えて欲しい」
2460 = "「我相信你的判斷，希望你能完全以自己的觀點，為你和奧莉薇做出最妥當的選擇」" 

# 【ハチロク】
# display as 八六
# JP: 「――」
# 1511 = "「……」" 

# monologue
# JP: 意図を理解してくれたのか、\nハチロクはただ、静かに頷く。
3292 = "八六看來是理解了我的用意，一言不發地點了點頭。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ですので、タブレットレベルの\x%l共感;#00ffc040;共感%l;#;を求めるなどは、\n極めて難しく、縁起でもないことではありますが――」
2750 = "「話說回來，向鐵路人偶尋求核心級\\x%l共感;#00ffc040;共鳴%l;#;，的確是極為困難並且近乎忌諱」" 

# 【ハチロク】
# display as 八六
# JP: 「それはきっと――努力して至る。説得して導く。\nそうしたものではないように、わたくしは思います」
2468 = "「我認為，這絕不是憑藉努力或者勸說所能實現的」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ほう！」
# 2297 = "「噢！」" 

# monologue
# JP: ハチロクからも、事実上の拒否解答。\nが、不死鳥博士はむしろ嬉しげな声を出す。
3620 = "而八六也給出了相當於拒絕的答案，可不死鳥博士卻反而表現得喜出望外。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「と、思われるのなら、ハチロク氏のなさりたいように。\nそれがおそらく、一番確率の高い方法でしょうからな」
2505 = "「既然八六女士這樣認為，那就請你按照自己的想法嘗試，而這也一定是最有可能成功的方法」" 

# 【ハチロク】
# display as 八六
# JP: 「それで構わないのでしたら。わたくしは――\n不死鳥博士のご依頼を、あえてお引き受けいたしません」
2350 = "「如果博士不介意另闢蹊徑，那我就暫且不答應您的請求」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「んふふっ、それで結構ですよ、ハチロク氏。\nでしたら、こちらも依頼内容を変更いたしましょうかな」
2292 = "「嘻嘻，無妨無妨。那我就另有一事有求於二位了」" 

# monologue
# JP: またぞろ、どこかふざけた口調。\nけれど今度のメガネの奥は――とても優しく微笑んでいる。
3403 = "她依然是那種半開玩笑的口氣。可是這一次，她卻露出了非常溫和的笑容。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ハチロク氏は、どうかそのままで。\n双鉄氏とのそのままの日々を示し続けてください」
2122 = "「八六女士，請你保持現狀，繼續展現你與雙鐵先生共同度過的時光」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々を――示す？」
2385 = "「展現——時光？」" 

# 【ハチロク】
# display as 八六
# JP: 「なにを、示せばよろしいのでしょうか？」
2672 = "「究竟是希望我們展現什麼呢？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ハチロク氏と双鉄氏との、あるがままを。\nお互いを思いやり合い支え合う、今の姿を」
2559 = "「正是你們生活中的點點滴滴，是你們關懷彼此，相互扶持的現狀」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ――」
2247 = "「啊啊——」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と人とでも。異なる種族同士さえ\n共存できるということを、示し続けていただきたい」
2814 = "「這便是我希望二位展現的真實。就算是人類與\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，即使是不同種族，也同樣能夠攜手同行」" 

# monologue
# JP: こくり、ハチロクが小さく頷く。
3297 = "八六輕輕地點了點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「頼まれずとも――わたくしは、必ずそのように」
2605 = "「無需博士相求，我也定會維持現狀」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「であれば、大変に助かりますな」
2434 = "「感激不盡」" 

# monologue
# JP: “誰に”示すか。\nハチロクは問わず、不死鳥博士も語らない。
3208 = "不管是八六還是不死鳥博士，都沒有提及要向何人展現。" 

# monologue
# JP: ならば僕らは誰の視線も意識せず、\n僕らのままで、日常を重ね続けていけば良いのだろう。
3543 = "既然如此，我們便只要保持一如既往的日常生活，也無需在意任何人的眼光。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、普通にそうします」
2436 = "「我也會照常行動」" 

# monologue
# JP: ハチロク――すずと、幸せな時間を重ねていく。\n頼まれるほどのこともなく、意識し努力する必要も無い。
3504 = "我會和八六——和鈴一起度過幸福的時光，根本不需要受人所託，也無需刻意努力抑或小心謹慎。" 

# monologue
# JP: ともにあることは、それだけで、\nかくも幸福なのだから。
3372 = "因為能夠與心愛之人共度餘生，於我而言已是無與倫比的幸福。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「なら、あとひとつだけ。\n右田氏には、決断してほしいことがありますな」
2500 = "「於是接下來，我還有一件事，希望能交由右田先生定奪」" 

# 【双鉄】
# display as 雙鐵
# JP: 「決断、ですか。何でしょう？」
2728 = "「要我定奪，請問是什麼事？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「われわれの仮説を真とするなら――\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にも、若返りは起こり得ない」
2097 = "「假設我們的推論全部屬實，那麼即便是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，也不可能返老還童」" 

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「あ！」\n「ああ」
2253 = "「啊！」\\n「啊」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ボディ新造をしようがなにをしようが、\n\x%lタブレット;#00ffc040;タブレット%l;#;は必ず老衰し、やがて、不可避の死を迎える」
2238 = "「哪怕更換身體，亦或是採取其他延壽手段，終究無法避免\\x%lタブレット;#00ffc040;操作板%l;#;的衰老乃至死亡」" 

# monologue
# JP: それはそうだ。仮に種であり、\n世代交代まで見込まれているシステムがあるのなら――
3745 = "顯而易見，如果鐵路人偶真符合物種的特性，甚至具備繁衍後代的機制——" 

# monologue
# JP: 若返りとは、そのシステムを乱す行為にほかならないから。
3720 = "那麼返老還童也無異於會破壞一個物種所必須遵循的自然規律。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ですので」
2506 = "「既然如此」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その決断は、僕が下すべきではありません」
2584 = "「此事不該由我來拿主意」" 

# monologue
# JP: ごく当然と、すずが頷く。\n不死鳥博士は、驚いたような顔をしている。
3631 = "而鈴也點了點頭，不死鳥博士看到我們彷彿理所當然一般的反應，反倒表現得有些吃驚。" 

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ本人に聞きましょう。\n彼女自身が、決めなければならないことがらです」
2444 = "「我們去徵求奧莉薇本人的意見吧。也只有她能為自己的人生做主」" 
