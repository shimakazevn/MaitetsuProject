2264 = "「啊，對不起」" 

# monologue
# JP: ピタリと止まって。
3408 = "她急忙停了下來。" 

# monologue
# JP: （さささささっ）
3757 = "（一陣腳步聲）" 

# monologue
# JP: そこから驚くべき早歩きで、\n一両の小型機関車に近づいていく。
3731 = "隨後奧莉薇快步向前走，以驚人的速度靠近一輛小型機車。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「見て！　ハチロク！　ソーテツ！！\nカウキャッチャー！！」
2920 = "「雙鐵，八六你們快看！！有防撞梁！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
2282 = "「嗯？」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　\nなんと懐かしい……とよ号ではないですか」
2217 = "「哇！著實令人懷念……這不是台與號嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「とよ号？」
2193 = "「台與號？」" 

# monologue
# JP: オリヴィが瞳をキラキラさせて、\nハチロクが懐かしげに見る\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;を、僕も見る。
3540 = "於是我也看向眼前這輛令奧莉薇興奮不已、讓八六感慨萬分的\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;。" 

# monologue
# JP: ……かなり小ぶりだ。\nオリヴィのⅨ号よりも、さらに小さなものに思える。
1464 = "……這輛機車尺寸頗小，感覺甚至比奧莉薇的九號還要袖珍。" 

# 【双鉄】
# display as 雙鐵
# JP: 「見るからに輸入\x%l蒸機;#00ffc040;蒸機%l;#;だな。む。銘板――\nこれは詠語ではないか、ポルタル社と書いてあるが……」
1999 = "「一看就是進口的\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;。唔，看這銘牌——寫的還不是英語，是叫什麼波塔公司……」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Ｈ．Ｋ．ポルタル！　フィッツベルグの会社！！」
2946 = "「Ｈ．Ｋ．Ｐｏｒｔｅｒ！是位於匹茲堡的公司！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。知っているのかオリヴィ」
2304 = "「噢，奧莉薇你知道這公司啊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「知らないわけないよ！\nオールドウィンとおんなじ州のライバルだもん！」
2022 = "「不知道才怪了呢！這家公司跟Ａｌｄｗｉｎ在同一個州，還是競爭關係！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、ご近所さんだったのか」
2837 = "「這麼巧，居然還挨得很近嗎」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ううん。[メーコク,1]冥国広いから！\nおんなじ州でも、200キロもはなれてる！」
2024 = "「不算近，美國地方很大的！即使在同一個州，也隔了有２００公里遠！」" 

# monologue
# JP: いって、オリヴィはおもいっきりに両手を広げる。
3400 = "奧莉薇說罷，便用力伸展雙臂比劃起來。" 

# 【オリヴィ】
# display as 奥莉薇
