2139 = "「剛才對她現狀的形容，用詞可能融入了我的喜好。一言以蔽之，她現在正以關機狀態進行著\\x%l静態保存;#00ffc040;靜態保存%l;#;」" 

# 【双鉄】
# display as 雙鐵
