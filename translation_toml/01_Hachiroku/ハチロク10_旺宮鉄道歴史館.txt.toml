2835 = "「這邊Ａｌｄｗｉｎ所在的費城可是個大城市！而那邊Ｐｏｒｔｅｒ所在的匹茲堡就不算特別出名了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに200キロも離れていれば、相当環境も変わろうな。\n日ノ本でいえば――」
2730 = "「要說在日本的話，的確相隔２００公里的環境是會有很大變化了」" 

# 【ハチロク】
# display as 八六
# JP: 「[ていおう,1]帝央駅から[しずおか,1]靜岡駅をすぎまして、\n[ふじえだ,2]冨士枝駅で、丁度200キロと少しになりますね」
2420 = "「從帝都中央車站，途徑靜岡站到藤枝站，全程剛好就是２００公里多一點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それほどの距離を隔てて、おなじ州なのか。\n冥国は、まことに広大なのだなぁ」
2921 = "「離那麼遠都還屬於一個州，美國可真是幅員遼闊」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよー！！」
2382 = "「就是！！」" 

# monologue
# JP: 冥国のイメージがわずかなりとも具体化されれば、\n腑に落ちてくるような気がする。
3489 = "我得以從奧莉薇的描述中窺見幾分美國的形象，也由此領會些許。" 

# monologue
# JP: オリヴィの明るさと不屈さには、\nそうした産まれも、多少は関係しているのかと。
3461 = "想必奧莉薇的開朗與堅強，也與她的出身不無關係。" 

