2195 = "「右田先生的空凝機導航屬於第一代誕生以前的測試機，也就是所謂的第零代空凝機導航」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2293 = "「噢」" 

# monologue
# JP: その指摘には、驚かない。
3441 = "對於她了解之詳盡，我也沒有感到絲毫驚訝。" 

