2632 = "「畢竟以前在帝國鐵路之類的地方工作都還算公務員待遇，當時有人只是想來鐵路尋個鐵飯碗」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。大廃線以降は……確かに鉄道に、\n職としての安定を求めるひとは、少なかろうなぁ」
