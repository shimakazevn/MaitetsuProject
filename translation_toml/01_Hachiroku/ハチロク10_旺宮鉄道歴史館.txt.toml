2723 = "「若無不妥，我也願意一同享用」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「んふふっ」
2283 = "「嘻嘻」" 

# monologue
# JP: （ひょい！　ひょい！）
3365 = "咻——！" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2294 = "「噢噢」" 

# 【ハチロク】
# display as 八六
# JP: 「わ！」
