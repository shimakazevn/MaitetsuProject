# 【ひよこ】
# display as 不死鳥
# JP: 「いかにも。“それら”は、一切の感情を有しませんな」
2567 = "「正是，“它們”甚至不具備任何情感」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では……うちの――僕の所有しているエアクラの\nエアクラナビは――ほとんど、の中には含まれぬのか」
2885 = "「那麼……我家，也就是我所擁有的空凝機導航，便不在這絕大多數之列嗎」" 

# 【ひよこ】
# display as 不死鳥
