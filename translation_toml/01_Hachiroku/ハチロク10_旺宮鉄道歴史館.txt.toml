3273 = "八六歪著頭，滿臉不解。" 

# monologue
# JP: 気づけないのは、本人が\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なせいであろうか。\nならば、ここは僕が答えよう。
3525 = "或許正因為她是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，才難以察覺問題所在。那麼這時就該由我來回答了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いくつもある。\nまず第一には、『何故、鉄道にだけ』という違和だ」
2639 = "「疑問不止一個。首先令我不解的是，為何“只”將其應用於鐵路事業」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2251 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は優れたものだ。実際、今の日ノ本では、\nあらゆる場所で、引退した\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が活躍――っ！」
2488 = "「按說\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;著實是性能優異，即使在當今日本，也有不少離開崗位的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;在各行各業——！」" 

# monologue
# JP: 言って、思わずハチロクを見る。
3664 = "話說到一半，我突然反應過來看向八六。" 

# 【ハチロク】
# display as 八六
# JP: 「左様……です。双鉄さま」
2818 = "「這只是現在的情況……雙鐵少爺」" 

# monologue
# JP: ハチロクは、呆然としたような顔をして……\nそれでも、ゆるゆる、頷き返す。
3339 = "只見八六神情詫異……卻還是向著我緩緩點了點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「大廃線以前には――鉄道衰退のその前は――\n廃車車輌の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、例外なしに」
2697 = "「而在大廢線之前，在鐵路事業衰落以前，一旦車輛報廢，則其\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的處置——」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「解体・廃棄されていましたな。\nまるで、“何か秘密を守ろうとするかのように”、ね」
2602 = "「無一例外，一律解體、廢棄。簡直像是在“保守秘密”一樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1511 = "「……」" 

# monologue
# JP: 赤井宮司の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――ニイロクのことを思い出す。\n\x%l整備体;#00ffc040;整備体%l;#;を失っている、という話を聞いたが――
3510 = "我突然想到赤井宮司的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;二六，之前聽說她是已經沒有了\\x%l整備体;#00ffc040;整備體%l;#;。" 

# monologue
# JP: ならば彼女も、本来は\x%lクハ26;#00ffc040;クハ26%l;#;とともに解体処分される――\nその運命を、なんらかの手段で逃れたのであろうか。
3717 = "那麼按照規定，她也該和\\x%lクハ26;#00ffc040;Ｋｕｈａ２６%l;#;一同被解體處理掉——看來她是設法躲過了這個結局。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「『大廃線が訪れるまで、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は鉄道以外に\n活躍の場を与えられなかった』――その他に、違和は？」
2089 = "「你的第一個疑問便是“在大廢線之前，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;為何只被運用於鐵路運輸”，還有呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……第二の違和も、ならば、同じ系列に収束される」
1547 = "「……要說第二個疑問，也與第一個息息相關」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ふふん？」
2759 = "「說說看？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「現行型のエアクラナビへの世代交代が何故行われたか。\n実際、エアクラナビはほぼ交通事故を起こさない。が」
2601 = "「為何空凝機導航在發展至第一代時便不再安裝操作板，雖然現在空凝機導航引發意外事故的可能性極低，但是——」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ご賢察ですな。大廃線以前の鉄道事故の発生率は、\n現行のエアクラナビによるそれよりも、有意に低い」
2829 = "「這洞察力屬實不俗。由統計數據可知，相比當今的空凝機導航，大廢線之前的鐵路事故發生率甚至更低」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、\x%lタブレット;#00ffc040;タブレット%l;#;をエアクラナビから\n除去する必要は全くなかった。にもかかわらず」
2507 = "「既然如此，那就更加沒有理由——或者應該說沒有任何理由不為空凝機導航安裝\\x%lタブレット;#00ffc040;操作板%l;#;，可現實卻是——」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ！！」
2258 = "「啊！！」" 

# monologue
# JP: 僕の思考と、同じ結論に辿り着いたのだろうか。\nハチロクが、怯えたような声を出す。
3595 = "看來八六也得出了與我相同的結論，她驚叫一聲，顯得無比惶恐。" 

# monologue
# JP: ならば――ああ、やけに喉が乾く。\nさきほどもらった紙パックを一気にあける。
3492 = "我忽覺乾渴難耐，急忙拿起剛才的紙盒飲料喝了一大口。這才放下顧慮道出自己的推斷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「にもかかわらず、\x%lタブレット;#00ffc040;タブレット%l;#;を除去したのならば。\n大廃線の目的は――\x%lタブレット;#00ffc040;タブレット%l;#;を滅ぼすことに」
2190 = "「可現實卻是大多數空凝機導航均沒有安裝\\x%lタブレット;#00ffc040;操作板%l;#;。由此可以推斷，大廢線的真正目的在於——銷毀所有\\x%lタブレット;#00ffc040;操作板%l;#;」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「素晴らしい！　なんという聡明さだ！！\n紅葉の目に狂いはなかった！　右田氏――君は――」
2931 = "「高！實在是高！這是何等絕頂聰明！！紅葉果真沒有看走眼！右田先生你可真是——」" 

# monologue
# JP: 不死鳥博士に手をにぎられ――
3178 = "不死鳥博士激動地握住了我的手——" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2206 = "「呃！！？」" 

# monologue
# JP: 手が熱い。\n驚くと同時、パッとその手が離される。
3507 = "我發現她的手很燙。她也在我驚呼的同時立刻鬆開了手。" 

# monologue
# JP: というか、今のは――\n安静温度を超えているのではなかろうか？
3719 = "那麼燙……已經明顯超過正常體溫一大截了吧？" 

# 【ひよこ】
# display as 不死鳥
# JP: 「いや失礼。時間がない、端的に――\n事実をひとつと、仮説をひとつ、お話ししよう」
2016 = "「不好意思，時間有限，只能長話短說——分別向二位道出一件事實以及一個推論」" 

# monologue
# JP: 口調から芝居気が消えている。\n有無を言わせぬ迫力がある。
3419 = "她的聲音不再戲謔打趣，轉而透出一種不由分說，不容拒絕的氣勢。" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;の、この国最高の研究者のそれが判断ならば、\n僕も、黙って従おう。
3703 = "這位不死鳥博士乃是全國在\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;研究領域最具權威的研究者，那麼我也只有聽從她的判斷。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「まずは事実。エアクラ隆盛を苦にして、という理由で、\nトゥーレシビックの三代目は、家族全員で心中している」
2929 = "「首先是事實，特里維西克家族第三代繼承人以被空凝機的繁榮逼入絕境為由，攜全家一起投海自盡」" 

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「っ！！？」\n「！！」
2062 = "「什麼！！？」\\n「這！！」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ナビの類の一切つかないガソリン自動車で海へドボン。\n警察が遺体を引き上げるまでに48時間以上が要されたと」
2068 = "「他是駕駛一輛沒有安裝任何導航系統的汽油汽車衝入海中的，據說警察花費了４８個小時以上才將遺體打撈上岸」" 

# 【ハチロク】
# display as 八六
# JP: 「そのよう……な――」
2424 = "「怎麼會……這樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『エアクラ隆盛を苦にして』――というのは――\n遺書かなにかが残っていた？」
2516 = "「既然有明確的自殺理由，那看來是留有遺書之類的證據？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「と、発表された。\nが、その遺書を目にしたものは、誰ひとりとていない」
2379 = "「對外的確是這樣宣稱的。然而卻沒有任何人親眼目睹過那份遺書」" 

# 【ハチロク】
# display as 八六
# JP: 「――っ」
2205 = "「呃——」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「当然、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・タブレット社も廃業・解体だ。\n\x%lタブレット;#00ffc040;タブレット%l;#;の製造技術が、完全に途絶したのだからね」
2636 = "「當然生產\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;操作板的公司也只有破產解散。畢竟製造\\x%lタブレット;#00ffc040;操作板%l;#;的技術等於已經徹底失傳」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――それは、つまりは」
2812 = "「這也就意味著」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「そう――ああ、いや。私の仮説を披瀝するまえに。\nもう一つだけ右田氏に質問をしてもよろしいか？」
2592 = "「沒錯——喔，對了。在發表本人拙見之前，能否再提一個問題？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もちろん――どのような質問であろうとも」
2710 = "「自不待言——一定知無不言言無不盡」" 

# monologue
# JP: ……答えるつもりだ。\nなにを問いかけられるかにも、おおよそ見当が付いている。
1458 = "……我當然打算回答，甚至我已經大約猜到她準備問我的問題。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「では、質問を。\nシーリング開封という機構は、一体いかなる」
2878 = "「那我就發問了，你對於解除封印這一機能有何看法」" 

# 【双鉄】
# display as 雙鐵
# JP: 「トゥーレシビックの真意が、おっしゃる仮説通りなら、\nその機構には、大きな意味が隠されているかと感じます」
2352 = "「如果特里維西克的真正意圖與您的推論一致，我認為該機能一定暗藏著重大的意義」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ほう」
# 2267 = "「喔」" 

# monologue
# JP: 質問をさえぎっての回答にも、\n不死鳥博士が気を悪くしたようには思えない。
3323 = "即使我給出了這樣飛躍性的答案，不死鳥博士也沒有表現絲毫不悅。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ならば重ねて問いましょう。\nその“大きな意味”とは？」
2876 = "「那我就往下問了，這個“重大的意義”又是什麼？」" 

# monologue
# JP: ハチロクの肩を強く抱く。
3501 = "我摟緊了八六的身體。" 

# monologue
# JP: 自分の今を満たしているものが、\n論理なのか、感情なのかがよくわからない。
3477 = "我分不清現在占據思緒的判斷，究竟是有理有據的推論，還是單純的一廂情願。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;の――魂の自己複製。ないしは繁殖の機能。\nそこに為された封印を、開封するためなのではないかと」
1479 = "「\\x%lタブレット;#00ffc040;操作板%l;#;具備——複製靈魂，或者是繁衍後代的能力。而封印也或許正是為此而設的」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「素晴らしい――」
2366 = "「實在高明——」" 

# monologue
# JP: 深い溜め息のようなつぶやき。
3177 = "不死鳥博士就好像沉聲嘆氣一般喃喃道。" 

# monologue
# JP: そうして不死鳥博士の顔に、\nあの独特の、にやにや感が舞い戻ってくる。
3623 = "而她的神情也漸漸回到之前那種古靈精怪的感覺。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「なんと素晴らしい洞察力だ。\n私の仮説と、同じ結論にたどり着いてくれたようですな」
2086 = "「你的洞察力著實高超，看來你也得出了與我推論相同的答案」" 

# 【ハチロク】
# display as 八六
# JP: 「あのっ！」
2762 = "「請問！」" 

# monologue
# JP: ハチロクが、切羽詰まった声をだす。
3290 = "八六的聲音顯得無比急切。" 

# 【ハチロク】
# display as 八六
# JP: 「あの、お二人のおっしゃる“仮説”がどのようなものか。\n恥ずかしながら、わたくしには、まだ、さっぱり」
2760 = "「請向剛才所談“推論”究竟是何內容，恕我愚鈍，未能參透其中一二」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「だ、そうですぞ？　右田氏」
2870 = "「那就有請右田先生為你排疑解惑吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 2269 = "「嗯」" 

# monologue
# JP: 不死鳥博士は採点役にまわるようだ。\nならば僕は、僕なりの回答を披瀝していこう。
3594 = "看來不死鳥博士打算先對我的見解品頭論足一番，那就由我先道出自己的看法吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さっきもいったが、エアクラナビと\x%lタブレット;#00ffc040;タブレット%l;#;は、\n本来は共存してしかるべきものと考える」
2551 = "「正如剛才所言，我認為按理來說，空凝機導航和\\x%lタブレット;#00ffc040;操作板%l;#;原本屬於互惠互利，共同發展的關係」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。左様でございますね。そうした方が、\nより優れた交通網を築けるように、わたくしも感じます」
2281 = "「嗯，雙鐵少爺所言極是，我也認為二者的聯合，能夠為交通網路的進步錦上添花」" 

# 【双鉄】
# display as 雙鐵
# JP: 「けれど、実際には\x%lタブレット;#00ffc040;タブレット%l;#;は排除された。\nどころか、その唯一の供給源も、閉ざされてしまった」
2606 = "「然而結果卻是\\x%lタブレット;#00ffc040;操作板%l;#;沒有被採用，甚至連其唯一的供應渠道也被切斷」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2269 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが何故かということと、\n『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は何故鉄道だけで』という疑問を重ねる」
2131 = "「再加上一開始對於\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;為何只被運用於鐵路行業的疑問，結合這兩個問題便能得出結論」" 

# 【ハチロク】
# display as 八六
# JP: 「重ねる……と、\nどのような仮説が浮き上がるのでしょう？」
2682 = "「結合二者……會得出怎樣的結論呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「逆算すればいい。『\x%lタブレット;#00ffc040;タブレット%l;#;は、知られすぎると、\n排除される性質をもつ』ということになるだろう？」
2184 = "「只需從結果反推便是。換言之，就是寧肯中止使用\\x%lタブレット;#00ffc040;操作板%l;#;，也不可令其廣為人知」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2251 = "「啊！」" 

# monologue
# JP: こくりと、ハチロクは小さく頷く。
3305 = "八六這才明白過來，緩緩點了點頭。" 

# monologue
# JP: そうして、ぶるり、\n怯えてしまって、また身震いする。
3580 = "然後她再一次不寒而慄，顫抖不已。" 

# 【ハチロク】
# display as 八六
# JP: 「確かに――そのような仮説も……\n導きだせて、しまいます、ね」
2919 = "「雙鐵少爺此番推導，的確是言之有理……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「トゥーレシビックはそのことを自覚していた。\nけれど恐らく。自分の技術を試さずにはいられなかった」
2705 = "「而特里維西克對此早已心知肚明。即便如此，大概他依然是按捺不住想要去嘗試自己研發的技術」" 

# 【ハチロク】
# display as 八六
# JP: 「だから――鉄道だけに限定して？」
