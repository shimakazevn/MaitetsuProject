# 【双鉄】
# display as 雙鐵＆八六
# JP: 「ああ！」\n「まあ！」
2252 = "「啊！」\\n「哦！」" 

# monologue
# JP: ハチロクと顔を見合わせる。
3485 = "我和八六都看向彼此。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、『魂』とは――」
2893 = "「那麼所謂的“靈魂”」" 

# 【ハチロク】
# display as 八六
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;に、宿るものなのでしょうか？」
2564 = "「正是源自這\\x%lタブレット;#00ffc040;操作板%l;#;是嗎？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「さて、そこは不明ですな。\n私も、最も知りたく思っておりますところです」
2822 = "「這就無人知曉了，此乃我最想查明的事實真相」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それを知るために、この研究所を？」
2874 = "「那您修建這座研究所，也是為了就此問題一探究竟？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「んふふふふ」
2208 = "「呵呵呵呵」" 

# monologue
# JP: ふざけたような声で笑ってみせるが、\nメガネの奥には、鋭い光が宿っている。
3366 = "單聽她的笑聲或許只有滑稽的感覺，可從那副眼鏡深處卻透出銳利的目光。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「……今までお伝えしたのは事実群。\nここから先は、単なる仮説、となりますな」
1546 = "「……至此告知二位的均為已知事實，而接下來則純屬我個人的推論」" 

# monologue
# JP: 言って、不死鳥博士はスタスタと――
3187 = "不死鳥博士說罷，便快步離開——" 

# monologue
# JP: 自動販売機の前に移動していく。
