2816 = "「這個是舊式美國\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;特有的以尖角造型向車體正面凸出的排障器，也就是剛才說的防撞梁」" 

# 【双鉄】
# display as 雙鐵
