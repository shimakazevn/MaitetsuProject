2446 = "「我對“空凝機導航”的認知，也正是基於對雙鐵少爺所擁有的Ｎａｖｉ的印象」" 

# monologue
# JP: ハチロクの声に頷いている。
3472 = "我也對八六這番話表示贊同。" 

# monologue
# JP: ナビがいるゆえ、僕らはほとんど、\n一般的なエアクラナビに、意識を馳せることがなかった。
3587 = "由於Ｎａｖｉ的存在，對於一般的空凝機導航，我們幾乎沒有特別關注過。" 

# 【ハチロク】
# display as 八六
# JP: 「言われてみれば、ナビと違って――市中に溢れる\nエアクラたちを妹と感じることはございませんね」
2687 = "「經您一番指點，我也注意到和對待Ｎａｖｉ不同，自己從未對於市面上常見的空凝機導航產生如同對待妹妹的感覺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
2535 = "「是這樣嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。彼女……と申しますか、一般的なエアクラナビは、\n恐らく、情報の域でしか\x%l共感;#00ffc040;共感%l;#;を扱い得ぬものかと」
2525 = "「是的。依我的猜測，她們……這些一般的空凝機導航，也許只能進行訊息層面的\\x%l共感;#00ffc040;共鳴%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクたちのように、\n感情をやりとりすることはできんというわけか」
2049 = "「也就是說不能像你們鐵路人偶一樣，進行情感上的交流對嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「ではないかと思います。とはいえ、タクシー相手に、\nそう深い交流を試みたこともございませんが……」
2456 = "「我是這樣認為的，不過我也從未對出租空凝機之類嘗試這些深層次的交流……」" 

# 【ひよこ】
# display as 不死鳥
