2222 = "「哇，真稀罕哎！你這種人可比[Ａｍｅｒｉｃａｎ,2]美國式\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;少見多了！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それほどか？」
2545 = "「有這麼少見？」" 

# monologue
