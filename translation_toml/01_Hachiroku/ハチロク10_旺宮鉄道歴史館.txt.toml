3463 = "想必是電車公主殿下事前已將我和八六的各種情況告知給不死鳥博士了，而且可以說是面面俱到。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「あるいは――\nこう言った方がわかりやすいかもしれませんな」
2056 = "「亦或是這樣解釋可能更易於二位理解」" 

# monologue
# JP: 不死鳥博士が、クイ、とメガネを持ち上げる。
