# lines: 594 
# 【ハチロク】
# display as 八六
# JP: 「まぁ――\nこれは、なんと見事な――」
2228 = "「Oa——\nThật là ngoạn mục làm sao——」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Ｃｏｗ　Ｃａｔｃｈｅｒ！！」
2941 = "「Cow Catcher!!」"

# monologue
# JP: 館内をぐるり見回すハチロクの感嘆を置き去りに、\nオリヴィが一直線にすっ飛んでいく。
3277 = "Bỏ lại sự cảm thán của Hachiroku khi nhìn\nquanh bảo tàng,\nOlivy bay thẳng một mạch về phía trước."

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ、走るな。博物館だぞ」
2341 = "「Olivy, đừng chạy. Đang ở trong bảo tàng\nđấy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ、ごめんっ」
2264 = "「A, xin lỗi.」"

# monologue
# JP: ピタリと止まって。
3408 = "Dừng lại cái rụp."

# monologue
# JP: （さささささっ）
3757 = "（Lạch cạch lạch cạch）"

# monologue
# JP: そこから驚くべき早歩きで、\n一両の小型機関車に近づいていく。
3731 = "Từ đó, cô bé bước đi với tốc độ nhanh đến\nkinh ngạc,\ntiến lại gần một chiếc đầu máy cỡ nhỏ."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「見て！　ハチロク！　ソーテツ！！\nカウキャッチャー！！」
2920 = "「Nhìn kìa! Hachiroku! Soutetsu!!\nCow Catcher!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
2282 = "「Hừm?」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ！　\nなんと懐かしい……とよ号ではないですか」
2217 = "「Oa!\nThật hoài niệm làm sao……đây chẳng phải là\ntàu Toyo sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「とよ号？」
2193 = "「Tàu Toyo?」"

# monologue
# JP: オリヴィが瞳をキラキラさせて、\nハチロクが懐かしげに見る\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;を、僕も見る。
3540 = "Đôi mắt Olivy sáng lấp lánh,\ntôi cũng nhìn vào \\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#; mà\nHachiroku đang ngắm nhìn với vẻ hoài niệm."

# monologue
# JP: ……かなり小ぶりだ。\nオリヴィのⅨ号よりも、さらに小さなものに思える。
1464 = "……Khá là nhỏ gọn.\nCó vẻ còn nhỏ hơn cả Đầu máy số 9 của\nOlivy nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「見るからに輸入\x%l蒸機;#00ffc040;蒸機%l;#;だな。む。銘板――\nこれは詠語ではないか、ポルタル社と書いてあるが……」
1999 = "「Nhìn là biết \\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#; nhập khẩu\nrồi. Hừm. Bảng tên——\nĐây chẳng phải là tiếng Vịnh (tiếng Anh)\nsao, có ghi là công ty Porter nhưng mà……」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「Ｈ．Ｋ．ポルタル！　フィッツベルグの会社！！」
2946 = "「H.K. Porter! Công ty ở Pittsburgh!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。知っているのかオリヴィ」
2304 = "「Ồ. Cậu biết sao Olivy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「知らないわけないよ！\nオールドウィンとおんなじ州のライバルだもん！」
2022 = "「Không biết mới lạ đó!\nLà đối thủ cùng bang với Aldwin mà!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、ご近所さんだったのか」
2837 = "「Ra vậy, hóa ra là hàng xóm à.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ううん。[メーコク,1]冥国広いから！\nおんなじ州でも、200キロもはなれてる！」
2024 = "「Không đâu. Minh Quốc (Nước Mỹ) rộng lắm!\nDù ở cùng một bang, nhưng cũng cách nhau\nđến 200 km lận!」"

# monologue
# JP: いって、オリヴィはおもいっきりに両手を広げる。
3400 = "Nói rồi, Olivy dang rộng cả hai tay ra hết\ncỡ."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「こっち！　オールドウィンのヒラデルヒアは大トカイ！\nあっち！　ポルタルのフィッツベルグはそんなでもない」
2835 = "「Bên này! Philadelphia của Aldwin là một\nđô thị lớn!\nBên kia! Pittsburgh của Porter thì không\nđến mức đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに200キロも離れていれば、相当環境も変わろうな。\n日ノ本でいえば――」
2730 = "「Quả thực nếu cách nhau 200 km, thì môi\ntrường cũng sẽ thay đổi khá nhiều nhỉ.\nNếu ở Hinomoto thì——」"

# 【ハチロク】
# display as 八六
# JP: 「[ていおう,1]帝央駅から[しずおか,1]靜岡駅をすぎまして、\n[ふじえだ,2]冨士枝駅で、丁度200キロと少しになりますね」
2420 = "「Từ ga Teio đi qua ga Shizuoka,\nđến ga Fujieda, là vừa đúng 200 km một\nchút đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それほどの距離を隔てて、おなじ州なのか。\n冥国は、まことに広大なのだなぁ」
2921 = "「Cách xa đến mức đó, mà vẫn ở cùng một\nbang sao.\nMinh Quốc, quả thực rất rộng lớn nhỉ.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だよー！！」
2382 = "「Đúng đó~!!」"

# monologue
# JP: 冥国のイメージがわずかなりとも具体化されれば、\n腑に落ちてくるような気がする。
3489 = "Nếu hình ảnh về Minh Quốc được cụ thể hóa\ndù chỉ một chút,\ntôi cảm giác như mình sẽ hiểu ra được điều\ngì đó."

# monologue
# JP: オリヴィの明るさと不屈さには、\nそうした産まれも、多少は関係しているのかと。
3461 = "Sự tươi sáng và kiên cường của Olivy,\ncó lẽ ít nhiều cũng liên quan đến nơi cô\nbé được sinh ra."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「でも――うん」
2030 = "「Nhưng mà——ừm.」"

# monologue
# JP: オリヴィは小型機関車をにこにこ眺め、\n満足そうに大きく頷く。
3397 = "Olivy tươi cười ngắm nhìn chiếc đầu máy cỡ\nnhỏ,\nvà gật đầu mạnh vẻ hài lòng."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ワルくないね！\nポルタルのカウキャッチャーも！！」
2840 = "「Cũng không tồi nhỉ!\nCow Catcher của Porter ấy!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それを見ろ、と言われていたか」
2302 = "「À, em bảo anh xem cái đó sao.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うん、見て見て！\nオリヴィのⅨ号にも似合うって思わない？」
2273 = "「Ừm, nhìn đi nhìn đi!\nSoutetsu không thấy nó cũng rất hợp với\nĐầu máy số 9 của Olivy sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2231 = "「Ồ.」"

# monologue
# JP: そこまで言われて、ようやく見当がつく。
3636 = "Nghe đến đó, tôi mới lờ mờ hiểu ra."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その、カウキャッチャーというのは」
2887 = "「Nếu vậy thì, cái gọi là Cow Catcher đó\nlà」"

# 【ハチロク】
# display as 八六
# JP: 「旧式の冥国\x%l蒸機;#00ffc040;蒸機%l;#;に特有の、尖って突き出た前方[はいしょうき,2]排障器。\nこれが、カウ・キャッチャアでございます」
2816 = "「Là \\x%l排障器;#00ffc040;bộ gạt vật cản%l;#; nhô nhọn ra phía trước,\nđặc trưng của \\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#; kiểu cũ của\nMinh Quốc.\nĐó chính là Cow Catcher ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「やはりそうか。教えてくれてありがとう」
2547 = "「Quả nhiên là vậy sao. Cảm ơn em đã cho\nanh biết.」"

# monologue
# JP: ハチロクと知識を共有できた。\nそんな些細なことをじんわり、嬉しく思う。
3641 = "Tôi đã có thể chia sẻ kiến thức cùng với\nHachiroku.\nChỉ một điều nhỏ nhặt như vậy thôi, cũng\nkhiến tôi cảm thấy lâng lâng vui sướng."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「って？！　え？　ソーテツ、\nカウキャッチャーのことしらなかったの！？」
2212 = "「Hả?! Ể? Soutetsu,\ncậu không biết về Cow Catcher sao!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。というか、僕が詳しく知っているのは、\n8620とキハ07s。最近になってⅨ号機関車。これで全てだ」
2275 = "「Ừm. Nói đúng ra thì, những gì anh biết rõ\nchỉ là,\n8620 và KiHa 07S. Gần đây mới biết thêm\nĐầu máy số 9. Chỉ có bấy nhiêu thôi.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「えええ！？　双鉄、マニアじゃないの！？\nなのにまいてつで、\x%l機関士;#00ffc040;機関士%l;#;してるの！？」
2328 = "「Ể!? Soutetsu, cậu không phải là fan cuồng\nđường sắt sao!?\nThế mà cậu lại làm \\x%l機関士;#00ffc040;Lái tàu%l;#; cho Maitetsu\n(Đường sắt Ohimitera) á!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「そういうことになるな」
2381 = "「Là vậy đấy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うぇぇー、めっずらしい！\n[メリケン,2]冥国式\x%lレイルロオド;#00ffc040;レイルロオド%l;#;より、よっぽどレアだよー！」
2222 = "「Uây~, hiếm thấy thật đấy!\nCòn hiếm hơn cả \\x%lレイルロオド;#00ffc040;Railord%l;#; kiểu Minh Quốc\n(Mỹ) nhiều đó nha~!」"

# 【双鉄】
# display as 雙鐵
# JP: 「それほどか？」
2545 = "「Đến mức đó sao?」"

# monologue
# JP: こくこくこく。\nオリヴィは何度もおおげさに頷いてみせる。
3401 = "Gật gật gật.\nOlivy gật đầu liên tục một cách đầy khoa\ntrương."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「だって、むかしはさ？　帝鉄とかはオヤカタヒノモトで、\nアンテー求めて鉄道にって人、いたみたいだけど」
2632 = "「Tại vì, ngày xưa ấy? Những nơi như Đường\nsắt Hoàng gia là doanh nghiệp nhà nước,\nnên có vẻ cũng có những người tìm đến\nđường sắt vì muốn sự ổn định.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。大廃線以降は……確かに鉄道に、\n職としての安定を求めるひとは、少なかろうなぁ」
2625 = "「Ra là vậy. Sau cuộc Đại bãi bỏ tuyến\nđường sắt……Quả thực những người,\ntìm kiếm sự ổn định nghề nghiệp ở đường\nsắt, chắc sẽ ít đi nhỉ.」"

# monologue
# JP: うふふ、と小さな笑い声。
3626 = "Ufufu, một tiếng cười nhỏ vang lên."

# monologue
# JP: 思わずそちらに顔を向ければ、\nハチロクは、うっとりした目で僕を見返す。
3491 = "Bất giác quay mặt về phía đó,\nHachiroku đang nhìn lại tôi bằng ánh mắt\nsay đắm."

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまは、御一夜のため。そうして、いくらかは\nわたくしのため――蒸気\x%l機関士;#00ffc040;機関士%l;#;になって下さったのです」
2916 = "「Ngài Soutetsu là vì Ohimitera. Và, một\nphần nào đó,\nlà vì em——nên mới trở thành \\x%l機関士;#00ffc040;Lái tàu%l;#; hơi\nnước ạ.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ！　そーだったっけ。ミズシゲンまもるのに、\nＳＬをシンボルにしたんだよねー」
2257 = "「A! Hình như là vậy nhỉ. Để bảo vệ nguồn\nnước,\nnên mới lấy SL làm biểu tượng đúng không~」"

# 【ハチロク】
# display as 八六
# JP: 「左様です。まことに見事なご差配、ご判断でした」
2579 = "「Đúng vậy ạ. Quả thực là một sự sắp xếp,\nmột quyết định vô cùng tuyệt vời.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっかー」
2827 = "「Vậy sao~」"

# monologue
# JP: オリヴィはこっくり頷き、\nハチロクを見て、僕を見る。
3395 = "Olivy gật gù,\nnhìn Hachiroku, rồi lại nhìn tôi."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ならさ、アマチュアから始めて、こんなにいい\x%l機関士;#00ffc040;機関士%l;#;に\nソーテツがそだったの、ハチロクのおかげだね！」
2896 = "「Thế thì, việc Soutetsu bắt đầu từ một tay\nmơ, mà giờ lại trở thành\nmột \\x%l機関士;#00ffc040;Lái tàu%l;#; cừ khôi như thế này, là nhờ có\nHachiroku nhỉ!」"

# 【ハチロク】
# display as 八六
# JP: 「うふふっ、お褒めいただき光栄です。\nけれど、全ては双鉄さまのご適正とご努力によっての」
2289 = "「Ufufu, được em khen ngợi chị thấy rất\nvinh hạnh.\nNhưng mà, tất cả đều là nhờ vào năng lực\nvà sự nỗ lực của ngài Soutetsu đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そこを謙遜されては寂しい。ハチロクがいて、\n僕がいて――僕らはふたりで、ここまで来たのだから」
2007 = "「Không đâu, em khiêm tốn như vậy làm anh\nbuồn đấy. Có Hachiroku,\nvà có anh——hai chúng ta đã cùng nhau, đi\nđến tận bước đường này mà.」"

# 【ハチロク】
# display as 八六
# JP: 「あ――」
2244 = "「A——」"

# monologue
# JP: ハチロクの目がわずかに潤む。
3291 = "Đôi mắt của Hachiroku hơi rơm rớm."

# monologue
# JP: 誤魔化すようにまばたきし、こっくり、ひとつ大きく頷く。
3575 = "Cô ấy chớp mắt như để che giấu điều đó,\nrồi gật đầu một cái thật mạnh."

# 【ハチロク】
# display as 八六
# JP: 「左様ですね――双鉄さま」
2918 = "「Đúng là vậy nhỉ——ngài Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2269 = "「Ừm.」"

# monologue
# JP: あたたかな嬉しさを強く感じて。\n同時に、気持ちが引き締まる。
3424 = "Tôi cảm nhận sâu sắc một niềm vui ấm áp.\nĐồng thời, tâm trí cũng trở nên vững vàng\nhơn."

# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、僕はまだまだ未熟極まる。\n実際のところ、カウキャッチャーも知らなかったし」
2187 = "「Dù vậy, anh vẫn còn vô cùng thiếu kinh\nnghiệm.\nThực tế thì, anh cũng đâu biết gì về Cow\nCatcher.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーいえばそっか！\nじゃ、ここでたくさんベンキョーしなくちゃねー」
2729 = "「Nhắc mới nhớ, đúng là vậy nhỉ!\nThế thì, cậu phải học hỏi thật nhiều ở đây\nthôi~」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2376 = "「Ừm.」"

# monologue
# JP: 頷けば、ふと思い出す。
3524 = "Gật đầu đồng tình, tôi chợt nhớ ra."

# 【双鉄】
# display as 雙鐵
# JP: 「そういえば――さきほどハチロクは、\nこの車両のことを『とよ号』と呼んでいたな？」
2753 = "「Nhắc mới nhớ——lúc nãy Hachiroku,\nđã gọi phương tiện này là 『Tàu Toyo』 nhỉ?」"

# 【ハチロク】
# display as 八六
# JP: 「はい。[ほっかいどう,2]北開道開拓のため、ポルタル社から輸入された\n歴史的な六両のうちの一両でございますね」
2574 = "「Vâng. Để khai thác Hokkaido, nó là một\ntrong sáu phương tiện mang tính lịch sử\nđược nhập khẩu từ công ty Porter ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「[ほっかいどう,2]北開道開拓――となると、[めいじ,1]明智\x%l蒸機;#00ffc040;蒸機%l;#;か」
2513 = "「Khai thác Hokkaido——vậy thì, là \\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#;\nthời\nMinh Trị sao.」"

# 【ハチロク】
# display as 八六
# JP: 「左様です。こちらの『とよ』は、[めいじ,1]明智１２年の製造。\n開拓のため、最初に輸入された二両のうちの一両です」
2577 = "「Đúng vậy ạ. Chiếc 『Toyo』 này, được chế\ntạo vào năm Minh Trị thứ 12.\nLà một trong hai chiếc đầu tiên được nhập\nkhẩu để phục vụ cho công cuộc khai thác.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2267 = "「Ồ.」"

# 【ハチロク】
# display as 八六
# JP: 「そのときに輸入されたもう一両は、『ひみこ』。\n『ひみこ』様は、今は[きょうと,1]京塗にいると聞いております」
2693 = "「Chiếc còn lại được nhập khẩu vào lúc đó\nlà, 『Himiko』.\nEm nghe nói ngài 『Himiko』, hiện đang ở\nKyoto ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「『ひみこ』に『とよ』――\nならば、この形式は、日ノ本の、女性偉人の名を？」
1507 = "「『Himiko』 và 『Toyo』——\nNếu vậy thì, kiểu máy này, được đặt theo\ntên của những nữ vĩ nhân Hinomoto sao?」"

# 【ハチロク】
# display as 八六
# JP: 「左様でございますね。わたくしがお会いしたことがある\nのは、この『とよ』様だけでございましたが――」
2578 = "「Đúng là vậy ạ. Mặc dù người mà em từng\ngặp,\nchỉ có mỗi ngài 『Toyo』 này thôi nhưng——」"

# monologue
# JP: 懐かしそうに、ハチロクはふっと瞳を閉じる。
3298 = "Hachiroku khẽ nhắm mắt lại, với vẻ đầy\nhoài niệm."

# 【ハチロク】
# display as 八六
# JP: 「『ひみこ』『とよ』『むらさき』『せい』『かすが』\n『ともえ』。みな、車輌も\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も同名だったと」
1505 = "「『Himiko』, 『Toyo』, 『Murasaki』, 『Sei』,\n『Kasuga』,\n『Tomoe』. Nghe nói tất cả, cả phương tiện\nlẫn \\x%lレイルロオド;#00ffc040;Railord%l;#; đều cùng tên ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2151 = "「Ra là vậy.」"

# monologue
# JP: これほどに冥国むき出しな\x%l蒸機;#00ffc040;蒸機%l;#;になぜ、\nそこまで日ノ本ベタベタな名前を、と思ったが。
3480 = "Tôi đã thắc mắc tại sao một \\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#;\nmang đậm chất Minh Quốc (Mỹ) như thế này,\nlại được đặt những cái tên rặt chất\nHinomoto đến vậy."

# monologue
# JP: 『他者の土地』であった北開道への開拓・移住にあえて、\n『日ノ本の女性』の名付けを選んだのであれば――
3431 = "「Nhưng nếu họ cố tình chọn những cái tên\ncủa 『phụ nữ Hinomoto』\nđể đặt cho việc khai thác, di cư đến\nHokkaido, nơi từng là 『vùng đất của người\nkhác』——」"

# 【双鉄】
# display as 雙鐵
# JP: 「かつて、開拓とはそうした覚悟で行われていたのだな。\n今ある形を日ノ本に染め、産み直していくという」
2375 = "「Ngày xưa, công cuộc khai thác đã được\ntiến hành với quyết tâm như vậy nhỉ.\nNhuốm màu Hinomoto lên những hình thái\nhiện có, và tái sinh chúng.」"

# 【ハチロク】
# display as 八六
# JP: 「あ！」
2251 = "「A!」"

# monologue
# JP: ハチロクもはじめて気づいたのか、\n大きく瞳をパチクリさせる。
3260 = "Có lẽ Hachiroku cũng lần đầu tiên nhận ra\nđiều đó,\ncô ấy chớp mắt ngạc nhiên."

# monologue
# JP: その傍らでオリヴィは、わかっているのかいないのか、\nうんうん大きく頷いている。
3625 = "Ở bên cạnh, Olivy không biết có hiểu hay\nkhông,\nnhưng vẫn gật đầu lia lịa."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほんっとカイタクってそういうことだよー！\nモトからあったものを、ハネトバシテくってこと！！」
2821 = "「Khai thác thực sự là như vậy đó~!\nLà hất văng đi những thứ vốn có từ\ntrước!!」"

# monologue
# JP: 言ってぽんっ、と、\nオリヴィの手がカウキャッチャーを――！
3668 = "Nói rồi bộp một cái,\ntay của Olivy vỗ lên chiếc Cow Catcher——!"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　だからカウキャッチャーは――\n跳ね飛ばすため、それほどに鋭く突き出ているのか」
2296 = "「A! Ra là vì thế nên Cow Catcher mới——\nnhô ra nhọn hoắt như vậy, là để hất văng\nmọi thứ sao.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そだよー！　Ⅸ号だってカウキャッチャーあったら\nバッファローをポーンてはねとばしちゃうんだから！」
2378 = "「Đúng vậy đó~! Nếu Đầu máy số 9 mà có Cow\nCatcher,\nthì cũng có thể hất văng cả trâu rừng\n(Buffalo) luôn đó nha!」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2297 = "「!」"

# monologue
# JP: 瞬間、ひらめく。
3153 = "Khoảnh khắc đó, một tia sáng lóe lên trong\nđầu tôi."

# monologue
# JP: これこそが――ポーレットの言っていた、\n『冥国\x%l蒸機;#00ffc040;蒸機%l;#;らしさ』のひとつなのではなかろうか。
3494 = "Đây chính là——một trong những điều mà\nPaulette đã nói,\n『nét đặc trưng của \\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#; Minh\nQuốc』 chẳng phải sao."

# 【ハチロク】
# display as 八六
# JP: 「Ⅸ号には、カウ・キャッチャアがついていたのですか？\nもしもそうなら、それは、今は――」
2044 = "「Đầu máy số 9, đã từng được gắn Cow\nCatcher sao ạ?\nNếu vậy thì, cái đó, bây giờ——」"

# monologue
# JP: ハチロクも、同じことを感じてくれたのだろうか？
3214 = "Có lẽ Hachiroku, cũng đã cảm nhận được\nđiều tương tự chăng?"

# monologue
# JP: やや前のめりの質問に、\nしかしオリヴィは、申し訳なさそうな顔をして首を振る。
3738 = "Trước câu hỏi có phần vồ vập đó,\nOlivy lại lắc đầu với vẻ mặt đầy áy náy."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「んーん、Ⅸ号にはついてたことないんだー。\nカウキャッチャー」
2038 = "「Không đâu, Đầu máy số 9 chưa từng được\ngắn đâu~.\nCow Catcher ấy.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ、左様なのですか」
2234 = "「Oa, ra là vậy sao ạ.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「むかしはねー、キュートなリンク式\x%l連結器;#00ffc040;連結器%l;#;がついてたの。\n今は、でっかい自動\x%l連結器;#00ffc040;連結器%l;#;にこーかんされてるけど」
2074 = "「Ngày xưa ấy, nó được gắn một cái \\x%l連結器;#00ffc040;khớp nối toa xe%l;#;\ndạng chốt liên kết rất dễ thương.\nNhưng bây giờ, đã bị đổi thành cái \\x%l連結器;#00ffc040;khớp nối toa xe%l;#;\ntự động to đùng rồi.」"

# monologue
# JP: でっかい、の一言は苦笑まじりだ。
3392 = "Chữ \"to đùng\" được thốt ra kèm theo một nụ\ncười gượng."

# monologue
# JP: 確かに自連は共通規格。\n小柄なⅨ号に取り付くと、いかにも大きなものに見える。
3313 = "Quả thực khớp nối tự động là quy chuẩn\nchung.\nKhi gắn vào một Đầu máy số 9 nhỏ bé, trông\nnó thực sự rất to."

# 【ハチロク】
# display as 八六
# JP: 「それは[いささ]些か残念ですね。Ⅸ号にカウ・キャッチャアが\nついている姿は、さぞかわいらしいものでしょうに」
2820 = "「Vậy thì có chút đáng tiếc nhỉ. Nếu Đầu\nmáy số 9 mà được gắn\nCow Catcher, thì trông chắc chắn sẽ rất\nđáng yêu đấy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチロクもそう思う！？\nオリヴィもすっごくそー思う！！！」
2119 = "「Hachiroku cũng nghĩ vậy sao!?\nOlivy cũng nghĩ vậy đó!!!」"

# monologue
# JP: オリヴィは真正面からトヨ号のカウキャッチャーを見。\nついでぺったりしゃがみこみ、しばし無言で見上げる。
3394 = "Olivy nhìn thẳng vào chiếc Cow Catcher của\ntàu Toyo.\nRồi cô bé ngồi bệt xuống, lặng lẽ ngước\nnhìn nó một lúc lâu."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど、[じれん,1]自連あるからカウキャッチャーつけられないよね。\nカウキャッチャー、連結の邪魔になっちゃうもん」
2031 = "「Nhưng mà, vì có khớp nối tự động nên\nkhông thể gắn Cow Catcher được nhỉ.\nCow Catcher, sẽ làm vướng víu việc nối toa\nmất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――そう断言するのは早かろう」
2035 = "「Không——Khẳng định như vậy vẫn còn hơi sớm\nđấy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツ？」
2914 = "「Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕は見てきた。日々姫の仕事を。デザインとは、\n不可能に思える配置を整頓で可能にするものなのだと」
2842 = "「Anh đã chứng kiến. Công việc của Hibiki.\nThiết kế là,\nbiến những cách bố trí tưởng chừng như\nkhông thể thành có thể thông qua việc sắp\nxếp lại.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ！　確かに、わたくしたち素人の目には、\n不可能としか思えないようなことでも――」
2377 = "「A! Quả thực, trong mắt những kẻ nghiệp dư\nnhư chúng ta,\ndù là những việc tưởng chừng như không\nthể——」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。日々姫なら、あるいはより熟練の高い専門家なら、\nなんらかの解決策を見出してくれるかもしれない」
2572 = "「Ừm. Nếu là Hibiki, hoặc những chuyên gia\nlành nghề hơn,\nbiết đâu họ sẽ tìm ra được một giải pháp\nnào đó.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなの！？」
2656 = "「Thật sao!?」"

# monologue
# JP: オリヴィの目がキラキラしている。\nカウキャッチャーと一声叫んで駆け出したときと同じに。
3391 = "Đôi mắt Olivy sáng lấp lánh.\nGiống hệt như lúc cô bé hét lên \"Cow\nCatcher\" rồi chạy vọt đi vậy."

# monologue
# JP: この輝きを消したくはない。\nそうと思えば、思考もさらに連鎖していく。
3503 = "Tôi không muốn dập tắt ánh sáng này.\nNghĩ vậy, dòng suy nghĩ của tôi lại càng\ntiếp tục liên kết với nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「というか、既に実現化された例もあるかもしれん。\nせっかく鉄道歴史館に来ているのだから、ここの資料を」
2626 = "「Mà nói đúng hơn, biết đâu đã có ví dụ\nđược hiện thực hóa rồi cũng nên.\nĐã cất công đến Bảo tàng Lịch sử Đường sắt\nrồi, thì chúng ta nên xem tài liệu ở\nđây——」"

# monologue
# JP: （パチ、パチ、パチ）
3764 = "（Lộp bộp, lộp bộp, lộp bộp）"

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 2282 = "「嗯？」" 

# monologue
# JP: 背後から、とても静かな拍手。\n何事なのかと振り返る。
3691 = "Từ phía sau, vang lên những tiếng vỗ tay\nrất khẽ.\nTôi quay lại xem có chuyện gì."

# 【ひよこ】
# display as ？？？
# JP: 「良いアプローチですな。右田氏」
2197 = "「Một hướng tiếp cận rất tốt đấy. Anh\nMigita.」"

# monologue
# JP: 眼鏡の女性――いや、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、\nカツカツと足音を立て、近づいてくる。
3439 = "Một người phụ nữ đeo kính——không, một \\x%lレイルロオド;#00ffc040;Railord%l;#;\n,\nbước tới gần với những tiếng cộc cộc."

# monologue
# JP: 笑顔、と一言で表現するのがはばかられる、\nどこかニヤついた――でなければ作ったような表情で。
3423 = "Thật khó để diễn tả đó là một nụ cười,\nmột biểu cảm có phần nhếch mép——hoặc nếu\nkhông thì là một biểu cảm gượng gạo."

# 【ひよこ】
# display as ？？？
# JP: 「[もみじ,1]紅葉がなぜ、右田氏にことさら目をかけているのかも、\nふむ――多少は理解できました」
2277 = "「Tại sao Momiji lại đặc biệt để mắt đến\nanh Migita,\nhừm——tôi cũng phần nào hiểu được rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「もみじ？」
2678 = "「Momiji?」"

# 【ひよこ】
# display as ？？？
# JP: 「ああ、今の名前はアキでしたな。毛利安芸。\nんふふっ。ま、世にいうところの電車姫ですな」
2233 = "「À, tên bây giờ là Aki nhỉ. Mouri Aki.\nNfufu. Mà, người đời thường gọi là Công\nchúa Xe điện đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2251 = "「啊！」" 

# monologue
# JP: ハチロクがぽんと手を鳴らし僕をみる。\n頷き返せば、少しよそ行きの声が出て来る。
3278 = "Hachiroku vỗ tay bộp một cái rồi nhìn tôi.\nKhi tôi gật đầu đáp lại, cô ấy cất giọng\nvới một chút khách sáo."

# 【ハチロク】
# display as 八六
# JP: 「でしたら、貴方が、[シゴナナ,2]Ｃ５７[イチヨンゴオ,2]１４５の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですのね？\n確か、お名前が――」
2890 = "「Nếu vậy, cô chính là \\x%lレイルロオド;#00ffc040;Railord%l;#; của C57 145\nđúng không?\nTôi nhớ, tên cô là——」"

# 【ひよこ】
# display as ？？？
# JP: 「ああ、本当の名前は好みませんでな。\n差し支えなければ、[いみょう,1]異名の方で呼んでいただければ」
2262 = "「À, tôi không thích cái tên thật của mình\ncho lắm.\nNếu không phiền, xin hãy gọi tôi bằng biệt\ndanh.」"

# 【ハチロク】
# display as 八六
# JP: 「ご[いみょう,1]異名、でございますか？\n確か――“不死鳥”」
2321 = "「Biệt danh, sao ạ?\nTôi nhớ là——\"Phượng Hoàng Lửa\".」"

# 【ひよこ】
# display as 不死鳥
# JP: 「いかにもいかにも、所員などは[わたくし]私のことを、\n“不死鳥博士”と呼びますなぁ」
2561 = "「Đúng vậy đúng vậy, các nhân viên ở đây\nthường gọi tôi là,\n\"Tiến sĩ Phượng Hoàng Lửa\" đấy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「フシチョーハカセ」
2017 = "「Tiến sĩ Phượng Hoàng Lửa.」"

# monologue
# JP: 思わず、といった感じでオリヴィがオウム返しする。
3396 = "Olivy lặp lại như một con vẹt trong vô\nthức."

# monologue
# JP: その反応を見、不死鳥博士は満足そうに、\nメガネの奥の瞳を細める。
3442 = "Nhìn thấy phản ứng đó, Tiến sĩ Phượng\nHoàng Lửa có vẻ hài lòng,\nnheo đôi mắt sau lớp kính lại."

# 【ひよこ】
# display as 不死鳥
# JP: 「[えいご,1]詠語圏の研究者などは――\nんふふっ！　ドクター・フェニックスとも！」
2716 = "「Các nhà nghiên cứu ở khu vực nói tiếng\nVịnh (tiếng Anh) thì——\nNfufu! Còn gọi tôi là Doctor Phoenix nữa!」"

# monologue
# JP: 言葉とともに、バサリ、大きく服がひらめく。
3233 = "Cùng với lời nói, bộ quần áo tung bay phần\nphật."

# monologue
# JP: いや――これは――\nポーズを、多分。決めている、のだ。
3158 = "Không——cái này là——\nCó lẽ. Cô ta đang tạo dáng."

# 【ひよこ】
# display as 不死鳥
# JP: 「その方が私に似合うと思いませんかな？　右田氏」
2198 = "「Anh không thấy cái tên đó hợp với tôi hơn\nsao? Anh Migita.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……まぁ、確かに。どちらかを選べと言われれば」
1550 = "「……Chà, quả thực. Nếu bị bắt phải chọn một\ntrong hai thì.」"

# monologue
# JP: 本当の名前。それは、電車姫さまから教えていただいた、\n『ひよこ』という名前のことだろう。
3633 = "Tên thật. Chắc hẳn là cái tên mà Công chúa\nXe điện đã cho chúng tôi biết,\ncái tên 『Hiyoko』."

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;には極めて珍しい眼鏡をぴたりとかけこなす、\nその理知的な外観には、確かに似つかわしくはない。
3412 = "Quả thực nó không hề phù hợp với vẻ ngoài\ntrí thức,\nđeo một cặp kính cực kỳ hiếm thấy ở các \\x%lレイルロオド;#00ffc040;Railord%l;#;\ncủa cô ta."

# monologue
# JP: （ああ。ならばさっきの『もみじ』というのも――\n電車姫様の異名のようなものなのか？）
3759 = "（A. Nếu vậy thì cái tên 『Momiji』 lúc nãy——\ncũng giống như một biệt danh của Công chúa\nXe điện sao?）"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ドっ――ドク、ター……フェニ、くすっ」
2943 = "「Do——Doc, tor……Phoe, nix. Phụt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「むっ！？」
2271 = "「Hử!?」"

# monologue
# JP: オリヴィが真下を向いて、背中を丸めて震えている。
3393 = "Olivy cúi gằm mặt xuống, cuộn tròn lưng\nlại và run rẩy."

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　オリヴィ。まさか体調が――」
2337 = "「Sao vậy? Olivy. Không lẽ sức khỏe lại——」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あははははははは！　なにそれ！　面白い！！\nすごい！　ほんっとカワリモノだねー！！」
2246 = "「Ahahahahahahaha! Gì vậy chứ! Buồn cười\nquá đi!!\nTuyệt thật! Đúng là đồ kỳ quặc mà~!!」"

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！？　いくら本当のことであっても、\n口に出してはいけないことがございますよ！？」
2338 = "「Olivy-chan!? Dù có là sự thật đi chăng\nnữa,\nthì cũng có những chuyện không được nói ra\nkhỏi miệng đâu đấy!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、その発言もどうかと思うぞ」
2010 = "「Không, anh thấy câu nói đó của em cũng có\nvấn đề đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
2260 = "「A!?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「んふふふふふっ。\n実にいい反応ですな。興味深い」
2286 = "「Nfufufufufu.\nMột phản ứng thực sự rất tốt. Rất thú vị.」"

# monologue
# JP: ドクター……いや、不死鳥博士は鷹揚に笑い、\nオリヴィにつかつか近づいていく。
3767 = "Doctor……không, Tiến sĩ Phượng Hoàng Lửa\ncười một cách điềm nhiên,\nrồi sải bước tiến lại gần Olivy."

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わっ！？」
2218 = "「Oái!?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ふぅむ」
2270 = "「Hừm.」"

# monologue
# JP: 近い。近い。\n鼻と鼻とがくっつきそうだ。
3217 = "Gần quá. Gần quá rồi.\nMũi với mũi sắp chạm vào nhau đến nơi rồi."

# monologue
# JP: 硬直してしまうオリヴィのことを、不死鳥博士は、\n至近距離からじっくりじっくり眺め回す。
3399 = "Tiến sĩ Phượng Hoàng Lửa từ cự ly cực gần,\nnhìn chằm chằm vào Olivy đang cứng đờ\nngười."

# 【ひよこ】
# display as 不死鳥
# JP: 「前よりは状態がよさそうで安心です。\nいい生活を送っているようですな。オリヴィ氏」
2339 = "「Trông tình trạng có vẻ tốt hơn trước nên\ntôi cũng yên tâm rồi.\nCó vẻ cô đang có một cuộc sống rất tốt\nnhỉ. Cô Olivy.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「へ！？　オリヴィ、ドクター・フェニックスと\nあったことなんて一回もないと――あっ！」
2210 = "「Hả!? Olivy, chưa từng gặp Doctor Phoenix\nmột lần nào cả——A!」"

# 【ひよこ】
# display as 不死鳥
# JP: 「そう。私はここの実質的な館長でありますからな。\nオリヴィ氏のことは、一方的に知っています」
2084 = "「Đúng vậy. Vì tôi là giám đốc thực sự ở\nđây mà.\nTôi chỉ đơn phương biết về cô Olivy thôi.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「うう。なんかイヤないいかた～」
2268 = "「Ư ư. Cách nói nghe ghét ghê á~」"

# 【ひよこ】
# display as 不死鳥
# JP: 「そうですかな？　これは失礼。\nでは、改めましょう」
2587 = "「Vậy sao? Thật thất lễ quá.\nVậy thì, tôi xin phép làm lại.」"

# monologue
# JP: （すっ）
3665 = "（Vút）"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わぉ」
2214 = "「Oa.」"

# monologue
# JP: 不死鳥博士が跪き、\nオリヴィの手をとり唇を寄せる。
3176 = "Tiến sĩ Phượng Hoàng Lửa quỳ xuống,\ncầm lấy tay Olivy và đặt môi lên đó."

# 【ひよこ】
# display as 不死鳥
# JP: 「対面としては、初めまして、ミス・オリヴィ。\nどうか、私を見知りおいていただきたいものですな」
2948 = "「Nếu nói về việc gặp mặt trực tiếp, thì\nđây là lần đầu tiên, Miss Olivy.\nXin hãy chiếu cố cho tôi nhé.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほしいもなにも、一度みたらわすれっこないよー！\nよろしくね、ドクター・フェニックス！」
2019 = "「Chiếu cố gì chứ, nhìn thấy một lần là\nkhông thể nào quên được luôn đó~!\nMong được giúp đỡ nha, Doctor Phoenix!」"

# 【ひよこ】
# display as 不死鳥
# JP: 「そして」
2076 = "「Và」"

# monologue
# JP: （すいっ）
3761 = "（Vút）"

# monologue
# JP: 不死鳥博士が取ろうとした手をさり気なく避け、\nハチロクは優雅にスカートの裾をつまんでみせる。
3262 = "Nhẹ nhàng né tránh bàn tay mà Tiến sĩ\nPhượng Hoàng Lửa định nắm lấy,\nHachiroku ưu nhã nhón lấy gấu váy của\nmình."

# 【ハチロク】
# display as 八六
# JP: 「わたくしは、御一夜鉄道8620専用\x%lレイルロオド;#00ffc040;レイルロオド%l;#;、\nハチロクです。どうぞ、よろしくお願いいたします」
2451 = "「Tôi là \\x%lレイルロオド;#00ffc040;Railord%l;#; chuyên dụng của 8620 thuộc\nĐường sắt Ohimitera,\nHachiroku. Xin được chiếu cố ạ.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「こちらこそ」
2450 = "「Tôi cũng vậy.」"

# monologue
# JP: 不死鳥博士は静かに立ち、ハチロクに右手を差し伸べる。
3189 = "Tiến sĩ Phượng Hoàng Lửa lặng lẽ đứng lên,\nchìa tay phải về phía Hachiroku."

# monologue
# JP: ハチロクはその手は避けずに受け取って、\n上品な笑顔で握手を交わす。
3306 = "Hachiroku không né tránh mà đón lấy bàn\ntay đó,\nvà trao đổi một cái bắt tay với nụ cười\nthanh lịch."

# 【ひよこ】
# display as 不死鳥
# JP: 「そのご反応。なるほど、右田氏はハチロク氏にとって、\n『最良のマスター』であるようですな」
2092 = "「Phản ứng đó. Ra là vậy, đối với cô\nHachiroku, anh Migita\ncó vẻ như là một 『Master tốt nhất』 nhỉ.」"

# 【ハチロク】
# display as 八六
# JP: 「っ！！！」
2259 = "「!!!」"

# monologue
# JP: 一瞬でハチロクが真っ赤に染まる。\n不死鳥博士がにやりと笑い――その表情に思い出す。
3299 = "Trong chớp mắt, khuôn mặt Hachiroku đỏ\nbừng lên.\nTiến sĩ Phượng Hoàng Lửa nhếch mép\ncười——biểu cảm đó khiến tôi nhớ lại."

# monologue
# JP: 先立っての僕らのやりとりを“いい反応”と評していたが、\nなるほどあるいは、そういうことであるのかもしれん。
3630 = "Lúc nãy cô ta đã đánh giá cuộc đối thoại\ncủa chúng tôi là \"phản ứng tốt\",\nra là vậy, có lẽ là ý đó."

# 【双鉄】
# display as 雙鐵
# JP: 「……予想外の行動は、準備されていない反応を引き出す。\nそこから情報を読み取る――というやり方もあるのか」
1552 = "「……Những hành động bất ngờ, sẽ kéo theo\nnhững phản ứng không được chuẩn bị trước.\nTừ đó đọc được thông tin——cũng có cách làm\nnhư vậy sao.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ほお」
2293 = "「Ồ.」"

# monologue
# JP: ぱっとハチロクから手をほどき、\n不死鳥博士が僕にカツカツ近づいてくる。
3185 = "Buông tay Hachiroku ra một cách dứt khoát,\nTiến sĩ Phượng Hoàng Lửa tiến lại gần tôi\nvới những tiếng cộc cộc."

# 【ひよこ】
# display as 不死鳥
# JP: 「質の高い考察ですな。右田氏」
2201 = "「Một sự suy xét rất chất lượng đấy. Anh\nMigita.」"

# monologue
# JP: そうしてニコリ。\nさっきまでとは温度の違う、自然な笑みがふうわり浮かぶ。
3667 = "Rồi cô ta mỉm cười.\nMột nụ cười tự nhiên, khác hẳn với nhiệt\nđộ lúc nãy, khẽ nở trên môi."

# 【ひよこ】
# display as 不死鳥
# JP: 「んふふふふふふ。\n紅葉が何故あなたに目をかけているか、納得しました」
2288 = "「Nfufufufufufu.\nTại sao Momiji lại để mắt đến anh, tôi đã\nhiểu rồi.」"

# 【オリヴィ】
# display as 奥莉薇
# JP: 「それじゃ、オリヴィみてもらってくるねー」
2864 = "「Vậy thì, Olivy đi kiểm tra đây~」"

# 【ハチロク】
# display as 八六
# JP: 「はい。オリヴィちゃん。またのちほど」
2347 = "「Ừm. Olivy-chan. Lát nữa gặp lại nhé.」"

# monologue
# JP: 笑顔でぶんぶん手をふって、\n研究員らしき女性につれられ、オリヴィが奥へ消えていく。
3398 = "Vừa cười vừa vẫy tay rối rít,\nOlivy được một người phụ nữ có vẻ là\nnghiên cứu viên dẫn đi vào trong."

# 【双鉄】
# display as 雙鐵
# JP: 「まさか、当日に検査をいただけるとは――」
2655 = "「Không ngờ, lại được kiểm tra ngay trong\nngày——」"

# 【ひよこ】
# display as 不死鳥
# JP: 「[せん]先だって紅葉からも頼まれていましたからな。\nオリヴィが来たら、有意識検査をぜひに、と」
2634 = "「Vì trước đó Momiji cũng đã nhờ vả rồi mà.\nBảo là nếu Olivy đến, thì nhất định phải\nlàm kiểm tra có ý thức.」"

# monologue
# JP: はてな、とハチロクが小首を傾げる。
3296 = "Hachiroku hơi nghiêng đầu vẻ khó hiểu."

# 【ハチロク】
# display as 八六
# JP: 「有意識検査、でございますか？」
2317 = "「Kiểm tra có ý thức, sao ạ?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「いかにも。\n文字通りに有意識で行われる検査ですな」
2553 = "「Đúng vậy.\nĐúng như tên gọi, là cuộc kiểm tra được\ntiến hành trong trạng thái có ý thức.」"

# 【双鉄】
# display as 雙鐵
# JP: 「と、おっしゃると――通常の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の検査は、\n無意識状態で行われるものなのですか？」
2881 = "「Nói vậy tức là——kiểm tra \\x%lレイルロオド;#00ffc040;Railord%l;#; thông\nthường,\nđược tiến hành trong trạng thái vô thức\nsao?」"

# 【ハチロク】
# display as 八六
# JP: 「はい、左様です」
2557 = "「Vâng, đúng vậy ạ.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の各種法定検査は、\n全て\x%lタブレット;#00ffc040;タブレット%l;#;を外され、非・起動状態で行われますな」
1488 = "「Các loại kiểm tra theo luật định của \\x%lレイルロオド;#00ffc040;Railord%l;#;\n,\ntất cả đều được tiến hành trong trạng thái\ntháo \\x%lタブレット;#00ffc040;thẻ bảng%l;#;, tức là trạng thái không\nkhởi động.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2825 = "「Ồ.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「法定検査はハード面での検査ですからな。\n意識がある状態では、エラーを招く危険が高いのですよ」
2633 = "「Vì kiểm tra theo luật định là kiểm tra về\nmặt phần cứng mà.\nTrong trạng thái có ý thức, nguy cơ gây ra\nlỗi là rất cao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……なんとなく理解できるように思います」
2230 = "「À……tôi nghĩ mình phần nào hiểu được rồi.」"

# monologue
# JP: 例えは悪いが、ＰＣの部品交換は電源を落とした状態で――\nに類似した理由であろう。
3378 = "Dù ví von hơi tệ, nhưng có lẽ cũng giống\nnhư việc\nthay thế linh kiện PC trong trạng thái đã\ntắt nguồn vậy."

# monologue
# JP: 通電、ましてＯＳを走らせた状態での作業など、\n作業者にもＰＣにも、大きなリスクを与えるだけだ。
3427 = "Việc thao tác trong trạng thái đang cắm\nđiện, huống hồ là đang chạy hệ điều hành,\nchỉ mang lại rủi ro lớn cho cả người thao\ntác lẫn PC mà thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「となると、有意識検査は、ハードウェア面以外に\n対して行う検査となりますか」
2898 = "「Vậy thì, kiểm tra có ý thức, là cuộc kiểm\ntra\nđược tiến hành đối với những khía cạnh\nngoài phần cứng sao.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「いかにもいかにも。通常の検査は、ほんの数ヶ月前に、\nみかん鉄道さんからのご依頼で完了しておりますしな」
2487 = "「Đúng vậy đúng vậy. Kiểm tra thông thường\nthì mới vài tháng trước,\nchúng tôi đã hoàn thành theo yêu cầu của\nĐường sắt Mikan rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「でしたら有意識検査とは――\nこころのお手当、的な検査となるのでしょうか？」
2892 = "「Nếu vậy thì kiểm tra có ý thức là——\nMột cuộc kiểm tra mang tính chất, chăm sóc\ntâm hồn sao ạ?」"

# monologue
# JP: ハチロクの問いに、\n不死鳥博士は、やや大げさに眉を持ち上げる。
3184 = "Trước câu hỏi của Hachiroku,\nTiến sĩ Phượng Hoàng Lửa nhướng mày lên\nmột cách hơi khoa trương."

# 【ひよこ】
# display as 不死鳥
# JP: 「ほう。なぜそう思われますかな？\nハチロク氏には、もしやそのような経験が？」
2307 = "「Ồ. Tại sao cô lại nghĩ như vậy?\nChẳng lẽ cô Hachiroku, đã từng có kinh\nnghiệm như thế sao?」"

# 【ハチロク】
# display as 八六
# JP: 「はい。登呂流湯のご主人に」
2529 = "「Vâng. Với chủ nhà tắm Tororyu-yu ạ.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「トロルユ――　[とろ,1]登呂元[ぎかん,1]技官！\nああ、そういえばあの方は[おひとよ,2]御一夜にご在住でしたな」
2644 = "「Tororyu-yu——Cựu kỹ quan Toro!\nÀ, nhắc mới nhớ, bà ấy đang sống ở\nOhimitera nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「面識がおありなのですか」
2652 = "「Cô có quen biết bà ấy sao?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「直接は、残念極まることに、ほんの数度のみ。\nですが、論文は精読させていただきましたな」
2367 = "「Gặp trực tiếp thì, thật vô cùng đáng\ntiếc, chỉ mới vài lần thôi.\nNhưng mà, luận văn của bà ấy thì tôi đã\nđọc rất kỹ rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「論文」
2764 = "「Luận văn.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「[Ｄｅｃｒｅａｓｅ　ａｔｔｒｉｔｉｏｎｒａｔｅ　ｏｆ　ｒａｉｌｌｏｒｄｓ　ｂｙ　ｍｅｎｔａｌｃａｒｅ,22]『メンタルケアによるレイルロオド損耗率の軽減』」
1475 = "「『Giảm thiểu tỷ lệ hao mòn của Railord\nthông qua chăm sóc tinh thần』.」"

# 【ハチロク】
# display as 八六
# JP: 「まぁ」
2213 = "「Oa.」"

# monologue
# JP: 聞いた瞬間、ハチロクが目を丸くする。
3258 = "Khoảnh khắc nghe thấy điều đó, Hachiroku\ntròn xoe mắt."

# monologue
# JP: その反応を予期していたかのように、\n不死鳥博士は、気分よさげに頷き、続ける。
3618 = "Như thể đã lường trước được phản ứng đó,\nTiến sĩ Phượng Hoàng Lửa gật đầu vẻ đắc ý,\nrồi nói tiếp."

# 【ひよこ】
# display as 不死鳥
# JP: 「帝鉄全盛期。\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は消耗保安部品。\n長寿命化など考える者もいなかった時期の、論文ですな」
2315 = "「Thời kỳ hoàng kim của Đường sắt Hoàng\ngia. \\x%lレイルロオド;#00ffc040;Railord%l;#; chỉ là linh kiện bảo đảm an\ntoàn tiêu hao.\nLà luận văn vào cái thời mà chẳng có ai\nnghĩ đến việc kéo dài tuổi thọ cho các cô\ncả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。その時期から登呂流湯のご主人は、\nそうした研究をされていたのですか」
2153 = "「Ra là vậy. Từ thời điểm đó chủ nhà tắm\nTororyu-yu,\nđã tiến hành những nghiên cứu như vậy rồi\nsao.」"

# monologue
# JP: 消耗保安部品。
3432 = "Linh kiện bảo đảm an toàn tiêu hao."

# monologue
# JP: その文字列が、そのまま帝鉄式の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の扱いだと、\nここしばらくで、僕もいくらかは理解できてきた。
3705 = "Chuỗi ký tự đó, chính là cách đối xử với \\x%lレイルロオド;#00ffc040;Railord%l;#;\ntheo kiểu Đường sắt Hoàng gia,\ntrong một thời gian gần đây, tôi cũng đã\nphần nào hiểu được."

# 【双鉄】
# display as 雙鐵
# JP: 「当時としては、さぞ異端の研究だったのでしょうね」
2813 = "「Vào thời điểm đó, chắc hẳn đây là một\nnghiên cứu dị giáo lắm nhỉ.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「当時も。ですな。今は\x%lレイルロオド;#00ffc040;レイルロオド%l;#;研究そのものが、\n極めて異端となりましたから」
2757 = "「Kể cả lúc đó. Bây giờ thì bản thân việc\nnghiên cứu \\x%lレイルロオド;#00ffc040;Railord%l;#;,\ncũng đã trở nên cực kỳ dị giáo rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2269 = "「嗯」" 

# 【ハチロク】
# display as 八六
# JP: 「登呂流湯のご主人は――あの方は、大廃線以前から\nずっと、わたくしたち、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;のことを――」
2645 = "「Chủ nhà tắm Tororyu-yu——Bà ấy, từ trước\ncuộc Đại bãi bỏ tuyến đường sắt\nđã luôn, nghĩ cho \\x%lレイルロオド;#00ffc040;Railord%l;#; chúng em——」"

# monologue
# JP: 噛みしめるようにつぶやいて、\nはっ、とハチロクは僕を見上げる。
3275 = "Lẩm bẩm như thể đang gặm nhấm điều gì đó,\nHachiroku chợt ngước lên nhìn tôi."

# 【ハチロク】
# display as 八六
# JP: 「でしたら……ポーレット様の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;観にも、\n登呂流湯のご主人は、大きな影響をお与えになった？」
2719 = "「Nếu vậy thì……quan điểm về \\x%lレイルロオド;#00ffc040;Railord%l;#; của Thị\ntrưởng Paulette,\nchủ nhà tắm Tororyu-yu, cũng đã có ảnh\nhưởng rất lớn sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、その一面はあるかもしれんな。\nそれがひいては、御一夜鉄道の社風にも育っていった」
2152 = "「Ra là vậy, có lẽ cũng có khía cạnh đó\nđấy.\nĐiều đó cuối cùng, đã nuôi dưỡng nên văn\nhóa công ty của Đường sắt Ohimitera.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「だとすれば、とても幸せなリレーですな。\nかの方の論文には、それだけの影響力が、確かにある」
2360 = "「Nếu vậy thì, đó là một cuộc chạy tiếp sức\nrất hạnh phúc đấy.\nLuận văn của bà ấy, quả thực có sức ảnh\nhưởng đến mức đó.」"

# monologue
# JP: 不死鳥博士が、静かに頷く。\n眼鏡の奥の瞳がふっと、懐かしそうに細められる。
3190 = "Tiến sĩ Phượng Hoàng Lửa, lặng lẽ gật đầu.\nĐôi mắt sau lớp kính chợt nheo lại, đầy vẻ\nhoài niệm."

# 【ひよこ】
# display as 不死鳥
# JP: 「……かくいう私も、\nかの方の論文に、多大極まる影響を受けております」
1537 = "「……Nói vậy chứ bản thân tôi,\ncũng chịu ảnh hưởng vô cùng to lớn từ luận\nvăn của bà ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2293 = "「噢」" 

# monologue
# JP: 不死鳥博士がちょんちょん、と、自分のメガネを指し示す。
3186 = "Tiến sĩ Phượng Hoàng Lửa gõ gõ ngón tay,\nchỉ vào cặp kính của mình."

# 【ひよこ】
# display as 不死鳥
# JP: 「このメガネは……与えられた名がイヤでしてな。\n少しでも大人らしく見せようとしてかけ始めたものです」
2756 = "「Cặp kính này……là vì tôi ghét cái tên được\nđặt cho.\nNên mới bắt đầu đeo nó để trông có vẻ\nngười lớn hơn một chút thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「お珍しいとは思っておりました。視力が低下した\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;など、とても乗務にはつけませんので」
2439 = "「Em cũng thấy lạ ạ. Một \\x%lレイルロオド;#00ffc040;Railord%l;#; bị suy\ngiảm thị lực,\nthì không thể nào làm nhiệm vụ được.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「無論、伊達メガネではありますが――\n容れ物が中味を作る、ということもあるようでしてな」
2638 = "「Tất nhiên, đây chỉ là kính không độ\nthôi——\nNhưng mà, có vẻ như vẻ bề ngoài cũng làm\nnên nội tâm đấy.」"

# monologue
# JP: ……一目瞭然。不死鳥博士には驚く程にメガネが似合う。\nゆえ、乗客は『彼女はインテリ』と、単純に思いこんだ。
1456 = "……Nhìn là hiểu ngay. Tiến sĩ Phượng Hoàng\nLửa hợp với cặp kính đến kinh ngạc.\nVì vậy, hành khách chỉ đơn giản nghĩ rằng\n『Cô ấy là một người trí thức』."

# monologue
# JP: 鉄道、観光、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――マニアックな種々の質問に\n答えるために、自らも望み、彼女はひたすら学び続けた。
3576 = "Đường sắt, du lịch, \\x%lレイルロオド;#00ffc040;Railord%l;#;——Để trả lời\ncho muôn vàn câu hỏi hóc búa,\ncô ấy cũng tự mình mong muốn, và không\nngừng học hỏi."

# 【ひよこ】
# display as 不死鳥
# JP: 「そうした[さなか,1]最中、かの論文に出会いました。\nいや――大げさではなく、世界がぐるりと回りましたな」
2704 = "「Giữa lúc đó, tôi đã bắt gặp luận văn kia.\nKhông——không hề nói quá đâu, thế giới như\nđảo lộn mòng mòng vậy.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしにも、いくらかわかるような気がします」
2447 = "「Em có cảm giác, mình cũng phần nào hiểu\nđược điều đó ạ.」"

# monologue
# JP: ハチロクが大きく頷き、不死鳥博士をじっ――と見る。
3281 = "Hachiroku gật đầu thật mạnh, nhìn chằm\nchằm——vào Tiến sĩ Phượng Hoàng Lửa."

# monologue
# JP: あるいは両者の間になにか、\n\x%l共感;#00ffc040;共感%l;#;が交わされているのかもしれぬと、ふっと感じる。
3512 = "Hay là giữa hai người họ, \nđang có sự \\x%l共感;#00ffc040;cộng cảm%l;#; nào đó giao thoa, tôi\nchợt nghĩ vậy."

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまに、魂があると断じていただき。望んでいいと、\nお許しいただき――わたくしの世界は一変いたしました」
2319 = "「Được ngài Soutetsu khẳng định là có linh\nhồn. Được ngài cho phép\ncó những mong muốn của riêng mình――thế\ngiới của em đã hoàn toàn thay đổi.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「魂――いかにも。メンタルと呼ぶより、意識と呼ぶより、\n自我と呼ぶより。魂という名こそが、最もふさわしい」
2923 = "「Linh hồn——Đúng vậy. So với việc gọi là\ntâm lý, gọi là ý thức,\nhay gọi là bản ngã. Cái tên linh hồn mới\nlà phù hợp nhất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2240 = "「Ưm.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「あえていいましょう。“[ごと]如き”、と」
2093 = "「Tôi xin mạn phép nói rằng. Là \"cỡ như\".」"

# monologue
# JP: 不死鳥博士の声の温度が、すうっと下がる。
3182 = "Nhiệt độ trong giọng nói của tiến sĩ\nFushicho đột ngột giảm xuống."

# 【ひよこ】
# display as 不死鳥
# JP: 「何故、鉄道の消耗保安部品如きに魂が与えられ、\n人の形を与えられたか――考えたことはありますかな？」
2600 = "「Tại sao những thứ như linh kiện bảo hộ\ntiêu hao của đường sắt lại được ban cho\nlinh hồn,\nlại được ban cho hình hài con người——hai\nngười đã từng nghĩ đến chưa?」"

# 【ハチロク】
# display as 八六
# JP: 「！」
2838 = "「!」"

# monologue
# JP: ハチロクが小さく息を呑む。\nそのまましばらく黙り込み、唇を小さく開きまた閉じて。
3264 = "Hachiroku khẽ nuốt nước bọt.\nCô cứ thế im lặng một lúc, hé mở đôi môi\nrồi lại ngậm chặt."

# monologue
# JP: ……そしてゆるゆる、ひどく、か細い言葉を吐く。
1460 = "……Rồi chầm chậm, thốt ra những lời vô\ncùng, vô cùng yếu ớt."

# 【ハチロク】
# display as 八六
# JP: 「いいえ……考えたこともございませぬ――\nわたくしたちは、そのように作られたもの、です、し」
2006 = "「Không ạ……em chưa từng nghĩ đến chuyện\nđó——\nChúng em, vốn dĩ được tạo ra như vậy, mà.」"

# monologue
# JP: 困ったような瞳が僕にすがってくる。\nならばともかく、僕の考えを言葉にしてみるまでだ。
3338 = "Đôi mắt như đang bối rối ấy cầu cứu tôi.\nNếu vậy, tôi đành phải nói ra suy nghĩ của\nmình thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「人の形は、緊急時には\x%l機関士;#00ffc040;機関士%l;#;、\x%l機関助士;#00ffc040;機関助士%l;#;の代役を\nつとめられるようにではないかと、考えます」
2465 = "「Hình hài con người, tôi nghĩ là để trong\ntrường hợp khẩn cấp có thể\nđóng vai trò thay thế cho \\x%l機関士;#00ffc040;người lái tàu%l;#; và\n\\x%l機関助士;#00ffc040;phụ lái tàu%l;#;.」"

# monologue
# JP: \x%l運転体;#00ffc040;運転体%l;#;稼働時にも、\x%l整備体;#00ffc040;整備体%l;#;を必ずキャブ内に安置するのは、\nその端的な証明だろう。
3209 = "Ngay cả khi vận hành \\x%l運転体;#00ffc040;kíp lái%l;#;, việc bắt\nbuộc phải đặt \\x%l整備体;#00ffc040;thân chính%l;#; bên trong buồng\nlái,\nchính là minh chứng rõ ràng nhất cho điều\nđó."

# 【ひよこ】
# display as 不死鳥
# JP: 「では、魂は？」
2899 = "「Vậy còn, linh hồn?」"

# 【双鉄】
# display as 雙鐵
# JP: 「魂――は――」
2924 = "「Linh hồn——thì——」"

# monologue
# JP: ハチロクの魂に触れ。\n触れているから、知っているから――
3371 = "Chạm vào linh hồn của Hachiroku.\nVì đã chạm vào, vì đã biết——"

# monologue
# JP: 僕は恐らく、\nそこを深くは考えぬようになっていたのだと、思い知る。
3523 = "Có lẽ tôi,\nđã cố tình không suy nghĩ sâu xa về điều\nđó, tôi nhận ra."

# 【双鉄】
# display as 雙鐵
# JP: 「魂、は……」
2925 = "「Linh hồn, là……」"

# monologue
# JP: 考えるのが、踏み込んでいくのが怖い気がする。\nだが、それ以上に確信できる。
3517 = "Tôi cảm thấy sợ hãi khi phải suy nghĩ, khi\nphải dấn sâu vào nó.\nNhưng, hơn thế nữa, tôi có thể tin chắc."

# monologue
# JP: 僕とハチロクとオリヴィが求め、望む知識は。\nここから逃げては――絶対に手に入れられなくなると。
3429 = "Những kiến thức mà tôi, Hachiroku và Olivy\nđang tìm kiếm, khao khát.\nNếu chạy trốn khỏi đây——thì tuyệt đối sẽ\nkhông thể nào có được."

# 【双鉄】
# display as 雙鐵
# JP: 「強いて言えば、各種の判断とコミュニケーションを\n行うため……いわば人工知能の働きからの自然発生的な」
2355 = "「Nói một cách gượng ép, là để thực hiện\ncác loại phán đoán và giao tiếp\n……có thể nói là sự phát sinh tự nhiên từ\nhoạt động của trí tuệ nhân tạo.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「魂を自然発生し得た人工知能は一例も存在しませんな。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;以外の、全ての分野の技術史において」
2712 = "「Không hề tồn tại bất kỳ trường hợp trí\ntuệ nhân tạo nào có thể tự phát sinh linh\nhồn đâu.\nTrong lịch sử công nghệ của tất cả các\nlĩnh vực, ngoại trừ \\x%lレイルロオド;#00ffc040;Railord%l;#;.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう……なのですか。\nあ、いや、しかし、エアクラナビには魂があるような」
2522 = "「Là vậy……sao.\nA, không, nhưng mà, Navi của Aircra dường\nnhư cũng có linh hồn.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ほう？」
2064 = "「Hô?」"

# monologue
# JP: 疑わしそうな短い声。
3181 = "Một giọng điệu ngắn gọn đầy vẻ nghi ngờ."

# monologue
# JP: が、すぐさまに「ああ」と、短く。\n不死鳥博士は、なにかに思い当たったような声を出す。
3236 = "Nhưng, ngay lập tức cô ấy \"À\" một tiếng\nngắn gọn.\nTiến sĩ Fushicho cất giọng như vừa chợt\nnhận ra điều gì đó."

# 【ひよこ】
# display as 不死鳥
# JP: 「第一世代以降のエアクラナビに限定すれば、\nその問いへの答えは、明確な否となりますな」
2351 = "「Nếu chỉ giới hạn ở các Navi của Aircra từ\nthế hệ thứ nhất trở đi,\nthì câu trả lời cho câu hỏi đó, sẽ là một\nlời từ chối rõ ràng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ――世代、ですか」
2266 = "「A——thế hệ, sao.」"

# monologue
# JP: なるほどだ。一般的なエアクラ車、エアクラタクシーや\nエアクラバスのナビは、うちのナビとは大きく違う。
3702 = "Thì ra là vậy. Navi của các loại xe Aircra\nthông thường, taxi Aircra hay\nxe buýt Aircra, khác biệt rất lớn so với\nNavi nhà tôi."

# monologue
# JP: 洗練された日常会話などこなしもするが――\nナビのように、自我を示すということはない。
3321 = "Dù có thể thực hiện những cuộc hội thoại\nthường ngày một cách trau chuốt——\nnhưng không hề thể hiện bản ngã, giống như\nNavi."

# 【ハチロク】
# display as 八六
# JP: 「確かに、左様かもしれませんね」
2431 = "「Quả thực, có lẽ là như vậy ạ.」"

# monologue
# JP: 不死鳥博士を包む空気がゆるんだせいか、\nハチロクの声にも温度が戻る。
3345 = "Có lẽ vì bầu không khí bao quanh tiến sĩ\nFushicho đã dịu lại,\nnhiệt độ trong giọng nói của Hachiroku\ncũng quay trở lại."

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまのナビが、\nわたくしの『エアクラナビ』のイメエジですが――」
2446 = "「Navi của ngài Soutetsu,\nchính là hình ảnh về 『Navi của Aircra』\ntrong em, nhưng mà——」"

# monologue
# JP: ハチロクの声に頷いている。
3472 = "Tôi gật đầu trước những lời của Hachiroku."

# monologue
# JP: ナビがいるゆえ、僕らはほとんど、\n一般的なエアクラナビに、意識を馳せることがなかった。
3587 = "Vì có Navi, nên chúng tôi hầu như,\nchưa từng để tâm đến các Navi của Aircra\nthông thường."

# 【ハチロク】
# display as 八六
# JP: 「言われてみれば、ナビと違って――市中に溢れる\nエアクラたちを妹と感じることはございませんね」
2687 = "「Nhắc mới nhớ, khác với Navi——em chưa từng\ncảm thấy\nnhững chiếc Aircra nhan nhản ngoài phố kia\ngiống như em gái mình.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
2535 = "「Vậy sao?」"

# 【ハチロク】
# display as 八六
# JP: 「はい。彼女……と申しますか、一般的なエアクラナビは、\n恐らく、情報の域でしか\x%l共感;#00ffc040;共感%l;#;を扱い得ぬものかと」
2525 = "「Vâng ạ. Các cô ấy……hay nói đúng hơn là,\ncác Navi của Aircra thông thường,\ncó lẽ, chỉ có thể xử lý \\x%l共感;#00ffc040;cộng cảm%l;#; ở mức độ\nthông tin mà thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロクたちのように、\n感情をやりとりすることはできんというわけか」
2049 = "「Tức là không thể trao đổi cảm xúc,\ngiống như Hachiroku và mọi người sao.」"

# 【ハチロク】
# display as 八六
# JP: 「ではないかと思います。とはいえ、タクシー相手に、\nそう深い交流を試みたこともございませんが……」
2456 = "「Em nghĩ là như vậy ạ. Mặc dù, em cũng\nchưa từng thử giao tiếp sâu sắc\nvới một chiếc taxi bao giờ……」"

# 【ひよこ】
# display as 不死鳥
# JP: 「そのご考察で大正解ですな、ハチロク氏」
2121 = "「Suy luận đó hoàn toàn chính xác đấy, cô\nHachiroku.」"

# monologue
# JP: 合格点、と言わんばかりの頷きだ。
3417 = "Cô ấy gật đầu, như muốn nói là đã đạt điểm\nđỗ."

# 【ひよこ】
# display as 不死鳥
# JP: 「現行のほとんどのエアクラナビの“共感”は、\n非常に浅い階層――情報共有レベルでしか行い得ません」
2635 = "「\"Cộng cảm\" của hầu hết các Navi Aircra\nhiện hành,\nchỉ có thể thực hiện ở một tầng rất\nnông——mức độ chia sẻ thông tin mà thôi.」"

# 【ハチロク】
# display as 八六
# JP: 「行い得ない。――得ないのでしたら、一般的な\nエアクラナビは、魂……的なものを有していない？」
2181 = "「Chỉ có thể thực hiện. ——Nếu đã như vậy,\nthì các Navi Aircra thông thường,\nkhông sở hữu thứ gì đó……giống như linh hồn\nsao ạ?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「いかにも。“それら”は、一切の感情を有しませんな」
2567 = "「Đúng vậy. \"Bọn chúng\", không hề sở hữu\nbất kỳ cảm xúc nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「では……うちの――僕の所有しているエアクラの\nエアクラナビは――ほとんど、の中には含まれぬのか」
2885 = "「Vậy thì……Navi Aircra của chiếc Aircra nhà\ntôi——\nmà tôi đang sở hữu——không nằm trong số hầu\nhết đó sao.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「右田氏のエアクラナビは、第一世代以前の試験機のもの。\nいうなれば、第[ゼロ]零世代のエアクラ・ナビ」
2195 = "「Navi Aircra của ngài Migita là của mẫu\nthử nghiệm trước thế hệ thứ nhất.\nNói cách khác, là Navi Aircra thế hệ số\nkhông.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2293 = "「噢」" 

# monologue
# JP: その指摘には、驚かない。
3441 = "Tôi không hề ngạc nhiên trước lời chỉ ra\nđó."

# monologue
# JP: 僕やハチロクの情報はすでにかなり細かいものまで、\n恐らくは電車姫様から、伝わっているのであろう。
3463 = "Những thông tin về tôi và Hachiroku, cho\nđến cả những chi tiết khá nhỏ nhặt,\ncó lẽ đã được công chúa Densha truyền đạt\nlại rồi."

# 【ひよこ】
# display as 不死鳥
# JP: 「あるいは――\nこう言った方がわかりやすいかもしれませんな」
2056 = "「Hoặc là——\nnói thế này có lẽ hai người sẽ dễ hiểu hơn\nchăng.」"

# monologue
# JP: 不死鳥博士が、クイ、とメガネを持ち上げる。
3188 = "Tiến sĩ Fushicho vừa nói vừa đẩy gọng kính\nlên."

# 【ひよこ】
# display as 不死鳥
# JP: 「第一世代以降には無い機構。\nすなわち、\x%lタブレット;#00ffc040;タブレット%l;#;を内包するエアクラ・ナビ、と」
2731 = "「Một cơ chế không hề có từ thế hệ thứ nhất\ntrở đi.\nNói cách khác, là Navi Aircra có chứa \\x%lタブレット;#00ffc040;thẻ bảng%l;#;\nbên trong.」"

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「ああ！」\n「まあ！」
2252 = "「A!」\n「Ôi!」"

# monologue
# JP: ハチロクと顔を見合わせる。
3485 = "Tôi và Hachiroku đưa mắt nhìn nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、『魂』とは――」
2893 = "「Nếu vậy, 『Linh hồn』 là——」"

# 【ハチロク】
# display as 八六
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;に、宿るものなのでしょうか？」
2564 = "「Là thứ trú ngụ bên trong \\x%lタブレット;#00ffc040;thẻ bảng%l;#; sao ạ?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「さて、そこは不明ですな。\n私も、最も知りたく思っておりますところです」
2822 = "「Chà, điều đó thì chưa rõ.\nĐó cũng là điều mà tôi muốn biết nhất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それを知るために、この研究所を？」
2874 = "「Để tìm hiểu điều đó, nên cô mới xây dựng\nviện nghiên cứu này sao?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「んふふふふ」
2208 = "「Hư hừ hừ hừ.」"

# monologue
# JP: ふざけたような声で笑ってみせるが、\nメガネの奥には、鋭い光が宿っている。
3366 = "Cô ấy bật cười bằng một giọng điệu như\nđang đùa cợt,\nnhưng ẩn sau lớp kính kia, là một ánh nhìn\nsắc bén."

# 【ひよこ】
# display as 不死鳥
# JP: 「……今までお伝えしたのは事実群。\nここから先は、単なる仮説、となりますな」
1546 = "「……Những gì tôi nói từ nãy đến giờ là tập\nhợp các sự thật.\nTừ đây trở đi, sẽ chỉ đơn thuần là giả\nthuyết mà thôi.」"

# monologue
# JP: 言って、不死鳥博士はスタスタと――
3187 = "Nói rồi, tiến sĩ Fushicho rảo bước——"

# monologue
# JP: 自動販売機の前に移動していく。
3243 = "Di chuyển đến trước máy bán hàng tự động."

# 【ひよこ】
# display as 不死鳥
# JP: 「いかがですかな？　よろしければハチロク氏も。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の口にも合う、[ほっかいどう,2]北開道の特産です」
2582 = "「Hai người thấy sao? Nếu được thì mời cả\ncô Hachiroku nữa.\nĐây là đặc sản của Hokkaido, rất hợp khẩu\nvị của \\x%lレイルロオド;#00ffc040;Railord%l;#; đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それではいただきます」
2311 = "「A, vậy thì tôi xin nhận.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしもご[しょうばん,1]相伴させていただきます」
2723 = "「Em cũng xin phép được dùng cùng ạ.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「んふふっ」
2283 = "「Hư hừ.」"

# monologue
# JP: （ひょい！　ひょい！）
3365 = "（Vút! Vút!）"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2294 = "「Ối.」"

# 【ハチロク】
# display as 八六
# JP: 「わ！」
2215 = "「Oa!」"

# monologue
# JP: 放物線を描き投げ渡されたのは、\n缶ではなくて、紙パックだ。
3415 = "Thứ được ném qua theo một đường parabol,\nkhông phải là lon, mà là hộp giấy."

# 【ひよこ】
# display as 不死鳥
# JP: 「北開道から特別なルートで取り寄せている\nハードカツゲソですな」
2819 = "「Đó là Katsugen loại cứng,\nđược tôi đặt mua từ Hokkaido qua một kênh\nđặc biệt đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2267 = "「喔」" 

# monologue
# JP: パッケージを見る限り、乳酸菌飲料のたぐいのようだ。
3598 = "Nhìn bao bì thì có vẻ đây là một loại thức\nuống chứa vi khuẩn axit lactic."

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;の健康維持には役立ちそうもなく思えるが、\n仲間外れも気の毒だ。あとでオリヴィの分も買っておこう。
3732 = "Dù có vẻ chẳng giúp ích gì cho việc duy\ntrì sức khỏe của \\x%lレイルロオド;#00ffc040;Railord%l;#;,\nnhưng để cô ấy ra rìa thì cũng tội nghiệp.\nLát nữa tôi sẽ mua cả phần cho Olivy vậy."

# 【ひよこ】
# display as 不死鳥
# JP: 「せっかくの[いっぴん,1]逸品です。\n特別な場所で味わうというのは、いかがですかな？」
2922 = "「Đã cất công có được tuyệt phẩm này.\nHai người thấy sao nếu chúng ta thưởng\nthức nó ở một nơi đặc biệt?」"

# 【ハチロク】
# display as 八六
# JP: 「ここ……は――」
2834 = "「Nơi này……là——」"

# monologue
# JP: 薄暗く、冷えた地下フロア。\n格納庫……いや、倉庫という方が相応しかろうか。
3475 = "Một tầng hầm mờ tối và lạnh lẽo.\nNhà chứa máy bay……không, gọi là nhà kho\nthì đúng hơn."

# monologue
# JP: 未整備状態の機関車、\x%l気動車;#00ffc040;気動車%l;#;――電車まで。\nそうした車両が、ところ狭しと収納されている。
3548 = "Từ đầu máy xe lửa chưa được bảo dưỡng, \\x%l気動車;#00ffc040;toa xe tự hành%l;#;\n——cho đến cả tàu điện.\nNhững phương tiện như vậy được cất giữ\nchật ních trong này."

# 【ひよこ】
# display as 不死鳥
# JP: 「ああ、このこがよろしいですな。\nオリヴィ氏に敬意を払って」
2306 = "「A, đứa bé này có vẻ được đấy.\nĐể bày tỏ sự kính trọng với cô Olivy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「冥国\x%l蒸機;#00ffc040;蒸機%l;#;ですか」
2532 = "「Là \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#; của nước Meikoku\nsao.」"

# monologue
# JP: 運転台にあがるなり、\n不死鳥博士がＬＥＤの作業灯をひっかける。
3179 = "Vừa bước lên buồng lái,\ntiến sĩ Fushicho liền móc chiếc đèn làm\nviệc LED lên."

# monologue
# JP: 右利き運転台の助士側に、なぜであろうか、\n大きな箱が放置されている。が……それ以外は――
3707 = "Bên phía phụ lái của buồng lái thuận tay\nphải, không hiểu sao lại\ncó một chiếc hộp lớn bị bỏ lại.\nNhưng……ngoài cái đó ra thì——"

# 【ハチロク】
# display as 八六
# JP: 「まぁ――Ⅸ号の運転台に[うりふた,1]瓜二つ。\nこのこも、オオルドウイン社の？」
2226 = "「Chà——giống buồng lái của đầu máy số 9 như\nđúc.\nĐứa bé này cũng là của công ty Aldwin sao\nạ?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「[いすみ]泉鉄道１号機関車。\n再整備のため、お預かりしている車輌ですな」
2330 = "「Là đầu máy số 1 của Đường sắt Isumi.\nĐây là phương tiện chúng tôi đang giữ để\ntiến hành bảo dưỡng lại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう！　それは」
2299 = "「Hô! Ra là vậy.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「いやいや。\x%l静態保存;#00ffc040;静態保存%l;#;展示のための、再整備ですよ。\n残念ながら、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が失われておりましてな」
2011 = "「Không không. Là bảo dưỡng lại để phục vụ\ncho việc trưng bày \\x%l静態保存;#00ffc040;lưu tĩnh%l;#; thôi.\nĐáng tiếc là, \\x%lレイルロオド;#00ffc040;Railord%l;#; của nó đã bị mất\nrồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2828 = "「À.」"

# 【ハチロク】
# display as 八六
# JP: 「あの――つかぬことをおうかがいしますが」
2364 = "「Dạ——xin thứ lỗi cho em hỏi một chuyện hơi\nđường đột.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「なんなりと？\nここなら、誰ひとり聞く者もおりませんからな」
2107 = "「Chuyện gì vậy?\nỞ đây thì sẽ không có ai nghe lén đâu.」"

# monologue
# JP: （ああ――）
3760 = "（A——）"

# monologue
# JP: やはり、場所を変えたのはそういう理由か。\nさっきでも随分、際どい話をしていたように思えたが――。
3486 = "Quả nhiên, đổi địa điểm là vì lý do đó\nsao.\nDù tôi thấy lúc nãy chúng tôi cũng đã nói\nnhững chuyện khá nhạy cảm rồi——."

# 【ハチロク】
# display as 八六
# JP: 「とよ様は――あのお優しくお美しい\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\nお元気でいらっしゃるのですか？」
2754 = "「Ngài Toyo——vị \\x%lレイルロオド;#00ffc040;Railord%l;#; dịu dàng và xinh\nđẹp đó,\nhiện giờ có khỏe không ạ?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「眠ってる。あるいは、眠らせている。\n保存している。仮死状態においてある――凍結している」
2343 = "「Đang ngủ. Hoặc là, đang bị bắt phải ngủ.\nĐang được bảo quản. Đang ở trong trạng\nthái chết lâm sàng——đang bị đóng băng.」"

# 【ハチロク】
# display as 八六
# JP: 「っ！」
# 2838 = "「這！」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「言葉の選び方は趣味の問題でしょうがな。\nともかく、起動停止状態で\x%l静態保存;#00ffc040;静態保存%l;#;しています」
2139 = "「Cách chọn từ ngữ có lẽ là do sở thích cá\nnhân thôi.\nNói chung là, cô ấy đang được \\x%l静態保存;#00ffc040;lưu tĩnh%l;#;\ntrong trạng thái tắt nguồn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「と、おっしゃいますと――具体的には」
2707 = "「Cô nói vậy là sao——cụ thể thì như thế\nnào?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「\x%l運転体;#00ffc040;運転体%l;#;からも\x%l整備体;#00ffc040;整備体%l;#;からも\x%lタブレット;#00ffc040;タブレット%l;#;を外し、安置。\nその状態が、もう……かれこれ四年以上になりますかな」
2146 = "「Tháo \\x%lタブレット;#00ffc040;thẻ bảng%l;#; ra khỏi cả \\x%l運転体;#00ffc040;kíp lái%l;#; lẫn \\x%l整備体;#00ffc040;thân chính%l;#;\n, rồi đem đi cất giữ.\nTrạng thái đó, đã……kéo dài được hơn bốn\nnăm rồi thì phải.」"

# 【ハチロク】
# display as 八六
# JP: 「…………」
1511 = "「…………」"

# monologue
# JP: ハチロクが僅かに身を震わせる。
3270 = "Hachiroku khẽ rùng mình."

# monologue
# JP: その肩を抱き――震えを止めてやるためにも、\nあえて踏み込み、問いを重ねる。
3500 = "Tôi ôm lấy bờ vai ấy——để giúp em ngừng run\nrẩy,\ntôi đánh bạo dấn tới, tiếp tục đặt câu\nhỏi."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;を外す前には、稼働していた？」
2866 = "「Trước khi tháo \\x%lタブレット;#00ffc040;thẻ bảng%l;#; ra, cô ấy vẫn\nđang hoạt\nđộng sao?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「当然ですな。完全に機能を停止した\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、\n恐らく、何をやっても再起動できますまい」
2823 = "「Đương nhiên rồi. Một \\x%lレイルロオド;#00ffc040;Railord%l;#; đã ngừng\nhoạt động hoàn toàn thì,\ncó lẽ dù làm cách nào cũng không thể khởi\nđộng lại được đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なら――」
2886 = "「Nếu vậy——」"

# monologue
# JP: ごくりと、喉が鳴ってしまう。
3506 = "Tôi khẽ nuốt nước bọt."

# 【双鉄】
# display as 雙鐵
# JP: 「――その安置……仮死状態からの、再起動の成功例は」
2078 = "「——Vậy việc cất giữ đó……từ trạng thái chết\nlâm sàng, đã có trường hợp nào khởi động\nlại thành công chưa?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「現状では、そのように危険な実験はできませんな。\nよりよい状態での再起動に、確信を抱けるようになるか」
2649 = "「Với tình trạng hiện tại, chúng tôi không\nthể tiến hành những thí nghiệm nguy hiểm\nnhư vậy.\nLiệu chúng tôi có thể nắm chắc phần thắng\ntrong việc khởi động lại ở một trạng thái\ntốt hơn không.」"

# monologue
# JP: 不死鳥博士の目がふっと床へと落とされる。
3180 = "Ánh mắt của tiến sĩ Fushicho chợt hạ xuống\nsàn nhà."

# monologue
# JP: ああ、この床の下――さらなる地下に、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;達が眠っているのかと、伝わってくる。
3454 = "A, dưới lớp sàn này——ở tầng hầm sâu hơn\nnữa,\ncó lẽ các \\x%lレイルロオド;#00ffc040;Railord%l;#; đang say giấc, tôi cảm\nnhận được điều đó."

# 【ひよこ】
# display as 不死鳥
# JP: 「研究費が尽き、当研究所が解体され、再起動される他に\n手がなくなる――そのどちらかのときが来るまで」
2160 = "「Cho đến khi kinh phí nghiên cứu cạn kiệt,\nviện nghiên cứu này bị giải thể, và chúng\ntôi\nkhông còn cách nào khác ngoài việc phải\nkhởi động lại——cho đến khi một trong hai\nthời điểm đó đến.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど――」
2432 = "「Thì ra là vậy——」"

# 【ハチロク】
# display as 八六
# JP: 「よりよい状態での再起動への確信……は」
2884 = "「Sự nắm chắc phần thắng trong việc khởi\nđộng lại ở một trạng thái tốt hơn……sao.」"

# monologue
# JP: ハチロクの声は、とても静かだ。\nとても静かで、震えていない。
3288 = "Giọng nói của Hachiroku, vô cùng tĩnh\nlặng.\nRất tĩnh lặng, và không hề run rẩy."

# 【ハチロク】
# display as 八六
# JP: 「その確信にいたるための道筋は――\n今は、どれほど見えておりますものでしょうか？」
2496 = "「Con đường dẫn đến sự nắm chắc phần thắng\nđó——\nhiện tại, cô đã nhìn thấu được bao nhiêu\nphần rồi ạ?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「さて、私自身にはそれは判断いたしかねます問題ですな。\nですので――ご判断は、そちらに委ねたく思います」
2501 = "「Chà, đó là một vấn đề mà bản thân tôi\ncũng khó lòng đưa ra phán đoán.\nVì vậy——tôi muốn giao phó việc phán đoán\nlại cho hai người.」"

# monologue
# JP: 頷く。僕もハチロクも。\nそれ以外には、何もできない。
3483 = "Gật đầu. Cả tôi và Hachiroku.\nNgoài việc đó ra, chúng tôi chẳng thể làm\ngì khác."

# 【ひよこ】
# display as 不死鳥
# JP: 「結構。では――事実から、再び説明しましょう。\nといっても、これはあまり知られていない事実です」
2419 = "「Tốt lắm. Vậy thì——tôi sẽ tiếp tục giải\nthích, bắt đầu từ sự thật.\nMặc dù, đây là một sự thật không mấy ai\nbiết đến.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
2763 = "「Vâng.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「世界中、全ての\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の\x%lタブレット;#00ffc040;タブレット%l;#;は、\nただ一箇所の工場から出荷されていました」
2113 = "「Trên toàn thế giới, \\x%lタブレット;#00ffc040;thẻ bảng%l;#; của tất cả\ncác \\x%lレイルロオド;#00ffc040;Railord%l;#;,\nđều được xuất xưởng từ một nhà máy duy\nnhất.」"

# monologue
# JP: 言われてハっと。
3420 = "Nghe vậy, tôi chợt sững sờ."

# monologue
# JP: ハチロクの指が自分の胸を――\n\x%lタブレット;#00ffc040;タブレット%l;#;の上を、つかむようにして押さえる。
3266 = "Những ngón tay của Hachiroku đưa lên trước\nngực——\nnhư đang bấu chặt lấy \\x%lタブレット;#00ffc040;thẻ bảng%l;#; của mình."

# 【ハチロク】
# display as 八六
# JP: 「全て、とは――\n日ノ本\x%l蒸機;#00ffc040;蒸機%l;#;のものも――ですか？」
1994 = "「Tất cả, là——\nbao gồm cả của \\x%l蒸機;#00ffc040;đầu máy hơi nước%l;#;\nHinamoto——sao ạ?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「いかにも。この私のものも、ハチロク氏のものも、\nオリヴィ氏のものも――その全てが」
2569 = "「Đúng vậy. Của tôi, của cô Hachiroku,\nhay của cô Olivy——tất cả đều như vậy.」"

# 【ハチロク】
# display as 八六
# JP: 「それは……そのようなことは、\nわたくし、まるで――」
2423 = "「Chuyện đó……chuyện như vậy,\nem, hoàn toàn——」"

# 【ひよこ】
# display as 不死鳥
# JP: 「言い換えるなら、\x%lタブレット;#00ffc040;タブレット%l;#;はただ一箇所――\nいや、より厳密にいうのであれば、恐らくは」
2493 = "「Nói cách khác, \\x%lタブレット;#00ffc040;thẻ bảng%l;#; chỉ có ở một nơi\nduy nhất——\nkhông, nếu nói một cách chính xác hơn, thì\ncó lẽ là」"

# monologue
# JP: メガネの奥の瞳がスっと、鋭さを増す。
3456 = "Đôi mắt sau lớp kính bỗng chốc trở nên sắc\nbén hơn."

# 【ひよこ】
# display as 不死鳥
# JP: 「ただ一人の天才――及びその直系にしか、\n製造できなかったということになりますな」
2178 = "「Chỉ có một thiên tài duy nhất——cùng dòng\ndõi trực hệ của người đó,\nmới có khả năng chế tạo ra nó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ただ一人の天才の……直系」
2617 = "「Dòng dõi trực hệ của……một thiên tài duy\nnhất.」"

# 【ハチロク】
# display as 八六
# JP: 「スチイブンスン技師――で、ございましょうか？」
2425 = "「Là kỹ sư Stephenson——phải không ạ?」"

# monologue
# JP: スチイブンスン。僕さえ知っている“鉄道の父”。
3348 = "Stephenson. \"Cha đẻ của ngành đường sắt\"\nmà ngay cả tôi cũng biết."

# monologue
# JP: たしか世界ではじめて、\n\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の、公共鉄道の実用化に成功した男。
3661 = "Người đàn ông đầu tiên trên thế giới,\nđã thành công trong việc đưa \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;\nvào ứng dụng thực tế cho đường sắt công\ncộng."

# 【ひよこ】
# display as 不死鳥
# JP: 「トゥーレシビック」
2612 = "「Trevithick.」"

# 【双鉄】
# display as 雙鐵
# JP: 「トゥーレシビック？」
2613 = "「Trevithick?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「スチイブンスンが\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の産みの親なら、\nトゥーレシビックこそは、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の産みの親」
2356 = "「Nếu Stephenson là cha đẻ của \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#;\n,\nthì Trevithick chính là cha đẻ của \\x%lレイルロオド;#00ffc040;Railord%l;#;\n.」"

# monologue
# JP: 歌うように――不死鳥博士は言葉を、歴史を重ねていく。
3319 = "Như đang ca hát——tiến sĩ Fushicho từng\nbước kể lại câu chuyện, kể lại lịch sử."

# 【ひよこ】
# display as 不死鳥
# JP: 「……スチイブンスンとトゥーレシビック。\n二人の天才の出会いがなければ、鉄道は今と違っていた」
1527 = "「……Stephenson và Trevithick.\nNếu hai vị thiên tài ấy không gặp nhau,\nthì ngành đường sắt hiện tại đã khác.」"

# monologue
# JP: スチイブンスンが光となり、トゥーレシビックが影となり。\n支え合うことで、鉄道と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とは一体化した。
3346 = "Stephenson ở ngoài sáng, còn Trevithick ở\ntrong tối.\nBằng cách hỗ trợ lẫn nhau, đường sắt và \\x%lレイルロオド;#00ffc040;Railord%l;#;\nđã trở thành một thể thống nhất."

# monologue
# JP: 鉄道の発展とともに両者は栄え――エアクラの隆盛、\n大廃線の影響により、ともに、衰退していった。
3234 = "Cùng với sự phát triển của đường sắt, cả\nhai đã hưng thịnh——rồi cùng nhau suy tàn,\ndưới sự trỗi dậy của Aircra và ảnh hưởng\ncủa Đại bãi bỏ."

# 【ハチロク】
# display as 八六
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は……鉄道車輌とは別に誕生して、\nのちに一体化していった――の、でございましたか……」
2150 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#;……ra đời độc lập với các phương\ntiện đường sắt,\nrồi sau đó mới hợp nhất với nhau——sao ạ……」"

# monologue
# JP: 呆然としたハチロクの口調。
3284 = "Giọng điệu sững sờ của Hachiroku."

# monologue
# JP: それほどまでに、これは知られていない歴史。\nではなければ、隠されてきた歴史なのだろう。
3359 = "Đây là một lịch sử ít được biết đến đến\nmức như vậy.\nHoặc nếu không, thì đó là một lịch sử đã\nbị che giấu."

# 【ひよこ】
# display as 不死鳥
# JP: 「さて。ここまでの歴史と事実を振り返りみて――\nなにか一つ、大きな違和を感じませんかな？」
2889 = "「Chà. Nhìn lại lịch sử và những sự thật từ\nnãy đến giờ——\nhai người có cảm thấy một điều gì đó rất\nkhông tự nhiên không?」"

# 【ハチロク】
# display as 八六
# JP: 「大きな違和……でございますか？」
2412 = "「Điều không tự nhiên……sao ạ?」"

# monologue
# JP: ハチロクがきょとんと首を傾げる。
3273 = "Hachiroku ngơ ngác nghiêng đầu."

# monologue
# JP: 気づけないのは、本人が\x%lレイルロオド;#00ffc040;レイルロオド%l;#;なせいであろうか。\nならば、ここは僕が答えよう。
3525 = "Việc không nhận ra được, có lẽ là do bản\nthân cô ấy là một \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nNếu vậy, để tôi trả lời cho."

# 【双鉄】
# display as 雙鐵
# JP: 「いくつもある。\nまず第一には、『何故、鉄道にだけ』という違和だ」
2639 = "「Có rất nhiều.\nTrước tiên, là sự không tự nhiên ở điểm\n『Tại sao, chỉ ứng dụng cho đường sắt』.」"

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2251 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は優れたものだ。実際、今の日ノ本では、\nあらゆる場所で、引退した\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が活躍――っ！」
2488 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#; là một sự tồn tại ưu việt. Thực\ntế là ở Hinamoto hiện tại,\ncác \\x%lレイルロオド;#00ffc040;Railord%l;#; đã nghỉ hưu đang hoạt động sôi\nnổi ở khắp mọi nơi——!」"

# monologue
# JP: 言って、思わずハチロクを見る。
3664 = "Nói rồi, tôi bất giác nhìn sang Hachiroku."

# 【ハチロク】
# display as 八六
# JP: 「左様……です。双鉄さま」
2818 = "「Là vậy……đó ạ. Ngài Soutetsu.」"

# monologue
# JP: ハチロクは、呆然としたような顔をして……\nそれでも、ゆるゆる、頷き返す。
3339 = "Hachiroku mang một vẻ mặt sững sờ……\nnhưng rồi, vẫn chầm chậm gật đầu đáp lại."

# 【ハチロク】
# display as 八六
# JP: 「大廃線以前には――鉄道衰退のその前は――\n廃車車輌の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、例外なしに」
2697 = "「Trước thời kỳ Đại bãi bỏ——trước khi đường\nsắt suy tàn——\n\\x%lレイルロオド;#00ffc040;Railord%l;#; của các phương tiện bị phế thải,\nkhông có ngoại lệ nào, đều」"

# 【ひよこ】
# display as 不死鳥
# JP: 「解体・廃棄されていましたな。\nまるで、“何か秘密を守ろうとするかのように”、ね」
2602 = "「Bị tháo dỡ và tiêu hủy.\nCứ như thể, \"đang cố gắng bảo vệ một bí\nmật nào đó\" vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1511 = "「……」" 

# monologue
# JP: 赤井宮司の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――ニイロクのことを思い出す。\n\x%l整備体;#00ffc040;整備体%l;#;を失っている、という話を聞いたが――
3510 = "Tôi nhớ đến \\x%lレイルロオド;#00ffc040;Railord%l;#; của đền trưởng\nAkai——Niiroku.\nNghe nói cô ấy đã đánh mất \\x%l整備体;#00ffc040;thân chính%l;#; của\nmình——"

# monologue
# JP: ならば彼女も、本来は\x%lクハ26;#00ffc040;クハ26%l;#;とともに解体処分される――\nその運命を、なんらかの手段で逃れたのであろうか。
3717 = "Nếu vậy thì đáng lẽ ra cô ấy cũng bị tháo\ndỡ và tiêu hủy cùng với \\x%lクハ26;#00ffc040;Kuha 26%l;#;——\nBằng một cách nào đó, cô ấy đã trốn thoát\nkhỏi số phận đó sao."

# 【ひよこ】
# display as 不死鳥
# JP: 「『大廃線が訪れるまで、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は鉄道以外に\n活躍の場を与えられなかった』――その他に、違和は？」
2089 = "「『Cho đến khi thời kỳ Đại bãi bỏ đến, \\x%lレイルロオド;#00ffc040;Railord%l;#;\nkhông được trao cho cơ hội\nhoạt động ở bất kỳ nơi nào khác ngoài\nđường sắt』——Ngoài điều đó ra, còn sự không\ntự nhiên nào khác không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「……第二の違和も、ならば、同じ系列に収束される」
1547 = "「……Sự không tự nhiên thứ hai, nếu vậy,\ncũng quy về cùng một hệ thống.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ふふん？」
2759 = "「Hư hừ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「現行型のエアクラナビへの世代交代が何故行われたか。\n実際、エアクラナビはほぼ交通事故を起こさない。が」
2601 = "「Tại sao lại có sự chuyển giao thế hệ sang\nNavi Aircra mẫu hiện hành.\nThực tế, Navi Aircra hầu như không hề gây\nra tai nạn giao thông. Nhưng mà」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ご賢察ですな。大廃線以前の鉄道事故の発生率は、\n現行のエアクラナビによるそれよりも、有意に低い」
2829 = "「Quan sát rất nhạy bén. Tỷ lệ xảy ra tai\nnạn đường sắt trước thời kỳ Đại bãi bỏ,\nthấp hơn một cách đáng kể so với tỷ lệ do\nNavi Aircra hiện hành gây ra.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、\x%lタブレット;#00ffc040;タブレット%l;#;をエアクラナビから\n除去する必要は全くなかった。にもかかわらず」
2507 = "「Nếu vậy, hoàn toàn không cần thiết phải\nloại bỏ \\x%lタブレット;#00ffc040;thẻ bảng%l;#; khỏi Navi Aircra. Vậy mà」"

# 【ハチロク】
# display as 八六
# JP: 「あっ！！」
2258 = "「A!!」"

# monologue
# JP: 僕の思考と、同じ結論に辿り着いたのだろうか。\nハチロクが、怯えたような声を出す。
3595 = "Có lẽ cô ấy cũng đã đi đến cùng một kết\nluận với tôi.\nHachiroku thốt lên một tiếng sợ hãi."

# monologue
# JP: ならば――ああ、やけに喉が乾く。\nさきほどもらった紙パックを一気にあける。
3492 = "Nếu vậy——a, cổ họng tôi bỗng khát khô.\nTôi uống cạn một hơi hộp giấy vừa nhận\nđược lúc nãy."

# 【双鉄】
# display as 雙鐵
# JP: 「にもかかわらず、\x%lタブレット;#00ffc040;タブレット%l;#;を除去したのならば。\n大廃線の目的は――\x%lタブレット;#00ffc040;タブレット%l;#;を滅ぼすことに」
2190 = "「Vậy mà, nếu như họ đã loại bỏ \\x%lタブレット;#00ffc040;thẻ bảng%l;#;.\nThì mục đích của Đại bãi bỏ chính là——tiêu\ndiệt \\x%lタブレット;#00ffc040;thẻ bảng%l;#;.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「素晴らしい！　なんという聡明さだ！！\n紅葉の目に狂いはなかった！　右田氏――君は――」
2931 = "「Tuyệt vời! Thật là một sự thông minh\ntuyệt đỉnh!!\nCon mắt nhìn người của Momiji không hề\nsai! Ngài Migita——cậu——」"

# monologue
# JP: 不死鳥博士に手をにぎられ――
3178 = "Bị tiến sĩ Fushicho nắm lấy tay——"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2206 = "「!!?」"

# monologue
# JP: 手が熱い。\n驚くと同時、パッとその手が離される。
3507 = "Tay cô ấy nóng rực.\nCùng lúc với sự kinh ngạc của tôi, bàn tay\nđó đột ngột buông ra."

# monologue
# JP: というか、今のは――\n安静温度を超えているのではなかろうか？
3719 = "Mà này, lúc nãy——\nchẳng phải là đã vượt quá nhiệt độ an toàn\nrồi sao?"

# 【ひよこ】
# display as 不死鳥
# JP: 「いや失礼。時間がない、端的に――\n事実をひとつと、仮説をひとつ、お話ししよう」
2016 = "「À, thất lễ. Không còn thời gian nữa, nói\nngắn gọn thì——\ntôi sẽ kể cho hai người một sự thật, và\nmột giả thuyết.」"

# monologue
# JP: 口調から芝居気が消えている。\n有無を言わせぬ迫力がある。
3419 = "Sự đùa cợt đã biến mất khỏi giọng điệu của\ncô ấy.\nThay vào đó là một áp lực không thể chối\ncãi."

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;の、この国最高の研究者のそれが判断ならば、\n僕も、黙って従おう。
3703 = "Nếu đó là phán đoán của nhà nghiên cứu \\x%lレイルロオド;#00ffc040;Railord%l;#;\nhàng đầu đất nước này,\nthì tôi cũng sẽ ngoan ngoãn nghe theo."

# 【ひよこ】
# display as 不死鳥
# JP: 「まずは事実。エアクラ隆盛を苦にして、という理由で、\nトゥーレシビックの三代目は、家族全員で心中している」
2929 = "「Trước tiên là sự thật. Với lý do là đau\nkhổ trước sự trỗi dậy của Aircra,\nthế hệ thứ ba của nhà Trevithick, đã tự\nsát cùng toàn bộ gia đình.」"

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「っ！！？」\n「！！」
2062 = "「!!?」\n「!!」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ナビの類の一切つかないガソリン自動車で海へドボン。\n警察が遺体を引き上げるまでに48時間以上が要されたと」
2068 = "「Họ đã lao thẳng xuống biển bằng một chiếc\nô tô chạy xăng không hề được trang bị bất\nkỳ loại Navi nào.\nCảnh sát đã phải mất hơn 48 tiếng đồng hồ\nmới vớt được thi thể lên.」"

# 【ハチロク】
# display as 八六
# JP: 「そのよう……な――」
2424 = "「Chuyện như……vậy——」"

# 【双鉄】
# display as 雙鐵
# JP: 「『エアクラ隆盛を苦にして』――というのは――\n遺書かなにかが残っていた？」
2516 = "「『Đau khổ trước sự trỗi dậy của\nAircra』——nghĩa là——\nhọ đã để lại di thư hay thứ gì đó sao?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「と、発表された。\nが、その遺書を目にしたものは、誰ひとりとていない」
2379 = "「Họ đã công bố như vậy.\nNhưng, không một ai từng tận mắt nhìn thấy\nbức di thư đó cả.」"

# 【ハチロク】
# display as 八六
# JP: 「――っ」
2205 = "「——」"

# 【ひよこ】
# display as 不死鳥
# JP: 「当然、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;・タブレット社も廃業・解体だ。\n\x%lタブレット;#00ffc040;タブレット%l;#;の製造技術が、完全に途絶したのだからね」
2636 = "「Đương nhiên, công ty \\x%lレイルロオド;#00ffc040;Railord%l;#; Tablet cũng\nbị đóng cửa và giải thể.\nBởi vì công nghệ chế tạo \\x%lタブレット;#00ffc040;thẻ bảng%l;#; đã hoàn\ntoàn bị thất truyền.」"

# 【双鉄】
# display as 雙鐵
# JP: 「――それは、つまりは」
2812 = "「——Chuyện đó, nói cách khác là」"

# 【ひよこ】
# display as 不死鳥
# JP: 「そう――ああ、いや。私の仮説を披瀝するまえに。\nもう一つだけ右田氏に質問をしてもよろしいか？」
2592 = "「Đúng vậy——à, không. Trước khi bày tỏ giả\nthuyết của mình.\nTôi có thể hỏi ngài Migita thêm một câu\nnữa được không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「もちろん――どのような質問であろうとも」
2710 = "「Tất nhiên rồi——bất kể là câu hỏi gì.」"

# monologue
# JP: ……答えるつもりだ。\nなにを問いかけられるかにも、おおよそ見当が付いている。
1458 = "……Tôi định trả lời.\nTôi cũng lờ mờ đoán được cô ấy sẽ hỏi gì\nrồi."

# 【ひよこ】
# display as 不死鳥
# JP: 「では、質問を。\nシーリング開封という機構は、一体いかなる」
2878 = "「Vậy thì, câu hỏi là.\nCơ chế giải trừ phong ấn, rốt cuộc là」"

# 【双鉄】
# display as 雙鐵
# JP: 「トゥーレシビックの真意が、おっしゃる仮説通りなら、\nその機構には、大きな意味が隠されているかと感じます」
2352 = "「Nếu ý định thực sự của Trevithick đúng\nnhư giả thuyết cô nói,\nthì tôi cảm thấy cơ chế đó ẩn chứa một ý\nnghĩa vô cùng to lớn.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ほう」
# 2267 = "「喔」" 

# monologue
# JP: 質問をさえぎっての回答にも、\n不死鳥博士が気を悪くしたようには思えない。
3323 = "Dù tôi đã ngắt lời để trả lời câu hỏi,\nnhưng tiến sĩ Fushicho có vẻ không hề phật\ný."

# 【ひよこ】
# display as 不死鳥
# JP: 「ならば重ねて問いましょう。\nその“大きな意味”とは？」
2876 = "「Vậy thì tôi xin hỏi thêm.\n\"Ý nghĩa to lớn\" đó là gì?」"

# monologue
# JP: ハチロクの肩を強く抱く。
3501 = "Tôi ôm chặt lấy bờ vai của Hachiroku."

# monologue
# JP: 自分の今を満たしているものが、\n論理なのか、感情なのかがよくわからない。
3477 = "Thứ đang lấp đầy tâm trí tôi lúc này,\nlà lý trí, hay là cảm xúc, tôi cũng không\nrõ nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lタブレット;#00ffc040;タブレット%l;#;の――魂の自己複製。ないしは繁殖の機能。\nそこに為された封印を、開封するためなのではないかと」
1479 = "「Khả năng tự sao chép của \\x%lタブレット;#00ffc040;thẻ bảng%l;#;——của\nlinh hồn. Hoặc là chức năng sinh sản.\nChẳng phải là để giải trừ phong ấn được\nđặt trên đó sao.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「素晴らしい――」
2366 = "「Tuyệt vời——」"

# monologue
# JP: 深い溜め息のようなつぶやき。
3177 = "Một tiếng lầm bầm như một tiếng thở dài\nthườn thượt."

# monologue
# JP: そうして不死鳥博士の顔に、\nあの独特の、にやにや感が舞い戻ってくる。
3623 = "Và rồi trên gương mặt của tiến sĩ\nFushicho,\nnụ cười tủm tỉm đặc trưng đó lại quay trở\nvề."

# 【ひよこ】
# display as 不死鳥
# JP: 「なんと素晴らしい洞察力だ。\n私の仮説と、同じ結論にたどり着いてくれたようですな」
2086 = "「Thật là một sự nhạy bén tuyệt vời.\nCó vẻ như cậu đã đi đến cùng một kết luận\nvới giả thuyết của tôi rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「あのっ！」
2762 = "「Dạ!」"

# monologue
# JP: ハチロクが、切羽詰まった声をだす。
3290 = "Hachiroku cất lên một giọng nói khẩn\nthiết."

# 【ハチロク】
# display as 八六
# JP: 「あの、お二人のおっしゃる“仮説”がどのようなものか。\n恥ずかしながら、わたくしには、まだ、さっぱり」
2760 = "「Dạ, \"giả thuyết\" mà hai người nói đến rốt\ncuộc là gì ạ.\nThật xấu hổ, nhưng em vẫn chưa hiểu một\nchút nào cả.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「だ、そうですぞ？　右田氏」
2870 = "「Là vậy đó? Ngài Migita.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 2269 = "「嗯」" 

# monologue
# JP: 不死鳥博士は採点役にまわるようだ。\nならば僕は、僕なりの回答を披瀝していこう。
3594 = "Tiến sĩ Fushicho có vẻ muốn đóng vai trò\nngười chấm điểm.\nNếu vậy, tôi sẽ trình bày câu trả lời theo\ncách của riêng mình."

# 【双鉄】
# display as 雙鐵
# JP: 「さっきもいったが、エアクラナビと\x%lタブレット;#00ffc040;タブレット%l;#;は、\n本来は共存してしかるべきものと考える」
2551 = "「Như tôi đã nói lúc nãy, Navi Aircra và \\x%lタブレット;#00ffc040;thẻ bảng%l;#;\n,\nvốn dĩ nên là những thứ cùng tồn tại với\nnhau.」"

# 【ハチロク】
# display as 八六
# JP: 「はい。左様でございますね。そうした方が、\nより優れた交通網を築けるように、わたくしも感じます」
2281 = "「Vâng. Quả thực là vậy. Em cũng cảm thấy\nrằng làm như vậy\nsẽ có thể xây dựng được một mạng lưới giao\nthông ưu việt hơn ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「けれど、実際には\x%lタブレット;#00ffc040;タブレット%l;#;は排除された。\nどころか、その唯一の供給源も、閉ざされてしまった」
2606 = "「Thế nhưng, thực tế là \\x%lタブレット;#00ffc040;thẻ bảng%l;#; đã bị loại\nbỏ.\nThậm chí, nguồn cung cấp duy nhất của nó\ncũng đã bị đóng lại.」"

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 2269 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが何故かということと、\n『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は何故鉄道だけで』という疑問を重ねる」
2131 = "「Lý do tại sao lại như vậy, cộng thêm với\ncâu hỏi\n『Tại sao \\x%lレイルロオド;#00ffc040;Railord%l;#; chỉ dành cho đường sắt』.」"

# 【ハチロク】
# display as 八六
# JP: 「重ねる……と、\nどのような仮説が浮き上がるのでしょう？」
2682 = "「Cộng thêm……thì,\nsẽ đưa ra được giả thuyết như thế nào ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「逆算すればいい。『\x%lタブレット;#00ffc040;タブレット%l;#;は、知られすぎると、\n排除される性質をもつ』ということになるだろう？」
2184 = "「Chỉ cần suy ngược lại là được. Rằng 『\\x%lタブレット;#00ffc040;Thẻ bảng%l;#;\nmang một bản chất\nsẽ bị loại bỏ nếu được biết đến quá rộng\nrãi』 đúng không?」"

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2251 = "「啊！」" 

# monologue
# JP: こくりと、ハチロクは小さく頷く。
3305 = "Hachiroku khẽ gật đầu một cái."

# monologue
# JP: そうして、ぶるり、\n怯えてしまって、また身震いする。
3580 = "Rồi sau đó, rùng mình,\ncô ấy lại khẽ run lên vì sợ hãi."

# 【ハチロク】
# display as 八六
# JP: 「確かに――そのような仮説も……\n導きだせて、しまいます、ね」
2919 = "「Quả thực——cũng có thể rút ra được……\ngiả thuyết như vậy, nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「トゥーレシビックはそのことを自覚していた。\nけれど恐らく。自分の技術を試さずにはいられなかった」
2705 = "「Trevithick đã tự nhận thức được điều đó.\nNhưng có lẽ, ông ấy đã không thể kìm nén\nviệc thử nghiệm công nghệ của mình.」"

# 【ハチロク】
# display as 八六
# JP: 「だから――鉄道だけに限定して？」
2480 = "「Vì vậy——nên mới giới hạn chỉ trong đường\nsắt sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道と不可分の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;というイメージをつくり、\nその枠から決して外れないよう、車両とともに処分した」
2498 = "「Tạo ra hình ảnh một \\x%lレイルロオド;#00ffc040;Railord%l;#; không thể\ntách rời với đường sắt,\nvà để tuyệt đối không vượt ra khỏi khuôn\nkhổ đó, họ đã bị tiêu hủy cùng với phương\ntiện.」"

# 【ハチロク】
# display as 八六
# JP: 「――はい」
1494 = "「——Vâng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……日ノ本の鉄道営業法は、\n詠国を見本に作られているのですよね？　恐らく」
1529 = "「……Luật kinh doanh đường sắt của Hinamoto,\ncó lẽ được soạn thảo dựa trên khuôn mẫu\ncủa Eikoku (Anh Quốc) phải không?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ご賢察、という他ありませんな」
2109 = "「Không còn gì khác ngoài hai chữ sáng\nsuốt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にみだりにふれることが往来危険――\n極めて重い罪に処されるのも、同じ理由だ」
2630 = "「Việc tùy tiện chạm vào \\x%lレイルロオド;#00ffc040;Railord%l;#; sẽ gây\nnguy hiểm giao thông——\nbị xử phạt cực kỳ nặng, cũng vì cùng một\nlý do.」"

# monologue
# JP: 無期、ないしは二年以上の有期懲役。
3311 = "Tù chung thân, hoặc tù có thời hạn từ hai\nnăm trở lên."

# monologue
# JP: その行為に起因し人を死亡に至らしめた場合は、\n死刑、または無期懲役。
3443 = "Trong trường hợp hành vi đó dẫn đến chết\nngười,\nsẽ bị tử hình, hoặc tù chung thân."

# 【ハチロク】
# display as 八六
# JP: 「レイル、ロオドが……鉄道関係者以外の者と――\n世間と、接触する機会を、できる限りに減らすため……」
2836 = "「Là để hạn chế tối đa cơ hội tiếp xúc của\nRailord……\nvới những người ngoài ngành đường sắt——với\nthế giới bên ngoài……」"

# monologue
# JP: だが鉄道はトゥーレシビックの想像よりも\n遥かに発展していった。
3581 = "Nhưng đường sắt đã phát triển\nxo xa so với những gì Trevithick tưởng\ntượng."

# monologue
# JP: それはどれほどの歓喜であり、\nそして、どれほどの恐怖であったことだろう。
3230 = "Đó hẳn là một niềm vui sướng tột độ,\nvà cũng là một nỗi sợ hãi tột cùng."

# 【双鉄】
# display as 雙鐵
# JP: 「レールが遥かに延びるにつれて、トゥーレシビックの\n定めた運用は、守られないようにもなってくる」
2911 = "「Khi đường ray ngày càng vươn xa, những\nquy định vận hành\nmà Trevithick đặt ra cũng dần không còn\nđược tuân thủ nữa.」"

# 【ハチロク】
# display as 八六
# JP: 「はい」
2527 = "「Vâng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「引退し、他の分野で活躍する\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も誕生し――\nその結果……気づき、恐れた者がでてきたのだろう」
2047 = "「Những \\x%lレイルロオド;#00ffc040;Railord%l;#; nghỉ hưu và hoạt động ở các\nlĩnh vực khác cũng ra đời——\nKết quả là……có lẽ đã xuất hiện những kẻ\nnhận ra và cảm thấy sợ hãi.」"

# 【ハチロク】
# display as 八六
# JP: 「何を、恐れたのでございましょうか？」
2862 = "「Họ đã sợ hãi điều gì vậy ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「[しゅ]種だ」
2096 = "「Loài.」"

# 【ハチロク】
# display as 八六
# JP: 「しゅ？」
2611 = "「Loài?」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;という、新しい種族。\nその誕生と発展を、誰かが恐れた」
2539 = "「Một chủng loài mới, mang tên \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nAi đó đã sợ hãi trước sự ra đời và phát\ntriển của nó.」"

# 【ハチロク】
# display as 八六
# JP: 「あっ！」
# 2251 = "「啊！」" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;は『物』だという、\n不自然なほど強い刷り込み。
3588 = "Một sự áp đặt tư tưởng mạnh mẽ đến mức\nkhông tự nhiên rằng\n\\x%lレイルロオド;#00ffc040;Railord%l;#; là 『Vật phẩm』."

# monologue
# JP: にもかかわらず『意図的に人間を害することさえ可能』な、\nその運用の柔軟性。
3343 = "Mặc dù vậy, sự linh hoạt trong vận hành\ncủa họ\nlại 『thậm chí có thể cố ý gây hại cho con\nngười』."

# 【双鉄】
# display as 雙鐵
# JP: 「……トゥーレシビックは、新しい種を作ろうとした。\n彼は神になろうとし、故に、それを隠蔽しようとした」
1534 = "「……Trevithick đã cố gắng tạo ra một chủng\nloài mới.\nÔng ta muốn trở thành thần, và vì thế, ông\nta đã cố che giấu điều đó.」"

# monologue
# JP: 金銭、名誉、その他の全て――
3648 = "Tiền bạc, danh vọng, và tất cả những thứ\nkhác——"

# monologue
# JP: 鉄道分野以外でも\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を活躍させれば、\nいくらでも手にできたであろう。
3334 = "Nếu để \\x%lレイルロオド;#00ffc040;Railord%l;#; hoạt động ở những lĩnh vực\nngoài đường sắt,\nthì có lẽ ông ta đã có được bao nhiêu tùy\nthích."

# 【双鉄】
# display as 雙鐵
# JP: 「他の何を、いくら積んでも果たし得ないこと。\nそれを彼は望み――だから、きっと、恐れた」
2071 = "「Một điều mà dù có đánh đổi bao nhiêu thứ\nkhác cũng không thể đạt được.\nÔng ta đã khao khát điều đó——và vì vậy,\nchắc chắn ông ta cũng đã sợ hãi.」"

# 【ハチロク】
# display as 八六
# JP: 「は、い……」
2548 = "「Vâng, ạ……」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は、事実、ほとんど“種”だ。\n欠けているものは、生殖・繁殖の能力だけ」
2701 = "「\\x%lレイルロオド;#00ffc040;Railord%l;#;, trên thực tế, gần như là một\n\"loài\".\nThứ duy nhất còn thiếu, là khả năng sinh\nsản và nhân giống.」"

# 【ハチロク】
# display as 八六
# JP: 「ああっ！」
# 2251 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。さっき言ったのは、そういうことだ」
2280 = "「Ừm. Những gì tôi nói lúc nãy, chính là\nnhư vậy đấy.」"

# monologue
# JP: 人間と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;との間で、\n人間が為すような形でこどもを作ることは、出来ない。
3224 = "Giữa con người và \\x%lレイルロオド;#00ffc040;Railord%l;#;,\nkhông thể sinh con theo cách mà con người\nvẫn làm."

# monologue
# JP: が、シーリング開放がキーであるなら。\n今は不可能という\x%lタブレット;#00ffc040;タブレット%l;#;の複製なり、創造なりが――
3241 = "Nhưng, nếu việc giải trừ phong ấn là chìa\nkhóa.\nThì việc sao chép, hay sáng tạo ra \\x%lタブレット;#00ffc040;thẻ bảng%l;#;\nvốn được cho là bất khả thi hiện nay——"

# 【ハチロク】
# display as 八六
# JP: 「でしたら……でしたら、わたくしは――」
2826 = "「Nếu vậy……nếu vậy thì, em——」"

# monologue
# JP: ハチロクの声が震える。\n瞳が震える。
3289 = "Giọng nói của Hachiroku run rẩy.\nĐôi mắt em run rẩy."

# monologue
# JP: 肩を抱く手を強めても、震えは、少しも弱まらない。
3324 = "Dù tôi có ôm chặt lấy bờ vai em hơn, sự\nrun rẩy cũng không hề giảm bớt chút nào."

# 【ハチロク】
# display as 八六
# JP: 「わたくしは――為せる、かもしれないのですね。\nたとえ、形は、人間のそれと違っても――」
2474 = "「Em——có thể làm được, phải không ạ.\nCho dù, hình thức có khác với con người đi\nchăng nữa——」"

# 【双鉄】
# display as 雙鐵
# JP: 「その可能性は、きっとあると、僕は思う。\n僕とハチロク――いや、すず――お前との間に」
2462 = "「Anh nghĩ, chắc chắn là có khả năng đó.\nGiữa anh và Hachiroku——không, Suzu——giữa\nanh và em.」"

# 【ハチロク】
# display as 鈴
# JP: 「わたくしたちを――受け継ぐ、いのちを」
2464 = "「Một sinh mệnh——kế thừa chúng ta.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ま、仮説ですがな」
2032 = "「Chà, đó chỉ là giả thuyết thôi.」"

# 【双鉄】
# display as 雙鐵＆鈴
# JP: 「っ！！？」\n「！！！」
2241 = "「!!?」\n「!!!」"

# 【ひよこ】
# display as 不死鳥
# JP: 「その上、その仮説を信じることには、\nリスクまでもがともなってくる」
2692 = "「Hơn nữa, việc tin vào giả thuyết đó,\ncũng đi kèm với cả những rủi ro nữa.」"

# monologue
# JP: ……僕達が、突っ走らないようにだろう。\n不死鳥博士は、わざと淡々とした物言いをする。
1451 = "……Có lẽ là để chúng tôi không hành động\nthiếu suy nghĩ.\nTiến sĩ Fushicho cố tình dùng một giọng\nđiệu thản nhiên."

# 【ハチロク】
# display as 八六
# JP: 「それは――どのようなリスクでございますか？」
2536 = "「Đó là——những rủi ro như thế nào ạ?」"

# monologue
# JP: すずもその意を感じてだろう。
3596 = "Suzu có lẽ cũng đã cảm nhận được ý định\nđó."

# monologue
# JP: いつものハチロクを――\n少なくとも表面上は、演じてくれる。
3407 = "Cô ấy đang cố gắng diễn lại một Hachiroku\nnhư mọi khi——\nít nhất là ở vẻ bề ngoài."

# 【ひよこ】
# display as 不死鳥
# JP: 「[うえやま,1]上山事件」
2004 = "「Sự kiện Ueyama.」"

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2251 = "「啊！」" 

# monologue
# JP: 上山事件――僕でも知ってる、有名な怪事件だ。
3156 = "Sự kiện Ueyama——một vụ án bí ẩn nổi tiếng\nmà ngay cả tôi cũng biết."

# monologue
# JP: 帝鉄初代総裁が、雨の真夜中、轢死体となって発見された。\nそれが事件か、事故なのか、その真実は今もって――っ！
3447 = "Tổng tài đầu tiên của Teitetsu được phát\nhiện đã tử vong do bị tàu cán vào một đêm\nmưa giữa khuya.\nĐó là một vụ án mạng, hay chỉ là một tai\nnạn, sự thật đó cho đến nay vẫn——!"

# 【双鉄】
# display as 雙鐵
# JP: 「まさか――[うえやま,1]上山総裁は……\nその――なんというか」
2752 = "「Không lẽ nào——Tổng tài Ueyama là……\ncái đó——nói sao nhỉ.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「『\x%lレイルロオド;#00ffc040;レイルロオド%l;#;開放派』」
1500 = "「『Phe giải phóng \\x%lレイルロオド;#00ffc040;Railord%l;#;』.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ――」
2243 = "「A——」"

# monologue
# JP: ただ一言で、うわつきが消える。\n仮説が、現実の重みを帯びる。
3149 = "Chỉ bằng một lời nói, sự mơ hồ đã tan\nbiến.\nGiả thuyết giờ đây đã mang theo sức nặng\ncủa hiện thực."

# 【ひよこ】
# display as 不死鳥
# JP: 「だから、右田氏もハチロク氏も、選ぶことができる。\n何も聞かなかったことにして、ここから出るという道も」
2477 = "「Vì vậy, cả ngài Migita và cô Hachiroku,\nđều có thể lựa chọn.\nCon đường coi như chưa nghe thấy gì cả, và\nbước ra khỏi đây.」"

# 【ハチロク】
# display as 八六
# JP: 「！！」
2473 = "「!!」"

# monologue
# JP: ハチロクの目が――僕を見る目が揺れている。\nだから、ぽんぽんと頭を叩く。
3294 = "Ánh mắt của Hachiroku——ánh mắt đang nhìn\ntôi bỗng dao động.\nVì vậy, tôi nhẹ nhàng vỗ vỗ lên đầu em ấy."

# 【ハチロク】
# display as 八六
# JP: 「双鉄、さま――」
2915 = "「Ngài Soutetsu——」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、僕自身を失うことをいまさら恐れはしない」
2542 = "「Đến giờ phút này rồi, tôi không còn sợ\nviệc đánh mất chính mình nữa.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしもです。一度は無くしたも同然の命ですから。\nけれど、双鉄さまを、もしも失うことがあれば――」
2457 = "「Em cũng vậy. Sinh mệnh này vốn coi như đã\ntừng mất đi một lần rồi.\nThế nhưng, nếu lỡ như phải đánh mất ngài\nSoutetsu——」"

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。すず」
2902 = "「Không sao đâu. Suzu.」"

# monologue
# JP: 迷う必要などさらさらない。\nそれを教えてあげるため、震える頬をそうっと撫ぜる。
3520 = "Hoàn toàn không có gì phải do dự cả.\nĐể nói cho em ấy biết điều đó, tôi nhẹ\nnhàng vuốt ve đôi má đang run rẩy của em."

# 【双鉄】
# display as 雙鐵
# JP: 「万一そうなったとしても。\n必ず僕らはふたりいっしょだ」
2025 = "「Dù cho vạn nhất chuyện đó có xảy ra.\nThì hai chúng ta nhất định vẫn sẽ ở bên\nnhau.」"

# 【ハチロク】
# display as 鈴
# JP: 「ああ――双鉄さまっ」
2249 = "「A——ngài Soutetsu.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「なら、研究に協力してもらいましょう」
2872 = "「Nếu vậy, hãy hợp tác với nghiên cứu của\ntôi nhé.」"

# monologue
# JP: 断定口調。\nそれに頷く。
3183 = "Một giọng điệu quả quyết.\nTôi gật đầu đồng ý."

# 【ひよこ】
# display as 不死鳥
# JP: 「結構。では、ハチロク氏の\x%lタブレット;#00ffc040;タブレット%l;#;は\n解析・複製させてもらってかまわないかな？」
2416 = "「Tốt lắm. Vậy thì, tôi có thể tiến hành\nphân tích và sao chép\n\\x%lタブレット;#00ffc040;thẻ bảng%l;#; của cô Hachiroku được chứ?」"

# 【ハチロク】
# display as 八六
# JP: 「はい、それがお役に立つのであれば――\n無論、双鉄さまのご許諾があってのことですが」
2345 = "「Vâng, nếu điều đó có thể giúp ích được\ngì——\nĐương nhiên là, với điều kiện phải có sự\ncho phép của ngài Soutetsu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕も構わん。その他にも、僕達に協力できることが\nあったら、なんなりといってくれ」
2441 = "「Tôi cũng không bận tâm. Ngoài ra, nếu có\nbất cứ điều gì\nchúng tôi có thể giúp đỡ, xin cứ nói.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「んふふふっ」
2284 = "「Hư hừ hừ hừ.」"

# monologue
# JP: ふざけたような笑い声。\nだけれども、メガネの奥に光る瞳は、真剣だ。
3405 = "Một tiếng cười như đang đùa cợt.\nThế nhưng, đôi mắt sáng lên sau lớp kính\nkia, lại vô cùng nghiêm túc."

# 【ひよこ】
# display as 不死鳥
# JP: 「でしたら、もうひとつ。極めてむつかしく、\nかつ、縁起でもない頼みとなってしまいましょうが」
2888 = "「Nếu vậy thì, còn một việc nữa. Dù đây sẽ\nlà một yêu cầu\nvô cùng khó khăn, và cũng chẳng mấy tốt\nlành gì.」"

# 【ハチロク】
# display as 鈴
# JP: 「どのようなことでございましょう？」
2761 = "「Đó là chuyện gì vậy ạ?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「……オリヴィ氏との\x%l共感;#00ffc040;共感%l;#;を、[タブレットレベル,2]全開放で得られるように。\nその方向で、努力してみてはいただけませんかな」
1539 = "「……Làm sao để có được \\x%l共感;#00ffc040;cộng cảm%l;#; với cô\nOlivy ở mức độ mở hoàn toàn.\nHai người có thể cố gắng theo hướng đó\nđược không.」"

# 【ハチロク】
# display as 鈴
# JP: 「っ！！！？」
2839 = "「!!!?」"

# monologue
# JP: タブレットレベル――\nその一言を聞いた瞬間、すずの顔から表情が落ちる。
3555 = "Mức độ mở hoàn toàn——\nNgay khoảnh khắc nghe thấy cụm từ đó, biểu\ncảm trên khuôn mặt Suzu bỗng sụp đổ."

# monologue
# JP: 呆然――愕然――いや、そんな言葉よりも更に虚ろな――\nああ、そうか。魂が抜けたような表情――っ！！？
3663 = "Sững sờ——kinh ngạc——không, còn trống rỗng\nhơn cả những từ ngữ đó——\nA, đúng rồi. Một biểu cảm như người mất\nhồn——!!?"

# 【双鉄】
# display as 雙鐵
# JP: 「すず、どうした！？　タブレットレベルとは一体――」
2903 = "「Suzu, em sao vậy!? Mức độ mở hoàn toàn\nrốt cuộc là——」"

# 【ハチロク】
# display as 鈴
# JP: 「オリヴィちゃんは……\nそこまで、悪いのでございますか？」
2340 = "「Bé Olivy……\nđã tồi tệ đến mức đó rồi sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
# 2260 = "「啊！？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「即座に、という可能性は低いでしょうな。が――\nいつ何が起きてもおかしくはない消耗状態ではあります」
2913 = "「Khả năng xảy ra ngay lập tức thì có lẽ là\nthấp. Nhưng——\ncô ấy đang ở trong tình trạng hao mòn mà\ndù có chuyện gì xảy ra bất cứ lúc nào cũng\nkhông có gì lạ.」"

# 【ハチロク】
# display as 鈴
# JP: 「ぁぁっ――」
2250 = "「A a——」"

# monologue
# JP: 意味が、つながる。\n極めて難しく、縁起でもないという依頼の前置き。
3635 = "Ý nghĩa đã được xâu chuỗi lại.\nLời mào đầu cho một yêu cầu vô cùng khó\nkhăn, và cũng chẳng mấy tốt lành gì."

# monologue
# JP: そこから出てきた、“タブレットレベルの共感”とは。\nそれが意味するところは恐らく――
3530 = "Từ đó rút ra được, \"cộng cảm ở mức độ mở\nhoàn toàn\" là gì.\nĐiều đó có lẽ mang ý nghĩa là——"

# 【双鉄】
# display as 雙鐵
# JP: 「遺言を……オリヴィから受け取れるよう、\nそうしておけというような話か」
2427 = "「Là để……có thể nhận được di ngôn từ Olivy,\nnên cô mới bảo chúng tôi phải làm vậy\nsao.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ああ、遺言とはかなり近いニュアンスかもしれませんな。\n遺言と、遺産相続、その両方をあわせたような――」
2309 = "「À, có lẽ sắc thái cũng khá gần với di\nngôn đấy.\nNhư là sự kết hợp của cả hai, di ngôn và\nthừa kế di sản——」"

# 【ハチロク】
# display as 鈴
# JP: 「\x%l共感;#00ffc040;共感%l;#;は……文字通りの“共感”なのです。\nお互いが得たものを、共有しあう――そうしたものです」
1491 = "「\\x%l共感;#00ffc040;Cộng cảm%l;#;……đúng như nghĩa đen của nó là\n\"cộng cảm\".\nCùng chia sẻ cho nhau những gì đối phương\ncó được——chính là như vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2269 = "「嗯」" 

# 【ハチロク】
# display as 鈴
# JP: 「ですので、どこまで共有するかは細かに定められます。\n一般的には、一番親しくなったとしても、感情まで」
2485 = "「Vì vậy, việc chia sẻ đến mức độ nào có\nthể được quy định chi tiết.\nThông thường, dù có trở nên thân thiết\nnhất đi chăng nữa, thì cũng chỉ đến mức\ncảm xúc mà thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2269 = "「嗯」" 

# monologue
# JP: わかる気がする。\n僕も、ふたごであったゆえ。
3519 = "Tôi có cảm giác mình hiểu được điều đó.\nBởi vì, tôi cũng từng là một người anh\nsinh đôi."

# monologue
# JP: 路子と僕はつながっていて、けれども全ては重ねずに。\nだからあのとき――路子に突き放してもらえたがゆえ。
3689 = "Michiko và tôi có sự kết nối với nhau,\nnhưng không phải là hòa làm một hoàn toàn.\nChính vì vậy, vào lúc đó——nhờ Michiko đã\nđẩy tôi ra xa."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、タブレットレベルとは――文字通り、\n\x%lタブレット;#00ffc040;タブレット%l;#;の中身全て――全領域の\x%l共感;#00ffc040;共感%l;#;、か？」
2894 = "「Nếu vậy, mức độ mở hoàn toàn là——đúng như\nnghĩa đen,\ntất cả những gì bên trong \\x%lタブレット;#00ffc040;thẻ bảng%l;#;——\\x%l共感;#00ffc040;cộng cảm%l;#;\ntoàn bộ lĩnh vực, sao?」"

# 【ハチロク】
# display as 鈴
# JP: 「で。ございます。おたがいが得てきた全て。\n忘れたいことも、幸せな記憶も、大切な時間も、全ての」
2556 = "「Đúng, là vậy ạ. Tất cả những gì cả hai đã\ntrải qua.\nTừ những điều muốn quên đi, những ký ức\nhạnh phúc, những khoảng thời gian quý giá,\ntất cả mọi thứ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは……ただごとではあるまいな」
2830 = "「Chuyện đó……quả thực không phải là chuyện\nnhỏ đâu.」"

# monologue
# JP: 自分のすべてを、まるごとさらけ出す。\nそれを許すというのなら、究極の信頼関係だ。
3568 = "Phơi bày toàn bộ con người mình, không giữ\nlại bất cứ điều gì.\nNếu có thể chấp nhận điều đó, thì đó chính\nlà một mối quan hệ tin tưởng tuyệt đối."

# monologue
# JP: 『墓場までもっていきたい大切なもの』は、\n僕の中にさえ、確実にある。
3445 = "『Những điều quý giá muốn mang theo xuống\nmồ』,\nngay cả trong tôi, chắc chắn cũng có."

# 【ひよこ】
# display as 不死鳥
# JP: 「ま、ただごとではありませんな。先に話した――\n凍結状態にあるとよ氏さえ、[タブレットレベル,2]全開放は拒みましたからな」
2831 = "「Chà, quả thực không phải chuyện nhỏ. Như\ntôi đã nói lúc nãy——\nngay cả cô Toyo đang trong trạng thái đóng\nbăng, cũng đã từ chối mở hoàn toàn mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
# 1511 = "「……」" 

# monologue
# JP: で、あろうとしか思えない。\n自分のすべてを遺すことが、どれほど研究に有益でも――
3469 = "Tôi cũng chỉ có thể nghĩ như vậy.\nCho dù việc để lại toàn bộ bản thân mình\ncó hữu ích cho nghiên cứu đến đâu đi chăng\nnữa——"

# 【ハチロク】
# display as 鈴
# JP: 「再び目覚めて元気になることを――\n信じて、お眠りにつかれたのでしょうから」
2467 = "「Chắc hẳn cô ấy đã thiếp đi với niềm tin\nrằng——\nmình sẽ tỉnh lại và khỏe mạnh trở lại mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……うむ」
1528 = "「……Ừm.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ですので、全開放の\x%l共感;#00ffc040;共感%l;#;などは、ほぼ全ての\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、一度もせずに機能停止に至ります」
2481 = "「Vì vậy, việc \\x%l共感;#00ffc040;cộng cảm%l;#; ở mức độ mở hoàn\ntoàn, hầu như tất cả các\n\\x%lレイルロオド;#00ffc040;Railord%l;#; đều chưa từng thực hiện dù chỉ một\nlần cho đến khi ngừng hoạt động.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なのでしょうね」
2034 = "「Có lẽ là vậy nhỉ.」"

# monologue
# JP: 頷いてしまってハっとする。僕の答えを、すずは重視する。\nゆえ、今の同意は事実上の拒否回答も同然だ。
3615 = "Tôi gật đầu rồi chợt giật mình. Suzu rất\ncoi trọng câu trả lời của tôi.\nVì vậy, sự đồng tình vừa rồi thực chất\ncũng giống như một lời từ chối vậy."

# monologue
# JP: が、これはもう、“僕とすず”だけの問題ではない。\nオリヴィはもちろん、もっと広く・深くに関わる問題だ。
3238 = "Nhưng, đây không còn là vấn đề của riêng\n\"tôi và Suzu\" nữa.\nKhông chỉ Olivy, mà nó còn liên quan đến\nnhững vấn đề rộng hơn và sâu sắc hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク」
2117 = "「Hachiroku.」"

# monologue
# JP: ゆえ、あえてハチロクの、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;としての名を呼ぶ。
3565 = "Vì vậy, tôi cố tình gọi tên em ấy,\nvới tư cách là một \\x%lレイルロオド;#00ffc040;Railord%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「お前の判断を、僕は信じる。\nお前とオリヴィとの最善を、お前自身に考えて欲しい」
2460 = "「Anh tin vào phán đoán của em.\nAnh muốn chính em hãy suy nghĩ xem điều gì\nlà tốt nhất cho em và Olivy.」"

# 【ハチロク】
# display as 八六
# JP: 「――」
# 1511 = "「……」" 

# monologue
# JP: 意図を理解してくれたのか、\nハチロクはただ、静かに頷く。
3292 = "Có lẽ đã hiểu được ý định của tôi,\nHachiroku chỉ lặng lẽ gật đầu."

# 【ひよこ】
# display as 不死鳥
# JP: 「ですので、タブレットレベルの\x%l共感;#00ffc040;共感%l;#;を求めるなどは、\n極めて難しく、縁起でもないことではありますが――」
2750 = "「Vì vậy, việc yêu cầu \\x%l共感;#00ffc040;cộng cảm%l;#; ở mức độ mở\nhoàn toàn,\nlà một điều vô cùng khó khăn và cũng chẳng\nmấy tốt lành gì, nhưng mà——」"

# 【ハチロク】
# display as 八六
# JP: 「それはきっと――努力して至る。説得して導く。\nそうしたものではないように、わたくしは思います」
2468 = "「Điều đó chắc chắn không phải là thứ——có\nthể đạt được bằng nỗ lực. Hay thuyết phục\nđể dẫn dắt.\nEm nghĩ là như vậy ạ.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ほう！」
# 2297 = "「噢！」" 

# monologue
# JP: ハチロクからも、事実上の拒否解答。\nが、不死鳥博士はむしろ嬉しげな声を出す。
3620 = "Từ Hachiroku, cũng là một lời từ chối trên\nthực tế.\nNhưng, tiến sĩ Fushicho lại cất lên một\ngiọng điệu có vẻ vui mừng."

# 【ひよこ】
# display as 不死鳥
# JP: 「と、思われるのなら、ハチロク氏のなさりたいように。\nそれがおそらく、一番確率の高い方法でしょうからな」
2505 = "「Nếu cô nghĩ như vậy, thì cứ làm theo ý\nmuốn của cô Hachiroku.\nBởi vì đó có lẽ là phương pháp có xác suất\nthành công cao nhất.」"

# 【ハチロク】
# display as 八六
# JP: 「それで構わないのでしたら。わたくしは――\n不死鳥博士のご依頼を、あえてお引き受けいたしません」
2350 = "「Nếu cô không phiền thì. Em xin phép——\ntừ chối yêu cầu của tiến sĩ Fushicho ạ.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「んふふっ、それで結構ですよ、ハチロク氏。\nでしたら、こちらも依頼内容を変更いたしましょうかな」
2292 = "「Hư hừ, vậy cũng được thôi, cô Hachiroku.\nNếu vậy, tôi cũng sẽ thay đổi nội dung yêu\ncầu nhé.」"

# monologue
# JP: またぞろ、どこかふざけた口調。\nけれど今度のメガネの奥は――とても優しく微笑んでいる。
3403 = "Lại là một giọng điệu như đang đùa cợt.\nNhưng lần này, đằng sau lớp kính kia——là\nmột nụ cười vô cùng dịu dàng."

# 【ひよこ】
# display as 不死鳥
# JP: 「ハチロク氏は、どうかそのままで。\n双鉄氏とのそのままの日々を示し続けてください」
2122 = "「Cô Hachiroku, xin hãy cứ như vậy.\nHãy tiếp tục cho thấy những ngày tháng\nbình dị bên ngài Soutetsu nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々を――示す？」
2385 = "「Cho thấy——những ngày tháng?」"

# 【ハチロク】
# display as 八六
# JP: 「なにを、示せばよろしいのでしょうか？」
2672 = "「Nên cho thấy điều gì mới được ạ?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ハチロク氏と双鉄氏との、あるがままを。\nお互いを思いやり合い支え合う、今の姿を」
2559 = "「Con người thật của cô Hachiroku và ngài\nSoutetsu.\nHình ảnh hai người luôn quan tâm và hỗ trợ\nlẫn nhau như hiện tại.」"

# 【ハチロク】
# display as 八六
# JP: 「ああ――」
2247 = "「A——」"

# 【ひよこ】
# display as 不死鳥
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と人とでも。異なる種族同士さえ\n共存できるということを、示し続けていただきたい」
2814 = "「Dù là \\x%lレイルロオド;#00ffc040;Railord%l;#; và con người. Thậm chí là\nnhững chủng loài khác nhau\nvẫn có thể cùng tồn tại, tôi muốn hai\nngười tiếp tục chứng minh điều đó.」"

# monologue
# JP: こくり、ハチロクが小さく頷く。
3297 = "Hachiroku khẽ gật đầu một cái."

# 【ハチロク】
# display as 八六
# JP: 「頼まれずとも――わたくしは、必ずそのように」
2605 = "「Dù không được yêu cầu——em cũng nhất định\nsẽ làm như vậy.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「であれば、大変に助かりますな」
2434 = "「Nếu được vậy thì giúp ích cho tôi nhiều\nlắm.」"

# monologue
# JP: “誰に”示すか。\nハチロクは問わず、不死鳥博士も語らない。
3208 = "「Nếu được vậy thì giúp ích cho tôi nhiều\nlắm.」"

# monologue
# JP: ならば僕らは誰の視線も意識せず、\n僕らのままで、日常を重ね続けていけば良いのだろう。
3543 = "Cho \"ai\" thấy.\nHachiroku không hỏi, và tiến sĩ Fushicho\ncũng không nói."

# 【双鉄】
# display as 雙鐵
# JP: 「僕も、普通にそうします」
2436 = "「Tôi cũng sẽ làm như vậy.」"

# monologue
# JP: ハチロク――すずと、幸せな時間を重ねていく。\n頼まれるほどのこともなく、意識し努力する必要も無い。
3504 = "Cùng với Hachiroku——Suzu, trải qua những\nkhoảng thời gian hạnh phúc.\nChẳng cần phải được nhờ vả, cũng không cần\nphải cố ý nỗ lực."

# monologue
# JP: ともにあることは、それだけで、\nかくも幸福なのだから。
3372 = "Bởi vì chỉ cần được ở bên nhau,\nđã là một niềm hạnh phúc tột cùng rồi."

# 【ひよこ】
# display as 不死鳥
# JP: 「なら、あとひとつだけ。\n右田氏には、決断してほしいことがありますな」
2500 = "「Vậy thì, chỉ còn một việc nữa thôi.\nTôi muốn ngài Migita đưa ra một quyết\nđịnh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「決断、ですか。何でしょう？」
2728 = "「Quyết định, sao. Chuyện gì vậy?」"

# 【ひよこ】
# display as 不死鳥
# JP: 「われわれの仮説を真とするなら――\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;にも、若返りは起こり得ない」
2097 = "「Nếu giả thuyết của chúng ta là đúng——\nthì \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng không thể nào trẻ lại\nđược.」"

# 【双鉄】
# display as 雙鐵＆八六
# JP: 「あ！」\n「ああ」
2253 = "「A!」\n「A.」"

# 【ひよこ】
# display as 不死鳥
# JP: 「ボディ新造をしようがなにをしようが、\n\x%lタブレット;#00ffc040;タブレット%l;#;は必ず老衰し、やがて、不可避の死を迎える」
2238 = "「Dù có chế tạo một cơ thể mới hay làm bất\ncứ điều gì đi chăng nữa,\n\\x%lタブレット;#00ffc040;thẻ bảng%l;#; cũng chắc chắn sẽ già yếu đi, và\ncuối cùng, sẽ phải đối mặt với cái chết\nkhông thể tránh khỏi.」"

# monologue
# JP: それはそうだ。仮に種であり、\n世代交代まで見込まれているシステムがあるのなら――
3745 = "Điều đó là đương nhiên. Giả sử đó là một\nloài,\nvà có một hệ thống dự kiến cả sự chuyển\ngiao thế hệ——"

# monologue
# JP: 若返りとは、そのシステムを乱す行為にほかならないから。
3720 = "Thì việc trẻ lại, không gì khác chính là\nhành vi làm xáo trộn hệ thống đó."

# 【ひよこ】
# display as 不死鳥
# JP: 「ですので」
2506 = "「Vì vậy」"

# 【双鉄】
# display as 雙鐵
# JP: 「その決断は、僕が下すべきではありません」
2584 = "「Quyết định đó, không nên do tôi đưa ra.」"

# monologue
# JP: ごく当然と、すずが頷く。\n不死鳥博士は、驚いたような顔をしている。
3631 = "Như một điều hiển nhiên, Suzu gật đầu.\nTiến sĩ Fushicho lộ vẻ ngạc nhiên."

# 【双鉄】
# display as 雙鐵
# JP: 「オリヴィ本人に聞きましょう。\n彼女自身が、決めなければならないことがらです」
2444 = "「Hãy hỏi chính Olivy.\nĐó là điều mà bản thân cô ấy phải quyết\nđịnh.」"
