3491 = "我循聲望去，只見八六正以陶醉的眼神凝視著我。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまは、御一夜のため。そうして、いくらかは\nわたくしのため――蒸気\x%l機関士;#00ffc040;機関士%l;#;になって下さったのです」
2916 = "「雙鐵少爺之所以成為蒸汽機車\\x%l機関士;#00ffc040;司機%l;#;，是為守護御一夜，同時也有幾分理由與我有關」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あ！　そーだったっけ。ミズシゲンまもるのに、\nＳＬをシンボルにしたんだよねー」
2257 = "「啊！好像是噢，是為了保護水資源，才復興蒸汽機車並發展為當地特色的，對吧」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です。まことに見事なご差配、ご判断でした」
2579 = "「正是，雙鐵少爺如此決策可謂切中要害，無比英明」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そっかー」
2827 = "「這樣哦」" 

# monologue
# JP: オリヴィはこっくり頷き、\nハチロクを見て、僕を見る。
3395 = "奧莉薇用力點了點頭，視線掃過八六而後落在了我身上。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ならさ、アマチュアから始めて、こんなにいい\x%l機関士;#00ffc040;機関士%l;#;に\nソーテツがそだったの、ハチロクのおかげだね！」
2896 = "「那麼要說雙鐵原本只是個門外漢，如今卻能成為這麼優秀的\\x%l機関士;#00ffc040;司機%l;#;，肯定也是多虧了八六吧！」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふっ、お褒めいただき光栄です。\nけれど、全ては双鉄さまのご適正とご努力によっての」
2289 = "「嘻嘻，很榮幸獲得你這般讚賞，但雙鐵少爺能有這番成就，全是得益於過人的天分以及不懈的努力」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そこを謙遜されては寂しい。ハチロクがいて、\n僕がいて――僕らはふたりで、ここまで来たのだから」
2007 = "「不不，你如此謙虛反倒見外了，這一切都是你我——我們共同努力的成果」" 

# 【ハチロク】
# display as 八六
# JP: 「あ――」
2244 = "「啊」" 

# monologue
# JP: ハチロクの目がわずかに潤む。
3291 = "八六的雙目泛起了點點淚花。" 

# monologue
# JP: 誤魔化すようにまばたきし、こっくり、ひとつ大きく頷く。
3575 = "為了不讓人察覺，她急忙眨了眨眼睛，再用力點了點頭。" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね――双鉄さま」
2918 = "「雙鐵少爺所言極是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2269 = "「嗯」" 

# monologue
# JP: あたたかな嬉しさを強く感じて。\n同時に、気持ちが引き締まる。
3424 = "如暖流般的喜悅淌過心田，同時更令我重拾決心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、僕はまだまだ未熟極まる。\n実際のところ、カウキャッチャーも知らなかったし」
2187 = "「可我依然多有不周到之處，就比如說剛才，我連防撞梁都不知道是什麼」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーいえばそっか！\nじゃ、ここでたくさんベンキョーしなくちゃねー」
2729 = "「要說也是啦！那你可得在這裡好好學習呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
2376 = "「對」" 

# monologue
# JP: 頷けば、ふと思い出す。
3524 = "我點頭表示同意，隨即又想到一件事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういえば――さきほどハチロクは、\nこの車両のことを『とよ号』と呼んでいたな？」
2753 = "「說來八六，你剛才是稱這輛機車為“台與號”對吧」" 

# 【ハチロク】
# display as 八六
# JP: 「はい。[ほっかいどう,2]北開道開拓のため、ポルタル社から輸入された\n歴史的な六両のうちの一両でございますね」
2574 = "「正是，當年為開拓北海道，從Ｐｏｒｔｅｒ公司進口了六輛蒸汽機車，而該車正是那六輛名留青史的蒸汽機車之一」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[ほっかいどう,2]北開道開拓――となると、[めいじ,1]明智\x%l蒸機;#00ffc040;蒸機%l;#;か」
2513 = "「既然是用於開拓北海道，那就是明治時代的\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;了吧」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です。こちらの『とよ』は、[めいじ,1]明智１２年の製造。\n開拓のため、最初に輸入された二両のうちの一両です」
2577 = "「正是，這輛台與號於明治１２年出廠，是為開拓土地最早進口的兩輛蒸汽機車之一」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
2267 = "「喔」" 

# 【ハチロク】
# display as 八六
# JP: 「そのときに輸入されたもう一両は、『ひみこ』。\n『ひみこ』様は、今は[きょうと,1]京塗にいると聞いております」
2693 = "「而另一輛名叫“卑彌呼”，聽聞現如今藏於京都」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『ひみこ』に『とよ』――\nならば、この形式は、日ノ本の、女性偉人の名を？」
1507 = "「“卑彌呼”和“台與”——那麼這幾輛車命名都是源自於日本歷史上的著名女性？」" 

# 【ハチロク】
# display as 八六
# JP: 「左様でございますね。わたくしがお会いしたことがある\nのは、この『とよ』様だけでございましたが――」
2578 = "「正是，雖然我就只見過這輛台與」" 

# monologue
# JP: 懐かしそうに、ハチロクはふっと瞳を閉じる。
3298 = "八六輕輕閉上眼睛，彷彿在回首往昔。" 

# 【ハチロク】
# display as 八六
# JP: 「『ひみこ』『とよ』『むらさき』『せい』『かすが』\n『ともえ』。みな、車輌も\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も同名だったと」
1505 = "「“卑彌呼”、“台與”、“紫”、“清”、“春日”、“巴”，\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;也與其機車同名」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2151 = "「原來如此」" 

# monologue
# JP: これほどに冥国むき出しな\x%l蒸機;#00ffc040;蒸機%l;#;になぜ、\nそこまで日ノ本ベタベタな名前を、と思ったが。
3480 = "我剛剛還納悶這美國風格如此濃厚的\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;，為何要採用這種徹頭徹尾的日式稱呼。" 

# monologue
# JP: 『他者の土地』であった北開道への開拓・移住にあえて、\n『日ノ本の女性』の名付けを選んだのであれば――
3431 = "如果是為開拓、遷居原本不屬於自己水土的北海道，而特地取“日本女性”的姓名。" 

# 【双鉄】
# display as 雙鐵
# JP: 「かつて、開拓とはそうした覚悟で行われていたのだな。\n今ある形を日ノ本に染め、産み直していくという」
2375 = "「將陌生的土地徹底改造為當今日本的一部分，想必當時開拓土地的人們正是心懷如此信念」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
2251 = "「啊！」" 

# monologue
# JP: ハチロクもはじめて気づいたのか、\n大きく瞳をパチクリさせる。
3260 = "八六也眨了眨眼，一副恍然大悟的模樣。" 

# monologue
# JP: その傍らでオリヴィは、わかっているのかいないのか、\nうんうん大きく頷いている。
3625 = "而她身旁的奧莉薇也是連連點頭，雖然也不知道她是否理解並接受了這番觀點。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ほんっとカイタクってそういうことだよー！\nモトからあったものを、ハネトバシテくってこと！！」
2821 = "「這就是開拓的根本所在啦！擺脫舊事物的束縛，以全新的面貌大展身手！！」" 

# monologue
# JP: 言ってぽんっ、と、\nオリヴィの手がカウキャッチャーを――！
3668 = "說罷，奧莉薇伸手拍了拍防撞梁。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　だからカウキャッチャーは――\n跳ね飛ばすため、それほどに鋭く突き出ているのか」
2296 = "「噢噢！所以防撞梁之所以形狀如此尖銳，也正是為了排除前方鐵軌上的障礙，對嗎」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そだよー！　Ⅸ号だってカウキャッチャーあったら\nバッファローをポーンてはねとばしちゃうんだから！」
2378 = "「對呀！如果九號也裝了這個防撞梁，就能輕而易舉地把美洲野牛撞飛啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2297 = "「噢！」" 

# monologue
# JP: 瞬間、ひらめく。
3153 = "一種豁然開朗的感覺閃過腦海。" 

# monologue
# JP: これこそが――ポーレットの言っていた、\n『冥国\x%l蒸機;#00ffc040;蒸機%l;#;らしさ』のひとつなのではなかろうか。
3494 = "我意識到，或許這正是波萊特所說的，美國\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;的“特點”之一。" 

# 【ハチロク】
# display as 八六
# JP: 「Ⅸ号には、カウ・キャッチャアがついていたのですか？\nもしもそうなら、それは、今は――」
2044 = "「九號以前是裝有防撞梁的嗎？如果有，那麼現在又為什麼——」" 

# monologue
# JP: ハチロクも、同じことを感じてくれたのだろうか？
3214 = "也許八六和我想的一樣了。" 

# monologue
# JP: やや前のめりの質問に、\nしかしオリヴィは、申し訳なさそうな顔をして首を振る。
3738 = "面對八六難得一次積極的提問，奧莉薇卻滿臉內疚地搖了搖頭。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「んーん、Ⅸ号にはついてたことないんだー。\nカウキャッチャー」
2038 = "「不，九號沒有裝過防撞梁」" 

# 【ハチロク】
# display as 八六
# JP: 「まぁ、左様なのですか」
2234 = "「哦，居然沒有」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「むかしはねー、キュートなリンク式\x%l連結器;#00ffc040;連結器%l;#;がついてたの。\n今は、でっかい自動\x%l連結器;#00ffc040;連結器%l;#;にこーかんされてるけど」
2074 = "「以前裝的是嬌小玲瓏的插銷式\\x%l連結器;#00ffc040;車鉤%l;#;，雖然現在都換成超大的自動\\x%l連結器;#00ffc040;車鉤%l;#;了」" 

# monologue
# JP: でっかい、の一言は苦笑まじりだ。
3392 = "奧莉薇在說到自動車鉤時不禁面露苦笑。" 

# monologue
# JP: 確かに自連は共通規格。\n小柄なⅨ号に取り付くと、いかにも大きなものに見える。
3313 = "其實自動車鉤都是標準規格，不過裝在體型嬌小的九號上面就的確會顯得龐大了。" 

# 【ハチロク】
# display as 八六
# JP: 「それは[いささ]些か残念ですね。Ⅸ号にカウ・キャッチャアが\nついている姿は、さぞかわいらしいものでしょうに」
2820 = "「這就不禁令人感到些許遺憾了，可想而知倘若九號裝備防撞梁，必定可愛有加」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ハチロクもそう思う！？\nオリヴィもすっごくそー思う！！！」
2119 = "「八六你也這麼認為！？奧莉薇舉雙手贊成你的觀點！！！」" 

# monologue
# JP: オリヴィは真正面からトヨ号のカウキャッチャーを見。\nついでぺったりしゃがみこみ、しばし無言で見上げる。
3394 = "奧莉薇從正面觀察著台與號的防撞梁，還湊上去蹲下來，一言不發地細細打量了許久。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「けど、[じれん,1]自連あるからカウキャッチャーつけられないよね。\nカウキャッチャー、連結の邪魔になっちゃうもん」
2031 = "「不過裝了自動車鉤就裝不下防撞梁了，這麼大的防撞梁會影響掛接的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――そう断言するのは早かろう」
2035 = "「不，下此定論未免為時尚早」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ソーテツ？」
2914 = "「雙鐵你的意思是？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は見てきた。日々姫の仕事を。デザインとは、\n不可能に思える配置を整頓で可能にするものなのだと」
2842 = "「通過親眼見證日日姬完成的工作，我明白那正是能通過巧妙配置，實現看似不可行的組合」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ！　確かに、わたくしたち素人の目には、\n不可能としか思えないようなことでも――」
2377 = "「對呀！哪怕在不內行的我們看來，是根本無法實現的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。日々姫なら、あるいはより熟練の高い専門家なら、\nなんらかの解決策を見出してくれるかもしれない」
2572 = "「正是，如果換成日日姬，或者是更加技高一籌的專家，也許就能找到可行的辦法」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「そーなの！？」
2656 = "「真的可以！？」" 

# monologue
# JP: オリヴィの目がキラキラしている。\nカウキャッチャーと一声叫んで駆け出したときと同じに。
3391 = "奧莉薇再一次露出期待的目光，就和她剛才大喊防撞梁的時候一模一樣。" 

# monologue
# JP: この輝きを消したくはない。\nそうと思えば、思考もさらに連鎖していく。
3503 = "我更想回應她的期待，思緒於是進一步延展。" 

# 【双鉄】
# display as 雙鐵
# JP: 「というか、既に実現化された例もあるかもしれん。\nせっかく鉄道歴史館に来ているのだから、ここの資料を」
2626 = "「甚至有可能已經有了二者兼顧的設計，難得來此鐵路歷史館參觀，不妨在這裡查閱一下資料」" 

# monologue
# JP: （パチ、パチ、パチ）
3764 = "（鼓掌聲）" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 2282 = "「嗯？」" 

# monologue
# JP: 背後から、とても静かな拍手。\n何事なのかと振り返る。
3691 = "身後有人在緩緩地鼓掌，我出於好奇轉身看去。" 

# 【ひよこ】
# display as ？？？
# JP: 「良いアプローチですな。右田氏」
2197 = "「右田先生這番考量實屬周到啊」" 

# monologue
# JP: 眼鏡の女性――いや、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が、\nカツカツと足音を立て、近づいてくる。
3439 = "對方是一位戴著眼鏡的女性，不對應該是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，只見她大步流星走到了我面前。" 

# monologue
# JP: 笑顔、と一言で表現するのがはばかられる、\nどこかニヤついた――でなければ作ったような表情で。
3423 = "她那表情很難以純粹的笑容予以囊括，多含幾分譏諷，或者類似於皮笑肉不笑。" 

# 【ひよこ】
# display as ？？？
# JP: 「[もみじ,1]紅葉がなぜ、右田氏にことさら目をかけているのかも、\nふむ――多少は理解できました」
2277 = "「嗯，我或許多少也能理解，為何右田先生能得到紅葉這般器重了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もみじ？」
2678 = "「紅葉？」" 

# 【ひよこ】
# display as ？？？
# JP: 「ああ、今の名前はアキでしたな。毛利安芸。\nんふふっ。ま、世にいうところの電車姫ですな」
2233 = "「哦，她現在的名字是毛利安芸。嘻嘻，也就是受世人景仰的電車公主了」" 

# 【ハチロク】
# display as 八六
# JP: 「あ！」
# 2251 = "「啊！」" 

# monologue
# JP: ハチロクがぽんと手を鳴らし僕をみる。\n頷き返せば、少しよそ行きの声が出て来る。
3278 = "八六用力拍了一下手看向我。我點頭表示同意，她於是略顯激動地說道。" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、貴方が、[シゴナナ,2]Ｃ５７[イチヨンゴオ,2]１４５の\x%lレイルロオド;#00ffc040;レイルロオド%l;#;ですのね？\n確か、お名前が――」
2890 = "「那麼您就是Ｃ５７　１４５的\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;？記得名字是——」" 

# 【ひよこ】
# display as ？？？
# JP: 「ああ、本当の名前は好みませんでな。\n差し支えなければ、[いみょう,1]異名の方で呼んでいただければ」
2262 = "「啊，只是我對本名多有不滿，若不介意，還望各位以外號相稱」" 

# 【ハチロク】
# display as 八六
# JP: 「ご[いみょう,1]異名、でございますか？\n確か――“不死鳥”」
2321 = "「外號是嗎？我記得是叫——“不死鳥”」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「いかにもいかにも、所員などは[わたくし]私のことを、\n“不死鳥博士”と呼びますなぁ」
2561 = "「正是此名，研究所的同僚都稱我為“不死鳥博士”」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「フシチョーハカセ」
2017 = "「不死鳥博士」" 

# monologue
# JP: 思わず、といった感じでオリヴィがオウム返しする。
3396 = "奧莉薇看來也是無意中重複了一遍。" 

# monologue
# JP: その反応を見、不死鳥博士は満足そうに、\nメガネの奥の瞳を細める。
3442 = "對於她的反應，不死鳥博士輕眯雙眸，顯得非常滿意。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「[えいご,1]詠語圏の研究者などは――\nんふふっ！　ドクター・フェニックスとも！」
2716 = "「至於西方的研究者，哼哼！更是喚我為“Ｄｏｃｔｏｒ　Ｐｈｏｅｎｉｘ”！」" 

# monologue
# JP: 言葉とともに、バサリ、大きく服がひらめく。
3233 = "伴隨她得意洋洋的宣告，外衣也高高揚起" 

# monologue
# JP: いや――これは――\nポーズを、多分。決めている、のだ。
3158 = "不對，這應該是——她刻意擺出的姿勢。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「その方が私に似合うと思いませんかな？　右田氏」
2198 = "「右田先生，你不覺得這個名字與我更加般配嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……まぁ、確かに。どちらかを選べと言われれば」
1550 = "「……這個，要說二者選其一，或許正如您所言」" 

# monologue
# JP: 本当の名前。それは、電車姫さまから教えていただいた、\n『ひよこ』という名前のことだろう。
3633 = "而電車公主殿下之前告知我們的“雛”這個名字，理應就是她口中多有不滿的真名。" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;には極めて珍しい眼鏡をぴたりとかけこなす、\nその理知的な外観には、確かに似つかわしくはない。
3412 = "她戴著一副大小剛好合適的眼鏡，在\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;中實屬罕見。而她如此富有知性的打扮，搭配其真名也確實顯得格格不入。" 

# monologue
# JP: （ああ。ならばさっきの『もみじ』というのも――\n電車姫様の異名のようなものなのか？）
3759 = "（哦，那麼剛才她口中的“紅葉”——或許也屬於電車公主殿下的外號之類？）" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「ドっ――ドク、ター……フェニ、くすっ」
2943 = "「Ｄｏｃｔｏｒ……Ｐｈｏｅｎｉｘ」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むっ！？」
2271 = "「嗯！？」" 

# monologue
# JP: オリヴィが真下を向いて、背中を丸めて震えている。
3393 = "奧莉薇彎下腰，身體不停顫抖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　オリヴィ。まさか体調が――」
2337 = "「奧莉薇你怎麼了，該不會是身體又——」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「あははははははは！　なにそれ！　面白い！！\nすごい！　ほんっとカワリモノだねー！！」
2246 = "「啊哈哈哈！這什麼外號！真好玩！！你這可真是有夠奇葩的！！」" 

# 【ハチロク】
# display as 八六
# JP: 「オリヴィちゃん！？　いくら本当のことであっても、\n口に出してはいけないことがございますよ！？」
2338 = "「奧莉薇你這！？哪怕此言不假，也萬不可口無遮攔！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、その発言もどうかと思うぞ」
2010 = "「不不，你這話問題也不小」" 

# 【ハチロク】
# display as 八六
# JP: 「あっ！？」
2260 = "「啊！？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「んふふふふふっ。\n実にいい反応ですな。興味深い」
2286 = "「嘻嘻嘻嘻，各位如此反應可真令我喜出望外，頗感興趣」" 

# monologue
# JP: ドクター……いや、不死鳥博士は鷹揚に笑い、\nオリヴィにつかつか近づいていく。
3767 = "Ｐｈｏｅｎｉｘ……算了還是叫不死鳥博士吧，只見她莞爾一笑，快步朝奧莉薇走去。" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「わっ！？」
2218 = "「哇！？」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ふぅむ」
2270 = "「嗯嗯」" 

# monologue
# JP: 近い。近い。\n鼻と鼻とがくっつきそうだ。
3217 = "二人的距離近在咫尺，鼻子都快撞在一起了。" 

# monologue
# JP: 硬直してしまうオリヴィのことを、不死鳥博士は、\n至近距離からじっくりじっくり眺め回す。
3399 = "奧莉薇被嚇得僵在原地，而不死鳥博士就開始從頭到腳，細細打量起近在眼前的她來。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「前よりは状態がよさそうで安心です。\nいい生活を送っているようですな。オリヴィ氏」
2339 = "「奧莉薇女士，你的狀態相比之前似乎好轉許多，可見你近況尚佳，我懸著的一顆心也算落地了」" 

# 【オリヴィ】
# display as 奥莉薇
# JP: 「へ！？　オリヴィ、ドクター・フェニックスと\nあったことなんて一回もないと――あっ！」
2210 = "「咦！？Ｄｏｃｔｏｒ　Ｐｈｏｅｎｉｘ，奧莉薇以前可從來沒見過你呀——啊！」" 

