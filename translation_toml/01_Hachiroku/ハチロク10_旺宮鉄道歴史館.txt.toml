# JP: ……一目瞭然。不死鳥博士には驚く程にメガネが似合う。\nゆえ、乗客は『彼女はインテリ』と、単純に思いこんだ。
1456 = "……很明顯，這眼鏡與不死鳥博士實在是太過般配，所以可以理所當然地給乘客留下學識淵博的第一印象。" 

# monologue
# JP: 鉄道、観光、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;――マニアックな種々の質問に\n答えるために、自らも望み、彼女はひたすら学び続けた。
3576 = "為能夠回答有關鐵路、觀光、以及\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;等種種有深度的問題，同時更是出於無盡的求知慾，她從未停止學習的步伐。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「そうした[さなか,1]最中、かの論文に出会いました。\nいや――大げさではなく、世界がぐるりと回りましたな」
2704 = "「而我也正是在這時拜讀了這篇論文。可真不是我誇大其詞，感覺就好像眼前的世界都煥然一新」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしにも、いくらかわかるような気がします」
2447 = "「我感覺自己也能體會其中一二」" 

# monologue
# JP: ハチロクが大きく頷き、不死鳥博士をじっ――と見る。
3281 = "八六用力點了點頭，目不轉睛地看著不死鳥博士。" 

# monologue
# JP: あるいは両者の間になにか、\n\x%l共感;#00ffc040;共感%l;#;が交わされているのかもしれぬと、ふっと感じる。
3512 = "我突然想到，也許她們是通過\\x%l共感;#00ffc040;共鳴%l;#;在交流。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄さまに、魂があると断じていただき。望んでいいと、\nお許しいただき――わたくしの世界は一変いたしました」
2319 = "「在雙鐵少爺斷定我擁有靈魂，容許我擁有屬於自己的願望的那一刻，我的世界，的確也發生了天翻地覆般的變化」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「魂――いかにも。メンタルと呼ぶより、意識と呼ぶより、\n自我と呼ぶより。魂という名こそが、最もふさわしい」
2923 = "「靈魂——比起心理、意識，乃至自我，靈魂這一定義可謂再貼切不過」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
2240 = "「唔」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「あえていいましょう。“[ごと]如き”、と」
2093 = "「便容我在此設問，對於這“區區組件”」" 

# monologue
# JP: 不死鳥博士の声の温度が、すうっと下がる。
3182 = "不死鳥博士的腔調突然降到了冰點。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「何故、鉄道の消耗保安部品如きに魂が与えられ、\n人の形を与えられたか――考えたことはありますかな？」
2600 = "「為何區區一樣單純的鐵路安全組件能夠擁有靈魂，並被賦予人類之軀——這個問題你們是否想過？」" 

# 【ハチロク】
# display as 八六
# JP: 「！」
2838 = "「這！」" 

# monologue
# JP: ハチロクが小さく息を呑む。\nそのまましばらく黙り込み、唇を小さく開きまた閉じて。
3264 = "八六倒吸一口氣，然後陷入短暫的沉默。之後她微微張口想要說話，卻又再次緊閉嘴唇。" 

# monologue
# JP: ……そしてゆるゆる、ひどく、か細い言葉を吐く。
1460 = "……最後她以細若蚊聲的音量緩緩說道。" 

# 【ハチロク】
# display as 八六
# JP: 「いいえ……考えたこともございませぬ――\nわたくしたちは、そのように作られたもの、です、し」
2006 = "「不……我從未想過這個問題，畢竟我們生來就已經是這副模樣」" 

# monologue
# JP: 困ったような瞳が僕にすがってくる。\nならばともかく、僕の考えを言葉にしてみるまでだ。
3338 = "只見八六不知所措地看向我，那我就只能先說出自己的觀點了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「人の形は、緊急時には\x%l機関士;#00ffc040;機関士%l;#;、\x%l機関助士;#00ffc040;機関助士%l;#;の代役を\nつとめられるようにではないかと、考えます」
2465 = "「我認為人類之軀的意義可能在於，能夠在緊急狀況下替\\x%l機関士;#00ffc040;司機%l;#;和\\x%l機関助士;#00ffc040;司爐%l;#;履行職責」" 

# monologue
# JP: \x%l運転体;#00ffc040;運転体%l;#;稼働時にも、\x%l整備体;#00ffc040;整備体%l;#;を必ずキャブ内に安置するのは、\nその端的な証明だろう。
3209 = "並且在使用\\x%l運転体;#00ffc040;駕駛體%l;#;時一定要將\\x%l整備体;#00ffc040;整備體%l;#;安放於駕駛室，或許也能從側面證實我的推論。" 

# 【ひよこ】
# display as 不死鳥
# JP: 「では、魂は？」
2899 = "「那麼靈魂的存在意義呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「魂――は――」
2924 = "「靈魂就——」" 

# monologue
# JP: ハチロクの魂に触れ。\n触れているから、知っているから――
3371 = "因為我走進八六的內心，接觸、認識了她的靈魂——" 

# monologue
# JP: 僕は恐らく、\nそこを深くは考えぬようになっていたのだと、思い知る。
3523 = "我這才認識到，我很可能是在無意中不讓自己往深處思考。" 

# 【双鉄】
# display as 雙鐵
# JP: 「魂、は……」
2925 = "「靈魂是……」" 

# monologue
# JP: 考えるのが、踏み込んでいくのが怖い気がする。\nだが、それ以上に確信できる。
3517 = "我突然感到畏懼，不願進一步思考、深入這些方面，但是我更有一種近乎確信的預感。" 

# monologue
# JP: 僕とハチロクとオリヴィが求め、望む知識は。\nここから逃げては――絶対に手に入れられなくなると。
3429 = "如果對這個問題避而不談，無異於錯失良機，也再無可能獲得我和八六，還有奧莉薇苦苦尋求的知識。" 

# 【双鉄】
# display as 雙鐵
# JP: 「強いて言えば、各種の判断とコミュニケーションを\n行うため……いわば人工知能の働きからの自然発生的な」
2355 = "「如果真要我回答，我只能猜想是出於下達各種判斷以及與人交流的需要，而採用了人工智慧，其後由此自然形成靈魂」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「魂を自然発生し得た人工知能は一例も存在しませんな。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;以外の、全ての分野の技術史において」
2712 = "「至少在\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;之外的所有技術領域，有史以來都未曾出現過由人工智慧自然形成靈魂的事例」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう……なのですか。\nあ、いや、しかし、エアクラナビには魂があるような」
2522 = "「是……這樣嗎，啊，可是我感覺空凝機導航似乎也擁有靈魂」" 

# 【ひよこ】
# display as 不死鳥
# JP: 「ほう？」
2064 = "「什麼？」" 

# monologue
# JP: 疑わしそうな短い声。
3181 = "不死鳥博士的聲音中滿是疑問。" 

