1231 = "À không, khoan bàn đến chuyện tư cách,\ntôi cũng chỉ có kinh nghiệm mắng người khác hồi còn nhỏ xíu thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「その――だ」
945 = "「Chuyện đó——là」"
# monologue
# JP: 他人の負い目を、性的なプレイに置き換える。\nその方面にも疎かった僕には、やはり難度が高いと感じ。
1498 = "Biến sự áy náy của người khác thành trò chơi tình dục.\nĐối với một kẻ mù tịt về phương diện này như tôi, quả nhiên độ khó quá cao."
# monologue
# JP: いったん勢いが止まってしまうと、\n思考はどんどん絡まって、なかなか打開の糸口を――
1183 = "Một khi nhịp điệu bị khựng lại,\nsuy nghĩ cứ thế rối tung lên, mãi không tìm được lối thoát——"
