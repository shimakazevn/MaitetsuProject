# lines: 355 
# monologue
# JP: ……おしおきするため、考える。\n市長たるポーレットが犯したというミスの内容。
554 = "……Tôi suy nghĩ, để trừng phạt.\nNội dung sai lầm mà Thị trưởng Paulette đã phạm phải."
# monologue
# JP: 秘書たる僕が、おしおきするほど怒ることなら……\n今夜――この状況下では、たったひとつしか思いつけない。
1570 = "Nếu là chuyện khiến một thư ký như tôi phải tức giận đến mức trừng phạt……\nĐêm nay——trong hoàn cảnh này, tôi chỉ có thể nghĩ ra một lý do duy nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「市長のおかげで、残業ですよ。\n五連勤、ずっと残業続きだったところに、更に上乗せで」
1026 = "「Nhờ ơn Thị trưởng mà tôi phải làm thêm giờ đấy.\nĐã làm việc 5 ngày liên tục, toàn phải tăng ca, giờ lại còn thêm nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はうっ」
897 = "「Hau」"
# monologue
# JP: 演技とは思えぬほどの真に迫った表情で、\nポーレットはみるみるしおれてしまう。
1457 = "Với vẻ mặt chân thật đến mức không giống như đang diễn,\nPaulette xịu xuống thấy rõ."
# monologue
# JP: 心が痛む。が、これはイメクラなるプレイ。\nプレイであるなら、楽しみ、徹底するべきだ。
1356 = "Thấy xót xa. Nhưng đây là trò chơi nhập vai.\nĐã là trò chơi thì phải tận hưởng và chơi tới bến."
# 【双鉄】
# display as 雙鐵
