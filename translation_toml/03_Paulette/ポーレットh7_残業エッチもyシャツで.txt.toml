1512 = "Lý do Paulette tháo nút tay áo,\ncũng truyền đến qua làn da."
# 【ポーレット】
# display as 波萊特
# JP: 「クビレのところも、ぷにぷにも……こう、して――\nんっ――ぷ、ぁ。ツバもまぶして、ゆっくり、ゆっくり」
780 = "「Chỗ rãnh, cả chỗ mềm mềm nữa……làm, thế này——\nưm——phù, a. Thoa thêm nước bọt, từ từ, từ từ thôi」"
# monologue
