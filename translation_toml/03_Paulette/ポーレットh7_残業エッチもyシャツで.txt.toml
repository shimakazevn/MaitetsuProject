1334 = "Tôi cứ diễn là chính mình là được. Không cần gượng ép đóng vai người khác.\nGợi ý nhận được khiến lòng tôi nhẹ nhõm hơn."
# 【ポーレット】
# display as 波萊特
# JP: 「体、疲れて疲れて、こわばっちゃってるんですよね？\n肩も、腰も、目も、首筋も……それから、そこ、も」
792 = "「Cơ thể, mệt lử mệt lả, cứng đờ hết cả rồi đúng không?\nCả vai, eo, mắt, gáy……và cả, chỗ đó, nữa」"
# monologue
