573 = "「……Thế nên……chuyện đó——」"
# monologue
# JP: とは思うのだが、続く言葉が出てこない。\nそもそも僕に、他人を責める資格など……
1488 = "Nghĩ thì nghĩ vậy, nhưng tôi không thốt nên lời.\nVốn dĩ tôi làm gì có tư cách trách mắng người khác……"
# monologue
