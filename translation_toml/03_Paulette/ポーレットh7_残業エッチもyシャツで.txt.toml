# monologue
# JP: それは嬉しいことだと感じ――\nその嬉しさも、今は役柄で噛み潰す。
1568 = "Cảm thấy vui vì điều đó——\nnhưng niềm vui ấy, giờ cũng phải kìm nén lại vì vai diễn."
# 【双鉄】
# display as 雙鐵
# JP: 「私は説明したかっただけです。半端なマッサージは、\nかえって――血を一箇所に集めるだけだ、と」
961 = "「Tôi chỉ muốn giải thích thôi. Massage nửa vời,\nngược lại——chỉ khiến máu dồn về một chỗ thôi.」"
# monologue
# JP: （れるううううっ）
1692 = "（Liếm）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃううううううううっ！！！？」
812 = "「Hyaaaaaaaaaa!!!?」"
# monologue
# JP: その一箇所。包皮が自然とまくれあがって、\nピンクの真珠を露出させてるクリトリスへと舌を這わせる。
1536 = "Chỗ đó. Bao quy đầu tự nhiên tuột lên,\nđể lộ hạt ngọc trai màu hồng, tôi đưa lưỡi liếm âm vật."
# 【ポーレット】
# display as 波萊特
# JP: 「っ！　んっ――はっ――クリ、とりす――んっ！\nクリ――だめ――わたし――弱い――弱、くてっ」
924 = "「Ư! Ưm——hà——âm, vật——ưm!\nÂm vật——không được——em——yếu——nhạy cảm, lắm」"
# 【双鉄】
# display as 雙鐵
# JP: 「んぷっ」
859 = "「Ưm」"
# monologue
# JP: それが真実と証明しようとするかのように、\n愛液は更に量を増し、僕の顔へと吹きこぼれてくる。
1319 = "Như để chứng minh đó là sự thật,\ndâm thủy càng ứa ra nhiều hơn, bắn cả lên mặt tôi."
# monologue
# JP: そのタイミングを逃すことなく――
1363 = "Không bỏ lỡ cơ hội đó——"
# monologue
# JP: （づぶうううううううううっ！！！）
# 1684 = "（插入）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ァ――はっ――――んぐっ！」
867 = "「A——hà――――ưm!」"
# monologue
# JP: よほど油断をしてたのだろう。
1461 = "Chắc hẳn cô ấy đã lơ là cảnh giác lắm."
# monologue
# JP: アナルへ再び指を挿れられ、\nポーレットは大きく震えてしま――っ！！
1331 = "Bị nhét ngón tay vào lỗ hậu lần nữa,\nPaulette run lên bần bật——!!"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 878 = "「啊」" 
# monologue
# JP: 感じたところを見せてしまった。\n勃起が喜び震えてしまった。
1188 = "Lỡ để cô ấy thấy được chỗ tôi cảm thấy sướng rồi.\nDương vật sung sướng run lên."
# monologue
# JP: ポーレットの身が大きく揺れて、\n乳房が勃起を甘く刺激し――その快感に。
1458 = "Cơ thể Paulette rung lên bần bật,\nbầu ngực kích thích ngọt ngào lên dương vật——bởi khoái cảm đó."
# 【ポーレット】
# display as 波萊特
# JP: 「わ……かり、ました――わたし――わかったと、\n思い――ます――ちゅっ！」
963 = "「Em……hiểu, rồi——em——nghĩ là mình——\nđã hiểu——chụt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
917 = "「Ưm」"
# monologue
# JP: キスされる。僕の勃起の先端に。
1281 = "Bị hôn. Lên phần đỉnh dương vật của tôi."
# monologue
# JP: アナルを僕にほじられたまま、\nポーレットは舌を這わせ動かす。
1446 = "Trong khi lỗ hậu vẫn bị tôi moi móc,\nPaulette thè lưỡi ra và cử động."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……チュッ――れろッ――れるっ――ん……です、ね。半端なマッサージだと、余計にこっちゃう――からっ」
910 = "「Ưm……chụt——rộp——rộp——ưm……đúng, nhỉ. Massage nửa vời, thì càng thêm bức rứt——thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「う――くっ」
900 = "「Ư——hự」"
# monologue
# JP: アナルを責めてた指を外して、\nポーレットの豊かな尻肉を、掴むようにして支え持つ。
1350 = "Rút ngón tay đang tấn công lỗ hậu ra,\ntôi nắm lấy bờ mông nảy nở của Paulette để nâng đỡ."
# monologue
# JP: ポーレットの次の行為を予測して――\nポーレットの次の行為を、期待して。
1372 = "Dự đoán hành động tiếp theo của Paulette——\nKỳ vọng vào hành động tiếp theo của Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「だ、から――もっと、もっとほぐして。\n全部、ぐったりするくらいまで――――んっ……」
971 = "「Thế, nên——em sẽ, làm cho nó mềm ra hơn nữa.\nCho đến khi, xìu hẳn xuống mới thôi――――ưm……」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
879 = "「A!」"
# monologue
# JP: てろりと、暖かなぬめりによって、\n僕の勃起が濡らされていく。
1582 = "Bằng sự trơn ướt ấm áp, mơn trớn,\ndương vật của tôi đang dần bị làm ướt."
# monologue
# JP: はぁ、と切なげな響きと同時、\n熱っぽい息が、快感中枢をくすぐってくる。
1573 = "Cùng lúc với tiếng thở dốc nghẹn ngào,\nhơi thở nóng hổi đang cù lét trung khu khoái cảm của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「そこまで、ちゃあんとマッサージ。\nわたし、ですから――頑張りますね――あーーんむっ！」
965 = "「Sẽ massage, đàng hoàng cho đến lúc đó.\nVì là em, nên——em sẽ cố gắng——a——ưm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぉぅっ！！」
942 = "「Ồ!!」"
# monologue
# JP: ざらざらになめらかに包み込まれる。\n亀頭の先がちゅるん、いっそ軽やかに飲み込まれてる。
1585 = "Bị bao bọc bởi sự mượt mà xen lẫn thô ráp.\nPhần đỉnh quy đầu bị nuốt trọn một cách nhẹ nhàng."
# monologue
# JP: そうして竿の全体が、おっぱいの甘い圧力に、\n挟まれ、揉まれ、ゆすられていく。
1242 = "Và rồi toàn bộ phần thân, bị áp lực ngọt ngào của bầu ngực,\nkẹp lấy, xoa nắn, và lắc lư."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……ちゅっ――ぺろっ、れろっ――ん……\nれる……れろっ――ぺろおっ――れるんっ！」
911 = "「Ưm……chụt——liếm, rộp——ưm……\nliếm……rộp——liếm——rộp!」"
# monologue
# JP: （ゆさっ――むにゅっ――もみゅっ！　こねりっ！）
1647 = "（Lắc——nhóp——nhóp nhép! Xoa nắn!）"
# 【双鉄】
# display as 雙鐵
# JP: 「く――あっ――あっ――おっ――」
838 = "「Ư——a——a——ô——」"
# monologue
# JP: 亀頭をしつこくおしゃぶりしながら、\nポーレットはあえて唾液を、ぼとぼとこぼし垂らしてく。
1442 = "Vừa bú mút quy đầu một cách dai dẳng,\nPaulette vừa cố tình để nước bọt nhỏ giọt ròng ròng."
# monologue
# JP: それが胸の谷間に入り、僕の勃起に絡みつき――
1583 = "Chúng chảy vào khe ngực, quấn lấy dương vật của tôi——"
# 【ポーレット】
# display as 波萊特
# JP: 「あんむっ――んっ――ちゅっ――ちゅううっ――\nちゅずっ――れろっ――れるうっ――ちゅるっ！」
872 = "「A ưm——ưm——chụt——chụt——\nchụt——rộp——rộp——chụt!」"
# monologue
# JP: （にゅるっ！　にゅっ！　もみゅうっ！　みゅぬるっ！）
1676 = "（Trơn tuột! Tuột! Nhóp nhép! Tuột!）"
# monologue
# JP: 先端は完全に包まれて、くびれの裏を舐められ、\n吸われ、唇のぷりぷりでしごかれている。
1584 = "Phần đỉnh bị bao trọn hoàn toàn, rãnh quy đầu bị liếm láp,\nbị mút mát, và bị đôi môi căng mọng tuốt lấy."
# monologue
# JP: その上竿がぬめるおっぱいに挟み込まれて、\n油断をすれば、今すぐにでも射精しそ――っ！？
1233 = "Thêm vào đó, phần thân bị kẹp chặt giữa bầu ngực ướt đẫm,\nnếu lơ là, tôi có thể xuất tinh ngay lập tức——!?"
# 【双鉄】
# display as 雙鐵
# JP: 「んぷっ！？」
928 = "「Ưm!?」"
# monologue
# JP: 腰の力が抜けたのか、それとも単なるおねだりか、\nポーレットの濡れたおまんこが鼻へ口へと押し付けられる。
1451 = "Do eo hết sức, hay đơn thuần chỉ là làm nũng,\nâm đạo ướt át của Paulette ấn sát vào mũi và miệng tôi."
# monologue
# JP: ポーレットの望みが何であるかは、\n僕とてはっきり理解できるが――
1338 = "Dù tôi hiểu rất rõ,\nmong muốn của Paulette là gì——"
# 【双鉄】
# display as 雙鐵
# JP: （……これで舐めては、おしおきにならん――いや！？）
1590 = "（……Thế này mà liếm thì, đâu còn là trừng phạt nữa——không đúng!?）"
# monologue
# JP: 僕が先にイカされたなら、お詫びが成立してしまう。\nおしおきプレイは、そこで[しま]終いとなるだろう。
1290 = "Nếu tôi bị làm cho lên đỉnh trước, thì coi như lời xin lỗi đã được chấp nhận.\nTrò chơi trừng phạt sẽ kết thúc tại đó."
# monologue
# JP: せっかくポーレットが提案してくれたプレイだ。\n中途半端で終わったのでは、申し訳ない。
1448 = "Trò chơi do chính Paulette cất công đề xuất.\nNếu kết thúc dang dở thì thật có lỗi."
# 【双鉄】
# display as 雙鐵
# JP: （じゅぶううううううううううっ！）
1651 = "（Chụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？　なっ――いきなり――んふっ、あっ！\nそ、そんな――お、おまんこ――じゅうって、吸、って」
837 = "「Kya!? Gì——đột ngột quá——ưm, a!\nS-sao lại——â-âm đạo——bị mút, chùn chụt, thế」"
# monologue
# JP: （じゅる！　れろっ！　みゅりゅ！　んっ――るうっ！）
1690 = "（Rột! Liếm! Rột! Ưm——rột!）"
# monologue
# JP: ポーレットの膣はむちむちな上、\n腰を一番押し込んだとき、子宮の入り口に強くぶつかる。
1456 = "Âm đạo của Paulette đã đầy đặn thì chớ,\nkhi đẩy eo vào sâu nhất, lại còn đâm mạnh vào cửa tử cung."
# monologue
# JP: まるで計って誂えたように、\n僕の勃起をぴったりとおさめてくれる奥深さがある。
1534 = "Độ sâu ấy ôm trọn lấy dương vật của tôi vừa khít,\ncứ như thể được đo đạc và thiết kế riêng vậy."
# monologue
# JP: （じゅつ――れるっ――れろおっ！　べろんっ！！！）
# 1690 = "（舔來舔去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃ、んっ！　そこ――あうっ――つぶつぶ、する、\nとこ、べろ、べろ――され、た――らあっ！」
824 = "「Hya, ưm! Chỗ đó——a——chỗ, sần sùi,\nbị, liếm, láp——mất, rồi——a!」"
# monologue
# JP: その膣に、舌ではあまりに短すぎるゆえ――\nせめて、届く範囲の全てを丹念に丹念舐めまわし。
1367 = "Đối với âm đạo ấy, lưỡi thì quá ngắn——\nnên ít nhất, tôi cẩn thận liếm láp mọi ngóc ngách trong phạm vi có thể chạm tới."
# monologue
# JP: そうして時折、つぶつぶの、\nポーレットが強く感じる部分を――
1486 = "Và rồi thỉnh thoảng, lại nhắm vào phần sần sùi,\nnơi Paulette cảm nhận mạnh mẽ nhất——"
# monologue
# JP: （ざりゅりゅっ！）
1685 = "（Rộp rộp!）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃふっ！　んくっ――あっ――やっ――はッ――\nんっ――きもち――きゃう――あ――きもち、いいっ」
821 = "「Kya! Ưm——a——á——hà——\nưm——sướng——kya——a——sướng, quá」"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ！」
922 = "「Ưm!」"
# monologue
# JP: ポーレットの胸が震えるだけで、危うく射精しそうになる。\n射精、したい。すごく。したい。
1460 = "Chỉ cần ngực Paulette run rẩy, tôi đã suýt nữa thì xuất tinh.\nMuốn xuất tinh. Rất muốn. Muốn lắm rồi."
# monologue
# JP: 快感にあえぐポーレットが、僕の勃起を放り出し、\n口を離したそのことがもう、いっそ恨めしいほどに。
1449 = "Việc Paulette vừa thở dốc vì khoái cảm, vừa nhả dương vật của tôi ra,\nrời môi đi, khiến tôi hận không thể tả."
# monologue
# JP: （じゅるるっ！　ぷむっ――ちゅぶるっ――れるうっ）
# 1690 = "（舔來舔去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃううっ！？　――あっ――だめ――らめぇっ――\nクリ、まで――クリ、まで――押され――一当たっ、て」
830 = "「Hya!? ——A——không được——không được đâu——\nđến cả, âm vật——đến cả, âm vật——cũng bị đè——bị chạm, vào rồi」"
# monologue
# JP: だけれど今は、未練の全てを舌の動きに載せ替える。\n精の代わりにせめて唾液を、膣に子宮に流しこもうと。
1383 = "Nhưng bây giờ, tôi dồn hết sự luyến tiếc vào chuyển động của lưỡi.\nÍt nhất cũng phải truyền nước bọt thay cho tinh dịch vào âm đạo, vào tử cung."
# monologue
# JP: （くりゅんっ！）
1671 = "（Nhóp!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んきゅんっ！？　んっ――ふあっ！？　らめっ、\nイクっ！　ふあっ！　あっ！　あっ！　あっ！！」
834 = "「Ưm kyun!? Ưm——phù!? Không được,\nlên đỉnh mất! Phù! A! A! A!!」"
# monologue
# JP: 指を伸ばしてアナルを刺激し、舌と唇、顔全体も使って\n一気に責め立てる。
1327 = "Duỗi ngón tay kích thích lỗ hậu, dùng cả lưỡi, môi và toàn bộ khuôn mặt\nđể tấn công dồn dập."
# monologue
# JP: 液、熱、匂いが――舌をきゅんきゅん締め付けてくる\nむちむち膣が、ポーレットの絶頂はすぐと伝えてくれて！
1318 = "Dâm thủy, hơi nóng, mùi hương——âm đạo đầy đặn\nsiết chặt lấy lưỡi tôi, báo cho tôi biết Paulette sắp lên đỉnh đến nơi rồi!"
# monologue
# JP: （じゅるるるるうううううううううううううっ！！！）
1696 = "（Rột rột rột!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゅぁぁあああああああああああああああんっ！！！」
810 = "「Hyaaaaaaaaaaaaaaaaaaaan!!!」"
# monologue
# JP: （きゅうううううっ！）
# 1664 = "（夾緊）" 
# monologue
# JP: 舌を性器と勘違いして、\n膣壁がすぼまり蠢き、精液を絞る蠕動をする。
1538 = "Lầm tưởng lưỡi là bộ phận sinh dục,\nthành âm đạo co rúm cựa quậy, nhu động hòng vắt kiệt tinh dịch."
# monologue
# JP: イカせたことには大満足だが、\nその蠢きを感じてしまえばいっそうの射精欲求――っ！？
1285 = "Việc làm cô ấy lên đỉnh khiến tôi rất mãn nguyện,\nnhưng cảm nhận được sự cựa quậy đó lại càng kích thích khao khát xuất tinh——!?"
# 【ポーレット】
# display as 波萊特
# JP: 「ひあっ――あ――あっ――ん――ンムッ――はむうっ」
808 = "「Hya——a——a——ưm——ưm——hàm」"
# monologue
# JP: イキながら、まだ膣壁を痙攣させつつ、\nけれどポーレットはその唇で僕をくわえてっ――
1447 = "Dù đang lên đỉnh, thành âm đạo vẫn đang co giật,\nnhưng Paulette lại dùng đôi môi ngậm lấy tôi——"
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――んむっ――ちゅっ――ちゅうう――ジュル――\nあむっ――ちゅうっ――チュッ――ちゅるるう――じゅ」
905 = "「Ưm——ưm——chụt——chụt——rột——\nưm——chụt——chụt——chụt——chụt」"
# monologue
# JP: （もみゅ！　みゅにゅっ！　もにゅつ！　みゅりゅっ！）
# 1676 = "（揉來揉去）" 
# 【双鉄】
# display as 雙鐵
# JP: 「あ――あっ！」
870 = "「A——a!」"
# monologue
# JP: 普段と、丁寧で僕を喜ばせる工夫を凝らしたものとは違う、\n単純極まる、本能的な――
1269 = "Khác với thường ngày, luôn cẩn thận và bày đủ trò để làm tôi vui,\nmột sự hút mút cực kỳ đơn thuần, mang tính bản năng——"
# 【双鉄】
# display as 雙鐵
# JP: （まるで――まるで、これは――赤子が乳を貪るような）
1687 = "（Cứ như——cứ như thể, đây là——trẻ sơ sinh đang tham lam bú sữa mẹ vậy）"
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅうっ――ちゅつ――ちゅむっ――ちゅるっ――んっ\n――ちゅるうっ――ちゅっ――ずじゅっ――ずりゅりゅ」
894 = "「Chụt——chụt——chụt——chụt——ưm\n——chụt——chụt——chụt——chụt」"
# monologue
# JP: （みゅにゅっ！　もみゅっ！　むにゅっ！　むりゅっ！）
# 1676 = "（揉來揉去）" 
# monologue
# JP: ただ一心な、ひたらな、あどけないほどに単純な吸い。\n暴力的なほど単調な、胸をただただ寄せる感触。
1272 = "Một sự mút mát đơn thuần đến ngây thơ, một lòng một dạ.\nCảm giác ép ngực đơn điệu đến mức bạo lực."
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ぁ――ぁっ――あっ――」
868 = "「A——a——a——a——」"
# monologue
# JP: 顔が、見えない。それがまた、性感を妄想を増大させる。\nあのポーレットが、理性と知性の塊が――
1360 = "Không nhìn thấy, khuôn mặt. Điều đó lại càng làm tăng thêm dục vọng và sự hoang tưởng.\nPaulette đó, hiện thân của lý trí và trí tuệ——"
# monologue
# JP: どんなに呆けた表情で、これほど単調に動物的に、\n僕の射精を、精液を、一心不乱に求め――っっ！！？
1270 = "Với vẻ mặt ngây dại thế nào, mà lại khao khát sự xuất tinh,\ntinh dịch của tôi một cách đơn điệu, đầy tính động vật đến vậy——!!?"
# 【ポーレット】
# display as 波萊特
# JP: 「れろっ！　れるっ！　れろろっ！　にゅるっ！！\nずっ！　じゅっ――じゅううううっ！　じゅるうっ！」
895 = "「Rộp! Liếm! Rộp! Tuột!!\nThọc! Chụt——chụt! Rột!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぃあっ！」
# 879 = "「啊！」" 
# monologue
# JP: 堪えきれない精液が、おそらくぷくりと、\n亀頭のとば口に滲んでしまったのだろう。
1304 = "Tinh dịch không thể kìm nén được nữa, có lẽ đã rỉ ra,\ntrào lên ở miệng quy đầu rồi."
# monologue
# JP: ポーレットの舌はそれを求めて、尿道先端をえぐり\nほじくり舐めて啜ってっ！！！
1453 = "Lưỡi Paulette thèm khát điều đó, khoét sâu vào đầu niệu đạo,\nmoi móc, liếm láp và mút mát!!!"
# 【ポーレット】
# display as 波萊特
# JP: 「んりゅ――れりゅっ――ぞりゅっ――ちゅるんっ！」
903 = "「Ưm——rộp——rộp——chụt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ァ――あっ！　ポーレット！　ポーレットっ！」
887 = "「A——a! Paulette! Paulette!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぢゅぶるるるるるぅ～～～～～～っっ！！！」
896 = "「Chụt rột rột rột rột～～～～～～!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 879 = "「啊！」" 
# monologue
# JP: （びゅぷっ！　どびゅっ！　どぷっ！　びゅるるっ！）
1662 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んむっ！？　んっ――ふぷっ――ん、んっ――\nこくっ！　ごくっ――ごくっ――ごくんっ！」
930 = "「Ưm!? Ưm——phù——ưm, ưm——\nực! Ực——ực——ực!」"
# monologue
# JP: （びゅうっ！　びゅっ――びゅるるっ！　びゅっ！）
1656 = "（Phụt! Phụt——phụt! Phụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぷ――あっ――ごくっ――ごくっ、ごくんっ――ごく」
847 = "「Phù——a——ực——ực, ực——ực」"
# monologue
# JP: ……射精を受け止め、飲んでもらえる。\n圧倒的な幸福感が、胸にふくれて、まぁるく収まる。
550 = "……Đón nhận tinh dịch và nuốt trọn.\nCảm giác hạnh phúc ngập tràn dâng trào trong lồng ngực, rồi dịu lại một cách trọn vẹn."
# monologue
# JP: 満たされている。満たしてる。\n今、僕たちは、調和のとれた一対に――――いや！
1280 = "Đang được lấp đầy. Đang lấp đầy.\nBây giờ, chúng tôi là một cặp đôi hài hòa――――không!"
# 【双鉄】
# display as 雙鐵
# JP: 「……確かに、結構なマッサージでした。が――」
571 = "「……Quả thật là một màn massage rất tuyệt. Nhưng——」"
# monologue
# JP: おしおきプレイを、ここで終わらせたくはない。\nしかし射精で勃起はしおれ、マッサージの成果が示された。
1324 = "Tôi không muốn kết thúc trò chơi trừng phạt ở đây.\nTuy nhiên, dương vật đã xìu xuống sau khi xuất tinh, cho thấy kết quả của việc massage."
# monologue
# JP: この難問を解決するのは僕には難しそうと感じる。\nならば？　――ポーレットに委ねよう。
1294 = "Giải quyết bài toán khó này có vẻ hơi quá sức với tôi.\nNếu vậy thì sao? ——Giao lại cho Paulette thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「市長は、これで今回の件のご責任を――」
954 = "「Thị trưởng, thế này là cô đã chịu trách nhiệm cho chuyện lần này——」"
# 【ポーレット】
# display as 波萊特
# JP: 「ううん！　全然！　まだ全然！\n取りきれたなんて思ってませんっ！！！」
787 = "「Không! Hoàn toàn không! Vẫn chưa đâu!\nEm không nghĩ là mình đã chịu trách nhiệm xong đâu!!!」"
# monologue
# JP: 僕の上からまだどかぬまま、\nポーレットは慌てたような声を出す。
1444 = "Vẫn chưa chịu rời khỏi người tôi,\nPaulette cất giọng hoảng hốt."
# 【ポーレット】
# display as 波萊特
# JP: 「あの――わたし、これ……典型的な、わたしの、\n失敗パターンだって……思います、はい」
1022 = "「Cái đó——em nghĩ, đây……là một kiểu,\nthất bại điển hình của em……vâng」"
# 【双鉄】
# display as 雙鐵
# JP: 「典型的な？」
799 = "「Điển hình?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですから、その、夢中になって、[しやきょうさく,3]視野狭窄して。\nそれで、自分勝手に動いちゃう……みたいな」
946 = "「Nghĩa là, kiểu, em quá đắm chìm vào nó, rồi tầm nhìn bị thu hẹp lại.\nSau đó, em lại tự ý hành động……kiểu vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1012 = "「Ra là vậy」"
# monologue
# JP: 普段は自制を――もっと緩めていいのでは？\nと思うレベルで効かせ続けて、見事に抑えてくれてるが。
1263 = "Bình thường cô ấy luôn kiềm chế bản thân——nới lỏng ra chút nữa cũng được mà?\nĐến mức tôi phải nghĩ vậy, và cô ấy đã kìm nén rất tốt."
# monologue
# JP: ふたりっきりのときには……確かに。ポーレットは\nその手の失敗を犯してしまいがちかもしれん。
1524 = "Khi chỉ có hai người……Quả thực. Paulette\nrất dễ mắc phải kiểu sai lầm đó."
# 【双鉄】
# display as 雙鐵
# JP: 「では、おしおきと、その失敗の矯正を――\n両立させることができれば」
1025 = "「Vậy thì, trừng phạt và sửa chữa sai lầm đó——\nnếu có thể làm cả hai cùng lúc」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい！　それですよね！　それ、わたし、\nわたし！　アイディアあるんです！！」
926 = "「Vâng! Đúng rồi! Cái đó, em,\nem! Em có ý tưởng này!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
# 935 = "「嗯？」" 
# 【双鉄】
# display as 雙鐵
# JP: 「……っと、こんなものか？」
576 = "「……Rồi, thế này được chưa?」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、はい。これ――うん。\nわ――この程度でも、結構、手、動かないですね」
933 = "「V-vâng. Thế này——ừm.\nOa——chỉ thế này thôi mà, tay, cũng không cử động được mấy nhỉ」"
# monologue
# JP: 右袖ボタンを、左袖に。左袖ボタンを、右袖に。
1348 = "Cài nút tay áo phải vào tay áo trái. Cài nút tay áo trái vào tay áo phải."
# monologue
# JP: 袖から腕を抜くだけで解消できる拘束だけれど、\nポーレットは実に満足そうだ。
1574 = "Dù chỉ là kiểu trói buộc có thể gỡ ra dễ dàng bằng cách rút tay khỏi tay áo,\nnhưng Paulette có vẻ rất mãn nguyện."
# 【ポーレット】
# display as 波萊特
# JP: 「これなら、わざわざ縛らなくってもいいですね。\n双鉄君、さすがだなぁ」
1014 = "「Thế này thì không cần phải cất công trói lại nữa.\nAnh Soutetsu, đúng là tuyệt thật」"
# monologue
# JP: ……いや、本当に単なる思いつきだ。
547 = "……Không, thực sự chỉ là tôi chợt nghĩ ra thôi."
# monologue
# JP: ポーレットご提案の、“ロープで縛る”は、\n怪我をさせそうで怖くて――回避したかったが故の。
1450 = "Vì sợ lời đề nghị \"trói bằng dây thừng\" của Paulette\nsẽ làm cô ấy bị thương——nên tôi muốn tránh nó."
# 【ポーレット】
# display as 波萊特
# JP: 「これでもう、わたし、身動きできないですし。\n勝手に暴走、しようとしてもできませんよね！」
1013 = "「Thế này thì em, không thể cử động được nữa rồi.\nDù có muốn tự ý mất kiểm soát, cũng không được nữa đúng không!」"
# monologue
# JP: 弾みに弾んだその声にもう、\n暴走の兆しを感じてしまうが――
1308 = "Giọng nói hớn hở đó,\nđã mang theo điềm báo của sự mất kiểm soát rồi——"
# monologue
# JP: そうならぬよう、厳しく冷たく、\nおしおき＆教育エッチを、貫くことだけ心がけよう。
1476 = "Để không thành ra như vậy, tôi phải nghiêm khắc và lạnh lùng,\nquyết tâm thực hiện trọn vẹn màn H trừng phạt & giáo dục này."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
562 = "「…………」"
# 【ポーレット】
# display as 波萊特
# JP: 「ふえっ！？」
862 = "「Hể!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……あの――双鉄くん！　わ、わたし！　えと、\n双鉄くんのお顔とか見える姿勢の方が、そのっ」
1023 = "「A……cái đó——Anh Soutetsu! E-em! À ừm,\ntư thế có thể nhìn thấy mặt Anh Soutetsu, thì hơn」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの好みに合わせるのでは、\nおしおきとしては失格だろう」
991 = "「Nếu làm theo sở thích của Paulette,\nthì đâu còn là trừng phạt nữa」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――」
866 = "「A——」"
# 【双鉄】
# display as 雙鐵
# JP: 「その程度のことさえ失念し、暴走してしまう。\nそれを改めるための手段は――さて、なんだ？」
1015 = "「Đến cả mức độ đó mà cô cũng quên mất, rồi lại mất kiểm soát.\nBiện pháp để sửa đổi điều đó là——nào, là gì?」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　あ、あの――拘束、無意味って……\n今、えと、わたしが証明しちゃいましたし」
865 = "「Hả? À, cái đó——trói buộc, là vô nghĩa……\nBây giờ, à ừm, em đã chứng minh điều đó rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
976 = "「Đúng vậy」"
# monologue
# JP: （ずにっ！）
1680 = "（Bóp!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んひゅっんっ！！？　ふわっ！？　そ、双鉄くん\nこれっ！　あのっ！！」
920 = "「Ưm hyun!!? Oa!? A-Anh Soutetsu\ncái này! Cái đó!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「また同じことを繰り返すのか？　考えるんだ。\n落ち着くために、整頓のため――何が一番良い手段かを」
803 = "「Lại định lặp lại chuyện tương tự sao? Suy nghĩ đi.\nĐể bình tĩnh lại, để sắp xếp lại——biện pháp nào là tốt nhất」"
# 【ポーレット】
# display as 波萊特
# JP: 「え、と――あの――落ち着いて、整頓すれば……\nそか、パニックにならなくて。整頓するには――あっ！」
1021 = "「À, ừm——cái đó——nếu bình tĩnh lại, sắp xếp lại……\nra vậy, sẽ không hoảng loạn. Để sắp xếp lại thì——a!」"
# monologue
# JP: 顔が、見えない。\nけれども、わずかに高まった体温が教えてくれる。
1359 = "Không nhìn thấy, khuôn mặt.\nNhưng nhiệt độ cơ thể tăng lên đôi chút đã cho tôi biết."
# monologue
# JP: ポーレットは今、理解の喜びに微笑んでいる。
1452 = "Paulette lúc này, đang mỉm cười vì niềm vui thấu hiểu."
# 【ポーレット】
# display as 波萊特
# JP: 「言語化、ですね？　思ってることを言葉にすれば――\nその時点でもう、暴走からは遠ざかれます」
993 = "「Ngôn từ hóa, đúng không? Nếu biến những gì mình nghĩ thành lời——\nthì ngay lúc đó, đã tránh xa được sự mất kiểm soát rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ」
979 = "「Đúng vậy」"
# monologue
# JP: （ふにゅっ！！！）
1677 = "（Bóp!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふやっ――あっ――お、おっぱいっ」
809 = "「Phuya——a——ng-ngực」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう。おっぱいだな」
980 = "「Đúng. Là ngực đấy」"
# monologue
# JP: （ふにゅ――ぷにっ――くにゅんっ！　もみゅう！）
# 1676 = "（揉來揉去）" 
# monologue
# JP: ポーレットの持つぷりぷり感の、\nまさに極北たる豊かなおっぱい。
1462 = "Cảm giác căng mọng mà Paulette sở hữu,\nchính là đôi gò bồng đảo vô cùng phong nhũ."
# monologue
# JP: 揉めばすぐさま、\nポーレットは蕩けてしまうところなのだが――
1371 = "Chỉ cần xoa bóp là ngay lập tức,\nPaulette sẽ tan chảy ra mất——"
# 【ポーレット】
# display as 波萊特
# JP: 「わ、わたし――今っ、双鉄くん、に――おっぱい――\nうしろ――から、わしずかみ――みたい、され――て」
958 = "「E-em——bây giờ, bị Anh Soutetsu——ngực——\ntừ phía sau——như bị, tóm gọn——vậy」"
# monologue
# JP: （くにゅっ！　もにゅっ！　ぷりゅっ！　くりゅんっ！）
# 1676 = "（揉來揉去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「くひっ――いっ――あ……それで、もみ、もみ――され、\nながらっ――んっ――先っぽ、乳首、指で、コネっ、て」
807 = "「Kuhi——i——a……rồi, bị xoa, xoa——\nưm——phần đỉnh, nhũ hoa, bị ngón tay, mân mê」"
# monologue
# JP: （こねっ――こりゅっ――きゅにゅ――むにゅんっ！）
1679 = "（Mân mê——xoa nắn——bóp nhẹ——nắn!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ンンンっ――あっ――手、で――指、で――おっぱい、\nわたし、おっぱい――むにむに――いじられ、ふ、あ！」
901 = "「Ưm ưm ưm——a——bằng tay——bằng ngón tay——ngực,\ncủa em, ngực——mềm nhũn——bị sờ soạng, phù, a!」"
# monologue
# JP: ――言語化が、確かに暴走を抑えてる。\nが……抑えられてしまうとなると、何故か悔しい。
1384 = "——Việc nói ra bằng lời, quả thực đã kiềm chế được sự mất kiểm soát.\nNhưng……khi cô ấy kiềm chế được rồi, không hiểu sao tôi lại thấy hậm hực."
# monologue
# JP: ぐちゃぐちゃに乱してしまいたくなり、\n責めの手数を増していく。
1354 = "Muốn làm cô ấy rối tung rối mù lên,\ntôi tăng thêm các thủ đoạn tấn công."
# monologue
# JP: （れろっ）
# 1692 = "（舔舐）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！？　あっ――耳、おみみ――うら、がわっ――\nんっ！　く、くひっ！　首っ――筋――ぺろ、ぺろっ」
831 = "「Hya!? A——tai, tai——phía, sau——\nưm! Ku, kuhi! Gáy——bị——liếm, liếm」"
# monologue
# JP: （ずにゅんっ！）
1674 = "（Thọc!）"
# 【ポーレット】
# display as 波萊特
# JP: 「あひゅんっ！　腰、ぐいって！　押されて、こすれてっわたし、おまた――おちんちん、生えてる、みたい、で」
822 = "「Ahyun! Eo, bị đẩy mạnh! Bị đè, bị cọ xát\nchỗ ấy của em——như mọc ra, dương vật, vậy」"
# monologue
# JP: 蕩けながらも、崩れ切らない。\n体の熱さが、雌の匂いが、僕の何かを駆り立てる。
1286 = "Dù đang tan chảy, nhưng vẫn chưa hoàn toàn sụp đổ.\nHơi nóng cơ thể, mùi hương giống cái, thôi thúc một thứ gì đó trong tôi."
# monologue
# JP: （ずりゅっ！　もみゅっ！　れる！　ずちゅん！）
1675 = "（Trượt! Nắn! Liếm! Phập!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひあっ！　あっ！　あ！　しゅごっ――これっ――ん！\nおまんこ、ずりずり、こす、られ――てっ――んふっ！」
820 = "「Hya! A! A! Dữ quá——thế này——ưm!\nÂm đạo, bị trượt, bị cọ, xát——ưm!」"
# monologue
# JP: （もみゅっ！　くにゅっ！　くりっ！　くいいいいっ！）
1670 = "（Nắn! Bóp! Xoa! Mạnh lên!）"
# 【ポーレット】
# display as 波萊特
# JP: 「いうっ！？　あっ――おっぱい――乳首ッ――ひッ！\nぎゅって、されて――やんっ！　あっ――腰っ、ベロっ」
889 = "「Iu!? A——ngực——nhũ hoa——hi!\nBị bóp chặt——á! A——eo, bị liếm」"
# monologue
# JP: 言葉が単純になっていく。\n動きも直線的になる。
1276 = "Ngôn từ ngày càng trở nên đơn giản.\nChuyển động cũng trở nên trực diện hơn."
# monologue
# JP: ポーレットをもっと崩して、イカせたい。\nその思いだけに、僕の全部が焦がされていく。
1341 = "Muốn làm Paulette sụp đổ hơn nữa, muốn làm cô ấy lên đỉnh.\nChỉ với suy nghĩ đó, toàn bộ con người tôi đang bùng cháy."
# monologue
# JP: （ずりっ！　れるっ！　ちゅむっ！　もみゅっ！！）
# 1675 = "（揉來揉去、舔來舔去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「やっ、らっ！　らめっ――これっ――ちんちん――\nあつくて――とけりゅっ――とけちゃうっ！」
786 = "「A, á! Không được——thế này——dương vật——\nnóng quá——tan chảy——tan chảy mất!」"
# monologue
# JP: （もみゅっ！　こりゅっ！　ちゅぱっ！　ずりゅん！）
# 1676 = "（揉來揉去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ――やぁっ――なのおっ！　ずりずり、\nだけ――でっ！　セックス、なしで、イクの、やぁぁ！」
854 = "「Phù——a——a——không chịu đâu! Chỉ cọ xát,\nthôi——mà! Không quan hệ, mà lên đỉnh, không chịu đâu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 879 = "「啊！」" 
# monologue
# JP: 慌てて、止まる。\n動きたがってる腰を、体を、非常制動で押さえ込むっ！
1346 = "Tôi vội vàng dừng lại.\nDùng phanh khẩn cấp để kìm nén chiếc eo, cơ thể đang chực chờ chuyển động!"
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ――あっ――双鉄くん――双鉄くぅん」
853 = "「Phù——a——a——Anh Soutetsu——Anh Soutetsu」"
# monologue
# JP: 泣きそうな声。甘えてる声。\n愛おしくて、申し訳なくて、言葉がなかなか出てこない。
1282 = "Giọng nói như sắp khóc. Giọng nói nũng nịu.\nVừa đáng yêu, vừa thấy có lỗi, khiến tôi mãi không thốt nên lời."
# monologue
# JP: だからただ――頭に頭を、\n体に体を、優しく優しく擦り付ける。
1377 = "Nên tôi chỉ——đầu tựa vào đầu,\ncơ thể áp sát cơ thể, cọ xát thật nhẹ nhàng, thật dịu dàng."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くぅん」
1029 = "「Anh Soutetsu」"
# monologue
# JP: 同じ言葉。僕の名前。\nけれども、まったく違った響き。
1259 = "Cùng một từ. Tên của tôi.\nNhưng âm vang lại hoàn toàn khác."
# monologue
# JP: ポーレットの安堵は僕を緩めて――\n歪みかけてた欲望を、まっすぐなものに戻してくれる。
1550 = "Sự an tâm của Paulette làm tôi buông lỏng——\nđưa dục vọng đang chực méo mó trở về đúng quỹ đạo."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
985 = "「Paulette」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。双鉄くん」
934 = "「Vâng. Anh Soutetsu」"
# monologue
# JP: それだけでいい。\nただ、それだけで。
1567 = "Chỉ vậy là đủ rồi.\nChỉ cần vậy thôi."
# monologue
# JP: 演技の全てを脱ぎ捨てたなら、\nポーレットへの愛しさだけで、全身が心地よく満たされる。
1387 = "Nếu trút bỏ hết mọi diễn xuất,\ntoàn thân tôi sẽ được lấp đầy một cách dễ chịu chỉ bằng tình yêu dành cho Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「いくぞ」
969 = "「Anh vào nhé」"
# monologue
# JP: （ぬっ――ぐっ――）
# 1684 = "（插入）" 
# 【ポーレット】
# display as 波萊特
# JP: 「あっ――んっ……ふっ――ぁ……太ッ――んっ！」
869 = "「A——ưm……phù——a……To quá——ưm!」"
# monologue
# JP: いつもより興奮しているのか、\nそれとも姿勢が、ポーレットの入り口を狭めてるのか――
1193 = "Do cô ấy hưng phấn hơn bình thường,\nhay do tư thế này làm lối vào của Paulette hẹp lại——"
# monologue
# JP: （ぐっ――ちっ――みっっ――りっ――）
1688 = "（Thọc——vào——sâu——hơn——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひっ！？　あっ――まだ――まだ――全部っ――\nふっ――太い――とこっ――んっ！」
833 = "「Hi!? A——vẫn chưa——chưa——vào hết——\nphù——chỗ——to——ưm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「もう――すぐだ――」
1031 = "「Sắp——vào hết rồi——」"
# monologue
# JP: （み……ちっ――）
# 1664 = "（夾緊）" 
# 【ポーレット】
# display as 波萊特
# JP: 「きゅっ！　ふううっ――」
815 = "「Kyu! Phù——」"
# monologue
# JP: キツイ――けれども、初めてのときのキツさではない。
1549 = "Chật——nhưng không phải cái chật chội của lần đầu tiên."
# monologue
# JP: ポーレットの膣肉はむちむちみちみち、圧すと共に蠢いて、\n僕を奥へと子宮へと、引きずり込もうとしてくれるから！
1455 = "Thịt âm đạo của Paulette căng mọng đầy đặn, vừa đè ép vừa cựa quậy,\nnhư muốn kéo tuột tôi vào sâu bên trong, vào tận tử cung!"
# monologue
# JP: （ずぶんっ！！！！！）
1654 = "（Phập!!!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃううううううううんっ！！！！」
811 = "「Hyaaaaaaaaaan!!!!」"
# monologue
# JP: （ごっ！）
1648 = "（Cộp!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひきゅっ！　あっ――はっ――しゅ、ごッ――んっ\n――太いの――こえ、たら――ずぶって――一気、に」
881 = "「Hikyu! A——hà——dữ, dội quá——ưm\n——phần to——vượt qua, rồi——thì thọc sâu——vào một mạch」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――良く頑張ったな」
907 = "「Ừ——Em giỏi lắm」"
# 【ポーレット】
# display as 波萊特
# JP: 「え……えへへっ――双鉄くぅん」
941 = "「Hơ……ê hế hế——Anh Soutetsu」"
# monologue
# JP: （ずっ……るっ……）
# 1664 = "（夾緊）" 
# monologue
# JP: そうして僕も良く頑張った。この膣に――\nこれほどみちみち、圧迫しながら抱きつく膣に。
1510 = "Và tôi cũng đã rất cố gắng. Trong âm đạo này——\nâm đạo ôm siết, chèn ép đầy ắp thế này."
# monologue
# JP: あれほど一気に引きずり込まれ脳を快感で塗りつぶされて。\nよくぞ――射精をせず耐えた。が……
1397 = "Bị kéo tuột vào trong một mạch, khoái cảm nhấn chìm cả tâm trí.\nThế mà tôi vẫn——cắn răng chịu đựng không xuất tinh. Nhưng……"
# monologue
# JP: （りゅ――ズッ――）
1697 = "（Rút——thọc——）"
# monologue
# JP: じわ、じわとしか動けない。\nナメクジが這うほどにしか――殆ど止まったようにしか。
1333 = "Chỉ có thể nhúc nhích từng chút, từng chút một.\nChỉ như sên bò——gần như là bất động."
# monologue
# JP: なのに膣は、抱きつき締め付け休むこと無く蠢き続ける。\n全力ピストンよりも凶悪な快感を、勃起に流し込んでくる。
1491 = "Thế mà âm đạo vẫn ôm siết, thắt chặt và không ngừng cựa quậy.\nNó truyền vào dương vật một khoái cảm còn hung bạo hơn cả khi dập hết tốc lực."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……あ……しゅきっ……んっ――ゆっくり――\nされ、るの……きもち……いいっ――しゅきっ」
875 = "「A……a……thích quá……ưm——bị, đâm——\ntừ từ……sướng……quá——thích quá」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ――僕も、気持ちいい――」
959 = "「Anh cũng vậy——anh cũng, sướng lắm——」"
# monologue
# JP: 言えば、射精衝動がわずかに薄れる。\nああ、そうか。そうだ、これだ――
1560 = "Nói ra, xúc động muốn xuất tinh sẽ vơi đi đôi chút.\nA, ra vậy. Đúng rồi, là thế này đây——"
# 【ポーレット】
# display as 波萊特
# JP: 「どういう……ふう、にっ――んっ――双鉄、くん、は、\nあっ――おちん、ちん――気持ち……いい、の？」
797 = "「Sướng……như, thế nào——ưm——Anh Soutetsu, á,\na——dương, vật——sướng……như thế nào?」"
# monologue
# JP: （きゅううんっ！）
# 1664 = "（夾緊）" 
# 【双鉄】
# display as 雙鐵
# JP: 「く――ぁっ！」
# 879 = "「啊！」" 
# monologue
# JP: 僕が気づいたのとおんなじことを、\nポーレットも気づいてくれている。
1443 = "Điều tôi nhận ra,\nPaulette cũng đã nhận ra."
# monologue
# JP: 気づいて、興奮してくれている。\nその喜びが、照れくささを消し、僕を素直にしてくれる。
1256 = "Nhận ra và hưng phấn vì điều đó.\nNiềm vui ấy xua tan đi sự ngại ngùng, giúp tôi thành thật với bản thân."
# 【双鉄】
# display as 雙鐵
# JP: 「おまんこに――んっ――みっちり――包まれ――\nゆっくり、と、しか――動けないのが――気持ち、いい」
967 = "「Bị âm đạo——ưm——bao bọc——chặt cứng——\nchỉ có thể——cử động, từ từ——sướng, lắm」"
# monologue
# JP: （きゅんっ！　きゅきゅんっっ！！）
# 1664 = "（夾緊）" 
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――ふっ――んっ――あ……ね？　どう、して？\n動け、ない――のに……きもち――いい、の？　んっ！」
845 = "「Hà——phù——ưm——a……này? Sao, lại thế?\nKhông, cử động được——mà……lại sướng? Ưm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おまんこが――おまんこが――極上――極上すぎるから――だから、止まって――いて、さえ――こん、なにっ」
944 = "「Vì âm đạo——âm đạo——tuyệt hảo——quá tuyệt hảo——nên, dù chỉ, dừng lại——thôi——cũng sướng, thế này」"
# monologue
# JP: 僕の言葉のその度に、ポーレットは膣でも喜び、\n締め付け、甘え、震えてくれる。
1245 = "Mỗi lần tôi cất lời, âm đạo của Paulette cũng vui sướng,\nsiết chặt, làm nũng và run rẩy."
# monologue
# JP: 言語化で冷静になってなければ、\nこの膣内に、僕はとっくに、思いっきりに射精している。
1287 = "Nếu không nhờ nói ra để bình tĩnh lại,\ntôi đã sớm xuất tinh thỏa thích vào trong âm đạo này rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「むちむち、みち、みちっ――締めて、くるの、のに――\n同時に、とろとろ――溶けて――甘えて、張り、付いて」
975 = "「Thịt mềm, đầy, ắp——đang siết, lại, thế mà——\ncùng lúc đó, lại sền sệt——tan chảy——làm nũng, dính, chặt lấy」"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――やっ――ンッ――嬉しっ――嬉しいッ――」
843 = "「Hà——á——ưm——Vui quá——vui quá đi——」"
# monologue
# JP: （ずっ――ルッ――）
1666 = "（Thọc——rút——）"
# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！」
# 879 = "「啊！」" 
# monologue
# JP: ポーレットの腰が、不器用にだが情熱的に揺れ動き始める。\nこれは――保たない。
1445 = "Eo Paulette bắt đầu đung đưa, vụng về nhưng đầy cuồng nhiệt.\nThế này thì——không kìm nổi nữa."
# monologue
# JP: だったら、だったら――\n僕一人だけでイクのではなく！
1400 = "Nếu vậy, nếu vậy thì——\nKhông thể để mình tôi lên đỉnh được!"
# monologue
# JP: （ずぶうううううううううっ！）
1701 = "（Thọc sâuuuuuuuu!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひあっ！？　きゅ――きゅふうううんっ！！！」
826 = "「Hya!? Kyu——kyufuuuun!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「深さも、狭さも！　最高すぎるっ！\n思いっきりにつけばこうしてっ！」
800 = "「Cả độ sâu, lẫn độ chật! Đều quá tuyệt vời!\nCứ đâm hết sức là lại thế này!」"
# monologue
# JP: （ごつっ！）
1665 = "（Cộp!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！　ふっ――あっ――子宮っ！　うっ！\n子宮――ノックっ！　ごつんて！　ごつんて！！」
814 = "「Hya! Phù——a——tử cung! Ư!\nTử cung——bị gõ! Cộp cộp! Cộp cộp!!」"
# monologue
# JP: （ずるうううううううううううっ！！）
# 1667 = "（拔出）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ゅはぁぁぁぁぁぁあああああああんっ！！！」
856 = "「Yuhaaaaaaaaaaaaaaaan!!!」"
# monologue
# JP: 思う存分腰をひいても、弾みで抜けることがない。\n絶妙な深さとみちみち肉が、僕をしっかり抱いててくれる。
1296 = "Dù có rút eo ra hết cỡ, cũng không bị tuột theo đà.\nĐộ sâu tuyệt diệu và lớp thịt đầy đặn ôm chặt lấy tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕専用の、僕の精液を絞り出すためのおまんこだ！\nこんな最高の膣肉を――抉って――耐えるなどとてもっ」
1011 = "「Đây là âm đạo dành riêng cho tôi, để vắt kiệt tinh dịch của tôi!\nThịt âm đạo tuyệt vời thế này——bị moi móc——thì sao mà chịu nổi」"
# monologue
# JP: （ずぶっ！　ずばっ！　ずじゅっ！　じゅぶううっ！）
1649 = "（Phập! Phập! Chụt! Chụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひあっ！　あっ！　はっ！　あっ！　ふあっ！\nあっ――んゆっ――ひゃふっ！！」
818 = "「Hya! A! Hà! A! Phù!\nA——ưm——hya!!」"
# monologue
# JP: そこから先は言葉にならない。\n肉と肉と、熱と熱とで。粘膜と粘膜、汁と汁とで。
1260 = "Từ đó trở đi không thốt nên lời.\nBằng da thịt và da thịt, bằng hơi nóng và hơi nóng. Bằng niêm mạc và niêm mạc, bằng dâm thủy và dâm thủy."
# monologue
# JP: （ずぶっ！　じゅぶん！　ぱちゅんっ！　ばぢゅうっ！）
1650 = "（Phập! Phập! Chụt! Chụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひあっ！　あっ――めくれっ――んっ――ひっぱ――っ\n――あっ――おま、んこっ――ひっ――しゅご――んっ」
816 = "「Hya! A——bị lộn, ngược——ưm——bị kéo, ra——\n——a——âm, đạo——hi——dữ, dội——ưm」"
# monologue
# JP: カリ首が膣壁をごりごりこすり、\n膣壁はカリ首を逃すまいとして抱きつき締める。
1368 = "Rãnh quy đầu cọ xát mạnh bạo vào thành âm đạo,\nthành âm đạo cũng ôm siết lấy rãnh quy đầu không chịu buông."
# monologue
# JP: 舌では浅く感じるほどのムチムチゆえの肉ヒダも、\n限界まで鋭敏になった亀頭の性感には刺さるくらいで――
1362 = "Lớp nếp gấp thịt đầy đặn mà khi liếm chỉ cảm thấy nông,\nđối với cảm giác của quy đầu đã nhạy cảm đến giới hạn lại như đâm chọc——"
# monologue
# JP: （ごりゅっ！　ずりゅっ！　じゅぼっ！　じゅばっ！！）
1653 = "（Rột! Rột! Phập! Phập!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ！　あっ！　あっ！　あっ！　ひっ――ふあっ！\nそうてつ――く――ふっ――あ――そうてつ、くぅん」
885 = "「Hà! A! A! A! Hi——phù!\nAnh Soutetsu——ư——phù——a——Anh Soutetsu」"
# monologue
# JP: （もぞっ！　ごそっ！！）
1702 = "（Co giật! Run rẩy!!）"
# monologue
# JP: 僕の腹肉とポーレットの背と、その狭隘が必死に蠢く。
1365 = "Bụng tôi và lưng Paulette, cùng với khe hẹp đó đang cựa quậy điên cuồng."
# monologue
# JP: 袖拘束をかけられているポーレットの手が、\n僕を求めて、むなしく切なくあがいてくれてる。
1454 = "Đôi tay đang bị trói bằng tay áo của Paulette,\nđang vươn về phía tôi, giãy giụa trong vô vọng và xót xa."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！」
986 = "「Paulette!」"
# monologue
# JP: （ぎゅうううううううううっ！）
# 1664 = "（夾緊）" 
# 【ポーレット】
# display as 波萊特
# JP: 「んきゅっ！　ふああっ！！！」
921 = "「Ưm kyu! Phù a!!!」"
# monologue
# JP: だから、思いっきり密着し、\nポーレットの胸を揉みしだくっ――っ！？
1380 = "Nên tôi áp sát hết sức,\nvà vò nát bầu ngực của Paulette——!?"
# monologue
# JP: （きゅんっ！　きゅきゅううううううっっ！）
1695 = "（Siết! Siết chặt!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 879 = "「啊！」" 
# monologue
# JP: 膣が、わななく。\nそうと感じるより早く、腰は呼応し、動き出してる！
1540 = "Âm đạo, đang run rẩy.\nNhanh hơn cả lúc nhận ra điều đó, eo tôi đã đáp lại và bắt đầu chuyển động!"
# monologue
# JP: （ずぶううううううううううううっ！　ごつっ！！！）
1700 = "（Thọc sâuuuuuuuu! Cộp!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「いっ――きゅううううううううううううぅぅんっ！！」
860 = "「I——kyuuuuuuuuuuuuuuuuuun!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「んくっ！」
839 = "「Ưm!」"
# monologue
# JP: （びゅっ！　びゅるるっ！　どびゅっ！　びゅぶるっ！）
1659 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: 今夜……何度目……数えきれないほどの\nセックスの果ての射精が――
1199 = "Đêm nay……đã là lần thứ mấy rồi……sau vô số lần\nlàm tình, lần xuất tinh cuối cùng này——"
# monologue
# JP: （びゅっ！　びゅごっ！　びゅるっ！　ばちゅんっ！）
1660 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ！　あっ――ひっ――あっ――しきゅう――\nばちゅって――あついの――あたっ、って――はきゅ！」
858 = "「Phù! A——hi——a——tử cung——\nbị bắn, trúng——nóng, quá——đập, vào——hakyu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「く……あ――――あっ……は……はぁ……あ――」
873 = "「Ư……a――――a……hà……hà……a――」"
# monologue
# JP: 何年も溜めてたかのような勢いで、\nポーレットの子宮を叩いて満たし。
1507 = "Với khí thế như thể đã kìm nén suốt nhiều năm,\nđập mạnh vào tử cung của Paulette và lấp đầy nó."
# monologue
# JP: そして、僕は――いいや、僕らは――\n全てを出し切り、熱を使い切り――崩れて落ちる。
1484 = "Và rồi, tôi——không, chúng tôi——\nđã vắt kiệt mọi thứ, tiêu xài hết hơi nóng——và sụp đổ."
# 【ポーレット】
# display as 波萊特
# JP: 「は……ぁ……ふ……ふあ……あ……\nすご……か……った……」
850 = "「Hà……a……phù……phù a……a……\ntuyệt……quá……đi……」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――すごかったな」
906 = "「Ừ——Tuyệt thật đấy」"
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅ……ちゅう……チュムッ――ちゅっ――」
890 = "「Chụt……chụt……chụt——chụt——」"
# monologue
# JP: 穏やかなキス。鼻の頭をくっつけあって。頬ずりしあい。
1330 = "Một nụ hôn êm đềm. Chóp mũi chạm vào nhau. Cọ má vào nhau."
# monologue
# JP: そうして僕らは……目と目を見合わせ、\nどちらからともなく笑いあう。
1485 = "Và rồi chúng tôi……nhìn sâu vào mắt nhau,\nrồi không ai bảo ai, cùng bật cười."
# 【双鉄】
# display as 雙鐵
# JP: 「……しかし、あれだな。イメクラプレイなるものは」
568 = "「……Cơ mà, trò nhập vai này, cũng thú vị thật đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、でしたね。双鉄くん」
939 = "「Ư hự hự, đúng vậy nhỉ. Anh Soutetsu」"
# monologue
# JP: 言葉は、今は余計だろう。\nその目が、笑みが、全てを伝えてくれているから。
1499 = "Giờ nói gì cũng bằng thừa.\nVì ánh mắt đó, nụ cười đó, đã truyền đạt tất cả rồi."
# monologue
# JP: どんな演技をしたとて最後は、やっぱり裸の僕たちで。\n普段通りのセックスだから――最高に気持よかったのだと。
1477 = "Dù có diễn thế nào đi nữa, cuối cùng vẫn chỉ là hai kẻ trần trụi.\nVì làm tình như bình thường——nên mới sướng đến tột đỉnh như vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「ふぁ……んっ――」
851 = "「Phù……ưm——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 917 = "「嗯」" 
# monologue
# JP: 腕を差し出せばその上に、\nごくごく自然に当然に、ポーレットの小さな頭が収まる。
1328 = "Chìa cánh tay ra, trên đó,\nchiếc đầu nhỏ bé của Paulette yên vị một cách vô cùng tự nhiên và hiển nhiên."
# monologue
# JP: 大好きな重みとぬくもりに、\n僕の眠気も、否応無しに引きずり出される。
1566 = "Sức nặng và hơi ấm yêu dấu ấy,\nđã kéo cơn buồn ngủ của tôi ra một cách không thể chối từ."
# 【ポーレット】
# display as 波萊特
# JP: 「……すぅ……すぅ……すぅ……すぅ」
572 = "「……Su……su……su……su」"
# monologue
# JP: ……規則正しい寝息が聞こえる。\n……さすがに、ポーレットも限界だったか。
546 = "……Tiếng thở đều đặn vang lên.\n……Quả nhiên, Paulette cũng đến giới hạn rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「長い――長い残業だったな」
1009 = "「Một buổi làm thêm giờ——dài đằng đẵng nhỉ」"
# monologue
# JP: 気持ち的にはノビをしたいが、\nポーレットを起こしてしまうわけにもいかない。
1340 = "Trong thâm tâm rất muốn vươn vai một cái,\nnhưng cũng không thể đánh thức Paulette dậy được."
# monologue
# JP: だから代わりに、寝乱れる髪に口付けて。\nそうして僕も――心地よい疲れに体を委ねる。
1379 = "Nên thay vào đó, tôi đặt nụ hôn lên mái tóc rối bù.\nVà rồi tôi cũng——thả lỏng cơ thể trong sự mệt mỏi dễ chịu."
