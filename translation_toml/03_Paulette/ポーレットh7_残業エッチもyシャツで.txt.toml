[script]
# lines: 355 
# monologue
# JP: ……おしおきするため、考える。\n市長たるポーレットが犯したというミスの内容。
554 = "……我思考著該怎麼懲罰她。這要假設波萊特作為一名市長犯下了什麼錯誤。" 

# monologue
# JP: 秘書たる僕が、おしおきするほど怒ることなら……\n今夜――この状況下では、たったひとつしか思いつけない。
1570 = "連我這個秘書都氣到要懲罰她了……那麼今晚此時此景之下，我只能想到一種可能。" 

# 【双鉄】
# display as 雙鐵
# JP: 「市長のおかげで、残業ですよ。\n五連勤、ずっと残業続きだったところに、更に上乗せで」
1026 = "「都怪市長，我要加班了。連續工作五天，一直在加班，現在又來了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ」
897 = "「嗚」" 

# monologue
# JP: 演技とは思えぬほどの真に迫った表情で、\nポーレットはみるみるしおれてしまう。
1457 = "波萊特的表情非常逼真，簡直看不出來是演技。只見她漸漸消沉下去。" 

# monologue
# JP: 心が痛む。が、これはイメクラなるプレイ。\nプレイであるなら、楽しみ、徹底するべきだ。
1356 = "我有點不忍心，但是我們現在玩的是角色扮演。既然選擇了這種玩法，那就要徹底享受它的樂趣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……で……その――」
573 = "「……於是……那個——」" 

# monologue
# JP: とは思うのだが、続く言葉が出てこない。\nそもそも僕に、他人を責める資格など……
1488 = "然而我不知道接下來該說什麼了。我本來就沒有什麼責備他人的資格……" 

# monologue
# JP: ああいや、資格云々の話は置いても、\n他人を責めた経験など、幼少期にしか持っていない。
1231 = "其實別說什麼資格了，我只有在孩童時代責備過別人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その――だ」
945 = "「就是——」" 

# monologue
# JP: 他人の負い目を、性的なプレイに置き換える。\nその方面にも疎かった僕には、やはり難度が高いと感じ。
1498 = "現在要把別人的內疚變成玩法的要素。對於我這種不擅長的人來說，難度還是有點高。" 

# monologue
# JP: いったん勢いが止まってしまうと、\n思考はどんどん絡まって、なかなか打開の糸口を――
1183 = "一旦中途停了下來，我的思路就斷了，找不到突破口了——" 

# 【ポーレット】
# display as 波萊特
# JP: 「いっつも頑張ってくれてる秘書のあなたを。双鉄くんを。\nそんなになるほど、疲れさせちゃってごめんなさい」
997 = "「讓你這個總是非常努力的秘書——讓雙鐵君你累成這樣，真的是非常對不起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！」
1034 = "「！」" 

# monologue
# JP: 僕の名を呼び、“そんな”と言ってる言葉の先は――\nじっと動かぬ青い視線は、勃起にひたすら向けられている。
1247 = "在說完我的名字，在說完“累成這樣”之後，波萊特藍色的大眼睛就在死死盯著我的胯間。" 

# monologue
# JP: 僕は僕のまま演じれば良い。別人を無理に演じずとも良い。\nもらったヒントが、心を軽くしてくれる。
1334 = "我只要本色出演就好了，不用硬要去演別人。得到這個提示後我心裡就輕鬆多了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「体、疲れて疲れて、こわばっちゃってるんですよね？\n肩も、腰も、目も、首筋も……それから、そこ、も」
792 = "「你的身體已經特別累，變得特別僵硬了吧？肩膀、腰、眼睛、脖子……還有那裡」" 

# monologue
# JP: さすがというべき、見事な気遣い。\n僕の戸惑いを見ぬいた上で、さりげなく誘導してくれる。
1190 = "不愧是波萊特，她太會察言觀色了。在看穿了我的窘迫之後，她就開始自然而然地引導我。" 

# monologue
# JP: けれども今はおしおきプレイ。\n感謝の気持ちを、言葉に素直に出してはいけない。
1209 = "但是現在我們在玩懲罰遊戲。我不能直接把感謝之意表達出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこ、とはどこだ？\nはっきり言ってもらえねばわからん」
560 = "「“那裡”是哪裡？你不說清楚我可不知道」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
878 = "「啊」" 

# monologue
# JP: 戸惑い。含羞。\nお芝居なのか、自然のものか、僕にはまるでわからない。
1495 = "猶豫不決、羞羞答答。我已經看不出這是在演戲還是她真實的反應。" 

# 【ポーレット】
# display as 波萊特
# JP: 「え……っと――お、ちん、ち――ん」
1024 = "「那個……雞雞——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
935 = "「嗯？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「おちんちん、ですっ！　バキバキにこわばっちゃってて、\nつらそうで――だから、わたし――せ、責任、とって」
977 = "「是雞雞！看它已經完全硬起來了，好像很難受。所以我來負起責任」" 

# monologue
# JP: だが、どちらでも同じこと。\nここまでくれば、いくら僕とて流れも読める。
1402 = "是不是演技已經無關緊要了。我就算是再不擅長，到了這種地步還是知道該怎麼做的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「責任を取る？　どのように」
999 = "「負責任？怎麼負呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「は、はい。ええ……っと――。あの――全部、脱いで、\nごろんって、寝転んでもらえます、か？」
915 = "「嗯、嗯。就是——能請你脫光，然後躺下來嗎？」" 

# monologue
# JP: 指示どおり、ごろり寝転んだ僕の上。\n何故か袖口のボタンを外したポーレットの体が乗ってくる。
1351 = "我按照她說的躺了下來。然後波萊特就趴在了我身上，她不知為何解開了袖口的鈕扣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こ……れは――」
1010 = "「這是……」" 

# monologue
# JP: ポーレットの裸の股間が――\n性器が、もろに鼻先にある。
1463 = "波萊特赤裸的胯間——她的性器已經來到了我的眼前。" 

# monologue
# JP: そうして僕の勃起は、すっぽり、柔らかに。\nポーレットの胸の谷間の狭隘に挟み込まれてる。
1487 = "然後波萊特用胸前的雙峰夾住了陽具，讓它陷入了柔軟的溫柔鄉裡。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はぁ……はぁ……熱、くて……硬くて――それに\n（すん、すんっ）――すごく……匂い……強くて」
849 = "「呼……呼……好燙……好硬——而且（吸鼻子）——味道……好濃郁」" 

# monologue
# JP: 挟まれるだけで心地よいのに、\n甘くて熱くて早くなってる、息が微妙にくすぐってくる。
1229 = "光是肉棒被夾進去就已經非常舒服了，再加上急促又溫暖的呼吸，更是有一種癢癢的感覺。" 

# monologue
# JP: イキたい。このまま射精したい。\n思う気持ちを、ポーレットは優しく刺激してくる。
1344 = "我想高潮，我想就這麼射出來。波萊特輕柔地刺激著我，助長著我的欲望。" 

# 【ポーレット】
# display as 波萊特
# JP: 「おちんちん……んっ――こんな風にして――\nマッサージ、すれ、ば――」
1030 = "「雞雞……嗯——這樣——按摩的話——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぉお、う……」
914 = "「嗯、啊……」" 

# monologue
# JP: ポーレットが袖のボタンを外した理由、\nそれも肌から伝わってくる。
1512 = "肌膚的觸感讓我知道波萊特為什麼要把袖口的鈕扣解開了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「クビレのところも、ぷにぷにも……こう、して――\nんっ――ぷ、ぁ。ツバもまぶして、ゆっくり、ゆっくり」
780 = "「下面的溝，彈彈的地方……也這樣——嗯——噗。抹上唾液，慢慢地、慢慢地——」" 

# monologue
# JP: ……ポーレットの白い指先が、\n僕の亀頭をなぞるようにして弄ぶたび――
556 = "……波萊特白皙的指尖撥弄著我的龜頭——" 

# 【ポーレット】
# display as 波萊特
# JP: 「くり、くり――もみ、もみ――こしゅ、こしゅっ――\nこしゅ――あ！　にちゃって……先っぽ……おつゆ……」
973 = "「按一按——揉一揉——搓一搓——啊！就這樣了……前面……汁液出來了……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くっ」
# 878 = "「啊」" 

# monologue
# JP: 袖口自体もふわりと蠢き、僕をささやかにこすっては、\nじわじわとした快感を、僅かずつ僅かずつ溜めていく。
1545 = "袖口輕輕飄動著，輕輕撩撥著陽具，微弱的快感一點一點積累了起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ……おつゆ、出てきたってことは――\nマッサージで……少しはおちんちん、楽になって――」
936 = "「嘻嘻……既然汁液出來了——說明我的按摩……讓雞雞放鬆一點了」" 

# monologue
# JP: だが、快楽には溺れられない。\n僕には、果たすべき役割がある。
1206 = "但是我不能只顧沉溺於快感之中。我還有必須要做的事情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――いいや。逆だな。まったく逆だ」
782 = "「不對，反了，完全反了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
863 = "「哎？」" 

# monologue
# JP: （ずぶううううううううっ！）
1684 = "（插入）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んきゅんっ！！！」
918 = "「嗯呀！！！」" 

# monologue
# JP: 予告も遠慮も全く無しに中指一本を。
1414 = "沒有預告也沒有徵兆，我突然就把中指插入了肉洞。" 

# monologue
# JP: おしおきという気持ちを込めて、\nひくついているアナルへ差し込む。
1244 = "因為現在還是“懲罰”的情景，所以我插入的是一張一合的菊花。" 

# monologue
# JP: （にちぃぃぃぃぃぃっ！）
1664 = "（夾緊）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んっ――きゃふっ――あっ！　かっ――き、きつ――っ\n――ンッ――はっ、あ――いきな、りっ――んうっ！」」
899 = "「嗯——呀——啊！啊——好粗——嗯——呼——啊——突然就——嗯！」」" 

# monologue
# JP: 腸壁さえも例外ではなく、\nポーレットの体の中は、ムチムチ感に満ちている。
1459 = "波萊特的身體裡面非常豐腴，就連腸壁也不例外。" 

# monologue
# JP: 腸詰めと、そんな言葉が思い浮かぶほどの\nミチミチとした狭隘を、構わず指でほじくり進む。
1250 = "在這讓我聯想到“灌香腸”的狹窄空間中，我繼續用手指開拓著。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ！　あっ、あ、あっ！　っく――ふぁっ、ン！\nお、おしり――深い、のっ――んっ――やっ――あっ」
882 = "「啊！啊、啊、啊！嗯——嗯！屁、屁股裡——好深——嗯——呀——啊」" 

# monologue
# JP: （ぞっ――ずぶっ――ずるううっ――ずぽっ！）
1672 = "（挖來挖去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、のっ――おしり――ほじ、ほじっ、ダメ、なの\n――んっ――ふっ――おな、か――めくれ――てっ！！」
783 = "「不要——挖——屁股裡面————嗯——呼——肚子裡——被挖到了！！」" 

# monologue
# JP: 一気に高まる腸内温度と、おまんこが散らす愛液が、\nポーレットの強い性感を、没入度合いを物語ってる。
1316 = "急速升高的腸內溫度，還有四濺的愛液，都告訴我波萊特已經沉浸在了快感之中。" 

# monologue
# JP: だからこそ。\nこれが"おしおき”と忘れぬように――\n1204 = "但也正因如此，我不能忘記現在是在“懲罰”——" \n\n# monologue\n# JP: （ずっ――ぬぼ！　――りゅぬぅっ――じゅぶっ！）\n1683 = "（插入抽出）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ん……っっ――ふぁ――あっ――ずぼ、ずぼ――んっ、\nされ、ると――ひ――あ――あつい、の――たまっ、て」\n912 = "「嗯……嗯——呼——啊——被捅到的話——呀——熱——熱熱的——就攢起來了」" \n\n# monologue\n# JP: そう、貯めるだけ。\n決して開放させないように、単調に、ただ単調に。\n1415 = "沒錯，我就是讓她積攢快感。我不讓一切都解放出來，只是單純地讓快感積累起來。" \n\n# monologue\n# JP: （ずっ――ぬぶっ――ぞぼっ――ぬるっ――）\n# 1683 = "（插入抽出）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ぁ……んっ――んうっ――ふっ――あ――んっ――\nあつ、くて――じん、じん――ン――もど、かしっ――」\n877 = "「啊……嗯——嗯——呼——啊——嗯——熱熱的感覺——好心癢——好心急——」" \n\n# monologue\n# JP: もどかしかろう。そういう風に責めて――っ！？\n1271 = "她當然會心急了。我就這麼刺激著她——" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「んうっ！！」　\n927 = "「嗯！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おっと」\n861 = "「哎」" \n\n# monologue\n# JP: （ぬぷんっ！）\n1667 = "（拔出）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「やっ！？　やああんっ！　なんで、なんで双鉄くんっ、\n抜いちゃうのぉっ！」\n828 = "「呀！？呀！為什麼，為什麼雙鐵君，怎麼拔出去了！」" \n\n# monologue\n# JP: 焦れて自分から尻を振る――\nそのタイミングで指を外せば、ポーレットはもう涙声だ。\n1266 = "她心急地扭起了屁股。我在這時拔出了手指，波萊特的哀求已經帶上了哭腔了。" \n\n# monologue\n# JP: 演技であるなら名女優だが――\n九分九厘、イメクラのことを失念しているだけだろう。\n1292 = "如果這是演技的話，她可真是個好演員——不過十有八九她是忘了演戲這碼事了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「市長。お忘れですか？\nこれは、貴女へのお仕置きですよ？　ご褒美ではなく」\n953 = "「市長，您忘了嗎？這是在懲罰你，而不是獎勵」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ぁうっ！？」\n898 = "「嗚！？」" \n\n# monologue\n# JP: 顔は真っ赤に。目は白黒と。\nやはりすっかり、頭から飛んでいたらしい。\n1275 = "她的小臉霎時變得通紅，慌得不知所措。果然這件事她早就忘到九霄雲外了。" \n\n# monologue\n# JP: それは嬉しいことだと感じ――\nその嬉しさも、今は役柄で噛み潰す。\n1568 = "這讓我由衷感到高興，但是這份喜悅現在也要用角色扮演來掩蓋過去。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「私は説明したかっただけです。半端なマッサージは、\nかえって――血を一箇所に集めるだけだ、と」\n961 = "「我只是想說明一下——這種不上不下的按摩只會讓血液往一個地方聚集」" \n\n# monologue\n# JP: （れるううううっ）\n1692 = "（舔舐）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひゃううううううううっ！！！？」\n812 = "「呀啊啊啊啊！！！？」" \n\n# monologue\n# JP: その一箇所。包皮が自然とまくれあがって、\nピンクの真珠を露出させてるクリトリスへと舌を這わせる。\n1536 = "蜜穴上方的那層薄薄的包皮已經褪下，我舔上了從中顯露出來的粉紅色珍珠。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「っ！　んっ――はっ――クリ、とりす――んっ！\nクリ――だめ――わたし――弱い――弱、くてっ」\n924 = "「嗯！呼——陰蒂——嗯！陰蒂——不行——我那裡——非常敏感——」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「んぷっ」\n859 = "「咕」" \n\n# monologue\n# JP: それが真実と証明しようとするかのように、\n愛液は更に量を増し、僕の顔へと吹きこぼれてくる。\n1319 = "愛液的量更多了，甚至噴到了我臉上，就像是在證明她說的是事實一樣。" \n\n# monologue\n# JP: そのタイミングを逃すことなく――\n1363 = "我當然不會放過如此良機——" \n\n# monologue\n# JP: （づぶうううううううううっ！！！）\n# 1684 = "（插入）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ァ――はっ――――んぐっ！」\n867 = "「啊——呼——嗯！」" \n\n# monologue\n# JP: よほど油断をしてたのだろう。\n1461 = "波萊特看來是放鬆了警惕。" \n\n# monologue\n# JP: アナルへ再び指を挿れられ、\nポーレットは大きく震えてしま――っ！！\n1331 = "我又一次把手指插入菊穴，她就狠狠地抖了一下！" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あ」\n# 878 = "「啊」" \n\n# monologue\n# JP: 感じたところを見せてしまった。\n勃起が喜び震えてしまった。\n1188 = "不小心被她發現我也很有感覺了。肉棒歡快地彈了起來。" \n\n# monologue\n# JP: ポーレットの身が大きく揺れて、\n乳房が勃起を甘く刺激し――その快感に。\n1458 = "波萊特的身體不停顫抖著，乳肉給陽具帶來了舒適的快感。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「わ……かり、ました――わたし――わかったと、\n思い――ます――ちゅっ！」\n963 = "「我明白了——我覺得——我已經明白了！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「む」\n917 = "「嗯」" \n\n# monologue\n# JP: キスされる。僕の勃起の先端に。\n1281 = "她親上了龜頭的前端。" \n\n# monologue\n# JP: アナルを僕にほじられたまま、\nポーレットは舌を這わせ動かす。\n1446 = "波萊特在後門被我插入的情況下，開始來回舔舐龜頭。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ん……チュッ――れろッ――れるっ――ん……です、ね。半端なマッサージだと、余計にこっちゃう――からっ」\n910 = "「嗯……啾——啾嚕——啾嚕——嗯……你說得對。不上不下的按摩只會讓人更想要」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「う――くっ」\n900 = "「嗯——唔」" \n\n# monologue\n# JP: アナルを責めてた指を外して、\nポーレットの豊かな尻肉を、掴むようにして支え持つ。\n1350 = "我把手指從菊穴裡抽出來，然後捧起了波萊特圓潤的美臀。" \n\n# monologue\n# JP: ポーレットの次の行為を予測して――\nポーレットの次の行為を、期待して。\n1372 = "我預測著波萊特接下來的動作——我期待著波萊特接下來的動作。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「だ、から――もっと、もっとほぐして。\n全部、ぐったりするくらいまで――――んっ……」\n971 = "「所以我要更賣力地按摩。直到讓這裡徹底軟下去為止……嗯……」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n879 = "「啊！」" \n\n# monologue\n# JP: てろりと、暖かなぬめりによって、\n僕の勃起が濡らされていく。\n1582 = "黏稠溫暖的唾液打濕了我的分身。" \n\n# monologue\n# JP: はぁ、と切なげな響きと同時、\n熱っぽい息が、快感中枢をくすぐってくる。\n1573 = "隨著波萊特的一聲喘息，她溫熱的氣息直接作用在了我的快感神經上。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「そこまで、ちゃあんとマッサージ。\nわたし、ですから――頑張りますね――あーーんむっ！」\n965 = "「我會認真按摩。我會努力的，所以——！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぉぅっ！！」\n942 = "「噢！！」" \n\n# monologue\n# JP: ざらざらになめらかに包み込まれる。\n亀頭の先がちゅるん、いっそ軽やかに飲み込まれてる。\n1585 = "龜頭被粗糙和光滑質感並存的小嘴包裹了。她駕輕就熟地把龜頭含入口中。" \n\n# monologue\n# JP: そうして竿の全体が、おっぱいの甘い圧力に、\n挟まれ、揉まれ、ゆすられていく。\n1242 = "同時整個陽具也被奶子擠壓著、按揉著、搖動著。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ん……ちゅっ――ぺろっ、れろっ――ん……\nれる……れろっ――ぺろおっ――れるんっ！」\n911 = "「嗯……啾——啾嚕、啾嚕——嗯……啾嚕……啾嚕——啾噗——啾噗！」" \n\n# monologue\n# JP: （ゆさっ――むにゅっ――もみゅっ！　こねりっ！）\n1647 = "（上下套弄）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「く――あっ――あっ――おっ――」\n838 = "「呃——啊——啊——啊——」" \n\n# monologue\n# JP: 亀頭をしつこくおしゃぶりしながら、\nポーレットはあえて唾液を、ぼとぼとこぼし垂らしてく。\n1442 = "波萊特一邊舔弄著龜頭，一邊故意讓唾液從口中滴下。" \n\n# monologue\n# JP: それが胸の谷間に入り、僕の勃起に絡みつき――\n1583 = "黏稠的唾液聚集在乳溝，包裹住了陽具——" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あんむっ――んっ――ちゅっ――ちゅううっ――\nちゅずっ――れろっ――れるうっ――ちゅるっ！」\n872 = "「啊——嗯——啾——啾嚕——啾嚕——啾嚕——啾噗——啾噗！」" \n\n# monologue\n# JP: （にゅるっ！　にゅっ！　もみゅうっ！　みゅぬるっ！）\n1676 = "（揉來揉去）" \n\n# monologue\n# JP: 先端は完全に包まれて、くびれの裏を舐められ、\n吸われ、唇のぷりぷりでしごかれている。\n1584 = "龜頭被整個包裹住了，冠狀溝被舔來舔去，還被柔軟的唇瓣按壓著。" \n\n# monologue\n# JP: その上竿がぬめるおっぱいに挟み込まれて、\n油断をすれば、今すぐにでも射精しそ――っ！？\n1233 = "再加上肉竿被夾在了乳肉之中，我感覺一不留神就要射出來了——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「んぷっ！？」\n928 = "「嗯！？」" \n\n# monologue\n# JP: 腰の力が抜けたのか、それとも単なるおねだりか、\nポーレットの濡れたおまんこが鼻へ口へと押し付けられる。\n1451 = "波萊特濕潤的蜜穴忽然壓到了我的臉上，不知道她是沒有力氣了還是單純地想讓我愛撫。" \n\n# monologue\n# JP: ポーレットの望みが何であるかは、\n僕とてはっきり理解できるが――\n1338 = "我很清楚波萊特希望我怎麼做——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: （……これで舐めては、おしおきにならん――いや！？）\n1590 = "（……但是我這樣舔她的話，就算不上是懲罰了——也不對）" \n\n# monologue\n# JP: 僕が先にイカされたなら、お詫びが成立してしまう。\nおしおきプレイは、そこで[しま]終いとなるだろう。\n1290 = "如果我先達到高潮的話，那她就算是道過歉了。而懲罰遊戲也會在那瞬間結束。" \n\n# monologue\n# JP: せっかくポーレットが提案してくれたプレイだ。\n中途半端で終わったのでは、申し訳ない。\n1448 = "波萊特好不容易提出了這個玩法，這樣不完全燃燒就結束也太對不起她了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: （じゅぶううううううううううっ！）\n1651 = "（啾噗！）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「きゃっ！？　なっ――いきなり――んふっ、あっ！\nそ、そんな――お、おまんこ――じゅうって、吸、って」\n837 = "「呀！？這、這麼突然——嗯——啊！突然就——吸上小穴了——」" \n\n# monologue\n# JP: （じゅる！　れろっ！　みゅりゅ！　んっ――るうっ！）\n1690 = "（舔來舔去）" \n\n# monologue\n# JP: ポーレットの膣はむちむちな上、\n腰を一番押し込んだとき、子宮の入り口に強くぶつかる。\n1456 = "波萊特的蜜道裡非常有壓迫感，在我插入到最深處的時候，能剛好頂到子宮口。" \n\n# monologue\n# JP: まるで計って誂えたように、\n僕の勃起をぴったりとおさめてくれる奥深さがある。\n1534 = "蜜壺的深度正好能將我的分身整個容納進去，簡直就像是為我專門設計的。" \n\n# monologue\n# JP: （じゅつ――れるっ――れろおっ！　べろんっ！！！）\n# 1690 = "（舔來舔去）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひゃ、んっ！　そこ――あうっ――つぶつぶ、する、\nとこ、べろ、べろ――され、た――らあっ！」\n824 = "「呀！那裡——啊——粗糙的地方——被舔到的話——啊！」" \n\n# monologue\n# JP: その膣に、舌ではあまりに短すぎるゆえ――\nせめて、届く範囲の全てを丹念に丹念舐めまわし。\n1367 = "我的舌頭這時就顯得很短了，所以我就在能舔到的範圍內認真細緻地舔舐著。" \n\n# monologue\n# JP: そうして時折、つぶつぶの、\nポーレットが強く感じる部分を――\n1486 = "然後我就三不五時地舔一下波萊特最敏感的粗糙部分——" \n\n# monologue\n# JP: （ざりゅりゅっ！）\n1685 = "（用力舔）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「きゃふっ！　んくっ――あっ――やっ――はッ――\nんっ――きもち――きゃう――あ――きもち、いいっ」\n821 = "「呀！嗯——啊——呀——呼——嗯——好舒服——啊——好舒服」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「んっ！」\n922 = "「嗯！」" \n\n# monologue\n# JP: ポーレットの胸が震えるだけで、危うく射精しそうになる。\n射精、したい。すごく。したい。\n1460 = "波萊特的酥胸只是抖了一下，我就差點要射出來了。我好想射精，我超想射精。" \n\n# monologue\n# JP: 快感にあえぐポーレットが、僕の勃起を放り出し、\n口を離したそのことがもう、いっそ恨めしいほどに。\n1449 = "波萊特嬌喘的時候會把陽具吐出來，搞得我甚至都有點怨氣了。" \n\n# monologue\n# JP: （じゅるるっ！　ぷむっ――ちゅぶるっ――れるうっ）\n# 1690 = "（舔來舔去）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひゃううっ！？　――あっ――だめ――らめぇっ――\nクリ、まで――クリ、まで――押され――一当たっ、て」\n830 = "「呀！？啊——不行——不行——陰蒂——也被壓到了——按到了」" \n\n# monologue\n# JP: だけれど今は、未練の全てを舌の動きに載せ替える。\n精の代わりにせめて唾液を、膣に子宮に流しこもうと。\n1383 = "所以現在我把欲望全部轉化為舌頭的動作。我讓唾液代替精液灌進了她的蜜穴和子宮。" \n\n# monologue\n# JP: （くりゅんっ！）\n1671 = "（按壓）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「んきゅんっ！？　んっ――ふあっ！？　らめっ、\nイクっ！　ふあっ！　あっ！　あっ！　あっ！！」\n834 = "「呀！？嗯——呼啊！？不行，丟了！不行！呼啊！啊！啊！啊！！！」" \n\n# monologue\n# JP: 指を伸ばしてアナルを刺激し、舌と唇、顔全体も使って\n一気に責め立てる。\n1327 = "我伸出手指刺激著她的菊穴，然後用上舌頭、嘴唇、臉一起進攻。" \n\n# monologue\n# JP: 液、熱、匂いが――舌をきゅんきゅん締め付けてくる\nむちむち膣が、ポーレットの絶頂はすぐと伝えてくれて！\n1318 = "愛液、體溫、氣味，還有用力夾著我舌頭的蜜道，都告訴我波萊特馬上要達到高潮了！" \n\n# monologue\n# JP: （じゅるるるるうううううううううううううっ！！！）\n1696 = "（蠕動）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひゅぁぁあああああああああああああああんっ！！！」\n810 = "「呀啊啊啊啊啊！！！」" \n\n# monologue\n# JP: （きゅうううううっ！）\n# 1664 = "（夾緊）" \n\n# monologue\n# JP: 舌を性器と勘違いして、\n膣壁がすぼまり蠢き、精液を絞る蠕動をする。\n1538 = "蜜穴把舌頭誤認成了肉棒，一個勁地蠕動夾緊，想要榨出精液來。" \n\n# monologue\n# JP: イカせたことには大満足だが、\nその蠢きを感じてしまえばいっそうの射精欲求――っ！？\n1285 = "她達到高潮讓我非常滿意，但是這蠕動也讓我的射精欲膨脹得越來越厲害了。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひあっ――あ――あっ――ん――ンムッ――はむうっ」\n808 = "「呀——啊——啊——嗯——嗯——唔」" \n\n# monologue\n# JP: イキながら、まだ膣壁を痙攣させつつ、\nけれどポーレットはその唇で僕をくわえてっ――\n1447 = "波萊特在高潮之中，在蜜道還在痙攣個不停的時候，依然含住了陽具——" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「んっ――んむっ――ちゅっ――ちゅうう――ジュル――\nあむっ――ちゅうっ――チュッ――ちゅるるう――じゅ」\n905 = "「嗯——嗯——啾——啾嚕——啾嚕——嗯——啾——啾嚕——啾噗——啾噗」" \n\n# monologue\n# JP: （もみゅ！　みゅにゅっ！　もにゅつ！　みゅりゅっ！）\n# 1676 = "（揉來揉去）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「あ――あっ！」\n870 = "「啊——啊！」" \n\n# monologue\n# JP: 普段と、丁寧で僕を喜ばせる工夫を凝らしたものとは違う、\n単純極まる、本能的な――\n1269 = "她現在的手法跟平時那種用心取悅我的方法不一樣，是一種非常單純，是一種出於本能的——" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: （まるで――まるで、これは――赤子が乳を貪るような）\n1687 = "（簡直就像——小嬰兒要喝奶一樣）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ちゅうっ――ちゅつ――ちゅむっ――ちゅるっ――んっ\n――ちゅるうっ――ちゅっ――ずじゅっ――ずりゅりゅ」\n894 = "「啾嚕——啾嚕——啾噗——啾噗——嗯——啾嚕——啾嚕——啾噗——啾噗」" \n\n# monologue\n# JP: （みゅにゅっ！　もみゅっ！　むにゅっ！　むりゅっ！）\n# 1676 = "（揉來揉去）" \n\n# monologue\n# JP: ただ一心な、ひたらな、あどけないほどに単純な吸い。\n暴力的なほど単調な、胸をただただ寄せる感触。\n1272 = "她的吸吮非常直接，非常純粹。胸部擠壓的觸感簡直可以說是達到了暴力的程度。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぁ――ぁ――ぁっ――あっ――」\n868 = "「啊——啊——啊——啊——」" \n\n# monologue\n# JP: 顔が、見えない。それがまた、性感を妄想を増大させる。\nあのポーレットが、理性と知性の塊が――\n1360 = "我現在看不到她的臉，但想像讓我的性慾之火更加熾烈。波萊特平時可是理性與知性的化身——" \n\n# monologue\n# JP: どんなに呆けた表情で、これほど単調に動物的に、\n僕の射精を、精液を、一心不乱に求め――っっ！！？\n1270 = "她現在的表情是有多不堪，才能像一隻沒有智慧的動物一樣，這麼死命地索求著我的精液——" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「れろっ！　れるっ！　れろろっ！　にゅるっ！！\nずっ！　じゅっ――じゅううううっ！　じゅるうっ！」\n895 = "「啾嚕！啾嚕！啾嚕！啾嚕！！啾噗！啾嚕！啾噗！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ぃあっ！」\n# 879 = "「啊！」" \n\n# monologue\n# JP: 堪えきれない精液が、おそらくぷくりと、\n亀頭のとば口に滲んでしまったのだろう。\n1304 = "已經決堤的精液恐怕是從尿道口不小心漏了出來。" \n\n# monologue\n# JP: ポーレットの舌はそれを求めて、尿道先端をえぐり\nほじくり舐めて啜ってっ！！！\n1453 = "波萊特的小舌舔起尿道口，把漏出的精液盡數嚥下。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「んりゅ――れりゅっ――ぞりゅっ――ちゅるんっ！」\n903 = "「嗯——啾嚕——啾嚕——啾噗！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ァ――あっ！　ポーレット！　ポーレットっ！」\n887 = "「啊！波萊特！波萊特！」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ぢゅぶるるるるるぅ～～～～～～っっ！！！」\n896 = "「啾嚕～～～～～～！！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くあっ！」\n# 879 = "「啊！」" \n\n# monologue\n# JP: （びゅぷっ！　どびゅっ！　どぷっ！　びゅるるっ！）\n1662 = "（噗嚕！噗嚕！噗噗！噗噗！）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「んむっ！？　んっ――ふぷっ――ん、んっ――\nこくっ！　ごくっ――ごくっ――ごくんっ！」\n930 = "「嗯！？嗯——呼——嗯——咕嚕！咕嚕——咕嚕——咕嚕！」" \n\n# monologue\n# JP: （びゅうっ！　びゅっ――びゅるるっ！　びゅっ！）\n1656 = "（噗噗！噗噗——噗嚕！噗噗！）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ぷ――あっ――ごくっ――ごくっ、ごくんっ――ごく」\n847 = "「呼——啊——咕嚕——咕嚕——咕嚕」" \n\n# monologue\n# JP: ……射精を受け止め、飲んでもらえる。\n圧倒的な幸福感が、胸にふくれて、まぁるく収まる。\n550 = "……她接下了我的射精，把精液全部喝了下去。我的心中充斥著無與倫比的幸福感。" \n\n# monologue\n# JP: 満たされている。満たしてる。\n今、僕たちは、調和のとれた一対に――――いや！\n1280 = "她被填滿了，我填滿了她。現在我們達到了和諧圓滿的狀態——不對！" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……確かに、結構なマッサージでした。が――」\n571 = "「……剛才的按摩確實不錯。但是——」" \n\n# monologue\n# JP: おしおきプレイを、ここで終わらせたくはない。\nしかし射精で勃起はしおれ、マッサージの成果が示された。\n1324 = "懲罰遊戲不能就這麼結束了。陽具因為射精變得軟綿綿的，說明按摩非常有效果。" \n\n# monologue\n# JP: この難問を解決するのは僕には難しそうと感じる。\nならば？　――ポーレットに委ねよう。\n1294 = "對於我來說這個問題很難辦。那我就交給波萊特來主導下去吧。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「市長は、これで今回の件のご責任を――」\n954 = "「市長，這件事的責任就——」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ううん！　全然！　まだ全然！\n取りきれたなんて思ってませんっ！！！」\n787 = "「不！沒有！還完全沒有！我覺得責任還完全沒有負完！！！」" \n\n# monologue\n# JP: 僕の上からまだどかぬまま、\nポーレットは慌てたような声を出す。\n1444 = "波萊特仍然趴在我的身上，她慌忙說道。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あの――わたし、これ……典型的な、わたしの、\n失敗パターンだって……思います、はい」\n1022 = "「那個——我覺得……這是我的一種……典型的失敗，嗯」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「典型的な？」\n799 = "「典型的？」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ですから、その、夢中になって、[しやきょうさく,3]視野狭窄して。\nそれで、自分勝手に動いちゃう……みたいな」\n946 = "「就是說，那個，我太過於入迷，視野都變窄了，然後就情不自禁地採取了行動……」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「なるほど」\n1012 = "「這樣啊」" \n\n# monologue\n# JP: 普段は自制を――もっと緩めていいのでは？\nと思うレベルで効かせ続けて、見事に抑えてくれてるが。\n1263 = "她平時是不是有點過於克制自己了？我不禁這樣想到，也很佩服她能一直堅持這麼做。" \n\n# monologue\n# JP: ふたりっきりのときには……確かに。ポーレットは\nその手の失敗を犯してしまいがちかもしれん。\n1524 = "至於我們兩人獨處的時候……波萊特確實可能會犯這種錯誤吧。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「では、おしおきと、その失敗の矯正を――\n両立させることができれば」\n1025 = "「那麼就讓懲罰和對這種失敗的矯正一起進行吧」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「はい！　それですよね！　それ、わたし、\nわたし！　アイディアあるんです！！」\n926 = "「嗯！是啊！於是！我有一個主意！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ほう？」\n# 935 = "「嗯？」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……っと、こんなものか？」\n576 = "「……這樣就行了吧」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「は、はい。これ――うん。\nわ――この程度でも、結構、手、動かないですね」\n933 = "「嗯，好。這樣——嗯。哇，就算只是這樣，我的手就不能自由活動了」" \n\n# monologue\n# JP: 右袖ボタンを、左袖に。左袖ボタンを、右袖に。\n1348 = "我把她右邊袖子的鈕扣扣在左邊袖子，同時把左邊的扣在右邊。" \n\n# monologue\n# JP: 袖から腕を抜くだけで解消できる拘束だけれど、\nポーレットは実に満足そうだ。\n1574 = "雖然手臂從袖子裡抽出來就能解綁，波萊特看起來已經很滿足了。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「これなら、わざわざ縛らなくってもいいですね。\n双鉄君、さすがだなぁ」\n1014 = "「這樣的話就不用專門綁上了。雙鐵，你真聰明」" \n\n# monologue\n# JP: ……いや、本当に単なる思いつきだ。\n547 = "……呃，我只是心血來潮想到的。" \n\n# monologue\n# JP: ポーレットご提案の、“ロープで縛る”は、\n怪我をさせそうで怖くて――回避したかったが故の。\n1450 = "波萊特建議我用繩子把她綁起來，但我怕這樣會讓她受傷，所以就想避開這種方法。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「これでもう、わたし、身動きできないですし。\n勝手に暴走、しようとしてもできませんよね！」\n1013 = "「這樣我就動不了了，身體就不會失控了！」" \n\n# monologue\n# JP: 弾みに弾んだその声にもう、\n暴走の兆しを感じてしまうが――\n1308 = "從她這興高采烈的語氣聽起來，她已經有失控的徵兆了——" \n\n# monologue\n# JP: そうならぬよう、厳しく冷たく、\nおしおき＆教育エッチを、貫くことだけ心がけよう。\n1476 = "為了不讓這種事情發生，我要冷酷無情地認真做好這場懲罰兼教育的性交。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「…………」\n562 = "「…………」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ふえっ！？」\n862 = "「哎！？」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あ……あの――双鉄くん！　わ、わたし！　えと、\n双鉄くんのお顔とか見える姿勢の方が、そのっ」\n1023 = "「那個……雙鐵君！我還是！我還是想要能看到你臉的姿勢」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ポーレットの好みに合わせるのでは、\nおしおきとしては失格だろう」\n991 = "「要是按你的喜好來，那就不叫懲罰了」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あ――」\n866 = "「啊——」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「その程度のことさえ失念し、暴走してしまう。\nそれを改めるための手段は――さて、なんだ？」\n1015 = "「這點小事就叫你忘掉了重點，就要失控了。我該用什麼手段糾正你呢？」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「え？　あ、あの――拘束、無意味って……\n今、えと、わたしが証明しちゃいましたし」\n865 = "「哎？那個——綁起來沒有作用…………剛才我證明了這一點」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「だな」\n976 = "「是啊」" \n\n# monologue\n# JP: （ずにっ！）\n1680 = "（揉搓）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「んひゅっんっ！！？　ふわっ！？　そ、双鉄くん\nこれっ！　あのっ！！」\n920 = "「嗯呀！！？哇！？雙、雙鐵君，這樣！那個！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「また同じことを繰り返すのか？　考えるんだ。\n落ち着くために、整頓のため――何が一番良い手段かを」\n803 = "「又要犯同樣的錯誤嗎？你好好想想。為了冷靜下來、為了梳理情緒，要用什麼方法」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「え、と――あの――落ち着いて、整頓すれば……\nそか、パニックにならなくて。整頓するには――あっ！」\n1021 = "「那個——如果要——冷靜下來，梳理情緒………為了不陷入混亂，管理好情緒——啊！」" \n\n# monologue\n# JP: 顔が、見えない。\nけれども、わずかに高まった体温が教えてくれる。\n1359 = "我現在看不到她的臉。但是通過她稍稍升高的體溫我能感受的到。" \n\n# monologue\n# JP: ポーレットは今、理解の喜びに微笑んでいる。\n1452 = "波萊特現在正因頓悟而笑逐顏開。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「言語化、ですね？　思ってることを言葉にすれば――\nその時点でもう、暴走からは遠ざかれます」\n993 = "「要說出來，對吧？把心裡想的事情說出來的話——這樣就能遠離失控的危險」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そのとおりだ」\n979 = "「沒錯」" \n\n# monologue\n# JP: （ふにゅっ！！！）\n1677 = "（揉捏）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ふやっ――あっ――お、おっぱいっ」\n809 = "「呀——啊——奶、奶子」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「そう。おっぱいだな」\n980 = "「沒錯，奶子」" \n\n# monologue\n# JP: （ふにゅ――ぷにっ――くにゅんっ！　もみゅう！）\n# 1676 = "（揉來揉去）" \n\n# monologue\n# JP: ポーレットの持つぷりぷり感の、\nまさに極北たる豊かなおっぱい。\n1462 = "波萊特胸前的果實真的是豐滿到了極點。" \n\n# monologue\n# JP: 揉めばすぐさま、\nポーレットは蕩けてしまうところなのだが――\n1371 = "我這麼一揉，波萊特就心神蕩漾——" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「わ、わたし――今っ、双鉄くん、に――おっぱい――\nうしろ――から、わしずかみ――みたい、され――て」\n958 = "「我、我現在——被雙鐵君——被你——從後面——抓住了胸——」" \n\n# monologue\n# JP: （くにゅっ！　もにゅっ！　ぷりゅっ！　くりゅんっ！）\n# 1676 = "（揉來揉去）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「くひっ――いっ――あ……それで、もみ、もみ――され、\nながらっ――んっ――先っぽ、乳首、指で、コネっ、て」\n807 = "「呀——咿——啊……這樣一邊被揉著，嗯——乳頭、還被指尖按到」" \n\n# monologue\n# JP: （こねっ――こりゅっ――きゅにゅ――むにゅんっ！）\n1679 = "（揉搓按壓）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ンンンっ――あっ――手、で――指、で――おっぱい、\nわたし、おっぱい――むにむに――いじられ、ふ、あ！」\n901 = "「嗯——啊——我的奶——被手——被手指——按摩到了——啊！」" \n\n# monologue\n# JP: ――言語化が、確かに暴走を抑えてる。\nが……抑えられてしまうとなると、何故か悔しい。\n1384 = "把想法說出來確實能防止身體失控。但是看她壓抑下來了，我又有點不甘心。" \n\n# monologue\n# JP: ぐちゃぐちゃに乱してしまいたくなり、\n責めの手数を増していく。\n1354 = "我攻擊的手段更多了，我想狠狠蹂躪她一番。" \n\n# monologue\n# JP: （れろっ）\n# 1692 = "（舔舐）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひゃっ！？　あっ――耳、おみみ――うら、がわっ――\nんっ！　く、くひっ！　首っ――筋――ぺろ、ぺろっ」\n831 = "「呀！？啊——耳朵——耳朵背面——嗯！脖、脖子！脖子——被舔到了」" \n\n# monologue\n# JP: （ずにゅんっ！）\n1674 = "（挺腰）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あひゅんっ！　腰、ぐいって！　押されて、こすれてっわたし、おまた――おちんちん、生えてる、みたい、で」\n822 = "「呀！腰被頂到了！被這麼一推，就好像我的下面，長出雞雞來了」" \n\n# monologue\n# JP: 蕩けながらも、崩れ切らない。\n体の熱さが、雌の匂いが、僕の何かを駆り立てる。\n1286 = "她雖然已經動了情，卻還沒有完全淪陷。波萊特的體溫和女性特有的香氣撩撥著我內心深處的欲望。" \n\n# monologue\n# JP: （ずりゅっ！　もみゅっ！　れる！　ずちゅん！）\n1675 = "（揉來揉去、舔來舔去）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひあっ！　あっ！　あ！　しゅごっ――これっ――ん！\nおまんこ、ずりずり、こす、られ――てっ――んふっ！」\n820 = "「呀！啊！啊！這樣好厲害——嗯！小穴——被摩擦到了——嗯！」" \n\n# monologue\n# JP: （もみゅっ！　くにゅっ！　くりっ！　くいいいいっ！）\n1670 = "（按壓揉搓）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「いうっ！？　あっ――おっぱい――乳首ッ――ひッ！\nぎゅって、されて――やんっ！　あっ――腰っ、ベロっ」\n889 = "「啊！？啊——奶子——乳頭——呀！被按扁了！啊——腰那裡」" \n\n# monologue\n# JP: 言葉が単純になっていく。\n動きも直線的になる。\n1276 = "她的用詞越來越簡單了。她的動作也越來越直來直去。" \n\n# monologue\n# JP: ポーレットをもっと崩して、イカせたい。\nその思いだけに、僕の全部が焦がされていく。\n1341 = "我想讓波萊特徹底升天，讓她欲仙欲死。於是我繼續挑弄著她。" \n\n# monologue\n# JP: （ずりっ！　れるっ！　ちゅむっ！　もみゅっ！！）\n# 1675 = "（揉來揉去、舔來舔去）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「やっ、らっ！　らめっ――これっ――ちんちん――\nあつくて――とけりゅっ――とけちゃうっ！」\n786 = "「不要！不行——這樣——雞雞——好燙——要化了——我要化了！」" \n\n# monologue\n# JP: （もみゅっ！　こりゅっ！　ちゅぱっ！　ずりゅん！）\n# 1676 = "（揉來揉去）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ふあっ――あっ――やぁっ――なのおっ！　ずりずり、\nだけ――でっ！　セックス、なしで、イクの、やぁぁ！」\n854 = "「呼啊——啊——我不要！我不想！不做愛——光是被摸一摸、就高潮——不要！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n# 879 = "「啊！」" \n\n# monologue\n# JP: 慌てて、止まる。\n動きたがってる腰を、体を、非常制動で押さえ込むっ！\n1346 = "我慌忙停止了動作。我給自己的身體踩了個緊急剎車！" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ふあっ――あっ――あっ――双鉄くん――双鉄くぅん」\n853 = "「呼啊——啊——啊——雙鐵君——雙鐵君」" \n\n# monologue\n# JP: 泣きそうな声。甘えてる声。\n愛おしくて、申し訳なくて、言葉がなかなか出てこない。\n1282 = "她軟綿綿的聲音帶著哭腔。愛意和歉意在我心中升起，我一時不知道該說什麼才好。" \n\n# monologue\n# JP: だからただ――頭に頭を、\n体に体を、優しく優しく擦り付ける。\n1377 = "所以我只能用頭輕輕蹭著她的頭，用身體輕輕蹭著她的身體。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「双鉄くぅん」\n1029 = "「雙鐵」" \n\n# monologue\n# JP: 同じ言葉。僕の名前。\nけれども、まったく違った響き。\n1259 = "她又叫了一聲我的名字。但是聽起來卻跟剛才完全不一樣。" \n\n# monologue\n# JP: ポーレットの安堵は僕を緩めて――\n歪みかけてた欲望を、まっすぐなものに戻してくれる。\n1550 = "見波萊特安心下來，我也平靜下來了。差點要走上歪路的欲望又回到了正軌。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ポーレット」\n985 = "「波萊特」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「はい。双鉄くん」\n934 = "「嗯，雙鐵君」" \n\n# monologue\n# JP: それだけでいい。\nただ、それだけで。\n1567 = "這樣就夠了。不需要更多的語言。" \n\n# monologue\n# JP: 演技の全てを脱ぎ捨てたなら、\nポーレットへの愛しさだけで、全身が心地よく満たされる。\n1387 = "把所有的演技去掉之後，我的內心裡就只剩下對波萊特純粹的愛了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「いくぞ」\n969 = "「我要進去了」" \n\n# monologue\n# JP: （ぬっ――ぐっ――）\n# 1684 = "（插入）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あっ――んっ……ふっ――ぁ……太ッ――んっ！」\n869 = "「啊——啊……呼啊……好粗——嗯！」" \n\n# monologue\n# JP: いつもより興奮しているのか、\nそれとも姿勢が、ポーレットの入り口を狭めてるのか――\n1193 = "也不知道是因為她比平時更興奮一些，還是因為當前的體位讓蜜穴的入口顯得更窄了一些——" \n\n# monologue\n# JP: （ぐっ――ちっ――みっっ――りっ――）\n1688 = "（繼續插入）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひっ！？　あっ――まだ――まだ――全部っ――\nふっ――太い――とこっ――んっ！」\n833 = "「呀！？啊——還沒——全部——好粗——好粗的——地方——嗯！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「もう――すぐだ――」\n1031 = "「馬上快了」" \n\n# monologue\n# JP: （み……ちっ――）\n# 1664 = "（夾緊）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「きゅっ！　ふううっ――」\n815 = "「呀！呼啊——」" \n\n# monologue\n# JP: キツイ――けれども、初めてのときのキツさではない。\n1549 = "裡面好緊，但這不是第一次做愛時的那種緊緻。" \n\n# monologue\n# JP: ポーレットの膣肉はむちむちみちみち、圧すと共に蠢いて、\n僕を奥へと子宮へと、引きずり込もうとしてくれるから！\n1455 = "波萊特的蜜肉一邊蠕動著一邊擠壓著肉棒，引導著它向深處、向子宮出發！" \n\n# monologue\n# JP: （ずぶんっ！！！！！）\n1654 = "（噗呲）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひゃううううううううんっ！！！！」\n811 = "「呀啊啊啊啊啊！！！！」" \n\n# monologue\n# JP: （ごっ！）\n1648 = "（咚！）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひきゅっ！　あっ――はっ――しゅ、ごッ――んっ\n――太いの――こえ、たら――ずぶって――一気、に」\n881 = "「啊！啊——呼啊——好厲害——嗯——忍住——特別粗的以後——就一下子進來了」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ――良く頑張ったな」\n907 = "「嗯——辛苦你了」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「え……えへへっ――双鉄くぅん」\n941 = "「嘿嘿……嘿嘿——雙鐵」" \n\n# monologue\n# JP: （ずっ……るっ……）\n# 1664 = "（夾緊）" \n\n# monologue\n# JP: そうして僕も良く頑張った。この膣に――\nこれほどみちみち、圧迫しながら抱きつく膣に。\n1510 = "而且我也真的很努力了，在壓迫得這麼厲害的緊緻花徑裡——" \n\n# monologue\n# JP: あれほど一気に引きずり込まれ脳を快感で塗りつぶされて。\nよくぞ――射精をせず耐えた。が……\n1397 = "插入時讓人迷醉的快感直衝大腦，我費了好大力氣才忍住沒有射出來。然而……" \n\n# monologue\n# JP: （りゅ――ズッ――）\n1697 = "（輕輕搖動）" \n\n# monologue\n# JP: じわ、じわとしか動けない。\nナメクジが這うほどにしか――殆ど止まったようにしか。\n1333 = "我只能小幅地動一動。我只能像鼻涕蟲那樣一點點抽動，跟靜止不動幾乎沒有區別。" \n\n# monologue\n# JP: なのに膣は、抱きつき締め付け休むこと無く蠢き続ける。\n全力ピストンよりも凶悪な快感を、勃起に流し込んでくる。\n1491 = "然而蜜壺卻是把肉棒死死夾住，不停地蠕動著。一股比全力做活塞運動時還要強烈的快感傳了過來。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「あ……あ……しゅきっ……んっ――ゆっくり――\nされ、るの……きもち……いいっ――しゅきっ」\n875 = "「啊……啊……我喜歡……嗯——慢慢地——動起來……好舒服……好——我好喜歡」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕もだ――僕も、気持ちいい――」\n959 = "「我也——我也很舒服——」" \n\n# monologue\n# JP: 言えば、射精衝動がわずかに薄れる。\nああ、そうか。そうだ、これだ――\n1560 = "說出來之後，射精衝動就減弱一些了。噢，也來如此。就是這樣的——" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「どういう……ふう、にっ――んっ――双鉄、くん、は、\nあっ――おちん、ちん――気持ち……いい、の？」\n797 = "「具體是……怎麼樣的——嗯——雙鐵君——啊——你的雞雞——是怎麼個……舒服法？」" \n\n# monologue\n# JP: （きゅううんっ！）\n# 1664 = "（夾緊）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「く――ぁっ！」\n# 879 = "「啊！」" \n\n# monologue\n# JP: 僕が気づいたのとおんなじことを、\nポーレットも気づいてくれている。\n1443 = "波萊特也發現了，她發現了同一件事情。" \n\n# monologue\n# JP: 気づいて、興奮してくれている。\nその喜びが、照れくささを消し、僕を素直にしてくれる。\n1256 = "她不僅發現了，還為此興奮。喜悅之情沖刷掉了我的羞恥，讓我能誠實說出內心的想法。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おまんこに――んっ――みっちり――包まれ――\nゆっくり、と、しか――動けないのが――気持ち、いい」\n967 = "「我被小穴——嗯——緊緊包著——只能動彈——一點點——這樣很爽」" \n\n# monologue\n# JP: （きゅんっ！　きゅきゅんっっ！！）\n# 1664 = "（夾緊）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「はっ――ふっ――んっ――あ……ね？　どう、して？\n動け、ない――のに……きもち――いい、の？　んっ！」\n845 = "「呼——呼——嗯——為什麼？明明不能動……為什麼還有快感？嗯！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「おまんこが――おまんこが――極上――極上すぎるから――だから、止まって――いて、さえ――こん、なにっ」\n944 = "「小穴——小穴實在太棒了——所以即使靜止不動——也非常刺激」" \n\n# monologue\n# JP: 僕の言葉のその度に、ポーレットは膣でも喜び、\n締め付け、甘え、震えてくれる。\n1245 = "在我說話的同時，波萊特蜜道也跟著收縮、顫動。" \n\n# monologue\n# JP: 言語化で冷静になってなければ、\nこの膣内に、僕はとっくに、思いっきりに射精している。\n1287 = "如果不是說出來讓我鎮靜了不少，恐怕我早就射出來了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「むちむち、みち、みちっ――締めて、くるの、のに――\n同時に、とろとろ――溶けて――甘えて、張り、付いて」\n975 = "「明明非常緊——夾得很厲害——同時還軟軟的——感覺要化了——緊緊貼在上面」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「はっ――やっ――ンッ――嬉しっ――嬉しいッ――」\n843 = "「呼——呀——嗯——我好開心——好開心——」" \n\n# monologue\n# JP: （ずっ――ルッ――）\n1666 = "（抽插）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「くはっ！」\n# 879 = "「啊！」" \n\n# monologue\n# JP: ポーレットの腰が、不器用にだが情熱的に揺れ動き始める。\nこれは――保たない。\n1445 = "波萊特動了起來，她的動作雖然笨拙卻又充滿了熱情。這下我可忍不住了。" \n\n# monologue\n# JP: だったら、だったら――\n僕一人だけでイクのではなく！\n1400 = "既然如此，那我就不要一個人達到高潮——" \n\n# monologue\n# JP: （ずぶうううううううううっ！）\n1701 = "（頂入）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひあっ！？　きゅ――きゅふうううんっ！！！」\n826 = "「呀！？呀——呀啊啊啊！！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「深さも、狭さも！　最高すぎるっ！\n思いっきりにつけばこうしてっ！」\n800 = "「又深！又窄！真的是太棒了！用力往裡一插就會這樣！」" \n\n# monologue\n# JP: （ごつっ！）\n1665 = "（抵上）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひゃっ！　ふっ――あっ――子宮っ！　うっ！\n子宮――ノックっ！　ごつんて！　ごつんて！！」\n814 = "「呀！呼——啊——子宮！啊！子宮——被敲到了！被頂上了！頂上了！！」" \n\n# monologue\n# JP: （ずるうううううううううううっ！！）\n# 1667 = "（拔出）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ゅはぁぁぁぁぁぁあああああああんっ！！！」\n856 = "「呼啊啊啊啊啊啊！！！」" \n\n# monologue\n# JP: 思う存分腰をひいても、弾みで抜けることがない。\n絶妙な深さとみちみち肉が、僕をしっかり抱いててくれる。\n1296 = "就算我用上全力，也沒辦法把肉棒一下都拔出來。深度正好的蜜道用軟軟的蜜肉把分身整個包裹住了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「僕専用の、僕の精液を絞り出すためのおまんこだ！\nこんな最高の膣肉を――抉って――耐えるなどとてもっ」\n1011 = "「這是我專用的、專門用來榨取我精液的小穴！這麼美妙的陰道夾著我——我怎麼可能忍得住」" \n\n# monologue\n# JP: （ずぶっ！　ずばっ！　ずじゅっ！　じゅぶううっ！）\n1649 = "（啾噗！啾噗！啾啪！啾啪！）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひあっ！　あっ！　はっ！　あっ！　ふあっ！\nあっ――んゆっ――ひゃふっ！！」\n818 = "「呀！啊！啊！啊！呼啊！啊——嗯——呀啊！！」" \n\n# monologue\n# JP: そこから先は言葉にならない。\n肉と肉と、熱と熱とで。粘膜と粘膜、汁と汁とで。\n1260 = "她已經說不出有意義的話了。我們的肉體被熱量連在了一起，黏膜被愛液黏在了一起。" \n\n# monologue\n# JP: （ずぶっ！　じゅぶん！　ぱちゅんっ！　ばぢゅうっ！）\n1650 = "（啾噗！啾噗！啾噗！啾噗！）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ひあっ！　あっ――めくれっ――んっ――ひっぱ――っ\n――あっ――おま、んこっ――ひっ――しゅご――んっ」\n816 = "「呀！啊——被掀翻了——嗯——被拉出來了——啊——小穴——呀——好刺激——嗯」" \n\n# monologue\n# JP: カリ首が膣壁をごりごりこすり、\n膣壁はカリ首を逃すまいとして抱きつき締める。\n1368 = "我的龜頭磨蹭著她的穴壁，同時穴壁也緊緊地箍著龜頭，不讓它離開。" \n\n# monologue\n# JP: 舌では浅く感じるほどのムチムチゆえの肉ヒダも、\n限界まで鋭敏になった亀頭の性感には刺さるくらいで――\n1362 = "我用舌頭舔的時候感覺很淺又很緊實的肉褶，對於已經到了最敏感狀態的龜頭來說簡直就像尖刺一樣——" \n\n# monologue\n# JP: （ごりゅっ！　ずりゅっ！　じゅぼっ！　じゅばっ！！）\n1653 = "（啾嚕！啾嚕！啾噗！啾噗！）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「はっ！　あっ！　あっ！　あっ！　ひっ――ふあっ！\nそうてつ――く――ふっ――あ――そうてつ、くぅん」\n885 = "「啊！啊！啊！啊！呀——呼啊！雙鐵——呼啊——雙鐵」" \n\n# monologue\n# JP: （もぞっ！　ごそっ！！）\n1702 = "（顫抖痙攣）" \n\n# monologue\n# JP: 僕の腹肉とポーレットの背と、その狭隘が必死に蠢く。\n1365 = "我的小腹和緊貼著的波萊特的後背一起猛烈地痙攣起來。" \n\n# monologue\n# JP: 袖拘束をかけられているポーレットの手が、\n僕を求めて、むなしく切なくあがいてくれてる。\n1454 = "波萊特的手被袖子綁了起來，現在她無用地掙扎著，想把手伸向我的方向。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ポーレット！」\n986 = "「波萊特！」" \n\n# monologue\n# JP: （ぎゅうううううううううっ！）\n# 1664 = "（夾緊）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「んきゅっ！　ふああっ！！！」\n921 = "「嗯啊！呼啊！！！」" \n\n# monologue\n# JP: だから、思いっきり密着し、\nポーレットの胸を揉みしだくっ――っ！？\n1380 = "所以我就用力貼緊她，盡情揉搓她的大奶——" \n\n# monologue\n# JP: （きゅんっ！　きゅきゅううううううっっ！）\n1695 = "（蠕動夾緊）" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「っ！」\n# 879 = "「啊！」" \n\n# monologue\n# JP: 膣が、わななく。\nそうと感じるより早く、腰は呼応し、動き出してる！\n1540 = "蜜道在不停地蠕動。我回應著這個動作，做起活塞運動！" \n\n# monologue\n# JP: （ずぶううううううううううううっ！　ごつっ！！！）\n1700 = "（進進出出）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「いっ――きゅううううううううううううぅぅんっ！！」\n860 = "「咿——嗯啊啊啊啊啊！！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「んくっ！」\n839 = "「呃！」" \n\n# monologue\n# JP: （びゅっ！　びゅるるっ！　どびゅっ！　びゅぶるっ！）\n1659 = "（噗噗！噗嚕！噗噗！噗噗！）" \n\n# monologue\n# JP: 今夜……何度目……数えきれないほどの\nセックスの果ての射精が――\n1199 = "今晚已經不知道是第幾次交合，這最後的一次射精——" \n\n# monologue\n# JP: （びゅっ！　びゅごっ！　びゅるっ！　ばちゅんっ！）\n1660 = "（噗噗！噗嚕！噗噗！噗嚕！）" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ふあっ！　あっ――ひっ――あっ――しきゅう――\nばちゅって――あついの――あたっ、って――はきゅ！」\n858 = "「呼啊！啊——呀——啊——子宮——射到了——燙燙的——打到了——啊！」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「く……あ――――あっ……は……はぁ……あ――」\n873 = "「啊……啊——啊……呼……呼……啊——」" \n\n# monologue\n# JP: 何年も溜めてたかのような勢いで、\nポーレットの子宮を叩いて満たし。\n1507 = "精液以迅猛無比的勢頭填滿了波萊特的子宮，簡直就像積攢了好幾年了一樣。" \n\n# monologue\n# JP: そして、僕は――いいや、僕らは――\n全てを出し切り、熱を使い切り――崩れて落ちる。\n1484 = "然後我——不對，我們就釋放出了一切，在把所有激情發散完了之後——渾身一軟。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「は……ぁ……ふ……ふあ……あ……\nすご……か……った……」\n850 = "「呼……啊……呼……呼啊……啊……真刺激……」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ――すごかったな」\n906 = "「嗯——好刺激啊」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ちゅ……ちゅう……チュムッ――ちゅっ――」\n890 = "「啾……啾……啾噗——啾噗——」" \n\n# monologue\n# JP: 穏やかなキス。鼻の頭をくっつけあって。頬ずりしあい。\n1330 = "我們來了個溫和的吻。我們互相蹭著鼻頭、蹭著對方的臉。" \n\n# monologue\n# JP: そうして僕らは……目と目を見合わせ、\nどちらからともなく笑いあう。\n1485 = "然後我們四目相對，默契地一起笑了出來。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「……しかし、あれだな。イメクラプレイなるものは」\n568 = "「……不過這角色扮演很真是很有感覺」" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「うふふっ、でしたね。双鉄くん」\n939 = "「嘻嘻，是啊，雙鐵君」" \n\n# monologue\n# JP: 言葉は、今は余計だろう。\nその目が、笑みが、全てを伝えてくれているから。\n1499 = "現在說什麼都多餘了。一個眼神、一個笑容就足以傳達所有的柔情蜜意。" \n\n# monologue\n# JP: どんな演技をしたとて最後は、やっぱり裸の僕たちで。\n普段通りのセックスだから――最高に気持よかったのだと。\n1477 = "無論演技有多好，最後我們還是會變成最赤裸裸的自己。正因為是在用和平時一樣的方式做愛，才會有無與倫比的快感。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「ふぁ……んっ――」\n851 = "「呼……嗯——」" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「ああ」\n# 917 = "「嗯」" \n\n# monologue\n# JP: 腕を差し出せばその上に、\nごくごく自然に当然に、ポーレットの小さな頭が収まる。\n1328 = "我伸出手臂來，波萊特的小腦袋就自然而然地躺進了我的臂彎。" \n\n# monologue\n# JP: 大好きな重みとぬくもりに、\n僕の眠気も、否応無しに引きずり出される。\n1566 = "這份我最愛的重量和溫存，讓我的疲勞感一下子就湧了上來。" \n\n# 【ポーレット】\n# display as 波萊特\n# JP: 「……すぅ……すぅ……すぅ……すぅ」\n572 = "「……呼……呼……呼……呼」" \n\n# monologue\n# JP: ……規則正しい寝息が聞こえる。\n……さすがに、ポーレットも限界だったか。\n546 = "……一陣均勻的呼嚕聲傳來。看來波萊特也到了極限了。" \n\n# 【双鉄】\n# display as 雙鐵\n# JP: 「長い――長い残業だったな」\n1009 = "「這加班的時間可真夠長的」" \n\n# monologue\n# JP: 気持ち的にはノビをしたいが、\nポーレットを起こしてしまうわけにもいかない。\n1340 = "我想伸個懶腰，但是我又不能把波萊特弄醒。" \n\n# monologue\n# JP: だから代わりに、寝乱れる髪に口付けて。\nそうして僕も――心地よい疲れに体を委ねる。\n1379 = "所以我就吻了一下波萊特凌亂的秀髮，然後讓自己疲憊的身體自然沉入了夢鄉。" \n