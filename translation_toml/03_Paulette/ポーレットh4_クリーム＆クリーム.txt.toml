# JP: アナルの中には、恐れていたようなエグさなど無く――\n肌……柔肉を、なめているのと変わらぬ味しか感じない。
1433 = "菊穴中並沒有我擔心的苦澀，而是跟周圍滑嫩的肌膚是同樣的味道。" 

