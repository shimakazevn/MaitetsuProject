1565 = "（Hử）"
# monologue
# JP: ……発情しきってるポーレットには、\n水流さえもが、性的刺激となってるようだ。
689 = "……Với một Paulette đang hoàn toàn động dục, dường như ngay cả dòng nước cũng trở thành kích thích tình dục."
# monologue
