885 = "「Á!?」"
# monologue
# JP: 急いで本物のシャワーを使い、\nポーレットの体を洗い流す。
1330 = "Tôi vội vàng dùng vòi hoa sen thật, xả sạch cơ thể Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――ふあ――あっ――あんっ！」
950 = "「Ưm——phù——a——a!」"
