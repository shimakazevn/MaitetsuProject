[script]
# lines: 305 
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　双鉄くんっ」
943 = "「A! Anh Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「おお」
959 = "「Ồ.」"
# monologue
# JP: 呼びかけられて手を振れば、\nポーレットは笑顔を浮かべ、小走りになる。
1424 = "Nghe tiếng gọi, tôi vẫy tay lại, Paulette nở nụ cười, chạy bước nhỏ lại gần."
# 【ポーレット】
# display as 波萊特
# JP: 「すみません。待たせちゃいましたよね」
972 = "「Xin lỗi anh. Em để anh đợi lâu rồi nhỉ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや、僕が急に呼び出したのだ。\nこちらこそすまなかったな、こんな時間に」
853 = "「Không, là do anh đột nhiên gọi em ra mà. Anh mới phải xin lỗi, giờ này rồi còn……」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、そんなの全然。\n普段から、普通に起きてる時間ですし」
992 = "「Không, không sao đâu ạ. Bình thường giờ này em vẫn còn thức mà.」"
# monologue
# JP: 言いながら、\nポーレットはきょろきょろとあたりを大きく見回す。
1368 = "Vừa nói,\nPaulette vừa ngó nghiêng nhìn quanh quất."
# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんは？」
866 = "「Hachiroku đâu rồi anh?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「先に帰した。と、いうのもだな――」
984 = "「Anh để em ấy về trước rồi. Với lại, chuyện là thế này——」"
# monologue
# JP: （ちゃぽん）
1570 = "（Tùm）"
# monologue
# JP: 湯船につかる。
1328 = "Ngâm mình trong bồn tắm."
# monologue
# JP: ポーレットとふたりっきりで並ぶのは、\n考えてみれば初めてだ。
1465 = "Nghĩ lại thì, đây là lần đầu tiên tôi và Paulette ở riêng bên nhau thế này."
# 【ポーレット】
# display as 波萊特
# JP: 「こんなに広いお風呂を、\n一晩自由に使えるなんて、すごいですねぇ」
1020 = "「Được tự do sử dụng một bồn tắm rộng thế này suốt cả đêm, tuyệt thật đấy nhỉ.」"
# monologue
# JP: だというのに、ポーレットには緊張をした様子は無い。\n手足を伸ばし、言葉までもがゆったりしている。
1395 = "Dù vậy, Paulette không hề có vẻ gì là căng thẳng. Cô ấy duỗi tay duỗi chân, ngay cả lời nói cũng thong thả."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。全部の掃除と施錠とをして、\n明日の朝に鍵を返せば、好きに使って構わんと」
989 = "「Ừ. Bà ấy bảo chỉ cần dọn dẹp sạch sẽ, khóa cửa cẩn thận, và trả chìa khóa vào sáng mai là có thể dùng tùy thích.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　鍵って――\n登呂流湯のご主人、何かあったんですか？」
917 = "「Hả? Chìa khóa sao—— Chủ nhân Tororyu-yu có chuyện gì sao anh?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや、なんだかんだで夜更かしが続いてしまったらしい。\nで、ともかく眠いとおっしゃっていた」
856 = "「Không, có vẻ như dạo này bà ấy hay thức khuya. Nên bà ấy bảo buồn ngủ quá.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ああ、それなら良かったです」
920 = "「À, vậy thì tốt rồi.」"
# monologue
# JP: 強張りかけてたポーレットの顔が、ふにゃりとゆるむ。
1379 = "Khuôn mặt đang hơi căng ra của Paulette giãn ra mềm mại."
# monologue
# JP: （ぺとっ）
1636 = "（Áp sát）"
# 【双鉄H】
# display as 雙鐵
# JP: 「む」
922 = "「Hửm」"
# monologue
# JP: だけでなく、肩も僕へと預けてくる。\n湯に濡れて、汗もかいてる肌の張り付きが心地いい。
1133 = "Không chỉ vậy, cô ấy còn tựa vai vào tôi. Làn da ướt đẫm nước nóng và mồ hôi dính vào nhau thật dễ chịu."
# 【ポーレット】
# display as 波萊特
# JP: 「じゃ、双鉄くんは……\nお掃除の手伝いに、わたしを呼んだ感じですか？」
1023 = "「Vậy, anh Soutetsu…… Gọi em đến là để phụ dọn dẹp sao?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「まさか」
979 = "「Làm gì có chuyện đó.」"
# monologue
# JP: 潤んだ瞳。\nしんなりと、もたれかかってくる体。
1214 = "Đôi mắt ướt át.\nCơ thể mềm mại ngả vào người tôi."
# monologue
# JP: ポーレットはわかった上で聞いてきている。\n甘えた声を流し込まれて、欲望は高められていく。
1375 = "Paulette biết tỏng rồi mà còn cố tình hỏi. Giọng nói nũng nịu rót vào tai khiến dục vọng trong tôi dâng trào."
# 【双鉄H】
# display as 雙鐵
# JP: 「どうせ、完全に清掃するのだ。\nならば、アナルにチャレンジするのに――」
870 = "「Đằng nào thì cũng phải dọn dẹp toàn bộ. Nếu vậy, nhân cơ hội này thử sức với lỗ hậu thì——」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですよね！\nほんとに、うってつけの舞台」
993 = "「Đúng không anh! Thực sự là một sân khấu hoàn hảo luôn.」"
# monologue
# JP: 僕の言葉が終わりきらぬうちにそう答え、\nポーレットは湯船からさっとあがってしまう。
1469 = "Lời tôi còn chưa dứt, Paulette đã đáp lời và nhanh chóng bước ra khỏi bồn tắm."
# monologue
# JP: そうして、洗い場に膝をつき――
1389 = "Sau đó, cô ấy quỳ gối xuống khu vực tắm rửa——"
# monologue
# JP: （かぱっ）
1598 = "（Mở ra）"
# monologue
# JP: 大きく両足を広げて、上体まで倒しこみ、\n股の間から僕を見る。
1370 = "Dang rộng hai chân, gập người xuống, cô ấy nhìn tôi qua khe hở giữa hai đùi."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、ひょっとしたらって思って――\nあの、わたしのお風呂カゴ、みてもらえますか？」
981 = "「Em cũng đoán chừng là vậy nên—— Ừm, anh xem thử giỏ đồ tắm của em được không?」"
# monologue
# JP: ピンクの小さな、網目になってるバスケット。\nそこにはシャンプーとボディスポンジと――
1208 = "Chiếc giỏ nhỏ màu hồng đan lưới. Trong đó có dầu gội, miếng bọt biển tắm và——"
# 【双鉄H】
# display as 雙鐵
# JP: 「これは……何だ？　ハンドクリームか？」
1019 = "「Đây là……gì vậy? Kem dưỡng da tay à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ほとんど正解です、双鉄くん。\nそれ、湿潤タイプのフェイスクリームなんです」
977 = "「Gần đúng rồi đó anh Soutetsu. Đó là kem dưỡng da mặt loại cấp ẩm đấy.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ほう」
919 = "「Ồ.」"
# monologue
# JP: フタをひねって中身を見れば、\n確かに瑞々しさのある、白いクリームが入ってる。
1293 = "Vặn nắp ra xem thử bên trong, quả thực là có lớp kem trắng trông rất mọng nước."
# monologue
# JP: かなり中身が減っているから、\n普段からよく使っているものなのだろう。
1473 = "Bên trong đã vơi đi khá nhiều, chắc hẳn là món đồ cô ấy vẫn thường xuyên sử dụng."
# 【ポーレット】
# display as 波萊特
# JP: 「お顔に塗って大丈夫なものなら……\nええと、その――体の中、も、平気かなって、思って」
986 = "「Nếu đã thoa lên mặt được thì…… Ừm, em nghĩ là——bên trong cơ thể, chắc cũng không sao đâu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「中……かなるほど。\nアナルに塗りこむ、潤滑剤にするわけか」
1012 = "「Bên trong……Ra là vậy. Thoa vào lỗ hậu, dùng làm chất bôi trơn chứ gì.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええと、専門の、そういうのもあるみたいなんですけど。\nわたし――通販――どうしても、ポチってできなくて」
1025 = "「Ừm thì, hình như cũng có loại chuyên dụng cho việc đó. Nhưng mà em——không tài nào——bấm mua trên mạng được.」"
# monologue
# JP: こんないやらしい姿を僕に見せつけながら、\n妙なところで、ポーレットは照れて赤くなる。
1374 = "Bày ra dáng vẻ khêu gợi thế này trước mặt tôi, mà Paulette lại đỏ mặt ngượng ngùng vì một chuyện thật kỳ lạ."
# 【双鉄H】
# display as 雙鐵
# JP: 「これでも十分使えるだろう。\nが、クリームを塗りこむその前に――」
1018 = "「Thế này cũng đủ dùng rồi. Nhưng, trước khi thoa kem——」"
# monologue
# JP: （しゅむっ――もみゅ――）
1566 = "（Chà——vò——）"
# monologue
# JP: ネコ……か、オコジョかなにかだろうか？
1466 = "Mèo……hay là chồn hương gì đây nhỉ?"
# monologue
# JP: 動物を模したスポンジに、ボディーソープを染み込ませ、\n濡らして揉んで、泡立てていく。
1309 = "Tôi cho sữa tắm vào miếng bọt biển hình con vật, thấm nước, vò nhẹ tạo bọt."
# 【双鉄H】
# display as 雙鐵
# JP: 「体をほぐした方がよかろう。\n僕に、洗わせてもらえるか？」
1021 = "「Nên thả lỏng cơ thể trước đã. Cho phép anh tắm cho em nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、はい。もちろん、大歓迎です」
967 = "「V-vâng. Tất nhiên rồi, em rất hoan nghênh.」"
# monologue
# JP: もじっと、ポーレットの体がゆれる。
1381 = "Cơ thể Paulette khẽ đung đưa."
# monologue
# JP: おまんことアナルも可愛く震え、\n僕の勃起も、それだけで刺激を受けてビクついてしまう。
1183 = "Cô bé và lỗ hậu cũng rung lên thật dễ thương, chỉ vậy thôi cũng đủ kích thích khiến dương vật của tôi giật nảy."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんの、好きなように――\nわたしの、体……洗ってもらえたら嬉しいです」
975 = "「Anh Soutetsu cứ làm theo ý thích—— Được anh tắm cho……em vui lắm.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
# 959 = "「嗯」" 
# monologue
# JP: （こしゅんっ）
1568 = "（Cọ xát）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃんっ！」
883 = "「Hyan!」"
# monologue
# JP: まずは、普通に腰から背中を――
1481 = "Trước tiên, cứ bình thường từ eo lên lưng——"
# monologue
# JP: スポンジで擦っただけなのだけれど、\nポーレットはもう、発情しきった声を出す。
1166 = "Mới chỉ cọ bằng miếng bọt biển thôi, mà Paulette đã phát ra âm thanh như đang động dục."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……んっ――は……自分、で――\n洗うのと……全然――ちが、うっ――」
939 = "「A……ưm——hà……Tự mình——\nTắm……hoàn toàn——khác, biệt——」"
# monologue
# JP: （こしゅっ――むにゅ――）
1562 = "（Cọ xát——nắn bóp——）"
# 【双鉄H】
# display as 雙鐵
# JP: 「んっっ」
# 959 = "「嗯」" 
# monologue
# JP: 尻たぶをゆっくりこすり洗えば、\nまたおまんことアナルが震えて僕を誘う。
1291 = "Từ từ cọ rửa phần mông, cô bé và lỗ hậu lại rung lên mời gọi tôi."
# monologue
# JP: 好きに洗っていいと言われた――\n言葉の価値を、ようやく僕も理解する。
1207 = "Em bảo anh cứ tắm theo ý thích—— Cuối cùng tôi cũng hiểu được giá trị của câu nói ấy."
# monologue
# JP: （むにっ――むにゅうう――）
1610 = "（Nắn bóp——xoa nắn——）"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ――手っ――双鉄くんの、おてて――んうっ――\nぬるぬる――して、てっ――おっきく、て――あんっ」
936 = "「A——tay——tay của anh Soutetsu——ưm—— Trơn trượt——quá——to, quá——a」"
# monologue
# JP: （しにゅっ――もにゅっ――つる――にゅるっ――）
# 1610 = "（擦來擦去）" 
# monologue
# JP: 手にソープをつけ、もみ込みながら泡立てこする。
1280 = "Tôi xoa xà phòng ra tay, vừa nắn bóp vừa tạo bọt cọ xát."
# monologue
# JP: あわあわ滑って、いつものようにつかめないのが、\n焦れったくって、いやらしくって、実にいい。
1464 = "Bọt trơn tuột khiến tôi không thể nắm chặt như mọi khi, thật sốt ruột, thật dâm đãng, cảm giác thực sự rất tuyệt."
# monologue
# JP: （もみゅっ――みゅるっ――こしゅっ――しゅむっ――）
1605 = "（Nắn nắn——trơn tuột——cọ xát——xoa bóp——）"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――双鉄、くん――ふっ――んっ――あのっ――\n上半、身……んっ――おっぱい、とか、も――」
937 = "「A——anh Soutetsu——phù——ưm——chuyện đó—— Nửa thân, trên……ưm——ngực, nữa——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 959 = "「嗯」" 
# monologue
# JP: 上半身まで洗うなら、\n両手だけではいかにも効率が悪すぎる。
1222 = "Nếu phải tắm cả nửa thân trên, chỉ dùng hai tay thì e là kém hiệu quả quá."
# monologue
# JP: 僕の体の全部にソープをかけて泡だて、\n全身まるごとをスポンジにして――
1294 = "Tôi xoa xà phòng tạo bọt khắp cơ thể mình, biến toàn thân thành một miếng bọt biển——"
# monologue
# JP: （にゅるんっ！）
# 1568 = "（咕啾）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃううっ！？　んっ――あっ――\nこれっ――んっ――すごく――きもちいいっ！」
887 = "「Hyaau!? Ưm——a——\nThế này——ưm——sướng——quá!」"
# monologue
# JP: （ぬろおおおおおおおっ――）
1618 = "（Trơn tuộtttttt——）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――くっ――」
951 = "「Ư——hự——」"
# monologue
# JP: 僕の全身すべてを泡立て、\nポーレットの全身すべてに滑らせる。
1323 = "Bọt phủ kín toàn thân tôi, trượt dọc trên khắp cơ thể Paulette."
# monologue
# JP: 大きくゆっくり動いていけば、\n抑えようとしても勝手に、喉から妙な声が出る。
1318 = "Khi tôi di chuyển thật chậm và rộng, dù cố kìm nén, những âm thanh kỳ lạ vẫn tự động bật ra khỏi cổ họng."
# 【双鉄H】
# display as 雙鐵
# JP: （これ……は――気持ち良すぎる――\n頭まで――全部っ――泡だって――しまう、ほど――っ）
1632 = "（Cái này……thì——sướng quá—— Đến mức——đầu óc——cũng nổi bọt——mất thôi——）"
# monologue
# JP: 頭の先から足の先まで、\n性感帯というよりむしろ、性器そのものに変わったようだ。
1287 = "Từ đầu đến chân, không chỉ là vùng nhạy cảm, mà dường như đã biến thành cơ quan sinh dục mất rồi."
# monologue
# JP: ポーレットという極上肉に、\n全身性器が滑ることにより包まれていく。
1276 = "Khối thịt tuyệt hảo mang tên Paulette, được bao bọc bởi sự trượt đi của toàn bộ cơ quan sinh dục trên cơ thể tôi."
# monologue
# JP: （ぬるううっ――ぬりゅ――ぬるっ――ぬるんっ）
# 1618 = "（滑來滑去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あっ――んっ――んふっ」
895 = "「Hà——a——ưm——ưm」"
# monologue
# JP: （もみゅっ！　――つるんっ！）
1607 = "（Nắn bóp! ——Trơn tuột!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んあっ！　ひゃっ――おっぱい――にゅる、って――」
965 = "「Ưm a! Hya——ngực——trơn tuột, mất——」"
# monologue
# JP: （もミュッ――にゅるっ――みゅにゅ――ちゅるっ）
1594 = "（Nắn bóp——trơn tuột——xoa nắn——chụt）"
# monologue
# JP: 掴めばこぼれるあの柔肉を、けれども今は掴みきれない。\n滑ってしまって、乳首さえもが僕の指先から逃れてしまう。
1399 = "Khối thịt mềm mại hễ nắm lấy là tràn ra, nhưng giờ tôi không thể nắm trọn được. Trơn quá, đến cả núm vú cũng trượt khỏi đầu ngón tay tôi."
# monologue
# JP: 焦れったいのが気持ちいい。\nお互いを焦らしあうことで、僕らは繋がる準備をしてる。
1467 = "Cảm giác sốt ruột lại mang đến sự dễ chịu. Bằng cách trêu chọc lẫn nhau, chúng tôi đang chuẩn bị cho sự kết nối."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……あっ――ねっ――双鉄、くん」
957 = "「Ưm……a——này——anh Soutetsu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 959 = "「嗯」" 
# monologue
# JP: このままだったら、射精する。\nポーレットとて、幾度も達してしまうだろう。
1463 = "Cứ thế này thì, tôi sẽ xuất tinh mất. Cả Paulette chắc cũng sẽ lên đỉnh không biết bao nhiêu lần."
# monologue
# JP: 風呂場でそれは、消耗が激しすぎる気がして、\n名残惜しさを噛み殺し、スポンジ稼業に別れを告げる。
1198 = "Làm chuyện đó trong phòng tắm có vẻ quá hao tổn sức lực, tôi đành nén sự tiếc nuối, nói lời tạm biệt với trò chơi bọt biển."
# 【双鉄H】
# display as 雙鐵
# JP: （むっ）
1572 = "（Ưm）"
# monologue
# JP: ポーレットが、いい具合に泡にまみれてる。
1372 = "Paulette đang ngập ngụa trong bọt xà phòng một cách hoàn hảo."
# monologue
# JP: 染みさせそうで触れなかったおまんこもアナルも、\n泡に隠れてしまってる。
1385 = "Cả cô bé lẫn lỗ hậu mà tôi cố tình không chạm vào để tránh bị xót, giờ cũng đã bị bọt che khuất."
# monologue
# JP: （ちゃぱ……ぁ――）
1573 = "（Tí tách……a——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ん」
# 959 = "「嗯」" 
# monologue
# JP: だから湯おけのお湯をかけ、\n要所要所の泡だけ優先して落としてく。
1332 = "Thế nên tôi dội nước ấm từ chậu tắm, ưu tiên rửa sạch bọt ở những điểm quan trọng."
# monologue
# JP: アナル、おまんこ、両乳首――\nそこだけ強調してみれば、思いがけぬほどいやらしい。
1440 = "Lỗ hậu, cô bé, hai núm vú—— Chỉ cần nhấn mạnh những điểm đó thôi cũng đủ thấy dâm đãng đến không ngờ."
# monologue
# JP: （ちゅむっ――）
1576 = "（Chụt——）"
# 【ポーレット】
# display as 波萊特
# JP: 「んひゅっ――やっ――えっ！？　キスっ――んっ――\n双鉄、くんが――わたしの――ふあっ――アナル、にっ」
963 = "「Ưm——á——hả!? Hôn——ưm—— Anh Soutetsu——đang——phù——vào lỗ hậu, của em」"
# monologue
# JP: （ちゅむっ――ちゅっ――ちゅろっ――ちゅううっ）
1579 = "（Chu——chụt——chụt——chụtttt）"
# 【ポーレット】
# display as 波萊特
# JP: 「んひぃぃぃ――すっちゃ。、やっ――んっ――\nわたしの、アナルっ――吸ったら、ダメ、なのぉ」
960 = "「Ưm ááá——mút. Không——ưm—— Lỗ hậu, của em——đừng, mút, mà」"
# monologue
# JP: （にゅろおおおっ）
1624 = "（Liếmmmmm）"
# 【ポーレット】
# display as 波萊特
# JP: 「いひゅっ！？　んっ――あっ――入って――\nうっ――べろ――ベロっ――べろぉっ」
889 = "「Í!? Ưm——a——vào rồi——\nƯ——lưỡi——lưỡi——lưỡi」"
# monologue
# JP: ポーレットのお尻がぶるぶる震える。\n肛門がぎゅっと締められる。
1377 = "Mông Paulette run bần bật.\nHậu môn thắt chặt lại."
# monologue
# JP: が、以前に指を挿れたときのほどの強烈さは無い。\n愛撫でおそらく、アナルそのものもほぐされている。
1141 = "Nhưng không dữ dội như lần đút ngón tay vào trước đó. Có lẽ màn âu yếm cũng đã làm cho lỗ hậu giãn ra phần nào."
# monologue
# JP: （れろっ――れるっ――ちゅむっ――べろおおっ）
# 1624 = "（舔來舔去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひ――あっ――おひりっ――んっ――わたしの――\nおしり――ぺろぺろって――そうてつ、くん、がぁっ」
876 = "「Hí——a——mông——ưm——của em—— Mông——đang bị liếm——anh Soutetsu, a」"
# monologue
# JP: ……いいや、あるいは。ポーレットはアナルセックスの\n準備を十分、整えていてくれたのかもしれない。
687 = "……Không, hay là. Có lẽ Paulette đã chuẩn bị tâm lý cho việc quan hệ lỗ hậu đầy đủ rồi cũng nên."
# monologue
# JP: アナルの中には、恐れていたようなエグさなど無く――\n肌……柔肉を、なめているのと変わらぬ味しか感じない。
1433 = "Bên trong lỗ hậu không hề có mùi vị kinh khủng như tôi sợ—— Chỉ cảm thấy mùi vị hệt như đang liếm da thịt mềm mại mà thôi."
# 【双鉄H】
# display as 雙鐵
# JP: （っと――そうだった）
1583 = "（À——phải rồi）"
# 【ポーレット】
# display as 波萊特
# JP: 「んきゅっ！！」
884 = "「Nkyu!!」"
# monologue
# JP: 舌を勢い良く抜けば、\nちぽんっ！　と小気味良い音が立つ。
1301 = "Khi tôi mạnh mẽ rút lưỡi ra, phát ra một tiếng 'Bóp!' thật vui tai."
# monologue
# JP: それが恥ずかしかったのか、ポーレットは赤くなり、\n顔を、おしりをふるふると振る。
1462 = "Có lẽ vì xấu hổ, Paulette đỏ mặt, lắc đầu, lắc mông nguây nguẩy."
# 【双鉄H】
# display as 雙鐵
# JP: 「これを――使うのだったな」
991 = "「Cái này——dùng để làm gì nhỉ.」"
# monologue
# JP: （ぬろおおっ）
1620 = "（Trơn tuộtttt）"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――」
940 = "「A——」"
# monologue
# JP: 白色の、潤みを帯びたフェイスクリーム。
1410 = "Kem dưỡng da mặt màu trắng, ẩm ướt."
# monologue
# JP: シチュエーションのせいだろう。\nそれは精液を連想させて――
1197 = "Chắc là do hoàn cảnh. Nó khiến tôi liên tưởng đến tinh dịch——"
# monologue
# JP: （ぬぽおおおっ）
1593 = "（Bôi trơn）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃふっ――んっ――あっ――あひっ――ぅんっ！」
878 = "「Hyafu——ưm——a——ahi——ưn!」"
# monologue
# JP: ――アナルの奥に塗りこむ度に、\n僕でポーレットを染めてるような気になれる。
1303 = "——Mỗi lần thoa vào sâu trong lỗ hậu, tôi lại có cảm giác như đang nhuộm Paulette bằng chính mình."
# monologue
# JP: 征服感と独占欲とが膨れ上がって、\n全部を僕で、満たし尽くしてしまいたくなる。
1259 = "Cảm giác chinh phục và khao khát chiếm hữu phình to, khiến tôi muốn lấp đầy tất cả bằng chính bản thân mình."
# monologue
# JP: （ぬりゅっ――ぬりっ――にゅるっ――にゅむっ）
# 1593 = "（塗抹）" 
# 【ポーレット】
# display as 波萊特
# JP: 「かはっ――あっ――んっ――ふあっ――\nおひ、りっ――んっ――アナルっ――がっ――」
904 = "「Hà——a——ưm——phù——\nMông——ưm——lỗ hậu——đang——」"
# monologue
# JP: （きゅっ――きゅきゅんっ！）
1612 = "（Siết——siếtttt!）"
# monologue
# JP: 締まる、けれども噛まれはしない。
1437 = "Thắt lại, nhưng không cắn chặt."
# monologue
# JP: 強烈な拒絶の動きではなく、快感をより求めるような、\nいっそ甘えた動きに思える。
1461 = "Không phải là sự cự tuyệt mãnh liệt, mà giống như đang khao khát khoái cảm hơn, như một hành động nũng nịu."
# 【双鉄H】
# display as 雙鐵
# JP: （これなら――いける、か？）
1635 = "（Thế này thì——vào được chưa nhỉ?）"
# monologue
# JP: 予告をすれば、ポーレットは身構えてしまうだろう。\nならば、僕のとるべき手段はたったひとつだ。
1277 = "Nếu báo trước, Paulette sẽ cảnh giác mất. Nếu vậy, cách duy nhất tôi nên làm là."
# monologue
# JP: （にゅるっ）
# 1593 = "（塗抹）" 
# monologue
# JP: 指関節で２つ分、たっぷりすくったクリームを――
1302 = "Lấy một lượng kem bằng hai đốt ngón tay——"
# monologue
# JP: （くりゅっ――くにっ――にゅりゅっ――ぬりゅんっ）
1608 = "（Ngoáy——nắn——trơn tuột——trơn tuột）"
# 【ポーレット】
# display as 波萊特
# JP: 「やっ――ンッ――ゆるん――じゃう、っ――\nわたし――おしりっ――ゆるめ、られ、てっ――ふあっ」
879 = "「Á——ưm——lỏng——ra mất, rồi—— Em——mông——bị làm cho lỏng, ra——phù」"
# monologue
# JP: 左手は休まずアナルの中をほじくりながら、\n右手で、勃起になすりつけていく。
1285 = "Tay trái không ngừng ngoáy bên trong lỗ hậu, còn tay phải thì xoa kem lên dương vật cương cứng."
# monologue
# JP: ……確かに、これは、しっとりぷるぷる気持ちいい。\nこの状態で挿入したら――思うと同時に動いてる！
699 = "……Quả thật, cái này ẩm ướt trơn tuột rất sướng. Nếu đút vào trong tình trạng này thì——Vừa nghĩ vậy tôi đã hành động luôn!"
# monologue
# JP: （ぬぶうううううううっ！！！）
1609 = "（Phập!!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んひゅ――かっ――んうううううううっ！！？」
961 = "「Ưm hya——á——ưm ư ư ư ư ư ư!!?」"
# monologue
# JP: 指と入れ替え、アナルに勃起を押し込んだなら、\nクリームのせいか、思ったよりもつるんと進み――
1296 = "Rút ngón tay ra, đẩy dương vật vào lỗ hậu, có lẽ nhờ lớp kem mà nó tiến vào trơn tru hơn tôi tưởng——"
# monologue
# JP: （みちちちちっ！）
1596 = "（Siếtttttt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――っ――」
892 = "「Ư——hự——」"
# monologue
# JP: けれどもすぐに、入り口の部分を締め付けられる。\n指のときより、舌のときより、反応は強くなっている。
1145 = "Nhưng ngay lập tức, phần cửa miệng bị siết chặt lại. Phản ứng mạnh hơn cả lúc dùng ngón tay hay dùng lưỡi."
# monologue
# JP: （ぬぶっ！）
1604 = "（Rút ra!）"
# monologue
# JP: 構わず腰を強く引く。
1263 = "Mặc kệ, tôi kéo hông lại thật mạnh."
# 【ポーレット】
# display as 波萊特
# JP: 「きゃふあっ！？」
882 = "「Kyafua!?」"
# monologue
# JP: ポーレットが声を吐き出せば、\nそれでわずかな余裕が生まれる。
1371 = "Khi Paulette thốt lên, điều đó tạo ra một chút không gian nới lỏng."
# monologue
# JP: （ずぶっ！　ぬっ！　ぬじゅっ！　ずぶゅ！！！）
1575 = "（Phập! Rút! Nhóp nhép! Phập!!!）"
# monologue
# JP: 動く。動ける。気持ちいい。\n思うがままに肛内を掘る。
1273 = "Chuyển động. Cử động được rồi. Thật dễ chịu. Tôi tha hồ đào sâu vào bên trong hậu môn."
# monologue
# JP: （ぬちっ！　ぐっ！　ぐりゅっ！　ぐりゅうっ！）
# 1575 = "（啾噗！啾噗！啾嚕！啾嚕！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「んきゅっ――あっ――ふあっ――んうっ――\nあなる――おしりっ――なかっ――ぐりって――んっ」
952 = "「Nkyu——a——phù——ưm—— Lỗ hậu——mông——bên trong——bị ngoáy——ưm」"
# monologue
# JP: （ずぶっ！　ぐりゅりゅっ！　ぬっ！　ぬろっ！）
# 1575 = "（啾噗！啾噗！啾嚕！啾嚕！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「あっ――あつっ――いっ――んっ――ふあっ――\nふと、い――のにっ――ぬるって――ちゅるっ、って」
934 = "「A——nóng——quá——ưm——phù——\nTo, thế——mà——lại trơn——tuột」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
# 922 = "「唔」" 
# monologue
# JP: 確かに“ぬる”で、たしかに“ちゅる”だ。\nアナル深くへ進んでも、肉ヒダの気配を感じない。
1334 = "Quả thật là 'trơn' và 'tuột'. Dù tiến sâu vào lỗ hậu cũng không cảm nhận được nếp gấp thịt nào."
# monologue
# JP: その上クリームがとろとろすぎて――
1170 = "Hơn nữa lớp kem lại quá sền sệt——"
# monologue
# JP: （ちゅる！　ずっ！　ちゅぶっ！　ぬりゅっ！！）
# 1575 = "（啾噗！啾噗！啾嚕！啾嚕！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――ふかいっ――よおっ――んっ――おなかっ――\nおちん、ちん――きちゃうっ――きちゃうううっ」
897 = "「Hà——sâu quá——anh ơi——ưm——bụng—— Dương, vật——chạm vào——chạm vào mất」"
# monologue
# JP: ――締められてるのに、滑ってる。\n届くところが無くてどこまでも行けそうで。
1442 = "——Rõ ràng là đang bị siết chặt, vậy mà lại trơn tuột. Cảm giác như không có điểm dừng, có thể đi sâu đến vô tận."
# monologue
# JP: （じゅっ！　ちゅぶっ！　ちゅるっ！　きゅるん！）
# 1575 = "（啾噗！啾噗！啾嚕！啾嚕！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ァッ――やっ――おしり――でっ――んっ――\n双鉄、くんっ――わた、しっ――アナル――でっ！」
926 = "「Á——á——bằng mông——ưm—— Anh Soutetsu——em——bằng lỗ hậu——!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 959 = "「嗯」" 
# monologue
# JP: イッていいよと言わずに告げれば、\nきゅっと、肛門が強くすぼまる。
1317 = "Không nói ra nhưng tôi báo hiệu cho em ấy có thể ra, lỗ hậu môn lập tức co rút mạnh mẽ."
# monologue
# JP: 拒絶ではなく、逃さぬ強さで。
1204 = "Không phải là cự tuyệt, mà là siết chặt để không cho trốn thoát."
# monologue
# JP: （ずっ！　ずぼっ！　にゅりゅ！　にゅぶうっ！！）
# 1575 = "（啾噗！啾噗！啾嚕！啾嚕！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「いっ――くっ――んあっ――あっ――あっ――\nふあっ――――ああああああああああああっ！！！」
1008 = "「Ra——mất——a——a——a——\nPhù————A a a a a a a a a a a!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！」
894 = "「Hự!」"
# monologue
# JP: （びゅうっ！　びゅるっ！　どびゅっ！　びゅぶっ！）
# 1575 = "（啾噗！啾噗！啾嚕！啾嚕！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――ぅあっ！？」
893 = "「Ư——á!?」"
# monologue
# JP: （びゅっ！　びゅるっ！　びゅうっ！　びゅっ！）
1588 = "（Phụt! Phụt! Phụtttt! Phụt!）"
# monologue
# JP: 絶頂と同時の締めがあまりに強くて、\n腰を引いたらはずみで全部が抜けてしまう。
1219 = "Cú siết chặt cùng lúc lên đỉnh quá mạnh, khi tôi vừa kéo hông lại thì theo đà tuột ra hết."
# 【ポーレット】
# display as 波萊特
# JP: 「あっ――あっ――シャワーっ――んっ――\n双鉄、くんの――精液――シャワ、あっ――」
928 = "「A——a——mưa rào——ưm—— Của anh Soutetsu——tinh dịch——như mưa rào, a——」"
# monologue
# JP: （びゅううっ！　びゅろっ！）
1590 = "（Phụtttt! Phụt!）"
# monologue
# JP: 僕から飛び出た白濁が、\nポーレットにこびりつき、穢してく。
1282 = "Chất dịch trắng đục bắn ra từ tôi dính chặt lên người Paulette, làm vấy bẩn cô ấy."
# monologue
# JP: 肛門からもとろりと精液が溢れだし、\nおまんこを、目指してるかのように滴っていく。
1436 = "Tinh dịch đặc sệt cũng trào ra từ hậu môn, nhỏ giọt xuống như thể đang nhắm thẳng vào cô bé."
# 【ポーレット】
# display as 波萊特
# JP: 「シャワー……んっ……すご、いっ――\nあつ、いっ――よぉっ――」
851 = "「Mưa rào……ưm……tuyệt, quá——\nNóng, quá——anh ơi——」"
# 【双鉄H】
# display as 雙鐵
# JP: （いかん）
1633 = "（Không ổn rồi）"
# monologue
# JP: 髪にまで、精液が飛んでしまった。\n征服感より達成感より、罪悪感が来てしまう。
1468 = "Tinh dịch bắn cả lên tóc cô ấy mất rồi. Cảm giác tội lỗi lấn át cả cảm giác chinh phục lẫn cảm giác thành tựu."
# monologue
# JP: （シャワアアアアアアっ）
1584 = "（Rào rào rào rào）"
# 【ポーレット】
# display as 波萊特
