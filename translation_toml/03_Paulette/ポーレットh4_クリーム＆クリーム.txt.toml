1299 = "Bị thu hút, tôi xịt vòi hoa sen vào núm vú, vào lỗ hậu, hơi thở của Paulette càng lúc càng gấp gáp và dâm đãng hơn."
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――ねっ――そう、てつっ――そうてつ、くんっ！\nあらって――ここっ――ここもっ――シャワー……でっ」
899 = "「Hà——này——Soutetsu——anh Soutetsu! Rửa đi——chỗ này——cả chỗ này nữa——bằng vòi sen……đi anh」"
# monologue
# JP: （くぱああああっ！）
1600 = "（Tách ra!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
941 = "「っ!」"
# monologue
# JP: ポーレットの指がおまんこを大きく開いてみせる。\n瞬間、頭に血がのぼる。
1376 = "Ngón tay Paulette vạch rộng cô bé ra cho tôi thấy. Ngay lập tức, máu nóng dồn lên não tôi."
