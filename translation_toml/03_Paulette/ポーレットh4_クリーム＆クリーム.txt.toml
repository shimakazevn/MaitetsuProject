# monologue
# JP: 僕が立って支える間は、\nポーレットは安心しきって崩れられる。
1192 = "在我的支撐之下，波萊特安心地昏倒了。" 

# monologue
# JP: 僕が崩れてしまうときには、\n必ず、ポーレットが支えてくれる。
1423 = "而我相信在我要昏倒的時候，波萊特也一定會支持著我。" 

# 【双鉄H】
# display as 雙鐵
# JP: （そうして、僕らは――\nきっと親になり、家族になるのだ）
1622 = "（然後我們——一定會為人父母，一定會組成家庭）" 

# monologue
# JP: ……腕の中、愛しいひとは、\nもうすやすやと寝息をたててる。
691 = "……我懷抱中的最愛之人已經進入了夢鄉。" 

# monologue
# JP: 可愛らしくて、たまらなくって。\nだからこっそり、起こさないよう――
1211 = "她是那麼可愛，那麼誘人。所以我就悄悄地，不要把她驚醒——" 

# monologue
# JP: （ちゅっ）
1581 = "（啾）" 

# monologue
# JP: ――もう一度だけ、キスをする。
678 = "——我又一次吻上了她。" 
