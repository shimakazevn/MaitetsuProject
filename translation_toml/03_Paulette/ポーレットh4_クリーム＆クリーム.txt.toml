963 = "「嗯唔——呀——哎！？親上了——嗯——雙鐵君——你親上了——呼啊——我的屁眼——」" 

# monologue
# JP: （ちゅむっ――ちゅっ――ちゅろっ――ちゅううっ）
1579 = "（啾嚕——啾噗——啾嚕——啾噗）" 

# 【ポーレット】
# display as 波萊特
