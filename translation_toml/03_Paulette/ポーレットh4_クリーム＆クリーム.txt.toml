1194 = "Cú siết chặt và cơn run rẩy ngọt ngào mà mãnh liệt ngay khi vừa đút vào, khiến dương vật vốn đã nhạy cảm không thể chịu đựng nổi mà xuất tinh. Nhưng——"
# monologue
