# display as 波萊特
# JP: 「ちゅっ――ちゅむっ――ちゅっ――ん――ぷあっ――\nだからっ――くださいッ――わたし――わたしにっ――」
945 = "「Chụt——chu——chụt——ưm——phù—— Nên là——hãy cho em——em——cho em——」"
# monologue
# JP: （ぐりっ！）
1602 = "（Ngoáy!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 941 = "「啊！」" 
# monologue
# JP: 僕に全身を抱えられ、ほとんど自由に動かぬ体で、\nそれでもポーレットは腰を動かす。
1380 = "Toàn thân bị tôi ôm trọn, cơ thể gần như không thể cử động tự do, nhưng Paulette vẫn ráng di chuyển hông."
# monologue
# JP: おなかを無様にひくひくさせて、\n一生懸命、僕の快感を引きずり出そうとしてくれる。
1216 = "Bụng cô ấy co giật một cách khó coi, nhưng cô ấy vẫn cố gắng hết sức để khơi gợi khoái cảm trong tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「精、液っ――あかちゃんっ――んっ――\n双鉄――くんの――あかちゃんっ――くださいぃっ！」
1003 = "「Tinh, dịch——em bé——ưm—— Của anh——Soutetsu——em bé——xin hãy cho em!」"
# monologue
# JP: （ぐりゅううううっ！！）
1638 = "（Ngoáyyyyyyy!!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああっ！」
# 941 = "「啊！」" 
# monologue
# JP: （びゅっ！　びゅるうっ！　びゅぶっ！　びゅううっ！）
# 1592 = "（噗嚕！噗嚕！噗噗！噗噗！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「～～～～～～～～～っ！！」
1030 = "「～～～～～～～～～!!」"
# monologue
# JP: どくどくと、びゅうびゅうと。\n僕の精液全部が流れ、からっぽになる。
1189 = "Ùn ùn, xối xả. Toàn bộ tinh dịch của tôi tuôn ra, cạn kiệt."
# monologue
# JP: そしてからっぽになることで、\n僕は、限りなく満たされる。
1143 = "Và nhờ sự trống rỗng đó, tôi lại cảm thấy mãn nguyện vô bờ bến."
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット」
# 999 = "「波萊特」" 
# 【ポーレット】
# display as 波萊特
# JP: 「は、い――双鉄、くん」
956 = "「Vâng——anh Soutetsu.」"
# monologue
# JP: 繋がったままで、再びのキス。
1270 = "Vẫn duy trì sự kết nối, chúng tôi lại trao nhau nụ hôn."
# monologue
# JP: はじめて唇を重ねあってから、\n数えきれないほどにした、キス。
1430 = "Kể từ lần đầu tiên chạm môi, chúng tôi đã hôn nhau không biết bao nhiêu lần."
# 【双鉄H】
# display as 雙鐵
# JP: （だが……このキスも、ファーストキスだ）
1564 = "（Nhưng……nụ hôn này, cũng là nụ hôn đầu tiên.）"
# monologue
# JP: ポーレットも同じ気持ちと、伝わってくる。
1321 = "Tôi cảm nhận được Paulette cũng có chung suy nghĩ ấy."
# monologue
# JP: それは限りない優しさで。\n惜しむことのない愛情だ。
1460 = "Đó là sự dịu dàng vô bờ bến. Là tình yêu thương không chút tiếc nuối."
# 【双鉄H】
# display as 雙鐵
# JP: （これは――新たな、誓いのキスだ）
1634 = "（Đây là——nụ hôn thề ước mới.）"
# monologue
# JP: 父になることを。\n母になることを。
1407 = "Sẽ trở thành cha.\nSẽ trở thành mẹ."
# monologue
# JP: 僕らはセックスで確信し。\nそして、くちづけで誓いあう。
1271 = "Chúng tôi xác nhận điều đó qua tình dục. Và rồi, thề ước với nhau qua nụ hôn."
# 【ポーレット】
# display as 波萊特
# JP: 「は……あっ――ふにゃあっ――」
901 = "「Hà……a——funya——」"
# monologue
# JP: （くてっ）
1615 = "（Lả đi）"
# 【双鉄H】
# display as 雙鐵
# JP: 「おいっ――ポーレット、ポーレット！？」
949 = "「Này——Paulette, Paulette!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ふひゃっ――そうへふ、ふん――\nわらひ、ひあわへれ……のほへちゃいまひはぁ」
914 = "「Fuhya——anh Houhehu—— Em, hạnh phúh quá……nên hỉu mấh rồi」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 959 = "「嗯」" 
# monologue
# JP: 幸せで、のぼせてしまう。\n僕も、ほとんどそうなりかけてる。
1247 = "Hạnh phúc đến lú lẫn cả đầu óc. Tôi cũng suýt nữa thì bị như vậy."
# monologue
# JP: が――
1137 = "Nhưng——"
# monologue
# JP: （ぐっ！）
# 1603 = "（抱起）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃあぁ」
880 = "「Hyaaa」"
# monologue
# JP: ぐったりとした、それでも歓声。
1373 = "Dù đã rã rời, cô ấy vẫn thốt lên tiếng kêu sung sướng."
# 【双鉄H】
# display as 雙鐵
# JP: 「脱衣所で少し休んでろ。\n眠ってしまってもかまわんぞ」
863 = "「Em ra phòng thay đồ nghỉ ngơi một chút đi. Ngủ thiếp đi cũng không sao đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃい……ほーへふふん……ふにゃあ」
970 = "「Vâng ạ……anh Houhehu……funya」"
# monologue
# JP: 僕が立って支える間は、\nポーレットは安心しきって崩れられる。
1192 = "Chừng nào tôi còn đứng vững để nâng đỡ, Paulette có thể hoàn toàn yên tâm mà lả đi."
# monologue
# JP: 僕が崩れてしまうときには、\n必ず、ポーレットが支えてくれる。
1423 = "Và khi tôi gục ngã, chắc chắn Paulette sẽ là người nâng đỡ tôi."
# 【双鉄H】
# display as 雙鐵
# JP: （そうして、僕らは――\nきっと親になり、家族になるのだ）
1622 = "（Cứ như thế, chúng tôi—— chắc chắn sẽ trở thành cha mẹ, sẽ trở thành một gia đình.）"
# monologue
# JP: ……腕の中、愛しいひとは、\nもうすやすやと寝息をたててる。
691 = "……Trong vòng tay tôi, người tôi yêu đã chìm vào giấc ngủ say sưa."
# monologue
# JP: 可愛らしくて、たまらなくって。\nだからこっそり、起こさないよう――
1211 = "Thật đáng yêu, thật không thể kìm lòng được. Nên tôi lén lút, cẩn thận để không đánh thức cô ấy——"
# monologue
# JP: （ちゅっ）
1581 = "（Chụt）"
# monologue
# JP: ――もう一度だけ、キスをする。
678 = "——Trao thêm một nụ hôn nữa."
