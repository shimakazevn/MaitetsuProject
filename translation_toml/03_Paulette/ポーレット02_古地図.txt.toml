[script]
# lines: 396 
# 【赤井宮司】
# display as 赤井宮司
# JP: 「なるほど……駅弁とはいいところに目を付けましたね」
1637 = "「原來如此……鐵路便當是個不錯的著眼點啊」" 

# monologue
# JP: 赤井宮司の淹れてくださるお茶は、美味い。
2710 = "赤井宮司給我們泡的茶十分好喝。" 

# monologue
# JP: 淹れ方うんぬんもあるのだろうが、\n茶葉そのものの香りが圧倒的だ。
2752 = "雖然可能和泡茶的方法也有關，但茶葉本身的香氣壓倒了一切。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「大廃線が訪れ、鉄道駅というもの自体が激減しても、\n駅弁は、いまだ愛され続けています」
2036 = "「自從大廢線時代後，雖然鐵路和車站的數量銳減，但鐵路便當至今仍然很受人們的喜愛」" 

# monologue
# JP: [ヨコカワ,1]横河のカマ飯、[ニシアカシ,2]西赤司のタコ飯、[オシャマンベ,3]御社万部のカニ飯、\n[ヒタチダイゴ,3]常陸醍醐のシャモ飯、[イズデンシモダ,4]伊津電霜田のキンメダイ飯――
2553 = "橫川的釜飯、西明石的章魚飯、長萬部的螃蟹飯、常陸大子的軍雞飯、伊豆下田的金眼鯛飯——" 

# monologue
# JP: そのどれもが、大廃線で廃止されてしまった駅の、\nしかし、今もって生き残っている“駅弁”だそうだ。
2733 = "這些線路雖然已經停運，但當地的鐵路便當如今卻依然活躍著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「駅が滅びて、駅弁のみが生き残りますか」
1787 = "「就算車站消亡了，鐵路便當也能繼續保留著生命力嗎」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「駅弁には、それほどの力があるのでしょうね」
2147 = "「鐵路便當就是有著這種魔力」" 

# 【ポーレット】
# display as 波萊特
# JP: 「帝都だと、\n駅弁フェアとかたくさんだって聞きますけど」
1843 = "「我聽說在帝都會舉辦很多鐵路便當博覽會是嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……\n確かに、言われてみればそうだったかもしれん」
1706 = "「啊……聽你這麼一說，好像是這樣的」" 

# monologue
# JP: 駅弁をあえて食おうと思ったこともなかったが――
2754 = "雖然我沒有特地關注過各地的鐵路便當——" 

# monologue
# JP: そうした僕の目でさえも、\n百貨店などで時折は、そうしたノボリを捉えていた。
2443 = "就算是這樣，有時路過百貨店也能看到鐵路便當博覽會宣傳的條幅。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「もし仮に、日ノ本一売れる駅弁を作れれば、\nそうしたフェアの全てが御一夜の宣伝になる」
1753 = "「如果你們能發明日本第一暢銷的鐵路便當，那就相當於所有的鐵路便當博覽會都在免費宣傳御一夜了」" 

# monologue
# JP: 褒める調子の穏やかな声。
2433 = "宮司用柔和的語調稱讚道。" 

# monologue
# JP: が、そこまでを考えてなかった僕としては、\n恐縮するものを感じてしまう。
2319 = "不過，我並沒有考慮到這麼長遠的事情，被他這麼誇獎怪不好意思。" 

# 【双鉄】
# display as 雙鐵
# JP: 「生きたＳＬに乗って、日ノ本一の駅弁を食べられる。\n僕は、それが叶えば観光資源になると思っただけでした」
1832 = "「我只是覺得，如果能實現邊乘著還在運轉的蒸汽機車、邊吃著日本第一的鐵路便當的話，這一定能成為一種觀光資源吧」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「確かに、\n観光資源の有力な一つになりそうですね」
2106 = "「這的確有可能成為有力的觀光資源之一呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1895 = "「是的」" 

# monologue
# JP: “有力な一つ”という言葉はしかし、今の僕には、\n“それでは足りぬ”という意味だとしか感じられない。
1291 = "“有力的觀光資源之一”這句話，在我聽來就好像在說“這還不夠”。" 

# monologue
# JP: が、それでもまずは、駅弁だ。\n一歩をしっかり固めねば、次の一歩は迷い足となる。
2320 = "不過，當下首先還是要解決鐵路便當的問題。第一步邁不好，下一步就會產生迷茫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜らしい駅弁を、と考えています。それで、\nキジ馬についてご教示いただきたくお邪魔いたしました」
1826 = "「我們想要製作有御一夜特色的鐵路便當。所以特來請教宮司有關雉子馬的事情」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「おや。その話をどなたから？」
1692 = "「哦？這話是聽誰說的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「永山婦人――\n[えいざんじ,2]榮山寺のご住職の奥様からです」
1827 = "「我們是從永山女士——榮山寺的住持夫人那裡得知的」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ、[うんざん,1]雲山さんの奥さんですか」
1689 = "「哦，雲山先生的夫人啊」" 

# monologue
# JP: 赤井宮司は頷いて、\n茶碗を手に取り、喉を湿らす。
2711 = "赤井宮司點了點頭，端起茶碗潤了潤喉嚨。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「でしたら、納得です。\nこの[やしろ]社と[きじし,2]木地師との縁は、広く知られていませんから」
2128 = "「那就難怪了。畢竟這座神社和木旋工之間的因緣並不為一般人所知」" 

# 【ポーレット】
# display as 波萊特
# JP: 「キジ師？　――って？」
1928 = "「木旋工？　——那是什麼？」" 

# monologue
# JP: さすがのポーレットも、\nそこまで広範に日ノ本の知識は持っていないらしい。
2628 = "看來就連波萊特也不知道這麼小眾的日本文化。" 

# monologue
# JP: 素朴な疑問に、\nしかし赤井宮司は答えず僕へと視線を向ける。
2705 = "赤井宮司沒有回答她單純的疑問，而是看向我。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「双鉄君はご存知ですか？」
2158 = "「雙鐵先生你知道嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「木工の技術を持った流浪の職人――でしたか？\n良質の木材を得るため、定住せず、森から森を渡り歩く」
1947 = "「沒有定居之所的流浪木匠——是這樣嗎？他們從不定居，而是輾轉在各個森林之間尋求上好木材」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「良い答えです。辞書を引けば恐らく、\nそのようなことが書いて有りましょうかね」
1771 = "「完美的回答。猶如教科書一般準確」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
1711 = "「啊！」" 

# monologue
# JP: 小さな挙手。
2589 = "波萊特輕輕舉起手想要提問。" 

# monologue
# JP: 赤井宮司がうながせば、\nポーレットはどこか恥ずかしそうに尋ねる。
2434 = "宮司點頭後，波萊特有些怯生生地提問道：" 

# 【ポーレット】
# display as 波萊特
# JP: 「間違っていたら恥ずかしいんですけど――\nその、キジ師さんが作った馬で、キジ馬なんですか？」
1816 = "「我也不知道對不對——那個，木旋工做出來的馬玩具就是雉子馬嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1685 = "「哦哦！」" 

# monologue
# JP: なるほど。それは盲点だった。
2366 = "原來如此。我完全沒有注意到。" 

# monologue
# JP: 知識がないということはすなわち、\n先入観のなさであるのだと思い知る。
2423 = "完全沒有這方面的知識，也就代表著不會被固定觀念所拘束。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そういう説もあります」
1590 = "「也有這種說法」" 

# monologue
# JP: 赤井宮司は立ち上がり、飾り箪笥からキジ馬に似た、\nいくつもの木のおもちゃ達を持ってくる。
2709 = "赤井宮司站起身，從裝飾華美的五斗櫥中取出幾個很像雉子馬的木質玩具，擺在我們面前。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わぁ……かわいい」
1678 = "「哇……好可愛」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「木地師由来ともいわれる、日ノ本各地の民芸品です。\n昔は、こどもに与えられたおもちゃだったのでしょう」
1988 = "「相傳這些日本各地的民間工藝品，就是木旋工這一職業的起源。這些應該是以前給小孩子玩的玩具吧」" 

# monologue
# JP: くじらぐるま、いぬぐるま、たいぐるま、うずらぐるま。\nどれも、とてもキジ馬に似た印象なのだが――
2766 = "鯨車、狗車、鯛車、鵪鶉車。每一件小東西的外觀都和雉子馬類似——" 

# 【双鉄】
# display as 雙鐵
# JP: 「同じような構造なのに、何故キジ馬だけ、\n車ではなく、馬、と呼ばれるのでしょうか？」
1874 = "「明明樣式都差不多，為什麼只有雉子馬被叫做馬，而其他的都是車呢？」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「それには、いくつかの説があります。\nまず、キジグルマがキジウマと訛った、というもの」
2152 = "「關於這點有好幾種說法。比如，它原本被叫做雉子車，被以訛傳訛傳成了雉子馬」" 

# 【ポーレット】
# display as 波萊特
# JP: 「キジグルマ、キジグルマ、キジグマ、キジウマ――\nまぁ、あるかもと言われればそうかもですが……」
2155 = "「雉子馬、雉子馬車、雉子車——嗯，的確也不是不可能……」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「次に、キジ馬は、単なるウマグルマであるという説。\nそれが雉にも見えた故、キジウマグルマからキジウマに」
2113 = "「還有人認為雉子馬原本就是馬車。只是外表類似雉雞，就被叫做雉子馬車，再簡化為雉子馬」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、それだとやっぱりキジぐるまになるんじゃ……\n他のくるまたちもキジ師さんが作ってるんですよね？」
1580 = "「不過那樣的話，為什麼不叫雉子車呢……其他的車也都是木旋工們做的吧？」" 

# monologue
# JP: イマイチしっくり来ていないのは、\nポーレットも僕と同様らしい。
2585 = "波萊特看來和我一樣都注意到了這個問題。" 

# monologue
# JP: そんな僕らを赤井宮司は満足そうに眺め、頷く。
2706 = "赤井宮司看著我們，似乎很滿意地點點頭。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「もうひとつ、興味深い説もあります。キジ馬は、\n木地師があえて残した足跡であるというものです」
2112 = "「還有一個有趣的假說。說雉子馬是木旋工特地留下的足跡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あえて残した――ということは、木地師達が、\n訪れた場所場所にキジ馬を伝えていったのですか？」
1967 = "「特地留下的——也就是說，木旋工們每到一處，都會將雉子馬留在當地嗎？」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「あくまで、一説。異説です。が――」
2101 = "「這只是其中一種說法。而且還是小眾的說法」" 

# monologue
# JP: 宮司がまた立ち、今度はもっとキジウマに近い、\n木のおもちゃ達を持ってくる。
2431 = "宮司又站起身，這次他拿來了一些更像雉子馬的木製玩具。" 

# monologue
# JP: ほとんどキジウマなものもあれば、\nひどく素朴な――馬そのものに近いものもある。
2351 = "其中有一些很像雉子馬，也有一些外表更加樸實——更像真正的馬。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「九洲の各所にも、こうしたキジ馬が伝わっているのを、\nご存知ですか？」
1615 = "「你們知道九州的其他各地也流傳下來了這樣的雉子馬嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いえ、僕は知りません」
2102 = "「這我就不知道了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「[ふくおか,1]福丘にもあるっていうことは、聞いたことあります」
1829 = "「我倒是聽說過福岡有」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「よくご存知ですね。他には、[おおいた,1]大板。\n[かごしま,2]夏午島、[さが,1]左賀などにも見られます」
1621 = "「你知道得真清楚。在大分、鹿兒島和佐賀等地也可以看見它們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。九洲の半分以上ではないですか」
1735 = "「噢。幾乎占了九州一半以上的地區啊」" 

# monologue
# JP: お話としては面白い。\nが――
2737 = "這的確是個有趣的話題，不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、\n御一夜の特産としては売りが弱くなりますか」
1582 = "「不過，這也就意味著很難將其作為御一夜特產來推廣啊」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「いえいえ、御一夜ほどに古いキジ馬が\n数多く残っている土地はありません」
2100 = "「這倒不是，因為只有御一夜保留了這麼多的古老雉子馬」" 

# monologue
# JP: 赤井宮司は、わずかにだけれど身を乗り出す。
2707 = "赤井宮司稍微朝我們這邊探出身。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「木地師は、森林[しょくのうしゃ,2]職能者であると同時に、\n山岳信仰における、宗教職能者でもありました」
1926 = "「木旋工除了身為利用森林的木工團體之外，同時也是山岳信仰的宗教團體」" 

# 【ポーレット】
# display as 波萊特
# JP: 「山岳信仰？」
1792 = "「山岳信仰？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「山そのものや、山に連なる自然を神格とする信仰だ」
1784 = "「就是信仰山岳本身，或是將大山及其自然環境視作神明來崇拜的信仰」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……神道、ヤオヨロズ？」
1701 = "「啊……也就是神道裡所謂的八百萬眾神？」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「広義にとれば、確かに。が、山岳信仰の信仰対象は\n山と、それに連なる自然たちに特化しています」
1798 = "「廣義來說是這樣。不過確切來說，山岳信仰的信仰對象主要是大山和它的自然環境」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……と」
1723 = "「嗯……那個」" 

# monologue
# JP: ポーレットはやや混乱している。\nひとつひとつ、順を追うほうが良いだろう。
2580 = "波萊特似乎有點被宮司的話繞暈了。還是幫她理清頭緒比較好吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「山岳信仰の宗教者であれば、山伏が良く知られている。\n映像を見たことはないか？　法螺貝を持って、白装束で」
2056 = "「說到信仰山岳的宗教人士，山伏比較有名。你在電視裡看過嗎？　就是那種穿著白衣拿著法螺的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、ヤマブシはわかります。\n――あの人たちが、山岳信仰の人？」
1721 = "「啊，這個我知道的。——山伏就是信仰山岳的人嗎？」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そうですね。山伏は山中の[しゅげん,1]修験――修行をもって、\n山と一体化し、悟りを得ることを目的とする信仰者です」
1880 = "「是啊。山伏就是指通過在山中進行修驗——也就是修行，期望能和大山合為一體來悟道的信徒」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
1728 = "「嗯」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「片や木地師は、山や森といった自然を降ろす[よりしろ,1]依代――\n即ち“面”を作ることにより信仰を示しました」
2029 = "「而木旋工則是透過製作可以讓山和森林這些自然靈力附身的道具——也就是“面具”，來表達自己的信仰」" 

# 【双鉄】
# display as 雙鐵
# JP: 「面、ですか？\nそれは――仏師が仏像を作るようなものでしょうか？」
2167 = "「面具？就像——造佛師們製作佛像一樣嗎？」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そうですね。そうして作られた面は、祈祷の対象として、\nあるいは舞に、あるいは呪術に用いられたそうです」
1892 = "「是的。木旋工製作的面具會被奉為祈禱對象，有時會用於舞蹈，有時會用於咒術」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。――っ！？」
1638 = "「原來如此。——啊！」" 

# monologue
# JP: 不意に繋がる。
2497 = "我突然想到一個從前就有的疑問。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひょっとして、赤井阿蘇神社の特徴である、\n[きめんづく,2]鬼面造りというのは――」
2162 = "「難道說赤井阿蘇神社的特徵之一——鬼面造就是——」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ご存知でしたか、そのとおりです」
1623 = "「你知道這個啊，正是如此」" 

# monologue
# JP: 満足そうな、深い頷き。
2432 = "宮司很滿意地重重點頭。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「あの[きめん,1]鬼面は、木地師によって奉納されたものだそうです。\nこの[やしろ]社は、木地師達の社だったのかもしれません」
2123 = "「那個鬼面就是木旋工的供品。這座神社說不定曾經就是木旋工們的神社」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、御一夜という土地にも、\n多くの古いキジ馬が残されているのですか？」
1935 = "「正因如此，御一夜這片土地才會保留著很多古老的雉子馬嗎？」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「かもしれませんね」
1593 = "「也許吧」" 

# monologue
# JP: これは……いや、実に面白い。\n駅弁のモチーフのひとつは、是非キジ馬にするべきだ。
2393 = "嗯……這可真是有趣。鐵路便當的主題之一一定要選上雉子馬才行。" 

# monologue
# JP: その上で、例えば掛け紙の裏にでも、\n“キジ馬と御一夜”的な説明文をつければ、なおよかろう。
2398 = "在封紙的背面印上“雉子馬和御一夜”的介紹，效果一定更好。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。\nこれはすばらしい話をお伺いさせていただいたな」
1958 = "「波萊特。看來我們打聽到了很有用的情報啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「本当に」
1883 = "「是啊」" 

# monologue
# JP: ポーレットの頬が紅潮している。\n声など、緊張しているように硬くなってしまっている。
2592 = "波萊特面頰緋紅。聲音也因為緊張而有些僵硬。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの、宮司さん。つかぬことをおたずねしますけど――\nええと……その辺に関する資料などはありますか？」
2125 = "「那個，宮司先生。容我冒昧問一句——您有關於這方面的資料嗎？」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「奉納の記録なら、古い[ほうがちょう,2]奉加帳に残っております。\n[ねぎ,1]禰宜の日記などにも関連の記述がありましたね、確か」
1739 = "「在老的捐獻簿上應該會有供奉的紀錄。我記得禰宜的日記裡應該也有相關記載」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でしたら――あの、赤井阿蘇神社。\nわたし、前から思ってたんですけど」
2138 = "「那麼——那個，我從以前就在想，赤井阿蘇神社——」" 

# monologue
# JP: ごくりと、真っ白な喉が動く。
2593 = "波萊特頓了頓，皙白的脖頸開始震動起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「有形文化財指定の推薦、\n行わせていただいてもよろしいでしょうか？」
2033 = "「能讓我們推薦這裡參加物質文化財產認定嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「文化財指定！」
1852 = "「文化財產認定！」" 

# monologue
# JP: さすがは市長と驚かされる。\n僕にはまるでない発想だ。
2308 = "不愧是市長，我是想不到這一點的。" 

# monologue
# JP: 文化財指定を勝ち得たのなら、\n赤井阿蘇神社の、ひいては御一夜市の知名度も高まろう。
2675 = "要是能獲得文化財產認定，赤井阿蘇神社就會連帶著御一夜市一起提高知名度。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「いや――\n確かにこの社は歴史ある建造物ではありますが」
1568 = "「不——雖然這座神社的確是歷史悠久的建築」" 

# 【ポーレット】
# display as 波萊特
# JP: 「文化的な価値、物凄く高いです」
1844 = "「我認為具有相當高的文化價值」" 

# monologue
# JP: 断言だ。\nポーレットが。
2587 = "波萊特竟然斷言了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「さっき見た、たくさんの“なんとかぐるま”って、\n日ノ本全土に散っているものなんですよね？」
1812 = "「您剛才給我們看的那些車，它們散布在全日本的各個地方對吧？」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「それはそうですが――」
2157 = "「雖然是這樣——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ならそうした物が残っている土地も含めて調査すれば、\nキジ師達の技術の変遷や流れがきっと、明らかになる」
2139 = "「那麼只要對流傳著這些玩具的地方進行調查，就能查清木旋工們的技術變遷和人口流動的過程」" 

# 【双鉄】
# display as 雙鐵
# JP: 「木地師文化と――\nその集積地としての御一夜、赤井阿蘇神社」
1924 = "「木旋工文化的集散地——御一夜赤井阿蘇神社」" 

# monologue
# JP: 感心が漏れてしまっての呟きに、強い頷きが返される。
2493 = "我無意間流露的感嘆，得到她的點頭贊同。" 

# 【ポーレット】
# display as 波萊特
# JP: 「こことキジ師との繋がりは余り知られていない、と、\nさきほど、宮司さんはおっしゃってましたよね？」
1632 = "「剛才宮司先生不是說過，這裡和木旋工的因緣並不為大眾所知嗎？」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ええ」
# 1728 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは、つまりは誰も調査していないということ。\n知らず埋もれさせてしまうのは、良くないです、これ」
1586 = "「也就是說，關於這點並沒有人調查過。我認為就這麼讓它埋沒了是一件不好的事」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「良くない、とは……\n学術的な意味ででしょうか？」
1570 = "「不好……是指學術層面嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そのとおりです」
1948 = "「沒錯」" 

# monologue
# JP: 声が、落ち着きを取り戻す。
2410 = "她的聲音恢復了以往的平靜。" 

# monologue
# JP: 勢い込んでいた言葉は、\nひとことひとこと、噛み締められるようになる。
2368 = "原本略顯激動的語氣中，多了幾分思考。" 

# 【ポーレット】
# display as 波萊特
# JP: 「今日ある資料が、明日には焼却されるかもしれない。\n――歴史や文化の記録・調査は時間との争いですから」
1825 = "「我們今天所擁有的的資料，隨時有可能遭到燒毀或遺失——對歷史和文化的紀錄、調查，就是和時間作鬥爭」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「なるほど」
1639 = "「原來如此」" 

# monologue
# JP: 深く。\n赤井宮司は頷く。
2712 = "赤井宮司點頭同意。" 

# monologue
# JP: 頷くだけに留まらず、\n正した姿勢からもう一度、ポーレットに向け頭を下げる。
2342 = "光是點頭還不夠，他端正姿勢，再一次向波萊特低頭行禮。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「[もう]蒙を[ひら]啓かれた心持ちです」
1813 = "「感謝您的這一席話讓我祛蔽啟蒙」" 

# monologue
# JP: が、ポーレットは困惑顔だ。
2318 = "不過波萊特一臉困惑。" 

# 【ポーレット】
# display as 波萊特
# JP: 「モウをヒラかれた？」
2012 = "「祛蔽……啟蒙？」" 

# monologue
# JP: “不明を明かし、導いてもらった”というほどの意味だが、\n僕が赤井宮司を不明呼ばわりも出来ん。
2755 = "雖然這個詞有“普及新知，擺脫愚昧”的意思，但我也不能用愚昧來形容赤井宮司。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『良いことに気づかせてもらった』――\nと解釈しておけば良いと思う」
1617 = "「你就理解為“讓我學到了新東西”就好」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……いえっ！？　あの、そんな。とんでもないです。\nけど――あの……それなら？」
1704 = "「啊……才沒有！？　這話我可擔當不起。不過，既然您這麼說——」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ええ。文化財指定への推薦の件。\nこちらから、お願いいたしたく思います」
1983 = "「當然。文化財產認定的推薦一事，就麻煩你費心了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます！　\n明日にでも、文化財課から担当者を送るよう手配します」
2061 = "「謝謝您！我明天就安排文化財產部門的負責人前來拜訪」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「よろしくお願いいたします。\nっと――そうだ」
1782 = "「就拜託你了。對了——還有」" 

# monologue
# JP: 赤井宮司は、いきなり僕へと視線を移す。
2708 = "赤井宮司突然看向我。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「古い資料でしたら、\n[たいと,1]汰斗さんにお譲りした物もあります」
2057 = "「說到古老的資料，我曾交給汰斗老先生一些東西」" 

# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんにですか？」
1945 = "「汰斗老爺嗎？」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ええ、あの方は御一夜と鉄道とを愛しておられた。\nその二つを復活させるため、手を尽くしておられた」
1900 = "「是的，他一直愛著御一夜和鐵路。他也為了復興這二者而一直在拚命努力著」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1728 = "「嗯」" 

# monologue
# JP: 深く、頷く。\nそのことならば、この身をもって知っている。
2506 = "我點頭贊同道。這一點我深有體會。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「木地師関係の物がまだ右田家に残っていれば、\nきっとなにかの助けになるでしょう」
1761 = "「如果木旋工相關的資料還保存在右田家的話，肯定能派上什麼用場的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんの蔵書の中に――\nなら、まだあるかもしれません」
1755 = "「如果是保存在汰斗老爺的藏書之中——那就應該還留著」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「それは何よりです」
2135 = "「那真是太好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
1635 = "「十分感謝您的幫助」" 

# monologue
# JP: 頭を下げて見ればふと、\n自分の不明がおかしくなる。
2472 = "我低頭致謝，突然為自己的愚昧感到好笑。" 

# monologue
# JP: まさしく、これこそ、灯台もと暗しというヤツだろう。
2735 = "這就是所謂的踏破鐵鞋無覓處吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみればあの蔵書――資料群こそヒントの山だ。\n気付かなかった自分が、いささか恥ずかしくあります」
2030 = "「聽您這麼一提我才想起來，那些藏書——資料才是靈感的寶庫。我都有些羞愧自己為什麼沒有早點發現」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしもです……\nあの資料群なら前にも見せていただいてるのに」
1818 = "「我也是……雙鐵君之前明明帶我看過」" 

# monologue
# JP: 振り向けば、ポーレットと視線が重なりあう。\nほとんど同時に、僕らは声まで重ねあう。
2481 = "我和波萊特同時看向對方，然後同時說道。" 

# 【双鉄】
# display as 雙鐵＆波萊特
# JP: 「[もう]蒙を[ひら]啓かれた心持ちです」\n「モウをヒラかれた心持ちです」
2097 = "「這一席話讓我祛蔽啟蒙」" 

# monologue
# JP: 僕に与えられた部屋の、次の間。\n汰斗さんの蔵書や資料を、とにかく詰め込みまくった部屋。
2487 = "我房間的隔壁就是堆著汰斗老爺的藏書和資料的儲藏室。" 

# monologue
# JP: 僕とポーレットとれいな。\n三人だけで、もう四時間はこもっている。
2482 = "我和波萊特還有玲奈，三個人一起在裡面蹲了四個小時。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅ……結構あるものだな」
1670 = "「呼……沒想到還挺多的」" 

# monologue
# JP: これで、和綴じのものを含めた書籍が十一冊目め。\n書付けの類がさらに六冊。
2654 = "線裝書十一本。筆記之類的小冊子共六冊。" 

# monologue
# JP: ちら、とポーレットを見れば、やはり書籍を小山と積み、\n巻物めいたなにかを広げ、覗きこんでる。
2495 = "我瞟了一眼波萊特那邊的情況，果然她身旁的書也堆積成山，她正鋪開一個類似卷軸的東西細細看著。" 

# monologue
# JP: （中身を改めているのなら、\n一通り、探し終わったということか）
2771 = "（既然開始仔細閱讀內容了，就代表已經篩選出了有關的書籍吧）" 

# monologue
# JP: さすが、“地道な作業は得意”と自認するだけはある。
2459 = "怪不得她曾經自稱擅長需要耐心的工作。" 

# monologue
# JP: 僕の方は、受け持ち分の半分までしか\nまだ確かめられていないのに――
2664 = "而我自己那份書山才剛確認到一半——" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1700 = "「啊——」" 

# monologue
# JP: 僕の視線に気づいたのか、\nポーレットが顔をあげ、くるくる器用に巻物をとじる。
2582 = "波萊特注意到了我的視線後抬起了頭，熟練地捲起卷軸。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんもそんなにですか。\nここの資料、本当にすごい量ですね」
2159 = "「雙鐵君也找到了這麼多嗎。這裡的資料真是堆積如山啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1728 = "「嗯」" 

# monologue
# JP: ポーレットのフォローをするつもりの僕が、\nポーレットの時間を使わせてしまっている。
2478 = "我原本打算去幫波萊特的，結果卻讓她在我身上浪費了時間。" 

# monologue
# JP: 申し訳ないような気持ちを、\nけれど笑顔が、一瞬にして飛ばしてくれる。
1286 = "——我有些抱歉地想道。而她用溫暖的笑容一下子驅散了我的內疚。" 

# 【ポーレット】
# display as 波萊特
# JP: 「これだけあれば、きっと、\n調査にも本腰をいれてもらえるって思います！」
1911 = "「有這麼多資料，一定能讓我們的調查工作步入正軌的！」" 

# monologue
# JP: 嬉しくてたまらなそうな顔と言葉に、\n萎えかけていた気力が戻る。
2404 = "她喜不自禁的話語和笑容，為我疲憊的身軀注入了一些活力。" 

# monologue
# JP: 止まってしまってた手を動かせば、\n口もなめらかに動き始める。
2476 = "我動起停下的手，也開始說道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、文化財指定というアイディアには驚いた」
1581 = "「不過，我真沒想到還有認定文化財產這一招」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そんな。前々から役所で出ていただけのお話です」
1591 = "「也沒什麼啦。在市政府內經常聽到這樣的呼聲」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうした話をあのタイミングで切り出せるのも、\n実力だ」
2032 = "「能夠在剛才那種時機提出這件事，也是一種實力」" 

# monologue
# JP: 赤井宮司は、かなり控えたがる性格らしいし――
2623 = "畢竟赤井宮司是一位相當低調的人——" 

# monologue
# JP: 観光のため、宣伝のためという理由でお願いしたのなら、\n恐らくは、推薦の話もあっさり断っていただろう。
2415 = "如果以觀光和宣傳為理由拜託他同意推選一事，恐怕只會被他乾脆地拒絕吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜のこと、文化のこと。\n普段から興味を持たぬ者では、ああいう話は出てこない」
1751 = "「如果不是熱愛御一夜和文化的人，是不會說出那種話的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そんな……わたし、\nただ……鉄道が好きなだけですから」
1693 = "「哪裡……我只是……喜歡鐵路而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや？　それは知っているが――」
1574 = "「不是哦？　我當然知道這點——」" 

# monologue
# JP: 鉄道好きと、文化面への興味や知識。
2438 = "對鐵路的熱愛，與對文化的興趣以及知識。" 

# monologue
# JP: それが今ひとつつながらず、\n聞き違えかとさえ思ってしまう。
2734 = "這兩者看似沒有任何關聯，我甚至以為自己聽錯了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、ただただ鉄道が好きで、鉄道旅行が好きで。\n日ノ本のことも好きで、もっともっと知りたくて」
1831 = "「我只是喜歡鐵路、喜歡鐵路旅行。也喜歡日本，想要了解更多更多」" 

# monologue
# JP: セーヌのことを語った時と同じ――\nいや、それ以上の熱意を感じる。
2485 = "我感到了和她說起塞納河的時候一樣——不，更真切的熱情。" 

# 【ポーレット】
# display as 波萊特
# JP: 「だから、土地と土地との繋がりとか、そういうことにも、\n自然と興味を、持つようになっただけのことなんです」
1849 = "「所以才自然而然地對土地之間的聯繫之類的事情產生了興趣，只是這樣而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、少し理解できたように思う」
1640 = "「原來如此，我似乎有點理解你的想法了」" 

# monologue
# JP: 思えば、僕の意識も高まる。\n彼女の美徳を見習いたいと素直に思う。
2736 = "這樣一想，我的內心也湧起一股熱情。我也要學習她的美德。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、学究肌であるのだな。\n興味あることを突き詰めていくのが好きなのだ」
1989 = "「看來波萊特有著學者的特質啊。會對自己感興趣的事情刨根問底」" 

# 【ポーレット】
# display as 波萊特
# JP: 「学究肌なんて……そんないいものじゃないですよ。\n好きなこと――もっと知りたくなるの、普通だと思うし」
1769 = "「學者——才沒有那麼厲害啦。我認為人想了解自己喜歡的事情是很正常的」" 

# monologue
# JP: こくっと、小さくツバを飲む音。
2625 = "略微聽到嚥下唾沫的聲音。" 

# 【ポーレット】
# display as 波萊特
# JP: 「その好きが――わたし、多分、しつこいんです。\n長く続くっていうか……ずっと飽きない、それだけです」
1837 = "「我大概只是很長情吧。對於喜歡的事物會一直堅持下去，沒有厭煩的時候……僅此而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「一途であり、愚直であることは、\n何かを為すために、恐らく大事なことだろう」
1777 = "「專心並且憨直——我認為這是做好一件事的關鍵所在」" 

# monologue
# JP: 汰斗さんにも通じることだ。
2559 = "汰斗老爺也是一樣。" 

# monologue
# JP: 愚直なまでに積み重ねてきたその遺産によって、\n僕たちは今、大いに助けられている。
2324 = "他勤勤懇懇收集來的資料，如今成為了我們重要的助力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕などは、簡単に意見を変えてしまうからな。\nポーレットのいうしつこさが、少し眩しい」
1842 = "「我總是輕易地改變自己的意見。所以稍微有些羨慕波萊特你的固執」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……双鉄くんは、だから強いんですよ」
1309 = "「……這才是雙鐵君的強大之處」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
1733 = "「嗯？」" 

# monologue
# JP: 思わぬ言葉に、本と向き合っていた顔を動かす。\nポーレットの青い瞳も、僕をじいっと見つめている。
2490 = "我沒料到她會這樣說，不由得抬起頭。只見波萊特藍色的眼睛也在注視著我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「固執しないで、間違っていると確信したらすぐ止める。\nどんなに強い痛みでも、それを恨みに固まらせない」
1984 = "「發現錯了就馬上修正，並不拘泥於一條道路。不論經歷怎樣的痛苦，也不會讓這份痛苦化作仇恨」" 

# monologue
# JP: ドキンと、心臓が跳ね上がる。
2650 = "突然，我感到了自己心臟猛烈跳動了一下。" 

# monologue
# JP: この目が、言葉が――僕を過去へと引きずるようで、\n過去の大事な想い出と、重なりあっていきそうで。
2408 = "她的眼睛和話語像是要勾起些什麼被我遺忘的重要回憶。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが変えるのは、意見ではなく過ちです。\nわたしには、だから双鉄くんの強さが、眩しい」
2160 = "「雙鐵君所改變的不是意見，而是錯誤。所以我很羨慕雙鐵君的這份強大」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット……」
1957 = "「波萊特……」" 

# monologue
# JP: その評価が、果たしてどこから来ているのか。\n過去の僕を、ポーレットは知っているのではないか。
2406 = "她為什麼能對我做出如此的評價呢。難道她認識過去的我嗎。" 

# monologue
# JP: 尋ねれば済むことであるのに、\nなぜか言葉が、喉に張り付く。
2547 = "明明只要詢問就能得到答案，我卻不知為何無法開口。" 

# 【ポーレット】
# display as 波萊特
# JP: 「どうしました？　双鉄くん」
1808 = "「怎麼了？　雙鐵君」" 

# monologue
# JP: だが――怯えることに意味などない。
2325 = "但是——害怕是沒有意義的。" 

# monologue
# JP: ポーレットが僕の過去を知っていようと知っていまいと、\n今の僕らに、何の影響があるわけでもない……筈だから。
2311 = "不管波萊特知不知道我的過去，都不會對我們現在的關係造成影響……我是這麼認為的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
1959 = "「波萊特」" 

# monologue
# JP: だから言葉を引き剥がす。\n向き合うべきに、向き合うために。
2510 = "所以我選擇開口。為了面對那些，我應當面對的事物。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は君に、聞きたいことがひとつ」
1840 = "「我有件事想問你」" 

# 【れいな】
# display as 玲奈
# JP: 「あのぉポーレットぉ、ちょおっといいですかぁ？」
2126 = "「那個，波萊特，能過來一下嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2172 = "「！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいな？　どうしたの？」
1976 = "「玲奈？　怎麼了？」" 

# monologue
# JP: 部屋の奥からのれいなの声に、気付かされる。\n今、僕が向き合うべきは、本と資料だ。
2507 = "房間深處傳來的玲奈的聲音提醒了我。我現在應該面對的，是書籍和資料。" 

# monologue
