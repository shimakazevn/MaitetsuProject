2746 = "鐵路將這些城市連接了起來——四通八達的黑白線似乎在述說著過去的榮光。" 

# 【れいな】
# display as 玲奈
# JP: 「あのですね、それで、これなんです」
2124 = "「那個，你們看這裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1699 = "「唔？」" 

# monologue
# JP: れいなが示す一点には、馴染みある文字が記されている。
2617 = "玲奈所指的小點旁邊標著一個我們熟悉的地名。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[じゅつせんどう,2]術仙洞駅――\nそうか、この頃にはまだ廃駅ではないのだな」
2048 = "「術仙洞站——原來如此，那時候還沒被廢棄啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あれ？　これ」
1675 = "「咦？　這是……」" 

# 【れいな】
# display as 玲奈
# JP: 「ね？」
1778 = "「對吧？」" 

# monologue
# JP: ポーレットとれいなとが、\nなぜか目と目を見交わしている。
2581 = "波萊特和玲奈不知為何交換著眼神。" 

# monologue
# JP: 青い瞳が僕へ向く。\nが、“ね？”と言えるような理解を僕はできていない。
2583 = "波萊特用藍色的大眼睛看著我，可我卻沒能像玲奈一樣理解她的意思。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにがだ？」
1809 = "「怎麼了？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「これ……この線です」
2108 = "「這裡……你看這條線」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1699 = "「唔？」" 

# monologue
# JP: 言われてみれば、術仙炭鉱駅から\n術仙洞の文字の上、鉱山の地図記号へと、線がある。
2414 = "她這麼一指，我發現從術仙煤礦站到術仙洞幾個字上面的礦山地圖符號之間有一條線連接著。" 

# monologue
# JP: 縫合の痕跡のようなその線は、確か……
2738 = "這種像是縫合痕跡一樣的線，我記得代表的是……" 

# 【双鉄】
# display as 雙鐵
# JP: 「私鉄――か？　これは」
2103 = "「這是——私營鐵路嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、その可能性が極めて高いと思います」
1902 = "「是的，我認為這個可能性很高」" 

# 【れいな】
# display as 玲奈
# JP: 「きっと、鉱山鉄道ですよぉ」
2096 = "「這一定是礦山鐵路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉱山鉄道……」
2005 = "「礦山鐵路……」" 

# monologue
# JP: オウム返しの僕の言葉に、\nれいなはぴょこん、跳ねるようにして体で頷く。
2505 = "我重複了一遍她的話，玲奈高興得彷彿要跳起來一般，重重地點頭。" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい。いいですよねぇ。\nれいな、そこでも走ってみたかったですぅ」
1893 = "「是的。真好啊，玲奈也想試試跑那條線路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「走る――どうなのだ？　出来るのか？\n例えば、実際にキハ[レイナナ,1]07で」
2078 = "「跑——怎麼樣？　能做到嗎？　比如說，真的讓Ｋｉｈａ０７跑那條線路」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1682 = "「哎？」" 

# monologue
# JP: きょとんとした顔。\nそしてふるふる、申し訳無さそうに頭がふられる。
2665 = "聽了我的問題，玲奈似乎有些驚訝，然後有些愧疚地搖搖頭。" 

# 【ポーレット】
# display as 波萊特
