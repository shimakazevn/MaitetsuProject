2010 = "「礦車——對了，礦山肯定也有礦車」" 

# 【れいな】
# display as 玲奈
# JP: 「絶対絶対あるですよ！\nれいな、トロッコも運転してみたいのです！」
1561 = "「一定有的！玲奈也想試試駕駛礦車！」" 

# 【双鉄】
