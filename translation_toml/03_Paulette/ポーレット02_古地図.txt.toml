2136 = "「那裡可是早就已經廢線了呀？術仙煤礦廢車站那裡已經沒有相應設備了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「近くに無くても奥ならどうだ？\n術仙炭鉱までにレールは、残ってないのか？」
1856 = "「既然廢車站那裡沒有，那深處呢？現在還有通向術仙煤礦的鐵軌嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは……わたしには分かりません」
2099 = "「這個……我就不太清楚了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――ああいや、その前に」
1860 = "「既然這樣——不，等等，我先問一下」" 

# monologue
# JP: しゃがみこみ、れいなと目線の高さをあわせる。
2502 = "我蹲下身子，和玲奈平視。" 

# monologue
# JP: ここを確認しておかなければ、\n骨折り損のくたびれもうけになりかねない。
2306 = "不先確認這一點的話，恐怕會白忙一場。" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉱山鉄道というものは、\nレールの幅が異なっていたりするものなのか？」
2007 = "「礦山鐵路的鐵軌寬度和普通鐵路會有所不同嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「普通は、わざわざゲージを変えたりしませんよぉ？\nその方が、いろいろ便利ですからぁ」
1563 = "「一般來說不會特地去變動軌距，因為這樣比較方便嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だよな」
1588 = "「也是啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ！」
# 1711 = "「啊！」" 

# monologue
# JP: ポーレットの声。\n驚きと喜びが混じったような。
2584 = "波萊特發出了驚喜的聲音。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひょっとして、双鉄くん――\n復線を考えているんですか？」
2163 = "「難道說雙鐵君想要恢復廢線？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「レールの幅が同じであれば、\n乗り入れなども出来るようになるのだよな？」
1861 = "「既然鐵軌的軌距相同，想駛入應該也不難吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい！　もしも線路が状態よく残ってれば、\nそことつなげて、\x%lポイント;#00ffc040;ポイント%l;#;整備するだけですから」
1896 = "「是的！　如果線路的保存狀態良好的話，只要接上那裡再整備好\\x%lポイント;#00ffc040;轉轍器%l;#;就可以了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「状態よく残っていれば――\nどうかな、面白いのではないかと考えている」
1763 = "「如果狀態良好的話——你覺得呢？　我認為是個不錯的主意」" 

# monologue
# JP: 線路は、上質の鉄材だ。誰かが、恐らくは持ち去っている。\nが、術仙炭鉱付近は\x%lエアクラ;#00ffc040;エアクラ%l;#;の作動不能地帯――
2747 = "鐵軌都是用的上等鋼鐵鋪設，一般來說廢線後都會被人拿走。不過術仙煤礦附近是無法使用\\x%lエアクラ;#00ffc040;空凝機%l;#;的——" 

# monologue
# JP: 廃線されてしまった後での持ち去りはひどく困難だろう。\nゆえ、森の奥へと入ってしまえば残っていそうな気もする。
2397 = "因此廢線之後，恐怕很難將它們運走。所以我覺得位於森林深處的鐵路應該還沒被人動過才對。" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、体験採掘できる炭鉱などとして、\n観光振興のひとつと持っていくのはどうだろう？」
1936 = "「比如在那裡開展煤礦開採體驗活動，作為旅遊業復興的一環怎麼樣？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いいと思います！　少しでも石炭取れたら、\nハチロクちゃんのご飯の助けにもなりますし」
1845 = "「我認為這個主意很不錯！　要是能開採些煤礦，也能讓八六有更多糧食吃」" 

# monologue
# JP: いたずらっぽく微笑んで、\nポーレットは強く、深く頷く。
2588 = "波萊特調皮地笑了笑，用力地點著頭對我的意見表示贊同。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それよりなにより、今どき鉄道で鉱山までいけるのって\n――あ、どうかな？　鉄道に興味ない人にも面白い？？」
2027 = "「而且最重要的是，如果現在還能乘列車前往礦山——啊，怎麼樣？　能否吸引到那些原本對鐵路沒有興趣的遊客呢？？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、面白そうだと感じているが……」
2037 = "「至少我是覺得很有意思……」" 

# monologue
# JP: 急に不安げになってしまったポーレット。\nつられて僕にも、弱気の虫が湧いてくる。
2586 = "波萊特突然有些不安起來，搞得我也有些沒有自信。" 

# monologue
# JP: いつの間に僕も、鉄道にずいぶんと詳しくなってきているのは確かだし……
2627 = "的確在不知不覺中，我也成了十分了解鐵路的人了……" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこは、相談をしてみよう。\n日々姫やふかみ、真闇姉あたりの意見は参考になろう」
2131 = "「那我們問問其他人的意見吧。比如日日姬、深美還有真闇姐，她們的回答應該具有不少參考價值」" 

# 【ポーレット】
# display as 波萊特
