# JP: 「ええと、でも。そのころわたしたち……\n鉄道とか、興味、ゼロでしたから。かも」
1667 = "「呃——不過，也許只是因為……我們當時……對鐵路還沒有興趣吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。日々姫はどうだ？　学園行事ということなら」
1697 = "「唔。日日姬呢？　既然這是學校規定的活動——」" 

# 【日々姫】
