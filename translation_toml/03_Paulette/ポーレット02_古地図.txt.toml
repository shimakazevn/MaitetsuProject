2773 = "（日日姬可是酒窖的女兒，非常喜歡打掃。如果真的很髒，她不可能沒察覺到）" 

# monologue
# JP: ならば、導かれる答えはひとつ。
2742 = "那麼，可以得出的原因恐怕只有一個。" 

# monologue
# JP: 恐らくは術仙炭鉱跡。\n老朽化が、急速に進んでしまっているのだ。
2670 = "術仙廢煤礦的老化正在以極快的速度進行著。" 

# 【日々姫】
# display as 日日姬
