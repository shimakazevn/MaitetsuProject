2058 = "「說遠倒是挺遠的。雖然那時候我還是小學生——大概花了兩個……不，三個小時？　才能走到入口」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どこからだ？」
1801 = "「從哪裡開始走的？」" 

# 【ポーレット】
# display as 波萊特
