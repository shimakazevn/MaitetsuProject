# monologue
# JP: 日々姫とハチロクの漏らした声には、\nあきれと感心、それが入り交じっているように聞こえる。
2536 = "日日姬和八六的語氣裡交織著佩服和驚訝。" 

# 【ハチロク】
# display as 八六
# JP: 「この短期間に、よくもこれほどの案を」
2022 = "「竟然能在這麼短的時間內想到這麼多方案」" 

# 【日々姫】
# display as 日日姬
# JP: 「ポーレットさんも兄さんも――\n忙しいに決まってるのに」
1876 = "「明明波萊特小姐和哥哥都這麼忙……」" 

# 【双鉄】
# display as 雙鐵
