# JP: 「私も行きました。少等部のときの遠足で。\nけど、そんなに汚くはなかったですよ？」
1780 = "「小學的時候遠足我也去過。不過，沒有你們說的那麼髒哦？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1690 = "「哦？」" 

