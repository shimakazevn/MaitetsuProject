# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ、これ、\n地図って書いてあるんですけどぉ」
1619 = "「你看，這個上面畫著什麼地圖」" 

# monologue
# JP: ぽてぽてと、れいながこちらにやってくる。\n両手いっぱいにひろげているのは――
2620 = "玲奈雙手舉著什麼東西，小跑著來到我們面前。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、古地図か――\n御一夜の……いや、もっと広域のものか」
1688 = "「哦，這是御一夜的古地圖嗎……不，應該是更大範圍的地圖」" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l大詔;#00ffc040;大詔%l;#;の頃のものでしょうかね？\n[ていてつゆのいせん,4]帝鉄湯医線って、ほら、ここ」
2104 = "「這是大正時期的地圖吧？你看這裡，還寫著帝鐵湯醫線呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大廃線のはるか以前か。\nああ――鉄道路線は、九洲を[もうら,1]網羅していたのだなぁ」
1890 = "「是比大廢線的時代還要早很久的東西。哦哦，那時的九州各地都有鐵路連接啊」" 

# monologue
# JP: [ハカタ,1]博太、[サガ,1]左賀、[ナガサキ,1]永崎、[クマモト,1]隈元、[カゴシマ,2]夏午島、[ミヤザキ,1]宮嵜、[オオイタ,1]大板――
2363 = "博多、佐賀、長崎、隈元、鹿兒島、宮崎、大分——" 

