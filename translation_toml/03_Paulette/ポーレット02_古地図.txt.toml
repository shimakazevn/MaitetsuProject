1614 = "「你們去玩的時候，有沒有注意到鐵路設備和鐵軌還在不在？」" 

# 【凪】
# display as 凪
# JP: 「なーんも気づかんかったばい」
1596 = "「什麼都沒注意到咧」" 

# monologue
# JP: あっさりと、凪が空気を変えてくれる。\nふかみもすんなり、それに乗る。
2357 = "凪的一言讓整個房間的氛圍一變。深美順著她的話應和道：" 

