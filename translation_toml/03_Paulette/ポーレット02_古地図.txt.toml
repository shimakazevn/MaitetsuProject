1885 = "「是啊！　整個小村子都被森林淹沒了——阿哥，待會給你看看我當時的素描咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。頼む」
1732 = "「嗯，拜託了」" 

# monologue
