1768 = "「學校遠足是去過煤礦那裡咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1690 = "「哦？」" 

# monologue
# JP: こういうときに、凪はいい。\n本題にすぱっと切り込み、話をぐいぐい進めてくれる。
2739 = "這種時候凪總是一馬當先切入正題。" 

# 【凪】
# display as 凪
