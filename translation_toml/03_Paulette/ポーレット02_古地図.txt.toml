# 【ポーレット】
# display as 波萊特
# JP: 「なら、スケジュールを確認しましょう。\n打ち合わせ、できるだけ早いほうがいいと思います」
2133 = "「那我先確認一下日程表。這件事最好儘快開始」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ」
# 1728 = "「嗯」" 

# monologue
# JP: 居間ではあるが、広間でもある。
2474 = "我們的起居室也兼做大廳。" 

# monologue
# JP: これだけの人数が入ってもなお、\nこの部屋は、少しの窮屈さも感じさせない。
