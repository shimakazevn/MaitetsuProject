# JP: が――その確認はあとまわしでいい。\n皆にとっても、無論、時間は貴重なのだから。
2321 = "不過，這件事還是留到以後再確認吧。畢竟把這麼多人都叫來一起，大家的時間也很寶貴。" 

# 【双鉄】
# display as 雙鐵
