2146 = "「鐵路便當就不斷試做試吃，直至找到最合適的方案為止」" 

# monologue
# JP: 僕の言葉に小さく頷き、\nハチロクが、強い瞳で見返してくる。
2349 = "八六點了點頭，用堅定的目光回應我。" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、\nご相談の主眼は、鉱山鉄道についてでしょうか？」
2140 = "「那麼這次討論的主題就是礦山鐵路相關吧？」" 

# 【双鉄】
# display as 雙鐵
