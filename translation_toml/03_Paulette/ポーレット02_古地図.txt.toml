1310 = "「……過去礦工們居住過，現在已經無人居住的街道嗎——」" 

# 【れいな】
# display as 玲奈
# JP: 「鉱山鉄道は、鉱夫さんたちも運ぶのです！」
2006 = "「礦山鐵路也會運送礦工的！」" 

# monologue
