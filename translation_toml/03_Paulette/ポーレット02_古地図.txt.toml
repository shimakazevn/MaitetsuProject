2609 = "為什麼我會忘了原本的目的呢，連我自己也不清楚。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、面白いものみつけちゃいましたぁ」
1972 = "「玲奈找到了一個有意思的東西哦」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　なになにっ」
1673 = "「咦？　是什麼」" 

# monologue
# JP: ポーレットの体がぐるん、れいなの声が響いている、\n部屋の奥の方へと向かう。
