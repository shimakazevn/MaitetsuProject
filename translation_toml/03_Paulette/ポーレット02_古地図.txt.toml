[script]
# lines: 396 
# 【赤井宮司】
# display as 赤井宮司
# JP: 「なるほど……駅弁とはいいところに目を付けましたね」
1637 = "「Ra là vậy... Cơm hộp nhà ga, một hướng\ntiếp cận rất hay đấy.」"

# monologue
# JP: 赤井宮司の淹れてくださるお茶は、美味い。
2710 = "Trà do thầy tế Akai pha rất ngon."

# monologue
# JP: 淹れ方うんぬんもあるのだろうが、\n茶葉そのものの香りが圧倒的だ。
2752 = "Chắc cũng có phần do cách pha,\nnhưng hương thơm của bản thân lá trà thật\nsự quá ấn tượng."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「大廃線が訪れ、鉄道駅というもの自体が激減しても、\n駅弁は、いまだ愛され続けています」
2036 = "「Dù Đại bãi bỏ các tuyến đường sắt đã diễn\nra, số lượng nhà ga giảm mạnh,\nnhưng cơm hộp nhà ga vẫn luôn được mọi\nngười yêu thích.」"

# monologue
# JP: [ヨコカワ,1]横河のカマ飯、[ニシアカシ,2]西赤司のタコ飯、[オシャマンベ,3]御社万部のカニ飯、\n[ヒタチダイゴ,3]常陸醍醐のシャモ飯、[イズデンシモダ,4]伊津電霜田のキンメダイ飯――
2553 = "Cơm thố Yokokawa, cơm bạch tuộc Nishi\nAkashi, cơm cua Oshamambe,\ncơm gà chọi Hitachi Daigo, cơm cá tráp đỏ\nIzuden Shimoda——"

# monologue
# JP: そのどれもが、大廃線で廃止されてしまった駅の、\nしかし、今もって生き残っている“駅弁”だそうだ。
2733 = "Tất cả đều là những 'cơm hộp nhà ga' của\ncác ga đã bị bãi bỏ,\nnhưng vẫn tồn tại cho đến tận bây giờ."

# 【双鉄】
# display as 雙鐵
# JP: 「駅が滅びて、駅弁のみが生き残りますか」
1787 = "「Nhà ga biến mất, chỉ còn lại cơm hộp nhà\nga tồn tại sao.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「駅弁には、それほどの力があるのでしょうね」
2147 = "「Cơm hộp nhà ga có sức mạnh đến nhường đó\nđấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「帝都だと、\n駅弁フェアとかたくさんだって聞きますけど」
1843 = "「Cháu nghe nói ở Đế đô,\ncó rất nhiều hội chợ cơm hộp nhà ga được\ntổ chức.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……\n確かに、言われてみればそうだったかもしれん」
1706 = "「À...\nNghe em nói mới nhớ, hình như đúng là vậy\nthật.」"

# monologue
# JP: 駅弁をあえて食おうと思ったこともなかったが――
2754 = "Tôi chưa bao giờ chủ động tìm ăn cơm hộp\nnhà ga, nhưng——"

# monologue
# JP: そうした僕の目でさえも、\n百貨店などで時折は、そうしたノボリを捉えていた。
2443 = "Ngay cả một người như tôi,\ncũng thỉnh thoảng bắt gặp những tấm băng\nrôn quảng cáo đó ở các cửa hàng bách hóa."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「もし仮に、日ノ本一売れる駅弁を作れれば、\nそうしたフェアの全てが御一夜の宣伝になる」
1753 = "「Giả sử các cháu có thể làm ra hộp cơm nhà\nga bán chạy nhất Hinomoto,\nthì tất cả những hội chợ đó sẽ trở thành\nnơi quảng bá cho Ohito.」"

# monologue
# JP: 褒める調子の穏やかな声。
2433 = "Giọng nói điềm đạm mang hàm ý khen ngợi."

# monologue
# JP: が、そこまでを考えてなかった僕としては、\n恐縮するものを感じてしまう。
2319 = "Nhưng, với một người chưa nghĩ xa đến mức\nđó như tôi,\nthì lại cảm thấy có chút áy náy."

# 【双鉄】
# display as 雙鐵
# JP: 「生きたＳＬに乗って、日ノ本一の駅弁を食べられる。\n僕は、それが叶えば観光資源になると思っただけでした」
1832 = "「Vừa ngồi trên SL đang chạy, vừa thưởng\nthức hộp cơm nhà ga ngon nhất Hinomoto.\nCháu chỉ nghĩ đơn giản là nếu làm được như\nvậy, nó sẽ trở thành một tài nguyên du\nlịch.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「確かに、\n観光資源の有力な一つになりそうですね」
2106 = "「Đúng vậy,\nnó có vẻ sẽ trở thành một tài nguyên du\nlịch rất tiềm năng đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1895 = "「Vâng.」"

# monologue
# JP: “有力な一つ”という言葉はしかし、今の僕には、\n“それでは足りぬ”という意味だとしか感じられない。
1291 = "「Vâng.」"

# monologue
# JP: が、それでもまずは、駅弁だ。\n一歩をしっかり固めねば、次の一歩は迷い足となる。
2320 = "Tuy nhiên, cụm từ 'rất tiềm năng' lúc này,\nđối với tôi, lại mang ý nghĩa là 'như vậy\nvẫn chưa đủ'."

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜らしい駅弁を、と考えています。それで、\nキジ馬についてご教示いただきたくお邪魔いたしました」
1826 = "「Bọn cháu đang muốn làm một hộp cơm nhà ga\nmang đậm chất Ohito. Vì vậy,\nbọn cháu đến đây để thỉnh giáo thầy về\nngựa Kiji ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「おや。その話をどなたから？」
1692 = "「Ồ. Các cháu nghe chuyện đó từ ai vậy?」"

# 【双鉄】
# display as 雙鐵
# JP: 「永山婦人――\n[えいざんじ,2]榮山寺のご住職の奥様からです」
1827 = "「Từ phu nhân Nagayama——\nvợ của trụ trì chùa Eizan ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ、[うんざん,1]雲山さんの奥さんですか」
1689 = "「À, vợ của sư thầy Unzan sao.」"

# monologue
# JP: 赤井宮司は頷いて、\n茶碗を手に取り、喉を湿らす。
2711 = "Thầy tế Akai gật đầu,\ncầm chén trà lên nhấp một ngụm."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「でしたら、納得です。\nこの[やしろ]社と[きじし,2]木地師との縁は、広く知られていませんから」
2128 = "「Nếu vậy thì cũng dễ hiểu thôi.\nMối duyên nợ giữa ngôi đền này và những\nngười thợ tiện gỗ không được nhiều người\nbiết đến mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「キジ師？　――って？」
1928 = "「Thợ tiện gỗ? ——Là sao ạ?」"

# monologue
# JP: さすがのポーレットも、\nそこまで広範に日ノ本の知識は持っていないらしい。
2628 = "Đến cả Paulette,\ncũng không có kiến thức sâu rộng về\nHinomoto đến mức đó."

# monologue
# JP: 素朴な疑問に、\nしかし赤井宮司は答えず僕へと視線を向ける。
2705 = "Trước câu hỏi ngây ngô đó,\nthầy tế Akai không trả lời mà hướng ánh\nmắt về phía tôi."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「双鉄君はご存知ですか？」
2158 = "「Cậu Soutetsu có biết không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「木工の技術を持った流浪の職人――でしたか？\n良質の木材を得るため、定住せず、森から森を渡り歩く」
1947 = "「Là những người thợ mộc du mục——phải không\nạ?\nĐể tìm được gỗ tốt, họ không định cư mà đi\ntừ khu rừng này sang khu rừng khác.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「良い答えです。辞書を引けば恐らく、\nそのようなことが書いて有りましょうかね」
1771 = "「Câu trả lời rất hay. Nếu tra từ điển,\nchắc chắn sẽ có những dòng giải thích\ntương tự như vậy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
1711 = "「A!」"

# monologue
# JP: 小さな挙手。
2589 = "Một cái giơ tay nhè nhẹ."

# monologue
# JP: 赤井宮司がうながせば、\nポーレットはどこか恥ずかしそうに尋ねる。
2434 = "Khi được thầy tế Akai gật đầu cho phép,\nPaulette ngượng ngùng hỏi."

# 【ポーレット】
# display as 波萊特
# JP: 「間違っていたら恥ずかしいんですけど――\nその、キジ師さんが作った馬で、キジ馬なんですか？」
1816 = "「Nếu cháu nói sai thì xấu hổ lắm nhưng\nmà——\nCái đó, ngựa do thợ tiện gỗ làm ra, nên\nmới gọi là ngựa Kiji (gỗ) phải không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1685 = "「Ồ!」"

# monologue
# JP: なるほど。それは盲点だった。
2366 = "Ra là vậy. Quả là một điểm mù."

# monologue
# JP: 知識がないということはすなわち、\n先入観のなさであるのだと思い知る。
2423 = "Không có kiến thức, cũng đồng nghĩa với\nviệc\nkhông bị định kiến chi phối, tôi chợt nhận\nra điều đó."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そういう説もあります」
1590 = "「Cũng có giả thuyết như vậy.」"

# monologue
# JP: 赤井宮司は立ち上がり、飾り箪笥からキジ馬に似た、\nいくつもの木のおもちゃ達を持ってくる。
2709 = "Thầy tế Akai đứng dậy, lấy từ chiếc tủ\ntrang trí ra\nmột vài món đồ chơi bằng gỗ giống ngựa\nKiji."

# 【ポーレット】
# display as 波萊特
# JP: 「わぁ……かわいい」
1678 = "「Oa... dễ thương quá.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「木地師由来ともいわれる、日ノ本各地の民芸品です。\n昔は、こどもに与えられたおもちゃだったのでしょう」
1988 = "「Đây là những món đồ thủ công mỹ nghệ từ\nkhắp nơi trên Hinomoto, được cho là có\nnguồn gốc từ thợ tiện gỗ.\nNgày xưa, chắc hẳn chúng là đồ chơi dành\ncho trẻ em.」"

# monologue
# JP: くじらぐるま、いぬぐるま、たいぐるま、うずらぐるま。\nどれも、とてもキジ馬に似た印象なのだが――
2766 = "Xe cá voi, xe chó, xe cá tráp, xe chim\ncút.\nTất cả đều mang lại cảm giác rất giống\nngựa Kiji, nhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「同じような構造なのに、何故キジ馬だけ、\n車ではなく、馬、と呼ばれるのでしょうか？」
1874 = "「Cùng một cấu trúc như nhau, tại sao chỉ\ncó ngựa Kiji,\nlại được gọi là ngựa, chứ không phải xe\nạ?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「それには、いくつかの説があります。\nまず、キジグルマがキジウマと訛った、というもの」
2152 = "「Về vấn đề này, có một vài giả thuyết.\nĐầu tiên, là do Kijiguruma (xe Kiji) bị\nđọc chệch thành Kijiuma (ngựa Kiji).」"

# 【ポーレット】
# display as 波萊特
# JP: 「キジグルマ、キジグルマ、キジグマ、キジウマ――\nまぁ、あるかもと言われればそうかもですが……」
2155 = "「Kijiguruma, Kijiguruma, Kijiguma,\nKijiuma——\nChà, nghe cũng có vẻ hợp lý đấy ạ...」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「次に、キジ馬は、単なるウマグルマであるという説。\nそれが雉にも見えた故、キジウマグルマからキジウマに」
2113 = "「Tiếp theo, là giả thuyết cho rằng ngựa\nKiji vốn chỉ là Umaguruma (xe ngựa).\nNhưng vì trông nó cũng giống chim trĩ\n(Kiji), nên từ Kijiumaguruma được gọi tắt\nthành Kijiuma.」"

# 【ポーレット】
# display as 波萊特
# JP: 「でも、それだとやっぱりキジぐるまになるんじゃ……\n他のくるまたちもキジ師さんが作ってるんですよね？」
1580 = "「Nhưng nếu vậy thì nó phải thành\nKijiguruma chứ...\nNhững chiếc xe khác cũng do thợ tiện gỗ\nlàm ra mà đúng không ạ?」"

# monologue
# JP: イマイチしっくり来ていないのは、\nポーレットも僕と同様らしい。
2585 = "Có vẻ Paulette cũng giống tôi,\ncảm thấy chưa được thuyết phục lắm."

# monologue
# JP: そんな僕らを赤井宮司は満足そうに眺め、頷く。
2706 = "Nhìn vẻ mặt của chúng tôi, thầy tế Akai\ngật đầu mãn nguyện."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「もうひとつ、興味深い説もあります。キジ馬は、\n木地師があえて残した足跡であるというものです」
2112 = "「Còn một giả thuyết thú vị khác nữa. Ngựa\nKiji,\nchính là dấu vết mà những người thợ tiện\ngỗ cố tình để lại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あえて残した――ということは、木地師達が、\n訪れた場所場所にキジ馬を伝えていったのですか？」
1967 = "「Cố tình để lại——Nghĩa là, những người thợ\ntiện gỗ\nđã truyền bá ngựa Kiji đến những nơi họ\nđặt chân tới sao?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「あくまで、一説。異説です。が――」
2101 = "「Đó chỉ là một giả thuyết. Một giả thuyết\nkhác biệt. Nhưng——」"

# monologue
# JP: 宮司がまた立ち、今度はもっとキジウマに近い、\n木のおもちゃ達を持ってくる。
2431 = "Thầy tế lại đứng lên, lần này lấy ra\nnhững món đồ chơi bằng gỗ giống ngựa Kiji\nhơn."

# monologue
# JP: ほとんどキジウマなものもあれば、\nひどく素朴な――馬そのものに近いものもある。
2351 = "Có những món gần như giống hệt ngựa Kiji,\ncũng có những món rất mộc mạc——giống hệt\nmột con ngựa thật."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「九洲の各所にも、こうしたキジ馬が伝わっているのを、\nご存知ですか？」
1615 = "「Các cháu có biết, những con ngựa Kiji này\ncũng được lưu truyền ở nhiều nơi trên\nKyushu không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「いえ、僕は知りません」
2102 = "「Dạ không, cháu không biết ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「[ふくおか,1]福丘にもあるっていうことは、聞いたことあります」
1829 = "「Cháu có nghe nói ở Fukuoka cũng có ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「よくご存知ですね。他には、[おおいた,1]大板。\n[かごしま,2]夏午島、[さが,1]左賀などにも見られます」
1621 = "「Cháu biết rõ đấy. Ngoài ra còn có ở Oita.\nKagoshima, Saga nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。九洲の半分以上ではないですか」
1735 = "「Ồ. Hơn một nửa Kyushu rồi còn gì.」"

# monologue
# JP: お話としては面白い。\nが――
2737 = "Câu chuyện thì thú vị thật đấy.\nNhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、\n御一夜の特産としては売りが弱くなりますか」
1582 = "「Nếu vậy,\nthì sức hút của nó với tư cách là đặc sản\nOhito sẽ bị giảm sút sao?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「いえいえ、御一夜ほどに古いキジ馬が\n数多く残っている土地はありません」
2100 = "「Không đâu, không có vùng đất nào\nlưu giữ được nhiều ngựa Kiji cổ xưa như\nOhito cả.」"

# monologue
# JP: 赤井宮司は、わずかにだけれど身を乗り出す。
2707 = "Thầy tế Akai hơi rướn người về phía trước."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「木地師は、森林[しょくのうしゃ,2]職能者であると同時に、\n山岳信仰における、宗教職能者でもありました」
1926 = "「Thợ tiện gỗ, vừa là những người làm nghề\nliên quan đến rừng núi,\nvừa là những chức sắc tôn giáo trong tín\nngưỡng thờ núi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「山岳信仰？」
1792 = "「Tín ngưỡng thờ núi?」"

# 【双鉄】
# display as 雙鐵
# JP: 「山そのものや、山に連なる自然を神格とする信仰だ」
1784 = "「Là tín ngưỡng tôn thờ bản thân ngọn núi,\nvà thiên nhiên gắn liền với ngọn núi đó\nnhư một vị thần.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ……神道、ヤオヨロズ？」
1701 = "「A... Thần đạo, tám triệu vị thần?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「広義にとれば、確かに。が、山岳信仰の信仰対象は\n山と、それに連なる自然たちに特化しています」
1798 = "「Theo nghĩa rộng thì đúng là vậy. Nhưng\nđối tượng tín ngưỡng của tín ngưỡng thờ\nnúi\nchỉ chuyên biệt vào núi và thiên nhiên gắn\nliền với nó thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ん……と」
1723 = "「Ưm... thì」"

# monologue
# JP: ポーレットはやや混乱している。\nひとつひとつ、順を追うほうが良いだろう。
2580 = "Paulette có vẻ hơi bối rối.\nCó lẽ nên giải thích từng bước một."

# 【双鉄】
# display as 雙鐵
# JP: 「山岳信仰の宗教者であれば、山伏が良く知られている。\n映像を見たことはないか？　法螺貝を持って、白装束で」
2056 = "「Nếu là người theo tín ngưỡng thờ núi, thì\nYamabushi là nổi tiếng nhất.\nEm đã từng thấy trên phim ảnh chưa? Những\nngười mặc đồ trắng, cầm vỏ ốc xà cừ ấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、ヤマブシはわかります。\n――あの人たちが、山岳信仰の人？」
1721 = "「A, Yamabushi thì em biết.\n——Họ là những người theo tín ngưỡng thờ\nnúi sao?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そうですね。山伏は山中の[しゅげん,1]修験――修行をもって、\n山と一体化し、悟りを得ることを目的とする信仰者です」
1880 = "「Đúng vậy. Yamabushi là những tín đồ thực\nhành tu luyện trong núi——\nvới mục đích hòa làm một với ngọn núi và\nđạt được giác ngộ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
1728 = "「Vâng.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「片や木地師は、山や森といった自然を降ろす[よりしろ,1]依代――\n即ち“面”を作ることにより信仰を示しました」
2029 = "「Mặt khác, những người thợ tiện gỗ lại thể\nhiện tín ngưỡng của mình bằng cách tạo ra\nvật ký thác——\ntức là những chiếc 'mặt nạ' để rước thiên\nnhiên như núi non, rừng rậm giáng trần.」"

# 【双鉄】
# display as 雙鐵
# JP: 「面、ですか？\nそれは――仏師が仏像を作るようなものでしょうか？」
2167 = "「Mặt nạ, sao ạ?\nĐiều đó——giống như thợ điêu khắc làm tượng\nPhật phải không ạ?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「そうですね。そうして作られた面は、祈祷の対象として、\nあるいは舞に、あるいは呪術に用いられたそうです」
1892 = "「Đúng vậy. Những chiếc mặt nạ được tạo ra\nnhư vậy,\nnghe nói được dùng làm đối tượng để cầu\nnguyện, hoặc trong các điệu múa, hoặc\ntrong các nghi lễ ma thuật.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。――っ！？」
1638 = "「Ra là vậy. ——!?」"

# monologue
# JP: 不意に繋がる。
2497 = "Đột nhiên, mọi thứ kết nối lại với nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「ひょっとして、赤井阿蘇神社の特徴である、\n[きめんづく,2]鬼面造りというのは――」
2162 = "「Không lẽ, đặc trưng của đền Akai Aso,\nkiến trúc mặt quỷ chính là——」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ご存知でしたか、そのとおりです」
1623 = "「Cháu biết điều đó sao, đúng là vậy đấy.」"

# monologue
# JP: 満足そうな、深い頷き。
2432 = "Một cái gật đầu sâu, đầy vẻ mãn nguyện."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「あの[きめん,1]鬼面は、木地師によって奉納されたものだそうです。\nこの[やしろ]社は、木地師達の社だったのかもしれません」
2123 = "「Chiếc mặt quỷ đó, nghe nói là do những\nngười thợ tiện gỗ dâng lên.\nNgôi đền này, có lẽ từng là ngôi đền của\nnhững người thợ tiện gỗ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから、御一夜という土地にも、\n多くの古いキジ馬が残されているのですか？」
1935 = "「Vì vậy, ở vùng đất Ohito này,\nmới còn lưu giữ nhiều ngựa Kiji cổ đến vậy\nsao?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「かもしれませんね」
1593 = "「Có thể là vậy.」"

# monologue
# JP: これは……いや、実に面白い。\n駅弁のモチーフのひとつは、是非キジ馬にするべきだ。
2393 = "Cái này... không, thực sự rất thú vị.\nMột trong những chủ đề của cơm hộp nhà ga,\nnhất định phải là ngựa Kiji."

# monologue
# JP: その上で、例えば掛け紙の裏にでも、\n“キジ馬と御一夜”的な説明文をつければ、なおよかろう。
2398 = "Hơn nữa, nếu in thêm một đoạn giải thích\nvề 'Ngựa Kiji và Ohito'\nlên mặt sau của giấy gói cơm hộp thì càng\ntuyệt vời."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。\nこれはすばらしい話をお伺いさせていただいたな」
1958 = "「Paulette.\nChúng ta vừa được nghe một câu chuyện\ntuyệt vời đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「本当に」
1883 = "「Thật sự luôn.」"

# monologue
# JP: ポーレットの頬が紅潮している。\n声など、緊張しているように硬くなってしまっている。
2592 = "Hai má Paulette ửng đỏ.\nGiọng nói cũng cứng lại như đang căng\nthẳng."

# 【ポーレット】
# display as 波萊特
# JP: 「あの、宮司さん。つかぬことをおたずねしますけど――\nええと……その辺に関する資料などはありますか？」
2125 = "「À, thưa thầy. Cháu xin phép hỏi một câu\nhơi đường đột——\nỪm... Thầy có tài liệu nào liên quan đến\nvấn đề này không ạ?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「奉納の記録なら、古い[ほうがちょう,2]奉加帳に残っております。\n[ねぎ,1]禰宜の日記などにも関連の記述がありましたね、確か」
1739 = "「Nếu là ghi chép về việc dâng cúng thì vẫn\ncòn lưu lại trong sổ công đức cũ.\nTrong nhật ký của đền phó hình như cũng có\nghi chép liên quan thì phải.」"

# 【ポーレット】
# display as 波萊特
# JP: 「でしたら――あの、赤井阿蘇神社。\nわたし、前から思ってたんですけど」
2138 = "「Nếu vậy thì——à, đền Akai Aso.\nTừ trước đến nay cháu vẫn luôn nghĩ,」"

# monologue
# JP: ごくりと、真っ白な喉が動く。
2593 = "Cái cổ trắng ngần khẽ nuốt nước bọt."

# 【ポーレット】
# display as 波萊特
# JP: 「有形文化財指定の推薦、\n行わせていただいてもよろしいでしょうか？」
2033 = "「Cho phép cháu tiến hành đề cử đền\nlàm Tài sản văn hóa vật thể được không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「文化財指定！」
1852 = "「Được công nhận là tài sản văn hóa!」"

# monologue
# JP: さすがは市長と驚かされる。\n僕にはまるでない発想だ。
2308 = "Đúng là Thị trưởng có khác, thật đáng kinh\nngạc.\nĐó là một ý tưởng mà tôi hoàn toàn không\nnghĩ tới."

# monologue
# JP: 文化財指定を勝ち得たのなら、\n赤井阿蘇神社の、ひいては御一夜市の知名度も高まろう。
2675 = "Nếu giành được danh hiệu Tài sản văn hóa,\nđộ nhận diện của đền Akai Aso, và cả thành\nphố Ohito sẽ tăng lên đáng kể."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「いや――\n確かにこの社は歴史ある建造物ではありますが」
1568 = "「À không——\nĐúng là ngôi đền này là một công trình\nkiến trúc có bề dày lịch sử, nhưng...」"

# 【ポーレット】
# display as 波萊特
# JP: 「文化的な価値、物凄く高いです」
1844 = "「Giá trị văn hóa của nó cực kỳ cao đấy ạ.」"

# monologue
# JP: 断言だ。\nポーレットが。
2587 = "Một lời khẳng định chắc nịch.\nTừ Paulette."

# 【ポーレット】
# display as 波萊特
# JP: 「さっき見た、たくさんの“なんとかぐるま”って、\n日ノ本全土に散っているものなんですよね？」
1812 = "「Rất nhiều 'xe gì gì đó' mà chúng ta vừa\nxem,\nlà những thứ nằm rải rác trên khắp\nHinomoto đúng không ạ?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「それはそうですが――」
2157 = "「Chuyện đó thì đúng là vậy, nhưng——」"

# 【ポーレット】
# display as 波萊特
# JP: 「ならそうした物が残っている土地も含めて調査すれば、\nキジ師達の技術の変遷や流れがきっと、明らかになる」
2139 = "「Vậy nếu chúng ta điều tra cả những vùng\nđất còn lưu giữ những thứ đó,\nthì chắc chắn sẽ làm sáng tỏ được quá\ntrình phát triển và dòng chảy kỹ thuật của\nnhững người thợ tiện gỗ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「木地師文化と――\nその集積地としての御一夜、赤井阿蘇神社」
1924 = "「Văn hóa thợ tiện gỗ và——\nOhito, đền Akai Aso với tư cách là nơi tập\ntrung của văn hóa đó.」"

# monologue
# JP: 感心が漏れてしまっての呟きに、強い頷きが返される。
2493 = "Tiếng lẩm bẩm đầy ngưỡng mộ của tôi được\nđáp lại bằng một cái gật đầu mạnh mẽ."

# 【ポーレット】
# display as 波萊特
# JP: 「こことキジ師との繋がりは余り知られていない、と、\nさきほど、宮司さんはおっしゃってましたよね？」
1632 = "「Mối liên hệ giữa nơi này và những người\nthợ tiện gỗ không được nhiều người biết\nđến,\nlúc nãy thầy vừa nói vậy đúng không ạ?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ええ」
# 1728 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは、つまりは誰も調査していないということ。\n知らず埋もれさせてしまうのは、良くないです、これ」
1586 = "「Điều đó có nghĩa là chưa có ai điều tra\ncả.\nCứ để nó bị chôn vùi trong bóng tối như\nvậy là không tốt đâu ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「良くない、とは……\n学術的な意味ででしょうか？」
1570 = "「Không tốt, nghĩa là...\ntheo khía cạnh học thuật sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そのとおりです」
1948 = "「Đúng vậy ạ.」"

# monologue
# JP: 声が、落ち着きを取り戻す。
2410 = "Giọng nói của cô ấy đã lấy lại được sự\nbình tĩnh."

# monologue
# JP: 勢い込んでいた言葉は、\nひとことひとこと、噛み締められるようになる。
2368 = "Những lời nói từng tuôn ra mạnh mẽ,\ngiờ đây được nói ra một cách cẩn trọng,\nchắc nịch từng chữ một."

# 【ポーレット】
# display as 波萊特
# JP: 「今日ある資料が、明日には焼却されるかもしれない。\n――歴史や文化の記録・調査は時間との争いですから」
1825 = "「Tài liệu có ngày hôm nay, ngày mai có thể\nsẽ bị thiêu rụi.\n——Ghi chép và điều tra lịch sử, văn hóa là\nmột cuộc chạy đua với thời gian mà.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「なるほど」
1639 = "「Ra là vậy.」"

# monologue
# JP: 深く。\n赤井宮司は頷く。
2712 = "Thầy tế Akai\ngật đầu thật sâu."

# monologue
# JP: 頷くだけに留まらず、\n正した姿勢からもう一度、ポーレットに向け頭を下げる。
2342 = "Không chỉ gật đầu,\nthầy còn chỉnh lại tư thế, cúi đầu chào\nPaulette một lần nữa."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「[もう]蒙を[ひら]啓かれた心持ちです」
1813 = "「Tôi cảm thấy như vừa được khai sáng vậy.」"

# monologue
# JP: が、ポーレットは困惑顔だ。
2318 = "Nhưng, Paulette lại tỏ vẻ bối rối."

# 【ポーレット】
# display as 波萊特
# JP: 「モウをヒラかれた？」
2012 = "「Khai sáng ạ?」"

# monologue
# JP: “不明を明かし、導いてもらった”というほどの意味だが、\n僕が赤井宮司を不明呼ばわりも出来ん。
2755 = "「『Nhờ cháu mà tôi đã nhận ra được một điều\ntuyệt vời』——\nCứ hiểu như vậy là được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「『良いことに気づかせてもらった』――\nと解釈しておけば良いと思う」
1617 = "「A... Dạ không!? Dạ, đâu có. Thầy quá khen\nrồi ạ.\nNhưng——dạ... vậy thì?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ……いえっ！？　あの、そんな。とんでもないです。\nけど――あの……それなら？」
1704 = "「Vâng. Về việc đề cử Tài sản văn hóa.\nTôi rất mong cô sẽ giúp đỡ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ええ。文化財指定への推薦の件。\nこちらから、お願いいたしたく思います」
1983 = "「Cháu cảm ơn thầy!\nNgay ngày mai, cháu sẽ sắp xếp để người\nphụ trách từ Ban Tài sản Văn hóa đến đây\nạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます！　\n明日にでも、文化財課から担当者を送るよう手配します」
2061 = "「Trăm sự nhờ cô.\nÀ——phải rồi.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「よろしくお願いいたします。\nっと――そうだ」
1782 = "「Trăm sự nhờ cô.\nÀ——phải rồi.」"

# monologue
# JP: 赤井宮司は、いきなり僕へと視線を移す。
2708 = "Thầy tế Akai đột nhiên chuyển ánh nhìn\nsang tôi."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「古い資料でしたら、\n[たいと,1]汰斗さんにお譲りした物もあります」
2057 = "「Nếu là tài liệu cũ,\nthì có một số thứ tôi đã nhượng lại cho\nông Taito đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんにですか？」
1945 = "「Cho ông Taito ạ?」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ええ、あの方は御一夜と鉄道とを愛しておられた。\nその二つを復活させるため、手を尽くしておられた」
1900 = "「Vâng, ông ấy rất yêu Ohito và đường sắt.\nÔng ấy đã làm mọi cách để vực dậy hai thứ\nđó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1728 = "「嗯」" 

# monologue
# JP: 深く、頷く。\nそのことならば、この身をもって知っている。
2506 = "Tôi gật đầu thật sâu.\nChuyện đó, chính bản thân tôi là người\nhiểu rõ nhất."

# 【赤井宮司】
# display as 赤井宮司
# JP: 「木地師関係の物がまだ右田家に残っていれば、\nきっとなにかの助けになるでしょう」
1761 = "「Nếu những thứ liên quan đến thợ tiện gỗ\nvẫn còn ở nhà Migita,\nthì chắc chắn sẽ giúp ích được gì đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「汰斗さんの蔵書の中に――\nなら、まだあるかもしれません」
1755 = "「Trong đống sách của ông Taito——\nVậy thì có lẽ vẫn còn.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「それは何よりです」
2135 = "「Thế thì còn gì bằng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
1635 = "「Cháu cảm ơn thầy ạ.」"

# monologue
# JP: 頭を下げて見ればふと、\n自分の不明がおかしくなる。
2472 = "Khi cúi đầu xuống, tôi chợt thấy\nsự thiếu hiểu biết của mình thật nực cười."

# monologue
# JP: まさしく、これこそ、灯台もと暗しというヤツだろう。
2735 = "Đây đúng là trường hợp 'chân đèn thì tối'\nrồi."

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみればあの蔵書――資料群こそヒントの山だ。\n気付かなかった自分が、いささか恥ずかしくあります」
2030 = "「Nghe thầy nói cháu mới nhận ra, đống sách\nđó——chính là một núi manh mối.\nCháu cảm thấy hơi xấu hổ vì đã không nhận\nra điều đó sớm hơn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたしもです……\nあの資料群なら前にも見せていただいてるのに」
1818 = "「Cháu cũng vậy...\nCháu đã từng được xem qua đống tài liệu đó\nrồi mà.」"

# monologue
# JP: 振り向けば、ポーレットと視線が重なりあう。\nほとんど同時に、僕らは声まで重ねあう。
2481 = "Quay lại, ánh mắt tôi chạm phải ánh mắt\nPaulette.\nGần như cùng lúc, giọng nói của chúng tôi\nvang lên."

# 【双鉄】
# display as 雙鐵＆波萊特
# JP: 「[もう]蒙を[ひら]啓かれた心持ちです」\n「モウをヒラかれた心持ちです」
2097 = "「Cảm giác như vừa được khai sáng vậy.」\n「Cảm giác như vừa được khai sáng vậy.」"

# monologue
# JP: 僕に与えられた部屋の、次の間。\n汰斗さんの蔵書や資料を、とにかく詰め込みまくった部屋。
2487 = "Căn phòng bên cạnh phòng của tôi.\nMột căn phòng chất đầy sách và tài liệu\ncủa ông Taito."

# monologue
# JP: 僕とポーレットとれいな。\n三人だけで、もう四時間はこもっている。
2482 = "Tôi, Paulette và Reina.\nBa chúng tôi đã nhốt mình trong này suốt\nbốn tiếng đồng hồ."

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅ……結構あるものだな」
1670 = "「Phù... Nhiều thật đấy.」"

# monologue
# JP: これで、和綴じのものを含めた書籍が十一冊目め。\n書付けの類がさらに六冊。
2654 = "Đây đã là cuốn sách thứ mười một, bao gồm\ncả sách đóng gáy kiểu Nhật.\nThêm sáu tập ghi chép nữa."

# monologue
# JP: ちら、とポーレットを見れば、やはり書籍を小山と積み、\n巻物めいたなにかを広げ、覗きこんでる。
2495 = "Liếc nhìn Paulette, cô ấy cũng xếp sách\nthành một đống nhỏ,\nđang mở một thứ gì đó giống như cuộn giấy\nra và chăm chú nhìn vào."

# monologue
# JP: （中身を改めているのなら、\n一通り、探し終わったということか）
2771 = "（Nếu cô ấy đang xem xét nội dung,\nnghĩa là đã tìm xong một lượt rồi sao）"

# monologue
# JP: さすが、“地道な作業は得意”と自認するだけはある。
2459 = "Đúng như cô ấy tự nhận, 'giỏi những công\nviệc đòi hỏi sự kiên nhẫn'."

# monologue
# JP: 僕の方は、受け持ち分の半分までしか\nまだ確かめられていないのに――
2664 = "Trong khi tôi mới chỉ kiểm tra được\nmột nửa phần việc của mình——"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1700 = "「A.」"

# monologue
# JP: 僕の視線に気づいたのか、\nポーレットが顔をあげ、くるくる器用に巻物をとじる。
2582 = "Có vẻ nhận ra ánh mắt của tôi,\nPaulette ngẩng đầu lên, khéo léo cuộn tròn\ncuộn giấy lại."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんもそんなにですか。\nここの資料、本当にすごい量ですね」
2159 = "「Anh Soutetsu cũng tìm được chừng đó rồi\nạ.\nTài liệu ở đây nhiều thật đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1728 = "「嗯」" 

# monologue
# JP: ポーレットのフォローをするつもりの僕が、\nポーレットの時間を使わせてしまっている。
2478 = "Đáng lẽ tôi phải là người hỗ trợ Paulette,\nnhưng lại đang làm mất thời gian của cô\nấy."

# monologue
# JP: 申し訳ないような気持ちを、\nけれど笑顔が、一瞬にして飛ばしてくれる。
1286 = "Cảm giác tội lỗi trào dâng,\nnhưng nụ cười của cô ấy đã xua tan nó\ntrong chớp mắt."

# 【ポーレット】
# display as 波萊特
# JP: 「これだけあれば、きっと、\n調査にも本腰をいれてもらえるって思います！」
1911 = "「Với chừng này tài liệu, chắc chắn,\nhọ sẽ bắt tay vào điều tra một cách nghiêm\ntúc thôi!」"

# monologue
# JP: 嬉しくてたまらなそうな顔と言葉に、\n萎えかけていた気力が戻る。
2404 = "Khuôn mặt và lời nói vui sướng tột độ của\ncô ấy,\nđã tiếp thêm sinh lực cho tôi đang dần\nkiệt sức."

# monologue
# JP: 止まってしまってた手を動かせば、\n口もなめらかに動き始める。
2476 = "Đôi tay đang dừng lại bắt đầu cử động,\nmiệng cũng bắt đầu nói năng lưu loát hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、文化財指定というアイディアには驚いた」
1581 = "「Nhưng mà, ý tưởng công nhận Di sản Văn\nhóa làm anh ngạc nhiên đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そんな。前々から役所で出ていただけのお話です」
1591 = "「Đâu có ạ. Chuyện đó ở tòa thị chính đã\nbàn từ lâu rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうした話をあのタイミングで切り出せるのも、\n実力だ」
2032 = "「Việc có thể đưa ra đề tài đó vào đúng\nthời điểm như vậy,\ncũng là một loại năng lực đấy.」"

# monologue
# JP: 赤井宮司は、かなり控えたがる性格らしいし――
2623 = "Thầy tế Akai có vẻ là người khá khiêm\ntốn——"

# monologue
# JP: 観光のため、宣伝のためという理由でお願いしたのなら、\n恐らくは、推薦の話もあっさり断っていただろう。
2415 = "Nếu nhờ vả với lý do vì du lịch, vì quảng\nbá,\nthì có lẽ chuyện tiến cử đã bị từ chối\nthẳng thừng rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜のこと、文化のこと。\n普段から興味を持たぬ者では、ああいう話は出てこない」
1751 = "「Chuyện về Ohito, chuyện về văn hóa.\nNếu không phải là người luôn quan tâm đến\nnhững điều đó thì sẽ không thể nói ra được\nnhững lời như vậy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そんな……わたし、\nただ……鉄道が好きなだけですから」
1693 = "「Đâu có... em,\nchỉ là... thích đường sắt thôi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや？　それは知っているが――」
1574 = "「Không? Chuyện đó thì anh biết, nhưng——」"

# monologue
# JP: 鉄道好きと、文化面への興味や知識。
2438 = "Sở thích đường sắt, cùng với sự quan tâm\nvà kiến thức về mặt văn hóa."

# monologue
# JP: それが今ひとつつながらず、\n聞き違えかとさえ思ってしまう。
2734 = "Hai điều đó hiện tại vẫn chưa thể liên kết\nvới nhau,\nkhiến tôi thậm chí còn nghĩ mình đã nghe\nnhầm."

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、ただただ鉄道が好きで、鉄道旅行が好きで。\n日ノ本のことも好きで、もっともっと知りたくて」
1831 = "「Em, chỉ đơn giản là thích đường sắt,\nthích đi du lịch bằng tàu hỏa.\nCũng thích Hinomoto nữa, và muốn biết\nnhiều hơn, nhiều hơn nữa.」"

# monologue
# JP: セーヌのことを語った時と同じ――\nいや、それ以上の熱意を感じる。
2485 = "Giống hệt như lúc cô ấy nói về sông\nSeine——\nKhông, tôi còn cảm nhận được sự nhiệt\nhuyết mãnh liệt hơn thế."

# 【ポーレット】
# display as 波萊特
# JP: 「だから、土地と土地との繋がりとか、そういうことにも、\n自然と興味を、持つようになっただけのことなんです」
1849 = "「Thế nên, em cũng tự nhiên nảy sinh hứng\nthú\nvới sự kết nối giữa vùng đất này và vùng\nđất khác thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、少し理解できたように思う」
1640 = "「Ra là vậy, anh nghĩ mình đã hiểu được một\nchút rồi.」"

# monologue
# JP: 思えば、僕の意識も高まる。\n彼女の美徳を見習いたいと素直に思う。
2736 = "Nghĩ vậy, ý thức của tôi cũng được nâng\ncao.\nTôi thực sự muốn học hỏi những đức tính\ntốt đẹp của cô ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、学究肌であるのだな。\n興味あることを突き詰めていくのが好きなのだ」
1989 = "「Paulette có tố chất của một học giả nhỉ.\nThích đào sâu tìm hiểu những điều mình\nquan tâm.」"

# 【ポーレット】
# display as 波萊特
# JP: 「学究肌なんて……そんないいものじゃないですよ。\n好きなこと――もっと知りたくなるの、普通だと思うし」
1769 = "「Tố chất học giả gì chứ... Không có gì to\ntát đâu ạ.\nNhững thứ mình thích——muốn tìm hiểu thêm\nvề nó là chuyện bình thường mà.」"

# monologue
# JP: こくっと、小さくツバを飲む音。
2625 = "Tiếng nuốt nước bọt khe khẽ."

# 【ポーレット】
# display as 波萊特
# JP: 「その好きが――わたし、多分、しつこいんです。\n長く続くっていうか……ずっと飽きない、それだけです」
1837 = "「Sự yêu thích đó——chắc là em khá cố chấp.\nNói đúng hơn là kéo dài rất lâu... luôn\nkhông biết chán, chỉ vậy thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「一途であり、愚直であることは、\n何かを為すために、恐らく大事なことだろう」
1777 = "「Sự chung thủy, và sự kiên định,\ncó lẽ là điều quan trọng để làm nên một\nviệc gì đó.」"

# monologue
# JP: 汰斗さんにも通じることだ。
2559 = "Điều này cũng giống với ông Taito."

# monologue
# JP: 愚直なまでに積み重ねてきたその遺産によって、\n僕たちは今、大いに助けられている。
2324 = "Nhờ di sản mà ông ấy đã kiên định tích\nlũy,\nchúng tôi hiện tại đang được giúp đỡ rất\nnhiều."

# 【双鉄】
# display as 雙鐵
# JP: 「僕などは、簡単に意見を変えてしまうからな。\nポーレットのいうしつこさが、少し眩しい」
1842 = "「Người như anh thì rất dễ dàng thay đổi ý\nkiến.\nSự cố chấp mà Paulette nói, đối với anh có\nchút chói lóa đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「……双鉄くんは、だから強いんですよ」
1309 = "「...Đó chính là điểm mạnh của anh Soutetsu\nđấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
1733 = "「Hửm?」"

# monologue
# JP: 思わぬ言葉に、本と向き合っていた顔を動かす。\nポーレットの青い瞳も、僕をじいっと見つめている。
2490 = "Trước những lời nói bất ngờ đó, tôi ngẩng\nmặt lên khỏi cuốn sách.\nĐôi mắt xanh biếc của Paulette cũng đang\nchăm chú nhìn tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「固執しないで、間違っていると確信したらすぐ止める。\nどんなに強い痛みでも、それを恨みに固まらせない」
1984 = "「Không cố chấp, nếu chắc chắn mình sai thì\nsẽ dừng lại ngay.\nDù có đau đớn đến đâu, cũng không để nó\nhóa thành thù hận.」"

# monologue
# JP: ドキンと、心臓が跳ね上がる。
2650 = "Trái tim tôi bỗng đập thịch một cái."

# monologue
# JP: この目が、言葉が――僕を過去へと引きずるようで、\n過去の大事な想い出と、重なりあっていきそうで。
2408 = "Đôi mắt này, những lời nói này——như đang\nkéo tôi về quá khứ,\nnhư đang hòa quyện vào những ký ức quan\ntrọng trong quá khứ."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが変えるのは、意見ではなく過ちです。\nわたしには、だから双鉄くんの強さが、眩しい」
2160 = "「Thứ anh Soutetsu thay đổi không phải là ý\nkiến, mà là sai lầm.\nVì vậy, sự mạnh mẽ của anh đối với em,\nthật chói lóa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット……」
1957 = "「Paulette...」"

# monologue
# JP: その評価が、果たしてどこから来ているのか。\n過去の僕を、ポーレットは知っているのではないか。
2406 = "Sự đánh giá đó, rốt cuộc là từ đâu mà có.\nPhải chăng Paulette đã biết về quá khứ của\ntôi."

# monologue
# JP: 尋ねれば済むことであるのに、\nなぜか言葉が、喉に張り付く。
2547 = "Chỉ cần hỏi là xong chuyện,\nnhưng không hiểu sao lời nói cứ nghẹn lại\nở cổ họng."

# 【ポーレット】
# display as 波萊特
# JP: 「どうしました？　双鉄くん」
1808 = "「Sao vậy ạ? Anh Soutetsu.」"

# monologue
# JP: だが――怯えることに意味などない。
2325 = "Nhưng——sợ hãi cũng chẳng ích gì."

# monologue
# JP: ポーレットが僕の過去を知っていようと知っていまいと、\n今の僕らに、何の影響があるわけでもない……筈だから。
2311 = "Dù Paulette có biết quá khứ của tôi hay\nkhông,\nthì cũng chẳng ảnh hưởng gì đến chúng tôi\ncủa hiện tại... Chắc là vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
1959 = "「Paulette.」"

# monologue
# JP: だから言葉を引き剥がす。\n向き合うべきに、向き合うために。
2510 = "Vì vậy, tôi cố bật ra thành lời.\nĐể đối mặt với những gì cần đối mặt."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は君に、聞きたいことがひとつ」
1840 = "「Anh có một chuyện muốn hỏi em.」"

# 【れいな】
# display as 玲奈
# JP: 「あのぉポーレットぉ、ちょおっといいですかぁ？」
2126 = "「Dạ, chị Paulette ơi, cho Reina hỏi một\nchút được không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2172 = "「!」"

# 【ポーレット】
# display as 波萊特
# JP: 「れいな？　どうしたの？」
1976 = "「Reina? Có chuyện gì thế?」"

# monologue
# JP: 部屋の奥からのれいなの声に、気付かされる。\n今、僕が向き合うべきは、本と資料だ。
2507 = "Giọng nói của Reina từ trong góc phòng kéo\ntôi bừng tỉnh.\nLúc này, thứ tôi cần đối mặt là sách vở và\ntài liệu."

# monologue
# JP: 何故、そんな単純なことを見失いそうになったのか、\n自分で自分を、把握できない。
2609 = "Tại sao tôi lại suýt quên mất một điều đơn\ngiản như vậy,\nchính tôi cũng không hiểu nổi bản thân\nmình nữa."

# 【れいな】
# display as 玲奈
# JP: 「れいな、面白いものみつけちゃいましたぁ」
1972 = "「Reina, vừa tìm thấy một thứ thú vị lắm\nnha.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　なになにっ」
1673 = "「Hả? Gì thế gì thế.」"

# monologue
# JP: ポーレットの体がぐるん、れいなの声が響いている、\n部屋の奥の方へと向かう。
2590 = "Paulette xoay người,\nhướng về góc phòng nơi giọng nói của Reina\nvang lên."

# monologue
# JP: 無理もない。僕等は木地師、キジ馬、御一夜関連。\nれいなは鉄道関連と、手分けして探していたのだから。
2560 = "Cũng phải thôi. Chúng tôi đang chia nhau\nra tìm, tôi và Paulette tìm về thợ tiện\ngỗ, ngựa Kiji, Ohito.\nCòn Reina thì tìm về đường sắt mà."

# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ、これ、\n地図って書いてあるんですけどぉ」
1619 = "「Là thế này nha, cái này,\ncó ghi là bản đồ đó ạ.」"

# monologue
# JP: ぽてぽてと、れいながこちらにやってくる。\n両手いっぱいにひろげているのは――
2620 = "Reina lạch bạch chạy về phía chúng tôi.\nThứ em ấy đang dang rộng bằng cả hai tay\nlà——"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、古地図か――\n御一夜の……いや、もっと広域のものか」
1688 = "「Ồ, bản đồ cổ sao——\nCủa Ohito... Không, khu vực rộng hơn thế.」"

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l大詔;#00ffc040;大詔%l;#;の頃のものでしょうかね？\n[ていてつゆのいせん,4]帝鉄湯医線って、ほら、ここ」
2104 = "「Có lẽ là từ thời \\x%l大詔;#00ffc040;Đại Chiếu%l;#; nhỉ?\nTuyến Teitetsu Yui này, anh xem, ở đây.」"

# 【双鉄】
# display as 雙鐵
# JP: 「大廃線のはるか以前か。\nああ――鉄道路線は、九洲を[もうら,1]網羅していたのだなぁ」
1890 = "「Là từ rất lâu trước Đại bãi bỏ sao.\nA——Các tuyến đường sắt đã từng bao phủ\nkhắp Kyushu nhỉ.」"

# monologue
# JP: [ハカタ,1]博太、[サガ,1]左賀、[ナガサキ,1]永崎、[クマモト,1]隈元、[カゴシマ,2]夏午島、[ミヤザキ,1]宮嵜、[オオイタ,1]大板――
2363 = "Hakata, Saga, Nagasaki, Kumamoto,\nKagoshima, Miyazaki, Oita——"

# monologue
# JP: この全てを鉄道でたどることが出来ていた――\n途切れぬ白と黒との線は、過去の栄光を浮き上がらせる。
2746 = "Tất cả những nơi này đều có thể đi đến\nbằng đường sắt——\nNhững đường kẻ trắng đen liền mạch làm nổi\nbật lên ánh hào quang của quá khứ."

# 【れいな】
# display as 玲奈
# JP: 「あのですね、それで、これなんです」
2124 = "「Cái đó thì, tiếp theo, là cái này nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1699 = "「Hừm?」"

# monologue
# JP: れいなが示す一点には、馴染みある文字が記されている。
2617 = "Tại một điểm mà Reina chỉ vào, có ghi một\ndòng chữ quen thuộc."

# 【双鉄】
# display as 雙鐵
# JP: 「[じゅつせんどう,2]術仙洞駅――\nそうか、この頃にはまだ廃駅ではないのだな」
2048 = "「Ga Jussendo——\nRa vậy, thời điểm này nó vẫn chưa bị bãi\nbỏ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あれ？　これ」
1675 = "「Ủa? Cái này.」"

# 【れいな】
# display as 玲奈
# JP: 「ね？」
1778 = "「Đúng không ạ?」"

# monologue
# JP: ポーレットとれいなとが、\nなぜか目と目を見交わしている。
2581 = "Paulette và Reina,\nkhông hiểu sao lại nhìn nhau trao đổi ánh\nmắt."

# monologue
# JP: 青い瞳が僕へ向く。\nが、“ね？”と言えるような理解を僕はできていない。
2583 = "Đôi mắt xanh hướng về phía tôi.\nNhưng tôi vẫn chưa hiểu chuyện gì đang xảy\nra để mà 'Đúng không ạ?'."

# 【双鉄】
# display as 雙鐵
# JP: 「なにがだ？」
1809 = "「Cái gì vậy?」"

# 【ポーレット】
# display as 波萊特
# JP: 「これ……この線です」
2108 = "「Cái này... đường kẻ này ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1699 = "「唔？」" 

# monologue
# JP: 言われてみれば、術仙炭鉱駅から\n術仙洞の文字の上、鉱山の地図記号へと、線がある。
2414 = "Nghe cô ấy nói tôi mới để ý, từ ga Mỏ than\nJussen\nđến ký hiệu bản đồ mỏ phía trên chữ\nJussendo, có một đường kẻ."

# monologue
# JP: 縫合の痕跡のようなその線は、確か……
2738 = "Đường kẻ trông như vết khâu đó, hình như\nlà..."

# 【双鉄】
# display as 雙鐵
# JP: 「私鉄――か？　これは」
2103 = "「Đường sắt tư nhân——sao? Cái này.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、その可能性が極めて高いと思います」
1902 = "「Vâng, em nghĩ khả năng cao là vậy ạ.」"

# 【れいな】
# display as 玲奈
# JP: 「きっと、鉱山鉄道ですよぉ」
2096 = "「Chắc chắn là đường sắt mỏ đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「鉱山鉄道……」
2005 = "「Đường sắt mỏ...」"

# monologue
# JP: オウム返しの僕の言葉に、\nれいなはぴょこん、跳ねるようにして体で頷く。
2505 = "Nghe tôi lặp lại như một con vẹt,\nReina gật đầu cái rụp, cả người nảy lên."

# 【れいな】
# display as 玲奈
# JP: 「はぁい。いいですよねぇ。\nれいな、そこでも走ってみたかったですぅ」
1893 = "「Vâng ạ. Thích quá đi nha.\nReina, cũng muốn thử chạy ở đó một lần ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「走る――どうなのだ？　出来るのか？\n例えば、実際にキハ[レイナナ,1]07で」
2078 = "「Chạy sao——Thế nào? Có làm được không?\nVí dụ như, chạy thực tế bằng KiHa 07.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1682 = "「Hả?」"

# monologue
# JP: きょとんとした顔。\nそしてふるふる、申し訳無さそうに頭がふられる。
2665 = "Khuôn mặt ngơ ngác.\nRồi cô ấy lắc đầu nguầy nguậy vẻ áy náy."

# 【ポーレット】
# display as 波萊特
# JP: 「もう、とっくの昔に廃線されてますよ？\n術仙炭鉱廃駅の近くに、そんな設備は」
2136 = "「Tuyến đường đó đã bị bãi bỏ từ lâu lắm\nrồi mà?\nGần nhà ga Mỏ than Jussen bị bỏ hoang, làm\ngì còn thiết bị nào...」"

# 【双鉄】
# display as 雙鐵
# JP: 「近くに無くても奥ならどうだ？\n術仙炭鉱までにレールは、残ってないのか？」
1856 = "「Gần đó không có, nhưng ở sâu bên trong\nthì sao?\nĐường ray đến tận Mỏ than Jussen, chẳng lẽ\nkhông còn sót lại chút nào sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「それは……わたしには分かりません」
2099 = "「Chuyện đó... em cũng không rõ nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――ああいや、その前に」
1860 = "「Nếu vậy thì——A không, trước đó đã.」"

# monologue
# JP: しゃがみこみ、れいなと目線の高さをあわせる。
2502 = "Tôi ngồi xổm xuống, để tầm mắt ngang bằng\nvới Reina."

# monologue
# JP: ここを確認しておかなければ、\n骨折り損のくたびれもうけになりかねない。
2306 = "Nếu không xác nhận điều này,\nrất có thể sẽ xôi hỏng bỏng không."

# 【双鉄】
# display as 雙鐵
# JP: 「鉱山鉄道というものは、\nレールの幅が異なっていたりするものなのか？」
2007 = "「Đường sắt mỏ,\ncó khổ đường ray khác với đường sắt thông\nthường không?」"

# 【れいな】
# display as 玲奈
# JP: 「普通は、わざわざゲージを変えたりしませんよぉ？\nその方が、いろいろ便利ですからぁ」
1563 = "「Bình thường thì người ta không cất công\nđổi khổ đường ray đâu ạ.\nNhư vậy sẽ tiện lợi hơn nhiều mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だよな」
1588 = "「Đúng nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あっ！」
# 1711 = "「啊！」" 

# monologue
# JP: ポーレットの声。\n驚きと喜びが混じったような。
2584 = "Giọng nói của Paulette.\nNghe như xen lẫn giữa kinh ngạc và vui\nsướng."

# 【ポーレット】
# display as 波萊特
# JP: 「ひょっとして、双鉄くん――\n復線を考えているんですか？」
2163 = "「Không lẽ, anh Soutetsu——\nđang nghĩ đến việc khôi phục tuyến đường\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「レールの幅が同じであれば、\n乗り入れなども出来るようになるのだよな？」
1861 = "「Nếu khổ đường ray giống nhau,\nthì có thể chạy thẳng vào tuyến đó được\nđúng không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい！　もしも線路が状態よく残ってれば、\nそことつなげて、\x%lポイント;#00ffc040;ポイント%l;#;整備するだけですから」
1896 = "「Vâng! Nếu đường ray vẫn còn nguyên vẹn,\nthì chỉ cần nối với nó và bảo dưỡng lại \\x%lポイント;#00ffc040;công tắc%l;#;\nlà được ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「状態よく残っていれば――\nどうかな、面白いのではないかと考えている」
1763 = "「Nếu vẫn còn nguyên vẹn——\nThế nào, anh nghĩ ý tưởng này khá thú vị\nđấy chứ.」"

# monologue
# JP: 線路は、上質の鉄材だ。誰かが、恐らくは持ち去っている。\nが、術仙炭鉱付近は\x%lエアクラ;#00ffc040;エアクラ%l;#;の作動不能地帯――
2747 = "Đường ray là loại thép chất lượng cao. Có\nlẽ ai đó đã lấy trộm rồi.\nNhưng khu vực Mỏ than Jussen là vùng cấm\nhoạt động của \\x%lエアクラ;#00ffc040;Aircra%l;#;——"

# monologue
# JP: 廃線されてしまった後での持ち去りはひどく困難だろう。\nゆえ、森の奥へと入ってしまえば残っていそうな気もする。
2397 = "Sau khi tuyến đường bị bãi bỏ, việc vận\nchuyển chúng đi chắc chắn vô cùng khó\nkhăn.\nVì vậy, tôi có cảm giác nếu vào sâu trong\nrừng, có thể chúng vẫn còn sót lại."

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、体験採掘できる炭鉱などとして、\n観光振興のひとつと持っていくのはどうだろう？」
1936 = "「Ví dụ như, biến nó thành một mỏ than cho\nphép du khách trải nghiệm khai thác,\nđể làm một trong những điểm nhấn chấn hưng\ndu lịch thì sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「いいと思います！　少しでも石炭取れたら、\nハチロクちゃんのご飯の助けにもなりますし」
1845 = "「Em thấy hay lắm ạ! Nếu khai thác được\nchút than nào,\nthì cũng đỡ đần được phần nào bữa ăn cho\nHachiroku nữa.」"

# monologue
# JP: いたずらっぽく微笑んで、\nポーレットは強く、深く頷く。
2588 = "Nở nụ cười tinh nghịch,\nPaulette gật đầu thật mạnh, thật sâu."

# 【ポーレット】
# display as 波萊特
# JP: 「それよりなにより、今どき鉄道で鉱山までいけるのって\n――あ、どうかな？　鉄道に興味ない人にも面白い？？」
2027 = "「Hơn hết thảy, thời buổi này mà còn được\nđi tàu hỏa đến tận mỏ than\n——A, sao nhỉ? Liệu những người không hứng\nthú với đường sắt có thấy thú vị không??」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、面白そうだと感じているが……」
2037 = "「Anh thì thấy có vẻ thú vị đấy...」"

# monologue
# JP: 急に不安げになってしまったポーレット。\nつられて僕にも、弱気の虫が湧いてくる。
2586 = "Paulette đột nhiên trở nên bất an.\nKéo theo đó, tôi cũng bắt đầu thấy thiếu\ntự tin."

# monologue
# JP: いつの間に僕も、鉄道にずいぶんと詳しくなってきているのは確かだし……
2627 = "Đúng là từ lúc nào không hay, tôi cũng đã\ntrở nên khá am hiểu về đường sắt rồi..."

# 【双鉄】
# display as 雙鐵
# JP: 「そこは、相談をしてみよう。\n日々姫やふかみ、真闇姉あたりの意見は参考になろう」
2131 = "「Chuyện đó, cứ bàn bạc thử xem sao.\nÝ kiến của Hibiki, Fukami hay chị Mayami\nchắc sẽ có ích đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうですよね！」
1887 = "「Vâng, đúng vậy nhỉ!」"

# monologue
# JP: すごいお手柄！　とれいなの頭を撫でに撫で、\nポーレットは手早く、見つけた資料を集め始める。
2591 = "Giỏi quá đi! Paulette vừa xoa đầu Reina,\nvừa nhanh tay thu thập những tài liệu vừa\ntìm được."

# 【ポーレット】
# display as 波萊特
# JP: 「なら、スケジュールを確認しましょう。\n打ち合わせ、できるだけ早いほうがいいと思います」
2133 = "「Vậy thì, chúng ta kiểm tra lịch trình\nthôi.\nEm nghĩ nên họp bàn càng sớm càng tốt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ」
# 1728 = "「嗯」" 

# monologue
# JP: 居間ではあるが、広間でもある。
2474 = "Tuy là phòng khách, nhưng cũng là đại\nsảnh."

# monologue
# JP: これだけの人数が入ってもなお、\nこの部屋は、少しの窮屈さも感じさせない。
2441 = "Dù có ngần này người,\ncăn phòng vẫn không hề có cảm giác chật\nchội."

# 【日々姫】
# display as 日日姬
# JP: 「赤井阿蘇神社の文化財指定に……」
1776 = "「Đề cử đền Akai Aso làm Tài sản Văn\nhóa...」"

# 【ハチロク】
# display as 八六
# JP: 「鉱山鉄道の復線、それに名物駅弁ですか」
1634 = "「Khôi phục tuyến đường sắt mỏ, cùng với\nđặc sản cơm hộp nhà ga sao.」"

# monologue
# JP: 日々姫とハチロクの漏らした声には、\nあきれと感心、それが入り交じっているように聞こえる。
2536 = "Trong giọng nói thốt ra của Hibiki và\nHachiroku,\nnghe như có sự đan xen giữa ngạc nhiên và\nthán phục."

# 【ハチロク】
# display as 八六
# JP: 「この短期間に、よくもこれほどの案を」
2022 = "「Trong một thời gian ngắn như vậy, mà có\nthể nghĩ ra ngần này phương án.」"

# 【日々姫】
# display as 日日姬
# JP: 「ポーレットさんも兄さんも――\n忙しいに決まってるのに」
1876 = "「Chị Paulette và anh hai——\nrõ ràng là rất bận rộn mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、心配ない。\n僕は、むしろ充実している」
1572 = "「Không, đừng lo.\nAnh ngược lại còn thấy rất sung mãn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたしもです」
1819 = "「Em cũng vậy ạ.」"

# monologue
# JP: 明るい声に、不安になる。\nポーレットの体力面がどうであるのか、僕は知らない。
2753 = "Giọng nói tươi tắn khiến tôi thấy bất an.\nTôi không biết thể lực của Paulette thế\nnào."

# monologue
# JP: が――その確認はあとまわしでいい。\n皆にとっても、無論、時間は貴重なのだから。
2321 = "Nhưng——việc xác nhận đó để sau cũng được.\nĐối với mọi người, thời gian cũng rất quý\ngiá mà."

# 【双鉄】
# display as 雙鐵
# JP: 「今日は、その辺のことを相談したく、\nみなに集まってもらったのだ」
1598 = "「Hôm nay, anh tập hợp mọi người lại,\nchính là để bàn bạc về những chuyện đó.」"

# 【ポーレット】
# display as 波萊特
# JP: 「赤井阿蘇神社のことは、宮司さんと役所の担当者とで、\n基本、あとは進めてもらえると思います」
2073 = "「Chuyện của đền Akai Aso, về cơ bản,\nthầy tế và người phụ trách của tòa thị\nchính sẽ tiếp tục tiến hành.」"

# 【双鉄】
# display as 雙鐵
# JP: 「駅弁については、試作、試食を繰り返し、\nベストな形を模索していきたく思う」
2146 = "「Về cơm hộp nhà ga, chúng ta sẽ liên tục\nlàm thử, ăn thử,\nđể tìm ra hình thức hoàn hảo nhất.」"

# monologue
# JP: 僕の言葉に小さく頷き、\nハチロクが、強い瞳で見返してくる。
2349 = "Gật nhẹ đầu trước lời tôi nói,\nHachiroku nhìn lại tôi bằng ánh mắt kiên\nđịnh."

# 【ハチロク】
# display as 八六
# JP: 「でしたら、\nご相談の主眼は、鉱山鉄道についてでしょうか？」
2140 = "「Nếu vậy,\ntrọng tâm của buổi bàn bạc là về đường sắt\nmỏ phải không ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。術仙炭鉱跡の周辺に、\nそうした何かが残ってないか、誰かもしも」
1725 = "「Ừm. Xung quanh tàn tích Mỏ than Jussen,\ncó ai biết liệu còn sót lại thứ gì như vậy\nkhông.」"

# 【凪】
# display as 凪
# JP: 「炭鉱のあとなら、学園の遠足でいったばい！」
1768 = "「Nếu là tàn tích mỏ than, thì đợt dã ngoại\ncủa trường em có đi rồi nha!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1690 = "「Hô.」"

# monologue
# JP: こういうときに、凪はいい。\n本題にすぱっと切り込み、話をぐいぐい進めてくれる。
2739 = "Những lúc thế này, có Nagi thật tốt.\nCắt thẳng vào vấn đề chính, đẩy câu chuyện\ntiến triển nhanh chóng."

# 【凪】
# display as 凪
# JP: 「遠くて汚くてたくさん歩いて汚れとったばい！」
1648 = "「Vừa xa vừa bẩn, đi bộ nhiều dơ hết cả\nngười luôn á!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そんなにか」
1910 = "「Đến mức đó sao.」"

# monologue
# JP: 凪の言葉を因数分解すれば、\n“術仙炭鉱跡＝（遠い+汚い）×２”ということになる。
2394 = "Nếu phân tích nhân tử lời của Nagi,\nthì sẽ thành 'Tàn tích Mỏ than Jussen =\n(Xa + Bẩn) x 2'."

# monologue
# JP: それを証明するかのように、\nふかみが控えめに言葉を加える。
2600 = "Như để chứng minh cho điều đó,\nFukami dè dặt nói thêm."

# 【ふかみ】
# display as 深美
# JP: 「あの……みんなの評判は、よくなかった、です。\nクマ川くだりの方がマシって、言ってました。です」
2122 = "「Dạ... đánh giá của mọi người, không được\ntốt lắm, ạ.\nHọ bảo chèo thuyền trên sông Kuma còn đỡ\nhơn, ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「マシ、か。随分と[しんらつ,1]辛辣な評価だな」
1303 = "「Còn đỡ hơn, sao. Một đánh giá khá gay gắt\nđấy.」"

# 【ふかみ】
# display as 深美
# JP: 「でも……それでもちょっとは。うれしかった。かな？」
1579 = "「Nhưng... dù vậy em vẫn thấy hơi. Vui vui.\nChăng?」"

# monologue
# JP: ふかみの微苦笑。\nなんと言葉をかければいいか、難しい。
2601 = "Fukami khẽ cười khổ.\nThật khó để biết nên nói gì với em ấy lúc\nnày."

# 【ポーレット】
# display as 波萊特
# JP: 「そのとき……鉄道設備とか線路とか――\nなにか、残ってたりしたの気付かなかった？」
1614 = "「Lúc đó... thiết bị đường sắt hay đường\nray——\ncó ai để ý thấy còn sót lại thứ gì không?」"

# 【凪】
# display as 凪
# JP: 「なーんも気づかんかったばい」
1596 = "「Chẳng để ý thấy gì hết á.」"

# monologue
# JP: あっさりと、凪が空気を変えてくれる。\nふかみもすんなり、それに乗る。
2357 = "Nagi dễ dàng thay đổi bầu không khí.\nFukami cũng ngoan ngoãn hùa theo."

# 【ふかみ】
# display as 深美
# JP: 「ええと、でも。そのころわたしたち……\n鉄道とか、興味、ゼロでしたから。かも」
1667 = "「À, nhưng mà. Hồi đó bọn em...\nchẳng có hứng thú gì với đường sắt cả. Có\nlẽ vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。日々姫はどうだ？　学園行事ということなら」
1697 = "「Hừm. Hibiki thì sao? Nếu là hoạt động của\ntrường thì...」"

# 【日々姫】
# display as 日日姬
# JP: 「私も行きました。少等部のときの遠足で。\nけど、そんなに汚くはなかったですよ？」
1780 = "「Em cũng có đi. Đợt dã ngoại hồi Tiểu học.\nNhưng mà, cũng đâu đến nỗi bẩn lắm đâu ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1690 = "「哦？」" 

# monologue
# JP: 日々姫の遠足と、凪とふかみの遠足とでは、\nその間、わずかに数年の開きがあるだけだ。
2539 = "Chuyến dã ngoại của Hibiki, và của Nagi\nvới Fukami,\nchỉ cách nhau vỏn vẹn vài năm."

# monologue
# JP: （酒蔵の娘で、掃除好きだ。\n日々姫が汚れに鈍感ということもありえまい）
2773 = "（Là con gái nhà nấu rượu, lại thích dọn\ndẹp.\nHibiki không thể nào vô cảm với sự bẩn\nthỉu được.）"

# monologue
# JP: ならば、導かれる答えはひとつ。
2742 = "Vậy thì, chỉ có một câu trả lời duy nhất\nđược rút ra."

# monologue
# JP: 恐らくは術仙炭鉱跡。\n老朽化が、急速に進んでしまっているのだ。
2670 = "Có lẽ là tàn tích Mỏ than Jussen.\nSự xuống cấp đang diễn ra với tốc độ chóng\nmặt."

# 【日々姫】
# display as 日日姬
# JP: 「遠いのは遠かったです。少等部だったのもあるけど――\n二、ううん、三時間くらい？　入り口までかかりました」
2058 = "「Xa thì đúng là xa thật. Cũng một phần do\nhồi đó em học Tiểu học——\nHai, à không, khoảng ba tiếng đồng hồ? Mới\nđi đến lối vào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「どこからだ？」
1801 = "「Từ đâu?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、それは術仙炭鉱の廃駅前からです。\n遠足のときだけは、臨時停車することになってて」
1719 = "「A, là từ trước nhà ga Mỏ than Jussen bị\nbỏ hoang ạ.\nChỉ những lúc dã ngoại, tàu mới dừng tạm ở\nđó.」"

# 【日々姫】
# display as 日日姬
# JP: 「私も、線路跡とかそういうのは気付きませんでした。\n町が、すごいなって。それが一番の印象です」
1820 = "「Em cũng không để ý thấy dấu vết đường ray\nhay gì đâu.\nChỉ thấy thị trấn đó, tuyệt thật. Đó là ấn\ntượng sâu sắc nhất của em.」"

# 【双鉄】
# display as 雙鐵
# JP: 「町？」
2053 = "「Thị trấn?」"

# 【真闇】
# display as 真闇
# JP: 「術仙炭鉱のあたりには、宿舎がいっぱい建っとったんよ。\nさぞや栄えとったんろーねぇ」
2052 = "「Quanh Mỏ than Jussen, người ta xây nhiều\nkhu nhà ở lắm.\nChắc hẳn ngày xưa sầm uất lắm nhỉ.」"

# monologue
# JP: するり、真闇姉が助け舟を出してくれる。
2638 = "Chị Mayami nhẹ nhàng lên tiếng giải vây."

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉も、遠足で？」
1995 = "「Chị Mayami cũng đi dã ngoại ở đó ạ?」"

# 【真闇】
# display as 真闇
# JP: 「うん。そのころにはもうゴーストタウン。\n大きな建物に、木が食い込むようになっとって――」
1727 = "「Ừ. Hồi đó đã thành thị trấn ma rồi.\nCây cối mọc đâm cả vào những tòa nhà\nlớn——」"

# 【日々姫】
# display as 日日姬
# JP: 「そうなの！　町が森にのまれるみたいで――\nにぃに、あとでスケッチブックみせたげるばい！」
1885 = "「Đúng vậy! Cứ như thị trấn bị khu rừng\nnuốt chửng ấy——\nAnh hai, lát nữa em cho xem sổ phác thảo\nnha!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。頼む」
1732 = "「Ừm. Trăm sự nhờ em.」"

# monologue
# JP: 日々姫が心を動かすほどなら、その町とやらも、\nそれはそれで、見て面白い光景であるのだろう。
2520 = "Nếu có thể khiến Hibiki rung động đến vậy,\nthì thị trấn đó,\nchắc hẳn cũng là một cảnh tượng thú vị\nđáng để chiêm ngưỡng."

# 【双鉄】
# display as 雙鐵
# JP: 「……今は滅びてしまった町か。\nかつては鉱夫さん達の暮らしがあった――」
1310 = "「...Một thị trấn giờ đã lụi tàn sao.\nNơi từng là cuộc sống của những người thợ\nmỏ——」"

# 【れいな】
# display as 玲奈
# JP: 「鉱山鉄道は、鉱夫さんたちも運ぶのです！」
2006 = "「Đường sắt mỏ, cũng chở cả các bác thợ mỏ\nnữa đó ạ!」"

# monologue
# JP: 誇らしげに、懐かしげに、\nれいなはえへんと胸を張る。
2618 = "Với vẻ đầy tự hào và hoài niệm,\nReina ưỡn ngực 'ehen'."

# 【れいな】
# display as 玲奈
# JP: 「トロッコでやってきた石炭を\x%l貨車;#00ffc040;貨車%l;#;につんで。\n鉱夫さんたちを乗せたキハ[れいなな,1]07でひっぱっていくんです」
2008 = "「Chất than đá từ xe goòng sang \\x%l貨車;#00ffc040;toa chở hàng%l;#;\n.\nRồi KiHa 07 chở các bác thợ mỏ sẽ kéo đi\nạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「トロッコ――\nそうか、鉱山ならトロッコもあるのか」
2010 = "「Xe goòng——\nRa vậy, mỏ than thì phải có xe goòng chứ.」"

# 【れいな】
# display as 玲奈
# JP: 「絶対絶対あるですよ！\nれいな、トロッコも運転してみたいのです！」
1561 = "「Tuyệt đối tuyệt đối là có đó ạ!\nReina, cũng muốn thử lái xe goòng nữa ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、あれは面白そうだな」
1986 = "「Quả thực, cái đó nghe có vẻ thú vị đấy.」"

# monologue
# JP: タイプもいろいろあるのだろうが、\n手で棒を押し、ぎっちらえっちら進むヤツ。
2648 = "Chắc cũng có nhiều loại,\nnhưng loại dùng tay đẩy cần gạt để tiến\nlên cọc cạch ấy."

# monologue
# JP: あのタイプなら、れいな同様、\n「運転したい」と思う者も恐らく、少なくなかろう。
2418 = "Nếu là loại đó, thì giống như Reina,\nchắc hẳn cũng không ít người muốn 'lái\nthử' đâu."

# 【双鉄】
# display as 雙鐵
# JP: 「ゴーストタウンに、トロッコ、それに鉱山そのものか」
1963 = "「Thị trấn ma, xe goòng, và cả bản thân khu\nmỏ sao.」"

# monologue
# JP: と――いかん。
2391 = "Và——không ổn."

# monologue
# JP: 考えを先走らせる前に、\n真闇姉にも、一応は確認しておかねば。
2400 = "Trước khi để suy nghĩ đi quá xa,\nít nhất cũng phải xác nhận lại với chị\nMayami đã."

# 【双鉄】
# display as 雙鐵
# JP: 「それで、真闇姉は鉄道関連設備などは」
2134 = "「Vậy, chị Mayami có thấy thiết bị liên\nquan đến đường sắt không ạ?」"

# monologue
# JP: 待ってましたと言わんばかりの、\nニカっとした笑み。
2643 = "Chị ấy nở một nụ cười rạng rỡ,\nnhư thể chỉ chờ có câu hỏi đó."

# 【真闇】
# display as 真闇
# JP: 「男の子らが騒いどったねぇ。\nトロッコがどうこう言うとったばい」
1982 = "「Bọn con trai ồn ào lắm nha.\nCứ nói gì mà xe goòng thế này thế nọ ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
# 1685 = "「哦哦！」" 

# 【凪】
# display as 凪
# JP: 「ウチらのときにはなかったばい！\nそぎゃん大昔のっ――むごごごごっ！？」
1677 = "「Hồi tụi em đi đâu có đâu!\nCái thời xa lắc xa lơ đó——Mugogogogo!?」"

# monologue
# JP: ふかみが凪をつかまえ、口をふさいでいる。
2603 = "Fukami tóm lấy Nagi, bịt miệng em ấy lại."

# 【ふかみ】
# display as 深美
# JP: 「あはは、凪ちゃん、おう――オウム！\nそう、オウム貸してって、お友達にたのんでて」
1710 = "「Ahaha, Nagi, vẹt——vẹt!\nĐúng rồi, cậu ấy nhờ bạn cho mượn con vẹt\nấy mà.」"

# monologue
# JP: いや、ふかみ。\nそのフォローはむしろ無い方が良かったのではなかろうか。
2390 = "Không, Fukami à.\nLý do chữa cháy đó thà không nói còn hơn."

# monologue
# JP: 真闇姉の笑みは、にっこにっこと――\n怖いレベルのものへと化してしまっている。
2640 = "Nụ cười của chị Mayami, vẫn rạng rỡ——\nnhưng đã biến thành một thứ gì đó ở cấp độ\nđáng sợ rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「その、だな」
1669 = "「Chuyện đó, ừm.」"

# monologue
# JP: あくまで、自然に――\n意識しながら話を進めて、空気を変えようと試みる。
2500 = "Cố gắng tỏ ra tự nhiên nhất có thể——\nTôi tiếp tục câu chuyện, cố gắng thay đổi\nbầu không khí."

# 【双鉄】
# display as 雙鐵
# JP: 「宿舎がいっぱい、というほどの規模なら、\n術仙炭鉱は産出量に恵まれていたのかな？」
1858 = "「Nếu quy mô đến mức có nhiều khu nhà ở,\nthì sản lượng của Mỏ than Jussen chắc phải\ncao lắm nhỉ?」"

# 【真闇】
# display as 真闇
# JP: 「ゆー話よ？　九洲一の炭鉱とまでうたわれとったとか。\n“大昔”には」
1605 = "「Người ta đồn vậy đó? Nghe nói còn được\nmệnh danh là mỏ than số một Kyushu cơ.\nVào thời 'xa lắc xa lơ' ấy.」"

# 【ふかみ】
# display as 深美
# JP: 「っ！！！」
2173 = "「!!!」"

# monologue
# JP: びくり、とふかみがすくみ上がる。
2604 = "Fukami giật thót mình, co rúm người lại."

# monologue
# JP: その様子をみてクスクスと、\n真闇姉の笑みが、自然なものへと和らいでいく。
2642 = "Nhìn thấy bộ dạng đó, chị Mayami cười khúc\nkhích,\nnụ cười dần dịu lại, trở nên tự nhiên hơn."

# 【真闇】
# display as 真闇
# JP: 「ま、見てみて損はなかとよ」
2025 = "「Thôi thì, đi xem thử cũng chẳng mất gì\nđâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ありがとう。\n聞かせてもらった話、とても参考になった」
2105 = "「Vậy ạ, cảm ơn chị.\nNhững chuyện chị kể, rất có giá trị tham\nkhảo.」"

# monologue
# JP: 真闇姉に、そしてみんなに、頭を下げる。
2484 = "Tôi cúi đầu cảm ơn chị Mayami, và cả mọi\nngười."

# monologue
# JP: 姿勢を戻せば、\n日々姫はなぜか、少しバツの悪そうな顔で僕を見ている。
2512 = "Khi ngẩng đầu lên,\nHibiki không hiểu sao lại nhìn tôi với vẻ\nmặt hơi áy náy."

# 【日々姫】
# display as 日日姬
# JP: 「行くんですか？　兄さん。\n術仙炭鉱跡の調査に」
1683 = "「Anh định đi sao? Anh trai.\nĐi điều tra tàn tích Mỏ than Jussen ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁな。百聞は一見に如かずというし」
1881 = "「Chắc vậy. Trăm nghe không bằng một thấy\nmà.」"

# 【日々姫】
# display as 日日姬
# JP: 「ポーレットさんも？」
1960 = "「Cả chị Paulette nữa ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、わたしも行きたいって思ってます。\nその方が、いろいろ早いって思いますし」
1715 = "「A, chị cũng muốn đi.\nLàm vậy sẽ nhanh hơn nhiều.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1883 = "「是啊」" 

# monologue
# JP: 市政に観光、鉄道と、ポーレットは知識の塊だ。\n僕も、公害関連だけでだが、炭鉱については学んでいる。
2579 = "Paulette là một kho tàng kiến thức về hành\nchính, du lịch và đường sắt.\nTôi cũng đang học về mỏ than, dù chỉ là về\ncác vấn đề liên quan đến ô nhiễm môi\ntrường."

# monologue
# JP: まずまずふたりで、かなりを調べられるのではなかろうか。
2473 = "Nếu là hai chúng tôi, chắc chắn sẽ điều\ntra được khá nhiều thứ."

# 【日々姫】
# display as 日日姬
# JP: 「けど……一日仕事になっちゃいますよ？　\n\x%lエアクラ;#00ffc040;エアクラ%l;#;使えないなら、ナビもフォローできませんし」
1607 = "「Nhưng... sẽ mất cả ngày đấy ạ?\nNếu không dùng được \\x%lエアクラ;#00ffc040;Aircra%l;#;, Navi cũng\nkhông hỗ trợ được đâu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1711 = "「啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「そう」
1878 = "「Đúng vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうか――」
1708 = "「A. Ra là vậy——」"

# monologue
# JP: 日々姫が言わんとすることを、\nおくればせながら理解した。
2498 = "Dù hơi chậm chạp,\nnhưng tôi đã hiểu điều Hibiki muốn nói."

# 【双鉄】
# display as 雙鐵
# JP: 「議会の無い日にも、キハ[レイナナ,1]07は走るのだったな」
1785 = "「Kể cả những ngày không có phiên họp hội\nđồng, KiHa 07 vẫn phải chạy mà.」"

# monologue
# JP: 運休をさせるわけにも、まさかいくまい。
2659 = "Không thể nào cho tàu ngừng chạy được."

# monologue
# JP: しかし……\nああいや、一度あたりの調査時間を短くすれば――
2317 = "Nhưng...\nÀ không, nếu rút ngắn thời gian điều tra\nmỗi lần xuống thì——"

# 【ハチロク】
# display as 八六
# JP: 「そのようなこと、問題にもなりません。\nたやすく解決できるではないですか」
2107 = "「Chuyện đó, không thành vấn đề đâu ạ.\nChẳng phải có thể dễ dàng giải quyết sao.」"

# monologue
# JP: すっくと、ハチロクが立ち上がる。
2347 = "Hachiroku đứng phắt dậy."

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、わたくしをお使いください」
2161 = "「Ngài Soutetsu, xin hãy sử dụng tôi.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ、ずるかとハチロク！　おいしかトコだけっ！\nわたし、わたしも手伝うばいっ！！」
1713 = "「A, Hachiroku ăn gian! Toàn giành phần\nngon thôi!\nEm, em cũng sẽ giúp!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。そうすれば――」
1718 = "「A, ra vậy. Nếu làm thế thì——」"

# 【ハチロク】
# display as 八六
# JP: 「日々姫の機関助士訓練も開始しております。\n左様ですね――あと三……いえ」
1868 = "「Khóa huấn luyện phụ lái của Hibiki cũng\nđã bắt đầu rồi.\nĐể xem nào——khoảng ba... à không.」"

# monologue
# JP: ハチロクが言葉を止めて日々姫を見つめる。\n日々姫は自信ありげな笑顔で、ハチロクを見つめ返す。
2344 = "Hachiroku ngừng lời, nhìn chằm chằm\nHibiki.\nHibiki đáp lại Hachiroku bằng một nụ cười\nđầy tự tin."

# 【ハチロク】
# display as 八六
# JP: 「――二週間程をいただければ、最低限必要なことだけは、\n日々姫の体に、教え込んでさしあげられるかと存じます」
1299 = "「——Nếu cho tôi khoảng hai tuần, tôi nghĩ\nmình có thể\ndạy cho cơ thể Hibiki nhớ được những điều\ncơ bản nhất.」"

# 【日々姫】
# display as 日日姬
# JP: 「まーたそぎゃんと偉そうに～」
1646 = "「Lại ra vẻ ta đây nữa rồi~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、どうだ？」
1961 = "「Paulette, em thấy sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「キハ[レイナナエス,2]07sでしたら、もちろん、\n基本的にはれいな一人で運用できます」
1756 = "「Nếu là KiHa 07S thì tất nhiên,\nvề cơ bản một mình Reina cũng có thể vận\nhành được ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。問題はアクシデントの発生時だが――」
1695 = "「Ừm. Vấn đề là khi có sự cố xảy ra thôi——」"

# 【ポーレット】
# display as 波萊特
# JP: 「そこのフォローを、日々姫ちゃんとハチロクちゃんが\nしてくれるなら、普段よりむしろ安全かもしれません」
1758 = "「Nếu có Hibiki và Hachiroku hỗ trợ phần\nđó,\nthì có khi còn an toàn hơn bình thường nữa\nạ.」"

# monologue
# JP: 普段、つまりはポーレット-れいな体制か。
2448 = "Bình thường, tức là hệ thống Paulette -\nReina sao."

# 【双鉄】
# display as 雙鐵
# JP: 「謙遜はよせ。が――そうか。\nそうできるなら、そうしてもらえれば非常に助かる」
1610 = "「Đừng khiêm tốn quá. Nhưng——vậy sao.\nNếu có thể làm vậy thì sẽ giúp ích rất\nnhiều.」"

# 【れいな】
# display as 玲奈
# JP: 「れいなは、大歓迎ですよぉ」
1973 = "「Reina, rất hoan nghênh nha.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしが言い出した話です。\n異など、あろうはずもございません」
2098 = "「Chính tôi là người đưa ra ý kiến này mà.\nLàm gì có chuyện tôi phản đối chứ.」"

# 【日々姫】
# display as 日日姬
# JP: 「私も――手伝う。\nうん、手伝う」
1730 = "「Em cũng——sẽ giúp.\nỪm, sẽ giúp.」"

# monologue
# JP: 日々姫は、自分に言い聞かせている。\n小さなころ、なんどもそうしていたように。
2541 = "Hibiki đang tự nhủ với bản thân.\nGiống như những gì em ấy thường làm khi\ncòn nhỏ."

# monologue
# JP: 無理をさせているのじゃないか――\nそんな気持ちが、湧いてくる。
2468 = "Có phải tôi đang ép buộc em ấy không——\nCảm giác đó lại trào dâng trong tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致うんぬんのこともある。\nもしも気乗りがしないなら」
1871 = "「Hibiki. Còn chuyện thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;\nnữa.\nNếu em cảm thấy không thoải mái thì...」"

# 【日々姫】
# display as 日日姬
# JP: 「え？　気乗りとかは大丈夫です。\nちょっと、責任が重いから気合いれてただけですよ」
1681 = "「Dạ? Chuyện thoải mái hay không thì không\nsao đâu ạ.\nChỉ là trách nhiệm hơi nặng nề nên em đang\ntự xốc lại tinh thần thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　しかし――」
1888 = "「Vậy sao? Nhưng mà——」"

# 【日々姫】
# display as 日日姬
# JP: 「しかしもかかしも無いんです、兄さん」
1946 = "「Không có nhưng nhị gì hết, anh hai.」"

# monologue
# JP: ぴっと、日々姫が指を立てる。
2543 = "Hibiki giơ một ngón tay lên."

# monologue
# JP: 看板描きの説明を顧客にしているときと同じく――\nその顔は、自信と誇りに彩られている。
2411 = "Giống như lúc em ấy giải thích về việc vẽ\nbiển hiệu cho khách hàng——\nKhuôn mặt đó ngập tràn sự tự tin và tự\nhào."

# 【日々姫】
# display as 日日姬
# JP: 「わたしは、兄さんの妹です。\nいいですか？　兄さん。妹。妹なんですよ？」
1835 = "「Em, là em gái của anh.\nĐược chứ? Anh hai. Em gái. Là em gái đó?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1728 = "「嗯」" 

# monologue
# JP: 日々姫が笑う。晴れやかに。
2544 = "Hibiki cười. Một nụ cười rạng rỡ."

# monologue
# JP: けれどもどこか――ほんの少しだけ淋しげに。
2328 = "Nhưng đâu đó——vẫn phảng phất chút buồn bã."

# 【日々姫】
# display as 日日姬
# JP: 「そこまで楽しそうな兄さんのこと見ちゃったら。\n妹は――応援、するしかなくなるんです！」
1991 = "「Đã nhìn thấy anh hai vui vẻ đến thế rồi.\nThì em gái——chỉ còn cách ủng hộ thôi!」"
