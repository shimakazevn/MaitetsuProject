# monologue
# JP: ふかみが凪をつかまえ、口をふさいでいる。
2603 = "深美抓住凪，捂住了她的嘴。" 

# 【ふかみ】
# display as 深美
# JP: 「あはは、凪ちゃん、おう――オウム！\nそう、オウム貸してって、お友達にたのんでて」
1710 = "「啊哈哈，小凪真是的，一、一千！對，你找別人借了一千」" 

# monologue
# JP: いや、ふかみ。\nそのフォローはむしろ無い方が良かったのではなかろうか。
2390 = "呃，深美，你還不如不說這些呢。" 

# monologue
# JP: 真闇姉の笑みは、にっこにっこと――\n怖いレベルのものへと化してしまっている。
2640 = "真闇姐的笑容變得有些恐怖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その、だな」
1669 = "「呃，那個」" 

# monologue
# JP: あくまで、自然に――\n意識しながら話を進めて、空気を変えようと試みる。
2500 = "我試著若無其事地轉變話題，來紓解尷尬的氣氛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「宿舎がいっぱい、というほどの規模なら、\n術仙炭鉱は産出量に恵まれていたのかな？」
1858 = "「既然有那麼多礦工居住的宿舍，也就是說術仙煤礦曾經產量很高囉？」" 

# 【真闇】
# display as 真闇
# JP: 「ゆー話よ？　九洲一の炭鉱とまでうたわれとったとか。\n“大昔”には」
1605 = "「似乎是這樣的咧？　聽說“很久以前”，還被稱作九州第一煤礦呢」" 

# 【ふかみ】
# display as 深美
# JP: 「っ！！！」
2173 = "「！！！」" 

# monologue
# JP: びくり、とふかみがすくみ上がる。
2604 = "深美頓時緊張起來。" 

# monologue
# JP: その様子をみてクスクスと、\n真闇姉の笑みが、自然なものへと和らいでいく。
2642 = "真闇姐看她這副樣子，笑容也緩和了下來。" 

# 【真闇】
# display as 真闇
# JP: 「ま、見てみて損はなかとよ」
2025 = "「總之，還是值得去看看的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、ありがとう。\n聞かせてもらった話、とても参考になった」
2105 = "「這樣啊，謝謝各位。這些情報很有用」" 

# monologue
# JP: 真闇姉に、そしてみんなに、頭を下げる。
2484 = "我對真闇姐和大家低頭致謝。" 

# monologue
# JP: 姿勢を戻せば、\n日々姫はなぜか、少しバツの悪そうな顔で僕を見ている。
2512 = "抬起頭的時候，日日姬不知為何一副有點尷尬的樣子看著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「行くんですか？　兄さん。\n術仙炭鉱跡の調査に」
1683 = "「哥哥，你要去調查那個術仙廢煤礦嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁな。百聞は一見に如かずというし」
1881 = "「是啊。百聞不如一見」" 

# 【日々姫】
# display as 日日姬
# JP: 「ポーレットさんも？」
1960 = "「波萊特小姐也是？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、わたしも行きたいって思ってます。\nその方が、いろいろ早いって思いますし」
1715 = "「啊，我也想去看看。畢竟實地考察才能快速了解詳細情況嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1883 = "「是啊」" 

# monologue
# JP: 市政に観光、鉄道と、ポーレットは知識の塊だ。\n僕も、公害関連だけでだが、炭鉱については学んでいる。
2579 = "波萊特不僅精通市政，還對觀光和鐵路十分了解。而我在環境汙染方面也對煤礦略知一二。" 

# monologue
# JP: まずまずふたりで、かなりを調べられるのではなかろうか。
2473 = "我們兩人過去的話，應該能調查到很多有用的情報。" 

# 【日々姫】
# display as 日日姬
# JP: 「けど……一日仕事になっちゃいますよ？　\n\x%lエアクラ;#00ffc040;エアクラ%l;#;使えないなら、ナビもフォローできませんし」
1607 = "「但是，要花上一整天呀。不能用\\x%lエアクラ;#00ffc040;空凝機%l;#;也就代表不能乘Ｎａｖｉ去」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1711 = "「啊！」" 

# 【日々姫】
# display as 日日姬
# JP: 「そう」
1878 = "「是吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。そうか――」
1708 = "「啊。對啊——」" 

# monologue
# JP: 日々姫が言わんとすることを、\nおくればせながら理解した。
2498 = "我終於明白日日姬想要表達什麼了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「議会の無い日にも、キハ[レイナナ,1]07は走るのだったな」
1785 = "「就算是沒有市議會的日子，Ｋｉｈａ０７也得照常運轉啊」" 

# monologue
# JP: 運休をさせるわけにも、まさかいくまい。
2659 = "總不能讓她停運吧。" 

# monologue
# JP: しかし……\nああいや、一度あたりの調査時間を短くすれば――
2317 = "不過……對，只要縮短每次調查的時間——" 

# 【ハチロク】
# display as 八六
# JP: 「そのようなこと、問題にもなりません。\nたやすく解決できるではないですか」
2107 = "「這種問題根本無需擔心。不是很容易解決的嗎」" 

# monologue
# JP: すっくと、ハチロクが立ち上がる。
2347 = "八六突然站了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様、わたくしをお使いください」
2161 = "「雙鐵少爺，請使用我吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、ずるかとハチロク！　おいしかトコだけっ！\nわたし、わたしも手伝うばいっ！！」
1713 = "「啊，太狡猾了，八六！　竟然被你搶先了，我，我也要幫忙唄！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。そうすれば――」
1718 = "「啊，是啊。只要這樣——」" 

# 【ハチロク】
# display as 八六
# JP: 「日々姫の機関助士訓練も開始しております。\n左様ですね――あと三……いえ」
1868 = "「日日姬的司爐訓練也已經開始了。我想想——大概還要個三……不」" 

# monologue
# JP: ハチロクが言葉を止めて日々姫を見つめる。\n日々姫は自信ありげな笑顔で、ハチロクを見つめ返す。
2344 = "八六停頓了一下，審視著日日姬。日日姬則以自信滿滿的笑容回應八六。" 

# 【ハチロク】
# display as 八六
# JP: 「――二週間程をいただければ、最低限必要なことだけは、\n日々姫の体に、教え込んでさしあげられるかと存じます」
1299 = "「——只要兩週，我就能教會日日姬掌握司爐最基本的知識」" 

# 【日々姫】
# display as 日日姬
# JP: 「まーたそぎゃんと偉そうに～」
1646 = "「又擺出一副高高在上的態度～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、どうだ？」
1961 = "「波萊特，你怎麼看？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「キハ[レイナナエス,2]07sでしたら、もちろん、\n基本的にはれいな一人で運用できます」
1756 = "「如果是Ｋｉｈａ０７的話，只要有玲奈在就基本足夠了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。問題はアクシデントの発生時だが――」
1695 = "「唔。問題在於，萬一出了意外情況——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そこのフォローを、日々姫ちゃんとハチロクちゃんが\nしてくれるなら、普段よりむしろ安全かもしれません」
1758 = "「如果有日日姬和八六小姐在旁輔助，反而會比平時更安全一些吧」" 

# monologue
# JP: 普段、つまりはポーレット-れいな体制か。
2448 = "平時——也就是波萊特和玲奈兩人合作的制度嗎。" 

# 【双鉄】
# display as 雙鐵
# JP: 「謙遜はよせ。が――そうか。\nそうできるなら、そうしてもらえれば非常に助かる」
1610 = "「你不用謙虛。不過——我明白了。如果這樣可以的話，那就再好不過了」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなは、大歓迎ですよぉ」
1973 = "「玲奈非常贊成」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしが言い出した話です。\n異など、あろうはずもございません」
2098 = "「這件事是我主動提出的。當然不會有異議」" 

# 【日々姫】
# display as 日日姬
# JP: 「私も――手伝う。\nうん、手伝う」
1730 = "「嗯，我也會——我也會幫忙的」" 

# monologue
# JP: 日々姫は、自分に言い聞かせている。\n小さなころ、なんどもそうしていたように。
2541 = "日日姬彷彿在說服著自己。這是她從小的習慣。" 

# monologue
# JP: 無理をさせているのじゃないか――\nそんな気持ちが、湧いてくる。
2468 = "我不禁開始擔心，是不是有些勉強她了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫。\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致うんぬんのこともある。\nもしも気乗りがしないなら」
1871 = "「日日姬，畢竟你對\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶是持贊成的立場，如果不願意的話」" 

# 【日々姫】
# display as 日日姬
# JP: 「え？　気乗りとかは大丈夫です。\nちょっと、責任が重いから気合いれてただけですよ」
1681 = "「哎？　我很願意啊。只是因為這件事責任重大，所以在給自己打氣啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　しかし――」
1888 = "「是嗎？　但是——」" 

# 【日々姫】
# display as 日日姬
# JP: 「しかしもかかしも無いんです、兄さん」
1946 = "「沒有什麼但是不但是的，哥哥」" 

# monologue
# JP: ぴっと、日々姫が指を立てる。
2543 = "日日姬豎起指頭。" 

# monologue
# JP: 看板描きの説明を顧客にしているときと同じく――\nその顔は、自信と誇りに彩られている。
2411 = "她的表情就跟給顧客介紹招牌的時候一樣——充滿了自信與自豪。" 

# 【日々姫】
# display as 日日姬
# JP: 「わたしは、兄さんの妹です。\nいいですか？　兄さん。妹。妹なんですよ？」
1835 = "「我可是哥哥的妹妹哦？　明白了嗎，哥哥？　是你的妹妹，你的妹妹哦？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1728 = "「嗯」" 

# monologue
# JP: 日々姫が笑う。晴れやかに。
2544 = "日日姬開心地笑著。" 

# monologue
# JP: けれどもどこか――ほんの少しだけ淋しげに。
2328 = "但是，卻略帶了一些落寞。" 

# 【日々姫】
# display as 日日姬
# JP: 「そこまで楽しそうな兄さんのこと見ちゃったら。\n妹は――応援、するしかなくなるんです！」
1991 = "「看到哥哥那麼開心，我這個做妹妹的，也就只能為你加油了！」" 
