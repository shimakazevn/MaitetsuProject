1303 = "「“更好”——這還真是尖銳的評價啊」" 

# 【ふかみ】
# display as 深美
# JP: 「でも……それでもちょっとは。うれしかった。かな？」
1579 = "「不過……就算是這樣，聽了也還是有點小開心……吧？」" 

# monologue
# JP: ふかみの微苦笑。\nなんと言葉をかければいいか、難しい。
2601 = "深美微微苦笑。我不知該如何回應。" 

# 【ポーレット】
