[script]
# lines: 374 
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ……立派なものだな」
1611 = "「Hừm... Thật là tráng lệ.」"

# 【コン】
# display as 空
# JP: 「ケンっ！」
1542 = "「Keng!」"

# monologue
# JP: 早朝の\x%l石造機関庫;#00ffc040;石造機関庫%l;#;内には、僕とコンの姿しか無い。
2415 = "Bên trong \\x%l石造機関庫;#00ffc040;Xưởng đầu máy bằng đá%l;#; lúc sáng\nsớm, chỉ có tôi và\nKon."

# monologue
# JP: 物を含めて数えるのなら、\n僕とコンと――\x%l8620;#00ffc040;8620%l;#;の姿しか。
2239 = "Nếu tính cả đồ vật,\nthì chỉ có tôi, Kon và——\\x%l8620;#00ffc040;8620%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;……か」
1172 = "「\\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#;... sao.」"

# monologue
# JP: \x%l運転台;#00ffc040;運転台%l;#;に上がってしまえば、\n見えるのはその内側の、ほんの一部だ。
2108 = "Một khi đã bước lên \\x%l運転台;#00ffc040;Buồng lái%l;#;,\nthì chỉ có thể nhìn thấy một phần rất nhỏ\nbên trong."

# monologue
# JP: 外側からこれほど仔細に眺める機会など、\n今までなかった。
2121 = "Cơ hội để ngắm nhìn kỹ lưỡng từ bên ngoài\nthế này,\ntừ trước đến nay chưa từng có."

# 【双鉄】
# display as 雙鐵
# JP: 「鉄、だな――鉄の塊だ」
1722 = "「Là sắt... Một khối sắt khổng lồ.」"

# monologue
# JP: 思ってしまえば足元から、\n吐き気と寒気が這い登ってくる。
2103 = "Nghĩ đến đó, từ dưới chân,\ncảm giác buồn nôn và ớn lạnh bò dọc lên."

# monologue
# JP: 真っ黒な鉄は鼓膜に軋みを蘇らせて、\n軋みが思い出させるものは――血と死との味、そのものだ。
2419 = "Khối sắt đen ngòm gợi lại tiếng cọt kẹt\ntrong màng nhĩ,\nvà tiếng cọt kẹt ấy gợi nhớ đến——mùi vị\ncủa máu và cái chết."

# 【双鉄】
# display as 雙鐵
# JP: 「だ、が――」
1487 = "「Nhưng, mà——」"

# monologue
# JP: 口いっぱいにその味が広がってしまっても、\n舌は変わらず動かせる。
2177 = "Dù mùi vị đó lan tỏa khắp khoang miệng,\nlưỡi tôi vẫn có thể cử động như bình\nthường."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;――\nそれでもお前は、美しくもある」
1165 = "「\\x%l8620;#00ffc040;8620%l;#;——\nDù vậy, mi vẫn rất đẹp.」"

# monologue
# JP: あまりに巨大で。あまりに無骨で。\nけれど細部は、磨きぬかれて繊細で。
2543 = "Quá đỗi khổng lồ. Quá đỗi thô kệch.\nNhưng những chi tiết lại được mài giũa vô\ncùng tinh xảo."

# monologue
# JP: それほど完成された物であるのに――\n置き去りにされてしまった者の、孤独の色を帯びていて。
2370 = "Một cỗ máy hoàn mỹ đến vậy——\nLại mang màu sắc cô độc của kẻ bị bỏ rơi."

# 【双鉄】
# display as 雙鐵
# JP: 「お前で観光振興……か」
1808 = "「Dùng mi để chấn hưng du lịch... sao.」"

# 【コン】
# display as 空
# JP: 「ケンっ！！！」
1543 = "「Keng!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、コン――――おお」
1690 = "「Gì vậy, Kon――――Ồ.」"

# 【ポーレット】
# display as ？？？
# JP: 「あ」
1568 = "「A.」"

# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;の入り口に人影。\nどこか控えめな足取りで近づいてくる。
74 = "Một bóng người xuất hiện ở lối vào \\x%l石造機関庫;#00ffc040;Xưởng đầu máy bằng đá%l;#;\n.\nĐang rụt rè bước tới."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットか、おはよう」
1753 = "「Paulette à, chào buổi sáng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「おはようございます、双鉄くん、\nどうしたんですか？　こんなに早く――」
1719 = "「Chào buổi sáng, anh Soutetsu.\nCó chuyện gì vậy ạ? Sao anh lại đến sớm\nthế——」"

# monologue
# JP: 言葉が呑まれる。\n青い瞳はあたりを見回す。
2217 = "Cô ấy nuốt lại lời định nói.\nĐôi mắt xanh biếc nhìn quanh."

# 【ポーレット】
# display as 波萊特
# JP: 「――ひとり……ですか？」
1177 = "「——Anh đi một mình... ạ?」"

# 【コン】
# display as 空
# JP: 「ケンっ！」
# 1542 = "「吭！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、一人と一匹だ」
1465 = "「Không, một người một cáo.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、ごめんね、コン。\nコンのこと、気が付かなかったわけじゃなくって」
1594 = "「A, xin lỗi nhé, Kon.\nKhông phải chị không để ý đến em đâu.」"

# monologue
# JP: ポーレットが手を差し伸べればすぐさま、\n腹を撫でろと言わんばかりにころりと転がる。
2438 = "Paulette vừa đưa tay ra,\nKon liền lăn kềnh ra đòi vuốt bụng."

# monologue
# JP: これほど人懐こいキツネというのも、\nなかなかに珍しいのではなかろうか。
2534 = "Một con cáo thân thiện đến thế này,\nchắc cũng hiếm lắm."

# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんも一緒かな？　って、\nちょっと思っちゃっただけで」
1700 = "「Chỉ là em nghĩ,\nkhông biết Hachiroku có đi cùng anh không\nthôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕とて、たまには一人になりたい時間もあるさ」
1699 = "「Anh cũng có những lúc muốn ở một mình\nchứ.」"

# monologue
# JP: ……\x%l8620;#00ffc040;8620%l;#;を、その全体を間近でじっくり見たかった。
1149 = "……Tôi muốn ngắm nhìn toàn bộ \\x%l8620;#00ffc040;8620%l;#; thật kỹ\nở cự\nly gần."

# monologue
# JP: たったひとりで向き合って、\n自分が何をどう感じるか、今のうち知っておきたかった。
2319 = "Tôi muốn đối diện với nó một mình,\nđể xem bản thân cảm thấy thế nào ngay lúc\nnày."

# 【ポーレット】
# display as 波萊特
# JP: 「あ、それじゃわたし、お邪魔」
1601 = "「A, vậy em làm phiền anh rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そうではない。\nもしそうであれば、コンを連れても来てはいないさ」
1463 = "「Không, không phải vậy.\nNếu thế thì anh đã chẳng mang Kon theo.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ええと……？」
1907 = "「Ơ...?」"

# monologue
# JP: 困惑した声に、矛盾したことを言ってしまったと自覚する。\nその自覚はすぐ、理解に変わる。
2482 = "Nghe giọng điệu bối rối của cô ấy, tôi\nnhận ra mình vừa nói hớ.\nNhưng ngay sau đó, tôi đã hiểu ra."

# monologue
# JP: 僕がコンを、ここに引っ張ってきた理由はつまり、\n“完全な一人になるのが怖かった”ということなのだろう。
2300 = "Lý do tôi kéo Kon đến đây,\ncó lẽ là vì 'tôi sợ phải ở một mình hoàn\ntoàn'."

# monologue
# JP: （……我ながらなんとも情けない。\n無様を見せても構わぬ相手を選んだわけか）
2573 = "（...Đúng là thảm hại thật.\nTôi đã chọn một người bạn đồng hành mà dù\ncó để lộ bộ dạng thảm hại cũng không sao.）"

# monologue
# JP: 自分の怯えに気づいてしまえば張り詰めていた何かが緩む。\nこわばっていたものが消え、安堵の息と言葉が交じる。
2105 = "Khi nhận ra nỗi sợ hãi của bản thân, sự\ncăng thẳng bỗng dưng tan biến.\nSự cứng nhắc biến mất, nhường chỗ cho\ntiếng thở phào nhẹ nhõm và những lời nói\nhòa quyện vào nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;を一度じっくり、一人で見ておきたかっただけだ。\nポーレットが来る前に、その目的は達成できていた」
1704 = "「Anh chỉ muốn ngắm \\x%l8620;#00ffc040;8620%l;#; một mình thật kỹ\nthôi.\nTrước khi Paulette đến, mục đích đó đã\nhoàn thành rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それって」
1880 = "「Thế nghĩa là...」"

# monologue
# JP: 不安げだった顔が一転、明るく輝く。\n立ち止まっていた足も再び、僕の方へと一歩寄る。
2224 = "Khuôn mặt đầy vẻ lo âu bỗng chốc bừng\nsáng.\nĐôi chân đang dừng lại cũng bước thêm một\nbước về phía tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「ひょっとして、\n観光振興のために――ですか？」
1943 = "「Có phải là,\nvì mục đích chấn hưng du lịch không ạ?」"

# monologue
# JP: 言われて、それもあるかと気付く。\n市政というテコを使っての本格的な観光振興――
2227 = "Nghe cô ấy nói vậy, tôi mới nhận ra cũng\ncó phần đúng.\nMột kế hoạch chấn hưng du lịch quy mô lớn,\nsử dụng bộ máy chính quyền làm đòn bẩy——"

# monologue
# JP: ポーレットからの提案を真剣に考慮しなければ、\n\x%l8620;#00ffc040;8620%l;#;をしっかり見ようという気にはならなかったろう。
2235 = "Nếu không nghiêm túc cân nhắc đề xuất của\nPaulette,\nchắc tôi cũng chẳng có hứng thú ngắm nhìn \\x%l8620;#00ffc040;8620%l;#;\nkỹ đến vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、観光振興のことを考えてでもあったな。\nそれが全てでもなかったが」
1817 = "「Đúng là anh cũng có nghĩ đến việc chấn\nhưng du lịch.\nDù đó không phải là tất cả lý do.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ちょっとでも、考えてくれたなら嬉しいです」
1540 = "「Chỉ cần anh có nghĩ đến thôi là em đã vui\nlắm rồi.」"

# monologue
# JP: また一歩。
2180 = "Lại thêm một bước."

# monologue
# JP: 今度はさっきより軽い足取りで、\nポーレットは僕との距離を詰める。
2407 = "Lần này bước chân nhẹ nhàng hơn trước,\nPaulette rút ngắn khoảng cách với tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの提案を受けて、僕は考えたのだ」
1633 = "「Nhận được đề xuất của Paulette, anh đã\nsuy nghĩ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「何をですか？」
1480 = "「Suy nghĩ chuyện gì ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「負担についてだ。僕らはそれぞれ、\nやるべきことだけを果たしていれば、それで済むが――」
1771 = "「Về gánh nặng. Mỗi người chúng ta,\nchỉ cần hoàn thành tốt phần việc của mình\nlà đủ, nhưng——」"

# monologue
# JP: 僕のような素人を政策秘書に、などという発想が、\nいったいどこから出てきたのか。
2220 = "Ý tưởng mời một kẻ tay mơ như tôi làm thư\nký chính sách,\nrốt cuộc xuất phát từ đâu."

# monologue
# JP: あまりに不思議と感じてしまい、\nそれゆえ深く考え、気づいた。　
2198 = "Tôi cảm thấy quá đỗi kỳ lạ,\nthế nên mới suy nghĩ sâu xa và nhận ra."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは違う。僕らの誰もやらない事の全てを、\n自分の義務にプラスして、一人黙々と処理している」
1845 = "「Paulette thì khác. Em âm thầm ôm đồm mọi\nviệc mà không ai trong chúng ta chịu làm,\ncộng thêm cả nghĩa vụ của bản thân, và một\nmình xử lý tất cả.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1561 = "「A.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ただでさえ、市長と社長だ。負担があまりに重すぎる。\n現状のままでは、いずれ、つぶれてしまいかねん」
1503 = "「Vừa làm Thị trưởng vừa làm Giám đốc. Gánh\nnặng đã quá lớn rồi.\nNếu cứ tiếp tục thế này, sớm muộn gì em\ncũng sẽ gục ngã mất.」"

# monologue
# JP: 自分の気づきを言葉に変えて整頓すれば、\nそれがさらなる理解に変わる。
2247 = "Khi diễn đạt những điều mình nhận ra thành\nlời,\nnó sẽ biến thành một sự thấu hiểu sâu sắc\nhơn."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットには、助けとなる手が必要なのだ」
1790 = "「Paulette cần một người giúp đỡ.」"

# monologue
# JP: 政策秘書に、僕がなれるとはやはり思えん。
2326 = "Tôi vẫn không nghĩ mình có thể làm thư ký\nchính sách."

# monologue
# JP: 思えんが、ポーレットが擦り切れ潰れる姿など、\nなにがあろうと見たくもない。
2562 = "Tuy vậy, tôi tuyệt đối không muốn nhìn\nthấy cảnh\nPaulette tiều tụy, gục ngã vì kiệt sức."

# 【双鉄】
# display as 雙鐵
# JP: 「僕の手で、もしも構わなければ――」
1649 = "「Nếu em không chê sự giúp đỡ của anh——」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい！」
1760 = "「Vâng!」"

# monologue
# JP: 僕の言葉に食いつくような強い声。\nさらに一歩。ポーレットはその身を近づけてくる。
2406 = "Giọng nói mạnh mẽ như chớp lấy lời tôi.\nThêm một bước nữa. Paulette tiến lại gần\nhơn."

# monologue
# JP: （そこまで、追いつめられていたのか）
2591 = "（Đã bị dồn đến bước đường cùng rồi sao）"

# monologue
# JP: ならばなぜ、もっと早くに、\n直接的に、僕らに支援を求めないのか。
2542 = "Vậy tại sao, không trực tiếp yêu cầu\nsự giúp đỡ từ chúng tôi sớm hơn."

# monologue
# JP: 性格ゆえのこととは思うが、\nそこにある種の危うささえも感じてしまう。
2561 = "Tôi nghĩ đó là do tính cách của cô ấy,\nnhưng tôi cũng cảm thấy một sự nguy hiểm\nnào đó."

# 【双鉄】
# display as 雙鐵
# JP: 「僕でよければ、この手を貸そう。\nコンの手よりは、いくらか役に立つはずだ」
1538 = "「Nếu anh có thể giúp được gì, anh sẵn\nsàng.\nÍt ra cũng có ích hơn Kon một chút.」"

# 【コン】
# display as 空
# JP: 「ケン？」
1544 = "「Keng?」"

# monologue
# JP: 名を呼ばれたと思ってか、コンが足元に擦り寄ってくる。
2466 = "Tưởng được gọi tên, Kon cọ cọ vào chân\ntôi."

# monologue
# JP: しかし、ポーレットはコンを見てない。\n僕だけを、食い入るように見つめている。
2150 = "Nhưng, Paulette không nhìn Kon.\nCô ấy chỉ chăm chăm nhìn tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。お願いします。\nわたし――双鉄くんが、いいんです」
1865 = "「Cảm ơn anh. Trăm sự nhờ anh.\nEm——rất vui vì đó là anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならばそうしよう」
1744 = "「Vậy sao. Quyết định thế đi.」"

# monologue
# JP: もう一歩寄ってくるかと思ったが、\nポーレットの足はそこで止まって動かない。
2376 = "Tôi cứ tưởng cô ấy sẽ bước thêm một bước\nnữa,\nnhưng chân Paulette lại dừng ở đó, không\nnhúc nhích."

# monologue
# JP: 気圧されるほどにすがる視線と、二歩半の距離――\nこれがつまりは、ポーレットの頼り下手の表れだろう。
2366 = "Ánh mắt van nài đến nghẹt thở, và khoảng\ncách hai bước rưỡi——\nĐây có lẽ là biểu hiện cho sự kém cỏi\ntrong việc nhờ vả của Paulette."

# 【双鉄】
# display as 雙鐵
# JP: 「それで、具体的な観光振興についてなのだが」
1929 = "「Vậy, về kế hoạch chấn hưng du lịch cụ thể\nthì...」"

# monologue
# JP: であるのなら、こちらからも無理に距離は詰めない。
2349 = "Nếu đã vậy, tôi cũng sẽ không ép buộc thu\nhẹp khoảng cách."

# monologue
# JP: ポーレットにとって居心地のいい距離感こそが、\nその精神を支えるためには、一番適切なものだろう。
2154 = "Khoảng cách thoải mái nhất đối với\nPaulette,\nchính là điều phù hợp nhất để nâng đỡ tinh\nthần cô ấy."

# monologue
# JP: （とはいえ、慣れん。ハチロクとも日々姫とも、\n考えてみれば……ほぼゼロ距離で向き合ってきたのだな）
2597 = "（Dù vậy, vẫn chưa quen lắm. Nghĩ lại\nthì...\ntôi đã đối mặt với Hachiroku và Hibiki ở\nkhoảng cách gần như bằng không.）"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？」
1942 = "「Anh Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ。観光振興についてだが、\n現状、解決すべき点はいくつもあるかと思う」
1563 = "「À, ừm. Về việc chấn hưng du lịch,\nanh nghĩ hiện tại có một vài điểm cần phải\ngiải quyết.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。まずは\x%l客車;#00ffc040;客車%l;#;をなんとかしないと」
1739 = "「Đúng vậy. Trước tiên phải giải quyết vấn\nđề \\x%l客車;#00ffc040;toa hành khách%l;#; đã.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l客車;#00ffc040;客車%l;#;？」
1169 = "「\\x%l客車;#00ffc040;Toa hành khách%l;#;?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、\x%l客車;#00ffc040;客車%l;#;はものすごく数が不足してるんです」
1766 = "「Vâng, số lượng \\x%l客車;#00ffc040;toa hành khách%l;#; đang thiếu\nhụt trầm\ntrọng.」"

# monologue
# JP: ……ほとんど全ての\x%lまいてつ;#00ffc040;まいてつ%l;#;には、\n自分に必要な数の\x%l客車;#00ffc040;客車%l;#;しか保有・整備をする余裕がない。
1144 = "……Hầu như tất cả \\x%lまいてつ;#00ffc040;chủ tàu%l;#;,\nđều chỉ có đủ khả năng sở hữu và bảo dưỡng\nsố lượng \\x%l客車;#00ffc040;toa hành khách%l;#; cần thiết cho\nriêng mình."

# monologue
# JP: 当然、そうした\x%l客車;#00ffc040;客車%l;#;はめったに手放されることもない。\n――説明されれば、ごく簡単に納得がいく話ではある。
2495 = "Tất nhiên, những \\x%l客車;#00ffc040;toa hành khách%l;#; đó hiếm\nkhi bị bán đi.\n——Chỉ cần nghe giải thích là có thể dễ\ndàng hiểu được."

# 【双鉄】
# display as 雙鐵
# JP: 「では、どうやって\x%l客車;#00ffc040;客車%l;#;を入手するんだ？」
1922 = "「Vậy làm thế nào để kiếm được \\x%l客車;#00ffc040;toa hành khách%l;#;\n?」"

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l8620;#00ffc040;8620%l;#;の改修で、車輛修理のスキルを持っている方たちと、\n人脈ができましたから」
1631 = "「Nhờ việc cải tạo \\x%l8620;#00ffc040;8620%l;#;,\nem đã tạo được mối quan hệ với những người\ncó kỹ năng sửa chữa toa xe.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なるほど。修理しなければ使えない――\nそうした\x%l客車;#00ffc040;客車%l;#;であれば、入手可能かもしれんのか」
1577 = "「À, ra vậy. Những \\x%l客車;#00ffc040;toa hành khách%l;#; hỏng hóc\ncần sửa chữa mới dùng được——\nNếu là loại đó thì có thể kiếm được sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。ですからわたし、廃\x%l客車;#00ffc040;客車%l;#;を譲ってくれる\n\x%lまいてつ;#00ffc040;まいてつ%l;#;さんがいないか、あたってみたいと思います」
1756 = "「Vâng. Vì vậy, em định tìm xem có \\x%lまいてつ;#00ffc040;chủ tàu%l;#;\nnào\nchịu nhượng lại \\x%l客車;#00ffc040;toa hành khách%l;#; phế liệu\nkhông.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その件はよろしく頼む」
1928 = "「Vậy thì, chuyện đó trông cậy vào em nhé.」"

# monologue
# JP: それはまさしく、\nポーレットにしかできない仕事であるだろう。
2322 = "Đó chắc chắn là\ncông việc chỉ có Paulette mới làm được."

# monologue
# JP: その周辺を埋めることこそ、\n今日からの僕の、新たな務めだ。
2481 = "Còn việc lấp đầy những khoảng trống xung\nquanh đó,\nchính là nhiệm vụ mới của tôi từ hôm nay."

# 【双鉄】
# display as 雙鐵
# JP: 「で、\x%l客車;#00ffc040;客車%l;#;を入手したとして――\nそこから先の観光振興にプランはあるのか？」
1916 = "「Vậy, giả sử chúng ta kiếm được \\x%l客車;#00ffc040;toa hành khách%l;#;\nrồi——\nEm đã có kế hoạch chấn hưng du lịch nào\ntiếp theo chưa?」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1556 = "「Hả?」"

# monologue
# JP: “何を言われているのかわからない”\nそんな表情。
1129 = "「Hả?」"

# monologue
# JP: さほど難しい問いではないと思うのだが――\nと、思う間にポーレットは、そっか、と気づいた顔になる。
2311 = "Một vẻ mặt như thể\n'Không hiểu anh đang nói gì'."

# 【ポーレット】
# display as 波萊特
# JP: 「もちろん整備だけじゃなく再塗装して――\n内装もできるだけ観光\x%l客車;#00ffc040;客車%l;#;にふさわしいものに」
1813 = "「Tất nhiên không chỉ bảo dưỡng mà còn sơn\nlại nữa——\nNội thất cũng sẽ được làm sao cho phù hợp\nvới \\x%l客車;#00ffc040;toa hành khách%l;#; du lịch nhất có thể.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いやいやいやいや、さらに先だ」
1455 = "「Không không không, xa hơn thế nữa cơ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「さらに先って」
1773 = "「Xa hơn nữa là sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;が観光\x%l列車;#00ffc040;列車%l;#;として営業運転を開始する。\nその先、それをどのようにして観光振興に繋げるのだ？」
1812 = "「\\x%l8620;#00ffc040;8620%l;#; sẽ bắt đầu hoạt động thương mại như\nmột \\x%l列車;#00ffc040;đoàn tàu%l;#; du lịch.\nSau đó, em định kết nối nó với việc chấn\nhưng du lịch như thế nào?」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　だって」
1555 = "「Hả? Thì...」"

# monologue
# JP: わた、とポーレットの手が動く。\n遊んでもらえるのかと思い、その手につられたコンも動く。
2403 = "Tay Paulette huơ huơ.\nTưởng được chơi đùa, Kon cũng chạy theo\nbàn tay ấy."

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l8620;#00ffc040;8620%l;#;が走ったら、それに乗りたい人がわーっと」
1839 = "「Nếu \\x%l8620;#00ffc040;8620%l;#; chạy, sẽ có rất nhiều người muốn\nđi\nthử...」"

# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレット。例えばだ、遠くマイナーな温泉地に、\n非常に貴重でクラシカルなガソリン自動車があるとして」
1195 = "「...Paulette. Ví dụ nhé, ở một khu suối\nnước nóng hẻo lánh ít người biết đến,\ncó một chiếc ô tô chạy xăng cực kỳ quý\nhiếm và cổ điển.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あるとして」
1804 = "「Cứ cho là có đi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それに試乗させてもらえるとしたら――\n行くか？　遠くの、マイナーな温泉地に、わざわざ」
1651 = "「Nếu được đi thử chiếc xe đó——\nEm có cất công lặn lội đến khu suối nước\nnóng hẻo lánh đó không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　行きませんけど――\nだって、自動車に興味ないですし」
1553 = "「Hả? Không đâu ạ——\nVì em đâu có hứng thú với ô tô.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そう、それだ。今のその気持ち。\nその気持ちの“自動車”が、世間一般の“鉄道”だ」
1661 = "「Đúng, chính là nó. Cảm giác của em lúc\nnày.\n'Ô tô' trong cảm giác đó, chính là 'đường\nsắt' trong mắt công chúng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「その気持ちって――この気持ち？　\n自動車が鉄道――て……え？　あ！？　ええええっ！？」
1523 = "「Cảm giác đó——cảm giác này á?\nÔ tô là đường sắt——hả... Hả? A!? Eeeee!?」"

# monologue
# JP: 驚愕している。\n恐らく理解してくれたのだろうが、油断はならん。
2216 = "Cô ấy đang rất kinh ngạc.\nCó lẽ cô ấy đã hiểu ra, nhưng không thể\nchủ quan được."

# monologue
# JP: 最後の一言一句まで、このことに関しては、\n説明しておく必要がある。
2549 = "Đến từng câu từng chữ cuối cùng, về vấn đề\nnày,\ntôi cần phải giải thích cho rõ ràng."

# 【双鉄】
# display as 雙鐵
# JP: 「世間一般の人間は、遠くマイナーな温泉地にまで、\nわざわざ\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;に乗りには、来ないのだ」
1477 = "「Người bình thường sẽ không cất công lặn\nlội đến tận khu suối nước nóng hẻo lánh\nchỉ để đi \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; đâu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ……あ――それは……そう、ですね。\nわたし、周りの人も、結構、鉄道好きばっかりで――」
1565 = "「A... A——Đúng là... như vậy nhỉ.\nEm và những người xung quanh, hầu hết đều\nlà những người yêu đường sắt——」"

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、たとえば[くさつ,1]九札温泉にＳＬが走っていれば、\n湯治がてらにそれに乗る、という人は多かろう」
1490 = "「Nhưng, ví dụ như ở suối nước nóng Kusatsu\ncó SL chạy,\nchắc chắn sẽ có rất nhiều người vừa đi tắm\nsuối nước nóng vừa đi thử.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
1576 = "「A!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ゆえに、その先――\nあるいは、その他が必要なのだ」
1619 = "「Ừ. Vì vậy, chúng ta cần một kế hoạch xa\nhơn——\nhoặc là một cái gì đó khác.」"

# monologue
# JP: 僕が埋めていくべき穴が、ひとつ、さっそく見つかった。
2314 = "Tôi đã tìm thấy ngay một lỗ hổng mà mình\ncần phải lấp đầy."

# 【双鉄】
# display as 雙鐵
# JP: 「マイナーな温泉地から一歩を踏み出す、御一夜の魅力。\nそれをどう周知していくか、僕らは考えねばならん」
1696 = "「Sức hấp dẫn của Ohito, để thoát khỏi cái\nmác 'khu suối nước nóng hẻo lánh'.\nChúng ta phải suy nghĩ cách quảng bá nó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ということで、\nみなのアイディアをもらえないかと考えた」
1668 = "「Vì vậy,\nanh muốn xin ý kiến của mọi người.」"

# monologue
# JP: レールショップには、いつもの面々。
2547 = "Trong cửa hàng đường sắt, vẫn là những\ngương mặt quen thuộc."

# monologue
# JP: ポーレットのたっての希望で、\n真闇姉にも参席をしてもらっている。
2204 = "Theo nguyện vọng tha thiết của Paulette,\nchị Mayami cũng đã có mặt."

# 【ハチロク】
# display as 八六
# JP: 「…………」
1186 = "「…………」"

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1186 = "「……」" 

# monologue
# JP: が、どうしたことかなかなか意見が出てこない。\nハチロクも日々姫も実に微妙な表情だ。
2142 = "Nhưng, chẳng hiểu sao mãi không ai đưa ra\ný kiến gì.\nHachiroku và Hibiki đều mang vẻ mặt rất\nkhó xử."

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、\x%l8620;#00ffc040;8620%l;#;の活用についてだ。\nなにか、希望などはないのか？」
1516 = "「Hachiroku, về việc sử dụng \\x%l8620;#00ffc040;8620%l;#;.\nCô có nguyện vọng gì không?」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしのお仕事、本分は、\n整備し、走らせるところまでですし……」
1707 = "「Công việc, bổn phận của tôi,\nchỉ dừng lại ở việc bảo dưỡng và vận\nhành...」"

# monologue
# JP: ハチロクはそこで言葉を切って、\nじっ――とポーレットを見つめる。
2165 = "Hachiroku ngừng lời,\nvà chăm chú nhìn Paulette."

# 【ハチロク】
# display as 八六
# JP: 「まして御一夜のことを、\nわたくしは詳しく知りません」
1786 = "「Hơn nữa, về Ohito,\ntôi cũng không biết rõ lắm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それもそうか」
1887 = "「Cũng phải nhỉ.」"

# monologue
# JP: 言われてみれば納得だ。れいなもこくこく、頷いている。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の領分は、あくまで線路の上なのだろう。
2124 = "Nghe vậy cũng có lý. Reina cũng gật gật\nđầu.\nPhạm vi hoạt động của \\x%lレイルロオド;#00ffc040;Railord%l;#;, suy cho\ncùng chỉ nằm trên đường ray mà thôi."

# monologue
# JP: ならば、と日々姫に尋ねてみる。
2345 = "Vậy thì, tôi thử hỏi Hibiki xem sao."

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は御一夜に詳しかろう。\n地元で、しかも看板描きで密接にかかわっている」
1716 = "「Hibiki chắc hẳn rất rành về Ohito.\nLà người địa phương, lại còn vẽ biển hiệu\nnên có mối liên hệ rất mật thiết.」"

# 【日々姫】
# display as 日日姬
# JP: 「それは……どこで買い物するとか遊ぶとかなら\n知ってますけど――」
1886 = "「Chuyện đó... nếu là mua sắm hay đi chơi ở\nđâu thì\nem có biết, nhưng mà——」"

# monologue
# JP: 日々姫の視線もポーレットへと。\nけれど、こちらは一瞬だけだ。
2361 = "Ánh mắt của Hibiki cũng hướng về phía\nPaulette.\nNhưng chỉ trong chốc lát."

# 【日々姫】
# display as 日日姬
# JP: 「地元だとかえって――\n観光のこととか気にしませんし……」
1629 = "「Vì là người địa phương nên ngược lại——\nem chẳng quan tâm mấy đến chuyện du\nlịch...」"

# 【凪】
# display as 凪
# JP: 「ここにいるばい！\n御一夜が地元で観光に詳しい凪様がっ！」
1683 = "「Có em ở đây nè!\nNagi đại nhân, người bản địa Ohito, am\nhiểu du lịch đây!」"

# 【双鉄】
# display as 雙鐵
# JP: 「心強いな。\nならば凪様、教えてくれ」
1825 = "「Đáng tin cậy thật đấy.\nVậy Nagi đại nhân, xin hãy chỉ giáo.」"

# 【凪】
# display as 凪
# JP: 「御一夜の観光ば、クマ川下りで決まりばい！\nクマ川下りを前面に押し出して宣伝するばい！！」
1859 = "「Nói đến du lịch Ohito, chắc chắn phải là\nchèo thuyền trên sông Kuma rồi!\nChúng ta phải đẩy mạnh quảng bá chèo\nthuyền trên sông Kuma!!」"

# 【ふかみ】
# display as 深美
# JP: 「それはもうやってるんだよ、凪ちゃん。\nやってて……どんどん……観光客さん……減ってるの」
1671 = "「Cái đó thì làm rồi, Nagi à.\nLàm rồi... nhưng khách du lịch... cứ ngày\nmột giảm...」"

# 【凪】
# display as 凪
# JP: 「んぐっ」
1605 = "「Ư...」"

# monologue
# JP: ふかみが冷静に凪をなだめる。\nその悲しげな風情のせいか、凪は一気に黙りこむ。
2411 = "Fukami bình tĩnh xoa dịu Nagi.\nCó lẽ vì vẻ mặt buồn bã đó, Nagi lập tức\nim bặt."

# monologue
# JP: そうなんですよ、とため息をつき、\nポーレットがフォローの言葉を重ねる。
2402 = "Paulette thở dài, nói thêm vào:\n'Đúng là vậy đó'."

# 【ポーレット】
# display as 波萊特
# JP: 「温泉とクマ川下りとクマ焼酎。\nそれでずうっと、観光ＰＲはしてるんですけど……」
1796 = "「Suối nước nóng, chèo thuyền trên sông\nKuma và rượu shochu Kuma.\nChúng ta vẫn luôn dùng những thứ đó để\nquảng bá du lịch, nhưng...」"

# 【双鉄】
# display as 雙鐵
# JP: 「その三つには、間違いのない魅力がある」
1883 = "「Ba thứ đó chắc chắn có sức hấp dẫn\nriêng.」"

# monologue
# JP: 断言すれば、みなが頷く。
2485 = "Tôi khẳng định chắc nịch, mọi người đều\ngật đầu."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ＰＲが足りないか、ＰＲの仕方が悪いかだ」
1915 = "「Vậy thì, hoặc là quảng bá chưa đủ, hoặc\nlà cách quảng bá có vấn đề.」"

# monologue
# JP: 今度も、全員からの同意。\nけれどどうにも――そこから先の意見が今日は出てこない。
2330 = "Lần này, mọi người cũng đồng tình.\nNhưng không hiểu sao——hôm nay lại chẳng ai\nđưa ra được ý kiến nào xa hơn."

# monologue
# JP: ならば。やむを得ん。\nできることなら、頼らずに済ませておきたかったが……
2232 = "Nếu vậy thì. Hết cách rồi.\nNếu có thể, tôi đã muốn tự giải quyết mà\nkhông cần nhờ vả..."

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉はどうだろう？」
1828 = "「Chị Mayami thấy sao?」"

# 【真闇】
# display as 真闇
# JP: 「んー……」
1609 = "「Ừm...」"

# monologue
# JP: 珍しく、真闇姉が口ごもる。
2497 = "Hiếm khi thấy chị Mayami ấp úng."

# monologue
# JP: 僕を見、ポーレットを見、そして日々姫をハチロクを見て。\n困ったような笑みを浮かべて、小さく小さく肩をすくめる。
2222 = "Chị ấy nhìn tôi, nhìn Paulette, rồi nhìn\nHibiki và Hachiroku.\nChị ấy nở một nụ cười bối rối, khẽ nhún\nvai."

# 【真闇】
# display as 真闇
# JP: 「ひーちゃんとハチロクちゃんは、\n意見、なーんにもなかと？」
1664 = "「Bé Hi và Hachiroku,\nhai đứa không có ý kiến gì sao?」"

# 【日々姫】
# display as 日日姬＆八六
# JP: 「っ！」\n「――っ」
1947 = "「!」\n「——」"

# monologue
# JP: 真闇姉から重ねて問われ、\nなぜかふたりは、ギクリとしたような顔をする。
2484 = "Bị chị Mayami hỏi dồn,\nkhông hiểu sao hai người họ lại giật mình."

# monologue
# JP: 困ったような視線の交換。\nややあって、ハチロクがのろのろ、言葉をつむぐ。
2213 = "Họ trao nhau ánh mắt bối rối.\nMột lúc sau, Hachiroku mới chậm rãi lên\ntiếng."

# 【ハチロク】
# display as 八六
# JP: 「今のところは――ございません。\n双鉄様のご判断なら、尊重いたしたく思います」
1819 = "「Hiện tại thì——không có ạ.\nNếu là quyết định của ngài Soutetsu, tôi\nsẽ tôn trọng.」"

# monologue
# JP: （判断？）
2595 = "（Quyết định?）"

# monologue
# JP: この場にそぐわぬ言葉であるのに、\nなぜか、日々姫までもが頷く。
2368 = "Một từ ngữ không phù hợp với hoàn cảnh\nnày,\nnhưng không hiểu sao, ngay cả Hibiki cũng\ngật đầu."

# monologue
# JP: （ああ、いや――そうか）
2589 = "（À, khoan đã——Ra là vậy）"

# monologue
# JP: ハチロクと日々姫にしてみれば、僕がポーレットの提案を、\n“選んだ”というようにも捉えられるのか。
2499 = "Dưới góc nhìn của Hachiroku và Hibiki,\nviệc tôi nghe theo đề xuất của Paulette,\ncó thể hiểu là tôi đã 'lựa chọn' cô ấy\nsao."

# monologue
# JP: 逆から見れば、\n僕がふたりの提案を受け入れなかった――という風に。
2184 = "Ngược lại,\nnghĩa là tôi đã không chấp nhận đề xuất\ncủa hai người họ——kiểu như vậy."

# monologue
# JP: （僕としては、チームが継続的によりよく機能するための、\n最善の手当てを行っただけのつもりだったのだが……）
2594 = "（Với tôi, tôi chỉ định đưa ra phương án\ntốt nhất\nđể nhóm có thể tiếp tục hoạt động hiệu quả\nhơn mà thôi...）"

# monologue
# JP: が、日々姫とハチロクがそう感じたなら、\n口先でどうこう説明しても、上滑りするだけだろう。
2146 = "Nhưng, nếu Hibiki và Hachiroku đã cảm thấy\nnhư vậy,\nthì dù có giải thích thế nào cũng chỉ là\nlời nói suông."

# monologue
# JP: 尊重し、見守ってくれるというのなら、\n結果を出して、僕の“判断”が正であったと示せばよい。
2347 = "Nếu họ đã nói là sẽ tôn trọng và dõi theo,\nthì tôi chỉ cần tạo ra kết quả, chứng minh\n'quyết định' của mình là đúng đắn."

# 【真闇】
# display as 真闇
# JP: 「そ？　そーならそれで」
1745 = "「Thế à? Thế thì thôi vậy.」"

# monologue
# JP: 短く言って真闇姉は、僕の方へと向き直る。
2448 = "Chị Mayami nói ngắn gọn, rồi quay sang\nnhìn tôi."

# 【真闇】
# display as 真闇
# JP: 「あんね、双ちゃん。ウチも古い御一夜の人間やけん、\n[よそ,1]他所の人らに、何が魅力的に見ゆるやはわからんね」
1846 = "「Chị nói nghe nè, Sou-chan. Chị cũng là\nngười Ohito gốc,\nnên không biết trong mắt người xứ khác,\nOhito có điểm gì hấp dẫn đâu nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
# 1576 = "「啊！」" 

# monologue
# JP: そうか。単純にそういうことか。
2178 = "Ra là vậy. Lý do đơn giản vậy thôi sao."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、御一夜に観光に来るものは、\n御一夜の外の人間なのだな」
1527 = "「Quả thực, những người đến Ohito du lịch,\nđều là người từ nơi khác đến.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですよね。だったら――\nここにいる中で、御一夜のことをまだ知らないのは」
1588 = "「A, đúng vậy nhỉ. Nếu thế thì——\nTrong số những người ở đây, người vẫn chưa\nbiết nhiều về Ohito là...」"

# 【真闇】
# display as 真闇
# JP: 「ハチロクちゃんにれいなちゃん、ナビちゃんあたりは、\n人間とはきっと、目線がずいぶん違うけんねぇ」
1513 = "「Hachiroku, Reina và Navi thì,\ngóc nhìn chắc chắn sẽ rất khác với con\nngười nhỉ.」"

# monologue
# JP: ポーレットの視線の先へと、真闇姉の言葉がまわりこむ。\nハチロクたちの頷きを見れば、妥当な指摘なのだろう。
2401 = "Lời của chị Mayami cắt ngang hướng nhìn\ncủa Paulette.\nNhìn Hachiroku gật đầu, có lẽ đó là một\nnhận xét xác đáng."

# monologue
# JP: で、あるのなら――
2351 = "Nếu đã vậy thì——"

# 【双鉄】
# display as 雙鐵
# JP: 「僕が最も適任となるか？　\n昔も今も、ほぼ御一夜の観光をした記憶がない」
1914 = "「Anh là người phù hợp nhất sao?\nTừ trước đến nay, anh hầu như không có ký\nức gì về việc đi tham quan Ohito cả.」"

# monologue
# JP: 昔は、観光を楽しめるような精神状態ではなかった。\n今は戻ってきてからこっち、ひたすらに動いているだけだ。
2536 = "Ngày xưa, tôi không có tâm trí nào để đi\ndu lịch.\nCòn bây giờ từ lúc trở về, tôi chỉ cắm đầu\nvào làm việc."

# 【真闇】
# display as 真闇
# JP: 「やねぇ」
1729 = "「Đúng vậy ha.」"

# monologue
# JP: どこかため息に近い調子で、真闇姉が深く頷く。
2450 = "Chị Mayami gật đầu thật sâu, kèm theo một\ntiếng thở dài."

# 【真闇】
# display as 真闇
# JP: 「けど双ちゃん一人じゃ、男視点でしか見れんばい」
1486 = "「Nhưng nếu chỉ có mình Sou-chan, thì chỉ\nnhìn được dưới góc độ của đàn ông thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ならば――」
1528 = "「Ra là vậy, thế thì——」"

# monologue
# JP: 目が合う。\nぱっと、ポーレットの頬がバラ色になる。
2324 = "Ánh mắt chạm nhau.\nĐôi má Paulette bỗng chốc ửng hồng."

# monologue
# JP: そうもやる気を見せてくれれば、\n多忙であるとは承知の上でも、誘ってみたくなるものだ。
2436 = "Thấy cô ấy hào hứng như vậy,\ndù biết cô ấy rất bận rộn, tôi vẫn muốn\nthử rủ xem sao."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットはどうだ？　御一夜の観光については」
1789 = "「Paulette thì sao? Về việc tham quan Ohito\nấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「実地の方は全然です、わたしも。\n御一夜に来てから、政治と鉄道のことばっかりで」
1693 = "「Em cũng chưa đi thực tế bao giờ.\nTừ lúc đến Ohito, em chỉ lo chuyện chính\ntrị và đường sắt thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならどうだ。僕と一緒に見てみんか？　御一夜の観光を、\nどのように盛りたてていけばいいかを、新しい視点で」
1927 = "「Vậy thì sao nào. Em có muốn cùng anh đi\nxem thử không?\nXem làm thế nào để thúc đẩy du lịch Ohito,\ndưới một góc nhìn mới.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい！　喜んで」
1621 = "「Vâng! Rất sẵn lòng ạ.」"

# 【凪】
# display as 凪
# JP: 「ならウチっ！？　もがもが～っ」
1909 = "「Vậy em thì sao!? Moga moga~」"

# 【ふかみ】
# display as 深美
# JP: 「もう、凪ちゃんてばぁ」
1662 = "「Thiệt tình, Nagi à.」"

# monologue
# JP: ああみえて、一線級の船頭であるということか。\nふかみの力は、見た目よりよほど強いらしい。
2413 = "Nhìn vậy thôi chứ em ấy cũng là người lái\nđò cừ khôi đấy.\nSức mạnh của Fukami có vẻ lớn hơn vẻ bề\nngoài nhiều."

# monologue
# JP: あの凪が、口を押さえられふりほどけずに、\nじたばたもがくだけしかできない。
2250 = "Đến Nagi mà cũng bị bịt miệng không vùng\nra được,\nchỉ biết giãy giụa loạn xạ."

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ。どうした？」
1792 = "「Fukami. Có chuyện gì vậy?」"

# 【ふかみ】
# display as 深美
# JP: 「え？　あっ――凪ちゃん。その――。\nう、うち。寄ってから帰る約束、してるだけ。です」
1551 = "「Dạ? A——Nagi. Chuyện đó——.\nB-bọn em, có hẹn ghé qua nhà em rồi mới\nvề. Ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
1747 = "「Vậy sao?」"

# 【ふかみ】
# display as 深美
# JP: 「ちょっと……ええと……\nそれが、待ちきれなかったみたい。です」
1643 = "「Chỉ là... ừm...\nCậu ấy có vẻ không đợi được nữa thôi. Ạ.」"

# 【凪】
# display as 凪
# JP: 「もがぁ」
1604 = "「Mogaa」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、長引かせては申し訳ないな」
1770 = "「Vậy à, xin lỗi vì đã làm mất thời gian\ncủa hai đứa nhé.」"

# monologue
# JP: ともかく、これで話は決まった。\nあとはポーレットの時間の合間を縫って動けばいい。
2475 = "Dù sao thì, chuyện cũng đã quyết xong.\nGiờ chỉ cần tranh thủ thời gian rảnh rỗi\ncủa Paulette để hành động thôi."

# monologue
# JP: ハチロクと日々姫はまだ不満そうな雰囲気だが、\nあの二人なら大丈夫。結果を示せば、必ず理解してくれる。
2558 = "Hachiroku và Hibiki có vẻ vẫn còn bất mãn,\nnhưng hai người đó thì không sao đâu. Chỉ\ncần đưa ra kết quả, họ chắc chắn sẽ hiểu."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ポーレット。今週のスケジュールを貰えるか？\nできるだけ早く動きたい」
1926 = "「Vậy thì, Paulette. Em cho anh xem lịch\ntrình tuần này được không?\nAnh muốn tiến hành càng sớm càng tốt.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、ええと――\nすぐ持ってきます！！」
1647 = "「Vâng, ừm——\nEm đi lấy ngay đây!!」"

# monologue
# JP: 足取り軽く、ポーレットは奥へと引っ込んでいく。\nれいなはどこか楽しげで、ハチロクと日々姫は浮かぬ顔。
2408 = "Paulette bước đi nhẹ nhàng vào trong.\nReina có vẻ vui vẻ, còn Hachiroku và\nHibiki thì xị mặt ra."

# monologue
# JP: ふかみと凪は――っ！？
2480 = "Fukami và Nagi thì——!?"

# 【双鉄】
# display as 雙鐵
# JP: 「おい、ふかみ。凪の顔色が良くないぞ？」
1602 = "「Này, Fukami. Sắc mặt Nagi không được tốt\nlắm đâu?」"

# 【ふかみ】
# display as 深美
# JP: 「あわっ！？　ちょっ、凪ちゃんっ！？　凪ちゃんっ！」
1569 = "「Á!? Khoan, Nagi!? Nagi!」"

# 【凪】
# display as 凪
# JP: 「もぎゅぅぅぅ～～～っ」
1606 = "「Mogyuuuu~~~」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
1560 = "「Hừm.」"

# monologue
# JP: 御一夜[じょうし,1]城址をゆっくり下りれば、\nすぐに市役所前に出る。
2307 = "Từ tốn đi xuống từ Di tích thành Ohito,\nsẽ ra ngay trước Tòa thị chính."

# 【双鉄】
# display as 雙鐵
# JP: 「……記憶にあるより、随分と近代化したのだな」
1196 = "「...Đã hiện đại hóa hơn rất nhiều so với\ntrong ký ức của anh nhỉ.」"

# monologue
# JP: 御一夜城址、三の丸跡から一望できる御一夜の町。\n正直ごくごく平凡な、一昔前の田舎町という印象だったが。
2471 = "Từ tàn tích Sannomaru của thành Ohito, có\nthể phóng tầm mắt bao quát toàn bộ thị\ntrấn.\nThành thật mà nói, ấn tượng của tôi về nó\nchỉ là một thị trấn nông thôn hết sức bình\nthường của ngày xưa."

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね……鍛冶屋町のあたりの他は、\n古い建物、どんどん減っていってますし――」
1731 = "「Đúng vậy nhỉ... Ngoại trừ khu vực phố thợ\nrèn,\nnhững tòa nhà cũ kỹ đang ngày một ít đi——」"

# 【双鉄】
# display as 雙鐵
# JP: 「クマ川の流れは雄大で美しくはあるが――\nそれのみでは、観光客は呼べぬものか」
1938 = "「Dòng sông Kuma hùng vĩ và tuyệt đẹp thật\nđấy——\nNhưng chỉ chừng đó thôi thì không đủ để\nthu hút khách du lịch sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「川は……難しいんですかね？　セーヌとかナイル、\nそのくらい有名じゃないと見に来てもらえないのかも」
1854 = "「Dùng sông... khó lắm nhỉ? Phải nổi tiếng\ncỡ sông Seine hay sông Nile,\nthì người ta mới đến xem chăng.」"

# monologue
# JP: その言葉にふと、疑問を覚える。
2316 = "Nghe những lời đó, tôi chợt thấy thắc mắc."

# 【双鉄】
# display as 雙鐵
# JP: 「セーヌはなにゆえ、あれほどまでに有名なのだ？\nナイルなら世界一長い川だからだろうが――」
1639 = "「Sông Seine tại sao lại nổi tiếng đến vậy?\nSông Nile thì là do nó là con sông dài\nnhất thế giới rồi——」"

# 【ポーレット】
# display as 波萊特
# JP: 「セーヌこそ、フランクそのもの。世界最高の芸術の都、\nパル＝イスの中心にして源だからですよ」
1638 = "「Sông Seine chính là biểu tượng của nước\nPháp. Là trung tâm,\nlà cội nguồn của kinh đô nghệ thuật số một\nthế giới, Paris.」"

# 【双鉄】
# display as 雙鐵
# JP: 「中心にして、源」
1470 = "「Trung tâm, cội nguồn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。パル＝イスはもともと、\nセーヌの中洲にある島から発展していったんです」
1614 = "「Vâng. Paris vốn dĩ,\nphát triển từ một hòn đảo nằm giữa dòng\nsông Seine.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
# 1747 = "「是嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「パル＝イスの発展とともに、\n[あまた,1]数多の詩が、歌が、そして絵画が産まれます」
1801 = "「Cùng với sự phát triển của Paris,\nvô số bài thơ, bài hát, và những bức tranh\nđã ra đời.」"

# monologue
# JP: それこそ詩のように、歌うように、\nポーレットは軽やかな言葉をつなげる。
2378 = "Paulette tuôn ra những lời lẽ nhẹ nhàng,\nnhư đang ngâm thơ, như đang ca hát."

# monologue
# JP: もうひとつの故郷へと注ぐ愛情の豊かさが、\nその端々からにじみ出ている。
2101 = "Tình yêu sâu đậm dành cho quê hương thứ\nhai,\ntoát ra từ từng câu từng chữ."

# 【ポーレット】
# display as 波萊特
# JP: 「無数の芸術がセーヌを讃え、セーヌは美しく流れ。\nその積み重ねが、セーヌの名を高めたんだと思います」
1800 = "「Vô số tác phẩm nghệ thuật ca ngợi sông\nSeine, và sông Seine vẫn luôn chảy trôi\ntuyệt đẹp.\nEm nghĩ chính sự tích lũy đó đã làm nên\ndanh tiếng của sông Seine.」"

# 【双鉄】
# display as 雙鐵
# JP: 「芸術、か――」
1852 = "「Nghệ thuật, sao——」"

# monologue
# JP: 日々姫の顔が頭に浮かぶ。\nあれの絵は、確かに僕の心を打つ。
2488 = "Khuôn mặt của Hibiki hiện lên trong đầu\ntôi.\nTranh của em ấy, quả thực có thể lay động\ntrái tim tôi."

# monologue
# JP: が、それが万人に通じるものかはわからぬし、\n今はまだ、誰に知られている存在でもない。
2144 = "Nhưng, tôi không biết liệu nó có chạm đến\nđược tất cả mọi người hay không,\nvà hiện tại em ấy vẫn chưa được ai biết\nđến."

# 【双鉄】
# display as 雙鐵
# JP: 「クマ川がその例に倣うとしても――\n何百年の時が必要となってしまう、か」
1525 = "「Cho dù sông Kuma có noi theo tấm gương\nđó——\nThì cũng phải mất hàng trăm năm sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですよね、一朝一夕には、なかなか」
1743 = "「Đúng vậy nhỉ, chuyện một sớm một chiều là\nrất khó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「となると――ああ」
1711 = "「Vậy thì——A.」"

# monologue
# JP: 思いつく。
2323 = "Tôi nảy ra một ý."

# monologue
# JP: 大切なのは、長さでも芸術でもなく、\n“世界一”という部分だろうと。
2545 = "Điều quan trọng không phải là chiều dài\nhay nghệ thuật,\nmà là yếu tố 'nhất thế giới'."

# 【双鉄】
# display as 雙鐵
# JP: 「何か世界一――は無理としても、日ノ本一はないかな。\nクマ川なり、御一夜なりに」
1524 = "「Nhất thế giới thì có vẻ hơi quá sức,\nnhưng nhất Hinomoto thì sao.\nDù là sông Kuma hay Ohito.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　そうですよね。\n日ノ本一は、明快な看板になりますよね」
1574 = "「A! Đúng vậy nhỉ.\nNhất Hinomoto sẽ là một tấm biển quảng cáo\nrõ ràng và hấp dẫn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それはどんなに単純なものでもいいと思う」
1616 = "「Ừm. Dù là thứ đơn giản đến đâu cũng\nđược.」"

# monologue
# JP: クマ川があり、温泉があり、クマ焼酎がある。\nそこに、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;までもが加わる。
2308 = "Có sông Kuma, có suối nước nóng, có rượu\nshochu Kuma.\nLại có thêm cả \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; nữa."

# monologue
# JP: ならば看板ひとつ、目立つ看板で繋げるのなら、\n全てに更なる相乗効果が生じるのではなかろうか。
2544 = "Vậy thì, nếu kết nối chúng lại bằng một\ntấm biển quảng cáo thật nổi bật,\nchẳng phải sẽ tạo ra hiệu ứng cộng hưởng\ncho tất cả sao."

# 【ポーレット】
# display as 波萊特
# JP: 「けど――\n統計的な面、数字面では、なかったように思います」
1489 = "「Nhưng mà——\nVề mặt thống kê, những con số, em nghĩ là\nkhông có đâu.」"

# monologue
# JP: さすがは現職の市長。\n資料も見ずにすらすら答える。
2115 = "Không hổ danh là Thị trưởng đương nhiệm.\nTrả lời lưu loát mà chẳng cần xem tài\nliệu."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、歩いて見つけるしかない。\n一番可能性がありそうなのは……鍛冶屋町あたりか？」
1918 = "「Vậy thì, chỉ còn cách tự đi tìm thôi.\nNơi có khả năng cao nhất là... khu vực phố\nthợ rèn chăng?」"

# 【ポーレット】
# display as 波萊特
# JP: 「かもしれませんね、御一夜で一番古い場所ですし」
1776 = "「Có thể lắm ạ, đó là nơi lâu đời nhất ở\nOhito mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、向かおう」
1921 = "「Thế thì đi thôi.」"

# monologue
# JP: ……ポーレットと並んで歩く。\nれいなを挟まず、ハチロクを連れず。
1151 = "……Sóng bước cùng Paulette."

# monologue
# JP: 故にペースをあわせることなく、自然に歩ける。\n歩幅が近いということが、ごく単純に心地良い。
2196 = "Không có Reina xen giữa, không dẫn\nHachiroku theo.\nNên chúng tôi có thể bước đi tự nhiên,\nkhông cần phải gượng ép bắt nhịp với ai."

# 【双鉄】
# display as 雙鐵
# JP: 「……日曜だというのに、\n観光客の姿がほとんど見えないな」
1193 = "「...Rõ ràng là Chủ nhật,\nmà hầu như chẳng thấy bóng dáng khách du\nlịch nào cả.」"

# monologue
# JP: が、足取りが軽快なのも良し悪しだ。
2148 = "Nhưng, bước chân nhẹ nhàng cũng có cái hay\ncái dở."

# monologue
# JP: これほどスムーズに歩けてしまうのは、\n観光スポットとしては、いかにもまずい。
2205 = "Có thể đi lại trơn tru thế này,\nđối với một điểm tham quan du lịch thì quả\nlà tồi tệ."

# 【ポーレット】
# display as 波萊特
# JP: 「あはは……\n人の数より、キジ馬の数の方が多いくらいですね」
1571 = "「Ahaha...\nSố lượng người còn ít hơn cả số lượng ngựa\nKiji nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1730 = "「À——」"

# monologue
# JP: 言われて気にしてみれば、なるほど。\n通りの中のそこここに、キジ馬たちが鎮座している。
2473 = "Nghe cô ấy nói tôi mới để ý, quả đúng là\nvậy.\nNgựa Kiji chễm chệ khắp nơi trên đường\nphố."

# monologue
# JP: 鯉のぼりに車輪をつけたような御一夜伝統の木工細工は、\n小さくとも大きくとも、それぞれ愛嬌に満ちている。
2556 = "Món đồ gỗ truyền thống của Ohito, trông\nnhư chiếc cờ cá chép được gắn thêm bánh\nxe,\ndù to hay nhỏ đều mang vẻ đáng yêu riêng."

# 【双鉄】
# display as 雙鐵
# JP: 「キジ馬も、じっくり見れば可愛いものだが――」
1940 = "「Ngựa Kiji, nhìn kỹ thì cũng dễ thương\nđấy——」"

# 【ポーレット】
# display as 波萊特
# JP: 「町中にちらばりすぎてるから、\nあっという間に見慣れちゃうんですよね」
1483 = "「Nhưng vì rải rác khắp thị trấn,\nnên người ta nhìn quen mắt rất nhanh.」"

# monologue
# JP: 確かにだ。\n僕も言われてみるまでは、特別意識をしていなかった。
2463 = "Quả thật là vậy.\nCho đến khi nghe cô ấy nói, tôi cũng chẳng\nhề để tâm đến."

# 【ポーレット】
# display as 波萊特
# JP: 「でも、キジ馬の数くらいには勝てないとダメですよね。\nいくら観光客さんが、\x%lエアクラ;#00ffc040;エアクラ%l;#;移動してるっていっても」
1494 = "「Nhưng mà, ít ra số lượng du khách cũng\nphải thắng được số lượng ngựa Kiji chứ.\nDù cho khách du lịch có di chuyển bằng \\x%lエアクラ;#00ffc040;Aircra%l;#;\nđi chăng nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。その影響も大きいのだよな。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;交通は、移動コストを激減させるから」
1735 = "「Đúng vậy. Ảnh hưởng của nó cũng rất lớn.\nGiao thông bằng \\x%lエアクラ;#00ffc040;Aircra%l;#; làm giảm thiểu chi\nphí di chuyển một cách đáng kể.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですよね。だから、観光は滞在型より、\n周遊型の方が圧倒的になっちゃって――」
1665 = "「Vâng, đúng là vậy ạ. Do đó, du lịch kiểu\nđi dạo tham quan nhiều nơi\nđã lấn át hoàn toàn kiểu du lịch nghỉ\ndưỡng——」"

# 【双鉄】
# display as 雙鐵
# JP: 「現状、宿泊地に選ばれるほどの強みを持たん御一夜は、\n短時間の観光で通過されてしまう……というわけか」
1820 = "「Hiện tại, Ohito không có đủ sức hấp dẫn\nđể được chọn làm nơi lưu trú,\nnên chỉ là một điểm dừng chân chớp nhoáng\nrồi bị bỏ qua... ra là vậy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「有力な温泉地が多すぎるんですよ、九洲」
1474 = "「Ở Kyushu có quá nhiều khu suối nước nóng\nnổi tiếng mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うーむ。しかし……この人どおりを見る限り、\n短時間の観光スポットとしてもあまりに寂しいぞ」
1608 = "「Ừm. Nhưng... nhìn lượng người qua lại thế\nnày,\nthì làm điểm dừng chân chớp nhoáng cũng\nquá đỗi đìu hiu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それは――きっとタイミングですよ。今はたまたま、\n他の見どころに行っちゃってるんじゃないですか？」
1881 = "「Chắc là——do không đúng lúc thôi. Chắc bây\ngiờ tình cờ,\nmọi người đều đi đến những điểm tham quan\nkhác rồi chăng?」"

# 【双鉄】
# display as 雙鐵
# JP: 「見どころ？」
1505 = "「Điểm tham quan?」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、\n実際にはまだ行けてないとこが多いんですけど――」
1519 = "「Thực ra,\nem cũng còn nhiều nơi chưa đi lắm——」"

# monologue
# JP: ポーレットがイラストマップを広げてくれる。\nなんとも準備が良いことで、これまたほのかに嬉しくなる。
2404 = "Paulette mở bản đồ minh họa ra.\nSự chuẩn bị chu đáo này lại khiến tôi cảm\nthấy vui vui."

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜[じょうし,1]城址、クマ川下り発船所の他だと、\n[みぎたいちしゅぞうもと,5]右田一酒造元もそうですよね」
1936 = "「Ngoài Di tích thành Ohito và bến tàu chèo\nsông Kuma ra,\nthì Nhà máy rượu Migita System cũng là một\nđiểm tham quan nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、\n蔵の一部を見学コースとして開放しているとは聞くな」
1625 = "「À,\nanh có nghe nói họ mở cửa một phần xưởng\nrượu cho khách tham quan.」"

# monologue
# JP: とはいえ、実際に見学客が来てくれることはほとんど無い。
2243 = "Dù vậy, thực tế thì hiếm khi có khách đến\ntham quan."

# monologue
# JP: 真闇姉の案内ならば、\n誰もが楽しく、充実の見学をできそうに思うのだが……
2140 = "Nếu được chị Mayami hướng dẫn,\ntôi nghĩ ai cũng sẽ có một chuyến tham\nquan vui vẻ và thú vị..."

# 【ポーレット】
# display as 波萊特
# JP: 「お味噌お醤油の[かまた,1]蒲田さんも見学できるスポットですし、\nあと、ここ――[さんすいえん,2]山水園さんのお茶蔵」
1931 = "「Xưởng tương miso và nước tương của nhà\nKamata cũng là một điểm tham quan,\nvà cả đây nữa——xưởng trà của nhà\nSansuien.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1560 = "「唔」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ここが、御一夜で一番古い現存建造物とされてます。\n確か……築百三十年とか百四十年とか」
1889 = "「Đây được cho là công trình kiến trúc hiện\ntồn lâu đời nhất ở Ohito.\nChắc là... được xây dựng cách đây 130 hay\n140 năm gì đó.」"

# monologue
# JP: 百三十年。
2599 = "130 năm."

# monologue
# JP: 確かに古いが……\n[きょうと,1]京塗、二千年の古都などとは比すべくも無い。
2559 = "Quả thực là lâu đời, nhưng...\nso với cố đô Kyoto có lịch sử 2000 năm thì\nchẳng thấm vào đâu."

# 【双鉄】
# display as 雙鐵
# JP: 「古い建物があまりないのは、\x%l大戦;#00ffc040;大戦%l;#;の影響か？」
1536 = "「Không có nhiều tòa nhà cổ, là do ảnh\nhưởng của \\x%l大戦;#00ffc040;Đại chiến%l;#; sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「も、あると思います。御一夜は、隈元市内みたいに\n直接の大空襲は受けてないですけど、それでも」
1691 = "「Em nghĩ cũng có phần. Ohito tuy không bị\nkhông kích trực tiếp\nnhư trung tâm thành phố Kumamoto, nhưng\nmà...」"

# 【双鉄】
# display as 雙鐵
# JP: 「戦災の傷跡から立ち上がるため、か」
1797 = "「Để đứng lên từ tàn tích của chiến tranh,\nsao.」"

# monologue
# JP: [おきなわ,2]隠岐縄の被害ほどではなかろうが、\n九洲の受けた戦禍も、[なまなか,1]生半なものではないはずだ。
2560 = "Tuy không chịu thiệt hại nặng nề như\nOkinawa,\nnhưng hậu quả chiến tranh mà Kyushu gánh\nchịu cũng không hề nhỏ."

# monologue
# JP: 立ち直るため、塗り替える――\nその気持ちなら、僕にも痛いほどよくわかる。
2421 = "Sơn sửa lại mọi thứ để vực dậy tinh thần——\nTôi thấu hiểu cảm giác đó đến mức đau\nlòng."

# 【双鉄】
# display as 雙鐵
# JP: 「歴史方面での日ノ本一は無理そうだな。\nが――見どころとあらば、とにもかくにも見てみよう」
1822 = "「Có vẻ như việc trở thành nhất Hinomoto về\nmặt lịch sử là không thể rồi.\nNhưng——nếu đã có điểm tham quan thì cứ đi\nxem thử đã.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね」
1741 = "「Vâng ạ.」"

# monologue
# JP: 再び並んで歩き始める。\nクマ川からの、水を含んだ風の匂いが、心地いい。
2306 = "Chúng tôi lại sóng bước bên nhau.\nMùi gió mang theo hơi nước từ sông Kuma\nthật dễ chịu."

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　双鉄くん」
1575 = "「A! Anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「むっ？　人だかりだな」
1626 = "「Hửm? Đám đông tụ tập kìa.」"

# monologue
# JP: 珍しい。\n思うと同時に足が動く。
2297 = "Hiếm thấy thật.\nTôi vừa nghĩ vừa bước chân về phía đó."

# monologue
# JP: 制服姿は、修学旅行の客であろうか？\nその人だかりの向こうには、なんだ――出店か？
2541 = "Đám người mặc đồng phục kia, chắc là học\nsinh đi dã ngoại chăng?\nPhía sau đám đông đó là gì thế——một quầy\nhàng sao?"

# 【永山】
# display as ？？？
# JP: 「ああ、市長さん。あら？　デート？？」
1596 = "「A, cô Thị trưởng. Ủa? Đang hẹn hò hả??」"

# 【ポーレット】
# display as 波萊特
# JP: 「デデデデっ、デートっ、じゃ、ありません！\n%61;……残念ですけど」
1450 = "「K-k-k-không phải, không phải hẹn hò đâu\nạ!\n%61;... Tiếc là vậy.」"

# monologue
# JP: やけに気やすい、快活そうな中年女性だ。
2527 = "Một người phụ nữ trung niên trông có vẻ\nrất dễ gần và hoạt bát."

# 【双鉄】
# display as 雙鐵
# JP: 「こちらは、ポーレットのお知り合いか？」
1885 = "「Đây là người quen của Paulette à?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい！　ご紹介させてくださいね？」
1598 = "「A, vâng! Để em giới thiệu nhé?」"

# monologue
# JP: ポーレットの声に、\n出店の中の中年女性は、僕をみつめてにかっと笑う。
2483 = "Nghe Paulette nói,\nngười phụ nữ trung niên trong quầy hàng\nnhìn tôi cười tươi rói."

# 【ポーレット】
# display as 波萊特
# JP: 「こちらは、永山典子さん。[ゆうれいでら,2]幽霊寺――\n[えいざんじ,2]榮山寺のご住職の奥様です」
1884 = "「Đây là cô Nagayama Noriko. Là phu nhân\ncủa trụ trì chùa ma——\nà không, chùa Eizan.」"

# monologue
# JP: 幽霊寺……ああ、そうか。あそこも観光名所のはずだ。
2260 = "Chùa ma... À, ra vậy. Chỗ đó cũng là một\nđiểm tham quan nổi tiếng mà."

# monologue
# JP: 幽霊だのなんだのは、僕には刺激がいささか強く、\n昔も今も、訪ねたことはないのだが――
2259 = "Mấy thứ ma quỷ có vẻ hơi quá sức với tôi,\nnên từ trước đến nay tôi chưa từng đến đó\nbao giờ——"

# 【永山】
# display as 永山
# JP: 「はじめまして、永山です。\n君は――\x%l8620;#00ffc040;8620%l;#;の\x%l機関士;#00ffc040;機関士%l;#;さん、よね？」
1500 = "「Rất vui được gặp cậu, tôi là Nagayama.\nCậu là——\\x%l機関士;#00ffc040;Lái tàu%l;#; của \\x%l8620;#00ffc040;8620%l;#;, đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい。右田双鉄と申します。\n僕をご存知とは、見学会にご参加くださったんですか？」
1755 = "「Vâng. Cháu là Migita Soutetsu.\nCô biết cháu sao, cô đã tham gia buổi tham\nquan à?」"

# 【永山】
# display as 永山
# JP: 「うん。あたしも鉄道が好きだから」
1613 = "「Ừ. Tại cô cũng thích đường sắt mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それでポーレットとお知り合いに」
1590 = "「À, ra vậy nên cô mới quen biết với\nPaulette.」"

# monologue
# JP: 言えばにっこり、\nポーレットも永山婦人も嬉しげな笑み。
2486 = "Nghe tôi nói vậy, Paulette và phu nhân\nNagayama\nđều nở nụ cười rạng rỡ."

# 【双鉄】
# display as 雙鐵
# JP: 「それでは、永山さんも\x%lまいてつ;#00ffc040;まいてつ%l;#;なのですか？」
1924 = "「Vậy, cô Nagayama cũng là \\x%lまいてつ;#00ffc040;chủ tàu%l;#; ạ?」"

# 【永山】
# display as 永山
# JP: 「ううん？　あたしはこれ――」
1456 = "「Không? Cô là cái này cơ——」"

# monologue
# JP: 言いながら、永山婦人は丸い鉄板の上に\nとろとろの液体を注ぎ落とす。
2387 = "Vừa nói, phu nhân Nagayama vừa đổ\nmột lớp bột sền sệt lên chiếc chảo sắt\ntròn."

# monologue
# JP: それを器用に伸ばして広げ、クリーム、バナナ、\nイチゴを乗せて手早く巻いて紙につめ――
2554 = "Bà khéo léo dàn đều lớp bột, cho thêm kem,\nchuối,\ndâu tây rồi nhanh tay cuộn lại, bọc trong\nlớp giấy——"

# 【永山】
# display as 永山
# JP: 「はぁい、おまたせ。三五〇円」
1648 = "「Đây, để cháu đợi lâu. 350 yên.」"

# 【学園生Ａ】
# display as 游客？
# JP: 「ありがと！　はい、三五〇円丁度ばい！」
1864 = "「Cảm ơn cô! Đây ạ, 350 yên vừa đủ nha!」"

# 【永山】
# display as 永山
# JP: 「はぁい。毎度ありがとうね」
1645 = "「Được rồi. Cảm ơn cháu đã luôn ủng hộ\nnhé.」"

# monologue
# JP: 手渡すやいなや、観光客の一群は、\nきゃっきゃと笑いさざめき、歩いて行ってしまう。
2338 = "Vừa nhận được bánh, nhóm khách du lịch\nliền cười đùa ríu rít rồi bỏ đi."

# monologue
# JP: いや、というか――隈元弁だ。\nならば、恐らく、観光客などではなくて……
2117 = "Khoan đã, nói sao nhỉ——Họ dùng phương ngữ\nKumamoto.\nVậy thì, có lẽ họ không phải khách du lịch\nmà là..."

# 【双鉄】
# display as 雙鐵
# JP: 「毎度、ということは……地元の学園生なのですか？」
1183 = "「'Luôn ủng hộ' nghĩa là... họ là học sinh\nở đây ạ?」"

# 【永山】
# display as 永山
# JP: 「うん。お得意さん。毎週来てくれてるわね」
1623 = "「Ừ. Khách quen đấy. Tuần nào cũng đến.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、毎週ここでクレープ屋を？」
1920 = "「Vậy là tuần nào cô cũng bán bánh crepe ở\nđây ạ?」"

# 【永山】
# display as 永山
# JP: 「そうそう。その話だったわね」
1660 = "「Đúng rồi. Quay lại chuyện lúc nãy nhé.」"

# monologue
# JP: さっ、さっ、と素早く手が動く。\nクレープ二つ。イチゴのソースとチョコのソースだ。
2230 = "Đôi tay bà thoăn thoắt cử động.\nHai chiếc bánh crepe. Một nhân sốt dâu,\nmột nhân sốt sô-cô-la."

# 【永山】
# display as 永山
# JP: 「私は、強いていうなら\x%l食べ鉄;#00ffc040;[た]食べ[テツ]鉄%l;#;ね。\n自分で作る方がもっと好きだけど」
1829 = "「Nếu phải phân loại thì cô thuộc nhóm \\x%l食べ鉄;#00ffc040;người sành ăn trên tàu%l;#;\n.\nTuy cô thích tự nấu ăn hơn.」"

# monologue
# JP: クレープ二つが差し出されるから、\nポーレットに先に選ばせる。
2228 = "Bà ấy đưa hai chiếc bánh crepe ra,\ntôi để Paulette chọn trước."

# monologue
# JP: 予想通りにイチゴがポーレットの手に渡り、\n僕の取り分はチョコになる。
2111 = "Đúng như dự đoán, Paulette chọn chiếc nhân\ndâu,\nvà phần của tôi là chiếc nhân sô-cô-la."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l食べ鉄;#00ffc040;[た]食べ[テツ]鉄%l;#;、とは――」
1174 = "「\\x%l食べ鉄;#00ffc040;Người sành ăn trên tàu%l;#; là sao ạ——」"

# 【永山】
# display as 永山
# JP: 「\x%l列車;#00ffc040;列車%l;#;に乗って、駅弁やその土地の名産を食べることを\n主とするタイプの鉄道ファンね」
1748 = "「Là kiểu người hâm mộ đường sắt lấy việc\nđi \\x%l列車;#00ffc040;tàu%l;#;\nđể thưởng thức cơm hộp nhà ga và đặc sản\nđịa phương làm mục đích chính ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。テツも本当にいろいろですね」
1558 = "「Hừm. Người hâm mộ đường sắt cũng có nhiều\nkiểu thật đấy.」"

# monologue
# JP: 料金を出そうとすれば断られるだろうから、\nありがたく御馳走になることにする。
2233 = "Chắc có trả tiền bà ấy cũng không nhận,\nnên tôi quyết định nhận lấy lòng tốt này."

# monologue
# JP: くちもとに運べばふわり、\n甘やかな香りが鼻から脳へと染みる。
2334 = "Đưa lên miệng, hương thơm ngọt ngào\nlan tỏa từ mũi lên tận não."

# monologue
# JP: （はむっ）
2588 = "（Cắn）"

# 【双鉄】
# display as 雙鐵
# JP: 「これは……実に旨いですね。\n僕はあまり、甘い物を好んでは食べんのですが――」
1882 = "「Cái này... ngon thật đấy.\nCháu vốn không thích ăn đồ ngọt lắm, nhưng\nmà——」"

# monologue
# JP: しかし、旨い。ストレートに。\nクレープの、なんというのか、生地が旨い。
2152 = "Ngon thật sự. Ngon một cách trực tiếp.\nCái... vỏ bánh crepe này, ngon quá."

# 【双鉄】
# display as 雙鐵
# JP: 「もちもちふわふわしてるのに、\n端だけ薄くパリっとしていて――いや、これは実に……」
1721 = "「Mềm dẻo xốp mịn,\nnhưng phần rìa lại mỏng và giòn rụm——Chà,\nđúng là...」"

# monologue
# JP: あまりの旨さに、口がゆるむ。\nくだらんこととわかっていても、弾んだ舌は止まらない。
2533 = "Ngon đến mức tôi bất giác mỉm cười.\nDù biết là ngớ ngẩn, nhưng tôi không thể\nngừng khen ngợi."

# 【双鉄】
# display as 雙鐵
# JP: 「これこそ、まさにキジウマですな」
1888 = "「Cái này, ngon bá cháy bọ chét luôn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ぶふっ！？」
1627 = "「Phụt!?」"

# monologue
# JP: くだらなさがツボに入ったのか、笑いを堪えた勢いで、\nポーレットはクレープを顔につけてしまう。
2327 = "Có lẽ câu đùa nhạt nhẽo của tôi đã chọc\ntrúng chỗ buồn cười của cô ấy, Paulette cố\nnhịn cười\nđến mức quệt cả bánh crepe lên mặt."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん」
1593 = "「A, xin lỗi.」"

# monologue
# JP: 被害は幸い、鼻のてっぺんだけのようだ。\n生クリームを、そのまま指ですくい取る。
2253 = "May mà chỉ bị dính một chút trên chóp mũi.\nTôi dùng ngón tay quệt lớp kem tươi đó đi."

# monologue
# JP: （ぺろり）
2596 = "（Liếm nhẹ）"

# 【ポーレット】
# display as 波萊特
# JP: 「/////っ！！」
1950 = "「/////!!」"

# 【永山】
# display as 永山
# JP: 「ふふ～ん？」
1557 = "「Fufu~n?」"

# monologue
# JP: ポーレットがいきなり赤くなる。\n冷やかす声に揺すられて、自分が何をしたのか気付く。
2405 = "Paulette đột nhiên đỏ bừng mặt.\nTiếng trêu chọc vang lên khiến tôi nhận ra\nmình vừa làm gì."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。気やすすぎたな。\n妹がいたので、ついつい」
1592 = "「A, xin lỗi. Tự nhiên quá đà rồi.\nTại anh có em gái, nên cứ tiện tay...」"

# 【ポーレット】
# display as 波萊特
# JP: 「いいえ、アリです。全然、気やすいの歓迎ですっ！」
1466 = "「Không sao đâu ạ. Em hoàn toàn hoan nghênh\nsự tự nhiên đó!」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　ならばよかった」
1746 = "「Vậy sao? Thế thì tốt rồi.」"

# 【永山】
# display as 永山
# JP: 「ふふーん、やっぱりデートじゃないの？」
1549 = "「Fufu~n, quả nhiên là đang hẹn hò phải\nkhông?」"

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、あの、そうじゃなくって」
1461 = "「Dạ không, à ừm, không phải thế đâu ạ.」"

# 【永山】
# display as 永山
# JP: 「なくって？」
1459 = "「Không phải thế á?」"

# monologue
# JP: しばらく待っても、手がわたわたと動くだけ。
2310 = "Đợi một lúc, cô ấy vẫn chỉ biết khua tay\nmúa chân luống cuống."

# monologue
# JP: ゆであがったようなポーレットはもう、\n言葉を上手く探せんようだ。
2477 = "Paulette mặt đỏ như quả cà chua luộc,\ncó vẻ không thể tìm được từ ngữ thích hợp\nđể giải thích nữa rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「観光振興の看板を探していたのです。\nたとえば、なにか日ノ本一となるものを」
1697 = "「Bọn cháu đang tìm kiếm một thứ gì đó để\nlàm biển hiệu quảng bá du lịch.\nVí dụ như một cái gì đó đạt danh hiệu nhất\nHinomoto chẳng hạn.」"

# monologue
# JP: ……事情を細かく説明すれば、\n「なぁんだ」と失望したような声を出される。
1152 = "……Sau khi giải thích chi tiết sự tình,\nbà ấy thốt lên một tiếng 'Ra là vậy' đầy\nvẻ thất vọng."

# monologue
# JP: この方は、\nやはりずいぶんサバけた感じの性格らしい。
2434 = "Người này,\nquả nhiên có tính cách rất thẳng thắn và\nthoải mái."

# monologue
# JP: （もっとも、そうでなければ住職の奥方が、\n休日にクレープの出店など出さんか）
2583 = "（Mà cũng phải, nếu không thì một phu nhân\ntrụ trì\nlàm sao lại ra ngoài bán bánh crepe vào\nngày nghỉ chứ）"

# 【永山】
# display as 永山
# JP: 「ないでしょ？　日ノ本一。\nあったら歴代市長がとっくに看板にしてるわよ」
1784 = "「Không có đâu đúng không? Nhất Hinomoto\nấy.\nNếu có thì các đời Thị trưởng trước đã đem\nra làm biển hiệu từ lâu rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あー、それはそう」
1567 = "「A, đúng là vậy thật.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1449 = "「Không đâu.」"

# monologue
# JP: 今は確かに、無いかもしれん――が。
2428 = "Bây giờ thì có thể là không có\nthật——nhưng."

# 【双鉄】
# display as 雙鐵
# JP: 「永山さんは、\nクレープ以外の料理も御得意なのですか？」
1783 = "「Cô Nagayama,\nngoài bánh crepe ra, cô có rành nấu các\nmón ăn khác không ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「それはもう！　だって永山さん、\n旧\x%l帝鉄;#00ffc040;帝鉄%l;#;では食堂車勤務してらしたんですから」
1912 = "「Đương nhiên rồi! Bởi vì cô Nagayama,\ntừng làm việc trên toa ăn của \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;\ncũ mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、本職の方だったのですか」
1579 = "「À, ra là người trong nghề.」"

# monologue
# JP: どうりでだ。\nこのクレープの味。
2564 = "Thảo nào.\nHương vị của chiếc bánh crepe này."

# monologue
# JP: 納得すれば、それは期待へと膨らんでいく。
2264 = "Khi đã hiểu ra, sự mong đợi trong tôi càng\nthêm dâng trào."

# 【双鉄】
# display as 雙鐵
# JP: 「では、駅弁などにもお詳しい？」
1919 = "「Vậy, cô cũng rành về cơm hộp nhà ga chứ\nạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そう。それ、わたしもお願いしたいって\n思ってたんです。名物駅弁」
1587 = "「A, đúng rồi. Cháu cũng đang định nhờ cô\nchuyện đó đấy ạ.\nMột loại cơm hộp nhà ga đặc sản.」"

# 【永山】
# display as 永山
# JP: 「あ、任せてくれるなら歓迎。\n駅弁、一度はやってみたいし――あのＳＬのでしょ？」
1584 = "「A, nếu hai cháu giao cho cô thì cô rất\nsẵn lòng.\nCô cũng muốn thử làm cơm hộp nhà ga một\nlần xem sao——cho chiếc SL đó phải không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「はい、\x%l8620;#00ffc040;8620%l;#;を主体とした観光\x%l列車;#00ffc040;列車%l;#;の」
1762 = "「Vâng, cho \\x%l列車;#00ffc040;đoàn tàu%l;#; du lịch với đầu máy\nchính là \\x%l8620;#00ffc040;8620%l;#;\n.」"

# 【永山】
# display as 永山
# JP: 「どんな観光\x%l列車;#00ffc040;列車%l;#;にするの？\nどんな駅弁を作ればいいの？」
1857 = "「Sẽ là một \\x%l列車;#00ffc040;đoàn tàu%l;#; du lịch như thế nào?\nCô nên làm loại cơm hộp nhà ga nào đây?」"

# 【双鉄】
# display as 雙鐵
# JP: 「細かなことは、これから詰めていきますが。\n作っていただきたい駅弁ならば、決まっています」
1447 = "「Những chi tiết cụ thể thì bọn cháu sẽ bàn\nbạc thêm sau.\nNhưng về loại cơm hộp nhà ga muốn nhờ cô\nlàm thì bọn cháu đã quyết định rồi.」"

# monologue
# JP: 永山夫人がぱっとクレープ生地を伸ばして、\nチョコクリームの入った絞り袋を取る。
2389 = "Phu nhân Nagayama nhanh nhẹn dàn đều một\nlớp bột bánh crepe,\nrồi lấy túi bắt kem sô-cô-la."

# monologue
# JP: メモ帳代わりか――\nこの人、なかなかに面白い。
2429 = "Dùng thay sổ tay luôn sao——\nNgười này thú vị thật đấy."

# 【双鉄】
# display as 雙鐵
# JP: 「まずは、御一夜らしいこと。\nその魅力を伝える駅弁であること」
1945 = "「Trước hết, phải mang đậm chất Ohito.\nPhải là một hộp cơm truyền tải được sức\nhấp dẫn của nơi này.」"

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜らしさ……」
1686 = "「Đậm chất Ohito...」"

# monologue
# JP: チョコクリームの入った絞り袋がさらさら文字を書く。
2229 = "Túi bắt kem sô-cô-la thoăn thoắt viết\nnhững dòng chữ."

# monologue
# JP: クマ川、焼酎、水、幽霊――\n永山さんの「らしさ」がそこに、記されていく。
2551 = "Sông Kuma, rượu shochu, nước, ma quỷ——\nNhững 'chất Ohito' theo suy nghĩ của cô\nNagayama được ghi lại trên đó."

# 【双鉄】
# display as 雙鐵
# JP: 「そして、日ノ本一」
1805 = "「Và, nhất Hinomoto.」"

# 【永山】
# display as 永山
# JP: 「日ノ本一？」
1717 = "「Nhất Hinomoto?」"

# monologue
# JP: ぴたり、チョコクリームの入った絞り袋の動きが止まる。
2508 = "Túi bắt kem sô-cô-la bỗng dừng lại."

# monologue
# JP: うむ。こここそが重要だ。\nできればイチゴの赤文字か、太字かで記してもらいたい。
2193 = "Ừm. Đây mới là phần quan trọng nhất.\nNếu được, tôi muốn bà ấy dùng sốt dâu tây\nđỏ hoặc viết in đậm."

# 【双鉄】
# display as 雙鐵
# JP: 「――日ノ本で一番、\n多くの人に食べられる駅弁を目指して下さい」
1178 = "「——Xin hãy hướng tới mục tiêu tạo ra hộp\ncơm nhà ga\nđược nhiều người ăn nhất Hinomoto.」"
