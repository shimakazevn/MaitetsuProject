# display as 雙鐵
# JP: 「ポーレットか、おはよう」
1753 = "「是波萊特啊，早安」" 

# 【ポーレット】
# display as 波萊特
# JP: 「おはようございます、双鉄くん、\nどうしたんですか？　こんなに早く――」
1719 = "「早安，雙鐵君。有什麼事嗎？　這麼早來——」" 

# monologue
# JP: 言葉が呑まれる。\n青い瞳はあたりを見回す。
2217 = "她止住了話語，用藍色的雙眸打量四周。" 

# 【ポーレット】
# display as 波萊特
# JP: 「――ひとり……ですか？」
1177 = "「——只有你……一個人嗎？」" 

# 【コン】
# display as 空
# JP: 「ケンっ！」
# 1542 = "「吭！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、一人と一匹だ」
1465 = "「不，是一個人和一隻狐狸」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、ごめんね、コン。\nコンのこと、気が付かなかったわけじゃなくって」
1594 = "「啊，抱歉，空。我不是沒注意到你」" 

# monologue
# JP: ポーレットが手を差し伸べればすぐさま、\n腹を撫でろと言わんばかりにころりと転がる。
2438 = "看到波萊特伸手，空就好像要求撫摸肚子一般，立刻躺了下來。" 

# monologue
# JP: これほど人懐こいキツネというのも、\nなかなかに珍しいのではなかろうか。
2534 = "這麼親近人的狐狸，恐怕也是很少見的吧。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんも一緒かな？　って、\nちょっと思っちゃっただけで」
1700 = "「我只是在想，八六有沒有跟你在一起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕とて、たまには一人になりたい時間もあるさ」
1699 = "「我偶爾也想一個人待會嘛」" 

# monologue
# JP: ……\x%l8620;#00ffc040;8620%l;#;を、その全体を間近でじっくり見たかった。
1149 = "……我想在近距離仔細將完整的\\x%l8620;#00ffc040;８６２０%l;#;收入眼底。" 

# monologue
