2239 = "如果把物品也包括在內的話，那就只有我和空，以及——\\x%l8620;#00ffc040;８６２０%l;#;。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;……か」
1172 = "「\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;……嗎」" 

# monologue
# JP: \x%l運転台;#00ffc040;運転台%l;#;に上がってしまえば、\n見えるのはその内側の、ほんの一部だ。
2108 = "一旦進入\\x%l運転台;#00ffc040;駕駛台%l;#;，就只能看到車內的一小部分。" 

# monologue
# JP: 外側からこれほど仔細に眺める機会など、\n今までなかった。
2121 = "之前從來沒有機會從外面仔細觀察它。" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄、だな――鉄の塊だ」
1722 = "「是……鐵啊——完全就是鐵塊」" 

# monologue
# JP: 思ってしまえば足元から、\n吐き気と寒気が這い登ってくる。
2103 = "一想到這裡，寒氣便開始侵蝕身體，讓我想吐。" 

# monologue
# JP: 真っ黒な鉄は鼓膜に軋みを蘇らせて、\n軋みが思い出させるものは――血と死との味、そのものだ。
2419 = "漆黑的鋼鐵讓我鼓膜裡再次響起刺耳的摩擦聲，而摩擦聲所喚醒的——是鮮血與死亡的味道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だ、が――」
1487 = "「但是——」" 

# monologue
# JP: 口いっぱいにその味が広がってしまっても、\n舌は変わらず動かせる。
2177 = "即使那種味道在口腔中蔓延，我仍然能說出話來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;――\nそれでもお前は、美しくもある」
1165 = "「\\x%l8620;#00ffc040;８６２０%l;#;——即使如此，你也依然是美麗的」" 

# monologue
# JP: あまりに巨大で。あまりに無骨で。\nけれど細部は、磨きぬかれて繊細で。
2543 = "那麼巨大，那麼粗獷。但是細節卻那麼精緻，經過千錘百鍊。" 

# monologue
# JP: それほど完成された物であるのに――\n置き去りにされてしまった者の、孤独の色を帯びていて。
2370 = "明明是如此製作精良的一件物品——卻添上了一層被遺棄的、孤獨的色彩。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前で観光振興……か」
1808 = "「用你來復興旅遊業……嗎」" 

# 【コン】
# display as 空
# JP: 「ケンっ！！！」
1543 = "「吭！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、コン――――おお」
1690 = "「怎麼了，空——喔」" 

# 【ポーレット】
# display as ？？？
# JP: 「あ」
1568 = "「啊」" 

# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;の入り口に人影。\nどこか控えめな足取りで近づいてくる。
74 = "\\x%l石造機関庫;#00ffc040;石製機車庫%l;#;的入口處出現一個人影。她邁著有些拘謹的步伐緩緩靠近。" 

