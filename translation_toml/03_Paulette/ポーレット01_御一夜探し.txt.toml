# monologue
# JP: 言われて、それもあるかと気付く。\n市政というテコを使っての本格的な観光振興――
2227 = "她這麼一提醒，我才發現這也是我來這裡的一個原因。利用市政府這一有效手段，開始讓旅遊業復興工程步入正軌——" 

# monologue
# JP: ポーレットからの提案を真剣に考慮しなければ、\n\x%l8620;#00ffc040;8620%l;#;をしっかり見ようという気にはならなかったろう。
2235 = "如果我沒有認真考慮波萊特的提議，可能並不會想到要來仔細觀察\\x%l8620;#00ffc040;８６２０%l;#;吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、観光振興のことを考えてでもあったな。\nそれが全てでもなかったが」
1817 = "「的確，我來這裡也是為了思考有關旅遊業復興的事。但這並不是全部的原因」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ちょっとでも、考えてくれたなら嬉しいです」
1540 = "「只要你有把這件事放在心上，我就很高興了」" 

# monologue
# JP: また一歩。
2180 = "又走近了一步。" 

# monologue
# JP: 今度はさっきより軽い足取りで、\nポーレットは僕との距離を詰める。
2407 = "波萊特邁著比剛才更輕盈的步伐向我靠近。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの提案を受けて、僕は考えたのだ」
1633 = "「在聽了波萊特的提議後，我在想一件事」" 

