1601 = "「啊，那我一定打擾到你了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そうではない。\nもしそうであれば、コンを連れても来てはいないさ」
1463 = "「不，不是的。如果我不想被打擾，就不會帶著空一起來了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええと……？」
1907 = "「那個……？」" 

# monologue
# JP: 困惑した声に、矛盾したことを言ってしまったと自覚する。\nその自覚はすぐ、理解に変わる。
2482 = "聽到她困惑的語調，我才發現自己說了自相矛盾的話語。而很快，我又察覺到了答案。" 

# monologue
# JP: 僕がコンを、ここに引っ張ってきた理由はつまり、\n“完全な一人になるのが怖かった”ということなのだろう。
2300 = "我之所以將空帶到這裡來，恐怕是因為“害怕變成真正的孤身一人”吧。" 

# monologue
