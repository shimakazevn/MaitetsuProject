2573 = "（……我還真是沒骨氣。還特地選擇了不必擔心丟人的同行者嗎）" 

# monologue
# JP: 自分の怯えに気づいてしまえば張り詰めていた何かが緩む。\nこわばっていたものが消え、安堵の息と言葉が交じる。
2105 = "一旦發覺到自己的怯懦，心中緊繃的弦也鬆了下來。緊張感消散而去，我舒了一口氣，安然地說道。" 

# 【双鉄】
# display as 雙鐵
