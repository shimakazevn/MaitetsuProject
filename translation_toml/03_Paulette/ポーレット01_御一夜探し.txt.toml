# display as 波萊特
# JP: 「何をですか？」
1480 = "「什麼事呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「負担についてだ。僕らはそれぞれ、\nやるべきことだけを果たしていれば、それで済むが――」
1771 = "「是關於負擔的。比如像我們，只要完成自己的職責就足夠了——」" 

# monologue
# JP: 僕のような素人を政策秘書に、などという発想が、\nいったいどこから出てきたのか。
2220 = "她為什麼會冒出讓我這種門外漢來擔任政策秘書的想法。" 

# monologue
# JP: あまりに不思議と感じてしまい、\nそれゆえ深く考え、気づいた。　
2198 = "因為覺得太不可思議，我一直在思考這件事，然後終於想明白了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは違う。僕らの誰もやらない事の全てを、\n自分の義務にプラスして、一人黙々と処理している」
1845 = "「而波萊特則不同。你將我們職責之外的所有事務都視作自己的義務，一直以來獨自一人默默承擔著」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1561 = "「啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ただでさえ、市長と社長だ。負担があまりに重すぎる。\n現状のままでは、いずれ、つぶれてしまいかねん」
1503 = "「你本來就已經兼任了市長和社長。負擔太重了。這樣下去你遲早會被壓垮」" 

# monologue
# JP: 自分の気づきを言葉に変えて整頓すれば、\nそれがさらなる理解に変わる。
2247 = "將自己的發現整理成話語之後，我便有了更深層的理解。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットには、助けとなる手が必要なのだ」
1790 = "「波萊特需要的是一個幫手」" 

# monologue
# JP: 政策秘書に、僕がなれるとはやはり思えん。
2326 = "我還是不認為自己有能力擔任政策秘書。" 

# monologue
# JP: 思えんが、ポーレットが擦り切れ潰れる姿など、\nなにがあろうと見たくもない。
2562 = "雖說如此，但我無論如何都不希望看到波萊特被壓垮的模樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の手で、もしも構わなければ――」
1649 = "「如果你不介意我來幫你的話——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい！」
1760 = "「是的！」" 

# monologue
# JP: 僕の言葉に食いつくような強い声。\nさらに一歩。ポーレットはその身を近づけてくる。
2406 = "波萊特迫不及待地發出響亮的聲音，再次向我靠近一步。" 

# monologue
# JP: （そこまで、追いつめられていたのか）
2591 = "（已經被逼到這個份上了嗎）" 

# monologue
# JP: ならばなぜ、もっと早くに、\n直接的に、僕らに支援を求めないのか。
2542 = "那為什麼，不早一點直接向我們求助呢。" 

# monologue
# JP: 性格ゆえのこととは思うが、\nそこにある種の危うささえも感じてしまう。
2561 = "雖然這應該是她的性格使然，但我卻對此感到了一絲絲不安。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕でよければ、この手を貸そう。\nコンの手よりは、いくらか役に立つはずだ」
1538 = "「只要你不嫌棄，就讓我來幫助你吧。至少應該比空更加派得上用場」" 

# 【コン】
# display as 空
# JP: 「ケン？」
1544 = "「吭？」" 

# monologue
# JP: 名を呼ばれたと思ってか、コンが足元に擦り寄ってくる。
2466 = "空蹭到我的腳邊，是以為我在叫它吧。" 

# monologue
# JP: しかし、ポーレットはコンを見てない。\n僕だけを、食い入るように見つめている。
2150 = "但是，波萊特並沒有看空。她目不轉睛地注視著我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。お願いします。\nわたし――双鉄くんが、いいんです」
1865 = "「謝謝，拜託你了。我——最希望得到的就是雙鐵君的幫助」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならばそうしよう」
1744 = "「是嗎。那就這麼定了」" 

# monologue
# JP: もう一歩寄ってくるかと思ったが、\nポーレットの足はそこで止まって動かない。
2376 = "本以為波萊特會再走近一步，但她卻停了下來。" 

# monologue
# JP: 気圧されるほどにすがる視線と、二歩半の距離――\nこれがつまりは、ポーレットの頼り下手の表れだろう。
2366 = "明明她求助的目光如此迫切，卻始終與我保持著兩步半的距離——我想，這就是波萊特不善於尋求幫助的表現吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それで、具体的な観光振興についてなのだが」
1929 = "「那麼，關於旅遊業復興的具體方案——」" 

# monologue
# JP: であるのなら、こちらからも無理に距離は詰めない。
2349 = "既然如此，我也不會強行拉近距離。" 

# monologue
# JP: ポーレットにとって居心地のいい距離感こそが、\nその精神を支えるためには、一番適切なものだろう。
2154 = "保持對波萊特而言最為舒適的距離感，就是支撐她心靈的最好方式吧。" 

# monologue
# JP: （とはいえ、慣れん。ハチロクとも日々姫とも、\n考えてみれば……ほぼゼロ距離で向き合ってきたのだな）
2597 = "（話雖如此，還是有些不習慣。仔細想來……無論是八六還是日日姬，我與她們相處都是零距離的）" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？」
1942 = "「雙鐵君？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ。観光振興についてだが、\n現状、解決すべき点はいくつもあるかと思う」
1563 = "「啊——嗯。關於旅遊業復興，我認為目前有幾點急需解決」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。まずは\x%l客車;#00ffc040;客車%l;#;をなんとかしないと」
1739 = "「是啊。首先要想辦法解決\\x%l客車;#00ffc040;客運車廂%l;#;的問題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l客車;#00ffc040;客車%l;#;？」
1169 = "「\\x%l客車;#00ffc040;客運車廂%l;#;？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、\x%l客車;#00ffc040;客車%l;#;はものすごく数が不足してるんです」
1766 = "「是的，目前\\x%l客車;#00ffc040;客運車廂%l;#;的數量十分緊缺」" 

# monologue
# JP: ……ほとんど全ての\x%lまいてつ;#00ffc040;まいてつ%l;#;には、\n自分に必要な数の\x%l客車;#00ffc040;客車%l;#;しか保有・整備をする余裕がない。
1144 = "……幾乎所有\\x%lまいてつ;#00ffc040;掌車人%l;#;，都只會持有、維護自身所需數量的\\x%l客車;#00ffc040;客運車廂%l;#;，無力負擔更多。" 

# monologue
# JP: 当然、そうした\x%l客車;#00ffc040;客車%l;#;はめったに手放されることもない。\n――説明されれば、ごく簡単に納得がいく話ではある。
2495 = "自然，他們也鮮少會轉讓這些\\x%l客車;#00ffc040;客運車廂%l;#;。——只要說明白，就很好理解了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、どうやって\x%l客車;#00ffc040;客車%l;#;を入手するんだ？」
1922 = "「那麼，我們要怎麼樣才能弄到\\x%l客車;#00ffc040;客運車廂%l;#;呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l8620;#00ffc040;8620%l;#;の改修で、車輛修理のスキルを持っている方たちと、\n人脈ができましたから」
1631 = "「在\\x%l8620;#00ffc040;８６２０%l;#;修復工作進行的過程中，我們與擁有車輛修理技能的人們建立了合作關係」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なるほど。修理しなければ使えない――\nそうした\x%l客車;#00ffc040;客車%l;#;であれば、入手可能かもしれんのか」
1577 = "「啊，原來如此。我們或許可以弄到必須經過修理才能使用的\\x%l客車;#00ffc040;客運車廂%l;#;」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。ですからわたし、廃\x%l客車;#00ffc040;客車%l;#;を譲ってくれる\n\x%lまいてつ;#00ffc040;まいてつ%l;#;さんがいないか、あたってみたいと思います」
1756 = "「是的。所以我想找找看有沒有\\x%lまいてつ;#00ffc040;掌車人%l;#;願意將廢棄的\\x%l客車;#00ffc040;客運車廂%l;#;轉讓給我們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、その件はよろしく頼む」
1928 = "「那麼，這件事就拜託你了」" 

# monologue
# JP: それはまさしく、\nポーレットにしかできない仕事であるだろう。
2322 = "我想，這是一件只有波萊特才能辦到的事吧。" 

# monologue
# JP: その周辺を埋めることこそ、\n今日からの僕の、新たな務めだ。
2481 = "而為她填平腳下的道路，就是我今後新的職責。" 

# 【双鉄】
# display as 雙鐵
# JP: 「で、\x%l客車;#00ffc040;客車%l;#;を入手したとして――\nそこから先の観光振興にプランはあるのか？」
1916 = "「那麼，假如我們弄到了\\x%l客車;#00ffc040;客運車廂%l;#;——關於之後的旅遊業復興工程，你有什麼計劃嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1556 = "「哎？」" 

# monologue
# JP: “何を言われているのかわからない”\nそんな表情。
1129 = "“不清楚你在說什麼”，她露出這樣一副表情。" 

# monologue
# JP: さほど難しい問いではないと思うのだが――\nと、思う間にポーレットは、そっか、と気づいた顔になる。
2311 = "我好像沒有問什麼太過複雜的問題——我正在這樣想的時候，波萊特彷彿明白了過來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「もちろん整備だけじゃなく再塗装して――\n内装もできるだけ観光\x%l客車;#00ffc040;客車%l;#;にふさわしいものに」
1813 = "「當然不僅僅要維護，還要重新進行塗裝——內部也要裝修得儘可能貼合觀光\\x%l客車;#00ffc040;客運車廂%l;#;的印象——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いやいやいやいや、さらに先だ」
1455 = "「不是不是不是，是更加後面的事情」" 

# 【ポーレット】
# display as 波萊特
# JP: 「さらに先って」
1773 = "「更加後面是……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;が観光\x%l列車;#00ffc040;列車%l;#;として営業運転を開始する。\nその先、それをどのようにして観光振興に繋げるのだ？」
1812 = "「當\\x%l8620;#00ffc040;８６２０%l;#;作為觀光\\x%l列車;#00ffc040;列車%l;#;開始營業之後，你打算怎麼樣利用它實現旅遊業復興呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　だって」
1555 = "「咦？　這個嘛」" 

# monologue
# JP: わた、とポーレットの手が動く。\n遊んでもらえるのかと思い、その手につられたコンも動く。
2403 = "波萊特手上做著動作，空以為是要陪它玩耍，也跟著動起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l8620;#00ffc040;8620%l;#;が走ったら、それに乗りたい人がわーっと」
1839 = "「等到\\x%l8620;#00ffc040;８６２０%l;#;開始運營，就會有好多人爭相乘坐——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレット。例えばだ、遠くマイナーな温泉地に、\n非常に貴重でクラシカルなガソリン自動車があるとして」
1195 = "「……波萊特。我舉個例子，在一個遙遠的二流溫泉景區，有一輛非常寶貴的古董汽車」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あるとして」
1804 = "「然後呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それに試乗させてもらえるとしたら――\n行くか？　遠くの、マイナーな温泉地に、わざわざ」
1651 = "「如果那輛車開放試乘的話——你會為此特地跑到遙遠的二流溫泉景區去嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　行きませんけど――\nだって、自動車に興味ないですし」
1553 = "「咦？　我不會去啊——因為我對汽車又沒有興趣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう、それだ。今のその気持ち。\nその気持ちの“自動車”が、世間一般の“鉄道”だ」
1661 = "「對，就是這樣。就是你剛才那種想法。在你心目中的“汽車”，就同等於大眾心目中的“鐵路”」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その気持ちって――この気持ち？　\n自動車が鉄道――て……え？　あ！？　ええええっ！？」
1523 = "「剛才的想法——我的想法？汽車同等於鐵路——呃……咦？　啊！？　咦——！？」" 

# monologue
# JP: 驚愕している。\n恐らく理解してくれたのだろうが、油断はならん。
2216 = "她很驚愕。我猜她是明白了，但還不能掉以輕心。" 

# monologue
# JP: 最後の一言一句まで、このことに関しては、\n説明しておく必要がある。
2549 = "關於這件事，必須一字一句、清清楚楚地跟她說明白。" 

# 【双鉄】
# display as 雙鐵
# JP: 「世間一般の人間は、遠くマイナーな温泉地にまで、\nわざわざ\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;に乗りには、来ないのだ」
1477 = "「人們一般是不會特地跑到遙遠的二流溫泉區，來乘坐\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……あ――それは……そう、ですね。\nわたし、周りの人も、結構、鉄道好きばっかりで――」
1565 = "「啊……啊——這個……也是呢。因為在我周圍也儘是些鐵路愛好者——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、たとえば[くさつ,1]九札温泉にＳＬが走っていれば、\n湯治がてらにそれに乗る、という人は多かろう」
1490 = "「但是，比方說草津溫泉那邊如果有蒸汽機車的話，一定會有很多來泡溫泉的遊客順便搭上一程吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
1576 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ゆえに、その先――\nあるいは、その他が必要なのだ」
1619 = "「嗯。所以我們需要為以後做打算——或者說，在其它方面做打算」" 

# monologue
# JP: 僕が埋めていくべき穴が、ひとつ、さっそく見つかった。
2314 = "我很快就找到了一個需要填平的缺口。" 

# 【双鉄】
# display as 雙鐵
# JP: 「マイナーな温泉地から一歩を踏み出す、御一夜の魅力。\nそれをどう周知していくか、僕らは考えねばならん」
1696 = "「我們必須思考怎樣才能使人們認識到御一夜的魅力，讓它擺脫大眾心中的“二流溫泉景區”標籤」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ということで、\nみなのアイディアをもらえないかと考えた」
1668 = "「就是這樣，我想請大家幫忙出主意」" 

# monologue
# JP: レールショップには、いつもの面々。
2547 = "鐵路商店裡聚集起了平時的老面孔。" 

# monologue
# JP: ポーレットのたっての希望で、\n真闇姉にも参席をしてもらっている。
2204 = "在波萊特的殷切要求下，真闇姐也出席了會議。" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
1186 = "「……」" 

# 【日々姫】
# display as 日日姬
# JP: 「…………」
# 1186 = "「……」" 

# monologue
# JP: が、どうしたことかなかなか意見が出てこない。\nハチロクも日々姫も実に微妙な表情だ。
2142 = "但是不知為何，誰都沒有提出意見。八六和日日姬的臉上都露出一副複雜的表情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ハチロク、\x%l8620;#00ffc040;8620%l;#;の活用についてだ。\nなにか、希望などはないのか？」
1516 = "「八六，我們在討論該怎麼使用\\x%l8620;#00ffc040;８６２０%l;#;。你有什麼希望嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしのお仕事、本分は、\n整備し、走らせるところまでですし……」
1707 = "「我的職責與本分，僅僅是維護及行駛……」" 

# monologue
# JP: ハチロクはそこで言葉を切って、\nじっ――とポーレットを見つめる。
2165 = "八六停頓下來，注視著波萊特。" 

# 【ハチロク】
# display as 八六
# JP: 「まして御一夜のことを、\nわたくしは詳しく知りません」
1786 = "「況且我對御一夜並不熟悉」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それもそうか」
1887 = "「這倒也是啊」" 

# monologue
# JP: 言われてみれば納得だ。れいなもこくこく、頷いている。\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の領分は、あくまで線路の上なのだろう。
2124 = "也確實是如此。玲奈也連連點頭。要說\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;的本分也只有鐵路相關。" 

# monologue
# JP: ならば、と日々姫に尋ねてみる。
2345 = "於是我試著詢問日日姬。" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は御一夜に詳しかろう。\n地元で、しかも看板描きで密接にかかわっている」
1716 = "「日日姬應該很熟悉御一夜吧。你是當地人，而且為了繪製招牌，經常接觸這些」" 

# 【日々姫】
# display as 日日姬
# JP: 「それは……どこで買い物するとか遊ぶとかなら\n知ってますけど――」
1886 = "「這個……要說購物和遊玩的景點我倒是知道——」" 

# monologue
# JP: 日々姫の視線もポーレットへと。\nけれど、こちらは一瞬だけだ。
2361 = "日日姬也看向波萊特，但很快移開了視線。" 

# 【日々姫】
# display as 日日姬
# JP: 「地元だとかえって――\n観光のこととか気にしませんし……」
1629 = "「因為我是當地人，反而不會去關心什麼旅遊特色……」" 

# 【凪】
# display as 凪
# JP: 「ここにいるばい！\n御一夜が地元で観光に詳しい凪様がっ！」
1683 = "「御一夜出身，並且熟知當地旅遊景點的凪大小姐在此咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心強いな。\nならば凪様、教えてくれ」
1825 = "「真是可靠啊。那麼凪大小姐，請賜教」" 

# 【凪】
# display as 凪
# JP: 「御一夜の観光ば、クマ川下りで決まりばい！\nクマ川下りを前面に押し出して宣伝するばい！！」
1859 = "「要說御一夜的旅遊特色，當然是隈河漂流咧！咱們要重點宣傳隈河漂流咧！！」" 

# 【ふかみ】
# display as 深美
# JP: 「それはもうやってるんだよ、凪ちゃん。\nやってて……どんどん……観光客さん……減ってるの」
1671 = "「已經在宣傳了啊，小凪。在宣傳……可遊客……越來越少了」" 

# 【凪】
# display as 凪
# JP: 「んぐっ」
1605 = "「嗚」" 

# monologue
# JP: ふかみが冷静に凪をなだめる。\nその悲しげな風情のせいか、凪は一気に黙りこむ。
2411 = "深美冷靜地安撫著凪。或許是因為說得太過悽慘，凪立刻沉默了下來。" 

# monologue
# JP: そうなんですよ、とため息をつき、\nポーレットがフォローの言葉を重ねる。
2402 = "波萊特嘆著氣，也跟著說了一句“就是啊”。" 

# 【ポーレット】
# display as 波萊特
# JP: 「温泉とクマ川下りとクマ焼酎。\nそれでずうっと、観光ＰＲはしてるんですけど……」
1796 = "「溫泉、隈河漂流、隈燒酒。我們一直在用這些做旅遊宣傳……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その三つには、間違いのない魅力がある」
1883 = "「這三樣東西，無疑都很有魅力」" 

# monologue
# JP: 断言すれば、みなが頷く。
2485 = "聽我如此斷定，大家也跟著點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ＰＲが足りないか、ＰＲの仕方が悪いかだ」
1915 = "「那麼，不是宣傳力度不夠，就是宣傳方式不對」" 

# monologue
# JP: 今度も、全員からの同意。\nけれどどうにも――そこから先の意見が今日は出てこない。
2330 = "所有人再次一起點頭。但是——卻怎麼也找不出一個意見。" 

# monologue
# JP: ならば。やむを得ん。\nできることなら、頼らずに済ませておきたかったが……
2232 = "如果可以，我本不想求助於她……但是也沒有辦法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉はどうだろう？」
1828 = "「真闇姐有什麼意見嗎？」" 

# 【真闇】
# display as 真闇
# JP: 「んー……」
1609 = "「嗯……」" 

# monologue
# JP: 珍しく、真闇姉が口ごもる。
2497 = "與往常不同的是，真闇姐今天也吞吞吐吐的。" 

# monologue
# JP: 僕を見、ポーレットを見、そして日々姫をハチロクを見て。\n困ったような笑みを浮かべて、小さく小さく肩をすくめる。
2222 = "她看看我，看看波萊特，跟著又看向日日姬和八六，然後為難地笑了笑，聳聳肩。" 

# 【真闇】
# display as 真闇
# JP: 「ひーちゃんとハチロクちゃんは、\n意見、なーんにもなかと？」
1664 = "「小日和八六，你們真的說不出意見嗎？」" 

# 【日々姫】
# display as 日日姬＆八六
# JP: 「っ！」\n「――っ」
1947 = "「！」\\n「——」" 

# monologue
# JP: 真闇姉から重ねて問われ、\nなぜかふたりは、ギクリとしたような顔をする。
2484 = "聽到真闇姐再一次的詢問，不知為何，二人露出了心虛的表情。" 

# monologue
# JP: 困ったような視線の交換。\nややあって、ハチロクがのろのろ、言葉をつむぐ。
2213 = "她們為難地互看一眼。過了一會，八六終於慢慢地開了口。" 

# 【ハチロク】
# display as 八六
# JP: 「今のところは――ございません。\n双鉄様のご判断なら、尊重いたしたく思います」
1819 = "「目前——還沒有。既然是雙鐵少爺的決定，我自然會尊重」" 

# monologue
# JP: （判断？）
2595 = "（決定？）" 

# monologue
# JP: この場にそぐわぬ言葉であるのに、\nなぜか、日々姫までもが頷く。
2368 = "明明是一句不合時宜的話語，卻不知為何連日日姬也點了頭。" 

# monologue
# JP: （ああ、いや――そうか）
2589 = "（啊，好吧——原來如此）" 

# monologue
# JP: ハチロクと日々姫にしてみれば、僕がポーレットの提案を、\n“選んだ”というようにも捉えられるのか。
2499 = "若站在八六與日日姬的角度上來看，也可以理解為我“選擇”了波萊特的提議。" 

# monologue
# JP: 逆から見れば、\n僕がふたりの提案を受け入れなかった――という風に。
2184 = "反過來講也就是——我拒絕了她們兩個的提議。" 

# monologue
# JP: （僕としては、チームが継続的によりよく機能するための、\n最善の手当てを行っただけのつもりだったのだが……）
2594 = "（我只是做出了能夠讓團隊持續而高效地運作下去的最佳選擇啊……）" 

# monologue
# JP: が、日々姫とハチロクがそう感じたなら、\n口先でどうこう説明しても、上滑りするだけだろう。
2146 = "但是，既然日日姬和八六是這樣想的，那麼就算我口頭上說再多，也是無法令她們信服的吧。" 

# monologue
# JP: 尊重し、見守ってくれるというのなら、\n結果を出して、僕の“判断”が正であったと示せばよい。
2347 = "既然她們願意尊重並守望著我，那麼我只要拿出成果，證明我的“決定”是正確的就好。" 

# 【真闇】
# display as 真闇
# JP: 「そ？　そーならそれで」
1745 = "「是嗎？　那好吧」" 

# monologue
# JP: 短く言って真闇姉は、僕の方へと向き直る。
2448 = "真闇姐簡短地說完，看向我。" 

# 【真闇】
# display as 真闇
# JP: 「あんね、双ちゃん。ウチも古い御一夜の人間やけん、\n[よそ,1]他所の人らに、何が魅力的に見ゆるやはわからんね」
1846 = "「聽我說呀，小雙。我雖然也是御一夜土生土長的，可卻不知道在外地的人眼中，哪裡才是有魅力的地方咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
# 1576 = "「啊！」" 

# monologue
# JP: そうか。単純にそういうことか。
2178 = "原來，僅僅是這個原因。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、御一夜に観光に来るものは、\n御一夜の外の人間なのだな」
1527 = "「原來如此，來御一夜旅遊的都不是御一夜本地人啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですよね。だったら――\nここにいる中で、御一夜のことをまだ知らないのは」
1588 = "「啊，對呢。那麼——我們這些人當中，對御一夜還不太了解的是——」" 

# 【真闇】
# display as 真闇
# JP: 「ハチロクちゃんにれいなちゃん、ナビちゃんあたりは、\n人間とはきっと、目線がずいぶん違うけんねぇ」
1513 = "「八六、玲奈還有Ｎａｖｉ，她們思考問題的角度一定和人類有所差別吧」" 

# monologue
# JP: ポーレットの視線の先へと、真闇姉の言葉がまわりこむ。\nハチロクたちの頷きを見れば、妥当な指摘なのだろう。
2401 = "波萊特剛要看向她們，真闇姐便出言糾正。而八六二人也點著頭，證明真闇姐並沒有說錯。" 

# monologue
# JP: で、あるのなら――
2351 = "既然是這樣——" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が最も適任となるか？　\n昔も今も、ほぼ御一夜の観光をした記憶がない」
1914 = "「那麼我就是那個最佳人選吧？無論過去還是現在，我都沒有在御一夜觀光過的經歷」" 

# monologue
# JP: 昔は、観光を楽しめるような精神状態ではなかった。\n今は戻ってきてからこっち、ひたすらに動いているだけだ。
2536 = "過去，我的精神狀態根本顧不上觀光。而這次剛一回來，我就只顧著忙這邊的事了。" 

# 【真闇】
# display as 真闇
# JP: 「やねぇ」
1729 = "「是咧」" 

# monologue
# JP: どこかため息に近い調子で、真闇姉が深く頷く。
2450 = "真闇姐重重地點頭，卻又彷彿是在嘆著氣。" 

# 【真闇】
# display as 真闇
# JP: 「けど双ちゃん一人じゃ、男視点でしか見れんばい」
1486 = "「但如果只有小雙一個人，就只會用男性的角度看待問題了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ならば――」
1528 = "「原來如此，那麼——」" 

# monologue
# JP: 目が合う。\nぱっと、ポーレットの頬がバラ色になる。
2324 = "我與波萊特視線交會，她臉上一下子散發出燦爛的光彩。" 

# monologue
# JP: そうもやる気を見せてくれれば、\n多忙であるとは承知の上でも、誘ってみたくなるものだ。
2436 = "看到她如此躍躍欲試的態度，即使清楚她平時很忙碌，我也忍不住想邀請她參與。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットはどうだ？　御一夜の観光については」
1789 = "「波萊特對御一夜的觀光旅遊有多了解？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「実地の方は全然です、わたしも。\n御一夜に来てから、政治と鉄道のことばっかりで」
1693 = "「我也幾乎沒去過實地調查。自從來到御一夜，就一直在忙政治與鐵路的事情」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならどうだ。僕と一緒に見てみんか？　御一夜の観光を、\nどのように盛りたてていけばいいかを、新しい視点で」
1927 = "「那麼，要不要和我一起去看看？　以一個全新的角度，去思考怎麼樣才能振興御一夜的旅遊業」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい！　喜んで」
1621 = "「嗯！　我很樂意」" 

# 【凪】
# display as 凪
# JP: 「ならウチっ！？　もがもが～っ」
1909 = "「那咱也——！？　嗚嗚～」" 

# 【ふかみ】
# display as 深美
# JP: 「もう、凪ちゃんてばぁ」
1662 = "「小凪你真是的」" 

# monologue
# JP: ああみえて、一線級の船頭であるということか。\nふかみの力は、見た目よりよほど強いらしい。
2413 = "深美雖然看似弱不禁風，卻也是活躍在一線的掌棹啊。看來她的力氣比外表看起來要大得多。" 

# monologue
# JP: あの凪が、口を押さえられふりほどけずに、\nじたばたもがくだけしかできない。
2250 = "平日裡身手矯捷的凪，竟被她捂著嘴無法掙脫，只得胡亂掙扎著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみ。どうした？」
1792 = "「深美，怎麼了？」" 

# 【ふかみ】
# display as 深美
# JP: 「え？　あっ――凪ちゃん。その――。\nう、うち。寄ってから帰る約束、してるだけ。です」
1551 = "「咦？　啊——小凪，那個——只是之前有說，回去之前先到我家來玩玩」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？」
1747 = "「是嗎？」" 

# 【ふかみ】
# display as 深美
# JP: 「ちょっと……ええと……\nそれが、待ちきれなかったみたい。です」
1643 = "「她剛才……那個……只是有點等不及了」" 

# 【凪】
# display as 凪
# JP: 「もがぁ」
1604 = "「嗚——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、長引かせては申し訳ないな」
1770 = "「是這樣啊，留你們太久了真不好意思呢」" 

# monologue
# JP: ともかく、これで話は決まった。\nあとはポーレットの時間の合間を縫って動けばいい。
2475 = "總之，計劃已經定下來了。接下來只要利用波萊特的閒暇時間去實施就好。" 

# monologue
# JP: ハチロクと日々姫はまだ不満そうな雰囲気だが、\nあの二人なら大丈夫。結果を示せば、必ず理解してくれる。
2558 = "雖然八六和日日姬看起來還有些不滿，但不必擔心。只要我拿出成果，她們一定能理解的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ポーレット。今週のスケジュールを貰えるか？\nできるだけ早く動きたい」
1926 = "「那麼，波萊特。能把這週的日程表給我嗎？我想要儘快行動」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、ええと――\nすぐ持ってきます！！」
1647 = "「好的，那個——我這就去拿！！」" 

# monologue
# JP: 足取り軽く、ポーレットは奥へと引っ込んでいく。\nれいなはどこか楽しげで、ハチロクと日々姫は浮かぬ顔。
2408 = "波萊特邁著輕盈的步子去了裡屋。玲奈看起來心情不錯。八六和日日姬則略有些不悅。" 

# monologue
# JP: ふかみと凪は――っ！？
2480 = "而深美和凪——嗯！？" 

# 【双鉄】
# display as 雙鐵
# JP: 「おい、ふかみ。凪の顔色が良くないぞ？」
1602 = "「喂，深美。凪的臉色似乎不太對勁啊？」" 

# 【ふかみ】
# display as 深美
# JP: 「あわっ！？　ちょっ、凪ちゃんっ！？　凪ちゃんっ！」
1569 = "「啊哇！？　喂，小凪！？　小凪！」" 

# 【凪】
# display as 凪
# JP: 「もぎゅぅぅぅ～～～っ」
1606 = "「嗚呼～～～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
1560 = "「唔」" 

# monologue
# JP: 御一夜[じょうし,1]城址をゆっくり下りれば、\nすぐに市役所前に出る。
2307 = "我們慢慢地走下御一夜城址，很快走到了市政府門前。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……記憶にあるより、随分と近代化したのだな」
1196 = "「……與我記憶中相比，這裡已經發展了不少啊」" 

# monologue
# JP: 御一夜城址、三の丸跡から一望できる御一夜の町。\n正直ごくごく平凡な、一昔前の田舎町という印象だったが。
2471 = "站在御一夜城址的三之丸遺址上，便能將御一夜的街道盡收眼底。我對它的印象還停留在原本平凡而落後的小鄉村。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね……鍛冶屋町のあたりの他は、\n古い建物、どんどん減っていってますし――」
1731 = "「是啊……除了鍛冶店街那一帶，其餘地方的老建築越來越少了——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「クマ川の流れは雄大で美しくはあるが――\nそれのみでは、観光客は呼べぬものか」
1938 = "「隈河的河流雖然宏偉而美麗——但僅憑這點，是無法吸引遊客的啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「川は……難しいんですかね？　セーヌとかナイル、\nそのくらい有名じゃないと見に来てもらえないのかも」
1854 = "「要利用河川……會有些困難吧？　除非像塞納河、尼羅河那樣有名氣，否則沒人會來看的」" 

# monologue
# JP: その言葉にふと、疑問を覚える。
2316 = "我忽然對這句話產生了疑問。" 

# 【双鉄】
# display as 雙鐵
# JP: 「セーヌはなにゆえ、あれほどまでに有名なのだ？\nナイルなら世界一長い川だからだろうが――」
1639 = "「塞納河為什麼會那麼有名？尼羅河或許還因為它是世界最長河流的緣故——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「セーヌこそ、フランクそのもの。世界最高の芸術の都、\nパル＝イスの中心にして源だからですよ」
1638 = "「塞納河是法國的象徵，因為它是世界第一藝術之都——巴黎的中心、源泉」" 

# 【双鉄】
# display as 雙鐵
# JP: 「中心にして、源」
1470 = "「中心、源泉」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。パル＝イスはもともと、\nセーヌの中洲にある島から発展していったんです」
1614 = "「嗯。巴黎原本是由塞納河沙洲的一座島嶼上發展而來的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
# 1747 = "「是嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「パル＝イスの発展とともに、\n[あまた,1]数多の詩が、歌が、そして絵画が産まれます」
1801 = "「無數的詩詞、歌謠、繪畫，伴隨著巴黎的發展一同誕生」" 

# monologue
# JP: それこそ詩のように、歌うように、\nポーレットは軽やかな言葉をつなげる。
2378 = "正如那些詩詞與歌謠一般，波萊特愉快地講述著。" 

# monologue
# JP: もうひとつの故郷へと注ぐ愛情の豊かさが、\nその端々からにじみ出ている。
2101 = "一字一句中，透露著她對另一個故鄉的深厚感情。" 

# 【ポーレット】
# display as 波萊特
# JP: 「無数の芸術がセーヌを讃え、セーヌは美しく流れ。\nその積み重ねが、セーヌの名を高めたんだと思います」
1800 = "「無數件藝術品讚頌著塞納河，而塞納河也一直不變地美麗流淌著。我想正是這樣的積累，成就了它的名聲」" 

# 【双鉄】
# display as 雙鐵
# JP: 「芸術、か――」
1852 = "「藝術品嗎——」" 

# monologue
# JP: 日々姫の顔が頭に浮かぶ。\nあれの絵は、確かに僕の心を打つ。
2488 = "腦海中浮現出日日姬的臉龐。她的畫，確實能打動我的心。" 

# monologue
# JP: が、それが万人に通じるものかはわからぬし、\n今はまだ、誰に知られている存在でもない。
2144 = "但是那不一定能打動每一個人，況且她現在還沒有名氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「クマ川がその例に倣うとしても――\n何百年の時が必要となってしまう、か」
1525 = "「即使隈河想要效仿——也需要耗費幾百年的時間嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですよね、一朝一夕には、なかなか」
1743 = "「是啊，實在不是一朝一夕能夠辦到的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「となると――ああ」
1711 = "「既然如此——啊」" 

# monologue
# JP: 思いつく。
2323 = "我突然想到。" 

# monologue
# JP: 大切なのは、長さでも芸術でもなく、\n“世界一”という部分だろうと。
2545 = "重要的不是河川的長度或藝術，而是“世界第一”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「何か世界一――は無理としても、日ノ本一はないかな。\nクマ川なり、御一夜なりに」
1524 = "「即使做不到世界第一，但能不能以隈河、御一夜自己的方式做到日本第一呢」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　そうですよね。\n日ノ本一は、明快な看板になりますよね」
1574 = "「啊！　對呢。日本第一——會是一塊簡單明快的招牌啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。それはどんなに単純なものでもいいと思う」
1616 = "「嗯。我認為無論是多麼簡單的東西都行」" 

# monologue
# JP: クマ川があり、温泉があり、クマ焼酎がある。\nそこに、\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;までもが加わる。
2308 = "我們有隈河、溫泉、隈燒酒。如今還要加上\\x%l蒸気機関車;#00ffc040;蒸汽機車%l;#;。" 

# monologue
# JP: ならば看板ひとつ、目立つ看板で繋げるのなら、\n全てに更なる相乗効果が生じるのではなかろうか。
2544 = "那麼，如果能用一塊吸引人的招牌將這些要素聯繫起來，是否能產生更好的加成效果呢。" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど――\n統計的な面、数字面では、なかったように思います」
1489 = "「但是——從統計數據、數位方面來看，之前應該是沒有的」" 

# monologue
# JP: さすがは現職の市長。\n資料も見ずにすらすら答える。
2115 = "不愧是現任市長。她連資料都不用看就流利地回答道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、歩いて見つけるしかない。\n一番可能性がありそうなのは……鍛冶屋町あたりか？」
1918 = "「那麼，就只能邊走邊找了。最有可能的……是鍛冶店街一帶嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「かもしれませんね、御一夜で一番古い場所ですし」
1776 = "「有可能呢，畢竟那裡是御一夜最古老的地方」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、向かおう」
1921 = "「那麼，我們出發吧」" 

# monologue
# JP: ……ポーレットと並んで歩く。\nれいなを挟まず、ハチロクを連れず。
1151 = "……我與波萊特並肩同行。玲奈不在，八六也不在。" 

# monologue
# JP: 故にペースをあわせることなく、自然に歩ける。\n歩幅が近いということが、ごく単純に心地良い。
2196 = "因此我不必顧及他人的步伐，走得很自然。兩個人的步幅相近，原來是如此令人感到舒適。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……日曜だというのに、\n観光客の姿がほとんど見えないな」
1193 = "「……明明是週日，卻幾乎看不到遊客啊」" 

# monologue
# JP: が、足取りが軽快なのも良し悪しだ。
2148 = "但是，步子太快也是有好有壞的。" 

# monologue
# JP: これほどスムーズに歩けてしまうのは、\n観光スポットとしては、いかにもまずい。
2205 = "在觀光景點走得如此順暢無阻，可絕不是件好事。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あはは……\n人の数より、キジ馬の数の方が多いくらいですね」
1571 = "「啊哈哈……人還沒有雉子馬多呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1730 = "「是啊——」" 

# monologue
# JP: 言われて気にしてみれば、なるほど。\n通りの中のそこここに、キジ馬たちが鎮座している。
2473 = "經她提醒，我仔細一看發現確實如此。街道上到處都擺放著許許多多的雉子馬。" 

# monologue
# JP: 鯉のぼりに車輪をつけたような御一夜伝統の木工細工は、\n小さくとも大きくとも、それぞれ愛嬌に満ちている。
2556 = "雉子馬的外形類似裝了兩個輪子的鯉魚旗，是御一夜傳統的木工工藝品。有大有小，非常討人喜歡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「キジ馬も、じっくり見れば可愛いものだが――」
1940 = "「雉子馬，雖說仔細地去看倒也確實很可愛——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「町中にちらばりすぎてるから、\nあっという間に見慣れちゃうんですよね」
1483 = "「但城裡到處都是，很快就看習慣了啊」" 

# monologue
# JP: 確かにだ。\n僕も言われてみるまでは、特別意識をしていなかった。
2463 = "確實。在波萊特提起之前，我也沒有留意到。" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、キジ馬の数くらいには勝てないとダメですよね。\nいくら観光客さんが、\x%lエアクラ;#00ffc040;エアクラ%l;#;移動してるっていっても」
1494 = "「但是，至少遊客要比雉子馬多才行呢。就算遊客是使用\\x%lエアクラ;#00ffc040;空凝機%l;#;代步的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。その影響も大きいのだよな。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;交通は、移動コストを激減させるから」
1735 = "「是啊。這也是一個重要的原因。因為用\\x%lエアクラ;#00ffc040;空凝機%l;#;代步可以大幅降低移動成本」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですよね。だから、観光は滞在型より、\n周遊型の方が圧倒的になっちゃって――」
1665 = "「就是說啊。所以現在絕大多數人選擇周遊而非定點旅遊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「現状、宿泊地に選ばれるほどの強みを持たん御一夜は、\n短時間の観光で通過されてしまう……というわけか」
1820 = "「目前御一夜不具備讓遊客選擇留宿的特色，很容易被看做景區之間的中轉站而草草經過嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「有力な温泉地が多すぎるんですよ、九洲」
1474 = "「九州有太多知名的溫泉景區了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うーむ。しかし……この人どおりを見る限り、\n短時間の観光スポットとしてもあまりに寂しいぞ」
1608 = "「嗯——可是……從目前的人流量來看，即使作為短期觀光景點也太過冷清了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは――きっとタイミングですよ。今はたまたま、\n他の見どころに行っちゃってるんじゃないですか？」
1881 = "「這——一定是時機不巧啦。現在遊客們正好去其它值得一看的地方了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「見どころ？」
1505 = "「值得一看的地方？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、\n実際にはまだ行けてないとこが多いんですけど――」
1519 = "「其實我也有好多地方沒去過——」" 

# monologue
# JP: ポーレットがイラストマップを広げてくれる。\nなんとも準備が良いことで、これまたほのかに嬉しくなる。
2404 = "波萊特打開觀光彩繪地圖。沒想到她準備得如此周到，又讓我心中泛起喜悅。" 

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜[じょうし,1]城址、クマ川下り発船所の他だと、\n[みぎたいちしゅぞうもと,5]右田一酒造元もそうですよね」
1936 = "「除了御一夜城址、隈河漂流發船點之外，右田一釀酒廠也是其中之一呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、\n蔵の一部を見学コースとして開放しているとは聞くな」
1625 = "「嗯，確實有聽說開放了一部分酒窖供遊客參觀」" 

# monologue
# JP: とはいえ、実際に見学客が来てくれることはほとんど無い。
2243 = "如果由真闇姐來當嚮導，我覺得來的人都能有一段愉快而充實的參觀體驗。" 

# monologue
# JP: 真闇姉の案内ならば、\n誰もが楽しく、充実の見学をできそうに思うのだが……
2140 = "但實際上卻很少有遊客前來參觀。" 

# 【ポーレット】
# display as 波萊特
# JP: 「お味噌お醤油の[かまた,1]蒲田さんも見学できるスポットですし、\nあと、ここ――[さんすいえん,2]山水園さんのお茶蔵」
1931 = "「釀造味噌、醬油的蒲田家也有可供參觀的地方，還有這裡——山水園的茶坊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1560 = "「唔」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ここが、御一夜で一番古い現存建造物とされてます。\n確か……築百三十年とか百四十年とか」
1889 = "「這就是御一夜現存最古老的建築物。我記得……已經有１３０年還是１４０年的歷史了」" 

# monologue
# JP: 百三十年。
2599 = "１３０年。" 

# monologue
# JP: 確かに古いが……\n[きょうと,1]京塗、二千年の古都などとは比すべくも無い。
2559 = "雖然是很古老……但跟兩千年的古都京都完全沒辦法比。" 

# 【双鉄】
# display as 雙鐵
# JP: 「古い建物があまりないのは、\x%l大戦;#00ffc040;大戦%l;#;の影響か？」
1536 = "「古建築這麼少，是受大戰的影響嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「も、あると思います。御一夜は、隈元市内みたいに\n直接の大空襲は受けてないですけど、それでも」
1691 = "「應該也有這個原因。雖然御一夜並沒有像隈元市市區那樣直接受到大規模空襲，但仍然還是——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「戦災の傷跡から立ち上がるため、か」
1797 = "「為了從戰亂的影響中恢復過來——嗎」" 

# monologue
# JP: [おきなわ,2]隠岐縄の被害ほどではなかろうが、\n九洲の受けた戦禍も、[なまなか,1]生半なものではないはずだ。
2560 = "雖然沒有沖繩那麼嚴重，但九州所遭受的戰禍，應該也是無比殘酷的。" 

# monologue
# JP: 立ち直るため、塗り替える――\nその気持ちなら、僕にも痛いほどよくわかる。
2421 = "為了從中恢復，所以重新粉刷一切——我非常能理解這樣的心情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「歴史方面での日ノ本一は無理そうだな。\nが――見どころとあらば、とにもかくにも見てみよう」
1822 = "「看來御一夜無法在歷史方面做到日本第一啊。但是——既然有值得一看的地方，那不管怎樣先去看看吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね」
1741 = "「是啊」" 

# monologue
# JP: 再び並んで歩き始める。\nクマ川からの、水を含んだ風の匂いが、心地いい。
2306 = "我們再次並肩邁開腳步。隈河那邊飄來的濕潤的清風沁人心脾。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　双鉄くん」
1575 = "「啊！　雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むっ？　人だかりだな」
1626 = "「嗯？　是人群啊」" 

# monologue
# JP: 珍しい。\n思うと同時に足が動く。
2297 = "我一邊心想真是稀奇，一邊邁開腳步。" 

# monologue
# JP: 制服姿は、修学旅行の客であろうか？\nその人だかりの向こうには、なんだ――出店か？
2541 = "那些穿著校服的人是來修學旅行的遊客嗎？在人群的前方是什麼呀——小攤？" 

# 【永山】
# display as ？？？
# JP: 「ああ、市長さん。あら？　デート？？」
1596 = "「啊，是市長小姐。哎呀？　在約會嗎？？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「デデデデっ、デートっ、じゃ、ありません！\n%61;……残念ですけど」
1450 = "「不不不不、不是約會！%61;……很遺憾不是」" 

# monologue
# JP: やけに気やすい、快活そうな中年女性だ。
2527 = "跟我們打招呼的是一位性格爽朗、平易近人的中年女性。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こちらは、ポーレットのお知り合いか？」
1885 = "「這位是波萊特的熟人嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい！　ご紹介させてくださいね？」
1598 = "「啊，是的！　容我介紹一下」" 

# monologue
# JP: ポーレットの声に、\n出店の中の中年女性は、僕をみつめてにかっと笑う。
2483 = "聽到波萊特的話語，擺小攤的中年女性笑嘻嘻地望著我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「こちらは、永山典子さん。[ゆうれいでら,2]幽霊寺――\n[えいざんじ,2]榮山寺のご住職の奥様です」
1884 = "「這位是永山典子女士。是幽靈寺——榮山寺住持的夫人」" 

# monologue
# JP: 幽霊寺……ああ、そうか。あそこも観光名所のはずだ。
2260 = "幽靈寺……啊，原來如此。那裡應該也是旅遊勝地。" 

# monologue
# JP: 幽霊だのなんだのは、僕には刺激がいささか強く、\n昔も今も、訪ねたことはないのだが――
2259 = "幽靈一類的東西對我的刺激會比較強，所以我從來沒去過——" 

# 【永山】
# display as 永山
# JP: 「はじめまして、永山です。\n君は――\x%l8620;#00ffc040;8620%l;#;の\x%l機関士;#00ffc040;機関士%l;#;さん、よね？」
1500 = "「你好，我是永山。你是——\\x%l8620;#00ffc040;８６２０%l;#;的\\x%l機関士;#00ffc040;司機%l;#;，對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい。右田双鉄と申します。\n僕をご存知とは、見学会にご参加くださったんですか？」
1755 = "「是的。我叫右田雙鐵。您認識我，莫非您參加了參觀會？」" 

# 【永山】
# display as 永山
# JP: 「うん。あたしも鉄道が好きだから」
1613 = "「嗯。因為我也喜歡鐵路啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それでポーレットとお知り合いに」
1590 = "「啊，所以您才會和波萊特認識」" 

# monologue
# JP: 言えばにっこり、\nポーレットも永山婦人も嬉しげな笑み。
2486 = "聽我說完，波萊特與永山夫人都開心地笑了笑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでは、永山さんも\x%lまいてつ;#00ffc040;まいてつ%l;#;なのですか？」
1924 = "「那麼，永山女士您也是\\x%lまいてつ;#00ffc040;掌車人%l;#;嗎？」" 

# 【永山】
# display as 永山
# JP: 「ううん？　あたしはこれ――」
1456 = "「不是哦？　我是做這個的——」" 

# monologue
# JP: 言いながら、永山婦人は丸い鉄板の上に\nとろとろの液体を注ぎ落とす。
2387 = "永山女士一邊說著，一邊往圓形的鐵板上倒黏稠的液體。" 

# monologue
# JP: それを器用に伸ばして広げ、クリーム、バナナ、\nイチゴを乗せて手早く巻いて紙につめ――
2554 = "隨後巧妙地將其攤開，放上香蕉、草莓，淋上奶油，捲起來用紙包住——" 

# 【永山】
# display as 永山
# JP: 「はぁい、おまたせ。三五〇円」
1648 = "「好，久等啦。收您３５０日元」" 

# 【学園生Ａ】
# display as 游客？
# JP: 「ありがと！　はい、三五〇円丁度ばい！」
1864 = "「謝謝！　給，剛好３５０日元咧！」" 

# 【永山】
# display as 永山
# JP: 「はぁい。毎度ありがとうね」
1645 = "「好。歡迎下次再來」" 

# monologue
# JP: 手渡すやいなや、観光客の一群は、\nきゃっきゃと笑いさざめき、歩いて行ってしまう。
2338 = "接過之後，學生們有說有笑地離開了。" 

# monologue
# JP: いや、というか――隈元弁だ。\nならば、恐らく、観光客などではなくて……
2117 = "不過說起來——她們說的是隈元話。恐怕不是遊客，而是……" 

# 【双鉄】
# display as 雙鐵
# JP: 「毎度、ということは……地元の学園生なのですか？」
1183 = "「“下次再來”，那也就是說……她們是當地的學生嗎？」" 

# 【永山】
# display as 永山
# JP: 「うん。お得意さん。毎週来てくれてるわね」
1623 = "「嗯，是我的常客。每週都會來光顧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、毎週ここでクレープ屋を？」
1920 = "「那麼，您每週都在這裡賣可麗餅？」" 

# 【永山】
# display as 永山
# JP: 「そうそう。その話だったわね」
1660 = "「對對。我剛剛正想說來著」" 

# monologue
# JP: さっ、さっ、と素早く手が動く。\nクレープ二つ。イチゴのソースとチョコのソースだ。
2230 = "她靈活地動著手，做出兩個可麗餅。分別是草莓味和巧克力味。" 

# 【永山】
# display as 永山
# JP: 「私は、強いていうなら\x%l食べ鉄;#00ffc040;[た]食べ[テツ]鉄%l;#;ね。\n自分で作る方がもっと好きだけど」
1829 = "「硬要說的話，我應該算是\\x%l食べ鉄;#00ffc040;鐵食家%l;#;吧。雖然我更喜歡自己動手做」" 

# monologue
# JP: クレープ二つが差し出されるから、\nポーレットに先に選ばせる。
2228 = "她遞給我們兩個可麗餅，我讓波萊特先挑選。" 

# monologue
# JP: 予想通りにイチゴがポーレットの手に渡り、\n僕の取り分はチョコになる。
2111 = "不出意料，她接過了草莓味的，那麼巧克力味的自然也就留給了我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l食べ鉄;#00ffc040;[た]食べ[テツ]鉄%l;#;、とは――」
1174 = "「\\x%l食べ鉄;#00ffc040;鐵食家%l;#;是——」" 

# 【永山】
# display as 永山
# JP: 「\x%l列車;#00ffc040;列車%l;#;に乗って、駅弁やその土地の名産を食べることを\n主とするタイプの鉄道ファンね」
1748 = "「是指以乘坐\\x%l列車;#00ffc040;列車%l;#;品嘗鐵路便當及當地美食為主要目的的鐵路愛好者」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ。テツも本当にいろいろですね」
1558 = "「唔……鐵路愛好者也分這麼多種啊」" 

# monologue
# JP: 料金を出そうとすれば断られるだろうから、\nありがたく御馳走になることにする。
2233 = "如果我提出要付錢的話，多半會被拒絕，所以我決定心懷感激地接受她的美意。" 

# monologue
# JP: くちもとに運べばふわり、\n甘やかな香りが鼻から脳へと染みる。
2334 = "拿著可麗餅湊近嘴邊，一股醉人的香甜由鼻腔直沁大腦。" 

# monologue
# JP: （はむっ）
2588 = "（咬）" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは……実に旨いですね。\n僕はあまり、甘い物を好んでは食べんのですが――」
1882 = "「這……實在是美味呀。我原本不怎麼愛吃甜食的——」" 

# monologue
# JP: しかし、旨い。ストレートに。\nクレープの、なんというのか、生地が旨い。
2152 = "但是，真的好吃。怎麼說呢，餅皮特別好吃。" 

# 【双鉄】
# display as 雙鐵
# JP: 「もちもちふわふわしてるのに、\n端だけ薄くパリっとしていて――いや、これは実に……」
1721 = "「明明整體鬆軟有嚼勁，邊上卻是薄薄脆脆的——哎呀，這可真是……」" 

# monologue
# JP: あまりの旨さに、口がゆるむ。\nくだらんこととわかっていても、弾んだ舌は止まらない。
2533 = "這令人陶醉的美味，使我不禁泛起笑意。突然心血來潮，想說一個無聊的冷笑話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これこそ、まさにキジウマですな」
1888 = "「這可真是，跟雉子馬一樣Ｑ」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぶふっ！？」
1627 = "「噗！？」" 

# monologue
# JP: くだらなさがツボに入ったのか、笑いを堪えた勢いで、\nポーレットはクレープを顔につけてしまう。
2327 = "或許是因為太過無聊，反而逗樂了波萊特。她低下頭想要忍住笑，結果不小心把可麗餅碰到了臉上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん」
1593 = "「啊，抱歉」" 

# monologue
# JP: 被害は幸い、鼻のてっぺんだけのようだ。\n生クリームを、そのまま指ですくい取る。
2253 = "幸好只有鼻尖遭了秧。我用手指將她鼻尖上那堆奶油抹掉。" 

# monologue
# JP: （ぺろり）
2596 = "（舔）" 

# 【ポーレット】
# display as 波萊特
# JP: 「/////っ！！」
1950 = "「（臉紅）！！」" 

# 【永山】
# display as 永山
# JP: 「ふふ～ん？」
1557 = "「哦——？」" 

# monologue
# JP: ポーレットがいきなり赤くなる。\n冷やかす声に揺すられて、自分が何をしたのか気付く。
2405 = "波萊特突然臉頰通紅。聽到旁邊傳來戲謔的聲音，我才認識到自己做了什麼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。気やすすぎたな。\n妹がいたので、ついつい」
1592 = "「啊，抱歉。這樣太過親近了啊。因為我有個妹妹，一不小心就——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いいえ、アリです。全然、気やすいの歓迎ですっ！」
1466 = "「不，沒關係的。親近一點，我完全不介意！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　ならばよかった」
1746 = "「是嗎？　那就好」" 

# 【永山】
# display as 永山
# JP: 「ふふーん、やっぱりデートじゃないの？」
1549 = "「呵呵，你們就是在約會吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、あの、そうじゃなくって」
1461 = "「不是，那個，不是這樣的」" 

# 【永山】
# display as 永山
# JP: 「なくって？」
1459 = "「不是這樣？」" 

# monologue
# JP: しばらく待っても、手がわたわたと動くだけ。
2310 = "我們等了她一會，她卻一直只是慌忙地擺著手。" 

# monologue
# JP: ゆであがったようなポーレットはもう、\n言葉を上手く探せんようだ。
2477 = "羞紅了臉的波萊特，看來已經沒辦法好好說話了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「観光振興の看板を探していたのです。\nたとえば、なにか日ノ本一となるものを」
1697 = "「我們正在尋找能用來復興旅遊業的招牌。比如說，能稱得上日本第一的東西」" 

# monologue
# JP: ……事情を細かく説明すれば、\n「なぁんだ」と失望したような声を出される。
1152 = "……聽我詳細說明了情況，她彷彿很失望地說了一句“什麼嘛”。" 

# monologue
# JP: この方は、\nやはりずいぶんサバけた感じの性格らしい。
2434 = "看來這位女士的性格果然很直爽。" 

# monologue
# JP: （もっとも、そうでなければ住職の奥方が、\n休日にクレープの出店など出さんか）
2583 = "（不過若非如此，她這位住持夫人也不會在休息日出來賣可麗餅吧）" 

# 【永山】
# display as 永山
# JP: 「ないでしょ？　日ノ本一。\nあったら歴代市長がとっくに看板にしてるわよ」
1784 = "「沒找到吧？　如果有什麼日本第一的話，歷任市長早就拿來當招牌啦」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あー、それはそう」
1567 = "「啊……確實如此」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1449 = "「不」" 

# monologue
# JP: 今は確かに、無いかもしれん――が。
2428 = "現在或許是沒有，但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「永山さんは、\nクレープ以外の料理も御得意なのですか？」
1783 = "「永山女士，您除了可麗餅之外，做其它料理也很拿手嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それはもう！　だって永山さん、\n旧\x%l帝鉄;#00ffc040;帝鉄%l;#;では食堂車勤務してらしたんですから」
1912 = "「那是當然！　永山女士曾經可是前\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;的餐車工作人員呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、本職の方だったのですか」
1579 = "「啊，原來您是內行啊」" 

# monologue
# JP: どうりでだ。\nこのクレープの味。
2564 = "難怪這裡的可麗餅如此美味。" 

# monologue
# JP: 納得すれば、それは期待へと膨らんでいく。
2264 = "得知這一事實，我便開始期待起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、駅弁などにもお詳しい？」
1919 = "「那麼，您對鐵路便當也很有了解？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そう。それ、わたしもお願いしたいって\n思ってたんです。名物駅弁」
1587 = "「啊，對。我也想著要拜託您做特色鐵路便當」" 

# 【永山】
# display as 永山
# JP: 「あ、任せてくれるなら歓迎。\n駅弁、一度はやってみたいし――あのＳＬのでしょ？」
1584 = "「啊，如果你們願意讓我來的話，我很樂意啊。我一直很想試著做鐵路便當——你們說的是那輛蒸汽機車吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい、\x%l8620;#00ffc040;8620%l;#;を主体とした観光\x%l列車;#00ffc040;列車%l;#;の」
1762 = "「是的，以\\x%l8620;#00ffc040;８６２０%l;#;為主體的觀光\\x%l列車;#00ffc040;列車%l;#;」" 

# 【永山】
# display as 永山
# JP: 「どんな観光\x%l列車;#00ffc040;列車%l;#;にするの？\nどんな駅弁を作ればいいの？」
1857 = "「要弄成什麼樣的觀光\\x%l列車;#00ffc040;列車%l;#;？要我做什麼樣的鐵路便當？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「細かなことは、これから詰めていきますが。\n作っていただきたい駅弁ならば、決まっています」
1447 = "「一些細節還要接下來慢慢商量。不過關於想請您做的鐵路便當，我已經想好了」" 

# monologue
# JP: 永山夫人がぱっとクレープ生地を伸ばして、\nチョコクリームの入った絞り袋を取る。
2389 = "永山女士攤開一張可麗餅皮，拿起裝有巧克力醬的裱花袋。" 

# monologue
# JP: メモ帳代わりか――\nこの人、なかなかに面白い。
2429 = "用來做筆記嗎——這個人可真有意思。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まずは、御一夜らしいこと。\nその魅力を伝える駅弁であること」
1945 = "「首先，要有御一夜特色。您的鐵路便當需要能夠彰顯它的魅力」" 

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜らしさ……」
1686 = "「御一夜特色……」" 

# monologue
# JP: チョコクリームの入った絞り袋がさらさら文字を書く。
2229 = "她開始用裝著巧克力醬的裱花袋寫起字來。" 

# monologue
# JP: クマ川、焼酎、水、幽霊――\n永山さんの「らしさ」がそこに、記されていく。
2551 = "隈河、燒酒、水、幽靈——永山女士依次寫下在她心目中的“特色”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そして、日ノ本一」
1805 = "「然後是，日本第一」" 

# 【永山】
# display as 永山
# JP: 「日ノ本一？」
1717 = "「日本第一？」" 

# monologue
# JP: ぴたり、チョコクリームの入った絞り袋の動きが止まる。
2508 = "裝著巧克力醬的裱花袋停止了書寫的微動。" 

# monologue
# JP: うむ。こここそが重要だ。\nできればイチゴの赤文字か、太字かで記してもらいたい。
2193 = "嗯。接下來是關鍵。如果可以，我希望她能用紅色的草莓醬或是用粗體字來寫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――日ノ本で一番、\n多くの人に食べられる駅弁を目指して下さい」
1178 = "「——請您努力讓它成為全日本最多人品嘗的鐵路便當」" 
