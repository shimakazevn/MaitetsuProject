[script]
# lines: 396 
# 【幸三】
# display as ？？？
# JP: 「だから、その件については悪かったと謝っている」
1623 = "「Nên anh đã xin lỗi về chuyện đó rồi còn gì.」"
# 【マイア】
# display as ？？？
# JP: 「今さら謝って貰っても……\n問題は何も解決しないわ」
1539 = "「Giờ anh có xin lỗi thì...\nCũng chẳng giải quyết được vấn đề gì đâu.」"
# monologue
# JP: ……またケンカしてる。パパとママ。\nわたしはこわくて、動けなくなる。
974 = "\"...Lại cãi nhau rồi. Ba và mẹ.\nMình sợ quá, không dám nhúc nhích.\""
# 【幸三】
# display as 幸三
# JP: 「確かに、解決はできていないな。\nお手伝いさんを入れねば家事が回らないままだ」
1559 = "「Đúng là chưa giải quyết được thật.\nNếu không thuê người giúp việc thì việc nhà không xuể đâu.」"
# 【マイア】
# display as 邁婭
# JP: 「回らない、って――」
1266 = "「Không xuể, là sao――」"
# monologue
# JP: パパも、ママも、ヒノモト語で話してるから、\nくわしく意味がわからない。
2153 = "\"Cả ba và mẹ đều đang nói tiếng Hinomoto,\nnên mình không hiểu rõ ý nghĩa cho lắm.\""
# monologue
# JP: それがこわくて、とても悲しい。
2248 = "\"Điều đó làm mình sợ hãi, và rất buồn.\""
# 【マイア】
# display as 邁婭
# JP: 「わたしの家で家族です！　ずっと丁寧に整えてきて――\nそれをいきなりあんな女にっ」
1594 = "「Đây là nhà của em, là gia đình của em! Em đã luôn chăm chút cẩn thận――\nVậy mà đột nhiên lại để cho một người phụ nữ như thế」"
# 【幸三】
# display as 幸三
# JP: 「それは悪かった。が――出来合いの惣菜ばかりの、\n掃除もできていない食卓にポーレットをつかせたくは」
1605 = "「Chuyện đó là anh sai. Nhưng mà――anh không muốn Paulette phải ngồi\nvào một bàn ăn chưa được dọn dẹp, toàn là đồ ăn mua sẵn đâu」"
# 【マイア】
# display as 邁婭
# JP: 「っ！　掃除も食事の準備も満足にできないのは、\nあなたが仕事を、いきなり投げ出したからでしょう！」
1000 = "「! Việc em không thể dọn dẹp hay chuẩn bị bữa ăn chu đáo,\nchẳng phải là do anh đột nhiên vứt bỏ công việc sao!」"
# monologue
# JP: パパがわたしの名前を出したら、\nママ、ものすごく怒っちゃった。
2156 = "\"Khi ba nhắc đến tên mình,\nmẹ đã tức giận vô cùng.\""
# 【マイア】
# display as 邁婭
# JP: 「相談も無しに立候補とか――会社をわたしに押し付けて、\nあなたはなんでも一人で決めてっ！」
1621 = "「Tự ý ứng cử mà không thèm bàn bạc――đẩy hết công ty cho em,\ncái gì anh cũng tự quyết định một mình!」"
# 【幸三】
# display as 幸三
# JP: 「何を――\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致計画は、『御一夜を壊す』と、\nおまえも反対していただろう」
1573 = "「Nói gì thế――kế hoạch thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#; sẽ 『Phá hủy Ohimitera』,\nchính em cũng đã phản đối cơ mà.」"
# 【マイア】
# display as 邁婭
# JP: 「それとこれとは話が別です！\nあなたの勝手に、わたしも、ポーレットまで巻き込んで」
1591 = "「Chuyện đó với chuyện này là hai vấn đề khác nhau!\nSự ích kỷ của anh, đã kéo theo cả em, và cả Paulette nữa.」"
# 【幸三】
# display as 幸三
# JP: 「同じ話だ！　誰も反対の旗を振らねば、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致はなし崩しに行われていた！！」
1477 = "「Cùng một chuyện cả thôi! Nếu không ai giương cao ngọn cờ phản đối,\nthì việc thu hút nhà máy \x%lエアクラ;#00ffc040;Aircra%l;#; sẽ dần dần được tiến hành mất!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ――」
984 = "「――」"
# monologue
# JP: また。\nわたしの名前が呼ばれたら、今度はパパがすごく怒る。
1893 = "\"Lại nữa rồi.\nKhi tên mình được gọi lên, lần này ba lại cực kỳ tức giận.\""
# monologue
# JP: きっとわたしがお手伝い……まだヘタだから。\nママほど上手に、できてないから。
1836 = "\"Chắc chắn là do mình giúp việc nhà... vẫn còn vụng về.\nVì mình làm không được giỏi như mẹ.\""
# 【ポーレット】
# display as 波萊特
# JP: 「アノ、ネ？　パパ、ママ」
1564 = "「Nghe, con, nói này? Ba ơi, mẹ ơi.」"
# 【マイア】
# display as 邁婭
# JP: 「ああ、ほら。\nあなたが大きな声を出すからポーレットが」
1348 = "「Đấy, anh thấy chưa.\nTại anh lớn tiếng nên Paulette mới...」"
# 【幸三】
# display as 幸三
# JP: 「そうやって、お前はいつも私ばかりを悪者に」
1270 = "「Cứ như vậy, em lúc nào cũng đổ lỗi cho anh.」"
# 【マイア】
# display as 邁婭
# JP: 「何言ってっ――わたしはいつでも、あなたの味方をっ\n――どれだけ、わたしが頑張ってるか」
1271 = "「Anh nói gì thế――lúc nào em cũng đứng về phía anh\n――anh có biết em đã cố gắng đến mức nào không.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ヤメ、テ！　パパ、ママっ！」
1292 = "「Dừng, lại đi! Ba ơi, mẹ ơi!」"
# monologue
# JP: ヒノモト語。\nわたし、まだ上手にしゃべれない。
2040 = "\"Tiếng Hinomoto.\nMình vẫn chưa nói sõi.\""
# monologue
# JP: けど、ママにだけじゃなく、\nパパにも、わかってほしいから――
1869 = "\"Nhưng mà, không chỉ riêng mẹ,\nmình cũng muốn ba hiểu được――\""
# 【ポーレット】
# display as 波萊特
# JP: 「ワタシ、ガンバル――カラ。\nモット、オテツダイ――ナル、ジョウズ、カラ」
1457 = "「Con, sẽ cố gắng――mà.\nSẽ giúp đỡ, nhiều hơn――giỏi hơn, mà.」"
# 【幸三】
# display as 幸三
# JP: 「……恥ずかしくないのか、こんなに小さなポーレットに、\n汚れた家の責任を感じさせるなど」
1032 = "「...Em không thấy xấu hổ sao, khi để một đứa trẻ nhỏ bé như Paulette,\nphải cảm thấy có trách nhiệm với cái nhà bẩn thỉu này.」"
# 【マイア】
# display as 邁婭
# JP: 「だったらあなたが家事をすればいいっ！\n結婚したときは、家事も半々って約束で！！」
1607 = "「Thế thì anh tự đi mà làm việc nhà đi!\nLúc kết hôn đã hứa là chia đôi việc nhà rồi cơ mà!!」"
# 【幸三】
# display as 幸三
# JP: 「だから！　私が出来ない分を代わりにと思って、\nお手伝いさんを雇ったんじゃないか」
1503 = "「Thì thế! Anh đã định thuê người giúp việc\nđể làm thay phần của anh rồi còn gì.」"
# 【マイア】
# display as 邁婭
# JP: 「いやだったのよ！\nわたしの大事なこの家を、赤の他人の手に弄られてっ！」
1442 = "「Nhưng em không thích!\nNgôi nhà quý giá này của em, lại để cho một kẻ hoàn toàn xa lạ động tay vào!」"
# 【幸三】
# display as 幸三
# JP: 「その件は、何度も何度も謝っている。\n――だったら、私にどうしろと言うんだっ」
1624 = "「Chuyện đó, anh đã xin lỗi hết lần này đến lần khác rồi.\n――Thế em muốn anh phải làm sao nữa.」"
# 【マイア】
# display as 邁婭
# JP: 「それは――こっちの台詞です――\nこれ以上……わたしは……どう、したら――」
1589 = "「Đó――là câu của em mới đúng――\nHơn thế này nữa... em... phải làm, sao đây――」"
# monologue
# JP: やだ、いやだ。\n泣いちゃった……ママ――
1846 = "\"Không, không muốn đâu.\nMẹ... khóc mất rồi――\""
# 【幸三】
# display as 幸三
# JP: 「……すまないとは思っている。それでも……\n[ふるさと,1]故郷が――御一夜が失われるのを、放置など――」
1042 = "「...Anh biết là anh có lỗi. Nhưng dù vậy...\nAnh không thể làm ngơ trước việc quê hương――Ohimitera bị hủy hoại được――」"
# monologue
# JP: 泣いて無い、けど、\nパパも、泣いてる、こころの中で。
2154 = "\"Ba không khóc, nhưng mà,\nba cũng đang khóc, ở trong lòng.\""
# 【ポーレット】
# display as 波萊特
# JP: 「ャッ……」
1244 = "「K-Không...」"
# monologue
# JP: こわい。\nパパとママ、いつものケンカみたいじゃない。
1961 = "\"Đáng sợ quá.\nBa và mẹ, không giống như những trận cãi vã thường ngày.\""
# monologue
# JP: すごく、静かで――\nだから、こわい。すごく、良くない感じする。
2291 = "\"Rất, tĩnh lặng――\nNên là, đáng sợ lắm. Cảm giác rất, không lành.\""
# 【ポーレット】
# display as 波萊特
# JP: 「ワタ――ワタ、シ――」
1437 = "「C-Con――Con――」"
# monologue
# JP: ――やめてほしかっただけなのに、\nがんばるっていったら、ケンカがこんなにひどくなった。
937 = "\"――Mình chỉ muốn ba mẹ dừng lại thôi,\nvậy mà khi mình bảo sẽ cố gắng, trận cãi vã lại càng trở nên tồi tệ hơn.\""
# monologue
# JP: だったら、もう何も話せない。\nじっとして、ケンカが終わるのを待つしかできない。
2268 = "\"Nếu vậy thì, mình không thể nói gì nữa rồi.\nChỉ có thể nằm im, chờ đợi trận cãi vã kết thúc.\""
# 【マイア】
# display as 邁婭
# JP: 「……こうなる前から、少し考えていたんですけど」
1038 = "「...Từ trước khi chuyện thành ra thế này, em đã suy nghĩ một chút rồi.」"
# 【幸三】
# display as 幸三
# JP: 「――何をだ」
987 = "「――Chuyện gì.」"
# monologue
# JP: （コワイ――コワイ――ダレカ――タスケテ）
2349 = "\"（Đáng sợ quá――Đáng sợ quá――Ai đó――Cứu với）\""
# monologue
# JP: けど、パパとママがケンカしてたら、\n誰も、わたしを助けてくれない。
1902 = "\"Nhưng mà, nếu ba và mẹ cãi nhau,\nthì chẳng có ai, cứu mình cả.\""
# monologue
# JP: わたしがだまってがんばらなくちゃ――\n役立たずのこどものままなら、このまま、ずうっと――
2027 = "\"Mình phải im lặng và cố gắng thôi――\nNếu cứ mãi là một đứa trẻ vô dụng, thì sẽ mãi mãi thế này――\""
# 【マイア】
# display as 邁婭
# JP: 「わたし……ポーレットをつれてフランクに」
1441 = "「Em... sẽ đưa Paulette về Pháp.」"
# 【幸三】
# display as 幸三
# JP: 「ポーレットはわたしの娘だっ！」
1521 = "「Paulette là con gái của anh!」"
# 【ポーレット】
# display as 波萊特
# JP: 「～～～ッ」
1636 = "「~~~!」"
# monologue
# JP: やめて、やめて、やめて、やめて。\nわたしの名前で、名前を呼んで、ケンカ、しないで――っ
1844 = "\"Dừng lại đi, dừng lại đi, dừng lại đi, dừng lại đi.\nĐừng mang tên con ra, đừng gọi tên con rồi cãi nhau nữa――\""
# 【ポーレット】
# display as 波萊特
# JP: 「モット――ナル、カラ――\nデキル――ヨウニ――キット、ナル――カラ」
1498 = "「Con sẽ――giỏi hơn, mà――\nSẽ làm được――chắc chắn, sẽ làm được――mà.」"
# monologue
# JP: だから――もどって――\n前までの、仲良しの、パパと、ママに。
2067 = "\"Cho nên――hãy trở lại――\nThành ba, và mẹ, hòa thuận như lúc trước đi.\""
# monologue
# JP: それで、わたしをもっと見て、\nふたりでだけじゃなく――わたしと話して！
2149 = "\"Và rồi, hãy nhìn con nhiều hơn,\nđừng chỉ có hai người――hãy nói chuyện với con đi!\""
# 【ポーレット】
# display as 波萊特
# JP: 「モット――ワタシ――」
1438 = "「Nhiều hơn――Con――」"
# 【ポーレット】
# display as 波萊特
# JP: 「がんばるから――がんばれるからっ」
1499 = "「Con sẽ cố gắng――con sẽ cố gắng được mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
1520 = "「Paulette.」"
# monologue
# JP: うなされている。\nさっきからずっと。ずうっとだ。
1996 = "\"Cô ấy đang gặp ác mộng.\nTừ nãy đến giờ. Cứ rên rỉ suốt.\""
# monologue
# JP: タオルを替えてやるくらいしか出来ない自分が、\nあまりにも情けなくもどかしい。
1838 = "\"Bản thân chỉ có thể làm mỗi việc thay khăn cho cô ấy,\nthật quá đỗi thảm hại và bức bối.\""
# 【ポーレット】
# display as 波萊特
# JP: 「がんばるから――だから」
1453 = "「Con sẽ cố gắng――cho nên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1634 = "「!」"
# monologue
# JP: 血の気を失くした手が伸びる。\nいや――誰かに、何かにすがろうとして彷徨っている。
1934 = "\"Bàn tay mất đi huyết sắc vươn ra.\nKhông――nó đang quờ quạng, như muốn bấu víu vào ai đó, vào thứ gì đó.\""
# monologue
# JP: 寝ている婦女子に触れるなど、\n男がやっていいことではない。だが――
2240 = "\"Chạm vào một người phụ nữ đang ngủ,\nkhông phải là việc một người đàn ông nên làm. Nhưng mà――\""
# 【ポーレット】
# display as 波萊特
# JP: 「わたし――もっと――がんばれる、から」
1439 = "「Con――có thể――cố gắng nhiều hơn, mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「～～～っ！」
1639 = "「~~~!」"
# monologue
# JP: 見捨てないでと、わななく指が悲鳴をあげてる。
1958 = "\"Những ngón tay run rẩy như đang gào thét xin đừng bỏ rơi cô ấy.\""
# monologue
# JP: その手を彷徨わせ続けるくらいなら、\n痴漢の汚名を負う方が、遥かにマシだ。
2201 = "\"Nếu cứ để bàn tay ấy tiếp tục quờ quạng,\nthì thà gánh chịu tiếng nhơ là kẻ sàm sỡ còn hơn.\""
# monologue
# JP: （きゅっ）
2363 = "\"（Nắm chặt）\""
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。ポーレット。\n無理をしてまで頑張らなくても、大丈夫なんだ」
1511 = "「Không sao đâu. Paulette.\nCô không cần phải ép bản thân cố gắng quá sức đâu, không sao cả.」"
# 【ポーレット】
# display as 波萊特
# JP: 「…………」
1018 = "「…………」"
# monologue
# JP: 僕の手の熱。\n包み込むことで少しでも伝えてあげられればいい。
1873 = "\"Hơi ấm từ bàn tay tôi.\nBao bọc lấy cô ấy, hy vọng có thể truyền sang được dù chỉ một chút.\""
# monologue
# JP: それほどまでにポーレットは冷えきっていて、\n夏布団に包まれてなお、小さく小さく震えているから。
2131 = "\"Bởi vì Paulette lạnh lẽo đến mức đó,\ndù được quấn trong chăn mùa hè, cô ấy vẫn khẽ run rẩy.\""
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。少なくとも僕は味方だ。\n僕はここで――望まれる限り側にいる」
1510 = "「Không sao đâu. Ít nhất thì tôi cũng đứng về phía cô.\nTôi sẽ ở đây――bên cạnh cô chừng nào cô còn cần.」"
# 【ポーレット】
# display as 波萊特
# JP: 「――ぁっ」
996 = "「――A.」"
# monologue
# JP: 目が、開く。\n涙でうるんで、心細げな瞳がぼんやり、僕を見る。
1957 = "\"Đôi mắt, mở ra.\nNgấn lệ, đôi đồng tử đầy vẻ bất an thẫn thờ nhìn tôi.\""
# monologue
# JP: だから、手はまだ、ほどけない。\n泣いている子を、一人で放ってなどはおけない。
2075 = "\"Vì vậy, tôi vẫn chưa thể buông tay.\nKhông thể để mặc một cô gái đang khóc một mình được.\""
# 【双鉄】
# display as 雙鐵
# JP: 「悪い夢を見たのか？」
1278 = "「Cô gặp ác mộng à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　……あ――」
1323 = "「Hả? ...A――」"
# monologue
# JP: ほわっと。\n表情が溶けてくずれる。
1953 = "\"Bỗng chốc.\nBiểu cảm căng cứng của cô ấy tan ra.\""
# monologue
# JP: 真っ白さえも通り越し、透けそうだった肌の色にも、\n自然な赤みがゆっくり戻る。
2151 = "\"Vượt qua cả sự trắng bệch, màu da tưởng chừng như trong suốt ấy,\ncũng dần dần lấy lại được sắc hồng tự nhiên.\""
# 【ポーレット】
# display as 波萊特
# JP: 「……双鉄くんだぁ」
1045 = "「...Là anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕だ」
1363 = "「Ừm. Là tôi đây.」"
# monologue
# JP: 笑ってくれる。\n冷えきっていた手が、わずかにだけれどあたたかになる。
1938 = "\"Cô ấy mỉm cười.\nBàn tay lạnh buốt cũng dần trở nên ấm áp, dù chỉ một chút.\""
# monologue
# JP: それだけで、僕も幸せになり――\nなぜだか不意に、泣き出しそうな気持ちにもなる。
1880 = "\"Chỉ bấy nhiêu thôi cũng khiến tôi cảm thấy hạnh phúc――\nVà không hiểu sao, đột nhiên tôi lại có cảm giác như muốn bật khóc.\""
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ」
1346 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
1379 = "「Hửm?」"
# monologue
# JP: 青い瞳が、まだねむいのかとろけるように見つめている。
2267 = "\"Đôi mắt xanh biếc, như thể vẫn còn ngái ngủ, đang ngắm nhìn một cách mơ màng.\""
# monologue
# JP: ポーレットの白く小さな手を、\n僕の手が包み込んでいる姿を。
1955 = "\"Nhìn hình ảnh bàn tay tôi,\nđang bao bọc lấy bàn tay nhỏ nhắn, trắng trẻo của Paulette.\""
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。放って置けなかった。\n寝ているところに触れるなど、やっていいことでは――」
1465 = "「Xin lỗi. Tôi không thể để mặc cô được.\nChạm vào người khác lúc đang ngủ, không phải là việc nên làm――」"
# 【ポーレット】
# display as 波萊特
# JP: 「ううん、ううん。いいです。全然、いいことです。\nわたし――だって、助かりました」
1245 = "「Không, không đâu. Không sao ạ. Hoàn toàn, không sao cả.\nBởi vì――nhờ thế mà em đã được cứu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……夢の話か？」
1590 = "「Đó là... chuyện trong mơ sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。ちょっと……悲しい夢を見てたので」
1490 = "「Vâng. Em đã mơ thấy... một giấc mơ hơi buồn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか――」
1592 = "「Vậy sao――」"
# monologue
# JP: 安堵にゆるんだ表情に、\nわずかな寂しさが入り混じる。
1918 = "\"Trên khuôn mặt đã giãn ra vì nhẹ nhõm,\npha lẫn một chút nét buồn bã.\""
# monologue
# JP: それを目にすればじくじくと、罪悪感が疼いてしまう。
2047 = "\"Nhìn thấy điều đó, cảm giác tội lỗi trong tôi lại nhói lên âm ỉ.\""
# 【双鉄】
# display as 雙鐵
# JP: 「――だが、現実には。\n僕はまるきり、ポーレットの助けになれていなかった」
989 = "「――Nhưng, trong thực tế.\nTôi lại hoàn toàn không thể giúp gì được cho Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1333 = "「Hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「医師の見立てでは過労だそうだ」
1622 = "「Theo chẩn đoán của bác sĩ thì là do làm việc quá sức.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あー」
1334 = "「A――」"
# monologue
# JP: くたり――ポーレットの腕の力が一気に抜ける。\n握りしめてる手をゆるめれば、布団の上に音なく落ちる。
2128 = "\"Rũ xuống――sức lực trên cánh tay Paulette đột ngột tiêu tan.\nKhi tôi nới lỏng bàn tay đang nắm chặt, tay cô ấy nhẹ nhàng rơi xuống chăn không một tiếng động.\""
# 【ポーレット】
# display as 波萊特
# JP: 「すみません。迷惑かけて――\n心配も、してもらっちゃいましたよね？」
1414 = "「Em xin lỗi. Đã làm phiền anh rồi――\nAnh cũng đã lo lắng cho em đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。せぬわけがない」
1544 = "「Đương nhiên rồi. Làm sao mà không lo cho được.」"
# monologue
# JP: 医師の見立ては尊重するが、\nどうにも単なる過労だけとは思えなかった。
2280 = "\"Tôi tôn trọng chẩn đoán của bác sĩ,\nnhưng dù nghĩ thế nào cũng không cho rằng đây chỉ đơn thuần là làm việc quá sức.\""
# monologue
# JP: ゆえポーレットの普段の様子を、こと細やかに聞かせても、\n医師の見立ては変わらなかった。
2069 = "\"Vì vậy, dù tôi đã kể tỉ mỉ về tình trạng thường ngày của Paulette,\nchẩn đoán của bác sĩ vẫn không thay đổi.\""
# monologue
# JP: （過労による心身の抵抗力の著しい低下――か）
2374 = "\"（Sức đề kháng của cả thể chất lẫn tinh thần suy giảm nghiêm trọng do làm việc quá sức――sao.）\""
# monologue
# JP: ……過去の傷は、影に似ている。
977 = "\"...Vết thương trong quá khứ, giống như một cái bóng.\""
# monologue
# JP: 調子よく歩いているときは気にもならぬが、\n疲れに足を止め俯けば、その漆黒に魅入られてしまう。
2169 = "\"Khi đang bước đi suôn sẻ thì chẳng hề bận tâm,\nnhưng khi mệt mỏi dừng bước và cúi đầu xuống, ta sẽ bị màn đen kịt ấy hớp hồn.\""
# monologue
# JP: （僕も、同じだ）
2360 = "\"（Mình cũng, giống như vậy.）\""
# monologue
# JP: だから、決して止まりたくない。\n常に動いて、働いて、ひたすら前を見続けていたい。
2072 = "\"Vì vậy, tôi tuyệt đối không muốn dừng lại.\nTôi muốn luôn vận động, làm việc, và chỉ mải miết nhìn về phía trước.\""
# monologue
# JP: （が――無限には歩き続けられない。\n過去と、傷と……いつかは、向き合わねばならん）
2330 = "\"（Nhưng――không thể cứ bước đi mãi vô tận được.\nVới quá khứ, với vết thương... một lúc nào đó, ta sẽ phải đối mặt.）\""
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄……くん？」
1629 = "「Anh Soutetsu...?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
1349 = "「À, ừm.」"
# monologue
# JP: しかし、弱り切っているポーレットに、\nいきなり過去の――おそらくは傷のことなど聞けない。
1872 = "\"Nhưng mà, với một Paulette đang vô cùng yếu ớt,\ntôi không thể đột nhiên hỏi về quá khứ――có lẽ là về vết thương của cô ấy được.\""
# monologue
# JP: “もっと早期に向き合ってれば”と、その反省は無論ある。\nが、僕の焦りで、ポーレットの傷を深める危険は冒せない。
2039 = "\"Đương nhiên tôi cũng tự kiểm điểm bản thân rằng “giá như mình đối mặt sớm hơn”.\nNhưng tôi không thể mạo hiểm làm sâu thêm vết thương của Paulette chỉ vì sự nôn nóng của mình.\""
# 【双鉄】
# display as 雙鐵
# JP: 「今はともかく、疲れを癒やすことだ」
1538 = "「Dù sao thì bây giờ, việc quan trọng là xua tan mệt mỏi đã.」"
# 【ポーレット】
# display as 波萊特
# JP: 「です、よね――\n倒れちゃったんですもんね、わたし」
1480 = "「Đúng, vậy nhỉ――\nVì em đã ngất xỉu mất rồi mà.」"
# monologue
# JP: 自分の体に目を落とし、\nポーレットは少し、驚いたような顔をする。
2123 = "\"Đưa mắt nhìn xuống cơ thể mình,\nPaulette tỏ vẻ hơi ngạc nhiên.\""
# 【ポーレット】
# display as 波萊特
# JP: 「あの……これ、着替え――」
1612 = "「Dạ... bộ quần áo này――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、真闇姉がやってくれた。\n今は蔵の仕事があるゆえ、看病を僕が引き継いだ」
1353 = "「À, chị Mayami đã thay giúp đấy.\nBây giờ chị ấy có việc ở xưởng rượu, nên tôi đã tiếp quản việc chăm sóc cô.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうだったんですか――って、あ。仕事」
1495 = "「Ra là vậy ạ――à, đúng rồi. Công việc.」"
# monologue
# JP: 時計を見ようとしたのだろうか。
1944 = "\"Có lẽ cô ấy định nhìn đồng hồ chăng.\""
# monologue
# JP: 起きようとする上体を、\n力をいれずに押さえ、とどめる。
2055 = "\"Tôi giữ nhẹ phần thân trên đang định nhỏm dậy của cô ấy lại,\nkhông dùng lực.\""
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。何も心配することはない」
1509 = "「Không sao đâu. Không có gì phải lo lắng cả.」"
# 【ポーレット】
# display as 波萊特
# JP: 「けど――」
1310 = "「Nhưng mà――」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのまま、本会議は終了になった。\n次回は、予定通りに明後日午後からの開催だ」
1265 = "「Ngay sau đó, phiên họp toàn thể đã kết thúc.\nLần tới sẽ được tổ chức vào chiều ngày mốt theo đúng kế hoạch.」"
# 【ポーレット】
# display as 波萊特
# JP: 「夕方の定時運行は？」
1284 = "「Còn chuyến chạy định kỳ buổi chiều thì sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「及ばずながら、僕が。\nハチロクと組み、キハ[レイナナ,1]07を\x%l客車;#00ffc040;客車%l;#;とさせてもらった」
1487 = "「Dù không bằng cô, nhưng tôi đã làm.\nTôi bắt cặp với Hachiroku, và dùng KiHa 07 làm \x%l客車;#00ffc040;toa hành khách%l;#;.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……ありがとうございます」
1344 = "「A... Cảm ơn anh rất nhiều ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――礼を言われるようなことではないさ」
1239 = "「Không――đây không phải chuyện đáng để cô phải cảm ơn đâu.」"
# monologue
# JP: 本当に、だ。\n礼を言われる資格などある筈もない。
1842 = "\"Thật sự là vậy.\nTôi làm gì có tư cách nhận lời cảm ơn chứ.\""
# monologue
# JP: （そもそも僕が――秘書としての仕事を、\n十分できていたのなら、過労に倒れさせずに済んでいた）
2379 = "\"（Nói cho cùng, nếu tôi――làm tốt công việc của một thư ký,\nthì đã không để cô ấy phải ngất xỉu vì làm việc quá sức.）\""
# monologue
# JP: が、それを言葉に出してしまえば、ポーレットはかえって\n自らを責め立てるだろうから、今は沈黙するしか無い。
1866 = "\"Nhưng nếu nói ra điều đó, Paulette sẽ lại\ntự trách bản thân mình mất, nên giờ tôi đành phải im lặng.\""
# monologue
# JP: （ならば、今からでも体制を作り出せねばならん）
2385 = "\"（Nếu vậy, ngay từ bây giờ mình phải tạo ra một hệ thống mới được.）\""
# monologue
# JP: ポーレットの負荷を極力減らし、それと同時に、\n誰の上にも過負荷が生じず、無理なくまわせる体制を。
1834 = "\"Giảm thiểu tối đa gánh nặng cho Paulette, đồng thời,\ntạo ra một hệ thống không gây quá tải cho bất kỳ ai và có thể vận hành trơn tru.\""
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、今は回復に専念することだ。\n腹はすいてないか？　喉の渇きは？」
1561 = "「Nói chung, bây giờ cô cứ tập trung hồi phục đi.\nCó đói bụng không? Có khát nước không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
1335 = "「A...」"
# monologue
# JP: 体の様子をたしかめてるのか、\nポーレットがつかのま、目を閉じる。
2132 = "\"Có lẽ đang kiểm tra tình trạng cơ thể,\nPaulette nhắm mắt lại trong giây lát.\""
# 【ポーレット】
# display as 波萊特
# JP: 「……両方、欲しいみたいです。\nお水と、それと――おかゆか何かがもしあれば」
1029 = "「...Hình như em muốn cả hai ạ.\nNước, và cả――cháo hay thứ gì đó nếu có.」"
# 【双鉄】
# display as 雙鐵
# JP: 「水より[さゆ,1]白湯だな。粥は、梅粥でいいか？」
1504 = "「Nước ấm sẽ tốt hơn nước lọc đấy. Cháo thì, cháo mơ muối được chứ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、ありがとうございます」
1375 = "「Vâng, cảm ơn anh ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「待っていろ、すぐ用意する」
1269 = "「Đợi nhé, tôi đi chuẩn bị ngay.」"
# monologue
# JP: ……っと。
970 = "\"...Úi.\""
# monologue
# JP: 真闇姉はまだ仕事中か。\n日々姫も出かけている様子だし――うむ。
2185 = "\"Chị Mayami vẫn đang làm việc sao.\nHibiki có vẻ cũng đã ra ngoài rồi――ừm.\""
# 【双鉄】
# display as 雙鐵
# JP: 「待たせたな。っと――\nいや、少し待て」
1575 = "「Để cô phải đợi rồi. Ây da――\nKhông, đợi một chút đã.」"
# monologue
# JP: ポーレットが慌てて体を起こそうとするのをなだめ、\nひとまず、お盆を脇へ置く。
2061 = "\"Tôi dỗ dành Paulette đang vội vàng định ngồi dậy,\ntạm thời đặt khay đồ ăn sang một bên.\""
# 【双鉄】
# display as 雙鐵
# JP: 「倒れた身だぞ？　急に動くな。\nどこかを痛めているかもしれん」
1262 = "「Cô vừa mới ngất xỉu đấy nhé? Đừng cử động đột ngột.\nBiết đâu lại bị đau ở đâu đó thì sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……そうかもですね」
1341 = "「A... có lẽ là vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「起こすぞ」
1451 = "「Tôi đỡ cô dậy nhé.」"
# monologue
# JP: それから少し伸びをして、首を、手足を動かして。\nポーレットは、ほっ、と安堵の息を吐く。
2125 = "Sau đó, Paulette cẩn thận vươn vai, thử cử động cổ và tay chân, rồi thở phào nhẹ nhõm."
# 【ポーレット】
# display as 波萊特
# JP: 「どこも、痛いところは無いみたいです。\nで、あの――」
1548 = "「Có vẻ không bị đau ở đâu cả.\nVậy nên, cái đó——」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。飲む方か？　食べる方か？」
1362 = "「Ừm. Cô muốn uống trước hay ăn trước?」"
# 【ポーレット】
# display as 波萊特
# JP: 「えと、お[さゆ,1]白湯、先にいただけますか？」
1611 = "「Ưm, cho tôi xin cốc nước lọc trước được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1512 = "「Hiểu rồi.」"
# monologue
# JP: ポーレットの背中に手をあてて、\nその口元へとそっとコップをおしつける。
2013 = "Tôi đặt một tay đỡ lưng Paulette,\ntay kia nhẹ nhàng đưa cốc nước đến sát miệng cô ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ」
# 1346 = "「啊」" 
# monologue
# JP: 一瞬、小さな声を出し、それ以上は何も言う事なしに、\nポーレットは喉を鳴らし始める。
1943 = "Cô ấy khẽ phát ra một âm thanh nhỏ, nhưng không nói thêm gì nữa\nvà bắt đầu ừng ực uống nước."
# 【ポーレット】
# display as 波萊特
# JP: （んくっ――こくっ――んっ――こくんっ――）
2346 = "（Ưm——ực——ưm——ực——）"
# 【双鉄】
# display as 雙鐵
# JP: 「あまり一気に飲み過ぎるなよ？」
1291 = "「Đừng uống một hơi nhiều quá đấy nhé?」"
# monologue
# JP: 過保護すぎるかと少し思うが、\nポーレットは心地よさそうだ。
2283 = "Dù hơi lo rằng mình đang chăm sóc thái quá,\nnhưng có vẻ Paulette thấy rất thoải mái."
# monologue
# JP: とんとんとん、と、叩くようにして背中をさすれば、\nほう、と満足そうなため息。
2054 = "Khi tôi nhẹ nhàng vỗ vỗ, vuốt ve lưng cô ấy,\ntôi nghe thấy một tiếng thở dài thỏa mãn."
# 【双鉄】
# display as 雙鐵
# JP: 「次は、粥だな。\n自分ひとりで食べられるか？」
1469 = "「Tiếp theo là cháo nhé.\nCô có tự ăn được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――と、どうでしょう？\nやっぱり、どこか痛むと怖いし」
1357 = "「Ưm——, cũng không biết nữa?\nQuả nhiên là tôi vẫn sợ sẽ làm đau ở đâu đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。安全策をとっておいたほうが無難だ」
1483 = "「Cũng phải. Tốt nhất là cứ cẩn tắc vô áy náy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
1370 = "「Vâng!」"
# monologue
# JP: 嬉しげな声。\nポーレットはぴっと背筋を伸ばす。
2122 = "Một giọng nói đầy vẻ vui mừng.\nPaulette thẳng lưng lên."
# 【ポーレット】
# display as 波萊特
# JP: 「それじゃ――えと、お願い、します」
1618 = "「Vậy thì——ưm, nhờ anh vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ――そら」
1356 = "「Ừm——ăn đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　あの、『そら』って、そんな……\nなんていうか――もう少し優しく」
1332 = "「Hả!? À, chỉ một câu 『ăn đi』 thôi sao……\nNói thế nào nhỉ——anh có thể dịu dàng hơn một chút không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　れいなの甘えっ子がうつったか？」
1432 = "「Sao vậy? Bị lây tính hay làm nũng của Reina rồi à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はうっ」
1328 = "「Hau~」"
# monologue
# JP: からかうようなことを言ってしまって、\nいかん、とすぐに反省する。
2172 = "Lỡ miệng trêu chọc cô ấy mất rồi,\nkhông ổn, tôi lập tức tự kiểm điểm bản thân."
# monologue
# JP: 甘えは、つまりは弱気の表れ。\nポーレットは、倒れたばかりなのだから。
2085 = "Làm nũng, suy cho cùng cũng là biểu hiện của sự yếu đuối.\nVì Paulette cũng vừa mới ngất xỉu xong."
# monologue
# JP: （妙に照れくさいと思ってしまったのがいけなかったか。\nこういうことは――うむ、普通にやればいいだけだ）
2387 = "（Chắc là do tôi tự dưng thấy xấu hổ quá nên mới vậy.\nMấy chuyện thế này——ừm, cứ làm bình thường là được.）"
# monologue
# JP: れいなにだったらどうふるまうか――\n考えればすぐ、最適と思われる解は見つかる。
1963 = "Nếu là Reina thì mình sẽ làm thế nào——\nChỉ cần nghĩ vậy, tôi liền tìm ra cách giải quyết tối ưu nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――『あーん』か？」
1617 = "「Vậy thì——『A~』 nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、はい――えと――あ～んっ」
1497 = "「V-Vâng——ưm——A~」"
# monologue
# JP: （ぱくっ）
2339 = "（Ngoạm）"
# monologue
# JP: いかん。これははなはだ照れくさい。\n照れるなというのが無理なレベルだ。
2193 = "Nguy thật. Thế này đúng là quá xấu hổ.\nĐến mức bảo không xấu hổ là điều không thể."
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ！　おいひい」
1324 = "「Oa! Ngon wá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはよかった」
1615 = "「Vậy thì tốt rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「すごいですよね、真闇さん。\nなにをやっても一流で」
1553 = "「Chị Mayami thật tuyệt vời nhỉ.\nLàm gì cũng ở đẳng cấp nhất lưu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや。その梅粥は僕だ。\n粥ならば、幼いころからよく作っていたのでな」
1248 = "「Không. Bát cháo mơ đó là do tôi nấu đấy.\nNếu là cháo thì từ nhỏ tôi đã thường xuyên tự nấu rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　そうなんですか――\nこれ、双鉄くんの、お手製」
1322 = "「Hả!? Vậy sao——\nĐây là do anh Soutetsu đích thân nấu à.」"
# 【双鉄】
# display as 雙鐵
# JP: 「粥ぐらいでお手製もおおげさだろう」
1309 = "「Chỉ là nấu cháo thôi mà, dùng từ đích thân nấu nghe to tát quá.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえいえ、あのっ」
1464 = "「Không không, cái đó——」"
# monologue
# JP: あの――の続きが聞こえてこない。
1948 = "Tôi không nghe thấy vế sau của từ \"cái đó\" nữa."
# monologue
# JP: ただ、うふふと嬉しげな息が漏れ、\nそうして口が、さっきより大きく開かれる。
1898 = "Chỉ có tiếng cười khúc khích vui vẻ vang lên,\nvà rồi miệng cô ấy há to hơn lúc nãy."
# 【ポーレット】
# display as 波萊特
# JP: 「もう一口！　――『あーん』」
1289 = "「Thêm một miếng nữa! ——『A~』」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、『あーん』」
1371 = "「Ừm, 『A~』」"
# monologue
# JP: （ぽあくっ！）
2338 = "（Ngoạm!）"
# monologue
# JP: [さじ]匙ごと、どころか、指先までをも飲まんばかりの勢いだ。
1939 = "Khí thế của cô ấy như thể muốn nuốt chửng cả chiếc thìa, à không, cả đầu ngón tay của tôi vậy."
# monologue
# JP: ポーレットの頬の赤みが増して、\n表情は、さらににこにこ笑み崩れていく。
2130 = "Đôi gò má Paulette càng thêm ửng hồng,\nnụ cười trên môi cô ấy càng thêm rạng rỡ."
# monologue
# JP: （こ……これは――照れくさいという言葉では足りん）
2382 = "（Cái... cái này——chỉ dùng từ xấu hổ thôi thì chưa đủ để diễn tả）"
# monologue
# JP: 言葉がきわめて乏しいゆえに、相手をじっくり見てしまう。\nそうしてじっくり見てしまうなら――
2030 = "Vì không tìm được từ ngữ thích hợp, tôi đành chăm chú nhìn đối phương.\nMà càng chăm chú nhìn thì——"
# monologue
# JP: （いやっ！？　そうか、会話か。\n無言がつまり、この照れくささを増やさせているのだ）
2328 = "（Không đúng!? Phải rồi, là trò chuyện.\nChính sự im lặng mới làm tăng thêm sự xấu hổ này）"
# 【双鉄】
# display as 雙鐵
# JP: 「う、む――舌にあったようでなによりだ」
1314 = "「Ư-ừm——Hợp khẩu vị của cô là tốt rồi.」"
# monologue
# JP: だからともかく思い浮かんだことを話せば、\nポーレットは大きく頷き、きらきらした目で僕を見上げる。
2092 = "Vì thế, tôi liền nói ra những gì vừa nảy ra trong đầu,\nPaulette gật đầu mạnh, ngước nhìn tôi bằng đôi mắt lấp lánh."
# 【ポーレット】
# display as 波萊特
# JP: 「舌に合う、です。ほんと、これ！\nお味の方ももちろんですけど――『あ～ん』」
1550 = "「Rất hợp khẩu vị luôn ấy! Thật sự!\nHương vị thì tất nhiên là khỏi bàn rồi——『A~』」"
# 【双鉄】
# display as 雙鐵
# JP: 「『あーん』」
1016 = "「『A~』」"
# monologue
# JP: ぱくり、もぐむぎゅ。
1936 = "Ngoạm, nhai nhóp nhép."
# monologue
# JP: よりよく味わうためなのか、\nポーレットはつかの間、瞳を閉じる。
2062 = "Có lẽ để thưởng thức kỹ hơn,\nPaulette khẽ nhắm mắt lại trong giây lát."
# 【ポーレット】
# display as 波萊特
# JP: 「うん！　舌触りも。ほんと、絶妙の火加減ですね、これ。\nべしゃっとしないで、でも舌先ですぐにとろけて」
1367 = "「Ưm! Cả cảm giác trên đầu lưỡi nữa. Lửa canh thật sự quá tuyệt vời.\nHạt gạo không bị nhão nhoét, nhưng lại tan chảy ngay trên đầu lưỡi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、だが――」
1593 = "「Vậy sao, nhưng mà——」"
# monologue
# JP: やはり、会話だ。
1978 = "Quả nhiên, mấu chốt là trò chuyện."
# monologue
# JP: 言葉を交わせば交わすほど、\nあの照れくささは薄れてくれる。
2277 = "Càng nói chuyện với nhau nhiều,\ncảm giác xấu hổ đó càng nhạt dần."
# 【双鉄】
# display as 雙鐵
# JP: 「――時間をおけばどんどんべしゃっとしてしまう。\n無理なく食べられるようなら」
998 = "「——Nếu để lâu thì cháo sẽ càng lúc càng nhão đấy.\nNếu cô vẫn còn ăn được thì...」"
# 【ポーレット】
# display as 波萊特
# JP: 「無理なんて！　食べたらもっと、\nわたし、お腹すいちゃいました。『あ～んっ』」
1431 = "「Sao lại không được chứ! Càng ăn,\ntôi lại càng thấy đói hơn ấy. 『A~』」"
# 【双鉄】
# display as 雙鐵
# JP: 「『あーん』」
# 1016 = "「“啊～”」" 
# monologue
# JP: 会話と匙とを、かわるがわるに。\nぱくぱくと、というよりむしろ、すいすいと。
1831 = "Một câu nói, một thìa cháo——cứ thế luân phiên.\nThay vì nói là ăn ngấu nghiến, thì phải nói là trôi tuột vào bụng."
# monologue
# JP: スポンジが水を吸うがごとくに、\nポーレットはおかゆを平らげていく。
1979 = "Giống như miếng bọt biển hút nước,\nPaulette nhanh chóng xử lý sạch bát cháo."
# 【ポーレット】
# display as 波萊特
# JP: 「ふぁ……あー――満腹です。\nほんっと、おいしかったぁ――御馳走さまでした」
1319 = "「Phù……A——No quá đi mất.\nThật sự rất ngon luôn——Cảm ơn vì bữa ăn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お粗末さま」
1467 = "「Không có gì đâu.」"
# monologue
# JP: すっかり冷めてしまっているが、白湯はどうかと勧めれば、\nポーレットはそれもまた旨そうに、ごくごく飲み干す。
2019 = "Tôi hỏi cô ấy có muốn uống nốt cốc nước lọc đã nguội ngắt kia không,\nPaulette cũng ngon lành uống cạn một hơi."
# monologue
# JP: そしてほおっと、満足気な息を吐き、\nゆったり大きな伸びをする。
2276 = "Sau đó cô ấy khẽ thở ra một hơi đầy mãn nguyện,\nvà chậm rãi vươn vai một cái thật dài."
# 【ポーレット】
# display as 波萊特
# JP: 「お腹の中までぽかぽかしてて……\nちょっと、汗かいちゃいました、わたし」
1597 = "「Ấm áp đến tận trong bụng luôn……\nTôi hơi toát mồ hôi rồi này.」"
# monologue
# JP: 伸びた背中が、少しまるまる。\n青い瞳が、うわめづかいに僕を見る。
1865 = "Cái lưng vừa vươn thẳng lại hơi cuộn tròn lại.\nĐôi mắt xanh biếc ngước lên nhìn tôi đầy e thẹn."
# 【ポーレット】
# display as 波萊特
# JP: 「甘えついでに……\n背中、拭いてもらっちゃっても――いいです、か？」
1473 = "「Nhân tiện đang làm nũng……\nAnh lau lưng giúp tôi luôn——được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……それはもちろん構わんが。\n真闇姉はまだ仕事中だし」
1342 = "「À……Cái đó thì tất nhiên là không sao rồi.\nChị Mayami vẫn đang làm việc nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「……拭いてもらうだけですから、平気です」
1034 = "「……Chỉ là lau lưng thôi mà, không sao đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1634 = "「！」" 
# monologue
# JP: ぷちぷちと、\nポーレットの指がボタンを外していく。
2126 = "Lách tách,\nnhững ngón tay của Paulette tháo từng chiếc cúc áo."
# monologue
# JP: 肌掛けで胸の前を隠して――\nむきだしになった背中の全部が、僕の眼前に現れる。
1951 = "Cô ấy dùng chăn che trước ngực——\nĐể lộ toàn bộ tấm lưng trần hiện ra ngay trước mắt tôi."
# monologue
# JP: （白い……な、白磁のような――\nシミひとつないとは、このことか）
2378 = "（Trắng quá……giống như sứ trắng vậy——\nKhông một tì vết, chính là để chỉ điều này sao.）"
# monologue
# JP: 風呂でも見ているはずの背中を、\n初めて見るように感じている。
2279 = "Tấm lưng mà tôi đáng lẽ đã nhìn thấy ở nhà tắm,\nnhưng giờ lại mang đến cảm giác như mới nhìn thấy lần đầu."
# monologue
# JP: これほどまでに綺麗なものとは、\n全く思っていなかった。
1972 = "Tôi hoàn toàn không ngờ,\nnó lại đẹp đến nhường này."
# 【ポーレット】
# display as 波萊特
# JP: 「あの……体、冷えちゃったらまた」
1613 = "「Cái đó……nếu để cơ thể bị lạnh thì lại——」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、ああ――そうだな」
1351 = "「A, à——Đúng vậy nhỉ.」"
# monologue
# JP: 急ぎ手ぬぐいと洗面器とを用意して、\n自分の部屋へと舞い戻る。
2052 = "Tôi vội vàng chuẩn bị khăn tay và chậu rửa mặt,\nrồi quay trở lại phòng mình."
# monologue
# JP: 途中、誰かに会わぬかと少し期待をしたのだが、\nどうにもやはり、今は僕しかいないみたいだ。
1922 = "Trên đường đi, tôi đã hơi mong đợi sẽ gặp ai đó,\nnhưng xem ra hiện tại trong nhà thực sự chỉ có mình tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「では、拭くぞ」
1619 = "「Vậy tôi lau nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、はいっ、お願いします」
1397 = "「V-Vâng, nhờ anh ạ.」"
# monologue
# JP: 甘えは、心細さのあらわれ。\n会話をしていれば、照れは引く。
2084 = "Làm nũng là biểu hiện của sự bất an.\nChỉ cần trò chuyện, sự xấu hổ sẽ giảm bớt."
# monologue
# JP: さきほど学んだ二つの知恵を、\n今は早速、活用すべき時だろう。
2249 = "Hai bài học vừa rút ra lúc nãy,\ngiờ chính là lúc để áp dụng ngay lập tức."
# monologue
# JP: （ちゃぷっ）
2347 = "（Rào rào）"
# 【双鉄】
# display as 雙鐵
# JP: 「で、だ。今日は、ポーレットには念のため、\n検査を受けにいってほしい」
1416 = "「Và, chuyện là thế này. Hôm nay, để chắc chắn,\ntôi muốn Paulette đi kiểm tra sức khỏe.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ん……あ――はい。\nそう、しなくちゃ――ん――だめ、ですよね――んっ！」
1360 = "「Ưm……A——Vâng.\nĐúng là, cần phải——ưm——đi kiểm tra, nhỉ——ưm!」"
# monologue
# JP: 真っ白な背中に浮いてる汗をふくたび、\nポーレットが抑えた声を出す。
2103 = "Mỗi khi tôi lau đi những giọt mồ hôi đọng trên tấm lưng trắng ngần,\nPaulette lại khẽ phát ra những tiếng rên rỉ kìm nén."
# 【双鉄】
# display as 雙鐵
# JP: 「くすぐったいのか？　なら、少し強めるが」
1424 = "「Bị nhột à? Vậy tôi sẽ lau mạnh tay hơn một chút nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね――少し、強めでお願いします」
1481 = "「Đúng vậy——Anh làm mạnh tay hơn một chút giúp tôi nhé.」"
# monologue
# JP: （ぐいっ！）
2362 = "（Miết!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んんっ！」
1365 = "「Ưm ưm!」"
# monologue
# JP: ああ――\nというか、これはコリだ。
2231 = "À——\nNói đúng hơn thì, đây là bị căng cơ."
# monologue
# JP: ポーレットの肌の柔らかさの中、\n肩、腰、背中に、塊のようなコリがある。
2129 = "Bên dưới làn da mềm mại của Paulette,\nở vai, eo, và lưng đều có những chỗ cơ bị căng cứng lại thành cục."
# 【双鉄】
# display as 雙鐵
# JP: 「少し、押すか？」
1572 = "「Tôi ấn một chút nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、はい、もう少し、強めだと――んくぁっ！」
1399 = "「V-Vâng, nếu mạnh hơn một chút thì——ưm a!」"
# monologue
# JP: 過労の二文字を固めたようなコリを、\n[ふ]拭き[ぬぐ]拭いながら揉み潰す。
2012 = "Tôi vừa lau vừa nắn bóp những chỗ căng cứng\nnhư thể minh chứng rõ ràng cho hai chữ \"quá sức\"."
# monologue
# JP: （ぐっ！　ぐっ！　ぐいっ！　ぐりっ！）
2361 = "（Ấn! Ấn! Miết! Day!）"
# 【ポーレット】
# display as 波萊特
# JP: 「効くっ！　くっ！　んふっ！　んあっ！！」
1408 = "「Đã quá! Ư! Ưm! Á!!」"
# monologue
# JP: ポーレットは心地よさげで、そのあまり息も絶え絶えで。\n何故か沸き起こる達成感が、僕の気持ちの余裕に変わる。
2176 = "Paulette trông có vẻ rất thoải mái, đến mức thở hổn hển.\nCảm giác thành tựu không biết từ đâu trào dâng, khiến tâm trạng tôi trở nên thư thái hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「それでだ、ポーレット」
1415 = "「Nói tiếp chuyện lúc nãy, Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「は……ひ？　なんです、か？」
1337 = "「Hả……Vâng? Chuyện gì, vậy anh?」"
# 【双鉄】
# display as 雙鐵
# JP: 「現状、どう考えてもポーレットの負担が大きすぎる。\nが、今までそれを、上手く分散できてなかった」
1425 = "「Tình hình hiện tại, dù nghĩ thế nào thì gánh nặng của Paulette cũng quá lớn.\nNhưng cho đến nay, chúng ta vẫn chưa thể san sẻ nó một cách hợp lý.」"
# monologue
# JP: ――切り出しづらいことではある。\nが、誰かがどこかで、はっきり言わねばならないことだ。
939 = "――Đây quả thực là chuyện khó mở lời.\nNhưng, ai đó cần phải nói rõ ràng chuyện này vào một lúc nào đó."
# 【双鉄】
# display as 雙鐵
# JP: 「負荷を分散させなければ、\n今回のような事態は、おそらくなんども繰り返される」
1410 = "「Nếu không san sẻ gánh nặng,\nnhững tình huống như lần này, e là sẽ còn lặp lại nhiều lần.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ……\nはい。――そう、ですね」
1338 = "「A……\nVâng. ——Đúng là, như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこでなのだが――」
1458 = "「Vì vậy nên tôi đang nghĩ——」"
# monologue
# JP: 政治面を支えるだけでは、まだ足りぬ。
1879 = "Chỉ hỗ trợ về mặt chính trị thôi thì vẫn chưa đủ."
# monologue
# JP: 全方面でひとつひとつ、代替できるポーレットの負荷を、\n誰かと分け合う必要がある。
2000 = "Cần phải chia sẻ từng chút một gánh nặng của Paulette trên mọi phương diện\nvới một ai đó có thể thay thế cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lキハ07;#00ffc040;キハ07%l;#;の乗務を僕にも、担当させてはくれまいか？」
1565 = "「Liệu cô có thể để tôi phụ trách việc vận hành \x%lキハ07;#00ffc040;KiHa 07%l;# được không?」"
# monologue
# JP: （ぷぁんっ！）
2345 = "（Poooong!）"
# 【ポーレット】
# display as 波萊特
# JP: 「\x%lタイフォン;#00ffc040;タイフォン%l;#;も良し。うん。\nこれで、ひととおりの説明はできたと思います」
981 = "「\x%lタイフォン;#00ffc040;Còi hơi%l;# cũng tốt. Ừm.\nĐến đây là tôi đã hướng dẫn xong những điều cơ bản rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「はい、ポーレット。\n説明のしわすれは、いっこもなしですぅ」
1493 = "「Vâng, chị Paulette.\nChị không quên giải thích bất cứ điều gì đâu ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
# 984 = "「——」" 
# monologue
# JP: 新しいことの学習中だ。
2036 = "Tôi đang học hỏi những điều mới mẻ."
# monologue
# JP: 最大限に集中せねばと思うのだが、\n安定走行に入ってしまえば、背後の座席が気にかかる。
2281 = "Dù biết là phải tập trung cao độ,\nnhưng khi tàu đã vào trạng thái chạy ổn định, tôi lại bận tâm đến chỗ ngồi phía sau."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、体にどこか」
1522 = "「Paulette, cơ thể cô có chỗ nào...」"
# 【ポーレット】
# display as 波萊特
# JP: 「前方注視。気を散らさない」
1523 = "「Chú ý phía trước. Đừng phân tâm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1364 = "「Ừm.」"
# monologue
# JP: 声が張ってる。\n甘えた響きはまるで残らず、あるのは指導の厳しさのみだ。
1946 = "Giọng nói đanh thép.\nChẳng còn chút âm hưởng làm nũng nào, chỉ có sự nghiêm khắc của một người hướng dẫn."
# monologue
# JP: プロフェッショナルの\x%l運転士;#00ffc040;運転士%l;#;が持つ張った空気が、\n背中ごし、緩むなと僕を叱咤してくる。
1998 = "Bầu không khí căng thẳng của một \x%l運転士;#00ffc040;nhân viên cơ vụ%l;# chuyên nghiệp\ntừ phía sau lưng đang quát mắng tôi không được lơ là."
# 【ポーレット】
# display as 波萊特
# JP: 「……この方法が最善です。\nそれは、双鉄くんも納得したことです」
1049 = "「……Cách này là tốt nhất.\nĐó là điều mà anh Soutetsu cũng đã đồng ý rồi mà.」"
# monologue
# JP: 問いかけではなく断言で、\n僕の心のモヤモヤを、ポーレットは消そうとしてくれる。
2127 = "Bằng một lời khẳng định chứ không phải câu hỏi,\nPaulette đang cố gắng xua tan đi những vướng bận trong lòng tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「念のため、より精密な検査を受ける必要がある。\nだからわたしは、[ゆのい,1]湯医の温泉病院に行く」
1524 = "「Để cho chắc chắn, tôi cần phải được kiểm tra kỹ lưỡng hơn.\nVì vậy tôi sẽ đến bệnh viện suối nước nóng ở Yunoi.」"
# 【れいな】
# display as 玲奈
# JP: 「信号、進行！」
1275 = "「Tín hiệu, cho phép tiến!」"
# 【双鉄】
# display as 雙鐵
# JP: 「進行！　良し！」
1299 = "「Cho phép tiến! Tốt!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ふふっ」
1380 = "「Fufu.」"
# monologue
# JP: 満足そうな声が聴こえる。
2048 = "Tôi nghe thấy một giọng nói đầy mãn nguyện."
# monologue
# JP: おそらくは僕が間違いなく、\n信号確認、指差し\x%l喚呼;#00ffc040;喚呼%l;#;をできたからだろう。
2008 = "Có lẽ là vì tôi đã thực hiện chính xác\nviệc xác nhận tín hiệu và \x%l喚呼;#00ffc040;chỉ tay hô xác nhận%l;#."
# 【ポーレット】
# display as 波萊特
# JP: 「かたや双鉄くんは、わたしの負担を減らすため、\n負担を分散するために、キハ[れいななえす,2]07sの運転操作を覚えたい」
1563 = "「Mặt khác, anh Soutetsu muốn học cách vận hành KiHa 07S\nđể giảm bớt và san sẻ gánh nặng cho tôi.」"
# monologue
# JP: そのとおりだ。
2105 = "Đúng là vậy."
# monologue
# JP: いやがるのでは――と懸念もしたが、\nポーレットは案外すんなり、僕に運転席を預けてくれた。
2017 = "Tôi đã lo lắng rằng cô ấy sẽ từ chối――\nnhưng không ngờ Paulette lại dễ dàng giao ghế lái cho tôi đến vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「だから、臨時\x%l列車;#00ffc040;列車%l;#;を仕立てて、\nお客様無しの練習走行とわたしの移送とを兼ねる」
1461 = "「Vì vậy, chúng ta mới thiết lập một \x%l列車;#00ffc040;chuyến tàu%l;# lâm thời,\nvừa kết hợp chạy tập luyện không có hành khách, vừa để đưa tôi đi luôn.」"
# monologue
# JP: 理屈の上では、確かにこれが、一番効率的な方法だろう。\n……ポーレットの過労に、精神面のものが無いなら。
1997 = "Về mặt lý thuyết, đây chắc chắn là phương pháp hiệu quả nhất.\n……Miễn là sự kiệt sức của Paulette không xuất phát từ yếu tố tinh thần."
# monologue
# JP: だから――僕としては出来ることなら、空路を使い、\n大回りしてでも、ナビとの移動をして欲しかった。
2064 = "Vì thế――nếu có thể, tôi muốn dùng đường hàng không,\ndù có phải đi đường vòng xa hơn, để Navi đưa cô ấy đi."
# monologue
# JP: （が――）
2331 = "（Nhưng——）"
# monologue
# JP: 稀咲にもらった警告が、そうすることを許さない。
1878 = "Lời cảnh báo từ Kisaki không cho phép tôi làm điều đó."
# monologue
# JP: マイントレジャー計画の承認と河川敷利用許可と――\n今会期中に取得できねば、宝生元忠に先手を打たれる。
2207 = "Việc phê duyệt Kế hoạch Mine Treasure và giấy phép sử dụng bãi bồi ven sông——\nNếu không thể lấy được trong kỳ họp này, Houshou Mototada sẽ đi trước một bước."
# monologue
# JP: （猶予時間はほとんど無い。事態がここに至った以上、\n訓練をスムーズに終わらせることこそ、最善なのだ）
2357 = "（Thời gian không còn nhiều. Một khi sự việc đã đến nước này,\nthì việc hoàn thành khóa huấn luyện một cách suôn sẻ mới là điều tốt nhất.）"
# monologue
# JP: ならば、集中して行う他無い。\n見事にこなして、安心してポーレットに休んでもらいたい。
2269 = "Nếu vậy, không còn cách nào khác ngoài việc tập trung cao độ.\nTôi muốn hoàn thành xuất sắc để Paulette có thể yên tâm nghỉ ngơi."
# monologue
# JP: そうと思えば、もやもやしていた悩みは薄れ、\n集中力のギアを一段、更に上へとあげられる。
2251 = "Nghĩ vậy, những nỗi phiền muộn trong lòng tôi dần tan biến,\nvà tôi có thể nâng sự tập trung của mình lên một mức cao hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「[たらぎ,1]鱈木廃駅通過――良しっ！」
1596 = "「Đi qua ga cũ Taragi——Tốt!」"
# monologue
# JP: 良し――の、はずだ。\n自分自身の指差\x%l喚呼;#00ffc040;喚呼%l;#;に、けれど違和感を覚えてしまう。
2006 = "Đáng lẽ——là tốt.\nNhưng tôi lại cảm thấy có gì đó sai sai với lời \x%l喚呼;#00ffc040;chỉ tay hô xác nhận%l;# của chính mình."
# monologue
# JP: 事前に決めた通過時刻に遅延も早着もしていない。\n廃駅名の間違いなどもしてないし――いやっ！
2202 = "Tàu đi qua không sớm cũng không muộn so với thời gian đã định.\nTên ga cũ cũng không đọc sai——Không!"
# 【双鉄】
# display as 雙鐵
# JP: 「れいな？」
1537 = "「Reina?」"
# 【れいな】
# display as 玲奈
# JP: 「……すぅ～……すやぁ～～っ」
1036 = "「……Suuu~……Suyaaa~~」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1635 = "「!!!」"
# monologue
# JP: 何の予兆も感じなかった。\n一瞬前まで起きていて、次の瞬間寝落ちしている。
2104 = "Tôi không hề cảm thấy có điềm báo nào.\nChỉ một giây trước con bé còn thức, giây tiếp theo đã ngủ thiếp đi."
# monologue
# JP: 湯医駅着にはまだ間がある。時間的には猶予があるのに、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;不在の恐怖は、心臓をぎゅっと鷲掴んでくる。
2287 = "Vẫn còn một khoảng cách nữa mới đến ga Yunoi. Dù thời gian vẫn còn dư dả,\nnhưng nỗi sợ hãi khi thiếu vắng \x%lレイルロオド;#00ffc040;Railord%l;# như đang bóp nghẹt lấy trái tim tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「――――ぁっ」
983 = "「――――A」"
# monologue
# JP: “ポーレット”と出かけた声を、喉の奥へと押し返す。\nれいなの異変に、気づいていないわけがない。
2015 = "Tôi nuốt ngược tiếng gọi \"Paulette\" đang chực trào ra khỏi cổ họng.\nKhông thể nào cô ấy lại không nhận ra sự bất thường của Reina."
# monologue
# JP: 指示が無いのは、信頼されているということだ。\n余計な負担を、ポーレットへとかけたくもない。
1931 = "Việc cô ấy không đưa ra chỉ thị nào, nghĩa là cô ấy đang tin tưởng tôi.\nTôi cũng không muốn tạo thêm gánh nặng cho Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「――信号、進行、良しっ！」
993 = "「——Tín hiệu, cho phép tiến, tốt!」"
# monologue
# JP: 発駅、着駅、通過廃駅それぞれの\n予定時刻が一覧にまとめてある表――
1976 = "Bảng tổng hợp danh sách thời gian dự kiến\ncho từng ga khởi hành, ga đến, và ga cũ đi qua——"
# monologue
# JP: “\x%lスタフ;#00ffc040;スタフ%l;#;”に目をやり、\n各駅の通過時刻と、湯医駅への着時刻とを確かめる。
2044 = "Tôi đưa mắt nhìn vào “\x%lスタフ;#00ffc040;Bảng lộ trình chuyến đi%l;#”,\nkiểm tra thời gian đi qua các ga và thời gian đến ga Yunoi."
# monologue
# JP: （あと二駅の通過は、\n問題ない、僕ひとりでも十分こなせる）
2358 = "（Việc đi qua hai ga nữa,\nkhông có vấn đề gì, một mình tôi cũng có thể xoay xở được.）"
# monologue
# JP: 湯医駅の直前にある、新[つるは,1]弦羽廃駅。
1916 = "Ga cũ Shin-Tsuruha nằm ngay trước ga Yunoi."
# monologue
# JP: そのホーム端を通過してから湯医駅着まで、\n\x%l8620;#00ffc040;8620%l;#;であればおおよそ、140秒だ。
2297 = "Từ lúc đi qua mép sân ga đó cho đến khi đến ga Yunoi,\nnếu là \x%l8620;#00ffc040;8620%l;# thì mất khoảng 140 giây."
# monologue
# JP: （新[つるは,1]弦葉廃駅ホーム端。そこを判断基準としよう。\nそれまでに起きてくれれば、それでよし――）
2356 = "（Mép sân ga cũ Shin-Tsuruha. Hãy lấy đó làm tiêu chuẩn phán đoán.\nNếu con bé tỉnh dậy trước lúc đó thì tốt——）"
# monologue
# JP: ダメならば、即時\x%lブレーキ;#00ffc040;ブレーキ%l;#;で安全停止。\nそのままれいなの復帰を待つのが、最善だろう。
1964 = "Nếu không được, lập tức dùng \x%lブレーキ;#00ffc040;phanh%l;# để dừng an toàn.\nSau đó chờ Reina phục hồi là cách tốt nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「――[ひがしたらぎ,2]東鱈木廃駅、通過」
999 = "「——Đi qua ga cũ Higashi-Taragi.」"
# monologue
# JP: ここをすぎれば、すぐに準備の必要がある。
2253 = "Đi qua đây xong, tôi cần phải chuẩn bị ngay lập tức."
# monologue
# JP: パニックを起こさぬように、いちいち呼称し、\n確認しながら、\x%lブレーキ;#00ffc040;ブレーキ%l;#;に圧を与えて速度を落とす。
2143 = "Để không bị hoảng loạn, tôi gọi tên từng thao tác một,\nvừa xác nhận vừa tăng áp suất cho \x%lブレーキ;#00ffc040;phanh%l;# để giảm tốc độ."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！　――制限５０、良しっ！」
1633 = "「! ——Giới hạn 50, tốt!」"
# monologue
# JP: 良し、ではあるが、際どかった。\nぎりぎり速度５０キロだ。
2285 = "Tốt thì tốt thật, nhưng khá nguy hiểm.\nTốc độ sát nút 50km/h."
# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;は、\x%l8620;#00ffc040;8620%l;#;よりも遥かに軽い、\nそれを危うく、失念しそうになっていた。
65 = "\x%lキハ07;#00ffc040;KiHa 07%l;# nhẹ hơn \x%l8620;#00ffc040;8620%l;# rất nhiều,\ntôi suýt chút nữa đã quên mất điều đó."
# monologue
# JP: （冷静になれ、冷静に。\n余計なことに気をとられるな）
2336 = "（Bình tĩnh nào, bình tĩnh lại.\nĐừng để những chuyện không đâu làm phân tâm.）"
# 【れいな】
# display as 玲奈
# JP: 「ふくー……すやぁ……」
1317 = "「Fukuu……Suyaaa……」"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
# 984 = "「——」" 
# monologue
# JP: 思っても、やはり気になってしまう。\n不安がむくむく、心の中で広がっていく。
1885 = "Dù nghĩ vậy, nhưng quả nhiên tôi vẫn không thể không bận tâm.\nSự bất an đang dần lớn lên và lan rộng trong tâm trí tôi."
# monologue
# JP: これは……熟睡なのではないのか。\n六時間とか八時間、寝入ってしまうものではないのか。
1930 = "Thế này……chẳng phải là ngủ say sao.\nLiệu con bé có ngủ liền tù tì sáu hay tám tiếng không đây."
# 【双鉄】
# display as 雙鐵
# JP: 「れいな。起きろ、れいな」
1532 = "「Reina. Dậy đi, Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「すぅ……すやぁ……すぅ」
1318 = "「Suuu……Suyaaa……Suuu」"
# monologue
# JP: 営業運転の訓練だ。\nお客さんがいると想定せねば、意味が薄れる。
2250 = "Đây là khóa huấn luyện vận hành thương mại.\nNếu không giả định là có hành khách thì sẽ mất đi ý nghĩa."
# monologue
# JP: なら、大きな声はかけられないし、\n手を使い揺するわけにもいかない――
2095 = "Nếu vậy, tôi không thể gọi to,\ncũng không thể dùng tay lay con bé dậy được——"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1634 = "「！」" 
# monologue
# JP: 新弦羽廃駅、そのホーム端が見えてくる。\nこれは、覚悟をした方がいい。
2090 = "Mép sân ga cũ Shin-Tsuruha đã hiện ra trong tầm mắt.\nTốt nhất là tôi nên chuẩn bị tinh thần."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;には無いクラッチペダルに足を乗せ――
2022 = "Tôi đặt chân lên bàn đạp ly hợp mà \x%l8620;#00ffc040;8620%l;# không có——"
# 【れいな】
# display as 玲奈
# JP: 「ふあっ！　あ！　ごめんなさいっ！！」
1354 = "「Oa! A! Reina xin lỗi ạ!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいな！　やれるか？」
1535 = "「Reina! Em làm được không?」"
# 【れいな】
# display as 玲奈
# JP: 「げっ、現状確認――大丈夫です！\nそうてつさん、れいな、[ゆのい,1]湯医駅停車の指示を出します」
1556 = "「X-Xác nhận tình trạng hiện tại——Ổn rồi ạ!\nAnh Soutetsu, Reina xin đưa ra chỉ thị dừng ở ga Yunoi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　確認のため、一度通しで、口頭で頼む」
1369 = "「Ừm! Để xác nhận, em hãy đọc to toàn bộ một lượt đi.」"
# 【れいな】
# display as 玲奈
# JP: 「はいです！\nクラッチカット、\x%lブレーキ;#00ffc040;ブレーキ%l;#;開始は、もうすぐです」
1406 = "「Vâng ạ!\nNgắt ly hợp, chuẩn bị bắt đầu \x%lブレーキ;#00ffc040;hãm phanh%l;# ạ.」"
# monologue
# JP: ――ギアを中立に入れてしまえば、\nそこから先の\x%lブレーキ;#00ffc040;ブレーキ%l;#;操作は、\x%l8620;#00ffc040;8620%l;#;のときと大差無い。
934 = "――Chỉ cần cài số về 0,\nthao tác \x%lブレーキ;#00ffc040;phanh%l;# sau đó không khác gì so với khi điều khiển \x%l8620;#00ffc040;8620%l;#."
# monologue
# JP: れいなの指示に従って、\x%l常用;#00ffc040;常用%l;\x%lブレーキ;#;#00ffc040;ブレーキ%l;#;で減速していく。\nここまでくれば、万一れいなが寝落ちても――
2032 = "Theo chỉ thị của Reina, tôi dùng \x%l常用;#00ffc040;phanh%l;\x%lブレーキ;#;#00ffc040;thường%l;# để giảm tốc độ.\nĐến nước này rồi, nhỡ Reina có ngủ gật lại thì——"
# 【れいな】
# display as 玲奈＆雙鐵
# JP: 「制限２５、よしっ！」\n「制限２５、良しっ！」
1627 = "「Giới hạn 25, tốt!」\n「Giới hạn 25, tốt!」"
# monologue
# JP: \x%l常用;#00ffc040;常用%l;#;、重なり、緩め・込め――\n段階緩めで、速度と同時に\x%l制動;#00ffc040;制動%l;#;力をも緩めていく。
70 = "\x%l常用;#00ffc040;Phanh thường%l;#, duy trì, nhả phanh, nạp khí——\nNhả phanh từng nấc, giảm đồng thời cả tốc độ và lực \x%l制動;#00ffc040;hãm phanh%l;#."
# monologue
# JP: （きぃ――――ぃ――かとんっ）
2342 = "（Kiiiiiiii——cạch）"
# monologue
# JP: 衝撃をいくらか出してしまった。\nが、停止位置は――
2284 = "Tôi đã gây ra một chút chấn động.\nNhưng, vị trí dừng là——"
# 【れいな】
# display as 玲奈
# JP: 「停止位置、よし！　到着・定時！」
1281 = "「Vị trí dừng, tốt! Đến nơi, đúng giờ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――停止位置、良し。到着、定時」
994 = "「——Vị trí dừng, tốt. Đến nơi, đúng giờ.」"
# monologue
# JP: よかった。きちんと止められた。\n\x%l手ブレーキ;#00ffc040;手ブレーキ%l;#;をかけ、動き出さないようにして――
1925 = "Tốt quá. Tôi đã dừng tàu đúng cách.\nKéo \x%l手ブレーキ;#00ffc040;phanh tay%l;# để tàu không bị trôi đi——"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
1315 = "「Hự!」"
# monologue
# JP: ――途端、どうっと、全身から汗が吹き出してくる。
940 = "——Ngay lập tức, mồ hôi tuôn ra ướt sũng cả người."
# monologue
# JP: （これか――これもか――これもあるのか）
2369 = "（Là thế này sao——Cả thế này nữa sao——Còn có cả thế này nữa sao）"
# monologue
# JP: 運転中に、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が沈黙する。\nそれはまさしく、目と耳とを一気に失うに近い恐怖だ。
67 = "Trong lúc đang lái tàu, \x%lレイルロオド;#00ffc040;Railord%l;# đột nhiên im lặng.\nĐó thực sự là một nỗi kinh hoàng gần giống như việc đột ngột mất đi cả thị giác và thính giác vậy."
# monologue
# JP: （これを、常時――しかも、営業運転中に――なら）
2352 = "（Nếu chuyện này xảy ra thường xuyên——hơn nữa lại là trong lúc đang vận hành thương mại——thì）"
# monologue
# JP: ポーレットは、自分の舞台の上でまで、\nこれほどの重圧と緊張にさらされつづけ――
1982 = "Ngay cả trên chính sân khấu của mình, Paulette\nvẫn luôn phải chịu đựng áp lực và sự căng thẳng lớn đến nhường này——"
# monologue
# JP: その上、父の遺志を継ぎ、政治家として、\n身の丈以上の努力と結果を当然のように要求されて――
2196 = "Thêm vào đó, với tư cách là một chính trị gia kế thừa di nguyện của cha,\ncô ấy còn bị đòi hỏi phải nỗ lực và đạt được những kết quả vượt quá khả năng của bản thân như một lẽ đương nhiên——"
# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレット」
1047 = "「……Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「お見事でした、双鉄くん」
1394 = "「Tuyệt vời lắm, anh Soutetsu.」"
# monologue
# JP: “君は凄いな”――\n言うより早く、僕が称賛されてしまう。
1919 = "“Cô thật tuyệt vời”——\nChưa kịp nói ra câu đó, tôi đã được khen ngợi trước rồi."
# 【ポーレット】
# display as 波萊特
# JP: 「さすが、\x%l機関士;#00ffc040;機関士%l;#;さんは違いますね。\n冷静で、ポイントつかむのが上手いです」
1241 = "「Quả nhiên, \x%l機関士;#00ffc040;nhân viên cơ vụ%l;# có khác nhỉ.\nAnh rất bình tĩnh và nắm bắt trọng tâm rất tốt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁあ――」
1355 = "「A, à——」"
# monologue
# JP: “僕ほど経験の乏しい者が、\x%l機関士;#00ffc040;機関士%l;#;などとおこがましい”\n真っ先に頭に浮かぶ答えは、呑み込むしか無い。
959 = "“Một kẻ thiếu kinh nghiệm như tôi mà tự nhận là \x%l機関士;#00ffc040;nhân viên cơ vụ%l;# thì thật quá tự cao”\nTôi đành phải nuốt ngược câu trả lời nảy ra đầu tiên trong đầu mình xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「――そう思ってもらえたのなら、何よりだ」
991 = "「——Nếu cô nghĩ được như vậy thì tốt quá rồi.」"
# monologue
# JP: 弱音は、ポーレットの負担を増やす。\n謙遜でさえ、おそらく心配をふくらます。
2049 = "Nói ra những lời yếu đuối sẽ chỉ làm tăng thêm gánh nặng cho Paulette.\nThậm chí cả sự khiêm tốn cũng có thể khiến cô ấy thêm lo lắng."
# monologue
# JP: ならば僕は支えになるべく、\n堂々として、揺るがぬように在るのみだ。
2270 = "Nếu vậy, để trở thành chỗ dựa cho cô ấy,\ntôi chỉ có thể tỏ ra đĩnh đạc và không được dao động."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの方は大丈夫か？\n体に、異常などないか？」
1608 = "「Paulette có sao không?\nCơ thể có chỗ nào bất thường không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫です！　双鉄くんの運転がとっても快適だから、\n乗る前よりも、むしろ元気になれたかも」
1454 = "「Tôi không sao! Chuyến tàu anh Soutetsu lái rất thoải mái,\nkhéo khi tôi còn thấy khỏe hơn cả lúc trước khi lên tàu ấy chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 1592 = "「這樣啊——」" 
# monologue
# JP: 嘘を、ついてる。\nこういう風に、ポーレットは無理を重ねてく。
2124 = "Cô ấy đang nói dối.\nPaulette cứ luôn cố gắng gượng ép bản thân như thế này."
# monologue
# JP: れいなが倒れてしまった間、どれほど心を痛めたか、\n笑顔で僕から、隠そうとして――
1940 = "Trong lúc Reina ngất xỉu, cô ấy đã đau lòng đến nhường nào,\nvậy mà cô ấy lại dùng nụ cười để che giấu nó với tôi——"
# 【れいな】
# display as 玲奈
# JP: 「あのっ、そうてつさん」
1614 = "「Cái đó, anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！　れいなもありがとう。\n不慣れな僕を、よくナビゲートしてくれた」
1382 = "「Ồ! Cảm ơn em nhé, Reina.\nCảm ơn em đã chỉ dẫn tận tình cho một người còn nhiều bỡ ngỡ như anh.」"
# 【れいな】
# display as 玲奈
# JP: 「ひゃむっ！？」
1330 = "「Hyamu!?」"
# monologue
# JP: 頭を左手で撫でながら、右手の指で唇を押さえ、\nじっとその目を覗きこむ。
2025 = "Tôi vừa dùng tay trái xoa đầu con bé, vừa dùng ngón tay phải chặn lên môi,\nvà nhìn chằm chằm vào mắt nó."
# monologue
# JP: “れいなが僕に謝れば、ポーレットはそれを気に病む”と、\n耳もと、素早く囁きかける。
2148 = "Tôi nhanh chóng thì thầm vào tai con bé,\n“Nếu Reina xin lỗi anh, Paulette sẽ lại bận tâm về chuyện đó đấy”."
# 【れいな】
# display as 玲奈
# JP: 「はぅっ――あの、ええと――れいな、\nもっと上手にごいっしょできるよう、がんばります！」
1329 = "「Hau——Cái đó, ưm——Reina,\nsẽ cố gắng để có thể đồng hành cùng anh tốt hơn nữa ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな！」
1374 = "「Ừm, đúng vậy nhỉ!」"
# monologue
# JP: 素晴らしい。
2181 = "Tuyệt vời."
# monologue
# JP: れいなが懸命に考え出したのだろう言葉は、\n僕にも導きを与えてくれる。
2160 = "Những lời mà Reina đã cố gắng nghĩ ra,\ncũng mang đến cho tôi một định hướng."
# 【双鉄】
# display as 雙鐵
# JP: 「僕もそうする。ベストを尽くす。\nもっと上手になれるよう、もっと一緒にいられるように」
1445 = "「Anh cũng sẽ làm vậy. Anh sẽ cố gắng hết sức.\nĐể có thể giỏi hơn, để có thể ở bên mọi người nhiều hơn.」"
# monologue
# JP: ポーレットと、れいなと。\n御一夜鉄道の仲間達と。
2133 = "Cùng với Paulette, cùng với Reina.\nCùng với những người đồng đội ở Đường sắt Ohito."
# monologue
# JP: 僕らチームの全員が、そうして心をあわせられれば、\n個人個人にかかる負担を、全体できっと軽減できよう。
1900 = "Nếu tất cả các thành viên trong đội của chúng ta có thể đồng lòng như vậy,\nthì chắc chắn gánh nặng của mỗi cá nhân sẽ được giảm bớt bởi cả tập thể."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしも！　わたしもそうします！」
1447 = "「Tôi cũng vậy! Tôi cũng sẽ làm như vậy!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうしてくれ。\nそしてよりよく、一緒に未来へ進んでいこう」
1378 = "「Ừm, nhờ cô nhé.\nVà hãy cùng nhau tiến bước hướng tới một tương lai tốt đẹp hơn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――はいっ！！！」
1395 = "「V-Vâng!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「が、その前にだ――」
1256 = "「Nhưng, trước đó thì——」"
# monologue
# JP: （ひょいっ）
2348 = "（Thoăn thoắt）"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――」
# 1334 = "「啊——」" 
# monologue
# JP: 手を引き、肩を貸し、ポーレットの軽い体を\n一番前の席から立たせる。
2038 = "Tôi nắm lấy tay cô ấy, cho cô ấy mượn bờ vai,\nđỡ thân hình nhỏ nhắn của Paulette đứng lên từ hàng ghế đầu tiên."
# monologue
# JP: ホームへ降りる足取りは案外しっかりしているが――
2278 = "Bước chân của cô ấy khi bước xuống sân ga vững vàng hơn tôi nghĩ, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「ナビを回りこませている。\n温泉病院までは、空路で行こう」
1449 = "「Tôi đã cho Navi vòng qua đây rồi.\nChúng ta sẽ đi đường hàng không đến bệnh viện suối nước nóng nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、い……あの、双鉄くんは？」
1401 = "「V-Vâng……Cái đó, còn anh Soutetsu thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、付き添う。\n着水地点からはおそらく、徒歩で登ることになるしな」
1545 = "「Tất nhiên là tôi sẽ đi cùng rồi.\nTừ điểm hạ cánh trên mặt nước, có lẽ chúng ta sẽ phải đi bộ lên đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい！　わかりました！\nそれなら、よろしくお願いします」
1403 = "「Vâng! Tôi hiểu rồi!\nNếu vậy thì trăm sự nhờ anh.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなは、ポーレットとそうてつさんが帰ってくるまで、\n折り返しのための整備をしておきますねぇ」
1534 = "「Trong lúc đợi chị Paulette và anh Soutetsu quay lại,\nReina sẽ chuẩn bị sẵn sàng cho chuyến đi vòng về nhé~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、頼む」
1373 = "「Ừm, nhờ em nhé.」"
# monologue
# JP: ……ポーレットが診察を受けている間に、\n僕は電話で幾人かと話をしておこう。
972 = "……Trong lúc Paulette đang được khám,\ntôi sẽ gọi điện nói chuyện với vài người."
# monologue
# JP: 赤井宮司と、登呂流湯主人と、もうひとり――\nポーレットの過去をよく知る人に。
2078 = "Đại tư tế Akai, Chủ nhà tắm Tororyu-yu, và một người nữa――\nngười rất hiểu về quá khứ của Paulette."
# monologue
# JP: （ポーレットの問題も、れいなの問題も、\nどちらも、解消する必要がある）
2370 = "（Cả vấn đề của Paulette, lẫn vấn đề của Reina,\ncả hai đều cần phải được giải quyết.）"
# monologue
# JP: だからともかく出来る範囲で情報を集め、\n早く解決できそうな方から、着手していく。
2070 = "Vì vậy, tôi sẽ thu thập thông tin trong phạm vi có thể,\nvà bắt tay vào giải quyết từ vấn đề nào có vẻ giải quyết được sớm hơn."
# monologue
# JP: なんの根拠もない話だが――片方を解決できれば、\nもう片方の解決の端緒を掴めそうだと感じてもいる。
2282 = "Tuy không có căn cứ nào cả――nhưng tôi có cảm giác nếu giải quyết được một bên,\nthì sẽ nắm được manh mối để giải quyết bên còn lại."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫そうなら、行くぞ、ポーレット」
1471 = "「Nếu cô thấy ổn rồi thì chúng ta đi thôi, Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい！」
1491 = "「Vâng!」"
# monologue
# JP: ならば、進んでみるしかない。
2271 = "Nếu vậy, chỉ còn cách tiến bước mà thôi."
# monologue
# JP: ポーレットの手をそっと握って、\n湯医駅から、一歩を踏み出す。
2053 = "Tôi nhẹ nhàng nắm lấy tay Paulette,\nbước ra khỏi ga Yunoi."
