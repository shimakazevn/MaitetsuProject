1918 = "在她安心的神情之中，夾帶著些許落寞。" 

# monologue
# JP: それを目にすればじくじくと、罪悪感が疼いてしまう。
2047 = "我看著這樣的她，心中因罪惡感陣陣刺痛。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――だが、現実には。\n僕はまるきり、ポーレットの助けになれていなかった」
989 = "「——但是實際上，我完全沒能為波萊特分憂」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1333 = "「哎！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「医師の見立てでは過労だそうだ」
1622 = "「醫生說你是疲勞過度」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あー」
1334 = "「啊——」" 

# monologue
# JP: くたり――ポーレットの腕の力が一気に抜ける。\n握りしめてる手をゆるめれば、布団の上に音なく落ちる。
2128 = "波萊特的手臂突然沒了力氣。我稍稍鬆手，她的手便無聲地落到毛毯上。" 

# 【ポーレット】
# display as 波萊特
# JP: 「すみません。迷惑かけて――\n心配も、してもらっちゃいましたよね？」
1414 = "「對不起。給你添了麻煩——還害得你擔心了吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ。せぬわけがない」
1544 = "「當然。怎麼可能不擔心」" 

# monologue
# JP: 医師の見立ては尊重するが、\nどうにも単なる過労だけとは思えなかった。
2280 = "雖然我尊重醫生的診斷，但我怎麼都不覺得波萊特只是單純的疲勞過度。" 

# monologue
# JP: ゆえポーレットの普段の様子を、こと細やかに聞かせても、\n医師の見立ては変わらなかった。
2069 = "所以我將波萊特平日裡的情況詳細地告訴了醫生，但醫生並沒有改變他的看法。" 

# monologue
# JP: （過労による心身の抵抗力の著しい低下――か）
2374 = "（疲勞過度所引起的身體免疫力大幅下降——嗎）" 

# monologue
# JP: ……過去の傷は、影に似ている。
977 = "……過去的傷痕，如同人的影子。" 

# monologue
# JP: 調子よく歩いているときは気にもならぬが、\n疲れに足を止め俯けば、その漆黒に魅入られてしまう。
2169 = "當你健步如飛時，並不會在意它的存在。而當你因疲憊而駐足彎腰之時，便會被那片漆黑所迷惑。" 

# monologue
# JP: （僕も、同じだ）
2360 = "（我——也是一樣）" 

# monologue
# JP: だから、決して止まりたくない。\n常に動いて、働いて、ひたすら前を見続けていたい。
2072 = "所以，我絕不想停下腳步。我只想一直行走著、勞動著，一直注視著前方。" 

# monologue
# JP: （が――無限には歩き続けられない。\n過去と、傷と……いつかは、向き合わねばならん）
2330 = "（但是——我們無法一刻不停地走下去。總有一天……需要面對我們的過去和傷痕）" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄……くん？」
1629 = "「雙鐵……君？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うむ」
1349 = "「啊，嗯」" 

# monologue
# JP: しかし、弱り切っているポーレットに、\nいきなり過去の――おそらくは傷のことなど聞けない。
1872 = "但是，面對如此虛弱的波萊特，我無法突然直接開口詢問她的過去——揭開她可能存在的傷疤。" 

# monologue
# JP: “もっと早期に向き合ってれば”と、その反省は無論ある。\nが、僕の焦りで、ポーレットの傷を深める危険は冒せない。
2039 = "我當然也有反省自己為何沒有早點正視這個問題。但不能因為我的焦慮，讓波萊特承擔傷口惡化的風險。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今はともかく、疲れを癒やすことだ」
1538 = "「現在最重要的是好好休息」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です、よね――\n倒れちゃったんですもんね、わたし」
1480 = "「是啊——因為我剛才暈倒了呢」" 

# monologue
# JP: 自分の体に目を落とし、\nポーレットは少し、驚いたような顔をする。
2123 = "波萊特低頭看了看自己的身體，有些驚訝地說道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの……これ、着替え――」
1612 = "「那個……我怎麼換了衣服——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、真闇姉がやってくれた。\n今は蔵の仕事があるゆえ、看病を僕が引き継いだ」
1353 = "「啊，是真闇姐幫你換的。她現在要去酒窖工作，所以換我來照顧你」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうだったんですか――って、あ。仕事」
1495 = "「是這樣啊——對了，啊，工作——」" 

# monologue
# JP: 時計を見ようとしたのだろうか。
1944 = "她或許是想看時鐘吧。" 

# monologue
# JP: 起きようとする上体を、\n力をいれずに押さえ、とどめる。
2055 = "我輕輕阻止了她起身的動作。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。何も心配することはない」
1509 = "「沒事的。你什麼都不必擔心」" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど――」
1310 = "「可是——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのまま、本会議は終了になった。\n次回は、予定通りに明後日午後からの開催だ」
1265 = "「你暈倒之後，議會就直接結束了。下一場將按照原計劃在後天下午舉行」" 

# 【ポーレット】
# display as 波萊特
# JP: 「夕方の定時運行は？」
1284 = "「傍晚的準點班次運行呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「及ばずながら、僕が。\nハチロクと組み、キハ[レイナナ,1]07を\x%l客車;#00ffc040;客車%l;#;とさせてもらった」
1487 = "「是我和八六搭檔，用Ｋｉｈａ０７作\\x%l客車;#00ffc040;客運車廂%l;#;完成的班次。雖然我的技術遠不如你就是了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……ありがとうございます」
1344 = "「啊……非常感謝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――礼を言われるようなことではないさ」
1239 = "「不——這不是什麼值得道謝的事情」" 

# monologue
# JP: 本当に、だ。\n礼を言われる資格などある筈もない。
1842 = "一點都沒錯。我根本沒有資格接受她的道謝。" 

# monologue
# JP: （そもそも僕が――秘書としての仕事を、\n十分できていたのなら、過労に倒れさせずに済んでいた）
2379 = "（說到底——如果我有做好秘書的工作，她就不會因疲勞過度而暈倒）" 

# monologue
# JP: が、それを言葉に出してしまえば、ポーレットはかえって\n自らを責め立てるだろうから、今は沈黙するしか無い。
1866 = "但如果我說出這句話，波萊特反而會責怪自己。所以我現在只能保持沉默。" 

# monologue
# JP: （ならば、今からでも体制を作り出せねばならん）
2385 = "（那麼我現在必須儘快想出一套體制才行）" 

# monologue
# JP: ポーレットの負荷を極力減らし、それと同時に、\n誰の上にも過負荷が生じず、無理なくまわせる体制を。
1834 = "一套既能大大減輕波萊特的負擔，同時又不會給其他人造成過大負擔的的體制。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、今は回復に専念することだ。\n腹はすいてないか？　喉の渇きは？」
1561 = "「總之，你現在要安心修養。肚子餓不餓？　口渴嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
1335 = "「啊……」" 

# monologue
# JP: 体の様子をたしかめてるのか、\nポーレットがつかのま、目を閉じる。
2132 = "波萊特稍微閉了閉眼睛，或許是在確認身體的狀況。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……両方、欲しいみたいです。\nお水と、それと――おかゆか何かがもしあれば」
1029 = "「……似乎是又餓又渴。我想喝水，還有——如果有粥之類的東西」" 

# 【双鉄】
# display as 雙鐵
# JP: 「水より[さゆ,1]白湯だな。粥は、梅粥でいいか？」
1504 = "「比起冷水來開水會更好吧。粥的話——酸梅粥可以嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、ありがとうございます」
1375 = "「嗯，謝謝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「待っていろ、すぐ用意する」
1269 = "「你等等，我這就去準備」" 

# monologue
# JP: ……っと。
970 = "……哎呀。" 

# monologue
# JP: 真闇姉はまだ仕事中か。\n日々姫も出かけている様子だし――うむ。
2185 = "真闇姐還在工作嗎。日日姬好像也出門了——好吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「待たせたな。っと――\nいや、少し待て」
1575 = "「讓你久等了。呀——不對，再等會」" 

# monologue
# JP: ポーレットが慌てて体を起こそうとするのをなだめ、\nひとまず、お盆を脇へ置く。
2061 = "我阻止了急忙要起身的波萊特，將托盤先放到一邊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「倒れた身だぞ？　急に動くな。\nどこかを痛めているかもしれん」
1262 = "「你剛剛都暈倒過了哦，不要突然動起來。說不定有哪裡受著傷」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……そうかもですね」
1341 = "「啊……的確有可能呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「起こすぞ」
1451 = "「我扶你起來」" 

# monologue
# JP: それから少し伸びをして、首を、手足を動かして。\nポーレットは、ほっ、と安堵の息を吐く。
2125 = "波萊特小心地伸了個懶腰，試著活動了脖子和手腳，然後舒了一口氣。" 

# 【ポーレット】
# display as 波萊特
# JP: 「どこも、痛いところは無いみたいです。\nで、あの――」
1548 = "「看來並沒有傷到哪裡。所以，那個——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。飲む方か？　食べる方か？」
1362 = "「嗯。先要吃的還是喝的？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えと、お[さゆ,1]白湯、先にいただけますか？」
1611 = "「那個——我能先喝水嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1512 = "「沒問題」" 

# monologue
# JP: ポーレットの背中に手をあてて、\nその口元へとそっとコップをおしつける。
2013 = "我一隻手扶著波萊特的後背，一隻手將水杯送到她嘴邊。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ」
# 1346 = "「啊」" 

# monologue
# JP: 一瞬、小さな声を出し、それ以上は何も言う事なしに、\nポーレットは喉を鳴らし始める。
1943 = "她微微地發出一聲，卻沒有再說更多，開始一口口喝起水來。" 

# 【ポーレット】
# display as 波萊特
# JP: （んくっ――こくっ――んっ――こくんっ――）
2346 = "（嗯——咕——嗯——咕嘟——）" 

# 【双鉄】
# display as 雙鐵
# JP: 「あまり一気に飲み過ぎるなよ？」
1291 = "「別一口氣喝太多哦？」" 

# monologue
# JP: 過保護すぎるかと少し思うが、\nポーレットは心地よさそうだ。
2283 = "雖然有些擔心我是不是太小題大做了，但波萊特似乎覺得很舒坦。" 

# monologue
# JP: とんとんとん、と、叩くようにして背中をさすれば、\nほう、と満足そうなため息。
2054 = "我輕輕地拍了拍她的背，聽到她滿意地舒了一口氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「次は、粥だな。\n自分ひとりで食べられるか？」
1469 = "「接下來該吃粥了。自己能吃嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「んっ――と、どうでしょう？\nやっぱり、どこか痛むと怖いし」
1357 = "「嗯——我、我也說不好。還是有點害怕弄痛哪裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。安全策をとっておいたほうが無難だ」
1483 = "「是啊。小心駛得萬年船」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
1370 = "「嗯！」" 

# monologue
# JP: 嬉しげな声。\nポーレットはぴっと背筋を伸ばす。
2122 = "波萊特似乎很高興。她挺直了身子。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それじゃ――えと、お願い、します」
1618 = "「那麼——嗯……就拜託了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ――そら」
1356 = "「嗯——吃吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　あの、『そら』って、そんな……\nなんていうか――もう少し優しく」
1332 = "「哎！？　那個，怎麼只有一句“吃吧”……該怎麼說呢——能不能再溫柔一點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　れいなの甘えっ子がうつったか？」
1432 = "「怎麼？　玲奈愛撒嬌的性子傳染給你了嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ」
1328 = "「哈嗚——」" 

# monologue
# JP: からかうようなことを言ってしまって、\nいかん、とすぐに反省する。
2172 = "發現自己一不小心取笑了她，我馬上開始反省。" 

# monologue
# JP: 甘えは、つまりは弱気の表れ。\nポーレットは、倒れたばかりなのだから。
2085 = "撒嬌，也就是脆弱的表現。波萊特可是剛剛暈倒過。" 

# monologue
# JP: （妙に照れくさいと思ってしまったのがいけなかったか。\nこういうことは――うむ、普通にやればいいだけだ）
2387 = "（都是因為我自己覺得有些難為情。其實像這種事情——嗯，只要不去多想就行了）" 

# monologue
# JP: れいなにだったらどうふるまうか――\n考えればすぐ、最適と思われる解は見つかる。
1963 = "如果在我面前的是玲奈，我會怎麼做——這樣一想，我便很快找到了最佳答案。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――『あーん』か？」
1617 = "「那我是不是應該說——來張嘴，“啊～”？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「は、はい――えと――あ～んっ」
1497 = "「是，是的——那個——啊～」" 

# monologue
# JP: （ぱくっ）
2339 = "（吃下）" 

# monologue
# JP: いかん。これははなはだ照れくさい。\n照れるなというのが無理なレベルだ。
2193 = "糟糕，這樣真的是很難為情。讓人沒辦法不害羞。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ！　おいひい」
1324 = "「哇！　真好吃」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはよかった」
1615 = "「那就好」" 

# 【ポーレット】
# display as 波萊特
# JP: 「すごいですよね、真闇さん。\nなにをやっても一流で」
1553 = "「真闇小姐真是出色呀。不管做什麼都是一流的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや。その梅粥は僕だ。\n粥ならば、幼いころからよく作っていたのでな」
1248 = "「不，這酸梅粥是我做的。我從小就經常自己做粥」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　そうなんですか――\nこれ、双鉄くんの、お手製」
1322 = "「咦！？　是嗎——這是雙鐵君親自下廚做的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「粥ぐらいでお手製もおおげさだろう」
1309 = "「只是煮了一碗粥而已，也算不上下廚吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえいえ、あのっ」
1464 = "「才不是這樣呢，那個——」" 

# monologue
# JP: あの――の続きが聞こえてこない。
1948 = "她沒有接著說下去。" 

# monologue
# JP: ただ、うふふと嬉しげな息が漏れ、\nそうして口が、さっきより大きく開かれる。
1898 = "只是滿心歡喜地笑著，然後將嘴巴張得比剛才更大。" 

# 【ポーレット】
# display as 波萊特
# JP: 「もう一口！　――『あーん』」
1289 = "「再來一口！　——啊～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、『あーん』」
1371 = "「嗯，“啊～”」" 

# monologue
# JP: （ぽあくっ！）
2338 = "（吃下！）" 

# monologue
# JP: [さじ]匙ごと、どころか、指先までをも飲まんばかりの勢いだ。
1939 = "她就像是要把勺子、甚至是我的手指也要吞下去一般。" 

# monologue
# JP: ポーレットの頬の赤みが増して、\n表情は、さらににこにこ笑み崩れていく。
2130 = "波萊特的臉頰越來越紅潤，笑容也更加燦爛。" 

# monologue
