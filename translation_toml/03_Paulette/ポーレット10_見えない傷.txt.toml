2064 = "所以——可以的話，我還是希望使用Ｎａｖｉ走空路，哪怕要繞一個大圈子也無妨。" 

# monologue
# JP: （が――）
2331 = "（但是——）" 

# monologue
# JP: 稀咲にもらった警告が、そうすることを許さない。
1878 = "來自稀咲的警告，不允許我那樣做。" 

# monologue
# JP: マイントレジャー計画の承認と河川敷利用許可と――\n今会期中に取得できねば、宝生元忠に先手を打たれる。
2207 = "若不能在本次議會期間拿下煤探樂園計劃的批准與河岸使用許可——就會被寶生元忠搶先一步。" 

# monologue
# JP: （猶予時間はほとんど無い。事態がここに至った以上、\n訓練をスムーズに終わらせることこそ、最善なのだ）
2357 = "（幾乎沒有能讓我們遲疑的時間。既然事已至此，順利完成訓練才是最好的辦法）" 

# monologue
# JP: ならば、集中して行う他無い。\n見事にこなして、安心してポーレットに休んでもらいたい。
2269 = "那麼就只能全神貫注了。我要出色地完成訓練，好讓波萊特安心休息。" 

# monologue
# JP: そうと思えば、もやもやしていた悩みは薄れ、\n集中力のギアを一段、更に上へとあげられる。
2251 = "這樣一想，我心中的煩惱也漸漸淡去，注意力又提高了一個層次。" 

# 【双鉄】
# display as 雙鐵
# JP: 「[たらぎ,1]鱈木廃駅通過――良しっ！」
1596 = "「通過多良木廢車站——正常！」" 

# monologue
# JP: 良し――の、はずだ。\n自分自身の指差\x%l喚呼;#00ffc040;喚呼%l;#;に、けれど違和感を覚えてしまう。
2006 = "應該——是正常的。但我卻對自己的手勢\\x%l喚呼;#00ffc040;復誦%l;#;感覺到了某種異常。" 

# monologue
# JP: 事前に決めた通過時刻に遅延も早着もしていない。\n廃駅名の間違いなどもしてないし――いやっ！
2202 = "與預定的通過時間相比，不早也不晚。也沒有唸錯廢車站的名字——不對！" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな？」
1537 = "「玲奈？」" 

# 【れいな】
# display as 玲奈
# JP: 「……すぅ～……すやぁ～～っ」
1036 = "「……呼～……呼～～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1635 = "「！！！」" 

# monologue
# JP: 何の予兆も感じなかった。\n一瞬前まで起きていて、次の瞬間寝落ちしている。
2104 = "沒有任何預兆。玲奈前一秒還好好的，下一秒就已經打起了瞌睡。" 

# monologue
# JP: 湯医駅着にはまだ間がある。時間的には猶予があるのに、\n\x%lレイルロオド;#00ffc040;レイルロオド%l;#;不在の恐怖は、心臓をぎゅっと鷲掴んでくる。
2287 = "離到達湯醫站還有一段距離。明明時間還很充裕，可\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;不在場的恐懼感猛地壓緊著我的心臟。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――――ぁっ」
983 = "「————啊！」" 

# monologue
# JP: “ポーレット”と出かけた声を、喉の奥へと押し返す。\nれいなの異変に、気づいていないわけがない。
2015 = "我剛想開口叫波萊特，又把話咽回了肚裡。她不可能沒發現玲奈的異樣。" 

# monologue
# JP: 指示が無いのは、信頼されているということだ。\n余計な負担を、ポーレットへとかけたくもない。
1931 = "她之所以沒有給出指示，是出於對我的信任。而且我也不想給她增添不必要的負擔。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――信号、進行、良しっ！」
993 = "「——信號，前進，正常！」" 

# monologue
# JP: 発駅、着駅、通過廃駅それぞれの\n予定時刻が一覧にまとめてある表――
1976 = "寫有出站、到站、通過廢車站預定時間的表格——" 

# monologue
# JP: “\x%lスタフ;#00ffc040;スタフ%l;#;”に目をやり、\n各駅の通過時刻と、湯医駅への着時刻とを確かめる。
2044 = "我看向那張“\\x%lスタフ;#00ffc040;Ｓｔａｆｆ%l;#;”，確認通過各站及到達湯醫站的時間。" 

# monologue
# JP: （あと二駅の通過は、\n問題ない、僕ひとりでも十分こなせる）
2358 = "（後面兩站的通過不成問題，我一個人也能夠完成）" 

# monologue
# JP: 湯医駅の直前にある、新[つるは,1]弦羽廃駅。
1916 = "在到達湯醫站之前，會經過新鶴羽廢車站。" 

# monologue
# JP: そのホーム端を通過してから湯医駅着まで、\n\x%l8620;#00ffc040;8620%l;#;であればおおよそ、140秒だ。
2297 = "駕駛\\x%l8620;#00ffc040;８６２０%l;#;從通過廢車站月台直到抵達湯醫站，大約需要１４０秒。" 

# monologue
# JP: （新[つるは,1]弦葉廃駅ホーム端。そこを判断基準としよう。\nそれまでに起きてくれれば、それでよし――）
2356 = "（就將新鶴羽廢車站月台作為判斷標準吧。如果玲奈在到達廢車站之前醒來，那便萬事大吉——）" 

# monologue
# JP: ダメならば、即時\x%lブレーキ;#00ffc040;ブレーキ%l;#;で安全停止。\nそのままれいなの復帰を待つのが、最善だろう。
1964 = "如果沒有醒來，就立即踩\\x%lブレーキ;#00ffc040;剎車%l;#;安全停車，然後在原地等待玲奈恢復狀態。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――[ひがしたらぎ,2]東鱈木廃駅、通過」
999 = "「——東多良木廢車站，通過」" 

# monologue
# JP: ここをすぎれば、すぐに準備の必要がある。
2253 = "通過這裡之後，就需要立刻做準備。" 

# monologue
# JP: パニックを起こさぬように、いちいち呼称し、\n確認しながら、\x%lブレーキ;#00ffc040;ブレーキ%l;#;に圧を与えて速度を落とす。
2143 = "為了保持鎮靜，我口述著每一個環節，一邊確認一邊向\\x%lブレーキ;#00ffc040;剎車%l;#;施加壓力以減緩速度。" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！　――制限５０、良しっ！」
1633 = "「！　——限速５０，正常！」" 

# monologue
# JP: 良し、ではあるが、際どかった。\nぎりぎり速度５０キロだ。
2285 = "雖說是正常，但是很險。我勉勉強強將車速控制在５０公里。" 

# monologue
# JP: \x%lキハ07;#00ffc040;キハ07%l;#;は、\x%l8620;#00ffc040;8620%l;#;よりも遥かに軽い、\nそれを危うく、失念しそうになっていた。
65 = "\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;比\\x%l8620;#00ffc040;８６２０%l;#;要輕不少，我差一點忘了這件事。" 

# monologue
# JP: （冷静になれ、冷静に。\n余計なことに気をとられるな）
2336 = "（冷靜，要冷靜。別去想沒用的事情）" 

# 【れいな】
# display as 玲奈
# JP: 「ふくー……すやぁ……」
1317 = "「呼……呼……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
# 984 = "「——」" 

# monologue
# JP: 思っても、やはり気になってしまう。\n不安がむくむく、心の中で広がっていく。
1885 = "儘管腦袋裡這樣想，卻還是會分心。不安在我的心中膨脹起來。" 

# monologue
# JP: これは……熟睡なのではないのか。\n六時間とか八時間、寝入ってしまうものではないのか。
1930 = "她……睡得很沉。會不會就這樣睡上七八個小時。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな。起きろ、れいな」
1532 = "「玲奈。快醒醒，玲奈」" 

# 【れいな】
# display as 玲奈
# JP: 「すぅ……すやぁ……すぅ」
1318 = "「呼……呼……呼」" 

# monologue
# JP: 営業運転の訓練だ。\nお客さんがいると想定せねば、意味が薄れる。
2250 = "這是商業運營的訓練。如果不假設車上載有乘客，就沒什麼意義了。" 

# monologue
# JP: なら、大きな声はかけられないし、\n手を使い揺するわけにもいかない――
2095 = "既然如此，我便不能大聲叫她，也不能去搖晃她——" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1634 = "「！」" 

# monologue
# JP: 新弦羽廃駅、そのホーム端が見えてくる。\nこれは、覚悟をした方がいい。
2090 = "新鶴羽廢車站月台一點點映入眼簾。看來必須下定決心了。" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;には無いクラッチペダルに足を乗せ――
2022 = "我將腳放到\\x%l8620;#00ffc040;８６２０%l;#;所沒有的離合器踏板上——" 

# 【れいな】
# display as 玲奈
# JP: 「ふあっ！　あ！　ごめんなさいっ！！」
1354 = "「嗚啊！　啊！　對不起！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな！　やれるか？」
1535 = "「玲奈！　可以嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「げっ、現状確認――大丈夫です！\nそうてつさん、れいな、[ゆのい,1]湯医駅停車の指示を出します」
1556 = "「確、確認情況——沒問題！雙鐵先生，玲奈現在下達湯醫站停車指示」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　確認のため、一度通しで、口頭で頼む」
1369 = "「嗯！　為了確認，麻煩你一次性完整口述」" 

# 【れいな】
# display as 玲奈
# JP: 「はいです！\nクラッチカット、\x%lブレーキ;#00ffc040;ブレーキ%l;#;開始は、もうすぐです」
1406 = "「好的！踩離合器踏板，即將開始\\x%lブレーキ;#00ffc040;剎車%l;#;」" 

# monologue
# JP: ――ギアを中立に入れてしまえば、\nそこから先の\x%lブレーキ;#00ffc040;ブレーキ%l;#;操作は、\x%l8620;#00ffc040;8620%l;#;のときと大差無い。
934 = "——將檔位調到中間之後，接下來的\\x%lブレーキ;#00ffc040;剎車%l;#;操作與\\x%l8620;#00ffc040;８６２０%l;#;沒什麼太大的差別。" 

# monologue
# JP: れいなの指示に従って、\x%l常用;#00ffc040;常用%l;\x%lブレーキ;#;#00ffc040;ブレーキ%l;#;で減速していく。\nここまでくれば、万一れいなが寝落ちても――
2032 = "我按照玲奈的指示，使用\\x%l常用;#00ffc040;常用%l;\\x%lブレーキ;#;#00ffc040;剎車%l;#;減速。這一步完成之後，即使玲奈再次睡過去也不要緊了。" 

# 【れいな】
# display as 玲奈＆雙鐵
# JP: 「制限２５、よしっ！」\n「制限２５、良しっ！」
1627 = "「限速２５，確認！」\\n「限速２５，正常！」" 

# monologue
# JP: \x%l常用;#00ffc040;常用%l;#;、重なり、緩め・込め――\n段階緩めで、速度と同時に\x%l制動;#00ffc040;制動%l;#;力をも緩めていく。
70 = "\\x%l常用;#00ffc040;常用%l;#;、保持、釋放——我循序漸進地使\\x%l制動;#00ffc040;減速%l;#;力與速度一同減緩。" 

# monologue
# JP: （きぃ――――ぃ――かとんっ）
2342 = "（吱————喀咚）" 

# monologue
# JP: 衝撃をいくらか出してしまった。\nが、停止位置は――
2284 = "雖然造成了一些衝擊，但是停車位置——" 

# 【れいな】
# display as 玲奈
# JP: 「停止位置、よし！　到着・定時！」
1281 = "「停車位置，確認！　準點到站！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――停止位置、良し。到着、定時」
994 = "「——停車位置，正常。準點到站」" 

# monologue
# JP: よかった。きちんと止められた。\n\x%l手ブレーキ;#00ffc040;手ブレーキ%l;#;をかけ、動き出さないようにして――
1925 = "太好了。成功停下來了。我拉上\\x%l手ブレーキ;#00ffc040;手剎%l;#;，固定位置——" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
1315 = "「呃啊！」" 

# monologue
# JP: ――途端、どうっと、全身から汗が吹き出してくる。
940 = "——頓時，汗水從我全身的毛孔噴湧而出。" 

# monologue
# JP: （これか――これもか――これもあるのか）
2369 = "（是這個——連這個也是嗎——連這個也是原因之一嗎）" 

# monologue
# JP: 運転中に、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が沈黙する。\nそれはまさしく、目と耳とを一気に失うに近い恐怖だ。
67 = "\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;在列車行駛中陷入沉默——這是近乎於同時喪失視覺與聽覺的恐懼感。" 

# monologue
# JP: （これを、常時――しかも、営業運転中に――なら）
2352 = "（如果是在平時——而且是在商業運營時發生——）" 

# monologue
# JP: ポーレットは、自分の舞台の上でまで、\nこれほどの重圧と緊張にさらされつづけ――
1982 = "就連站在屬於自己的舞台上，波萊特都承受著如此巨大的壓力與緊張——" 

# monologue
# JP: その上、父の遺志を継ぎ、政治家として、\n身の丈以上の努力と結果を当然のように要求されて――
2196 = "而她還繼承了父親的遺志，成為政治家。人們理所當然地要求她付出與年齡不相符的努力，並得到好的結果——" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレット」
1047 = "「……波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「お見事でした、双鉄くん」
1394 = "「太出色了，雙鐵君」" 

# monologue
# JP: “君は凄いな”――\n言うより早く、僕が称賛されてしまう。
1919 = "在我說出“你好厲害”之前，自己卻先受到了褒獎。" 

# 【ポーレット】
# display as 波萊特
# JP: 「さすが、\x%l機関士;#00ffc040;機関士%l;#;さんは違いますね。\n冷静で、ポイントつかむのが上手いです」
1241 = "「不愧是\\x%l機関士;#00ffc040;司機%l;#;，就是與平常人不一樣呀。頭腦冷靜，悟性也高」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁあ――」
1355 = "「嗯——」" 

# monologue
# JP: “僕ほど経験の乏しい者が、\x%l機関士;#00ffc040;機関士%l;#;などとおこがましい”\n真っ先に頭に浮かぶ答えは、呑み込むしか無い。
959 = "“像我這樣缺乏經驗的人，要以\\x%l機関士;#00ffc040;司機%l;#;自居也未免太狂妄自大了”——我不得不將這句到了嘴邊的話咽回去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――そう思ってもらえたのなら、何よりだ」
991 = "「——你如果是這樣想的，那就再好不過了」" 

# monologue
# JP: 弱音は、ポーレットの負担を増やす。\n謙遜でさえ、おそらく心配をふくらます。
2049 = "我若是說出喪氣的話語，就會增加波萊特的負擔。恐怕就連謙虛都會加深她的擔憂。" 

# monologue
# JP: ならば僕は支えになるべく、\n堂々として、揺るがぬように在るのみだ。
2270 = "那麼我如果想成為她的後盾，就必須坦坦蕩蕩、決不動搖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの方は大丈夫か？\n体に、異常などないか？」
1608 = "「那你感覺怎麼樣？身體有沒有什麼異常？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫です！　双鉄くんの運転がとっても快適だから、\n乗る前よりも、むしろ元気になれたかも」
1454 = "「我沒事！　乘坐雙鐵君的列車很舒適，精神反而比搭車之前還好一些了呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
# 1592 = "「這樣啊——」" 

# monologue
# JP: 嘘を、ついてる。\nこういう風に、ポーレットは無理を重ねてく。
2124 = "波萊特在說謊。她總是這樣硬撐著。" 

# monologue
# JP: れいなが倒れてしまった間、どれほど心を痛めたか、\n笑顔で僕から、隠そうとして――
1940 = "她強顏歡笑著，不想讓我察覺。剛才玲奈倒下時，她有多麼心痛——" 

# 【れいな】
# display as 玲奈
# JP: 「あのっ、そうてつさん」
1614 = "「那個，雙鐵先生」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！　れいなもありがとう。\n不慣れな僕を、よくナビゲートしてくれた」
1382 = "「噢噢！　還要謝謝玲奈。謝謝你為生疏的我提供指導」" 

# 【れいな】
# display as 玲奈
# JP: 「ひゃむっ！？」
1330 = "「哈嗚！？」" 

# monologue
# JP: 頭を左手で撫でながら、右手の指で唇を押さえ、\nじっとその目を覗きこむ。
2025 = "我左手撫摸著她的腦袋，同時右手指尖抵住她的嘴唇，看著她的眼睛。" 

# monologue
# JP: “れいなが僕に謝れば、ポーレットはそれを気に病む”と、\n耳もと、素早く囁きかける。
2148 = "然後貼近她耳邊輕聲地說“如果玲奈向我道歉，波萊特就會感到自責”。" 

# 【れいな】
# display as 玲奈
# JP: 「はぅっ――あの、ええと――れいな、\nもっと上手にごいっしょできるよう、がんばります！」
1329 = "「哈嗚——那個、呃——玲奈會努力提供更好的幫助的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな！」
1374 = "「嗯，是啊！」" 

# monologue
# JP: 素晴らしい。
2181 = "真是太棒了。" 

# monologue
# JP: れいなが懸命に考え出したのだろう言葉は、\n僕にも導きを与えてくれる。
2160 = "玲奈努力想到的這一句話，同時也為我指引了方向。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もそうする。ベストを尽くす。\nもっと上手になれるよう、もっと一緒にいられるように」
1445 = "「我也一樣會盡我所能。為了能夠精益求精，為了能夠更加接近大家」" 

# monologue
# JP: ポーレットと、れいなと。\n御一夜鉄道の仲間達と。
2133 = "波萊特與玲奈，還有御一夜鐵路的伙伴們。" 

# monologue
# JP: 僕らチームの全員が、そうして心をあわせられれば、\n個人個人にかかる負担を、全体できっと軽減できよう。
1900 = "只要我們團隊中的所有人齊心協力，一定能減輕每個人身上的負擔。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも！　わたしもそうします！」
1447 = "「我也會！　我也會的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうしてくれ。\nそしてよりよく、一緒に未来へ進んでいこう」
1378 = "「嗯，那就拜託了。就讓我們一同邁向更好的未來吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――はいっ！！！」
1395 = "「好——好的！！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、その前にだ――」
1256 = "「但是，在那之前——」" 

# monologue
# JP: （ひょいっ）
2348 = "（嘿咻）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――」
# 1334 = "「啊——」" 

# monologue
# JP: 手を引き、肩を貸し、ポーレットの軽い体を\n一番前の席から立たせる。
2038 = "我牽起她的手，讓她搭在我肩上，扶著她從最前排的座位上站起來。" 

# monologue
# JP: ホームへ降りる足取りは案外しっかりしているが――
2278 = "雖然她下車時步子踏得還算穩——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ナビを回りこませている。\n温泉病院までは、空路で行こう」
1449 = "「我已經讓Ｎａｖｉ繞路過來了。前往溫泉醫院的這段距離，就走空路吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「は、い……あの、双鉄くんは？」
1401 = "「好的……那個，雙鐵君呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、付き添う。\n着水地点からはおそらく、徒歩で登ることになるしな」
1545 = "「當然會陪著你。等它降落到著陸水域之後，恐怕剩下的路還是需要步行的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい！　わかりました！\nそれなら、よろしくお願いします」
1403 = "「好的！　我明白了！那麼就拜託你了」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなは、ポーレットとそうてつさんが帰ってくるまで、\n折り返しのための整備をしておきますねぇ」
1534 = "「玲奈會在波萊特和雙鐵先生回來之前，去做好返程的整備的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、頼む」
1373 = "「嗯，拜託了」" 

# monologue
# JP: ……ポーレットが診察を受けている間に、\n僕は電話で幾人かと話をしておこう。
972 = "……在波萊特接受診斷的期間，我就去打幾個電話吧。" 

# monologue
# JP: 赤井宮司と、登呂流湯主人と、もうひとり――\nポーレットの過去をよく知る人に。
2078 = "打給赤井宮司、登呂流浴場老闆，以及另一位——了解波萊特過去的人。" 

# monologue
# JP: （ポーレットの問題も、れいなの問題も、\nどちらも、解消する必要がある）
2370 = "（無論是波萊特的問題，還是玲奈的問題，都必須去解決）" 

# monologue
# JP: だからともかく出来る範囲で情報を集め、\n早く解決できそうな方から、着手していく。
2070 = "所以我要儘可能地收集訊息，先從能夠更快解決的問題下手。" 

# monologue
# JP: なんの根拠もない話だが――片方を解決できれば、\nもう片方の解決の端緒を掴めそうだと感じてもいる。
2282 = "雖然我沒有任何依據——但我總覺得只要解決其中之一，就能夠得到解決另一個問題的線索。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫そうなら、行くぞ、ポーレット」
1471 = "「既然沒有問題，那我們走吧，波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい！」
1491 = "「是的！」" 

# monologue
# JP: ならば、進んでみるしかない。
2271 = "那麼，就只能試著走下去了。" 

# monologue
# JP: ポーレットの手をそっと握って、\n湯医駅から、一歩を踏み出す。
2053 = "我輕牽起波萊特的手，從湯醫站往外踏出一步。" 
