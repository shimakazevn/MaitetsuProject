2498 = "進入市長室的是一位體型小巧的中年女性。" 

# monologue
# JP: ポーレットの話だと、\n総務部長を呼んでいるとのことだったが――
2426 = "聽波萊特說，她今天請來的是總務部部長——" 

# 【ポーレット】
# display as 波萊特
