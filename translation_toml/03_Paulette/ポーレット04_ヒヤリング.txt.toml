2192 = "宮本女士寫了一張便條，放在資料的一角。" 

# monologue
# JP: そして一瞬、僕の顔を見て。\nポーレットへと一礼をし、そのまま静かに部屋を出て行く。
2530 = "隨後看了我一眼，又朝波萊特行了一禮後，靜靜走出了房間。" 

# monologue
# JP: （ぱたんっ）
2581 = "（啪嗒）" 

# monologue
# JP: 話しかけよう――とした言葉を喉にしまいこむ。
2270 = "我想對波萊特說些什麼——卻又把話咽了回去。" 

# monologue
# JP: 見るからに、ポーレットは息を詰めている。\n宮本さんの足音が、徐々に遠ざかり……聞こえなくなる。
2362 = "波萊特明顯正在屏住呼吸。宮本女士的腳步聲越來越遠……最後終於聽不見了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はぁぁあああああ～っ」
1461 = "「哈——」" 

# monologue
# JP: 次の瞬間、ポーレットは緩みに緩んだ息を吐き、\nぐったり、机の上に突っ伏し、伸びる。
1991 = "下一個瞬間，波萊特吐出了長長的一口氣，無力地趴在桌子上。" 

# monologue
# JP: だからつい、問いかけずにはいられなくなる。
2450 = "見此情形，我忍不住問她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「苦手なのか？」
1392 = "「你不擅長和她那樣的人相處嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「苦手っていうんじゃないんですけど――」
1403 = "「倒也不是處不來——」" 

# monologue
# JP: 伸びきったまま苦笑して、\nん……っとポーレットは器用に首を捻ってみせる。
2169 = "她趴在桌子上苦笑道，然後彷彿在思考什麼一般，歪過頭去。" 

# 【ポーレット】
# display as 波萊特
# JP: 「――苦手じゃ、ほんとに無いんです。\n宮本さん、パパの右腕だった人だし」
1145 = "「——真的，不是處不來。畢竟她過去曾經還是爸爸的左膀右臂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「前市長のか」
1421 = "「前任市長的？」" 

# monologue
# JP: ナビが、上空で言っていた。\n雛衣前市長の政治手腕は、高く評価されていたと。
2603 = "Ｎａｖｉ曾在飛行中說過，前任市長雛衣先生的政治手腕得到了很高的評價。" 

# monologue
# JP: その右腕というのであれば、\nなるほど、この資料の見事さにも納得が――
2325 = "既然是他的左膀右臂，那麼她將這份資料整理得如此面面俱到也就不足為奇——" 

# monologue
# JP: （おや？）
2576 = "（咦？）" 

# monologue
# JP: 手書きのメモには、電話番号。\n間違いなく、宮本さんのものだろう。
2512 = "那張手寫的便條上，寫的是一串電話號碼。毫無疑問，是宮本女士的吧。" 

# monologue
# JP: いつでも宮本さんを呼び出せるポーレットに、\nこのメモが必要であるわけもなし――
2365 = "波萊特隨時可以將宮本女士叫來，自然不會需要這張便條——" 

# monologue
# JP: （僕あてか）
2590 = "（是給我的嗎）" 

# monologue
# JP: ならば、素直に預かっておこう。
2517 = "那麼，我就好好收著吧。" 

# monologue
# JP: メモを拾ってポケットに。\nポーレットは気にも留めずに、まだ伸びている。
2261 = "我將便條放入口袋。波萊特根本沒有留意，還趴在桌子上。" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、だからこそ多分……\nわたし、子供扱いされちゃうんですよ」
1386 = "「但是，或許就是因為這個原因……我才會一直被她當成小孩子來對待吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「子供扱い」
1684 = "「當成小孩子對待嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうです。あの人いっつも正しいし。\nその上、データでがっちり固めてきますから」
1631 = "「是的。她總是正確的那一方。而且，她的每個觀點都有數據支撐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1494 = "「嗯」" 

# monologue
# JP: なるほど、それで合点がいった。
2076 = "原來如此，這樣我就明白了。" 

# monologue
# JP: ブラッシュアップと、僕が零した一言に、\n何故ポーレットと宮本さんが、驚いたような顔をしたのか。
2388 = "當我說出“精益求精”四個字時，波萊特和宮本女士之所以會那樣吃驚——" 

# monologue
# JP: （ああいう場合に、今までは、\nそのまま計画を断念させられていたのだろうな――）
2595 = "（若是放在從前，波萊特碰到剛才那種情況，都會被迫放棄整盤計劃吧——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あれもダメこれもダメって、なんか、すっごい窮屈で。\nそれに従ってるのが結局、正解だってわかるんですけど」
1766 = "「這也不行、那也不行，感覺方案處處受到限制。雖然我也明白最後照她說的做才是正確的」" 

# monologue
# JP: 可能性が低い案件に時間をつぎ込んでいくよりも、\nすっぱりあきらめ、次善の策を求めていく。
2430 = "與其將時間耗費在可能性較低的議案上，不如早早放棄，尋求代替的方案。" 

# monologue
# JP: 確かにそれも、\n正解のひとつであるには違いない。
2497 = "這確實也是一種正確的處理方式。" 

# 【双鉄】
# display as 雙鐵
# JP: 「負担を無闇に増やさぬようにとのことでもあろう。\nポーレットは、ただでさえ多忙なのだから」
1502 = "「她也是不希望你有太多負擔吧。波萊特本來就已經很忙了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そういう心配も、してくれてるんだと思います。\nだからわたしも、反論までは出来なくて」
1588 = "「我想她確實也在為我而擔心。所以我也不能真的反駁她」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1467 = "「唔」" 

# monologue
# JP: 子供扱い、と聞かされたせいか、\n宮本さんが前市長の右腕だったと聞いたせいか。
2003 = "不知是因為波萊特說她被當成小孩子對待，還是因為得知宮本女士是前任市長的左膀右臂。" 

# monologue
# JP: 今のポーレットの姿はどこか、\n真闇姉に反発していた日々姫の姿と重なるようだ。
2286 = "我總覺得現在的波萊特有點像跟真闇姐頂嘴時的日日姬。" 

# 【双鉄】
# display as 雙鐵
# JP: 「宮本さんからしてみれば、きっとポーレットは――」
1585 = "「我想在宮本女士看來，波萊特一定就像——」" 

# monologue
# JP: 言いかけて、危ういところで言葉を呑み込む。
2465 = "話說到一半，連忙咽了回去。" 

# monologue
# JP: いや――そうだ。\nそういえば、今まで、ただの一度も……
2271 = "我想想——是啊。說起來，至今為止，好像一次都……" 

# monologue
# JP: （パパ、という言葉をあれほど聞くのに――\nポーレットは、ママと……一度でも口にしただろうか？）
2589 = "（明明聽她那麼多次提起她的爸爸——可是波萊特……至今為止，有提起過媽媽嗎？）" 

# monologue
# JP: 思い出せない。\nそれほどまでに、印象がない。
2238 = "想不起來。完完全全，沒有印象。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
1822 = "「雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや――」
1478 = "「啊，沒什麼——」" 

# monologue
# JP: 考えてみれば、僕はポーレットのことをまるで知らない。\n過去に会っているかどうかさえ、未だに確認できてない。
2021 = "仔細想想，我還完全不了解波萊特。就連以前有沒有見過面，都還沒有向她問明白。" 

# monologue
# JP: ――うかつなことを言うべきではない。\nその判断が、喉から出て行く言葉を変える。
2336 = "有些話題不能隨便觸碰——我這樣想著，於是就換了一個話題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「宮本さんからしてみれば、ポーレットは、\nまだまだ頼りない市長に見えてしまうのだろうな」
1586 = "「我想在宮本女士看來，波萊特還是一個靠不住的市長吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それはそうですよ。\n実際、頼りない市長でしたから。昨日までは」
1795 = "「那是當然啊。我本來就是個靠不住的市長。不過今天開始就不一樣了」" 

# monologue
# JP: 言って、すっくと立ち上がる。
2162 = "她說完後，一下子站了起來。" 

# monologue
# JP: 横にではなく、縦にまっすぐ――\nその方が、やはりポーレットの背は美しい。
1999 = "不再趴在桌上，而是筆直地站著——波萊特的後背，果然還是這樣看起來更加美麗。" 

# 【ポーレット】
# display as 波萊特
# JP: 「汚名返上、だから、これからしていきます」
1607 = "「所以從現在開始，我要挽回我的名譽」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
1495 = "「嗯！」" 

# monologue
# JP: そうだ。これから。\n汚名は返上していけばいい。知らないことは知ればいい。
2348 = "沒錯。名譽——從現在開始去挽回就好。不明白的事情——從現在開始去學習就好。" 

# monologue
# JP: ポーレットにも、そして僕にも、\nそれは必ず、出来るはずだ。
2364 = "波萊特能夠做到。而我，一定也能夠做到。" 

# 【日々姫】
# display as 日日姬
# JP: 「兄さんは」
1462 = "「哥哥你」" 

# monologue
# JP: ……日々姫の目が、据わっている。\nいや――違う。単に、極度に、冷えきっている。
1139 = "……日日姬直勾勾地看著我。不對，應該說——非常冷冰冰地看著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「鉄道マニアに、なったんですか？」
1400 = "「你變成鐵路迷了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1353 = "「不——」" 

# monologue
# JP: なっていない。
1132 = "“沒有”。" 

# monologue
# JP: 断言、できるか悩んでしまう。\n悩む程度に鉄道に、確かに、足を踏み込んでいる。
2248 = "我不禁糾結到底能不能如此斷言。因為我確實已經在這方面涉足很深了。" 

# 【日々姫】
# display as 日日姬
# JP: 「あのですね」
1579 = "「我問你呀」" 

# monologue
# JP: 僕の答えを待たぬまま、\n日々姫はふっ、と鼻を鳴らして肩をすくめる。
2004 = "不等我回答，日日姬便輕哼了一聲，聳了聳肩。" 

# 【日々姫】
# display as 日日姬
# JP: 「石炭を掘ることを、世間でレジャーと呼びますか？\n呼びませんよね？　正しい名称は、“労働”ですから」
1377 = "「人們一般會把挖煤礦稱為“娛樂”嗎？不會的吧？　因為它的正確叫法是“勞動”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、だから――掘るだけではなく……だな……」
1365 = "「不，所以說——不光是挖煤礦……還有……」" 

# monologue
# JP: 言葉の続きを、口から出せない。\n蛇に睨まれた蛙とは、こういう気分なのかもしれない。
1992 = "下一句話，怎麼也說不出口。或許被蛇盯上的青蛙就是形容我現在的處境吧。" 

# 【日々姫】
# display as 日日姬
# JP: 「せっかく掘った石炭をＳＬの釜に投げ込むことを、\n世間では、働き損、って言ったりします」
1506 = "「好不容易挖出來的煤礦被扔進蒸汽機車的鍋爐裡，人們一般會稱這為“白忙”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うう、む」
1488 = "「嗚，唔」" 

# monologue
# JP: 説得力を、感じてしまう。
2164 = "她說得很有道理。" 

# monologue
# JP: 助けを求めてポーレットを見れば、\n羞恥と困惑を交えた顔で、僕にすがる目を向けてくる。
2281 = "我看向波萊特，想讓她幫我解圍。結果她卻露出羞愧與困惑的神色，反而朝我投來求助的目光。" 

# monologue
# JP: （ならば――ハチロクとれいな、な、ら……）
2601 = "（那麼——八六和玲奈一定、會……）" 

# monologue
# JP: だめだ、ハチロクは無表情。\n完全なポーカーフェイスで、この場をやりすごす腹らしい。
2007 = "不行了，八六面無表情。看來是鐵了心不打算管這件事。" 

# monologue
# JP: そしてれいなは、まるで話を聞いてない。\n臭い付けする子猫のように、ポーレットにただ甘えている。
2420 = "而玲奈她……完全沒在聽我們說話。她就像一隻黏人的小貓，向波萊特撒著嬌。" 

# monologue
# JP: （そういえば、ここ数日、\nポーレットとふたりきりになる時間が多かったものな）
2596 = "（說起來，這幾天很多時候都是我和波萊特兩個人獨處啊）" 

# 【凪】
# display as 凪
# JP: 「確かにそうばい。お金払って石炭ば掘って。\nその石炭ば取り上げられっとは、愉快じゃなかたい」
1709 = "「確實沒錯咧。自己花錢來挖煤礦，最後煤還要被沒收，可一點都不開心咧」" 

# 【ふかみ】
# display as 深美
# JP: 「うん。そう……思う。それ、多分――\nほとんどの人には、売りに、ならない。かも。です」
1493 = "「嗯。我也……這樣想。這件事情，大概——對大多數人而言，都是，沒有吸引力的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うう、む」
# 1488 = "「嗚，唔」" 

# monologue
# JP: 味方は沈黙。\n反対意見ばかりが次々重なっていく。
2079 = "友軍保持沉默。反對的聲音此起彼伏。" 

# monologue
# JP: ならば？　ならば――
2198 = "對了，既然如此——" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、どのようにすればいいかな？\nどうすれば、廃炭鉱を観光拠点とできるだろうか？」
1801 = "「那麼，應該怎麼做才好呢？要怎樣才能將廢煤礦變成觀光景點？」" 

# 【凪】
# display as 凪
# JP: 「簡単に考えつくようなことなら、\n先に誰かがやっとるばい」
1741 = "「要是簡簡單單就能想到，早就有別人去做了咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
# 1467 = "「唔」" 

# 【ふかみ】
# display as 深美
# JP: 「あの……すごい、一般論っていうか――\n基本的な意見。です、けど」
1791 = "「那個……雖然是一個很一般——很基本的意見」" 

# monologue
# JP: 凪に一刀両断された僕を哀れに感じてか、\nおずおずとだが、ふかみが挙手をしてくれる。
2295 = "或許是不忍心看到我的想法被凪乾脆俐落地否認，深美怯生生地舉手說道。" 

# 【ふかみ】
# display as 深美
# JP: 「払ったお金に、どれだけのお返しがくるか――\nそれが、満足度につながるんだと思う……。です」
1727 = "「花出去的錢，到底值不值得——我覺得，這才是與滿意度相掛鉤的……嗯」" 

# monologue
# JP: クマ川下りも、そこを改善していかないと……と、\nせっかくのアドバイスを、ふかみは自嘲に沈めてしまう。
1135 = "“隈河漂流，在這一點上也需要改善啊”——她這樣說著，將這一難得的寶貴意見變成了自嘲。" 

# monologue
# JP: が――
2032 = "但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、確かに基本からだな。\n料金と、得られるものとのバランスか」
1430 = "「原來如此，的確要從最基本的開始啊。要好好考慮消費與回報之間的平衡嗎……」" 

# monologue
# JP: クマ川下りを体験したとき、\n「正直、高い」と僕は感じた。
2125 = "在體驗隈河漂流時，我其實是覺得“價格挺貴”的。" 

# monologue
# JP: クマ川下りは、\n素晴らしい経験であったにもかかわらず、だ。
2052 = "儘管那是一段寶貴的體驗，卻還是讓我有了這種感受。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、『金を払って働かされる』と思われるなら、\n例え料金が一円だろうと、参加するものはいなくなる」
1687 = "「的確，如果遊客認為這是“花錢來做勞動”，那麼即使只收１日元，也不會有人來參與」" 

# monologue
# JP: ならば、それが『労働』でなくなるような印象づくり。
2516 = "那麼，我們就要讓遊客認為這不是“勞動”。" 

# monologue
# JP: 掘った石炭でＳＬを動かすロマンがしかし、\n鉄道好きでないものには、なんの魅力も無いのなら――
2385 = "用自己採來的煤礦讓蒸汽機車動起來——這雖然很浪漫，但對於非鐵路愛好者的遊客而言卻沒有絲毫吸引力——" 

# 【双鉄】
# display as 雙鐵
# JP: 「――それなら、例えば……\n掘った石炭を、疑似通貨にするという案はどうだろう」
1147 = "「——那麼，你們覺得比如……採來的煤礦可以當作代幣來使用——這個方案怎麼樣」" 

# 【真闇】
# display as 真闇
# JP: 「ああ、そりゃあええねぇ」
1483 = "「啊，這是個好主意啊」" 

# monologue
# JP: 沈黙を守っていた真闇姉が、\n思わず、といった感じの賛辞をくれる。
1987 = "一直保持沉默的真闇姐彷彿情不自禁一般，說出了讚賞的話語。" 

# monologue
# JP: 単純だ、と自分で思うが、\nその称賛に押され言葉も勢いづく。
2534 = "雖然連我都覺得自己太過單純，但在這一番話的鼓勵下，我的語氣中又多了幾分自信。" 

# 【双鉄】
# display as 雙鐵
# JP: 「通貨であるから、使い道を選べる。そのうちのひとつは、\n投げ込み、あるいは\x%l車掌;#00ffc040;車掌%l;#;体験などでもいいし――」
1620 = "「既然是貨幣，就有很多種消費方式可選了。比如可以是加煤體驗，或者體驗當\\x%l車掌;#00ffc040;列車長%l;#;等等——」" 

# monologue
# JP: 僕やポーレットには通じるロマン。\n自由に選べるのであれば、もちろんそれも選択肢になる。
2387 = "當列車長這是我和波萊特心中的浪漫。既然可以自由選擇，自然也要將這些加入選項之中。" 

# 【双鉄】
# display as 雙鐵
# JP: 「他には、そうだな。蒸気焼酎や蒸気アイス、\nあるいは新駅弁のような物品とも替えられることにする」
1415 = "「其它的還有——我想想，還可以用來兌換蒸汽燒酒、蒸汽冰淇淋，或者是新式鐵路便當等等物品」" 

# 【ふかみ】
# display as 深美
# JP: 「なら、クマ川くだりの乗船券！\n乗船券とも、替えられることにしてください！　ですっ」
1775 = "「還有，隈河漂流乘船券！請將乘船券也加入進去！　嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな。\nそのようにして、協賛を求めていくのは、とてもいいな」
1479 = "「啊，沒錯。像這樣去爭取更多的贊助商也是個很好的辦法」" 

# monologue
# JP: そうすれば、観光振興に全市を巻き込めるかもしれん。
2177 = "如此，或許可以讓全市參與到旅遊業復興的工程中來。" 

# 【真闇】
# display as 真闇
# JP: 「宣伝効果が見込めるようになれば、協賛品、\n無償提供も出てくるようになるかもしれんねぇ」
1520 = "「如果能起到很好的宣傳效果，或許還會有贊助商願意免費提供商品呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1463 = "「哦哦！」" 

# monologue
# JP: 確かに、だ。たとえば、掘った石炭を一合瓶――\nカップサイズの蒸気焼酎と交換できることとする。
2468 = "說得沒錯。比方說，可以用採來的煤礦兌換１００毫升的蒸汽燒酒。" 

# monologue
# JP: それをうまいと感じてもらえば、\n御土産に一升瓶を買ってもらえるかもしれない。
2176 = "如果遊客覺得好喝，或許會購買一升裝的蒸汽燒酒作為土特產帶回去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「協賛と宣伝と。\nうまく運べば、win-winという形になるか」
1755 = "「贊助與宣傳。如果進展順利，就可以形成雙贏的局面啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「最初は仮に、かつかつの料金設定をしたとしても、\nそういう協賛を増やせれば、利益の範囲も広げていける」
1547 = "「就算在起步階段將收費壓得很低，只要能找到多家贊助商，就能擴大盈利範圍」" 

# monologue
# JP: ポーレットの声に頷き返す。
2294 = "我點頭贊同波萊特。" 

# monologue
# JP: 僕だけではなく、れいなも、ハチロクも、真闇姉も、\n凪もふかみも――日々姫まで。
1997 = "不光是我，還有玲奈、八六、真闇姐、凪、深美——就連日日姬也點了頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「魅力ある協賛を増やせれば。\nこの案は、採算性のある事業とできる」
1515 = "「如果能找到有吸引力的贊助商，這份方案就可以使我們的事業有盈利能力」" 

# monologue
# JP: 整頓のための言葉と同時、\nやるべきことが、次々と頭の中に浮かんでくる。
2124 = "在我發表總結的同時，我腦海中不斷浮現出接下來應該做的事。" 

# monologue
# JP: ああ、本当に次々だ。\n僕とポーレットとふたりでは、とても全てはこなしきれん。
2116 = "啊，新點子真的是接連不斷浮現。這實在不是只靠我和波萊特兩個人就能夠全部完成的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「術仙廃炭鉱の再活用を観光振興と繋げたのなら、\n御一夜は必ずや、かつてに勝る輝きを得る」
1517 = "「如果能讓術仙廢煤礦的再利用成為旅遊業復興的一環，御一夜肯定能重新獲得不亞於過去的繁榮」" 

# monologue
# JP: だから、その明日を迎えるために。\nまずなすべきは、たったひとつに決まっている。
2379 = "為了能夠迎來那樣的一個未來，現在有一件最為關鍵的事情要去做。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、その輝きを見てみたい。\nそうするためには――みんなの力が必要だ」
1581 = "「我希望看到那繁榮的景象。為此——我需要大家的幫助」" 

# 【ハチロク】
# display as 八六
# JP: 「鉱山鉄道の廃線跡にお連れください。\nわたくしの経験が、復線のために役立つかもしれません」
1745 = "「請帶我去礦山鐵路的廢線地點吧。我的經驗或許能對恢復廢線有所幫助」" 

# 【真闇】
# display as 真闇
# JP: 「鉄道の方の経費ば細かに出してもらえたら、\n料金設定のシミュレーション、立てたげるねぇ」
1712 = "「等你們整理好鐵路方面的經費細則後，我來幫你們設立收費標準吧」" 

# 【凪】
# display as 凪
# JP: 「じいちゃんと職人さんたちに声かけとくばい！」
1460 = "「咱去通知爺爺還有工匠們！」" 

# 【ふかみ】
# display as 深美
# JP: 「わたしも――業者さんとか、観光協会のみなさんに。\nとか、お話――それとなくしてみます。です」
1569 = "「我也——去找業內人士還有旅遊協會的人，提一提這件事。嗯」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなは、ポーレットをお手伝いしますよぉ」
1679 = "「玲奈會來幫波萊特的忙的」" 

# monologue
# JP: 頼むより先、力を、声を与えてもらえる。
2503 = "還不等我開口，一雙雙援助之手便向我伸來。" 

# 【日々姫】
# display as 日日姬
# JP: 「イメージ作り、すごく、重要になると思うから」
1589 = "「我想，營造出一個好的形象是十分重要的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
1625 = "「日日姬」" 

# monologue
# JP: 顔は、そっぽを向いたまま。\nだけれど、確かに伝わってくる。
2137 = "她依然不肯轉頭看我。但是，心意已經傳達到了。" 

# monologue
# JP: 日々姫は気持ちを、僕らの方へと向けてくれてる。
2335 = "日日姬的心，是向著我們這邊的。" 

# 【日々姫】
# display as 日日姬
# JP: 「描くもんあったら言うて。描くけん」
1647 = "「有什麼要畫的告訴我。我畫就是咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。力を貸してくれるのだな」
1401 = "「你願意幫助我啊，謝謝」" 

# 【日々姫】
# display as 日日姬
# JP: 「そんなん、最初からゆーとるもん」
1566 = "「我一開始就說過咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1468 = "「唔？」" 

# monologue
# JP: ちら、と横目が僕を向く。
2141 = "她偷偷瞟了我一眼。" 

# monologue
# JP: どこか淋しげにも見えて、\n少し嬉しげにも見える。
2392 = "看起來有些落寞，卻又好像有一些喜悅。" 

# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんと楽しそうなにぃにぃ見たら……\n妹やもん。協力、するしかなかろーもんね」
1692 = "「看到阿哥那麼開心。我這個做妹妹的，也就只能為你提供幫助咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1770 = "「這樣啊」" 

# monologue
# JP: くしゃくしゃと、いつものように髪を撫で――\nようとした手を避けられる。
2268 = "我想像往常那樣去撫摸她的頭髮——卻被她躲開了。" 

# monologue
# JP: 日々姫は苦笑し、咳払いして、目をつぶり。
2159 = "她苦笑一聲，清了清嗓子，閉上眼睛說道。" 

# 【日々姫】
# display as 日日姬
# JP: 「違いますよ、兄さん」
1358 = "「不對啦，哥哥」" 

# monologue
# JP: それからゆっくり。開けなおした目で僕をみる。
2381 = "然後慢慢睜開眼睛，注視著我。" 

# 【日々姫】
# display as 日日姬
# JP: 「その手はもっと――\n未来に向けて動かさなくちゃ、ダメですってば」
1399 = "「你的手要伸向更遠——更遠的未來才行啊」" 
