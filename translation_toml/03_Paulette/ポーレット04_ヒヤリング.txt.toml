[script]
# lines: 405 
# 【双鉄】
# display as 雙鐵
# JP: 「……うざったい」
1171 = "「……好煩」" 

# monologue
# JP: 僕の命が最優先かなんだかしらないが、\n四六時中頭の上を飛びまわるのはやめて欲しい。
2051 = "儘管它說我的生命安全是它的最優先事項，但我也希望它別整天在我頭頂上亂飛。" 

# monologue
# JP: 僕を助けてくれたのはナビで、今も助けてくれてる。\nそのことは、百も承知をしているけど――
2506 = "那一天，是Ｎａｖｉ救了我，直至現在它依然在幫助著我。這件事我很清楚，但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「こんな日くらい、一人にさせて欲しいのに」
1724 = "「至少在今天這種日子裡讓我一個人待會啊」" 

# monologue
# JP: 鉄道がとっくに廃線となり、\nだから安心して暮らせていた、この町、御一夜。
2230 = "御一夜的鐵路早已成為廢線，所以我才能安心生活在這裡。" 

# monologue
# JP: 市長候補の一人が、湯医線を市営鉄道として復活させると\n……そんな公約、誰も相手にしないと信じきっていた。
2532 = "雖然有一位市長候選人承諾要將湯醫線改為市營鐵路，使其恢復運作……但我本以為不會有人理會。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なのに、まさか当選して、\n鉄道が本当に復活するとか……」
1662 = "「沒想到他真的會當選，鐵路也要正式復活了……」" 

# monologue
# JP: 廃炭鉱の近くで\x%lエアクラ;#00ffc040;エアクラ%l;#;が使えなくなるから、\nすごい遠回りを強いられる――
2225 = "廢煤礦周邊無法使用\\x%lエアクラ;#00ffc040;空凝機%l;#;，所以必須繞很大一個圈子——" 

# monologue
# JP: それが、鉄道復活の要望につながったとも聞いた。
2315 = "據說，這就是人們希望恢復鐵路的主要原因。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、遠回りぐらい……便利に慣れすぎるから、\n少しの不便も、我慢できなくなるんだ」
1719 = "「繞個圈子又怎麼了……就是因為習慣了方便，才會連這麼一點小小的不便都無法忍受」" 

# monologue
# JP: そうした怠け心が、憎い。\nそれで鉄道を復活させる、極端な判断が我慢ならない。
2274 = "我所憎恨的，就是這種懶惰的思想。為了這點小事就做出恢復鐵路這種極端決定，使我無法接受。" 

# monologue
# JP: ムカつきすぎて押しつぶされて苦しくて、\n言葉を混ぜでもしなければ、息を吐き出すことも出来ない。
2243 = "憤怒、委屈、痛苦，如果不以言語的方式宣洩出來，我甚至都無法呼吸。" 

# 【双鉄】
# display as 雙鐵
# JP: 「死んだ者は生き返らない――\nそれすら、公平じゃないっていうのか」
1659 = "「死者無法復生——就連這點，都是不公平的嗎」" 

# monologue
# JP: 路子を死へと追いやって、\n鉄道も滅びたのなら、それは当然の報いだ。
2327 = "既然鐵路害死了路子，它的覆滅就是理所應當的報應。" 

# monologue
# JP: なのに――
2087 = "可是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんで、鉄道だけが……」
1564 = "「憑什麼，只有鐵路……」" 

# monologue
# JP: （ガタン、ゴトンっ）
2578 = "（哐當、哐當）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！」
1839 = "「！！！！！」" 

# monologue
# JP: 音が聞こえる。\n体が震え目の前が昏く赤くなり、胸がぎゅうっと潰される。
2287 = "我聽到了聲音。身體不停地顫抖，眼前一片暗紅，胸口彷彿被壓著一般喘不過氣。" 

# monologue
# JP: 血の臭い。鉄の軋む音。ぐにゃりと力の無い手触り――\n全てがぶわりと、僕の足元から這い登ってくる。
2439 = "血腥味、鐵塊的摩擦聲、觸碰那無力的身體時的手感——那天的一切，從我的腳底慢慢爬上來。" 

# monologue
# JP: （だめ、だ――そんな、こと）
2567 = "（不行——不能這麼想）" 

# monologue
# JP: ――路子は、僕を突き放した。\n引き離されるとわかっても、それでも僕を事故から逃した。
1122 = "——路子推開了我。明知那樣會使我們分離，依然選擇了讓我倖免於難。" 

# monologue
# JP: ――汰斗さんは、僕に教えてくれた。\n路子を救えなかった分、他の誰かを救うことこそ報いだと。
1120 = "——汰斗老爺教導我。既然沒能救到路子，那麼去拯救其他人，就是對她的報答。" 

# monologue
# JP: （納得した。納得したんだ。\nだから、僕はこんなに無様にだって生き延びている）
2586 = "（我明白。我想通了。所以，我才會這樣苟延殘喘地活著）" 

# monologue
# JP: なのに、思いついてしまう。\n思いついてしまえばソレが、もう頭から離れない。
2034 = "但是，我還是會去想。一旦想到，便在腦海中揮之不去。" 

# monologue
# JP: （僕が……このまま轢かれてしまえば――）
2584 = "（如果我……就這樣被它碾過去——）" 

# monologue
# JP: 路子は死んだ。\n路子を死へと追いやった、僕も本当は死ぬべきだった。
2485 = "路子死了。將路子害死的我，也本該死去。" 

# monologue
# JP: 同じく死すべき鉄道も、復活初日に事故が起きれば――\n『公平に』全てをそれで、終わらせることが……
2419 = "而同樣該死的鐵路，如果在復活的第一天就發生事故——我就能為這一切，“公平地”畫上句號……" 

# monologue
# JP: （ああ、そうだよ――確実に『出来る』んだ）
2580 = "（啊，對啊——我完全可以“做到”）" 

# monologue
# JP: 少なくとも、僕にとっての全てを、終わりに。
2429 = "至少對我而言，一切都將結束。" 

# monologue
# JP: （けどそれじゃ――路子のしたことが無駄になる）
2569 = "（但是這樣的話——路子所做的一切都將白費）" 

# monologue
# JP: わかってはいる。\nわかっているけど、あまりにも痛く、息苦しい。
2289 = "我都明白。但實在太痛苦、太難受了。" 

# monologue
# JP: 何をやったって拭えない、\nこの血の臭いと軋む音から、それで解放されるなら――
2175 = "如果這樣做，可以擺脫這無法消散的血腥味與摩擦聲的話——" 

# monologue
# JP: （くいっ）
2587 = "（拉）" 

# 【ポーレット】
# display as ？？？
# JP: 「あぶない。近い」
1428 = "「危險。太近了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
1841 = "「！？」" 

# monologue
# JP: 上着の裾を引っ張られ、\n反射で振り向きかけた、瞬間――
2441 = "衣袖被扯了一下，我反射性地轉過身。在那一瞬間——" 

# monologue
# JP: （ごうっ！）
2582 = "（嗚——）" 

# monologue
# JP: ――風圧。\n姿勢を崩され、横倒しにされてしまいそうなほど。
1117 = "——是風壓。強到我無法站穩，差一點被吹倒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1838 = "「！」" 

# monologue
# JP: “危険”と感じたのだろう、体が勝手に動いてしまう。
2296 = "或許是因為察覺到了“危險”，我的身體不自主地動了起來。" 

# 【ポーレット】
# display as ？？？
# JP: 「きゃっ」
1455 = "「呀！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん」
1477 = "「啊，抱歉」" 

# monologue
# JP: いきなり覆いかぶさられ、驚き怯えたのだろう。\n悲鳴に近い声にあわてて、体を離す。
2131 = "大概是因為突然被壓倒，嚇到她了吧。我聽到她近乎於慘叫的聲音，連忙站起身。" 

# 【双鉄】
# display as 雙鐵
# JP: 「驚かせるつもりは――」
1596 = "「我沒想要嚇到你——」" 

# monologue
# JP: 目を奪われる。
2278 = "我的視線被她牢牢吸引住了。" 

# monologue
# JP: 金の髪が、まだ収まらぬ風に煽られ踊っている。\n瞳は青。御一夜の空より、クマ川よりなお、澄んだ青。
2504 = "還未收住勢頭的勁風，撥弄著她金色的秀髮。她那碧藍的雙眸比御一夜的天空、隈河的河水還要清澈幾分。" 

# 【ポーレット】
# display as 金發少女
# JP: 「あの。大丈夫。わかってる。ます。\nあなた。わたし。助けた――かばう。した」
1793 = "「那個，沒關係。我知道，知道的。你，救了，我——保護了，我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、そう……かな……」
1500 = "「嗯，是這樣……吧……」" 

# monologue
# JP: 違う、本当は全く違う。\n助けられたのは、僕の方だ。
2009 = "不，不是這樣的。是你，救了我。" 

# monologue
# JP: あの瞬間、\nこの少女の手が僕を捕まえてなかったら――
2063 = "剛才那一瞬間，如果這位少女沒有抓住我的手——" 

# 【ポーレット】
# display as 金發少女
# JP: 「わたし。ありがとう。あなた」
1602 = "「我，謝謝，你」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕の方こそ――ん？」
1364 = "「不，我才應該說——嗯？」" 

# monologue
# JP: 小さなお辞儀。金の髪とともに。\nああ……なら、この子は。
2170 = "她輕輕地鞠躬，一頭金髮隨著她的動作舞動。啊……那麼，這個女孩是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉄道の写真を、撮りにきたのか？」
1396 = "「你是來拍鐵路的照片的嗎？」" 

# 【ポーレット】
# display as 金發少女
# JP: 「そう。ここ。撮影いい場所。言った。パパが。\nわたし。違う。写真うまい。けど。頼まれた」
1544 = "「對。爸爸，說，這裡，拍照好地方。我，拍照，不好。但是，讓我來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、父親に頼まれて撮りに来たのか」
1771 = "「這樣啊，是你父親讓你來拍照」" 

# monologue
# JP: ならばこの子の父親は、鉄道マニアという人種なのだろう。
2515 = "那麼這女孩的父親，就是所謂的鐵路迷吧。" 

# monologue
# JP: 湯医線の復活のその日を写真に収めたく、\nしかし仕事の都合がつかず、娘に代わりを頼むレベルの。
2023 = "他想用照片記錄下湯醫線復活的這一天。哪怕因為工作來不了，也要拜託自己的女兒替他來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……すまん。\n僕のせいで、シャッターチャンスを逃させてしまったな」
1174 = "「……抱歉。我害你錯過了拍照的機會」" 

# 【ポーレット】
# display as 金發少女
# JP: 「あ！」
1475 = "「啊！」" 

# monologue
# JP: そうだった、と言わんばかりの大きな頷き。
2143 = "她像是才想起剛才發生了什麼事，點頭說道。" 

# 【ポーレット】
# display as 金發少女
# JP: 「あの、あなた。危ないだった。\nなぜなら。線路。たくさん近い」
1792 = "「那個，你，剛才危險。因為，線路，好近」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうだよな。\nすまなかった」
1470 = "「啊……對啊。抱歉」" 

# monologue
# JP: 今度は僕が深々お辞儀。\n慌てたような困ったような言葉が頭上を過ぎていく。
2496 = "這次換成我，深深地鞠躬。我頭頂上方傳來了她略帶慌張和為難的聲音。" 

# 【ポーレット】
# display as 金發少女
# JP: 「好き、鉄道。わかる。近く、見たい。気持ち」
1487 = "「喜歡，鐵路。想，湊近看。我，明白」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕は鉄道好きなのではない」
1362 = "「不，我不喜歡鐵路」" 

# 【ポーレット】
# display as 金發少女
# JP: 「？」
1842 = "「？」" 

# monologue
# JP: きょとんと、大きく見開かれる目。
2157 = "她睜大了眼睛，滿是疑惑。" 

# monologue
# JP: あどけなく――路子の瞳とおんなじように――\n思えば、言葉が止まらなくなる。
2153 = "她的眼睛與路子的一模一樣——天真無邪。想到這裡，我再也止不住自己的話語。" 

# 【双鉄】
# display as 雙鐵
# JP: 「むしろ――憎んでいる。\n憎んで、恨んで。終わらせたいとさえ思っている」
1355 = "「不如說——我恨鐵路。憎恨著、怨恨著。甚至想要親手毀了它」" 

# 【ポーレット】
# display as 金發少女
# JP: 「ん～っ……？」
1489 = "「嗯——？」" 

# monologue
# JP: 青い瞳が見開かれたまま、\n眉根がきゅうっと、困ったように寄ってくる。
2140 = "她依然睜著那雙藍色的大眼睛，彷彿很為難一般地皺起了眉頭。" 

# 【ポーレット】
# display as 金發少女
# JP: 「ニクンディ？　ウランディ？」
1563 = "「憎很？　怨很？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん」
# 1477 = "「啊，抱歉」" 

# monologue
# JP: 洋酒の名前でも呟くような、\n伝わっていないオウム返しに、毒気を抜かれる。
2229 = "彷彿在念洋酒的名字一般，她充滿疑惑地重複著我的話。她天真的聲音將我的負面情緒驅散。" 

# monologue
# JP: （この子は、愛されて育っているのだろうな――\n憎しみ、恨みという言葉を、学ばずにいて済むほどに）
2599 = "（這個女孩的生活中，一定是充滿了愛吧——甚至都沒有學過“憎恨”、“怨恨”這樣的詞彙）" 

# monologue
# JP: そう感じれば、息苦しさも、\nほんのすこしだけ和らぐ気がする。
2494 = "這樣一想，我的呼吸也變得順暢了一些。" 

# 【双鉄】
# display as 雙鐵
# JP: 「簡単にいえば、僕は鉄道を好きではない。\n好きと、違う。ということだ」
1718 = "「簡單來說就是，我不喜歡鐵路。也就是說，不是“喜歡”」" 

# 【ポーレット】
# display as 金發少女
# JP: 「好き。違う……ん――……嫌い？　鉄道」
1360 = "「不是，喜歡……嗯——……鐵路，討厭？　」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ」
1498 = "「嗯，是的」" 

# 【ポーレット】
# display as 金發少女
# JP: 「嫌い？　嫌い、なのに――なんで、あなた――。\n名前、ええと――」
1742 = "「討厭？　明明，討厭——為什麼，你——名字，那個——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕か？　僕は双鉄、右田双鉄」
1580 = "「我嗎？　我叫雙鐵，右田雙鐵」" 

# 【ポーレット】
# display as 金發少女
# JP: 「ソウテツ……ちゃん？――くん？\nソウテツくん？」
1820 = "「雙鐵……哥？——君？雙鐵君？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、双鉄くんでかまわん」
1497 = "「嗯，叫我雙鐵君就好」" 

# 【ポーレット】
# display as 金發少女
# JP: 「ソウテツくん。どうして？\n嫌い、鉄道。なのに、見る。じっと。近くで？」
1825 = "「雙鐵君，為什麼，討厭，鐵路，還要，近處，仔細，看？」" 

# monologue
# JP: 僕の憎しみは伝わらない。深い部分は、理解されない。\n通りすがりのこの子と二度と、会うことも無い。
2135 = "她不會明白我的憎恨，不會理解我內心深處的複雜情感。而我與這個正巧路過的女孩應該也不會再次碰面。" 

# monologue
# JP: その気安さが、\n喉に心にこびりついている思いを、剥がす。
2495 = "這樣一種輕鬆的心態讓我解除了心防，得以說出一直掩埋在心中的話語。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……目を、動かせなくなったんだ。\n列車ではなく、過去の、事故を見てしまって」
1173 = "「……我，無法移開視線。我看到的不是列車，而是過去發生的事故」" 

# 【ポーレット】
# display as 金發少女
# JP: 「んー？」
# 1489 = "「嗯——？」" 

# monologue
# JP: 真闇姉にも、日々姫にも、\n汰斗さんにさえ、話せぬ思い。
2199 = "對真闇姐、日日姬，甚至對汰斗老爺都無法傾訴的話語。" 

# monologue
# JP: 過去の事故を、その傷を。\n憎しみを痛みを苦しみを、喉から吐き出す。
