[script]
# lines: 405 
# 【双鉄】
# display as 雙鐵
# JP: 「……うざったい」
1171 = "「......Phiền phức thật.」"
# monologue
# JP: 僕の命が最優先かなんだかしらないが、\n四六時中頭の上を飛びまわるのはやめて欲しい。
2051 = "Chẳng biết có phải mạng sống của tôi là ưu tiên hàng đầu hay không,\nnhưng tôi mong nó ngừng cái việc lúc nào cũng bay vòng vòng trên đầu tôi đi."
# monologue
# JP: 僕を助けてくれたのはナビで、今も助けてくれてる。\nそのことは、百も承知をしているけど――
2506 = "Người đã cứu tôi là Navi, và hiện tại nó vẫn đang giúp đỡ tôi.\nChuyện đó tôi biết rõ hơn ai hết, nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「こんな日くらい、一人にさせて欲しいのに」
1724 = "「Ít nhất vào những ngày như thế này, tôi muốn được ở một mình cơ mà.」"
# monologue
# JP: 鉄道がとっくに廃線となり、\nだから安心して暮らせていた、この町、御一夜。
2230 = "Đường sắt đã bị bỏ hoang từ lâu,\nnhờ vậy mà tôi mới có thể an tâm sinh sống ở thị trấn Ohimitera này."
# monologue
# JP: 市長候補の一人が、湯医線を市営鉄道として復活させると\n……そんな公約、誰も相手にしないと信じきっていた。
2532 = "Một trong những ứng cử viên thị trưởng, muốn khôi phục tuyến Yui thành đường sắt của thành phố\n......Tôi đã tin chắc rằng sẽ chẳng có ai quan tâm đến một lời hứa hẹn tranh cử như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「なのに、まさか当選して、\n鉄道が本当に復活するとか……」
1662 = "「Vậy mà, không ngờ người đó lại trúng cử,\nđường sắt lại thực sự được khôi phục......」"
# monologue
# JP: 廃炭鉱の近くで\\x%lエアクラ;#00ffc040;エアクラ%l;#;が使えなくなるから、\nすごい遠回りを強いられる――
2225 = "Bởi vì gần khu mỏ than bỏ hoang không thể sử dụng \\x%lエアクラ;#00ffc040;Aircra%l;#;,\nnên bắt buộc phải đi đường vòng rất xa——"
# monologue
# JP: それが、鉄道復活の要望につながったとも聞いた。
2315 = "Tôi nghe nói điều đó đã dẫn đến yêu cầu khôi phục đường sắt."
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、遠回りぐらい……便利に慣れすぎるから、\n少しの不便も、我慢できなくなるんだ」
1719 = "「Gì chứ, đi đường vòng một chút thì đã sao...... vì đã quá quen với sự tiện lợi,\nnên chỉ một chút bất tiện nhỏ cũng không thể chịu đựng được.」"
# monologue
# JP: そうした怠け心が、憎い。\nそれで鉄道を復活させる、極端な判断が我慢ならない。
2274 = "Cái tâm lý lười biếng đó, thật đáng ghét.\nTôi không thể chịu đựng được quyết định cực đoan là khôi phục đường sắt chỉ vì lý do đó."
# monologue
# JP: ムカつきすぎて押しつぶされて苦しくて、\n言葉を混ぜでもしなければ、息を吐き出すことも出来ない。
2243 = "Sự tức giận đè nén khiến tôi đau đớn,\nnếu không bật ra thành lời, tôi thậm chí còn chẳng thể thở nổi."
# 【双鉄】
# display as 雙鐵
# JP: 「死んだ者は生き返らない――\nそれすら、公平じゃないっていうのか」
1659 = "「Người chết thì không thể sống lại——\nĐến cả điều đó, cũng là không công bằng sao.」"
# monologue
# JP: 路子を死へと追いやって、\n鉄道も滅びたのなら、それは当然の報いだ。
2327 = "Đường sắt đã đẩy Michiko vào chỗ chết,\nnên nếu nó có bị diệt vong, thì đó cũng là quả báo thích đáng."
# monologue
# JP: なのに――
2087 = "Thế mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「なんで、鉄道だけが……」
1564 = "「Tại sao, chỉ có đường sắt là......」"
# monologue
# JP: （ガタン、ゴトンっ）
2578 = "（Xình xịch, xình xịch）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！」
1839 = "「!!!!!」"
# monologue
# JP: 音が聞こえる。\n体が震え目の前が昏く赤くなり、胸がぎゅうっと潰される。
2287 = "Tôi nghe thấy âm thanh đó.\nCơ thể run rẩy, trước mắt tối sầm lại và chuyển sang màu đỏ, lồng ngực như bị bóp nghẹt."
# monologue
# JP: 血の臭い。鉄の軋む音。ぐにゃりと力の無い手触り――\n全てがぶわりと、僕の足元から這い登ってくる。
2439 = "Mùi máu tanh. Tiếng sắt thép nghiến vào nhau. Xúc cảm mềm nhũn, vô lực——\nTất cả đột ngột trào lên, bò từ dưới chân tôi lên."
# monologue
# JP: （だめ、だ――そんな、こと）
2567 = "（Không, được——chuyện, đó）"
# monologue
# JP: ――路子は、僕を突き放した。\n引き離されるとわかっても、それでも僕を事故から逃した。
1122 = "——Michiko đã đẩy tôi ra.\nDù biết sẽ bị chia cắt, em ấy vẫn cứu tôi khỏi vụ tai nạn."
# monologue
# JP: ――汰斗さんは、僕に教えてくれた。\n路子を救えなかった分、他の誰かを救うことこそ報いだと。
1120 = "——Ông Taito đã dạy tôi.\nVì không thể cứu được Michiko, nên việc cứu một ai đó khác mới chính là sự đền đáp."
# monologue
# JP: （納得した。納得したんだ。\nだから、僕はこんなに無様にだって生き延びている）
2586 = "（Mình đã chấp nhận. Mình đã hiểu rồi.\nĐó là lý do tại sao, mình vẫn đang sống một cách thảm hại thế này.）"
# monologue
# JP: なのに、思いついてしまう。\n思いついてしまえばソレが、もう頭から離れない。
2034 = "Vậy mà, tôi lại lỡ nghĩ đến nó.\nMột khi đã nghĩ đến, thì ý nghĩ đó không tài nào dứt ra khỏi đầu được nữa."
# monologue
# JP: （僕が……このまま轢かれてしまえば――）
2584 = "（Nếu mình...... cứ thế này bị cán qua thì——）"
# monologue
# JP: 路子は死んだ。\n路子を死へと追いやった、僕も本当は死ぬべきだった。
2485 = "Michiko đã chết.\nKẻ đã đẩy Michiko vào chỗ chết là tôi, đáng lẽ ra cũng phải chết."
# monologue
# JP: 同じく死すべき鉄道も、復活初日に事故が起きれば――\n『公平に』全てをそれで、終わらせることが……
2419 = "Cái đường sắt đáng chết kia, nếu xảy ra tai nạn ngay trong ngày đầu tiên khôi phục——\nThì tôi có thể kết thúc mọi thứ một cách 『công bằng』......"
# monologue
# JP: （ああ、そうだよ――確実に『出来る』んだ）
2580 = "（À, đúng rồi——chắc chắn là mình 『làm được』.）"
# monologue
# JP: 少なくとも、僕にとっての全てを、終わりに。
2429 = "Ít nhất là, kết thúc mọi thứ đối với tôi."
# monologue
# JP: （けどそれじゃ――路子のしたことが無駄になる）
2569 = "（Nhưng nếu làm vậy——những gì Michiko đã làm sẽ trở nên vô ích.）"
# monologue
# JP: わかってはいる。\nわかっているけど、あまりにも痛く、息苦しい。
2289 = "Tôi biết chứ.\nTôi biết, nhưng nó quá đau đớn, quá ngột ngạt."
# monologue
# JP: 何をやったって拭えない、\nこの血の臭いと軋む音から、それで解放されるなら――
2175 = "Dù có làm gì cũng không thể xóa nhòa được,\nnếu làm thế mà có thể giải thoát khỏi mùi máu tanh và tiếng nghiến ken két này thì——"
# monologue
# JP: （くいっ）
2587 = "（Giật nhẹ）"
# 【ポーレット】
# display as ？？？
# JP: 「あぶない。近い」
1428 = "「Nguy hiểm. Gần quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！？」
1841 = "「!?」"
# monologue
# JP: 上着の裾を引っ張られ、\n反射で振り向きかけた、瞬間――
2441 = "Bị kéo vạt áo khoác,\nngay khoảnh khắc tôi phản xạ định quay lại nhìn——"
# monologue
# JP: （ごうっ！）
2582 = "（Vù!）"
# monologue
# JP: ――風圧。\n姿勢を崩され、横倒しにされてしまいそうなほど。
1117 = "——Áp lực gió.\nMạnh đến mức khiến tôi mất thăng bằng, tưởng chừng như sắp ngã nhào sang một bên."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1838 = "「!」"
# monologue
# JP: “危険”と感じたのだろう、体が勝手に動いてしまう。
2296 = "Có lẽ vì cảm thấy \"nguy hiểm\", cơ thể tôi tự động phản ứng."
# 【ポーレット】
# display as ？？？
# JP: 「きゃっ」
1455 = "「Á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん」
1477 = "「A, xin lỗi.」"
# monologue
# JP: いきなり覆いかぶさられ、驚き怯えたのだろう。\n悲鳴に近い声にあわてて、体を離す。
2131 = "Đột nhiên bị đè lên người, chắc cô ấy sợ hãi và kinh ngạc lắm.\nNghe thấy tiếng kêu gần như là tiếng thét, tôi vội vàng rời khỏi người cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「驚かせるつもりは――」
1596 = "「Tôi không định làm cô giật mình——」"
# monologue
# JP: 目を奪われる。
2278 = "Ánh mắt tôi bị hút chặt."
# monologue
# JP: 金の髪が、まだ収まらぬ風に煽られ踊っている。\n瞳は青。御一夜の空より、クマ川よりなお、澄んだ青。
2504 = "Mái tóc vàng tung bay trong cơn gió vẫn chưa dứt.\nĐôi mắt màu xanh thẳm. Một màu xanh trong trẻo hơn cả bầu trời Ohimitera, hơn cả dòng sông Kuma."
# 【ポーレット】
# display as 金發少女
# JP: 「あの。大丈夫。わかってる。ます。\nあなた。わたし。助けた――かばう。した」
1793 = "「À. Không sao. Tôi hiểu. Mà.\nAnh. Đã cứu. Tôi——Bảo vệ. Cho tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、そう……かな……」
1500 = "「Chà, chắc...... là vậy......」"
# monologue
# JP: 違う、本当は全く違う。\n助けられたのは、僕の方だ。
2009 = "Không, thực ra hoàn toàn không phải.\nNgười được cứu, là tôi mới đúng."
# monologue
# JP: あの瞬間、\nこの少女の手が僕を捕まえてなかったら――
2063 = "Khoảnh khắc đó,\nnếu bàn tay của thiếu nữ này không kéo tôi lại——"
# 【ポーレット】
# display as 金發少女
# JP: 「わたし。ありがとう。あなた」
1602 = "「Tôi. Cảm ơn. Anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕の方こそ――ん？」
1364 = "「Không, tôi mới là người phải——hửm?」"
# monologue
# JP: 小さなお辞儀。金の髪とともに。\nああ……なら、この子は。
2170 = "Một cái cúi đầu nhẹ. Cùng với mái tóc vàng.\nA...... nếu vậy, cô bé này."
# 【双鉄】
# display as 雙鐵
# JP: 「鉄道の写真を、撮りにきたのか？」
1396 = "「Cô đến đây để chụp ảnh đường sắt sao?」"
# 【ポーレット】
# display as 金發少女
# JP: 「そう。ここ。撮影いい場所。言った。パパが。\nわたし。違う。写真うまい。けど。頼まれた」
1544 = "「Đúng vậy. Ở đây. Chỗ chụp ảnh tốt. Ba tôi. Nói vậy.\nTôi. Không. Chụp ảnh giỏi. Nhưng. Bị nhờ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、父親に頼まれて撮りに来たのか」
1771 = "「Vậy sao, cô được ba nhờ đến đây chụp ảnh à.」"
# monologue
# JP: ならばこの子の父親は、鉄道マニアという人種なのだろう。
2515 = "Nếu vậy, ba của cô bé này chắc hẳn là kiểu người đam mê đường sắt."
# monologue
# JP: 湯医線の復活のその日を写真に収めたく、\nしかし仕事の都合がつかず、娘に代わりを頼むレベルの。
2023 = "Đam mê đến mức muốn lưu lại hình ảnh ngày tuyến Yui được khôi phục,\nnhưng vì bận công việc nên đành phải nhờ con gái đi thay."
# 【双鉄】
# display as 雙鐵
# JP: 「……すまん。\n僕のせいで、シャッターチャンスを逃させてしまったな」
1174 = "「......Xin lỗi nhé.\nVì tôi mà cô đã bỏ lỡ mất cơ hội bấm máy rồi.」"
# 【ポーレット】
# display as 金發少女
# JP: 「あ！」
1475 = "「A!」"
# monologue
# JP: そうだった、と言わんばかりの大きな頷き。
2143 = "Cô ấy gật đầu thật mạnh như thể muốn nói \"Đúng là vậy rồi\"."
# 【ポーレット】
# display as 金發少女
# JP: 「あの、あなた。危ないだった。\nなぜなら。線路。たくさん近い」
1792 = "「À này, anh. Đã rất nguy hiểm.\nBởi vì. Đường ray. Rất gần.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうだよな。\nすまなかった」
1470 = "「À...... đúng vậy nhỉ.\nXin lỗi nhé.」"
# monologue
# JP: 今度は僕が深々お辞儀。\n慌てたような困ったような言葉が頭上を過ぎていく。
2496 = "Lần này đến lượt tôi cúi gập người.\nNhững lời nói mang vẻ bối rối và khó xử lướt qua trên đỉnh đầu tôi."
# 【ポーレット】
# display as 金發少女
# JP: 「好き、鉄道。わかる。近く、見たい。気持ち」
1487 = "「Thích, đường sắt. Tôi hiểu. Muốn, nhìn gần. Cảm giác đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕は鉄道好きなのではない」
1362 = "「Không, tôi không hề thích đường sắt.」"
# 【ポーレット】
# display as 金發少女
# JP: 「？」
1842 = "「?」"
# monologue
# JP: きょとんと、大きく見開かれる目。
2157 = "Đôi mắt mở to tròn, ngơ ngác."
# monologue
# JP: あどけなく――路子の瞳とおんなじように――\n思えば、言葉が止まらなくなる。
2153 = "Ngây thơ——giống hệt như đôi mắt của Michiko——\nNghĩ đến đó, tôi không thể kìm lại những lời sắp nói ra."
# 【双鉄】
# display as 雙鐵
# JP: 「むしろ――憎んでいる。\n憎んで、恨んで。終わらせたいとさえ思っている」
1355 = "「Đúng hơn là——tôi căm ghét nó.\nCăm ghét, và oán hận. Thậm chí tôi còn muốn kết liễu nó.」"
# 【ポーレット】
# display as 金發少女
# JP: 「ん～っ……？」
1489 = "「Ưm~......?」"
# monologue
# JP: 青い瞳が見開かれたまま、\n眉根がきゅうっと、困ったように寄ってくる。
2140 = "Đôi mắt xanh thẳm vẫn mở to,\nnhưng đầu chân mày lại nhíu chặt lại như đang bối rối."
# 【ポーレット】
# display as 金發少女
# JP: 「ニクンディ？　ウランディ？」
1563 = "「Căm ghéyt? Oán hựn?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん」
# 1477 = "「啊，抱歉」" 
# monologue
# JP: 洋酒の名前でも呟くような、\n伝わっていないオウム返しに、毒気を抜かれる。
2229 = "Cách cô ấy lặp lại lời tôi như một con vẹt mà chẳng hiểu gì, giống hệt như đang lẩm bẩm tên một loại rượu Tây nào đó,\nđã rút cạn đi sự hằn học trong tôi."
# monologue
# JP: （この子は、愛されて育っているのだろうな――\n憎しみ、恨みという言葉を、学ばずにいて済むほどに）
2599 = "（Chắc hẳn cô bé này đã lớn lên trong sự yêu thương——\nđến mức không cần phải học những từ như căm ghét, hay oán hận.）"
# monologue
# JP: そう感じれば、息苦しさも、\nほんのすこしだけ和らぐ気がする。
2494 = "Cảm thấy như vậy, sự ngột ngạt trong tôi,\ncũng dường như dịu đi đôi chút."
# 【双鉄】
# display as 雙鐵
# JP: 「簡単にいえば、僕は鉄道を好きではない。\n好きと、違う。ということだ」
1718 = "「Nói đơn giản thì, tôi không thích đường sắt.\nNghĩa là, không phải thích.」"
# 【ポーレット】
# display as 金發少女
# JP: 「好き。違う……ん――……嫌い？　鉄道」
1360 = "「Không. Thích...... ưm——...... Ghét? Đường sắt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ」
1498 = "「Ừ, đúng vậy.」"
# 【ポーレット】
# display as 金發少女
# JP: 「嫌い？　嫌い、なのに――なんで、あなた――。\n名前、ええと――」
1742 = "「Ghét? Đã ghét, vậy mà——tại sao, anh——.\nTên, ừm——」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕か？　僕は双鉄、右田双鉄」
1580 = "「Tôi á? Tôi là Soutetsu, Migita Soutetsu.」"
# 【ポーレット】
# display as 金發少女
# JP: 「ソウテツ……ちゃん？――くん？\nソウテツくん？」
1820 = "「Soutetsu...... chan?——kun?\nSoutetsu-kun?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、双鉄くんでかまわん」
1497 = "「Ừ, gọi Soutetsu-kun cũng được.」"
# 【ポーレット】
# display as 金發少女
# JP: 「ソウテツくん。どうして？\n嫌い、鉄道。なのに、見る。じっと。近くで？」
1825 = "「Soutetsu-kun. Tại sao?\nGhét, đường sắt. Vậy mà, lại nhìn. Chằm chằm. Ở gần?」"
# monologue
# JP: 僕の憎しみは伝わらない。深い部分は、理解されない。\n通りすがりのこの子と二度と、会うことも無い。
2135 = "Sự căm ghét của tôi không thể truyền đạt được. Những điều sâu xa, sẽ không được thấu hiểu.\nTôi cũng sẽ chẳng bao giờ gặp lại cô bé tình cờ lướt qua này nữa."
# monologue
# JP: その気安さが、\n喉に心にこびりついている思いを、剥がす。
2495 = "Sự thoải mái đó,\nđã bóc trần những suy nghĩ bám chặt nơi cổ họng và trái tim tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……目を、動かせなくなったんだ。\n列車ではなく、過去の、事故を見てしまって」
1173 = "「......Tôi, không thể rời mắt được.\nTôi không nhìn thấy đoàn tàu, mà là nhìn thấy vụ tai nạn, trong quá khứ.」"
# 【ポーレット】
# display as 金發少女
# JP: 「んー？」
# 1489 = "「嗯——？」" 
# monologue
# JP: 真闇姉にも、日々姫にも、\n汰斗さんにさえ、話せぬ思い。
2199 = "Những tâm tư mà tôi chẳng thể nói với chị Mayami, với Hibiki,\nhay thậm chí là với cả ông Taito."
# monologue
# JP: 過去の事故を、その傷を。\n憎しみを痛みを苦しみを、喉から吐き出す。
2262 = "Về vụ tai nạn trong quá khứ, về vết thương đó.\nTôi trút hết ra khỏi cổ họng những căm hờn, đau đớn và khổ sở."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、鉄道事故に遭い、\n多くを失い、傷ついた」
1599 = "「Tôi đã gặp tai nạn đường sắt,\nmất đi rất nhiều thứ, và bị tổn thương.」"
# monologue
# JP: ただ、それだけ。\n大きな苦い塊のような、その言葉だけ。
2400 = "Chỉ vậy thôi.\nChỉ những lời nói đó thôi, mà nặng nề như một khối đắng ngắt khổng lồ."
# 【ポーレット】
# display as 金發少女
# JP: 「……事故」
1166 = "「......Tai nạn.」"
# monologue
# JP: 伝わったのか、伝わらんのか。\n迷わせられる空白を、静かな言葉が埋めていく。
2345 = "Cô ấy có hiểu được hay không.\nKhoảng không tĩnh lặng đầy hoang mang đó, đã được lấp đầy bằng những lời thì thầm."
# 【ポーレット】
# display as 金發少女
# JP: 「事故、良くない。双鉄くん。怖い、痛い。\nかわいそう」
1373 = "「Tai nạn, không tốt. Soutetsu-kun. Sợ, đau.\nTội nghiệp quá.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……」
1160 = "「......」"
# monologue
# JP: 語彙が、ひどく乏しいせいで、\n慰めがまっすぐ染み入ってくる。
2148 = "Bởi vì vốn từ vựng vô cùng ít ỏi,\nnên những lời an ủi ấy lại thấm thẳng vào lòng tôi."
# monologue
# JP: 事故は良くない。痛くて、怖くて……\nあんな思いをさせられた僕らは――確かにかわいそうだ。
2016 = "Tai nạn là không tốt. Rất đau, rất đáng sợ......\nChúng tôi, những người phải trải qua chuyện đó——đúng là rất tội nghiệp."
# 【ポーレット】
# display as 金發少女
# JP: 「でも、事故。鉄道、\\x%l列車;#00ffc040;列車%l;#;、良くない、違う。\n嫌いなる。だから、違う」
1380 = "「Nhưng, tai nạn. Không phải lỗi của, đường sắt, \\x%l列車;#00ffc040;đoàn tàu%l;#;.\nNên. Ghét, là sai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1840 = "「!!?」"
# monologue
# JP: 怒声が喉からほとばしりかけ、\nけれどもなんとか――グっと呑み込む。
2291 = "Tiếng quát tháo chực trào ra khỏi cổ họng,\nnhưng bằng cách nào đó——tôi đã nuốt nó xuống."
# monologue
# JP: 女の子を脅し怖がらせるなど、\nそれこそ、良くないことだから。
2117 = "Việc dọa nạt làm một cô gái sợ hãi,\nđó mới chính là việc không tốt."
# 【双鉄】
# display as 雙鐵
# JP: 「何故、そんなことを言う？\n鉄道事故で、鉄道も\\x%l列車;#00ffc040;列車%l;#;も悪くないなど――」
1674 = "「Tại sao cô lại nói như vậy?\nTai nạn đường sắt, mà đường sắt và \\x%l列車;#00ffc040;đoàn tàu%l;#; lại không có lỗi sao——」"
# 【ポーレット】
# display as 金發少女
# JP: 「あの……。ん――」
1789 = "「Cái đó...... Ừm——」"
# monologue
# JP: 抑えに抑えた言葉でもなお、困った顔にさせてしまう。\n反省と罪悪感とがすごい勢いで湧いてくる。
2071 = "Dù đã kìm nén hết mức, lời nói của tôi vẫn khiến cô ấy lộ vẻ khó xử.\nSự hối hận và cảm giác tội lỗi trào dâng mãnh liệt."
# monologue
# JP: 出会ったばかりの少女に僕は、\nいったい、何を求めているのか――
2283 = "Đối với một thiếu nữ mới gặp lần đầu,\nrốt cuộc tôi đang đòi hỏi điều gì cơ chứ——"
# 【ポーレット】
# display as 金發少女
# JP: 「ええと……包丁」
1790 = "「Ừm...... Dao phay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「包丁？」
1735 = "「Dao phay?」"
# monologue
# JP: 唐突すぎるその一言に、ゼスチャーでもって確認してみる。
2423 = "Trước một từ quá đỗi đường đột, tôi thử dùng cử chỉ tay để xác nhận lại."
# monologue
# JP: 少女は頷き、とんとんと、みじん切りをするゼスチャーで、\n間違いないと返してくれる。
2206 = "Thiếu nữ gật đầu, làm động tác băm băm thái nhỏ,\nđể phản hồi rằng tôi không nghe nhầm."
# 【ポーレット】
# display as 金發少女
# JP: 「双鉄くん。使う、包丁。事故。\nとんとんとんとん、ザクっ。痛い、怖い」
1823 = "「Soutetsu-kun. Dùng, dao phay. Tai nạn.\nBăm băm băm băm, phập. Đau, sợ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……包丁を使っていて、\n誤って自分の手を切って怪我をした」
1177 = "「......Đang dùng dao phay,\nvà lỡ tay cắt trúng tay mình bị thương.」"
# 【ポーレット】
# display as 金發少女
# JP: 「そう。そのとき」
1545 = "「Đúng. Lúc đó.」"
# monologue
# JP: 青い瞳に、見つめられる。
2403 = "Đôi mắt xanh thẳm, nhìn chằm chằm vào tôi."
# monologue
# JP: 生まれて初めて見た空は、こんな色だったかもしれん、と。\nふと、思い出したような気にさせられる。
2247 = "Bầu trời lần đầu tiên tôi nhìn thấy khi chào đời, có lẽ cũng mang màu sắc này chăng.\nBất chợt, tôi có cảm giác như mình vừa nhớ ra điều đó."
# 【ポーレット】
# display as 金發少女
# JP: 「双鉄くん。なる？　嫌い。包丁。\n――悪い？　包丁」
1824 = "「Soutetsu-kun. Sẽ? Ghét. Dao phay.\n——Có lỗi? Dao phay.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや」
1354 = "「Không.」"
# monologue
# JP: 素朴な問いだ。\n悩むまでもなく答えている。
1985 = "Một câu hỏi mộc mạc.\nTôi trả lời ngay mà không cần suy nghĩ."
# 【双鉄】
# display as 雙鐵
# JP: 「そんなのは包丁の責任の筈がない。\n道具ではなく、使い方や手入れを間違った僕が――」
1769 = "「Chuyện đó không thể nào là trách nhiệm của con dao phay được.\nKhông phải do dụng cụ, mà là do tôi đã sử dụng và bảo quản sai cách——」"
# monologue
# JP: ぼろりと、目からウロコが落ちる。
2266 = "Tôi như bừng tỉnh, màn sương mù che khuất tầm mắt bỗng tan biến."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……そうか」
1472 = "「À...... ra là vậy.」"
# monologue
# JP: 言葉とともに、理解とともに、ボロリ、ボロボロ。\n恨みと憎しみで出来た目ヤニが、剥がれ落ちてく。
2029 = "Cùng với những lời nói đó, cùng với sự thấu hiểu, từng chút, từng chút một.\nLớp rỉ mắt tạo nên từ sự oán hận và căm ghét, đang dần bong tróc và rơi rụng."
# 【双鉄】
# display as 雙鐵
# JP: 「――そうなの、だな。\n悪いのは――鉄道ではなく、\\x%l列車;#00ffc040;列車%l;#;でもない」
1142 = "「——Đúng là, như vậy nhỉ.\nKẻ có lỗi——không phải là đường sắt, cũng không phải là \\x%l列車;#00ffc040;đoàn tàu%l;#;.」"
# monologue
# JP: それらはシステムに、道具にすぎん。\n自ら何かを為すことなどは、ありえない。
2182 = "Chúng chỉ là hệ thống, chỉ là công cụ.\nKhông thể nào tự chúng làm nên chuyện gì được."
# 【双鉄】
# display as 雙鐵
# JP: 「悪いのは――間違えるのはいつだって」
1648 = "「Kẻ có lỗi——kẻ phạm sai lầm lúc nào cũng là」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様？　双鉄様！」
1827 = "「Ngài Soutetsu? Ngài Soutetsu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう、僕――あれ？　いや、ええと……」
1664 = "「Đúng, là tôi——Ủa? Không, ừm......」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様！　何を寝ぼけてらっしゃるのですか！！」
1826 = "「Ngài Soutetsu! Ngài đang nói mớ gì vậy ạ!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「……ああ――」
1169 = "「......A——」"
# monologue
# JP: ハチロクが、僕を覗きこんでる。\nじわじわと、理解が脳を覚醒させる。
2055 = "Hachiroku đang cúi xuống nhìn tôi.\nSự nhận thức dần dần đánh thức não bộ của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、眠っていたのだな」
1575 = "「Tôi, vừa ngủ quên sao.」"
# 【ハチロク】
# display as 八六
# JP: 「お疲れのご様子でしたので、\n起こしたくはなかったのですが――」
1694 = "「Trông ngài có vẻ mệt mỏi,\nnên em đã không muốn đánh thức ngài nhưng——」"
# 【双鉄】
# display as 雙鐵
# JP: 「なにかあったのか？」
1646 = "「Có chuyện gì sao?」"
# 【ハチロク】
# display as 八六
# JP: 「はい、ポーレット様がお越しです。\nご相談ごとがあるとのことで」
1672 = "「Vâng, Thị trưởng Paulette đã đến ạ.\nCô ấy nói có chuyện cần bàn bạc.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットがか」
1671 = "「Paulette sao.」"
# monologue
# JP: その名に鼓膜が揺すぶられ、鼓動までもが速くなる。\n見ていた夢を、思い出す。
2151 = "Cái tên ấy làm rung động màng nhĩ, khiến nhịp tim tôi đập nhanh hơn.\nTôi nhớ lại giấc mơ mình vừa thấy."
# 【双鉄】
# display as 雙鐵
# JP: 「五分だけ待ってもらっておいてくれ。\nすぐに着替えて、会いに行く」
1748 = "「Bảo cô ấy đợi tôi năm phút.\nTôi sẽ thay đồ rồi ra gặp ngay.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん。おはようございます」
1821 = "「Anh Soutetsu. Chào buổi sáng.」"
# monologue
# JP: 隙の無い身なりと、引き締まっている表情と。
2161 = "Trang phục chỉnh tề không chút sơ hở, cùng nét mặt căng thẳng."
# monologue
# JP: 真剣そのものの態度に触れれば、\n頭のどこかにわずかに残る眠気もサっと晴れ渡る。
2122 = "Tiếp xúc với thái độ cực kỳ nghiêm túc ấy,\nchút buồn ngủ còn sót lại đâu đó trong đầu tôi cũng bay biến sạch."
# 【ポーレット】
# display as 波萊特
# JP: 「朝から、いきなりごめんなさい」
1612 = "「Xin lỗi vì mới sáng sớm đã đột ngột đến tìm anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕も会いたいと思っていた」
1661 = "「Không sao, tôi cũng đang muốn gặp cô đây.」"
# monologue
# JP: 言った途端にポーレットの顔が赤くなる。
2425 = "Vừa dứt lời, mặt Paulette bỗng đỏ bừng."
# 【ポーレット】
# display as 波萊特
# JP: 「え？　あっ――そう、なんです、か？」
1458 = "「Hả? A——vậy, vậy sao, ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ」
1476 = "「Ừ, ừm.」"
# monologue
# JP: いかん。つられて、僕まで照れてしまった。
2001 = "Không xong rồi. Bị lây từ cô ấy, đến cả tôi cũng thấy ngại ngùng theo."
# monologue
# JP: 夢の少女――僕の記憶の中の少女と、ポーレットとが、\n同一人物なのかどうか、確認したいと思ったのだが……
2275 = "Thiếu nữ trong giấc mơ——thiếu nữ trong ký ức của tôi, và Paulette,\ntôi đã muốn xác nhận xem hai người có phải là một hay không, nhưng......"
# 【双鉄】
# display as 雙鐵
# JP: 「相談があるとの話だが」
1721 = "「Nghe nói cô có chuyện cần bàn bạc.」"
# monologue
# JP: まずは、ポーレットの話から。\nそう言い聞かせ、心を静める。
2256 = "Trước tiên, cứ nghe Paulette nói đã.\nTôi tự nhủ như vậy, và trấn tĩnh lại."
# monologue
# JP: ポーレットの方もひとつ頷き、\n口元をきゅっと結び直す。
2360 = "Paulette cũng gật đầu một cái,\nmím chặt môi lại."
# 【ポーレット】
# display as 波萊特
# JP: 「相談っていうのは、前にもちょっとお話しした……\n双鉄くんに、秘書になってもらいたいっていう件です」
1570 = "「Chuyện cần bàn bạc là, chuyện mà trước đây em đã từng nói qua một chút......\nEm muốn nhờ anh Soutetsu, làm thư ký cho em.」"
# monologue
# JP: 言いながら、ポーレットは一枚の紙を差し出す。
2469 = "Vừa nói, Paulette vừa đưa ra một tờ giấy."
# 【ポーレット】
# display as 波萊特
# JP: 「名目こそは、雇用契約書になってますけど、\n実質、お願いしてるのは守秘義務だけです」
1819 = "「Mặc dù danh nghĩa là hợp đồng lao động,\nnhưng thực chất, em chỉ yêu cầu nghĩa vụ bảo mật thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1464 = "「Ồ.」"
# monologue
# JP: 僕は、右田の養子であると同時に、\n義父に雇われている身でもある。
2245 = "Tôi vừa là con nuôi của nhà Migita,\nđồng thời cũng là nhân viên được cha nuôi thuê."
# monologue
# JP: たとえ相手がポーレットでも、\n義父の利益を毀損する契約は結べん、が――
2251 = "Dù đối phương có là Paulette đi chăng nữa,\ntôi cũng không thể ký kết một hợp đồng gây tổn hại đến lợi ích của cha nuôi được, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、要求されているのは守秘義務だけだ。\nその上、違反時になんの罰則も規定されていない」
1710 = "「Quả thực, yêu cầu duy nhất chỉ là nghĩa vụ bảo mật.\nHơn nữa, cũng không hề quy định hình phạt nào khi vi phạm.」"
# monologue
# JP: どころか、僕が望めば、\nなんの代償も無しに契約解除さえできる。
1995 = "Thậm chí, nếu tôi muốn,\ntôi có thể chấm dứt hợp đồng mà không phải đền bù bất cứ thứ gì."
# monologue
# JP: 報酬欄は、現状空白となっているが……\nどう考えても、０円が妥当な内容だろう。
2533 = "Mục thù lao hiện tại đang để trống nhưng......\nDù nghĩ thế nào đi nữa, 0 yên mới là con số hợp lý cho nội dung này."
# 【双鉄】
# display as 雙鐵
# JP: 「この契約書はつまるところ――\n僕に、秘書の肩書を与えるためだけのものか？」
1768 = "「Nói tóm lại bản hợp đồng này——\nchỉ là để trao cho tôi chức danh thư ký thôi sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです。けど、この契約が大きいんです。\nヒヤリングには、絶対必要になりますから」
1629 = "「Đúng là vậy ạ. Nhưng mà, hợp đồng này rất quan trọng.\nNó là điều kiện bắt buộc để tham gia các buổi điều trần.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ヒヤリング？」
1722 = "「Điều trần?」"
# monologue
# JP: はい、と頷き、\nポーレットは少し体を前のめりにする。
2367 = "Gật đầu xác nhận,\nPaulette hơi rướn người về phía trước."
# 【ポーレット】
# display as 波萊特
# JP: 「レールショップにいるわたしは、市長ではなく、\n御一夜鉄道株式会社の社長、ですよね？」
1685 = "「Khi ở cửa hàng đường sắt, em không phải là thị trưởng,\nmà là giám đốc của Công ty Cổ phần Đường sắt Ohito, đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1494 = "「Ừm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「けど、わたしは同時に市長でもあります。だから、\nレールショップにも担当の部課長を呼べますけど――」
1385 = "「Nhưng đồng thời em cũng là thị trưởng. Vì vậy,\nem cũng có thể gọi các trưởng phòng ban phụ trách đến cửa hàng đường sắt, nhưng——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……それをやってしまえば確かに、\n公私混同の謗りを免れることは難しくなるか」
1474 = "「À...... nếu làm vậy thì quả thực,\nsẽ khó tránh khỏi bị chỉ trích là nhập nhằng công tư nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「です。だから、市長としてのヒヤリングは、\n役所内で、市長の立場で行うのが一番間違いがない」
1632 = "「Vâng ạ. Thế nên, các buổi điều trần với tư cách thị trưởng,\ntiến hành trong tòa thị chính, dưới cương vị thị trưởng là cách ít xảy ra sai sót nhất.」"
# monologue
# JP: 頷いて。\n再び僕へと向いた瞳が、一瞬、揺れる。
2172 = "Gật đầu.\nĐôi mắt hướng về phía tôi một lần nữa, chợt dao động trong thoáng chốc."
# 【ポーレット】
# display as 波萊特
# JP: 「でも、わたし一人だと……その……\n一人より二人の方が、気づけること増えると思うし」
1389 = "「Nhưng mà, nếu chỉ có một mình em thì...... chuyện đó......\nEm nghĩ hai người sẽ nhận ra được nhiều thứ hơn là một người.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな。どれだけ役にたてるかはわからんが、\n僕も、同席させてもらえたほうがありがたい」
1627 = "「Cũng đúng. Dù không biết có thể giúp ích được bao nhiêu,\nnhưng tôi cũng rất biết ơn nếu được phép tham gia cùng.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうしてもらうために、役職が必要なんです。\n当面のヒヤリングは、非公式なものになりますから」
1673 = "「Để anh có thể tham gia, thì cần phải có chức danh.\nBởi vì các buổi điều trần trước mắt, sẽ là những buổi không chính thức.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1468 = "「Hửm?」"
# 【ポーレット】
# display as 波萊特
# JP: 「“公式なヒヤリング”である公聴会や説明会は、\n事業計画が内定してからしか行われません」
1157 = "「Những buổi \"điều trần chính thức\" như điều trần công khai hay họp báo,\nchỉ được tổ chức sau khi kế hoạch dự án đã được nội định thôi ạ.」"
# monologue
# JP: それでは公聴会の意味が無い。
2514 = "Thế thì điều trần công khai còn ý nghĩa gì nữa."
# monologue
# JP: そう思うのだが、“それが役所”と、悲しげな顔で\n言われてしまえば、そこは呑み込む他に無い。
2531 = "Dù nghĩ vậy, nhưng khi thấy khuôn mặt buồn bã của em ấy nói rằng \"Cơ quan hành chính là vậy đó\",\nthì tôi cũng chỉ còn cách nuốt sự bất mãn đó vào trong."
# 【ポーレット】
# display as 波萊特
# JP: 「ですので、事前調査の類は、その全てが\n“非公式なヒヤリング”として扱われます」
1605 = "「Vì vậy, tất cả các hoạt động mang tính chất điều tra trước,\nđều được xử lý dưới dạng \"điều trần không chính thức\".」"
# 【双鉄】
# display as 雙鐵
# JP: 「非公式で、非公開か」
1832 = "「Không chính thức, và không công khai sao.」"
# monologue
# JP: はい、と頷き、\nポーレットは申し訳無さそうな声を重ねる。
2366 = "Gật đầu xác nhận,\nPaulette nói thêm với giọng điệu đầy áy náy."
# 【ポーレット】
# display as 波萊特
# JP: 「そういう性質ですから、部外者が混じっちゃうと……\n踏み込んだ話、絶対にしてもらえなくなります」
1420 = "「Vì tính chất như vậy, nên nếu có người ngoài xen vào......\nHọ tuyệt đối sẽ không chịu bàn luận sâu đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1494 = "「嗯」" 
# monologue
# JP: 故に、僕に“特別秘書”――
2302 = "Do đó, chức danh \"thư ký đặc biệt\" của tôi——"
# monologue
# JP: ポーレットが個人で雇う秘書という役職を与えて、\n守秘に関する義務をも負わせる。
2411 = "Trao cho tôi chức danh thư ký do Paulette đích thân thuê mướn,\nvà buộc tôi phải chịu nghĩa vụ liên quan đến bảo mật."
# 【双鉄】
# display as 雙鐵
# JP: 「よかろう。僕に異論はない。\nその内容なら、報酬額は０円で頼めるか？」
1508 = "「Được thôi. Tôi không có ý kiến gì.\nVới nội dung đó, thì mức thù lao là 0 yên được chứ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。ありがとうございます」
1591 = "「Em hiểu rồi. Cảm ơn anh rất nhiều.」"
# monologue
# JP: 整えられた契約書へとサインをすれば、\nふわん、と。ポーレットは安堵しきった顔になる。
2390 = "Khi tôi ký tên vào bản hợp đồng đã được chuẩn bị sẵn,\nPhù. Khuôn mặt Paulette lộ rõ vẻ an tâm."
# 【ポーレット】
# display as 波萊特
# JP: 「……これなら、わたし。頑張れます」
1181 = "「......Thế này thì, em. Có thể cố gắng được rồi.」"
# monologue
# JP: 言って頷き、立ち上がる。\nその顔から、緩んだ部分は消え失せている。
2163 = "Nói rồi gật đầu, em ấy đứng dậy.\nSự buông lỏng trên khuôn mặt đã hoàn toàn biến mất."
# 【ポーレット】
# display as 波萊特
# JP: 「善は急げじゃないですけど、ヒヤリング――\n今日、朝イチでも平気ですか？」
1818 = "「Không phải là việc tốt thì phải làm ngay, nhưng mà buổi điều trần——\nHôm nay, làm vào ngay đầu giờ sáng có được không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「朝イチというと？」
1348 = "「Đầu giờ sáng là mấy giờ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜市役所の朝イチは、\n午前八時三十分です」
1557 = "「Đầu giờ sáng của tòa thị chính Ohimitera là,\n8 giờ 30 phút sáng ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「良かろうならばすぐに――\nああいや、少しだけ待ってくれ」
1511 = "「Được thôi, vậy thì ngay lập tức——\nÀ không, đợi tôi một chút.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1494 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ネクタイだ。\n秘書がノータイでは、文字通り締まらなかろう」
1576 = "「Là cà vạt.\nThư ký mà không thắt cà vạt thì, đúng nghĩa đen là không ra thể thống gì rồi.」"
# monologue
# JP: （コンコンっ）
2575 = "（Cốc cốc）"
# 【宮本】
# display as ？？？
# JP: 「宮本です」
1595 = "「Là Miyamoto đây.」"
# 【ポーレット】
# display as 波萊特
# JP: 「どうぞ、お入りください」
1746 = "「Mời vào.」"
# 【宮本】
# display as 宮本
# JP: 「失礼します」
1609 = "「Xin thất lễ.」"
# monologue
# JP: 市長室へと入ってきたのは、\nひどく小柄な初老の女性だ。
2498 = "Bước vào phòng thị trưởng,\nlà một người phụ nữ trung niên với vóc dáng cực kỳ nhỏ nhắn."
# monologue
# JP: ポーレットの話だと、\n総務部長を呼んでいるとのことだったが――
2426 = "Theo như lời Paulette,\nthì người được gọi đến là Trưởng phòng Tổng vụ, nhưng——"
# 【ポーレット】
# display as 波萊特
# JP: 「宮本さん。\nこちら、新任の特別秘書の、右田双鉄さんです」
1540 = "「Cô Miyamoto.\nĐây là thư ký đặc biệt mới nhậm chức, anh Migita Soutetsu.」"
# 【宮本】
# display as 宮本
# JP: 「そうですか。はじめまして、右田さん。\n御一夜市役所、総務部長の宮本です」
1636 = "「Vậy sao. Chào cậu, cậu Migita.\nTôi là Miyamoto, Trưởng phòng Tổng vụ của Tòa thị chính Ohimitera.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はじめまして、宮本部長。\nどうか、よろしくお願いいたします」
1561 = "「Rất vui được gặp cô, Trưởng phòng Miyamoto.\nMong cô giúp đỡ nhiều ạ.」"
# monologue
# JP: 挨拶と同時に会釈を交わす。
2255 = "Chúng tôi vừa chào hỏi vừa cúi đầu đáp lễ."
# 【宮本】
# display as 宮本
# JP: 「こちらの右田さんが、お預かりした素案の？」
1558 = "「Cậu Migita đây, là người đã lập ra bản dự thảo mà tôi đang giữ sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、立案をしてくださった方です」
1663 = "「Vâng, anh ấy chính là người đã lập ra dự án đó.」"
# 【宮本】
# display as 宮本
# JP: 「そうでしたか。\nそれでは、事前説明は不要ですね」
1637 = "「Ra là vậy.\nThế thì, không cần phải giải thích trước nữa nhỉ.」"
# monologue
# JP: 机の上に、ざっと書類が広げられる。\n見やすい。整頓されている。
2147 = "Tài liệu được trải nhanh ra trên bàn.\nRất dễ nhìn. Được sắp xếp gọn gàng."
# monologue
# JP: ああ。この人は確かに部長で、有能なのだ。
2114 = "À. Người này quả thực là trưởng phòng, và rất có năng lực."
# monologue
# JP: 見かけで違和感を持ってしまった\n自分の浅はかさが恥ずかしい。
2284 = "Chỉ vì vẻ bề ngoài mà tôi đã cảm thấy nghi ngờ,\nthật xấu hổ cho sự nông cạn của bản thân."
# 【宮本】
# display as 宮本
# JP: 「まずは、赤井阿蘇神社の文化財指定について。\nお預かりした資料、文化財課は『極めて価値が高い』と」
1834 = "「Trước tiên, về việc công nhận đền Akai Aso là tài sản văn hóa.\nVới tài liệu mà cô giao, Phòng Tài sản Văn hóa đánh giá là 『Có giá trị cực kỳ cao』.」"
# 【ポーレット】
# display as 波萊特
# JP: 「じゃあ、指定を取れる見込みは？」
1802 = "「Vậy thì, triển vọng được công nhận là thế nào?」"
# 【宮本】
# display as 宮本
# JP: 「市、県の文化財指定でしたら、次年度にでも。\n文化財課としては、重文を目指せるとも言っています」
1551 = "「Nếu là công nhận tài sản văn hóa cấp thành phố hoặc cấp tỉnh, thì có thể thực hiện ngay trong năm tài chính tới.\nPhòng Tài sản Văn hóa cũng cho biết, có thể nhắm tới mục tiêu Trọng Văn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「重文……重要文化財」
1158 = "「Trọng Văn...... Tài sản Văn hóa Quan trọng.」"
# monologue
# JP: 言われて、ああ、と納得する。
2422 = "Nghe vậy, tôi mới à lên hiểu ra."
# monologue
# JP: 市や県の文化財指定を、\n“十分”目指せると空耳しかけてしまっていた。
2264 = "Tôi suýt nữa đã nghe nhầm thành,\n\"hoàn toàn\" có thể nhắm tới việc công nhận tài sản văn hóa cấp thành phố hoặc cấp tỉnh."
# 【宮本】
# display as 宮本
# JP: 「重文になれば、国から文化財への維持管理費が出ますし、\n観光客へのアピール度もあがるそうです」
1732 = "「Nếu trở thành Trọng Văn, quốc gia sẽ cấp chi phí duy tu bảo dưỡng cho tài sản văn hóa,\nvà nghe nói mức độ thu hút khách du lịch cũng sẽ tăng lên.」"
# monologue
# JP: 観光課の試算だという数字資料が示される。
2145 = "Những dữ liệu bằng con số, được cho là bản ước tính của Phòng Du lịch, được đưa ra."
# monologue
# JP: 重文指定がついたなら、観光客の増加は幾分かは望める。\nが、市・県の文化財指定では、まるで増えんという内容だ。
2431 = "Nếu được công nhận là Trọng Văn, có thể kỳ vọng lượng khách du lịch sẽ tăng lên đôi chút.\nNhưng nếu chỉ là công nhận tài sản văn hóa cấp thành phố, cấp tỉnh, thì lượng khách gần như không tăng lên."
# 【ポーレット】
# display as 波萊特
# JP: 「重文を目指した場合、\n最短でどのくらいで指定をのぞめるでしょう？」
1729 = "「Nếu nhắm tới mục tiêu Trọng Văn,\nthì nhanh nhất là bao lâu mới được công nhận?」"
# 【宮本】
# display as 宮本
# JP: 「極めてスムーズに行けば二年後にも、\nという可能性はあるそうです」
1523 = "「Nếu tiến hành cực kỳ suôn sẻ thì,\ncó khả năng là hai năm sau.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ん……」
1490 = "「Ưm......」"
# monologue
# JP: ポーレットが唇を閉じ、\nちら、と僕へと視線を向ける。
2363 = "Paulette mím môi,\nliếc nhìn sang tôi."
# monologue
# JP: ゆえ挙手すれば、\nなんでしょうかと宮本さんが尋ねてくれる。
2290 = "Do đó tôi giơ tay lên,\ncô Miyamoto liền hỏi tôi có chuyện gì."
# 【双鉄】
# display as 雙鐵
# JP: 「重文指定が『取れそうもない』となった場合。\nそれは――」
1514 = "「Trong trường hợp 『Có vẻ không lấy được』 công nhận Trọng Văn.\nThì khi đó——」"
# 【宮本】
# display as 宮本
# JP: 「一般的には、早い段階でわかります。\nこの点を考慮しろ、的な意見をもらえることもあります」
1349 = "「Thông thường, chúng ta sẽ biết được ngay từ giai đoạn đầu.\nCũng có khi chúng ta sẽ nhận được những ý kiến đóng góp kiểu như 'hãy xem xét lại điểm này'.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、重文を目指し、目がないとはっきりした場合には、\n市・県の文化財指定を目指すという線はどうでしょう？」
1798 = "「Vậy thì, chúng ta sẽ nhắm tới mục tiêu Trọng Văn, và trong trường hợp thấy rõ là không có hi vọng,\nthì sẽ chuyển hướng sang nhắm tới công nhận tài sản văn hóa cấp thành phố, cấp tỉnh thì sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「宮本さんからご意見は？」
1541 = "「Cô Miyamoto có ý kiến gì không?」"
# 【宮本】
# display as 宮本
# JP: 「右田さんと同意見ですね。\n極めて妥当で現実的な対処法です」
1598 = "「Tôi đồng ý kiến với cậu Migita.\nĐó là một cách giải quyết cực kỳ thỏa đáng và thực tế.」"
# 【ポーレット】
# display as 波萊特
# JP: 「では、そう進めるよう関係各所にお願いします」
1799 = "「Vậy thì, nhờ cô yêu cầu các bên liên quan tiến hành theo hướng đó nhé.」"
# 【宮本】
# display as 宮本
# JP: 「わかりました」
1593 = "「Tôi hiểu rồi.」"
# monologue
# JP: 手帳を広げ手早くメモをし、\n宮本さんは顔を上げ直す。
2194 = "Mở sổ tay ra và nhanh chóng ghi chép lại,\nsau đó cô Miyamoto ngẩng mặt lên."
# 【宮本】
# display as 宮本
# JP: 「次に、術仙炭鉱の件について。\n炭鉱の所有権、採掘権は、市が譲渡を受けています」
1616 = "「Tiếp theo, về vấn đề mỏ than Jutsu-sen.\nThành phố đã nhận chuyển nhượng quyền sở hữu và quyền khai thác mỏ than.」"
# 【双鉄】
# display as 雙鐵
# JP: 「譲渡ですか？」
1757 = "「Chuyển nhượng sao?」"
# 【宮本】
# display as 宮本
# JP: 「石炭需要がもはや望めず、交通事情から再開発も難しい。\nですので、譲渡で維持費と税の負担を回避したのかと」
1677 = "「Vì không còn hy vọng gì vào nhu cầu than đá nữa, và do điều kiện giao thông nên việc tái phát triển cũng rất khó khăn.\nVì vậy, có lẽ họ muốn chuyển nhượng để tránh gánh nặng chi phí duy trì và thuế.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1429 = "「Ra là vậy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら、市による再開発や採炭の再開に支障はない？」
1797 = "「Vậy thì, việc thành phố tiến hành tái phát triển hay mở lại khai thác than sẽ không có trở ngại gì chứ?」"
# 【宮本】
# display as 宮本
# JP: 「理屈の上ではそうなります、が――\n採算が望めない以上、予算をつけるのは難しいですね」
1682 = "「Về mặt lý thuyết thì là vậy, nhưng——\nChừng nào chưa thấy được khả năng sinh lời, thì việc lập ngân sách là rất khó.」"
# monologue
# JP: そう言われれば、納得せざるを得なくなる。\n予算は議会を通過することでしか成立しない。
2155 = "Nghe cô ấy nói vậy, tôi không thể không đồng ý.\nNgân sách chỉ có thể được thiết lập khi thông qua hội đồng thành phố."
# monologue
# JP: ポーレットの支持層、\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対派の議員とて、\n見通し暗く、市の財政を圧迫する案には賛成できんだろう。
2074 = "Ngay cả với tầng lớp ủng hộ Paulette, hay các nghị sĩ thuộc phe phản đối thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;,\ncũng không thể nào tán thành một phương án mù mịt và gây áp lực lên tài chính của thành phố được."
# 【双鉄】
# display as 雙鐵
# JP: 「では――再開発うんぬんは置くとしても、\n環境防護のための対策は、必要になるかと思いますが」
1796 = "「Vậy thì——tạm gác chuyện tái phát triển hay gì đó sang một bên,\nnhưng tôi nghĩ các biện pháp bảo vệ môi trường là cần thiết.」"
# 【宮本】
# display as 宮本
# JP: 「それも、まずは調査のための予算を組んでですね。\n調査のための予算であれば、議会通過は容易でしょう」
1767 = "「Về việc đó, trước tiên cũng phải lập ngân sách cho việc điều tra đã.\nNếu chỉ là ngân sách để điều tra, thì việc thông qua hội đồng sẽ dễ dàng thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「調査費程度なら、予備費をあてる議案で対応できます。\n年度内に調査。で、結果によって来年度から環境対策を」
1512 = "「Nếu chỉ ở mức chi phí điều tra, thì có thể giải quyết bằng cách trình dự luật sử dụng quỹ dự phòng.\nTiến hành điều tra trong năm tài chính này. Rồi tùy vào kết quả, sẽ thực hiện các biện pháp bảo vệ môi trường từ năm tài chính sau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ……最短でもそうなってしまうのか」
1491 = "「Ưm...... dù nhanh nhất thì cũng phải như vậy sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「最悪、市長権限で専決することもできますけど――\nそれは、民主主義の否定にもなっちゃいますから」
1641 = "「Trường hợp xấu nhất, em cũng có thể sử dụng quyền hạn thị trưởng để tự quyết định, nhưng——\nLàm vậy thì cũng đồng nghĩa với việc phủ nhận dân chủ mất rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1494 = "「嗯」" 
# monologue
# JP: そこまでするほどの緊急性があるとは僕にも思えない。
2252 = "Tôi cũng không nghĩ mức độ khẩn cấp đến mức phải làm như vậy."
# monologue
# JP: ならば、調査――必要があれば対策という手順を\nきっちり踏むのが、やはり最善となるのだろう。
2518 = "Nếu vậy, việc tuân thủ chặt chẽ các bước điều tra——rồi đưa ra biện pháp nếu cần thiết,\nquả nhiên vẫn là cách tốt nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「でしたら――」
1619 = "「Nếu vậy thì——」"
# monologue
# JP: だから、視線を切り替える。
2300 = "Vì vậy, tôi chuyển hướng góc nhìn."
# monologue
# JP: 緊急処置にも根治にも同じく時間を要するのなら、\n無論、根治をこそ目指すべきだ。
2326 = "Nếu xử lý khẩn cấp hay trị tận gốc đều mất cùng một khoảng thời gian,\nthì tất nhiên, chúng ta nên hướng tới việc trị tận gốc."
# 【双鉄】
# display as 雙鐵
# JP: 「採算性が望める再開発プランを提示し、\nそのための予算を議会通過させればいいわけですね？」
1573 = "「Chúng ta chỉ cần đề xuất một kế hoạch tái phát triển có khả năng sinh lời,\nvà để hội đồng thông qua ngân sách cho việc đó là được đúng không?」"
# monologue
# JP: 宮本さんはコメントをせず。\n代わりのように、小さく頷く。
2193 = "Cô Miyamoto không bình luận gì.\nThay vào đó, cô khẽ gật đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「再開発について、\n市民からの要望や職員からのアイディアは？」
1817 = "「Về việc tái phát triển,\ncó yêu cầu nào từ người dân hay ý tưởng nào từ nhân viên không?」"
# 【宮本】
# display as 宮本
# JP: 「全くです。あの炭鉱――廃炭鉱は、\nあえて、誰も触れようとしないものですから」
1527 = "「Hoàn toàn không có. Mỏ than đó——mỏ than bỏ hoang đó,\ncố tình không có ai muốn đụng đến cả.」"
# monologue
# JP: （なるほど……典型的な悪循環なのか）
2572 = "（Ra là vậy...... Một vòng luẩn quẩn điển hình sao.）"
# monologue
# JP: 手を着けないから興味を持たれず、\n誰も興味を持たぬ以上は、手がいれられることもない。
2119 = "Vì không ai đụng đến nên không thu hút được sự chú ý,\nmà một khi đã không ai chú ý, thì cũng chẳng có ai bắt tay vào làm."
# monologue
# JP: その悪循環を断ち切るためには……\n体験採掘とＳＬだけでは、いささか不足なのかもしれん。
2241 = "Để cắt đứt vòng luẩn quẩn đó......\nChỉ với trải nghiệm khai thác than và SL thôi, có lẽ vẫn còn hơi thiếu sót."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ブラッシュアップするしかないか」
1800 = "「Nếu vậy, chỉ còn cách trau chuốt nó thêm thôi.」"
# monologue
# JP: 思わず零れた呟きに、ポーレットと宮本さんとは、\nなぜか同時に驚いたような顔をする。
2424 = "Trước lời lẩm bẩm buột miệng của tôi, Paulette và cô Miyamoto,\nkhông hiểu sao lại cùng lúc làm ra vẻ mặt ngạc nhiên."
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
# 1593 = "「我明白了」" 
# monologue
# JP: その表情をすぐに消し、\nポーレットは落ち着いた笑みを浮かべる。
2361 = "Nhanh chóng xóa đi biểu cảm đó,\nPaulette nở một nụ cười điềm tĩnh."
# 【ポーレット】
# display as 波萊特
# JP: 「それでは、この件はひとまず持ち帰ります。\n宮本さん、ありがとうございました」
1803 = "「Vậy thì, vấn đề này trước mắt tôi sẽ mang về nghiên cứu thêm.\nCô Miyamoto, cảm ơn cô rất nhiều.」"
# 【宮本】
# display as 宮本
# JP: 「いえ、それでは失礼します。\n資料は、置いておきますのでご活用ください」
1465 = "「Không có gì, vậy tôi xin phép.\nTài liệu tôi sẽ để lại đây, mong mọi người tận dụng tốt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
1829 = "「Cảm ơn cô rất nhiều.」"
# monologue
# JP: 宮本さんはペンを走らせ、資料の端にメモを置く。
2192 = "Cô Miyamoto lia nhanh ngòi bút, rồi đặt một tờ giấy nhớ lên mép tập tài liệu."
# monologue
# JP: そして一瞬、僕の顔を見て。\nポーレットへと一礼をし、そのまま静かに部屋を出て行く。
2530 = "Và rồi trong khoảnh khắc, cô ấy nhìn mặt tôi.\nCúi chào Paulette một cái, rồi cứ thế lặng lẽ rời khỏi phòng."
# monologue
# JP: （ぱたんっ）
2581 = "（Cạch）"
# monologue
# JP: 話しかけよう――とした言葉を喉にしまいこむ。
2270 = "Định cất tiếng bắt chuyện——nhưng tôi lại nuốt những lời đó vào trong."
# monologue
# JP: 見るからに、ポーレットは息を詰めている。\n宮本さんの足音が、徐々に遠ざかり……聞こえなくなる。
2362 = "Nhìn là thấy, Paulette đang nín thở.\nTiếng bước chân của cô Miyamoto, dần xa...... rồi không còn nghe thấy nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「はぁぁあああああ～っ」
1461 = "「Hơiiiiii~」"
# monologue
# JP: 次の瞬間、ポーレットは緩みに緩んだ息を吐き、\nぐったり、机の上に突っ伏し、伸びる。
1991 = "Khoảnh khắc tiếp theo, Paulette thở hắt ra một hơi thật dài,\nrồi rũ rượi, nằm bò ra bàn và duỗi người."
# monologue
# JP: だからつい、問いかけずにはいられなくなる。
2450 = "Thế nên tôi bất giác, không thể không hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「苦手なのか？」
1392 = "「Em không giỏi đối phó với cô ấy à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「苦手っていうんじゃないんですけど――」
1403 = "「Cũng không hẳn là không giỏi đối phó nhưng mà——」"
# monologue
# JP: 伸びきったまま苦笑して、\nん……っとポーレットは器用に首を捻ってみせる。
2169 = "Cứ nằm dài như thế rồi cười gượng,\nưm...... Paulette khéo léo nghiêng đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「――苦手じゃ、ほんとに無いんです。\n宮本さん、パパの右腕だった人だし」
1145 = "「——Thật sự, không phải là không giỏi đối phó đâu ạ.\nCô Miyamoto, từng là cánh tay phải của ba em mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「前市長のか」
1421 = "「Của cựu thị trưởng sao.」"
# monologue
# JP: ナビが、上空で言っていた。\n雛衣前市長の政治手腕は、高く評価されていたと。
2603 = "Navi đã từng nói khi chúng tôi đang ở trên không.\nRằng tài năng chính trị của cựu thị trưởng Hinai, được đánh giá rất cao."
# monologue
# JP: その右腕というのであれば、\nなるほど、この資料の見事さにも納得が――
2325 = "Nếu cô ấy là cánh tay phải đó,\nthì ra là vậy, sự xuất sắc của tập tài liệu này cũng là điều dễ hiểu——"
# monologue
# JP: （おや？）
2576 = "（Ô kìa?）"
# monologue
# JP: 手書きのメモには、電話番号。\n間違いなく、宮本さんのものだろう。
2512 = "Trên tờ giấy nhớ viết tay, là một số điện thoại.\nKhông nghi ngờ gì nữa, chắc chắn là của cô Miyamoto."
# monologue
# JP: いつでも宮本さんを呼び出せるポーレットに、\nこのメモが必要であるわけもなし――
2365 = "Với Paulette, người có thể gọi cô Miyamoto đến bất cứ lúc nào,\nthì tờ giấy nhớ này đâu có cần thiết——"
# monologue
# JP: （僕あてか）
2590 = "（Gửi cho mình sao.）"
# monologue
# JP: ならば、素直に預かっておこう。
2517 = "Nếu vậy, tôi cứ ngoan ngoãn giữ lấy vậy."
# monologue
# JP: メモを拾ってポケットに。\nポーレットは気にも留めずに、まだ伸びている。
2261 = "Tôi nhặt tờ giấy nhớ lên rồi cất vào túi.\nPaulette không mảy may để ý, vẫn đang nằm dài trên bàn."
# 【ポーレット】
# display as 波萊特
# JP: 「でも、だからこそ多分……\nわたし、子供扱いされちゃうんですよ」
1386 = "「Nhưng mà, có lẽ chính vì thế......\nnên em mới bị đối xử như trẻ con đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「子供扱い」
1684 = "「Bị đối xử như trẻ con.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうです。あの人いっつも正しいし。\nその上、データでがっちり固めてきますから」
1631 = "「Đúng vậy ạ. Cô ấy lúc nào cũng đúng.\nHơn nữa, cô ấy luôn dùng dữ liệu để củng cố vững chắc cho lập luận của mình.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1494 = "「嗯」" 
# monologue
# JP: なるほど、それで合点がいった。
2076 = "Ra là vậy, thế thì tôi hiểu rồi."
# monologue
# JP: ブラッシュアップと、僕が零した一言に、\n何故ポーレットと宮本さんが、驚いたような顔をしたのか。
2388 = "Về lời nói \"trau chuốt thêm\" mà tôi lỡ thốt ra,\ntại sao Paulette và cô Miyamoto lại lộ vẻ mặt ngạc nhiên đến thế."
# monologue
# JP: （ああいう場合に、今までは、\nそのまま計画を断念させられていたのだろうな――）
2595 = "（Trong những trường hợp như vậy, từ trước đến nay,\nchắc em ấy toàn bị ép phải từ bỏ kế hoạch luôn nhỉ——）"
# 【ポーレット】
# display as 波萊特
# JP: 「あれもダメこれもダメって、なんか、すっごい窮屈で。\nそれに従ってるのが結局、正解だってわかるんですけど」
1766 = "「Cái này cũng không được cái kia cũng không xong, cảm giác gò bó kinh khủng.\nCho dù em biết rằng nghe theo lời cô ấy rốt cuộc mới là đáp án đúng.」"
# monologue
# JP: 可能性が低い案件に時間をつぎ込んでいくよりも、\nすっぱりあきらめ、次善の策を求めていく。
2430 = "Thay vì dồn thời gian vào một dự án có khả năng thành công thấp,\nthì thà dứt khoát từ bỏ và tìm kiếm một phương án tốt thứ hai."
# monologue
# JP: 確かにそれも、\n正解のひとつであるには違いない。
2497 = "Quả thực đó cũng là,\nmột trong những đáp án đúng không sai."
# 【双鉄】
# display as 雙鐵
# JP: 「負担を無闇に増やさぬようにとのことでもあろう。\nポーレットは、ただでさえ多忙なのだから」
1502 = "「Chắc cô ấy cũng không muốn làm tăng thêm gánh nặng một cách vô ích thôi.\nVì Paulette vốn dĩ đã rất bận rộn rồi mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そういう心配も、してくれてるんだと思います。\nだからわたしも、反論までは出来なくて」
1588 = "「Em nghĩ cô ấy cũng lo lắng cho em như vậy.\nThế nên em cũng không thể phản bác lại được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1467 = "「Ừm.」"
# monologue
# JP: 子供扱い、と聞かされたせいか、\n宮本さんが前市長の右腕だったと聞いたせいか。
2003 = "Không biết có phải do nghe nói em ấy bị đối xử như trẻ con,\nhay là do nghe nói cô Miyamoto từng là cánh tay phải của cựu thị trưởng hay không."
# monologue
# JP: 今のポーレットの姿はどこか、\n真闇姉に反発していた日々姫の姿と重なるようだ。
2286 = "Hình ảnh của Paulette hiện tại,\ncó nét gì đó trùng lặp với hình ảnh Hibiki đang phản kháng lại chị Mayami."
# 【双鉄】
# display as 雙鐵
# JP: 「宮本さんからしてみれば、きっとポーレットは――」
1585 = "「Đứng từ góc độ của cô Miyamoto mà nói, chắc chắn Paulette giống như——」"
# monologue
# JP: 言いかけて、危ういところで言葉を呑み込む。
2465 = "Đang nói dở, tôi vội vàng nuốt lại những lời đó ở thời điểm nguy hiểm."
# monologue
# JP: いや――そうだ。\nそういえば、今まで、ただの一度も……
2271 = "Khoan đã——đúng rồi.\nNhắc mới nhớ, cho đến tận bây giờ, chưa một lần nào......"
# monologue
# JP: （パパ、という言葉をあれほど聞くのに――\nポーレットは、ママと……一度でも口にしただろうか？）
2589 = "（Nghe em ấy nhắc đến từ \"ba\" nhiều như vậy——\nNhưng Paulette đã từng nhắc đến \"mẹ\"...... dù chỉ một lần chưa nhỉ?）"
# monologue
# JP: 思い出せない。\nそれほどまでに、印象がない。
2238 = "Tôi không thể nhớ ra nổi.\nĐến mức hoàn toàn không có chút ấn tượng nào."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん」
1822 = "「Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや――」
1478 = "「À, không có gì——」"
# monologue
# JP: 考えてみれば、僕はポーレットのことをまるで知らない。\n過去に会っているかどうかさえ、未だに確認できてない。
2021 = "Nghĩ lại thì, tôi hoàn toàn không biết gì về Paulette cả.\nNgay cả việc trong quá khứ đã từng gặp nhau hay chưa, đến giờ vẫn chưa xác nhận được."
# monologue
# JP: ――うかつなことを言うべきではない。\nその判断が、喉から出て行く言葉を変える。
2336 = "——Không nên nói những điều bất cẩn.\nSự phán đoán đó, đã làm thay đổi những lời sắp thốt ra khỏi cổ họng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「宮本さんからしてみれば、ポーレットは、\nまだまだ頼りない市長に見えてしまうのだろうな」
1586 = "「Đứng từ góc độ của cô Miyamoto mà nói, Paulette,\nchắc hẳn vẫn trông giống như một vị thị trưởng chưa đáng tin cậy nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それはそうですよ。\n実際、頼りない市長でしたから。昨日までは」
1795 = "「Chuyện đó là đương nhiên rồi ạ.\nBởi vì thực tế, em là một thị trưởng chưa đáng tin cậy mà. Cho đến tận ngày hôm qua.」"
# monologue
# JP: 言って、すっくと立ち上がる。
2162 = "Nói rồi, em ấy đứng bật dậy."
# monologue
# JP: 横にではなく、縦にまっすぐ――\nその方が、やはりポーレットの背は美しい。
1999 = "Không phải nằm dài ngang mặt bàn, mà là đứng thẳng lưng——\nBóng lưng của Paulette, quả nhiên trông như thế mới đẹp."
# 【ポーレット】
# display as 波萊特
# JP: 「汚名返上、だから、これからしていきます」
1607 = "「Vì vậy, từ giờ trở đi, em sẽ rửa sạch cái danh tiếng đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
1495 = "「Ừm!」"
# monologue
# JP: そうだ。これから。\n汚名は返上していけばいい。知らないことは知ればいい。
2348 = "Đúng vậy. Từ bây giờ.\nDanh tiếng xấu thì cứ rửa sạch là được. Những điều chưa biết thì cứ tìm hiểu là xong."
# monologue
# JP: ポーレットにも、そして僕にも、\nそれは必ず、出来るはずだ。
2364 = "Đối với Paulette, và cả đối với tôi,\nchắc chắn sẽ làm được."
# 【日々姫】
# display as 日日姬
# JP: 「兄さんは」
1462 = "「Anh trai này.」"
# monologue
# JP: ……日々姫の目が、据わっている。\nいや――違う。単に、極度に、冷えきっている。
1139 = "......Đôi mắt của Hibiki đang nhìn chằm chằm.\nKhông——không phải. Đơn giản chỉ là, nó đang cực kỳ, cực kỳ lạnh lùng."
# 【日々姫】
# display as 日日姬
# JP: 「鉄道マニアに、なったんですか？」
1400 = "「Anh trở thành người đam mê đường sắt rồi à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――」
1353 = "「Không——」"
# monologue
# JP: なっていない。
1132 = "Tôi không hề."
# monologue
# JP: 断言、できるか悩んでしまう。\n悩む程度に鉄道に、確かに、足を踏み込んでいる。
2248 = "Nhưng tôi lại băn khoăn không biết mình có thể khẳng định chắc nịch như vậy không.\nQuả thực, tôi đã dấn thân vào đường sắt sâu đến mức phải băn khoăn về điều đó."
# 【日々姫】
# display as 日日姬
# JP: 「あのですね」
1579 = "「Này nhé.」"
# monologue
# JP: 僕の答えを待たぬまま、\n日々姫はふっ、と鼻を鳴らして肩をすくめる。
2004 = "Không đợi tôi trả lời,\nHibiki khẽ hừ mũi một cái rồi nhún vai."
# 【日々姫】
# display as 日日姬
# JP: 「石炭を掘ることを、世間でレジャーと呼びますか？\n呼びませんよね？　正しい名称は、“労働”ですから」
1377 = "「Việc đào than, trên đời này có ai gọi đó là hoạt động giải trí không?\nKhông đúng không? Bởi vì tên gọi chính xác của nó là \"lao động\" mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、だから――掘るだけではなく……だな……」
1365 = "「Không, thế nên——không chỉ là đào than thôi đâu...... mà còn......」"
# monologue
# JP: 言葉の続きを、口から出せない。\n蛇に睨まれた蛙とは、こういう気分なのかもしれない。
1992 = "Những lời tiếp theo, tôi không thể thốt ra khỏi miệng.\nCó lẽ ếch bị rắn nhìn chằm chằm cũng mang tâm trạng như thế này chăng."
# 【日々姫】
# display as 日日姬
# JP: 「せっかく掘った石炭をＳＬの釜に投げ込むことを、\n世間では、働き損、って言ったりします」
1506 = "「Cất công đào được than rồi lại ném vào lò hơi của SL,\ntrên đời này người ta gọi đó là làm công cốc đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うう、む」
1488 = "「Ư, ừm.」"
# monologue
# JP: 説得力を、感じてしまう。
2164 = "Tôi cảm nhận được sức thuyết phục từ lời nói đó."
# monologue
# JP: 助けを求めてポーレットを見れば、\n羞恥と困惑を交えた顔で、僕にすがる目を向けてくる。
2281 = "Tôi nhìn Paulette cầu cứu,\nnhưng em ấy lại nhìn tôi bằng ánh mắt cầu khẩn với khuôn mặt pha lẫn sự xấu hổ và bối rối."
# monologue
# JP: （ならば――ハチロクとれいな、な、ら……）
2601 = "（Nếu vậy——Hachiroku và Reina, chắc, sẽ......）"
# monologue
# JP: だめだ、ハチロクは無表情。\n完全なポーカーフェイスで、この場をやりすごす腹らしい。
2007 = "Không xong rồi, Hachiroku đang hoàn toàn vô cảm.\nCó vẻ cô ấy định dùng bộ mặt poker đó để cho qua chuyện này."
# monologue
# JP: そしてれいなは、まるで話を聞いてない。\n臭い付けする子猫のように、ポーレットにただ甘えている。
2420 = "Và Reina thì, hoàn toàn không nghe chúng tôi nói gì.\nCô bé chỉ đang làm nũng Paulette như một chú mèo con đang cọ mùi."
# monologue
# JP: （そういえば、ここ数日、\nポーレットとふたりきりになる時間が多かったものな）
2596 = "（Nhắc mới nhớ, mấy ngày nay,\nthời gian tôi và Paulette ở riêng với nhau khá nhiều nhỉ.）"
# 【凪】
# display as 凪
# JP: 「確かにそうばい。お金払って石炭ば掘って。\nその石炭ば取り上げられっとは、愉快じゃなかたい」
1709 = "「Đúng là vậy đó nha. Bỏ tiền ra để đi đào than.\nRồi số than đó lại bị lấy đi mất thì, chẳng vui vẻ chút nào đâu nha.」"
# 【ふかみ】
# display as 深美
# JP: 「うん。そう……思う。それ、多分――\nほとんどの人には、売りに、ならない。かも。です」
1493 = "「Ừm. Em cũng...... nghĩ vậy. Cái đó, có lẽ——\nĐối với hầu hết mọi người thì, không đáng để bỏ tiền ra. Đâu. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うう、む」
# 1488 = "「嗚，唔」" 
# monologue
# JP: 味方は沈黙。\n反対意見ばかりが次々重なっていく。
2079 = "Đồng minh thì im lặng.\nCòn những ý kiến phản đối thì cứ liên tiếp chồng chất lên nhau."
# monologue
# JP: ならば？　ならば――
2198 = "Nếu vậy thì sao? Nếu vậy thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「では、どのようにすればいいかな？\nどうすれば、廃炭鉱を観光拠点とできるだろうか？」
1801 = "「Vậy thì, chúng ta nên làm thế nào đây?\nLàm thế nào để có thể biến mỏ than bỏ hoang thành một điểm nhấn du lịch?」"
# 【凪】
# display as 凪
# JP: 「簡単に考えつくようなことなら、\n先に誰かがやっとるばい」
1741 = "「Nếu là những chuyện dễ dàng nghĩ ra được,\nthì đã có người làm từ lâu rồi đó nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
# 1467 = "「唔」" 
# 【ふかみ】
# display as 深美
# JP: 「あの……すごい、一般論っていうか――\n基本的な意見。です、けど」
1791 = "「Dạ...... nó rất là, lý thuyết chung hay nói cách khác là——\nmột ý kiến cơ bản. Thôi, ạ.」"
# monologue
# JP: 凪に一刀両断された僕を哀れに感じてか、\nおずおずとだが、ふかみが挙手をしてくれる。
2295 = "Có lẽ vì thấy tội nghiệp cho tôi khi bị Nagi chém đứt làm đôi,\nFukami rụt rè giơ tay lên."
# 【ふかみ】
# display as 深美
# JP: 「払ったお金に、どれだけのお返しがくるか――\nそれが、満足度につながるんだと思う……。です」
1727 = "「Số tiền đã trả, sẽ nhận lại được bao nhiêu đền đáp——\nEm nghĩ điều đó, sẽ liên quan đến mức độ hài lòng....... Ạ.」"
# monologue
# JP: クマ川下りも、そこを改善していかないと……と、\nせっかくのアドバイスを、ふかみは自嘲に沈めてしまう。
1135 = "Ngay cả việc đi thuyền xuôi dòng sông Kuma cũng phải cải thiện điểm đó......\nFukami dìm lời khuyên quý giá của mình xuống bằng sự tự trào."
# monologue
# JP: が――
2032 = "Nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、確かに基本からだな。\n料金と、得られるものとのバランスか」
1430 = "「Ra là vậy, quả thực phải bắt đầu từ những điều cơ bản.\nSự cân bằng giữa giá cả và những gì nhận được sao.」"
# monologue
# JP: クマ川下りを体験したとき、\n「正直、高い」と僕は感じた。
2125 = "Khi trải nghiệm đi thuyền xuôi dòng sông Kuma,\ntôi đã cảm thấy \"Thành thật mà nói, hơi đắt\"."
# monologue
# JP: クマ川下りは、\n素晴らしい経験であったにもかかわらず、だ。
2052 = "Mặc dù chuyến đi thuyền trên sông Kuma,\nlà một trải nghiệm tuyệt vời, vậy mà tôi vẫn cảm thấy thế."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、『金を払って働かされる』と思われるなら、\n例え料金が一円だろうと、参加するものはいなくなる」
1687 = "「Đúng là, nếu bị nghĩ là 『Bỏ tiền ra để bị bắt làm việc』,\nthì dù giá vé chỉ có 1 yên, cũng sẽ chẳng có ai tham gia.」"
# monologue
# JP: ならば、それが『労働』でなくなるような印象づくり。
2516 = "Nếu vậy, phải tạo ra ấn tượng rằng đó không phải là 『lao động』."
# monologue
# JP: 掘った石炭でＳＬを動かすロマンがしかし、\n鉄道好きでないものには、なんの魅力も無いのなら――
2385 = "Nhưng nếu sự lãng mạn của việc dùng than mình đào được để vận hành SL,\nlại chẳng có chút sức hút nào đối với những người không thích đường sắt thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「――それなら、例えば……\n掘った石炭を、疑似通貨にするという案はどうだろう」
1147 = "「——Nếu vậy, ví dụ như......\nPhương án biến than đào được thành một loại tiền tệ ảo thì sao.」"
# 【真闇】
# display as 真闇
# JP: 「ああ、そりゃあええねぇ」
1483 = "「À, ý đó hay đấy.」"
# monologue
# JP: 沈黙を守っていた真闇姉が、\n思わず、といった感じの賛辞をくれる。
1987 = "Chị Mayami vốn đang giữ im lặng,\nbất giác thốt lên lời khen ngợi."
# monologue
# JP: 単純だ、と自分で思うが、\nその称賛に押され言葉も勢いづく。
2534 = "Tự bản thân tôi cũng thấy nó thật đơn giản,\nnhưng được khích lệ bởi lời khen đó, lời nói của tôi cũng thêm phần dõng dạc."
# 【双鉄】
# display as 雙鐵
# JP: 「通貨であるから、使い道を選べる。そのうちのひとつは、\n投げ込み、あるいは\\x%l車掌;#00ffc040;車掌%l;#;体験などでもいいし――」
1620 = "「Vì là tiền tệ, nên có thể chọn cách sử dụng. Một trong số đó,\ncó thể là trải nghiệm xúc than vào lò, hay trải nghiệm làm \\x%l車掌;#00ffc040;trưởng tàu%l;#; cũng được——」"
# monologue
# JP: 僕やポーレットには通じるロマン。\n自由に選べるのであれば、もちろんそれも選択肢になる。
2387 = "Đó là sự lãng mạn mà tôi và Paulette đều hiểu.\nNếu được tự do lựa chọn, thì tất nhiên đó cũng sẽ trở thành một sự lựa chọn."
# 【双鉄】
# display as 雙鐵
# JP: 「他には、そうだな。蒸気焼酎や蒸気アイス、\nあるいは新駅弁のような物品とも替えられることにする」
1415 = "「Ngoài ra thì, để xem nào. Có thể đổi lấy các vật phẩm như rượu shochu hơi nước, kem hơi nước,\nhoặc là cơm hộp nhà ga kiểu mới chẳng hạn.」"
# 【ふかみ】
# display as 深美
# JP: 「なら、クマ川くだりの乗船券！\n乗船券とも、替えられることにしてください！　ですっ」
1775 = "「Nếu vậy, vé đi thuyền xuôi dòng sông Kuma nữa!\nXin hãy cho phép đổi lấy cả vé đi thuyền nữa! Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだな。\nそのようにして、協賛を求めていくのは、とてもいいな」
1479 = "「À, đúng vậy nhỉ.\nLàm như vậy, rồi kêu gọi tài trợ, là một ý tưởng rất hay đấy.」"
# monologue
# JP: そうすれば、観光振興に全市を巻き込めるかもしれん。
2177 = "Làm vậy, có lẽ sẽ kéo được toàn thành phố vào công cuộc chấn hưng du lịch."
# 【真闇】
# display as 真闇
# JP: 「宣伝効果が見込めるようになれば、協賛品、\n無償提供も出てくるようになるかもしれんねぇ」
1520 = "「Nếu có thể thấy được hiệu quả tuyên truyền, thì các sản phẩm tài trợ,\ncũng có thể sẽ được cung cấp miễn phí đấy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1463 = "「Ồ.」"
# monologue
# JP: 確かに、だ。たとえば、掘った石炭を一合瓶――\nカップサイズの蒸気焼酎と交換できることとする。
2468 = "Đúng là vậy. Ví dụ, than đào được có thể đổi lấy một chai một go——\nmột cốc rượu shochu hơi nước."
# monologue
# JP: それをうまいと感じてもらえば、\n御土産に一升瓶を買ってもらえるかもしれない。
2176 = "Nếu họ uống và cảm thấy ngon,\nthì có thể họ sẽ mua một chai một shou về làm quà lưu niệm."
# 【双鉄】
# display as 雙鐵
# JP: 「協賛と宣伝と。\nうまく運べば、win-winという形になるか」
1755 = "「Tài trợ và tuyên truyền.\nNếu vận hành suôn sẻ, sẽ trở thành mô hình win-win nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「最初は仮に、かつかつの料金設定をしたとしても、\nそういう協賛を増やせれば、利益の範囲も広げていける」
1547 = "「Ban đầu giả sử có đặt mức giá sát nút đi chăng nữa,\nnhưng nếu tăng được những nguồn tài trợ như vậy, thì phạm vi lợi nhuận cũng có thể mở rộng ra.」"
# monologue
# JP: ポーレットの声に頷き返す。
2294 = "Tôi gật đầu đáp lại giọng nói của Paulette."
# monologue
# JP: 僕だけではなく、れいなも、ハチロクも、真闇姉も、\n凪もふかみも――日々姫まで。
1997 = "Không chỉ tôi, mà cả Reina, Hachiroku, chị Mayami,\nNagi, Fukami——và cả Hibiki nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「魅力ある協賛を増やせれば。\nこの案は、採算性のある事業とできる」
1515 = "「Nếu có thể tăng cường các nguồn tài trợ hấp dẫn.\nThì phương án này, có thể trở thành một dự án có khả năng sinh lời.」"
# monologue
# JP: 整頓のための言葉と同時、\nやるべきことが、次々と頭の中に浮かんでくる。
2124 = "Cùng với những lời tổng kết,\nnhững việc cần làm liên tiếp hiện ra trong đầu tôi."
# monologue
# JP: ああ、本当に次々だ。\n僕とポーレットとふたりでは、とても全てはこなしきれん。
2116 = "À, thực sự là liên tiếp hiện ra.\nChỉ với tôi và Paulette thì không thể nào cáng đáng hết được."
# 【双鉄】
# display as 雙鐵
# JP: 「術仙廃炭鉱の再活用を観光振興と繋げたのなら、\n御一夜は必ずや、かつてに勝る輝きを得る」
1517 = "「Nếu có thể kết nối việc tái sử dụng mỏ than bỏ hoang Jutsu-sen với chấn hưng du lịch,\nthì Ohimitera chắc chắn sẽ có được sự huy hoàng vượt xa cả trong quá khứ.」"
# monologue
# JP: だから、その明日を迎えるために。\nまずなすべきは、たったひとつに決まっている。
2379 = "Vì vậy, để chào đón ngày mai đó.\nViệc đầu tiên cần làm, chỉ có một mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、その輝きを見てみたい。\nそうするためには――みんなの力が必要だ」
1581 = "「Tôi, muốn được nhìn thấy sự huy hoàng đó.\nĐể làm được như vậy——tôi cần sức mạnh của mọi người.」"
# 【ハチロク】
# display as 八六
# JP: 「鉱山鉄道の廃線跡にお連れください。\nわたくしの経験が、復線のために役立つかもしれません」
1745 = "「Xin hãy đưa em đến di tích tuyến đường sắt khai thác mỏ bỏ hoang.\nKinh nghiệm của em, có thể sẽ giúp ích cho việc khôi phục tuyến đường.」"
# 【真闇】
# display as 真闇
# JP: 「鉄道の方の経費ば細かに出してもらえたら、\n料金設定のシミュレーション、立てたげるねぇ」
1712 = "「Nếu các em có thể tính toán chi tiết chi phí bên phía đường sắt,\nchị sẽ lập bảng mô phỏng thiết lập giá vé cho nhé.」"
# 【凪】
# display as 凪
# JP: 「じいちゃんと職人さんたちに声かけとくばい！」
1460 = "「Em sẽ đi gọi ông nội và các bác thợ thủ công nha!」"
# 【ふかみ】
# display as 深美
# JP: 「わたしも――業者さんとか、観光協会のみなさんに。\nとか、お話――それとなくしてみます。です」
1569 = "「Em cũng sẽ——thử khéo léo nói chuyện với các nhà cung cấp, hay mọi người trong hiệp hội du lịch.\nXem sao. Ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなは、ポーレットをお手伝いしますよぉ」
1679 = "「Reina sẽ giúp đỡ Paulette nha~」"
# monologue
# JP: 頼むより先、力を、声を与えてもらえる。
2503 = "Trước cả khi tôi mở lời nhờ vả, mọi người đã trao cho tôi sức mạnh và những lời động viên."
# 【日々姫】
# display as 日日姬
# JP: 「イメージ作り、すごく、重要になると思うから」
1589 = "「Em nghĩ việc xây dựng hình ảnh, sẽ vô cùng quan trọng đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫」
1625 = "「Hibiki.」"
# monologue
# JP: 顔は、そっぽを向いたまま。\nだけれど、確かに伝わってくる。
2137 = "Khuôn mặt vẫn ngoảnh đi chỗ khác.\nThế nhưng, tôi chắc chắn đã cảm nhận được."
# monologue
# JP: 日々姫は気持ちを、僕らの方へと向けてくれてる。
2335 = "Hibiki đang hướng tấm lòng của mình về phía chúng tôi."
# 【日々姫】
# display as 日日姬
# JP: 「描くもんあったら言うて。描くけん」
1647 = "「Có gì cần vẽ thì cứ nói. Em sẽ vẽ cho.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとう。力を貸してくれるのだな」
1401 = "「Cảm ơn em. Em chịu giúp anh một tay nhỉ.」"
# 【日々姫】
# display as 日日姬
# JP: 「そんなん、最初からゆーとるもん」
1566 = "「Chuyện đó, em đã nói từ đầu rồi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1468 = "「唔？」" 
# monologue
# JP: ちら、と横目が僕を向く。
2141 = "Đôi mắt em ấy khẽ liếc sang nhìn tôi."
# monologue
# JP: どこか淋しげにも見えて、\n少し嬉しげにも見える。
2392 = "Trông có vẻ gì đó hơi cô đơn,\nnhưng cũng có chút vui vẻ."
# 【日々姫】
# display as 日日姬
# JP: 「そぎゃんと楽しそうなにぃにぃ見たら……\n妹やもん。協力、するしかなかろーもんね」
1692 = "「Thấy anh hai vui vẻ như vậy thì......\nLà em gái mà. Đành phải hợp tác giúp đỡ thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1770 = "「Vậy sao.」"
# monologue
# JP: くしゃくしゃと、いつものように髪を撫で――\nようとした手を避けられる。
2268 = "Tôi định xoa đầu vò rối tóc em ấy như mọi khi——\nNhưng bàn tay tôi đã bị né tránh."
# monologue
# JP: 日々姫は苦笑し、咳払いして、目をつぶり。
2159 = "Hibiki cười gượng, hắng giọng rồi nhắm mắt lại."
# 【日々姫】
# display as 日日姬
# JP: 「違いますよ、兄さん」
1358 = "「Không phải đâu, anh trai.」"
# monologue
# JP: それからゆっくり。開けなおした目で僕をみる。
2381 = "Sau đó em ấy từ từ mở mắt ra và nhìn tôi."
# 【日々姫】
# display as 日日姬
# JP: 「その手はもっと――\n未来に向けて動かさなくちゃ、ダメですってば」
1399 = "「Bàn tay đó phải——\nHướng tới tương lai mà hành động nhiều hơn nữa mới được.」"
