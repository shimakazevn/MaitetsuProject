[script]
# lines: 418 
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？」
2258 = "「Anh Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん」
1806 = "「A, ừ.」"
# monologue
# JP: 声をかけられ、集中が切れる。\nが、邪魔をされたとは感じない。
2818 = "Bị gọi tên, sự tập trung của tôi bị cắt đứt. Nhưng tôi không hề cảm thấy bị làm phiền."
# monologue
# JP: どころか、むしろ――
2485 = "Trái lại, đúng hơn là――"
# 【ポーレット】
# display as 波萊特
# JP: 「お疲れ様です。紅茶、淹れました」
1718 = "「Anh vất vả rồi. Em pha hồng trà đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまんな」
1819 = "「À, cảm ơn cô.」"
# monologue
# JP: ミルクも砂糖も淹れずに飲めば、\n普段より、香りも味も濃いと感じる。
2443 = "Uống mà không thêm sữa hay đường, tôi cảm thấy hương vị đậm đà hơn bình thường."
# monologue
# JP: その気遣いがありがたい。\n疲労と眠気を、舌先から崩してもらえる心持ちだ。
2826 = "Sự chu đáo đó thật đáng quý. Cảm giác như mệt mỏi và cơn buồn ngủ tan biến dần từ đầu lưỡi."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　れいなは？」
1830 = "「Hửm? Reina đâu rồi?」"
# monologue
# JP: ついさきほどまで、\nポーレットを手伝っていたれいなの姿が見当たらない。
2766 = "Bóng dáng Reina, người mới lúc nãy vẫn còn đang giúp đỡ Paulette, giờ không thấy đâu."
# 【ポーレット】
# display as 波萊特
# JP: 「もうとっくに寝ちゃいました。\nあの子、早寝を心がけてますから」
1887 = "「Con bé đã ngủ từ lâu rồi ạ. Vì con bé luôn cố gắng ngủ sớm mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1798 = "「À――」"
# monologue
# JP: わかってしまうような気がする。
2633 = "Tôi có cảm giác mình đã hiểu ra."
# monologue
# JP: 早寝をこころがけるのは、れいな自身が他の誰よりも、\n居眠りを気にし、回避したいと願っているからなのだろう。
2763 = "Việc cố gắng ngủ sớm, có lẽ là do chính bản thân Reina, hơn ai hết, rất bận tâm và muốn tránh việc ngủ gật."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、それにしても早すぎ――っ！！？」
1670 = "「Nhưng mà, nói đi cũng phải nói lại, thế này thì sớm quá――!!?」"
# monologue
# JP: ふと、時計を見て驚かされる。\nいつの間に――日付が、とうに変わっている。
2651 = "Bất chợt, tôi nhìn đồng hồ và giật mình. Từ lúc nào――ngày đã chuyển sang hôm sau từ lâu rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「……随分と根を詰めてしまっていたのだな」
1401 = "「...Tôi đã tập trung quá mức rồi nhỉ.」"
# monologue
# JP: 目がショボショボとしているし、\n肩から腕もこわばっている。
2649 = "Mắt tôi đang lờ đờ,\ntừ vai đến cánh tay cũng cứng đờ."
# monologue
# JP: 川下りの手伝いのときとは１８０度性質の違う、\nけれども、同じくらいの深さの疲れだ。
2928 = "Tính chất mệt mỏi hoàn toàn khác biệt 180 độ so với lúc giúp chèo thuyền, nhưng mức độ mệt mỏi thì sâu sắc ngang ngửa."
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう、双鉄くん」
2176 = "「Cảm ơn anh, anh Soutetsu.」"
# monologue
# JP: なのに、一言。
2475 = "Vậy mà, chỉ một lời."
# monologue
# JP: ポーレットのその囁きだけで、\n体も心もほぐしてもらえて、軽くなる。
2901 = "Chỉ bằng lời thì thầm đó của Paulette, cả cơ thể và tâm trí tôi như được thả lỏng, nhẹ nhõm hẳn đi."
# 【ポーレット】
# display as 波萊特
# JP: 「こんな遅くまで付き合ってくれて」
2174 = "「Đã thức cùng em đến tận khuya thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、秘書業務を溜めこんでしまっていたのは僕だ。\nただ単に、自分の負債を返済しているにすぎんよ」
1672 = "「Không, chính tôi là người đã để dồn ứ công việc thư ký mà. Đơn giản chỉ là tôi đang trả món nợ của mình thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それでも、やっぱりありがとう。\n秘書だって、わたしが無理いってお願いしたんだから」
1664 = "「Dù vậy, em vẫn muốn cảm ơn anh. Ngay cả việc làm thư ký cũng là do em ép anh mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは誤解だ」
2209 = "「Cô hiểu lầm rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1793 = "「Hả?」"
# monologue
# JP: ポーレットの目も眠そうだ。\nわずかにうるみ、とろんとしている。
2733 = "Mắt Paulette trông cũng có vẻ buồn ngủ. Hơi ngấn nước và lờ đờ."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、こう見えて存外とわがままでな。\nやりたくないことは、誰にどう願われたところでやらん」
1952 = "「Trông tôi thế này thôi chứ thực ra ích kỷ lắm. Những việc không muốn làm, dù ai có cầu xin thế nào tôi cũng không làm đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そっか……そうなら、嬉しいな」
2216 = "「Vậy sao... nếu thế thì, em vui lắm.」"
# monologue
# JP: カップを両手でつつみこみながらはにかんで。\nこくり、ポーレットは喉を鳴らす。
2562 = "Hai tay ôm trọn lấy chiếc cốc, cô ấy bẽn lẽn mỉm cười. Ực, Paulette khẽ nuốt một ngụm."
# monologue
# JP: 甘いミルクの匂いがふわり、\n僕の鼻先まで届いてくる。
2652 = "Mùi sữa ngọt ngào thoang thoảng, lan tỏa đến tận mũi tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「こんな時間にあれだけど――\nちょっとお話、大丈夫ですか？」
2256 = "「Giờ này rồi mà nói chuyện này thì hơi ngại―― Nhưng em có chuyện muốn bàn, có được không anh?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。今日……いや、今夜はここで区切りとしておく。\n寝て起きてまで、疲労を持ち越したくはないからな」
1824 = "「Ừm. Hôm nay... à không, đêm nay chúng ta dừng công việc ở đây thôi. Tôi không muốn mang theo sự mệt mỏi cho đến lúc ngủ dậy đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「じゃ、わたしもここまでにしておきます」
2238 = "「Vậy, em cũng dừng ở đây luôn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「話っていうのは、\x%l客車;#00ffc040;客車%l;#;のことなんです」
1915 = "「Chuyện em muốn bàn là về \\x%l客車;#00ffc040;toa hành khách%l;#; ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「というと――目処がついたのか？」
1678 = "「Nói vậy là――đã có manh mối rồi sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「つくかもなんです。[ひろしま,1]廣島からお話があって。\nええと、[つ]津っ[てつ]鐵にもともとあった\x%l客車;#00ffc040;客車%l;#;を――」
2170 = "「Cũng có thể coi là vậy ạ. Có tin tức từ Hiroshima. Ừm, một \\x%l客車;#00ffc040;toa hành khách%l;#; vốn thuộc về Tsutetsu――」"
# 【双鉄】
# display as 雙鐵
# JP: 「つってつ？」
2066 = "「Tsutetsu?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。津っ鐵。\n[にしつがるてつどう,4]西津輕鐵道さんの愛称です」
2012 = "「Vâng. Tsutetsu. Là tên gọi thân mật của Đường sắt Nishitsugaru ạ.」"
# monologue
# JP: おそらくは、よほど嬉しい話であるのだろう。\n一言ごとに、ポーレットの顔がゆるんでいく。
2780 = "Có lẽ, đó là một câu chuyện vô cùng đáng mừng. Sau mỗi lời nói, khuôn mặt Paulette lại giãn ra."
# monologue
# JP: 僕とて喜びを共有したいのはやまやまなのだが、\n今ひとつ、話を飲み込めないでいる。
2930 = "Dù tôi cũng rất muốn chia sẻ niềm vui đó, nhưng hiện tại, tôi vẫn chưa hiểu rõ câu chuyện."
# 【双鉄】
# display as 雙鐵
# JP: 「津輕といえば[あおもり,1]蒼森だよな？\nもともと蒼森にあった\x%l客車;#00ffc040;客車%l;#;が、どうして廣島になど？」
2062 = "「Nhắc đến Tsugaru thì là Aomori đúng không? Tại sao \\x%l客車;#00ffc040;toa hành khách%l;#; vốn ở Aomori lại xuất hiện ở Hiroshima?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ちょっと珍しい\x%l客車;#00ffc040;客車%l;#;だからです。\n廃棄処分になるところを、電車姫様が買い取って」
1839 = "「Bởi vì đó là một \\x%l客車;#00ffc040;toa hành khách%l;#; khá hiếm ạ. Lúc sắp bị mang đi tiêu hủy thì đã được Densha Hime mua lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「電車姫――とは、確か、\n廣島の毛利電鉄のオーナーのことだったか」
2262 = "「Densha Hime――nhớ không nhầm thì, là chủ sở hữu của Đường sắt điện Mouri ở Hiroshima nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうです。正真正銘のお姫様で、\n正真正銘の\x%lまいてつ;#00ffc040;まいてつ%l;#;ですから、あのひとは」
2000 = "「Đúng vậy ạ. Một nàng công chúa đích thực, và cũng là một \\x%lまいてつ;#00ffc040;chủ tàu%l;#; đích thực đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1796 = "「Hừm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いつか、どこか誰かが必要とするときのため。\n\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;を、買い取り保存してくれてたんです」
1861 = "「Vì một lúc nào đó, ở đâu đó, sẽ có ai đó cần đến. Cô ấy đã mua lại và bảo quản \\x%lストーブ客車;#00ffc040;toa xe sưởi ấm%l;#; giúp chúng ta.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;？」
1377 = "「\\x%lストーブ客車;#00ffc040;Toa xe sưởi ấm%l;#;?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、言っちゃった！」
1809 = "「A, lỡ miệng nói mất rồi!」"
# monologue
# JP: もう少しもったいをつけるつもりだったのだろうか。\nポーレットは口元を押さえ、しまったなぁという顔をする。
2781 = "Có lẽ cô ấy định úp mở thêm một chút nữa. Paulette lấy tay che miệng, làm bộ mặt như thể 'thôi chết rồi'."
# monologue
# JP: が、しかし……もったいぶられたところで僕では、\nどのみちまだまだ理解が足りぬ。
2453 = "Nhưng mà... dù cô ấy có úp mở thì với tôi, đằng nào tôi cũng vẫn chưa hiểu rõ được."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;というのは……なんだ――\nそのまま、ストーブがついている\x%l客車;#00ffc040;客車%l;#;……でいいのか？」
1376 = "「\\x%lストーブ客車;#00ffc040;Toa xe sưởi ấm%l;#; nghĩa là... gì nhỉ―― Đúng như tên gọi, là \\x%l客車;#00ffc040;toa hành khách%l;#; có trang bị bếp lò sưởi... phải không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうです。蒼森の冬の風物詩ですね」
2020 = "「Vâng, đúng rồi ạ. Đó là nét đặc trưng của mùa đông ở Aomori đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「冬の風物詩――御一夜でいえば、\nクマ川下りのコタツ船になるわけだな」
1738 = "「Nét đặc trưng của mùa đông――nếu ở Ohimitera, thì sẽ là thuyền sưởi ấm xuôi dòng sông Kuma nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですね！　あれと良く似た感じです」
1808 = "「A, đúng rồi ạ! Cảm giác rất giống với cái đó.」"
# monologue
# JP: こくこくと、頷きさえもが嬉しげだ。
2578 = "Cô ấy gật đầu lia lịa, ngay cả cái gật đầu cũng tràn đầy niềm vui."
# 【ポーレット】
# display as 波萊特
# JP: 「コタツの代わりにストーブ。クマ焼酎の代わりに日本酒。\nおつまみは……ああ、そこは大きく違いますね」
2191 = "「Thay bàn sưởi Kotatsu bằng bếp lò sưởi. Thay rượu shochu Kuma bằng rượu sake Nhật Bản. Đồ nhắm thì... a, điểm đó thì khác hẳn đấy ạ.」"
# monologue
# JP: ポーレットの目がふうっと和らぐ。
2730 = "Ánh mắt Paulette chợt dịu lại."
# 【ポーレット】
# display as 波萊特
# JP: 「ストーブだから、上で焼けるんですよ。\nスルメとか、お餅とか」
2033 = "「Vì là bếp lò sưởi nên có thể nướng đồ ở trên được ạ. Như khô mực, hay bánh mochi chẳng hạn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはいいな」
1817 = "「Ồ, nghe hay đấy.」"
# monologue
# JP: 下戸の僕さえ、飲みたくなるような情景が\n脳裏に容易に浮き上がってくる。
2594 = "Ngay cả một kẻ không biết uống rượu như tôi, cũng dễ dàng mường tượng ra viễn cảnh khiến mình muốn nhâm nhi vài chén."
# 【ポーレット】
# display as 波萊特
# JP: 「お餅。わたし、それまで見たことがなかったんですよ。\n冬は、いっつもフランクにいましたから」
2242 = "「Bánh mochi. Trước đó em chưa từng thấy bao giờ đâu. Vì mùa đông, em luôn ở Pháp mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
1989 = "「Hô?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ストーブの上に網が乗ってて。そのはしっこのお餅から、\nいい匂いがして、ぷぅってふくれて」
2026 = "「Trên bếp lò sưởi có đặt một cái vỉ nướng. Từ miếng bánh mochi ở góc vỉ, tỏa ra mùi thơm phức, rồi phồng to lên cái phũm.」"
# monologue
# JP: 知識を説明するのではなく、想い出を語ってもらっている。\nそう感じれば、僕もわずかにあたたかくなる。
2573 = "Không phải là giải thích kiến thức, mà là đang kể lại những kỷ niệm. Cảm nhận được điều đó, lòng tôi cũng thấy ấm áp lạ thường."
# 【ポーレット】
# display as 波萊特
# JP: 「触ってみたくて、でも触ったらヤケドしそうで。\nじっと見てたら、ぷしゅんっ！　ってしぼんで」
2098 = "「Em muốn chạm thử, nhưng lại sợ bị bỏng. Đang nhìn chằm chằm thì, xẹp! Nó xẹp lép luôn.」"
# monologue
# JP: そのときのポーレットと、きっと同じ目をしてるのだろう。\n青い瞳はきらきらと、陽をきらめかせる川面のようだ。
2906 = "Chắc hẳn lúc đó Paulette cũng có ánh mắt y như bây giờ. Đôi mắt xanh biếc lấp lánh, tựa như mặt sông phản chiếu ánh mặt trời."
# 【ポーレット】
# display as 波萊特
# JP: 「でも、\x%l車掌;#00ffc040;車掌%l;#;さんが裏返したら、またすぐにふくれて、\nもう、わたし食べたくて食べたくて」
2074 = "「Nhưng mà, khi \\x%l車掌;#00ffc040;trưởng tàu%l;#; lật mặt lại, nó lại phồng lên ngay lập tức, Trời ơi, lúc đó em thèm ăn đến mức không chịu nổi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「食べたのだろう？\n砂糖醤油か、それともキナコか？」
1713 = "「Thế rồi cô có được ăn không? Chấm nước tương đường, hay là bột đậu nành Kinako?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ノリとお醤油です。ノリの風味とお餅の味が、\nあつあつで、ふわって広がって――美味しかった」
1993 = "「Là rong biển và nước tương ạ. Hương vị của rong biển và vị của bánh mochi, nóng hổi, lan tỏa mềm mại trong miệng――ngon tuyệt cú mèo luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
1795 = "「Ưm.」"
# monologue
# JP: いかん、僕まで小腹がすいてきた。
2446 = "Chết dở, nghe cô ấy kể mà tôi cũng thấy hơi đói bụng rồi."
# 【ポーレット】
# display as 波萊特
# JP: 「口もお腹もぽかぽかで、ストーブはカンカンに燃えてて。\nなのに窓の外では、地吹雪で雪が舞い上がって真っ白で」
1831 = "「Cả miệng và bụng đều ấm áp, bếp lò sưởi thì cháy rừng rực. Thế nhưng bên ngoài cửa sổ, bão tuyết mù mịt cuốn tung tuyết trắng xóa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「真冬の旅か」
1741 = "「Chuyến du lịch giữa mùa đông à.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。初めて、日ノ本ですごした冬でした」
2010 = "「Vâng. Đó là mùa đông đầu tiên em trải qua ở Hinomoto.」"
# monologue
# JP: 数秒、まぶたが落とされる。\n過去の景色をその裏側に描いたのだろうか。
2575 = "Cô ấy khép hờ mí mắt trong vài giây. Có lẽ đang phác họa lại khung cảnh quá khứ đằng sau đôi mi ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「産まれて初めて、夜行寝台に乗ったのもその時でした。\n個室のB寝台。パパが下の個室、わたしは上の個室で」
2227 = "「Đó cũng là lần đầu tiên trong đời em đi tàu giường nằm đêm. Phòng riêng giường nằm hạng B. Ba em ở phòng dưới, còn em ở phòng trên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「親子旅だな」
2082 = "「Chuyến du lịch của hai cha con nhỉ.」"
# monologue
# JP: なにげなくいって頷き返され、\n瞬間、ふっと気にかかる。
2572 = "Nói bâng quơ rồi được gật đầu đáp lại, trong khoảnh khắc, tôi chợt để tâm."
# monologue
# JP: パパと一緒に――初めて、日ノ本で過ごす冬――\nそれまでずっと、フランクで過ごしていた冬。
2520 = "Cùng với ba――lần đầu tiên trải qua mùa đông ở Hinomoto―― Trước đó, mùa đông luôn trải qua ở Pháp."
# monologue
# JP: （ポーレットは、母親がフランク人なのだよな）
2969 = "（Paulette có mẹ là người Pháp nhỉ.）"
# monologue
# JP: その冬は何故、フランクで過ごさなかったのか。\nその旅は何故、『パパとママと一緒』ではなかったのか。
2835 = "Tại sao mùa đông năm đó lại không ở Pháp? Tại sao chuyến du lịch đó lại không phải là 『Cùng với ba và mẹ』?"
# monologue
# JP: あるいは、ごくごく単純に、ポーレットの母は、\n鉄道旅行を好まぬ人だっただけかもしれぬが――
2926 = "Hoặc có thể, đơn giản là mẹ của Paulette chỉ là một người không thích du lịch bằng đường sắt mà thôi――"
# 【ポーレット】
# display as 波萊特
# JP: 「パパが大好きだったんです。夜行寝台、“よあけ”。\n[うえの,1]上埜発の蒼森行です」
2083 = "「Ba em thích lắm ạ. Tàu giường nằm đêm, “Yoake”. Khởi hành từ Ueno đi Aomori.」"
# monologue
# JP: 前から、気にはなっていた。ポーレットが語る想い出は、\nいつだって、パパとのものであることを。
2641 = "Từ trước tôi đã để ý rồi. Những kỷ niệm mà Paulette kể, lúc nào cũng là những chuyện cùng với ba."
# 【ポーレット】
# display as 波萊特
# JP: 「本当に、降りた時から、蒼森駅は雪の中で。\n乗り換えて、[ごしょがわら,3]五所ケ藁っていう駅から津っ鐵に乗って」
1749 = "「Thật sự, ngay từ lúc xuống tàu, ga Aomori đã chìm trong tuyết. Bọn em đổi tàu, và lên Tsutetsu từ một ga tên là Goshogawara.」"
# monologue
# JP: 『ママは一体、どうしていたのか』\n気軽に聞いてはいけない気がして、声を出せない。
2455 = "『Rốt cuộc thì mẹ cô ấy đã làm gì?』 Cảm thấy không nên tùy tiện hỏi, nên tôi đành giữ im lặng."
# 【ポーレット】
# display as 波萊特
# JP: 「\x%l単線;#00ffc040;単線%l;#;で。ストーブ\x%l列車;#00ffc040;列車%l;#;はとっても静かで。\nガイドのおばさんの津輕弁、初めて聞くのに懐かしくて」
2219 = "「Đường \\x%l単線;#00ffc040;đơn%l;#; ạ. Chuyến \\x%l列車;#00ffc040;tàu%l;#; sưởi ấm rất đỗi tĩnh lặng. Giọng Tsugaru của cô hướng dẫn viên, lần đầu tiên nghe nhưng lại thấy thật hoài niệm.」"
# monologue
# JP: ……あえて語らぬことならば、あえて尋ねる必要も無い。\n別の機会で、かまわない。
1363 = "...Nếu cô ấy đã cố ý không nhắc đến, thì tôi cũng không cần thiết phải cố gặng hỏi. Để dịp khác cũng không sao."
# monologue
# JP: 幸せそうなポーレットの、\n語る言葉に醸す空気に、いまはゆったり浸っていたい。
2767 = "Bây giờ, tôi chỉ muốn thong thả đắm mình trong bầu không khí được tạo nên bởi những lời kể hạnh phúc của Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「駅のホームも雪に埋もれて。\x%l駅名標;#00ffc040;駅名標%l;#;も読めなくて。\n停車の度、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が\x%l運転士;#00ffc040;運転士%l;#;に抱えられて出てきて」
2112 = "「Sân ga cũng bị vùi lấp trong tuyết. Đến cả \\x%l駅名標;#00ffc040;biển hiệu nhà ga%l;#; cũng không đọc được. Mỗi lần tàu dừng, \\x%lレイルロオド;#00ffc040;Railord%l;#; lại được \\x%l運転士;#00ffc040;người lái tàu%l;#; bế ra ngoài.」"
# monologue
# JP: そう切り替えれば、疑問などすぐにとろけてしまう。\nポーレットの声も表情も、あたたかすぎて。
2488 = "Khi đã chuyển đổi suy nghĩ như vậy, những thắc mắc cũng tan biến ngay lập tức. Cả giọng nói và biểu cảm của Paulette, đều quá đỗi ấm áp."
# monologue
# JP: それこそストーブにあたったように、\n鼻の頭と両頬を、幸せそうなピンクに染めてる。
2592 = "Giống như đang sưởi ấm bên bếp lò, đầu mũi và hai má cô ấy nhuốm một màu hồng rạng rỡ hạnh phúc."
# 【ポーレット】
# display as 波萊特
# JP: 「小さな体が、コートと長靴でもこもこしてて。\n吹雪にも負けない声で、駅名と停車時間を伝えてくれて」
2235 = "「Cơ thể nhỏ bé ấy, được bọc kín mít trong áo khoác và đôi ủng dài. Bằng giọng nói không hề thua kém bão tuyết, cô bé truyền đạt tên ga và thời gian dừng đỗ.」"
# monologue
# JP: ああ、とポーレットが囁きを漏らす。
2735 = "A, Paulette khẽ thì thầm."
# monologue
# JP: 潤みをいくらかました目で、\n優しく、やさしく、じんわり微笑む。
2557 = "Với đôi mắt có phần ngấn nước, cô ấy mỉm cười, một nụ cười thật hiền hòa, thật dịu dàng, lan tỏa dần dần."
# 【ポーレット】
# display as 波萊特
# JP: 「多分、あれで。あの旅で――わたし、ほんとに、\n鉄道と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を、大好きになった」
1853 = "「Có lẽ, là vì lần đó. Trong chuyến đi đó――em, thực sự, đã trở nên vô cùng yêu thích đường sắt và \\x%lレイルロオド;#00ffc040;Railord%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2217 = "「Vậy sao.」"
# monologue
# JP: ……その感覚は、僕には今ひとつわからない。
1356 = "...Cảm giác đó, tôi vẫn chưa thực sự hiểu được."
# monologue
# JP: が、わからない故、\nうきあがってくる感情もある。
2454 = "Nhưng, chính vì không hiểu, nên cũng có những cảm xúc trào dâng."
# 【双鉄】
# display as 雙鐵
# JP: 「とても豊かな旅だったのだな。\n僕も、経験してみたかった」
2101 = "「Thật là một chuyến đi vô cùng phong phú nhỉ. Tôi cũng muốn được trải nghiệm thử một lần.」"
# 【ポーレット】
# display as 波萊特
# JP: 「できますよ？　経験」
1785 = "「Được chứ anh? Trải nghiệm ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
# 1793 = "「哎？」" 
# monologue
# JP: ポーレットにも、僕の言葉が意外であったのかもしれん。\nふたり驚いた顔をして、数秒、にらめっこしてしまう。
2718 = "Có lẽ với Paulette, lời nói của tôi cũng là một điều bất ngờ. Cả hai chúng tôi mang khuôn mặt ngạc nhiên, nhìn nhau chằm chằm mất vài giây."
# 【ポーレット】
# display as 波萊特
# JP: 「ええと、津っ鐵さんもストーブ\x%l列車;#00ffc040;列車%l;#;もまだ現役です。\n観光\x%l列車;#00ffc040;列車%l;#;として、一番くらいに名高いですから」
2232 = "「À ừm, Tsutetsu và chuyến \\x%l列車;#00ffc040;tàu%l;#; sưởi ấm vẫn đang hoạt động đấy ạ. Là một chuyến \\x%l列車;#00ffc040;tàu%l;#; du lịch, nó nổi tiếng nhất nhì luôn đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1763 = "「Vậy sao.」"
# monologue
# JP: そこに至るまでの努力を思えば、頭が下がる。\nあやかりたいなと一瞬思い、それではいかんと思い直す。
2433 = "Nghĩ đến những nỗ lực để đạt được thành tựu đó, tôi thực sự nể phục. Thoáng chốc tôi đã nghĩ muốn được hưởng sái chút ít, nhưng rồi lại tự nhủ thế là không được."
# monologue
# JP: 日ノ本一の観光\x%l列車;#00ffc040;列車%l;#;――\nあやかっていては、それを越えるには至れまい。
2634 = "Chuyến \\x%l列車;#00ffc040;tàu%l;#; du lịch số một Hinomoto―― Nếu chỉ biết bắt chước, thì sẽ chẳng bao giờ vượt qua được nó."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、現役というのなら何故、\n\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;が廣島に引き取られているのだ？」
1665 = "「Nhưng mà, nếu nói là đang hoạt động thì tại sao, \\x%lストーブ客車;#00ffc040;toa xe sưởi ấm%l;#; lại được đưa về Hiroshima?」"
# 【ポーレット】
# display as 波萊特
# JP: 「単純な老朽化です。古くなったから、\n他所から比較的新しい\x%l客車;#00ffc040;客車%l;#;を買い入れてストーブ化した」
1776 = "「Đơn giản là do xuống cấp thôi ạ. Vì đã cũ rồi, nên họ mua \\x%l客車;#00ffc040;toa hành khách%l;#; tương đối mới từ nơi khác về và trang bị lò sưởi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「トコロテン方式で不要になった旧\x%l客車;#00ffc040;客車%l;#;を、\n電車姫様が引き取って保存していた――ということか」
2129 = "「Ý cô là, \\x%l客車;#00ffc040;toa hành khách%l;#; cũ bị loại bỏ theo kiểu đẩy đùn, đã được Densha Hime nhận về và bảo quản――đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです。定期的に\x%l客車;#00ffc040;客車%l;#;交換できるくらいに、\n津っ鐵さんは、鉄道観光で成功してるんです」
1980 = "「Đúng vậy ạ. Đến mức có thể định kỳ thay mới \\x%l客車;#00ffc040;toa hành khách%l;#;, Tsutetsu đã rất thành công trong việc du lịch đường sắt đấy ạ.」"
# monologue
# JP: 引き出しを開け、ポーレットが何かを取り出す。
2722 = "Mở ngăn kéo, Paulette lấy ra thứ gì đó."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、プリントしたのか――\n凪が撮った写真だな？」
1805 = "「À, cô in ra rồi sao―― Là bức ảnh Nagi chụp đúng không?」"
# monologue
# JP: 虹の中央、赤い鉄橋。\n\x%lキハ07;#00ffc040;キハ07%l;#;が、その中心を走っている。
2609 = "Ngay giữa cầu vồng, một cây cầu sắt màu đỏ. \\x%lキハ07;#00ffc040;KiHa 07%l;#; đang chạy ngang qua vị trí trung tâm đó."
# 【ポーレット】
# display as 波萊特
# JP: 「これを電車姫様にお見せしたら、興味を持って下さって。\nそれで、マイントレジャー計画についてもお話しして」
1938 = "「Khi em cho Densha Hime xem bức ảnh này, cô ấy đã rất hứng thú. Sau đó, em cũng đã nói chuyện với cô ấy về kế hoạch Mine Treasure.」"
# 【双鉄】
# display as 雙鐵
# JP: 「手応えがあったのか」
2095 = "「Có phản hồi tốt chứ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。すごく面白がってくれて。で、\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;を\n譲ってくれてもいいってお話しになったんです」
2004 = "「Vâng. Cô ấy thấy rất thú vị. Rồi, câu chuyện chuyển sang việc cô ấy sẵn lòng nhượng lại \\x%lストーブ客車;#00ffc040;toa xe sưởi ấm%l;#; cho chúng ta.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、何故マイントレジャーの話でストーブ……\nああいや、ひょっとすると石炭ストーブという発想か？」
1669 = "「Nhưng mà, tại sao đang nói chuyện Mine Treasure lại chuyển sang lò sưởi... À không, có khi nào là ý tưởng dùng lò sưởi đốt than đá không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「大正解です！　双鉄くん」
1867 = "「Hoàn toàn chính xác! Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 1796 = "「唔」" 
# monologue
# JP: ならば冬には、『掘った石炭をストーブに投げ込み体験』\nという新しいオプションを設定できる。
2908 = "Nếu vậy vào mùa đông, chúng ta có thể thiết lập thêm một lựa chọn mới là 『Trải nghiệm ném than đá vừa đào được vào lò sưởi』."
# monologue
# JP: 夏には点けねば良いというだけのことだし、\n渡りに舟、の話ではある。が――
2833 = "Mùa hè thì chỉ cần không đốt lò là xong, đúng là chết đuối vớ được cọc. Nhưng mà――"
# 【双鉄】
# display as 雙鐵
# JP: 「老朽化で一度は引退した、\nしかも長く使われてなかった\x%l客車;#00ffc040;客車%l;#;……か」
2245 = "「Từng nghỉ hưu một lần vì xuống cấp, hơn nữa lại là một \\x%l客車;#00ffc040;toa hành khách%l;#; đã lâu không được sử dụng... sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです。\nそこが、お話しして相談したかったところで」
2007 = "「Đúng vậy ạ. Đó chính là điểm mà em muốn nói chuyện và thảo luận với anh.」"
# monologue
# JP: ん――と眉根が寄ってしまう。
2568 = "Hừm――tôi nhíu mày lại."
# 【ポーレット】
# display as 波萊特
# JP: 「電車姫様の保存車輌ですから、いい状態だと思います。\nけど、あの方はＳＬには詳しくないとも思いますから」
1837 = "「Vì là xe được Densha Hime bảo quản, nên em nghĩ tình trạng vẫn còn tốt. Nhưng mà, em cũng nghĩ cô ấy không am hiểu lắm về SL đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……煙などに対して、\n問題が出てくるかもしれぬということか」
1395 = "「...Ý cô là, có thể sẽ phát sinh vấn đề liên quan đến khói và những thứ tương tự sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。無いとは断言できません」
1995 = "「Vâng. Không thể khẳng định là không có ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「念のため聞くが、他の\x%l客車;#00ffc040;客車%l;#;のアテはあるのか？」
2177 = "「Hỏi để chắc chắn thôi, cô còn nhắm được \\x%l客車;#00ffc040;toa hành khách%l;#; nào khác không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「もう少し新しいのも、あるにはあるんですが……\nそっちは、有償になっちゃうんですよ」
2255 = "「Mới hơn một chút thì, có thì cũng có nhưng mà... Bên đó thì, sẽ phải trả phí đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ということは、廣島の話は――」
1828 = "「Hửm? Nói vậy tức là, vụ ở Hiroshima thì――」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、無償です。ご[かし,1]下賜です。\n移送も、九洲に上陸するまではやってくれるそうです」
1813 = "「A, là miễn phí ạ. Là ban thưởng đấy. Việc vận chuyển, nghe nói họ cũng sẽ lo cho đến khi cập bến Kyushu luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「随分と気前のいい話だな」
2212 = "「Quả là một lời đề nghị hào phóng nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「マイントレジャーが稼働したら、\n一番に招待してくれればそれでいいって」
1859 = "「Cô ấy bảo khi nào Mine Treasure đi vào hoạt động, chỉ cần mời cô ấy đến đầu tiên là được rồi.」"
# monologue
# JP: 幸せそうに、ポーレットが笑う。
2734 = "Paulette mỉm cười hạnh phúc."
# 【ポーレット】
# display as 波萊特
# JP: 「鉄道を好きになってくれる人が増えれば、\nそれは、電車姫様にも嬉しいことだから、って」
2137 = "「Nếu số người yêu thích đường sắt tăng lên, thì điều đó, cũng là niềm vui đối với Densha Hime mà, cô ấy nói vậy.」"
# monologue
# JP: （ああ）
2958 = "（À）"
# monologue
# JP: わかった気がする。
2640 = "Tôi có cảm giác mình đã hiểu ra."
# monologue
# JP: \x%lまいてつ;#00ffc040;まいてつ%l;#;同士、鉄道事業者同士というレベルをさらに超え、\nポーレットと電車姫様とは、ある種の同士なのだ。
2720 = "Vượt xa hơn cả mức độ giữa những \\x%lまいてつ;#00ffc040;chủ tàu%l;#; với nhau, giữa những nhà kinh doanh đường sắt với nhau, Paulette và Densha Hime, là một kiểu đồng chí."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、悩むまでもあるまい。貰おう」
2240 = "「Nếu vậy thì, chẳng có gì phải đắn đo cả. Nhận thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですよね！　これって、いいお話ですよね、やっぱり」
1877 = "「Đúng không anh! Chuyện này, quả nhiên là một chuyện tốt nhỉ.」"
# monologue
# JP: パっと、ポーレットの顔が輝く。
2737 = "Khuôn mặt Paulette bừng sáng."
# monologue
# JP: （ああ……そういうことか）
2959 = "（A... Ra là vậy sao.）"
# monologue
# JP: \x%lストーブ客車;#00ffc040;ストーブ客車%l;#;に、あるいは電車姫様に。\n強い思い入れがあったからこそ、悩んでいたのか。
2723 = "Đối với \\x%lストーブ客車;#00ffc040;toa xe sưởi ấm%l;#;, hay đối với Densha Hime. Chính vì có tình cảm sâu sắc, nên cô ấy mới đắn đo sao."
# monologue
# JP: それが自身の判断を、歪めているのではなかろうか、と。
2549 = "Cô ấy lo sợ rằng điều đó, liệu có làm sai lệch đi phán đoán của bản thân hay không."
# 【双鉄】
# display as 雙鐵
# JP: 「相談してもらえて、光栄だ」
1931 = "「Rất vinh hạnh vì cô đã thảo luận với tôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？」
1789 = "「Hả!?」"
# monologue
# JP: そこまで慎重なポーレットが、\n僕の意見を、判断を必要としてくれる。
2902 = "Một Paulette thận trọng đến vậy, lại cần đến ý kiến, phán đoán của tôi."
# monologue
# JP: とても誇らしく、嬉しいことだ。
2788 = "Đó là một điều vô cùng đáng tự hào và vui sướng."
# 【ポーレット】
# display as 波萊特
# JP: 「あ、あの……ええと、\nそう思ってもらえるの、わたしこそ――光栄です」
1816 = "「A, dạ... ừm thì, được anh nghĩ như vậy, em mới là người――vinh hạnh ạ.」"
# monologue
# JP: 頬を赤くしうつむいて。
2569 = "Cô ấy đỏ mặt cúi gầm xuống."
# monologue
# JP: 次の瞬間、ぐい、と顔が持ち上がり、\n強い瞳がまっすぐ、僕へと向けられる。
2437 = "\"Khoảnh khắc tiếp theo, cô ấy ngẩng phắt mặt lên, và hướng đôi mắt mạnh mẽ nhìn thẳng vào tôi.\""
# 【ポーレット】
# display as 波萊特
# JP: 「あの！　さっきの話っ――\nえと、ストーブ\x%l列車;#00ffc040;列車%l;#;を経験してみたいって」
2229 = "「Dạ! Chuyện lúc nãy―― Ừm, chuyện anh nói muốn trải nghiệm \\x%l列車;#00ffc040;tàu%l;#; sưởi ấm ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1827 = "「Ừ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それ、よかったら――今度、あの、落ち着いたら、\nええと……経験、ですから、そのっ」
2231 = "「Chuyện đó, nếu anh muốn――lần tới, ừm, khi nào mọi chuyện ổn định lại, à thì... trải nghiệm, mà, nên là.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。この状況が落ち着いて――\nマイントレジャーが無事に立ち上がったら」
2172 = "「Cũng đúng nhỉ. Khi tình hình này lắng xuống―― và Mine Treasure được khởi động suôn sẻ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
2274 = "「!」"
# monologue
# JP: こくこく、ポーレットが何度も頷く。\nそのまま、口は結ばれている。
2736 = "Paulette gật đầu lia lịa. Rồi cô ấy cứ thế mím chặt môi."
# monologue
# JP: 期待に満ちた眼差しは――\n僕の言葉を、きっと待ってる。
2560 = "Ánh mắt tràn đầy kỳ vọng ấy―― Chắc chắn là đang chờ đợi lời nói của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「そのときには、僕と一緒に乗ってくれないか？\n蒼森、津輕の――津っ鐵さんのストーブ\x%l列車;#00ffc040;列車%l;#;に」
1746 = "「Đến lúc đó, em đi cùng anh nhé? Lên chuyến \\x%l列車;#00ffc040;tàu%l;#; sưởi ấm của Tsutetsu――ở Tsugaru, Aomori.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
1863 = "「Vâng!」"
# 【稀咲】
# display as 稀咲
# JP: 「へぇ。それはとてもいい話に聞こえるね。\nおめでとう」
2218 = "「Hê. Nghe có vẻ là một tin rất tốt đấy. Chúc mừng nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「祝辞を貰うには早過ぎる。\n\x%l客車;#00ffc040;客車%l;#;が来ても、運用できねば意味が無い」
2260 = "「Vẫn còn quá sớm để nhận lời chúc mừng. Dù \\x%l客車;#00ffc040;toa hành khách%l;#; có đến mà không thể đưa vào sử dụng thì cũng vô nghĩa thôi.」"
# monologue
# JP: 言った途端に、\nスっと稀咲の目が細まる。
2838 = "Ngay khi tôi vừa dứt lời,\nKisaki khẽ nheo mắt lại."
# monologue
# JP: 喜んでいるというわけではなく、\n値踏みをしているかのようだ。
2541 = "Không hẳn là vui mừng, mà có vẻ như đang dò xét thì đúng hơn."
# 【稀咲】
# display as 稀咲
# JP: 「なら、ここに来たのは、\n運用準備の一環として――ということになるかな？」
1972 = "「Vậy, hai người đến đây, là một phần trong quá trình chuẩn bị đưa vào sử dụng――phải không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありていに言えばそういうことだ」
2121 = "「Nói thẳng ra là vậy đấy.」"
# monologue
# JP: 直接の電話で、即時にもらえたアポイントメント。
2629 = "Một cuộc điện thoại trực tiếp, và chúng tôi ngay lập tức có được một cuộc hẹn."
# monologue
# JP: それもまた、マイントレジャー計画への\n稀咲の評価の表れだろう。
2898 = "Đó cũng là một biểu hiện cho thấy, Kisaki đánh giá cao kế hoạch Mine Treasure."
# 【ポーレット】
# display as 波萊特
# JP: 「こちらの資料をご覧ください」
2173 = "「Xin hãy xem tài liệu này ạ.」"
# monologue
# JP: 相変わらず、なかなか打ち解けられぬようだが、\nポーレットも前より積極的だ。
2924 = "Vẫn như mọi khi, có vẻ như hai người họ khó mà cởi mở với nhau được, nhưng Paulette cũng đã chủ động hơn trước."
# monologue
# JP: 促す前に資料を提示し、説明を加えてくれている。
2529 = "Trước khi tôi kịp giục, cô ấy đã trình bày tài liệu và giải thích thêm."
# 【ポーレット】
# display as 波萊特
# JP: 「――以上のように、テーマパーク化による\n雇用促進も行いたい、と考えています」
1382 = "「――Như đã trình bày ở trên, chúng tôi đang cân nhắc việc thúc đẩy việc làm thông qua việc xây dựng công viên giải trí.」"
# 【稀咲】
# display as 稀咲
# JP: 「となると……\n経費も随分とふくらんでくるのでは？」
1977 = "「Vậy thì... Kinh phí cũng sẽ đội lên khá nhiều đấy chứ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、概算ですが、開業から五年間の\n資金計画を作成してきました」
2021 = "「Vâng, đây chỉ là ước tính sơ bộ thôi, nhưng tôi đã lập kế hoạch tài chính cho năm năm kể từ khi khai trương.」"
# 【稀咲】
# display as 稀咲
# JP: 「へぇ」
1794 = "「Hê.」"
# monologue
# JP: 手渡されたペーパーへと落ちた稀咲の目が、\n驚いたように見開かれる。
2802 = "Ánh mắt Kisaki lướt qua tập giấy vừa được trao, đôi mắt cô mở to như thể ngạc nhiên."
# monologue
# JP: そしてみるみる、不機嫌そうに細まっていく。
2758 = "Và rồi nhanh chóng, nheo lại một cách khó chịu."
# 【稀咲】
# display as 稀咲
# JP: 「……この辺の線引き。\nキミはしっかり意識してると思ってたのだけれど」
1404 = "「...Ranh giới ở chỗ này. Tôi cứ tưởng cô ý thức rất rõ về nó chứ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　あの――線引きって」
1792 = "「Hả? Dạ――ranh giới là sao ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「公私のさ。市が主体となるとは決まっていない事業案を、\n市職員を使って作らせるなどというのは――」
2093 = "「Là công và tư. Một dự án chưa chắc chắn là thành phố sẽ làm chủ đầu tư, mà cô lại sử dụng nhân viên thành phố để lập kế hoạch sao――」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえ。あの、使ってません、誰の手も」
1803 = "「A, không đâu ạ. Em không nhờ vả, bất kỳ ai cả.」"
# 【稀咲】
# display as 稀咲
# JP: 「へ？」
# 1793 = "「哎？」" 
# 【ポーレット】
# display as 波萊特
# JP: 「真闇さんに見てもらってアドバイスももらいましたけど、\n基本的には、わたし一人でこの資料は」
2257 = "「Em có nhờ chị Mayami xem qua và cho lời khuyên, nhưng về cơ bản, tài liệu này là do một mình em làm ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「え？　一人って――え――ええっ！？」
1791 = "「Hả? Một mình cô á――hả――hả!?」"
# monologue
# JP: 驚きのあまりなのだろうか、\n稀咲の表情は、引きつってしまったように動かなくなる。
2804 = "Có lẽ vì quá kinh ngạc, biểu cảm của Kisaki cứng đờ như thể bị co giật."
# 【稀咲】
# display as 稀咲
# JP: 「……それなら、他の資料群も？」
1410 = "「...Nếu vậy thì, những tập tài liệu khác cũng thế sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「マイントレジャーの施設やアトラクション関係は、\n双鉄くんが主体となって作成してくれてます」
2079 = "「Về cơ sở vật chất và các điểm tham quan của Mine Treasure, anh Soutetsu là người phụ trách chính ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「つまり。それら以外は、キミが主体というわけか」
1677 = "「Nói cách khác. Ngoài những thứ đó ra, phần còn lại là do cô làm chính sao.」"
# monologue
# JP: はあっと、呆れたようなため息。\n硬直していた稀咲の顔が、ようやく動く。
2558 = "Hà, một tiếng thở dài như thể cạn lời. Khuôn mặt cứng đờ của Kisaki cuối cùng cũng cử động."
# 【稀咲】
# display as 稀咲
# JP: 「余計なお世話かもしれないが――\n雛衣ポーレット。キミはいつ寝てるんだい？」
1685 = "「Có thể là tôi hơi lo chuyện bao đồng―― Hinai Paulette. Rốt cuộc thì cô ngủ lúc nào vậy?」"
# 【ポーレット】
# display as 波萊特
# JP: 「いつって……ええと、夜から朝です」
1712 = "「Lúc nào á... ừm thì, từ tối đến sáng ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「具体的には？　何時から何時まで」
1735 = "「Cụ thể hơn đi? Từ mấy giờ đến mấy giờ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは、その……日による感じで」
2211 = "「Chuyện đó, ừm... tùy từng ngày ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクも、ある意味では同じような立場にいるから、\nわかるつもりだ」
1928 = "「Ở một khía cạnh nào đó, tôi cũng ở cùng lập trường với cô, nên tôi có thể hiểu được.」"
# monologue
# JP: 視線に言葉に、今まで感じたことのない温度が混じる。
2809 = "Trong ánh mắt và lời nói, thoảng chút hơi ấm mà tôi chưa từng cảm nhận được trước đây."
# 【稀咲】
# display as 稀咲
# JP: 「男社会で、有無を言わせず結果を認めさせるためには、\n多少の無理も必要だ。けど、それにしたって限度がある」
1844 = "「Trong một xã hội trọng nam khinh nữ, để bắt họ phải công nhận kết quả mà không thể phản bác, đôi khi cũng cần phải gắng sức một chút. Nhưng dù thế nào cũng phải có giới hạn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは……ちゃんと、無理しないよう、\nコントロールしてるつもりです」
2210 = "「Chuyện đó... em vẫn đang cố gắng kiểm soát, để không quá sức ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうかい？　なら、余計なお世話だったね」
1988 = "「Vậy sao? Nếu thế thì, đúng là tôi lo chuyện bao đồng rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、そんな――ありがとうございます」
1959 = "「Không, đâu có――cảm ơn chị ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「お礼を言われることでもないさ」
1873 = "「Cũng chẳng có gì đáng để cảm ơn đâu.」"
# monologue
# JP: すっと、口調は元の温度に。\nそして視線も鋭さを戻し、再びペーパーに落とされる。
2812 = "Giọng điệu nhanh chóng trở lại nhiệt độ ban đầu. Và ánh mắt cũng lấy lại sự sắc bén, một lần nữa hướng xuống tập giấy."
# 【稀咲】
# display as 稀咲
# JP: 「この資金計画。人口推移を極めてゆるやかなものと\n想定しているけど、これは――」
2208 = "「Kế hoạch tài chính này. Cô đang giả định rằng sự biến động dân số sẽ cực kỳ chậm chạp, điều này có nghĩa là――」"
# 【ポーレット】
# display as 波萊特
# JP: 「ご想像の通り、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致が為されない――\nということを前提にした想定です」
2016 = "「Đúng như chị đoán, đây là giả định được lập ra dựa trên tiền đề rằng việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; sẽ không thành công ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクの勤める銀行は、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を推進している立場だけれど？」
1935 = "「Ngân hàng nơi tôi làm việc, đang đứng ở lập trường thúc đẩy việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; đấy nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そのことはもちろん、知っています」
2213 = "「Chuyện đó đương nhiên là, em biết rõ ạ.」"
# monologue
# JP: 稀咲が書類から顔をあげ、\nポーレットのことをまっすぐに見る。
2805 = "Kisaki ngẩng mặt lên khỏi đống tài liệu, và nhìn thẳng vào Paulette."
# monologue
# JP: ポーレットもまた、視線を逸らさず受け止める。
2717 = "Paulette cũng không hề né tránh, đáp lại ánh nhìn ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「でも、日々姫ちゃんもあなたも。求めているのは、\n御一夜の持続的発展のための最善策だとも認識してます」
1668 = "「Nhưng mà, cả Hibiki và chị. Em hiểu rằng điều mà hai người đang tìm kiếm, là phương sách tốt nhất cho sự phát triển bền vững của Ohimitera.」"
# 【稀咲】
# display as 稀咲
# JP: 「マイントレジャー計画は、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に勝る\n持続発展のための手段になると？」
1716 = "「Kế hoạch Mine Treasure, sẽ trở thành phương tiện phát triển bền vững vượt trội hơn cả việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうかどうかを判断してもらうために、\n資料を、作成してきました」
2043 = "「Để chị có thể tự mình đánh giá xem có đúng như vậy hay không, nên em mới lập ra tài liệu này ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 1827 = "「嗯」" 
# monologue
# JP: もう一度、稀咲は紙へと目を落とす。
2798 = "Một lần nữa, Kisaki lại đưa mắt nhìn xuống tờ giấy."
# monologue
# JP: そして三色ボールペンを取り、\n素早い手つきで次々と、ラインやメモを書き入れていく。
2551 = "Sau đó, cô ấy cầm lấy cây bút bi ba màu, với thao tác nhanh nhẹn, liên tục gạch chân và ghi chú."
# 【稀咲】
# display as 稀咲
# JP: 「――うん」
1381 = "「――Ừm.」"
# monologue
# JP: 三十分強。
2903 = "Hơn ba mươi phút."
# monologue
# JP: ものも言わずに資料確認をしてきた稀咲が、\nようやく、僕らへと視線を戻す。
2435 = "Kisaki, người nãy giờ vẫn im lặng kiểm tra tài liệu, cuối cùng cũng hướng ánh mắt về phía chúng tôi."
# 【稀咲】
# display as 稀咲
# JP: 「事業主体は、\n株式会社形式での第三セクターを考えている？」
1709 = "「Chủ thể dự án, cô đang cân nhắc mô hình Công ty cổ phần thuộc Khu vực ba sao?」"
# monologue
# JP: 第三セクター。公共と民間――市と企業とが、\n共同出資・共同運営をする事業形態だ。
2824 = "Khu vực ba. Là hình thức kinh doanh mà khu vực công và tư nhân――tức là thành phố và doanh nghiệp, cùng góp vốn và đồng điều hành."
# monologue
# JP: 規模からいっても、理念からいっても、\nマイントレジャーにはまさに、最適だろう。
2756 = "Xét về quy mô hay triết lý, đây quả thực là lựa chọn tối ưu nhất cho Mine Treasure."
# 【ポーレット】
# display as 波萊特
# JP: 「はい。基本的には。ですので、\n隈元銀行さんにもご出資いただければと願っています」
1997 = "「Vâng. Về cơ bản là vậy ạ. Do đó, em cũng rất mong Ngân hàng Kumamoto sẽ tham gia góp vốn.」"
# 【稀咲】
# display as 稀咲
# JP: 「他の出資者は、市と、御一夜鉄道、右田一酒造元、\nクマ川下りといったあたりになるのかな？」
1731 = "「Các nhà đầu tư khác sẽ là thành phố, Đường sắt Ohito, xưởng nấu rượu Migita Ichi, và công ty xuôi dòng sông Kuma nhỉ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「蓑笠鍛冶店さん、[はた]秦ボイラさんもご検討くださってます。\nそれと、個人では赤井宮司さん」
2149 = "「Xưởng rèn Minokasa và Lò hơi Hata cũng đang cân nhắc ạ. Ngoài ra, về phía cá nhân thì có Đền chủ Akai.」"
# 【稀咲】
# display as 稀咲
# JP: 「赤井宮司？　あの人が」
2190 = "「Đền chủ Akai sao? Người đó á.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。他にも、[えいざんじ,2]榮山寺のご住職夫妻がそれぞれに、\nそれと、登呂流湯のご主人も――」
2011 = "「Vâng. Ngoài ra, còn có vợ chồng sư trụ trì chùa Eizanji, và cả bà chủ của nhà tắm Tororyu-yu nữa――」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほど。少額からの受付で出資し易くすることにより、\n『私達のマイントレジャー』という意識を持ってもらう」
1760 = "「Ra vậy. Bằng cách nhận góp vốn từ số tiền nhỏ để mọi người dễ dàng tham gia, cô muốn tạo ra ý thức 『Mine Treasure của chúng ta』 chứ gì.」"
# monologue
# JP: みなまで聞かず、第三セクター形式を選んだ理由の一つを、\n稀咲は見事に看破する。
2904 = "Không cần nghe hết, Kisaki đã xuất sắc nhìn thấu một trong những lý do chúng tôi chọn mô hình Khu vực ba."
# 【稀咲】
# display as 稀咲
# JP: 「その上で、公的支援もフル活用して余裕を持つ。\n『技術継承炭鉱』とは、面白い視点に気づいたね」
2126 = "「Trên cơ sở đó, tận dụng tối đa hỗ trợ từ chính phủ để tạo nguồn dự trữ. 『Mỏ than kế thừa công nghệ』, cô nhận ra một góc nhìn thú vị đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それは、双鉄くんのアイディアなんです」
2215 = "「Đó là ý tưởng của anh Soutetsu ạ.」"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄の？」
2259 = "「Của Soutetsu á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。炭鉱について、炭鉱史について。\n僕も、僕なりに勉強したのだ」
1826 = "「Ừm. Về mỏ than, về lịch sử khai thác than. Tôi cũng đã tự mình tìm hiểu.」"
# monologue
# JP: ……国内炭の需要は激減してしまい、\nけれど、埋蔵量は豊かであると確認されている。
1369 = "\"...Nhu cầu than trong nước đã sụt giảm nghiêm trọng, nhưng trữ lượng được xác nhận vẫn còn rất dồi dào.\""
# monologue
# JP: ゆえ、いつか石炭需要が復活したときに備え、採炭技術を\n無くさぬように、『技術継承炭鉱』がかつて存在していた。
2657 = "Do đó, để chuẩn bị cho ngày nhu cầu than phục hồi, và để kỹ thuật khai thác than không bị mai một, 『Mỏ than kế thừa công nghệ』 đã từng tồn tại."
# 【双鉄】
# display as 雙鐵
# JP: 「北魁道は[くしろ,1]九代にあった技術継承炭鉱も、\nしかし、\x%lエアクラ;#00ffc040;エアクラ%l;#;の発展・普及によって、閉山された」
1750 = "「Mỏ than kế thừa công nghệ ở Kushiro, Hokkaido, cũng đã bị đóng cửa do sự phát triển và phổ biến của \\x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# 【稀咲】
# display as 稀咲
# JP: 「だから、マイントレジャーにその役割をも負わせる。\nそうすれば国からの補助金も期待できるというわけだね」
1954 = "「Thế nên, cô muốn Mine Treasure cũng gánh vác vai trò đó. Như vậy thì có thể kỳ vọng vào khoản trợ cấp từ nhà nước, ý cô là vậy đúng không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう。そして旧術仙炭鉱の現所有者は御一夜市であり、\n補助金制度はまだ生きている」
2048 = "「Đúng vậy. Hơn nữa, chủ sở hữu hiện tại của mỏ than Jussen cũ là thành phố Ohimitera, và chế độ trợ cấp vẫn còn hiệu lực.」"
# monologue
# JP: この先のことは、僕では力が及ばなかった。\nだから、宮本さんの力を借りた。
2465 = "Những việc tiếp theo, vượt quá khả năng của tôi. Vì vậy, tôi đã nhờ đến sự giúp đỡ của cô Miyamoto."
# monologue
# JP: 先代市長の右腕だったというだけはあり、あの人は、\n市役所職員全員に、一定以上の影響力を有しているから。
2540 = "Đúng như danh xưng cánh tay phải của cựu thị trưởng, người phụ nữ đó, có một mức độ ảnh hưởng nhất định đối với toàn bộ nhân viên tòa thị chính."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は市長秘書だ。御一夜市が受給可能かもしれない\n補助金については、当然、秘書の職務として調査した」
1940 = "「Tôi là thư ký thị trưởng. Về khoản trợ cấp mà thành phố Ohimitera có thể nhận được, đương nhiên, tôi đã điều tra với tư cách là nhiệm vụ của thư ký.」"
# 【稀咲】
# display as 稀咲
# JP: 「職務として、ね。\nなるほど。その結果は？」
1743 = "「Với tư cách là nhiệm vụ nhỉ. Ra vậy. Kết quả thế nào?」"
# 【双鉄】
# display as 雙鐵
# JP: 「技術継承炭鉱の認定が取得可能である見込みは大きい。\nこれ程に状態のいい炭鉱は、もはや残っていないそうだ」
2135 = "「Khả năng nhận được chứng nhận mỏ than kế thừa công nghệ là rất lớn. Nghe nói những mỏ than còn giữ được tình trạng tốt như thế này không còn lại bao nhiêu đâu.」"
# 【稀咲】
# display as 稀咲
# JP: 「なるほどね」
1761 = "「Ra là vậy.」"
# monologue
# JP: 言って稀咲は目を閉じる。\n目を閉じたまま、静かに呟く。
2811 = "Nói xong, Kisaki nhắm mắt lại. Vẫn nhắm nghiền mắt, cô lẩm bẩm một cách bình thản."
# 【稀咲】
# display as 稀咲
# JP: 「個人としては、ボクも出資をしたいと思う。\n議会を通過し、市の出資が確定した後の話だけれど」
1876 = "「Với tư cách cá nhân, tôi cũng muốn góp vốn. Nhưng đó là chuyện sau khi dự án được thông qua tại hội đồng và thành phố xác nhận sẽ đầu tư.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1856 = "「Ồ!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます！」
2175 = "「Cảm ơn chị rất nhiều ạ!」"
# 【稀咲】
# display as 稀咲
# JP: 「いや――双鉄の言葉を借りるわけでもないけれど、\n謝辞をもらうには、まだ早すぎるよ」
1654 = "「Không――tôi không định mượn lời của Soutetsu đâu, nhưng vẫn còn quá sớm để nhận lời cảm ơn đấy.」"
# monologue
# JP: パシっと、ペンでペーパーを叩き、\n僕を見なおした稀咲の目つきは、鋭さを取り戻している。
2808 = "Bộp một tiếng, cô gõ bút lên tờ giấy, ánh mắt Kisaki nhìn tôi đã lấy lại vẻ sắc bén vốn có."
# 【稀咲】
# display as 稀咲
# JP: 「この計画の成功には、隈元銀行の出資も必須となる。\nけれど、その判断は、支店長レベルでは出来ない」
1948 = "「Để kế hoạch này thành công, việc Ngân hàng Kumamoto đầu tư là điều bắt buộc. Tuy nhiên, quyết định đó không thể được đưa ra ở cấp độ giám đốc chi nhánh.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら、判断は。\n支店長レベルより上……ですから――」
1675 = "「Vậy, quyết định sẽ do. Cấp cao hơn giám đốc chi nhánh... nên là――」"
# 【双鉄】
# display as 雙鐵
# JP: 「隈元銀行頭取――宝生元忠氏によるわけか」
2161 = "「Do chủ tịch Ngân hàng Kumamoto――ông Houshou Mototada quyết định sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね。そして、“宝生元忠氏”は、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致自体を目的としているようだ」
1986 = "「Đúng vậy. Và, có vẻ như “ông Houshou Mototada”, đang nhắm đến mục tiêu là việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2274 = "「！」" 
# monologue
# JP: 工場誘致自体が目的。\n御一夜の発展を――ではなく。
2468 = "Mục tiêu là bản thân việc thu hút nhà máy. Chứ không phải là――sự phát triển của Ohimitera."
# monologue
# JP: 稀咲の言葉が真実ならば、\n隈銀の出資を取り付けることは、困難だろう。
2582 = "Nếu lời Kisaki nói là sự thật, thì việc nhận được sự đầu tư từ Kumagin sẽ rất khó khăn."
# 【双鉄】
# display as 雙鐵
# JP: 「それが隈銀にとって、\n最大の利益を見込める計画だからか」
1838 = "「Vì đối với Kumagin, đó là kế hoạch mang lại lợi nhuận lớn nhất sao.」"
# 【稀咲】
# display as 稀咲
# JP: 「もちろん。隈元銀行は一私企業――\n営利企業であるのだから」
2214 = "「Đương nhiên. Ngân hàng Kumamoto là một doanh nghiệp tư nhân―― là một doanh nghiệp hoạt động vì lợi nhuận mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「営利が目的である以上――方針転換もありますね？\n仮に、利益が見込めない状況に陥ってしまうなら」
1975 = "「Đã hoạt động vì lợi nhuận――thì cũng có thể thay đổi phương hướng đúng không? Giả sử, rơi vào tình huống không còn thấy khả năng sinh lời nữa.」"
# 【稀咲】
# display as 稀咲
# JP: 「それもまぁ、当然のことだと思うね。\n損失を意図的に出せば背任だもの」
2244 = "「Điều đó thì, tôi nghĩ cũng là lẽ đương nhiên thôi. Nếu cố ý gây ra tổn thất thì đó là hành vi vi phạm tín nhiệm mà.」"
# monologue
# JP: 途端、ほっとした顔になるポーレットと\nすました笑顔を浮かべる稀咲と。
2820 = "Ngay lập tức, vẻ mặt Paulette trở nên nhẹ nhõm và Kisaki nở một nụ cười đắc ý."
# monologue
# JP: ふたりはどうやら共通理解を得ているようだが――\n僕には今ひとつ飲み込めていない。
2543 = "Có vẻ như hai người họ đã đạt được sự thấu hiểu chung―― nhưng tôi thì vẫn chưa hiểu lắm."
# 【双鉄】
# display as 雙鐵
# JP: 「例えば、どういう状況だ？\n確実に利益が見込めなくなるというのは」
2044 = "「Ví dụ như, tình huống nào cơ? Cái gọi là chắc chắn không còn thấy khả năng sinh lời ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「マイントレジャー議案が通過して、\n市が事業主体の一員になれば、それだけで」
1781 = "「Chỉ cần dự luật Mine Treasure được thông qua, và thành phố trở thành một thành viên của chủ thể dự án, là đủ rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1797 = "「Hửm?」"
# monologue
# JP: ふっ、と稀咲が鼻を鳴らす。
2814 = "Hừ, Kisaki khịt mũi."
# 【稀咲】
# display as 稀咲
# JP: 「マイントレジャー計画の主体は双鉄じゃないのかい？\n川下りを、アトラクションのひとつとして――」
2078 = "「Người chịu trách nhiệm chính cho kế hoạch Mine Treasure chẳng phải là Soutetsu sao? Đưa chuyến xuôi dòng trên sông trở thành một trong những điểm thu hút――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうか。\n河川使用の許可か！」
1802 = "「A! Ra vậy.\nLà giấy phép sử dụng dòng sông sao!」"
# monologue
# JP: クマ川下りを行う範囲と、発船所着船所の用地利用は、\nクマ川下り株式会社が許可を得ている。
2922 = "Phạm vi thực hiện chuyến xuôi dòng sông Kuma, cùng với việc sử dụng đất cho bến đi và bến đến, đã được Công ty Cổ phần Xuôi dòng Sông Kuma xin phép."
# monologue
# JP: が、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場立地を予定されている、\n周辺の河川敷の使用許可は、現状、誰も得ていない。
2479 = "Nhưng, giấy phép sử dụng bãi bồi ven sông xung quanh khu vực dự kiến đặt nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, hiện tại vẫn chưa có ai xin được."
# 【ポーレット】
# display as 波萊特
# JP: 「川と河川敷の使用許可は、地方整備局が、原則、\n該当自治体の意見をもとに出すものですから――」
2056 = "「Giấy phép sử dụng sông và bãi bồi ven sông, về nguyên tắc, do Cục Quản lý Đất đai Địa phương cấp dựa trên ý kiến của chính quyền địa phương liên quan――」"
# 【双鉄】
# display as 雙鐵
# JP: 「市が事業主体となれば、少なくともクマ川くだり流域の\n河川敷の専有使用許可を得ることが出来る」
1779 = "「Nếu thành phố trở thành chủ thể dự án, ít nhất cũng có thể xin được giấy phép sử dụng độc quyền bãi bồi lưu vực sông Kuma.」"
# 【稀咲】
# display as 稀咲
# JP: 「専有は排他と同じ意味だからね。そうなれば他の誰も、\nクマ川くだり流域河川敷の用地利用をできなくなる」
2086 = "「Độc quyền cũng đồng nghĩa với loại trừ mà. Nếu vậy thì không ai khác có thể sử dụng đất ở bãi bồi lưu vực sông Kuma nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「つまり――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を完全に阻止できるわけだな」
1673 = "「Nói cách khác―― Chúng ta hoàn toàn có thể ngăn chặn việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# monologue
# JP: どんなに大きな事業であろうと、\n許認可一つ得られなければ、断念せざるを得なくなる――
2448 = "Dù là dự án lớn đến đâu, nếu không xin được một giấy phép, thì cũng đành phải từ bỏ――"
# monologue
# JP: 政治家秘書を務めていながら、\n政治がいかに大きな力か、まるで実感できてなかった。
2643 = "Dù đang làm thư ký cho một chính trị gia, nhưng tôi dường như chưa thực sự cảm nhận được sức mạnh to lớn của chính trị."
# 【稀咲】
# display as 稀咲
# JP: 「ただ、動くなら急いだ方がいい。\n宝生元忠という人は、完全な実力主義だから」
1667 = "「Nhưng mà, nếu định hành động thì nên nhanh lên. Người tên Houshou Mototada đó, là một kẻ hoàn toàn theo chủ nghĩa thực dụng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1797 = "「唔？」" 
# 【稀咲】
# display as 稀咲
# JP: 「工場誘致を進展させられない無能な支店長は解任し、\n自ら陣頭指揮を取るくらい、簡単にやるということさ」
1878 = "「Cách chức một giám đốc chi nhánh bất tài không thể thúc đẩy việc thu hút nhà máy, rồi tự mình đứng ra chỉ huy, ông ta có thể làm những việc đó một cách dễ dàng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2274 = "「！」" 
# monologue
# JP: 勘違い、なのかもしれない。\nが、あるいは、ひょっとしたなら、宝生稀咲は――
2927 = "Có thể, tôi đã hiểu lầm. Nhưng, hoặc là, biết đâu chừng, Houshou Kisaki đang――"
# monologue
# JP: 僕らの可能性を見極めるため、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の動きを、\n遅滞させてくれていたのではなかろうか。
2752 = "Để xác định khả năng của chúng tôi, cô ấy đã cố tình làm chậm lại tiến độ thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; chăng."
# 【稀咲】
# display as 稀咲
# JP: 「そして、無能な支店長とは違い。\n有能な頭取は、国政レベルに働きかけられる」
2131 = "「Và, khác với một giám đốc chi nhánh bất tài. Một chủ tịch tài ba, có thể tác động đến cả cấp độ quốc gia.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ」
1800 = "「A.」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね。その理解で正しいよ。\n一度出した許認可は、さすがに覆せないだろうが――」
2049 = "「Đúng vậy. Cô hiểu thế là đúng rồi đấy. Giấy phép một khi đã cấp thì khó mà thu hồi lại được, nhưng mà――」"
# monologue
# JP: ポーレットの顔が強張ったのを見届けて、\nなぜだかどこか満足そうに、稀咲は頷く。
2784 = "Thấy vẻ mặt căng thẳng của Paulette, không hiểu sao Kisaki lại gật đầu vẻ khá hài lòng."
# 【稀咲】
# display as 稀咲
# JP: 「“許認可については該当自治体の意見を聞く”という\n原則程度、いくらでも曲げられてしまうものらしいから」
1704 = "「Vì nghe nói cái nguyên tắc “việc cấp phép phải tham khảo ý kiến của chính quyền địa phương liên quan” kiểu gì cũng có thể bị bẻ cong được mà.」"
# 【女性議員】
# display as 女議員
# JP: 「では、そのキャストについては、\nどのように」
2249 = "「Vậy, về dàn diễn viên đó,\ncô định tính sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜市民を中心にした公募採用を検討しています」
1924 = "「Chúng tôi đang cân nhắc việc tuyển dụng công khai với trọng tâm là công dân Ohimitera.」"
# 【女性議員】
# display as 女議員
# JP: 「それはつまり、\n雇用促進につながるということになりますか」
1676 = "「Nói cách khác, điều này sẽ góp phần thúc đẩy việc làm đúng không?」"
# monologue
# JP: ……会期末まであと三日。
1370 = "\"...Chỉ còn ba ngày nữa là kết thúc kỳ họp.\""
# monologue
# JP: 議会工作に時間をかける余裕はほとんどなかったが、\n今のところは、ポーレットは良く答弁している。
2931 = "Hầu như không có thời gian để chuẩn bị cho các hoạt động tại nghị viện, nhưng cho đến hiện tại, Paulette vẫn đang trả lời rất tốt."
# monologue
# JP: （ヤジが無いのが大きいな――\nみな、計画の良し悪しを真剣に判断しようとしている）
2981 = "（Không có tiếng la ó châm chọc là một lợi thế lớn―― Mọi người đều đang nghiêm túc đánh giá tính khả thi của kế hoạch.）"
# monologue
# JP: ポーレットは、自身の政党を持っていない。\n雛衣前市長の支持者は、それぞれの政党に散っている。
2726 = "Paulette không có đảng phái riêng của mình. Những người ủng hộ cựu thị trưởng Hinai đã tản mát vào các đảng phái khác nhau."
# monologue
# JP: 今のポーレットを支えているのは、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致反対という、その一点での結束だけだ。
2768 = "Điều đang nâng đỡ Paulette lúc này, chỉ là sự đoàn kết xoay quanh một điểm duy nhất: phản đối thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;."
# 【女性議員】
# display as 女議員
# JP: 「\x%l客車;#00ffc040;客車%l;#;は、無償譲渡されるということですが、これは？」
1701 = "「Về việc \\x%l客車;#00ffc040;toa hành khách%l;#; được chuyển nhượng miễn phí, chuyện này là sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「廣島電気鉄道様が、マイントレジャー計画への\n全面的な賛同を示してくださっています」
1991 = "「Phía Đường sắt điện Hiroshima đã bày tỏ sự tán thành toàn diện đối với kế hoạch Mine Treasure ạ.」"
# monologue
# JP: ……故に、マイントレジャー計画について、\n全面的な賛意を示すものは、今のところは極めて少ない。
1359 = "\"...Chính vì vậy, đối với kế hoạch Mine Treasure, những người bày tỏ sự tán thành toàn diện hiện tại là cực kỳ ít.\""
# monologue
# JP: この女性議員と、その他に僅か数名のみ。\n残る議員たちは現状様子見、もしくは明確な反対だ。
2515 = "Chỉ có nữ nghị viên này, và một vài người khác. Những nghị viên còn lại hiện đang nghe ngóng tình hình, hoặc phản đối rõ ràng."
# monologue
# JP: （とはいえ、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致賛成派も一枚岩ではない）
2952 = "（Mặc dù vậy, phe ủng hộ thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; cũng không phải là một khối thống nhất.）"
# monologue
# JP: マイントレジャー計画が成立した方が、\n工場誘致成功時より、大きな利益を見込める者。
2693 = "Có những người sẽ thu được lợi ích lớn hơn nếu kế hoạch Mine Treasure thành công, so với khi thu hút được nhà máy."
# monologue
# JP: そうした者は、工場誘致に無理やりしがみつきなどしない。\nゆえ、焦点は絞りこまれる。
2586 = "Những người như vậy sẽ không bám víu một cách khiên cưỡng vào việc thu hút nhà máy. Do đó, trọng tâm sẽ được thu hẹp lại."
# monologue
# JP: （味方議員との質疑応答で、どれだけ得点を稼げるか。\n反対議員の質問を、いかに失点なく切り抜けられるかだ）
2980 = "（Có thể ghi được bao nhiêu điểm trong phần hỏi đáp với các nghị viên đồng minh. Và có thể vượt qua các câu hỏi của nghị viên phe đối lập mà không bị mất điểm hay không.）"
# monologue
# JP: ならばこれこそ、ある意味では、\n理想的に機能している議会であると言えるのかもしれない。
2770 = "Nếu vậy thì đây, ở một khía cạnh nào đó, có thể nói là một hội đồng đang hoạt động rất lý tưởng."
# monologue
# JP: 『計画の良し悪し』『その成功の見込み』のみがそのまま、\n議案の成否に繋がるのだから。
2526 = "Bởi vì chỉ có 『Sự tốt xấu của kế hoạch』 và 『Khả năng thành công của nó』, mới trực tiếp quyết định sự thành bại của dự luật."
# 【女性議員】
# display as 女議員
# JP: 「なるほど、ご計画について理解させていただきました。\nありがとうございました」
1762 = "「Ra vậy, tôi đã hiểu rõ về kế hoạch của cô. Xin cảm ơn.」"
# 【議長】
# display as 議長
# JP: 「これにて、斎藤議員の質問時間を終わります」
2273 = "「Thời gian đặt câu hỏi của nghị viên Saitou kết thúc tại đây.」"
# monologue
# JP: 議事進行は、滞らない。
2866 = "Tiến trình nghị sự diễn ra trôi chảy."
# monologue
# JP: （宝生元忠の動きのことを、議長にも伝えてあるからな）
2963 = "（Vì tôi cũng đã thông báo cho chủ tọa về động thái của Houshou Mototada rồi mà.）"
# monologue
# JP: 会期末までになんとしてでも採決に持ち込む――\nそうできなければ市議会が無意味化されてしまいかねない。
2530 = "Bằng mọi giá phải đưa ra biểu quyết trước khi kết thúc kỳ họp―― Nếu không làm được như vậy, hội đồng thành phố có nguy cơ trở nên vô nghĩa."
# monologue
# JP: 誇り高く職務に忠実な議長は故に、\nただしく議会を、過不足無しに導いてくれている。
2525 = "Do đó, một vị chủ tọa đầy tự hào và trung thành với nhiệm vụ, đang điều hành hội đồng một cách đúng đắn, không thừa không thiếu."
# 【議長】
# display as 議長
# JP: 「御一夜の未来を考える会。\n[にいつ,1]新津議員。質問をどうぞ」
1967 = "「Hội Suy nghĩ về Tương lai của Ohimitera. Nghị viên Niitsu. Xin mời đặt câu hỏi.」"
# monologue
# JP: 議長の声に促され、\n痩躯の男が大股に演壇へと進み出る。
2880 = "Được sự thúc giục của chủ tọa, một người đàn ông gầy gò bước những sải dài tiến lên bục diễn thuyết."
# monologue
# JP: 新津議員――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致賛成派の有力な議員の一人だ。
2673 = "Nghị viên Niitsu―― Một trong những nghị viên có thế lực của phe ủng hộ thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;."
# 【中堅議員】
# display as 中堅議員
# JP: 「三セク形式を取ると言っていますが、結局のところ、\n利益が出た場合は御一夜鉄道にも入りますよね？」
1710 = "「Cô nói sẽ áp dụng mô hình Khu vực ba, nhưng rốt cuộc, nếu có lợi nhuận thì Đường sắt Ohito cũng sẽ được chia phần đúng không?」"
# monologue
# JP: 挨拶もせず切り出す言葉は、喧嘩腰。\nが、ポーレットは動揺を見せず受け止める。
2471 = "Những lời lẽ mở đầu không thèm chào hỏi, sặc mùi gây hấn. Nhưng Paulette vẫn đón nhận mà không hề tỏ ra nao núng."
# 【ポーレット】
# display as 波萊特
# JP: 「はい。ご指摘のとおりです」
2047 = "「Vâng. Đúng như ngài đã chỉ ra.」"
# 【中堅議員】
# display as 中堅議員
# JP: 「それは市政を利用して、\n私腹を肥やす行為なのではないですか？」
2207 = "「Đó chẳng phải là hành vi lợi dụng chính quyền thành phố, để trục lợi cá nhân sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「かかるご懸念の発生はごもっともだと思います。ので、\n本議案の成立時には同問題を解消することを約束します」
1914 = "「Sự lo ngại của ngài là hoàn toàn có cơ sở. Do đó, tôi xin hứa sẽ giải quyết vấn đề này khi dự luật được thông qua.」"
# 【中堅議員】
# display as 中堅議員
# JP: 「解消とは？」
1865 = "「Giải quyết thế nào?」"
# 【ポーレット】
# display as 波萊特
# JP: 「市長職を辞し、兼職を解消するということです」
1930 = "「Tôi sẽ từ chức thị trưởng, chấm dứt việc kiêm nhiệm.」"
# monologue
# JP: ポーレットの爆弾発言に、\n議場がざわつく。揺れ動く。
2729 = "Trước phát ngôn gây sốc của Paulette, cả hội trường xôn xao. Rúng động."
# 【中堅議員】
# display as 中堅議員
# JP: 「それは、順序が逆でしょう。\n営利のために公職を放棄するなどと」
2117 = "「Như vậy là ngược đời rồi. Vì lợi nhuận mà từ bỏ chức vụ công sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「交通のため、少なくとも御一夜において鉄道は必要です。\nその維持管理のため、現状、わたしの能力は不可欠です」
1907 = "「Vì mục đích giao thông, ít nhất ở Ohimitera, đường sắt là cần thiết. Để duy trì và quản lý nó, hiện tại năng lực của tôi là không thể thiếu.」"
# 【中堅議員】
# display as 中堅議員
# JP: 「なら、いますぐに辞職をすればいい。そんなハンパな\n覚悟の市長に、御一夜の舵取りは任せられない」
2237 = "「Vậy thì cô hãy từ chức ngay bây giờ đi. Không thể giao phó việc lèo lái Ohimitera cho một thị trưởng với sự quyết tâm nửa vời như vậy được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「今わたしが辞任することは、民意の放棄につながります。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対の一票への責任の放棄です」
2142 = "「Nếu bây giờ tôi từ chức, điều đó đồng nghĩa với việc vứt bỏ ý dân. Là chối bỏ trách nhiệm đối với lá phiếu phản đối thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# monologue
# JP: けれど全く揺るぎはしない。\n新津議員も、ポーレットも。
2456 = "Nhưng hoàn toàn không có sự nao núng nào. Cả nghị viên Niitsu, lẫn Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「ですので、議案を成立させ、代替案を示すところまでが、\nわたしの、議員としての最低限の責任であると考えます」
1955 = "「Do đó, việc thông qua dự luật và đưa ra phương án thay thế, là trách nhiệm tối thiểu của tôi với tư cách là một nghị viên.」"
# 【中堅議員】
# display as 中堅議員
# JP: 「工場誘致反対さえ成し遂げれば、\n後の政治的責任は放棄するとおっしゃるわけですか」
1912 = "「Ý cô là chỉ cần hoàn thành việc phản đối thu hút nhà máy, thì cô sẽ từ bỏ trách nhiệm chính trị sau này sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「市長選には、マイントレジャー計画推進を\n後継してくれる候補を立てます」
1944 = "「Trong cuộc bầu cử thị trưởng, tôi sẽ đề cử một ứng cử viên kế nhiệm để thúc đẩy kế hoạch Mine Treasure.」"
# 【女性議員】
# display as 女議員
# JP: 「民意は、それで問い直せるわね」
2041 = "「Như vậy thì có thể lấy lại được ý dân nhỉ.」"
# 【議長】
# display as 議長
# JP: 「不規則発言を禁止します」
2109 = "「Nghiêm cấm các phát ngôn không theo trình tự.」"
# monologue
# JP: ヤジが、鋭く止められる。\nポーレットを妨害するものも、味方するものも区別無く。
2879 = "Những tiếng la ó bị dập tắt một cách sắc bén. Không phân biệt kẻ cản trở Paulette hay người ủng hộ cô."
# monologue
# JP: さらに引き締まる議場の空気を、\n新津議員とポーレットとの応酬だけが揺らし続ける。
2874 = "Bầu không khí trong hội trường càng thêm căng thẳng, chỉ có màn đáp trả qua lại giữa nghị viên Niitsu và Paulette là liên tục khuấy động."
# 【中堅議員】
# display as 中堅議員
# JP: 「……ご答弁をありがとうございました」
1399 = "「...Cảm ơn cô đã trả lời.」"
# 【議長】
# display as 議長
# JP: 「以上にて、新津議員の質問時間を終わります。\n市民の党、関原議員。質問をどうぞ」
1970 = "「Thời gian đặt câu hỏi của nghị viên Niitsu kết thúc tại đây. Đảng Công dân, nghị viên Sekihara. Xin mời đặt câu hỏi.」"
# 【老議員】
# display as 老議員
# JP: 「[せきはら,1]関原です」
1942 = "「Tôi là Sekihara.」"
# monologue
# JP: 老議員が、ややよろよろと立ち上がる。
2429 = "Vị nghị viên lão thành đứng lên, dáng vẻ hơi loạng choạng."
# monologue
# JP: この人は、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対派の議員だが――\n今日は極めて厳しい視線を、ポーレットへと向けている。
2899 = "Người này là một nghị viên thuộc phe phản đối thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;―― Nhưng hôm nay ông ta lại ném một cái nhìn vô cùng gay gắt về phía Paulette."
# 【老議員】
# display as 老議員
# JP: 「わしらね、市長。術仙炭鉱で昔働いていたとですよ」
1892 = "「Bọn tôi ấy mà, thưa thị trưởng. Ngày xưa từng làm việc ở mỏ than Jussen đấy.」"
# monologue
# JP: ……質問時間を、まるで気にしていないようだ。\n関原議員は淡々と、術仙炭鉱の歴史を語る。
1368 = "\"...Dường như ông ta hoàn toàn không bận tâm đến thời gian đặt câu hỏi. Nghị viên Sekihara cứ bình thản kể về lịch sử của mỏ than Jussen.\""
# monologue
# JP: そこにはひとつの町があり、\nいくつもの豊かな暮らしが送られていたと。
2666 = "Rằng ở đó từng có một thị trấn, và bao cuộc sống sung túc đã trôi qua."
# 【老議員】
# display as 老議員
# JP: 「採炭ば、国の基幹産業の一つと言われておりましてな。\n[じゅつせん,1]術仙は、その中でも十指に入る、優良炭鉱だったとです」
2081 = "「Khai thác than từng được coi là một trong những ngành công nghiệp mũi nhọn của đất nước. Jussen là một mỏ than ưu tú, lọt top mười trong số đó đấy.」"
# monologue
# JP: 発電所に最新設備。\nそうしたものが残る理由が、語られていく。
2665 = "Nhà máy điện cùng với những trang thiết bị tối tân. Lý do tại sao những thứ đó vẫn còn tồn tại, đang được kể lại."
# monologue
# JP: 僕らが想像していたよりも、\n術仙炭鉱は、はるかに豊かな[やま,1]鉱山だったのだ。
2782 = "Hơn cả những gì chúng tôi từng tưởng tượng, Mỏ than Jussen đã từng là một mỏ quặng trù phú đến nhường nào."
# 【老議員】
# display as 老議員
# JP: 「石炭ば不要になるとは、誰も思うとらんかったとです。\n国もようさん、補助金ば送り込んでくれました」
2092 = "「Không một ai nghĩ rằng sẽ có ngày than đá trở nên vô dụng. Nhà nước cũng đã rót rất nhiều tiền trợ cấp cho chúng tôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「…………」
1390 = "「…………」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1797 = "「唔？」" 
# monologue
# JP: 後ろから見ている僕しか、\n今は気づいていないだろうが――
2925 = "Có lẽ hiện tại chỉ có tôi, người đang đứng nhìn từ phía sau, mới nhận ra điều này――"
# monologue
# JP: ポーレットの首筋に、\nびっしりと汗が浮き始めている。
2727 = "Trên gáy của Paulette,\nmồ hôi bắt đầu lấm tấm rịn ra."
# monologue
# JP: （照明か？　空調に異常はないし……）
2973 = "（Do ánh đèn sao? Điều hòa đâu có vấn đề gì...）"
# 【老議員】
# display as 老議員
# JP: 「ばってん、石油に追われ、石炭は不要になったとです。\n国は補助金ば打ち切って、手のひら返しよったとですよ」
1787 = "「Nhưng mà, bị dầu mỏ lấn át, than đá đã trở nên dư thừa. Nhà nước cắt đứt trợ cấp, lật mặt nhanh như chớp.」"
# 【ポーレット】
# display as 波萊特
# JP: 「術仙炭鉱の会計資料については、\nわたしも確認させていただいております」
2156 = "「Về các tài liệu kế toán của mỏ than Jussen, tôi cũng đã xác nhận rồi ạ.」"
# monologue
# JP: ポーレットの声は冷静だ。\nそれがかえって、僕の不安を増大させる。
2731 = "Giọng nói của Paulette rất bình tĩnh. Điều đó lại càng làm tôi thêm bất an."
# 【老議員】
# display as 老議員
# JP: 「国から見捨てられたあとはもう、\n下り坂を転げるようなもんだったとです」
2139 = "「Sau khi bị nhà nước bỏ rơi thì, mọi thứ cứ như trượt dốc không phanh vậy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「見捨て……られ、て」
2158 = "「Bị bỏ... rơi...」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1797 = "「唔？」" 
# monologue
# JP: なにか、つぶやきでもしたのだろうか。\nかすかな声が聞こえたような気がしたのだが――
2719 = "Cô ấy đang lầm bầm điều gì đó chăng. Tôi có cảm giác như nghe thấy một âm thanh yếu ớt――"
# monologue
# JP: 姿勢は、まるで変わっていないが、\n首筋からは、だらだらと汗がしたたり始める。
2929 = "Tư thế của cô ấy hoàn toàn không thay đổi, nhưng mồ hôi đã bắt đầu túa ra ròng ròng trên gáy."
# monologue
# JP: （ポーレットに心的不安があると……\nその可能性に、僕は思い当たっていたのに――）
2968 = "\"（Rằng Paulette đang có những bất an trong lòng... Mình đã lờ mờ nhận ra khả năng đó rồi cơ mà――）\""
# monologue
# JP: 後悔が喉にこみ上げてくる。\n――わかっていながら、僕には何もできなかった。
2432 = "\"Sự hối hận nghẹn ứ nơi cổ họng. ――Dù biết rõ, nhưng tôi đã chẳng làm được gì cả.\""
# monologue
# JP: （肉体的にも無理をしてると――\n稀咲が、あれほどはっきり警告を発してくれていたのに）
2972 = "\"（Rằng cô ấy cũng đang cố sức chịu đựng về mặt thể xác―― Kisaki đã đưa ra cảnh báo rõ ràng đến thế cơ mà.）\""
# monologue
# JP: いや――できなかったではなく、しなかった。\nわかっていながら、放置した。
2441 = "\"Không――không phải là không làm được, mà là đã không làm. Dù biết rõ, nhưng tôi lại bỏ mặc.\""
# monologue
# JP: 忙しかったことなど、無論、なんの言い訳にもならない。\n忙しさとは、ポーレットにかかる負担の大きさなのだから。
2627 = "\"Đương nhiên, chuyện bận rộn không thể làm cái cớ được. Bởi sự bận rộn ấy, chính là gánh nặng khổng lồ đè lên vai Paulette.\""
# 【老議員】
# display as 老議員
# JP: 「この計画ば、おもしろかもんと思います。\nが、補助金だよりな点がどうにも気になりますけん」
1946 = "「Tôi nghĩ kế hoạch này cũng khá thú vị đấy. Nhưng mà, cái điểm phải dựa dẫm vào tiền trợ cấp thì tôi cứ lấn cấn mãi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「頼って――なんて」
1958 = "「Dựa dẫm――gì chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2275 = "「!?」"
# monologue
# JP: 体の異変が、もう汗だけでは留まらなくなる。
2565 = "\"Sự bất thường của cơ thể, không chỉ dừng lại ở việc đổ mồ hôi nữa.\""
# 【ポーレット】
# display as 波萊特
# JP: 「それは――もし補助金がでなくても――\nその――採算、きちんと取れるように――」
1926 = "「Chuyện đó――ngay cả khi không có trợ cấp―― thì――chúng tôi vẫn có thể đảm bảo được lợi nhuận――」"
# monologue
# JP: 膝から下に、あきらかに力がはいっていない。
2566 = "\"Từ đầu gối trở xuống, rõ ràng là không còn chút sức lực nào.\""
# monologue
# JP: 足がガクガク震えているし、\nそれが、言葉にも影響している。
2587 = "\"Đôi chân run rẩy lẩy bẩy, và điều đó, cũng ảnh hưởng đến cả lời nói.\""
# monologue
# JP: （だが、どうすれば――）
2955 = "\"（Nhưng mà, phải làm sao đây――）\""
# monologue
# JP: 僕が議場に乱入すれば、\nポーレットの答弁の妨害になる。
2579 = "\"Nếu tôi lao vào hội trường, sẽ làm gián đoạn phần trả lời của Paulette.\""
# monologue
# JP: ポーレット自身が助けを求めてくれない限り――\n答弁が続く限りは、僕はポーレットを支えられない。
2517 = "\"Trừ phi chính Paulette yêu cầu sự giúp đỡ―― Chừng nào phần trả lời còn tiếp tục, tôi không thể hỗ trợ cô ấy được.\""
# 【老議員】
# display as 老議員
# JP: 「売上が想定より１０％下がるだけで赤字転落。\nこん見通しは、どうみても補助金だよりですとね」
1782 = "「Chỉ cần doanh thu giảm 10% so với dự kiến là sẽ rơi vào thua lỗ. Triển vọng này, nhìn kiểu gì cũng thấy là đang dựa dẫm vào trợ cấp mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫――大丈夫です。\n頼らなくても……一人でも――」
2050 = "「Không sao――không sao đâu. Dù không dựa dẫm... dù chỉ một mình――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットっ！」
2058 = "「Paulette!」"
# monologue
# JP: 議場が、わずかにざわめきはじめる。\n目ざといものは、異変に気付き始めたのだろう。
2873 = "\"Cả hội trường bắt đầu xôn xao đôi chút. Những người tinh ý có lẽ đã bắt đầu nhận ra sự bất thường.\""
# monologue
# JP: が、関原議員は気づいてないのか、気づいていてか、\n何も変わらず、淡々と自分の言葉を重ね続ける。
2482 = "\"Nhưng nghị viên Sekihara không biết là không nhận ra, hay cố tình phớt lờ, ông ta vẫn chẳng có gì thay đổi, cứ điềm nhiên tiếp tục những lời nói của mình.\""
# 【老議員】
# display as 老議員
# JP: 「こん施設の維持ば、難しかとですよ。\nいい時は、いつまでも続きやしませんけんねぇ」
2118 = "「Việc duy trì những cơ sở vật chất này, khó khăn lắm đấy. Những lúc tốt đẹp, sẽ chẳng thể kéo dài mãi mãi đâu nha.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……あっ――」
1799 = "「A... a――」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2274 = "「！」" 
# monologue
# JP: じわじわ、じわじわ。\nポーレットの足の震えが、他の部分へも広がり始める。
2732 = "\"Từ từ, từ từ. Sự run rẩy từ đôi chân của Paulette bắt đầu lan rộng ra các bộ phận khác.\""
# monologue
# JP: 普段から白いその顔色は、さらに血の気を失って、\n蒼白という領域にまで落ち込んでいる。
2547 = "\"Sắc mặt vốn đã trắng bệch của cô ấy, nay càng thêm mất đi huyết sắc, rơi vào trạng thái nhợt nhạt đến đáng sợ.\""
# 【双鉄】
# display as 雙鐵
# JP: 「無理なら中断！\n答弁の中断を要求するんだ、ポーレット！」
2159 = "「Nếu không chịu nổi thì dừng lại đi! Hãy yêu cầu tạm dừng trả lời đi, Paulette!」"
# monologue
# JP: 議場裏から、小さく抑えた声を送る。\n議場にまでは聞こえない声。
2639 = "\"Từ phía sau hội trường, tôi cố nén giọng thật nhỏ. Một giọng nói không thể vang đến khu vực nghị sự.\""
# monologue
# JP: 聞こえているのは、ポーレットと議長、\nそれに速記者たちだけだろう、声。
2840 = "\"Có lẽ những người nghe thấy, chỉ có Paulette, chủ tọa và các nhân viên tốc ký mà thôi.\""
# 【ポーレット】
# display as 波萊特
# JP: 「無理じゃない、から――\nわたし……大丈夫――頑張れる、から」
1951 = "「Không sao đâu, mà―― Tôi... vẫn ổn――vẫn có thể cố gắng được, mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2274 = "「！」" 
# monologue
# JP: ポーレットは、僕に答えてしまっている。\nが、関原議員はそれを答弁と受け止める。
2725 = "\"Paulette đang trả lời tôi. Nhưng nghị viên Sekihara lại hiểu nhầm đó là câu trả lời dành cho ông ta.\""
# 【老議員】
# display as 老議員
# JP: 「わしらとて――\n死に物狂いで、がんばりにがんばりましたがのう」
1925 = "「Bọn tôi ấy mà―― Cũng đã liều mạng, cố gắng hết sức mình rồi đấy chứ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「頑張れる――から、役に――立つから」
1943 = "「Sẽ cố gắng――mà, sẽ có――ích mà.」"
# 【老議員】
# display as 老議員
# JP: 「……言うても、仕方の無かことですの。\n周りがそうと思うてくれにゃあ、どうもならんけん」
1398 = "「...Nói vậy chứ, cũng hết cách thôi. Nếu những người xung quanh không nghĩ vậy thì cũng đành chịu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「～っ！」
2277 = "「~!」"
# monologue
# JP: 無理に気づいて。放置していた。\n一歩を踏み出す、過去を問いかける勇気がなかった。
2644 = "\"Nhận ra cô ấy đang cố quá sức. Nhưng lại bỏ mặc. Tôi đã không có can đảm để bước lên một bước, để hỏi về quá khứ của cô ấy.\""
# monologue
# JP: ――この状況にまでポーレットを追い込んでしまったのは、\n僕自身だと、思い知る。
2653 = "\"――Tôi nhận ra rằng, người đã dồn Paulette vào tình cảnh này, chính là bản thân tôi.\""
# monologue
# JP: （ならば――僕は――）
2983 = "\"（Nếu vậy――tôi――）\""
# 【老議員】
# display as 老議員
# JP: 「落ち込みはじめたもんはもう、そらぁ悲惨ですたい。\n誰も見向きもせんようになり、更には厄介者ばいわれて」
1650 = "「Một khi đã bắt đầu tuột dốc thì, ôi chao thê thảm lắm. Chẳng còn ai thèm ngó ngàng tới, thậm chí còn bị coi là của nợ nữa cơ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「やっ――」
1655 = "「Khôn――」"
# monologue
# JP: 凍えたような、それは悲鳴。\nポーレットの顔が、体は、もう完全にこわばっている。
2728 = "\"Một tiếng hét như thể đóng băng. Khuôn mặt, cơ thể của Paulette, giờ đã hoàn toàn cứng đờ.\""
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！」
# 2058 = "「波萊特！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「――」
1380 = "「――」"
# monologue
# JP: 崩れる、のではなく倒れこむ。
2554 = "\"Không phải là sụp xuống, mà là ngã nhào.\""
# monologue
# JP: 斧で切られた木のように、足の力をまるで失くして、\nポーレットは一気に真横へとっ――
2590 = "\"Giống như một cái cây bị rìu đốn hạ, đôi chân hoàn toàn mất đi sức lực, Paulette ngã ập sang một bên――\""
# 【双鉄】
# display as 雙鐵
# JP: 「くうっ！」
1822 = "「Hự!」"
# monologue
# JP: （どさっ！！）
2961 = "\"（Bịch!!）\""
# 【老議員】
# display as 老議員
# JP: 「市長っ！？」
1896 = "「Thị trưởng!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「～～～っ！！　――ぁっ！\n間に合った――間に合ってます――抱きとめた」
2281 = "「~~~!! ――A!\nKịp rồi――kịp rồi――tôi đỡ được rồi.」"
# monologue
# JP: 両手で、しっかり受け止めている。\n頭も体も、どこにもぶつけてないはずだ。
2647 = "\"Bằng cả hai tay, tôi đã đỡ lấy cô ấy một cách chắc chắn. Đầu và cơ thể, chắc chắn không bị va đập vào đâu cả.\""
# monologue
# JP: が――
2477 = "\"Nhưng mà――\""
# monologue
# JP: （なんで、これほどに冷え切ってるんだ）
2965 = "\"（Tại sao, cơ thể cô ấy lại lạnh toát đến mức này chứ）\""
# monologue
# JP: 抱える僕の両手にまで染みこんでくる。
2637 = "\"Cái lạnh thấm vào tận hai bàn tay đang ôm lấy cô ấy của tôi.\""
# monologue
# JP: ポーレットの体はまるで氷のようで、\nなのにびっしり、冷汗の粒を貼り付けている。
2545 = "\"Cơ thể Paulette lạnh như băng, vậy mà lại lấm tấm những giọt mồ hôi lạnh toát.\""
# 【議長】
# display as 議長
# JP: 「暫時休憩――いや、関原議員の質問時間は――\n終わりです」
2031 = "「Tạm thời nghỉ ngơi――à không, thời gian đặt câu hỏi của nghị viên Sekihara―― đã kết thúc.」"
# 【老議員】
# display as 老議員
# JP: 「ああ」
# 1800 = "「啊」" 
# monologue
# JP: 脱力したような、心配そうな、小さな頷き。\nそれを見届け、議長はすっくと立ち上がる。
2909 = "\"Một cái gật đầu nhẹ, đầy lo lắng và như thể đã kiệt sức. Nhìn thấy điều đó, chủ tọa lập tức đứng lên.\""
# 【議長】
# display as 議長
# JP: 「本日の議会は終了します。次回日程は\n明後日十三時から、引き続き本議案の審議を行います」
1693 = "「Hội nghị hôm nay kết thúc tại đây. Lịch trình tiếp theo sẽ diễn ra vào 13 giờ ngày mốt, chúng ta sẽ tiếp tục thẩm định dự luật này.」"
