# lines: 418 
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？」
2258 = "「雙鐵君？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん」
1806 = "「啊，嗯」" 

# monologue
# JP: 声をかけられ、集中が切れる。\nが、邪魔をされたとは感じない。
2818 = "突然聽到有人喊我的名字打斷了我的注意力。但我並不覺得受到了打擾。" 

# monologue
# JP: どころか、むしろ――
2485 = "倒不如說——" 

# 【ポーレット】
# display as 波萊特
# JP: 「お疲れ様です。紅茶、淹れました」
1718 = "「你辛苦了。我泡了紅茶」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまんな」
1819 = "「啊，麻煩你了」" 

# monologue
# JP: ミルクも砂糖も淹れずに飲めば、\n普段より、香りも味も濃いと感じる。
2443 = "不加牛奶和砂糖的紅茶，讓人感覺比平時更香醇濃厚。" 

# monologue
# JP: その気遣いがありがたい。\n疲労と眠気を、舌先から崩してもらえる心持ちだ。
2826 = "紅茶入口，疲勞和困頓彷彿都被消除。我從心底默默感謝波萊特的好意。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　れいなは？」
1830 = "「嗯？　玲奈呢？」" 

# monologue
# JP: ついさきほどまで、\nポーレットを手伝っていたれいなの姿が見当たらない。
2766 = "玲奈剛才還在幫波萊特，現在卻不見了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「もうとっくに寝ちゃいました。\nあの子、早寝を心がけてますから」
1887 = "「已經去睡了。她一直都注意讓自己早睡的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1798 = "「啊——」" 

# monologue
# JP: わかってしまうような気がする。
2633 = "我似乎明白了。" 

# monologue
# JP: 早寝をこころがけるのは、れいな自身が他の誰よりも、\n居眠りを気にし、回避したいと願っているからなのだろう。
2763 = "玲奈之所以注意讓自己早睡，是因為她比任何人都重視打瞌睡的毛病，並希望能避免其發生。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、それにしても早すぎ――っ！！？」
1670 = "「不過，這也太早了吧——啊！！？」" 

# monologue
# JP: ふと、時計を見て驚かされる。\nいつの間に――日付が、とうに変わっている。
2651 = "我看了一眼時鐘才發現，早就已經過了２４點了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……随分と根を詰めてしまっていたのだな」
1401 = "「……我竟然糾結了這麼久」" 

# monologue
# JP: 目がショボショボとしているし、\n肩から腕もこわばっている。
2649 = "我的雙眼已經開始乾澀，肩膀和手臂也很僵。" 

# monologue
# JP: 川下りの手伝いのときとは１８０度性質の違う、\nけれども、同じくらいの深さの疲れだ。
2928 = "雖然和幫深美分擔隈河漂流工作那時候的性質完全不同，但差不多一樣累。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう、双鉄くん」
2176 = "「謝謝你，雙鐵君」" 

# monologue
# JP: なのに、一言。
2475 = "但她的一句感謝——" 

# monologue
# JP: ポーレットのその囁きだけで、\n体も心もほぐしてもらえて、軽くなる。
2901 = "這麼一句輕言輕語，就讓我的身心都飄了起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「こんな遅くまで付き合ってくれて」
2174 = "「謝謝你陪我到這麼晚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、秘書業務を溜めこんでしまっていたのは僕だ。\nただ単に、自分の負債を返済しているにすぎんよ」
1672 = "「不，都是因為我堆積了太多秘書的工作了。這只是我在還債而已」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それでも、やっぱりありがとう。\n秘書だって、わたしが無理いってお願いしたんだから」
1664 = "「不過我還是很感謝你。秘書這活也是我硬推給你做的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは誤解だ」
2209 = "「這你可就誤會了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1793 = "「哎？」" 

# monologue
# JP: ポーレットの目も眠そうだ。\nわずかにうるみ、とろんとしている。
2733 = "波萊特看起來也很睏，她一副睡眼朦朧的樣子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、こう見えて存外とわがままでな。\nやりたくないことは、誰にどう願われたところでやらん」
1952 = "「我雖然外表看起來和善，其實要任性得多。不想做的話，誰來請我都不會做的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そっか……そうなら、嬉しいな」
2216 = "「這樣啊……真讓我高興」" 

# monologue
# JP: カップを両手でつつみこみながらはにかんで。\nこくり、ポーレットは喉を鳴らす。
2562 = "她用雙手捧著杯子，面泛紅暈，慢慢地喝了一口。" 

# monologue
# JP: 甘いミルクの匂いがふわり、\n僕の鼻先まで届いてくる。
2652 = "我聞到了一股甜甜的牛奶香味。" 

# 【ポーレット】
# display as 波萊特
# JP: 「こんな時間にあれだけど――\nちょっとお話、大丈夫ですか？」
2256 = "「雖然已經這個點了——能商量件事嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。今日……いや、今夜はここで区切りとしておく。\n寝て起きてまで、疲労を持ち越したくはないからな」
1824 = "「嗯。今天……不，今晚就到這裡吧。我不想把疲勞帶到第二天」" 

# 【ポーレット】
# display as 波萊特
# JP: 「じゃ、わたしもここまでにしておきます」
2238 = "「那我也休息了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「話っていうのは、\x%l客車;#00ffc040;客車%l;#;のことなんです」
1915 = "「想和你談的是\\x%l客車;#00ffc040;客運車廂%l;#;的事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「というと――目処がついたのか？」
1678 = "「也就是說，已經有眉目了？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「つくかもなんです。[ひろしま,1]廣島からお話があって。\nええと、[つ]津っ[てつ]鐵にもともとあった\x%l客車;#00ffc040;客車%l;#;を――」
2170 = "「說不定可能會有。是廣島那邊聯絡我們，唔，說有原本屬於津鐵的\\x%l客車;#00ffc040;客運車廂%l;#;——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「つってつ？」
2066 = "「津鐵？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。津っ鐵。\n[にしつがるてつどう,4]西津輕鐵道さんの愛称です」
2012 = "「是的，津鐵。西津輕鐵路的愛稱」" 

# monologue
# JP: おそらくは、よほど嬉しい話であるのだろう。\n一言ごとに、ポーレットの顔がゆるんでいく。
2780 = "看來是一個極其喜人的消息。波萊特每說一句，笑容也更加燦爛幾分。" 

# monologue
# JP: 僕とて喜びを共有したいのはやまやまなのだが、\n今ひとつ、話を飲み込めないでいる。
2930 = "雖然我也很想與她分享這份喜悅，但我還有些搞不清楚的狀況。" 

# 【双鉄】
# display as 雙鐵
# JP: 「津輕といえば[あおもり,1]蒼森だよな？\nもともと蒼森にあった\x%l客車;#00ffc040;客車%l;#;が、どうして廣島になど？」
2062 = "「津輕難道不是青森的嗎？為什麼青森的\\x%l客車;#00ffc040;客運車廂%l;#;會在廣島呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ちょっと珍しい\x%l客車;#00ffc040;客車%l;#;だからです。\n廃棄処分になるところを、電車姫様が買い取って」
1839 = "「因為那節\\x%l客車;#00ffc040;客運車廂%l;#;有些罕見。原本即將被廢棄處理的時候被電車公主買下了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「電車姫――とは、確か、\n廣島の毛利電鉄のオーナーのことだったか」
2262 = "「電車公主——我記得是廣島毛利電鐵的所有者吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうです。正真正銘のお姫様で、\n正真正銘の\x%lまいてつ;#00ffc040;まいてつ%l;#;ですから、あのひとは」
2000 = "「是的。她既是真正的公主，同時也是真正的\\x%lまいてつ;#00ffc040;掌車人%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1796 = "「唔」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いつか、どこか誰かが必要とするときのため。\n\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;を、買い取り保存してくれてたんです」
1861 = "「她買下了\\x%lストーブ客車;#00ffc040;暖爐客車%l;#;，一直保存著它以備不時之需」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;？」
1377 = "「\\x%lストーブ客車;#00ffc040;暖爐客車%l;#;？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、言っちゃった！」
1809 = "「啊，我說漏嘴了！」" 

# monologue
# JP: もう少しもったいをつけるつもりだったのだろうか。\nポーレットは口元を押さえ、しまったなぁという顔をする。
2781 = "看來波萊特原本打算賣個關子，結果卻不小心說漏嘴了。她捂著自己的嘴，一臉惋惜。" 

# monologue
# JP: が、しかし……もったいぶられたところで僕では、\nどのみちまだまだ理解が足りぬ。
2453 = "不過……就算知道了名稱，現在的我也依舊是摸不著頭腦。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;というのは……なんだ――\nそのまま、ストーブがついている\x%l客車;#00ffc040;客車%l;#;……でいいのか？」
1376 = "「\\x%lストーブ客車;#00ffc040;暖爐客車%l;#;……就是，裡面裝著暖爐的\\x%l客車;#00ffc040;客運車廂%l;#;……是嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうです。蒼森の冬の風物詩ですね」
2020 = "「是這樣的。可以說是青森冬天特有的景致呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「冬の風物詩――御一夜でいえば、\nクマ川下りのコタツ船になるわけだな」
1738 = "「冬天特有的景致——用御一夜來舉例，就好像隈河漂流的船上裝了被爐一樣吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですね！　あれと良く似た感じです」
1808 = "「啊，對啊！　就像是那樣」" 

# monologue
# JP: こくこくと、頷きさえもが嬉しげだ。
2578 = "她高興地點頭贊同。" 

# 【ポーレット】
# display as 波萊特
# JP: 「コタツの代わりにストーブ。クマ焼酎の代わりに日本酒。\nおつまみは……ああ、そこは大きく違いますね」
2191 = "「車廂裡放的不是被爐而是暖爐，不是隈燒酒而是日本酒。小吃的話……啊，和這裡大不相同呢」" 

# monologue
# JP: ポーレットの目がふうっと和らぐ。
2730 = "波萊特的眼神變得柔和起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ストーブだから、上で焼けるんですよ。\nスルメとか、お餅とか」
2033 = "「有暖爐就可以在上面燒烤啦。小吃會有魷魚和年糕之類的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、それはいいな」
1817 = "「啊，這可真不錯」" 

# monologue
# JP: 下戸の僕さえ、飲みたくなるような情景が\n脳裏に容易に浮き上がってくる。
2594 = "就連平時不喝酒的我，想到那一幅情景也不禁想要小酌兩杯。" 

# 【ポーレット】
# display as 波萊特
# JP: 「お餅。わたし、それまで見たことがなかったんですよ。\n冬は、いっつもフランクにいましたから」
2242 = "「那是我第一次見到年糕呢。因為小時候冬天都是在法國度過的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
1989 = "「是嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ストーブの上に網が乗ってて。そのはしっこのお餅から、\nいい匂いがして、ぷぅってふくれて」
2026 = "「暖爐上裝著烤網，年糕放在上面，散發出香味，逐漸膨脹起來……」" 

# monologue
# JP: 知識を説明するのではなく、想い出を語ってもらっている。\nそう感じれば、僕もわずかにあたたかくなる。
2573 = "她述說著自己的真實經歷。光是聽她生動的描述就讓我全身溫暖起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「触ってみたくて、でも触ったらヤケドしそうで。\nじっと見てたら、ぷしゅんっ！　ってしぼんで」
2098 = "「看著脹起來的年糕又想碰又怕燙。然後噗地一聲脹破了，又癟下去」" 

# monologue
# JP: そのときのポーレットと、きっと同じ目をしてるのだろう。\n青い瞳はきらきらと、陽をきらめかせる川面のようだ。
2906 = "那個時候的波萊特的眼睛想必和現在一樣，如同蔚藍的河水反射著陽光一樣明亮。" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、\x%l車掌;#00ffc040;車掌%l;#;さんが裏返したら、またすぐにふくれて、\nもう、わたし食べたくて食べたくて」
2074 = "「然後\\x%l車掌;#00ffc040;列車長%l;#;把年糕翻了個面，只見另一面也馬上脹了起來，我那時已經饞得不行了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「食べたのだろう？\n砂糖醤油か、それともキナコか？」
1713 = "「你後來吃到了吧？是蘸甜醬油還是黃豆粉？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ノリとお醤油です。ノリの風味とお餅の味が、\nあつあつで、ふわって広がって――美味しかった」
1993 = "「是海苔和醬油。海苔特有的風味和軟軟燙燙的年糕的味道在嘴裡擴散開來——真是太好吃了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
1795 = "「唔——」" 

# monologue
# JP: いかん、僕まで小腹がすいてきた。
2446 = "不好，光是聽著我都餓了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「口もお腹もぽかぽかで、ストーブはカンカンに燃えてて。\nなのに窓の外では、地吹雪で雪が舞い上がって真っ白で」
1831 = "「嘴裡和肚子裡都暖暖的。車裡暖爐熊熊燃燒，窗外地上的積雪卻被風揚起，染得一片雪白」" 

# 【双鉄】
# display as 雙鐵
# JP: 「真冬の旅か」
1741 = "「冬日之旅嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。初めて、日ノ本ですごした冬でした」
2010 = "「是的。這就是我第一次在日本度過的冬天」" 

# monologue
# JP: 数秒、まぶたが落とされる。\n過去の景色をその裏側に描いたのだろうか。
2575 = "她闔上眼睛幾秒，估計是在腦海中描繪著那過去的景致吧。" 

# 【ポーレット】
# display as 波萊特
# JP: 「産まれて初めて、夜行寝台に乗ったのもその時でした。\n個室のB寝台。パパが下の個室、わたしは上の個室で」
2227 = "「那也是我有生以來第一次乘夜行臥鋪車。是分上下床的Ｂ隔間，爸爸睡下面我睡上面」" 

# 【双鉄】
# display as 雙鐵
# JP: 「親子旅だな」
2082 = "「父女旅行啊」" 

# monologue
# JP: なにげなくいって頷き返され、\n瞬間、ふっと気にかかる。
2572 = "她若無其事地點了點頭，我這時才意識到。" 

# monologue
# JP: パパと一緒に――初めて、日ノ本で過ごす冬――\nそれまでずっと、フランクで過ごしていた冬。
2520 = "和爸爸一起——第一次在日本過冬——之前都是在法國過冬。" 

# monologue
# JP: （ポーレットは、母親がフランク人なのだよな）
2969 = "（我記得波萊特的媽媽是法國人）" 

# monologue
# JP: その冬は何故、フランクで過ごさなかったのか。\nその旅は何故、『パパとママと一緒』ではなかったのか。
2835 = "而那個冬天為什麼沒有在法國度過呢。為什麼不是“和爸爸媽媽一起旅遊”呢。" 

# monologue
# JP: あるいは、ごくごく単純に、ポーレットの母は、\n鉄道旅行を好まぬ人だっただけかもしれぬが――
2926 = "雖然可能只是單純地因為波萊特的母親不喜歡鐵路旅行吧——" 

# 【ポーレット】
# display as 波萊特
# JP: 「パパが大好きだったんです。夜行寝台、“よあけ”。\n[うえの,1]上埜発の蒼森行です」
2083 = "「爸爸特別喜歡夜行臥鋪。那輛車叫“拂曉”，是上野出發前往青森的車」" 

# monologue
# JP: 前から、気にはなっていた。ポーレットが語る想い出は、\nいつだって、パパとのものであることを。
2641 = "我從以前就注意到，波萊特跟我講過的回憶裡，她似乎總是和父親在一起。" 

# 【ポーレット】
# display as 波萊特
# JP: 「本当に、降りた時から、蒼森駅は雪の中で。\n乗り換えて、[ごしょがわら,3]五所ケ藁っていう駅から津っ鐵に乗って」
1749 = "「到達青森的時候，整個車站都飄起了鵝毛大雪，然後我們在五所川原站換乘津鐵」" 

# monologue
# JP: 『ママは一体、どうしていたのか』\n気軽に聞いてはいけない気がして、声を出せない。
2455 = "不過我覺得不應該輕易打聽她母親如何，便沒有開口。" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l単線;#00ffc040;単線%l;#;で。ストーブ\x%l列車;#00ffc040;列車%l;#;はとっても静かで。\nガイドのおばさんの津輕弁、初めて聞くのに懐かしくて」
2219 = "「還是\\x%l単線;#00ffc040;單線%l;#;。暖爐\\x%l列車;#00ffc040;列車%l;#;非常安靜。導遊大媽操著津輕口音，明明是第一次聽卻非常親切」" 

# monologue
# JP: ……あえて語らぬことならば、あえて尋ねる必要も無い。\n別の機会で、かまわない。
1363 = "……既然她自己不願提及，我也沒有必要刨根問底。等有機會再詢問吧。" 

# monologue
# JP: 幸せそうなポーレットの、\n語る言葉に醸す空気に、いまはゆったり浸っていたい。
2767 = "現在我暫時只想沉浸在波萊特靜靜敘述的甜美回憶中。" 

# 【ポーレット】
# display as 波萊特
# JP: 「駅のホームも雪に埋もれて。\x%l駅名標;#00ffc040;駅名標%l;#;も読めなくて。\n停車の度、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;が\x%l運転士;#00ffc040;運転士%l;#;に抱えられて出てきて」
2112 = "「站台都被雪埋沒了。連\\x%l駅名標;#00ffc040;站牌%l;#;都看不清。每次一停車，\\x%l運転士;#00ffc040;駕駛員%l;#;就抱著\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;走出來」" 

# monologue
# JP: そう切り替えれば、疑問などすぐにとろけてしまう。\nポーレットの声も表情も、あたたかすぎて。
2488 = "做完這個決定，我便將心底的疑問拋之腦後。波萊特的聲音和表情都十分溫暖。" 

# monologue
# JP: それこそストーブにあたったように、\n鼻の頭と両頬を、幸せそうなピンクに染めてる。
2592 = "就好像在暖爐旁取過暖一樣，鼻尖和兩頰被染成了幸福的粉色。" 

# 【ポーレット】
# display as 波萊特
# JP: 「小さな体が、コートと長靴でもこもこしてて。\n吹雪にも負けない声で、駅名と停車時間を伝えてくれて」
2235 = "「那小巧的身體被大衣和長靴包裹，顯得圓滾滾的。她用在暴風雪裡也能聽到的響亮聲音報出站名和停車時間」" 

# monologue
# JP: ああ、とポーレットが囁きを漏らす。
2735 = "波萊特講到這裡，不禁發出感嘆。" 

# monologue
# JP: 潤みをいくらかました目で、\n優しく、やさしく、じんわり微笑む。
2557 = "她溫柔地微笑著，眼裡寫滿了懷念。" 

# 【ポーレット】
# display as 波萊特
# JP: 「多分、あれで。あの旅で――わたし、ほんとに、\n鉄道と\x%lレイルロオド;#00ffc040;レイルロオド%l;#;を、大好きになった」
1853 = "「大概——就是在那趟旅途中，我喜歡上了鐵路和\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2217 = "「這樣啊」" 

# monologue
# JP: ……その感覚は、僕には今ひとつわからない。
1356 = "……我並不怎麼能理解她的這份感情。" 

# monologue
# JP: が、わからない故、\nうきあがってくる感情もある。
2454 = "不過也正因為不理解，才使我更加有感而發。" 

# 【双鉄】
# display as 雙鐵
# JP: 「とても豊かな旅だったのだな。\n僕も、経験してみたかった」
2101 = "「真是美好的旅程啊。我也想體驗一次」" 

# 【ポーレット】
# display as 波萊特
# JP: 「できますよ？　経験」
1785 = "「可以體驗到哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「え？」
# 1793 = "「哎？」" 

# monologue
# JP: ポーレットにも、僕の言葉が意外であったのかもしれん。\nふたり驚いた顔をして、数秒、にらめっこしてしまう。
2718 = "波萊特也沒料到我會這麼說吧。我們兩個就這樣帶著驚訝的表情面面相覷了好幾秒。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええと、津っ鐵さんもストーブ\x%l列車;#00ffc040;列車%l;#;もまだ現役です。\n観光\x%l列車;#00ffc040;列車%l;#;として、一番くらいに名高いですから」
2232 = "「那個，津鐵和暖爐\\x%l列車;#00ffc040;列車%l;#;如今都還在運營。因為這列觀光\\x%l列車;#00ffc040;列車%l;#;非常有名」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1763 = "「原來是這樣」" 

# monologue
# JP: そこに至るまでの努力を思えば、頭が下がる。\nあやかりたいなと一瞬思い、それではいかんと思い直す。
2433 = "一想到達到這個知名度需要付出多少努力，就讓我深感敬佩。我一瞬想要效仿它，但又很快打消了這個念頭。" 

# monologue
# JP: 日ノ本一の観光\x%l列車;#00ffc040;列車%l;#;――\nあやかっていては、それを越えるには至れまい。
2634 = "我們要打造日本第一的觀光\\x%l列車;#00ffc040;列車%l;#;——如果只是去效仿，就無法超越。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、現役というのなら何故、\n\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;が廣島に引き取られているのだ？」
1665 = "「不過既然還在運營，\\x%lストーブ客車;#00ffc040;暖爐客車%l;#;為什麼會被廣島接手呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「単純な老朽化です。古くなったから、\n他所から比較的新しい\x%l客車;#00ffc040;客車%l;#;を買い入れてストーブ化した」
1776 = "「只是因為那節車廂太老了。現在用的是從別的地方購買的比較新的\\x%l客車;#00ffc040;客運車廂%l;#;，然後加裝暖爐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「トコロテン方式で不要になった旧\x%l客車;#00ffc040;客車%l;#;を、\n電車姫様が引き取って保存していた――ということか」
2129 = "「而淘汰掉的舊\\x%l客車;#00ffc040;客運車廂%l;#;就被電車公主接手並保存起來了嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです。定期的に\x%l客車;#00ffc040;客車%l;#;交換できるくらいに、\n津っ鐵さんは、鉄道観光で成功してるんです」
1980 = "「是啊。津鐵的鐵路觀光運營非常成功，直到現在還有能力定期更換\\x%l客車;#00ffc040;客運車廂%l;#;」" 

# monologue
# JP: 引き出しを開け、ポーレットが何かを取り出す。
2722 = "波萊特拉開抽屜取出了什麼東西。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、プリントしたのか――\n凪が撮った写真だな？」
1805 = "「啊，列印出來了——這是凪拍的照片吧？」" 

# monologue
# JP: 虹の中央、赤い鉄橋。\n\x%lキハ07;#00ffc040;キハ07%l;#;が、その中心を走っている。
2609 = "彩虹中央是一座紅色鐵橋。\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;正穿行其中。" 

# 【ポーレット】
# display as 波萊特
# JP: 「これを電車姫様にお見せしたら、興味を持って下さって。\nそれで、マイントレジャー計画についてもお話しして」
1938 = "「我把這張照片給電車公主看了，她表示非常感興趣。於是我把煤探樂園的計劃也跟她說了——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「手応えがあったのか」
2095 = "「看來有成效啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。すごく面白がってくれて。で、\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;を\n譲ってくれてもいいってお話しになったんです」
2004 = "「是的。她非常感興趣，然後表示願意將\\x%lストーブ客車;#00ffc040;暖爐客車%l;#;轉讓給我們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、何故マイントレジャーの話でストーブ……\nああいや、ひょっとすると石炭ストーブという発想か？」
1669 = "「不過，為什麼你們會從煤探樂園計劃談到暖爐……啊，難道你們準備用煤炭來燒暖爐？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大正解です！　双鉄くん」
1867 = "「完全正確！　雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
# 1796 = "「唔」" 

# monologue
# JP: ならば冬には、『掘った石炭をストーブに投げ込み体験』\nという新しいオプションを設定できる。
2908 = "那冬天的時候，就可以追加“用剛採到的煤炭來燒暖爐”這個新體驗活動了。" 

# monologue
# JP: 夏には点けねば良いというだけのことだし、\n渡りに舟、の話ではある。が――
2833 = "而且夏天的時候只要不開暖爐就行了。這真算是心想事成啊。不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「老朽化で一度は引退した、\nしかも長く使われてなかった\x%l客車;#00ffc040;客車%l;#;……か」
2245 = "「那輛\\x%l客車;#00ffc040;客運車廂%l;#;是因為老舊而退役，並且被長期閒置……嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうなんです。\nそこが、お話しして相談したかったところで」
2007 = "「是的。我就是想跟你商量這個」" 

# monologue
# JP: ん――と眉根が寄ってしまう。
2568 = "她皺起了眉頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「電車姫様の保存車輌ですから、いい状態だと思います。\nけど、あの方はＳＬには詳しくないとも思いますから」
1837 = "「因為是電車公主保存的車廂，所以我想狀態應該不會差。不過，我覺得她似乎不太了解蒸汽機車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……煙などに対して、\n問題が出てくるかもしれぬということか」
1395 = "「……也就是說有可能在煙這方面出問題嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。無いとは断言できません」
1995 = "「是的。不能斷定不會出問題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「念のため聞くが、他の\x%l客車;#00ffc040;客車%l;#;のアテはあるのか？」
2177 = "「謹慎起見我問一下，還有其他的地方能弄到\\x%l客車;#00ffc040;客運車廂%l;#;嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「もう少し新しいのも、あるにはあるんですが……\nそっちは、有償になっちゃうんですよ」
2255 = "「雖然也有人表示可以提供比較新的車廂給我們……不過對方要求有償」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　ということは、廣島の話は――」
1828 = "「嗯？　也就是說電車公主的電車是——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、無償です。ご[かし,1]下賜です。\n移送も、九洲に上陸するまではやってくれるそうです」
1813 = "「啊，是無償贈送，賜給我們的。對方還表示可以幫忙運送到九州港口」" 

# 【双鉄】
# display as 雙鐵
# JP: 「随分と気前のいい話だな」
2212 = "「這可真是豪爽啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「マイントレジャーが稼働したら、\n一番に招待してくれればそれでいいって」
1859 = "「她說只要煤探樂園正式運營之後，第一個請她來參觀就可以」" 

# monologue
# JP: 幸せそうに、ポーレットが笑う。
2734 = "波萊特笑了，臉上滿是幸福。" 

# 【ポーレット】
# display as 波萊特
# JP: 「鉄道を好きになってくれる人が増えれば、\nそれは、電車姫様にも嬉しいことだから、って」
2137 = "「能有更多的人喜歡上鐵路，想必電車公主也會很高興的」" 

# monologue
# JP: （ああ）
2958 = "（啊——）" 

# monologue
# JP: わかった気がする。
2640 = "我好像懂了。" 

# monologue
# JP: \x%lまいてつ;#00ffc040;まいてつ%l;#;同士、鉄道事業者同士というレベルをさらに超え、\nポーレットと電車姫様とは、ある種の同士なのだ。
2720 = "波萊特和電車公主不僅同是\\x%lまいてつ;#00ffc040;掌車人%l;#;以及鐵路工作人員，她們還是志同道合的朋友。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、悩むまでもあるまい。貰おう」
2240 = "「那我們也沒有什麼可以煩惱的了，收下吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね！　これって、いいお話ですよね、やっぱり」
1877 = "「就是說啊！　這是一件非常不錯的事呢」" 

# monologue
# JP: パっと、ポーレットの顔が輝く。
2737 = "波萊特高興得滿臉泛光。" 

# monologue
# JP: （ああ……そういうことか）
2959 = "（啊……原來是這樣）" 

# monologue
# JP: \x%lストーブ客車;#00ffc040;ストーブ客車%l;#;に、あるいは電車姫様に。\n強い思い入れがあったからこそ、悩んでいたのか。
2723 = "波萊特是因知道自己對\\x%lストーブ客車;#00ffc040;暖爐客車%l;#;，或是對電車公主有著強烈的情感，所以才不敢自己做決定。" 

# monologue
# JP: それが自身の判断を、歪めているのではなかろうか、と。
2549 = "她害怕這份情感影響了她的判斷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「相談してもらえて、光栄だ」
1931 = "「我很榮幸，你願意來找我商量」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？」
1789 = "「哎！？」" 

# monologue
# JP: そこまで慎重なポーレットが、\n僕の意見を、判断を必要としてくれる。
2902 = "這麼慎重的波萊特希望徵求我的意見和判斷。" 

# monologue
# JP: とても誇らしく、嬉しいことだ。
2788 = "真是讓我感覺無比自豪和高興。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、あの……ええと、\nそう思ってもらえるの、わたしこそ――光栄です」
1816 = "「啊，這個……那個，能讓你這麼想，我也感到很光榮」" 

# monologue
# JP: 頬を赤くしうつむいて。
2569 = "她紅著臉低下頭去。" 

# monologue
# JP: 次の瞬間、ぐい、と顔が持ち上がり、\n強い瞳がまっすぐ、僕へと向けられる。
2437 = "下一瞬間又突然抬起頭，用堅定的目光看向我說道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの！　さっきの話っ――\nえと、ストーブ\x%l列車;#00ffc040;列車%l;#;を経験してみたいって」
2229 = "「那個！　剛才說過的，就是那個——你說想體驗暖爐\\x%l列車;#00ffc040;列車%l;#;那件事」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1827 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それ、よかったら――今度、あの、落ち着いたら、\nええと……経験、ですから、そのっ」
2231 = "「那個，如果可以的話，等情況穩定下來了……那個，也可以去體驗一下嘛」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。この状況が落ち着いて――\nマイントレジャーが無事に立ち上がったら」
2172 = "「說的也是。等工作告一段落——煤探樂園營業步入正軌後」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
2274 = "「！」" 

# monologue
# JP: こくこく、ポーレットが何度も頷く。\nそのまま、口は結ばれている。
2736 = "波萊特連連點頭。然後閉上嘴一言不發。" 

# monologue
# JP: 期待に満ちた眼差しは――\n僕の言葉を、きっと待ってる。
2560 = "她用充滿期待的眼神看著我，等待著我的邀請。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そのときには、僕と一緒に乗ってくれないか？\n蒼森、津輕の――津っ鐵さんのストーブ\x%l列車;#00ffc040;列車%l;#;に」
1746 = "「到時候，能和我一起去嗎？一起去坐青森津輕——津鐵的暖爐\\x%l列車;#00ffc040;列車%l;#;」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
1863 = "「好的！」" 

# 【稀咲】
# display as 稀咲
# JP: 「へぇ。それはとてもいい話に聞こえるね。\nおめでとう」
2218 = "「這還真是可喜可賀啊。恭喜你們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「祝辞を貰うには早過ぎる。\n\x%l客車;#00ffc040;客車%l;#;が来ても、運用できねば意味が無い」
2260 = "「離祝賀還早了點。就算\\x%l客車;#00ffc040;客運車廂%l;#;運到了這裡，不能投入運用也毫無意義」" 

# monologue
# JP: 言った途端に、\nスっと稀咲の目が細まる。
2838 = "聽到我這麼說，稀咲眯起了眼睛。" 

# monologue
# JP: 喜んでいるというわけではなく、\n値踏みをしているかのようだ。
2541 = "她並非是感到高興，而是在打量著我們。" 

# 【稀咲】
# display as 稀咲
# JP: 「なら、ここに来たのは、\n運用準備の一環として――ということになるかな？」
1972 = "「既然如此，你來這裡找我，也是準備投入運用的一環囉？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありていに言えばそういうことだ」
2121 = "「老實說就是這樣」" 

# monologue
# JP: 直接の電話で、即時にもらえたアポイントメント。
2629 = "憑一通電話，我們就馬上約下了面談的時間。" 

# monologue
# JP: それもまた、マイントレジャー計画への\n稀咲の評価の表れだろう。
2898 = "這也證明了稀咲對煤探樂園計劃評價很高。" 

# 【ポーレット】
# display as 波萊特
# JP: 「こちらの資料をご覧ください」
2173 = "「請看這份資料」" 

# monologue
# JP: 相変わらず、なかなか打ち解けられぬようだが、\nポーレットも前より積極的だ。
2924 = "雖然兩個人仍然不怎麼熟絡，但波萊特也比以往積極了些。" 

# monologue
# JP: 促す前に資料を提示し、説明を加えてくれている。
2529 = "在我提醒她之前就將資料交給了稀咲，還進行了說明。" 

# 【ポーレット】
# display as 波萊特
# JP: 「――以上のように、テーマパーク化による\n雇用促進も行いたい、と考えています」
1382 = "「——正如資料所示，我們還準備在主題公園設立多個用人崗位，以促進就業」" 

# 【稀咲】
# display as 稀咲
# JP: 「となると……\n経費も随分とふくらんでくるのでは？」
1977 = "「既然這樣……相應的，經費也會增加不少吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、概算ですが、開業から五年間の\n資金計画を作成してきました」
2021 = "「是這樣的，雖然還只是粗略估計，但我已經寫好了開業頭五年的資金計劃」" 

# 【稀咲】
# display as 稀咲
# JP: 「へぇ」
1794 = "「哦——」" 

# monologue
# JP: 手渡されたペーパーへと落ちた稀咲の目が、\n驚いたように見開かれる。
2802 = "稀咲吃驚地張大眼睛看著遞給她的文件。" 

# monologue
# JP: そしてみるみる、不機嫌そうに細まっていく。
2758 = "然後又有些不開心地眯起眼睛。" 

# 【稀咲】
# display as 稀咲
# JP: 「……この辺の線引き。\nキミはしっかり意識してると思ってたのだけれど」
1404 = "「……我還以為你是個分得清的人」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あの――線引きって」
1792 = "「哎？　分得清……是指？」" 

# 【稀咲】
# display as 稀咲
# JP: 「公私のさ。市が主体となるとは決まっていない事業案を、\n市職員を使って作らせるなどというのは――」
2093 = "「當然是指公私。這項事業還沒有敲定由市政府來主辦，你就讓市政府職員來做預算——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえ。あの、使ってません、誰の手も」
1803 = "「啊，不是的。我沒有借助別人的幫助」" 

# 【稀咲】
# display as 稀咲
# JP: 「へ？」
# 1793 = "「哎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「真闇さんに見てもらってアドバイスももらいましたけど、\n基本的には、わたし一人でこの資料は」
2257 = "「雖然這份資料有請真闇小姐過目並聽取了她的建議，不過基本上都是我一個人做的」" 

# 【稀咲】
# display as 稀咲
# JP: 「え？　一人って――え――ええっ！？」
1791 = "「哎？　你一個人——哎——！？」" 

# monologue
# JP: 驚きのあまりなのだろうか、\n稀咲の表情は、引きつってしまったように動かなくなる。
2804 = "稀咲徹底嚇呆了。" 

# 【稀咲】
# display as 稀咲
# JP: 「……それなら、他の資料群も？」
1410 = "「……這麼說，其他的資料也都是？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「マイントレジャーの施設やアトラクション関係は、\n双鉄くんが主体となって作成してくれてます」
2079 = "「煤探樂園的設施和娛樂項目的資料主要是由雙鐵君準備的」" 

# 【稀咲】
# display as 稀咲
# JP: 「つまり。それら以外は、キミが主体というわけか」
1677 = "「也就是說除此之外都是你準備的嗎」" 

# monologue
# JP: はあっと、呆れたようなため息。\n硬直していた稀咲の顔が、ようやく動く。
2558 = "她無奈地嘆了一口氣。僵硬的表情終於恢復原狀。" 

# 【稀咲】
# display as 稀咲
# JP: 「余計なお世話かもしれないが――\n雛衣ポーレット。キミはいつ寝てるんだい？」
1685 = "「也許是我多管閒事了——雛衣波萊特，你平時幾點睡覺？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いつって……ええと、夜から朝です」
1712 = "「你問幾點……那個，就是從晚上睡到早上啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「具体的には？　何時から何時まで」
1735 = "「具體呢？　從幾點到幾點」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは、その……日による感じで」
2211 = "「這個嘛……每天都不一樣」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクも、ある意味では同じような立場にいるから、\nわかるつもりだ」
1928 = "「我和你在某種意義上立場相似，所以我能懂」" 

# monologue
# JP: 視線に言葉に、今まで感じたことのない温度が混じる。
2809 = "稀咲的語氣和眼神透著至今為止都沒有過的關懷和溫暖。" 

# 【稀咲】
# display as 稀咲
# JP: 「男社会で、有無を言わせず結果を認めさせるためには、\n多少の無理も必要だ。けど、それにしたって限度がある」
1844 = "「在男性主導的社會，女性若希望自己的成果能夠得到認同，有時候也得拼一下。不過人的體力是有限度的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは……ちゃんと、無理しないよう、\nコントロールしてるつもりです」
2210 = "「這個嘛……我有在管理休息時間不讓自己太過勞累」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうかい？　なら、余計なお世話だったね」
1988 = "「是嗎？　那看來是我多管閒事了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、そんな――ありがとうございます」
1959 = "「才沒有呢，謝謝你」" 

# 【稀咲】
# display as 稀咲
# JP: 「お礼を言われることでもないさ」
1873 = "「小事嘛不值得一謝的」" 

# monologue
# JP: すっと、口調は元の温度に。\nそして視線も鋭さを戻し、再びペーパーに落とされる。
2812 = "稀咲變回了平時的語氣。視線也變得尖銳起來，她再次審視起文件。" 

# 【稀咲】
# display as 稀咲
# JP: 「この資金計画。人口推移を極めてゆるやかなものと\n想定しているけど、これは――」
2208 = "「這份資金預算，是在人口增長極為緩慢的預想下擬定的，也就是說——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ご想像の通り、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致が為されない――\nということを前提にした想定です」
2016 = "「是的，這是以\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠沒有落戶成功為前提擬定的計劃」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクの勤める銀行は、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を推進している立場だけれど？」
1935 = "「我所任職的銀行可是在推進\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶哦？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そのことはもちろん、知っています」
2213 = "「這我們當然也知道」" 

# monologue
# JP: 稀咲が書類から顔をあげ、\nポーレットのことをまっすぐに見る。
2805 = "稀咲抬起視線，直直盯著波萊特。" 

# monologue
# JP: ポーレットもまた、視線を逸らさず受け止める。
2717 = "波萊特也毫不迴避，與她對視。" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、日々姫ちゃんもあなたも。求めているのは、\n御一夜の持続的発展のための最善策だとも認識してます」
1668 = "「不過，我覺得日日姬和你追求的都是能讓御一夜持續發展的最佳策略」" 

# 【稀咲】
# display as 稀咲
# JP: 「マイントレジャー計画は、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に勝る\n持続発展のための手段になると？」
1716 = "「你的意思是，煤探樂園是勝過\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶的持續發展手段？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうかどうかを判断してもらうために、\n資料を、作成してきました」
2043 = "「正是為了讓稀咲小姐做出判斷，我才準備了這些資料」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん」
# 1827 = "「嗯」" 

# monologue
# JP: もう一度、稀咲は紙へと目を落とす。
2798 = "稀咲再一次仔細瀏覽起文件。" 

# monologue
# JP: そして三色ボールペンを取り、\n素早い手つきで次々と、ラインやメモを書き入れていく。
2551 = "她拿出三色原子筆，迅速在上面標出重點，時而寫下批註。" 

# 【稀咲】
# display as 稀咲
# JP: 「――うん」
1381 = "「——嗯」" 

# monologue
# JP: 三十分強。
2903 = "過了大約三十分鐘後。" 

# monologue
# JP: ものも言わずに資料確認をしてきた稀咲が、\nようやく、僕らへと視線を戻す。
2435 = "一直一言不發默默確認資料的稀咲，終於抬起頭來看向我們。" 

# 【稀咲】
# display as 稀咲
# JP: 「事業主体は、\n株式会社形式での第三セクターを考えている？」
1709 = "「你們準備以股份公司的形式設立一個第三部門來作為運營方嗎？」" 

# monologue
# JP: 第三セクター。公共と民間――市と企業とが、\n共同出資・共同運営をする事業形態だ。
2824 = "第三部門就是由公共與民間——政府與企業共同出資運營的事業體。" 

# monologue
# JP: 規模からいっても、理念からいっても、\nマイントレジャーにはまさに、最適だろう。
2756 = "無論是規模還是理念，都很適合煤探樂園這個點子。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。基本的には。ですので、\n隈元銀行さんにもご出資いただければと願っています」
1997 = "「是的。基本上就是這樣。所以我們希望隈元銀行也能出資」" 

# 【稀咲】
# display as 稀咲
# JP: 「他の出資者は、市と、御一夜鉄道、右田一酒造元、\nクマ川下りといったあたりになるのかな？」
1731 = "「其他出資者大概有市政府、御一夜鐵路、右田一釀酒廠還有隈河漂流吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「蓑笠鍛冶店さん、[はた]秦ボイラさんもご検討くださってます。\nそれと、個人では赤井宮司さん」
2149 = "「蓑笠鍛冶店和秦鍋爐店還在考慮中。還有赤井宮司會以個人名義出資」" 

# 【稀咲】
# display as 稀咲
# JP: 「赤井宮司？　あの人が」
2190 = "「赤井宮司？　他也要出資？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。他にも、[えいざんじ,2]榮山寺のご住職夫妻がそれぞれに、\nそれと、登呂流湯のご主人も――」
2011 = "「是的。還有榮山寺的主持夫妻都會參與，加上登呂流浴場的老闆娘——」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほど。少額からの受付で出資し易くすることにより、\n『私達のマイントレジャー』という意識を持ってもらう」
1760 = "「原來如此。接受小額出資能夠提高人們的參與度，並且讓大家認識到“這是我們共同的煤探樂園”」" 

# monologue
# JP: みなまで聞かず、第三セクター形式を選んだ理由の一つを、\n稀咲は見事に看破する。
2904 = "還沒等詳細解釋，稀咲就已經看穿了我們選擇以第三部門運營的理由之一。" 

# 【稀咲】
# display as 稀咲
# JP: 「その上で、公的支援もフル活用して余裕を持つ。\n『技術継承炭鉱』とは、面白い視点に気づいたね」
2126 = "「而且還可以徹底充分利用政府的支援。沒想到你們注意到了可以利用“技術繼承煤礦”，這真是個有趣的想法」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは、双鉄くんのアイディアなんです」
2215 = "「這是雙鐵君的主意」" 

# 【稀咲】
# display as 稀咲
# JP: 「双鉄の？」
2259 = "「雙鐵的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。炭鉱について、炭鉱史について。\n僕も、僕なりに勉強したのだ」
1826 = "「嗯。我也按照自己的方式學習了一些有關煤炭和煤炭開採的歷史知識」" 

# monologue
# JP: ……国内炭の需要は激減してしまい、\nけれど、埋蔵量は豊かであると確認されている。
1369 = "……雖然國內的煤炭需求量銳減，但是目前的儲藏量還很豐富。" 

# monologue
# JP: ゆえ、いつか石炭需要が復活したときに備え、採炭技術を\n無くさぬように、『技術継承炭鉱』がかつて存在していた。
2657 = "所以，為了防止將來有一天需要用到煤炭的時候採礦技術已經失傳，曾有過“技術繼承煤礦”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「北魁道は[くしろ,1]九代にあった技術継承炭鉱も、\nしかし、\x%lエアクラ;#00ffc040;エアクラ%l;#;の発展・普及によって、閉山された」
1750 = "「北海道釧路曾有過技術繼承煤礦，卻隨著\\x%lエアクラ;#00ffc040;空凝機%l;#;的發展和普及而關閉了」" 

# 【稀咲】
# display as 稀咲
# JP: 「だから、マイントレジャーにその役割をも負わせる。\nそうすれば国からの補助金も期待できるというわけだね」
1954 = "「所以你們要讓煤探樂園同時擔任起這一使命，如此一來還能期待一下國家撥發的補助金」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう。そして旧術仙炭鉱の現所有者は御一夜市であり、\n補助金制度はまだ生きている」
2048 = "「沒錯。而且現在舊術仙煤礦的所有者是御一夜市，補助金制度還存在著」" 

# monologue
# JP: この先のことは、僕では力が及ばなかった。\nだから、宮本さんの力を借りた。
2465 = "之後的事情就不是我力所能及的了。所以我請宮本女士幫了忙。" 

# monologue
# JP: 先代市長の右腕だったというだけはあり、あの人は、\n市役所職員全員に、一定以上の影響力を有しているから。
2540 = "她不愧為前任市長的左膀右臂，對所有市政府職員都有著不小的影響力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は市長秘書だ。御一夜市が受給可能かもしれない\n補助金については、当然、秘書の職務として調査した」
1940 = "「我是市長秘書。對於御一夜有希望領到的補助金，我完成秘書工作時已經調查過了」" 

# 【稀咲】
# display as 稀咲
# JP: 「職務として、ね。\nなるほど。その結果は？」
1743 = "「出於工作需要……嗎。原來如此。那結果呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「技術継承炭鉱の認定が取得可能である見込みは大きい。\nこれ程に状態のいい炭鉱は、もはや残っていないそうだ」
2135 = "「能得到技術繼承煤礦認定的可能性非常大。保存得這麼好的煤礦似乎已經沒有多少了」" 

# 【稀咲】
# display as 稀咲
# JP: 「なるほどね」
1761 = "「原來如此」" 

# monologue
# JP: 言って稀咲は目を閉じる。\n目を閉じたまま、静かに呟く。
2811 = "稀咲說完就閉上了眼睛。然後沒有睜眼，默默地說道。" 

# 【稀咲】
# display as 稀咲
# JP: 「個人としては、ボクも出資をしたいと思う。\n議会を通過し、市の出資が確定した後の話だけれど」
1876 = "「就我個人來說，我也想出資。不過得等到議會通過那天，確定市裡會出資以後」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
1856 = "「太好了！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます！」
2175 = "「謝謝你！」" 

# 【稀咲】
# display as 稀咲
# JP: 「いや――双鉄の言葉を借りるわけでもないけれど、\n謝辞をもらうには、まだ早すぎるよ」
1654 = "「不——雖然我不是刻意引用雙鐵剛才的話，但現在離祝賀還早了點」" 

# monologue
# JP: パシっと、ペンでペーパーを叩き、\n僕を見なおした稀咲の目つきは、鋭さを取り戻している。
2808 = "稀咲用筆敲著紙，睜開眼睛看向我，目光和平時一樣銳利。" 

# 【稀咲】
# display as 稀咲
# JP: 「この計画の成功には、隈元銀行の出資も必須となる。\nけれど、その判断は、支店長レベルでは出来ない」
1948 = "「我認為要想讓這個計劃成功，隈元銀行的出資是必不可少的。不過是否出資，僅憑我一個支行長無法做出判斷」" 

# 【ポーレット】
# display as 波萊特
# JP: 「なら、判断は。\n支店長レベルより上……ですから――」
1675 = "「也就是說必須要由支行長以上級別的領導者來判斷……也就是說——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「隈元銀行頭取――宝生元忠氏によるわけか」
2161 = "「要由隈元銀行行長——寶生元忠先生來判斷嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうだね。そして、“宝生元忠氏”は、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致自体を目的としているようだ」
1986 = "「是啊。而“寶生元忠先生”的目的，似乎正是\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶本身」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2274 = "「！」" 

# monologue
# JP: 工場誘致自体が目的。\n御一夜の発展を――ではなく。
2468 = "他的目的是讓工廠落戶，而不是御一夜的發展。" 

# monologue
# JP: 稀咲の言葉が真実ならば、\n隈銀の出資を取り付けることは、困難だろう。
2582 = "如果稀咲所言屬實，那恐怕讓隈元銀行出資是一件很困難的事情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが隈銀にとって、\n最大の利益を見込める計画だからか」
1838 = "「因為讓工廠落戶能為隈元銀行謀取最大利益嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「もちろん。隈元銀行は一私企業――\n営利企業であるのだから」
2214 = "「這是自然。隈元銀行是私企——盈利才是目的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「営利が目的である以上――方針転換もありますね？\n仮に、利益が見込めない状況に陥ってしまうなら」
1975 = "「既然是以盈利為目的，那有時也必須轉換方針吧？比如說，在目前方針沒有盈利可能的狀況下」" 

# 【稀咲】
# display as 稀咲
# JP: 「それもまぁ、当然のことだと思うね。\n損失を意図的に出せば背任だもの」
2244 = "「那是當然。若是有意讓企業蒙受虧損，那可就是瀆職之罪了」" 

# monologue
# JP: 途端、ほっとした顔になるポーレットと\nすました笑顔を浮かべる稀咲と。
2820 = "突然，波萊特鬆了一口氣，而稀咲則是面露微笑。" 

# monologue
# JP: ふたりはどうやら共通理解を得ているようだが――\n僕には今ひとつ飲み込めていない。
2543 = "她們倆之間似乎達成了某種共識——但我卻完全搞不清狀況。" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、どういう状況だ？\n確実に利益が見込めなくなるというのは」
2044 = "「比如說，在什麼情況下，才能讓工廠落戶計劃實實在在地看不到盈利希望？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「マイントレジャー議案が通過して、\n市が事業主体の一員になれば、それだけで」
1781 = "「只要煤探樂園的方案在市裡的議會上通過，市政府加入運營方就行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1797 = "「唔？」" 

# monologue
# JP: ふっ、と稀咲が鼻を鳴らす。
2814 = "稀咲輕笑一聲。" 

# 【稀咲】
# display as 稀咲
# JP: 「マイントレジャー計画の主体は双鉄じゃないのかい？\n川下りを、アトラクションのひとつとして――」
2078 = "「煤探樂園的方案不是主要由雙鐵策劃的嗎？把隈河漂流作為其中一個娛樂項目——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうか。\n河川使用の許可か！」
1802 = "「啊！　對啊。是河川的使用許可！」" 

# monologue
# JP: クマ川下りを行う範囲と、発船所着船所の用地利用は、\nクマ川下り株式会社が許可を得ている。
2922 = "隈河漂流允許的河段範圍，以及發船點、泊船場的用地使用權，都歸隈河漂流股份公司所有。" 

# monologue
# JP: が、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場立地を予定されている、\n周辺の河川敷の使用許可は、現状、誰も得ていない。
2479 = "但是，\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠的計劃用地——周邊河岸用地的使用權目前還沒有歸屬。" 

# 【ポーレット】
# display as 波萊特
# JP: 「川と河川敷の使用許可は、地方整備局が、原則、\n該当自治体の意見をもとに出すものですから――」
2056 = "「河段和河岸用地的歸屬，理論上會由地方建設局根據當地自治體的意見分配——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「市が事業主体となれば、少なくともクマ川くだり流域の\n河川敷の専有使用許可を得ることが出来る」
1779 = "「只要市政府成為煤探樂園的商業主體，至少肯定能獨占隈河漂流河段和河岸用地的使用許可」" 

# 【稀咲】
# display as 稀咲
# JP: 「専有は排他と同じ意味だからね。そうなれば他の誰も、\nクマ川くだり流域河川敷の用地利用をできなくなる」
2086 = "「獨占就意味著排他。這樣一來，其他人就無法使用隈河漂流流域的河岸用地了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまり――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を完全に阻止できるわけだな」
1673 = "「也就是說——可以完全阻止\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶」" 

# monologue
# JP: どんなに大きな事業であろうと、\n許認可一つ得られなければ、断念せざるを得なくなる――
2448 = "不管是多麼龐大的商業計劃，只要少了那一紙許可，也就不得不中止——" 

# monologue
# JP: 政治家秘書を務めていながら、\n政治がいかに大きな力か、まるで実感できてなかった。
2643 = "我明明是政治家的秘書，卻完全沒有認識到政治能發揮多麼大的力量。" 

# 【稀咲】
# display as 稀咲
# JP: 「ただ、動くなら急いだ方がいい。\n宝生元忠という人は、完全な実力主義だから」
1667 = "「不過，你們還是儘早行動為好。寶生元忠這人可是徹頭徹尾的實力主義者」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1797 = "「唔？」" 

# 【稀咲】
# display as 稀咲
# JP: 「工場誘致を進展させられない無能な支店長は解任し、\n自ら陣頭指揮を取るくらい、簡単にやるということさ」
1878 = "「就是說，他完全有可能解僱無法推進工廠落戶計劃的無能支行長，然後親自上陣指揮」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2274 = "「！」" 

# monologue
# JP: 勘違い、なのかもしれない。\nが、あるいは、ひょっとしたなら、宝生稀咲は――
2927 = "雖然可能是我的誤會。但我總覺得，寶生稀咲她說不定——" 

# monologue
# JP: 僕らの可能性を見極めるため、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の動きを、\n遅滞させてくれていたのではなかろうか。
2752 = "為了試探我們全部的可能性，故意讓\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶計劃延後了。" 

# 【稀咲】
# display as 稀咲
# JP: 「そして、無能な支店長とは違い。\n有能な頭取は、国政レベルに働きかけられる」
2131 = "「而與某個無能的支行長不同，優秀的行長，能從國家政策層面進行干涉」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ」
1800 = "「啊」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうだね。その理解で正しいよ。\n一度出した許認可は、さすがに覆せないだろうが――」
2049 = "「沒錯，正如你所想。雖然他無法撤回已經下發的許可——」" 

# monologue
# JP: ポーレットの顔が強張ったのを見届けて、\nなぜだかどこか満足そうに、稀咲は頷く。
2784 = "看到波萊特滿臉緊張，稀咲卻不知為何很滿意地點點頭。" 

# 【稀咲】
# display as 稀咲
# JP: 「“許認可については該当自治体の意見を聞く”という\n原則程度、いくらでも曲げられてしまうものらしいから」
1704 = "「但恐怕他能夠隨意操控“許可的頒發需要徵求當地自治體的意見”這一小小規定」" 

# 【女性議員】
# display as 女議員
# JP: 「では、そのキャストについては、\nどのように」
2249 = "「那麼，演員要從哪裡募集？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜市民を中心にした公募採用を検討しています」
1924 = "「我們正考慮以御一夜市民為中心，進行公開招聘」" 

# 【女性議員】
# display as 女議員
# JP: 「それはつまり、\n雇用促進につながるということになりますか」
1676 = "「也就是說能夠促進就業嗎」" 

# monologue
# JP: ……会期末まであと三日。
1370 = "……離議會結束還有三天。" 

# monologue
# JP: 議会工作に時間をかける余裕はほとんどなかったが、\n今のところは、ポーレットは良く答弁している。
2931 = "雖然我們幾乎沒有時間為議會工作做準備，但目前為止波萊特的答辯進行得很順利。" 

# monologue
# JP: （ヤジが無いのが大きいな――\nみな、計画の良し悪しを真剣に判断しようとしている）
2981 = "（還好沒有人故意來說些諷刺話，參加議會的人都在認真判斷計劃的好壞）" 

# monologue
# JP: ポーレットは、自身の政党を持っていない。\n雛衣前市長の支持者は、それぞれの政党に散っている。
2726 = "波萊特沒有自己的政黨。原本支持前雛衣市長的人都分散到了各個政黨裡。" 

# monologue
# JP: 今のポーレットを支えているのは、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致反対という、その一点での結束だけだ。
2768 = "現在支持波萊特的只有以反對\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶為目標的一派。" 

# 【女性議員】
# display as 女議員
# JP: 「\x%l客車;#00ffc040;客車%l;#;は、無償譲渡されるということですが、これは？」
1701 = "「似乎你們的\\x%l客車;#00ffc040;客運車廂%l;#;是由別人無償捐贈的，這是？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「廣島電気鉄道様が、マイントレジャー計画への\n全面的な賛同を示してくださっています」
1991 = "「是廣島電鐵公司對我們的煤探樂園計劃表示全面支持而贈送的」" 

# monologue
# JP: ……故に、マイントレジャー計画について、\n全面的な賛意を示すものは、今のところは極めて少ない。
1359 = "……所以，目前對煤探樂園計劃表示全面支持的人還很少。" 

# monologue
# JP: この女性議員と、その他に僅か数名のみ。\n残る議員たちは現状様子見、もしくは明確な反対だ。
2515 = "只有這位女性議員和其他少數幾位，其餘的議員不是在觀察風向就是明確反對。" 

# monologue
# JP: （とはいえ、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致賛成派も一枚岩ではない）
2952 = "（不過，\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶支持派也並沒有那麼團結）" 

# monologue
# JP: マイントレジャー計画が成立した方が、\n工場誘致成功時より、大きな利益を見込める者。
2693 = "比起工廠落戶，煤探樂園計劃成功後獲得的利益對有些人來講可能更大。" 

# monologue
# JP: そうした者は、工場誘致に無理やりしがみつきなどしない。\nゆえ、焦点は絞りこまれる。
2586 = "對於他們來講，沒有必要吊死在工廠落戶這一棵樹上。所以，我們應該爭取這些人。" 

# monologue
# JP: （味方議員との質疑応答で、どれだけ得点を稼げるか。\n反対議員の質問を、いかに失点なく切り抜けられるかだ）
2980 = "（這就要看我們和自己人的答辯能在這些人心裡加多少分，以及和反對派的答辯能少丟多少分了）" 

# monologue
# JP: ならばこれこそ、ある意味では、\n理想的に機能している議会であると言えるのかもしれない。
2770 = "現在這樣從某種意義上來說，也意味著議會在以理想方式運轉。" 

# monologue
# JP: 『計画の良し悪し』『その成功の見込み』のみがそのまま、\n議案の成否に繋がるのだから。
2526 = "因為我們的議案能否通過只取決於“計劃夠不夠好”和“成功的機率大不大”。" 

# 【女性議員】
# display as 女議員
# JP: 「なるほど、ご計画について理解させていただきました。\nありがとうございました」
1762 = "「原來如此，我對您的計劃已有所了解，謝謝您的回答」" 

# 【議長】
# display as 議長
# JP: 「これにて、斎藤議員の質問時間を終わります」
2273 = "「齋藤議員的提問時間到此結束」" 

# monologue
# JP: 議事進行は、滞らない。
2866 = "議事進行得十分順利。" 

# monologue
# JP: （宝生元忠の動きのことを、議長にも伝えてあるからな）
2963 = "（因為我們已經將寶生元忠的動向告訴了議長）" 

# monologue
# JP: 会期末までになんとしてでも採決に持ち込む――\nそうできなければ市議会が無意味化されてしまいかねない。
2530 = "在會期結束前，無論如何都要讓議案進入表決階段——不然市議會可能就會變得毫無意義。" 

# monologue
# JP: 誇り高く職務に忠実な議長は故に、\nただしく議会を、過不足無しに導いてくれている。
2525 = "因此這位盡忠盡職的議長，正有條不紊地推進著議會進程。" 

# 【議長】
# display as 議長
# JP: 「御一夜の未来を考える会。\n[にいつ,1]新津議員。質問をどうぞ」
1967 = "「接下來有請御一夜未來規劃會的新津議員提問」" 

# monologue
# JP: 議長の声に促され、\n痩躯の男が大股に演壇へと進み出る。
2880 = "議長話音剛落，一個身材纖細的男人大步走上講台。" 

# monologue
# JP: 新津議員――\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致賛成派の有力な議員の一人だ。
2673 = "新津議員——他是\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶支持派的精幹議員之一。" 

# 【中堅議員】
# display as 中堅議員
# JP: 「三セク形式を取ると言っていますが、結局のところ、\n利益が出た場合は御一夜鉄道にも入りますよね？」
1710 = "「你們說要採取第三部門的形式，也就是說要是最後產生了利益的話，御一夜鐵路也會獲得一部分吧？」" 

# monologue
# JP: 挨拶もせず切り出す言葉は、喧嘩腰。\nが、ポーレットは動揺を見せず受け止める。
2471 = "他連一聲招呼都不打就提問，而且明顯在找碴。但是波萊特毫不動搖回答道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。ご指摘のとおりです」
2047 = "「沒錯。正如您所說」" 

# 【中堅議員】
# display as 中堅議員
# JP: 「それは市政を利用して、\n私腹を肥やす行為なのではないですか？」
2207 = "「這不就是所謂的濫用職權中飽私囊嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「かかるご懸念の発生はごもっともだと思います。ので、\n本議案の成立時には同問題を解消することを約束します」
1914 = "「您關心的問題非常正確。因此我與您約定，本議案通過之時，即為此問題解決之日」" 

# 【中堅議員】
# display as 中堅議員
# JP: 「解消とは？」
1865 = "「如何解決？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「市長職を辞し、兼職を解消するということです」
1930 = "「我將辭去市長之位，不再兼任二職」" 

# monologue
# JP: ポーレットの爆弾発言に、\n議場がざわつく。揺れ動く。
2729 = "波萊特的發言如同投下了一顆炸彈，底下的議員們紛紛議論起來。" 

# 【中堅議員】
# display as 中堅議員
# JP: 「それは、順序が逆でしょう。\n営利のために公職を放棄するなどと」
2117 = "「竟然為了盈利而放棄公職，這難道不是本末倒置嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「交通のため、少なくとも御一夜において鉄道は必要です。\nその維持管理のため、現状、わたしの能力は不可欠です」
1907 = "「御一夜的交通需要鐵路，為了管理鐵路，目前我的能力是必不可少的」" 

# 【中堅議員】
# display as 中堅議員
# JP: 「なら、いますぐに辞職をすればいい。そんなハンパな\n覚悟の市長に、御一夜の舵取りは任せられない」
2237 = "「那您何不現在就辭去市長之位。我們無法將御一夜的未來交給一個搖擺不定的市長」" 

# 【ポーレット】
# display as 波萊特
# JP: 「今わたしが辞任することは、民意の放棄につながります。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対の一票への責任の放棄です」
2142 = "「若我現在辭職，就代表著背棄民意。背棄了我投\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶反對派一票的責任」" 

# monologue
# JP: けれど全く揺るぎはしない。\n新津議員も、ポーレットも。
2456 = "不過，不管是新津議員還是波萊特都絲毫沒有動搖。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですので、議案を成立させ、代替案を示すところまでが、\nわたしの、議員としての最低限の責任であると考えます」
1955 = "「所以，在議案透過或是提出代替方案之前我不能辭職，這是我作為議員最基本的責任」" 

# 【中堅議員】
# display as 中堅議員
# JP: 「工場誘致反対さえ成し遂げれば、\n後の政治的責任は放棄するとおっしゃるわけですか」
1912 = "「您的意思是說只要成功阻止了工廠落戶，就放棄之後的政治責任嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「市長選には、マイントレジャー計画推進を\n後継してくれる候補を立てます」
1944 = "「我會推薦能繼續推進煤探樂園計劃的候選人」" 

# 【女性議員】
# display as 女議員
# JP: 「民意は、それで問い直せるわね」
2041 = "「正好通過那樣獲取最新的民意」" 

# 【議長】
# display as 議長
# JP: 「不規則発言を禁止します」
2109 = "「禁止隨意發言」" 

# monologue
# JP: ヤジが、鋭く止められる。\nポーレットを妨害するものも、味方するものも区別無く。
2879 = "議長會及時制止干擾行為。不論那個人是支持還是反對波萊特。" 

# monologue
# JP: さらに引き締まる議場の空気を、\n新津議員とポーレットとの応酬だけが揺らし続ける。
2874 = "議會氣氛十分緊張，只見新津議員和波萊特繼續你來我往，激烈地唇槍舌戰著。" 

# 【中堅議員】
# display as 中堅議員
# JP: 「……ご答弁をありがとうございました」
1399 = "「……感謝您的解答」" 

# 【議長】
# display as 議長
# JP: 「以上にて、新津議員の質問時間を終わります。\n市民の党、関原議員。質問をどうぞ」
1970 = "「新津議員的提問時間到此結束。接下來有請市民黨關原議員上前提問」" 

# 【老議員】
# display as 老議員
# JP: 「[せきはら,1]関原です」
1942 = "「我是關原」" 

# monologue
# JP: 老議員が、ややよろよろと立ち上がる。
2429 = "一位年邁的議員有些顫顫巍巍地站起來。" 

# monologue
# JP: この人は、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致反対派の議員だが――\n今日は極めて厳しい視線を、ポーレットへと向けている。
2899 = "這位雖然是反對\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶的議員——但今天他卻以極其嚴厲的視線看向波萊特。" 

# 【老議員】
# display as 老議員
# JP: 「わしらね、市長。術仙炭鉱で昔働いていたとですよ」
1892 = "「市長啊，我們以前就在術仙煤礦工作」" 

# monologue
# JP: ……質問時間を、まるで気にしていないようだ。\n関原議員は淡々と、術仙炭鉱の歴史を語る。
1368 = "……關原議員彷彿毫不在意提問時間的限制，將術仙煤礦的歷史悠悠道來。" 

# monologue
# JP: そこにはひとつの町があり、\nいくつもの豊かな暮らしが送られていたと。
2666 = "據他所說，那裡曾經有一座小鎮，大家過得都十分富裕。" 

# 【老議員】
# display as 老議員
# JP: 「採炭ば、国の基幹産業の一つと言われておりましてな。\n[じゅつせん,1]術仙は、その中でも十指に入る、優良炭鉱だったとです」
2081 = "「煤礦在當時是國家的基礎產業之一。術仙煤礦在整個國家的煤礦中也是屈指可數的富礦」" 

# monologue
# JP: 発電所に最新設備。\nそうしたものが残る理由が、語られていく。
2665 = "接著他講述了那裡為何會有發電廠以及最新設備的理由。" 

# monologue
# JP: 僕らが想像していたよりも、\n術仙炭鉱は、はるかに豊かな[やま,1]鉱山だったのだ。
2782 = "看來術仙煤礦曾經比我們想像的還要富有。" 

# 【老議員】
# display as 老議員
# JP: 「石炭ば不要になるとは、誰も思うとらんかったとです。\n国もようさん、補助金ば送り込んでくれました」
2092 = "「當時誰都沒想到煤炭會有被捨棄的一天。國家也不停給我們送來補助金」" 

# 【ポーレット】
# display as 波萊特
# JP: 「…………」
1390 = "「…………」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1797 = "「唔？」" 

# monologue
# JP: 後ろから見ている僕しか、\n今は気づいていないだろうが――
2925 = "雖然只有站在波萊特後面的我才能看到——" 

# monologue
# JP: ポーレットの首筋に、\nびっしりと汗が浮き始めている。
2727 = "波萊特潔白的脖頸開始冒汗。" 

# monologue
# JP: （照明か？　空調に異常はないし……）
2973 = "（是照明造成的錯覺？　空調應該沒有故障才對……）" 

# 【老議員】
# display as 老議員
# JP: 「ばってん、石油に追われ、石炭は不要になったとです。\n国は補助金ば打ち切って、手のひら返しよったとですよ」
1787 = "「可是，後來有了石油，煤炭就被淘汰了。國家也停止了一下發補助金，翻臉不認人了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「術仙炭鉱の会計資料については、\nわたしも確認させていただいております」
2156 = "「術仙煤礦的帳目資料我也有確認過」" 

# monologue
# JP: ポーレットの声は冷静だ。\nそれがかえって、僕の不安を増大させる。
2731 = "波萊特的聲音十分冷靜。但這反而讓我越來越不安。" 

# 【老議員】
# display as 老議員
# JP: 「国から見捨てられたあとはもう、\n下り坂を転げるようなもんだったとです」
2139 = "「自從我們被國家拋棄以後，那可真是一落千丈」" 

# 【ポーレット】
# display as 波萊特
# JP: 「見捨て……られ、て」
2158 = "「被……拋……棄」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1797 = "「唔？」" 

# monologue
# JP: なにか、つぶやきでもしたのだろうか。\nかすかな声が聞こえたような気がしたのだが――
2719 = "波萊特似乎小聲嘟囔了一句什麼。我似乎聽到了一個微弱的聲音——" 

# monologue
# JP: 姿勢は、まるで変わっていないが、\n首筋からは、だらだらと汗がしたたり始める。
2929 = "雖然她依然姿勢挺拔端莊，但脖子上的汗卻開始大滴大滴地流下來。" 

# monologue
# JP: （ポーレットに心的不安があると……\nその可能性に、僕は思い当たっていたのに――）
2968 = "（我明明有猜想到，波萊特可能有著心靈創傷——）" 

# monologue
# JP: 後悔が喉にこみ上げてくる。\n――わかっていながら、僕には何もできなかった。
2432 = "一想到這裡，我就感到後悔不已。我明明心裡清楚，卻什麼都做不到。" 

# monologue
# JP: （肉体的にも無理をしてると――\n稀咲が、あれほどはっきり警告を発してくれていたのに）
2972 = "（明明稀咲都那麼清楚地警告過波萊特——哪怕是在體力上她也在透支著自己）" 

# monologue
# JP: いや――できなかったではなく、しなかった。\nわかっていながら、放置した。
2441 = "不——不是沒能做到，是沒去做。我明明心裡清楚，卻放著問題不管。" 

# monologue
# JP: 忙しかったことなど、無論、なんの言い訳にもならない。\n忙しさとは、ポーレットにかかる負担の大きさなのだから。
2627 = "忙並不能當藉口。因為我們越忙就意味著波萊特的壓力越大。" 

# 【老議員】
# display as 老議員
# JP: 「この計画ば、おもしろかもんと思います。\nが、補助金だよりな点がどうにも気になりますけん」
1946 = "「我覺得這個計劃很有意思。不過，需要依賴國家補助金這點，讓我很在意」" 

# 【ポーレット】
# display as 波萊特
# JP: 「頼って――なんて」
1958 = "「才沒有——依賴」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2275 = "「！？」" 

# monologue
# JP: 体の異変が、もう汗だけでは留まらなくなる。
2565 = "她的異常已經不止是出冷汗了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは――もし補助金がでなくても――\nその――採算、きちんと取れるように――」
1926 = "「我們的計劃——在沒有補助金的情況下——也能夠——維持盈利——」" 

# monologue
# JP: 膝から下に、あきらかに力がはいっていない。
2566 = "她的雙膝以下明顯失去了力氣。" 

# monologue
# JP: 足がガクガク震えているし、\nそれが、言葉にも影響している。
2587 = "小腿在顫抖，這也影響到了她的發言。" 

# monologue
# JP: （だが、どうすれば――）
2955 = "（但是，我應該怎麼做——）" 

# monologue
# JP: 僕が議場に乱入すれば、\nポーレットの答弁の妨害になる。
2579 = "如果我闖入議會，就會妨礙波萊特答辯。" 

# monologue
# JP: ポーレット自身が助けを求めてくれない限り――\n答弁が続く限りは、僕はポーレットを支えられない。
2517 = "只要波萊特不向我求助——只要答辯還在繼續，我就無法援助波萊特。" 

# 【老議員】
# display as 老議員
# JP: 「売上が想定より１０％下がるだけで赤字転落。\nこん見通しは、どうみても補助金だよりですとね」
1782 = "「只要營業額比預想的下降１０％就會虧損。這樣的情況怎麼看都只能依賴國家補助金吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大丈夫――大丈夫です。\n頼らなくても……一人でも――」
2050 = "「沒關係——沒關係的。就算不依賴補助金……我一個人也能——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットっ！」
2058 = "「波萊特！」" 

# monologue
# JP: 議場が、わずかにざわめきはじめる。\n目ざといものは、異変に気付き始めたのだろう。
2873 = "議會下面的人開始騷動起來，這代表已經有一部分人注意到了波萊特的異常。" 

# monologue
# JP: が、関原議員は気づいてないのか、気づいていてか、\n何も変わらず、淡々と自分の言葉を重ね続ける。
2482 = "但關原議員也不知是發現了還是沒發現，他依舊淡淡地陳述道。" 

# 【老議員】
# display as 老議員
# JP: 「こん施設の維持ば、難しかとですよ。\nいい時は、いつまでも続きやしませんけんねぇ」
2118 = "「維持這些設施可是很難的。誰也不知道什麼時候就不順咧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……あっ――」
1799 = "「啊……啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2274 = "「！」" 

# monologue
# JP: じわじわ、じわじわ。\nポーレットの足の震えが、他の部分へも広がり始める。
2732 = "波萊特的顫抖從小腿擴散到了身體其他部位。" 

# monologue
# JP: 普段から白いその顔色は、さらに血の気を失って、\n蒼白という領域にまで落ち込んでいる。
2547 = "她原本白皙的臉頰，因為失去血色而顯得煞白。" 

# 【双鉄】
# display as 雙鐵
# JP: 「無理なら中断！\n答弁の中断を要求するんだ、ポーレット！」
2159 = "「要是撐不住就中斷答辯！快要求中斷啊，波萊特！」" 

# monologue
# JP: 議場裏から、小さく抑えた声を送る。\n議場にまでは聞こえない声。
2639 = "我在會場後台，用會場裡聽不見的聲音提醒她。" 

# monologue
# JP: 聞こえているのは、ポーレットと議長、\nそれに速記者たちだけだろう、声。
2840 = "能聽到的應該只有波萊特和議長以及會議記錄員。" 

# 【ポーレット】
# display as 波萊特
# JP: 「無理じゃない、から――\nわたし……大丈夫――頑張れる、から」
1951 = "「我還能……行——我……沒事的，會努力的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2274 = "「！」" 

# monologue
# JP: ポーレットは、僕に答えてしまっている。\nが、関原議員はそれを答弁と受け止める。
2725 = "波萊特是在回答我。但關原議員卻以為這句話是對他的回答。" 

# 【老議員】
# display as 老議員
# JP: 「わしらとて――\n死に物狂いで、がんばりにがんばりましたがのう」
1925 = "「我們當時也是，拚了老命在努力啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「頑張れる――から、役に――立つから」
1943 = "「我會努力的——一定能派上用場的」" 

# 【老議員】
# display as 老議員
# JP: 「……言うても、仕方の無かことですの。\n周りがそうと思うてくれにゃあ、どうもならんけん」
1398 = "「……就算你這麼說，有些事情也是無能為力的。只要周圍環境一變，就無力回天咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「～っ！」
2277 = "「～！」" 

# monologue
# JP: 無理に気づいて。放置していた。\n一歩を踏み出す、過去を問いかける勇気がなかった。
2644 = "我明知她在硬撐，卻還置之不理。我沒有勇氣踏出那一步，去詢問她的過去。" 

# monologue
# JP: ――この状況にまでポーレットを追い込んでしまったのは、\n僕自身だと、思い知る。
2653 = "我認識到——將波萊特逼到現在這個地步的元兇正是我自己。" 

# monologue
# JP: （ならば――僕は――）
2983 = "（那麼，我——）" 

# 【老議員】
# display as 老議員
# JP: 「落ち込みはじめたもんはもう、そらぁ悲惨ですたい。\n誰も見向きもせんようになり、更には厄介者ばいわれて」
1650 = "「一旦走了下坡路，就十分悲慘咧。誰都不願意理會你，還會把你當成麻煩」" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっ――」
1655 = "「不要——」" 

# monologue
# JP: 凍えたような、それは悲鳴。\nポーレットの顔が、体は、もう完全にこわばっている。
2728 = "波萊特發出了一聲冰冷的嗚咽。她整個人都僵住了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！」
# 2058 = "「波萊特！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「――」
1380 = "「——」" 

# monologue
# JP: 崩れる、のではなく倒れこむ。
2554 = "她沒有跌坐原地，而是倒了下去。" 

# monologue
# JP: 斧で切られた木のように、足の力をまるで失くして、\nポーレットは一気に真横へとっ――
2590 = "就像被砍斷的樹一樣，雙腿失去了力氣，整個人往旁邊一歪——" 

# 【双鉄】
# display as 雙鐵
# JP: 「くうっ！」
1822 = "「嗚！」" 

# monologue
# JP: （どさっ！！）
2961 = "（嘭！！）" 

# 【老議員】
# display as 老議員
# JP: 「市長っ！？」
1896 = "「市長！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「～～～っ！！　――ぁっ！\n間に合った――間に合ってます――抱きとめた」
2281 = "「～～～！！　——啊！趕上了——不要緊，我接住她了」" 

# monologue
# JP: 両手で、しっかり受け止めている。\n頭も体も、どこにもぶつけてないはずだ。
2647 = "我用雙臂緊緊接住了摔倒的波萊特。她應該沒有撞傷。" 

# monologue
# JP: が――
2477 = "但是——" 

# monologue
# JP: （なんで、これほどに冷え切ってるんだ）
2965 = "（她的身體怎麼會這麼冰冷）" 

# monologue
# JP: 抱える僕の両手にまで染みこんでくる。
2637 = "我只是抱著她的手臂都感受到了冰冷。" 

# monologue
# JP: ポーレットの体はまるで氷のようで、\nなのにびっしり、冷汗の粒を貼り付けている。
2545 = "她全身冰涼，但皮膚上卻緊貼著一層冷汗的汗珠。" 

# 【議長】
# display as 議長
# JP: 「暫時休憩――いや、関原議員の質問時間は――\n終わりです」
2031 = "「暫時進入休息時間——不，關原議員的提問時間到此結束」" 

# 【老議員】
# display as 老議員
# JP: 「ああ」
# 1800 = "「啊」" 

# monologue
# JP: 脱力したような、心配そうな、小さな頷き。\nそれを見届け、議長はすっくと立ち上がる。
2909 = "關原議員就好像沒有了力氣一般，有些擔心地輕輕點頭。見他同意，議長馬上站了起來。" 

# 【議長】
# display as 議長
# JP: 「本日の議会は終了します。次回日程は\n明後日十三時から、引き続き本議案の審議を行います」
1693 = "「今天的議會就到此為止。下次議會時間定在後天十三點，屆時將繼續針對本議案進行討論」" 
