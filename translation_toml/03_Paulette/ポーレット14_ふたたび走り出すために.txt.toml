[script]
# lines: 387 
# 【日々姫】
# display as 日日姬
# JP: 「――信号、進行、よしっ！」
1141 = "「——Tín hiệu, tiến lên, tốt!」"
# 【ハチロク】
# display as 八六
# JP: 「すぐに上り勾配です。\n\x%l逆転機;#00ffc040;逆転機%l;#;を」
1459 = "「Sắp đến đoạn dốc lên rồi.\nKhởi động \\x%l逆転機;#00ffc040;cần đảo chiều%l;#;.」"
# 【日々姫】
# display as 日日姬
# JP: 「\x%l逆転機;#00ffc040;逆転機%l;#;――締切率30％」
1137 = "「\\x%l逆転機;#00ffc040;Cần đảo chiều%l;#;——tỷ lệ ngắt 30%.」"
# 【ハチロク】
# display as 八六
# JP: 「では足りません。38\%に。\n\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;の重量分、[ハチロク,3]8620には力が必要です」
1845 = "「Như vậy không đủ đâu. Tăng lên 38%.\nBù cho phần trọng lượng của \\x%lストーブ客車;#00ffc040;toa xe sưởi ấm%l;#;, 8620 cần nhiều sức mạnh hơn.」"
# 【日々姫】
# display as 日日姬
# JP: 「\x%l逆転機;#00ffc040;逆転機%l;#;――締切率……37――38％、よしっ！」
1136 = "「\\x%l逆転機;#00ffc040;Cần đảo chiều%l;#;——tỷ lệ ngắt……37——38%, tốt!」"
# monologue
# JP: （これ……は――）
2584 = "（Đây……là——）"
# monologue
# JP: 我が目を疑う――などと思っては失礼だが、\nそれでも、にわかには信じられない。
2420 = "Dù nghĩ rằng 'Mình không tin vào mắt mình nữa' thì hơi thất lễ,\nnhưng quả thực, tôi không thể tin nổi."
# 【凪】
# display as 凪
# JP: 「二十六っ！――二十七っ！――二十八っ！――\n二十九っ！」
1404 = "「Hai mươi sáu!——Hai mươi bảy!——Hai mươi tám!——\nHai mươi chín!」"
# 【ハチロク】
# display as 八六
# JP: 「凪さんもあげてください。\n二分あたりで、あと十杯ずつ」
1452 = "「Nagi cũng hãy tăng tốc độ lên.\nTrong khoảng hai phút, xúc thêm mười xẻng nữa.」"
# 【凪】
# display as 凪
# JP: 「了解ばいっ！」
1699 = "「Đã rõ nè!」"
# monologue
# JP: 声と同時に、\n凪のワンスコの動きがさらになめらかさを増す。
2481 = "Cùng lúc cất giọng,\nđộng tác xúc than của Nagi càng thêm mượt mà."
# monologue
# JP: 最小の動きで無駄なく石炭を散らす一掻きごとに、\n\x%l8620;#00ffc040;8620%l;#;の\x%l火床;#00ffc040;火床%l;#;には、新たな炎が燃え立ち踊る。
2344 = "Mỗi nhát xúc phân tán than không chút dư thừa với chuyển động nhỏ nhất,\n\\x%l火床;#00ffc040;buồng lửa%l;#; của \\x%l8620;#00ffc040;8620%l;#; lại bùng lên những ngọn lửa mới nhảy múa."
# monologue
# JP: （ポーーーーーーーーーっ！）
2577 = "（Uúúúúúúúúúúúú!）"
# monologue
# JP: 勝ち誇るように\x%l汽笛;#00ffc040;汽笛%l;#;が響く。\n\x%l8620;#00ffc040;8620%l;#;はなめらかに――上り勾配を乗り越えた。
90 = "\\x%l汽笛;#00ffc040;Còi hơi nước%l;#; vang lên như tự hào chiến thắng.\n\\x%l8620;#00ffc040;8620%l;#; mượt mà——vượt qua con dốc lên."
# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;の方に試乗をしているふかみと稀咲も、\nおそらくわずかな違和感さえも感じなかったことだろう。
2066 = "Cả Fukami và Kisaki đang đi thử trên \\x%l客車;#00ffc040;toa hành khách%l;#;,\ncó lẽ cũng không cảm thấy dù chỉ một chút khác thường nào."
# monologue
# JP: （見事だ――）
2578 = "（Thật tuyệt vời——）"
# monologue
# JP: もはや見習いレベルではない。\nこの短期間に、ふたりは大きく成長している。
2196 = "Đã không còn ở mức độ học việc nữa.\nChỉ trong một thời gian ngắn, hai người họ đã trưởng thành vượt bậc."
# monologue
# JP: ハチロクの迷い無い指示の下、\nチームワークが、ここに確かに成立している。
2169 = "Dưới sự chỉ đạo không chút do dự của Hachiroku,\nsự phối hợp nhóm đã thực sự được hình thành ở đây."
# monologue
# JP: （『双鉄様は監督役を――』と頼まれたときは、\nいったい何を言っているのかと思ったが……）
2567 = "（Lúc được nhờ 『Ngài Soutetsu hãy làm người giám sát——』,\ntôi còn tự hỏi em ấy đang nói cái gì cơ chứ……）"
# monologue
# JP: ギリギリまでは手も口も出さず見守るつもりが、\nその余地さえも、ほとんど見つけられなかった。
2281 = "Tôi định sẽ quan sát mà không nhúng tay hay xen miệng vào cho đến phút chót,\nnhưng hầu như tôi chẳng tìm thấy chỗ nào để xen vào cả."
# monologue
# JP: ならばこそ、明らかに見えてくる。\n監督役を僕に頼んで、ハチロクが示そうとしたものが。
2288 = "Chính vì vậy, tôi đã nhìn thấy rõ ràng.\nĐiều mà Hachiroku muốn cho tôi thấy khi nhờ tôi làm người giám sát."
# 【日々姫】
# display as 日日姬
# JP: 「新[つるは,1]弦羽廃駅、通過、良し！」
1683 = "「Ga phế liệu Tsuruha mới, đi qua, tốt!」"
# monologue
# JP: 言いながらもう日々姫の指は、そのすぼまりを強めてる。\nブレーキ圧を増し始めている。
2483 = "Vừa nói, những ngón tay của Hibiki đã siết chặt lại.\nBắt đầu tăng áp suất phanh."
# monologue
# JP: 僕にある感覚と比すれば早すぎる――が、それでいい。\n客車の分の重量増を日々姫は自ら、判断に加えたのだから。
2348 = "So với cảm giác của tôi thì quá sớm——nhưng, như vậy là tốt.\nVì Hibiki đã tự mình đưa phần trọng lượng tăng thêm của toa khách vào phán đoán."
# 【ハチロク】
# display as 八六
# JP: 「…………」
1151 = "「…………」"
# monologue
# JP: ハチロクはもう指示を出さない。\n凪のワンスコも動きを止めてる。
2106 = "Hachiroku không đưa ra chỉ thị nào nữa.\nChiếc xẻng xúc than của Nagi cũng dừng lại."
# monologue
# JP: 極めてスムーズな段階緩め――\n滑るようにして\x%l8620;#00ffc040;8620%l;#;は、湯医駅へと到着する。
83 = "Quá trình nhả phanh từng nấc cực kỳ mượt mà——\n\\x%l8620;#00ffc040;8620%l;#; như lướt đi, tiến vào ga Yui."
# 【日々姫】
# display as 日日姬
# JP: 「停止位置、確認――\x%l単弁;#00ffc040;単弁%l;#;、緩ブレーキ――良しっ！」
1789 = "「Xác nhận vị trí dừng——\\x%l単弁;#00ffc040;van hãm đơn%l;#;, phanh nhẹ——tốt!」"
# 【凪】
# display as 凪
# JP: 「お見事ばい！！」
1546 = "「Quá tuyệt vời nè!!」"
# 【日々姫】
# display as 日日姬
# JP: 「ううん、まだ」
1388 = "「Chưa, vẫn chưa xong đâu.」"
# monologue
# JP: 日々姫の言葉に、すぐさま凪が満面の笑顔を引き締める。
2448 = "Nghe Hibiki nói vậy, Nagi lập tức thu lại nụ cười rạng rỡ."
# 【凪】
# display as 凪
# JP: 「そうだったばい、今日は」
1593 = "「Đúng rồi nè, hôm nay.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。\x%l客車;#00ffc040;客車%l;#;を引いているんだから――\nここのじゃなく、お客さんたちの評価を聞かないと」
1590 = "「Ừ. Vì chúng ta đang kéo \\x%l客車;#00ffc040;toa hành khách%l;#; mà——\nPhải nghe đánh giá của hành khách chứ không phải ở đây.」"
# monologue
# JP: 日々姫と凪がハチロクを見る。\n“合格です”といわんばかりに、ハチロクは大きく頷く。
2311 = "Hibiki và Nagi nhìn Hachiroku.\nNhư muốn nói “Hai người đậu rồi”, Hachiroku gật đầu thật mạnh."
# 【ハチロク】
# display as 八六
# JP: 「こちらはわたくしが。おふたりは、\nふかみ様と稀咲様とのご評価を聞いてきてください」
1886 = "「Ở đây cứ để em lo. Hai người,\nhãy đi nghe đánh giá của chị Fukami và chị Kisaki đi ạ.」"
# 【日々姫】
# display as 日日姬
# JP: 「わかった！」
1563 = "「Đã rõ!」"
# 【凪】
# display as 凪
# JP: 「聞いてくるばーい！」
1839 = "「Tớ đi hỏi đây nè!」"
# monologue
# JP: よほど評価が気になるのだろう。\nまず凪が、そして日々姫がそわそわとキャブを降りていく。
2415 = "Chắc là họ quan tâm đến đánh giá lắm.\nĐầu tiên là Nagi, rồi đến Hibiki vội vã bước xuống khỏi buồng lái."
# monologue
# JP: その後姿を見送る小さな小さな運転ボディのハチロクが、\nなんとも大きく、頼もしいものと僕には見える。
2286 = "Nhìn theo bóng lưng họ, Hachiroku với thân hình lái tàu nhỏ bé,\ntrong mắt tôi lại trông thật to lớn và đáng tin cậy."
# 【双鉄】
# display as 雙鐵
# JP: 「見事なものだな」
1463 = "「Thật tuyệt vời.」"
# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\nお若いとはいえ、この短期間によくもここまで」
1713 = "「Vâng, đúng vậy ạ.\nDù còn trẻ, nhưng trong một thời gian ngắn mà đã đạt đến mức này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、ふたりも見事だが。\nより見事なのはハチロクだ」
1776 = "「Tất nhiên, hai người họ rất tuyệt.\nNhưng tuyệt vời hơn cả là em đấy, Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「え？」
1499 = "「Dạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それこそ、この短期間に――\nよくもふたりをあそこまで磨きあげたものだ」
1874 = "「Chính là việc, trong thời gian ngắn như vậy——\nem đã rèn giũa hai người họ đến mức đó.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ」
1506 = "「A.」"
# monologue
# JP: きょとんと固まっていた顔が、微笑に緩む。\n印象が、あどけないほどのものになる。
2107 = "Khuôn mặt đang ngơ ngác cứng đờ giãn ra thành một nụ cười.\nẤn tượng mang lại, trở nên ngây thơ đến lạ."
# 【ハチロク】
# display as 八六
# JP: 「そのことですか。でしたら、それは――\nわたくしだけの力ではございませんよ」
1468 = "「Về chuyện đó sao. Nếu vậy, đó——\nkhông phải là sức mạnh của riêng em đâu ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、彼女らの努力は極めて大きかろう」
1775 = "「Tất nhiên, nỗ lực của các em ấy là rất lớn.」"
# 【ハチロク】
# display as 八六
# JP: 「それも当然、ございます。\nですがもう一つ――双鉄様のお力が」
1864 = "「Điều đó là tất nhiên rồi ạ.\nNhưng còn một điều nữa——đó là nhờ sức mạnh của ngài Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕？」
1657 = "「Anh á?」"
# monologue
# JP: 意表をつかれ、聞き返す。\n僕など、なにもしていない。
2283 = "Bị bất ngờ, tôi hỏi lại.\nTôi nào có làm gì đâu."
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の\x%l運転台;#00ffc040;運転台%l;#;にあがるのすらも、\nひさびさのことと感じてたほどなのに。
2525 = "Ngay cả việc bước lên \\x%l運転台;#00ffc040;buồng lái%l;#; của \\x%l8620;#00ffc040;8620%l;#;,\ntôi cũng cảm thấy đã lâu lắm rồi mới làm cơ mà."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の力もなにも――」
1622 = "「Sức mạnh của anh thì có gì——」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、\nお名前のとおりの力を有しておられます」
1879 = "「Ngài Soutetsu,\nngài sở hữu sức mạnh đúng như tên gọi của mình.」"
# 【双鉄】
# display as 雙鐵
# JP: 「名前……」
1484 = "「Tên……」"
# monologue
# JP: 言われて、ふっと思い出す。\nそういえばハチロクは、出会ってまだ間もない頃に――
2466 = "Nghe em ấy nói vậy, tôi chợt nhớ ra.\nNhắc mới nhớ, Hachiroku, vào lúc chúng tôi mới gặp nhau chưa được bao lâu——"
# monologue
# JP: 日々姫の名を響きであると、真闇姉の名を\x%l枕木;#00ffc040;枕木%l;#;だと。\nそうして、僕の名のことを――
2323 = "Đã nói tên của Hibiki là âm thanh vang vọng, tên của chị Mayami là \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#;.\nVà rồi, về tên của tôi thì——"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、レールなのです。\n行くべき先を、まっすぐにお示しくださいます」
1880 = "「Ngài Soutetsu, ngài là đường ray.\nNgài đã chỉ ra hướng đi đúng đắn một cách thẳng tắp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は……レールか」
1644 = "「Anh là……đường ray sao.」"
# 【ハチロク】
# display as 八六
# JP: 「マイントレジャー計画を。御一夜が、わたくしたちが、\n目指す未来を。双鉄様がまっすぐにお示し下さったから」
1878 = "「Kế hoạch Mine Treasure. Tương lai mà Ohimitera, mà chúng ta\nđang hướng tới. Ngài Soutetsu đã vạch ra con đường thẳng tắp đó.」"
# monologue
# JP: （そっ）
2581 = "（Chạm）"
# monologue
# JP: ――ハチロクの手が、人形サイズの小さな手が、\n僕の右手に触れてくる。
1122 = "——Bàn tay của Hachiroku, bàn tay nhỏ bé cỡ búp bê,\nchạm vào tay phải của tôi."
# monologue
# JP: 包み込めるほどの大きさは無く、\n触れ、挟まれているだけなのに――ひどく暖かで心地よい。
2209 = "Dù không đủ lớn để bao bọc,\nchỉ là chạm và kẹp lấy thôi——nhưng lại vô cùng ấm áp và dễ chịu."
# 【ハチロク】
# display as 八六
# JP: 「だから――迷わず進めたのです。\n日々姫も、凪も……わたくしも」
1659 = "「Chính vì thế——chúng em mới có thể tiến bước mà không do dự.\nCả Hibiki, cả Nagi……và cả em nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1717 = "「Vậy sao.」"
# monologue
# JP: 僕はただ、自分自身の目的を果たそうとしただけだった。
2273 = "Anh chỉ đơn thuần là cố gắng hoàn thành mục đích của bản thân thôi."
# monologue
# JP: 最初は、御一夜の町と環境とを守るため。\nその上に、ハチロクを再び走らせることが加わって――
2135 = "Ban đầu, là để bảo vệ thị trấn Ohimitera và môi trường.\nThêm vào đó là việc muốn để Hachiroku được chạy một lần nữa——"
# 【双鉄】
# display as 雙鐵
# JP: 「その都度必死で、目の前のことに向き合っていただけだ。\nあるいは僕が一番、先を見通せてなかったのかもしれん」
1628 = "「Mỗi lần như vậy, anh chỉ liều mạng đối mặt với những thứ trước mắt thôi.\nCó lẽ anh mới là người không nhìn thấu được tương lai nhất cũng nên.」"
# 【ハチロク】
# display as 八六
# JP: 「――双鉄様」
1143 = "「——Ngài Soutetsu.」"
# monologue
# JP: （きゅっ）
2580 = "（Nắm chặt）"
# monologue
# JP: ハチロクの手に、力がこもる。\n瞳が、僕から外れなくなる。
2110 = "Bàn tay Hachiroku truyền thêm sức lực.\nÁnh mắt em ấy không rời khỏi tôi."
# monologue
# JP: 口が開いて――そのまま数秒。\nやがて、噛みしめるような声が聴こえる。
2202 = "Mở miệng——cứ thế trong vài giây.\nCuối cùng, tôi nghe thấy một giọng nói như đang kìm nén."
# 【ハチロク】
# display as 八六
# JP: 「わたくしと、[ハチロク,3]8620とは、もう、走れます」
1630 = "「Em và 8620, đã có thể, chạy được rồi.」"
# monologue
# JP: （ああ……）
2575 = "（A……）"
# monologue
# JP: やはり、そうなのかと思う。\n僕にただ、見ることだけを要求したのは――
2337 = "Quả nhiên, tôi nghĩ là vậy.\nLý do em ấy chỉ yêu cầu tôi đứng nhìn là——"
# monologue
# JP: 僕が外れたチームでも、きちんと走れる、\nその姿を見せてくれるためだったのかと。
2200 = "Để cho tôi thấy rằng, dù là một đội không có tôi,\nhọ vẫn có thể chạy đàng hoàng."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、責任を果たせたのか」
1617 = "「Anh, đã hoàn thành trách nhiệm rồi sao.」"
# 【ハチロク】
# display as 八六
# JP: 「っ、くっ――」
1513 = "「Ư, hự——」"
# monologue
# JP: ハチロクが息を呑み込んで、\n押しつぶされたような声があふれる。
2112 = "Hachiroku nuốt một ngụm khí,\nmột giọng nói như bị đè nén vang lên."
# monologue
# JP: その目は床へとふらふら落ちて。\n僕の右手を挟む力が――、一瞬、ゆるむ。
2195 = "Ánh mắt em ấy lảo đảo rơi xuống sàn nhà.\nLực kẹp tay phải của tôi——, trong thoáng chốc, nới lỏng."
# 【ハチロク】
# display as 八六
# JP: 「それは――左様かと思います。が――\n\x%l8620;#00ffc040;8620%l;#;もわたくしも、マスター無しでは、不安です」
1642 = "「Điều đó——em nghĩ là đúng ạ. Nhưng——\ncả \\x%l8620;#00ffc040;8620%l;#; và em, nếu không có Master, sẽ bất an lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、なら」
1718 = "「Vậy sao, nếu thế thì.」"
# 【ハチロク】
# display as 八六
# JP: 「ですが！　今ひとときのことならば。\n\x%l客車;#00ffc040;客車%l;#;試験の、間、くらいは……」
1428 = "「Nhưng mà! Nếu chỉ là một khoảng thời gian ngắn.\nÍt nhất là trong lúc, thử nghiệm \\x%l客車;#00ffc040;toa hành khách%l;#;……」"
# monologue
# JP: ぐっと、ハチロクが顔を持ち上げる。
2116 = "Hachiroku ngẩng phắt mặt lên."
# monologue
# JP: 僕を見つめて、\n少しぎくしゃくした笑顔を浮かべる。
2211 = "Nhìn chằm chằm vào tôi,\nnở một nụ cười có chút gượng gạo."
# 【ハチロク】
# display as 八六
# JP: 「頑張れます。双鉄様がいてくださらなくても、走れます。\nですので、どうか――」
1646 = "「Em có thể cố gắng. Dù không có ngài Soutetsu ở bên, em vẫn có thể chạy.\nVì vậy, xin ngài——」"
# monologue
# JP: ハチロクの手がスっと離れる。\nふかぶかと――小さな頭が下げられる。
2117 = "Tay Hachiroku nhẹ nhàng buông ra.\nCái đầu nhỏ bé——cúi gập xuống thật sâu."
# 【ハチロク】
# display as 八六
# JP: 「れいなを、わたくしの妹分をよろしくお願いいたします。\nあの子も、どうか――もう一度、不安なく走れるように」
1770 = "「Xin ngài hãy giúp đỡ Reina, cô em gái của em.\nXin ngài——hãy để đứa trẻ đó, một lần nữa được chạy mà không phải bất an.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1522 = "「Ừ.」"
# monologue
# JP: れいなの件で、僕に出来ることなどおそらくほとんど無い。
2176 = "Về chuyện của Reina, những việc tôi có thể làm có lẽ hầu như không có."
# monologue
# JP: が、僕がレールだというのなら、\nいつもどおりであることが、きっと最善の在り方だろう。
2058 = "Nhưng, nếu nói tôi là đường ray,\nthì việc cứ cư xử như bình thường, chắc chắn sẽ là cách tốt nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「れいなを支えるポーレットを、僕は支えようと思う。\nきっとそれが、一番良い結果につながるはずだ」
1739 = "「Anh định sẽ hỗ trợ Paulette, người đang hỗ trợ Reina.\nChắc chắn điều đó, sẽ dẫn đến kết quả tốt nhất.」"
# monologue
# JP: ハチロクの顔がやわらぐ。
2114 = "Khuôn mặt Hachiroku dịu lại."
# monologue
# JP: 怯えたような強張りが消えてしまえば、\n残るのは――とても自然な、優しい笑顔だ。
2215 = "Khi sự căng thẳng như sợ hãi biến mất,\nnhững gì còn lại——là một nụ cười hiền hậu, vô cùng tự nhiên."
# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄様の信じるままになさるのが、\n一番良いと――このハチロクも信じます」
1517 = "「Vâng. Cứ làm theo những gì ngài Soutetsu tin tưởng,\nlà điều tốt nhất——Hachiroku em cũng tin như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1522 = "「嗯」" 
# monologue
# JP: 髪を撫でる。\n子犬の頭に、そうするように。
2280 = "Tôi vuốt tóc em ấy.\nNhư cách vuốt ve đầu một chú cún con."
# monologue
# JP: 僕にまっすぐ向けてもらえる信頼に、\n必ず答える、誓いのつもりで。
2285 = "Để đáp lại sự tin tưởng hướng thẳng về phía tôi,\nnhư một lời thề, nhất định sẽ đền đáp."
# 【双鉄】
# display as 雙鐵
# JP: 「ベストを尽くす。\n君たちが再び、心置きなく走り出せるようにも」
1647 = "「Anh sẽ cố gắng hết sức.\nĐể các em có thể một lần nữa, chạy đi mà không chút vướng bận.」"
# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1522 = "「嗯」" 
# monologue
# JP: （ゴンっ、ゴンっ）
2569 = "（Cộc, cộc）"
# 【ハチロク】
# display as 八六
# JP: 「っ！！？」
1890 = "「!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？」
1614 = "「Gì vậy?」"
# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の側面を、何かで叩いたような音。\n確かめるためキャブ横窓から下を覗けば――
2449 = "Âm thanh như thể có thứ gì đó đập vào sườn \\x%l8620;#00ffc040;8620%l;#;.\nĐể kiểm tra, tôi nhìn xuống từ cửa sổ bên hông buồng lái thì——"
# 【稀咲】
# display as 稀咲
# JP: 「今、少しだけいいかな。双鉄」
1480 = "「Bây giờ, cho tôi xin chút thời gian được không. Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ君か――宝生稀咲」
1409 = "「Gì chứ, là cô à——Houshou Kisaki.」"
# 【稀咲】
# display as 稀咲
# JP: 「なんだとは随分なごあいさつだね。\n上がらせてもらって平気かな？」
1433 = "「Gì chứ là sao, cậu chào hỏi kiểu gì vậy.\nTôi lên đó có được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「キャブにか？　無論、構わんが」
1383 = "「Lên buồng lái á? Tất nhiên là không sao.」"
# 【ハチロク】
# display as 八六
# JP: 「ああ、双鉄様、わたくし――\n[はいばこ,1]灰箱のお掃除をしてまいります」
1512 = "「A, ngài Soutetsu, em——\nsẽ đi dọn dẹp hộp tro đây ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1501 = "「Hửm?」"
# monologue
# JP: 止める間もなく、ハチロクは整備ボディに換装し、\nキャブをすたすた下りていってしまう。
2530 = "Chưa kịp ngăn lại, Hachiroku đã thay sang thân chính bảo dưỡng,\nvà thoăn thoắt bước xuống khỏi buồng lái."
# 【稀咲】
# display as 稀咲
# JP: 「相変わらず気の利く子だね、彼女は」
1554 = "「Cô bé đó, vẫn tinh ý như ngày nào nhỉ.」"
# monologue
# JP: 入れ替わるように入ってきた稀咲の一言に、\nそういうことか、と理解する。
2447 = "Nghe câu nói của Kisaki khi cô ấy bước vào thế chỗ Hachiroku,\ntôi mới hiểu ra vấn đề."
# monologue
# JP: 会いにいったはずの日々姫を\x%l客車;#00ffc040;客車%l;#;に残し、\nわざわざ一人で、キャブにまで来たということは――
2205 = "Việc cô ấy để Hibiki, người đáng lẽ phải đi gặp, lại \\x%l客車;#00ffc040;toa hành khách%l;#;,\nvà cất công đến tận buồng lái một mình thế này thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「なにか、内密の話があるのか」
1729 = "「Có chuyện gì bí mật cần nói sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。動揺を招きかねない――けど、\nキミたちが知っておかねば危ういという話が、一つ」
1521 = "「Ừ. Một chuyện có thể gây xáo trộn——nhưng,\nnếu các cậu không biết thì sẽ rất nguy hiểm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「元忠氏がらみか？」
1488 = "「Liên quan đến ông Mototada sao?」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクの警告を気にしてくれていたようだね。\n嬉しいよ」
1778 = "「Có vẻ cậu vẫn để tâm đến lời cảnh báo của tôi nhỉ.\nVui thật đấy.」"
# monologue
# JP: 嬉しいと言葉では言いつつも、\n稀咲の顔は、厳しく締まる。
2541 = "Dù miệng nói là vui,\nnhưng khuôn mặt Kisaki lại căng lại nghiêm nghị."
# 【稀咲】
# display as 稀咲
# JP: 「父は、マイントレジャー計画に一定の評価を与えている。\nが、それでも\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の方が勝ると判断してる」
1756 = "「Cha tôi cũng đánh giá nhất định về kế hoạch Mine Treasure.\nNhưng, ông ấy vẫn cho rằng việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; sẽ tốt hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……元忠氏の立場からすれば、そうだろうな」
1154 = "「……Đứng trên lập trường của ông Mototada thì, đúng là vậy nhỉ.」"
# monologue
# JP: １０年、２０年という目先の期間のみの――\n経済面での安定性だけ考えるのなら、それは当然の判断だ。
2223 = "Nếu chỉ nghĩ đến sự ổn định kinh tế——\ntrong khoảng thời gian trước mắt là 10 năm, 20 năm, thì đó là phán đoán đương nhiên."
# 【双鉄】
# display as 雙鐵
# JP: 「環境負荷のことと将来的なこととを考えないのなら。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致は確かに、優れた再生計画だから」
1564 = "「Nếu không nghĩ đến gánh nặng môi trường và những chuyện trong tương lai.\nThì việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; quả thực là một kế hoạch tái thiết xuất sắc.」"
# monologue
# JP: マイントレジャー計画に関する勉強を\n重ねれば重ねるほどに、それもはっきり見えてきた。
2174 = "Càng tìm hiểu sâu về kế hoạch Mine Treasure,\nđiều đó lại càng trở nên rõ ràng hơn."
# monologue
# JP: だから素直に認めれば、稀咲は――\nどういう気持ちだろうか。軽く肩を竦めてみせる。
2425 = "Nên khi tôi thành thật thừa nhận, Kisaki——\nkhông biết đang có cảm xúc gì. Cô ấy khẽ nhún vai."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし議会は、マイントレジャーの方が御一夜の未来を\n託すのによりふさわしい計画だと――既に判断している」
1422 = "「Nhưng hội đồng thành phố đã phán quyết rằng——kế hoạch Mine Treasure\nphù hợp để gửi gắm tương lai của Ohimitera hơn.」"
# monologue
# JP: 議決後すぐに、僕らも、組織としての市も動いた。
2486 = "Ngay sau khi nghị quyết được thông qua, cả chúng tôi và thành phố với tư cách là một tổ chức đều đã hành động."
# monologue
# JP: 経営の受け皿となる第三セクターの設立準備も進み、\n河川敷利用の専有許可も、取得した。
2437 = "Công tác chuẩn bị thành lập bộ phận thứ ba làm cơ quan tiếp nhận kinh doanh cũng đang tiến triển,\nvà giấy phép sử dụng độc quyền bãi bồi ven sông cũng đã có."
# 【双鉄】
# display as 雙鐵
# JP: 「すでに事態は、行政レベルで動いているのだ。\nこれを今から覆すのは、いかに元忠氏でも苦しかろう」
1397 = "「Mọi chuyện đã được tiến hành ở cấp độ hành chính rồi.\nBây giờ muốn lật ngược tình thế, dù là ông Mototada thì cũng khó khăn thôi.」"
# 【稀咲】
# display as 稀咲
# JP: 「だね、父もそう判断した。\nだから、覆そうとはしてない」
1715 = "「Đúng vậy, cha tôi cũng phán đoán như thế.\nNên ông ấy không định lật ngược đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1411 = "「Hửm?」"
# 【稀咲】
# display as 稀咲
# JP: 「一度は立たせて、そのあと潰す。\n――父はそれを、短期決戦で行うハラだ」
1447 = "「Cho các cậu xây lên một lần, rồi sau đó nghiền nát.\n——Cha tôi định làm việc đó bằng một trận quyết chiến chớp nhoáng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「短期決戦……とは？」
1844 = "「Quyết chiến chớp nhoáng……là sao?」"
# monologue
# JP: 聞けば途端に、\nきょろ、と稀咲の瞳が動く。
2446 = "Vừa nghe hỏi,\nánh mắt Kisaki đảo quanh."
# 【稀咲】
# display as 稀咲
# JP: 「ここからが、聞かれてはマズイ話の中心なんだ」
1678 = "「Từ đây trở đi, mới là trọng tâm của câu chuyện không được để ai nghe thấy này.」"
# monologue
# JP: そして、体が寄ってくる。
2388 = "Và rồi, cô ấy nhích người lại gần."
# 【稀咲】
# display as 稀咲
# JP: 「すまない双鉄。耳を借りるよ――」
1675 = "「Xin lỗi nhé Soutetsu. Cho tôi mượn tai cậu một chút——」"
# 【ポーレット】
# display as 波萊特
# JP: 「大臣視察、ですか？」
1539 = "「Bộ trưởng thị sát, sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。[けいさん,1]経産大臣と[もんか,1]文科大臣」
1592 = "「Ừ. Bộ trưởng Bộ Kinh tế, Thương mại và Công nghiệp cùng Bộ trưởng Bộ Giáo dục, Văn hóa, Thể thao, Khoa học và Công nghệ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「資源エネルギー庁と文化庁とをそれぞれ所轄する大臣\n……ですよね」
1454 = "「Là các bộ trưởng lần lượt quản lý Cơ quan Tài nguyên - Năng lượng và Cục Văn hóa\n……đúng không ạ.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ」
# 1522 = "「嗯」" 
# monologue
# JP: 怪訝そうなポーレットの言葉はけれど、\n赤井宮司のうなずきを呼ぶ。
2376 = "Lời nói đầy vẻ nghi ngờ của Paulette,\nlại nhận được cái gật đầu từ đền chủ Akai."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「なるほど――つまりは技術継承炭鉱の認定と、\n文化財認定とに、それぞれ権限を持っている方々ですか」
1466 = "「Ra là vậy——nói cách khác, đó là những người có thẩm quyền\ntrong việc công nhận mỏ than kế thừa kỹ thuật và công nhận tài sản văn hóa sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい。そうなります。\nその方々が、御一夜への視察を予定しておられると」
1723 = "「Vâng. Đúng là vậy.\nNhững vị đó, dự định sẽ đến thị sát Ohimitera.」"
# 【ポーレット】
# display as 波萊特
# JP: 「予定？　予定って――」
1815 = "「Dự định? Dự định là——」"
# monologue
# JP: ポーレットはまだ訝しげに首を傾げている。\nあまりにあまりな話だから、理解が及んでいないのか――
2375 = "Paulette vẫn nghiêng đầu với vẻ nghi ngờ.\nCó lẽ vì câu chuyện quá đỗi bất ngờ, nên cô ấy chưa kịp hiểu chăng——"
# monologue
# JP: そうでなければ、あまりにあまりな話過ぎ、\n半ば無意識に、理解を拒んでいるのかもしれん。
2052 = "Nếu không phải vậy, thì vì câu chuyện quá đỗi bất ngờ,\nnên một nửa trong vô thức, cô ấy đang từ chối hiểu nó."
# 【双鉄】
# display as 雙鐵
# JP: 「予定は、予定だ。来月十日にお二方揃って、\n御一夜への視察を“予定”しておられるそうだ」
1814 = "「Dự định là, dự định đó. Nghe nói hai vị đó cùng nhau “dự định”\nsẽ đến thị sát Ohimitera vào mùng 10 tháng sau.」"
# 【ポーレット】
# display as 波萊特
# JP: 「予定って！」
1412 = "「Dự định á!」"
# monologue
# JP: ポーレットの声音と顔色が一気に変わる。
2379 = "Giọng nói và sắc mặt của Paulette thay đổi ngay lập tức."
# 【ポーレット】
# display as 波萊特
# JP: 「だって、そんな――急すぎませんか！？\n来月の十日とか、いくらなんでも」
1482 = "「Nhưng mà, như thế——chẳng phải là quá gấp sao!?\nMùng 10 tháng sau thì, dù có thế nào đi nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いくらなんでも急すぎ、準備が間に合わん。\nそれこそが、[ほうしょうもとただ,3]宝生元忠の狙いなわけだ」
1581 = "「Dù thế nào cũng quá gấp, không kịp chuẩn bị.\nĐó chính là, mục đích của Houshou Mototada.」"
# 【ポーレット】
# display as 波萊特
# JP: 「宝生さん――の――」
1582 = "「Của ông Houshou——sao——」"
# monologue
# JP: 困り切ってしまったように、\n表情を固くし、ポーレットが黙りこくってしまう。
2382 = "Như thể đã hoàn toàn bối rối,\nkhuôn mặt Paulette cứng đờ, cô ấy chìm vào im lặng."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「えげつなかとねぇ」
1780 = "「Độc ác thật đấy nhỉ.」"
# monologue
# JP: その沈黙に響くのは、\n“忌々しい”といわんばかりの呟きだ。
2409 = "Vang lên trong sự im lặng đó,\nlà một tiếng lẩm bẩm như muốn nói “Đáng nguyền rủa”."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「マイントレジャー計画ば潰そういうこつかね」
1418 = "「Ý là muốn nghiền nát kế hoạch Mine Treasure đó hả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ですね。視察でどうしようもないと判断されれば、\n下りるはずの認可も下りなくなる」
1721 = "「Đúng vậy. Nếu sau khi thị sát mà họ đánh giá là không còn cách nào cứu vãn,\nthì sự công nhận đáng lẽ được thông qua cũng sẽ bị hủy bỏ.」"
# monologue
# JP: 術仙炭鉱の技術継承炭鉱の認可。\n赤井阿蘇神社の文化財指定。
2462 = "Công nhận mỏ than Jutsusen là mỏ than kế thừa kỹ thuật.\nChỉ định đền Akai Aso là tài sản văn hóa."
# monologue
# JP: ――前者が得られなければ採算が極めて厳しくなるし、\n後者が得られなければ、観光客増への決め手を失う。
1124 = "——Nếu không đạt được cái trước, bài toán lợi nhuận sẽ trở nên cực kỳ khó khăn,\ncòn nếu không đạt được cái sau, chúng ta sẽ mất đi đòn quyết định để tăng lượng khách du lịch."
# 【双鉄】
# display as 雙鐵
# JP: 「そうなってしまえば、収支計画に暗雲が立ち込め――\n出資をためらうものが出てきてしまうかもしれません」
1569 = "「Nếu chuyện đó xảy ra, mây đen sẽ bao phủ kế hoạch thu chi——\ncó thể sẽ xuất hiện những người do dự trong việc đầu tư.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「確かな話ならば至急の対策が必要となりましょうが……\nその情報の出処は？」
1439 = "「Nếu là thông tin chính xác thì chúng ta cần phải có biện pháp đối phó khẩn cấp……\nnhưng nguồn gốc của thông tin đó là từ đâu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「宝生稀咲――隈元銀行御一夜支店長です」
1584 = "「Houshou Kisaki——Giám đốc chi nhánh Ohimitera của ngân hàng Kumamoto.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「宝生さんのお嬢さんですか？」
1583 = "「Là con gái của ông Houshou sao?」"
# monologue
# JP: 赤井宮司が見せた驚きの表情に、\nそうであったかと思い出す。
2417 = "Nhìn biểu cảm kinh ngạc của đền chủ Akai,\ntôi mới sực nhớ ra."
# monologue
# JP: 初対面時の、ぐったりと疲れきっていた赤井宮司は――\n稀咲による工場誘致派への勧誘に辟易していたのだったか。
2436 = "Lần đầu gặp mặt, đền chủ Akai trông có vẻ mệt mỏi rã rời——\nlà do bị Kisaki chèo kéo tham gia phe ủng hộ thu hút nhà máy nên mới phát ngán nhỉ."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲は、日々姫の学園での先輩でもあるのです。\nそれで――」
1797 = "「Kisaki cũng là tiền bối của Hibiki ở trường học.\nVì vậy——」"
# monologue
# JP: いままでの経緯をざっと話せば、\n赤井宮司は納得したように頷いてくれる。
2277 = "Tôi kể tóm tắt lại diễn biến sự việc từ trước đến nay,\nđền chủ Akai gật đầu như đã hiểu."
# monologue
# JP: が、ポーレットの顔はいまだ硬い。
2083 = "Nhưng, khuôn mặt Paulette vẫn còn cứng đờ."
# 【ポーレット】
# display as 波萊特
# JP: 「どうして……\n稀咲さんはその話を、双鉄くんに？」
1741 = "「Tại sao……\nKisaki lại kể chuyện đó cho anh Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「『伝え方が難しい』と思ったそうだ」
1547 = "「Cô ấy nói là cảm thấy 『cách truyền đạt rất khó』.」"
# monologue
# JP: うかつに漏れて広がれば、動揺が動揺を呼ぶ話。\n第三セクターの設立にさえ、悪影響がでかねない話。
2523 = "Nếu vô ý để lọt ra ngoài và lan truyền, sẽ là câu chuyện gây ra xáo trộn liên hoàn.\nThậm chí có thể ảnh hưởng xấu đến việc thành lập bộ phận thứ ba."
# monologue
# JP: そうと懸念した稀咲はだから、\nまず僕だけに――人払いまでして、聞かせてくれた。
2424 = "Lo ngại điều đó nên Kisaki,\nđã đuổi mọi người đi, để kể riêng cho mình tôi nghe trước."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、僕なら最適の形を選べると思ってくれたそうだ。\nポーレット――君へと、いつ、どのように伝えるか」
1549 = "「Nói cách khác, cô ấy nghĩ anh có thể chọn được cách thức tối ưu nhất.\nĐể truyền đạt cho em, Paulette——vào lúc nào, và như thế nào.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それで、ですか？」
1664 = "「Vì vậy, sao?」"
# monologue
# JP: まだ戸惑った顔をして、ポーレットは静かに視線を動かす。\n赤井宮司に、登呂流湯のご主人――
2381 = "Với khuôn mặt vẫn còn bối rối, Paulette lặng lẽ đưa mắt nhìn.\nTừ đền chủ Akai, đến ông chủ nhà tắm Tororyu-yu——"
# monologue
# JP: ポーレットの膝の上、ずっといい子にしてるれいなと、\n椅子の上、まったく反応を見せようとしない、ニイロクに。
2529 = "Từ Reina vẫn ngoan ngoãn ngồi trên đùi Paulette,\nđến Niiroku ngồi trên ghế, hoàn toàn không có vẻ gì là phản ứng."
# 【ポーレット】
# display as 波萊特
# JP: 「それで、みなさんをお呼びして……\nお呼びした上で、こういう形で、伝えてくれた？」
1660 = "「Vì vậy, anh mới gọi mọi người đến……\nvà sau khi gọi mọi người đến, anh đã truyền đạt theo cách này?」"
# monologue
# JP: 今までのポーレットなら、\nきっと飲み込んでいただろう類の、不満や疑問。
2220 = "Nếu là Paulette trước đây,\nchắc chắn cô ấy đã nuốt những bất mãn và thắc mắc kiểu này vào trong."
# monologue
# JP: それが、今、\nスネたような、甘えたような口調の中に滲んでる。
2077 = "Nhưng bây giờ,\nchúng lại thấm đẫm trong giọng điệu hờn dỗi, như đang làm nũng."
# 【双鉄】
# display as 雙鐵
# JP: 「以前のポーレットにであれば、\nもう少し、慎重に伝えていたかもしれん」
1571 = "「Nếu là Paulette trước đây,\ncó lẽ anh đã truyền đạt một cách thận trọng hơn một chút.」"
# monologue
# JP: 例えば、ふたりきりの機会を作り、\n伝えた上で落ち着かせ、そこから善後策を考えた。
2346 = "Ví dụ như, tạo cơ hội chỉ có hai người,\nsau khi nói ra thì trấn an em ấy, rồi từ đó mới nghĩ cách giải quyết."
# monologue
# JP: そうしなければ、ポーレットが判断を誤るかもと、\n僕は恐らく、懸念していたことだろう。
2218 = "Nếu không làm vậy, có lẽ tôi sẽ lo sợ rằng,\nPaulette có thể sẽ đưa ra phán đoán sai lầm."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、今のポーレットとならば大丈夫だと考えた。\n今の僕らなら、支えあい、よりよい判断を下せると」
1424 = "「Nhưng anh nghĩ, nếu là Paulette hiện tại thì sẽ không sao cả.\nNếu là chúng ta bây giờ, có thể hỗ trợ lẫn nhau và đưa ra phán đoán tốt hơn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1506 = "「啊」" 
# monologue
# JP: こくり、と頷く。\n頬にわずかな赤みが差す。
2216 = "Cô ấy khẽ gật đầu.\nĐôi má ửng hồng."
# 【ポーレット】
# display as 波萊特
# JP: 「はい！」
1725 = "「Vâng!」"
# monologue
# JP: 曇りが消える。\n声も表情も晴れやかになる。
2188 = "Sự u ám tan biến.\nCả giọng nói và biểu cảm đều trở nên rạng rỡ."
# monologue
# JP: ポーレットにではなく、ポーレットと。\n――僕の言葉は、伝わっている。
2262 = "Không phải là đối với Paulette, mà là cùng với Paulette.\n——Lời nói của tôi, đã truyền đạt được."
# 【双鉄】
# display as 雙鐵
# JP: 「お三方をお呼びしたのは、この案件が、\nお三方に密接に影響するとも考えたからです」
1416 = "「Lý do tôi mời ba vị đến đây là vì tôi nghĩ vụ việc này,\ncũng ảnh hưởng mật thiết đến cả ba vị.」"
# monologue
# JP: ならばこそ、\n続く言葉はポーレットには向けられない。
2297 = "Chính vì vậy,\nnhững lời tiếp theo không thể chỉ hướng về phía Paulette."
# monologue
# JP: 赤井宮司がさっき話してくれたとおりに――\n事態は最早、至急の対策を必要としているのだから。
2164 = "Đúng như lời đền chủ Akai vừa nói——\nTình hình hiện tại đã đòi hỏi phải có biện pháp đối phó khẩn cấp rồi."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「お三方――ですか」
1627 = "「Ba vị——sao.」"
# monologue
# JP: 赤井宮司の瞳が静かにニイロクの上にそそがれる。\nニイロクの口がようやく、動く。
2509 = "Ánh mắt của đền chủ Akai lặng lẽ đổ dồn vào Niiroku.\nCuối cùng, miệng Niiroku cũng mấp máy."
# 【ニイロク】
# display as 二六
# JP: 「なんでもいい。\nもう一度でも走れるのなら、それだけでいい」
1613 = "「Sao cũng được.\nChỉ cần được chạy một lần nữa thôi, thế là đủ rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことだが――れいな、どうだ？」
1552 = "「Là như vậy đó——Reina, em thấy sao?」"
# 【れいな】
# display as 玲奈
# JP: 「れいなは――ひゃっ！？」
1761 = "「Reina thì——hya!?」"
# monologue
# JP: 膝の上にすわるれいなの髪に、\nポーレットは柔らかく頬を擦り付ける。
2378 = "Lên mái tóc của Reina đang ngồi trên đùi,\nPaulette dịu dàng cọ má vào."
# monologue
# JP: 目をまるくするれいなへと、\n穏やかな声が染み透っていく。
2237 = "Hướng về phía Reina đang tròn xoe mắt,\nmột giọng nói êm đềm thấm sâu vào."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしの望みならね？　れいな。\nれいなの『本当の望み』を、飾らず聞かせてもらうこと」
1766 = "「Nếu em muốn biết mong muốn của chị á? Reina.\nĐó là được nghe 『mong muốn thực sự』 của Reina, một cách chân thật nhất.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！」
1523 = "「Vâng ạ!」"
# monologue
# JP: ぱっと、れいなが立ち上がる。
2391 = "Reina vụt đứng dậy."
# monologue
# JP: そしてぽてぽて、\nニイロクのもとへと歩みより、その手を両手で包み込む。
2389 = "Và rồi lạch bạch,\nbước đến chỗ Niiroku, dùng hai tay bao bọc lấy tay cô ấy."
# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ、ニイロクちゃん。\n\x%lキハ07;#00ffc040;キハ07%l;#;は、とーっても素敵な\x%l気動車;#00ffc040;気動車%l;#;なんですぅ」
1400 = "「Này nha, Niiroku.\n\\x%lキハ07;#00ffc040;KiHa 07%l;#; á, là một \\x%l気動車;#00ffc040;toa xe tự hành%l;#; tuyệt vời lắmmmm luôn đó ạ.」"
# monologue
# JP: にこにこ、れいなは笑っている。
2396 = "Reina đang cười tươi rạng rỡ."
# monologue
# JP: 無愛想を極め、凄みさえをも感じさせているニイロクに\nれいなはただただ、本当に嬉しげに話しかけてる。
2549 = "Đối diện với Niiroku cực kỳ lạnh lùng, thậm chí còn toát ra vẻ đáng sợ,\nReina chỉ đơn thuần bắt chuyện với vẻ vô cùng vui sướng."
# 【れいな】
# display as 玲奈
# JP: 「だかられいな、ニイロクちゃんにも走らせてほしいって\n思ってるんです。れいなとふたり、かわりばんこで」
1668 = "「Nên Reina á, muốn để Niiroku cũng được chạy đó ạ.\nReina và cậu, hai đứa mình sẽ thay phiên nhau.」"
# 【ニイロク】
# display as 二六
# JP: 「なら」
1870 = "「Vậy thì.」"
# monologue
# JP: ニイロクはまるで動かない。
2061 = "Niiroku gần như không nhúc nhích."
# monologue
# JP: 立ち上がりもせず、\n握られた手を握り返す素振りも見せない。
2292 = "Cũng không đứng dậy,\ncũng không có vẻ gì là định nắm lại bàn tay đang bị nắm lấy."
# 【ニイロク】
# display as 二六
# JP: 「ならば、自分は」
1871 = "「Nếu vậy, tôi sẽ.」"
# monologue
# JP: けれども、熱を帯びている。\n声は確かに、今までと色を変えている。
2079 = "Nhưng, cô ấy đang mang trong mình sự nhiệt huyết.\nGiọng nói chắc chắn đã thay đổi sắc thái so với trước đây."
# 【れいな】
# display as 玲奈
# JP: 「れいな、ポーレットにお願いします。\nそれから、赤井宮司さんにもお願いします」
1765 = "「Reina xin nhờ chị Paulette nha.\nSau đó, cũng xin nhờ đền chủ Akai nữa ạ.」"
# monologue
# JP: ふかぶか、れいなが頭を下げる。
2394 = "Reina cúi đầu thật sâu."
# 【れいな】
# display as 玲奈
# JP: 「れいなとキハ[レイナナ,1]07を改修させてください。\nガソリン\x%l気動車;#00ffc040;気動車%l;#;の――昔の姿に」
1818 = "「Xin hãy cho phép cải tạo Reina và KiHa 07 ạ.\nTrở về hình dáng ngày xưa——của \\x%l気動車;#00ffc040;toa xe tự hành%l;#; chạy bằng xăng.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん！」
# 1523 = "「嗯！」" 
# monologue
# JP: 恐れず、迷わず、一瞬たりともためらわず。\nポーレットはれいなの望みに答える。
2377 = "Không e sợ, không lạc lối, không một chút do dự.\nPaulette đáp lại mong muốn của Reina."
# monologue
# JP: けれどもれいなは頭をまだあげぬまま、\n望みを――懸命に紡ぎ続ける。
2084 = "Nhưng Reina vẫn chưa ngẩng đầu lên,\ncô bé tiếp tục——cố gắng dệt nên mong muốn của mình."
# 【れいな】
# display as 玲奈
# JP: 「それで、ニイロクちゃんにも――\nれいなのバックアップデータ、あげてください」
1751 = "「Và rồi, xin hãy chia sẻ dữ liệu sao lưu của Reina——\ncho cả Niiroku nữa nha.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「私に――否やがあろうはずもありません。\nこれでこいつが、再び走れるというのなら――」
1636 = "「Tôi thì——làm sao có thể từ chối được chứ.\nNếu điều này có thể giúp con bé, chạy được một lần nữa——」"
# monologue
# JP: 赤井宮司が、れいなに近づく。
2508 = "Đền chủ Akai, tiến lại gần Reina."
# monologue
# JP: 躊躇せず床に膝をつき、\nれいなより深く頭を下げて、お辞儀の頭を持ち上げさせる。
2071 = "Không ngần ngại quỳ gối xuống sàn,\ncúi đầu sâu hơn cả Reina, khiến cô bé phải ngẩng cái đầu đang cúi chào lên."
# 【れいな】
# display as 玲奈
# JP: 「ふわわっ！？　やめてくださいよぉ」
1491 = "「Oaoa!? Xin chú đừng làm vậy mà.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「感謝します。れいなさん。\nこいつに――そこまでを許してくれて」
1464 = "「Cảm ơn cháu. Reina.\nVì đã cho phép con bé——làm đến mức đó.」"
# 【れいな】
# display as 玲奈
# JP: 「そんなの、あたりまえですよぉ」
1771 = "「Chuyện đó, là đương nhiên mà ạ.」"
# monologue
# JP: ぽわっと、やわらかにれいなが笑う。
2400 = "Reina cười rạng rỡ, dịu dàng."
# monologue
# JP: やわらかに、あたたかに――今までのれいなと変わらずに、\nけれども、少しだけ大人びて。
2533 = "Dịu dàng, ấm áp——không khác gì Reina từ trước đến nay,\nnhưng, có phần trưởng thành hơn một chút."
# 【れいな】
# display as 玲奈
# JP: 「れいな、ニイロクちゃんのおねーさんなんですからぁ」
1533 = "「Vì Reina á, là chị gái của Niiroku mà.」"
# monologue
# JP: （ああ……そうか）
2572 = "（A……ra là vậy）"
# monologue
# JP: ハチロクがれいなを想ったように、\nれいなもニイロクを想ったのだ。
2239 = "Giống như cách Hachiroku nghĩ về Reina,\nReina cũng nghĩ về Niiroku."
# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、繋がっている。\n僕ら人間と変わらずに――あるいはそれより、なお強く。
86 = "Các \\x%lレイルロオド;#00ffc040;Railord%l;#; cũng, đang được kết nối với nhau.\nKhông khác gì con người chúng ta——hoặc thậm chí, còn bền chặt hơn."
# 【ポーレット】
# display as 波萊特
# JP: 「と、いうのがわたし達の希望なんですけれど――\n技術的には、どうでしょうか？」
1840 = "「Đó là nguyện vọng của chúng tôi——\nnhưng về mặt kỹ thuật, thì liệu có được không ạ?」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ノーリスクとはいかんばい。れいなの記憶に何らかの\n障害が出る危険性があるけんね」
1619 = "「Không thể nói là không có rủi ro được. Có nguy cơ\nký ức của Reina sẽ xuất hiện chướng ngại gì đó đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「れいなは――どう？」
1760 = "「Reina thì——thấy sao?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、それでもへいちゃらです」
1600 = "「Dù vậy Reina cũng không sao đâu ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「だって、もしもれいなが、今のれいなと違っちゃっても\nポーレットは、それから、そうてつさんも」
1532 = "「Bởi vì, cho dù Reina, có trở nên khác với Reina hiện tại đi nữa\nthì chị Paulette, và cả anh Soutetsu cũng sẽ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「もちろんよ、れいな」
1841 = "「Tất nhiên rồi, Reina.」"
# monologue
# JP: 僕も頷く。\nれいなの瞳をまっすぐ見つめる。
2264 = "Tôi cũng gật đầu.\nNhìn thẳng vào đôi mắt của Reina."
# 【双鉄】
# display as 雙鐵
# JP: 「変わらず接する。\n今のれいなと、おんなじに」
1386 = "「Anh vẫn sẽ đối xử với em như vậy.\nGiống hệt như Reina bây giờ.」"
# monologue
# JP: 僕らは絆をもっている。
2268 = "Chúng tôi có sự gắn kết."
# monologue
# JP: 記憶に障害が出たとして、それは大きな不幸だろうが――\n僕らの絆を、決して断ち切れるものでは無い。
2221 = "Dù ký ức có gặp trở ngại, đó có thể là một bất hạnh lớn——\nnhưng sự gắn kết của chúng tôi, tuyệt đối không thể bị cắt đứt."
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！」
# 1523 = "「嗯！」" 
# monologue
# JP: 笑顔が弾ける。\nれいなの言葉は、自信に満ちる。
2398 = "Nụ cười bừng sáng.\nLời nói của Reina, tràn đầy tự tin."
# 【れいな】
# display as 玲奈
# JP: 「だかられいな、なぁんにもこわくありません」
1667 = "「Nên Reina á, chẳng sợ gì đâu nha.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「なら、そいはそいでよか。\nで――」
1693 = "「Nếu vậy thì tốt rồi.\nThế——」"
# 【ニイロク】
# display as 二六
# JP: 「何を失っても構わん。\nだから、再び走らせてくれ」
1745 = "「Dù có mất đi thứ gì cũng không sao.\nNên, xin hãy cho tôi được chạy một lần nữa.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「こいつの望むとおりに――どうか」
1677 = "「Xin hãy làm theo nguyện vọng của con bé——trăm sự nhờ ông.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「話がはやかね――」
1848 = "「Nói chuyện nhanh gọn thật đấy——」"
# monologue
# JP: メモ帳の一枚がやぶられて、\n何かが手早く書き付けられる。
2408 = "Một tờ giấy nhớ được xé ra,\nthứ gì đó được viết nhanh lên trên."
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「なら、こいが見積もりばい」
1872 = "「Vậy, đây là bảng báo giá nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「……」
# 1151 = "「……」" 
# monologue
# JP: ”二十万円\n（データ操作一件十万円・二件）”
1132 = "”Hai mươi vạn yên\n（Thao tác dữ liệu mười vạn yên một kiện・Hai kiện）”"
# monologue
# JP: ごくシンプルな見積もりだ。\nなのにポーレットは、ひどく驚いた顔をしている。
2546 = "Một bảng báo giá cực kỳ đơn giản.\nVậy mà Paulette lại làm ra vẻ mặt vô cùng kinh ngạc."
# 【ポーレット】
# display as 波萊特
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の調整だけだって、\nとてもこんなお値段じゃ」
1595 = "「Dù chỉ là điều chỉnh \\x%lレイルロオド;#00ffc040;Railord%l;#; thôi,\nnhưng với cái giá này thì quá.」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「払えるようになったら、もっと稼がせてもらうけん。\n今回んとこは、それでよかとよ」
1799 = "「Đến lúc nào trả được, tôi sẽ kiếm thêm từ cô sau.\nLần này thì, cứ thế là được rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ――ありがとうございます！」
1502 = "「A——Cháu cảm ơn ông rất nhiều ạ!」"
# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「で、いつからとりかかっと？\nこっちゃ、いつからでもよかけん」
1866 = "「Thế, khi nào thì bắt đầu đây?\nBên này thì, lúc nào cũng được.」"
# 【ニイロク】
# display as 二六
# JP: 「ならば今すぐ――今すぐに」
1857 = "「Nếu vậy thì ngay bây giờ——ngay lập tức.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなも、それで平気ですよぉ」
1763 = "「Reina cũng, không sao đâu ạ.」"
# monologue
# JP: こくりと、ポーレットも頷く。\nそれだけでもう、話が決まる。
2374 = "Paulette cũng khẽ gật đầu.\nChỉ cần vậy thôi, mọi chuyện đã được quyết định."
# 【双鉄】
# display as 雙鐵
# JP: 「であるのならば、つきそってやれ」
1853 = "「Nếu đã vậy, thì đi cùng em ấy đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1523 = "「嗯！」" 
# monologue
# JP: ほんの一瞬、青い瞳が僕を見る。\n頼りたそうに、甘えたそうに――
2380 = "Trong thoáng chốc, đôi mắt xanh lam ấy nhìn tôi.\nÁnh mắt như muốn dựa dẫm, như đang làm nũng——"
# monologue
# JP: けれどもそれはすぐさまに、\n笑顔を浮かべ閉じたまぶたに、隠される。
2075 = "Nhưng ngay lập tức,\nnó đã bị giấu đi dưới nụ cười và đôi mi khép lại."
# 【ポーレット】
# display as 波萊特
# JP: 「その間、双鉄くんには――\nいろいろ、お願いしちゃいますね」
1869 = "「Trong khoảng thời gian đó, anh Soutetsu——\ntrăm sự nhờ anh nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1522 = "「嗯」" 
# monologue
# JP: ともかく、準備の時間が足りない。\nすぐ取り掛かれる部分なら、そうしなければ間に合わない。
2443 = "Dù sao thì, thời gian chuẩn bị cũng không đủ.\nNếu có phần nào có thể bắt tay vào làm ngay thì phải làm, nếu không sẽ không kịp."
# 【ニイロク】
# display as 二六
# JP: 「清春」
1740 = "「Kiyoharu.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ」
# 1522 = "「嗯」" 
# monologue
# JP: それだけで、意志の疎通が出来たのだろう。\n赤井宮司は、まっすぐに僕へと向き直る。
2088 = "Chỉ với nhiêu đó, có lẽ họ đã hiểu ý nhau.\nĐền chủ Akai quay thẳng người lại phía tôi."
# 【赤井宮司】
# display as 赤井宮司
# JP: 「私にも、何かできることがあれば言って下さい」
1573 = "「Nếu có gì tôi có thể làm được, xin cứ nói.」"
# 【双鉄】
# display as 雙鐵
# JP: 「大臣視察までに、パンフレットを作成したいと思います。\n日々姫にも協力をしてもらって――」
1639 = "「Trước khi bộ trưởng đến thị sát, tôi muốn làm một cuốn sách mỏng.\nTôi cũng định nhờ Hibiki giúp một tay——」"
# monologue
# JP: 言いながら、ひとつアイディアを思いつく。
2482 = "Vừa nói, tôi vừa nảy ra một ý tưởng."
# monologue
# JP: そうだった。これも確かに――\n頼まれていた“日ノ本一”だと。
2236 = "Đúng rồi. Cái này chắc chắn cũng——\nlà “Nhất Hinomoto” mà tôi đã được nhờ."
# 【双鉄】
# display as 雙鐵
# JP: 「ですので、キジウマに関する画像資料を、できるだけ。\n他の面でも、活用させてもらいたく思いますので」
1663 = "「Vì vậy, xin ông hãy chuẩn bị tài liệu hình ảnh về Kijiuma càng nhiều càng tốt.\nTôi cũng muốn sử dụng chúng ở những khía cạnh khác nữa.」"
# 【赤井宮司】
# display as 赤井宮司
# JP: 「わかりました。抜き出して整理しておきましょう。\n他には？」
1698 = "「Tôi hiểu rồi. Tôi sẽ chọn lọc và sắp xếp lại.\nCòn gì nữa không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「今はひとまずそれだけで。むしろ赤井宮司には――\nニイロクの改修完了後、ご活躍願いたく思っております」
1772 = "「Tạm thời chỉ có vậy thôi. Thay vào đó, thưa đền chủ Akai——\nsau khi Niiroku hoàn tất cải tạo, tôi rất mong ông sẽ giúp sức.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すみません。こんな時間に来ていただいて」
1673 = "「Xin lỗi cô. Đã gọi cô đến vào giờ này.」"
# 【永山】
# display as 永山
# JP: 「全然。だって、お弁当の話なんでしょう？」
1732 = "「Không sao đâu. Vì là chuyện về cơm hộp bento mà, đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1724 = "「Vâng.」"
# 【日々姫】
# display as 日日姬
# JP: 「お弁当？」
1437 = "「Cơm hộp bento?」"
# monologue
# JP: 僕の正面に座る日々姫が、意表をつかれた顔をする。
2178 = "Hibiki ngồi đối diện tôi lộ vẻ mặt bất ngờ."
# monologue
# JP: なにせ、家族だ。[いもうと,1]義妹だ。\n細かな事情の説明は、最後回しにさせてもらった。
2402 = "Dù sao thì, cũng là người nhà. Là em gái.\nNên tôi để phần giải thích chi tiết hoàn cảnh lại sau cùng."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。観光振興の、重要な一助となろうかと考え、\n『御一夜市らしい駅弁』の開発をお願いしているのだ」
1733 = "「Ừm. Anh nghĩ nó sẽ là một trợ thủ đắc lực cho việc chấn hưng du lịch,\nnên đang nhờ cô ấy phát triển một loại 『Cơm hộp bento nhà ga mang đậm chất Ohimitera』.」"
# monologue
# JP: そこから切り出し、ざっと日々姫に説明していく。
2266 = "Bắt đầu từ đó, tôi giải thích sơ lược cho Hibiki."
# monologue
# JP: しかし……まぁ、今にして振り返ってみるのなら、\nこの駅弁づくりの話から、全てが回り出した気もする。
2057 = "Nhưng……chà, bây giờ nhìn lại,\ntôi có cảm giác như mọi chuyện đều bắt đầu xoay chuyển từ câu chuyện làm cơm hộp bento nhà ga này."
# 【日々姫】
# display as 日日姬
# JP: 「じゃ、わたしは駅弁のパッケージ描けばよかとねー」
1862 = "「Vậy, việc em cần làm là vẽ bao bì cho hộp bento đó nhỉ.」"
# 【永山】
# display as 永山＆雙鐵
# JP: 「“\x%l掛け紙;#00ffc040;掛け紙%l;#;”」
1700 = "「“\\x%l掛け紙;#00ffc040;Giấy gói cơm hộp%l;#;”」"
# monologue
# JP: 思いもかけぬステレオで、業界用語（？）の説明を受け、\n日々姫はアハハと苦笑する。
2321 = "Được nghe giải thích về thuật ngữ chuyên ngành (?) bằng âm thanh nổi ngoài dự đoán,\nHibiki cười trừ ha hả."
# monologue
# JP: そしてスケッチブックを広げ、一転――\n真剣な顔で問いかけてくる。
2213 = "Và rồi cô bé mở cuốn sổ phác thảo ra, thái độ quay ngoắt——\nHỏi lại với vẻ mặt nghiêm túc."
# 【日々姫】
# display as 日日姬
# JP: 「で？　そん駅弁の――んんっ――\nその駅弁の\x%l掛け紙;#00ffc040;掛け紙%l;#;、どんな絵柄にするんです？」
1749 = "「Thế? Hộp bento đó——e hèm——\n\\x%l掛け紙;#00ffc040;giấy gói cơm hộp%l;#; của hộp bento nhà ga đó, sẽ vẽ hình gì?」"
# 【双鉄】
# display as 雙鐵
# JP: 「さて――それなのだが。僕は“キジ馬”を、\nひとつのキーにできないだろうかと考えている」
1727 = "「À thì——về chuyện đó. Anh đang nghĩ,\nliệu chúng ta có thể lấy “Kijiuma” làm một từ khóa chính được không.」"
# monologue
# JP: ふん、と永山夫人の鼻が鳴る。
2357 = "Hừm, phu nhân Nagayama khẽ khịt mũi."
# 【永山】
# display as 永山
# JP: 「まぁ、妥当よね。赤井さん、それで文化財申請でしょ？\nでも……キジウマ……鶏肉と馬肉？」
1524 = "「Chà, cũng hợp lý đấy. Anh Akai đang dùng cái đó để xin cấp phép tài sản văn hóa phải không?\nNhưng mà……Kijiuma……Thịt gà (kiji) và thịt ngựa (uma) à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それでも良いのですが――キジウマは、\nせっかくこんなに可愛らしい物ですので」
1877 = "「Như vậy cũng được——nhưng Kijiuma,\nhiếm khi mới có một món đồ đáng yêu thế này.」"
# monologue
# JP: 赤井宮司からコピーをもらった、\n画像資料を広げて見せる。
2275 = "Tôi mở tài liệu hình ảnh,\nbản sao nhận được từ đền chủ Akai ra cho mọi người xem."
# monologue
# JP: 見慣れたキジウマの姿もあれば、\n細身の物も、太いのも居る。
2121 = "Trong đó có cả hình dáng Kijiuma quen thuộc,\ncũng có cả những con thon thả, hay mập mạp."
# 【双鉄】
# display as 雙鐵
# JP: 「例えば、なにかの食材を、\nキジウマに見立てることは出来ないでしょうか？」
1730 = "「Ví dụ như, liệu chúng ta có thể biến một loại nguyên liệu nào đó,\nthành hình dáng giống Kijiuma được không?」"
# 【永山】
# display as 永山
# JP: 「鮎……鮎の甘露煮」
1883 = "「Cá hương……Cá hương kho ngọt (Kanroni).」"
# monologue
# JP: 打てばすぐさま、夫人が響いてくれる。\nその目は、写真資料の上に釘付けだ。
2270 = "Vừa dứt lời, phu nhân đã ngay lập tức hưởng ứng.\nÁnh mắt cô ấy dán chặt vào xấp tài liệu hình ảnh."
# 【日々姫】
# display as 日日姬
# JP: 「あ！　それいいかも！！\n鮎も、御一夜の超名物だし」
1508 = "「A! Ý đó có vẻ hay đấy!!\nCá hương cũng là siêu đặc sản của Ohimitera mà.」"
# monologue
# JP: いうやいなやで、日々姫の手が猛烈な勢いで動き始める。
2198 = "Vừa nói dứt câu, tay Hibiki đã bắt đầu đưa những nét vẽ với tốc độ chóng mặt."
# monologue
# JP: （ああ……そういえばそうだったな）
2574 = "（A……nhắc mới nhớ, đúng là vậy.）"
# monologue
# JP: 甘露煮だけでなく、もちろん塩焼き、燻製に――
2170 = "Không chỉ có cá kho ngọt, mà dĩ nhiên cả cá nướng muối, cá hun khói——"
# monologue
# JP: 変わった所では鮎寿司なども、\n御一夜では普通に食べられている。
2123 = "Thậm chí những món độc lạ như sushi cá hương,\ncũng được ăn rất bình thường ở Ohimitera."
# 【永山】
# display as 永山
# JP: 「なんで気づかなかったんだろう――見慣れすぎかな。\nとにかく、鮎の甘露煮よ。あと、人参の煮物ね」
1637 = "「Sao mình lại không nhận ra nhỉ——chắc tại quen mắt quá rồi.\nTóm lại là cá hương kho ngọt nhé. Với cả cà rốt luộc nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、人参の煮物が車輪ですか！　それはいい。\n味的にも、相性ばっちりに思えますし」
1467 = "「Ra là vậy, cà rốt luộc làm bánh xe sao! Ý kiến hay đấy.\nVề mặt hương vị, tôi nghĩ cũng cực kỳ hợp nhau.」"
# 【永山】
# display as 永山
# JP: 「もちろん、ばっちりにまとめるの。\nこっちは、それが仕事なんだから」
1648 = "「Tất nhiên là tôi sẽ kết hợp chúng thật hoàn hảo rồi.\nVì đây là công việc của tôi mà.」"
# 【日々姫】
# display as 日日姬
# JP: 「良しっ！　にぃに――んんっ！　兄さん。\nこんな感じでどうでしょう？」
1556 = "「Xong rồi! Anh hai——e hèm! Anh trai.\nAnh thấy thế này được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「もう描いたのか！？」
1603 = "「Em vẽ xong rồi á!?」"
# 【日々姫】
# display as 日日姬
# JP: 「当然ですよ？\nこっちは、これが仕事ですから」
1865 = "「Tất nhiên rồi ạ?\nVì đây là công việc của em mà.」"
# monologue
# JP: 永山夫人の言葉をしれっと真似ながら、\n日々姫はスケッチブックの中身を僕らに見せる。
2319 = "Hibiki tỉnh bơ bắt chước lời của phu nhân Nagayama,\nrồi đưa bức vẽ trong sổ phác thảo cho chúng tôi xem."
# 【日々姫】
# display as 日日姬
# JP: 「キジ馬のそのままとか、擬人化とか、\n萌えキャラ化とかも考えてたんですけど、イマイチで」
1651 = "「Em đã thử nghĩ đến việc giữ nguyên hình dáng Kijiuma, hay nhân hóa nó lên,\nthậm chí là biến nó thành nhân vật moe, nhưng đều không ổn lắm.」"
# monologue
# JP: かなり前から、描いては消してくれてたのだろうか？\nいくつものラフスケッチの上にはバツがつけられている。
2193 = "Có lẽ con bé đã vẽ rồi tẩy xóa từ khá lâu rồi nhỉ?\nTrên mấy bản phác thảo nháp đều bị đánh dấu chéo."
# monologue
# JP: 素人の僕にはなかなかによいものに思えるのだが、\n日々姫がイマイチというのなら、そうなのだろう。
2173 = "Trong mắt một kẻ ngoại đạo như tôi thì mấy bức đó trông cũng khá ổn,\nnhưng nếu Hibiki đã nói không ổn thì chắc là vậy rồi."
# 【日々姫】
# display as 日日姬
# JP: 「で。今ので来ました。アイディアをくるん！　て。\nキジ馬なんだし、馬にしちゃえばよかったんだって」
1805 = "「Thế là. Nhờ câu nói lúc nãy mà em nảy ra ý tưởng! Xoẹt một cái.\nVì là Kijiuma, nên em nghĩ cứ vẽ thành con ngựa là được.」"
# 【永山】
# display as 永山
# JP: 「馬……なら、上に誰かが乗るの？」
1686 = "「Ngựa……vậy thì, sẽ có ai đó cưỡi lên trên sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「そうです！　大正解。\n上には、クマ川ですから当然」
1594 = "「Đúng rồi ạ! Hoàn toàn chính xác.\nỞ trên, vì là sông Kuma (Gấu) nên đương nhiên sẽ là.」"
# 【双鉄】
# display as 雙鐵
# JP: 「クマか」
1149 = "「Gấu sao.」"
# 【日々姫】
# display as 日日姬
# JP: 「そう！　その名も――じゃじゃん！\n『キジクマ』ちゃん！」
1734 = "「Đúng vậy! Tên của nó là——tèn ten!\nBé 『Kijikuma』!」"
# 【永山】
# display as 永山
# JP: 「わお」
1493 = "「Woa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これは――単純にかわいいな」
1847 = "「Cái này——đơn giản là dễ thương thật đấy.」"
# monologue
# JP: キジ馬の上にクマが乗ってる。\nヘルメットにツルハシ――鉱夫姿で、自信満々な顔をして。
2140 = "Một con gấu đang cưỡi trên lưng Kijiuma.\nĐội mũ bảo hộ, cầm cuốc chim——trong bộ dạng thợ mỏ, với khuôn mặt tràn đầy tự tin."
# 【双鉄】
# display as 雙鐵
# JP: 「それに――どこか懐かしくもある」
1803 = "「Hơn nữa——trông cũng có nét gì đó rất hoài niệm.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへっ」
1496 = "「Ehehe.」"
# monologue
# JP: ああ。そうだ。くまくまだったか――\n出会って間もないころの日々姫の、友達だったぬいぐるみ。
2235 = "A. Đúng rồi. Là Kumakuma nhỉ——\ncon gấu bông là bạn của Hibiki hồi chúng tôi mới gặp nhau chưa được bao lâu."
# monologue
# JP: 姿形はまるで違うが……\nあどけない目が、なんとなくあれを思い出させる。
2540 = "Dù hình dáng hoàn toàn khác biệt nhưng……\nđôi mắt ngây thơ kia, phần nào khiến tôi nhớ lại thứ đó."
# 【双鉄】
# display as 雙鐵
# JP: 「鉱夫姿ということは、\nマイントレジャーにも絡ませるのだな？」
1689 = "「Bộ dạng thợ mỏ này,\nchắc là để liên kết với Mine Treasure đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「前からそれも考えてましたし……\nさっき、にぃに――兄さん、キーって言いましたから」
1633 = "「Từ trước em cũng đã nghĩ đến chuyện đó rồi……\nLúc nãy, anh hai——anh trai lại nói là muốn dùng làm từ khóa chính nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。僕としては大賛成だ。無論、\nポーレットたちの意見も聞かねばなるまいが」
1519 = "「Ừ. Về phần anh thì cực kỳ tán thành. Tất nhiên,\ncũng phải hỏi ý kiến của nhóm Paulette nữa.」"
# 【日々姫】
# display as 日日姬
# JP: 「えへへっ！　それじゃ、永山さんはどうですか？」
1497 = "「Ehehe! Vậy, cô Nagayama thấy sao ạ?」"
# 【永山】
# display as 永山
# JP: 「オッケ。来たこれ」
1892 = "「Ok. Tôi nảy ra ý tưởng rồi đây.」"
# monologue
# JP: 日々姫の問いに顔もあげずに。
2550 = "Đáp lại câu hỏi của Hibiki mà không hề ngẩng mặt lên."
# monologue
# JP: 夫人は夫人で、何やらメモを――\nレシピを、猛烈な勢いで書き付けている。
2190 = "Bản thân phu nhân cũng đang cắm cúi ghi chép thứ gì đó——\nlà công thức nấu ăn, với một tốc độ khủng khiếp."
# 【永山】
# display as 永山
# JP: 「石炭でしょ？\n黒ゴマを衣に混ぜた、“石炭唐揚げ”」
1812 = "「Là than đá đúng không?\nTrộn mè đen vào lớp vỏ bột, ta có “Gà rán than đá”.」"
# 【日々姫】
# display as 日日姬
# JP: 「わ！　それ美味しそうっ！」
1495 = "「Oa! Nghe ngon quá đi!」"
# 【永山】
# display as 永山
# JP: 「あとはクマならはちみつね。甘露煮にはちみつ使って、\nデザートにも、はちみつとゆずのゼリーをつける」
1690 = "「Còn gấu thì phải có mật ong nhỉ. Dùng mật ong cho món kho ngọt,\nphần tráng miệng cũng sẽ có thạch mật ong và quýt yuzu.」"
# 【日々姫】
# display as 日日姬
# JP: 「すごい、ぜんぶ御一夜の特産！」
1560 = "「Tuyệt quá, toàn là đặc sản của Ohimitera không à!」"
# 【永山】
# display as 永山
# JP: 「箸休めにこれも特産のわさび漬けで――\nお米も隈元米で、地産地消の名物駅弁できあがり」
1817 = "「Món ăn kèm chống ngán cũng là wasabi muối đặc sản——\nGạo cũng dùng gạo Kumamoto, thế là hoàn thành hộp cơm bento nhà ga danh tiếng tự sản tự tiêu rồi nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお……お」
1500 = "「Ồ……ồ.」"
# monologue
# JP: 連鎖だ。\n極めて良い連鎖が生まれた。
2544 = "Là phản ứng dây chuyền.\nMột phản ứng dây chuyền cực kỳ tốt đã được sinh ra."
# monologue
# JP: 日々姫と永山夫人とは、\nお互いに刺激しあってくれた。
2314 = "Hibiki và phu nhân Nagayama,\nđã truyền cảm hứng cho nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「これは――いけそうな気がするな」
1655 = "「Cái này——anh có linh cảm là sẽ thành công đấy.」"
# 【永山】
# display as 永山
# JP: 「そ？　なら試作するわね。\n材料も吟味したいし――、一週間もらえるかな？」
1719 = "「Thế à? Vậy tôi sẽ làm thử nhé.\nTôi cũng muốn tuyển chọn nguyên liệu kỹ càng nữa——, cho tôi một tuần được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかりました。では、一週間後で」
1650 = "「Tôi hiểu rồi. Vậy thì, một tuần sau nhé.」"
# monologue
# JP: この差し迫った日程の中だ。\n一週間を待つのはいささか気が急くが――
2403 = "Trong lịch trình cấp bách này.\nViệc phải chờ đợi một tuần có hơi khiến tôi sốt ruột nhưng——"
# monologue
# JP: その分、きっちり作りこんでもらい、\n一発で決めることができれば、その方がむしろ有り難い。
2080 = "Bù lại, nếu được chuẩn bị kỹ lưỡng,\nvà có thể chốt ngay trong một lần thử, thì như thế còn đáng quý hơn."
# 【永山】
# display as 永山
# JP: 「おっけ。じゃ、一週間後の今日のお昼に、\n市役所に持って行くわね」
1894 = "「Ok. Vậy, buổi trưa hôm nay của một tuần sau,\ntôi sẽ mang đến tòa thị chính nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「了解しました。よろしくお願いします」
1562 = "「Đã rõ. Trăm sự nhờ cô.」"
# 【日々姫】
# display as 日日姬
# JP: 「じゃ、私もそれまでにもうちょっとまとめとく」
1860 = "「Vậy, em cũng sẽ nhân lúc đó hoàn thiện thêm một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すまんが、それもよろしく頼む」
1820 = "「Xin lỗi vì đã làm phiền em, nhưng cũng nhờ em luôn nhé.」"
# 【日々姫】
# display as 日日姬
# JP: 「って、にぃに？　出かけるの？」
1490 = "「Ủa, anh hai? Anh đi đâu à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。慌ただしくて申し訳ない」
1711 = "「Ừ. Xin lỗi vì cứ vội vã thế này.」"
# 【永山】
# display as 永山
# JP: 「そういうもんでしょ？　こういうときは」
1842 = "「Chuyện thường tình mà? Trong những lúc thế này.」"
# monologue
# JP: 言って、僕より一足早く、永山夫人は去っていく。
2485 = "Nói rồi, phu nhân Nagayama rời đi trước tôi một bước."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、だな。――そういうもんだ」
1709 = "「Quả thực, là vậy nhỉ. ——Đúng là chuyện thường tình.」"
# monologue
# JP: 話がひとつまとまったなら、\n次のひとつをまとめるのみ。
2294 = "Nếu đã chốt xong một chuyện,\nthì chỉ còn cách đi chốt chuyện tiếp theo."
# monologue
# JP: そうしなければ、\n“足りぬ準備”すら整えられない。
2053 = "Nếu không làm vậy,\nthì ngay cả “chuẩn bị chưa đủ” cũng không xong."
# 【日々姫】
# display as 日日姬
# JP: 「そういうもんって……何してくるの？」
1610 = "「Chuyện thường tình là sao……anh định đi làm gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠さんのところにもご相談だ。\n職人まわりを、できる限りまとめていただきたいのでな」
1653 = "「Anh đi bàn bạc với ông Minokasa.\nAnh muốn nhờ ông ấy tập hợp các thợ thủ công lại càng sớm càng tốt.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、マイントレジャーの宝箱？」
1511 = "「A, hòm kho báu của Mine Treasure á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1522 = "「嗯」" 
# monologue
# JP: それだけではない。\n\x%lキハ07;#00ffc040;キハ07%l;#;の改修にともなっての、車体側での実作業。
2049 = "Không chỉ có vậy.\nMà còn cả công việc thực tế trên thân xe, đi kèm với việc cải tạo \\x%lキハ07;#00ffc040;KiHa 07%l;#; nữa."
# monologue
# JP: そこにも必ず、\n蓑笠さんの手腕と人脈は必要となる。
2522 = "Chắc chắn ở đó,\ncũng sẽ cần đến tài năng và nhân mạch của ông Minokasa."
# 【日々姫】
# display as 日日姬
# JP: 「そっか……にぃにも大変だね。ほんとに」
1716 = "「Vậy à……anh hai cũng vất vả thật đấy. Thật sự luôn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1854 = "「Không đâu.」"
# monologue
# JP: 大変ではない。\nわずかたりとも。
2261 = "Chẳng vất vả chút nào.\nDù chỉ là một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「大部分は、ポーレットに任せておけるからな。\n僕は、その隙間を埋めればいいだけだ」
1544 = "「Vì phần lớn công việc, anh đều có thể giao cho Paulette mà.\nAnh chỉ cần lấp đầy những khoảng trống đó thôi.」"
# monologue
# JP: それが楽しい。充実している。
2524 = "Điều đó khiến tôi vui vẻ. Và mãn nguyện."
# monologue
# JP: 安心しきって、無防備な背中を預けておける。\nそうした相手がいることが、ただ単純に幸せだから。
2163 = "Có thể hoàn toàn yên tâm, giao phó tấm lưng không phòng bị của mình.\nChỉ đơn thuần là vì, việc có một người như vậy mang lại cho tôi hạnh phúc."
# 【日々姫】
# display as 日日姬
# JP: 「あー……そっか。そうだよね。\nわかってたけど、やっぱそういうことだよね――うん！」
1505 = "「A……ra là vậy. Đúng là thế nhỉ.\nEm đã biết trước rồi, nhưng quả nhiên là vậy nhỉ——ừm!」"
# monologue
# JP: （ばしんっ！！）
2576 = "（Bốp!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1889 = "「!!?」"
# monologue
# JP: 背中に痛み。\n思いがけぬほど強烈な。
2046 = "Cơn đau truyền đến từ lưng.\nMãnh liệt đến mức không ngờ tới."
# monologue
# JP: 日々姫が僕の背中を思い切り平手で打って――
2328 = "Hibiki đã vung tay đánh mạnh vào lưng tôi——"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫――なに、を」
1696 = "「Hibiki——em làm, cái gì vậy.」"
# monologue
# JP: 重ねた\x%l機関助士;#00ffc040;機関助士%l;#;経験が、\n日々姫に力を――単純な腕力を養わせたらしい。
2316 = "Kinh nghiệm làm \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; được tích lũy,\ncó vẻ đã bồi dưỡng thêm sức mạnh——hay đúng hơn là sức mạnh cơ bắp đơn thuần cho Hibiki."
# monologue
# JP: 衝撃と驚きのあまりの強さに、\n苦情の言葉さえ切れ切れになる。
2428 = "Cú sốc và sự kinh ngạc quá đỗi mạnh mẽ,\nkhiến ngay cả những lời phàn nàn cũng trở nên đứt quãng."
# 【日々姫】
# display as 日日姬
# JP: 「なにって……後押しですよ？　にいさん。\nかわいい、[にい,1]義兄さんの[いもうと,1]義妹の」
1410 = "「Làm gì là sao……là đang tiếp thêm sức mạnh cho anh đó? Anh trai.\nCủa cô \\x%lいもうと;#00ffc040;em gái%l;#; dễ thương, dành cho ông \\x%lにい;#00ffc040;anh trai%l;#; đó.」"
# monologue
# JP: まだひりひりと痛む背中を、\n日々姫がぐいぐい押してくる。
2484 = "Lên cái lưng vẫn còn đang đau rát,\nHibiki dùng sức đẩy mạnh."
# monologue
# JP: おでこまで背中に押し付けて、\n僕にまったく――振り返ることを許さない。
2531 = "Ép cả trán vào lưng tôi,\nhoàn toàn không cho phép tôi——quay đầu lại."
# 【日々姫】
# display as 日日姬
# JP: 「ほおら、さっさと行ってください！\nいって、幸せになってください」
1558 = "「Nào, mau đi đi!\nĐi đi, và hãy hạnh phúc nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ。\n言われずとも行ってくる」
1514 = "「Ừ, ừm.\nEm không nói thì anh cũng đi mà.」"
# monologue
# JP: （トっ！）
2570 = "（Cạch!）"
# monologue
# JP: 背後のふすまを閉められる。
2455 = "Cửa kéo fusuma sau lưng bị đóng lại."
# monologue
# JP: その向こうから――何をはしゃいでいるのだろうか？\n日々姫の明るい声が聞こえる。
2538 = "Từ phía bên kia——con bé đang phấn khích chuyện gì vậy nhỉ?\nTôi nghe thấy giọng nói tươi sáng của Hibiki."
# 【日々姫】
# display as 日日姬
# JP: 「いってらっしゃい！\n――バイバイ、にぃに」
1381 = "「Đi cẩn thận nhé!\n——Bái bai, anh hai.」"
