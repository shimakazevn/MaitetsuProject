[script]
# lines: 387 
# 【日々姫】
# display as 日日姬
# JP: 「――信号、進行、よしっ！」
1141 = "「——信號，前進，正常！」" 

# 【ハチロク】
# display as 八六
# JP: 「すぐに上り勾配です。\n\x%l逆転機;#00ffc040;逆転機%l;#;を」
1459 = "「前面馬上就是上坡。\\x%l逆転機;#00ffc040;回動機%l;#;啟動」" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%l逆転機;#00ffc040;逆転機%l;#;――締切率30％」
1137 = "「\\x%l逆転機;#00ffc040;回動機%l;#;——遮斷比３０％」" 

# 【ハチロク】
# display as 八六
# JP: 「では足りません。38\%に。\n\x%lストーブ客車;#00ffc040;ストーブ客車%l;#;の重量分、[ハチロク,3]8620には力が必要です」
1845 = "「還不夠，提升到３８％。８６２０需要比平時更大的功率來拉動\\x%lストーブ客車;#00ffc040;暖爐客車%l;#;」" 

# 【日々姫】
# display as 日日姬
# JP: 「\x%l逆転機;#00ffc040;逆転機%l;#;――締切率……37――38％、よしっ！」
1136 = "「\\x%l逆転機;#00ffc040;回動機%l;#;——遮斷比……３７％——３８％，正常！」" 

# monologue
# JP: （これ……は――）
2584 = "（這究竟是——）" 

# monologue
# JP: 我が目を疑う――などと思っては失礼だが、\nそれでも、にわかには信じられない。
2420 = "眼前這幅景象令我大吃一驚。雖然這麼想有些失禮，但我實在有些懷疑自己的眼睛。" 

# 【凪】
# display as 凪
# JP: 「二十六っ！――二十七っ！――二十八っ！――\n二十九っ！」
1404 = "「二十六！——二十七！——二十八！——二十九！」" 

# 【ハチロク】
# display as 八六
# JP: 「凪さんもあげてください。\n二分あたりで、あと十杯ずつ」
1452 = "「凪小姐也請加快速度。在接下來的兩分鐘之內保持現在的添煤速度再多添十鏟煤」" 

# 【凪】
# display as 凪
# JP: 「了解ばいっ！」
1699 = "「明白咧！」" 

# monologue
# JP: 声と同時に、\n凪のワンスコの動きがさらになめらかさを増す。
2481 = "說著，凪手上的動作又加快了一些。" 

# monologue
# JP: 最小の動きで無駄なく石炭を散らす一掻きごとに、\n\x%l8620;#00ffc040;8620%l;#;の\x%l火床;#00ffc040;火床%l;#;には、新たな炎が燃え立ち踊る。
2344 = "每當她以最乾淨俐落的動作投下煤炭再攤勻，\\x%l8620;#00ffc040;８６２０%l;#;的\\x%l火床;#00ffc040;火床%l;#;就燃起新的火苗。" 

# monologue
# JP: （ポーーーーーーーーーっ！）
2577 = "（嗚——！）" 

# monologue
# JP: 勝ち誇るように\x%l汽笛;#00ffc040;汽笛%l;#;が響く。\n\x%l8620;#00ffc040;8620%l;#;はなめらかに――上り勾配を乗り越えた。
90 = "\\x%l汽笛;#00ffc040;汽笛%l;#;響起，宛如勝利的號角。\\x%l8620;#00ffc040;８６２０%l;#;順利爬過了坡頂。" 

# monologue
# JP: \x%l客車;#00ffc040;客車%l;#;の方に試乗をしているふかみと稀咲も、\nおそらくわずかな違和感さえも感じなかったことだろう。
2066 = "今天前來試乘\\x%l客車;#00ffc040;客運車廂%l;#;的深美和稀咲，恐怕也察覺不到有任何異樣吧。" 

# monologue
# JP: （見事だ――）
2578 = "（太出色了——）" 

# monologue
# JP: もはや見習いレベルではない。\nこの短期間に、ふたりは大きく成長している。
2196 = "她們倆的水準已經超越實習水平了。沒想到她們竟然能在這麼短的時間裡成長到如此地步。" 

# monologue
# JP: ハチロクの迷い無い指示の下、\nチームワークが、ここに確かに成立している。
2169 = "在八六果斷明確的指揮下，駕駛的配合已經十分嫻熟。" 

# monologue
# JP: （『双鉄様は監督役を――』と頼まれたときは、\nいったい何を言っているのかと思ったが……）
2567 = "（八六拜託我在旁監督的時候，我還不明白她為什麼要這麼做……）" 

# monologue
# JP: ギリギリまでは手も口も出さず見守るつもりが、\nその余地さえも、ほとんど見つけられなかった。
2281 = "我本來打算在旁直到有危險再出手，但根本沒有機會讓我這麼做。" 

# monologue
# JP: ならばこそ、明らかに見えてくる。\n監督役を僕に頼んで、ハチロクが示そうとしたものが。
2288 = "所以我懂了。八六之所以請我來監督，是想向我展示現在的場面。" 

# 【日々姫】
# display as 日日姬
# JP: 「新[つるは,1]弦羽廃駅、通過、良し！」
1683 = "「新鶴羽廢車站，通過，正常！」" 

# monologue
# JP: 言いながらもう日々姫の指は、そのすぼまりを強めてる。\nブレーキ圧を増し始めている。
2483 = "說著，日日姬的手上開始用力。剎車的力道逐漸增大。" 

# monologue
# JP: 僕にある感覚と比すれば早すぎる――が、それでいい。\n客車の分の重量増を日々姫は自ら、判断に加えたのだから。
2348 = "比我預想的要早很多——不過這樣正好。現在８６２０增加了客車的重量，所以日日姬才判斷需要提前。" 

# 【ハチロク】
# display as 八六
# JP: 「…………」
1151 = "「……」" 

# monologue
# JP: ハチロクはもう指示を出さない。\n凪のワンスコも動きを止めてる。
2106 = "八六不再發出指示。凪的鏟子也停了下來。" 

# monologue
# JP: 極めてスムーズな段階緩め――\n滑るようにして\x%l8620;#00ffc040;8620%l;#;は、湯医駅へと到着する。
83 = "\\x%l8620;#00ffc040;８６２０%l;#;緩緩減速，極其順暢地駛入湯醫站。" 

# 【日々姫】
# display as 日日姬
# JP: 「停止位置、確認――\x%l単弁;#00ffc040;単弁%l;#;、緩ブレーキ――良しっ！」
1789 = "「確認停車位置——\\x%l単弁;#00ffc040;單剎%l;#;、輕度剎車——正常！」" 

# 【凪】
# display as 凪
# JP: 「お見事ばい！！」
1546 = "「太厲害咧！！」" 

# 【日々姫】
# display as 日日姬
# JP: 「ううん、まだ」
1388 = "「不，還沒結束」" 

# monologue
# JP: 日々姫の言葉に、すぐさま凪が満面の笑顔を引き締める。
2448 = "聽日日姬這麼說，凪的笑容也收了起來。" 

# 【凪】
# display as 凪
# JP: 「そうだったばい、今日は」
1593 = "「對咧，今天——」" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。\x%l客車;#00ffc040;客車%l;#;を引いているんだから――\nここのじゃなく、お客さんたちの評価を聞かないと」
1590 = "「對。今天還拉著\\x%l客車;#00ffc040;客運車廂%l;#;——所以我們不能光是自個兒樂，還得聽聽乘客的評價」" 

# monologue
# JP: 日々姫と凪がハチロクを見る。\n“合格です”といわんばかりに、ハチロクは大きく頷く。
2311 = "日日姬和凪一齊看向八六。只見八六重重地點頭，彷彿在說她們已經合格了。" 

# 【ハチロク】
# display as 八六
# JP: 「こちらはわたくしが。おふたりは、\nふかみ様と稀咲様とのご評価を聞いてきてください」
1886 = "「駕駛室就交給我。請二位去詢問深美小姐和稀咲小姐的評價吧」" 

# 【日々姫】
# display as 日日姬
# JP: 「わかった！」
1563 = "「好的！」" 

# 【凪】
# display as 凪
# JP: 「聞いてくるばーい！」
1839 = "「這就去咧！」" 

# monologue
# JP: よほど評価が気になるのだろう。\nまず凪が、そして日々姫がそわそわとキャブを降りていく。
2415 = "看來她們十分在乎乘客的評價。只見凪一馬當先跑出了駕駛室，日日姬緊隨其後。" 

# monologue
# JP: その後姿を見送る小さな小さな運転ボディのハチロクが、\nなんとも大きく、頼もしいものと僕には見える。
2286 = "我突然覺得，以駕駛體目送她們離開的小小八六，看起來是如此高大可靠。" 

# 【双鉄】
# display as 雙鐵
# JP: 「見事なものだな」
1463 = "「剛才的駕駛真是精彩」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\nお若いとはいえ、この短期間によくもここまで」
1713 = "「是啊。雖然說年輕學得快，但沒想到她們倆在這麼短的時間裡能達到如此水平」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、ふたりも見事だが。\nより見事なのはハチロクだ」
1776 = "「當然，她們倆很棒。但更厲害的是八六」" 

# 【ハチロク】
# display as 八六
# JP: 「え？」
1499 = "「哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それこそ、この短期間に――\nよくもふたりをあそこまで磨きあげたものだ」
1874 = "「都是多虧了八六的教導，才能讓她們在這麼短的時間內有了長足的進步」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ」
1506 = "「啊」" 

# monologue
# JP: きょとんと固まっていた顔が、微笑に緩む。\n印象が、あどけないほどのものになる。
2107 = "八六原本繃緊的臉上綻放出笑容。此刻的她看起來是那麼天真爛漫。" 

# 【ハチロク】
# display as 八六
# JP: 「そのことですか。でしたら、それは――\nわたくしだけの力ではございませんよ」
1468 = "「原來您是這個意思啊。不過，這可不是我一個人的功勞」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、彼女らの努力は極めて大きかろう」
1775 = "「當然了，她們的努力也是很重要的」" 

# 【ハチロク】
# display as 八六
# JP: 「それも当然、ございます。\nですがもう一つ――双鉄様のお力が」
1864 = "「那是自然。不過，雙鐵少爺的幫助也同樣是不可或缺的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕？」
1657 = "「我？」" 

# monologue
# JP: 意表をつかれ、聞き返す。\n僕など、なにもしていない。
2283 = "我沒懂她的意思，不由得反問道。因為在這件事當中，我並沒有起到任何作用。" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の\x%l運転台;#00ffc040;運転台%l;#;にあがるのすらも、\nひさびさのことと感じてたほどなのに。
2525 = "連上一次登上\\x%l8620;#00ffc040;８６２０%l;#;的\\x%l運転台;#00ffc040;駕駛台%l;#;，都是好久以前的事了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の力もなにも――」
1622 = "「我什麼也沒——」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、\nお名前のとおりの力を有しておられます」
1879 = "「雙鐵少爺擁有著，如同您的名字一般的力量」" 

# 【双鉄】
# display as 雙鐵
# JP: 「名前……」
1484 = "「名字……」" 

# monologue
# JP: 言われて、ふっと思い出す。\nそういえばハチロクは、出会ってまだ間もない頃に――
2466 = "被她這麼一說，我想起來了。說起來認識八六還沒多久的時候，她曾經說過——" 

# monologue
# JP: 日々姫の名を響きであると、真闇姉の名を\x%l枕木;#00ffc040;枕木%l;#;だと。\nそうして、僕の名のことを――
2323 = "日日姬的名字是取自鐵軌與列車之間發出的聲音，真闇姐的名字是從\\x%l枕木;#00ffc040;枕木%l;#;來的。而我的名字則是——" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、レールなのです。\n行くべき先を、まっすぐにお示しくださいます」
1880 = "「雙鐵少爺是鐵軌。給大家指明前進的方向」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は……レールか」
1644 = "「我是……鐵軌」" 

# 【ハチロク】
# display as 八六
# JP: 「マイントレジャー計画を。御一夜が、わたくしたちが、\n目指す未来を。双鉄様がまっすぐにお示し下さったから」
1878 = "「雙鐵少爺想出了煤探樂園計劃，為御一夜還有我們指明了前進的方向」" 

# monologue
# JP: （そっ）
2581 = "（摸）" 

# monologue
# JP: ――ハチロクの手が、人形サイズの小さな手が、\n僕の右手に触れてくる。
1122 = "——八六用如同人偶一樣嬌小的手攥住我的右手。" 

# monologue
# JP: 包み込めるほどの大きさは無く、\n触れ、挟まれているだけなのに――ひどく暖かで心地よい。
2209 = "她的手很小，無法握住我整個手掌。但只是被她的小手牽著，我就感到無比溫暖。" 

# 【ハチロク】
# display as 八六
# JP: 「だから――迷わず進めたのです。\n日々姫も、凪も……わたくしも」
1659 = "「所以——我們才能毫無動搖地前進。包括日日姬、凪……還有我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1717 = "「是嗎」" 

# monologue
# JP: 僕はただ、自分自身の目的を果たそうとしただけだった。
2273 = "我只是想達成我的目的而已。" 

# monologue
# JP: 最初は、御一夜の町と環境とを守るため。\nその上に、ハチロクを再び走らせることが加わって――
2135 = "原本是為了守護御一夜的環境與城鎮。後來，我又希望八六能再次奔跑於鐵軌之上——" 

# 【双鉄】
# display as 雙鐵
# JP: 「その都度必死で、目の前のことに向き合っていただけだ。\nあるいは僕が一番、先を見通せてなかったのかもしれん」
1628 = "「我只是一次次拚命努力去面對眼前的難關而已。說不定，我才是最沒有遠見的人」" 

# 【ハチロク】
# display as 八六
# JP: 「――双鉄様」
1143 = "「——雙鐵少爺」" 

# monologue
# JP: （きゅっ）
2580 = "（握緊）" 

# monologue
# JP: ハチロクの手に、力がこもる。\n瞳が、僕から外れなくなる。
2110 = "八六握住我的手增加了幾分力道。她緊緊盯著我。" 

# monologue
# JP: 口が開いて――そのまま数秒。\nやがて、噛みしめるような声が聴こえる。
2202 = "她張大嘴巴——過了數秒，才終於一字一頓地說道。" 

# 【ハチロク】
# display as 八六
# JP: 「わたくしと、[ハチロク,3]8620とは、もう、走れます」
1630 = "「我和８６２０，已經可以再次奔跑了」" 

# monologue
# JP: （ああ……）
2575 = "（啊……）" 

# monologue
# JP: やはり、そうなのかと思う。\n僕にただ、見ることだけを要求したのは――
2337 = "果然是這樣。她之所以只要求我在旁監督是因為——" 

# monologue
# JP: 僕が外れたチームでも、きちんと走れる、\nその姿を見せてくれるためだったのかと。
2200 = "她希望向我展示，現在８６２０的團隊就算缺了我也能正常運轉。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、責任を果たせたのか」
1617 = "「我……已經完成任務了嗎」" 

# 【ハチロク】
# display as 八六
# JP: 「っ、くっ――」
1513 = "「嗚——」" 

# monologue
# JP: ハチロクが息を呑み込んで、\n押しつぶされたような声があふれる。
2112 = "八六深吸一口氣，發出了有些乾癟的聲音。" 

# monologue
# JP: その目は床へとふらふら落ちて。\n僕の右手を挟む力が――、一瞬、ゆるむ。
2195 = "她低下腦袋看著地板。握住我右手的力道，稍稍一松。" 

# 【ハチロク】
# display as 八六
# JP: 「それは――左様かと思います。が――\n\x%l8620;#00ffc040;8620%l;#;もわたくしも、マスター無しでは、不安です」
1642 = "「我是——這麼認為的。但是——\\x%l8620;#00ffc040;８６２０%l;#;和我沒有主人的話，會很不安」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、なら」
1718 = "「是嗎，既然這樣——」" 

# 【ハチロク】
# display as 八六
# JP: 「ですが！　今ひとときのことならば。\n\x%l客車;#00ffc040;客車%l;#;試験の、間、くらいは……」
1428 = "「但是！　如果只是現在的話。至少在\\x%l客車;#00ffc040;客運車廂%l;#;試運行的期間……」" 

# monologue
# JP: ぐっと、ハチロクが顔を持ち上げる。
2116 = "八六突然抬起頭。" 

# monologue
# JP: 僕を見つめて、\n少しぎくしゃくした笑顔を浮かべる。
2211 = "她盯著我，露出了有些拘謹的笑容。" 

# 【ハチロク】
# display as 八六
# JP: 「頑張れます。双鉄様がいてくださらなくても、走れます。\nですので、どうか――」
1646 = "「我會加油的。就算沒有雙鐵少爺在旁，我也能繼續前進。所以，拜託您——」" 

# monologue
# JP: ハチロクの手がスっと離れる。\nふかぶかと――小さな頭が下げられる。
2117 = "八六輕輕鬆開我的手，深深低下了頭。" 

# 【ハチロク】
# display as 八六
# JP: 「れいなを、わたくしの妹分をよろしくお願いいたします。\nあの子も、どうか――もう一度、不安なく走れるように」
1770 = "「玲奈，我的妹妹也拜託您了。希望您能讓她再一次，無憂無慮地繼續前進」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1522 = "「嗯」" 

# monologue
# JP: れいなの件で、僕に出来ることなどおそらくほとんど無い。
2176 = "在玲奈一事上，我恐怕根本幫不上什麼忙。" 

# monologue
# JP: が、僕がレールだというのなら、\nいつもどおりであることが、きっと最善の在り方だろう。
2058 = "不過，既然說我是鐵軌，那麼像平常一樣行動就是最好的做法吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなを支えるポーレットを、僕は支えようと思う。\nきっとそれが、一番良い結果につながるはずだ」
1739 = "「波萊特支持著玲奈，而我會支持著波萊特。這一定是最好的解決方法」" 

# monologue
# JP: ハチロクの顔がやわらぐ。
2114 = "八六的表情放鬆了一些。" 

# monologue
# JP: 怯えたような強張りが消えてしまえば、\n残るのは――とても自然な、優しい笑顔だ。
2215 = "她臉上的不安消失了，綻放出了自然的笑容。" 

# 【ハチロク】
# display as 八六
# JP: 「はい。双鉄様の信じるままになさるのが、\n一番良いと――このハチロクも信じます」
1517 = "「嗯。八六也相信雙鐵少爺的考慮是最正確的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1522 = "「嗯」" 

# monologue
# JP: 髪を撫でる。\n子犬の頭に、そうするように。
2280 = "我撫摸起了她的頭髮，就像在摸一隻小狗的頭一樣。" 

# monologue
# JP: 僕にまっすぐ向けてもらえる信頼に、\n必ず答える、誓いのつもりで。
2285 = "我發誓一定會回應她對我的這份信賴。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ベストを尽くす。\n君たちが再び、心置きなく走り出せるようにも」
1647 = "「我會盡全力的。這樣也能讓你們心無掛礙地再次出發」" 

# 【ハチロク】
# display as 八六
# JP: 「はい」
# 1522 = "「嗯」" 

# monologue
# JP: （ゴンっ、ゴンっ）
2569 = "（咚咚）" 

# 【ハチロク】
# display as 八六
# JP: 「っ！！？」
1890 = "「！！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？」
1614 = "「怎麼了？」" 

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の側面を、何かで叩いたような音。\n確かめるためキャブ横窓から下を覗けば――
2449 = "聽聲音似乎有人在敲\\x%l8620;#00ffc040;８６２０%l;#;的側面。我從駕駛室的側窗往下一看——" 

# 【稀咲】
# display as 稀咲
# JP: 「今、少しだけいいかな。双鉄」
1480 = "「可以占用你一點時間嗎，雙鐵」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ君か――宝生稀咲」
1409 = "「什麼啊，原來是你，寶生稀咲」" 

# 【稀咲】
# display as 稀咲
# JP: 「なんだとは随分なごあいさつだね。\n上がらせてもらって平気かな？」
1433 = "「你這招呼打的可真不客氣啊。我能上來嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「キャブにか？　無論、構わんが」
1383 = "「上來駕駛室？　當然可以」" 

# 【ハチロク】
# display as 八六
# JP: 「ああ、双鉄様、わたくし――\n[はいばこ,1]灰箱のお掃除をしてまいります」
1512 = "「啊，雙鐵少爺，那我就去打掃灰箱了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1501 = "「唔？」" 

# monologue
# JP: 止める間もなく、ハチロクは整備ボディに換装し、\nキャブをすたすた下りていってしまう。
2530 = "還沒等我阻止，八六就換上了整備體，快步走下了駕駛室。" 

# 【稀咲】
# display as 稀咲
# JP: 「相変わらず気の利く子だね、彼女は」
1554 = "「她還是這麼會察言觀色啊」" 

# monologue
# JP: 入れ替わるように入ってきた稀咲の一言に、\nそういうことか、と理解する。
2447 = "聽到與八六擦肩而過的稀咲這麼一說，我馬上就明白了。" 

# monologue
# JP: 会いにいったはずの日々姫を\x%l客車;#00ffc040;客車%l;#;に残し、\nわざわざ一人で、キャブにまで来たということは――
2205 = "她故意將前去詢問意見的日日姬留在\\x%l客車;#00ffc040;客運車廂%l;#;，一個人來駕駛室找我，也就代表著——" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにか、内密の話があるのか」
1729 = "「有什麼事要私下裡談嗎」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん。動揺を招きかねない――けど、\nキミたちが知っておかねば危ういという話が、一つ」
1521 = "「嗯。雖然這件事會讓你們感到不安——不過，如果不告訴你們，怕是會出大亂子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「元忠氏がらみか？」
1488 = "「和元忠先生有關嗎？」" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクの警告を気にしてくれていたようだね。\n嬉しいよ」
1778 = "「看來你把我之前的警告牢牢記住了呀，真令人高興」" 

# monologue
# JP: 嬉しいと言葉では言いつつも、\n稀咲の顔は、厳しく締まる。
2541 = "雖然她嘴上這麼說，但表情卻非常嚴肅。" 

# 【稀咲】
# display as 稀咲
# JP: 「父は、マイントレジャー計画に一定の評価を与えている。\nが、それでも\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の方が勝ると判断してる」
1756 = "「父親對煤探樂園計劃基本持正面評價。但，他還是認為\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶所帶來收益更大」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……元忠氏の立場からすれば、そうだろうな」
1154 = "「……如果站在他的立場上來看，恐怕的確如此」" 

# monologue
# JP: １０年、２０年という目先の期間のみの――\n経済面での安定性だけ考えるのなら、それは当然の判断だ。
2223 = "如若只考慮１０年、２０年內可以預見的經濟穩定性，會得出這樣的結論是理所當然的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「環境負荷のことと将来的なこととを考えないのなら。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致は確かに、優れた再生計画だから」
1564 = "「如果不考慮環境汙染和長久的打算，\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶確實是復興當地的有效手段」" 

# monologue
# JP: マイントレジャー計画に関する勉強を\n重ねれば重ねるほどに、それもはっきり見えてきた。
2174 = "在為了準備煤探樂園計劃而學習資料的過程中，我越來越清楚地認識到這一點。" 

# monologue
# JP: だから素直に認めれば、稀咲は――\nどういう気持ちだろうか。軽く肩を竦めてみせる。
2425 = "稀咲看到我爽快地承認後聳了聳肩，不知她在想些什麼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし議会は、マイントレジャーの方が御一夜の未来を\n託すのによりふさわしい計画だと――既に判断している」
1422 = "「但是市議會已經做出了決定——認為煤探樂園計劃才是更適合御一夜未來的計劃」" 

# monologue
# JP: 議決後すぐに、僕らも、組織としての市も動いた。
2486 = "議會表決後，整個市政府以及我們都展開了行動。" 

# monologue
# JP: 経営の受け皿となる第三セクターの設立準備も進み、\n河川敷利用の専有許可も、取得した。
2437 = "第三部門的設立準備在緊鑼密鼓地進行。我們也取得了河岸用地的專有利用許可。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すでに事態は、行政レベルで動いているのだ。\nこれを今から覆すのは、いかに元忠氏でも苦しかろう」
1397 = "「事態已經在行政層面上開始運轉了。事到如今就算是寶生元忠也無力回天了吧」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね、父もそう判断した。\nだから、覆そうとはしてない」
1715 = "「是啊，父親也是這樣認為的。所以他並沒有打算推翻這些決定」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1411 = "「什麼意思？」" 

# 【稀咲】
# display as 稀咲
# JP: 「一度は立たせて、そのあと潰す。\n――父はそれを、短期決戦で行うハラだ」
1447 = "「先讓你們一步，等建立起來之後再摧毀——父親打算速戰速決」" 

# 【双鉄】
# display as 雙鐵
# JP: 「短期決戦……とは？」
1844 = "「速戰速決……是？」" 

# monologue
# JP: 聞けば途端に、\nきょろ、と稀咲の瞳が動く。
2446 = "聽到我這麼問，稀咲用眼睛掃視周圍。" 

# 【稀咲】
# display as 稀咲
# JP: 「ここからが、聞かれてはマズイ話の中心なんだ」
1678 = "「接下來要說的話，才是真正不能讓別人聽到的機密」" 

# monologue
# JP: そして、体が寄ってくる。
2388 = "然後她慢慢靠近我。" 

# 【稀咲】
# display as 稀咲
# JP: 「すまない双鉄。耳を借りるよ――」
1675 = "「抱歉，雙鐵。耳朵湊過來一下——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「大臣視察、ですか？」
1539 = "「大臣視察？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。[けいさん,1]経産大臣と[もんか,1]文科大臣」
1592 = "「對。是經濟產業大臣和文部科學大臣」" 

# 【ポーレット】
# display as 波萊特
# JP: 「資源エネルギー庁と文化庁とをそれぞれ所轄する大臣\n……ですよね」
1454 = "「分別是管理資源能源廳和文化廳的大臣吧」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ」
# 1522 = "「嗯」" 

# monologue
# JP: 怪訝そうなポーレットの言葉はけれど、\n赤井宮司のうなずきを呼ぶ。
2376 = "波萊特有些訝異，而赤井宮司很快便理解了。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「なるほど――つまりは技術継承炭鉱の認定と、\n文化財認定とに、それぞれ権限を持っている方々ですか」
1466 = "「原來如此——也就是有權力進行技術繼承煤礦認定和文化財產認定的官員啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい。そうなります。\nその方々が、御一夜への視察を予定しておられると」
1723 = "「是的。聽說他們計劃來御一夜視察」" 

# 【ポーレット】
# display as 波萊特
# JP: 「予定？　予定って――」
1815 = "「計劃？　計劃是指——」" 

# monologue
# JP: ポーレットはまだ訝しげに首を傾げている。\nあまりにあまりな話だから、理解が及んでいないのか――
2375 = "波萊特依然訝異地歪著腦袋。看來這個消息實在太重磅，她一時還沒能理解——" 

# monologue
# JP: そうでなければ、あまりにあまりな話過ぎ、\n半ば無意識に、理解を拒んでいるのかもしれん。
2052 = "不然就是太過突然，她的潛意識在拒絕去理解。" 

# 【双鉄】
# display as 雙鐵
# JP: 「予定は、予定だ。来月十日にお二方揃って、\n御一夜への視察を“予定”しておられるそうだ」
1814 = "「計劃就是計劃。他們“計劃”在下個月１０號一起來御一夜視察」" 

# 【ポーレット】
# display as 波萊特
# JP: 「予定って！」
1412 = "「什麼？！」" 

# monologue
# JP: ポーレットの声音と顔色が一気に変わる。
2379 = "波萊特的語氣和表情突變。" 

# 【ポーレット】
# display as 波萊特
# JP: 「だって、そんな――急すぎませんか！？\n来月の十日とか、いくらなんでも」
1482 = "「可是，這也太突然了吧！？下個月十號就來，這也實在——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いくらなんでも急すぎ、準備が間に合わん。\nそれこそが、[ほうしょうもとただ,3]宝生元忠の狙いなわけだ」
1581 = "「實在太突然了，根本來不及準備。這正是寶生元忠的目的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「宝生さん――の――」
1582 = "「寶生先生的——」" 

# monologue
# JP: 困り切ってしまったように、\n表情を固くし、ポーレットが黙りこくってしまう。
2382 = "波萊特面露難色地沉默下來。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「えげつなかとねぇ」
1780 = "「真是卑鄙咧」" 

# monologue
# JP: その沈黙に響くのは、\n“忌々しい”といわんばかりの呟きだ。
2409 = "登呂流浴場老闆發出一聲彷彿夾帶怨恨的嘆息，打破了沉默。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「マイントレジャー計画ば潰そういうこつかね」
1418 = "「他是打算摧毀煤探樂園計劃唄」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ですね。視察でどうしようもないと判断されれば、\n下りるはずの認可も下りなくなる」
1721 = "「是的。如果被認為視察結果不好，那麼我們原本能夠拿到的認定也會泡湯」" 

# monologue
# JP: 術仙炭鉱の技術継承炭鉱の認可。\n赤井阿蘇神社の文化財指定。
2462 = "術仙煤礦的技術繼承煤礦認定，以及赤井阿蘇神社的文化財產指定。" 

# monologue
# JP: ――前者が得られなければ採算が極めて厳しくなるし、\n後者が得られなければ、観光客増への決め手を失う。
1124 = "——如果前者不能通過，我們的盈利會非常吃緊。如果後者不通過，就會失去吸引遊客的殺手鐧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなってしまえば、収支計画に暗雲が立ち込め――\n出資をためらうものが出てきてしまうかもしれません」
1569 = "「如果事情發展成這樣，收支計劃將失去保障——或許會有人考慮放棄出資」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「確かな話ならば至急の対策が必要となりましょうが……\nその情報の出処は？」
1439 = "「假如此事當真，我們就必須立刻準備對策才行……不過這消息是從哪獲得的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「宝生稀咲――隈元銀行御一夜支店長です」
1584 = "「寶生稀咲——隈元銀行御一夜支行長」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「宝生さんのお嬢さんですか？」
1583 = "「寶生先生的千金？」" 

# monologue
# JP: 赤井宮司が見せた驚きの表情に、\nそうであったかと思い出す。
2417 = "看到赤井宮司驚訝的表情，我才想起來。" 

# monologue
# JP: 初対面時の、ぐったりと疲れきっていた赤井宮司は――\n稀咲による工場誘致派への勧誘に辟易していたのだったか。
2436 = "第一次和赤井宮司見面時，稀咲執著地拉攏他加入工廠落戶支持派，把他整個人都累倒了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「稀咲は、日々姫の学園での先輩でもあるのです。\nそれで――」
1797 = "「稀咲同時還是日日姬學校裡的學姐，於是——」" 

# monologue
# JP: いままでの経緯をざっと話せば、\n赤井宮司は納得したように頷いてくれる。
2277 = "我將至今為止的經歷和赤井宮司說明，他點了點頭表示理解。" 

# monologue
# JP: が、ポーレットの顔はいまだ硬い。
2083 = "但波萊特表情卻依舊僵硬。" 

# 【ポーレット】
# display as 波萊特
# JP: 「どうして……\n稀咲さんはその話を、双鉄くんに？」
1741 = "「為什麼……稀咲小姐要特地把這件事告訴雙鐵君？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『伝え方が難しい』と思ったそうだ」
1547 = "「她似乎是覺得這件事“不好告知”」" 

# monologue
# JP: うかつに漏れて広がれば、動揺が動揺を呼ぶ話。\n第三セクターの設立にさえ、悪影響がでかねない話。
2523 = "這消息要是不小心洩露了，就會帶來動搖。說不定還會影響到第三部門的設立。" 

# monologue
# JP: そうと懸念した稀咲はだから、\nまず僕だけに――人払いまでして、聞かせてくれた。
2424 = "稀咲就是擔心這點，才先告訴了我——還特地選擇了四下無人的時機。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまり、僕なら最適の形を選べると思ってくれたそうだ。\nポーレット――君へと、いつ、どのように伝えるか」
1549 = "「她是覺得，我會選擇一個最合適的時間和方式告訴你」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで、ですか？」
1664 = "「所以才先告訴了你嗎？」" 

# monologue
# JP: まだ戸惑った顔をして、ポーレットは静かに視線を動かす。\n赤井宮司に、登呂流湯のご主人――
2381 = "波萊特臉上還有些困惑，她將視線轉向赤井宮司和登呂流浴場老闆——" 

# monologue
# JP: ポーレットの膝の上、ずっといい子にしてるれいなと、\n椅子の上、まったく反応を見せようとしない、ニイロクに。
2529 = "還有在她膝蓋上安分坐著的玲奈，以及坐在椅子上一動不動的二六。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで、みなさんをお呼びして……\nお呼びした上で、こういう形で、伝えてくれた？」
1660 = "「所以你就找來大家……以這樣的方式告訴了我？」" 

# monologue
# JP: 今までのポーレットなら、\nきっと飲み込んでいただろう類の、不満や疑問。
2220 = "如果是以前的波萊特，一定會將這樣的不滿和疑問藏於心中，選擇沉默。" 

# monologue
# JP: それが、今、\nスネたような、甘えたような口調の中に滲んでる。
2077 = "但她現在似乎在鬧彆扭一般，用一種撒嬌的口吻說了出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「以前のポーレットにであれば、\nもう少し、慎重に伝えていたかもしれん」
1571 = "「如果你還是以前的那個波萊特，我或許會更加慎重地轉達吧」" 

# monologue
# JP: 例えば、ふたりきりの機会を作り、\n伝えた上で落ち着かせ、そこから善後策を考えた。
2346 = "比如說，想辦法單獨約她出來，告訴她這件事之後先安撫她的情緒，然後再一起考慮對策。" 

# monologue
# JP: そうしなければ、ポーレットが判断を誤るかもと、\n僕は恐らく、懸念していたことだろう。
2218 = "如果不這麼做，我會擔心波萊特的判斷可能出現失誤。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、今のポーレットとならば大丈夫だと考えた。\n今の僕らなら、支えあい、よりよい判断を下せると」
1424 = "「但是我認為，現在的我們已經能夠坦然面對這件事。我們可以互相扶持，做出最好的判斷」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1506 = "「啊」" 

# monologue
# JP: こくり、と頷く。\n頬にわずかな赤みが差す。
2216 = "她點了點頭。臉頰有些發紅。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい！」
1725 = "「是的！」" 

# monologue
# JP: 曇りが消える。\n声も表情も晴れやかになる。
2188 = "她之前懷疑的神色一掃而空，聲音和表情都開朗如初。" 

# monologue
# JP: ポーレットにではなく、ポーレットと。\n――僕の言葉は、伝わっている。
2262 = "我並沒有單指波萊特，而是用了“我們”二字。——她聽懂了我的意思。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お三方をお呼びしたのは、この案件が、\nお三方に密接に影響するとも考えたからです」
1416 = "「今天特地叫三位來，是因為我想這件事也和你們三位密切相關」" 

# monologue
# JP: ならばこそ、\n続く言葉はポーレットには向けられない。
2297 = "既然這樣，接下來的話就不能只對波萊特一個人說了。" 

# monologue
# JP: 赤井宮司がさっき話してくれたとおりに――\n事態は最早、至急の対策を必要としているのだから。
2164 = "因為就像赤井宮司剛才說的一樣，現在必須趕緊想好對策應對大臣的考察。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「お三方――ですか」
1627 = "「我們三位……嗎」" 

# monologue
# JP: 赤井宮司の瞳が静かにニイロクの上にそそがれる。\nニイロクの口がようやく、動く。
2509 = "赤井宮司靜靜看向二六。二六沉默了一會，終於開了口。" 

# 【ニイロク】
# display as 二六
# JP: 「なんでもいい。\nもう一度でも走れるのなら、それだけでいい」
1613 = "「怎樣都好。只要能讓我再一次跑起來，其他的都無所謂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことだが――れいな、どうだ？」
1552 = "「她是這麼說的——玲奈，你呢？」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなは――ひゃっ！？」
1761 = "「玲奈——呀！？」" 

# monologue
# JP: 膝の上にすわるれいなの髪に、\nポーレットは柔らかく頬を擦り付ける。
2378 = "波萊特用臉頰輕輕蹭著玲奈的頭髮。" 

# monologue
# JP: 目をまるくするれいなへと、\n穏やかな声が染み透っていく。
2237 = "對有些不知所措的玲奈，用溫柔的聲音輕輕說道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしの望みならね？　れいな。\nれいなの『本当の望み』を、飾らず聞かせてもらうこと」
1766 = "「玲奈，你如果要問我的願望呀，那就是能聽到你說出“真正的願望”」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！」
1523 = "「嗯！」" 

# monologue
# JP: ぱっと、れいなが立ち上がる。
2391 = "玲奈唰地站起來。" 

# monologue
# JP: そしてぽてぽて、\nニイロクのもとへと歩みより、その手を両手で包み込む。
2389 = "然後小跑到二六面前，用雙手握住她的手。" 

# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ、ニイロクちゃん。\n\x%lキハ07;#00ffc040;キハ07%l;#;は、とーっても素敵な\x%l気動車;#00ffc040;気動車%l;#;なんですぅ」
1400 = "「二六你聽玲奈說哦。\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;是一輛非常棒的\\x%l気動車;#00ffc040;動車%l;#;」" 

# monologue
# JP: にこにこ、れいなは笑っている。
2396 = "玲奈滿面笑容。" 

# monologue
# JP: 無愛想を極め、凄みさえをも感じさせているニイロクに\nれいなはただただ、本当に嬉しげに話しかけてる。
2549 = "面對二六冷漠到有些嚇人的表情，玲奈還是滿心歡喜地說道。" 

# 【れいな】
# display as 玲奈
# JP: 「だかられいな、ニイロクちゃんにも走らせてほしいって\n思ってるんです。れいなとふたり、かわりばんこで」
1668 = "「所以玲奈希望讓二六也能夠再次奔跑起來。玲奈和二六，我們兩個輪換」" 

# 【ニイロク】
# display as 二六
# JP: 「なら」
1870 = "「那麼」" 

# monologue
# JP: ニイロクはまるで動かない。
2061 = "二六紋絲不動。" 

# monologue
# JP: 立ち上がりもせず、\n握られた手を握り返す素振りも見せない。
2292 = "既沒有站起來，也沒有回握玲奈的手。" 

# 【ニイロク】
# display as 二六
# JP: 「ならば、自分は」
1871 = "「那麼，我——」" 

# monologue
# JP: けれども、熱を帯びている。\n声は確かに、今までと色を変えている。
2079 = "但她的聲音卻帶著溫度，與之前的完全不同。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、ポーレットにお願いします。\nそれから、赤井宮司さんにもお願いします」
1765 = "「玲奈在這裡拜託波萊特，還有赤井宮司」" 

# monologue
# JP: ふかぶか、れいなが頭を下げる。
2394 = "玲奈深深地低下了頭。" 

# 【れいな】
# display as 玲奈
# JP: 「れいなとキハ[レイナナ,1]07を改修させてください。\nガソリン\x%l気動車;#00ffc040;気動車%l;#;の――昔の姿に」
1818 = "「請允許玲奈和Ｋｉｈａ０７進行改造。變回原來的樣子，原來的——汽油\\x%l気動車;#00ffc040;動車%l;#;」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん！」
# 1523 = "「嗯！」" 

# monologue
# JP: 恐れず、迷わず、一瞬たりともためらわず。\nポーレットはれいなの望みに答える。
2377 = "波萊特毫不猶豫、毫不恐慌地答應了玲奈的請求。" 

# monologue
# JP: けれどもれいなは頭をまだあげぬまま、\n望みを――懸命に紡ぎ続ける。
2084 = "但玲奈依然沒有抬頭，依舊真摯地說出自己的願望。" 

# 【れいな】
# display as 玲奈
# JP: 「それで、ニイロクちゃんにも――\nれいなのバックアップデータ、あげてください」
1751 = "「然後，請讓二六也能共享玲奈的回滾記錄」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「私に――否やがあろうはずもありません。\nこれでこいつが、再び走れるというのなら――」
1636 = "「我怎麼會不答應呢。只要能讓她再次奔跑——」" 

# monologue
# JP: 赤井宮司が、れいなに近づく。
2508 = "赤井宮司走近玲奈。" 

# monologue
# JP: 躊躇せず床に膝をつき、\nれいなより深く頭を下げて、お辞儀の頭を持ち上げさせる。
2071 = "他毫不猶豫地正坐在玲奈面前，將頭低得比她還要低，讓玲奈不由得抬起頭。" 

# 【れいな】
# display as 玲奈
# JP: 「ふわわっ！？　やめてくださいよぉ」
1491 = "「哇哇！？　請不要這樣」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「感謝します。れいなさん。\nこいつに――そこまでを許してくれて」
1464 = "「十分感謝你，玲奈小姐。謝謝你願意接受她」" 

# 【れいな】
# display as 玲奈
# JP: 「そんなの、あたりまえですよぉ」
1771 = "「玲奈，當然願意呀」" 

# monologue
# JP: ぽわっと、やわらかにれいなが笑う。
2400 = "玲奈高興地笑了起來。" 

# monologue
# JP: やわらかに、あたたかに――今までのれいなと変わらずに、\nけれども、少しだけ大人びて。
2533 = "那笑容又柔和又溫暖——和至今為止的玲奈別無二致，但卻平添了幾分成熟。" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、ニイロクちゃんのおねーさんなんですからぁ」
1533 = "「因為，玲奈可是二六的姐姐呀」" 

# monologue
# JP: （ああ……そうか）
2572 = "（啊……對啊）" 

# monologue
# JP: ハチロクがれいなを想ったように、\nれいなもニイロクを想ったのだ。
2239 = "就像八六會關心玲奈一樣，玲奈也在關心著二六。" 

# monologue
# JP: \x%lレイルロオド;#00ffc040;レイルロオド%l;#;も、繋がっている。\n僕ら人間と変わらずに――あるいはそれより、なお強く。
86 = "\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;之間也像人類一樣彼此相連——或者說更甚於人類。" 

# 【ポーレット】
# display as 波萊特
# JP: 「と、いうのがわたし達の希望なんですけれど――\n技術的には、どうでしょうか？」
1840 = "「這就是我們一致的想法——不過技術上可行嗎？」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「ノーリスクとはいかんばい。れいなの記憶に何らかの\n障害が出る危険性があるけんね」
1619 = "「我不能打包票說一定不會出問題。這可能會給玲奈的記憶帶來問題」" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいなは――どう？」
1760 = "「玲奈——你是怎麼想的？」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、それでもへいちゃらです」
1600 = "「就算這樣，玲奈也不在乎」" 

# 【れいな】
# display as 玲奈
# JP: 「だって、もしもれいなが、今のれいなと違っちゃっても\nポーレットは、それから、そうてつさんも」
1532 = "「因為就算玲奈不是現在的玲奈了，波萊特還有雙鐵先生也會像現在這樣——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「もちろんよ、れいな」
1841 = "「這是當然的，玲奈」" 

# monologue
# JP: 僕も頷く。\nれいなの瞳をまっすぐ見つめる。
2264 = "我也跟著點頭，注視著玲奈的眼睛說道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「変わらず接する。\n今のれいなと、おんなじに」
1386 = "「不管玲奈變成什麼樣，我都會像現在這樣同玲奈相處的」" 

# monologue
# JP: 僕らは絆をもっている。
2268 = "我們之間已經建立起了紐帶。" 

# monologue
# JP: 記憶に障害が出たとして、それは大きな不幸だろうが――\n僕らの絆を、決して断ち切れるものでは無い。
2221 = "如果玲奈的記憶出現了問題，那毫無疑問是一場悲劇。但我們之間的紐帶卻絕不會就此斷絕。" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ！」
# 1523 = "「嗯！」" 

# monologue
# JP: 笑顔が弾ける。\nれいなの言葉は、自信に満ちる。
2398 = "玲奈笑著回答。她的話語充滿自信。" 

# 【れいな】
# display as 玲奈
# JP: 「だかられいな、なぁんにもこわくありません」
1667 = "「所以玲奈一點都不害怕」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「なら、そいはそいでよか。\nで――」
1693 = "「既然這就好咧。那麼——」" 

# 【ニイロク】
# display as 二六
# JP: 「何を失っても構わん。\nだから、再び走らせてくれ」
1745 = "「無論失去什麼都無所謂。所以，請讓我再次奔跑在鐵路上」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「こいつの望むとおりに――どうか」
1677 = "「拜託您——實現她的願望」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「話がはやかね――」
1848 = "「還真爽快——」" 

# monologue
# JP: メモ帳の一枚がやぶられて、\n何かが手早く書き付けられる。
2408 = "登呂流浴場老闆扯下一頁筆記紙，迅速在上面寫著什麼。" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「なら、こいが見積もりばい」
1872 = "「那麼，這就是預算」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……」
# 1151 = "「……」" 

# monologue
# JP: ”二十万円\n（データ操作一件十万円・二件）”
1132 = "”二十萬日元（數據調整一次十萬日元Ｘ２）”" 

# monologue
# JP: ごくシンプルな見積もりだ。\nなのにポーレットは、ひどく驚いた顔をしている。
2546 = "非常簡單易懂的預算表。但波萊特看完以後卻十分吃驚。" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%lレイルロオド;#00ffc040;レイルロオド%l;#;の調整だけだって、\nとてもこんなお値段じゃ」
1595 = "「就算只是調整\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;，但這個價錢也太低——」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「払えるようになったら、もっと稼がせてもらうけん。\n今回んとこは、それでよかとよ」
1799 = "「等你們付得起了，我會多收一點咧。這次就算你們便宜點」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ――ありがとうございます！」
1502 = "「啊——謝謝您！」" 

# 【登呂流湯主人】
# display as 登呂流浴場老闆
# JP: 「で、いつからとりかかっと？\nこっちゃ、いつからでもよかけん」
1866 = "「那要什麼時候開始動工？咱倒是隨時都可以」" 

# 【ニイロク】
# display as 二六
# JP: 「ならば今すぐ――今すぐに」
1857 = "「那就現在——現在馬上」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなも、それで平気ですよぉ」
1763 = "「玲奈也做好準備了」" 

# monologue
# JP: こくりと、ポーレットも頷く。\nそれだけでもう、話が決まる。
2374 = "波萊特也點了頭。這件事就這麼定了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「であるのならば、つきそってやれ」
1853 = "「那你就陪在她身邊吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1523 = "「嗯！」" 

# monologue
# JP: ほんの一瞬、青い瞳が僕を見る。\n頼りたそうに、甘えたそうに――
2380 = "波萊特稍稍看了我一眼。如撒嬌一般的眼神，彷彿期待著我的陪伴——" 

# monologue
# JP: けれどもそれはすぐさまに、\n笑顔を浮かべ閉じたまぶたに、隠される。
2075 = "但她很快又笑著閉上了眼睛，藏起了她的小心思。" 

# 【ポーレット】
# display as 波萊特
# JP: 「その間、双鉄くんには――\nいろいろ、お願いしちゃいますね」
1869 = "「那這段時間內的各種事務——就拜託雙鐵君了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1522 = "「嗯」" 

# monologue
# JP: ともかく、準備の時間が足りない。\nすぐ取り掛かれる部分なら、そうしなければ間に合わない。
2443 = "總之，時間已經不多了。一些能立即開始的準備工作必須儘快著手處理，不然就來不及了。" 

# 【ニイロク】
# display as 二六
# JP: 「清春」
1740 = "「清春」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ」
# 1522 = "「嗯」" 

# monologue
# JP: それだけで、意志の疎通が出来たのだろう。\n赤井宮司は、まっすぐに僕へと向き直る。
2088 = "僅憑這一句，他們就明白了對方的意思。赤井宮司轉身看向我。" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「私にも、何かできることがあれば言って下さい」
1573 = "「如果有什麼需要我做的，請儘管開口」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大臣視察までに、パンフレットを作成したいと思います。\n日々姫にも協力をしてもらって――」
1639 = "「我想為大臣視察準備說明冊子。我也會去拜託日日姬幫忙」" 

# monologue
# JP: 言いながら、ひとつアイディアを思いつく。
2482 = "說著，我又想到了一個主意。" 

# monologue
# JP: そうだった。これも確かに――\n頼まれていた“日ノ本一”だと。
2236 = "對了。這也是我們之前說過的“日本第一”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ですので、キジウマに関する画像資料を、できるだけ。\n他の面でも、活用させてもらいたく思いますので」
1663 = "「所以希望您能多準備一些雉子馬的照片。我也想用在其他地方」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「わかりました。抜き出して整理しておきましょう。\n他には？」
1698 = "「明白了。我會整理出來的。其他的呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今はひとまずそれだけで。むしろ赤井宮司には――\nニイロクの改修完了後、ご活躍願いたく思っております」
1772 = "「現在先只有這些。不過等二六改造完畢後，還要請赤井宮司您多多幫忙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すみません。こんな時間に来ていただいて」
1673 = "「抱歉。這種時間還要勞煩您來一趟」" 

# 【永山】
# display as 永山
# JP: 「全然。だって、お弁当の話なんでしょう？」
1732 = "「沒有的事。是要商量便當的事對吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
1724 = "「是的」" 

# 【日々姫】
# display as 日日姬
# JP: 「お弁当？」
1437 = "「便當？」" 

# monologue
# JP: 僕の正面に座る日々姫が、意表をつかれた顔をする。
2178 = "坐在我正面的日日姬一臉不解。" 

# monologue
# JP: なにせ、家族だ。[いもうと,1]義妹だ。\n細かな事情の説明は、最後回しにさせてもらった。
2402 = "畢竟日日姬是自家人。我沒有太著急把事情的細節告訴她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。観光振興の、重要な一助となろうかと考え、\n『御一夜市らしい駅弁』の開発をお願いしているのだ」
1733 = "「沒錯。我認為這是旅遊復興計劃重要的一環，因此拜託永山女士開發出一款具有御一夜特色的鐵路便當」" 

# monologue
# JP: そこから切り出し、ざっと日々姫に説明していく。
2266 = "我以此為切入點，向日日姬作了簡單的說明。" 

# monologue
# JP: しかし……まぁ、今にして振り返ってみるのなら、\nこの駅弁づくりの話から、全てが回り出した気もする。
2057 = "不過回過頭來一想，說不定整個煤探樂園計劃，都是從做便當開始的。" 

# 【日々姫】
# display as 日日姬
# JP: 「じゃ、わたしは駅弁のパッケージ描けばよかとねー」
1862 = "「那我要畫的就是便當的包裝紙唄」" 

# 【永山】
# display as 永山＆雙鐵
# JP: 「“\x%l掛け紙;#00ffc040;掛け紙%l;#;”」
1700 = "「是“\\x%l掛け紙;#00ffc040;封紙%l;#;”」" 

# monologue
# JP: 思いもかけぬステレオで、業界用語（？）の説明を受け、\n日々姫はアハハと苦笑する。
2321 = "日日姬沒有想到我和永山女士會異口同聲說出一個專業術語，不由得苦笑起來。" 

# monologue
# JP: そしてスケッチブックを広げ、一転――\n真剣な顔で問いかけてくる。
2213 = "她翻開素描簿，瞬間變得嚴肅起來，一臉認真地問道。" 

# 【日々姫】
# display as 日日姬
# JP: 「で？　そん駅弁の――んんっ――\nその駅弁の\x%l掛け紙;#00ffc040;掛け紙%l;#;、どんな絵柄にするんです？」
1749 = "「然後呢？　你們那什麼便當——咳咳——你們的鐵路便當，\\x%l掛け紙;#00ffc040;封紙%l;#;要畫成什麼樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて――それなのだが。僕は“キジ馬”を、\nひとつのキーにできないだろうかと考えている」
1727 = "「是這樣的。我在考慮能不能以“雉子馬”作為便當的主題」" 

# monologue
# JP: ふん、と永山夫人の鼻が鳴る。
2357 = "永山女士饒有興趣地哼了一聲。" 

# 【永山】
# display as 永山
# JP: 「まぁ、妥当よね。赤井さん、それで文化財申請でしょ？\nでも……キジウマ……鶏肉と馬肉？」
1524 = "「嗯，好主意。我記得赤井先生要用這個來申請文化財產來著？不過……雉子馬便當要怎麼做呢……用雞肉和馬肉？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでも良いのですが――キジウマは、\nせっかくこんなに可愛らしい物ですので」
1877 = "「雖然這樣也可以，但既然雉子馬是這麼可愛的玩具——」" 

# monologue
# JP: 赤井宮司からコピーをもらった、\n画像資料を広げて見せる。
2275 = "我向她們展示了從赤井宮司那裡影印來的照片資料。" 

# monologue
# JP: 見慣れたキジウマの姿もあれば、\n細身の物も、太いのも居る。
2121 = "其中既有我們熟悉的雉子馬形象，也有瘦一點的和胖一點的雉子馬。" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば、なにかの食材を、\nキジウマに見立てることは出来ないでしょうか？」
1730 = "「比如說，能把某種食材做成雉子馬的樣子嗎？」" 

# 【永山】
# display as 永山
# JP: 「鮎……鮎の甘露煮」
1883 = "「香魚……香魚甘露煮」" 

# monologue
# JP: 打てばすぐさま、夫人が響いてくれる。\nその目は、写真資料の上に釘付けだ。
2270 = "我剛問完，永山女士便想到了主意。她的那雙眼睛緊緊盯著照片。" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！　それいいかも！！\n鮎も、御一夜の超名物だし」
1508 = "「啊！　這個不錯！！香魚也是御一夜的一大特色」" 

# monologue
# JP: いうやいなやで、日々姫の手が猛烈な勢いで動き始める。
2198 = "她剛說完，就在素描簿上飛快畫了起來。" 

# monologue
# JP: （ああ……そういえばそうだったな）
2574 = "（啊……這麼一說我才想起來）" 

# monologue
# JP: 甘露煮だけでなく、もちろん塩焼き、燻製に――
2170 = "在御一夜，香魚不光可以做成甘露煮，還可以做成烤魚和燻魚——" 

# monologue
# JP: 変わった所では鮎寿司なども、\n御一夜では普通に食べられている。
2123 = "其中某些人家甚至還會把香魚做成壽司。" 

# 【永山】
# display as 永山
# JP: 「なんで気づかなかったんだろう――見慣れすぎかな。\nとにかく、鮎の甘露煮よ。あと、人参の煮物ね」
1637 = "「我怎麼沒想到呢——可能是因為太常見了。香魚甘露煮，就定這個了。再加上煮胡蘿蔔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、人参の煮物が車輪ですか！　それはいい。\n味的にも、相性ばっちりに思えますし」
1467 = "「原來如此，把切成片的煮胡蘿蔔當成雉子馬的輪子！　這個好。而且味道應該也很撘」" 

# 【永山】
# display as 永山
# JP: 「もちろん、ばっちりにまとめるの。\nこっちは、それが仕事なんだから」
1648 = "「我當然會把二者好好搭配起來。這可是我的本行工作」" 

# 【日々姫】
# display as 日日姬
# JP: 「良しっ！　にぃに――んんっ！　兄さん。\nこんな感じでどうでしょう？」
1556 = "「好了！　阿哥——不對……哥哥，你看這樣如何？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もう描いたのか！？」
1603 = "「已經畫好了！？」" 

# 【日々姫】
# display as 日日姬
# JP: 「当然ですよ？\nこっちは、これが仕事ですから」
1865 = "「那當然，這可是我的本行工作啊」" 

# monologue
# JP: 永山夫人の言葉をしれっと真似ながら、\n日々姫はスケッチブックの中身を僕らに見せる。
2319 = "日日姬故意模仿了一遍永山女士說過的話，把素描簿拿給我看。" 

# 【日々姫】
# display as 日日姬
# JP: 「キジ馬のそのままとか、擬人化とか、\n萌えキャラ化とかも考えてたんですけど、イマイチで」
1651 = "「我考慮過直接畫一個雉子馬，或者畫成吉祥物、擬人化等等，不過都不滿意」" 

# monologue
# JP: かなり前から、描いては消してくれてたのだろうか？\nいくつものラフスケッチの上にはバツがつけられている。
2193 = "她似乎早就開始構思雉子馬的形象了。我看到好幾張打了叉的草圖。" 

# monologue
# JP: 素人の僕にはなかなかによいものに思えるのだが、\n日々姫がイマイチというのなら、そうなのだろう。
2173 = "在我這個門外漢眼中每一張都挺好的，但既然日日姬說不行，應該就是還不夠好吧。" 

# 【日々姫】
# display as 日日姬
# JP: 「で。今ので来ました。アイディアをくるん！　て。\nキジ馬なんだし、馬にしちゃえばよかったんだって」
1805 = "「聽了哥哥剛才的話，我頓時靈光一閃。既然叫雉子馬，那就畫成馬好了」" 

# 【永山】
# display as 永山
# JP: 「馬……なら、上に誰かが乗るの？」
1686 = "「既然是馬……上面要有人騎嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「そうです！　大正解。\n上には、クマ川ですから当然」
1594 = "「對！　就是這樣。咱們既然有隈河，騎在上面的當然就是——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「クマか」
1149 = "「“隈”和“熊”發音相同，熊騎在上面嗎」" 

# 【日々姫】
# display as 日日姬
# JP: 「そう！　その名も――じゃじゃん！\n『キジクマ』ちゃん！」
1734 = "「沒錯！　名字就叫——“雉子熊”！」" 

# 【永山】
# display as 永山
# JP: 「わお」
1493 = "「哇哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは――単純にかわいいな」
1847 = "「還真是可愛」" 

# monologue
# JP: キジ馬の上にクマが乗ってる。\nヘルメットにツルハシ――鉱夫姿で、自信満々な顔をして。
2140 = "只見一頭熊騎在雉子馬上，像個礦工一樣戴著安全帽拿著十字鎬，滿臉自信。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それに――どこか懐かしくもある」
1803 = "「而且這熊——總感覺在哪見過」" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへっ」
1496 = "「哎嘿嘿」" 

# monologue
# JP: ああ。そうだ。くまくまだったか――\n出会って間もないころの日々姫の、友達だったぬいぐるみ。
2235 = "對了。是熊熊——我小時候剛和日日姬認識的時候，她的那隻布偶熊。" 

# monologue
# JP: 姿形はまるで違うが……\nあどけない目が、なんとなくあれを思い出させる。
2540 = "雖然外表不太相似……但這雙天真爛漫的眼睛讓我想起了它。" 

# 【双鉄】
# display as 雙鐵
# JP: 「鉱夫姿ということは、\nマイントレジャーにも絡ませるのだな？」
1689 = "「既然畫成礦工的樣子，那就是把煤探樂園的元素也加入進去了吧？」" 

# 【日々姫】
# display as 日日姬
# JP: 「前からそれも考えてましたし……\nさっき、にぃに――兄さん、キーって言いましたから」
1633 = "「我從以前就在考慮這個了……加上剛才阿哥——哥哥說想把這個作為主題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。僕としては大賛成だ。無論、\nポーレットたちの意見も聞かねばなるまいが」
1519 = "「嗯。我是很喜歡這個設計。當然還要問一下波萊特她們的意見」" 

# 【日々姫】
# display as 日日姬
# JP: 「えへへっ！　それじゃ、永山さんはどうですか？」
1497 = "「哎嘿嘿！　那永山女士覺得這個怎麼樣？」" 

# 【永山】
# display as 永山
# JP: 「オッケ。来たこれ」
1892 = "「ＯＫ。我也湧出點子了」" 

# monologue
# JP: 日々姫の問いに顔もあげずに。
2550 = "面對日日姬的詢問，永山女士沒有抬頭。" 

# monologue
# JP: 夫人は夫人で、何やらメモを――\nレシピを、猛烈な勢いで書き付けている。
2190 = "她也以極快的速度在紙上寫著什麼。" 

# 【永山】
# display as 永山
# JP: 「石炭でしょ？\n黒ゴマを衣に混ぜた、“石炭唐揚げ”」
1812 = "「要表現煤礦對吧？外衣裹上黑芝麻的“煤炭炸雞”怎麼樣？」" 

# 【日々姫】
# display as 日日姬
# JP: 「わ！　それ美味しそうっ！」
1495 = "「哇！　聽起來就很好吃！」" 

# 【永山】
# display as 永山
# JP: 「あとはクマならはちみつね。甘露煮にはちみつ使って、\nデザートにも、はちみつとゆずのゼリーをつける」
1690 = "「既然說到熊，那蜂蜜肯定是必不可少的。就用蜂蜜來做甘露煮，甜點也用蜂蜜柚子布丁」" 

# 【日々姫】
# display as 日日姬
# JP: 「すごい、ぜんぶ御一夜の特産！」
1560 = "「好厲害，這些都是御一夜的特產！」" 

# 【永山】
# display as 永山
# JP: 「箸休めにこれも特産のわさび漬けで――\nお米も隈元米で、地産地消の名物駅弁できあがり」
1817 = "「調節口味的小菜也用特產醃山葵——米也要用隈元米。這樣，自產自銷的當地特色鐵路便當就完成了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお……お」
1500 = "「哦哦……哦」" 

# monologue
# JP: 連鎖だ。\n極めて良い連鎖が生まれた。
2544 = "非常好的良性循環開始了。" 

# monologue
# JP: 日々姫と永山夫人とは、\nお互いに刺激しあってくれた。
2314 = "日日姬和永山女士從對方那裡獲得了創意和靈感。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは――いけそうな気がするな」
1655 = "「我覺得——這個可以啊」" 

# 【永山】
# display as 永山
# JP: 「そ？　なら試作するわね。\n材料も吟味したいし――、一週間もらえるかな？」
1719 = "「是嗎？　那我就試做一下。還要考慮一下用什麼材料……給我一週時間可以嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかりました。では、一週間後で」
1650 = "「我知道了。那就一週後見」" 

# monologue
# JP: この差し迫った日程の中だ。\n一週間を待つのはいささか気が急くが――
2403 = "畢竟目前日程緊迫。要等一週會讓我有些心急——" 

# monologue
# JP: その分、きっちり作りこんでもらい、\n一発で決めることができれば、その方がむしろ有り難い。
2080 = "但是慢工出細活，如果永山女士能夠一次搞定，那反而是為我節省了時間。" 

# 【永山】
# display as 永山
# JP: 「おっけ。じゃ、一週間後の今日のお昼に、\n市役所に持って行くわね」
1894 = "「ＯＫ。那七天後的中午，我會把試作品送到市政府辦公室」" 

# 【双鉄】
# display as 雙鐵
# JP: 「了解しました。よろしくお願いします」
1562 = "「好的。就拜託您了」" 

# 【日々姫】
# display as 日日姬
# JP: 「じゃ、私もそれまでにもうちょっとまとめとく」
1860 = "「那我也利用這些時間把草稿細化一下」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまんが、それもよろしく頼む」
1820 = "「謝謝，也麻煩你了」" 

# 【日々姫】
# display as 日日姬
# JP: 「って、にぃに？　出かけるの？」
1490 = "「咦，阿哥？　你還要出門？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。慌ただしくて申し訳ない」
1711 = "「是啊。匆匆忙忙的真對不起」" 

# 【永山】
# display as 永山
# JP: 「そういうもんでしょ？　こういうときは」
1842 = "「這種時候，忙是應該的吧？」" 

# monologue
# JP: 言って、僕より一足早く、永山夫人は去っていく。
2485 = "說著，永山女士先我一步離開了房間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、だな。――そういうもんだ」
1709 = "「是啊……忙是應該的」" 

# monologue
# JP: 話がひとつまとまったなら、\n次のひとつをまとめるのみ。
2294 = "既然已經談妥一件事，那就得趕快去談下一件事。" 

# monologue
# JP: そうしなければ、\n“足りぬ準備”すら整えられない。
2053 = "不然的話，就要連“準備不足”都算不上了。" 

# 【日々姫】
# display as 日日姬
# JP: 「そういうもんって……何してくるの？」
1610 = "「忙是應該的……哥哥要去忙什麼呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠さんのところにもご相談だ。\n職人まわりを、できる限りまとめていただきたいのでな」
1653 = "「我要去找蓑笠先生談談，得請他儘快跟工匠們談妥」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、マイントレジャーの宝箱？」
1511 = "「啊，那個煤探樂園的寶箱？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1522 = "「嗯」" 

# monologue
# JP: それだけではない。\n\x%lキハ07;#00ffc040;キハ07%l;#;の改修にともなっての、車体側での実作業。
2049 = "不光是這個，還有\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;車體部分的改造。" 

# monologue
# JP: そこにも必ず、\n蓑笠さんの手腕と人脈は必要となる。
2522 = "這必須要用到蓑笠先生的工匠技能和人際關係。" 

# 【日々姫】
# display as 日日姬
# JP: 「そっか……にぃにも大変だね。ほんとに」
1716 = "「是嗎……阿哥也真是夠辛苦的啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1854 = "「那倒沒有」" 

# monologue
# JP: 大変ではない。\nわずかたりとも。
2261 = "我一點也不夠忙，一點也不夠。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大部分は、ポーレットに任せておけるからな。\n僕は、その隙間を埋めればいいだけだ」
1544 = "「大部分都是波萊特在處理。我只需要為她鋪平道路就好」" 

# monologue
# JP: それが楽しい。充実している。
2524 = "這讓我感到非常快樂，非常充實。" 

# monologue
# JP: 安心しきって、無防備な背中を預けておける。\nそうした相手がいることが、ただ単純に幸せだから。
2163 = "因為可以放心把背後交託給信任之人。有她在身後支持著我，讓我感到非常幸福。" 

# 【日々姫】
# display as 日日姬
# JP: 「あー……そっか。そうだよね。\nわかってたけど、やっぱそういうことだよね――うん！」
1505 = "「啊……是啊。也對。雖然我早就猜到了，果然是這樣嗎——嗯！」" 

# monologue
# JP: （ばしんっ！！）
2576 = "（啪！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1889 = "「！！！」" 

# monologue
# JP: 背中に痛み。\n思いがけぬほど強烈な。
2046 = "一陣劇痛從背後傳來，疼痛遠遠超出我的預料。" 

# monologue
# JP: 日々姫が僕の背中を思い切り平手で打って――
2328 = "是日日姬拍了我的後背——" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫――なに、を」
1696 = "「日日姬——你幹什麼」" 

# monologue
# JP: 重ねた\x%l機関助士;#00ffc040;機関助士%l;#;経験が、\n日々姫に力を――単純な腕力を養わせたらしい。
2316 = "日日姬接受了\\x%l機関助士;#00ffc040;司爐%l;#;的訓練後，似乎讓她的手勁大了不少。" 

# monologue
# JP: 衝撃と驚きのあまりの強さに、\n苦情の言葉さえ切れ切れになる。
2428 = "突如其來的疼痛，使我連抱怨的話都說得斷斷續續。" 

# 【日々姫】
# display as 日日姬
# JP: 「なにって……後押しですよ？　にいさん。\nかわいい、[にい,1]義兄さんの[いもうと,1]義妹の」
1410 = "「什麼幹什麼……這是可愛的義妹在給哥哥打氣哦」" 

# monologue
# JP: まだひりひりと痛む背中を、\n日々姫がぐいぐい押してくる。
2484 = "說著，日日姬開始用力推我火辣辣的後背。" 

# monologue
# JP: おでこまで背中に押し付けて、\n僕にまったく――振り返ることを許さない。
2531 = "還用額頭頂著我，完全不讓我回頭。" 

# 【日々姫】
# display as 日日姬
# JP: 「ほおら、さっさと行ってください！\nいって、幸せになってください」
1558 = "「好了，趕緊出發吧！去用雙手抓住幸福吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ。\n言われずとも行ってくる」
1514 = "「嗯、嗯。你不說我也會走的」" 

# monologue
# JP: （トっ！）
2570 = "（咚！）" 

# monologue
# JP: 背後のふすまを閉められる。
2455 = "背後的門被重重拉上。" 

# monologue
# JP: その向こうから――何をはしゃいでいるのだろうか？\n日々姫の明るい声が聞こえる。
2538 = "門背後的日日姬不知為何，似乎很興奮的樣子。我聽到她用歡快的聲音說道。" 

# 【日々姫】
# display as 日日姬
# JP: 「いってらっしゃい！\n――バイバイ、にぃに」
1381 = "「一路順風！——拜拜，阿哥」" 
