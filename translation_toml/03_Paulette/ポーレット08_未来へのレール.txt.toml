2924 = "我們離開旅館的時候，波萊特收下了她給的飯糰，還有一封給光的信。" 

# 【真闇】
# display as 真闇
# JP: 「『お姉さんがこけしをいじめてないって、\nわかってくれて、ありがとう』」
1470 = "「“大姐姐並不是故意要欺負木芥子的，謝謝你對大姐姐的理解”」" 

# 【ひかり】
# display as 光
# JP: 「れいなこけしがおしえてくれたのー」
2265 = "「是玲奈木芥子告訴光的哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのか」
1961 = "「原來是這樣呀」" 

# 【ひかり】
# display as 光
# JP: 「んふー。そーなのー」
2074 = "「嗯，是啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「れいなこけしば、仲居さんのこと、\nどぎゃんふーにゆーとったと？」
2341 = "「玲奈木芥子是怎麼說服務員小姐的啊？」" 

# 【ひかり】
# display as 光
# JP: 「あのね、『ひかりちゃんとれいながおしゃべり\nできるよーに、おてつだいしてくれたですぅ』って」
1938 = "「其實呢，她對光說“服務員小姐是想幫助小光和玲奈說話的”」" 

# monologue
# JP: ……ポーレットがあずかった手紙にも、\nそうしたことが、平易に、丁寧に綴られていた。
1446 = "……波萊特收到的信裡面，也簡潔而禮貌地寫了類似的話。" 

# monologue
# JP: ゆえにひかりは、ポーレットに字を習いながら\nいっしょうけんめい返事をしたため、送ったのだ。
2959 = "所以，光一邊和波萊特學寫字，一邊努力地寫出了回信，寄給了旅館。" 

# 【真闇】
# display as 真闇
# JP: 「『ひかりちゃんを驚かせちゃったことを\nゆるしてもらえて、とっても嬉しくてほっとしてます』」
1473 = "「“對當時我嚇到你一事，能得到你的原諒，我感到非常高興而安心”」" 

# 【ひかり】
# display as 光
# JP: 「ひかり、そんなにびっくりしなかったのー。\nただ、やぁんっておもっちゃっただけなのー」
1917 = "「光其實也沒有怎麼被嚇到。只是感覺很討厭而已」" 

# 【双鉄】
# display as 雙鐵
# JP: 「やぁんと思ったことを許せるのは、立派なことだ。\nまさに、おねえさんのふるまいだ」
1944 = "「別人做了讓你覺得很討厭的事，你能原諒她，也很了不起。完全是一副小姐姐的樣子」" 

# 【ひかり】
# display as 光
# JP: 「うふふー」
1990 = "「呵呵呵」" 

# monologue
# JP: 頭を撫でれば、心地よさげに瞳が細まる。
2942 = "我摸摸她的頭，她舒服地眯細了眼睛。" 

# 【真闇】
# display as 真闇
# JP: 「『またぜひ、今度はさくらの季節や、すいかの季節や、\nもみじの季節に、なるこに遊びにきてください』」
1475 = "「“希望等到了櫻花綻放的季節，西瓜收穫的季節，紅葉漫山的季節，你能再來鳴子玩”」" 

# 【ひかり】
# display as 光
# JP: 「ひかり、いくのー！　それでね、ひかりてつどう、\nゆけむりてつどうに のりいれするのー！」
1919 = "「光想去！還有，光鐵路要跟湯煙鐵路相連！」" 

# monologue
# JP: 元気いっぱいのひかりの返事に、\n真闇姉もにっこり笑う。
3082 = "聽到光充滿精神的回答，真闇姐也露出了笑容。" 

# 【真闇】
# display as 真闇
# JP: 「『そのときを、楽しみにしています。\n[なるこおんせんきょう,4]鳴呼温泉峡　[しちせいろう,2]七星楼。[ふかうら,1]深浦ななえ』」
1476 = "「“衷心期待那一天的到來。鳴子溫泉峽，七星樓，深浦七惠”」" 

# 【ひかり】
# display as 光
# JP: 「そのときは、ななえおねーさんものせてあげるのー」
1952 = "「到時候，光要請七惠姐姐也乘上\\x%lD53;#00ffc040;Ｄ５３%l;#;試試」" 

# 【真闇】
# display as 真闇
# JP: 「よかね。まーねーちゃんのことも乗せてね？」
2111 = "「好啊。讓真闇姐姐也坐上去試試吧」" 

# 【ひかり】
# display as 光
# JP: 「のせたげるのー！」
1923 = "「光會的！」" 

# 【日々姫】
# display as 日日姬
# JP: 「って、真闇姉ばっかりずるかとー！\nひかりちゃん、ひびちゃんは？」
2044 = "「喂，怎麼光顧著真闇姐了呢！小光，那我呢？」" 

# 【ひかり】
# display as 光
# JP: 「ひびたんはねー、\nひかりてつどうのきかんじょし！」
2238 = "「日日姐呢，要當光鐵路的司爐！」" 

# 【日々姫】
# display as 日日姬
# JP: 「わ！　引き抜かれちゃった！！」
2015 = "「哇！我被挖角了！！」" 

# monologue
# JP: 日々姫は勝ち誇った目で真闇姉を見る。
2986 = "日日姬用獲勝般的眼神看起來真闇姐。" 

# 【日々姫】
# display as 日日姬
# JP: 「うふふ～、私は～ひかりちゃんのパートナー♪」
1996 = "「呵呵呵，我是小光的搭檔？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは困るな。\nハチロクもさぞ――」
2429 = "「這我可不好辦了。八六一定也……」" 

# monologue
# JP: 言った瞬間、思い出す。\n日々姫とふたり、真正面から見つめ合う。
3102 = "說出這句話的瞬間，我忽然想起一件事。我與日日姬不約而同地望向了對方。" 

# 【日々姫】
# display as 日日姬
# JP: 「ハチロク！」
1935 = "「八六！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いかん。うっかりとくつろいでしまった」
1861 = "「不好。一不小心太放鬆，把正事忘了」" 

# 【日々姫】
# display as 日日姬
# JP: 「待ってて、にぃに！　30秒で着替えてくるけん！！」
2365 = "「等會，阿哥！給我半分鐘，換個衣服！！」" 

# 【ひかり】
# display as 光
# JP: 「そーだったそーだった」
2145 = "「對哦對哦」" 

# monologue
# JP: のんびり言って、\nひかりもリュックを背負って立って――
2720 = "光不緊不慢地說著，也背上背包，站起身。" 

# 【真闇】
# display as 真闇
# JP: 「ああ、ひかちゃん。これば、忘れたらいけんよ」
2040 = "「啊，小光。這可不能忘記帶咯」" 

# 【ひかり】
# display as 光
# JP: 「わ！　あぶなかったのー」
2014 = "「哇！好險好險」" 

# monologue
# JP: ポーレット譲りの几帳面さで、\nひかりは下ろしたリュックの中身を一度、全部出す。
2740 = "光繼承了波萊特的認真性格。她放下背包，從裡面拿出所有的東西。" 

# monologue
# JP: そうして真闇姉から受け取った手紙を絵本に挟み、\nまたきちきちとしまいなおす。
3046 = "然後把真闇姐給她的信夾進繪本，又認認真真把所有東西收進背包。" 

# 【日々姫】
# display as 日日姬
# JP: 「おまたせ！　にぃに、ひかりちゃん！！」
1871 = "「久等了！阿哥、小光！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。では向かうか」
2067 = "「嗯。那我們走吧」" 

# 【ひかり】
# display as 光
# JP: 「むかうのー！」
2405 = "「走吧！」" 

# monologue
# JP: おんぶはしない、甘やかさない。\n少なくともこの先、一時間ほどは。
2916 = "我不會背她，也不會讓她撒嬌。至少，在接下來的一小時之內不會。" 

# 【ひかり】
# display as 光
# JP: 「しゅっぱーつ！　しんこー！！！」
1941 = "「出發！前進囉！！！」" 

# 【ハチロク】
# display as 八六
# JP: 「――さて、うまく運べますでしょうか？」
1867 = "「不知道會不會順利呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うまくやるさ。僕とポーレットの娘だぞ？」
2347 = "「當然會了。光可是我和波萊特的女兒啊」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふっ」
# 1990 = "「呵呵呵」" 

# monologue
# JP: ハチロクの穏やかなまなざしの先、\nひかりは石炭とにらみあってる。
2750 = "八六和藹地望向光，而光則盯著煤炭。" 

# monologue
# JP: その手にはワンスコがわりの小さなショベル――移植ごて。\n1kgは四歳児には、どう考えても重すぎるゆえ。
2726 = "光手上拿著小小的園藝鏟，用來代替公斤鍬。對於一個四歲的孩子來說，一公斤煤炭再怎麼說也太重了。" 

# 【ハチロク】
# display as 八六
# JP: 「それでは、投炭練習を開始いたしましょう」
2446 = "「那我們就開始練習加煤吧」" 

# 【ひかり】
# display as 光
# JP: 「かいしするのー！」
2459 = "「開始吧！」" 

# 【ハチロク】
# display as 八六
# JP: 「一番最初は、ごあいさつからです」
2287 = "「正經的練習要從打招呼開始」" 

# 【ひかり】
# display as 光
# JP: 「ごあいさつからー！」
2174 = "「從打招呼開始！」" 

# monologue
# JP: ひかりが、ぴっと背筋を伸ばす。\nハチロクの指導のたまものだ。
2739 = "光立刻挺起胸。這都是多虧了八六的指導。" 

# 【ハチロク】
# display as 八六
# JP: 「よろしくお願いいたします」
2388 = "「請多關照」" 

# 【ひかり】
# display as 光
# JP: 「よろしくおねがいたします！」
2389 = "「請多關照！」" 

# 【ハチロク】
# display as 八六
# JP: 「今日も一日、ご安全に」
1878 = "「今天也要一如往常地安全行駛」" 

# 【ひかり】
# display as 光
# JP: 「きょうもいちにち、ごあんぜんにー」
# 1878 = "「今天也要一如往常地安全行駛」" 

# 【ハチロク】
# display as 八六
# JP: 「大変結構なご挨拶です」
1904 = "「做得不錯」" 

# 【ひかり】
# display as 光
# JP: 「えへー！」
2087 = "「嘿嘿！」" 

# monologue
# JP: できれば、褒める。\n出来ない場合は、できない原因を冷静に示す。
2797 = "只要能誇獎，就誇獎。如果不能誇獎，就冷靜地指出不能誇獎的理由。" 

# monologue
# JP: 極めて単純で明快なハチロクの指導の方針は、\n僕だけでなく、ひかりにもマッチするようだ。
3114 = "這就是八六單純明瞭的指導方針。看來，這方針不僅適合我，也很適合光。" 

# 【ハチロク】
# display as 八六
# JP: 「それでは、投炭練習の説明をします。\nまずは、ひかり。ここに立ってみましょう」
2451 = "「那麼，我先來解說加煤練習的步驟。首先，過來這邊站好」" 

# 【ひかり】
# display as 光
# JP: 「せきたん、たくさんなのー」
2113 = "「好多煤炭哦」" 

# 【ハチロク】
# display as 八六
# JP: 「左様ですね。\nその石炭を、[た]焚き[ぐち]口にくぐらせ、運び――」
2146 = "「對啊。我們要做的，就是把這些煤炭運到爐口，加進去。」" 

# monologue
# JP: ハチロクの声が、ひかりの視線を誘導する。
2764 = "八六的聲音引導著光的視線。" 

# monologue
# JP: ひかりを挟み、石炭の反対側には垂直に立てたフラフープ。\nこれが、焚き口の代わりとなる。
3049 = "煤炭對面豎著一隻呼啦圈，光則站在呼啦圈和煤炭的中間。那就是爐口的代替品。" 

# 【ひかり】
# display as 光
# JP: 「たきぐち、まぁるいのー」
2317 = "「爐口好圓」" 

# 【ハチロク】
# display as 八六
# JP: 「まるい焚き口をくぐらせながら、\n勢いよく、石炭を[かしょう,1]火床にたたきつけます」
2223 = "「把煤炭鏟進圓圓的爐口，讓它一口氣落到火床上」" 

# 【ひかり】
# display as 光
# JP: 「ひかりしってるー！　『ばしーっ！』ってするの！」
1925 = "「光知道的！“啪！”地一聲鏟進去！」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です。勢いよく手首を返し、\nひとまずは、石炭を火床に敷き詰められれば、上等です」
2295 = "「沒錯。如果能迅速把手腕翻過來，把煤炭均勻地揚在火床上，就是最好的了」" 

# monologue
# JP: フープの向こうに敷いてあるのは、\n火床に見立てた、平たく、かなり大きなトレーだ。
2821 = "呼啦圈的另一邊擺著一個又大又平的托盤，用來代替火床。" 

# 【ひかり】
# display as 光
# JP: 「からすさん、すずめさんー」
2313 = "「烏鴉、麻雀」" 

# 【ハチロク】
# display as 八六
# JP: 「ええ、左様です。\n鳥さんや動物さんたちが、たくさんですね」
2075 = "「嗯，沒錯。有好多鳥和動物呢」" 

# monologue
# JP: ひかりは数字を読めるけれども、\n複雑な作業をしながらとなれば、混乱しかねん。
2747 = "光雖然會數數了，但是在進行複雜工作的同時數數，多半會讓她的腦子陷入混亂。" 

# monologue
# JP: ゆえ、トレーを九つにくぎった上には、\n日々姫がそれぞれ、いきものの絵を描いてくれている。
2961 = "所以，日日姬在托盤上劃分了九宮格，並在每個格子裡畫上了不同的動物。" 

# 【ハチロク】
# display as 八六
# JP: 「みんな、姿が見えていると不安です。\nですので、石炭で隠してあげると安心します」
2100 = "「大家都露在外面，所以很不安。光就用煤炭把它們都蓋住吧，這樣它們就放心了」" 

# 【ひかり】
# display as 光
# JP: 「わかったのー！\nひかりが、じょうずにかくしてあげるのー」
1921 = "「光明白了！光會好好蓋住它們的」" 

# 【ハチロク】
# display as 八六
# JP: 「うふふっ、その意気です」
1998 = "「呵呵呵，要的就是這份幹勁」" 

# monologue
# JP: ハチロクの目が和らいで、\nけれども次の瞬間には、一転、キリリと引き締まる。
2769 = "八六露出了柔和的眼神，但就在轉瞬之間，她的眼神又嚴肅了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「それでは、そろそろ始めてみましょう」
2445 = "「那我們先試試看吧」" 

# 【ひかり】
# display as 光
# JP: 「よろしくおねがいします！　なのー！」
# 2389 = "「請多關照！」" 

# 【ハチロク】
# display as 八六
# JP: 「それでは、最初の一杯目です」
2450 = "「那麼，先加第一鍬」" 

# monologue
# JP: ハチロクが石炭の山を指し示す。\nひかりも、すぐに体を動かす。
2756 = "八六指向煤炭堆成的小山。光立刻應聲而動。" 

# 【ひかり】
# display as 光
# JP: 「よいしょ――ざくーっ」
2082 = "「嘿喲。鏟呀鏟」" 

# monologue
# JP: 楽しげだ。\nこの瞬間を、よほど楽しみにしていたのだろう。
2853 = "她好開心。一定是非常期待這個瞬間吧。" 

# 【ハチロク】
# display as 八六
# JP: 「まずまずです。石炭をスコップに乗せたなら、\n体をひねり、焚き口をくぐらせましょう」
2430 = "「還可以。鏟起煤炭之後轉個身，把煤炭鏟進爐口吧」" 

# 【ひかり】
# display as 光
# JP: 「せきたん。たきぐちを、くぐらせるのー」
2224 = "「把煤炭鏟進爐口裡」" 

# monologue
# JP: 移植ごての上、石炭は山盛りになっている。\nひかりはそれをこぼすまいとして、慎重になる。
2829 = "園藝鏟上堆滿了煤炭。光小心地端著鏟子，不讓煤炭掉下去。" 

# 【ハチロク】
# display as 八六
# JP: 「石炭をトレーの上にあけてください。\n最初は急がず、ケガをしないよう、ゆっくりと」
2390 = "「請把煤炭鏟到盤子上吧。一開始不要著急，慢慢來，小心不要受傷」" 

# 【ひかり】
# display as 光
# JP: 「んゆー、いそぐ――の、むり、なのー」
2078 = "「嗯，那光要上囉……啊，不行」" 

# monologue
# JP: 本物の投炭練習機では、左手で鎖をひきつつ、\n右手でスコップを運ばねばならぬ。
2842 = "在真正的加煤練習機上，需要用左手拉動鐵鏈，右手揮動公斤鍬。" 

# monologue
# JP: 四歳児には複雑すぎ、要求される力も過大だ。\nゆえ、かなりの勢いで簡略化したつもりであったが――
3113 = "這對於四歲的孩子來說過於複雜，要求的力氣也太大了。所以，我們把訓練進行了相當程度的簡化，但是……" 

# monologue
# JP: （ぼろっ）
3166 = "（散落）" 

# 【ひかり】
# display as 光
# JP: 「あうぅ」
2049 = "「嗚」" 

# monologue
# JP: それでも、やはりすんなりいかぬ。\nこぼれてしまった石炭に、ひかりはか細い悲鳴をあげる。
