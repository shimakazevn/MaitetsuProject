# monologue
# JP: 学園長のさらに向こう、キハ07sの運転台前に立つ\nポーレットとれいなは、僕らの異変に気づいていない。
2836 = "在校長的另一邊，波萊特和玲奈站在\\x%lキハ07s;#00ffc040;Ｋｉｈａ０７Ｓ%l;#;的駕駛台前，絲毫沒察覺到我們這邊的混亂。" 

# monologue
# JP: ハチロクを呼んで共感を送ってもらっても、\n事態解決にはつながらない、か――
2887 = "就算現在我呼叫八六，發送共鳴消息，也沒辦法解決目前的事態，那……" 

# 【ふかみ】
# display as 深美
# JP: 「だったら、ええと――\nあ！　[まくら,1]真闇さんっ！！」
2432 = "「那、那就……啊！真闇小姐！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それだ！　真闇姉なら間違いの無い卒園生だ。\nナビ！　ナビっ！」
2147 = "「對！真闇姐自然是湯醫的畢業生。Ｎａｖｉ！　Ｎａｖｉ！」" 

# 【稀咲】
# display as 稀咲
# JP: 「以上をもって、結びと代えさせていただきます。\n今後の、湯医学園のますますのご発展と――」
1888 = "「以上就是我的發言。希望今後湯醫學園能百尺竿頭，更進一步」" 

# 【双鉄】
# display as 雙鐵
# JP: 「間に合わん！！」
2407 = "「趕不上了！！」" 

# monologue
# JP: 僕らがくるまで、\n稀咲はスピーチを引き延ばしてくれていたのだろう。
2833 = "在我們過來之前，稀咲應該已經想辦法延長了演講時間。" 

# monologue
# JP: 冷静で整った、けれども安堵をにじませた声で、\n完全にもう、スピーチを締めくくりにかかっている。　
2859 = "她那冷靜而圓潤，又令人安心的聲音，已然將演講帶入了尾聲。" 

# 【ふかみ】
# display as 深美
# JP: 「ああああ、どうしたら」
2032 = "「啊啊啊啊，該怎麼辦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ、僕かふかみがいくしかないが――\nどちらの方が、失礼度合いが少なくすむか」
2024 = "「唔，只好我或者深美上了。我們哪個人上會沒那麼失禮呢」" 

# monologue
# JP: （くいくいっ）
3165 = "（拽拽）" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
# 2028 = "「唔？！」" 

# monologue
# JP: 上着の裾をひっぱられる。\nふりむけば、ひかり――っ！！！
2914 = "我上衣的下擺被拽了一下。低頭一看，是光！！！" 

# 【ひかり】
# display as 光
# JP: 「ぱぁぱ、どうしたのー？」
2333 = "「爸爸，怎麼了？」" 

# monologue
# JP: 聞いてくれた。\n僕を、心配してくれている。
2850 = "她在問我。她在擔心我。" 

# monologue
# JP: 思えば言葉が、するりと飛び出す。
2965 = "於是，我不由自主地說道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひかり、パパはいま、困ってる。\nできれば、ひかりに助けてほしい」
1934 = "「光，爸爸現在遇到麻煩了。你能幫幫爸爸嗎？」" 

# 【ひかり】
# display as 光
# JP: 「ぱぁぱ、こまってるのー？」
2324 = "「爸爸遇到麻煩了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2070 = "「嗯」" 

# monologue
# JP: 今のひかりなら、きっと出来る。\n信じ切れるから、迷いはしない。
3054 = "現在的光，一定能幫助我。我堅信著這一點，所以沒有絲毫迷茫。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あのおじさん。――湯医学園の学園長に、この花束を、\nひかりからプレゼントしてあげて欲しいのだ」
1910 = "「光。把這捧花送給那位叔叔——湯醫學園的校長吧」" 

# 【ひかり】
# display as 光
# JP: 「え……むり、なのー。\nひかり、そんなことできないのー」
2007 = "「咦……不行啊。光做不到」" 

# monologue
# JP: ひかりが、ひるむ。\nごく当たり前のことだろう。
2745 = "光退縮了。這是理所當然的吧。" 

# monologue
# JP: ほんの少し前までは、\n実の母親への花束贈呈もできなかったこなのだから。
2831 = "在不久之前，她還不敢上台給親生母親送花呢。" 

# 【双鉄】
# display as 雙鐵
# JP: 「湯医学園は、一年生になったらひかりが通う学園だ。\n湯医学園があったから、御一夜鉄道は存続できた」
2363 = "「等光升上一年級，就要到湯醫學園上學了。有湯醫學園維持，御一夜鐵路才能存續下去」" 

# monologue
# JP: だから、聞かせる。\nひかりに望む行動の意味を。
2954 = "所以我告訴了光，我要求她做的事有什麼意義。" 

# monologue
# JP: ……あるいはそうできていたのなら、\n市長退任の花束贈呈も叶っていたかと、ふと思う。
1439 = "……或許如果市長卸任儀式時，我也告訴了她行為的意義，她就能上去獻花了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「御一夜鉄道の存続がなければ、僕とポーレットは\n出会えなかった。ひかりも、産まれていなかった」
2123 = "「如果御一夜鐵路關門了，我與波萊特就不會相遇。光也不會出生」" 

# 【ひかり】
# display as 光
# JP: 「！」
# 2034 = "「啊！」" 

# monologue
# JP: ひかりの目を見る。じっと見る。\n繋ぐ――意味と行為のレールを。
2946 = "我看著光的眼睛。緊緊地盯著她的眼睛。我要將行為與意義用線路聯繫起來。" 

# monologue
# JP: レールさえあれば大丈夫。\nひかりは、必ず走ってくれる。
2794 = "只要有了線路，一定沒問題。光一定會在那線路上行進。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、80周年おめでとうと、ありがとうの気持ちで。\nこの花束を、ひかりから届けて貰えたら、僕は嬉しい」
2214 = "「所以，我希望光能懷著恭喜學園８０周年和感謝學園的心情，將這束花獻上去」" 

# 【ひかり】
# display as 光
# JP: 「……わかった。の」
1500 = "「……明白了」" 

# monologue
# JP: 小さく、のろのろ。\nけれど確かに、ひかりが頷く。
2732 = "光猶豫著，但還是明確地輕輕點了點頭。" 

# monologue
# JP: ひかりも石炭まみれだが、\nひかりであれば、その格好も失礼にならぬ意味を持てる。
3124 = "雖然光的身上也滿是煤灰，但光以這副打扮出場，並不算是失禮。" 

# 【ふかみ】
# display as 深美
# JP: 「ひかりちゃん！！」
2150 = "「小光！！」" 

# 【ひかり】
# display as 光
# JP: 「きゃあ」
1985 = "「呀」" 

# monologue
# JP: ふかみがひかりの両頬を、両手のひらで包みこむ。
3034 = "深美用兩隻手的掌心捧住光的臉頰。" 

# 【ふかみ】
# display as 深美
# JP: 「アブラカタブラヤサイマシマシ～\nひかりちゃんは絶対だいじょーぶ！！」
2464 = "「阿布拉卡達布拉天靈靈地靈靈，小光絕對沒問題的！！」" 

# 【ひかり】
# display as 光
# JP: 「おまじない！」
2247 = "「是咒語！」" 

# 【ふかみ】
# display as 深美
# JP: 「そう。おまじない。\nこれでひかりちゃん、大丈夫だから」
2141 = "「對。是咒語。有了我的咒語，小光肯定能行」" 

# 【ひかり】
# display as 光
# JP: 「うん！　なのー！」
2072 = "「嗯！可以！」" 

# 【稀咲】
# display as 稀咲
# JP: 「それでは、花束を歴代卒園生代表の、右田――」
2452 = "「那麼，由歷屆畢業生代表右田……」" 

# monologue
# JP: こちらを振り向き、稀咲が一瞬、言葉に詰まる。\n日々姫を探して、瞳が動く。
3071 = "稀咲看向這邊，說到一半的話戛然而止。與此同時，她的視線不斷尋找著日日姬。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ではひかり、頼んだ」
1932 = "「光，就拜託你了」" 

# 【ひかり】
# display as 光
# JP: 「たのまれたのー」
1874 = "「交給光吧」" 

# monologue
# JP: ひかりの腕に、花束を渡し、かかえさせる。\n途端、稀咲は学園長へと向き直る。
2939 = "我把花束交給光，讓她抱緊。這時，稀咲立刻轉向校長說道。" 

# 【稀咲】
# display as 稀咲
# JP: 「失礼しました。それでは、改めて花束を」
2108 = "「失禮了。那麼，讓我們開始獻花」" 

# monologue
# JP: さすがは稀咲だ。\nその一瞬で、完全に僕らの意図を察してくれる。
2671 = "不愧是稀咲。在那電光石火之間，就完全理解了我的意圖。" 

# 【稀咲】
# display as 稀咲
# JP: 「未来の新入生代表。そして、未来の御一夜鉄道代表。\n右田ひかりちゃんからお願いします」
2391 = "「請未來的新生代表，同時也是未來的御一夜鐵路代表，右田光小朋友獻花」" 

# 【ひかり】
# display as 光
# JP: 「はぁい、なのー」
2120 = "「好的」" 

# monologue
# JP: とても小さな、震える声で。\nそれでも、ひかりは返事する。
2855 = "她的聲音小小的，還帶著顫抖。但這畢竟是光的回答。" 

# monologue
# JP: その背中を押す。願いをこめて、信頼をこめて。　\nひかりは、ゆっくり歩き出す。
2929 = "我心裡滿懷希望和信賴，輕推了一把她的背後。光便順勢慢慢邁開腳步。" 

# monologue
# JP: （がんばれ、ひかり――）
3158 = "（光，加油）" 

# monologue
# JP: 学園長はにこにこと、ひかりの姿を見守っている。\nひかりはゆっくり、一歩ずつ、学園長へと近づいていく。
3001 = "校長滿臉微笑地看著光走上來的樣子。光慢慢地，一步一步地，走近校長。" 

# 【ひかり】
# display as 光
# JP: 「あのね、これ、はなたば、で」
2183 = "「您好，請收下這捧花」" 

# 【学園長】
# display as 校長
# JP: 「はい」
# 2070 = "「嗯」" 

# monologue
# JP: 学園長は、しゃがみこみ、\nひかりから花束を受け取ってくれる。
3002 = "校長蹲下身，從光手裡接過花束。" 

# 【ひかり】
# display as 光
# JP: 「それでねっ！」
2431 = "「還有！」" 

# monologue
# JP: 優しい声にほっとしたのか、吹っ切れたのか\nひかりの声が、大きくなる。
2801 = "可能是聽到校長溫柔的聲音，光放鬆了下來吧，她的聲音變大了。" 

# 【ひかり】
# display as 光
# JP: 「おめでとうでね、ありがとー、なの！」
2182 = "「恭喜，還有謝謝！」" 

# 【学園長】
# display as 校長
# JP: 「素敵な花束と、お祝いを、こちらこそありがとう」
2206 = "「我才要謝謝你這束漂亮的花，還有你的祝福」" 

# 【ひかり】
# display as 光
# JP: 「きゃあ！」
1986 = "「呀！」" 

# monologue
# JP: 頭を撫でられ、ひかりがくしゃくしゃの笑顔になる。
3003 = "校長輕撫光的頭，光露出了燦爛的笑容。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひかり！！」
1928 = "「光！！」" 

# 【れいな】
# display as 玲奈
# JP: 「ひかりちゃーん！！」
# 2150 = "「小光！！」" 

# 【ひかり】
# display as 光
# JP: 「まま！　れいなおねーちゃん！！」
# 2126 = "「媽媽！玲奈姐姐！！」" 

# monologue
# JP: 学園長を置き去りに、一直線、\nひかりはポーレットの胸へと飛び込んでいく。
2727 = "光把校長拋在腦後，直接撲進了波萊特的懷裡。" 

# monologue
# JP: ポーレットはひかりを抱きしめる。\n抱きしめ、ぐりぐりと頬ずりをする。
3022 = "波萊特緊緊地抱住了光，用臉頰不停地蹭著她。" 

# 【ポーレット】
# display as 波萊特
# JP: 「立派だった！　ひかり、本当に素敵だった！\nどこのおねーさんかってびっくりしちゃった！」
2102 = "「太了不起了！光，你做得很棒！我還以為你是哪裡來的小姐姐呢，把我嚇了一大跳！」" 

# 【ひかり】
# display as 光
# JP: 「えへへー、ひかり、がんばったのー」
2084 = "「嘿嘿嘿，光努力了」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなも、わあぁって見てましたぁ。\nひかりちゃん、とーってもかっこよかったですよぉ」
2339 = "「玲奈也看呆了。小光剛才真的好帥氣！」" 

# 【ひかり】
# display as 光
# JP: 「えへへへー。あのね、ぱぱがねー、\nあれ、ぱぁぱ？」
2086 = "「嘿嘿嘿，其實爸爸他說……咦，爸爸呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
2201 = "「我在！」" 

# monologue
# JP: 僕も駆け出す。
2922 = "我也跑向了她們。" 

# monologue
# JP: その幸せな景色の中へ。\n僕の家族の、輪の中へ。
2951 = "我跑向那片幸福的景色之中。跑向我的家人。" 

# 【ひかり】
# display as 光
# JP: 「ぱぁぱがねー。ひかりに、おしえてくれたから、\nひかり、できたのー」
2321 = "「爸爸跟光講明白了，所以光做到了」" 

# 【れいな】
# display as 玲奈
# JP: 「教えてくれた？　なにをですかぁ？」
2392 = "「講明白了？講了什麼？」" 

# 【ひかり】
# display as 光
# JP: 「あのね、えっとね、ひかりがおはなわたしたら、\nぱぱがうれしいって！」
2157 = "「就是，爸爸說，如果光把花束獻上去，他會很開心的！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そっか！」
2259 = "「是嗎！」" 

# 【ひかり】
# display as 光
# JP: 「きゃあ！」
# 1986 = "「呀！」" 

# monologue
# JP: ひかりをぎゅっと抱きしめて、\nポーレットが僕にささやきかける。
3023 = "波萊特緊緊地抱住光，向我小聲說道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで、どう？　パパ、嬉しい？」
2436 = "「那你覺得呢？開心嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「嬉しくないわけがないだろう！！」
2426 = "「這哪有不開心的道理呀！！」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ」
# 1990 = "「呵呵呵」" 

# monologue
# JP: ひかりごと、れいなもまるごと、抱きしめる。\n熱さを感じる。絆を感じる。――僕ら家族の。
2950 = "我緊緊地把光和玲奈抱進懷裡。我感受到了家人的體溫、家人間的紐帶。" 

# 【双鉄】
# display as 雙鐵
# JP: 「毎日、毎日がとても嬉しい。幸せだ。\n生きていることが喜びなのだと、教えてもらえた」
2210 = "「我的每天都非常快樂、非常幸福。你們教會了我，活著是一件非常值得高興的事」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、しあわせ。\n今日がずーっと続けばいいって、思うくらいに」
2193 = "「我也很幸福。幸福到甚至希望今天能永遠持續下去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今日がずーっと続いてしまえば、退屈するさ。\nひかりの成長も見れなくなるぞ？」
1981 = "「可是，如果今天永遠持續下去的話，就太無聊了。咱們還怎麼看到光成長呀？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　じゃ、今のなし！」
2037 = "「啊！那剛剛的不算！」" 

# monologue
# JP: ぺろっと、ポーレットが舌を出す。
3021 = "波萊特吐了吐舌頭。" 

# 【ひかり】
# display as 光
# JP: 「いまのなしー！」
1954 = "「剛剛的不算！」" 

# monologue
# JP: 意味をわかってかわからぬままでか、\nひかりもまねをし、舌を出す。
2674 = "不知道光懂不懂那句話的意思，她模仿著波萊特，也吐了吐舌頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「迎えられますよね。双鉄くんと、ひかりと、れいなと。\n今日よりもっと、素敵な未来を」
2191 = "「我一定能和雙鐵君、光、玲奈一起，迎來比今天更美妙的未來吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「迎えられるし、迎えてみせるさ」
2346 = "「當然了，我一定會讓那樣的未來到來的」" 

# 【稀咲】
# display as 稀咲
# JP: 「あー、御一夜鉄道のみなさん？\nセレモニーは、終わったのだけれど」
2041 = "「啊，御一夜鐵路的各位，典禮已經結束了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと、そうだったな」
2047 = "「喔，對哦」" 

# monologue
# JP: 学園長はじめ、湯医側の方々をお送りするため、\nもう一往復、このまま乗務を続けることになっている。
3042 = "為了接送湯醫方面的校長等人，我們還需要再往返運行一次列車。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、いくか。\n湯医へ、そして、その先へ」
2447 = "「那我們走吧。去湯醫，去未來」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。いきましょう、双鉄くん」
2117 = "「好的。我們走吧，雙鐵君」" 

# 【ひかり】
# display as 光
# JP: 「ひかりね、ひかり、\nうんてんしさんできかんしさーん！」
1926 = "「光要做駕駛員，要做司機！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。思うまま走れ。ひかりのレールを。\nどこまでも伸びていく、ひかりの、未来へのレールを」
2055 = "「嗯。你儘管自由奔跑吧。馳騁在光的線路上，在光無盡延伸的，通向未來的鐵軌上」" 

# 【ひかり】
# display as 光
# JP: 「うん！」
2071 = "「嗯！」" 

# monologue
# JP: ならば僕は力の限りに、レールを延ばし、繋げてみせる。
2968 = "既然如此，我就盡全力延長那條線路，讓它與其他線路相連吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしていつか、僕たちは乗客となって、旅をしよう」
2316 = "「然後，等哪天讓我們成為乘客，在上面旅行吧」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、ひかりちゃんの列車で！　ですねぇ」
1993 = "「呵呵呵，在小光的列車上！對吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
2345 = "「當然了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「がんばりましょう、双鉄君。\nそのときまで――ううん、その未来より、もっと先まで」
2196 = "「我們加油吧，雙鐵君。直到那時為止——不，直到比那未來還遙遠的未來」" 

# monologue
# JP: 青い瞳が、僕を見つめる。\nあの日と、まったく同じように。
3121 = "那雙藍色的眼眸看著我。簡直與那天一模一樣。" 

# monologue
# JP: 今この一瞬、このときだけは、あの日と少しも変わらずに、\n僕を――僕だけを見つめてくれる。
2841 = "在現在這個瞬間，僅僅在現在這個瞬間，與那天一模一樣地，她看著我——僅僅看著我一個人。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしはずっと、双鉄くんと一緒です」
2208 = "「我會一直和你在一起」" 

# 【ひかり】
# display as 光
# JP: 「ひかりもー！」
1913 = "「光也是！」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ」
2337 = "「玲奈也是哦」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですって、双鉄くん！」
2377 = "「聽到了嗎，雙鐵君！」" 

# monologue
# JP: 笑顔がはじけ、視線が動く。
2863 = "她露出燦爛的笑容，視線向上飄去。" 

# monologue
# JP: ひかりの上に、れいなの上に。\n優しく、優しく、いとおしそうに。
3038 = "滑過光的上方，滑過玲奈的上方。溫柔而又慈愛地仰望著湛藍的天際。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんと、ひかりとれいなと、それからわたしと。\nみんなできっと、ずっと一緒に！」
2466 = "「雙鐵君、光和玲奈，還有我，大家一定會永遠在一起！」" 
