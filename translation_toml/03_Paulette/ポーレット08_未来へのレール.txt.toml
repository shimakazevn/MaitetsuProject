# 【稀咲】
# display as 稀咲
# JP: 「それでは、花束を歴代卒園生代表の、右田――」
2452 = "「Tiếp theo đây, xin mời đại diện cựu học\nsinh các khóa, Migita——」"

# monologue
# JP: こちらを振り向き、稀咲が一瞬、言葉に詰まる。\n日々姫を探して、瞳が動く。
3071 = "Quay lại nhìn chúng tôi, Kisaki chợt khựng\nlại.\nĐôi mắt đảo quanh tìm kiếm Hibiki."

# 【双鉄】
# display as 雙鐵
# JP: 「ではひかり、頼んだ」
1932 = "「Vậy Hikari, nhờ con nhé」"

# 【ひかり】
# display as 光
# JP: 「たのまれたのー」
1874 = "「Cứ giao cho con~」"

# monologue
# JP: ひかりの腕に、花束を渡し、かかえさせる。\n途端、稀咲は学園長へと向き直る。
2939 = "Tôi trao bó hoa vào vòng tay Hikari, để\ncon bé ôm lấy.\nNgay lập tức, Kisaki quay sang hiệu\ntrưởng."

# 【稀咲】
# display as 稀咲
# JP: 「失礼しました。それでは、改めて花束を」
2108 = "「Xin lỗi vì sự cố này. Vậy thì, xin được\ntặng hoa lại」"

# monologue
# JP: さすがは稀咲だ。\nその一瞬で、完全に僕らの意図を察してくれる。
2671 = "Quả không hổ danh Kisaki.\nChỉ trong khoảnh khắc đó, cô ấy đã hoàn\ntoàn hiểu được ý đồ của chúng tôi."

# 【稀咲】
# display as 稀咲
# JP: 「未来の新入生代表。そして、未来の御一夜鉄道代表。\n右田ひかりちゃんからお願いします」
2391 = "「Đại diện học sinh mới tương lai. Và, đại\ndiện Đường sắt Ohimitera tương lai.\nXin mời bé Migita Hikari」"

# 【ひかり】
# display as 光
# JP: 「はぁい、なのー」
2120 = "「Vâng ạ~」"

# monologue
# JP: とても小さな、震える声で。\nそれでも、ひかりは返事する。
2855 = "Với một giọng nói rất nhỏ và run rẩy.\nDù vậy, Hikari vẫn đáp lời."

# monologue
# JP: その背中を押す。願いをこめて、信頼をこめて。　\nひかりは、ゆっくり歩き出す。
2929 = "Tôi khẽ đẩy lưng con bé. Chứa chan niềm hy\nvọng và sự tin tưởng.\nHikari chậm rãi bước đi."

# monologue
# JP: （がんばれ、ひかり――）
3158 = "（Cố lên, Hikari――）"

# monologue
# JP: 学園長はにこにこと、ひかりの姿を見守っている。\nひかりはゆっくり、一歩ずつ、学園長へと近づいていく。
3001 = "Hiệu trưởng mỉm cười nhìn theo bóng dáng\ncủa Hikari.\nHikari chậm rãi, từng bước một, tiến lại\ngần hiệu trưởng."

# 【ひかり】
# display as 光
# JP: 「あのね、これ、はなたば、で」
2183 = "「Dạ, cái này, là bó hoa, tặng cô ạ」"

# 【学園長】
# display as 校長
# JP: 「はい」
# 2070 = "「嗯」" 

# monologue
# JP: 学園長は、しゃがみこみ、\nひかりから花束を受け取ってくれる。
3002 = "Hiệu trưởng ngồi xổm xuống,\nnhận lấy bó hoa từ tay Hikari."

# 【ひかり】
# display as 光
# JP: 「それでねっ！」
2431 = "「Và còn nữa!」"

# monologue
# JP: 優しい声にほっとしたのか、吹っ切れたのか\nひかりの声が、大きくなる。
2801 = "Có lẽ giọng nói dịu dàng đã làm con bé an\ntâm, hoặc có lẽ con bé đã gạt bỏ được sự\nrụt rè\ngiọng của Hikari trở nên lớn hơn."

# 【ひかり】
# display as 光
# JP: 「おめでとうでね、ありがとー、なの！」
2182 = "「Chúc mừng cô, và cảm ơn cô, ạ!」"

# 【学園長】
# display as 校長
# JP: 「素敵な花束と、お祝いを、こちらこそありがとう」
2206 = "「Cô mới là người phải cảm ơn con vì bó hoa\ntuyệt đẹp và lời chúc mừng này」"

# 【ひかり】
# display as 光
# JP: 「きゃあ！」
1986 = "「Kyaa!」"

# monologue
# JP: 頭を撫でられ、ひかりがくしゃくしゃの笑顔になる。
3003 = "Được xoa đầu, Hikari nở một nụ cười rạng\nrỡ."

# 【ポーレット】
# display as 波萊特
# JP: 「ひかり！！」
1928 = "「Hikari!!」"

# 【れいな】
# display as 玲奈
# JP: 「ひかりちゃーん！！」
# 2150 = "「小光！！」" 

# 【ひかり】
# display as 光
# JP: 「まま！　れいなおねーちゃん！！」
# 2126 = "「媽媽！玲奈姐姐！！」" 

# monologue
# JP: 学園長を置き去りに、一直線、\nひかりはポーレットの胸へと飛び込んでいく。
2727 = "Bỏ lại hiệu trưởng phía sau, chạy thẳng\nmột mạch,\nHikari nhào vào vòng tay của Paulette."

# monologue
# JP: ポーレットはひかりを抱きしめる。\n抱きしめ、ぐりぐりと頬ずりをする。
3022 = "Paulette ôm chặt lấy Hikari.\nÔm chặt lấy và liên tục cọ má vào con bé."

# 【ポーレット】
# display as 波萊特
# JP: 「立派だった！　ひかり、本当に素敵だった！\nどこのおねーさんかってびっくりしちゃった！」
2102 = "「Tuyệt vời lắm! Hikari, con thực sự rất\ntuyệt vời!\nMẹ còn giật mình tưởng là chị gái lớn nào\ncơ đấy!」"

# 【ひかり】
# display as 光
# JP: 「えへへー、ひかり、がんばったのー」
2084 = "「Ehehe~, Hikari, đã cố gắng lắm đó~」"

# 【れいな】
# display as 玲奈
# JP: 「れいなも、わあぁって見てましたぁ。\nひかりちゃん、とーってもかっこよかったですよぉ」
2339 = "「Reina cũng mải mê nhìn theo luôn đó ạ.\nBé Hikari, ngầu cực kỳ luôn đó nha~」"

# 【ひかり】
# display as 光
# JP: 「えへへへー。あのね、ぱぱがねー、\nあれ、ぱぁぱ？」
2086 = "「Ehehehe~. Dạ nha, ba nói là~,\nủa, ba ơi?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
2201 = "「Ba đây!」"

# monologue
# JP: 僕も駆け出す。
2922 = "Tôi cũng chạy ùa tới."

# monologue
# JP: その幸せな景色の中へ。\n僕の家族の、輪の中へ。
2951 = "Vào trong khung cảnh hạnh phúc đó.\nVào trong vòng tay của, gia đình tôi."

# 【ひかり】
# display as 光
# JP: 「ぱぁぱがねー。ひかりに、おしえてくれたから、\nひかり、できたのー」
2321 = "「Ba á nha~. Đã chỉ cho Hikari,\nnên Hikari, mới làm được đó~」"

# 【れいな】
# display as 玲奈
# JP: 「教えてくれた？　なにをですかぁ？」
2392 = "「Chỉ cho sao ạ? Chỉ chuyện gì vậy ạ?」"

# 【ひかり】
# display as 光
# JP: 「あのね、えっとね、ひかりがおはなわたしたら、\nぱぱがうれしいって！」
2157 = "「Dạ nha, ừm thì, nếu Hikari tặng hoa,\nthì ba sẽ vui lắm!」"

# 【ポーレット】
# display as 波萊特
# JP: 「そっか！」
2259 = "「Vậy sao!」"

# 【ひかり】
# display as 光
# JP: 「きゃあ！」
# 1986 = "「呀！」" 

# monologue
# JP: ひかりをぎゅっと抱きしめて、\nポーレットが僕にささやきかける。
3023 = "Ôm chặt Hikari vào lòng,\nPaulette khẽ thì thầm với tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「それで、どう？　パパ、嬉しい？」
2436 = "「Vậy, thấy sao nào? Ba có vui không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「嬉しくないわけがないだろう！！」
2426 = "「Làm sao mà không vui cho được chứ!!」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ」
# 1990 = "「呵呵呵」" 

# monologue
# JP: ひかりごと、れいなもまるごと、抱きしめる。\n熱さを感じる。絆を感じる。――僕ら家族の。
2950 = "Tôi ôm trọn lấy cả Hikari và Reina vào\nlòng.\nCảm nhận được hơi ấm. Cảm nhận được sự gắn\nkết. ――Của gia đình chúng tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「毎日、毎日がとても嬉しい。幸せだ。\n生きていることが喜びなのだと、教えてもらえた」
2210 = "「Mỗi ngày, mỗi ngày đều rất vui. Thật hạnh\nphúc.\nMọi người đã dạy cho anh biết, được sống\nchính là một niềm vui sướng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、しあわせ。\n今日がずーっと続けばいいって、思うくらいに」
2193 = "「Em cũng, hạnh phúc lắm.\nĐến mức em chỉ mong hôm nay cứ kéo dài mãi\nmãi thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「今日がずーっと続いてしまえば、退屈するさ。\nひかりの成長も見れなくなるぞ？」
1981 = "「Nếu hôm nay cứ kéo dài mãi mãi thì sẽ\nchán lắm đấy.\nSẽ không được nhìn thấy Hikari trưởng\nthành nữa đâu?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　じゃ、今のなし！」
2037 = "「A! Vậy, coi như em chưa nói gì nhé!」"

# monologue
# JP: ぺろっと、ポーレットが舌を出す。
3021 = "Paulette tinh nghịch thè lưỡi."

# 【ひかり】
# display as 光
# JP: 「いまのなしー！」
1954 = "「Chưa nói gì nha~!」"

# monologue
# JP: 意味をわかってかわからぬままでか、\nひかりもまねをし、舌を出す。
2674 = "Không biết con bé có hiểu ý nghĩa hay\nkhông,\nnhưng Hikari cũng bắt chước, thè lưỡi ra."

# 【ポーレット】
# display as 波萊特
# JP: 「迎えられますよね。双鉄くんと、ひかりと、れいなと。\n今日よりもっと、素敵な未来を」
2191 = "「Chúng ta sẽ cùng nhau đón chờ nhỉ. Cùng\nvới anh Soutetsu, Hikari và Reina.\nMột tương lai tuyệt vời hơn cả ngày hôm\nnay.」"

# 【双鉄】
# display as 雙鐵
# JP: 「迎えられるし、迎えてみせるさ」
2346 = "「Chắc chắn rồi, anh sẽ mang tương lai đó\nđến.」"

# 【稀咲】
# display as 稀咲
# JP: 「あー、御一夜鉄道のみなさん？\nセレモニーは、終わったのだけれど」
2041 = "「A, mọi người bên Đường sắt Ohito ơi?\nBuổi lễ, đã kết thúc rồi đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと、そうだったな」
2047 = "「Oops, đúng rồi nhỉ.」"

# monologue
# JP: 学園長はじめ、湯医側の方々をお送りするため、\nもう一往復、このまま乗務を続けることになっている。
3042 = "Để đưa tiễn hiệu trưởng và những người bên\nYui,\nchúng tôi sẽ tiếp tục thực hiện nhiệm vụ\nchạy thêm một vòng nữa."

# 【双鉄】
# display as 雙鐵
# JP: 「では、いくか。\n湯医へ、そして、その先へ」
2447 = "「Vậy, đi thôi nào.\nĐến Yui, và xa hơn thế nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。いきましょう、双鉄くん」
2117 = "「Vâng. Cùng đi thôi, anh Soutetsu.」"

# 【ひかり】
# display as 光
# JP: 「ひかりね、ひかり、\nうんてんしさんできかんしさーん！」
1926 = "「Hikari á, Hikari,\nsẽ làm người lái tàu và nhân viên cơ vụ\nluôn!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。思うまま走れ。ひかりのレールを。\nどこまでも伸びていく、ひかりの、未来へのレールを」
2055 = "「Ừ. Cứ chạy theo ý con muốn. Trên đường\nray của Hikari.\nĐường ray hướng tới tương lai của Hikari,\ntrải dài vô tận.」"

# 【ひかり】
# display as 光
# JP: 「うん！」
2071 = "「Vâng!」"

# monologue
# JP: ならば僕は力の限りに、レールを延ばし、繋げてみせる。
2968 = "Vậy thì tôi sẽ dùng hết sức mình, để kéo\ndài và kết nối những tuyến đường ray ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「そうしていつか、僕たちは乗客となって、旅をしよう」
2316 = "「Và rồi một ngày nào đó, chúng ta sẽ trở\nthành hành khách, cùng nhau đi du lịch\nnhé.」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、ひかりちゃんの列車で！　ですねぇ」
1993 = "「Ufufu~, trên chuyến tàu của bé Hikari!\nĐúng không ạ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論だ」
2345 = "「Đương nhiên rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「がんばりましょう、双鉄君。\nそのときまで――ううん、その未来より、もっと先まで」
2196 = "「Cùng cố gắng nhé, anh Soutetsu.\nCho đến lúc đó――không, xa hơn cả tương lai\nđó nữa.」"

# monologue
# JP: 青い瞳が、僕を見つめる。\nあの日と、まったく同じように。
3121 = "Đôi mắt xanh biếc, chăm chú nhìn tôi.\nGiống hệt như ngày hôm ấy."

# monologue
# JP: 今この一瞬、このときだけは、あの日と少しも変わらずに、\n僕を――僕だけを見つめてくれる。
2841 = "Chỉ ngay khoảnh khắc này, lúc này đây,\nkhông hề thay đổi so với ngày hôm ấy,\nđang nhìn tôi――chỉ nhìn mỗi mình tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしはずっと、双鉄くんと一緒です」
2208 = "「Em sẽ luôn ở bên cạnh anh Soutetsu.」"

# 【ひかり】
# display as 光
# JP: 「ひかりもー！」
1913 = "「Hikari cũng vậy~!」"

# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ」
2337 = "「Reina cũng vậy đó nha~」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですって、双鉄くん！」
2377 = "「Nghe thấy chưa, anh Soutetsu!」"

# monologue
# JP: 笑顔がはじけ、視線が動く。
2863 = "Nụ cười rạng rỡ nở trên môi, ánh mắt khẽ\ndịch chuyển."

# monologue
# JP: ひかりの上に、れいなの上に。\n優しく、優しく、いとおしそうに。
3038 = "Nhìn sang Hikari, nhìn sang Reina.\nMột cách dịu dàng, dịu dàng, đầy yêu\nthương."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんと、ひかりとれいなと、それからわたしと。\nみんなできっと、ずっと一緒に！」
2466 = "「Anh Soutetsu, Hikari, Reina, và cả em\nnữa.\nTất cả chúng ta nhất định, sẽ mãi mãi bên\nnhau!」"
