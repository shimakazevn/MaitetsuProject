# monologue
# JP: けど、それだけの動きにも、僕らの快感は増幅される。\n精液がぶくぶく膨れ上がって、喉元にまでこみ上げてくる。
1111 = "Nhưng, chỉ với những chuyển động ấy thôi cũng đủ khuếch đại khoái cảm của chúng tôi.\nTinh dịch sục sôi dâng trào, nghẹn ứ đến tận cổ họng."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ポーレット――ポーレット！！」
825 = "「A, Paulette——Paulette!!」"
# monologue
# JP: 愛おしさに。射精感に\nことばが、押し出されこぼれ出す。
1237 = "Vì tình yêu thương. Vì cảm giác muốn xuất tinh\nNhững lời nói cứ thế bị đẩy ra, tuôn trào."
# monologue
# JP: ポーレットの目が、優しい瞳が――\n僕を捉えて、ふっと、和らぐ。
1356 = "Đôi mắt Paulette, đôi mắt dịu dàng ấy——\nBắt lấy ánh nhìn của tôi, rồi chợt mềm mại đi."
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――ひっへふははひ――ぷっ――ほーへふ……\nふっ――んっ！　――ちゅうううううううううっ！！」
835 = "「Ưm——hihhefuhahahi——phụt——Houhehu……\nPhù——ưm! ——Chụtttttttttt!!」"
# monologue
# JP: （みゅにぃぃぃぃぃぃぃぃぃぃぃ）
1543 = "（Múttttttttttt）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
818 = "「Kua!!!」"
# monologue
# JP: （びゅっ！　びゅるっ！　びゅううっ！　びゅっ！！！）
1560 = "（Phụt! Phụt! Phụtttt! Phụt!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
774 = "「!!?」"
# monologue
# JP: いつもとは、全く違う感触に、一瞬、腰が震えてしまう。
1090 = "Cảm giác hoàn toàn khác biệt so với mọi khi khiến hông tôi run lên trong khoảnh khắc."
# monologue
# JP: （びゅっ――びゅううっ――びゅるっ！　どびゅっっ！）
1558 = "（Phụt——phụtttt——phụt! Phụtttt!）"
# monologue
# JP: 精液は、ポーレットの喉奥を叩かない。
1405 = "Tinh dịch không bắn vào sâu trong cổ họng Paulette."
# monologue
# JP: その手前、亀頭のすぐ先、\nスカーフの柔らかに堰き止められて――
1476 = "Ở ngay phía trước, ngay trước quy đầu,\nđã bị sự mềm mại của chiếc khăn quàng chặn lại——"
# 【ポーレット】
# display as 波萊特
# JP: 「じゅっ――じゅるるっ――じゅぞっ――じゅるるっ――\nじゅぞおおおおぉぉぉぉっ！――じゅる――じゅっ！」
830 = "「Sụt——sụtttt——sụt——sụtttt——\nSụttttttttt!——Sụt——sụt!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅぁっ！」
# 814 = "「啊！」" 
# monologue
# JP: （ぷっ！　ぴゅるっ！　ぴゅ……ぴゅ、る……）
1554 = "（Phụt! Phụt! Phụt……phụt, phụt……）"
# monologue
# JP: それを、残さず。\n舌と唇で絞るようにして丹念に丹念に吸い尽くし――
1380 = "Không để sót lại chút nào.\nDùng lưỡi và môi như vắt kiệt, cẩn thận, cẩn thận hút cạn sạch——"
# 【ポーレット】
# display as 波萊特
# JP: 「ん――――むっ――――ごくんっ！　んっ――ごくっ\n――ぁ――ふぁ――あっ……ぷぁぁ」
838 = "「Ưm――――ưm――――ực! Ưm——ực\n——A——phù——a……phù」"
# monologue
# JP: そうして、かわいい口が開く。\n全部飲めたと、ほめてほめてといわんばかりに――っ！
1377 = "Sau đó, cái miệng đáng yêu hé mở.\nNhư muốn khoe khoang rằng em đã nuốt hết rồi, hãy khen em đi——!"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！」
931 = "「Paulette!」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　きゃっ！？　ひゃっ！！」
796 = "「Hả!? Á!? Hya!!」"
# monologue
# JP: 抱き上げて、そのまま僕の上へと座り直させる。
1266 = "Bế thốc em lên, rồi cứ thế để em ngồi lại trên người tôi."
# monologue
# JP: 学園生なポーレットと、僕との距離を、\nほとんどゼロまで近づける。
1208 = "Kéo khoảng cách giữa tôi và Paulette trong bộ dạng nữ sinh\ngần như về mức số không."
# 【双鉄】
# display as 雙鐵
# JP: 「もっとだ。全部。僕の全部を――\nポーレットに、呑み込んで欲しい」
909 = "「Nữa đi. Tất cả. Toàn bộ con người anh——\nAnh muốn Paulette nuốt trọn lấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……はい」
860 = "「A……vâng.」"
# monologue
# JP: くっつきあってる胸と胸とで、\nお互いの鼓動が響きあってる。
1251 = "Hai lồng ngực dán sát vào nhau,\nnhịp tim của cả hai vang vọng cộng hưởng."
# monologue
# JP: とくん、とくんと――暖かなものが体に満ちて、\n射精したばかりの勃起を、すぐさま回復させていく。
1312 = "Thình thịch, thình thịch——Một dòng ấm áp tràn ngập cơ thể,\nnhanh chóng khôi phục lại dương vật vừa mới xuất tinh xong."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……」
# 844 = "「嗯……」" 
# monologue
# JP: ゆるく。ポーレットの腰が蠢く。\n僕の勃起を股間にあてて、そうして、瞳が閉じられる。
1362 = "Chầm chậm. Hông Paulette ngọ nguậy.\nÁp dương vật của tôi vào háng, rồi nhắm nghiền đôi mắt lại."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……キス」
953 = "「Anh Soutetsu……hôn em đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
867 = "「Ừ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ん……ちゅっ……ちゅう……ちゅむっ……ふっ――\nんっ――ちゅるっ――ちゅっ――れろっ――れるっ――」
856 = "「Ưm……chụt……chu……chụt……phù——\nƯm——chu——chụt——liếm——liếm——」"
# monologue
# JP: 唇をあわせたその瞬間には、\n舌と舌とも溶け合っている。
1149 = "Ngay khoảnh khắc hai đôi môi chạm nhau,\nlưỡi và lưỡi cũng đã quấn quýt hòa quyện."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……ふぁ……っ――ほーへふ……ふん……んっ――\nちゅ――ちゅむっ――ねろおっ――れるうっ――っ――」
850 = "「Ưm……phù……——Houhehu……hun……ưm——\nChụt——chu——liếmmmm——liếmmmm——」"
# monologue
# JP: 鼻息でゆるくくすぐりながら、くぐもった声で僕を呼ぶ。\n舌は休まず蠢いて、僕の歯の一本一本まで愛撫してくれる。
1187 = "Hơi thở mơn trớn nhè nhẹ, em gọi tên tôi bằng giọng nói nghèn nghẹt.\nLưỡi không ngừng luồn lách, âu yếm từng chiếc răng của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……ちゅっ――ちゅっ――んっ――しゅきっ――\nん――ぷあっ――あ。好き。です。あなたが。双鉄くん」
853 = "「Ưm……chụt——chụt——ưm——thích, lắm——\nƯm——phù——a. Em thích. Thích anh. Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。僕もだ。ポーレットのことが大好きだ」
879 = "「Ừ. Anh cũng vậy. Anh rất yêu Paulette.」"
# monologue
# JP: ポーレットの腰がふ、っと浮く。\n僕の首へと回されてる手の、熱と力みが少し増す。
1352 = "Hông Paulette chợt nâng lên.\nSức nóng và lực siết từ vòng tay đang quàng qua cổ tôi tăng lên đôi chút."
# 【双鉄】
# display as 雙鐵
# JP: 「だから、僕らは――」
911 = "「Vì vậy, chúng ta——」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。ひとつに――んっ！」
864 = "「Vâng. Hòa làm một——ưm!」"
# monologue
# JP: （にゅるっ――るっ――にゅるうっ――にゅ！）
1575 = "（Nhóp nhép——nhóp——nhóp nhép——nhóp!）"
# monologue
# JP: 焦らすように。弄ぶように。\n僕の勃起のその上で、ポーレットが淫靡なダンスを踊る。
1350 = "Như đang trêu chọc. Như đang đùa giỡn.\nBên trên dương vật đang cương cứng của tôi, Paulette nhảy một điệu nhảy đầy dâm đãng."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……ふっ……あ……あれ？」
848 = "「Ưm……phù……a……ơ kìa?」"
# monologue
# JP: 足に力が入らないのか、僕の勃起がヒクつくせいか、\n思うようには、なかなか位置が定まらないらしい。
1134 = "Không biết do chân cô ấy không dùng được lực, hay do dương vật của tôi cứ giật giật,\nmà có vẻ như cô ấy mãi không tìm được vị trí như ý muốn."
# monologue
# JP: （んりゅ――にゅるっ――りゅっ――にゅるん）
# 1607 = "（蹭來蹭去）" 
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
# 813 = "「啊」" 
# monologue
# JP: けれども、とろとろのおまんこに、勃起がゆるく擦られる、\nこの感触も、それだけで射精できそうなほど素晴らしい。
1109 = "Dẫu vậy, dương vật của tôi được cọ xát nhẹ nhàng vào âm đạo ướt đẫm,\nchỉ riêng cảm giác đó thôi cũng tuyệt vời đến mức tưởng như có thể xuất tinh ngay lập tức."
# monologue
# JP: おかげで余計に勃起は暴れ、\nポーレットの手も、汗と汁とでぬらつきを増し――
1295 = "Nhờ vậy mà dương vật càng thêm cuồng bạo,\nbàn tay của Paulette cũng ngày càng ướt át bởi mồ hôi và dâm thủy——"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 813 = "「啊」" 
# monologue
# JP: ぴたりと、吸い付くような感覚。
1091 = "Cảm giác như bị mút chặt lấy."
# monologue
# JP: 途端、心が。想いがひとつに。\n綺麗なひとつに重なっていく。
1316 = "Ngay lập tức, trái tim. Cảm xúc hòa làm một.\nTuyệt đẹp hòa quyện vào nhau."
# 【ポーレット】
# display as 波萊特
# JP: 「いきますね？　双鉄くん」
907 = "「Em vào nhé? Anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 867 = "「嗯」" 
# monologue
# JP: 腰を支える。\nけれども引き寄せたりはしない。
1263 = "Tôi đỡ lấy eo cô ấy.\nNhưng không hề kéo xuống."
# monologue
# JP: 全てをポーレットに任せ――
1265 = "Phó mặc mọi thứ cho Paulette——"
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――ふあっ――あっ――太っ――\nっ――先、ぽっ――んあっ――んん～～っ！！！」
833 = "「Ưm——phù——a——To quá——\nư——đầu, nấm——ư a——ưm～～!!!」"
# monologue
# JP: （ずぶんっ！！！！）
# 1548 = "（噗哧）" 
# 【ポーレット】
# display as 波萊特
# JP: 「きゃふっ！！！」
769 = "「Kya!!!」"
# monologue
# JP: 一気に、貫く。\nポーレットの一番奥底に、僕の亀頭が密着してる。
1410 = "Xuyên thủng trong một hơi.\nQuy đầu của tôi cọ sát vào tận sâu bên trong Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「こ、れ……これ……ん――深っ――い――ふぁんっ！」
944 = "「Thế, này……thế này……ưm——Sâu——quá——phù!」"
# monologue
# JP: （みちちっ！　みちっ！　きゅううっ！　きゅんっ！！）
1567 = "（Co bóp! Co bóp! Siết chặt! Siết chặt!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
771 = "「Ư——」"
# monologue
# JP: 何もせずとも、感じてしまう。\n勃起を包む強い刺激に、背筋がぞくぞく震えてしまう。
1128 = "Dù không làm gì, tôi vẫn cảm nhận được.\nKích thích mạnh mẽ bao bọc lấy dương vật khiến sống lưng tôi run rẩy."
# monologue
# JP: ポーレットの、ただでさえムチムチしきった\nおまんこ、膣は、急な挿入に驚いたのか――
1353 = "Âm đạo vốn dĩ đã vô cùng đầy đặn của Paulette,\ncó lẽ vì bất ngờ trước sự thâm nhập đột ngột này——"
# 【ポーレット】
# display as 波萊特
# JP: 「はッ――ぁっ――い、いっ――これっつ――いっぱい\n――いっぱいっ――双鉄、くんが――いっぱい、でっ」
780 = "「Hà——a——ư, ưm——thế này——đầy\n——đầy quá——Anh Soutetsu——lấp đầy, mất rồi」"
# monologue
# JP: （ミュチッ――みちちっ――みゅるっ――にゅむんっ）
# 1567 = "（夾緊）" 
# 【双鉄】
# display as 雙鐵
# JP: 「くっ――ぁっ――」
772 = "「Ư——a——」"
# monologue
# JP: ――僕の勃起を圧迫するほどまとわりついて、\nそのざわめきで、僕を精査し、誰何してくる。
1437 = "——Nó bám chặt đến mức chèn ép cả dương vật của tôi,\nbằng sự co bóp đó, nó như đang dò xét, tra hỏi xem tôi là ai."
# 【双鉄】
# display as 雙鐵
# JP: （なら、ば――）
1594 = "（Nếu, vậy thì——）"
# monologue
# JP: （くんっ！）
1617 = "（Thọc mạnh!）"
# 【ポーレット】
# display as 波萊特
# JP: 「やふっ――ふあっ！！？　んっ――そうてつ、くっ――\nあっ！　いまっ――うごいた、らっ――んきゅんっ！！」
805 = "「Á——phù!!? Ưm——Anh Soutetsu, ư——\nA! Bây giờ——mà cử động, thì——ưm!!」"
# monologue
# JP: （きゅううううううっ！！！）
1577 = "（Siết chặt!!!）"
# monologue
# JP: だから子宮に甘くキスして、\n僕が僕だと伝えてあげ――っ！？
1290 = "Nên tôi hôn ngọt ngào lên tử cung,\nđể nói cho nó biết tôi là ai——!?"
# monologue
# JP: （ぞわわわわわわっ！！！）
1605 = "（Rùng mình!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「うぉっ！」
793 = "「Uây!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃんっ――なにっ――これっ――」
762 = "「Hya——gì vậy——thế này——」"
# monologue
# JP: かはっ、と荒い息を吐き、\nポーレットがいやいやと首を振る。
1348 = "Hà, thở ra một hơi gấp gáp,\nPaulette lắc đầu nguầy nguậy."
# 【ポーレット】
# display as 波萊特
# JP: 「しらない――こん、なのっ――んっ！　わたしっ――\n体っ、がっ――あっ！　[なか,1]膣内がっ――うごい――てっ！」
895 = "「Em không biết——thế, này——ưm! Cơ thể——\ncủa em——a! Bên trong——đang cử động——!」"
# monologue
# JP: （にゅうっ――にゅっ――にゅるうっ――きゅんっ！）
# 1605 = "（蠕動）" 
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ――あっ――あっ」
806 = "「Ư a——a——a」"
# monologue
# JP: 吐き気がするほど強い快感。\n密着をして、のっかれてて。それでも腰が動いてしまう。
1233 = "Khoái cảm mãnh liệt đến buồn nôn.\nDính chặt lấy nhau, cưỡi lên nhau. Dù vậy eo tôi vẫn tự động di chuyển."
# monologue
# JP: 膣のざわめきに促され――\n僕の意思など関係なしに、体が射精を求めてしまう！
1161 = "Bị sự co bóp của âm đạo hối thúc——\nBất chấp ý chí của tôi, cơ thể vẫn đòi hỏi được xuất tinh!"
# monologue
# JP: （ずっ――るっ――ずぬっ――ぬっ――ぷっ！）
1572 = "（Phập——phập——phập——phập——phập!）"
# 【ポーレット】
# display as 波萊特
# JP: 「や……これっ――はっ――ぁあっ――こんなの――\nしら、ないっ――んっ――きもち――よす、ぎっ――」
766 = "「Á……thế này——hà——a——cảm giác này——\nem không, biết——ưm——sướng——quá——」"
# monologue
# JP: （ず――うっ――）
1578 = "（Rút——ra——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃふっ！！？」
770 = "「Hya!!?」"
# monologue
# JP: （ずんっ！！！）
1591 = "（Thọc sâu!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゅぅぅぅぅぅぅぅぅぅん！！！」
768 = "「Kyuuuuuuuuuun!!!」"
# monologue
# JP: （きゅっ！　きゅきゅっ！　にゅうっ！　にゅるんっ！）
1604 = "（Siết! Siết chặt! Trơn tuột! Tuột!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ――」
# 803 = "「啊——」" 
# monologue
# JP: 僕の呼応に安心したのか、喜んだのか。\n膣はいっそう甘く蠢き、勃起の全部を揉みしだく。
1435 = "——Không biết do an tâm hay vui sướng trước sự đáp lại của tôi.\nÂm đạo càng cựa quậy ngọt ngào hơn, nhào nặn toàn bộ dương vật."
# 【双鉄】
# display as 雙鐵
# JP: （これ、はっ――）
1614 = "（Thế, này——）"
# 【ポーレット】
# display as 波萊特
# JP: 「は……ァッ――双鉄――くんっ――これっ――すごく、\nふっ――あっっ――きもち――よく――って――ん！」
786 = "「Hà……a——Anh Soutetsu——ơi——thế này——sướng quá,\nphù——a——sướng——quá——ưm!」"
# monologue
# JP: ポーレットの腰も蠢いている。\n快感をただひたすら求め、僕の勃起を締めてはしごく。
1345 = "Eo của Paulette cũng đang uốn éo.\nChỉ một lòng đòi hỏi khoái cảm, siết chặt lấy dương vật của tôi mà tuốt."
# monologue
# JP: ……保たない、とても。保つわけがない。\nならばふたりで、ふたりで一緒にイクためにっ――！
544 = "……Không chịu nổi, thật sự. Không thể nào chịu nổi.\nNếu vậy thì cả hai, để cả hai cùng lên đỉnh——!"
# monologue
# JP: （ずっ――ずるっ！　ずんっ！　ゆさっ！！）
# 1567 = "（夾緊）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ふっ――ふぁっ――んっ――はぁっ――いいっ――\nおまん、こっ――すごくっ――きゅうんっ――って！」
775 = "「Phù——phù——ưm——hà——sướng quá——\nâm đạo——đang——siết chặt——lắm!」"
# monologue
# JP: 膣に責められるとき、\n膣もまた、僕の勃起に責められてるのだ――
1159 = "Khi bị âm đạo kích thích,\nâm đạo cũng đang bị dương vật của tôi kích thích lại——"
# monologue
# JP: そんな単純な真実を、溶ろけそうな顔をしてあえいでる、\nポーレットの声に教えてもらう。
1358 = "Một sự thật giản đơn như vậy, lại được giọng nói của Paulette,\nngười đang thở dốc với khuôn mặt như muốn tan chảy, dạy cho tôi biết."
# monologue
# JP: （ずっ――ずんっ――くりゅっ――ずうっ！）
# 1572 = "（小幅抽插）" 
# 【ポーレット】
# display as 波萊特
# JP: 「は――あっ――やけ、ちゃうっ――ンッ――わたし、の、\nなか――が――双鉄、くんの――おちん、ちん、でっ」
782 = "「Hà——a——cháy, mất thôi——ưm——bên trong,\ncủa em——bị——dương vật, của Anh Soutetsu——làm cho」"
# monologue
# JP: だから、勇気づけられる。\n大きく動けぬ、不安定なこの姿勢の中でも出来ること――
1179 = "Nhờ vậy mà tôi được tiếp thêm can đảm.\nĐiều có thể làm trong tư thế chông chênh, không thể cử động mạnh này——"
# monologue
# JP: （ずっ――ずるっっ――ムニュッ――こしゅっ！）
# 1572 = "（小幅抽插）" 
# 【ポーレット】
# display as 波萊特
# JP: 「んきゅっっ――うっ――い、いっ――おっぱいっ――\nもっ――こしゅんって、こす、れて――きもち、いいっ」
868 = "「Ư a——ư——sướng, quá——ngực——\ncũng——bị cọ, xát——sướng, quá」"
# monologue
# JP: 腰を小刻みに振りながら、くっつきあってる部分全てを、\n僕の体でコスってあげる。
1239 = "Vừa lắc hông nhè nhẹ, tôi vừa dùng cơ thể mình cọ xát\nvào tất cả những phần đang dính chặt lấy nhau."
# monologue
# JP: ポーレットの汗と匂いを僕に染みさせ、\n僕の熱と動きをポーレットに浸透させてく。
1363 = "Để mồ hôi và mùi hương của Paulette thấm vào tôi,\nđể hơi nóng và chuyển động của tôi thẩm thấu vào Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄、くん――んっ――そぉてつ、くぅんっ――」
952 = "「Anh Soutetsu——ưm——Anh Soutetsu——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、おいで。ポーレット」
874 = "「Ừ, lại đây. Paulette」"
# 【ポーレット】
# display as 波萊特
# JP: 「んうっ――んっ――ちゅっ――ちゅうっ――ちゅむっ\n――ちゅるっ――んっ――しゅ、き――らい、しゅきい」
842 = "「Ưm——ưm——chụt——chụt——chụt\n——chụt——ưm——thích, quá——yêu, quá đi」"
# monologue
# JP: キスをしながら、唾液と唾液を汗と汗とを、交換しながら、\nぬらつく体は、それでもゆるやかな動きを止めない。
1249 = "Vừa hôn nhau, vừa trao đổi nước bọt và mồ hôi,\ncơ thể ướt át vẫn không ngừng chuyển động nhịp nhàng."
# monologue
# JP: （にゅむっ――にゅっ――んるっ――にゅるっ――）
# 1607 = "（蹭來蹭去）" 
# monologue
# JP: キスでお互い融け合ってるのに、\n膣はいっそうぷりぷりになり、密着しながら蠢いてくる。
1248 = "Dù nụ hôn đã khiến cả hai hòa quyện vào nhau,\nâm đạo vẫn càng thêm căng mọng, vừa bám chặt vừa cựa quậy."
# monologue
# JP: ほんのわずかな、揺り動くような振動さえもが、\n何百倍にも増幅されて、鼻筋を抜け脳天にまで突き通る。
1449 = "Dù chỉ là một chấn động rung lắc vô cùng nhỏ,\ncũng được khuếch đại lên gấp hàng trăm lần, xông lên tận đỉnh đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「んっ……ちゅっ――んむっ……ふあっ――ぷあっ！\nあ！　あっ――あああっ！！」
854 = "「Ưm……chụt——ưm……phù——phù!\nA! A——a a a!!」"
# monologue
# JP: ピンクだ。肌が。あざやかなほど。\nもう完全にできあがり、ポーレットは染まってしまってる。
1351 = "Màu hồng. Làn da. Rực rỡ làm sao.\nĐã hoàn toàn chín muồi, Paulette đã bị nhuộm kín."
# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ――ポーレット」
900 = "「Anh cũng vậy——Paulette」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい――双鉄くん」
843 = "「Vâng——Anh Soutetsu」"
# monologue
# JP: 言葉は、もはやそれだけでいい。
1096 = "Ngôn từ, đến đây là đủ rồi."
# monologue
# JP: （ふにゅっ）
1593 = "（Cọ xát）"
# monologue
# JP: 甘えるようにして鼻先を、\nポーレットは、僕の鼻先に一瞬、かぁるくこすらせる。
1359 = "Như đang làm nũng,\nPaulette cọ nhẹ chóp mũi cô ấy vào chóp mũi tôi trong chốc lát."
# 【ポーレット】
# display as 波萊特
# JP: 「あむっ――ンッ――ちゅっ――ちゅうっ――ちゅ――」
802 = "「Ưm——ưm——chụt——chụt——chụt——」"
# monologue
# JP: そしてまたキス。キス。キス。キス。
1378 = "Rồi lại hôn. Hôn. Hôn. Hôn."
# monologue
# JP: 熱っぽい舌で、僕の口内を余すところなく蹂躙しながら、\nポーレットは、そうして僕は、休むことなく高まり続ける。
1354 = "Chiếc lưỡi nóng bỏng giày vò không sót một ngóc ngách nào trong khoang miệng tôi,\nPaulette, và cả tôi, tiếp tục thăng hoa không ngừng nghỉ."
# monologue
# JP: （にちゅっ――ちゅっ――こつんっ――ぬりゅっ――）
# 1567 = "（夾緊）" 
# monologue
# JP: 子宮を亀頭が突く度、膣はきゅうんと締め付けてくる。
1268 = "Mỗi lần quy đầu thúc vào tử cung, âm đạo lại siết chặt lại."
# monologue
# JP: 快感の、ゆるい蓄積が飽和にいたり、\n腰から下は、もう完全にシビレたようになっている。
1231 = "Sự tích tụ khoái cảm chậm rãi đã đạt đến độ bão hòa,\ntừ thắt lưng trở xuống như đã hoàn toàn tê liệt."
# 【ポーレット】
# display as 波萊特
# JP: 「あっ――んっ――んっ――ふあっ――あっ！！！」
807 = "「A——ưm——ưm——phù——a!!!」"
# monologue
# JP: （きゅむっ！　きゅっ！　きゅきゅっ！　にゅむっ！）
1546 = "（Nhóp nhép! Siết! Siết chặt! Nhóp nhép!）"
# 【双鉄】
# display as 雙鐵
# JP: 「んぁっ！」
# 814 = "「啊！」" 
# monologue
# JP: ――もうすぐだ。\n重ね合ってる肌から、舌から、繋がり合ってる性器から。
1470 = "——Sắp rồi.\nTừ làn da đan xen, từ chiếc lưỡi, từ bộ phận sinh dục đang kết nối với nhau."
# monologue
# JP: ポーレットがもうイキそうなのだと、\n僕にもはっきり伝わってくる。からっ――
1282 = "Tôi có thể cảm nhận rõ ràng,\nPaulette sắp lên đỉnh rồi. Nên——"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！　――っ！？」
816 = "「A! ——!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「んむっ！　んっ――ちゅっ――ちゅるっ――ちゅろっ、\nちゅっ――ちゅううっ――チュッ――むちゅっ」
873 = "「Ưm! Ưm——chụt——chụt——chụt,\nchụt——chụt——chụt——nhóp nhép」"
# monologue
# JP: （きゅんっ！　きゅきゅんっ！！！）
# 1567 = "（夾緊）" 
# monologue
# JP: スパートのため、キスを解こうとした瞬間、\n上のお口と下のお口が、離れまいとして抱きついてくる。
1146 = "Ngay khoảnh khắc tôi định dứt nụ hôn để bứt tốc,\ncả cái miệng bên trên lẫn cái miệng bên dưới đều ôm chặt lấy không chịu buông."
# monologue
# JP: ならば、このまま――\n体全部でくっつきあって、繋がったまま――
1459 = "Nếu vậy, cứ thế này——\nĐể toàn bộ cơ thể dính chặt vào nhau, cứ kết nối thế này——"
# monologue
# JP: （くっ――くりゅっ――こしゅっ――くんっ！　んっ！）
# 1572 = "（小幅抽插）" 
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あっ――ンッ――チュッ――ぷあっ――んん、\nふあっっ――あっ――あむっ！！！」
777 = "「Hà——a——ưm——chụt——phù——ưm,\nphù——a——ưm!!!」"
# monologue
# JP: （ぐりっ！　ゆさっ――ぐっ――ぐいいっ――むりゅっ）
1600 = "（Thọc mạnh! Lắc——ưm——mạnh——nhóp nhép）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふっ――んっ――ちゅっ――ちゅうっ――んっ――\nほーへふ、ふ――ん――わらひ――もっ――っ！！！！」
784 = "「Phù——ưm——chụt——chụt——ưm——\nAnh Sou, tetsu——ưm——em——cũng——!!!!」"
# monologue
# JP: （きゅううううううっっ！！！）
1566 = "（Siết chặt!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
# 818 = "「啊！！！」" 
# monologue
# JP: 抱きしめられて、全部が、僕に流れ込み――\nだから僕も！　自分の全部を隠すところなく解き放ちっ！
1364 = "Được ôm chặt, tất cả, tuôn trào vào tôi——\nVì thế tôi cũng vậy! Giải phóng toàn bộ bản thân không chút giấu giếm!"
# monologue
# JP: （びゅっ！　びゅるるっ！　びゅっ！　どびゅううっ！）
1552 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んうっ――ぷあっ！　あっ――んきゅっ！\nきゃ、ふうううううぅぅぅぅぅぅぅぅぅぅっ！！」
836 = "「Ưm——phù! A——ưm!\nKya, phuuuuuuuuuuu!!」"
# monologue
# JP: 射精。絶頂。\n同時の両者が入り混じりあい、ポーレットは体を弓にする。
1213 = "Xuất tinh. Lên đỉnh.\nCả hai hòa lẫn vào nhau cùng một lúc, cơ thể Paulette uốn cong như cánh cung."
# 【ポーレット】
# display as 波萊特
# JP: 「あ――あむっ――ん――チュ――ちゅううっ、ちゅっ」
808 = "「A——ưm——ưm——chụt——chụt, chụt」"
# monologue
# JP: けれどもすぐに、\nそうしなければ呼吸できぬとでも言うかのように。
1381 = "Nhưng ngay lập tức,\nnhư thể không làm vậy thì không thể thở được."
# monologue
# JP: 何度も、何度も、何度も何度も。\n優しく、熱く――キスしてくれる。
1083 = "Hết lần này đến lần khác, không biết bao nhiêu lần.\nCô ấy hôn tôi——thật dịu dàng, thật nóng bỏng."
# monologue
# JP: （びゅっ――びゅるっ！　んびゅ！　びゅうっ――）
1550 = "（Phụt——phụt! Phụt! Phụt——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ん……チュッ――んんっ――んちゅ――ちゅうっ――\nふっ――れへ……まふ……へ――ん……ちゅう、ちゅっ」
858 = "「Ưm……chụt——ưm——chụt——chụt——\nphù——hê……hê……hê——ưm……chụt, chụt」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん……ぷっ――」
845 = "「Ưm……phù——」"
# monologue
# JP: （びゅくっ！　びゅっ――びゅる……びゅ……びゅう）
1559 = "（Phụt! Phụt——phụt……phụt……phụt）"
# monologue
# JP: 二度目の射精は、結合部から白濁液を溢れ出させれる。\nそれが椅子に落ち、床へと垂れて――
1401 = "Lần xuất tinh thứ hai khiến bạch trọc trào ra từ chỗ kết nối.\nNó rơi xuống ghế, rỏ xuống sàn——"
# monologue
# JP: ポーレットはそれを気にもとめずに、\nひたすらキスで僕に甘えて――キスして僕を、甘やかす。
1347 = "Paulette chẳng mảy may để tâm đến điều đó,\nchỉ một mực làm nũng tôi bằng những nụ hôn——hôn để chiều chuộng tôi."
# 【双鉄】
# display as 雙鐵
# JP: （ああ……）
1561 = "（A a……）"
# monologue
# JP: 不意に、悟る。\nいや――ポーレットが肌とよだれで伝えてくれてる。
1255 = "Bất chợt, tôi ngộ ra.\nKhông——là Paulette đang dùng làn da và nước bọt để truyền đạt cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: （これが……放課後というものか――）
1615 = "（Đây là……cái gọi là sau giờ học sao——）"
# monologue
# JP: 授業が終わって、帰りもせずにたむろしている人影達。
1256 = "Những bóng người tụ tập sau khi tan học mà không chịu về."
# monologue
# JP: 僕には意味すらわからなかった存在に、\n温度と色とざわめきを、ポーレットが与えてくれている。
1241 = "Paulette đã mang đến nhiệt độ, màu sắc và sự huyên náo\ncho một sự tồn tại mà tôi thậm chí còn không hiểu ý nghĩa của nó."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……ぷっ――んくっ――――ぷあっ！　あっ……」
859 = "「Ưm……phù——ưm――――phù! A……」"
# monologue
# JP: ゆがて、ゆるやかにキスがはがれる。\n銀につたったよだれの雫を、今後は僕が舐めとっていく。
1250 = "Một lúc sau, nụ hôn từ từ tách ra.\nTôi liếm đi giọt nước bọt lấp lánh vương lại."
# 【双鉄】
# display as 雙鐵
# JP: （ちゅっ）
1547 = "（Chụt）"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……双鉄、くん」
812 = "「A……Anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん……ポーレット？」
862 = "「Ừm……Paulette?」"
# monologue
# JP: はじめて味わう学園生活。\nはじめて経験する放課後。
1457 = "Cuộc sống học đường lần đầu tiên được nếm trải.\nGiờ tan trường lần đầu tiên được trải nghiệm."
# monologue
# JP: それをこんなにあっさりと、\n終わらせていいわけがない。
1458 = "Không thể nào để nó\nkết thúc chóng vánh như vậy được."
# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くんっ！」
883 = "「Vâng, Anh Soutetsu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「んっ！」
# 871 = "「嗯！」" 
# monologue
# JP: そして、キス。キス。キス。キス。\n勃起は硬度を取り戻し。
1247 = "Rồi lại hôn. Hôn. Hôn. Hôn.\nDương vật lại khôi phục độ cứng."
# monologue
# JP: そのまま僕らは夜が来るまで。夜が来たとて。\nこの放課後を――遊び続ける。
1313 = "Cứ thế cho đến khi đêm buông xuống. Kể cả khi đêm đã buông.\nChúng tôi tiếp tục chơi đùa——trong giờ tan trường này."
