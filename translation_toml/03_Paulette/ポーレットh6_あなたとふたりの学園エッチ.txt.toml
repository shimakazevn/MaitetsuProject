1312 = "撲通、撲通——一股暖暖的熱流在我體內遊蕩，讓我剛剛射過精的陽具瞬間恢復了硬度。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……」
# 844 = "「嗯……」" 

# monologue
# JP: ゆるく。ポーレットの腰が蠢く。\n僕の勃起を股間にあてて、そうして、瞳が閉じられる。
1362 = "波萊特的腰肢緩緩扭動。她讓自己的胯間對準我的分身，然後閉上了眼睛。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……キス」
953 = "「雙鐵君……親我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
867 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……ちゅっ……ちゅう……ちゅむっ……ふっ――\nんっ――ちゅるっ――ちゅっ――れろっ――れるっ――」
856 = "「嗯……啾……啾……啾嚕……呼——嗯——啾嚕——啾噗——啾嚕——啾嚕——」" 

# monologue
# JP: 唇をあわせたその瞬間には、\n舌と舌とも溶け合っている。
1149 = "在我們的唇貼合在一起的瞬間，我們的舌頭也纏到了一起。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……ふぁ……っ――ほーへふ……ふん……んっ――\nちゅ――ちゅむっ――ねろおっ――れるうっ――っ――」
850 = "「嗯……呼……啊——呼……嗯……嗯——雙鐵——啾噗——啾嚕——啾噗——嗯——」" 

# monologue
# JP: 鼻息でゆるくくすぐりながら、くぐもった声で僕を呼ぶ。\n舌は休まず蠢いて、僕の歯の一本一本まで愛撫してくれる。
1187 = "她的鼻息撩撥著我的汗毛，同時還用模糊不清的聲音呼喚著我。她的小舌也沒有停下，在我嘴裡愛撫著每一顆牙。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……ちゅっ――ちゅっ――んっ――しゅきっ――\nん――ぷあっ――あ。好き。です。あなたが。双鉄くん」
853 = "「嗯……啾——啾——嗯——我好喜歡——嗯――呼啊——啊，我好喜歡你，雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。僕もだ。ポーレットのことが大好きだ」
879 = "「嗯，我也一樣，我也最喜歡你了」" 

# monologue
# JP: ポーレットの腰がふ、っと浮く。\n僕の首へと回されてる手の、熱と力みが少し増す。
1352 = "波萊特抬起了腰。她環在我脖子上的手臂也稍稍用了點力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、僕らは――」
911 = "「所以我們——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。ひとつに――んっ！」
864 = "「嗯。合為一體——嗯！」" 

# monologue
# JP: （にゅるっ――るっ――にゅるうっ――にゅ！）
1575 = "（扭來扭去）" 

# monologue
# JP: 焦らすように。弄ぶように。\n僕の勃起のその上で、ポーレットが淫靡なダンスを踊る。
1350 = "波萊特在肉棒上方跳起了淫靡的舞蹈，看起來就像是在誘惑我、挑逗我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……ふっ……あ……あれ？」
848 = "「嗯……呼……咦……咦？」" 

# monologue
# JP: 足に力が入らないのか、僕の勃起がヒクつくせいか、\n思うようには、なかなか位置が定まらないらしい。
1134 = "可能是因為她腿上使不上力氣，也可能是因為我的肉棒晃來晃去，她找不到合適的位置。" 

# monologue
# JP: （んりゅ――にゅるっ――りゅっ――にゅるん）
# 1607 = "（蹭來蹭去）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ」
# 813 = "「啊」" 

# monologue
# JP: けれども、とろとろのおまんこに、勃起がゆるく擦られる、\nこの感触も、それだけで射精できそうなほど素晴らしい。
1109 = "但是濕滑軟嫩的小穴輕輕磨蹭著肉棒的感覺也很棒，甚至光靠這樣我就能射出來。" 

# monologue
# JP: おかげで余計に勃起は暴れ、\nポーレットの手も、汗と汁とでぬらつきを増し――
1295 = "所以我的分身就更不安分了，波萊特的小手也被汗水和黏液弄濕了——" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 813 = "「啊」" 

# monologue
# JP: ぴたりと、吸い付くような感覚。
1091 = "一股被吸到的感覺傳來。" 

# monologue
# JP: 途端、心が。想いがひとつに。\n綺麗なひとつに重なっていく。
1316 = "此時我們的心靈和情感完美地結合在了一起。" 

# 【ポーレット】
# display as 波萊特
# JP: 「いきますね？　双鉄くん」
907 = "「我要坐下了，雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 867 = "「嗯」" 

# monologue
# JP: 腰を支える。\nけれども引き寄せたりはしない。
1263 = "我扶著她的腰。但是我沒有往下按。" 

# monologue
# JP: 全てをポーレットに任せ――
1265 = "我把主動權交給波萊特——" 

# 【ポーレット】
# display as 波萊特
# JP: 「んっ――ふあっ――あっ――太っ――\nっ――先、ぽっ――んあっ――んん～～っ！！！」
833 = "「嗯——呼——啊——好粗——嗯——前端——嗯——嗯～～！！！」" 

# monologue
# JP: （ずぶんっ！！！！）
# 1548 = "（噗哧）" 

# 【ポーレット】
# display as 波萊特
# JP: 「きゃふっ！！！」
769 = "「呀！！！」" 

# monologue
# JP: 一気に、貫く。\nポーレットの一番奥底に、僕の亀頭が密着してる。
1410 = "肉棒一口氣貫穿到了花芯。我的龜頭抵上了波萊特的最深處。" 

# 【ポーレット】
# display as 波萊特
# JP: 「こ、れ……これ……ん――深っ――い――ふぁんっ！」
944 = "「這樣……這樣……嗯——好深——呼啊！」" 

# monologue
# JP: （みちちっ！　みちっ！　きゅううっ！　きゅんっ！！）
1567 = "（夾緊）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
771 = "「呃——」" 

# monologue
# JP: 何もせずとも、感じてしまう。\n勃起を包む強い刺激に、背筋がぞくぞく震えてしまう。
1128 = "即使什麼都不做，快感也非常強烈。陽具被包裹住的刺激讓我整個後背都舒服得抖了起來。" 

# monologue
# JP: ポーレットの、ただでさえムチムチしきった\nおまんこ、膣は、急な挿入に驚いたのか――
1353 = "波萊特本就豐腴的蜜壺可能是被突然的插入搞得有點措手不及——" 

# 【ポーレット】
# display as 波萊特
# JP: 「はッ――ぁっ――い、いっ――これっつ――いっぱい\n――いっぱいっ――双鉄、くんが――いっぱい、でっ」
780 = "「呼——啊——好——這樣——填滿了——填滿了——全被——雙鐵君填滿了」" 

# monologue
# JP: （ミュチッ――みちちっ――みゅるっ――にゅむんっ）
# 1567 = "（夾緊）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くっ――ぁっ――」
772 = "「呃——啊——」" 

# monologue
# JP: ――僕の勃起を圧迫するほどまとわりついて、\nそのざわめきで、僕を精査し、誰何してくる。
1437 = "蜜道用力壓迫著我的分身，彷彿是在盤查我的底細，問我到底是誰。" 

# 【双鉄】
# display as 雙鐵
# JP: （なら、ば――）
1594 = "（既然如此——）" 

# monologue
# JP: （くんっ！）
1617 = "（頂入）" 

# 【ポーレット】
# display as 波萊特
# JP: 「やふっ――ふあっ！！？　んっ――そうてつ、くっ――\nあっ！　いまっ――うごいた、らっ――んきゅんっ！！」
805 = "「啊——呼啊！！？嗯——雙鐵——啊！現在——要是動起來——嗯啊！！」" 

# monologue
# JP: （きゅううううううっ！！！）
1577 = "（抵上）" 

# monologue
# JP: だから子宮に甘くキスして、\n僕が僕だと伝えてあげ――っ！？
1290 = "所以我就讓肉棒親上子宮，清清楚楚地告訴它我是誰——" 

# monologue
# JP: （ぞわわわわわわっ！！！）
1605 = "（蠕動）" 

# 【双鉄】
# display as 雙鐵
# JP: 「うぉっ！」
793 = "「哇！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃんっ――なにっ――これっ――」
762 = "「呀——這是——怎麼回事」" 

# monologue
# JP: かはっ、と荒い息を吐き、\nポーレットがいやいやと首を振る。
1348 = "波萊特喘著粗氣，同時搖起頭來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「しらない――こん、なのっ――んっ！　わたしっ――\n体っ、がっ――あっ！　[なか,1]膣内がっ――うごい――てっ！」
895 = "「我不知道——這是——嗯！我——我的身體——啊！裡面——在動！」" 

# monologue
# JP: （にゅうっ――にゅっ――にゅるうっ――きゅんっ！）
# 1605 = "（蠕動）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ――あっ――あっ」
806 = "「啊——啊——啊」" 

# monologue
# JP: 吐き気がするほど強い快感。\n密着をして、のっかれてて。それでも腰が動いてしまう。
1233 = "快感強烈到幾乎讓人無法承受。現在我們緊貼在一起，她騎在我身上，我仍然身不由己地活動起來。" 

# monologue
# JP: 膣のざわめきに促され――\n僕の意思など関係なしに、体が射精を求めてしまう！
1161 = "在蠕動蜜道的催促下，我的身體已經不顧我的意志，向著射精這一目標開始衝刺！" 

# monologue
# JP: （ずっ――るっ――ずぬっ――ぬっ――ぷっ！）
1572 = "（小幅抽插）" 

# 【ポーレット】
# display as 波萊特
# JP: 「や……これっ――はっ――ぁあっ――こんなの――\nしら、ないっ――んっ――きもち――よす、ぎっ――」
766 = "「呀……這樣——呼——啊——我以前——沒有過這種——實在——太刺激了——」" 

# monologue
# JP: （ず――うっ――）
1578 = "（抽出）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃふっ！！？」
770 = "「呀！！？」" 

# monologue
# JP: （ずんっ！！！）
1591 = "（插入）" 

# 【ポーレット】
# display as 波萊特
# JP: 「きゅぅぅぅぅぅぅぅぅぅん！！！」
768 = "「呀啊啊啊！！！」" 

# monologue
# JP: （きゅっ！　きゅきゅっ！　にゅうっ！　にゅるんっ！）
1604 = "（蠕動夾緊）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ――」
# 803 = "「啊——」" 

# monologue
# JP: 僕の呼応に安心したのか、喜んだのか。\n膣はいっそう甘く蠢き、勃起の全部を揉みしだく。
1435 = "蜜道就像是在為我的回應感到欣喜，這下蠕動的力度更大了，整個陽具都被大力揉搓著。" 

# 【双鉄】
# display as 雙鐵
# JP: （これ、はっ――）
1614 = "（這——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「は……ァッ――双鉄――くんっ――これっ――すごく、\nふっ――あっっ――きもち――よく――って――ん！」
786 = "「呼……啊——雙鐵――這樣——真的是——呼——啊——太舒服了——！」" 

# monologue
# JP: ポーレットの腰も蠢いている。\n快感をただひたすら求め、僕の勃起を締めてはしごく。
1345 = "波萊特也在扭動著腰肢。她也在渴求著進一步的快感，套弄著我的肉棒。" 

# monologue
# JP: ……保たない、とても。保つわけがない。\nならばふたりで、ふたりで一緒にイクためにっ――！
544 = "……堅持不住了，我真的是堅持不住了。那就一起高潮，為了能讓我們兩個一起高潮——" 

# monologue
# JP: （ずっ――ずるっ！　ずんっ！　ゆさっ！！）
# 1567 = "（夾緊）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふっ――ふぁっ――んっ――はぁっ――いいっ――\nおまん、こっ――すごくっ――きゅうんっ――って！」
775 = "「呼——呼啊——嗯——呼——好——小穴——收縮得——好厲害——！」" 

# monologue
# JP: 膣に責められるとき、\n膣もまた、僕の勃起に責められてるのだ――
1159 = "在花徑刺激著我的時候，我的分身也給她帶來了快感——" 

# monologue
# JP: そんな単純な真実を、溶ろけそうな顔をしてあえいでる、\nポーレットの声に教えてもらう。
1358 = "波萊特用欲仙欲死的表情和聲音讓我明白了這一事實。" 

# monologue
# JP: （ずっ――ずんっ――くりゅっ――ずうっ！）
# 1572 = "（小幅抽插）" 

# 【ポーレット】
# display as 波萊特
# JP: 「は――あっ――やけ、ちゃうっ――ンッ――わたし、の、\nなか――が――双鉄、くんの――おちん、ちん、でっ」
782 = "「呼——啊——要燒傷了——嗯——我的裡面——要被——雙鐵君——你的雞雞——」" 

# monologue
# JP: だから、勇気づけられる。\n大きく動けぬ、不安定なこの姿勢の中でも出来ること――
1179 = "她的反應給了我勇氣。在現在這種不能盡情活動的不穩定的姿勢中——" 

# monologue
# JP: （ずっ――ずるっっ――ムニュッ――こしゅっ！）
# 1572 = "（小幅抽插）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んきゅっっ――うっ――い、いっ――おっぱいっ――\nもっ――こしゅんって、こす、れて――きもち、いいっ」
868 = "「嗯啊——啊——好——胸部——也被蹭到——好舒服——」" 

# monologue
# JP: 腰を小刻みに振りながら、くっつきあってる部分全てを、\n僕の体でコスってあげる。
1239 = "我一邊小幅挺動著，一邊摩擦著她緊貼我的身體。" 

# monologue
# JP: ポーレットの汗と匂いを僕に染みさせ、\n僕の熱と動きをポーレットに浸透させてく。
1363 = "波萊特的香汗和體香染到了我身上，同時我的熱量和動作也傳遍了波萊特全身。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄、くん――んっ――そぉてつ、くぅんっ――」
952 = "「雙鐵君——嗯——雙鐵君——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、おいで。ポーレット」
874 = "「嗯，來吧，波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「んうっ――んっ――ちゅっ――ちゅうっ――ちゅむっ\n――ちゅるっ――んっ――しゅ、き――らい、しゅきい」
842 = "「嗯——嗯——啾——啾——啾嚕————啾嚕——嗯——我喜歡——我好愛你」" 

# monologue
# JP: キスをしながら、唾液と唾液を汗と汗とを、交換しながら、\nぬらつく体は、それでもゆるやかな動きを止めない。
1249 = "我們深情地吻著，交換著唾液和汗水，同時兩人已經濕透的身體也沒有停止動作。" 

# monologue
# JP: （にゅむっ――にゅっ――んるっ――にゅるっ――）
# 1607 = "（蹭來蹭去）" 

# monologue
# JP: キスでお互い融け合ってるのに、\n膣はいっそうぷりぷりになり、密着しながら蠢いてくる。
1248 = "我們在通過深吻融為一體的時候，蜜壺裡擠壓得更厲害了，一邊蠕動一邊套弄陽具。" 

# monologue
# JP: ほんのわずかな、揺り動くような振動さえもが、\n何百倍にも増幅されて、鼻筋を抜け脳天にまで突き通る。
1449 = "輕輕的一點動作，甚至是些許的震動也會被放大好幾百倍，讓快感直衝腦海。" 

# 【ポーレット】
# display as 波萊特
# JP: 「んっ……ちゅっ――んむっ……ふあっ――ぷあっ！\nあ！　あっ――あああっ！！」
854 = "「嗯……啾——嗯……呼啊——呼啊！啊！啊——啊啊啊！！」" 

# monologue
# JP: ピンクだ。肌が。あざやかなほど。\nもう完全にできあがり、ポーレットは染まってしまってる。
1351 = "波萊特已經發情到了極點，她的肌膚已經染成鮮艷的粉紅色。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだ――ポーレット」
900 = "「我也愛你——波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい――双鉄くん」
843 = "「嗯——雙鐵君」" 

# monologue
# JP: 言葉は、もはやそれだけでいい。
1096 = "不需要更多的語言了。" 

# monologue
# JP: （ふにゅっ）
1593 = "（摩擦）" 

# monologue
# JP: 甘えるようにして鼻先を、\nポーレットは、僕の鼻先に一瞬、かぁるくこすらせる。
1359 = "波萊特用鼻尖蹭了一下我的鼻子，表達著她內心的喜悅。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あむっ――ンッ――ちゅっ――ちゅうっ――ちゅ――」
802 = "「唔——嗯——啾——啾——啾——」" 

# monologue
# JP: そしてまたキス。キス。キス。キス。
1378 = "然後我們再次接吻，我們不停地吻。" 

# monologue
# JP: 熱っぽい舌で、僕の口内を余すところなく蹂躙しながら、\nポーレットは、そうして僕は、休むことなく高まり続ける。
1354 = "波萊特火熱的小舌在我嘴裡攪動，我們的情慾如烈火一般越燒越旺。" 

# monologue
# JP: （にちゅっ――ちゅっ――こつんっ――ぬりゅっ――）
# 1567 = "（夾緊）" 

# monologue
# JP: 子宮を亀頭が突く度、膣はきゅうんと締め付けてくる。
1268 = "我每用龜頭頂一下子宮，蜜道就會夾一下陽具。" 

# monologue
# JP: 快感の、ゆるい蓄積が飽和にいたり、\n腰から下は、もう完全にシビレたようになっている。
1231 = "快感已經積累到了飽和的程度，我的下半身已經完全處於麻痺狀態了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ――んっ――んっ――ふあっ――あっ！！！」
807 = "「啊——嗯——嗯——呼啊——啊！！！」" 

# monologue
# JP: （きゅむっ！　きゅっ！　きゅきゅっ！　にゅむっ！）
1546 = "（啾噗！啾噗！啾嚕！啾噗！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「んぁっ！」
# 814 = "「啊！」" 

# monologue
# JP: ――もうすぐだ。\n重ね合ってる肌から、舌から、繋がり合ってる性器から。
1470 = "馬上就快了。我從我們貼在一起的皮膚、纏在一起的舌頭、結合在一起的性器就能感受到。" 

# monologue
# JP: ポーレットがもうイキそうなのだと、\n僕にもはっきり伝わってくる。からっ――
1282 = "我能很清楚地感覺到，波萊特馬上就要高潮了。那麼——" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！　――っ！？」
816 = "「啊！嗯！？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「んむっ！　んっ――ちゅっ――ちゅるっ――ちゅろっ、\nちゅっ――ちゅううっ――チュッ――むちゅっ」
873 = "「嗯！嗯——啾——啾嚕——啾嚕——啾——啾嚕——啾噗——啾噗」" 

# monologue
# JP: （きゅんっ！　きゅきゅんっ！！！）
# 1567 = "（夾緊）" 

# monologue
# JP: スパートのため、キスを解こうとした瞬間、\n上のお口と下のお口が、離れまいとして抱きついてくる。
1146 = "因為我們到了最後衝刺階段，在接吻結束之時，她上面的嘴和下面的嘴都咬著我不讓我離開。" 

# monologue
# JP: ならば、このまま――\n体全部でくっつきあって、繋がったまま――
1459 = "那我就順勢而為，繼續貼緊身體，保持著連接的狀態——" 

# monologue
# JP: （くっ――くりゅっ――こしゅっ――くんっ！　んっ！）
# 1572 = "（小幅抽插）" 

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あっ――ンッ――チュッ――ぷあっ――んん、\nふあっっ――あっ――あむっ！！！」
777 = "「呼——啊————啾噗——呼啊——嗯——呼啊——啊——嗯！！！」" 

# monologue
# JP: （ぐりっ！　ゆさっ――ぐっ――ぐいいっ――むりゅっ）
1600 = "（用力頂入）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふっ――んっ――ちゅっ――ちゅうっ――んっ――\nほーへふ、ふ――ん――わらひ――もっ――っ！！！！」
784 = "「呼——嗯——啾——啾——嗯——雙鐵——嗯——我也——！！！！」" 

# monologue
# JP: （きゅううううううっっ！！！）
1566 = "（夾緊！！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！！！」
# 818 = "「啊！！！」" 

# monologue
# JP: 抱きしめられて、全部が、僕に流れ込み――\nだから僕も！　自分の全部を隠すところなく解き放ちっ！
1364 = "波萊特緊緊抱住我，在我身上宣洩出了一切。那我也一樣，我也把自己全部釋放出來！" 

# monologue
# JP: （びゅっ！　びゅるるっ！　びゅっ！　どびゅううっ！）
1552 = "（噗噗！噗噗！噗嚕！噗嚕！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んうっ――ぷあっ！　あっ――んきゅっ！\nきゃ、ふうううううぅぅぅぅぅぅぅぅぅぅっ！！」
836 = "「嗯——呼啊！啊——嗯！呀啊啊啊啊！！」" 

# monologue
# JP: 射精。絶頂。\n同時の両者が入り混じりあい、ポーレットは体を弓にする。
1213 = "射精和高潮同時襲來，強烈的刺激讓波萊特整個繃成了弓形。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――あむっ――ん――チュ――ちゅううっ、ちゅっ」
808 = "「啊——嗯——嗯——啾——啾啾」" 

# monologue
# JP: けれどもすぐに、\nそうしなければ呼吸できぬとでも言うかのように。
1381 = "然而她馬上又吻了上來，就好像不接吻就無法呼吸一般。" 

# monologue
# JP: 何度も、何度も、何度も何度も。\n優しく、熱く――キスしてくれる。
1083 = "一次又一次，她給了我無數個溫柔如水又熱情洋溢的吻。" 

# monologue
# JP: （びゅっ――びゅるっ！　んびゅ！　びゅうっ――）
1550 = "（噗噗——噗嚕！噗噗！噗噗——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……チュッ――んんっ――んちゅ――ちゅうっ――\nふっ――れへ……まふ……へ――ん……ちゅう、ちゅっ」
858 = "「嗯……啾嚕——嗯——啾噗——啾——呼——嘿嘿……嗯……啾、啾」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん……ぷっ――」
845 = "「嗯……呼——」" 

# monologue
# JP: （びゅくっ！　びゅっ――びゅる……びゅ……びゅう）
1559 = "（噗嚕！噗噗……噗嚕……）" 

# monologue
# JP: 二度目の射精は、結合部から白濁液を溢れ出させれる。\nそれが椅子に落ち、床へと垂れて――
1401 = "第二次射精讓白濁的液體從我們結合的地方溢了出來。精液流到了椅子上，再順著流到了地上。" 

# monologue
# JP: ポーレットはそれを気にもとめずに、\nひたすらキスで僕に甘えて――キスして僕を、甘やかす。
1347 = "波萊特卻是毫不在意，只是一個勁地親著我，用熱吻表達著愛意。" 

# 【双鉄】
# display as 雙鐵
# JP: （ああ……）
1561 = "（噢……）" 

# monologue
# JP: 不意に、悟る。\nいや――ポーレットが肌とよだれで伝えてくれてる。
1255 = "我忽然就明白了。應該說是波萊特的身體和唾液讓我領悟了。" 

# 【双鉄】
# display as 雙鐵
# JP: （これが……放課後というものか――）
1615 = "（這就是……所謂的放學後的時間——）" 

# monologue
# JP: 授業が終わって、帰りもせずにたむろしている人影達。
1256 = "我想到了下課之後還聚在一起的那些人。" 

# monologue
# JP: 僕には意味すらわからなかった存在に、\n温度と色とざわめきを、ポーレットが与えてくれている。
1241 = "我以前根本不知道那有什麼意義，而波萊特告訴了我它的溫度、色彩、聲音。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……ぷっ――んくっ――――ぷあっ！　あっ……」
859 = "「嗯……噗——嗯——呼啊！啊……」" 

# monologue
# JP: ゆがて、ゆるやかにキスがはがれる。\n銀につたったよだれの雫を、今後は僕が舐めとっていく。
1250 = "我們的嘴唇過了良久才慢慢分開。然後我把我們唇間連起的唾液絲線舔掉。" 

# 【双鉄】
# display as 雙鐵
# JP: （ちゅっ）
1547 = "（啾）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……双鉄、くん」
812 = "「啊……雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん……ポーレット？」
862 = "「嗯……波萊特？」" 

# monologue
# JP: はじめて味わう学園生活。\nはじめて経験する放課後。
1457 = "這是我第一次體驗學校生活。這是我第一次經歷放學後的時間。" 

# monologue
# JP: それをこんなにあっさりと、\n終わらせていいわけがない。
1458 = "這麼寶貴的體驗當然不能這麼快就結束。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くんっ！」
883 = "「嗯，雙鐵君！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「んっ！」
# 871 = "「嗯！」" 

# monologue
# JP: そして、キス。キス。キス。キス。\n勃起は硬度を取り戻し。
1247 = "我們又開始瘋狂接吻。肉棒又一次恢復硬度。" 

# monologue
# JP: そのまま僕らは夜が来るまで。夜が来たとて。\nこの放課後を――遊び続ける。
1313 = "於是我們在夜幕降臨之前——即使天黑下去也無關緊要。我們繼續玩著這個“放學後”的遊戲。" 
