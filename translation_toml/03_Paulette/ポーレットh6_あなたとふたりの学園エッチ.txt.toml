# display as 雙鐵
# JP: 「これでは、足りん。\n僕が、ポーレットのおっぱいを“使う”のならば」
946 = "「Thế này thì, chưa đủ.\nNếu anh muốn 'sử dụng' ngực của Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？」
797 = "「Dạ?」"
# monologue
