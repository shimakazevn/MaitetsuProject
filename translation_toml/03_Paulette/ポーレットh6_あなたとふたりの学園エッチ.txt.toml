1292 = "Muốn em ấy an tâm, muốn em ấy mạnh dạn hơn,\nnên tôi bất giác nói nhanh hơn một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、ポーレット。僕は君にも――\nポーレットにも、好きに動いて欲しいのだ」
903 = "「Nghĩa là, Paulette à. Anh cũng muốn em——\nMuốn Paulette cũng tự do cử động theo ý thích.」"
# 【ポーレット】
# display as 波萊特
