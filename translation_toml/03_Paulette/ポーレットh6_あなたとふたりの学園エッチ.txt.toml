[script]
# lines: 337 
# monologue
# JP: ……学園時代のポーレットを。\n心も体も、全部まるごと、僕のものにする。
548 = "……Paulette của thời học sinh.\nCả tâm hồn lẫn thể xác, tất cả, đều sẽ thuộc về tôi."
# monologue
# JP: ならば状況設定も、\nできり限りはそれに合わせるべきであろう。
1288 = "Nếu vậy, bối cảnh tình huống\ncũng nên điều chỉnh sao cho phù hợp nhất có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「椅子に……座ってもらえるか？」
735 = "「Em có thể……ngồi xuống ghế được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、はい。……えと――こう、ですか？」
877 = "「V, vâng. ……Ừm——như thế này, ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「机の上には、筆記用具などあると雰囲気が出る」
920 = "「Trên bàn có thêm bút viết thì sẽ ra dáng hơn đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、わかりました。そういうことですね？\nなら、カバンもここにかけて――よいしょ」
821 = "「A, em hiểu rồi. Là ý đó đúng không ạ?\nVậy thì, treo cặp lên đây nữa——xong rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
831 = "「Ừ——」"
# monologue
# JP: 学園時代の教室は、\n僕にとっては、色彩の無い空間だった。
1214 = "Lớp học thời học sinh,\nđối với tôi, là một không gian chẳng hề có màu sắc."
# monologue
# JP: 帝大に進んでのちこそ、友人を得ることができたが。\nそれ以前は……同級にどんな者がいたかさえ定かではない。
1163 = "Chỉ sau khi lên Đại học Đế quốc, tôi mới có thể kết bạn.\nTrước đó……tôi thậm chí còn chẳng nhớ rõ bạn cùng lớp gồm những ai."
# 【ポーレット】
# display as 波萊特
# JP: 「あの……これで、どうでしょう？」
950 = "「Ừm……Thế này, được chưa anh?」"
# monologue
# JP: モノクロームの記憶にぽっと色づくようにして、\nポーレットが溶け込んで来てくれる。
1366 = "Như điểm xuyết màu sắc vào ký ức đơn sắc của tôi,\nPaulette đã hòa mình vào khung cảnh ấy."
# monologue
# JP: とてもうれしく。あたたかい。\n錆びついていた時計の針が、動き始めた気さえする。
1286 = "Thật vui sướng. Thật ấm áp.\nCảm giác như kim đồng hồ rỉ sét bấy lâu đã bắt đầu nhúc nhích."
# 【双鉄】
# display as 雙鐵
# JP: （学園とは……教室とは。\nこんなにも、命を感じる場所だったのか――）
1571 = "（Trường học là……Lớp học là.\nMột nơi tràn đầy sức sống đến thế này sao——）"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？」
956 = "「Anh Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
822 = "「À, không có gì.」"
# monologue
# JP: 無言のままに、目が問うてくる。\nが、この感慨は、言葉にまとまりそうもない。
1192 = "Đôi mắt em thầm hỏi.\nNhưng cảm xúc này, có lẽ chẳng thể diễn tả thành lời."
# 【双鉄】
# display as 雙鐵
# JP: 「学園というのは――\nいたく、性的な場所だったのだな、と」
890 = "「Trường học ấy mà——\nQuả là một nơi, đầy tính nhục dục nhỉ.」"
# monologue
# JP: 一番、表層の部分だけ。\nそれを話せば、言葉はするするつながっていく。
1253 = "Chỉ là phần bề nổi nhất thôi.\nNhưng khi nói ra, những lời tiếp theo sẽ tự khắc tuôn trào."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットがもし同級にいれば、そのことに。\n僕もあるいは、気づけていたのかもしれないな」
885 = "「Nếu Paulette học cùng lớp, có lẽ.\nAnh đã nhận ra điều đó sớm hơn rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そう思ってもらえるの、とても嬉しいです」
737 = "「Nghe anh nói vậy, em vui lắm.」"
# monologue
# JP: ふわりと、笑う。\nただそれだけで、心が股間が、ビクンと喜び悶えてしまう。
1189 = "Em mỉm cười nhẹ nhàng.\nChỉ vậy thôi cũng đủ khiến trái tim và hạ bộ tôi rộn rạo vì sung sướng."
# 【ポーレット】
# display as 波萊特
# JP: 「けど……会えなかった時間があるから、今のわたしで、\n今の双鉄くんで。こうなれたのかなっても、思います」
732 = "「Nhưng mà……chính vì có khoảng thời gian không gặp nhau, nên em của hiện tại,\nvà anh Soutetsu của hiện tại. Mới có thể ở bên nhau thế này, em nghĩ vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
917 = "「Cũng phải.」"
# monologue
# JP: 言葉のたびに、少し荒いでる呼吸のたびに、\nポーレットの体がわずかに震える。
1155 = "Mỗi khi cất lời, mỗi khi nhịp thở có chút gấp gáp,\ncơ thể Paulette lại khẽ run lên."
# monologue
# JP: 甘い体臭が鼻から脳へとたちのぼってきて、\n僕の一番奥底を、カラカラにまで乾かしていく。
1393 = "Mùi hương cơ thể ngọt ngào xộc từ mũi lên não,\nvắt kiệt chút lý trí sâu thẳm nhất trong tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「いかなポーレットといえど、\nまさか、学園生時代には――」
892 = "「Dù là Paulette đi nữa,\nchẳng lẽ, thời học sinh em lại——」"
# monologue
# JP: （ぷりゅんっ）
1584 = "（Ấn nhẹ）"
# 【ポーレット】
# display as 波萊特
# JP: 「んっ……」
844 = "「Ưm……」"
# monologue
# JP: 指先で、ごくごく軽く乳首を押せば、\n甘やかな声と肌の張りとが、心地良い反応を示してくれる。
1272 = "Chỉ cần dùng đầu ngón tay ấn cực kỳ nhẹ lên núm vú,\ngiọng nói ngọt ngào cùng làn da căng mịn đã đáp lại tôi bằng một phản ứng đầy thỏa mãn."
# monologue
# JP: 触れたい。もっと近くに行きたい。\n思いがそのまま、手のひらの、指の動きに変わる。
1259 = "Muốn chạm vào. Muốn tiến lại gần hơn nữa.\nSuy nghĩ ấy lập tức hóa thành chuyển động của lòng bàn tay, của những ngón tay."
# monologue
# JP: （ふにゅ――もにゅっ――さすっ――くりゅんっ）
1588 = "（Nắn nắn——xoa xoa——vuốt ve——cọ xát）"
# 【双鉄】
# display as 雙鐵
# JP: 「――これほどまでに魅力的な胸だったとは、\nさすがに思えんからな」
935 = "「——Quả thực anh không thể ngờ,\nngực em lại quyến rũ đến nhường này đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁ……あっ――双鉄、くん……指……\nエッチ――ですっ……ふぁ」
788 = "「Hà……a——anh Soutetsu……ngón tay……\nDâm đãng——quá……phù」"
# monologue
# JP: （もにゅっ――もみゅっ――ぷりゅッ――くりゅゅ）
# 1588 = "（揉來揉去）" 
# monologue
# JP: 揉みしだくたび、谷間のスカーフも揺れて乱れる。\n学園時代のポーレットだと、鮮やかな赤で主張してくる。
1153 = "Mỗi lần xoa nắn, chiếc khăn quàng nơi khe ngực cũng rung rinh xô lệch.\nMàu đỏ rực rỡ ấy như khẳng định đây chính là Paulette thời học sinh."
# monologue
# JP: （むにっ――もにっ――むみゅっ――こりゅんっ！）
# 1588 = "（揉來揉去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「フ、ァッ！――あっ！　おっぱい――そこ――\nさきっぽ――ちく、び――っ！」
790 = "「Phù, a!——A! Ngực——chỗ đó——\nĐầu vú——núm, vú——!」"
# 【双鉄】
# display as 雙鐵
# JP: 「こうか？」
945 = "「Thế này sao?」"
# monologue
# JP: （しにゅっ――くりゅんっ！）
1599 = "（Xoa mạnh——véo!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んううっ！」
871 = "「Ưm ư ư!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
814 = "「っ!」"
# monologue
# JP: 僕の愛撫に身悶えて、\nポーレットが震わせた手が、股間を甘くくすぐった。
1150 = "Quằn quại dưới sự âu yếm của tôi,\nbàn tay run rẩy của Paulette khẽ cọ vào háng tôi đầy ngọt ngào."
# monologue
# JP: 潤みに潤んだ青い瞳は、\nそれでも僕の反応を、逃さず捉えていてくれる。
1191 = "Đôi mắt xanh ngấn lệ,\nvậy mà vẫn không bỏ sót bất kỳ phản ứng nào của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「やだ……ごめんなさい、双鉄くん。\nわたし――自分が気持よくしてもらうばっかりで」
795 = "「Chết thật……em xin lỗi, anh Soutetsu.\nEm——chỉ mải tận hưởng cảm giác sướng cho riêng mình.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、かまわんさ」
922 = "「Không, không sao đâu.」"
# monologue
# JP: 否定の言葉は、われながらひどく弱々しい。\nポーレットのか細い指先を、止めることすらできぬほど。
1285 = "Lời phủ nhận thốt ra nghe thật yếu ớt, đến chính tôi cũng phải thừa nhận.\nYếu ớt đến mức chẳng thể cản nổi những ngón tay mảnh khảnh của Paulette."
# monologue
# JP: （ちぃぃぃぃ）
1581 = "（Xèèèèè）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ――」
813 = "「A——」"
# monologue
# JP: ズボンの中から出されれば、\n勃起はわずかに震えてしまう。
1462 = "Vừa được đưa ra khỏi quần,\ndương vật cương cứng liền khẽ rung lên."
# monologue
# JP: それをさみしげと見てとったのか、\nポーレットは、いつくしむような声を出す。
1346 = "Có lẽ thấy nó trông có vẻ cô đơn,\nPaulette cất giọng đầy âu yếm."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……その、どうしたい、ですか？\nわたし――双鉄くんの――好き、に……」
954 = "「Anh Soutetsu……ừm, anh muốn, thế nào?\nEm——sẽ làm theo ý thích——của anh Soutetsu……」"
# monologue
# JP: 学園制服の効果だろうか？\nいつも以上に、ポーレットは恥ずかしそうに俯いている。
1399 = "Chắc là do hiệu ứng của bộ đồng phục học sinh nhỉ?\nPaulette cúi gằm mặt ngượng ngùng hơn hẳn mọi khi."
# monologue
# JP: けれど瞳は、ちらりちらりと勃起へと向き――\nそうまでされれば、僕にもいくらか、悪戯心が湧いてくる。
1107 = "Nhưng ánh mắt lại thi thoảng liếc trộm dương vật cương cứng——\nThấy em ấy như vậy, tôi cũng nổi chút máu trêu chọc."
# 【双鉄】
# display as 雙鐵
# JP: 「どうしたい、とは、何についてだ？\nはっきりいってもらえねばわからん」
740 = "「Muốn thế nào, là về chuyện gì cơ?\nEm không nói rõ thì anh không hiểu đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「何って――！！！　ええと――だから……それ、です。双鉄、くんの……ナニについて、って、いうか――」
826 = "「Chuyện gì á——!!! Ừm thì——là……chuyện đó, đấy. Về cái……của anh Soutetsu, ý em là——」"
# 【双鉄】
# display as 雙鐵
# JP: 「はっきり言うんだ。ポーレット。学園時代の僕ならば、\n今よりさらに、その手のことには理解が薄いぞ？」
738 = "「Nói rõ ra đi, Paulette. Nếu là anh thời học sinh,\nhiểu biết về mấy chuyện đó còn kém xa bây giờ đấy nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……双鉄、くん、も――学園生、なんだ」
811 = "「A……anh Soutetsu, cũng——là học sinh, nhỉ.」"
# monologue
# JP: 嬉しげに、瞳が細まる。\n真っ白な喉がかすかに動く。
1349 = "Đôi mắt nheo lại đầy vẻ thích thú.\nCổ họng trắng ngần khẽ nuốt nước bọt."
# monologue
# JP: 小鼻もスンスンひくついて、\n匂いを嗅いでいるかのようだ。
1167 = "Cánh mũi cũng chun lại hít hà,\nnhư thể đang ngửi mùi hương vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「ええと……好きにして、ほしいのは――\n双鉄、くんの……おちん、ちん――を、です」
949 = "「Ừm thì……em muốn, được tùy ý xử lý——\nDương, vật……của anh Soutetsu——ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: （ぉ――ぉ――）
1544 = "（Ồ——ồ——）"
# monologue
# JP: その言葉なら、肌を重ねるひとときごとに、\n何度も何度も、ポーレットから聞かされている。
1456 = "Từ ngữ đó, mỗi khi da thịt kề nhau,\ntôi đã nghe Paulette nói đi nói lại không biết bao nhiêu lần."
# monologue
# JP: であるというのに――
1384 = "Dù là vậy——"
# 【双鉄】
# display as 雙鐵
# JP: （衣装一つで……こうも印象が変わるのか）
1592 = "（Chỉ với một bộ đồ……mà ấn tượng thay đổi đến thế này sao.）"
# monologue
# JP: 学園生な、ポーレット。\n性のことなど、考えたことすらなかったような。
1207 = "Paulette, trong hình dáng nữ sinh.\nTrông như thể chưa từng nghĩ đến chuyện tình dục bao giờ."
# monologue
# JP: その唇からこぼれてくると、\n単なる性器の名称が、一気に強烈な卑語と化す。
1131 = "Khi thốt ra từ đôi môi ấy,\nmột danh từ chỉ cơ quan sinh dục đơn thuần bỗng chốc hóa thành từ ngữ tục tĩu tột độ."
# 【ポーレット】
# display as 波萊特
# JP: 「おちんちん……気持よく、なってもらう、ために。\nわたし、を――双鉄くんの、好きに――」
932 = "「Để làm cho……dương vật, sướng lên.\nAnh cứ tùy ý——sử dụng em——」"
# monologue
# JP: ごくりと、大きくツバを飲む音。\n僕のものだか、ポーレットのものかも、もうわからない。
1408 = "Tiếng nuốt nước bọt cái 'ực' rõ to.\nChẳng biết là của tôi, hay của Paulette nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「手でも、おくちでも……足、でも……それから……\nえと……おしりでも……おまんこ、でも」
727 = "「Dùng tay, hay dùng miệng……dùng chân, cũng được……rồi cả……\nừm……bằng mông……hay bằng cô bé, cũng được.」"
# monologue
# JP: 汗が浮いてる。\n肌の全部が薄く色づき、その暖かさを強調してる。
1185 = "Mồ hôi lấm tấm.\nLàn da ửng hồng mơn mởn, càng làm nổi bật hơi ấm tỏa ra."
# 【ポーレット】
# display as 波萊特
# JP: 「どこでも――わたしの、体、どこでも……\n双鉄、くんの――おちん、ちんで」
798 = "「Bất cứ đâu——trên cơ thể, em, chỗ nào cũng được……\nDương, vật——của anh Soutetsu——cứ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば――胸でも構わんか？」
934 = "「Nếu vậy——bằng ngực cũng được chứ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「胸……あ、そうですよね。おっぱい――双鉄くん……\nさっき、あんなに夢中になって……」
940 = "「Ngực……a, phải rồi nhỉ. Bầu ngực——anh Soutetsu……\nLúc nãy, anh đã say mê đến thế mà……」"
# monologue
# JP: （さわっ）
1609 = "（Chạm nhẹ）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅっ――」
803 = "「Ư——」"
# monologue
# JP: ポーレットの手が、僕の勃起を導いてくれる。
1361 = "Tay Paulette dẫn lối cho dương vật cương cứng của tôi."
# monologue
# JP: 胸と胸との狭隘に――\n赤いスカーフに亀頭が触れても、構うことなく。
1169 = "Vào khe hẹp giữa hai bầu ngực——\nMặc kệ quy đầu chạm cả vào chiếc khăn quàng cổ màu đỏ."
# 【双鉄】
# display as 雙鐵
# JP: 「いいのか？　どろどろに汚してしまうぞ？」
924 = "「Có sao không? Anh sẽ làm bẩn nhầy nhụa hết đấy nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしとしては……むしろ、染めて欲しいです。\n学園時代のわたしの全部を、双鉄くんで――どろどろに」
893 = "「Với em thì……em lại muốn anh vấy bẩn nó cơ.\nToàn bộ con người em thời học sinh, bằng anh Soutetsu——thật nhầy nhụa.」"
# monologue
# JP: （ふわさっ）
1565 = "（Bao bọc）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぉっ――ぁ――」
884 = "「Ồ——a——」"
# monologue
# JP: スカーフが、僕の勃起を包んでくれる。\n包まれたまま、ポーレットのおっぱいに挟み込まれる。
1274 = "Chiếc khăn quàng bọc lấy dương vật của tôi.\nCứ thế, nó bị kẹp chặt giữa đôi gò bồng đảo của Paulette."
# 【双鉄】
# display as 雙鐵
# JP: （これ――は……布のすべすべの肌触り越し、\nおっぱいのしっとりとした質感が――）
1616 = "（Cái này——là……Cảm giác trơn láng của lớp vải,\nhòa quyện cùng sự mềm mại ẩm ướt của bầu ngực——）"
# monologue
# JP: 包まれるのは、挟まれたのは、勃起だけでは無いとする。\n僕の全部がまるごとに、おっぱいに抱きしめられている。
1439 = "Thứ được bao bọc, được kẹp chặt, không chỉ có dương vật cương cứng.\nCảm giác như toàn bộ con người tôi đang được bầu ngực ấy ôm trọn vậy."
# monologue
# JP: スカーフがじわじわ湿ってく。肌の香りが立ち登ってくる。\nそして鼓動が――ふたりの鼓動が、溶け合っていく。
1318 = "Chiếc khăn quàng dần thấm ướt. Hương thơm da thịt tỏa lên ngây ngất.\nVà nhịp đập——nhịp tim của hai chúng tôi, đang hòa quyện vào nhau."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん。思う存分、動いてください。\nおっぱい――好きなだけ、好きに使って欲しいから」
955 = "「Anh Soutetsu. Cứ thỏa thích, cử động đi ạ.\nNgực em——anh cứ tùy ý sử dụng bao nhiêu cũng được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。動こう。だが――」
866 = "「Ừ. Anh sẽ cử động. Nhưng mà——」"
# monologue
# JP: （ずっ――）
1586 = "（Trượt——）"
# 【ポーレット】
# display as 波萊特
# JP: 「んうっ！！」
870 = "「Ưm!!」"
# monologue
# JP: 鼻にかかった、うわずった声。\nそれに鼓膜をくすぐられれば、腰は勝手に加速する。
1360 = "Giọng nói the thé nghèn nghẹt ở mũi.\nÂm thanh ấy cù lét màng nhĩ, khiến hông tôi tự động tăng tốc."
# monologue
# JP: （ずっ――みゅにゅっ！　しゅりゅっ――むにゅんっ！）
1607 = "（Trượt——nhóp nhép! Trơn tuột——xoa nắn!）"
# 【ポーレット】
# display as 波萊特
# JP: 「やっ……熱い……です――双鉄、くんの――\nおちん、ちんっ――」
764 = "「Á……nóng……quá——của anh, Soutetsu——\nDương, vật——」"
