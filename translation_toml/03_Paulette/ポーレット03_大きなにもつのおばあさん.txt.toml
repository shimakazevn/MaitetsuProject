# monologue
# JP: 教育というもののすさまじさ――あるいは恐ろしさを、\nまざまざと思い知らされたような気になる。
2420 = "Sự đáng sợ của giáo dục—— hay nói đúng hơn\nlà sự kinh khủng của nó,\nnhư được phơi bày rõ mồn một trước mắt\ntôi."

# 【車掌】
# display as 列車長
# JP: 「みなさま、おはようございます。\n列車はまもなく、[いわき,1]岩城に到着いたします」
1560 = "「Chào buổi sáng quý hành khách.\nĐoàn tàu sắp sửa đến ga Iwaki.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　まだ[いわき,1]岩城？」
1632 = "「Hả? Mới đến Iwaki thôi sao?」"

# monologue
# JP: 言われて車窓に目を向ける。\n景色が、とろとろとしか流れていかない。
2579 = "Nghe vậy, tôi hướng mắt ra ngoài cửa sổ.\nCảnh vật trôi qua một cách chậm chạp."

# monologue
# JP: これは……減速運転をしてるのか？
2664 = "Chẳng lẽ…… tàu đang chạy giảm tốc sao?"

# 【れいな】
# display as 玲奈
# JP: 「定刻から130分以上の遅れですねぇ」
1923 = "「Chậm hơn lịch trình dự kiến 130 phút rồi\nnha.」"

# 【ひかり】
# display as 光
# JP: 「わわ！　とっきゅうりょうきんただになっちゃう！」
1598 = "「Oa oa! Tiền vé tàu tốc hành được miễn phí\nluôn!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1655 = "「Hửm?」"

# 【ポーレット】
# display as 波萊特
