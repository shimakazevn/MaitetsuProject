1518 = "「Anh không biết là chuyện đương nhiên\nthôi.\nĐường sắt Ohito đã có chuyến tàu tốc hành\nnào chạy đâu.」"

# monologue
# JP: 確かにだ。
2639 = "Đúng là vậy thật."

# monologue
