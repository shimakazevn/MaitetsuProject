2010 = "「À thì…… Hikari cứ đòi 『Mẹ dạy cho con\nluật đi tàu đi』.\nNên em mới đọc một chút về Quy định kinh\ndoanh hành khách của Công ty cổ phần Đường\nsắt Ohito.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1639 = "「Ồ.」"

# monologue
