1880 = "「Chuyện là thế này, anh Soutetsu.」"

# monologue
# JP: 聞くより早く、\nポーレットが立て板に水で教えてくれる。
2648 = "Còn nhanh hơn cả tôi hỏi,\nPaulette đã tuôn một tràng giải thích lưu\nloát."

# 【ポーレット】
# display as 波萊特
