# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ。\nおうちでいつも使っているのとおんなじですよ？」
1568 = "「Ưm! Ngon quá đi.」"

# 【ひかり】
# display as 光
# JP: 「うまーい！」
1747 = "Có vẻ nhờ thế mà sự căng thẳng đã tan\nbiến, con bé lại tiếp tục nhai nhóp nhép."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いかん。訂正しよう。\n『これはおいしいな、ポーレット』」
1673 = "Trong sự theo dõi của chúng tôi,\ndù nhỏ nhưng Hikari đã ăn sạch sành sanh\ncả một quả táo."

# monologue
# JP: 言ってひかりをじいっと見れば、\n再びかじりついてたパンを、慌てて飲み込みにこりと笑う。
2612 = "Trong sự theo dõi của chúng tôi,\ndù nhỏ nhưng Hikari đã ăn sạch sành sanh\ncả một quả táo."

# 【ひかり】
# display as 光
# JP: 「ていせしよー。おいしーな！」
1978 = "「Phù, con ăn xong rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「訂正しようはいらんぞ」
1976 = "「Đính chính lại. Ngon quá!」"

# 【ひかり】
# display as 光
# JP: 「ていせしよーは、いらないのー」
1977 = "「Không cần thêm câu đính chính đâu con.」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。ひかりちゃん、まねっこさんですねぇ」
1575 = "「Không cần thêm câu đính chính đâu con~」"

# 【ひかり】
# display as 光
# JP: 「うふふぅ、ひかりはまねっこさんなのー」
1570 = "「Fufufu. Bé Hikari thích bắt chước nhỉ.」"

# monologue
# JP: （♪～）
2676 = "（♪~）"

# monologue
# JP: 車内放送。\n流れた瞬間、ひかりの瞳の輝きが増す。
2549 = "Phát thanh trên tàu.\nNgay khoảnh khắc âm thanh vang lên, đôi\nmắt Hikari càng thêm lấp lánh."

# 【ひかり】
# display as 光
# JP: 「はいけんすのせれなーで！」
1874 = "「Là khúc dạ khúc Heykens!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1717 = "「Hửm?」"

# 【ポーレット】
# display as 波萊特
