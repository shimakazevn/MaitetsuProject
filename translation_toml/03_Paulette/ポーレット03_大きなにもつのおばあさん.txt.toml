2393 = "Quy định kinh doanh hành khách của Công ty\ncổ phần Đường sắt Ohito."

# monologue
# JP: 僕が小さなころだったら、言葉の響きを聞いただけで、\n別の本を読んでとせがみそうなものだが――
2467 = "Nếu là tôi hồi nhỏ, chỉ cần nghe âm vang\ncủa những từ đó thôi,\nchắc chắn tôi sẽ nằng nặc đòi đọc một cuốn\nsách khác——"

# monologue
# JP: （ああ、だが）
2690 = "（A, nhưng mà.）"

