2690 = "（啊，對了）" 

# monologue
# JP: もしもその規則を僕も知っていたのなら。\nあの日、あの橋から落ちた特急列車――
2652 = "那天，特快列車從那座橋上掉下來的時候，假如我知道這條規則，可能就會去找那班列車所屬的公司，" 

