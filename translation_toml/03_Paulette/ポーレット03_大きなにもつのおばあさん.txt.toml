# JP: それを指でつつきしぼませて、\n優しく優しく、ポーレットはひかりの髪を撫ぜる。
2492 = "「Không biết nữa ạ. Chúng ta vẫn chưa đến\nSendai mà——\nHơn nữa bây giờ là tháng Ba rồi, khả năng\ncó tuyết rơi cũng thấp lắm.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ひかりは、おばあちゃんに居て欲しかったの？」
1516 = "「Anh xem thử nhé.」"

# 【ひかり】
# display as 光
# JP: 「う～……あのね、いなくていいの。\nいなくていい、けど。だけどね、あのね？」
1652 = "「Ưm…… ưm.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん」
1701 = "Tôi nhẹ nhàng gỡ ngón tay Hikari ra, bước\nxuống giường,\ntiến ra lối đi——"

# 【ひかり】
# display as 光
# JP: 「りんご、おいしかったから。\n『ごちそうさま』って、いいたかったのー」
1953 = "「A, gì thế này. Chẳng có hạt tuyết nào\ncả—— á.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そっか。じゃあ、次にあえたときいえるといいね」
1872 = "「Anh xuống tàu vận động cơ thể một chút\nđây.」"

# 【ひかり】
# display as 光
# JP: 「うん！　そうするのー！」
1709 = "「Không xuống được đâu ạ.」\n「Không xuống được đâu nha.」"

# monologue
# JP: 大きく頷き、動きがとまる。
2285 = "「Không xuống được đâu ạ.」\n「Không xuống được đâu nha.」"

# 【ひかり】
# display as 光
# JP: 「ふあ～っ」
1590 = "「Không xuống được? Nhưng mà, đang ở ga cơ\nmà?」"

# monologue
# JP: 一転見事なおおあくび。
2465 = "「Vì đây là điểm dừng kỹ thuật ạ.」"

# monologue
# JP: 匂いづけでもするかのように、\nひかりは何度も、ポーレットに顔を擦り付ける。
2263 = "「Em nghĩ là dừng để đổi lái tàu, hoặc là\ncấp thêm than và nước đó nha.」"

# 【ひかり】
# display as 光
# JP: 「まぁまぁ」
1771 = "「A——\nRa là vậy, tàu đã chạy suốt một đêm rồi\nmà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん。いいこ。\nねんねんねんね」
1692 = "Đầu máy kéo \\x%lC56;#00ffc040;C56%l;#; tuy có \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#;\nđi kèm,\nnhưng lại nhỏ gọn và nhẹ. Nếu chỉ tính\nchiều dài thì nó còn nhỏ hơn cả \\x%l8620;#00ffc040;8620%l;#;."

# 【ひかり】
# display as 光
# JP: 「ん……ふっ――んんっ――\n……すやぁ」
1685 = "Đương nhiên, vốn dĩ nó không phù hợp cho\nviệc kéo đường dài……\nThực ra việc dừng đỗ kỹ thuật thường xuyên\nnhư vậy lại là điều đáng mừng."

# monologue
# JP: よほど安心したのだろうか、\nひかりはすぐさま寝入ってしまう。
2526 = "「Anh cứ nghĩ tàu chạy chậm thế này thì tốn\nnhiều thời gian lắm,\nnhưng hóa ra việc tốn thời gian cũng có lý\ndo chính đáng của nó nhỉ.」"

# monologue
# JP: つかの間、沈黙。\n動輪がレールをたたく音だけが、車内に規則正しく響く。
2412 = "「Vì đây là thời đại Đại bãi bỏ tuyến đường\nsắt mà.\nỞ đâu cũng chỉ có thể cố gắng hết sức\ntrong khả năng của mình thôi ạ.」"

# 【れいな】
# display as 玲奈
# JP: 「……回復運転してますねぇ」
1154 = "「Có lý. Vậy thì, anh cũng làm những việc\ntrong khả năng của mình vậy.\nPaulette, em ra ngoài một lát được không?」"

# monologue
# JP: 言われて、気づく。
2580 = "「A, ra thì được thôi ạ—— nhưng mà?」"

# monologue
# JP: もはや減速運転をしていない――\nどころか、かなり飛ばしている。
2494 = "「Anh chưa nói sao? Anh muốn vận động cơ\nthể một chút.」"

# 【双鉄】
# display as 雙鐵
# JP: 「回復――そうか、遅延を120分内に収めるためか」
1950 = "「Hả!? T-Từ giờ này á!!?」"

# 【れいな】
# display as 玲奈
# JP: 「そうですねぇ。途中どんなに遅れても、\n払い戻しは、降りる駅での判断になりますからぁ」
1858 = "「Đúng là giờ này vẫn chưa có bài tập thể\ndục trên radio,\nnhưng chỉ là vài động tác vươn vai giãn\ngân cốt, không gây tiếng động thì chắc\nkhông vấn đề gì đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「途中どんなに遅れても、か」
1491 = "「Giãn gân cốt!!! Đúng rồi nhỉ, tất nhiên\nrồi!\nEm biết ngay mà!!」"

# monologue
# JP: れいなの言葉に、気が軽くなる。
2581 = "Khuôn mặt đỏ bừng,\nPaulette lao ra mép giường."

# monologue
# JP: 対人面での成熟度など、ひかりはいささか、\n他の子と比べ遅れてるようで焦っていたが――
2239 = "Từ trên đỉnh đầu, tiếng cười khúc khích\nvui vẻ vang lên."

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。途中、どんなに遅れても」
1859 = "「Anh Soutetsu, anh định vươn vai kéo dãn\nlưng đúng không nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1701 = "「嗯」" 

# monologue
# JP: ポーレットとふたり、頷きあう。
2428 = "「Ừm. Nếu là động tác đó thì không gian này\ncũng đủ rồi.」"

# monologue
# JP: 僕らの娘は、まだ走り始めたばかりなのだ。\nその道中を焦らせぬよう、夫婦、心を重ね合う。
2411 = "「Đ-Đúng rồi nhỉ! Được thôi! Kéo dãn lưng!\nEm sẽ kéo dãn anh Soutetsu hết cỡ luôn!」"
