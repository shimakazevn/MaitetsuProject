1943 = "「Iwaki. Ga Iwaki. Dự kiến trong tàu sẽ rất\nđông đúc.\nMong quý khách nhường nhịn lẫn nhau trong\nquá trình sử dụng.」"

# 【れいな】
# display as 玲奈
# JP: 「わ、窓の外すごい人ですよぉ」
1604 = "「Oa, ngoài cửa sổ đông người quá nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そういう話だったものな」
1696 = "「Ừm. Đúng như thông báo lúc nãy.」"

