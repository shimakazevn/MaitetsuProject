# lines: 466 
# monologue
# JP: 指を、やわらかく握られている。\n布団の中で、僕のとなりの、ちいさな路子に――
2541 = "「Hửm?」"
# 【ひかり】
# display as ？？？
# JP: 「ん……んゅう」
1687 = "「Chuyện là thế này, anh Soutetsu.」"
# monologue
# JP: ――路子ではない。あの少女だ。\n夏の線路に、金色の髪を輝かせていた――
1127 = "Còn nhanh hơn cả tôi hỏi, Paulette đã tuôn một tràng giải thích lưu loát."
# 【ひかり】
# display as ？？？
# JP: 「ぱ、ぱぁ」
1908 = "「Tiền vé tàu là trả cho việc di chuyển, còn tiền vé tàu tốc hành là trả cho thời gian tiết kiệm được——」"
# monologue
# JP: いや、違っていた。\n出会ったときのポーレットとも。
2212 = "「Nếu tàu trễ quá 120 phút, tức là tàu tốc hành không làm đúng nhiệm vụ của tàu tốc hành, thì tiền vé đó sẽ được hoàn lại nha.」"
# monologue
# JP: 僕は、だってもう大人だから。\n大人で、父親なのだから――
2522 = "「Ra là có quy định như vậy à.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……ひかり」
1150 = "「Đây là truyền thống từ thời Đế Thiết đó! Đường sắt Ohito cũng có quy định này!」"
# monologue
# JP: 目を開く。\nいつの間に、僕のベッドにひかりが移動してきている。
2441 = "「Thật bất ngờ, đến anh còn không biết đấy.」"
# monologue
# JP: 小さな手で、僕の指をぎゅうっとつかまえ、\nすうすうと、安らかな寝息を立てている。
2339 = "「Anh không biết là chuyện đương nhiên thôi. Đường sắt Ohito đã có chuyến tàu tốc hành nào chạy đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……自分でベッドを移動したのか？」
1153 = "Đúng là vậy thật."
# 【ポーレット】
# display as 波萊特
# JP: 「いいえ？　夜中に『パパー』ってグズってましたから、\nわたしが」
1488 = "Thế thì tại sao—— Vừa lúc tôi đang nghĩ vậy, thì lần này Reina lên tiếng hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのか。ありがとう。\nおはよう、ポーレット」
1542 = "「Reina là Railord nên mới biết…… Nhưng bé Hikari, sao em lại biết chuyện này nha?」"
# 【ポーレット】
# display as 波萊特
# JP: 「おはようございます。双鉄くん」
1854 = "「Dạ, là mẹ đọc cho con nghe đó~」"
# 【ひかり】
# display as 光
# JP: 「むにゃあ」
1679 = "「Đọc cho nghe?」"
# monologue
# JP: カーテンごしの、少し抑えた声の会話。
2430 = "「À thì…… Hikari cứ đòi 『Mẹ dạy cho con luật đi tàu đi』. Nên em mới đọc một chút về Quy định kinh doanh hành khách của Công ty cổ phần Đường sắt Ohito.」"
# monologue
# JP: 夜中に起き出してしまったというせいなのか、\nひかりはまったく、起きる気配を見せない。
2315 = "「Ồ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「今、何時だ？」
1922 = "Quy định kinh doanh hành khách của Công ty cổ phần Đường sắt Ohito."
# 【ポーレット】
# display as 波萊特
# JP: 「五時前です。職業病ですよね、お互い、ほんと」
2030 = "Nếu là tôi hồi nhỏ, chỉ cần nghe âm vang của những từ đó thôi, chắc chắn tôi sẽ nằng nặc đòi đọc một cuốn sách khác——"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。というか、同じ職業病ならば――\nれいな？　おはよう」
1863 = "（A, nhưng mà.）"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、\nおはようございまぁす。そうてつさん、ポーレット」
1582 = "Giá như tôi cũng biết quy định đó. Chuyến tàu tốc hành rơi khỏi cây cầu ngày hôm ấy——"
# 【ポーレット】
# display as 波萊特
# JP: 「おはよう。れいなも早いわね。\n旅のときくらい、ゆっくり眠っていればいいのに」
1852 = "Chắc là tôi đã có thể yêu cầu hoàn lại tiền vé rồi nhỉ. Tôi chợt nghĩ đến một chuyện thực sự chẳng thể thay đổi được nữa."
# 【れいな】
# display as 玲奈
# JP: 「それはおたがいさまですよぉ」
1797 = "「Oa! Có vẻ như là 『Trễ do gió mạnh』 nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はは、確かにだ」
1607 = "Trong lúc chúng tôi nói chuyện, có vẻ Reina vẫn chăm chú lắng nghe phát thanh trên tàu."
# 【ひかり】
# display as 光
# JP: 「んゆぅ」
1703 = "「Họ bảo là 『Dự kiến trong tàu sẽ rất đông đúc, mong quý khách thông cảm』 nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っと――」
1662 = "「A, nếu trễ do gió mạnh thì đúng là vậy rồi.」"
# monologue
# JP: まだ起こすのはかわいそうだ。
2519 = "「Hửm? ——Ồ.」"
# monologue
# JP: 声を抑えて――\nああ、そうだ。
2415 = "Dù vốn dĩ tàu đã chạy chậm rì, nhưng giờ lại giảm tốc một cách rõ rệt."
# 【双鉄】
# display as 雙鐵
# JP: 「雪は、降っているのかな？」
1729 = "Trượt vào sân ga một cách êm ái, ít chấn động nhất."
# 【ポーレット】
# display as 波萊特
# JP: 「どうでしょう。まだ[せんだい,1]仙岱にもつきませんし――\n三月ですし、降ってる可能性は低そうですけど」
1490 = "「Iwaki. Ga Iwaki. Dự kiến trong tàu sẽ rất đông đúc. Mong quý khách nhường nhịn lẫn nhau trong quá trình sử dụng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「見てみるか」
1547 = "「Oa, ngoài cửa sổ đông người quá nha.」"
# 【ひかり】
# display as 光
# JP: 「ん……んぅ」
1686 = "「Ừm. Đúng như thông báo lúc nãy.」"
# monologue
# JP: ひかりの指をそっとほどいて、寝台から下り、\n通路へと――
2445 = "Khi có gió mạnh, ngay cả toa xe thép cũng có thể bị lật, do đó, tuyến đường này được giữ lại vì mục đích đảm bảo an toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なんだ。全く降っていないな――っと」
1649 = "Nếu có gió mạnh, việc sử dụng Aircra sẽ bị hạn chế, hành khách sử dụng tàu hỏa tăng vọt cũng là lẽ đương nhiên."
# monologue
# JP: 列車は駅へとすべりこむ。\nちょうどいい。
2496 = "「Này, đừng đẩy chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「下りて、少し体を動かしてくる」
1813 = "「Này! Ai đấy!? Đừng có đụng chạm lung tung.」"
# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「下りられませんよ」\n「おりれないですよぉ」
2018 = "Giọng nói bực bội từ sân ga vọng vào tận đây qua cửa sổ. Ngay lập tức, Hikari trốn sau lưng Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「下りられない？　だって、駅だぞ？」
1896 = "「Thế này thì—— cứ đà này thì không thể lên hết được đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「運転停車ですから」
1727 = "「Xin lỗi đã làm phiền.」"
# 【れいな】
# display as 玲奈
# JP: 「機関士さんの交代か、給炭・給水だと思いますよぉ」
1524 = "Ngay khoảnh khắc tôi vừa nói, người trưởng tàu bước đến."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――\nそうか、一晩走っていたのだものな」
1642 = "Tháo mũ cúi chào, hướng về phía chúng tôi—— Không, là hướng về toàn bộ toa hành khách này mà cất tiếng."
# monologue
# JP: 牽引機のC56はテンダー――炭水車を持つとはいえど、\n小型軽量。全長だけなら8620よりも更に小さな機関車だ。
2614 = "「Thành thật xin lỗi quý khách, do quá đông đúc, chúng tôi xin phép được đưa hành khách vào lối đi này.」"
# monologue
# JP: 当然、本来ならば長距離の牽引には不向きであろうし……\n運転停車は、むしろこまめにとってやって欲しい。
2523 = "Câu khẳng định. Trong tình huống này, không còn cách nào khác ngoài việc chấp nhận. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「ずいぶんと時間をかけて走るものだと思ったが、\nなるほど、時間をかける理由がきちんとあるものだ」
1835 = "「Ở đây có trẻ nhỏ,\nnếu xảy ra xô xát thì phiền lắm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「[こんな,2]大廃線時代ですから。\nどこも、出来る範囲でやっていく他ないですよ」
1925 = "「Quý khách nói đúng. Ở toa này——」"
# 【双鉄】
# display as 雙鐵
# JP: 「道理だ。では、僕もできる範囲のことをするか。\nポーレット、少し出てこられるか？」
1804 = "Nói rồi, người trưởng tàu khẽ liếc nhìn cuốn sổ tay giấu trong tay."
# 【ポーレット】
# display as 波萊特
# JP: 「あ、出られますけど――えっと？」
1670 = "「A, trên đó có ghi ai mua vé đến đâu kìa~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いわなかったか？　僕は、体を動かしたいのだ」
1820 = "Ra là vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「ふえっ！？　こ、こんな時間からですか！！？」
1638 = "Nếu vậy, có lẽ cấu trúc hành khách, độ tuổi. Những điều đó cũng được ghi chép lại ở một mức độ nào đó."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、まだレィディオ体操も流れてこない時間だが、\n多少のストレッチ程度、音も立たぬし問題なかろう」
2053 = "「——Chúng tôi sẽ ưu tiên cho những hành khách khuyết tật, hành khách đi cùng trẻ nhỏ, và hành khách cao tuổi đi qua.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ストレッチ！！！　ですよね、もちろん！\nわかってました！！」
1556 = "「Được vậy thì tốt quá.」"
# monologue
# JP: 顔を真っ赤に染めながら、\nポーレットがベッドサイドに飛び出してくる。
2491 = "「Vậy, tôi sẽ sắp xếp như thế.」"
# monologue
# JP: 頭上からは、うふふぅと楽しげな笑い声。
2464 = "Lại cúi chào. Người trưởng tàu vội vã bước xuống sân ga."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん、背中のびーってするんですねぇ」
2054 = "「Xin mời quý khách lên tàu. Vui lòng làm theo hướng dẫn và hợp tác xếp hàng lên tàu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。あれならばこのスペースでも充分だからな」
1700 = "「May quá, mọi người đều được lên tàu à.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そ、そうですよね！　いいですよね！　背中のびー！\nわたし、双鉄くんのこと思いっきり伸ばしちゃいます！」
1885 = "Có vẻ như đó chính là điểm đáng lo ngại nhất."
# 【双鉄】
# display as 雙鐵
# JP: 「こころづよいな」
2046 = "Khi nỗi lo được xóa bỏ, sự ồn ào cũng lắng xuống, các hành khách lần lượt lên tàu theo đúng trật tự dưới sự hướng dẫn của trưởng tàu."
# monologue
# JP: 背中と背中をぴったりあわせて、\n腕と腕とを肘の部分で絡め合う。
2429 = "「Không chịu đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いきますよ～　ゆっくり、ゆっくり――ん……んんっ」
2047 = "Chỉ mới nghe tiếng bước chân, Hikari đã bám chặt lấy lưng Paulette. Nhắm nghiền hai mắt lại."
# 【双鉄】
# display as 雙鐵
# JP: 「お――おっ」
1721 = "「Không sao đâu, Hikari.」"
# monologue
# JP: ポーレットがそのまま上体を前へと折り曲げていけば、\n僕の背中はポーレットの腰に乗っかり、アーチを描く。
2489 = "Tôi nhẹ nhàng xoa đầu con bé. Sợ thì vẫn là sợ thôi, nói lý lẽ cũng chẳng ích gì."
# 【ポーレット】
# display as 波萊特
# JP: 「ゆさ、ゆさ――しま、すね――んっ――ふっ――\nどう、です――か？」
1844 = "「Có ba, có mẹ, có cả Reina ở đây mà. Không sao đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん――ああ――伸びて――る――くっ――\nしっかり――効いて、るっ――ぬっ」
1689 = "「Sẽ nhanh chóng yên tĩnh lại thôi, con ráng đợi một chút nhé?」"
# monologue
# JP: 伸ばしほぐされ、改めて感じる。\nやはり、あちこち凝っている。
2646 = "「A, có cả những bé trạc tuổi bé Hikari nữa nha~」"
# monologue
# JP: が、これもまた、旅の妙味のひとつであろう。
2217 = "Dù là giọng của tôi, của Paulette, hay của Reina, Hikari vẫn nhắm nghiền mắt, cơ thể cứng đờ."
# 【双鉄】
# display as 雙鐵
# JP: 「う、む――ありがとう――交代、しよう」
1653 = "（Ưm……）"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい――んしょっ」
1668 = "Dù sao thì cũng chỉ còn cách đợi tàu chạy."
# monologue
# JP: 両足が地面に戻る。
2418 = "Chỉ cần tàu bắt đầu chạy, chắc chắn sắt và khói sẽ một lần nữa khích lệ Hikari."
# monologue
# JP: 今度は僕が腰を曲げ、\nポーレットをじりじり持ち上げていく。
2459 = "「A, xin lỗi nhé.」"
# monologue
# JP: （ぐっ――ぐぐぐっ――）
2687 = "「Không có gì.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ふ……あ――わたし、も――こわばって――\nます、ね……ん……効く……」
1586 = "Ở lối đi trước giường nằm của chúng tôi, một bà lão mang theo hành lý cồng kềnh bị đẩy tới."
# 【双鉄】
# display as 雙鐵
# JP: 「だろう」
1857 = "Bà cõng trên lưng khối hành lý có lẽ to gấp mấy lần cơ thể nhỏ bé của mình——"
# monologue
# JP: ゆさゆさと大きめにゆすりつつ、\n徐々に徐々に、腰の曲げ幅を大きくしていく。
2399 = "「Bà ơi, để Reina mang hành lý giúp bà nha?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ――あくっ――んっ――ちょ――\nそうてつ――くん――もう、げん、かいっ――あうっ！」
1660 = "Không xong rồi, tôi mải nhìn chằm chằm mất rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1873 = "Cho dù Hikari có đang sợ hãi đi chăng nữa—— không, chính vì thế, là một người lớn, là một con người, việc cần làm chỉ có một."
# monologue
# JP: （とすっ）
2685 = "「Bà cứ đặt hành lý xuống đây nếu không phiền ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あ～っ！　う～、ちょっと伸びすぎ！\nあーでも……うん。血行、よくなった感じする～」
1588 = "「Ây da, thế thì ngại quá.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁあ、いいですねぇ。うらやましいですぅ」
1597 = "「Bà đừng ngại ạ. Gia đình cháu mua cả bốn giường nằm, nên vừa hay còn trống một chỗ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら、おいで。れいなも伸ばそう」
2051 = "「Bé Hikari ở cùng Paulette rồi, nên giường trên bên kia đang trống đó nha.」"
# 【れいな】
# display as 玲奈
# JP: 「ええ？　でもでもれいな、血行とかないですよぉ？」
1629 = "「Nói đúng hơn là cháu sẽ lên trên đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「オイルだのなんだのがあるだろう。でなくとも、\n同じ姿勢で動かずいると、関節は硬くなろうし」
2035 = "「Ấy chết, không cần phiền đến mức đó đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん。ゆっくり、優しくしてあげてくださいね？\nれいなは、定期整備もうけてますし」
2056 = "「Nếu không làm vậy thì chúng cháu cũng không yên tâm được ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、確かに。いわれてみれば、\nれいなは、僕らよりもよほど健康的であるのだな」
1942 = "Dọn dẹp giường nằm trước quả là quyết định đúng đắn. Chỉ cần dọn hành lý lên trên là có thể để trống giường dưới ngay lập tức."
# 【ポーレット】
# display as 波萊特
# JP: 「年に一回ですもんね。わたしたちの健康診断は」
1924 = "「Bà ơi, bà ngồi đi nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、決して望ましいことではないな」
1869 = "「Nếu không phiền, bà cứ đặt hành lý xuống và ngồi nghỉ đi ạ.」"
# monologue
# JP: 一年あれば、病魔が体を静かに蝕むには充分すぎる。
2391 = "「A, mọi người tốt bụng quá. Cảm ơn, cảm ơn mọi người. Vậy thì lão bà đây không khách sáo nữa nhé.」"
# monologue
# JP: 理屈でそうとわかっていても、\n実際なかなか――検査のための休みを取るには難しい。
2661 = "Bà lão đặt hành lý xuống. Một tiếng \\\"bịch\\\" nặng nề vang lên."
# 【双鉄】
# display as 雙鐵
# JP: 「真闇姉にも、定期健康診断だけでなく、\n人間ドックも受けるようにと勧められてはいるのだが」
1935 = "「Oa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「人間ドック。[まくら,1]真闇さん、受けてるんですか？」
1592 = "Có lẽ vì giật mình, Hikari mở mắt ra, ló đầu nhìn từ phía sau Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。というか、右田一酒造元の正社員は全員だ。\n定期健康診断の他に、二年に一度の人間ドック」
1691 = "Bà lão nhìn thấy Hikari,\nliền nở nụ cười rạng rỡ."
# 【ポーレット】
# display as 波萊特
# JP: 「すごいホワイト！　御一夜鉄道も見習わなくちゃ」
1750 = "「Ây da, chào cô bé đáng yêu nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「おまたせしましたぁ」
1496 = "「Hya!」"
# monologue
# JP: いそいそ、れいなが下りてくる。\nくるり、可愛く背中を向ける。
2516 = "Xấu hổ, con bé lại trốn đi."
# 【れいな】
# display as 玲奈
# JP: 「れいなにも、のびのびのびーってしてくださいねぇ」
1501 = "Trốn thì trốn, nhưng có vẻ vẫn tò mò, con bé chỉ ló mặt ra một chút xíu, chằm chằm nhìn vào khối hành lý to đùng."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ゆっくりやさしく――\nのびー、のびーーーー」
1694 = "「Hành lý này ấy à, là hàng hóa của người bán dạo đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、からだのびーって、気持ちいいですぅ」
1720 = "「Bán dạo là gì vậy nha?」"
# 【ひかり】
# display as 光
# JP: 「うゆぅ～」
1681 = "Reina không thể nào không biết."
# monologue
# JP: 眠そうな声。\n毛布の下から手が伸びてきて、次いで、頭が持ち上がる。
2417 = "Dù biết, nhưng em ấy vẫn thay mặt Hikari - người không thể đặt câu hỏi, chuyển sự thắc mắc của con bé thành lời."
# 【ひかり】
# display as 光
# JP: 「ひかりもー。ひかりもするのー」
1528 = "「Bán dạo có nghĩa là, cõng hàng hóa trên lưng, đi tàu hỏa, mang đến những thị trấn xa xôi để bán đó cháu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「起きたか、ひかり。おはよう」
1533 = "Phải chăng con bé cảm nhận được sự lãng mạn trong nghề bán dạo. Đôi mắt của Hikari, dù vẫn đang nấp, lại lấp lánh sáng ngời."
# 【ポーレット】
# display as 波萊特
# JP: 「おはよう、ひかり。\nママと、お顔洗いにいきましょうね？」
1535 = "「Và cháu biết không? Thứ bà đang bán ấy, là cái này đây.」"
# 【れいな】
# display as 玲奈
# JP: 「ひかりちゃーん。おはようですよぉ」
1782 = "Bà lão từ từ, từ từ cởi tấm vải bọc hành lý ra, như cố tình trêu chọc sự tò mò."
# 【ひかり】
# display as 光
# JP: 「おはようなのー。ひかりもするのー」
1850 = "Và rồi, từ bên trong——"
# 【双鉄】
# display as 雙鐵
# JP: 「よしよし。れいな、頼めるか？」
1938 = "「Táo!」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、ひかりちゃーん」
1746 = "「Táo Iwaki đấy. Có người còn bảo nó ngon hơn cả táo Aomori cơ đấy.」"
# 【ひかり】
# display as 光
# JP: 「ぱぁぱとするのー」
1531 = "「Ngon hơn cả táo Aomori ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「パパとか」
1971 = "Paulette có tình cảm đặc biệt với Aomori."
# monologue
# JP: 僕とひかりでは背が違いすぎる。
2424 = "Giọng điệu có phần hơi gay gắt của cô ấy, được bà lão nhẹ nhàng xoa dịu bằng nụ cười đầy nếp nhăn."
# monologue
# JP: 背中に単に担ぐだけ――\n腰を伸ばしてはやれなくなるが……
2597 = "「Đây là quà cảm ơn vì đã nhường chỗ cho bà. Này cháu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。おいで」
1825 = "「A, cháu xin lỗi.」"
# 【ひかり】
# display as 光
# JP: 「うん！　のびーってしてぇ？」
1707 = "「Cháu cảm ơn bà ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかったわかった。それ。のびー」
1829 = "「Cả Reina cũng có phần sao nha.\nReina vui lắm đó nha.」"
# 【ひかり】
# display as 光
# JP: 「のびー」
1841 = "「Còn phần của cô bé đây thì.」"
# monologue
# JP: 担がれたまま、はしゃいで足をバタバタさせる。\nまぁ……これはこれで運動になっているので良しとしよう。
2282 = "Bà lão từ từ lục lọi trong đống hành lý, ra vẻ bí hiểm, lấy ra một quả táo nhỏ nhắn đặc biệt——"
# 【ひかり】
# display as 光
# JP: 「きゃあ！」
1561 = "Hikari bất giác thốt lên. Cũng không trách được. Ngay cả tôi cũng bị thu hút."
# 【双鉄】
# display as 雙鐵
# JP: 「よし！　終わり。\nママといっしょに、顔をあらっておいで」
1764 = "「Đẹp quá nha.」"
# 【ひかり】
# display as 光
# JP: 「はぁい！」
1757 = "「Thật đấy. Cứ như viên ngọc quý hình quả táo vậy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん！　いいお返事。\nそれじゃ、ちょっと行ってきます」
1711 = "Ví von thật khéo léo."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、戻ったら交代しよう」
1762 = "Đúng là có một giống táo tên là Hồng Ngọc—— Nhưng quả này đích thực là một viên ngọc màu hồng tía."
# 【れいな】
# display as 玲奈
# JP: 「おふとん、どうします？　あげちゃいますかぁ？」
1970 = "「Trong số những quả táo hái ở Iwaki hôm nay, bà tặng cháu quả táo ngon nhất đấy nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。もう寝直すこともあるまい」
1811 = "「Phù…… a.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい」
1756 = "Hikari rụt rè vươn tay ra. Bà lão đặt quả táo sáng bóng lên tay con bé."
# monologue
# JP: 布団をそのままソファー代わりにしてもいいが、\nひかりがいる。
2660 = "「Thích quá nhỉ, Hikari. Nào, con phải nói 『Cảm ơn』 chứ?」"
# monologue
# JP: 布団をソファーにした先例を作っては、\n今後の教育に悪影響が出るかもしれん。
2237 = "Nghe tiếng Paulette, bờ vai Hikari khẽ run lên."
# 【ひかり】
# display as 光
# JP: 「かしきり～　かしきり～！\nろうかも せんめんじょも かしきりだったのー！」
1772 = "Ánh mắt hướng về phía bà lão, rồi lại rụt về, đôi môi run rẩy, cố gắng thốt lên—— thành lời."
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、それはよかったな」
1722 = "「A…… a…… a…… a.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんたちも行ってきちゃってください。\nもう三十分もすると、混み合いますよ」
2055 = "Khuôn mặt con bé đỏ bừng."
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。いこう、れいな」
1823 = "Nếu có thể, tôi muốn cho con bé mượn giọng nói hay bất cứ thứ gì của mình, để giúp con bé diễn đạt cảm xúc thành lời."
# 【れいな】
# display as 玲奈
# JP: 「はぁい。いってきますねー」
1755 = "「Ừm ừm.」"
# 【ひかり】
# display as 光
# JP: 「れいなおねーちゃん、ばいばーい！」
1917 = "Trong lúc Hikari vẫn chưa nói trọn câu, bà lão đã mỉm cười hiền từ, khẽ gật đầu."
# monologue
# JP: 手早く、しかし丁寧に、\n顔を洗ってヒゲをそり、髪の毛を水で濡らして整える。
2448 = "Phù.\nThay vì giọng nói, Hikari khẽ thở phào nhẹ nhõm."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。これでよし」
1699 = "「Người phải nói lời cảm ơn là bà mới đúng, cháu đừng bận tâm. Hơn nữa, cháu mau ăn thử đi xem nào.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなも、お顔あらいましたよぉ」
1915 = "「Vậy thì, chúng cháu không khách sáo nữa ạ.」"
# monologue
# JP: ふたつならびの洗面台。\n隣から、のどかなれいなの声がする。
2408 = "「A, vậy để cháu gọt vỏ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では戻るか」
2043 = "「Quả táo đẹp thế này cơ mà.\nGọt vỏ đi thì phí lắm.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい」
1743 = "Tôi cố tình chà xát mạnh quả táo vào quần để lau vỏ."
# monologue
# JP: 通路を戻れば、起き出してきた人たちとすれ違う。
2546 = "Đó là hành động tôi thường không làm ở nhà. Đôi mắt Hikari mở to tròn xoe."
# monologue
# JP: なるほど、ポーレットのいったとおり、\nほんの十分違うだけでもう――
2325 = "「Ừm. Trông ngon quá.」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレット、おかあさんになりましたねぇ。\nこれだったら、ひかりちゃん怖がっちゃってましたぁ」
1907 = "（Ngoạm）"
# monologue
# JP: しみじみとしたれいなの声に、深く頷く。
2513 = "「Á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。ひかりのことと、列車の旅のこととなると、\nいつも以上に、ポーレットは頼もしくなる」
1867 = "Chà, ngon thật."
# 【れいな】
# display as 玲奈
# JP: 「ですねー。今日のポーレットはお仕事抜きで、\n鉄分[えんぶん,1]煙分、たっぷり吸収してますからねぇ」
1865 = "Dù định nói ngon để nịnh hay gì đi nữa, thì ngay cả lời nói đó cũng bị hòa tan trong nước ép và mật ngọt lịm."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？\n……鉄分は鉄道の鉄だろうが、塩分？」
1715 = "「（Sột soạt, nhóp nhép—— ực, sột soạt）」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、それはですねぇ」
1577 = "「Oa, trông ngon quá nha. Reina cũng bắt chước đây nha.」"
# monologue
# JP: （ポーっ！）
2691 = "「Vậy thì, em cũng thế.\nTuy hơi bất lịch sự một chút.」"
# monologue
# JP: おっと、トンネルに入ったか。\nわずかに煙さが――っ！
2326 = "「Không sao, không sao. Cứ cắn ngập răng cả quả táo, đó mới là cách ăn ngon nhất đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかったぞ。えんぶんとは、[けむりぶん,1]煙分か」
1827 = "「Ngọt quá!」"
# 【れいな】
# display as 玲奈
# JP: 「正解でぇす」
1898 = "「Ngon quá đi mất!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うまいことを言う」
1521 = "「A…… ưm—— ứm!」"
# monologue
# JP: どうやら鉄分煙分は、れいなにも効果絶大らしい。
2531 = "Cổ họng Hikari phát ra tiếng ực."
# 【双鉄】
# display as 雙鐵
# JP: 「……ひかりにも鉄分[えんぶん,1]煙分がたっぷり効いて、\n人見知りが、少しでも改善されてくれればいいのだが」
1158 = "Con bé cọ xát quả táo nhỏ sáng bóng, chà đi chà lại nhiều lần vào bụng áo."
# 【れいな】
# display as 玲奈
# JP: 「だいじょうぶ、きっとそうなりますよぉ」
1899 = "「A————! (Ngoạm)」"
# 【双鉄】
# display as 雙鐵
# JP: 「っと」
1608 = "「Ồ!」"
# 【ひかり】
# display as 光
# JP: 「おかえりなさーい」
1888 = "Ngay khoảnh khắc—— cắn vào, đôi mắt con bé sáng rực lên! Hai má ửng hồng, hệt như màu đỏ của quả táo."
# monologue
# JP: 僕らの寝台へ戻るやいなやで、\nひかりが明るく迎えてくれる。
2409 = "「（Ngoạm—— sột soạt—— nhóp nhép—— ực!）」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、スッキリしましたよー」
1572 = "Chắc hẳn là rất hợp khẩu vị. Sự ngập ngừng lúc nãy cứ như thể chưa từng tồn tại——"
# 【ひかり】
# display as 光
# JP: 「ひかりもスッキリ！\nスッキリしたら、おなかすいたのー」
1526 = "Giống như một chú sóc vừa tỉnh dậy sau giấc ngủ đông, con bé mải mê, say sưa gặm nhấm quả táo."
# 【ポーレット】
# display as 波萊特
# JP: 「それじゃあ、朝ご飯にしましょうね」
2045 = "（Ba hiểu cảm giác đó. Rất hiểu là đằng khác.）"
# monologue
# JP: こうなることを予期していたのか、\nポーレットはもう、バスケットを広げ始めている。
2488 = "Tất cả chúng tôi đều trở nên im lặng. Bởi vì trong miệng chứa đầy hương vị thơm ngon của táo."
# 【双鉄】
# display as 雙鐵
# JP: 「今朝の分も用意してあったのだな」
1522 = "「Ôi chà, đáng yêu quá đi mất.」"
# 【ポーレット】
# display as 波萊特
# JP: 「もちろんです。っていっても、簡単なものですけど\nバゲットとハムとレタス。オープンサンドにしようって」
1928 = "「Hya!!?」"
# 【れいな】
# display as 玲奈
# JP: 「マヨネーズと、魔法瓶のお紅茶もありますよぉ」
2016 = "Chắc hẳn bà lão thấy con bé rất đáng yêu."
# 【ひかり】
# display as 光
# JP: 「ひかり、ジュースがいい～」
1530 = "Bà lão dịu dàng xoa đầu Hikari, nhưng Hikari lại giật mình kinh hãi——"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、はぁい、トマトジュース」
1580 = "「A…… a ư…… ư……」"
# 【ひかり】
# display as 光
# JP: 「とまと！？　とまとやぁ。\nあまいジュースがいいのー」
1927 = "「Ây da, xin lỗi vì làm cháu giật mình nhé. Xin lỗi cháu. Đang ăn ngon lành thế cơ mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ざぁんねん！　甘いジュースは、いま売り切れでぇす」
1799 = "「Dạ không, chúng cháu mới phải xin lỗi ạ.」"
# 【ひかり】
# display as 光
# JP: 「うりきれ。うりきれならしかたないのー」
1897 = "「Ôi chà, táo kìa.\nCháu ăn dính đầy quanh miệng rồi.」"
# monologue
# JP: 僕ひとりだけで乗っていたなら、車内販売もないこの列車、\n空腹での長時間乗車を強いられただろう。
2643 = "「Hả!? Cháu ạ?」"
# monologue
# JP: そうと思えば感謝とともに、\n空腹もいっそう強く感じる。
2397 = "「Fufufu, đúng thế thật. Anh Soutetsu, quanh miệng anh dính đầy táo kìa nha.」"
# 【ひかり】
# display as 光
# JP: 「いただきまーす」
2052 = "「Thiệt tình, đang ở trước mặt Hikari đấy nhé?」"
# 【れいな】
# display as 玲奈
# JP: 「いただきまぁす」
1916 = "「Cả Reina và Paulette cũng thế thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁい、召し上がれ」
1744 = "「Hả!? Thật á. Không chịu đâu, anh Soutetsu, lau cho em đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いただきます」
1836 = "「Reina cũng muốn được lau nha.」"
# monologue
# JP: なんということはない、バゲットが焼かれてさえいない、\n独身男の慌ただしい朝食に出てきそうなオープンサンド。
2640 = "「Chuyện nhỏ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「（あむっ）」
2067 = "Tôi vươn tay qua giường, lau cho Reina trước."
# monologue
# JP: ――だが、旨い。\nハムとマヨネーズとバゲットと。
1128 = "Sau đó bước xuống giường, lấy miếng táo dính ở khóe miệng Paulette ra và dọn dẹp."
# monologue
# JP: ごく単純な塩気の旨みが、\n口いっぱい、体いっぱいに広がってくる。
2641 = "「Hikari cũng thế này, dính đầy cơm hộp rồi kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これは――旨いな。\n上等のハムを使っていたりするのか？」
1739 = "Tôi lấy mảnh vụn dính trên má con bé, đưa vào miệng đút cho con bé ăn."
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ。\nおうちでいつも使っているのとおんなじですよ？」
1568 = "「Ưm! Ngon quá đi.」"
# 【ひかり】
# display as 光
# JP: 「うまーい！」
1747 = "Có vẻ nhờ thế mà sự căng thẳng đã tan biến, con bé lại tiếp tục nhai nhóp nhép."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いかん。訂正しよう。\n『これはおいしいな、ポーレット』」
1673 = "Trong sự theo dõi của chúng tôi, dù nhỏ nhưng Hikari đã ăn sạch sành sanh cả một quả táo."
# monologue
# JP: 言ってひかりをじいっと見れば、\n再びかじりついてたパンを、慌てて飲み込みにこりと笑う。
2612 = "「Phù, con ăn xong rồi ạ.」"
# 【ひかり】
# display as 光
# JP: 「ていせしよー。おいしーな！」
1978 = "「Đính chính lại. Ngon quá!」"
# 【双鉄】
# display as 雙鐵
# JP: 「訂正しようはいらんぞ」
1976 = "「Không cần thêm câu đính chính đâu con.」"
# 【ひかり】
# display as 光
# JP: 「ていせしよーは、いらないのー」
1977 = "「Không cần thêm câu đính chính đâu con~」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。ひかりちゃん、まねっこさんですねぇ」
1575 = "「Fufufu. Bé Hikari thích bắt chước nhỉ.」"
# 【ひかり】
# display as 光
# JP: 「うふふぅ、ひかりはまねっこさんなのー」
1570 = "「Fufufu, Hikari thích bắt chước mà~」"
# monologue
# JP: （♪～）
2676 = "（♪~）"
# monologue
# JP: 車内放送。\n流れた瞬間、ひかりの瞳の輝きが増す。
2549 = "Phát thanh trên tàu. Ngay khoảnh khắc âm thanh vang lên, đôi mắt Hikari càng thêm lấp lánh."
# 【ひかり】
# display as 光
# JP: 「はいけんすのせれなーで！」
1874 = "「Là khúc dạ khúc Heykens!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1717 = "「Hửm?」"
# 【ポーレット】
# display as 波萊特
# JP: 「旧帝鉄の長距離列車のシンボルだった曲です。\nここまでこだわってくれてるの、うれしいなぁ」
2012 = "「Đây là bản nhạc biểu tượng của các chuyến tàu đường dài thời Đế Thiết cũ. Thật vui khi họ lại chăm chút đến mức này.」"
# 【ひかり】
# display as 光
# JP: 「うれしいのー、なつかしいのー」
1761 = "「Vui quá, hoài niệm quá~」"
# monologue
# JP: ……４歳児が、経験したことがあるはずもない、\n帝鉄時代の長距離列車を懐かしむ。
1135 = "……Một đứa trẻ 4 tuổi, rõ ràng chưa từng có cơ hội trải nghiệm, lại cảm thấy hoài niệm về chuyến tàu đường dài thời Đế Thiết."
# monologue
# JP: 教育というもののすさまじさ――あるいは恐ろしさを、\nまざまざと思い知らされたような気になる。
2420 = "Sự đáng sợ của giáo dục—— hay nói đúng hơn là sự kinh khủng của nó, như được phơi bày rõ mồn một trước mắt tôi."
# 【車掌】
# display as 列車長
# JP: 「みなさま、おはようございます。\n列車はまもなく、[いわき,1]岩城に到着いたします」
1560 = "「Chào buổi sáng quý hành khách. Đoàn tàu sắp sửa đến ga Iwaki.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　まだ[いわき,1]岩城？」
1632 = "「Hả? Mới đến Iwaki thôi sao?」"
# monologue
# JP: 言われて車窓に目を向ける。\n景色が、とろとろとしか流れていかない。
2579 = "Nghe vậy, tôi hướng mắt ra ngoài cửa sổ. Cảnh vật trôi qua một cách chậm chạp."
# monologue
# JP: これは……減速運転をしてるのか？
2664 = "Chẳng lẽ…… tàu đang chạy giảm tốc sao?」"
# 【れいな】
# display as 玲奈
# JP: 「定刻から130分以上の遅れですねぇ」
1923 = "「Chậm hơn lịch trình dự kiến 130 phút rồi nha.」"
# 【ひかり】
# display as 光
# JP: 「わわ！　とっきゅうりょうきんただになっちゃう！」
1598 = "「Oa oa! Tiền vé tàu tốc hành được miễn phí luôn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1655 = "「Hửm?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それはですね、双鉄くん」
1880 = "「Chuyện là thế này, anh Soutetsu.」"
# monologue
# JP: 聞くより早く、\nポーレットが立て板に水で教えてくれる。
2648 = "Còn nhanh hơn cả tôi hỏi, Paulette đã tuôn một tràng giải thích lưu loát."
# 【ポーレット】
# display as 波萊特
# JP: 「乗車料金は移動に対しての支払いですけど、\n特急料金は、時間に対しての支払いですから――」
1817 = "「Tiền vé tàu là trả cho việc di chuyển, còn tiền vé tàu tốc hành là trả cho thời gian tiết kiệm được——」"
# 【れいな】
# display as 玲奈
# JP: 「遅延が120分を超えて、特急が特急としてお仕事\nできなかったときには、払い戻しになるんですよぉ」
1882 = "「Nếu tàu trễ quá 120 phút, tức là tàu tốc hành không làm đúng nhiệm vụ của tàu tốc hành, thì tiền vé đó sẽ được hoàn lại nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんな仕組みがあったのか」
1543 = "「Ra là có quy định như vậy à.」"
# 【ひかり】
# display as 光
# JP: 「てーてつじだいからのでんとーなのー！\nおひとよてつどーにも、きていあるのー！」
2015 = "「Đây là truyền thống từ thời Đế Thiết đó! Đường sắt Ohito cũng có quy định này!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと、僕でも知らなかったぞ」
1508 = "「Thật bất ngờ, đến anh còn không biết đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「知らなくて当然ですよ。\n御一夜鉄道、特急ってまだ一本も走ってませんし」
1518 = "「Anh không biết là chuyện đương nhiên thôi. Đường sắt Ohito đã có chuyến tàu tốc hành nào chạy đâu.」"
# monologue
# JP: 確かにだ。
2639 = "Đúng là vậy thật."
# monologue
# JP: ならばなぜ――と思うと同時、\n今度はれいなが尋ねてくれる。
2654 = "Thế thì tại sao—— Vừa lúc tôi đang nghĩ vậy, thì lần này Reina lên tiếng hỏi."
# 【れいな】
# display as 玲奈
# JP: 「れいなはレイルロオドだから知ってましたけど……\nひかりちゃんは、どうして知ってるんですかぁ？」
1918 = "「Reina là Railord nên mới biết…… Nhưng bé Hikari, sao em lại biết chuyện này nha?」"
# 【ひかり】
# display as 光
# JP: 「あのね、ママがね、読み聞かせしてくれたのー」
2011 = "「Dạ, là mẹ đọc cho con nghe đó~」"
# 【双鉄】
# display as 雙鐵
# JP: 「読み聞かせ？」
1801 = "「Đọc cho nghe?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの……ひかりが、『きっぷのルールおしえて』って。\nそれでちょっと、御一夜鉄道株式会社[りょかく,1]旅客営業規則とか」
2010 = "「À thì…… Hikari cứ đòi 『Mẹ dạy cho con luật đi tàu đi』. Nên em mới đọc một chút về Quy định kinh doanh hành khách của Công ty cổ phần Đường sắt Ohito.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1639 = "「Ồ.」"
# monologue
# JP: 御一夜鉄道株式会社旅客営業規則。
2393 = "Quy định kinh doanh hành khách của Công ty cổ phần Đường sắt Ohito."
# monologue
# JP: 僕が小さなころだったら、言葉の響きを聞いただけで、\n別の本を読んでとせがみそうなものだが――
2467 = "Nếu là tôi hồi nhỏ, chỉ cần nghe âm vang của những từ đó thôi, chắc chắn tôi sẽ nằng nặc đòi đọc một cuốn sách khác——"
# monologue
# JP: （ああ、だが）
2690 = "（A, nhưng mà.）"
# monologue
# JP: もしもその規則を僕も知っていたのなら。\nあの日、あの橋から落ちた特急列車――
2652 = "Giá như tôi cũng biết quy định đó. Chuyến tàu tốc hành rơi khỏi cây cầu ngày hôm ấy——"
# monologue
# JP: その料金を、払い戻し請求できたのだな、と。\n本当にどうしようもないことを、ふと思ってしまう。
2600 = "Chắc là tôi đã có thể yêu cầu hoàn lại tiền vé rồi nhỉ. Tôi chợt nghĩ đến một chuyện thực sự chẳng thể thay đổi được nữa."
# 【れいな】
# display as 玲奈
# JP: 「わ！　『強風による遅延』だそうですよぉ」
1600 = "「Oa! Có vẻ như là 『Trễ do gió mạnh』 nha.」"
# monologue
# JP: 会話の間も、れいなはしっかり車内放送を聞いてたらしい。
2527 = "Trong lúc chúng tôi nói chuyện, có vẻ Reina vẫn chăm chú lắng nghe phát thanh trên tàu."
# 【れいな】
# display as 玲奈
# JP: 「『列車内、大変混み合うことが予想されますが、\nご容赦ください』――っていうお話ですぅ」
1793 = "「Họ bảo là 『Dự kiến trong tàu sẽ rất đông đúc, mong quý khách thông cảm』 nha.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ああっ、強風で遅延ならそうなっちゃう」
1644 = "「A, nếu trễ do gió mạnh thì đúng là vậy rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　――おお」
1718 = "「Hửm? ——Ồ.」"
# monologue
# JP: もとよりトロトロ運転だったのを割り引いても、\n列車は見事な減速をみせる。
2645 = "Dù vốn dĩ tàu đã chạy chậm rì, nhưng giờ lại giảm tốc một cách rõ rệt."
# monologue
# JP: 衝撃少なくなめらかに、駅のホームへとすべりこむ。
2495 = "Trượt vào sân ga một cách êm ái, ít chấn động nhất."
# 【車掌】
# display as 列車長
# JP: 「[いわき,1]岩城。岩城でございます。列車内混雑が予想されます。\nどうぞ、お譲りあってご利用頂けますようお願いします」
1943 = "「Iwaki. Ga Iwaki. Dự kiến trong tàu sẽ rất đông đúc. Mong quý khách nhường nhịn lẫn nhau trong quá trình sử dụng.」"
# 【れいな】
# display as 玲奈
# JP: 「わ、窓の外すごい人ですよぉ」
1604 = "「Oa, ngoài cửa sổ đông người quá nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そういう話だったものな」
1696 = "「Ừm. Đúng như thông báo lúc nãy.」"
# monologue
# JP: 強風時には鋼製客車さえ転覆し、\nゆえに、安全保障のために残されたこの路線。
2642 = "Khi có gió mạnh, ngay cả toa xe thép cũng có thể bị lật, do đó, tuyến đường này được giữ lại vì mục đích đảm bảo an toàn."
# monologue
# JP: その強風が吹いたとあれば、エアクラ利用は控えられ、\n列車利用の乗客が一気に増すのは、理の当然だ。
2575 = "Nếu có gió mạnh, việc sử dụng Aircra sẽ bị hạn chế, hành khách sử dụng tàu hỏa tăng vọt cũng là lẽ đương nhiên."
# 【乗客Ａ】
# display as 乘客Ａ
# JP: 「おい、押すなよ」
1677 = "「Này, đừng đẩy chứ.」"
# 【乗客Ｂ】
# display as 乘客Ｂ
# JP: 「ちょっと！　誰！？　ヘンなとこ触らないでよ」
1945 = "「Này! Ai đấy!? Đừng có đụng chạm lung tung.」"
# 【ひかり】
# display as 光
# JP: 「やぁっ」
# 1561 = "「呀！」" 
# monologue
# JP: 苛立った声がホームから、窓越し、ここにまで響く。\nとたんにひかりは、ポーレットの陰に隠れてしまう。
2553 = "Giọng nói bực bội từ sân ga vọng vào tận đây qua cửa sổ. Ngay lập tức, Hikari trốn sau lưng Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「これは――このままでは乗せきれんな」
2023 = "「Thế này thì—— cứ đà này thì không thể lên hết được đâu.」"
# 【車掌】
# display as 列車長
# JP: 「失礼します」
1840 = "「Xin lỗi đã làm phiền.」"
# monologue
# JP: 言った瞬間、車掌が来る。
2422 = "Ngay khoảnh khắc tôi vừa nói, người trưởng tàu bước đến."
# monologue
# JP: 帽子を取って一礼し、僕らに向けて――\nいや、この客車全体に向けて呼びかける。
2231 = "Tháo mũ cúi chào, hướng về phía chúng tôi—— Không, là hướng về toàn bộ toa hành khách này mà cất tiếng."
# 【車掌】
# display as 列車長
# JP: 「大変申し訳ございませんが、混雑のため、\nこちらの通路にも、お客様を入れさせていただきます」
1540 = "「Thành thật xin lỗi quý khách, do quá đông đúc, chúng tôi xin phép được đưa hành khách vào lối đi này.」"
# monologue
# JP: 断定形。\nこの状況では受け入れる他にありえない。が――
2230 = "Câu khẳng định. Trong tình huống này, không còn cách nào khác ngoài việc chấp nhận. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「小さな子供もいますので、\nケンカなど起きては困ります」
1818 = "「Ở đây có trẻ nhỏ,\nnếu xảy ra xô xát thì phiền lắm.」"
# 【車掌】
# display as 列車長
# JP: 「もっともです。こちらの車両には――」
1806 = "「Quý khách nói đúng. Ở toa này——」"
# monologue
# JP: 言って車掌は、手元に隠した手帳にチラと目を落とす。
2297 = "Nói rồi, người trưởng tàu khẽ liếc nhìn cuốn sổ tay giấu trong tay."
# 【ひかり】
# display as 光
# JP: 「あれ、だれがどこまでのきっぷか かいてあるのー」
2033 = "「A, trên đó có ghi ai mua vé đến đâu kìa~」"
# monologue
# JP: なるほど。
2304 = "Ra là vậy."
# monologue
# JP: ならばあるいは、客の構成、年齢層。\nそうしたことも、ある程度メモされているのかもしれない。
2650 = "Nếu vậy, có lẽ cấu trúc hành khách, độ tuổi. Những điều đó cũng được ghi chép lại ở một mức độ nào đó."
# 【車掌】
# display as 列車長
# JP: 「――お体の不自由なお客様、小さなお子様連れのお客様、\nお年を召したお客様を優先でお通しするよういたします」
1826 = "「——Chúng tôi sẽ ưu tiên cho những hành khách khuyết tật, hành khách đi cùng trẻ nhỏ, và hành khách cao tuổi đi qua.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうしてもらえれば助かります」
1808 = "「Được vậy thì tốt quá.」"
# 【車掌】
# display as 列車長
# JP: 「では、そのように手配します」
2037 = "「Vậy, tôi sẽ sắp xếp như thế.」"
# monologue
# JP: また一礼。\nばたばたと車掌がホームへおりる。
2298 = "Lại cúi chào. Người trưởng tàu vội vã bước xuống sân ga."
# 【車掌】
# display as 列車長
# JP: 「みなさまにご乗車いただけます。\n指示に従い、整列乗車へのご協力をお願いします」
2058 = "「Xin mời quý khách lên tàu. Vui lòng làm theo hướng dẫn và hợp tác xếp hàng lên tàu.」"
# 【乗客Ａ】
# display as 乘客Ａ
# JP: 「よかった、みんな乗れるのか」
1736 = "「May quá, mọi người đều được lên tàu à.」"
# monologue
# JP: そこが、まさしく不安点だったらしい。
2528 = "Có vẻ như đó chính là điểm đáng lo ngại nhất."
# monologue
# JP: 取り除かれれば騒ぎは収まり、\n車掌の指示通り順序よく、乗客たちが乗車してくる。
2224 = "Khi nỗi lo được xóa bỏ, sự ồn ào cũng lắng xuống, các hành khách lần lượt lên tàu theo đúng trật tự dưới sự hướng dẫn của trưởng tàu."
# 【ひかり】
# display as 光
# JP: 「やぁん」
1493 = "「Không chịu đâu.」"
# monologue
# JP: 足音だけで、ひかりがポーレットの背にしがみつく。\nぎゅうっと、堅く目を閉じている。
2273 = "Chỉ mới nghe tiếng bước chân, Hikari đã bám chặt lấy lưng Paulette. Nhắm nghiền hai mắt lại."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ、ひかり」
1895 = "「Không sao đâu, Hikari.」"
# monologue
# JP: ゆっくり、頭を撫でてやる。\n怖いものは怖いのだろうから、理屈をいっても仕方ない。
2444 = "Tôi nhẹ nhàng xoa đầu con bé. Sợ thì vẫn là sợ thôi, nói lý lẽ cũng chẳng ích gì."
# 【双鉄】
# display as 雙鐵
# JP: 「パパもママもれいなもいる。大丈夫だ」
1910 = "「Có ba, có mẹ, có cả Reina ở đây mà. Không sao đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「すぐ落ち着くから、ちょっとだけ待ってましょ？」
2061 = "「Sẽ nhanh chóng yên tĩnh lại thôi, con ráng đợi một chút nhé?」"
# 【れいな】
# display as 玲奈
# JP: 「あ、ひかりちゃんとおんなじくらいのこもいますよー」
1664 = "「A, có cả những bé trạc tuổi bé Hikari nữa nha~」"
# monologue
# JP: 僕の声にも、ポーレットの声にも、れいなの声にも、\nひかりはぎゅっと目を閉じて、体を硬くしたままだ。
2215 = "Dù là giọng của tôi, của Paulette, hay của Reina, Hikari vẫn nhắm nghiền mắt, cơ thể cứng đờ."
# monologue
# JP: （ううむ……）
2688 = "（Ưm……）"
# monologue
# JP: ともかく、発車を待つしか無い。
2556 = "Dù sao thì cũng chỉ còn cách đợi tàu chạy."
# monologue
# JP: 列車が走りだしさえすれば、\n再びの鉄分と煙分が、きっとひかりを励ましてくれる。
2432 = "Chỉ cần tàu bắt đầu chạy, chắc chắn sắt và khói sẽ một lần nữa khích lệ Hikari."
# 【おばあさん】
# display as 老奶奶
# JP: 「ああ、ごめんよぉ」
1620 = "「A, xin lỗi nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いえ」
1894 = "「Không có gì.」"
# monologue
# JP: 僕らの寝台の前の通路には、\n大きな荷物のおばあさんが押し出されてくる。
2548 = "Ở lối đi trước giường nằm của chúng tôi, một bà lão mang theo hành lý cồng kềnh bị đẩy tới."
# monologue
# JP: 小さな体の何倍もありそうな荷物を背負い――
2348 = "Bà cõng trên lưng khối hành lý có lẽ to gấp mấy lần cơ thể nhỏ bé của mình——"
# 【れいな】
# display as 玲奈
# JP: 「おばあさん、お荷物、れいながもちましょうかぁ？」
1769 = "「Bà ơi, để Reina mang hành lý giúp bà nha?」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1662 = "「啊」" 
# monologue
# JP: いかん、ぼーっと見てしまっていた。
2209 = "Không xong rồi, tôi mải nhìn chằm chằm mất rồi."
# monologue
# JP: ひかりが例え怯えていても――いや、だからこそ、\n大人として、人間として、為すべきことはたった一つだ。
2373 = "Cho dù Hikari có đang sợ hãi đi chăng nữa—— không, chính vì thế, là một người lớn, là một con người, việc cần làm chỉ có một."
# 【双鉄】
# display as 雙鐵
# JP: 「荷物を、どうぞよかったら下ろしてください」
1957 = "「Bà cứ đặt hành lý xuống đây nếu không phiền ạ.」"
# 【おばあさん】
# display as 老奶奶
# JP: 「いやぁ、けんどねぇ」
1625 = "「Ây da, thế thì ngại quá.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ご遠慮なさらず。家族で四つ寝台をとっていたので、\nひとつはちょうど空いてるんです」
1980 = "「Bà đừng ngại ạ. Gia đình cháu mua cả bốn giường nằm, nên vừa hay còn trống một chỗ ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「ひかりちゃんがポーレットといっしょだから、\n上の、あっちの寝台、あいてるんですよぉ」
1780 = "「Bé Hikari ở cùng Paulette rồi, nên giường trên bên kia đang trống đó nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「というか、僕が上にあがりましょう」
1674 = "「Nói đúng hơn là cháu sẽ lên trên đó.」"
# 【おばあさん】
# display as 老奶奶
# JP: 「いやいや、そこまでしてもらわんでも」
1610 = "「Ấy chết, không cần phiền đến mức đó đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしなければ、僕らもかえって落ち着けませんから」
1847 = "「Nếu không làm vậy thì chúng cháu cũng không yên tâm được ạ.」"
# monologue
# JP: 寝台を片付けておいて正解だった。\n荷物をあげてしまえば、すぐに下段を空にできる。
2410 = "Dọn dẹp giường nằm trước quả là quyết định đúng đắn. Chỉ cần dọn hành lý lên trên là có thể để trống giường dưới ngay lập tức."
# 【れいな】
# display as 玲奈
# JP: 「おばあさん、どおぞですぅ」
1768 = "「Bà ơi, bà ngồi đi nha.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ご迷惑でなければ、お荷物を下ろして座って下さい」
1766 = "「Nếu không phiền, bà cứ đặt hành lý xuống và ngồi nghỉ đi ạ.」"
# 【おばあさん】
# display as 老奶奶
# JP: 「ああ、ご親切に。ありがとう、ありがとう。\nほんならなぁ、遠慮のぉ」
1615 = "「A, mọi người tốt bụng quá. Cảm ơn, cảm ơn mọi người. Vậy thì lão bà đây không khách sáo nữa nhé.」"
# monologue
# JP: おばあさんは荷物が下ろす。\nどすん、と重い音がする。
2569 = "Bà lão đặt hành lý xuống. Một tiếng \\\"bịch\\\" nặng nề vang lên."
# 【ひかり】
# display as 光
# JP: 「わ」
1595 = "「Oa.」"
# monologue
# JP: 驚いたのか、ひかりが目を開け、\nポーレットの陰からのぞき込む。
2261 = "Có lẽ vì giật mình, Hikari mở mắt ra, ló đầu nhìn từ phía sau Paulette."
# monologue
# JP: おばあさんはひかりを見つけ、\nにっこり笑う。
2571 = "Bà lão nhìn thấy Hikari,\nliền nở nụ cười rạng rỡ."
# 【おばあさん】
# display as 老奶奶
# JP: 「おや、おじょうちゃん、こんにちわあ」
1624 = "「Ây da, chào cô bé đáng yêu nhé.」"
# 【ひかり】
# display as 光
# JP: 「ひゃうっ！」
1611 = "「Hya!」"
# monologue
# JP: 照れて、隠れる。
2269 = "Xấu hổ, con bé lại trốn đi."
# monologue
# JP: 隠れはするが、興味があるのか、\nほんの少しだけ顔を出し、じいっと大きな荷物を見てる。
2659 = "Trốn thì trốn, nhưng có vẻ vẫn tò mò, con bé chỉ ló mặt ra một chút xíu, chằm chằm nhìn vào khối hành lý to đùng."
# 【おばあさん】
# display as 老奶奶
# JP: 「この荷物はなぁ、[ぎょうしょう,1]行商の品」
2022 = "「Hành lý này ấy à, là hàng hóa của người bán dạo đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「[ぎょうしょう,1]行商って、なんですかぁ？」
1968 = "「Bán dạo là gì vậy nha?」"
# monologue
# JP: れいなが知らないはずもない。
2515 = "Reina không thể nào không biết."
# monologue
# JP: 知っていてなお、質問できないひかりに代わり、\nひかりの疑問を言葉に直してくれているのだ。
2355 = "Dù biết, nhưng em ấy vẫn thay mặt Hikari - người không thể đặt câu hỏi, chuyển sự thắc mắc của con bé thành lời."
# 【おばあさん】
# display as 老奶奶
# JP: 「行商っていうのは、[しな]品こさ背負って、\n汽車こで出かけて、遠ぐの町まで売り行くことさぁ」
1837 = "「Bán dạo có nghĩa là, cõng hàng hóa trên lưng, đi tàu hỏa, mang đến những thị trấn xa xôi để bán đó cháu.」"
# 【ひかり】
# display as 光
# JP: 「わ」
# 1595 = "「哇」" 
# monologue
# JP: 行商に、ロマンを感じでもしたのだろうか。\n隠れたままのひかりのひとみがキラキラ輝く。
2312 = "Phải chăng con bé cảm nhận được sự lãng mạn trong nghề bán dạo. Đôi mắt của Hikari, dù vẫn đang nấp, lại lấp lánh sáng ngời."
# 【おばあさん】
# display as 老奶奶
# JP: 「でな？　ばーちゃんが売ってるのはなぁ、\nこーゆーもん」
2031 = "「Và cháu biết không? Thứ bà đang bán ấy, là cái này đây.」"
# monologue
# JP: おばあさんは、わざとじらすようにゆっくりゆっくり\n行李を包んでいた風呂敷をとく。
2565 = "Bà lão từ từ, từ từ cởi tấm vải bọc hành lý ra, như cố tình trêu chọc sự tò mò."
# monologue
# JP: そうして、中から――
2505 = "Và rồi, từ bên trong——"
# 【ひかり】
# display as 光
# JP: 「りんご！」
1878 = "「Táo!」"
# 【おばあさん】
# display as 老奶奶
# JP: 「[いわき,1]岩城りんごだぁ。\n[あおもり,1]蒼森のりんごより旨かぁいう人もおる[しろもん,1]代物よ」
1876 = "「Táo Iwaki đấy. Có người còn bảo nó ngon hơn cả táo Aomori cơ đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「[あおもり,1]蒼森のよりですか？」
1891 = "「Ngon hơn cả táo Aomori ạ?」"
# monologue
# JP: ポーレットは蒼森に思い入れがある。
2666 = "Paulette có tình cảm đặc biệt với Aomori."
# monologue
# JP: 少しとがってしまった口調を、\nおばあさんは、しわだらけの笑顔でふんわりくるむ。
2450 = "Giọng điệu có phần hơi gay gắt của cô ấy, được bà lão nhẹ nhàng xoa dịu bằng nụ cười đầy nếp nhăn."
# 【おばあさん】
# display as 老奶奶
# JP: 「席こさ座らせてくれたお礼。ほれ」
1843 = "「Đây là quà cảm ơn vì đã nhường chỗ cho bà. Này cháu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、すみません」
1667 = "「A, cháu xin lỗi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます」
1982 = "「Cháu cảm ơn bà ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなにもですかぁ。\nれいな、とーっても嬉しいですよぉ」
2024 = "「Cả Reina cũng có phần sao nha.\nReina vui lắm đó nha.」"
# 【おばあさん】
# display as 老奶奶
# JP: 「ほんで、おじょうちゃんには」
1955 = "「Còn phần của cô bé đây thì.」"
# monologue
# JP: おばあさんは行李の中をゆっくり探り、\nもったいぶって、ひときわ小粒のリンゴをひとつ――
2560 = "Bà lão từ từ lục lọi trong đống hành lý, ra vẻ bí hiểm, lấy ra một quả táo nhỏ nhắn đặc biệt——"
# 【ひかり】
# display as 光
# JP: 「わぁぁ」
# 1595 = "「哇」" 
# monologue
# JP: ひかりが、思わず声を漏らす。\n無理もない。僕とて、釘付けになっている。
2271 = "Hikari bất giác thốt lên. Cũng không trách được. Ngay cả tôi cũng bị thu hút."
# 【れいな】
# display as 玲奈
# JP: 「きれいですねぇ」
1752 = "「Đẹp quá nha.」"
# 【ポーレット】
# display as 波萊特
# JP: 「本当。りんごの宝石みたい」
1871 = "「Thật đấy. Cứ như viên ngọc quý hình quả táo vậy.」"
# monologue
# JP: 言い得て妙だ。
2354 = "Ví von thật khéo léo."
# monologue
# JP: 紅玉、というりんごの品種が確かあったが――\nこれこそまさしく、紅の玉だ。
2442 = "Đúng là có một giống táo tên là Hồng Ngọc—— Nhưng quả này đích thực là một viên ngọc màu hồng tía."
# 【おばあさん】
# display as 老奶奶
# JP: 「今日の岩城で取れた中でも、\nいっとう上等のりんご、あげようねぇ」
2014 = "「Trong số những quả táo hái ở Iwaki hôm nay, bà tặng cháu quả táo ngon nhất đấy nhé.」"
# 【ひかり】
# display as 光
# JP: 「ふ……ぁ」
1584 = "「Phù…… a.」"
# monologue
# JP: ひかりが、おずおず手を差し伸べる。\nおばあさんはぴかぴかのりんごをその上に置く。
2274 = "Hikari rụt rè vươn tay ra. Bà lão đặt quả táo sáng bóng lên tay con bé."
# 【ポーレット】
# display as 波萊特
# JP: 「よかったね、ひかり。\nほら、『ありがとう』は？」
1734 = "「Thích quá nhỉ, Hikari. Nào, con phải nói 『Cảm ơn』 chứ?」"
# monologue
# JP: ポーレットの声に、ひかりはビクリと肩をふるわす。
2578 = "Nghe tiếng Paulette, bờ vai Hikari khẽ run lên."
# monologue
# JP: 視線が、おばあさんへ向きかけ、戻り、\n唇が、ふるふる震えて、言葉を――発しようとする。
2343 = "Ánh mắt hướng về phía bà lão, rồi lại rụt về, đôi môi run rẩy, cố gắng thốt lên—— thành lời."
# 【ひかり】
# display as 光
# JP: 「ぁ……ぁぃ……ぁぃっ……ぁ」
1981 = "「A…… a…… a…… a.」"
# monologue
# JP: 顔が真っ赤にそまってく。
2341 = "Khuôn mặt con bé đỏ bừng."
# monologue
# JP: 出来るのならば僕の喉でもなんでも貸して、\nひかりの気持ちを、なんとか言葉にしてやりたい。
2356 = "Nếu có thể, tôi muốn cho con bé mượn giọng nói hay bất cứ thứ gì của mình, để giúp con bé diễn đạt cảm xúc thành lời."
# 【おばあさん】
# display as 老奶奶
# JP: 「うんうん」
1705 = "「Ừm ừm.」"
# monologue
# JP: ひかりが言葉を発しきれぬうち、\nおばあさんはにこにこ静かに、頷いてくれる。
2330 = "Trong lúc Hikari vẫn chưa nói trọn câu, bà lão đã mỉm cười hiền từ, khẽ gật đầu."
# monologue
# JP: ほーっと。\n声の代わりにひかりが出すのは、安堵の息だ。
2279 = "Phù.\nThay vì giọng nói, Hikari khẽ thở phào nhẹ nhõm."
# 【おばあさん】
# display as 老奶奶
# JP: 「お礼さ言うのはこっちの方だで、気にせんで。\nそれより、ほぉれ、食べて試してみてくんろ」
1972 = "「Người phải nói lời cảm ơn là bà mới đúng, cháu đừng bận tâm. Hơn nữa, cháu mau ăn thử đi xem nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、遠慮無くいただきます」
2044 = "「Vậy thì, chúng cháu không khách sáo nữa ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、ならいま皮を」
1675 = "「A, vậy để cháu gọt vỏ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「これだけ綺麗なものだ。\n皮をむくのももったいなかろう」
2020 = "「Quả táo đẹp thế này cơ mà.\nGọt vỏ đi thì phí lắm.」"
# monologue
# JP: ズボンでごしごし、わざと乱暴に皮を拭く。
2439 = "Tôi cố tình chà xát mạnh quả táo vào quần để lau vỏ."
# monologue
# JP: 普段、家ではしない行為だ。\nひかりの瞳がまんまるになる。
2381 = "Đó là hành động tôi thường không làm ở nhà. Đôi mắt Hikari mở to tròn xoe."
# 【双鉄】
# display as 雙鐵
# JP: 「うん。うまそうだ」
1713 = "「Ừm. Trông ngon quá.」"
# monologue
# JP: （がぶっ）
2686 = "（Ngoạm）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1663 = "「Á!」"
# monologue
# JP: いや、旨い。
2328 = "Chà, ngon thật."
# monologue
# JP: お世辞でもなんでも、旨いというつもりであったが、\nその言葉さえもが、果汁と蜜とに溶かされる。
2305 = "Dù định nói ngon để nịnh hay gì đi nữa, thì ngay cả lời nói đó cũng bị hòa tan trong nước ép và mật ngọt lịm."
# 【双鉄】
# display as 雙鐵
# JP: 「（しゃくっ、むしゃっ――ごくっ、しゃくっ）」
2069 = "「（Sột soạt, nhóp nhép—— ực, sột soạt）」"
# 【れいな】
# display as 玲奈
# JP: 「わぁあ、おいしそうですぅ。\nれいなもまねっこしちゃいまぁす」
1602 = "「Oa, trông ngon quá nha. Reina cũng bắt chước đây nha.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それじゃあ、わたしも。\nちょっとお行儀悪いけど」
2039 = "「Vậy thì, em cũng thế.\nTuy hơi bất lịch sự một chút.」"
# 【おばあさん】
# display as 老奶奶
# JP: 「なーんもなんも。りんごさ、まるごとがぶりと行くのが、\nいっとう上等なお行儀だぁ」
1646 = "「Không sao, không sao. Cứ cắn ngập răng cả quả táo, đó mới là cách ăn ngon nhất đấy.」"
# 【れいな】
# display as 玲奈
# JP: 「あまーい！」
1753 = "「Ngọt quá!」"
# 【ポーレット】
# display as 波萊特
# JP: 「おいしーい！！！」
1748 = "「Ngon quá đi mất!!!」"
# 【ひかり】
# display as 光
# JP: 「ぁ……ぅっ――んっ！」
1661 = "「A…… ưm—— ứm!」"
# monologue
# JP: ごくりと、ひかりの喉が鳴る。
2267 = "Cổ họng Hikari phát ra tiếng ực."
# monologue
# JP: 小ぶりでぴかぴかのりんごをゴシゴシ、\n服のおなかで何度もこする。
2349 = "Con bé cọ xát quả táo nhỏ sáng bóng, chà đi chà lại nhiều lần vào bụng áo."
# 【ひかり】
# display as 光
# JP: 「あ――――んっ！　（がぶっ）」
1656 = "「A————! (Ngoạm)」"
# 【双鉄】
# display as 雙鐵
# JP: 「お！」
1640 = "「Ồ!」"
# monologue
# JP: いった――瞬間、瞳が輝く！\n頬がぱあっと、それこそリンゴの赤になる。
2336 = "Ngay khoảnh khắc—— cắn vào, đôi mắt con bé sáng rực lên! Hai má ửng hồng, hệt như màu đỏ của quả táo."
# 【ひかり】
# display as 光
# JP: 「（あむっ――しゃくっ――もぐもぐっ――ごくっ！）」
2068 = "「（Ngoạm—— sột soạt—— nhóp nhép—— ực!）」"
# monologue
# JP: よほど舌に合うのだろう。\nさきほどまでためらっていたのが嘘のように――
2530 = "Chắc hẳn là rất hợp khẩu vị. Sự ngập ngừng lúc nãy cứ như thể chưa từng tồn tại——"
# monologue
# JP: 冬眠明けのリスのごとくに、\n一心不乱、夢中になってかぶりついてる。
2345 = "Giống như một chú sóc vừa tỉnh dậy sau giấc ngủ đông, con bé mải mê, say sưa gặm nhấm quả táo."
# monologue
# JP: （気持ちはわかる。実にわかるぞ）
2683 = "（Ba hiểu cảm giác đó. Rất hiểu là đằng khác.）"
# monologue
# JP: 僕ら全員、無口になってる。\n口の中が、りんごの旨みでいっぱいだから。
2414 = "Tất cả chúng tôi đều trở nên im lặng. Bởi vì trong miệng chứa đầy hương vị thơm ngon của táo."
# 【ひかり】
# display as 光
# JP: 「（あむっ――しゃくっ――もぐっ――ごくっ！）」
# 2068 = "「（狼吞虎咽！）」" 
# 【おばあさん】
# display as 老奶奶
# JP: 「おーおー、めんこいめんこい」
1626 = "「Ôi chà, đáng yêu quá đi mất.」"
# 【ひかり】
# display as 光
# JP: 「ひうっ！！？」
1562 = "「Hya!!?」"
# monologue
# JP: よほど可愛く思ってくださったのだろう。
2529 = "Chắc hẳn bà lão thấy con bé rất đáng yêu."
# monologue
# JP: おばあさんがひかりの頭を優しく撫でて、\nけれどもひかりはビクリと驚き――
2350 = "Bà lão dịu dàng xoa đầu Hikari, nhưng Hikari lại giật mình kinh hãi——"
# 【ひかり】
# display as 光
# JP: 「ぁ……ぁぅ……ぅっ……」
1658 = "「A…… a ư…… ư……」"
# 【おばあさん】
# display as 老奶奶
# JP: 「あーあー、驚かして悪かったねぇ。\nごめんねぇ。せっかくおいしく食べてたとこ」
1613 = "「Ây da, xin lỗi vì làm cháu giật mình nhé. Xin lỗi cháu. Đang ăn ngon lành thế cơ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いえ、こちらこそっ」
1647 = "「Dạ không, chúng cháu mới phải xin lỗi ạ.」"
# 【おばあさん】
# display as 老奶奶
# JP: 「おーおー、リンゴ。\nまぁ、口のまわりさいっぱいつけて」
1617 = "「Ôi chà, táo kìa.\nCháu ăn dính đầy quanh miệng rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「え！？　僕ですか？」
1635 = "「Hả!? Cháu ạ?」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、ほーんと。\nそうてつさん、お口にりんごいっぱいですよぉ」
1579 = "「Fufufu, đúng thế thật. Anh Soutetsu, quanh miệng anh dính đầy táo kìa nha.」"
# 【ポーレット】
# display as 波萊特
# JP: 「もう、ひかりの前なんですよ？」
1931 = "「Thiệt tình, đang ở trước mặt Hikari đấy nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうれいなも、ポーレットもだ」
1921 = "「Cả Reina và Paulette cũng thế thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　うそ。やだ、双鉄くん、とって」
1634 = "「Hả!? Thật á. Không chịu đâu, anh Soutetsu, lau cho em đi.」"
# 【れいな】
# display as 玲奈
# JP: 「れいなのもとってほしいですぅ」
1500 = "「Reina cũng muốn được lau nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お安いご用だ」
1929 = "「Chuyện nhỏ.」"
# monologue
# JP: 寝台ごしに手を伸ばし、まずはれいなを。
2435 = "Tôi vươn tay qua giường, lau cho Reina trước."
# monologue
# JP: それから寝台を下りていき、\nポーレットの口の端のリンゴを取って片付けて。
2504 = "Sau đó bước xuống giường, lấy miếng táo dính ở khóe miệng Paulette ra và dọn dẹp."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかりもほら、お弁当たくさんついてるぞ」
1525 = "「Hikari cũng thế này, dính đầy cơm hộp rồi kìa.」"
# monologue
# JP: 頬についてるかけらをとって、\n口に運んで食べさせてやる。
2437 = "Tôi lấy mảnh vụn dính trên má con bé, đưa vào miệng đút cho con bé ăn."
# 【ひかり】
# display as 光
# JP: 「ん！　おいしーのっ」
1708 = "「Ưm! Ngon quá đi.」"
# monologue
# JP: それで硬直が溶けたのか、またむしゃむしゃと。
2388 = "Có vẻ nhờ thế mà sự căng thẳng đã tan biến, con bé lại tiếp tục nhai nhóp nhép."
# monologue
# JP: 僕らが見守るその中で、\n小ぶりとはいえまるごと一個、ひかりは見事に食べ尽くす。
2413 = "Trong sự theo dõi của chúng tôi, dù nhỏ nhưng Hikari đã ăn sạch sành sanh cả một quả táo."
# 【ひかり】
# display as 光
# JP: 「ふはっ、ごちそーさまなのー」
1589 = "「Phù, con ăn xong rồi ạ.」"
# 【おばあさん】
# display as 老奶奶
# JP: 「はぁい。お粗末さんでした」
1619 = "「Vậy nên, em về đây——」"
# 【ひかり】
# display as 光
# JP: 「はうっ！」
1682 = "Paulette lại cọ cọ khuôn mặt nũng nịu vào ngực tôi. Tôi đưa hai tay ôm lấy chiếc đầu nhỏ nhắn, xoay em ấy đối diện với mình."
# monologue
# JP: おばあさんの声にまた驚いて、\nひかりはポーレットの陰に隠れてしまう。
2265 = "「Cảm ơn em vì đã vất vả chuẩn bị cho chuyến đi và lo liệu mọi thứ—— Nói đúng hơn là, phần thưởng cho em đây.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの、すみません」
2017 = "「A—— (Chụt)」"
# 【おばあさん】
# display as 老奶奶
# JP: 「おいしかったねぇ。一生懸命食べてもらって、\n農家さんも、きっと喜んでくれとるよぉ」
1961 = "Một nụ hôn nhẹ nhàng.\nPaulette mỉm cười đầy hạnh phúc."
# 【ひかり】
# display as 光
# JP: 「ぅぅっ」
1680 = "「Cũng là phần thưởng cho anh Soutetsu vì đã vất vả nhé! (Chụt!)」"
# monologue
# JP: こくこく、嬉しげにひかりが頷く。
2277 = "「——Ừm. Cảm ơn em.」"
# 【ひかり】
# display as 光
# JP: 「ふぁ……あ～っ」
1583 = "Cứ dính chặt lấy nhau như thế, chúng tôi cọ mũi, cọ trán vào nhau."
# monologue
# JP: 次の瞬間、おおあくび。
2503 = "Dù luyến tiếc, nhưng đến đây thì đành phải buông nhau ra thôi. Bởi nếu máu trong người nóng lên hơn nữa thì sẽ không ngủ được mất."
# monologue
# JP: 早起きをして、おなかいっぱいになって安心して――\n眠くならないわけがない。
2637 = "「Fufufu, cảm ơn anh vì phần thưởng nha. Thế này thì ngày mai em lại có thêm động lực rồi! Chúc ngủ ngon, anh Soutetsu.」"
# 【ひかり】
# display as 光
# JP: 「んゆー……おしっこぉ」
1704 = "「Ừm, chúc ngủ ngon, Paulette.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。れいなといっしょにいきましょうねぇ」
1759 = "（Roạt——）"
# monologue
# JP: すぐさまれいなが、ひかりをサポートしてくれる。
2517 = "Rèm mở ra rồi lại đóng vào, Paulette quay trở về chiếc giường đối diện."
# monologue
# JP: 小さなれいなと、もっと小さなひかりの背中を、\nおばあさんはにこにこ見守ってくれる。
2563 = "（……Rõ ràng chỉ là một nụ hôn nhẹ thôi mà.）"
# 【おばあさん】
# display as 老奶奶
# JP: 「おーおー、めんこいめんこい――おんや、\nちょうどいい潮時だねぇ」
1628 = "Tim đập rộn ràng, cơ thể rạo rực không yên. Thôi thì nhắm mắt lại, đếm số lần bánh xe lăn qua mối nối đường ray xem sao."
# monologue
# JP: おばあさんは、てきぱきと荷物をまとめ始める。
2466 = "（Khi tỉnh dậy…… không biết tàu đã đến đâu rồi nhỉ.）"
# monologue
# JP: いくつかの駅へ停車するうち、\n車内は、だいぶ空いたみたいだ。
2478 = "Nếu là khung cảnh tuyết trắng thì thật tuyệt. Nếu vậy, đây sẽ là lần đầu tiên Hikari được thấy tuyết."
# 【双鉄】
# display as 雙鐵
# JP: 「お降りですか？」
1809 = "（Con bé sẽ mỉm cười—— hay là ngạc nhiên đến đơ người ra nhỉ?）"
# 【おばあさん】
# display as 老奶奶
# JP: 「終点まで乗るけど、もう混んどらんし。\nいつまでも[さつまのかみ,2]薩摩守も良くないからねぇ」
1830 = "Dù thế nào đi nữa, đó cũng sẽ là một khoảnh khắc tuyệt vời nhất. Tuyệt đối không thể bỏ lỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「さつまのかみ？」
2060 = "Những ngón tay của tôi đang được nắm lấy một cách nhẹ nhàng. Trong chăn, bên cạnh tôi, là cô bé Michiko nhỏ nhắn——"
# 【ポーレット】
# display as 波萊特
# JP: 「[ただのり,1]忠度さんです」
1786 = "「Ưm…… ưm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ただのり――っと」
1541 = "——Không phải Michiko. Là cô gái đó. Cô gái với mái tóc vàng óng ả rực rỡ bên đường ray mùa hè——"
# monologue
# JP: おばあさんは、\nあっという間に荷物をまとめて背負ってしまう。
2558 = "「Ba, ba ơi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「寝台は僕らが正規料金を払ってとったものですし、\nりんごのお礼に、もっとゆっくりしてくださっても」
2021 = "Không, cũng không phải. Cũng không phải là Paulette lúc mới gặp mặt."
# 【おばあさん】
# display as 老奶奶
# JP: 「おじょうちゃんに気を張らせてちゃ、\nかわいそうだしねぇ」
1557 = "Bởi vì tôi, giờ đã là người lớn rồi. Đã là người lớn, và là một người cha——"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1662 = "「啊」" 
# monologue
# JP: それは……確かに否定できない。
2638 = "「……Hikari.」"
# monologue
# JP: 否定できないだけにどうにも――\nやるせないような気が湧いてくる。
2662 = "Tôi mở mắt ra. Hikari đã chuyển sang giường của tôi từ lúc nào không hay."
# 【双鉄】
# display as 雙鐵
# JP: 「なんとも、申し訳」
2013 = "Bằng đôi bàn tay nhỏ bé, con bé nắm chặt lấy ngón tay tôi, và đang thở đều đều, chìm trong giấc ngủ bình yên."
# 【おばあさん】
# display as 老奶奶
# JP: 「それねぇ、お父さんもお母さんも、\nちーと気ぃつけた方がええかもねぇ」
1832 = "「……Con bé tự chuyển giường à?」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1594 = "「Không đâu ạ? Nửa đêm con bé cứ khóc nhè gọi 『Ba ơi』, nên em đã đưa con bé sang đó.」"
# 【おばあさん】
# display as 老奶奶
# JP: 「『すみません』の『申し訳ない』の言われたら、\nおじょうちゃん、悪いことしとると感じてまうでね」
1514 = "「Ra là vậy. Cảm ơn em.\nChào buổi sáng, Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1663 = "「啊！」" 
# monologue
# JP: それは――\nそれは確かに、間違いなくだ。
2636 = "「Chào buổi sáng, anh Soutetsu.」"
# monologue
# JP: ひかりは、あのこは――\n人の様子を、本当に敏感に気にするのだから。
2573 = "「Ưm nya.」"
# 【双鉄】
# display as 雙鐵
# JP: 「すみま――っ――」
1486 = "Cuộc trò chuyện với giọng nói kìm nén qua tấm rèm."
# monologue
# JP: ではない。\n改めるのなら、この瞬間から改めなければ。
2213 = "Có lẽ vì đã thức giấc giữa đêm, nên Hikari hoàn toàn không có vẻ gì là sắp tỉnh dậy."
# 【双鉄】
# display as 雙鐵
# JP: 「ご教示、ありがとうございます」
1494 = "「Bây giờ là mấy giờ rồi?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます！」
1983 = "「Chưa tới 5 giờ ạ. Đúng là bệnh nghề nghiệp nhỉ, cả hai chúng ta.」"
# 【おばあさん】
# display as 老奶奶
# JP: 「はにかむくらいは、かわいげだでねぇ。\nながーい目で、のーんびり見てあげねばねぇ」
1784 = "「Đúng vậy. Cơ mà, nếu nói là bệnh nghề nghiệp thì—— Reina? Chào buổi sáng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1756 = "「好的」" 
# 【おばあさん】
# display as 老奶奶
# JP: 「へば、いつかまたなぁ」
2048 = "「Fufufu,\nchào buổi sáng nha. Anh Soutetsu, Paulette.」"
# monologue
# JP: カーペットカーへの扉をひらき、\n大きな荷物をえっちら背負い、おばあさんは行ってしまう。
2567 = "「Chào buổi sáng. Reina cũng dậy sớm quá nhỉ. Chuyến đi này em cứ ngủ nướng thêm một chút cũng được mà.」"
# 【ひかり】
# display as 光
# JP: 「あれぇ、おばあちゃんはぁ？」
1593 = "「Câu đó em dành cho hai người mới đúng nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1639 = "「哦」" 
# monologue
# JP: ひかりは、いまだ眠そうだ。
2280 = "「Haha, đúng là vậy.」"
# monologue
# JP: ポーレットがぽんぽんと膝をたたけば\n子猫のようにそこにのっかり、丸くなる。
2490 = "「Ưm ư.」"
# 【双鉄】
# display as 雙鐵
# JP: 「列車が空いたので、いってしまわれた。\n『[さつまのかみ,2]薩摩守』はよくないとおっしゃってな」
1726 = "「Á——」"
# 【ひかり】
# display as 光
# JP: 「ただのりじゃないのにー」
1741 = "Giờ mà đánh thức con bé thì tội nghiệp quá."
# monologue
# JP: ぷくーっと、ひかりの頬がふくらんでしまう。
2287 = "Kìm giọng xuống——\nA, đúng rồi."
# 【ポーレット】
# display as 波萊特
# JP: 「えいっ」
1683 = "「Tuyết, có đang rơi không nhỉ?」"
# 【ひかり】
# display as 光
# JP: 「きゃあ！」
# 1611 = "「哎呀！」" 
# monologue
# JP: それを指でつつきしぼませて、\n優しく優しく、ポーレットはひかりの髪を撫ぜる。
2492 = "「Không biết nữa ạ. Chúng ta vẫn chưa đến Sendai mà—— Hơn nữa bây giờ là tháng Ba rồi, khả năng có tuyết rơi cũng thấp lắm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ひかりは、おばあちゃんに居て欲しかったの？」
1516 = "「Anh xem thử nhé.」"
# 【ひかり】
# display as 光
# JP: 「う～……あのね、いなくていいの。\nいなくていい、けど。だけどね、あのね？」
1652 = "「Ưm…… ưm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん」
1701 = "Tôi nhẹ nhàng gỡ ngón tay Hikari ra, bước xuống giường, tiến ra lối đi——"
# 【ひかり】
# display as 光
# JP: 「りんご、おいしかったから。\n『ごちそうさま』って、いいたかったのー」
1953 = "「A, gì thế này. Chẳng có hạt tuyết nào cả—— á.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そっか。じゃあ、次にあえたときいえるといいね」
1872 = "Đoàn tàu trượt vào sân ga.\nVừa hay."
# 【ひかり】
# display as 光
# JP: 「うん！　そうするのー！」
1709 = "「Anh xuống tàu vận động cơ thể một chút đây.」"
# monologue
# JP: 大きく頷き、動きがとまる。
2285 = "「Không xuống được đâu ạ.」\n「Không xuống được đâu nha.」"
# 【ひかり】
# display as 光
# JP: 「ふあ～っ」
1590 = "「Không xuống được? Nhưng mà, đang ở ga cơ mà?」"
# monologue
# JP: 一転見事なおおあくび。
2465 = "「Vì đây là điểm dừng kỹ thuật ạ.」"
# monologue
# JP: 匂いづけでもするかのように、\nひかりは何度も、ポーレットに顔を擦り付ける。
2263 = "「Em nghĩ là dừng để đổi lái tàu, hoặc là cấp thêm than và nước đó nha.」"
# 【ひかり】
# display as 光
# JP: 「まぁまぁ」
1771 = "「A——\nRa là vậy, tàu đã chạy suốt một đêm rồi mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん。いいこ。\nねんねんねんね」
1692 = "Đầu máy kéo \\x%lC56;#00ffc040;C56%l;#; tuy có \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#; đi kèm, nhưng lại nhỏ gọn và nhẹ. Nếu chỉ tính chiều dài thì nó còn nhỏ hơn cả \\x%l8620;#00ffc040;8620%l;#;."
# 【ひかり】
# display as 光
# JP: 「ん……ふっ――んんっ――\n……すやぁ」
1685 = "Đương nhiên, vốn dĩ nó không phù hợp cho việc kéo đường dài…… Thực ra việc dừng đỗ kỹ thuật thường xuyên như vậy lại là điều đáng mừng."
# monologue
# JP: よほど安心したのだろうか、\nひかりはすぐさま寝入ってしまう。
2526 = "「Anh cứ nghĩ tàu chạy chậm thế này thì tốn nhiều thời gian lắm, nhưng hóa ra việc tốn thời gian cũng có lý do chính đáng của nó nhỉ.」"
# monologue
# JP: つかの間、沈黙。\n動輪がレールをたたく音だけが、車内に規則正しく響く。
2412 = "「Vì đây là thời đại Đại bãi bỏ tuyến đường sắt mà. Ở đâu cũng chỉ có thể cố gắng hết sức trong khả năng của mình thôi ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「……回復運転してますねぇ」
1154 = "「Có lý. Vậy thì, anh cũng làm những việc trong khả năng của mình vậy. Paulette, em ra ngoài một lát được không?」"
# monologue
# JP: 言われて、気づく。
2580 = "「A, ra thì được thôi ạ—— nhưng mà?」"
# monologue
# JP: もはや減速運転をしていない――\nどころか、かなり飛ばしている。
2494 = "「Anh chưa nói sao? Anh muốn vận động cơ thể một chút.」"
# 【双鉄】
# display as 雙鐵
# JP: 「回復――そうか、遅延を120分内に収めるためか」
1950 = "「Hả!? T-Từ giờ này á!!?」"
# 【れいな】
# display as 玲奈
# JP: 「そうですねぇ。途中どんなに遅れても、\n払い戻しは、降りる駅での判断になりますからぁ」
1858 = "「Đúng là giờ này vẫn chưa có bài tập thể dục trên radio, nhưng chỉ là vài động tác vươn vai giãn gân cốt, không gây tiếng động thì chắc không vấn đề gì đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「途中どんなに遅れても、か」
1491 = "「Giãn gân cốt!!! Đúng rồi nhỉ, tất nhiên rồi! Em biết ngay mà!!」"
# monologue
# JP: れいなの言葉に、気が軽くなる。
2581 = "Khuôn mặt đỏ bừng,\nPaulette lao ra mép giường."
# monologue
# JP: 対人面での成熟度など、ひかりはいささか、\n他の子と比べ遅れてるようで焦っていたが――
2239 = "Từ trên đỉnh đầu, tiếng cười khúc khích vui vẻ vang lên."
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。途中、どんなに遅れても」
1859 = "「Anh Soutetsu, anh định vươn vai kéo dãn lưng đúng không nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1701 = "「嗯」" 
# monologue
# JP: ポーレットとふたり、頷きあう。
2428 = "「Ừm. Nếu là động tác đó thì không gian này cũng đủ rồi.」"
# monologue
# JP: 僕らの娘は、まだ走り始めたばかりなのだ。\nその道中を焦らせぬよう、夫婦、心を重ね合う。
2411 = "「Đ-Đúng rồi nhỉ! Được thôi! Kéo dãn lưng! Em sẽ kéo dãn anh Soutetsu hết cỡ luôn!」"
