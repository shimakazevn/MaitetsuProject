1540 = "「Thành thật xin lỗi quý khách, do quá đông\nđúc,\nchúng tôi xin phép được đưa hành khách vào\nlối đi này.」"

# monologue
# JP: 断定形。\nこの状況では受け入れる他にありえない。が――
2230 = "Câu khẳng định.\nTrong tình huống này, không còn cách nào\nkhác ngoài việc chấp nhận. Nhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「小さな子供もいますので、\nケンカなど起きては困ります」
1818 = "「Ở đây có trẻ nhỏ,\nnếu xảy ra xô xát thì phiền lắm.」"

# 【車掌】
# display as 列車長
# JP: 「もっともです。こちらの車両には――」
1806 = "「Quý khách nói đúng. Ở toa này——」"

# monologue
# JP: 言って車掌は、手元に隠した手帳にチラと目を落とす。
2297 = "Nói rồi, người trưởng tàu khẽ liếc nhìn\ncuốn sổ tay giấu trong tay."

# 【ひかり】
# display as 光
# JP: 「あれ、だれがどこまでのきっぷか かいてあるのー」
2033 = "「A, trên đó có ghi ai mua vé đến đâu kìa~」"

# monologue
# JP: なるほど。
2304 = "Ra là vậy."

# monologue
# JP: ならばあるいは、客の構成、年齢層。\nそうしたことも、ある程度メモされているのかもしれない。
2650 = "Nếu vậy, có lẽ cấu trúc hành khách, độ\ntuổi.\nNhững điều đó cũng được ghi chép lại ở một\nmức độ nào đó."

# 【車掌】
# display as 列車長
# JP: 「――お体の不自由なお客様、小さなお子様連れのお客様、\nお年を召したお客様を優先でお通しするよういたします」
1826 = "「——Chúng tôi sẽ ưu tiên cho những hành\nkhách khuyết tật, hành khách đi cùng trẻ\nnhỏ,\nvà hành khách cao tuổi đi qua.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうしてもらえれば助かります」
1808 = "「Được vậy thì tốt quá.」"

# 【車掌】
# display as 列車長
# JP: 「では、そのように手配します」
2037 = "「Vậy, tôi sẽ sắp xếp như thế.」"

# monologue
# JP: また一礼。\nばたばたと車掌がホームへおりる。
2298 = "Lại cúi chào.\nNgười trưởng tàu vội vã bước xuống sân ga."

# 【車掌】
# display as 列車長
# JP: 「みなさまにご乗車いただけます。\n指示に従い、整列乗車へのご協力をお願いします」
2058 = "「Xin mời quý khách lên tàu.\nVui lòng làm theo hướng dẫn và hợp tác xếp\nhàng lên tàu.」"

# 【乗客Ａ】
# display as 乘客Ａ
# JP: 「よかった、みんな乗れるのか」
1736 = "「May quá, mọi người đều được lên tàu à.」"

# monologue
# JP: そこが、まさしく不安点だったらしい。
2528 = "Có vẻ như đó chính là điểm đáng lo ngại\nnhất."

# monologue
# JP: 取り除かれれば騒ぎは収まり、\n車掌の指示通り順序よく、乗客たちが乗車してくる。
2224 = "Khi nỗi lo được xóa bỏ, sự ồn ào cũng lắng\nxuống,\ncác hành khách lần lượt lên tàu theo đúng\ntrật tự dưới sự hướng dẫn của trưởng tàu."

# 【ひかり】
# display as 光
# JP: 「やぁん」
1493 = "「Không chịu đâu.」"

# monologue
# JP: 足音だけで、ひかりがポーレットの背にしがみつく。\nぎゅうっと、堅く目を閉じている。
2273 = "Chỉ mới nghe tiếng bước chân, Hikari đã\nbám chặt lấy lưng Paulette.\nNhắm nghiền hai mắt lại."

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ、ひかり」
1895 = "「Không sao đâu, Hikari.」"

# monologue
# JP: ゆっくり、頭を撫でてやる。\n怖いものは怖いのだろうから、理屈をいっても仕方ない。
2444 = "Tôi nhẹ nhàng xoa đầu con bé.\nSợ thì vẫn là sợ thôi, nói lý lẽ cũng\nchẳng ích gì."

# 【双鉄】
# display as 雙鐵
# JP: 「パパもママもれいなもいる。大丈夫だ」
1910 = "「Có ba, có mẹ, có cả Reina ở đây mà. Không\nsao đâu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「すぐ落ち着くから、ちょっとだけ待ってましょ？」
2061 = "「Sẽ nhanh chóng yên tĩnh lại thôi, con\nráng đợi một chút nhé?」"

# 【れいな】
# display as 玲奈
# JP: 「あ、ひかりちゃんとおんなじくらいのこもいますよー」
1664 = "「A, có cả những bé trạc tuổi bé Hikari nữa\nnha~」"

# monologue
# JP: 僕の声にも、ポーレットの声にも、れいなの声にも、\nひかりはぎゅっと目を閉じて、体を硬くしたままだ。
2215 = "Dù là giọng của tôi, của Paulette, hay của\nReina,\nHikari vẫn nhắm nghiền mắt, cơ thể cứng\nđờ."

# monologue
# JP: （ううむ……）
2688 = "（Ưm……）"

# monologue
# JP: ともかく、発車を待つしか無い。
2556 = "Dù sao thì cũng chỉ còn cách đợi tàu chạy."

# monologue
# JP: 列車が走りだしさえすれば、\n再びの鉄分と煙分が、きっとひかりを励ましてくれる。
2432 = "Chỉ cần tàu bắt đầu chạy,\nchắc chắn sắt và khói sẽ một lần nữa khích\nlệ Hikari."

# 【おばあさん】
# display as 老奶奶
# JP: 「ああ、ごめんよぉ」
1620 = "「A, xin lỗi nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いえ」
1894 = "「Không có gì.」"

# monologue
# JP: 僕らの寝台の前の通路には、\n大きな荷物のおばあさんが押し出されてくる。
2548 = "Ở lối đi trước giường nằm của chúng tôi,\nmột bà lão mang theo hành lý cồng kềnh bị\nđẩy tới."

# monologue
# JP: 小さな体の何倍もありそうな荷物を背負い――
2348 = "Bà cõng trên lưng khối hành lý có lẽ to\ngấp mấy lần cơ thể nhỏ bé của mình——"

# 【れいな】
# display as 玲奈
# JP: 「おばあさん、お荷物、れいながもちましょうかぁ？」
1769 = "「Bà ơi, để Reina mang hành lý giúp bà\nnha?」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
# 1662 = "「啊」" 

# monologue
# JP: いかん、ぼーっと見てしまっていた。
2209 = "Không xong rồi, tôi mải nhìn chằm chằm mất\nrồi."

# monologue
# JP: ひかりが例え怯えていても――いや、だからこそ、\n大人として、人間として、為すべきことはたった一つだ。
2373 = "Cho dù Hikari có đang sợ hãi đi chăng\nnữa—— không, chính vì thế,\nlà một người lớn, là một con người, việc\ncần làm chỉ có một."

# 【双鉄】
# display as 雙鐵
# JP: 「荷物を、どうぞよかったら下ろしてください」
1957 = "「Bà cứ đặt hành lý xuống đây nếu không\nphiền ạ.」"

# 【おばあさん】
# display as 老奶奶
# JP: 「いやぁ、けんどねぇ」
1625 = "「Ây da, thế thì ngại quá.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ご遠慮なさらず。家族で四つ寝台をとっていたので、\nひとつはちょうど空いてるんです」
1980 = "「Bà đừng ngại ạ. Gia đình cháu mua cả bốn\ngiường nằm,\nnên vừa hay còn trống một chỗ ạ.」"

# 【れいな】
# display as 玲奈
# JP: 「ひかりちゃんがポーレットといっしょだから、\n上の、あっちの寝台、あいてるんですよぉ」
1780 = "「Bé Hikari ở cùng Paulette rồi,\nnên giường trên bên kia đang trống đó\nnha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「というか、僕が上にあがりましょう」
1674 = "「Nói đúng hơn là cháu sẽ lên trên đó.」"

# 【おばあさん】
# display as 老奶奶
# JP: 「いやいや、そこまでしてもらわんでも」
1610 = "「Ấy chết, không cần phiền đến mức đó đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうしなければ、僕らもかえって落ち着けませんから」
1847 = "「Nếu không làm vậy thì chúng cháu cũng\nkhông yên tâm được ạ.」"

# monologue
# JP: 寝台を片付けておいて正解だった。\n荷物をあげてしまえば、すぐに下段を空にできる。
2410 = "Dọn dẹp giường nằm trước quả là quyết định\nđúng đắn.\nChỉ cần dọn hành lý lên trên là có thể để\ntrống giường dưới ngay lập tức."

# 【れいな】
# display as 玲奈
# JP: 「おばあさん、どおぞですぅ」
1768 = "「Bà ơi, bà ngồi đi nha.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ご迷惑でなければ、お荷物を下ろして座って下さい」
1766 = "「Nếu không phiền, bà cứ đặt hành lý xuống\nvà ngồi nghỉ đi ạ.」"

# 【おばあさん】
# display as 老奶奶
# JP: 「ああ、ご親切に。ありがとう、ありがとう。\nほんならなぁ、遠慮のぉ」
1615 = "「A, mọi người tốt bụng quá. Cảm ơn, cảm ơn\nmọi người.\nVậy thì lão bà đây không khách sáo nữa\nnhé.」"

# monologue
# JP: おばあさんは荷物が下ろす。\nどすん、と重い音がする。
2569 = "Bà lão đặt hành lý xuống.\nMột tiếng \\\"bịch\\\" nặng nề vang lên."

# 【ひかり】
# display as 光
# JP: 「わ」
1595 = "「Oa.」"

# monologue
# JP: 驚いたのか、ひかりが目を開け、\nポーレットの陰からのぞき込む。
2261 = "Có lẽ vì giật mình, Hikari mở mắt ra,\nló đầu nhìn từ phía sau Paulette."

# monologue
# JP: おばあさんはひかりを見つけ、\nにっこり笑う。
2571 = "Bà lão nhìn thấy Hikari,\nliền nở nụ cười rạng rỡ."

# 【おばあさん】
# display as 老奶奶
# JP: 「おや、おじょうちゃん、こんにちわあ」
1624 = "「Ây da, chào cô bé đáng yêu nhé.」"

# 【ひかり】
# display as 光
# JP: 「ひゃうっ！」
1611 = "「Hya!」"

# monologue
# JP: 照れて、隠れる。
2269 = "Xấu hổ, con bé lại trốn đi."

# monologue
# JP: 隠れはするが、興味があるのか、\nほんの少しだけ顔を出し、じいっと大きな荷物を見てる。
2659 = "Trốn thì trốn, nhưng có vẻ vẫn tò mò,\ncon bé chỉ ló mặt ra một chút xíu, chằm\nchằm nhìn vào khối hành lý to đùng."

# 【おばあさん】
# display as 老奶奶
# JP: 「この荷物はなぁ、[ぎょうしょう,1]行商の品」
2022 = "「Hành lý này ấy à, là hàng hóa của người\nbán dạo đấy.」"

# 【れいな】
# display as 玲奈
# JP: 「[ぎょうしょう,1]行商って、なんですかぁ？」
1968 = "「Bán dạo là gì vậy nha?」"

# monologue
# JP: れいなが知らないはずもない。
2515 = "Reina không thể nào không biết."

# monologue
# JP: 知っていてなお、質問できないひかりに代わり、\nひかりの疑問を言葉に直してくれているのだ。
2355 = "Dù biết, nhưng em ấy vẫn thay mặt Hikari -\nngười không thể đặt câu hỏi,\nchuyển sự thắc mắc của con bé thành lời."

# 【おばあさん】
# display as 老奶奶
# JP: 「行商っていうのは、[しな]品こさ背負って、\n汽車こで出かけて、遠ぐの町まで売り行くことさぁ」
1837 = "「Bán dạo có nghĩa là, cõng hàng hóa trên\nlưng,\nđi tàu hỏa, mang đến những thị trấn xa xôi\nđể bán đó cháu.」"

# 【ひかり】
# display as 光
# JP: 「わ」
# 1595 = "「哇」" 

# monologue
# JP: 行商に、ロマンを感じでもしたのだろうか。\n隠れたままのひかりのひとみがキラキラ輝く。
2312 = "Phải chăng con bé cảm nhận được sự lãng\nmạn trong nghề bán dạo.\nĐôi mắt của Hikari, dù vẫn đang nấp, lại\nlấp lánh sáng ngời."

# 【おばあさん】
# display as 老奶奶
# JP: 「でな？　ばーちゃんが売ってるのはなぁ、\nこーゆーもん」
2031 = "「Và cháu biết không? Thứ bà đang bán ấy,\nlà cái này đây.」"

# monologue
# JP: おばあさんは、わざとじらすようにゆっくりゆっくり\n行李を包んでいた風呂敷をとく。
2565 = "Bà lão từ từ, từ từ cởi tấm vải bọc hành\nlý ra, như cố tình trêu chọc sự tò mò."

# monologue
# JP: そうして、中から――
2505 = "Và rồi, từ bên trong——"

# 【ひかり】
# display as 光
# JP: 「りんご！」
1878 = "「Táo!」"

# 【おばあさん】
# display as 老奶奶
# JP: 「[いわき,1]岩城りんごだぁ。\n[あおもり,1]蒼森のりんごより旨かぁいう人もおる[しろもん,1]代物よ」
1876 = "「Táo Iwaki đấy.\nCó người còn bảo nó ngon hơn cả táo Aomori\ncơ đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「[あおもり,1]蒼森のよりですか？」
1891 = "「Ngon hơn cả táo Aomori ạ?」"

# monologue
# JP: ポーレットは蒼森に思い入れがある。
2666 = "Paulette có tình cảm đặc biệt với Aomori."

# monologue
# JP: 少しとがってしまった口調を、\nおばあさんは、しわだらけの笑顔でふんわりくるむ。
2450 = "Giọng điệu có phần hơi gay gắt của cô ấy,\nđược bà lão nhẹ nhàng xoa dịu bằng nụ cười\nđầy nếp nhăn."

# 【おばあさん】
# display as 老奶奶
# JP: 「席こさ座らせてくれたお礼。ほれ」
1843 = "「Đây là quà cảm ơn vì đã nhường chỗ cho\nbà. Này cháu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ、すみません」
1667 = "「A, cháu xin lỗi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます」
1982 = "「Cháu cảm ơn bà ạ.」"

# 【れいな】
# display as 玲奈
# JP: 「れいなにもですかぁ。\nれいな、とーっても嬉しいですよぉ」
2024 = "「Cả Reina cũng có phần sao nha.\nReina vui lắm đó nha.」"

# 【おばあさん】
# display as 老奶奶
# JP: 「ほんで、おじょうちゃんには」
1955 = "「Còn phần của cô bé đây thì.」"

# monologue
# JP: おばあさんは行李の中をゆっくり探り、\nもったいぶって、ひときわ小粒のリンゴをひとつ――
2560 = "Bà lão từ từ lục lọi trong đống hành lý,\nra vẻ bí hiểm, lấy ra một quả táo nhỏ nhắn\nđặc biệt——"

# 【ひかり】
# display as 光
# JP: 「わぁぁ」
# 1595 = "「哇」" 

# monologue
# JP: ひかりが、思わず声を漏らす。\n無理もない。僕とて、釘付けになっている。
2271 = "Hikari bất giác thốt lên.\nCũng không trách được. Ngay cả tôi cũng bị\nthu hút."

# 【れいな】
# display as 玲奈
# JP: 「きれいですねぇ」
1752 = "「Đẹp quá nha.」"

# 【ポーレット】
# display as 波萊特
# JP: 「本当。りんごの宝石みたい」
1871 = "「Thật đấy. Cứ như viên ngọc quý hình quả\ntáo vậy.」"

# monologue
# JP: 言い得て妙だ。
2354 = "Ví von thật khéo léo."

# monologue
# JP: 紅玉、というりんごの品種が確かあったが――\nこれこそまさしく、紅の玉だ。
2442 = "Đúng là có một giống táo tên là Hồng\nNgọc——\nNhưng quả này đích thực là một viên ngọc\nmàu hồng tía."

# 【おばあさん】
# display as 老奶奶
# JP: 「今日の岩城で取れた中でも、\nいっとう上等のりんご、あげようねぇ」
2014 = "「Trong số những quả táo hái ở Iwaki hôm\nnay,\nbà tặng cháu quả táo ngon nhất đấy nhé.」"

# 【ひかり】
# display as 光
# JP: 「ふ……ぁ」
1584 = "「Phù…… a.」"

# monologue
# JP: ひかりが、おずおず手を差し伸べる。\nおばあさんはぴかぴかのりんごをその上に置く。
2274 = "Hikari rụt rè vươn tay ra.\nBà lão đặt quả táo sáng bóng lên tay con\nbé."

# 【ポーレット】
# display as 波萊特
# JP: 「よかったね、ひかり。\nほら、『ありがとう』は？」
1734 = "「Thích quá nhỉ, Hikari.\nNào, con phải nói 『Cảm ơn』 chứ?」"

# monologue
# JP: ポーレットの声に、ひかりはビクリと肩をふるわす。
2578 = "Nghe tiếng Paulette, bờ vai Hikari khẽ run\nlên."

# monologue
# JP: 視線が、おばあさんへ向きかけ、戻り、\n唇が、ふるふる震えて、言葉を――発しようとする。
2343 = "Ánh mắt hướng về phía bà lão, rồi lại rụt\nvề,\nđôi môi run rẩy, cố gắng thốt lên—— thành\nlời."

# 【ひかり】
# display as 光
# JP: 「ぁ……ぁぃ……ぁぃっ……ぁ」
1981 = "「A…… a…… a…… a.」"

# monologue
# JP: 顔が真っ赤にそまってく。
2341 = "Khuôn mặt con bé đỏ bừng."

# monologue
# JP: 出来るのならば僕の喉でもなんでも貸して、\nひかりの気持ちを、なんとか言葉にしてやりたい。
2356 = "Nếu có thể, tôi muốn cho con bé mượn giọng\nnói hay bất cứ thứ gì của mình,\nđể giúp con bé diễn đạt cảm xúc thành lời."

# 【おばあさん】
# display as 老奶奶
# JP: 「うんうん」
1705 = "「Ừm ừm.」"

# monologue
# JP: ひかりが言葉を発しきれぬうち、\nおばあさんはにこにこ静かに、頷いてくれる。
2330 = "Trong lúc Hikari vẫn chưa nói trọn câu,\nbà lão đã mỉm cười hiền từ, khẽ gật đầu."

# monologue
# JP: ほーっと。\n声の代わりにひかりが出すのは、安堵の息だ。
2279 = "Phù.\nThay vì giọng nói, Hikari khẽ thở phào nhẹ\nnhõm."

# 【おばあさん】
# display as 老奶奶
# JP: 「お礼さ言うのはこっちの方だで、気にせんで。\nそれより、ほぉれ、食べて試してみてくんろ」
1972 = "「Người phải nói lời cảm ơn là bà mới đúng,\ncháu đừng bận tâm.\nHơn nữa, cháu mau ăn thử đi xem nào.」"

# 【双鉄】
# display as 雙鐵
# JP: 「では、遠慮無くいただきます」
2044 = "「Vậy thì, chúng cháu không khách sáo nữa\nạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、ならいま皮を」
1675 = "「A, vậy để cháu gọt vỏ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「これだけ綺麗なものだ。\n皮をむくのももったいなかろう」
2020 = "「Quả táo đẹp thế này cơ mà.\nGọt vỏ đi thì phí lắm.」"

# monologue
# JP: ズボンでごしごし、わざと乱暴に皮を拭く。
2439 = "Tôi cố tình chà xát mạnh quả táo vào quần\nđể lau vỏ."

# monologue
# JP: 普段、家ではしない行為だ。\nひかりの瞳がまんまるになる。
2381 = "Đó là hành động tôi thường không làm ở\nnhà.\nĐôi mắt Hikari mở to tròn xoe."

# 【双鉄】
# display as 雙鐵
# JP: 「うん。うまそうだ」
1713 = "「Ừm. Trông ngon quá.」"

# monologue
# JP: （がぶっ）
2686 = "（Ngoạm）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1663 = "「Á!」"

# monologue
# JP: いや、旨い。
2328 = "Chà, ngon thật."

# monologue
# JP: お世辞でもなんでも、旨いというつもりであったが、\nその言葉さえもが、果汁と蜜とに溶かされる。
2305 = "Dù định nói ngon để nịnh hay gì đi nữa,\nthì ngay cả lời nói đó cũng bị hòa tan\ntrong nước ép và mật ngọt lịm."

# 【双鉄】
# display as 雙鐵
