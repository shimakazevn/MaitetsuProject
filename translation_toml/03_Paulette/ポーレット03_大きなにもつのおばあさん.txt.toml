2012 = "「Đây là bản nhạc biểu tượng của các chuyến\ntàu đường dài thời Teitetsu cũ.\nThật vui khi họ lại chăm chút đến mức\nnày.」"

# 【ひかり】
# display as 光
# JP: 「うれしいのー、なつかしいのー」
1761 = "「Vui quá, hoài niệm quá~」"

# monologue
