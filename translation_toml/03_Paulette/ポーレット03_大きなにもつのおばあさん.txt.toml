1882 = "「Nếu tàu trễ quá 120 phút, tức là tàu tốc\nhành không làm đúng nhiệm vụ của tàu tốc\nhành,\nthì tiền vé đó sẽ được hoàn lại nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そんな仕組みがあったのか」
1543 = "「Ra là có quy định như vậy à.」"

# 【ひかり】
# display as 光
# JP: 「てーてつじだいからのでんとーなのー！\nおひとよてつどーにも、きていあるのー！」
2015 = "「Đây là truyền thống từ thời Teitetsu đó!\nĐường sắt Ohito cũng có quy định này!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、僕でも知らなかったぞ」
1508 = "「Thật bất ngờ, đến anh còn không biết\nđấy.」"

# 【ポーレット】
# display as 波萊特
