1128 = "Tôi vươn tay qua giường, lau cho Reina\ntrước."

# monologue
# JP: ごく単純な塩気の旨みが、\n口いっぱい、体いっぱいに広がってくる。
2641 = "Sau đó bước xuống giường,\nlấy miếng táo dính ở khóe miệng Paulette\nra và dọn dẹp."

# 【双鉄】
# display as 雙鐵
# JP: 「これは――旨いな。\n上等のハムを使っていたりするのか？」
