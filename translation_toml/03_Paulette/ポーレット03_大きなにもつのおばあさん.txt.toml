2553 = "Giọng nói bực bội từ sân ga vọng vào tận\nđây qua cửa sổ.\nNgay lập tức, Hikari trốn sau lưng\nPaulette."

# 【双鉄】
# display as 雙鐵
# JP: 「これは――このままでは乗せきれんな」
2023 = "「Thế này thì—— cứ đà này thì không thể lên\nhết được đâu.」"

# 【車掌】
# display as 列車長
# JP: 「失礼します」
1840 = "「Xin lỗi đã làm phiền.」"

# monologue
# JP: 言った瞬間、車掌が来る。
2422 = "Ngay khoảnh khắc tôi vừa nói, người trưởng\ntàu bước đến."

