2575 = "Nếu có gió mạnh, việc sử dụng Aircra sẽ bị\nhạn chế,\nhành khách sử dụng tàu hỏa tăng vọt cũng\nlà lẽ đương nhiên."

# 【乗客Ａ】
# display as 乘客Ａ
# JP: 「おい、押すなよ」
1677 = "「Này, đừng đẩy chứ.」"

# 【乗客Ｂ】
# display as 乘客Ｂ
# JP: 「ちょっと！　誰！？　ヘンなとこ触らないでよ」
1945 = "「Này! Ai đấy!? Đừng có đụng chạm lung\ntung.」"

# 【ひかり】
# display as 光
# JP: 「やぁっ」
# 1561 = "「呀！」" 

# monologue
