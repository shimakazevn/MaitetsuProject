1918 = "「Reina là Railord nên mới biết……\nNhưng bé Hikari, sao em lại biết chuyện\nnày nha?」"

# 【ひかり】
# display as 光
# JP: 「あのね、ママがね、読み聞かせしてくれたのー」
2011 = "「Dạ, là mẹ đọc cho con nghe đó~」"

# 【双鉄】
# display as 雙鐵
