# JP: 「ん――ぁっ」
1020 = "「嗯——啊」" 

# monologue
# JP: （とさっ！）
1768 = "（身體倒下）" 

# monologue
# JP: 体の力も全部を吸われて、吐き出して、\n崩れる体は、やわらかな肉に包んでもらえる。
1447 = "我全身的力量都被吸走，已經盡數吐出。我倒下之後便被軟嫩的嬌軀包裹住了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄……くん――んっ――ちゅっ――ちゅむっ」
1181 = "「雙鐵——嗯——啾——啾嚕……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「あ――」
# 996 = "「啊——」" 

# monologue
# JP: ポーレットの舌が丹念に、\n僕の口内を蠢き唾液をなすってく。
1567 = "波萊特的小舌舔著我嘴裡的每個角落，給我刷上了甜甜的香津。" 

# monologue
# JP: 絞られたものが補充されてく。\nそんな感覚を覚えれば、体は熱を取り返してく。
1351 = "剛才被吸走的東西漸漸補充上了。在這種感覺的催動下，我的體力也開始恢復。" 

# 【ポーレット】
# display as 波萊特
# JP: 「れるっ――れムッ――ちゅっ――ちゅむっ――ん～っ」
1015 = "「啾嚕——啾嚕——啾——啾嚕——嗯」" 

# monologue
# JP: ポーレットも同じ気持ちと感じる。\n僕の精液を、子宮で受け止めたかわりに、きっと――
1546 = "波萊特一定也是同樣的感覺。她的子宮裡滿是我的精液，那她一定——" 

# 【ポーレット】
# display as 波萊特
# JP: 「チュッ――ちるっ――れろっ――れるうううっ――」
1016 = "「啾嚕——啾嚕——啾嚕——啾嚕嚕——」" 

# monologue
# JP: ……唾液を、僕に流し込み。\nそうして僕と、一緒にいようとしてくれている。
755 = "……她不停向我嘴裡注入著唾液。她用這種方式想跟我結合在一起。" 

# monologue
# JP: 体液と体液とを交換しあい、\n僕らは、もっとひとつに溶け合おうと求め続ける。
1445 = "我們交換著體液，想讓我們的結合變得更加不分彼此。" 

# 【双鉄H】
# display as 雙鐵
# JP: （これが……これがセックスか）
1773 = "（這就是做愛的感覺……）" 

# monologue
# JP: 満たされていく。\nなのに、もっとが欲しくなる。
1492 = "整個人都獲得了巨大的滿足。但是卻還想要第二次、第三次。" 

# monologue
# JP: その混乱をほどきたくって、\n一緒に答えをみつけたくって――
1458 = "我想理清這團亂麻，想跟她一起尋找答案——" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ん……――ポーレット」
1032 = "「嗯……波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……双鉄くぅん」
1186 = "「雙鐵君……雙鐵君」" 

# monologue
# JP: 甘えるポーレットの体を抱きしめ。
1468 = "我抱住了跟我撒嬌的波萊特。" 

# monologue
# JP: そしてもう一度、もう何度でも、\n僕らは深く、キスを、唾液を、そして愛情を交わし合う。
1596 = "然後我們又一次、又無數次深深地相吻，交換著唾液，訴說著愛意。" 
