# ポーレットh1_ファーストセックス.txt 
[info]

[characters]
1362 = "Soutetsu H"
1267 = "Paulette"

[character_subs]
1672 = "Soutetsu"
1545 = "Paulette"

[script]
# lines: 315 
# 【双鉄H】
# display as 雙鐵
# JP: 「ここが、ポーレットの部屋か」
1164 = "「Đây là phòng của Paulette sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「狭いとこですけど、あがってください」
1179 = "「Hơi chật hẹp một chút, nhưng anh cứ vào đi ạ.」"
# monologue
# JP: レールショップから歩いてほんの三分足らず。\n立地的には、まさに駅前一等地にある小ぶりなアパート。
1427 = "Đi bộ từ Rail Shop chưa đầy ba phút.\nVề vị trí thì đây quả là một căn hộ nhỏ nằm ở khu đất vàng trước ga."
# monologue
# JP: その一室は、御一夜市長兼御一夜鉄道社長の住処とは\nとても信じられないほどの、ごくごく質素な佇まいだ。
1483 = "Căn phòng mang một vẻ ngoài vô cùng giản dị,\nđến mức khó tin đây lại là nơi ở của Thị trưởng kiêm Giám đốc Đường sắt Ohimitera."
# 【双鉄H】
# display as 雙鐵
# JP: 「2Kとはいえ、れいなもいるなら手狭では？\n市長なら、公邸もあるだろうに」
1180 = "「Dù là căn hộ 2K, nhưng nếu có cả Reina thì chẳng phải sẽ hơi chật sao?\nLà Thị trưởng thì hẳn là có cả dinh thự công cơ mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありますけど……その、色々あって」
1126 = "「Có thì có ạ... nhưng mà, có nhiều chuyện lắm.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
1005 = "「A——」"
# monologue
# JP: 失言だった。\n前市長、ポーレットの父が公邸住まいだったなら……
1455 = "Tôi lỡ lời rồi.\nThị trưởng tiền nhiệm, cha của Paulette, từng sống ở dinh thự công..."
# monologue
# JP: ポーレットにとってそこは、\n家庭が壊れてしまった現場でもあるのだろうから。
1417 = "Đối với Paulette, nơi đó\ncũng chính là hiện trường nơi gia đình cô tan vỡ."
# 【ポーレット】
# display as 波萊特
# JP: 「それに！　ちっちゃくっても、仕事と離れた空間。\nわたし、欲しかったんです。必要だって思って」
1168 = "「Hơn nữa! Dù có nhỏ, nhưng em vẫn muốn có một không gian tách biệt với công việc.\nEm nghĩ điều đó là cần thiết.」"
# monologue
# JP: 顔に思いを出してしまっていたのだろうか。
1454 = "Có lẽ tôi đã để lộ suy nghĩ ra mặt mất rồi."
# monologue
# JP: とりなすように、空気を変えようとするように、\nポーレットがそう、明るい声で教えてくれる。
1560 = "Như để xoa dịu, như muốn thay đổi bầu không khí,\nPaulette đã nói với tôi bằng một giọng tươi sáng như vậy."
# 【双鉄H】
# display as 雙鐵
# JP: 「仕事と離れた空間、か」
1155 = "「Không gian tách biệt với công việc sao.」"
# monologue
# JP: [えきほんおく,2]駅本屋は言うに及ばず、レールショップも――\nどれほど自分達の色を出しても、やはり仕事場なのだろう。
1654 = "Tòa nhà chính của nhà ga thì khỏi nói rồi, ngay cả Rail Shop cũng vậy——\nDù có thể hiện cá tính của bản thân đến mức nào, thì đó vẫn là nơi làm việc."
# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、ここにいるのは、社長でも市長でも、\n運転士でもない、ただの少女の、ポーレットなのだな」
1177 = "「Nếu vậy, người đang ở đây không phải là Giám đốc, không phải Thị trưởng,\ncũng chẳng phải người lái tàu, mà chỉ là một thiếu nữ bình thường, Paulette nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。肩書全部を脱ぎ捨てた、単なる雛衣ポーレット。背伸びしてない、剥き出しではだかのわたしです」
1119 = "「Vâng ạ. Rũ bỏ mọi chức danh, em chỉ đơn thuần là Hinai Paulette. Không cần cố tỏ ra người lớn, là một con người trần trụi, chân thật nhất của em.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「……」
759 = "「...」"
# monologue
# JP: 剥き出しで、はだか……\n裸の、ポーレット。
1650 = "Trần trụi, chân thật...\nPaulette, khỏa thân."
# monologue
# JP: 思った瞬間、\n喉が勝手に大きく動き、ごくりと音を立ててしまう。
1439 = "Ngay khoảnh khắc nghĩ đến điều đó,\ncổ họng tôi tự động nuốt khan một cái rõ to."
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1005 = "「啊」" 
# monologue
# JP: 驚きと喜びが混じったような声を出し、\n青い瞳が上目づかいに、僕を見る。
1572 = "Cô ấy cất giọng nửa ngạc nhiên nửa vui sướng,\nđôi mắt xanh biếc ngước lên nhìn tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……わたしのはだか、とか――\nお風呂……登呂流湯で、見てるじゃないですか」
1182 = "「Soutetsu... cơ thể khỏa thân của em... chẳng phải anh\nđã thấy lúc tắm... ở Tororyu-yu rồi sao.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。言われてみればそのとおりだ……が」
1038 = "「À. Nghe em nói mới nhớ đúng là vậy... nhưng mà.」"
# monologue
# JP: しかし今、僕が思ってしまった“裸”は、\n登呂流湯で見るそれとはまるで、別物だった。
1600 = "Tuy nhiên, \"khỏa thân\" mà tôi vừa nghĩ tới lúc này,\nhoàn toàn khác biệt với những gì tôi đã thấy ở Tororyu-yu."
# monologue
# JP: いや、そうじゃない。\n別物なのは、きっと、恐らく――
1330 = "Không, không phải vậy.\nSự khác biệt đó, chắc chắn, có lẽ là do——"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕は、変わったのだと思う。\nポーレット、君に恋して。恋をしてたと、自覚して」
1103 = "「Anh nghĩ là anh đã thay đổi rồi.\nPaulette, anh yêu em. Anh đã nhận ra mình đang yêu em.」"
# 【ポーレット】
# display as 波萊特
# JP: 「変わった……」
940 = "「Thay đổi...」"
# monologue
# JP: ポーレットの目が、潤んできている。\n頬がぽーっと赤くなり、肌も汗ばんできているようだ。
1569 = "Đôi mắt của Paulette bắt đầu ngấn lệ.\nĐôi má ửng đỏ, làn da dường như cũng lấm tấm mồ hôi."
# 【ポーレット】
# display as 波萊特
# JP: 「どう、変わったんですか？」
955 = "「Anh đã thay đổi như thế nào vậy?」"
# monologue
# JP: （ずいっ）
1776 = "（Xích lại gần）"
# monologue
# JP: ポーレットが一歩を踏み込んでくる。\n甘さと濃さを感じるにおいが、鼻をくすぐる。
1552 = "Paulette bước tới một bước.\nMột mùi hương vừa ngọt ngào vừa đậm đà xộc vào mũi tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレットの裸を見たいと思うし、触れたいとも思う。\n今まではまるで感じなかったが、今は、そう感じている」
1098 = "「Anh muốn nhìn thấy cơ thể trần trụi của Paulette, cũng muốn chạm vào nó.\nTrước đây anh hoàn toàn không có cảm giác này, nhưng bây giờ thì có.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしもっ！　そのっ――……え、っと…………」
1088 = "「Em cũng vậy! Cái đó——... à, ừm............」"
# monologue
# JP: 僕を見ていたポーレットの目が、不意に外れる。\nぐるぐる泳いで、床へと落ちて……
1579 = "Ánh mắt Paulette vốn đang nhìn tôi chợt lảng đi.\nĐôi mắt đảo quanh rồi nhìn xuống sàn nhà..."
# monologue
# JP: その視線のまま、声の勢いまでもが落ち――
1373 = "Cùng với ánh mắt đó, ngay cả khí thế trong giọng nói cũng giảm dần——"
# monologue
# JP: （こてんっ）
1753 = "（Bịch）"
# 【双鉄H】
# display as 雙鐵
# JP: 「むっ！？」
1045 = "「Hử!?」"
# monologue
# JP: 体までもが崩れておちて、\nポーレットは、ベッドにころりと寝転んでしまう。
1582 = "Cả cơ thể cô ấy cũng mềm nhũn ra,\nvà rồi Paulette ngã lăn ra giường."
# 【ポーレット】
# display as 波萊特
# JP: 「あ、あの……わたしたち……\nお互いに、告白……しあいました、よ、ね？」
1173 = "「À, ừm... chúng ta...\nđã... tỏ tình với nhau rồi, phải không anh?」"
# monologue
# JP: 視線を、いまだ僕から外して、ひどく照れくさそうに言う。\n僕にまで、照れが伝染してきそうになる。
1385 = "Cô ấy nói với vẻ vô cùng ngượng ngùng, ánh mắt vẫn không dám nhìn tôi.\nSự ngại ngùng đó dường như lây sang cả tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……うむ。\n告白しあって、キスも交わした」
1004 = "「À... ừm.\nĐã tỏ tình với nhau, cũng đã trao nhau nụ hôn rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「です、から……ええと、その……わたしと、双鉄、くん、\nこ、恋人同士……って思ってもいい……ですよね？」
1108 = "「Vậy, nên là... à ừm, cái đó... em và, anh Soutetsu,\ncó thể coi là... ng, người yêu của nhau... đúng không anh?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ。\n僕は既に、ポーレットは僕の恋人なのだと思っている」
1149 = "「Đương nhiên rồi.\nAnh đã coi Paulette là người yêu của anh rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「よかったぁ」
1055 = "「May quá.」"
# monologue
# JP: 嬉しげな笑み。\n一瞬瞳は僕へと戻り、またすぐパっと逸れてしまう。
1584 = "Một nụ cười vui sướng.\nĐôi mắt cô ấy thoáng nhìn tôi rồi lại vội lảng đi ngay."
# 【ポーレット】
# display as 波萊特
# JP: 「それで、あの――\n今日、わたしが、双鉄くんをおうちに誘ったのは、その」
1145 = "「Và, à thì——\nHôm nay, em rủ Soutetsu về nhà là vì, chuyện đó.」"
# monologue
# JP: ポーレットがもぞりと体を動かす。
1550 = "Paulette khẽ cựa mình."
# monologue
# JP: さっき感じたものとは別の、甘い匂いがふわりと立って、\nポーレットの眠りの匂いなのかと、ふと思う。
1318 = "Một mùi hương ngọt ngào khác với lúc nãy thoảng qua,\ntôi chợt nghĩ, phải chăng đây là mùi hương khi ngủ của Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「恋人同士がする、コト――したいって、思ったからです。\n双鉄くんとの……確かな絆が、欲しくって」
1053 = "「Vì em nghĩ là, em muốn làm chuyện... mà những người yêu nhau hay làm.\nEm muốn có... một sự gắn kết vững chắc với Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「具体的には、どんなことだ？」
954 = "「Cụ thể là chuyện gì?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええ、と――だから――せ、せ、セっ――セッ……\nその！　――い、一緒に、寝る、とか、してみた、くて」
1071 = "「À, ừm——thì là——tì, tì, tìn——tình...\nCái đó! ——Ng, ngủ cùng nhau, hay gì đó, em muốn thử.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「なんだ、そんなことか」
1049 = "「Ra là chuyện đó sao.」"
# monologue
# JP: （ごろんっ）
1769 = "（Nằm xuống）"
# monologue
# JP: 寝るなど、なにほどのことも無い。
1324 = "Ngủ cùng nhau thì có gì to tát đâu."
# monologue
# JP: そう考えて、ポーレットの隣に僕も寝転び……\n途端、自分の考え違いを思い知らされる。
1493 = "Nghĩ vậy, tôi cũng nằm xuống bên cạnh Paulette...\nNhưng ngay lập tức, tôi nhận ra mình đã nhầm."
# 【双鉄H】
# display as 雙鐵
# JP: 「いや……これは――\n確かに、恋人同士がすること、だな」
1034 = "「Không... chuyện này——\nĐúng là việc mà những người yêu nhau hay làm thật.」"
# 【ポーレット】
# display as 波萊特
# JP: 「で、ですねっ」
1114 = "「Đ, đúng không anh.」"
# monologue
# JP: ポーレットの息が頬をくすぐる。\n肌のくっつき合ってる部分が、汗ばみ具合を教えてくれる。
1568 = "Hơi thở của Paulette mơn trớn má tôi.\nPhần da thịt chạm vào nhau cho tôi biết cô ấy đang đổ mồ hôi nhiều đến mức nào."
# monologue
# JP: 隣に寝転がってるだけで、ポーレットがとても近くなる。\n縮まった距離が、ポーレットをもっと教えてくれる。
1671 = "Chỉ cần nằm cạnh nhau, tôi đã cảm thấy Paulette ở rất gần.\nKhoảng cách được thu hẹp lại giúp tôi hiểu rõ hơn về Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「れいなと寝てるときと……全然……ちがって――\nわたし、すごくドキドキしてます」
1078 = "「So với lúc ngủ cùng Reina... hoàn toàn... khác biệt——\nTim em đang đập rất nhanh.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな、僕もドキドキしている」
1120 = "「Đúng vậy, tim anh cũng đang đập rất nhanh.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そ、そうなんですか？」
1115 = "「V, vậy sao anh?」"
# monologue
# JP: （さわっ）
1752 = "（Sờ nhẹ）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1007 = "「!」"
# monologue
# JP: ポーレットの柔らかなてのひらが、\n僕の胸板にそうっと触れる。
1549 = "Bàn tay mềm mại của Paulette\nkhẽ khàng chạm vào ngực tôi."
# monologue
# JP: 左胸を柔らかなてのひらで擦られ押さえられれば、\n男の僕の――乳首が、固くなってしまう。
1655 = "Bị bàn tay mềm mại ấy xoa nắn và ấn lên ngực trái,\nnúm vú của một thằng đàn ông như tôi——bỗng trở nên cứng lại."
# 【ポーレット】
# display as 波萊特
# JP: 「ほんと……双鉄くん、すごく、ドキドキ、してますね」
1169 = "「Thật này... Soutetsu, tim anh, đang đập, rất nhanh nhỉ.」"
# monologue
# JP: （さすっ――さすっ）
1750 = "（Xoa xoa——xoa xoa）"
# 【双鉄H】
# display as 雙鐵
# JP: 「～っ！」
984 = "「~っ!」"
# monologue
# JP: おかしな声を出しそうで、喉の深くで噛み潰す。
1450 = "Sợ phát ra tiếng kêu kỳ quái, tôi cố kìm nén nó lại nơi cổ họng."
# monologue
# JP: ポーレットの手のひらのゆるい蠢きは、\n僕の鼓動を確かめる、そのためだけのものじゃない。
1576 = "Chuyển động nhẹ nhàng từ lòng bàn tay Paulette,\nkhông chỉ đơn thuần là để kiểm tra nhịp tim của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: （僕の乳首を……\n意識して、手のひらで転がして弄ってるんだ）
1742 = "（Cô ấy đang cố tình...\ndùng lòng bàn tay để vờn quanh núm vú của mình.）"
# monologue
# JP: それがじわじわ、乾きを伴う快感を僕に蓄積してく。
1433 = "Điều đó từ từ tích tụ trong tôi một thứ khoái cảm đi kèm với sự khao khát."
# monologue
# JP: 心地よいのに、物足りない。\n何かが欲しくて、体の奥からむずむずしてくる。
1633 = "Rất dễ chịu, nhưng lại chưa đủ.\nCơ thể tôi râm ran từ sâu bên trong, thèm khát một thứ gì đó."
# 【ポーレット】
# display as 波萊特
# JP: 「……わたしも、ドキドキ――して……ます、よ？」
762 = "「...Tim em, cũng——đang đập... rất nhanh, đấy?」"
# monologue
# JP: (もぞっ）
37 = "(Cựa quậy）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
988 = "「!」"
# monologue
# JP: ポーレットの真っ白な指先が、ふるふる小さく震えつつ、ゆっくりゆっくり不器用に、上着の前を開けていく。
1563 = "Những ngón tay trắng ngần của Paulette khẽ run rẩy, chậm rãi, lóng ngóng cởi bỏ cúc áo ngoài."
# monologue
# JP: すぐいっぱいいっぱいになってしまう、あのポーレットが、\n僕を導くそのためだけに、恥ずかしさに耐えてくれている。
1556 = "Một Paulette luôn dễ dàng ngượng ngùng đỏ mặt,\nnay lại đang cố nén sự xấu hổ chỉ để dẫn dắt tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「そうなの、か」
1122 = "「Vậy, sao.」"
# monologue
# JP: ならば、ためらう理由などない。\nためらってなどいられない。
1663 = "Nếu vậy thì chẳng có lý do gì để chần chừ.\nCũng không thể chần chừ thêm được nữa."
# monologue
# JP: ピンクの可愛いブラジャー越しにも見て取れる、\n固くなってる乳首を目当に、手のひらをそっと下ろしてく。
1667 = "Nhắm vào núm vú đang cương cứng có thể nhìn thấy rõ qua lớp áo lót màu hồng dễ thương,\ntôi nhẹ nhàng đặt bàn tay xuống."
# monologue
# JP: （ふわっ）
1770 = "（Nhẹ nhàng）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふぁっ」
987 = "「Phá.」"
# monologue
# JP: 甘やかな声。\n鼓膜から脳を溶かされる。
1404 = "Một giọng nói ngọt ngào.\nLàm tan chảy màng nhĩ và lan tỏa đến tận não bộ."
# monologue
# JP: だが、それ以上に手のひらが――
1328 = "Nhưng hơn thế nữa, cảm giác từ lòng bàn tay——"
# 【双鉄H】
# display as 雙鐵
# JP: 「すごい……な――」
1061 = "「Tuyệt thật... đấy——」"
# monologue
# JP: （さすっ――ふにゅっ――）
# 1750 = "（摸來摸去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ん……ふっ……は、い――こんなに、\nドキドキ――するの――はじめ、てっ……んふっ」
1026 = "「Ưm... phù... v, âng——Tim đập,\nnhanh——thế này——là lần đầu, tiên... ưm phù.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「鼓動も、確かにすごいのだが――」
1075 = "「Nhịp tim, quả thực đập rất mạnh——」"
# monologue
# JP: （むみゅっ――もみゅっ――）
1748 = "（Nắn nắn——nắn nắn——）"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁ……あっ――んっ……きもち……いい……よぉ」
986 = "「Hà... á——ưm... sướng... lắm... anh.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ」
1039 = "「A.」"
# monologue
# JP: ポーレットの声にハっとして、同時に深く安堵する。
1573 = "Giọng nói của Paulette làm tôi giật mình, đồng thời cũng thở phào nhẹ nhõm."
# monologue
# JP: いつの間に、手のひらの動きが変わってた。\nさするではなく、揉むに、変わらざるを得ないほど――
1466 = "Không biết từ lúc nào, chuyển động của bàn tay tôi đã thay đổi.\nTừ xoa vuốt chuyển sang nắn bóp, đến mức không thể không thay đổi——"
# 【双鉄H】
# display as 雙鐵
# JP: 「すごいのは、ポーレットのおっぱいだ。\nこれほど、柔らかく……手を幸せにするものなのか」
939 = "「Tuyệt vời là bộ ngực của Paulette kìa.\nKhông ngờ lại mềm mại... và mang đến cảm giác hạnh phúc cho đôi bàn tay đến vậy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「う……嬉しい、です……わたしの、おっぱい――\n双鉄、くんに……気にいって、もらえ、て……んっ」
1081 = "「Ư... em vui, lắm... ngực của, em——\nđược Soutetsu, thích... như vậy... ưm.」"
# monologue
# JP: （むにっ――むりゅんっ）
1720 = "（Nắn bóp——nắn bóp）"
# monologue
# JP: ポーレットから、胸を押し付けてきてくれる。
1547 = "Paulette chủ động ép ngực sát vào tôi."
# monologue
# JP: それが嬉しくて体が熱くてもっと欲しくて、\n僕の動きも大胆になる。
1392 = "Điều đó khiến tôi vui sướng, cơ thể nóng ran và khao khát nhiều hơn nữa,\nđộng tác của tôi cũng trở nên bạo dạn hơn."
# monologue
# JP: （すっ――くりゅっ！）
1759 = "（Miết——xoay!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んんふっ！　ちょく、せつっ――あっ――すごいっ」
1041 = "「Ưm phù! Trực, tiếp——á——tuyệt quá.」"
# monologue
# JP: （くりっ――くにゅっ）
# 1759 = "（用力揉搓）" 
# monologue
# JP: ブラの上から手を触れて、\n乳首を指でさすり転がす。
1482 = "Tôi chạm tay qua lớp áo lót,\ndùng ngón tay xoa nắn và vờn quanh núm vú."
# monologue
# JP: 心地よさを強く感じる程に、\n欲望も膨れて来てしまう。
1636 = "Cảm giác sung sướng càng mãnh liệt,\ndục vọng trong tôi cũng càng căng phồng."
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット。\n僕は、君の裸を――おっぱいを見たい」
1134 = "「Paulette.\nAnh muốn nhìn thấy cơ thể trần trụi của em——muốn nhìn ngực em.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、ですよね。\n双鉄くん、そう言ってくれてたのに――」
1047 = "「A, đúng rồi nhỉ.\nSoutetsu đã nói vậy mà——」"
# monologue
# JP: ブラに手をかけ……\nポーレットはそこで止まってしまう。
1555 = "Tay chạm vào áo lót...\nPaulette bỗng khựng lại."
# monologue
# JP: だけれどすぐに、その手はブラを引き下ろし――
1327 = "Nhưng ngay sau đó, đôi tay ấy kéo áo lót xuống——"
# monologue
# JP: （ぽろんっ）
1744 = "（Bật ra）"
# 【双鉄H】
# display as 雙鐵
# JP: 「……綺麗だ――」
761 = "「...Đẹp quá——」"
# monologue
# JP: その言葉しか出てこない。\n言葉は出ないが、手指はすぐさま伸びていく。
1451 = "Tôi chỉ thốt lên được mỗi câu đó.\nDù không nói nên lời, nhưng những ngón tay lại lập tức vươn tới."
# monologue
# JP: （もみゅっ）
1747 = "（Nắn nắn）"
# 【ポーレット】
# display as 波萊特
# JP: 「あんっ――」
996 = "「A——」"
# monologue
# JP: 抜けるような白、とはこのことだ。
1609 = "Trắng đến mức chói lóa, chính là đây."
# monologue
# JP: ポーレットの肌は真っ白すぎて、\n突起のピンクをあまりにもやらしく際立たせる。
1574 = "Làn da của Paulette quá đỗi trắng ngần,\nlàm nổi bật sắc hồng của nụ hoa một cách đầy khiêu gợi."
# monologue
# JP: （もみっ――もみゅっ――くりゅっ――ふにゅっ）
# 1748 = "（揉來揉去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「あ……んっ……ふっ――ん――そうてつ、くんっ――\nおっぱい――大好き、なん、です……ね」
1002 = "「A... ưm... phù——ưm——Soutetsu, này——\nAnh rất, thích... ngực... nhỉ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「かもしれん。\nというか、ポーレットのおっぱいが最高すぎるのだ」
932 = "「Có lẽ vậy.\nĐúng hơn là vì ngực của Paulette quá tuyệt vời.」"
# monologue
# JP: （もみゅ、もにゅっ、むにっ――くにゅんっ！）
# 1748 = "（揉來揉去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ！」
980 = "「Hyau!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「おっぱい自身も素晴らしいが、この勃起した乳首がいい。\n柔らかさの中、アクセントとなる感触が――」
935 = "「Bản thân bầu ngực đã rất tuyệt, nhưng núm vú đang cương cứng này lại càng tuyệt hơn.\nCảm giác như một điểm nhấn giữa sự mềm mại——」"
# 【ポーレット】
# display as 波萊特
# JP: 「そう……なんです、か？」
1121 = "「Vậy... sao anh?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
983 = "「!」"
# monologue
# JP: 潤みまくってるポーレットの目が、温度を帯びる。\nその左手が、おずおずと、僕の体を這い下がっていく。
1553 = "Đôi mắt ướt át của Paulette dần ánh lên ngọn lửa.\nBàn tay trái của cô ấy rụt rè mơn trớn xuống phía dưới cơ thể tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「ぼ、勃起に、おててで触れるのって……\nそんなに、素敵な――感触、ですか？」
1148 = "「D, dùng tay chạm vào chỗ đang cương cứng...\nCảm giác, tuyệt vời——đến thế sao anh?」"
# monologue
# JP: （さすっ）
# 1752 = "（撫摸）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「っっ！！？」
1008 = "「!!?」"
# monologue
# JP: （びゅくっ！！！！）
1739 = "（Giật nảy!!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？」
982 = "「Á!?」"
# monologue
# JP: 背筋から脳が一気に弾け、\n全てが白に塗りつぶされる。
1350 = "Khoái cảm bùng nổ từ sống lưng lên tận não bộ,\nmọi thứ trước mắt tôi trở nên trắng xóa."
# monologue
# JP: （どくっ――どくっ――）
1738 = "（Phụt——phụt——）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……くっ」
1027 = "「Ưm... hự.」"
# monologue
# JP: ズボンの上から触れた手を、\nポーレットは驚きのあまりか引っ込めて――
1551 = "Bàn tay vừa chạm qua lớp quần,\nPaulette vội vàng rụt lại vì quá ngạc nhiên——"
# 【双鉄H】
# display as 雙鐵
# JP: 「え？」
992 = "「Hả?」"
# monologue
# JP: （ちぃ……ぃっ）
1754 = "（Xoạch...）"
# monologue
# JP: ――その手は、すぐに股間に戻されて、\n僕のジッパーを開いてく。
1595 = "——Bàn tay ấy ngay lập tức quay lại phần hạ bộ,\nvà kéo khóa quần tôi xuống."
# monologue
# JP: 真っ赤な顔で、汗をかき、\nけどポーレットは、少しも指を休めはしない。
1565 = "Khuôn mặt đỏ bừng, nhễ nhại mồ hôi,\nnhưng những ngón tay của Paulette không hề dừng lại một chút nào."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし、いきなり触っちゃったから。双鉄くん、\nびっくりして射精、きっとしちゃったんですね」
1052 = "「Tại em tự dưng chạm vào. Nên Soutetsu,\nchắc hẳn đã giật mình và xuất tinh rồi nhỉ.」"
# monologue
# JP: ひどく、申し訳無さそうな声。
1400 = "Một giọng nói vô cùng hối lỗi."
# monologue
# JP: 体の快感が強すぎて、どこかぼんやりしている脳が、\n言われたことを、ゆっくりゆっくり理解していく。
1425 = "Khoái cảm cơ thể quá mãnh liệt khiến não bộ tôi có chút mông lung,\ntừ từ, chậm rãi tiếp thu những lời cô ấy vừa nói."
# 【双鉄H】
# display as 雙鐵
# JP: （そうか……射精か――\n僕は、ポーレットに触れられることで、射精をしたのか）
1727 = "（Ra vậy... xuất tinh sao——\nMình đã xuất tinh, chỉ vì được Paulette chạm vào à.）"
# 【ポーレット】
# display as 波萊特
# JP: 「下着の中、きっとぐちゅぐちゅで気持ち悪いですよね。\nわたし、ちゃあんときれいきれいにしますから」
950 = "「Bên trong đồ lót, chắc hẳn đang nhóp nhép khó chịu lắm nhỉ.\nEm sẽ làm sạch sẽ cẩn thận cho anh.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「う、む」
# 1039 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「あっ」
# 1005 = "「啊」" 
# monologue
# JP: ポーレットに、汚れた勃起をきれいきれいにしてもらう。
1558 = "Tôi để Paulette làm sạch dương vật đã vấy bẩn của mình."
# monologue
# JP: 想像が勃起に硬度を戻すのと、ポーレットの手での解放と\n――タイミングが見事に一致した。
1345 = "Trí tưởng tượng khôi phục lại độ cương cứng của dương vật, cùng lúc với sự giải phóng từ bàn tay Paulette\n——Hai khoảnh khắc trùng khớp nhau một cách hoàn hảo."
# 【ポーレット】
# display as 波萊特
# JP: 「すごい……元気……それに、おっきい……」
1063 = "「Thật là... sung mãn... hơn nữa, còn lớn quá...」"
# monologue
# JP: すん、すんと、ポーレットが鼻を鳴らす。\nそうしてわずかに唇を舐め――
1561 = "Paulette khịt khịt mũi ngửi.\nSau đó cô ấy khẽ liếm môi——"
# 【ポーレット】
# display as 波萊特
# JP: 「きれいきれいにしやすいように、ね？　双鉄くん、\n膝立ちになってくれますか？」
1139 = "「Để dễ dàng làm sạch hơn nhé? Soutetsu,\nanh có thể quỳ gối lên được không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
1058 = "「Được.」"
# monologue
# JP: 促されるまま、ポーレットの横に膝立ちになる。
1379 = "Nghe theo lời giục, tôi quỳ gối bên cạnh Paulette."
# monologue
# JP: そうしてみれば僕の勃起は、\nポーレットの唇にほとんど触れそうになってしまう。
1661 = "Tư thế này khiến dương vật của tôi\ngần như chạm vào môi Paulette."
# 【双鉄H】
# display as 雙鐵
# JP: 「これ、は――」
1165 = "「Thế này, là——」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。今からわたし……ええと、おくち、で……\n双鉄くんのおちん、ちん。きれいきれいにします、けど」
1036 = "「Vâng. Bây giờ em sẽ... à ừm, dùng miệng... để làm sạch,\ncho cậu nhỏ của Soutetsu, nhưng mà.」"
# monologue
# JP: また唇を軽く舐め、\n青い瞳は、まっすぐ僕を見つめてくれる。
1401 = "Cô ấy lại khẽ liếm môi,\nđôi mắt xanh biếc nhìn thẳng vào tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「また……その、しゃ、射精……したく、なったら――\nその前、に――早めに、教えてください、ね？」
1068 = "「Nếu anh lại... muốn, x, xuất tinh... nữa thì——\nTrước lúc đó——hãy báo cho em biết, sớm một chút, nhé?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「わかった」
1066 = "「Anh hiểu rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そ……それじゃあ、きれい、きれいに――します――\n……………………ぺろっ」
1171 = "「V... Vậy thì, em sẽ làm sạch, sẽ làm sạch——\n........................liếm.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
# 1005 = "「啊」" 
# monologue
# JP: 舐めた。ポーレットの舌先が、\n精液にまみれまくってる、僕の勃起の先端を。
1580 = "Liếm rồi. Đầu lưỡi của Paulette,\nđang liếm lấy phần đỉnh dương vật dính đầy tinh dịch của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――ふっ――んっ――れろっ――れるっ――\nんっ――ちゅっ――ちゅるるっ――ちゅぞおおおおっ」
1019 = "「Ưm——phù——ưm——liếm——liếm——\nưm——chụt——chùn chụt——chuút.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぅ――あっ――あっ」
993 = "「Ư——a——a.」"
# monologue
# JP: 膝立ちになってる膝から太もも、\n腰にかけてが、ガクガク大きく震えてしまう。
1637 = "Từ đầu gối đang quỳ, dọc theo đùi,\ncho đến hông tôi đều run lên bần bật."
# monologue
# JP: ポーレットは舌で精液をこそげとり、\nそれを尖らせた唇で、愛おしそうに吸い取ってくれる。
1559 = "Paulette dùng lưỡi vét lấy tinh dịch,\nrồi chu môi hút lấy một cách đầy âu yếm."
# 【ポーレット】
# display as 波萊特
# JP: 「じゅッ――じゅるるっ――んっ――\nれろっ――れるっ――じゅるるうっ――こくんっ」
1010 = "「Chụt——chùn chụt——ưm——\nliếm——liếm——chùn chụt——ực.」"
# 【双鉄H】
# display as 雙鐵
# JP: （飲ん、で、る――ポーレットが……\n僕の勃起に、こびりついたような精液を）
1732 = "（Cô ấy đang, uống——Paulette đang...\nuống lấy thứ tinh dịch bám trên dương vật của mình.）"
# monologue
# JP: 視界が、理解が、僕の体温を一気にあげる。
1473 = "Hình ảnh đó, nhận thức đó, khiến nhiệt độ cơ thể tôi tăng vọt."
# monologue
# JP: 勃起はビクビク動いてしまい、ポーレットの舌を唇を、\n擦っては強い快感を僕へとフィードバックする。
1624 = "Dương vật giật giật, cọ xát vào môi và lưỡi của Paulette,\nphản hồi lại cho tôi một khoái cảm mãnh liệt."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……む～～っ――――はぷっ！」
1028 = "「Ưm... ưm~~――――ngoạm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！！」
995 = "「!!!」"
# monologue
# JP: それが舐めづらさに繋がったのか、\nポーレットは焦れたような声を出し。
1562 = "Không biết có phải vì thế mà khó liếm hơn không,\nPaulette phát ra tiếng kêu như đang sốt ruột."
# monologue
# JP: 僕の勃起の先端をその唇でぱくりと掴まえ――
1594 = "Cô ấy ngậm trọn phần đỉnh dương vật của tôi bằng đôi môi ấy——"
# 【ポーレット】
# display as 波萊特
# JP: 「はぷっ――れるっ――れろっ――じゅっ――\nじゅるっ――じゅぷっ――じゅうっ――こくっ」
1012 = "「Ngoạm——liếm——liếm——chụt——\nchụt——chùn chụt——chuút——ực.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ――あっ――あっ――」
997 = "「A——a——a——」"
# monologue
# JP: 唇と舌が動き回って、口内がすぼまり吸引される。\n快感が強くて勃起が裏返りそうな気がして――
1394 = "Môi và lưỡi không ngừng di chuyển, khoang miệng thu hẹp lại và mút mát.\nKhoái cảm quá mạnh mẽ khiến tôi có cảm giác dương vật như bị lộn ngược——"
# 【双鉄H】
# display as 雙鐵
# JP: （いやっ――）
1725 = "（Khoan đã——）"
# monologue
# JP: そうだった。\nポーレットにそうしてくれと、頼まれていた。
1461 = "Đúng rồi.\nPaulette đã nhờ tôi làm vậy."
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット……僕は――射精――しそう」
1133 = "「Paulette... anh——sắp——xuất tinh rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ」
# 1005 = "「啊」" 
# monologue
# JP: （ぱっ！）
1728 = "（Phụt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「え！？」
991 = "「Hả!?」"
# monologue
# JP: 射精しそうと伝えた瞬間、\nポーレットは口から僕の勃起を解放してしまう。
1376 = "Khoảnh khắc tôi báo sắp xuất tinh,\nPaulette liền nhả dương vật của tôi ra khỏi miệng."
# 【ポーレット】
# display as 波萊特
# JP: 「あの、ええと、違うんです！　双鉄くん」
1176 = "「À, ừm, không phải đâu! Soutetsu.」"
# monologue
# JP: どんな顔を、僕はしてしまってたのだろうか？
1478 = "Rốt cuộc tôi đã trưng ra vẻ mặt như thế nào vậy?"
# monologue
# JP: ポーレットは慌てたように、申し訳無さそうに、\n早口の言葉を重ねてくる。
1554 = "Paulette trông có vẻ luống cuống, vẻ mặt đầy hối lỗi,\nliên tục nói liến thoắng."
# 【ポーレット】
# display as 波萊特
# JP: 「お口の中に出してもらって、飲んだりも、わたし、\nすごくしたいし、してほしいって思ってます。けど」
1092 = "「Em rất muốn anh xuất tinh vào trong miệng em, em cũng rất muốn uống nó,\nthực sự rất muốn. Nhưng mà.」"
# monologue
# JP: （するっ）
1764 = "（Tuột）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
# 1005 = "「啊」" 
# monologue
# JP: 言いながら、ポーレットがパンツを脱ぎ捨てる。
1384 = "Vừa nói, Paulette vừa cởi phăng chiếc quần lót."
# monologue
# JP: 生々しい赤を湛えた肉の割れ目が、\n僕の視界に飛び込んでくる。
1365 = "Rãnh thịt ngập tràn sắc đỏ tươi sống động,\nđập thẳng vào tầm mắt tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「初めて……一番最初は。双鉄くんの、そのっ……精、子。\n双鉄くんの分身を、子宮に、わたし、もらいたいんです」
1178 = "「Lần đầu tiên... ngay từ lần đầu tiên. Em muốn nhận lấy... t, tinh trùng của Soutetsu.\nEm muốn đón nhận phân thân của Soutetsu, vào trong tử cung của em.」"
# monologue
# JP: 精子を、子宮に。\nつまりは、それは――
1646 = "Đưa tinh trùng, vào tử cung.\nNói cách khác, đó là——"
# 【双鉄H】
# display as 雙鐵
# JP: 「セックス、か」
941 = "「Làm tình, sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、わたし。\n双鉄くんと、セックスしたいって思っています」
1123 = "「Vâng. Em.\nEm muốn làm tình với Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「僕もだ」
1084 = "「Anh cũng vậy.」"
# monologue
# JP: 不安も戸惑いも欲望も。\nもっと純粋で大きな気持ちに、一瞬にして押し流される。
1319 = "Bất an, bối rối hay dục vọng.\nTất cả đều bị cuốn phăng đi trong chốc lát bởi một thứ cảm xúc thuần khiết và to lớn hơn."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕は、ポーレットが大好きだから。\nポーレットとひとつになりたい。セックス、したい」
1089 = "「Vì anh rất yêu Paulette.\nAnh muốn hòa làm một với em. Anh muốn làm tình.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい！　双鉄くん」
1044 = "「Vâng! Soutetsu.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「しかし……具体的には、どうすれば」
974 = "「Nhưng mà... cụ thể thì, phải làm thế nào.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1005 = "「啊」" 
# monologue
# JP: ポーレットはまっすぐ僕をみて、\nそうして深く、ひとつ頷く。
1578 = "Paulette nhìn thẳng vào tôi,\nrồi gật đầu một cái thật sâu."
# 【ポーレット】
# display as 波萊特
# JP: 「わ、わたし……一般常識レベルのことは、\n多分……最低限、知ってる、かなって、思います、から」
1082 = "「E, em... những chuyện ở mức độ kiến thức phổ thông thì,\nchắc là... em nghĩ là em biết được, mức tối thiểu.」"
# monologue
# JP: ポーレットの手が、僕を導く。
1548 = "Bàn tay Paulette dẫn dắt tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「解説、できると思います、から……あんよ――\nわたしのあんよ、こうして、おさえてくれますか？」
1096 = "「Em nghĩ là em có thể giải thích được... Chân em——\nAnh giữ chân em, như thế này được không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ――こうか？」
1024 = "「Ừm——thế này à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「それで……んっ――このまま、支えて、ください。\nごめんなさい、わたし、からだ……固く、って」
1144 = "「Sau đó... ưm——cứ giữ nguyên thế này, nhé anh.\nXin lỗi anh, cơ thể em... hơi cứng.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや――」
930 = "「Không đâu——」"
# monologue
# JP: ポーレットのぷにぷにボディは、\n問答無用で柔らかい。
1581 = "Cơ thể mềm mại, núng nính của Paulette,\nkhông cần phải bàn cãi là rất mềm."
# monologue
# JP: ストレッチ的な意味で固いとしても、\nそれはまったくマイナス要素となりはしない。
1418 = "Dù có cứng nhắc theo nghĩa độ dẻo dai của cơ thể,\nthì đó cũng hoàn toàn không phải là điểm trừ."
# 【双鉄H】
# display as 雙鐵
# JP: 「僕は、嬉しい。ポーレットの体が固いおかげで、\nこんなに綺麗な姿を、目近に見られるのだから」
1095 = "「Anh thấy vui lắm. Nhờ cơ thể Paulette hơi cứng,\nmà anh mới có thể nhìn thấy dáng vẻ xinh đẹp này ở khoảng cách gần đến thế.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……」
1185 = "「Soutetsu...」"
# monologue
# JP: ぽ～っと、ポーレットの頬の赤みが増して――？
1566 = "Đôi má Paulette ngày càng ửng đỏ——?"
# monologue
# JP: （とろっ――）
1755 = "（Rỏ xuống——）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ」
977 = "「Á.」"
# monologue
# JP: ポーレットの股間――女性器からは、\n蜜がこぷりと溢れて太ももへとつたう。
1577 = "Từ vùng kín của Paulette——từ bộ phận sinh dục nữ,\nmật ngọt trào ra và chảy dài xuống đùi."
# 【双鉄H】
# display as 雙鐵
# JP: 「すごいな……これほど、濡れるものなのか」
1062 = "「Tuyệt thật... ướt át đến nhường này cơ à.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ…………うん。はい。\n濡れるんです、わたしの――おんなのこの、おまんこは」
1000 = "「A............ vâng. Đúng vậy.\nNó sẽ ướt đấy, của em——âm đạo của, con gái.」"
# monologue
# JP: 緊張してるのか、硬い声で。\nけれども強さを感じる口調で。
1618 = "Không biết có phải do căng thẳng không, mà giọng cô ấy nghe hơi cứng nhắc.\nNhưng lại mang một ngữ điệu toát lên sự mạnh mẽ."
# monologue
# JP: ポーレットは僕に、おんなのこのことを教えてくれる。
1557 = "Paulette đang dạy cho tôi biết về cơ thể con gái."
# 【ポーレット】
# display as 波萊特
# JP: 「割れ目の、外の唇みたいな……大陰唇を、\n双鉄くん――双鉄くんの指で、広げてください」
1111 = "「Ở rãnh nứt, cái chỗ giống như môi bên ngoài ấy... môi lớn,\nSoutetsu——anh hãy dùng ngón tay, vạch nó ra đi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ」
# 1039 = "「嗯」" 
# monologue
# JP: （くぱあっ）
1763 = "（Vạch ra）"
# monologue
# JP: 赤。だ。\n赤い。
1639 = "Đỏ. Là màu đỏ.\nĐỏ chót."
# monologue
# JP: 肉の色。内臓の色。\nポーレットの剥き出しの色が、僕を迎える。
1660 = "Màu của da thịt. Màu của nội tạng.\nMàu sắc trần trụi của Paulette đang chào đón tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「くぱくぱ……ひくついちゃってる、ところ……が……\n双鉄くんが……おちんちん、挿れる……専用の、場所っ」
926 = "「Cái chỗ... đang mấp máy, co giật đó...\nlà nơi, dành riêng... để Soutetsu... đút dương vật vào.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ここに――か」
1166 = "「Ở đây——sao.」"
# monologue
# JP: 指で触れることさえもったいないような気がして、\n勃起の先を、教えられた場所へと押し当ててみる。
1479 = "Cảm thấy chạm bằng ngón tay thì thật uổng phí,\ntôi thử ấn đầu dương vật đang cương cứng vào vị trí vừa được chỉ."
# monologue
# JP: （くぷっ）
1740 = "（Phập）"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁんっ！」
# 1007 = "「啊！」" 
# monologue
# JP: 勃起の先が呑まれるような、吸われるようなフィット感。\nその瞬間に、理解する。
1316 = "Cảm giác vừa vặn như thể đầu dương vật đang bị nuốt chửng, bị hút vào.\nNgay khoảnh khắc đó, tôi đã hiểu."
# monologue
# JP: 専用といった言葉のとおり、ポーレットは僕を――\n僕の全てを、ここで受け入れてくれるのだ。
1502 = "Đúng như từ \"dành riêng\", Paulette sẽ đón nhận tôi——\nđón nhận mọi thứ của tôi, tại chính nơi này."
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット」
1135 = "「Paulette.」"
# monologue
# JP: （ずっ――ズッ――）
1766 = "（Tiến vào——tiến vào——）"
# monologue
# JP: 欲しい。ポーレットの全てが欲しい。\n僕の全てを、ポーレットに受け止めてもらいたい。
1460 = "Khao khát. Tôi khao khát mọi thứ của Paulette.\nTôi muốn Paulette đón nhận mọi thứ của tôi."
# monologue
# JP: 勃起の先が震えに震えて、くっつき合ってる部分から、\n欲望を増幅させる快感を流し込んでくる。
1625 = "Đầu dương vật run lên bần bật, từ nơi tiếp xúc,\nmột khoái cảm khuếch đại dục vọng tuôn trào."
# 【ポーレット】
# display as 波萊特
# JP: 「っ――んっ――双鉄くん――双鉄――くぅん」
1022 = "「Ư——ưm——Soutetsu——Soutetsu——」"
# monologue
# JP: ぱくぱくあえぐ唇がとてもかわいくて、\n体を折り曲げ、むさぼるようなキスをする。
1395 = "Đôi môi mấp máy thở dốc trông vô cùng đáng yêu,\ntôi cúi người xuống, trao cho cô ấy một nụ hôn ngấu nghiến."
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――はっ――あっ――ンムッ――ちゅっ――\nチュうっ――むちゅっ――ん、はっ」
1017 = "「Ưm——hà——a——ưm——chụt——\nchuút——chùn chụt——ưm, hà.」"
# monologue
# JP: キスを解けば、ポーレットの体のぽかぽかさと\n柔らかさとが増している。
1446 = "Khi nụ hôn kết thúc, cơ thể Paulette dường như\ncàng thêm ấm áp và mềm mại hơn."
# monologue
# JP: 繋がっている部分はきゅんきゅんわなないて、\n僕をその内へ導こうとして、せいいっぱいに震えてる。
1388 = "Phần kết nối co bóp liên hồi,\nrun rẩy hết sức như muốn dẫn dắt tôi tiến sâu vào trong."
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット――、一つに――僕と、ひとつに」
1138 = "「Paulette——, hãy hòa làm một——hòa làm một với anh nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい――双鉄、くんっ――わたし――わたし――をっ」
1057 = "「Vâng——Soutetsu, này——em——em——này」"
# monologue
# JP: とても柔らかでぬかるんでいるポーレットのおまんこは、\nそうありながらも、固く強張った部分を残してる。
1575 = "Âm đạo của Paulette dù đã trở nên vô cùng mềm mại và ướt át,\nnhưng vẫn còn vương lại một phần thắt chặt, cứng nhắc."
# monologue
# JP: そこにじわじわ押し入られていく痛みにか、\nポーレットの声はとぎれとぎれで――
1571 = "Có lẽ vì nỗi đau khi bị tôi chầm chậm chen vào nơi đó,\nmà giọng nói của Paulette đứt quãng từng hồi——"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしを――もらって――んっ――双鉄、くんの――\nおよめ、さん、に――して――くださいっ――んっ」
1109 = "「Xin hãy——đón nhận em——ưm——Soutetsu, này——\nHãy cho em——làm——cô dâu, của anh——nhé——ưm.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット！」
1136 = "「Paulette!」"
# monologue
# JP: 涙をふちにいっぱいためた目で微笑まれ、\n愛おしさと欲とが混じってふくれ弾けるっ！
1570 = "Cô ấy mỉm cười với đôi mắt rưng rưng ngấn lệ,\nkhiến tình yêu thương và dục vọng trong tôi hòa quyện rồi bùng nổ!"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁぁあああああああああああっっっ！！！」
1006 = "「Aaaaaaaaaaaa!!!」"
# monologue
# JP: 抵抗を破った瞬間に、\n腰が一気に動き進んで、一番奥まで止まらなくなる！
1375 = "Khoảnh khắc phá vỡ được rào cản,\nhông tôi lao thẳng một mạch vào tận sâu bên trong không thể dừng lại!"
# monologue
# JP: （ごりゅ！）
1724 = "（Đâm phập!）"
# 【ポーレット】
# display as 波萊特
# JP: 「かっ――はっ――あっ――ふ、深い……ぃっ」
985 = "「Hà——hà——a——s, sâu quá... anh.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぉっ――ぅ」
# 996 = "「啊——」" 
# monologue
# JP: 勃起が、溶けてめくれた気がする。
1463 = "Tôi có cảm giác dương vật của mình như đang tan chảy và bị lộn ngược ra."
# monologue
# JP: それほどポーレットのおまんこの中は、\nぬかるみながら密着し、僕をきゅうきゅう締めてくる。
1564 = "Bên trong âm đạo của Paulette ướt át, trơn trượt,\nnhưng lại bám chặt lấy và siết chặt tôi đến nhường nào."
# 【ポーレット】
# display as 波萊特
# JP: 「はい……って、るっ――んっ――熱い、のっ――\n双鉄、くんっ――のっ――全部――あっ――わたし、に」
1167 = "「Vào... rồi, này——ưm——nóng, quá——\nCủa Soutetsu, này——vào hết——á——trong em, rồi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……僕たちは――ひとつに、なってる」
1030 = "「Ừm... Chúng ta——đang hòa làm một.」"
# monologue
# JP: （きゅっ――みゅむっ――）
1760 = "（Siết chặt——co bóp——）"
# monologue
# JP: とまっているのに、ぞわぞわと、\nポーレットのおまんこが甘くざわめく。
1495 = "Dù tôi đang đứng yên, nhưng âm đạo của Paulette\nvẫn râm ran, xôn xao một cách ngọt ngào."
# monologue
# JP: つながっている一秒ごとに、\nざわめきは強く、大きくなってく。
1670 = "Cứ mỗi giây trôi qua trong trạng thái gắn kết,\nsự xôn xao ấy lại càng mạnh mẽ và mãnh liệt hơn."
# 【ポーレット】
# display as 波萊特
# JP: 「そう、てつ――く、んっ――あっ――んっ――\n双鉄、くんっ」
1183 = "「Sou, tetsu——này——á——ưm——\nSoutetsu, này.」"
# monologue
# JP: 言葉と、気持ちを僕にぶつける。\nまっすぐ、ひたすらまっすぐに。
1397 = "Cô ấy trút những lời nói và cảm xúc vào tôi.\nMột cách trực diện, vô cùng trực diện."
# monologue
# JP: 照れず、怖じずに――
1389 = "Không hề e thẹn, cũng chẳng hề sợ hãi——"
# 【ポーレット】
# display as 波萊特
# JP: 「わたし、おま……ん、こ……もう……\n大丈夫、かも……な、感じ――んっ――だからっ」
1099 = "「Em, âm... đạo... chắc là...\nổn rồi... cảm giác, thế——ưm——nên là.」"
# monologue
# JP: ――それでも恥じらいは失くしきらずに、\nポーレットは僕に、許しをくれる。
1583 = "——Dù vậy vẫn không đánh mất đi vẻ thẹn thùng,\nPaulette đã cho phép tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「だからッ――ん、動い、て……あ……\n双鉄、くん、を――わたし、の――なか――んきゅっ！」
1106 = "「Nên là——ưm, hãy di, chuyển... a...\nSoutetsu, này——bên trong, em——ưm, đi anh!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ！」
1042 = "「Ừm!」"
# monologue
# JP: （ずるううううううううっ！！）
1774 = "（Rút ra——đâm vào!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃうっ！　ひゃっ――あっ――」
981 = "「Á! Hya——a——」"
# monologue
# JP: （ずぶううう――すぱんっ！）
1730 = "（Đâm phập——chát!）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃふっ――ひゃっ――押され、てっ――んうっっ」
989 = "「Á——hya——bị ấn, vào——ưm.」"
# monologue
# JP: （ごりっ！　ぐっ！　ぐううっ！　ぐみゅっ！）
1758 = "（Phập! Hự! Phập phập! Phập!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ――あっ――子宮っ――子宮、に――キスっ――\nふああっ！！！」
976 = "「Hya——á——tử cung——vào, tử cung——bị hôn——\nphá!!!」"
# monologue
# JP: もうパンパンに膨らんでいる。\n精液が、今にも出たくて荒れ狂ってる。
1469 = "Dương vật của tôi đã căng phồng đến cực hạn.\nTinh dịch đang điên cuồng muốn tuôn trào ngay lập tức."
# monologue
# JP: それでもお尻を必死にしめて、小刻みすぎる動きで子宮に、\n勃起の先端を押し当てていく。
1475 = "Dù vậy tôi vẫn cố gắng siết chặt mông, dùng những chuyển động nhấp nhô thật nhỏ\nđể ép đầu dương vật vào tử cung của cô ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「ぐりって――うれし、いっ――スタンプ――\n双鉄くんの――ものって――わたしっ――んっ」
1157 = "「Bị cọ xát——vui, quá——như bị đóng dấu——\nlà đồ của——Soutetsu——em ấy——ưm.」"
# monologue
# JP: （ちゅうううっ！）
1722 = "（Mút chặt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っく！」
994 = "「Hự!」"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃふうううううううっっっ！！！」
979 = "「Kyaaaaaaa!!!」"
# monologue
# JP: 子宮の口が、僕を求めて動いてくれた。\nポーレットの心も体も、一緒に僕を欲してくれた。
1410 = "Cổ tử cung đang chuyển động đòi hỏi tôi.\nCả tâm hồn lẫn thể xác của Paulette đều đang khao khát tôi."
# monologue
# JP: それが嬉しくて心が緩んで、\n精液が、ギリギリまでこみ上げてくる。
1497 = "Niềm vui sướng đó khiến tâm trí tôi buông lỏng,\ntinh dịch đã dâng trào đến mức giới hạn."
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット！　ポーレット！　ポーレット！」
1137 = "「Paulette! Paulette! Paulette!」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんっ――っ――あっ――好きっ！　すきぃっ！」
1184 = "「Soutetsu——này——á——yêu anh! Yêu anh lắm!」"
# monologue
# JP: （ずびゅっ！　じゅぶっ！　じゅぼっ！　ばちゅんっ！）
1733 = "（Phụt! Phập! Phập! Chát!）"
# monologue
# JP: 泡立つ、溶ける。\n体が、脳が、繋がる部分が。
1653 = "Sủi bọt, tan chảy.\nCơ thể, não bộ, và cả nơi kết nối của chúng tôi."
# monologue
# JP: 愛しい気持ちが、独占欲が、\n溢れ混じってどろりとたまり、さらに水位を押し上げる。
1442 = "Tình yêu thương, ham muốn độc chiếm,\ntất cả tuôn trào, hòa quyện, đọng lại thành một thứ sền sệt, tiếp tục dâng trào mạnh mẽ."
# 【双鉄H】
# display as 雙鐵
# JP: 「射精っ――する――からっ――、一緒――、一緒、にっ」
1102 = "「Anh xuất tinh——đây——cùng nhau——cùng nhau, nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしっ！　わたし、もっ！\nイクっ――イキ、ますっ！」
1085 = "「Em! Em, cũng!\nRa——ra, mất!」"
# monologue
# JP: （きゅうううううっっっ！）
1756 = "（Siết chặt!）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 1007 = "「啊！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「いっ――ひゅううううううううううううううっっ！！！
978 = "「A——hyuuuuuuuuuuuuu!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぁ――あっ――あっ」
998 = "「A——a——a.」"
# monologue
# JP: 呼気まで全部、\n勃起の先からポーレットの子宮に絞られていく。
1472 = "Dường như cả hơi thở của tôi,\ncũng đang bị vắt kiệt từ đầu dương vật vào tận tử cung của Paulette."
# monologue
# JP: あまりに強烈に吸われすぎ、息が詰まって、\n口がからからに乾いてしまう。
1367 = "Bị mút mát quá đỗi mãnh liệt khiến tôi nghẹt thở,\nmiệng khô khốc."
# monologue
# JP: （びゅっ――びゅるっ――びゅうう――びゅっ――）
1737 = "（Phụt——phụt——phụttttt——phụt——）"
# 【ポーレット】
# display as 波萊特
# JP: 「あつ、いっ――んっ――すごい……いっぱい……\nふぁっ――しきゅ、うっ――んっ――おま、ん、こ」
1065 = "「Nóng, quá——ưm——tuyệt quá... nhiều... thật...\nphá——tử cung, ưm——âm đạo, ngập tràn rồi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん――ぁっ」
1020 = "「Ưm——a.」"
# monologue
# JP: （とさっ！）
1768 = "（Đổ gục!）"
# monologue
# JP: 体の力も全部を吸われて、吐き出して、\n崩れる体は、やわらかな肉に包んでもらえる。
1447 = "Toàn bộ sức lực trong cơ thể cũng bị hút cạn, trút hết ra ngoài,\ncơ thể tôi đổ gục xuống, được bao bọc trong da thịt mềm mại của cô ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄……くん――んっ――ちゅっ――ちゅむっ」
1181 = "「Soutetsu... này——ưm——chụt——chùn chụt.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あ――」
# 996 = "「啊——」" 
# monologue
# JP: ポーレットの舌が丹念に、\n僕の口内を蠢き唾液をなすってく。
1567 = "Chiếc lưỡi của Paulette đang cẩn thận,\nmơn trớn khắp khoang miệng tôi và trao đi dòng nước bọt."
# monologue
# JP: 絞られたものが補充されてく。\nそんな感覚を覚えれば、体は熱を取り返してく。
1351 = "Những thứ vừa bị vắt kiệt đang dần được bổ sung lại.\nCảm nhận được điều đó, cơ thể tôi dần lấy lại hơi ấm."
# 【ポーレット】
# display as 波萊特
# JP: 「れるっ――れムッ――ちゅっ――ちゅむっ――ん～っ」
1015 = "「Liếm——ưm——chụt——chùn chụt——ưm~」"
# monologue
# JP: ポーレットも同じ気持ちと感じる。\n僕の精液を、子宮で受け止めたかわりに、きっと――
1546 = "Tôi cảm nhận được Paulette cũng có cùng tâm trạng.\nĐổi lại việc đón nhận tinh dịch của tôi vào tử cung, chắc chắn cô ấy——"
# 【ポーレット】
# display as 波萊特
# JP: 「チュッ――ちるっ――れろっ――れるうううっ――」
1016 = "「Chụt——chùn chụt——liếm——liếmmmmm——」"
# monologue
# JP: ……唾液を、僕に流し込み。\nそうして僕と、一緒にいようとしてくれている。
755 = "...Đang truyền nước bọt của cô ấy sang cho tôi.\nVà bằng cách đó, cô ấy muốn hòa quyện làm một cùng tôi."
# monologue
# JP: 体液と体液とを交換しあい、\n僕らは、もっとひとつに溶け合おうと求め続ける。
1445 = "Trao đổi thể dịch cho nhau,\nchúng tôi tiếp tục khao khát được hòa quyện vào nhau nhiều hơn nữa."
# 【双鉄H】
# display as 雙鐵
# JP: （これが……これがセックスか）
1773 = "（Đây là... Đây chính là làm tình sao.）"
# monologue
# JP: 満たされていく。\nなのに、もっとが欲しくなる。
1492 = "Đang dần được lấp đầy.\nVậy mà, lại khao khát nhiều hơn nữa."
# monologue
# JP: その混乱をほどきたくって、\n一緒に答えをみつけたくって――
1458 = "Muốn gỡ rối mớ bòng bong đó,\nmuốn cùng nhau tìm ra câu trả lời——"
# 【双鉄H】
# display as 雙鐵
# JP: 「ん……――ポーレット」
1032 = "「Ưm...——Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……双鉄くぅん」
1186 = "「Soutetsu... Soutetsu.」"
# monologue
# JP: 甘えるポーレットの体を抱きしめ。
1468 = "Ôm chặt lấy cơ thể đang nũng nịu của Paulette."
# monologue
# JP: そしてもう一度、もう何度でも、\n僕らは深く、キスを、唾液を、そして愛情を交わし合う。
1596 = "Và rồi một lần nữa, thêm vô số lần nữa,\nchúng tôi trao nhau những nụ hôn sâu, trao nhau nước bọt, và cả tình yêu."
