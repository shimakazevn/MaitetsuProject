[script]
# lines: 315 
# 【双鉄H】
# display as 雙鐵
# JP: 「ここが、ポーレットの部屋か」
1164 = "「這就是你的房間嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「狭いとこですけど、あがってください」
1179 = "「雖然地方不大，請進吧」" 

# monologue
# JP: レールショップから歩いてほんの三分足らず。\n立地的には、まさに駅前一等地にある小ぶりなアパート。
1427 = "從鐵路商店走到這裡用不了三分鐘。從位置上來說，這間小公寓位於車站前最好的地段。" 

# monologue
# JP: その一室は、御一夜市長兼御一夜鉄道社長の住処とは\nとても信じられないほどの、ごくごく質素な佇まいだ。
1483 = "房間裡看起來十分樸素，甚至讓人不敢相信這裡是御一夜市長兼御一夜鐵道社長的住處。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「2Kとはいえ、れいなもいるなら手狭では？\n市長なら、公邸もあるだろうに」
1180 = "「雖然有兩間房間加廚房，不過加上玲奈會不會太擠了？市長是有官邸住的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありますけど……その、色々あって」
1126 = "「有是有……不過因為很多原因……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
1005 = "「啊」" 

# monologue
# JP: 失言だった。\n前市長、ポーレットの父が公邸住まいだったなら……
1455 = "我失言了。前市長，也就是波萊特的父親是住在官邸的……" 

# monologue
# JP: ポーレットにとってそこは、\n家庭が壊れてしまった現場でもあるのだろうから。
1417 = "對於波萊特來說，那裡正是家庭崩壞的地方吧。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それに！　ちっちゃくっても、仕事と離れた空間。\nわたし、欲しかったんです。必要だって思って」
1168 = "「還有，就算小一點，我也想要一個跟工作地點分開的空間。我覺得這很有必要」" 

# monologue
# JP: 顔に思いを出してしまっていたのだろうか。
1454 = "我可能把擔憂表現在臉上了。" 

# monologue
# JP: とりなすように、空気を変えようとするように、\nポーレットがそう、明るい声で教えてくれる。
1560 = "波萊特用開朗明快的聲音說著原因，似乎是想改善氣氛。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「仕事と離れた空間、か」
1155 = "「跟工作地點分開的空間啊」" 

# monologue
# JP: [えきほんおく,2]駅本屋は言うに及ばず、レールショップも――\nどれほど自分達の色を出しても、やはり仕事場なのだろう。
1654 = "車站書店就不用了，鐵路商店也一樣——不管怎麼按自己的喜好裝飾，那也是工作的的地方。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、ここにいるのは、社長でも市長でも、\n運転士でもない、ただの少女の、ポーレットなのだな」
1177 = "「那麼你在這裡的時候，就不是社長或市長，也不是駕駛員，只是普通的少女」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。肩書全部を脱ぎ捨てた、単なる雛衣ポーレット。背伸びしてない、剥き出しではだかのわたしです」
1119 = "「是啊。在這裡我去掉了所有的稱謂，是最原本的雛衣波萊特。是沒有逞強的我，是最赤裸裸的我」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「……」
759 = "「……」" 

# monologue
# JP: 剥き出しで、はだか……\n裸の、ポーレット。
1650 = "赤裸裸的……脫光光的波萊特。" 

# monologue
# JP: 思った瞬間、\n喉が勝手に大きく動き、ごくりと音を立ててしまう。
1439 = "想到這裡，我的喉嚨就擅自蠕動了一下，發出了響亮的吞嚥聲。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1005 = "「啊」" 

# monologue
# JP: 驚きと喜びが混じったような声を出し、\n青い瞳が上目づかいに、僕を見る。
1572 = "波萊特的聲音裡既有驚訝又有喜悅，她抬頭用藍色的大眼睛看著我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……わたしのはだか、とか――\nお風呂……登呂流湯で、見てるじゃないですか」
1182 = "「雙鐵……我的裸體的話，你不是洗澡的時候……在登呂湯浴場已經看過了嗎」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。言われてみればそのとおりだ……が」
1038 = "「嗯。這麼一說確實是。不過……」" 

# monologue
# JP: しかし今、僕が思ってしまった“裸”は、\n登呂流湯で見るそれとはまるで、別物だった。
1600 = "現在我想到的“裸體”，跟我在登呂流浴場看到的“裸體”不是一個意思。" 

# monologue
# JP: いや、そうじゃない。\n別物なのは、きっと、恐らく――
1330 = "不，不對。這兩者感覺不同恐怕是因為——" 

# 【双鉄H】
# display as 雙鐵
# JP: 「僕は、変わったのだと思う。\nポーレット、君に恋して。恋をしてたと、自覚して」
1103 = "「我覺得我變了。波萊特，我愛上了你。我發現了自己愛上了你」" 

# 【ポーレット】
# display as 波萊特
# JP: 「変わった……」
940 = "「你變了……」" 

# monologue
# JP: ポーレットの目が、潤んできている。\n頬がぽーっと赤くなり、肌も汗ばんできているようだ。
1569 = "波萊特的眼眸越來越濕潤了。只見她的小臉一下就紅了，肌膚上也掛上了汗珠。" 

# 【ポーレット】
# display as 波萊特
# JP: 「どう、変わったんですか？」
955 = "「具體是怎麼了變了呢？」" 

# monologue
# JP: （ずいっ）
1776 = "（靠近）" 

# monologue
# JP: ポーレットが一歩を踏み込んでくる。\n甘さと濃さを感じるにおいが、鼻をくすぐる。
1552 = "波萊特向我走近了一步，一股濃密的甜味就飄進了我的鼻子裡。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレットの裸を見たいと思うし、触れたいとも思う。\n今まではまるで感じなかったが、今は、そう感じている」
1098 = "「我現在想看到，也想摸到你的裸體。以前我都沒有這種想法，現在我卻有了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしもっ！　そのっ――……え、っと…………」
1088 = "「我也是！那個……就是…………」" 

# monologue
# JP: 僕を見ていたポーレットの目が、不意に外れる。\nぐるぐる泳いで、床へと落ちて……
1579 = "波萊特移開了視線。她的眼神轉了幾轉，最後看向了地面……" 

# monologue
# JP: その視線のまま、声の勢いまでもが落ち――
1373 = "在她看著地面的同時，說話聲音也越來越小——" 

# monologue
# JP: （こてんっ）
1753 = "（撲通）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「むっ！？」
1045 = "「嗯！？」" 

# monologue
# JP: 体までもが崩れておちて、\nポーレットは、ベッドにころりと寝転んでしまう。
1582 = "波萊特身體也跟著一軟，然後倒在了床上。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、あの……わたしたち……\nお互いに、告白……しあいました、よ、ね？」
1173 = "「那、那個……我們……互相告白過了……對吧？」" 

# monologue
# JP: 視線を、いまだ僕から外して、ひどく照れくさそうに言う。\n僕にまで、照れが伝染してきそうになる。
1385 = "她依然不敢直視我，羞澀地說著話。連我都快跟著她害羞起來了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ……うむ。\n告白しあって、キスも交わした」
1004 = "「啊……嗯。我們互相告白過了，也接過吻了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です、から……ええと、その……わたしと、双鉄、くん、\nこ、恋人同士……って思ってもいい……ですよね？」
1108 = "「所以……那個，就是……可以認為…我和你……是、是男女朋友嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ。\n僕は既に、ポーレットは僕の恋人なのだと思っている」
1149 = "「當然了。我已經把你當作我的女朋友了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「よかったぁ」
1055 = "「太好啦」" 

# monologue
# JP: 嬉しげな笑み。\n一瞬瞳は僕へと戻り、またすぐパっと逸れてしまう。
1584 = "波萊特開心地笑了。她快速瞄了我一眼，然後馬上又移開了視線。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで、あの――\n今日、わたしが、双鉄くんをおうちに誘ったのは、その」
1145 = "「然後，那個……今天我請你來我家，是那個……」" 

# monologue
# JP: ポーレットがもぞりと体を動かす。
1550 = "波萊特動了一下身子。" 

# monologue
# JP: さっき感じたものとは別の、甘い匂いがふわりと立って、\nポーレットの眠りの匂いなのかと、ふと思う。
1318 = "一股跟剛才不同的香甜氣息傳來，這就是波萊特睡覺時的味道吧。" 

# 【ポーレット】
# display as 波萊特
# JP: 「恋人同士がする、コト――したいって、思ったからです。\n双鉄くんとの……確かな絆が、欲しくって」
1053 = "「因為我想做，男女朋友之間做的事情。我想跟你……建立起牢固的關係」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「具体的には、どんなことだ？」
954 = "「具體來說是什麼事情？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええ、と――だから――せ、せ、セっ――セッ……\nその！　――い、一緒に、寝る、とか、してみた、くて」
1071 = "「就、就是，那個，做、做……就是！我想跟你一、一起睡」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「なんだ、そんなことか」
1049 = "「噢，這樣啊」" 

# monologue
# JP: （ごろんっ）
1769 = "（躺下）" 

# monologue
# JP: 寝るなど、なにほどのことも無い。
1324 = "不就是一起睡嗎。" 

# monologue
# JP: そう考えて、ポーレットの隣に僕も寝転び……\n途端、自分の考え違いを思い知らされる。
1493 = "於是我就躺到了波萊特旁邊……之後她就讓我明白我想錯了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いや……これは――\n確かに、恋人同士がすること、だな」
1034 = "「嗯……這個，確實是男女朋友會做的事」" 

# 【ポーレット】
# display as 波萊特
# JP: 「で、ですねっ」
1114 = "「是、是啊」" 

# monologue
# JP: ポーレットの息が頬をくすぐる。\n肌のくっつき合ってる部分が、汗ばみ具合を教えてくれる。
1568 = "波萊特的氣息打在了我臉上。我從跟她貼緊的皮膚上能感覺到她出了很多汗。" 

# monologue
# JP: 隣に寝転がってるだけで、ポーレットがとても近くなる。\n縮まった距離が、ポーレットをもっと教えてくれる。
1671 = "雖然不過是躺在了她身邊，我感覺跟她的距離一下就拉近了。而波萊特接下來的言動越來越讓我感覺我們離得是那麼近。" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいなと寝てるときと……全然……ちがって――\nわたし、すごくドキドキしてます」
1078 = "「感覺跟和玲奈一起睡的時候……完全不一樣……我現在心跳得好快」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな、僕もドキドキしている」
1120 = "「是啊，我心跳也很快」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そ、そうなんですか？」
1115 = "「是、是嗎？」" 

# monologue
# JP: （さわっ）
1752 = "（撫摸）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
1007 = "「啊！」" 

# monologue
# JP: ポーレットの柔らかなてのひらが、\n僕の胸板にそうっと触れる。
1549 = "波萊特伸出軟軟的小手，輕輕撫摸上了我的胸膛。" 

# monologue
# JP: 左胸を柔らかなてのひらで擦られ押さえられれば、\n男の僕の――乳首が、固くなってしまう。
1655 = "軟軟的手心在我的胸上摩擦按壓，讓我這個男人的乳頭都立起來了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ほんと……双鉄くん、すごく、ドキドキ、してますね」
1169 = "「還真是……你的心跳好快」" 

# monologue
# JP: （さすっ――さすっ）
1750 = "（摸來摸去）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「～っ！」
984 = "「呃～！」" 

# monologue
# JP: おかしな声を出しそうで、喉の深くで噛み潰す。
1450 = "我努力忍耐著，不讓自己發出怪聲來。" 

# monologue
# JP: ポーレットの手のひらのゆるい蠢きは、\n僕の鼓動を確かめる、そのためだけのものじゃない。
1576 = "波萊特的輕撫並不僅僅是為了感受我的心跳。" 

# 【双鉄H】
# display as 雙鐵
# JP: （僕の乳首を……\n意識して、手のひらで転がして弄ってるんだ）
1742 = "（她是故意的……她是在用手心刺激我的乳頭）" 

# monologue
# JP: それがじわじわ、乾きを伴う快感を僕に蓄積してく。
1433 = "快感在體內積蓄起來，卻讓我渴望獲得進一步的快感。" 

# monologue
# JP: 心地よいのに、物足りない。\n何かが欲しくて、体の奥からむずむずしてくる。
1633 = "舒服是舒服，但心裡卻不能滿足。我感覺身體深處有一股急不可耐的欲望。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……わたしも、ドキドキ――して……ます、よ？」
762 = "「……我的心……也跳得很快」" 

# monologue
# JP: (もぞっ）
37 = "(抬手）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
988 = "「呼！」" 

# monologue
# JP: ポーレットの真っ白な指先が、ふるふる小さく震えつつ、ゆっくりゆっくり不器用に、上着の前を開けていく。
1563 = "波萊特白皙的手指輕輕顫抖著，她動作笨拙地慢慢解開了自己的上衣。" 

# monologue
# JP: すぐいっぱいいっぱいになってしまう、あのポーレットが、\n僕を導くそのためだけに、恥ずかしさに耐えてくれている。
1556 = "波萊特明明平時很害羞，現在卻強忍著羞恥感來誘導我。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうなの、か」
1122 = "「是嗎」" 

# monologue
# JP: ならば、ためらう理由などない。\nためらってなどいられない。
1663 = "那我也不需要猶豫什麼了。我也沒有什麼工夫猶豫了。" 

# monologue
# JP: ピンクの可愛いブラジャー越しにも見て取れる、\n固くなってる乳首を目当に、手のひらをそっと下ろしてく。
1667 = "隔著胸罩都能看到她的可愛乳頭已經變硬了，我伸手摸了上去。" 

# monologue
# JP: （ふわっ）
1770 = "（軟綿綿）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふぁっ」
987 = "「呼」" 

# monologue
# JP: 甘やかな声。\n鼓膜から脳を溶かされる。
1404 = "好甜美的呻吟。這聲音甜得似乎要把我的大腦溶化了。" 

# monologue
# JP: だが、それ以上に手のひらが――
1328 = "不過手上的感觸更是刺激。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すごい……な――」
1061 = "「好厲害……」" 

# monologue
# JP: （さすっ――ふにゅっ――）
# 1750 = "（摸來摸去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……ふっ……は、い――こんなに、\nドキドキ――するの――はじめ、てっ……んふっ」
1026 = "「嗯……呼……嗯……我是第一次……心跳這麼快……嗯呼」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「鼓動も、確かにすごいのだが――」
1075 = "「心跳確實是很快」" 

# monologue
# JP: （むみゅっ――もみゅっ――）
1748 = "（揉來揉去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「はぁ……あっ――んっ……きもち……いい……よぉ」
986 = "「呼……啊、嗯……好舒服……」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「あ」
1039 = "「嗯」" 

# monologue
# JP: ポーレットの声にハっとして、同時に深く安堵する。
1573 = "波萊特的聲音讓我回過神來，同時讓我感到非常安心。" 

# monologue
# JP: いつの間に、手のひらの動きが変わってた。\nさするではなく、揉むに、変わらざるを得ないほど――
1466 = "我手上的動作也發生了變化，不在是單純的撫摸，而是不由地變成揉捏了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「すごいのは、ポーレットのおっぱいだ。\nこれほど、柔らかく……手を幸せにするものなのか」
939 = "「你的胸部才厲害。竟然這這麼柔軟……摸起來讓人感覺這麼幸福」" 

