[script]
# lines: 482 
# 【駅員】
# display as 工作人員
# JP: 「[ゆけむり,1]湯煙鉄道、[なるこ,1]鳴呼行きストーブ列車は2番線です！\nお乗り換えの方はお急ぎください！」
2104 = "「湯煙鐵路，開往鳴子方向的暖爐列車在２號月台！請要換乘的乘客抓緊時間上車！」" 

# 【ひかり】
# display as 光
# JP: 「わわっ」
1803 = "「哇哇哇」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、僕はれいなをおんぶしよう」
2101 = "「波萊特，我來背玲奈吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい！　おいで、ひかり。抱っこ！」
1931 = "「好的！過來，光，媽媽抱」" 

# 【ひかり】
# display as 光
# JP: 「だっこー！」
1945 = "「媽媽抱！」" 

# monologue
# JP: 僕におぶさったれいなが僕の荷物を持って、\nポーレットの荷物を僕が受け取る。
2745 = "被我背在身後的玲奈拿起了我的行李，我又接過波萊特的行李。" 

# 【れいな】
# display as 玲奈
# JP: 「双鉄さぁん、おもくないですかぁ」
2252 = "「雙鐵先生，這樣不會太重了嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「投炭1000杯の方が重いさ」
2181 = "「跟加煤１０００鏟比，根本不算什麼」" 

# monologue
# JP: 言いつつ、足は大股に。
2583 = "我一邊說著，一邊大步流星朝換乘的車走去。" 

# monologue
# JP: 駆け込み乗車は断じてせぬが、これほどの遅延の接続待ち、\n同じ鉄道事業者として、少しでも早く乗ってやりたく思う。
2616 = "我肯定不會違反規章去沖門的，但這班列車已經為被延誤的換乘乘客等了這麼久，身為鐵路的同行，我很想儘快上車。" 

# 【ポーレット】
# display as 波萊特
# JP: 「とうちゃーく！」
1753 = "「到了！」" 

# 【ひかり】
# display as 光
# JP: 「ストーブきゃくしゃー！」
2074 = "「暖爐客車！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1888 = "「噢」" 

# monologue
# JP: ストーブがある。客車内――\nしかも、木造客車の中にだ。
2555 = "客運車廂裡有暖爐。而且，這客運車廂還是木製的。" 

# 【れいな】
# display as 玲奈
# JP: 「ふわわー、もう火がはいってますねぇ。\nあったかいですぅ」
1813 = "「哇，已經點著火了。好溫暖」" 

# 【ひかり】
# display as 光
# JP: 「あったかいのー」
1922 = "「好暖和」" 

# monologue
# JP: れいなとひかりが、僕らの腕の中、手を伸ばす。\nこころまであたためられる光景だ。
2681 = "玲奈和光在我們的懷中伸出手烤火。這副光景讓我們心裡暖融融的。" 

# monologue
# JP: が、ストーブ前はもろに通路。\nこの状況下、立ち止まれるような場所ではない。
2470 = "但暖爐的前方是過道。看情形，我們不該站在這裡擋路。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まずは席につこう。\nポーレット、僕らの席は？」
2012 = "「我們先坐下吧。波萊特，我們的位置在哪？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「2Aから2Dですから、このボックスですよ？」
1979 = "「座位號是從２Ａ到２Ｄ，所以應該是這裡吧？」" 

# 【ひかり】
# display as 光
# JP: 「すごーい！　ストーブのとなりなのー！」
1917 = "「好厲害！就在暖爐旁邊啊！」" 

# 【れいな】
# display as 玲奈
# JP: 「わあああ、すっごくいい席ですねぇ！」
1816 = "「哇，這個位置真是太好了！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふふふーん」
1790 = "「呵呵呵」" 

# monologue
# JP: ひかりを座席へとおろしてやりつつ、\nポーレットは、誇らしさでいっぱいの笑みを浮かべる。
2673 = "波萊特把光放到座位上，同時露出充滿驕傲的笑容。" 

# 【ポーレット】
# display as 波萊特
# JP: 「こっちのまいてつ仲間に、窓口並んでもらいましたから。\n狙い打ちってぇやつですよ」
2020 = "「我是請這邊的掌車人同行幫我排隊買到的。這裡的票我是志在必得」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、そんなことをしてもらえるのか」
1763 = "「原來，還可以請人幫忙買票啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ギブ＆テイクです。彼女が九洲の列車乗りたいときは、\nわたしが窓口代行、みたいな感じで～」
2211 = "「這是等價交換。等她想來九州乘火車的時候，就輪到我幫她買票啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「助け合いだな。素晴らしい」
1760 = "「原來是互相幫助啊。真美好」" 

# monologue
# JP: れいなを席に座らせて、\n僕もようやく荷物を下ろす。
2621 = "我讓玲奈坐下，然後終於有機會放下手中的行李。" 

# monologue
# JP: （ああ……）
2840 = "（啊……）" 

# monologue
# JP: 座れば、熱が近くなる。\nけれど、決して熱く無い。
2536 = "坐下的同時，我感到了身邊的熱量。但是，卻並不會感覺熱得過分。" 

# monologue
# JP: 運転台の中とは、まったく空気が違っている。\n石炭が、これほど優しく燃えるものとは、思わなかった。
2792 = "這裡與駕駛台中的氛圍完全不同。我從未想到煤竟會如此溫柔地燃燒著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……いいものだな。\n[つ]津っ[てつ]鐵で使われていたものと聞いたが」
1300 = "「……真不錯啊。我聽說，這輛車曾經在津輕鐵路運行過」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。放出されたのが、ちょうどウチが[すんたい,1]駿袋鉄道さんに\n客車を譲ってもらったのと同じ頃になりますね」
2071 = "「是的。這輛車被轉讓的時期，跟我們從駿遠鐵路那邊收購\\x%l客車;#00ffc040;客運車廂%l;#;的時期差不多」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。ゆえに、この車両がウチに来た可能性も――\nという話になるのか」
2214 = "「這樣啊。所以說，其實這輛車也有過被我們收購的機會，是這樣的嗎」" 

# 【ひかり】
# display as 光
# JP: 「こっちのほーがよかったのー！！」
1734 = "「光覺得這輛車比較好！！」" 

# monologue
# JP: ひかりの感想はとても素直だ。
2496 = "光的感想非常直率。" 

# monologue
# JP: ストーブ客車。風情の面ではほぼ最強クラスと思えるし、\n物珍しさゆえ、集客力も強かろう。が――
2647 = "暖爐客車。在火車之中，就屬它最有風情了。而且因為其新奇獨特的性質，很容易吸引到顧客。但是……" 

# 【ポーレット】
# display as 波萊特
# JP: 「ううん。マイントレジャーへのお客さんを運ぶには、\nうちの、気動車改造客車の方が適しているわ」
1670 = "「不。還是我們的動車改造客運車廂最適合送客人去煤探樂園」" 

# 【ひかり】
# display as 光
# JP: 「えー、どうしてー」
1861 = "「啊？為什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それならばわかるぞ。走らせる目的が沿線観光ではなく、\n『マイントレジャーへの輸送』となってくるからだ」
2205 = "「這個我懂。因為那條線路不是用來讓客人觀光沿線景色，而是用來輸送客人到煤探樂園去的」" 

# 【ひかり】
# display as 光
# JP: 「ふむむ？」
1834 = "「唔？」" 

# monologue
# JP: ひかりは小首を傾げてしまうが、\nポーレットとれいなはニコニコ顔で頷いてくれる。
2808 = "雖然光露出疑惑的表情，但波萊特卻微笑著點點頭。" 

# monologue
# JP: ここは僕に、父親として、まいてつとしての、\n花を持たせてくれるのだろう。
2542 = "她一定是想為我這個父親，我這個掌車人撐腰吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今、『ＳＬマイントレジャー号』には、\n平均何人の乗客があるかは知っているか？」
1712 = "「你知道現在“蒸汽機車煤探樂園號”，每次執行中平均乘坐多少位客人嗎？」" 

# 【ひかり】
# display as 光
# JP: 「きょねんのすーじで、ななじゅうなななのー！\nで、いちばんたくさんだったひが、きゅうじゅうに！」
1771 = "「去年的數字是七十七名！最多的一次，乘員是九十二名！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さすが。素晴らしいな、大正解だ」
1703 = "「了不起。太棒了，完全正確」" 

# 【ひかり】
# display as 光
# JP: 「えへへへ～！」
1887 = "「嘿嘿嘿！」" 

# monologue
# JP: 頭をぐいぐい撫でてやれば、\nひかりは『もっと』と、頭を手のひらにすりつけてくる。
2614 = "我用力摸摸她的頭，光則用頭蹭著我的手掌，彷彿在對我說“多摸摸吧”。" 

# monologue
# JP: ひかりの髪は、やわらかだ。\n手のひらに、どこかしっとり吸い付いてくる。
2503 = "光的頭髮好柔軟，感覺就好像牢牢地吸附在我的手掌上一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それほど多くのお客様を、御一夜鉄道の客車は、\n安全に、迅速に輸送することが必要となる」
1990 = "「御一夜鐵路的\\x%l客車;#00ffc040;客運車廂%l;#;必須安全、迅速地把如此大量的乘客送到目的地」" 

# 【ひかり】
# display as 光
# JP: 「うん」
1867 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、現行の客車をこのストーブ客車に置き換えて。\nさて、平均77人のお客様は安全にマイントレジャーまで」
2228 = "「那如果把我們現在的\\x%l客車;#00ffc040;客運車廂%l;#;換成這輛暖爐客車的話怎麼辦？要怎麼將平均多達７７名的客人送到煤探樂園呢」" 

# 【ひかり】
# display as 光
# JP: 「あ！」
1841 = "「啊！」" 

# monologue
# JP: ひかりはこっそりあたりを見回し、\n小さな小さな声で答える。
2485 = "光偷偷地左右張望了一下，小聲答道。" 

# 【ひかり】
# display as 光
# JP: 「できないのー。\nおきゃくさん、ななじゅうななにんものれないのー」
2185 = "「辦不到……這輛車坐不下７７個人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。ボックスシートで通路が狭い上にストーブもある。\nこの客車は、全員の着席を前提としてしか運用できない」
1952 = "「對吧。這輛車有包廂坐席，還設了暖爐，過道就更狹窄了。所以在運營這輛車的時候，一定要給所有乘客安排座位」" 

# monologue
# JP: ぎゅうぎゅうに詰め込んで77人を乗せたとしても、\nストーブ近くのお客様は、火傷を余儀なくされてしまう。
2562 = "就算強行讓那７７個人擠上車，暖爐附近的乘客也難免會被燙傷。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、今の御一夜鉄道にはオハ[ぜろいちよん,2]014。\n現行の気動車改造客車が最適解なのだ」
2028 = "「所以，對於我們御一夜鐵路來說，Ｏｈａ０１４——也就是現在開行的動車改造客運車廂才是最優解。" 

# 【ひかり】
# display as 光
# JP: 「なるほどなのー。ぱぱすごーい！！」
2049 = "「明白了。爸爸好厲害！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1671 = "「不」" 

# monologue
# JP: それは違う。\n僕の答えは、いわば後出し――単なる現状確認に過ぎん。
2512 = "厲害的人並不是我。我的回答不過是馬後炮——也就是原樣敘述眼前的情況而已。" 

# monologue
# JP: 最初から間違いの無い想定を行い、\nきちんと正解を導いたのは――
2653 = "最初做出正確的預測，得出完美答案的人是……" 

# 【双鉄】
# display as 雙鐵
# JP: 「凄いのはママ――\nポーレットさ」
1769 = "「厲害的人是你媽媽——波萊特」" 

# monologue
# JP: 亡き父親との思い出がつまった、ストーブ客車。\n御一夜の冬は冷えるし、時折ではあるが雪も降る。
2648 = "暖爐客車上，充滿了她與已故父親的回憶。御一夜的冬天很冷，偶爾還會下雪。" 

# monologue
# JP: 『購入します』と、一言ポーレットが言ったなら、\n誰も反対はしなかったろう。にもかかわらず――
2518 = "只要波萊特說一句“我要買這輛車”，一定不會有人反對。但即便如此……" 

# 【双鉄】
# display as 雙鐵
# JP: 「市長として、社長として。御一夜のために最前の判断を、\nためらいなく下したのだ。それはとても、立派なことだ」
1913 = "「她作為市長，作為社長，毫不猶豫地為御一夜做出了最好的決定。這真的是很了不起」" 

# 【ひかり】
# display as 光
# JP: 「まま、すごいのー」
1944 = "「媽媽好厲害」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……すごくなんてないです。全然」
1297 = "「……我一點都不厲害」" 

# monologue
# JP: けれど、ポーレットは柔らかな笑みで、\n僕らの賞賛をくるんでしまう。
2472 = "但波萊特溫柔地笑著，婉拒了我們的讚揚。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし一人じゃなかったから。……パパが、れいなが、\nみんながいたから、間違えないですんだだけ」
2247 = "「那都是因為我身邊有大家在。……有你爸爸，有玲奈，還有大家在我身邊，讓我不至步入歧途，僅此而已」" 

# monologue
# JP: ポーレットは、ぎゅっとひかりを抱きしめる。
2676 = "波萊特緊緊抱住了光。" 

# monologue
# JP: 抱きしめられてひかりは嬉しい悲鳴をあげて、\nそれから不意に、すこしさみしげな声をだす。
2747 = "被抱住的光發出一聲開心的驚叫，然後忽然有點落寞地說道。" 

# 【ひかり】
# display as 光
# JP: 「パパとれいなと――ひかりはぁ？」
2078 = "「有爸爸，有玲奈……那光呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……ひかりは、そのときはまだ、産まれてなかったの」
1299 = "「……當時光還沒出生呢」" 

# 【ひかり】
# display as 光
# JP: 「うぅ～っ！\nうまれてないと、いっしょじゃないのー？」
1863 = "「嗚嗚！沒出生的話，就不能跟媽媽在一起嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1841 = "「啊！」" 

# monologue
# JP: 驚いたように、ポーレットが顔をあげる。
2671 = "波萊特吃驚地抬起頭。" 

# monologue
# JP: ひかりの顔をまじまじと見て、\nゆっくりゆっくり、何度も何度も頭を撫でる。
2544 = "她不停地打量著光的臉。然後慢慢地撫摸光的頭，流連往復。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ううん、いっしょ。間違えないため、\nひかりもちゃあんと、ママの判断を支えてくれた」
1687 = "「不，當時光也跟媽媽在一起呢。光也幫助了媽媽，讓媽媽沒有犯錯」" 

# 【ひかり】
# display as 光
# JP: 「やっぱりそっかー」
1729 = "「光就知道」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん。本当にそう。いつかうまれるこどものため。\nおかあさんになるときのためって――わたし、思ってた」
1866 = "「嗯。真的是這樣。我當時就想過，我的決定是為了總有一天會誕生的孩子，為了我成為媽媽的那一天」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2057 = "「是啊——」" 

# monologue
# JP: 確かにだ。“いつかは父になりたいか？”\nあの日、術仙炭鉱でのポーレットからの質問は――
