[script]
# lines: 482 
# 【駅員】
# display as 工作人員
# JP: 「[ゆけむり,1]湯煙鉄道、[なるこ,1]鳴呼行きストーブ列車は2番線です！\nお乗り換えの方はお急ぎください！」
2104 = "「Đường sắt Yukemuri, toa xe sưởi ấm đi Naruko đang ở tuyến số 2! Hành khách đổi tàu xin vui lòng nhanh chân lên!」"
# 【ひかり】
# display as 光
# JP: 「わわっ」
1803 = "「Đứng từ góc độ của cô Miyamoto mà nói, chắc chắn Paulette giống như——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、僕はれいなをおんぶしよう」
2101 = "Đang nói dở, tôi vội vàng nuốt lại những lời đó ở thời điểm nguy hiểm."
# 【ポーレット】
# display as 波萊特
# JP: 「はい！　おいで、ひかり。抱っこ！」
1931 = "Khoan đã——đúng rồi. Nhắc mới nhớ, cho đến tận bây giờ, chưa một lần nào……"
# 【ひかり】
# display as 光
# JP: 「だっこー！」
1945 = "（Nghe em ấy nhắc đến từ \"ba\" nhiều như vậy—— Nhưng Paulette đã từng nhắc đến \"mẹ\"…… dù chỉ một lần chưa nhỉ?）"
# monologue
# JP: 僕におぶさったれいなが僕の荷物を持って、\nポーレットの荷物を僕が受け取る。
2745 = "Tôi không thể nhớ ra nổi. Đến mức hoàn toàn không có chút ấn tượng nào."
# 【れいな】
# display as 玲奈
# JP: 「双鉄さぁん、おもくないですかぁ」
2252 = "「Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「投炭1000杯の方が重いさ」
2181 = "「À, không có gì——」"
# monologue
# JP: 言いつつ、足は大股に。
2583 = "Nghĩ lại thì, tôi hoàn toàn không biết gì về Paulette cả. Ngay cả việc trong quá khứ đã từng gặp nhau hay chưa, đến giờ vẫn chưa xác nhận được."
# monologue
# JP: 駆け込み乗車は断じてせぬが、これほどの遅延の接続待ち、\n同じ鉄道事業者として、少しでも早く乗ってやりたく思う。
2616 = "——Không nên nói những điều bất cẩn. Sự phán đoán đó, đã làm thay đổi những lời sắp thốt ra khỏi cổ họng tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「とうちゃーく！」
1753 = "「Đứng từ góc độ của cô Miyamoto mà nói, Paulette, chắc hẳn vẫn trông giống như một vị thị trưởng chưa đáng tin cậy nhỉ.」"
# 【ひかり】
# display as 光
# JP: 「ストーブきゃくしゃー！」
2074 = "「Chuyện đó là đương nhiên rồi ạ. Bởi vì thực tế, em là một thị trưởng chưa đáng tin cậy mà. Cho đến tận ngày hôm qua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1888 = "Nói rồi, em ấy đứng bật dậy."
# monologue
# JP: ストーブがある。客車内――\nしかも、木造客車の中にだ。
2555 = "Không phải nằm dài ngang mặt bàn, mà là đứng thẳng lưng—— Bóng lưng của Paulette, quả nhiên trông như thế mới đẹp."
# 【れいな】
# display as 玲奈
# JP: 「ふわわー、もう火がはいってますねぇ。\nあったかいですぅ」
1813 = "「Vì vậy, từ giờ trở đi, em sẽ rửa sạch cái danh tiếng đó.」"
# 【ひかり】
# display as 光
# JP: 「あったかいのー」
1922 = "「Ừm!」"
# monologue
# JP: れいなとひかりが、僕らの腕の中、手を伸ばす。\nこころまであたためられる光景だ。
2681 = "Đúng vậy. Từ bây giờ. Danh tiếng xấu thì cứ rửa sạch là được. Những điều chưa biết thì cứ tìm hiểu là xong."
# monologue
# JP: が、ストーブ前はもろに通路。\nこの状況下、立ち止まれるような場所ではない。
2470 = "Đối với Paulette, và cả đối với tôi, chắc chắn sẽ làm được."
# 【双鉄】
# display as 雙鐵
# JP: 「まずは席につこう。\nポーレット、僕らの席は？」
2012 = "「Anh trai này.」"
# 【ポーレット】
# display as 波萊特
# JP: 「2Aから2Dですから、このボックスですよ？」
1979 = "……Đôi mắt của Hibiki đang nhìn chằm chằm. Không——không phải. Đơn giản chỉ là, nó đang cực kỳ, cực kỳ lạnh lùng."
# 【ひかり】
# display as 光
# JP: 「すごーい！　ストーブのとなりなのー！」
1917 = "「Anh trở thành người đam mê đường sắt rồi à?」"
# 【れいな】
# display as 玲奈
# JP: 「わあああ、すっごくいい席ですねぇ！」
1816 = "「Không——」"
# 【ポーレット】
# display as 波萊特
# JP: 「ふふふーん」
1790 = "Tôi không hề."
# monologue
# JP: ひかりを座席へとおろしてやりつつ、\nポーレットは、誇らしさでいっぱいの笑みを浮かべる。
2673 = "Nhưng tôi lại băn khoăn không biết mình có thể khẳng định chắc nịch như vậy không. Quả thực, tôi đã dấn thân vào đường sắt sâu đến mức phải băn khoăn về điều đó."
# 【ポーレット】
# display as 波萊特
# JP: 「こっちのまいてつ仲間に、窓口並んでもらいましたから。\n狙い打ちってぇやつですよ」
2020 = "「Này nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、そんなことをしてもらえるのか」
1763 = "Không đợi tôi trả lời, Hibiki khẽ hừ mũi một cái rồi nhún vai."
# 【ポーレット】
# display as 波萊特
# JP: 「ギブ＆テイクです。彼女が九洲の列車乗りたいときは、\nわたしが窓口代行、みたいな感じで～」
2211 = "「Việc đào than, trên đời này có ai gọi đó là hoạt động giải trí không? Không đúng không? Bởi vì tên gọi chính xác của nó là \"lao động\" mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「助け合いだな。素晴らしい」
1760 = "「Không, thế nên——không chỉ là đào than thôi đâu…… mà còn……」"
# monologue
# JP: れいなを席に座らせて、\n僕もようやく荷物を下ろす。
2621 = "Những lời tiếp theo, tôi không thể thốt ra khỏi miệng. Có lẽ ếch bị rắn nhìn chằm chằm cũng mang tâm trạng như thế này chăng."
# monologue
# JP: （ああ……）
2840 = "「Cất công đào được than rồi lại ném vào lò hơi của SL, trên đời này người ta gọi đó là làm công cốc đấy.」"
# monologue
# JP: 座れば、熱が近くなる。\nけれど、決して熱く無い。
2536 = "「Ư, ừm.」"
# monologue
# JP: 運転台の中とは、まったく空気が違っている。\n石炭が、これほど優しく燃えるものとは、思わなかった。
2792 = "Tôi cảm nhận được sức thuyết phục từ lời nói đó."
# 【双鉄】
# display as 雙鐵
# JP: 「……いいものだな。\n[つ]津っ[てつ]鐵で使われていたものと聞いたが」
1300 = "Tôi nhìn Paulette cầu cứu, nhưng em ấy lại nhìn tôi bằng ánh mắt cầu khẩn với khuôn mặt pha lẫn sự xấu hổ và bối rối."
# 【ポーレット】
# display as 波萊特
# JP: 「はい。放出されたのが、ちょうどウチが[すんたい,1]駿袋鉄道さんに\n客車を譲ってもらったのと同じ頃になりますね」
2071 = "（Nếu vậy——Hachiroku và Reina, chắc, sẽ……）"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。ゆえに、この車両がウチに来た可能性も――\nという話になるのか」
2214 = "Không xong rồi, Hachiroku đang hoàn toàn vô cảm. Có vẻ cô ấy định dùng bộ mặt poker đó để cho qua chuyện này."
# 【ひかり】
# display as 光
# JP: 「こっちのほーがよかったのー！！」
1734 = "Và Reina thì, hoàn toàn không nghe chúng tôi nói gì. Cô bé chỉ đang làm nũng Paulette như một chú mèo con đang cọ mùi."
# monologue
# JP: ひかりの感想はとても素直だ。
2496 = "（Nhắc mới nhớ, mấy ngày nay, thời gian tôi và Paulette ở riêng với nhau khá nhiều nhỉ.）"
# monologue
# JP: ストーブ客車。風情の面ではほぼ最強クラスと思えるし、\n物珍しさゆえ、集客力も強かろう。が――
2647 = "「Đúng là vậy đó nha. Bỏ tiền ra để đi đào than. Rồi số than đó lại bị lấy đi mất thì, chẳng vui vẻ chút nào đâu nha.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ううん。マイントレジャーへのお客さんを運ぶには、\nうちの、気動車改造客車の方が適しているわ」
1670 = "「Ừm. Em cũng…… nghĩ vậy. Cái đó, có lẽ—— Đối với hầu hết mọi người thì, không đáng để bỏ tiền ra. Đâu. Ạ.」"
# 【ひかり】
# display as 光
# JP: 「えー、どうしてー」
1861 = "Đồng minh thì im lặng. Còn những ý kiến phản đối thì cứ liên tiếp chồng chất lên nhau."
# 【双鉄】
# display as 雙鐵
# JP: 「それならばわかるぞ。走らせる目的が沿線観光ではなく、\n『マイントレジャーへの輸送』となってくるからだ」
2205 = "Nếu vậy thì sao? Nếu vậy thì——"
# 【ひかり】
# display as 光
# JP: 「ふむむ？」
1834 = "「Vậy thì, chúng ta nên làm thế nào đây? Làm thế nào để có thể biến mỏ than bỏ hoang thành một điểm nhấn du lịch?」"
# monologue
# JP: ひかりは小首を傾げてしまうが、\nポーレットとれいなはニコニコ顔で頷いてくれる。
2808 = "「Nếu là những chuyện dễ dàng nghĩ ra được, thì đã có người làm từ lâu rồi đó nha.」"
# monologue
# JP: ここは僕に、父親として、まいてつとしての、\n花を持たせてくれるのだろう。
2542 = "「Dạ…… nó rất là, lý thuyết chung hay nói cách khác là—— một ý kiến cơ bản. Thôi, ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「今、『ＳＬマイントレジャー号』には、\n平均何人の乗客があるかは知っているか？」
1712 = "Có lẽ vì thấy tội nghiệp cho tôi khi bị Nagi chém đứt làm đôi, Fukami rụt rè giơ tay lên."
# 【ひかり】
# display as 光
# JP: 「きょねんのすーじで、ななじゅうなななのー！\nで、いちばんたくさんだったひが、きゅうじゅうに！」
1771 = "「Số tiền đã trả, sẽ nhận lại được bao nhiêu đền đáp—— Em nghĩ điều đó, sẽ liên quan đến mức độ hài lòng……. Ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さすが。素晴らしいな、大正解だ」
1703 = "Ngay cả việc đi thuyền xuôi dòng sông Kuma cũng phải cải thiện điểm đó…… Fukami dìm lời khuyên quý giá của mình xuống bằng sự tự trào."
# 【ひかり】
# display as 光
# JP: 「えへへへ～！」
1887 = "Nhưng mà——"
# monologue
# JP: 頭をぐいぐい撫でてやれば、\nひかりは『もっと』と、頭を手のひらにすりつけてくる。
2614 = "「Ra là vậy, quả thực phải bắt đầu từ những điều cơ bản. Sự cân bằng giữa giá cả và những gì nhận được sao.」"
# monologue
# JP: ひかりの髪は、やわらかだ。\n手のひらに、どこかしっとり吸い付いてくる。
2503 = "Khi trải nghiệm đi thuyền xuôi dòng sông Kuma, tôi đã cảm thấy \"Thành thật mà nói, hơi đắt\"."
# 【双鉄】
# display as 雙鐵
# JP: 「それほど多くのお客様を、御一夜鉄道の客車は、\n安全に、迅速に輸送することが必要となる」
1990 = "Mặc dù chuyến đi thuyền trên sông Kuma, là một trải nghiệm tuyệt vời, vậy mà tôi vẫn cảm thấy thế."
# 【ひかり】
# display as 光
# JP: 「うん」
1867 = "「Đúng là, nếu bị nghĩ là 『Bỏ tiền ra để bị bắt làm việc』, thì dù giá vé chỉ có 1 yên, cũng sẽ chẳng có ai tham gia.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、現行の客車をこのストーブ客車に置き換えて。\nさて、平均77人のお客様は安全にマイントレジャーまで」
2228 = "Nếu vậy, phải tạo ra ấn tượng rằng đó không phải là 『lao động』."
# 【ひかり】
# display as 光
# JP: 「あ！」
1841 = "Nhưng nếu sự lãng mạn của việc dùng than mình đào được để vận hành SL, lại chẳng có chút sức hút nào đối với những người không thích đường sắt thì——"
# monologue
# JP: ひかりはこっそりあたりを見回し、\n小さな小さな声で答える。
2485 = "「——Nếu vậy, ví dụ như…… Phương án biến than đào được thành một loại tiền tệ ảo thì sao.」"
# 【ひかり】
# display as 光
# JP: 「できないのー。\nおきゃくさん、ななじゅうななにんものれないのー」
2185 = "「À, ý đó hay đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。ボックスシートで通路が狭い上にストーブもある。\nこの客車は、全員の着席を前提としてしか運用できない」
1952 = "Chị Mayami vốn đang giữ im lặng, bất giác thốt lên lời khen ngợi."
# monologue
# JP: ぎゅうぎゅうに詰め込んで77人を乗せたとしても、\nストーブ近くのお客様は、火傷を余儀なくされてしまう。
2562 = "Tự bản thân tôi cũng thấy nó thật đơn giản, nhưng được khích lệ bởi lời khen đó, lời nói của tôi cũng thêm phần dõng dạc."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、今の御一夜鉄道にはオハ[ぜろいちよん,2]014。\n現行の気動車改造客車が最適解なのだ」
2028 = "「Vì là tiền tệ, nên có thể chọn cách sử dụng. Một trong số đó, có thể là trải nghiệm xúc than vào lò, hay trải nghiệm làm \\x%l車掌;#00ffc040;trưởng tàu%l;#; cũng được——」"
# 【ひかり】
# display as 光
# JP: 「なるほどなのー。ぱぱすごーい！！」
2049 = "Đó là sự lãng mạn mà tôi và Paulette đều hiểu. Nếu được tự do lựa chọn, thì tất nhiên đó cũng sẽ trở thành một sự lựa chọn."
# 【双鉄】
# display as 雙鐵
# JP: 「いや」
1671 = "「Ngoài ra thì, để xem nào. Có thể đổi lấy các vật phẩm như rượu shochu hơi nước, kem hơi nước, hoặc là cơm hộp nhà ga kiểu mới chẳng hạn.」"
# monologue
# JP: それは違う。\n僕の答えは、いわば後出し――単なる現状確認に過ぎん。
2512 = "「Nếu vậy, vé đi thuyền xuôi dòng sông Kuma nữa! Xin hãy cho phép đổi lấy cả vé đi thuyền nữa! Ạ.」"
# monologue
# JP: 最初から間違いの無い想定を行い、\nきちんと正解を導いたのは――
2653 = "「À, đúng vậy nhỉ. Làm như vậy, rồi kêu gọi tài trợ, là một ý tưởng rất hay đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「凄いのはママ――\nポーレットさ」
1769 = "Làm vậy, có lẽ sẽ kéo được toàn thành phố vào công cuộc chấn hưng du lịch."
# monologue
# JP: 亡き父親との思い出がつまった、ストーブ客車。\n御一夜の冬は冷えるし、時折ではあるが雪も降る。
2648 = "「Nếu có thể thấy được hiệu quả tuyên truyền, thì các sản phẩm tài trợ, cũng có thể sẽ được cung cấp miễn phí đấy nhỉ.」"
# monologue
# JP: 『購入します』と、一言ポーレットが言ったなら、\n誰も反対はしなかったろう。にもかかわらず――
2518 = "「Ồ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「市長として、社長として。御一夜のために最前の判断を、\nためらいなく下したのだ。それはとても、立派なことだ」
1913 = "Đúng là vậy. Ví dụ, than đào được có thể đổi lấy một chai một go—— một cốc rượu shochu hơi nước."
# 【ひかり】
# display as 光
# JP: 「まま、すごいのー」
1944 = "Nếu họ uống và cảm thấy ngon, thì có thể họ sẽ mua một chai một shou về làm quà lưu niệm."
# 【ポーレット】
# display as 波萊特
# JP: 「……すごくなんてないです。全然」
1297 = "「Tài trợ và tuyên truyền. Nếu vận hành suôn sẻ, sẽ trở thành mô hình win-win nhỉ.」"
# monologue
# JP: けれど、ポーレットは柔らかな笑みで、\n僕らの賞賛をくるんでしまう。
2472 = "「Ban đầu giả sử có đặt mức giá sát nút đi chăng nữa, nhưng nếu tăng được những nguồn tài trợ như vậy, thì phạm vi lợi nhuận cũng có thể mở rộng ra.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたし一人じゃなかったから。……パパが、れいなが、\nみんながいたから、間違えないですんだだけ」
2247 = "Tôi gật đầu đáp lại giọng nói của Paulette."
# monologue
# JP: ポーレットは、ぎゅっとひかりを抱きしめる。
2676 = "Không chỉ tôi, mà cả Reina, Hachiroku, chị Mayami, Nagi, Fukami——và cả Hibiki nữa."
# monologue
# JP: 抱きしめられてひかりは嬉しい悲鳴をあげて、\nそれから不意に、すこしさみしげな声をだす。
2747 = "「Nếu có thể tăng cường các nguồn tài trợ hấp dẫn. Thì phương án này, có thể trở thành một dự án có khả năng sinh lời.」"
# 【ひかり】
# display as 光
# JP: 「パパとれいなと――ひかりはぁ？」
2078 = "Cùng với những lời tổng kết, những việc cần làm liên tiếp hiện ra trong đầu tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「……ひかりは、そのときはまだ、産まれてなかったの」
1299 = "À, thực sự là liên tiếp hiện ra. Chỉ với tôi và Paulette thì không thể nào cáng đáng hết được."
# 【ひかり】
# display as 光
# JP: 「うぅ～っ！\nうまれてないと、いっしょじゃないのー？」
1863 = "「Nếu có thể kết nối việc tái sử dụng mỏ than bỏ hoang Jutsu-sen với chấn hưng du lịch, thì Ohimitera chắc chắn sẽ có được sự huy hoàng vượt xa cả trong quá khứ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1841 = "「啊！」" 
# monologue
# JP: 驚いたように、ポーレットが顔をあげる。
2671 = "Vì vậy, để chào đón ngày mai đó. Việc đầu tiên cần làm, chỉ có một mà thôi."
# monologue
# JP: ひかりの顔をまじまじと見て、\nゆっくりゆっくり、何度も何度も頭を撫でる。
2544 = "「Tôi, muốn được nhìn thấy sự huy hoàng đó. Để làm được như vậy——tôi cần sức mạnh của mọi người.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ううん、いっしょ。間違えないため、\nひかりもちゃあんと、ママの判断を支えてくれた」
1687 = "「Xin hãy đưa em đến di tích tuyến đường sắt khai thác mỏ bỏ hoang. Kinh nghiệm của em, có thể sẽ giúp ích cho việc khôi phục tuyến đường.」"
# 【ひかり】
# display as 光
# JP: 「やっぱりそっかー」
1729 = "「Nếu các em có thể tính toán chi tiết chi phí bên phía đường sắt, chị sẽ lập bảng mô phỏng thiết lập giá vé cho nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん。本当にそう。いつかうまれるこどものため。\nおかあさんになるときのためって――わたし、思ってた」
1866 = "「Em sẽ đi gọi ông nội và các bác thợ thủ công nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2057 = "「Em cũng sẽ——thử khéo léo nói chuyện với các nhà cung cấp, hay mọi người trong hiệp hội du lịch. Xem sao. Ạ.」"
# monologue
# JP: 確かにだ。“いつかは父になりたいか？”\nあの日、術仙炭鉱でのポーレットからの質問は――
2696 = "「Reina sẽ giúp đỡ Paulette nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのだな。ポーレットと結ばれるよりも前から。\n僕らは、未来を思っていた」
2087 = "Trước cả khi tôi mở lời nhờ vả, mọi người đã trao cho tôi sức mạnh và những lời động viên."
# monologue
# JP: 手を伸ばす。\n僕の愛する妻の手に。そうして、愛する娘の頭に。
2589 = "「Em nghĩ việc xây dựng hình ảnh, sẽ vô cùng quan trọng đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ひかりが産まれるよりも前から、ひかりを思って。\nだから僕らは、レールをここまで、迷わず引けた」
2014 = "「Hibiki.」"
# 【ひかり】
# display as 光
# JP: 「うふー」
1787 = "Khuôn mặt vẫn ngoảnh đi chỗ khác. Thế nhưng, tôi chắc chắn đã cảm nhận được."
# monologue
# JP: ひかりがポーレットに抱きついて、\nついですぐさま僕をきゅうっと抱きしめる。
2490 = "Hibiki đang hướng tấm lòng của mình về phía chúng tôi."
# monologue
# JP: れいなのことも、僕より長く。\nそして再び、満足そうにポーレットの隣に座る。
2630 = "「Có gì cần vẽ thì cứ nói. Em sẽ vẽ cho.」"
# 【ひかり】
# display as 光
# JP: 「ひかり、えらいのー」
1728 = "「Cảm ơn em. Em chịu giúp anh một tay nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん！　ひかりはとってもえらい！」
1870 = "「Chuyện đó, em đã nói từ đầu rồi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それだけではなく、かしこくかわいい、\n僕らの自慢の、世界で一番のむすめだ」
1673 = "Đôi mắt em ấy khẽ liếc sang nhìn tôi."
# 【ひかり】
# display as 光
# JP: 「えへへへへー！」
# 1887 = "「嘿嘿嘿！」" 
# 【おばあさん】
# display as ？？？
# JP: 「あああ、待たせてすまんねぇ。\nこの年になると走れんで」
1821 = "Trông có vẻ gì đó hơi cô đơn, nhưng cũng có chút vui vẻ."
# 【れいな】
# display as 玲奈
# JP: 「ああっ！」
# 1841 = "「啊！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1834 = "「唔？」" 
# monologue
# JP: れいなの声に顔を向ければ――
2728 = "「Thấy anh hai vui vẻ như vậy thì…… Là em gái mà. Đành phải hợp tác giúp đỡ thôi.」"
# 【おばあさん】
# display as ？？？
# JP: 「ありゃま」
1819 = "「Vậy sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あああ、さっきの！」
1847 = "Tôi định xoa đầu vò rối tóc em ấy như mọi khi—— Nhưng bàn tay tôi đã bị né tránh."
# 【おばあさん】
# display as 老奶奶
# JP: 「ごめんねぇ。今度も騒がせちゃって」
1675 = "Hibiki cười gượng, hắng giọng rồi nhắm mắt lại."
# 【双鉄】
# display as 雙鐵
# JP: 「なにをおっしゃいますやら」
2004 = "「Không phải đâu, anh trai.」"
# monologue
# JP: ――リンゴをくださった、あのおばあさんだ。\nご当人からのアドバイスに気を配りつつ、言葉を選ぶ。
1251 = "Sau đó em ấy từ từ mở mắt ra và nhìn tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「先ほどいただいたリンゴ、本当においしかったです。\nごちそう様でした、ありがとうございました」
1998 = "「Bàn tay đó phải—— Hướng tới tương lai mà hành động nhiều hơn nữa mới được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「本当に、ありがとうございました」
2140 = "「Đường sắt Yukemuri, toa xe sưởi ấm đi Naruko đang ở tuyến số 2! Hành khách đổi tàu xin vui lòng nhanh chân lên!」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。とーってもおいしかったですぅ。\nごちそうさまでしたぁ」
1788 = "「Ư hứ hứ. Thực sự rất ngon luôn ạ~. Cảm ơn bà vì bữa ăn nha~」"
# monologue
# JP: ポーレットとれいなもすぐに察して、\n僕に追随してくれる。
2672 = "Paulette và Reina cũng ngay lập tức nhận ra, và làm theo tôi."
# monologue
# JP: ありがとうと、ごちそうさまと。\nひかりがなるべく、言いやすいような空気を作る。
2546 = "Nói lời cảm ơn, và cảm ơn vì bữa ăn. Tạo ra một bầu không khí để Hikari dễ dàng cất lời nhất có thể."
# 【ひかり】
# display as 光
# JP: 「ぁ……んっ……ふぁっ――。\nんと――ぁぃぁ……と――んん～っ」
1836 = "「A…… ưm…… hơ——.\nỪm thì——a… i… a…… to——ưm ưm~」"
# monologue
# JP: わかる。父である僕には。\nおそらく、ポーレットもれいなもわかってる。
2610 = "Tôi hiểu. Với tư cách là một người cha, tôi hiểu. Có lẽ, Paulette và Reina cũng hiểu."
# monologue
# JP: ひかりは、ありがとうと口の中では言えている。\nけれど――けれどだ。
2492 = "Hikari đã có thể nói từ \"Cảm ơn\" ở trong miệng rồi. Thế nhưng——thế nhưng."
# 【おばあさん】
# display as 老奶奶
# JP: 「なーんもなんも、お礼をいうのはこっちの方だで」
1684 = "「Không có gì không có gì, người phải nói lời cảm ơn là tôi mới đúng.」"
# monologue
# JP: 言葉は、きちんと伝えなければ、相手の耳には届かない。\n届ける勇気を持てないのなら、どんな気持ちも届かない。
2579 = "Lời nói, nếu không được truyền đạt một cách rõ ràng, sẽ không thể chạm đến tai người nghe. Nếu không có dũng khí để truyền đạt, thì dù là cảm xúc gì cũng không thể thấu hiểu được."
# 【ひかり】
# display as 光
# JP: 「……ぅぅっ」
1292 = "「……Ư ư.」"
# monologue
# JP: ――だが、焦るまい。
1249 = "——Nhưng mà, không cần phải vội."
# monologue
# JP: どんなに遅延があったとて、レールを走り続ける限りは、\nいつか必ず、終着駅につけるのだから。
2438 = "Dù có chậm trễ đến đâu, chỉ cần tiếp tục chạy trên đường ray, thì một ngày nào đó chắc chắn sẽ đến được ga cuối."
# 【車掌】
# display as 列車長
# JP: 「たいへん長らくお待たせいたしました。接続待ちを\nしておりました特急からのお客様の乗り換えが――」
1780 = "「Xin lỗi vì đã để quý khách phải đợi lâu. Việc chờ \\x%l接続;#00ffc040;kết nối chuyển tàu%l;#; để đón hành khách từ tàu tốc hành chuyển sang đã——」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、走りますね」
1850 = "「A, tàu chạy rồi kìa.」"
# 【れいな】
# display as 玲奈
# JP: 「ひかりちゃん、ホームの人たち『ばいばーい』って」
1964 = "「Bé Hikari, nói 『Bai bai~』 với mọi người trên sân ga đi nào.」"
# 【ひかり】
# display as 光
# JP: 「はうっ！　ん～っっ」
1840 = "「Ha ư! Ưm~」"
# monologue
# JP: 『いってきます』は言えないものの、\nはにかみながら、こっそり小さく手を振り返す。
2814 = "Mặc dù không thể nói 『Con đi đây』, nhưng con bé vẫn bẽn lẽn, lén lút vẫy tay nhè nhẹ đáp lại."
# monologue
# JP: ああ、これも非常に大きな一歩だ。\nそして、列車は滑り出す――
2530 = "À, đây cũng là một bước tiến vô cùng lớn rồi. Và rồi, đoàn tàu bắt đầu lăn bánh——"
# monologue
# JP: (カタントトン、コトンタタン――)
2839 = "(Cọc cạch, cọc cạch, xình xịch, xình xịch——)"
# monologue
# JP: レールのつなぎ目をたたく音が、規則正しく繰り返される。
2777 = "Âm thanh gõ nhịp lên các mối nối đường ray, lặp đi lặp lại một cách đều đặn."
# monologue
# JP: 接続待ちの遅延を、ここではそのまま持ち越すようだ。\nゆったりゆったり、ストーブ列車はレールを進む。
2698 = "Có vẻ như sự chậm trễ do chờ \\x%l接続;#00ffc040;kết nối chuyển tàu%l;#;, sẽ được giữ nguyên ở đây. Thong thả, chậm rãi, toa xe sưởi ấm tiến bước trên đường ray."
# 【ポーレット】
# display as 波萊特
# JP: 「行商は、[なるこ,1]鳴呼でなさるんですか？」
1999 = "「Bà định bán hàng rong ở Naruko sao ạ?」"
# 【おばあさん】
# display as 老奶奶
# JP: 「[なるこ,1]鳴呼でもするし、この車内でもするよぉ」
1871 = "「Ở Naruko cũng bán, mà bán luôn ở trong toa xe này nữa cơ~」"
# 【れいな】
# display as 玲奈
# JP: 「わああ！　[しゃはん,1]車販さんですねぇ」
1811 = "「Oa a a! Vậy bà là \\x%l車販;#00ffc040;nhân viên bán hàng%l;#; trên tàu nhỉ~」"
# 【ひかり】
# display as 光
# JP: 「ぅぅ～っ」
1864 = "「Ư ư~」"
# monologue
# JP: ひかりの瞳が、おばあさんの大きな荷物にまた注がれる。\nこの車内では何を売るのか、気にしているのだ。
2501 = "Ánh mắt của Hikari lại đổ dồn vào kiện hành lý lớn của bà cụ. Chắc con bé đang tò mò xem bà sẽ bán gì trong toa xe này đây."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1274 = "「…………」"
# 【ポーレット】
# display as 波萊特
# JP: 「…………」
# 1274 = "「……」" 
# 【ひかり】
# display as 光
# JP: 「……ぁぅ」
1291 = "「……A ư.」"
# monologue
# JP: 期待をしつつしばらく待つが、\nやはりひかりの声は出ない。
2612 = "Tôi vừa kỳ vọng vừa đợi một lúc, nhưng quả nhiên Hikari vẫn không thốt nên lời."
# monologue
# JP: 仕方が無い。\n促せば、かえって緊張させてしまうだけであろうし――
2705 = "Hết cách rồi. Nếu cứ thúc giục, có khi chỉ làm con bé thêm căng thẳng thôi——"
# 【双鉄】
# display as 雙鐵
# JP: 「この車内では、どんなものが売れ線なんですか？」
1900 = "「Trong toa xe này, món nào là bán chạy nhất vậy bà?」"
# 【ひかり】
# display as 光
# JP: 「！」
# 1841 = "「啊！」" 
# monologue
# JP: ひかりの瞳が途端に輝く。\n安堵と信頼に満ちたまなざし。
2498 = "Mắt Hikari lập tức sáng rực lên. Một ánh nhìn tràn đầy sự an tâm và tin tưởng."
# monologue
# JP: 正直、かわいい。ここちいい。\nだからこそ、甘やかしすぎないようにと気を引き締める。
2768 = "Thành thật mà nói, con bé dễ thương quá. Thật dễ chịu. Chính vì thế, tôi phải xốc lại tinh thần để không quá nuông chiều con bé."
# 【おばあさん】
# display as 老奶奶
# JP: 「一番売れるのは、なんていっても」
2166 = "「Nói gì thì nói, món bán chạy nhất phải là」"
# monologue
# JP: おばあさんが行李をほどけば、\n今度はポーレットの瞳が輝く。
2724 = "Khi bà cụ tháo kiện hành lý ra, lần này đến lượt mắt Paulette sáng rực lên."
# 【ポーレット】
# display as 波萊特
# JP: 「ああ。[つ]津っ[てつ]鐵とおなじ！\nやっぱり日本酒とスルメなんですね」
1853 = "「A. Giống hệt Đường sắt Tsugaru! Quả nhiên vẫn là rượu Sake Nhật và khô mực nhỉ.」"
# 【おばあさん】
# display as 老奶奶
# JP: 「いるかい？」
1713 = "「Cháu có mua không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「もちろんです、あと、もしあったら、\n子供用の飲み物もひとつと、鮭トバも」
2135 = "「Tất nhiên là có ạ, với lại, nếu có, cho cháu một đồ uống dành cho trẻ em, và cả khô cá hồi nữa ạ.」"
# 【おばあさん】
# display as 老奶奶
# JP: 「はいはい、ありますよぉ」
1926 = "「Được rồi được rồi, có đây~」"
# 【乗客Ｄ】
# display as 乘客Ｄ
# JP: 「ね、あれ」
1824 = "「Này, cái đó kìa.」"
# 【乗客Ｃ】
# display as 乘客Ｃ
# JP: 「うん、僕たちも買おう。あの、すみません」
1874 = "「Ừ, chúng mình cũng mua thôi. Dạ, xin lỗi bà.」"
# 【おばあさん】
# display as 老奶奶
# JP: 「はぁい。少ぉしだけ待ってくなんしょ」
1716 = "「Có ngay. Đợi lão bà một chút xíu nha.」"
# monologue
# JP: ポーレットの弾んだ声が、\nはからずも、サクラの役割を果たしたらしい。
2697 = "Giọng nói đầy phấn khích của Paulette, không ngờ lại đóng vai trò như chim mồi thu hút khách hàng."
# monologue
# JP: おばあさんは、行李をまとめて――
2725 = "Bà cụ thu dọn lại kiện hành lý——"
# 【おばあさん】
# display as 老奶奶
# JP: 「それじゃあ、またねぇ、おじょうちゃん」
2231 = "「Vậy thì, hẹn gặp lại nha, cô bé.」"
# 【ひかり】
# display as 光
# JP: 「！」
# 1841 = "「啊！」" 
# monologue
# JP: ラムネを渡され、受け取って。\nそのままの姿勢で、ひかりは赤くなって硬直してしまう。
2552 = "Được đưa cho chai Ramune, con bé nhận lấy. Giữ nguyên tư thế đó, Hikari đỏ bừng mặt và cứng đờ người."
# monologue
# JP: おばあさんはにこにこ笑い、\nそのまま次の席へと向かっていく。
2722 = "Bà cụ mỉm cười tủm tỉm, rồi cứ thế tiến đến chỗ ngồi tiếp theo."
# 【ひかり】
# display as 光
# JP: 「……ぁ……ぅ」
1290 = "「……A…… ư.」"
# 【れいな】
# display as 玲奈
# JP: 「するめと鮭トバ、いいですねぇ」
2255 = "「Khô mực và khô cá hồi, tuyệt quá đi nha~」"
# monologue
# JP: のーんびりと。\nれいなが話を、空気を変える。
2684 = "Thong tha thong thả. Reina đổi chủ đề, thay đổi luôn cả bầu không khí."
# 【れいな】
# display as 玲奈
# JP: 「車掌さんが来たら、\n焼いてもらうみたいな感じですかぁ？」
2050 = "「Đợi \\x%l車掌;#00ffc040;trưởng tàu%l;#; đến, rồi nhờ nướng hộ kiểu kiểu vậy sao ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ううん。きっぷ――\nストーブ列車の指定券の裏を見て？」
1668 = "「Không đâu. Vé tàu—— Em nhìn mặt sau vé chỉ định của toa xe sưởi ấm xem?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1883 = "「Hửm?」"
# 【ひかり】
# display as 光
# JP: 「みるのー」
2173 = "「Cho con xem với~」"
# monologue
# JP: 家族四人にもどるやいなやで、\nひかりは元気を取り戻す。
2437 = "Ngay khi trở lại không gian chỉ có bốn người trong gia đình, Hikari lập tức lấy lại tinh thần."
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、はいどうぞ」
1791 = "「Ư hứ hứ, đây, con xem đi.」"
# monologue
# JP: ポーレットからきっぷを受け取る。\n裏には――なるほど、細かい文字でいろいろと――
2488 = "Con bé nhận lấy tấm vé từ Paulette. Mặt sau vé——ra là vậy, có viết rất nhiều chữ nhỏ li ti——"
# 【ひかり】
# display as 光
# JP: 「このきっぷにかんするおとりあつかいは、\nけんめんひょーじじこーのほか、ゆけむりてつどーの」
2160 = "「Quy định xử lý liên quan đến tấm vé này, ngoài những điều khoản ghi trên mặt vé, còn tuân theo của Đường sắt Yukemuri.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！！」
1889 = "「Ồ!!」"
# monologue
# JP: お取り扱い、券面表示事項、旅客営業規則どころか、\n関係約款、法令などもすらすらひかりは読んでいく。
2504 = "Từ quy định xử lý, các điều khoản ghi trên mặt vé, quy định kinh doanh hành khách, cho đến các điều khoản liên quan và luật định, Hikari đều đọc trơn tru."
# monologue
# JP: 親馬鹿と言われてしまうかもしれんが、\nわずか四歳でこの読解力。末は博士か大臣か――
2519 = "Có thể sẽ bị nói là ông bố cuồng con, nhưng mới bốn tuổi mà đã có khả năng đọc hiểu thế này. Tương lai không làm tiến sĩ thì cũng làm bộ trưởng——"
# 【ひかり】
# display as 光
# JP: 「ぁう」
1830 = "「A ư.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 1883 = "「嗯？」" 
# 【ひかり】
# display as 光
# JP: 「ぱぁぱ、これ、なんてよむのー？」
2120 = "「Ba ơi, chữ này, đọc là gì vậy ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1825 = "「À.」"
# monologue
# JP: 理解する。ひかりが読めていたものは、旧帝鉄の――\nつまり、御一夜鉄道でも同じく使われている表記部分で。
2604 = "Tôi đã hiểu ra. Những gì Hikari đọc được, là của Teitetsu cũ—— Nói cách khác, đó là phần biểu đạt cũng được sử dụng ở Đường sắt Ohito."
# monologue
# JP: それらを恐らく、丸暗記をしているだけと。
2574 = "Có lẽ con bé chỉ học thuộc lòng chúng mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「これはな、『すとーぶ』と読む」
2215 = "「Chữ này á, đọc là 『Lò sưởi』.」"
# 【ひかり】
# display as 光
# JP: 「あ、なーんだ。これがすとーぶかぁ」
1858 = "「A, ra là vậy. Đây là lò sưởi à~」"
# monologue
# JP: でなければ、ストーブのカタカナ四文字を読めないはずも\n――ああ、いや。
2751 = "Nếu không, chẳng có lý do gì con bé lại không đọc được chữ Katakana của từ lò sưởi cả ——À, khoan đã."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかり、クイズだ」
1746 = "「Hikari, đố vui nào.」"
# 【ひかり】
# display as 光
# JP: 「クイズなのー？」
2153 = "「Đố vui ạ~?」"
# monologue
# JP: メモを取り出し、書き付ける。
2607 = "Tôi lấy sổ tay ra và viết lên đó."
# 【双鉄】
# display as 雙鐵
# JP: 「これはなんと読む？」
2207 = "「Chữ này đọc là gì?」"
# 【ひかり】
# display as 光
# JP: 「えくすぷれすー！」
1994 = "「Express~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「これは？」
2206 = "「Thế còn chữ này?」"
# 【ひかり】
# display as 光
# JP: 「まいんとれじゃー！」
2116 = "「Mine Treasure~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「これ」
2203 = "「Chữ này.」"
# 【ひかり】
# display as 光
# JP: 「らむねー！」
1982 = "「Ramune~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ではこれ」
2245 = "「Vậy còn chữ này.」"
# 【ひかり】
# display as 光
# JP: 「……？？？　なぁにかなー。よめないのー」
1294 = "「……??? Chữ gì vậy ta~. Con không đọc được~」"
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、これは？」
2225 = "「Thế thì, chữ này?」"
# 【ひかり】
# display as 光
# JP: 「よめるのー！　たぶれっと！！」
2076 = "「Con đọc được nè~! \\x%lタブレット;#00ffc040;Thẻ bảng%l;#;!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「大正解！　五問中四問正解、八十点だ」
1894 = "「Hoàn toàn chính xác! Năm câu đúng bốn câu, 80 điểm.」"
# 【ひかり】
# display as 光
# JP: 「やったぁ！　はちじゅってんー」　
1907 = "「Hoan hô! 80 điểm~」"
# 【れいな】
# display as 玲奈
# JP: 「ひかりちゃん、すごいですねぇ」
1962 = "「Bé Hikari, giỏi quá đi nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「ママからも、あとでごほうびあげちゃうねー」
1942 = "「Lát nữa mẹ cũng sẽ thưởng cho con nha~」"
# 【ひかり】
# display as 光
# JP: 「わあい！」
1906 = "「Oa a!」"
# monologue
# JP: タブレット、エクスプレスは読めるのに、\n『ブレスレット』は読めない。
2642 = "Đọc được Thẻ bảng, Express, nhưng lại không đọc được 『Bracelet』 (Vòng tay)."
# monologue
# JP: つまりひかりは、知識の範囲にある言葉――\nその文字列を、『図』としてまるごと覚えている。
2452 = "Nói cách khác, với những từ ngữ nằm trong phạm vi hiểu biết—— Hikari ghi nhớ toàn bộ chuỗi ký tự đó như một 『bức tranh』."
# monologue
# JP: （とすると、むしろ日々姫寄りの才能なのかもしれん。\n博士や大臣ではなく、芸術家方面か――）
2842 = "（Nếu vậy, có lẽ con bé mang tài năng thiên về giống Hibiki hơn. Không phải tiến sĩ hay bộ trưởng, mà là thiên hướng nghệ sĩ chăng——）"
# 【ポーレット】
# display as 波萊特
# JP: 「で、ですね？　双鉄くん」
2027 = "「Vậy, đúng không ạ? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
1886 = "「Hửm!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「書いてありますよね？　そこに」
1946 = "「Có viết ở đó đúng không ạ? Ở chỗ đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――ああ、本当だ。ストーブは、\n譲り合いの上、自由に使ってかまわないのだな」
1845 = "「À——À, đúng thật. Lò sưởi thì, được phép tự do sử dụng trên tinh thần nhường nhịn lẫn nhau nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なんですよ。\nですから～、ストーブ近くは有利なんです！」
1955 = "「Chính là vậy đó ạ. Vì thế~, ở gần lò sưởi là một lợi thế đấy ạ!」"
# 【ひかり】
# display as 光
# JP: 「きゃあ！！」
1783 = "「Kyaa!!」"
# monologue
# JP: ストーブ近くに設置してあるトングをつかい、\nポーレットは楽しげに、鮭トバとスルメを並べていく。
2675 = "Sử dụng chiếc kẹp gắp đặt gần lò sưởi, Paulette vui vẻ xếp khô cá hồi và khô mực lên trên."
# 【乗客Ｃ】
# display as 乘客Ｃ
# JP: 「あの、これ、自由に使っていいんですか？」
2223 = "「Xin lỗi, cái này, có được dùng tự do không vậy?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。きっぷにも書いてあります。\nやけどに気をつけてくださいね？」
2068 = "「Vâng. Trên vé cũng có ghi đấy ạ. Mọi người cẩn thận kẻo bị bỏng nhé?」"
# 【乗客Ｄ】
# display as 乘客Ｄ
# JP: 「ありがとうございます。\nじゃ、端っこつかわせてもらいますね」
2171 = "「Cảm ơn cô.\nVậy, cho tôi dùng nhờ một góc mép nhé.」"
# 【ひかり】
# display as 光
# JP: 「わ」
1802 = "「Oa.」"
# monologue
# JP: れいなの陰に素早く隠れたひかりがじいっと、\nストーブの上に置かれたものを見る。
2507 = "Nhanh chóng trốn ra sau lưng Reina, Hikari chăm chú, nhìn những thứ được đặt trên lò sưởi."
# monologue
# JP: 甘やかしてはならぬと思うが、\n僕も純粋に興味があるので、聞いてみる。
2813 = "Tôi nghĩ không nên chiều chuộng con bé quá, nhưng bản thân tôi cũng thực sự tò mò, nên đã thử hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「焼かれているのは、何ですか？」
2002 = "「Thứ đang nướng đó, là gì vậy ạ?」"
# 【乗客Ｃ】
# display as 乘客Ｃ
# JP: 「なにっていったっけ？　ええっと――」
2213 = "「Gọi là gì ấy nhỉ? Ờm——」"
# 【乗客Ｄ】
# display as 乘客Ｄ
# JP: 「『おやき』って。なんか、\n地元のお野菜とか入ってるっておはなしでした」
2052 = "「Là 『Oyaki』 (bánh nướng). Nghe nói, bên trong có nhân rau củ địa phương gì đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わ。あんこじゃなくて、野菜入りなんですか」
1800 = "「Oa. Không phải nhân đậu đỏ, mà là nhân rau củ sao.」"
# 【乗客Ｄ】
# display as 乘客Ｄ
# JP: 「見えますよね、あんこはいってそうに。\nでも、こっちの方だとあんこ入りは邪道だそうです」
2056 = "「Nhìn giống nhân đậu đỏ lắm đúng không. Nhưng nghe nói ở vùng này, bánh Oyaki nhân đậu đỏ bị coi là tà đạo đấy.」"
# 【乗客Ｃ】
# display as 乘客Ｃ
# JP: 「って、売ってくれたおばあさんが言ってました」
2178 = "「Bà cụ bán bánh đã nói thế đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどなるほど」
1759 = "「Ra là vậy, ra là vậy.」"
# monologue
# JP: ストーブを囲み、見知らぬ旅客としばし語らう。\nこの楽しみは、エアクラでは決して味わえない。
2617 = "Quây quần bên lò sưởi, trò chuyện dăm ba câu với những hành khách xa lạ. Niềm vui này, tuyệt đối không thể nào nếm trải được trên Aircra."
# monologue
# JP: っと――
2559 = "À phải rồi——"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、そろそろよさそうだぞ」
2100 = "「Paulette, có vẻ sắp được rồi đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、ほんと」
1848 = "「A, đúng thật.」"
# monologue
# JP: 順番待ちの列も出来ている。\n少し早いかもしれないが、それもまた旅の味だろう。
2649 = "Hàng người chờ đến lượt cũng đã bắt đầu hình thành. Có lẽ hơi sớm một chút, nhưng đó cũng lại là một hương vị của chuyến đi."
# 【れいな】
# display as 玲奈
# JP: 「マヨネーズ使いますかぁ？」
2164 = "「Mọi người có dùng Mayonnaise không ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん、紙皿の端っこにだしといて」
1882 = "「Ừm, em nặn ra mép đĩa giấy giúp chị nhé.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
1923 = "「Vâng ạ~」"
# 【乗客Ｃ】
# display as 乘客Ｃ
# JP: 「あ、すみません」
1842 = "「À, xin lỗi.」"
# 【ひかり】
# display as 光
# JP: 「ひゃっ！？」
1784 = "「Hya!?」"
# monologue
# JP: 背後からのいきなりの声に、\nひかりが驚き身をすくめる。
2730 = "Bị tiếng gọi đột ngột từ phía sau làm cho giật mình, Hikari rúm người lại."
# monologue
# JP: さっきのカップルの男性だ。
2802 = "Là người đàn ông của cặp đôi lúc nãy."
# 【双鉄】
# display as 雙鐵
# JP: 「はい、どうしました？」
1880 = "「Vâng, có chuyện gì vậy ạ?」"
# 【乗客Ｃ】
# display as 乘客Ｃ
# JP: 「マヨネーズ、少しわけてもらうことって出来ます？\nマヨネーズって聞いたら、合いそうだって思っちゃって」
2154 = "「Có thể chia cho chúng tôi một chút Mayonnaise được không? Nghe nhắc đến Mayonnaise, tôi nghĩ chắc là sẽ hợp với món này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、おやすいご用です。れいな」
1857 = "「À, chuyện nhỏ thôi. Reina.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。ええと、どこにつけますかー？」
1715 = "「Vâng ạ~. Ừm, anh muốn xịt vào đâu ạ~?」"
# 【乗客Ｃ】
# display as 乘客Ｃ
# JP: 「あ、おやきに直接いっちゃって」
1851 = "「A, xịt thẳng lên Oyaki luôn đi.」"
# 【乗客Ｄ】
# display as 乘客Ｄ
# JP: 「わたしのも、お願いしちゃっていいですか？」
2159 = "「Của tôi nữa, có phiền không nếu tôi cũng xin một chút?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、つけますねー」
1933 = "「Vâng ạ~, em xịt cho chị nha~」"
# 【乗客Ｃ】
# display as 乘客Ｃ
# JP: 「うれしいなぁ。ありがとうございます」
1904 = "「Thích quá. Cảm ơn cô bé nhiều nha.」"
# 【乗客Ｄ】
# display as 乘客Ｄ
# JP: 「驚かせちゃってごめんなさい」
1890 = "「Xin lỗi vì đã làm cháu giật mình nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえいえ」
2085 = "「Không sao đâu ạ.」"
# monologue
# JP: ひかりが驚いたのは気の毒だったが、\nこんな交流もストーブ列車ならではだ。
2815 = "Dù hơi tội nghiệp cho Hikari vì bị giật mình, nhưng những màn giao lưu thế này cũng là nét đặc trưng chỉ có ở toa xe sưởi ấm."
# monologue
# JP: ひかりもすぐさま復帰して、\n皿の端のマヨネーズと鮭トバとを交互に眺める。
2660 = "Hikari cũng ngay lập tức hồi phục, đưa mắt nhìn luân phiên giữa phần Mayonnaise ở mép đĩa và miếng khô cá hồi."
# 【ひかり】
# display as 光
# JP: 「おいしそーなのー」
