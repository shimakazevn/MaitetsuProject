# monologue
# JP: 声にあわせて、獲得したカードを場に重ねていく。\n６、７――
2508 = "Hòa cùng tiếng đếm, những tấm thẻ giành được xếp chồng lên nhau. 6, 7——"
# 【ポーレット】
# display as 波萊特
# JP: 「『はーち』は、わたし出せませーん。負けー！\nひかり、ママの分もがんばって！」
1269 = "「『Tám』thì, mẹ không ra được nữa rồi. Thua mất rồi! Hikari, cố gắng cả phần của mama nữa nhé!」"
# 【ひかり】
# display as 光
# JP: 「がんばるのー！」
1928 = "「Cháu sẽ cố gắng!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1830 = "「唔」" 
# monologue
# JP: ひかりは眼光するどく僕を見据えてくる。
2500 = "Hikari nhìn chằm chằm tôi với ánh mắt sắc lẹm."
# monologue
# JP: いい傾向――のような気はするのだが、\n敵役を任されたのは、正直切ない。
2811 = "Có vẻ như là một chiều hướng tốt—— nhưng thành thật mà nói, việc bị giao vai phản diện cũng hơi đau lòng."
# 【双鉄】
# display as 雙鐵
# JP: 「――そうはいかん。僕とてむざむざ負けはせん」
1263 = "「——Không dễ thế đâu. Tôi cũng không dễ dàng chịu thua đâu.」"
# 【ひかり】
# display as 光
# JP: 「むむーっ！」
1831 = "「Mumu-!」"
# monologue
# JP: が、ひかりがそれを望むのならば、\n僕は喜んで悪役にさえ徹しよう。
2443 = "Nhưng, nếu Hikari mong muốn điều đó, tôi sẽ sẵn lòng đóng trọn vai ác."
# 【双鉄】
# display as 雙鐵
# JP: 「『九』」
1267 = "「『Chín』」"
# 【ひかり】
# display as 光
# JP: 「『じゅー！』」
1271 = "「『Mười!』」"
# 【双鉄】
# display as 雙鐵
# JP: 「は、僕には出せない。\n残念！　負けた！」
1828 = "「Thì, tôi không thể ra được nữa.\nTiếc quá! Thua rồi!」"
# 【ひかり】
# display as 光
# JP: 「かったー！！」
2179 = "「Thắng rồi!!」"
# 【れいな】
# display as 玲奈
# JP: 「結果を集計しますねぇ」
2128 = "「Để Reina tổng hợp kết quả nha」"
# monologue
# JP: わかりきっていることをれいなは、\nもったいぶって、あおってみせる。
2688 = "Reina cố tình tỏ ra vẻ quan trọng, khuấy động bầu không khí dù kết quả đã rõ rành rành."
# 【れいな】
# display as 玲奈
# JP: 「ポーレットが７組。そうてつさんが９組。\nひかりちゃんが１０組！　ひかりちゃんの優勝でぇす！」
2099 = "「Chị Paulette 7 cặp. Anh Soutetsu 9 cặp. Bé Hikari 10 cặp! Bé Hikari vô địch rồi ạ!」"
# 【ひかり】
# display as 光
# JP: 「やったぁ！　ゆうしょー！！」
1908 = "「Hoan hô! Vô địch rồi!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ひかり、優勝おめでとう！」
1744 = "「Hikari, chúc mừng con vô địch!」"
# 【双鉄】
# display as 雙鐵
# JP: 「悔しいが、完敗だ。最後に見事にまくられたな」
2065 = "「Dù rất tiếc nhưng là thất bại hoàn toàn. Cuối cùng lại bị lật ngược tình thế một cách ngoạn mục nhỉ.」"
# 【ひかり】
# display as 光
# JP: 「むふー」
1868 = "「Muhu-」"
# 【観光協会】
# display as 旅游協会
# JP: 「ご歓談中、失礼します」
2034 = "「Xin lỗi vì đã cắt ngang cuộc trò chuyện vui vẻ」"
# 【ひかり】
# display as 光
# JP: 「きゃあ」
1782 = "「Kyaa」"
# monologue
# JP: 突然の声。\nひかりはポーレットの陰に隠れる。
2729 = "Giọng nói vang lên đột ngột. Hikari trốn sau lưng Paulette."
# 【観光協会】
# display as 旅游協会
# JP: 「わたしたちは、[やまがた,1]山縣の観光協会のものです」
2015 = "「Chúng tôi là người của Hiệp hội Du lịch Yamagata」"
# 【双鉄】
# display as 雙鐵
# JP: 「[やまがたの,1]山縣の？」
1968 = "「Của Yamagata?」"
# monologue
# JP: 何故山縣から――\n聞くより早く、待ってましたといわんばかりの答えが返る。
2677 = "Tại sao lại từ Yamagata—— Chưa kịp hỏi, một câu trả lời như thể đã chờ sẵn được đưa ra."
# 【観光協会】
# display as 旅游協会
# JP: 「この列車の終点。[なるこ,1]鳴呼から[ふたえき,1]二駅いけば、\nもう山縣に入るんですよ」
1989 = "「Điểm cuối của chuyến tàu này. Từ Naruko đi thêm hai ga nữa, là sẽ vào địa phận Yamagata rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんと。[なるこ,1]鳴呼は[しゅうたん,1]終端駅ではなかったのか」
1761 = "「Ra vậy. Naruko không phải là ga cuối cùng sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですよ？　ストーブ列車が走るのは[なるこ,1]鳴呼まで\nですけど――その先、[なかやまだいら,2]仲山平、[あかくら,1]朱蔵、[しおみ,1]汐見へと走ります」
1956 = "「Đúng vậy đó? Tàu sưởi ấm chỉ chạy đến Naruko thôi nhưng——sau đó, nó sẽ chạy tiếp đến Nakayamadaira, Akakura, Shiomi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1888 = "「噢」" 
# monologue
# JP: 僕とて、御一夜の――
2809 = "Tôi cũng là một người của Ohimitera——"
# monologue
# JP: それも一時期とはいえ市政の一端を担い、\n観光に携わった人間だ。
2467 = "Dù chỉ là một thời gian ngắn, nhưng cũng từng gánh vác một phần chính quyền thành phố, là người từng tham gia vào ngành du lịch."
# 【双鉄】
# display as 雙鐵
# JP: 「すべて有名な温泉地だな。\nなるほど、それゆえの『[ゆけむり,1]湯煙鉄道』か」
2202 = "「Tất cả đều là những khu suối nước nóng nổi tiếng nhỉ. Ra vậy, vì thế mới gọi là 『Đường sắt Yukemuri』 sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですです」
2089 = "「Đúng vậy, đúng vậy」"
# 【観光協会】
# display as 旅游協会
# JP: 「山縣にも是非とも足を伸ばしていただきたくて、\n今日は、パンフレットと抽選券を皆様にお配りしてます」
2013 = "「Chúng tôi rất mong mọi người sẽ ghé thăm Yamagata, nên hôm nay, chúng tôi đang phát tờ rơi và vé bốc thăm trúng thưởng cho mọi người.」"
# 【ひかり】
# display as 光
# JP: 「ちゅーせんけん？」
2040 = "「Vé bốc thăm?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1841 = "「啊！」" 
# monologue
# JP: 見知らぬ他人の前というのに、\nひかりがはっきりとした声を出す。
2463 = "Dù đang ở trước mặt người lạ, nhưng Hikari lại cất giọng rất rõ ràng."
# monologue
# JP: 姿は残念、ポーレットの陰にかくれたままだが。
2442 = "Đáng tiếc là dáng vẻ vẫn đang trốn sau lưng Paulette."
# 【れいな】
# display as 玲奈
# JP: 「抽選券は、クジびきの券のことですよぉ」
2039 = "「Vé bốc thăm là vé để rút thăm trúng thưởng đó nha~」"
# 【ひかり】
# display as 光
# JP: 「くじびき！！」
1696 = "「Rút thăm trúng thưởng!!」"
# monologue
# JP: ひかりの鼻息が荒くなる。\nなるほど――と理解させられる。
2494 = "Hơi thở của Hikari trở nên gấp gáp. Ra vậy——tôi đã hiểu ra."
# monologue
# JP: くじびきが嫌いな子供はいないし、\n子供の興味を引いてしまえば、親は引きずられるものだ。
2659 = "Không có đứa trẻ nào ghét rút thăm trúng thưởng cả, và một khi đã thu hút được sự chú ý của trẻ con, thì phụ huynh cũng sẽ bị cuốn theo."
# monologue
# JP: （観光地間をつなぎ、宣伝広告を集約し、\n地域全体へのリピーターを増やすという作戦か）
2845 = "（Kết nối các điểm du lịch, tập trung quảng cáo tuyên truyền, là chiến lược nhằm tăng lượng khách quay lại cho toàn khu vực sao）"
# monologue
# JP: そのためのツールとしての、鉄道活用。\nこれならば地域全体の財産として、出資も促しやすかろう。
2532 = "Việc tận dụng đường sắt như một công cụ cho mục đích đó. Nếu vậy thì với tư cách là tài sản của toàn khu vực, việc kêu gọi đầu tư cũng sẽ dễ dàng hơn."
# 【観光協会】
# display as 旅游協会
# JP: 「はい、どうぞ。山縣[みやげ,1]土産もはいってます」
2151 = "「Vâng, xin mời. Trong này có cả đặc sản Yamagata nữa đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます」
2172 = "「Cảm ơn rất nhiều」"
# monologue
# JP: 観光協会の人たちのはっぴ姿が見えなくなれば、\nひかりは元の位置へと戻る。
2638 = "Khi bóng dáng mặc áo happi của những người từ Hiệp hội Du lịch khuất đi, Hikari liền trở về vị trí cũ."
# 【ひかり】
# display as 光
# JP: 「おみやげ、なぁにー？」
1898 = "「Đặc sản là gì thế ạ?」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレットぉ、あけてみてくださぁい」
2102 = "「Chị Paulette ơi, mở ra xem thử đi ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「はいはい」
# 1923 = "「好的」" 
# monologue
# JP: もらった封筒の中には、多色刷りの、\nいかにもお金がかかっていそうなパンフレット。
2590 = "Bên trong phong bì nhận được là một tờ rơi in nhiều màu, trông có vẻ rất tốn kém."
# monologue
# JP: そして厚紙を二つ折りしてマジックで数字を書いた、\n実に素朴な抽選券と――
2800 = "Cùng với một chiếc vé bốc thăm rất mộc mạc, được làm từ bìa cứng gập đôi và viết số bằng bút lông——"
# 【ひかり】
# display as 光
# JP: 「おまんじゅう！」
1756 = "「Bánh bao!」"
# 【ポーレット】
# display as 波萊特
# JP: 「じゃなくて、和風ケーキだって。\n山縣でプッシュしてるものなのかしらねー」
1683 = "「Không phải đâu, là bánh ngọt kiểu Nhật đấy. Chắc là món mà Yamagata đang đẩy mạnh quảng bá nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「山縣も食べ物がおいしそうな印象があるからな。\n楽しみだ」
2022 = "「Yamagata cũng mang lại ấn tượng là có nhiều đồ ăn ngon mà. Đáng mong chờ đây.」"
# monologue
# JP: 座席ひとつに一袋ずつ、四つの封筒を置いていってくれた。
2461 = "Họ đã để lại bốn phong bì, mỗi ghế một túi."
# monologue
# JP: パンフレットの被りは正直困るだけだが、\n抽選券とお菓子は素直にありがたい。
2810 = "Việc trùng lặp tờ rơi thành thật mà nói chỉ gây thêm rắc rối, nhưng vé bốc thăm và bánh kẹo thì quả thực rất đáng mừng."
# 【ポーレット】
# display as 波萊特
# JP: 「じゃ、食べましょう」
2238 = "「Vậy, cùng ăn thôi nào」"
# 【ひかり】
# display as 光
# JP: 「ひかり、やきたいのー」
1730 = "「Hikari, muốn nướng cơ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、それは名案だ」
1954 = "「Ra vậy, đó là một ý kiến hay đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「じゃ、ひかりと双鉄くんのは焼いて――\nれいなは？」
2235 = "「Vậy, phần của Hikari và anh Soutetsu sẽ nướng nhé—— Còn Reina thì sao?」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、このままでいいですよぉ」
2132 = "「Reina cứ để thế này là được rồi ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「じゃ、れいなとわたしはこのまま組」
2249 = "「Vậy, Reina và tôi sẽ thuộc đội để nguyên」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕が焼いてみよう」
2232 = "「Vậy thì, để tôi nướng thử xem sao.」"
# 【ひかり】
# display as 光
# JP: 「ひかりもやきたいのー」
1727 = "「Hikari cũng muốn nướng cơ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「よしよし、じゃあ、トングを任せるぞ」
1925 = "「Được rồi, vậy thì giao kẹp gắp cho cháu đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「火傷させないように気をつけてくださいね」
1965 = "「Hãy cẩn thận đừng để con bé bị bỏng nhé」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、くれぐれも気をつける」
1876 = "「Ừm, tôi sẽ hết sức cẩn thận.」"
# monologue
# JP: ストーブからかなり離してひかりを抱っこし、\nトングを持った手を伸ばさせる。
2605 = "Tôi bế Hikari cách khá xa lò sưởi, và để con bé vươn tay cầm kẹp gắp ra."
# 【双鉄】
# display as 雙鐵
# JP: 「上手だ。\nそのまま、和風ケーキを網に載せよう」
1986 = "「Giỏi lắm. Cứ thế, đặt bánh ngọt kiểu Nhật lên vỉ nướng nào.」"
# 【ひかり】
# display as 光
# JP: 「のせるのー。えいっ！」
2043 = "「Đặt lên nè. Ây da!」"
# 【双鉄】
# display as 雙鐵
# JP: 「上出来だ」
1717 = "「Làm tốt lắm.」"
# 【ひかり】
# display as 光
# JP: 「ひかり、おまんじゅうやいたのー！」
1733 = "「Hikari, đã nướng bánh bao rồi này!」"
# 【れいな】
# display as 玲奈
# JP: 「そうてつさぁん！　けむり、けむりでてますよぉ！」
2251 = "「Anh Soutetsu ơi! Khói, có khói bốc lên kìa ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おおお！？」
1822 = "「Ô ồ!?」"
# monologue
# JP: 薄皮なのか、あっという間に煙が出てきた。
2522 = "Có lẽ do vỏ mỏng, nên khói bốc lên chỉ trong nháy mắt."
# 【ひかり】
# display as 光
# JP: 「しゅっしゅー！　ぽっぽー！！」
1795 = "「Xình xịch! Tu tu!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「黒煙だぞ！　不完全燃焼だ」
2212 = "「Khói đen đấy! Cháy không hoàn toàn rồi.」"
# monologue
# JP: 軽口をたたいている場合ではない。
2790 = "Không phải lúc để nói đùa."
# monologue
# JP: ひかりの手からトングを受け取り、\nすぐ裏返し――
2597 = "Tôi nhận lấy kẹp gắp từ tay Hikari, và lật nó lại ngay lập tức——"
# 【ひかり】
# display as 光
# JP: 「またけむりー！」
1773 = "「Lại có khói nữa kìa!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ。これは焼くには不向きだったか」
1833 = "「Ừm. Có vẻ món này không thích hợp để nướng nhỉ.」"
# monologue
# JP: あわてて紙皿の上に落とすが、\n表面は焦げ、恐らく中にまで熱はとおっていない。
2602 = "Tôi vội vàng gắp nó ra đĩa giấy, nhưng bề mặt đã bị cháy sém, và có lẽ nhiệt vẫn chưa thấm vào bên trong."
# 【ひかり】
# display as 光
# JP: 「ひかりがやいたのー！　おいしそーなのー！」
2210 = "「Hikari đã nướng đấy! Trông ngon quá đi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「――だな。"おいしそう"だ」
2058 = "「——Đúng vậy. \"Trông ngon\" đấy.」"
# monologue
# JP: 考えてみれば、これはひかりが、\n『生まれて初めて焼いたお菓子』だ。
2456 = "Nghĩ lại thì, đây là 『món bánh đầu tiên Hikari tự nướng trong đời』."
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1841 = "「啊！」" 
# 【れいな】
# display as 玲奈
# JP: 「ああっ」
1837 = "「A á」"
# monologue
# JP: それに気づいて、\nポーレットとれいながうらやましそうな顔になる。
2578 = "Nhận ra điều đó,\nPaulette và Reina lộ vẻ mặt ghen tị."
# 【双鉄】
# display as 雙鐵
# JP: 「焼いてない方も食べてみたい。\nポーレット、半分こずつ交換しないか？」
2006 = "「Tôi cũng muốn ăn thử phần chưa nướng. Paulette, chúng ta trao đổi mỗi người một nửa nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わ！　いいんですか。ありがとうございます！」
1808 = "「Oa! Được sao ạ. Cảm ơn anh rất nhiều!」"
# 【ひかり】
# display as 光
# JP: 「はんぶんこ、ひかりもしたいのー。ね、れいなぁ」
1726 = "「Chia một nửa, Hikari cũng muốn làm cơ~. Nhé, Reina~」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、だいかんげいですよぉ」
1921 = "「Vâng ạ, vô cùng hoan nghênh luôn nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、いただきます、だ」
2240 = "「Vậy thì, xin phép được thưởng thức.」"
# 【ひかり】
# display as 光
# JP: 「いただきまー　（あむっっ）　んふー！\nあちゅーい！　おいしー！！」
2250 = "「Xin phép được thưởng thứ— （Ngoạm） Nhu~! Nóng quá! Ngon quá!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ほんと。これ、お米つかってるのかな？\nお焦げもいいアクセントになってて」
2139 = "「Thật đấy. Cái này, có phải dùng gạo không nhỉ? Phần cháy sém cũng tạo nên điểm nhấn rất ngon.」"
# 【れいな】
# display as 玲奈
# JP: 「焼いてないほうもおいしいですよぉ」
2086 = "「Phần chưa nướng cũng ngon lắm đó nha~」"
# 【観光協会】
# display as 旅游協会
# JP: 「みなさま、お待たせいたしました。\nいまから、当選番号を発表します」
1778 = "「Xin lỗi vì đã để quý vị phải chờ đợi. Bây giờ, chúng tôi sẽ công bố con số trúng thưởng.」"
# monologue
# JP: 通路向こうからの大きな声。\nひかりの瞳がきらりと輝く。
2797 = "Giọng nói lớn vọng lại từ phía bên kia lối đi. Đôi mắt của Hikari sáng lên lấp lánh."
# 【ひかり】
# display as 光
# JP: 「くじびきー！！」
2041 = "「Rút thăm trúng thưởng!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「れいな、わたしたちの番号は？」
2134 = "「Reina, số của chúng ta là gì vậy?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。１４と、９と、２２と、１６ですねぇ」
2127 = "「Vâng ạ. Là 14, 9, 22 và 16 đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1830 = "「唔」" 
# monologue
# JP: 席数はざっと見で４０以上。\nずいぶんと若い番号が固まった。
2540 = "Nhìn lướt qua thì số ghế phải hơn 40. Toàn là những con số khá nhỏ tập trung lại."
# 【観光協会】
# display as 旅游協会
# JP: 「当選番号は――――３２です！」
1695 = "「Con số trúng thưởng là――――32!」"
# 【ひかり】
# display as 光
# JP: 「あたった！？」
1694 = "「Trúng rồi á!?」"
# 【れいな】
# display as 玲奈
# JP: 「ざぁんねん。はずれですー」
1988 = "「Tiếc quá đi. Trượt mất rồi~」"
# 【ひかり】
# display as 光
# JP: 「はずれかぁ～」
1762 = "「Trượt rồi sao~」"
# monologue
# JP: ひかりががっくりうなだれる。
2487 = "Hikari ủ rũ gục đầu xuống."
# monologue
# JP: 残念なことだが、こればかりは――
2812 = "Thật đáng tiếc, nhưng chuyện này thì——"
# monologue
# JP: （つん、つん）
2843 = "（Chọc, chọc）"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 1883 = "「嗯？」" 
# monologue
# JP: 振り返れば、さっきのカップルの男性だ。\n人差し指で『し～』っと合図し、僕になにやら――
2592 = "Quay lại nhìn, là người đàn ông của cặp đôi lúc nãy. Anh ta dùng ngón trỏ ra hiệu 『Suỵt~』, và đưa cho tôi thứ gì đó——"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1841 = "「啊！」" 
# monologue
# JP: 『３２』――まさかの当たりくじだ。\nそれを僕へと押しつけて――
1258 = "『32』——Không ngờ lại là vé trúng thưởng. Anh ta ấn nó vào tay tôi——"
# 【乗客Ｃ】
# display as 乘客Ｃ
# JP: 「おたがい、いいとこ見せましょう」
1799 = "「Chúng ta hãy cùng nhau thể hiện mặt tốt của mình nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1867 = "「嗯」" 
# monologue
# JP: 僕は、ひかりに。\nそして彼は、カップルのお相手に。
2619 = "Tôi thì thể hiện với Hikari. Còn anh ta thì thể hiện với người bạn gái của mình."
# monologue
# JP: なるほど、お互いにいいところを見せる、\nこれはチャンスか。
2700 = "Ra vậy, cùng nhau thể hiện mặt tốt, đây là một cơ hội sao."
# 【双鉄】
# display as 雙鐵
# JP: 「感謝する」
1901 = "「Cảm ơn anh.」"
# 【乗客Ｃ】
# display as 乘客Ｃ
# JP: 「マヨネーズのお礼ってことで」
2017 = "「Coi như là để cảm ơn chuyện lọ mayonnaise.」"
# monologue
# JP: 情けは人のためならず。\nそんな言葉を思い出す。
2599 = "Làm việc tốt cho người khác cũng là làm cho chính mình. Tôi nhớ đến câu nói đó."
# monologue
# JP: れいなの手から外れくじを受け取り、渡し――
2598 = "Tôi nhận lấy chiếc vé trượt từ tay Reina, và đưa lại——"
# 【双鉄】
# display as 雙鐵
# JP: 「ひかり。たいへんだ」
1722 = "「Hikari. Có chuyện lớn rồi.」"
# 【ひかり】
# display as 光
# JP: 「たいへんなのー？」
1681 = "「Chuyện lớn sao~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うっかり見間違えをしていた。\nひかりのくじは、これだった。３２番だ」
1877 = "「Ừ, tôi đã vô tình nhìn nhầm. Vé của Hikari là cái này. Số 32.」"
# 【ひかり】
# display as 光
# JP: 「さんじゅーにばん？」
2264 = "「Số 32 ạ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええ！　すごい！　３２番ってあたりくじ」
1705 = "「Ế! Tuyệt quá! Số 32 là vé trúng thưởng mà.」"
# 【れいな】
# display as 玲奈
# JP: 「わぁ！　ひかりちゃんすごいですぅ！！」
1810 = "「Oa! Bé Hikari giỏi quá đi!!」"
# 【ひかり】
# display as 光
# JP: 「たいへんなのー！！」
1680 = "「Chuyện lớn rồi!!」"
# 【観光協会】
# display as 旅游協会
# JP: 「おお！　ご当選ですか！？　おめでとーございます！」
1827 = "「Ồ! Quý khách trúng thưởng rồi sao!? Xin chúc mừng!」"
# 【ひかり】
# display as 光
# JP: 「きゃあ！」
1806 = "「Kyaa!」"
# monologue
# JP: 観光協会の人がくれば、\nひかりはまたも、今度は僕の陰へと隠れ――
2639 = "Khi người của Hiệp hội Du lịch tiến đến, Hikari lại một lần nữa trốn đi, lần này là trốn sau lưng tôi——"
# 【ひかり】
# display as 光
# JP: 「……ゆき」
1298 = "「……Tuyết.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 1883 = "「嗯？」" 
# 【ひかり】
# display as 光
# JP: 「ゆき！　ゆき！！！　ゆき！！！！！」
2253 = "「Tuyết! Tuyết!!! Tuyết!!!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おおお！」
1862 = "「Ô ồ!」"
# monologue
# JP: 車窓の外が、真っ白だ。\nいつの間に――いや――
2774 = "Bên ngoài cửa sổ tàu, một màu trắng xóa. Từ lúc nào——không——"
# monologue
# JP: これは、トンネルを抜ければそこは、というやつなのか。
1256 = "Đây có phải là cái gọi là, vừa qua khỏi đường hầm là sẽ thấy sao."
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、雪がこんなに降ってきたってことは」
1793 = "「Ufufu, tuyết rơi nhiều thế này có nghĩa là」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1867 = "「嗯」" 
# monologue
# JP: 観光協会の人からもらった景品だろう。
2674 = "Chắc là phần thưởng nhận được từ người của Hiệp hội Du lịch."
# monologue
# JP: 野菜どっさりの袋をかかえ、\nポーレットは、どこか懐かしげに目を細める。
2547 = "Ôm lấy chiếc túi chứa đầy rau củ, Paulette nheo mắt lại với vẻ hoài niệm."
# 【ポーレット】
# display as 波萊特
# JP: 「もうすぐ終点。[なるこ,1]鳴呼です」
1751 = "「Sắp đến điểm cuối rồi. Là Naruko.」"
