# monologue
# JP: 顔を外して姿勢を戻せば、\n机の上で、ポーレットは完全に溶けきっている。
1289 = "在我抽身站起的時候，桌子上的波萊特已經舒服得升天了。" 

# monologue
# JP: 口はぽかんと開きっぱなしで、\n可愛い舌が、よだれまみれでこぼれ出ている。
1307 = "她的小嘴已經合不攏，沾滿唾液的可愛舌頭露在了外面。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット」
# 1083 = "「波萊特」" 

# monologue
# JP: （ぐっ――）
1694 = "（頂上）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ――おちん、ちん――んっ――\n双鉄、くんの――おちん、ちんっ――んうっ」
983 = "「啊——雞雞——嗯——雙鐵君的——雞雞——嗯」" 

# monologue
# JP: 入り口に軽く押し当てたなら、\nポーレットはもぞもぞおしりを振って、僕を求める。
1383 = "我把陽具輕輕抵在入口處，波萊特就扭動起屁股，渴求著我的進入。" 

# monologue
# JP: ならばもう、言葉も掃除も十分だ。\nここから先は、お互いがただ望むとおりに――
1541 = "話也說夠了，下面也清理好了。接下來就只管順從內心的欲望——" 

# monologue
# JP: （ずっ――ずりゅっ――）
# 1660 = "（插入）" 

# 【ポーレット】
# display as 波萊特
# JP: 「きゃふっ！　あっ――ふとっ――太、いっ――」
942 = "「呀！啊——好粗——好粗——」" 

# monologue
# JP: ポーレットの膣が狭くなったのかと思ったが、\nあるいは僕が、普段以上に勃起しているのかもしれない。
1484 = "波萊特的花徑變得更窄了，也或者是因為我比平常勃起得更厲害了吧。" 

# monologue
# JP: （ずっ――ぷっ――ずりっ――むりゅっ――）
1681 = "（用力插入）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぃ――ぁっ――ごり――って――んっ――ふ――\nおま――んこ――ひろげ――られ、て――ひゅあっ」
964 = "「咿——啊——撐開了——嗯——呼——小穴被撐開了——嗯啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぉ――くっ――」
978 = "「啊——呃——」" 

# monologue
# JP: キツイ。狭い。ぬるぬるしてる。
1320 = "好緊，好窄，好濕。" 

# monologue
# JP: 張り付く肉を割って押し進むと同時、\n僕の勃起も、めくられてると感じるほどの圧迫感。
1290 = "在我撐開蜜肉向裡推進的同時，肉棒也感受到了強烈的壓迫感。" 

# 【ポーレット】
# display as 波萊特
