1404 = "我腦子裡只剩下一個想法，那就是把精液射在波萊特的子宮裡，把她塗成我的顏色。" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっ――いまっ――ひっ――あっ――\nわら――ひっ――イっ――イって――るっ――んっ」
927 = "「呀——剛才——呀——啊——我已經——丟了——嗯」" 

