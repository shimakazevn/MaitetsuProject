1548 = "Kết quả là tinh dịch bắn ra với lực mạnh\nchưa từng thấy, đập vào\nbức tường sâu thẳm\ncủa Paulette, gọi mời sự co giật của vách\nthịt âm đạo——"

# monologue
# JP: （びゅうっ！　びゅっ！　びゅるるっ――ぷっ）
1650 = "（Phụt! Phụt! Phụttt——phụt）"

