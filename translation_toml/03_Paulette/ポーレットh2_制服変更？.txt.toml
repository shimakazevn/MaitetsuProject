1480 = "Tử cung của Paulette lại bắt đầu mút mát.\nLần này, tôi sẽ không trốn tránh. Không\nrụt hông lại."

# monologue
# JP: 最高の射精をふたりで同時に味わうために、\nただひたすらに、押し込んだ腰をさらに押し込みっ――
1494 = "Để cả hai cùng lúc tận hưởng khoái cảm\nxuất tinh tuyệt vời nhất,\ntôi chỉ biết đâm\nhông vào, đâm sâu hơn nữa——"

# monologue
