1055 = "「我本來是這麼想的，但是判斷的依據還不夠。我覺得還要檢查一下耐磨性」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふわ」
966 = "「哈哈」" 

# monologue
# JP: ポーレットの顔がみるみる緩む。\n嬉しげな頷きが返される。
1489 = "波萊特笑逐顏開，點頭回應著我。" 

# monologue
# JP: （ズブッ！！！！）
1644 = "（噗呲！！！！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んひゅううううううううううっ！！！」
1021 = "「嗯啊啊啊啊！！！」" 

# monologue
# JP: ならば、試験を続けよう。
1552 = "那我們就繼續試驗吧。" 

# monologue
# JP: ポーレットか僕が擦り切れるまで、\n徹底的に、何度も、何度も、何度でも。
1295 = "在波萊特或者我徹底磨破之前，來徹徹底底地、一次又一次地測試。" 
