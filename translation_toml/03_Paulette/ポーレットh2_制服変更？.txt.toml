1344 = "強烈的快感讓我不由地向後抽身，整個陽具就被肉摺按壓了一遍。" 

# monologue
# JP: 精液が一気に押し上げられて、\n自分で自分の勃起が膨らんでるのがわかる。
1514 = "精液一下子就湧了上來，我能清晰地感覺到分身的膨脹。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あっ――むりっ――これっ――\nわたし――またっ――またっ――イクっ！」
954 = "「呼——啊——不行——這個——我又要——又要——丟掉了！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「もう――少し――くっ――あっ――\nイクなら――、一緒にっ――」
909 = "「再等一會——呃——啊——要丟的話——就一起——」" 

# 【ポーレット】
# display as 波萊特
