1330 = "就好像是我一口氣把分身頂到了她的喉頭，讓她呼出氣來——" 

# monologue
# JP: （ずぶっ！　ばちゅっ！　ずばっ！　ぶぢゅんっ！）
# 1632 = "（啾噗！啾噗！啾噗！啾噗！）" 

# monologue
# JP: 繋がっている部分が泡立つ。
1364 = "我們結合的地方泛起了泡沫。" 

# monologue
