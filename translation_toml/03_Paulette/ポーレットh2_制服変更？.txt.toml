# JP: 「ご馳走様。いや、うまかった」
1036 = "「Cảm ơn vì bữa ăn. Thật sự rất ngon đấy.」"

# monologue
# JP: 皿にわずかに残るソースを、\nバケットでこそげ腹へと落とす。
1395 = "Tôi dùng bánh mì baguette vét nốt chút\nnước sốt còn sót lại trên đĩa\nrồi bỏ tọt\nvào bụng."

# monologue
# JP: ポーレットはもう、さっきからずっとニコニコ顔だ。
1477 = "Paulette từ nãy đến giờ vẫn luôn tươi cười\nrạng rỡ."

# 【ポーレット】
# display as 波萊特
# JP: 「よかったぁ。双鉄くんのお口にあって」
925 = "「May quá. Hợp khẩu vị của Soutetsu là tốt\nrồi.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「今日のこれは、フランク料理だったのか？\nビーフシチューと、少し似ている感じだったが」
886 = "「Món hôm nay là ẩm thực Pháp sao?\nCảm giác\nhơi giống món bò hầm một chút.」"

# 【ポーレット】
# display as 波萊特
# JP: 「フランク料理、っていうほどおおげさなものじゃ\nないんですけど――」
883 = "「Cũng không to tát đến mức gọi là ẩm thực\nPháp đâu ạ——」"

# monologue
# JP: 綺麗に空いた皿をいそいそと片付けつつ、\nポーレットは華やいだ声を出す。
1469 = "Vừa thoăn thoắt dọn dẹp chiếc đĩa trống\ntrơn,\nPaulette vừa cất giọng vui tươi."

# 【ポーレット】
# display as 波萊特
# JP: 「ブッフ・ブルギニヨンていう、フランクの家庭料理です。\n高級なところは使わない、牛肉の赤ワイン煮込み」
1115 = "「Đây là món Bœuf Bourguignon, một món ăn\ngia đình của Pháp.\nThịt bò hầm rượu vang\nđỏ, không dùng những phần thịt đắt tiền\nđâu ạ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ほう」
970 = "「Hô.」"

# 【ポーレット】
# display as 波萊特
# JP: 「開けてから時間が経っちゃったワインとか使って、\n牛肉と香味野菜を煮込む。基本、それだけなんですよ？」
1086 = "「Dùng loại rượu vang đã mở nắp một thời\ngian,\nhầm cùng thịt bò và các loại rau gia\nvị. Cơ bản chỉ có vậy thôi ạ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ならば、よほど丁寧に煮込んでくれたのだろうな。\n柔らかく、味がしみていてとてもうまかった」
1119 = "「Vậy thì chắc em đã phải hầm rất cẩn thận\nnhỉ.\nThịt mềm, thấm gia vị, cực kỳ ngon\nluôn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「えへへっ。ママ仕込みですから」
969 = "「Ehehe. Là do mẹ dạy cho em đấy ạ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「そうか」
1116 = "「Vậy sao.」"

# monologue
# JP: 母のことを、これほど自然に話してくれる。
1318 = "Cô ấy đã có thể kể về mẹ mình một cách tự\nnhiên đến thế."

# monologue
# JP: ポーレットはもう大きな壁を、\n完全に越えたのだなと伝わってきて、嬉しく感じる。
1508 = "Tôi cảm nhận được rằng Paulette đã hoàn\ntoàn\nvượt qua được bức tường lớn đó, và\nthấy thật vui."

# 【双鉄H】
# display as 雙鐵
# JP: 「……家庭料理というのは、いいものだな」
715 = "「...Ẩm thực gia đình đúng là tuyệt thật\nđấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんの好きな家庭料理って、なんですか？」
900 = "「Soutetsu thích món ăn gia đình nào vậy?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
951 = "「À——」"

# monologue
# JP: 生家の味を、残念ながら僕は受け継ぎ損ねたが……\n右田の味で一番好きな料理であれば、決まってる。
1347 = "Đáng tiếc là tôi đã không thể kế thừa\nhương vị của gia đình ruột thịt...\nNhưng\nnếu hỏi tôi thích món nào nhất trong hương\nvị nhà Migita, thì câu trả lời đã quá rõ\nràng."

# 【双鉄H】
# display as 雙鐵
# JP: 「肉じゃが、だな」
1132 = "「Là món thịt hầm khoai tây.」"

# 【ポーレット】
# display as 波萊特
# JP: 「肉じゃが」
1133 = "「Thịt hầm khoai tây ạ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「日々姫は、真闇姉と同じことをしたがらないのだが……\n肉じゃがだけは、区別がまるでつかないくらい同じ味だ」
1069 = "「Hibiki vốn không thích làm giống chị\nMayami...\nNhưng riêng món thịt hầm khoai\ntây thì lại có vị giống nhau đến mức chẳng\nthể phân biệt được.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あのっ！　わたし！　わたしも――\nその味覚えたいです。双鉄くんのおうちの肉じゃが」
1120 = "「À này! Em! Em cũng muốn——\nhọc được hương\nvị đó. Món thịt hầm khoai tây của nhà\nSoutetsu.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「聞けば教えてくれるだろう。\n真闇姉であれ、日々姫であれ――――む」
897 = "「Hỏi thì chắc họ sẽ chỉ cho thôi.\nDù là\nchị Mayami hay Hibiki thì cũng――――hửm.」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？　どうかしました？」
1130 = "「Soutetsu? Có chuyện gì sao anh?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああいや、思い出したのだ。\n日々姫に頼まれごとをしていたと」
1073 = "「À không, anh chợt nhớ ra.\nHibiki có nhờ\nanh một chuyện.」"

# 【ポーレット】
# display as 波萊特
# JP: 「頼まれごと」
1064 = "「Nhờ chuyện gì ạ?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレットにさりげなく聞いておいて欲しいと言われた。\n制服のデザインを変更する予定が無いかどうかを」
1040 = "「Em ấy bảo anh hỏi khéo Paulette xem.\nCó\ndự định thay đổi thiết kế đồng phục hay\nkhông.」"

# 【ポーレット】
# display as 波萊特
# JP: 「制服変更……」
1070 = "「Thay đổi đồng phục...」"

# monologue
# JP: オウムがえしにつぶやいて、\nポーレットはさも可笑しそうにクスリと笑う。
1476 = "Paulette lẩm bẩm nhắc lại như vẹt,\nrồi bật\ncười khúc khích như thể thấy chuyện gì đó\nbuồn cười lắm."

# 【ポーレット】
# display as 波萊特
# JP: 「それって結構、さりげなく聞くの難しい質問ですよね」
1113 = "「Đó quả là một câu hỏi khó để có thể hỏi\nkhéo đấy nhỉ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ。僕もタイミングがつかめずに、\n結局は、こんなにも直球で尋ねることになってしまった」
1017 = "「Ừm. Anh cũng không nắm bắt được thời cơ,\nnên rốt cuộc lại phải hỏi thẳng thừng thế\nnày đây.」"

# 【ポーレット】
# display as 波萊特
# JP: 「けど……いいアイディアかも、って直感では思います。\n低コストで、新生御一夜鉄道をアピールできる……かも」
889 = "「Nhưng mà... trực giác mách bảo em đó có\nthể là một ý tưởng hay.\nVừa ít tốn kém,\nlại có thể quảng bá cho Đường sắt\nOhimitera mới... có lẽ vậy.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「聞く以上、日々姫にデザイナーのアテがあるのだと思う。\nよければ、話を進めてみるか？」
1060 = "「Đã cất công hỏi thế này, anh nghĩ Hibiki\ncó quen biết nhà thiết kế nào đó.\nNếu\nđược, chúng ta thử triển khai chuyện này\nxem sao nhé?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ……でも。\nちょっと待ってくださいね、ちょっとだけ」
990 = "「A... nhưng mà.\nĐợi em một chút nhé, một\nchút thôi.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
1027 = "「Hửm?」"

# monologue
# JP: そそくさと、ポーレットが隣の部屋に消えていく。
1478 = "Paulette vội vã biến mất vào căn phòng bên\ncạnh."

# monologue
# JP: （しゅるっ）
1666 = "（Xột xoạt）"

# monologue
# JP: 衣擦れの音……\nと、いうことはまさか――
1533 = "Tiếng áo quần cọ xát...\nThế này chẳng lẽ\nlà——"

# 【ポーレット】
# display as 波萊特
# JP: 「お待たせしました」
882 = "「Để anh phải đợi rồi.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「おお！」
971 = "「Ồ!」"

# 【ポーレット】
# display as 波萊特
# JP: 「変更した方がいいかどうか、\n実物を見て、双鉄くんに検討して貰う方がいいと思って」
1061 = "「Em nghĩ là xem thực tế rồi để Soutetsu\ncân nhắc\nxem có nên thay đổi hay không thì\nsẽ tốt hơn.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「僕に、服飾のことがわかるとも思えん。が――」
1127 = "「Anh không nghĩ mình hiểu biết về trang\nphục đâu. Nhưng mà——」"

# monologue
# JP: だが、いい。\n個人的には、問答無用で、極めてよろしい。
1253 = "Nhưng mà, đẹp lắm.\nTheo ý kiến cá nhân anh\nthì không cần phải bàn cãi, vô cùng xuất\nsắc."

# 【双鉄H】
# display as 雙鐵
# JP: 「こう……仕事場以外のところで見る制服というのは、\nなんというか――グっと来るものがあるな」
1013 = "「Thế này... Nhìn thấy đồng phục ở một nơi\nkhông phải chỗ làm việc,\nphải nói sao\nnhỉ——có cảm giác rất cuốn hút đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、なら。\nもっと、じっくり見ちゃいますか？」
1028 = "「Ufufu, nếu vậy.\nAnh có muốn nhìn kỹ hơn\nnữa không?」"

# monologue
# JP: （くいっ）
1674 = "（Nghiêng người）"

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
# 1027 = "「嗯？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「見えます？　鏡。\n帽子、ジャマですか？」
1123 = "「Anh thấy chứ? Trong gương ấy.\nCái mũ có\nvướng víu không?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「いや――」
1074 = "「Không——」"

# monologue
# JP: よく見える。
1400 = "Thấy rất rõ."

# monologue
# JP: ネクタイが強調してるブラウスの胸も、\nストッキング越しに覗くパンツも。
1495 = "Cả bầu ngực lấp ló sau lớp áo sơ mi được\ntôn lên bởi chiếc cà vạt,\nlẫn chiếc quần\nlót lấp ló sau lớp quần tất."

# 【双鉄H】
# display as 雙鐵
# JP: 「この制服は……ここまで性的なものだったのか。\n今まで、全く気づかなかったが――」
1111 = "「Bộ đồng phục này... gợi dục đến mức này\nsao.\nCho đến giờ, anh hoàn toàn không hề\nnhận ra đấy——」"

# 【ポーレット】
# display as 波萊特
# JP: 「制服は、ある程度は性差を強調するものだと思います。\nけど、これが特別ものすごい、ってわけじゃないですよ」
913 = "「Em nghĩ đồng phục ở một mức độ nào đó sẽ\nnhấn mạnh sự khác biệt giới tính.\nNhưng\nmà, bộ này cũng không đến mức đặc biệt\nkhủng khiếp đâu ạ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「しかし、現に僕は――」
891 = "「Nhưng, thực tế là anh đang——」"

# monologue
# JP: （ぐいっ）
# 1674 = "（湊近）" 

# monologue
# JP: ガチガチになってしまった股間を\nポーレットの尻へと押し付けてみる。
1381 = "Tôi thử ép phần hạ bộ đang cương cứng của\nmình\nvào mông Paulette."

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1002 = "「A.」"

# monologue
# JP: ポーレットは熱のこもった息を吐き――
1473 = "Paulette thở ra một hơi nóng hổi——"

# monologue
# JP: （すりっ）
1667 = "（Cọ xát）"

# 【双鉄H】
# display as 雙鐵
# JP: 「うっ」
975 = "「Ư.」"

# monologue
# JP: そうして、尻を軽くゆすって、\n僕の勃起を確認したと、伝えてくれる。
1424 = "Sau đó, cô ấy khẽ lắc mông,\nnhư muốn báo\ncho tôi biết rằng cô ấy đã cảm nhận được\nsự cương cứng của tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「それは、わたしたちが恋人同士で、ふたりっきりで。\nわたしが、双鉄くんを誘惑。しちゃってるからですよ」
1114 = "「Đó là vì chúng ta là người yêu của nhau,\nvà chỉ có hai người.\nLà do em đang quyến\nrũ Soutetsu đấy ạ.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
1018 = "「À——」"

# monologue
# JP: そうだ。ポーレットは教えてくれた。\n女の子は、好きな人の視線をいつでも意識していると。
1326 = "Đúng vậy. Paulette đã dạy cho tôi biết.\nRằng con gái luôn ý thức được ánh nhìn của\nngười mình thích."

# monologue
# JP: だから、偶然見えるパンツは――\n偶然じゃなく、本当のところ、“見せてる”のだと。
1413 = "Thế nên, việc vô tình nhìn thấy quần lót——\nKhông phải là vô tình, mà thực chất là cô\nấy đang \"cho xem\"."

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレットは、誘惑が上手だな」
896 = "「Paulette giỏi quyến rũ thật đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あっ……」
986 = "「A...」"

# monologue
# JP: これほど嬉しい誘惑ならば、\n誘われる他、何もできない。
1430 = "Nếu là một sự quyến rũ ngọt ngào đến thế\nnày,\nthì ngoài việc bị dụ dỗ ra, tôi chẳng\nthể làm gì khác."

# monologue
# JP: 心と体に素直になって、\nポーレットの髪へと顔を埋める。
1406 = "Thành thật với trái tim và cơ thể mình,\ntôi vùi mặt vào mái tóc của Paulette."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……んっ」
1128 = "「Soutetsu... ưm.」"

# monologue
# JP: 髪から顎へと舐め進めば、\nポーレットが顔を向けてくる。
1371 = "Khi tôi liếm từ tóc xuống cằm,\nPaulette\nliền quay mặt lại."

# 【ポーレット】
# display as 波萊特
# JP: 「れるっ――んっ――ちゅっ――ちゅうっ」
1006 = "「Liếm——ưm——chụt——chùn chụt.」"

# monologue
# JP: 舌と舌とを溶かしあうキス。
1549 = "Một nụ hôn hòa quyện đầu lưỡi vào nhau."

# monologue
# JP: ポーレットの体がぽかぽかしてきて、\nくっつきあってる部分がじっとり、汗ばんでくる。
1488 = "Cơ thể Paulette nóng dần lên,\nnhững phần\nda thịt chạm vào nhau trở nên ẩm ướt, đẫm\nmồ hôi."

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット」
1083 = "「Paulette.」"

# monologue
# JP: （さわっ）
1668 = "（Sờ nhẹ）"

# 【ポーレット】
# display as 波萊特
# JP: 「んうっ」
# 1018 = "「嗯」" 

# monologue
# JP: シャツもブラジャーもそのままに、\nおっぱいを支えるように手をあてて――
1412 = "Mặc nguyên cả áo sơ mi lẫn áo lót,\ntôi đặt\ntay lên như để nâng đỡ bầu ngực của cô\nấy——"

# monologue
# JP: （もみゅっ――むにっ――もみっ――むみゅ――）
1657 = "（Nắn nắn——nắn bóp——nắn——nắn nắn——）"

# 【ポーレット】
# display as 波萊特
# JP: 「あ……双鉄、くん――ねっ――\n直接……おっぱいっ」
1000 = "「A... Soutetsu, này——nhé——\ntrực tiếp...\nngực đi anh.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 1018 = "「嗯」" 

# monologue
# JP: 動こうとする手を止めて、\n僕が自分で、ポーレットの前のボタンを外してく。
1377 = "Tôi ngăn bàn tay đang định cử động của cô\nấy lại,\nvà tự mình cởi từng chiếc cúc áo\ntrước ngực Paulette."

# monologue
# JP: 一番下は外さずに、もちろんネクタイもそのままで。\nそうしてブラを、下へズリさげっ――
1397 = "Tôi không cởi chiếc cúc dưới cùng, và dĩ\nnhiên vẫn giữ nguyên chiếc cà vạt.\nSau đó\ntôi kéo tuột áo lót của cô ấy xuống——"

# monologue
# JP: （ぷるんっ）
1653 = "（Bật ra）"

# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？」
944 = "「Á!?」"

# monologue
# JP: かわいいおっぱいが露出する。
1283 = "Bầu ngực đáng yêu lộ ra."

# monologue
# JP: ネクタイが象徴的なアクセントとなり、\n肌の白さと胸の丸さを、いやらしく強調してくれる。
1565 = "Chiếc cà vạt trở thành một điểm nhấn mang\ntính biểu tượng,\nlàm nổi bật vẻ trắng ngần\ncủa làn da và sự căng tròn của bầu ngực\nmột cách đầy khiêu gợi."

# 【ポーレット】
# display as 波萊特
# JP: 「やだ……わたし、こんな……格好……」
1101 = "「Xấu hổ quá... em, trong bộ dạng... thế\nnày...」"

# 【双鉄H】
# display as 雙鐵
# JP: 「恥ずかしいなら、目を閉じればいい」
903 = "「Nếu thấy xấu hổ, em cứ nhắm mắt lại là\nđược.」"

# monologue
# JP: （もみゅっ！）
1658 = "（Nắn nắn!）"

# 【ポーレット】
# display as 波萊特
# JP: 「ん……あっ――双鉄くん……手、おっきいっ――\nんっ――」
1009 = "「Ưm... a——Soutetsu... tay anh, lớn quá——\nưm——」"

# monologue
# JP: ポーレットのまぶたは閉じられない。\nどころか、鏡の中の自分自身を凝視している。
1470 = "Paulette không nhắm mắt lại.\nTrái lại, cô\nấy còn đang chằm chằm nhìn chính mình\ntrong gương."

# 【ポーレット】
# display as 波萊特
# JP: 「おっぱい……違う……んっ――自分で、するの、と――\nふ、あっ……双鉄、くんの――手の、方、がっ――あっ」
1096 = "「Ngực... khác quá... ưm——so với tự mình,\nlàm, thì——\nphù, á... tay của,\nSoutetsu——sướng, hơn——á.」"

# monologue
# JP: （もみゅっ――むにっ――くりっ――こしゅっ）
# 1657 = "（揉來揉去）" 

# monologue
# JP: ポーレットの手も、自分の胸を下から柔らかく揉み上げる。
1471 = "Bàn tay của Paulette cũng bắt đầu mềm mại\nxoa bóp ngực mình từ dưới lên."

# monologue
# JP: 手つきはいかにも繊細で、けれどしつこくねちっこく、\nどうやってもんで欲しいかを、鏡越し僕に教えてくれる。
1306 = "Động tác tay vô cùng tinh tế, nhưng lại\ndai dẳng và ướt át,\ncô ấy đang dạy tôi qua\ntấm gương xem cô ấy muốn được xoa bóp như\nthế nào."

# 【双鉄H】
# display as 雙鐵
# JP: （こう――か？）
1693 = "（Thế này——sao?）"

# 【ポーレット】
# display as 波萊特
# JP: 「んひゅっ！　あっ――んふううううっ――」
1019 = "「Ưm hyu! Á——ưm fuuuuu——」"

# monologue
# JP: もみ込みながら、指の関節部分で乳首をそっと擦り上げる。
1356 = "Vừa nắn bóp, tôi vừa dùng khớp ngón tay\nnhẹ nhàng miết lên núm vú."

# monologue
# JP: 見よう見まねの愛撫はすぐさま、\nポーレットの体をぶるぶる震わす。
1389 = "Màn vuốt ve bắt chước đó ngay lập tức\nkhiến cơ thể Paulette run rẩy từng hồi."

# 【ポーレット】
# display as 波萊特
# JP: 「いい――気持ち――気持ち、いいよぉ――ンッ――\nちくび……おっぱい……とけちゃい、そう――」
1044 = "「Tuyệt——sướng——sướng, quá anh ơi——ưm——\nnúm\nvú... ngực... sắp tan chảy, mất rồi——」"

# 【双鉄H】
# display as 雙鐵
# JP: 「の、ようだな」
1087 = "「Có vẻ, là vậy nhỉ.」"

# monologue
# JP: （くちいっ）
1645 = "（Nhóp nhép）"

# 【ポーレット】
# display as 波萊特
# JP: 「ひあんっ！！」
943 = "「Hian!!」"

# monologue
# JP: パンストはもう、完全に色を変えている。
1312 = "Chiếc quần tất đã hoàn toàn đổi màu."

# monologue
# JP: ポーレットのおまんこから滲んだ蜜は、\nパンツを溢れ、ストッキングから腿にまでつたい始めてる。
1491 = "Mật ngọt rỉ ra từ âm đạo của Paulette,\ntràn qua quần lót, và bắt đầu chảy dọc từ\nquần tất xuống đùi."

# 【双鉄H】
# display as 雙鐵
# JP: 「おまんこも、もう完全に溶けている」
901 = "「Âm đạo cũng đã hoàn toàn tan chảy rồi.」"

# monologue
# JP: （すりっ――しゅくっ――しゅっ――こしゅんっ）
1661 = "（Xoa——miết——miết——nhóp nhép）"

# 【ポーレット】
# display as 波萊特
# JP: 「あっ……指――こしゅこしゅ、って――んっ――はっ、\nおまんこ――じらす――みたいに――こす――って」
999 = "「Á... ngón tay——cọ cọ, này——ưm——hà,\nâm\nđạo——như đang bị——trêu chọc——khi cọ\nxát——vậy.」"

# 【双鉄H】
# display as 雙鐵
# JP: （焦らしているつもりは無いのだがな）
1655 = "（Anh đâu có định trêu chọc em đâu.）"

# monologue
# JP: 厚手のパンストとパンツとが、\n指の動きを、鈍くしか伝えないのかもしれん。
1286 = "Có lẽ chiếc quần tất dày và quần lót,\nchỉ\ntruyền tải được một cách mờ nhạt chuyển\nđộng của ngón tay."

# monologue
# JP: で、あるのなら……\n一番敏感な部分を狙って――
1429 = "Nếu đã vậy thì...\nNhắm vào phần nhạy cảm\nnhất——"

# monologue
# JP: （そおっ――さすっ）
1663 = "（Nhẹ nhàng——xoa xoa）"

# 【ポーレット】
# display as 波萊特
# JP: 「んゆっ！　やっ――くり――トリス……んっ――\nくり、くり――しちゃ…………らめっ」
1025 = "「Ưm yu! Á——âm——vật... ưm——\nđừng có... mân,\nmê... mà.」"

# monologue
# JP: 本当に軽い指の動きに、\nポーレットの体は面白いようにヒクついてくれる。
1374 = "Chỉ với một cử động ngón tay thật nhẹ\nnhàng,\ncơ thể Paulette đã giật nảy lên đầy\nthú vị."

# monologue
# JP: これほど感じてくれているなら――
1433 = "Nếu em ấy đã cảm nhận mãnh liệt đến thế\nnày thì——"

# monologue
# JP: （ぐっ――ぐぐっ――）
1688 = "（Ấn——ấn ấn——）"

# 【ポーレット】
# display as 波萊特
# JP: 「やっ――パンツごと――おしこむ――なんっ――！？」
935 = "「Á——nhấn cả——quần lót vào——sao——!?」"

# 【双鉄H】
# display as 雙鐵
# JP: （んっ？）
1641 = "（Hửm?）"

# monologue
# JP: 急に、ポーレットの体が固くなる。
1485 = "Đột nhiên, cơ thể Paulette cứng đờ lại."

# monologue
# JP: 足がじたばた動くのだけれど、\n力が入っていない様子だ。
1310 = "Đôi chân cô ấy giãy giụa,\nnhưng có vẻ như\nkhông hề có chút sức lực nào."

# 【双鉄H】
# display as 雙鐵
# JP: 「どうした？　ポーレット」
1048 = "「Sao vậy? Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「お、押す……から――双鉄、くんっ――\nワイン、わたし……だって――そのまま、お着替えっ」
1031 = "「T, tại anh ấn... vào——Soutetsu, này——\nRượu vang, em... bởi vì——cứ thế, thay đồ\nluôn.」"

# monologue
# JP: ポーレットの額に、\n今までとは違った汗がぶわりと滲む。
1487 = "Trên trán Paulette,\nnhững giọt mồ hôi khác\nhẳn với lúc nãy ứa ra đầm đìa."

# monologue
# JP: 体が固まってしまっているのに、\nおまんこだけは、ビクビク激しく震えて――って！？
1314 = "Cơ thể thì cứng đờ,\nnhưng chỉ có âm đạo là\nco giật liên hồi——hả!?"

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット。立てるか？　トイレに」
1084 = "「Paulette. Đứng dậy được không? Vào nhà vệ\nsinh nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あっ――あっ――やあああっ」
980 = "「Á——á——khôngggggg.」"

# monologue
# JP: （じわっ――）
1675 = "（Rỉ ra——）"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！！？」
1004 = "「!!?」"

# monologue
# JP: 思わず、手を、どけてしまう。\nおしっこを汚く感じたわけじゃなく――
1358 = "Tôi bất giác rụt tay lại.\nKhông phải vì\ntôi thấy nước tiểu bẩn thỉu gì đâu——"

# 【ポーレット】
# display as 波萊特
# JP: 「ダメっ――わたし――おもらし――だめぇっ――\nおとな、なのに――わたし――おもらしぃっ」
880 = "「Không được——em——tè dầm——không được đâu——\nĐã là người lớn, rồi mà——em lại——tè dầm\nmất.」"

# monologue
# JP: （じょわわわわわわわわ）
1672 = "（Rào rào rào rào rào）"

# monologue
# JP: “見たい”と思った光景が、\n現実のものとなっていく。
1373 = "Khung cảnh mà tôi \"muốn xem\",\nđang dần trở\nthành hiện thực."

# monologue
# JP: 鏡の向こう、ポーレットの股間に、腿に、\n濡れ染みが猛然と広がっていく。
1556 = "Phía bên kia tấm gương, từ đũng quần đến\nhai đùi của Paulette,\nvết ướt đang loang\nra một cách mãnh liệt."

# monologue
# JP: （ちょっ――ちょおおおおっ――）
1642 = "（Rào rào rào rào rào）"

# 【ポーレット】
# display as 波萊特
# JP: 「やぁあああああああっ！！」
940 = "「Yaaaaaaaaa!!」"

# monologue
# JP: 吸水力の限界を超えてしまったのだろう。
1442 = "Có lẽ đã vượt quá giới hạn thấm hút mất\nrồi."

# monologue
# JP: ストッキングの網を超え、\n金色の雨が床へとちょろちょろ降り注ぐ。
1535 = "Vượt qua lớp lưới của quần tất,\ncơn mưa\nvàng óng róc rách trút xuống sàn nhà."

# 【ポーレット】
# display as 波萊特
# JP: 「ごめっ――ごめんなさい――双鉄くんっ――んっ」
1046 = "「Xin——xin lỗi anh——Soutetsu——ưm.」"

# monologue
# JP: （ちょっ――ちょろっ――じわあああああっ）
# 1642 = "（嘩啦啦）" 

# monologue
# JP: 雨はほどなく収まって、またじわああ、っと、\nストッキングの染みの範囲が少し広がる。
1564 = "Cơn mưa chẳng mấy chốc đã tạnh, và rồi vết\nướt trên quần tất\nlại từ từ, từ từ loang\nrộng thêm một chút."

# 【ポーレット】
# display as 波萊特
# JP: 「ふ……ふぇ……ふあ」
956 = "「Phù... phu... phúa.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
952 = "「!」"

# monologue
# JP: 放っておいたら、支えなければ、泣かれてしまう。
1369 = "Nếu cứ để mặc em ấy, nếu không đỡ lấy, em\nấy sẽ khóc mất."

# monologue
# JP: 怒涛の一瞬が過ぎてしまえば、おもらしを良しと感じた\n自分への、罪悪感が膨らんでくる。
1293 = "Khi khoảnh khắc dữ dội qua đi, cảm giác\ntội lỗi\nvì đã thấy việc tè dầm này thật\ntuyệt lại dâng lên trong tôi."

# 【双鉄H】
# display as 雙鐵
# JP: 「謝ることは、何もない。ここはポーレットの部屋だし、\n掃除であれば、僕も手伝う」
894 = "「Em không có gì phải xin lỗi cả. Đây là\nphòng của Paulette mà,\nnếu phải dọn dẹp\nthì anh cũng sẽ giúp một tay.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ふぇ……あ……ふやぁぁぁあ」
957 = "「Phu... a... fuyahaaa.」"

# monologue
# JP: 目に一杯に涙をためて、\nポーレットは、脱力しきってしまってる。
1482 = "Nước mắt lưng tròng,\nPaulette đã hoàn toàn\nkiệt sức."

# monologue
# JP: ならば、今は。\n僕がリードをする他にない。
1416 = "Nếu vậy, lúc này đây.\nKhông còn cách nào\nkhác ngoài việc tôi phải là người dẫn dắt."

# 【双鉄H】
# display as 雙鐵
# JP: 「とにかく、脱ごう。\n濡れたままでは、風邪をひいてしまいかねない」
1089 = "「Tóm lại là cởi đồ ra đã.\nCứ để ướt thế\nnày, nhỡ cảm lạnh thì nguy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん……うん。\nぬぎぬぎ……するぅ」
1010 = "「Vâng... vâng.\nEm cởi... cởi đây.」"

# monologue
# JP: 濡れて張り付くストッキングを、パンツを脱いで、\nポーレットはまた、僕の上へと腰掛ける。
1379 = "Cởi bỏ chiếc quần tất và quần lót ướt sũng\ndính chặt vào người,\nPaulette lại một lần\nnữa ngồi lên người tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「うう……うぇ……きもちわるいよぉ\n……べたべたするよぉ」
972 = "「Ư... a... khó chịu quá à\n...nhớp nháp\nquá.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「大丈夫だ。すぐに拭くから」
1072 = "「Không sao đâu. Anh sẽ lau sạch ngay đây.」"

# monologue
# JP: ポケットからハンカチを取り出して、\n唾液でたっぷり湿らせる。
1370 = "Tôi rút chiếc khăn tay từ trong túi ra,\nrồi thấm đẫm nước bọt."

# 【双鉄H】
# display as 雙鐵
# JP: 「拭き残しをしないように気をつけねばな」
1054 = "「Phải cẩn thận lau cho thật sạch mới\nđược.」"

# monologue
# JP: （くぱあっ）
1687 = "（Vạch ra）"

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！？」
# 944 = "「呀！？」" 

# monologue
# JP: （ぴぴっ！）
1676 = "（Tí tách!）"

# monologue
# JP: 肉の唇に閉じられていた、\n僅かな尿が外へと飛び出す。
1525 = "Một chút nước tiểu còn đọng lại giữa hai\ncánh môi bằng thịt\nbắn ra ngoài."

# 【ポーレット】
# display as 波萊特
# JP: 「ふぇっ」
967 = "「Á.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「大丈夫。これでいっそう、綺麗にふける」
1071 = "「Không sao. Thế này lại càng dễ lau sạch\nhơn.」"

# monologue
# JP: 尿と蜜とでてらてらに濡れるおまんこを、\nハンカチで、丁寧に丁寧にぬぐって洗う。
1392 = "Tôi dùng chiếc khăn tay cẩn thận lau chùi,\nlàm sạch âm đạo đang bóng nhẫy vì nước\ntiểu và mật ngọt."

# monologue
# JP: （こしゅっ――しゅっ――くちゅっ――ちゅにゅ）
1669 = "（Cọ——miết——nhóp nhép——chùn chụt）"

# 【ポーレット】
# display as 波萊特
# JP: 「ん……ふあっ――あっ――ああんっ」
1008 = "「Ưm... phù——á——a.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「これ、は……」
1112 = "「Thế này, là...」"

# monologue
# JP: 蜜が、凄い。\nハンカチが、あっという間にじゅぶじゅぶになる。
1303 = "Mật ngọt, nhiều quá.\nChiếc khăn tay thoáng\nchốc đã sũng nước."

# 【双鉄H】
# display as 雙鐵
# JP: 「ん――」
1007 = "「Ưm——」"

# monologue
# JP: （くいっ）
1690 = "（Nhấn nhẹ）"

# 【ポーレット】
# display as 波萊特
# JP: 「んひゅうううんっ！！」
1022 = "「Ưm hyuuuuuun!!」"

# monologue
# JP: 試しに軽く押しこめば、\nポーレットの声に、はっきりとした喜びが混じる。
1405 = "Tôi thử nhấn nhẹ vào,\nvà trong giọng nói\ncủa Paulette xen lẫn sự vui sướng rõ rệt."

# monologue
# JP: 罪悪感が、押し流される。\nくっきりとした欲望が、方向性を定めてくれる。
1399 = "Cảm giác tội lỗi bị cuốn trôi.\nDục vọng\nhiện rõ đã định hướng cho tôi."

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット。拭くより、栓で――\nおまんこを、僕は塞いでしまいたい」
1082 = "「Paulette. Thay vì lau sạch, anh muốn dùng\nnút bịt——\nbịt kín âm đạo của em lại.」"

# monologue
# JP: （くちいっ）
1660 = "（Đút vào）"

# 【ポーレット】
# display as 波萊特
# JP: 「んうっ！！？」
