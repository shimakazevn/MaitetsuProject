# JP: 押し込んで、押し込んで、イクために緩めることをせず。\n押し込んで押し込んで、ただひたすらに押し込んだ。
1401 = "Thúc vào, thúc vào, không hề nới lỏng để\nxuất tinh.\nThúc vào, thúc vào, chỉ một mực\nthúc sâu vào trong."

# monologue
