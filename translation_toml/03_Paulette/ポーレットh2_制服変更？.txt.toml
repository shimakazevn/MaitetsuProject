1479 = "波萊特的嬌喘已經形不成言語，她又狠狠地痙攣了一下。" 

# monologue
# JP: （ずぶっ！　ずばっ！　ばじゅっ！　ぢゅぶっ！！）
1632 = "（啾噗！啾噗！啾噗！啾噗！）" 

# 【ポーレット】
# display as 波萊特
