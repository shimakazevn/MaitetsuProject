1386 = "我抽送起來，讓肉棒攪動著收縮的小穴。" 

# 【ポーレット】
# display as 波萊特
# JP: 「んひゅっ！？」
1026 = "「嗯！？」" 

# monologue
# JP: （ずぶううううううっっ――ごりゅっ！！）
1643 = "（噗呲噗呲）" 

# 【ポーレット】
# display as 波萊特
# JP: 「～～～～～～～～っ！！！」
1135 = "「～～～～～～～～啊！！！」" 

# monologue
