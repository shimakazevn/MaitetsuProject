923 = "「可是——可是——我已經——我已經——啊——呼啊啊啊！」" 

# monologue
# JP: （きゅんきゅんっ！）
1624 = "（全身顫抖）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くっ！」
# 1003 = "「啊！」" 

# monologue
# JP: もう少し――ほんの少しのところで、イキそこなった僕を\n尻目に、ポーレットはもう、ガクガク震えに震えてる。
1332 = "就差一點——就在我差一點就要射出來的時候，波萊特一邊看著我，身體猛地痙攣了起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ――あっ！\nんううっ――ふえっ――ふやぁっ」
929 = "「呀——啊！嗯——呼——呀」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 1003 = "「啊！」" 

# monologue
