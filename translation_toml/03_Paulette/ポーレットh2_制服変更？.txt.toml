1684 = "（繼續插入）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あふうううううううううんっ！！！」
963 = "「呼啊啊啊！！！」" 

# monologue
# JP: （きゅむむっ！）
1695 = "（頂住）" 

# 【双鉄H】
# display as 雙鐵
