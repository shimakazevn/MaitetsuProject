[script]
# lines: 368 
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
1310 = "「唔」" 

# 【れいな】
# display as 玲奈
# JP: 「わ！　ご本ですぅ。\nそうてつさん、お勉強のお時間ですか？」
1285 = "「哇！　雙鐵先生你在看書。現在是學習時間嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、勉強といえば勉強だ」
1335 = "「嗯，算是在學習」" 

# monologue
# JP: ただし、テキストは児童文学。
1798 = "不過，我手上拿的是兒童文學。" 

# monologue
# JP: 『きっとヒントになりますよ』と、\n日々姫が貸してくれたものだ。
2243 = "這是日日姬表示“一定能有所啟發”然後借給我的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな一人か？　ポーレットは？」
1508 = "「玲奈，就你一個嗎？　波萊特呢？」" 

# 【れいな】
# display as 玲奈
# JP: 「ちょっとお買い物だそうですよぉ。\nれいな、ひとあしお先に帰ってきましたぁ」
1486 = "「波萊特好像要去買東西的樣子。玲奈就先一個人回來了」" 

# monologue
# JP: ふぅむ。\nならば、丁度良いかもしれん。
1922 = "嗯，說不定現在時機正好。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今、れいなには時間があるか？」
1509 = "「現在玲奈有時間嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい。整備も終わりましたし、\nお客さんも……」
1470 = "「有的——維修保養也結束了，而且……」" 

# monologue
# JP: きょろきょろと、\nれいなは大きく首を動かしあたりを見回す。
2135 = "玲奈動作誇張地轉頭左看右看。" 

# 【れいな】
# display as 玲奈
# JP: 「誰もいませんから、時間あるですよぉ」
1203 = "「也完全沒有客人，所以有時間」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、少し付き合ってくれんか？」
1615 = "「那能稍微陪我一下嗎？」" 

# monologue
# JP: 日々姫のアドバイスを軽んじるわけではないのだが――
1792 = "不是我輕視日日姬的意見——" 

# monologue
# JP: 子供向けの本、という頭があるのか、\nどうにも読み始める気にならない。
1830 = "但看起來這麼兒童向的書，我實在打不起精神閱讀。" 

# 【れいな】
# display as 玲奈
# JP: 「つきあうって、何にですかぁ？」
1621 = "「陪你？　要做什麼呀？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「読書にだ。僕が朗読するので、\nそれを聞いていて欲しいのだ」
1622 = "「陪我讀書。我來朗讀你來聽」" 

# 【れいな】
# display as 玲奈
# JP: 「わ！　楽しそうですぅ。\nれいなよろこんでお付き合いしますよぉ」
1282 = "「哇！　聽起來好像挺好玩。玲奈很樂意陪雙鐵先生哦」" 

# monologue
# JP: れいなはいそいそ、自分の椅子を持ってきて\n僕の真向かいに腰掛ける。
2138 = "玲奈興高采烈地搬來自己的椅子坐在我對面。" 

# monologue
# JP: テーブルの上にはスキットル。\n一瞬にして、聞く体勢が整えられる。
2092 = "桌子上放著她的扁酒壺。她一下子就做好了聽我讀書的準備。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『[そうや,1]宗谷太郎の冒険』」
990 = "「《宗谷太郎的冒險》」" 

# 【れいな】
# display as 玲奈
# JP: 「ふわ！」
1356 = "「好哇！」" 

# monologue
# JP: タイトルを言っただけでもう、瞳が輝く。\nこれはいい。
1899 = "只是念了標題她就睜大圓圓的眼睛發出了歡呼，真是太好了。" 

# monologue
# JP: この反応があるのなら、\n気合をいれて読めそうだ。
2070 = "既然她這麼期待，我也有動力好好讀書了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『――「太郎」「太郎」と幾度呼んでも物音もせぬ。\n　「太郎や、お前まだ寝ているのかい？」』」
976 = "「——連著叫了幾次“太郎”“太郎”都沒有回應。“太郎呀，你還在睡嗎？”」" 

# monologue
# JP: ……ふむ、この宗谷太郎なる少年は、\n堀なる伯母さんの家に世話になっているのか。
962 = "……原來如此，這個名叫宗谷太郎的少年住在姓堀的姨媽家。" 

# monologue
# JP: 僕と、似た境遇なのかもしれん。\nそうと思えば、読み進める声にも興が乗る。
2217 = "說不定他的遭遇和我有些類似。我這麼一想，便產生了興趣。" 

# 【れいな】
# display as 玲奈
# JP: 「はわぁ……太郎さんはいたずらっこなのですねぇ」
1276 = "「哇……太郎可真是個愛搗蛋的孩子啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ、かなりの悪童のようだな」
1332 = "「嗯，看來是個頑童啊」" 

# monologue
# JP: 少年時代ならどうかはしらんが、\n今の僕には堀伯母さんの方に感情が寄る。
2256 = "雖然不知道小時候的我讀到這裡是什麼感受，不過現在的我反而同情起了堀姨媽。" 

# monologue
# JP: どうしていいつけを守れぬものか――\n生き生きとした描写のために、腹立ちさえも覚えてしまう。
1925 = "因為書裡對於太郎不聽管教的描寫實在太過生動，我甚至感到有些生氣。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ただいまぁ――あれ？　読書ですか？」
1401 = "「我回來了——咦？　在讀書嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「ポーレット！　おかえりなさぁい。\n今、はじまったとこなんですよぉ」
1488 = "「波萊特！　歡迎回來。我們才剛開始呢」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はじまった？」
1247 = "「剛開始？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『「まだ参らぬか！」太郎の鉄拳が雨あられと降り注ぐ。\n　新参の小僧はついに「参った！」と手を挙げた。』」
1355 = "「太郎邊嚷著“還不投降嗎”，邊用雨點般的拳頭毆打。新來的小孩終於舉起手喊了“投降”。」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わ……双鉄くんの読み聞かせ」
1277 = "「哇……雙鐵君居然在朗讀」" 

# 【れいな】
# display as 玲奈
# JP: 「しー、ポーレット。静かにですよぉ」
1341 = "「噓——波萊特。不要說話哦」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、ごめん」
1319 = "「啊，對不起」" 

# monologue
# JP: ……聞かん気の暴れん坊なだけでなく、\nこの太郎、なかなかに悪知恵まで回る。
967 = "……這個太郎不光是個不服管教的頑童，而且還挺會耍小聰明。" 

# monologue
# JP: 児童文学の主人公が、\nこれほどスラリと嘘を吐くとは思わなかった。
2105 = "沒想到兒童文學的主角竟然會肆無忌憚地撒謊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――『「ちぇっ、障子貼りなんてしたくないなぁ」。\nしかし堀の伯母さんの命に逆らえば後が怖い』」
972 = "「——“嘖，我才懶得給障子貼紙呢”。但要是違抗堀姨媽，下場又會很可怕」" 

# 【れいな】
# display as 玲奈
# JP: 「しょうじはりって、イヤなことなのですか？\nれいな、やったことないのですぅ」
1528 = "「給障子貼紙是一件很麻煩的事嗎？玲奈沒有做過所以不清楚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「細かな作業だし、一枚では済まんからな。\nまぁ、面倒といえば面倒だ」
1456 = "「是很需要耐心和細心來做的工作，而且肯定也不是只貼一扇門就完了吧。要說麻煩是挺麻煩的」" 

# monologue
# JP: 太郎も少しは懲りれば良いが――\nそう思いつつページをめくる。
1985 = "希望太郎能從中得到一些教訓——我邊這麼想，邊翻開下一頁。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『「おい太郎、障子貼りなんてさせられてるのか」\n　「邪魔しないでくれ、今、面白いところなんだ」』――」
980 = "「“喂，太郎。你居然乖乖在給障子貼紙”“別打擾我，現在正貼到最好玩的地方呢”——」" 

# monologue
# JP: ほう……なるほど。\nそうか。このような手で切り抜けるとは――
1920 = "哦……原來如此。沒想到他居然還有這一手——" 

# 【れいな】
# display as 玲奈
# JP: 「わぁ！　太郎さん、あたまいいですぅ」
1281 = "「哇！　太郎好聰明」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな――障子貼りを楽しい遊びと認識させて、\n自分の代わりに働かせるばかりか、お礼の品ま、で――」
1444 = "「是啊——讓別的小孩覺得貼障子紙是一件很好玩的事，不光讓他們代替自己勞動，還收到了謝禮。然後——」" 

# 【れいな】
# display as 玲奈
# JP: 「……あれれ？　そうてつさん？」
986 = "「……怎麼了？　雙鐵先生？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これを――日々姫は僕に教えたかったのか」
1584 = "「這就是——日日姬想告訴我的事嗎」" 

# monologue
# JP: ポーレットを見る。\nその目は僕を見返し、頷く。
2049 = "我看向波萊特，她也同我四目相對，然後點了點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん、れいな。本の続きは後日でいいか？」
1427 = "「抱歉，玲奈。後面的以後再讀給你聽好不好？」" 

# 【れいな】
# display as 玲奈
# JP: 「わ！　『つづく』ですねぇ」
1284 = "「哇！　這就是所謂的“未完待續”吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだ『つづく』だ」
1447 = "「是啊，“未完待續”」" 

# 【れいな】
# display as 玲奈
# JP: 「それなられいな、つづき、楽しみにしちゃいますねぇ」
1612 = "「那玲奈就先期待著後面會發生什麼事了」" 

# 【れいな】
# display as 玲奈
# JP: 「れいな、お茶をいれますねぇ」
1506 = "「玲奈先去泡茶囉」" 

# monologue
# JP: そのままとことこ、店の奥へと。
1945 = "她小跑著去了商店裡屋。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがと、れいな」
1564 = "「謝謝，玲奈」" 

# 【双鉄】
# display as 雙鐵
# JP: 「で、だ」
1592 = "「那——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
1328 = "「嗯」" 

# monologue
# JP: ポーレットが僕へと向き直る。\nそのまっすぐな瞳に言葉が、吸い寄せられる。
2122 = "波萊特轉向我。看著她那雙天真爛漫的大眼睛，我很自然地說出了下一句。" 

# 【双鉄】
# display as 雙鐵
# JP: 「障子貼りさえ、“楽しい遊び”と認識されれば、\n対価を払ってさえもやりたがるものが続出する」
1270 = "「只要讓大家覺得這是好玩的東西，就連枯燥的貼障子紙都會有人願意出錢來嘗試」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そういうの、すっごくあると思います」
1419 = "「我覺得有很多這樣的例子」" 

# monologue
# JP: 即座に返るポーレットの声から、張りを感じる。
2121 = "波萊特立即回答道。她的聲音充滿了興奮。" 

# monologue
# JP: ならばその耳にも、\nこの物語が単なる絵空事とは聞こえなかったのだろう。
2016 = "想必她也從剛才的故事中聽出了門道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「オークションとか、似たような感じだと思います。\n“価値がある”って、お互いに煽りあって過熱しますし」
1429 = "「拍賣會也跟這個很相似。只要讓大家覺得“有價值”，氣氛就會被自然而然地炒熱」" 

# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、確かにだ。\n人には恐らく、そうした一面があるのだろう」
1224 = "「你這麼一說好像確實是這樣。人們確實有這樣的一面」" 

# monologue
# JP: 場に、人に――周囲に影響されることで、\nもともとの価値観が変化する。
2089 = "會被氣氛或者其他人——也就是周圍環境影響，改變原本的價值觀。" 

# monologue
# JP: それは、仮に悪意に取れば、\n詐欺師の付け込みどころともなろうが――
2140 = "當然，也有人利用這一點來進行惡意詐騙——" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうした一面を上手く刺激できれば、採掘体験に――\n新しい価値を感じてもらえるのではなかろうか」
1269 = "「只要利用好這種性質，一定能讓人們從煤礦開採體驗中感受到新的價值」" 

# 【ポーレット】
# display as 波萊特
# JP: 「新しい価値」
1435 = "「新的價值……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、すなわち“遊び”。\n採掘体験そのものを、“遊び”と感じてもらうのだ」
1330 = "「嗯，就是讓人們感覺到煤礦開採體驗活動本身是一種“遊戲”」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そういえば……」
1554 = "「說起來……」" 

# monologue
# JP: 細く形の良い指を、ポーレットは自らの顎に触れさせる。
2120 = "波萊特用纖細美麗的手指戳著自己的下巴說道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「掘った石炭を地域通貨的に使える――\nそれもお店屋さんごっこっぽくて、遊び要素ありますね」
1360 = "「將挖到的煤炭作為一種地域專用貨幣——這本身也充滿了遊戲要素呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それをさらに深め広げる。報酬のために掘るのではなく、\n掘ること自体を、楽しい遊びにしてしまう」
1502 = "「然後我們在此基礎上添加新的玩法。讓客人不光是為了報酬，而是感覺挖礦本身就很好玩」" 

# 【ポーレット】
# display as 波萊特
# JP: 「どうやってですか？」
1546 = "「要怎麼做呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
1603 = "「那就——」" 

# monologue
# JP: 素朴極まる問いかけに、\nけれども僕の思考はピタリと止まってしまう。
2093 = "極其單純的問題。但我卻回答不出來。" 

# monologue
# JP: 楽しさ、楽しみ、遊び――そうした価値観を、\n具体的な事例へどうにも、置き換えられない。
2096 = "樂趣、享受、遊戲——我無法將這些單詞和具體的玩法聯繫起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……それは、遊びの楽しさを良く知る者に\n考えてもらうほかないかもしれんな」
988 = "「……這或許只能讓精於玩樂的人來想辦法了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　どうしてですか？」
1297 = "「哎？　為什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「恐らく僕は、いささか遊びと離れすぎた。\n幼少期には、目一杯楽しんでいた気もするのだが」
1390 = "「恐怕我已經與遊戲這種東西太過疏遠了。雖然還朦朧記得小時候有過一段盡情玩樂的時光……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
1315 = "「啊……」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、お茶がはいりましたよぉ」
1535 = "「茶來了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお、すまんな」
1342 = "「噢，辛苦你了」" 

# monologue
# JP: れいなの淹れてくれる紅茶も、\nポーレットのものに決して劣らぬ。
2136 = "玲奈泡的紅茶一點也不輸波萊特。" 

# monologue
# JP: 何も混ぜずにストレートで。\n熱と旨さと豊かな香りが口に広がる。
2160 = "紅茶裡沒有添加任何多餘的東西。我喝了一口，美味滾燙的茶水和充滿豐富層次的香氣瞬間在口中擴散開來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？　どうしたポーレット」
1312 = "「唔？　怎麼了，波萊特？」" 

# monologue
# JP: せっかくの茶だというのに、カップに指さえ伸ばさない。
2081 = "明明玲奈為我們泡了茶，她卻連杯子都沒碰。" 

# 【双鉄】
# display as 雙鐵
# JP: 「冷めてしまうと――」
1548 = "「要是涼了可就——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「なら、遊びましょう、双鉄くん。\n遊ばなきゃダメです、絶対に」
1608 = "「那我們就去玩吧，雙鐵君。一定要去玩才行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1633 = "「！？」" 

# monologue
# JP: 思いもかけぬ、強い言葉と強い瞳と。
2042 = "我沒想到她會這麼說，而且她的眼神和語氣還非常認真。" 

# monologue
# JP: 気圧されてしまった一瞬に、\nポーレットはグイと、紅茶を一気に飲み干す。
1927 = "在我被她的氣勢所壓倒的時候，她端起紅茶一口氣喝完。" 

# 【ポーレット】
# display as 波萊特
# JP: 「楽しさを知らなくちゃ、人を楽しませるなんて出来ない。\n誰か他の人じゃなく、双鉄くんが心の底から遊ばなきゃ」
1193 = "「不知道什麼是快樂的人怎麼能夠娛樂他人呢。在想這些事之前，雙鐵君自己要先去痛痛快快玩一場才行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕自身が、か」
1416 = "「我自己嗎……」" 

# monologue
# JP: 確かに、それはそうかもしれん。\nれいなや凪あたりは、何に触れても楽しみそうだが――
2156 = "確實有幾分道理。我看玲奈和凪她們好像不管接觸什麼都覺得很有趣——" 

# monologue
# JP: 逆に、僕のような者でも心底楽しめるのなら、その遊びは、\n観光の売りとなるに足る価値を持てるのかもしれない。
2144 = "相反，像我這樣的人如果都能打從心眼兒裡覺得“很有趣”，那就一定能拿來當觀光的賣點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、試そう。\nしかし――遊びといっても」
1607 = "「那我們就來試試吧。不過——要去哪裡玩呢」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし――わたし！　知ってますっ！！\nええと、市で、いろいろ調べたことがあるんです」
1395 = "「我——我知道！！那個……我有在市裡調查過」" 

# 【双鉄】
# display as 雙鐵
# JP: 「調べた？」
1559 = "「調查過？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「観光振興のために、御一夜市内で人気あるスポットとか、\nイベントとかそういうのです」
1490 = "「為了復興旅遊業，我調查過御一夜市內受歡迎的活動還有景點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……それをめぐれば、\n観光についてと遊びについてを同時に学べるわけか」
1249 = "「原來如此……只要轉轉那些地方，不光能得知旅遊相關的訊息，還能了解到什麼是娛樂嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だめです、そんなの」
1583 = "「這可不行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
1336 = "「嗯？」" 

# monologue
# JP: 怒った表情。\n芝居がかっているようで、だけど本気でもあるようで。
2119 = "波萊特做出一副生氣的樣子。雖然她的表情有些誇張，但看起來也有幾分認真。" 

# monologue
# JP: ポーレットは勢いもよく人差し指を一本たてて、\n僕の鼻先につきつける。
1947 = "她生氣地用食指指著我的鼻子說道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「余計なことを考えないで、ただ目一杯楽しまなくちゃ。\nそいつが、粋な遊びってぇもんですよ」
1195 = "「不要在腦子裡想那些多餘的事情，只要盡情去玩就行了。這才叫作純粹地玩哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1250 = "「原來如此」" 

# monologue
# JP: この一瞬にも、楽しませよう、遊ばせようと、\nポーレットが心を配ってくれていると感じて。
1983 = "就連這個瞬間，波萊特都在想著讓我感受什麼是快樂、什麼是玩耍。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでは、目一杯楽しむために――」
1617 = "「那麼，為了能夠玩得盡興——」" 

# monologue
# JP: ならばと、僕も乗ってみる。\n不器用で無様であろうが、芝居がかろうと意識してみる。
2246 = "那我也來試試。拋開丟臉的想法，不管動作多麼笨拙，我也來誇張表演一下吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――お嬢さん。僕と遊んではくれないか？」
975 = "「——這位小姐，能陪我一起玩嗎？」" 

# monologue
# JP: 一瞬、おどろいたような顔。\n次の瞬間、それはにこやかに弾け崩れる。
1941 = "她先是吃了一驚，但很快就綻放出了笑容。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
1329 = "「嗯！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？」
1273 = "「呀！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1293 = "「哎喲」" 

# monologue
# JP: バランスを崩しかけたポーレットへと手をのばす。
2056 = "我趕忙伸手拉住差點摔倒的波萊特。" 

# monologue
# JP: 僕から先に舟を下りていたというのに、\nこれはいささか、気が利かなかった。
2077 = "明明下船時比較危險，我卻沒有注意到，這可不是紳士所為。" 

# 【双鉄】
# display as 雙鐵
# JP: 「掴まってくれ」
1425 = "「抓住我的手」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、ありがとうございます」
1562 = "「謝、謝謝」" 

# monologue
# JP: 僕の手のひらに重なった手は、柔らかく、小さく、温かい。\nほんのすこしだけ汗ばんでいる。
2039 = "我掌心裡的手既纖細又柔軟，還有些溫暖。上面還微微滲出了汗。" 

# monologue
# JP: 強く握ればつぶしてしまいそうな気がして、\nそうっとだけしか、包めない。
2019 = "感覺稍一用力就會捏壞，我只得輕輕握住。" 

# 【双鉄】
# display as 雙鐵
# JP: 「楽しむことに集中しすぎて、\n当然の気遣いを忘れてしまったな」
1408 = "「我注意力都放在享樂上了，竟然忘記了最基本的禮儀」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ」
1340 = "「嘻嘻」" 

# monologue
# JP: 握られている手にきゅっと、心地良い力が伝わってくる。
2037 = "我掌心中的小手輕輕回握了一下。" 

# 【ポーレット】
# display as 波萊特
# JP: 「声、出てましたよね？　双鉄くん」
1226 = "「你都叫出聲了對吧？　雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふかみが大サービスしてくれたからな」
1586 = "「這都是因為深美今天好好款待了我們一番啊」" 

# 【凪】
# display as 凪
# JP: 「まっことばい！　今日のふかみちゃんは\n流れの速かとこ選んどったばい」
1364 = "「就是咧！　今天小深可是專挑水流急的地方劃的咧」" 

# monologue
# JP: 間髪入れずの凪の言葉に、\nふかみはコホン、と咳払い。
2172 = "聽到凪加入了我們的對話，深美像是提醒她一般輕咳一聲。" 

# 【ふかみ】
# display as 深美
# JP: 「お二人なら、船酔いの心配はないですから。です」
1346 = "「因為你們二位看起來都不怕暈船的樣子，所以」" 

# 【凪】
# display as 凪
# JP: 「そーばい！　“おふたりさん”なら～」
1443 = "「是咧！　“你們二位”～」" 

# 【ポーレット】
# display as 波萊特
# JP: 「/////っ！」
968 = "「(害羞)！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにな」
1582 = "「這倒是」" 

# monologue
# JP: ざんぶざんぶと、舟の揺れること揺れること――\n他のお客が一人でもいたら、とても体験できなかったろう。
2178 = "船在水中以極快的速度乘風破浪隨波搖擺——要是除了我們以外還有客人的話，可就體驗不到這種待遇了。" 

# monologue
# JP: “他のお客が一人もいない”のは、無論大きな問題だが、\n今日のみは、楽しむ以外、何もしないと決めている。
959 = "“除我們以外的客人一個人也沒有”雖然是個巨大的問題，但今天我們已經決定要好好玩耍，不幹別的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、ありがとう。\nおかげで今までで一番楽しめた」
1290 = "「哎呀，真是謝謝你。讓我體驗了最爽快的一次漂流」" 

# 【ふかみ】
# display as 深美
# JP: 「それなら、頑張った甲斐がありました。です」
1534 = "「聽到你這麼說，那我這麼賣力划船也算有回報了，嗯」" 

# 【凪】
# display as 凪
# JP: 「ちぇっ！　にーさんはからかいがいがなかとね～っ」
1337 = "「嘁！　大哥哥捉弄起來一點也不好玩咧～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1313 = "「唔？」" 

# monologue
# JP: 何のことだ？　と凪を見返せば、\n凪はくっくと首を動かし、僕の視線を導こうとする。
1811 = "什麼意思？　我不解地看向凪，她卻幾次朝波萊特所在的方向扭著頭，似乎是想讓我看過去。" 

# monologue
# JP: （ポーレットか？）
2290 = "（波萊特怎麼了？）" 

# monologue
# JP: 見れば、ポーレットは赤くなってる。
1904 = "只見波萊特滿面通紅。" 

# monologue
# JP: その反応に、なぜか僕まで、\nむずがゆく、照れくさいような気にさせられる。
2147 = "看到她這個樣子，讓我也莫名地有些害羞起來了。" 

# 【凪】
# display as 凪
# JP: 「ふっふーん」
1309 = "「哼哼～」" 

# monologue
# JP: 勝ち誇ったような凪の声。
1876 = "凪似乎很得意。" 

# monologue
# JP: あるいは僕の顔もいくらか、\n赤らんでしまったのかもしれん。
2046 = "我的臉說不定也有些發紅。" 

# 【凪】
# display as 凪
# JP: 「お二人さんは、この先の予定立てとーと？」
1219 = "「你們兩位接下來準備去哪裡咧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えとっ」
1599 = "「那個——」" 

# monologue
# JP: 上ずった声で返事をしかけたポーレットを目で制し、\n僕に会話を預けてもらう。
1951 = "她的聲音有些慌慌張張的，我用眼神示意，然後接過了話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにかお奨めがあるなら、\n是非とも教えてもらいたい」
1220 = "「你們有什麼推薦的地方嗎」" 

# 【凪】
# display as 凪
# JP: 「あるばい！　隠れた人気スポットばい！」
1512 = "「當然有咧！　不為一般人所知的超厲害的景點咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「あー」
1314 = "「啊——」" 

# monologue
# JP: 納得顔で、ふかみが頷く。
2124 = "深美似乎懂了凪想說什麼，她點頭應和。" 

# 【ふかみ】
# display as 深美
# JP: 「包丁づくり」
1229 = "「做菜刀」" 

# 【凪】
# display as 凪
# JP: 「そうばいっ！」
1365 = "「就是咧！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　包丁づくりとは」
1231 = "「做菜刀？　那是什麼啊」" 

# monologue
# JP: ポーレットへと顔を向ければ、\nふるふると静かに首がふられるばかり。
2050 = "我看向波萊特，她似乎也是一頭霧水的樣子，靜靜地搖了搖頭。" 

# monologue
# JP: （観光スポットの調査をしたという話だったが――）
2287 = "（我記得她說過自己調查過有名的景點——）" 

# monologue
# JP: にもかかわらず、ポーレットの知識に入っていない。
2106 = "沒想到連她也不知道。" 

# monologue
# JP: しかし、ふかみが即座に心あたるほど楽しい場所なら、\nこれはあるいは、本物の穴場であるのかもしれん。
1799 = "不過，既然深美能立即反應過來，想必那裡真的很有意思吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「是非とも、詳しく聞かせてほしい。\nその包丁づくりとはいったい――」
1561 = "「請跟我們詳細說說。做菜刀到底是——」" 

# 【凪】
# display as 凪
# JP: 「ふふーんっ、だったら、ご案内ばいっ！」
1307 = "「哼哼——那咱來給你們帶路咧！」" 

# monologue
# JP: （カンッ！　キンっ！　キンッ！）
2284 = "（哐！　叮！　叮！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1300 = "「哦哦！」" 

# monologue
# JP: ――槌が、真っ赤に焼けた鉄を叩く。\nその光景が、音がなんとも、血を騒がせる。
952 = "——鐵匠用鐵錘不斷擊打一塊燒得通紅的鐵。這幅景象和打鐵的聲音讓我不禁熱血沸騰起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「蓑笠さん……\nあたりまえですけど職人さんなんですね」
1540 = "「蓑笠先生……因為太過理所當然，我都忘了他是一名鐵匠了呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1446 = "「是啊」" 

# monologue
# JP: 力んでいない。普段と、何も変わらない。\n表情さえも柔和なままだ。
2188 = "蓑笠爺爺打鐵的動作並不用力。他就好像在做一件很稀鬆平常的事，連表情都十分柔和。" 

# monologue
# JP: しかしその腕は、槌を、鉄を――\n完全に支配し従えているようにしか見えない。
1825 = "但是他的動作卻給我這樣一種感覺——手臂、鐵錘、鐵塊都完全在他的掌控之下。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「製作体験ばしてもらうのは、\nステンレス包丁になりますけん」
1631 = "「體驗打鐵要做的是不鏽鋼菜刀咧」" 

# monologue
# JP: 僕らに説明しながらも、\n手指は全く、言葉のリズムにつられない。
1819 = "他為我們做著說明，卻完全沒有影響到手上的動作。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ステンレスの板二枚の間に、鋼ば挟んで、\n熱いれて叩いて、固めよります」
1367 = "「就是將鋼鐵夾在兩塊不鏽鋼板當中，加熱後敲打，讓它們黏在一起」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その、鋼の部分が刃になるのですか？」
1618 = "「鋼的部分就是刀刃？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「そぎゃんとです」
1441 = "「是咧」" 

# monologue
# JP: 何をしているのか理解できれば、\n目にする景色への興味は深まる。
1806 = "了解了他正在做的是什麼，我對眼前的一切又多了幾分興趣。" 

# monologue
# JP: あのひと叩きひと叩きが、\nステンと鋼を一つにまとめあげているのだ。
2100 = "正是這一下一下的敲擊讓不鏽鋼和鋼合為一體。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「そしたら、やってみますか」
1598 = "「那你們要來試試嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1328 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「お願いします」
1560 = "「請您多指教了」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「じゃ、まずは双鉄くん。\nこの機械の前ば座ってください」
1602 = "「那先從雙鐵小弟開始。來坐到這台機器前面咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかりました」
1414 = "「我知道了」" 

# monologue
# JP: 鋼鉄製の杭打ち機――\nでなければ、餅つき機のような機械だ。
2057 = "我面前的是鋼鐵製的打樁機——呃，總之就是一台類似於搗年糕機的機器。" 

# monologue
# JP: 餅つきでいうところの杵のような太い鉄棒が、\n椅子に座った僕の眼前で黒光りしている。
2033 = "我坐在椅子上，類似搗年糕用的棒子一樣的粗黑鐵杵在我眼前閃著光。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「足元のペダルば、軽ぅく踏んで見て下さい」
1553 = "「試著踩下腳邊的踏板咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1328 = "「嗯」" 

# monologue
# JP: （がィンっ！）
2283 = "（咣！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
# 1300 = "「哦哦！」" 

# monologue
# JP: ペダルを踏んだその瞬間に、\n鋼鉄の杵が、鉄の台へと振り落とされる。
2234 = "踩下踏板的瞬間，鋼鐵大杵就重重砸在了鐵台子上。" 

# monologue
# JP: 想像通りの動作であったにもかかわらず、\n想像以上の迫力に驚かされた。
2259 = "雖然已經想像到是這麼用的，但這一擊所帶來的震撼還是超乎了我的想像。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ま、見たままの機械ですたい。\nこいつに、これば――」
1373 = "「就是這麼個機器咧。可以用它把這個——」" 

# monologue
# JP: 先ほどまで、蓑笠老人が叩き伸ばしていた焼けた材料。\nそれは、すでにある程度、ナイフのような形になってる。
2189 = "蓑笠爺爺拿來剛才他還在敲打拉長的被燒過的材料。已經能看出刀子的雛形了。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「こいつを、こん機械で好きな大きさに叩き伸ばせば\n良かとです」
1424 = "「把這個打成喜歡的大小咧」" 

# monologue
# JP: なだらかなカーブを描いている面――\n刃になる部分を細く伸ばせと、ごく当然のアドバイス。
1815 = "他告訴我，要將有著平緩圓弧的一面——也就是刀刃的部分打扁。的確是非常理所當然的指導。" 

# monologue
# JP: ならばとペダルを踏んでみる。
2066 = "於是我試著踩下踏板。" 

# monologue
# JP: （ゴインっ！　ガキんっ！　ゴンッ！　ガインっ！）
2282 = "（咣！　當！　咣！　當！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「おおっ――っと――これはっ――」
1299 = "「哦哦——這——」" 

# monologue
# JP: なかなか、激しい振動がくる。\nその振動が僕の中、原始的な何かを激しく揺すぶる。
2036 = "我感到了一陣激烈的震動。這震動甚至震撼到了我心中的某些原始的東西。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なかなか――む――思う、よう――にはっ」
1591 = "「還挺難——唔——控制的——」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「神経質にはならんで良かとです。\n形ば壊すほど叩けたら、まずまず大したものですけんね」
1190 = "「不必太緊張。沒這麼容易敲壞咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――そうですか」
1326 = "「嗯——是這樣嗎」" 

# monologue
# JP: そう言われれば、気が楽になる。
2174 = "聽到蓑笠爺爺這麼誇獎，我心情放鬆了一些。" 

# monologue
# JP: どう叩こうが、包丁の形が崩れぬものならば、\nこうもおっかなびっくり臨むのはもったいなかろう。
2212 = "要是不管怎麼敲打，鐵塊的形狀都敲不壞的話，我這麼一驚一乍也白費了。" 

# monologue
# JP: （ガインっ！　ごイン！　ガンッ！　カインッ！）
2279 = "（咣！　咣！　咣！　鏗！）" 

# monologue
# JP: どんどん伸びる、伸ばされる。
2252 = "鐵塊的形狀不斷向外伸展。" 

# monologue
# JP: ナイフ状だったかたまりが、\nみるみるうちに、小ぶりの包丁サイズに広がる。
1888 = "原本只是匕首大小的鐵塊，在我的敲打下伸展成了小菜刀的大小。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「おお、上出来上出来。\nほうたら今度は、[ひない,1]雛衣のお嬢さんの番ですな」
1303 = "「哦，很好很好。那接下來就輪到雛衣小姐咧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「は、はい！　お願いしますっ！」
1438 = "「是、是的！　請您多指導了！」" 

# monologue
# JP: 確か普段、\n蓑笠さんはポーレットのことを市長さんと呼んでいた。
2053 = "我記得平時蓑笠爺爺都是稱波萊特為市長小姐的。" 

# monologue
# JP: それが今日は、雛衣のお嬢さん。\nそのさりげない一言を、なぜだか、すごく嬉しく感じる。
1813 = "今天卻叫她雛衣小姐。這一隨口的稱呼，使我莫名地感到喜悅。" 

# monologue
# JP: （ガンっ！　――ごんっ――ごチンっ！――）
2278 = "（咣！　——咣——叮！）" 

# 【蓑笠】
# display as 蓑笠
# JP: 「おーおー、こちらも上手かとですなぁ」
1302 = "「哦哦，雛衣小姐也不賴咧」" 

# monologue
# JP: 性格、としか言いようが無い。\nポーレットは僕とは違い、ペダルを連続して踏まない。
1900 = "只能說是因為性格的不同吧，波萊特沒有像我一樣不停去踩踏板。" 

# monologue
# JP: 踏んで叩いてペダルを離し、踏んで叩いてペダルを離しを、\nこつこつ、丁寧に繰り返している。
1955 = "她踩下再放開、踩下再放開，就這樣一點一點專注細膩地完成工序。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「こらぁ、\n見事なほどに特徴の違うた包丁ばできそうですなぁ」
1514 = "「看來，你們倆會做出兩把特徵完全不同的菜刀啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
# 1310 = "「唔」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わ、ほんとですね」
1287 = "「哇，真的是這樣」" 

# monologue
# JP: 包丁の元、と蓑笠老人が言った金属の段階では、\n僕のものとポーレットのもの、大した違いがなかった筈だ。
2191 = "蓑笠爺爺為我們倆準備的金屬塊，在一開始並沒有什麼特別大的差異。" 

# monologue
# JP: が、今僕らが伸ばし終わったものを見ると――
1829 = "但是，當我們敲打完畢後——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットのは、随分と小ぶりで肉厚だな」
1487 = "「波萊特的菜刀又小又厚啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんのはおっきいですね。\nなんか、マグロとかもさばけちゃいそう」
1626 = "「雙鐵君的菜刀好大啊。感覺就算要剖鮪魚也沒有問題」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「はっは、マグロは良かとですなぁ」
1289 = "「哈哈，鮪魚好啊」" 

# monologue
# JP: そう笑いつつ、蓑笠老人はまず僕の包丁を取り、\nまた火を入れて、とんかん叩く。
2194 = "蓑笠爺爺笑著拿起我打的菜刀，又將它投入火中燒紅，再次敲打。" 

# monologue
# JP: そしてそれを、\n何かの液体の中へとつける。
2127 = "然後將它浸入某種液體中。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「いくらか、こうして焼き戻します。\nそうせん鋼は脆くてすぐに欠けますけんねぇ」
1384 = "「必須得這樣回火。不然鋼會變得很脆，用用就會有缺口咧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その液体は何ですか？」
1600 = "「那個液體是什麼？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「180度の油とです」
1634 = "「１８０度的油」" 

# 【ポーレット】
# display as 波萊特
# JP: 「油ですか！？」
1481 = "「油！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかも180度とは……\n熱湯より熱いもので冷ますのですか」
1531 = "「而且有１８０度……要用比開水還要燙的液體來冷卻嗎？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「一番熱かときが、\nいつまでも続くゆうことはなかとですからなぁ」
1348 = "「因為最熱的狀態是無法一直保持下去的咧」" 

# monologue
# JP: ゆっくりと立ち、\n蓑笠老人は奥へと入り、奥様に何かを言付ける。
1817 = "他慢慢站起來，走進裡屋和老伴說了些什麼。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「急に冷めれば壊れてしまう。\nゆるゆる冷めれば、粘りば生まれる」
1358 = "「如果突然冷卻就會裂開，只有慢慢地冷卻，才會變得堅韌」" 

# monologue
# JP: 奥様が淹れてくださったお茶を、\n蓑笠老人が運んでくれる。
2193 = "蓑笠爺爺端來太太泡的茶。" 

# monologue
# JP: 暑い夏の、暑い鍛冶工場の、熱いお茶。\n喉から腹まで焼かれるようで、実に美味い。
1933 = "大夏天在炎熱的鍛造廠裡喝著滾燙的熱茶。讓我感覺好像從喉嚨到腹部都燒了起來，十分美味。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ま、そういうもんですけんね、何事も」
1243 = "「凡事都是這個道理」" 

# 【双鉄】
# display as 雙鐵
# JP: 「何事も、ですか」
1209 = "「任何事都一樣嗎」" 

# monologue
# JP: 確かに……それは人間関係にも通じるし、\nあるいはブーム、そうしたものにも通じる気がする。
2142 = "的確……人和人之間的相處也是如此。而掀起一股熱潮，或許也是一個道理。" 

# 【双鉄】
# display as 雙鐵
# JP: 「逆に言えば、壊さず長く保つものとするには、\n上手に熱を冷ます必要がある」
1205 = "「也就是說，如果要讓事物長久地保持下去，就需要用正確的方式為它降溫才行」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ゆーことですな」
1372 = "「就是這樣咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ためになるな、ポーレット」
1489 = "「波萊特，我們又學到新知識了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はっ！　はいっ！　ほんとに――ほんとに、すごく！\nためになるし――ためにしたいって。わたし、思います」
1462 = "「是！　是啊！　我覺得這個道理對我們很有用！而且——我也希望做到學有所用」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1313 = "「唔？」" 

# monologue
# JP: お茶がよっぽど熱かったのか、\nポーレットの顔は真っ赤――っ！！！
2083 = "是因為茶太燙了嗎，波萊特滿臉通紅——啊！！！" 

# monologue
# JP: （いや、バカか僕は――\n“人間関係にも”と、自分で思ったばかりではないか）
2286 = "（啊，我真是傻——明明剛才還在想著“人與人之間的相處也是如此”）" 

# monologue
# JP: 人間関係全般に通じることならば、\nそれは無論、男女関係、恋愛関係にも通用しよう。
2074 = "既然這條法則適用於人和人之間的任何關係，那當然也包括男女關係和戀愛關係。" 

# monologue
# JP: ポーレットのひどい赤面の理由が、\nもしも、そこにあるというなら……
1964 = "如果說波萊特之所以會臉紅，是出於這個原因的話……" 

# monologue
# JP: （“ためにしたい”と、役立てたいと――\nポーレットはそう、確かに言った）
2292 = "（而波萊特剛才還說——“希望做到學有所用”）" 

# monologue
# JP: 壊さず、長く保つ関係にしていきたい、と……\nポーレットがそう願う相手は――
1803 = "也就是說，她希望與某人構築和諧長久的關係……那個人究竟是——" 

# 【蓑笠】
# display as 蓑笠
# JP: 「お茶ば、熱くに入りすぎよったかもしれんですなぁ」
1515 = "「看來，茶有些太燙了啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1632 = "「！！？」" 

# monologue
# JP: 蓑笠老人の穏やかな声に、けれどビクリと震えてしまう。
2195 = "蓑笠爺爺語調很柔和，可我卻還是被嚇了一跳。" 

# monologue
# JP: いかん、いかん。今日は楽しむ。\nただそれだけに集中すると、決めているのだ。
1795 = "不行，這樣可不行。今天已經和波萊特約好了，只專注於玩樂。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「しかし、今日はどぎゃんして、\nこげな体験ばしようと思うて来てくださったとですか」
1197 = "「不過，你們今兒怎麼想到來這裡體驗打鐵咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「遊ぼうと――ポーレットと一日、\n遊んで楽しんで過ごそうと、決めてきました」
1400 = "「我和波萊特說好了，今天高高興興玩一天」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ほう、それはそれは」
1305 = "「哦，那可真不錯」" 

# monologue
# JP: 穏やかな声。
2192 = "蓑笠爺爺用沉穩平和的聲音回應道。" 

# monologue
# JP: ポーレットの喉からもホウっと、\n安心したような息が吐かれる。
2118 = "波萊特也長出一口氣，似乎放下心來的樣子。" 

# 【ポーレット】
# display as 波萊特
# JP: 「市で、以前に調査したことがあるんです。\n観光客さんの満足度が高いスポットとかを」
1379 = "「市裡之前做過調查，問前來觀光的客人對哪個景點比較滿意」" 

# monologue
# JP: 僕とポーレットとふたり、かわるがわるに言葉をつむぐ。
2025 = "我和波萊特兩人輪流開始敘述起來。" 

# monologue
# JP: 赤井阿蘇神社、幽霊寺、温泉物産館、クマ川くだり――\n一日過ごしてきた想い出が、言葉によって鮮やかになる。
2223 = "赤井阿蘇神社、幽靈寺、溫泉物產館、隈河漂流——我們細數著今天一起留下的腳印。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで、クマ川下りが終わったときに、凪ちゃんが、\n『この後の予定は？』って聞いてきてくれて」
1501 = "「然後在隈河漂流靠岸的時候，小凪問我們接下來有什麼打算」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、そいででしたか」
1320 = "「啊，所以就來我這裡咧」" 

# monologue
# JP: 納得しきり。\nそんな風情で蓑笠老人は深く頷く。
2190 = "蓑笠爺爺明白了過來，重重地點頭。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「こん体験ば、凪と、凪の友達連中くらいしか、\nやったことがなかとでしたから」
1267 = "「只有凪和凪的朋友才在我這裡玩過這個咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「何故ですか！？　こんなにも楽しい体験ならば」
1491 = "「為什麼呢！？　明明這麼好玩」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「時間ば、かかってしまいますけんねぇ。\n今どきの観光客さんは、こぎゃんとゆったり――」
1347 = "「因為很花時間咧。現在的客人哪裡有這麼悠閒——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　宮本さん？\nあ、ごめんなさいっ！」
1296 = "「哎？　宮本女士？啊，不好意思！」" 

# monologue
# JP: 普段とは違う、ポーレットの携帯の着信音。
2244 = "這段鈴聲和我平時聽到的不一樣。" 

# monologue
# JP: 宮本さん、からといっていた。\nならば恐らく、非常――緊急用の着信音であるのだろう。
1952 = "她說是宮本女士打來的。那麼這恐怕就是所謂的緊急鈴聲吧。" 

# 【ポーレット】
# display as 波萊特
# JP: 「もしもし、わたしです。はい――え？　[さがら,1]相楽村で？\nはい――わかりました、すぐお願いします！」
1323 = "「喂，是我。是的——哎？　在相良村？我知道了——請您馬上處理！」" 

# monologue
# JP: 携帯を切るより早く、\nもうポーレットは立ち上がっている。
2245 = "還沒等掛斷電話，波萊特就站了起來。" 

# monologue
# JP: ならなんであれ、緊急事態に違いない。\n何が起きたかも気になる、が――
2012 = "恐怕出了什麼緊急情況。雖然我也很在意具體內容，但現在更重要的是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ナビを使うか？」
1544 = "「要乘Ｎａｖｉ嗎？」" 

# monologue
# JP: まず真っ先にそう尋ねれば、\nポーレットは、申し訳無さと安堵を交えた顔になる。
2173 = "聽到我第一個問題是這個，波萊特的表情夾雜著安心與歉意。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。\nあ、けど――」
1563 = "「謝謝。啊，但是——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。ならば分業しよう。\nナビには、ポーレットを送っていくよう命令しておく」
1405 = "「我明白，那就分頭行動吧。我會命令Ｎａｖｉ送你過去的」" 

# monologue
# JP: ポーレットの目が、\x%l焼なまし;#00ffc040;焼なま%l;#;されてる包丁たちを、\n一瞬だけれど、確かに見ていた。
2257 = "雖然只有一瞬間，但波萊特確實看向了已經\\x%l焼なまし;#00ffc040;退火%l;#;過的兩把菜刀。" 

# monologue
# JP: ならば僕は、一人になっても、\n今日の務め――いやさ、遊びを完遂しよう。
2072 = "既然如此，那就算只剩下我一個人，也要完成今天的任務——不，今天的遊樂項目。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は残って、包丁たちを仕上げておく。\nああ、もしもポーレットが自分で」
1406 = "「我會留在這裡把兩把菜刀做完。啊，如果波萊特想自己做——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、双鉄くんに仕上げ、お願いしたいです」
1188 = "「不了，就拜託雙鐵君做完它們吧」" 

# monologue
# JP: 立ち止まり、振り返り、笑う。
1939 = "她停下腳步，回眸一笑。" 

# monologue
# JP: ただそれだけの仕草に、いつもと少しも変わらぬ笑顔に、\nけれど心を、痛いくらいに掴まれる。
2079 = "明明只是這樣一個小動作，笑容也和以往並無二致。但我卻覺得心臟好像被人攥得要發疼一般緊。" 

# 【ポーレット】
# display as 波萊特
# JP: 「せっかくふたりで来たんですから。\n合作で仕上がる方が、ずっと、ずうっと嬉しいです」
1398 = "「我們倆好不容易才來一趟。能像這樣合力完成一把菜刀，我會更加高興的」" 

# 【ハチロク】
# display as 八六
# JP: 「それで？　それから双鉄様は？」
1500 = "「然後呢？　雙鐵少爺您後來怎麼樣了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、仕上げた。\n仕上げたがこう――」
1511 = "「當然是做完了。但是總覺得——」" 

# monologue
# JP: うまく、感覚を言葉に出来ない。\n手が、わきわきと意味も無いのに動いてしまう。
2044 = "我無法用語言表達我的心情。只有手在半空中無力地比劃著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「手応えというか……なにかが、抜けた感じがしてな。\n仕上げるは仕上げたが、正直、不満な出来となった」
1361 = "「就感覺手感什麼的……似乎缺了點什麼。雖然做是做完了，但老實說我一點也不滿意」" 

# 【ハチロク】
# display as 八六
# JP: 「不満も何も――」
1392 = "「您說不滿意——」" 

# monologue
# JP: いつものように布団の端にもぐりこまず。
1871 = "八六沒有像往常那樣鑽進被窩裡。" 

# monologue
# JP: 僕と離れて向き合いながら、\nハチロクは戸惑ったように首を傾げる。
1943 = "她坐在我的對面，有些疑惑地歪著頭問道。" 

# 【ハチロク】
# display as 八六
# JP: 「そもそも、双鉄様に鍛冶のお心得はないではないですか。\nそれが、満足の行く仕上がりなどと――」
1628 = "「雙鐵少爺原本就沒有鍛造的經驗不是嗎？　那自然是無法做出令人滿意的作品——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、出来不出来という話ではない。\nそうではなくて――この……意気込みというか」
1513 = "「當然，我說的不是品質好不好。是——怎麼形容呢……是勁頭吧」" 

# monologue
# JP: 言葉に落とせぬ感覚を、\nそれでもなんとかひき戻そうと頭をひねる。
2023 = "我冥思苦想如何形容這股難以用言語表達的感覺。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうだ。熱だ。蓑笠老人の言っていた熱。\nあれが、急に冷めてしまったような感じになったのだ」
1317 = "「啊！　對了，是熱情。就是蓑笠爺爺所說的那種熱情。我感覺熱情突然被澆冷了」" 

# 【ハチロク】
# display as 八六
# JP: 「なにに対する熱が、でしょうか？」
1454 = "「是對什麼的熱情？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは無論、包丁作り――\nああ、いや、違うな」
1613 = "「那當然是做菜刀——不……不是這樣」" 

# monologue
# JP: 包丁作りは、最後まで興味深かった。
1843 = "做菜刀一直到最後都很有趣。" 

# monologue
# JP: 結局は、それを如何に観光客向けにアレンジするか……\n遊びを放棄し、打ち合わせをしてしまう程。――ああ！
1879 = "到後來，我甚至拋開了起初只想玩樂一下的念頭，與蓑笠爺爺討論起如何將這個體驗項目改造成適合遊客的——啊！" 

# 【双鉄】
# display as 雙鐵
# JP: 「遊びに対する熱が、だな。ポーレットが去り、\n取り残されて、一気に……楽しくなくなった」
1455 = "「是對玩樂的熱情。波萊特走後，留下我一個人……我覺得什麼都不好玩了」" 

# monologue
# JP: うん。そうだ。ポーレットと一緒にいたときは、\n何をやっても、それは楽しい遊びであった。
2085 = "是這樣的。和波萊特在一起的時候，不管幹什麼都很有趣。" 

# monologue
# JP: が、一人になったその途端、僕は、普段の僕に戻って……
1907 = "可一旦落單，我就馬上變回了以前那個我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこから先は、恐らく、義務感になってしまった。\n“遊ばねば”という意識が、僕の熱を下げたのだ」
1202 = "「之後的工序恐怕就單純變成了一種義務感。我越是腦子裡想著“要玩得盡興”，就越是覺得沒勁」" 

# 【ハチロク】
# display as 八六
# JP: 「左様でしたか」
1251 = "「原來是這樣啊」" 

# monologue
# JP: すっと、ハチロクが姿勢を正す。
1874 = "八六突然端正姿勢。" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
1627 = "「雙鐵少爺」" 

# monologue
# JP: 三指をつき――\n深々、僕へと頭を下げる。
1866 = "八六以三指觸地——彎下腰對我行禮。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした、いきなり」
1222 = "「你突然這是怎麼了」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、\nお答えをお見つけになりかかっておられます」
1630 = "「雙鐵少爺您已經離答案很近了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「答え？　何のだ？」
1525 = "「答案？　什麼答案？」" 

# 【ハチロク】
# display as 八六
# JP: 「双鉄様の、お答えをです」
1629 = "「雙鐵少爺心中疑問的答案」" 

# monologue
# JP: 謎かけとしか思えぬ答え。
1948 = "她的回答真是讓我萬分疑惑。" 

# monologue
# JP: けれども、わかる。伝わってくる。\nハチロクはどこまでも真剣で、僕をからかってなどいない。
1826 = "但是我能明白八六十分認真，並沒有半點想要戲耍我的意思。" 

# 【ハチロク】
# display as 八六
# JP: 「そのお答えをみつけるために、\nハチロクは必ず、お邪魔になります」
1533 = "「而八六一定會成為您尋找答案時的阻礙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
1459 = "「是這樣的嗎？」" 

# 【ハチロク】
# display as 八六
# JP: 「左様です。ですのでわたくし、\n今日より日々姫の部屋で眠ります」
1371 = "「就是這樣。所以從今天開始，我要去日日姬的房間睡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お前がそれを望むのならば、止めはしないが――\nしかし」
1437 = "「既然你想這麼做，我倒是不會阻止你——不過」" 

# 【ハチロク】
# display as 八六
# JP: 「大丈夫。日々姫もイヤとは申しませんよ。\nわたくしと、きっと話も合いましょうから」
1478 = "「沒關係。日日姬不會拒絕的。而且我一定和她很談得來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1449 = "「是嗎」" 

# monologue
# JP: 僕より先に、ハチロクが何かの答えをみつけたようだ。
2145 = "看來八六比我先找到了某種答案。" 

# monologue
# JP: 僕の言葉に先回りして、\n一人で、さっさと立ち上がってしまう。
2107 = "沒等我說話，她就先站了起來。" 

# 【ハチロク】
# display as 八六
# JP: 「それでは双鉄様。また明日」
1616 = "「那麼雙鐵少爺。明天再見」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。お休みハチロク」
1327 = "「嗯。晚安，八六」" 

# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様、おやすみなさいませ。\nそうしてどうぞ、素敵な明日をお迎えください」
1465 = "「是，雙鐵少爺，請好好休息。休息一晚，迎接一個美好的明天」" 

# monologue
# JP: 音も立てずにふすまが開かれ、\nまた閉じられる。
1957 = "她靜靜拉開拉門，離開房間再拉上。" 

# monologue
# JP: ハチロクはまるで足音を立てず――\nけれども気配が、静かに静かに遠ざかっていく。
1867 = "八六完全沒有發出腳步聲——但我能感覺到她靜靜離開了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の答え、か――」
1413 = "「我的答案嗎……」" 

# monologue
# JP: ハチロクが去ったということは、それは一人で考えるべき\n――、一人で見つけるべきものなのだということだろう。
2068 = "既然八六離開了，那就代表著我需要自己思考——需要自己來找出答案吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「問うべき点は……」
1510 = "「現在要想的是……」" 

# monologue
# JP: 考える。\nハチロクが去っていったそのきっかけを。
1870 = "八六是聽到哪句話才離開的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「何故、一人になって遊びが終わってしまったか――\n一人になって、楽しさが消えてしまったか、だな」
1492 = "「為什麼我落單以後就沒有心思玩樂了——變成一個人就不再開心了」" 

# monologue
# JP: 思った瞬間、\n“一人ではない”と思い直す。
2051 = "我突然意識到，當時“並不是只有我一個人”。" 

# monologue
# JP: あの場には、蓑笠老人も居てくれたし、言葉も交わした。\n一緒に物を作りもした。が――
2139 = "當時在場的還有蓑笠爺爺，我和他一邊交談一邊做菜刀。但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「楽しく……も、あった。\nしかし――楽しさの質というか、熱が違った」
1520 = "「確實……很快樂。不過——這份快樂的質量，或者說熱情，是完全不同的」" 

# monologue
# JP: 蓑笠老人との会話や製作体験から得ることができたのは、\n純粋な知的興奮だろう。
2031 = "我在與蓑笠爺爺的交談以及體驗打鐵的過程所得到的，純粹只是學習新東西的興奮。" 

# monologue
# JP: ポーレットと過ごしていた時間の中には、\nそれだけではない喜びがあった。
1823 = "但和波萊特在一起的時候，則能感覺到不同於此的喜悅。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なにがあんなに楽しかったのだ。\nなにが、他と違ったのだ」
1246 = "「到底是什麼讓我如此快樂。到底有什麼不同」" 

# monologue
# JP: 例えば、そうだ、川下り。\n川下り船なら、ハチロクとも一緒に乗っている。
2101 = "比如說，漂流的時候。我也和八六一起坐過漂流船。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あのときも確かに楽しかった。\n楽しかったが――今日の楽しさとはまるで違った」
1409 = "「我當時的確也很開心。但是——那種開心的感覺和今天截然不同」" 

# monologue
# JP: あのときの楽しさは、やはり知的興奮から――\n川下りそのものへの興味から来ていたような気がする。
2249 = "那時候的快樂也還是來源於學到新知的興奮——因為我對漂流本身就很感興趣。" 

# monologue
# JP: が、今日は違った。\n今日の僕は――
1821 = "但今天不同。今天的我——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1328 = "「嗯」" 

# monologue
# JP: 何度も行ってる赤井阿蘇神社さえをも、\n今日は楽しい“遊びの場所”と認識できた。
1982 = "就連去過好幾次的赤井阿蘇神社，我今天都覺得是“很好玩的地方”。" 

# monologue
# JP: ポーレットといた時間のすべてに、\n僕は楽しさを感じていた。
1919 = "和波萊特在一起的時候，我總是感到很快樂。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこに、ポーレットがいたからだ。\nポーレットが、いつも笑顔でいたからだ」
1451 = "「是因為有波萊特的陪伴。波萊特一直都笑著陪在我身邊的緣故」" 

# monologue
# JP: これが、つまりは、\n“僕の答え”か。
2242 = "這就是“我的答案”嗎。" 

# monologue
# JP: すっと一本、光の道が――\n進むべき道が、目の前に示されたような気になる。
2034 = "我彷彿看到一束光芒——一束指引我前進的光芒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、“楽しさ”とはこれなんだ」
1610 = "「那我的“快樂”應該就是這個吧」" 

# monologue
# JP: ポーレットが笑顔になること。\nポーレットが喜んでくれること。
2176 = "能夠讓波萊特綻放笑容的事物。能夠讓波萊特感到快樂的事物。" 

# monologue
# JP: 廃鉱山を、御一夜を、そういう場所にしていけばいい。\nそうするために何ができるか、一つ一つを考えればいい。
1903 = "只要將廢礦山和御一夜，打造成這樣一個地方就行。要一點一點去考慮我能夠為此做些什麼事情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、楽しさを知っていたんだ」
1240 = "「其實我原本就知道什麼是快樂」" 

# monologue
# JP: 思い出す。\n遠い、遠い昔のことを。
2027 = "我回憶起了遙遠的過去。" 

# monologue
# JP: 父さんの、母さんの。そして誰より、路子の笑顔を――\n僕は心から大好きで、それに包まれていたことを。
2131 = "爸爸媽媽的笑容，還有那最耀眼的，路子的笑容——我深深愛著他們的笑容，也曾與之朝夕相處。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大切なのは仕掛けじゃない。大切なのは演出じゃない。\n僕らが、笑顔に――心からの笑顔になることなんだ」
1469 = "「最重要的不是機關道具。最重要的不是演出效果。而是要讓人們——發自內心地綻放笑容」" 

# monologue
# JP: 思えば、つながる。思い出す。\n今日の凪は、今日のふかみは、緊張せずにはしゃいでいた。
2018 = "想著想著，兩點便連成了線——今天凪和深美在漂流的時候也沒有緊張，玩得很開心。" 

# monologue
# JP: いつだってあの笑顔があれば、\n川下りも、きっともっと、みなが楽しめる場所になる。
1963 = "如果她們能一直保持今天的笑容，隈河漂流一定能給大家帶來更多快樂。" 

# monologue
# JP: （赤井宮司がおっしゃっていたのも――\n宝生稀咲が目指しているのも、同じことだ――）
2297 = "（赤井宮司說過的話——以及寶生稀咲的目標，其實都是殊途同歸的——）" 

# monologue
# JP: 食えないから、不安があるから、笑顔になれない。\n笑顔になれない者が観光で人を楽しませるなどできない。
2098 = "正是因為無法賺錢，正是因為心有不安，人們才無法綻放笑容。遺失了笑容的人們，自然無法為遊客帶來快樂。" 

# monologue
# JP: 宝生稀咲は、そこを見きって諦めて、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を進めようとした。
1974 = "寶生稀咲正是看透了這一點才放棄了旅遊業，轉而決定推進\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが、宝生稀咲の優先順位なのだろう」
1585 = "「這就是寶生稀咲所考慮的優先順序吧」" 

# monologue
# JP: まず、食えるようになること。\nそれから笑顔を取り戻すこと。
1860 = "先讓大家都吃飽穿暖，然後再找回遺失的笑容。" 

# monologue
# JP: 好循環はそのあとで、あるいは生まれるのかもしれない。\nが――
2061 = "或許這樣可以形成良性循環。但——" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、僕だ。\n僕のみつけた楽しみを、最優先にするのが、“答え”だ」
1411 = "「我的看法和她不同。我的“答案”就是——將我所找到的快樂放在首位」" 

# monologue
# JP: 小細工などは必要ない。\n僕らは、チームなのだから。
1801 = "不需要耍什麼小花樣。因為我們是一個團隊。" 

# monologue
# JP: 足りないものや歪んだものがあるのなら、\nそれは必ず、他の誰かが正してくれる。
1960 = "如果做錯了事、走歪了路，一定會有人來為我糾正。" 

# 【双鉄】
# display as 雙鐵
# JP: 「信じるんだ。僕が感じた楽しさを。\nそれをもう一度味わうために、何をしたいか考えるんだ」
1418 = "「我要相信我所感受到的快樂。為了能再一次體驗到它，想想下一步該做什麼」" 

# monologue
# JP: 心に、ポーレットの笑顔を浮かべる。\nポーレットに笑ってもらうため。
2030 = "我在心中回想波萊特的笑容。為了讓波萊特，再次展露那樣的笑容——" 

# monologue
# JP: そのアイディアを考える――ただそれだけで、間違いない。\n僕は、笑顔になれている。
2060 = "我默默地想著一個個點子。不會有錯，現在的我——一定笑得很燦爛。" 
