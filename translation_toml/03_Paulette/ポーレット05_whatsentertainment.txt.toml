[script]
# lines: 368 
# 【双鉄】
# display as 雙鐵
# JP: 「ふぅむ」
1310 = "「Ừm.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　ご本ですぅ。\nそうてつさん、お勉強のお時間ですか？」
1285 = "「Oa! Là sách này.\nAnh Soutetsu, đến giờ học rồi sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、勉強といえば勉強だ」
1335 = "「Chà, nói là học thì cũng là học.」"
# monologue
# JP: ただし、テキストは児童文学。
1798 = "Tuy nhiên, tài liệu lại là văn học thiếu nhi."
# monologue
# JP: 『きっとヒントになりますよ』と、\n日々姫が貸してくれたものだ。
2243 = "『Chắc chắn sẽ là một gợi ý tốt đấy』,\nHibiki đã nói vậy và cho tôi mượn nó."
# 【双鉄】
# display as 雙鐵
# JP: 「れいな一人か？　ポーレットは？」
1508 = "「Chỉ có một mình Reina thôi sao? Paulette đâu rồi?」"
# 【れいな】
# display as 玲奈
# JP: 「ちょっとお買い物だそうですよぉ。\nれいな、ひとあしお先に帰ってきましたぁ」
1486 = "「Chị ấy đi mua sắm một chút rồi ạ.\nReina đã về trước một bước đó nha~」"
# monologue
# JP: ふぅむ。\nならば、丁度良いかもしれん。
1922 = "Ừm.\nNếu vậy thì, có lẽ cũng vừa vặn."
# 【双鉄】
# display as 雙鐵
# JP: 「今、れいなには時間があるか？」
1509 = "「Bây giờ, Reina có thời gian rảnh không?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。整備も終わりましたし、\nお客さんも……」
1470 = "「Vâng ạ. Việc bảo dưỡng cũng đã xong rồi,\nvà hành khách cũng……」"
# monologue
# JP: きょろきょろと、\nれいなは大きく首を動かしあたりを見回す。
2135 = "Reina quay đầu nhìn quanh quất,\nđưa mắt dáo dác khắp nơi."
# 【れいな】
# display as 玲奈
# JP: 「誰もいませんから、時間あるですよぉ」
1203 = "「Không có ai cả, nên Reina có thời gian rảnh đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、少し付き合ってくれんか？」
1615 = "「Vậy thì, cùng tôi một chút được không?」"
# monologue
# JP: 日々姫のアドバイスを軽んじるわけではないのだが――
1792 = "Không phải là tôi coi nhẹ lời khuyên của Hibiki, nhưng——"
# monologue
# JP: 子供向けの本、という頭があるのか、\nどうにも読み始める気にならない。
1830 = "Có lẽ do suy nghĩ đây là sách dành cho trẻ em,\nnên tôi không tài nào có hứng thú bắt đầu đọc."
# 【れいな】
# display as 玲奈
# JP: 「つきあうって、何にですかぁ？」
1621 = "「Cùng anh, là làm gì cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「読書にだ。僕が朗読するので、\nそれを聞いていて欲しいのだ」
1622 = "「Đọc sách. Tôi sẽ đọc diễn cảm,\nvà tôi muốn em lắng nghe nó.」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　楽しそうですぅ。\nれいなよろこんでお付き合いしますよぉ」
1282 = "「Oa! Có vẻ vui lắm nha.\nReina rất sẵn lòng cùng anh đó ạ~」"
# monologue
# JP: れいなはいそいそ、自分の椅子を持ってきて\n僕の真向かいに腰掛ける。
2138 = "Reina hớn hở mang ghế của mình đến\nvà ngồi ngay đối diện tôi."
# monologue
# JP: テーブルの上にはスキットル。\n一瞬にして、聞く体勢が整えられる。
2092 = "Trên bàn là một chiếc bình bi đông.\nChỉ trong chốc lát, tư thế lắng nghe đã được chuẩn bị sẵn sàng."
# 【双鉄】
# display as 雙鐵
# JP: 「『[そうや,1]宗谷太郎の冒険』」
990 = "「『Cuộc phiêu lưu của Soya Tarou』」"
# 【れいな】
# display as 玲奈
# JP: 「ふわ！」
1356 = "「Oa!」"
# monologue
# JP: タイトルを言っただけでもう、瞳が輝く。\nこれはいい。
1899 = "Chỉ mới nói tựa đề thôi mà đôi mắt em ấy đã sáng rực lên.\nThế này thì tốt."
# monologue
# JP: この反応があるのなら、\n気合をいれて読めそうだ。
2070 = "Nếu có phản ứng thế này,\nthì tôi có thể dồn hết tâm sức để đọc rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「『――「太郎」「太郎」と幾度呼んでも物音もせぬ。\n　「太郎や、お前まだ寝ているのかい？」』」
976 = "「『——\"Tarou\", \"Tarou\", dù gọi bao nhiêu lần cũng không có tiếng động gì.\n　\"Tarou à, cháu vẫn còn đang ngủ sao?\"』」"
# monologue
# JP: ……ふむ、この宗谷太郎なる少年は、\n堀なる伯母さんの家に世話になっているのか。
962 = "……Ừm, cậu bé tên Soya Tarou này,\nđang được chăm sóc tại nhà của người dì tên Hori sao."
# monologue
# JP: 僕と、似た境遇なのかもしれん。\nそうと思えば、読み進める声にも興が乗る。
2217 = "Có lẽ hoàn cảnh cũng giống với tôi.\nNghĩ vậy, giọng đọc của tôi cũng trở nên hứng thú hơn."
# 【れいな】
# display as 玲奈
# JP: 「はわぁ……太郎さんはいたずらっこなのですねぇ」
1276 = "「Hawaa…… Tarou là một cậu bé nghịch ngợm nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ、かなりの悪童のようだな」
1332 = "「Ừm, có vẻ là một đứa trẻ khá ngỗ ngược đấy.」"
# monologue
# JP: 少年時代ならどうかはしらんが、\n今の僕には堀伯母さんの方に感情が寄る。
2256 = "Thời niên thiếu thì không biết thế nào,\nnhưng với tôi bây giờ thì lại đồng cảm với dì Hori hơn."
# monologue
# JP: どうしていいつけを守れぬものか――\n生き生きとした描写のために、腹立ちさえも覚えてしまう。
1925 = "Tại sao lại không chịu nghe lời cơ chứ——\nBởi vì miêu tả quá đỗi sống động, nên tôi thậm chí còn cảm thấy tức giận."
# 【ポーレット】
# display as 波萊特
# JP: 「ただいまぁ――あれ？　読書ですか？」
1401 = "「Tôi về rồi đây——Ủa? Đang đọc sách sao?」"
# 【れいな】
# display as 玲奈
# JP: 「ポーレット！　おかえりなさぁい。\n今、はじまったとこなんですよぉ」
1488 = "「Chị Paulette! Mừng chị đã về ạ.\nBọn em chỉ mới bắt đầu thôi đó nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「はじまった？」
1247 = "「Bắt đầu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「『「まだ参らぬか！」太郎の鉄拳が雨あられと降り注ぐ。\n　新参の小僧はついに「参った！」と手を挙げた。』」
1355 = "「『\"Vẫn chưa chịu thua sao!\" Nắm đấm sắt của Tarou giáng xuống như mưa.\n　Thằng nhóc mới đến cuối cùng cũng phải giơ tay \"Chịu thua!\"』」"
# 【ポーレット】
# display as 波萊特
# JP: 「わ……双鉄くんの読み聞かせ」
1277 = "「Oa…… Giọng đọc diễn cảm của anh Soutetsu.」"
# 【れいな】
# display as 玲奈
# JP: 「しー、ポーレット。静かにですよぉ」
1341 = "「Suỵt, chị Paulette. Phải giữ im lặng đó nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、ごめん」
1319 = "「A, xin lỗi nhé.」"
# monologue
# JP: ……聞かん気の暴れん坊なだけでなく、\nこの太郎、なかなかに悪知恵まで回る。
967 = "……Không chỉ là một kẻ bạo lực cứng đầu,\nmà Tarou này còn khá là ranh mãnh nữa."
# monologue
# JP: 児童文学の主人公が、\nこれほどスラリと嘘を吐くとは思わなかった。
2105 = "Không ngờ nhân vật chính của văn học thiếu nhi,\nlại có thể nói dối trơn tru đến vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「――『「ちぇっ、障子貼りなんてしたくないなぁ」。\nしかし堀の伯母さんの命に逆らえば後が怖い』」
972 = "——『\"Chậc, mình chẳng muốn dán cửa shoji chút nào\".\nNhưng nếu cãi lời dì Hori thì hậu quả sẽ rất đáng sợ』"
# 【れいな】
# display as 玲奈
# JP: 「しょうじはりって、イヤなことなのですか？\nれいな、やったことないのですぅ」
1528 = "「Dán cửa shoji là việc đáng ghét lắm sao ạ?\nReina chưa làm bao giờ đâu ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「細かな作業だし、一枚では済まんからな。\nまぁ、面倒といえば面倒だ」
1456 = "「Đó là một công việc tỉ mỉ, và không chỉ dán một tấm là xong đâu.\nChà, nói là phiền phức thì cũng phiền phức thật.」"
# monologue
# JP: 太郎も少しは懲りれば良いが――\nそう思いつつページをめくる。
1985 = "Giá mà Tarou cũng biết chừa một chút thì tốt——\nTôi vừa nghĩ vậy vừa lật trang sách."
# 【双鉄】
# display as 雙鐵
# JP: 「『「おい太郎、障子貼りなんてさせられてるのか」\n　「邪魔しないでくれ、今、面白いところなんだ」』――」
980 = "「『\"Này Tarou, cậu bị bắt dán cửa shoji à\"\n　\"Đừng có làm phiền tớ, bây giờ đang đến đoạn thú vị đấy\"』——」"
# monologue
# JP: ほう……なるほど。\nそうか。このような手で切り抜けるとは――
1920 = "Hô…… Ra vậy.\nRa là thế. Không ngờ lại dùng cách này để vượt qua——"
# 【れいな】
# display as 玲奈
# JP: 「わぁ！　太郎さん、あたまいいですぅ」
1281 = "「Oa! Tarou thông minh quá đi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな――障子貼りを楽しい遊びと認識させて、\n自分の代わりに働かせるばかりか、お礼の品ま、で――」
1444 = "「Đúng vậy——Khiến người khác nghĩ dán cửa shoji là một trò chơi thú vị,\nkhông chỉ bắt họ làm thay mình, mà còn nhận được cả quà cảm ơn, nữa——」"
# 【れいな】
# display as 玲奈
# JP: 「……あれれ？　そうてつさん？」
986 = "「……Ủa ủa? Anh Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「これを――日々姫は僕に教えたかったのか」
1584 = "「Cái này——Là điều Hibiki muốn dạy cho tôi sao.」"
# monologue
# JP: ポーレットを見る。\nその目は僕を見返し、頷く。
2049 = "Tôi nhìn Paulette.\nĐôi mắt ấy nhìn lại tôi, và cô ấy gật đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん、れいな。本の続きは後日でいいか？」
1427 = "「Xin lỗi, Reina. Phần tiếp theo của cuốn sách để hôm khác đọc được không?」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　『つづく』ですねぇ」
1284 = "「Oa! Là 『Còn tiếp』 nhỉ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだ『つづく』だ」
1447 = "「Đúng vậy, là 『Còn tiếp』.」"
# 【れいな】
# display as 玲奈
# JP: 「それなられいな、つづき、楽しみにしちゃいますねぇ」
1612 = "「Nếu vậy thì Reina, sẽ rất mong chờ phần tiếp theo đó nha~」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、お茶をいれますねぇ」
1506 = "「Reina đi pha trà đây ạ~」"
# monologue
# JP: そのままとことこ、店の奥へと。
1945 = "Nói rồi, em ấy lạch bạch đi vào phía trong cửa hàng."
# 【ポーレット】
# display as 波萊特
# JP: 「ありがと、れいな」
1564 = "「Cảm ơn em nhé, Reina」"
# 【双鉄】
# display as 雙鐵
# JP: 「で、だ」
1592 = "「Vậy, là thế này.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
1328 = "「Vâng.」"
# monologue
# JP: ポーレットが僕へと向き直る。\nそのまっすぐな瞳に言葉が、吸い寄せられる。
2122 = "Paulette quay lại nhìn tôi.\nĐôi mắt nhìn thẳng ấy như hút lấy những lời tôi định nói."
# 【双鉄】
# display as 雙鐵
# JP: 「障子貼りさえ、“楽しい遊び”と認識されれば、\n対価を払ってさえもやりたがるものが続出する」
1270 = "「Ngay cả việc dán cửa shoji, nếu được coi là \"trò chơi thú vị\",\nthì sẽ có vô số người muốn làm dù phải trả giá.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そういうの、すっごくあると思います」
1419 = "「Tôi nghĩ những chuyện như vậy có rất nhiều đấy.」"
# monologue
# JP: 即座に返るポーレットの声から、張りを感じる。
2121 = "Từ giọng nói đáp lại ngay lập tức của Paulette, tôi cảm nhận được sự căng thẳng."
# monologue
# JP: ならばその耳にも、\nこの物語が単なる絵空事とは聞こえなかったのだろう。
2016 = "Nếu vậy thì với đôi tai đó,\ncâu chuyện này hẳn không chỉ là một điều viển vông."
# 【ポーレット】
# display as 波萊特
# JP: 「オークションとか、似たような感じだと思います。\n“価値がある”って、お互いに煽りあって過熱しますし」
1429 = "「Giống như đấu giá chẳng hạn, tôi nghĩ cũng tương tự như vậy.\nChỉ cần nghĩ là \"có giá trị\", mọi người sẽ kích động lẫn nhau và khiến nó trở nên nóng sốt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、確かにだ。\n人には恐らく、そうした一面があるのだろう」
1224 = "「Nghe cô nói vậy, đúng là thế thật.\nCon người có lẽ đều có một mặt như vậy.」"
# monologue
# JP: 場に、人に――周囲に影響されることで、\nもともとの価値観が変化する。
2089 = "Bị ảnh hưởng bởi hoàn cảnh, bởi con người——bởi những thứ xung quanh,\ngiá trị quan ban đầu sẽ bị thay đổi."
# monologue
# JP: それは、仮に悪意に取れば、\n詐欺師の付け込みどころともなろうが――
2140 = "Nếu hiểu theo nghĩa xấu,\nđó có thể là điểm yếu để những kẻ lừa đảo lợi dụng——"
# 【双鉄】
# display as 雙鐵
# JP: 「そうした一面を上手く刺激できれば、採掘体験に――\n新しい価値を感じてもらえるのではなかろうか」
1269 = "「Nếu chúng ta có thể kích thích khía cạnh đó một cách khéo léo, thì trải nghiệm khai thác mỏ——\nchẳng phải sẽ mang lại một giá trị mới cho họ sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「新しい価値」
1435 = "「Giá trị mới.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、すなわち“遊び”。\n採掘体験そのものを、“遊び”と感じてもらうのだ」
1330 = "「Ừm, nói cách khác là \"trò chơi\".\nKhiến họ cảm thấy bản thân trải nghiệm khai thác mỏ chính là một \"trò chơi\".」"
# 【ポーレット】
# display as 波萊特
# JP: 「そういえば……」
1554 = "「Nhắc mới nhớ……」"
# monologue
# JP: 細く形の良い指を、ポーレットは自らの顎に触れさせる。
2120 = "Paulette đưa những ngón tay thon dài xinh đẹp chạm lên cằm."
# 【ポーレット】
# display as 波萊特
# JP: 「掘った石炭を地域通貨的に使える――\nそれもお店屋さんごっこっぽくて、遊び要素ありますね」
1360 = "「Than đào được có thể dùng như tiền tệ địa phương——\nCái đó cũng giống trò chơi đồ hàng, có yếu tố vui chơi trong đó nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それをさらに深め広げる。報酬のために掘るのではなく、\n掘ること自体を、楽しい遊びにしてしまう」
1502 = "「Chúng ta sẽ đào sâu và mở rộng điều đó hơn nữa. Không phải đào vì phần thưởng,\nmà biến chính việc đào mỏ thành một trò chơi thú vị.」"
# 【ポーレット】
# display as 波萊特
# JP: 「どうやってですか？」
1546 = "「Bằng cách nào ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
1603 = "「Chuyện đó thì——」"
# monologue
# JP: 素朴極まる問いかけに、\nけれども僕の思考はピタリと止まってしまう。
2093 = "Trước một câu hỏi vô cùng giản dị,\nnhưng suy nghĩ của tôi lại hoàn toàn khựng lại."
# monologue
# JP: 楽しさ、楽しみ、遊び――そうした価値観を、\n具体的な事例へどうにも、置き換えられない。
2096 = "Niềm vui, sự thích thú, trò chơi——những giá trị quan đó,\ntôi không tài nào thay thế bằng những ví dụ cụ thể được."
# 【双鉄】
# display as 雙鐵
# JP: 「……それは、遊びの楽しさを良く知る者に\n考えてもらうほかないかもしれんな」
988 = "「……Có lẽ, chúng ta đành phải nhờ những người hiểu rõ niềm vui của việc vui chơi\nsuy nghĩ giúp thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　どうしてですか？」
1297 = "「Hả? Tại sao vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「恐らく僕は、いささか遊びと離れすぎた。\n幼少期には、目一杯楽しんでいた気もするのだが」
1390 = "「Có lẽ tôi đã rời xa việc vui chơi hơi lâu rồi.\nDù tôi nhớ hồi nhỏ mình cũng từng chơi đùa thỏa thích.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
1315 = "「A……」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい、お茶がはいりましたよぉ」
1535 = "「Vâng ạ, trà pha xong rồi đây nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、すまんな」
1342 = "「Ồ, làm phiền em rồi.」"
# monologue
# JP: れいなの淹れてくれる紅茶も、\nポーレットのものに決して劣らぬ。
2136 = "Hồng trà do Reina pha,\ncũng tuyệt đối không thua kém gì Paulette."
# monologue
# JP: 何も混ぜずにストレートで。\n熱と旨さと豊かな香りが口に広がる。
2160 = "Uống trực tiếp không pha thêm gì.\nĐộ nóng, vị ngon và hương thơm phong phú lan tỏa trong miệng."
# 【双鉄】
# display as 雙鐵
# JP: 「む？　どうしたポーレット」
1312 = "「Hửm? Sao thế Paulette?」"
# monologue
# JP: せっかくの茶だというのに、カップに指さえ伸ばさない。
2081 = "Đã cất công pha trà rồi, vậy mà cô ấy lại không thèm vươn tay lấy cốc."
# 【双鉄】
# display as 雙鐵
# JP: 「冷めてしまうと――」
1548 = "「Nếu để nguội thì——」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら、遊びましょう、双鉄くん。\n遊ばなきゃダメです、絶対に」
1608 = "「Vậy thì, cùng chơi thôi, anh Soutetsu.\nKhông chơi là không được đâu, tuyệt đối không được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
1633 = "「!?」"
# monologue
# JP: 思いもかけぬ、強い言葉と強い瞳と。
2042 = "Những lời nói mạnh mẽ và ánh mắt kiên định không ngờ tới."
# monologue
# JP: 気圧されてしまった一瞬に、\nポーレットはグイと、紅茶を一気に飲み干す。
1927 = "Trong khoảnh khắc tôi bị áp đảo,\nPaulette ực một cái, uống cạn cốc hồng trà."
# 【ポーレット】
# display as 波萊特
# JP: 「楽しさを知らなくちゃ、人を楽しませるなんて出来ない。\n誰か他の人じゃなく、双鉄くんが心の底から遊ばなきゃ」
1193 = "「Nếu không biết niềm vui là gì, thì không thể làm cho người khác vui được.\nKhông phải ai khác, mà chính anh Soutetsu phải chơi đùa từ tận đáy lòng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕自身が、か」
1416 = "「Chính bản thân tôi sao.」"
# monologue
# JP: 確かに、それはそうかもしれん。\nれいなや凪あたりは、何に触れても楽しみそうだが――
2156 = "Quả thực, có lẽ là như vậy.\nCỡ như Reina hay Nagi thì đụng vào cái gì cũng có vẻ vui, nhưng——"
# monologue
# JP: 逆に、僕のような者でも心底楽しめるのなら、その遊びは、\n観光の売りとなるに足る価値を持てるのかもしれない。
2144 = "Ngược lại, nếu một người như tôi cũng có thể tận hưởng từ tận đáy lòng, thì trò chơi đó,\ncó lẽ sẽ có đủ giá trị để trở thành điểm nhấn thu hút khách du lịch."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、試そう。\nしかし――遊びといっても」
1607 = "「Nếu vậy thì, thử xem sao.\nNhưng——nói là vui chơi thì.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたし――わたし！　知ってますっ！！\nええと、市で、いろいろ調べたことがあるんです」
1395 = "「Tôi——Tôi! Tôi biết đấy!!\nÀ ừm, tôi đã từng tìm hiểu rất nhiều thứ ở thành phố.」"
# 【双鉄】
# display as 雙鐵
# JP: 「調べた？」
1559 = "「Tìm hiểu?」"
# 【ポーレット】
# display as 波萊特
# JP: 「観光振興のために、御一夜市内で人気あるスポットとか、\nイベントとかそういうのです」
1490 = "「Để xúc tiến du lịch, tôi đã tìm hiểu về những địa điểm nổi tiếng trong thành phố Ohimitera,\ncác sự kiện và những thứ tương tự.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど……それをめぐれば、\n観光についてと遊びについてを同時に学べるわけか」
1249 = "「Ra vậy…… Nếu đi dạo quanh đó,\nthì có thể học hỏi đồng thời về du lịch và vui chơi sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だめです、そんなの」
1583 = "「Không được đâu, như thế thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
1336 = "「Hửm?」"
# monologue
# JP: 怒った表情。\n芝居がかっているようで、だけど本気でもあるようで。
2119 = "Khuôn mặt giận dữ.\nTrông như đang diễn kịch, nhưng cũng có vẻ như đang nghiêm túc."
# monologue
# JP: ポーレットは勢いもよく人差し指を一本たてて、\n僕の鼻先につきつける。
1947 = "Paulette giơ một ngón trỏ lên đầy khí thế,\nvà chĩa thẳng vào chóp mũi tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「余計なことを考えないで、ただ目一杯楽しまなくちゃ。\nそいつが、粋な遊びってぇもんですよ」
1195 = "「Đừng suy nghĩ những điều thừa thãi, chỉ cần tận hưởng hết mình là được.\nĐó mới là cách vui chơi sành điệu đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1250 = "「Ra vậy.」"
# monologue
# JP: この一瞬にも、楽しませよう、遊ばせようと、\nポーレットが心を配ってくれていると感じて。
1983 = "Ngay trong khoảnh khắc này, tôi cảm nhận được Paulette đang quan tâm,\nmuốn tôi được vui vẻ, muốn tôi được chơi đùa."
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、目一杯楽しむために――」
1617 = "「Vậy thì, để có thể tận hưởng hết mình——」"
# monologue
# JP: ならばと、僕も乗ってみる。\n不器用で無様であろうが、芝居がかろうと意識してみる。
2246 = "Nghĩ vậy, tôi cũng hùa theo.\nDù có vụng về, lóng ngóng, tôi cũng cố ý làm ra vẻ diễn kịch."
# 【双鉄】
# display as 雙鐵
# JP: 「――お嬢さん。僕と遊んではくれないか？」
975 = "「——Tiểu thư. Cô có muốn đi chơi cùng tôi không?」"
# monologue
# JP: 一瞬、おどろいたような顔。\n次の瞬間、それはにこやかに弾け崩れる。
1941 = "Trong một thoáng, khuôn mặt cô ấy lộ vẻ ngạc nhiên.\nNgay khoảnh khắc tiếp theo, nó vỡ òa thành một nụ cười rạng rỡ."
# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
1329 = "「Vâng!」"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？」
1273 = "「Kya!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1293 = "「Ôi chà.」"
# monologue
# JP: バランスを崩しかけたポーレットへと手をのばす。
2056 = "Tôi vươn tay về phía Paulette khi cô ấy sắp mất thăng bằng."
# monologue
# JP: 僕から先に舟を下りていたというのに、\nこれはいささか、気が利かなかった。
2077 = "Dù tôi đã xuống thuyền trước,\nnhưng thế này thì có hơi thiếu tinh ý."
# 【双鉄】
# display as 雙鐵
# JP: 「掴まってくれ」
1425 = "「Bám vào tôi đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、ありがとうございます」
1562 = "「A, cảm ơn anh nhiều ạ.」"
# monologue
# JP: 僕の手のひらに重なった手は、柔らかく、小さく、温かい。\nほんのすこしだけ汗ばんでいる。
2039 = "Bàn tay đặt lên lòng bàn tay tôi mềm mại, nhỏ bé và ấm áp.\nHơi rịn một chút mồ hôi."
# monologue
# JP: 強く握ればつぶしてしまいそうな気がして、\nそうっとだけしか、包めない。
2019 = "Có cảm giác nếu nắm mạnh thì sẽ làm nó vỡ vụn mất,\nnên tôi chỉ có thể nhẹ nhàng bao bọc lấy nó."
# 【双鉄】
# display as 雙鐵
# JP: 「楽しむことに集中しすぎて、\n当然の気遣いを忘れてしまったな」
1408 = "「Tập trung vào việc vui chơi quá,\nmà tôi quên mất cả sự quan tâm cơ bản nhất.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ」
1340 = "「Ufufu.」"
# monologue
# JP: 握られている手にきゅっと、心地良い力が伝わってくる。
2037 = "Một lực vừa phải, dễ chịu truyền đến từ bàn tay đang được nắm."
# 【ポーレット】
# display as 波萊特
# JP: 「声、出てましたよね？　双鉄くん」
1226 = "「Anh đã hét lên đúng không? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふかみが大サービスしてくれたからな」
1586 = "「Tại Fukami phục vụ quá nhiệt tình mà.」"
# 【凪】
# display as 凪
# JP: 「まっことばい！　今日のふかみちゃんは\n流れの速かとこ選んどったばい」
1364 = "「Đúng vậy đó nha! Fukami hôm nay\nchọn toàn chỗ dòng chảy xiết thôi đó!」"
# monologue
# JP: 間髪入れずの凪の言葉に、\nふかみはコホン、と咳払い。
2172 = "Trước lời nói xen vào ngay lập tức của Nagi,\nFukami ho hắng một tiếng."
# 【ふかみ】
# display as 深美
# JP: 「お二人なら、船酔いの心配はないですから。です」
1346 = "「Vì là hai người, nên không phải lo chuyện say sóng đâu. Ạ.」"
# 【凪】
# display as 凪
# JP: 「そーばい！　“おふたりさん”なら～」
1443 = "「Đúng rồi đó! Nếu là \"hai người\" thì~」"
# 【ポーレット】
# display as 波萊特
# JP: 「/////っ！」
968 = "「/////!」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かにな」
1582 = "「Cũng đúng nhỉ.」"
# monologue
# JP: ざんぶざんぶと、舟の揺れること揺れること――\n他のお客が一人でもいたら、とても体験できなかったろう。
2178 = "Chiếc thuyền tròng trành, lắc lư dữ dội——\nNếu có thêm một hành khách nào khác, chắc chắn sẽ không thể trải nghiệm được điều này."
# monologue
# JP: “他のお客が一人もいない”のは、無論大きな問題だが、\n今日のみは、楽しむ以外、何もしないと決めている。
959 = "Việc \"không có một hành khách nào khác\" tất nhiên là một vấn đề lớn,\nnhưng chỉ riêng hôm nay, tôi đã quyết định sẽ không làm gì ngoài việc tận hưởng."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、ありがとう。\nおかげで今までで一番楽しめた」
1290 = "「Không, cảm ơn em.\nNhờ em mà anh đã có khoảng thời gian vui vẻ nhất từ trước đến nay.」"
# 【ふかみ】
# display as 深美
# JP: 「それなら、頑張った甲斐がありました。です」
1534 = "「Nếu vậy thì, bõ công em cố gắng rồi. Ạ.」"
# 【凪】
# display as 凪
# JP: 「ちぇっ！　にーさんはからかいがいがなかとね～っ」
1337 = "「Chậc! Anh hai chẳng có gì đáng để trêu chọc cả nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1313 = "「Hửm?」"
# monologue
# JP: 何のことだ？　と凪を見返せば、\n凪はくっくと首を動かし、僕の視線を導こうとする。
1811 = "Chuyện gì vậy? Khi tôi nhìn lại Nagi,\nem ấy khẽ lắc đầu, cố gắng dẫn dắt ánh nhìn của tôi."
# monologue
# JP: （ポーレットか？）
2290 = "（Paulette sao?）"
# monologue
# JP: 見れば、ポーレットは赤くなってる。
1904 = "Nhìn sang, tôi thấy mặt Paulette đang đỏ bừng."
# monologue
# JP: その反応に、なぜか僕まで、\nむずがゆく、照れくさいような気にさせられる。
2147 = "Trước phản ứng đó, không hiểu sao ngay cả tôi,\ncũng cảm thấy ngượng ngùng và xấu hổ."
# 【凪】
# display as 凪
# JP: 「ふっふーん」
1309 = "「Fufu-n.」"
# monologue
# JP: 勝ち誇ったような凪の声。
1876 = "Giọng nói của Nagi như thể đang đắc thắng."
# monologue
# JP: あるいは僕の顔もいくらか、\n赤らんでしまったのかもしれん。
2046 = "Hoặc có lẽ khuôn mặt tôi,\ncũng đã đỏ lên đôi chút."
# 【凪】
# display as 凪
# JP: 「お二人さんは、この先の予定立てとーと？」
1219 = "「Hai người đã lên kế hoạch cho chuyến đi tiếp theo chưa vậy?」"
# 【ポーレット】
# display as 波萊特
# JP: 「えとっ」
1599 = "「À ừm.」"
# monologue
# JP: 上ずった声で返事をしかけたポーレットを目で制し、\n僕に会話を預けてもらう。
1951 = "Tôi dùng ánh mắt ngăn Paulette lại khi cô ấy định trả lời bằng giọng the thé,\nvà để tôi tiếp quản cuộc trò chuyện."
# 【双鉄】
# display as 雙鐵
# JP: 「なにかお奨めがあるなら、\n是非とも教えてもらいたい」
1220 = "「Nếu có gợi ý nào,\nthì nhất định hãy chỉ cho tôi với.」"
# 【凪】
# display as 凪
# JP: 「あるばい！　隠れた人気スポットばい！」
1512 = "「Có chứ! Một địa điểm nổi tiếng được giấu kín đó nha!」"
# 【ふかみ】
# display as 深美
# JP: 「あー」
1314 = "「A-」"
# monologue
# JP: 納得顔で、ふかみが頷く。
2124 = "Fukami gật đầu với vẻ mặt đồng tình."
# 【ふかみ】
# display as 深美
# JP: 「包丁づくり」
1229 = "「Làm dao bếp.」"
# 【凪】
# display as 凪
# JP: 「そうばいっ！」
1365 = "「Đúng rồi đó!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　包丁づくりとは」
1231 = "「Cái gì cơ? Làm dao bếp là sao?」"
# monologue
# JP: ポーレットへと顔を向ければ、\nふるふると静かに首がふられるばかり。
2050 = "Khi tôi quay mặt về phía Paulette,\ncô ấy chỉ khẽ lắc đầu."
# monologue
# JP: （観光スポットの調査をしたという話だったが――）
2287 = "（Dù cô ấy nói là đã tìm hiểu về các địa điểm du lịch, nhưng——）"
# monologue
# JP: にもかかわらず、ポーレットの知識に入っていない。
2106 = "Vậy mà nó lại không nằm trong kiến thức của Paulette."
# monologue
# JP: しかし、ふかみが即座に心あたるほど楽しい場所なら、\nこれはあるいは、本物の穴場であるのかもしれん。
1799 = "Nhưng, nếu đó là một nơi thú vị đến mức Fukami có thể nghĩ ra ngay lập tức,\nthì có lẽ đây thực sự là một địa điểm tuyệt vời chưa được nhiều người biết đến."
# 【双鉄】
# display as 雙鐵
# JP: 「是非とも、詳しく聞かせてほしい。\nその包丁づくりとはいったい――」
1561 = "「Nhất định phải kể chi tiết cho tôi nghe đấy.\nLàm dao bếp rốt cuộc là——」"
# 【凪】
# display as 凪
# JP: 「ふふーんっ、だったら、ご案内ばいっ！」
1307 = "「Fufu-n, nếu vậy thì, em sẽ dẫn đường cho nha!」"
# monologue
# JP: （カンッ！　キンっ！　キンッ！）
2284 = "（Keng! Keng! Keng!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
1300 = "「Ồ.」"
# monologue
# JP: ――槌が、真っ赤に焼けた鉄を叩く。\nその光景が、音がなんとも、血を騒がせる。
952 = "——Chiếc búa đập vào thanh sắt đang nung đỏ rực.\nCảnh tượng đó, âm thanh đó, thật khiến máu trong người sôi sục."
# 【ポーレット】
# display as 波萊特
# JP: 「蓑笠さん……\nあたりまえですけど職人さんなんですね」
1540 = "「Ông Minokasa……\nĐương nhiên rồi, ông ấy là một nghệ nhân mà nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1446 = "「Đúng vậy.」"
# monologue
# JP: 力んでいない。普段と、何も変わらない。\n表情さえも柔和なままだ。
2188 = "Không hề gắng sức. Giống hệt như ngày thường, không có gì thay đổi.\nThậm chí nét mặt vẫn giữ vẻ hiền hòa."
# monologue
# JP: しかしその腕は、槌を、鉄を――\n完全に支配し従えているようにしか見えない。
1825 = "Nhưng cánh tay đó, chiếc búa đó, thanh sắt đó——\nchỉ có thể thấy rằng ông ấy đang hoàn toàn kiểm soát và chi phối chúng."
# 【蓑笠】
# display as 蓑笠
# JP: 「製作体験ばしてもらうのは、\nステンレス包丁になりますけん」
1631 = "「Thứ mà hai cháu sẽ được trải nghiệm chế tác,\nlà dao bếp bằng thép không gỉ.」"
# monologue
# JP: 僕らに説明しながらも、\n手指は全く、言葉のリズムにつられない。
1819 = "Dù đang giải thích cho chúng tôi,\nnhưng những ngón tay của ông ấy hoàn toàn không bị cuốn theo nhịp điệu của lời nói."
# 【蓑笠】
# display as 蓑笠
# JP: 「ステンレスの板二枚の間に、鋼ば挟んで、\n熱いれて叩いて、固めよります」
1367 = "「Kẹp một miếng thép giữa hai tấm thép không gỉ,\nnung nóng, đập và làm cứng nó lại.」"
# 【双鉄】
# display as 雙鐵
# JP: 「その、鋼の部分が刃になるのですか？」
1618 = "「Phần thép đó sẽ trở thành lưỡi dao sao ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「そぎゃんとです」
1441 = "「Đúng là vậy.」"
# monologue
# JP: 何をしているのか理解できれば、\n目にする景色への興味は深まる。
1806 = "Nếu hiểu được ông ấy đang làm gì,\nthì sự hứng thú với cảnh tượng trước mắt sẽ càng sâu sắc hơn."
# monologue
# JP: あのひと叩きひと叩きが、\nステンと鋼を一つにまとめあげているのだ。
2100 = "Mỗi nhát búa đập xuống đó,\nđang kết hợp thép không gỉ và thép lại làm một."
# 【蓑笠】
# display as 蓑笠
# JP: 「そしたら、やってみますか」
1598 = "「Vậy thì, hai cháu có muốn làm thử không.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1328 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「お願いします」
1560 = "「Xin nhờ ông ạ.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「じゃ、まずは双鉄くん。\nこの機械の前ば座ってください」
1602 = "「Vậy, trước tiên là cậu Soutetsu.\nHãy ngồi trước cái máy này đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかりました」
1414 = "「Cháu hiểu rồi.」"
# monologue
# JP: 鋼鉄製の杭打ち機――\nでなければ、餅つき機のような機械だ。
2057 = "Máy đóng cọc bằng thép——\nNếu không thì, nó giống như một cái máy giã bánh giày vậy."
# monologue
# JP: 餅つきでいうところの杵のような太い鉄棒が、\n椅子に座った僕の眼前で黒光りしている。
2033 = "Một thanh sắt dày như chiếc chày dùng để giã bánh giày,\nđang sáng bóng màu đen ngay trước mắt tôi khi tôi ngồi trên ghế."
# 【蓑笠】
# display as 蓑笠
# JP: 「足元のペダルば、軽ぅく踏んで見て下さい」
1553 = "「Thử đạp nhẹ vào bàn đạp dưới chân xem sao.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1328 = "「嗯」" 
# monologue
# JP: （がィンっ！）
2283 = "（Keng!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！」
# 1300 = "「哦哦！」" 
# monologue
# JP: ペダルを踏んだその瞬間に、\n鋼鉄の杵が、鉄の台へと振り落とされる。
2234 = "Ngay khoảnh khắc tôi đạp lên bàn đạp,\nchiếc chày thép giáng mạnh xuống chiếc bệ sắt."
# monologue
# JP: 想像通りの動作であったにもかかわらず、\n想像以上の迫力に驚かされた。
2259 = "Dù chuyển động đúng như tôi tưởng tượng,\nnhưng tôi vẫn bị bất ngờ bởi sức mạnh vượt xa sự tưởng tượng đó."
# 【蓑笠】
# display as 蓑笠
# JP: 「ま、見たままの機械ですたい。\nこいつに、これば――」
1373 = "「Chà, nó là cái máy đúng như cháu thấy đấy.\nVới cái này, cháu hãy——」"
# monologue
# JP: 先ほどまで、蓑笠老人が叩き伸ばしていた焼けた材料。\nそれは、すでにある程度、ナイフのような形になってる。
2189 = "Vật liệu nung đỏ mà ông Minokasa vừa đập và kéo dài lúc nãy.\nNó đã có hình dạng giống như một con dao ở một mức độ nào đó."
# 【蓑笠】
# display as 蓑笠
# JP: 「こいつを、こん機械で好きな大きさに叩き伸ばせば\n良かとです」
1424 = "「Dùng cái máy này đập và kéo dài nó ra theo kích thước cháu thích\nlà được.」"
# monologue
# JP: なだらかなカーブを描いている面――\n刃になる部分を細く伸ばせと、ごく当然のアドバイス。
1815 = "Mặt có đường cong thoai thoải——\nHãy kéo dài phần sẽ trở thành lưỡi dao ra cho mỏng, một lời khuyên hết sức hiển nhiên."
# monologue
# JP: ならばとペダルを踏んでみる。
2066 = "Nghĩ vậy, tôi thử đạp lên bàn đạp."
# monologue
# JP: （ゴインっ！　ガキんっ！　ゴンッ！　ガインっ！）
2282 = "（Keng! Keng! Keng! Keng!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おおっ――っと――これはっ――」
1299 = "「Ôi——chà——cái này——」"
# monologue
# JP: なかなか、激しい振動がくる。\nその振動が僕の中、原始的な何かを激しく揺すぶる。
2036 = "Một rung động khá mạnh truyền đến.\nSự rung động đó làm rung chuyển dữ dội một thứ gì đó nguyên thủy bên trong tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「なかなか――む――思う、よう――にはっ」
1591 = "「Khá là——ưm——không được, như——ý muốn.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「神経質にはならんで良かとです。\n形ば壊すほど叩けたら、まずまず大したものですけんね」
1190 = "「Không cần phải quá căng thẳng đâu.\nNếu đập đến mức làm hỏng cả hình dạng, thì cũng khá là đáng nể đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ――そうですか」
1326 = "「Ừm——Ra vậy.」"
# monologue
# JP: そう言われれば、気が楽になる。
2174 = "Nghe ông nói vậy, tôi cảm thấy nhẹ nhõm hơn."
# monologue
# JP: どう叩こうが、包丁の形が崩れぬものならば、\nこうもおっかなびっくり臨むのはもったいなかろう。
2212 = "Nếu dù có đập thế nào cũng không làm hỏng hình dạng của con dao,\nthì việc cứ rụt rè e sợ thế này thật là lãng phí."
# monologue
# JP: （ガインっ！　ごイン！　ガンッ！　カインッ！）
2279 = "（Keng! Keng! Keng! Keng!）"
# monologue
# JP: どんどん伸びる、伸ばされる。
2252 = "Nó ngày càng dài ra, bị kéo dài ra."
# monologue
# JP: ナイフ状だったかたまりが、\nみるみるうちに、小ぶりの包丁サイズに広がる。
1888 = "Khối kim loại hình con dao,\nchẳng mấy chốc đã mở rộng ra thành kích thước của một con dao bếp nhỏ."
# 【蓑笠】
# display as 蓑笠
# JP: 「おお、上出来上出来。\nほうたら今度は、[ひない,1]雛衣のお嬢さんの番ですな」
1303 = "「Ồ, làm tốt lắm, làm tốt lắm.\nVậy tiếp theo là đến lượt cô tiểu thư Hinai nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、はい！　お願いしますっ！」
1438 = "「V-Vâng! Xin nhờ ông ạ!」"
# monologue
# JP: 確か普段、\n蓑笠さんはポーレットのことを市長さんと呼んでいた。
2053 = "Hình như bình thường,\nông Minokasa vẫn hay gọi Paulette là ngài Thị trưởng."
# monologue
# JP: それが今日は、雛衣のお嬢さん。\nそのさりげない一言を、なぜだか、すごく嬉しく感じる。
1813 = "Nhưng hôm nay, ông lại gọi là cô tiểu thư Hinai.\nKhông hiểu sao, một lời nói vô tình ấy lại khiến tôi cảm thấy vô cùng vui sướng."
# monologue
# JP: （ガンっ！　――ごんっ――ごチンっ！――）
2278 = "（Keng! ——Keng——Keng!——）"
# 【蓑笠】
# display as 蓑笠
# JP: 「おーおー、こちらも上手かとですなぁ」
1302 = "「Ồ ồ, cô bé cũng khéo tay quá nhỉ.」"
# monologue
# JP: 性格、としか言いようが無い。\nポーレットは僕とは違い、ペダルを連続して踏まない。
1900 = "Chỉ có thể nói là do tính cách.\nPaulette khác với tôi, cô ấy không đạp bàn đạp liên tục."
# monologue
# JP: 踏んで叩いてペダルを離し、踏んで叩いてペダルを離しを、\nこつこつ、丁寧に繰り返している。
1955 = "Đạp xuống đập một nhát rồi nhả bàn đạp ra, đạp xuống đập một nhát rồi nhả bàn đạp ra,\ncô ấy cứ lặp đi lặp lại từng chút một, cẩn thận và tỉ mỉ."
# 【蓑笠】
# display as 蓑笠
# JP: 「こらぁ、\n見事なほどに特徴の違うた包丁ばできそうですなぁ」
1514 = "「Chà,\ncó vẻ sẽ tạo ra những con dao bếp với những đặc điểm khác biệt đến đáng kinh ngạc đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
# 1310 = "「唔」" 
# 【ポーレット】
# display as 波萊特
# JP: 「わ、ほんとですね」
1287 = "「Oa, đúng vậy nhỉ.」"
# monologue
# JP: 包丁の元、と蓑笠老人が言った金属の段階では、\n僕のものとポーレットのもの、大した違いがなかった筈だ。
2191 = "Ở giai đoạn kim loại mà ông Minokasa gọi là phôi dao bếp,\nđáng lẽ ra của tôi và của Paulette không có sự khác biệt lớn nào."
# monologue
# JP: が、今僕らが伸ばし終わったものを見ると――
1829 = "Nhưng, khi nhìn vào thứ mà chúng tôi vừa kéo dài xong——"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットのは、随分と小ぶりで肉厚だな」
1487 = "「Của Paulette, khá là nhỏ gọn và dày dặn nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんのはおっきいですね。\nなんか、マグロとかもさばけちゃいそう」
1626 = "「Của anh Soutetsu thì lớn thật đấy.\nCảm giác như có thể xẻ thịt cả cá ngừ luôn ấy.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「はっは、マグロは良かとですなぁ」
1289 = "「Haha, cá ngừ thì tuyệt quá nhỉ.」"
# monologue
# JP: そう笑いつつ、蓑笠老人はまず僕の包丁を取り、\nまた火を入れて、とんかん叩く。
2194 = "Vừa cười, ông Minokasa vừa lấy con dao của tôi trước,\nlại cho vào lửa, rồi gõ cộc cộc."
# monologue
# JP: そしてそれを、\n何かの液体の中へとつける。
2127 = "Và sau đó, ông nhúng nó\nvào một chất lỏng nào đó."
# 【蓑笠】
# display as 蓑笠
# JP: 「いくらか、こうして焼き戻します。\nそうせん鋼は脆くてすぐに欠けますけんねぇ」
1384 = "「Ông sẽ ủ mềm thép một chút như thế này.\nNếu không thì thép sẽ giòn và dễ bị mẻ lắm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「その液体は何ですか？」
1600 = "「Chất lỏng đó là gì vậy ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「180度の油とです」
1634 = "「Là dầu 180 độ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「油ですか！？」
1481 = "「Dầu sao ạ!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかも180度とは……\n熱湯より熱いもので冷ますのですか」
1531 = "「Hơn nữa lại còn 180 độ……\nÔng dùng thứ còn nóng hơn cả nước sôi để làm nguội sao?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「一番熱かときが、\nいつまでも続くゆうことはなかとですからなぁ」
1348 = "「Bởi vì lúc nóng nhất,\ncũng không có nghĩa là sẽ kéo dài mãi mãi mà.」"
# monologue
# JP: ゆっくりと立ち、\n蓑笠老人は奥へと入り、奥様に何かを言付ける。
1817 = "Chậm rãi đứng dậy,\nông Minokasa đi vào phía trong, dặn dò vợ mình điều gì đó."
# 【蓑笠】
# display as 蓑笠
# JP: 「急に冷めれば壊れてしまう。\nゆるゆる冷めれば、粘りば生まれる」
1358 = "「Nếu nguội đi đột ngột thì sẽ bị hỏng.\nNếu nguội đi từ từ, thì sự dẻo dai sẽ được sinh ra.」"
# monologue
# JP: 奥様が淹れてくださったお茶を、\n蓑笠老人が運んでくれる。
2193 = "Trà do vợ ông pha,\nđược ông Minokasa mang ra cho chúng tôi."
# monologue
# JP: 暑い夏の、暑い鍛冶工場の、熱いお茶。\n喉から腹まで焼かれるようで、実に美味い。
1933 = "Mùa hè nóng bức, trong một xưởng rèn nóng bức, với một tách trà nóng.\nCảm giác như thiêu đốt từ cổ họng xuống tận bụng, quả thực rất ngon."
# 【蓑笠】
# display as 蓑笠
# JP: 「ま、そういうもんですけんね、何事も」
1243 = "「Chà, mọi chuyện đều là như vậy mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「何事も、ですか」
1209 = "「Mọi chuyện, sao ạ.」"
# monologue
# JP: 確かに……それは人間関係にも通じるし、\nあるいはブーム、そうしたものにも通じる気がする。
2142 = "Quả thực……điều đó cũng áp dụng cho cả các mối quan hệ con người,\nhoặc là những trào lưu, tôi có cảm giác nó cũng áp dụng cho những thứ như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「逆に言えば、壊さず長く保つものとするには、\n上手に熱を冷ます必要がある」
1205 = "「Nói ngược lại, để giữ cho nó không bị hỏng và tồn tại lâu dài,\nthì cần phải làm nguội một cách khéo léo.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ゆーことですな」
1372 = "「Chính là như vậy đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ためになるな、ポーレット」
1489 = "「Thật bổ ích nhỉ, Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ！　はいっ！　ほんとに――ほんとに、すごく！\nためになるし――ためにしたいって。わたし、思います」
1462 = "「Hả! Vâng! Thật sự——thật sự, rất!\nBổ ích——và tôi muốn biến nó thành điều bổ ích. Tôi nghĩ vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
# 1313 = "「唔？」" 
# monologue
# JP: お茶がよっぽど熱かったのか、\nポーレットの顔は真っ赤――っ！！！
2083 = "Có lẽ do trà quá nóng,\nmà khuôn mặt của Paulette đỏ bừng——!!!"
# monologue
# JP: （いや、バカか僕は――\n“人間関係にも”と、自分で思ったばかりではないか）
2286 = "（Không, mình là đồ ngốc sao——\nChẳng phải mình vừa mới nghĩ \"cũng áp dụng cho cả các mối quan hệ con người\" sao）"
# monologue
# JP: 人間関係全般に通じることならば、\nそれは無論、男女関係、恋愛関係にも通用しよう。
2074 = "Nếu nó áp dụng cho tất cả các mối quan hệ con người nói chung,\nthì tất nhiên, nó cũng sẽ áp dụng cho cả mối quan hệ nam nữ, quan hệ yêu đương."
# monologue
# JP: ポーレットのひどい赤面の理由が、\nもしも、そこにあるというなら……
1964 = "Nếu lý do khiến Paulette đỏ mặt dữ dội như vậy,\nthực sự nằm ở đó thì……"
# monologue
# JP: （“ためにしたい”と、役立てたいと――\nポーレットはそう、確かに言った）
2292 = "（\"Muốn biến nó thành điều bổ ích\", muốn tận dụng nó——\nPaulette quả thực đã nói như vậy）"
# monologue
# JP: 壊さず、長く保つ関係にしていきたい、と……\nポーレットがそう願う相手は――
1803 = "Muốn giữ cho mối quan hệ không bị đổ vỡ, và kéo dài mãi mãi……\nNgười mà Paulette mong muốn điều đó là——"
# 【蓑笠】
# display as 蓑笠
# JP: 「お茶ば、熱くに入りすぎよったかもしれんですなぁ」
1515 = "「Có vẻ như ông đã pha trà quá nóng rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
1632 = "「!!?」"
# monologue
# JP: 蓑笠老人の穏やかな声に、けれどビクリと震えてしまう。
2195 = "Dù giọng nói của ông Minokasa rất điềm tĩnh, nhưng tôi vẫn giật bắn mình."
# monologue
# JP: いかん、いかん。今日は楽しむ。\nただそれだけに集中すると、決めているのだ。
1795 = "Không được, không được. Hôm nay phải vui chơi.\nTôi đã quyết định chỉ tập trung vào điều đó thôi."
# 【蓑笠】
# display as 蓑笠
# JP: 「しかし、今日はどぎゃんして、\nこげな体験ばしようと思うて来てくださったとですか」
1197 = "「Nhưng mà, sao hôm nay hai cháu lại đến đây,\nmuốn trải nghiệm chuyện này vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「遊ぼうと――ポーレットと一日、\n遊んで楽しんで過ごそうと、決めてきました」
1400 = "「Là để đi chơi——Cháu đã quyết định sẽ dành trọn một ngày\nđể đi chơi và tận hưởng niềm vui cùng Paulette ạ.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ほう、それはそれは」
1305 = "「Hô, ra là vậy sao.」"
# monologue
# JP: 穏やかな声。
2192 = "Một giọng nói hiền từ."
# monologue
# JP: ポーレットの喉からもホウっと、\n安心したような息が吐かれる。
2118 = "Từ cổ họng Paulette cũng phát ra một tiếng thở phào,\nnhư thể đã yên tâm."
# 【ポーレット】
# display as 波萊特
# JP: 「市で、以前に調査したことがあるんです。\n観光客さんの満足度が高いスポットとかを」
1379 = "「Trước đây cháu từng khảo sát ở thành phố.\nVề những địa điểm mà khách du lịch có mức độ hài lòng cao ạ.」"
# monologue
# JP: 僕とポーレットとふたり、かわるがわるに言葉をつむぐ。
2025 = "Tôi và Paulette, hai người thay phiên nhau kể chuyện."
# monologue
# JP: 赤井阿蘇神社、幽霊寺、温泉物産館、クマ川くだり――\n一日過ごしてきた想い出が、言葉によって鮮やかになる。
2223 = "Đền Akai Aso, Chùa Ma, Hội trường Vật sản Suối nước nóng, Xuôi dòng sông Kuma——\nNhững kỷ niệm của một ngày trôi qua trở nên sống động qua từng lời kể."
# 【ポーレット】
# display as 波萊特
# JP: 「それで、クマ川下りが終わったときに、凪ちゃんが、\n『この後の予定は？』って聞いてきてくれて」
1501 = "「Sau đó, khi chuyến đi xuôi dòng sông Kuma kết thúc, Nagi đã hỏi:\n『Kế hoạch tiếp theo là gì?』 ạ.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、そいででしたか」
1320 = "「À, thì ra là vậy.」"
# monologue
# JP: 納得しきり。\nそんな風情で蓑笠老人は深く頷く。
2190 = "Hoàn toàn bị thuyết phục.\nÔng Minokasa gật đầu sâu sắc với vẻ mặt như vậy."
# 【蓑笠】
# display as 蓑笠
# JP: 「こん体験ば、凪と、凪の友達連中くらいしか、\nやったことがなかとでしたから」
1267 = "「Bởi vì trải nghiệm này,\nchỉ có Nagi và đám bạn của con bé là từng làm thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「何故ですか！？　こんなにも楽しい体験ならば」
1491 = "「Tại sao vậy ạ!? Một trải nghiệm thú vị như thế này mà.」"
# 【蓑笠】
# display as 蓑笠
# JP: 「時間ば、かかってしまいますけんねぇ。\n今どきの観光客さんは、こぎゃんとゆったり――」
1347 = "「Bởi vì nó khá tốn thời gian mà.\nKhách du lịch thời nay, họ không có thời gian rảnh rỗi để thư thả——」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　宮本さん？\nあ、ごめんなさいっ！」
1296 = "「Hả? Anh Miyamoto?\nA, cháu xin lỗi!」"
# monologue
# JP: 普段とは違う、ポーレットの携帯の着信音。
2244 = "Nhạc chuông điện thoại của Paulette khác với bình thường."
# monologue
# JP: 宮本さん、からといっていた。\nならば恐らく、非常――緊急用の着信音であるのだろう。
1952 = "Cô ấy nói là từ anh Miyamoto.\nNếu vậy thì có lẽ đó là nhạc chuông dùng cho trường hợp khẩn cấp——bất thường."
# 【ポーレット】
# display as 波萊特
# JP: 「もしもし、わたしです。はい――え？　[さがら,1]相楽村で？\nはい――わかりました、すぐお願いします！」
1323 = "「Alo, tôi đây. Vâng——Hả? Ở làng Sagara sao?\nVâng——Tôi hiểu rồi, xin hãy đến ngay!」"
# monologue
# JP: 携帯を切るより早く、\nもうポーレットは立ち上がっている。
2245 = "Còn nhanh hơn cả việc cúp máy,\nPaulette đã đứng bật dậy."
# monologue
# JP: ならなんであれ、緊急事態に違いない。\n何が起きたかも気になる、が――
2012 = "Nếu vậy thì dù là chuyện gì, chắc chắn cũng là tình huống khẩn cấp.\nTôi cũng tò mò không biết có chuyện gì xảy ra, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「ナビを使うか？」
1544 = "「Có cần dùng Navi không?」"
# monologue
# JP: まず真っ先にそう尋ねれば、\nポーレットは、申し訳無さと安堵を交えた顔になる。
2173 = "Khi tôi hỏi câu đó đầu tiên,\nPaulette lộ vẻ mặt vừa áy náy vừa nhẹ nhõm."
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。\nあ、けど――」
1563 = "「Cảm ơn anh rất nhiều.\nA, nhưng mà——」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。ならば分業しよう。\nナビには、ポーレットを送っていくよう命令しておく」
1405 = "「Tôi hiểu rồi. Vậy thì chúng ta chia việc ra làm nhé.\nTôi sẽ ra lệnh cho Navi đưa cô đi.」"
# monologue
# JP: ポーレットの目が、\x%l焼なまし;#00ffc040;焼なま%l;#;されてる包丁たちを、\n一瞬だけれど、確かに見ていた。
2257 = "Ánh mắt của Paulette, dù chỉ trong một khoảnh khắc,\nnhưng chắc chắn đã nhìn những con dao đang được \\x%l焼なまし;#00ffc040;ủ mềm thép%l;#;."
# monologue
# JP: ならば僕は、一人になっても、\n今日の務め――いやさ、遊びを完遂しよう。
2072 = "Nếu vậy thì dù chỉ còn một mình,\ntôi cũng sẽ hoàn thành nhiệm vụ——à không, cuộc đi chơi ngày hôm nay."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は残って、包丁たちを仕上げておく。\nああ、もしもポーレットが自分で」
1406 = "「Tôi sẽ ở lại và hoàn thiện những con dao.\nÀ, nếu Paulette muốn tự mình」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、双鉄くんに仕上げ、お願いしたいです」
1188 = "「Không đâu, tôi muốn nhờ anh Soutetsu hoàn thiện giúp ạ.」"
# monologue
# JP: 立ち止まり、振り返り、笑う。
1939 = "Cô ấy dừng lại, quay đầu lại và mỉm cười."
# monologue
# JP: ただそれだけの仕草に、いつもと少しも変わらぬ笑顔に、\nけれど心を、痛いくらいに掴まれる。
2079 = "Chỉ một cử chỉ đó thôi, với nụ cười không hề thay đổi so với mọi ngày,\nnhưng lại khiến trái tim tôi thắt lại đến đau nhói."
# 【ポーレット】
# display as 波萊特
# JP: 「せっかくふたりで来たんですから。\n合作で仕上がる方が、ずっと、ずうっと嬉しいです」
1398 = "「Đã cất công hai người cùng đến đây mà.\nHoàn thiện bằng sự hợp tác của cả hai, sẽ khiến tôi vui hơn rất nhiều, rất nhiều đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「それで？　それから双鉄様は？」
1500 = "「Vậy sao? Rồi sau đó ngài Soutetsu thế nào ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、仕上げた。\n仕上げたがこう――」
1511 = "「Tất nhiên là tôi đã hoàn thiện nó.\nHoàn thiện xong nhưng thế này——」"
# monologue
# JP: うまく、感覚を言葉に出来ない。\n手が、わきわきと意味も無いのに動いてしまう。
2044 = "Tôi không thể diễn tả cảm giác đó thành lời một cách trọn vẹn.\nĐôi tay tôi cứ cử động lung tung một cách vô nghĩa."
# 【双鉄】
# display as 雙鐵
# JP: 「手応えというか……なにかが、抜けた感じがしてな。\n仕上げるは仕上げたが、正直、不満な出来となった」
1361 = "「Nói sao nhỉ…… Cảm giác như thiếu thiếu một thứ gì đó.\nDù đã hoàn thiện, nhưng thành thật mà nói, tôi không hài lòng với kết quả.」"
# 【ハチロク】
# display as 八六
# JP: 「不満も何も――」
1392 = "「Không hài lòng gì chứ——」"
# monologue
# JP: いつものように布団の端にもぐりこまず。
1871 = "Hôm nay em ấy không chui vào mép chăn như mọi khi."
# monologue
# JP: 僕と離れて向き合いながら、\nハチロクは戸惑ったように首を傾げる。
1943 = "Ngồi đối diện và cách xa tôi một chút,\nHachiroku nghiêng đầu vẻ bối rối."
# 【ハチロク】
# display as 八六
# JP: 「そもそも、双鉄様に鍛冶のお心得はないではないですか。\nそれが、満足の行く仕上がりなどと――」
1628 = "「Vốn dĩ, ngài Soutetsu đâu có kinh nghiệm gì về nghề rèn đâu ạ.\nVậy mà ngài lại mong đợi một kết quả mỹ mãn sao——」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、出来不出来という話ではない。\nそうではなくて――この……意気込みというか」
1513 = "「Tất nhiên, tôi không nói về chuyện làm tốt hay không tốt.\nKhông phải vậy——mà là cái này…… gọi là sự hăng hái chăng.」"
# monologue
# JP: 言葉に落とせぬ感覚を、\nそれでもなんとかひき戻そうと頭をひねる。
2023 = "Dù không thể diễn tả cảm giác đó thành lời,\nnhưng tôi vẫn vắt óc suy nghĩ để cố gắng gợi lại nó."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　そうだ。熱だ。蓑笠老人の言っていた熱。\nあれが、急に冷めてしまったような感じになったのだ」
1317 = "「A! Đúng rồi. Là sức nóng. Sức nóng mà ông Minokasa đã nói đến.\nCảm giác như nó đột ngột nguội lạnh đi vậy.」"
# 【ハチロク】
# display as 八六
# JP: 「なにに対する熱が、でしょうか？」
1454 = "「Sức nóng đối với chuyện gì cơ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは無論、包丁作り――\nああ、いや、違うな」
1613 = "「Đương nhiên là đối với việc làm dao bếp——\nÀ, không, không phải.」"
# monologue
# JP: 包丁作りは、最後まで興味深かった。
1843 = "Việc làm dao bếp vẫn rất thú vị cho đến tận phút cuối."
# monologue
# JP: 結局は、それを如何に観光客向けにアレンジするか……\n遊びを放棄し、打ち合わせをしてしまう程。――ああ！
1879 = "Rốt cuộc, làm thế nào để điều chỉnh nó cho phù hợp với khách du lịch……\nĐến mức tôi đã từ bỏ việc vui chơi để bàn bạc về nó. ——A!"
# 【双鉄】
# display as 雙鐵
# JP: 「遊びに対する熱が、だな。ポーレットが去り、\n取り残されて、一気に……楽しくなくなった」
1455 = "「Là sức nóng đối với việc vui chơi. Khi Paulette rời đi,\ntôi bị bỏ lại một mình, và bỗng chốc…… chẳng còn thấy vui nữa.」"
# monologue
# JP: うん。そうだ。ポーレットと一緒にいたときは、\n何をやっても、それは楽しい遊びであった。
2085 = "Ừ. Đúng vậy. Khi ở cùng Paulette,\ndù làm gì đi nữa, đó cũng là một trò chơi thú vị."
# monologue
# JP: が、一人になったその途端、僕は、普段の僕に戻って……
1907 = "Nhưng, ngay khi chỉ còn một mình, tôi lại trở về là tôi của ngày thường……"
# 【双鉄】
# display as 雙鐵
# JP: 「そこから先は、恐らく、義務感になってしまった。\n“遊ばねば”という意識が、僕の熱を下げたのだ」
1202 = "「Từ lúc đó trở đi, có lẽ nó đã biến thành một nghĩa vụ.\nÝ nghĩ \"phải vui chơi\" đã làm giảm đi sự hăng hái của tôi.」"
# 【ハチロク】
# display as 八六
# JP: 「左様でしたか」
1251 = "「Ra là vậy sao ạ.」"
# monologue
# JP: すっと、ハチロクが姿勢を正す。
1874 = "Đột nhiên, Hachiroku ngồi thẳng người lại."
# 【ハチロク】
# display as 八六
# JP: 「双鉄様」
1627 = "「Ngài Soutetsu.」"
# monologue
# JP: 三指をつき――\n深々、僕へと頭を下げる。
1866 = "Chống ba ngón tay xuống sàn——\nEm ấy cúi đầu thật sâu trước tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした、いきなり」
1222 = "「Sao thế, đột nhiên lại.」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様は、\nお答えをお見つけになりかかっておられます」
1630 = "「Ngài Soutetsu,\nngài sắp tìm ra câu trả lời cho mình rồi đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「答え？　何のだ？」
1525 = "「Câu trả lời? Của cái gì cơ?」"
# 【ハチロク】
# display as 八六
# JP: 「双鉄様の、お答えをです」
1629 = "「Câu trả lời của chính ngài Soutetsu ạ.」"
# monologue
# JP: 謎かけとしか思えぬ答え。
1948 = "Một câu trả lời chẳng khác nào câu đố."
# monologue
# JP: けれども、わかる。伝わってくる。\nハチロクはどこまでも真剣で、僕をからかってなどいない。
1826 = "Nhưng, tôi hiểu. Tôi cảm nhận được điều đó.\nHachiroku vô cùng nghiêm túc, không hề trêu đùa tôi chút nào."
# 【ハチロク】
# display as 八六
# JP: 「そのお答えをみつけるために、\nハチロクは必ず、お邪魔になります」
1533 = "「Để ngài có thể tìm ra câu trả lời đó,\nHachiroku chắc chắn sẽ trở thành một chướng ngại vật.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？」
1459 = "「Vậy sao?」"
# 【ハチロク】
# display as 八六
# JP: 「左様です。ですのでわたくし、\n今日より日々姫の部屋で眠ります」
1371 = "「Đúng vậy ạ. Vì thế,\ntừ hôm nay em sẽ sang ngủ ở phòng của Hibiki.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お前がそれを望むのならば、止めはしないが――\nしかし」
1437 = "「Nếu em muốn vậy, tôi sẽ không cản, nhưng——\ntuy nhiên.」"
# 【ハチロク】
# display as 八六
# JP: 「大丈夫。日々姫もイヤとは申しませんよ。\nわたくしと、きっと話も合いましょうから」
1478 = "「Không sao đâu ạ. Hibiki cũng sẽ không từ chối đâu.\nChắc chắn em và cô ấy sẽ nói chuyện rất hợp nhau mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1449 = "「Vậy sao.」"
# monologue
# JP: 僕より先に、ハチロクが何かの答えをみつけたようだ。
2145 = "Có vẻ như Hachiroku đã tìm ra câu trả lời nào đó trước cả tôi."
# monologue
# JP: 僕の言葉に先回りして、\n一人で、さっさと立ち上がってしまう。
2107 = "Chặn trước những lời tôi định nói,\nem ấy tự mình nhanh chóng đứng dậy."
# 【ハチロク】
# display as 八六
# JP: 「それでは双鉄様。また明日」
1616 = "「Vậy thì ngài Soutetsu. Hẹn gặp ngài vào ngày mai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。お休みハチロク」
1327 = "「Ừm. Chúc em ngủ ngon, Hachiroku.」"
# 【ハチロク】
# display as 八六
# JP: 「はい、双鉄様、おやすみなさいませ。\nそうしてどうぞ、素敵な明日をお迎えください」
1465 = "「Vâng, chúc ngài Soutetsu ngủ ngon.\nVà mong ngài sẽ đón một ngày mai thật tuyệt vời.」"
# monologue
# JP: 音も立てずにふすまが開かれ、\nまた閉じられる。
1957 = "Cánh cửa fusuma được mở ra mà không phát ra tiếng động,\nrồi lại đóng lại."
# monologue
# JP: ハチロクはまるで足音を立てず――\nけれども気配が、静かに静かに遠ざかっていく。
1867 = "Hachiroku bước đi như thể không hề có tiếng bước chân——\nnhưng tôi có thể cảm nhận được sự hiện diện của em ấy đang lặng lẽ, lặng lẽ xa dần."
# 【双鉄】
# display as 雙鐵
# JP: 「僕の答え、か――」
1413 = "「Câu trả lời của tôi, sao——」"
# monologue
# JP: ハチロクが去ったということは、それは一人で考えるべき\n――、一人で見つけるべきものなのだということだろう。
2068 = "Việc Hachiroku rời đi có nghĩa là, đó là điều tôi nên tự mình suy nghĩ\n——, tự mình tìm ra."
# 【双鉄】
# display as 雙鐵
# JP: 「問うべき点は……」
1510 = "「Điểm cần đặt câu hỏi là……」"
# monologue
# JP: 考える。\nハチロクが去っていったそのきっかけを。
1870 = "Tôi suy nghĩ.\nVề lý do khiến Hachiroku rời đi."
# 【双鉄】
# display as 雙鐵
# JP: 「何故、一人になって遊びが終わってしまったか――\n一人になって、楽しさが消えてしまったか、だな」
1492 = "「Tại sao, khi chỉ còn một mình, cuộc vui lại kết thúc——\nKhi chỉ còn một mình, niềm vui lại biến mất nhỉ.」"
# monologue
# JP: 思った瞬間、\n“一人ではない”と思い直す。
2051 = "Ngay khoảnh khắc nghĩ vậy,\ntôi nhận ra \"mình không hề ở một mình\"."
# monologue
# JP: あの場には、蓑笠老人も居てくれたし、言葉も交わした。\n一緒に物を作りもした。が――
2139 = "Lúc đó, ông Minokasa cũng ở đó, chúng tôi cũng đã trò chuyện.\nCùng nhau chế tác đồ vật. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「楽しく……も、あった。\nしかし――楽しさの質というか、熱が違った」
1520 = "「Cũng…… khá vui.\nNhưng——chất lượng của niềm vui, hay nói cách khác là sự hăng hái thì lại khác.」"
# monologue
# JP: 蓑笠老人との会話や製作体験から得ることができたのは、\n純粋な知的興奮だろう。
2031 = "Những gì tôi nhận được từ cuộc trò chuyện và trải nghiệm chế tác cùng ông Minokasa,\ncó lẽ chỉ là sự hưng phấn trí tuệ thuần túy."
# monologue
# JP: ポーレットと過ごしていた時間の中には、\nそれだけではない喜びがあった。
1823 = "Trong khoảng thời gian ở cùng Paulette,\nkhông chỉ có niềm vui đó."
# 【双鉄】
# display as 雙鐵
# JP: 「なにがあんなに楽しかったのだ。\nなにが、他と違ったのだ」
1246 = "「Điều gì đã khiến tôi vui đến vậy.\nĐiều gì, đã tạo nên sự khác biệt.」"
# monologue
# JP: 例えば、そうだ、川下り。\n川下り船なら、ハチロクとも一緒に乗っている。
2101 = "Ví dụ như, đúng rồi, chuyến xuôi dòng sông.\nNếu là thuyền xuôi dòng, tôi cũng từng đi cùng Hachiroku."
# 【双鉄】
# display as 雙鐵
# JP: 「あのときも確かに楽しかった。\n楽しかったが――今日の楽しさとはまるで違った」
1409 = "「Lúc đó cũng rất vui.\nVui nhưng——hoàn toàn khác với niềm vui của ngày hôm nay.」"
# monologue
# JP: あのときの楽しさは、やはり知的興奮から――\n川下りそのものへの興味から来ていたような気がする。
2249 = "Niềm vui lúc đó, quả nhiên là bắt nguồn từ sự hưng phấn trí tuệ——\ntừ sự hứng thú với chính việc xuôi dòng sông."
# monologue
# JP: が、今日は違った。\n今日の僕は――
1821 = "Nhưng, hôm nay thì khác.\nTôi của ngày hôm nay——"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1328 = "「嗯」" 
# monologue
# JP: 何度も行ってる赤井阿蘇神社さえをも、\n今日は楽しい“遊びの場所”と認識できた。
1982 = "Ngay cả đền Akai Aso mà tôi đã đi đến bao nhiêu lần,\nhôm nay tôi cũng có thể coi nó là một \"địa điểm vui chơi\" thú vị."
# monologue
# JP: ポーレットといた時間のすべてに、\n僕は楽しさを感じていた。
1919 = "Trong suốt khoảng thời gian ở cùng Paulette,\ntôi đều cảm thấy vui vẻ."
# 【双鉄】
# display as 雙鐵
# JP: 「そこに、ポーレットがいたからだ。\nポーレットが、いつも笑顔でいたからだ」
1451 = "「Là bởi vì có Paulette ở đó.\nBởi vì Paulette, luôn nở nụ cười.」"
# monologue
# JP: これが、つまりは、\n“僕の答え”か。
2242 = "Nói tóm lại,\nđây chính là \"câu trả lời của tôi\" sao."
# monologue
# JP: すっと一本、光の道が――\n進むべき道が、目の前に示されたような気になる。
2034 = "Một con đường ánh sáng vụt hiện ra——\nTôi có cảm giác như con đường mình nên đi đã được mở ra ngay trước mắt."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、“楽しさ”とはこれなんだ」
1610 = "「Nếu vậy thì, \"niềm vui\" chính là điều này.」"
# monologue
# JP: ポーレットが笑顔になること。\nポーレットが喜んでくれること。
2176 = "Là việc Paulette nở nụ cười.\nLà việc Paulette cảm thấy vui vẻ."
# monologue
# JP: 廃鉱山を、御一夜を、そういう場所にしていけばいい。\nそうするために何ができるか、一つ一つを考えればいい。
1903 = "Hãy biến khu mỏ bỏ hoang, biến Ohimitera thành một nơi như vậy.\nĐể làm được điều đó, chỉ cần suy nghĩ từng việc một là được."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、楽しさを知っていたんだ」
1240 = "「Thì ra, tôi đã biết thế nào là niềm vui rồi.」"
# monologue
# JP: 思い出す。\n遠い、遠い昔のことを。
2027 = "Tôi nhớ lại.\nChuyện của một quá khứ rất đỗi xa xôi."
# monologue
# JP: 父さんの、母さんの。そして誰より、路子の笑顔を――\n僕は心から大好きで、それに包まれていたことを。
2131 = "Nụ cười của bố, của mẹ. Và hơn ai hết, nụ cười của Michiko——\nTôi đã yêu nó từ tận đáy lòng, và từng được bao bọc trong nó."
# 【双鉄】
# display as 雙鐵
# JP: 「大切なのは仕掛けじゃない。大切なのは演出じゃない。\n僕らが、笑顔に――心からの笑顔になることなんだ」
1469 = "「Điều quan trọng không phải là mánh khóe. Điều quan trọng không phải là diễn xuất.\nMà là việc chúng ta, có thể nở nụ cười——một nụ cười từ tận đáy lòng.」"
# monologue
# JP: 思えば、つながる。思い出す。\n今日の凪は、今日のふかみは、緊張せずにはしゃいでいた。
2018 = "Nghĩ lại thì, mọi thứ đều liên kết với nhau. Tôi nhớ ra rồi.\nNagi hôm nay, Fukami hôm nay, đã đùa giỡn mà không hề căng thẳng."
# monologue
# JP: いつだってあの笑顔があれば、\n川下りも、きっともっと、みなが楽しめる場所になる。
1963 = "Lúc nào cũng vậy, nếu có nụ cười đó,\nthì chuyến xuôi dòng sông chắc chắn sẽ trở thành một nơi mà mọi người có thể tận hưởng nhiều hơn."
# monologue
# JP: （赤井宮司がおっしゃっていたのも――\n宝生稀咲が目指しているのも、同じことだ――）
2297 = "（Những gì đền chủ Akai đã nói——\nvà mục tiêu của Houshou Kisaki, cũng đều giống nhau——）"
# monologue
# JP: 食えないから、不安があるから、笑顔になれない。\n笑顔になれない者が観光で人を楽しませるなどできない。
2098 = "Vì không đủ ăn, vì bất an, nên không thể nở nụ cười.\nNhững người không thể nở nụ cười thì không thể nào mang lại niềm vui cho du khách được."
# monologue
# JP: 宝生稀咲は、そこを見きって諦めて、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致を進めようとした。
1974 = "Houshou Kisaki đã nhìn thấu điều đó và bỏ cuộc,\nchuyển sang thúc đẩy việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「それが、宝生稀咲の優先順位なのだろう」
1585 = "「Đó có lẽ là ưu tiên hàng đầu của Houshou Kisaki.」"
# monologue
# JP: まず、食えるようになること。\nそれから笑顔を取り戻すこと。
1860 = "Trước tiên, phải lo được cái ăn.\nSau đó mới lấy lại nụ cười."
# monologue
# JP: 好循環はそのあとで、あるいは生まれるのかもしれない。\nが――
2061 = "Một vòng tuần hoàn tốt có lẽ sẽ được sinh ra sau đó.\nNhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、僕だ。\n僕のみつけた楽しみを、最優先にするのが、“答え”だ」
1411 = "「Tôi, là tôi.\nƯu tiên hàng đầu cho niềm vui mà tôi đã tìm thấy, đó chính là \"câu trả lời\".」"
# monologue
# JP: 小細工などは必要ない。\n僕らは、チームなのだから。
1801 = "Không cần những mánh khóe nhỏ nhặt.\nBởi vì chúng tôi là một đội."
# monologue
# JP: 足りないものや歪んだものがあるのなら、\nそれは必ず、他の誰かが正してくれる。
1960 = "Nếu có gì đó thiếu sót hay sai lệch,\nthì chắc chắn sẽ có người khác sửa chữa giúp."
# 【双鉄】
# display as 雙鐵
# JP: 「信じるんだ。僕が感じた楽しさを。\nそれをもう一度味わうために、何をしたいか考えるんだ」
1418 = "「Phải tin tưởng. Vào niềm vui mà mình đã cảm nhận được.\nĐể có thể nếm trải nó một lần nữa, hãy suy nghĩ xem mình muốn làm gì.」"
# monologue
# JP: 心に、ポーレットの笑顔を浮かべる。\nポーレットに笑ってもらうため。
2030 = "Trong tâm trí tôi hiện lên nụ cười của Paulette.\nĐể có thể nhìn thấy Paulette mỉm cười."
# monologue
# JP: そのアイディアを考える――ただそれだけで、間違いない。\n僕は、笑顔になれている。
2060 = "Suy nghĩ về những ý tưởng đó——chỉ cần vậy thôi, chắc chắn rồi.\nTôi đã có thể mỉm cười."
