1649 = "雙鐵＆波萊特"

[script]
# lines: 345 
# 【ポーレット】
# display as 波萊特
# JP: 「あの、いま双鉄くん、どんな格好してますか？」
1293 = "「Ưm, hiện giờ anh Soutetsu đang mặc đồ gì vậy?」"
# monologue
# JP: 襖の向こうからポーレットの声。妻の声。\n聞き慣れている声ゆえに、わずかな違和感を覚えてしまう。
1645 = "Tiếng Paulette vọng ra từ sau cánh cửa kéo. Tiếng của vợ tôi. Bởi vì đã quá quen thuộc, tôi chợt cảm thấy có chút gì đó là lạ."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　下着一枚だ。\n風呂上がりでな。これから寝間着に着替えようかと」
1144 = "「Hửm? Chỉ mặc mỗi đồ lót thôi. Anh mới tắm xong mà. Định lát nữa sẽ thay đồ ngủ đây.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえ、着替えないでください。っていうか、\nそのままお布団に横になってもらえますか？」
1100 = "「A, không, anh đừng thay đồ vội. Hay đúng hơn là, anh cứ thế nằm lên nệm được không?」"
# monologue
# JP: ……緊張、緊迫……なにごとだろうか？\nともかく今は、素直に指示に従おう。
686 = "……Căng thẳng, hồi hộp……chuyện gì thế này? Dù sao thì bây giờ cứ ngoan ngoãn làm theo lời cô ấy vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「そうしろというならそうしよう」
1215 = "「Nếu em đã nói vậy thì anh sẽ làm theo.」"
# 【ポーレット】
# display as 波萊特
# JP: 「横になったら、お目々をぎゅ～ってつむってください。\nつむったら、わたしがOKっていうまで、目を開けないで」
1282 = "「Nằm xuống rồi thì anh nhắm chặt mắt lại nhé. Nhắm rồi thì không được mở ra cho đến khi em bảo OK đâu đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1216 = "「Anh hiểu rồi.」"
# monologue
# JP: 指示のとおりにすればすぐ、襖を開いて閉じる音。\nついであたたかな重量感。
1580 = "Làm theo lời cô ấy, ngay sau đó tôi nghe thấy tiếng cửa kéo mở ra rồi đóng lại. Tiếp đến là một sức nặng ấm áp."
# 【ポーレット】
# display as 波萊特
# JP: 「ん、しょっ」
1129 = "「Ây da」"
# monologue
# JP: ……ポーレットが僕に密着してくる。\nと、いうか――この感触は……
688 = "……Paulette đang áp sát vào người tôi. Hay đúng hơn là——cảm giác này……"
# 【双鉄】
# display as 雙鐵
# JP: 「裸？　いや――っ！！！？」
1236 = "「Trần truồng sao? Không phải——!!!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「や！？　いいっていうまで目を開けないでって」
1272 = "「Á!? Em đã bảo là không được mở mắt cho đến khi em nói OK mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それはすまん。肌触りがその、裸のようで下着のようで、\n気になってしまって思わず……」
1295 = "「Xin lỗi em. Cảm giác lúc chạm vào, giống như đang khỏa thân mà cũng giống như mặc đồ lót, làm anh tò mò quá nên bất giác……」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぅぅ」
1036 = "「Hauu」"
# 【双鉄】
# display as 雙鐵
# JP: 「目を開けてしまったのだが――見てもわからん。\n“それ”は――下着……の用を為しては、いないよな？」
1205 = "「Dù đã mở mắt ra rồi——nhưng anh nhìn cũng chẳng hiểu. \"Thứ đó\"——không thể gọi là……đồ lót được đúng không?」"
# monologue
# JP: ポーレットの肌を包んで――いや、肌に沿っているのは、\n下着未満の、下着に近似した何者かだ。
1561 = "Bao bọc lấy làn da của Paulette——không, thứ bám sát vào da cô ấy, là một thứ gì đó còn thiếu vải hơn cả đồ lót, nhưng lại có hình dáng tương tự đồ lót."
# 【双鉄】
# display as 雙鐵
# JP: 「下着であれば当然に隠す部分が、まるっきり――」
986 = "「Nếu là đồ lót thì những chỗ cần che giấu phải được che đậy hoàn toàn chứ——」"
# 【ポーレット】
# display as 波萊特
# JP: 「あはは、ですよね。おっぱいも――その……\n下も、ええっと――まるだし、ですし」
1087 = "「Ahaha, đúng vậy nhỉ. Cả ngực——và…… bên dưới, ừm——cũng phơi bày ra hết mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「下も？」
947 = "「Cả bên dưới sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「って！　だから見ちゃやぁですってばぁ」
1111 = "「Này! Đã bảo là không được nhìn mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
1130 = "「Ưm」"
# monologue
# JP: 止められたならより見たくなる。が――\nいまは焦らず、許された範囲で楽しもう。
1435 = "Bị cấm cản lại càng muốn nhìn hơn. Nhưng—— bây giờ đừng vội, cứ tận hưởng trong phạm vi được cho phép đã."
# 【双鉄】
# display as 雙鐵
# JP: 「下着でないとすると……だ。\nポーレットがいま身につけているものは、いったい？」
1156 = "「Nếu không phải đồ lót thì…… Thứ Paulette đang mặc trên người rốt cuộc là gì?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ん……っと――飾り、ですかね？\n装飾、ディスプレイ、デコレーション」
1120 = "「Ưm……là đồ trang trí, chăng? Đồ trang trí, phụ kiện trưng bày, decoration.」"
# 【双鉄】
# display as 雙鐵
# JP: 「デコレーション」
1323 = "「Decoration」"
# monologue
# JP: 言われた瞬間、ケーキの姿が頭に浮かび\nすぐさま深い理解にかわる。
1382 = "Ngay khoảnh khắc nghe thấy từ đó, hình ảnh chiếc bánh kem hiện lên trong đầu tôi, và tôi lập tức hiểu ra ý nghĩa sâu xa của nó."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、おっぱいをより魅力的に際立てるためだけの、\nデコレーションか」
994 = "「Ra là vậy, chỉ là vật trang trí, nhằm làm nổi bật sự quyến rũ của bộ ngực thôi sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「むぅ。おっぱいだけしか見てないし～」
1058 = "「Hứ. Anh chỉ toàn nhìn ngực thôi～」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやっ、あ――うむ、そんなことは……\nあったような気もするが、だな」
960 = "「Không, a——ưm, chuyện đó……\ncũng có vẻ đúng, nhỉ.」"
# monologue
# JP: 図星を全力で突かれてしまい、慌てて胸から視線を剥がす。
1614 = "Bị nói trúng tim đen, tôi vội vã dời ánh mắt khỏi ngực cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、犬耳もついているのか。かわいらしいな。\n腕やももなども、しっかり覆われているのだな」
1057 = "「À, có cả tai chó nữa này. Đáng yêu thật đấy. Cánh tay và đùi cũng được che chắn cẩn thận nhỉ.」"
# monologue
# JP: 故に、際立つ。性的部位だけを露出させているその意図が。\n“雌”という語が喉まで来るが、無論、腹へと押し戻す。
1535 = "Do đó, nó càng trở nên nổi bật. Ý đồ phơi bày những bộ phận nhạy cảm. Từ \"con cái\" đã trực trào nơi cuống họng, nhưng tất nhiên, tôi đã nuốt nó xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「いまのわたしはわんちゃんですから。\n芸とか、上手にできちゃいますよ？　多分」
1259 = "「Bởi vì bây giờ em là cún con mà. Em có thể làm trò rất giỏi đó nha? Chắc vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　芸とは……例えば、お手のような」
1145 = "「Hửm? Trò à……Ví dụ như, đưa tay ra sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わん！」
1235 = "「Gâu!」"
# monologue
# JP: 手を差し出せば、かわいくポフっと乗ってくる。\nこれは楽しい。
1491 = "Khi tôi chìa tay ra, cô ấy liền ngoan ngoãn đặt tay lên. Thú vị thật đấy."
# 【双鉄】
# display as 雙鐵
# JP: 「おかわり」
1213 = "「Tay kia.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わんっ！」
# 1235 = "「汪！」" 
# monologue
# JP: （ぽふっ）
1735 = "（Bịch）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！？」
1044 = "「!!!?」"
# monologue
# JP: ポーレットの手が僕の勃起をかるぅく叩いて、\nピンクの舌がちろりとのぞき――
1559 = "Bàn tay của Paulette khẽ vỗ nhẹ lên dương vật đang cương cứng của tôi, chiếc lưỡi hồng hào khẽ thò ra——"
# 【ポーレット】
# display as 波萊特
# JP: 「くぅん」
1029 = "「Kuuun」"
# monologue
# JP: 『間違えちゃった』といわんばかりに手へと乗る。\n……なるほど。なるほど。僕はあまりに鈍かったのか。
1525 = "Cô ấy đặt tay lên tay tôi như muốn nói 『Em nhầm rồi』. ……Ra là vậy. Ra là vậy. Có phải tôi đã quá chậm tiêu rồi không."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
1248 = "「Paulette」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
1062 = "「Ư!」"
# monologue
# JP: ゆえに、囁く。\n青い瞳をまっすぐみつめ、出来うる限りに低く、甘く。
1410 = "Do đó, tôi thì thầm. Nhìn thẳng vào đôi mắt xanh biếc ấy, bằng giọng điệu trầm ấm, ngọt ngào nhất có thể."
# 【双鉄】
# display as 雙鐵
# JP: 「ちんちん」
1267 = "「Dương vật.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ――『わん』」
1059 = "「Ufufu——『Gâu』」"
# monologue
# JP: 言葉より先にその手が動き出してる。\n僕の下着を一気にすりさげ――
1438 = "Đôi tay cô ấy hành động còn nhanh hơn cả lời nói. Kéo tuột chiếc quần lót của tôi xuống——"
# monologue
# JP: （ぷりゅんんっっ！！！）
1730 = "（Phụt!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「お！」
1055 = "「Ồ!」"
# monologue
# JP: 思わず声が出てしまう。\n僕を挟みこむ乳圧が、常あるよりも強く思えて――ああ。
1489 = "Bất giác tôi thốt lên thành tiếng. Áp lực từ đôi gò bồng đảo kẹp lấy tôi dường như mạnh hơn bình thường——A."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、これもデコレーションの効果なのか」
995 = "「Ra là vậy, đây cũng là tác dụng của Decoration sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「かもですねー。\n結構脇から、ぐいぐい寄せてきてる感じですから」
1006 = "「Có lẽ vậy ạ. Cảm giác như bị ép chặt từ hai bên nách vào ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1062 = "「唔！」" 
# monologue
# JP: 僕に、ではなく僕の勃起に返事している。\n声が亀頭の表面をくすぐるようと、息を使って。
1554 = "Cô ấy không trả lời tôi, mà là trả lời dương vật của tôi. Giọng nói và hơi thở của cô ấy như đang trêu đùa trên bề mặt quy đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんも」
1298 = "「Anh Soutetsu cũng vậy.」"
# monologue
# JP: 瞳が笑う。口がクチュクチュ動きぽっかり開かれる。\n舌が伸ばされ下へ向けられ――
1449 = "Đôi mắt cô ấy cười. Miệng chóp chép rồi hé mở. Chiếc lưỡi vươn ra, hướng xuống dưới——"
# 【ポーレット】
# display as 波萊特
# JP: 「――――――――」
693 = "「――――――――」"
# monologue
# JP: ――舌をレールに、唾液が移送されていく。\n僕の亀頭の上へ次々、透明の層を重ねくずれる。
678 = "——Lấy lưỡi làm đường ray, nước bọt dần được truyền đi. Lớp màng trong suốt liên tục bao phủ lên quy đầu của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「感じちゃいますか？　いっつもより」
1181 = "「Anh có cảm thấy kích thích không? Hơn mọi khi ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さぁ、どうだろうな」
1288 = "「Chà, khó nói lắm.」"
# monologue
# JP: 感じている。感じずにいるわけがない。\nゆえに、とぼける。より強く、深く色濃く感じるために。
1510 = "Có chứ. Sao lại không có cảm giác được. Thế nên tôi mới giả vờ. Để cảm nhận sự kích thích mạnh mẽ, sâu sắc và mãnh liệt hơn nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「わからないんですか？\nそれなら――――体に直接聞いちゃいますね？」
955 = "「Anh không biết sao? Nếu vậy――――để em trực tiếp hỏi cơ thể anh nhé?」"
# monologue
# JP: ポーレットが大きく口を開いて――
1555 = "Paulette há to miệng——"
# 【ポーレット】
# display as 波萊特
# JP: 「（ぺろっ）」
1320 = "（Liếm nhẹ）"
# 【双鉄】
# display as 雙鐵
# JP: 「おうふっ！」
1053 = "「Oufu!」"
# monologue
# JP: 当然期した包み込まれる感触が、\nけれども小さな、点の刺激にすり替えられる。
1509 = "Cảm giác được bao bọc như mong đợi, lại bị thay thế bằng một kích thích nhỏ xíu, như một điểm chạm."
# 【ポーレット】
# display as 波萊特
# JP: 「ペロッ――れるっ――ちゅっ、ちゅむっ、ちゅうっ――\nペロッ――ぺちゅっ――ちゅるっ――ちゅっ――れるっ」
1020 = "「Pê ro——rê ru——chụt, chu mu, chụt—— Pê ro——pê chu——chu ru——chụt——rê ru」"
# monologue
# JP: 点の刺激が、すぐ面になる。ポーレットは熱い舌先で、\n僕の亀頭の全部に唾液を塗り伸ばしていく。
1383 = "Kích thích từ một điểm, nhanh chóng lan rộng ra. Paulette dùng chiếc lưỡi nóng bỏng, thoa đều nước bọt lên toàn bộ quy đầu của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「（ふ～～～っ）、ちゅっ！　ちゅむっ――ちゅっ――\nぺろっ――れるっ――ぺろっ――れろおっ――ぺちゅっ」
1315 = "「（Phù～～～）, chụt! Chu mu——chụt—— liếm nhẹ——rê ru——liếm nhẹ——rê ro——pê chu」"
# monologue
# JP: 息を吹きかけ、キスして、舐めて――そうする間にも\n勃起の根本は、甘やかな圧迫感に包み込まれる。
1421 = "Cô ấy thổi hơi, hôn, rồi liếm——trong lúc đó, phần gốc dương vật vẫn bị bao bọc trong áp lực ngọt ngào."
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅむっ――ぺろっ――ちゅうっ――チュッ――\nれろっ――ぺろっ――れるううううっ――ちゅ、ちゅむ」
1105 = "「Chu mu——liếm nhẹ——chụt——chụt—— rê ro——liếm nhẹ——rê ru uu——chu, chu mu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット――ポーレット」
1246 = "「Paulette——Paulette.」"
# monologue
# JP: 初手から快感がたかまりすぎる。\nこのままいけば亀頭舐めだけでイカされてしまう。
1376 = "Ngay từ đầu khoái cảm đã dâng lên quá mức. Cứ thế này thì chỉ cần liếm quy đầu thôi tôi cũng bắn mất."
# 【ポーレット】
# display as 波萊特
# JP: 「（ちゅっ！）――うふふっ、なんですか？　双鉄くん」
1321 = "「（Chụt!）——Ufufu, sao thế? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットのおっぱいなのだが――」
1297 = "「Ngực của Paulette ấy——」"
# monologue
# JP: やむなく会話で時間を稼ぐ。快感を一度落ち着かせ、\nちゃんと咥えてもらえるようにも誘導したい。
1495 = "Tôi đành phải dùng cách trò chuyện để câu giờ. Muốn làm dịu đi khoái cảm, đồng thời cũng muốn dụ cô ấy ngậm lấy nó."
# 【双鉄】
# display as 雙鐵
# JP: 「毎日毎日揉んでいるゆえ気づかなかったが――\nおっぱい自体が、以前より大きくなっていないか？」
1150 = "「Vì ngày nào cũng nắn bóp nên anh không để ý—— Nhưng hình như ngực em to hơn trước thì phải?」"
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　あ――どうかな？　どうでしょ。\nそんな気、自分でもちょっとはしてたんですけど」
1050 = "「Ế!? A——sao nhỉ? Sao ta. Chính em cũng có cảm giác như vậy một chút.」"
# monologue
# JP: （むにっ）
1758 = "（Nắn bóp）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1064 = "「!!!」"
# monologue
# JP: ポーレットが肘でおっぱいを寄せれば、\n極上の肉と肌とのなめらかな圧力が更に強まる。
1557 = "Khi Paulette dùng cùi chỏ ép ngực lại, áp lực mềm mại từ lớp thịt và làn da tuyệt hảo càng trở nên mạnh mẽ hơn."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……あ！　そうだ！\nおっぱいを思い切りぎゅ～って寄せてみて」
1118 = "「Ưm……a! Đúng rồi! Để em thử ép chặt ngực lại xem sao nhé.」"
# monologue
# JP: （ぎゅむっ！！）
1769 = "（Ép chặt!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぅぁっ」
1061 = "「Ưa」"
# 【ポーレット】
# display as 波萊特
# JP: 「はみ出しているおちんちんの長さ――\nどうです？　前より短くなってたりとかします？」
1301 = "「Chiều dài của phần dương vật thò ra—— Thế nào ạ? Có ngắn hơn trước không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……わからん――\nというか、だ――」
1286 = "「Chuyện đó thì……anh không biết——\nHay đúng hơn là——」"
# monologue
# JP: （むにっ――すりっ――みゅにゅっ――くしゅっ――）
1755 = "（Nắn bóp——cọ cọ——nắn nắn——cọ xát——）"
# monologue
# JP: ポーレットが実にゆるゆる動かしてくる乳圧に、\n集中力と判断力とを、ぐすぐずに融かされ壊されている。
1560 = "Áp lực từ bộ ngực mà Paulette đang chầm chậm di chuyển, đã hoàn toàn làm tan chảy và phá vỡ sự tập trung cùng khả năng phán đoán của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕はいま、現在進行系で知能指数を下げられている。\nたったひとつのことの他、今はなんにも考えられん」
1200 = "「Hiện tại, chỉ số thông minh của anh đang bị giảm sút theo thời gian thực. Ngoài một chuyện duy nhất ra, bây giờ anh chẳng thể suy nghĩ được gì nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ん～～～～――――ぁ――――――（ぺちょっっ）」
1115 = "「Ưm～～～～――――a――――――（Liếm láp）」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1063 = "「Ư!!」"
# monologue
# JP: また亀頭へと、熱い唾液が垂らされる。
1569 = "Nước bọt nóng hổi lại nhỏ giọt xuống quy đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「なんですか？　その、『たったひとつのこと』って」
980 = "「Là chuyện gì vậy? 『Một chuyện duy nhất』 đó ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「射精したい。ポーレットのおっぱいとお口に思い切り\n愛してもらって、思いっきりに射精したい」
1191 = "「Anh muốn xuất tinh. Muốn được ngực và miệng của Paulette yêu thương hết mình, và xuất tinh thật thỏa thích.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、わかりましたぁ――はむっ」
1060 = "「Ufufu, em hiểu rồi——ngậm lấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1065 = "「Ư!!!!」"
# monologue
# JP: ようやく、ようやく咥えてもらえた！\n満足感と達成感と安心感――っ！！！？
1597 = "Cuối cùng, cuối cùng cũng được em ấy ngậm lấy rồi! Cảm giác thỏa mãn, thành tựu và an tâm——!!!?"
# 【ポーレット】
# display as 波萊特
# JP: 「ぐちゅっ！　ちゅぶっ！　ずちゅっ！　じゅぼっ！\nぐりゅっ――リュッ――じゅぶ！　じゅるるる～～っ！」
1028 = "「Gu chu! Chu bu! Zu chu! Ju bo! Gu ryu——ryu——ju bu! Ju ru ru ru～～!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぉあっ！」
1054 = "「Oa!」"
# monologue
# JP: 満たされたという暖かな思いが、その何倍の何十倍の、\n暴力的な快感に、塗りつぶされて押し流される！
1568 = "Cảm giác ấm áp khi được thỏa mãn đã bị cuốn trôi và vùi lấp, bởi một khoái cảm bạo liệt gấp nhiều, gấp hàng chục lần!"
# 【ポーレット】
# display as 波萊特
# JP: 「じゅぶうっ！　じゅ！　れろっ――れるっ――じゅっ！\nじゅぼ！　じゅびゅ！　ごちゅっ！　じゅぶうっ！！」
1107 = "「Ju buu! Ju! Rê ro——rê ru——ju! Ju bo! Ju byu! Go chu! Ju buu!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「あっ――あっ――あっ――」
1076 = "「A——a——a——」"
# monologue
# JP: 亀頭を唇でピストンされて、喉奥にまで当ててもらえる。\nそうする間も舌は休まず、カリを、鈴口を舐めてくれる。
1432 = "Đôi môi cô ấy liên tục chuyển động trên quy đầu, đẩy sâu vào tận cuống họng. Trong lúc đó, chiếc lưỡi vẫn không ngừng nghỉ, liếm láp quanh rãnh quy đầu và lỗ sáo."
# monologue
# JP: （もにゅっ！　くちゅっ！　じゅちゅっ！　しにゅん！）
1734 = "（Rút ra! Đâm vào! Rút ra! Đâm vào!）"
# monologue
# JP: お口の傍らおっぱいは、竿の全部と睾丸までをも、\n唾液と汗でぬらつきながらみっちり包んで刺激して――
1453 = "Cùng với chiếc miệng nhỏ, đôi gò bồng đảo bao bọc lấy toàn bộ thân dương vật và cả tinh hoàn, dưới sự trơn trượt của nước bọt và mồ hôi, chúng không ngừng kích thích——"
# 【ポーレット】
# display as 波萊特
# JP: 「じゅっ！　ぢゅぼっ！　ぢゅぶっ！　ぼちゅっ！！\nぢゅびゅっ！　ぢゅばっ！　ぢゅぅう！　ぢゅぶっ！！」
1108 = "「Ju! Ju bo! Ju bu! Bo chu!! Ju byu! Ju ba! Juu u! Ju bu!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁっ！」
1092 = "「A a!」"
# monologue
# JP: おっぱいのまろやかな刺激を裏返したような、\n亀頭だけへの強烈で動物的で一直線な射精誘導。
1641 = "Trái ngược với sự kích thích êm ái từ bộ ngực, là sự dẫn dắt xuất tinh mãnh liệt, mang tính bản năng và trực diện chỉ nhắm vào quy đầu."
# monologue
# JP: （もにっ！　むにゅっ！　ふにゅっ！　すりゅんっ！）
1756 = "（Bóp! Nắn! Ép! Trượt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぼぢゅっ！　ぢゅちゅ！　ぢゅぼっ！　ぢゅばっ！\nずりゅっ！　ぢゅむっ！　ちゅううっ！　れりゅっ！」
1148 = "「Bo ju! Ju chu! Ju bo! Ju ba! Zu ryu! Ju mu! Chuu u! Rê ryu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ぁ――ァ――っ――」
1077 = "「A——a——a——ư——」"
# monologue
# JP: 両者が強烈に混じり合い、お互いがお互いを引き立て合う。\nもっと長くを楽しみたいが、射精衝動が強すぎて――
1391 = "Cả hai kích thích hòa quyện mãnh liệt, bổ trợ cho nhau. Tôi muốn tận hưởng lâu hơn nữa, nhưng xung động xuất tinh lại quá dữ dội——"
# 【双鉄】
# display as 雙鐵
# JP: 「ポー、レット――僕は、ぼくは、もうっ」
1239 = "「Pau, lette——anh, anh, ra mất」"
# monologue
# JP: （ぴたっ）
1703 = "（Khựng lại）"
# monologue
# JP: 瞬間、ポーレットが動きを止めっ――っ！！！？
1558 = "Trong khoảnh khắc, Paulette dừng mọi chuyển động——!!!?"
# 【ポーレット】
# display as 波萊特
# JP: 「れるううううううううううううううううううっ！！！」
1255 = "「Rê ru uu uu uu uu uu uu uu uu uu uu uu uu uu uu uu!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「！！！！」
# 1065 = "「唔！！！！」" 
# monologue
# JP: 裏筋が！！！！\nこの土壇場で下から上へとっ！！！
1431 = "Rãnh quy đầu!!!! Ngay giờ phút chót này lại bị liếm ngược từ dưới lên trên!!!"
# 【双鉄】
# display as 雙鐵
# JP: 「くはっ」
1017 = "「Ư ha」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぷっ――ずっちゅううううううううっっっっっっ！」
1037 = "「Ha pu——zu chuu uu uu uu uu uu uu!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁあっっ！！」
1093 = "「A a!!」"
# monologue
# JP: （びゅくっ！　どびゅっ！　びゅぶるっ！　ぶびゅっ！）
1713 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んくっ――ごくっ――ゴクッ――んぷっ」
1128 = "「Ưm ku——ực——ực——ưm pu」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ――あ――ポーレット――ポーレット」
1082 = "「A——a——Paulette——Paulette」"
# monologue
# JP: 舐めたそのまま亀頭を咥えて思いっきりに吸い付いて、\n導き出した精液を、そのままごくごく嚥下してくれる。
1562 = "Liếm xong, cô ấy ngậm lấy quy đầu và hút thật mạnh, nuốt ừng ực dòng tinh dịch vừa được dẫn dắt trào ra."
# monologue
# JP: （びゅぶっ！　びゅっ！　びゅるるっ！　どびゅっ！）
1715 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――んぷっ――ぷっ――くっ――んっ」
1116 = "「Ưm——ưm pu——pu——ku——ưm」"
# monologue
# JP: この美しい生物が僕だけのため、これほどに下卑た行為を、\n幸せそうにしてくれる。事実が射精をさらに促し――
1443 = "Sinh vật xinh đẹp này chỉ vì tôi mà thực hiện hành vi dâm đãng đến nhường này, lại còn trông vô cùng hạnh phúc. Sự thật đó càng thôi thúc tôi xuất tinh mạnh hơn——"
# monologue
# JP: （びゅ！　びゅうっ！　びゅうっ！　びゅぶっ！）
1723 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んぷっ！？　ぷっ――くっ―\n―こほっ――うぇっ――ごくっ――んむっ」
1133 = "「Ưm pu!? Pu——ku——\nkho hộc——uệ——ực——ưm mu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、もういい無理するな」
1250 = "「Paulette, được rồi, đừng cố quá.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえっ！　あうっ！！？」
1197 = "「Không sao! A u!!?」"
# monologue
# JP: （びゅっ！　びゅうっ！　びゅピュッ――ぴゅっ）
1722 = "（Phụt! Phụt! Phụt——phụt）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃぁん」
1007 = "「Kyaaan」"
# monologue
# JP: 飲みきれなかった白濁液が、白皙の美貌に降りかかる。\n顎をしたたり豊かな胸へ――淫靡に、美麗に、点点と。
1422 = "Dòng tinh dịch trắng đục không kịp nuốt hết văng lên gương mặt xinh đẹp, trắng ngần của cô ấy. Chảy dọc xuống cằm, rỏ xuống bộ ngực căng tròn——từng giọt, từng giọt dâm đãng và diễm lệ."
# monologue
# JP: （ぴゅっ――ぷっ――ぴっ――…………）
1712 = "（Phụt——phụt——phụt——…………）"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――ぱくっ――ズッ――ずううっ――ごくっ。\nぷはっ――あ～ん、全部のみたかったのにぃ」
1085 = "「A——pa ku——zu——zuu u——ực. Pu ha——a~n, em muốn nuốt hết cơ mà.」"
# monologue
# JP: 言いながら、顔に飛び散った精液を指でぬぐって――
1439 = "Vừa nói, cô ấy vừa dùng ngón tay quệt lớp tinh dịch văng trên mặt——"
# 【ポーレット】
# display as 波萊特
# JP: 「ぺろっ」
1021 = "「Pê ro」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！　ポーレット」
1067 = "「Ư!!!! Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？」
1016 = "「Kya!?」"
# monologue
# JP: パンツを脱ぎ捨てポーレットの足を抱え込む。\nおあずけされてた下半身を――
1504 = "Tôi cởi phăng chiếc quần lót và ôm chầm lấy đôi chân của Paulette. Hướng về nửa thân dưới đã bị bỏ mặc nãy giờ——"
# monologue
# JP: （かぱぁ）
1709 = "（Tách ra）"
# 【ポーレット】
# display as 波萊特
# JP: 「や、双鉄くん――はずかしい、です。\nこんな、無理やり」
1273 = "「Đừng, anh Soutetsu——xấu hổ lắm. Sao anh lại cưỡng ép thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理やりでなくとも恥ずかしかろう。\nだって、これは、ポーレット――」
1170 = "「Dù không cưỡng ép thì cũng xấu hổ mà. Bởi vì, thế này, Paulette——」"
# monologue
# JP: 装飾で、ディスプレイで、デコレーション。\nその説明で、おっぱいのときは納得したが――
1621 = "Đồ trang trí, phụ kiện trưng bày, decoration. Với lời giải thích đó, tôi đã chấp nhận khi ngắm nhìn bộ ngực, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「丸出しだぞ」
973 = "「Phơi bày ra hết rồi kìa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ちょっ！　双鉄くんってば、言い方！！」
1109 = "「Này! Anh Soutetsu, cách nói của anh!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、たしかに言葉足らずか」
1139 = "「A, đúng là anh dùng từ chưa chuẩn nhỉ.」"
# monologue
# JP: 慌てて照れるポーレットが、かえって僕を落ち着かせる。\n先程までは一方的に責め立てられるばかりだったが――
1586 = "Paulette luống cuống xấu hổ, ngược lại làm tôi bình tĩnh hơn. Từ nãy đến giờ tôi chỉ toàn bị tấn công một chiều, nhưng——"
# 【ポーレット】
# display as 波萊特
# JP: 「そ、そうですよ？　たしかにわたしたち、夫婦ですし？\n何百回もこういうことしてますけど、それでもやっぱり」
1218 = "「Đ-Đúng thế mà? Dù chúng ta là vợ chồng, dù đã làm chuyện này hàng trăm lần rồi, nhưng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「おまんこが、まるだしだ」
1165 = "「Âm đạo của em, đang phơi bày ra hết kìa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はうっ！！？」
1033 = "「Hau!!?」"
# monologue
# JP: 真っ赤になってもじもじ震える。\n自分で選んで買ったものであろうに――うむ？
1425 = "Cô ấy đỏ bừng mặt, lúng túng run rẩy. Rõ ràng là tự mình chọn mua mà——hửm?"
# 【双鉄】
# display as 雙鐵
# JP: 「気になったのだがポーレット。僕に教えてくれないか？\nどんな理由でこのおまんこが丸出しの紐を買ったのだ？」
1204 = "「Anh tò mò quá, Paulette. Nói cho anh biết đi? Vì lý do gì mà em lại mua sợi dây phơi bày hết cả âm đạo thế này?」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　あっ――えと、あのっ――」
1052 = "「Hả? A——ưm, cái đó——」"
# monologue
# JP: ぐるぐるしている。普段なら全力で支えるところであるが、\nふたりの夜なら、こうした姿も実にかわいい。
1563 = "Cô ấy lúng túng quay cuồng. Bình thường tôi sẽ dốc sức hỗ trợ cô ấy, nhưng trong đêm chỉ có hai người thế này, dáng vẻ đó quả thực rất đáng yêu."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしが、ええと、このランジェリーを」
1187 = "「Em, ưm, mua bộ nội y này là vì」"
# 【双鉄】
# display as 雙鐵
# JP: 「ランジェリー？　これが？　その用を為してないだろう。\nこれはただの、おまんこ丸出しの紐だ」
987 = "「Nội y? Cái này á? Có tác dụng gì đâu. Đây chỉ là sợi dây phơi bày âm đạo thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はう～～っ――あうっ――わ、わたしが――この、\nおまんこ――おまんこ、丸出しの紐を、買ったの、は」
1035 = "「Hau～～——au——e, em——mua sợi dây, phơi bày——phơi bày âm đạo này, là vì」"
# 【双鉄】
# display as 雙鐵
# JP: 「おまんこを丸出しにして、\n僕にいじめてほしかったからか？」
1225 = "「Vì em muốn phơi bày âm đạo, để anh bắt nạt đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　やっ――違うっ、そんなっ」
1048 = "「Ế!? Không——không phải, chuyện đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「違う？　本当に？」
951 = "「Không phải? Thật không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あうっ！」
1090 = "「Au!」"
# monologue
# JP: 目線を向ければ、ポーレットは足を閉じようとする。\n無論ゆるさず、その柔肉から溢れる蜜を眺め続ける。
1584 = "Khi tôi hướng ánh mắt xuống, Paulette liền cố khép chân lại. Tất nhiên tôi không cho phép, tiếp tục ngắm nhìn mật ngọt rỉ ra từ lớp thịt mềm mại ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「ちがわない……です。梱包開いて、あれって思って、\n着ちゃった後は――期待、しました、それは、やっぱり」
979 = "「Không sai……ạ. Lúc mở gói hàng ra, em đã thấy lạ rồi, nhưng sau khi mặc vào thì——quả nhiên, em đã, rất mong chờ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「期待とは何を？　具体的に教えてもらえるか？」
975 = "「Mong chờ điều gì? Có thể nói cụ thể cho anh biết không?」"
# monologue
# JP: （すりゅっ）
1766 = "（Cọ nhẹ）"
# 【ポーレット】
# display as 波萊特
# JP: 「んうううっ！」
1131 = "「Ưm uu u!」"
# monologue
# JP: ガチガチに硬度を戻した勃起でおまんこをゆるく擦れば、\nポーレットは甘い声――おねだりそのものの声を出す。
1397 = "Khi tôi dùng dương vật đã cương cứng trở lại cọ xát nhẹ vào âm đạo, Paulette liền phát ra giọng điệu ngọt ngào——như đang làm nũng."
# 【ポーレット】
# display as 波萊特
# JP: 「おまんこ、わたしの、まるだしおまんこ、それと、\nおっぱい、わたしの、まるだしおっぱいもぉ」
1169 = "「Âm đạo, âm đạo phơi bày của em, với cả, ngực, ngực phơi bày của em nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1123 = "「Ừm.」"
# monologue
# JP: （もにっ――もにゅっ――くりゅっ――こしゅんっ！）
1742 = "（Bóp——nắn——xoay——cọ xát!）"
# 【ポーレット】
# display as 波萊特
# JP: 「はうううっ――ふあっ――あっ――\nおっぱい――ちくび――きもちいい――よぉ」
1032 = "「Hau uu——pha——a——\nngực——nhũ hoa——sướng quá——a」"
# monologue
# JP: 素直なこには、ご褒美を。\n真っ正直なおねだりには、真っ正直な答えを返す。
1632 = "Phải thưởng cho bé ngoan chứ. Cô ấy đã thành thật xin xỏ, tôi cũng sẽ đáp lại một cách thành thật."
# 【双鉄】
# display as 雙鐵
# JP: 「こうして、弄ってほしかったのか？」
1177 = "「Em muốn anh nghịch thế này sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「いじいじさわさわだけじゃなくって、ちゅぱちゅぱとか、\nぺろぺろちゅうちゅうとか、あとね？　あと、おまんこ」
957 = "「Không chỉ nghịch nghịch sờ sờ, mà còn mút mút, liếm liếm mút mút nữa, với lại nhé? Với lại, âm đạo」"
# monologue
# JP: （きゅううっ）
1775 = "（Siết chặt）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1064 = "「唔！！！」" 
# monologue
# JP: 擦り付けている勃起へと、大陰唇がはりついてくる。\n挿入しろと、射精をしろと、至極単純に訴えてくる。
1413 = "Môi lớn bám dính lấy dương vật đang cọ xát. Đòi hỏi một cách vô cùng đơn giản rằng hãy đâm vào, hãy xuất tinh đi."
# 【ポーレット】
# display as 波萊特
# JP: 「おまんこには、おちんちんいれてほしくて――\nたくさんたくさん、きもちいいこと、二人でして、ね？」
1164 = "「Âm đạo thì, em muốn được nhét dương vật vào—— Hai đứa mình cùng làm thật nhiều, thật nhiều chuyện sung sướng nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「～～っ」
1070 = "「～～」"
# monologue
# JP: 挿入したい、いますぐずぼずぼ腰を動かし\n精子の全部をポーレットの子宮に注ぎ込みたい。
1503 = "Muốn đâm vào, muốn lập tức lắc eo liên hồi và trút toàn bộ tinh trùng vào tử cung của Paulette."
# monologue
# JP: （むにっ！　くりゅっ！　こしゅっ！　もみゅっ！）
1731 = "（Bóp! Xoay! Cọ! Nắn!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んふっ！！！」
1127 = "「Ưm fu!!!」"
# monologue
# JP: 右手に神経の全てを注いでおっぱいに埋め、\nその衝動を、すんでのところで食い止める。
1507 = "Tôi dồn toàn bộ sự tập trung vào tay phải đang vùi trong bầu ngực, và kiềm hãm xung động ấy ngay trong gang tấc."
# 【ポーレット】
# display as 波萊特
# JP: 「どろどろの、ぐちゃぐちゃにとけあって、\n一杯一杯、おまんこの奥にびゅうびゅうしてもらって」
1278 = "「Hòa quyện vào nhau nhớp nháp, nhầy nhụa, rồi bắn thật nhiều, thật nhiều vào sâu trong âm đạo em」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1062 = "「唔！」" 
# monologue
# JP: 胸を揉んでも、もうごまかせない。\nこれほど上等のおっぱいを揉んでいてもなお――
1455 = "Dù có xoa bóp ngực cũng không thể đánh lừa bản thân được nữa. Dù đang nắn bóp bầu ngực tuyệt hảo đến vậy mà vẫn——"
# 【ポーレット】
# display as 波萊特
# JP: 「ふたりでいっしょにしあわせになって――それで――\nえへへ――おかあさんとおとうさんになりたいなぁって」
1194 = "「Hai đứa mình cùng nhau hạnh phúc——rồi sau đó—— ehehe——em muốn chúng mình trở thành bố mẹ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！」
1249 = "「Paulette!」"
# monologue
# JP: （ずぶうううううううううううっ――――ごつっっ！！）
1770 = "（Đâm sâu uuuuuuuuuuu――――kịch!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅん！！！」
1010 = "「Kyuuuuuuuuuuuuuuuuuuun!!!」"
# monologue
# JP: 貫いている。最愛の妻の最奥までを、一気呵成に一直線に。\nむちむち満ちる膣内は、喜んで僕を迎えてくれる。
1514 = "Xuyên thấu. Xuyên thẳng một mạch đến tận nơi sâu nhất của người vợ yêu dấu. Bên trong âm đạo đầy đặn mềm mại đang hân hoan chào đón tôi."
# monologue
# JP: （みちゅっ――みちゅっ！　ぐにゅっ！　ぐにっっ）
1780 = "（Mút mát——mút mát! Nhào nặn! Nhào nặn）"
# monologue
# JP: 狭いというより、みっちりしている。空間が膣肉で満ち、\n膣肉全てが最上級に柔らかすぎる霜降り肉で――
1622 = "Không phải là chật hẹp, mà là kín mít. Không gian bị lấp đầy bởi lớp thịt âm đạo, tất cả đều là lớp thịt vân mỡ thượng hạng mềm mại vô cùng——"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ――ふぁ――双鉄くん――そうてつくぅん」
1074 = "「A——pha——anh Soutetsu——anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。ポーレット」
1122 = "「Ừm. Paulette.」"
# monologue
# JP: その肉ひだの一つ一つがわななき吸い付き震え甘えて、\n僕の射精を、動かぬいまさえひっきりなしに促してくる。
1457 = "Từng nếp gấp thịt run rẩy, mút mát, rung lên nũng nịu, không ngừng thúc giục tôi xuất tinh, ngay cả khi tôi đang bất động."
# 【双鉄】
# display as 雙鐵
# JP: 「なろう、必ず。ポーレットと僕とふたりで。\n世界一幸せなおかあさんとおとうさんに、絶対なろう」
970 = "「Sẽ thành, chắc chắn vậy. Paulette và anh, hai chúng ta. Tuyệt đối sẽ trở thành ông bố bà mẹ hạnh phúc nhất thế giới.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、はい――うれしいです！\nえへへっ、ぜったいぜったい、してくださいね！」
1227 = "「Vâng, vâng——em vui lắm! Ehehe, nhất định, nhất định phải biến em thành mẹ nhé!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1123 = "「嗯」" 
# monologue
# JP: （ぞっ――ろっ――ろっ――ろっ――）
1704 = "（Sục——sục——sục——sục——）"
# 【ポーレット】
# display as 波萊特
# JP: 「くひゅっ！　んっ――ぁ――ふぁ――あっ――あ……\nぁっ――太い、とこ――ぞりって――すき――んっ――」
1025 = "「Ku hyu! Ưm——a——pha——a——a…… A——chỗ, to ấy——cọ vào——thích quá——ưm——」"
# monologue
# JP: ついさっき、あれほど大量に射精した。\nすぐニ発目では薄くなろうし、体裁もあまりよろしくない。
1395 = "Vừa mới nãy tôi đã bắn ra một lượng lớn tinh dịch. Nếu bắn phát thứ hai ngay thì tinh dịch sẽ bị loãng, và trông cũng không hay cho lắm."
# monologue
# JP: （グッ――くっ――ぐりゅ――くっ――ぐっ――こつっ）
1748 = "（Đâm——cọ——xoay——cọ——đâm——kịch）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――は――ァ――あっ――ゆっくり、も――\nすき――んっ――きもち、いいとこ――じっくり――ぁ」
1022 = "「Pha——ha——a——a——chậm rãi, thế này—— em cũng thích——ưm——chỗ, sướng ấy——cứ từ từ——a」"
# monologue
# JP: ゆえ、慎重に腰を動かす。ポーレットの膣内の\n反応が良くなる部分を余さず刺激するようにして――
1517 = "Vì thế, tôi thận trọng chuyển động eo. Cố gắng kích thích không sót chỗ nào để âm đạo của Paulette phản ứng tốt hơn——"
# monologue
# JP: （ずぞっ――ぞ――ずりゅ――りゅう――ぬ――）
1750 = "（Thọc——cọ——cọ xát——trượt——miết——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ――ぁ――ぁ――んっ――ね？　そうてつ、くん――\nそうてつ――くぁ――ふっ――んっ――んうっ！」
1079 = "「A——a——a——ưm——nè? Anh Soutetsu—— Soutetsu——a——phu——ưm——ưm uu!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　どうした、ポーレット」
968 = "「Sao vậy? Có chuyện gì thế, Paulette.」"
# monologue
# JP: （ずっ――ぞぶ――ぐっ――ぐりっ――くっ――こつっ）
1749 = "（Thọc——cọ——miết——xoay——cọ——kịch）"
# 【ポーレット】
# display as 波萊特
# JP: 「おちん、ちん――ンッ――そうてつ、くん、の、\nおちん、ちん――おちんちん、の、ふとい、くびれ、の」
1266 = "「Dương, vật——ưm——của anh Soutetsu—— dương, vật——chỗ thắt lại, phình to, của dương vật」"
# 【双鉄】
# display as 雙鐵
# JP: 「カリ首か？」
1305 = "「Rãnh quy đầu à?」"
# monologue
# JP: （ぬちゅっ――ちっ――くっ――ぐくっ――くるっ――）
1763 = "（Trơn trượt——cọ——miết——ma sát——xoay——）"
# 【ポーレット】
# display as 波萊特
# JP: 「んっ！？　はっ！　あっ――ね？　カリ、くびっ――\nそうてつ、くんの――んひっ――ふと、い――前、より」
1136 = "「Ưm!? Ha! A——nè? Rãnh, quy đầu—— của anh Soutetsu——ưm hi——to hơn——trước đây, rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、そうではなく。\n僕のカリ首が、以前より大きくなったのではなく」
958 = "「Không, không phải đâu. Không phải rãnh quy đầu của anh to hơn trước đây đâu.」"
# monologue
# JP: （ぐっ――くっ――――ぴたっっ）
1774 = "（Miết——cọ――――khựng lại）"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ！？」
1097 = "「A!?」"
# monologue
# JP: 天井側の浅いとこ。ぷっくりとした感触に、\nカリ首の一番高いところを押し当てながらひとまず止まる。
1602 = "Phần nông phía trên trần. Tôi ép phần nhô cao nhất của rãnh quy đầu vào điểm sưng phồng ấy rồi tạm thời dừng lại."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄、くん？」
1300 = "「Anh Soutetsu?」"
# monologue
# JP: 焦れて、甘えて――それでもはっきり、感じている声。\nそれが証拠に膣内も――
1429 = "Sốt ruột, nũng nịu——nhưng vẫn là giọng nói đang cảm nhận rõ ràng khoái cảm. Bằng chứng là bên trong âm đạo cũng——"
# monologue
# JP: （きゅうううっ――きゅむっ――にゅううっ――きゅん）
1707 = "（Co thắt dữ dội——siết chặt——ép chặt——co rút）"
# monologue
# JP: ……ひっきりなしに蠢き貼り付き、僕の射精を促してくる。
692 = "……Không ngừng ngọ nguậy, bám dính lấy, thúc giục tôi xuất tinh."
# 【双鉄】
# display as 雙鐵
# JP: 「ゆっくり、慎重に感じてみるんだ」
977 = "「Hãy từ từ, cẩn thận cảm nhận xem.」"
# monologue
# JP: （さっ――ゆさっ――ゆさっ――ゆさっ――）
1784 = "（Lắc——lắc nhẹ——lắc nhẹ——lắc nhẹ——）"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ！？　ぁ――ぁ――ぁっ――ふあっ――これっ――\nこれっ――えっ――やらっ――これっ――しゅきっ――」
1099 = "「A!? A——a——a——pha——thế này—— thế này——ế——ưm——thế này——thích quá——」"
# monologue
# JP: ほんのわずかな前後動。\n腰ではなくて、抱えた体をゆりかごのように揺する感覚。
1515 = "Chỉ là một chuyển động tới lui rất nhỏ. Không phải dùng eo, mà giống như đang đu đưa cơ thể cô ấy như một chiếc nôi."
# monologue
# JP: （みちっ――むちっ――むちゅっ――みちゅんっ！）
1778 = "（Rút ra——đâm vào——rút ra——đâm vào!）"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あうっ――ふぁんっ――んっ――くぅんっ――\nん。これ――ゆっくり――はっ――ゆっくぃ、らのにぃ」
1084 = "「Ha——au——pha——ưm——kuuun—— Ưm. Thế này——chậm rãi——ha——chậm rãi, thế mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆっくりだからこそわかるだろう？　ポーレット」
992 = "「Chính vì chậm rãi nên em mới cảm nhận rõ ràng đúng không? Paulette.」"
# monologue
# JP: （ぴたっ）
# 1703 = "（停下）" 
# 【ポーレット】
# display as 波萊特
# JP: 「やぁん！　やぁ、なのっ――とめるの、やぁ、なのぉ」
1271 = "「Đừng! Đừng mà——dừng lại, đừng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕のカリ首が、大きくなったわけではなく」
948 = "「Không phải rãnh quy đầu của anh to ra đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うんっ、うんっ！」
1137 = "「Ưm, ưm!」"
# monologue
# JP: 恐らくは、意味を取ろうという思考さえ働いてない。\n動いて欲しくて欲しくて欲しくて頷いているだけだろう。
1418 = "Có lẽ cô ấy thậm chí còn chẳng suy nghĩ xem ý tôi là gì. Chỉ gật đầu vì muốn, rất muốn, cực kỳ muốn tôi tiếp tục chuyển động thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの膣内――膣壁――おまんこの中の\nぷりゅぷりゅが、より、女性らしさを、増しているのだ」
1220 = "「Bên trong âm đạo của Paulette——thành âm đạo——lớp thịt mềm mại bên trong âm đạo, đã trở nên, nữ tính hơn đó.」"
# monologue
# JP: （さっ――ゆさっ――ゆすっ――すりゅっ――）
1783 = "（Lắc——lắc nhẹ——đu đưa——trượt nhẹ——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひあっ！　あ、んっ――わたし、の、おまんこ、が\nあっ――もっと、ぷりゅぷりゅ――おんなのこ、らしく」
1011 = "「Hya! A, ưm——âm đạo, của, em a——mềm mại hơn——nữ tính, hơn sao」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、最高のプロポーションはそのままに、\n柔らかみと丸みを増しているのだ。こんなふうにな」
1140 = "「Đúng vậy, vẫn giữ nguyên tỷ lệ hoàn hảo, nhưng lại tăng thêm sự mềm mại và tròn trịa. Giống như thế này này.」"
# monologue
# JP: （ふにゅっ！）
1767 = "（Nắn mạnh!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んきゅんっ！！！」
1125 = "「Ưm kyun!!!」"
# monologue
# JP: （ぴゅっ！）
1728 = "（Phụt!）"
# 【ポーレット】
# display as 雙鐵＆波萊特
# JP: 「えっ！？」\n「えっ！？」
1045 = "「Ế!?」\n「Ế!?」"
# monologue
# JP: なんだ、いま、強めに揉んだポーレットの乳首から、\n水のようなものがほとばしりでた――
1475 = "Gì thế này, từ đầu vú vừa bị nắn mạnh của Paulette, có thứ gì đó giống như nước phun ra——"
# 【ポーレット】
# display as 波萊特
# JP: 「……おっ、ぱい？」
698 = "「……Sữa, mẹ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！！　（はぷっ！！！）」
1069 = "「Ư!!!!!!! （Ngậm lấy!!!）」"
# 【ポーレット】
# display as 波萊特
# JP: 「きゅふっ！？　んっ！　ちょっ！\nおちつ――あっ――おちついて――そうてつく――っ！」
1009 = "「Kyu fu!? Ưm! Khoan đã! Bình tĩnh——a——bình tĩnh lại đi——anh Soutetsu——!」"
# monologue
# JP: （ばちゅっ！　ぐちゅっ！　ごちゅっ！　ぼちゅっ！！）
1726 = "（Pa chu! Gu chu! Go chu! Bo chu!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「（ちゅむっ！　ちゅうっ！　ちゅるっ！　ずうっ！）」
1317 = "「（Chu mu! Chuu! Chu ru! Zuu!）」"
# 【ポーレット】
# display as 波萊特
# JP: 「やっ！　はっ！　はげしっ！　んっ！　こんなのっ！\nおっぱい、もっ！　あっ――おまんこ――もぉっ！！」
1013 = "「A! Ha! Mãnh liệt quá! Ưm! Thế này! Cả ngực! A——cả âm đạo——nữa!!」"
# monologue
# JP: 母乳であるなら呑みたくて。絞り出したくて滲ませたくて、\n必死になってむしゃぶりついて、全力で腰も稼働する。
1625 = "Nếu là sữa mẹ thì tôi muốn uống. Muốn vắt ra, muốn nó rỉ ra, tôi liều mạng ngậm lấy, dốc toàn lực lắc eo."
# monologue
# JP: （ぐちゅっ！　ずばっ！　ごちゅっ！　ぐりゅっ！！）
1740 = "（Đâm vào! Rút ra! Đâm vào! Rút ra!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！　うっ！　あ！　そんなっ、腰っ――んっ――\n腰、えぐる、みたいに、してもぉ――おっぱい、違うっ」
1015 = "「Hya! Ư! A! Eo anh, như thế——ưm—— Eo anh, như muốn khoét sâu vào trong vậy——ngực em, không phải đâu」"
# monologue
# JP: （ぴゅるっ）
# 1728 = "（噴出）" 
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1086 = "「A」"
# monologue
# JP: 水っぽさ。ただそれだけしか感じない。\n母乳らしいとはとても思えず、だから必死で求めてしまう。
1640 = "Vị nhạt thếch như nước. Chỉ có thể cảm nhận được vậy thôi. Không hề giống sữa mẹ chút nào, nên tôi càng khao khát nó hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「（ちゅっ！　ちゅうっ！　ちゅむっ！　ぢゅううっ）」
1319 = "「（Chụt! Chuu! Chu mu! Juu u!）」"
# monologue
# JP: （ごちゅっ！　ずりゅっ！　ばちゅんっ！　ばぢゅっ！）
1747 = "（Đâm vào! Rút ra! Đâm vào! Rút ra!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ！　んっ！　ふあっ！　あっ！　あっ！　ああっ！\nわたしっ！　でてるっ！　わたし！　おっぱいっ！！」
1095 = "「A! Ưm! Pha! A! A! Aa! Em! Ra rồi! Ngực em! Ra sữa rồi!!」"
# monologue
# JP: （ぴゅっ！　ぴゅうっ――じゅわっ――ぴゅううっっ）
1721 = "（Phụt! Phụt——tí tách——phụt）"
# monologue
# JP: 継続的に出始める。水っぽさが薄れ味が加わり始める。\nほのかに甘く、ミルクっぽさは感じないけれど――
1541 = "Bắt đầu chảy ra liên tục. Vị nhạt dần biến mất, bắt đầu có thêm chút hương vị. Ngòn ngọt, dù không có vị giống sữa lắm nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！」
# 1249 = "「波萊特！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん！　んあっ！！！？」
1299 = "「Anh Soutetsu! Ưm a!!!?」"
# monologue
# JP: （ばちゅっ！　ごちゅっ！　ずびゅっ！　ぼちゅっ！）
# 1747 = "（插入！抽出！插入！抽出！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ！　あっ！　あっ！　あっ！　ちょっ！　んあ！\nまっ――あっ――んぁっ！　ふぁああっっ！！！」
1024 = "「Pha! A! A! A! Khoan! Ưm a! Khoan đã——a——ưm a! Phaaaa!!!」"
# monologue
# JP: 妊娠させた。孕ませてる。ポーレットがお母さんになる！\n僕の子種で――つまりは僕が、お父さんになる！！
1511 = "Đã thụ thai rồi. Mang thai rồi. Paulette sẽ trở thành mẹ! Bằng hạt giống của tôi——tức là tôi, sẽ trở thành bố!!"
# monologue
# JP: （ばちゅっ！　ずびゅっ！　ぼちゅっ！　じゅぼっ！！）
1746 = "（Đâm vào! Rút ra! Đâm vào! Rút ra!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「おまんこ！　おくっ！　おくっ！　しきゅうっ！\nふっ！　あっ！　つよくっ！　ごちゅん、だめ、なのっ」
1167 = "「Âm đạo! Bên trong! Bên trong! Tử cung! Phu! A! Mạnh quá! Đâm vào, không được, đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！」
1068 = "「Ư!!!!!!」"
# monologue
# JP: 獣じみた興奮に、危ういところで鎖がかかる。\nそうだった――ポーレットは、母になりかけなのだから
1498 = "Trong cơn hưng phấn như dã thú, tôi kịp thời khóa chặt xiềng xích lại. Đúng rồi——Paulette sắp trở thành một người mẹ mà."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。ポーレット。嬉しさのあまり、我を忘れた」
1162 = "「Anh xin lỗi, Paulette. Anh vui quá nên mất kiểm soát.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えへへっ。それはそれでうれしいです――ぁふっ」
1043 = "「Ehehe. Như vậy em cũng vui lắm——a phu」"
# monologue
# JP: （ずっ――ゆすっ――ゆさっ――さすっ――）
1773 = "（Cọ xát——lắc nhẹ——đu đưa——miết nhẹ——）"
# monologue
# JP: 奥ではなくて、入り口にある感じるところ。\nそこを何度も、そっと刺激する浅い動きに切り替える。
1487 = "Không phải vào sâu bên trong, mà là điểm nhạy cảm ở ngay lối vào. Tôi chuyển sang những chuyển động nông, nhẹ nhàng kích thích chỗ đó nhiều lần."
# monologue
# JP: （ゆすっ――ゆさっ――さすっ――こしゅっ――）
1759 = "（Lắc nhẹ——đu đưa——miết nhẹ——cọ xát——）"
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――あっ――これ――やっぱり――しゅきっ――\nんんっ――きもち――いいの――じわじわ、じわ、って」
1114 = "「Ưm——a——thế này——quả nhiên——em thích lắm—— ưm ưm——sướng——lắm——khoái cảm, cứ râm ran, râm ran ấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1224 = "「Vậy sao.」"
# monologue
# JP: それはなによりなのだけれども、やはりこの極上膣の\n全部を使って奥まであてての摩擦感にはかなわない。
1647 = "Dù điều đó là trên hết, nhưng quả thực vẫn không thể sánh bằng cảm giác ma sát khi dùng toàn bộ âm đạo cực phẩm này để đâm vào tận sâu bên trong."
# monologue
# JP: （ゆすっ！　さすっ！　すにゅっ！　こしゅっ！）
1761 = "（Lắc nhẹ! Miết nhẹ! Cọ vào! Cọ ra!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ――ねっ――おねがい――ふっ――あっ――\nいまの――はやさと――つよさの――まま、でっ――」
1072 = "「A——nè——xin anh——phu——a—— cứ giữ nguyên——tốc độ——và lực độ——như lúc nãy, đi——」"
# 【双鉄】
# display as 雙鐵
# JP: 「もちろんだとも、ポーレット」
1260 = "「Tất nhiên rồi, Paulette.」"
# monologue
# JP: 一番強い膣内刺激を味わってから、そこより浅いレベルで\nゆるゆる動き続ける。それでは僕は射精できない――いや
1407 = "Sau khi đã nếm trải sự kích thích mạnh mẽ nhất bên trong âm đạo, giờ lại phải tiếp tục chuyển động chậm rãi ở mức độ nông hơn. Thế này thì tôi không thể xuất tinh được——Không."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。その、どうなのだ？\n妊娠初期に、膣内射精という行為は」
1247 = "「Paulette. Ưm, chuyện đó thì sao? Hành vi xuất tinh vào trong âm đạo vào thời kỳ đầu mang thai ấy.」"
# monologue
# JP: （ずっ！――ゆさっ！――ゆすっ！――しゅにゅっ！）
1782 = "（Cọ!——Đu đưa!——Lắc nhẹ!——Trượt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「わたし――ンッ――勉強――ちゃんと――は、ぁっ――\n妊娠、初期は――あっ――母体の、抵抗力――おち、て」
1184 = "「Em——ưm——đã học——rất kỹ——ha, a—— Thời kỳ đầu, mang thai——a——sức đề kháng, của cơ thể mẹ——sẽ giảm, sút」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。それなら万一の感染などを防ぐため、\n膣内射精――いや、生での挿入そのものも避けるべきか」
993 = "「Ra là vậy. Nếu thế thì để phòng ngừa lây nhiễm trong trường hợp xấu nhất, xuất tinh vào trong——không, có lẽ nên tránh cả việc cho vào trực tiếp nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「かも、です――んっ――はっ――あっ――わたっ――\nんっ！　わたしっ――すごく――さみしい――けどっ」
1183 = "「Có lẽ, là vậy ạ——ưm——ha——a——nhưng—— ưm! Em——sẽ thấy——rất——cô đơn——mất」"
# 【双鉄】
# display as 雙鐵
# JP: 「寂しがる必要などないさ」
972 = "「Không cần phải thấy cô đơn đâu.」"
# monologue
# JP: （ゆすっ！　さすっ！　ゆさっ！　くちゅっ！）
1760 = "（Lắc nhẹ! Miết nhẹ! Đu đưa! Nhóp nhép!）"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ！　あっ！　ぁっ――あ――ぁあっ！！\nそう、てつ、くっ――あっ！　わた、しっ――だんだん」
1041 = "「Ha! A! A——a——aa!!\nAnh, Soutetsu——a! Em——sắp」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1123 = "「嗯」" 
# monologue
# JP: 膣の収縮が早くなり、膣内温度も熱いくらいだ。\n引切りなしに貼付き甘える蠕動は、射精感を高めてもいる。
1603 = "Âm đạo co thắt nhanh hơn, nhiệt độ bên trong cũng nóng rực lên. Sự nhu động bám chặt lấy và nũng nịu không ngừng nghỉ cũng làm tăng thêm cảm giác muốn xuất tinh."
# 【双鉄】
# display as 雙鐵
# JP: 「膣内射精を愉しめぬなら。\n膣内射精以外のことを、思い切り愉しめばいいだけだ」
1155 = "「Nếu không thể tận hưởng việc xuất tinh vào trong. Thì chỉ cần tận hưởng hết mình những việc khác ngoài xuất tinh vào trong là được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ！」
1094 = "「A!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、な？　ポーレット」
1209 = "「Cho nên, em biết không? Paulette.」"
# monologue
# JP: （ゆさっ！　ゆすっ！　ゆじゅっ！　ゆしゅっ！）
1762 = "（Đu đưa! Lắc nhẹ! Đâm vào! Rút ra!）"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ！　ぁっ――ぁっ――ぁっ――わた、しっ――\nこれっ――ふぁ――もうっ、もうっ、もうっ、もうっ！」
1039 = "「Ha! A——a——a——em—— thế này——pha——ra mất, ra mất, ra mất, ra mất!」"
# 【双鉄】
# display as 雙鐵
# JP: 「達したいだけ、達すればいい――\n（はぷっ！　ちゅううううううううううううううっ！）」
1178 = "「Muốn lên đỉnh bao nhiêu, thì cứ lên đỉnh bấy nhiêu—— （Ngậm lấy! Mút mát mãnh liệt!）」"
# 【ポーレット】
# display as 波萊特
# JP: 「んきゅうっ！！　ん～～～～～～～～～～～っ！！」
1124 = "「Ưm kyu!! Ưm～～～～～～～～～～～!!」"
# monologue
# JP: （きゅううううううううううううっっっっっ！！！）
1708 = "（Co thắt dữ dội!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1064 = "「唔！！！」" 
# monologue
# JP: （ずりゅううっ！！！）
1757 = "（Siết chặt!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、口を――」
1251 = "「Paulette, há miệng ra——」"
# monologue
# JP: 開いてくれ、と言いかけて、\n抵抗力が落ちてと言われたと思い出し！！！
1493 = "Tôi định bảo cô ấy há miệng ra, nhưng chợt nhớ ra cô ấy vừa nói sức đề kháng sẽ giảm sút!!!"
# 【双鉄】
# display as 雙鐵
# JP: 「閉じてっ！　目も、目もつむってくれっ！！」
1174 = "「Nhắm lại! Cả mắt nữa, nhắm mắt lại đi!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「は、はひっ！！？」
1152 = "「V-Vâng!!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「んくっ！」
1126 = "「Ưm ku!」"
# monologue
# JP: （びゅっっ！　ぶびゅっ！　びゅるっ！　びゅううっ！）
1725 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んぷっ！？　あちゅっ！？」
1134 = "「Ưm pu!? A chu!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁっ――あっ――あっ――ああっ！」
1078 = "「A——a——a——aa!」"
# monologue
# JP: （びゅるっ！　ぶびゅるっ！　びゅうっ！　びゅうっ！）
1719 = "（Phụt! Phụt! Phụt! Phụt!）"
# monologue
# JP: 背徳的で、美しい。僕の子を宿す母体に、美麗な顔に、\n母乳をたっぷり貯めた乳房に、妊娠させた精液を――
1639 = "Thật ngang trái, và cũng thật xinh đẹp. Lên cơ thể người mẹ đang mang giọt máu của tôi, lên khuôn mặt diễm lệ, lên bầu ngực căng tràn sữa mẹ, tôi bắn tinh dịch đã khiến cô ấy mang thai——"
# monologue
# JP: （びゅるっ！　びゅっ！　びゅううっ！　びゅっ！！）
1718 = "（Phụt! Phụt! Phụt! Phụt!!）"
# monologue
# JP: 完全に無駄なものとして、ただただ汚すそのためだけに\nくまなく降り注がせている。
1497 = "Coi nó như một thứ hoàn toàn vô dụng, chỉ để làm vấy bẩn cô ấy, tôi đã bắn tinh dịch vung vãi khắp mọi nơi."
# 【ポーレット】
# display as 波萊特
# JP: 「……。……。……。……。」
695 = "「……。……。……。……。」"
# monologue
# JP: （びゅっ――びゅうっ――びゅうっ――ぴゅっ）
1710 = "（Phụt——phụt——phụt——phụt）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁあっ――」
1091 = "「Aa——」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ――んっ！？　（ぷくっ）――ひゃ！　やぁん」
1210 = "「A——ưm!? （Bong bóng）——Hya! Ghét quá」"
# monologue
# JP: 精液が鼻についたのか、一瞬小さな鼻提灯を膨らませ、\nすぐポーレットは隠し潰して
1404 = "Có lẽ do tinh dịch dính vào mũi, một bong bóng nhỏ xíu phồng lên trong tích tắc, rồi Paulette vội vàng bóp nát nó đi."
# 【ポーレット】
# display as 波萊特
# JP: 「ふふっ――ふふふっ！　うふふふふっ！！！」
1018 = "「Fufu——fufufu! Ufufufufu!!!」"
# monologue
# JP: しあわせそうに、笑ってくれる。\n精液でぐちゃぐちゃに乱れた顔で、しあわせそうに。
1441 = "Cô ấy mỉm cười, trông thật hạnh phúc. Với khuôn mặt tèm lem tinh dịch, cô ấy trông thật hạnh phúc."
# 【双鉄】
# display as 雙鐵
# JP: 「大好きだ。ポーレット。ありがとう」
1188 = "「Anh yêu em lắm. Paulette. Cảm ơn em.」"
# 【ポーレット】
# display as 波萊特
# JP: 「こちらこそです。双鉄くん。わたしを――\nおかあさんにしてくれて。本当にありがとうございます」
1195 = "「Em mới là người phải nói thế. Anh Soutetsu. Cảm ơn anh—— đã biến em thành mẹ. Thật sự cảm ơn anh rất nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、その言葉には九ヶ月――八ヶ月か？\nまだ随分と早かろう」
962 = "「Không, để nói câu đó thì phải đợi 9 tháng——hay 8 tháng nữa nhỉ? Bây giờ vẫn còn quá sớm mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですね」
1102 = "「A, đúng vậy nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、その紐を脱いですぐにシャワーを浴びてくれ。\n僕は産院の予約を――ああ、どの産院がいいのかな」
1207 = "「Vậy nên, em cởi sợi dây đó ra rồi đi tắm ngay đi. Anh sẽ đặt lịch ở bệnh viện phụ sản——a, bệnh viện nào thì tốt nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「高崎さんに電話してくれたらきっと。\n同じ御一夜で、おかあさんになったばっかりですし」
1280 = "「Anh cứ gọi điện cho chị Takasaki là chắc chắn sẽ biết. Chị ấy cũng ở Ohimitera và mới làm mẹ xong mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかった。\nならばポーレットは安心して、すぐにシャワーを」
1202 = "「Anh hiểu rồi. Vậy thì Paulette cứ yên tâm đi tắm ngay đi nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そんなに焦らせなくっても。だって、ね？\nもう夜ですよ？　双鉄くん」
953 = "「Anh không cần phải vội thế đâu. Bởi vì, anh biết mà? Đã tối rồi đấy? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1223 = "「À——」"
# monologue
# JP: 妊娠検査で夜間外来もおかしかろう。\nならば、明日か。おもえばドっと、力が抜ける。
1531 = "Khám thai mà lại đi khám ngoài giờ vào ban đêm thì cũng kỳ lạ. Vậy thì để ngày mai thôi. Nghĩ vậy, tôi bỗng thấy cả người nhẹ bẫng."
# 【ポーレット】
# display as 波萊特
# JP: 「もちろんシャワーは浴びますけど――\nそのまえに、あのね？　双鉄くん？」
1253 = "「Tất nhiên là em sẽ đi tắm rồi—— nhưng trước đó, nè? Anh Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1142 = "「Hửm?」"
# 【ポーレット】
# display as 波萊特
# JP: 「この紐――デコレーション……どうしましょうか？\nもう着ないなら」
1287 = "「Sợi dây——đồ decoration này……tính sao đây ạ? Nếu em không mặc nữa thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、綺麗にして大事に保存しておいてほしい。\nどんな理由で購入したのかも気になるし」
964 = "「Không, anh muốn em giặt sạch rồi cất giữ cẩn thận. Anh cũng tò mò không biết em mua nó vì lý do gì nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あうっ」
1089 = "「Au」"
# monologue
# JP: 焦った様子に嬉しくなる。\nなるほど次は、そこのところを突きながらも悪くない。
1427 = "Dáng vẻ luống cuống của cô ấy làm tôi thấy vui vẻ. Ra là vậy, lần tới vừa làm vừa chọc vào điểm yếu đó cũng không tồi."
# 【双鉄】
# display as 雙鐵
# JP: 「それにどのみち、また着てもらう。\n今度は、そうだな――無事出産の、お祝いあたりに」
1264 = "「Dù sao thì em cũng sẽ phải mặc lại nó thôi. Lần tới, xem nào——chắc là vào dịp ăn mừng em mẹ tròn con vuông.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――うふふっ」
1075 = "「A——ufufu」"
# monologue
# JP: 微笑んで。ポーレットの指がそうっと下腹を撫でさする。\n母の、ではなく、はっきりとした女の仕草で。
1556 = "Mỉm cười. Ngón tay Paulette khẽ vuốt ve phần bụng dưới. Đó không phải là cử chỉ của một người mẹ, mà là của một người phụ nữ thực thụ."
# 【ポーレット】
# display as 波萊特
# JP: 「はぁい。わかりましたぁ」
1153 = "「Vâng ạ. Em hiểu rồi.」"
