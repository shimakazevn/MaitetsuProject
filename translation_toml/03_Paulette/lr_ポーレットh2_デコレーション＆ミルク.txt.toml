1418 = "Có lẽ cô ấy thậm chí còn chẳng suy nghĩ\nxem ý tôi là gì.\nChỉ gật đầu vì muốn, rất muốn, cực kỳ muốn\ntôi tiếp tục chuyển động thôi."

# 【双鉄】
# display as 雙鐵
