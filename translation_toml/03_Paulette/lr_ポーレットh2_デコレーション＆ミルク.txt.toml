# lines: 345 
# 【ポーレット】
# display as 波萊特
# JP: 「あの、いま双鉄くん、どんな格好してますか？」
1293 = "「那個，現在你穿的是什麼？」" 

# monologue
# JP: 襖の向こうからポーレットの声。妻の声。\n聞き慣れている声ゆえに、わずかな違和感を覚えてしまう。
1645 = "隔扇門那頭傳來妻子波萊特的聲音。對她的聲音再熟悉不過的我，感覺到有些不對勁。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　下着一枚だ。\n風呂上がりでな。これから寝間着に着替えようかと」
1144 = "「嗯？就穿了條內褲。畢竟剛洗完澡。過會我就要換上睡衣了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえ、着替えないでください。っていうか、\nそのままお布団に横になってもらえますか？」
1100 = "「啊，不，別換睡衣。我的意思是，你可不可以就這樣直接躺上床？」" 

# monologue
# JP: ……緊張、緊迫……なにごとだろうか？\nともかく今は、素直に指示に従おう。
686 = "……心情好緊張，好急切……到底是什麼事呢？總之先老實聽從指揮吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしろというならそうしよう」
1215 = "「既然你這麼說的話」" 

# 【ポーレット】
# display as 波萊特
# JP: 「横になったら、お目々をぎゅ～ってつむってください。\nつむったら、わたしがOKっていうまで、目を開けないで」
1282 = "「躺上床之後，請把眼睛閉緊哦。然後一直等到我說可以你才可以睜眼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1216 = "「明白了」" 

# monologue
# JP: 指示のとおりにすればすぐ、襖を開いて閉じる音。\nついであたたかな重量感。
1580 = "當我按照指示去做之後，耳邊很快傳來了隔扇門拉開又關上的聲響。接著我就感到有什麼溫暖的東西壓在了身上。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん、しょっ」
1129 = "「嗯咻」" 

# monologue
# JP: ……ポーレットが僕に密着してくる。\nと、いうか――この感触は……
688 = "……波萊特緊緊貼住了我。話說——這種觸感是……" 

# 【双鉄】
# display as 雙鐵
# JP: 「裸？　いや――っ！！！？」
1236 = "「沒穿衣服？不——哎！！！？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「や！？　いいっていうまで目を開けないでって」
1272 = "「討厭！？我都說了在我說好之前不能睜眼啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはすまん。肌触りがその、裸のようで下着のようで、\n気になってしまって思わず……」
1295 = "「那還真是對不起。因為光憑皮膚的觸感很難判斷你到底有沒有穿內衣，就不由自主地想要一看究竟……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はぅぅ」
1036 = "「哈嗚嗚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「目を開けてしまったのだが――見てもわからん。\n“それ”は――下着……の用を為しては、いないよな？」
1205 = "「我雖然睜開了眼——但還是沒看明白。“這套裝扮”——應該不能算內衣吧？」" 

# monologue
# JP: ポーレットの肌を包んで――いや、肌に沿っているのは、\n下着未満の、下着に近似した何者かだ。
1561 = "波萊特穿在身上的——不，應該說是掛在身上的，是看似內衣但又不是內衣的某種服飾。" 

# 【双鉄】
# display as 雙鐵
# JP: 「下着であれば当然に隠す部分が、まるっきり――」
986 = "「內衣一定會遮住的部分全都展露無遺——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あはは、ですよね。おっぱいも――その……\n下も、ええっと――まるだし、ですし」
1087 = "「啊哈哈，說的也是呢。不僅胸部——那個……下面也，呃——露光光了呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「下も？」
947 = "「下面也？」" 

# 【ポーレット】
# display as 波萊特
