# lr_ポーレットh2_デコレーション＆ミルク.txt 
[info]
0 = ""

[characters]
1360 = "ポーレット"
1398 = "双鉄"

[character_subs]
1553 = "波萊特"
1648 = "雙鐵"
1649 = "雙鐵＆波萊特"

[script]
# lines: 345 
# 【ポーレット】
# display as 波萊特
# JP: 「あの、いま双鉄くん、どんな格好してますか？」
1293 = "「Ưm, hiện giờ anh Soutetsu đang mặc đồ gì\nvậy?」"

# monologue
# JP: 襖の向こうからポーレットの声。妻の声。\n聞き慣れている声ゆえに、わずかな違和感を覚えてしまう。
1645 = "Tiếng Paulette vọng ra từ sau cánh cửa\nkéo. Tiếng của vợ tôi.\nBởi vì đã quá quen thuộc, tôi chợt cảm\nthấy có chút gì đó là lạ."

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　下着一枚だ。\n風呂上がりでな。これから寝間着に着替えようかと」
1144 = "「Hửm? Chỉ mặc mỗi đồ lót thôi.\nAnh mới tắm xong mà. Định lát nữa sẽ thay\nđồ ngủ đây.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえ、着替えないでください。っていうか、\nそのままお布団に横になってもらえますか？」
1100 = "「A, không, anh đừng thay đồ vội. Hay đúng\nhơn là,\nanh cứ thế nằm lên nệm được không?」"

# monologue
# JP: ……緊張、緊迫……なにごとだろうか？\nともかく今は、素直に指示に従おう。
686 = "……Căng thẳng, hồi hộp……chuyện gì thế này?\nDù sao thì bây giờ cứ ngoan ngoãn làm theo\nlời cô ấy vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「そうしろというならそうしよう」
1215 = "「Nếu em đã nói vậy thì anh sẽ làm theo.」"

# 【ポーレット】
# display as 波萊特
# JP: 「横になったら、お目々をぎゅ～ってつむってください。\nつむったら、わたしがOKっていうまで、目を開けないで」
1282 = "「Nằm xuống rồi thì anh nhắm chặt mắt lại\nnhé.\nNhắm rồi thì không được mở ra cho đến khi\nem bảo OK đâu đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった」
1216 = "「Anh hiểu rồi.」"

# monologue
# JP: 指示のとおりにすればすぐ、襖を開いて閉じる音。\nついであたたかな重量感。
1580 = "Làm theo lời cô ấy, ngay sau đó tôi nghe\nthấy tiếng cửa kéo mở ra rồi đóng lại.\nTiếp đến là một sức nặng ấm áp."

# 【ポーレット】
# display as 波萊特
# JP: 「ん、しょっ」
1129 = "「Ây da」"

# monologue
# JP: ……ポーレットが僕に密着してくる。\nと、いうか――この感触は……
688 = "……Paulette đang áp sát vào người tôi.\nHay đúng hơn là——cảm giác này……"

# 【双鉄】
# display as 雙鐵
# JP: 「裸？　いや――っ！！！？」
1236 = "「Trần truồng sao? Không phải——!!!?」"

# 【ポーレット】
# display as 波萊特
# JP: 「や！？　いいっていうまで目を開けないでって」
1272 = "「Á!? Em đã bảo là không được mở mắt cho\nđến khi em nói OK mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはすまん。肌触りがその、裸のようで下着のようで、\n気になってしまって思わず……」
1295 = "「Xin lỗi em. Cảm giác lúc chạm vào, giống\nnhư đang khỏa thân mà cũng giống như mặc\nđồ lót,\nlàm anh tò mò quá nên bất giác……」"

# 【ポーレット】
# display as 波萊特
# JP: 「はぅぅ」
1036 = "「Hauu」"

# 【双鉄】
# display as 雙鐵
# JP: 「目を開けてしまったのだが――見てもわからん。\n“それ”は――下着……の用を為しては、いないよな？」
1205 = "「Dù đã mở mắt ra rồi——nhưng anh nhìn cũng\nchẳng hiểu.\n\"Thứ đó\"——không thể gọi là……đồ lót được\nđúng không?」"

# monologue
# JP: ポーレットの肌を包んで――いや、肌に沿っているのは、\n下着未満の、下着に近似した何者かだ。
1561 = "Bao bọc lấy làn da của Paulette——không,\nthứ bám sát vào da cô ấy,\nlà một thứ gì đó còn thiếu vải hơn cả đồ\nlót, nhưng lại có hình dáng tương tự đồ\nlót."

# 【双鉄】
# display as 雙鐵
# JP: 「下着であれば当然に隠す部分が、まるっきり――」
986 = "「Nếu là đồ lót thì những chỗ cần che giấu\nphải được che đậy hoàn toàn chứ——」"

# 【ポーレット】
# display as 波萊特
# JP: 「あはは、ですよね。おっぱいも――その……\n下も、ええっと――まるだし、ですし」
1087 = "「Ahaha, đúng vậy nhỉ. Cả ngực——và……\nbên dưới, ừm——cũng phơi bày ra hết mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「下も？」
947 = "「Cả bên dưới sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「って！　だから見ちゃやぁですってばぁ」
1111 = "「Này! Đã bảo là không được nhìn mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ううむ」
1130 = "「Ưm」"

# monologue
# JP: 止められたならより見たくなる。が――\nいまは焦らず、許された範囲で楽しもう。
1435 = "Bị cấm cản lại càng muốn nhìn hơn. Nhưng——\nbây giờ đừng vội, cứ tận hưởng trong phạm\nvi được cho phép đã."

# 【双鉄】
# display as 雙鐵
# JP: 「下着でないとすると……だ。\nポーレットがいま身につけているものは、いったい？」
1156 = "「Nếu không phải đồ lót thì……\nThứ Paulette đang mặc trên người rốt cuộc\nlà gì?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ん……っと――飾り、ですかね？\n装飾、ディスプレイ、デコレーション」
1120 = "「Ưm……là đồ trang trí, chăng?\nĐồ trang trí, phụ kiện trưng bày,\ndecoration.」"

# 【双鉄】
# display as 雙鐵
# JP: 「デコレーション」
1323 = "「Decoration」"

# monologue
# JP: 言われた瞬間、ケーキの姿が頭に浮かび\nすぐさま深い理解にかわる。
1382 = "Ngay khoảnh khắc nghe thấy từ đó, hình ảnh\nchiếc bánh kem hiện lên trong đầu tôi,\nvà tôi lập tức hiểu ra ý nghĩa sâu xa của\nnó."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、おっぱいをより魅力的に際立てるためだけの、\nデコレーションか」
994 = "「Ra là vậy, chỉ là vật trang trí,\nnhằm làm nổi bật sự quyến rũ của bộ ngực\nthôi sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「むぅ。おっぱいだけしか見てないし～」
1058 = "「Hứ. Anh chỉ toàn nhìn ngực thôi～」"

# 【双鉄】
# display as 雙鐵
# JP: 「いやっ、あ――うむ、そんなことは……\nあったような気もするが、だな」
960 = "「Không, a——ưm, chuyện đó……\ncũng có vẻ đúng, nhỉ.」"

# monologue
# JP: 図星を全力で突かれてしまい、慌てて胸から視線を剥がす。
1614 = "Bị nói trúng tim đen, tôi vội vã dời ánh\nmắt khỏi ngực cô ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、犬耳もついているのか。かわいらしいな。\n腕やももなども、しっかり覆われているのだな」
1057 = "「À, có cả tai chó nữa này. Đáng yêu thật\nđấy.\nCánh tay và đùi cũng được che chắn cẩn\nthận nhỉ.」"

# monologue
# JP: 故に、際立つ。性的部位だけを露出させているその意図が。\n“雌”という語が喉まで来るが、無論、腹へと押し戻す。
1535 = "Do đó, nó càng trở nên nổi bật. Ý đồ phơi\nbày những bộ phận nhạy cảm.\nTừ \"con cái\" đã trực trào nơi cuống họng,\nnhưng tất nhiên, tôi đã nuốt nó xuống."

# 【ポーレット】
# display as 波萊特
# JP: 「いまのわたしはわんちゃんですから。\n芸とか、上手にできちゃいますよ？　多分」
1259 = "「Bởi vì bây giờ em là cún con mà.\nEm có thể làm trò rất giỏi đó nha? Chắc\nvậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？　芸とは……例えば、お手のような」
1145 = "「Hửm? Trò à……Ví dụ như, đưa tay ra sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わん！」
1235 = "「Gâu!」"

# monologue
# JP: 手を差し出せば、かわいくポフっと乗ってくる。\nこれは楽しい。
1491 = "Khi tôi chìa tay ra, cô ấy liền ngoan\nngoãn đặt tay lên.\nThú vị thật đấy."

# 【双鉄】
# display as 雙鐵
# JP: 「おかわり」
1213 = "「Tay kia.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わんっ！」
# 1235 = "「汪！」" 

# monologue
# JP: （ぽふっ）
1735 = "（Bịch）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！？」
1044 = "「!!!?」"

# monologue
# JP: ポーレットの手が僕の勃起をかるぅく叩いて、\nピンクの舌がちろりとのぞき――
1559 = "Bàn tay của Paulette khẽ vỗ nhẹ lên dương\nvật đang cương cứng của tôi,\nchiếc lưỡi hồng hào khẽ thò ra——"

# 【ポーレット】
# display as 波萊特
# JP: 「くぅん」
1029 = "「Kuuun」"

# monologue
# JP: 『間違えちゃった』といわんばかりに手へと乗る。\n……なるほど。なるほど。僕はあまりに鈍かったのか。
1525 = "「Paulette」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
1248 = "「Ư!」"

# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
1062 = "「Ư!」"

# monologue
# JP: ゆえに、囁く。\n青い瞳をまっすぐみつめ、出来うる限りに低く、甘く。
1410 = "Do đó, tôi thì thầm.\nNhìn thẳng vào đôi mắt xanh biếc ấy, bằng\ngiọng điệu trầm ấm, ngọt ngào nhất có thể."

# 【双鉄】
# display as 雙鐵
# JP: 「ちんちん」
1267 = "「Dương vật.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ――『わん』」
1059 = "「Ufufu——『Gâu』」"

# monologue
# JP: 言葉より先にその手が動き出してる。\n僕の下着を一気にすりさげ――
1438 = "Đôi tay cô ấy hành động còn nhanh hơn cả\nlời nói.\nKéo tuột chiếc quần lót của tôi xuống——"

# monologue
# JP: （ぷりゅんんっっ！！！）
1730 = "（Phụt!!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「お！」
1055 = "「Ồ!」"

# monologue
# JP: 思わず声が出てしまう。\n僕を挟みこむ乳圧が、常あるよりも強く思えて――ああ。
1489 = "Bất giác tôi thốt lên thành tiếng.\nÁp lực từ đôi gò bồng đảo kẹp lấy tôi\ndường như mạnh hơn bình thường——A."

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、これもデコレーションの効果なのか」
995 = "「Ra là vậy, đây cũng là tác dụng của\nDecoration sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「かもですねー。\n結構脇から、ぐいぐい寄せてきてる感じですから」
1006 = "「Có lẽ vậy ạ.\nCảm giác như bị ép chặt từ hai bên nách\nvào ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1062 = "「唔！」" 

# monologue
# JP: 僕に、ではなく僕の勃起に返事している。\n声が亀頭の表面をくすぐるようと、息を使って。
1554 = "Cô ấy không trả lời tôi, mà là trả lời\ndương vật của tôi.\nGiọng nói và hơi thở của cô ấy như đang\ntrêu đùa trên bề mặt quy đầu."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんも」
1298 = "「Anh Soutetsu cũng vậy.」"

# monologue
# JP: 瞳が笑う。口がクチュクチュ動きぽっかり開かれる。\n舌が伸ばされ下へ向けられ――
1449 = "Đôi mắt cô ấy cười. Miệng chóp chép rồi hé\nmở.\nChiếc lưỡi vươn ra, hướng xuống dưới——"

# 【ポーレット】
# display as 波萊特
# JP: 「――――――――」
693 = "「――――――――」"

# monologue
# JP: ――舌をレールに、唾液が移送されていく。\n僕の亀頭の上へ次々、透明の層を重ねくずれる。
678 = "——Lấy lưỡi làm đường ray, nước bọt dần\nđược truyền đi.\nLớp màng trong suốt liên tục bao phủ lên\nquy đầu của tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「感じちゃいますか？　いっつもより」
1181 = "「Anh có cảm thấy kích thích không? Hơn mọi\nkhi ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「さぁ、どうだろうな」
1288 = "「Chà, khó nói lắm.」"

# monologue
# JP: 感じている。感じずにいるわけがない。\nゆえに、とぼける。より強く、深く色濃く感じるために。
1510 = "Có chứ. Sao lại không có cảm giác được.\nThế nên tôi mới giả vờ. Để cảm nhận sự\nkích thích mạnh mẽ, sâu sắc và mãnh liệt\nhơn nữa."

# 【ポーレット】
# display as 波萊特
# JP: 「わからないんですか？\nそれなら――――体に直接聞いちゃいますね？」
955 = "「Anh không biết sao?\nNếu vậy――――để em trực tiếp hỏi cơ thể anh\nnhé?」"

# monologue
# JP: ポーレットが大きく口を開いて――
1555 = "Paulette há to miệng——"

# 【ポーレット】
# display as 波萊特
# JP: 「（ぺろっ）」
1320 = "（Liếm nhẹ）"

# 【双鉄】
# display as 雙鐵
# JP: 「おうふっ！」
1053 = "「Oufu!」"

# monologue
# JP: 当然期した包み込まれる感触が、\nけれども小さな、点の刺激にすり替えられる。
1509 = "Cảm giác được bao bọc như mong đợi,\nlại bị thay thế bằng một kích thích nhỏ\nxíu, như một điểm chạm."

# 【ポーレット】
# display as 波萊特
# JP: 「ペロッ――れるっ――ちゅっ、ちゅむっ、ちゅうっ――\nペロッ――ぺちゅっ――ちゅるっ――ちゅっ――れるっ」
1020 = "「Pê ro——rê ru——chụt, chu mu, chụt——\nPê ro——pê chu——chu ru——chụt——rê ru」"

# monologue
# JP: 点の刺激が、すぐ面になる。ポーレットは熱い舌先で、\n僕の亀頭の全部に唾液を塗り伸ばしていく。
1383 = "Kích thích từ một điểm, nhanh chóng lan\nrộng ra. Paulette dùng chiếc lưỡi nóng\nbỏng,\nthoa đều nước bọt lên toàn bộ quy đầu của\ntôi."

# 【ポーレット】
# display as 波萊特
# JP: 「（ふ～～～っ）、ちゅっ！　ちゅむっ――ちゅっ――\nぺろっ――れるっ――ぺろっ――れろおっ――ぺちゅっ」
1315 = "「（Phù～～～）, chụt! Chu mu——chụt——\nliếm nhẹ——rê ru——liếm nhẹ——rê ro——pê chu」"

# monologue
# JP: 息を吹きかけ、キスして、舐めて――そうする間にも\n勃起の根本は、甘やかな圧迫感に包み込まれる。
1421 = "Cô ấy thổi hơi, hôn, rồi liếm——trong lúc\nđó,\nphần gốc dương vật vẫn bị bao bọc trong áp\nlực ngọt ngào."

# 【ポーレット】
# display as 波萊特
# JP: 「ちゅむっ――ぺろっ――ちゅうっ――チュッ――\nれろっ――ぺろっ――れるううううっ――ちゅ、ちゅむ」
1105 = "「Chu mu——liếm nhẹ——chụt——chụt——\nrê ro——liếm nhẹ——rê ru uu——chu, chu mu」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット――ポーレット」
1246 = "「Paulette——Paulette.」"

# monologue
# JP: 初手から快感がたかまりすぎる。\nこのままいけば亀頭舐めだけでイカされてしまう。
1376 = "Ngay từ đầu khoái cảm đã dâng lên quá mức.\nCứ thế này thì chỉ cần liếm quy đầu thôi\ntôi cũng bắn mất."

# 【ポーレット】
# display as 波萊特
# JP: 「（ちゅっ！）――うふふっ、なんですか？　双鉄くん」
1321 = "「（Chụt!）——Ufufu, sao thế? Anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットのおっぱいなのだが――」
1297 = "「Ngực của Paulette ấy——」"

# monologue
# JP: やむなく会話で時間を稼ぐ。快感を一度落ち着かせ、\nちゃんと咥えてもらえるようにも誘導したい。
1495 = "Tôi đành phải dùng cách trò chuyện để câu\ngiờ. Muốn làm dịu đi khoái cảm,\nđồng thời cũng muốn dụ cô ấy ngậm lấy nó."

# 【双鉄】
# display as 雙鐵
# JP: 「毎日毎日揉んでいるゆえ気づかなかったが――\nおっぱい自体が、以前より大きくなっていないか？」
1150 = "「Vì ngày nào cũng nắn bóp nên anh không để\ný——\nNhưng hình như ngực em to hơn trước thì\nphải?」"

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　あ――どうかな？　どうでしょ。\nそんな気、自分でもちょっとはしてたんですけど」
1050 = "「Ế!? A——sao nhỉ? Sao ta.\nChính em cũng có cảm giác như vậy một\nchút.」"

# monologue
# JP: （むにっ）
1758 = "（Nắn bóp）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
1064 = "「!!!」"

# monologue
# JP: ポーレットが肘でおっぱいを寄せれば、\n極上の肉と肌とのなめらかな圧力が更に強まる。
1557 = "Khi Paulette dùng cùi chỏ ép ngực lại,\náp lực mềm mại từ lớp thịt và làn da tuyệt\nhảo càng trở nên mạnh mẽ hơn."

# 【ポーレット】
# display as 波萊特
# JP: 「ん……あ！　そうだ！\nおっぱいを思い切りぎゅ～って寄せてみて」
1118 = "「Ưm……a! Đúng rồi!\nĐể em thử ép chặt ngực lại xem sao nhé.」"

# monologue
# JP: （ぎゅむっ！！）
1769 = "（Ép chặt!!）"

# 【双鉄】
# display as 雙鐵
# JP: 「ぅぁっ」
1061 = "「Ưa」"

# 【ポーレット】
# display as 波萊特
# JP: 「はみ出しているおちんちんの長さ――\nどうです？　前より短くなってたりとかします？」
1301 = "「Chiều dài của phần dương vật thò ra——\nThế nào ạ? Có ngắn hơn trước không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは……わからん――\nというか、だ――」
1286 = "「Chuyện đó thì……anh không biết——\nHay đúng hơn là——」"

# monologue
# JP: （むにっ――すりっ――みゅにゅっ――くしゅっ――）
1755 = "（Nắn bóp——cọ cọ——nắn nắn——cọ xát——）"

# monologue
# JP: ポーレットが実にゆるゆる動かしてくる乳圧に、\n集中力と判断力とを、ぐすぐずに融かされ壊されている。
1560 = "Áp lực từ bộ ngực mà Paulette đang chầm\nchậm di chuyển,\nđã hoàn toàn làm tan chảy và phá vỡ sự tập\ntrung cùng khả năng phán đoán của tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「僕はいま、現在進行系で知能指数を下げられている。\nたったひとつのことの他、今はなんにも考えられん」
1200 = "「Hiện tại, chỉ số thông minh của anh đang\nbị giảm sút theo thời gian thực.\nNgoài một chuyện duy nhất ra, bây giờ anh\nchẳng thể suy nghĩ được gì nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ん～～～～――――ぁ――――――（ぺちょっっ）」
1115 = "「Ưm～～～～――――a――――――（Liếm láp）」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1063 = "「Ư!!」"

# monologue
# JP: また亀頭へと、熱い唾液が垂らされる。
1569 = "Nước bọt nóng hổi lại nhỏ giọt xuống quy\nđầu."

# 【ポーレット】
# display as 波萊特
# JP: 「なんですか？　その、『たったひとつのこと』って」
980 = "「Là chuyện gì vậy? 『Một chuyện duy nhất』\nđó ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「射精したい。ポーレットのおっぱいとお口に思い切り\n愛してもらって、思いっきりに射精したい」
1191 = "「Anh muốn xuất tinh. Muốn được ngực và\nmiệng của Paulette\nyêu thương hết mình, và xuất tinh thật\nthỏa thích.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、わかりましたぁ――はむっ」
1060 = "「Ufufu, em hiểu rồi——ngậm lấy」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1065 = "「Ư!!!!」"

# monologue
# JP: ようやく、ようやく咥えてもらえた！\n満足感と達成感と安心感――っ！！！？
1597 = "Cuối cùng, cuối cùng cũng được em ấy ngậm\nlấy rồi!\nCảm giác thỏa mãn, thành tựu và an\ntâm——!!!?"

# 【ポーレット】
# display as 波萊特
# JP: 「ぐちゅっ！　ちゅぶっ！　ずちゅっ！　じゅぼっ！\nぐりゅっ――リュッ――じゅぶ！　じゅるるる～～っ！」
1028 = "「Gu chu! Chu bu! Zu chu! Ju bo!\nGu ryu——ryu——ju bu! Ju ru ru ru～～!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぉあっ！」
1054 = "「Oa!」"

# monologue
# JP: 満たされたという暖かな思いが、その何倍の何十倍の、\n暴力的な快感に、塗りつぶされて押し流される！
1568 = "Cảm giác ấm áp khi được thỏa mãn đã bị\ncuốn trôi và vùi lấp,\nbởi một khoái cảm bạo liệt gấp nhiều, gấp\nhàng chục lần!"

# 【ポーレット】
# display as 波萊特
# JP: 「じゅぶうっ！　じゅ！　れろっ――れるっ――じゅっ！\nじゅぼ！　じゅびゅ！　ごちゅっ！　じゅぶうっ！！」
1107 = "「Ju buu! Ju! Rê ro——rê ru——ju!\nJu bo! Ju byu! Go chu! Ju buu!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「あっ――あっ――あっ――」
1076 = "「A——a——a——」"

# monologue
# JP: 亀頭を唇でピストンされて、喉奥にまで当ててもらえる。\nそうする間も舌は休まず、カリを、鈴口を舐めてくれる。
1432 = "Đôi môi cô ấy liên tục chuyển động trên\nquy đầu, đẩy sâu vào tận cuống họng.\nTrong lúc đó, chiếc lưỡi vẫn không ngừng\nnghỉ, liếm láp quanh rãnh quy đầu và lỗ\nsáo."

# monologue
# JP: （もにゅっ！　くちゅっ！　じゅちゅっ！　しにゅん！）
1734 = "（Rút ra! Đâm vào! Rút ra! Đâm vào!）"

# monologue
# JP: お口の傍らおっぱいは、竿の全部と睾丸までをも、\n唾液と汗でぬらつきながらみっちり包んで刺激して――
1453 = "Cùng với chiếc miệng nhỏ, đôi gò bồng đảo\nbao bọc lấy toàn bộ thân dương vật và cả\ntinh hoàn,\ndưới sự trơn trượt của nước bọt và mồ hôi,\nchúng không ngừng kích thích——"

# 【ポーレット】
# display as 波萊特
# JP: 「じゅっ！　ぢゅぼっ！　ぢゅぶっ！　ぼちゅっ！！\nぢゅびゅっ！　ぢゅばっ！　ぢゅぅう！　ぢゅぶっ！！」
1108 = "「Ju! Ju bo! Ju bu! Bo chu!!\nJu byu! Ju ba! Juu u! Ju bu!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁっ！」
1092 = "「A a!」"

# monologue
# JP: おっぱいのまろやかな刺激を裏返したような、\n亀頭だけへの強烈で動物的で一直線な射精誘導。
1641 = "Trái ngược với sự kích thích êm ái từ bộ\nngực,\nlà sự dẫn dắt xuất tinh mãnh liệt, mang\ntính bản năng và trực diện chỉ nhắm vào\nquy đầu."

# monologue
# JP: （もにっ！　むにゅっ！　ふにゅっ！　すりゅんっ！）
1756 = "（Bóp! Nắn! Ép! Trượt!）"

# 【ポーレット】
# display as 波萊特
# JP: 「ぼぢゅっ！　ぢゅちゅ！　ぢゅぼっ！　ぢゅばっ！\nずりゅっ！　ぢゅむっ！　ちゅううっ！　れりゅっ！」
1148 = "「Bo ju! Ju chu! Ju bo! Ju ba!\nZu ryu! Ju mu! Chuu u! Rê ryu!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ぁ――ァ――っ――」
1077 = "「A——a——a——ư——」"

# monologue
# JP: 両者が強烈に混じり合い、お互いがお互いを引き立て合う。\nもっと長くを楽しみたいが、射精衝動が強すぎて――
1391 = "Cả hai kích thích hòa quyện mãnh liệt, bổ\ntrợ cho nhau.\nTôi muốn tận hưởng lâu hơn nữa, nhưng xung\nđộng xuất tinh lại quá dữ dội——"

# 【双鉄】
# display as 雙鐵
# JP: 「ポー、レット――僕は、ぼくは、もうっ」
1239 = "「Pau, lette——anh, anh, ra mất」"

# monologue
# JP: （ぴたっ）
1703 = "（Khựng lại）"

# monologue
# JP: 瞬間、ポーレットが動きを止めっ――っ！！！？
1558 = "Trong khoảnh khắc, Paulette dừng mọi\nchuyển động——!!!?"

# 【ポーレット】
# display as 波萊特
# JP: 「れるううううううううううううううううううっ！！！」
1255 = "「Rê ru uu uu uu uu uu uu uu uu uu uu uu uu\nuu uu uu!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「！！！！」
# 1065 = "「唔！！！！」" 

# monologue
# JP: 裏筋が！！！！\nこの土壇場で下から上へとっ！！！
1431 = "Rãnh quy đầu!!!!\nNgay giờ phút chót này lại bị liếm ngược\ntừ dưới lên trên!!!"

# 【双鉄】
# display as 雙鐵
# JP: 「くはっ」
1017 = "「Ư ha」"

# 【ポーレット】
# display as 波萊特
# JP: 「はぷっ――ずっちゅううううううううっっっっっっ！」
1037 = "「Ha pu——zu chuu uu uu uu uu uu uu!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁあっっ！！」
1093 = "「A a!!」"

# monologue
# JP: （びゅくっ！　どびゅっ！　びゅぶるっ！　ぶびゅっ！）
1713 = "（Phụt! Phụt! Phụt! Phụt!）"

# 【ポーレット】
# display as 波萊特
# JP: 「んくっ――ごくっ――ゴクッ――んぷっ」
1128 = "「Ưm ku——ực——ực——ưm pu」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ――あ――ポーレット――ポーレット」
1082 = "「A——a——Paulette——Paulette」"

# monologue
# JP: 舐めたそのまま亀頭を咥えて思いっきりに吸い付いて、\n導き出した精液を、そのままごくごく嚥下してくれる。
1562 = "Liếm xong, cô ấy ngậm lấy quy đầu và hút\nthật mạnh,\nnuốt ừng ực dòng tinh dịch vừa được dẫn\ndắt trào ra."

# monologue
# JP: （びゅぶっ！　びゅっ！　びゅるるっ！　どびゅっ！）
1715 = "（Phụt! Phụt! Phụt! Phụt!）"

# 【ポーレット】
# display as 波萊特
# JP: 「んっ――んぷっ――ぷっ――くっ――んっ」
1116 = "「Ưm——ưm pu——pu——ku——ưm」"

# monologue
# JP: この美しい生物が僕だけのため、これほどに下卑た行為を、\n幸せそうにしてくれる。事実が射精をさらに促し――
1443 = "Sinh vật xinh đẹp này chỉ vì tôi mà thực\nhiện hành vi dâm đãng đến nhường này,\nlại còn trông vô cùng hạnh phúc. Sự thật\nđó càng thôi thúc tôi xuất tinh mạnh hơn——"

# monologue
# JP: （びゅ！　びゅうっ！　びゅうっ！　びゅぶっ！）
1723 = "（Phụt! Phụt! Phụt! Phụt!）"

# 【ポーレット】
# display as 波萊特
# JP: 「んぷっ！？　ぷっ――くっ―\n―こほっ――うぇっ――ごくっ――んむっ」
1133 = "「Ưm pu!? Pu——ku——\nkho hộc——uệ——ực——ưm mu」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、もういい無理するな」
1250 = "「Paulette, được rồi, đừng cố quá.」"

# 【ポーレット】
# display as 波萊特
# JP: 「いえっ！　あうっ！！？」
1197 = "「Không sao! A u!!?」"

# monologue
# JP: （びゅっ！　びゅうっ！　びゅピュッ――ぴゅっ）
1722 = "（Phụt! Phụt! Phụt——phụt）"

# 【ポーレット】
# display as 波萊特
# JP: 「きゃぁん」
1007 = "「Kyaaan」"

# monologue
# JP: 飲みきれなかった白濁液が、白皙の美貌に降りかかる。\n顎をしたたり豊かな胸へ――淫靡に、美麗に、点点と。
1422 = "Dòng tinh dịch trắng đục không kịp nuốt\nhết văng lên gương mặt xinh đẹp, trắng\nngần của cô ấy.\nChảy dọc xuống cằm, rỏ xuống bộ ngực căng\ntròn——từng giọt, từng giọt dâm đãng và\ndiễm lệ."

# monologue
# JP: （ぴゅっ――ぷっ――ぴっ――…………）
1712 = "（Phụt——phụt——phụt——…………）"

# 【ポーレット】
# display as 波萊特
# JP: 「あ――ぱくっ――ズッ――ずううっ――ごくっ。\nぷはっ――あ～ん、全部のみたかったのにぃ」
1085 = "「A——pa ku——zu——zuu u——ực.\nPu ha——a~n, em muốn nuốt hết cơ mà.」"

# monologue
# JP: 言いながら、顔に飛び散った精液を指でぬぐって――
1439 = "Vừa nói, cô ấy vừa dùng ngón tay quệt lớp\ntinh dịch văng trên mặt——"

# 【ポーレット】
# display as 波萊特
# JP: 「ぺろっ」
1021 = "「Pê ro」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！　ポーレット」
1067 = "「Ư!!!! Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？」
1016 = "「Kya!?」"

# monologue
# JP: パンツを脱ぎ捨てポーレットの足を抱え込む。\nおあずけされてた下半身を――
1504 = "Tôi cởi phăng chiếc quần lót và ôm chầm\nlấy đôi chân của Paulette.\nHướng về nửa thân dưới đã bị bỏ mặc nãy\ngiờ——"

# monologue
# JP: （かぱぁ）
1709 = "（Tách ra）"

# 【ポーレット】
# display as 波萊特
# JP: 「や、双鉄くん――はずかしい、です。\nこんな、無理やり」
1273 = "「Đừng, anh Soutetsu——xấu hổ lắm.\nSao anh lại cưỡng ép thế này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「無理やりでなくとも恥ずかしかろう。\nだって、これは、ポーレット――」
1170 = "「Dù không cưỡng ép thì cũng xấu hổ mà.\nBởi vì, thế này, Paulette——」"

# monologue
# JP: 装飾で、ディスプレイで、デコレーション。\nその説明で、おっぱいのときは納得したが――
1621 = "Đồ trang trí, phụ kiện trưng bày,\ndecoration.\nVới lời giải thích đó, tôi đã chấp nhận\nkhi ngắm nhìn bộ ngực, nhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「丸出しだぞ」
973 = "「Phơi bày ra hết rồi kìa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ちょっ！　双鉄くんってば、言い方！！」
1109 = "「Này! Anh Soutetsu, cách nói của anh!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、たしかに言葉足らずか」
1139 = "「A, đúng là anh dùng từ chưa chuẩn nhỉ.」"

# monologue
# JP: 慌てて照れるポーレットが、かえって僕を落ち着かせる。\n先程までは一方的に責め立てられるばかりだったが――
1586 = "Paulette luống cuống xấu hổ, ngược lại làm\ntôi bình tĩnh hơn.\nTừ nãy đến giờ tôi chỉ toàn bị tấn công\nmột chiều, nhưng——"

# 【ポーレット】
# display as 波萊特
# JP: 「そ、そうですよ？　たしかにわたしたち、夫婦ですし？\n何百回もこういうことしてますけど、それでもやっぱり」
1218 = "「Đ-Đúng thế mà? Dù chúng ta là vợ chồng,\ndù đã làm chuyện này hàng trăm lần rồi,\nnhưng mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「おまんこが、まるだしだ」
1165 = "「Âm đạo của em, đang phơi bày ra hết kìa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ！！？」
1033 = "「Hau!!?」"

# monologue
# JP: 真っ赤になってもじもじ震える。\n自分で選んで買ったものであろうに――うむ？
1425 = "Cô ấy đỏ bừng mặt, lúng túng run rẩy.\nRõ ràng là tự mình chọn mua mà——hửm?"

# 【双鉄】
# display as 雙鐵
# JP: 「気になったのだがポーレット。僕に教えてくれないか？\nどんな理由でこのおまんこが丸出しの紐を買ったのだ？」
1204 = "「Anh tò mò quá, Paulette. Nói cho anh biết\nđi?\nVì lý do gì mà em lại mua sợi dây phơi bày\nhết cả âm đạo thế này?」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あっ――えと、あのっ――」
1052 = "「Hả? A——ưm, cái đó——」"

# monologue
# JP: ぐるぐるしている。普段なら全力で支えるところであるが、\nふたりの夜なら、こうした姿も実にかわいい。
1563 = "Cô ấy lúng túng quay cuồng. Bình thường\ntôi sẽ dốc sức hỗ trợ cô ấy,\nnhưng trong đêm chỉ có hai người thế này,\ndáng vẻ đó quả thực rất đáng yêu."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしが、ええと、このランジェリーを」
1187 = "「Em, ưm, mua bộ nội y này là vì」"

# 【双鉄】
# display as 雙鐵
# JP: 「ランジェリー？　これが？　その用を為してないだろう。\nこれはただの、おまんこ丸出しの紐だ」
987 = "「Nội y? Cái này á? Có tác dụng gì đâu.\nĐây chỉ là sợi dây phơi bày âm đạo thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はう～～っ――あうっ――わ、わたしが――この、\nおまんこ――おまんこ、丸出しの紐を、買ったの、は」
1035 = "「Hau～～——au——e, em——mua sợi dây,\nphơi bày——phơi bày âm đạo này, là vì」"

# 【双鉄】
# display as 雙鐵
# JP: 「おまんこを丸出しにして、\n僕にいじめてほしかったからか？」
1225 = "「Vì em muốn phơi bày âm đạo,\nđể anh bắt nạt đúng không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　やっ――違うっ、そんなっ」
1048 = "「Ế!? Không——không phải, chuyện đó」"

# 【双鉄】
# display as 雙鐵
# JP: 「違う？　本当に？」
951 = "「Không phải? Thật không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あうっ！」
1090 = "「Au!」"

# monologue
# JP: 目線を向ければ、ポーレットは足を閉じようとする。\n無論ゆるさず、その柔肉から溢れる蜜を眺め続ける。
1584 = "Khi tôi hướng ánh mắt xuống, Paulette liền\ncố khép chân lại.\nTất nhiên tôi không cho phép, tiếp tục\nngắm nhìn mật ngọt rỉ ra từ lớp thịt mềm\nmại ấy."

# 【ポーレット】
# display as 波萊特
# JP: 「ちがわない……です。梱包開いて、あれって思って、\n着ちゃった後は――期待、しました、それは、やっぱり」
979 = "「Không sai……ạ. Lúc mở gói hàng ra, em đã\nthấy lạ rồi,\nnhưng sau khi mặc vào thì——quả nhiên, em\nđã, rất mong chờ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「期待とは何を？　具体的に教えてもらえるか？」
975 = "「Mong chờ điều gì? Có thể nói cụ thể cho\nanh biết không?」"

# monologue
# JP: （すりゅっ）
1766 = "（Cọ nhẹ）"

# 【ポーレット】
# display as 波萊特
# JP: 「んうううっ！」
1131 = "「Ưm uu u!」"

# monologue
# JP: ガチガチに硬度を戻した勃起でおまんこをゆるく擦れば、\nポーレットは甘い声――おねだりそのものの声を出す。
1397 = "Khi tôi dùng dương vật đã cương cứng trở\nlại cọ xát nhẹ vào âm đạo,\nPaulette liền phát ra giọng điệu ngọt\nngào——như đang làm nũng."

# 【ポーレット】
# display as 波萊特
# JP: 「おまんこ、わたしの、まるだしおまんこ、それと、\nおっぱい、わたしの、まるだしおっぱいもぉ」
1169 = "「Âm đạo, âm đạo phơi bày của em, với cả,\nngực, ngực phơi bày của em nữa」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1123 = "「Ừm.」"

# monologue
# JP: （もにっ――もにゅっ――くりゅっ――こしゅんっ！）
1742 = "（Bóp——nắn——xoay——cọ xát!）"

# 【ポーレット】
# display as 波萊特
# JP: 「はうううっ――ふあっ――あっ――\nおっぱい――ちくび――きもちいい――よぉ」
1032 = "「Hau uu——pha——a——\nngực——nhũ hoa——sướng quá——a」"

# monologue
# JP: 素直なこには、ご褒美を。\n真っ正直なおねだりには、真っ正直な答えを返す。
1632 = "Phải thưởng cho bé ngoan chứ.\nCô ấy đã thành thật xin xỏ, tôi cũng sẽ\nđáp lại một cách thành thật."

# 【双鉄】
# display as 雙鐵
# JP: 「こうして、弄ってほしかったのか？」
1177 = "「Em muốn anh nghịch thế này sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「いじいじさわさわだけじゃなくって、ちゅぱちゅぱとか、\nぺろぺろちゅうちゅうとか、あとね？　あと、おまんこ」
957 = "「Không chỉ nghịch nghịch sờ sờ, mà còn mút\nmút,\nliếm liếm mút mút nữa, với lại nhé? Với\nlại, âm đạo」"

# monologue
# JP: （きゅううっ）
1775 = "（Siết chặt）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1064 = "「唔！！！」" 

# monologue
# JP: 擦り付けている勃起へと、大陰唇がはりついてくる。\n挿入しろと、射精をしろと、至極単純に訴えてくる。
1413 = "Môi lớn bám dính lấy dương vật đang cọ\nxát.\nĐòi hỏi một cách vô cùng đơn giản rằng hãy\nđâm vào, hãy xuất tinh đi."

# 【ポーレット】
# display as 波萊特
# JP: 「おまんこには、おちんちんいれてほしくて――\nたくさんたくさん、きもちいいこと、二人でして、ね？」
1164 = "「Âm đạo thì, em muốn được nhét dương vật\nvào——\nHai đứa mình cùng làm thật nhiều, thật\nnhiều chuyện sung sướng nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「～～っ」
1070 = "「～～」"

# monologue
# JP: 挿入したい、いますぐずぼずぼ腰を動かし\n精子の全部をポーレットの子宮に注ぎ込みたい。
1503 = "Muốn đâm vào, muốn lập tức lắc eo liên hồi\nvà trút toàn bộ tinh trùng vào tử cung của\nPaulette."

# monologue
# JP: （むにっ！　くりゅっ！　こしゅっ！　もみゅっ！）
1731 = "（Bóp! Xoay! Cọ! Nắn!）"

# 【ポーレット】
# display as 波萊特
# JP: 「んふっ！！！」
1127 = "「Ưm fu!!!」"

# monologue
# JP: 右手に神経の全てを注いでおっぱいに埋め、\nその衝動を、すんでのところで食い止める。
1507 = "Tôi dồn toàn bộ sự tập trung vào tay phải\nđang vùi trong bầu ngực,\nvà kiềm hãm xung động ấy ngay trong gang\ntấc."

# 【ポーレット】
# display as 波萊特
# JP: 「どろどろの、ぐちゃぐちゃにとけあって、\n一杯一杯、おまんこの奥にびゅうびゅうしてもらって」
1278 = "「Hòa quyện vào nhau nhớp nháp, nhầy nhụa,\nrồi bắn thật nhiều, thật nhiều vào sâu\ntrong âm đạo em」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1062 = "「唔！」" 

# monologue
# JP: 胸を揉んでも、もうごまかせない。\nこれほど上等のおっぱいを揉んでいてもなお――
1455 = "Dù có xoa bóp ngực cũng không thể đánh lừa\nbản thân được nữa.\nDù đang nắn bóp bầu ngực tuyệt hảo đến vậy\nmà vẫn——"

# 【ポーレット】
# display as 波萊特
# JP: 「ふたりでいっしょにしあわせになって――それで――\nえへへ――おかあさんとおとうさんになりたいなぁって」
1194 = "「Hai đứa mình cùng nhau hạnh phúc——rồi sau\nđó——\nehehe——em muốn chúng mình trở thành bố\nmẹ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！」
1249 = "「Paulette!」"

# monologue
# JP: （ずぶうううううううううううっ――――ごつっっ！！）
1770 = "（Đâm sâu uuuuuuuuuuu――――kịch!!）"

# 【ポーレット】
# display as 波萊特
# JP: 「きゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅん！！！」
1010 = "「Kyuuuuuuuuuuuuuuuuuuun!!!」"

# monologue
# JP: 貫いている。最愛の妻の最奥までを、一気呵成に一直線に。\nむちむち満ちる膣内は、喜んで僕を迎えてくれる。
1514 = "Xuyên thấu. Xuyên thẳng một mạch đến tận\nnơi sâu nhất của người vợ yêu dấu.\nBên trong âm đạo đầy đặn mềm mại đang hân\nhoan chào đón tôi."

# monologue
# JP: （みちゅっ――みちゅっ！　ぐにゅっ！　ぐにっっ）
1780 = "（Mút mát——mút mát! Nhào nặn! Nhào nặn）"

# monologue
# JP: 狭いというより、みっちりしている。空間が膣肉で満ち、\n膣肉全てが最上級に柔らかすぎる霜降り肉で――
1622 = "Không phải là chật hẹp, mà là kín mít.\nKhông gian bị lấp đầy bởi lớp thịt âm đạo,\ntất cả đều là lớp thịt vân mỡ thượng hạng\nmềm mại vô cùng——"

# 【ポーレット】
# display as 波萊特
# JP: 「ぁ――ふぁ――双鉄くん――そうてつくぅん」
1074 = "「A——pha——anh Soutetsu——anh Soutetsu」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ポーレット」
1122 = "「Ừm. Paulette.」"

# monologue
# JP: その肉ひだの一つ一つがわななき吸い付き震え甘えて、\n僕の射精を、動かぬいまさえひっきりなしに促してくる。
1457 = "Từng nếp gấp thịt run rẩy, mút mát, rung\nlên nũng nịu,\nkhông ngừng thúc giục tôi xuất tinh, ngay\ncả khi tôi đang bất động."

# 【双鉄】
# display as 雙鐵
# JP: 「なろう、必ず。ポーレットと僕とふたりで。\n世界一幸せなおかあさんとおとうさんに、絶対なろう」
970 = "「Sẽ thành, chắc chắn vậy. Paulette và anh,\nhai chúng ta.\nTuyệt đối sẽ trở thành ông bố bà mẹ hạnh\nphúc nhất thế giới.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、はい――うれしいです！\nえへへっ、ぜったいぜったい、してくださいね！」
1227 = "「Vâng, vâng——em vui lắm!\nEhehe, nhất định, nhất định phải biến em\nthành mẹ nhé!」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1123 = "「嗯」" 

# monologue
# JP: （ぞっ――ろっ――ろっ――ろっ――）
1704 = "（Sục——sục——sục——sục——）"

# 【ポーレット】
# display as 波萊特
# JP: 「くひゅっ！　んっ――ぁ――ふぁ――あっ――あ……\nぁっ――太い、とこ――ぞりって――すき――んっ――」
1025 = "「Ku hyu! Ưm——a——pha——a——a……\nA——chỗ, to ấy——cọ vào——thích quá——ưm——」"

# monologue
# JP: ついさっき、あれほど大量に射精した。\nすぐニ発目では薄くなろうし、体裁もあまりよろしくない。
1395 = "Vừa mới nãy tôi đã bắn ra một lượng lớn\ntinh dịch.\nNếu bắn phát thứ hai ngay thì tinh dịch sẽ\nbị loãng, và trông cũng không hay cho lắm."

# monologue
# JP: （グッ――くっ――ぐりゅ――くっ――ぐっ――こつっ）
1748 = "（Đâm——cọ——xoay——cọ——đâm——kịch）"

# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――は――ァ――あっ――ゆっくり、も――\nすき――んっ――きもち、いいとこ――じっくり――ぁ」
1022 = "「Pha——ha——a——a——chậm rãi, thế này——\nem cũng thích——ưm——chỗ, sướng ấy——cứ từ\ntừ——a」"

# monologue
# JP: ゆえ、慎重に腰を動かす。ポーレットの膣内の\n反応が良くなる部分を余さず刺激するようにして――
1517 = "Vì thế, tôi thận trọng chuyển động eo. Cố\ngắng kích thích không sót chỗ nào\nđể âm đạo của Paulette phản ứng tốt hơn——"

# monologue
# JP: （ずぞっ――ぞ――ずりゅ――りゅう――ぬ――）
1750 = "（Thọc——cọ——cọ xát——trượt——miết——）"

# 【ポーレット】
# display as 波萊特
# JP: 「ぁ――ぁ――ぁ――んっ――ね？　そうてつ、くん――\nそうてつ――くぁ――ふっ――んっ――んうっ！」
1079 = "「A——a——a——ưm——nè? Anh Soutetsu——\nSoutetsu——a——phu——ưm——ưm uu!」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　どうした、ポーレット」
968 = "「Sao vậy? Có chuyện gì thế, Paulette.」"

# monologue
# JP: （ずっ――ぞぶ――ぐっ――ぐりっ――くっ――こつっ）
1749 = "（Thọc——cọ——miết——xoay——cọ——kịch）"

# 【ポーレット】
# display as 波萊特
# JP: 「おちん、ちん――ンッ――そうてつ、くん、の、\nおちん、ちん――おちんちん、の、ふとい、くびれ、の」
1266 = "「Dương, vật——ưm——của anh Soutetsu——\ndương, vật——chỗ thắt lại, phình to, của\ndương vật」"

# 【双鉄】
# display as 雙鐵
# JP: 「カリ首か？」
1305 = "「Rãnh quy đầu à?」"

# monologue
# JP: （ぬちゅっ――ちっ――くっ――ぐくっ――くるっ――）
1763 = "（Trơn trượt——cọ——miết——ma sát——xoay——）"

# 【ポーレット】
# display as 波萊特
# JP: 「んっ！？　はっ！　あっ――ね？　カリ、くびっ――\nそうてつ、くんの――んひっ――ふと、い――前、より」
1136 = "「Ưm!? Ha! A——nè? Rãnh, quy đầu——\ncủa anh Soutetsu——ưm hi——to hơn——trước\nđây, rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そうではなく。\n僕のカリ首が、以前より大きくなったのではなく」
958 = "「Không, không phải đâu.\nKhông phải rãnh quy đầu của anh to hơn\ntrước đây đâu.」"

# monologue
# JP: （ぐっ――くっ――――ぴたっっ）
1774 = "（Miết——cọ――――khựng lại）"

# 【ポーレット】
# display as 波萊特
# JP: 「あっ！？」
1097 = "「A!?」"

# monologue
# JP: 天井側の浅いとこ。ぷっくりとした感触に、\nカリ首の一番高いところを押し当てながらひとまず止まる。
1602 = "Phần nông phía trên trần. Tôi ép phần nhô\ncao nhất của rãnh quy đầu\nvào điểm sưng phồng ấy rồi tạm thời dừng\nlại."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄、くん？」
1300 = "「Anh Soutetsu?」"

# monologue
# JP: 焦れて、甘えて――それでもはっきり、感じている声。\nそれが証拠に膣内も――
1429 = "Sốt ruột, nũng nịu——nhưng vẫn là giọng nói\nđang cảm nhận rõ ràng khoái cảm.\nBằng chứng là bên trong âm đạo cũng——"

# monologue
# JP: （きゅうううっ――きゅむっ――にゅううっ――きゅん）
1707 = "（Co thắt dữ dội——siết chặt——ép chặt——co\nrút）"

# monologue
# JP: ……ひっきりなしに蠢き貼り付き、僕の射精を促してくる。
692 = "……Không ngừng ngọ nguậy, bám dính lấy,\nthúc giục tôi xuất tinh."

# 【双鉄】
# display as 雙鐵
# JP: 「ゆっくり、慎重に感じてみるんだ」
977 = "「Hãy từ từ, cẩn thận cảm nhận xem.」"

# monologue
# JP: （さっ――ゆさっ――ゆさっ――ゆさっ――）
1784 = "（Lắc——lắc nhẹ——lắc nhẹ——lắc nhẹ——）"

# 【ポーレット】
# display as 波萊特
# JP: 「あっ！？　ぁ――ぁ――ぁっ――ふあっ――これっ――\nこれっ――えっ――やらっ――これっ――しゅきっ――」
1099 = "「A!? A——a——a——pha——thế này——\nthế này——ế——ưm——thế này——thích quá——」"

# monologue
# JP: ほんのわずかな前後動。\n腰ではなくて、抱えた体をゆりかごのように揺する感覚。
1515 = "Chỉ là một chuyển động tới lui rất nhỏ.\nKhông phải dùng eo, mà giống như đang đu\nđưa cơ thể cô ấy như một chiếc nôi."

# monologue
# JP: （みちっ――むちっ――むちゅっ――みちゅんっ！）
1778 = "（Rút ra——đâm vào——rút ra——đâm vào!）"

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あうっ――ふぁんっ――んっ――くぅんっ――\nん。これ――ゆっくり――はっ――ゆっくぃ、らのにぃ」
1084 = "「Ha——au——pha——ưm——kuuun——\nƯm. Thế này——chậm rãi——ha——chậm rãi, thế\nmà」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆっくりだからこそわかるだろう？　ポーレット」
992 = "「Chính vì chậm rãi nên em mới cảm nhận rõ\nràng đúng không? Paulette.」"

# monologue
# JP: （ぴたっ）
# 1703 = "（停下）" 

# 【ポーレット】
# display as 波萊特
# JP: 「やぁん！　やぁ、なのっ――とめるの、やぁ、なのぉ」
1271 = "「Đừng! Đừng mà——dừng lại, đừng mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕のカリ首が、大きくなったわけではなく」
