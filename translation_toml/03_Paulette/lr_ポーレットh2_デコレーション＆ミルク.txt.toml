1487 = "我不再過度深入，專注於穴口附近的敏感之處。用各種淺嚐即止的動作輪番進行刺激。" 

# monologue
# JP: （ゆすっ――ゆさっ――さすっ――こしゅっ――）
1759 = "（擺動——晃動——摩挲——磨蹭——）" 

# 【ポーレット】
# display as 波萊特
