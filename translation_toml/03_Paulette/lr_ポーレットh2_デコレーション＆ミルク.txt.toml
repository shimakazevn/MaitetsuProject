1043 = "「哎嘿嘿。那樣我也挺開心的——啊呼」" 

# monologue
# JP: （ずっ――ゆすっ――ゆさっ――さすっ――）
1773 = "（磨蹭——擺動——晃動——摩挲——）" 

# monologue
