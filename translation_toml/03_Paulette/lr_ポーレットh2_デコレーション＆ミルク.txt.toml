1247 = "「波萊特。那個，我想問問你，妊娠初期在體內射精會怎樣？」" 

# monologue
# JP: （ずっ！――ゆさっ！――ゆすっ！――しゅにゅっ！）
1782 = "（蹭！——擺動！——晃動！——滑動！）" 

# 【ポーレット】
# display as 波萊特
