1407 = "Sau khi đã nếm trải sự kích thích mạnh mẽ\nnhất bên trong âm đạo, giờ lại\nphải tiếp tục chuyển động chậm rãi ở mức\nđộ nông hơn. Thế này thì tôi không thể\nxuất tinh được——Không."

