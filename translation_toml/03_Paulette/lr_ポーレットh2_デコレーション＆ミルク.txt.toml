1441 = "她那被精液噴得一塌糊塗的臉龐上，露出了幸福的笑容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大好きだ。ポーレット。ありがとう」
1188 = "「我太愛你了。波萊特。謝謝你」" 

