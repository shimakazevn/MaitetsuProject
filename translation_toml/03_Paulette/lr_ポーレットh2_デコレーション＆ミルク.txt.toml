# monologue
# JP: 背徳的で、美しい。僕の子を宿す母体に、美麗な顔に、\n母乳をたっぷり貯めた乳房に、妊娠させた精液を――
1639 = "Thật ngang trái, và cũng thật xinh đẹp.\nLên cơ thể người mẹ đang mang giọt máu của\ntôi, lên khuôn mặt diễm lệ,\nlên bầu ngực căng tràn sữa mẹ, tôi bắn\ntinh dịch đã khiến cô ấy mang thai——"

# monologue
# JP: （びゅるっ！　びゅっ！　びゅううっ！　びゅっ！！）
1718 = "（Phụt! Phụt! Phụt! Phụt!!）"

# monologue
# JP: 完全に無駄なものとして、ただただ汚すそのためだけに\nくまなく降り注がせている。
1497 = "Coi nó như một thứ hoàn toàn vô dụng, chỉ\nđể làm vấy bẩn cô ấy,\ntôi đã bắn tinh dịch vung vãi khắp mọi\nnơi."

# 【ポーレット】
# display as 波萊特
# JP: 「……。……。……。……。」
695 = "「……。……。……。……。」"

# monologue
# JP: （びゅっ――びゅうっ――びゅうっ――ぴゅっ）
1710 = "（Phụt——phụt——phụt——phụt）"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁあっ――」
1091 = "「Aa——」"

# 【ポーレット】
# display as 波萊特
# JP: 「ぁ――んっ！？　（ぷくっ）――ひゃ！　やぁん」
1210 = "「A——ưm!? （Bong bóng）——Hya! Ghét quá」"

# monologue
# JP: 精液が鼻についたのか、一瞬小さな鼻提灯を膨らませ、\nすぐポーレットは隠し潰して
1404 = "Có lẽ do tinh dịch dính vào mũi, một bong\nbóng nhỏ xíu phồng lên trong tích tắc,\nrồi Paulette vội vàng bóp nát nó đi."

# 【ポーレット】
# display as 波萊特
# JP: 「ふふっ――ふふふっ！　うふふふふっ！！！」
1018 = "「Fufu——fufufu! Ufufufufu!!!」"

# monologue
# JP: しあわせそうに、笑ってくれる。\n精液でぐちゃぐちゃに乱れた顔で、しあわせそうに。
1441 = "Cô ấy mỉm cười, trông thật hạnh phúc.\nVới khuôn mặt tèm lem tinh dịch, cô ấy\ntrông thật hạnh phúc."

# 【双鉄】
# display as 雙鐵
# JP: 「大好きだ。ポーレット。ありがとう」
1188 = "「Anh yêu em lắm. Paulette. Cảm ơn em.」"

# 【ポーレット】
# display as 波萊特
# JP: 「こちらこそです。双鉄くん。わたしを――\nおかあさんにしてくれて。本当にありがとうございます」
1195 = "「Em mới là người phải nói thế. Anh\nSoutetsu. Cảm ơn anh——\nđã biến em thành mẹ. Thật sự cảm ơn anh\nrất nhiều.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、その言葉には九ヶ月――八ヶ月か？\nまだ随分と早かろう」
962 = "「Không, để nói câu đó thì phải đợi 9\ntháng——hay 8 tháng nữa nhỉ?\nBây giờ vẫn còn quá sớm mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですね」
1102 = "「A, đúng vậy nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ゆえ、その紐を脱いですぐにシャワーを浴びてくれ。\n僕は産院の予約を――ああ、どの産院がいいのかな」
1207 = "「Vậy nên, em cởi sợi dây đó ra rồi đi tắm\nngay đi.\nAnh sẽ đặt lịch ở bệnh viện phụ sản——a,\nbệnh viện nào thì tốt nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「高崎さんに電話してくれたらきっと。\n同じ御一夜で、おかあさんになったばっかりですし」
1280 = "「Anh cứ gọi điện cho chị Takasaki là chắc\nchắn sẽ biết.\nChị ấy cũng ở Ohimitera và mới làm mẹ xong\nmà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「わかった。\nならばポーレットは安心して、すぐにシャワーを」
1202 = "「Anh hiểu rồi.\nVậy thì Paulette cứ yên tâm đi tắm ngay đi\nnhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そんなに焦らせなくっても。だって、ね？\nもう夜ですよ？　双鉄くん」
953 = "「Anh không cần phải vội thế đâu. Bởi vì,\nanh biết mà?\nĐã tối rồi đấy? Anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1223 = "「À——」"

# monologue
# JP: 妊娠検査で夜間外来もおかしかろう。\nならば、明日か。おもえばドっと、力が抜ける。
1531 = "Khám thai mà lại đi khám ngoài giờ vào ban\nđêm thì cũng kỳ lạ.\nVậy thì để ngày mai thôi. Nghĩ vậy, tôi\nbỗng thấy cả người nhẹ bẫng."

# 【ポーレット】
# display as 波萊特
# JP: 「もちろんシャワーは浴びますけど――\nそのまえに、あのね？　双鉄くん？」
1253 = "「Tất nhiên là em sẽ đi tắm rồi——\nnhưng trước đó, nè? Anh Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1142 = "「Hửm?」"

# 【ポーレット】
# display as 波萊特
# JP: 「この紐――デコレーション……どうしましょうか？\nもう着ないなら」
1287 = "「Sợi dây——đồ decoration này……tính sao đây\nạ?\nNếu em không mặc nữa thì」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、綺麗にして大事に保存しておいてほしい。\nどんな理由で購入したのかも気になるし」
964 = "「Không, anh muốn em giặt sạch rồi cất giữ\ncẩn thận.\nAnh cũng tò mò không biết em mua nó vì lý\ndo gì nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あうっ」
1089 = "「Au」"

# monologue
# JP: 焦った様子に嬉しくなる。\nなるほど次は、そこのところを突きながらも悪くない。
1427 = "Dáng vẻ luống cuống của cô ấy làm tôi thấy\nvui vẻ.\nRa là vậy, lần tới vừa làm vừa chọc vào\nđiểm yếu đó cũng không tồi."

# 【双鉄】
# display as 雙鐵
# JP: 「それにどのみち、また着てもらう。\n今度は、そうだな――無事出産の、お祝いあたりに」
1264 = "「Dù sao thì em cũng sẽ phải mặc lại nó\nthôi.\nLần tới, xem nào——chắc là vào dịp ăn mừng\nem mẹ tròn con vuông.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ――うふふっ」
1075 = "「A——ufufu」"

# monologue
# JP: 微笑んで。ポーレットの指がそうっと下腹を撫でさする。\n母の、ではなく、はっきりとした女の仕草で。
1556 = "Mỉm cười. Ngón tay Paulette khẽ vuốt ve\nphần bụng dưới.\nĐó không phải là cử chỉ của một người mẹ,\nmà là của một người phụ nữ thực thụ."

# 【ポーレット】
# display as 波萊特
# JP: 「はぁい。わかりましたぁ」
1153 = "「Vâng ạ. Em hiểu rồi.」"
