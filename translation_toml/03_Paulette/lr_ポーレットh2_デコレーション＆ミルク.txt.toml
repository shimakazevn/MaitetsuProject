1286 = "「這……我不知道——其實吧——」" 

# monologue
# JP: （むにっ――すりっ――みゅにゅっ――くしゅっ――）
1755 = "（擠壓——磨蹭——擠壓——磨蹭——）" 

# monologue
# JP: ポーレットが実にゆるゆる動かしてくる乳圧に、\n集中力と判断力とを、ぐすぐずに融かされ壊されている。
1560 = "波萊特的雙乳所施展的柔緩動作和壓力，一點一滴地融化著我的注意力和判斷力。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕はいま、現在進行系で知能指数を下げられている。\nたったひとつのことの他、今はなんにも考えられん」
1200 = "「我的智商正在不停地往下掉。現在我的腦子裡除了一件事之外，其他什麼都裝不進去」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん～～～～――――ぁ――――――（ぺちょっっ）」
1115 = "「嗯——啊——（吐出）」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
1063 = "「唔！！」" 

# monologue
# JP: また亀頭へと、熱い唾液が垂らされる。
1569 = "溫熱的唾液又淋上了龜頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「なんですか？　その、『たったひとつのこと』って」
980 = "「你說的那個“一件事”到底是什麼呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「射精したい。ポーレットのおっぱいとお口に思い切り\n愛してもらって、思いっきりに射精したい」
1191 = "「我想射精。我想被你的奶子和小嘴用力疼愛，然後盡情噴射出來」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ、わかりましたぁ――はむっ」
1060 = "「唔呵呵，我明白了——（吞入）」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！」
1065 = "「唔！！！！」" 

# monologue
# JP: ようやく、ようやく咥えてもらえた！\n満足感と達成感と安心感――っ！！！？
1597 = "終於含住了！我心中瞬間充滿了滿足感、成就感和安心——！！！？" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぐちゅっ！　ちゅぶっ！　ずちゅっ！　じゅぼっ！\nぐりゅっ――リュッ――じゅぶ！　じゅるるる～～っ！」
1028 = "「咕啾！啾噗！滋啾！啾噗！咕啾——嚕——啾噗！啾嚕嚕嚕～～！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぉあっ！」
1054 = "「哦啊！」" 

# monologue
# JP: 満たされたという暖かな思いが、その何倍の何十倍の、\n暴力的な快感に、塗りつぶされて押し流される！
1568 = "溫暖人心的滿足感瞬間被強烈幾倍，甚至幾十倍的暴虐快感洪流沖刷一空。" 

# 【ポーレット】
# display as 波萊特
# JP: 「じゅぶうっ！　じゅ！　れろっ――れるっ――じゅっ！\nじゅぼ！　じゅびゅ！　ごちゅっ！　じゅぶうっ！！」
1107 = "「啾噗！啾！滋嚕——滋溜——啾！滋噗！啾噗！咕啾！啾噗！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あっ――あっ――あっ――」
1076 = "「啊——啊——啊——」" 

# monologue
# JP: 亀頭を唇でピストンされて、喉奥にまで当ててもらえる。\nそうする間も舌は休まず、カリを、鈴口を舐めてくれる。
1432 = "她讓龜頭在雙唇間抽插，深度直達喉底。與此同時，她的舌頭也沒有停止對冠狀溝和馬眼的舔舐。" 

# monologue
# JP: （もにゅっ！　くちゅっ！　じゅちゅっ！　しにゅん！）
1734 = "（抽出！插進！抽出！插進！）" 

# monologue
# JP: お口の傍らおっぱいは、竿の全部と睾丸までをも、\n唾液と汗でぬらつきながらみっちり包んで刺激して――
1453 = "小嘴旁的雙乳也把整根肉棒和睪丸包得嚴嚴實實，在唾液和汗水的潤滑下摩擦刺激——" 

# 【ポーレット】
# display as 波萊特
# JP: 「じゅっ！　ぢゅぼっ！　ぢゅぶっ！　ぼちゅっ！！\nぢゅびゅっ！　ぢゅばっ！　ぢゅぅう！　ぢゅぶっ！！」
1108 = "「啾！啾噗！啾噗！噗啾！！啾咕！啾啪！啾唔唔！啾噗！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁっ！」
1092 = "「啊啊！」" 

# monologue
# JP: おっぱいのまろやかな刺激を裏返したような、\n亀頭だけへの強烈で動物的で一直線な射精誘導。
1641 = "這種只針對龜頭的強烈、野性、直接的射精誘導，與乳房帶來的平緩刺激形成了鮮明對比。" 

# monologue
# JP: （もにっ！　むにゅっ！　ふにゅっ！　すりゅんっ！）
1756 = "（擠壓！揉捏！擠壓！滑蹭！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぼぢゅっ！　ぢゅちゅ！　ぢゅぼっ！　ぢゅばっ！\nずりゅっ！　ぢゅむっ！　ちゅううっ！　れりゅっ！」
1148 = "「噗啾！啾啾！啾噗！啾啪！滋溜！啾嗯！啾嚕嚕！滋溜！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――ぁ――ァ――っ――」
1077 = "「啊——啊——啊——唔——」" 

# monologue
# JP: 両者が強烈に混じり合い、お互いがお互いを引き立て合う。\nもっと長くを楽しみたいが、射精衝動が強すぎて――
1391 = "兩者強烈地互相融合，交相輝映。我雖想讓快樂持續更久，怎奈射精衝動實在太過強烈——" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポー、レット――僕は、ぼくは、もうっ」
1239 = "「波、萊特——我、我已經」" 

# monologue
# JP: （ぴたっ）
1703 = "（停下）" 

# monologue
# JP: 瞬間、ポーレットが動きを止めっ――っ！！！？
1558 = "波萊特的動作戛然而止——！！！？" 

# 【ポーレット】
# display as 波萊特
# JP: 「れるううううううううううううううううううっ！！！」
1255 = "「滋嚕嚕嚕嚕嚕嚕嚕——！！！" 

# 【双鉄】
# display as 雙鐵
# JP: 「！！！！」
# 1065 = "「唔！！！！」" 

# monologue
# JP: 裏筋が！！！！\nこの土壇場で下から上へとっ！！！
1431 = "她舔起了系帶！！！！在這個關鍵時刻從下一路往上舔！！！" 

# 【双鉄】
# display as 雙鐵
# JP: 「くはっ」
1017 = "「呃啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はぷっ――ずっちゅううううううううっっっっっっ！」
1037 = "「哈噗——滋啾唔唔唔唔唔——！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁあっっ！！」
1093 = "「啊啊！！」" 

# monologue
# JP: （びゅくっ！　どびゅっ！　びゅぶるっ！　ぶびゅっ！）
1713 = "（咻咕！嘟咻！咻噗！噗咻！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んくっ――ごくっ――ゴクッ――んぷっ」
1128 = "「嗯咕——咕嘟——咕嘟——嗯噗」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ――あ――ポーレット――ポーレット」
1082 = "「啊——啊——波萊特——波萊特」" 

# monologue
# JP: 舐めたそのまま亀頭を咥えて思いっきりに吸い付いて、\n導き出した精液を、そのままごくごく嚥下してくれる。
1562 = "波萊特舔完後順勢含入龜頭用力吸吮，榨出的精液直接被她大口咽了下去。" 

# monologue
# JP: （びゅぶっ！　びゅっ！　びゅるるっ！　どびゅっ！）
1715 = "（咻噗！咻！咻嚕嚕！嘟咻！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んっ――んぷっ――ぷっ――くっ――んっ」
1116 = "「嗯——嗯噗——噗——咕——嗯」" 

# monologue
# JP: この美しい生物が僕だけのため、これほどに下卑た行為を、\n幸せそうにしてくれる。事実が射精をさらに促し――
1443 = "如此美麗的生物只有在面對我時，才會一臉幸福地做出這麼下流的行為，這樣的事實更加增強了我的射精衝動——" 

# monologue
# JP: （びゅ！　びゅうっ！　びゅうっ！　びゅぶっ！）
1723 = "（咻！咻唔！噗咻！咻噗！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んぷっ！？　ぷっ――くっ―\n―こほっ――うぇっ――ごくっ――んむっ」
1133 = "「嗯噗！》噗——呃——咳咳——嘔——咕嘟——嗯唔」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、もういい無理するな」
1250 = "「波萊特，別再勉強自己吞下去了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえっ！　あうっ！！？」
1197 = "「我沒事！啊唔！！？」" 

# monologue
# JP: （びゅっ！　びゅうっ！　びゅピュッ――ぴゅっ）
1722 = "（咻！咻唔！咻咻——咻）" 

# 【ポーレット】
# display as 波萊特
# JP: 「きゃぁん」
1007 = "「呀——」" 

# monologue
# JP: 飲みきれなかった白濁液が、白皙の美貌に降りかかる。\n顎をしたたり豊かな胸へ――淫靡に、美麗に、点点と。
1422 = "她沒能喝完的白濁液噴灑在了她白皙的美貌上。黏液從下巴滑落，滴落在豐滿的雙乳上——這是多麼淫靡的一副美景。" 

# monologue
# JP: （ぴゅっ――ぷっ――ぴっ――…………）
1712 = "（咻——噗——嗶………）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――ぱくっ――ズッ――ずううっ――ごくっ。\nぷはっ――あ～ん、全部のみたかったのにぃ」
1085 = "「啊——啪咕——滋——滋唔唔——咕嘟。噗哈——啊～我好想全部喝下去」" 

# monologue
# JP: 言いながら、顔に飛び散った精液を指でぬぐって――
1439 = "她邊說邊用手指刮下噴濺在臉上的精液——" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぺろっ」
1021 = "「呸溜」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！　ポーレット」
1067 = "「唔！！！！波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？」
1016 = "「呀！？」" 

# monologue
# JP: パンツを脱ぎ捨てポーレットの足を抱え込む。\nおあずけされてた下半身を――
1504 = "我扒掉內褲，一把抱住波萊特的腿。對著她被冷落已久的下半身——" 

# monologue
# JP: （かぱぁ）
1709 = "（卡啪）" 

# 【ポーレット】
# display as 波萊特
# JP: 「や、双鉄くん――はずかしい、です。\nこんな、無理やり」
1273 = "「討厭，雙鐵君——好難為情啊。怎麼這樣硬來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無理やりでなくとも恥ずかしかろう。\nだって、これは、ポーレット――」
1170 = "「就算不硬來也夠難為情了吧。因為你這裡——」" 

# monologue
# JP: 装飾で、ディスプレイで、デコレーション。\nその説明で、おっぱいのときは納得したが――
1621 = "裝飾，Ｄｉｓｐｌａｙ，Ｄｅｃｏｒａｔｉｏｎ。在欣賞胸部時我已經聽過了解釋——" 

# 【双鉄】
# display as 雙鐵
# JP: 「丸出しだぞ」
973 = "「你已經露光光了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ちょっ！　双鉄くんってば、言い方！！」
1109 = "「喂！你討厭啦，用那種說法！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、たしかに言葉足らずか」
1139 = "「嗯，我確實失言了」" 

# monologue
# JP: 慌てて照れるポーレットが、かえって僕を落ち着かせる。\n先程までは一方的に責め立てられるばかりだったが――
1586 = "看著慌張害羞的波萊特，我的心情反而恢復了平靜。雖然剛才被她攻得丟盔卸甲——" 

# 【ポーレット】
# display as 波萊特
# JP: 「そ、そうですよ？　たしかにわたしたち、夫婦ですし？\n何百回もこういうことしてますけど、それでもやっぱり」
1218 = "「是、是啊。雖然我們確實是夫妻。而且這種事也做過幾百回了，但這樣說還是太」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おまんこが、まるだしだ」
1165 = "「小穴露光光了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ！！？」
1033 = "「哈唔！！？」" 

# monologue
# JP: 真っ赤になってもじもじ震える。\n自分で選んで買ったものであろうに――うむ？
1425 = "她滿臉通紅，扭扭捏捏地全身發顫。但這裝飾明明是她自己挑的——嗯？" 

# 【双鉄】
# display as 雙鐵
# JP: 「気になったのだがポーレット。僕に教えてくれないか？\nどんな理由でこのおまんこが丸出しの紐を買ったのだ？」
1204 = "「我開始有些好奇了，波萊特。能不能告訴我？你為什麼會去買這種裸露小穴的布條？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あっ――えと、あのっ――」
1052 = "「哎？啊——呃，那個——」" 

# monologue
# JP: ぐるぐるしている。普段なら全力で支えるところであるが、\nふたりの夜なら、こうした姿も実にかわいい。
1563 = "波萊特露出左右為難的神色。平時遇到這種情況我當然要全力支持她，可在這兩人獨處的夜晚裡，這種神態也頗為可愛。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしが、ええと、このランジェリーを」
1187 = "「我……呃，買這個內衣是為了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ランジェリー？　これが？　その用を為してないだろう。\nこれはただの、おまんこ丸出しの紐だ」
987 = "「內衣？這哪能叫內衣啊。這只是裸露小穴的布條而已」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はう～～っ――あうっ――わ、わたしが――この、\nおまんこ――おまんこ、丸出しの紐を、買ったの、は」
1035 = "「哈唔～～啊唔——我、我——之所以買這個裸——裸露小、小穴的布條」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おまんこを丸出しにして、\n僕にいじめてほしかったからか？」
1225 = "「是為了把小穴裸露出來，好讓我玩弄一番嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　やっ――違うっ、そんなっ」
1048 = "「哎！？不——不、不是那樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「違う？　本当に？」
951 = "「不是？真的嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あうっ！」
1090 = "「啊唔！」" 

# monologue
# JP: 目線を向ければ、ポーレットは足を閉じようとする。\n無論ゆるさず、その柔肉から溢れる蜜を眺め続ける。
1584 = "看到我目光落下，波萊特連忙想要把腿閉起來。但我當然不會讓她得逞，繼續端詳從她的軟肉中淌出的蜜汁。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ちがわない……です。梱包開いて、あれって思って、\n着ちゃった後は――期待、しました、それは、やっぱり」
979 = "「你說的沒錯……打開包裝之後覺得很那個，而穿上之後——還是有些期待，應該就像你說的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「期待とは何を？　具体的に教えてもらえるか？」
975 = "「你所謂的期待是？能不能具體地告訴我呢？」" 

# monologue
# JP: （すりゅっ）
1766 = "（滑過）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んうううっ！」
1131 = "「嗯唔唔唔！」" 

# monologue
# JP: ガチガチに硬度を戻した勃起でおまんこをゆるく擦れば、\nポーレットは甘い声――おねだりそのものの声を出す。
1397 = "又變得硬邦邦的硬物慢慢擦過小穴，這讓波萊特發出了甜美的叫聲——聽起來就像在百般央求。" 

# 【ポーレット】
# display as 波萊特
# JP: 「おまんこ、わたしの、まるだしおまんこ、それと、\nおっぱい、わたしの、まるだしおっぱいもぉ」
1169 = "「小穴，我的，裸露小穴，還有胸部，我的，裸露胸部也要」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1123 = "「嗯」" 

# monologue
# JP: （もにっ――もにゅっ――くりゅっ――こしゅんっ！）
1742 = "（捏擰—捏擰—打轉—磨蹭！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「はうううっ――ふあっ――あっ――\nおっぱい――ちくび――きもちいい――よぉ」
1032 = "「哈唔唔唔——呼啊——啊——乳房——乳頭——好舒服——啊」" 

# monologue
# JP: 素直なこには、ご褒美を。\n真っ正直なおねだりには、真っ正直な答えを返す。
1632 = "誠實的孩子必須獎賞。直截了當的央求，要用直截了當的方式去回應。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こうして、弄ってほしかったのか？」
1177 = "「想要被這樣玩弄嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いじいじさわさわだけじゃなくって、ちゅぱちゅぱとか、\nぺろぺろちゅうちゅうとか、あとね？　あと、おまんこ」
957 = "「不要只是摸摸摳摳的啦，人家還要吸吸舔舔，還有呢，小穴還要」" 

# monologue
# JP: （きゅううっ）
1775 = "（貼緊）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 1064 = "「唔！！！」" 

# monologue
# JP: 擦り付けている勃起へと、大陰唇がはりついてくる。\n挿入しろと、射精をしろと、至極単純に訴えてくる。
1413 = "大陰唇貼上了正在輕輕磨蹭的硬物。它的訴求非常簡單明瞭——快插進來，快射進來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「おまんこには、おちんちんいれてほしくて――\nたくさんたくさん、きもちいいこと、二人でして、ね？」
1164 = "「小穴還要肉棒插進去——兩個人一起做很多很多，舒服的事情吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「～～っ」
1070 = "「唔～～」" 

# monologue
# JP: 挿入したい、いますぐずぼずぼ腰を動かし\n精子の全部をポーレットの子宮に注ぎ込みたい。
1503 = "我想插進去，立刻就開始挺腰抽送，把所有的精子全部注入波萊特的子宮。" 

# monologue
# JP: （むにっ！　くりゅっ！　こしゅっ！　もみゅっ！）
1731 = "（抓捏！打轉！磨蹭！搓揉！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んふっ！！！」
1127 = "「嗯呼！！！」" 

# monologue
# JP: 右手に神経の全てを注いでおっぱいに埋め、\nその衝動を、すんでのところで食い止める。
1507 = "我把所有注意力都投在右手上，然後讓手鑽入雙乳之間，在千鈞一髮之際擋住了插入的衝動。" 

# 【ポーレット】
# display as 波萊特
# JP: 「どろどろの、ぐちゃぐちゃにとけあって、\n一杯一杯、おまんこの奥にびゅうびゅうしてもらって」
1278 = "「跟濕乎乎的黏稠小穴融化在一起，在裡面射出很多很多精液」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1062 = "「唔！」" 

# monologue
# JP: 胸を揉んでも、もうごまかせない。\nこれほど上等のおっぱいを揉んでいてもなお――
1455 = "就算用力搓揉乳房也無法轉移注意力了。就算搓揉著如此上等的乳房也已經滿足不了我——" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふたりでいっしょにしあわせになって――それで――\nえへへ――おかあさんとおとうさんになりたいなぁって」
1194 = "「我想要兩個人一起獲得幸福——然後——哎嘿嘿——一起成為爸爸媽媽」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！」
1249 = "「波萊特！」" 

# monologue
# JP: （ずぶうううううううううううっ――――ごつっっ！！）
1770 = "（用力頂入——到底！！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「きゅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅぅん！！！」
1010 = "「呀唔唔唔唔唔——！！！」" 

# monologue
# JP: 貫いている。最愛の妻の最奥までを、一気呵成に一直線に。\nむちむち満ちる膣内は、喜んで僕を迎えてくれる。
1514 = "我直截了當地貫穿了愛妻的最深處，動作一氣呵成。布滿了軟肉的小穴歡天喜地地迎接了我的到來。" 

# monologue
# JP: （みちゅっ――みちゅっ！　ぐにゅっ！　ぐにっっ）
1780 = "（蹭進——蹭出！搗來！搗去）" 

# monologue
# JP: 狭いというより、みっちりしている。空間が膣肉で満ち、\n膣肉全てが最上級に柔らかすぎる霜降り肉で――
1622 = "裡面何止是窄，簡直是密不透風。整個空間都被穴肉填滿，而那肉質完全可以比擬入口即化的頂級霜降肉——" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁ――ふぁ――双鉄くん――そうてつくぅん」
1074 = "「啊——呼啊——雙鐵君——雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ポーレット」
1122 = "「嗯。波萊特」" 

# monologue
# JP: その肉ひだの一つ一つがわななき吸い付き震え甘えて、\n僕の射精を、動かぬいまさえひっきりなしに促してくる。
1457 = "層層疊疊的肉褶一邊哆嗦一邊吸著我，哪怕我不動，它們也一刻不停地在催促我射精。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なろう、必ず。ポーレットと僕とふたりで。\n世界一幸せなおかあさんとおとうさんに、絶対なろう」
970 = "「你和我一定會當上的。絕對會當上世界上最幸福的爸爸媽媽的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、はい――うれしいです！\nえへへっ、ぜったいぜったい、してくださいね！」
1227 = "「是的，是的——我好高興！哎嘿嘿，一定一定要讓我幸福地當上媽媽！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1123 = "「嗯」" 

# monologue
# JP: （ぞっ――ろっ――ろっ――ろっ――）
1704 = "（刮——蹭——蹭——蹭——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「くひゅっ！　んっ――ぁ――ふぁ――あっ――あ……\nぁっ――太い、とこ――ぞりって――すき――んっ――」
1025 = "「咕呀！嗯——啊——呼啊——啊——啊……啊——粗的地方——刮到的感覺——好棒——嗯——」" 

# monologue
# JP: ついさっき、あれほど大量に射精した。\nすぐニ発目では薄くなろうし、体裁もあまりよろしくない。
1395 = "剛剛才噴出了那麼大量的精液。馬上來第二發的話一定會稀上不少，看起來也會不太體面。" 

# monologue
# JP: （グッ――くっ――ぐりゅ――くっ――ぐっ――こつっ）
1748 = "（搗——蹭——刮——蹭——蹭——觸底）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――は――ァ――あっ――ゆっくり、も――\nすき――んっ――きもち、いいとこ――じっくり――ぁ」
1022 = "「呼啊——哈——啊——啊——慢慢來——也好喜歡——嗯——舒服的，地方——仔細按摩——啊」" 

# monologue
# JP: ゆえ、慎重に腰を動かす。ポーレットの膣内の\n反応が良くなる部分を余さず刺激するようにして――
1517 = "所以我小心地扭動腰部。對波萊特穴內的每一處敏感部分進行細緻的刺激——" 

# monologue
# JP: （ずぞっ――ぞ――ずりゅ――りゅう――ぬ――）
1750 = "（搗弄——蹭——摩挲——蹭——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁ――ぁ――ぁ――んっ――ね？　そうてつ、くん――\nそうてつ――くぁ――ふっ――んっ――んうっ！」
1079 = "「啊——啊——啊——嗯——我說，雙鐵君——雙鐵——君——唔——嗯——嗯唔！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　どうした、ポーレット」
968 = "「什麼？有什麼事嗎？波萊特」" 

# monologue
# JP: （ずっ――ぞぶ――ぐっ――ぐりっ――くっ――こつっ）
1749 = "（搗弄——蹭——刮蹭——蹭——頂）" 

# 【ポーレット】
# display as 波萊特
# JP: 「おちん、ちん――ンッ――そうてつ、くん、の、\nおちん、ちん――おちんちん、の、ふとい、くびれ、の」
1266 = "「肉棒——嗯——雙鐵君、的肉棒——肉棒、鼓起來的、地方」" 

# 【双鉄】
# display as 雙鐵
# JP: 「カリ首か？」
1305 = "「龜頭冠嗎？」" 

# monologue
# JP: （ぬちゅっ――ちっ――くっ――ぐくっ――くるっ――）
1763 = "（滑蹭——蹭——摩挲——摩擦——扭轉——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んっ！？　はっ！　あっ――ね？　カリ、くびっ――\nそうてつ、くんの――んひっ――ふと、い――前、より」
1136 = "「嗯！？哈！啊——那個龜頭、冠——雙鐵君的——嗯呀——比以前——粗了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そうではなく。\n僕のカリ首が、以前より大きくなったのではなく」
958 = "「不，不是的。不是我的龜頭冠比以前大了」" 

# monologue
# JP: （ぐっ――くっ――――ぴたっっ）
1774 = "（磨蹭——蹭——停下）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ！？」
1097 = "「啊！？」" 

# monologue
# JP: 天井側の浅いとこ。ぷっくりとした感触に、\nカリ首の一番高いところを押し当てながらひとまず止まる。
1602 = "肉穴上方有一個淺淺的地方。我用龜頭冠的頂端，抵住某塊有顆粒感的部位之後暫停了抽插。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄、くん？」
1300 = "「雙鐵君？」" 

# monologue
# JP: 焦れて、甘えて――それでもはっきり、感じている声。\nそれが証拠に膣内も――
1429 = "她甜膩的聲音摻雜著焦急之意——不過更多的還是歡愉的意味。這一點從穴內的狀況也可印證——" 

# monologue
# JP: （きゅうううっ――きゅむっ――にゅううっ――きゅん）
1707 = "（劇烈收縮——縮緊——擠壓——抽搐）" 

# monologue
# JP: ……ひっきりなしに蠢き貼り付き、僕の射精を促してくる。
692 = "……肉穴的蠕動和收縮，無時無刻不在催促著我射精。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆっくり、慎重に感じてみるんだ」
977 = "「你要慢慢地，仔細地去感受」" 

# monologue
# JP: （さっ――ゆさっ――ゆさっ――ゆさっ――）
1784 = "（輕晃——前後——輕搖——擺動——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ！？　ぁ――ぁ――ぁっ――ふあっ――これっ――\nこれっ――えっ――やらっ――これっ――しゅきっ――」
1099 = "「啊！？啊——啊——啊——呼啊——這個——這樣——哎——討厭——這樣——好棒——」" 

# monologue
# JP: ほんのわずかな前後動。\n腰ではなくて、抱えた体をゆりかごのように揺する感覚。
1515 = "我開始小幅度地前後擺動。我沒有挺腰，而是把她的身體當成搖籃一樣晃動。" 

# monologue
# JP: （みちっ――むちっ――むちゅっ――みちゅんっ！）
1778 = "（蹭出——蹭進——蹭出——蹭進——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あうっ――ふぁんっ――んっ――くぅんっ――\nん。これ――ゆっくり――はっ――ゆっくぃ、らのにぃ」
1084 = "「啊——啊唔——呼啊——嗯——咕嗯——嗯。這樣——慢慢擺動——哈——明明動作那麼慢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ゆっくりだからこそわかるだろう？　ポーレット」
992 = "「動作慢才感覺得出來吧？波萊特」" 

# monologue
# JP: （ぴたっ）
# 1703 = "（停下）" 

# 【ポーレット】
# display as 波萊特
# JP: 「やぁん！　やぁ、なのっ――とめるの、やぁ、なのぉ」
1271 = "「討厭！不、不要——別、別停下來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕のカリ首が、大きくなったわけではなく」
948 = "「不是我的龜頭冠變大了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うんっ、うんっ！」
1137 = "「嗯，嗯！」" 

# monologue
# JP: 恐らくは、意味を取ろうという思考さえ働いてない。\n動いて欲しくて欲しくて欲しくて頷いているだけだろう。
1418 = "她大概只是在下意識地做出回應。她只是為了讓我別停下來才胡亂點頭的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの膣内――膣壁――おまんこの中の\nぷりゅぷりゅが、より、女性らしさを、増しているのだ」
1220 = "「是你的穴內——肉壁——小穴中的嫩肉越來越有，女人味了」" 

# monologue
# JP: （さっ――ゆさっ――ゆすっ――すりゅっ――）
1783 = "（輕擺——擺動——擺動——蹭——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひあっ！　あ、んっ――わたし、の、おまんこ、が\nあっ――もっと、ぷりゅぷりゅ――おんなのこ、らしく」
1011 = "「呀啊！啊，嗯——我的、小穴、啊——的嫩肉——更有女人味了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、最高のプロポーションはそのままに、\n柔らかみと丸みを増しているのだ。こんなふうにな」
1140 = "「嗯，穴肉的柔軟和圓潤，在以最棒的配比增加。就像這樣」" 

# monologue
# JP: （ふにゅっ！）
1767 = "（猛抓！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んきゅんっ！！！」
1125 = "「嗯呀！！！」" 

# monologue
# JP: （ぴゅっ！）
1728 = "（噴出）" 

# 【ポーレット】
# display as 雙鐵＆波萊特
# JP: 「えっ！？」\n「えっ！？」
1045 = "「哎！？」\\n「哎！？」" 

# monologue
# JP: なんだ、いま、強めに揉んだポーレットの乳首から、\n水のようなものがほとばしりでた――
1475 = "怎麼回事，在剛才的用力搓揉下，波萊特的乳頭噴出了像水一樣的液體——" 

# 【ポーレット】
# display as 波萊特
# JP: 「……おっ、ぱい？」
698 = "「……奶、水？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！！！！！　（はぷっ！！！）」
1069 = "「唔！！！！！！（咬上！！！）」" 

# 【ポーレット】
# display as 波萊特
# JP: 「きゅふっ！？　んっ！　ちょっ！\nおちつ――あっ――おちついて――そうてつく――っ！」
1009 = "「呀呼！？嗯！等等！冷——啊——冷靜一點——雙鐵——！」" 

# monologue
# JP: （ばちゅっ！　ぐちゅっ！　ごちゅっ！　ぼちゅっ！！）
1726 = "（啪啾！咕啾！咕啾！啵啾！！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「（ちゅむっ！　ちゅうっ！　ちゅるっ！　ずうっ！）」
1317 = "「（啾唔！啾！啾嚕！滋！）」" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっ！　はっ！　はげしっ！　んっ！　こんなのっ！\nおっぱい、もっ！　あっ――おまんこ――もぉっ！！」
1013 = "「呀！哈！好用力！嗯！這樣的！胸部也！啊——小穴——也！！」" 

# monologue
# JP: 母乳であるなら呑みたくて。絞り出したくて滲ませたくて、\n必死になってむしゃぶりついて、全力で腰も稼働する。
1625 = "要是真有母乳的話，我當然要品嘗一番。為了榨出奶汁，我拚命吸吮，並且全力挺腰衝刺。" 

# monologue
# JP: （ぐちゅっ！　ずばっ！　ごちゅっ！　ぐりゅっ！！）
1740 = "（捅入！抽出！插入！抽出！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！　うっ！　あ！　そんなっ、腰っ――んっ――\n腰、えぐる、みたいに、してもぉ――おっぱい、違うっ」
1015 = "「呀！唔！啊！腰的動作怎麼——嗯——就像在、挖著裡面，不過——胸部，不對」" 

# monologue
# JP: （ぴゅるっ）
# 1728 = "（噴出）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1086 = "「啊」" 

# monologue
# JP: 水っぽさ。ただそれだけしか感じない。\n母乳らしいとはとても思えず、だから必死で求めてしまう。
1640 = "這汁水怎麼嘗都跟水沒什麼兩樣。由於實在不像母乳，讓我忍不住更賣力地想再弄點出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「（ちゅっ！　ちゅうっ！　ちゅむっ！　ぢゅううっ）」
1319 = "「（啾！啾唔！啾嗯！啾嚕嚕）」" 

# monologue
# JP: （ごちゅっ！　ずりゅっ！　ばちゅんっ！　ばぢゅっ！）
1747 = "（插入！抽出！插入！抽出！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁ！　んっ！　ふあっ！　あっ！　あっ！　ああっ！\nわたしっ！　でてるっ！　わたし！　おっぱいっ！！」
1095 = "「啊！嗯！呼啊！啊！啊！啊啊！我！流出來了！我的！乳房！！」" 

# monologue
