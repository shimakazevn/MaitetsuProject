1438 = "她還沒回話就先動起了手。我的內褲被一下子褪到了腳下——" 

# monologue
# JP: （ぷりゅんんっっ！！！）
1730 = "（夾緊！！！）" 

# 【双鉄】
# display as 雙鐵
