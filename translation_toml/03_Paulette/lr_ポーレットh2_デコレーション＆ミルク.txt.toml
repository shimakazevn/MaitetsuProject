960 = "「不，啊——嗯，沒那回事……好吧，我承認好像有這麼回事」" 

# monologue
# JP: 図星を全力で突かれてしまい、慌てて胸から視線を剥がす。
1614 = "被她完全說中之後，我連忙把視線從胸部上移開。" 

# 【双鉄】
# display as 雙鐵
