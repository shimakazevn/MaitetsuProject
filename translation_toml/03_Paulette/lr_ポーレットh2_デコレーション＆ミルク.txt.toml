1435 = "她越是制止我就越想看。不過——現在還是放平心態，在她允許的範圍來享受一番吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「下着でないとすると……だ。\nポーレットがいま身につけているものは、いったい？」
1156 = "「如果說不是內衣的話……那你現在穿在身上的究竟是什麼啊？」" 

# 【ポーレット】
# display as 波萊特
