[script]
# lines: 313 
# 【双鉄H】
# display as 雙鐵
# JP: 「む――これか？」
910 = "「Hừm——cái này à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、それっぽい。見せてください。……うんっ！　これ、\nこれです！　助かった～、ありがとう、双鉄くん！」
986 = "「A, có vẻ là nó đấy. Cho em xem với. ...Đúng rồi! Cái này, chính là nó! May quá~, cảm ơn Soutetsu nhé!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「いや、\n礼をいわれるべきは僕ではなく、汰斗さんだろう」
864 = "「Không, người đáng được cảm ơn không phải là anh, mà là ông Taito chứ.」"
# monologue
# JP: 御一夜駅を発着する貨物列車の本数と、\nその総輸送量との統計データ。
1347 = "Dữ liệu thống kê về số lượng tàu chở hàng đến và đi tại ga Ohimitera, cùng với tổng khối lượng vận chuyển của chúng."
# monologue
# JP: 関連質問の通告を受け、急ぎ探したが、\n市役所内にも御一夜鉄道にも無かったものだ。
1255 = "Nhận được thông báo về các câu hỏi liên quan, chúng tôi đã vội vàng tìm kiếm, nhưng cả trong Tòa thị chính lẫn Đường sắt Ohimitera đều không có."
# 【双鉄H】
# display as 雙鐵
# JP: 「何故集めたのか――そこは僕には理解できんが、\nしかし実際、このコレクションに大いに助けられている」
1068 = "「Tại sao ông ấy lại thu thập những thứ này——anh không thể hiểu nổi, nhưng thực tế là bộ sưu tập này đã giúp ích rất nhiều.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですよねー」
1005 = "「Đúng vậy nhỉ~」"
# monologue
# JP: 深い頷き。
1475 = "Một cái gật đầu thật sâu."
# monologue
# JP: ポーレットはどこかうっとりした目で、\n資料の山をぐるり見渡す。
1290 = "Paulette đưa ánh mắt có phần mơ màng nhìn quanh đống tài liệu chất như núi."
# 【ポーレット】
# display as 波萊特
# JP: 「ここの資料はまぎれも無い一級品ですからね。\n前にも――」
1060 = "「Tài liệu ở đây không thể nghi ngờ gì nữa, toàn là hàng cực phẩm mà. Trước đây cũng——」"
# monologue
# JP: そこまで言って、ポーレットの声が止まってしまう。
1554 = "Nói đến đó, giọng Paulette bỗng im bặt."
# monologue
# JP: 顔はわずかに赤らんで、\nもぞもぞと、恥ずかしそうなそぶりを見せ――ああ。
1292 = "Khuôn mặt hơi ửng đỏ, cô ấy cựa quậy, tỏ vẻ ngượng ngùng——À."
# 【双鉄H】
# display as 雙鐵
# JP: 「前には、騒動が起きてしまったものな」
867 = "「Trước đây, đã từng xảy ra một vụ náo động nhỉ.」"
# monologue
# JP: 言えばすぐさま、ポーレットは嬉しさと照れとを交えた、\nなんともはにかんだ顔になる。
1516 = "Vừa nói xong, Paulette lập tức bày ra một vẻ mặt pha trộn giữa vui sướng và e thẹn, trông vô cùng bẽn lẽn."
# 【ポーレット】
# display as 波萊特
# JP: 「あのときはごめんなさい。……急にれいなが、その……\nパンツ、見えてるって……それで、すごく慌てちゃって」
1066 = "「Lúc đó em xin lỗi nhé. ...Đột nhiên Reina bảo là, ừm... thấy quần lót... nên em hoảng quá.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
993 = "「Hửm?」"
# monologue
# JP: ポーレットが教えてくれたことだ。
1453 = "Đó là điều Paulette đã dạy cho tôi."
# monologue
# JP: 好きな異性の視線には、女の子は特に敏感で、\n偶然見えるものはその実、意識的に見せているのだと。
1268 = "Rằng con gái đặc biệt nhạy cảm với ánh nhìn của người khác giới mà mình thích, và những thứ tưởng chừng như vô tình để lộ, thực chất là cố ý cho xem."
# 【双鉄H】
# display as 雙鐵
# JP: （ならば、ポーレットはあの時には僕のことをまだ……\nああいや、違う。単に、僕が“見ていなかった”のか）
1683 = "（Nếu vậy, lúc đó Paulette vẫn chưa có tình cảm với mình... À không, sai rồi. Đơn giản là do mình \"không thèm nhìn\" sao.）"
# monologue
# JP: 僕の視線と意識とは、資料探しにだけ向けられて、\nゆえにポーレットはまったくそれを気にしなかった。
1363 = "Ánh nhìn và ý thức của tôi lúc đó chỉ hướng đến việc tìm kiếm tài liệu, do đó Paulette hoàn toàn không bận tâm đến chuyện ấy."
# monologue
# JP: そこにれいなの指摘が飛んで、不意打ちとなり――\n結果、あれほどバタバタとしてしまったのだろう。
1490 = "Rồi lời chỉ điểm của Reina bất ngờ bay tới, đánh úp—— Kết quả là mới gây ra một trận cuống cuồng như vậy."
# 【双鉄H】
# display as 雙鐵
# JP: （しかし……今考えると、多少もったいなかったか）
1637 = "（Nhưng mà... giờ nghĩ lại, thấy cũng hơi tiếc nhỉ.）"
# monologue
# JP: あの時は、パンツごときで何故あれほどの騒ぎとなるのか、\nとんと見当もつかなかったが――
1570 = "Hồi đó, tôi hoàn toàn không hiểu tại sao chỉ vì cái quần lót mà lại ầm ĩ lên đến thế——"
# 【ポーレット】
# display as 波萊特
# JP: 「今なら……少しは、見たいって思ってくれますか？」
1040 = "「Nếu là bây giờ... anh có muốn xem một chút không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
907 = "「!」"
# monologue
# JP: 心を見ぬかれたような気がして、一瞬焦り、\nけれどもすぐに、推測は容易だっただろうと理解する。
1365 = "Cảm giác như bị nhìn thấu tâm can, tôi thoáng bối rối, nhưng ngay lập tức nhận ra rằng việc đoán được suy nghĩ của tôi cũng dễ thôi."
# monologue
# JP: 僕は今、ほぼ無意識にまじまじと――\nポーレットの下半身へと、視線を注ぎ続けていたから。
1247 = "Bởi vì lúc này, gần như trong vô thức, tôi đang dán chặt ánh mắt—— chằm chằm vào nửa thân dưới của Paulette."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、思う」
989 = "「Ừ, anh muốn.」"
# monologue
# JP: ならば、何を取り繕う必要も無い。\n感じていること、思うこと。それを素直に言葉になおす。
1567 = "Nếu vậy thì chẳng cần phải che giấu điều gì cả. Những gì tôi cảm nhận, những gì tôi nghĩ. Cứ thế chân thật biến chúng thành lời."
# 【双鉄H】
# display as 雙鐵
# JP: 「少しどころか、大いに見たい。パンツを、ではなく、\nポーレットの魅力的な姿を見たい」
1009 = "「Đâu chỉ một chút, anh rất muốn xem là đằng khác. Không phải xem quần lót, mà là muốn ngắm nhìn dáng vẻ quyến rũ của Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「み、魅力的――ですか？」
1072 = "「Q, quyến rũ——sao anh?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。具体的には、僕の視線を自覚しつつも、\n偶然を装って誘惑をかける、そんな姿を見てみたい」
980 = "「Ừ. Cụ thể là, anh muốn xem cái dáng vẻ em vừa ý thức được ánh nhìn của anh, vừa giả vờ như tình cờ để quyến rũ anh ấy.」"
# monologue
# JP: ふんわり、と――\n頬をピンクに染めたまま、満足そうな柔らかな笑み。
1462 = "Dịu dàng, và—— Với đôi má ửng hồng, cô ấy nở một nụ cười mềm mại đầy mãn nguyện."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……\nわたしが前いったこと、覚えててくれたんですね？」
1071 = "「Soutetsu... Anh vẫn nhớ những gì em từng nói sao?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ。\n僕にとっては衝撃的な事実を教えてもらったのだから」
1067 = "「Đương nhiên rồi. Bởi vì em đã dạy cho anh một sự thật mang tính chấn động đối với anh mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。双鉄くんのご希望なら、\nわたし、頑張ってみます」
1016 = "「Em hiểu rồi. Nếu đó là mong muốn của Soutetsu, thì em sẽ cố gắng thử xem.」"
# monologue
# JP: 言って、ポーレットは瞼を閉じる。
1555 = "Nói xong, Paulette nhắm mắt lại."
# monologue
# JP: 沈思黙考――\nややあって開かれた青い瞳は、強い光を帯びている。
1273 = "Trầm tư suy nghĩ—— Một lát sau, đôi mắt xanh biếc mở ra, ánh lên một tia sáng mạnh mẽ."
# 【ポーレット】
# display as 波萊特
# JP: 「……王道でいってみようと思います。\n移動しましょう。一緒に来てください」
709 = "「......Tôi sẽ thử dùng phương pháp cổ điển xem sao. Chúng ta di chuyển thôi. Xin hãy đi cùng tôi.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うむ――」
971 = "「Ừm——」"
# 【ポーレット】
# display as 波萊特
# JP: 「いいですか？　双鉄くんは残業の休憩中です。\nわたしが声をかけたら、振り返ってくださいね？」
1048 = "「Được chứ? Anh Soutetsu đang nghỉ giải lao sau khi làm thêm giờ. Khi em gọi, anh hãy quay lại nhé?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「わかった」
996 = "「Anh hiểu rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「こほん――\n『そ、双鉄くん。残業、お疲れ様です』」
926 = "「E hèm—— 『A, anh Soutetsu. Anh làm thêm giờ vất vả rồi.』」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
981 = "「Ừ.」"
# monologue
# JP: （くるっ）
1667 = "（Xoay người）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？」
903 = "「Á!?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うぉっ！？」
929 = "「Uo!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ご！　ごめんなさいっ！？」
1002 = "「X... Xin lỗi anh!?」"
# monologue
# JP: ズボンが濡れる。\nポーレットがしゃがみこんでいる。
1371 = "Quần tôi bị ướt. Paulette đang ngồi xổm xuống."
# monologue
# JP: 僕のズボンを濡らした、これは……
1389 = "Thứ làm ướt quần tôi, đây là......"
# 【双鉄H】
# display as 雙鐵
# JP: 「アイスコーヒーか？」
874 = "「Cà phê đá à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんにリラックスして欲しいって思って……\nほんと、ごめんなさい。すぐ拭きますね――あれ？」
1014 = "「Em muốn anh Soutetsu được thư giãn nên...... Thật sự xin lỗi anh. Em sẽ lau ngay đây——Ủa?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
908 = "「っ!」"
# monologue
# JP: ハンカチを探してるのだろうか？
1288 = "Cô ấy đang tìm khăn tay sao?"
# monologue
# JP: ポーレットの手が胸ポケットを、尻ポケットを、\n探って動くそのたびに――
1455 = "Mỗi lần tay Paulette sờ soạng tìm kiếm trong túi áo ngực và túi quần sau——"
# 【双鉄H】
# display as 雙鐵
# JP: （む、ぅ……）
1648 = "（Ư, m......）"
# monologue
# JP: ポーレットの胸がふるふる震える。\nあの最高のおっぱいが、僕の視線を釘付けにする。
1470 = "Bộ ngực của Paulette rung lên bần bật. Đôi gò bồng đảo tuyệt hảo đó thu hút ánh nhìn của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「あ、やだ――わたしにもかかっちゃってる」
956 = "「A, thôi chết——Nó cũng dính vào người em rồi.」"
# monologue
# JP: （ぷちっ――ぷちっ――）
1675 = "（Pặc——Pặc——）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 908 = "「呃！」" 
# monologue
# JP: 胸のボタンが、ひとつ、ふたつ――\nそうして、みっつ、かなり大きく開けられる。
1297 = "Cúc áo ngực, một cái, hai cái—— Rồi ba cái, bị mở ra khá rộng."
# monologue
# JP: 胸の谷間が丸見えになる。見えそうで見えない乳首の姿に、\n想像と欲望とが駆り立てられる。
1579 = "Khe ngực phơi bày ra toàn bộ. Hình dáng núm vú lúc ẩn lúc hiện kích thích trí tưởng tượng và dục vọng trong tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……\nスカートも、染みになっちゃう」
951 = "「A...... Váy cũng bị ố mất rồi.」"
# monologue
# JP: 腰のホックを外して器用にスカートを脱ぎ、\n脱いだスカートのポッケを探って……
1298 = "Cô ấy tháo móc cài ở eo, khéo léo cởi váy ra, rồi lục lọi trong túi chiếc váy vừa cởi......"
# 【ポーレット】
# display as 波萊特
# JP: 「ありました。ティッシュ。\nこれで、今すぐ拭きますから」
1024 = "「Có rồi. Khăn giấy. Em sẽ lau ngay bằng cái này đây.」"
# monologue
# JP: （こしゅっ）
1669 = "（Chà chà）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
935 = "「っ——」"
# monologue
# JP: 太ももの上に置かれたティッシュが、\n否応なしにセックスのことを連想させる。
1252 = "Tờ khăn giấy đặt trên đùi bất giác khiến tôi liên tưởng đến tình dục."
# monologue
# JP: (しゅっ――こしゅ――こすっ――）
37 = "(Sột——soạt——sột——）"
# monologue
# JP: 太ももを、その内側を、\n強すぎず弱すぎぬ指に擦られる。
1465 = "Đùi tôi, cả phần đùi trong, được cọ xát bởi những ngón tay với lực vừa phải."
# monologue
# JP: 心地よいから、焦れったくなる。\nもっと、ダイレクトに触れて欲しくて――
1246 = "Cảm giác thật dễ chịu, khiến tôi đâm ra nôn nóng. Tôi muốn cô ấy chạm vào trực tiếp hơn nữa——"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
953 = "「A」"
# monologue
# JP: 手が、止まる。\n青い瞳がまじまじと、僕の股間を凝視している。
1464 = "Bàn tay dừng lại. Đôi mắt xanh biếc đang chăm chú nhìn chằm chằm vào háng tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「これ……わたしのせい、ですよね？」
1058 = "「Cái này......là lỗi của em, đúng không?」"
# monologue
# JP: （ふわっ）
1666 = "（Nhẹ nhàng）"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
934 = "「っ!」"
# monologue
# JP: 待ちわびていた刺激はけれど、あまりに弱い。
1303 = "Sự kích thích mà tôi hằng mong đợi, lại quá yếu ớt."
# monologue
# JP: テッシュ一枚それだけに、たなびくように撫ぜられたなら、\n勃起はいっそう貪欲になり、勝手にビクリと動いてしまう。
1212 = "Chỉ với một tờ khăn giấy mỏng manh mơn trớn như thế, dương vật cương cứng càng trở nên tham lam, tự động giật nảy lên."
# 【ポーレット】
# display as 波萊特
# JP: 「これじゃ、リラックスできませんよね？」
1059 = "「Thế này thì, anh không thể thư giãn được nhỉ?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
# 971 = "「嗯——」" 
# monologue
# JP: 服装のせいか、雰囲気のせいか。
1181 = "Do trang phục, hay do bầu không khí đây."
# monologue
# JP: 恋人同士の僕らであるのに、\nいけないことをしているようで、汗が出る。
1344 = "Rõ ràng chúng tôi là người yêu của nhau, nhưng lại có cảm giác như đang làm chuyện mờ ám, khiến tôi toát cả mồ hôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「できれば、そこも……リラックスさせてやってほしい」
999 = "「Nếu được thì, anh cũng muốn em......làm cho chỗ đó được thư giãn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
# 996 = "「好的」" 
# monologue
# JP: （もぞ――もぞっ）
# 1675 = "（解開鈕扣）" 
# monologue
# JP: ポーレットの手が、僕のズボンのボタンを外す。\nジッパーを下げ、前を大きく開いて、そして――
1473 = "Tay Paulette cởi cúc quần tôi. Cô ấy kéo khóa xuống, mở rộng phía trước, và rồi——"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ」
898 = "「Á」"
# monologue
# JP: 下着から解放された途端に、勃起が跳ねて、\nポーレットの顔をほとんど叩きそうになる。
1576 = "Vừa được giải phóng khỏi lớp đồ lót, dương vật cương cứng bật lên, suýt chút nữa thì đập vào mặt Paulette."
# monologue
# JP: であるというのに、嬉しげに――
1492 = "Dù vậy, cô ấy vẫn vui vẻ——"
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅっ」
958 = "「Chụt」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
954 = "「っ!」"
# monologue
# JP: ポーレットは優しく甘やかに、僕の先端にキスをして。\nそのまま舌を、やさしくやさしく蠢かしていく。
1474 = "Paulette hôn lên đỉnh đầu tôi thật dịu dàng và ngọt ngào. Cứ thế, cô ấy nhẹ nhàng, nhẹ nhàng luồn lách đầu lưỡi."
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅるっ――ちゅっ――ぺろっ――ぺろっ――」
965 = "「Chụt——chụt——liếm——liếm——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「――っ」
# 953 = "「啊」" 
# monologue
# JP: 先端に――先端だけに、しつこいほどに丁寧に、\nピンク色したかわいい舌が、唾液と熱とを刷りこんでくる。
1300 = "Ở phần đỉnh——chỉ phần đỉnh, một cách cẩn thận đến dai dẳng, chiếc lưỡi nhỏ màu hồng dễ thương truyền nước bọt và hơi nóng vào."
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅっ――ちゅむっ――ぺろっ――れろおおおっ」
966 = "「Chụt——chu——liếm——liếmmmm」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ポー……レット」
1033 = "「Pau......lette」"
# monologue
# JP: むずむずとした快感が、焦燥感にも似た欲望が、\n小鳥のついばみを思わせる先端愛撫に溜められていく。
1588 = "Cảm giác sung sướng râm ran, cùng dục vọng tựa như sự nôn nóng, tích tụ dần qua sự mơn trớn ở đỉnh đầu tựa như chim nhỏ mổ mồi."
# monologue
# JP: 頭を掴んで思いっきりに腰を振りたい――\nそんな乱暴な衝動を、なんとか理性で押し込める。
1354 = "Tôi muốn tóm lấy đầu cô ấy và dập hông thật mạnh—— Nhưng tôi đành cố dùng lý trí để kìm nén sự thôi thúc bạo lực đó."
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅる――んっ……\nガムシロップ――用意してくれたんですね、双鉄くん」
967 = "「Chụt——ưm...... Anh Soutetsu đã chuẩn bị sẵn——si-rô đường rồi nhỉ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
# 935 = "「啊——」" 
# monologue
# JP: ゆっくりとした軽い愛撫を積み重ねられ、\n見たこと無い量の先走り汁が引き出されている。
1513 = "Qua những cái mơn trớn nhẹ nhàng, chậm rãi, lượng tinh dịch chảy ra nhiều chưa từng thấy."
# monologue
# JP: 僕が滲ませたガムシロとズボンに染みたコーヒーとを、\n口内で混ぜ、ポーレットは幸せそうに飲みくだしてく。
1459 = "Paulette hòa quyện si-rô rỉ ra từ tôi với cà phê dính trên quần trong miệng, rồi hạnh phúc nuốt xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「ん……ねちゅっ――ん――く――ぷぁ。おいし。\nけど……ミルクがあれば、もっとおいしい気がします」
977 = "「Ưm......nhóp nhép——ưm——ực——phù. Ngon quá. Nhưng mà......em nghĩ nếu có thêm sữa thì sẽ ngon hơn nữa.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「だったら、ミルクを――」
1064 = "「Nếu vậy thì, sữa——」"
# monologue
# JP: 恥ずかしい。\n正気の沙汰で言える言葉じゃ、とても無い。
1498 = "Thật xấu hổ. Đó tuyệt đối không phải là lời có thể nói ra lúc tỉnh táo."
# monologue
# JP: だが、ポーレットがあからさまなまでに期待している。\nならば、ためらってなどいられない。
1189 = "Nhưng Paulette lại đang mong đợi ra mặt. Nếu vậy, tôi không thể chần chừ được nữa."
# 【双鉄H】
# display as 雙鐵
# JP: 「――僕のミルクを、好きなだけ絞り出すといい」
705 = "「——Em cứ vắt bao nhiêu sữa của anh tùy thích.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい！　双鉄くん。それじゃ、そうしちゃいますね？」
998 = "「Vâng! Anh Soutetsu. Vậy thì, em làm đây nhé?」"
# monologue
# JP: ちろり、ピンクの舌が覗く。\nポーレットは自分の唇を舐めて湿らせ――
1450 = "Chiếc lưỡi hồng thò ra. Paulette liếm môi cho ướt——"
# 【ポーレット】
# display as 波萊特
# JP: 「はむっ――んっ――ん～～っ――\nれるっ、れろっ――ちゅむつ――ちゅうっ」
942 = "「Ngoạm——ưm——ưm～～ liếm, liếm——chu——chụt」"
# 【双鉄H】
# display as 雙鐵
# JP: 「あっ――」
# 935 = "「啊——」" 
# monologue
# JP: 勃起の先端、くびれまで。\nそこまでを口におさめてもらえる。
1280 = "Đỉnh của dương vật cương cứng, cho đến rãnh quy đầu. Cô ấy ngậm trọn vào miệng đến tận đó."
# monologue
# JP: 大粒のキャンディーを転がすように、\nポーレットの舌はてらてら僕を弄ぶ。
1489 = "Như đang lăn một viên kẹo lớn, lưỡi Paulette ướt át trêu đùa tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――ちゅるっ――ちゅろ――ちゅっ――\nすうっ――　！　――ずろぉぉぉぉぉぉっ！！！」
974 = "「Ưm——chụt——chụt——chụt—— Sụt——!——Sụtttttt!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぃっ！！」
928 = "「Í!!」"
# monologue
# JP: 勃起の全部を、一気に飲まれる。
1270 = "Toàn bộ dương vật cương cứng bị cô ấy nuốt trọn một hơi."
# monologue
# JP: ポーレットの口の奥のぷにぷにした壁を、\n僕の先端が吸われた弾みでつついてしまう。
1589 = "Đầu dương vật của tôi bị lực hút đẩy tới, chọc vào vách thịt mềm mại sâu trong miệng Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「ふっ――んっ――ちゅっ――ずちゅっ――\nちゅむっ――むっ――ちゅばっ――ちゅむっ」
914 = "「Phù——ưm——chụt——chụt—— chu——ưm——chu——chu」"
# monologue
# JP: が、ポーレットは動きを止めない。
1191 = "Nhưng Paulette không hề dừng lại."
# monologue
# JP: 僕の精液――僕のミルクを絞りとろうと、\n一生懸命、頭を前後させつづける。
1284 = "Để vắt cạn tinh dịch——sữa của tôi, cô ấy ra sức gật gù đầu liên tục."
# 【ポーレット】
# display as 波萊特
# JP: 「あむっ――ん――ちゅぶっ――ちゅるっ――\nぺろっ――れるっ――れろろっ――ちゅううっ」
933 = "「Ngoạm——ưm——chu——chụt—— liếm——liếm——liếm——chụtttt」"
# 【双鉄H】
# display as 雙鐵
# JP: 「っ」
# 953 = "「啊」" 
# monologue
# JP: 合間合間に、舌が勃起の割れ目を撫ぜて、\n強い吸引ですぼまる口が巻き付いてくる。
1271 = "Thỉnh thoảng, đầu lưỡi cô ấy mơn trớn rãnh quy đầu, đôi môi mím lại bằng lực mút mạnh quấn lấy tôi."
# monologue
# JP: 精液が直接吸われるように、\nぐんぐんと、射精水域に近づけられてく。
1509 = "Cảm giác như tinh dịch bị hút ra trực tiếp, tôi nhanh chóng bị đẩy đến ngưỡng xuất tinh."
# 【ポーレット】
# display as 波萊特
# JP: 「はむっ――ちゅっ――ちゅううっ――ちゅっ！\nちゅばっ！　ちゅろっ！　ちゅうっ！　れろっ！」
931 = "「Ngoạm——chụt——chụtttt——chụt! Chu! Chụt! Chụtttt! Liếm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――ポーレット――」
944 = "「A——Paulette——」"
# monologue
# JP: もぞもぞと、ポーレットの太腿が擦り合わされる。
1471 = "Paulette cựa quậy cọ xát hai đùi vào nhau."
# monologue
# JP: 汗の匂いと、成熟した女性の濃い匂い。\nそれに鼻孔をくすぐられれば、僕の体も熱くなる。
1414 = "Mùi mồ hôi hòa quyện cùng mùi hương nồng nàn của một người phụ nữ trưởng thành. Sự kích thích ấy xộc vào mũi khiến cơ thể tôi cũng nóng ran lên."
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅむっ！　れろっ！　ちゅっ！　ちゅうっ！\nずちゅ！　ずぢゅっ！　ぢゅぼっ！　じゅろっ！！」
970 = "「Chu! Liếm! Chụt! Chụtttt! Chụt! Chụt! Chu! Chụtttt!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「出る――射精――射精、するっ――」
1054 = "「Ra mất——xuất tinh——anh xuất tinh mất——」"
# monologue
# JP: わかってますよ、と、僕を見上げる目が和らぐ。\n短く軽い鼻息が、僕の産毛をゆるくくすぐる。
1283 = "Ánh mắt ngước nhìn tôi dịu lại như muốn nói 'Em biết rồi'. Hơi thở ngắn và nhẹ của cô ấy khẽ mơn trớn những sợi lông tơ của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「れるうううううっ！」
968 = "「Liếmmmmm!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うぁっ！？」
955 = "「Á!?」"
# 【ポーレット】
# display as 波萊特
# JP: 「じゅっ！　じゅぼっ！　じゅるっ！　ぢゅぶっ！！」
969 = "「Chụt! Chu! Chụt! Chu!!」"
# monologue
# JP: 勃起のくびれのところをまくろうとするように、\n素早く強く吸引しながら、ポーレットがよだれを泡立てる。
1451 = "Như muốn lột tung rãnh quy đầu, Paulette vừa hút nhanh và mạnh, vừa tiết nước bọt sủi bọt."
# monologue
# JP: そうして、吐き出すギリギリにまで、\nポーレットはゆっくり頭を引いて――
1249 = "Sau đó, đến giới hạn tưởng chừng như sắp nôn ra, Paulette từ từ rút đầu lại——"
# 【ポーレット】
# display as 波萊特
# JP: 「ずりゅうううううううううううっっ！！！」
923 = "「Sụtttttttttt!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んくっ！」
# 954 = "「啊！」" 
# monologue
# JP: （びゅっ！　びゅるっ！　びゅむっ！　びゅううっ！）
1655 = "（Phụt! Phụt! Phụt! Phụtttt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「むぷっ！？　んっ――むっ――んんっ――\nんっ――こくっ――んぐっ――むぷっ――んむっ――」
924 = "「Ưm!? Ưm——ưm——ưm—— Ưm——ực——ực——ưm——ưm——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぅあっ――あっ――」
938 = "「A——a——」"
# monologue
# JP: 喉奥に、ぶつかっていく感触がある。\nミルク、なんてさらさらしたものじゃ、とても無い。
1372 = "Tôi có cảm giác như nó đang đập vào sâu trong cổ họng cô ấy. Hoàn toàn không phải là thứ lỏng lẻo như sữa."
# monologue
# JP: 射精している自分で感じるほどに、いっそ粘った精液を、\nそれでもポーレットはただひたすらに、飲み干していく。
1382 = "Tinh dịch đặc sệt đến mức chính tôi đang xuất tinh cũng cảm nhận được, nhưng Paulette vẫn một mực nuốt cạn."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……んっ――んむっ――ごくっ――んんんっ――\nぷあっ――はぁっ！　はぁああっ！」
948 = "「A......ưm——ưm——ực——ưm—— Phù——hà! Hààà!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット」
1035 = "「Paulette」"
# monologue
# JP: 精液の匂いがただよう、荒い息。
1275 = "Hơi thở gấp gáp thoang thoảng mùi tinh dịch."
# monologue
# JP: お疲れ様の気持ちをこめて髪を撫でれば、\nポーレットは嬉しげな目で僕を見上げて――
1380 = "Tôi vuốt tóc cô ấy với ý cảm ơn vì đã vất vả, Paulette ngước lên nhìn tôi bằng đôi mắt hạnh phúc——"
# 【ポーレット】
# display as 波萊特
# JP: 「あーーーー」
# 935 = "「啊——」" 
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 954 = "「啊！」" 
# monologue
# JP: 口を大きく大きく開けて、口内はもう空っぽだと、\n精液全部を飲んでくれたと、教えてくれる。
1277 = "Cô ấy há miệng thật to, cho tôi thấy bên trong đã trống rỗng, rằng cô ấy đã nuốt trọn tinh dịch của tôi."
# monologue
# JP: それからティッシュを一枚抜いて――
1487 = "Sau đó, cô ấy rút một tờ khăn giấy——"
# 【ポーレット】
# display as 波萊特
# JP: 「ん～～っ――んっ――んぅ～～～っ」
994 = "「Ưm～～ưm——ưm～～～」"
# monologue
# JP: ――唾液を、僕の勃起に絡ませ――
1458 = "——Quệt nước bọt lên dương vật cương cứng của tôi——"
# monologue
# JP: （しゅっ――こしゅっ――ふきっ――ふき――）
1668 = "（Sột——soạt——lau——lau——）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くっ――あっ――」
906 = "「Ư——a——」"
# monologue
# JP: 拭かれる――というか、お掃除される。
1211 = "Bị lau đi——hay đúng hơn là được dọn dẹp sạch sẽ."
# monologue
# JP: 勃起全部を丁寧に、ポーレットがぬぐってくれるから、\nあっという間に、硬度と欲とがよみがえる。
1185 = "Paulette cẩn thận lau sạch toàn bộ dương vật, chỉ trong chốc lát, độ cứng và dục vọng lại trỗi dậy."
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット……僕は、君とセックスしたい」
1034 = "「Paulette......Anh muốn làm tình với em.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くん。わたしもです」
991 = "「Vâng, anh Soutetsu. Em cũng vậy.」"
# monologue
# JP: （しゅるっ――）
1649 = "（Roạt——）"
# monologue
# JP: ポーレットがブラウスを床へと落とす。\nそしてブラへとかけられた手を、僕は言葉で押しとどめる。
1469 = "Paulette cởi áo sơ mi thả xuống sàn. Và khi cô ấy đưa tay định cởi áo lót, tôi đã lên tiếng ngăn lại."
# 【双鉄H】
# display as 雙鐵
# JP: 「白い肌に、紺の下着がとても映えてる。\n全部を脱いでしまうのは、もったいないと、僕は思う」
1045 = "「Đồ lót màu xanh đen cực kỳ tôn lên làn da trắng của em. Anh nghĩ cởi hết ra thì phí lắm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりました――なら」
1021 = "「Em hiểu rồi——vậy thì」"
# monologue
# JP: （くいっ）
1686 = "（Giật nhẹ）"
# monologue
# JP: 僕を寝かせたその上に、\nポーレットは絡みつくようにして乗っかってくる。
1557 = "Đẩy tôi nằm xuống, Paulette trèo lên người tôi như muốn quấn lấy."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし……その、自分の中では――\n背中のライン、結構、綺麗かなって思ってて、その」
1022 = "「Em......ừm, em tự thấy—— Đường nét sau lưng mình, cũng khá là, đẹp, nên là」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、本当に美しい。それに――」
990 = "「Ừ, thực sự rất đẹp. Hơn nữa——」"
# monologue
# JP: （むにっ）
1662 = "（Nắn bóp）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃあっ！！？」
902 = "「Á!!?」"
# monologue
# JP: お尻。\n白く、ゆったりとして、まあるいお尻。
1463 = "Cặp mông. Cặp mông trắng trẻo, đẫy đà, tròn trịa."
# monologue
# JP: 触れれば手のひらが吸い付くようで、\nもちもちとした弾力があり、心地いい。
1387 = "Chạm vào có cảm giác như lòng bàn tay bị hút chặt, độ đàn hồi mềm mại, thật dễ chịu."
# 【双鉄H】
# display as 雙鐵
# JP: 「おっぱいもだが――お尻もだとは気づかずにいた。\nポーレットの体は、どこもかしこも最高なのだな」
1050 = "「Anh biết ngực em đẹp rồi——nhưng không ngờ mông em cũng vậy. Cơ thể Paulette, chỗ nào cũng tuyệt vời hết.」"
# 【ポーレット】
# display as 波萊特
# JP: 「や……あっ――おしり……ふあっ――\n自分で……さわった、こと……ない……けどっ――」
897 = "「Á......a——mông......phù—— Bản thân em......chưa từng......chạm vào......nhưng——」"
# monologue
# JP: 揉めば揉むほど、しっとり感が増してくる。
1379 = "Càng xoa bóp, cảm giác ẩm ướt càng tăng lên."
# monologue
# JP: ポーレットの蜜があふれはじめて、\n押しつぶされてる僕の勃起を濡らして絡む。
1467 = "Mật ngọt của Paulette bắt đầu tuôn trào, thấm ướt và quấn lấy dương vật đang bị đè nén của tôi."
# monologue
# JP: （もみっ――もみゅっ――むにっ――もにっ――）
1661 = "（Xoa xoa——nắn nắn——bóp bóp——nắn nắn——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ん……あっ――きもち、いい――ですっ――\nんっ――双鉄、くんの、手――かたく――って」
976 = "「Ưm......a——sướng, quá——ạ—— Ưm——Tay, anh Soutetsu——cứng——quá」"
# monologue
# JP: もぞもぞと、ポーレットの腰が動き始める。
1476 = "Hông Paulette bắt đầu cựa quậy."
# monologue
# JP: もみ込みながら、パンツをずらし、\n助けるように前へと押せば――
1337 = "Vừa xoa bóp, tôi vừa kéo quần lót của cô ấy xuống, đẩy nhẹ về phía trước như muốn giúp một tay——"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄、くん、も――んっ――もう――こんなにっ――\n固く、て――あつく、て――ふあっ――」
1070 = "「Anh Soutetsu, cũng——ưm——đã——thế này rồi—— Cứng, quá——nóng, quá——phù——」"
# monologue
# JP: （にゅるっ――むりゅっ――ちゅにゅっ――みゅうっ）
# 1661 = "（揉來揉去）" 
# monologue
# JP: 剥き出しになったおまんこが、\n僕の勃起に吸いつきながらスライドしてく。
1403 = "Cô bé trần trụi vừa trượt vừa mút lấy dương vật cương cứng của tôi."
# monologue
# JP: 前後運動のその度に、大陰唇はめくれ絡んで、\nポーレットの中のピンクが、僕の目を楽しませてくれる。
1251 = "Mỗi lần trượt lên trượt xuống, môi lớn lại lật ra quấn lấy, màu hồng bên trong Paulette làm mãn nhãn tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「あっ……きもちいい……きもちいい……よぉ……\nふあっ――双鉄、くんの――おちん、ちんっ――あっ」
950 = "「A......sướng quá......sướng quá......anh ơi...... Phù——của, anh Soutetsu——dương, vật——a」"
# monologue
# JP: （じゅるっ――じゅうっ――ぢゅりゅっ――むにゅ――）
1647 = "（Sụt——chụt——sụt——nhóp nhép——）"
# monologue
# JP: ポーレットの動きのその度に、\nおっぱいも甘くぷるぷる震えて誘う。
1578 = "Mỗi lần Paulette chuyển động, đôi gò bồng đảo cũng rung lên bần bật đầy quyến rũ."
# monologue
# JP: 触れたいが、手は届かない。\nだから代わりに、まるいお尻のふくらみをまた――
1352 = "Muốn chạm vào, nhưng tay không với tới. Nên thay vào đó, tôi lại xoa nắn đường cong tròn trịa của cặp mông——"
# monologue
# JP: （むにいっ――むりゅっ――もみゅっ――みゅうっ）
# 1661 = "（揉來揉去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「やっ――あ――っ――おしりっ――もみもみっ――\nされるッ――っと――んっ――」
893 = "「Á——a——mông——bị xoa bóp—— Thế này——thì——ưm——」"
# monologue
# JP: スライドのリズムを取りにくいのか、\nポーレットの腰の動きが不規則になる。
1460 = "Có vẻ như khó bắt nhịp trượt, chuyển động hông của Paulette trở nên loạn nhịp."
# monologue
# JP: 押しつぶされる刺激が勃起にくわえられ、\n気持ちよすぎて、揉み込む手にも力がこもる。
1258 = "Sự kích thích do bị đè nén truyền đến dương vật, quá sướng, khiến tay tôi càng xoa bóp mạnh hơn."
# monologue
# JP: （むにっ――むにゅ――もみゅっ――みゅむん！）
# 1661 = "（揉來揉去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「あっ――んっ――ふあっ――そ、双鉄、くんっ――\nわたし――わたしっ――あのっ――」
940 = "「A——ưm——phù——a, anh Soutetsu—— Em——em——chuyện đó——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 981 = "「嗯」" 
# monologue
# JP: おしりを揉む手を一端止めて、\nポーレットの言葉の続きを待ってみる。
1358 = "Tôi tạm dừng tay xoa mông, chờ xem Paulette định nói gì tiếp."
# monologue
# JP: 背中までぱあっと赤く染め、もじもじと小さく震えつつ、\nポーレットは、それでもはっきり求めてくれる。
1477 = "Đỏ ửng cả lưng, run rẩy ngượng ngùng, nhưng Paulette vẫn nói rõ yêu cầu của mình."
# 【ポーレット】
# display as 波萊特
# JP: 「もう、おまんこ――がまんっ――できない、です――\nからっ――下さいっ――双鉄くんの――おちん、ちん」
1019 = "「Cô bé——không thể chịu đựng——được nữa, rồi—— Nên là——xin hãy cho em——dương, vật——của anh Soutetsu」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。僕も、ポーレットのおまんこが欲しい」
987 = "「Ừ. Anh cũng muốn cô bé của Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うれしっ――嬉しいです。双鉄くんっ」
1013 = "「Sướng——Em vui lắm. Anh Soutetsu」"
# monologue
# JP: 言葉と共に、白い体がいきいきと跳ね――
1556 = "Cùng với lời nói, cơ thể trắng ngần bật lên đầy sức sống——"
# 【ポーレット】
# display as 波萊特
# JP: 「ふぃぁぁあああああああああっ！！！」
920 = "「Phiaaaaaa!!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「んくっ――」
# 971 = "「嗯——」" 
# monologue
# JP: 一気に深く僕を飲み込み、\nその瞬間、ポーレットが鮮やかなまでの弓なりに――
1449 = "Nuốt trọn tôi vào sâu một mạch, ngay khoảnh khắc đó, Paulette cong người lên như một cánh cung——"
# 【双鉄H】
# display as 雙鐵
# JP: （っ！？）
1639 = "（!?）"
# monologue
# JP: 思う間も無くギュウウと膣が収縮し、\nポーレットが達したのだと、僕に伝える。
1534 = "Âm đạo co thắt lại dữ dội không kịp suy nghĩ, báo cho tôi biết Paulette đã lên đỉnh."
# 【ポーレット】
# display as 波萊特
# JP: 「ふぁっ――あっ――ハァッ――あっ――」
915 = "「Phù——a——hà——a——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット」
# 1035 = "「波萊特」" 
# monologue
# JP: 僕も、イキたい。もっと快感を貪りたい。\n思いは、素直な動きにつながる。
1339 = "Tôi cũng muốn ra. Muốn tận hưởng khoái cảm nhiều hơn nữa. Suy nghĩ ấy dẫn đến hành động một cách thành thật."
# monologue
# JP: （ぐっ）
1684 = "（Hự）"
# 【ポーレット】
# display as 波萊特
# JP: 「くひゅんっ！　ふやっ――」
982 = "Thử dập hông vào sâu hơn, cơ thể Paulette lại run lên bần bật."
# monologue
# JP: 腰を突き出し抉ってみれば、\nポーレットはまたぶるりと大きく体を震わす。
1359 = "Cứ thế cô ấy lả đi, mất hết sức lực. Có vẻ như chỉ việc chống đỡ cơ thể mình thôi cũng đã tốn hết sức rồi."
# monologue
# JP: そのままくったり、力が抜ける。\n自分の体を支えるだけで、精一杯な様子に見える。
1488 = "（Thế này thì——）"
# 【双鉄H】
# display as 雙鐵
# JP: （これは――）
1682 = "Với tư thế này, tôi không thể cử động mạnh được. Cho đến khi cơn sóng khoái cảm dịu xuống, Paulette có lẽ cũng không thể nhúc nhích."
# monologue
# JP: 体勢的に、僕から大きくは動けない。\n快感の波が落ち着くまでは、ポーレットも動けそうにない。
1494 = "......Thế nên ý thức của tôi bị thu hút. Vào một nơi khác, một lỗ nhỏ màu hồng dễ thương đang co giật run rẩy."
# monologue
# JP: ……だから意識が、引き寄せられる。\nもう一箇所の、震えヒクつくピンクのかわいいすぼまりに。
703 = "（Mơn trớnnnnn）"
# monologue
# JP: （ぬろおおおおっ）
1676 = "Dùng ngón tay thấm đẫm mật ngọt từ cô bé vuốt ve quanh lỗ hậu, âm đạo của Paulette lập tức co thắt lại."
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ！！？」
# 902 = "「呀！！？」" 
# monologue
# JP: おまんこの蜜を絡めた指で尻穴の周りを撫ぜれば、\nポーレットの膣がきゅうっと締まる。
1362 = "Thật dễ chịu——và cũng thật thú vị. Giọng nói của Paulette cũng không chỉ đơn thuần là kinh ngạc."
# monologue
# JP: 気持ちがいい――し、面白い。\nポーレットの声も、驚いているだけじゃない。
1500 = "（Nhóp——nhép——trơn——tuột——）"
# monologue
# JP: （ぬろっ――ぬとっ――ぬるっ――ぬるるっ――）
1664 = "「Á!? A——mông——ưm——lỗ, hậu—— E, em——chưa từng, tự làm——bao giờ——ưm」"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！？　あっ――お尻――んっ――アナ、ル――\nわ、わたし――自分で、したこと――なく、て――んっ」
904 = "Ngón tay không đút vào. Cũng chưa chạm trực tiếp vào hậu môn."
# monologue
# JP: （ぬりゅ――ぬろっ――もみゅ――くにゅん）
# 1664 = "（摸來摸去）" 
# monologue
# JP: 指は、挿れない。\n肛門そのものにもまだ触れてない。
1366 = "Chỉ đơn thuần kích thích xung quanh phần lõm vào nhất, như thể đang xoa tròn, nắn bóp."
# monologue
# JP: ただただひたすら、一番すぼまる部分のまわりを、\n回すように、揉み込むようにして刺激していく。
1349 = "「Em không biết——đâu——nên là——như thế này—— Phù——a——mông——lại có cảm giác, như vậy」"
# 【ポーレット】
# display as 波萊特
# JP: 「知らない――です――だから――こん、なのっ――\nふっ――あっ――おし、りっ――こんなに、感じる、の」
1011 = "「Ngay cả ở mông, cũng có thể đạt được khoái cảm tình dục nhỉ.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「お尻でも、性の快感を得ることは出来るのだな」
1006 = "「Thì......em cũng có nghe——người ta, nói, vậy——ưm—— Nhưng, mà——thực tế——lại đến mức này, thì——a——á」"
# 【ポーレット】
# display as 波萊特
# JP: 「って……話では――聞いて、た、けど――んっ――\nだけ、ど――実際――これほど、だと――かっ――あっ」
1018 = "Lỗ hậu môn đang co bóp nhấp nháy."
# monologue
# JP: アナルが、ぱくぱく動いてる。
1235 = "Trông như thể nó đang đòi hỏi ngón tay tôi, đang cầu xin tôi đút vào vậy."
# monologue
# JP: 指が欲しいと、挿れてほしいと、\nおねだりしているようにも見える。
1495 = "「Á——a——ưm——lỗ, hậu, của em—— Bị anh Soutetsu——nong......rộng, ra——ưm——」"
# monologue
# JP: （くりゅっ――くむっ――くりゅっ――もみゅ）
# 1661 = "（揉來揉去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「やっっ――あっ――ンッッ――わたしの、アナ、ル――\n双鉄、くんに――広げ……られ、て――んうっっ――」
890 = "Tôi kéo nhẹ phần thịt xung quanh, nong rộng lỗ hậu dễ thương ra một chút."
# monologue
# JP: 周辺の肉を引くようにして、\nかわいいアナルをわずかに広げる。
1356 = "Có vẻ như độ co giãn khá tốt. Hơn nữa, nó còn đang ngọ nguậy như thèm khát——"
# monologue
# JP: 柔軟性は、相当ありそうな印象だ。\nそれに、欲しそうにうごめいてるし――
1536 = "「Có muốn thử làm tình......bằng lỗ hậu không?」"
# 【双鉄H】
# display as 雙鐵
# JP: 「アナルで……セックスしてみるか？」
1052 = "（Phụt）"
# monologue
# JP: （くぷっ）
1650 = "「Hyaaaaaaa!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃああああああんっ！！」
899 = "（Siếttttttt!）"
# monologue
# JP: （ギチチチチチチっ！）
1673 = "「Đau——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「痛っ――」
995 = "Đầu ngón tay vừa thử đút vào, đã bị hậu môn siết chặt dữ dội như muốn đẩy ra."
# monologue
# JP: 試みにいれた指先を、\nけれど肛門は強烈な締めで排除しようと試みてくる。
1376 = "Nếu vừa rồi là dương vật của tôi thì—— Nghĩ đến thôi cũng khiến hai hòn bi sun lại."
# monologue
# JP: 今のが、僕の勃起なら――\n思えばひゅんと、玉が縮こまってしまいさえする。
1306 = "「Cái đó......lỗ hậu——tự nhiên, em...... Cũng cảm thấy rất có hứng thú——nhưng mà」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの……アナルも――わたし、興味……\nいきなり、すごく――出てきちゃった――です、けど」
1062 = "（Siếtttt!）"
# monologue
# JP: （ずりゅうううっ！）
1658 = "Hông Paulette giật mạnh."
# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 954 = "「啊！」" 
# monologue
# JP: ポーレットの腰が大きく動く。
1461 = "Khuôn mặt đỏ bừng, Paulette truyền đạt cho tôi bằng cả cơ thể lẫn lời nói."
# monologue
# JP: 顔を真っ赤に染めながら、\n体で、言葉で、ポーレットは僕に伝えてくれる。
1293 = "「Tinh dịch——của anh Soutetsu——nhận vào, tử cung——ưm—— Vào cô bé——vẫn là, tuyệt nhất, nên là——」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄、くんの――精液――子宮、に――んっ――\nおまん、こに――もらう、のが――、一番、だからっ――」
872 = "（Phập!）"
# monologue
# JP: （ずんっ！）
1641 = "「Á!」"
# 【ポーレット】
# display as 波萊特
# JP: 「くひゅっ！」
900 = "「Đúng vậy nhỉ——Anh cũng——, tuyệt nhất là—— Tuyệt nhất là——anh vẫn muốn làm thế——」"
# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな――僕も――、一番はっ――\n一番は――やはり、そうしたいっ――」
1026 = "（Phập——phập——nhóp——nhép——）"
# monologue
# JP: （ずっ――ずぶっ――ぶじゅ――じゅぶっ――）
1643 = "「Vâng——làm đi! Hãy làm, đi ạ——ưm—— Bắn tinh dịch——vào sâu, nhất——bên trong, em đi」"
# 【ポーレット】
# display as 波萊特
# JP: 「はいっ――してっ！　してっ、くださ――んっ――\nわたしの――、一番――おく、にっ――精、液っ」
972 = "Không biết có phải do kích thích lỗ hậu hay không, âm đạo của Paulette trơn ướt và quấn chặt hơn bình thường."
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 981 = "「嗯」" 
# monologue
# JP: （ずっ――ずぶっ――ずじゅっ――じゅぶっ！）
# 1643 = "（啾噗——啾噗——啾啪——啾啪——）" 
# monologue
# JP: アナルを刺激したせいなのか、\nポーレットの膣はいつもよりぬらつき、絡みついてくる。
1468 = "「A——của anh Soutetsu——to hơn, bình thường—— Phù——to, quá——bị nong rộng, ra——a」"
# monologue
# JP: （にゅむっ――むっ――にぢゅ――ぢゅむっ――）
# 1643 = "（啾噗——啾噗——啾啪——啾啪——）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ――双鉄くん、のっ――いつも、よりっ――\nふあっ――ふと、くてっ――めくれ、てっ――あっ」
937 = "Dù vậy, hông tôi vẫn không dừng lại."
# monologue
# JP: それでも、腰は止まらない。
1369 = "Hơi thở của tôi và Paulette, nhịp điệu của cả hai dần hòa làm một."
# monologue
# JP: ポーレットと僕、ふたりの呼吸が、\nリズムが徐々に、一致していく。
1454 = "（Nhóp! Nhép! Nhóp! Nhép!!）"
# monologue
# JP: （じゅぶっ！　じゅっ！　じゅずっ！　じゅぶっ！！）
1645 = "「Phù——a——sâu, quá——thế này—— Ưm——sướng quá——cảm giác, như đâm, vào tận bụng, vậy」"
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ――ふか、いっ――これっ――\nんっ――すごい――おな、か――ささる、みたい、でっ」
919 = "（Phập! Phập! Phập! Nhóp nhép!）"
# monologue
# JP: （ぱぢゅっ！　ぱちゅっ！　ぱちゅんっ！　じゅぶっ！）
1642 = "「A——không được——em——lại—— Lại——ra——ra mất!!」"
# monologue
# JP: ポーレットの腰が踊り始める。\n接合部の蜜はもう、泡立ちにごり粘ってる。
1466 = "Hông Paulette bắt đầu nhảy múa. Mật ngọt ở nơi giao hợp đã sủi bọt đục ngầu và dính dớp."
# monologue
# JP: 勃起の全部が強い握力のゼリーの指に握られて、\n潰されるほどに締められて、それでも速度は加速していく。
1575 = "Toàn bộ dương vật cương cứng bị nắm lấy bởi những ngón tay thạch có lực bóp mạnh, bị siết chặt đến mức như muốn nghiền nát, nhưng tốc độ vẫn không ngừng tăng lên."
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――アッ！　双鉄くんっ――顔っ――おかおっ、\nみたい――みたいよぉっ――」
912 = "「Hà——á! Anh Soutetsu——mặt——khuôn mặt anh, Em muốn nhìn——muốn nhìn quá——」"
# monologue
# JP: （ギュリュッ）
1638 = "（Ngoáy）"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぉっ！」
# 954 = "「啊！」" 
# monologue
# JP: ポーレットが視線をこちらへ無理に向ければ、\n腰もねじれて、勃起に思わぬひねりがかかる。
1456 = "Paulette cố gắng ngoái đầu nhìn về phía này, hông cũng vặn theo, tạo ra một lực xoắn bất ngờ lên dương vật."
# 【ポーレット】
# display as 波萊特
# JP: 「ね？　双鉄くんっ――、一緒――、一緒にっ――」
873 = "「Nhé? Anh Soutetsu——, cùng nhau——, cùng nhau nhé——」"
# monologue
# JP: （ずろっ！　ぱんっ！　ずばっ！　すぱんっ！）
# 1642 = "（啾啪！啾啪！啾噗！啾噗！）" 
# 【双鉄H】
# display as 雙鐵
# JP: 「ああっ――」
# 971 = "「嗯——」" 
# monologue
# JP: ポーレットの体の重み、肉の重みが動きと共に僕を叩く。
1472 = "Trọng lượng cơ thể Paulette, sức nặng của da thịt đập vào tôi theo từng nhịp chuyển động."
# monologue
# JP: （きゅっ！　きゅむっ！　にゅるっ！　にゅううっ！）
# 1642 = "（啾啪！啾啪！啾噗！啾噗！）" 
# monologue
# JP: リズムに、速度に、膣の蠢きはおいつけてない。
1479 = "Sự ngọ nguậy của âm đạo không thể theo kịp nhịp điệu và tốc độ."
# monologue
# JP: ぬかるんですがり張り付く柔肉を、\nむりゅむりゅ剥がしまたむりゅむりゅと割り入って――
1482 = "Bóc tách phần thịt mềm nhão bám chặt lấy, rồi lại tiếp tục chẻ vào bên trong——"
# 【ポーレット】
# display as 波萊特
# JP: 「やあっ――えぐれ――ってっ――けどっ――っ――\nもっと――あっ――もっ――ふか、くっ――にっ――」
894 = "「Á——bị ngoáy sâu——vào rồi——nhưng mà—— Hơn nữa——a——hơn, nữa——sâu, hơn——nữa——」"
# monologue
# JP: （ずぶんんっ！！！）
1640 = "（Phập!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃんっ！！」
901 = "「Hyan!!」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ぉあっ！」
# 954 = "「啊！」" 
# monologue
# JP: 腰と腰とが食い込むほどに密着し合い、\n勃起の先が、ポーレットの子宮の入り口を強く押す。
1345 = "Hai hông dính sát vào nhau đến mức như muốn lún vào, đầu dương vật ấn mạnh vào cửa tử cung của Paulette."
# monologue
# JP: （にゅむっ――にゅっ――きゅうううううっ）
1671 = "（Nhóp——nhép——siếttttt）"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 954 = "「啊！」" 
# monologue
# JP: 精子を、おねだりする吸いつき。\n僕も、ポーレットももうギリギリだ。
1314 = "Lực hút như đang vòi vĩnh tinh trùng. Cả tôi và Paulette đều đã đến giới hạn."
# monologue
# JP: それをはっきり自覚したなら、\nやはり自分で――自分から思いきり貪りたくてっ！
1401 = "Một khi đã nhận thức rõ điều đó, quả nhiên tôi vẫn muốn tự mình——muốn tự mình tận hưởng cho thỏa thích!"
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット！　ポーレット！　ポーレット！！」
1036 = "「Paulette! Paulette! Paulette!!」"
# monologue
# JP: （ずぶっ！　ずぶんっ！　じゅぶっ！　じゅちゅ！）
# 1642 = "（啾啪！啾啪！啾噗！啾噗！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんっ――あっ――そうてつ、くぅんっ」
1069 = "「Anh Soutetsu——a——anh Soutetsu」"
# monologue
# JP: 思いっきりに腰をつかんで、\n子宮の口に勃起の先を押し当て擦り捻じり込む。
1334 = "Tóm chặt lấy hông cô ấy, tôi ép sát đầu dương vật vào cửa tử cung, cọ xát và vặn sâu vào."
# monologue
# JP: 膣肉はもうひたすらに締めて張り付いて来て、\nその単純な刺激が僕を真っ白にしてっ！
1539 = "Lớp thịt âm đạo cứ thế siết chặt và bám riết lấy, sự kích thích đơn thuần ấy khiến đầu óc tôi trở nên trống rỗng!"
# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 954 = "「啊！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「いっ――あっああああああああああああんっ！！」
927 = "「Í——a á a a a a a a a a a a!!」"
# monologue
# JP: （びゅっ！　びゅるっ！　どびゅうっ！　んびゅっ！！）
1656 = "（Phụt! Phụt! Phụtttt! Phụt!!）"
# monologue
# JP: 精が、弾ける。
1512 = "Tinh dịch, tuôn trào."
# monologue
# JP: 弾けたそれはびゅくびゅくと、\n一瞬にしてポーレットの子宮を満たしてく。
1262 = "Dòng tinh dịch phun ra xối xả, chỉ trong chốc lát đã lấp đầy tử cung của Paulette."
# monologue
# JP: （びゅつ――びゅううっ――びゅっ――びゅううっ）
1652 = "（Phụt——phụtttt——phụt——phụtttt）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ――いっぱい――いっぱいっ――\nんっ、双鉄、くんの――精液――子宮――にっ――」
917 = "「Phù——a——nhiều quá——nhiều quá—— Ưm, của anh Soutetsu——tinh dịch——vào trong, tử cung——rồi——」"
# monologue
# JP: （びゅっ――びゅりゅ――びゅう――びゅ――）
# 1652 = "（噗噗——噗噗——噗嚕——噗嚕）" 
# monologue
# JP: 射精しきって。\nポーレットはまだ、腰を思い切り下げてきている。
1311 = "Đã xuất tinh xong. Nhưng Paulette vẫn ra sức đè hông xuống."
# monologue
# JP: 僕の勃起をフタにつかって、精液全部を閉じ込めて――
1279 = "Cô ấy dùng dương vật của tôi như một cái nắp, nhốt toàn bộ tinh dịch lại——"
# 【ポーレット】
# display as 波萊特
# JP: 「……赤ちゃん、わたし――欲しい、です」
711 = "「......Em——muốn có, em bé.」"
# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、僕もだ」
988 = "「Ừ, anh cũng vậy.」"
# monologue
# JP: ――子宮を、卵子を、僕の精液が溺れさせてる。\nポーレットがそれを望んでる。
1457 = "——Tử cung, trứng, đang ngập chìm trong tinh dịch của tôi. Paulette đang khao khát điều đó."
# monologue
# JP: その快感が、射精よりもっと甘く狂おしく、\n脊髄を脳を精巣を、一瞬にして満たしてくれる。
1565 = "Khoái cảm đó còn ngọt ngào và cuồng nhiệt hơn cả khi xuất tinh, chỉ trong tích tắc đã lấp đầy tủy sống, não bộ và tinh hoàn của tôi."
# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット」
# 1035 = "「波萊特」" 
# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くん」
992 = "「Vâng, anh Soutetsu.」"
# monologue
# JP: ただそれだけで、言葉は余分すぎるくらいだ。
1182 = "Chỉ cần như vậy thôi, lời nói dường như đã trở nên quá dư thừa."
# monologue
# JP: 求めるままに、そうして求められるまま。\n僕らは体を重ね合い、長くて緩いキスをする。
1346 = "Cứ thế khao khát, và được khao khát. Chúng tôi đan lấy nhau, trao nhau nụ hôn dài và chậm rãi."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……んっ――ちゅっ――ちゅむっ――\nちゅきっ――好きっ――ンッ――双鉄、くぅん」
946 = "「A......ưm——chụt——chu—— Thích——thích anh lắm——ưm——anh Soutetsu」"
# monologue
# JP: 誘惑、されてる。\nアイスコーヒーも、シチュエーションも何も無くても。
1374 = "Bị quyến rũ mất rồi. Dù chẳng cần cà phê đá, hay bất cứ hoàn cảnh nào đi nữa."
# monologue
# JP: セックスをして、肉の欲望が冷めたあとでも、\n唇だけの甘えたキスを、ただ繰り返すそれだけで。
1257 = "Kể cả sau khi làm tình, khi dục vọng thể xác đã nguội lạnh, chỉ cần những nụ hôn nũng nịu lặp đi lặp lại trên môi thôi là đủ."
# 【双鉄H】
# display as 雙鐵
# JP: （これが……恋をするということか）
1681 = "（Đây là......cảm giác khi yêu sao.）"
# monologue
# JP: ポーレットがそこにいるだけで、\n僕はいつでも、誘惑される。
1452 = "Chỉ cần có Paulette ở đó, tôi lúc nào cũng bị quyến rũ."
# monologue
# JP: 自覚をすれば少し怖くて、その何倍も幸せで。\nそうして僕は愛しい人を、ぎゅっとぎゅうっと抱き締める。
1566 = "Nhận ra điều đó khiến tôi có chút sợ hãi, nhưng hạnh phúc lại nhân lên gấp bội. Thế rồi, tôi ôm người mình yêu thật chặt, thật chặt."
