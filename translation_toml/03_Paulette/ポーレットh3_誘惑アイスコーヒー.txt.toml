# JP: （ずっ――ずぶっ――ずじゅっ――じゅぶっ！）
# 1643 = "（啾噗——啾噗——啾啪——啾啪——）" 

# monologue
# JP: アナルを刺激したせいなのか、\nポーレットの膣はいつもよりぬらつき、絡みついてくる。
1468 = "Không biết có phải do kích thích lỗ hậu\nhay không,\nâm đạo của Paulette trơn ướt và quấn chặt\nhơn bình thường."

# monologue
# JP: （にゅむっ――むっ――にぢゅ――ぢゅむっ――）
# 1643 = "（啾噗——啾噗——啾啪——啾啪——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ――双鉄くん、のっ――いつも、よりっ――\nふあっ――ふと、くてっ――めくれ、てっ――あっ」
937 = "「A——của anh Soutetsu——to hơn, bình\nthường——\nPhù——to, quá——bị nong rộng, ra——a」"

# monologue
# JP: それでも、腰は止まらない。
1369 = "Hơi thở của tôi và Paulette,\nnhịp điệu của cả hai dần hòa làm một."

# monologue
# JP: ポーレットと僕、ふたりの呼吸が、\nリズムが徐々に、一致していく。
1454 = "（Nhóp! Nhép! Nhóp! Nhép!!）"

# monologue
# JP: （じゅぶっ！　じゅっ！　じゅずっ！　じゅぶっ！！）
1645 = "（Phập! Phập! Phập! Nhóp nhép!）"

# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ――ふか、いっ――これっ――\nんっ――すごい――おな、か――ささる、みたい、でっ」
919 = "「A——không được——em——lại——\nLại——ra——ra mất!!」"

# monologue
# JP: （ぱぢゅっ！　ぱちゅっ！　ぱちゅんっ！　じゅぶっ！）
1642 = "Hông Paulette bắt đầu nhảy múa.\nMật ngọt ở nơi giao hợp đã sủi bọt đục\nngầu và dính dớp."

# monologue
# JP: ポーレットの腰が踊り始める。\n接合部の蜜はもう、泡立ちにごり粘ってる。
1466 = "Toàn bộ dương vật cương cứng bị nắm lấy\nbởi những ngón tay thạch có lực bóp mạnh,\nbị siết chặt đến mức như muốn nghiền nát,\nnhưng tốc độ vẫn không ngừng tăng lên."

# monologue
# JP: 勃起の全部が強い握力のゼリーの指に握られて、\n潰されるほどに締められて、それでも速度は加速していく。
1575 = "Toàn bộ dương vật cương cứng bị nắm lấy\nbởi những ngón tay thạch có lực bóp mạnh,\nbị siết chặt đến mức như muốn nghiền nát,\nnhưng tốc độ vẫn không ngừng tăng lên."

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――アッ！　双鉄くんっ――顔っ――おかおっ、\nみたい――みたいよぉっ――」
912 = "「Hà——á! Anh Soutetsu——mặt——khuôn mặt anh,\nEm muốn nhìn——muốn nhìn quá——」"

# monologue
# JP: （ギュリュッ）
1638 = "（Ngoáy）"

# 【双鉄H】
# display as 雙鐵
# JP: 「ぉっ！」
# 954 = "「啊！」" 

# monologue
# JP: ポーレットが視線をこちらへ無理に向ければ、\n腰もねじれて、勃起に思わぬひねりがかかる。
1456 = "Paulette cố gắng ngoái đầu nhìn về phía\nnày,\nhông cũng vặn theo, tạo ra một lực xoắn\nbất ngờ lên dương vật."

# 【ポーレット】
# display as 波萊特
# JP: 「ね？　双鉄くんっ――、一緒――、一緒にっ――」
873 = "「Nhé? Anh Soutetsu——, cùng nhau——, cùng\nnhau nhé——」"

# monologue
# JP: （ずろっ！　ぱんっ！　ずばっ！　すぱんっ！）
# 1642 = "（啾啪！啾啪！啾噗！啾噗！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああっ――」
# 971 = "「嗯——」" 

# monologue
# JP: ポーレットの体の重み、肉の重みが動きと共に僕を叩く。
1472 = "Trọng lượng cơ thể Paulette, sức nặng của\nda thịt đập vào tôi theo từng nhịp chuyển\nđộng."

# monologue
# JP: （きゅっ！　きゅむっ！　にゅるっ！　にゅううっ！）
# 1642 = "（啾啪！啾啪！啾噗！啾噗！）" 

# monologue
# JP: リズムに、速度に、膣の蠢きはおいつけてない。
1479 = "Sự ngọ nguậy của âm đạo không thể theo kịp\nnhịp điệu và tốc độ."

# monologue
# JP: ぬかるんですがり張り付く柔肉を、\nむりゅむりゅ剥がしまたむりゅむりゅと割り入って――
1482 = "Bóc tách phần thịt mềm nhão bám chặt lấy,\nrồi lại tiếp tục chẻ vào bên trong——"

# 【ポーレット】
# display as 波萊特
# JP: 「やあっ――えぐれ――ってっ――けどっ――っ――\nもっと――あっ――もっ――ふか、くっ――にっ――」
894 = "「Á——bị ngoáy sâu——vào rồi——nhưng mà——\nHơn nữa——a——hơn, nữa——sâu, hơn——nữa——」"

# monologue
# JP: （ずぶんんっ！！！）
1640 = "（Phập!!!）"

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃんっ！！」
901 = "「Hyan!!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ぉあっ！」
# 954 = "「啊！」" 

# monologue
# JP: 腰と腰とが食い込むほどに密着し合い、\n勃起の先が、ポーレットの子宮の入り口を強く押す。
1345 = "Hai hông dính sát vào nhau đến mức như\nmuốn lún vào,\nđầu dương vật ấn mạnh vào cửa tử cung của\nPaulette."

# monologue
# JP: （にゅむっ――にゅっ――きゅうううううっ）
1671 = "（Nhóp——nhép——siếttttt）"

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 954 = "「啊！」" 

# monologue
# JP: 精子を、おねだりする吸いつき。\n僕も、ポーレットももうギリギリだ。
1314 = "Lực hút như đang vòi vĩnh tinh trùng.\nCả tôi và Paulette đều đã đến giới hạn."

# monologue
# JP: それをはっきり自覚したなら、\nやはり自分で――自分から思いきり貪りたくてっ！
1401 = "Một khi đã nhận thức rõ điều đó,\nquả nhiên tôi vẫn muốn tự mình——muốn tự\nmình tận hưởng cho thỏa thích!"

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット！　ポーレット！　ポーレット！！」
1036 = "「Paulette! Paulette! Paulette!!」"

# monologue
# JP: （ずぶっ！　ずぶんっ！　じゅぶっ！　じゅちゅ！）
# 1642 = "（啾啪！啾啪！啾噗！啾噗！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんっ――あっ――そうてつ、くぅんっ」
1069 = "「Anh Soutetsu——a——anh Soutetsu」"

# monologue
# JP: 思いっきりに腰をつかんで、\n子宮の口に勃起の先を押し当て擦り捻じり込む。
1334 = "Tóm chặt lấy hông cô ấy,\ntôi ép sát đầu dương vật vào cửa tử cung,\ncọ xát và vặn sâu vào."

# monologue
# JP: 膣肉はもうひたすらに締めて張り付いて来て、\nその単純な刺激が僕を真っ白にしてっ！
1539 = "Lớp thịt âm đạo cứ thế siết chặt và bám\nriết lấy,\nsự kích thích đơn thuần ấy khiến đầu óc\ntôi trở nên trống rỗng!"

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 954 = "「啊！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いっ――あっああああああああああああんっ！！」
927 = "「Í——a á a a a a a a a a a a!!」"

# monologue
# JP: （びゅっ！　びゅるっ！　どびゅうっ！　んびゅっ！！）
1656 = "（Phụt! Phụt! Phụtttt! Phụt!!）"

# monologue
# JP: 精が、弾ける。
1512 = "Tinh dịch, tuôn trào."

# monologue
# JP: 弾けたそれはびゅくびゅくと、\n一瞬にしてポーレットの子宮を満たしてく。
1262 = "Dòng tinh dịch phun ra xối xả,\nchỉ trong chốc lát đã lấp đầy tử cung của\nPaulette."

# monologue
# JP: （びゅつ――びゅううっ――びゅっ――びゅううっ）
1652 = "（Phụt——phụtttt——phụt——phụtttt）"

# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ――いっぱい――いっぱいっ――\nんっ、双鉄、くんの――精液――子宮――にっ――」
917 = "「Phù——a——nhiều quá——nhiều quá——\nƯm, của anh Soutetsu——tinh dịch——vào\ntrong, tử cung——rồi——」"

# monologue
# JP: （びゅっ――びゅりゅ――びゅう――びゅ――）
# 1652 = "（噗噗——噗噗——噗嚕——噗嚕）" 

# monologue
# JP: 射精しきって。\nポーレットはまだ、腰を思い切り下げてきている。
1311 = "Đã xuất tinh xong.\nNhưng Paulette vẫn ra sức đè hông xuống."

# monologue
# JP: 僕の勃起をフタにつかって、精液全部を閉じ込めて――
1279 = "Cô ấy dùng dương vật của tôi như một cái\nnắp, nhốt toàn bộ tinh dịch lại——"

# 【ポーレット】
# display as 波萊特
# JP: 「……赤ちゃん、わたし――欲しい、です」
711 = "「……Em——muốn có, em bé.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、僕もだ」
988 = "「Ừ, anh cũng vậy.」"

# monologue
# JP: ――子宮を、卵子を、僕の精液が溺れさせてる。\nポーレットがそれを望んでる。
1457 = "——Tử cung, trứng, đang ngập chìm trong\ntinh dịch của tôi.\nPaulette đang khao khát điều đó."

# monologue
# JP: その快感が、射精よりもっと甘く狂おしく、\n脊髄を脳を精巣を、一瞬にして満たしてくれる。
1565 = "Khoái cảm đó còn ngọt ngào và cuồng nhiệt\nhơn cả khi xuất tinh,\nchỉ trong tích tắc đã lấp đầy tủy sống,\nnão bộ và tinh hoàn của tôi."

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット」
# 1035 = "「波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くん」
992 = "「Vâng, anh Soutetsu.」"

# monologue
# JP: ただそれだけで、言葉は余分すぎるくらいだ。
1182 = "Chỉ cần như vậy thôi, lời nói dường như đã\ntrở nên quá dư thừa."

# monologue
# JP: 求めるままに、そうして求められるまま。\n僕らは体を重ね合い、長くて緩いキスをする。
1346 = "Cứ thế khao khát, và được khao khát.\nChúng tôi đan lấy nhau, trao nhau nụ hôn\ndài và chậm rãi."

# 【ポーレット】
# display as 波萊特
# JP: 「あ……んっ――ちゅっ――ちゅむっ――\nちゅきっ――好きっ――ンッ――双鉄、くぅん」
946 = "「A……ưm——chụt——chu——\nThích——thích anh lắm——ưm——anh Soutetsu」"

# monologue
# JP: 誘惑、されてる。\nアイスコーヒーも、シチュエーションも何も無くても。
1374 = "Bị quyến rũ mất rồi.\nDù chẳng cần cà phê đá, hay bất cứ hoàn\ncảnh nào đi nữa."

# monologue
# JP: セックスをして、肉の欲望が冷めたあとでも、\n唇だけの甘えたキスを、ただ繰り返すそれだけで。
1257 = "Kể cả sau khi làm tình, khi dục vọng thể\nxác đã nguội lạnh,\nchỉ cần những nụ hôn nũng nịu lặp đi lặp\nlại trên môi thôi là đủ."

# 【双鉄H】
# display as 雙鐵
# JP: （これが……恋をするということか）
1681 = "（Đây là……cảm giác khi yêu sao.）"

# monologue
# JP: ポーレットがそこにいるだけで、\n僕はいつでも、誘惑される。
1452 = "Chỉ cần có Paulette ở đó,\ntôi lúc nào cũng bị quyến rũ."

# monologue
# JP: 自覚をすれば少し怖くて、その何倍も幸せで。\nそうして僕は愛しい人を、ぎゅっとぎゅうっと抱き締める。
1566 = "Nhận ra điều đó khiến tôi có chút sợ hãi,\nnhưng hạnh phúc lại nhân lên gấp bội.\nThế rồi, tôi ôm người mình yêu thật chặt,\nthật chặt."
