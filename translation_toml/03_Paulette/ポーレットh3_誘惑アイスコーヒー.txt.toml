[script]
# lines: 313 
# 【双鉄H】
# display as 雙鐵
# JP: 「む――これか？」
910 = "「呃，是這個嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、それっぽい。見せてください。……うんっ！　これ、\nこれです！　助かった～、ありがとう、双鉄くん！」
986 = "「嗯，好像是這個。讓我看一下。……嗯！是這個，就是這個！真是幫大忙了，謝謝你，雙鐵君！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「いや、\n礼をいわれるべきは僕ではなく、汰斗さんだろう」
864 = "「不用，要謝的不是我，而是汰斗先生吧」" 

# monologue
# JP: 御一夜駅を発着する貨物列車の本数と、\nその総輸送量との統計データ。
1347 = "我們要找的是御一夜站發送的貨運列車班次和運輸總量的統計數據。" 

# monologue
# JP: 関連質問の通告を受け、急ぎ探したが、\n市役所内にも御一夜鉄道にも無かったものだ。
1255 = "在接到相關的詢問後，我們趕忙尋找了一下，但是市政府和御一夜鐵道都沒有這個數據。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「何故集めたのか――そこは僕には理解できんが、\nしかし実際、このコレクションに大いに助けられている」
1068 = "「雖然我不知道他為什麼收集了這些數據——但是這些東西真是幫了大忙了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですよねー」
1005 = "「就是啊」" 

# monologue
# JP: 深い頷き。
1475 = "波萊特重重地點點頭。" 

# monologue
# JP: ポーレットはどこかうっとりした目で、\n資料の山をぐるり見渡す。
1290 = "她用有些恍惚的眼神望著堆成山的資料。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ここの資料はまぎれも無い一級品ですからね。\n前にも――」
1060 = "「這裡的資料都特別有用。之前也是——」" 

# monologue
# JP: そこまで言って、ポーレットの声が止まってしまう。
1554 = "說到這裡，波萊特聲音一頓。" 

# monologue
# JP: 顔はわずかに赤らんで、\nもぞもぞと、恥ずかしそうなそぶりを見せ――ああ。
1292 = "她的小臉掛上了紅暈，扭扭捏捏地好像有些害臊——我想起來了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「前には、騒動が起きてしまったものな」
867 = "「之前引起了一陣騷動呢」" 

# monologue
# JP: 言えばすぐさま、ポーレットは嬉しさと照れとを交えた、\nなんともはにかんだ顔になる。
1516 = "聽我這麼一說，波萊特是又喜又羞，露出了靦腆的表情。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あのときはごめんなさい。……急にれいなが、その……\nパンツ、見えてるって……それで、すごく慌てちゃって」
1066 = "「那時候真是不好意思……因為玲奈突然說那個……我的內褲露出來了……所以我就非常慌」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
993 = "「嗯？」" 

# monologue
# JP: ポーレットが教えてくれたことだ。
1453 = "波萊特告訴過我一件事情。" 

# monologue
# JP: 好きな異性の視線には、女の子は特に敏感で、\n偶然見えるものはその実、意識的に見せているのだと。
1268 = "女孩子對喜歡的異性的視線非常敏感，表面上是偶然看到的東西，其實人家是故意讓你看的。" 

# 【双鉄H】
# display as 雙鐵
# JP: （ならば、ポーレットはあの時には僕のことをまだ……\nああいや、違う。単に、僕が“見ていなかった”のか）
1683 = "（這麼一說，波萊特那時候還沒有對我……啊不對，只是我沒有看而已）" 

# monologue
# JP: 僕の視線と意識とは、資料探しにだけ向けられて、\nゆえにポーレットはまったくそれを気にしなかった。
1363 = "我當時的視線和意識都用在了查找資料上，所以波萊特就沒有注意這方面的事情。" 

# monologue
# JP: そこにれいなの指摘が飛んで、不意打ちとなり――\n結果、あれほどバタバタとしてしまったのだろう。
1490 = "然後玲奈冷不防地指了出來，最後就鬧出了一通騷動。" 

# 【双鉄H】
# display as 雙鐵
# JP: （しかし……今考えると、多少もったいなかったか）
1637 = "（可是現在回想起來…還有點浪費了" 

# monologue
# JP: あの時は、パンツごときで何故あれほどの騒ぎとなるのか、\nとんと見当もつかなかったが――
1570 = "那時候我還覺得不就是露個內褲，有什麼可大驚小怪的——" 

# 【ポーレット】
# display as 波萊特
# JP: 「今なら……少しは、見たいって思ってくれますか？」
1040 = "「現在的話……你會有點想看了嗎？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
907 = "「呃」" 

# monologue
# JP: 心を見ぬかれたような気がして、一瞬焦り、\nけれどもすぐに、推測は容易だっただろうと理解する。
1365 = "我的想法被她看透，這讓我一時慌亂，不過我馬上就明白這個非常好猜。" 

# monologue
# JP: 僕は今、ほぼ無意識にまじまじと――\nポーレットの下半身へと、視線を注ぎ続けていたから。
1247 = "因為現在我無意識地用熱切的眼神盯著波萊特的下半身。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、思う」
989 = "「嗯，我想看」" 

# monologue
# JP: ならば、何を取り繕う必要も無い。\n感じていること、思うこと。それを素直に言葉になおす。
1567 = "那我也不必掩飾什麼了。我只需把我的所思所想直接說出來就好。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「少しどころか、大いに見たい。パンツを、ではなく、\nポーレットの魅力的な姿を見たい」
1009 = "「我不僅是有點想看，而是特別想看。我想看的不僅是內褲，而是魅力四射的你」" 

# 【ポーレット】
# display as 波萊特
# JP: 「み、魅力的――ですか？」
1072 = "「魅、魅力四射？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。具体的には、僕の視線を自覚しつつも、\n偶然を装って誘惑をかける、そんな姿を見てみたい」
980 = "「嗯。具體來說，就是你一邊在意著我的視線，一邊裝作是偶然來誘惑我，我想看這樣的你」" 

# monologue
# JP: ふんわり、と――\n頬をピンクに染めたまま、満足そうな柔らかな笑み。
1462 = "波萊特的小臉已經染上了一片緋紅，同時她露出了滿意的笑容。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……\nわたしが前いったこと、覚えててくれたんですね？」
1071 = "「雙鐵君……你記得我之前告訴你的事啊」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ。\n僕にとっては衝撃的な事実を教えてもらったのだから」
1067 = "「那當然。對於我來說這是一個很讓人震驚的事實」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。双鉄くんのご希望なら、\nわたし、頑張ってみます」
1016 = "「我明白了。既然你想看，我就努力一下」" 

# monologue
# JP: 言って、ポーレットは瞼を閉じる。
1555 = "說完，波萊特閉上了眼睛。" 

# monologue
# JP: 沈思黙考――\nややあって開かれた青い瞳は、強い光を帯びている。
1273 = "她思考了一陣——隨後她睜開了藍色的大眼睛，眼神中帶上了堅定的神色。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……王道でいってみようと思います。\n移動しましょう。一緒に来てください」
709 = "「……我就用最典型的方法吧。我們走吧，跟我來」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ――」
971 = "「嗯——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いいですか？　双鉄くんは残業の休憩中です。\nわたしが声をかけたら、振り返ってくださいね？」
1048 = "「聽好了，現在你因為加班在休息。我叫你的時候，你就回頭看我」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「わかった」
996 = "「好的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「こほん――\n『そ、双鉄くん。残業、お疲れ様です』」
926 = "「咳。『雙、雙鐵君。你加班辛苦了」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
981 = "「嗯」" 

# monologue
# JP: （くるっ）
1667 = "（撲通）" 

# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？」
903 = "「呀！？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うぉっ！？」
929 = "「哇！？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ご！　ごめんなさいっ！？」
1002 = "「對！對不起！」" 

# monologue
# JP: ズボンが濡れる。\nポーレットがしゃがみこんでいる。
1371 = "我的褲子被打濕了。波萊特蹲了下去。" 

# monologue
# JP: 僕のズボンを濡らした、これは……
1389 = "把我褲子弄濕的液體是……" 

# 【双鉄H】
# display as 雙鐵
# JP: 「アイスコーヒーか？」
874 = "「冰咖啡？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんにリラックスして欲しいって思って……\nほんと、ごめんなさい。すぐ拭きますね――あれ？」
1014 = "「我想讓你放鬆一下……真的對不起，我馬上給你擦——咦？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
908 = "「呃！」" 

# monologue
# JP: ハンカチを探してるのだろうか？
1288 = "她是在找手帕嗎？" 

# monologue
# JP: ポーレットの手が胸ポケットを、尻ポケットを、\n探って動くそのたびに――
1455 = "波萊特在胸前的口袋和臀部的口袋裡翻來找去——" 

# 【双鉄H】
# display as 雙鐵
# JP: （む、ぅ……）
1648 = "（喔……）" 

# monologue
# JP: ポーレットの胸がふるふる震える。\nあの最高のおっぱいが、僕の視線を釘付けにする。
1470 = "波萊特的雙峰上下顛動了起來。我的視線被這對迷人的果實深深吸引了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、やだ――わたしにもかかっちゃってる」
956 = "「啊，討厭——我身上也灑上了」" 

# monologue
# JP: （ぷちっ――ぷちっ――）
1675 = "（解開鈕扣）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 908 = "「呃！」" 

# monologue
# JP: 胸のボタンが、ひとつ、ふたつ――\nそうして、みっつ、かなり大きく開けられる。
1297 = "她解開了第一個、第二個——直到第三個鈕扣，然後胸口就敞開了。" 

# monologue
# JP: 胸の谷間が丸見えになる。見えそうで見えない乳首の姿に、\n想像と欲望とが駆り立てられる。
1579 = "雙峰形成的山谷呈現在我眼前。若隱若現的乳頭勾引著人的想像和欲望。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……\nスカートも、染みになっちゃう」
951 = "「啊……裙子上要留下汙漬了」" 

# monologue
# JP: 腰のホックを外して器用にスカートを脱ぎ、\n脱いだスカートのポッケを探って……
1298 = "她解開腰部的鉤子，脫下裙子，然後在脫下的裙子的口袋裡翻找……" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありました。ティッシュ。\nこれで、今すぐ拭きますから」
1024 = "「找到紙巾了。我現在就用這個給你擦」" 

# monologue
# JP: （こしゅっ）
1669 = "（擦拭）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
935 = "「啊——」" 

# monologue
# JP: 太ももの上に置かれたティッシュが、\n否応なしにセックスのことを連想させる。
1252 = "在我大腿上磨蹭的紙巾毫無疑問會讓人聯想到做愛的動作。" 

# monologue
# JP: (しゅっ――こしゅ――こすっ――）
37 = "(擦來擦去）" 

# monologue
# JP: 太ももを、その内側を、\n強すぎず弱すぎぬ指に擦られる。
1465 = "波萊特的手指用恰到好處的力道摩擦著我的大腿外側和內側。" 

# monologue
# JP: 心地よいから、焦れったくなる。\nもっと、ダイレクトに触れて欲しくて――
1246 = "因為感覺很舒服，所以讓我有些心急。我想直接感受她的觸摸——" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
953 = "「啊」" 

# monologue
# JP: 手が、止まる。\n青い瞳がまじまじと、僕の股間を凝視している。
1464 = "波萊特的手停下了。她的藍色大眼睛凝視著我的胯間。" 

# 【ポーレット】
# display as 波萊特
# JP: 「これ……わたしのせい、ですよね？」
1058 = "「這個……是因為我對吧？」" 

# monologue
# JP: （ふわっ）
1666 = "（撫摸）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
934 = "「唔！」" 

# monologue
# JP: 待ちわびていた刺激はけれど、あまりに弱い。
1303 = "好不容易等來的刺激卻是非常微弱。" 

# monologue
# JP: テッシュ一枚それだけに、たなびくように撫ぜられたなら、\n勃起はいっそう貪欲になり、勝手にビクリと動いてしまう。
1212 = "分身被紙巾這麼輕輕撫摸，乾脆就順從著欲望，猛地一彈。" 

# 【ポーレット】
# display as 波萊特
# JP: 「これじゃ、リラックスできませんよね？」
1059 = "「這樣就不能放鬆了吧？」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
# 971 = "「嗯——」" 

# monologue
# JP: 服装のせいか、雰囲気のせいか。
1181 = "不知是因為服裝的緣故，還是氣氛的緣故。" 

# monologue
# JP: 恋人同士の僕らであるのに、\nいけないことをしているようで、汗が出る。
1344 = "我們明明是情侶，卻覺得是在做不該做的事情，緊張得直出汗。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「できれば、そこも……リラックスさせてやってほしい」
999 = "「如果可以的話，我想讓那裡也放鬆一下」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました」
# 996 = "「好的」" 

# monologue
# JP: （もぞ――もぞっ）
# 1675 = "（解開鈕扣）" 

# monologue
# JP: ポーレットの手が、僕のズボンのボタンを外す。\nジッパーを下げ、前を大きく開いて、そして――
1473 = "波萊特解開了我褲子的鈕扣。她拉下拉鏈，向前探身——" 

# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ」
898 = "「呀」" 

# monologue
# JP: 下着から解放された途端に、勃起が跳ねて、\nポーレットの顔をほとんど叩きそうになる。
1576 = "陽具從內褲中解放出來的時候猛地一彈，差點就要打到波萊特的臉上了。" 

# monologue
# JP: であるというのに、嬉しげに――
1492 = "然而她卻是很高興的樣子——" 

# 【ポーレット】
# display as 波萊特
# JP: 「ちゅっ」
958 = "「啾」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
954 = "「啊！」" 

# monologue
# JP: ポーレットは優しく甘やかに、僕の先端にキスをして。\nそのまま舌を、やさしくやさしく蠢かしていく。
1474 = "波萊特輕輕地吻了一下龜頭，然後就用小舌舔弄起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ちゅるっ――ちゅっ――ぺろっ――ぺろっ――」
965 = "「啾嚕——啾啾——啾嚕——啾嚕」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「――っ」
# 953 = "「啊」" 

# monologue
# JP: 先端に――先端だけに、しつこいほどに丁寧に、\nピンク色したかわいい舌が、唾液と熱とを刷りこんでくる。
1300 = "她集中舔弄著龜頭，舔得無比細緻，用粉紅色的小舌在上面塗抹著香津和熱量。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ちゅっ――ちゅむっ――ぺろっ――れろおおおっ」
966 = "「啾嚕——啾嚕——啾嚕——啾嚕嚕」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ポー……レット」
1033 = "「波萊特……」" 

# monologue
# JP: むずむずとした快感が、焦燥感にも似た欲望が、\n小鳥のついばみを思わせる先端愛撫に溜められていく。
1588 = "類似小鳥啄食的愛撫讓心癢的快感和焦躁感一般的欲望在龜頭上積攢了起來。" 

# monologue
# JP: 頭を掴んで思いっきりに腰を振りたい――\nそんな乱暴な衝動を、なんとか理性で押し込める。
1354 = "我想抓住她的頭痛痛快快地套弄一番——但是我的理性壓制住了暴力的欲望。" 

# 【ポーレット】
