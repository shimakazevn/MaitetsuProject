# monologue
# JP: スライドのリズムを取りにくいのか、\nポーレットの腰の動きが不規則になる。
1460 = "波萊特滑動的動作漸漸變得不規則起來，可能是因為我的揉搓讓她不好把握節奏。" 

# monologue
# JP: 押しつぶされる刺激が勃起にくわえられ、\n気持ちよすぎて、揉み込む手にも力がこもる。
1258 = "壓迫的刺激感施加在了肉棒上，強烈的快感讓我揉屁股的手更加用力了。" 

# monologue
# JP: （むにっ――むにゅ――もみゅっ――みゅむん！）
# 1661 = "（揉來揉去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ――んっ――ふあっ――そ、双鉄、くんっ――\nわたし――わたしっ――あのっ――」
940 = "「啊——嗯——呼啊——雙、雙鐵君——我——我——那個——」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 981 = "「嗯」" 

# monologue
# JP: おしりを揉む手を一端止めて、\nポーレットの言葉の続きを待ってみる。
1358 = "我暫時停下了手上的動作，等波萊特把話說完。" 

# monologue
# JP: 背中までぱあっと赤く染め、もじもじと小さく震えつつ、\nポーレットは、それでもはっきり求めてくれる。
1477 = "波萊特雪白的後背都一下子染上了紅色，她扭扭捏捏卻又非常清晰地說出了訴求。" 

# 【ポーレット】
# display as 波萊特
# JP: 「もう、おまんこ――がまんっ――できない、です――\nからっ――下さいっ――双鉄くんの――おちん、ちん」
1019 = "「我的小穴——已經——忍不住了——所以——請給我——你的雞雞——」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。僕も、ポーレットのおまんこが欲しい」
987 = "「嗯，我也想插入你的小穴」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うれしっ――嬉しいです。双鉄くんっ」
1013 = "「我好高興——我好高興啊，雙鐵君」" 

# monologue
# JP: 言葉と共に、白い体がいきいきと跳ね――
1556 = "說著她身體向上一挺——" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふぃぁぁあああああああああっ！！！」
920 = "「呼啊啊啊！！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「んくっ――」
# 971 = "「嗯——」" 

# monologue
# JP: 一気に深く僕を飲み込み、\nその瞬間、ポーレットが鮮やかなまでの弓なりに――
1449 = "波萊特一口氣把分身納入體內，同時她猛地向後一仰——" 

# 【双鉄H】
# display as 雙鐵
# JP: （っ！？）
1639 = "（啊！？）" 

# monologue
# JP: 思う間も無くギュウウと膣が収縮し、\nポーレットが達したのだと、僕に伝える。
1534 = "花徑馬上猛烈收縮起來，波萊特明顯是達到了高潮。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふぁっ――あっ――ハァッ――あっ――」
915 = "「呼啊——啊——呼——啊——」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット」
# 1035 = "「波萊特」" 

# monologue
# JP: 僕も、イキたい。もっと快感を貪りたい。\n思いは、素直な動きにつながる。
1339 = "我也想達到高潮，想獲得更多的快感。於是我的想法就反應在了行動上。" 

# monologue
# JP: （ぐっ）
1684 = "（頂入）" 

# 【ポーレット】
# display as 波萊特
# JP: 「くひゅんっ！　ふやっ――」
982 = "「嗯啊！呼呀——」" 

# monologue
# JP: 腰を突き出し抉ってみれば、\nポーレットはまたぶるりと大きく体を震わす。
1359 = "我用力向上一頂，波萊特的身體又劇烈痙攣了一下。" 

# monologue
# JP: そのままくったり、力が抜ける。\n自分の体を支えるだけで、精一杯な様子に見える。
1488 = "然後她的身體漸漸脫力，光是支撐著自己似乎就已經很費力了。" 

# 【双鉄H】
# display as 雙鐵
# JP: （これは――）
1682 = "（這樣的話——）" 

# monologue
# JP: 体勢的に、僕から大きくは動けない。\n快感の波が落ち着くまでは、ポーレットも動けそうにない。
1494 = "現在的姿勢的話我的活動範圍很小。波萊特在快感減弱之前大概也不會動起來了。" 

# monologue
# JP: ……だから意識が、引き寄せられる。\nもう一箇所の、震えヒクつくピンクのかわいいすぼまりに。
703 = "……所以我的意識被另一個地方吸引了。我看上了另一個不安分的可愛小洞。" 

# monologue
# JP: （ぬろおおおおっ）
1676 = "（輕撫）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ！！？」
# 902 = "「呀！！？」" 

# monologue
# JP: おまんこの蜜を絡めた指で尻穴の周りを撫ぜれば、\nポーレットの膣がきゅうっと締まる。
1362 = "我用沾滿蜜汁的手指輕撫菊穴的附近，波萊特的蜜道馬上收緊了一下。" 

# monologue
# JP: 気持ちがいい――し、面白い。\nポーレットの声も、驚いているだけじゃない。
1500 = "真的是很爽快又有趣。波萊特的嬌喘中也不只帶著驚訝之意。" 

# monologue
# JP: （ぬろっ――ぬとっ――ぬるっ――ぬるるっ――）
1664 = "（摸來摸去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！？　あっ――お尻――んっ――アナ、ル――\nわ、わたし――自分で、したこと――なく、て――んっ」
904 = "「呀！？啊——屁股——嗯——屁眼——我自己——沒有摸過——嗯——」" 

# monologue
# JP: （ぬりゅ――ぬろっ――もみゅ――くにゅん）
# 1664 = "（摸來摸去）" 

# monologue
# JP: 指は、挿れない。\n肛門そのものにもまだ触れてない。
1366 = "我的手指並沒有插進去，而且也沒有碰到肛門本身。" 

# monologue
# JP: ただただひたすら、一番すぼまる部分のまわりを、\n回すように、揉み込むようにして刺激していく。
1349 = "我只是在肉洞周圍劃來劃去，按壓著施加刺激。" 

# 【ポーレット】
# display as 波萊特
# JP: 「知らない――です――だから――こん、なのっ――\nふっ――あっ――おし、りっ――こんなに、感じる、の」
1011 = "「我不知道——這樣——呼――啊――屁股——也能這麼舒服——」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「お尻でも、性の快感を得ることは出来るのだな」
1006 = "「屁股也能獲得性快感」" 

# 【ポーレット】
# display as 波萊特
# JP: 「って……話では――聞いて、た、けど――んっ――\nだけ、ど――実際――これほど、だと――かっ――あっ」
1018 = "「我是……聽說過——嗯——但是——沒想到——實際會——這麼刺激——啊」" 

# monologue
# JP: アナルが、ぱくぱく動いてる。
1235 = "可愛的菊穴一張一合。" 

# monologue
# JP: 指が欲しいと、挿れてほしいと、\nおねだりしているようにも見える。
1495 = "看起來就像是在求我的手指插進去。" 

# monologue
# JP: （くりゅっ――くむっ――くりゅっ――もみゅ）
# 1661 = "（揉來揉去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっっ――あっ――ンッッ――わたしの、アナ、ル――\n双鉄、くんに――広げ……られ、て――んうっっ――」
890 = "「呀——啊——嗯——我的屁眼——被你撐開了——嗯——」" 

# monologue
# JP: 周辺の肉を引くようにして、\nかわいいアナルをわずかに広げる。
1356 = "我抓著可愛菊穴周圍的臀肉把它稍稍撐開。" 

# monologue
# JP: 柔軟性は、相当ありそうな印象だ。\nそれに、欲しそうにうごめいてるし――
1536 = "菊穴看起來相當柔軟。而且它還在蠢蠢欲動——" 

# 【双鉄H】
# display as 雙鐵
# JP: 「アナルで……セックスしてみるか？」
1052 = "「要不要試試……用後門做愛？」" 

# monologue
# JP: （くぷっ）
1650 = "（噗呲）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃああああああんっ！！」
899 = "「呀啊！！」" 

# monologue
# JP: （ギチチチチチチっ！）
1673 = "（箍緊）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「痛っ――」
995 = "「好疼」" 

# monologue
# JP: 試みにいれた指先を、\nけれど肛門は強烈な締めで排除しようと試みてくる。
1376 = "我試著把手指插進去，然而肛門馬上就強烈收縮，試圖排除異物。" 

# monologue
# JP: 今のが、僕の勃起なら――\n思えばひゅんと、玉が縮こまってしまいさえする。
1306 = "如果這是把肉棒插進去——光是想想，我的睪丸就不禁嚇得縮了一下。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの……アナルも――わたし、興味……\nいきなり、すごく――出てきちゃった――です、けど」
1062 = "「那個……屁眼——我也突然……有點興趣了——但是」" 

# monologue
# JP: （ずりゅうううっ！）
1658 = "（夾緊）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 954 = "「啊！」" 

# monologue
# JP: ポーレットの腰が大きく動く。
1461 = "波萊特用力動了一下腰。" 

# monologue
# JP: 顔を真っ赤に染めながら、\n体で、言葉で、ポーレットは僕に伝えてくれる。
1293 = "她紅著臉用身體的動作和語言向我表達著想法。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄、くんの――精液――子宮、に――んっ――\nおまん、こに――もらう、のが――、一番、だからっ――」
872 = "「你的精液——還是用子宮——來收下——最好——」" 

# monologue
# JP: （ずんっ！）
1641 = "（啪）" 

# 【ポーレット】
# display as 波萊特
# JP: 「くひゅっ！」
900 = "「呀！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな――僕も――、一番はっ――\n一番は――やはり、そうしたいっ――」
1026 = "「是啊——我也覺得最好——最好還是這樣——」" 

# monologue
# JP: （ずっ――ずぶっ――ぶじゅ――じゅぶっ――）
1643 = "（啾噗——啾噗——啾啪——啾啪——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「はいっ――してっ！　してっ、くださ――んっ――\nわたしの――、一番――おく、にっ――精、液っ」
972 = "「嗯——來吧！來吧，給我吧——在我身體最深處——射出精液——」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
# 981 = "「嗯」" 

# monologue
# JP: （ずっ――ずぶっ――ずじゅっ――じゅぶっ！）
# 1643 = "（啾噗——啾噗——啾啪——啾啪——）" 

# monologue
# JP: アナルを刺激したせいなのか、\nポーレットの膣はいつもよりぬらつき、絡みついてくる。
1468 = "波萊特的蜜道更加濕潤更加緊緻了，不知道是不是因為我剛才刺激了她的菊穴。" 

# monologue
# JP: （にゅむっ――むっ――にぢゅ――ぢゅむっ――）
# 1643 = "（啾噗——啾噗——啾啪——啾啪——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁっ――双鉄くん、のっ――いつも、よりっ――\nふあっ――ふと、くてっ――めくれ、てっ――あっ」
937 = "「啊——你的——比平常——呼啊——還要粗大——在裡面挖著——啊」" 

# monologue
# JP: それでも、腰は止まらない。
1369 = "我的活塞運動已經停不下來。" 

# monologue
# JP: ポーレットと僕、ふたりの呼吸が、\nリズムが徐々に、一致していく。
1454 = "波萊特和我的呼吸和節奏漸漸同步起來。" 

# monologue
# JP: （じゅぶっ！　じゅっ！　じゅずっ！　じゅぶっ！！）
1645 = "（啾噗！啾噗！啾嚕！啾嚕！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ――ふか、いっ――これっ――\nんっ――すごい――おな、か――ささる、みたい、でっ」
919 = "「呼啊——啊——好深啊——這樣——嗯——好厲害——好像——刺到肚子裡」" 

# monologue
# JP: （ぱぢゅっ！　ぱちゅっ！　ぱちゅんっ！　じゅぶっ！）
1642 = "（啾啪！啾啪！啾噗！啾噗！）" 

# monologue
# JP: ポーレットの腰が踊り始める。\n接合部の蜜はもう、泡立ちにごり粘ってる。
1466 = "波萊特的纖腰開始舞動起來。我們結合處的愛液已經泛起了泡沫。" 

# monologue
# JP: 勃起の全部が強い握力のゼリーの指に握られて、\n潰されるほどに締められて、それでも速度は加速していく。
1575 = "陽具就像被果凍做成的手指握住了，整根都被強力地箍緊，然而抽插的速度還是越來越快。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――アッ！　双鉄くんっ――顔っ――おかおっ、\nみたい――みたいよぉっ――」
912 = "「呼——啊！雙鐵君――我想——看你的臉——」" 

# monologue
# JP: （ギュリュッ）
1638 = "（咕啾）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぉっ！」
# 954 = "「啊！」" 

# monologue
# JP: ポーレットが視線をこちらへ無理に向ければ、\n腰もねじれて、勃起に思わぬひねりがかかる。
1456 = "波萊特強行轉身向我這邊看來，她的腰也跟著扭動，分身突然被擰了一下。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ね？　双鉄くんっ――、一緒――、一緒にっ――」
873 = "「來，雙鐵君——一起——我們一起——」" 

# monologue
# JP: （ずろっ！　ぱんっ！　ずばっ！　すぱんっ！）
# 1642 = "（啾啪！啾啪！啾噗！啾噗！）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああっ――」
# 971 = "「嗯——」" 

# monologue
# JP: ポーレットの体の重み、肉の重みが動きと共に僕を叩く。
1472 = "波萊特肉體的重量隨著她的動作砸在了我身上。" 

# monologue
# JP: （きゅっ！　きゅむっ！　にゅるっ！　にゅううっ！）
# 1642 = "（啾啪！啾啪！啾噗！啾噗！）" 

# monologue
# JP: リズムに、速度に、膣の蠢きはおいつけてない。
1479 = "活塞動作的速度和節奏根本比不上花徑的蠕動。" 

# monologue
# JP: ぬかるんですがり張り付く柔肉を、\nむりゅむりゅ剥がしまたむりゅむりゅと割り入って――
1482 = "濕潤的蜜肉緊緊地貼在肉棒上，撥開之後又馬上陷了進去——" 

# 【ポーレット】
# display as 波萊特
# JP: 「やあっ――えぐれ――ってっ――けどっ――っ――\nもっと――あっ――もっ――ふか、くっ――にっ――」
894 = "「呀——被挖到了——但是——再來——啊——再深一點——」" 

# monologue
# JP: （ずぶんんっ！！！）
1640 = "（啪！！！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃんっ！！」
901 = "「呀！！」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ぉあっ！」
# 954 = "「啊！」" 

# monologue
# JP: 腰と腰とが食い込むほどに密着し合い、\n勃起の先が、ポーレットの子宮の入り口を強く押す。
1345 = "我們的腰緊緊貼合在了一起，我的龜頭緊緊地按壓著波萊特的子宮口。" 

# monologue
# JP: （にゅむっ――にゅっ――きゅうううううっ）
1671 = "（猛吸）" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 954 = "「啊！」" 

# monologue
# JP: 精子を、おねだりする吸いつき。\n僕も、ポーレットももうギリギリだ。
1314 = "小巧的子宮口吸著龜頭，索求著精子。我和波萊特都已經到達極限了。" 

# monologue
# JP: それをはっきり自覚したなら、\nやはり自分で――自分から思いきり貪りたくてっ！
1401 = "既然已經明白了這一點，我便想自己來盡情地享受這一瞬間！" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット！　ポーレット！　ポーレット！！」
1036 = "「波萊特！波萊特！波萊特！！」" 

# monologue
# JP: （ずぶっ！　ずぶんっ！　じゅぶっ！　じゅちゅ！）
# 1642 = "（啾啪！啾啪！啾噗！啾噗！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんっ――あっ――そうてつ、くぅんっ」
1069 = "「雙鐵君——啊——雙鐵君——」" 

# monologue
# JP: 思いっきりに腰をつかんで、\n子宮の口に勃起の先を押し当て擦り捻じり込む。
1334 = "我一把抓住了她的腰，讓子宮口緊緊地蹭上龜頭。" 

# monologue
# JP: 膣肉はもうひたすらに締めて張り付いて来て、\nその単純な刺激が僕を真っ白にしてっ！
1539 = "蜜肉一個勁地夾著陽具，這單純的刺激讓我大腦一片空白！" 

# 【双鉄H】
# display as 雙鐵
# JP: 「くあっ！」
# 954 = "「啊！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いっ――あっああああああああああああんっ！！」
927 = "「咿——啊啊啊啊！！」" 

# monologue
# JP: （びゅっ！　びゅるっ！　どびゅうっ！　んびゅっ！！）
1656 = "（噗嚕！噗嚕！噗噗！噗噗！！）" 

# monologue
# JP: 精が、弾ける。
1512 = "精液迸發而出。" 

# monologue
# JP: 弾けたそれはびゅくびゅくと、\n一瞬にしてポーレットの子宮を満たしてく。
1262 = "大量的精液噴湧而出，統統射進了波萊特的花房裡。" 

# monologue
# JP: （びゅつ――びゅううっ――びゅっ――びゅううっ）
1652 = "（噗噗——噗噗——噗嚕——噗嚕）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ――いっぱい――いっぱいっ――\nんっ、双鉄、くんの――精液――子宮――にっ――」
917 = "「呼啊——啊——好多——好多——雙鐵君的――精液――進到了子宮裡——」" 

# monologue
# JP: （びゅっ――びゅりゅ――びゅう――びゅ――）
# 1652 = "（噗噗——噗噗——噗嚕——噗嚕）" 

# monologue
# JP: 射精しきって。\nポーレットはまだ、腰を思い切り下げてきている。
1311 = "射精結束了。波萊特卻又用力坐了下來。" 

# monologue
# JP: 僕の勃起をフタにつかって、精液全部を閉じ込めて――
1279 = "她把我的肉棒當作蓋子，把精液全部封在裡頭——" 

# 【ポーレット】
# display as 波萊特
# JP: 「……赤ちゃん、わたし――欲しい、です」
711 = "「……我想要小寶寶」" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、僕もだ」
988 = "「嗯，我也想要」" 

# monologue
# JP: ――子宮を、卵子を、僕の精液が溺れさせてる。\nポーレットがそれを望んでる。
1457 = "波萊特想讓我的精液填滿她的子宮，浸潤她的卵子。" 

# monologue
# JP: その快感が、射精よりもっと甘く狂おしく、\n脊髄を脳を精巣を、一瞬にして満たしてくれる。
1565 = "這帶來的快感比射精還要強烈，把我的脊髓、大腦還有精巢都一下子填滿了。" 

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット」
# 1035 = "「波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くん」
992 = "「嗯，雙鐵君」" 

# monologue
# JP: ただそれだけで、言葉は余分すぎるくらいだ。
1182 = "不需要更多的語言。" 

# monologue
# JP: 求めるままに、そうして求められるまま。\n僕らは体を重ね合い、長くて緩いキスをする。
1346 = "我們自然而然地就貼在一起，來了個深情的長吻。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……んっ――ちゅっ――ちゅむっ――\nちゅきっ――好きっ――ンッ――双鉄、くぅん」
946 = "「啊……嗯——啾——啾嚕——我喜歡——好喜歡你——雙鐵——」" 

# monologue
# JP: 誘惑、されてる。\nアイスコーヒーも、シチュエーションも何も無くても。
1374 = "我被深深誘惑了。不用什麼冰咖啡，沒有什麼情景設定也沒關係。" 

# monologue
# JP: セックスをして、肉の欲望が冷めたあとでも、\n唇だけの甘えたキスを、ただ繰り返すそれだけで。
1257 = "在激情的交合之後，在肉慾冷卻之後，光是柔情的接吻就已經足夠。" 

# 【双鉄H】
# display as 雙鐵
# JP: （これが……恋をするということか）
1681 = "（這就是戀愛的感覺嗎）" 

# monologue
# JP: ポーレットがそこにいるだけで、\n僕はいつでも、誘惑される。
1452 = "波萊特光是存在就足以一直誘惑著我。" 

# monologue
# JP: 自覚をすれば少し怖くて、その何倍も幸せで。\nそうして僕は愛しい人を、ぎゅっとぎゅうっと抱き締める。
1566 = "這麼一想還有點可怕，卻又無比幸福。然後我就這麼緊緊抱著我最愛的可人兒。" 
