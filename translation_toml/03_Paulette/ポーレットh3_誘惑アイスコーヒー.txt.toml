1449 = "Nuốt trọn tôi vào sâu một mạch,\nngay khoảnh khắc đó, Paulette cong người\nlên như một cánh cung——"

# 【双鉄H】
# display as 雙鐵
# JP: （っ！？）
1639 = "（!?）"

# monologue
