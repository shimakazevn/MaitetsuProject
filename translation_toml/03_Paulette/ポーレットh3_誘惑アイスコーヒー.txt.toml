1534 = "Âm đạo co thắt lại dữ dội không kịp suy\nnghĩ,\nbáo cho tôi biết Paulette đã lên đỉnh."

# 【ポーレット】
# display as 波萊特
# JP: 「ふぁっ――あっ――ハァッ――あっ――」
915 = "「Phù——a——hà——a——」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ポーレット」
# 1035 = "「波萊特」" 

# monologue
# JP: 僕も、イキたい。もっと快感を貪りたい。\n思いは、素直な動きにつながる。
1339 = "Tôi cũng muốn ra. Muốn tận hưởng khoái cảm\nnhiều hơn nữa.\nSuy nghĩ ấy dẫn đến hành động một cách\nthành thật."

# monologue
# JP: （ぐっ）
1684 = "（Hự）"

# 【ポーレット】
# display as 波萊特
# JP: 「くひゅんっ！　ふやっ――」
982 = "Thử dập hông vào sâu hơn,\ncơ thể Paulette lại run lên bần bật."

# monologue
# JP: 腰を突き出し抉ってみれば、\nポーレットはまたぶるりと大きく体を震わす。
1359 = "Cứ thế cô ấy lả đi, mất hết sức lực.\nCó vẻ như chỉ việc chống đỡ cơ thể mình\nthôi cũng đã tốn hết sức rồi."

# monologue
# JP: そのままくったり、力が抜ける。\n自分の体を支えるだけで、精一杯な様子に見える。
1488 = "（Thế này thì——）"

# 【双鉄H】
# display as 雙鐵
# JP: （これは――）
1682 = "Với tư thế này, tôi không thể cử động mạnh\nđược.\nCho đến khi cơn sóng khoái cảm dịu xuống,\nPaulette có lẽ cũng không thể nhúc nhích."

# monologue
# JP: 体勢的に、僕から大きくは動けない。\n快感の波が落ち着くまでは、ポーレットも動けそうにない。
1494 = "……Thế nên ý thức của tôi bị thu hút.\nVào một nơi khác, một lỗ nhỏ màu hồng dễ\nthương đang co giật run rẩy."

# monologue
# JP: ……だから意識が、引き寄せられる。\nもう一箇所の、震えヒクつくピンクのかわいいすぼまりに。
703 = "（Mơn trớnnnnn）"

# monologue
# JP: （ぬろおおおおっ）
1676 = "Dùng ngón tay thấm đẫm mật ngọt từ cô bé\nvuốt ve quanh lỗ hậu,\nâm đạo của Paulette lập tức co thắt lại."

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ！！？」
# 902 = "「呀！！？」" 

# monologue
# JP: おまんこの蜜を絡めた指で尻穴の周りを撫ぜれば、\nポーレットの膣がきゅうっと締まる。
1362 = "Thật dễ chịu——và cũng thật thú vị.\nGiọng nói của Paulette cũng không chỉ đơn\nthuần là kinh ngạc."

# monologue
# JP: 気持ちがいい――し、面白い。\nポーレットの声も、驚いているだけじゃない。
1500 = "（Nhóp——nhép——trơn——tuột——）"

# monologue
# JP: （ぬろっ――ぬとっ――ぬるっ――ぬるるっ――）
1664 = "（Nhóp——nhép——trơn——tuột——）"

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！？　あっ――お尻――んっ――アナ、ル――\nわ、わたし――自分で、したこと――なく、て――んっ」
904 = "「Á!? A——mông——ưm——lỗ, hậu——\nE, em——chưa từng, tự làm——bao giờ——ưm」"

# monologue
# JP: （ぬりゅ――ぬろっ――もみゅ――くにゅん）
# 1664 = "（摸來摸去）" 

# monologue
# JP: 指は、挿れない。\n肛門そのものにもまだ触れてない。
1366 = "Chỉ đơn thuần kích thích xung quanh phần\nlõm vào nhất,\nnhư thể đang xoa tròn, nắn bóp."

# monologue
# JP: ただただひたすら、一番すぼまる部分のまわりを、\n回すように、揉み込むようにして刺激していく。
1349 = "Chỉ đơn thuần kích thích xung quanh phần\nlõm vào nhất,\nnhư thể đang xoa tròn, nắn bóp."

# 【ポーレット】
# display as 波萊特
# JP: 「知らない――です――だから――こん、なのっ――\nふっ――あっ――おし、りっ――こんなに、感じる、の」
1011 = "「Em không biết——đâu——nên là——như thế này——\nPhù——a——mông——lại có cảm giác, như vậy」"

# 【双鉄H】
# display as 雙鐵
# JP: 「お尻でも、性の快感を得ることは出来るのだな」
1006 = "「Ngay cả ở mông, cũng có thể đạt được\nkhoái cảm tình dục nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「って……話では――聞いて、た、けど――んっ――\nだけ、ど――実際――これほど、だと――かっ――あっ」
1018 = "「Thì……em cũng có nghe——người ta, nói,\nvậy——ưm——\nNhưng, mà——thực tế——lại đến mức này,\nthì——a——á」"

# monologue
# JP: アナルが、ぱくぱく動いてる。
1235 = "Lỗ hậu môn đang co bóp nhấp nháy."

# monologue
# JP: 指が欲しいと、挿れてほしいと、\nおねだりしているようにも見える。
1495 = "Trông như thể nó đang đòi hỏi ngón tay\ntôi,\nđang cầu xin tôi đút vào vậy."

# monologue
# JP: （くりゅっ――くむっ――くりゅっ――もみゅ）
# 1661 = "（揉來揉去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっっ――あっ――ンッッ――わたしの、アナ、ル――\n双鉄、くんに――広げ……られ、て――んうっっ――」
890 = "「Á——a——ưm——lỗ, hậu, của em——\nBị anh Soutetsu——nong……rộng, ra——ưm——」"

# monologue
# JP: 周辺の肉を引くようにして、\nかわいいアナルをわずかに広げる。
1356 = "Tôi kéo nhẹ phần thịt xung quanh,\nnong rộng lỗ hậu dễ thương ra một chút."

# monologue
# JP: 柔軟性は、相当ありそうな印象だ。\nそれに、欲しそうにうごめいてるし――
1536 = "Có vẻ như độ co giãn khá tốt.\nHơn nữa, nó còn đang ngọ nguậy như thèm\nkhát——"

# 【双鉄H】
# display as 雙鐵
# JP: 「アナルで……セックスしてみるか？」
1052 = "「Có muốn thử làm tình……bằng lỗ hậu không?」"

# monologue
# JP: （くぷっ）
1650 = "（Phụt）"

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃああああああんっ！！」
899 = "「Hyaaaaaaa!!」"

# monologue
# JP: （ギチチチチチチっ！）
1673 = "（Siếttttttt!）"

# 【双鉄H】
# display as 雙鐵
# JP: 「痛っ――」
995 = "「Đau——」"

# monologue
# JP: 試みにいれた指先を、\nけれど肛門は強烈な締めで排除しようと試みてくる。
1376 = "Nếu vừa rồi là dương vật của tôi thì——\nNghĩ đến thôi cũng khiến hai hòn bi sun\nlại."

# monologue
# JP: 今のが、僕の勃起なら――\n思えばひゅんと、玉が縮こまってしまいさえする。
1306 = "Nếu vừa rồi là dương vật của tôi thì——\nNghĩ đến thôi cũng khiến hai hòn bi sun\nlại."

# 【ポーレット】
# display as 波萊特
# JP: 「あの……アナルも――わたし、興味……\nいきなり、すごく――出てきちゃった――です、けど」
1062 = "「Cái đó……lỗ hậu——tự nhiên, em……\nCũng cảm thấy rất có hứng thú——nhưng mà」"

# monologue
# JP: （ずりゅうううっ！）
1658 = "Hông Paulette giật mạnh."

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 954 = "「啊！」" 

# monologue
# JP: ポーレットの腰が大きく動く。
1461 = "Khuôn mặt đỏ bừng,\nPaulette truyền đạt cho tôi bằng cả cơ thể\nlẫn lời nói."

# monologue
# JP: 顔を真っ赤に染めながら、\n体で、言葉で、ポーレットは僕に伝えてくれる。
1293 = "Khuôn mặt đỏ bừng,\nPaulette truyền đạt cho tôi bằng cả cơ thể\nlẫn lời nói."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄、くんの――精液――子宮、に――んっ――\nおまん、こに――もらう、のが――、一番、だからっ――」
872 = "「Tinh dịch——của anh Soutetsu——nhận vào, tử\ncung——ưm——\nVào cô bé——vẫn là, tuyệt nhất, nên là——」"

# monologue
# JP: （ずんっ！）
1641 = "（Phập!）"

# 【ポーレット】
# display as 波萊特
# JP: 「くひゅっ！」
900 = "「Đúng vậy nhỉ——Anh cũng——, tuyệt nhất là——\nTuyệt nhất là——anh vẫn muốn làm thế——」"

# 【双鉄H】
# display as 雙鐵
# JP: 「そうだな――僕も――、一番はっ――\n一番は――やはり、そうしたいっ――」
1026 = "「Đúng vậy nhỉ——Anh cũng——, tuyệt nhất là——\nTuyệt nhất là——anh vẫn muốn làm thế——」"

# monologue
# JP: （ずっ――ずぶっ――ぶじゅ――じゅぶっ――）
1643 = "（Phập——phập——nhóp——nhép——）"

# 【ポーレット】
# display as 波萊特
# JP: 「はいっ――してっ！　してっ、くださ――んっ――\nわたしの――、一番――おく、にっ――精、液っ」
972 = "「Vâng——làm đi! Hãy làm, đi ạ——ưm——\nBắn tinh dịch——vào sâu, nhất——bên trong,\nem đi」"

# 【双鉄H】
