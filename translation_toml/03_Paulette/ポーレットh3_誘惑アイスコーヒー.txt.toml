705 = "「——我的牛奶，你想榨多少就榨多少吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい！　双鉄くん。それじゃ、そうしちゃいますね？」
998 = "「好的！雙鐵君。那我就這麼做啦」" 

# monologue
