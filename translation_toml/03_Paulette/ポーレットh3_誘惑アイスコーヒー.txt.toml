# ポーレットh3_誘惑アイスコーヒー.txt 
[info]

[characters]
1230 = "双鉄H"
1134 = "ポーレット"

[character_subs]
1580 = "雙鐵"
1448 = "波萊特"

[script]
# lines: 313 
# 【双鉄H】
# display as 雙鐵
# JP: 「む――これか？」
910 = "「Hừm——cái này à?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、それっぽい。見せてください。……うんっ！　これ、\nこれです！　助かった～、ありがとう、双鉄くん！」
986 = "「A, có vẻ là nó đấy. Cho em xem với.\n...Đúng rồi! Cái này,\nchính là nó! May\nquá~, cảm ơn Soutetsu nhé!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「いや、\n礼をいわれるべきは僕ではなく、汰斗さんだろう」
864 = "「Không,\nngười đáng được cảm ơn không phải\nlà anh, mà là ông Taito chứ.」"

# monologue
# JP: 御一夜駅を発着する貨物列車の本数と、\nその総輸送量との統計データ。
1347 = "Dữ liệu thống kê về số lượng tàu chở hàng\nđến và đi tại ga Ohimitera,\ncùng với tổng\nkhối lượng vận chuyển của chúng."

# monologue
# JP: 関連質問の通告を受け、急ぎ探したが、\n市役所内にも御一夜鉄道にも無かったものだ。
1255 = "Nhận được thông báo về các câu hỏi liên\nquan, chúng tôi đã vội vàng tìm kiếm,\nnhưng cả trong Tòa thị chính lẫn Đường sắt\nOhimitera đều không có."

# 【双鉄H】
# display as 雙鐵
# JP: 「何故集めたのか――そこは僕には理解できんが、\nしかし実際、このコレクションに大いに助けられている」
1068 = "「Tại sao ông ấy lại thu thập những thứ\nnày——anh không thể hiểu nổi,\nnhưng thực tế\nlà bộ sưu tập này đã giúp ích rất nhiều.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですよねー」
1005 = "「Đúng vậy nhỉ~」"

# monologue
# JP: 深い頷き。
1475 = "Một cái gật đầu thật sâu."

# monologue
# JP: ポーレットはどこかうっとりした目で、\n資料の山をぐるり見渡す。
1290 = "Paulette đưa ánh mắt có phần mơ màng\nnhìn\nquanh đống tài liệu chất như núi."

# 【ポーレット】
# display as 波萊特
# JP: 「ここの資料はまぎれも無い一級品ですからね。\n前にも――」
1060 = "「Tài liệu ở đây không thể nghi ngờ gì nữa,\ntoàn là hàng cực phẩm mà.\nTrước đây\ncũng——」"

# monologue
# JP: そこまで言って、ポーレットの声が止まってしまう。
1554 = "Nói đến đó, giọng Paulette bỗng im bặt."

# monologue
# JP: 顔はわずかに赤らんで、\nもぞもぞと、恥ずかしそうなそぶりを見せ――ああ。
1292 = "Khuôn mặt hơi ửng đỏ,\ncô ấy cựa quậy, tỏ\nvẻ ngượng ngùng——À."

# 【双鉄H】
# display as 雙鐵
# JP: 「前には、騒動が起きてしまったものな」
867 = "「Trước đây, đã từng xảy ra một vụ náo động\nnhỉ.」"

# monologue
# JP: 言えばすぐさま、ポーレットは嬉しさと照れとを交えた、\nなんともはにかんだ顔になる。
1516 = "Vừa nói xong, Paulette lập tức bày ra một\nvẻ mặt\npha trộn giữa vui sướng và e thẹn,\ntrông vô cùng bẽn lẽn."

# 【ポーレット】
# display as 波萊特
# JP: 「あのときはごめんなさい。……急にれいなが、その……\nパンツ、見えてるって……それで、すごく慌てちゃって」
1066 = "「Lúc đó em xin lỗi nhé. ...Đột nhiên Reina\nbảo là, ừm...\nthấy quần lót... nên em\nhoảng quá.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ？」
993 = "「Hửm?」"

# monologue
# JP: ポーレットが教えてくれたことだ。
1453 = "Đó là điều Paulette đã dạy cho tôi."

# monologue
# JP: 好きな異性の視線には、女の子は特に敏感で、\n偶然見えるものはその実、意識的に見せているのだと。
1268 = "Rằng con gái đặc biệt nhạy cảm với ánh\nnhìn của người khác giới mà mình thích,\nvà\nnhững thứ tưởng chừng như vô tình để lộ,\nthực chất là cố ý cho xem."

# 【双鉄H】
# display as 雙鐵
# JP: （ならば、ポーレットはあの時には僕のことをまだ……\nああいや、違う。単に、僕が“見ていなかった”のか）
1683 = "（Nếu vậy, lúc đó Paulette vẫn chưa có tình\ncảm với mình...\nÀ không, sai rồi. Đơn giản\nlà do mình \"không thèm nhìn\" sao.）"

# monologue
# JP: 僕の視線と意識とは、資料探しにだけ向けられて、\nゆえにポーレットはまったくそれを気にしなかった。
1363 = "Ánh nhìn và ý thức của tôi lúc đó chỉ\nhướng đến việc tìm kiếm tài liệu,\ndo đó\nPaulette hoàn toàn không bận tâm đến\nchuyện ấy."

# monologue
# JP: そこにれいなの指摘が飛んで、不意打ちとなり――\n結果、あれほどバタバタとしてしまったのだろう。
1490 = "Rồi lời chỉ điểm của Reina bất ngờ bay\ntới, đánh úp——\nKết quả là mới gây ra một\ntrận cuống cuồng như vậy."

# 【双鉄H】
# display as 雙鐵
# JP: （しかし……今考えると、多少もったいなかったか）
1637 = "（Nhưng mà... giờ nghĩ lại, thấy cũng hơi\ntiếc nhỉ.）"

# monologue
# JP: あの時は、パンツごときで何故あれほどの騒ぎとなるのか、\nとんと見当もつかなかったが――
1570 = "Hồi đó, tôi hoàn toàn không hiểu tại sao\nchỉ vì cái quần lót\nmà lại ầm ĩ lên đến\nthế——"

# 【ポーレット】
# display as 波萊特
# JP: 「今なら……少しは、見たいって思ってくれますか？」
1040 = "「Nếu là bây giờ... anh có muốn xem một\nchút không?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
907 = "「!」"

# monologue
# JP: 心を見ぬかれたような気がして、一瞬焦り、\nけれどもすぐに、推測は容易だっただろうと理解する。
1365 = "Cảm giác như bị nhìn thấu tâm can, tôi\nthoáng bối rối,\nnhưng ngay lập tức nhận ra\nrằng việc đoán được suy nghĩ của tôi cũng\ndễ thôi."

# monologue
# JP: 僕は今、ほぼ無意識にまじまじと――\nポーレットの下半身へと、視線を注ぎ続けていたから。
1247 = "Bởi vì lúc này, gần như trong vô thức, tôi\nđang dán chặt ánh mắt——\nchằm chằm vào nửa\nthân dưới của Paulette."

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、思う」
989 = "「Ừ, anh muốn.」"

# monologue
# JP: ならば、何を取り繕う必要も無い。\n感じていること、思うこと。それを素直に言葉になおす。
1567 = "Nếu vậy thì chẳng cần phải che giấu điều\ngì cả.\nNhững gì tôi cảm nhận, những gì tôi\nnghĩ. Cứ thế chân thật biến chúng thành\nlời."

# 【双鉄H】
# display as 雙鐵
# JP: 「少しどころか、大いに見たい。パンツを、ではなく、\nポーレットの魅力的な姿を見たい」
1009 = "「Đâu chỉ một chút, anh rất muốn xem là\nđằng khác. Không phải xem quần lót,\nmà là\nmuốn ngắm nhìn dáng vẻ quyến rũ của\nPaulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「み、魅力的――ですか？」
1072 = "「Q, quyến rũ——sao anh?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。具体的には、僕の視線を自覚しつつも、\n偶然を装って誘惑をかける、そんな姿を見てみたい」
980 = "「Ừ. Cụ thể là, anh muốn xem cái dáng vẻ em\nvừa ý thức được ánh nhìn của anh,\nvừa giả\nvờ như tình cờ để quyến rũ anh ấy.」"

# monologue
# JP: ふんわり、と――\n頬をピンクに染めたまま、満足そうな柔らかな笑み。
1462 = "Dịu dàng, và——\nVới đôi má ửng hồng, cô ấy\nnở một nụ cười mềm mại đầy mãn nguyện."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……\nわたしが前いったこと、覚えててくれたんですね？」
1071 = "「Soutetsu...\nAnh vẫn nhớ những gì em từng\nnói sao?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「無論だ。\n僕にとっては衝撃的な事実を教えてもらったのだから」
1067 = "「Đương nhiên rồi.\nBởi vì em đã dạy cho anh\nmột sự thật mang tính chấn động đối với\nanh mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わかりました。双鉄くんのご希望なら、\nわたし、頑張ってみます」
1016 = "「Em hiểu rồi. Nếu đó là mong muốn của\nSoutetsu,\nthì em sẽ cố gắng thử xem.」"

# monologue
# JP: 言って、ポーレットは瞼を閉じる。
1555 = "Nói xong, Paulette nhắm mắt lại."

# monologue
# JP: 沈思黙考――\nややあって開かれた青い瞳は、強い光を帯びている。
1273 = "Trầm tư suy nghĩ——\nMột lát sau, đôi mắt\nxanh biếc mở ra, ánh lên một tia sáng mạnh\nmẽ."

# 【ポーレット】
# display as 波萊特
# JP: 「……王道でいってみようと思います。\n移動しましょう。一緒に来てください」
709 = "「……Tôi sẽ thử dùng phương pháp cổ điển xem\nsao.\nChúng ta di chuyển thôi. Xin hãy đi cùng\ntôi.」"

# 【双鉄H】
# display as 雙鐵
# JP: 「うむ――」
971 = "「Ừm——」"

# 【ポーレット】
# display as 波萊特
# JP: 「いいですか？　双鉄くんは残業の休憩中です。\nわたしが声をかけたら、振り返ってくださいね？」
1048 = "「Được chứ? Anh Soutetsu đang nghỉ giải lao\nsau khi làm thêm giờ.\nKhi em gọi, anh hãy quay lại nhé?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「わかった」
996 = "「Anh hiểu rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「こほん――\n『そ、双鉄くん。残業、お疲れ様です』」
926 = "「E hèm——\n『A, anh Soutetsu. Anh làm thêm giờ vất vả\nrồi.』」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ」
981 = "「Ừ.」"

# monologue
# JP: （くるっ）
1667 = "（Xoay người）"

# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？」
903 = "「Á!?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「うぉっ！？」
929 = "「Uo!?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ご！　ごめんなさいっ！？」
1002 = "「X... Xin lỗi anh!?」"

# monologue
# JP: ズボンが濡れる。\nポーレットがしゃがみこんでいる。
1371 = "Quần tôi bị ướt.\nPaulette đang ngồi xổm xuống."

# monologue
# JP: 僕のズボンを濡らした、これは……
1389 = "Thứ làm ướt quần tôi, đây là……"

# 【双鉄H】
# display as 雙鐵
# JP: 「アイスコーヒーか？」
874 = "「Cà phê đá à?」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんにリラックスして欲しいって思って……\nほんと、ごめんなさい。すぐ拭きますね――あれ？」
1014 = "「Em muốn anh Soutetsu được thư giãn nên……\nThật sự xin lỗi anh. Em sẽ lau ngay\nđây——Ủa?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
908 = "「っ!」"

# monologue
# JP: ハンカチを探してるのだろうか？
1288 = "Cô ấy đang tìm khăn tay sao?"

# monologue
# JP: ポーレットの手が胸ポケットを、尻ポケットを、\n探って動くそのたびに――
1455 = "Mỗi lần tay Paulette sờ soạng tìm kiếm\ntrong túi áo ngực và túi quần sau——"

# 【双鉄H】
# display as 雙鐵
# JP: （む、ぅ……）
1648 = "（Ư, m……）"

# monologue
# JP: ポーレットの胸がふるふる震える。\nあの最高のおっぱいが、僕の視線を釘付けにする。
1470 = "Bộ ngực của Paulette rung lên bần bật.\nĐôi gò bồng đảo tuyệt hảo đó thu hút ánh\nnhìn của tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「あ、やだ――わたしにもかかっちゃってる」
956 = "「A, thôi chết——Nó cũng dính vào người em\nrồi.」"

# monologue
# JP: （ぷちっ――ぷちっ――）
1675 = "（Pặc——Pặc——）"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
# 908 = "「呃！」" 

# monologue
# JP: 胸のボタンが、ひとつ、ふたつ――\nそうして、みっつ、かなり大きく開けられる。
1297 = "Cúc áo ngực, một cái, hai cái——\nRồi ba cái, bị mở ra khá rộng."

# monologue
# JP: 胸の谷間が丸見えになる。見えそうで見えない乳首の姿に、\n想像と欲望とが駆り立てられる。
1579 = "Khe ngực phơi bày ra toàn bộ. Hình dáng\nnúm vú lúc ẩn lúc hiện\nkích thích trí tưởng tượng và dục vọng\ntrong tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「あ……\nスカートも、染みになっちゃう」
951 = "「A……\nVáy cũng bị ố mất rồi.」"

# monologue
# JP: 腰のホックを外して器用にスカートを脱ぎ、\n脱いだスカートのポッケを探って……
1298 = "Cô ấy tháo móc cài ở eo, khéo léo cởi váy\nra,\nrồi lục lọi trong túi chiếc váy vừa cởi……"

# 【ポーレット】
# display as 波萊特
# JP: 「ありました。ティッシュ。\nこれで、今すぐ拭きますから」
1024 = "「Có rồi. Khăn giấy.\nEm sẽ lau ngay bằng cái này đây.」"

# monologue
# JP: （こしゅっ）
1669 = "（Chà chà）"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ――」
935 = "「っ——」"

# monologue
# JP: 太ももの上に置かれたティッシュが、\n否応なしにセックスのことを連想させる。
1252 = "Tờ khăn giấy đặt trên đùi\nbất giác khiến tôi liên tưởng đến tình\ndục."

# monologue
# JP: (しゅっ――こしゅ――こすっ――）
37 = "(Sột——soạt——sột——）)"

# monologue
# JP: 太ももを、その内側を、\n強すぎず弱すぎぬ指に擦られる。
1465 = "Đùi tôi, cả phần đùi trong,\nđược cọ xát bởi những ngón tay với lực vừa\nphải."

# monologue
# JP: 心地よいから、焦れったくなる。\nもっと、ダイレクトに触れて欲しくて――
1246 = "Cảm giác thật dễ chịu, khiến tôi đâm ra\nnôn nóng.\nTôi muốn cô ấy chạm vào trực tiếp hơn\nnữa——"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
953 = "「A」"

# monologue
# JP: 手が、止まる。\n青い瞳がまじまじと、僕の股間を凝視している。
1464 = "Bàn tay dừng lại.\nĐôi mắt xanh biếc đang chăm chú nhìn chằm\nchằm vào háng tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「これ……わたしのせい、ですよね？」
1058 = "「Cái này……là lỗi của em, đúng không?」"

# monologue
# JP: （ふわっ）
1666 = "（Nhẹ nhàng）"

# 【双鉄H】
# display as 雙鐵
# JP: 「っ！」
934 = "「っ!」"

# monologue
# JP: 待ちわびていた刺激はけれど、あまりに弱い。
1303 = "Sự kích thích mà tôi hằng mong đợi, lại\nquá yếu ớt."

# monologue
# JP: テッシュ一枚それだけに、たなびくように撫ぜられたなら、\n勃起はいっそう貪欲になり、勝手にビクリと動いてしまう。
1212 = "Chỉ với một tờ khăn giấy mỏng manh mơn\ntrớn như thế,\ndương vật cương cứng càng trở nên tham\nlam, tự động giật nảy lên."

# 【ポーレット】
# display as 波萊特
# JP: 「これじゃ、リラックスできませんよね？」
1059 = "「Thế này thì, anh không thể thư giãn được\nnhỉ?」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ――」
# 971 = "「嗯——」" 

# monologue
# JP: 服装のせいか、雰囲気のせいか。
1181 = "Do trang phục, hay do bầu không khí đây."

# monologue
# JP: 恋人同士の僕らであるのに、\nいけないことをしているようで、汗が出る。
1344 = "Rõ ràng chúng tôi là người yêu của nhau,\nnhưng lại có cảm giác như đang làm chuyện\nmờ ám, khiến tôi toát cả mồ hôi."

# 【双鉄H】
# display as 雙鐵
# JP: 「できれば、そこも……リラックスさせてやってほしい」
999 = "「Nếu được thì, anh cũng muốn em……làm cho\nchỗ đó được thư giãn.」"

# 【ポーレット】
