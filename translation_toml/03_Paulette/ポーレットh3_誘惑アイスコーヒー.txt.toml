# 【双鉄H】
# display as 雙鐵
# JP: 「ああ、本当に美しい。それに――」
990 = "「Ừ, thực sự rất đẹp. Hơn nữa——」"

# monologue
# JP: （むにっ）
1662 = "（Nắn bóp）"

# 【ポーレット】
# display as 波萊特
# JP: 「きゃあっ！！？」
902 = "「Á!!?」"

# monologue
# JP: お尻。\n白く、ゆったりとして、まあるいお尻。
1463 = "Cặp mông.\nCặp mông trắng trẻo, đẫy đà, tròn trịa."

# monologue
# JP: 触れれば手のひらが吸い付くようで、\nもちもちとした弾力があり、心地いい。
1387 = "Chạm vào có cảm giác như lòng bàn tay bị\nhút chặt,\nđộ đàn hồi mềm mại, thật dễ chịu."

# 【双鉄H】
# display as 雙鐵
# JP: 「おっぱいもだが――お尻もだとは気づかずにいた。\nポーレットの体は、どこもかしこも最高なのだな」
1050 = "「Anh biết ngực em đẹp rồi——nhưng không ngờ\nmông em cũng vậy.\nCơ thể Paulette, chỗ nào cũng tuyệt vời\nhết.」"

# 【ポーレット】
# display as 波萊特
# JP: 「や……あっ――おしり……ふあっ――\n自分で……さわった、こと……ない……けどっ――」
897 = "「Á……a——mông……phù——\nBản thân em……chưa từng……chạm vào……nhưng——」"

# monologue
# JP: 揉めば揉むほど、しっとり感が増してくる。
1379 = "Càng xoa bóp, cảm giác ẩm ướt càng tăng\nlên."

# monologue
# JP: ポーレットの蜜があふれはじめて、\n押しつぶされてる僕の勃起を濡らして絡む。
1467 = "Mật ngọt của Paulette bắt đầu tuôn trào,\nthấm ướt và quấn lấy dương vật đang bị đè\nnén của tôi."

# monologue
# JP: （もみっ――もみゅっ――むにっ――もにっ――）
1661 = "（Xoa xoa——nắn nắn——bóp bóp——nắn nắn——）"

# 【ポーレット】
# display as 波萊特
# JP: 「ん……あっ――きもち、いい――ですっ――\nんっ――双鉄、くんの、手――かたく――って」
976 = "「Ưm……a——sướng, quá——ạ——\nƯm——Tay, anh Soutetsu——cứng——quá」"

# monologue
# JP: もぞもぞと、ポーレットの腰が動き始める。
1476 = "Hông Paulette bắt đầu cựa quậy."

# monologue
# JP: もみ込みながら、パンツをずらし、\n助けるように前へと押せば――
1337 = "Vừa xoa bóp, tôi vừa kéo quần lót của cô\nấy xuống,\nđẩy nhẹ về phía trước như muốn giúp một\ntay——"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄、くん、も――んっ――もう――こんなにっ――\n固く、て――あつく、て――ふあっ――」
1070 = "「Anh Soutetsu, cũng——ưm——đã——thế này rồi——\nCứng, quá——nóng, quá——phù——」"

# monologue
# JP: （にゅるっ――むりゅっ――ちゅにゅっ――みゅうっ）
# 1661 = "（揉來揉去）" 

# monologue
# JP: 剥き出しになったおまんこが、\n僕の勃起に吸いつきながらスライドしてく。
1403 = "Cô bé trần trụi\nvừa trượt vừa mút lấy dương vật cương cứng\ncủa tôi."

# monologue
# JP: 前後運動のその度に、大陰唇はめくれ絡んで、\nポーレットの中のピンクが、僕の目を楽しませてくれる。
1251 = "Mỗi lần trượt lên trượt xuống, môi lớn lại\nlật ra quấn lấy,\nmàu hồng bên trong Paulette làm mãn nhãn\ntôi."

# 【ポーレット】
# display as 波萊特
# JP: 「あっ……きもちいい……きもちいい……よぉ……\nふあっ――双鉄、くんの――おちん、ちんっ――あっ」
950 = "「A……sướng quá……sướng quá……anh ơi……\nPhù——của, anh Soutetsu——dương, vật——a」"

# monologue
# JP: （じゅるっ――じゅうっ――ぢゅりゅっ――むにゅ――）
1647 = "（Sụt——chụt——sụt——nhóp nhép——）"

# monologue
# JP: ポーレットの動きのその度に、\nおっぱいも甘くぷるぷる震えて誘う。
1578 = "Mỗi lần Paulette chuyển động,\nđôi gò bồng đảo cũng rung lên bần bật đầy\nquyến rũ."

# monologue
# JP: 触れたいが、手は届かない。\nだから代わりに、まるいお尻のふくらみをまた――
1352 = "Muốn chạm vào, nhưng tay không với tới.\nNên thay vào đó, tôi lại xoa nắn đường\ncong tròn trịa của cặp mông——"

# monologue
# JP: （むにいっ――むりゅっ――もみゅっ――みゅうっ）
# 1661 = "（揉來揉去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっ――あ――っ――おしりっ――もみもみっ――\nされるッ――っと――んっ――」
893 = "「Á——a——mông——bị xoa bóp——\nThế này——thì——ưm——」"

# monologue
# JP: スライドのリズムを取りにくいのか、\nポーレットの腰の動きが不規則になる。
1460 = "Có vẻ như khó bắt nhịp trượt,\nchuyển động hông của Paulette trở nên loạn\nnhịp."

# monologue
# JP: 押しつぶされる刺激が勃起にくわえられ、\n気持ちよすぎて、揉み込む手にも力がこもる。
1258 = "Sự kích thích do bị đè nén truyền đến\ndương vật,\nquá sướng, khiến tay tôi càng xoa bóp mạnh\nhơn."

# monologue
# JP: （むにっ――むにゅ――もみゅっ――みゅむん！）
# 1661 = "（揉來揉去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ――んっ――ふあっ――そ、双鉄、くんっ――\nわたし――わたしっ――あのっ――」
940 = "「A——ưm——phù——a, anh Soutetsu——\nEm——em——chuyện đó——」"

# 【双鉄H】
# display as 雙鐵
# JP: 「うん」
# 981 = "「嗯」" 

# monologue
# JP: おしりを揉む手を一端止めて、\nポーレットの言葉の続きを待ってみる。
1358 = "Tôi tạm dừng tay xoa mông,\nchờ xem Paulette định nói gì tiếp."

# monologue
# JP: 背中までぱあっと赤く染め、もじもじと小さく震えつつ、\nポーレットは、それでもはっきり求めてくれる。
1477 = "Đỏ ửng cả lưng, run rẩy ngượng ngùng,\nnhưng Paulette vẫn nói rõ yêu cầu của\nmình."

# 【ポーレット】
# display as 波萊特
# JP: 「もう、おまんこ――がまんっ――できない、です――\nからっ――下さいっ――双鉄くんの――おちん、ちん」
1019 = "「Cô bé——không thể chịu đựng——được nữa,\nrồi——\nNên là——xin hãy cho em——dương, vật——của\nanh Soutetsu」"

# 【双鉄H】
# display as 雙鐵
# JP: 「ああ。僕も、ポーレットのおまんこが欲しい」
987 = "「Ừ. Anh cũng muốn cô bé của Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うれしっ――嬉しいです。双鉄くんっ」
1013 = "「Sướng——Em vui lắm. Anh Soutetsu」"

# monologue
# JP: 言葉と共に、白い体がいきいきと跳ね――
1556 = "Cùng với lời nói, cơ thể trắng ngần bật\nlên đầy sức sống——"

# 【ポーレット】
# display as 波萊特
# JP: 「ふぃぁぁあああああああああっ！！！」
920 = "「Phiaaaaaa!!!」"

# 【双鉄H】
# display as 雙鐵
# JP: 「んくっ――」
# 971 = "「嗯——」" 

# monologue
