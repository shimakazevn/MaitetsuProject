# 【双鉄】
# display as 雙鐵
# JP: 「いや、買ってあるのだ。家にある。\nどうしよう、今からナビを呼んで」
1703 = "「不，我已經買好了。放在家裡。怎麼辦，我馬上把Ｎａｖｉ叫來——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あとでいいです。\nそれより今は……もっと、一緒にいたいですし」
2385 = "「過會再去拿吧。比起戒指，我現在……更想跟你多待一會」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
2229 = "「波萊特」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ、お二方ともここでしたか」
1901 = "「啊，二位都在這裡啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お、っと」
1850 = "「哎喲」" 

# monologue
# JP: ポーレットへと伸ばしかけた手で、頭を掻く。
2955 = "我收回正要伸向波萊特的手，抓了抓自己的腦袋。" 

# monologue
# JP: 自分でも露骨にすぎる誤魔化しのように思えるが、\n赤井宮司もその連れも、全く気にする素振りを見せない。
3304 = "連我自己都覺得這個假動作太過明顯，但赤井宮司與他的同伴都全然沒有在意。" 

# 【ニイロク】
# display as 二六
# JP: 「行ってやれ。れいなが待ってる」
2060 = "「快去吧。玲奈在等你們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「待ってる――って、\x%lキハ07;#00ffc040;キハ07%l;#;でか！？」
1971 = "「在等我們——在\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;上等我們！？」" 

# monologue
# JP: 視察のために、せっかく改修した\x%lキハ07;#00ffc040;キハ07%l;#;に、\nれいなは乗れずに我慢していた。
2835 = "好不容易完成了\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;的改造，卻因為大臣視察一事，使得玲奈一直沒機會乘上去。" 

# monologue
# JP: 視察が無事に終わったら、思いっきり走らせようと、\n確かに約束してたが――
2931 = "我們的確跟她約定過等視察順利結束後會讓她盡情地奔跑——" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさか、今日の今日だったとは」
2218 = "「沒想到，就是在結束當天啊」" 

# 【ニイロク】
# display as 二六
# JP: 「行ってやれ。楽しんでこい」
2058 = "「快去吧。玩得盡興些」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ありがとうニイロク。\n――君はどうだ？　楽しかったか？」
1931 = "「嗯。謝謝你，二六。——那你呢？　玩得盡興嗎？」" 

# 【ニイロク】
# display as 二六
# JP: 「愚問」
2266 = "「真是個愚蠢的問題」" 

# monologue
# JP: 声が、ほんのわずかに、笑う。
2829 = "她的聲音中，帶著一絲笑意。" 

# 【ニイロク】
# display as 二六
# JP: 「ヤボだ。お前は」
1752 = "「你真不識趣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「違いない」
1690 = "「一點沒說錯」" 

# monologue
# JP: 軽く手を振り、赤井宮司に向き直る。
2969 = "我輕輕揮了揮手，轉向赤井宮司。" 

# monologue
# JP: ニイロクも、無論、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。\n\x%l共感;#00ffc040;共感%l;#;で、全てはすでに伝わっていようが――
2667 = "二六也是\\x%lレイルロオド;#00ffc040;鐵路人偶%l;#;。她應該也通過\\x%l共感;#00ffc040;共鳴%l;#;獲知了一切。不過——" 

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司も本当にありがとうございます」
1708 = "「也非常感謝赤井宮司您的幫助」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「お互いさまというヤツですよ。\nそれよりほら、早くいってあげてください」
2106 = "「我們這算是互相幫助。先別說了，請趕快過去吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ええ――はい」
1922 = "「嗯——好的」" 

# monologue
# JP: なんだろう。\nどうしてそこまで急かすのだ？
2905 = "怎麼回事。為什麼這麼著急？" 

# monologue
# JP: が、確かにれいなを待たせておくのも忍びない。
2660 = "不過，我的確不忍心讓玲奈等著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでは」
2406 = "「那我們告辭了」" 

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ、お二人とも――\nご結婚、おめでとうございます」
1938 = "「嗯，二位——恭祝新婚快樂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「えっ！？　なっ！！？」
1852 = "「哎！？　什麼！！？」" 

# monologue
# JP: 御一夜駅のホームに出れば、\n赤井宮司の言葉の理由が、すぐわかる。
2933 = "我們走出御一夜站月台，馬上理解了赤井宮司的話。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、これは――」
2380 = "「這是什麼——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「こ、こんなの……\n線路を、傷めちゃう、し」
2377 = "「這、這樣子……線路、會受損的」" 

# 【凪】
# display as 凪
# JP: 「傷まないばーい、アルミ缶ばーい！　軽量ばいっ！」
1696 = "「不會受損的咧，這是鋁罐！　很輕的咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「おめでとうございます！　わたし、来るなり、\n凪ちゃんにこき使われちゃいました」
2071 = "「恭喜二位！　我一來，就被小凪使喚來使喚去的」" 

# monologue
# JP: ふかみ一人だけではない。真闇姉、稀咲、蓑笠老人、\n永山夫人、登呂流湯のご主人、さらには宝生元忠も。
2654 = "不光是深美一個人。還有真闇姐、稀咲、蓑笠爺爺、永山女士、登呂流浴場老闆，甚至還有寶生元忠。" 

# monologue
# JP: ボランティアやキャストの人たち、議員たちまでもが、\nホームの上で、にこにこと僕らを見守っている。
2900 = "志願者以及演員，就連議員們都站在月台上，滿面笑容地望著我們。" 

# 【双鉄】
# display as 雙鐵
# JP: 「視察の結果を……みんな、気にしてくれていたのか」
1988 = "「大家……都這麼關心視察的結果嗎」" 

# 【れいな】
# display as 玲奈
# JP: 「ポーレットぉ、そうてつさぁん、まだですかぁ！」
2231 = "「波萊特，雙鐵先生，還沒好嗎！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと！」
1861 = "「哦喲！」" 

# monologue
# JP: 報告ならば、あとでいい。\n先約してたれいなを待たせるわけにはいかない。
2731 = "匯報不急這一時。可不能讓有約在先的玲奈等太久。" 

# monologue
# JP: ぐっと、ポーレットの手をつかむ。
2964 = "我緊緊握住波萊特的手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、いくぞ。\nもしもレールが傷むのならば、すぐに直すさ」
2230 = "「波萊特，我們走吧。就算鐵軌受損了，我們也能很快修好」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね！」
2181 = "「是啊！」" 

# 【れいな】
# display as 玲奈
# JP: 「わぁい！　やーっと走れますぅ」
2009 = "「好耶！　終於可以奔跑了」" 

# monologue
# JP: れいなの歓声につつまれながら、\nポーレットと二人、体を寄せあう。
3048 = "沐浴在玲奈的歡呼聲之中，我和波萊特彼此相依。" 

# monologue
# JP: ブレーキ解除、ギアをつないで、\nハンドルの上に重ねた手から、\x%lキハ07;#00ffc040;キハ07%l;#;へと力を伝える。
3251 = "解除剎車，連接排檔，握住手把，向\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;傳送出力量。" 

# 【ポーレット】
# display as 波萊特
# JP: 「走りましょう。ずっと一緒に、これからも」
1689 = "「一起奔跑吧。永遠永遠」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ずうっとだ」
1930 = "「嗯。永遠」" 

# monologue
# JP: 信号は、青。\nならばためらう理由など無い。
2701 = "信號燈是綠色的。那就無需再猶豫。" 
