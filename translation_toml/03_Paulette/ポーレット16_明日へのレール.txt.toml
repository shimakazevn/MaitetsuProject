[characters]
2613 = "Dù có che giấu vết thương, ngoảnh mặt đi,\nkhoác lên mình bộ quần áo đẹp đẽ,\nthì rồi cũng có ngày nó sẽ bị nhuốm màu\nbởi dòng máu rỉ ra từ vết thương đó."
2744 = "双鉄"
2851 = "Vừa nói, Paulette vừa chỉ vào\nchiếc dập ghim khổng lồ trên bàn."
3035 = "永山"
3202 = "職員Ａ"
3204 = "職員Ｂ"
3140 = "真闇"
3346 = "駐車場係"
3262 = "警備員"
3165 = "経産大臣"
2992 = "文科大臣"
2569 = "れいな"
2549 = "ふかみ"
2720 = "凪"
3004 = "Michiko cười.\nCười khúc khích đầy tinh nghịch——nhưng lại\ncó chút gì đó cô đơn."
2602 = "ハチロク"
3270 = "赤井宮司"
2597 = "ニイロク"

[character_subs]
3064 = "Làm vậy tuy không thể chữa lành vết\nthương,\nnhưng ít nhiều cũng có thể thấy được cách\nđể sống chung với nó."
3329 = "雙鐵"

# 2851 = "宮本"

# 3035 = "永山"

# 3202 = "職員Ａ"

# 3204 = "職員Ｂ"

# 3140 = "真闇"
3393 = "？？？"
2702 = "Như thể đang cộng hưởng với tâm trạng vui\nvẻ của Paulette,\nnụ cười hạnh phúc của em ấy lan tỏa khắp\nCửa hàng đường sắt."
2695 = "Đặt chồng phần nắp trên vừa ép xong\nlên chiếc đĩa kim loại được gọi là nắp\ndưới——"
3179 = "經濟產業大臣"

# 2992 = "文科大臣"
3106 = "＜Hiệu quả kỳ vọng＞ ・Thương mại hóa việc\nkhôi phục tuyến đường sắt\n・Phát sinh nhu cầu kiểm tra phương tiện\n・Kích cầu du lịch dọc tuyến"
3083 = "深美"

