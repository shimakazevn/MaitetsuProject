# JP: 「恩返し？」
1983 = "「報恩？」" 

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「諦めなかったじゃないですか。御一夜の水を守るために。\n自分たちが様子見してたころにも、たったひとりでも」
2075 = "「您一直都沒有放棄保護御一夜的水源不是嗎。在我們還在觀望情況的時候，您也在一個人努力著」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1872 = "「啊——」" 

# 【職員Ａ】
# display as 職員Ａ
# JP: 「様子見しちゃうんです、私達。\nどんな市長の下でも、働かなくちゃいけませんから」
2099 = "「我們剛開始不得不觀望情況。因為無論上來一位什麼樣的市長，我們都得吃這碗飯」" 

# monologue
# JP: なるほどだ。\n市長が変われば、政策への取り組み方も変わるだろう。
2742 = "原來如此。上來一位新市長，政策方針自然也會有所改變。" 

# monologue
# JP: 一つの政策に全面的に賛意を示せば、\nそれは将来、自分の枷にもなりかねない。
2842 = "如若盲目地力挺某一項政策，其很有可能成為自己職業生涯中的桎梏。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは……わかりますし、当然のことだと思います」
2376 = "「這……我能夠理解，這也是理所當然的做法」" 

# 【職員Ａ】
# display as 職員Ａ
# JP: 「でも、それが当然じゃダメなんですよね。\nそのことを私、市長に教えてもらいました」
1736 = "「但是，我們必須剔除這種“理所當然的做法”。是市長您，教會了我這個道理」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしに、ですか？」
2118 = "「我嗎？」" 

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「それが市のためだと思ったら、自分から動かなきゃ。\n自分らの本当の雇い主は、市民の皆さんなんすから」
2165 = "「既然認為這麼做有利於我市，那就應該主動去行動。因為我們真正的僱主，是御一夜的市民啊」" 

# monologue
# JP: 宮本さんが、はっと驚いたような顔をする。
2855 = "宮本女士做出驚訝的表情。" 

# monologue
# JP: いつの間に――周囲の人たち全ての耳が、\n僕らの会話に集中している。
2952 = "我掃視四周——發現不知從什麼時候起人們都開始認真聽起我們的對話。" 

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「市長は、御一夜のためにたったひとりでも頑張った。\n自分、それを見て感動したから、真似したいんです」
2038 = "「市長您哪怕孤身一人，也一直在為御一夜而奮鬥。我看在眼裡非常感動，也想向您學習」" 

# 【職員Ａ】
# display as 職員Ａ
# JP: 「ずるいなぁ、私がそれ言おうと思ったのに」
2273 = "「真狡猾，風頭都被你搶去啦」" 

# 【駐車場係】
# display as 停車場管理員
# JP: 「あの……ワシのような年寄りにでも、\n役にたてるようなことがあれば」
2398 = "「那個……如果有什麼是我這樣的老頭子能幫上忙的」" 

# 【警備員】
# display as 保安
# JP: 「力仕事ならお任せください。\n力仕事しかできませんがね」
2299 = "「粗活就請包在我身上吧。雖然我也只能幹粗活」" 

# monologue
# JP: わたしも、僕もと――\n声が、さざなみのように広がっていく。
3306 = "還有我、還有我——聲音如漣漪般擴散開來。" 

# monologue
# JP: その真中で、ポーレットはただ震えている。\n青い瞳はゆらゆらと揺れ、嬉し涙をこらえてる。
2791 = "在漣漪的中心，波萊特不停地顫抖著。她藍色的眼眸搖曳著，努力不讓喜悅的淚水掉下。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし……あの……だって」
2086 = "「我……那個……可是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。\n何をとりつくろう必要もないさ」
2228 = "「波萊特。你不需要做什麼掩飾」" 

# monologue
# JP: この人たちは見てくれていた。
3296 = "這些人，一直都看在眼裡。" 

# monologue
# JP: 父の重荷をいきなり背負わされることになり、\nそれでも潰れず、必死にあがいたポーレットの姿を。
3137 = "看著波萊特不得不突然間被迫挑起父親留下的重擔，卻沒有被壓垮，一路上拚命掙扎的樣子。" 

# 【ポーレット】
# display as 波萊特
# JP: 「――はいっ」
1329 = "「——是！」" 

# monologue
# JP: 涙がこぼれる。ぐすっと、鼻をすすりあげる。\nそんな姿も、きっと何度も見られただろう。
3068 = "波萊特抽泣起來，淚水滑落臉頰。她這張哭泣的臉孔，大家一定也不會感到陌生。" 

# monologue
# JP: そうした日々をまるごと全部、\n今、ポーレットは肯定されてる――認められてる。
2795 = "在這一刻，她所有的努力、所有的淚水都得到了肯定——贏得了認同。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます！」
2434 = "「非常感謝大家！」" 

# monologue
# JP: その喜びが、きっとポーレットに力を与えてくれている。
3299 = "這份喜悅，一定會為波萊特帶來力量。" 

# monologue
# JP: 泣きながら、もう鼻声になりながら、\nそれでも背筋は、凛と美しく伸びている。
2823 = "她流著眼淚、帶著鼻音，卻依然直直地挺著背脊，端莊而美麗。" 

# 【ポーレット】
# display as 波萊特
# JP: 「みなさん、どうか――\n御一夜のために、そのお力を貸してください！！」
2152 = "「拜託各位了——為了御一夜，請助我一臂之力！！」" 

# monologue
# JP: 応！　と、いくつも、強い声が沸き起こる。
1309 = "“好”——周圍的人們一齊出聲。" 

# monologue
# JP: うねりのような熱気が生まれ――\nそこにさあっと、涼風のような声が流れる。
3336 = "響亮的聲音捲起熱浪——隨後傳來一個如涼風般的聲音。" 

# 【宮本】
# display as 宮本
# JP: 「……シフト管理の人材は足りていますか？\nもしいないなら、私も、ボランティアとして」
1343 = "「……你們需要班次管理人才嗎？如果需要的話，我也來當個志願者」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます！」
2435 = "「非常感謝！」" 

# monologue
# JP: 心強い、と思った瞬間、理解する。\n心強いという言葉では、足りないほどの力なのだと。
3303 = "這真是雪中送炭——不。大家送的，可不僅僅是煤炭這麼簡單。" 

# monologue
# JP: （そうだ、市役所は……\nそれぞれの部署の専門家の集合なんだ）
3389 = "（對啊，市政府……可是聚集了各個部門的專家）" 

# monologue
# JP: 土木課、建設課、会計課、都市計画課、防災課――\nそうした部署の専門知識は、まさしく僕らが欲するものだ。
2780 = "土木科、建設科、會計科、城市規劃科、防災科——這些部門的專業知識，正是我們現在所需要的。" 

# monologue
# JP: （君はすごいな、ポーレット。\n君がいるから――過去の全てが僕らの味方だ）
3369 = "（你可真是了不起啊，波萊特。因為有你在——過去的一切都成為了我們的助力）" 

# monologue
# JP: 感心をして、嬉しくなって、\n愛おしいなと、しみじみ思う。
2991 = "敬佩變成了喜悅，最後化作愛憐。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
2013 = "「好！」" 

# monologue
# JP: ならば、この手で切り拓こう。\nポーレットとともに歩む未来を。
3309 = "那就讓我親手來開拓要與波萊特一起走向的未來。" 

# monologue
# JP: 僕にも、僕の過去がある。\nそうしてそれは――僕の味方だ。
2917 = "我也有著我的過去。而它——也將成為我的助力。" 

# monologue
# JP: （ありがとうな。\n助けてくれて――生かしてくれて）
3391 = "（謝謝你。救了我——讓我活了下來）" 

# monologue
# JP: 今なら、思える。心の底から素直に思える。\nだからもう何も怖くない。
3034 = "此時此刻，我發自內心地這麼認為。所以，我不會再害怕。" 

# monologue
# JP: 望む未来は――\n積み重ねてきた僕らの過去の、延長なのだと知ったから。
2778 = "因為我已經明白，我們所期望的未來，就在過去的延長線上。" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「[きじし,2]木地師文化というものは、どうなのですかね、実際」
2145 = "「所謂木旋工文化，具體是什麼樣的呀」" 

# monologue
# JP: 駅弁を広げつまみつつ、\nいささか太った大臣が細身の大臣に問いかける。
3150 = "稍胖的大臣一邊打開鐵路便當，夾起裡面的小菜，一邊問向體型瘦長的大臣。" 

# monologue
# JP: 大臣たちは、四人がけのボックスシートを二人で使い、\n斜めに向きあって座ってる。
3335 = "面對面的四人包廂坐席裡，兩位大臣互相斜對坐著。" 

# 【文科大臣】
# display as 文科大臣
# JP: 「面白いですね。ほとんど研究は進んでませんが、\n[ヒノモト,2]日ノ本は、やはり木と紙の国ですので」
2272 = "「真是有趣呀。雖然基本上還沒展開研究，但我們日本果然還是木材與紙張之國」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ふぅん、そんなもんですか」
1926 = "「嗯……是這樣嗎」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「大臣の地元。[とっとり,1]十鳥にも木工の町があったでしょう。\n[わかさ,2]和歌桜でしたか。あそこも木地師と縁が深そうですね」
1995 = "「大臣您的老家——鳥取縣，也有一處木工之鄉吧。記得是叫若櫻町？　看來那裡也與木旋工有著很深的淵源」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ほおお。\n[わかさ,2]和歌桜の林業も、今は弱ってしまっておりますがねぇ」
1959 = "「嚯——不過若櫻的林業，如今也已經衰敗了呀」" 

# monologue
# JP: 補佐役だろう官僚が、何を補足しようともしない。\n大臣たちは、なかなか適材適所のようだ。
2999 = "旁邊一位看起來像是助理的官僚，沒有作任何補充。看來二位大臣，都非常適材適所。" 

# 【ポーレット】
# display as 波萊特
# JP: 「まもなく、鉄橋を通過します。\n九時の方向をご覧ください」
1786 = "「列車馬上要通過鐵橋了。請看向九點鐘方向」" 

# monologue
# JP: 控えめなポーレットの声のガイドによって、\n大臣たちの視線が動く。
2789 = "在波萊特含蓄的聲音引導下，二位大臣看向了窗外。" 

# 【ポーレット】
# display as 波萊特
# JP: 「眼下に流れるクマ川は、県内最大の河川です。\n日ノ本三大急流のひとつとしても知られていますね」
2103 = "「我們現在看到的隈河，是縣內最大的河川。同時也作為日本三大急流之一而聞名於世」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「なら、この鮎も――クマ川で？」
2417 = "「那麼，這條香魚——也是隈河裡的？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、御一夜の特産品のひとつです」
2194 = "「是的，是御一夜的特產之一」" 

# monologue
# JP: ふむ、と痩せた大臣の箸が動く。
3352 = "體型瘦長的大臣點了點頭，動起了筷子。" 

# 【文科大臣】
# display as 文科大臣
# JP: 「キジ馬を模しているのですね。\nなかなかおいしい、かわいらしい」
1764 = "「做成了雉子馬的樣子啊。味道挺不錯，還很可愛」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます」
2350 = "「謝謝」" 

# 【れいな】
# display as 玲奈
# JP: 「ニイロクさんと[ぐうじ,1]宮司さん、お上手ですねぇ」
1715 = "「二六小姐和宮司先生，真是熟練呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1935 = "「嗯」" 

# monologue
# JP: 鉄橋通過をしたというのに、\n大臣たちの小脇のお茶は、その水面を揺らしもしない。
2725 = "列車駛過了鐵橋，放在二位大臣手邊的茶水，卻沒有絲毫晃動。" 

# monologue
# JP: ガソリン\x%l気動車;#00ffc040;気動車%l;#;に戻した影響も大きかろうが、\n宮司たちの腕も、それ以上に寄与してるのだろう。
3327 = "雖說主要是因為Ｋｉｈａ０７復原成了汽油\\x%l気動車;#00ffc040;動車%l;#;，但宮司二人的技術，一定也起到了很大的作用。" 

# 【双鉄】
# display as 雙鐵
# JP: 「神社の視察も良い感触だった。説明役の大役を終え、\n宮司としても、気分よく乗務されているのだろう」
2292 = "「神社的視察也進展得很順利。完成了介紹神社的艱巨任務，宮司此刻駕駛起來一定也很寬心」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなたちも、\n負けないようにがんばらないとですねぇ」
2246 = "「玲奈和雙鐵先生也要加油，不能輸給宮司他們呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
1936 = "「嗯！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あと五分程、\x%l列車;#00ffc040;列車%l;#;はマイントレジャー入口駅につきます。\nそこからは、トロッコに乗っていただきます」
1782 = "「再過大約５分鐘，\\x%l列車;#00ffc040;列車%l;#;就會到達煤探樂園入口站。之後要請各位乘坐礦車」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「トロッコか。なつかしいな。\n大臣は、お乗りになったことは？」
2289 = "「礦車啊。還真是懷念啊。大臣您以前坐過嗎？」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「さぁ……あったようななかったような」
2375 = "「這……好像坐過，又好像沒坐過」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「なかなか楽しい物ですよ。\nこの\x%l列車;#00ffc040;列車%l;#;ほど、乗り心地よくはありませんがね」
1973 = "「坐起來可是很有意思的。雖然不如這輛\\x%l列車;#00ffc040;列車%l;#;坐著舒服」" 

# 【れいな】
# display as 玲奈
# JP: 「とうちゃくしましたぁ！」
1788 = "「到啦！」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「お、ご苦労。運転、見事だったな。\nワシが嘘つきになってしまったよ」
1956 = "「噢，辛苦了。你的礦車開得真好。看來是我說了胡說呀」" 

# monologue
# JP: 思わず、ニヤリと笑ってしまう。\n\x%l保線;#00ffc040;保線%l;#;ボランティアさんたちの努力が完全な成果となった。
2912 = "我不禁暗自竊喜。\\x%l保線;#00ffc040;巡線%l;#;志願者們付出的努力，收穫了最好的成果。" 

# monologue
# JP: なのにれいなは、ひどく慌てて頭を下げる。
2759 = "可是玲奈卻慌張地低下了頭。" 

# 【れいな】
# display as 玲奈
# JP: 「はわわ、ごめんなさいですぅ」
1890 = "「啊哇哇，對不起」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「責めてない。褒めている」
2127 = "「我沒有責怪你，是在表揚」" 

# 【れいな】
# display as 玲奈
# JP: 「はぅ？」
1845 = "「哈嗚？」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「ふぅ……ここは、炭鉱ではないようですが？」
1924 = "「嗯……我看這裡不像是煤礦呀？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、ここは技師さんや鉱夫さんが暮らしていた、\nかつての宿舎です」
2198 = "「是，這裡是過去技工與礦工們居住的宿舍」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「ああ……高度経済成長期の面影を感じますねぇ」
1883 = "「啊……彷彿能看到戰後經濟高速增長期的殘影呀」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「確かに。あの時期はこうした公団がたくさんでしたな。\nああほら、懐かしい。割烹着姿で買い物に――っ！？」
2260 = "「的確。在那個時期存在很多這樣的公營住宅呀。啊，你看，太懷念了。穿著烹飪圍裙的婦人出門去買東西——咦！？」" 

# monologue
# JP: 経産大臣がギクリと止まる。硬直する。
3180 = "經濟產業大臣僵在了原地。" 

# monologue
# JP: ぼろぼろの廃宿舎から、すっと――割烹着姿の婦人が、\n買い物かごを下げて通りに出てきたからだ。
2888 = "從那棟破舊的廢棄宿舍中，一位穿著烹飪圍裙的婦人，提著菜籃走了出來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、ちょうどよかった。妖精さんですね」
1909 = "「啊，我們來得正好。精靈來了」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「妖精さん？」
2307 = "「精靈？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「って、わたしたちは呼んでます。\n鉱山が栄えていた頃の、思い出だとも言われています」
2101 = "「我們是這樣稱呼的。還有人稱他們為“礦山繁榮時期的回憶”」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「鉱山の思い出……廃鉱山が、見る夢、か」
2288 = "「礦山的回憶……廢礦山的昔日之夢嗎」" 

# monologue
# JP: 見かけによらず、経産大臣はロマンチストであるらしい。\nマイントレジャーの世界にすんなり、入ってくれる。
3138 = "真看不出來，經濟產業大臣還是一個浪漫主義者。他很快就融入了煤探樂園的世界。" 

# 【ポーレット】
# display as 波萊特
# JP: 「坑道に入るには鍵がいるんですけど、\n妖精さん、いつもどこかに隠しちゃうんです」
2431 = "「需要有鑰匙才能進入坑道，但是精靈總喜歡把鑰匙藏起來」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「ほう」
1957 = "「嚯——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「どこにあるか、わたし、ちょっと聞いてきますね？」
2107 = "「我去問一下鑰匙在哪裡」" 

# monologue
# JP: ポーレットが妖精さんのもとに向かってすぐに戻ってくる。
3067 = "波萊特向著精靈跑去，很快又跑了回來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「聞いてきました。\n『トロッコのおやつの星の下』だそうですよ？」
2108 = "「我去問過了。精靈說“鑰匙藏在礦車的點心——星星之下”」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「謎かけですか……ふぅむ？　\nトロッコのおやつとは――」
2240 = "「猜謎嗎？　嗯……礦車的點心是——」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「これは電動トロッコだよな。\nバッテリーは？」
2383 = "「這是電力礦車吧。電池在那裡？」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい、ここですぅ」
1942 = "「嗯，在這裡」" 

# monologue
# JP: トロッコの端、\x%l運転士;#00ffc040;運転士%l;#;席の下にボコンと据え付けられてる。\nおつきの官僚の静止にかまわず、大臣はそこを覗きこむ。
3331 = "電池被固定在礦車的前端，\\x%l運転士;#00ffc040;駕駛員%l;#;的座位之下。不顧隨行官僚的制止，大臣將腦袋探了進去。" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「星……星は――」
2174 = "「星星……星星呢——」" 

# 【れいな】
# display as 玲奈
# JP: 「どうぞ、懐中電灯ですよぉ」
2310 = "「給您手電筒」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「お、すまんな――\nう――むぅ、無いようだなぁ」
1864 = "「哦，謝謝啊——嗚——呃，好像沒有啊」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「動力源だったら、ご飯じゃないですかね？\nおやつとわざわざ言うからには、そうではなく――」
1797 = "「動力源應該算是它的飯吧？既然特地說是點心，那應該不是電池——」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「おやつ……おやつねぇ。三時のおやつ？」
2447 = "「點心……點心啊。下午三點的點心？」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「ああ」
# 1872 = "「啊——」" 

# monologue
# JP: 痩せた大臣がニヤリと頷く。
3351 = "體型瘦長的大臣嘴角露出得意的微笑。" 

# 【文科大臣】
# display as 文科大臣
# JP: 「わかったかもしれませんぞ――\nおそらくは、だからさきほどわざわざ“九時の方角”と」
2120 = "「我大概明白了，所以剛才在列車上你們才特地說了“九點鐘方向”」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「なるほど！」
1804 = "「原來如此！」" 

# monologue
# JP: 経産大臣がトロッコの三時、\n右手方向を探し始める。
3182 = "經濟產業大臣開始尋找礦車的三點鐘——也就是右手的方向。" 

# monologue
# JP: 余りに苦戦するようだったらヒントの用意もあったのだが、\nその必要もなさそうだ。
2841 = "如果二位大臣思考得太久，我還準備了提示。現在看來是沒有必要了。" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「おお、星とはこの石か――\nおっと、あったぞ！　錆びついた鍵だ」
1953 = "「噢，所謂星星是指這塊石頭嗎——呀，找到了！　一把生鏽的鑰匙」" 

# 【ポーレット】
# display as 波萊特
# JP: 「よかった、これで坑道にはいれます」
2002 = "「太好了，這樣就能進入坑道了」" 

# monologue
# JP: （カツン……）
3381 = "（喀嚓……）" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「見事だな。\n最末期まで採掘を続けていただけのことはある」
1998 = "「太出色了。不愧是將採掘堅持到最後一刻的煤礦」" 

# monologue
# JP: 鍵を開け、坑道内に踏み込むやいなやで、\n経産大臣は感慨深げな声をだす。
3114 = "用鑰匙打開門，剛剛踏入坑道一步，經濟產業大臣便感慨頗深地講道。" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「シールドにもロードヘッダにもサビ一つ無い。\nええ、どうだ。今にも動き出しそうじゃないか」
2264 = "「盾構機和懸臂式掘進機上面毫無鏽跡。哈哈，怎麼樣。就好像隨時會開動起來一樣啊」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「確かに大したものですね――\nこれほど、湿気が多いのに」
2262 = "「的確是很了不起啊——明明坑道裡這麼潮濕」" 

# monologue
# JP: 坑道内の気温の低さに、文科大臣が小さく震える。
2796 = "坑道內的低溫讓文部科學大臣打了個顫。" 

# monologue
# JP: すぐさまお付きの官僚が、スーツのポケットから――
3322 = "隨行的官僚見狀，立刻從西裝的口袋中拿出了——" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ああ、いかんっ！」
1898 = "「啊，不行！」" 

# monologue
# JP: 経産大臣が止めた手に、銀のライターが輝いている。\nどうやら、たばこを提供しようとしていたようだ。
3236 = "被經濟產業大臣制止的官僚手中，握著一個閃閃發亮的銀色打火機。看來他是想替大臣點菸。" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「坑道内にはメタンガスがたまっていることが多い。\n火気厳禁と入る前にも言われたろう――なぁ、妖精さん」
1979 = "「坑道內經常充斥著甲烷。在進來之前不是也叮囑過我們嚴禁煙火嗎——對吧，精靈先生」" 

# monologue
# JP: やはりライターを懸念したのだろう。
3128 = "看來他也在擔心打火機。" 

# monologue
# JP: 炭鉱奥からすっ飛んできた、鉱夫姿の妖精さんが、\n経産大臣の言葉に頷く。
3300 = "這位從煤礦深處飛奔過來的，打扮成礦工模樣的精靈，對經濟產業大臣點了點頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「妖精さん、わたしたち、石炭を掘りたいの。\n少し、わけてもらえるかしら」
2305 = "「精靈先生，我們想要採掘煤炭。能分給我們一些嗎？」" 

# monologue
# JP: 経産大臣の顔を見、ニカリと笑い頷いて、\n妖精さんは奥へとすすむ。
3161 = "精靈看向經濟產業大臣，笑著點了點頭，隨後朝著坑道深處走去。" 

# monologue
# JP: その行く先には、真っ黒な岩盤と、\n大きなドリルとが僕らのことを待っている。
2934 = "我們跟著他往裡走，看到一塊漆黑的岩盤，以及一台巨大的鑿岩機。" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ほう、実際に掘れるのか。\nなるほど、これならば危なくない」
1867 = "「哦，還真的能採礦啊。原來如此，這樣就不會有危險了」" 

# monologue
# JP: その言葉に応じるように、\n妖精さんはドリルのハンドルを握りこむ。
2865 = "就好像是配合著大臣的這一句話，精靈握緊了鑿岩機的握把。" 

# monologue
# JP: （ガガガガガガガガ！）
3390 = "（突突突突突突突突！）" 

# monologue
# JP: 轟音。粉砕。飛び散る石炭。
3281 = "轟鳴、粉碎。煤炭飛濺。" 

# monologue
# JP: が、ハンドル前方全面に大きく広がる透明樹脂、\nポリカーボネートのシールドが、黒い弾丸を跳ね返す。
3195 = "而在鑿岩機前方，那一大片用聚碳酸酯製成的透明防護罩將黑色的子彈反彈了回去。" 

# 【文科大臣】
# display as 文科大臣
# JP: 「ほほう、なかなかに興味深い」
1960 = "「嚯嚯，真有意思」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「なら、お先にどうぞ、大臣」
2413 = "「那麼，您先請吧，大臣」" 

# monologue
# JP: 経産大臣の声に応じて、\n妖精さんがドリルのハンドルから手を離す。
3321 = "隨著經濟產業大臣的話音，精靈放開了鑿岩機的握把。" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ドリルが暴れると危険です。\nしっかり握って――が、体重をかけてはいけませんぞ」
2421 = "「鑿岩機失控會很危險。要緊緊握住握把——但不要將身體的重量壓上去」" 

# monologue
# JP: 妖精さんが、補助をしながら苦笑している。\n経産大臣は、ノリノリだ。
2784 = "在一旁輔助的精靈不禁露出苦笑。經濟產業大臣正可謂是興致勃勃。" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「よろしいですかな？\nならば、ゆっくりと握りこみましょう！」
2232 = "「準備好了嗎？那麼來慢慢地扣緊握把吧！」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「ふーむ」
1920 = "「嗯——」" 

# 【ふかみ】
# display as 深美
# JP: 「お客さま……それ、何。ですか？　素敵。ですね」
2379 = "「這位乘客……您拿的是什麼東西呀？　看起來真棒」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「石炭だね。私が掘ったんだよ」
2382 = "「這是煤炭。是我採來的」" 

# 【ふかみ】
# display as 深美
# JP: 「わ。それは……本当にすごい。です。\nあの――それなら。そちらの箱。は？」
1840 = "「哇。這可……真是厲害。呃——那麼，那只箱子又是？」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「鉱山の方――と、と。妖精さんが持たせてくれた。\n御一夜木工の宝箱なんだそうだ」
2196 = "「是礦山的工作人員——啊，不。是精靈送給我的。聽說這是御一夜木工製作的寶箱」" 

# 【ふかみ】
# display as 深美
# JP: 「わぁ。いいもの。ですね。妖精さんの宝箱。なら」
1838 = "「哇。精靈的寶箱，那一定是好東西呀」" 

# monologue
# JP: 大臣相手で、見るからに緊張をしていても、\nふかみはある意味、普段とほとんど変わらない。
3218 = "與大臣交談明顯讓深美有些緊張。但從某些方面來講，她其實與平常沒什麼不一樣。" 

# monologue
# JP: が、今日の舳先には見慣れぬ姿。\nなんとか復帰を果たしてくれた船頭さんたちの内の一人だ。
2659 = "不過今天的船頭，站著一個陌生的人。他是深美努力勸回來的掌棹之一。" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「帰りは川下りになるとはな。\n御一夜の観光を堪能させてもらえるわけか」
2217 = "「沒想到返程是乘坐漂流船呀。是要讓我們好好體驗一回御一夜的觀光景點嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それもあるんですけど……トロッコの後を――\nさっき、妖精さんがおっかけてきてて」
2424 = "「雖然也有這個目的……但主要是因為剛才有精靈在追趕礦車」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ふむ？　いつだ？」
1950 = "「嗯？　什麼時候？」" 

# monologue
# JP: “鉱夫宿舎を出たときです”と、\nお付きの官僚の一人がすぐに答える。
1307 = "“在我們離開礦工宿舍的時候”——隨行官僚中的一人立刻回答道。" 

# monologue
# JP: この小人数でも、気づいてくれる人がいた。\n何度も何度も、大きく振り向いた甲斐があったか。
2739 = "即使只有那麼幾個人，也還是有人注意到了。不枉我好幾次誇張地回頭看去。" 

# 【ポーレット】
# display as 波萊特
# JP: 「怒ってるわけじゃないとは思うんですけど、\n一応、安全策をとって――あら？」
2427 = "「雖然精靈看起來不像是在生氣，但出於安全考慮——哎呀？」" 

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「さっきの妖精か。手を振ってるな」
2177 = "「是剛才的精靈嗎。在朝我們招手呀」" 

# monologue
# JP: みなの視線が、川岸に向く。\nその一瞬に、ポーレットはれいなへと耳を寄せる。
2978 = "所有人一齊看向河岸。這時，波萊特迅速將耳朵湊到玲奈面前。" 

# 【れいな】
# display as 玲奈
# JP: 「260秒、使ってください」
2387 = "「還有２６０秒」" 

# monologue
# JP: すぐさま、ポーレットは立ち上がる。
3209 = "聽罷，波萊特站起身來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「なにか訴えかけてるようです。\nわたし、話を聞いてきますね？」
2304 = "「精靈似乎有話要說。我去問問哦」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、寄せます」
1911 = "「啊，我這就靠岸」" 

# monologue
# JP: すぐさまふかみが櫂を漕ぐ。\n船頭も巧みな操船をして、船は軽やかに着岸する。
3085 = "深美立刻劃起船櫓。掌棹也精妙地控制著方向，漂流船輕盈地靠上了岸。" 

# monologue
# JP: （完璧だ。ここまでは）
3373 = "（到目前為止都很完美）" 

# monologue
# JP: れいなとハチロクの\x%l共感;#00ffc040;共感%l;#;による、時間調整。\nこれが上手く決まるのならば、僕らのベストを叩きだせる。
2729 = "利用玲奈與八六之間的\\x%l共感;#00ffc040;共鳴%l;#;進行時間調整，只要做好這一步，我們就能交出一份滿分的答卷。" 

# 【ポーレット】
# display as 波萊特
# JP: 「聞いてきました」
2109 = "「我去問過了」" 

# 【ふかみ】
# display as 深美
# JP: 「わかりました。出しますね」
2006 = "「好的。那我們繼續出發」" 

# monologue
# JP: すぐさま船が岸を離れる。
3261 = "說完，漂流船離開了岸邊。" 

# monologue
# JP: ポーレットが立ち上がってから、ここまで二百と五十五秒。\nこの誤差ならば、上出来すぎる。
2887 = "從波萊特起身到現在，總共過了２５５秒。５秒的誤差，已經算非常精準了。" 

# 【文科大臣】
# display as 文科大臣
# JP: 「妖精さんは、なんと？」
2306 = "「精靈說了什麼？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「『私達の大事な石炭だから』って言ってました」
1732 = "「他說“這是我們非常重視的煤炭”」" 

# monologue
# JP: ポーレットの目が、文科大臣の手元に落ちる。
3074 = "波萊特看向文部科學大臣手裡拿著的物品。" 

# monologue
# JP: 精緻な宝箱の中、静かに眠っているそれは、\nまさしく、黒いダイヤという名にふさわしい。
3101 = "煤炭靜靜沉睡於精緻的寶箱之中。真可謂是名副其實的黑鑽石。" 

# 【ポーレット】
# display as 波萊特
# JP: 「『大事にしてくれたら嬉しい』\n『使って貰えたらもっと嬉しい』って」
1334 = "「“希望我們能夠善待它”“更希望我們能使用它”」" 

# 【文科大臣】
# display as 文科大臣
# JP: 「ああ……確かに。\n使われてこそ、というのはありましょうねぇ」
1885 = "「啊……的確。使用它，或許才是真正的善待吧」" 

# 【経産大臣】
