[script]
# lines: 551 
# 【ポーレット】
# display as 波萊特
# JP: 「お弁当、もうすぐですよね」
1761 = "「Cơm hộp bento, sắp đến rồi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、正午だと聞いている」
1947 = "「Ừ, anh nghe nói là giữa trưa.」"

# monologue
# JP: あれほど楽しみにしていたというのに、\nポーレットの顔色はすぐれない。
3069 = "Rõ ràng là đã mong đợi đến vậy,\nnhưng sắc mặt của Paulette lại không được\ntốt."

# monologue
# JP: 時計の針に目をやって、\n僕に気づかれないように、こそっと深い息を吐く。
2808 = "Đưa mắt nhìn kim đồng hồ,\nnhân lúc tôi không để ý, lén thở dài một\nhơi."

# 【双鉄】
# display as 雙鐵
# JP: 「この状況だ。気が急くのも解るが――」
2247 = "「Tình hình hiện tại là thế này. Anh hiểu\nem đang nóng ruột nhưng——」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえ……気が急く……のも、\nもちろんあるんですけど――」
1897 = "「A, không……nóng ruột thì……\ntất nhiên là cũng có, nhưng mà——」"

# monologue
# JP: 言いづらそうに、唇が開いてまた閉じる。\nすこし前までのポーレットに戻ってしまったかのようだ。
2820 = "Đôi môi hé mở rồi lại khép vào một cách\nkhó khăn.\nCứ như thể đã trở lại là Paulette của một\nthời gian trước vậy."

# monologue
# JP: が、そうであろうとなかろうと、僕のすること――\n望んでることは、変わらない。
2684 = "Nhưng, dù có phải vậy hay không, những gì\ntôi làm——\nnhững gì tôi mong muốn, sẽ không thay đổi."

# 【双鉄】
# display as 雙鐵
# JP: 「どんなことでも言ってくれ。\nそのため、僕はここにいるんだから」
1745 = "「Có chuyện gì cứ nói với anh.\nVì điều đó, nên anh mới ở đây mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……」
2428 = "「Anh Soutetsu……」"

# monologue
# JP: 小さな頷き。\n迷いの混じったような瞳を、隠さず僕へと向けてくれる。
2832 = "Một cái gật đầu nhỏ.\nKhông hề che giấu, đôi mắt pha lẫn sự\nhoang mang hướng về phía tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「全部、無駄になっちゃうんじゃないかって怖いんです。\nお弁当も、改修も……今までやってきたこと、全部」
2124 = "「Em sợ rằng, tất cả sẽ trở nên vô ích.\nCả cơm hộp bento, cả việc cải tạo……tất cả\nnhững gì chúng ta đã làm từ trước đến\nnay.」"

# 【双鉄】
# display as 雙鐵
# JP: 「人が、このまま集まらなければ――\nそのことを心配しているのか？」
1751 = "「Nếu mọi người, cứ tiếp tục không tập hợp\nlại thế này——\nEm đang lo lắng về chuyện đó sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうしたら……もし、マイントレジャー計画が、\n立ちあげられずに終わっちゃったら――」
2190 = "「Vâng, nếu vậy thì……lỡ như, kế hoạch Mine\nTreasure,\nkết thúc mà không thể khởi động được\nthì——」"

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ、ポーレット」
2216 = "「Không sao đâu, Paulette.」"

# monologue
# JP: 手を伸ばしても、髪をなでても、\nポーレットの表情はこわばったまま。
2928 = "Dù tôi có vươn tay ra, vuốt ve mái tóc,\nbiểu cảm của Paulette vẫn cứ cứng đờ."

# monologue
# JP: だから意識してゆっくりと、\n焦らせぬよう、言葉を選ぶ。
2974 = "Vì vậy, tôi cố ý chậm rãi,\nchọn lọc từ ngữ để không làm cô ấy thêm\nhoảng hốt."

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことには、決してならない。\n万一視察が失敗しても、次の一手で再逆転を」
2309 = "「Chuyện đó, tuyệt đối sẽ không xảy ra.\nVạn nhất cuộc thị sát có thất bại, thì\nbằng nước cờ tiếp theo, chúng ta sẽ lật\nngược tình thế một lần nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「次なんてっ！」
1869 = "「Làm gì có nước cờ tiếp theo chứ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2450 = "「!?」"

# monologue
# JP: 強い一歩で距離が無くなる。\nポーレットは僕の胸板に、体ごとほとんどぶつかってくる。
3070 = "Một bước mạnh mẽ làm mất đi khoảng cách.\nPaulette lao cả người, gần như đập mạnh\nvào ngực tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「だって、そうなったら双鉄くん……\n御一夜から、いなくなっちゃう」
1968 = "「Bởi vì, nếu chuyện đó xảy ra, anh\nSoutetsu……\nsẽ rời khỏi Ohimitera mất.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1872 = "「A——」"

# monologue
# JP: 彼女の心の、一番深い場所にある傷。\n母が自分を置いて去っていったこと。
3302 = "Vết thương ở nơi sâu thẳm nhất, trong trái\ntim cô ấy.\nViệc bị mẹ bỏ lại và rời đi."

# monologue
# JP: 理由があると知って、理解し――\nけれど理解が、すぐさま癒やしになるわけも無い。
2838 = "Dù đã biết lý do, và đã hiểu ra——\nNhưng sự thấu hiểu, cũng không thể ngay\nlập tức trở thành sự chữa lành."

# 【双鉄】
# display as 雙鐵
# JP: 「いなくなる、か。\nそういえば、僕にもそんな話があったな」
2430 = "「Sẽ rời đi, sao.\nNhắc mới nhớ, anh cũng từng nói chuyện đó\nnhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そんなっ！　他人ごとみたいに」
1749 = "「Sao anh lại! Nói như chuyện của người\nkhác vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「他人か。なのかもしれん\nあの頃の僕と、今の僕とは、もうすでに」
1711 = "「Người khác sao. Có lẽ là vậy.\nAnh của lúc đó, và anh của bây giờ, đã\nlà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1856 = "「Hả?」"

# monologue
# JP: 驚いた顔で固まる頬を、そうっと撫でる。
2926 = "Tôi nhẹ nhàng vuốt ve gò má đang cứng đờ\nvì ngạc nhiên của cô ấy."

# monologue
# JP: ……少し、痩せてしまったみたいだ。\n求人が全く進まぬことが、よほど心労となったのだろう。
1316 = "……Có vẻ như cô ấy đã gầy đi một chút.\nViệc tuyển dụng hoàn toàn không tiến\ntriển, chắc hẳn đã khiến cô ấy lao tâm khổ\ntứ rất nhiều."

# 【ポーレット】
# display as 波萊特
# JP: 「……それって、どういう」
1349 = "「……Đó là, có ý gì vậy anh.」"

# monologue
# JP: けれど撫ぜるうち、\nその瞳から昂っていた何かが消える。
2953 = "Nhưng trong lúc tôi vuốt ve,\nthứ gì đó đang kích động trong ánh mắt ấy\ndần tan biến."

# monologue
# JP: 信じてくれてる受け入れようとしてくれている――\n感じた瞬間、僕から言葉が、ぼろりとあふれる。
2831 = "Cô ấy đang tin tưởng tôi, đang cố gắng đón\nnhận tôi——\nNgay khoảnh khắc cảm nhận được điều đó,\nnhững lời nói từ tôi, cứ thế tuôn trào ra."

# 【双鉄】
# display as 雙鐵
# JP: 「あの頃の僕は思いこんでた。人に望まれることをする\n――それが唯一の贖罪であり、恩返しする方法なのだと」
2408 = "「Anh của lúc đó đã đinh ninh rằng. Làm\nnhững điều người khác mong muốn\n——đó là sự chuộc tội duy nhất, và cũng là\ncách để đền đáp công ơn.」"

# monologue
# JP: ああ、そうなのかと、自分の声に少し驚く。
3208 = "A, ra là vậy sao, tôi có chút ngạc nhiên\nvới chính giọng nói của mình."

# monologue
# JP: 心が押し出したような言葉に、頭が理解が寄り添っていく。\n心と頭――過去と今とが、繋がっていく。
2965 = "Đầu óc đang dần thấu hiểu những lời nói\nnhư được đẩy ra từ trái tim.\nTrái tim và trí óc——quá khứ và hiện tại,\nđang được kết nối với nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「が、僕が受けた最大の恩は、それでは決して返せない。\nそのことに気づけたがゆえ、変わったのだ」
1738 = "「Nhưng, ân huệ lớn nhất mà anh nhận được,\ntuyệt đối không thể đền đáp bằng cách đó.\nVì nhận ra điều đó, nên anh đã thay đổi.」"

# monologue
# JP: 相手を本当に思いやる。踏み込んで相手のことを考える。\n――僕にもそうすることができると、教えてもらえた。
3015 = "Thực sự quan tâm đến đối phương. Bước vào\nvà suy nghĩ cho đối phương.\n——Anh đã được dạy rằng, anh cũng có thể\nlàm được như vậy."

# monologue
# JP: それで、気づけた。\nポーレットが僕に、気づかせてくれた。
2997 = "Nhờ đó, tôi đã nhận ra.\nPaulette đã giúp tôi nhận ra."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットのことを好きになり。\n君といることが幸せで――だから、わかった」
1967 = "「Anh đã yêu Paulette.\nĐược ở bên em là niềm hạnh phúc——nên, anh\nđã hiểu ra.」"

# 【ポーレット】
# display as 波萊特
# JP: 「なにを、ですか？」
2172 = "「Hiểu ra điều gì, cơ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「事故のとき――僕はふたごの妹に、\n突き放されたと……そう思ってた」
2087 = "「Lúc xảy ra tai nạn——anh đã nghĩ rằng,\nmình đã bị em gái sinh đôi……đẩy ra.」"

# monologue
# JP: 自分の、一番深い傷。\n触れれば、生々しい血が流れ出す傷。
3021 = "Vết thương sâu nhất của tôi.\nVết thương mà hễ chạm vào, máu tươi lại\ntuôn trào."

# monologue
# JP: けれどその血を、\nいまは、あたたかなものと感じる。
2755 = "Nhưng dòng máu đó,\nbây giờ, tôi lại cảm thấy nó thật ấm áp."

# 【双鉄】
# display as 雙鐵
# JP: 「ふたごだった。何をするのも一緒だった。\nずっと一緒に大人になると……そうとぼんやり思ってた」
2102 = "「Bọn anh là anh em sinh đôi. Làm gì cũng\ncó nhau.\nAnh đã mơ hồ nghĩ rằng……chúng anh sẽ mãi\nmãi cùng nhau trưởng thành.」"

# monologue
# JP: あの日。あの時。
2752 = "Ngày hôm đó. Lúc đó."

# monologue
# JP: 一緒に行くのを、一緒に死ぬのを拒まれたと――\n突き放されたことを、心のどこかは、恨んでさえいた。
2816 = "Bị từ chối đi cùng nhau, bị từ chối chết\ncùng nhau——\nBị đẩy ra, ở một góc nào đó trong tim, anh\nthậm chí đã từng oán hận."

# 【双鉄】
# display as 雙鐵
# JP: 「だからこれから、ずっと一人だと思っていた。\n一人で、誰かに、尽くすものだと思っていた。が――」
2141 = "「Nên từ đó, anh đã nghĩ mình sẽ mãi mãi cô\nđộc.\nNghĩ rằng mình sẽ cống hiến cho một ai đó,\ntrong cô độc. Nhưng——」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1888 = "「A.」"

# monologue
# JP: 抱きしめる。\n手の中にあるあたたかなもの、僕を救ってくれた人を。
2963 = "Tôi ôm chầm lấy cô ấy.\nSự ấm áp trong vòng tay, người đã cứu rỗi\ntôi."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は一人じゃなくなった。\n――君が幸せに笑ってくれれば、僕も幸せになれるんだ」
2121 = "「Anh không còn cô độc nữa.\n——Chỉ cần em mỉm cười hạnh phúc, anh cũng\ncó thể trở nên hạnh phúc.」"

# monologue
# JP: かつての僕には、それはあまりにも当然で。\nだから、見失ってしまってた。思い出せなくなっていた。
3018 = "Đối với tôi của ngày xưa, điều đó quá đỗi\nhiển nhiên.\nNên tôi đã đánh mất nó. Đã không thể nhớ\nlại được."

# monologue
# JP: “君がうれしいと僕もうれしい”――\nその単純で利己的で、とても幼稚で、尊い気持ちを。
1303 = "“Em vui thì anh cũng vui”——\nCái thứ cảm xúc đơn thuần, ích kỷ, vô cùng\ntrẻ con và quý giá đó."

# 【双鉄】
# display as 雙鐵
# JP: 「そうなるために、僕は生かしてもらえたんだ。\n僕が生きているそのことが、路子の喜びだったから」
2211 = "「Để trở nên như vậy, anh mới được sống\ntiếp.\nVì việc anh sống, chính là niềm vui của\nMichiko.」"

# 【ポーレット】
# display as 波萊特
# JP: 「…………」
1336 = "「…………」"

# monologue
# JP: 無言。\nぎゅうっと、僕を抱く手が強くなる。
3071 = "Không một lời nào.\nVòng tay ôm tôi siết chặt hơn."

# monologue
# JP: 体の全部を貼り付けるように、\n熱を、鼓動を、そして気持ちを伝えてくれる。
2867 = "Như muốn dán chặt toàn bộ cơ thể lại,\ntruyền cho tôi hơi ấm, nhịp đập, và cả cảm\nxúc."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕は、自分の生きたいよう生きる。\n自分の生を、精一杯に使い切る」
2162 = "「Nếu vậy thì anh sẽ sống theo cách anh\nmuốn.\nAnh sẽ tận dụng tối đa cuộc đời mình.」"

# monologue
# JP: 僕は単純に利己的に、自分の幸せを求めればいい。\n路子がそうして、最後までしてくれていたように。
2943 = "Tôi chỉ cần đơn thuần và ích kỷ, mưu cầu\nhạnh phúc cho riêng mình.\nGiống như những gì Michiko đã làm, cho đến\nphút cuối cùng."

# monologue
# JP: それで、僕らは笑い合えてた。\n自分のものと相手のものと、幸せさえも共有していた。
2714 = "Vì thế, chúng tôi đã có thể cùng nhau cười\nđùa.\nChia sẻ mọi thứ của mình và của đối\nphương, ngay cả hạnh phúc."

# 【双鉄】
# display as 雙鐵
# JP: 「だから僕は、いなくならない。\n誰の意向がどうあれど、僕はポーレットのそばにいる」
2144 = "「Nên anh, sẽ không đi đâu cả.\nDù ý muốn của ai có ra sao, anh vẫn sẽ ở\nbên cạnh Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「――はい」
1326 = "「——Vâng.」"

# monologue
# JP: それこそが、僕の一番の望みだから。\nそうしていけば、自然といつか――
2779 = "Bởi vì đó, chính là nguyện vọng lớn nhất\ncủa tôi.\nCứ như vậy, tự nhiên một ngày nào đó——"

# monologue
# JP: 路子の笑顔を思い出し、\n僕も笑顔で、送ってやれるとも思うから。
3118 = "Nhớ lại nụ cười của Michiko,\ntôi nghĩ mình cũng có thể mỉm cười, tiễn\nbước em ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「だから。大丈夫だ、ポーレット」
2031 = "「Vậy nên. Không sao đâu, Paulette.」"

# monologue
# JP: そっと、そうっと体を離し、\n真正面から、ポーレットの目に視線をあわせる。
2971 = "Nhẹ nhàng, tôi khẽ tách người ra,\nđối diện trực tiếp, chạm mắt với Paulette."

# monologue
# JP: 目の縁が赤くなっている。\nこの子を泣かせちゃいけないと――素直に感じる。
2828 = "Khóe mắt cô ấy đang đỏ hoe.\nKhông được làm cô gái này khóc——tôi thật\nlòng cảm thấy vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「義父が与えてくれた機会を無為にする気も、無論ない。\n万が一など起こしはしないし、誰の期待も裏切らない」
2253 = "「Tất nhiên, anh cũng không có ý định lãng\nphí cơ hội mà cha nuôi đã trao cho.\nAnh sẽ không để xảy ra chuyện vạn nhất\nnào, và cũng sẽ không phản bội kỳ vọng của\nbất kỳ ai.」"

# monologue
# JP: 状況は確かに苦しいが、\n絶望するにはまだまだ早い。
3125 = "Tình hình quả thực rất khó khăn,\nnhưng vẫn còn quá sớm để tuyệt vọng."

# monologue
# JP: 今打てる手はすべて打ったし、よりよい手段を、\n僕が、誰かが、今にも思いつくかもしれん。
2930 = "Tôi đã đánh hết những nước cờ có thể, và\nmột nước cờ tốt hơn,\ntôi, hay ai đó, có thể sẽ nghĩ ra ngay lúc\nnày."

# 【双鉄】
# display as 雙鐵
# JP: 「人は必ず――\n集められるし、集まるさ」
2098 = "「Mọi người nhất định——\nsẽ tập hợp lại được, và sẽ đến thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はいっ」
2175 = "「Vâng.」"

# monologue
# JP: 青白くさえ見えてた頬に、明るい赤みが差し込んでくる。
2713 = "Trên gò má trông có vẻ xanh xao, một sắc\nđỏ tươi tắn lan tỏa."

# monologue
# JP: （僕がここから去るかもと、それほどまでに恐れてくれた\n――その感情を、いつわることなく、ぶつけてくれた）
3384 = "（Việc tôi có thể sẽ rời đi, đã khiến cô ấy\nsợ hãi đến nhường này\n——Cảm xúc đó, cô ấy đã bộc lộ ra mà không\nhề giả dối.）"

# monologue
# JP: だから、さらけ出し向き合えた。\nポーレットとも、僕自身とも。
2977 = "Nên, tôi cũng đã phơi bày và đối mặt.\nVới cả Paulette, và với chính bản thân\nmình."

# monologue
# JP: そう感じれば、喜びと同時、\n強い感謝と、責任感とが湧いてくる。
2649 = "Khi cảm nhận được điều đó, cùng với niềm\nvui,\nlà sự biết ơn sâu sắc và tinh thần trách\nnhiệm tuôn trào."

# 【双鉄】
# display as 雙鐵
# JP: 「そうするためにまず、\n視察を乗り切るのに最小限必要な人数を洗い直したい」
1743 = "「Để làm được điều đó, trước tiên,\nanh muốn tính toán lại số lượng người tối\nthiểu cần thiết để vượt qua đợt thị sát.」"

# monologue
# JP: 背筋を伸ばし、体を離し、\n視線を、過去から今へと戻す。
2960 = "Vươn thẳng lưng, buông tay ra,\nđưa ánh mắt, từ quá khứ trở về hiện tại."

# monologue
# JP: 真闇姉から教え諭してもらえたことを、\nポーレットへとそのまま伝える。
2945 = "Những lời răn dạy mà tôi nhận được từ chị\nMayami,\ntôi truyền đạt lại nguyên văn cho\nPaulette."

# 【ポーレット】
# display as 波萊特
# JP: 「あ……そうですね。最小限、ミニマムでって考えれば。\nそれだけ、集めることができれば――」
1882 = "「A……đúng vậy nhỉ. Mức tối thiểu, nếu nghĩ\ntheo mức tối thiểu.\nChỉ cần, tập hợp được chừng đó người\nthì——」"

# monologue
# JP: ポーレットもすぐ、切り替わる。
3065 = "Paulette cũng lập tức thay đổi trạng thái."

# monologue
# JP: 不安に震えていた少女から、\n控えめながらも、現実的で有能極まる市長へと。
2886 = "Từ một thiếu nữ run rẩy trong bất an,\ntrở thành một thị trưởng tuy khiêm tốn,\nnhưng vô cùng thực tế và tài năng."

# 【双鉄】
# display as 雙鐵
# JP: 「うん。向こうがどれほど人を集めようと関係なくなる。\nゴールを明確に設定できれば、到達だけに集中できる」
1934 = "「Ừ. Bất kể bên kia tập hợp được bao nhiêu\nngười cũng không quan trọng.\nChỉ cần đặt ra một mục tiêu rõ ràng, chúng\nta có thể tập trung vào việc đạt được nó.」"

# 【ポーレット】
# display as 波萊特
# JP: 「やります、すぐに。\nええと……キャストの人数については、どうですか？」
2135 = "「Em sẽ làm ngay.\nỜm……về số lượng diễn viên thì sao anh?」"

# 【双鉄】
# display as 雙鐵
# JP: 「本当に最低限なら、一人でよかろう。\n『鉱山妖精がいる』ことを示せれば、足りるのだから」
2019 = "「Nếu thực sự là mức tối thiểu thì một\nngười là đủ.\nChỉ cần cho họ thấy 『Có tinh linh mỏ than\nở đây』 là đủ rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「なら、そこは一人で――あ、でも、\n当日の急病とかあったら」
2416 = "「Vậy thì, chỗ đó là một người——a, nhưng\nmà,\nnếu hôm đó có ai bị ốm đột xuất thì sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか――日程を考えれば、一人が習熟できるのは、\nせいぜい一役でギリギリだから」
1707 = "「Cũng phải nhỉ——xét theo lịch trình, một\nngười có thể thành thạo,\ncùng lắm cũng chỉ một vai là kịch kim\nrồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「接客系は、\n各所に一人ずつはバックアップ必要ですよね」
2160 = "「Về mảng tiếp khách,\nmỗi vị trí cần một người dự phòng nhỉ.」"

# monologue
# JP: 話し合いながら書き出していけば、浮き上がってくる。\n“最低限”は、なかなかどうして削り切れない。
2935 = "Vừa bàn bạc vừa ghi chép lại, mọi thứ dần\nhiện rõ.\n“Mức tối thiểu”, quả thực không dễ cắt\ngiảm chút nào."

# 【ポーレット】
# display as 波萊特
# JP: 「で、発電所の再稼働はあきらめて、\nバッテリーで代替するにしても……」
2237 = "「Thế, cứ cho là từ bỏ việc tái khởi động\nnhà máy điện,\nvà thay thế bằng ắc quy đi nữa thì……」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。トロッコはどうしても復元せねば――\nお年寄りや子供が楽しめない施設となってしまう」
1928 = "「Ừm. Xe goòng thì dù thế nào cũng phải\nphục hồi——\nNếu không sẽ trở thành một cơ sở mà người\ngià và trẻ em không thể tận hưởng.」"

# monologue
# JP: トロッコの車両整備など、\n\x%l気動車;#00ffc040;気動車%l;#;や機関車と比すべくもなく、容易なものだ。
3147 = "Việc bảo dưỡng xe goòng,\nso với \\x%l気動車;#00ffc040;toa xe tự hành%l;#; hay đầu máy xe lửa\nthì dễ dàng hơn nhiều."

# monologue
# JP: だが、復線・\x%l保線;#00ffc040;保線%l;#;の手数となると、例えトロッコの\nものであっても、やはり膨大なものとなる。
2764 = "Nhưng nếu nói đến công sức khôi phục và \\x%l保線;#00ffc040;bảo trì đường ray%l;#;\n, thì dù là của xe goòng,\ncũng vẫn là một khối lượng khổng lồ."

# 【ポーレット】
# display as 波萊特
# JP: 「……一日八時間を四十日フルに働いてもらえたとして、\n\x%l保線;#00ffc040;保線%l;#;だけで六十一人。トータルで百人は必要になります」
1346 = "「……Cho dù làm việc 8 tiếng một ngày suốt\n40 ngày,\nthì chỉ riêng việc \\x%l保線;#00ffc040;bảo trì đường ray%l;#; đã\ncần 61 người. Tổng cộng sẽ cần 100 người.」"

# 【双鉄】
# display as 雙鐵
# JP: 「百人か――かなりキツイな」
2452 = "「100 người sao——khá là khó nhằn đấy.」"

# monologue
# JP: 応募者全員を採用したとしても最低であと九十四人。\nそれはいかにも厳しいが、これ以上には絞れない。
2741 = "Cho dù nhận hết tất cả những người đã ứng\ntuyển thì ít nhất cũng cần thêm 94 người\nnữa.\nĐó quả thực là một con số khó khăn, nhưng\nkhông thể cắt giảm thêm được nữa."

# monologue
# JP: 無理に絞れば、犠牲になるのは安全性か快適性。\n\x%l帝鉄;#00ffc040;帝鉄%l;#;が犯した過ちを、僕らも繰り返すことになる。
3219 = "Nếu cố ép cắt giảm, thứ bị hy sinh sẽ là\nsự an toàn hoặc sự thoải mái.\nChúng ta sẽ lặp lại sai lầm mà \\x%l帝鉄;#00ffc040;Đường sắt Hoàng gia%l;#;\nđã mắc phải."

# 【双鉄】
# display as 雙鐵
# JP: 「僕の方でもいくつかの手を打ってはいるが、\nポーレットも、思いつくことがあったら言ってくれ」
2425 = "「Phía anh cũng đã đánh vài nước cờ rồi,\nnhưng Paulette, nếu em có nghĩ ra điều gì\nthì cứ nói nhé.」"

# monologue
# JP: 言えばすぐさま、\nポーレットは細長い指を折り始める。
3207 = "Vừa dứt lời,\nPaulette bắt đầu gập những ngón tay thon\ndài lại đếm."

# 【ポーレット】
# display as 波萊特
# JP: 「一般の求人雑誌や新聞チラシ、あとは……\n市の広報誌と、シルバー人材センター、とか」
1687 = "「Tạp chí tuyển dụng thông thường và tờ rơi\ntrên báo, ngoài ra thì……\nBản tin của thành phố, và Trung tâm nhân\nlực người cao tuổi, chẳng hạn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「広報誌を使っても大丈夫なのか？」
1798 = "「Sử dụng bản tin của thành phố có ổn\nkhông?」"

# 【ポーレット】
# display as 波萊特
# JP: 「市も三セクに関わりますから……あ、けど、\nどうかな？　そこは、宮本さんに聞いてみてから――」
2248 = "「Vì thành phố cũng liên quan đến bộ phận\nthứ ba mà……a, nhưng mà,\nsao nhỉ? Chuyện đó, phải hỏi chị Miyamoto\nxem sao——」"

# monologue
# JP: （コンコン）
3377 = "（Cốc cốc）"

# 【ポーレット】
# display as 波萊特
# JP: 「何でしょう？」
1722 = "「Có chuyện gì vậy ạ?」"

# 【宮本】
# display as 宮本
# JP: 「玄関にお弁当が届いています。\n１００食分」
2422 = "「Cơm hộp bento đã được giao đến trước cửa\nrồi ạ.\nPhần cho 100 người.」"

# 【ポーレット】
# display as 波萊特
# JP: 「１００食分っ！？」
2453 = "「Phần cho 100 người á!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1888 = "「啊」" 

# monologue
# JP: 出来る限りは――と、頼んだのだが、\nさすが真闇姉という他にない。
3324 = "Tuy tôi có nhờ là——nhiều nhất có thể,\nnhưng\nquả không hổ danh chị Mayami."

# monologue
# JP: この短時間で、見事間に合わせてくれたのか。
3153 = "Chỉ trong một thời gian ngắn, mà đã làm\nkịp một cách xuất sắc."

# 【双鉄】
# display as 雙鐵
# JP: 「僕らではとても食べきれん。\n市職員の方にも、よければ試食をお願いしよう」
2100 = "「Chúng ta không thể nào ăn hết được.\nNếu được, hãy mời các nhân viên tòa thị\nchính dùng thử nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですね。あの、宮本さん。\nお弁当を持ってきてない職員さんに」
1907 = "「A, đúng vậy nhỉ. Dạ, chị Miyamoto.\nChị báo với những nhân viên không mang\ntheo cơm hộp bento nhé.」"

# 【宮本】
# display as 宮本
# JP: 「承りました。\nすぐ、そのように伝達いたします」
2170 = "「Tôi đã rõ.\nTôi sẽ đi truyền đạt lại ngay.」"

# 【永山】
# display as 永山
# JP: 「あら、お二人お揃いで」
1846 = "「Ái chà, cả hai người đều ở đây nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「こんにちわ永山さん――あの――」
1801 = "「Chào buổi trưa cô Nagayama——cái đó——」"

# monologue
# JP: ポーレットの目が、永山夫人の背後で止まる。
3075 = "Mắt Paulette dừng lại ở phía sau phu nhân\nNagayama."

# monologue
# JP: パレット――でいいのだろうか？\nプラスチック製の平箱に、ぎっしり弁当が詰まっている。
3301 = "Khay nhựa——chắc gọi vậy cũng được nhỉ?\nTrong chiếc hộp nhựa phẳng, cơm hộp bento\nđược xếp chật ních."

# 【永山】
# display as 永山
# JP: 「試食用のお弁当。\nご注文の百食、なんとか間に合わせたわ」
1747 = "「Cơm hộp bento dùng thử đây.\n100 phần đã đặt, bằng cách nào đó cũng làm\nkịp rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　ご注文って」
1832 = "「Hả? Đã đặt á.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕が頼んだ。真闇姉を通じてだが」
2186 = "「Anh đã đặt đấy. Dù là thông qua chị\nMayami.」"

# 【ポーレット】
# display as 波萊特
# JP: 「真闇さんに？」
2147 = "「Thông qua chị Mayami sao?」"

# 【職員Ａ】
# display as 職員Ａ
# JP: 「わ……宮本さん、お弁当って、これですか？」
1836 = "「Oa……chị Miyamoto, cơm hộp bento chị nói,\nlà cái này sao?」"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「ほんとに、僕らがご馳走になっても？」
2104 = "「Bọn tôi được mời thật sao?」"

# 【宮本】
# display as 宮本
# JP: 「ええ。マイントレジャーでの観光\x%l列車;#00ffc040;列車%l;#;の駅弁の、\nその、試食品ということですので、ご遠慮なく」
2250 = "「Vâng. Đây là hàng dùng thử của cơm hộp\nbento nhà ga\ncho \\x%l列車;#00ffc040;chuyến tàu%l;#; du lịch ở Mine Treasure,\nnên mọi người cứ tự nhiên nhé.」"

# 【永山】
# display as 永山
# JP: 「はい、どうぞ」
1758 = "「Vâng, xin mời.」"

# 【職員Ａ】
# display as 職員Ａ
# JP: 「わぁ、おいしそう。市長、ごちそうになります」
1842 = "「Oa, trông ngon quá. Thưa thị trưởng,\nchúng tôi xin phép ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ――はい、どうぞ！　たくさん食べて、\n感想、あとで聞かせてくださいね？」
1875 = "「A——vâng, xin mời! Mọi người ăn nhiều vào,\nrồi sau đó cho tôi biết cảm nhận nhé?」"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「まかせてください！　いっただっきまーす」
1800 = "「Cứ giao cho tôi! Tôi ăn đây.」"

# monologue
# JP: まっさきに蓋を広げた若手職員たちに続いて、\n三々五々と弁当の輪が広がりはじめる。
3320 = "Tiếp nối những nhân viên trẻ tuổi mở nắp\nhộp đầu tiên,\ntừng nhóm dăm ba người bắt đầu tụ tập lại\nquanh những hộp bento."

# monologue
# JP: 職員さんだけにはとどまらず、掃除のおばさん、\n警備のおじさん、駐車場係さんたちの姿もみえる。
2719 = "Không chỉ có các nhân viên, mà cả cô lao\ncông,\nchú bảo vệ, những người trông giữ bãi đỗ\nxe cũng có mặt."

# 【ポーレット】
# display as 波萊特
# JP: 「そっか。せっかくの試食なんだし、\nいろんな人の意見を聞けたほうが有意義ですもんね」
1803 = "「Ra là vậy. Đã cất công làm đồ ăn thử,\nthì nghe được ý kiến của nhiều người sẽ có\ný nghĩa hơn nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それだけではないがな――と、\n話すのもいいが、まずは食べよう」
1763 = "「Cũng không hẳn chỉ vì lý do đó đâu——à,\nnói ra cũng được, nhưng trước tiên cứ ăn\nđã.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですよね」
1899 = "「A, đúng vậy nhỉ.」"

# monologue
# JP: 少し離れて座ってみるが、僕らだけでは輪にならない。\n職員たちは――宮本さんも――入ってきてくれない。
2932 = "Chúng tôi thử ngồi cách xa nhau một chút,\nnhưng chỉ có hai người thì không thể thành\nvòng tròn được.\nCác nhân viên——cả chị Miyamoto nữa——đều\nkhông chịu vào cùng."

# 【真闇】
# display as 真闇
# JP: 「お、間に合ったねぇ」
1858 = "「Ồ, kịp lúc nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお、真闇姉」
1862 = "「Ồ, chị Mayami.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ここ、どうぞです」
2345 = "「Mời chị ngồi đây ạ.」"

# 【永山】
# display as 永山
# JP: 「じゃ、こっちもご飯にしましょうか」
2414 = "「Vậy, bên này cũng ăn cơm thôi nhỉ.」"

# monologue
# JP: 蔵の仕事に、いったん戻っていたのだろう。\n真闇姉が姿を見せれば、僕らもすぐに輪になれる。
3129 = "Chắc là chị ấy đã quay lại xưởng rượu một\nlát để làm việc.\nKhi chị Mayami xuất hiện, chúng tôi cũng\nlập tức tạo thành một vòng tròn."

# 【双鉄】
# display as 雙鐵
# JP: 「それでは、いただきます」
2415 = "「Vậy thì, tôi xin phép.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。いただきます――わぁっ！」
1903 = "「A, vâng. Xin mời——oa!」"

# monologue
# JP: 駅弁の包みを渡された、その瞬間にもう歓声が出る。
2929 = "Ngay khoảnh khắc nhận được gói cơm hộp\nbento, tiếng reo hò đã vang lên."

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、\x%l掛け紙;#00ffc040;掛け紙%l;#;も間に合わせたのか」
2297 = "「Trời ạ, làm kịp cả \\x%l掛け紙;#00ffc040;giấy gói cơm hộp%l;#; luôn\nsao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「日々姫ちゃんの絵ですね。これ……和紙っぽい紙に\nカラーコピーじゃない……ちゃんとした印刷ですよ」
2381 = "「Là tranh của Hibiki nhỉ. Cái này……trên\ngiấy giống như giấy washi,\nkhông phải copy màu đâu……là in ấn đàng\nhoàng đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「すごいな――箱もしっかりしているし」
2000 = "「Tuyệt thật đấy——hộp cũng rất chắc chắn\nnữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「本物の駅弁ですよね。これ、もう商品レベル」
2384 = "「Đây đích thị là cơm hộp bento nhà ga rồi.\nCái này, đã đạt chuẩn hàng hóa rồi đấy.」"

# monologue
# JP: キジ馬に乗ったクマのキジクマ。\nそれがにこにこ、コックの帽子をかぶっている。
3348 = "Kijikuma, con gấu cưỡi trên Kijiuma.\nNó đang cười tươi rạng rỡ, đội một chiếc\nmũ đầu bếp."

# monologue
# JP: 手にしているのはこの駅弁、キジ馬を模した鮎の甘露煮と\n石炭仕上げの唐揚げが、素朴なタッチで描かれている。
2861 = "Thứ nó cầm trên tay là hộp bento nhà ga\nnày, cá hương kho ngọt mô phỏng Kijiuma và\ngà rán tẩm than đá, được vẽ bằng những nét\nvẽ mộc mạc."

# 【双鉄】
# display as 雙鐵
# JP: 「うん、中身がぱっと分かるのがいい。\n絵も美味そうで、期待が高まる――おおっ！」
1943 = "「Ừm, nhìn cái là biết ngay bên trong có\ngì, thế mới hay.\nHình vẽ trông cũng ngon mắt nữa, kỳ vọng\ncàng tăng cao——ồ!」"

# monologue
# JP: 中身は、絵よりも数段旨そう――\nああ、いや、匂いか。実に食欲をそそる匂いが漂ってくる。
2694 = "Bên trong, trông còn ngon hơn cả hình vẽ\ngấp mấy lần——\nA, không, là mùi hương. Một mùi hương thực\nsự kích thích sự thèm ăn đang bay đến."

# 【ポーレット】
# display as 波萊特
# JP: 「あ……おいひい」
1880 = "「A……ngon wóa.」"

# monologue
# JP: なんと、ポーレットはもう食べ始めている。
3279 = "Thế mà, Paulette đã bắt đầu ăn mất rồi."

# monologue
# JP: 僕も負けてはいられない。\nまずは、鮎から――
2915 = "Tôi cũng không thể thua kém được.\nTrước tiên là, từ cá hương——"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに……これは実にうまいな」
2259 = "「Quả thực……cái này ngon thật đấy.」"

# monologue
# JP: 抑えめについた甘露煮の甘さと、鮎本来のほのかな苦味が、\n実にほどよく調和している。
3111 = "Vị ngọt thanh của cá kho ngọt, cùng với\nchút vị đắng thoang thoảng vốn có của cá\nhương,\nthực sự hòa quyện vào nhau rất vừa vặn."

# monologue
# JP: 甘露煮自体にとどまらず、それが染み込んだ白米も旨い。\n口が甘さに疲れた先には、石炭唐揚げが待っている。
2772 = "Không chỉ riêng cá kho ngọt, mà cơm trắng\nthấm đẫm hương vị đó cũng rất ngon.\nKhi miệng đã ngán vị ngọt, thì gà rán than\nđá đang chờ đợi."

# 【双鉄】
# display as 雙鐵
# JP: 「うん――うんっ」
1921 = "「Ừm——ừm.」"

# monologue
# JP: バランスがいい。\nどんどん進む、止まらなくなる。
3178 = "Sự cân bằng rất tốt.\nCứ thế ăn mãi, không thể dừng lại được."

# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くん――お茶です」
1759 = "「Vâng, anh Soutetsu——trà đây ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ、すまん――っと。\nありがとうございます、市長」
1914 = "「A, cảm ơn——à.\nXin cảm ơn ngài, thị trưởng.」"

# monologue
# JP: 職員の前では市長と秘書だ。\nあわててとりつくろう――が、誰一人聞いてない。
2787 = "Trước mặt các nhân viên, chúng tôi là thị\ntrưởng và thư ký.\nTôi vội vàng sửa lại——nhưng, chẳng có ai\nnghe cả."

# monologue
# JP: みながみな、無言になって食べている。\n箸は、まったく休んでいない。
2803 = "Tất cả mọi người, đều im lặng ăn.\nĐũa, hoàn toàn không dừng lại."

# monologue
# JP: （ああ……\n紙パックのお茶までこれほど旨く感じる）
3379 = "（A……\nngay cả trà hộp giấy mà cũng cảm thấy ngon\nđến mức này.）"

# monologue
# JP: お茶も、\x%l車販;#00ffc040;車販%l;#;をするべきだろう。\n口を洗えば、また甘露煮が旨くなる。
3130 = "Trà, chắc cũng nên đưa vào \\x%l車販;#00ffc040;bán hàng trên xe%l;#;\nnhỉ.\nNếu súc miệng, cá kho ngọt sẽ lại ngon\nhơn."

# 【真闇】
# display as 真闇
# JP: 「ん、うまかとね。\n鮎煮のキジ馬、見た目も味も上等ったい」
1945 = "「Ừm, ngon thật đấy.\nKijiuma cá hương kho, cả vẻ ngoài lẫn\nhương vị đều tuyệt hảo.」"

# 【永山】
# display as 永山
# JP: 「うん、この味。\nこれだけ出してもらえれば、明日から営業できちゃうわ」
1940 = "「Ừm, hương vị này.\nChỉ cần làm được mức này, thì từ ngày mai\ncó thể kinh doanh được rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「えと……」
2397 = "「Cái đó……」"

# monologue
# JP: 黒ゴマの石炭唐揚げを実に旨そうに飲み込んで、\nけれども話は、全く飲み込めていないらしい。
3072 = "Nuốt miếng gà rán than đá mè đen trông rất\nngon miệng,\nnhưng có vẻ cô ấy hoàn toàn không hiểu\nchuyện gì đang xảy ra."

# monologue
# JP: 戸惑い顔のポーレットへと、\n永山夫人が笑顔を向ける。
3042 = "Hướng về phía Paulette đang mang khuôn mặt\nbối rối,\nphu nhân Nagayama nở nụ cười."

# 【永山】
# display as 永山
# JP: 「急によ。今朝。\n[まくら,1]真闇ちゃん、商店会のご婦人連中引き連れて」
1726 = "「Đột nhiên lắm đấy. Sáng nay.\nBé Mayami, dẫn theo các bà các cô ở hội\nthương gia đến.」"

# 【真闇】
# display as 真闇
# JP: 「双ちゃんに頼まれたけんねぇ。\nお弁当たくさん作れるように、応援にいって欲しかって」
2184 = "「Là do Sou-chan nhờ vả mà lị.\nMuốn chúng tôi đến giúp một tay, để có thể\nlàm thật nhiều cơm hộp bento.」"

# 【双鉄】
# display as 雙鐵
# JP: 「駅弁だからな、数個だけでは仕方ない。\n量産できるか、それも試験してほしかったのだ」
2249 = "「Vì là cơm hộp ga tàu mà, nên chỉ làm vài\nphần thì không được.\nTôi cũng muốn thử\nnghiệm xem liệu có thể sản xuất hàng loạt\nđược không.」"

# 【永山】
# display as 永山
# JP: 「そう言われればそうだけど、\n見た目によらず、結構無茶言う子ね、この子」
2343 = "「Nói vậy thì cũng đúng, nhưng mà\nnhìn bề\nngoài thế thôi chứ cậu nhóc này cũng đòi\nhỏi cao phết nhỉ.」"

# monologue
# JP: 苦労するわよ？　と永山夫人が笑いかければ、\nポーレットはすぐさま赤くなる。が――
3041 = "Cậu sẽ vất vả lắm đấy? Phu nhân Nagayama\ncười nói với Paulette,\nkhiến cô ấy lập tức\nđỏ bừng mặt. Nhưng mà——"

# 【ポーレット】
# display as 波萊特
# JP: 「あの……望むとこです。そういうの」
2399 = "「À thì……Đó chính là điều tôi mong muốn.\nNhững việc như vậy.」"

# 【永山】
# display as 永山
# JP: 「わぁお」
1841 = "「Wow.」"

# 【真闇】
# display as 真闇
# JP: 「ありゃー、ポーちゃん、\nしっかり言うようになったとねぇ」
1847 = "「Ây da, bé Paulette,\nđã biết ăn nói dõng\ndạc thế rồi cơ à.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ええと、それでっ！」
2400 = "「À ừm, vậy nên là!」"

# monologue
# JP: 言ってしまって照れたのか、\n慌てたように話を戻す。
2812 = "Có vẻ như sau khi lỡ lời thì cô ấy thấy\nngượng,\nnên vội vàng kéo câu chuyện quay\nlại chủ đề chính."

# 【ポーレット】
# display as 波萊特
# JP: 「けど、百食分って、お台所とか」
1824 = "「Nhưng mà, tận 100 phần ăn thì, nhà bếp có\nđủ chỗ không...」"

# 【永山】
# display as 永山
# JP: 「ななめ向かい。やまうちさん」
2340 = "「Đối diện chéo góc đấy. Nhà Yamauchi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
1895 = "「A!」"

# 【永山】
# display as 永山
# JP: 「大廃線で休業したけど、もともと駅弁屋さんだもの。\n奥さん、レシピ面も設備面も、喜んで協力してくれて」
1731 = "「Dù đã đóng cửa sau đợt Đại bãi bỏ tuyến,\nnhưng vốn dĩ nhà họ là tiệm bán cơm hộp ga\ntàu mà.\nBà chủ đã rất vui vẻ hợp tác cả về\nmặt công thức lẫn thiết bị đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ……奥さん、ご退院されてたんですね。\n知らなかった」
1878 = "「A... Bà chủ đã xuất viện rồi sao.\nTôi\nkhông hề biết đấy.」"

# 【真闇】
# display as 真闇
# JP: 「ちょうど一週間くらい前？　双ちゃんもポーちゃんも、\nえらいバタバタしとったけんねぇ」
2029 = "「Tầm đúng một tuần trước nhỉ? Sou-chan và\nbé Paulette,\nlúc đó đang bận tối mắt tối\nmũi mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、本職のご協力もあったわけか」
1805 = "「Ra là vậy, thảo nào có sự trợ giúp của\ndân chuyên nghiệp cơ mà.」"

# monologue
# JP: しげしげ、改めて駅弁を見る。
2938 = "Tôi lại chăm chú nhìn hộp cơm ga tàu thêm\nlần nữa."

# monologue
# JP: 和紙調の紙に色刷りされた日々姫のイラストもマッチして、\nこれはもう、現時点でも商品レベルだ。
3011 = "Bức tranh minh họa của Hibiki được in màu\ntrên nền giấy bọc cơm hộp giả giấy Washi\ncực kỳ ăn nhập,\nthế này thì ở thời điểm\nhiện tại đã đạt tiêu chuẩn hàng hóa đem\nbán rồi."

# 【永山】
# display as 永山
# JP: 「掛紙も箱も、市内発注よ。もちろん」
2410 = "「Giấy bọc cơm hộp và hộp đựng đều được đặt\nhàng trong thành phố đấy. Tất nhiên rồi.」"

# 【真闇】
# display as 真闇
# JP: 「永山さんがあちこち声掛けしてくれとったけん、\n今日の話にも、みんな喜んで力ば貸してくれたとよ」
2187 = "「Nhờ cô Nagayama đã đánh tiếng khắp nơi,\nnên với chuyện hôm nay, mọi người đều rất\nvui vẻ góp sức đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったんですか、ありがとうございます」
1806 = "「Hóa ra là vậy, cháu cảm ơn cô nhiều ạ.」"

# 【永山】
# display as 永山
# JP: 「いえいえ、持ちつ持たれつですし」
1868 = "「Không có chi, giúp qua giúp lại thôi mà.」"

# monologue
# JP: いたずらっぽくそう言って、\n永山さんは、つん、と真闇姉の脇腹をつく。
3037 = "Cô Nagayama nói với vẻ tinh nghịch,\nrồi\nkhẽ chọc chọc vào mạn sườn của chị Mayami."

# 【真闇】
# display as 真闇
# JP: 「あ、そうそう。町内会の婦人部のみなさんね？\n『人手不足なら協力する』って」
1906 = "「À, đúng rồi. Các cô ở hội phụ nữ của tổ\ndân phố ấy nhỉ?\nHọ bảo là 『Nếu thiếu người\nthì chúng tôi sẽ giúp một tay』 đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なら駅弁の方は」
1919 = "「A, vậy thì bên phía cơm hộp ga tàu...」"

# 【真闇】
# display as 真闇
# JP: 「あ、そっちもやけど、マイントレジャーの方も」
1917 = "「À, chuyện đó thì tất nhiên rồi, nhưng cả\nbên Mine Treasure nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「マイントレジャーも？」
2239 = "「Cả Mine Treasure nữa sao?」"

# 【真闇】
# display as 真闇
# JP: 「そうよ？　蓑笠さんの奥さんなんか、\n『仲間はずれはつまらんけんねぇ』、おっしゃって」
2180 = "「Đúng vậy? Ngay cả phu nhân của ông\nMinokasa,\ncũng bảo là 『Bị cho ra rìa chán\nlắm đó nha』 cơ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠さんが」
2326 = "「Phu nhân Minokasa...」"

# monologue
# JP: いつもちんまり店番をされてる、落ち着いた姿を思い出す。
2949 = "Tôi nhớ lại bóng dáng điềm tĩnh của bà cụ\nluôn ngồi trông tiệm một cách nhỏ bé."

# monologue
# JP: 蓑笠さんとよくお似合いの老婦人だが、\nあの方が……そうか、仲間はずれと――
3308 = "Dù là một lão phu nhân rất xứng đôi với\nông Minokasa,\nnhưng bà ấy... ra vậy, bị\ncho ra rìa à——"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、うん。言われてみれば、\nご婦人に力を借りるという発想はなかった」
2261 = "「Quả thật là vậy, ừm. Nghe cô nói mới để\ný,\ncháu chưa từng nghĩ đến việc mượn sức\ncủa các quý phu nhân.」"

# monologue
# JP: これだけ有能な女性に囲まれて仕事をしていながら――\n自分自身の視野の狭さが、恥ずかしくなる。
3013 = "Rõ ràng tôi đang làm việc trong vòng vây\ncủa biết bao người phụ nữ tài năng thế\nnày——\nThật đáng xấu hổ cho cái tầm nhìn\nhạn hẹp của bản thân."

# 【ポーレット】
# display as 波萊特
# JP: 「助かります。ね？　双鉄くん。\n\x%l保線;#00ffc040;保線%l;#;は、力仕事だけじゃないですし」
2269 = "「Giúp được nhiều lắm đấy. Đúng không? Cậu\nSoutetsu.\n\\x%l保線;#00ffc040;Bảo trì đường ray%l;#; đâu phải chỉ toàn việc\nchân tay\nđâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1935 = "「Ừm.」"

# monologue
# JP: それはそうだが、あの方に\x%l保線;#00ffc040;保線%l;#;作業を――\nというのも、違う気がする。
3325 = "Nói thì nói vậy, nhưng để bà ấy làm công\nviệc \\x%l保線;#00ffc040;bảo trì đường ray%l;#;——\nTôi lại thấy có gì đó không đúng\nlắm."

# monologue
# JP: せっかくあれほど、\n古きよき日ノ本の雰囲気をもってらっしゃる――っ！
3330 = "Hiếm lắm mới có người mang đậm phong thái\nHinomoto cổ kính và tốt đẹp đến nhường\nấy——っ!"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、キャストだ。キャストをお願いしよう」
1695 = "「Không, diễn viên cơ. Hãy nhờ bà ấy làm\ndiễn viên đi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「キャストですか？」
2234 = "「Diễn viên sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「テーマパークやキャストという言葉に囚われすぎた。\n冷静になれば、御一夜の炭鉱に西洋風の衣装は似合わん」
2105 = "「Chúng ta đã quá bị bó buộc vào mấy từ như\ncông viên giải trí hay diễn viên rồi.\nBình\ntĩnh mà nghĩ thì, mỏ than của Ohimitera\nđâu có hợp với trang phục kiểu Tây.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ……それは、うん。そうかもですね」
1887 = "「A... Chuyện đó thì, ừm. Có lẽ là vậy\nthật.」"

# 【双鉄】
# display as 雙鐵
# JP: 「むしろ日ノ本だ。純和風。\n古き良き炭鉱の姿を、思い出させるテーマパークだ」
2084 = "「Đúng hơn phải là phong cách Hinomoto.\nThuần Nhật.\nMột công viên giải trí gợi nhớ\nvề hình ảnh mỏ than cổ kính, tốt đẹp ngày\nxưa.」"

# monologue
# JP: 『御一夜の過去は間違ってない』\n『過去があっての、今がある』
1313 = "『Quá khứ của Ohimitera không hề sai』\n『Có\nquá khứ mới có hiện tại』"

# monologue
# JP: ――それをまっすぐ伝えるための、\n“技術継承炭鉱”として、あるべき姿が見えた気がする。
1295 = "——Để truyền đạt trực tiếp thông điệp đó,\ntôi có cảm giác mình đã nhìn thấy hình\ndáng lý tưởng của một \"Mỏ than kế thừa\ncông nghệ\"."

# 【双鉄】
# display as 雙鐵
# JP: 「今はひとまず最小限だが、将来的にはご老人もご婦人も、\n若者も子供も赤ちゃんも、犬猫さえもキャストにしたい」
2426 = "「Hiện tại thì tạm thời giữ ở mức tối\nthiểu, nhưng trong tương lai, từ người\ngià, phụ nữ,\nthanh niên, trẻ em, trẻ sơ\nsinh, cho đến cả chó mèo tôi đều muốn họ\ntrở thành diễn viên.」"

# 【ポーレット】
# display as 波萊特
# JP: 「いいですね。それ、いい。借り物じゃない――\n御一夜のかつての姿の、テーマパーク」
1699 = "「Hay đấy. Ý tưởng đó rất hay. Không phải\nvay mượn từ đâu cả——\nMà là một công viên\ngiải trí mang dáng dấp của Ohimitera ngày\nxưa.」"

# monologue
# JP: 世代間、性別、それらの断絶も埋めると同時に、\n新しい雇用をも拡大していく。
2793 = "Vừa san lấp được khoảng cách giữa các thế\nhệ và giới tính,\nđồng thời mở rộng thêm\nnguồn việc làm mới."

# monologue
# JP: そしていずれ、『自分たちのマイントレジャー』と、\nみなに思ってもらえるようになればいい。
3264 = "Và rồi một ngày nào đó, tôi mong mọi người\nsẽ cảm thấy rằng\nđây chính là 『Mine\nTreasure của chúng ta』."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットが賛成ならそうしよう。\n食後すぐにでも、婦人会のみなさんにご挨拶したい」
2164 = "「Nếu Paulette tán thành thì quyết định vậy\nđi.\nNgay sau bữa ăn, tôi muốn đến chào hỏi\ncác cô trong hội phụ nữ.」"

# 【真闇】
# display as 真闇
# JP: 「よかよ。\nしたら、夕方にまた集まってもらうようにするけん」
2003 = "「Được thôi.\nVậy thì chị sẽ bảo mọi người\ntập trung lại vào buổi chiều tối nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。\nこれで少しは、人材確保の方も希望が」
2433 = "「Cháu cảm ơn ạ.\nNhư vậy thì ít ra cũng có\nthêm chút hy vọng trong việc đảm bảo nhân\nsự rồi.」"

# 【職員Ａ】
# display as ？？？
# JP: 「あの……」
# 2397 = "「那個……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
# 1856 = "「哎？」" 

# monologue
# JP: 若手の、女性の職員さんだ。\nきっと戻しに来たのだろう、弁当がらを手にしている。
2646 = "Là một nữ nhân viên trẻ tuổi.\nChắc hẳn cô\nấy đến để trả lại hộp cơm trống đang cầm\ntrên tay."

# 【職員Ａ】
# display as 職員Ａ
# JP: 「すみません。聞こえてきちゃって、\nあの、人手不足とか人材確保とか」
2027 = "「Xin lỗi ạ. Tôi vô tình nghe được,\nà thì,\nchuyện thiếu nhân lực hay đảm bảo nhân sự\ngì đó.」"

# 【ポーレット】
# display as 波萊特
# JP: 「――うん、そうなんです」
1328 = "「——Vâng, đúng là vậy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ」
1828 = "「Ư.」"

# monologue
# JP: 食後に、僕から打診してみるつもりだった。\n百食を用意してもらった裏には、その目論見も当然あった。
2956 = "Tôi vốn định sau bữa ăn sẽ thử thăm dò xem\nsao.\nĐằng sau việc chuẩn bị 100 phần ăn,\nđương nhiên cũng có ý đồ đó."

# monologue
# JP: そこに、職員さんから踏み込んで来てくれた――
2756 = "Thế mà, nhân viên lại chủ động tiến tới\nbắt chuyện trước——"

# 【ポーレット】
# display as 波萊特
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;関係で大型の求人あったの知ってる？\nあのあおりで、マイントレジャーに人が集まらなくて」
1755 = "「Cô có biết chuyện đang có đợt tuyển dụng\nlớn liên quan đến \\x%lエアクラ;#00ffc040;Aircra%l;#; không?\nChính vì ảnh\nhưởng đó mà Mine Treasure không gom đủ\nngười.」"

# monologue
# JP: ポーレットには説明をできていなかったにもかかわらず、\n僕にさえ予想外の事態にも、落ち着いて応対している。
2710 = "Dù tôi chưa kịp giải thích cho Paulette,\nnhưng cô ấy vẫn điềm tĩnh ứng phó với tình\nhuống mà ngay cả tôi cũng không ngờ tới\nnày."

# 【ポーレット】
# display as 波萊特
# JP: 「それで、\x%l保線;#00ffc040;保線%l;#;とかキャストとか、\nしてくれる人を、探してるんです」
2139 = "「Thế nên, chúng tôi đang tìm kiếm những\nngười\ncó thể làm \\x%l保線;#00ffc040;bảo trì đường ray%l;#; hay diễn\nviên.」"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「それって、僕でもできますか？」
2113 = "「Chuyện đó, tôi cũng làm được chứ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「もちろん――」
2409 = "「Tất nhiên——」"

# 【宮本】
# display as 宮本
# JP: 「高崎くん、副業禁止」
2446 = "「Cậu Takasaki, cấm làm thêm nghề phụ đấy.」"

# monologue
# JP: 宮本さんの短い釘が、僕を刺す。
2856 = "Lời cảnh cáo ngắn gọn của cô Miyamoto như\nđâm chọc vào tôi."

# monologue
# JP: （そうか――公務員は原則、\n副業を禁止されているのだった）
3388 = "（Ra là vậy——Công chức về nguyên tắc\nlà bị\ncấm làm thêm nghề phụ mà.）"

# monologue
# JP: 首長であり、特別職であるポーレットも、\n県と人事院とのお伺いを立て、許可を得ている。
2869 = "Ngay cả Paulette, với tư cách là người\nđứng đầu và giữ chức vụ đặc biệt,\ncũng\nphải xin chỉ thị và được sự cho phép của\ntỉnh và Cục Nhân sự."

# monologue
# JP: 市職員になら、市長であるポーレットが許可を出せようが、\nそれはいかにも、公私混同――
3003 = "Nếu là nhân viên thành phố thì Paulette\nvới tư cách Thị trưởng có thể cấp phép,\nnhưng làm vậy thì quả thật là công tư lẫn\nlộn——"

# 【職員Ａ】
# display as 職員Ａ
# JP: 「わかってます。\nけど、ボランティアなら問題ありませんよね？」
2130 = "「Tôi biết chứ.\nNhưng nếu là tình nguyện\nviên thì không sao đúng không?」"

# 【宮本】
# display as 宮本
# JP: 「え？　ああ――そうね」
1855 = "「Hả? À——Đúng vậy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「って、ええと……\nボランティアだと、本当に無償になりますよ？」
1830 = "「Khoan đã, à ừm...\nNếu là tình nguyện viên\nthì sẽ hoàn toàn không có thù lao đâu\nđấy?」"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「構いませんよ。うまい飯くわせてもらいましたし。\nそれに、市長に恩返しもしたいですしね」
2219 = "「Không sao đâu. Dù sao thì cũng được bao\nmột bữa ngon rồi mà.\nHơn nữa, tôi cũng\nmuốn báo đáp Thị trưởng nữa.」"

# monologue
# JP: ぽん、とふざけてお腹を叩く。\n口調もふざけたようなものだが――そのまなざしは真剣だ。
2681 = "Cậu ta đùa cợt vỗ vỗ vào bụng.\nGiọng điệu\nnghe có vẻ cợt nhả, nhưng——ánh mắt lại rất\nnghiêm túc."

# 【ポーレット】
# display as 波萊特
# JP: 「恩返し？」
1983 = "「Báo đáp?」"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「諦めなかったじゃないですか。御一夜の水を守るために。\n自分たちが様子見してたころにも、たったひとりでも」
2075 = "「Ngài đã không bỏ cuộc mà. Để bảo vệ nguồn\nnước của Ohimitera.\nNgay cả lúc chúng tôi\ncòn đang đứng nhìn, dù chỉ có một mình\nngài.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1872 = "「啊——」" 

# 【職員Ａ】
# display as 職員Ａ
# JP: 「様子見しちゃうんです、私達。\nどんな市長の下でも、働かなくちゃいけませんから」
2099 = "「Chúng tôi đành phải quan sát tình hình\nthôi.\nBởi vì dưới quyền bất kỳ vị Thị\ntrưởng nào, chúng tôi cũng đều phải làm\nviệc mà.」"

# monologue
# JP: なるほどだ。\n市長が変われば、政策への取り組み方も変わるだろう。
2742 = "Ra là vậy.\nThị trưởng thay đổi thì cách\ntiếp cận các chính sách cũng sẽ thay đổi\ntheo."

# monologue
# JP: 一つの政策に全面的に賛意を示せば、\nそれは将来、自分の枷にもなりかねない。
2842 = "Nếu thể hiện sự đồng tình hoàn toàn với\nmột chính sách nào đó,\nthì trong tương\nlai, nó rất có thể sẽ trở thành gông cùm\ntrói buộc chính mình."

# 【ポーレット】
# display as 波萊特
# JP: 「それは……わかりますし、当然のことだと思います」
2376 = "「Chuyện đó... tôi hiểu, và tôi nghĩ đó là\nđiều đương nhiên.」"

# 【職員Ａ】
# display as 職員Ａ
# JP: 「でも、それが当然じゃダメなんですよね。\nそのことを私、市長に教えてもらいました」
1736 = "「Nhưng mà, coi đó là điều đương nhiên thì\nkhông được đâu.\nChính Thị trưởng đã dạy\ncho tôi điều đó đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたしに、ですか？」
2118 = "「Tôi sao?」"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「それが市のためだと思ったら、自分から動かなきゃ。\n自分らの本当の雇い主は、市民の皆さんなんすから」
2165 = "「Nếu nghĩ điều đó là vì lợi ích của thành\nphố, thì bản thân phải tự mình hành động.\nVì người chủ thực sự của chúng ta chính là\ntoàn thể người dân thành phố mà.」"

# monologue
# JP: 宮本さんが、はっと驚いたような顔をする。
2855 = "Cô Miyamoto lộ vẻ mặt vô cùng ngạc nhiên."

# monologue
# JP: いつの間に――周囲の人たち全ての耳が、\n僕らの会話に集中している。
2952 = "Không biết từ lúc nào——mọi người xung\nquanh\nđều đang dỏng tai lên nghe cuộc trò\nchuyện của chúng tôi."

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「市長は、御一夜のためにたったひとりでも頑張った。\n自分、それを見て感動したから、真似したいんです」
2038 = "「Thị trưởng đã cố gắng hết mình vì\nOhimitera dù chỉ có một thân một mình.\nTôi\nnhìn thấy vậy nên rất cảm động, và cũng\nmuốn bắt chước theo.」"

# 【職員Ａ】
# display as 職員Ａ
# JP: 「ずるいなぁ、私がそれ言おうと思ったのに」
2273 = "「Ăn gian quá nha, tôi đang định nói câu đó\nmà.」"

# 【駐車場係】
# display as 停車場管理員
# JP: 「あの……ワシのような年寄りにでも、\n役にたてるようなことがあれば」
2398 = "「À thì... Dù là một ông già như tôi đây,\nnếu có việc gì giúp ích được thì...」"

# 【警備員】
# display as 保安
# JP: 「力仕事ならお任せください。\n力仕事しかできませんがね」
2299 = "「Nếu là việc nặng nhọc thì cứ giao cho\ntôi.\nDù tôi cũng chỉ biết làm mỗi việc\nnặng thôi.」"

# monologue
# JP: わたしも、僕もと――\n声が、さざなみのように広がっていく。
3306 = "Cả tôi nữa, tôi nữa——\nNhững tiếng nói lan\nrộng ra như những gợn sóng lăn tăn."

# monologue
# JP: その真中で、ポーレットはただ震えている。\n青い瞳はゆらゆらと揺れ、嬉し涙をこらえてる。
2791 = "Đứng giữa vòng vây đó, Paulette chỉ biết\nrun rẩy.\nĐôi mắt xanh biếc khẽ dao động,\ncố kìm nén những giọt nước mắt hạnh phúc."

# 【ポーレット】
# display as 波萊特
# JP: 「わたし……あの……だって」
2086 = "「Tôi... ừm... tại vì...」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。\n何をとりつくろう必要もないさ」
2228 = "「Paulette.\nKhông cần phải che giấu điều gì\nđâu.」"

# monologue
# JP: この人たちは見てくれていた。
3296 = "Những con người này đã luôn dõi theo cô."

# monologue
# JP: 父の重荷をいきなり背負わされることになり、\nそれでも潰れず、必死にあがいたポーレットの姿を。
3137 = "Hình ảnh Paulette bất ngờ phải gánh vác\ntrọng trách của cha,\nnhưng không hề gục\nngã mà vẫn tuyệt vọng vùng vẫy."

# 【ポーレット】
# display as 波萊特
# JP: 「――はいっ」
1329 = "「——Vâng.」"

# monologue
# JP: 涙がこぼれる。ぐすっと、鼻をすすりあげる。\nそんな姿も、きっと何度も見られただろう。
3068 = "Nước mắt tuôn rơi. Cô sụt sịt mũi.\nChắc\nhẳn mọi người cũng đã từng thấy dáng vẻ ấy\nvô số lần rồi."

# monologue
# JP: そうした日々をまるごと全部、\n今、ポーレットは肯定されてる――認められてる。
2795 = "Giờ đây, toàn bộ những tháng ngày ấy của\nPaulette,\nđang được khẳng định——được công\nnhận."

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます！」
2434 = "「Cảm ơn mọi người rất nhiều!」"

# monologue
# JP: その喜びが、きっとポーレットに力を与えてくれている。
3299 = "Niềm vui sướng đó, chắc chắn đang tiếp\nthêm sức mạnh cho Paulette."

# monologue
# JP: 泣きながら、もう鼻声になりながら、\nそれでも背筋は、凛と美しく伸びている。
2823 = "Vừa khóc, giọng đã bắt đầu nghèn nghẹt,\nnhưng cô vẫn vươn thẳng lưng, toát lên vẻ\nđẹp kiên cường."

# 【ポーレット】
# display as 波萊特
# JP: 「みなさん、どうか――\n御一夜のために、そのお力を貸してください！！」
2152 = "「Mọi người, xin hãy——\nVì Ohimitera, hãy\ncho tôi mượn sức mạnh của mọi người!!」"

# monologue
# JP: 応！　と、いくつも、強い声が沸き起こる。
1309 = "Được! Rất nhiều giọng nói mạnh mẽ vang lên\nhưởng ứng."

# monologue
# JP: うねりのような熱気が生まれ――\nそこにさあっと、涼風のような声が流れる。
3336 = "Một bầu không khí cuồng nhiệt cuồn cuộn\ndâng lên——\nVà rồi, một giọng nói như làn\ngió mát lướt qua."

# 【宮本】
# display as 宮本
# JP: 「……シフト管理の人材は足りていますか？\nもしいないなら、私も、ボランティアとして」
1343 = "「...Bên cô có thiếu người quản lý ca làm\nviệc không?\nNếu không có, tôi cũng muốn\nlàm tình nguyện viên.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます！」
2435 = "「Cháu cảm ơn cô nhiều ạ!」"

# monologue
# JP: 心強い、と思った瞬間、理解する。\n心強いという言葉では、足りないほどの力なのだと。
3303 = "Vừa cảm thấy thật vững tâm, tôi lập tức\nnhận ra.\nTừ \"vững tâm\" là không đủ để diễn\ntả sức mạnh này."

# monologue
# JP: （そうだ、市役所は……\nそれぞれの部署の専門家の集合なんだ）
3389 = "（Đúng rồi, Tòa thị chính...\nchính là tập\nhợp các chuyên gia từ nhiều phòng ban khác\nnhau mà.）"

# monologue
# JP: 土木課、建設課、会計課、都市計画課、防災課――\nそうした部署の専門知識は、まさしく僕らが欲するものだ。
2780 = "Phòng Thổ mộc, Phòng Xây dựng, Phòng Kế\ntoán, Phòng Quy hoạch Đô thị, Phòng Phòng\nchống Thiên tai——\nKiến thức chuyên môn của\nnhững bộ phận đó, chính xác là thứ chúng\ntôi đang khao khát."

# monologue
# JP: （君はすごいな、ポーレット。\n君がいるから――過去の全てが僕らの味方だ）
3369 = "（Cô tuyệt lắm đấy, Paulette.\nNhờ có cô——mà\ntoàn bộ quá khứ đều đứng về phía chúng\nta.）"

# monologue
# JP: 感心をして、嬉しくなって、\n愛おしいなと、しみじみ思う。
2991 = "Tôi vừa thán phục, vừa vui mừng,\nvà sâu\nthẳm trong lòng, tôi thấy cô ấy thật đáng\nyêu."

# 【双鉄】
# display as 雙鐵
# JP: 「よしっ！」
2013 = "「Tốt lắm!」"

# monologue
# JP: ならば、この手で切り拓こう。\nポーレットとともに歩む未来を。
3309 = "Nếu vậy, hãy dùng chính đôi tay này để\nkhai phá.\nTương lai mà tôi sẽ bước đi cùng\nPaulette."

# monologue
# JP: 僕にも、僕の過去がある。\nそうしてそれは――僕の味方だ。
2917 = "Tôi cũng có quá khứ của riêng mình.\nVà\nnó——cũng là đồng minh của tôi."

# monologue
# JP: （ありがとうな。\n助けてくれて――生かしてくれて）
3391 = "（Cảm ơn em nhé.\nVì đã cứu anh——để anh được\nsống.）"

# monologue
# JP: 今なら、思える。心の底から素直に思える。\nだからもう何も怖くない。
3034 = "Bây giờ thì tôi đã có thể nghĩ như vậy.\nNghĩ như vậy một cách thành thật từ tận\nđáy lòng.\nVì thế, tôi không còn sợ hãi bất\ncứ điều gì nữa."

# monologue
# JP: 望む未来は――\n積み重ねてきた僕らの過去の、延長なのだと知ったから。
2778 = "Tương lai mà chúng tôi mong đợi——\nTôi đã\nnhận ra nó chính là sự nối tiếp của quá\nkhứ mà chúng tôi đã dày công vun đắp."

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「[きじし,2]木地師文化というものは、どうなのですかね、実際」
2145 = "「Văn hóa thợ mộc Kijishi thực tế là như\nthế nào nhỉ?」"

# monologue
# JP: 駅弁を広げつまみつつ、\nいささか太った大臣が細身の大臣に問いかける。
3150 = "Vừa mở hộp cơm ga tàu ra nhón lấy thức ăn,\nvị bộ trưởng hơi béo vừa hỏi vị bộ trưởng\ngầy gò."

# monologue
# JP: 大臣たちは、四人がけのボックスシートを二人で使い、\n斜めに向きあって座ってる。
3335 = "Các vị bộ trưởng đang ngồi đối diện chéo\nnhau,\ntrong một khoang ghế hộp dành cho\nbốn người nhưng chỉ có hai người dùng."

# 【文科大臣】
# display as 文科大臣
# JP: 「面白いですね。ほとんど研究は進んでませんが、\n[ヒノモト,2]日ノ本は、やはり木と紙の国ですので」
2272 = "「Thú vị lắm đấy. Dù hầu như chưa có nghiên\ncứu nào được tiến hành,\nnhưng Hinomoto quả\nthực vẫn là đất nước của gỗ và giấy.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ふぅん、そんなもんですか」
1926 = "「Hừm, ra là vậy sao.」"

# 【文科大臣】
# display as 文科大臣
# JP: 「大臣の地元。[とっとり,1]十鳥にも木工の町があったでしょう。\n[わかさ,2]和歌桜でしたか。あそこも木地師と縁が深そうですね」
1995 = "「Quê của Bộ trưởng. Ở Tottori cũng có thị\ntrấn thợ mộc mà nhỉ.\nLà Wakasa phải không?\nNơi đó có vẻ cũng có mối duyên sâu sắc với\nthợ mộc Kijishi đấy.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ほおお。\n[わかさ,2]和歌桜の林業も、今は弱ってしまっておりますがねぇ」
1959 = "「Hồ ồ.\nNgành lâm nghiệp của Wakasa hiện\ngiờ cũng đang suy yếu rồi.」"

# monologue
# JP: 補佐役だろう官僚が、何を補足しようともしない。\n大臣たちは、なかなか適材適所のようだ。
2999 = "Vị quan chức có lẽ là trợ lý không hề có ý\nđịnh bổ sung thêm điều gì.\nCác vị bộ\ntrưởng có vẻ khá phù hợp với vị trí của\nmình."

# 【ポーレット】
# display as 波萊特
# JP: 「まもなく、鉄橋を通過します。\n九時の方向をご覧ください」
1786 = "「Sắp tới, chúng ta sẽ đi qua cầu sắt.\nXin\nquý vị hãy nhìn về hướng chín giờ.」"

# monologue
# JP: 控えめなポーレットの声のガイドによって、\n大臣たちの視線が動く。
2789 = "Theo lời hướng dẫn nhã nhặn của Paulette,\nánh mắt của các vị bộ trưởng liền hướng\ntheo."

# 【ポーレット】
# display as 波萊特
# JP: 「眼下に流れるクマ川は、県内最大の河川です。\n日ノ本三大急流のひとつとしても知られていますね」
2103 = "「Dòng sông Kuma chảy bên dưới là con sông\nlớn nhất trong tỉnh.\nNó cũng được biết đến\nlà một trong ba dòng chảy xiết lớn nhất\ncủa Hinomoto.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「なら、この鮎も――クマ川で？」
2417 = "「Vậy, con cá hương này cũng là——ở sông\nKuma sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、御一夜の特産品のひとつです」
2194 = "「Vâng, nó là một trong những đặc sản của\nOhimitera ạ.」"

# monologue
# JP: ふむ、と痩せた大臣の箸が動く。
3352 = "Hừm, vị bộ trưởng gầy gò khẽ gật đầu rồi\ngắp đũa."

# 【文科大臣】
# display as 文科大臣
# JP: 「キジ馬を模しているのですね。\nなかなかおいしい、かわいらしい」
1764 = "「Được làm phỏng theo hình ngựa gỗ Kiji\nnhỉ.\nKhá là ngon, lại còn dễ thương nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます」
2350 = "「Xin cảm ơn ngài ạ.」"

# 【れいな】
# display as 玲奈
# JP: 「ニイロクさんと[ぐうじ,1]宮司さん、お上手ですねぇ」
1715 = "「Cô Niiroku và ông Guuji, lái giỏi quá\nnha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1935 = "「嗯」" 

# monologue
# JP: 鉄橋通過をしたというのに、\n大臣たちの小脇のお茶は、その水面を揺らしもしない。
2725 = "Mặc dù vừa đi qua cầu sắt,\nnhưng mặt nước\ntrà đặt cạnh các vị bộ trưởng không hề gợn\nsóng."

# monologue
# JP: ガソリン\x%l気動車;#00ffc040;気動車%l;#;に戻した影響も大きかろうが、\n宮司たちの腕も、それ以上に寄与してるのだろう。
3327 = "Ảnh hưởng từ việc chuyển về dùng xăng cho \\x%l気動車;#00ffc040;toa xe tự hành%l;#;\ncó lẽ là rất lớn,\nnhưng tay lái của nhóm\nông Guuji chắc hẳn còn đóng góp nhiều hơn\nthế."

# 【双鉄】
# display as 雙鐵
# JP: 「神社の視察も良い感触だった。説明役の大役を終え、\n宮司としても、気分よく乗務されているのだろう」
2292 = "「Chuyến thị sát đền thờ cũng diễn ra suôn\nsẻ. Sau khi hoàn thành trọng trách giải\nthích,\nông Guuji chắc hẳn cũng đang làm\nnhiệm vụ với tâm trạng rất tốt.」"

# 【れいな】
# display as 玲奈
# JP: 「れいなたちも、\n負けないようにがんばらないとですねぇ」
2246 = "「Reina và mọi người,\ncũng phải cố gắng để\nkhông thua kém mới được nha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
1936 = "「Ừm!」"

# 【ポーレット】
# display as 波萊特
# JP: 「あと五分程、\x%l列車;#00ffc040;列車%l;#;はマイントレジャー入口駅につきます。\nそこからは、トロッコに乗っていただきます」
1782 = "「Khoảng 5 phút nữa, \\x%l列車;#00ffc040;tàu%l;#; sẽ đến ga Cổng vào\nMine Treasure.\nTừ đó, xin mời quý vị\nchuyển sang đi xe goòng.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「トロッコか。なつかしいな。\n大臣は、お乗りになったことは？」
2289 = "「Xe goòng à. Hoài niệm thật đấy.\nBộ trưởng\nđã từng ngồi xe này bao giờ chưa?」"

# 【文科大臣】
# display as 文科大臣
# JP: 「さぁ……あったようななかったような」
2375 = "「Chà... Hình như là có, mà cũng hình như\nlà chưa.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「なかなか楽しい物ですよ。\nこの\x%l列車;#00ffc040;列車%l;#;ほど、乗り心地よくはありませんがね」
1973 = "「Cũng khá thú vị đấy.\nTuy không được thoải\nmái như chuyến \\x%l列車;#00ffc040;tàu%l;#; này đâu.」"

# 【れいな】
# display as 玲奈
# JP: 「とうちゃくしましたぁ！」
1788 = "「Đến nơi rồi ạ~」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「お、ご苦労。運転、見事だったな。\nワシが嘘つきになってしまったよ」
1956 = "「Ồ, vất vả rồi. Lái tuyệt lắm đấy.\nLàm tôi\nthành kẻ nói dối mất rồi.」"

# monologue
# JP: 思わず、ニヤリと笑ってしまう。\n\x%l保線;#00ffc040;保線%l;#;ボランティアさんたちの努力が完全な成果となった。
2912 = "Tôi bất giác nở nụ cười nhếch mép.\nNỗ lực\ncủa các tình nguyện viên \\x%l保線;#00ffc040;bảo trì đường ray%l;#;\nđã đơm hoa kết\ntrái hoàn hảo."

# monologue
# JP: なのにれいなは、ひどく慌てて頭を下げる。
2759 = "Thế mà Reina lại vô cùng hốt hoảng cúi gập\nđầu xuống."

# 【れいな】
# display as 玲奈
# JP: 「はわわ、ごめんなさいですぅ」
1890 = "「A oa oa, xin lỗi ạ~」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「責めてない。褒めている」
2127 = "「Tôi không trách đâu. Đang khen đấy.」"

# 【れいな】
# display as 玲奈
# JP: 「はぅ？」
1845 = "「Hả?」"

# 【文科大臣】
# display as 文科大臣
# JP: 「ふぅ……ここは、炭鉱ではないようですが？」
1924 = "「Hừm... Nơi này, có vẻ không giống mỏ than\nnhỉ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、ここは技師さんや鉱夫さんが暮らしていた、\nかつての宿舎です」
2198 = "「Vâng, đây từng là khu ký túc xá\nmà các kỹ\nsư và thợ mỏ sinh sống ạ.」"

# 【文科大臣】
# display as 文科大臣
# JP: 「ああ……高度経済成長期の面影を感じますねぇ」
1883 = "「À... Có thể cảm nhận được hình bóng của\nthời kỳ tăng trưởng kinh tế cao độ nhỉ.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「確かに。あの時期はこうした公団がたくさんでしたな。\nああほら、懐かしい。割烹着姿で買い物に――っ！？」
2260 = "「Quả thật. Thời kỳ đó có rất nhiều khu nhà\nở công cộng thế này mà.\nA xem kìa, hoài\nniệm thật. Mặc tạp dề đi mua sắm——!?」"

# monologue
# JP: 経産大臣がギクリと止まる。硬直する。
3180 = "Bộ trưởng Kinh tế giật nảy mình dừng lại.\nCứng đờ người."

# monologue
# JP: ぼろぼろの廃宿舎から、すっと――割烹着姿の婦人が、\n買い物かごを下げて通りに出てきたからだ。
2888 = "Đó là vì từ khu ký túc xá bỏ hoang tồi\ntàn, một người phụ nữ mặc tạp dề\nđang xách\ngiỏ đi chợ lững thững bước ra đường."

# 【ポーレット】
# display as 波萊特
# JP: 「あ、ちょうどよかった。妖精さんですね」
1909 = "「A, may quá. Là Tinh linh kìa.」"

# 【文科大臣】
# display as 文科大臣
# JP: 「妖精さん？」
2307 = "「Tinh linh?」"

# 【ポーレット】
# display as 波萊特
# JP: 「って、わたしたちは呼んでます。\n鉱山が栄えていた頃の、思い出だとも言われています」
2101 = "「Chúng cháu gọi họ như vậy ạ.\nNgười ta\ncũng nói họ là những kỷ niệm của thời kỳ\nkhu mỏ còn hưng thịnh.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「鉱山の思い出……廃鉱山が、見る夢、か」
2288 = "「Kỷ niệm của khu mỏ... Giấc mơ mà khu mỏ\nhoang, nhìn thấy sao.」"

# monologue
# JP: 見かけによらず、経産大臣はロマンチストであるらしい。\nマイントレジャーの世界にすんなり、入ってくれる。
3138 = "Nhìn bề ngoài không đoán được, có vẻ Bộ\ntrưởng Kinh tế là một người lãng mạn.\nNgài\nấy dễ dàng hòa nhập vào thế giới của Mine\nTreasure."

# 【ポーレット】
# display as 波萊特
# JP: 「坑道に入るには鍵がいるんですけど、\n妖精さん、いつもどこかに隠しちゃうんです」
2431 = "「Cần phải có chìa khóa mới vào được hầm\nlò,\nnhưng Tinh linh lúc nào cũng giấu nó ở\nđâu đó mất.」"

# 【文科大臣】
# display as 文科大臣
# JP: 「ほう」
1957 = "「Hô.」"

# 【ポーレット】
# display as 波萊特
# JP: 「どこにあるか、わたし、ちょっと聞いてきますね？」
2107 = "「Cháu đi hỏi thử xem nó ở đâu nhé?」"

# monologue
# JP: ポーレットが妖精さんのもとに向かってすぐに戻ってくる。
3067 = "Paulette đi về phía Tinh linh rồi quay lại\nngay."

# 【ポーレット】
# display as 波萊特
# JP: 「聞いてきました。\n『トロッコのおやつの星の下』だそうですよ？」
2108 = "「Cháu hỏi rồi ạ.\nTinh linh bảo là 『Dưới\nngôi sao điểm tâm của xe goòng』 đấy ạ?」"

# 【文科大臣】
# display as 文科大臣
# JP: 「謎かけですか……ふぅむ？　\nトロッコのおやつとは――」
2240 = "「Giải đố sao... Hừm?\nĐiểm tâm của xe goòng\nlà——」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「これは電動トロッコだよな。\nバッテリーは？」
2383 = "「Đây là xe goòng điện nhỉ.\nBình ắc quy ở\nđâu?」"

# 【れいな】
# display as 玲奈
# JP: 「はぁい、ここですぅ」
1942 = "「Vâng, ở đây ạ~」"

# monologue
# JP: トロッコの端、\x%l運転士;#00ffc040;運転士%l;#;席の下にボコンと据え付けられてる。\nおつきの官僚の静止にかまわず、大臣はそこを覗きこむ。
3331 = "Bình ắc quy được gắn gồ lên ở đầu xe\ngoòng, dưới ghế \\x%l運転士;#00ffc040;người lái tàu%l;#;.\nMặc kệ sự ngăn cản của\nvị quan chức đi cùng, ngài Bộ trưởng cúi\nxuống nhìn vào đó."

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「星……星は――」
2174 = "「Ngôi sao... Ngôi sao là——」"

# 【れいな】
# display as 玲奈
# JP: 「どうぞ、懐中電灯ですよぉ」
2310 = "「Xin mời, đèn pin đây ạ~」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「お、すまんな――\nう――むぅ、無いようだなぁ」
1864 = "「Ồ, xin lỗi nhé——\nƯ——m, có vẻ không có\nnhỉ.」"

# 【文科大臣】
# display as 文科大臣
# JP: 「動力源だったら、ご飯じゃないですかね？\nおやつとわざわざ言うからには、そうではなく――」
1797 = "「Nếu là nguồn năng lượng thì phải là bữa\nchính chứ nhỉ?\nĐã cất công gọi là điểm tâm\nthì chắc không phải là thứ đó——」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「おやつ……おやつねぇ。三時のおやつ？」
2447 = "「Điểm tâm... Điểm tâm à. Bữa điểm tâm lúc\n3 giờ chiều?」"

# 【文科大臣】
# display as 文科大臣
# JP: 「ああ」
# 1872 = "「啊——」" 

# monologue
# JP: 痩せた大臣がニヤリと頷く。
3351 = "Vị bộ trưởng gầy gò nhếch mép gật đầu."

# 【文科大臣】
# display as 文科大臣
# JP: 「わかったかもしれませんぞ――\nおそらくは、だからさきほどわざわざ“九時の方角”と」
2120 = "「Có lẽ tôi hiểu rồi đấy——\nChắc hẳn vì vậy\nmà lúc nãy cô mới cất công nói là \"Hướng 9\ngiờ\".」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「なるほど！」
1804 = "「Ra là vậy!」"

# monologue
# JP: 経産大臣がトロッコの三時、\n右手方向を探し始める。
3182 = "Bộ trưởng Kinh tế bắt đầu tìm kiếm ở hướng\n3 giờ của xe goòng,\ntức là phía bên tay\nphải."

# monologue
# JP: 余りに苦戦するようだったらヒントの用意もあったのだが、\nその必要もなさそうだ。
2841 = "Nếu họ gặp quá nhiều khó khăn thì tôi cũng\nđã chuẩn bị sẵn gợi ý,\nnhưng có vẻ không\ncần thiết nữa rồi."

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「おお、星とはこの石か――\nおっと、あったぞ！　錆びついた鍵だ」
1953 = "「Ồ, ngôi sao là hòn đá này sao——\nÁi chà,\ncó rồi này! Một chiếc chìa khóa gỉ sét.」"

# 【ポーレット】
# display as 波萊特
# JP: 「よかった、これで坑道にはいれます」
2002 = "「May quá, vậy là chúng ta vào được hầm lò\nrồi.」"

# monologue
# JP: （カツン……）
3381 = "（Cạch...）"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「見事だな。\n最末期まで採掘を続けていただけのことはある」
1998 = "「Tuyệt vời thật.\nKhông hổ danh là nơi vẫn\ntiếp tục khai thác cho đến tận thời kỳ\ncuối.」"

# monologue
# JP: 鍵を開け、坑道内に踏み込むやいなやで、\n経産大臣は感慨深げな声をだす。
3114 = "Ngay khi mở khóa và bước vào hầm lò,\nBộ\ntrưởng Kinh tế đã cất giọng đầy cảm khái."

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「シールドにもロードヘッダにもサビ一つ無い。\nええ、どうだ。今にも動き出しそうじゃないか」
2264 = "「Cả khiên đào lẫn máy đào hầm đều không có\nlấy một vết gỉ sét.\nChà, thấy sao nào.\nTrông cứ như sắp hoạt động ngay được vậy.」"

# 【文科大臣】
# display as 文科大臣
# JP: 「確かに大したものですね――\nこれほど、湿気が多いのに」
2262 = "「Quả thực rất đáng nể——\nMặc dù độ ẩm cao\nđến thế này.」"

# monologue
# JP: 坑道内の気温の低さに、文科大臣が小さく震える。
2796 = "Nhiệt độ thấp trong hầm lò khiến Bộ trưởng\nGiáo dục hơi run rẩy."

# monologue
# JP: すぐさまお付きの官僚が、スーツのポケットから――
3322 = "Ngay lập tức, vị quan chức đi cùng rút từ\ntúi áo vest ra——"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ああ、いかんっ！」
1898 = "「A, không được!」"

# monologue
# JP: 経産大臣が止めた手に、銀のライターが輝いている。\nどうやら、たばこを提供しようとしていたようだ。
3236 = "Trên tay người bị Bộ trưởng Kinh tế ngăn\nlại, một chiếc bật lửa bạc đang tỏa sáng.\nCó vẻ như anh ta định châm thuốc."

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「坑道内にはメタンガスがたまっていることが多い。\n火気厳禁と入る前にも言われたろう――なぁ、妖精さん」
1979 = "「Trong hầm lò thường tích tụ khí metan.\nTrước khi vào cũng đã được dặn là nghiêm\ncấm lửa rồi mà——Đúng không, Tinh linh.」"

# monologue
# JP: やはりライターを懸念したのだろう。
3128 = "Quả nhiên là ông ấy cũng lo ngại về chiếc\nbật lửa."

# monologue
# JP: 炭鉱奥からすっ飛んできた、鉱夫姿の妖精さんが、\n経産大臣の言葉に頷く。
3300 = "Vị Tinh linh trong trang phục thợ mỏ phóng\nvèo ra từ sâu trong hầm than,\ngật đầu đồng\ntình với lời của Bộ trưởng Kinh tế."

# 【ポーレット】
# display as 波萊特
# JP: 「妖精さん、わたしたち、石炭を掘りたいの。\n少し、わけてもらえるかしら」
2305 = "「Tinh linh ơi, chúng tôi muốn đào than.\nCó\nthể chia cho chúng tôi một chút được\nkhông?」"

# monologue
# JP: 経産大臣の顔を見、ニカリと笑い頷いて、\n妖精さんは奥へとすすむ。
3161 = "Nhìn khuôn mặt của Bộ trưởng Kinh tế, Tinh\nlinh cười toe toét gật đầu,\nrồi tiến vào\nsâu bên trong."

# monologue
# JP: その行く先には、真っ黒な岩盤と、\n大きなドリルとが僕らのことを待っている。
2934 = "Phía trước đó, một khối đá đen kịt\nvà một\nchiếc máy khoan lớn đang chờ đón chúng\ntôi."

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ほう、実際に掘れるのか。\nなるほど、これならば危なくない」
1867 = "「Hô, đào thật được luôn sao.\nRa là vậy,\nthế này thì không nguy hiểm đâu.」"

# monologue
# JP: その言葉に応じるように、\n妖精さんはドリルのハンドルを握りこむ。
2865 = "Như để đáp lại lời nói đó,\nTinh linh nắm\nchặt lấy tay cầm của máy khoan."

# monologue
# JP: （ガガガガガガガガ！）
3390 = "（Gagagagagagaga!）"

# monologue
# JP: 轟音。粉砕。飛び散る石炭。
3281 = "Tiếng gầm rú. Tiếng nghiền nát. Than đá\nvăng tung tóe."

# monologue
# JP: が、ハンドル前方全面に大きく広がる透明樹脂、\nポリカーボネートのシールドが、黒い弾丸を跳ね返す。
3195 = "Nhưng lớp nhựa trong suốt trải rộng khắp\nphía trước tay cầm,\ntấm chắn bằng\npolycarbonate, đã nảy bật những viên đạn\nđen ngòm ấy ra."

# 【文科大臣】
# display as 文科大臣
# JP: 「ほほう、なかなかに興味深い」
1960 = "「Hô hô, khá là thú vị đấy.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「なら、お先にどうぞ、大臣」
2413 = "「Vậy thì, xin mời ngài trước, thưa Bộ\ntrưởng.」"

# monologue
# JP: 経産大臣の声に応じて、\n妖精さんがドリルのハンドルから手を離す。
3321 = "Đáp lại lời của Bộ trưởng Kinh tế,\nTinh\nlinh buông tay khỏi tay cầm máy khoan."

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ドリルが暴れると危険です。\nしっかり握って――が、体重をかけてはいけませんぞ」
2421 = "「Máy khoan mà mất kiểm soát thì nguy hiểm\nlắm đấy.\nHãy nắm thật chặt——nhưng đừng tì\ncả trọng lượng cơ thể lên nhé.」"

# monologue
# JP: 妖精さんが、補助をしながら苦笑している。\n経産大臣は、ノリノリだ。
2784 = "Tinh linh vừa hỗ trợ vừa cười khổ.\nBộ\ntrưởng Kinh tế thì đang cực kỳ phấn khích."

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「よろしいですかな？\nならば、ゆっくりと握りこみましょう！」
2232 = "「Chuẩn bị xong chưa?\nVậy thì, từ từ nắm\nchặt lại nào!」"

# 【文科大臣】
# display as 文科大臣
# JP: 「ふーむ」
1920 = "「Hừm——」"

# 【ふかみ】
# display as 深美
# JP: 「お客さま……それ、何。ですか？　素敵。ですね」
2379 = "「Quý khách... Đó là thứ gì, vậy ạ? Trông\ntuyệt, quá.」"

# 【文科大臣】
# display as 文科大臣
# JP: 「石炭だね。私が掘ったんだよ」
2382 = "「Là than đá đấy. Tự tay tôi đào đấy nhé.」"

# 【ふかみ】
# display as 深美
# JP: 「わ。それは……本当にすごい。です。\nあの――それなら。そちらの箱。は？」
1840 = "「Oa. Thế thì... thật sự tuyệt lắm, ạ.\nÀ\nthì——nếu vậy. Cái hộp đằng kia. Thì sao\nạ?」"

# 【文科大臣】
# display as 文科大臣
# JP: 「鉱山の方――と、と。妖精さんが持たせてくれた。\n御一夜木工の宝箱なんだそうだ」
2196 = "「Người của khu mỏ——à, không. Là Tinh linh\nđã tặng cho tôi đấy.\nNghe nói đó là rương\nbáu do thợ mộc Ohimitera làm.」"

# 【ふかみ】
# display as 深美
# JP: 「わぁ。いいもの。ですね。妖精さんの宝箱。なら」
1838 = "「Oa. Đồ tốt, nhỉ. Nếu là rương báu của\nTinh linh. Thì chắc chắn rồi.」"

# monologue
# JP: 大臣相手で、見るからに緊張をしていても、\nふかみはある意味、普段とほとんど変わらない。
3218 = "Dù có thể thấy rõ sự căng thẳng khi đối\nmặt với Bộ trưởng,\nnhưng theo một khía\ncạnh nào đó, Fukami hầu như chẳng thay đổi\ngì so với thường ngày."

# monologue
# JP: が、今日の舳先には見慣れぬ姿。\nなんとか復帰を果たしてくれた船頭さんたちの内の一人だ。
2659 = "Tuy nhiên, hôm nay trên mũi thuyền lại có\nmột bóng dáng lạ lẫm.\nĐó là một trong\nnhững người lái đò mà Fukami đã cố gắng\nthuyết phục quay lại làm việc."

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「帰りは川下りになるとはな。\n御一夜の観光を堪能させてもらえるわけか」
2217 = "「Không ngờ lúc về lại đi xuôi dòng sông\nđấy.\nThế này là định cho chúng tôi tận\nhưởng trọn vẹn du lịch Ohimitera đây sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それもあるんですけど……トロッコの後を――\nさっき、妖精さんがおっかけてきてて」
2424 = "「Cũng có mục đích đó ạ... nhưng mà đằng\nsau xe goòng——\nlúc nãy, có Tinh linh đuổi\ntheo...」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ふむ？　いつだ？」
1950 = "「Hừm? Khi nào vậy?」"

# monologue
# JP: “鉱夫宿舎を出たときです”と、\nお付きの官僚の一人がすぐに答える。
1307 = "\"Lúc rời khỏi ký túc xá thợ mỏ ạ\",\nmột vị\nquan chức đi cùng lập tức trả lời."

# monologue
# JP: この小人数でも、気づいてくれる人がいた。\n何度も何度も、大きく振り向いた甲斐があったか。
2739 = "Dù chỉ có vài người, nhưng vẫn có người\nnhận ra.\nĐúng là bõ công tôi đã ngoái lại\nnhìn rất rõ ràng hết lần này đến lần khác."

# 【ポーレット】
# display as 波萊特
# JP: 「怒ってるわけじゃないとは思うんですけど、\n一応、安全策をとって――あら？」
2427 = "「Cháu nghĩ là không phải họ đang tức giận\nđâu,\nnhưng để đề phòng an toàn thì——ơ?」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「さっきの妖精か。手を振ってるな」
2177 = "「Là Tinh linh lúc nãy à. Đang vẫy tay\nkìa.」"

# monologue
# JP: みなの視線が、川岸に向く。\nその一瞬に、ポーレットはれいなへと耳を寄せる。
2978 = "Ánh mắt của mọi người đều hướng về phía bờ\nsông.\nTrong khoảnh khắc đó, Paulette ghé\ntai sát vào Reina."

# 【れいな】
# display as 玲奈
# JP: 「260秒、使ってください」
2387 = "「Còn 260 giây, xin hãy sử dụng nó ạ.」"

# monologue
# JP: すぐさま、ポーレットは立ち上がる。
3209 = "Ngay lập tức, Paulette đứng dậy."

# 【ポーレット】
# display as 波萊特
# JP: 「なにか訴えかけてるようです。\nわたし、話を聞いてきますね？」
2304 = "「Có vẻ họ đang muốn truyền đạt điều gì đó.\nCháu sẽ đi nghe thử xem sao nhé?」"

# 【ふかみ】
# display as 深美
# JP: 「あ、寄せます」
1911 = "「A, em cho thuyền tấp vào bờ ạ.」"

# monologue
# JP: すぐさまふかみが櫂を漕ぐ。\n船頭も巧みな操船をして、船は軽やかに着岸する。
3085 = "Ngay lập tức Fukami chèo mái chèo.\nNgười\nlái đò cũng điều khiển thuyền điêu luyện,\ncon thuyền nhẹ nhàng cập bến."

# monologue
# JP: （完璧だ。ここまでは）
3373 = "（Hoàn hảo. Cho đến lúc này.）"

# monologue
# JP: れいなとハチロクの\x%l共感;#00ffc040;共感%l;#;による、時間調整。\nこれが上手く決まるのならば、僕らのベストを叩きだせる。
2729 = "Việc điều chỉnh thời gian dựa trên \\x%l共感;#00ffc040;cộng cảm%l;#;\ngiữa\nReina và Hachiroku.\nNếu việc này thành\ncông trót lọt, chúng tôi sẽ có thể phô\ndiễn được kết quả tốt nhất."

# 【ポーレット】
# display as 波萊特
# JP: 「聞いてきました」
2109 = "「Cháu hỏi rồi ạ.」"

# 【ふかみ】
# display as 深美
# JP: 「わかりました。出しますね」
2006 = "「Em hiểu rồi. Xuất phát nhé.」"

# monologue
# JP: すぐさま船が岸を離れる。
3261 = "Ngay lập tức con thuyền rời bến."

# monologue
# JP: ポーレットが立ち上がってから、ここまで二百と五十五秒。\nこの誤差ならば、上出来すぎる。
2887 = "Từ lúc Paulette đứng lên cho đến giờ là\n255 giây.\nSai số chừng này thì quá xuất\nsắc rồi."

# 【文科大臣】
# display as 文科大臣
# JP: 「妖精さんは、なんと？」
2306 = "「Tinh linh nói gì vậy?」"

# 【ポーレット】
# display as 波萊特
# JP: 「『私達の大事な石炭だから』って言ってました」
1732 = "「Họ bảo là 『Vì đó là than đá quý giá của\nchúng tôi』 ạ.」"

# monologue
# JP: ポーレットの目が、文科大臣の手元に落ちる。
3074 = "Ánh mắt Paulette dừng lại ở thứ trên tay\nBộ trưởng Giáo dục."

# monologue
# JP: 精緻な宝箱の中、静かに眠っているそれは、\nまさしく、黒いダイヤという名にふさわしい。
3101 = "Nằm im lìm trong chiếc rương báu tinh xảo\nđó,\nchính là thứ hoàn toàn xứng đáng với\ncái tên \"kim cương đen\"."

# 【ポーレット】
# display as 波萊特
# JP: 「『大事にしてくれたら嬉しい』\n『使って貰えたらもっと嬉しい』って」
1334 = "「『Sẽ rất vui nếu được trân trọng』\n『Sẽ còn\nvui hơn nữa nếu được mang ra sử dụng』 ạ.」"

# 【文科大臣】
# display as 文科大臣
# JP: 「ああ……確かに。\n使われてこそ、というのはありましょうねぇ」
1885 = "「À... Quả thật.\nĐúng là phải được sử dụng\nthì mới phát huy hết giá trị nhỉ.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「しかし、石炭はなぁ……\n今となっては、石炭火力発電所さえ」
1826 = "「Nhưng mà, than đá thì...\nĐến thời điểm\nhiện tại, ngay cả nhà máy nhiệt điện than\ncũng...」"

# monologue
# JP: \x%l汽笛;#00ffc040;汽笛%l;#;！　そうして、音と振動。\n空気が震え、それが骨にまで伝わってくる。
75 = "Tiếng \\x%l汽笛;#00ffc040;còi hơi nước%l;#;! Cùng với đó là âm\nthanh và sự rung\nlắc.\nKhông khí rung chuyển, truyền thẳng\nvào tận xương tủy."

# 【文科大臣】
# display as 文科大臣
# JP: 「お――お……これは……見事ですね」
1952 = "「Ồ——Ồ... Cái này... Tuyệt vời thật đấy.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「下から見るのは初めてだが――\nふぅむ、大迫力だな」
2136 = "「Lần đầu tiên tôi nhìn từ dưới lên đấy——\nHừm, vô cùng choáng ngợp.」"

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;、\x%l8620;#00ffc040;8620%l;#;――\nわたしたちが、復活させたいと思っている機関車です」
1325 = "「\\x%l蒸気機関車;#00ffc040;Đầu máy hơi nước%l;#; \\x%l8620;#00ffc040;8620%l;#;——\nĐó chính là đầu máy mà chúng cháu\nmuốn hồi sinh ạ.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「復活？　元気に走っているように見えるが」
2056 = "「Hồi sinh sao? Trông nó vẫn đang chạy rất\nkhỏe mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「走っても、すぐに止まります。\n御一夜-湯医の24.8キロだけで」
2032 = "「Dù có chạy thì cũng sẽ dừng lại ngay thôi\nạ.\nChỉ trong phạm vi 24,8 km từ Ohimitera\nđến Yui.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「ああ――なるほどな。\nそういう意味での、復活か」
1873 = "「À——Ra là vậy.\nHồi sinh theo nghĩa đó\nsao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「線路がつながってこそ――鉄道ですから」
1966 = "「Phải có đường ray kết nối với nhau——thì\nmới là đường sắt mà ạ.」"

# monologue
# JP: 歌うように、\nポーレットはその夢を語り続ける。
3077 = "Giống như đang ca hát,\nPaulette tiếp tục\nkể về giấc mơ đó."

# monologue
# JP: 赤い鉄橋のその上を、白い煙をたなびかせ、\n\x%l8620;#00ffc040;8620%l;#;の漆黒が駆け抜けていく。
3162 = "Trên cây cầu sắt màu đỏ, nhả ra làn khói\ntrắng,\nkhối đen tuyền của \\x%l8620;#00ffc040;8620%l;#; lao vút qua."

# monologue
# JP: まっすぐ――少しも緩むことなく、\nただ一心に、駆け抜けていく。
3157 = "Thẳng tắp——không hề có chút nới lỏng,\nchỉ\nmột lòng một dạ lao đi."

# 【ポーレット】
# display as 波萊特
# JP: 「御一夜から、北は[ふくおか,1]福丘、[こくら,1]粉蔵、[もじ,1]門次まで。\n南は、[かごしま,2]鹿兒島、[まくらざき,1]枕咲へと」
2321 = "「Từ Ohimitera, phía Bắc đến Fukuoka,\nKokura, Moji.\nPhía Nam thì đến Kagoshima,\nMakurazaki.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「その復活がなされれば、\nこの石炭は真に使われることとなる、か」
2021 = "「Nếu sự hồi sinh đó thành hiện thực,\nthì\nchỗ than đá này sẽ thực sự được đưa vào sử\ndụng, sao.」"

# monologue
# JP: 経産大臣は顔を引き締め、\nポーレットへと石炭を差し出し、握らせる。
3181 = "Bộ trưởng Kinh tế đanh mặt lại,\nchìa hòn\nthan ra cho Paulette và bảo cô cầm lấy."

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「なら使ってくれ。遠慮はいらん」
2401 = "「Vậy thì hãy dùng nó đi. Không cần khách\nsáo.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、でしたら、引き換えさせてください。\n御一夜の特産品と」
1912 = "「A, nếu vậy thì, xin hãy để cháu trao đổi.\nBằng đặc sản của Ohimitera ạ.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「なるほど？　そういうシステムならば、そうしよう」
1802 = "「Ra là vậy? Nếu hệ thống là thế thì cứ làm\nvậy đi.」"

# 【文科大臣】
# display as 文科大臣
# JP: 「僕は、持ち帰らせてもらいます」
2132 = "「Tôi sẽ mang nó về.」"

# monologue
# JP: 文科大臣はそっと、宝箱の蓋を閉じる。
2996 = "Bộ trưởng Giáo dục nhẹ nhàng đóng nắp\nrương báu lại."

# 【文科大臣】
# display as 文科大臣
# JP: 「持ち帰り、孫や知り合いに見せますよ。\nこの御一夜の[じゅうぶん,1]重文や、技術継承炭鉱の話とあわせて、ね」
2043 = "「Tôi sẽ mang về cho cháu và người quen\nxem.\nCùng với câu chuyện về Di sản Văn hóa\nTrọng điểm của Ohimitera và Mỏ than kế\nthừa công nghệ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それも――すごく素敵な使われ方だと思います。\nありがとうございます」
2126 = "「Đó cũng là——một cách sử dụng vô cùng\ntuyệt vời ạ.\nCháu xin cảm ơn.」"

# monologue
# JP: ――いや、ポーレットは気づいてないのか？\n今、大臣は“重文”と、そして――
1297 = "——Khoan đã, Paulette không nhận ra sao?\nLúc nãy, Bộ trưởng đã nói là \"Di sản Văn\nhóa Trọng điểm\", và cả——"

# 【文科大臣】
# display as 文科大臣
# JP: 「で、よろしいですかな？　大臣」
2081 = "「Như vậy được chứ? Thưa Bộ trưởng.」"

# 【経産大臣】
# display as 經濟產業大臣
# JP: 「もちろん結構ですとも。[じゅつせん,1]術仙技術継承炭鉱には、\n今後大いに発展してもらわねばなりませんからな」
2252 = "「Tất nhiên là được rồi. Mỏ than kế thừa\ncông nghệ Jutsusen,\ntừ nay về sau cần phải\nphát triển mạnh mẽ hơn nữa mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あっ！」
# 1895 = "「啊！」" 

# monologue
# JP: ようやく、ポーレットも気づく。\nこみ上げる喜びを抑えてるのか、表情がひどく硬くなる。
3076 = "Cuối cùng thì Paulette cũng nhận ra.\nKhông\nbiết có phải đang cố kìm nén niềm vui\nsướng trào dâng hay không mà nét mặt cô\ncứng đờ."

# monologue
# JP: そのぎくしゃくとした顔のまま――\n小さな小さなガッツポーズを、こそっと僕に示してくれる。
2818 = "Với vẻ mặt gượng gạo đó——\ncô lén lút giơ\ntay làm tư thế chiến thắng bé xíu xiu cho\ntôi xem."

# monologue
# JP: （うん）
3382 = "（Ừm.）"

# monologue
# JP: 目だけで頷き、それに答える。\nまだまだ、油断など出来はしない。
2941 = "Tôi chỉ gật đầu bằng mắt để đáp lại.\nVẫn\nchưa thể lơ là cảnh giác được đâu."

# monologue
# JP: “安全は第一の使命”なことは、\n舟であろうとトロッコだろうと、変わらないのだ。
2847 = "Dù là trên thuyền hay trên xe goòng,\n\"An\ntoàn là sứ mệnh hàng đầu\" vẫn là điều\nkhông thay đổi."

# 【凪】
# display as 凪
# JP: 「おっつかっればーい！」
1989 = "「Mọi người vất vả rồi nha~!」"

# monologue
# JP: \x%l8620;#00ffc040;8620%l;#;の\x%l運転台;#00ffc040;運転台%l;#;から、\n転げるように凪が出てくる。
2748 = "Từ \\x%l運転台;#00ffc040;buồng lái%l;#; của \\x%l8620;#00ffc040;8620%l;#;,\nNagi lảo đảo bước ra."

# 【日々姫】
# display as 日日姬
# JP: 「やったね、にぃに～～――っと、と。\nやりましたね、兄さん」
1834 = "「Làm được rồi nè, anh hai~~——Á, à.\nChúng\nta làm được rồi, anh trai.」"

# monologue
# JP: 続いて、日々姫も。\n僕に握手まで求めてくる。
3185 = "Tiếp theo là Hibiki.\nEm ấy còn đòi bắt tay\ntôi nữa."

# 【日々姫】
# display as 日日姬
# JP: 「マイントレジャー計画。\nこれで、うまくいきますね」
2378 = "「Kế hoạch Mine Treasure.\nThế này là trót\nlọt rồi nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なっ！？　なぜもう知って」
1723 = "「Gì cơ!? Sao mọi người đã biết rồi.」"

# 【ハチロク】
# display as 八六
# JP: 「お忘れですか？　双鉄様。\nわたくしたち\x%lレイルロオド;#00ffc040;レイルロオド%l;#;は――」
2079 = "「Ngài quên rồi sao? Ngài Soutetsu.\n\\x%lレイルロオド;#00ffc040;Railord%l;#; chúng\nem——」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　れいなからの\x%l共感;#00ffc040;共感%l;#;か」
1893 = "「A! Là \\x%l共感;#00ffc040;cộng cảm%l;#; từ Reina sao.」"

# 【ハチロク】
# display as 八六
# JP: 「はい、左様です。\nですので――あら」
2192 = "「Vâng, đúng là vậy ạ.\nVì thế nên——ơ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん！　やりました！\nわたしたち、わたしたちやりましたっ！！」
2429 = "「Cậu Soutetsu! Làm được rồi!\nChúng ta,\nchúng ta làm được rồi!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1935 = "「嗯」" 

# monologue
# JP: 駆け寄ってくるポーレットをただ、抱きとめる。
3078 = "Tôi dang tay ôm chầm lấy Paulette đang\nchạy ùa tới."

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう、ありがとう、双鉄くん。\nみんな、双鉄くんのおかげです！」
2351 = "「Cảm ơn cậu, cảm ơn cậu nhiều lắm,\nSoutetsu.\nTất cả đều là nhờ cậu cả đấy!」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいや、僕など何もしてない」
1702 = "「Không đâu, tôi chẳng làm gì cả.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そんなっ」
2064 = "「Sao lại thế...」"

# 【双鉄】
# display as 雙鐵
# JP: 「『何もしなくて済んだ』のだ。\nそれは本当に、尊く嬉しい事だと思う」
1965 = "「Là 『không cần làm gì cả mà vẫn xong việc』\nđấy.\nTôi nghĩ đó thực sự là một điều vô\ncùng quý giá và đáng mừng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1872 = "「啊——」" 

# monologue
# JP: 理解したのか、ポーレットがこくりと頷いてくれる。
3066 = "Chắc là đã hiểu ra, Paulette khẽ gật đầu\nvới tôi."

# monologue
# JP: 何か起きたそのときのため、僕は準備を尽くしていた。\nそうして、今日、その準備の全てを使わず済んだ。
2936 = "Để đề phòng bất trắc, tôi đã chuẩn bị mọi\nthứ chu đáo.\nVà hôm nay, toàn bộ sự chuẩn\nbị đó đều không cần phải dùng đến."

# 【双鉄】
# display as 雙鐵
# JP: 「視察を成功へと導いたのは、御一夜の力にほかならない。\nこの町が重ねて来たものが、正しく目覚めてくれたから」
2338 = "「Điều dẫn đến thành công của chuyến thị\nsát không gì khác ngoài sức mạnh của\nOhimitera.\nBởi vì những gì thành phố này\ntích lũy được đã thức tỉnh một cách đúng\nđắn.」"

# monologue
# JP: 今日、僕がいなかろうとも、\n視察はきっと、成功していた。
2737 = "Hôm nay, dù không có tôi ở đây,\nchuyến thị\nsát chắc chắn vẫn sẽ thành công."

# monologue
# JP: いないのがポーレットであろうとも、\n他の誰でも、きっと変わらず。
2735 = "Dù người không có mặt là Paulette,\nhay bất\nkỳ ai khác, chắc chắn cũng sẽ không thay\nđổi."

# 【双鉄】
# display as 雙鐵
# JP: 「一人の力は小さなものだな。\nそれを僕は、教えてもらえた気がするよ」
1682 = "「Sức mạnh của một người thật nhỏ bé.\nTôi\ncảm giác như mình đã học được điều đó.」"

# 【ポーレット】
# display as 波萊特
# JP: 「でも、双鉄くん。\nその目覚めをくれたのは――たった一人の、あなたです」
1739 = "「Nhưng mà, Soutetsu.\nNgười đã mang đến sự\nthức tỉnh đó——chỉ có duy nhất một người,\nlà cậu đấy.」"

# monologue
# JP: ポーレットが、僕の手を握る。\nとても熱くて、やわらかな手で。
3073 = "Paulette nắm lấy tay tôi.\nBằng một đôi bàn\ntay vô cùng ấm áp và mềm mại."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが来てくれなければ――\nわたしも、町も、きっと眠ったままでした」
2016 = "「Nếu Soutetsu không đến đây——\nCả tôi và\nthành phố này, chắc chắn vẫn sẽ mãi chìm\ntrong giấc ngủ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば――よかった。\n君を目覚めさせたのが、他の誰でも無い、僕で」
2412 = "「Nếu vậy thì——thật tốt quá.\nNgười đánh\nthức em, không phải ai khác, mà chính là\nanh.」"

# monologue
# JP: いえばクスっと、いたずらっぽい笑みが溢れる。
3206 = "Vừa dứt lời, cô ấy khẽ bật cười với một nụ\ncười tinh nghịch."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん以外のキスなんて、\n寝てても私、逃げちゃいますから」
2015 = "「Nếu không phải là nụ hôn của Soutetsu,\nthì dù có đang ngủ em cũng sẽ né tránh\nthôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
2182 = "「Vậy sao.」"

# monologue
# JP: （ちゅっ）
3380 = "（Chụt）"

# monologue
# JP: 軽いキス。\nもちろん、ポーレットは逃げたりしない。
3278 = "Một nụ hôn phớt nhẹ.\nTất nhiên, Paulette\nkhông hề né tránh."

# monologue
# JP: 幸せそうに僕を見上げて、\nきっと、もっとと望んでくれてる。
2811 = "Cô ấy ngước nhìn tôi với vẻ mặt ngập tràn\nhạnh phúc,\nvà chắc chắn, cô ấy còn đang\nmong đợi nhiều hơn thế."

# 【双鉄】
# display as 雙鐵
# JP: 「なあ、ポーレット」
2319 = "「Này, Paulette.」"

# monologue
# JP: \x%l石造機関庫;#00ffc040;石造機関庫%l;#;ですることではない。\nもっと、ムードが大事なはずだ。
3297 = "Đây không phải là chuyện nên làm ở \\x%l石造機関庫;#00ffc040;Xưởng đầu máy bằng đá%l;#;\n.\nLẽ ra\nphải chú trọng đến bầu không khí hơn mới\nđúng."

# monologue
# JP: だけれど、気持ちがとまらない。\n愛おしさだけが、腹の底からこみ上げてくる。
2761 = "Thế nhưng, tôi không thể kìm nén được cảm\nxúc này.\nChỉ có tình yêu thương trào dâng\ntừ tận đáy lòng."

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、君のことが好きだ」
2117 = "「Anh yêu em.」"

# monologue
# JP: ポーレットとずっと、一緒にいたい。\nそれが、自然なことだと思う。
2947 = "Tôi muốn mãi mãi được ở bên cạnh Paulette.\nTôi nghĩ đó là một điều tự nhiên."

# monologue
# JP: 自分の一番素直な願いが、\n気持ちが、そのまま言葉に変わる。
2895 = "Ước nguyện chân thật nhất của bản thân,\ncảm xúc chân thật nhất, cứ thế hóa thành\nlời nói."

# 【双鉄】
# display as 雙鐵
# JP: 「僕と、結婚して欲しい」
2344 = "「Hãy kết hôn với anh nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
2448 = "「!」"

# monologue
# JP: 一瞬、瞳が驚いて――
2825 = "Trong khoảnh khắc, đôi mắt ấy lộ rõ vẻ\nkinh ngạc——"

# monologue
# JP: 笑顔が、もっと柔らかになる。\n僕のすべてが、受け入れられる。
3319 = "Nụ cười trở nên dịu dàng hơn bao giờ hết.\nCô ấy đã đón nhận mọi thứ thuộc về tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くん。喜んで」
2008 = "「Vâng, Soutetsu. Em rất sẵn lòng.」"

# 【凪】
# display as 凪
# JP: 「やったばーーーーい！\n準備！　準備してくったいっ！！」
2012 = "「Tuyệt quá đi~~~~!\nChuẩn bị! Mau chuẩn bị\nthôi!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2449 = "「!!?」"

# monologue
# JP: すぐ後ろから凪の声。
2968 = "Giọng của Nagi vang lên ngay phía sau."

# monologue
# JP: そういえば居たか――と思うより先、\n足音が外へとすっ飛んでいく。
3305 = "Còn chưa kịp nhớ ra là em ấy vẫn ở đây——\nthì tiếng bước chân đã vọt lẹ ra ngoài."

# 【日々姫】
# display as 日日姬
# JP: 「兄さん――おめでとうございます」
1857 = "「Anh trai——chúc mừng anh.」"

# 【ハチロク】
# display as 八六
# JP: 「おめでとうございます。双鉄様」
2074 = "「Xin chúc mừng ngài. Ngài Soutetsu.」"

# monologue
# JP: とても短い、とてもあたたかな祝福の声。
2814 = "Những lời chúc phúc vô cùng ngắn gọn, vô\ncùng ấm áp."

# monologue
# JP: それだけ残し、日々姫もハチロクも、\nさっさと外へと出ていってしまう。
3009 = "Chỉ để lại bấy nhiêu đó, cả Hibiki và\nHachiroku\ncũng nhanh chóng đi ra ngoài."

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ？　準備とかいっていたが――」
2063 = "「Sao thế? Hình như vừa nãy nói chuẩn bị gì\nđó——」"

# 【ポーレット】
# display as 波萊特
# JP: 「さぁ、なんでしょう？」
1698 = "「Chà, là gì vậy nhỉ?」"

# monologue
# JP: 準備というなら、少し待つべきなのかもしれない。
3001 = "Nếu là chuẩn bị thì có lẽ chúng tôi nên\nchờ một chút."

# monologue
# JP: ポーレットとふたりでいれば、\n退屈などはするわけもないし――
2747 = "Nếu chỉ có hai người với Paulette,\nthì\ncũng chẳng có lý do gì để thấy nhàm chán\ncả——"

# 【双鉄】
# display as 雙鐵
# JP: 「しまった！　そうだ、指輪だ」
2308 = "「Chết thật! Đúng rồi, nhẫn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　いえ、そんなのは別に」
1854 = "「Hả? Không, mấy thứ đó không cần thiết\nđâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや、買ってあるのだ。家にある。\nどうしよう、今からナビを呼んで」
1703 = "「Không, anh đã mua sẵn rồi. Đang để ở nhà.\nLàm sao đây, bây giờ gọi Navi tới nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あとでいいです。\nそれより今は……もっと、一緒にいたいですし」
2385 = "「Để sau cũng được mà.\nHơn nữa bây giờ...\nem muốn ở bên anh nhiều hơn cơ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
2229 = "「Paulette.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ、お二方ともここでしたか」
1901 = "「A, hai người đều ở đây sao.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お、っと」
1850 = "「Ái chà.」"

# monologue
# JP: ポーレットへと伸ばしかけた手で、頭を掻く。
2955 = "Bàn tay vừa định vươn về phía Paulette bèn\nrụt lại gãi đầu."

# monologue
# JP: 自分でも露骨にすぎる誤魔化しのように思えるが、\n赤井宮司もその連れも、全く気にする素振りを見せない。
3304 = "Ngay cả bản thân tôi cũng thấy kiểu lấp\nliếm này quá lộ liễu,\nnhưng ông Guuji và\nngười đi cùng hoàn toàn không có vẻ gì là\nbận tâm."

# 【ニイロク】
# display as 二六
# JP: 「行ってやれ。れいなが待ってる」
2060 = "「Đi đi. Reina đang đợi đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「待ってる――って、\x%lキハ07;#00ffc040;キハ07%l;#;でか！？」
1971 = "「Đang đợi——ở chỗ \\x%lキハ07;#00ffc040;Kiha 07%l;#; sao!?」"

# monologue
# JP: 視察のために、せっかく改修した\x%lキハ07;#00ffc040;キハ07%l;#;に、\nれいなは乗れずに我慢していた。
2835 = "Cất công cải tạo lại \\x%lキハ07;#00ffc040;Kiha 07%l;#; để phục vụ\ncho\nchuyến thị sát,\nvậy mà Reina vẫn phải cố\nnhịn không được lên tàu."

# monologue
# JP: 視察が無事に終わったら、思いっきり走らせようと、\n確かに約束してたが――
2931 = "Rõ ràng đã hứa là sau khi chuyến thị sát\nkết thúc suôn sẻ,\nsẽ cho em ấy chạy thỏa\nthích mà——"

# 【双鉄】
# display as 雙鐵
# JP: 「まさか、今日の今日だったとは」
2218 = "「Không ngờ lại là ngay hôm nay.」"

# 【ニイロク】
# display as 二六
# JP: 「行ってやれ。楽しんでこい」
2058 = "「Đi đi. Chơi cho vui vẻ nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。ありがとうニイロク。\n――君はどうだ？　楽しかったか？」
1931 = "「Ừm. Cảm ơn cô Niiroku.\n——Còn cô thì sao?\nCó vui không?」"

# 【ニイロク】
# display as 二六
# JP: 「愚問」
2266 = "「Hỏi thừa.」"

# monologue
# JP: 声が、ほんのわずかに、笑う。
2829 = "Giọng nói thoang thoảng nét cười."

# 【ニイロク】
# display as 二六
# JP: 「ヤボだ。お前は」
1752 = "「Anh thật kém duyên đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「違いない」
1690 = "「Đúng vậy thật.」"

# monologue
# JP: 軽く手を振り、赤井宮司に向き直る。
2969 = "Tôi khẽ vẫy tay rồi quay sang ông Guuji."

# monologue
# JP: ニイロクも、無論、\x%lレイルロオド;#00ffc040;レイルロオド%l;#;だ。\n\x%l共感;#00ffc040;共感%l;#;で、全てはすでに伝わっていようが――
2667 = "Niiroku đương nhiên cũng là \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nChắc hẳn mọi\nchuyện đã được truyền đạt qua \\x%l共感;#00ffc040;cộng cảm%l;#;\nrồi, nhưng\nmà——"

# 【双鉄】
# display as 雙鐵
# JP: 「赤井宮司も本当にありがとうございます」
1708 = "「Thật sự cảm ơn ông Guuji rất nhiều ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「お互いさまというヤツですよ。\nそれよりほら、早くいってあげてください」
2106 = "「Giúp qua giúp lại cả thôi.\nHơn nữa, cậu\nmau đến đó đi kìa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ええ――はい」
1922 = "「Vâng——được ạ.」"

# monologue
# JP: なんだろう。\nどうしてそこまで急かすのだ？
2905 = "Sao thế nhỉ.\nSao mọi người lại hối thúc\nđến vậy?"

# monologue
# JP: が、確かにれいなを待たせておくのも忍びない。
2660 = "Nhưng mà, đúng là tôi cũng không nỡ để\nReina phải chờ đợi."

# 【双鉄】
# display as 雙鐵
# JP: 「それでは」
2406 = "「Vậy thì xin phép ạ.」"

# 【赤井宮司】
# display as 赤井宮司
# JP: 「ああ、お二人とも――\nご結婚、おめでとうございます」
1938 = "「À, cả hai người——\nChúc mừng đám cưới\nnhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「えっ！？　なっ！！？」
1852 = "「Hả!? Gì cơ!!?」"

# monologue
# JP: 御一夜駅のホームに出れば、\n赤井宮司の言葉の理由が、すぐわかる。
2933 = "Vừa bước ra sân ga Ohimitera,\ntôi lập tức\nhiểu được lý do cho lời nói của ông Guuji."

# 【双鉄】
# display as 雙鐵
# JP: 「なんだ、これは――」
2380 = "「Gì thế này——」"

# 【ポーレット】
# display as 波萊特
# JP: 「こ、こんなの……\n線路を、傷めちゃう、し」
2377 = "「Th, thế này thì...\nSẽ làm hỏng đường ray\nmất.」"

# 【凪】
# display as 凪
# JP: 「傷まないばーい、アルミ缶ばーい！　軽量ばいっ！」
1696 = "「Không hỏng đâu nha, là lon nhôm đó! Nhẹ\ntênh à!」"

# 【ふかみ】
# display as 深美
# JP: 「おめでとうございます！　わたし、来るなり、\n凪ちゃんにこき使われちゃいました」
2071 = "「Xin chúc mừng ạ! Em vừa mới đến,\nđã bị bé\nNagi sai vặt luôn rồi.」"

# monologue
# JP: ふかみ一人だけではない。真闇姉、稀咲、蓑笠老人、\n永山夫人、登呂流湯のご主人、さらには宝生元忠も。
2654 = "Không chỉ có một mình Fukami. Chị Mayami,\nKisaki, ông lão Minokasa,\nPhu nhân\nNagayama, ông chủ nhà tắm Tororyu-yu, và\ncả Houshou Mototada nữa."

# monologue
# JP: ボランティアやキャストの人たち、議員たちまでもが、\nホームの上で、にこにこと僕らを見守っている。
2900 = "Những tình nguyện viên, diễn viên, và thậm\nchí cả các nghị viên,\nđều đang đứng trên\nsân ga, tươi cười dõi theo chúng tôi."

# 【双鉄】
# display as 雙鐵
# JP: 「視察の結果を……みんな、気にしてくれていたのか」
1988 = "「Mọi người... đều quan tâm đến kết quả\nchuyến thị sát sao.」"

# 【れいな】
# display as 玲奈
# JP: 「ポーレットぉ、そうてつさぁん、まだですかぁ！」
2231 = "「Paulette, anh Soutetsu, vẫn chưa xong ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと！」
1861 = "「Ối chà!」"

# monologue
# JP: 報告ならば、あとでいい。\n先約してたれいなを待たせるわけにはいかない。
2731 = "Báo cáo thì để sau cũng được.\nKhông thể để\nReina, người đã hẹn trước, phải chờ đợi\nthêm nữa."

# monologue
# JP: ぐっと、ポーレットの手をつかむ。
2964 = "Tôi nắm chặt lấy tay Paulette."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、いくぞ。\nもしもレールが傷むのならば、すぐに直すさ」
2230 = "「Paulette, đi thôi.\nNếu đường ray có bị\nhỏng, thì chúng ta sẽ sửa lại ngay thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね！」
2181 = "「Đúng vậy nhỉ!」"

# 【れいな】
# display as 玲奈
# JP: 「わぁい！　やーっと走れますぅ」
2009 = "「Oa! Cuối cùng cũng được chạy rồi~」"

# monologue
# JP: れいなの歓声につつまれながら、\nポーレットと二人、体を寄せあう。
3048 = "Trong tiếng reo hò của Reina,\ntôi và\nPaulette nép sát vào nhau."

# monologue
# JP: ブレーキ解除、ギアをつないで、\nハンドルの上に重ねた手から、\x%lキハ07;#00ffc040;キハ07%l;#;へと力を伝える。
3251 = "Nhả phanh, gài số,\ntừ bàn tay đặt lên cần\ngạt, truyền lực đến \\x%lキハ07;#00ffc040;Kiha 07%l;#;."

# 【ポーレット】
# display as 波萊特
# JP: 「走りましょう。ずっと一緒に、これからも」
1689 = "「Cùng chạy thôi nào. Mãi mãi bên nhau, từ\nnay về sau.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ずうっとだ」
1930 = "「Ừ. Mãi mãi.」"

# monologue
# JP: 信号は、青。\nならばためらう理由など無い。
2701 = "Tín hiệu đang bật màu xanh.\nVậy thì chẳng\ncó lý do gì để chần chừ nữa."
