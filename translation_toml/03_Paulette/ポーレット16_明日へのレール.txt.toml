[script]
# lines: 551 
# 【ポーレット】
# display as 波萊特
# JP: 「お弁当、もうすぐですよね」
1761 = "「便當就快要送到了吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、正午だと聞いている」
1947 = "「嗯，說是中午送來」" 

# monologue
# JP: あれほど楽しみにしていたというのに、\nポーレットの顔色はすぐれない。
3069 = "波萊特明明一直很期待這份便當，但此刻的她看起來卻有些落寞。" 

# monologue
# JP: 時計の針に目をやって、\n僕に気づかれないように、こそっと深い息を吐く。
2808 = "她三不五時看向時鐘，還趁我不注意時小聲地嘆氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この状況だ。気が急くのも解るが――」
2247 = "「現在情況特殊，你會感到焦慮也是情有可原——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、いえ……気が急く……のも、\nもちろんあるんですけど――」
1897 = "「啊，不是……雖然我的確……是有些焦慮，不過——」" 

# monologue
# JP: 言いづらそうに、唇が開いてまた閉じる。\nすこし前までのポーレットに戻ってしまったかのようだ。
2820 = "她張開嘴唇，卻欲言又止。就好像又變回了以前那個波萊特。" 

# monologue
# JP: が、そうであろうとなかろうと、僕のすること――\n望んでることは、変わらない。
2684 = "但無論她是哪一個波萊特，我所要做的——我所想要的，都不會改變。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どんなことでも言ってくれ。\nそのため、僕はここにいるんだから」
1745 = "「你什麼事都可以跟我說。我就是為了這個而來到這裡的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……」
2428 = "「雙鐵君……」" 

# monologue
# JP: 小さな頷き。\n迷いの混じったような瞳を、隠さず僕へと向けてくれる。
2832 = "她輕輕點頭。不再隱藏那雙迷茫的眼睛，直直地看向我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「全部、無駄になっちゃうんじゃないかって怖いんです。\nお弁当も、改修も……今までやってきたこと、全部」
2124 = "「我很害怕，害怕這一切會不會到頭來還是一場空。無論是便當還是改造……我們至今為止所做的一切」" 

# 【双鉄】
# display as 雙鐵
# JP: 「人が、このまま集まらなければ――\nそのことを心配しているのか？」
1751 = "「你是在擔心，我們會一直找不到人手嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうしたら……もし、マイントレジャー計画が、\n立ちあげられずに終わっちゃったら――」
2190 = "「是的，如果變成那樣……如果煤探樂園計劃宣告流產——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ、ポーレット」
2216 = "「沒事的，波萊特」" 

# monologue
# JP: 手を伸ばしても、髪をなでても、\nポーレットの表情はこわばったまま。
2928 = "我伸手撫摸她的秀髮，她卻依然神情緊張。" 

# monologue
# JP: だから意識してゆっくりと、\n焦らせぬよう、言葉を選ぶ。
2974 = "所以我刻意放緩語調，謹慎地安撫她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなことには、決してならない。\n万一視察が失敗しても、次の一手で再逆転を」
2309 = "「絕不會發展到那一步的。就算視察結果不好，我們還可以用下一個方案再次嘗試逆轉」" 

# 【ポーレット】
# display as 波萊特
# JP: 「次なんてっ！」
1869 = "「哪裡還有下一個方案——！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2450 = "「！？」" 

# monologue
# JP: 強い一歩で距離が無くなる。\nポーレットは僕の胸板に、体ごとほとんどぶつかってくる。
3070 = "波萊特朝前踏出一大步，我們之間成了零距離。她整個人都撞上了我的胸口。" 

# 【ポーレット】
# display as 波萊特
# JP: 「だって、そうなったら双鉄くん……\n御一夜から、いなくなっちゃう」
1968 = "「因為，如果變成那樣，雙鐵君就要……就要離開御一夜了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1872 = "「啊——」" 

# monologue
# JP: 彼女の心の、一番深い場所にある傷。\n母が自分を置いて去っていったこと。
3302 = "這是隱藏在她內心最深處的那道傷口——自己曾被母親拋棄的事實。" 

# monologue
# JP: 理由があると知って、理解し――\nけれど理解が、すぐさま癒やしになるわけも無い。
2838 = "如今她明白了事情的緣由，但她的傷口卻不會因此而瞬間癒合。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いなくなる、か。\nそういえば、僕にもそんな話があったな」
2430 = "「離開御一夜嗎。聽你這麼一說，好像的確有這麼一回事啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そんなっ！　他人ごとみたいに」
1749 = "「你怎麼能說得好像事不關己一樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「他人か。なのかもしれん\nあの頃の僕と、今の僕とは、もうすでに」
1711 = "「事不關己嗎。那個時候的我，或許的確和現在的我是兩個人了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1856 = "「哎？」" 

# monologue
# JP: 驚いた顔で固まる頬を、そうっと撫でる。
2926 = "我伸手去撫摸她寫滿了訝異的臉頰。" 

# monologue
# JP: ……少し、痩せてしまったみたいだ。\n求人が全く進まぬことが、よほど心労となったのだろう。
1316 = "……她好像有些消瘦了。看來招工一直沒有進展的問題，給她帶來了巨大的壓力。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……それって、どういう」
1349 = "「……這話是什麼意思」" 

# monologue
# JP: けれど撫ぜるうち、\nその瞳から昂っていた何かが消える。
2953 = "我撫摸著她的臉頰，卻發現她眼中高亢的情緒已然散去。" 

# monologue
# JP: 信じてくれてる受け入れようとしてくれている――\n感じた瞬間、僕から言葉が、ぼろりとあふれる。
2831 = "她相信著我，並正在努力接受這一事實——想到這裡，我便情不自禁地開口說道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あの頃の僕は思いこんでた。人に望まれることをする\n――それが唯一の贖罪であり、恩返しする方法なのだと」
2408 = "「那時候的我盲目地以為——去做人們所期望之事，就是我唯一的贖罪，也是唯一的報恩方法」" 

# monologue
# JP: ああ、そうなのかと、自分の声に少し驚く。
3208 = "聽到自己的話語，我暗自感到驚訝。" 

# monologue
# JP: 心が押し出したような言葉に、頭が理解が寄り添っていく。\n心と頭――過去と今とが、繋がっていく。
2965 = "我試著用頭腦去理解這些自心底湧出的話語。內心與頭腦——過去與現在，漸漸開始相連起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「が、僕が受けた最大の恩は、それでは決して返せない。\nそのことに気づけたがゆえ、変わったのだ」
1738 = "「但是，我所接受的最大的恩情，是無法透過這個方式報答的。當我明白這個道理的時候，我就改變了」" 

# monologue
# JP: 相手を本当に思いやる。踏み込んで相手のことを考える。\n――僕にもそうすることができると、教えてもらえた。
3015 = "是波萊特教會了我——我也能夠真正去關心一個人，我也能夠涉足他人的世界，設身處地為她著想。" 

# monologue
# JP: それで、気づけた。\nポーレットが僕に、気づかせてくれた。
2997 = "於是，我明白了。是波萊特讓我明白過來的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットのことを好きになり。\n君といることが幸せで――だから、わかった」
1967 = "「因為我喜歡上了波萊特，因為和你在一起很幸福——所以我才終於明白了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「なにを、ですか？」
2172 = "「明白了什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「事故のとき――僕はふたごの妹に、\n突き放されたと……そう思ってた」
2087 = "「我一直覺得在事故發生的那天——我被我的雙胞胎妹妹推開了」" 

# monologue
# JP: 自分の、一番深い傷。\n触れれば、生々しい血が流れ出す傷。
3021 = "最深的一道傷口。一旦觸碰，鮮血便汩汩流出。" 

# monologue
# JP: けれどその血を、\nいまは、あたたかなものと感じる。
2755 = "可是如今，就連這些鮮血都令我感覺如此溫暖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふたごだった。何をするのも一緒だった。\nずっと一緒に大人になると……そうとぼんやり思ってた」
2102 = "「我們是雙胞胎。無論做什麼都是兩人一起。我曾經理所當然地以為，我倆會一起長大成人」" 

# monologue
# JP: あの日。あの時。
2752 = "可是在那一天，那一瞬間。" 

# monologue
# JP: 一緒に行くのを、一緒に死ぬのを拒まれたと――\n突き放されたことを、心のどこかは、恨んでさえいた。
2816 = "她卻拒絕了我跟她一道同行，拒絕了我跟她一起死去——我對於她那奮力的一推，甚至曾心存怨恨。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だからこれから、ずっと一人だと思っていた。\n一人で、誰かに、尽くすものだと思っていた。が――」
2141 = "「所以我曾經以為，我將一直是孤身一人。以為我會就這樣孤身一人地為他人奉獻我的一生。但是——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1888 = "「啊」" 

# monologue
# JP: 抱きしめる。\n手の中にあるあたたかなもの、僕を救ってくれた人を。
2963 = "我緊緊抱住手心裡的溫暖，抱緊這個將我救出黑暗的人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は一人じゃなくなった。\n――君が幸せに笑ってくれれば、僕も幸せになれるんだ」
2121 = "「我已經不再是孤身一人了。——只要你綻放著幸福的笑容，那麼我也將會是幸福的」" 

# monologue
# JP: かつての僕には、それはあまりにも当然で。\nだから、見失ってしまってた。思い出せなくなっていた。
3018 = "曾經的那個我，對此已經習以為常。所以我才沒有看到。所以我才沒有想到。" 

# monologue
# JP: “君がうれしいと僕もうれしい”――\nその単純で利己的で、とても幼稚で、尊い気持ちを。
1303 = "“你開心我就也開心”——這一單純而自私、極其幼稚卻無比寶貴的思想。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなるために、僕は生かしてもらえたんだ。\n僕が生きているそのことが、路子の喜びだったから」
2211 = "「正是為了獲得幸福，我才活了下來。因為看到我活在這個世上，就是路子的喜悅」" 

# 【ポーレット】
# display as 波萊特
# JP: 「…………」
1336 = "「……」" 

# monologue
# JP: 無言。\nぎゅうっと、僕を抱く手が強くなる。
3071 = "波萊特沉默不語。抱著我的雙手又更用力了幾分。" 

# monologue
# JP: 体の全部を貼り付けるように、\n熱を、鼓動を、そして気持ちを伝えてくれる。
2867 = "就好像要將整個身體都貼上來一般，將她的體溫、心跳聲以及情感傳達給我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば僕は、自分の生きたいよう生きる。\n自分の生を、精一杯に使い切る」
2162 = "「既然如此，我就要按照自己的想法活下去。我要盡情地享受我全部的人生」" 

# monologue
# JP: 僕は単純に利己的に、自分の幸せを求めればいい。\n路子がそうして、最後までしてくれていたように。
2943 = "我只要單純而自私地追求自己的幸福就好。就像路子在她那短暫的一生中所做的那樣。" 

# monologue
# JP: それで、僕らは笑い合えてた。\n自分のものと相手のものと、幸せさえも共有していた。
2714 = "兒時的我們，正是如此笑作一團。我們分享彼此的一切，就連幸福也不例外。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから僕は、いなくならない。\n誰の意向がどうあれど、僕はポーレットのそばにいる」
2144 = "「所以，我不會離開。無論是誰提出怎樣的意見，我都要和你在一起」" 

# 【ポーレット】
# display as 波萊特
# JP: 「――はい」
1326 = "「——嗯」" 

# monologue
# JP: それこそが、僕の一番の望みだから。\nそうしていけば、自然といつか――
2779 = "因為，這就是我最大的願望。只要我這麼做，相信總有一天——" 

# monologue
# JP: 路子の笑顔を思い出し、\n僕も笑顔で、送ってやれるとも思うから。
3118 = "當我回憶起路子的笑容，我也能夠笑著為她送別。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから。大丈夫だ、ポーレット」
2031 = "「就是這樣。別擔心，波萊特」" 

# monologue
# JP: そっと、そうっと体を離し、\n真正面から、ポーレットの目に視線をあわせる。
2971 = "我鬆開懷抱，與波萊特對視。" 

# monologue
# JP: 目の縁が赤くなっている。\nこの子を泣かせちゃいけないと――素直に感じる。
2828 = "她的眼眶有些發紅。我不禁發自內心地想著——決不能讓這個女孩流淚。" 

# 【双鉄】
# display as 雙鐵
# JP: 「義父が与えてくれた機会を無為にする気も、無論ない。\n万が一など起こしはしないし、誰の期待も裏切らない」
2253 = "「當然，我也不打算浪費養父給我的機會。我不會允許意外發生，也不會辜負任何人的期待」" 

# monologue
# JP: 状況は確かに苦しいが、\n絶望するにはまだまだ早い。
3125 = "目前的形勢的確很嚴峻，但還遠沒有到絕望的時候。" 

# monologue
# JP: 今打てる手はすべて打ったし、よりよい手段を、\n僕が、誰かが、今にも思いつくかもしれん。
2930 = "我們已經儘可能做好了應對措施。而且我們每一個人隨時都有可能想到更好的對策。" 

# 【双鉄】
# display as 雙鐵
# JP: 「人は必ず――\n集められるし、集まるさ」
2098 = "「我們一定能找到人手。大家一定會來的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はいっ」
2175 = "「是」" 

# monologue
# JP: 青白くさえ見えてた頬に、明るい赤みが差し込んでくる。
2713 = "先前有些煞白的臉頰，此刻泛起了開朗的紅暈。" 

# monologue
# JP: （僕がここから去るかもと、それほどまでに恐れてくれた\n――その感情を、いつわることなく、ぶつけてくれた）
3384 = "（她是那麼害怕我離開——她將這一份恐懼，毫不遮掩地傳達給了我）" 

# monologue
# JP: だから、さらけ出し向き合えた。\nポーレットとも、僕自身とも。
2977 = "所以，我也同樣敞開心扉去面對了。面對波萊特，還有我自己。" 

# monologue
# JP: そう感じれば、喜びと同時、\n強い感謝と、責任感とが湧いてくる。
2649 = "一想到這裡，在感到喜悅的同時，心中還湧出了謝意與責任感。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうするためにまず、\n視察を乗り切るのに最小限必要な人数を洗い直したい」
1743 = "「作為第一步，我想再重新計算一次通過視察檢驗所需要的最少人數」" 

# monologue
# JP: 背筋を伸ばし、体を離し、\n視線を、過去から今へと戻す。
2960 = "我直起腰桿，放開她的身體，將視線從過去移回到現在。" 

# monologue
# JP: 真闇姉から教え諭してもらえたことを、\nポーレットへとそのまま伝える。
2945 = "我將真闇姐的教誨原封不動地告訴了波萊特。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……そうですね。最小限、ミニマムでって考えれば。\nそれだけ、集めることができれば――」
1882 = "「啊……對啊。基於最小值去考慮，只要我們能找齊所需的最少人數——」" 

# monologue
# JP: ポーレットもすぐ、切り替わる。
3065 = "波萊特也很快調整好了狀態。" 

# monologue
# JP: 不安に震えていた少女から、\n控えめながらも、現実的で有能極まる市長へと。
2886 = "從一個擔驚受怕的少女，變成一位雖有些拘謹，卻年輕有為、腳踏實地的市長。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。向こうがどれほど人を集めようと関係なくなる。\nゴールを明確に設定できれば、到達だけに集中できる」
1934 = "「嗯。這樣一來，無論對手召集到多少人，都不會有影響。只要設定一個明確的終點，就可以集中精力向前衝刺了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「やります、すぐに。\nええと……キャストの人数については、どうですか？」
2135 = "「我這就開始計算。嗯……演員需要多少人呢？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当に最低限なら、一人でよかろう。\n『鉱山妖精がいる』ことを示せれば、足りるのだから」
2019 = "「如果真的要按照最少人數來說的話，一個人就夠了吧。只要讓大臣明白“那裡有礦山精靈”就夠了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「なら、そこは一人で――あ、でも、\n当日の急病とかあったら」
2416 = "「那麼，演員就一人——啊，但是，如果他當天突發疾病的話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか――日程を考えれば、一人が習熟できるのは、\nせいぜい一役でギリギリだから」
1707 = "「也對啊——考慮到日程安排，一個人最多只來得及學會扮演一個角色」" 

# 【ポーレット】
# display as 波萊特
# JP: 「接客系は、\n各所に一人ずつはバックアップ必要ですよね」
2160 = "「接待方面，每個地方需要多安排一個預備的人手啊」" 

# monologue
# JP: 話し合いながら書き出していけば、浮き上がってくる。\n“最低限”は、なかなかどうして削り切れない。
2935 = "我們邊寫邊商量，漸漸看到了雛形。所謂“最小值”，要小下去還真是不容易。" 

# 【ポーレット】
# display as 波萊特
# JP: 「で、発電所の再稼働はあきらめて、\nバッテリーで代替するにしても……」
2237 = "「然後，先假設放棄重啟發電廠，用電池來代替……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。トロッコはどうしても復元せねば――\nお年寄りや子供が楽しめない施設となってしまう」
1928 = "「嗯。但礦車是必須要恢復運作的——否則這一遊樂設施就不便於老人和兒童遊玩了」" 

# monologue
# JP: トロッコの車両整備など、\n\x%l気動車;#00ffc040;気動車%l;#;や機関車と比すべくもなく、容易なものだ。
3147 = "礦車的維護工作與\\x%l気動車;#00ffc040;動車%l;#;及機車的相比，簡直是再容易不過。" 

# monologue
# JP: だが、復線・\x%l保線;#00ffc040;保線%l;#;の手数となると、例えトロッコの\nものであっても、やはり膨大なものとなる。
2764 = "可若是牽涉到恢復廢線以及\\x%l保線;#00ffc040;巡線%l;#;的工作，即使是礦車的線路也依然需要投入大量人力。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……一日八時間を四十日フルに働いてもらえたとして、\n\x%l保線;#00ffc040;保線%l;#;だけで六十一人。トータルで百人は必要になります」
1346 = "「……即使人們願意一天工作８小時、４０天無休，光是\\x%l保線;#00ffc040;巡線%l;#;就需要６１人。總共需要１００人左右」" 

# 【双鉄】
# display as 雙鐵
# JP: 「百人か――かなりキツイな」
2452 = "「１００人啊——難度很大啊」" 

# monologue
# JP: 応募者全員を採用したとしても最低であと九十四人。\nそれはいかにも厳しいが、これ以上には絞れない。
2741 = "即使將現有的６人全部錄用，也至少還差９４人。這是一個艱難的數字，但已經無法再壓縮了。" 

# monologue
# JP: 無理に絞れば、犠牲になるのは安全性か快適性。\n\x%l帝鉄;#00ffc040;帝鉄%l;#;が犯した過ちを、僕らも繰り返すことになる。
3219 = "若強行壓縮人數，所犧牲的就是安全性或可玩性。那樣我們就會重蹈\\x%l帝鉄;#00ffc040;帝國鐵路%l;#;的覆轍。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の方でもいくつかの手を打ってはいるが、\nポーレットも、思いつくことがあったら言ってくれ」
2425 = "「雖然我也已經做了一些對策，不過波萊特如果有想到什麼好主意，也說給我聽聽吧」" 

# monologue
# JP: 言えばすぐさま、\nポーレットは細長い指を折り始める。
3207 = "聽到我這麼說，波萊特立刻掰著纖細的手指數了起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「一般の求人雑誌や新聞チラシ、あとは……\n市の広報誌と、シルバー人材センター、とか」
1687 = "「一般的招聘雜誌與傳單，還有……市政府的公共訊息雜誌，以及老年人再就業中心等等」" 

# 【双鉄】
# display as 雙鐵
# JP: 「広報誌を使っても大丈夫なのか？」
1798 = "「動用公共訊息雜誌不會有問題嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「市も三セクに関わりますから……あ、けど、\nどうかな？　そこは、宮本さんに聞いてみてから――」
2248 = "「畢竟市政府也參與了第三部門……啊，不過我也不太確定。這件事就先問問宮本女士——」" 

# monologue
# JP: （コンコン）
3377 = "（咚咚）" 

# 【ポーレット】
# display as 波萊特
# JP: 「何でしょう？」
1722 = "「什麼事？」" 

# 【宮本】
# display as 宮本
# JP: 「玄関にお弁当が届いています。\n１００食分」
2422 = "「門口有人送便當來。總共１００份」" 

# 【ポーレット】
# display as 波萊特
# JP: 「１００食分っ！？」
2453 = "「１００份！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1888 = "「啊」" 

# monologue
# JP: 出来る限りは――と、頼んだのだが、\nさすが真闇姉という他にない。
3324 = "雖然我是說過“儘可能多做幾份”，但真不愧是真闇姐。" 

# monologue
# JP: この短時間で、見事間に合わせてくれたのか。
3153 = "竟然能在短時間內，趕出這麼多份。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らではとても食べきれん。\n市職員の方にも、よければ試食をお願いしよう」
2100 = "「我們實在吃不了那麼多。如果市政府的職員們願意的話，請他們也來嚐嚐吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですね。あの、宮本さん。\nお弁当を持ってきてない職員さんに」
1907 = "「啊，對呀。那個，宮本女士。請告訴那些沒有帶便當的職員」" 

# 【宮本】
# display as 宮本
# JP: 「承りました。\nすぐ、そのように伝達いたします」
2170 = "「明白了。我這就去轉達」" 

# 【永山】
# display as 永山
# JP: 「あら、お二人お揃いで」
1846 = "「哎呀，二位都在呀」" 

# 【ポーレット】
# display as 波萊特
# JP: 「こんにちわ永山さん――あの――」
1801 = "「午安，永山女士——那個——」" 

# monologue
# JP: ポーレットの目が、永山夫人の背後で止まる。
3075 = "波萊特看向永山女士身後的位置。" 

# monologue
# JP: パレット――でいいのだろうか？\nプラスチック製の平箱に、ぎっしり弁当が詰まっている。
3301 = "這個東西——是叫托盤嗎？眼前這個塑膠方盤之中，裝滿了便當。" 

# 【永山】
# display as 永山
# JP: 「試食用のお弁当。\nご注文の百食、なんとか間に合わせたわ」
1747 = "「你們點的試吃便當１００份，總算是趕出來了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　ご注文って」
1832 = "「咦？　我們點的？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕が頼んだ。真闇姉を通じてだが」
2186 = "「是我托真闇姐幫忙點的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「真闇さんに？」
2147 = "「托真闇小姐？」" 

# 【職員Ａ】
# display as 職員Ａ
# JP: 「わ……宮本さん、お弁当って、これですか？」
1836 = "「哇……宮本女士，您說的便當是指這個嗎？」" 

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「ほんとに、僕らがご馳走になっても？」
2104 = "「我們真的可以吃嗎？」" 

# 【宮本】
# display as 宮本
# JP: 「ええ。マイントレジャーでの観光\x%l列車;#00ffc040;列車%l;#;の駅弁の、\nその、試食品ということですので、ご遠慮なく」
2250 = "「當然。這是煤探樂園觀光\\x%l列車;#00ffc040;列車%l;#;便當的試吃品，請大家不要客氣」" 

# 【永山】
# display as 永山
# JP: 「はい、どうぞ」
1758 = "「來，請嚐嚐吧」" 

# 【職員Ａ】
# display as 職員Ａ
# JP: 「わぁ、おいしそう。市長、ごちそうになります」
1842 = "「哇，看起來好美味。市長，那我們就不客氣了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――はい、どうぞ！　たくさん食べて、\n感想、あとで聞かせてくださいね？」
1875 = "「啊——好的，請用吧！　大家多吃些，待會記得說說感想哦？」" 

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「まかせてください！　いっただっきまーす」
1800 = "「包在我身上吧！　我要開動啦」" 

# monologue
# JP: まっさきに蓋を広げた若手職員たちに続いて、\n三々五々と弁当の輪が広がりはじめる。
3320 = "隨著一位年輕職員迫不及待地打開了便當盒，越來越多的人圍成幾個圈子，開始品嘗便當。" 

# monologue
# JP: 職員さんだけにはとどまらず、掃除のおばさん、\n警備のおじさん、駐車場係さんたちの姿もみえる。
2719 = "其中不光有市政府的職員，還有清潔阿姨、警衛大叔、停車場管理員等等。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そっか。せっかくの試食なんだし、\nいろんな人の意見を聞けたほうが有意義ですもんね」
1803 = "「原來如此。難得的一次試吃，如果能得到更多人的意見會更有意義」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それだけではないがな――と、\n話すのもいいが、まずは食べよう」
1763 = "「倒也不只是這一個原因——嗯……要現在說也可以，不過我們還是先吃吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですよね」
1899 = "「啊，也是啊」" 

# monologue
# JP: 少し離れて座ってみるが、僕らだけでは輪にならない。\n職員たちは――宮本さんも――入ってきてくれない。
2932 = "我們試著坐到離對方稍遠的位置，但兩個人終究還是圍不成一個圈。職員們以及宮本女士都沒有加入我們。" 

# 【真闇】
# display as 真闇
# JP: 「お、間に合ったねぇ」
1858 = "「哦——看來趕上咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお、真闇姉」
1862 = "「哦，真闇姐來啦」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ここ、どうぞです」
2345 = "「請坐這邊」" 

# 【永山】
# display as 永山
# JP: 「じゃ、こっちもご飯にしましょうか」
2414 = "「那麼，我們也開飯吧」" 

# monologue
# JP: 蔵の仕事に、いったん戻っていたのだろう。\n真闇姉が姿を見せれば、僕らもすぐに輪になれる。
3129 = "看來真闇姐是回酒窖處理了一些事情。隨著她的到來，我們也很快圍成了一個圈。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでは、いただきます」
2415 = "「那麼，我開動了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。いただきます――わぁっ！」
1903 = "「啊，好的。我開動了——哇！」" 

# monologue
# JP: 駅弁の包みを渡された、その瞬間にもう歓声が出る。
2929 = "我們剛一接過便當盒，便不禁地歡呼起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんと、\x%l掛け紙;#00ffc040;掛け紙%l;#;も間に合わせたのか」
2297 = "「竟然連\\x%l掛け紙;#00ffc040;封紙%l;#;都趕製出來了嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「日々姫ちゃんの絵ですね。これ……和紙っぽい紙に\nカラーコピーじゃない……ちゃんとした印刷ですよ」
2381 = "「這是日日姬的畫呀。這紙……看起來很像和紙，而且不是彩色影印……是印刷出來的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「すごいな――箱もしっかりしているし」
2000 = "「太厲害了——盒子也很精緻」" 

# 【ポーレット】
# display as 波萊特
# JP: 「本物の駅弁ですよね。これ、もう商品レベル」
2384 = "「這毫無疑問就是鐵路便當呀。這已經是商品等級了」" 

# monologue
# JP: キジ馬に乗ったクマのキジクマ。\nそれがにこにこ、コックの帽子をかぶっている。
3348 = "騎著雉子馬的小熊——雉子熊。它戴著一頂廚師帽，笑得很開心。" 

# monologue
# JP: 手にしているのはこの駅弁、キジ馬を模した鮎の甘露煮と\n石炭仕上げの唐揚げが、素朴なタッチで描かれている。
2861 = "小熊手上拿著這份便當。畫中簡樸的筆觸描繪了模仿雉子馬的香魚甘露煮，以及裹上“煤炭”的炸雞。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん、中身がぱっと分かるのがいい。\n絵も美味そうで、期待が高まる――おおっ！」
1943 = "「嗯，好就好在一看就知道裡面是什麼。光是看著這幅畫就令人食指大動、無比期待——喔喔！」" 

# monologue
# JP: 中身は、絵よりも数段旨そう――\nああ、いや、匂いか。実に食欲をそそる匂いが漂ってくる。
2694 = "便當盒中的菜餚看起來比畫上的更加誘人——不，最誘人的是香味。簡直讓人垂涎三尺。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……おいひい」
1880 = "「啊……好好吃」" 

# monologue
# JP: なんと、ポーレットはもう食べ始めている。
3279 = "轉頭一看，波萊特已經迫不及待地吃了起來。" 

# monologue
# JP: 僕も負けてはいられない。\nまずは、鮎から――
2915 = "我也不能落後。先嚐嚐香魚——" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに……これは実にうまいな」
2259 = "「的確……真是太美味了」" 

# monologue
# JP: 抑えめについた甘露煮の甘さと、鮎本来のほのかな苦味が、\n実にほどよく調和している。
3111 = "甘露煮淡淡的清甜與香魚自帶的少許苦味搭配得相當和諧。" 

# monologue
# JP: 甘露煮自体にとどまらず、それが染み込んだ白米も旨い。\n口が甘さに疲れた先には、石炭唐揚げが待っている。
2772 = "吸收了甘露煮湯汁的白米飯也同樣香甜可口。當舌頭有些厭倦了甜味，還能吃煤炭炸雞換換口味。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん――うんっ」
1921 = "「嗯——嗯」" 

# monologue
# JP: バランスがいい。\nどんどん進む、止まらなくなる。
3178 = "絕妙的平衡。讓人停不下筷子。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くん――お茶です」
1759 = "「來，雙鐵君——喝口茶吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ、すまん――っと。\nありがとうございます、市長」
1914 = "「啊，謝啦——不對。非常感謝，市長」" 

# monologue
# JP: 職員の前では市長と秘書だ。\nあわててとりつくろう――が、誰一人聞いてない。
2787 = "在市政府職員面前，我們是市長和秘書的關係。我連忙改了口——卻根本沒人在聽。" 

# monologue
# JP: みながみな、無言になって食べている。\n箸は、まったく休んでいない。
2803 = "大家都在默默地吃著飯。筷子一刻都沒有停下。" 

# monologue
# JP: （ああ……\n紙パックのお茶までこれほど旨く感じる）
3379 = "（啊……連盒裝的茶飲都覺得如此美味）" 

# monologue
# JP: お茶も、\x%l車販;#00ffc040;車販%l;#;をするべきだろう。\n口を洗えば、また甘露煮が旨くなる。
