1806 = "「原來是這樣啊，真是非常感謝」" 

# 【永山】
# display as 永山
# JP: 「いえいえ、持ちつ持たれつですし」
1868 = "「哪裡哪裡，我們也是互相幫助嘛」" 

# monologue
