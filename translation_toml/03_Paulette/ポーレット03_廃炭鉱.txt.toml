# JP: 「わたくしたちが乗っている以上、\x%l8620;#00ffc040;8620%l;#;は走行しない。\nこの全線が、\x%lキハ07;#00ffc040;キハ07%l;#;の\x%l閉塞;#00ffc040;[へいそく,1]閉塞%l;#;・専有区間となるのですから」
1728 = "「只要我們都在這裡，\\x%l8620;#00ffc040;８６２０%l;#;就不會開動。整個路段就是只屬於\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;的\\x%l閉塞;#00ffc040;閉塞%l;#;專有路段」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1779 = "「啊！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「停止をしたら、[て]手\x%lブレーキ;#00ffc040;ブレーキ%l;#;もかけてください」
2031 = "「等完全停下來，就掛上\\x%l手ブレーキ;#00ffc040;手剎%l;#;」" 

# monologue
# JP: ポーレットの手が、\n\x%l舵輪;#00ffc040;舵輪%l;#;のような大きな鉄輪をぐるぐる回す。
2752 = "波萊特轉起像\\x%l舵輪;#00ffc040;舵輪%l;#;一樣的巨大鐵輪。" 

# 【ポーレット】
# display as 波萊特
# JP: 「これで、安全に停車出来てますから――電話で、\n早瀬さん。もしくは、真闇さんに救援を求めてください」
2088 = "「這樣就算是安全停車了。之後再打電話向早瀨先生或者是真闇小姐求助」" 

# monologue
# JP: 早瀬さん、はこの場合、ふかみではなく、\nふかみの祖父達――堰さんたちだ。
2674 = "早瀨先生，指的是深美的祖父——早瀨堰先生他們吧。" 

# monologue
# JP: あの方達ならガソリン車を出すことが可能だし、\n真闇姉なら、常に最善の対処を考えてくれるはずだ。
2400 = "他們能出動汽油動車前來救援，而真闇姐一定能想出應對突發情況最好的對策。" 

# 【日々姫】
# display as 日日姬
# JP: 「でも、電波の届かないところだったら？」
2127 = "「那要是停在沒有信號的地方怎麼辦？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「よほどの悪天候でも無い限り、湯医線沿線で\n電波が通じないのは、術仙炭鉱廃駅付近だけです」
1723 = "「只要不是氣象條件特別惡劣，整條湯醫線沒有信號的地方就只有術仙煤礦廢車站附近了」" 

# monologue
# JP: 今日の天気は快晴だ。\n車窓から見渡す空には、雲のひとつも見えはしない。
2388 = "今天是個大晴天。從車窗向外看到的天空晴朗無雲。" 

# monologue
# JP: 夕立程度はあるかもしれんが、\nこれから数時間の間に、そう極端な大崩れはしないだろう。
2921 = "雖然不能排除下陣雨的可能性，但數小時以內應該不會下大雨才對。" 

# 【双鉄】
# display as 雙鐵
# JP: 「つまりその場合、術仙炭鉱廃駅付近での非常停車時には、\n日々姫が、廃駅まで歩けばいいだけの話になるのか」
1656 = "「也就是說假如真發生了那種情況的話，日日姬只要步行走到廢車站就行了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。そこで待って、戻ってくるわたし達と合流すれば、\nわたしの運転で、御一夜駅まで持っていけますから」
1944 = "「是的。在那裡等到我們回來，我會把車開回御一夜站」" 

# monologue
# JP: ポーレットの一言一言が、\n不安を解いてくれるのだろう。
2748 = "波萊特的話語減輕了日日姬心中的不安。" 

# monologue
# JP: 日々姫の顔は頷くたびに、\n少しずつ柔らかになっていく。
2670 = "日日姬的表情隨著她的解釋逐漸變得輕鬆起來。" 

# 【日々姫】
# display as 日日姬
# JP: 「うん。わかった――わかりました」
1803 = "「嗯。我懂了——我知道了」" 

# monologue
# JP: 深刻なトラブル時には止まれば良い。\nそれで安全が確保できる。
2794 = "發生重大情況時只要停車就能確保安全。" 

# monologue
# JP: 明快すぎる指針によって、\nどこか縮んでいた日々姫の体も、楽になる。
2817 = "簡單易懂的行動指南讓日日姬放鬆了下來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「なら、お手本はこれでおしまいで大丈夫？」
2111 = "「那就示範到這裡，可以嗎？」" 

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　あ、はい。\nありがとうございました！」
1805 = "「嗯！　啊，是、是的。謝謝您的指導！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「どういたしまして」
1645 = "「不用謝」" 

# monologue
# JP: 軽やかに笑い、ポーレットがハンドル達から手を離す。\nそれをそのまま、日々姫は自分の手の中に。
2742 = "波萊特微微一笑，鬆開手把。然後日日姬自然而然地握住了它。" 

# monologue
# JP: （ああ――）
2992 = "（啊――）" 

# monologue
# JP: 力みが、まるで消えている。
2438 = "剛才日日姬那種僵硬的動作已經不見了。" 

# monologue
# JP: たったこれだけの指導によって、\n日々姫は内面だけでなく、その姿勢をも変えられた。
2702 = "沒想到短短幾句指導不光讓日日姬的心情放鬆了下來，連動作也變得自然了。" 

# monologue
# JP: （見違えたな。適切な指導――いや、“見本”があれば、\n日々姫はここまで、目で学び得るのか）
2981 = "（和剛才判若兩人。只要有適當的指導——不，只要有“示範”，日日姬就能完全模仿會）" 

# monologue
# JP: “健やか”という言葉が浮かぶ、立ち姿。\nれいなの安全確認を受け、日々姫はスっと手を伸ばす。
2522 = "她的站姿只能讓我想起“挺拔”這個詞。玲奈確認安全後，日日姬舉起手。" 

# 【日々姫】
# display as 日日姬
# JP: 「出発！　進行！」
1691 = "「出發！　前進！」" 

# 【日々姫】
# display as 日日姬
# JP: 「それじゃ、兄さん、ポーレットさん、気をつけて！」
1749 = "「哥哥，波萊特小姐，要注意安全啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、行ってくる」
1811 = "「嗯，我們去去就回」" 

# 【ポーレット】
# display as 波萊特
# JP: 「日々姫ちゃんも。どうか、安全第一で」
1922 = "「日日姬也要安全駕駛啊」" 

# 【日々姫】
# display as 日日姬
# JP: 「はい！」
1807 = "「嗯！」" 

# monologue
# JP: （プォンっ！）
3004 = "（砰！）" 

# monologue
# JP: \x%lタイフォン;#00ffc040;タイフォン%l;#;を軽快に響かせて、\n僕らをおろした\x%lキハ07;#00ffc040;キハ07%l;#;が走り去っていく。
75 = "\\x%lタイフォン;#00ffc040;風笛%l;#;發出了輕快的響聲，我們下車後，\\x%lキハ07;#00ffc040;Ｋｉｈａ０７%l;#;逐漸離我們遠去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて、と」
1834 = "「好了，那麼」" 

# monologue
# JP: ……これほどに鉄道好きのポーレットが、\n何故この廃駅には、さほどの興味をもたなかったか――
1340 = "……為什麼那麼喜歡鐵路的波萊特卻沒有對這座廢車站表現出什麼興趣呢——" 

# monologue
# JP: 些か疑問を感じていたが、\n駅舎の外から実物を、間近に見れば理由がわかる。
2624 = "我曾在心裡抱有些許疑惑，不過實地前來一看，就明白其中緣由了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これが、術仙炭鉱廃駅か」
2083 = "「這就是術仙煤礦廢車站啊」" 

# monologue
# JP: ……一言で言えば風情が無い。\n風情の他も、何も無い。
1330 = "……一言以蔽之就是毫無風情。不，應該說除了“風”以外真的什麼都不剩了。" 

# monologue
# JP: 廃駅舎だけにとどまらず、\nその周囲にも――何も、残っているものはない。
2368 = "不光是車站，周圍也是什麼都沒有。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……栄えてはいたのだろうがな」
1383 = "「……雖然在過去應該也有過繁榮的光景吧」" 

# monologue
# JP: 駐車場跡地になっているということは、\n廃駅になったそのあとも、都市機能はあったということだ。
2654 = "既然有停車場的痕跡，就代表在廢站之後還有一段時間繼續擁有著都市的功能。" 

# monologue
# JP: その駐車場の持ち主であるスーパーかなにかも撤退し、\nやがて人も車も何もかも、ここから去っていったのだろう。
2576 = "後來連擁有這座停車場的店家也撤了出去，最終人和車還有其他一切都從這裡消失了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……廃線跡、やっぱりこの辺にはありませんよね」
1382 = "「……這附近果然沒有廢鐵路的痕跡」" 

# monologue
# JP: 湯医線の線路を見、\nそれから周囲の地べたを見ていた青い瞳が持ち上がる。
2367 = "一直在低頭觀察湯醫線鐵路和周圍地面的波萊特抬起頭來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「古地図だと、湯医線と連絡……直接、乗り入れしてた\n可能性、結構高そうに見えたんですけど」
1909 = "「按照古地圖來看，這裡過去和湯醫線相互連接著的可能性應該挺高的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「廃線跡というのは、どのように見つけるものなのだ？」
2045 = "「要怎樣才能找到廢線的痕跡呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしが好きなのは、生きてる鉄道ですから……\nあんまり、良くはわからないんですけど」
1889 = "「我喜歡的是還在運行的活著的鐵路……所以這方面不是很清楚」" 

# monologue
# JP: 言いながら、ポーレットは湯医線の本線を指す。
2743 = "波萊特指著湯醫線幹線說道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「連絡してたならその痕跡があるかなぁって――\nでも、それっぽいものは全然です」
1885 = "「我原本想如果是相連的，應該能在這附近找到痕跡——但完全沒有收穫」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、連絡をしていなかった場合には？」
2131 = "「那麼，如果二者沒有相連呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その場合は、\x%l貨車;#00ffc040;貨車%l;#;からの荷降ろしとか、\nコンテナの積み替えとかをするための空間と設備――」
2117 = "「那應該會有用於從\\x%l貨車;#00ffc040;貨運車廂%l;#;卸貨以及搬運貨櫃的空間和設備才對——」" 

# monologue
# JP: 設備はまるで見当たらないが、\n空間であれば、有り余っている。
2405 = "但我完全沒看到有什麼設備，空間倒是要多少有多少。" 

# monologue
# JP: あまりに有り余り過ぎていて、\nどこをどう見ればいいのか、途方にくれる。
2898 = "這附近實在是太過空曠了，都不知道該從哪開始找。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あとはもちろん、線路の痕跡。多分……\n残ってる可能性が高いのは\x%lバラスト;#00ffc040;バラスト%l;#;かなって思います」
2010 = "「然後就是鐵路的痕跡。我覺得\\x%lバラスト;#00ffc040;道砟%l;#;應該會很有可能殘留下來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、\x%lバラスト;#00ffc040;バラスト%l;#;か――」
1758 = "「唔，\\x%lバラスト;#00ffc040;道砟%l;#;嗎——」" 

# monologue
# JP: 周囲に見当たらぬのであれば、\n歩いて探していく他に無い。
2856 = "要是在這附近找不到，就只好步行去其他地方看看了。" 

# monologue
# JP: 遠足組の話では、ほど近くに在るということだった、\n宿舎跡をまずは、目指して見よう。
2690 = "根據有遠足經歷的人所說，宿舍舊址似乎就在附近，於是我們決定首先去那裡。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大量に使うものだしな。\n完全に処理するのは、確かに面倒そうだ」
2015 = "「畢竟是會大量使用的東西。要全部回收肯定十分困難」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。それとレールや\x%l枕木;#00ffc040;枕木%l;#;は、\n再利用の価値が高いですから」
1948 = "「是的。而鐵軌和\\x%l枕木;#00ffc040;枕木%l;#;具有很高的回收利用價值」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l枕木;#00ffc040;枕木%l;#;？」
1355 = "「\\x%l枕木;#00ffc040;枕木%l;#;？」" 

# monologue
# JP: レールは鉄だ。\n再利用の価値が高いのは当然だろう。が――
2912 = "鐵軌就是鋼鐵，自然有很高的回收利用價值。但——" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l枕木;#00ffc040;枕木%l;#;を、どう再利用するのだ？\nあれほど汚れてしまう木材なのに」
1354 = "「\\x%l枕木;#00ffc040;枕木%l;#;要怎麼回收利用？那些木材都髒成那樣了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「園芸の……\n庭造りとかの、アクセントにするんだそうです」
1669 = "「似乎會被用作園藝……當作人工庭園的裝飾品」" 

# 【双鉄】
# display as 雙鐵
# JP: 「園芸に、庭造り」
1816 = "「園藝，人工庭園」" 

# monologue
# JP: まるで興味が無い世界だということもあろうが、\nどうも、イメージが掴めない。
2926 = "雖然我本來就對這個領域毫無興趣，但我實在是無法想像。" 

# 【双鉄】
# display as 雙鐵
# JP: 「庭に線路でも敷くのか？」
2144 = "「難道要在院子裡鋪設鐵路嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そういう人も居ますよ？\nミニＳＬを自宅のお庭で走らせちゃう！　みたいな」
1658 = "「也會有這種比如說想要在自家庭院裡弄個迷你蒸汽機車之類的人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――なんとも凄いな」
2130 = "「那還——真是厲害啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%lまいてつ;#00ffc040;まいてつ%l;#;とは違う凄みですよね。\n車輌も駅も線路も全部、自分ひとりで作っちゃう」
1661 = "「他們和\\x%lまいてつ;#00ffc040;掌車人%l;#;有著不同的厲害之處呢。他們的車輛車站和鐵路都是自己做的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ならば、\x%l枕木;#00ffc040;枕木%l;#;も相当に使うのか」
1705 = "「原來如此，怪不得要用到大量的\\x%l枕木;#00ffc040;枕木%l;#;啊」" 

# monologue
# JP: 納得すれば、\nしかしぶんぶん、ポーレットは首を横に振る。
2643 = "我點頭說道。然而波萊特卻搖了搖頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　あの、それも多分そうですけど、\nでも、違うんです。普通の、お庭の、\x%l枕木;#00ffc040;枕木%l;#;は」
1777 = "「啊！　那個，雖然也可能會有人這麼用。但是一般用於庭院的\\x%l枕木;#00ffc040;枕木%l;#;不是這種用途啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1765 = "「唔？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そういうのじゃなくて、\x%l枕木;#00ffc040;枕木%l;#;は庭造りの資材に――\n敷石の代わりとか、ウッドデッキとか塀とかにするって」
1687 = "「其實\\x%l枕木;#00ffc040;枕木%l;#;一般用於庭園建設——比如用來代替鋪路石，或者做木甲板還有木圍欄」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん。\nなんとなくイメージできてきたぞ」
1772 = "「啊……這樣。我大概能想像到了」" 

# monologue
# JP: 青々とした芝生の庭に、\n敷石代わりの\x%l枕木;#00ffc040;枕木%l;#;が、規則正しく連なっている。
2836 = "蔥綠色的庭園地面鋪著整齊的\\x%l枕木;#00ffc040;枕木%l;#;構成的地面。" 

# monologue
# JP: 埋める深さで高さを変えた\x%l枕木;#00ffc040;枕木%l;#;たちで、\n枯木の風合いをそのまま活かした塀を作る――
2552 = "將枯朽的\\x%l枕木;#00ffc040;枕木%l;#;豎起來埋入地下，搖身變成木圍欄——" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは確かに、かなり雰囲気が良さそうだ」
2019 = "「的確，這樣能營造出一種獨特的氣氛啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。わたしも、ちょっと憧れちゃいます」
1985 = "「沒錯吧。我對此也有些憧憬呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。ポーレットは園芸にも興味があるのか？」
1753 = "「哦？　波萊特對園藝也有興趣嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、庭造りの方じゃなく――って――――」
1784 = "「啊，不是指裝扮庭院……啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　――っと！」
1857 = "「怎麼了？　——這是！」" 

# monologue
# JP: 曲がりくねった坂道の上、\nいきなり、それは現れる。
2598 = "我們爬上了彎彎繞繞的坡道。突然，看到了這樣一幅景象。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これが――みんなの言っていた……」
2080 = "「這就是——大家說過的那個……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ゴーストタウン……\n森に、のみこまれている町、ですか」
2152 = "「鬼城……淹沒在森林中的宿舍嗎」" 

# monologue
# JP: これは――凄い。\n植物の、自然の強さを思い知る。
2893 = "這可真是壯觀。讓我深刻理解了植物——自然的強大之處。" 

# monologue
# JP: 人がいっとき、いかに繁栄しようとも、\n忍耐強く、自然は逆転の時を待って――勝つ。
2556 = "就算曾經一時被人類占領了它們的領地，自然仍然會靜靜忍耐，等待著逆轉的機會——然後取勝。" 

# 【ポーレット】
# display as 波萊特
# JP: 「宿舎、だったんですよね、ここ」
2090 = "「這裡曾經是宿舍吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1765 = "「唔？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「こんなにたくさんの宿舎が必要なほど――\n多くの人が、この炭鉱で働いていたんですよね」
1912 = "「既然建造了這麼多的宿舍，也就是說曾經有這麼多人在煤礦工作對吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1930 = "「是啊——」" 

# monologue
# JP: そうか。\nそうなのだ。
2680 = "是啊，就是這樣。" 

# monologue
# JP: この過去は、この痕跡は。\n御一夜の未来を映す鏡であるとも見れるのだ。
2892 = "這些過去，這些痕跡，彷彿在暗示著御一夜的未來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それほどまでの隆盛を極め――しかし、\n石炭需要の低減により、無人の廃墟と化してしまった」
2089 = "「這裡曾經如此繁榮——但是隨著煤炭需求量的急劇減少，這裡就成了無人的廢墟」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ゼロじゃありませんよね。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;にだって、同じことが起きる可能性」
1351 = "「\\x%lエアクラ;#00ffc040;空凝機%l;#;也發生一樣情況的可能性並不是零吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1935 = "「是啊」" 

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;以前には、\n鉄道が、ガソリン自動車が人々の交通を支えていた。
2490 = "在發明\\x%lエアクラ;#00ffc040;空凝機%l;#;之前，是鐵路和汽車支撐著整個交通。" 

# monologue
# JP: しかし今、\nそのどちらもが、青息吐息だ。
2786 = "然而現在兩者的狀況都岌岌可危。" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;に勝る交通手段が誕生すれば、\nそれはいずれ、\x%lエアクラ;#00ffc040;エアクラ%l;#;を駆逐していくだろう」
1624 = "「一旦有勝過\\x%lエアクラ;#00ffc040;空凝機%l;#;的交通手段被發明出來，總有一天\\x%lエアクラ;#00ffc040;空凝機%l;#;也會被淘汰出局吧」" 

# monologue
# JP: 十年後か、百年後か、一千年後かはわからんが――
2920 = "雖然不知道是十年後、百年後還是千年後——" 

# monologue
# JP: 人間が人間として歩みを重ねていく限り、\nその日はいつか。いつか必ずやってくる。
2462 = "只要人類的歷史還在前進，這一刻一定會到來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……御一夜にずっと暮らしている人たちは、\nこの景色、絶対に知ってる筈なのに――どうして」
1368 = "「……一直生活在御一夜的人們一定知道這幅景象——但為什麼」" 

# monologue
# JP: どうして、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に賛成してしまうのか。
2783 = "為什麼會同意\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶呢。" 

# monologue
# JP: 途中で呑まれたその問いに、\nそれでも、僕は答えてしまう。
2516 = "她沒有問完，但我卻還是回答了她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「規模があまりに大きすぎ、現実感を得られない。\nこの光景が日常の延長にあると、とても実感できんのだ」
2050 = "「規模太大了，人們沒有現實感。無法將這幅景象當做日常生活的延伸」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1747 = "「哎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「くだらぬ言葉遊びのようになってしまうが……\n例えば日々姫には、この光景はまさに『絵』なのだ」
2140 = "「雖然有點像無聊的文字遊戲……舉例來說，這幅景象對日日姬而言，就如她所說的那樣——如同“畫”一般」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1766 = "「啊——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が特別なわけじゃない。僕も圧倒されてしまって、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場のことと、言われるまでは重ならなかった」
1637 = "「不光是日日姬，我也被這幅景象震驚了。如果不是你提醒，根本不會把它和\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠聯繫起來」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう……なんですね。\nだから、みんな」
1959 = "「是這樣啊……所以大家才……」" 

# monologue
# JP: “伝わったな”と感じれば、\nそれはすぐさま、ポーレットへの新たな理解へと変わる。
2466 = "只要將意思傳達給她，波萊特馬上就能得到新的理解。" 

# monologue
# JP: （やはりポーレットは……\n政治家としても、卓越した素質を持っているのだ）
3000 = "（果然波萊特作為政治家的素質也非同一般）" 

# monologue
# JP: が、稀有な素質を、直観力を。鉄道面でも政治面でも、\n今のポーレットは活かしきれていない。
2410 = "但是，波萊特並沒有將這稀有的素質——直覺，很好地運用於鐵路還有政治方面。" 

# monologue
# JP: 『わかる』『見える』その感覚が明快すぎて、\n『わからない』『見えない』への想像力が働かんのだろう。
2483 = "因為她太善於“理解”和“看穿”事物的本質，反而不明白常人為什麼會不懂吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「“みんな”と、ポーレットとの感じ方の違い。\nそれこそ恐らく、リーダーの資質というものだ」
2002 = "「波萊特看待問題的方式和“大家”並不一樣。恐怕這就是所謂領袖的資質吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　わたしっ、そんなっ」
1740 = "「哎！？　我、我才沒有」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の目は、この光景に美を見出した。\nポーレットの目は、この光景に教訓を見た」
1926 = "「日日姬覺得這幅景象很美。但波萊特卻從中讀出了歷史的教訓」" 

# monologue
# JP: 同じ場所に居、同じ光景をその目に映し、\nけれども人は、実にさまざまなものを“見る”。
2872 = "身在同一個地點，望著同一幅景色，但人們卻總會有不同的理解。" 

# monologue
# JP: その目が何を見るかがつまり、その人間の、\n適正なのかもしれないと、ふっと感じる。
2590 = "我不禁覺得，人對事物的關注點恰巧反應了他適合做什麼事。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その教訓は、他の者には見いだし難い。\nならば、それこそポーレットの持つ資質なのだ」
1684 = "「其他人很難像波萊特一樣讀出歷史的教訓。所以，我覺得這是波萊特的特質」" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど――もしもそうだとしても」
1673 = "「但是——就算是這樣」" 

# monologue
# JP: 険しい光が。\nその青い瞳に宿るところを、初めて目にする。
2641 = "我頭一次見到波萊特的藍色瞳孔裡充滿了這麼嚴峻的神色。" 

# monologue
# JP: それを溶かそうとするかのように、\nぐうっと、ポーレットは顔を空へと向ける。
2824 = "而她似乎是想掩飾起來不讓我察覺，她抬起頭看向天空。" 

# 【ポーレット】
# display as 波萊特
# JP: 「私が見つけた教訓に、\n誰も、耳を傾けてくれないなら」
1670 = "「但如果沒有人對我所發現的教訓感興趣——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「伝わらないのは、単に伝え方の問題だろう。\nそれを一緒に、改善していけばいいだけだ」
1838 = "「如果不被理解，那單純只是表達方式有問題吧。只要我們一起想辦法解決就可以了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「――！」
1359 = "「——！」" 

# monologue
# JP: 雷にでも打たれたように、\nポーレットが目をまんまるくする。
2738 = "波萊特十分吃驚，睜大了眼睛。" 

# monologue
# JP: 頬まで徐々に紅潮させて、\nじいっと僕を見つめてくる。
2931 = "雙頰也漸漸泛起紅暈，緊緊盯著我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「かつて、日々姫の絵によって、\n“赤は赤い”と、教えてもらったことがある」
1664 = "「以前，日日姬用她的畫教會了我“紅色很紅”這個道理」" 

# monologue
# JP: その経験を話してみれば、\nポーレットはぶんぶんと、何度も何度も強く頷く。
2827 = "聽到我這麼說，波萊特連連點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「この件は、直接的に\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に関わる問題だ。\n日々姫が知恵を貸してくれるかはわからん、が――」
2077 = "「這件事是和\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶直接相關的問題。雖然不知道日日姬願不願意幫助我們——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし頑張れます。双鉄くんが一緒なら！\n伝え方、伝わるように、どんなにだって工夫します」
1725 = "「只要和雙鐵君在一起，我就會努力的！我會努力改善我的表達方式，好讓大家更容易明白」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1804 = "「嗯」" 

# monologue
# JP: たとえ日々姫がそこまでは協力してくれずとも、\n真闇姉も、凪もふかみもいてくれる。
2555 = "就算日日姬不願意幫忙幫到底，我們還有真闇姐、凪和深美。" 

# monologue
# JP: 日々姫の心を動かすようにもしも伝えることができたら、\nそれは恐らく、多くに伝わるものともなろう。
2545 = "如果我們選擇的表達方式能打動日日姬的心，想必也能夠打動更多的人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、出来ることからやろう。\n今日は、カメラを持ってきているのだよな？」
2110 = "「那就先從我們能做到的事情開始著手吧。你今天帶相機來了吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。記録の必要があるかと思って。\nあの――邪魔じゃなければ、双鉄くんの分も」
1947 = "「是的。我想著可能會需要用它來做記錄。那個——如果雙鐵君不嫌帶著麻煩，我給你也帶了一台」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1754 = "「哦？」" 

# monologue
# JP: 自分が写真を撮るなどと、思ったこともなかったが、\n手を貸すと決めた以上は、なんであれ行うべきだろう。
2922 = "雖然之前從沒想過我會拿起相機拍照，但既然決定幫助波萊特，那就嘗試一下吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まるで経験が無いので、簡単なものだと助かるが――」
1890 = "「我完全沒有攝影的經驗，所以最好給我台操作簡單的——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「任せてください！　パパ、マニアでしたから」
1703 = "「包在我身上！　我爸爸可是攝影發燒友」" 

# monologue
# JP: ポーレットが提げたバッグから、\nカメラがふたつ、取り出される。
2741 = "波萊特從她提著的包裡取出兩台相機。" 

# monologue
# JP: 片方は、一眼レフ――でいいのだろうか？\nひどく重厚で、レバーやボタンが数多い。が――
2361 = "一台是——單眼相機吧？看起來很重很笨重，按鍵和旋鈕也很多。另一台則是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、\nこちらの小さなものは見るからに簡単そうだな」
1707 = "「原來如此，這台小型的用起來應該很簡單」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、全部自動でやってくれますから。\nまず、電源をいれて――」
1954 = "「是的，它會全部自動地幫你調整好。首先打開電源——」" 

# monologue
# JP: ポーレットが僕のすぐ脇にたつ。\nカメラのうしろのディスプレイをふたりで覗き込む。
2750 = "波萊特緊貼著我。我們兩人一齊盯著相機的螢幕。" 

# monologue
# JP: ……頬が、近い。\nちょっと動けば、すぐにも触れてしまいそうだ。
1342 = "……臉貼得好近。感覺只要稍微動一下就能碰到。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ここに映った映像が、そのまま写真になりますから。\nこのレバーで、ズームしたりワイドにしたりして……」
1906 = "「按下快門就能把螢幕上的畫面拍成照片了。用這個搖杆能讓畫面放大和縮小……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1755 = "「唔」" 

# monologue
# JP: 僕に話しかけるとき、\nポーレットは律儀なまでにこちらを向く。
2476 = "和我說話的時候，波萊特會很有禮貌地看著我。" 

# monologue
# JP: かかってくる息がほの暖かで、くすぐったい。
2528 = "她說話時吐出的溫暖的氣息吹到我臉上，好癢。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで、撮りたい画面を決めたら、\nシャッターボタンを押してあげれば――」
2012 = "「然後，要拍的時候就按下快門——」" 

# monologue
# JP: （ピピピっ……カシャッ！）
2996 = "（嗶嗶嗶……喀嚓！）" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？　今のでもう撮れたのか？」
1764 = "「唔？　這就拍好了嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、何千枚でもカードに記録できますから。\n失敗でも何でも、かまわずどんどん撮っちゃって下さい」
1955 = "「是的，記憶卡裡能儲存好幾千張照片呢。所以不用怕拍不好，隨心地拍吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2026 = "「知道啦」" 

# monologue
# JP: ポーレットの手からカメラを受け取る。\nわずかに触れる指先は、息よりもなお温かい。
2611 = "我從波萊特手裡接過相機時，碰到了她的手指，感覺比她的呼吸還要更加溫暖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「一枚、撮ってみてもいいか？」
1894 = "「我能先試拍一張嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「一枚といわず、何百枚でも！」
1698 = "「別說一張，就是幾百張都行！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「とりあえずは、試しの一枚でいい」
2039 = "「總之，就先試拍一張好了」" 

# monologue
# JP: カメラを構える。\nモニターの中、ポーレットが驚きに顔を硬くする。
2632 = "我端起相機。螢幕中出現了波萊特驚訝的面孔。" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あの、一枚って、わたしをですか？」
1746 = "「哎？　那個，是拍我嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ダメか？\n対象物がはっきりしている方が良いかと思うのだが」
1800 = "「嗯。不行嗎？我覺得先從明確的物體開始拍比較合適」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、あの――三十秒だけ待ってください！」
