2489 = "「Chăn đệm tính sao đây ạ? Có cần cất đi\nkhông nha?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そういうときは、迷わず、慌てず、こうしてください」
1840 = "「Có lẽ vậy. Dù sao cũng không ngủ lại\nnữa.」"

# 【れいな】
# display as 玲奈
# JP: 「あ！」
1779 = "「Vâng ạ.」"

# monologue
# JP: ノッチとおぼしきハンドルを戻し、クラッチを切って、\nシフトオフ。\x%lブレーキ;#00ffc040;ブレーキ%l;#;ハンドルに力を加える。
2550 = "Cứ để nguyên chăn đệm làm ghế sofa cũng\nđược,\nnhưng có Hikari ở đây."

# monologue
# JP: \x%lブレーキ;#00ffc040;ブレーキ%l;#;にかかった\x%l圧;#00ffc040;圧%l;#;は当然ながら、\n徐々に\x%l列車;#00ffc040;列車%l;#;の速度を落とし――やがて静止へと至らせる。
2442 = "Nếu tạo tiền lệ dùng chăn đệm làm ghế\nsofa,\ncó thể sẽ ảnh hưởng xấu đến việc giáo dục\ncon bé sau này."

# 【日々姫】
# display as 日日姬
