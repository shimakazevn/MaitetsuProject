2088 = "「Ừm. Thế này là ổn rồi.」"

# monologue
# JP: 早瀬さん、はこの場合、ふかみではなく、\nふかみの祖父達――堰さんたちだ。
2674 = "「Ừm. Thế này là ổn rồi.」"

# monologue
# JP: あの方達ならガソリン車を出すことが可能だし、\n真闇姉なら、常に最善の対処を考えてくれるはずだ。
2400 = "Hai bồn rửa mặt nằm cạnh nhau.\nTừ bên cạnh, giọng nói thanh bình của\nReina vang lên."

# 【日々姫】
# display as 日日姬
# JP: 「でも、電波の届かないところだったら？」
2127 = "「Vậy chúng ta về thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「よほどの悪天候でも無い限り、湯医線沿線で\n電波が通じないのは、術仙炭鉱廃駅付近だけです」
1723 = "「Vậy chúng ta về thôi.」"

# monologue
# JP: 今日の天気は快晴だ。\n車窓から見渡す空には、雲のひとつも見えはしない。
2388 = "Đi ngược lại lối đi, chúng tôi đi ngang\nqua những người vừa thức dậy."

# monologue
# JP: 夕立程度はあるかもしれんが、\nこれから数時間の間に、そう極端な大崩れはしないだろう。
2921 = "Quả nhiên, đúng như lời Paulette nói,\nchỉ chậm hơn mười phút thôi là đã——"

# 【双鉄】
# display as 雙鐵
# JP: 「つまりその場合、術仙炭鉱廃駅付近での非常停車時には、\n日々姫が、廃駅まで歩けばいいだけの話になるのか」
1656 = "「Paulette ra dáng làm mẹ lắm rồi nha.\nChứ như thế này, bé Hikari sẽ sợ hãi lắm\nnha.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。そこで待って、戻ってくるわたし達と合流すれば、\nわたしの運転で、御一夜駅まで持っていけますから」
1944 = "「Paulette ra dáng làm mẹ lắm rồi nha.\nChứ như thế này, bé Hikari sẽ sợ hãi lắm\nnha.」"

# monologue
# JP: ポーレットの一言一言が、\n不安を解いてくれるのだろう。
2748 = "Tôi gật đầu đồng tình sâu sắc với giọng\nnói đầy cảm xúc của Reina."

# monologue
# JP: 日々姫の顔は頷くたびに、\n少しずつ柔らかになっていく。
2670 = "Tôi gật đầu đồng tình sâu sắc với giọng\nnói đầy cảm xúc của Reina."

# 【日々姫】
# display as 日日姬
# JP: 「うん。わかった――わかりました」
1803 = "「Đúng vậy. Cứ liên quan đến Hikari và\nchuyến du lịch bằng tàu hỏa,\nPaulette lại trở nên đáng tin cậy hơn hẳn\nngày thường.」"

# monologue
# JP: 深刻なトラブル時には止まれば良い。\nそれで安全が確保できる。
2794 = "「Hửm?\n……Sắt là đường sắt thì anh hiểu rồi, nhưng\nkhói là sao?」"

# monologue
# JP: 明快すぎる指針によって、\nどこか縮んでいた日々姫の体も、楽になる。
2817 = "「Fufufu, cái đó là nha.」"

# 【ポーレット】
# display as 波萊特
# JP: 「なら、お手本はこれでおしまいで大丈夫？」
2111 = "（Tuúúúúúúúúúúú!）"

# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　あ、はい。\nありがとうございました！」
1805 = "「Anh hiểu rồi. Khói ở đây là mùi khói tàu\nđúng không.」"

# 【ポーレット】
# display as 波萊特
# JP: 「どういたしまして」
1645 = "「Chính xác nha.」"

# monologue
# JP: 軽やかに笑い、ポーレットがハンドル達から手を離す。\nそれをそのまま、日々姫は自分の手の中に。
2742 = "「Chính xác nha.」"

# monologue
# JP: （ああ――）
2992 = "「Em chơi chữ giỏi đấy.」"

# monologue
# JP: 力みが、まるで消えている。
2438 = "Có vẻ như sắt và khói cũng có tác dụng cực\nkỳ lớn đối với Reina."

# monologue
# JP: たったこれだけの指導によって、\n日々姫は内面だけでなく、その姿勢をも変えられた。
2702 = "「……Giá như Hikari cũng hấp thụ thật nhiều\nsắt và khói,\nđể cải thiện chứng sợ người lạ dù chỉ một\nchút thì tốt biết mấy.」"

# monologue
# JP: （見違えたな。適切な指導――いや、“見本”があれば、\n日々姫はここまで、目で学び得るのか）
2981 = "「Không sao đâu, chắc chắn sẽ được mà nha.」"

# monologue
# JP: “健やか”という言葉が浮かぶ、立ち姿。\nれいなの安全確認を受け、日々姫はスっと手を伸ばす。
2522 = "「Á.」"

# 【日々姫】
# display as 日日姬
# JP: 「出発！　進行！」
1691 = "「Mừng mọi người đã về~」"

# 【日々姫】
# display as 日日姬
# JP: 「それじゃ、兄さん、ポーレットさん、気をつけて！」
1749 = "「Fufufu, sảng khoái quá nha~」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ、行ってくる」
1811 = "「Hikari cũng sảng khoái!\nSảng khoái xong là đói bụng luôn~」"

# 【ポーレット】
# display as 波萊特
# JP: 「日々姫ちゃんも。どうか、安全第一で」
1922 = "「Vậy thì chúng ta ăn sáng nhé.」"

# 【日々姫】
# display as 日日姬
# JP: 「はい！」
1807 = "「Vậy thì chúng ta ăn sáng nhé.」"

# monologue
# JP: （プォンっ！）
3004 = "Như thể đã đoán trước được tình huống này,\nPaulette đã bắt đầu mở giỏ đồ ăn ra."

# monologue
# JP: \x%lタイフォン;#00ffc040;タイフォン%l;#;を軽快に響かせて、\n僕らをおろした\x%lキハ07;#00ffc040;キハ07%l;#;が走り去っていく。
75 = "Như thể đã đoán trước được tình huống này,\nPaulette đã bắt đầu mở giỏ đồ ăn ra."

# 【双鉄】
# display as 雙鐵
# JP: 「さて、と」
1834 = "「Em chuẩn bị cả phần ăn sáng nữa à.」"

# monologue
# JP: ……これほどに鉄道好きのポーレットが、\n何故この廃駅には、さほどの興味をもたなかったか――
1340 = "「Có cả mayonnaise và hồng trà trong bình\ngiữ nhiệt nữa nha.」"

# monologue
# JP: 些か疑問を感じていたが、\n駅舎の外から実物を、間近に見れば理由がわかる。
2624 = "「Hikari thích nước ép cơ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「これが、術仙炭鉱廃駅か」
2083 = "「Fufufu, được rồi, nước ép cà chua nhé.」"

# monologue
# JP: ……一言で言えば風情が無い。\n風情の他も、何も無い。
1330 = "「Cà chua!? Cà chua á.\nHikari thích nước ép ngọt cơ~」"

# monologue
# JP: 廃駅舎だけにとどまらず、\nその周囲にも――何も、残っているものはない。
2368 = "「Tiếc quá! Nước ép ngọt hiện tại đã bán\nhết rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「……栄えてはいたのだろうがな」
1383 = "「Bán hết rồi. Bán hết rồi thì đành chịu\nvậy~」"

# monologue
# JP: 駐車場跡地になっているということは、\n廃駅になったそのあとも、都市機能はあったということだ。
2654 = "Nếu tôi đi một mình trên chuyến tàu không\ncó xe đẩy bán hàng này,\nchắc chắn tôi sẽ phải chịu đựng cơn đói\ntrong suốt chặng đường dài."

# monologue
# JP: その駐車場の持ち主であるスーパーかなにかも撤退し、\nやがて人も車も何もかも、ここから去っていったのだろう。
2576 = "Nghĩ vậy, cùng với lòng biết ơn,\ntôi càng cảm thấy cơn đói cồn cào hơn."

# 【ポーレット】
# display as 波萊特
# JP: 「……廃線跡、やっぱりこの辺にはありませんよね」
1382 = "「Con mời cả nhà ăn ạ.」"

# monologue
# JP: 湯医線の線路を見、\nそれから周囲の地べたを見ていた青い瞳が持ち上がる。
2367 = "「Reina mời cả nhà nha.」"

# 【ポーレット】
# display as 波萊特
# JP: 「古地図だと、湯医線と連絡……直接、乗り入れしてた\n可能性、結構高そうに見えたんですけど」
1909 = "「Vâng, xin mời mọi người thưởng thức.」"

# 【双鉄】
# display as 雙鐵
