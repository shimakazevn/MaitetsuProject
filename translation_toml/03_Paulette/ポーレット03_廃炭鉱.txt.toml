[script]
# lines: 452 
# monologue
# JP: （ガタン、ゴトン――ガタン、ゴトン――）
2987 = "「Nghe an tâm quá nhỉ.」"
# monologue
# JP: 訓練ならば、ハチロクとしっかり重ねたはずだ。\nけれどそれでも、日々姫はガチガチに緊張している。
2924 = "Chúng tôi áp sát lưng vào nhau, hai cánh tay ngoắc vào nhau ở phần khuỷu tay."
# monologue
# JP: とはいえ訓練の成果は出ている。\n発車は滑りだすようだったし、加速時の振動も感じない。
2376 = "「Bắt đầu nhé~ Từ từ, từ từ thôi—— ưm…… ưm.」"
# 【れいな】
# display as 玲奈
# JP: 「制限。５０！」
2138 = "「Ồ—— ồ.」"
# 【日々姫】
# display as 日日姬
# JP: 「せ、制限、５０！　よしっ！」
2136 = "Paulette cứ thế gập nửa thân trên về phía trước, lưng tôi tì lên eo Paulette, tạo thành một đường cong."
# 【ハチロク】
# display as 八六
# JP: 「よくありません！　速度制限標識を目視すらせず、\nオウム返しをすることに意味がありますか！」
1982 = "「Lắc, lắc—— nhé—— ưm—— phù——\nThế nào, ạ?」"
# 【日々姫】
# display as 日日姬
# JP: 「あっ、ごめんっ！　慌てちゃって」
1790 = "「Ưm—— a—— đang giãn ra—— rồi—— hự—— Rất—— hiệu quả—— hự.」"
# 【ハチロク】
# display as 八六
# JP: 「慌てる必要などありません。\n今なすべきは、ひたすらに前方注視のみです」
1640 = "Được kéo giãn và thả lỏng, tôi mới cảm nhận rõ ràng. Quả nhiên là chỗ nào cũng cứng đờ hết cả."
# 【日々姫】
# display as 日日姬
# JP: 「――うん」
1357 = "Nhưng, đây có lẽ cũng là một trong những điều thú vị của chuyến đi."
# monologue
# JP: 慣れぬ\x%lキハ07;#00ffc040;キハ07%l;#;の\x%l運転台;#00ffc040;運転台%l;#;で、\n\x%l機関助士;#00ffc040;機関助士%l;#;でも\x%l機関士;#00ffc040;機関士%l;#;でもない、\x%l運転士;#00ffc040;運転士%l;#;役。
2814 = "「Ư, ưm—— cảm ơn em—— đổi chỗ, nào.」"
# monologue
# JP: ハチロクの指示に従えばいいだけと言っても、\n日々姫が動揺を隠せないのも、無理からぬ話だ。
2928 = "「A, vâng—— hây dô.」"
# 【れいな】
# display as 玲奈＆日日姬
# JP: 「制限。解除、よし！」
2137 = "Hai chân tôi chạm đất trở lại."
# 【ハチロク】
# display as 八六
# JP: 「そう。その調子です」
1986 = "Lần này đến lượt tôi gập eo,\ntừ từ nâng Paulette lên."
# monologue
# JP: 一発できっちり修正してきた。\nさすが、日々姫の――絵描きの目だ。
2539 = "（Hự—— hự hự hự——）"
# monologue
# JP: 落ち着きさえ取り戻せれば、\n目標物を、決して見逃しなどしないだろう。
2464 = "「Phù…… a—— em, cũng—— cứng đờ—— hết cả rồi, nhỉ…… ưm…… hiệu quả quá……」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁっ」
2042 = "「Đúng không.」"
# monologue
# JP: 緊張の抜ける音がする。\n僕の隣の席に座っているポーレットから。
2497 = "Vừa lắc lư nhè nhẹ, tôi vừa từ từ, từ từ gập eo sâu hơn một chút."
# 【双鉄】
# display as 雙鐵
# JP: 「一安心か？」
1961 = "「Á—— a—— ưm—— chờ—— anh Soutetsu—— ưm—— đến, giới, hạn rồi—— á!」"
# 【ポーレット】
# display as 波萊特
# JP: 「いいえ」
1632 = "「Vậy sao.」"
# monologue
# JP: が、即時に返された声は再び張り詰めている。
2401 = "（Bịch）"
# 【ポーレット】
# display as 波萊特
# JP: 「安心なんて出来ません。\n安心は、常に事故の元です」
1882 = "「Phù—— a~! Ư~, hơi quá đà một chút rồi! A nhưng mà…… ưm. Cảm giác máu lưu thông tốt hơn hẳn~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1804 = "「Oa, thích quá nha. Reina ghen tị quá đi.」"
# monologue
# JP: 正\x%l運転士;#00ffc040;運転士%l;#;を欠いた上、\n常には行わぬ術仙炭鉱廃駅停車を控えている。
2895 = "「Vậy thì lại đây. Anh kéo dãn cho Reina luôn.」"
# monologue
# JP: 僕と同様、ポーレットもおそらくは、\n\x%l運転台;#00ffc040;運転台%l;#;から一瞬たりとも目を切っていないに違いない。
2733 = "「Hả? Nhưng mà Reina làm gì có máu lưu thông đâu nha?」"
# monologue
# JP: （しかし……これは良くないかもしれんな）
2978 = "「Có dầu máy hay thứ gì đó tương tự mà. Kể cả không có, nếu cứ giữ nguyên một tư thế không cử động thì các khớp cũng sẽ bị cứng lại đấy.」"
# monologue
# JP: ここであまりに気を張られ、\n調査の方がおろそかになってはまさしく本末転倒だ。
2855 = "「Anh Soutetsu. Anh nhớ làm từ từ, nhẹ nhàng thôi nhé? Reina cũng đang được bảo dưỡng định kỳ rồi mà.」"
# monologue
# JP: かかる事態を回避するには、\n気がかりを少しでも減らすよう――ああ、そうか。
2782 = "「Ra là vậy, đúng thế thật. Nói mới nhớ, Reina còn khỏe mạnh hơn chúng ta nhiều nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。できれば日々姫に、術仙炭鉱駅への\n臨時停車の手本を見せてやってはくれぬか？」
2003 = "「Một năm một lần mà. Khám sức khỏe của chúng ta ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　でも、練習機会、この一回しかないんですよ？」
1743 = "「A, đó không phải là điều đáng mong đợi chút nào nhỉ.」"
# monologue
# JP: 全くもって正しい指摘だ。\nこの早朝の臨時\x%l列車;#00ffc040;列車%l;#;の次はもう、朝の定時の通学\x%l列車;#00ffc040;列車%l;#;。
2526 = "Một năm là quá đủ để bệnh tật âm thầm gặm nhấm cơ thể."
# monologue
# JP: ポーレットの直接指導を受けられる練習機会というのなら、\n確かにこれが、最初で最後の一回になる。が――
2651 = "Dù hiểu rõ lý thuyết là vậy, nhưng thực tế—— rất khó để xin nghỉ phép đi khám sức khỏe."
# 【日々姫】
# display as 日日姬
# JP: 「あの、私からもお願いします」
2105 = "「Chị Mayami cũng khuyên anh không chỉ khám sức khỏe định kỳ, mà còn nên đi khám tổng quát nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「けど……」
1674 = "「Khám tổng quát. Chị Mayami có đi khám không ạ?」"
# monologue
# JP: 運転台から、前方注視をはずさぬままの、日々姫の声。
2955 = "「Ừm. Nói đúng hơn là toàn bộ nhân viên chính thức của xưởng rượu Migita đều phải đi. Ngoài khám sức khỏe định kỳ, cứ hai năm một lần lại khám tổng quát.」"
# monologue
# JP: 僕には予想通りなのだが、\nポーレットは戸惑い顔で止まってしまう。
2688 = "「Phúc lợi tốt quá! Đường sắt Ohito cũng phải học tập mới được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。どうか手本を示してやってくれないか。\nなんとなれば、日々姫は、何を学ぼうとするときであれ」
2004 = "「Để mọi người đợi lâu rồi nha.」"
# monologue
# JP: \x%l運転台;#00ffc040;運転台%l;#;から、\nああ、と納得の声が聞こえる。
2577 = "Reina hớn hở leo xuống. Em ấy xoay người, quay tấm lưng đáng yêu về phía tôi."
# 【ハチロク】
# display as 八六
# JP: 「日々姫の場合は、目で……\n見て覚えるほうが早い――ですか？」
1956 = "「Anh cũng kéo dãn cho Reina nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そのとおりだ」
1984 = "「Ừm. Từ từ nhẹ nhàng——\nKéo dãn, kéo dãnnnn.」"
# monologue
# JP: 訓練を指導するうち、ハチロクも理解したのだろう。\n日々姫の学習能力は、見て[まね,1]真似ぶときにこそ冴え渡る。
2492 = "「Fufufu, cơ thể được kéo dãn ra, dễ chịu quá nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が\x%lブレーキ;#00ffc040;ブレーキ%l;#;を操作する機会など、\n無論、なければないに越したことはない」
2016 = "「Ư yuu~」"
# monologue
# JP: それはつまりは、れいなの処理落ち――居眠りが、\nポーレット不在の運転中に来てしまうということだから。
2484 = "Giọng nói ngái ngủ. Một bàn tay thò ra từ dưới chăn, tiếp đó là cái đầu ngóc lên."
# 【双鉄】
# display as 雙鐵
# JP: 「が、一度でもここで見ておけば、\n非常時の指示に対する日々姫の理解が、深くなる」
1652 = "「Hikari cũng. Hikari cũng muốn chơi.」"
# monologue
# JP: 日々姫が頷く。\n背中しか見えぬ僕にも、はっきりわかるほど強く。
2668 = "「Con dậy rồi à, Hikari. Chào buổi sáng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうあれば、定時の湯医、御一夜への停車も、\n僕らを拾う夕方の臨時停車も、安全度はより高まろう」
2087 = "「Chào buổi sáng, Hikari.\nĐi rửa mặt với mẹ nhé?」"
# 【ハチロク】
# display as 八六
# JP: 「まさに、“この一回”しか無いのです。\n日々姫が、ポーレット様を見て学ぶ機会は」
1925 = "「Bé Hikari~. Chào buổi sáng nha.」"
# 【ポーレット】
# display as 波萊特
# JP: 「……わかりました。そういうことなら」
1377 = "「Chào buổi sáng~. Hikari cũng muốn chơi~」"
# monologue
# JP: ポーレットが静かに立ち上がり、\n\x%l運転台;#00ffc040;運転台%l;#;へと進んでいく。
2756 = "「Được rồi được rồi. Reina, nhờ em nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「まず……\x%l蒸気機関車;#00ffc040;蒸気機関車%l;#;の\x%l逆転機;#00ffc040;逆転機%l;#;に相当するものが、\nこの[シフト,2]変速機レバーだと思ってください」
2150 = "「Vâng ạ, bé Hikari~」"
# monologue
# JP: 改めて見ると……\n\x%l8620;#00ffc040;8620%l;#;の\x%l運転台;#00ffc040;運転台%l;#;とは、まるで印象が違っている。
2395 = "「Hikari muốn chơi với ba cơ.」"
# monologue
# JP: どれが\x%l自弁;#00ffc040;自弁%l;#;で\x%l単弁;#00ffc040;単弁%l;#;なのか、\nそんなことすら、僕ではまるで判断できない。
2627 = "「Với ba sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ギアを切り替えるときは、\x%l運転台;#00ffc040;運転台%l;#;下――\nこのクラッチペダルを踏みます」
1696 = "Sự chênh lệch chiều cao giữa tôi và Hikari là quá lớn."
# monologue
# JP: ポーレットの足が動いて、\n同時に右手はシフトレバーを操作する。
2739 = "Nếu chỉ đơn giản là cõng trên lưng—— Thì không thể kéo dãn eo được, nhưng mà……"
# 【ポーレット】
# display as 波萊特
# JP: 「シフトを前進にいれました。\nこれで、クラッチを繋げばもう\x%l力行;#00ffc040;力行%l;#;が始まります」
1901 = "「Ba biết rồi. Lại đây.」"
# monologue
# JP: （ああ……まさしくこれこそが自然体――\n経験を積んだ、プロフェッショナルの姿なのだな）
2991 = "「Vâng! Ba kéo dãn cho con nhé?」"
# monologue
# JP: ポーレットの立ち姿、時折見える横顔が、\nなんとも言えず美しい。
2749 = "「Ba biết rồi ba biết rồi. Nào. Kéo dãn.」"
# monologue
# JP: 凛と締まっていながらも、\nひどく柔軟で、軽やかな印象だ。
2521 = "「Kéo dãn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「基本、れいなが処理落ちしたとしても、\nハチロクちゃんの指示通りで全く問題ありません」
1630 = "Vẫn nằm trên lưng tôi, con bé phấn khích đập chân thình thịch. Thôi thì…… cứ coi như đây cũng là một cách vận động đi."
# monologue
# JP: 深く、ハチロクが頷いて見せる。
2430 = "「Kyaa!」"
# monologue
# JP: 日々姫の肩が小さく動き、\nほっと安堵の息を吐いたと、伝わってくる。
2672 = "「Xong! Kết thúc.\nCon đi rửa mặt với mẹ đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「けれど、物凄く低い確率で、日々姫ちゃんが\n自分の判断で\x%lブレーキ;#00ffc040;ブレーキ%l;#;をかけるケースも、ありえます」
1653 = "「Vâng ạ!」"
# 【双鉄】
# display as 雙鐵＆八六
# JP: 「っ！」
2154 = "「Ừm! Trả lời ngoan lắm. Vậy, mẹ con em đi một lát nhé.」"
# monologue
# JP: 確かに、だ。\n僕らは全く、考慮しようともしていなかったが――
2796 = "「Ừ, khi nào hai người quay lại thì đổi chỗ nhé.」"
# monologue
# JP: れいなの処理落ちと同時に、ハチロクがアクシデントに\n見舞われてしまう可能性も、ゼロではないのだ。
2489 = "「Chăn đệm tính sao đây ạ? Có cần cất đi không nha?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そういうときは、迷わず、慌てず、こうしてください」
1840 = "「Có lẽ vậy. Dù sao cũng không ngủ lại nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「あ！」
1779 = "「Vâng ạ.」"
# monologue
# JP: ノッチとおぼしきハンドルを戻し、クラッチを切って、\nシフトオフ。\x%lブレーキ;#00ffc040;ブレーキ%l;#;ハンドルに力を加える。
2550 = "Cứ để nguyên chăn đệm làm ghế sofa cũng được, nhưng có Hikari ở đây."
# monologue
# JP: \x%lブレーキ;#00ffc040;ブレーキ%l;#;にかかった\x%l圧;#00ffc040;圧%l;#;は当然ながら、\n徐々に\x%l列車;#00ffc040;列車%l;#;の速度を落とし――やがて静止へと至らせる。
2442 = "Nếu tạo tiền lệ dùng chăn đệm làm ghế sofa, có thể sẽ ảnh hưởng xấu đến việc giáo dục con bé sau này."
# 【日々姫】
# display as 日日姬
# JP: 「えっ！？　なんで――\nここ、駅でも廃駅でもなんでもないのに」
1738 = "「Bao trọn gói~ Bao trọn gói~! Cả hành lang và phòng rửa mặt đều được bao trọn gói!」"
# 【ハチロク】
# display as 八六
# JP: 「非常時にはこれをやればいい、というお手本です」
2086 = "「Ồ, thế thì tốt quá rồi.」"
# monologue
# JP: 感心しきり。\nハチロクの声音がそう言っている。
2432 = "「Anh Soutetsu và mọi người cũng đi luôn đi ạ. Khoảng 30 phút nữa là đông lắm đấy.」"
# 【ハチロク】
# display as 八六
# JP: 「わたくしたちが乗っている以上、\x%l8620;#00ffc040;8620%l;#;は走行しない。\nこの全線が、\x%lキハ07;#00ffc040;キハ07%l;#;の\x%l閉塞;#00ffc040;[へいそく,1]閉塞%l;#;・専有区間となるのですから」
1728 = "「Anh biết rồi. Đi thôi, Reina.」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1779 = "「啊！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「停止をしたら、[て]手\x%lブレーキ;#00ffc040;ブレーキ%l;#;もかけてください」
2031 = "「Vâng ạ. Bọn em đi nhé~」"
# monologue
# JP: ポーレットの手が、\n\x%l舵輪;#00ffc040;舵輪%l;#;のような大きな鉄輪をぐるぐる回す。
2752 = "「Chị Reina, bái bai!」"
# 【ポーレット】
# display as 波萊特
# JP: 「これで、安全に停車出来てますから――電話で、\n早瀬さん。もしくは、真闇さんに救援を求めてください」
2088 = "Nhanh chóng nhưng cẩn thận, tôi rửa mặt, cạo râu, vuốt nước chải lại tóc tai."
# monologue
# JP: 早瀬さん、はこの場合、ふかみではなく、\nふかみの祖父達――堰さんたちだ。
2674 = "「Ừm. Thế này là ổn rồi.」"
# monologue
# JP: あの方達ならガソリン車を出すことが可能だし、\n真闇姉なら、常に最善の対処を考えてくれるはずだ。
2400 = "「Reina cũng rửa mặt xong rồi nha.」"
# 【日々姫】
# display as 日日姬
# JP: 「でも、電波の届かないところだったら？」
2127 = "Hai bồn rửa mặt nằm cạnh nhau. Từ bên cạnh, giọng nói thanh bình của Reina vang lên."
# 【ポーレット】
# display as 波萊特
# JP: 「よほどの悪天候でも無い限り、湯医線沿線で\n電波が通じないのは、術仙炭鉱廃駅付近だけです」
1723 = "「Vậy chúng ta về thôi.」"
# monologue
# JP: 今日の天気は快晴だ。\n車窓から見渡す空には、雲のひとつも見えはしない。
2388 = "「Vâng ạ.」"
# monologue
# JP: 夕立程度はあるかもしれんが、\nこれから数時間の間に、そう極端な大崩れはしないだろう。
2921 = "Đi ngược lại lối đi, chúng tôi đi ngang qua những người vừa thức dậy."
# 【双鉄】
# display as 雙鐵
# JP: 「つまりその場合、術仙炭鉱廃駅付近での非常停車時には、\n日々姫が、廃駅まで歩けばいいだけの話になるのか」
1656 = "Quả nhiên, đúng như lời Paulette nói, chỉ chậm hơn mười phút thôi là đã——"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。そこで待って、戻ってくるわたし達と合流すれば、\nわたしの運転で、御一夜駅まで持っていけますから」
1944 = "「Paulette ra dáng làm mẹ lắm rồi nha. Chứ như thế này, bé Hikari sẽ sợ hãi lắm nha.」"
# monologue
# JP: ポーレットの一言一言が、\n不安を解いてくれるのだろう。
2748 = "Tôi gật đầu đồng tình sâu sắc với giọng nói đầy cảm xúc của Reina."
# monologue
# JP: 日々姫の顔は頷くたびに、\n少しずつ柔らかになっていく。
2670 = "「Đúng vậy. Cứ liên quan đến Hikari và chuyến du lịch bằng tàu hỏa, Paulette lại trở nên đáng tin cậy hơn hẳn ngày thường.」"
# 【日々姫】
# display as 日日姬
# JP: 「うん。わかった――わかりました」
1803 = "「Đúng thế nha. Hôm nay Paulette không vướng bận công việc, nên đang hấp thụ đầy đủ sắt và khói đó nha.」"
# monologue
# JP: 深刻なトラブル時には止まれば良い。\nそれで安全が確保できる。
2794 = "「Hửm? ……Sắt là đường sắt thì anh hiểu rồi, nhưng khói là sao?」"
# monologue
# JP: 明快すぎる指針によって、\nどこか縮んでいた日々姫の体も、楽になる。
2817 = "「Fufufu, cái đó là nha.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら、お手本はこれでおしまいで大丈夫？」
2111 = "（Tuúúúúúúúúúúú!）"
# 【日々姫】
# display as 日日姬
# JP: 「うんっ！　あ、はい。\nありがとうございました！」
1805 = "Ái chà, vào hầm rồi sao.\nCó chút mùi khói—— á!"
# 【ポーレット】
# display as 波萊特
# JP: 「どういたしまして」
1645 = "「Anh hiểu rồi. Khói ở đây là mùi khói tàu đúng không.」"
# monologue
# JP: 軽やかに笑い、ポーレットがハンドル達から手を離す。\nそれをそのまま、日々姫は自分の手の中に。
2742 = "「Chính xác nha.」"
# monologue
# JP: （ああ――）
2992 = "「Em chơi chữ giỏi đấy.」"
# monologue
# JP: 力みが、まるで消えている。
2438 = "Có vẻ như sắt và khói cũng có tác dụng cực kỳ lớn đối với Reina."
# monologue
# JP: たったこれだけの指導によって、\n日々姫は内面だけでなく、その姿勢をも変えられた。
2702 = "「……Giá như Hikari cũng hấp thụ thật nhiều sắt và khói, để cải thiện chứng sợ người lạ dù chỉ một chút thì tốt biết mấy.」"
# monologue
# JP: （見違えたな。適切な指導――いや、“見本”があれば、\n日々姫はここまで、目で学び得るのか）
2981 = "「Không sao đâu, chắc chắn sẽ được mà nha.」"
# monologue
# JP: “健やか”という言葉が浮かぶ、立ち姿。\nれいなの安全確認を受け、日々姫はスっと手を伸ばす。
2522 = "「Á.」"
# 【日々姫】
# display as 日日姬
# JP: 「出発！　進行！」
1691 = "「Mừng mọi người đã về~」"
# 【日々姫】
# display as 日日姬
# JP: 「それじゃ、兄さん、ポーレットさん、気をつけて！」
1749 = "Ngay khi chúng tôi vừa quay lại giường nằm, Hikari đã tươi cười chào đón."
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、行ってくる」
1811 = "「Fufufu, sảng khoái quá nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「日々姫ちゃんも。どうか、安全第一で」
1922 = "「Hikari cũng sảng khoái! Sảng khoái xong là đói bụng luôn~」"
# 【日々姫】
# display as 日日姬
# JP: 「はい！」
1807 = "「Vậy thì chúng ta ăn sáng nhé.」"
# monologue
# JP: （プォンっ！）
3004 = "Như thể đã đoán trước được tình huống này, Paulette đã bắt đầu mở giỏ đồ ăn ra."
# monologue
# JP: \x%lタイフォン;#00ffc040;タイフォン%l;#;を軽快に響かせて、\n僕らをおろした\x%lキハ07;#00ffc040;キハ07%l;#;が走り去っていく。
75 = "「Em chuẩn bị cả phần ăn sáng nữa à.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さて、と」
1834 = "「Tất nhiên rồi ạ. Mặc dù chỉ là đồ ăn đơn giản thôi, bánh mì baguette, giăm bông và xà lách. Em định làm bánh mì kẹp mở.」"
# monologue
# JP: ……これほどに鉄道好きのポーレットが、\n何故この廃駅には、さほどの興味をもたなかったか――
1340 = "「Có cả mayonnaise và hồng trà trong bình giữ nhiệt nữa nha.」"
# monologue
# JP: 些か疑問を感じていたが、\n駅舎の外から実物を、間近に見れば理由がわかる。
2624 = "「Hikari thích nước ép cơ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「これが、術仙炭鉱廃駅か」
2083 = "「Fufufu, được rồi, nước ép cà chua nhé.」"
# monologue
# JP: ……一言で言えば風情が無い。\n風情の他も、何も無い。
1330 = "「Cà chua!? Cà chua á.\nHikari thích nước ép ngọt cơ~」"
# monologue
# JP: 廃駅舎だけにとどまらず、\nその周囲にも――何も、残っているものはない。
2368 = "「Tiếc quá! Nước ép ngọt hiện tại đã bán hết rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……栄えてはいたのだろうがな」
1383 = "「Bán hết rồi. Bán hết rồi thì đành chịu vậy~」"
# monologue
# JP: 駐車場跡地になっているということは、\n廃駅になったそのあとも、都市機能はあったということだ。
2654 = "Nếu tôi đi một mình trên chuyến tàu không có xe đẩy bán hàng này, chắc chắn tôi sẽ phải chịu đựng cơn đói trong suốt chặng đường dài."
# monologue
# JP: その駐車場の持ち主であるスーパーかなにかも撤退し、\nやがて人も車も何もかも、ここから去っていったのだろう。
2576 = "Nghĩ vậy, cùng với lòng biết ơn, tôi càng cảm thấy cơn đói cồn cào hơn."
# 【ポーレット】
# display as 波萊特
# JP: 「……廃線跡、やっぱりこの辺にはありませんよね」
1382 = "「Con mời cả nhà ăn ạ.」"
# monologue
# JP: 湯医線の線路を見、\nそれから周囲の地べたを見ていた青い瞳が持ち上がる。
2367 = "「Reina mời cả nhà nha.」"
# 【ポーレット】
# display as 波萊特
# JP: 「古地図だと、湯医線と連絡……直接、乗り入れしてた\n可能性、結構高そうに見えたんですけど」
1909 = "「Vâng, xin mời mọi người thưởng thức.」"
# 【双鉄】
# display as 雙鐵
# JP: 「廃線跡というのは、どのように見つけるものなのだ？」
2045 = "「Anh ăn đây.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしが好きなのは、生きてる鉄道ですから……\nあんまり、良くはわからないんですけど」
1889 = "Chẳng có gì đặc biệt, bánh mì baguette thậm chí còn chưa được nướng, một chiếc bánh mì kẹp mở có vẻ như xuất hiện trong bữa sáng vội vã của một gã độc thân."
# monologue
# JP: 言いながら、ポーレットは湯医線の本線を指す。
2743 = "「（Ngoạm）」"
# 【ポーレット】
# display as 波萊特
# JP: 「連絡してたならその痕跡があるかなぁって――\nでも、それっぽいものは全然です」
1885 = "——Nhưng mà, ngon thật. Giăm bông, mayonnaise và bánh mì baguette."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、連絡をしていなかった場合には？」
2131 = "Vị mặn mặn vô cùng đơn giản, lan tỏa khắp khoang miệng, lan tỏa khắp cơ thể."
# 【ポーレット】
# display as 波萊特
# JP: 「その場合は、\x%l貨車;#00ffc040;貨車%l;#;からの荷降ろしとか、\nコンテナの積み替えとかをするための空間と設備――」
2117 = "「Món này—— ngon thật đấy. Em dùng loại giăm bông thượng hạng à?」"
# monologue
# JP: 設備はまるで見当たらないが、\n空間であれば、有り余っている。
2405 = "「Fufufu.\nGiống hệt loại nhà mình hay dùng thôi ạ?」"
# monologue
# JP: あまりに有り余り過ぎていて、\nどこをどう見ればいいのか、途方にくれる。
2898 = "「Ngon quá!」"
# 【ポーレット】
# display as 波萊特
# JP: 「あとはもちろん、線路の痕跡。多分……\n残ってる可能性が高いのは\x%lバラスト;#00ffc040;バラスト%l;#;かなって思います」
2010 = "「A, không được. Để anh đính chính lại. 『Món này ngon thật đấy, Paulette』」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、\x%lバラスト;#00ffc040;バラスト%l;#;か――」
1758 = "Vừa nói tôi vừa chăm chú nhìn Hikari, con bé vội vàng nuốt miếng bánh mì vừa cắn dở và mỉm cười."
# monologue
# JP: 周囲に見当たらぬのであれば、\n歩いて探していく他に無い。
2856 = "（Nếu xung quanh không thấy, thì chỉ còn cách đi bộ tìm thôi.）"
# monologue
# JP: 遠足組の話では、ほど近くに在るということだった、\n宿舎跡をまずは、目指して見よう。
2690 = "Theo như lời nhóm đi dã ngoại kể lại thì nó nằm ở khá gần đây, trước tiên cứ nhắm tới khu di tích ký túc xá xem sao."
# 【双鉄】
# display as 雙鐵
# JP: 「大量に使うものだしな。\n完全に処理するのは、確かに面倒そうだ」
2015 = "「Vì là thứ được sử dụng với số lượng lớn mà. Muốn xử lý hoàn toàn chắc chắn sẽ rất phiền phức.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。それとレールや\x%l枕木;#00ffc040;枕木%l;#;は、\n再利用の価値が高いですから」
1948 = "「Vâng. Hơn nữa đường ray và \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#;, có giá trị tái sử dụng rất cao ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l枕木;#00ffc040;枕木%l;#;？」
1355 = "「\\x%l枕木;#00ffc040;Tà vẹt đường ray%l;#; á?」"
# monologue
# JP: レールは鉄だ。\n再利用の価値が高いのは当然だろう。が――
2912 = "Đường ray làm bằng sắt. Giá trị tái sử dụng cao là chuyện đương nhiên. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l枕木;#00ffc040;枕木%l;#;を、どう再利用するのだ？\nあれほど汚れてしまう木材なのに」
1354 = "「\\x%l枕木;#00ffc040;Tà vẹt đường ray%l;#; thì tái sử dụng kiểu gì? Khối gỗ đó bẩn đến mức đấy cơ mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「園芸の……\n庭造りとかの、アクセントにするんだそうです」
1669 = "「Nghe nói người ta dùng nó làm điểm nhấn cho... việc làm vườn hay xây dựng cảnh quan sân vườn đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「園芸に、庭造り」
1816 = "「Làm vườn, cảnh quan sân vườn á.」"
# monologue
# JP: まるで興味が無い世界だということもあろうが、\nどうも、イメージが掴めない。
2926 = "Có lẽ vì đó là một thế giới mà tôi hoàn toàn không có hứng thú, nên tôi không tài nào hình dung ra được."
# 【双鉄】
# display as 雙鐵
# JP: 「庭に線路でも敷くのか？」
2144 = "「Định lát cả đường ray trong sân vườn luôn sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そういう人も居ますよ？\nミニＳＬを自宅のお庭で走らせちゃう！　みたいな」
1658 = "「Cũng có những người như vậy đó anh? Kiểu như tự cho chạy cả một chiếc SL mini ngay trong sân nhà mình luôn!」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――なんとも凄いな」
2130 = "「Thế thì——đúng là đỉnh thật.」"
# 【ポーレット】
# display as 波萊特
# JP: 「\x%lまいてつ;#00ffc040;まいてつ%l;#;とは違う凄みですよね。\n車輌も駅も線路も全部、自分ひとりで作っちゃう」
1661 = "「Một sự lợi hại khác hẳn với \\x%lまいてつ;#00ffc040;Chủ tàu%l;#; anh nhỉ. Từ toa xe, nhà ga cho đến đường ray, tất cả đều do một tay họ tự làm hết.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ならば、\x%l枕木;#00ffc040;枕木%l;#;も相当に使うのか」
1705 = "「Ra là vậy, nếu thế thì, cũng phải dùng khá nhiều \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#; nhỉ.」"
# monologue
# JP: 納得すれば、\nしかしぶんぶん、ポーレットは首を横に振る。
2643 = "Tôi vừa gật gù,\nthì Paulette lại lắc đầu nguầy nguậy."
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　あの、それも多分そうですけど、\nでも、違うんです。普通の、お庭の、\x%l枕木;#00ffc040;枕木%l;#;は」
1777 = "「A! Dạ, có lẽ cũng có trường hợp như vậy, nhưng mà, không phải đâu ạ. \\x%l枕木;#00ffc040;Tà vẹt đường ray%l;#; trong sân vườn thông thường thì,」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1765 = "「Hửm?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そういうのじゃなくて、\x%l枕木;#00ffc040;枕木%l;#;は庭造りの資材に――\n敷石の代わりとか、ウッドデッキとか塀とかにするって」
1687 = "「Không phải kiểu đó đâu, \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#; được dùng làm vật liệu xây dựng sân vườn—— người ta bảo là dùng thay cho đá lát, làm sàn gỗ ngoài trời hay hàng rào cơ ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん。\nなんとなくイメージできてきたぞ」
1772 = "「À…… ừm.\nAnh cũng lờ mờ hình dung ra được rồi.」"
# monologue
# JP: 青々とした芝生の庭に、\n敷石代わりの\x%l枕木;#00ffc040;枕木%l;#;が、規則正しく連なっている。
2836 = "Trên khu vườn cỏ xanh mướt, những thanh \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#; dùng thay cho đá lát được xếp nối tiếp nhau một cách có quy luật."
# monologue
# JP: 埋める深さで高さを変えた\x%l枕木;#00ffc040;枕木%l;#;たちで、\n枯木の風合いをそのまま活かした塀を作る――
2552 = "Bằng cách chôn \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#; với độ sâu khác nhau để tạo độ cao thấp, người ta tạo ra một bức tường rào tận dụng nguyên vẹn vẻ đẹp của gỗ mục——"
# 【双鉄】
# display as 雙鐵
# JP: 「それは確かに、かなり雰囲気が良さそうだ」
2019 = "「Thế thì đúng là, bầu không khí có vẻ khá tuyệt đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。わたしも、ちょっと憧れちゃいます」
1985 = "「Đúng không ạ. Em cũng, có chút ngưỡng mộ rồi đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。ポーレットは園芸にも興味があるのか？」
1753 = "「Ồ. Paulette cũng có hứng thú với làm vườn sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、庭造りの方じゃなく――って――――」
1784 = "「A, không phải là về việc xây dựng cảnh quan sân vườn đâu——ơ――――」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　――っと！」
1857 = "「Sao thế? ——Đây là!」"
# monologue
# JP: 曲がりくねった坂道の上、\nいきなり、それは現れる。
2598 = "Trên con dốc quanh co,\nđột nhiên, thứ đó hiện ra."
# 【双鉄】
# display as 雙鐵
# JP: 「これが――みんなの言っていた……」
2080 = "「Đây là——thứ mà mọi người đã nhắc đến……」"
# 【ポーレット】
# display as 波萊特
# JP: 「ゴーストタウン……\n森に、のみこまれている町、ですか」
2152 = "「Thị trấn ma…… một thị trấn bị nuốt chửng bởi khu rừng, phải không ạ.」"
# monologue
# JP: これは――凄い。\n植物の、自然の強さを思い知る。
2893 = "Thứ này——thật khủng khiếp. Nó cho tôi thấy rõ sức mạnh của thực vật, của thiên nhiên."
# monologue
# JP: 人がいっとき、いかに繁栄しようとも、\n忍耐強く、自然は逆転の時を待って――勝つ。
2556 = "Cho dù con người có từng phồn vinh đến đâu đi chăng nữa, thiên nhiên vẫn kiên nhẫn chờ đợi thời cơ đảo ngược tình thế——và giành chiến thắng."
# 【ポーレット】
# display as 波萊特
# JP: 「宿舎、だったんですよね、ここ」
2090 = "「Nơi này, từng là ký túc xá anh nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1765 = "「唔？」" 
# 【ポーレット】
# display as 波萊特
# JP: 「こんなにたくさんの宿舎が必要なほど――\n多くの人が、この炭鉱で働いていたんですよね」
1912 = "「Cần đến nhiều ký túc xá thế này—— chứng tỏ đã từng có rất nhiều người làm việc ở mỏ than này anh nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1930 = "「Ừ——」"
# monologue
# JP: そうか。\nそうなのだ。
2680 = "Ra là vậy.\nĐúng là như vậy."
# monologue
# JP: この過去は、この痕跡は。\n御一夜の未来を映す鏡であるとも見れるのだ。
2892 = "Quá khứ này, những dấu tích này. Cũng có thể coi là tấm gương phản chiếu tương lai của Ohimitera."
# 【双鉄】
# display as 雙鐵
# JP: 「それほどまでの隆盛を極め――しかし、\n石炭需要の低減により、無人の廃墟と化してしまった」
2089 = "「Đã từng đạt đến đỉnh cao phồn thịnh như vậy——thế nhưng, do nhu cầu về than giảm sút, nó đã hóa thành một đống đổ nát không người.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ゼロじゃありませんよね。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;にだって、同じことが起きる可能性」
1351 = "「Khả năng đó không phải là con số không anh nhỉ. Ngay cả với \\x%lエアクラ;#00ffc040;Aircra%l;#;, cũng có thể xảy ra điều tương tự.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1935 = "「Đúng vậy.」"
# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;以前には、\n鉄道が、ガソリン自動車が人々の交通を支えていた。
2490 = "Trước khi có \\x%lエアクラ;#00ffc040;Aircra%l;#;, đường sắt và ô tô chạy xăng đã chống đỡ cho giao thông của con người."
# monologue
# JP: しかし今、\nそのどちらもが、青息吐息だ。
2786 = "Nhưng hiện tại,\ncả hai đều đang thoi thóp."
# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;に勝る交通手段が誕生すれば、\nそれはいずれ、\x%lエアクラ;#00ffc040;エアクラ%l;#;を駆逐していくだろう」
1624 = "「Nếu một phương tiện giao thông vượt trội hơn \\x%lエアクラ;#00ffc040;Aircra%l;#; ra đời, thì sớm muộn gì nó cũng sẽ đánh bật \\x%lエアクラ;#00ffc040;Aircra%l;#; thôi.」"
# monologue
# JP: 十年後か、百年後か、一千年後かはわからんが――
2920 = "Dù không biết là mười năm sau, một trăm năm sau, hay một ngàn năm sau——"
# monologue
# JP: 人間が人間として歩みを重ねていく限り、\nその日はいつか。いつか必ずやってくる。
2462 = "Chừng nào con người vẫn còn tiếp bước với tư cách là con người, thì ngày đó, một lúc nào đó chắc chắn sẽ đến."
# 【ポーレット】
# display as 波萊特
# JP: 「……御一夜にずっと暮らしている人たちは、\nこの景色、絶対に知ってる筈なのに――どうして」
1368 = "「……Những người luôn sống ở Ohimitera, chắc chắn phải biết đến cảnh tượng này chứ——vậy mà tại sao.」"
# monologue
# JP: どうして、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に賛成してしまうのか。
2783 = "Tại sao, họ lại tán thành việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; chứ."
# monologue
# JP: 途中で呑まれたその問いに、\nそれでも、僕は答えてしまう。
2516 = "Câu hỏi bị nuốt lại giữa chừng đó, dù vậy, tôi vẫn trả lời."
# 【双鉄】
# display as 雙鐵
# JP: 「規模があまりに大きすぎ、現実感を得られない。\nこの光景が日常の延長にあると、とても実感できんのだ」
2050 = "「Vì quy mô quá lớn, nên không mang lại cảm giác chân thực. Rất khó để cảm nhận được cảnh tượng này là một phần nối dài của cuộc sống thường nhật.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1747 = "「Hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「くだらぬ言葉遊びのようになってしまうが……\n例えば日々姫には、この光景はまさに『絵』なのだ」
2140 = "「Nói ra thì hơi giống trò chơi chữ vô bổ nhưng mà…… Ví dụ với Hibiki, cảnh tượng này thực sự chỉ là một bức 『tranh』.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1766 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が特別なわけじゃない。僕も圧倒されてしまって、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場のことと、言われるまでは重ならなかった」
1637 = "「Không phải vì Hibiki đặc biệt đâu. Anh cũng bị choáng ngợp, cho đến khi em nói, anh cũng chẳng liên hệ nó với nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そう……なんですね。\nだから、みんな」
1959 = "「Ra là…… vậy sao.\nThảo nào, mọi người.」"
# monologue
# JP: “伝わったな”と感じれば、\nそれはすぐさま、ポーレットへの新たな理解へと変わる。
2466 = "Ngay khi tôi cảm thấy \"đã truyền đạt được rồi\", điều đó lập tức biến thành một sự thấu hiểu mới về Paulette."
# monologue
# JP: （やはりポーレットは……\n政治家としても、卓越した素質を持っているのだ）
3000 = "（Quả nhiên Paulette…… với tư cách là một chính trị gia, em ấy cũng sở hữu tố chất xuất chúng.）"
# monologue
# JP: が、稀有な素質を、直観力を。鉄道面でも政治面でも、\n今のポーレットは活かしきれていない。
2410 = "Thế nhưng, những tố chất hiếm có, cùng trực giác nhạy bén đó. Cả trên phương diện đường sắt lẫn chính trị, Paulette hiện tại vẫn chưa thể phát huy hết được."
# monologue
# JP: 『わかる』『見える』その感覚が明快すぎて、\n『わからない』『見えない』への想像力が働かんのだろう。
2483 = "Cảm giác 『hiểu』 và 『nhìn thấu』 của em ấy quá đỗi rõ ràng, nên có lẽ trí tưởng tượng không thể với tới những người 『không hiểu』 và 『không nhìn thấu』 được."
# 【双鉄】
# display as 雙鐵
# JP: 「“みんな”と、ポーレットとの感じ方の違い。\nそれこそ恐らく、リーダーの資質というものだ」
2002 = "「Sự khác biệt trong cách cảm nhận giữa \"mọi người\" và Paulette. Đó có lẽ chính là thứ gọi là tố chất của một nhà lãnh đạo đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　わたしっ、そんなっ」
1740 = "「Hả!? Em, em á, làm gì có chuyện đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の目は、この光景に美を見出した。\nポーレットの目は、この光景に教訓を見た」
1926 = "「Đôi mắt của Hibiki đã tìm thấy cái đẹp trong cảnh tượng này. Còn đôi mắt của Paulette, lại nhìn thấy bài học từ nó.」"
# monologue
# JP: 同じ場所に居、同じ光景をその目に映し、\nけれども人は、実にさまざまなものを“見る”。
2872 = "Đứng ở cùng một nơi, cùng phản chiếu một cảnh tượng trong mắt, thế nhưng con người lại \"nhìn\" ra những thứ thực sự rất khác nhau."
# monologue
# JP: その目が何を見るかがつまり、その人間の、\n適正なのかもしれないと、ふっと感じる。
2590 = "Tôi chợt cảm thấy, đôi mắt ấy nhìn thấy điều gì, có lẽ cũng chính là sự phù hợp của người đó."
# 【双鉄】
# display as 雙鐵
# JP: 「その教訓は、他の者には見いだし難い。\nならば、それこそポーレットの持つ資質なのだ」
1684 = "「Bài học đó, những người khác rất khó để nhận ra. Nếu vậy, đó chính là tố chất mà Paulette sở hữu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「けど――もしもそうだとしても」
1673 = "「Nhưng mà——cho dù có là vậy đi nữa.」"
# monologue
# JP: 険しい光が。\nその青い瞳に宿るところを、初めて目にする。
2641 = "Ánh nhìn gay gắt. Lần đầu tiên tôi thấy nó hiện lên trong đôi mắt xanh thẳm ấy."
# monologue
# JP: それを溶かそうとするかのように、\nぐうっと、ポーレットは顔を空へと向ける。
2824 = "Như thể muốn làm tan chảy ánh nhìn đó, Paulette từ từ ngước mặt lên bầu trời."
# 【ポーレット】
# display as 波萊特
# JP: 「私が見つけた教訓に、\n誰も、耳を傾けてくれないなら」
1670 = "「Nếu bài học mà em tìm ra, chẳng có ai chịu lắng nghe thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「伝わらないのは、単に伝え方の問題だろう。\nそれを一緒に、改善していけばいいだけだ」
1838 = "「Việc không truyền đạt được, đơn giản chỉ là vấn đề ở cách truyền đạt thôi. Chỉ cần chúng ta cùng nhau cải thiện điều đó là được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「――！」
1359 = "「——!」"
# monologue
# JP: 雷にでも打たれたように、\nポーレットが目をまんまるくする。
2738 = "Như thể bị sét đánh trúng, Paulette mở to tròn hai mắt."
# monologue
# JP: 頬まで徐々に紅潮させて、\nじいっと僕を見つめてくる。
2931 = "Đôi má dần dần ửng đỏ,\nem ấy nhìn tôi chằm chằm."
# 【双鉄】
# display as 雙鐵
# JP: 「かつて、日々姫の絵によって、\n“赤は赤い”と、教えてもらったことがある」
1664 = "「Trước đây, thông qua bức tranh của Hibiki, anh đã từng được dạy rằng \"Màu đỏ rất đỏ\".」"
# monologue
# JP: その経験を話してみれば、\nポーレットはぶんぶんと、何度も何度も強く頷く。
2827 = "Khi tôi kể lại trải nghiệm đó, Paulette gật đầu lia lịa, gật đi gật lại thật mạnh nhiều lần."
# 【双鉄】
# display as 雙鐵
# JP: 「この件は、直接的に\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に関わる問題だ。\n日々姫が知恵を貸してくれるかはわからん、が――」
2077 = "「Vụ này là vấn đề liên quan trực tiếp đến việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;. Anh không biết liệu Hibiki có chịu cho mượn chất xám không, nhưng——」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたし頑張れます。双鉄くんが一緒なら！\n伝え方、伝わるように、どんなにだって工夫します」
1725 = "「Em sẽ cố gắng ạ. Chỉ cần có anh Soutetsu ở bên! Cách truyền đạt, để có thể truyền đạt được, dù thế nào em cũng sẽ nghĩ cách.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1804 = "「嗯」" 
# monologue
# JP: たとえ日々姫がそこまでは協力してくれずとも、\n真闇姉も、凪もふかみもいてくれる。
2555 = "Cho dù Hibiki không hợp tác đến mức đó đi chăng nữa, chúng tôi vẫn còn có chị Mayami, Nagi và cả Fukami."
# monologue
# JP: 日々姫の心を動かすようにもしも伝えることができたら、\nそれは恐らく、多くに伝わるものともなろう。
2545 = "Nếu có thể truyền đạt sao cho lay động được trái tim của Hibiki, thì có lẽ, điều đó cũng sẽ truyền đạt được tới rất nhiều người."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、出来ることからやろう。\n今日は、カメラを持ってきているのだよな？」
2110 = "「Nếu vậy, hãy bắt đầu từ những việc có thể làm đi. Hôm nay, em có mang theo máy ảnh đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。記録の必要があるかと思って。\nあの――邪魔じゃなければ、双鉄くんの分も」
1947 = "「Vâng ạ. Em nghĩ là cần phải ghi chép lại. Dạ——nếu không phiền thì, em có chuẩn bị cả phần của anh Soutetsu nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1754 = "「Ồ.」"
# monologue
# JP: 自分が写真を撮るなどと、思ったこともなかったが、\n手を貸すと決めた以上は、なんであれ行うべきだろう。
2922 = "Tôi chưa bao giờ nghĩ đến việc tự mình chụp ảnh, nhưng một khi đã quyết định giúp một tay, thì việc gì cũng nên làm."
# 【双鉄】
# display as 雙鐵
# JP: 「まるで経験が無いので、簡単なものだと助かるが――」
1890 = "「Anh hoàn toàn không có kinh nghiệm gì đâu, nên nếu là loại đơn giản thì tốt quá——」"
# 【ポーレット】
# display as 波萊特
# JP: 「任せてください！　パパ、マニアでしたから」
1703 = "「Cứ giao cho em! Ba em, từng là dân đam mê máy ảnh mà.」"
# monologue
# JP: ポーレットが提げたバッグから、\nカメラがふたつ、取り出される。
2741 = "Từ chiếc túi mà Paulette xách theo, hai chiếc máy ảnh được lấy ra."
# monologue
# JP: 片方は、一眼レフ――でいいのだろうか？\nひどく重厚で、レバーやボタンが数多い。が――
2361 = "Một chiếc là máy ảnh phản xạ ống kính đơn——chắc vậy nhỉ? Trông cực kỳ đồ sộ, có vô số cần gạt và nút bấm. Nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、\nこちらの小さなものは見るからに簡単そうだな」
1707 = "「Ra là vậy, chiếc nhỏ này thoạt nhìn có vẻ dễ sử dụng đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、全部自動でやってくれますから。\nまず、電源をいれて――」
1954 = "「Vâng, nó sẽ tự động làm hết mọi thứ cho anh ạ. Đầu tiên, anh bật nguồn lên——」"
# monologue
# JP: ポーレットが僕のすぐ脇にたつ。\nカメラのうしろのディスプレイをふたりで覗き込む。
2750 = "Paulette đứng ngay sát bên cạnh tôi. Hai chúng tôi cùng ghé mắt nhìn vào màn hình phía sau máy ảnh."
# monologue
# JP: ……頬が、近い。\nちょっと動けば、すぐにも触れてしまいそうだ。
1342 = "……Má em ấy, gần quá. Chỉ cần nhúc nhích một chút thôi là có thể chạm vào ngay lập tức."
# 【ポーレット】
# display as 波萊特
# JP: 「ここに映った映像が、そのまま写真になりますから。\nこのレバーで、ズームしたりワイドにしたりして……」
1906 = "「Hình ảnh hiển thị ở đây sẽ trở thành bức ảnh luôn đó ạ. Dùng cần gạt này để phóng to hoặc thu nhỏ góc chụp……」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1755 = "「Ừm.」"
# monologue
# JP: 僕に話しかけるとき、\nポーレットは律儀なまでにこちらを向く。
2476 = "Mỗi khi nói chuyện với tôi, Paulette luôn quay sang nhìn tôi một cách vô cùng nghiêm túc."
# monologue
# JP: かかってくる息がほの暖かで、くすぐったい。
2528 = "Hơi thở phả tới mang theo chút ấm áp, khiến tôi thấy nhột nhột."
# 【ポーレット】
# display as 波萊特
# JP: 「それで、撮りたい画面を決めたら、\nシャッターボタンを押してあげれば――」
2012 = "「Rồi, sau khi đã quyết định được khung hình muốn chụp, anh chỉ cần nhấn nút chụp là——」"
# monologue
# JP: （ピピピっ……カシャッ！）
2996 = "（Bíp bíp bíp…… Tách!）"
# 【双鉄】
# display as 雙鐵
# JP: 「む？　今のでもう撮れたのか？」
1764 = "「Hửm? Vừa rồi là chụp xong rồi à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、何千枚でもカードに記録できますから。\n失敗でも何でも、かまわずどんどん撮っちゃって下さい」
1955 = "「Vâng, thẻ nhớ có thể lưu được hàng nghìn tấm ảnh lận. Nên dù có hỏng hay gì đi nữa, anh cứ thoải mái chụp thật nhiều vào nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2026 = "「Anh hiểu rồi.」"
# monologue
# JP: ポーレットの手からカメラを受け取る。\nわずかに触れる指先は、息よりもなお温かい。
2611 = "Tôi nhận lấy chiếc máy ảnh từ tay Paulette. Đầu ngón tay khẽ chạm vào nhau, còn ấm hơn cả hơi thở của em ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「一枚、撮ってみてもいいか？」
1894 = "「Anh chụp thử một tấm được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「一枚といわず、何百枚でも！」
1698 = "「Đừng nói là một tấm, hàng trăm tấm cũng được ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「とりあえずは、試しの一枚でいい」
2039 = "「Tạm thời, cứ chụp thử một tấm đã.」"
# monologue
# JP: カメラを構える。\nモニターの中、ポーレットが驚きに顔を硬くする。
2632 = "Tôi giơ máy ảnh lên. Trong màn hình, khuôn mặt Paulette cứng đờ vì kinh ngạc."
# 【ポーレット】
# display as 波萊特
# JP: 「え？　あの、一枚って、わたしをですか？」
1746 = "「Hả? Dạ, một tấm là, chụp em ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ダメか？\n対象物がはっきりしている方が良いかと思うのだが」
1800 = "「Ừm. Không được sao? Anh nghĩ chụp một đối tượng rõ ràng thì tốt hơn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、あの――三十秒だけ待ってください！」
1983 = "「Dạ không, dạ——xin hãy đợi em 30 giây!」"
# monologue
# JP: 後ろを向いてしゃがみこみ、手提げから化粧道具を出して、\n顔やら髪やら、ぱたぱたクシクシやり始める。
2534 = "Em ấy quay lưng lại ngồi xổm xuống, lấy đồ trang điểm từ túi xách ra, bắt đầu dặm lại mặt và chải chuốt lại tóc tai."
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――」
1794 = "「Ưm——」"
# monologue
# JP: ……優に五分が経過したが、さすがに僕も、\nこの状況で急かすほど世間知らずなわけでもない。
1338 = "……Năm phút đã trôi qua cái vèo, nhưng quả thực tôi cũng, không đến mức thiếu hiểu biết sự đời mà lại đi giục giã trong tình huống này."
# 【ポーレット】
# display as 波萊特
# JP: 「あのっ――おまたせしました」
2103 = "「Dạ——để anh đợi lâu rồi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ」
# 1804 = "「嗯」" 
# monologue
# JP: (ピピピ！　カシャッ)
32 = "(Bíp bíp bíp! Tách!)"
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　いきなりっ！？」
1742 = "「Hả!? Đột nhiên thế ạ!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「撮った写真は、どう見るのだ？」
1905 = "「Ảnh đã chụp thì xem thế nào?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ……えと、このボタンです」
1770 = "「A…… dạ, là nút này ạ.」"
# monologue
# JP: ポーレットの指が動くと同時、\nディスプレイには、撮ったばかりの写真が表示される。
2744 = "Ngay khi ngón tay Paulette vừa cử động, trên màn hình hiển thị bức ảnh vừa mới chụp."
# 【ポーレット】
# display as 波萊特
# JP: 「わ」
1733 = "「Oa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、これは凄い。\n小さくとも良いカメラなのだな」
1751 = "「Ồ, tuyệt thật. Tuy nhỏ nhưng đúng là một chiếc máy ảnh tốt nhỉ.」"
# monologue
# JP: 動きの途中の一瞬を、\n鮮やかに、一枚の絵と切り取ってくれた。
2944 = "Một khoảnh khắc giữa chừng chuyển động, đã được bắt trọn sống động thành một bức tranh."
# 【双鉄】
# display as 雙鐵
# JP: 「これがいわゆる見返り美人、というヤツか。\nとても生き生きとして可愛らしい」
2082 = "「Đây chính là cái gọi là mỹ nhân ngoái đầu nhìn lại sao. Trông vô cùng sống động và đáng yêu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ……ぁのっ……」
1774 = "「A…… dạ……」"
# monologue
# JP: 思ったことを、あまりに素直に言いすぎてしまったのか、\nポーレットは真っ赤になってうつむいてしまう。
2909 = "Có lẽ do tôi nói ra những gì mình nghĩ quá thẳng thắn, Paulette đỏ bừng mặt cúi gầm xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「しゃ、写真……双鉄くん、才能――あるのかもですよ。\nほら、日々姫ちゃんのお兄さん、なんだし」
2141 = "「Chụp, chụp ảnh…… anh Soutetsu, có lẽ——có tài năng đấy ạ. Thì, anh là anh trai của Hibiki mà.」"
# monologue
# JP: それはそうだが、義理の兄妹だ。
2927 = "Đúng là vậy, nhưng chúng tôi chỉ là anh em nuôi."
# monologue
# JP: 血の繋がりがない以上、\n同じ才を受け継ぐこともありえまい。
2597 = "Đã không cùng huyết thống, thì chuyện kế thừa cùng một tài năng là điều không thể."
# 【双鉄】
# display as 雙鐵
# JP: 「単に、モデルとカメラが良いだけだろう」
1721 = "「Đơn giản chỉ là, do người mẫu và máy ảnh tốt thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ///////！」
1345 = "「っ///////!」"
# monologue
# JP: うつむいた、その口元が震えている。
2736 = "Cúi gầm mặt, khóe miệng em ấy đang run rẩy."
# monologue
# JP: 怒らせたかと一瞬ぎくりとさせられる、が――\nこれは、あれだ。こみ上げてくる喜びをこらえる口元だ。
2638 = "Trong khoảnh khắc tôi đã giật mình tưởng mình làm em ấy giận, nhưng—— Đây là, cái đó. Khóe miệng đang cố kìm nén niềm vui sướng trào dâng."
# 【ポーレット】
# display as 波萊特
# JP: 「あのっ！　わたしも、写真……写真撮ってきます！」
2104 = "「Dạ! Em cũng, đi chụp…… đi chụp ảnh đây ạ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 
# monologue
# JP: 駆け出したポーレットは、僕から大きく離れていく。
2751 = "Paulette chạy vọt đi, bỏ xa tôi một đoạn lớn."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も撮るか」
1877 = "「Mình cũng chụp thôi.」"
# monologue
# JP: 使い方なら把握した。
2607 = "Tôi đã nắm được cách sử dụng."
# monologue
# JP: 失敗をいくらしても構わぬと聞いたし、\nここはともかく、数で勝負といってみよう。
2529 = "Nghe nói có chụp hỏng bao nhiêu cũng không sao, thì cứ lấy số lượng bù chất lượng xem sao."
# monologue
# JP: （パシャっ――パシャっ――）
2993 = "（Tách——Tách——）"
# monologue
# JP: しかし、寂しい。\nズームにすれば、空白さえもが鮮やかになる。
2377 = "Thế nhưng, thật vắng vẻ. Nếu phóng to lên, ngay cả khoảng trống cũng trở nên sống động."
# monologue
# JP: 割れたガラス。置き去りにされてしまったカーテン。\n朽ちかけている木の雨戸に、蔦が這い寄り侵食していく。
2838 = "Kính vỡ. Tấm rèm bị bỏ lại. Dây thường xuân bò đến xâm thực những tấm cửa chớp bằng gỗ đang mục nát."
# monologue
# JP: （パシャっ――）
2994 = "（Tách——）"
# monologue
# JP: そこにはもはや、映し出される顔がない。\n窓の向こうに、浮き上がってくる暖かさがない。
2809 = "Ở đó không còn khuôn mặt nào được phản chiếu nữa. Phía bên kia cửa sổ, cũng không còn sự ấm áp nào hiện lên."
# monologue
# JP: この廃宿舎は、ここにかつてあった無数の暮らしの、\n今はただ――巨大な墓標と成り果ててしまったのだろう。
2894 = "Khu ký túc xá bỏ hoang này, từng là nơi sinh sống của vô số người, nhưng giờ đây——chỉ còn là một tấm bia mộ khổng lồ mà thôi."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん！　双鉄くん！　ありました！！」
2142 = "「Anh Soutetsu! Anh Soutetsu! Thấy rồi ạ!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「むっ！？」
1756 = "「Hửm!?」"
# monologue
# JP: 駆け寄り見れば、\n“何がだ”と聞く必要は消え失せる。
2636 = "Chạy tới xem, thì không cần phải hỏi \"Thấy cái gì?\" nữa."
# monologue
# JP: ポーレットが指差す地面には、\nくっきりと――\x%lバラスト;#00ffc040;バラスト%l;#;と、\x%l枕木;#00ffc040;枕木%l;#;とが道を作っている。
2939 = "Trên mặt đất nơi Paulette chỉ tay, hiện lên rõ ràng——một con đường tạo bởi \\x%lバラスト;#00ffc040;đá ba-lát%l;#; và \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#;."
# 【双鉄】
# display as 雙鐵
# JP: 「これが……廃線跡か」
2081 = "「Đây là…… di tích tuyến đường sắt bỏ hoang sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「すごく状態いいですね。\nここから先は――ほら、見てください」
1677 = "「Tình trạng vẫn còn rất tốt anh nhỉ. Từ đây trở đi——đó, anh nhìn xem.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あれが炭鉱……の、工場か？」
2124 = "「Đó là nhà máy…… của, mỏ than sao?」"
# monologue
# JP: ゆるやかに続く上りの彼方、\n丘、というか小山の向こうに、大きな工場が建っている。
2910 = "Phía xa của con dốc thoai thoải kéo dài, bên kia ngọn đồi, hay nói đúng hơn là ngọn núi nhỏ, có một nhà máy lớn được xây dựng."
# monologue
# JP: 地域一帯を見下ろすそれは――\nまるで、石炭産業を守った砦のようだ。
2559 = "Nó nhìn xuống toàn bộ khu vực—— cứ như một pháo đài bảo vệ ngành công nghiệp than đá vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「このまま廃線跡をたどっていけば、\nあの工場のところにつけるんだと思います」
1731 = "「Nếu cứ đi dọc theo di tích tuyến đường sắt này, em nghĩ chúng ta sẽ đến được chỗ nhà máy đó đấy ạ.」"
# monologue
# JP: （パシャッ）
2995 = "（Tách）"
# monologue
# JP: 僕も数枚、廃線路の写真を撮ってから、\nその上に足を乗せてみる。
2619 = "Tôi cũng chụp vài tấm ảnh tuyến đường sắt bỏ hoang, sau đó thử đặt chân lên."
# monologue
# JP: \x%l枕木;#00ffc040;枕木%l;#;は、まだ朽ちていない。\nしっかりとした感触で、僕の両足を支えてくれる。
80 = "\\x%l枕木;#00ffc040;Tà vẹt đường ray%l;#; vẫn chưa bị mục nát. Nó nâng đỡ hai bàn chân tôi với một cảm giác vững chãi."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、行こう」
2121 = "「Nếu vậy, đi thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
# 1807 = "「嗯！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「――はぁ」
1358 = "「——Phù.」"
# monologue
# JP: 夢中になって廃線跡をたどっていた、\nポーレットの足がようやく止まる。
2596 = "Paulette mải mê đi dọc theo di tích tuyến đường sắt, cuối cùng cũng dừng bước."
# monologue
# JP: ここまで、かなりを歩いて来た。\nが――
2560 = "Chúng tôi đã đi bộ khá xa đến tận đây.\nNhưng mà——"
# 【ポーレット】
# display as 波萊特
# JP: 「まだ続いてますね、線路」
2059 = "「Đường ray, vẫn còn kéo dài anh nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 
# monologue
# JP: この近辺には、レールまでもが残っている。\n廃線跡というよりも、確かに、線路と呼びたくなる。
2897 = "Quanh khu vực này, ngay cả đường ray cũng vẫn còn sót lại. Đúng là muốn gọi nó là đường sắt hơn là di tích tuyến đường sắt bỏ hoang."
# 【双鉄】
# display as 雙鐵
# JP: 「恐らくは、\n坑道のすぐそばにまで続いているのではなかろうか」
1827 = "「Có lẽ là, nó kéo dài đến tận ngay sát hầm mỏ cũng nên.」"
# 【ポーレット】
# display as 波萊特
# JP: 「トロッコの方も残ってるかもしれませんね。\nこっちのレール、思ったより状態遥かにいいですし」
2021 = "「Có khi xe goòng cũng vẫn còn sót lại ấy chứ. Đường ray bên này, tình trạng tốt hơn em nghĩ rất nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、復線も出来そうか？」
2116 = "「Nếu vậy, khôi phục lại tuyến đường cũng khả thi chứ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「この状態ならかなり容易に、予算も抑えて\nできるんじゃないかって思います。ただ――」
2014 = "「Với tình trạng này thì em nghĩ có thể làm khá dễ dàng, và còn tiết kiệm được ngân sách nữa. Có điều——」"
# monologue
# JP: 青い瞳が、レールから外れ僕を向く。
2512 = "Đôi mắt xanh thẳm rời khỏi đường ray và hướng về phía tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「投資するだけの価値が、\nこの辺に残っていればの話ですけど」
2095 = "「Đó là trong trường hợp khu vực này, còn lại những thứ đáng để đầu tư thôi ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 
# monologue
# JP: レールのまわりに広がっているのは、\n雑然とした光景だ。
2911 = "Trải rộng xung quanh đường ray, là một khung cảnh lộn xộn."
# monologue
# JP: プレハブらしき建物たちのその奥に、\n山肌を切り支えるような、コンクリートの塊が見える。
2889 = "Phía sau những tòa nhà có vẻ như là nhà lắp ghép, tôi có thể nhìn thấy những khối bê tông như thể đang cắt ngang và chống đỡ sườn núi."
# 【双鉄】
# display as 雙鐵
# JP: 「おそらく、あの下に坑道入口があるのだろうな」
1868 = "「Có lẽ, lối vào hầm mỏ nằm ở dưới đó nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ん……っと、ここからだと見えない、ですね」
1798 = "「Ưm…… từ đây thì không nhìn thấy được, anh nhỉ.」"
# monologue
# JP: ポーレットの目にあてられてるのは、\n長いレンズのついたカメラ。
2754 = "Thứ đang được đặt sát mắt Paulette, là chiếc máy ảnh có ống kính dài."
# monologue
# JP: 見るからに物凄そうな望遠で、\n山肌の様子を伺っているようだ。
2907 = "Thoạt nhìn có vẻ là một ống kính tele cực kỳ xịn, em ấy dường như đang quan sát tình trạng sườn núi."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……けど、なんだろう？　扉かな？」
1767 = "「A…… nhưng mà, cái gì kia nhỉ? Là cánh cửa sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「バカ！　ポーレットっ！！！」
2036 = "「Ngốc! Paulette!!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　あっ！　きゃっ！！！」
1739 = "「Hả!? A! Á!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「くうっ！」
1793 = "「Ư!」"
# monologue
# JP: 駆け寄りながら手を引き込んで、僕の体の上へと倒すっ！
2617 = "Tôi vừa lao tới vừa kéo tay em ấy lại, kéo ngã lên người tôi!"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ！？」
1782 = "「A!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
2155 = "「!!!」"
# monologue
# JP: （どううっ！！）
2985 = "（Rầm!!）"
# monologue
# JP: 軽くやわらかな衝撃のあと、\n背中をドンっ！　と激しく硬い痛みが襲う。
2877 = "Sau một cú va chạm nhẹ nhàng mềm mại, là một cú đập mạnh! Một cơn đau cứng và dữ dội ập đến sau lưng."
# monologue
# JP: だが――ならばいい。\n池への転落。その最悪の事態は防げた。
2375 = "Nhưng——vậy thì tốt rồi. Rơi xuống hồ. Ít nhất cũng ngăn chặn được tình huống tồi tệ nhất đó."
# 【ポーレット】
# display as 波萊特
# JP: 「あっ！？　双鉄くんっ？！！」
1781 = "「A!? Anh Soutetsu?!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「……大事無い。それより、ポーレットは」
1374 = "「……Không sao. Hơn nữa, Paulette thì sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしは……平気。\nあの――助けてくれて、ありがとう」
1872 = "「Em thì…… không sao ạ.\nDạ——cảm ơn anh đã cứu em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「何。そのために僕がいるのだ」
1979 = "「Có gì đâu. Anh ở đây là vì thế mà.」"
# monologue
# JP: 熱ささえともなう痛みが薄れてくれば――\n大丈夫、呼吸にも会話にも支障は無い。
2468 = "Khi cơn đau kèm theo sức nóng nhạt dần đi—— Không sao, không có vấn đề gì với việc hô hấp hay nói chuyện."
# monologue
# JP: （おっ、と）
2988 = "（Ây da.）"
# monologue
# JP: ポーレットを抱きしめてしまっている手を離し、\n立たせたあとに手を借りて、僕もそろそろ立ち上がる。
2623 = "Tôi buông bàn tay đang ôm chặt lấy Paulette ra, sau khi để em ấy đứng dậy, tôi mượn tay em ấy và cũng từ từ đứng lên."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし、あのっ」
2108 = "「Em, dạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ」
1987 = "「Không sao đâu.」"
# monologue
# JP: レンズの向こうに見える情報を求めるあまり、\n数歩を、思わず歩いてしまった。
2537 = "Vì quá mải mê tìm kiếm thông tin hiện ra phía bên kia ống kính, nên em ấy đã vô tình bước đi vài bước."
# monologue
# JP: この手のことのフォローであれば、\n幸いなことに、慣れている。
2645 = "May mắn thay, tôi đã quen, với việc xử lý những tình huống thế này."
# 【双鉄】
# display as 雙鐵
# JP: 「気にするな。それほどに深くを見る目であるから、\n僕らには映せぬものを見いだせるのだから」
1644 = "「Đừng bận tâm. Chính vì có đôi mắt nhìn sâu sắc đến vậy, nên em mới có thể tìm ra những thứ mà bọn anh không thể thấy được chứ.」"
# monologue
# JP: ほうっと、安心したような息を吐き。
2859 = "Em ấy thở phào một hơi như thể đã an tâm."
# monologue
# JP: けれどもすぐに姿勢を正し、\nポーレットはまっすぐに僕を見つめる。
2404 = "Thế nhưng ngay lập tức chỉnh đốn lại tư thế, Paulette nhìn thẳng vào tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが居てくれるから……油断しちゃってました。\nありがとうだけじゃなくて、ごめんなさい」
2133 = "「Vì có anh Soutetsu ở bên…… nên em đã lơ là mất. Không chỉ cảm ơn anh, mà em còn phải xin lỗi anh nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 
# monologue
# JP: きっちり、深く、頭を下げる。
2519 = "Em ấy cúi gập đầu xuống một cách trang trọng."
# monologue
# JP: 詫びなど不要と感じはするが、\nそれがポーレットの礼節ならば、無論そのまま受け入れる。
2925 = "Tôi cảm thấy không cần thiết phải xin lỗi, nhưng nếu đó là phép tắc của Paulette, thì dĩ nhiên tôi sẽ cứ thế mà đón nhận."
# 【ポーレット】
# display as 波萊特
# JP: 「本当に助かりました。\nこの池……もしも落ちちゃってたら」
2024 = "「Thật sự cảm ơn anh đã cứu em. Cái hồ này…… lỡ mà rơi xuống đó thì.」"
# monologue
# JP: 茶色と緑を混ぜた絵の具のような、\n美しいとは言いがたい色。
2701 = "Giống như màu sơn pha trộn giữa nâu và xanh lá, một màu sắc khó có thể nói là đẹp đẽ."
# monologue
# JP: 水面をこわごわ覗き込み、\nポーレットはわずかに身震いする。
2745 = "Rụt rè nhìn xuống mặt nước,\nPaulette khẽ rùng mình."
# 【ポーレット】
# display as 波萊特
# JP: 「ちょっと……\nひどいことになっちゃいそうですよね」
1825 = "「Có vẻ……\nsẽ thành ra tồi tệ lắm đây.」"
# monologue
# JP: その色を示しているのが底の沈殿物のみであり、\n上部の水は澄んでいるのが、余計に怖く感じるのだろう。
2820 = "Thứ tạo ra màu sắc đó chỉ là lớp cặn dưới đáy, còn phần nước bên trên lại trong vắt, điều này càng khiến người ta thấy sợ hãi hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「これは恐らく、石炭の選別に使った池だ」
2079 = "「Có lẽ đây là cái hồ dùng để phân loại than.」"
# 【ポーレット】
# display as 波萊特
# JP: 「選別、ですか？」
1693 = "「Phân loại, ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。石炭から石炭くずや炭塵を取り除くのに\n使ったのだろう」
1802 = "「Ừ. Chắc là người ta dùng nó, để loại bỏ xỉ than và bụi than ra khỏi than đá.」"
# 【ポーレット】
# display as 波萊特
# JP: 「じゃあ、この底にたまってるの――\n石炭の粉とか、そこから出て来たものなんですか？」
2126 = "「Vậy thì, thứ đọng lại dưới đáy này—— là bột than hay những thứ thải ra từ đó sao ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「恐らくはな」
1828 = "「Có lẽ là vậy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の話を聞いたとき、\n公害について、わたし、少し勉強したんですけど――」
2106 = "「Dạ, khi nghe nói về việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;, em cũng có tìm hiểu một chút về vấn đề ô nhiễm môi trường——」"
# monologue
# JP: 僕がしたのと同じことを、ポーレットもすでにやっていた。\n小さな事実が、なんとも嬉しく、心強い。
2451 = "Paulette cũng đã làm những việc giống hệt tôi. Một sự thật nhỏ bé, nhưng lại khiến tôi thấy vui vẻ và vững tâm đến lạ."
# 【ポーレット】
# display as 波萊特
# JP: 「工業排水だけじゃなくって、鉱山から湧出する水も――\n環境汚染、引き起こしちゃうことあるんですよね？」
1634 = "「Không chỉ nước thải công nghiệp, mà cả nước phun ra từ mỏ cũng—— có thể gây ra ô nhiễm môi trường đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そう考えると、\nこの池が野ざらしになっているのは、危険かもしれんな」
1932 = "「Ừ——nghĩ vậy thì, việc để cái hồ này phơi sương phơi gió như vậy có khi lại nguy hiểm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「って、思います。大雨とか台風きたら、\nかき混ぜられちゃうかもしれませんし」
1876 = "「Em cũng nghĩ thế. Nếu có mưa lớn hay bão tới, chúng có thể sẽ bị khuấy tung lên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 
# monologue
# JP: どんな形で再利用するにせよ、いや、そうでなくても、\n環境汚染の危険を放置はしておけない。
2371 = "Dù có tái sử dụng dưới hình thức nào đi chăng nữa, à không, ngay cả khi không làm vậy, thì cũng không thể bỏ mặc nguy cơ ô nhiễm môi trường được."
# 【双鉄】
# display as 雙鐵
# JP: 「坑道内部の調査に、\nその視点も加える必要がありそうだな」
2020 = "「Có vẻ chúng ta cần phải bổ sung thêm góc độ đó, vào việc điều tra bên trong hầm mỏ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね」
# 1935 = "「是啊」" 
# monologue
# JP: 今度はしっかり足を止め、\nポーレットは数枚のシャッターを切る。
2755 = "Lần này Paulette dừng chân đứng vững, rồi bấm máy chụp vài tấm ảnh."
# 【ポーレット】
# display as 波萊特
# JP: 「行ってみましょう。双鉄くん」
1881 = "「Chúng ta thử vào xem sao nhé. Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 
# monologue
# JP: ……予想通りに、コンクリートの防壁の下には、\n大きなシャッターがついていた。
1336 = "……Đúng như dự đoán, bên dưới bức tường bê tông phòng hộ, có gắn một cánh cửa cuốn lớn."
# monologue
# JP: その隣には、小さな扉。\n幸い、カギはかかっていない。
2916 = "Bên cạnh đó là một cánh cửa nhỏ. May mắn thay, nó không bị khóa."
# 【双鉄】
# display as 雙鐵
# JP: 「入るぞ。ヘッドライトはつけたか？」
1883 = "「Vào thôi. Đã bật đèn đội đầu chưa?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、大丈夫です、双鉄くん」
2134 = "「Vâng, ổn rồi ạ, anh Soutetsu.」"
# monologue
# JP: （ぎい――ぃっ）
2979 = "（Két——）"
# 【ポーレット】
# display as 波萊特
# JP: 「わ」
# 1733 = "「哇」" 
# 【双鉄】
# display as 雙鐵
# JP: 「これは……\n資材も設備も、まるごと放棄していったのか」
2085 = "「Đây là…… họ đã bỏ lại toàn bộ vật tư và thiết bị luôn sao.」"
# monologue
# JP: トンネルの中は、予想よりもはるかに近代的な印象だ。
2500 = "Bên trong đường hầm, mang lại ấn tượng hiện đại hơn nhiều so với dự đoán."
# monologue
# JP: 電線と思しき線や、無数のパイプ。\nそれになにやら、巨大な布にくるまれた――
2799 = "Những đường dây có vẻ như là dây điện, cùng vô số đường ống. Hơn nữa còn có thứ gì đó, được bọc trong một tấm vải khổng lồ——"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ、なんだ……油が染みているのか？\nくそ、ベタベタと――」
1760 = "「Ưm, cái gì đây…… bị ngấm dầu sao? Chết tiệt, dính nhớp nháp——」"
# 【ポーレット】
# display as 波萊特
# JP: 「わ、すごい――」
1735 = "「Oa, tuyệt quá——」"
# monologue
# JP: 油の染みたシートの下から、\n工作機械がごろん、とまるごと飛び出してくる。
2621 = "Từ bên dưới tấm bạt ngấm dầu, một cỗ máy công cụ nguyên vẹn lù lù hiện ra."
# monologue
# JP: いくつも、いくつも――\nその果てには、配電盤さえサビ一つ無く現れる。
2358 = "Rất nhiều, rất nhiều máy móc—— và ở tận cùng, thậm chí cả bảng điện cũng hiện ra mà không hề có một vết gỉ sét."
# 【ポーレット】
# display as 波萊特
# JP: 「よそでの使い道が無かったから……ですかね？\n炭鉱、次々に閉鎖されていった状況だったでしょうから」
1829 = "「Có lẽ vì…… không có chỗ nào khác cần dùng đến chúng chăng? Bởi vì lúc đó là tình cảnh các mỏ than lần lượt đóng cửa mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なるほどな」
1787 = "「À, ra là vậy.」"
# monologue
# JP: （ぴちょんっ）
3001 = "（Tỏng）"
# monologue
# JP: 採炭という産業そのものが消えていくなら、\n資材設備を買い取ってくれる先もない。
2899 = "Nếu bản thân ngành công nghiệp khai thác than đang biến mất, thì cũng chẳng có nơi nào chịu mua lại vật tư thiết bị cả."
# monologue
# JP: ひとつの滅びというものが、どれほど大規模なものなのか\n――その末端に触れた気がして、体が少し震えてしまう。
2356 = "Sự lụi tàn của một thứ, có quy mô to lớn đến nhường nào. ——Cảm giác như vừa chạm vào một phần tận cùng của nó, cơ thể tôi khẽ run lên."
# 【ポーレット】
# display as 波萊特
# JP: 「けど――これだけ設備が残ってるなら。\nもし、この設備がまだ生きてるなら」
1651 = "「Nhưng mà——nếu vẫn còn lại ngần này thiết bị. Giả sử, những thiết bị này vẫn còn hoạt động được thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、観光資源とできるかもしれん」
1942 = "「Ừ, có thể sẽ biến thành tài nguyên du lịch được đấy.」"
# monologue
# JP: 廃宿舎群もそうであったが、\nこの光景にも、かなり強烈なインパクトがある。
2923 = "Quần thể ký túc xá bỏ hoang cũng vậy, nhưng khung cảnh này cũng mang lại một tác động khá mạnh mẽ."
# monologue
# JP: （ぴちょんっ）
# 3001 = "（滴答）" 
# monologue
# JP: 採炭体験などの魅力をうまく打ち出せたのならば――\nああ、いや、そうか。
2580 = "Nếu có thể quảng bá tốt sức hấp dẫn của việc trải nghiệm khai thác than—— À, không, đúng rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「たとえばだ、ポーレット」
2005 = "「Ví dụ nhé, Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、なんですか？　双鉄くん」
1973 = "「Vâng, chuyện gì vậy ạ? Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;でここまで、あるいは術仙炭鉱廃駅まで来て、\nここで、石炭を体験採掘してもらう」
2052 = "「Đi \\x%l8620;#00ffc040;8620%l;#; đến tận đây, hoặc đến nhà ga bỏ hoang của mỏ than Jutsu-sen, rồi cho mọi người trải nghiệm khai thác than ở đây.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1779 = "「啊！」" 
# monologue
# JP: わかってくれた。
2538 = "Em ấy đã hiểu ý tôi."
# monologue
# JP: ポーレットの顔に、\nヘッドライトよりも明るい笑みが浮かぶ。
2746 = "Trên khuôn mặt Paulette, nở một nụ cười còn rạng rỡ hơn cả ánh đèn đội đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「面白いです！　それ！！　\n自分で掘った石炭でＳＬを動かせるとか！！」
1974 = "「Thú vị quá! Ý tưởng đó ấy!! Được làm cho SL chạy bằng chính than do mình đào lên!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな。これは、なんというか、ロマンがある。\n鉄道好きではない層にも、楽しんでもらえるはずだ」
1929 = "「Đúng không. Cái này, phải nói sao nhỉ, rất lãng mạn. Chắc chắn ngay cả những người không thích đường sắt cũng sẽ thấy thích thú.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですよね、けど……炭鉱まで本格的に\n調査復興するんなら、御一夜鉄道だけじゃ、ちょっと」
1939 = "「Đúng vậy anh nhỉ, nhưng mà…… nếu phải tiến hành điều tra và khôi phục mỏ than một cách bài bản, thì chỉ với Đường sắt Ohito e là hơi khó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――予算的に苦しいか」
1795 = "「Ừ——ngân sách eo hẹp nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。ですから……何かもうひと押しのアイディアで、\n市の事業とかとも絡められる、と――」
1934 = "「Vâng. Vì vậy…… nếu có thêm một ý tưởng mang tính quyết định nào đó, để có thể gắn kết nó với các dự án của thành phố thì——」"
# monologue
# JP: （ぴちょんっ）
# 3001 = "（滴答）" 
# 【ポーレット】
# display as 波萊特
# JP: 「くちょんっ！」
2135 = "「Hắt xì!」"
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か、ポーレット」
1980 = "「Không sao chứ, Paulette.」"
# monologue
# JP: くしゃみを聞いた瞬間に、\nぶるり、と僕の体も震える。
2826 = "Khoảnh khắc nghe thấy tiếng hắt xì, cơ thể tôi cũng bất giác run lên."
# monologue
# JP: 坑内の気温は相当低い。\nその上、ひっきりなしに水滴が降ってきてしまう。
2806 = "Nhiệt độ trong hầm khá thấp. Hơn nữa, những giọt nước cứ liên tục rơi xuống."
# 【双鉄】
# display as 雙鐵
# JP: 「ひとまずは、外に出よう」
2038 = "「Trước mắt, cứ ra ngoài đã.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。双鉄くん、ごめんなさい」
1836 = "「A, vâng. Anh Soutetsu, em xin lỗi.」"
# monologue
# JP: ポーレットをつれ、陽のあたる場所。\nさきほどの沈殿池の近くへ戻る。
2610 = "Tôi đưa Paulette đến nơi có ánh nắng mặt trời. Quay trở lại gần hồ lắng cặn lúc nãy."
# 【双鉄】
# display as 雙鐵
# JP: 「……なんに使うにせよ、あの水はなんとかせねばな」
1379 = "「……Dù dùng vào việc gì đi nữa, cũng phải giải quyết đống nước đó thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね、足元もぬかるんでるし、\n天井からも、ずっとぽたぽたぽたぽたって」
1937 = "「Đúng vậy anh nhỉ, dưới chân thì lầy lội, mà từ trên trần, nước cứ nhỏ giọt tỏng tỏng suốt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か？　ずいぶんと濡れてしまっているが」
1981 = "「Không sao chứ? Em bị ướt sũng rồi kìa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。\n炭鉱の中は少し肌寒かったですけど――っ！！？」
1791 = "「A, vâng. Bên trong mỏ than hơi se lạnh một chút nhưng——ơ!!?」"
# monologue
# JP: ばっ！　と、ポーレットが両手で自分の体を抱いて、\n半身にひねって隠すようにする。
2479 = "Phắt! Paulette dùng hai tay ôm lấy cơ thể mình, xoay nửa người lại như thể muốn che giấu."
# monologue
# JP: そうされて、ああ、そうだったかと理解する。
2798 = "Thấy em ấy làm vậy, tôi mới à lên hiểu ra vấn đề."
# monologue
# JP: （濡れたせいで――\n服が、ずいぶんと透けてしまっていたな）
2998 = "（Vì bị ướt nên—— quần áo đã trở nên khá trong suốt rồi.）"
# monologue
# JP: ポーレットとは登呂流湯で、同じ湯船につかっている。\n服から肌が透けたとて、今さら何をという他にない。
2604 = "Tôi và Paulette đã từng ngâm chung một bồn tắm ở Tororyu-yu. Dù da thịt có lộ qua lớp áo ướt, thì giờ cũng chẳng còn gì để phải ngại ngùng nữa."
# monologue
# JP: ――はずなのだけれど、\n恥じらう姿のせいなのか、僕まで照れくさい感じをうける。
1317 = "——Lẽ ra là vậy, nhưng có lẽ vì dáng vẻ thẹn thùng của em ấy, mà đến cả tôi cũng cảm thấy xấu hổ lây."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、これを」
2006 = "「Paulette, cái này.」"
# monologue
# JP: 僕のシャツも、それほどではないが濡れている。\n脱いで絞って、軽く振る。
2633 = "Áo sơ mi của tôi cũng bị ướt, dù không đến mức sũng nước. Tôi cởi nó ra, vắt kiệt rồi giũ nhẹ."
# 【双鉄】
# display as 雙鐵
# JP: 「いやでなければ、羽織ってくれ」
2047 = "「Nếu không chê, hãy khoác nó lên đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いやなんて、そんなことあるはずありません」
1893 = "「Làm sao em có thể chê được chứ.」"
# monologue
# JP: 受け取り、羽織る。\n途端、ポーレットは心地よさげにその目を細める。
2515 = "Em ấy nhận lấy và khoác lên người. Ngay lập tức, Paulette nheo mắt lại một cách thoải mái."
# 【ポーレット】
# display as 波萊特
# JP: 「なんか……あったかいです。\n双鉄くんの匂い……するみたいで」
1896 = "「Cảm giác…… ấm quá. Hình như…… có mùi của anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　あたたまるのであれば、よかった」
1963 = "「Vậy sao? Nếu nó giúp em ấm lên thì tốt rồi.」"
# monologue
# JP: この気温で、この陽射しだ。
2505 = "Với nhiệt độ và ánh nắng thế này."
# monologue
# JP: ほどなく暑くなるだろうが、\nその頃には、ポーレットの服も乾くだろう。
2589 = "Chẳng mấy chốc sẽ nóng lên thôi, nhưng đến lúc đó, quần áo của Paulette chắc cũng đã khô rồi."
# monologue
# JP: （それにしても……\n水も滴るいい男という言葉はあるが――）
2976 = "（Dù vậy…… Tuy có câu nói \"đẹp trai đến mức nước cũng phải nhỏ giọt\"——）"
# monologue
# JP: うっすらと水を含んだ髪の、なんと艶やかなことだろう。
2434 = "Mái tóc hơi ngậm nước kia, sao lại bóng mượt đến vậy."
# monologue
# JP: ポーレットは、極めて美しい女性なのだと、\n初めて気づいた――いいや、目にしたような気になる。
2640 = "Paulette là một người phụ nữ cực kỳ xinh đẹp, lần đầu tiên tôi nhận ra điều đó——không, cảm giác như lần đầu tiên tôi được chiêm ngưỡng thì đúng hơn."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？」
2143 = "「Anh Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや、あれだ」
1785 = "「À, không, là chuyện này.」"
# monologue
# JP: そんなつもりはなかったが、\n結果として、盗み見る形になってしまった。
2601 = "Tôi không cố ý, nhưng kết quả là lại thành ra như đang nhìn trộm."
# monologue
# JP: 申し訳無さと気恥ずかしさに、言葉を次々並べてしまう。
2639 = "Cảm thấy có lỗi và xấu hổ, tôi vội vàng tuôn ra một tràng."
# 【双鉄】
# display as 雙鐵
# JP: 「思っただけだ。その――あふれた水での環境汚染や――\nああ、そうだ。落盤や爆発の危険もあるか、と」
1887 = "「Anh chỉ đang nghĩ thôi. Rằng——nước tràn ra có thể gây ô nhiễm môi trường—— À, đúng rồi. Liệu có nguy cơ sập hầm hay cháy nổ không nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうですね」
# 1935 = "「是啊」" 
# monologue
# JP: ポーレットの顔が引き締まる。
2747 = "Nét mặt Paulette trở nên căng thẳng."
# monologue
# JP: 空気の流れが変わってくれてホっとして、\n言葉は、さらに滑らかになる。
2614 = "Bầu không khí thay đổi khiến tôi thở phào nhẹ nhõm, lời nói cũng trở nên trơn tru hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「資源と出来れば何よりだが……出来なかった場合には、\nこの廃鉱山、御一夜にずいぶんな迷惑を」
2084 = "「Nếu có thể biến thành tài nguyên thì không còn gì bằng…… nhưng trong trường hợp không thể, thì khu mỏ bỏ hoang này, sẽ mang đến rắc rối lớn cho Ohimitera.」"
# 【ポーレット】
# display as 波萊特
# JP: 「違います。双鉄くん」
1642 = "「Không phải vậy đâu. Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！？」
2156 = "「!?」"
# monologue
# JP: とても、静かに。\nしかし断固と、ポーレットは僕の言葉を止める。
2740 = "Rất tĩnh lặng. Nhưng đầy kiên quyết, Paulette cắt ngang lời tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「山も、水も、石炭も、迷惑なんてかけません。\nずっと昔からここにあって、ありつづけてるだけ」
1847 = "「Cả núi, cả nước, cả than đá, đều không gây rắc rối gì cả. Chúng chỉ luôn ở đây từ rất lâu rồi, và vẫn sẽ tiếp tục ở đây mà thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2154 = "「！」" 
# monologue
# JP: ばくん、と心臓が跳ね上がる。
2613 = "Thịch, trái tim tôi đập thót một nhịp."
# monologue
# JP: ポーレットの美に見とれてしまった、\nその一瞬より、何十倍も、熱く、激しく。
2903 = "Nóng bỏng và mãnh liệt hơn gấp hàng chục lần, so với khoảnh khắc tôi bị hớp hồn bởi vẻ đẹp của Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「迷惑なものにされたんです。掘り出され、放置されて。\nそれは、鉱山の責任じゃない」
1899 = "「Chúng đã bị biến thành thứ gây rắc rối. Bị đào lên, rồi bị bỏ mặc. Đó không phải là trách nhiệm của mỏ than.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ。責任は、そうさせた側にある」
1808 = "「À, đúng vậy. Trách nhiệm thuộc về phía đã làm như thế.」"
# monologue
# JP: 遠い記憶が、喉を動かす。
2363 = "Ký ức xa xăm thôi thúc cổ họng tôi cất lời."
# 【双鉄】
# display as 雙鐵
# JP: 「悪いのは――間違えるのはいつだって、人間だ」
1964 = "「Kẻ có lỗi——kẻ phạm sai lầm lúc nào cũng là con người.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1804 = "「嗯」" 
# monologue
# JP: わかってもらえた。\n言わんばかりに、ポーレットは淡い笑顔を浮かべる。
2735 = "Như thể muốn nói \"Anh đã hiểu cho em rồi\", Paulette nở một nụ cười nhạt."
# monologue
# JP: 僕の心の一番奥底。\n一番大事なところに浮かぶ、遠い笑顔とそっくりに。
2525 = "Giống hệt với nụ cười xa xăm hiện lên ở nơi sâu thẳm nhất trong trái tim tôi. Ở nơi quan trọng nhất."
# monologue
# JP: （ああ――）
# 2992 = "（啊――）" 
# monologue
# JP: 確かめたい、尋ねてみたいと、\n跳ね上がった胸が焦げていく。
2543 = "Muốn xác nhận, muốn thử hỏi xem, lồng ngực đang đập thình thịch như bị thiêu đốt."
# monologue
# JP: だが、僕はいま、動揺をして混乱している。\nこれほど大事な質問を、できる状態とは思えない。
2408 = "Nhưng, tôi hiện tại đang dao động và bối rối. Tôi không nghĩ mình đang ở trạng thái có thể hỏi một câu hỏi quan trọng như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、だ」
2037 = "「Nói chung là.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1804 = "「嗯」" 
# monologue
# JP: だから、言葉を絞り出す。\n感情の全てを抑えこむその、隙間から。
2600 = "Vì vậy, tôi cố nặn ra từng chữ. Từ khe hở của việc kìm nén mọi cảm xúc."
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、一度持ち帰ろう」
2040 = "「Nói chung là, trước tiên cứ mang chuyện này về đã.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね、環境防護のためにも――\nどうしていくか、もっと多くのアイディアが必要です」
1941 = "「Đúng vậy anh nhỉ, vì mục đích bảo vệ môi trường nữa—— chúng ta cần thêm nhiều ý tưởng hơn về việc sẽ phải làm gì tiếp theo.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 
# monologue
# JP: ポーレットが一歩を先に踏み出す。\nそうして、僕へと振り返る。
2737 = "Paulette bước lên trước một bước. Sau đó, em ấy ngoảnh lại nhìn tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「なら、戻りましょう。双鉄くん！」
2122 = "「Vậy thì, chúng ta quay về thôi. Anh Soutetsu!」"
