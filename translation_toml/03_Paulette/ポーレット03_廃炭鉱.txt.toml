1354 = "「\\x%l枕木;#00ffc040;Tà vẹt đường ray%l;#; thì tái sử dụng kiểu gì?\nKhối gỗ đó bẩn đến mức đấy cơ mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「園芸の……\n庭造りとかの、アクセントにするんだそうです」
1669 = "「Nghe nói người ta dùng nó làm điểm nhấn\ncho...\nviệc làm vườn hay xây dựng cảnh quan sân\nvườn đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「園芸に、庭造り」
1816 = "「Làm vườn, cảnh quan sân vườn á.」"

# monologue
