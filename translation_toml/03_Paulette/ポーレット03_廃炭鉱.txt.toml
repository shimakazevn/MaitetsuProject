2045 = "「Anh ăn đây.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたしが好きなのは、生きてる鉄道ですから……\nあんまり、良くはわからないんですけど」
1889 = "「（Ngoạm）」"

# monologue
# JP: 言いながら、ポーレットは湯医線の本線を指す。
2743 = "——Nhưng mà, ngon thật.\nGiăm bông, mayonnaise và bánh mì baguette."

# 【ポーレット】
# display as 波萊特
# JP: 「連絡してたならその痕跡があるかなぁって――\nでも、それっぽいものは全然です」
1885 = "——Nhưng mà, ngon thật.\nGiăm bông, mayonnaise và bánh mì baguette."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、連絡をしていなかった場合には？」
2131 = "「Món này—— ngon thật đấy.\nEm dùng loại giăm bông thượng hạng à?」"

# 【ポーレット】
# display as 波萊特
# JP: 「その場合は、\x%l貨車;#00ffc040;貨車%l;#;からの荷降ろしとか、\nコンテナの積み替えとかをするための空間と設備――」
2117 = "「Fufufu.\nGiống hệt loại nhà mình hay dùng thôi ạ?」"

# monologue
# JP: 設備はまるで見当たらないが、\n空間であれば、有り余っている。
2405 = "「Fufufu.\nGiống hệt loại nhà mình hay dùng thôi ạ?」"

# monologue
# JP: あまりに有り余り過ぎていて、\nどこをどう見ればいいのか、途方にくれる。
2898 = "「Ngon quá!」"

# 【ポーレット】
# display as 波萊特
# JP: 「あとはもちろん、線路の痕跡。多分……\n残ってる可能性が高いのは\x%lバラスト;#00ffc040;バラスト%l;#;かなって思います」
2010 = "「A, không được. Để anh đính chính lại.\n『Món này ngon thật đấy, Paulette』」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、\x%lバラスト;#00ffc040;バラスト%l;#;か――」
1758 = "「A, không được. Để anh đính chính lại.\n『Món này ngon thật đấy, Paulette』」"

# monologue
# JP: 周囲に見当たらぬのであれば、\n歩いて探していく他に無い。
2856 = "Vừa nói tôi vừa chăm chú nhìn Hikari,\ncon bé vội vàng nuốt miếng bánh mì vừa cắn\ndở và mỉm cười."

# monologue
# JP: 遠足組の話では、ほど近くに在るということだった、\n宿舎跡をまずは、目指して見よう。
2690 = "（Nếu xung quanh không thấy, \nthì chỉ còn cách đi bộ tìm thôi.）"

# 【双鉄】
# display as 雙鐵
# JP: 「大量に使うものだしな。\n完全に処理するのは、確かに面倒そうだ」
2015 = "「Vì là thứ được sử dụng với số lượng lớn\nmà.\nMuốn xử lý hoàn toàn chắc chắn sẽ rất\nphiền phức.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。それとレールや\x%l枕木;#00ffc040;枕木%l;#;は、\n再利用の価値が高いですから」
1948 = "「Vâng. Hơn nữa đường ray và \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#;\n,\ncó giá trị tái sử dụng rất cao ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l枕木;#00ffc040;枕木%l;#;？」
1355 = "「\\x%l枕木;#00ffc040;Tà vẹt đường ray%l;#; á?」"

# monologue
# JP: レールは鉄だ。\n再利用の価値が高いのは当然だろう。が――
2912 = "Đường ray làm bằng sắt.\nGiá trị tái sử dụng cao là chuyện đương\nnhiên. Nhưng——"

# 【双鉄】
# display as 雙鐵
