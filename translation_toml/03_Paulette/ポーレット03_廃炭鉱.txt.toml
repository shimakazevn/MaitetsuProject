2432 = "「Anh Soutetsu và mọi người cũng đi luôn đi\nạ.\nKhoảng 30 phút nữa là đông lắm đấy.」"

# 【ハチロク】
# display as 八六
# JP: 「わたくしたちが乗っている以上、\x%l8620;#00ffc040;8620%l;#;は走行しない。\nこの全線が、\x%lキハ07;#00ffc040;キハ07%l;#;の\x%l閉塞;#00ffc040;[へいそく,1]閉塞%l;#;・専有区間となるのですから」
1728 = "「Anh biết rồi. Đi thôi, Reina.」"

# 【日々姫】
# display as 日日姬
# JP: 「あ！」
# 1779 = "「啊！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「停止をしたら、[て]手\x%lブレーキ;#00ffc040;ブレーキ%l;#;もかけてください」
2031 = "「Vâng ạ. Bọn em đi nhé~」"

