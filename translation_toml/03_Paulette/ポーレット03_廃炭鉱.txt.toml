2926 = "Có lẽ vì đó là một thế giới mà tôi hoàn\ntoàn không có hứng thú,\nnên tôi không tài nào hình dung ra được."

# 【双鉄】
# display as 雙鐵
# JP: 「庭に線路でも敷くのか？」
2144 = "「Định lát cả đường ray trong sân vườn luôn\nsao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そういう人も居ますよ？\nミニＳＬを自宅のお庭で走らせちゃう！　みたいな」
1658 = "「Cũng có những người như vậy đó anh?\nKiểu như tự cho chạy cả một chiếc SL mini\nngay trong sân nhà mình luôn!」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは――なんとも凄いな」
2130 = "「Thế thì——đúng là đỉnh thật.」"

# 【ポーレット】
# display as 波萊特
# JP: 「\x%lまいてつ;#00ffc040;まいてつ%l;#;とは違う凄みですよね。\n車輌も駅も線路も全部、自分ひとりで作っちゃう」
1661 = "「Một sự lợi hại khác hẳn với \\x%lまいてつ;#00ffc040;Chủ tàu%l;#; anh\nnhỉ.\nTừ toa xe, nhà ga cho đến đường ray, tất\ncả đều do một tay họ tự làm hết.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、ならば、\x%l枕木;#00ffc040;枕木%l;#;も相当に使うのか」
1705 = "「Ra là vậy, nếu thế thì, cũng phải dùng\nkhá nhiều \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#; nhỉ.」"

# monologue
# JP: 納得すれば、\nしかしぶんぶん、ポーレットは首を横に振る。
2643 = "Tôi vừa gật gù,\nthì Paulette lại lắc đầu nguầy nguậy."

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　あの、それも多分そうですけど、\nでも、違うんです。普通の、お庭の、\x%l枕木;#00ffc040;枕木%l;#;は」
1777 = "「A! Dạ, có lẽ cũng có trường hợp như vậy,\nnhưng mà, không phải đâu ạ. \\x%l枕木;#00ffc040;Tà vẹt đường ray%l;#;\ntrong sân vườn thông thường thì,」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1765 = "「Hửm?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そういうのじゃなくて、\x%l枕木;#00ffc040;枕木%l;#;は庭造りの資材に――\n敷石の代わりとか、ウッドデッキとか塀とかにするって」
1687 = "「Không phải kiểu đó đâu, \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#;\nđược dùng làm vật liệu xây dựng sân vườn——\nngười ta bảo là dùng thay cho đá lát, làm\nsàn gỗ ngoài trời hay hàng rào cơ ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……うん。\nなんとなくイメージできてきたぞ」
1772 = "「À…… ừm.\nAnh cũng lờ mờ hình dung ra được rồi.」"

# monologue
# JP: 青々とした芝生の庭に、\n敷石代わりの\x%l枕木;#00ffc040;枕木%l;#;が、規則正しく連なっている。
2836 = "Trên khu vườn cỏ xanh mướt,\nnhững thanh \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#; dùng thay cho\nđá lát được xếp nối tiếp nhau một cách có\nquy luật."

# monologue
# JP: 埋める深さで高さを変えた\x%l枕木;#00ffc040;枕木%l;#;たちで、\n枯木の風合いをそのまま活かした塀を作る――
2552 = "Bằng cách chôn \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#; với độ sâu\nkhác nhau để tạo độ cao thấp,\nngười ta tạo ra một bức tường rào tận dụng\nnguyên vẹn vẻ đẹp của gỗ mục——"

# 【双鉄】
# display as 雙鐵
# JP: 「それは確かに、かなり雰囲気が良さそうだ」
2019 = "「Thế thì đúng là, bầu không khí có vẻ khá\ntuyệt đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。わたしも、ちょっと憧れちゃいます」
1985 = "「Đúng không ạ. Em cũng, có chút ngưỡng mộ\nrồi đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。ポーレットは園芸にも興味があるのか？」
1753 = "「Ồ. Paulette cũng có hứng thú với làm vườn\nsao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、庭造りの方じゃなく――って――――」
1784 = "「A, không phải là về việc xây dựng cảnh\nquan sân vườn đâu——ơ――――」"

# 【双鉄】
# display as 雙鐵
# JP: 「どうした？　――っと！」
1857 = "「Sao thế? ——Đây là!」"

# monologue
# JP: 曲がりくねった坂道の上、\nいきなり、それは現れる。
2598 = "Trên con dốc quanh co,\nđột nhiên, thứ đó hiện ra."

# 【双鉄】
# display as 雙鐵
# JP: 「これが――みんなの言っていた……」
2080 = "「Đây là——thứ mà mọi người đã nhắc đến……」"

# 【ポーレット】
# display as 波萊特
# JP: 「ゴーストタウン……\n森に、のみこまれている町、ですか」
2152 = "「Thị trấn ma……\nmột thị trấn bị nuốt chửng bởi khu rừng,\nphải không ạ.」"

# monologue
# JP: これは――凄い。\n植物の、自然の強さを思い知る。
2893 = "Thứ này——thật khủng khiếp.\nNó cho tôi thấy rõ sức mạnh của thực vật,\ncủa thiên nhiên."

# monologue
# JP: 人がいっとき、いかに繁栄しようとも、\n忍耐強く、自然は逆転の時を待って――勝つ。
2556 = "Cho dù con người có từng phồn vinh đến đâu\nđi chăng nữa,\nthiên nhiên vẫn kiên nhẫn chờ đợi thời cơ\nđảo ngược tình thế——và giành chiến thắng."

# 【ポーレット】
# display as 波萊特
# JP: 「宿舎、だったんですよね、ここ」
2090 = "「Nơi này, từng là ký túc xá anh nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1765 = "「唔？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「こんなにたくさんの宿舎が必要なほど――\n多くの人が、この炭鉱で働いていたんですよね」
1912 = "「Cần đến nhiều ký túc xá thế này——\nchứng tỏ đã từng có rất nhiều người làm\nviệc ở mỏ than này anh nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1930 = "「Ừ——」"

# monologue
# JP: そうか。\nそうなのだ。
2680 = "Ra là vậy.\nĐúng là như vậy."

# monologue
# JP: この過去は、この痕跡は。\n御一夜の未来を映す鏡であるとも見れるのだ。
2892 = "Quá khứ này, những dấu tích này.\nCũng có thể coi là tấm gương phản chiếu\ntương lai của Ohimitera."

# 【双鉄】
# display as 雙鐵
# JP: 「それほどまでの隆盛を極め――しかし、\n石炭需要の低減により、無人の廃墟と化してしまった」
2089 = "「Đã từng đạt đến đỉnh cao phồn thịnh như\nvậy——thế nhưng,\ndo nhu cầu về than giảm sút, nó đã hóa\nthành một đống đổ nát không người.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ゼロじゃありませんよね。\n\x%lエアクラ;#00ffc040;エアクラ%l;#;にだって、同じことが起きる可能性」
1351 = "「Khả năng đó không phải là con số không\nanh nhỉ.\nNgay cả với \\x%lエアクラ;#00ffc040;Aircra%l;#;, cũng có thể xảy ra\nđiều tương tự.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
1935 = "「Đúng vậy.」"

# monologue
# JP: \x%lエアクラ;#00ffc040;エアクラ%l;#;以前には、\n鉄道が、ガソリン自動車が人々の交通を支えていた。
2490 = "Trước khi có \\x%lエアクラ;#00ffc040;Aircra%l;#;,\nđường sắt và ô tô chạy xăng đã chống đỡ\ncho giao thông của con người."

# monologue
# JP: しかし今、\nそのどちらもが、青息吐息だ。
2786 = "Nhưng hiện tại,\ncả hai đều đang thoi thóp."

# 【双鉄】
# display as 雙鐵
# JP: 「\x%lエアクラ;#00ffc040;エアクラ%l;#;に勝る交通手段が誕生すれば、\nそれはいずれ、\x%lエアクラ;#00ffc040;エアクラ%l;#;を駆逐していくだろう」
1624 = "「Nếu một phương tiện giao thông vượt trội\nhơn \\x%lエアクラ;#00ffc040;Aircra%l;#; ra đời,\nthì sớm muộn gì nó cũng sẽ đánh bật \\x%lエアクラ;#00ffc040;Aircra%l;#;\nthôi.」"

# monologue
# JP: 十年後か、百年後か、一千年後かはわからんが――
2920 = "Dù không biết là mười năm sau, một trăm\nnăm sau, hay một ngàn năm sau——"

# monologue
# JP: 人間が人間として歩みを重ねていく限り、\nその日はいつか。いつか必ずやってくる。
2462 = "Chừng nào con người vẫn còn tiếp bước với\ntư cách là con người,\nthì ngày đó, một lúc nào đó chắc chắn sẽ\nđến."

# 【ポーレット】
# display as 波萊特
# JP: 「……御一夜にずっと暮らしている人たちは、\nこの景色、絶対に知ってる筈なのに――どうして」
1368 = "「……Những người luôn sống ở Ohimitera,\nchắc chắn phải biết đến cảnh tượng này\nchứ——vậy mà tại sao.」"

# monologue
# JP: どうして、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に賛成してしまうのか。
2783 = "Tại sao, họ lại tán thành việc thu hút nhà\nmáy \\x%lエアクラ;#00ffc040;Aircra%l;#; chứ."

# monologue
# JP: 途中で呑まれたその問いに、\nそれでも、僕は答えてしまう。
2516 = "Câu hỏi bị nuốt lại giữa chừng đó,\ndù vậy, tôi vẫn trả lời."

# 【双鉄】
# display as 雙鐵
# JP: 「規模があまりに大きすぎ、現実感を得られない。\nこの光景が日常の延長にあると、とても実感できんのだ」
2050 = "「Vì quy mô quá lớn, nên không mang lại cảm\ngiác chân thực.\nRất khó để cảm nhận được cảnh tượng này là\nmột phần nối dài của cuộc sống thường\nnhật.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1747 = "「Hả?」"

# 【双鉄】
# display as 雙鐵
# JP: 「くだらぬ言葉遊びのようになってしまうが……\n例えば日々姫には、この光景はまさに『絵』なのだ」
2140 = "「Nói ra thì hơi giống trò chơi chữ vô bổ\nnhưng mà……\nVí dụ với Hibiki, cảnh tượng này thực sự\nchỉ là một bức 『tranh』.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1766 = "「A.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫が特別なわけじゃない。僕も圧倒されてしまって、\n\x%lエアクラ;#00ffc040;エアクラ%l;#;工場のことと、言われるまでは重ならなかった」
1637 = "「Không phải vì Hibiki đặc biệt đâu. Anh\ncũng bị choáng ngợp,\ncho đến khi em nói, anh cũng chẳng liên hệ\nnó với nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そう……なんですね。\nだから、みんな」
1959 = "「Ra là…… vậy sao.\nThảo nào, mọi người.」"

# monologue
# JP: “伝わったな”と感じれば、\nそれはすぐさま、ポーレットへの新たな理解へと変わる。
2466 = "「Ra là…… vậy sao.\nThảo nào, mọi người.」"

# monologue
# JP: （やはりポーレットは……\n政治家としても、卓越した素質を持っているのだ）
3000 = "Ngay khi tôi cảm thấy \"đã truyền đạt được\nrồi\",\nđiều đó lập tức biến thành một sự thấu\nhiểu mới về Paulette."

# monologue
# JP: が、稀有な素質を、直観力を。鉄道面でも政治面でも、\n今のポーレットは活かしきれていない。
2410 = "（Quả nhiên Paulette……\nvới tư cách là một chính trị gia, em ấy\ncũng sở hữu tố chất xuất chúng.）"

# monologue
# JP: 『わかる』『見える』その感覚が明快すぎて、\n『わからない』『見えない』への想像力が働かんのだろう。
2483 = "「Sự khác biệt trong cách cảm nhận giữa\n\"mọi người\" và Paulette.\nĐó có lẽ chính là thứ gọi là tố chất của\nmột nhà lãnh đạo đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「“みんな”と、ポーレットとの感じ方の違い。\nそれこそ恐らく、リーダーの資質というものだ」
2002 = "「Hả!? Em, em á, làm gì có chuyện đó.」"

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　わたしっ、そんなっ」
1740 = "「Đôi mắt của Hibiki đã tìm thấy cái đẹp\ntrong cảnh tượng này.\nCòn đôi mắt của Paulette, lại nhìn thấy\nbài học từ nó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「日々姫の目は、この光景に美を見出した。\nポーレットの目は、この光景に教訓を見た」
1926 = "「Đôi mắt của Hibiki đã tìm thấy cái đẹp\ntrong cảnh tượng này.\nCòn đôi mắt của Paulette, lại nhìn thấy\nbài học từ nó.」"

# monologue
# JP: 同じ場所に居、同じ光景をその目に映し、\nけれども人は、実にさまざまなものを“見る”。
2872 = "Đứng ở cùng một nơi, cùng phản chiếu một\ncảnh tượng trong mắt,\nthế nhưng con người lại \"nhìn\" ra những\nthứ thực sự rất khác nhau."

# monologue
# JP: その目が何を見るかがつまり、その人間の、\n適正なのかもしれないと、ふっと感じる。
2590 = "Tôi chợt cảm thấy, đôi mắt ấy nhìn thấy\nđiều gì,\ncó lẽ cũng chính là sự phù hợp của người\nđó."

# 【双鉄】
# display as 雙鐵
# JP: 「その教訓は、他の者には見いだし難い。\nならば、それこそポーレットの持つ資質なのだ」
1684 = "「Bài học đó, những người khác rất khó để\nnhận ra.\nNếu vậy, đó chính là tố chất mà Paulette\nsở hữu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「けど――もしもそうだとしても」
1673 = "「Nhưng mà——cho dù có là vậy đi nữa.」"

# monologue
# JP: 険しい光が。\nその青い瞳に宿るところを、初めて目にする。
2641 = "Ánh nhìn gay gắt.\nLần đầu tiên tôi thấy nó hiện lên trong\nđôi mắt xanh thẳm ấy."

# monologue
# JP: それを溶かそうとするかのように、\nぐうっと、ポーレットは顔を空へと向ける。
2824 = "Như thể muốn làm tan chảy ánh nhìn đó,\nPaulette từ từ ngước mặt lên bầu trời."

# 【ポーレット】
# display as 波萊特
# JP: 「私が見つけた教訓に、\n誰も、耳を傾けてくれないなら」
1670 = "「Nếu bài học mà em tìm ra,\nchẳng có ai chịu lắng nghe thì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「伝わらないのは、単に伝え方の問題だろう。\nそれを一緒に、改善していけばいいだけだ」
1838 = "「Việc không truyền đạt được, đơn giản chỉ\nlà vấn đề ở cách truyền đạt thôi.\nChỉ cần chúng ta cùng nhau cải thiện điều\nđó là được.」"

# 【ポーレット】
# display as 波萊特
# JP: 「――！」
1359 = "「——!」"

# monologue
# JP: 雷にでも打たれたように、\nポーレットが目をまんまるくする。
2738 = "Như thể bị sét đánh trúng,\nPaulette mở to tròn hai mắt."

# monologue
# JP: 頬まで徐々に紅潮させて、\nじいっと僕を見つめてくる。
2931 = "Đôi má dần dần ửng đỏ,\nem ấy nhìn tôi chằm chằm."

# 【双鉄】
# display as 雙鐵
# JP: 「かつて、日々姫の絵によって、\n“赤は赤い”と、教えてもらったことがある」
1664 = "「Trước đây, thông qua bức tranh của\nHibiki,\nanh đã từng được dạy rằng \"Màu đỏ rất\nđỏ\".」"

# monologue
# JP: その経験を話してみれば、\nポーレットはぶんぶんと、何度も何度も強く頷く。
2827 = "Khi tôi kể lại trải nghiệm đó,\nPaulette gật đầu lia lịa, gật đi gật lại\nthật mạnh nhiều lần."

# 【双鉄】
# display as 雙鐵
# JP: 「この件は、直接的に\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に関わる問題だ。\n日々姫が知恵を貸してくれるかはわからん、が――」
2077 = "「Vụ này là vấn đề liên quan trực tiếp đến\nviệc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;.\nAnh không biết liệu Hibiki có chịu cho\nmượn chất xám không, nhưng——」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたし頑張れます。双鉄くんが一緒なら！\n伝え方、伝わるように、どんなにだって工夫します」
1725 = "「Em sẽ cố gắng ạ. Chỉ cần có anh Soutetsu\nở bên!\nCách truyền đạt, để có thể truyền đạt\nđược, dù thế nào em cũng sẽ nghĩ cách.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1804 = "「嗯」" 

# monologue
# JP: たとえ日々姫がそこまでは協力してくれずとも、\n真闇姉も、凪もふかみもいてくれる。
2555 = "Cho dù Hibiki không hợp tác đến mức đó đi\nchăng nữa,\nchúng tôi vẫn còn có chị Mayami, Nagi và\ncả Fukami."

# monologue
# JP: 日々姫の心を動かすようにもしも伝えることができたら、\nそれは恐らく、多くに伝わるものともなろう。
2545 = "Nếu có thể truyền đạt sao cho lay động\nđược trái tim của Hibiki,\nthì có lẽ, điều đó cũng sẽ truyền đạt được\ntới rất nhiều người."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、出来ることからやろう。\n今日は、カメラを持ってきているのだよな？」
2110 = "「Nếu vậy, hãy bắt đầu từ những việc có thể\nlàm đi.\nHôm nay, em có mang theo máy ảnh đúng\nkhông?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。記録の必要があるかと思って。\nあの――邪魔じゃなければ、双鉄くんの分も」
1947 = "「Vâng ạ. Em nghĩ là cần phải ghi chép lại.\nDạ——nếu không phiền thì, em có chuẩn bị cả\nphần của anh Soutetsu nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1754 = "「Ồ.」"

# monologue
# JP: 自分が写真を撮るなどと、思ったこともなかったが、\n手を貸すと決めた以上は、なんであれ行うべきだろう。
2922 = "Tôi chưa bao giờ nghĩ đến việc tự mình\nchụp ảnh,\nnhưng một khi đã quyết định giúp một tay,\nthì việc gì cũng nên làm."

# 【双鉄】
# display as 雙鐵
# JP: 「まるで経験が無いので、簡単なものだと助かるが――」
1890 = "「Anh hoàn toàn không có kinh nghiệm gì\nđâu, nên nếu là loại đơn giản thì tốt\nquá——」"

# 【ポーレット】
# display as 波萊特
# JP: 「任せてください！　パパ、マニアでしたから」
1703 = "「Cứ giao cho em! Ba em, từng là dân đam mê\nmáy ảnh mà.」"

# monologue
# JP: ポーレットが提げたバッグから、\nカメラがふたつ、取り出される。
2741 = "Từ chiếc túi mà Paulette xách theo,\nhai chiếc máy ảnh được lấy ra."

# monologue
# JP: 片方は、一眼レフ――でいいのだろうか？\nひどく重厚で、レバーやボタンが数多い。が――
2361 = "Một chiếc là máy ảnh phản xạ ống kính\nđơn——chắc vậy nhỉ?\nTrông cực kỳ đồ sộ, có vô số cần gạt và\nnút bấm. Nhưng mà——"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、\nこちらの小さなものは見るからに簡単そうだな」
1707 = "「Ra là vậy,\nchiếc nhỏ này thoạt nhìn có vẻ dễ sử dụng\nđấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、全部自動でやってくれますから。\nまず、電源をいれて――」
1954 = "「Vâng, nó sẽ tự động làm hết mọi thứ cho\nanh ạ.\nĐầu tiên, anh bật nguồn lên——」"

# monologue
# JP: ポーレットが僕のすぐ脇にたつ。\nカメラのうしろのディスプレイをふたりで覗き込む。
2750 = "Paulette đứng ngay sát bên cạnh tôi.\nHai chúng tôi cùng ghé mắt nhìn vào màn\nhình phía sau máy ảnh."

# monologue
# JP: ……頬が、近い。\nちょっと動けば、すぐにも触れてしまいそうだ。
1342 = "……Má em ấy, gần quá.\nChỉ cần nhúc nhích một chút thôi là có thể\nchạm vào ngay lập tức."

# 【ポーレット】
# display as 波萊特
# JP: 「ここに映った映像が、そのまま写真になりますから。\nこのレバーで、ズームしたりワイドにしたりして……」
1906 = "「Hình ảnh hiển thị ở đây sẽ trở thành bức\nảnh luôn đó ạ.\nDùng cần gạt này để phóng to hoặc thu nhỏ\ngóc chụp……」"

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1755 = "「Ừm.」"

# monologue
# JP: 僕に話しかけるとき、\nポーレットは律儀なまでにこちらを向く。
2476 = "Mỗi khi nói chuyện với tôi,\nPaulette luôn quay sang nhìn tôi một cách\nvô cùng nghiêm túc."

# monologue
# JP: かかってくる息がほの暖かで、くすぐったい。
2528 = "Hơi thở phả tới mang theo chút ấm áp,\nkhiến tôi thấy nhột nhột."

# 【ポーレット】
# display as 波萊特
# JP: 「それで、撮りたい画面を決めたら、\nシャッターボタンを押してあげれば――」
2012 = "「Rồi, sau khi đã quyết định được khung\nhình muốn chụp,\nanh chỉ cần nhấn nút chụp là——」"

# monologue
# JP: （ピピピっ……カシャッ！）
2996 = "（Bíp bíp bíp…… Tách!）"

# 【双鉄】
# display as 雙鐵
# JP: 「む？　今のでもう撮れたのか？」
1764 = "「Hửm? Vừa rồi là chụp xong rồi à?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、何千枚でもカードに記録できますから。\n失敗でも何でも、かまわずどんどん撮っちゃって下さい」
1955 = "「Vâng, thẻ nhớ có thể lưu được hàng nghìn\ntấm ảnh lận.\nNên dù có hỏng hay gì đi nữa, anh cứ thoải\nmái chụp thật nhiều vào nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2026 = "「Anh hiểu rồi.」"

# monologue
# JP: ポーレットの手からカメラを受け取る。\nわずかに触れる指先は、息よりもなお温かい。
2611 = "Tôi nhận lấy chiếc máy ảnh từ tay\nPaulette.\nĐầu ngón tay khẽ chạm vào nhau, còn ấm hơn\ncả hơi thở của em ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「一枚、撮ってみてもいいか？」
1894 = "「Anh chụp thử một tấm được không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「一枚といわず、何百枚でも！」
1698 = "「Đừng nói là một tấm, hàng trăm tấm cũng\nđược ạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「とりあえずは、試しの一枚でいい」
2039 = "「Tạm thời, cứ chụp thử một tấm đã.」"

# monologue
# JP: カメラを構える。\nモニターの中、ポーレットが驚きに顔を硬くする。
2632 = "Tôi giơ máy ảnh lên.\nTrong màn hình, khuôn mặt Paulette cứng đờ\nvì kinh ngạc."

# 【ポーレット】
# display as 波萊特
# JP: 「え？　あの、一枚って、わたしをですか？」
1746 = "「Hả? Dạ, một tấm là, chụp em ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。ダメか？\n対象物がはっきりしている方が良いかと思うのだが」
1800 = "「Ừm. Không được sao?\nAnh nghĩ chụp một đối tượng rõ ràng thì\ntốt hơn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、あの――三十秒だけ待ってください！」
1983 = "「Dạ không, dạ——xin hãy đợi em 30 giây!」"

# monologue
# JP: 後ろを向いてしゃがみこみ、手提げから化粧道具を出して、\n顔やら髪やら、ぱたぱたクシクシやり始める。
2534 = "Em ấy quay lưng lại ngồi xổm xuống, lấy đồ\ntrang điểm từ túi xách ra,\nbắt đầu dặm lại mặt và chải chuốt lại tóc\ntai."

# 【ポーレット】
# display as 波萊特
# JP: 「んっ――」
1794 = "「Ưm——」"

# monologue
# JP: ……優に五分が経過したが、さすがに僕も、\nこの状況で急かすほど世間知らずなわけでもない。
1338 = "……Năm phút đã trôi qua cái vèo, nhưng quả\nthực tôi cũng,\nkhông đến mức thiếu hiểu biết sự đời mà\nlại đi giục giã trong tình huống này."

# 【ポーレット】
# display as 波萊特
# JP: 「あのっ――おまたせしました」
2103 = "「Dạ——để anh đợi lâu rồi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ」
# 1804 = "「嗯」" 

# monologue
# JP: (ピピピ！　カシャッ)
32 = "(Bíp bíp bíp! Tách!)"

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　いきなりっ！？」
1742 = "「Hả!? Đột nhiên thế ạ!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「撮った写真は、どう見るのだ？」
1905 = "「Ảnh đã chụp thì xem thế nào?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あっ……えと、このボタンです」
1770 = "「A…… dạ, là nút này ạ.」"

# monologue
# JP: ポーレットの指が動くと同時、\nディスプレイには、撮ったばかりの写真が表示される。
2744 = "Ngay khi ngón tay Paulette vừa cử động,\ntrên màn hình hiển thị bức ảnh vừa mới\nchụp."

# 【ポーレット】
# display as 波萊特
# JP: 「わ」
1733 = "「Oa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう、これは凄い。\n小さくとも良いカメラなのだな」
1751 = "「Ồ, tuyệt thật.\nTuy nhỏ nhưng đúng là một chiếc máy ảnh\ntốt nhỉ.」"

# monologue
# JP: 動きの途中の一瞬を、\n鮮やかに、一枚の絵と切り取ってくれた。
2944 = "Một khoảnh khắc giữa chừng chuyển động,\nđã được bắt trọn sống động thành một bức\ntranh."

# 【双鉄】
# display as 雙鐵
# JP: 「これがいわゆる見返り美人、というヤツか。\nとても生き生きとして可愛らしい」
2082 = "「Đây chính là cái gọi là mỹ nhân ngoái đầu\nnhìn lại sao.\nTrông vô cùng sống động và đáng yêu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ぁ……ぁのっ……」
1774 = "「A…… dạ……」"

# monologue
# JP: 思ったことを、あまりに素直に言いすぎてしまったのか、\nポーレットは真っ赤になってうつむいてしまう。
2909 = "Có lẽ do tôi nói ra những gì mình nghĩ quá\nthẳng thắn,\nPaulette đỏ bừng mặt cúi gầm xuống."

# 【ポーレット】
# display as 波萊特
# JP: 「しゃ、写真……双鉄くん、才能――あるのかもですよ。\nほら、日々姫ちゃんのお兄さん、なんだし」
2141 = "「Chụp, chụp ảnh…… anh Soutetsu, có lẽ——có\ntài năng đấy ạ.\nThì, anh là anh trai của Hibiki mà.」"

# monologue
# JP: それはそうだが、義理の兄妹だ。
2927 = "Đúng là vậy, nhưng chúng tôi chỉ là anh em\nnuôi."

# monologue
# JP: 血の繋がりがない以上、\n同じ才を受け継ぐこともありえまい。
2597 = "Đã không cùng huyết thống,\nthì chuyện kế thừa cùng một tài năng là\nđiều không thể."

# 【双鉄】
# display as 雙鐵
# JP: 「単に、モデルとカメラが良いだけだろう」
1721 = "「Đơn giản chỉ là, do người mẫu và máy ảnh\ntốt thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「っ///////！」
1345 = "「っ///////!」"

# monologue
# JP: うつむいた、その口元が震えている。
2736 = "Cúi gầm mặt, khóe miệng em ấy đang run\nrẩy."

# monologue
# JP: 怒らせたかと一瞬ぎくりとさせられる、が――\nこれは、あれだ。こみ上げてくる喜びをこらえる口元だ。
2638 = "Trong khoảnh khắc tôi đã giật mình tưởng\nmình làm em ấy giận, nhưng——\nĐây là, cái đó. Khóe miệng đang cố kìm nén\nniềm vui sướng trào dâng."

# 【ポーレット】
# display as 波萊特
# JP: 「あのっ！　わたしも、写真……写真撮ってきます！」
2104 = "「Dạ! Em cũng, đi chụp…… đi chụp ảnh đây\nạ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 

# monologue
# JP: 駆け出したポーレットは、僕から大きく離れていく。
2751 = "Paulette chạy vọt đi, bỏ xa tôi một đoạn\nlớn."

# 【双鉄】
# display as 雙鐵
# JP: 「僕も撮るか」
1877 = "「Mình cũng chụp thôi.」"

# monologue
# JP: 使い方なら把握した。
2607 = "Tôi đã nắm được cách sử dụng."

# monologue
# JP: 失敗をいくらしても構わぬと聞いたし、\nここはともかく、数で勝負といってみよう。
2529 = "Nghe nói có chụp hỏng bao nhiêu cũng không\nsao,\nthì cứ lấy số lượng bù chất lượng xem sao."

# monologue
# JP: （パシャっ――パシャっ――）
2993 = "（Tách——Tách——）"

# monologue
# JP: しかし、寂しい。\nズームにすれば、空白さえもが鮮やかになる。
2377 = "Thế nhưng, thật vắng vẻ.\nNếu phóng to lên, ngay cả khoảng trống\ncũng trở nên sống động."

# monologue
# JP: 割れたガラス。置き去りにされてしまったカーテン。\n朽ちかけている木の雨戸に、蔦が這い寄り侵食していく。
2838 = "Kính vỡ. Tấm rèm bị bỏ lại.\nDây thường xuân bò đến xâm thực những tấm\ncửa chớp bằng gỗ đang mục nát."

# monologue
# JP: （パシャっ――）
2994 = "（Tách——）"

# monologue
# JP: そこにはもはや、映し出される顔がない。\n窓の向こうに、浮き上がってくる暖かさがない。
2809 = "Ở đó không còn khuôn mặt nào được phản\nchiếu nữa.\nPhía bên kia cửa sổ, cũng không còn sự ấm\náp nào hiện lên."

# monologue
# JP: この廃宿舎は、ここにかつてあった無数の暮らしの、\n今はただ――巨大な墓標と成り果ててしまったのだろう。
2894 = "Khu ký túc xá bỏ hoang này, từng là nơi\nsinh sống của vô số người,\nnhưng giờ đây——chỉ còn là một tấm bia mộ\nkhổng lồ mà thôi."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん！　双鉄くん！　ありました！！」
2142 = "「Anh Soutetsu! Anh Soutetsu! Thấy rồi ạ!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「むっ！？」
1756 = "「Hửm!?」"

# monologue
# JP: 駆け寄り見れば、\n“何がだ”と聞く必要は消え失せる。
2636 = "Chạy tới xem,\nthì không cần phải hỏi \"Thấy cái gì?\" nữa."

# monologue
# JP: ポーレットが指差す地面には、\nくっきりと――\x%lバラスト;#00ffc040;バラスト%l;#;と、\x%l枕木;#00ffc040;枕木%l;#;とが道を作っている。
2939 = "Trên mặt đất nơi Paulette chỉ tay,\nhiện lên rõ ràng——một con đường tạo bởi \\x%lバラスト;#00ffc040;đá ba-lát%l;#;\nvà \\x%l枕木;#00ffc040;tà vẹt đường ray%l;#;."

# 【双鉄】
# display as 雙鐵
# JP: 「これが……廃線跡か」
2081 = "「Đây là…… di tích tuyến đường sắt bỏ hoang\nsao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「すごく状態いいですね。\nここから先は――ほら、見てください」
1677 = "「Tình trạng vẫn còn rất tốt anh nhỉ.\nTừ đây trở đi——đó, anh nhìn xem.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あれが炭鉱……の、工場か？」
2124 = "「Đó là nhà máy…… của, mỏ than sao?」"

# monologue
# JP: ゆるやかに続く上りの彼方、\n丘、というか小山の向こうに、大きな工場が建っている。
2910 = "Phía xa của con dốc thoai thoải kéo dài,\nbên kia ngọn đồi, hay nói đúng hơn là ngọn\nnúi nhỏ, có một nhà máy lớn được xây dựng."

# monologue
# JP: 地域一帯を見下ろすそれは――\nまるで、石炭産業を守った砦のようだ。
2559 = "Nó nhìn xuống toàn bộ khu vực——\ncứ như một pháo đài bảo vệ ngành công\nnghiệp than đá vậy."

# 【ポーレット】
# display as 波萊特
# JP: 「このまま廃線跡をたどっていけば、\nあの工場のところにつけるんだと思います」
1731 = "「Nếu cứ đi dọc theo di tích tuyến đường\nsắt này,\nem nghĩ chúng ta sẽ đến được chỗ nhà máy\nđó đấy ạ.」"

# monologue
# JP: （パシャッ）
2995 = "（Tách）"

# monologue
# JP: 僕も数枚、廃線路の写真を撮ってから、\nその上に足を乗せてみる。
2619 = "Tôi cũng chụp vài tấm ảnh tuyến đường sắt\nbỏ hoang,\nsau đó thử đặt chân lên."

# monologue
# JP: \x%l枕木;#00ffc040;枕木%l;#;は、まだ朽ちていない。\nしっかりとした感触で、僕の両足を支えてくれる。
80 = "\\x%l枕木;#00ffc040;Tà vẹt đường ray%l;#; vẫn chưa bị mục nát.\nNó nâng đỡ hai bàn chân tôi với một cảm\ngiác vững chãi."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、行こう」
2121 = "「Nếu vậy, đi thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
# 1807 = "「嗯！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「――はぁ」
1358 = "「——Phù.」"

# monologue
# JP: 夢中になって廃線跡をたどっていた、\nポーレットの足がようやく止まる。
2596 = "Paulette mải mê đi dọc theo di tích tuyến\nđường sắt,\ncuối cùng cũng dừng bước."

# monologue
# JP: ここまで、かなりを歩いて来た。\nが――
2560 = "Chúng tôi đã đi bộ khá xa đến tận đây.\nNhưng mà——"

# 【ポーレット】
# display as 波萊特
# JP: 「まだ続いてますね、線路」
2059 = "「Đường ray, vẫn còn kéo dài anh nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 

# monologue
# JP: この近辺には、レールまでもが残っている。\n廃線跡というよりも、確かに、線路と呼びたくなる。
2897 = "Quanh khu vực này, ngay cả đường ray cũng\nvẫn còn sót lại.\nĐúng là muốn gọi nó là đường sắt hơn là di\ntích tuyến đường sắt bỏ hoang."

# 【双鉄】
# display as 雙鐵
# JP: 「恐らくは、\n坑道のすぐそばにまで続いているのではなかろうか」
1827 = "「Có lẽ là,\nnó kéo dài đến tận ngay sát hầm mỏ cũng\nnên.」"

# 【ポーレット】
# display as 波萊特
# JP: 「トロッコの方も残ってるかもしれませんね。\nこっちのレール、思ったより状態遥かにいいですし」
2021 = "「Có khi xe goòng cũng vẫn còn sót lại ấy\nchứ.\nĐường ray bên này, tình trạng tốt hơn em\nnghĩ rất nhiều.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、復線も出来そうか？」
2116 = "「Nếu vậy, khôi phục lại tuyến đường cũng\nkhả thi chứ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「この状態ならかなり容易に、予算も抑えて\nできるんじゃないかって思います。ただ――」
2014 = "「Với tình trạng này thì em nghĩ có thể làm\nkhá dễ dàng,\nvà còn tiết kiệm được ngân sách nữa. Có\nđiều——」"

# monologue
# JP: 青い瞳が、レールから外れ僕を向く。
2512 = "Đôi mắt xanh thẳm rời khỏi đường ray và\nhướng về phía tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「投資するだけの価値が、\nこの辺に残っていればの話ですけど」
2095 = "「Đó là trong trường hợp khu vực này,\ncòn lại những thứ đáng để đầu tư thôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 

# monologue
# JP: レールのまわりに広がっているのは、\n雑然とした光景だ。
2911 = "Trải rộng xung quanh đường ray,\nlà một khung cảnh lộn xộn."

# monologue
# JP: プレハブらしき建物たちのその奥に、\n山肌を切り支えるような、コンクリートの塊が見える。
2889 = "Phía sau những tòa nhà có vẻ như là nhà\nlắp ghép,\ntôi có thể nhìn thấy những khối bê tông\nnhư thể đang cắt ngang và chống đỡ sườn\nnúi."

# 【双鉄】
# display as 雙鐵
# JP: 「おそらく、あの下に坑道入口があるのだろうな」
1868 = "「Có lẽ, lối vào hầm mỏ nằm ở dưới đó nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ん……っと、ここからだと見えない、ですね」
1798 = "「Ưm…… từ đây thì không nhìn thấy được, anh\nnhỉ.」"

# monologue
# JP: ポーレットの目にあてられてるのは、\n長いレンズのついたカメラ。
2754 = "Thứ đang được đặt sát mắt Paulette,\nlà chiếc máy ảnh có ống kính dài."

# monologue
# JP: 見るからに物凄そうな望遠で、\n山肌の様子を伺っているようだ。
2907 = "Thoạt nhìn có vẻ là một ống kính tele cực\nkỳ xịn,\nem ấy dường như đang quan sát tình trạng\nsườn núi."

# 【ポーレット】
# display as 波萊特
# JP: 「あ……けど、なんだろう？　扉かな？」
1767 = "「A…… nhưng mà, cái gì kia nhỉ? Là cánh cửa\nsao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「バカ！　ポーレットっ！！！」
2036 = "「Ngốc! Paulette!!!」"

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　あっ！　きゃっ！！！」
1739 = "「Hả!? A! Á!!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「くうっ！」
1793 = "「Ư!」"

# monologue
# JP: 駆け寄りながら手を引き込んで、僕の体の上へと倒すっ！
2617 = "Tôi vừa lao tới vừa kéo tay em ấy lại, kéo\nngã lên người tôi!"

# 【ポーレット】
# display as 波萊特
# JP: 「あっ！？」
1782 = "「A!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
2155 = "「!!!」"

# monologue
# JP: （どううっ！！）
2985 = "（Rầm!!）"

# monologue
# JP: 軽くやわらかな衝撃のあと、\n背中をドンっ！　と激しく硬い痛みが襲う。
2877 = "Sau một cú va chạm nhẹ nhàng mềm mại,\nlà một cú đập mạnh! Một cơn đau cứng và dữ\ndội ập đến sau lưng."

# monologue
# JP: だが――ならばいい。\n池への転落。その最悪の事態は防げた。
2375 = "Nhưng——vậy thì tốt rồi.\nRơi xuống hồ. Ít nhất cũng ngăn chặn được\ntình huống tồi tệ nhất đó."

# 【ポーレット】
# display as 波萊特
# JP: 「あっ！？　双鉄くんっ？！！」
1781 = "「A!? Anh Soutetsu?!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「……大事無い。それより、ポーレットは」
1374 = "「……Không sao. Hơn nữa, Paulette thì sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたしは……平気。\nあの――助けてくれて、ありがとう」
1872 = "「Em thì…… không sao ạ.\nDạ——cảm ơn anh đã cứu em.」"

# 【双鉄】
# display as 雙鐵
# JP: 「何。そのために僕がいるのだ」
1979 = "「Có gì đâu. Anh ở đây là vì thế mà.」"

# monologue
# JP: 熱ささえともなう痛みが薄れてくれば――\n大丈夫、呼吸にも会話にも支障は無い。
2468 = "Khi cơn đau kèm theo sức nóng nhạt dần\nđi——\nKhông sao, không có vấn đề gì với việc hô\nhấp hay nói chuyện."

# monologue
# JP: （おっ、と）
2988 = "（Ây da.）"

# monologue
# JP: ポーレットを抱きしめてしまっている手を離し、\n立たせたあとに手を借りて、僕もそろそろ立ち上がる。
2623 = "Tôi buông bàn tay đang ôm chặt lấy\nPaulette ra,\nsau khi để em ấy đứng dậy, tôi mượn tay em\nấy và cũng từ từ đứng lên."

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、あのっ」
2108 = "「Em, dạ」"

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ」
1987 = "「Không sao đâu.」"

# monologue
# JP: レンズの向こうに見える情報を求めるあまり、\n数歩を、思わず歩いてしまった。
2537 = "Vì quá mải mê tìm kiếm thông tin hiện ra\nphía bên kia ống kính,\nnên em ấy đã vô tình bước đi vài bước."

# monologue
# JP: この手のことのフォローであれば、\n幸いなことに、慣れている。
2645 = "May mắn thay, tôi đã quen,\nvới việc xử lý những tình huống thế này."

# 【双鉄】
# display as 雙鐵
# JP: 「気にするな。それほどに深くを見る目であるから、\n僕らには映せぬものを見いだせるのだから」
1644 = "「Đừng bận tâm. Chính vì có đôi mắt nhìn\nsâu sắc đến vậy,\nnên em mới có thể tìm ra những thứ mà bọn\nanh không thể thấy được chứ.」"

# monologue
# JP: ほうっと、安心したような息を吐き。
2859 = "Em ấy thở phào một hơi như thể đã an tâm."

# monologue
# JP: けれどもすぐに姿勢を正し、\nポーレットはまっすぐに僕を見つめる。
2404 = "Thế nhưng ngay lập tức chỉnh đốn lại tư\nthế,\nPaulette nhìn thẳng vào tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが居てくれるから……油断しちゃってました。\nありがとうだけじゃなくて、ごめんなさい」
2133 = "「Vì có anh Soutetsu ở bên…… nên em đã lơ\nlà mất.\nKhông chỉ cảm ơn anh, mà em còn phải xin\nlỗi anh nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 

# monologue
# JP: きっちり、深く、頭を下げる。
2519 = "Em ấy cúi gập đầu xuống một cách trang\ntrọng."

# monologue
# JP: 詫びなど不要と感じはするが、\nそれがポーレットの礼節ならば、無論そのまま受け入れる。
2925 = "Tôi cảm thấy không cần thiết phải xin lỗi,\nnhưng nếu đó là phép tắc của Paulette, thì\ndĩ nhiên tôi sẽ cứ thế mà đón nhận."

# 【ポーレット】
# display as 波萊特
# JP: 「本当に助かりました。\nこの池……もしも落ちちゃってたら」
2024 = "「Thật sự cảm ơn anh đã cứu em.\nCái hồ này…… lỡ mà rơi xuống đó thì.」"

# monologue
# JP: 茶色と緑を混ぜた絵の具のような、\n美しいとは言いがたい色。
2701 = "Giống như màu sơn pha trộn giữa nâu và\nxanh lá,\nmột màu sắc khó có thể nói là đẹp đẽ."

# monologue
# JP: 水面をこわごわ覗き込み、\nポーレットはわずかに身震いする。
2745 = "Rụt rè nhìn xuống mặt nước,\nPaulette khẽ rùng mình."

# 【ポーレット】
# display as 波萊特
# JP: 「ちょっと……\nひどいことになっちゃいそうですよね」
1825 = "「Có vẻ……\nsẽ thành ra tồi tệ lắm đây.」"

# monologue
# JP: その色を示しているのが底の沈殿物のみであり、\n上部の水は澄んでいるのが、余計に怖く感じるのだろう。
2820 = "Thứ tạo ra màu sắc đó chỉ là lớp cặn dưới\nđáy,\ncòn phần nước bên trên lại trong vắt, điều\nnày càng khiến người ta thấy sợ hãi hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「これは恐らく、石炭の選別に使った池だ」
2079 = "「Có lẽ đây là cái hồ dùng để phân loại\nthan.」"

# 【ポーレット】
# display as 波萊特
# JP: 「選別、ですか？」
1693 = "「Phân loại, ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん。石炭から石炭くずや炭塵を取り除くのに\n使ったのだろう」
1802 = "「Ừ. Chắc là người ta dùng nó,\nđể loại bỏ xỉ than và bụi than ra khỏi\nthan đá.」"

# 【ポーレット】
# display as 波萊特
# JP: 「じゃあ、この底にたまってるの――\n石炭の粉とか、そこから出て来たものなんですか？」
2126 = "「Vậy thì, thứ đọng lại dưới đáy này——\nlà bột than hay những thứ thải ra từ đó\nsao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「恐らくはな」
1828 = "「Có lẽ là vậy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あの、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の話を聞いたとき、\n公害について、わたし、少し勉強したんですけど――」
2106 = "「Dạ, khi nghe nói về việc thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;\n,\nem cũng có tìm hiểu một chút về vấn đề ô\nnhiễm môi trường——」"

# monologue
# JP: 僕がしたのと同じことを、ポーレットもすでにやっていた。\n小さな事実が、なんとも嬉しく、心強い。
2451 = "Paulette cũng đã làm những việc giống hệt\ntôi.\nMột sự thật nhỏ bé, nhưng lại khiến tôi\nthấy vui vẻ và vững tâm đến lạ."

# 【ポーレット】
# display as 波萊特
# JP: 「工業排水だけじゃなくって、鉱山から湧出する水も――\n環境汚染、引き起こしちゃうことあるんですよね？」
1634 = "「Không chỉ nước thải công nghiệp, mà cả\nnước phun ra từ mỏ cũng——\ncó thể gây ra ô nhiễm môi trường đúng\nkhông ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そう考えると、\nこの池が野ざらしになっているのは、危険かもしれんな」
1932 = "「Ừ——nghĩ vậy thì,\nviệc để cái hồ này phơi sương phơi gió như\nvậy có khi lại nguy hiểm.」"

# 【ポーレット】
# display as 波萊特
# JP: 「って、思います。大雨とか台風きたら、\nかき混ぜられちゃうかもしれませんし」
1876 = "「Em cũng nghĩ thế. Nếu có mưa lớn hay bão\ntới,\nchúng có thể sẽ bị khuấy tung lên.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 

# monologue
# JP: どんな形で再利用するにせよ、いや、そうでなくても、\n環境汚染の危険を放置はしておけない。
2371 = "Dù có tái sử dụng dưới hình thức nào đi\nchăng nữa, à không, ngay cả khi không làm\nvậy,\nthì cũng không thể bỏ mặc nguy cơ ô nhiễm\nmôi trường được."

# 【双鉄】
# display as 雙鐵
# JP: 「坑道内部の調査に、\nその視点も加える必要がありそうだな」
2020 = "「Có vẻ chúng ta cần phải bổ sung thêm góc\nđộ đó,\nvào việc điều tra bên trong hầm mỏ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですね」
# 1935 = "「是啊」" 

# monologue
# JP: 今度はしっかり足を止め、\nポーレットは数枚のシャッターを切る。
2755 = "Lần này Paulette dừng chân đứng vững,\nrồi bấm máy chụp vài tấm ảnh."

# 【ポーレット】
# display as 波萊特
# JP: 「行ってみましょう。双鉄くん」
1881 = "「Chúng ta thử vào xem sao nhé. Anh\nSoutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 

# monologue
# JP: ……予想通りに、コンクリートの防壁の下には、\n大きなシャッターがついていた。
1336 = "……Đúng như dự đoán, bên dưới bức tường bê\ntông phòng hộ,\ncó gắn một cánh cửa cuốn lớn."

# monologue
# JP: その隣には、小さな扉。\n幸い、カギはかかっていない。
2916 = "Bên cạnh đó là một cánh cửa nhỏ.\nMay mắn thay, nó không bị khóa."

# 【双鉄】
# display as 雙鐵
# JP: 「入るぞ。ヘッドライトはつけたか？」
1883 = "「Vào thôi. Đã bật đèn đội đầu chưa?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、大丈夫です、双鉄くん」
2134 = "「Vâng, ổn rồi ạ, anh Soutetsu.」"

# monologue
# JP: （ぎい――ぃっ）
2979 = "（Két——）"

# 【ポーレット】
# display as 波萊特
# JP: 「わ」
# 1733 = "「哇」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは……\n資材も設備も、まるごと放棄していったのか」
2085 = "「Đây là……\nhọ đã bỏ lại toàn bộ vật tư và thiết bị\nluôn sao.」"

# monologue
# JP: トンネルの中は、予想よりもはるかに近代的な印象だ。
2500 = "Bên trong đường hầm, mang lại ấn tượng\nhiện đại hơn nhiều so với dự đoán."

# monologue
# JP: 電線と思しき線や、無数のパイプ。\nそれになにやら、巨大な布にくるまれた――
2799 = "Những đường dây có vẻ như là dây điện,\ncùng vô số đường ống.\nHơn nữa còn có thứ gì đó, được bọc trong\nmột tấm vải khổng lồ——"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ、なんだ……油が染みているのか？\nくそ、ベタベタと――」
1760 = "「Ưm, cái gì đây…… bị ngấm dầu sao?\nChết tiệt, dính nhớp nháp——」"

# 【ポーレット】
# display as 波萊特
# JP: 「わ、すごい――」
1735 = "「Oa, tuyệt quá——」"

# monologue
# JP: 油の染みたシートの下から、\n工作機械がごろん、とまるごと飛び出してくる。
2621 = "Từ bên dưới tấm bạt ngấm dầu,\nmột cỗ máy công cụ nguyên vẹn lù lù hiện\nra."

# monologue
# JP: いくつも、いくつも――\nその果てには、配電盤さえサビ一つ無く現れる。
2358 = "Rất nhiều, rất nhiều máy móc——\nvà ở tận cùng, thậm chí cả bảng điện cũng\nhiện ra mà không hề có một vết gỉ sét."

# 【ポーレット】
# display as 波萊特
# JP: 「よそでの使い道が無かったから……ですかね？\n炭鉱、次々に閉鎖されていった状況だったでしょうから」
1829 = "「Có lẽ vì…… không có chỗ nào khác cần dùng\nđến chúng chăng?\nBởi vì lúc đó là tình cảnh các mỏ than lần\nlượt đóng cửa mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なるほどな」
1787 = "「À, ra là vậy.」"

# monologue
# JP: （ぴちょんっ）
3001 = "（Tỏng）"

# monologue
# JP: 採炭という産業そのものが消えていくなら、\n資材設備を買い取ってくれる先もない。
2899 = "Nếu bản thân ngành công nghiệp khai thác\nthan đang biến mất,\nthì cũng chẳng có nơi nào chịu mua lại vật\ntư thiết bị cả."

# monologue
# JP: ひとつの滅びというものが、どれほど大規模なものなのか\n――その末端に触れた気がして、体が少し震えてしまう。
2356 = "Sự lụi tàn của một thứ, có quy mô to lớn\nđến nhường nào.\n——Cảm giác như vừa chạm vào một phần tận\ncùng của nó, cơ thể tôi khẽ run lên."

# 【ポーレット】
# display as 波萊特
# JP: 「けど――これだけ設備が残ってるなら。\nもし、この設備がまだ生きてるなら」
1651 = "「Nhưng mà——nếu vẫn còn lại ngần này thiết\nbị.\nGiả sử, những thiết bị này vẫn còn hoạt\nđộng được thì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、観光資源とできるかもしれん」
1942 = "「Ừ, có thể sẽ biến thành tài nguyên du\nlịch được đấy.」"

# monologue
# JP: 廃宿舎群もそうであったが、\nこの光景にも、かなり強烈なインパクトがある。
2923 = "Quần thể ký túc xá bỏ hoang cũng vậy,\nnhưng khung cảnh này cũng mang lại một tác\nđộng khá mạnh mẽ."

# monologue
# JP: （ぴちょんっ）
# 3001 = "（滴答）" 

# monologue
# JP: 採炭体験などの魅力をうまく打ち出せたのならば――\nああ、いや、そうか。
2580 = "Nếu có thể quảng bá tốt sức hấp dẫn của\nviệc trải nghiệm khai thác than——\nÀ, không, đúng rồi."

# 【双鉄】
# display as 雙鐵
# JP: 「たとえばだ、ポーレット」
2005 = "「Ví dụ nhé, Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、なんですか？　双鉄くん」
1973 = "「Vâng, chuyện gì vậy ạ? Anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;でここまで、あるいは術仙炭鉱廃駅まで来て、\nここで、石炭を体験採掘してもらう」
2052 = "「Đi \\x%l8620;#00ffc040;8620%l;#; đến tận đây, hoặc đến nhà ga bỏ\nhoang của mỏ than Jutsu-sen,\nrồi cho mọi người trải nghiệm khai thác\nthan ở đây.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1779 = "「啊！」" 

# monologue
# JP: わかってくれた。
2538 = "Em ấy đã hiểu ý tôi."

# monologue
# JP: ポーレットの顔に、\nヘッドライトよりも明るい笑みが浮かぶ。
2746 = "Trên khuôn mặt Paulette,\nnở một nụ cười còn rạng rỡ hơn cả ánh đèn\nđội đầu."

# 【ポーレット】
# display as 波萊特
# JP: 「面白いです！　それ！！　\n自分で掘った石炭でＳＬを動かせるとか！！」
1974 = "「Thú vị quá! Ý tưởng đó ấy!!\nĐược làm cho SL chạy bằng chính than do\nmình đào lên!!」"

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。これは、なんというか、ロマンがある。\n鉄道好きではない層にも、楽しんでもらえるはずだ」
1929 = "「Đúng không. Cái này, phải nói sao nhỉ,\nrất lãng mạn.\nChắc chắn ngay cả những người không thích\nđường sắt cũng sẽ thấy thích thú.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですよね、けど……炭鉱まで本格的に\n調査復興するんなら、御一夜鉄道だけじゃ、ちょっと」
1939 = "「Đúng vậy anh nhỉ, nhưng mà…… nếu phải\ntiến hành điều tra và khôi phục mỏ than\nmột cách bài bản, thì chỉ với Đường sắt\nOhito e là hơi khó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――予算的に苦しいか」
1795 = "「Ừ——ngân sách eo hẹp nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。ですから……何かもうひと押しのアイディアで、\n市の事業とかとも絡められる、と――」
1934 = "「Vâng. Vì vậy…… nếu có thêm một ý tưởng\nmang tính quyết định nào đó,\nđể có thể gắn kết nó với các dự án của\nthành phố thì——」"

# monologue
# JP: （ぴちょんっ）
# 3001 = "（滴答）" 

# 【ポーレット】
# display as 波萊特
# JP: 「くちょんっ！」
2135 = "「Hắt xì!」"

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か、ポーレット」
1980 = "「Không sao chứ, Paulette.」"

# monologue
# JP: くしゃみを聞いた瞬間に、\nぶるり、と僕の体も震える。
2826 = "Khoảnh khắc nghe thấy tiếng hắt xì,\ncơ thể tôi cũng bất giác run lên."

# monologue
# JP: 坑内の気温は相当低い。\nその上、ひっきりなしに水滴が降ってきてしまう。
2806 = "Nhiệt độ trong hầm khá thấp.\nHơn nữa, những giọt nước cứ liên tục rơi\nxuống."

# 【双鉄】
# display as 雙鐵
# JP: 「ひとまずは、外に出よう」
2038 = "「Trước mắt, cứ ra ngoài đã.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。双鉄くん、ごめんなさい」
1836 = "「A, vâng. Anh Soutetsu, em xin lỗi.」"

# monologue
# JP: ポーレットをつれ、陽のあたる場所。\nさきほどの沈殿池の近くへ戻る。
2610 = "Tôi đưa Paulette đến nơi có ánh nắng mặt\ntrời.\nQuay trở lại gần hồ lắng cặn lúc nãy."

# 【双鉄】
# display as 雙鐵
# JP: 「……なんに使うにせよ、あの水はなんとかせねばな」
1379 = "「……Dù dùng vào việc gì đi nữa, cũng phải\ngiải quyết đống nước đó thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですね、足元もぬかるんでるし、\n天井からも、ずっとぽたぽたぽたぽたって」
1937 = "「Đúng vậy anh nhỉ, dưới chân thì lầy lội,\nmà từ trên trần, nước cứ nhỏ giọt tỏng\ntỏng suốt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か？　ずいぶんと濡れてしまっているが」
1981 = "「Không sao chứ? Em bị ướt sũng rồi kìa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。\n炭鉱の中は少し肌寒かったですけど――っ！！？」
1791 = "「A, vâng.\nBên trong mỏ than hơi se lạnh một chút\nnhưng——ơ!!?」"

# monologue
# JP: ばっ！　と、ポーレットが両手で自分の体を抱いて、\n半身にひねって隠すようにする。
2479 = "Phắt! Paulette dùng hai tay ôm lấy cơ thể\nmình,\nxoay nửa người lại như thể muốn che giấu."

# monologue
# JP: そうされて、ああ、そうだったかと理解する。
2798 = "Thấy em ấy làm vậy, tôi mới à lên hiểu ra\nvấn đề."

# monologue
# JP: （濡れたせいで――\n服が、ずいぶんと透けてしまっていたな）
2998 = "（Vì bị ướt nên——\nquần áo đã trở nên khá trong suốt rồi.）"

# monologue
# JP: ポーレットとは登呂流湯で、同じ湯船につかっている。\n服から肌が透けたとて、今さら何をという他にない。
2604 = "Tôi và Paulette đã từng ngâm chung một bồn\ntắm ở Tororyu-yu.\nDù da thịt có lộ qua lớp áo ướt, thì giờ\ncũng chẳng còn gì để phải ngại ngùng nữa."

# monologue
# JP: ――はずなのだけれど、\n恥じらう姿のせいなのか、僕まで照れくさい感じをうける。
1317 = "——Lẽ ra là vậy,\nnhưng có lẽ vì dáng vẻ thẹn thùng của em\nấy, mà đến cả tôi cũng cảm thấy xấu hổ\nlây."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、これを」
2006 = "「Paulette, cái này.」"

# monologue
# JP: 僕のシャツも、それほどではないが濡れている。\n脱いで絞って、軽く振る。
2633 = "Áo sơ mi của tôi cũng bị ướt, dù không đến\nmức sũng nước.\nTôi cởi nó ra, vắt kiệt rồi giũ nhẹ."

# 【双鉄】
# display as 雙鐵
# JP: 「いやでなければ、羽織ってくれ」
2047 = "「Nếu không chê, hãy khoác nó lên đi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「いやなんて、そんなことあるはずありません」
1893 = "「Làm sao em có thể chê được chứ.」"

# monologue
# JP: 受け取り、羽織る。\n途端、ポーレットは心地よさげにその目を細める。
2515 = "Em ấy nhận lấy và khoác lên người.\nNgay lập tức, Paulette nheo mắt lại một\ncách thoải mái."

# 【ポーレット】
# display as 波萊特
# JP: 「なんか……あったかいです。\n双鉄くんの匂い……するみたいで」
1896 = "「Cảm giác…… ấm quá.\nHình như…… có mùi của anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　あたたまるのであれば、よかった」
1963 = "「Vậy sao? Nếu nó giúp em ấm lên thì tốt\nrồi.」"

# monologue
# JP: この気温で、この陽射しだ。
2505 = "Với nhiệt độ và ánh nắng thế này."

# monologue
# JP: ほどなく暑くなるだろうが、\nその頃には、ポーレットの服も乾くだろう。
2589 = "Chẳng mấy chốc sẽ nóng lên thôi,\nnhưng đến lúc đó, quần áo của Paulette\nchắc cũng đã khô rồi."

# monologue
# JP: （それにしても……\n水も滴るいい男という言葉はあるが――）
2976 = "（Dù vậy……\nTuy có câu nói \"đẹp trai đến mức nước cũng\nphải nhỏ giọt\"——）"

# monologue
# JP: うっすらと水を含んだ髪の、なんと艶やかなことだろう。
2434 = "Mái tóc hơi ngậm nước kia, sao lại bóng\nmượt đến vậy."

# monologue
# JP: ポーレットは、極めて美しい女性なのだと、\n初めて気づいた――いいや、目にしたような気になる。
2640 = "Paulette là một người phụ nữ cực kỳ xinh\nđẹp,\nlần đầu tiên tôi nhận ra điều đó——không,\ncảm giác như lần đầu tiên tôi được chiêm\nngưỡng thì đúng hơn."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？」
2143 = "「Anh Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや、あれだ」
1785 = "「À, không, là chuyện này.」"

# monologue
# JP: そんなつもりはなかったが、\n結果として、盗み見る形になってしまった。
2601 = "Tôi không cố ý,\nnhưng kết quả là lại thành ra như đang\nnhìn trộm."

# monologue
# JP: 申し訳無さと気恥ずかしさに、言葉を次々並べてしまう。
2639 = "Cảm thấy có lỗi và xấu hổ, tôi vội vàng\ntuôn ra một tràng."

# 【双鉄】
# display as 雙鐵
# JP: 「思っただけだ。その――あふれた水での環境汚染や――\nああ、そうだ。落盤や爆発の危険もあるか、と」
1887 = "「Anh chỉ đang nghĩ thôi. Rằng——nước tràn\nra có thể gây ô nhiễm môi trường——\nÀ, đúng rồi. Liệu có nguy cơ sập hầm hay\ncháy nổ không nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうですね」
# 1935 = "「是啊」" 

# monologue
# JP: ポーレットの顔が引き締まる。
2747 = "Nét mặt Paulette trở nên căng thẳng."

# monologue
# JP: 空気の流れが変わってくれてホっとして、\n言葉は、さらに滑らかになる。
2614 = "Bầu không khí thay đổi khiến tôi thở phào\nnhẹ nhõm,\nlời nói cũng trở nên trơn tru hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「資源と出来れば何よりだが……出来なかった場合には、\nこの廃鉱山、御一夜にずいぶんな迷惑を」
2084 = "「Nếu có thể biến thành tài nguyên thì\nkhông còn gì bằng…… nhưng trong trường hợp\nkhông thể,\nthì khu mỏ bỏ hoang này, sẽ mang đến rắc\nrối lớn cho Ohimitera.」"

# 【ポーレット】
# display as 波萊特
# JP: 「違います。双鉄くん」
1642 = "「Không phải vậy đâu. Anh Soutetsu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
2156 = "「!?」"

# monologue
# JP: とても、静かに。\nしかし断固と、ポーレットは僕の言葉を止める。
2740 = "Rất tĩnh lặng.\nNhưng đầy kiên quyết, Paulette cắt ngang\nlời tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「山も、水も、石炭も、迷惑なんてかけません。\nずっと昔からここにあって、ありつづけてるだけ」
1847 = "「Cả núi, cả nước, cả than đá, đều không\ngây rắc rối gì cả.\nChúng chỉ luôn ở đây từ rất lâu rồi, và\nvẫn sẽ tiếp tục ở đây mà thôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2154 = "「！」" 

# monologue
# JP: ばくん、と心臓が跳ね上がる。
2613 = "Thịch, trái tim tôi đập thót một nhịp."

# monologue
# JP: ポーレットの美に見とれてしまった、\nその一瞬より、何十倍も、熱く、激しく。
2903 = "Nóng bỏng và mãnh liệt hơn gấp hàng chục\nlần,\nso với khoảnh khắc tôi bị hớp hồn bởi vẻ\nđẹp của Paulette."

# 【ポーレット】
# display as 波萊特
# JP: 「迷惑なものにされたんです。掘り出され、放置されて。\nそれは、鉱山の責任じゃない」
1899 = "「Chúng đã bị biến thành thứ gây rắc rối.\nBị đào lên, rồi bị bỏ mặc.\nĐó không phải là trách nhiệm của mỏ than.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ。責任は、そうさせた側にある」
1808 = "「À, đúng vậy. Trách nhiệm thuộc về phía đã\nlàm như thế.」"

# monologue
# JP: 遠い記憶が、喉を動かす。
2363 = "Ký ức xa xăm thôi thúc cổ họng tôi cất\nlời."

# 【双鉄】
# display as 雙鐵
# JP: 「悪いのは――間違えるのはいつだって、人間だ」
1964 = "「Kẻ có lỗi——kẻ phạm sai lầm lúc nào cũng\nlà con người.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1804 = "「嗯」" 

# monologue
# JP: わかってもらえた。\n言わんばかりに、ポーレットは淡い笑顔を浮かべる。
2735 = "Như thể muốn nói \"Anh đã hiểu cho em rồi\",\nPaulette nở một nụ cười nhạt."

# monologue
# JP: 僕の心の一番奥底。\n一番大事なところに浮かぶ、遠い笑顔とそっくりに。
2525 = "Giống hệt với nụ cười xa xăm hiện lên ở\nnơi sâu thẳm nhất trong trái tim tôi.\nỞ nơi quan trọng nhất."

# monologue
# JP: （ああ――）
# 2992 = "（啊――）" 

# monologue
# JP: 確かめたい、尋ねてみたいと、\n跳ね上がった胸が焦げていく。
2543 = "Muốn xác nhận, muốn thử hỏi xem,\nlồng ngực đang đập thình thịch như bị\nthiêu đốt."

# monologue
# JP: だが、僕はいま、動揺をして混乱している。\nこれほど大事な質問を、できる状態とは思えない。
2408 = "Nhưng, tôi hiện tại đang dao động và bối\nrối.\nTôi không nghĩ mình đang ở trạng thái có\nthể hỏi một câu hỏi quan trọng như vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、だ」
2037 = "「Nói chung là.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1804 = "「嗯」" 

# monologue
# JP: だから、言葉を絞り出す。\n感情の全てを抑えこむその、隙間から。
2600 = "Vì vậy, tôi cố nặn ra từng chữ.\nTừ khe hở của việc kìm nén mọi cảm xúc."

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、一度持ち帰ろう」
2040 = "「Nói chung là, trước tiên cứ mang chuyện\nnày về đã.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですね、環境防護のためにも――\nどうしていくか、もっと多くのアイディアが必要です」
1941 = "「Đúng vậy anh nhỉ, vì mục đích bảo vệ môi\ntrường nữa——\nchúng ta cần thêm nhiều ý tưởng hơn về\nviệc sẽ phải làm gì tiếp theo.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 

# monologue
# JP: ポーレットが一歩を先に踏み出す。\nそうして、僕へと振り返る。
2737 = "Paulette bước lên trước một bước.\nSau đó, em ấy ngoảnh lại nhìn tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「なら、戻りましょう。双鉄くん！」
2122 = "「Vậy thì, chúng ta quay về thôi. Anh\nSoutetsu!」"
