# monologue
# JP: 茶色と緑を混ぜた絵の具のような、\n美しいとは言いがたい色。
2701 = "池水混合著棕色和綠色，就像是倒入了各種顏料的鐵桶，實在是說不上好看。" 

# monologue
# JP: 水面をこわごわ覗き込み、\nポーレットはわずかに身震いする。
2745 = "波萊特有些害怕地窺視池水，打了個寒戰。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ちょっと……\nひどいことになっちゃいそうですよね」
1825 = "「大概……會很慘吧」" 

# monologue
# JP: その色を示しているのが底の沈殿物のみであり、\n上部の水は澄んでいるのが、余計に怖く感じるのだろう。
2820 = "給池子染上顏色的似乎只有底部的沉積物，上面的水是清澈的，但這反而讓人更加感到恐懼吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは恐らく、石炭の選別に使った池だ」
2079 = "「這大概是用來分選煤炭的池子」" 

# 【ポーレット】
# display as 波萊特
# JP: 「選別、ですか？」
1693 = "「分選？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。石炭から石炭くずや炭塵を取り除くのに\n使ったのだろう」
1802 = "「嗯。就是從挖出來的煤炭裡除掉煤渣和煤粉」" 

# 【ポーレット】
# display as 波萊特
# JP: 「じゃあ、この底にたまってるの――\n石炭の粉とか、そこから出て来たものなんですか？」
2126 = "「那沉在池底的都是煤炭的粉末和渣滓形成的東西？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「恐らくはな」
1828 = "「大概是了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの、\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の話を聞いたとき、\n公害について、わたし、少し勉強したんですけど――」
2106 = "「那個，我在知道\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶計劃之後，也學習了一些關於環境汙染的知識——」" 

# monologue
# JP: 僕がしたのと同じことを、ポーレットもすでにやっていた。\n小さな事実が、なんとも嬉しく、心強い。
2451 = "原來波萊特也和我做了一樣的事。得知這小小的事實讓我感到有些欣喜。" 

# 【ポーレット】
# display as 波萊特
# JP: 「工業排水だけじゃなくって、鉱山から湧出する水も――\n環境汚染、引き起こしちゃうことあるんですよね？」
1634 = "「不光是工業排水，礦山排出來的水有時也會汙染環境吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そう考えると、\nこの池が野ざらしになっているのは、危険かもしれんな」
1932 = "「是啊……這麼一想，就這樣把那個池子晾在外面說不定有點危險」" 

# 【ポーレット】
# display as 波萊特
# JP: 「って、思います。大雨とか台風きたら、\nかき混ぜられちゃうかもしれませんし」
1876 = "「我也是這麼想的。要是下大雨或者颳颱風，就有可能把汙水捲進河裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 

# monologue
# JP: どんな形で再利用するにせよ、いや、そうでなくても、\n環境汚染の危険を放置はしておけない。
2371 = "不管最後決定如何對廢煤礦進行二次利用——不，就算沒有利用價值也不能放任汙水汙染環境。" 

# 【双鉄】
# display as 雙鐵
# JP: 「坑道内部の調査に、\nその視点も加える必要がありそうだな」
2020 = "「看來在調查礦洞內部時也需要注意這個方面啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね」
# 1935 = "「是啊」" 

# monologue
# JP: 今度はしっかり足を止め、\nポーレットは数枚のシャッターを切る。
2755 = "波萊特這次好好站穩，按下幾次快門。" 

# 【ポーレット】
# display as 波萊特
# JP: 「行ってみましょう。双鉄くん」
1881 = "「我們去看看吧，雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 

# monologue
# JP: ……予想通りに、コンクリートの防壁の下には、\n大きなシャッターがついていた。
1336 = "……和我預想的一樣，混凝土屏障下方有一道巨大的閘門。" 

# monologue
# JP: その隣には、小さな扉。\n幸い、カギはかかっていない。
2916 = "閘門旁有一扇小門，幸好沒有上鎖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「入るぞ。ヘッドライトはつけたか？」
1883 = "「我們進去吧。安全帽的燈開了嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、大丈夫です、双鉄くん」
2134 = "「開了，好的，雙鐵君」" 

# monologue
# JP: （ぎい――ぃっ）
2979 = "（吱呀——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「わ」
# 1733 = "「哇」" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは……\n資材も設備も、まるごと放棄していったのか」
2085 = "「這是……看來所有資材和設備都沒有運走，直接被丟棄在原地了啊」" 

# monologue
# JP: トンネルの中は、予想よりもはるかに近代的な印象だ。
2500 = "坑道中的景象比我想像的還要現代化。" 

# monologue
# JP: 電線と思しき線や、無数のパイプ。\nそれになにやら、巨大な布にくるまれた――
2799 = "看起來像是電線的線路以及無數的管道。除此之外，還有一些用巨大的布包裹著的東西。" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ、なんだ……油が染みているのか？\nくそ、ベタベタと――」
1760 = "「唔，怎麼回事……上面被油浸透了嗎？可惡，黏黏的——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わ、すごい――」
1735 = "「哇，好厲害……」" 

# monologue
# JP: 油の染みたシートの下から、\n工作機械がごろん、とまるごと飛び出してくる。
2621 = "我掀開被油浸濕的布，被蓋住的原來是一整台工具機。" 

# monologue
# JP: いくつも、いくつも――\nその果てには、配電盤さえサビ一つ無く現れる。
2358 = "一台又一台工具機展現在我們眼前——而且就連配電盤都沒有生鏽。" 

# 【ポーレット】
# display as 波萊特
# JP: 「よそでの使い道が無かったから……ですかね？\n炭鉱、次々に閉鎖されていった状況だったでしょうから」
1829 = "「大概是別的地方也不需要這些東西了吧？畢竟當時煤礦一家接著一家倒閉」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なるほどな」
1787 = "「啊，原來如此」" 

# monologue
# JP: （ぴちょんっ）
3001 = "（滴答）" 

# monologue
# JP: 採炭という産業そのものが消えていくなら、\n資材設備を買い取ってくれる先もない。
2899 = "連煤礦這個產業都倒了，這些設備和資材也就失去了用武之地。" 

# monologue
# JP: ひとつの滅びというものが、どれほど大規模なものなのか\n――その末端に触れた気がして、体が少し震えてしまう。
2356 = "一件事物的毀滅會導致多少連鎖反應——如今的我雖然只觸及到它的末端之一，也足夠讓我感到後背有些發涼。" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど――これだけ設備が残ってるなら。\nもし、この設備がまだ生きてるなら」
1651 = "「不過——既然留下了這麼多設備，要是這些設備還能用的話——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、観光資源とできるかもしれん」
1942 = "「是啊，說不定能當做觀光資源利用起來」" 

# monologue
# JP: 廃宿舎群もそうであったが、\nこの光景にも、かなり強烈なインパクトがある。
2923 = "雖然剛才的廢棄宿舍群很壯觀，但眼前這幅景象也同樣能讓人感受到強烈的震撼。" 

# monologue
# JP: （ぴちょんっ）
# 3001 = "（滴答）" 

# monologue
# JP: 採炭体験などの魅力をうまく打ち出せたのならば――\nああ、いや、そうか。
2580 = "怎樣才能夠展現親手採礦的魅力呢——啊，對了，還有這一手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「たとえばだ、ポーレット」
2005 = "「波萊特，比方說」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、なんですか？　双鉄くん」
1973 = "「比方什麼？　雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「\x%l8620;#00ffc040;8620%l;#;でここまで、あるいは術仙炭鉱廃駅まで来て、\nここで、石炭を体験採掘してもらう」
2052 = "「讓\\x%l8620;#00ffc040;８６２０%l;#;載著乘客到這裡或者是術仙煤礦廢車站，然後讓他們在這裡體驗挖掘煤炭」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1779 = "「啊！」" 

# monologue
# JP: わかってくれた。
2538 = "她馬上就懂了。" 

# monologue
# JP: ポーレットの顔に、\nヘッドライトよりも明るい笑みが浮かぶ。
2746 = "波萊特的臉上浮現出比安全帽燈還要明亮的笑容。" 

# 【ポーレット】
# display as 波萊特
# JP: 「面白いです！　それ！！　\n自分で掘った石炭でＳＬを動かせるとか！！」
1974 = "「比方說，用自己挖出來的煤礦讓蒸汽機車運轉！　一定會很有趣的！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。これは、なんというか、ロマンがある。\n鉄道好きではない層にも、楽しんでもらえるはずだ」
1929 = "「是吧。怎麼形容呢，感覺很浪漫啊。就算不怎麼喜歡鐵路的客人應該也能樂在其中」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですよね、けど……炭鉱まで本格的に\n調査復興するんなら、御一夜鉄道だけじゃ、ちょっと」
1939 = "「是啊，不過……如果要連煤礦也一起重新調查然後復活，只憑御一夜鐵路的話恐怕……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――予算的に苦しいか」
1795 = "「嗯——預算恐怕不夠吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。ですから……何かもうひと押しのアイディアで、\n市の事業とかとも絡められる、と――」
1934 = "「是啊。所以……最好能有決定性的點子讓這些和市政府的工作連接起來——啊」" 

# monologue
# JP: （ぴちょんっ）
# 3001 = "（滴答）" 

# 【ポーレット】
# display as 波萊特
# JP: 「くちょんっ！」
2135 = "「阿嚏！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か、ポーレット」
1980 = "「沒事吧，波萊特」" 

# monologue
# JP: くしゃみを聞いた瞬間に、\nぶるり、と僕の体も震える。
2826 = "聽到她打噴嚏的同時，我也冷得顫抖了一下。" 

# monologue
# JP: 坑内の気温は相当低い。\nその上、ひっきりなしに水滴が降ってきてしまう。
2806 = "礦洞內的氣溫相當低。而且還不斷有水滴從頂端滴滴答答流下來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひとまずは、外に出よう」
2038 = "「總之我們先出去吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。双鉄くん、ごめんなさい」
1836 = "「好的。雙鐵君，對不起」" 

# monologue
# JP: ポーレットをつれ、陽のあたる場所。\nさきほどの沈殿池の近くへ戻る。
2610 = "我帶著波萊特離開礦洞，來到了陽光能照到的地方，也就是剛才的沉澱池附近。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……なんに使うにせよ、あの水はなんとかせねばな」
1379 = "「……總之，得先想辦法處理一下洞裡的那些水」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね、足元もぬかるんでるし、\n天井からも、ずっとぽたぽたぽたぽたって」
1937 = "「是啊，不光腳下打滑，還從天花板上一直滴水」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫か？　ずいぶんと濡れてしまっているが」
1981 = "「沒事吧？　你全身都濕了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。\n炭鉱の中は少し肌寒かったですけど――っ！！？」
1791 = "「啊，沒事的。只是礦洞裡有些冷——啊！！？」" 

# monologue
# JP: ばっ！　と、ポーレットが両手で自分の体を抱いて、\n半身にひねって隠すようにする。
2479 = "啪！　波萊特突然扭過身子，雙臂環繞在胸前，試圖遮擋自己的上半身。" 

# monologue
# JP: そうされて、ああ、そうだったかと理解する。
2798 = "看到她這麼做，我才明白。" 

# monologue
# JP: （濡れたせいで――\n服が、ずいぶんと透けてしまっていたな）
2998 = "（因為被水打濕了——她的衣服變得有些透明啊）" 

# monologue
# JP: ポーレットとは登呂流湯で、同じ湯船につかっている。\n服から肌が透けたとて、今さら何をという他にない。
2604 = "我和波萊特在登呂流浴場可是用同一個浴缸的關係。就算如今看到她被水打濕，衣服變透明了也不會覺得有什麼。" 

# monologue
# JP: ――はずなのだけれど、\n恥じらう姿のせいなのか、僕まで照れくさい感じをうける。
1317 = "——說是這麼說，但或許是因為她實在太過害羞，連我都不好意思了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、これを」
2006 = "「波萊特，穿上這個吧」" 

# monologue
# JP: 僕のシャツも、それほどではないが濡れている。\n脱いで絞って、軽く振る。
2633 = "我脫下襯衫。雖然濕得不是很厲害，但我還是儘量把它擰乾然後甩了甩。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いやでなければ、羽織ってくれ」
2047 = "「要是不願意穿，披上也可以」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いやなんて、そんなことあるはずありません」
1893 = "「我怎麼會不願意呢」" 

# monologue
# JP: 受け取り、羽織る。\n途端、ポーレットは心地よさげにその目を細める。
2515 = "她接過襯衫，披在身上。然後有些舒服地眯起眼睛。" 

# 【ポーレット】
# display as 波萊特
# JP: 「なんか……あったかいです。\n双鉄くんの匂い……するみたいで」
1896 = "「我覺得……好溫暖。襯衫好像帶著雙鐵君的味道」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか？　あたたまるのであれば、よかった」
1963 = "「有嗎？　不過只要能讓你暖和起來就好」" 

# monologue
# JP: この気温で、この陽射しだ。
2505 = "夏天的氣溫加上陽光。" 

# monologue
# JP: ほどなく暑くなるだろうが、\nその頃には、ポーレットの服も乾くだろう。
2589 = "應該很快會覺得熱，不過到那時波萊特的衣服也該乾了。" 

# monologue
# JP: （それにしても……\n水も滴るいい男という言葉はあるが――）
2976 = "（不過，不是有種說法叫嬌艷欲滴嗎——）" 

# monologue
# JP: うっすらと水を含んだ髪の、なんと艶やかなことだろう。
2434 = "其實就是指稍微被水打濕的秀髮會散發出艷麗的色澤吧。" 

# monologue
# JP: ポーレットは、極めて美しい女性なのだと、\n初めて気づいた――いいや、目にしたような気になる。
2640 = "我頭一次注意到，原來波萊特是一位非常美麗的女性——不，應該說，彷彿頭一次看到。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？」
2143 = "「雙鐵君？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや、あれだ」
1785 = "「啊，不，沒什麼」" 

# monologue
# JP: そんなつもりはなかったが、\n結果として、盗み見る形になってしまった。
2601 = "我原本沒有這個打算，結果一直盯著她好像被她當做我在偷看了。" 

# monologue
# JP: 申し訳無さと気恥ずかしさに、言葉を次々並べてしまう。
2639 = "我頓時感到愧疚和羞恥，慌不擇言。" 

# 【双鉄】
# display as 雙鐵
# JP: 「思っただけだ。その――あふれた水での環境汚染や――\nああ、そうだ。落盤や爆発の危険もあるか、と」
1887 = "「我只是在想，那個——礦洞裡的水流出來造成的環境汙染。還有——對，會不會有塌陷和爆炸的危險」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、そうですね」
# 1935 = "「是啊」" 

# monologue
# JP: ポーレットの顔が引き締まる。
2747 = "波萊特的表情嚴肅起來。" 

# monologue
# JP: 空気の流れが変わってくれてホっとして、\n言葉は、さらに滑らかになる。
2614 = "我感覺到氣氛沒有那麼尷尬了，終於能用平常心和她交談。" 

# 【双鉄】
# display as 雙鐵
# JP: 「資源と出来れば何よりだが……出来なかった場合には、\nこの廃鉱山、御一夜にずいぶんな迷惑を」
2084 = "「這座廢礦山要是能成為經營資源自然是最好的……要是不成，那就真是給御一夜添了大麻煩」" 

# 【ポーレット】
# display as 波萊特
# JP: 「違います。双鉄くん」
1642 = "「不是這樣的，雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！？」
2156 = "「！？」" 

# monologue
# JP: とても、静かに。\nしかし断固と、ポーレットは僕の言葉を止める。
2740 = "波萊特安靜但卻毅然決然地打斷我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「山も、水も、石炭も、迷惑なんてかけません。\nずっと昔からここにあって、ありつづけてるだけ」
1847 = "「山也好、水也好、煤礦也好，都不會給人帶來麻煩。它們只是從以前開始就一直存在於這裡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2154 = "「！」" 

# monologue
# JP: ばくん、と心臓が跳ね上がる。
2613 = "我感到心臟劇烈地跳動了一下。" 

# monologue
# JP: ポーレットの美に見とれてしまった、\nその一瞬より、何十倍も、熱く、激しく。
2903 = "遠勝過被波萊特的美麗所俘虜的那一刻數十倍。" 

# 【ポーレット】
# display as 波萊特
# JP: 「迷惑なものにされたんです。掘り出され、放置されて。\nそれは、鉱山の責任じゃない」
1899 = "「把它變成麻煩的是我們。是我們把煤礦挖出來，又丟棄在那裡。這並不是礦山的錯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ。責任は、そうさせた側にある」
1808 = "「嗯，你說得對。都是我們的責任」" 

# monologue
# JP: 遠い記憶が、喉を動かす。
2363 = "一段久遠的記憶，使我不由地開口說道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「悪いのは――間違えるのはいつだって、人間だ」
1964 = "「有錯的——犯錯的永遠都是我們人類」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1804 = "「嗯」" 

# monologue
# JP: わかってもらえた。\n言わんばかりに、ポーレットは淡い笑顔を浮かべる。
2735 = "波萊特似乎覺得我理解了她的意思，她露出一抹淡淡的微笑。" 

# monologue
# JP: 僕の心の一番奥底。\n一番大事なところに浮かぶ、遠い笑顔とそっくりに。
2525 = "她的笑容……像極了我埋藏於內心最深處的一段遙遠回憶中的笑容。" 

# monologue
# JP: （ああ――）
# 2992 = "（啊――）" 

# monologue
# JP: 確かめたい、尋ねてみたいと、\n跳ね上がった胸が焦げていく。
2543 = "好想確認，好想詢問——迫切的心情灼燒著我的胸口。" 

# monologue
# JP: だが、僕はいま、動揺をして混乱している。\nこれほど大事な質問を、できる状態とは思えない。
2408 = "但是，我現在精神極為動搖。並不適合開口詢問這麼重要的事情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、だ」
2037 = "「總之——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1804 = "「嗯」" 

# monologue
# JP: だから、言葉を絞り出す。\n感情の全てを抑えこむその、隙間から。
2600 = "我努力壓抑住自己的感情，從喉嚨中擠出話語。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、一度持ち帰ろう」
2040 = "「總之，就把這些當做回去討論的課題吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね、環境防護のためにも――\nどうしていくか、もっと多くのアイディアが必要です」
1941 = "「是啊，也是為了保護環境——我們還需要傾聽更多的意見來決定這裡從今以後要變成什麼樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1804 = "「嗯」" 

# monologue
# JP: ポーレットが一歩を先に踏み出す。\nそうして、僕へと振り返る。
2737 = "波萊特先踏出第一步。然後回頭看向我，說道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「なら、戻りましょう。双鉄くん！」
2122 = "「那我們就回去吧。雙鐵君！」" 
