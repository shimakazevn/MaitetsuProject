# monologue
# JP: 肩にちいさなむしさんを乗せた、ハチロクかえる。\n大スコ装備の日々姫もぐら。
3056 = "八六扮演的青蛙肩膀上放著蟲子先生。日日姬扮演的鼴鼠拿著大鏟子。" 

# monologue
# JP: くわえて僕らの銀河急行制服に、\n無論、ポーレットのアリスドレスも――
3067 = "加上穿著銀河快速制服的我們，當然還有波萊特的愛麗絲裝扮——" 

# 【双鉄】
# display as 雙鐵
# JP: 「お義母様には、まったく頭があがらないな。\nまさか、ここまでのご協力をくださるとは」
2523 = "「我真是要在岳母大人面前抬不起頭了。沒想到她竟然幫了這麼多忙」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えへへ」
2369 = "「嘿嘿」" 

# monologue
# JP: 圧倒的なお力添えが、やはり嬉しかったのだろう。\nポーレットのはにかみは、まるで天使の可愛らしさだ。
3493 = "波萊特果然還是在為她媽媽的鼎力協助感到開心。她露出的燦爛笑容就像天使一樣美麗。" 

# 【ポーレット】
# display as 波萊特
# JP: 「十年以上の穴埋めだからって、いってくれました。\nそれに――新しい息子へのプレゼント、っとも」
2396 = "「她說要用這個來填補十幾年的時光。同時也是給新兒子的禮物」" 

# 【双鉄】
# display as 雙鐵
# JP: 「光栄だ。\n……なんというか、いよいよ、実感してくるな」
2536 = "「我非常光榮。……怎麼說呢，終於有點現實的感覺了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。結婚。\n家族が増えるって……うん。こういうことなんだ」
2574 = "「是啊，真的有結婚的感覺了。家人變多了……嗯，就是這種感覺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
# 2569 = "「是啊」" 

# monologue
# JP: いつか、日々姫がポーレットを\n『お義姉さん』と呼ぶ日もくるのだろうか？
3577 = "總有一天日日姬也會叫波萊特“姐姐”。" 

# monologue
# JP: 想像するだに、なんとも面映い気になってくる。
3271 = "我只是想像一下就覺得那場面一定非常有趣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、お義母様は本当にお忙しい方なのだな。\nあっという間に帰られてしまった」
2053 = "「不過岳母大人工作真是繁忙，沒待多長時間就回去了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「本当は、乗ってってほしかったんですけどね、\nメルヘン列車。そこまではわがまま言えないし」
2657 = "「真的很想讓她坐一下童話列車。然而我又不能提這麼任性的請求」" 

# 【双鉄】
# display as 雙鐵
# JP: 「福岳から[しゃんはい,1]上杯に飛んで、パル＝イスか。\nポーレットの働きものは、ご両親譲りなのだな」
2462 = "「從福岳飛到上烸，再到巴黎。你工作這麼賣力估計是父母的遺傳」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。うふふ、わたしも知りませんでした」
2563 = "「是啊。嘻嘻，我之前也不知道來著」" 

# 【双鉄】
# display as 雙鐵
# JP: 「次にお会いできるのは結婚式で、か。\nいいな、こういうのは。実にいい」
2038 = "「下次見面要等結婚典禮的時候了。真好啊，這種感覺真好」" 

# 【ポーレット】
# display as 波萊特
# JP: 「本当に」
2659 = "「真的是」" 

# monologue
# JP: 言って、すりすり。\nまたポーレットが甘えてくれる。
3624 = "說著，波萊特又蹭了蹭我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「全部、双鉄くんのおかげです」
2811 = "「都是你的功勞」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、そんなことは――」
2192 = "「哎，沒有啦」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あります。双鉄くんがいなかったら、\n今日のこの日も、みんなの笑顔も、絶対なかった」
2442 = "「就是。如果沒有你的話，就沒有今天，就沒有大家的笑臉」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それをいうなら、ポーレットこそだろう」
2697 = "「要這麼說的話，是你功勞大才對」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　わたしなんて、なにも」
2199 = "「哎？我什麼都沒做啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとれいながふたりで繋いでくれた――\nそのレールの上を、僕らは走っているにすぎん」
2488 = "「我們其他人只是在你和麗奈兩個人連接起來的鐵軌上跑起來而已」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
# 2232 = "「啊……」" 

# monologue
# JP: ほうっと、ポーレットの表情がゆるむ。\n泣き出しそうに、瞳が潤む。
3504 = "波萊特的表情一緩。她的美眸濕潤起來，就要喜極而泣。" 

# monologue
# JP: そんな表情も素敵だが、\nやはり、晴れの日には笑ってほしい。
3640 = "這樣的表情也很楚楚動人，不過這麼大好的日子，我還是希望她能保持笑容。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういえば、お土産をいただいたな」
2704 = "「說起來你媽媽送了禮物」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうでした！　開けてみないと」
2571 = "「是啊！快打開看看吧」" 

# monologue
# JP: いそいそと、ポーレットが小洒落た包みを解いていく。
3479 = "波萊特俐落地解開了漂亮的包裝布。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わぁあ、フォトンの紅茶とミニエクレア！\n嬉しい、ママ、覚えててくれたんだ」
2177 = "「哇，是福頓的紅茶和迷你泡芙！我好高興，媽媽還記得呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「好物なのか？」
2560 = "「是你愛吃的東西嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それはもう、ちっちゃいころから！\n待ってて下さい。すぐ淹れますね」
2505 = "「我從小就愛吃！你等一下，我去泡茶」" 

# monologue
# JP: パタパタと、足音までもが弾んでいる。
3170 = "她的腳步聲跟說話聲一樣輕快。" 

# 【ポーレット】
# display as 波萊特
# JP: 「アッサムだから、\nミルクティーがおすすめですけどー」
2817 = "「阿薩姆的話，我推薦奶茶——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、それで」
2784 = "「那就奶茶」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はぁい。うふふ、嬉しいなぁ。\nママにもらった紅茶を、双鉄くんと飲めるだなんて」
2402 = "「好。嘻嘻，我好高興。竟然能把媽媽送的紅茶泡給你喝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕も嬉しい。しあわせだ」
2478 = "「我也很開心，真是幸福啊」" 

# monologue
# JP: ……豊かな香りがレールショップを満たし始める。
1463 = "……鐵路商店裡開始被茶香填滿。" 

# monologue
# JP: ティーポットとお皿をトレーに乗せて、\nポーレットがテーブルへと戻ってくる。
3490 = "波萊特把茶壺和盤子放在托盤上，端到了桌子這邊。" 

# 【ポーレット】
# display as 波萊特
# JP: 「もうちょっとだけ待ってくださいね」
2711 = "「請再稍等一下」" 

# monologue
# JP: 砂時計の砂は、琥珀色。\n過去と未来の間をさらさら、流れて落ちる。
3427 = "沙漏裡的砂子呈現琥珀色。連接著過去與未來的細沙緩緩流下。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はぁい、どうぞ、召し上がれ」
2407 = "「好了，請用吧」" 

# monologue
# JP: ミルクがすでに温められてるカップへと、\n砂が落ちきったその瞬間、紅茶がゆったり注がれる。
3520 = "溫好的杯子裡已經倒上了牛奶，沙漏裡的沙子流完之後，她就把紅茶慢慢倒了進去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ああ――確かに旨いな」
1504 = "「……嗯——確實很好喝」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ミニエクレア。あいますよ？　すごく」
2762 = "「這跟泡芙非常搭」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 2301 = "「嗯」" 

# monologue
# JP: ポーレットがひとつ、鮮やかな葡萄の模様のものを\n摘んで僕へと差し出してくれる。
3489 = "波萊特把一顆葡萄圖案的迷你泡芙遞到我面前。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これは、このまま食べられるのか？」
2753 = "「這個可以直接吃嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。\n絵柄は、ホワイトチョコへのプリントですから」
2298 = "「嗯。圖案是用白巧克力畫上去的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 2384 = "「噢」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、あ～ん」
2088 = "「來，張嘴」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あむっ」
# 2301 = "「嗯」" 

# monologue
# JP: ミニとはいえど、一口で食べきるにはやや大きい。\n半分だけを口の中へと納めれば――
3653 = "雖然是迷你泡芙，一口還是吃不下去。我把它一半放進了嘴裡——" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………むぅ。これは――すごいな」
1506 = "「……嗯。這個好」" 

# monologue
# JP: 大人の味、というのだろうか。
3638 = "這可以說是成年人才能享用的美味吧。" 

# monologue
# JP: 熟した葡萄が持っている、ほんの少しのワイン感――\nその上に、芳醇な甘みが広がっていく。
3404 = "有成熟葡萄特有的一點葡萄酒的感覺，同時還有芳醇的甘甜。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あむっ」
2826 = "「（咬）」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 2240 = "「啊」" 

# monologue
# JP: 勢い込んでの二口目。\nポーレットの指先までを口にしてしまう。
3268 = "我又接著吃了第二口。結果就不小心咬到了波萊特的指尖。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん」
# 2301 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……ん――あ。双鉄、くん。\nくすぐったい――です」
1502 = "「……嗯——啊。雙鐵君。這樣好癢」" 

# monologue
# JP: 調子にのって、舐め、ねぶる。\nたっぷり甘みを堪能してから、音をたて、離す。
3282 = "我就得意忘形地開始舔了起來。我好好享用了一番甜美的手指，吸得咂砸作響，然後再鬆口。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさしく、上質。最高に豊かな味わいだ」
2154 = "「味道真棒，口感非常豐富」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え、ええと……その、おそまつさま、です」
2769 = "「那、那個……不成敬意」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おそまつどころか、この上も無いごちそうだ」
2067 = "「什麼不成敬意，就沒有比這更好吃的東西了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――」
# 2206 = "「啊——」" 

# monologue
# JP: こくりと、ポーレットの喉が小さく動く。
3483 = "波萊特咽了一口唾沫。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええと――なら。\nわたしも、食べてみたい、です」
2781 = "「那個，既然如此，那我也想吃吃看」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2301 = "「嗯」" 

# monologue
# JP: ご返杯、ではなくご返エクレア。\n焼けたトーストの色をしたものを、つまみ、差し出す。
3277 = "我回敬她一顆泡芙。我拿起一顆顏色跟烤好的吐司一樣的泡芙，遞到她面前。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――いただきまぁす\nんっ――ぱくっ――ぱく――」
2227 = "「啊——我開動了。嗯——嚼嚼——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ」
2270 = "「喔」" 

# monologue
# JP: 包まれる。
3382 = "指尖被包住了。" 

# monologue
# JP: 僕の指先があっというまに、\nポーレットの熱く濡れた口内に。
3339 = "我的指尖被波萊特又熱又濕的小嘴包住了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……ちゅっ――ちゅるっ――れるっ――\nちゅむ――ちゅうっ――ぺろっっ――れろおおっ」
2290 = "「嗯……啾——啾嚕——啾嚕——啾噗——啾噗——啾嚕——啾噗」" 

# 【双鉄】
# display as 雙鐵
# JP: 「く、うっ――」
# 2206 = "「啊——」" 

# monologue
# JP: 完全に、僕を誘う動きだ。
3156 = "她的動作完全是在勾引我。" 

# monologue
# JP: 吸い上げながら、しつこく、ゆるく――\n指の第一関節の付け根のところを、舐めあげてくる。
3114 = "她一邊吸吮著，一邊在手指的第一關節處舔來舔去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレット」
1510 = "「……波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん――んちゅ――ちゅぱ――ん、ぷぁ。\nえと……どう、しました？　双鉄くん」
2279 = "「嗯——嗯啾——啾噗——嗯——噗。那個……怎麼了，雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おかわりを――今度は僕に、食べさせてくれ」
2110 = "「再來一個——這次讓我再吃一個」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えと――むぐっ！？」
2776 = "「那個——唔！？」" 

# monologue
# JP: ポーレットの濡れた唇にミニエクレアをくわえさせ。\n雛鳥の如く自分の口を大きく開いて、指で促す。
3310 = "我把迷你泡芙塞進了波萊特的小嘴裡，然後張開自己的嘴，用手指著，就像等待餵食的雛鳥一樣。" 

# 【ポーレット】
# display as 波萊特
# JP: 「んふふ、ははひはひはぁ」
2370 = "「嘿嘿，真沒辦法」" 

# monologue
# JP: 半分だけを噛みちぎり。
3120 = "她咬下一半泡芙。" 

# monologue
# JP: ちゅく、ちゅくと、ゆっくりゆっくり、\n焦らすようにしてミニエクレアを噛みほぐし――
3529 = "然後她慢慢地嚼著泡芙，故意讓我心急——" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……」
2282 = "「嗯……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん――くっ――」
2273 = "「嗯——唔——」" 

# monologue
# JP: 抱き寄せる。\n湯たんぽを抱いているような気になる。あたたかだ。
3249 = "我一下把她抱了過來。我感覺像是抱著暖水袋一樣，她身上暖暖的。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん――んんっ――んっ――」
2277 = "「嗯——嗯——嗯——」" 

# monologue
# JP: 口内に甘さが押し寄せてくる。
3552 = "甜美的味道進入了我的口中。" 

# monologue
# JP: エクレアと、ポーレットの舌と唾液と。\nそれがどろどろ、舌から股間に流れ込む。
3430 = "泡芙混合上了波萊特小舌和香津。這黏稠的感覺刺激著我的味蕾，也激起了我的欲望。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん――くっ――（ごくっ）」
2275 = "「嗯——唔——（嚥下）」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……ちゅっ――ちゅるっ――れるっ――れろっ、\nちゅううっ――ちゅっ――ちゅずずずっ――（こく）」
2289 = "「嗯……啾——啾嚕——啾嚕——啾噗——啾噗——啾噗——啾嚕——（嚥下）」" 

# monologue
# JP: ミニエクレアは、喉へと落ちた。\nけれど、甘さは増していく。
3307 = "我把迷你泡芙咽了下去，但是嘴裡的甜味反而更濃了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――んっ……ちゅっ――ふ――あっ――\nちゅっ――ちゅむっ――ちゅうっ――ちゅっ――」
2224 = "「啊——嗯……啾——呼——啊——啾——啾嚕——啾噗——啾——」" 

# monologue
# JP: 漏れてくる息。立ち登ってくる、\n汗とチョコと、ポーレットとの混じった香り。
