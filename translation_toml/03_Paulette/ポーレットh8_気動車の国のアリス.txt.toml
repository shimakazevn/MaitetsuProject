3125 = "Quyết tâm đang tràn ngập khắp toàn thân.\nSức mạnh ý chí làm đôi mắt sáng rực lên."

# 【ポーレット】
# display as 波萊特
# JP: 「頼んでみます。頼みたいです。\n式にもやっぱり――ママのこと、招待したいですし」
2493 = "「Đó là điều hiển nhiên ạ. Hơn nữa, để thực\nhiện mệnh lệnh cần ưu tiên hơn cả là\n\"bảo\nvệ mạng sống của ngài Soutetsu\", chúng ta\nsẽ hạ cánh khẩn cấp.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか！」
2409 = "「Vâng ạ~ Nhìn Reina thế này thôi chứ khỏe\nlắm đó nha~」"

