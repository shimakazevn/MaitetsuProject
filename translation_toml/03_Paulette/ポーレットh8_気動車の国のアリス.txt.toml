2169 = "「Công việc. Cùng với mẹ——.\nỞ phía cuối con\nđường ray mà ba, và Anh Soutetsu đã kết\nnối này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
# 2240 = "「啊」" 

# monologue
