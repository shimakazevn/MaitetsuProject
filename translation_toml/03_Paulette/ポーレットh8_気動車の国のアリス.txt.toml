2442 = "「Cỗ máy này đang bị cuốn vào vùng từ\ntrường bất thường.\nDự kiến động cơ sẽ\nngừng hoạt động nếu tiếp tục tiến tới.」"

# 【双鉄】
# display as 雙鐵
