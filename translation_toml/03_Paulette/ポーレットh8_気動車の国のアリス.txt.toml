2489 = "「我們只是未婚夫妻之間開心地閒聊了一會。你要是道歉的話，我也有罪了」" 

# monologue
# JP: 冗談めかしてささやけば、\nポーレットは頬を赤くする。
3354 = "我開了個小玩笑，卻見波萊特的俏臉染上一層紅暈。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ、そんなこと言われたら、\nわたし、また[ぼうしん,1]冒進しちゃいそうですよぉ」
2272 = "「嗚，要是這麼一說，我就又要冒進了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは困るな。\nなら、大人しく聞くとしよう。説明をあらためて頼む」
2783 = "「那可就麻煩了。那我就聽你說吧，請你做一下說明」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、です。コホン」
2318 = "「嗯，好的。咳」" 

# monologue
# JP: どこまでだって付き纏う甘い空気を追いやるためにか、\n咳払いする表情は、一転、キリリと引き締まる。
3523 = "為了把現在這種甜蜜輕鬆的氣氛驅散，她清了清嗓子，擺出一副嚴肅的表情。" 

# 【ポーレット】
# display as 波萊特
# JP: 「現状、湯医方面における観光要素の弱さの克服が、\n御一夜鉄道の更なる改善へのカギになってますよね？」
2647 = "「現在克服湯醫方面觀光要素太少的問題，就是改善御一夜鐵道的關鍵，我說的沒錯吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。御一夜駅-マイントレジャー駅間のみの\n利用者が多すぎるのは、確かにかなりもったいない」
2300 = "「嗯。現在只有從御一夜站到煤探樂園站的乘客比較多，這樣實在是很浪費」" 

# 【ポーレット】
# display as 波萊特
