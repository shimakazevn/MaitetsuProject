3301 = "Có lẽ không cần phải nói thêm nữa,\nnhưng\nđể tiếp thêm động lực, tôi tiếp tục lời\nnói."

# 【双鉄】
# display as 雙鐵
# JP: 「服のことをきっかけに、絵本館のことを相談しよう。\n世界の絵本を集める力にもなってくれるかもしれん」
2549 = "「Kể cả không có lệnh của ngài. Ngài\nSoutetsu.」"

# 【ポーレット】
# display as 波萊特
