[script]
# lines: 704 
# monologue
# JP: ……言葉に困る。\nかわいらしいは、もちろん大変に可愛いのだが――
1457 = "......Thật khó để diễn tả bằng lời.\nĐáng yêu thì, tất nhiên là cực kỳ đáng yêu rồi——"
# 【ポーレット】
# display as 波萊特
# JP: 「あ～……えと……\nやっぱり、ちょっと違っちゃってる感じですか？」
2265 = "「A~......ừm......\nQuả nhiên là, cảm giác hơi sai sai ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「違ってはいない。メルヘン、という感じはする。\n大変に可愛らしいし、好きか嫌いかでいえば大好きだ」
2614 = "「Không sai đâu. Mang lại cảm giác rất cổ tích.\nCực kỳ đáng yêu, nếu hỏi thích hay không thì anh rất thích.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えへへ――ありがとうございます。手持ちだと、\nこの服が一番、メルヘンって感じかなって、思って」
2372 = "「Ê hế hế——Cảm ơn anh. Trong những bộ em có,\nem nghĩ bộ này là mang cảm giác cổ tích nhất rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、縦縞のスカートが効いている。少し古風で、\n髑国かなにかの絵本の中にいてもおかしくなさそうだ」
2577 = "「Đúng là chân váy sọc dọc rất hiệu quả. Hơi cổ điển một chút,\ncó nằm trong cuốn truyện tranh nào đó của Đức cũng không có gì lạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そこは、フランクじゃないんですか？」
2041 = "「Chỗ đó, không phải là Pháp sao?」"
# monologue
# JP: ぷくーっと膨れるふりをして。
3494 = "Cô ấy giả vờ phồng má phụng phịu."
# monologue
# JP: けれどもすぐに笑顔に戻り、\nポーレットはスカートを翻す。
3036 = "Nhưng ngay lập tức mỉm cười trở lại,\nPaulette tung bay tà váy."
# 【ポーレット】
# display as 波萊特
# JP: 「ふふっ、村娘風？　って感じですか？\nワインとか、足踏みしてつくっちゃったり」
2360 = "「Fufu, kiểu cô gái thôn quê? Cảm giác vậy đúng không anh?\nKiểu như, dùng chân giẫm để làm rượu vang ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。そうだな」
2259 = "「À, ừ. Đúng vậy.」"
# monologue
# JP: 言葉につられ足を見る。
3582 = "Bị lời nói thu hút, tôi nhìn xuống đôi chân cô ấy."
# monologue
# JP: スカートの縦縞のせいか、\nいつもより長くスラリと感じる――旨そうだ。
3090 = "Có lẽ do sọc dọc của chiếc váy,\nmà đôi chân trông thon dài hơn mọi khi——Có vẻ ngon miệng đây."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの足踏みワインなら、是非飲みたい」
2421 = "「Nếu là rượu vang do Paulette giẫm chân làm ra, anh nhất định muốn uống thử.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　え？　あの……双鉄くんが飲みたいなら、\nわたし、がんばってみたい、です――けど」
2197 = "「Hả? Hả? Cái đó......nếu Anh Soutetsu muốn uống,\nthì em, cũng muốn thử cố gắng xem sao——nhưng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2384 = "「Ồ」"
# monologue
# JP: 思わずこぼれたひとりごと――冗談半分のひとことを、\nポーレットは真に受けてくれている。
3250 = "Lời lẩm bẩm buột miệng thốt ra——một câu nói đùa,\nlại được Paulette tin là thật."
# monologue
# JP: ありがたい。飲めるものなら、是非とも飲みたい。\n欲望が、脳細胞に賦活する。
3290 = "Thật đáng quý. Nếu có thể uống, tôi nhất định muốn uống.\nDục vọng đang kích hoạt các tế bào não."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば実現化したいものだな――その……ああ！\n『湯医絵本館』のオープニングイベントとして」
2793 = "「Vậy thì muốn hiện thực hóa nó quá nhỉ——cái đó......A!\nLàm sự kiện khai trương cho 『Thư viện Truyện tranh Yunosaka』 luôn」"
# 【ポーレット】
# display as 波萊特
# JP: 「オープニングイベント――\nあ！　『足踏みワイン体験』とかですか？」
2815 = "「Sự kiện khai trương——\nA! Kiểu như 『Trải nghiệm làm rượu vang bằng chân』 ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。御一夜は酒造りの町だし――\n隈元には、ぶどう農園もワイナリーもある」
2436 = "「Ừm. Ohimitera vốn là thị trấn nấu rượu mà——\nỞ Kumamoto cũng có cả vườn nho lẫn xưởng rượu vang.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　そうなんですか。わたし、知らなかった」
2201 = "「Hả? Vậy ạ. Em không biết luôn đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なんだかんだいっても僕は酒蔵の養子だからな。\n酒のことには、多少は詳しい」
2047 = "「Nói gì thì nói, anh cũng là con nuôi của xưởng rượu mà.\nNên anh cũng biết đôi chút về rượu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「知ってます」
2526 = "「Em biết mà.」"
# monologue
# JP: 信頼に満ち満ちた声。\n瞳も、わくわくきらめいている。
3503 = "Giọng nói tràn đầy sự tin tưởng.\nĐôi mắt cũng lấp lánh sự háo hức."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんがチェックしてるなら――\nおいしいんですよね？　きっと、そこのワイン」
2556 = "「Nếu đã được Anh Soutetsu kiểm chứng thì——\nchắc chắn là ngon đúng không anh? Rượu vang ở đó ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、さして強くない僕でも楽しめる、\n飲みくちのよい、軽いワインだ」
2329 = "「Ừ, một người tửu lượng kém như anh cũng có thể thưởng thức,\nlà loại rượu vang nhẹ, rất dễ uống.」"
# 【ポーレット】
# display as 波萊特
# JP: 「嬉しい。わたしも好きです、そういう方が」
2803 = "「Thích quá. Em cũng thích loại như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「好みもあろうが、間違いなく質は高い。\n僕としては、特に赤がいい。馬サシとの相性は抜群だ」
2586 = "「Tuy còn tùy khẩu vị, nhưng chất lượng thì miễn chê.\nCá nhân anh đặc biệt thích rượu vang đỏ. Cực kỳ hợp với thịt ngựa sống luôn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わ……聞いてるだけでよだれが出ちゃいそう」
2175 = "「Oa......nghe thôi đã thấy thèm chảy nước miếng rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、是非。手に入れるので、一緒に飲もう」
2794 = "「Vậy thì nhất định rồi. Anh sẽ mua về, chúng ta cùng uống nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、約束ですよ？\nわたし、ムース作っておきますね」
2362 = "「Ư hự hự, hứa rồi nhé?\nEm sẽ làm sẵn bánh mousse đợi anh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「楽しみだ」
2504 = "「Anh rất mong chờ đấy.」"
# monologue
# JP: ポーレットのうきうき顔に、思考も弾む。\nというか――うむ。
3508 = "Vẻ mặt rạng rỡ của Paulette khiến suy nghĩ của tôi cũng bay bổng theo.\nMà nói đúng hơn là——ừm."
# 【双鉄】
# display as 雙鐵
# JP: 「それでポーレットの気に入るようなら、もう一段階、\n試飲会まで推し進めるのもありかもしれんな」
2419 = "「Nếu Paulette thích, thì có khi tiến thêm một bước nữa,\ntổ chức luôn buổi nếm thử rượu cũng nên.」"
# 【ポーレット】
# display as 波萊特
# JP: 「試飲会？」
2703 = "「Buổi nếm thử rượu ạ?」"
# monologue
# JP: きょとんと小首が傾げられる。
3495 = "Cô ấy ngơ ngác nghiêng đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、御一夜の酒蔵関係者や、\n湯医の絵本館の関係者を一同に集めてだ」
2314 = "「Ừ, tập hợp những người liên quan đến xưởng rượu ở Ohimitera,\nvà những người liên quan đến thư viện truyện tranh Yunosaka lại với nhau.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええ、っと」
2752 = "「À ừm」"
# 【双鉄】
# display as 雙鐵
# JP: 「『足踏みワイン体験』単体ではもったいない。\n御一夜にはクマ焼酎というブランドがあるのだから」
2125 = "「Chỉ tổ chức 『Trải nghiệm làm rượu vang bằng chân』 không thôi thì phí quá.\nOhimitera vốn có thương hiệu rượu Shochu Kuma mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「[ゆのい,1]湯医にも、ブランド！　『湯医ワイン』」
2635 = "「Yunosaka cũng có thương hiệu! 『Rượu vang Yunosaka』」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうできたら理想的だな。絵本館でも販売し、\nそれこそ、『湯医メルヘンワイン』とでもできたら」
2681 = "「Làm được vậy thì lý tưởng quá. Bán ở cả thư viện truyện tranh nữa,\nlúc đó gọi là 『Rượu vang cổ tích Yunosaka』 cũng hay.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ふわわわわ～」
2176 = "「Oa oa oa oa~」"
# monologue
# JP: ポーレットが熱のこもった息を吐く。\nまるでもう、ワインに酔ってしまったような。
3481 = "Paulette phả ra hơi thở nóng hổi.\nCứ như thể đã say men rượu vang rồi vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「やっぱり、凄いです双鉄くん」
2818 = "「Anh Soutetsu, quả nhiên là lợi hại thật.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　凄い、とは――」
2341 = "「Hửm? Lợi hại, là sao——」"
# 【ポーレット】
# display as 波萊特
# JP: 「[ゆのいえほんかん,4]湯医絵本館のこと、\nそこまで一気に考えてくれるなんて」
2638 = "「Chuyện về Thư viện Truyện tranh Yunosaka,\nanh có thể nghĩ xa đến mức đó trong chớp mắt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや……」
2143 = "「Không......」"
# monologue
# JP: 青い瞳は、きらきらまっすぐ、\n僕を、僕だけを見つめてる。
3509 = "Đôi mắt xanh biếc, lấp lánh nhìn thẳng,\nchỉ nhìn chăm chăm vào một mình tôi."
# monologue
# JP: 元はポーレットの足踏みワイン飲みたさだけだ――\nと、どうにも言い難い雰囲気だ。
3631 = "Bầu không khí này thật khó mà thú nhận rằng,\nban đầu chỉ là do tôi muốn uống rượu vang giẫm chân của Paulette thôi——"
# 【双鉄】
# display as 雙鐵
# JP: 「……話の流れが、よい連鎖をしたにすぎんさ。\nというか、いかんな。いささか冒進気味だった」
1499 = "「......Chẳng qua là mạch câu chuyện dẫn dắt đến đó thôi.\nMà nói thật thì, không ổn rồi. Hơi có chút nóng vội.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ。いわれたらそうかも」
2263 = "「A. Nghe anh nói vậy thì có vẻ đúng.」"
# monologue
# JP: 苦笑し、こつり。\nポーレットは軽く、自分のおでこを叩いてみせる。
3517 = "Cười gượng, cộc.\nPaulette gõ nhẹ lên trán mình."
# 【ポーレット】
# display as 波萊特
# JP: 「まだ出発信号機も、わたしたち、通過してないのに」
2492 = "「Chúng ta còn chưa đi qua cột đèn tín hiệu xuất phát nữa mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな。まずは起点に戻るとしよう。\n『メルヘン列車』の話だったな」
2573 = "「Đúng vậy. Trước mắt cứ quay lại vạch xuất phát đã.\nĐang nói chuyện 『Chuyến tàu cổ tích』 nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っていうか、説明も全然、まだでしたね。\nごめんなさい」
2705 = "「Mà em cũng chưa giải thích gì cả nhỉ.\nEm xin lỗi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「婚約者同士の話が楽しく、弾みすぎただけのことだ。\nごめんなさいというのなら、僕も同罪になるぞ？」
2489 = "「Chỉ là câu chuyện giữa những người đã đính hôn quá vui vẻ, nên mới đi xa thôi.\nNếu em xin lỗi, thì anh cũng mang tội chung đấy nhé?」"
# monologue
# JP: 冗談めかしてささやけば、\nポーレットは頬を赤くする。
3354 = "Lời thì thầm nửa đùa nửa thật của tôi,\nkhiến Paulette đỏ bừng hai má."
# 【ポーレット】
# display as 波萊特
# JP: 「はうっ、そんなこと言われたら、\nわたし、また[ぼうしん,1]冒進しちゃいそうですよぉ」
2272 = "「Hau, anh nói vậy,\nem lại sắp mất kiểm soát nữa rồi đây này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは困るな。\nなら、大人しく聞くとしよう。説明をあらためて頼む」
2783 = "「Vậy thì rắc rối đấy.\nThế thì anh sẽ ngoan ngoãn lắng nghe. Nhờ em giải thích lại nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、です。コホン」
2318 = "「Vâng, ạ. E hèm.」"
# monologue
# JP: どこまでだって付き纏う甘い空気を追いやるためにか、\n咳払いする表情は、一転、キリリと引き締まる。
3523 = "Có lẽ để xua đi bầu không khí ngọt ngào cứ đeo bám mãi không buông,\ncô ấy hắng giọng, nét mặt thoắt cái trở nên nghiêm túc."
# 【ポーレット】
# display as 波萊特
# JP: 「現状、湯医方面における観光要素の弱さの克服が、\n御一夜鉄道の更なる改善へのカギになってますよね？」
2647 = "「Hiện tại, việc khắc phục sự yếu kém về yếu tố du lịch ở khu vực Yunosaka,\nchính là chìa khóa để cải thiện Đường sắt Ohimitera hơn nữa đúng không anh?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。御一夜駅-マイントレジャー駅間のみの\n利用者が多すぎるのは、確かにかなりもったいない」
2300 = "「Ừm. Quả thực rất lãng phí khi lượng hành khách\nchỉ tập trung ở đoạn ga Ohimitera đến ga Mine Treasure.」"
# 【ポーレット】
# display as 波萊特
# JP: 「湯医側にも、その懸念は伝えてありました。\nそこで先日出てきたのが、『湯医絵本館』案です」
2637 = "「Em cũng đã truyền đạt mối lo ngại đó cho phía Yunosaka.\nVà đề xuất 『Thư viện Truyện tranh Yunosaka』 đã được đưa ra vào hôm trước.」"
# 【双鉄】
# display as 雙鐵
# JP: 「湯医と絵本の繋がりは？」
2636 = "「Sự liên kết giữa Yunosaka và truyện tranh là gì?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええと、\nひとまずは、これ――読んでみてください」
2754 = "「À ừm,\ntrước tiên anh cứ thử đọc cái này xem sao.」"
# monologue
# JP: 自分の机の引き出しから、\nポーレットは一冊の絵本を取り出す。
3491 = "Từ trong ngăn kéo bàn của mình,\nPaulette lấy ra một cuốn truyện tranh."
# monologue
# JP: 愛読書……というわけでもなさそうだ。\nページは真白く、真新しい。
3556 = "Có vẻ không phải là sách yêu thích......\nCác trang giấy trắng tinh, còn mới toanh."
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。『かえるのあまがっぱ』か。\nなんとも古風だが、暖かな絵だ――」
2387 = "「Hô. 『Áo mưa của ếch』 sao.\nTrông khá cổ điển, nhưng nét vẽ lại rất ấm áp——」"
# 【ポーレット】
# display as 波萊特
# JP: 「その絵本の絵を描いてらっしゃる、\n『[きのこだいすけ,2]茸大介』先生が、湯医出身なんだそうです」
2756 = "「Tác giả vẽ cuốn truyện tranh này,\nthầy 『Kinoko Daisuke』, nghe nói là người gốc Yunosaka đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。それは素晴らしいな。\nああ――ひょっとすると、湯医に絵本の原画なども？」
2759 = "「Ra vậy. Tuyệt vời thật.\nÀ——không chừng, ở Yunosaka còn có cả bản gốc của truyện tranh nữa sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。ご遺族からご寄贈があったっていうお話で。\nそれが、絵本館構想のベースの部分になりますね」
2331 = "「Vâng. Nghe nói là được gia quyến hiến tặng.\nĐó chính là nền tảng cho ý tưởng xây dựng thư viện truyện tranh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「もう鬼籍に入られているのか。\n残念だな、一度お会いしてみたかった」
2661 = "「Thầy ấy đã qua đời rồi sao.\nTiếc thật, anh rất muốn được gặp thầy một lần.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。本当に、あったかくて、懐かしい絵」
2445 = "「Đúng vậy nhỉ. Những bức vẽ thực sự rất ấm áp và hoài niệm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2616 = "「Đúng vậy.」"
# monologue
# JP: ポーレットが、僕のとなりに腰掛ける。\nページを繰る手に、やわらかな指が重なってくる。
3486 = "Paulette ngồi xuống cạnh tôi.\nNhững ngón tay mềm mại đặt lên bàn tay đang lật từng trang sách của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ……かえるさんのお店、大繁盛。\n『ぴちぱたぴちょん、ぴちぱちょん』」
2345 = "「Ư hự hự......cửa hàng của bác ếch, buôn may bán đắt.\n『Lộp độp tí tách, lộp độp tí tách』」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……いいものだな、朗読は」
2236 = "「À......nghe đọc truyện cũng thú vị thật đấy.」"
# monologue
# JP: 素直な気持ちが、素直に届いてくれたらしい。
3336 = "Cảm xúc chân thành của tôi, có vẻ đã được truyền đạt một cách trọn vẹn."
# monologue
# JP: ポーレットはしあわせそうに微笑んで、\n続きを、優しく聞かせてくれる。
3515 = "Paulette mỉm cười hạnh phúc,\nrồi dịu dàng đọc tiếp cho tôi nghe."
# 【ポーレット】
# display as 波萊特
# JP: 「『かっぱをひとつ　くださいな。おおきなはっぱの\nぬれないかっぱ。あめはしとしと　まだやみません』」
1479 = "「『Cho tôi một chiếc áo mưa. Một chiếc áo mưa bằng chiếc lá lớn\nkhông bị ướt. Mưa vẫn rơi rả rích, chưa chịu tạnh』」"
# monologue
# JP: 『ぴちぱたぴちょん、ぴちぱちょん』。\n同じリズムを、ポーレットは楽しげに繰り返す。
1444 = "『Lộp độp tí tách, lộp độp tí tách』.\nPaulette vui vẻ lặp lại nhịp điệu đó."
# 【ポーレット】
# display as 波萊特
# JP: 「『おやこの　かっぱを　くださいな。\nぬるずるぺったん　かたつむり』あ、いいな、おんぶ」
1480 = "「『Cho tôi chiếc áo mưa dành cho hai mẹ con.\nỐc sên bò trườn trơn tuột』 A, thích ghê, được cõng kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「するか？　おんぶ」
2693 = "「Anh cõng em nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　あ、あの――ええと。\nそれなら、わたし、おんぶより」
2189 = "「Hả!? A, cái đó——ừm.\nNếu vậy, em thà được bế còn hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2301 = "「À.」"
# monologue
# JP: 言われずとも、だ。
3020 = "Dù không nói ra, tôi cũng hiểu."
# monologue
# JP: 絵本をよけて膝をたたけば、\nポーレットはすぐに乗ってくる。
3305 = "Tôi đặt cuốn truyện sang một bên rồi vỗ vỗ lên đùi,\nPaulette lập tức ngồi lên."
# 【ポーレット】
# display as 波萊特
# JP: 「えへへ～　だっこだぁ」
2374 = "「Ê hế hế~ Được bế rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「さ、つづきだ。\nせっかくだ。最後まで読んでくれ」
2089 = "「Nào, tiếp tục thôi.\nCất công rồi, hãy đọc cho anh nghe đến cuối đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁい」
# 2301 = "「嗯」" 
# monologue
# JP: ポーレットの声。膝の上にあるあたたかみ。\nおもさ、やわらぎ、いいにおい。
3488 = "Giọng nói của Paulette. Hơi ấm lan tỏa trên đùi.\nSức nặng, sự êm ái, mùi hương dễ chịu."
# monologue
# JP: ……ページが繰られる音ごとに、\n僕のこころも、軽やかに穏やかになっていく。
1466 = "......Theo từng tiếng lật trang sách,\nlòng tôi cũng trở nên nhẹ nhàng và thanh thản hơn."
# 【ポーレット】
# display as 波萊特
# JP: 「『むしさん　むしゃむぐ　ぽんぽこぱん。\nおなかがふくれて　かっぱのはっぱをたべられません』」
1478 = "「『Bác sâu nhai nhóp nhép, bụng no căng tròn.\nBụng đã no căng, không thể ăn lá làm áo mưa được nữa』」"
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
2205 = "「Hừm.」"
# monologue
# JP: ……むしさんのまあるい穴があるからこその、\nかえるのかっぱだ、それが損なわれてしまっては――
1454 = "......Chính vì có lỗ tròn tròn do bác sâu cắn,\nmới tạo nên chiếc áo mưa của ếch, nếu điều đó bị phá hỏng thì——"
# 【ポーレット】
# display as 波萊特
# JP: 「『かえるのめから　なみだが　ぽちゃん。\nぴちぱたぴちょん　ぴちぱちょん』」
1485 = "「『Nước mắt rơi tí tách từ khóe mắt ếch.\nLộp độp tí tách, lộp độp tí tách』」"
# monologue
# JP: 悲しい声。
3185 = "Giọng nói đượm buồn."
# monologue
# JP: 絵本とおんなじ色した雨が、\nレールショップに、僕のこころに降り注――！？
3578 = "Cơn mưa mang màu sắc giống hệt trong truyện tranh,\nnhư đang trút xuống cửa hàng đường sắt, xuống tận cõi lòng tôi——!?"
# 【ポーレット】
# display as 波萊特
# JP: 「『＜おいらの穴に　雨をふらすな！＞\nじめんがもるもり　もぐらが ずん！』」
1471 = "「『<Đừng có làm mưa rơi vào hang của ta!>\nMặt đất gồ lên, bác chuột chũi trồi lên cái vù!』」"
# monologue
# JP: 一転、どなるような大音声。
3487 = "Đột nhiên, giọng nói lớn như đang quát tháo."
# monologue
# JP: もぐら登場の勢いに、揺られた髪が手に触れてくる。\n金の雨だと、不意に感じる。
3651 = "Theo đà xuất hiện của chuột chũi, mái tóc đung đưa chạm vào tay tôi.\nBất chợt, tôi có cảm giác như đó là cơn mưa vàng."
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
2240 = "「A.」"
# 【双鉄】
# display as 雙鐵
# JP: 「続きを」
2676 = "「Đọc tiếp đi em.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……はい」
2235 = "「A......vâng.」"
# monologue
# JP: ポーレットの髪を梳いてはこぼす。\nさらさら、指にも雨が降る。
3328 = "Tôi luồn tay vuốt ve mái tóc Paulette rồi thả ra.\nMềm mại, như cơn mưa trút xuống những ngón tay."
# monologue
# JP: 昔のことを、きれぎれに思い出すけれど、\nそれさえも、心地よい声がすぐさま流す。
3318 = "Dù những ký ức xưa cũ thỉnh thoảng ùa về đứt đoạn,\nnhưng ngay cả chúng cũng bị giọng nói êm ái cuốn trôi đi mất."
# 【ポーレット】
# display as 波萊特
# JP: 「『みんなで　もぐらと“あまやどり”\nこれならだれもぬれません。かえるの雨もあがります』」
1473 = "「『Tất cả cùng \"trú mưa\" với chuột chũi.\nThế này thì không ai bị ướt cả. Cơn mưa của ếch cũng tạnh rồi』」"
# monologue
# JP: ポーレットの笑顔も晴れ渡る。\n挿絵のかえると、むしと、もぐらと、みんなと同じく。
3506 = "Nụ cười của Paulette cũng bừng sáng.\nGiống hệt như chú ếch, bác sâu, chuột chũi và tất cả mọi người trong bức minh họa."
# 【ポーレット】
# display as 波萊特
# JP: 「『おそらのあめも　あがります。かえるのかっぱを\nほしましょう。にこにこぽかぽか　はいおしまい！』」
1475 = "「『Cơn mưa trên trời cũng đã tạnh. Hãy phơi áo mưa của ếch\ncho khô nào. Cười tươi rạng rỡ, ấm áp vô cùng. Câu chuyện đến đây là hết!』」"
# monologue
# JP: （パチパチパチパチ）
3729 = "（Bốp bốp bốp bốp）"
# 【ポーレット】
# display as 波萊特
# JP: 「やだ、双鉄くん。拍手だなんておおげさです」
2701 = "「Thôi đi, Anh Soutetsu. Vỗ tay thì hơi quá rồi đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2206 = "「À——」"
# monologue
# JP: 意識しないで、拍手していた。\nそれほど、ポーレットに聞き惚れていた。
3324 = "Tôi đã vỗ tay trong vô thức.\nVì tôi đã hoàn toàn bị cuốn hút bởi giọng đọc của Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「……いいものだな。絵本を読んでもらうのは」
1514 = "「......Tuyệt thật đấy. Cảm giác được người khác đọc truyện tranh cho nghe ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね、お話もおもしろかったし」
2446 = "「Vâng, câu chuyện cũng rất thú vị nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お話ももちろんだが、朗読がよかった。\n声の雨が、僕を、物語にひたしてくれた」
2554 = "「Câu chuyện hay là đương nhiên rồi, nhưng cách em đọc cũng rất tuyệt.\nCơn mưa bằng giọng nói của em đã nhấn chìm anh vào câu chuyện.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、ほめすぎですよ。双鉄くん。\nでもうれしい。れいなに鍛えられたおかげかなぁ」
2361 = "「Ư hự hự, anh khen quá lời rồi. Anh Soutetsu.\nNhưng em rất vui. Chắc là nhờ rèn luyện với Reina đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――れいなに普段から読み聞かせているのか？」
2380 = "「À——bình thường em vẫn hay đọc truyện cho Reina nghe sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「普段からっていうほどじゃないですけど、ときどき。\nあのこが、絵本を借りてきたときとか、せがまれて」
2059 = "「Cũng không hẳn là bình thường, thỉnh thoảng thôi ạ.\nMỗi khi con bé mượn truyện tranh về, là lại vòi em đọc cho nghe.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう。れいなは、どんな絵本を好むのだ？」
2383 = "「Hô. Reina thích loại truyện tranh nào?」"
# 【ポーレット】
# display as 波萊特
# JP: 「どんなのもですよ？　ぜぇんぶ大好き。\nおもしろいお話しはぱたぱた、体ごと喜んで」
2068 = "「Loại nào cũng thích hết ạ? Thích tất tần tật luôn.\nNghe truyện nào thú vị là con bé lại nhảy cẫng lên, mừng ra mặt.」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいならしいな」
2461 = "「Đúng là Reina nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「こないだ『いわしさん』っていう絵本読んだ時とか、\n読みおわったら、ベッドの上で水泳はじめて！」
2057 = "「Hôm trước lúc em đọc cuốn truyện tên là 『Bác cá mòi』,\nđọc xong cái là con bé bắt đầu bơi lội trên giường luôn!」"
# monologue
# JP: ポーレットの体まで、声につられて動いてる。\n微笑ましい。まるきり子を語る母の仕草だ。
3514 = "Đến cả cơ thể Paulette cũng chuyển động theo lời kể.\nThật ấm áp. Trông hệt như một người mẹ đang kể về đứa con của mình vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「夢中だな」
2400 = "「Say mê thật đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、すごく！　実際、かっこいいお話だし。\nそれから一週間は、ずうっと『いわしさん』でした」
2336 = "「Vâng, vô cùng luôn! Thực tế thì câu chuyện cũng rất ngầu nữa.\nTừ lúc đó, suốt một tuần liền con bé chỉ toàn 『Bác cá mòi』 thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いわしなのに、かっこいいのか」
2617 = "「Cá mòi mà cũng ngầu sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「いわしなのにかっこいいんです！\n双鉄くんにも、今度、読み聞かせてあげますね？」
2557 = "「Dù là cá mòi nhưng ngầu lắm đấy!\nLần tới, em cũng sẽ đọc cho Anh Soutetsu nghe nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「楽しみだ」
# 2504 = "「我很期待」" 
# 【ポーレット】
# display as 波萊特
# JP: 「えへへ。\nそういってもらえると、嬉しいです。すごく」
2368 = "「Ê hế hế.\nNghe anh nói vậy, em vui lắm. Rất vui luôn.」"
# monologue
# JP: あどけないほどに無垢なはにかみ。\nつられて、聞きたくなってしまう。
3160 = "Nụ cười thẹn thùng ngây thơ đến mức vô tư lự.\nBị cuốn theo, tôi bất giác muốn hỏi."
# 【双鉄】
# display as 雙鐵
# JP: 「こどものころは、どうだった？\nポーレットは、どんな絵本を読んでいたのだ？」
2079 = "「Hồi nhỏ thì sao?\nPaulette hay đọc những cuốn truyện tranh như thế nào?」"
# 【ポーレット】
# display as 波萊特
# JP: 「読んでいた、じゃなくて。\n読み聞かせてもらってましたよ？　ちゃあんと」
2044 = "「Không phải là đọc.\nMà là được người khác đọc cho nghe chứ? Hẳn hoi đấy nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2760 = "「Vậy sao.」"
# monologue
# JP: 誇らしげで、穏やかな笑顔が伝えてくれる。
3477 = "Nụ cười tự hào và dịu dàng đã truyền đạt tất cả."
# monologue
# JP: ご両親が、仲良く過ごしていらしたころ――\nポーレットは、愛情の真綿に包まれていたのだと。
3323 = "Khoảng thời gian ba mẹ cô ấy sống hòa thuận bên nhau——\nPaulette đã được bao bọc trong lớp bông gòn của tình yêu thương."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしは、なんていってもアリスでした。\n『奇妙の国のアリス』」
2516 = "「Nói gì thì nói, em vẫn thích Alice nhất.\n『Alice ở xứ sở kỳ diệu』」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――イメージにぴったりだな」
2381 = "「À——rất hợp với hình tượng của em đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「誰のですか？　『[カットハッター,6]切り裂き帽子屋』？」
2730 = "「Hình tượng của ai cơ? 『Thợ làm mũ xé xác』 ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「まさか。アリスだ。\n『[アリス・リドル,6]なぞなぞアリス』だ」
2470 = "「Làm gì có chuyện đó. Là Alice chứ.\n『Alice câu đố』 ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふ、よかったぁ。『ああ』って真顔でいわれたら、\nどうしようかって思ってました」
2349 = "「Ư hự, may quá. Nếu anh mà tỉnh bơ đáp 『Ừ』,\nchắc em chẳng biết phải làm sao luôn.」"
# monologue
# JP: クスクスと、いたずらっこのような顔。
3516 = "Cô ấy cười khúc khích, vẻ mặt như một đứa trẻ tinh nghịch."
# monologue
# JP: ほんの一瞬、幼いころのポーレットが、\n今のポーレットに重なっているように感じてしまう。
3064 = "Chỉ trong một khoảnh khắc, tôi có cảm giác như Paulette thuở ấu thơ,\nđang chồng chéo lên hình bóng của Paulette hiện tại."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、『わたしはアリス』って思ってました。\nママに頼んで、ドレスも縫ってもらったりして」
2519 = "「Em cũng từng nghĩ 『Mình là Alice』 đấy.\nCòn nhờ mẹ may váy cho nữa cơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お母様にか」
2717 = "「Mẹ em may sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「もともと、ママ、そっち系が得意だったんです。\nお裁縫とか、小物作りとか、いわゆるクラフト系」
2426 = "「Vốn dĩ, mẹ em rất giỏi những việc như thế.\nMay vá này, làm đồ thủ công này, hay còn gọi là đồ handmade ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2301 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「個人輸入のお仕事も、その辺の物を取り寄せて、\nそうしたらお友達にも頼まれるようになって……って」
2395 = "「Công việc nhập khẩu cá nhân cũng là do đặt hàng những thứ liên quan đến mảng đó,\nrồi bạn bè nhờ vả dần dà mà thành......」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。本職にまで伸びた趣味の品ならば、\n見事なドレスで――可愛いらしかったのだろうな」
2758 = "「Ra vậy. Nếu là sản phẩm từ sở thích mà phát triển thành nghề chính,\nthì chắc hẳn đó là một chiếc váy tuyệt đẹp——và vô cùng đáng yêu nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「見ます？　写真。わたし、ちょっと……\nううん、結構、自信ありますよ？」
2084 = "「Anh xem ảnh không? Em, hơi bị......\nÀ không, em khá là tự tin đấy nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、喜んで見せてもらおう」
2338 = "「Ừ, anh rất sẵn lòng chiêm ngưỡng.」"
# 【ポーレット】
# display as 波萊特
# JP: 「れいなにもナイショですよ？\nあのこ、ぜったいはしゃいじゃうから」
2439 = "「Giữ bí mật với cả Reina nhé?\nCon bé mà biết là kiểu gì cũng phấn khích ầm ĩ lên cho xem.」"
# 【双鉄】
# display as 雙鐵
# JP: 「れいなにもナイショであるなら、\n御一夜鉄道最高機密のひとつだな――心得た」
2695 = "「Nếu phải giữ bí mật với cả Reina,\nthì đây là một trong những bí mật tối cao của Đường sắt Ohimitera rồi——Anh hiểu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それじゃあ」
2791 = "「Vậy thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
# 2301 = "「嗯」" 
# monologue
# JP: 古風な金属のペンダント――\nいや、この場合はロケットというのがふさわしかろう。
3639 = "Một mặt dây chuyền kim loại cổ điển——\nKhông, trong trường hợp này gọi là mặt dây chuyền có lồng ảnh thì đúng hơn."
# monologue
# JP: 机の一番上にある、カギの引き出しから取り出して、\nポーレットはパチン、と開いてくれる。
3127 = "Lấy ra từ ngăn kéo có khóa trên cùng của bàn làm việc,\nPaulette bật mở nó ra cho tôi xem."
# 【ポーレット】
# display as 波萊特
# JP: 「はい。どうぞ」
2087 = "「Đây. Anh xem đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おおお――まるで――映画の子役だな。\nすごいな、アリス・リドルそのもののようだ」
2173 = "「Ồ ồ——Cứ như——diễn viên nhí trong phim vậy.\nTuyệt quá, y hệt Alice Liddell luôn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そんな！　そんなことないですよ」
2469 = "「Làm gì có! Không có chuyện đó đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……かもしれんな。おそらく、作者が思った\nアリス・リドルよりも可愛いかろうから」
2283 = "「À......cũng có thể. Có lẽ là vì,\ncòn đáng yêu hơn cả Alice Liddell mà tác giả tưởng tượng nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ちょっ、双鉄くんってば！」
2180 = "「Khoan đã, Anh Soutetsu thật là!」"
# monologue
# JP: パチン。ロケットはすぐに閉じられてしまう。
3139 = "Tách. Mặt dây chuyền lập tức bị đóng lại."
# monologue
# JP: よほど恥ずかしかったのだろうか、\n耳まで、真っ赤になっている。
3179 = "Có lẽ vì quá xấu hổ,\nmà đỏ bừng đến tận mang tai."
# 【ポーレット】
# display as 波萊特
# JP: 「アリスよりかわいいなんて、ありえないです。\nアリスは、世界一かわいい女の子なんですから」
2507 = "「Làm gì có chuyện đáng yêu hơn cả Alice chứ.\nAlice là cô bé đáng yêu nhất thế giới mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば、ポーレットは一位タイだな」
2578 = "「Vậy sao. Nếu vậy thì, Paulette là đồng hạng nhất rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だーかーらー！　双鉄くん本気でいってくれてるの\nわかるから、うれしいけど恥ずかしいんですよぉ」
2534 = "「Đã-bảo-là! Em biết Anh Soutetsu nói thật lòng\nnên em rất vui, nhưng mà xấu hổ lắm đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「本気も本気だ。ポーレットもかわいかったが、\nドレスも素晴らしい――正真正銘『誂え物』だな」
2513 = "「Hoàn toàn là thật lòng mà. Paulette vừa đáng yêu,\nmà chiếc váy cũng rất tuyệt——Đúng chuẩn 『Đồ đặt may』 luôn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「アツラエ……もの？」
2814 = "「Đồ......đặt may?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、誂える。注文仕立て――\nオーダーメイドという意味だ」
2321 = "「Ừ, đặt may. May theo yêu cầu——\nNghĩa là đồ thiết kế riêng ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それはもちろん！　ママがわたしのためだけに、\n特別につくってくれたお洋服なんですから」
2801 = "「Tất nhiên rồi! Vì đó là chiếc váy mẹ đặc biệt\nlàm riêng cho một mình em mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2301 = "「嗯」" 
# monologue
# JP: 笑顔に、思考が暖められる。
3163 = "Nụ cười ấy, làm ấm lên những suy nghĩ trong tôi."
# monologue
# JP: 話題にするのも、なんとなく避けていたことだけれど、\nこの笑顔なら――
3254 = "Việc nhắc đến chủ đề này, không hiểu sao tôi vẫn luôn lảng tránh,\nnhưng nếu là nụ cười này thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「それで、いいのではないか？」
2790 = "「Thế thì, chẳng phải rất tốt sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「へ？　それ、って――」
2195 = "「Hả? Thế, là sao——」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから。誂えてもらうのだ。\nメルヘン列車の衣装を、ポーレットのお母様に」
2447 = "「Thì là. Nhờ bác ấy may cho.\nTrang phục cho chuyến tàu cổ tích, nhờ mẹ của Paulette ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　ママに、って――えと、あの――だって」
2190 = "「Hả!? Nhờ mẹ, sao——à ừm, cái đó——nhưng mà」"
# monologue
# JP: いかん。戸惑わせてしまったか。\n話の早さに甘えて、速度を上げすぎた。が――
3107 = "Không ổn. Làm cô ấy bối rối mất rồi.\nCậy mạch chuyện đang trôi chảy mà tôi đã đẩy nhanh tốc độ quá. Nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「そういう話なのだろう？\n『地元理解を得るために』とは」
2749 = "「Chẳng phải là chuyện đó sao?\n『Để nhận được sự thấu hiểu của địa phương』 ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい！　そうです。その話でした」
2260 = "「A, vâng! Đúng vậy. Là chuyện đó.」"
# monologue
# JP: 構わず更に踏み込めば、\nするり、ポーレットは膝から下りてしまう。
3344 = "Tôi mặc kệ mà lấn tới thêm bước nữa,\nPaulette liền tuột xuống khỏi đùi tôi."
# monologue
# JP: 緩み溶けていたその表情を引き締め直し、\n椅子を回して僕と向き合う。
3146 = "Chấn chỉnh lại biểu cảm đang buông lỏng tan chảy,\ncô ấy xoay ghế lại đối mặt với tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「やっぱり、保守的な方もいますから――\n新しい箱物ってだけで反対意見も出てくるんです」
2767 = "「Quả nhiên là vẫn có những người bảo thủ——\nChỉ vì là công trình mới mà đã có ý kiến phản đối rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「絵本館でさえも、か」
2456 = "「Ngay cả thư viện truyện tranh cũng vậy sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「絵本館でもです。どこの国でも時代でも、\nきっと、その辺っておんなじなんだとも思います」
2675 = "「Ngay cả thư viện truyện tranh ạ. Dù ở quốc gia nào, thời đại nào,\nem nghĩ chuyện đó chắc chắn cũng giống nhau thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2569 = "「Ừ——」"
# monologue
# JP: 術仙炭鉱もそうだった。\n思い返せば、腑に落ちる。
3601 = "Mỏ than Jutsu-sen cũng vậy.\nNgẫm lại thì, cũng dễ hiểu thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「質や内容の問題ではなく。\n『変化そのもの』を忌避する方はいるということか」
2042 = "「Không phải vấn đề về chất lượng hay nội dung.\nMà là có những người kiêng kỵ 『chính sự thay đổi』 sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。でも、そこは民主主義ですから――\n多数派を固めることが、まず第一の対応になります」
2615 = "「Đúng vậy ạ. Nhưng, vì đây là nền dân chủ——\nnên việc củng cố phe đa số sẽ là đối sách ưu tiên hàng đầu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2301 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「その次に、反対派との対話ですよね。\n意見を変えてもらうことが無理でも、絶対に必要」
2643 = "「Tiếp theo đó là đối thoại với phe phản đối.\nDù không thể khiến họ thay đổi ý kiến, nhưng đó là việc tuyệt đối cần thiết.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それがつまりは『地域の皆様の理解を得るため』で。\nメルヘン列車は、試金石的な第一歩という位置づけか？」
2061 = "「Tóm lại đó là 『Để nhận được sự thấu hiểu của người dân địa phương』.\nChuyến tàu cổ tích được định vị như một bước đi đầu tiên mang tính thử nghiệm sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなりますね。地域の有力者の方々に乗って頂き、\n列車内を、絵本館のショールームにするイメージです」
2451 = "「Sẽ là như vậy ạ. Sẽ mời những người có tầm ảnh hưởng ở địa phương lên tàu,\nvới ý tưởng biến bên trong chuyến tàu thành phòng trưng bày của thư viện truyện tranh.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2114 = "「Ra là vậy.」"
# monologue
# JP: ……丁寧な根回しを行いつつの、プロモーション。\n本質的に政治家なのだと、つくづく思う。
1467 = "......Một chiến dịch quảng bá đi kèm với sự vận động hành lang cẩn thận.\nTôi thấm thía nhận ra rằng, bản chất cô ấy đúng là một chính trị gia."
# monologue
# JP: ただ、政治家よりも、\n鉄道会社社長の方に、さらに高い適正があっただけで。
3027 = "Chỉ là, so với chính trị gia,\ncô ấy còn có năng lực cao hơn ở vai trò giám đốc công ty đường sắt mà thôi."
# 【ポーレット】
# display as 波萊特
# JP: 「ですから……『かえるのあまがっぱ』を読んで\n思ったんですけど――メルヘンも、和風に寄せて」
2539 = "「Vì thế nên......đọc 『Áo mưa của ếch』 xong\nem mới nghĩ——chất cổ tích, cũng nên thiên về phong cách Nhật Bản.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ショールームということは、メルヘン列車が、、\n『湯医絵本館』の雛形になるという理解でよいか？」
2085 = "「Là phòng trưng bày, nghĩa là có thể hiểu chuyến tàu cổ tích\nsẽ trở thành mô hình thu nhỏ của 『Thư viện Truyện tranh Yunosaka』 đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。プレスも呼びますし――事実上、\nいわゆる基本線の提示、お披露目になると思います」
2568 = "「Vâng ạ. Bọn em cũng sẽ mời cả báo chí nữa——trên thực tế,\nem nghĩ đây sẽ là buổi giới thiệu, ra mắt cái gọi là định hướng cơ bản.」"
# 【双鉄】
# display as 雙鐵
# JP: 「で、あれば、和風に寄せるのには反対だ。\n地元対策になるかもしれんが、観光アピールが弱まる」
2798 = "「Nếu vậy thì anh phản đối việc thiên về phong cách Nhật Bản.\nCó thể nó sẽ là đối sách tốt với địa phương, nhưng sức hút du lịch sẽ bị giảm sút.」"
# monologue
# JP: 怪訝そうに眉がひそまって――\n次の瞬間、わ、と解ける。
3181 = "Cô ấy nhíu mày vẻ nghi hoặc——\nnhưng khoảnh khắc tiếp theo, oa, đã giãn ra."
# 【ポーレット】
# display as 波萊特
# JP: 「あああ！？　本当――\nやだ、わたし、目的と手段がいれかわるとこだった」
2258 = "「A a a!? Đúng thật——\nChết dở, em suýt nữa thì nhầm lẫn giữa mục đích và phương tiện rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「補い合うために僕がいる。細部にとらわれず、\nポーレットにはポーレットの着想を伸ばしてほしい」
2517 = "「Có anh ở đây để bù đắp cho em mà. Đừng bận tâm đến những tiểu tiết,\nanh muốn Paulette cứ phát huy ý tưởng của Paulette đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――はい！」
2319 = "「A——vâng!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいこだ」
2654 = "「Ngoan lắm.」"
# monologue
# JP: 髪を撫でつつ、指に絡める。\n金色の雨の感触が、思考を落ち着かせてくれる。
3316 = "Vừa vuốt ve mái tóc, tôi vừa luồn những ngón tay vào.\nCảm giác của cơn mưa vàng giúp suy nghĩ của tôi tĩnh lặng lại."
# 【双鉄】
# display as 雙鐵
# JP: 「……予算や設備の都合もあろうが、僕としては、\n『世界各国の絵本と触れ合える』程度は必要かと思う」
1516 = "「......Dù sẽ có những hạn chế về ngân sách và cơ sở vật chất, nhưng theo anh,\nít nhất cũng cần phải đạt đến mức 『Có thể tiếp xúc với truyện tranh từ khắp nơi trên thế giới』.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。湯医ローカルな施設にしちゃったら、\n御一夜鉄道的には、ほとんど利益を生めませんよね」
2566 = "「Đúng vậy nhỉ. Nếu chỉ biến nó thành cơ sở mang tính địa phương của Yunosaka,\nthì xét về mặt Đường sắt Ohimitera, hầu như sẽ chẳng sinh ra lợi nhuận gì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そこで、ポーレットの母君だ」
2542 = "「Thế nên, mới cần đến mẹ của Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
2248 = "「A!」"
# monologue
# JP: 話が早い。
3148 = "Hiểu nhanh đấy."
# monologue
# JP: もはやいわずもがなであろうが、\n背中を押すため、言葉を続ける。
3301 = "Có lẽ không cần phải nói thêm nữa,\nnhưng để tiếp thêm động lực, tôi tiếp tục lời nói."
# 【双鉄】
# display as 雙鐵
# JP: 「服のことをきっかけに、絵本館のことを相談しよう。\n世界の絵本を集める力にもなってくれるかもしれん」
2549 = "「Nhân chuyện trang phục, hãy bàn bạc với bác ấy về thư viện truyện tranh xem sao.\nBiết đâu bác ấy có thể giúp chúng ta tập hợp truyện tranh trên toàn thế giới cũng nên.」"
# 【ポーレット】
# display as 波萊特
# JP: 「お仕事。ママと――。\nパパが、双鉄くんが繋いでくれた、このレールの先で」
2169 = "「Công việc. Cùng với mẹ——.\nỞ phía cuối con đường ray mà ba, và Anh Soutetsu đã kết nối này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――」
# 2240 = "「啊」" 
# monologue
# JP: 美しい。\nその一言しか、思えなくなる。
3548 = "Đẹp quá.\nTôi chỉ có thể nghĩ đến một từ đó."
# monologue
# JP: 決意が、全身にみなぎっている。\n意思の力が、瞳を強く輝かせてる。
3125 = "Quyết tâm đang tràn ngập khắp toàn thân.\nSức mạnh ý chí làm đôi mắt sáng rực lên."
# 【ポーレット】
# display as 波萊特
# JP: 「頼んでみます。頼みたいです。\n式にもやっぱり――ママのこと、招待したいですし」
2493 = "「Em sẽ thử nhờ xem sao. Em muốn nhờ mẹ.\nVì dù sao thì trong hôn lễ——em cũng muốn mời mẹ đến mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか！」
2409 = "「Vậy sao!」"
# monologue
# JP: それは嬉しい。ありがたく。\n式の日取りも、そうできれば確定に至るだろう。
3358 = "Thật đáng mừng. Thật đáng quý.\nNếu được vậy, có lẽ ngày cử hành hôn lễ cũng sẽ được ấn định."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、機を見て僕にもご挨拶させてくれ」
2800 = "「Nếu vậy, khi có dịp hãy cho anh gửi lời chào hỏi nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いいですよ？　その機は、今です！」
2127 = "「Được chứ ạ? Cơ hội đó, chính là lúc này!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
2146 = "「Hự」"
# monologue
# JP: ポーレットは受話器をとって、\nためらわずにダイヤルし始める。
3492 = "Paulette nhấc ống nghe lên,\nbắt đầu quay số không chút do dự."
# monologue
# JP: ならば多少の気後れごときで、\nポーレットが見せた勇気を、傷つけまい。
3648 = "Nếu vậy, tôi không thể để một chút e ngại của bản thân,\nlàm tổn thương lòng can đảm mà Paulette đã thể hiện được."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……ごめんね、ママ。わたし。\nあの、今大丈夫？」
2234 = "「A......xin lỗi mẹ. Con đây.\nÀ ừm, bây giờ mẹ có tiện nói chuyện không?」"
# monologue
# JP: しかし――自己紹介をどうしよう。
3087 = "Nhưng mà——mình nên tự giới thiệu thế nào đây."
# 【ポーレット】
# display as 波萊特
# JP: 「うん。用事はいくつかあって――え！？\nなんで知って――あ……宮本さん？　もう～」
2325 = "「Vâng. Con có mấy việc——hả!?\nSao mẹ biết——a......chú Miyamoto? Thật tình~」"
# monologue
# JP: 『ポーレットさんとおつきあいしている』……いや、\n『ポーレットさんと婚約させていただいている』――
1442 = "『Cháu đang hẹn hò với Paulette』......Không,\n『Cháu đã đính hôn với Paulette』——"
# 【ポーレット】
# display as 波萊特
# JP: 「わかった。じゃ、今かわるね？\n――双鉄くん。双鉄くん？」
2412 = "「Con biết rồi. Vậy, con chuyển máy luôn nhé?\n——Anh Soutetsu. Anh Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、どうしたポーレ――っと」
2323 = "「Ồ, sao thế Paule——ờm」"
# monologue
# JP: 受話器だ。\n僕に、手渡そうとしてくれている。
3180 = "Ống nghe.\nCô ấy đang định đưa nó cho tôi."
# monologue
# JP: 思考の整理がまったく追いついていないけれども、\nためらわず受け取るべきと、それだけはわかる。
3353 = "Dù dòng suy nghĩ vẫn chưa kịp sắp xếp lại,\nnhưng tôi biết mình phải nhận lấy không chút do dự, chỉ có điều đó là rõ ràng."
# 【双鉄】
# display as 雙鐵
# JP: 「は、はい！　お電話変わりました。\n僕は、その――ぽ、ポーレットの、右田です」
2269 = "「V-vâng! Cháu nghe đây ạ.\nCháu là, à ừm——người của P-Paulette, Migita ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……本当にお疲れ様だ。素晴らしかった。\nこの上ないプロモーションになったと思う」
1513 = "「......Em thực sự vất vả rồi. Tuyệt vời lắm.\nAnh nghĩ đây là một chiến dịch quảng bá không thể nào tốt hơn được nữa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「つーかーれーたー」
2670 = "「Mệttttttt quáaaaaa.」"
# monologue
# JP: ぐったりぺったりもたれかかって、\n頬をすりすり、甘えてくる。
3119 = "Cô ấy rã rời tựa hẳn vào người tôi,\ncọ cọ má, làm nũng."
# 【ポーレット】
# display as 波萊特
# JP: 「どうでしたかぁ？　今日のわたし」
2070 = "「Hôm nay em thế nào ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕も一乗客になり、気動車の国のアリスに\nおもてなししてほしいと思ったほどだ。最高だった」
2764 = "「Đến mức anh cũng muốn trở thành một hành khách,\nđể được Alice ở xứ sở toa xe tự hành thiết đãi đấy. Tuyệt vời lắm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
2232 = "「A......」"
# monologue
# JP: 嬉しさと、申し訳無さとが混じる息。
3158 = "Tiếng thở dài xen lẫn niềm vui và sự áy náy."
# monologue
# JP: 後者は完全に不用のものだ。\n吹き飛ばすため、いいこと髪を撫でてやる。
3223 = "Sự áy náy hoàn toàn không cần thiết.\nĐể thổi bay nó đi, tôi vuốt ve mái tóc cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「極上のイベント列車だったと思う。まさに適材適所。\n僕も、その一員を務めることができ、光栄だ」
2530 = "「Anh nghĩ đây là một chuyến tàu sự kiện cực kỳ xuất sắc. Đúng là dụng nhân như dụng mộc.\nAnh cũng rất vinh dự khi được đóng góp một phần vào đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そういってもらえると……すごく、ほっとします。\n双鉄くんもれいなも、とっても素敵でした」
2679 = "「Nghe anh nói vậy......em thấy nhẹ nhõm hẳn.\nCả Anh Soutetsu và Reina, đều rất tuyệt vời.」"
# 【双鉄】
# display as 雙鐵
# JP: 「『銀河急行の夜』か。挿絵の無い原作だが――\n確かに、あんな制服なのだろうな」
1483 = "「『Đêm trên chuyến tàu tốc hành Ngân Hà』 sao. Dù nguyên tác không có tranh minh họa——\nnhưng chắc hẳn đồng phục cũng giống như vậy nhỉ.」"
# monologue
# JP: 運転士が僕。レイルロオドは、無論、れいな。\nふたりして、揃いの制服に袖を通した。
3663 = "Lái tàu là tôi. Railord, dĩ nhiên là Reina.\nHai chúng tôi đã cùng mặc chung một kiểu đồng phục."
# 【ポーレット】
# display as 波萊特
# JP: 「今日一日しか使わないの、\n本当にもったいないって思っちゃいました」
2533 = "「Chỉ dùng cho mỗi ngày hôm nay,\nem thấy thật sự tiếc quá đi mất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それをいうならポーレットこそだ。\nああ、ある意味では、ハチロクと日々姫も」
2438 = "「Nói vậy thì Paulette mới đúng chứ.\nÀ, ở một góc độ nào đó, cả Hachiroku và Hibiki cũng vậy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「すっごくかわいかった！！」
2394 = "「Cực kỳ đáng yêu luôn!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふたりとも、やる前は不満たらたらだったがな。\n本番では、見事にアテンダントをしてくれた」
2064 = "「Cả hai đứa, trước khi làm thì bất mãn ra mặt.\nNhưng lúc vào việc, lại hoàn thành xuất sắc vai trò tiếp viên.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ハチロクちゃんのかえるさんに\n日々姫ちゃんのもぐらさん、大人気でしたね」
2106 = "「Chú ếch của Hachiroku\nvà bác chuột chũi của Hibiki, được yêu thích lắm luôn nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、サインをせがまれ途方にくれて、\n『かえる』と達筆で記していたのは、傑作だった」 
2317 = "「Ừ, lúc bị vòi xin chữ ký đến bối rối,\nnhưng vẫn phóng bút viết chữ 『Ếch』 tuyệt đẹp, đúng là kiệt tác.」"
# monologue
# JP: 肩にちいさなむしさんを乗せた、ハチロクかえる。\n大スコ装備の日々姫もぐら。
3056 = "Chú ếch Hachiroku cõng trên vai một chú sâu nhỏ.\nChuột chũi Hibiki trang bị một chiếc xẻng to đùng."
# monologue
# JP: くわえて僕らの銀河急行制服に、\n無論、ポーレットのアリスドレスも――
3067 = "Thêm vào đó là đồng phục tốc hành Ngân Hà của chúng tôi,\nvà tất nhiên, cả chiếc váy Alice của Paulette nữa——"
# 【双鉄】
# display as 雙鐵
# JP: 「お義母様には、まったく頭があがらないな。\nまさか、ここまでのご協力をくださるとは」
2523 = "「Thật sự là không thể ngẩng đầu lên trước mẹ vợ được.\nKhông ngờ bác ấy lại hỗ trợ đến mức này.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えへへ」
2369 = "「Ê hế hế.」"
# monologue
# JP: 圧倒的なお力添えが、やはり嬉しかったのだろう。\nポーレットのはにかみは、まるで天使の可愛らしさだ。
3493 = "Chắc hẳn cô ấy vẫn rất vui vì sự giúp đỡ nhiệt tình đó.\nNụ cười bẽn lẽn của Paulette đáng yêu như một thiên thần vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「十年以上の穴埋めだからって、いってくれました。\nそれに――新しい息子へのプレゼント、っとも」
2396 = "「Mẹ bảo là để bù đắp cho hơn mười năm qua.\nHơn nữa——cũng là quà tặng cho cậu con trai mới.」"
# 【双鉄】
# display as 雙鐵
# JP: 「光栄だ。\n……なんというか、いよいよ、実感してくるな」
2536 = "「Thật vinh hạnh.\n......Nói sao nhỉ, rốt cuộc cũng bắt đầu cảm nhận được sự chân thực rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。結婚。\n家族が増えるって……うん。こういうことなんだ」
2574 = "「Đúng vậy nhỉ. Kết hôn.\nGia đình có thêm người......ừm. Là thế này đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
# 2569 = "「是啊」" 
# monologue
# JP: いつか、日々姫がポーレットを\n『お義姉さん』と呼ぶ日もくるのだろうか？
3577 = "Sẽ có ngày, Hibiki gọi Paulette\nlà 『Chị dâu』 chứ?"
# monologue
# JP: 想像するだに、なんとも面映い気になってくる。
3271 = "Chỉ tưởng tượng thôi, cũng đã thấy ngượng ngùng sao đó rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、お義母様は本当にお忙しい方なのだな。\nあっという間に帰られてしまった」
2053 = "「Nhưng mà, mẹ vợ đúng là người bận rộn thật đấy.\nThoắt cái đã về mất tiêu rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「本当は、乗ってってほしかったんですけどね、\nメルヘン列車。そこまではわがまま言えないし」
2657 = "「Thực ra, em rất muốn mẹ lên đi thử,\nchuyến tàu cổ tích. Nhưng cũng không thể đòi hỏi ích kỷ đến mức đó được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「福岳から[しゃんはい,1]上杯に飛んで、パル＝イスか。\nポーレットの働きものは、ご両親譲りなのだな」
2462 = "「Bay từ Fukuoka đến Thượng Hải, rồi sang Paris sao.\nSự chăm chỉ của Paulette, chắc là được thừa hưởng từ ba mẹ nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。うふふ、わたしも知りませんでした」
2563 = "「Vâng. Ư hự hự, chính em cũng không biết điều đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「次にお会いできるのは結婚式で、か。\nいいな、こういうのは。実にいい」
2038 = "「Lần tới gặp lại là ở lễ cưới, nhỉ.\nThích thật đấy, những chuyện thế này. Quả thực rất tuyệt.」"
# 【ポーレット】
# display as 波萊特
# JP: 「本当に」
2659 = "「Thật sự luôn.」"
# monologue
# JP: 言って、すりすり。\nまたポーレットが甘えてくれる。
3624 = "Nói rồi, cô ấy lại cọ cọ.\nPaulette lại làm nũng với tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「全部、双鉄くんのおかげです」
2811 = "「Tất cả, đều là nhờ Anh Soutetsu cả.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、そんなことは――」
2192 = "「Không, đâu có chuyện đó——」"
# 【ポーレット】
# display as 波萊特
# JP: 「あります。双鉄くんがいなかったら、\n今日のこの日も、みんなの笑顔も、絶対なかった」
2442 = "「Có chứ. Nếu không có Anh Soutetsu,\nngày hôm nay, và cả nụ cười của mọi người, tuyệt đối sẽ không hiện hữu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それをいうなら、ポーレットこそだろう」
2697 = "「Nếu nói vậy thì, phải là Paulette mới đúng chứ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　わたしなんて、なにも」
2199 = "「Hả? Em thì, có làm gì đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットとれいながふたりで繋いでくれた――\nそのレールの上を、僕らは走っているにすぎん」
2488 = "「Hai người Paulette và Reina đã kết nối lại với nhau——\nchúng ta chẳng qua chỉ đang chạy trên đoạn đường ray đó mà thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
# 2232 = "「啊……」" 
# monologue
# JP: ほうっと、ポーレットの表情がゆるむ。\n泣き出しそうに、瞳が潤む。
3504 = "Biểu cảm của Paulette chùng xuống.\nĐôi mắt rưng rưng như chực khóc."
# monologue
# JP: そんな表情も素敵だが、\nやはり、晴れの日には笑ってほしい。
3640 = "Biểu cảm đó cũng rất tuyệt,\nnhưng quả nhiên, vào ngày vui thì tôi vẫn muốn cô ấy mỉm cười."
# 【双鉄】
# display as 雙鐵
# JP: 「そういえば、お土産をいただいたな」
2704 = "「Nhắc mới nhớ, chúng ta có nhận được quà lưu niệm nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうでした！　開けてみないと」
2571 = "Paulette hớn hở tháo lớp gói quà trang nhã."
# monologue
# JP: いそいそと、ポーレットが小洒落た包みを解いていく。
3479 = "「Oa, hồng trà Fauchon và bánh eclair mini này!\nVui quá, mẹ vẫn còn nhớ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わぁあ、フォトンの紅茶とミニエクレア！\n嬉しい、ママ、覚えててくれたんだ」
2177 = "「Là món em thích sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「好物なのか？」
2560 = "「Thích từ hồi còn bé tí luôn ấy chứ!\nAnh đợi một lát nhé. Em đi pha ngay đây.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それはもう、ちっちゃいころから！\n待ってて下さい。すぐ淹れますね」
2505 = "Lạch bạch lạch bạch, đến cả tiếng bước chân cũng rộn rã."
# monologue
# JP: パタパタと、足音までもが弾んでいる。
3170 = "「Vì là trà Assam,\nnên em đề cử pha trà sữa nhé——」"
# 【ポーレット】
# display as 波萊特
# JP: 「アッサムだから、\nミルクティーがおすすめですけどー」
2817 = "「Vậy thì, pha như thế đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、それで」
2784 = "「Vâng. Ư hự hự, vui quá đi.\nĐược uống hồng trà mẹ tặng cùng với Anh Soutetsu thế này.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁい。うふふ、嬉しいなぁ。\nママにもらった紅茶を、双鉄くんと飲めるだなんて」
2402 = "「Anh cũng rất vui. Thật hạnh phúc.」"
# 【双鉄】
# display as 雙鐵
