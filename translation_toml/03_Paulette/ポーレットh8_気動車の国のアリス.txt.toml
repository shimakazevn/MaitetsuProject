2447 = "「就是給你做一件衣服。讓你媽媽給你做一件童話列車用的衣服」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　ママに、って――えと、あの――だって」
2190 = "「哎！？讓媽媽？哎，那個，可是——」" 

# monologue
# JP: いかん。戸惑わせてしまったか。\n話の早さに甘えて、速度を上げすぎた。が――
3107 = "壞了，我讓她不知所措了。我趁她高興說了出來，這件事還是說早了。但是——" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういう話なのだろう？\n『地元理解を得るために』とは」
2749 = "「這不是理所當然的嗎？這就是“爭取當地人的理解”」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい！　そうです。その話でした」
2260 = "「啊，嗯！沒錯，是這麼說的」" 

# monologue
# JP: 構わず更に踏み込めば、\nするり、ポーレットは膝から下りてしまう。
3344 = "我繼續往下說道，於是波萊特從我身上下去了。" 

# monologue
