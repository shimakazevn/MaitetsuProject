2615 = "「沒錯。不過這裡施行的是民主主義——最重要的還是爭取到多數人的同意」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2301 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
