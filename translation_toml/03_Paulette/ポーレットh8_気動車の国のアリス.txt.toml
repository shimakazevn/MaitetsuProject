2054 = "「Không đâu? Paulette lên đỉnh, tính là một lần.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら、もう――んっ――ふっ、あ――\n数え、きれない。だって、双鉄、くん、いっつも」
2785 = "「Nếu vậy, thì đã——ưm——phù, a——\nđếm, không xuể rồi. Bởi vì, Anh Soutetsu, lúc nào cũng」"
# 【双鉄】
# display as 雙鐵
# JP: 「いっつも？」
2527 = "「Lúc nào cũng?」"
# monologue
# JP: 指を、割れ目に食い込ませる。
3304 = "Thọc ngón tay vào khe hở."
# monologue
# JP: （くちっ――じゅるっ――しゅっ――にちゅっ）
3724 = "（Nhóp——rột——sượt——nhóp nhép）"
# monologue
# JP: 爪の背までをいっぱいに使い、\nクリトリスから膣口までを、ゆるく往復させていく。
3329 = "Tận dụng triệt để cả mu móng tay,\ntừ từ di chuyển qua lại giữa âm vật và cửa âm đạo."
# 【ポーレット】
# display as 波萊特
# JP: 「あ――ふっ――ああっ――いま、だって――\nだって、わたし――んっ――双鉄、くん、にっ」
2210 = "「A——phù——a a——ngay lúc này, cũng vậy——\nbởi vì, em——ưm——bị, Anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕に？」
2686 = "「Bị anh?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あっ、ああっ――んっ――声、聞く、だけでっ――\nゾクって、しちゃうし――それに、指っ、これっ――」
2239 = "「A, a a——ưm——chỉ cần, nghe, giọng nói thôi——\ncũng đã, rùng mình rồi——hơn nữa, ngón tay, thế này——」"
# 【双鉄】
# display as 雙鐵
# JP: 「これが、どうした？」
2761 = "「Thế này, thì sao?」"
# monologue
