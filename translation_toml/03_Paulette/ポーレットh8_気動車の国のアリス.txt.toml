2314 = "「Ừ, tập hợp những người liên quan đến\nxưởng rượu ở Ohimitera,\nvà những người\nliên quan đến thư viện truyện tranh\nYunosaka lại với nhau.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ええ、っと」
2752 = "「À ừm」"

# 【双鉄】
# display as 雙鐵
# JP: 「『足踏みワイン体験』単体ではもったいない。\n御一夜にはクマ焼酎というブランドがあるのだから」
2125 = "「Chỉ tổ chức 『Trải nghiệm làm rượu vang\nbằng chân』 không thôi thì phí quá.\nOhimitera vốn có thương hiệu rượu Shochu\nKuma mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「[ゆのい,1]湯医にも、ブランド！　『湯医ワイン』」
2635 = "「Nó là thứ đồ thực dụng nhất mà. Bị bẩn,\nbị hỏng là điều đương nhiên\n……Nhưng cái\nnày, đúng vậy. Hơi thiếu bảo dưỡng quá\nrồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうできたら理想的だな。絵本館でも販売し、\nそれこそ、『湯医メルヘンワイン』とでもできたら」
2681 = "「???」"

# 【ポーレット】
# display as 波萊特
# JP: 「ふわわわわ～」
2176 = "「Sẽ tiến hành hạ cánh khẩn cấp.\nĐể phòng\nhờ, xin hãy giữ tư thế chống va đập.」"

# monologue
# JP: ポーレットが熱のこもった息を吐く。\nまるでもう、ワインに酔ってしまったような。
3481 = "Paulette phả ra hơi thở nóng hổi.\nCứ như\nthể đã say men rượu vang rồi vậy."

# 【ポーレット】
# display as 波萊特
# JP: 「やっぱり、凄いです双鉄くん」
2818 = "「Anh Soutetsu, quả nhiên là lợi hại thật.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　凄い、とは――」
2341 = "「Hửm? Lợi hại, là sao——」"

# 【ポーレット】
# display as 波萊特
# JP: 「[ゆのいえほんかん,4]湯医絵本館のこと、\nそこまで一気に考えてくれるなんて」
2638 = "「Chuyện về Thư viện Truyện tranh Yunosaka,\nanh có thể nghĩ xa đến mức đó trong chớp\nmắt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや……」
2143 = "「Không……」"

# monologue
# JP: 青い瞳は、きらきらまっすぐ、\n僕を、僕だけを見つめてる。
3509 = "Đôi mắt xanh biếc, lấp lánh nhìn thẳng,\nchỉ nhìn chăm chăm vào một mình tôi."

# monologue
# JP: 元はポーレットの足踏みワイン飲みたさだけだ――\nと、どうにも言い難い雰囲気だ。
3631 = "Bầu không khí này thật khó mà thú nhận\nrằng,\nban đầu chỉ là do tôi muốn uống rượu\nvang giẫm chân của Paulette thôi——"

# 【双鉄】
# display as 雙鐵
# JP: 「……話の流れが、よい連鎖をしたにすぎんさ。\nというか、いかんな。いささか冒進気味だった」
1499 = "「……Chẳng qua là mạch câu chuyện dẫn dắt\nđến đó thôi.\nMà nói thật thì, không ổn\nrồi. Hơi có chút nóng vội.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ。いわれたらそうかも」
2263 = "「A. Nghe anh nói vậy thì có vẻ đúng.」"

# monologue
# JP: 苦笑し、こつり。\nポーレットは軽く、自分のおでこを叩いてみせる。
3517 = "Cười gượng, cộc.\nPaulette gõ nhẹ lên trán\nmình."

# 【ポーレット】
# display as 波萊特
# JP: 「まだ出発信号機も、わたしたち、通過してないのに」
2492 = "「Còn dư dả?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。まずは起点に戻るとしよう。\n『メルヘン列車』の話だったな」
2573 = "「Đúng vậy. Trước mắt cứ quay lại vạch xuất\nphát đã.\nĐang nói chuyện 『Chuyến tàu cổ\ntích』 nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「っていうか、説明も全然、まだでしたね。\nごめんなさい」
2705 = "「Mà em cũng chưa giải thích gì cả nhỉ.\nEm\nxin lỗi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「婚約者同士の話が楽しく、弾みすぎただけのことだ。\nごめんなさいというのなら、僕も同罪になるぞ？」
2489 = "「Chỉ là câu chuyện giữa những người đã\nđính hôn quá vui vẻ, nên mới đi xa thôi.\nNếu em xin lỗi, thì anh cũng mang tội\nchung đấy nhé?」"

# monologue
# JP: 冗談めかしてささやけば、\nポーレットは頬を赤くする。
3354 = "（Mái tóc vàng kim này——và đôi mắt xanh\nnày——）"

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ、そんなこと言われたら、\nわたし、また[ぼうしん,1]冒進しちゃいそうですよぉ」
2272 = "「Hau, anh nói vậy,\nem lại sắp mất kiểm\nsoát nữa rồi đây này.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それは困るな。\nなら、大人しく聞くとしよう。説明をあらためて頼む」
2783 = "「Vậy thì rắc rối đấy.\nThế thì anh sẽ ngoan\nngoãn lắng nghe. Nhờ em giải thích lại\nnhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、です。コホン」
2318 = "「Vâng, ạ. E hèm.」"

# monologue
# JP: どこまでだって付き纏う甘い空気を追いやるためにか、\n咳払いする表情は、一転、キリリと引き締まる。
3523 = "Có lẽ để xua đi bầu không khí ngọt ngào cứ\nđeo bám mãi không buông,\ncô ấy hắng giọng,\nnét mặt thoắt cái trở nên nghiêm túc."

# 【ポーレット】
# display as 波萊特
# JP: 「現状、湯医方面における観光要素の弱さの克服が、\n御一夜鉄道の更なる改善へのカギになってますよね？」
2647 = "「Ng-Ngài Soutetsu!? ——Ưm」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。御一夜駅-マイントレジャー駅間のみの\n利用者が多すぎるのは、確かにかなりもったいない」
2300 = "「Ừm. Quả thực rất lãng phí khi lượng hành\nkhách\nchỉ tập trung ở đoạn ga Ohimitera\nđến ga Mine Treasure.」"

# 【ポーレット】
# display as 波萊特
# JP: 「湯医側にも、その懸念は伝えてありました。\nそこで先日出てきたのが、『湯医絵本館』案です」
2637 = "「Em cũng đã truyền đạt mối lo ngại đó cho\nphía Yunosaka.\nVà đề xuất 『Thư viện Truyện\ntranh Yunosaka』 đã được đưa ra vào hôm\ntrước.」"

# 【双鉄】
# display as 雙鐵
# JP: 「湯医と絵本の繋がりは？」
2636 = "「Ngành đường sắt bị dồn đến bước đường\ncùng thoi thóp này,\nem thậm chí còn cảm\nthấy đó là một loại tất yếu vượt ngoài sự\nlựa chọn của con người.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ええと、\nひとまずは、これ――読んでみてください」
2754 = "「À ừm,\ntrước tiên anh cứ thử đọc cái này\nxem sao.」"

# monologue
# JP: 自分の机の引き出しから、\nポーレットは一冊の絵本を取り出す。
3491 = "Từ trong ngăn kéo bàn của mình,\nPaulette\nlấy ra một cuốn truyện tranh."

# monologue
# JP: 愛読書……というわけでもなさそうだ。\nページは真白く、真新しい。
3556 = "Có vẻ không phải là sách yêu thích……\nCác\ntrang giấy trắng tinh, còn mới toanh."

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。『かえるのあまがっぱ』か。\nなんとも古風だが、暖かな絵だ――」
2387 = "「Hô. 『Áo mưa của ếch』 sao.\nTrông khá cổ\nđiển, nhưng nét vẽ lại rất ấm áp——」"

# 【ポーレット】
# display as 波萊特
# JP: 「その絵本の絵を描いてらっしゃる、\n『[きのこだいすけ,2]茸大介』先生が、湯医出身なんだそうです」
2756 = "「Tác giả vẽ cuốn truyện tranh này,\nthầy\n『Kinoko Daisuke』, nghe nói là người gốc\nYunosaka đấy ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。それは素晴らしいな。\nああ――ひょっとすると、湯医に絵本の原画なども？」
2759 = "「Ra vậy. Tuyệt vời thật.\nÀ——không chừng, ở\nYunosaka còn có cả bản gốc của truyện\ntranh nữa sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい。ご遺族からご寄贈があったっていうお話で。\nそれが、絵本館構想のベースの部分になりますね」
2331 = "「Tạm thời nên quay lại chăng.\nRa khỏi khu\nvực có thể bay, khởi động lại Navi. Từ đó\nđi đường vòng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「もう鬼籍に入られているのか。\n残念だな、一度お会いしてみたかった」
2661 = "「Thầy ấy đã qua đời rồi sao.\nTiếc thật,\nanh rất muốn được gặp thầy một lần.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。本当に、あったかくて、懐かしい絵」
2445 = "「Đúng vậy nhỉ. Những bức vẽ thực sự rất ấm\náp và hoài niệm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2616 = "「Đúng vậy.」"

# monologue
# JP: ポーレットが、僕のとなりに腰掛ける。\nページを繰る手に、やわらかな指が重なってくる。
3486 = "Paulette ngồi xuống cạnh tôi.\nNhững ngón\ntay mềm mại đặt lên bàn tay đang lật từng\ntrang sách của tôi."

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ……かえるさんのお店、大繁盛。\n『ぴちぱたぴちょん、ぴちぱちょん』」
2345 = "「Ưu tiên hàng đầu là di chuyển khỏi đây.\nCứ thế này thì chính chúng ta mới là\nchướng ngại vật trên đường ray mất——dô.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……いいものだな、朗読は」
2236 = "「À……nghe đọc truyện cũng thú vị thật đấy.」"

# monologue
# JP: 素直な気持ちが、素直に届いてくれたらしい。
3336 = "Cảm xúc chân thành của tôi, có vẻ đã được\ntruyền đạt một cách trọn vẹn."

# monologue
# JP: ポーレットはしあわせそうに微笑んで、\n続きを、優しく聞かせてくれる。
3515 = "Paulette mỉm cười hạnh phúc,\nrồi dịu dàng\nđọc tiếp cho tôi nghe."

# 【ポーレット】
# display as 波萊特
# JP: 「『かっぱをひとつ　くださいな。おおきなはっぱの\nぬれないかっぱ。あめはしとしと　まだやみません』」
1479 = "「『Cho tôi một chiếc áo mưa. Một chiếc áo\nmưa bằng chiếc lá lớn\nkhông bị ướt. Mưa\nvẫn rơi rả rích, chưa chịu tạnh』」"

# monologue
# JP: 『ぴちぱたぴちょん、ぴちぱちょん』。\n同じリズムを、ポーレットは楽しげに繰り返す。
1444 = "『Lộp độp tí tách, lộp độp tí tách』.\nPaulette vui vẻ lặp lại nhịp điệu đó."

# 【ポーレット】
# display as 波萊特
# JP: 「『おやこの　かっぱを　くださいな。\nぬるずるぺったん　かたつむり』あ、いいな、おんぶ」
1480 = "「『Cho tôi chiếc áo mưa dành cho hai mẹ\ncon.\nỐc sên bò trườn trơn tuột』 A, thích\nghê, được cõng kìa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「するか？　おんぶ」
2693 = "「Anh cõng em nhé?」"

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　あ、あの――ええと。\nそれなら、わたし、おんぶより」
2189 = "「Hả!? A, cái đó——ừm.\nNếu vậy, em thà được\nbế còn hơn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2301 = "「À.」"

# monologue
# JP: 言われずとも、だ。
3020 = "Một giọng nói phá vỡ sự cứng đờ trong chốc\nlát.\nThế nhưng, ý thức của tôi vẫn tiếp\ntục bị thu hút."

# monologue
# JP: 絵本をよけて膝をたたけば、\nポーレットはすぐに乗ってくる。
3305 = "Tôi đặt cuốn truyện sang một bên rồi vỗ vỗ\nlên đùi,\nPaulette lập tức ngồi lên."

# 【ポーレット】
# display as 波萊特
# JP: 「えへへ～　だっこだぁ」
2374 = "「Ê hế hế~ Được bế rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「さ、つづきだ。\nせっかくだ。最後まで読んでくれ」
2089 = "「Nào, tiếp tục thôi.\nCất công rồi, hãy đọc\ncho anh nghe đến cuối đi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はぁい」
# 2301 = "「嗯」" 

# monologue
# JP: ポーレットの声。膝の上にあるあたたかみ。\nおもさ、やわらぎ、いいにおい。
3488 = "Giọng nói của Paulette. Hơi ấm lan tỏa\ntrên đùi.\nSức nặng, sự êm ái, mùi hương dễ\nchịu."

# monologue
# JP: ……ページが繰られる音ごとに、\n僕のこころも、軽やかに穏やかになっていく。
1466 = "……Theo từng tiếng lật trang sách,\nlòng tôi\ncũng trở nên nhẹ nhàng và thanh thản hơn."

# 【ポーレット】
# display as 波萊特
# JP: 「『むしさん　むしゃむぐ　ぽんぽこぱん。\nおなかがふくれて　かっぱのはっぱをたべられません』」
1478 = "「『Bác sâu nhai nhóp nhép, bụng no căng\ntròn.\nBụng đã no căng, không thể ăn lá làm\náo mưa được nữa』」"

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
2205 = "「Nếu chúng ta có thể khiến xã hội công\nnhận rằng đường sắt\ncó thể hoàn thành xuất\nsắc những \"việc mà \\x%lエアクラ;#00ffc040;Aircra%l;#; không thể làm\nđược\" đó\nthì」"

# monologue
# JP: ……むしさんのまあるい穴があるからこその、\nかえるのかっぱだ、それが損なわれてしまっては――
1454 = "……Chính vì có lỗ tròn tròn do bác sâu cắn,\nmới tạo nên chiếc áo mưa của ếch, nếu điều\nđó bị phá hỏng thì——"

# 【ポーレット】
# display as 波萊特
# JP: 「『かえるのめから　なみだが　ぽちゃん。\nぴちぱたぴちょん　ぴちぱちょん』」
1485 = "「『Nước mắt rơi tí tách từ khóe mắt ếch.\nLộp độp tí tách, lộp độp tí tách』」"

# monologue
# JP: 悲しい声。
3185 = "Giọng nói đượm buồn."

# monologue
# JP: 絵本とおんなじ色した雨が、\nレールショップに、僕のこころに降り注――！？
3578 = "Cơn mưa mang màu sắc giống hệt trong\ntruyện tranh,\nnhư đang trút xuống cửa hàng\nđường sắt, xuống tận cõi lòng tôi——!?"

# 【ポーレット】
# display as 波萊特
# JP: 「『＜おいらの穴に　雨をふらすな！＞\nじめんがもるもり　もぐらが ずん！』」
1471 = "「『<Đừng có làm mưa rơi vào hang của ta!>\nMặt đất gồ lên, bác chuột chũi trồi lên\ncái vù!』」"

# monologue
# JP: 一転、どなるような大音声。
3487 = "Đột nhiên, giọng nói lớn như đang quát\ntháo."

# monologue
# JP: もぐら登場の勢いに、揺られた髪が手に触れてくる。\n金の雨だと、不意に感じる。
3651 = "Theo đà xuất hiện của chuột chũi, mái tóc\nđung đưa chạm vào tay tôi.\nBất chợt, tôi\ncó cảm giác như đó là cơn mưa vàng."

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
2240 = "「Đúng vậy. Hơn nữa, chi phí sản xuất\nQuirquitium được cho là\nthể tích tăng gấp\nđôi thì chi phí bình phương, gấp ba thì\nlập phương.」"

# 【双鉄】
# display as 雙鐵
# JP: 「続きを」
2676 = "「!」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ……はい」
2235 = "「A, xin lỗi anh. Tôi hơi bất ngờ.\nTại vì,\ntôi không nghĩ là anh lại biết đến tôi.」"

# monologue
# JP: ポーレットの髪を梳いてはこぼす。\nさらさら、指にも雨が降る。
3328 = "Tôi luồn tay vuốt ve mái tóc Paulette rồi\nthả ra.\nMềm mại, như cơn mưa trút xuống\nnhững ngón tay."

# monologue
# JP: 昔のことを、きれぎれに思い出すけれど、\nそれさえも、心地よい声がすぐさま流す。
3318 = "Dù những ký ức xưa cũ thỉnh thoảng ùa về\nđứt đoạn,\nnhưng ngay cả chúng cũng bị\ngiọng nói êm ái cuốn trôi đi mất."

# 【ポーレット】
# display as 波萊特
# JP: 「『みんなで　もぐらと“あまやどり”\nこれならだれもぬれません。かえるの雨もあがります』」
1473 = "「『Tất cả cùng \"trú mưa\" với chuột chũi.\nThế này thì không ai bị ướt cả. Cơn mưa\ncủa ếch cũng tạnh rồi』」"

# monologue
# JP: ポーレットの笑顔も晴れ渡る。\n挿絵のかえると、むしと、もぐらと、みんなと同じく。
3506 = "Nụ cười của Paulette cũng bừng sáng.\nGiống\nhệt như chú ếch, bác sâu, chuột chũi và\ntất cả mọi người trong bức minh họa."

# 【ポーレット】
# display as 波萊特
# JP: 「『おそらのあめも　あがります。かえるのかっぱを\nほしましょう。にこにこぽかぽか　はいおしまい！』」
1475 = "「『Cơn mưa trên trời cũng đã tạnh. Hãy phơi\náo mưa của ếch\ncho khô nào. Cười tươi rạng\nrỡ, ấm áp vô cùng. Câu chuyện đến đây là\nhết!』」"

# monologue
# JP: （パチパチパチパチ）
3729 = "（Bốp bốp bốp bốp）"

# 【ポーレット】
# display as 波萊特
# JP: 「やだ、双鉄くん。拍手だなんておおげさです」
2701 = "「Thôi đi, Anh Soutetsu. Vỗ tay thì hơi quá\nrồi đấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2206 = "「À——」"

# monologue
# JP: 意識しないで、拍手していた。\nそれほど、ポーレットに聞き惚れていた。
3324 = "Tôi đã vỗ tay trong vô thức.\nVì tôi đã\nhoàn toàn bị cuốn hút bởi giọng đọc của\nPaulette."

# 【双鉄】
# display as 雙鐵
# JP: 「……いいものだな。絵本を読んでもらうのは」
1514 = "「……Tuyệt thật đấy. Cảm giác được người\nkhác đọc truyện tranh cho nghe ấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですね、お話もおもしろかったし」
2446 = "「Vâng, câu chuyện cũng rất thú vị nữa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お話ももちろんだが、朗読がよかった。\n声の雨が、僕を、物語にひたしてくれた」
2554 = "「Lượng thông tin mà \\x%lエアクラ;#00ffc040;Aircra%l;#; loại bay được\ncần xử\nlý,\ncó vẻ khác biệt một trời một vực so\nvới loại chạy trên mặt đất.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、ほめすぎですよ。双鉄くん。\nでもうれしい。れいなに鍛えられたおかげかなぁ」
2361 = "「Tôi á?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――れいなに普段から読み聞かせているのか？」
2380 = "「À——bình thường em vẫn hay đọc truyện cho\nReina nghe sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「普段からっていうほどじゃないですけど、ときどき。\nあのこが、絵本を借りてきたときとか、せがまれて」
2059 = "「Cũng không hẳn là bình thường, thỉnh\nthoảng thôi ạ.\nMỗi khi con bé mượn truyện\ntranh về, là lại vòi em đọc cho nghe.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。れいなは、どんな絵本を好むのだ？」
2383 = "「Hô. Reina thích loại truyện tranh nào?」"

# 【ポーレット】
# display as 波萊特
# JP: 「どんなのもですよ？　ぜぇんぶ大好き。\nおもしろいお話しはぱたぱた、体ごと喜んで」
2068 = "「Loại nào cũng thích hết ạ? Thích tất tần\ntật luôn.\nNghe truyện nào thú vị là con bé\nlại nhảy cẫng lên, mừng ra mặt.」"

# 【双鉄】
# display as 雙鐵
# JP: 「れいならしいな」
2461 = "「Đúng là Reina nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「こないだ『いわしさん』っていう絵本読んだ時とか、\n読みおわったら、ベッドの上で水泳はじめて！」
2057 = "「Hôm trước lúc em đọc cuốn truyện tên là\n『Bác cá mòi』,\nđọc xong cái là con bé bắt\nđầu bơi lội trên giường luôn!」"

# monologue
# JP: ポーレットの体まで、声につられて動いてる。\n微笑ましい。まるきり子を語る母の仕草だ。
3514 = "Đến cả cơ thể Paulette cũng chuyển động\ntheo lời kể.\nThật ấm áp. Trông hệt như một\nngười mẹ đang kể về đứa con của mình vậy."

# 【双鉄】
# display as 雙鐵
# JP: 「夢中だな」
2400 = "「Đúng, vậy ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、すごく！　実際、かっこいいお話だし。\nそれから一週間は、ずうっと『いわしさん』でした」
2336 = "「Vâng, vô cùng luôn! Thực tế thì câu\nchuyện cũng rất ngầu nữa.\nTừ lúc đó, suốt\nmột tuần liền con bé chỉ toàn 『Bác cá mòi』\nthôi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いわしなのに、かっこいいのか」
2617 = "「Cá mòi mà cũng ngầu sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「いわしなのにかっこいいんです！\n双鉄くんにも、今度、読み聞かせてあげますね？」
2557 = "「Dù là cá mòi nhưng ngầu lắm đấy!\nLần tới,\nem cũng sẽ đọc cho Anh Soutetsu nghe nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「楽しみだ」
# 2504 = "「我很期待」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えへへ。\nそういってもらえると、嬉しいです。すごく」
2368 = "「Ê hế hế.\nNghe anh nói vậy, em vui lắm.\nRất vui luôn.」"

# monologue
# JP: あどけないほどに無垢なはにかみ。\nつられて、聞きたくなってしまう。
3160 = "Nụ cười thẹn thùng ngây thơ đến mức vô tư\nlự.\nBị cuốn theo, tôi bất giác muốn hỏi."

# 【双鉄】
# display as 雙鐵
# JP: 「こどものころは、どうだった？\nポーレットは、どんな絵本を読んでいたのだ？」
2079 = "「Hồi nhỏ thì sao?\nPaulette hay đọc những\ncuốn truyện tranh như thế nào?」"

# 【ポーレット】
# display as 波萊特
# JP: 「読んでいた、じゃなくて。\n読み聞かせてもらってましたよ？　ちゃあんと」
2044 = "「Không phải là đọc.\nMà là được người khác\nđọc cho nghe chứ? Hẳn hoi đấy nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2760 = "「Vậy sao.」"

# monologue
# JP: 誇らしげで、穏やかな笑顔が伝えてくれる。
3477 = "Nụ cười tự hào và dịu dàng đã truyền đạt\ntất cả."

# monologue
# JP: ご両親が、仲良く過ごしていらしたころ――\nポーレットは、愛情の真綿に包まれていたのだと。
3323 = "Ngay lập tức, Hinai Paulette giật bắn\nmình,\nco rúm toàn thân lại."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしは、なんていってもアリスでした。\n『奇妙の国のアリス』」
2516 = "「Nói gì thì nói, em vẫn thích Alice nhất.\n『Alice ở xứ sở kỳ diệu』」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――イメージにぴったりだな」
2381 = "「À——rất hợp với hình tượng của em đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「誰のですか？　『[カットハッター,6]切り裂き帽子屋』？」
2730 = "「Hình tượng của ai cơ? 『Thợ làm mũ xé xác』\nạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「まさか。アリスだ。\n『[アリス・リドル,6]なぞなぞアリス』だ」
2470 = "「Làm gì có chuyện đó. Là Alice chứ.\n『Alice\ncâu đố』 ấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うふ、よかったぁ。『ああ』って真顔でいわれたら、\nどうしようかって思ってました」
2349 = "「Ư hự, may quá. Nếu anh mà tỉnh bơ đáp\n『Ừ』,\nchắc em chẳng biết phải làm sao\nluôn.」"

# monologue
# JP: クスクスと、いたずらっこのような顔。
3516 = "Cô ấy cười khúc khích, vẻ mặt như một đứa\ntrẻ tinh nghịch."

# monologue
# JP: ほんの一瞬、幼いころのポーレットが、\n今のポーレットに重なっているように感じてしまう。
3064 = "Chỉ trong một khoảnh khắc, tôi có cảm giác\nnhư Paulette thuở ấu thơ,\nđang chồng chéo\nlên hình bóng của Paulette hiện tại."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、『わたしはアリス』って思ってました。\nママに頼んで、ドレスも縫ってもらったりして」
2519 = "「Em cũng từng nghĩ 『Mình là Alice』 đấy.\nCòn nhờ mẹ may váy cho nữa cơ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「お母様にか」
2717 = "「Mẹ em may sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「もともと、ママ、そっち系が得意だったんです。\nお裁縫とか、小物作りとか、いわゆるクラフト系」
2426 = "「Vốn dĩ, mẹ em rất giỏi những việc như\nthế.\nMay vá này, làm đồ thủ công này, hay\ncòn gọi là đồ handmade ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2301 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「個人輸入のお仕事も、その辺の物を取り寄せて、\nそうしたらお友達にも頼まれるようになって……って」
2395 = "「Công việc nhập khẩu cá nhân cũng là do\nđặt hàng những thứ liên quan đến mảng đó,\nrồi bạn bè nhờ vả dần dà mà thành……」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。本職にまで伸びた趣味の品ならば、\n見事なドレスで――可愛いらしかったのだろうな」
2758 = "「Ra vậy. Nếu là sản phẩm từ sở thích mà\nphát triển thành nghề chính,\nthì chắc hẳn\nđó là một chiếc váy tuyệt đẹp——và vô cùng\nđáng yêu nhỉ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「見ます？　写真。わたし、ちょっと……\nううん、結構、自信ありますよ？」
2084 = "「Anh xem ảnh không? Em, hơi bị……\nÀ không,\nem khá là tự tin đấy nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、喜んで見せてもらおう」
2338 = "「Tôi đã nói rồi mà. \\x%lエアクラ;#00ffc040;Aircra%l;#; rất yếu về\nkhoản chịu\ntải.\nDo đó, thân máy cũng được chế tạo nhẹ\nđến mức tối đa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「れいなにもナイショですよ？\nあのこ、ぜったいはしゃいじゃうから」
2439 = "「Giữ bí mật với cả Reina nhé?\nCon bé mà\nbiết là kiểu gì cũng phấn khích ầm ĩ lên\ncho xem.」"

# 【双鉄】
# display as 雙鐵
# JP: 「れいなにもナイショであるなら、\n御一夜鉄道最高機密のひとつだな――心得た」
2695 = "「Nếu phải giữ bí mật với cả Reina,\nthì đây\nlà một trong những bí mật tối cao của\nĐường sắt Ohimitera rồi——Anh hiểu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それじゃあ」
2791 = "「Vậy thì.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
# 2301 = "「嗯」" 

# monologue
# JP: 古風な金属のペンダント――\nいや、この場合はロケットというのがふさわしかろう。
3639 = "Một mặt dây chuyền kim loại cổ điển——\nKhông, trong trường hợp này gọi là mặt dây\nchuyền có lồng ảnh thì đúng hơn."

# monologue
# JP: 机の一番上にある、カギの引き出しから取り出して、\nポーレットはパチン、と開いてくれる。
3127 = "Lấy ra từ ngăn kéo có khóa trên cùng của\nbàn làm việc,\nPaulette bật mở nó ra cho\ntôi xem."

# 【ポーレット】
# display as 波萊特
# JP: 「はい。どうぞ」
2087 = "「Đây. Anh xem đi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「おおお――まるで――映画の子役だな。\nすごいな、アリス・リドルそのもののようだ」
2173 = "「Ồ ồ——Cứ như——diễn viên nhí trong phim\nvậy.\nTuyệt quá, y hệt Alice Liddell luôn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そんな！　そんなことないですよ」
2469 = "「Làm gì có! Không có chuyện đó đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……かもしれんな。おそらく、作者が思った\nアリス・リドルよりも可愛いかろうから」
2283 = "「À……cũng có thể. Có lẽ là vì,\ncòn đáng yêu\nhơn cả Alice Liddell mà tác giả tưởng\ntượng nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ちょっ、双鉄くんってば！」
2180 = "「Ra là vậy.」"

# monologue
# JP: パチン。ロケットはすぐに閉じられてしまう。
3139 = "Tách. Mặt dây chuyền lập tức bị đóng lại."

# monologue
# JP: よほど恥ずかしかったのだろうか、\n耳まで、真っ赤になっている。
3179 = "Bị Paulette ôm lấy,\nReina cất tiếng hét\nvui sướng."

# 【ポーレット】
# display as 波萊特
# JP: 「アリスよりかわいいなんて、ありえないです。\nアリスは、世界一かわいい女の子なんですから」
2507 = "「Làm gì có chuyện đáng yêu hơn cả Alice\nchứ.\nAlice là cô bé đáng yêu nhất thế giới\nmà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば、ポーレットは一位タイだな」
2578 = "「Vậy sao. Nếu vậy thì, Paulette là đồng\nhạng nhất rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「だーかーらー！　双鉄くん本気でいってくれてるの\nわかるから、うれしいけど恥ずかしいんですよぉ」
2534 = "「Dừng khẩn cấp thành công. Đã xác nhận\nngười cần cứu hộ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「本気も本気だ。ポーレットもかわいかったが、\nドレスも素晴らしい――正真正銘『誂え物』だな」
2513 = "「Hoàn toàn là thật lòng mà. Paulette vừa\nđáng yêu,\nmà chiếc váy cũng rất\ntuyệt——Đúng chuẩn 『Đồ đặt may』 luôn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「アツラエ……もの？」
2814 = "「Đồ……đặt may?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、誂える。注文仕立て――\nオーダーメイドという意味だ」
2321 = "「À, nãy giờ em nhắc đến mấy lần rồi nhỉ.\nCái từ taihisen (đường tránh tàu) gì đó.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それはもちろん！　ママがわたしのためだけに、\n特別につくってくれたお洋服なんですから」
2801 = "「Tất nhiên rồi! Vì đó là chiếc váy mẹ đặc\nbiệt\nlàm riêng cho một mình em mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2301 = "「嗯」" 

# monologue
# JP: 笑顔に、思考が暖められる。
3163 = "Nụ cười ấy, làm ấm lên những suy nghĩ\ntrong tôi."

# monologue
# JP: 話題にするのも、なんとなく避けていたことだけれど、\nこの笑顔なら――
3254 = "Bị cắt ngang giữa chừng câu chuyện, trong\nchốc lát, tôi không hiểu ý cô ấy là gì."

# 【双鉄】
# display as 雙鐵
# JP: 「それで、いいのではないか？」
2790 = "「Thế thì, chẳng phải rất tốt sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「へ？　それ、って――」
2195 = "「Hả? Thế, là sao——」"

# 【双鉄】
# display as 雙鐵
# JP: 「だから。誂えてもらうのだ。\nメルヘン列車の衣装を、ポーレットのお母様に」
2447 = "「Thì là. Nhờ bác ấy may cho.\nTrang phục\ncho chuyến tàu cổ tích, nhờ mẹ của\nPaulette ấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え！？　ママに、って――えと、あの――だって」
2190 = "「Hả!? Nhờ mẹ, sao——à ừm, cái đó——nhưng mà」"

# monologue
# JP: いかん。戸惑わせてしまったか。\n話の早さに甘えて、速度を上げすぎた。が――
3107 = "Không ổn. Làm cô ấy bối rối mất rồi.\nCậy\nmạch chuyện đang trôi chảy mà tôi đã đẩy\nnhanh tốc độ quá. Nhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「そういう話なのだろう？\n『地元理解を得るために』とは」
2749 = "「Chẳng phải là chuyện đó sao?\n『Để nhận\nđược sự thấu hiểu của địa phương』 ấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい！　そうです。その話でした」
2260 = "「Bởi vì \\x%lレイルロオド;#00ffc040;Railord%l;#; của \\x%l列車;#00ffc040;chuyến tàu%l;#; trên tuyến\nđường này\nlà một\nđứa trẻ rất trung thành với luật lệ, ngài\nSoutetsu.」"

# monologue
# JP: 構わず更に踏み込めば、\nするり、ポーレットは膝から下りてしまう。
3344 = "Tôi mặc kệ mà lấn tới thêm bước nữa,\nPaulette liền tuột xuống khỏi đùi tôi."

# monologue
# JP: 緩み溶けていたその表情を引き締め直し、\n椅子を回して僕と向き合う。
3146 = "Thân máy vẽ một đường cong thoai thoải và\nhạ thấp xuống.\nChẳng mấy chốc, một ánh\nsáng bàng bạc hiện ra trên mặt đất."

# 【ポーレット】
# display as 波萊特
# JP: 「やっぱり、保守的な方もいますから――\n新しい箱物ってだけで反対意見も出てくるんです」
2767 = "「Quả nhiên là vẫn có những người bảo thủ——\nChỉ vì là công trình mới mà đã có ý kiến\nphản đối rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「絵本館でさえも、か」
2456 = "「Ngay cả thư viện truyện tranh cũng vậy\nsao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「絵本館でもです。どこの国でも時代でも、\nきっと、その辺っておんなじなんだとも思います」
2675 = "「Gấp đôi thì bình phương…… Giả sử,\nchi phí\nsản xuất 100 centimet khối hợp chất là 100\nyên thì」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2569 = "「Chỉ giáo chuyện gì?」"

# monologue
# JP: 術仙炭鉱もそうだった。\n思い返せば、腑に落ちる。
3601 = "Mỏ than Jutsu-sen cũng vậy.\nNgẫm lại thì,\ncũng dễ hiểu thôi."

# 【双鉄】
# display as 雙鐵
# JP: 「質や内容の問題ではなく。\n『変化そのもの』を忌避する方はいるということか」
2042 = "「Không phải vấn đề về chất lượng hay nội\ndung.\nMà là có những người kiêng kỵ 『chính\nsự thay đổi』 sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。でも、そこは民主主義ですから――\n多数派を固めることが、まず第一の対応になります」
2615 = "「Đúng vậy ạ. Nhưng, vì đây là nền dân\nchủ——\nnên việc củng cố phe đa số sẽ là đối\nsách ưu tiên hàng đầu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2301 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その次に、反対派との対話ですよね。\n意見を変えてもらうことが無理でも、絶対に必要」
2643 = "「Tiếp theo đó là đối thoại với phe phản\nđối.\nDù không thể khiến họ thay đổi ý\nkiến, nhưng đó là việc tuyệt đối cần\nthiết.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それがつまりは『地域の皆様の理解を得るため』で。\nメルヘン列車は、試金石的な第一歩という位置づけか？」
2061 = "「Tóm lại đó là 『Để nhận được sự thấu hiểu\ncủa người dân địa phương』.\nChuyến tàu cổ\ntích được định vị như một bước đi đầu tiên\nmang tính thử nghiệm sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうなりますね。地域の有力者の方々に乗って頂き、\n列車内を、絵本館のショールームにするイメージです」
2451 = "「Sẽ là như vậy ạ. Sẽ mời những người có\ntầm ảnh hưởng ở địa phương lên tàu,\nvới ý\ntưởng biến bên trong chuyến tàu thành\nphòng trưng bày của thư viện truyện\ntranh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2114 = "「Hành khách sao.」"

# monologue
# JP: ……丁寧な根回しを行いつつの、プロモーション。\n本質的に政治家なのだと、つくづく思う。
1467 = "……Một chiến dịch quảng bá đi kèm với sự\nvận động hành lang cẩn thận.\nTôi thấm thía\nnhận ra rằng, bản chất cô ấy đúng là một\nchính trị gia."

# monologue
# JP: ただ、政治家よりも、\n鉄道会社社長の方に、さらに高い適正があっただけで。
3027 = "Chỉ là, so với chính trị gia,\ncô ấy còn có\nnăng lực cao hơn ở vai trò giám đốc công\nty đường sắt mà thôi."

# 【ポーレット】
# display as 波萊特
# JP: 「ですから……『かえるのあまがっぱ』を読んで\n思ったんですけど――メルヘンも、和風に寄せて」
2539 = "「Vì thế nên……đọc 『Áo mưa của ếch』 xong\nem\nmới nghĩ——chất cổ tích, cũng nên thiên về\nphong cách Hinomoto.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ショールームということは、メルヘン列車が、、\n『湯医絵本館』の雛形になるという理解でよいか？」
2085 = "「Là phòng trưng bày, nghĩa là có thể hiểu\nchuyến tàu cổ tích\nsẽ trở thành mô hình\nthu nhỏ của 『Thư viện Truyện tranh\nYunosaka』 đúng không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。プレスも呼びますし――事実上、\nいわゆる基本線の提示、お披露目になると思います」
2568 = "「Vâng ạ. Bọn em cũng sẽ mời cả báo chí\nnữa——trên thực tế,\nem nghĩ đây sẽ là buổi\ngiới thiệu, ra mắt cái gọi là định hướng\ncơ bản.」"

# 【双鉄】
# display as 雙鐵
# JP: 「で、あれば、和風に寄せるのには反対だ。\n地元対策になるかもしれんが、観光アピールが弱まる」
2798 = "「Nếu vậy thì anh phản đối việc thiên về\nphong cách Hinomoto.\nCó thể nó sẽ là đối\nsách tốt với địa phương, nhưng sức hút du\nlịch sẽ bị giảm sút.」"

# monologue
# JP: 怪訝そうに眉がひそまって――\n次の瞬間、わ、と解ける。
3181 = "Dùng nhiều \\x%lエアクラ;#00ffc040;Aircra%l;#; treo lên để vận chuyển\ncác\nkiểu,\ncó vẻ không phải là không thể, nhưng\nlàm vậy thì không thể đạt tốc độ cao được."

# 【ポーレット】
# display as 波萊特
# JP: 「あああ！？　本当――\nやだ、わたし、目的と手段がいれかわるとこだった」
2258 = "「A a a!? Đúng thật——\nChết dở, em suýt nữa\nthì nhầm lẫn giữa mục đích và phương tiện\nrồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「補い合うために僕がいる。細部にとらわれず、\nポーレットにはポーレットの着想を伸ばしてほしい」
2517 = "「Từ trường bất thường.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ――はい！」
2319 = "「A——vâng!」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいこだ」
2654 = "「Ngoan lắm.」"

# monologue
# JP: 髪を撫でつつ、指に絡める。\n金色の雨の感触が、思考を落ち着かせてくれる。
3316 = "Và rồi, hạ cánh.\nPhao nổi trượt điệu nghệ\ntrên đường ray——rồi dừng lại."

# 【双鉄】
# display as 雙鐵
# JP: 「……予算や設備の都合もあろうが、僕としては、\n『世界各国の絵本と触れ合える』程度は必要かと思う」
1516 = "「……Dù sẽ có những hạn chế về ngân sách và\ncơ sở vật chất, nhưng theo anh,\nít nhất\ncũng cần phải đạt đến mức 『Có thể tiếp xúc\nvới truyện tranh từ khắp nơi trên thế\ngiới』.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。湯医ローカルな施設にしちゃったら、\n御一夜鉄道的には、ほとんど利益を生めませんよね」
2566 = "「Không, ơ kìa, có sao không vậy ạ?\nCó vẻ\nnhư độ cao đang giảm dần.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そこで、ポーレットの母君だ」
2542 = "「Những việc mà \\x%lエアクラ;#00ffc040;Aircra%l;#; không thể làm được——\nNhững\nviệc mà chúng không giỏi xử lý là gì ạ.」"

# 【ポーレット】
# display as 波萊特
