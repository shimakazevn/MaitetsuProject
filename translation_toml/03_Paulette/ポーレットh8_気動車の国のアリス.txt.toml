3349 = "Xoay cổ tay, gập đầu ngón tay thành hình chiếc móc.\nCứ thế ấn phập vào——"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あっ――だから、焦らすのッ――\n上手で、わたしっ――いっつも敏感にさせられてっ」
2218 = "「Hà——a——nên là, trêu chọc——\ngiỏi quá, làm em——lúc nào cũng trở nên nhạy cảm」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、敏感に」
2385 = "「Hô, nhạy cảm à.」"
# monologue
# JP: （つぷうううううっ――ぞりゅっ）
3751 = "（Phậppppppp——rột）"
# 【ポーレット】
# display as 波萊特
# JP: 「んんんんんんんんんっっっ！！」
2308 = "「Ưm ưm ưm ưm ưm ưm ưm ưm ưm!!」"
# monologue
# JP: （きゅうううううううっ！）
3738 = "（Siết chặttttttt!）"
# monologue
