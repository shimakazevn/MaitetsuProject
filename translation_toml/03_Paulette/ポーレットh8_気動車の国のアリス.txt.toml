3648 = "Nếu vậy, tôi không thể để một chút e ngại\ncủa bản thân,\nlàm tổn thương lòng can đảm\nmà Paulette đã thể hiện được."

# 【ポーレット】
# display as 波萊特
# JP: 「あ……ごめんね、ママ。わたし。\nあの、今大丈夫？」
2234 = "「A……xin lỗi mẹ. Con đây.\nÀ ừm, bây giờ mẹ\ncó tiện nói chuyện không?」"

