3208 = "Cùng một vị trí, nhưng tùy cách chạm mà khác nhau sao——\nVừa quan sát phản ứng của Paulette, tôi vừa tinh chỉnh góc độ."
# monologue
# JP: （ぬるっ――ずっ――ぬっ――ずりゅっ！）
# 3770 = "（頂來頂去）" 
# 【ポーレット】
# display as 波萊特
