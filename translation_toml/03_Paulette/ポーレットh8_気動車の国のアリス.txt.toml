2451 = "「就是這樣。要讓當地名望高的人去乘坐一下，把列車裡面當成繪本館的展示廳」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな」
2114 = "「原來如此」" 

# monologue
# JP: ……丁寧な根回しを行いつつの、プロモーション。\n本質的に政治家なのだと、つくづく思う。
1467 = "……雖然繞了一大圈，但最後還是會起到宣傳的效果。我不禁感慨到她本質真的是個政治家。" 

