2637 = "「湯醫方面也說過這個問題。所以之前我們提出的是“湯醫繪本館”這個建議」" 

# 【双鉄】
# display as 雙鐵
# JP: 「湯医と絵本の繋がりは？」
2636 = "「湯醫和繪本有關係嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええと、\nひとまずは、これ――読んでみてください」
2754 = "「這個嘛，總之你先讀一下這個」" 

# monologue
# JP: 自分の机の引き出しから、\nポーレットは一冊の絵本を取り出す。
3491 = "波萊特拉開自己桌子的抽屜，從裡面拿出了一本繪本。" 

# monologue
# JP: 愛読書……というわけでもなさそうだ。\nページは真白く、真新しい。
3556 = "看來這本不是她經常讀的書，書頁都很白，看起來很新。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。『かえるのあまがっぱ』か。\nなんとも古風だが、暖かな絵だ――」
2387 = "「嚯，《青蛙的雨衣》嗎。看起來風格比較老，圖畫也很溫馨——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その絵本の絵を描いてらっしゃる、\n『[きのこだいすけ,2]茸大介』先生が、湯医出身なんだそうです」
2756 = "「這本繪本的作著茸大介老師就是湯醫出身的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。それは素晴らしいな。\nああ――ひょっとすると、湯医に絵本の原画なども？」
2759 = "「這樣啊。那還真不錯。啊——莫非湯醫有這繪本的原稿嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。ご遺族からご寄贈があったっていうお話で。\nそれが、絵本館構想のベースの部分になりますね」
2331 = "「嗯，是他的親屬捐贈的。這就是繪本館構想的基礎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もう鬼籍に入られているのか。\n残念だな、一度お会いしてみたかった」
2661 = "「真遺憾，他已經去世了。我真想見見他」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。本当に、あったかくて、懐かしい絵」
2445 = "「就是啊。這畫真的很溫馨」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2616 = "「沒錯」" 

# monologue
# JP: ポーレットが、僕のとなりに腰掛ける。\nページを繰る手に、やわらかな指が重なってくる。
3486 = "波萊特坐到了我旁邊。然後她把柔軟的小手疊在了我翻頁的手上。" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ……かえるさんのお店、大繁盛。\n『ぴちぱたぴちょん、ぴちぱちょん』」
2345 = "「嘻嘻……青蛙先生的店生意紅火。“滴答滴答、滴答滴答”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……いいものだな、朗読は」
2236 = "「啊……朗讀的感覺不錯」" 

# monologue
# JP: 素直な気持ちが、素直に届いてくれたらしい。
3336 = "我的感想似乎讓她很開心。" 

# monologue
# JP: ポーレットはしあわせそうに微笑んで、\n続きを、優しく聞かせてくれる。
3515 = "波萊特露出了幸福的笑容，然後繼續輕聲細語地給我朗讀。" 

# 【ポーレット】
# display as 波萊特
# JP: 「『かっぱをひとつ　くださいな。おおきなはっぱの\nぬれないかっぱ。あめはしとしと　まだやみません』」
1479 = "「“請給我一片葉子，要可以做雨衣大大葉子，雨還在一直下個不停”」" 

# monologue
# JP: 『ぴちぱたぴちょん、ぴちぱちょん』。\n同じリズムを、ポーレットは楽しげに繰り返す。
1444 = "“滴答滴答、滴答滴答。”波萊特饒有興致地重複著同樣的節奏。" 

# 【ポーレット】
# display as 波萊特
# JP: 「『おやこの　かっぱを　くださいな。\nぬるずるぺったん　かたつむり』あ、いいな、おんぶ」
1480 = "「“請給我父子用的葉子，滑溜溜的蝸牛如此說”。啊，背起來真好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「するか？　おんぶ」
2693 = "「要我背你嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　あ、あの――ええと。\nそれなら、わたし、おんぶより」
2189 = "「哎！？呃、那個——既然這樣，那就不用背——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
2301 = "「嗯」" 

# monologue
# JP: 言われずとも、だ。
3020 = "不用說我也明白她的意思。" 

# monologue
# JP: 絵本をよけて膝をたたけば、\nポーレットはすぐに乗ってくる。
3305 = "我把繪本拿開拍了拍大腿，波萊特馬上就坐了上來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「えへへ～　だっこだぁ」
2374 = "「嘿嘿～抱抱」" 

# 【双鉄】
# display as 雙鐵
# JP: 「さ、つづきだ。\nせっかくだ。最後まで読んでくれ」
2089 = "「來，繼續吧。機會難得，就一直讀到最後吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はぁい」
# 2301 = "「嗯」" 

# monologue
# JP: ポーレットの声。膝の上にあるあたたかみ。\nおもさ、やわらぎ、いいにおい。
3488 = "波萊特悅耳的聲音。她坐在大腿上傳來的體溫。重量、安心感、好聞的味道。" 

# monologue
# JP: ……ページが繰られる音ごとに、\n僕のこころも、軽やかに穏やかになっていく。
1466 = "……隨著她翻書的聲音，我的心也漸漸平靜了下來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「『むしさん　むしゃむぐ　ぽんぽこぱん。\nおなかがふくれて　かっぱのはっぱをたべられません』」
1478 = "「“蟲子先生咬啊咬，肚子鼓鼓的。做雨衣的葉子吃不下了”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
2205 = "「唔」" 

# monologue
# JP: ……むしさんのまあるい穴があるからこその、\nかえるのかっぱだ、それが損なわれてしまっては――
1454 = "……因為有蟲子先生開的洞才做出了青蛙的雨衣，如果缺了這個的話——" 

# 【ポーレット】
# display as 波萊特
# JP: 「『かえるのめから　なみだが　ぽちゃん。\nぴちぱたぴちょん　ぴちぱちょん』」
1485 = "「“青蛙的眼睛裡流下了淚水。滴答滴答、滴答滴答”」" 

# monologue
# JP: 悲しい声。
3185 = "好悲傷的語調。" 

# monologue
# JP: 絵本とおんなじ色した雨が、\nレールショップに、僕のこころに降り注――！？
3578 = "繪本中描繪的大雨，就像是落到了鐵路商店，落到了我的心上——" 

# 【ポーレット】
# display as 波萊特
# JP: 「『＜おいらの穴に　雨をふらすな！＞\nじめんがもるもり　もぐらが ずん！』」
1471 = "「“別把雨水灌到我們的洞裡！地面上鼓起一個包，鼴鼠咚的一聲冒出來”」" 

# monologue
# JP: 一転、どなるような大音声。
3487 = "波萊特忽然大聲怒斥道。" 

# monologue
# JP: もぐら登場の勢いに、揺られた髪が手に触れてくる。\n金の雨だと、不意に感じる。
3651 = "隨著鼴鼠的登場，她搖擺的髮梢碰到了我的手。真的像是金色的雨一樣。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
2240 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「続きを」
2676 = "「繼續」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……はい」
2235 = "「啊……嗯」" 

# monologue
# JP: ポーレットの髪を梳いてはこぼす。\nさらさら、指にも雨が降る。
3328 = "我用手梳著波萊特的秀髮。光滑的髮絲就像雨一樣在我手裡滑動。" 

# monologue
# JP: 昔のことを、きれぎれに思い出すけれど、\nそれさえも、心地よい声がすぐさま流す。
3318 = "我斷斷續續地回想起了以前的事情，但是她動聽的聲音馬上把我的回憶衝去。" 

# 【ポーレット】
# display as 波萊特
# JP: 「『みんなで　もぐらと“あまやどり”\nこれならだれもぬれません。かえるの雨もあがります』」
1473 = "「“大家一起跟鼴鼠躲雨，這樣誰都不會淋濕了。青蛙的雨也停了”」" 

# monologue
# JP: ポーレットの笑顔も晴れ渡る。\n挿絵のかえると、むしと、もぐらと、みんなと同じく。
3506 = "波萊特笑逐顏開，跟插圖裡的青蛙、蟲子、鼴鼠一樣。" 

# 【ポーレット】
# display as 波萊特
# JP: 「『おそらのあめも　あがります。かえるのかっぱを\nほしましょう。にこにこぽかぽか　はいおしまい！』」
1475 = "「“天上下的雨也停了，來把青蛙的葉子晾乾吧。大家笑盈盈暖洋洋，結束！”」" 

# monologue
# JP: （パチパチパチパチ）
3729 = "（啪啪啪）" 

# 【ポーレット】
# display as 波萊特
# JP: 「やだ、双鉄くん。拍手だなんておおげさです」
2701 = "「討厭啦，雙鐵君。不至於鼓掌啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
2206 = "「啊——」" 

# monologue
# JP: 意識しないで、拍手していた。\nそれほど、ポーレットに聞き惚れていた。
3324 = "我無意識地鼓起掌來。我已經完全聽入迷了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……いいものだな。絵本を読んでもらうのは」
1514 = "「……聽人朗讀繪本真不錯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね、お話もおもしろかったし」
2446 = "「就是啊，故事也很有意思」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お話ももちろんだが、朗読がよかった。\n声の雨が、僕を、物語にひたしてくれた」
2554 = "「故事當然有意思，不過你的朗讀也非常棒。聲音營造出的雨讓我完全沉浸在故事裡了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、ほめすぎですよ。双鉄くん。\nでもうれしい。れいなに鍛えられたおかげかなぁ」
2361 = "「嘻嘻，過獎啦，雙鐵君。不過我很開心，大概是跟玲奈練出來的吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――れいなに普段から読み聞かせているのか？」
2380 = "「噢——你平時會給玲奈朗讀嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「普段からっていうほどじゃないですけど、ときどき。\nあのこが、絵本を借りてきたときとか、せがまれて」
2059 = "「也不是經常讀，偶爾會。她借來繪本的時候，就會讓我讀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう。れいなは、どんな絵本を好むのだ？」
2383 = "「噢。玲奈喜歡什麼繪本？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「どんなのもですよ？　ぜぇんぶ大好き。\nおもしろいお話しはぱたぱた、体ごと喜んで」
2068 = "「什麼樣的都有，她都喜歡。聽到有趣的故事她就高興得手舞足蹈」" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいならしいな」
2461 = "「很像玲奈會有的反應」" 

# 【ポーレット】
# display as 波萊特
# JP: 「こないだ『いわしさん』っていう絵本読んだ時とか、\n読みおわったら、ベッドの上で水泳はじめて！」
2057 = "「之前我給她讀《沙丁魚先生》的時候，讀完了她就跑到床上做游泳的動作！」" 

# monologue
# JP: ポーレットの体まで、声につられて動いてる。\n微笑ましい。まるきり子を語る母の仕草だ。
3514 = "波萊特開心地說著，她的身體也跟著搖擺起來。真是溫馨的一幕，她就像是在談論自己孩子的媽媽。" 

# 【双鉄】
# display as 雙鐵
# JP: 「夢中だな」
2400 = "「她還真是入迷」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、すごく！　実際、かっこいいお話だし。\nそれから一週間は、ずうっと『いわしさん』でした」
2336 = "「嗯，特別入迷！而且故事本身就很帥氣。那之後的一週，我一直都給她讀《沙丁魚先生》」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いわしなのに、かっこいいのか」
2617 = "「沙丁魚還帥啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いわしなのにかっこいいんです！\n双鉄くんにも、今度、読み聞かせてあげますね？」
2557 = "「明明是沙丁魚卻特別帥氣！雙鐵君，我下次也讀給你聽吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「楽しみだ」
# 2504 = "「我很期待」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えへへ。\nそういってもらえると、嬉しいです。すごく」
2368 = "「嘿嘿。你期待我就很開心，特別開心」" 

# monologue
# JP: あどけないほどに無垢なはにかみ。\nつられて、聞きたくなってしまう。
3160 = "她的笑容真的是純潔無瑕。我不禁想問她一個問題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「こどものころは、どうだった？\nポーレットは、どんな絵本を読んでいたのだ？」
2079 = "「你小時候呢？你小時候讀過什麼繪本？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「読んでいた、じゃなくて。\n読み聞かせてもらってましたよ？　ちゃあんと」
2044 = "「不是讀過，是讀給我聽的啦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2760 = "「這樣啊」" 

# monologue
# JP: 誇らしげで、穏やかな笑顔が伝えてくれる。
3477 = "波萊特一邊說著，一邊露出了自豪又嫻靜的笑容。" 

# monologue
# JP: ご両親が、仲良く過ごしていらしたころ――\nポーレットは、愛情の真綿に包まれていたのだと。
3323 = "我深切感受到她跟父母一起住的時候，真的是生活在了充滿愛的蜜罐中。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしは、なんていってもアリスでした。\n『奇妙の国のアリス』」
2516 = "「我最喜歡的還是愛麗絲。《愛麗絲夢遊仙境》」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――イメージにぴったりだな」
2381 = "「噢——跟你的形象正好吻合」" 

# 【ポーレット】
# display as 波萊特
# JP: 「誰のですか？　『[カットハッター,6]切り裂き帽子屋』？」
2730 = "「跟誰吻合啊？裁帽客嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まさか。アリスだ。\n『[アリス・リドル,6]なぞなぞアリス』だ」
2470 = "「怎麼會，是愛麗絲。是愛麗絲・利德爾」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふ、よかったぁ。『ああ』って真顔でいわれたら、\nどうしようかって思ってました」
2349 = "「嘻嘻，太好啦。你要是一臉認真地同意了，我還不知道怎麼辦了」" 

# monologue
# JP: クスクスと、いたずらっこのような顔。
3516 = "波萊特露出了狡黠的微笑。" 

# monologue
# JP: ほんの一瞬、幼いころのポーレットが、\n今のポーレットに重なっているように感じてしまう。
3064 = "剎那之間，我在現在的波萊特身上看到了小時候的波萊特的影子。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、『わたしはアリス』って思ってました。\nママに頼んで、ドレスも縫ってもらったりして」
2519 = "「我當時也覺得我是愛麗絲。還拜託媽媽給我縫了一件裙子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お母様にか」
2717 = "「讓你媽媽縫的嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「もともと、ママ、そっち系が得意だったんです。\nお裁縫とか、小物作りとか、いわゆるクラフト系」
2426 = "「媽媽本來就擅長做這種東西。比如裁縫，還有做一些小物件，也就是手工藝」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 2301 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「個人輸入のお仕事も、その辺の物を取り寄せて、\nそうしたらお友達にも頼まれるようになって……って」
2395 = "「她說做個人進口的工作能拿到相關的東西，然後朋友開始委託她做了……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。本職にまで伸びた趣味の品ならば、\n見事なドレスで――可愛いらしかったのだろうな」
2758 = "「這樣啊。既然興趣已經拓展到本職工作上了，那她做出來的衣服質量一定特別高，特別可愛」" 

# 【ポーレット】
# display as 波萊特
# JP: 「見ます？　写真。わたし、ちょっと……\nううん、結構、自信ありますよ？」
2084 = "「你要看嗎？有照片。我還是有一點……不，我非常有自信」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、喜んで見せてもらおう」
2338 = "「嗯，那我就看看吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいなにもナイショですよ？\nあのこ、ぜったいはしゃいじゃうから」
2439 = "「對玲奈也要保密。她肯定會吵鬧起來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなにもナイショであるなら、\n御一夜鉄道最高機密のひとつだな――心得た」
2695 = "「要是對玲奈都保密的話，這就是御一夜鐵道的最高機密之一了——我知道了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それじゃあ」
2791 = "「那就看吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
# 2301 = "「嗯」" 

# monologue
# JP: 古風な金属のペンダント――\nいや、この場合はロケットというのがふさわしかろう。
3639 = "這是一個舊式的金屬吊墜。不，應該叫小盒吧。" 

# monologue
# JP: 机の一番上にある、カギの引き出しから取り出して、\nポーレットはパチン、と開いてくれる。
3127 = "她從桌子最上面那個帶鎖的抽屜拿了出來，然後把它打開了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。どうぞ」
2087 = "「來，你看」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おおお――まるで――映画の子役だな。\nすごいな、アリス・リドルそのもののようだ」
2173 = "「哇——簡直就像電影裡的兒童演員一樣。好厲害啊，簡直就是愛麗絲・利德爾本人」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そんな！　そんなことないですよ」
2469 = "「怎麼會嘛！不可能的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……かもしれんな。おそらく、作者が思った\nアリス・リドルよりも可愛いかろうから」
2283 = "「嗯……你說的對。恐怕要比作者想像的愛麗絲・利德爾更可愛」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ちょっ、双鉄くんってば！」
2180 = "「哎呀，你真討厭！」" 

# monologue
# JP: パチン。ロケットはすぐに閉じられてしまう。
3139 = "她把小盒合上了。" 

# monologue
# JP: よほど恥ずかしかったのだろうか、\n耳まで、真っ赤になっている。
3179 = "她連耳根都紅了，看來她是真的害羞了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「アリスよりかわいいなんて、ありえないです。\nアリスは、世界一かわいい女の子なんですから」
2507 = "「我怎麼可能比愛麗絲還可愛呢。愛麗絲是世界第一可愛的女孩子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば、ポーレットは一位タイだな」
2578 = "「是嗎。那你就是並列第一」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だーかーらー！　双鉄くん本気でいってくれてるの\nわかるから、うれしいけど恥ずかしいんですよぉ」
2534 = "「我都說啦！我知道你是真心這麼說的，高興是高興，這樣好羞人的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「本気も本気だ。ポーレットもかわいかったが、\nドレスも素晴らしい――正真正銘『誂え物』だな」
2513 = "「我是認真說的。你本身就夠可愛了，再穿上這麼漂亮的衣服——真的是量身定做啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「アツラエ……もの？」
2814 = "「量身定做？」" 

# 【双鉄】
# display as 雙鐵
