# monologue
# JP: 成熟というには、多分少しだけ早すぎる――\nけれどもおんなの丸みを宿した、白いおっぱい。
3604 = "Để gọi là trưởng thành thì, có lẽ vẫn còn hơi sớm——\nnhưng đôi gò bồng đảo trắng ngần ấy đã mang nét tròn trịa của người phụ nữ."
# 【ポーレット】
# display as 波萊特
# JP: 「ママの服なら、汚しちゃっても、破いちゃっても、\n洗って、つくろってもらえちゃうんです」
2609 = "「Nếu là quần áo mẹ may, thì dù có làm bẩn, hay làm rách,\ncũng sẽ được mẹ giặt giũ và vá lại cho thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういうものか」
2581 = "「Là vậy sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そういうものです。\nそれに、です、ね。――双鉄くん」
2452 = "「Là vậy đấy ạ.\nHơn nữa, là, thế này nhé. ——Anh Soutetsu」"
# monologue
# JP: （つうううううっ）
3765 = "（Vuốt ve）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
2252 = "「!!」"
# monologue
# JP: 真っ白な指が、僕の股間をズボンの上から撫でていく。
3554 = "Những ngón tay trắng muốt, vuốt ve đũng quần tôi qua lớp vải."
# monologue
# JP: 完全に勃起しきっているふくらみを、\nまるで硬度を確かめるように、ゆるく、押しつつ。
3124 = "Nhẹ nhàng ấn vào chỗ đang cương cứng hoàn toàn,\nnhư thể đang kiểm tra độ cứng của nó vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「このドレスのまま、アリスドレスを着たままで。\nわたし……双鉄くんに、その……抱いてほしい、です」
2510 = "「Cứ mặc nguyên chiếc váy này, giữ nguyên bộ váy Alice này.\nEm......muốn được Anh Soutetsu, à ừm......ôm ấp.」"
# 【双鉄】
# display as 雙鐵
# JP: 「アリスドレスを、着たままで」
2669 = "「Giữ nguyên, bộ váy Alice sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「何にも知らない、幸せなお姫様だった、あの頃も。\n色々を教えてもらった、今のわたしも、包むドレスで」
2454 = "「Cả khoảng thời gian là một cô công chúa hạnh phúc, chẳng biết gì cả.\nLẫn em của hiện tại, đã được học hỏi rất nhiều điều, đều được bao bọc trong chiếc váy này.」"
# monologue
# JP: （さすっ）
3752 = "（Xoa xoa）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ」
# 2240 = "「啊」" 
# monologue
# JP: ポーレットの指先が確かめる。\n僕の形を、大きさを。大人の僕を、確かめる。
3497 = "Đầu ngón tay Paulette đang kiểm chứng.\nHình dáng của tôi, kích cỡ của tôi. Kiểm chứng sự trưởng thành của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「少女のころのわたしごと。\nわたしの全部を、双鉄くんに――抱いてほしい」
2763 = "「Kể cả em của thuở thiếu nữ.\nEm muốn Anh Soutetsu——ôm lấy toàn bộ con người em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットっ！」
2628 = "「Paulette!」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　待って！！　待ってくださいっ」
2251 = "「A! Đợi đã!! Khoan đã nào.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2148 = "「!!?」"
# monologue
# JP: もう堪らない、止まらないところを、無理やり止める。\nポーレットの声はそれを強いるほどに切実だ。
3279 = "Đã đến lúc không thể chịu đựng, không thể dừng lại được nữa, nhưng tôi vẫn cố kìm lại.\nBởi giọng nói của Paulette khẩn thiết đến mức buộc tôi phải làm vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした？」
2468 = "「Sao thế?」"
# 【ポーレット】
# display as 波萊特
# JP: 「えと……あの――抱く、だけじゃなく。わたし――\nわたしを……染めて、ほしいです――双鉄くんに」
2779 = "「À ừm......cái đó——không chỉ, ôm thôi đâu. Em——\nmuốn Anh Soutetsu......nhuộm màu......cho em.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　抱くことが染めることとは感じるが――\n抱くだけではなく、染める、とは？」
2343 = "「Hửm? Anh cứ nghĩ ôm ấp chính là nhuộm màu rồi chứ——\nKhông chỉ ôm ấp, mà là nhuộm màu, nghĩa là sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「えと……だから……その、双鉄くん、色に――\nわたし――の、体も――ええと――アリス、ドレスも」
2780 = "「À ừm......thì là......cái đó, bằng màu sắc của, Anh Soutetsu——\ncả cơ thể——của, em——à ừm——cả bộ váy, Alice nữa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2248 = "「啊！」" 
# monologue
# JP: 照れてはにかみ、僕から視線を逸しつつ、\nポーレットの指が「の」の字を描く。
3476 = "Ngượng ngùng e thẹn, lảng tránh ánh mắt của tôi,\nngón tay Paulette vẽ vòng tròn."
# monologue
# JP: ズボンの上から僕の勃起の――亀頭を弄ぶようにして。\nそこまでされれば、そうかとわかる。故に、とぼける。
3122 = "Xuyên qua lớp quần, như đang đùa giỡn với sự cương cứng——quy đầu của tôi.\nLàm đến mức đó thì tôi cũng hiểu ra vấn đề. Do đó, tôi quyết định giả vờ không biết."
# 【双鉄】
# display as 雙鐵
# JP: 「わからんな。もっとハッキリ言ってくれ。\nポーレットのどこを、僕の何で、染めてほしいのか」
2474 = "「Anh không hiểu. Nói rõ hơn cho anh nghe đi.\nEm muốn anh nhuộm phần nào của Paulette, bằng cái gì của anh?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はうっ！？」
2271 = "「Hau!?」"
# monologue
# JP: 青い瞳が一瞬揺れて、\nそれから、ゆるゆる僕を捉える。
3174 = "Đôi mắt xanh biếc dao động trong thoáng chốc,\nrồi chầm chậm, chầm chậm nhìn thẳng vào tôi."
# monologue
# JP: ピンクの舌が唇を舐め、\nゆっくり、ゆっくり、言葉をつむぐ。
3500 = "Chiếc lưỡi hồng liếm nhẹ bờ môi,\ntừ từ, từ từ, thốt lên từng lời."
# 【ポーレット】
# display as 波萊特
# JP: 「そう、てつ――くん、の――その、乗務、おわった、\nすぐ、あとの、シャワーもしてない、ええと、その」
2698 = "「Của, Anh Sou——tetsu——cái đó, sau khi, xong ca trực,\nngay lập tức, chưa kịp tắm rửa gì, à ừm, cái đó.」"
# monologue
# JP: くん、とポーレットの鼻がなる。\nその口元が、わずかに緩む。
3482 = "Paulette khịt mũi một cái.\nKhóe miệng cô ấy hơi hé mở."
# monologue
# JP: 瞳も、潤みきっている。\n僕の匂いに、ポーレットは発情してくれている。
3165 = "Đôi mắt cũng ngấn lệ ướt át.\nPaulette đang động dục trước mùi hương của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんの――剥き出しの、匂いが詰まってる――\nドロドロに、濁ったみたいな――濃い、精液で」
2690 = "「Bằng tinh dịch——đặc sệt——đục ngầu, nhão nhoét——\ntràn ngập mùi hương, trần trụi——của Anh Soutetsu.」"
# monologue
# JP: （ビクンっ！）
3728 = "（Giật thót!）"
# monologue
# JP: 声に、精巣が励まされる。\n緊急増産された精液が、睾丸の中を更に濃くする。
3166 = "Tinh hoàn được khích lệ bởi giọng nói ấy.\nLượng tinh dịch được sản xuất khẩn cấp làm cho bên trong tinh hoàn càng thêm đặc sệt."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしを、全部――体の、中も、外側も――\n裸も、お洋服も――これまでも、これからも」
2547 = "「Hãy nhuộm em, toàn bộ——cả bên trong, lẫn bên ngoài cơ thể——\ncả khi trần truồng, lẫn khi mặc quần áo——cả quá khứ, và cả tương lai.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2248 = "「啊！」" 
# monologue
# JP: 広くを、見渡せたような気になる。\nポーレットが抱え込んでる、精神面の弱いところの。
3297 = "Cảm giác như có thể nhìn thấu một cách bao quát.\nNhững góc khuất yếu đuối trong tâm hồn mà Paulette đang ôm giữ."
# monologue
# JP: ポーレットはきっと、一人でいるのがとても怖くて。\nそうして、一人に、甘えきりたい性格なのだ。
3112 = "Chắc chắn Paulette rất sợ phải ở một mình.\nVà, cô ấy có tính cách muốn được làm nũng, dựa dẫm hoàn toàn vào một người."
# monologue
# JP: （お父上であり、お母上であり、れいなで――僕か）
3726 = "（Là ba, là mẹ, là Reina——và là mình sao.）"
# 【ポーレット】
# display as 波萊特
# JP: 「染めて、ください。\nわたしを、全部。双鉄くんで」
2713 = "「Xin hãy, nhuộm em.\nToàn bộ con người em. Bằng Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2301 = "「嗯」" 
# monologue
# JP: 愛した女の、それが弱さであるのなら、\n弱さごと全部を抱きしめ、愛するだけだ。
3186 = "Nếu đó là sự yếu đuối của người phụ nữ tôi yêu,\nthì tôi chỉ việc ôm lấy tất cả sự yếu đuối đó, và yêu thương cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「染め抜いて、上書きをして、マーキングする」
2518 = "「Anh sẽ nhuộm thắm, ghi đè lên, và đánh dấu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 2248 = "「啊！」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは僕のおんなだと、僕のものだと。\n全身すべて、骨にも、こころにも、染み込ませよう」
2529 = "「Để khẳng định Paulette là người phụ nữ của anh, là của riêng anh.\nAnh sẽ để nó thấm sâu vào toàn bộ cơ thể, vào tận xương tủy, và cả trái tim em.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
2417 = "「Vâng!」"
# monologue
# JP: いそいそと、ポーレットが僕のチャックを引き下げる。
3511 = "Paulette hớn hở kéo khóa quần tôi xuống."
# monologue
# JP: 前を開いて、勃起だけ――
3370 = "Phanh ra, chỉ có dương vật đang cương cứng——"
# 【ポーレット】
# display as 波萊特
# JP: 「ん……あ――すごい……おちんちん、\nおっき、すぎて――これ――よいしょ――えいっ！」
2286 = "「Ưm......a——Tuyệt quá......dương vật,\nto, quá——cái này——yoozo——ây da!」"
# monologue
# JP: （ぼろんっ）
# 3728 = "（咚）" 
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、双鉄くんのおちんちんさん。\nどうか、よろしくおねがいします」
2364 = "「Ư hự hự, dương vật của Anh Soutetsu.\nXin hãy giúp đỡ nhiều nhé.」"
# monologue
# JP: いいながら、いいこいいこと、\n汗ばんだ手で撫でてくる。
3152 = "Vừa nói, cô ấy vừa dỗ dành ngoan nào ngoan nào,\nvuốt ve bằng bàn tay rịn mồ hôi."
# monologue
# JP: 心地よいだけに物足りない。\nもっと激しい刺激がほしい。
3051 = "Chỉ dễ chịu thôi thì chưa đủ.\nTôi muốn một kích thích mãnh liệt hơn."
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、ポーレットを染めてやれんぞ？」
2757 = "「Làm thế thì, không nhuộm cho Paulette được đâu nhé?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですよね。ええっと……どういう風に、\n気持ちよくしてあげたらいいですか？」
2333 = "「A, đúng rồi nhỉ. À ừm......em nên làm thế nào,\nđể anh cảm thấy sướng đây ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットを染め抜くための精液だ。\n僕ではなく、ポーレットの意思で絞り出してほしい」
2751 = "「Đây là tinh dịch dùng để nhuộm thắm Paulette.\nAnh muốn em tự vắt kiệt nó theo ý mình, chứ không phải ý anh.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしの……意思で。――ん。わかりました。\nそれじゃあ、ゆっくり。ゆっくりゆっくり」
2650 = "「Theo......ý của em. ——Vâng. Em hiểu rồi.\nVậy thì, từ từ thôi. Thật từ từ.」"
# monologue
# JP: （ふわん）
3745 = "（Mềm mại）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2248 = "「啊！」" 
# monologue
# JP: 乳房が下から押し当てられる。
3141 = "Bầu ngực áp vào từ phía dưới."
# monologue
# JP: 強く、ではなく。\n触れるか触れぬか。そのギリギリの触感で、
3017 = "Không phải mạnh bạo.\nMà là cảm giác mơn trớn lúc chạm lúc không."
# 【ポーレット】
# display as 波萊特
# JP: 「ゆっくり、ゆっくり、ねっとり、とろおり。\n双鉄くんの精液を、焦らして、濃くして」
2502 = "「Từ từ, từ từ, nhớp nháp, sền sệt.\nTrêu chọc tinh dịch của Anh Soutetsu, làm nó đặc lại.」"
# monologue
# JP: （しこ――しこっ）
3722 = "（Sục——sục）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――んっ」
2225 = "「A——ưm」"
# 【ポーレット】
# display as 波萊特
# JP: 「ん～～（くちゅちゅっ）――んえ～～っ」
2344 = "「Ưm~~ (chóp chép)——ưm~~」"
# 【双鉄】
# display as 雙鐵
# JP: 「う……ぁ――」
2204 = "「Ư......a——」"
# monologue
# JP: それも焦らしの一貫なのか、口内で音をたて泡立てて、\nポーレットがよだれを垂らしてくれる。
3117 = "Có lẽ đó cũng là một phần của sự trêu chọc, Paulette tạo tiếng động nhóp nhép sủi bọt trong miệng,\nrồi nhỏ nước bọt xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「濃くして、濃くして、焦らして、焦らして。\n[だ,1]射精したいとこより、もっともっと我慢してもらって」
2716 = "「Làm đặc lại, đặc lại nữa, trêu chọc, trêu chọc nữa.\nBắt anh phải nhịn, nhịn nhiều hơn nữa so với lúc muốn xuất tinh.」"
# monologue
# JP: （しこ――しこ――くり――くりっ）
3720 = "（Sục——sục——xoa——xoa）"
# 【双鉄】
# display as 雙鐵
# JP: 「う……ぁ……ポーレット」
2145 = "「Ư......a......Paulette」"
# 【ポーレット】
# display as 波萊特
# JP: 「びゅうって、どろって、どぷどぷどぷって、\nわたしの全部、双鉄くん精液で、染めてください」
2378 = "「Hãy bắn ra, nhão nhoét, phụt phụt phụt,\nnhuộm toàn bộ con người em, bằng tinh dịch của Anh Soutetsu đi.」"
# monologue
# JP: 手指の動きが、あまりにゆるすぎ、正直、キツい。\n今すぐも腰を振りたい。その口内にねじり込みたい。
3134 = "Chuyển động của những ngón tay quá chậm chạp, thành thật mà nói, rất bức bối.\nTôi muốn vung hông ngay lập tức. Muốn nhét thẳng vào khoang miệng đó."
# monologue
# JP: 歯ぎしりしている獣の欲を、けれど、願いで。\nポーレットの願いだからと、鎖につなぐ。
3276 = "Nhưng tôi đã dùng lời thỉnh cầu để khóa chặt dục vọng của một con thú đang nghiến răng ken két.\nVì đó là nguyện vọng của Paulette, nên tôi xích nó lại."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2301 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、うれしい。それじゃ、ゆーっくり。\nしこ――しこ――もみ――もみっ」
2353 = "「Ư hự hự, em vui lắm. Vậy thì, từ từ thôi nhé.\nSục——sục——xoa——xoa」"
# monologue
# JP: 指を使って、握りの強弱をつけてはくれるが、\n強い部分でも、あまりにゆるい。
3143 = "Dù cô ấy dùng ngón tay để tạo lực nắm mạnh nhẹ khác nhau,\nnhưng ngay cả phần mạnh nhất, cũng vẫn quá lỏng lẻo."
# 【ポーレット】
# display as 波萊特
# JP: 「しこ――しこ――もみ――もみ――\nおちんちんさん――いいこいいこ、がまんがまん」
2389 = "「Sục——sục——xoa——xoa——\nDương vật ngoan nào——ngoan nào ngoan nào, ráng nhịn nhé」"
# monologue
# JP: 汗とよだれと先走り汁にまみれた、湿度とぬらつき。\nそうありながら、最高にすべすべの肌触り。
3422 = "Sự ẩm ướt và trơn trượt, hòa lẫn giữa mồ hôi, nước bọt và chất nhờn.\nNhưng đồng thời, cảm giác trên da lại mịn màng đến tuyệt đỉnh."
# monologue
# JP: なのに柔らかすぎて、軽すぎる。\n腰が、どうしてもむずむず動く。
3035 = "Vậy mà lại quá mềm mại, quá nhẹ nhàng.\nEo tôi cứ ngứa ngáy muốn cử động bằng mọi giá."
# 【ポーレット】
# display as 波萊特
# JP: 「あれあれ？　どうしたの？　あ！　暑すぎる？\nごめんね？　気がつかなくて。ふぅ～ふぅぅ～っ」
2183 = "「Ủa ủa? Sao thế? A! Nóng quá hả?\nXin lỗi nhé? Em không để ý. Phù~ phù~」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ――ぐっ！」
2208 = "「——Ư!」"
# monologue
# JP: 汗が、出て来る。\n射精の代理といわんばかりに、ぶわりと一気に。
3265 = "Mồ hôi, túa ra.\nTuôn ra ồ ạt như thể thay thế cho việc xuất tinh."
# 【ポーレット】
# display as 波萊特
# JP: 「あは、すっごく気持ちよさそう。続けてあげるね？\nしこ――しこ――しこ――しこ――ふぅ、ふううう～」
2242 = "「A ha, trông có vẻ sướng lắm nhỉ. Em tiếp tục nhé?\nSục——sục——sục——sục——phù, phù~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポー、レット――」
2626 = "「Pau, lette——」"
# monologue
# JP: ポーレットの望みを叶えたい。\nけれども、すぐにでも射精したい。
3295 = "Muốn hiện thực hóa mong muốn của Paulette.\nNhưng cũng muốn xuất tinh ngay lập tức."
# monologue
# JP: 腰がむずつく。あたってるだけのおっぱいに、\nすがりつくように動いてしまう。
3298 = "Eo tôi ngứa ngáy. Bất giác cử động như muốn bám víu vào bầu ngực\nđang chạm hờ kia."
# 【ポーレット】
# display as 波萊特
# JP: 「あれえ？　さっきより苦しそう？　あ、わかった。\n双鉄くんのおちんさん、きっと」
2171 = "「Ủa? Trông có vẻ khổ sở hơn lúc nãy nhỉ? A, em biết rồi.\nDương vật của Anh Soutetsu, chắc chắn là」"
# monologue
# JP: （く――くくっ）
3741 = "（Vạch——vạch）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2253 = "「!!?」"
# monologue
# JP: ポーレットの指先が僕の亀頭を開いてく。\n尿道口を――くぱぁと、まるで大陰唇を開くが如くに。
3498 = "Đầu ngón tay Paulette vạch quy đầu của tôi ra.\nLỗ niệu đạo——tách ra, cứ như thể đang vạch môi lớn vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんのおちんちんさん、\nおっぱい、ちゅうちゅうしたいのかなぁ？」
2081 = "「Dương vật của Anh Soutetsu,\nmuốn mút mút ngực sao ta?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2147 = "「!」"
# monologue
# JP: 乳首を、そこで――尿道口で挟むというのか。\nできることとは思えない。
3175 = "Định dùng lỗ niệu đạo——kẹp lấy nhũ hoa ở đó sao.\nTôi không nghĩ là làm được đâu."
# monologue
# JP: けれども、刺激が――乳首の硬さが、尿道口を、\n押して、刺激してくれるのならば。
3026 = "Nhưng, nếu sự kích thích——độ cứng của nhũ hoa, đè lên lỗ niệu đạo,\nvà kích thích nó."
# 【双鉄】
# display as 雙鐵
# JP: 「恐らく――そうだ」
2472 = "「Có lẽ——là vậy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうって、何がですか？」
2109 = "「Là vậy, là sao cơ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2147 = "「呃！」" 
# monologue
# JP: わかっているのに、とぼけられている。\n普段自分が好むプレイを、やり返されてる。
3144 = "Biết rõ mà còn giả vờ.\nTôi đang bị cô ấy trả đũa bằng chính trò chơi mà tôi thường thích."
# monologue
# JP: じれったい、もどかしい、恥ずかしい。\nけれどもそれが、僕のポーレットの望みなら――
3356 = "Sốt ruột, bực bội, xấu hổ.\nNhưng nếu đó là mong muốn của Paulette của tôi thì——"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の、勃起は――おちんちんさんは――\nポーレットの、乳首を、ちゅうちゅう、したいっ」
2520 = "「Sự cương cứng của anh——dương vật của anh——\nmuốn, mút mút, nhũ hoa, của Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、やっぱり、そうだったんですね」
2355 = "「Ư hự hự, quả nhiên, là vậy nhỉ.」"
# monologue
# JP: （くにゅんっ！）
3753 = "（Ép chặt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああああ」
# 2206 = "「啊——」" 
# monologue
# JP: 押し込まれてる、押し当てられてる。\nおっぱいが、乳首が望んだ刺激をくれる。
3154 = "Bị nhét vào, bị ép chặt.\nBầu ngực, nhũ hoa đang mang đến sự kích thích mà tôi mong muốn."
# monologue
# JP: 尿道口でくわえ込むとはいかないが、\n勃起しきった乳首の硬さが亀頭先端をつついてくれる。
3652 = "Dù không thể ngậm lấy bằng lỗ niệu đạo,\nnhưng độ cứng của nhũ hoa đang cương cứng tột độ đang đâm chọc vào phần đỉnh quy đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「あはぁ、おちんちんさんうれしそう。\nしこ――しこ――もに、もにっ――しこ、しこ、しこ」
2244 = "「A ha, dương vật trông có vẻ vui lắm.\nSục——sục——nắn, nắn——sục, sục, sục」"
# 【双鉄】
# display as 雙鐵
# JP: 「はぁ――はぁ――はぁ――はぁっ」
2155 = "「Hà——hà——hà——hà」"
# monologue
# JP: おっぱいの、乳首の当たりがつよい。\nただそれだけで、全てが変わる。
3545 = "Lực tác động của bầu ngực, của nhũ hoa rất mạnh.\nChỉ cần vậy thôi, mọi thứ đã thay đổi."
# 【ポーレット】
# display as 波萊特
# JP: 「しこ――しこ――もに――もに――わ、すっごい、\nおちんちんのたま――重い、ですよね――これ」
2390 = "「Sục——sục——nắn——nắn——oa, dữ quá,\nhai hòn ngọc——nặng, thật đấy——cái này」"
# monologue
# JP: 玉がゆすられ――いや、恐らく僕が無意識に、\n玉をゆすって、ポーレットの手首の刺激を求めてた。
3559 = "Hai hòn ngọc bị lắc lư——không, có lẽ trong vô thức,\ntôi đã lắc lư hai hòn ngọc để tìm kiếm sự kích thích từ cổ tay Paulette."
# monologue
# JP: それほどまでに、乾ききってる。\nもっともっとと、爪の先までが悲鳴を上げてる。
3284 = "Tôi đã khao khát đến mức độ đó.\nĐến tận đầu móng tay cũng đang gào thét đòi hỏi nhiều hơn nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「よいしょ――よいしょ――しこ――しこ――\nもにゅ、もにゅ――しこ――しこ――えいっ」
2365 = "「Yoozo——yoozo——sục——sục——\nnắn, nắn——sục——sục——ây da」"
# monologue
# JP: （ぐにっ）
3763 = "（Chà nhẹ）"
# 【双鉄】
# display as 雙鐵
# JP: 「ううううっ」
# 2240 = "「啊」" 
# monologue
# JP: 手の側面が、玉に柔らかな刺激をくれる。\nスポンジで撫でる程度の、一層僕を乾かす刺激を。
3136 = "Cạnh bàn tay mang đến kích thích mềm mại cho hai hòn ngọc.\nKích thích chỉ ngang mức xoa bằng miếng bọt biển, lại càng làm tôi thêm khao khát."
# 【ポーレット】
# display as 波萊特
# JP: 「おちんちんの先、くぱくぱしてます。\nくぱくぱちゅうちゅう、おっぱい、飲んでる」
2820 = "「Phần đỉnh dương vật, đang đóng mở liên hồi.\nĐóng mở mút mút, đang bú, ngực kìa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「は、ぁ――」
2162 = "「Hà, a——」"
# monologue
# JP: もう、限界だ。\n今すぐポーレットを押し倒し剥がし捻り込みたい。
3283 = "Đến giới hạn, mất rồi.\nMuốn đè Paulette xuống ngay lập tức, lột đồ và thọc sâu vào trong."
# 【ポーレット】
# display as 波萊特
# JP: 「どろどろですね。わたしたち。\n私の指と、おちんちんが溶け合ってるみたい」
2491 = "「Nhão nhoét hết rồi nhỉ. Chúng ta ấy.\nNgón tay em và, dương vật như đang hòa tan vào nhau vậy.」"
# monologue
# JP: ポーレットが親指をわずかにずらす。\nくちぃ――と粘液が糸となり、その指先を追いかける。
3505 = "Paulette khẽ dịch ngón cái.\nNhóp nhép——chất nhầy kéo thành sợi, đuổi theo đầu ngón tay cô ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――（ごくっ）」
2281 = "「Ưm——（ực）」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
2825 = "「!」"
# monologue
# JP: ツバを飲む音。熱い息。\nポーレットの指のちからが、少しだけ、増す。
3484 = "Tiếng nuốt nước bọt. Hơi thở nóng hổi.\nLực ngón tay của Paulette, tăng lên, một chút."
# 【ポーレット】
# display as 波萊特
# JP: 「おちんちんビクビク苦しそう。双鉄くん？\nびゅーって、精子、[だ,1]射精したいですか？」
2819 = "「Dương vật giật giật trông có vẻ khổ sở quá. Anh Soutetsu?\nMuốn bắn ra, tinh trùng, xuất tinh đúng không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「――ぐ――ぅっ――」
2228 = "「——Ư——hự——」"
# monologue
# JP: 全力で喉を駆け上がってくる同意の言葉を、頷きを。\nけれども、歯ぎしりで閉じ込める。
3292 = "Lời đồng ý dốc hết sức dâng lên tận cổ họng, cùng cái gật đầu.\nNhưng tôi đã nghiến răng kìm nén lại."
# 【双鉄】
# display as 雙鐵
# JP: 「いや――大丈夫、だ。\nポーレット――ポーレットの――したい、ように」
2055 = "「Không——không sao, đâu.\nPaulette——Paulette——muốn, làm gì cũng được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うれしい！　大好きです、双鉄くん」
2498 = "「Em vui quá! Em yêu anh nhất, Anh Soutetsu.」"
# monologue
# JP: （しゅこんっ！）
3739 = "（Sục mạnh!）"
# 【双鉄】
# display as 雙鐵
# JP: 「んんんんっ！」
2307 = "「Ưm ưm ưm!」"
# monologue
# JP: 速度が、強さがガラリと変わる。
3137 = "Tốc độ, sức mạnh thay đổi hoàn toàn."
# 【ポーレット】
# display as 波萊特
# JP: 「たくさん、たくさん射精してください。\n双鉄くんの精液、どろどろの、精液クリーム」
2712 = "「Hãy xuất tinh thật nhiều, thật nhiều đi.\nTinh dịch của Anh Soutetsu, kem tinh dịch, nhão nhoét.」"
# monologue
# JP: 射精させたい。\nその意思を、指先が勃起に訴えてくる。
3131 = "Muốn làm tôi xuất tinh.\nĐầu ngón tay truyền đạt ý định đó lên dương vật."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしを、デコレーションしてください。\nリボンも、髪も、瞳も、服も、おっぱいも」
2715 = "「Hãy trang trí, cho em đi.\nCả ruy băng, tóc, mắt, quần áo, lẫn ngực nữa.」"
# monologue
# JP: ポーレットの手が、性器になってる。\n蠢く指が肉筒となり、精液を絞りにかかってる。
3501 = "Bàn tay của Paulette, đã trở thành bộ phận sinh dục.\nNhững ngón tay ngọ nguậy hóa thành ống thịt, bắt đầu vắt kiệt tinh dịch."
# monologue
# JP: （むにっ！　むにゅぅぅぅっ！）
3769 = "（Ép! Ép chặttttt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んっ――はうっ」
2276 = "「Ưm——hau」"
# monologue
# JP: ぎゅうぎゅう、押し当てられてくる。
3168 = "Ép chặt, ép chặt vào."
# monologue
# JP: 甘やかな声が溢れる程にぬらつききった柔らか乳房も、\n張り詰めきった勃起乳首も。
3077 = "Cả bầu ngực mềm mại ướt đẫm đến mức trào ra những âm thanh ngọt ngào,\nlẫn nhũ hoa đang cương cứng tột độ."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしだってずっと――さっきからっ」
2479 = "「Cả em cũng suốt——từ nãy đến giờ」"
# monologue
# JP: 言われて、気づく。我慢してたのは僕一人じゃない。\nポーレットの腰もうずうず、落ち着かなげに動いてる。
3583 = "Nghe cô ấy nói, tôi mới nhận ra. Người đang nhịn không chỉ có mình tôi.\nEo của Paulette cũng đang ngứa ngáy, cử động không yên."
# 【ポーレット】
# display as 波萊特
# JP: 「だから――[しゃせい,1]射精してっ、双鉄くんっ！\n射精、たくさん。たくさんたくさんっ！！」
2540 = "「Thế nên——xuất tinh đi, Anh Soutetsu!\nXuất tinh, thật nhiều. Thật nhiều thật nhiều vào!!」"
# monologue
# JP: （しゅこ！　しゅこっ！　しゅこっ！　しゅこん！）
# 3722 = "（上下套弄）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ドロドロ精子でコーティングして、マーキングして、\n双鉄くんで――わたし、全部を染めて下さい！」
2653 = "「Phủ lên em lớp tinh trùng nhão nhoét, đánh dấu em,\nbằng Anh Soutetsu——hãy nhuộm thắm, toàn bộ con người em đi!」"
# monologue
# JP: （きゅうううううううっ！？）
3750 = "（Siết chặttttt!?）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？」
2254 = "「!?」"
# monologue
# JP: 親指と人差し指とが勃起を締める。\n痛みに、思わず腰を引こうと――っ！
3150 = "Ngón cái và ngón trỏ siết chặt lấy dương vật.\nVì đau, tôi bất giác định lùi eo lại——!"
# monologue
# JP: （ゆるっ――しゅこぉぉぉぉぉぉぉんんっ！！！）
3777 = "（Nới lỏng——sục mạnhhhhhhhhh!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ああああ！」
2246 = "「A a a a!」"
# monologue
# JP: （びゅぶっ！　びゅるっ！　びゅうっ！　どびゅっ！）
3736 = "（Phụt! Phụt! Phụt! Phụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふああ――うれしいっ――双鉄くんの――\nクリーム――精液っ」
2165 = "「Phù a——vui quá——kem——\ntinh dịch——của Anh Soutetsu」"
# monologue
# JP: 僕の精子が、重く濁ったどろどろの精が、\nポーレットの顔を、体を染めていく。
3341 = "Tinh trùng của tôi, tinh dịch nhão nhoét đục ngầu nặng nề,\nđang nhuộm đẫm khuôn mặt, cơ thể Paulette."
# monologue
# JP: （びゅるっ！　びゅぶっ！　ぶっ！　びゅるうっ）
# 3736 = "（噗嚕！噗嚕！噗噗！噗噗！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「重くて、痛い――すごく、濃いっ――んっ――\nはぁっ――熱い、すごいの――わたし、どろどろっ」
2416 = "「Nặng quá, đau quá——đặc, quá——ưm——\nhà——nóng quá, dữ dội quá——em, nhão nhoét hết rồi」"
# monologue
# JP: [けが]汚す、という言葉だけしか浮かばぬ景色。\nその白濁した雪がびちびち、アリスドレスに降り注ぐ。
3547 = "Một cảnh tượng mà chỉ có từ \"vấy bẩn\" mới có thể diễn tả được.\nLớp tuyết trắng đục đó rơi lộp bộp, trút xuống chiếc váy Alice."
# monologue
# JP: （びゅうっ！　びゅっ！　びゅぶ！　びゅううっ！）
# 3736 = "（噗嚕！噗嚕！噗噗！噗噗！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ふぁ……は――双鉄くん……（すんっ、すんっ）\nあ……双鉄、くん、で――わたし――いっぱい――」
2167 = "「Phù......hà——Anh Soutetsu......（sụt sịt, sụt sịt）\nA......bằng Anh Soutetsu——em——tràn ngập——」"
# monologue
# JP: ポーレットは、半ば呆然と自分の体をみおろして、\nのろのろ指を動かして、ほっぺたについた精液を――
3499 = "Paulette nửa thẫn thờ cúi nhìn cơ thể mình,\nchậm chạp đưa ngón tay quệt lấy tinh dịch dính trên má——"
# 【ポーレット】
# display as 波萊特
# JP: 「ちゅるっ――んっ――（こくっ――）\nうぁ――濃い……ん、ふっ――チュむ――（ごくっ）」
2267 = "「Chụt——ưm——（ực——）\nOa——đặc quá......ưm, phù——chụt——（ực）」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
2627 = "「Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 2240 = "「啊」" 
# monologue
# JP: 抱き上げて、ティーテーブルの上に寝かせる。\n足を持ち上げ、そのまま、股間をむき出しにする。
3302 = "Tôi bế thốc cô ấy lên, đặt nằm xuống bàn trà.\nNâng hai chân lên, cứ thế phơi bày phần háng ra."
# 【双鉄】
# display as 雙鐵
# JP: 「……とても、綺麗だ」
1511 = "「......Rất, đẹp.」"
# monologue
# JP: ポーレットのおまんこはもう、とろとろだ。
3502 = "Âm đạo của Paulette đã nhão nhoét hết cả rồi."
# monologue
# JP: 控えめで可憐な大陰唇の割れ目から、\n肉の色を僅かに覗かせ、豊かに蜜を溢れさせてる。
3203 = "Từ khe hở của môi lớn e ấp đáng yêu,\nkhẽ lộ ra màu da thịt, dâm thủy tràn trề lai láng."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……の……さっきは、わたしが、好きに――\nさせて、もらいましたから」
2778 = "「À......ừm......lúc nãy, em đã, được làm——\ntheo ý thích, của mình rồi nên」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の、好きにか？」
2552 = "「Đến lượt anh, làm theo ý thích sao?」"
# monologue
# JP: （つううううっ）
3748 = "（Trượt）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひ――んっ」
2131 = "「Hi——ưm」"
# monologue
# JP: 中指の背中を使って、\nポーレットのかわいいおまんこをぞろり撫ぜてやる。
3326 = "Dùng mu ngón giữa,\ntôi mơn trớn dọc theo âm đạo đáng yêu của Paulette."
# monologue
# JP: なぞり、けれども食い込ませはせず。\n意識し、焦らし返すようにと。
3270 = "Vuốt ve, nhưng không thọc sâu vào.\nCó chủ đích, như muốn trêu chọc lại cô ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「は、はい。わたし、おなかの中は――\n内側は、双鉄くんの望みのままに、染めてほしい」
2334 = "「V-vâng. Em, bên trong bụng——\nbên trong, em muốn được nhuộm màu, theo ý muốn của Anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「心得た」
2559 = "「Anh hiểu rồi.」"
# monologue
# JP: 射精を終えたばかりの性器は、\nとっくに硬度を取り戻している。
3065 = "Bộ phận sinh dục vừa mới xuất tinh xong,\ntừ lâu đã lấy lại độ cứng."
# monologue
# JP: いつでも、ポーレットを染め抜ける。\n思えば、乾きはわずかにいえる。
3060 = "Lúc nào cũng có thể nhuộm thắm Paulette.\nNghĩ vậy, cơn khát cũng vơi đi đôi chút."
# 【双鉄】
# display as 雙鐵
# JP: 「もう何度、セックスしたかな」
2490 = "「Chúng ta đã làm tình, bao nhiêu lần rồi nhỉ.」"
# monologue
# JP: （すり――すり――する――くちっ）
3762 = "（Cọ——cọ——trượt——nhóp）"
# 【ポーレット】
# display as 波萊特
# JP: 「ん……あ――えと、一晩が、一回、カウント？」
2294 = "「Ưm......a——à ừm, một đêm, tính là, một lần ạ?」"
# 【双鉄】
# display as 雙鐵
