# JP: それは嬉しい。ありがたく。\n式の日取りも、そうできれば確定に至るだろう。
3358 = "Thật đáng mừng. Thật đáng quý.\nNếu được\nvậy, có lẽ ngày cử hành hôn lễ cũng sẽ\nđược ấn định."

# 【双鉄】
# display as 雙鐵
