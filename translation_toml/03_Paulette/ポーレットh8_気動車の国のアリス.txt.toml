3146 = "她板起了本來很輕鬆的表情，轉過椅子來面對著我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっぱり、保守的な方もいますから――\n新しい箱物ってだけで反対意見も出てくるんです」
2767 = "「還是有保守的勢力，光是建一棟新樓就有人提出反對意見了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「絵本館でさえも、か」
2456 = "「就連繪本館也不例外嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「絵本館でもです。どこの国でも時代でも、\nきっと、その辺っておんなじなんだとも思います」
2675 = "「繪本館也不例外。不管是在哪個國家哪個時代，都會有這種問題」" 

# 【双鉄】
