3189 = "Nếu không vững vàng thì không thể thưởng thức trọn vẹn được.\nTăng thêm lực ở cánh tay nâng đỡ, điều chỉnh lại góc độ——"
# monologue
# JP: （ずりゅうううう――ずっ）
# 3748 = "（插入）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひあっ！？」
2136 = "「Hya!?」"
# monologue
