3518 = "Ngay lập tức, Paulette giật nảy mình kịch liệt.\nNếu vậy thì dĩ nhiên, tôi thử lặp lại chuyển động đó."
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　やっ――いまのッ――んひゃうっ！？\nんんんんっ！？　なに、これっ――わたし、いまっ」
2187 = "「Hả!? Á——vừa rồi——ưm hyau!?\nƯm ưm ưm ưm!? Gì, thế này——em, vừa nãy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ここ、か？」
2582 = "「Chỗ này, sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「やっ――へん、んっ――そこっ――ふ、あっ――\nなん、かっ――っ――あっ、ぶるって、ふ、あっ――」
2129 = "「Á——lạ, lắm——chỗ đó——phù, a——\ncái, gì đó——ư——a, run rẩy, phù, a——」"
