3271 = "\"Ưu tiên hàng đầu là cứu mạng tôi——\"\nCó vẻ\nnhư Navi, khi còn là máy thử nghiệm, đã\nđược ban cho mệnh lệnh đó."

# 【双鉄】
# display as 雙鐵
