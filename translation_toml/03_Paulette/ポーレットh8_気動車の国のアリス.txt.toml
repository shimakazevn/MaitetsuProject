2125 = "「只做“腳踩製酒體驗”就太浪費了。御一夜有隈燒酒這個品牌」" 

# 【ポーレット】
# display as 波萊特
# JP: 「[ゆのい,1]湯医にも、ブランド！　『湯医ワイン』」
2635 = "「湯醫也來個品牌！“湯醫葡萄酒”」" 

# 【双鉄】
# display as 雙鐵
