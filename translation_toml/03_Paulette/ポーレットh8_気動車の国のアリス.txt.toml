# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ！？　あっ――ふっ――く、あっ――\nわたっ――わたし――イッた――イっ、ってっ！」
2137 = "「Hya!? A——phù——ư, a——\nem——em——lên đỉnh——lên đỉnh, rồi mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の好みも、正攻法でな」
2788 = "「Sở thích của anh, cũng là đánh trực diện mà.」"
# monologue
# JP: （ずっ！　じゅぶっ！　じゅぐっ！　ずちゅ！）
3734 = "（Thọc! Phập! Chụt! Phập!）"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――まっ――て――もっ――まだっ、\nふっ――あっ――感じ、すぎ、て――いま、は」
2231 = "「Hà——đợi——đã——vẫn——chưa,\nphù——a——cảm nhận, quá nhiều, rồi——bây giờ, thì」"
