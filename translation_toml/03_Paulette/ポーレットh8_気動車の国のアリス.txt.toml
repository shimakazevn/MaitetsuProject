3253 = "Không cần vội. Tôi muốn nhuộm thắm Paulette hoàn toàn.\nCả trái tim, lẫn những vùng nhạy cảm."
# monologue
# JP: だから、ゆっくり探って動く。
3361 = "Nên tôi chầm chậm dò dẫm, chuyển động."
# monologue
# JP: （ずっ――ずりゅっ――ぬっ――ぬこっ）
# 3762 = "（蹭來蹭去）" 
# 【ポーレット】
# display as 波萊特
