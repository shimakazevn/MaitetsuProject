2801 = "「那當然了！這可是媽媽專門給我特別做的衣服」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2301 = "「嗯」" 

# monologue
# JP: 笑顔に、思考が暖められる。
3163 = "她的笑臉讓我的腦子轉得更快了。" 

# monologue
