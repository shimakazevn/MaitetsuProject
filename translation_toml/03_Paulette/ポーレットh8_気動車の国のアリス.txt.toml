1442 = "『Cháu đang hẹn hò với Paulette』……Không,\n『Cháu đã đính hôn với Paulette』——"

# 【ポーレット】
# display as 波萊特
# JP: 「わかった。じゃ、今かわるね？\n――双鉄くん。双鉄くん？」
2412 = "「Con biết rồi. Vậy, con chuyển máy luôn\nnhé?\n——Anh Soutetsu. Anh Soutetsu?」"

# 【双鉄】
# display as 雙鐵
