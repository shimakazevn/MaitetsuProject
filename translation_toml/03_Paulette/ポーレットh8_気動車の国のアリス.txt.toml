2681 = "「能辦成就再好不過了。放在繪本館裡賣，那就成了“湯醫童話葡萄酒”了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふわわわわ～」
2176 = "「哇哇哇～」" 

# monologue
# JP: ポーレットが熱のこもった息を吐く。\nまるでもう、ワインに酔ってしまったような。
3481 = "波萊特吐出了溫熱的氣息，簡直就像喝醉了一樣。" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっぱり、凄いです双鉄くん」
2818 = "「雙鐵果然好聰明君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　凄い、とは――」
2341 = "「嗯？也算不上吧——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「[ゆのいえほんかん,4]湯医絵本館のこと、\nそこまで一気に考えてくれるなんて」
2638 = "「湯醫繪本館的主意，居然能一下子想這麼遠」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや……」
2143 = "「呃……」" 

# monologue
# JP: 青い瞳は、きらきらまっすぐ、\n僕を、僕だけを見つめてる。
3509 = "波萊特藍色的大眼睛一閃一閃地，她直勾勾地看著我。" 

# monologue
# JP: 元はポーレットの足踏みワイン飲みたさだけだ――\nと、どうにも言い難い雰囲気だ。
3631 = "起源其實是我想喝波萊特的腳踩葡萄酒，但是現在我也不好意思說了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……話の流れが、よい連鎖をしたにすぎんさ。\nというか、いかんな。いささか冒進気味だった」
1499 = "「……只是正好串聯起來了。不過還是不行吧，有點太冒進了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ。いわれたらそうかも」
2263 = "「啊，這麼一說還真是」" 

# monologue
# JP: 苦笑し、こつり。\nポーレットは軽く、自分のおでこを叩いてみせる。
3517 = "波萊特露出了苦笑，然後輕輕敲了一下自己的額頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「まだ出発信号機も、わたしたち、通過してないのに」
2492 = "「我們明明連出發的信號燈還沒通過呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。まずは起点に戻るとしよう。\n『メルヘン列車』の話だったな」
2573 = "「是啊，我們先回到起點吧。你說的是“童話列車”對吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っていうか、説明も全然、まだでしたね。\nごめんなさい」
2705 = "「說起來我還有沒有做說明。對不起」" 

# 【双鉄】
# display as 雙鐵
