# 【ポーレット】
# display as 波萊特
# JP: 「はい！　はいっ！　ぜったい！　ぜったいします！\n妊娠、して――赤ちゃん、赤ちゃん！　双鉄くんのっ」
2312 = "「Vâng! Vâng! Chắc chắn! Chắc chắn sẽ mang\nthai!\nMang thai——em bé, em bé! Của Anh\nSoutetsu」"

# monologue
# JP: （びゅっ――びゅるっ――びゅうう――ビュッ――）
# 3736 = "（噗嚕！噗嚕！噗噗！噗噗！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ――あっ――ああっ……\nふうっ――ふっ――ふっ――ふあああああ～」
2163 = "「Phù a——a——a——a a……\nphù——phù——phù——phù a a\na a a~」"

# monologue
# JP: くてりと、ポーレットの力が抜ける。\n射精も、ようやく落ち着いてくれる。
3496 = "Paulette mềm nhũn, mất hết sức lực.\nViệc\nxuất tinh, cuối cùng cũng dịu lại."

# 【ポーレット】
# display as 波萊特
# JP: 「子宮……いっぱい。これ――わたし――\n妊娠、できてると思います」
2431 = "「Tử cung……tràn ngập rồi. Thế này——em——\nnghĩ là mình, có thai được rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だといいが」
2457 = "「Không sao đâu, Hachiroku.\nVì đây là cuộc\nhạ cánh khẩn cấp để giữ an toàn cho mạng\nsống của tôi mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「だから、ね？　双鉄くんっ！？」
2545 = "「Thế nên, nhé? Anh Soutetsu!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？」
2313 = "「Ưm!?」"

# monologue
# JP: 抱きしめられてキスされる。
3129 = "Bị ôm chặt và hôn."

# monologue
# JP: 性器と性器でつながったまま――\nポーレットは僕を味わい、そうして、囁く。
3263 = "Bộ phận sinh dục vẫn đang kết nối với\nnhau——\nPaulette nếm thử tôi, và rồi, thì\nthầm."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしを、もっと染めてください。\n双鉄くんだけのわたしのうちに。残らず、全部を」
2714 = "「Hãy nhuộm em, nhiều hơn nữa đi.\nBên trong\nem chỉ có Anh Soutetsu thôi. Không chừa\nlại chút nào, toàn bộ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。望むところだ。\n今日すぐにでも、まだ頑張れるぞ」
2327 = "「Ừ. Anh cầu còn không được.\nNgay hôm nay,\nanh vẫn còn có thể cố gắng tiếp đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「本当ですか！？　やったぁ、うれしい」
2656 = "「Ngài Soutetsu? Ngài thấy lạnh sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2179 = "「Ra là vậy. Đây là lỗi của tôi.」"

# monologue
# JP: ポーレットに軽く押されて、\nまたもベッドに座らせられる。
3513 = "Bị Paulette đẩy nhẹ,\ntôi lại phải ngồi\nxuống giường."

# monologue
# JP: さっきと同じ姿勢にもどり、\nポーレットは僕を見上げて、にっこり笑う。
3261 = "Một nhân vật công chúng như thị trưởng mà\nlại nói \"không nghĩ là anh biết tôi\",\ntheo\ntiêu chuẩn \"bình thường\" của tôi thì đó là\nmột phát ngôn không thể tin được."

# 【ポーレット】
# display as 波萊特
# JP: 「それじゃあ、今度は、\nおくちから喉をお願いします！」
2807 = "「Vậy thì, lần này,\nnhờ anh từ miệng xuống\nhọng nhé!」"

# monologue
# JP: おしまい
3191 = "Hết"
