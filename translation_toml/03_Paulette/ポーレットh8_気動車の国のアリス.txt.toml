2306 = "「Ưm ưm ưm——a a a a, rùng, mình——\ntích tụ, lại——ưm——sướng quá, sền, sệt」"
# monologue
# JP: ポーレットの赤みが増していく。\nもぞもぞ、体が切なく動く。
3480 = "Paulette ngày càng đỏ ửng.\nCơ thể vặn vẹo, ngọ nguậy một cách bức bối."
# 【ポーレット】
# display as 波萊特
# JP: 「腰、うい。ちゃうっ――んっ――ああっ！　わたし、\nからだ――おちん、ちん、に――持ち上げ、られて」
2684 = "「Eo, nhấc. Lên mất——ưm——a a! Em,\ncơ thể——bị dương, vật——nhấc, bổng lên」"
