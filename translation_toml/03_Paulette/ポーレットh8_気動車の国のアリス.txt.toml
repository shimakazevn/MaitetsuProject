# lines: 704 
# monologue
# JP: ……言葉に困る。\nかわいらしいは、もちろん大変に可愛いのだが――
1457 = "……Thật khó để diễn tả bằng lời.\nĐáng yêu\nthì, tất nhiên là cực kỳ đáng yêu rồi——"

# 【ポーレット】
# display as 波萊特
# JP: 「あ～……えと……\nやっぱり、ちょっと違っちゃってる感じですか？」
2265 = "「A~……ừm……\nQuả nhiên là, cảm giác hơi sai\nsai ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「違ってはいない。メルヘン、という感じはする。\n大変に可愛らしいし、好きか嫌いかでいえば大好きだ」
2614 = "「Không sai đâu. Mang lại cảm giác rất cổ\ntích.\nCực kỳ đáng yêu, nếu hỏi thích hay\nkhông thì anh rất thích.」"

# 【ポーレット】
# display as 波萊特
# JP: 「えへへ――ありがとうございます。手持ちだと、\nこの服が一番、メルヘンって感じかなって、思って」
2372 = "「Ê hế hế——Cảm ơn anh. Trong những bộ em\ncó,\nem nghĩ bộ này là mang cảm giác cổ\ntích nhất rồi」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、縦縞のスカートが効いている。少し古風で、\n髑国かなにかの絵本の中にいてもおかしくなさそうだ」
2577 = "「Quay lại trình tự ban đầu thôi.\nChúng ta\nđã đi đường vòng rồi, nhưng trước hết phải\nlấp đầy cái bụng đã.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そこは、フランクじゃないんですか？」
2041 = "「Chỗ đó, không phải là Pháp sao?」"

# monologue
# JP: ぷくーっと膨れるふりをして。
3494 = "Cô ấy giả vờ phồng má phụng phịu."

# monologue
# JP: けれどもすぐに笑顔に戻り、\nポーレットはスカートを翻す。
3036 = "Nhưng ngay lập tức mỉm cười trở lại,\nPaulette tung bay tà váy."

# 【ポーレット】
# display as 波萊特
# JP: 「ふふっ、村娘風？　って感じですか？\nワインとか、足踏みしてつくっちゃったり」
2360 = "「Không đúng sao?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。そうだな」
2259 = "「À, ừ. Đúng vậy.」"

# monologue
# JP: 言葉につられ足を見る。
3582 = "Bị lời nói thu hút, tôi nhìn xuống đôi\nchân cô ấy."

# monologue
# JP: スカートの縦縞のせいか、\nいつもより長くスラリと感じる――旨そうだ。
3090 = "Có lẽ do sọc dọc của chiếc váy,\nmà đôi\nchân trông thon dài hơn mọi khi——Có vẻ\nngon miệng đây."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの足踏みワインなら、是非飲みたい」
2421 = "「Nếu là rượu vang do Paulette giẫm chân\nlàm ra, anh nhất định muốn uống thử.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　え？　あの……双鉄くんが飲みたいなら、\nわたし、がんばってみたい、です――けど」
2197 = "「Hả? Hả? Cái đó……nếu Anh Soutetsu muốn\nuống,\nthì em, cũng muốn thử cố gắng xem\nsao——nhưng mà」"

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2384 = "「Ồ」"

# monologue
# JP: 思わずこぼれたひとりごと――冗談半分のひとことを、\nポーレットは真に受けてくれている。
3250 = "Lời lẩm bẩm buột miệng thốt ra——một câu\nnói đùa,\nlại được Paulette tin là thật."

# monologue
# JP: ありがたい。飲めるものなら、是非とも飲みたい。\n欲望が、脳細胞に賦活する。
3290 = "Tầm mắt hướng ra xa.\nMột thứ gì đó mờ ảo\ntrong hơi nóng bốc lên từ mặt đất, lờ mờ\nhiện ra."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば実現化したいものだな――その……ああ！\n『湯医絵本館』のオープニングイベントとして」
2793 = "「Vậy thì muốn hiện thực hóa nó quá\nnhỉ——cái đó……A!\nLàm sự kiện khai trương\ncho 『Thư viện Truyện tranh Yunosaka』 luôn」"

# 【ポーレット】
# display as 波萊特
# JP: 「オープニングイベント――\nあ！　『足踏みワイン体験』とかですか？」
2815 = "「Sự kiện khai trương——\nA! Kiểu như 『Trải\nnghiệm làm rượu vang bằng chân』 ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。御一夜は酒造りの町だし――\n隈元には、ぶどう農園もワイナリーもある」
2436 = "「Ừm. Ohimitera vốn là thị trấn nấu rượu\nmà——\nỞ Kumamoto cũng có cả vườn nho lẫn\nxưởng rượu vang.」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　そうなんですか。わたし、知らなかった」
2201 = "「Hả? Vậy ạ. Em không biết luôn đó.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なんだかんだいっても僕は酒蔵の養子だからな。\n酒のことには、多少は詳しい」
2047 = "「Nói gì thì nói, anh cũng là con nuôi của\nxưởng rượu mà.\nNên anh cũng biết đôi chút\nvề rượu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「知ってます」
2526 = "「Em biết mà.」"

# monologue
# JP: 信頼に満ち満ちた声。\n瞳も、わくわくきらめいている。
3503 = "Giọng nói tràn đầy sự tin tưởng.\nĐôi mắt\ncũng lấp lánh sự háo hức."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんがチェックしてるなら――\nおいしいんですよね？　きっと、そこのワイン」
2556 = "「Nếu đã được Anh Soutetsu kiểm chứng thì——\nchắc chắn là ngon đúng không anh? Rượu\nvang ở đó ấy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、さして強くない僕でも楽しめる、\n飲みくちのよい、軽いワインだ」
2329 = "「Được gặp chị Reina vui lắm nha, chị\nHachiroku~」"

# 【ポーレット】
# display as 波萊特
# JP: 「嬉しい。わたしも好きです、そういう方が」
2803 = "「Thích quá. Em cũng thích loại như vậy.」"

# 【双鉄】
# display as 雙鐵
# JP: 「好みもあろうが、間違いなく質は高い。\n僕としては、特に赤がいい。馬サシとの相性は抜群だ」
2586 = "「Viết là mặt giẫm lên, đọc là toumen.\nVới\nNgài Soutetsu thì, chỉ cần thế này là đủ\nhiểu rồi chứ ạ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「わ……聞いてるだけでよだれが出ちゃいそう」
2175 = "「Oa……nghe thôi đã thấy thèm chảy nước\nmiếng rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、是非。手に入れるので、一緒に飲もう」
2794 = "「Vậy thì nhất định rồi. Anh sẽ mua về,\nchúng ta cùng uống nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、約束ですよ？\nわたし、ムース作っておきますね」
2362 = "「Ư hự hự, hứa rồi nhé?\nEm sẽ làm sẵn bánh\nmousse đợi anh.」"

# 【双鉄】
# display as 雙鐵
# JP: 「楽しみだ」
2504 = "「Bẩn thỉu quá nhỉ.」"

# monologue
# JP: ポーレットのうきうき顔に、思考も弾む。\nというか――うむ。
3508 = "Vẻ mặt rạng rỡ của Paulette khiến suy nghĩ\ncủa tôi cũng bay bổng theo.\nMà nói đúng\nhơn là——ừm."

# 【双鉄】
# display as 雙鐵
# JP: 「それでポーレットの気に入るようなら、もう一段階、\n試飲会まで推し進めるのもありかもしれんな」
2419 = "「Vâng. Là tàn tích của \\x%l駅名標;#00ffc040;biển hiệu nhà ga%l;#;\n——đấy ạ.\nHư hỏng\nđến mức này thì không còn hoàn thành được\nvai trò của nó nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「試飲会？」
2703 = "「Buổi nếm thử rượu ạ?」"

# monologue
# JP: きょとんと小首が傾げられる。
3495 = "Cô ấy ngơ ngác nghiêng đầu."

# 【双鉄】
# display as 雙鐵
