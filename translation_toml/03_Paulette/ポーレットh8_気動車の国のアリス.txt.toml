# display as 波萊特
# JP: 「ゆっくり、ゆっくり、ねっとり、とろおり。\n双鉄くんの精液を、焦らして、濃くして」
2502 = "「Thật sự…… tuyệt vời quá. Từ đây trở về\ntrước, và từ đây trở về sau.\nTình trạng\ncủa đường ray hầu như không có sự khác\nbiệt nào có thể quan sát được.」"

# monologue
# JP: （しこ――しこっ）
3722 = "（Sục——sục）"

# 【双鉄】
# display as 雙鐵
# JP: 「ぁ――んっ」
2225 = "「Không đâu, chuyện cũng chẳng có gì đáng\nngạc nhiên,\nchỉ là tôi hơi…… ừm, phản ứng\nthái quá một chút thôi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ん～～（くちゅちゅっ）――んえ～～っ」
2344 = "「Chúng tôi đã cố gắng hết sức để giúp thế\ngiới rộng lớn này,\ntrở nên nhỏ bé hơn dù\nchỉ một chút——」"

# 【双鉄】
# display as 雙鐵
# JP: 「う……ぁ――」
2204 = "「Ư……a——」"

# monologue
# JP: それも焦らしの一貫なのか、口内で音をたて泡立てて、\nポーレットがよだれを垂らしてくれる。
3117 = "Có lẽ đó cũng là một phần của sự trêu\nchọc, Paulette tạo tiếng động nhóp nhép\nsủi bọt trong miệng,\nrồi nhỏ nước bọt\nxuống."

# 【ポーレット】
# display as 波萊特
# JP: 「濃くして、濃くして、焦らして、焦らして。\n[だ,1]射精したいとこより、もっともっと我慢してもらって」
2716 = "「Làm đặc lại, đặc lại nữa, trêu chọc, trêu\nchọc nữa.\nBắt anh phải nhịn, nhịn nhiều\nhơn nữa so với lúc muốn xuất tinh.」"

# monologue
# JP: （しこ――しこ――くり――くりっ）
3720 = "（Sục——sục——xoa——xoa）"

# 【双鉄】
# display as 雙鐵
# JP: 「う……ぁ……ポーレット」
2145 = "「Ư……a……Paulette」"

# 【ポーレット】
# display as 波萊特
# JP: 「びゅうって、どろって、どぷどぷどぷって、\nわたしの全部、双鉄くん精液で、染めてください」
2378 = "「Hãy bắn ra, nhão nhoét, phụt phụt phụt,\nnhuộm toàn bộ con người em, bằng tinh dịch\ncủa Anh Soutetsu đi.」"

# monologue
# JP: 手指の動きが、あまりにゆるすぎ、正直、キツい。\n今すぐも腰を振りたい。その口内にねじり込みたい。
3134 = "Cô ấy chớp mắt, đổ mồ hôi, và có vẻ như\ncũng đang thở.\nVô số cử chỉ giống hệt con\nngười đang bao trùm lấy toàn bộ Hachiroku."

# monologue
# JP: 歯ぎしりしている獣の欲を、けれど、願いで。\nポーレットの願いだからと、鎖につなぐ。
3276 = "Nhưng tôi đã dùng lời thỉnh cầu để khóa\nchặt dục vọng của một con thú đang nghiến\nrăng ken két.\nVì đó là nguyện vọng của\nPaulette, nên tôi xích nó lại."

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 2301 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、うれしい。それじゃ、ゆーっくり。\nしこ――しこ――もみ――もみっ」
2353 = "「Tôi thì không rành lắm.\nNhưng tuyến đường\nsắt là như thế này sao?」"

# monologue
# JP: 指を使って、握りの強弱をつけてはくれるが、\n強い部分でも、あまりにゆるい。
3143 = "Dù cô ấy dùng ngón tay để tạo lực nắm mạnh\nnhẹ khác nhau,\nnhưng ngay cả phần mạnh\nnhất, cũng vẫn quá lỏng lẻo."

# 【ポーレット】
# display as 波萊特
# JP: 「しこ――しこ――もみ――もみ――\nおちんちんさん――いいこいいこ、がまんがまん」
2389 = "「Sục——sục——xoa——xoa——\nDương vật ngoan\nnào——ngoan nào ngoan nào, ráng nhịn nhé」"

# monologue
# JP: 汗とよだれと先走り汁にまみれた、湿度とぬらつき。\nそうありながら、最高にすべすべの肌触り。
3422 = "Sự ẩm ướt và trơn trượt, hòa lẫn giữa mồ\nhôi, nước bọt và chất nhờn.\nNhưng đồng\nthời, cảm giác trên da lại mịn màng đến\ntuyệt đỉnh."

# monologue
# JP: なのに柔らかすぎて、軽すぎる。\n腰が、どうしてもむずむず動く。
3035 = "Vậy mà lại quá mềm mại, quá nhẹ nhàng.\nEo\ntôi cứ ngứa ngáy muốn cử động bằng mọi\ngiá."

# 【ポーレット】
# display as 波萊特
# JP: 「あれあれ？　どうしたの？　あ！　暑すぎる？\nごめんね？　気がつかなくて。ふぅ～ふぅぅ～っ」
2183 = "「Ủa ủa? Sao thế? A! Nóng quá hả?\nXin lỗi\nnhé? Em không để ý. Phù~ phù~」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ――ぐっ！」
2208 = "「——Ư!」"

# monologue
# JP: 汗が、出て来る。\n射精の代理といわんばかりに、ぶわりと一気に。
3265 = "Mồ hôi, túa ra.\nTuôn ra ồ ạt như thể thay\nthế cho việc xuất tinh."

# 【ポーレット】
# display as 波萊特
# JP: 「あは、すっごく気持ちよさそう。続けてあげるね？\nしこ――しこ――しこ――しこ――ふぅ、ふううう～」
2242 = "「Hừm.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポー、レット――」
2626 = "「Pau, lette——」"

# monologue
# JP: ポーレットの望みを叶えたい。\nけれども、すぐにでも射精したい。
3295 = "Lần này đến lượt Hachiroku.\nCô ấy cứ liếc\nnhìn tôi rồi lại lảng đi liên tục."

# monologue
# JP: 腰がむずつく。あたってるだけのおっぱいに、\nすがりつくように動いてしまう。
3298 = "Eo tôi ngứa ngáy. Bất giác cử động như\nmuốn bám víu vào bầu ngực\nđang chạm hờ\nkia."

# 【ポーレット】
# display as 波萊特
# JP: 「あれえ？　さっきより苦しそう？　あ、わかった。\n双鉄くんのおちんさん、きっと」
2171 = "「Ủa? Trông có vẻ khổ sở hơn lúc nãy nhỉ?\nA, em biết rồi.\nDương vật của Anh\nSoutetsu, chắc chắn là」"

# monologue
# JP: （く――くくっ）
3741 = "（Vạch——vạch）"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！？」
2253 = "「!!?」"

# monologue
# JP: ポーレットの指先が僕の亀頭を開いてく。\n尿道口を――くぱぁと、まるで大陰唇を開くが如くに。
3498 = "Đầu ngón tay Paulette vạch quy đầu của tôi\nra.\nLỗ niệu đạo——tách ra, cứ như thể đang\nvạch môi lớn vậy."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんのおちんちんさん、\nおっぱい、ちゅうちゅうしたいのかなぁ？」
2081 = "「Dương vật của Anh Soutetsu,\nmuốn mút mút\nngực sao ta?」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2147 = "「!」"

# monologue
# JP: 乳首を、そこで――尿道口で挟むというのか。\nできることとは思えない。
3175 = "Định dùng lỗ niệu đạo——kẹp lấy nhũ hoa ở\nđó sao.\nTôi không nghĩ là làm được đâu."

# monologue
# JP: けれども、刺激が――乳首の硬さが、尿道口を、\n押して、刺激してくれるのならば。
3026 = "Nhưng, nếu sự kích thích——độ cứng của nhũ\nhoa, đè lên lỗ niệu đạo,\nvà kích thích nó."

# 【双鉄】
# display as 雙鐵
# JP: 「恐らく――そうだ」
2472 = "「Có lẽ——là vậy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうって、何がですか？」
2109 = "「Không đâu, Ngài Soutetsu. Quả thực là nó\ncó bị hỏng hóc, xập xệ\n——Nhưng đường ray\nnày, vẫn còn sống.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2147 = "「呃！」" 

# monologue
# JP: わかっているのに、とぼけられている。\n普段自分が好むプレイを、やり返されてる。
3144 = "Biết rõ mà còn giả vờ.\nTôi đang bị cô ấy\ntrả đũa bằng chính trò chơi mà tôi thường\nthích."

# monologue
# JP: じれったい、もどかしい、恥ずかしい。\nけれどもそれが、僕のポーレットの望みなら――
3356 = "Sốt ruột, bực bội, xấu hổ.\nNhưng nếu đó là\nmong muốn của Paulette của tôi thì——"

# 【双鉄】
# display as 雙鐵
# JP: 「僕の、勃起は――おちんちんさんは――\nポーレットの、乳首を、ちゅうちゅう、したいっ」
2520 = "「Trái tim của động cơ Aero-Craftech\nlà một\nhợp chất dạng đá quý có tên là\nQuirquitium.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、やっぱり、そうだったんですね」
2355 = "「Ư hự hự, quả nhiên, là vậy nhỉ.」"

# monologue
# JP: （くにゅんっ！）
3753 = "（Ép chặt!）"

# 【双鉄】
# display as 雙鐵
# JP: 「ああああ」
# 2206 = "「啊——」" 

# monologue
# JP: 押し込まれてる、押し当てられてる。\nおっぱいが、乳首が望んだ刺激をくれる。
3154 = "Như một chú cún con ngây thơ và người chủ\ndịu dàng.\nTrong bầu không khí đó, Paulette\nnhắc nhở Reina."

# monologue
# JP: 尿道口でくわえ込むとはいかないが、\n勃起しきった乳首の硬さが亀頭先端をつついてくれる。
3652 = "Dù không thể ngậm lấy bằng lỗ niệu đạo,\nnhưng độ cứng của nhũ hoa đang cương cứng\ntột độ đang đâm chọc vào phần đỉnh quy\nđầu."

# 【ポーレット】
# display as 波萊特
# JP: 「あはぁ、おちんちんさんうれしそう。\nしこ――しこ――もに、もにっ――しこ、しこ、しこ」
2244 = "「A ha, dương vật trông có vẻ vui lắm.\nSục——sục——nắn, nắn——sục, sục, sục」"

# 【双鉄】
# display as 雙鐵
# JP: 「はぁ――はぁ――はぁ――はぁっ」
2155 = "「Hà——hà——hà——hà」"

# monologue
# JP: おっぱいの、乳首の当たりがつよい。\nただそれだけで、全てが変わる。
3545 = "Lực tác động của bầu ngực, của nhũ hoa rất\nmạnh.\nChỉ cần vậy thôi, mọi thứ đã thay\nđổi."

# 【ポーレット】
# display as 波萊特
# JP: 「しこ――しこ――もに――もに――わ、すっごい、\nおちんちんのたま――重い、ですよね――これ」
2390 = "「Sục——sục——nắn——nắn——oa, dữ quá,\nhai hòn\nngọc——nặng, thật đấy——cái này」"

# monologue
# JP: 玉がゆすられ――いや、恐らく僕が無意識に、\n玉をゆすって、ポーレットの手首の刺激を求めてた。
3559 = "Hai hòn ngọc bị lắc lư——không, có lẽ trong\nvô thức,\ntôi đã lắc lư hai hòn ngọc để tìm\nkiếm sự kích thích từ cổ tay Paulette."

# monologue
# JP: それほどまでに、乾ききってる。\nもっともっとと、爪の先までが悲鳴を上げてる。
3284 = "Tôi đã khao khát đến mức độ đó.\nĐến tận\nđầu móng tay cũng đang gào thét đòi hỏi\nnhiều hơn nữa."

# 【ポーレット】
# display as 波萊特
# JP: 「よいしょ――よいしょ――しこ――しこ――\nもにゅ、もにゅ――しこ――しこ――えいっ」
2365 = "「Yoozo——yoozo——sục——sục——\nnắn,\nnắn——sục——sục——ây da」"

# monologue
# JP: （ぐにっ）
3763 = "（Chà nhẹ）"

# 【双鉄】
# display as 雙鐵
# JP: 「ううううっ」
# 2240 = "「啊」" 

# monologue
# JP: 手の側面が、玉に柔らかな刺激をくれる。\nスポンジで撫でる程度の、一層僕を乾かす刺激を。
3136 = "Cạnh bàn tay mang đến kích thích mềm mại\ncho hai hòn ngọc.\nKích thích chỉ ngang mức\nxoa bằng miếng bọt biển, lại càng làm tôi\nthêm khao khát."

# 【ポーレット】
# display as 波萊特
# JP: 「おちんちんの先、くぱくぱしてます。\nくぱくぱちゅうちゅう、おっぱい、飲んでる」
2820 = "「Phần đỉnh dương vật, đang đóng mở liên\nhồi.\nĐóng mở mút mút, đang bú, ngực kìa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「は、ぁ――」
2162 = "「Hà, a——」"

# monologue
# JP: もう、限界だ。\n今すぐポーレットを押し倒し剥がし捻り込みたい。
3283 = "Đến giới hạn, mất rồi.\nMuốn đè Paulette\nxuống ngay lập tức, lột đồ và thọc sâu vào\ntrong."

# 【ポーレット】
# display as 波萊特
# JP: 「どろどろですね。わたしたち。\n私の指と、おちんちんが溶け合ってるみたい」
2491 = "「Nhão nhoét hết rồi nhỉ. Chúng ta ấy.\nNgón\ntay em và, dương vật như đang hòa tan vào\nnhau vậy.」"

# monologue
# JP: ポーレットが親指をわずかにずらす。\nくちぃ――と粘液が糸となり、その指先を追いかける。
3505 = "Paulette khẽ dịch ngón cái.\nNhóp\nnhép——chất nhầy kéo thành sợi, đuổi theo\nđầu ngón tay cô ấy."

# 【ポーレット】
# display as 波萊特
# JP: 「んっ――（ごくっ）」
2281 = "「Đẹp quá——là người nước ngoài sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「！」
2825 = "「!」"

# monologue
# JP: ツバを飲む音。熱い息。\nポーレットの指のちからが、少しだけ、増す。
3484 = "Tiếng nuốt nước bọt. Hơi thở nóng hổi.\nLực\nngón tay của Paulette, tăng lên, một chút."

# 【ポーレット】
# display as 波萊特
# JP: 「おちんちんビクビク苦しそう。双鉄くん？\nびゅーって、精子、[だ,1]射精したいですか？」
2819 = "「Dương vật giật giật trông có vẻ khổ sở\nquá. Anh Soutetsu?\nMuốn bắn ra, tinh\ntrùng, xuất tinh đúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「――ぐ――ぅっ――」
2228 = "「A——」"

# monologue
# JP: 全力で喉を駆け上がってくる同意の言葉を、頷きを。\nけれども、歯ぎしりで閉じ込める。
3292 = "Lời đồng ý dốc hết sức dâng lên tận cổ\nhọng, cùng cái gật đầu.\nNhưng tôi đã\nnghiến răng kìm nén lại."

# 【双鉄】
# display as 雙鐵
# JP: 「いや――大丈夫、だ。\nポーレット――ポーレットの――したい、ように」
2055 = "「Không——không sao, đâu.\nPaulette——Paulette——muốn, làm gì cũng\nđược.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うれしい！　大好きです、双鉄くん」
2498 = "「Em vui quá! Em yêu anh nhất, Anh\nSoutetsu.」"

# monologue
# JP: （しゅこんっ！）
3739 = "（Sục mạnh!）"

# 【双鉄】
# display as 雙鐵
# JP: 「んんんんっ！」
2307 = "「Với trọng lượng của cỗ máy này, mệnh lệnh\n\"hãy làm hỏng đường ray\"\ncòn khó thực hiện\nhơn nhiều ạ.」"

# monologue
# JP: 速度が、強さがガラリと変わる。
3137 = "Tốc độ, sức mạnh thay đổi hoàn toàn."

# 【ポーレット】
# display as 波萊特
# JP: 「たくさん、たくさん射精してください。\n双鉄くんの精液、どろどろの、精液クリーム」
2712 = "「Hãy xuất tinh thật nhiều, thật nhiều đi.\nTinh dịch của Anh Soutetsu, kem tinh dịch,\nnhão nhoét.」"

# monologue
# JP: 射精させたい。\nその意思を、指先が勃起に訴えてくる。
3131 = "Muốn làm tôi xuất tinh.\nĐầu ngón tay\ntruyền đạt ý định đó lên dương vật."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしを、デコレーションしてください。\nリボンも、髪も、瞳も、服も、おっぱいも」
2715 = "「Hãy trang trí, cho em đi.\nCả ruy băng,\ntóc, mắt, quần áo, lẫn ngực nữa.」"

# monologue
# JP: ポーレットの手が、性器になってる。\n蠢く指が肉筒となり、精液を絞りにかかってる。
3501 = "Bàn tay của Paulette, đã trở thành bộ phận\nsinh dục.\nNhững ngón tay ngọ nguậy hóa\nthành ống thịt, bắt đầu vắt kiệt tinh\ndịch."

# monologue
# JP: （むにっ！　むにゅぅぅぅっ！）
3769 = "（Ép! Ép chặttttt!）"

# 【ポーレット】
# display as 波萊特
# JP: 「んっ――はうっ」
