2323 = "「Ồ, sao thế Paule——ờm」"

# monologue
# JP: 受話器だ。\n僕に、手渡そうとしてくれている。
3180 = "Ống nghe.\nCô ấy đang định đưa nó cho tôi."

# monologue
# JP: 思考の整理がまったく追いついていないけれども、\nためらわず受け取るべきと、それだけはわかる。
3353 = "Dù dòng suy nghĩ vẫn chưa kịp sắp xếp lại,\nnhưng tôi biết mình phải nhận lấy không\nchút do dự, chỉ có điều đó là rõ ràng."

# 【双鉄】
