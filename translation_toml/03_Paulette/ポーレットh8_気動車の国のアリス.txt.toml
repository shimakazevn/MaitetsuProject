2800 = "「Nếu vậy, khi có dịp hãy cho anh gửi lời\nchào hỏi nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「いいですよ？　その機は、今です！」
2127 = "「Được chứ ạ? Cơ hội đó, chính là lúc này!」"

# 【双鉄】
# display as 雙鐵
