3348 = "Chỉ cần vuốt ve phần hạt nổi cộm đó,\nPaulette đã nhẹ nhàng lên đỉnh."
# 【ポーレット】
# display as 波萊特
# JP: 「はぁっ――ふあ――あっ――んっ――ふあっ――\nだから、そういう、の――ん――ずるい、ですっ」
2214 = "「Hà——phù a——a——ưm——phù a——\nthế nên, mấy trò, đó——ưm——ăn gian, lắm」"
# 【双鉄】
# display as 雙鐵
# JP: 「ずるいか。ならば、抜いてしまおう」
2645 = "「Ăn gian sao. Vậy thì, rút ra thôi.」"
# monologue
# JP: （にゅぽっ）
3743 = "（Phụt）"
# 【ポーレット】
# display as 波萊特
# JP: 「ええええっ！！？」
2184 = "「Hảảảả!!?」"
# monologue
