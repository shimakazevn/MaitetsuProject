# JP: 特段、異物感などはない。\nだけれど確かに、ポーレットの反応が際立っている。
3320 = "Không có cảm giác vướng víu gì đặc biệt.\nNhưng quả thực, phản ứng của Paulette rất rõ rệt."
# monologue
# JP: （ずりゅううっ――ずっ――ぬぢゅううっ――ずるっ）
3770 = "（Thọc sâuuuuu——thọc——rút raaaaa——rút）"
# 【ポーレット】
# display as 波萊特
# JP: 「そこっ、わたしッ――そこ、弱い、みたい――ん、\nおす、の――まって――待って、ちょっ――あ、あっ」
2805 = "「Chỗ đó, em——chỗ đó, có vẻ, yếu——ưm,\nấn, vào——đợi——đợi đã, một chút——a, a」"
# monologue
# JP: だが、覚えたい。\nポーレットの新しい、弱いところの手がかりを――
3359 = "Nhưng, tôi muốn ghi nhớ.\nManh mối về điểm yếu mới của Paulette——"
# monologue
# JP: （ずりゅう――ずうっ――ぬにゅうっ――ぬぢゅっ）
# 3770 = "（頂來頂去）" 
# 【ポーレット】
# display as 波萊特
