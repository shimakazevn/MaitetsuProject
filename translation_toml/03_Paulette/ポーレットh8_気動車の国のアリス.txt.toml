[script]
# lines: 704 
# monologue
# JP: ……言葉に困る。\nかわいらしいは、もちろん大変に可愛いのだが――
1457 = "……我不知道該說什麼好。她當然是可愛到了極點——" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ～……えと……\nやっぱり、ちょっと違っちゃってる感じですか？」
2265 = "「啊～……那個……這樣果然還是感覺不對勁嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「違ってはいない。メルヘン、という感じはする。\n大変に可愛らしいし、好きか嫌いかでいえば大好きだ」
2614 = "「沒有不對勁，看起來非常有童話風。真的非常可愛，要說的話我很喜歡」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えへへ――ありがとうございます。手持ちだと、\nこの服が一番、メルヘンって感じかなって、思って」
2372 = "「嘿嘿，謝謝。我現在有的衣服裡，這套衣服最有童話的感覺」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、縦縞のスカートが効いている。少し古風で、\n髑国かなにかの絵本の中にいてもおかしくなさそうだ」
2577 = "「是啊，豎條紋的裙子很有韻味。稍微有一點古風，放在德國的繪本裡都不會有什麼問題」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そこは、フランクじゃないんですか？」
2041 = "「不應該說法國嗎？」" 

# monologue
# JP: ぷくーっと膨れるふりをして。
3494 = "波萊特氣鼓鼓地鼓起了臉蛋。" 

# monologue
# JP: けれどもすぐに笑顔に戻り、\nポーレットはスカートを翻す。
3036 = "但是笑容馬上就回到了她的臉上。她轉了轉身，讓裙子飄起。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふふっ、村娘風？　って感じですか？\nワインとか、足踏みしてつくっちゃったり」
2360 = "「嘻嘻，這個可以叫鄉下的姑娘吧？比如用腳踩葡萄釀酒之類的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、うん。そうだな」
2259 = "「啊，嗯。是啊」" 

# monologue
# JP: 言葉につられ足を見る。
3582 = "聽她一說，我就看向了她的腿。" 

# monologue
# JP: スカートの縦縞のせいか、\nいつもより長くスラリと感じる――旨そうだ。
3090 = "可能是因為有裙子上豎條紋的襯托，她的美腿看起來更修長了——引人食指大動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの足踏みワインなら、是非飲みたい」
2421 = "「如果是你做的腳踩葡萄酒的話，那我真想嘗一嘗」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　え？　あの……双鉄くんが飲みたいなら、\nわたし、がんばってみたい、です――けど」
2197 = "「哎？哎？那個……如果你想喝的話，我會努力一下——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
2384 = "「噢」" 

# monologue
# JP: 思わずこぼれたひとりごと――冗談半分のひとことを、\nポーレットは真に受けてくれている。
3250 = "我不小心把內心想法說了出來，波萊特卻把我這半開玩笑的話當真了。" 

# monologue
# JP: ありがたい。飲めるものなら、是非とも飲みたい。\n欲望が、脳細胞に賦活する。
3290 = "我很欣慰，如果真的能喝到的話，我真想喝喝看。欲望把我的腦細胞給活化了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば実現化したいものだな――その……ああ！\n『湯医絵本館』のオープニングイベントとして」
2793 = "「那就真想實現一下——啊，對了！就當作“湯醫繪本館”的開業活動」" 

# 【ポーレット】
# display as 波萊特
# JP: 「オープニングイベント――\nあ！　『足踏みワイン体験』とかですか？」
2815 = "「開業活動嗎——啊！“腳踩製酒體驗”之類的嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。御一夜は酒造りの町だし――\n隈元には、ぶどう農園もワイナリーもある」
2436 = "「對。御一夜本來就是產酒的地方——隈元有葡萄園，也有葡萄酒廠」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　そうなんですか。わたし、知らなかった」
2201 = "「哎？是嗎，我都不知道」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なんだかんだいっても僕は酒蔵の養子だからな。\n酒のことには、多少は詳しい」
2047 = "「不管怎麼說我也是酒廠家的養子。關於酒這方面還是了解一點」" 

# 【ポーレット】
# display as 波萊特
# JP: 「知ってます」
2526 = "「我知道的」" 

# monologue
# JP: 信頼に満ち満ちた声。\n瞳も、わくわくきらめいている。
3503 = "波萊特的聲音中充滿了對我信任。她的大眼睛也一閃一閃的。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんがチェックしてるなら――\nおいしいんですよね？　きっと、そこのワイン」
2556 = "「既然你知道，那家產的葡萄酒一定很好喝吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、さして強くない僕でも楽しめる、\n飲みくちのよい、軽いワインだ」
2329 = "「嗯，我這種不會喝酒的人也能品嘗，是一種口味很輕的葡萄酒」" 

# 【ポーレット】
# display as 波萊特
# JP: 「嬉しい。わたしも好きです、そういう方が」
2803 = "「那真好，我也喜歡這樣的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「好みもあろうが、間違いなく質は高い。\n僕としては、特に赤がいい。馬サシとの相性は抜群だ」
2586 = "「有我個人喜好的因素在裡面，不過客觀來講品質也很好。我特別喜歡紅酒，跟馬肉刺身非常搭」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わ……聞いてるだけでよだれが出ちゃいそう」
2175 = "「哇……我光是聽著就要流口水了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、是非。手に入れるので、一緒に飲もう」
2794 = "「那就試試吧。我去買來，我們一起喝」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、約束ですよ？\nわたし、ムース作っておきますね」
2362 = "「嘻嘻，那就約好啦。我會做慕斯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「楽しみだ」
2504 = "「我很期待」" 

# monologue
# JP: ポーレットのうきうき顔に、思考も弾む。\nというか――うむ。
3508 = "波萊特興致勃勃的表情讓我有了一個想法。說起來——嗯。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それでポーレットの気に入るようなら、もう一段階、\n試飲会まで推し進めるのもありかもしれんな」
2419 = "「如果你喜歡的話，就再進一步，也許可以搞一場試飲會之類的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「試飲会？」
2703 = "「試飲會？」" 

# monologue
# JP: きょとんと小首が傾げられる。
3495 = "波萊特沒有聽明白。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、御一夜の酒蔵関係者や、\n湯医の絵本館の関係者を一同に集めてだ」
2314 = "「嗯，可以讓御一夜的酒廠相關人員，還有湯醫的繪本館的人員都聚在一起」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええ、っと」
2752 = "「這個……」" 

# 【双鉄】
# display as 雙鐵
