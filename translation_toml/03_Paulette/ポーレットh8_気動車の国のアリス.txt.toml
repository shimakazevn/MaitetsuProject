2248 = "「A!」"

# monologue
# JP: 話が早い。
3148 = "Tuyến đường rẽ nhánh, vòng ra phía sau sân\nga,\nmà lúc nãy Hachiroku gọi là đường\ntránh tàu."

# monologue
