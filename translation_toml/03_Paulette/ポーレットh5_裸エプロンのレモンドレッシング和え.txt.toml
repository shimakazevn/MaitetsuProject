# ポーレットh5_裸エプロンのレモンドレッシング和え.txt 
[info]

[characters]
1148 = "ポーレット"
1229 = "双鉄"

[character_subs]
1481 = "波萊特"
1620 = "雙鐵"

[script]
# lines: 341 
# monologue
# JP: 抱き上げる。\n力の抜けたポーレットの体は、いつも以上にぽかぽかだ。
1378 = "Bế bổng lên.\nCơ thể mất sức của Paulette ấm áp hơn mọi khi."
# monologue
# JP: ならば、このまま、\nベッドへ運んで――
1513 = "Vậy thì, cứ thế này,\nđưa em ấy lên giường——"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……双鉄くん。ちょ……ちょっとだけ、あのっ……\nお、おろしてっ、待って――もらえますっ――か？」
926 = "「A……anh Soutetsu. Chờ……chờ một chút, chuyện là……\nĐ, đặt em xuống, chờ một lát——được không——ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
952 = "「Hửm?」"
# monologue
# JP: 小刻みに震え始めている。
1406 = "Cô ấy bắt đầu run rẩy nhè nhẹ."
# monologue
# JP: ポーレットの体だけでなく、僕の体も、\nこれほど熱く燃えているのに。
1187 = "Không chỉ cơ thể Paulette, mà cả cơ thể tôi nữa,\nđều đang nóng rực như bốc cháy thế này cơ mà."
# 【双鉄】
# display as 雙鐵
# JP: 「緊張をさせてしまったか？」
986 = "「Anh làm em căng thẳng à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ――あの――そのっ――緊張、とかじゃなく。\nわたし……え……と……はうっ！」
826 = "「Không——ừm——chuyện đó——không phải căng thẳng, đâu ạ.\nEm……ờ……thì……hự!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 952 = "「嗯？」" 
# monologue
# JP: キスでの、愛撫での――そうした呼吸の乱れではない。\n発情し、ほてった体がかく汗ではない。
1278 = "Không phải là nhịp thở rối loạn do nụ hôn hay mơn trớn.\nCũng không phải là mồ hôi vã ra từ cơ thể nóng rực khi động dục."
# monologue
# JP: ポーレットの体になにか、異変が生じている。\n気づいた故に――声を、心を落ち着ける。
1498 = "Có điều gì đó bất thường đang xảy ra với cơ thể Paulette.\nNhận ra điều đó——tôi cố gắng giữ giọng điệu và tâm trí bình tĩnh."
# 【双鉄】
# display as 雙鐵
# JP: 「どうした。どこか痛むのか？\nならば、無理せず――」
972 = "「Sao vậy. Em đau ở đâu à?\nNếu thế thì đừng cố——」"
# 【ポーレット】
# display as 波萊特
# JP: 「痛む――とか――じゃ、なくっ――ンッ――ひ――\nあっ！　そ、そのっ――あの――わた、しっ――」
823 = "「Đau——hay gì đó——không, phải——ưm——hí——\nA! Ch, chuyện đó——ừm——em——」"
# 【双鉄】
# display as 雙鐵
# JP: 「聞かせてくれ。\n聞かせてくれねば、僕には助けようもない」
839 = "「Nói cho anh nghe đi.\nNếu em không nói, anh cũng chẳng biết giúp thế nào.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ――ぁ――ぉ……お……おっ……ふっ！」
910 = "「Ư——a——o……o……o……phù!」"
# monologue
# JP: 目が泳ぐ。\n僕へと助けを求め続ける。
1283 = "Ánh mắt em đảo điên.\nKhông ngừng hướng về phía tôi cầu cứu."
# monologue
# JP: だから、頷く。\n今はただ、そうする他にすべを持たない。
1438 = "Vì vậy, tôi gật đầu.\nBây giờ tôi chỉ có thể làm thế chứ chẳng còn cách nào khác."
# 【ポーレット】
# display as 波萊特
# JP: 「ふ、くっ――あっ――はっ――んんっ！\nわ……わ、たし――もれ、そっ――その――おしっ、こ」
870 = "「Phù, ư——a——hà——ưm!\nE……e, em——sắp, són——đó——t, tè」"
# 【双鉄】
# display as 雙鐵
# JP: 「おしっこ」
1019 = "「Đi tè.」"
# monologue
# JP: ポーレットの持つ忍耐力。恥じらい深さ。空気を読む力。\nにも関わらずの呼吸の荒さ息遣い。徐々に大きくなる震え。
1490 = "Sức chịu đựng của Paulette. Sự bẽn lẽn sâu sắc. Khả năng nắm bắt tình hình.\nMặc dù có tất cả những điều đó, nhịp thở của em vẫn gấp gáp. Sự run rẩy ngày càng lớn."
# monologue
# JP: つまり――猶予は殆ど無いのだ。
1193 = "Tóm lại——không còn nhiều thời gian nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「すまん。気づくのが遅れてしまった」
965 = "「Xin lỗi em. Anh nhận ra hơi muộn.」"
# monologue
# JP: （ひょいっ！？）
1712 = "（Nhấc bổng!?）"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　ええっ――えええっ！？」
900 = "「Hả!? Ơ——ơ ơ ơ!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「我慢せずとも構わない。\nここでなら、すぐに水に流せるし」
836 = "「Em không cần phải nhịn đâu.\nỞ đây thì có thể xả nước đi ngay được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いっ――いっ――いえっ――で、でも――――\nき、キッチンですし――ここ――汚したらっ」
909 = "「K——kh——không——nh, nhưng mà――――\nĐ, đây là nhà bếp mà——nếu làm bẩn chỗ này thì」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの体から出るものだ。\n汚くないから、汚れもしない。」
1030 = "「Đó là thứ tiết ra từ cơ thể Paulette mà.\nKhông hề bẩn, nên cũng sẽ không làm bẩn đâu.」"
# 【ポーレット】
# display as 波萊特
# JP: 「きっ、気持ちはすごくっ――嬉しい、です、けどっ！\nでもっ――でもっ！　でもでもでもでもっ～～！」
959 = "「T, tấm lòng của anh em rất——vui, ạ, nhưng mà!\nNhưng mà——Nhưng mà! Nhưng nhưng nhưng nhưng～～!」"
# 【双鉄】
# display as 雙鐵
# JP: 「デモもストも無いだろう。\n我慢をしすぎては体に毒だぞ」
828 = "「Không nhưng nhị gì cả.\nNhịn quá lâu sẽ sinh bệnh đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「けど、だって――んっ――双鉄、くん――のっ――\nごはん――つくって、あげ――るっ――場所、だしっ」
833 = "「Nhưng, tại vì——ưm——anh Soutetsu——à——\nLà nơi——em nấu, cơm——cho anh——ăn, mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
867 = "「Ưm」"
# monologue
# JP: 脂汗。張り付いてしまい、薄い腹筋の動きにあわせ、\n揺れて震えてしまうエプロン。
1270 = "Mồ hôi lạnh. Chiếc tạp dề dính sát vào người,\nrun rẩy theo từng chuyển động mỏng manh của cơ bụng."
# monologue
# JP: 小刻みにひっきりなしにヒクついているおまんこを見ても、\nポーレットはもう、とうに限界を超えていよう。
1210 = "Nhìn cô bé cứ co giật liên hồi từng đợt nhỏ,\ncũng đủ biết Paulette đã vượt quá giới hạn từ lâu rồi."
# 【双鉄】
# display as 雙鐵
# JP: （限界を超えてもなお我慢する――\nいや、我慢を、僕がさせてしまっているのか）
1718 = "（Đã quá giới hạn rồi mà vẫn cố nhịn——\nKhông, là do tôi ép em ấy phải nhịn sao.）"
# monologue
# JP: シンクで放尿することに、\nよもやそこまでの抵抗を覚えるものとは、思えなかった。
1385 = "Tôi không ngờ việc đi tiểu trong bồn rửa\nlại khiến em ấy phản kháng đến mức đó."
# monologue
# JP: これなら最初からトイレに連れていった方が良かったが\n……今からの移動が意味するものは、尿の拡散のみだろう。
1615 = "Nếu vậy thì ngay từ đầu đưa em ấy vào nhà vệ sinh còn hơn\n……Nhưng giờ mà di chuyển thì chắc chắn sẽ vương vãi khắp nơi."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば……ああ、これを使おう」
1040 = "「Nếu vậy……à, dùng cái này đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　ええっ――これって――これって――」
902 = "「Hả!? Ơ——Cái này——Cái này là——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ボウルだ。１００円ショップで一緒に買ったな？」
989 = "「Cái thau trộn bột. Chúng ta đã cùng mua ở cửa hàng 100 yên đúng không?」"
# monologue
# JP: ポーレットはお菓子作りが好きで、\nれいなはそれを手伝うのが好き。
1488 = "Paulette thích làm bánh,\nvà Reina thì thích giúp một tay."
# monologue
# JP: そしてれいなが夢中になれば、\nボウルは簡単にひしゃげてしまう。
1520 = "Và hễ Reina mải mê làm,\nchiếc thau sẽ rất dễ bị méo mó."
# 【ポーレット】
# display as 波萊特
# JP: 「は……はい。た、確か、に――ん！　いっつも、の、\n百円、ショッ、プの、ボウルっ――です、――けどっ！」
943 = "「V……vâng. Đ, đúng là, thế——ưm! Cái thau, ở cửa hàng, 100 yên,\nchúng ta, hay mua——ạ, ——nhưng mà!」"
# monologue
# JP: 震える唇で歯を食いしばり、とぎれとぎれにそれを解いて、\nポーレットが何とか紡いでくれる、同意の言葉に安堵する。
1487 = "Cắn chặt răng bằng đôi môi run rẩy, khó nhọc hé mở từng chút một,\nlời đồng ý mà Paulette cố gắng thốt ra khiến tôi an lòng."
# monologue
# JP: “この家では、ボウルは単なる消耗品”と、\nそれがしっかり伝わったなら、抵抗を大きく減らせる筈だ。
1231 = "\"Trong nhà này, thau trộn bột chỉ là đồ tiêu hao\",\nnếu hiểu rõ điều đó, sự phản kháng của em ấy hẳn sẽ giảm đi nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「これを使って、僕が必ず受け止めよう。\nシンクには、一滴たりともこぼさぬように」
984 = "「Dùng cái này, anh nhất định sẽ hứng lấy.\nSẽ không để vương vãi ra bồn rửa dù chỉ một giọt.」"
# 【ポーレット】
# display as 波萊特
# JP: 「け……ど――それ、でも――ボウ、ル――\nボウ、ルっ――きっと――汚しちゃ――んんっ！」
846 = "「Nhưng……mà——dù, vậy——cái, thau——\nCái, thau——chắc chắn——sẽ bị bẩn——ưm!」"
# monologue
# JP: 汗がシンクにぽたぽたと落ち、\nおまんこはもう、痙攣したように震えまくってる。
1501 = "Mồ hôi tí tách rơi xuống bồn rửa,\ncô bé đã run rẩy liên hồi như đang co giật."
# monologue
# JP: これ以上の我慢を強いてしまうのならば、\n冗談ではなく、膀胱炎に追いやってしまいかねない。
1287 = "Nếu cứ ép em ấy nhịn thêm nữa,\nkhông đùa đâu, có khi em ấy sẽ bị viêm bàng quang mất."
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。ポーレット」
996 = "「Không sao đâu. Paulette.」"
# monologue
# JP: だから、囁く。\n甘く、ゆっくり、耳元で。
1422 = "Vì vậy, tôi thì thầm.\nThật ngọt ngào, thật chậm rãi, bên tai em."
# monologue
# JP: こうすればポーレットはすぐに脱力すると、\n経験が、僕に教えてくれているから。
1325 = "Bởi kinh nghiệm mách bảo tôi rằng,\nlàm vậy Paulette sẽ lập tức thả lỏng cơ thể."
# 【双鉄】
# display as 雙鐵
# JP: 「さっきも言ったが汚れなどせん。\nポーレットの体から出るものなのだから」
979 = "「Anh đã nói rồi, không bẩn đâu.\nĐó là thứ tiết ra từ cơ thể Paulette mà.」"
# 【ポーレット】
# display as 波萊特
# JP: 「け――どっ――っ――あっ――ンッ――ふっ！\nけどぉっ！」
847 = "「Nhưng——mà——a——ưm——phù!\nNhưng mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「汚れであると、ポーレットが感じてしまうというのなら。\n僕が必ず。その汚れさえ受け止めるから」
961 = "「Nếu Paulette cảm thấy đó là thứ bẩn thỉu.\nThì anh nhất định. Sẽ hứng trọn cả sự bẩn thỉu đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
929 = "「A」"
# monologue
# JP: 吐息のような、緩んだ声。\nポーレットの目が、みるみる和らぐ。
1486 = "Giọng nói buông lỏng, tựa như một tiếng thở hắt ra.\nÁnh mắt Paulette nhanh chóng dịu lại."
# 【ポーレット】
# display as 波萊特
# JP: 「そ……双鉄、くん――が――わたしの、汚れ、を……\nおしっこ――を――」
1047 = "「A... Anh Soutetsu——sẽ——hứng, sự bẩn thỉu, của em……\nNước tiểu——sao——」"
# monologue
# JP: （ちょろっ）
1700 = "（Róc rách）"
# monologue
# JP: 迸る。\nボウルに、ほのかな振動が来る。
1507 = "Tuôn trào.\nChiếc thau truyền đến một rung động nhẹ."
# monologue
# JP: 夏の手前に、若鮎が初めて跳ねるのを目にしたような、\n瑞々しいほどの安心感が、僕の心を満たしてくれる。
1395 = "Cảm giác an tâm tươi mát như lần đầu nhìn thấy\ncá Ayu non nhảy múa lúc chớm hè, lấp đầy trái tim tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「おお」
955 = "「Ồ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「やあっ！？　『おお』と、かっ――あっ――あっ――あ、\nああっ！」
862 = "「Á!? Đừng có 'ồ'——a——a——a,\na á!」"
# monologue
# JP: （ちょっ――ちょおおおおおおおっ）
1699 = "（Róc——róc rách róc rách róc rách）"
# monologue
# JP: 意識はどうあれ、\n体の方が歯止めを外してくれたのだろう。
1485 = "Bất kể ý thức thế nào,\ncó lẽ cơ thể em ấy đã tự tháo gỡ rào cản rồi."
# monologue
# JP: ボウルに尿が溜まり始めて、\nそれはすぐさまパチャパチャと音を立て弾み始める。
1539 = "Nước tiểu bắt đầu đọng lại trong thau,\nvà ngay lập tức phát ra những tiếng lách tách bắn lên."
# 【ポーレット】
# display as 波萊特
# JP: 「あっ、や！　止まら、なっ――ふっ――あ、見ないで！見ないでください、双鉄く、んっ――あっ――んうっ！」
927 = "「A, á! Không dừng, được——phù——a, đừng nhìn! Đừng nhìn em mà, anh Soutetsu——a——ưm!」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、見ずには受け止められぬ」
976 = "「Nhưng nếu không nhìn thì sao anh hứng được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「は……やっ……恥ずか……しぃ……よぉ……は、あ――\nおし、っこ――おしっこ――早く……とまってぇ」
880 = "「Hà……á……xấu hổ……quá……anh ơi……hà, a——\nT, tè——đi tè——mau……dừng lại đi」"
# monologue
# JP: （ちょおおおおおおおおおおおっっ）
# 1699 = "（嘩啦啦）" 
# monologue
# JP: ボールの水面は高くなり、しぶきは最早、\nポーレットの体にさえも跳ね返っている。
1538 = "Mực nước trong thau dâng cao, những bọt nước văng tung tóe\nthậm chí còn bắn ngược lên cơ thể Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……あっ――あっ……やぁ……やだ……やぁだぁっ」
921 = "「A……a——a……á……không chịu……không chịu đâu」"
# monologue
# JP: ボウルの重みと温度とが増す。尿の匂いと色が濃くなる。\n同時に――僕の焦りの色も。
1537 = "Sức nặng và nhiệt độ của chiếc thau tăng lên. Mùi và màu của nước tiểu đậm dần.\nĐồng thời——sự sốt ruột của tôi cũng vậy."
# 【双鉄】
# display as 雙鐵
# JP: （まずいな――このままでは溢れかねんぞ）
1732 = "（Nguy rồi——Cứ thế này thì tràn ra mất.）"
# monologue
# JP: 最悪を常に想定し、最善の準備を整える。
1370 = "Luôn lường trước tình huống xấu nhất, chuẩn bị kỹ lưỡng cho giải pháp tốt nhất."
# monologue
# JP: それが理想と理解しているつもりだが、\nしかし、流石にこの状況への即応策は――――むっ！
1605 = "Tôi cứ tưởng mình đã hiểu rõ đó là lý tưởng,\nnhưng quả thực với tình huống này thì làm sao mà ứng phó kịp――――hửm!"
# monologue
# JP: （ちょっ――ちょろっ――……ちょっ……ぽちょん）
1721 = "（Róc——róc rách——……róc……tỏng）"
# monologue
# JP: 尿の勢いが大きく減じ、水のベールに覆われていた\n尿道口が、雫を垂らしているのが見える。
1313 = "Dòng nước tiểu đã yếu đi nhiều, lỗ niệu đạo\nvốn bị màn nước che phủ giờ chỉ còn nhỏ từng giọt."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……ふぁ……あっ……しちゃ……った……おし、っこ。\nわたし……双鉄、くんの――目の、前――――でっ」
920 = "「A……phù……a……em tè……mất……rồi.\nEm……ngay trước, mặt——anh Soutetsu――――」"
# monologue
# JP: （……ちょっ…………ぴゅるっ――――）
# 1721 = "（滴答……滴答……）" 
# monologue
# JP: 尿が、止まった。\nけれど、ポーレットはまだ濡れている。
1434 = "Nước tiểu đã ngừng.\nNhưng Paulette vẫn còn ướt sũng."
# monologue
# JP: 青い瞳が、完全にうるんでしまってる。\nこのまま放置をしたならば、恐らく泣いてしまうだろう。
1286 = "Đôi mắt xanh biếc đã ngấn lệ hoàn toàn.\nNếu cứ để mặc thế này, có lẽ em ấy sẽ khóc mất."
# 【ポーレット】
# display as 波萊特
# JP: 「し、ちゃった……け、ど。わたし……わたし――だって\n――だって、双鉄、くんっ――がっ――」
1046 = "「T, tè mất rồi……nhưng, mà. Em……em——tại vì\n——tại vì, anh Soutetsu——đã bảo——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
946 = "「Ừ.」"
# monologue
# JP: そうだった――\n僕は、ポーレットと約束している。
1450 = "Phải rồi——\nTôi đã hứa với Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「よく頑張ったな、ポーレット」
1026 = "「Em đã cố gắng lắm rồi, Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
914 = "「A……」"
# monologue
# JP: 中身を決してこぼさぬようにボウルをどけて。\n自由になった指を伸ばして――
1364 = "Cẩn thận đặt chiếc thau sang một bên để không làm đổ thứ bên trong.\nRồi vươn những ngón tay giờ đã rảnh rỗi ra——"
# 【ポーレット】
# display as 波萊特
# JP: 「んうっ――」
936 = "「Ưm——」"
# monologue
# JP: 太ももの、一番やわらかいところ。\nもう何センチかずれたなら、股間になってしまう場所。
1352 = "Nơi mềm mại nhất của bắp đùi.\nChỉ chệch đi vài phân nữa thôi là sẽ chạm đến háng."
# monologue
# JP: そこを拭って雫をすくい……\nどうしたものかと、しばし考え。
1411 = "Lau chỗ đó và hứng lấy những giọt nước đọng lại……\nTôi ngẫm nghĩ một chút xem nên làm gì."
# 【双鉄】
# display as 雙鐵
# JP: （ぱくっ！）
1690 = "（Ngoạm!）"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！！！」
935 = "「!!!」"
# monologue
# JP: これが正解なのだろう。
1532 = "Đây hẳn là câu trả lời chính xác."
# monologue
# JP: ポーレットのあの青くて深く澄んだ瞳が、\n朝陽を浴びた湖のごとく、これほどキラキラ輝くのだから。
1499 = "Bởi vì đôi mắt xanh sâu thẳm, trong veo của Paulette,\nđang lấp lánh rạng rỡ như mặt hồ tắm mình trong nắng sớm."
# 【ポーレット】
# display as 波萊特
# JP: 「……そう、てつ――くん……受け止めてくれる、って\n――やっぱり――そう、いう……んっ！」
639 = "「……Anh, Soutetsu……bảo sẽ hứng trọn\n——Quả nhiên——là, ý đó……ưm!」"
# monologue
# JP: 鼻にかかった甘い声。\n熱い呼吸と、汗と体温。
1496 = "Giọng nói ngọt ngào xen lẫn tiếng thở dốc.\nHơi thở nóng rực, cùng mồ hôi và thân nhiệt."
# monologue
# JP: 僕が尿を掬って舐めたそのことで、\nポーレットの示していた緊張は、はっきり発情に変化した。
1345 = "Việc tôi hứng lấy nước tiểu của em và liếm nó,\nđã biến sự căng thẳng của Paulette thành cơn động dục rõ rệt."
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
631 = "「…………」"
# monologue
# JP: ほんの思いつきだとは流石に言えず、\nけれども嘘をつきたくもなく――ならば行動で示す他無い。
1347 = "Tôi cũng không thể nói rằng đây chỉ là ý định nhất thời,\nnhưng tôi cũng không muốn nói dối——Vậy thì chỉ còn cách chứng minh bằng hành động."
# monologue
# JP: （しにゅっ――ぺろっ）
1728 = "（Chụt——liếm）"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……ま、た――ンッ――そんな……あっ――優、しく\n――は、んっ――てい、ねい――にっ――ふぅんっ！」
915 = "「A……lại, nữa——ưm——như thế……a——thật, dịu dàng\n——hà, ưm——cẩn, thận——quá——phù ưm!」"
# monologue
# JP: 拭って、舐めて、また拭う。\n跳ねた雫の、一滴たりと残さぬように。
1410 = "Lau đi, liếm lấy, rồi lại lau đi.\nKhông để sót lại dù chỉ một giọt nước bắn lên."
# monologue
# JP: ほんの数滴ずつの尿だが、繰り返すたび、時間がたつほど、\n塩気に混じり、強い渋みが口内を濃く染め始める。
1619 = "Dù mỗi lần chỉ vài giọt nước tiểu, nhưng khi lặp đi lặp lại, thời gian càng trôi qua,\nvị chát mạnh lẫn với vị mặn bắt đầu nhuốm đậm khoang miệng tôi."
# 【双鉄】
# display as 雙鐵
# JP: （これは――口直しが必要だな）
1711 = "（Thế này thì——cần phải đổi vị thôi.）"
# 【ポーレット】
# display as 波萊特
# JP: 「は……ぁ……んっ――ふぅ……ふぅ……ふぁ」
884 = "「Hà……a……ưm——phù……phù……phù」"
# monologue
# JP: 尿はほとんど拭えたはずだ。尿意の我慢も無いはずだ。
1366 = "Nước tiểu đã được lau sạch gần hết. Cảm giác nhịn tiểu chắc cũng không còn nữa."
# monologue
# JP: なのにまだ、ポーレットのおまんこは甘やかに濡れ、\nふるふると、悩ましげにその身をふるわせている。
1203 = "Vậy mà, cô bé của Paulette vẫn ướt át ngọt ngào,\nrun rẩy đung đưa cơ thể một cách đầy gợi tình."
# 【双鉄】
# display as 雙鐵
# JP: （……というか――これは。こんなにもいやらしい格好を、\n僕は、ポーレットに取らせていたのか）
1634 = "（……Nói mới nhớ——Chuyện này. Tôi đã để Paulette\nphải bày ra một tư thế dâm đãng đến thế này sao.）"
# monologue
# JP: 全身にびっしり浮く汗が、ぽとり、とシンクに落ち跳ねる。
1268 = "Những giọt mồ hôi rịn đầy trên toàn thân, thánh thót, rơi xuống bồn rửa."
# monologue
# JP: 蜜はとろとろ、おまんこから腿へ尻へと伝わって、\nポーレットの熟した体を、艶と潤いとで彩っていく。
1581 = "Mật ngọt sền sệt, chảy từ cô bé xuống đùi, xuống mông,\ntô điểm cho cơ thể chín mọng của Paulette bằng sự quyến rũ và ướt át."
# 【双鉄】
# display as 雙鐵
# JP: 「……言っていたな。さっき。\nここは、僕のためにごはんを作ってくれるところだと」
635 = "「……Lúc nãy, em có nói nhỉ.\nĐây là nơi em nấu cơm cho anh ăn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ふぇ？　――あ！　はいっ！　はいっ！！」
903 = "「Hả? ——A! Vâng! Vâng!!」"
# monologue
# JP: どこかぼやけていた声が、理解の光に晴れ渡る。
1275 = "Giọng nói có phần mơ hồ bỗng bừng sáng lên vì hiểu ra ý tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし、食べて――それから、飲んで、欲しいです。\n双鉄くんの――欲しい、ものなら……おなか、いっぱい」
1042 = "「Em muốn anh, ăn——rồi sau đó, uống em đi.\nNhững thứ——anh Soutetsu, muốn……cứ ăn cho thật, no bụng」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、遠慮無く――」
1045 = "「Vậy thì, anh không khách sáo đâu nhé——」"
# monologue
# JP: （ずちゅううっ！！！！）
1722 = "（Mútttttttt!!!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうんっ！」　ふあっ――そ、双鉄――くんっ！\nんぅうううっ！！！」
852 = "「Hyaun!」 Phù——a, anh Soutetsu——!\nƯm ư ư ư!!!」"
# monologue
# JP: 上半身を折りたたみ、\n伸ばした舌を、ポーレットの股間に隙無く貼り付ける。
1376 = "Gập người xuống,\ntôi thè lưỡi áp chặt vào háng Paulette không để lọt khe hở nào."
# monologue
# JP: （ぴちゃっ――ぬちゃっ――にちゃっ――れるっ――）
1726 = "（Lách tách——nhóp nhép——nhóp nhép——liếm——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふ、ぅっ――ぃ、ぁっ――舐め、てるっ――おまん、こ、\n双鉄、くん、が――ぁっ！　おしっこ――おまん、こぉ」
899 = "「Phù, ư——í, a——đang, liếm——cô bé,\nAnh Soutetsu, đang——a! Cô bé——vừa mới, tè xong——mà」"
# monologue
# JP: おしっこおまんこ。確かにだ。\n舌に真っ先乗ってきたのは、より強烈な尿の味。だが――
1452 = "Cô bé vừa đi tiểu. Đúng là vậy.\nThứ xộc thẳng lên lưỡi đầu tiên là vị nước tiểu nồng đậm hơn. Nhưng——"
# monologue
# JP: （ちゅるう！　ちゅっ！　ぢゅずずっ！　れろおおっ！）
1723 = "（Chụt! Chu! Sụtttt! Liếmmmmm!）"
# 【ポーレット】
# display as 波萊特
# JP: 「舌っ――んっ！　ふ、あっ――入って――ぬるって！\nわたしの、おまんこ――[なか,1]膣内、[すす]啜られて、んうぅっ！！」
1015 = "「Lưỡi——ưm! Phù, a——vào rồi——trơn tuột!\nCô bé, của em——bên trong âm đạo, bị húp trọn, ưm!!」"
# monologue
# JP: 舌を伸ばして割りいれば、\nポーレットの膣内は熱く蕩けてなお、ぷりぷりだ。
1381 = "Khi tôi thè lưỡi chẻ vào trong,\nâm đạo của Paulette nóng hổi tan chảy nhưng vẫn rất mềm mại."
# monologue
# JP: そのせいなのか、浅く感じる肉ヒダを、\n丁寧に丁寧に舌で拭って、洗うようにして蜜を舐めとる。
1560 = "Có lẽ vì thế mà những nếp gấp thịt có cảm giác nông hơn,\ntôi dùng lưỡi cẩn thận lau chùi, liếm sạch mật ngọt như đang rửa ráy."
# 【ポーレット】
# display as 波萊特
# JP: 「やっ――ふっ――ふあっ――あっ！　おまん、こっ――\nとけるっ――ぺろぺろ、され、て――とろけ、ちゃうっ」
848 = "「Á——phù——phù——a! Cô bé——\nTan chảy——bị, liếm láp——sắp tan chảy, mất rồi」"
# monologue
# JP: 尿の味はもう、舌の上から消え去っている。
1572 = "Vị nước tiểu đã hoàn toàn biến mất khỏi đầu lưỡi."
# monologue
# JP: おまんこが溶けたといっても過言ではない濃さと量との\n愛液に、舌が、口が、脳の全てが染められていく。
1261 = "Độ đặc và lượng ái dịch nhiều đến mức nói cô bé tan chảy cũng không ngoa,\nnó đang nhuộm đẫm lưỡi, miệng và toàn bộ tâm trí tôi."
# monologue
# JP: （ぺろっ！　れるっ！　れろおっ！　ぬろおおおっ――）
1696 = "（Liếm! Liếm! Liếmmmm! Trơn tuộtttttt——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃきゅ！　くっ――んっ――やっ――優し、ふあっ！\n――きもち、い――キス、キスっ――双鉄、くん、の！」
854 = "「Hyakyu! Ư——ưm——á——thật dịu dàng, phù!\n——Sướng, quá——hôn, nụ hôn——của anh, Soutetsu!」"
# monologue
# JP: キス――と言われて、そうかと気づく。\nこれもまた、ポーレットとディープキスだと。
1289 = "Hôn——Nghe em nói vậy, tôi mới chợt nhận ra.\nĐây cũng là một nụ hôn sâu với Paulette."
# monologue
# JP: ならば、唾液と唾液を交換しあうときと同じく――
1614 = "Nếu vậy, cũng giống như khi trao đổi nước bọt cho nhau——"
# monologue
# JP: （チュルッ――にゅっ――ぬる――にゅろおっ）
# 1696 = "（啾嚕——啾嚕——咕啾——咕啾）" 
# 【ポーレット】
# display as 波萊特
# JP: 「や！　あっ――やわらかっ――んっ――んあっ！\nぬめっ、って――あったか――ふっ、きゅっ――ふうっ」
856 = "「Á! A——mềm quá——ưm——ưm a!\nTrơn tuột——ấm quá——phù, siết——phù」"
# monologue
# JP: ――舌の全部をべったり這わせて、\n膣の内部に僕の唾液をなすり込んでく。
1382 = "——Tôi dùng toàn bộ lưỡi trườn qua lại,\nbôi trét nước bọt của mình vào sâu trong âm đạo."
# monologue
# JP: そうして同時に蜜を掬って、\nキスの濃度と密度を上げる。
1236 = "Đồng thời hứng lấy mật ngọt,\nlàm tăng thêm độ đậm đặc và sự mãnh liệt của nụ hôn."
# monologue
# JP: （べろっ――れろっ――るっ――れるるるっ）
# 1726 = "（舔來舔去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ――双鉄、くんっ――んっ――\nあっっ――くっ――ふあっ――あっ――あんっ」
886 = "「Phù——a——anh Soutetsu——ưm——\nA——ư——phù——a——a」"
# monologue
# JP: ポーレットの腰がもじもじ揺れる。\n心地よさげに――けれどもどこか、焦れったそうに。
1494 = "Hông Paulette lắc lư bồn chồn.\nTrông có vẻ dễ chịu——nhưng cũng có chút gì đó sốt ruột."
# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ！」
893 = "「Phù!」"
# monologue
# JP: 舌にも、いささかの疲れが来ている。\nあるいは手指で、このまま愛撫を続けても良いが――
1398 = "Lưỡi tôi cũng đã thấm mệt.\nHay là cứ dùng ngón tay tiếp tục âu yếm thế này cũng được——"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……双鉄、くん――んっ――双鉄、くんも……\n今にも……おもらし……しちゃい、そうっ――」
925 = "「A……anh Soutetsu——ưm——anh Soutetsu cũng……\nTrông như……sắp……tè dầm, đến nơi, rồi——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
985 = "「Ừ——」"
# monologue
# JP: 潤みに青を深くしている瞳がまっすぐ捉えている。\nズボンの下の僕の勃起を――もうガチガチのこわばりを。
1491 = "Đôi mắt xanh thẳm ngấn nước đang nhìn chằm chằm.\nVào dương vật cương cứng dưới lớp quần của tôi——giờ đã cứng đờ như đá."
# 【ポーレット】
# display as 波萊特
# JP: 「おもらし……ここ、で――」
1021 = "「Tè dầm……ở đây, đi——」"
# monologue
# JP: 脱力をしてしまっているのか、ポーレットの体は動かない。\nけれども、声が、熱が、温度が、ここがどこかを示してる。
1502 = "Có lẽ do đã mất hết sức lực, cơ thể Paulette không hề nhúc nhích.\nNhưng, giọng nói, sức nóng, nhiệt độ, tất cả đều chỉ rõ nơi này là đâu."
# monologue
# JP: 今はゆるやかなヒクつきと、中から溢れ続ける蜜が、\nなまじ大きく開くより、甘やかに僕を誘い続ける。
1524 = "Lúc này, những nhịp co giật nhẹ nhàng cùng mật ngọt không ngừng trào ra từ bên trong,\ncòn quyến rũ tôi ngọt ngào hơn cả việc mở rộng dang chân ra."
# 【ポーレット】
# display as 波萊特
# JP: 「わた、しの――おまん、こ――膣で、子宮、で――精液、\nびゅうびゅう――たくさん、おもらし――して、下さい」
1023 = "「Vào cô bé——của em——vào âm đạo, vào tử cung——\nHãy tè dầm——thật nhiều, tinh dịch——vào trong em, đi ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 946 = "「嗯」" 
# monologue
# JP: 抱き上げ、キスして、床に立たせる。
1373 = "Bế bổng lên, hôn một cái, rồi để em ấy đứng trên sàn."
# monologue
# JP: 服を脱ぐ自分の指さえもどかしい。\nベッドまで移動する時間も惜しい。
1610 = "Ngay cả những ngón tay cởi quần áo cũng thấy lóng ngóng.\nThời gian di chuyển đến giường cũng thật phí phạm."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……双鉄くぅん」
1048 = "「Anh Soutetsu……Anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！」
1002 = "「Paulette!」"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？」
860 = "「Á!?」"
# monologue
# JP: 体と心の求めるままに、ポーレットの足を抱き上げる。
1418 = "Thuận theo khao khát của thể xác và tâm hồn, tôi ôm lấy đôi chân Paulette nâng lên."
# monologue
# JP: 弾みでバランスを崩しかけたポーレットの手が、\n支えを求めてシンクに落ち着く。
1482 = "Mất thăng bằng theo đà, tay Paulette\ntìm điểm tựa và bám chặt vào bồn rửa."
# 【双鉄】
# display as 雙鐵
# JP: 「っと……姿勢、キツいか？」
866 = "「Úi……Tư thế này, có khó chịu không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ううん、双鉄くん」
827 = "「Không đâu, anh Soutetsu.」"
# monologue
# JP: ポーレットが僅かに首を振る。\nずれたエプロンに強調されたたわわな胸も甘く震える。
1504 = "Paulette khẽ lắc đầu.\nBộ ngực căng đầy được tôn lên bởi chiếc tạp dề xộc xệch cũng rung lên ngọt ngào."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
1001 = "「Paulette」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――んっ……」
911 = "「A——ưm……」"
# monologue
# JP: 今度のキスは、双方向だ。
1607 = "Nụ hôn lần này, là từ cả hai phía."
# 【ポーレット】
# display as 波萊特
# JP: 「んっ……ちゅっ――ちゅむっ――ちゅうう――ちゅっ\n――ぷ、あっ――ん――れろっ――れるっ――れろおっ」
942 = "「Ưm……chụt——chu——chụtttt——chụt\n——Phù, a——ưm——liếm——liếm——liếmmmm」"
# monologue
# JP: ポーレットの方から舌を、僕の口内にねじ込んでくる。
1483 = "Từ phía Paulette, chiếc lưỡi của em luồn lách vào khoang miệng tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……むっ――んっ――れるっ――えろぉっ――ン\n――ちゅっ――ちゅるっ――はむっ――れるうっ」
924 = "「A……ngoạm——ưm——liếm——liếmmmm——ưm\n——Chụt——chụt——ngoạm——liếmmmm」"
# monologue
# JP: 唾液が流れ込んできて、舌へと舌が抱きついてくる。\n吸われ引かれて舌を伸ばせば、唇が舌を挟んで扱く。
1281 = "Nước bọt chảy vào, lưỡi quấn lấy lưỡi.\nBị mút mát lôi kéo, tôi vươn lưỡi ra, đôi môi em liền kẹp lấy và tuốt dọc theo lưỡi tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「んーむっ――ちゅ――はむ――ちゅるっ――ちろ、\nちるる――れろっ――れるうっ――」
938 = "「Ưm——chụt——ngoạm——chụt——liếm,\nliếm——liếm——liếmmmm——」"
# monologue
# JP: 唇に甘くホールドされたそのままに、舌先だけを、\nちょんちょんちょんちょんくすぐるように[ついばま]啄まれる。
1276 = "Giữ chặt lấy môi tôi một cách ngọt ngào, chỉ riêng đầu lưỡi,\nem mổ nhẹ liên hồi như đang cù lét."
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
905 = "「っ!」"
# monologue
# JP: （すりっ――くちゅっ――ずりっ――ぐいっ）
1729 = "（Cọ xát——nhóp nhép——cọ xát——dập）"
# monologue
# JP: そして同時に、勃起も熱くこすられる。
1566 = "Và đồng thời, dương vật cương cứng cũng bị cọ xát nóng rực."
# monologue
# JP: もうとろとろのポーレットのおまんこの柔肉は、\n僕の勃起に張り付きながら、幾度も幾度も前後する。
1503 = "Phần thịt mềm mại của cô bé Paulette đã tan chảy sền sệt,\nbám dính lấy dương vật tôi, trượt lên trượt xuống hết lần này đến lần khác."
# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ――あっ……ポーレット」
888 = "「Phù——a……Paulette」"
# monologue
# JP: キスをほどいて、僕の方からも腰を動かす。
1432 = "Dứt khỏi nụ hôn, tôi cũng bắt đầu chuyển động hông."
# monologue
# JP: いくども重なり合ってる肌は、\nお互い同士を、吸い付くように求め合う。
1355 = "Làn da đã bao lần quấn lấy nhau,\nđang khao khát tìm đến nhau như muốn hút chặt lấy nhau."
# monologue
# JP: （ぐッ――ぐりゅっ――くっ――んっ――）
1733 = "（Hự——ngoáy——ư——ưm——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ――あっ――焦らし、ちゃ――\nやぁ――ですっ――んううっ――あっ！」
849 = "「Hya——a——đừng trêu chọc, em——\nNữa——mà——ưm——a!」"
# monologue
# JP: だが、焦らす。亀頭のくびれの裏を使って、\nクリトリスの、あえて根の部分。
1515 = "Nhưng tôi vẫn trêu chọc. Dùng phần rãnh quy đầu,\ncố tình cọ vào phần gốc của âm vật."
# monologue
# JP: 珠へと繋がる膨らみを、幾度も幾度も縦になぞって\n勃起の熱と匂いと汁とを染み込ませていく。
1391 = "Trượt dọc theo phần phồng lên nối với hạt ngọc hết lần này đến lần khác,\nđể truyền hơi nóng, mùi hương và chất dịch của dương vật vào đó."
# 【ポーレット】
# display as 波萊特
# JP: 「は……ぁっ――ンッ――ふあっ――あっ――\nこれ……好きっ――んっ――くっ――ぁ――はぁ」
883 = "「Hà……a——ưm——phù——a——\nThế này……thích lắm——ưm——ư——a——hà」"
# monologue
# JP: 青い瞳が、快感の波に揺れている。\n少し濁ったこの色は、世界で僕だけが知る美しさだ。
1500 = "Đôi mắt xanh biếc đang rung rinh trong làn sóng khoái cảm.\nMàu sắc hơi đục này, là vẻ đẹp mà trên thế giới này chỉ mình tôi biết."
# 【双鉄】
# display as 雙鐵
# JP: 「何が……どうして、――好き、なのだ？」」
838 = "「Em thích……cái gì, cơ?」」"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――うっ」
931 = "「Hà——ư」"
# monologue
# JP: 問えば、恥入り言葉に詰まる。\nけれど、必ず。必ずだ。
1416 = "Khi được hỏi, em ấy ngượng ngùng ấp úng.\nNhưng, chắc chắn. Chắc chắn là vậy."
# monologue
# JP: ポーレットはその責任感から、\n蕩けた声で――僕の望んでる答えをくれる。
1484 = "Vì tinh thần trách nhiệm của mình,\nPaulette sẽ dùng giọng điệu ngọt lịm——để đưa ra câu trả lời mà tôi mong đợi."
# 【ポーレット】
# display as 波萊特
# JP: 「こしゅっ――こしゅ――される、と……んっ――\n気持ち、いいの、が――たまる――みたい、でっ」
1017 = "「Bị cọ xát——cọ xát, thế này……ưm——\nCảm giác, sướng——như được, tích tụ——lại, vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「気持ちいいのが、いったいどこに、溜まるのだ？」
970 = "「Cảm giác sướng ấy, rốt cuộc là tích tụ ở đâu cơ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「くり……とり、す――からッ――」
967 = "「Từ âm……vật——」"
# monologue
# JP: （ぬるんんっ！）
1739 = "（Trơn tuột!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
904 = "「っ!」"
# monologue
# JP: 確かめるようにポーレットの腰が押し返してくる。
1505 = "Hông Paulette đẩy ngược lại như để xác nhận."
# monologue
# JP: 裏筋を陰核突起に刺激され、殆ど漏れかけてしまった声を、\nすんでのところで飲んで堪える。
1223 = "Phần gân nhạy cảm bị âm vật kích thích,\ntôi suýt nữa đã thốt ra tiếng rên, đành phải nuốt ngược vào trong để kìm nén."
# 【ポーレット】
# display as 波萊特
# JP: 「クリトリス――から――つたわ、って……ふっ――\nおまん、こ――の、奥――子宮、に――たま、って」
968 = "「Từ âm vật——truyền, vào……phù——\nSâu bên trong——cô bé——vào tử cung——tích tụ, lại」"
# monologue
# JP: （ぐいっ！）
1717 = "（Thóp bụng!）"
# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁっ――」
# 936 = "「嗯——」" 
# monologue
# JP: 下腹が、ここだといわんばかりに凹み、またふくらむ。\nその振動がまた伝わって、勃起も更に暴れてしまう。
1273 = "Bụng dưới thóp lại như muốn nói 'là ở đây này', rồi lại phồng lên.\nSự rung động đó truyền đến, khiến dương vật càng thêm cuồng bạo."
# 【ポーレット】
# display as 波萊特
# JP: 「はうっ！　んっ……きもち、いい、のが――子宮に、\nたまって――精液、ほし、くて――溶かされ、たく、て」
897 = "「Hau! Ưm……cảm giác, sướng——tích tụ, trong tử cung——\nThèm muốn, tinh dịch——muốn, bị làm cho, tan chảy」"
# 【双鉄】
# display as 雙鐵
# JP: 「！！！」
1053 = "「!!!」"
# monologue
# JP: 声が鼓膜から流れ落ち、僕の精液を増産してく。\n睾丸は、もうぱんぱんに溜まりきってる。
1284 = "Giọng nói lọt qua màng nhĩ, thúc đẩy quá trình sản xuất tinh dịch trong tôi.\nTinh hoàn đã căng cứng, chứa đầy tinh dịch."
# monologue
# JP: 射精したい。ポーレットの中に思い切り。\n思いは自然、腰の動きに変化を強いる。
1362 = "Muốn xuất tinh. Vào sâu bên trong Paulette.\nÝ nghĩ ấy tự nhiên thúc ép chuyển động của hông thay đổi."
# monologue
# JP: （くっ――ちっ――くっ――りゅっ）
# 1729 = "（蹭來蹭去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あっ！　んっ……先――ぽっ――\nぐりゅ、って――入り口――の、と、こっ――んっ」
876 = "「Hà——a! Ưm……đầu——dương vật——\nNgoáy——ngay chỗ, cửa——vào——ưm」"
# monologue
# JP: ポーレットの腰が動いてしまう。\n抱いてる僕も、立っているゆえどうにも安定感が出ん。
1497 = "Hông Paulette cũng chuyển động theo.\nVì tôi đang đứng ôm em ấy nên tư thế không được vững vàng cho lắm."
# monologue
# JP: （にゅっ――るっ――ぬるっ――にゅるんっ！）
# 1729 = "（蹭來蹭去）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ん……くっ――ふあっ――あっ！　ちがっ――\nそこっ！　んっ――やぁ――なの――焦れっ――たい」
940 = "「Ưm……ư——phù——a! Không phải——\nChỗ đó! Ưm——ghét——quá——sốt ruột——quá」"
# monologue
# JP: 求め合い、吸い付きあうのに、いつものピタリといかない。
1354 = "Rõ ràng là khao khát nhau, bám chặt lấy nhau, nhưng lại không thể khớp hoàn hảo như mọi khi."
# monologue
# JP: それが快感を高めもするが、僕とてあまりにもどかしく、\n余計に腰が暴れてしまう。
1606 = "Điều đó làm tăng thêm khoái cảm, nhưng với tôi thì lại quá đỗi bức bối,\nkhiến hông tôi càng trở nên cuồng bạo hơn."
# monologue
# JP: （ぬるっ！　るっ――りゅっ！　るぬんっ！！）
1720 = "（Trơn tuột! Tuột——tuột! Trơn tuột!!）"
# monologue
# JP: 愛液、僕の先走り。\n豊富にすぎる潤滑油たちが、今このときは恨めしい。
1339 = "Ái dịch, chất nhờn rỉ ra từ tôi.\nLượng dầu bôi trơn quá dồi dào lúc này lại trở nên đáng ghét."
# monologue
# JP: どうにか――どうにか腰を落ち着けないことには、\n摩擦で射精をしかねぬほどに気持ち良すぎる。
1253 = "Bằng cách nào đó——nếu không thể giữ hông ổn định,\nchỉ riêng sự ma sát thôi cũng sướng đến mức có thể xuất tinh mất."
# 【ポーレット】
# display as 波萊特
# JP: 「ね？　ね……双鉄、くん――いいこ、して？」
1038 = "「Này? Này……anh Soutetsu——ngoan, đi nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「！！？」
1054 = "「!!?」"
# monologue
# JP: これほどぬめる汗と雫と。止まることなど出来無い腰と。\n発情しきった雌の体温と体臭を溢れさせ。
1489 = "Mồ hôi và những giọt nước nhễ nhại đến nhường này. Chiếc hông không thể dừng lại.\nCùng thân nhiệt và mùi hương của một con cái đang động dục tràn trề."
# monologue
# JP: 完全に上ずった声でそれでもなお、\nポーレットは、僕を落ち着けようと――
1495 = "Bằng một giọng điệu hoàn toàn hưng phấn, thế nhưng,\nPaulette vẫn cố gắng làm tôi bình tĩnh lại——"
# 【ポーレット】
# display as 波萊特
# JP: 「おちん、ちん――ふ、あっ――ね？――落ち着いて――ンッ――いいこ、いいこ――で――入線、しよ――ね？」
1050 = "「Dương, vật——phù, a——nhé?——Bình tĩnh lại nào——ưm——ngoan, ngoan——rồi——tiến vào ga, nhé——được không?」"
# monologue
# JP: ――ああ、いや。そうか。つまりは、これも運転だ。\n僕とポーレットとの間には、すでに路線が結ばれてるのだ。
623 = "——À, không. Ra là vậy. Tóm lại, đây cũng là một cuộc hành trình.\nGiữa tôi và Paulette, tuyến đường đã được kết nối từ lâu rồi."
# 【双鉄】
# display as 雙鐵
# JP: （そうだ……そうだった）
1709 = "（Đúng rồi……Là vậy đấy.）"
# monologue
# JP: 幾度も重なりあってる柔肌で、幾度も抉ってる膣口だ。\n慣れぬ姿勢が、それをどれほど新しいものと感じさせても。
1365 = "Làn da mềm mại đã quấn lấy nhau vô số lần, cửa mình đã bị ngoáy sâu vô số bận.\nDù tư thế lạ lẫm này có mang lại cảm giác mới mẻ đến nhường nào đi chăng nữa."
# monologue
# JP: 理解をすれば、この体勢でもはっきり見える。\n加速の必要などまるでない。今すべきことは緩制動で――
1234 = "Khi đã hiểu ra, dù ở tư thế này cũng có thể thấy rõ.\nHoàn toàn không cần phải tăng tốc. Việc cần làm bây giờ là hãm phanh từ từ——"
# 【ポーレット】
# display as 波萊特
# JP: 「ゆっくり――ゆっく、りっ――いいこ、いいこ、で――\nおまんこっ、ここ、で――待ってる、から――はうっ！」
974 = "「Từ từ——từ, từ——ngoan nào, ngoan nào——\nCô bé, ở đây——đang đợi, anh——hau!」"
# monologue
# JP: （つぷっ！！）
1701 = "（Phụt!!）"
# monologue
# JP: 誘導されて、落ち着いて。\nいつものように、亀頭の全部が膣の中へと押し入っていく。
1250 = "Được dẫn dắt, bình tĩnh lại.\nNhư mọi khi, toàn bộ quy đầu từ từ tiến sâu vào trong âm đạo."
# monologue
# JP: 包み込まれる圧迫感と安心感。\nそうして、肉の蠢きが――
1226 = "Cảm giác bị áp bức và an tâm khi được bao bọc.\nVà rồi, sự ngọ nguậy của da thịt——"
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
932 = "「Kua!」"
# monologue
# JP: 加速する。加速を体が強いてくる！\n落ち着いてなど、とてもいられるわけがないっ！！
1414 = "Tăng tốc. Cơ thể ép buộc phải tăng tốc!\nLàm sao mà bình tĩnh cho nổi chứ!!"
# monologue
# JP: （ずっ――ずりゅっ――ぬっ――にゅぶうっ――）
1694 = "（Phập——nhóp——rút——nhép——）"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あっ――来たっ、来てるっ――んっ！\n双鉄、くんの――熱い、の――太い、のっ――」
875 = "「Hà——a——đến rồi, đến rồi——ưm!\nCủa anh Soutetsu——nóng, quá——to, quá——」"
# monologue
# JP: むちむちしているおまんこ肉は、\nむちむちしながら、決して僕を押し出そうとは動かない。
1595 = "Phần thịt cô bé căng mọng,\ndù căng mọng nhưng tuyệt nhiên không hề cử động để đẩy tôi ra."
# monologue
# JP: （ぬるっ――にゅるっ――ぬっ――ぬとおおおっ――）
1725 = "（Trơn tuột——trơn tuột——rút——nhóp nhép——）"
# monologue
# JP: 舐めてたときには浅く感じてた肉襞が、\nけれども勃起で密着すると、こうも的確に責め立ててくる。
1215 = "Những nếp gấp thịt khi liếm có cảm giác nông,\nnhưng khi tiếp xúc gần với dương vật cương cứng, lại tấn công một cách chính xác đến vậy."
# monologue
# JP: （ずっっ！　ずぶっ！　にゅるうっ！　ずぼおっ！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 
# 【ポーレット】
# display as 波萊特
# JP: 「かっ――ふあっ――おな、か――おまん、こっ――\nんっ――これ――すご――えぐれ――てっ――ふあっ！」
906 = "「A——phù——bụng——cô bé——\nƯm——thế này——tuyệt quá——bị ngoáy sâu——vào——phù!」"
# monologue
# JP: そうだ。まさしく抉ってる。\nポーレットのおまんこの肉を、膣内を。
1451 = "Đúng vậy. Chính xác là đang ngoáy sâu.\nVào phần thịt cô bé của Paulette, vào bên trong âm đạo."
# monologue
# JP: 亀頭で刺して抉り侵して――それでも膣の柔肉は、\n密着しながらざわめき動き、奥へ、奥へと僕を誘う。
1392 = "Đâm sâu, ngoáy mạnh bằng quy đầu——Dù vậy, phần thịt mềm của âm đạo\nvẫn bám sát, xao xuyến chuyển động, gọi mời tôi vào sâu, sâu hơn nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！　もっとだ――くっ！\nもっと――深く、にっ」
1003 = "「Paulette! Nữa đi——hự!\nHơn nữa——vào sâu, hơn nữa」"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――ぁっ――はい、双鉄、くん――んっ！\n来て――くだ、さ――いっ――ふあっ！！」
873 = "「Hà——a——vâng, anh Soutetsu——ưm!\nHãy đến——đây, đi——ạ——phù!!」"
# monologue
# JP: （ずぶうううううううううううっ！！！）
1735 = "（Phậppppppppppppp!!!）"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 935 = "「啊！！！」" 
# 【ポーレット】
# display as 波萊特
# JP: 「ふっ――きゅううううううううっっ！！！」
892 = "「Phù——kyuuuuuuuuu!!!」"
# monologue
# JP: 呼吸が、動きが、マッチする。\n呼び合い、深く求め合い、だからお互いを喰らい合う。
1356 = "Nhịp thở, chuyển động, đều hòa quyện.\nGọi mời nhau, khao khát nhau sâu sắc, nên chúng tôi nuốt lấy nhau."
# monologue
# JP: （ずっ――ぬっ――ずぶっ――ずりゅっ！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――んっ――ふっ――あた、るっ――んっ――\n奥っ！　んっ――ちゅっ――って――あたっ――てっ！」
878 = "「Hà——ưm——phù——chạm, rồi——ưm——\nBên trong! Ưm——hôn——rồi——chạm——rồi!」"
# monologue
# JP: 子宮に、亀頭がキスしてる。\nだけれど、強くノックをできない。
1399 = "Quy đầu đang hôn lên tử cung.\nNhưng tôi không thể gõ cửa quá mạnh."
# monologue
# JP: （ずっ！　ゆさっ――ずりゅっ！　ずぶっ！）
1706 = "（Phập! Lắc——nhóp! Phập!）"
# 【ポーレット】
# display as 波萊特
# JP: 「んきゅっ！　あっ――双鉄――くぅんっ！　んっ、\nもっと――ふか、くてっ――へい、きっ――わたしっ」
949 = "「Nkyu! A——anh Soutetsu! Ưm,\nSâu——hơn nữa——em không, sao——đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 946 = "「嗯」" 
# monologue
# JP: わかってる。\n僕とてゴンゴン、最奥へ亀頭を叩きつけたい。
1401 = "Anh biết chứ.\nAnh cũng muốn đâm sầm sập, đập mạnh quy đầu vào nơi sâu nhất."
# monologue
# JP: 思いっきりにぶつけたいのだが――
1618 = "Rất muốn đâm vào thật mạnh, nhưng——"
# monologue
# JP: （ゆさっ！　ずううっ！　ずぶっ！　にゅぶっ！）
# 1706 = "（夾緊）" 
# 【ポーレット】
# display as 波萊特
# JP: 「やっ――あっ――足っ――んっ――ふっ――は、あっ、\nこれっ――だめっ――腰――浮い、て――んうっ！」
913 = "「Á——a——chân——ưm——phù——hà, a,\nThế này——không được——hông——nổi lên, rồi——ưm!」"
# monologue
# JP: 寝ているときほど深くみっちり押し付けられない。\n一番最後の最後の部分で、体勢の差が出てしまう。
1523 = "Không thể ép sát vào sâu như khi đang nằm.\nỞ khoảnh khắc cuối cùng của cuối cùng, sự khác biệt về tư thế lại lộ rõ."
# monologue
# JP: （ずっ――ズウうう――るっ！！）
1715 = "（Phập——phậpppp——phập!!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！　あっ――んっ――ふうっ――ふあっ！」
855 = "「Hya! A——ưm——phù——phù!」"
# monologue
# JP: 最後の最後に到達しようと腰を思い切り押しこむたびに、\nけれどポーレットの腰が浮く。
1389 = "Mỗi lần tôi cố gắng đẩy hông thật mạnh để chạm đến nơi tận cùng,\nhông Paulette lại nổi lên."
# 【双鉄】
# display as 雙鐵
# JP: 「なら、ばっ――」
1043 = "「Nếu vậy, thì——」"
# monologue
# JP: （ぐ、ぐいっ！　ぐっ――ずりりゅ――ぬるっ！？）
1713 = "（Hự, hự! Hự——tuột——tuột!?）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ！　やっ――抜けっ！？　らめっ！\nおちんちん、だめっ！　いかないでぇっっ！」
933 = "「Hyau! Á——tuột ra!? Không được!\nDương vật, không được! Đừng đi mà!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
953 = "「っ!」"
# monologue
# JP: （ズッ――ずぶっ――るっ！）
1716 = "（Phập——phập——phập!）"
# 【ポーレット】
# display as 波萊特
# JP: 「そうっ！　いいこっ――ねっ――なか、でっ――んっ、\nここ、が――おまんこ――あなた、の――おう、ちっ」
966 = "「Đúng rồi! Ngoan lắm——nhé——bên trong, này——ưm,\nĐây, là——cô bé——ngôi, nhà——của, anh」"
# monologue
# JP: 勢いを借り一気にいこうと大きく動いてみたのなら、\n亀頭はたやすく抜けそうになる。
1372 = "Nếu thử mượn đà để đâm một phát thật mạnh,\nquy đầu sẽ rất dễ bị tuột ra."
# monologue
# JP: これほどみっちり締められてなお、\nポーレットの肉が柔らかすぎて――っ！
1228 = "Dù bị siết chặt đến nhường này,\nnhưng phần thịt của Paulette lại quá mềm mại——!"
# 【双鉄】
# display as 雙鐵
# JP: （ああ……そうか。柔らかいから、ほぐれているから。\n浮いて、逃げ出してしまうのか）
1698 = "（A……ra là vậy. Vì quá mềm mại, vì đã được nới lỏng.\nNên mới nổi lên và trượt ra ngoài sao.）"
# monologue
# JP: 理解はすぐに、解決策へと直結していく。
1535 = "Sự thấu hiểu ngay lập tức dẫn đến giải pháp."
# monologue
# JP: ポーレットのやわらかすぎるたぷたぷ肉を、\n瞬時に硬直させる方法――それなら、僕は知っている！
1588 = "Cách để làm cho phần thịt quá đỗi mềm mại của Paulette\ncứng đờ lại ngay tức khắc——Nếu là cách đó thì tôi biết!"
# monologue
# JP: （ぐっ！）
# 1712 = "（抱起）" 
# 【ポーレット】
# display as 波萊特
# JP: 「あんっ！」
# 932 = "「啊！」" 
# monologue
# JP: 足を抱えて――尻を支えてる肉を掴んで、\nそのまま指を伸ばし、伸ばして――
1383 = "Ôm lấy đôi chân——tóm lấy phần thịt đang nâng đỡ cặp mông,\ncứ thế duỗi những ngón tay ra, vươn tới——"
# monologue
# JP: （とんっ！）
1691 = "（Bụp!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ！？」
# 860 = "「呀！？」" 
# monologue
# JP: （つぷっ！）
# 1701 = "（噗哧）" 
# 【ポーレット】
# display as 波萊特
# JP: 「んきゅんっ！！！！」
947 = "「Nkyun!!!!」"
# monologue
# JP: （キチチチチッ！）
# 1706 = "（夾緊）" 
# monologue
# JP: 指先をほんの僅かに食い込ませようとしただけで、\nポーレットの小さな尻穴は、引きちぎるほど反撥をする！
1359 = "Chỉ cần cố ấn nhẹ đầu ngón tay vào một chút thôi,\nlỗ hậu nhỏ bé của Paulette đã phản kháng dữ dội như muốn xé toạc ra!"
# monologue
# JP: だが、それゆえに今ならば！\nこの硬直した下半身ならっ！
1205 = "Nhưng, chính vì thế mà ngay lúc này!\nVới nửa thân dưới đang cứng đờ này!"
# monologue
# JP: （ずぶぶうううううううううううっ！）
# 1716 = "（插入）" 
# 【ポーレット】
# display as 波萊特
# JP: 「あひゅんっ！！！」
850 = "「Ahyun!!!」"
# monologue
# JP: （ごんっ！）
# 1691 = "（咚）" 
# 【ポーレット】
# display as 波萊特
# JP: 「きゅはっ！！！」
# 935 = "「啊！！！」" 
# monologue
# JP: 一番奥を、強く叩いた。\n子宮のドアに勃起スタンプを押し当てた。
1213 = "Đâm mạnh vào nơi sâu nhất.\nẤn con dấu dương vật lên cánh cửa tử cung."
# monologue
# JP: 達成感が快感が、強烈単純に入り混じり、\n僕の動きを獣のそれと変わらなくするっ！
1340 = "Cảm giác thành tựu và khoái cảm hòa quyện một cách mãnh liệt và đơn thuần,\nkhiến chuyển động của tôi chẳng khác nào một con thú!"
# monologue
# JP: （ずぶっ！　ずぼっ！　ずぱんっ！　すぱんっ！！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 
# monologue
# JP: 肉と肉とのぶつかり合う音。接合部からはじけ飛ぶ蜜。\nだらだらどろどろ溶け合っていく汗と体温と体臭と――
1561 = "Âm thanh da thịt va chạm. Mật ngọt bắn ra từ nơi giao hợp.\nMồ hôi, thân nhiệt và mùi cơ thể nhớp nháp, nhầy nhụa hòa quyện vào nhau——"
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！　あっ！　これえっ！　これっ！　しゅきっ！　いちばんっ！　いちばんっ！　だい、しゅきいっ！」
859 = "「Hya! A! Cái này! Cái này! Thích lắm! Tuyệt nhất! Tuyệt nhất! Thích, lắm luôn!」"
# monologue
# JP: （ずばんっ！　ずぶっ！　ずぼっ！　じゅぱんっ！！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 
# monologue
# JP: リズムが産まれ、密着しあったふたつの体が、\nひとつの重心にバランスを見る。
1357 = "Nhịp điệu được sinh ra, hai cơ thể dính chặt vào nhau,\ntìm thấy sự cân bằng tại một trọng tâm duy nhất."
# monologue
# JP: （ずぶっ！　ずばんっ！　じゅぼっ！　ずぶううっ！！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 
# monologue
# JP: 動ける、抉れる。思うがままに。
1408 = "Có thể cử động, có thể ngoáy sâu. Tùy theo ý muốn."
# monologue
# JP: 不自由な体勢だったからこそ、今までなかった密着感が、\n僕らを強烈に包み溶かして同化させてく！
1446 = "Chính vì tư thế không thoải mái này, cảm giác gắn kết chưa từng có\nđang bao bọc, hòa tan và đồng hóa chúng tôi một cách mãnh liệt!"
# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ！　あっ！　あっ！　あっ！　双鉄、くんっ！\nあっ――子宮！　もっと！　叩いて、もっぉ！」
895 = "「Phù! A! A! A! Anh Soutetsu!\nA——tử cung! Nữa đi! Đâm vào, nữa đi!」"
# monologue
# JP: （ずばっ！　じゅぼっ！　ぐりゅりゅっ！　ずぶうっ！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 
# 【ポーレット】
# display as 波萊特
# JP: 「わか、るつ――ぷくっ、て！　双鉄、くん――の――\nおちん――ひゅいっ！　あっ――おちん、ちんぅ」
980 = "「Em cảm, nhận được——đang phồng, lên! Của anh——Soutetsu——\nDương vật——hyui! A——dương, vật」"
# monologue
# JP: ぷくっとしてる。しまくっている。\n尿道をのぼり亀頭まで、白濁液が押し寄せている。
1617 = "Đang phồng lên. Đang phồng lên dữ dội.\nChất lỏng đục ngầu đang trào ngược lên niệu đạo, dồn đến tận quy đầu."
# monologue
# JP: 精液はもう冒進しそうで限界で――\n入線許可を、青信号を、狂おしいほどに待ち望んでる！
1552 = "Tinh dịch sắp sửa vượt quá giới hạn——\nĐang điên cuồng chờ đợi lệnh cho phép tiến vào ga, chờ đợi tín hiệu đèn xanh!"
# monologue
# JP: （ずぶっ！　ずばっ！　じゅぶっ！　じゅぶんっ！！！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 
# 【ポーレット】
# display as 波萊特
# JP: 「きてっ！　きて！　きて！　双鉄、くんっ！\nわたしの、おく、に――子宮！　子宮、にっ！！」
841 = "「Đến đi! Đến đi! Đến đi! Anh Soutetsu!\nVào sâu, bên trong, em——tử cung! Vào tử cung!!」"
# monologue
# JP: （きゅんっ！　きゅううっ！　きゅむっ！　きゅいっ！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 
# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！」
# 932 = "「啊！」" 
# monologue
# JP: むちむちすぎる膣壁に、上下左右にとどまらず、\n前方からも甘い刺激を貼り付けられる。
1594 = "Thành âm đạo quá đỗi đầy đặn, không chỉ từ trên dưới trái phải,\nmà còn dán chặt những kích thích ngọt ngào từ cả phía trước."
# monologue
# JP: 快感はもう麻痺に近くて、ちんちんとおまんこの区別も\n付かず、それでも腰は浅ましいまでに貪り続け――
1328 = "Khoái cảm đã gần như tê liệt, chẳng còn phân biệt được dương vật và cô bé nữa,\ndù vậy hông vẫn tiếp tục thèm khát đến mức đê tiện——"
# 【ポーレット】
# display as 波萊特
# JP: 「はっ――ひっ――いっ、ぐっ――ンッ――あっ――\nそうて、つ――くんっ――はっ！　双鉄、くぅんっ！」
868 = "「Hà——hí——ra, mất——ưm——a——\nAnh Sou, tetsu——hà! Anh Soutetsu!」"
# monologue
# JP: 声だけが。ただポーレットの声だけが。\n射精欲求に染まりきってる僕の脳へと、刺激をくれる。
1404 = "Chỉ có giọng nói. Chỉ có giọng nói của Paulette.\nTruyền kích thích đến não bộ đang ngập ngụa trong dục vọng xuất tinh của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「おちん、ちん――ね？　ぴゅっぴゅって！　はっ――\nせい、えい――精子――ぴゅっぴゅって、してぇっ！」
1049 = "「Dương, vật——nhé? Phụt phụt đi! Hà——\nTinh, dịch——tinh trùng——phụt phụt, đi anh!」"
# monologue
# JP: （きゅんっ！　きゅきゅん！！！）
# 1706 = "（夾緊）" 
# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 932 = "「啊！」" 
# monologue
# JP: （びゅうっ！　びゅっ！　どびゅっ！　びゅるるっ！）
1704 = "（Phụt! Phụt! Phụtttt! Phụt phụt!）"
# 【ポーレット】
# display as 波萊特
# JP: 「ふぁぁぁぁぁぁぁぁぁっぁぁぁぁぁぁぁぁっ！！！」
891 = "「Phuaaaaaaaaaaaaaaaaaaaaaa!!!」"
# monologue
# JP: （ずるっ――びゅぶっ！　びゅう！　びゅるるっ！）
# 1704 = "（噗噗！噗噗！噗嚕！噗嚕！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！？　抜けっ――んっ！　あつ、っ！　ふあ！」
864 = "「Hya!? Tuột ra——ưm! Nóng, quá! Phù!」"
# monologue
# JP: （びゅぶっ！　びゅううっ！　どびゅっ！　びゅるっ！）
# 1704 = "（噗噗！噗噗！噗嚕！噗嚕！）" 
# 【ポーレット】
# display as 波萊特
# JP: 「あ……熱っ、いっ――んっ――ふあっ――あっ――\nおだい、どこっ――エプロ、ん――わた、し――もっ」
958 = "「A……nóng, quá——ưm——phù——a——\nNhà, bếp——tạp dề, ề——cả, em——nữa」"
# monologue
# JP: （びゅるっ！　びゅっ！　びゅうっ！）
1702 = "（Phụt! Phụt! Phụtttt!）"
# monologue
# JP: 穢してる。シミひとつ無い肌をエプロンをキッチンを。\n濁った、僕の精液が。
1419 = "Đang vấy bẩn. Lên làn da không tì vết, lên chiếc tạp dề, lên cả nhà bếp.\nTinh dịch đục ngầu của tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「ふぁ……コート……され、てる――ンッ――\nわたし、双鉄、くん――ホワイト、ソース――でっ――」
890 = "「Phù……bị……phủ lên, rồi——ưm——\nEm, bị anh Soutetsu——phủ bằng nước xốt, trắng——rồi——」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふっ」
954 = "「Phụt」"
# monologue
# JP: 思いもかけぬ発言に、思わず、笑いをこぼしてしまう。\nついでにこぼれた精液が、ぬとり、と床を汚してしまう。
1333 = "Lời nói bất ngờ khiến tôi không nhịn được mà bật cười.\nNhân tiện, tinh dịch trào ra nhầy nhụa, làm bẩn cả sàn nhà."
# 【双鉄】
# display as 雙鐵
# JP: 「ホワイトソースに、レモンドレッシング。\nポーレットという極上肉は、さすがに和え物も豪華だな」
1007 = "「Nước xốt trắng, với xốt chanh.\nKhối thịt thượng hạng mang tên Paulette, món trộn kèm quả nhiên cũng xa hoa thật đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「レモン……ドレッシング？　って――えっ！？　\nひゃっ！？　やあんっ！！？」
992 = "「Xốt chanh……á? Hả——ơ!?\nHya!? Không chịu đâu!!?」"
# monologue
# JP: 顔を一気に真っ赤に染めて、\nポーレットがはげしくイヤイヤをする。
1493 = "Khuôn mặt đỏ bừng lên ngay lập tức,\nPaulette lắc đầu nguầy nguậy phản đối dữ dội."
# monologue
# JP: そのたび精液が飛び散るのだが――\nどちみち、あとで大掃除するのは確定だ。
1264 = "Mỗi lần như thế tinh dịch lại văng tung tóe——\nNhưng đằng nào thì lát nữa cũng phải tổng vệ sinh rồi."
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 929 = "「啊」" 
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 952 = "「嗯？」" 
# monologue
# JP: いやいやが、そして視線が、いきなり止まる。\n止まり注がれるその先は――
1266 = "Cái lắc đầu, và cả ánh mắt, bỗng nhiên dừng lại.\nNơi ánh mắt dừng lại và hướng đến là——"
# 【双鉄】
# display as 雙鐵
# JP: （ボウル――だな）
1707 = "（Chiếc thau——nhỉ.）"
# monologue
# JP: あとでトイレに流そうと、\n中身も、いまだ満ちっぱなしの。
1540 = "Định lát nữa sẽ đổ xuống bồn cầu,\nthứ bên trong, vẫn đang đầy ắp."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……あの……ね？　双鉄、くん――その……\nえと……さっき……言ってた、かな……って――」
1032 = "「A……chuyện đó……này? Anh Soutetsu——cái đó……\nỪm……lúc nãy……anh đã nói, đúng không……nhỉ——」"
# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ」
945 = "「Ừ, ừm.」"
# monologue
# JP: 甘えきっていて、不安げで。\nその声はもう、どこから聞いてもポーレットのもの。
1608 = "Đầy nũng nịu, và có vẻ bất an.\nGiọng nói ấy, dù nghe từ đâu cũng nhận ra là của Paulette."
# monologue
# JP: だから、予想は簡単だ。\n次にどんな、弱気なお願いが続いてくるのか。
1420 = "Vì vậy, rất dễ đoán.\nTiếp theo sẽ là một lời thỉnh cầu yếu ớt nào đây."
# 【ポーレット】
# display as 波萊特
# JP: 「え……と――汚れ、わたし、の――そのっ――\n双鉄、くんっ――が――あのっ」
1036 = "「Ờ……thì——Sự bẩn thỉu, của, em——chuyện đó——\nAnh Soutetsu——đã bảo——ừm」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、約束した。ポーレットがそれを汚れと思うなら、\n僕が必ず、受け止めようと」
950 = "「Ừ, anh đã hứa rồi. Nếu Paulette nghĩ đó là sự bẩn thỉu,\nanh nhất định, sẽ hứng trọn lấy nó.」"
# monologue
# JP: 射精直後の、いわゆる僕は賢者モードだ。\nだから無理やり、理性を熱情で埋め戻す。
1388 = "Ngay sau khi xuất tinh, tôi đang ở trong cái gọi là 'chế độ hiền nhân'.\nVì vậy, tôi đành phải miễn cưỡng dùng nhiệt huyết để lấp đầy lại lý trí."
# monologue
# JP: 考えてしまっては、果たせなくなる。\nただ、愛だけに――我と我が身を任せればいい。
1290 = "Nếu cứ suy nghĩ thì sẽ chẳng làm được gì.\nChỉ cần, phó mặc bản thân và lý trí——cho tình yêu là đủ."
# 【双鉄】
# display as 雙鐵
# JP: 「これを、汚れと――\nそう、ポーレットは感じているのか？」
1029 = "「Thứ này, là bẩn thỉu sao——\nPaulette cảm thấy như vậy à?」"
# monologue
# JP: いいつつ、ボウルを持ち上げる。\n匂いは、さっきより濃くなっている。
1343 = "Vừa nói, tôi vừa nhấc chiếc thau lên.\nMùi hương nồng đậm hơn lúc nãy."
# monologue
# JP: 空気に触れて、恐らく激しく雑菌が――\nいや！　違う。今は考えるべき時間ではない。
1249 = "Tiếp xúc với không khí, e rằng vi khuẩn đang sinh sôi dữ dội——\nKhông! Không phải. Giờ không phải lúc để nghĩ ngợi."
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ――」
# 929 = "「啊」" 
# monologue
# JP: ポーレットの口が半開きになる。\nその目は僕を、じっと見つめる。
1492 = "Miệng Paulette hé mở.\nĐôi mắt ấy chăm chú nhìn tôi."
# monologue
# JP: 期待と、不安と、喜びと――\nそのどの色にも、見える瞳が。
1324 = "Đôi mắt ấy hiện lên đủ mọi sắc thái——\nKỳ vọng, bất an, và cả niềm vui sướng."
# 【ポーレット】
# display as 波萊特
# JP: 「あの……えっと――双鉄、くんっ――。\nそれ、えと……わたし、の――おし、っこ――」
1037 = "「Cái đó……ừm thì——anh Soutetsu——.\nĐó, là……của, em——nước, tiểu——」"
# monologue
# JP: そうして。静かに。とても、静かに。\n言葉が、ひとつ。たったひとつだけつむがれる――
1512 = "Và rồi. Thật khẽ. Thật tĩnh lặng.\nMột lời nói. Chỉ một lời duy nhất được thốt ra——"
