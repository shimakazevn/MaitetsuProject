# ポーレットh5_裸エプロンのレモンドレッシング和え.txt 
[info]

[characters]
1148 = "ポーレット"
1229 = "双鉄"

[character_subs]
1481 = "波萊特"
1620 = "雙鐵"

[script]
# lines: 341 
# monologue
# JP: 抱き上げる。\n力の抜けたポーレットの体は、いつも以上にぽかぽかだ。
1378 = "我把波萊特抱了起來。渾身脫力的波萊特體溫比平時暖和一些。" 

# monologue
# JP: ならば、このまま、\nベッドへ運んで――
1513 = "然後我就抱著她，向床那邊走去——" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……双鉄くん。ちょ……ちょっとだけ、あのっ……\nお、おろしてっ、待って――もらえますっ――か？」
926 = "「啊……雙鐵君……能不能，那個……放我下來一下？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
952 = "「嗯？」" 

# monologue
# JP: 小刻みに震え始めている。
1406 = "我能感受到微弱的顫動。" 

# monologue
# JP: ポーレットの体だけでなく、僕の体も、\nこれほど熱く燃えているのに。
1187 = "不僅是波萊特在顫抖，連我跟著顫動起來，我明明都已經興奮起來了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「緊張をさせてしまったか？」
986 = "「是我讓你太緊張了嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ――あの――そのっ――緊張、とかじゃなく。\nわたし……え……と……はうっ！」
826 = "「不是——那個——我沒有緊張——我……呃……啊……唔！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む？」
# 952 = "「嗯？」" 

# monologue
# JP: キスでの、愛撫での――そうした呼吸の乱れではない。\n発情し、ほてった体がかく汗ではない。
1278 = "她的呼吸很急促，但跟接吻或愛撫她的時候感覺不一樣。她開始出汗，卻不像動情的時候出的汗。" 

# monologue
# JP: ポーレットの体になにか、異変が生じている。\n気づいた故に――声を、心を落ち着ける。
1498 = "波萊特的身體出現了異常情況。所以我得問她一聲，不然會很擔心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうした。どこか痛むのか？\nならば、無理せず――」
972 = "「怎麼了，你是哪裡痛嗎？那就不用勉強——」" 

# 【ポーレット】
# display as 波萊特
# JP: 「痛む――とか――じゃ、なくっ――ンッ――ひ――\nあっ！　そ、そのっ――あの――わた、しっ――」
823 = "「不是——哪裡痛——嗯——啊——啊！那、那個——我——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「聞かせてくれ。\n聞かせてくれねば、僕には助けようもない」
839 = "「你說吧。你要是不說，我也沒辦法幫你」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ――ぁ――ぉ……お……おっ……ふっ！」
910 = "「啊——啊——啊……我……我……呼！」" 

# monologue
# JP: 目が泳ぐ。\n僕へと助けを求め続ける。
1283 = "她的眼神不停地游移。她的本能在向我求救。" 

# monologue
# JP: だから、頷く。\n今はただ、そうする他にすべを持たない。
1438 = "最後她點點頭，因為除此之外沒有別的辦法。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふ、くっ――あっ――はっ――んんっ！\nわ……わ、たし――もれ、そっ――その――おしっ、こ」
870 = "「呼——啊——呼——嗯！我…我要——尿出來了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おしっこ」
1019 = "「要尿出來了啊」" 

# monologue
# JP: ポーレットの持つ忍耐力。恥じらい深さ。空気を読む力。\nにも関わらずの呼吸の荒さ息遣い。徐々に大きくなる震え。
1490 = "波萊特本身很能忍耐，有很強的羞恥心，還很會顧忌場合。然而她還是喘著粗氣，身體的顫抖也越來也劇烈了。" 

# monologue
# JP: つまり――猶予は殆ど無いのだ。
1193 = "也就是說——她現在真的是快到極限了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん。気づくのが遅れてしまった」
965 = "「對不起，我發現得太晚了」" 

# monologue
# JP: （ひょいっ！？）
1712 = "（抱起）" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　ええっ――えええっ！？」
900 = "「哎！？哎——哎哎哎！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「我慢せずとも構わない。\nここでなら、すぐに水に流せるし」
836 = "「你不用憋著。在這裡的話馬上就能沖掉」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いっ――いっ――いえっ――で、でも――――\nき、キッチンですし――ここ――汚したらっ」
909 = "「啊——啊——可是——這、這裡是廚房——弄髒就不好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットの体から出るものだ。\n汚くないから、汚れもしない。」
1030 = "「這是你身體裡出來的東西，所以一點也不髒，也不會把這裡弄髒了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「きっ、気持ちはすごくっ――嬉しい、です、けどっ！\nでもっ――でもっ！　でもでもでもでもっ～～！」
959 = "「好、好意我心領了！可是——可是！可是可是～～！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「デモもストも無いだろう。\n我慢をしすぎては体に毒だぞ」
828 = "「不用說什麼可是了。憋太久對身體不好」" 

# 【ポーレット】
# display as 波萊特
# JP: 「けど、だって――んっ――双鉄、くん――のっ――\nごはん――つくって、あげ――るっ――場所、だしっ」
833 = "「但是這裡——嗯——可是這是——我給你做飯吃的地方」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
867 = "「呃」" 

# monologue
# JP: 脂汗。張り付いてしまい、薄い腹筋の動きにあわせ、\n揺れて震えてしまうエプロン。
1270 = "她出的汗越來越多，以至於圍裙都貼在了小腹上，隨著她身體的振動搖擺起來。" 

# monologue
# JP: 小刻みにひっきりなしにヒクついているおまんこを見ても、\nポーレットはもう、とうに限界を超えていよう。
1210 = "再看她的小穴也一直在顫動，波萊特明顯已經到極限了。" 

# 【双鉄】
# display as 雙鐵
# JP: （限界を超えてもなお我慢する――\nいや、我慢を、僕がさせてしまっているのか）
1718 = "（明明已經超越極限了她還在忍耐——不對，是我讓她這麼在忍耐）" 

# monologue
# JP: シンクで放尿することに、\nよもやそこまでの抵抗を覚えるものとは、思えなかった。
1385 = "我沒想到她會這麼抗拒尿在水槽裡。" 

# monologue
# JP: これなら最初からトイレに連れていった方が良かったが\n……今からの移動が意味するものは、尿の拡散のみだろう。
1615 = "開始就應該帶她去廁所……現在即使去的話也只會把尿撒一路。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば……ああ、これを使おう」
1040 = "「那就……用這個吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　ええっ――これって――これって――」
902 = "「哎！？哎——這個——這個是」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ボウルだ。１００円ショップで一緒に買ったな？」
989 = "「是碗。我們在平價商店買的」" 

# monologue
# JP: ポーレットはお菓子作りが好きで、\nれいなはそれを手伝うのが好き。
1488 = "波萊特喜歡做點心，而玲奈喜歡幫著她做。" 

# monologue
# JP: そしてれいなが夢中になれば、\nボウルは簡単にひしゃげてしまう。
1520 = "玲奈一入神的時候，碗很容易就會弄碎。" 

# 【ポーレット】
# display as 波萊特
# JP: 「は……はい。た、確か、に――ん！　いっつも、の、\n百円、ショッ、プの、ボウルっ――です、――けどっ！」
943 = "「嗯……是啊。沒錯，嗯！這是、我們在、常去的、平價商店、買的碗——可是！」" 

# monologue
# JP: 震える唇で歯を食いしばり、とぎれとぎれにそれを解いて、\nポーレットが何とか紡いでくれる、同意の言葉に安堵する。
1487 = "波萊特咬緊了牙關，三不五時地鬆開來說著話，而她擠出來的話讓我放心下來。" 

# monologue
# JP: “この家では、ボウルは単なる消耗品”と、\nそれがしっかり伝わったなら、抵抗を大きく減らせる筈だ。
1231 = "只要她明白“家裡的碗只是消耗品”而已，她就應該不那麼抗拒了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これを使って、僕が必ず受け止めよう。\nシンクには、一滴たりともこぼさぬように」
984 = "「我會用這個全部接住的。我不會水槽沾到一滴」" 

# 【ポーレット】
# display as 波萊特
# JP: 「け……ど――それ、でも――ボウ、ル――\nボウ、ルっ――きっと――汚しちゃ――んんっ！」
846 = "「可以……這樣——碗就一定——會弄髒了——嗯——！」" 

# monologue
# JP: 汗がシンクにぽたぽたと落ち、\nおまんこはもう、痙攣したように震えまくってる。
1501 = "波萊特身上滴下了大顆的汗珠，她的小穴已經在劇烈痙攣了。" 

# monologue
# JP: これ以上の我慢を強いてしまうのならば、\n冗談ではなく、膀胱炎に追いやってしまいかねない。
1287 = "她要再憋下去，可就真的要得膀胱炎了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だ。ポーレット」
996 = "「沒事的，波萊特」" 

# monologue
# JP: だから、囁く。\n甘く、ゆっくり、耳元で。
1422 = "所以我要輕聲低語。我湊到她耳邊小聲說道。" 

# monologue
# JP: こうすればポーレットはすぐに脱力すると、\n経験が、僕に教えてくれているから。
1325 = "從經驗上來看，這樣做可以讓波萊特放鬆力氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さっきも言ったが汚れなどせん。\nポーレットの体から出るものなのだから」
979 = "「我剛才也說過，一點因為不髒。只要是你身體裡出來都不髒」" 

# 【ポーレット】
# display as 波萊特
# JP: 「け――どっ――っ――あっ――ンッ――ふっ！\nけどぉっ！」
847 = "「可是——啊——嗯——呼！可是！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「汚れであると、ポーレットが感じてしまうというのなら。\n僕が必ず。その汚れさえ受け止めるから」
961 = "「如果你覺得髒的話，我也一定會把所有的髒東西都接下」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
929 = "「啊」" 

# monologue
# JP: 吐息のような、緩んだ声。\nポーレットの目が、みるみる和らぐ。
1486 = "波萊特出了一口氣。她的眼神也漸漸鬆懈下來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そ……双鉄、くん――が――わたしの、汚れ、を……\nおしっこ――を――」
1047 = "「雙……雙鐵君——會接住我的髒東西……我的尿——」" 

# monologue
# JP: （ちょろっ）
1700 = "（嘩啦）" 

# monologue
# JP: 迸る。\nボウルに、ほのかな振動が来る。
1507 = "液體噴湧了出來。我能感覺到碗開始振動。" 

# monologue
# JP: 夏の手前に、若鮎が初めて跳ねるのを目にしたような、\n瑞々しいほどの安心感が、僕の心を満たしてくれる。
1395 = "我的心裡充滿了安寧祥和的感覺，就像是在夏天將至的時候，看到小魚在河裡跳躍一般安詳。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
955 = "「噢」" 

# 【ポーレット】
# display as 波萊特
# JP: 「やあっ！？　『おお』と、かっ――あっ――あっ――あ、\nああっ！」
862 = "「呀！？不要感嘆——啊——啊——啊！」" 

# monologue
# JP: （ちょっ――ちょおおおおおおおっ）
1699 = "（嘩啦啦）" 

# monologue
# JP: 意識はどうあれ、\n体の方が歯止めを外してくれたのだろう。
1485 = "波萊特似乎想停下來，但是她的身體已經不聽使喚了。" 

# monologue
# JP: ボウルに尿が溜まり始めて、\nそれはすぐさまパチャパチャと音を立て弾み始める。
1539 = "碗裡的液體越積越多，後續的尿液打在上面激起了嘩啦嘩啦的水聲。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あっ、や！　止まら、なっ――ふっ――あ、見ないで！見ないでください、双鉄く、んっ――あっ――んうっ！」
927 = "「啊、呀！停不下來——啊——不要看！不要看啦，雙鐵——啊——嗯！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、見ずには受け止められぬ」
976 = "「我不看起來可就接不住了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「は……やっ……恥ずか……しぃ……よぉ……は、あ――\nおし、っこ――おしっこ――早く……とまってぇ」
880 = "「呼……呀……好羞恥——呼——啊——尿——快停下——」" 

# monologue
# JP: （ちょおおおおおおおおおおおっっ）
# 1699 = "（嘩啦啦）" 

# monologue
# JP: ボールの水面は高くなり、しぶきは最早、\nポーレットの体にさえも跳ね返っている。
1538 = "碗裡的水位越來越高，撿起的水花開始打到波萊特的身上了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……あっ――あっ……やぁ……やだ……やぁだぁっ」
921 = "「啊……啊——啊……呀……討厭……討厭啦」" 

# monologue
# JP: ボウルの重みと温度とが増す。尿の匂いと色が濃くなる。\n同時に――僕の焦りの色も。
1537 = "碗的重量變重了，溫度也變高了。尿液的味道和顏色也越來越濃重。與此同時，我的內心也是越來越焦急。" 

# 【双鉄】
# display as 雙鐵
# JP: （まずいな――このままでは溢れかねんぞ）
1732 = "（這下不好了，要溢出來了）" 

# monologue
# JP: 最悪を常に想定し、最善の準備を整える。
1370 = "我平時都是預想到最壞的情況，做好萬全的準備。" 

# monologue
# JP: それが理想と理解しているつもりだが、\nしかし、流石にこの状況への即応策は――――むっ！
1605 = "這樣做是最理想的，我也自認為很明白這一點，但是這種情況下還真是拿不出辦法——呃！" 

# monologue
# JP: （ちょっ――ちょろっ――……ちょっ……ぽちょん）
1721 = "（滴答……滴答……）" 

# monologue
# JP: 尿の勢いが大きく減じ、水のベールに覆われていた\n尿道口が、雫を垂らしているのが見える。
1313 = "尿液的勢頭大幅減弱，剛才被水柱撐開的尿道口也開始滴下水滴了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……ふぁ……あっ……しちゃ……った……おし、っこ。\nわたし……双鉄、くんの――目の、前――――でっ」
920 = "「啊……呼……啊……我竟然……在雙鐵君面前……尿出來了——」" 

# monologue
# JP: （……ちょっ…………ぴゅるっ――――）
# 1721 = "（滴答……滴答……）" 

# monologue
# JP: 尿が、止まった。\nけれど、ポーレットはまだ濡れている。
1434 = "放尿停止了。但同時波萊特也已經濕潤了。" 

# monologue
# JP: 青い瞳が、完全にうるんでしまってる。\nこのまま放置をしたならば、恐らく泣いてしまうだろう。
1286 = "她的藍色大眼睛已經噙滿了淚水。這樣下去的話，她恐怕要哭出來了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「し、ちゃった……け、ど。わたし……わたし――だって\n――だって、双鉄、くんっ――がっ――」
1046 = "「雖然……尿了……但是我——因為——你說了——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
946 = "「嗯」" 

# monologue
# JP: そうだった――\n僕は、ポーレットと約束している。
1450 = "沒錯，我剛才跟她約好了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「よく頑張ったな、ポーレット」
1026 = "「辛苦你了，波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……」
914 = "「啊……」" 

# monologue
# JP: 中身を決してこぼさぬようにボウルをどけて。\n自由になった指を伸ばして――
1364 = "我小心翼翼地把碗拿開，然後伸出空出來的手指——" 

# 【ポーレット】
# display as 波萊特
# JP: 「んうっ――」
936 = "「嗯——」" 

# monologue
# JP: 太ももの、一番やわらかいところ。\nもう何センチかずれたなら、股間になってしまう場所。
1352 = "我伸向了她大腿最軟嫩的地方，就在那還差幾公分就到胯間的大腿根部。" 

# monologue
# JP: そこを拭って雫をすくい……\nどうしたものかと、しばし考え。
1411 = "我蘸起那裡的水滴，稍微思考了一下。" 

# 【双鉄】
# display as 雙鐵
# JP: （ぱくっ！）
1690 = "（吃下）" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！！！」
935 = "「啊！！！」" 

# monologue
# JP: これが正解なのだろう。
1532 = "看來我做出了正確的選擇。" 

# monologue
# JP: ポーレットのあの青くて深く澄んだ瞳が、\n朝陽を浴びた湖のごとく、これほどキラキラ輝くのだから。
1499 = "波萊特藍色的大眼睛就像朝陽下的湖面一樣，閃爍起了光芒。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……そう、てつ――くん……受け止めてくれる、って\n――やっぱり――そう、いう……んっ！」
639 = "「……雙鐵——你說會接下——果然是這個意思嗎……嗯！」" 

# monologue
# JP: 鼻にかかった甘い声。\n熱い呼吸と、汗と体温。
1496 = "波萊特的聲音帶上了動情的音色。她的呼吸、汗水和體溫都有了熱度。" 

# monologue
# JP: 僕が尿を掬って舐めたそのことで、\nポーレットの示していた緊張は、はっきり発情に変化した。
1345 = "我不過是嚥下她的一點尿液，就讓她的緊張完全轉變成情慾了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
631 = "「…………」" 

# monologue
# JP: ほんの思いつきだとは流石に言えず、\nけれども嘘をつきたくもなく――ならば行動で示す他無い。
1347 = "我也很難說這是一時的心血來潮，但是我也不想說謊——那我就只好用行動來表示了。" 

# monologue
# JP: （しにゅっ――ぺろっ）
1728 = "（舔）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……ま、た――ンッ――そんな……あっ――優、しく\n――は、んっ――てい、ねい――にっ――ふぅんっ！」
915 = "「啊……又來——嗯——動作好輕——啊——好用心——呼啊！」" 

# monologue
# JP: 拭って、舐めて、また拭う。\n跳ねた雫の、一滴たりと残さぬように。
1410 = "我蘸起一滴，喝下去，再蘸起一滴。我把濺到她身上的尿滴一滴不剩地嚥下。" 

# monologue
# JP: ほんの数滴ずつの尿だが、繰り返すたび、時間がたつほど、\n塩気に混じり、強い渋みが口内を濃く染め始める。
1619 = "雖然每次只有幾滴尿液，但是重複幾次，再過了一段時間，嘴裡就有伴隨著鹹味而來的苦澀味了。" 

# 【双鉄】
# display as 雙鐵
# JP: （これは――口直しが必要だな）
1711 = "（我得換個口味）" 

# 【ポーレット】
# display as 波萊特
# JP: 「は……ぁ……んっ――ふぅ……ふぅ……ふぁ」
884 = "「呼……啊……嗯——呼……呼……呼啊」" 

# monologue
# JP: 尿はほとんど拭えたはずだ。尿意の我慢も無いはずだ。
1366 = "我已經把尿液擦掉了，她也應該不需要忍耐尿意了。" 

# monologue
# JP: なのにまだ、ポーレットのおまんこは甘やかに濡れ、\nふるふると、悩ましげにその身をふるわせている。
1203 = "但是波萊特的小穴卻還是一片泛濫，而且她還不安分地扭著身子。" 

# 【双鉄】
# display as 雙鐵
# JP: （……というか――これは。こんなにもいやらしい格好を、\n僕は、ポーレットに取らせていたのか）
1634 = "（……說起來，是我讓波萊特擺出了這麼羞恥的姿勢）" 

# monologue
# JP: 全身にびっしり浮く汗が、ぽとり、とシンクに落ち跳ねる。
1268 = "她全身冒出的汗珠滴到了水槽裡。" 

# monologue
# JP: 蜜はとろとろ、おまんこから腿へ尻へと伝わって、\nポーレットの熟した体を、艶と潤いとで彩っていく。
1581 = "蜜汁則是從小穴流到了腿上、屁股上，裝點著波萊特已然熟透的艷美嬌軀。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……言っていたな。さっき。\nここは、僕のためにごはんを作ってくれるところだと」
635 = "「……你剛才說過，這裡是給我做飯吃的地方」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふぇ？　――あ！　はいっ！　はいっ！！」
903 = "「哎？啊！是啊！是啊！！」" 

# monologue
# JP: どこかぼやけていた声が、理解の光に晴れ渡る。
1275 = "她有點迷茫的聲音瞬間改成了表示理解的言語。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたし、食べて――それから、飲んで、欲しいです。\n双鉄くんの――欲しい、ものなら……おなか、いっぱい」
1042 = "「那就吃我吧——然後也喝掉我吧。只要是你想要的……都可以盡情吃」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、遠慮無く――」
1045 = "「那我就不客氣了」" 

# monologue
# JP: （ずちゅううっ！！！！）
1722 = "（猛吸）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうんっ！」　ふあっ――そ、双鉄――くんっ！\nんぅうううっ！！！」
852 = "「呀！呼啊——雙、雙鐵！嗯啊啊啊！！！」" 

# monologue
# JP: 上半身を折りたたみ、\n伸ばした舌を、ポーレットの股間に隙無く貼り付ける。
1376 = "我把她整個人對摺，然後伸出舌頭狠狠吸上她的蜜穴。" 

# monologue
# JP: （ぴちゃっ――ぬちゃっ――にちゃっ――れるっ――）
1726 = "（舔來舔去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふ、ぅっ――ぃ、ぁっ――舐め、てるっ――おまん、こ、\n双鉄、くん、が――ぁっ！　おしっこ――おまん、こぉ」
899 = "「哎——啊——小穴——被舔到了——雙鐵君――啊！剛尿過的——小穴」" 

# monologue
# JP: おしっこおまんこ。確かにだ。\n舌に真っ先乗ってきたのは、より強烈な尿の味。だが――
1452 = "沒錯，這是剛尿過的小穴。我的舌頭感受到的是強烈的尿味。然而——" 

# monologue
# JP: （ちゅるう！　ちゅっ！　ぢゅずずっ！　れろおおっ！）
1723 = "（用力吸吮）" 

# 【ポーレット】
# display as 波萊特
# JP: 「舌っ――んっ！　ふ、あっ――入って――ぬるって！\nわたしの、おまんこ――[なか,1]膣内、[すす]啜られて、んうぅっ！！」
1015 = "「舌頭——嗯！呼、啊――進來了――滑進來了！我的小穴裡面——被舔到了，嗯！！」" 

# monologue
# JP: 舌を伸ばして割りいれば、\nポーレットの膣内は熱く蕩けてなお、ぷりぷりだ。
1381 = "我把舌頭探入，波萊特的蜜穴裡頭溫度很高，觸感很軟嫩。" 

# monologue
# JP: そのせいなのか、浅く感じる肉ヒダを、\n丁寧に丁寧に舌で拭って、洗うようにして蜜を舐めとる。
1560 = "肉褶因此顯得淺了一些，我便用舌頭細緻地舔著上面的蜜汁。" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっ――ふっ――ふあっ――あっ！　おまん、こっ――\nとけるっ――ぺろぺろ、され、て――とろけ、ちゃうっ」
848 = "「呀——呼——呼啊——啊！小穴——要化了——被舔到——要化了」" 

# monologue
# JP: 尿の味はもう、舌の上から消え去っている。
1572 = "舌頭上已經沒有尿的味道了。" 

# monologue
# JP: おまんこが溶けたといっても過言ではない濃さと量との\n愛液に、舌が、口が、脳の全てが染められていく。
1261 = "大量濃稠的愛液已經侵占了我的舌頭、口腔和大腦，真的是說蜜穴溶化掉了也不為過。" 

# monologue
# JP: （ぺろっ！　れるっ！　れろおっ！　ぬろおおおっ――）
1696 = "（啾嚕——啾嚕——咕啾——咕啾）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃきゅ！　くっ――んっ――やっ――優し、ふあっ！\n――きもち、い――キス、キスっ――双鉄、くん、の！」
854 = "「呀！唔——嗯——雙鐵君的吻——好溫柔——呼啊！好舒服！」" 

# monologue
# JP: キス――と言われて、そうかと気づく。\nこれもまた、ポーレットとディープキスだと。
1289 = "她這麼一說，我也察覺到了。這也可以說是跟波萊特的深吻。" 

# monologue
# JP: ならば、唾液と唾液を交換しあうときと同じく――
1614 = "那這就跟交換唾液一樣——" 

# monologue
# JP: （チュルッ――にゅっ――ぬる――にゅろおっ）
# 1696 = "（啾嚕——啾嚕——咕啾——咕啾）" 

# 【ポーレット】
# display as 波萊特
# JP: 「や！　あっ――やわらかっ――んっ――んあっ！\nぬめっ、って――あったか――ふっ、きゅっ――ふうっ」
856 = "「呀！啊――軟軟的——嗯——嗯！滑滑的——熱熱的——呼——呼啊」" 

# monologue
# JP: ――舌の全部をべったり這わせて、\n膣の内部に僕の唾液をなすり込んでく。
1382 = "我把舌頭插入進去，在她的蜜道裡面塗上我的唾液。" 

# monologue
# JP: そうして同時に蜜を掬って、\nキスの濃度と密度を上げる。
1236 = "同時我也舔舐著她的蜜汁，讓這個吻更加深入、更加親密。" 

# monologue
# JP: （べろっ――れろっ――るっ――れるるるっ）
# 1726 = "（舔來舔去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ――あっ――双鉄、くんっ――んっ――\nあっっ――くっ――ふあっ――あっ――あんっ」
886 = "「呼啊——啊——雙鐵君——嗯——啊——呃——呼啊——啊——嗯」" 

# monologue
# JP: ポーレットの腰がもじもじ揺れる。\n心地よさげに――けれどもどこか、焦れったそうに。
1494 = "波萊特的纖腰扭動起來。她看起來非常受用，但是又好像有點不夠滿足。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ！」
893 = "「呼啊！」" 

# monologue
# JP: 舌にも、いささかの疲れが来ている。\nあるいは手指で、このまま愛撫を続けても良いが――
1398 = "我的舌頭也有點累了。接下來用手指來愛撫雖然也可以——" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……双鉄、くん――んっ――双鉄、くんも……\n今にも……おもらし……しちゃい、そうっ――」
925 = "「啊……雙鐵君——嗯——你也……現在……好像……也快尿出來了——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
985 = "「是啊」" 

# monologue
# JP: 潤みに青を深くしている瞳がまっすぐ捉えている。\nズボンの下の僕の勃起を――もうガチガチのこわばりを。
1491 = "波萊特用濕潤的藍色大眼睛盯著我。她看的是我藏在褲子下的陽具，那裡已經頂起了小帳篷。" 

# 【ポーレット】
# display as 波萊特
# JP: 「おもらし……ここ、で――」
1021 = "「要尿的話……就在這裡」" 

# monologue
# JP: 脱力をしてしまっているのか、ポーレットの体は動かない。\nけれども、声が、熱が、温度が、ここがどこかを示してる。
1502 = "波萊特身體上沒有動作，可能是因為她已經渾身脫力了。不過她的聲音和溫度告訴了我“這裡”是哪裡。" 

# monologue
# JP: 今はゆるやかなヒクつきと、中から溢れ続ける蜜が、\nなまじ大きく開くより、甘やかに僕を誘い続ける。
1524 = "現在花園的入口正輕輕開合著，蜜汁從中不斷流出。這跟大門敞開的時候不一樣，現在帶來的是一種更甜美的誘惑。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わた、しの――おまん、こ――膣で、子宮、で――精液、\nびゅうびゅう――たくさん、おもらし――して、下さい」
1023 = "「請在我的——小穴裡——陰道裡——子宮裡——射出好多精液——在裡面尿出來吧——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 946 = "「嗯」" 

# monologue
# JP: 抱き上げ、キスして、床に立たせる。
1373 = "我把她抱起來，輕吻一下，然後放在地上。" 

# monologue
# JP: 服を脱ぐ自分の指さえもどかしい。\nベッドまで移動する時間も惜しい。
1610 = "連脫衣服都讓我感覺著急。連走到床那邊要用的時間我都不想浪費。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん……双鉄くぅん」
1048 = "「雙鐵君……雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！」
1002 = "「波萊特！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「きゃっ！？」
860 = "「呀！？」" 

# monologue
# JP: 体と心の求めるままに、ポーレットの足を抱き上げる。
1418 = "我遵從著內心的欲望，把波萊特的腿抱了起來。" 

# monologue
# JP: 弾みでバランスを崩しかけたポーレットの手が、\n支えを求めてシンクに落ち着く。
1482 = "波萊特一時間失去了平衡，慌忙把手撐在了水槽上。" 

# 【双鉄】
# display as 雙鐵
# JP: 「っと……姿勢、キツいか？」
866 = "「呃……這個姿勢會難受嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ううん、双鉄くん」
827 = "「不會的，雙鐵君」" 

# monologue
# JP: ポーレットが僅かに首を振る。\nずれたエプロンに強調されたたわわな胸も甘く震える。
1504 = "波萊特輕輕搖頭。從圍裙中顯露出來的誘人雙峰也跟著上下起伏。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
1001 = "「波萊特」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――んっ……」
911 = "「啊——嗯……」" 

# monologue
# JP: 今度のキスは、双方向だ。
1607 = "這次的接吻是我們兩人一起主動。" 

# 【ポーレット】
# display as 波萊特
# JP: 「んっ……ちゅっ――ちゅむっ――ちゅうう――ちゅっ\n――ぷ、あっ――ん――れろっ――れるっ――れろおっ」
942 = "「嗯……啾——啾嚕——啾啾——啾嚕——呼、啊——嗯——啾嚕——啾嚕——啾噗」" 

# monologue
# JP: ポーレットの方から舌を、僕の口内にねじ込んでくる。
1483 = "波萊特主動把小舌伸進了我的嘴裡。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……むっ――んっ――れるっ――えろぉっ――ン\n――ちゅっ――ちゅるっ――はむっ――れるうっ」
924 = "「啊……嗯——嗯――啾嚕――啾噗――嗯――啾噗――啾噗――啾嚕――啾噗」" 

# monologue
# JP: 唾液が流れ込んできて、舌へと舌が抱きついてくる。\n吸われ引かれて舌を伸ばせば、唇が舌を挟んで扱く。
1281 = "她的唾液流了進來，舌頭也跟我的纏在一起。在她的吸引之下我伸出舌頭，就立刻被她的嫩唇吸住了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「んーむっ――ちゅ――はむ――ちゅるっ――ちろ、\nちるる――れろっ――れるうっ――」
938 = "「嗯——唔——啾嚕——啾嚕——啾噗——啾噗——啾嚕——啾嚕——啾噗——」" 

# monologue
# JP: 唇に甘くホールドされたそのままに、舌先だけを、\nちょんちょんちょんちょんくすぐるように[ついばま]啄まれる。
1276 = "她用唇瓣輕輕夾住我的舌頭，然後用舌尖輕輕啄了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
905 = "「唔！」" 

# monologue
# JP: （すりっ――くちゅっ――ずりっ――ぐいっ）
1729 = "（蹭來蹭去）" 

# monologue
# JP: そして同時に、勃起も熱くこすられる。
1566 = "與此同時，我的分身也被用力磨蹭著。" 

# monologue
# JP: もうとろとろのポーレットのおまんこの柔肉は、\n僕の勃起に張り付きながら、幾度も幾度も前後する。
1503 = "波萊特軟軟的蜜穴緊緊地扣在陽具上，不停地前後套弄。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぷあっ――あっ……ポーレット」
888 = "「呼啊——啊……波萊特」" 

# monologue
# JP: キスをほどいて、僕の方からも腰を動かす。
1432 = "接吻完畢後，我也開始動起腰來。" 

# monologue
# JP: いくども重なり合ってる肌は、\nお互い同士を、吸い付くように求め合う。
1355 = "我們兩個人已經結合過多次的身體又互相索求著，緊緊貼在一起。" 

# monologue
# JP: （ぐッ――ぐりゅっ――くっ――んっ――）
1733 = "（鑽來鑽去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ――あっ――焦らし、ちゃ――\nやぁ――ですっ――んううっ――あっ！」
849 = "「呀——啊——不要——挑逗啦——嗯——啊！」" 

# monologue
# JP: だが、焦らす。亀頭のくびれの裏を使って、\nクリトリスの、あえて根の部分。
1515 = "然而我依然挑逗著她。我用龜頭背面的溝壑撥弄著她花蒂的根部。" 

# monologue
# JP: 珠へと繋がる膨らみを、幾度も幾度も縦になぞって\n勃起の熱と匂いと汁とを染み込ませていく。
1391 = "我用龜頭上下頂撞著珍珠，讓它沾染上我的溫度和氣味。" 

# 【ポーレット】
# display as 波萊特
# JP: 「は……ぁっ――ンッ――ふあっ――あっ――\nこれ……好きっ――んっ――くっ――ぁ――はぁ」
883 = "「呼……啊——嗯——呼啊——啊——我喜歡……這樣——嗯——唔——啊——呼啊」" 

# monologue
# JP: 青い瞳が、快感の波に揺れている。\n少し濁ったこの色は、世界で僕だけが知る美しさだ。
1500 = "波萊特藍色的瞳孔因快感露出了陶醉的神色。世界上只有我一個人能看到這有點渾濁的美麗色彩。" 

# 【双鉄】
# display as 雙鐵
# JP: 「何が……どうして、――好き、なのだ？」」
838 = "「你喜歡……怎麼樣？」」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――うっ」
931 = "「啊嗚」" 

# monologue
# JP: 問えば、恥入り言葉に詰まる。\nけれど、必ず。必ずだ。
1416 = "我這麼一問，她就羞得一時語塞。但是答案是必然的。" 

# monologue
# JP: ポーレットはその責任感から、\n蕩けた声で――僕の望んでる答えをくれる。
1484 = "波萊特也感受到了責任感，她用動情的聲音說出了我想要聽到的答案。" 

# 【ポーレット】
# display as 波萊特
# JP: 「こしゅっ――こしゅ――される、と……んっ――\n気持ち、いいの、が――たまる――みたい、でっ」
1017 = "「被蹭到的話……嗯——快感——就好像——積累了起來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「気持ちいいのが、いったいどこに、溜まるのだ？」
970 = "「快感積累到了哪裡呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「くり……とり、す――からッ――」
967 = "「從……陰蒂」" 

# monologue
# JP: （ぬるんんっ！）
1739 = "（頂撞）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
904 = "「唔」" 

# monologue
# JP: 確かめるようにポーレットの腰が押し返してくる。
1505 = "波萊特頂了一下我，就像是在確認一樣。" 

# monologue
# JP: 裏筋を陰核突起に刺激され、殆ど漏れかけてしまった声を、\nすんでのところで飲んで堪える。
1223 = "包皮細帶受到了陰蒂的刺激，我強忍著才堪堪沒有叫出聲來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「クリトリス――から――つたわ、って……ふっ――\nおまん、こ――の、奥――子宮、に――たま、って」
968 = "「從陰蒂……呼——到小穴裡——在子宮裡積累」" 

# monologue
# JP: （ぐいっ！）
1717 = "（收腹）" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぁぁっ――」
# 936 = "「嗯——」" 

# monologue
# JP: 下腹が、ここだといわんばかりに凹み、またふくらむ。\nその振動がまた伝わって、勃起も更に暴れてしまう。
1273 = "她收了收小腹，然後又鼓起來，示意子宮就在那裡。這個動作引起的振動也傳到了我身上，讓陽具膨脹得更厲害了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ！　んっ……きもち、いい、のが――子宮に、\nたまって――精液、ほし、くて――溶かされ、たく、て」
897 = "「呼啊！嗯……快感——積累在子宮裡——我好想要精液——想要被燙化」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！！！」
1053 = "「！！！」" 

# monologue
# JP: 声が鼓膜から流れ落ち、僕の精液を増産してく。\n睾丸は、もうぱんぱんに溜まりきってる。
1284 = "她的聲音振動我的鼓膜，沿著神經直接讓我精液開始增產。我的睪丸已經積滿了精液。" 

# monologue
# JP: 射精したい。ポーレットの中に思い切り。\n思いは自然、腰の動きに変化を強いる。
1362 = "我好想在波萊特體內盡情地發射。這個念頭自然讓我有了動作。" 

# monologue
# JP: （くっ――ちっ――くっ――りゅっ）
# 1729 = "（蹭來蹭去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あっ！　んっ……先――ぽっ――\nぐりゅ、って――入り口――の、と、こっ――んっ」
876 = "「呼——啊！嗯……前端——鑽進了——入口——那裡——嗯」" 

# monologue
# JP: ポーレットの腰が動いてしまう。\n抱いてる僕も、立っているゆえどうにも安定感が出ん。
1497 = "波萊特的腰也動了起來。因為我是站立的姿勢，這樣抱著她感覺有點不穩。" 

# monologue
# JP: （にゅっ――るっ――ぬるっ――にゅるんっ！）
# 1729 = "（蹭來蹭去）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ん……くっ――ふあっ――あっ！　ちがっ――\nそこっ！　んっ――やぁ――なの――焦れっ――たい」
940 = "「嗯……呼——呼啊——啊！不對——那裡！嗯——討厭——我好心急」" 

# monologue
# JP: 求め合い、吸い付きあうのに、いつものピタリといかない。
1354 = "我們互相渴求著對方，但是卻不能像平常一樣緊貼在一起。" 

# monologue
# JP: それが快感を高めもするが、僕とてあまりにもどかしく、\n余計に腰が暴れてしまう。
1606 = "這樣雖然可以增強快感，但是也讓我心急地亂動起來。" 

# monologue
# JP: （ぬるっ！　るっ――りゅっ！　るぬんっ！！）
1720 = "（滑溜）" 

# monologue
# JP: 愛液、僕の先走り。\n豊富にすぎる潤滑油たちが、今このときは恨めしい。
1339 = "愛液加上我的預射液。過於豐富的潤滑液現在反倒礙事了。" 

# monologue
# JP: どうにか――どうにか腰を落ち着けないことには、\n摩擦で射精をしかねぬほどに気持ち良すぎる。
1253 = "在這不安定的動作之中，卻也產生了光是摩擦就快要射精的快感。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ね？　ね……双鉄、くん――いいこ、して？」
1038 = "「那個……雙鐵君——你停一下」" 

# 【双鉄】
# display as 雙鐵
# JP: 「！！？」
1054 = "「！！？」" 

# monologue
# JP: これほどぬめる汗と雫と。止まることなど出来無い腰と。\n発情しきった雌の体温と体臭を溢れさせ。
1489 = "波萊特已經完全被汗水和愛液打濕，動作也完全沒有停下來過。而且她還散發著女性特有的體溫和氣味。" 

# monologue
# JP: 完全に上ずった声でそれでもなお、\nポーレットは、僕を落ち着けようと――
1495 = "波萊特的聲音也已經完全動了情，現在她卻叫我停下動作——" 

# 【ポーレット】
# display as 波萊特
# JP: 「おちん、ちん――ふ、あっ――ね？――落ち着いて――ンッ――いいこ、いいこ――で――入線、しよ――ね？」
1050 = "「雞雞——呼——那個——停一下——嗯——慢慢地——進站吧」" 

# monologue
# JP: ――ああ、いや。そうか。つまりは、これも運転だ。\n僕とポーレットとの間には、すでに路線が結ばれてるのだ。
623 = "——噢，原來如此。我們現在就好比是在開火車。我和波萊特之間已經建好了鐵路。" 

# 【双鉄】
# display as 雙鐵
# JP: （そうだ……そうだった）
1709 = "（對啊……就應該是這樣）" 

# monologue
# JP: 幾度も重なりあってる柔肌で、幾度も抉ってる膣口だ。\n慣れぬ姿勢が、それをどれほど新しいものと感じさせても。
1365 = "我已經多次跟她結合，多次進入她的蜜穴。縱使嶄新的體位感覺非常新鮮。" 

# monologue
# JP: 理解をすれば、この体勢でもはっきり見える。\n加速の必要などまるでない。今すべきことは緩制動で――
1234 = "只要明白了原理，這個姿勢的特點也能分析明白了。我沒有加速的必要，現在只需要慢慢剎車——" 

# 【ポーレット】
# display as 波萊特
# JP: 「ゆっくり――ゆっく、りっ――いいこ、いいこ、で――\nおまんこっ、ここ、で――待ってる、から――はうっ！」
974 = "「慢慢地——慢慢地——乖乖地——小穴——就等在這裡——啊嗚！」" 

# monologue
# JP: （つぷっ！！）
1701 = "（噗哧）" 

# monologue
# JP: 誘導されて、落ち着いて。\nいつものように、亀頭の全部が膣の中へと押し入っていく。
1250 = "在她的誘導之下，我不急不忙地進入，就跟平常一樣，把龜頭全部推入蜜壺之中。" 

# monologue
# JP: 包み込まれる圧迫感と安心感。\nそうして、肉の蠢きが――
1226 = "包裹帶來的壓迫感和安心感。然後蜜肉的蠕動——" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
932 = "「啊！」" 

# monologue
# JP: 加速する。加速を体が強いてくる！\n落ち着いてなど、とてもいられるわけがないっ！！
1414 = "我要加速，我的身體在讓我加速！我根本停不下來！" 

# monologue
# JP: （ずっ――ずりゅっ――ぬっ――にゅぶうっ――）
1694 = "（啾噗——啾噗——啾啪——啾啪——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――あっ――来たっ、来てるっ――んっ！\n双鉄、くんの――熱い、の――太い、のっ――」
875 = "「呼——啊——進來了——嗯！雙鐵君的——熱熱的——粗粗的——」" 

# monologue
# JP: むちむちしているおまんこ肉は、\nむちむちしながら、決して僕を押し出そうとは動かない。
1595 = "軟嫩的蜜肉擠壓著陽具，但是完全沒有要把我排出去的動作。" 

# monologue
# JP: （ぬるっ――にゅるっ――ぬっ――ぬとおおおっ――）
1725 = "（用力擠壓）" 

# monologue
# JP: 舐めてたときには浅く感じてた肉襞が、\nけれども勃起で密着すると、こうも的確に責め立ててくる。
1215 = "剛才舔的時候感覺很淺的肉褶，貼合在陽具上卻帶來了強烈的刺激。" 

# monologue
# JP: （ずっっ！　ずぶっ！　にゅるうっ！　ずぼおっ！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「かっ――ふあっ――おな、か――おまん、こっ――\nんっ――これ――すご――えぐれ――てっ――ふあっ！」
906 = "「啊——呼啊——肚子——小穴裡——嗯——這樣——好厲害——被挖到了——呼啊！」" 

# monologue
# JP: そうだ。まさしく抉ってる。\nポーレットのおまんこの肉を、膣内を。
1451 = "沒錯，我就是在挖著裡面。我在挖掘著波萊特美妙的蜜壺。" 

# monologue
# JP: 亀頭で刺して抉り侵して――それでも膣の柔肉は、\n密着しながらざわめき動き、奥へ、奥へと僕を誘う。
1392 = "我用龜頭分開包圍向深處刺去，蜜肉卻依然緊貼著陽具，蠕動著邀請我向更深的地方出發。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット！　もっとだ――くっ！\nもっと――深く、にっ」
1003 = "「波萊特！更深一點！更深的地方」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――ぁっ――はい、双鉄、くん――んっ！\n来て――くだ、さ――いっ――ふあっ！！」
873 = "「呼——啊——好的，雙鐵君——嗯！來吧——呼啊！！」" 

# monologue
# JP: （ずぶうううううううううううっ！！！）
1735 = "（長驅直入）" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 935 = "「啊！！！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふっ――きゅううううううううっっ！！！」
892 = "「呼啊啊啊啊！！！」" 

# monologue
# JP: 呼吸が、動きが、マッチする。\n呼び合い、深く求め合い、だからお互いを喰らい合う。
1356 = "我們的呼吸和動作都一致了。我們呼應著彼此、渴求著彼此，所以更要緊緊結合在一起。" 

# monologue
# JP: （ずっ――ぬっ――ずぶっ――ずりゅっ！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――んっ――ふっ――あた、るっ――んっ――\n奥っ！　んっ――ちゅっ――って――あたっ――てっ！」
878 = "「呼——嗯——呼——頂到了——嗯！最深處！嗯——親上了——頂上了！」" 

# monologue
# JP: 子宮に、亀頭がキスしてる。\nだけれど、強くノックをできない。
1399 = "我的龜頭吻上了她小巧的子宮。但是我卻不能用力頂撞。" 

# monologue
# JP: （ずっ！　ゆさっ――ずりゅっ！　ずぶっ！）
1706 = "（夾緊）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んきゅっ！　あっ――双鉄――くぅんっ！　んっ、\nもっと――ふか、くてっ――へい、きっ――わたしっ」
949 = "「嗯！啊——雙鐵！嗯——再深一點——我也——沒關係」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 946 = "「嗯」" 

# monologue
# JP: わかってる。\n僕とてゴンゴン、最奥へ亀頭を叩きつけたい。
1401 = "我知道的。我也想用龜頭盡情頂一頂她的花芯。" 

# monologue
# JP: 思いっきりにぶつけたいのだが――
1618 = "雖然我很想用力頂入——" 

# monologue
# JP: （ゆさっ！　ずううっ！　ずぶっ！　にゅぶっ！）
# 1706 = "（夾緊）" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっ――あっ――足っ――んっ――ふっ――は、あっ、\nこれっ――だめっ――腰――浮い、て――んうっ！」
913 = "「啊——腿——嗯——呼——呼啊——這樣——不行——腰——抬起來了！」" 

# monologue
# JP: 寝ているときほど深くみっちり押し付けられない。\n一番最後の最後の部分で、体勢の差が出てしまう。
1523 = "現在不像她躺著的時候能插入到最深處。在這最後關頭，體位帶來的差距顯現了出來。" 

# monologue
# JP: （ずっ――ズウうう――るっ！！）
1715 = "（推進）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！　あっ――んっ――ふうっ――ふあっ！」
855 = "「呀！啊——嗯——呼——呼啊！」" 

# monologue
# JP: 最後の最後に到達しようと腰を思い切り押しこむたびに、\nけれどポーレットの腰が浮く。
1389 = "我用力往裡擠著，想要到達最深處，可是這樣卻會讓波萊特的腰抬起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら、ばっ――」
1043 = "「那我就——」" 

# monologue
# JP: （ぐ、ぐいっ！　ぐっ――ずりりゅ――ぬるっ！？）
1713 = "（拔出）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ！　やっ――抜けっ！？　らめっ！\nおちんちん、だめっ！　いかないでぇっっ！」
933 = "「啊！不要拔出去！不要！雞雞不要出去！不要拔出去！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
953 = "「嘿」" 

# monologue
# JP: （ズッ――ずぶっ――るっ！）
1716 = "（插入）" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうっ！　いいこっ――ねっ――なか、でっ――んっ、\nここ、が――おまんこ――あなた、の――おう、ちっ」
966 = "「對！乖乖的——就在裡面——嗯——這裡——小穴裡面——就是你的家」" 

# monologue
# JP: 勢いを借り一気にいこうと大きく動いてみたのなら、\n亀頭はたやすく抜けそうになる。
1372 = "我想藉著勢頭一口氣插入，但是龜頭卻很輕易地滑出來了。" 

# monologue
# JP: これほどみっちり締められてなお、\nポーレットの肉が柔らかすぎて――っ！
1228 = "即使波萊特的蜜肉夾得很緊，但實在還是太軟了。" 

# 【双鉄】
# display as 雙鐵
# JP: （ああ……そうか。柔らかいから、ほぐれているから。\n浮いて、逃げ出してしまうのか）
1698 = "（嗯……對啊。就是因為太軟了，太放鬆了。所以她的腰才會抬起來，溜走了）" 

# monologue
# JP: 理解はすぐに、解決策へと直結していく。
1535 = "知道原因之後，我馬上想到解決的辦法。" 

# monologue
# JP: ポーレットのやわらかすぎるたぷたぷ肉を、\n瞬時に硬直させる方法――それなら、僕は知っている！
1588 = "要讓波萊特軟嫩的蜜肉瞬間僵硬起來，我知道有一個方法可以達到效果！" 

# monologue
# JP: （ぐっ！）
# 1712 = "（抱起）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あんっ！」
# 932 = "「啊！」" 

# monologue
# JP: 足を抱えて――尻を支えてる肉を掴んで、\nそのまま指を伸ばし、伸ばして――
1383 = "我抱起她的腿，也就是支撐著她臀部的支柱，然後伸出手指——" 

# monologue
# JP: （とんっ！）
1691 = "（咚）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃうっ！？」
# 860 = "「呀！？」" 

# monologue
# JP: （つぷっ！）
# 1701 = "（噗哧）" 

# 【ポーレット】
# display as 波萊特
# JP: 「んきゅんっ！！！！」
947 = "「嗯呀！！！！」" 

# monologue
# JP: （キチチチチッ！）
# 1706 = "（夾緊）" 

# monologue
# JP: 指先をほんの僅かに食い込ませようとしただけで、\nポーレットの小さな尻穴は、引きちぎるほど反撥をする！
1359 = "我只是把指尖插進去一點，波萊特小小的菊穴就好像要把它夾斷一樣！" 

# monologue
# JP: だが、それゆえに今ならば！\nこの硬直した下半身ならっ！
1205 = "但是現在就正好了！趁著她的下半身僵直的時候！" 

# monologue
# JP: （ずぶぶうううううううううううっ！）
# 1716 = "（插入）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あひゅんっ！！！」
850 = "「呀啊！！！」" 

# monologue
# JP: （ごんっ！）
# 1691 = "（咚）" 

# 【ポーレット】
# display as 波萊特
# JP: 「きゅはっ！！！」
# 935 = "「啊！！！」" 

# monologue
# JP: 一番奥を、強く叩いた。\n子宮のドアに勃起スタンプを押し当てた。
1213 = "分身一口氣插到了最深處。我在她的子宮口上蓋上了屬於我的印記。" 

# monologue
# JP: 達成感が快感が、強烈単純に入り混じり、\n僕の動きを獣のそれと変わらなくするっ！
1340 = "成就感和快感交織在一起，驅使著我遵從獸慾做出了誇張的動作！" 

# monologue
# JP: （ずぶっ！　ずぼっ！　ずぱんっ！　すぱんっ！！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 

# monologue
# JP: 肉と肉とのぶつかり合う音。接合部からはじけ飛ぶ蜜。\nだらだらどろどろ溶け合っていく汗と体温と体臭と――
1561 = "肉體相撞的聲音。從結合處飛濺而出的愛液。我們兩人的汗水、體溫、體味都融合在了一起——" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！　あっ！　これえっ！　これっ！　しゅきっ！　いちばんっ！　いちばんっ！　だい、しゅきいっ！」
859 = "「呀！啊！這樣！這樣！我喜歡！我最喜歡！我最喜歡這樣！」" 

# monologue
# JP: （ずばんっ！　ずぶっ！　ずぼっ！　じゅぱんっ！！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 

# monologue
# JP: リズムが産まれ、密着しあったふたつの体が、\nひとつの重心にバランスを見る。
1357 = "我們結合在一起的身體在律動之中漸漸有了一個能保持平衡的重心。" 

# monologue
# JP: （ずぶっ！　ずばんっ！　じゅぼっ！　ずぶううっ！！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 

# monologue
# JP: 動ける、抉れる。思うがままに。
1408 = "我能盡情挺動，能盡情衝刺。" 

# monologue
# JP: 不自由な体勢だったからこそ、今までなかった密着感が、\n僕らを強烈に包み溶かして同化させてく！
1446 = "正因為剛才用了非常不自由的體位，現在這種緊密結合更是讓我們感覺到了融合的快感！" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふあっ！　あっ！　あっ！　あっ！　双鉄、くんっ！\nあっ――子宮！　もっと！　叩いて、もっぉ！」
895 = "「呼啊！啊！啊！啊！雙鐵君！啊——子宮！再多來！頂一頂！」" 

# monologue
# JP: （ずばっ！　じゅぼっ！　ぐりゅりゅっ！　ずぶうっ！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「わか、るつ――ぷくっ、て！　双鉄、くん――の――\nおちん――ひゅいっ！　あっ――おちん、ちんぅ」
980 = "「我感覺得到——漲大了！雙鐵君——你的雞雞——啊！啊——雞雞漲大了」" 

# monologue
# JP: ぷくっとしてる。しまくっている。\n尿道をのぼり亀頭まで、白濁液が押し寄せている。
1617 = "陽具已經膨脹到了極點。精液正在沿著尿道前進，就要到達龜頭了。" 

# monologue
# JP: 精液はもう冒進しそうで限界で――\n入線許可を、青信号を、狂おしいほどに待ち望んでる！
1552 = "精液已經快要闖信號了——它在等待著進站許可，在等待著綠燈亮起！" 

# monologue
# JP: （ずぶっ！　ずばっ！　じゅぶっ！　じゅぶんっ！！！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「きてっ！　きて！　きて！　双鉄、くんっ！\nわたしの、おく、に――子宮！　子宮、にっ！！」
841 = "「來吧！來吧！來吧！雙鐵君！射在我的——子宮！子宮裡！！」" 

# monologue
# JP: （きゅんっ！　きゅううっ！　きゅむっ！　きゅいっ！）
# 1694 = "（啾噗——啾噗——啾啪——啾啪——）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くはっ！」
# 932 = "「啊！」" 

# monologue
# JP: むちむちすぎる膣壁に、上下左右にとどまらず、\n前方からも甘い刺激を貼り付けられる。
1594 = "軟嫩的蜜肉不僅是從上下左右四個方向，更是從前方也帶來了刺激。" 

# monologue
# JP: 快感はもう麻痺に近くて、ちんちんとおまんこの区別も\n付かず、それでも腰は浅ましいまでに貪り続け――
1328 = "快感已經類似於麻痺感，肉棒和小穴幾乎已經混為一體，然而我還是只顧做著活塞運動——" 

# 【ポーレット】
# display as 波萊特
# JP: 「はっ――ひっ――いっ、ぐっ――ンッ――あっ――\nそうて、つ――くんっ――はっ！　双鉄、くぅんっ！」
868 = "「呼——啊——丟了——嗯——啊——雙鐵——啊！雙鐵！」" 

# monologue
# JP: 声だけが。ただポーレットの声だけが。\n射精欲求に染まりきってる僕の脳へと、刺激をくれる。
1404 = "我聽到了波萊特的聲音。現在只有波萊特的聲音能給我被射精欲占滿的大腦帶來一點刺激。" 

# 【ポーレット】
# display as 波萊特
# JP: 「おちん、ちん――ね？　ぴゅっぴゅって！　はっ――\nせい、えい――精子――ぴゅっぴゅって、してぇっ！」
1049 = "「雞雞——來？射出來吧！呼——精液——精子——都射出來吧！」" 

# monologue
# JP: （きゅんっ！　きゅきゅん！！！）
# 1706 = "（夾緊）" 

# 【双鉄】
# display as 雙鐵
# JP: 「くあっ！」
# 932 = "「啊！」" 

# monologue
# JP: （びゅうっ！　びゅっ！　どびゅっ！　びゅるるっ！）
1704 = "（噗噗！噗噗！噗嚕！噗嚕！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふぁぁぁぁぁぁぁぁぁっぁぁぁぁぁぁぁぁっ！！！」
891 = "「呼啊啊啊啊啊啊！！！」" 

# monologue
# JP: （ずるっ――びゅぶっ！　びゅう！　びゅるるっ！）
# 1704 = "（噗噗！噗噗！噗嚕！噗嚕！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひゃっ！？　抜けっ――んっ！　あつ、っ！　ふあ！」
864 = "「呀！？拔出去了——嗯！好燙！啊！」" 

# monologue
# JP: （びゅぶっ！　びゅううっ！　どびゅっ！　びゅるっ！）
# 1704 = "（噗噗！噗噗！噗嚕！噗嚕！）" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……熱っ、いっ――んっ――ふあっ――あっ――\nおだい、どこっ――エプロ、ん――わた、し――もっ」
958 = "「好……好燙啊——嗯——呼啊——啊——廚房——圍裙——還有我——」" 

# monologue
# JP: （びゅるっ！　びゅっ！　びゅうっ！）
1702 = "（噗噗！噗噗！噗噗！）" 

# monologue
# JP: 穢してる。シミひとつ無い肌をエプロンをキッチンを。\n濁った、僕の精液が。
1419 = "我黏稠的精液把她雪白無暇的肌膚，還有圍裙和廚房都玷汙了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ふぁ……コート……され、てる――ンッ――\nわたし、双鉄、くん――ホワイト、ソース――でっ――」
890 = "「呼啊……我被淋上醬料了——嗯——雙鐵君——你的白汁——把我澆了一遍」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふっ」
954 = "「噗」" 

# monologue
# JP: 思いもかけぬ発言に、思わず、笑いをこぼしてしまう。\nついでにこぼれた精液が、ぬとり、と床を汚してしまう。
1333 = "意料之外的話語讓我不禁笑了出來。黏稠的精液滴到了地板上，把地板也弄髒了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ホワイトソースに、レモンドレッシング。\nポーレットという極上肉は、さすがに和え物も豪華だな」
1007 = "「白汁醬料加上檸檬汁。你這塊上好的好肉，調料當然也要豪華一點」" 

# 【ポーレット】
# display as 波萊特
# JP: 「レモン……ドレッシング？　って――えっ！？　\nひゃっ！？　やあんっ！！？」
992 = "「檸檬汁？呃——哎！？呀！？呀！！？」" 

# monologue
# JP: 顔を一気に真っ赤に染めて、\nポーレットがはげしくイヤイヤをする。
1493 = "波萊特的小臉一下子就變得通紅，只見她用力搖著頭。" 

# monologue
# JP: そのたび精液が飛び散るのだが――\nどちみち、あとで大掃除するのは確定だ。
1264 = "她一搖頭精液也跟著甩出去了——反正事後要做大掃除，這點就不算問題了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 929 = "「啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 952 = "「嗯？」" 

# monologue
# JP: いやいやが、そして視線が、いきなり止まる。\n止まり注がれるその先は――
1266 = "她停止了搖頭，然後視線停留在了一個方向。她看的東西是——" 

# 【双鉄】
# display as 雙鐵
# JP: （ボウル――だな）
1707 = "（她看的是碗）" 

# monologue
# JP: あとでトイレに流そうと、\n中身も、いまだ満ちっぱなしの。
1540 = "碗裡面現在依然裝滿了尿水——本來打算在廁所倒掉的液體。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……あの……ね？　双鉄、くん――その……\nえと……さっき……言ってた、かな……って――」
1032 = "「那……那個，雙鐵君——那個……你剛才……說過……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「う、うむ」
945 = "「嗯、嗯」" 

# monologue
# JP: 甘えきっていて、不安げで。\nその声はもう、どこから聞いてもポーレットのもの。
1608 = "這聲音有幾分柔媚，又有幾分不安。最重要的是這是波萊特的聲音。" 

# monologue
# JP: だから、予想は簡単だ。\n次にどんな、弱気なお願いが続いてくるのか。
1420 = "所以我很容易就能猜到她接下來要提出什麼請求了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「え……と――汚れ、わたし、の――そのっ――\n双鉄、くんっ――が――あのっ」
1036 = "「那個……我的——髒東西——就是——你說——你會——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、約束した。ポーレットがそれを汚れと思うなら、\n僕が必ず、受け止めようと」
950 = "「嗯，我跟你約好了。如果你覺得那是髒東西的話，我就一定會全部接下」" 

# monologue
# JP: 射精直後の、いわゆる僕は賢者モードだ。\nだから無理やり、理性を熱情で埋め戻す。
1388 = "我現在處於射精後的聖人模式。所以我現在要用熱情替代理性。" 

# monologue
# JP: 考えてしまっては、果たせなくなる。\nただ、愛だけに――我と我が身を任せればいい。
1290 = "如果仔細去想的話，那就沒有止境了。所以我只要把自己全盤交給心中的愛意來主導就好。" 

# 【双鉄】
# display as 雙鐵
# JP: 「これを、汚れと――\nそう、ポーレットは感じているのか？」
1029 = "「這個——波萊特，你覺得這個是髒東西嗎？」" 

# monologue
# JP: いいつつ、ボウルを持ち上げる。\n匂いは、さっきより濃くなっている。
1343 = "我一邊說著，一邊捧起了碗。尿液的氣味比剛才更濃重了。" 

# monologue
# JP: 空気に触れて、恐らく激しく雑菌が――\nいや！　違う。今は考えるべき時間ではない。
1249 = "因為接觸到了空氣，估計混進了不少細菌——不對。這樣不對，現在我不應該想這個。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁ――」
# 929 = "「啊」" 

# monologue
# JP: ポーレットの口が半開きになる。\nその目は僕を、じっと見つめる。
1492 = "波萊特的小嘴無意識地張開了。她凝視著我。" 

# monologue
# JP: 期待と、不安と、喜びと――\nそのどの色にも、見える瞳が。
1324 = "從她的眼眸中，我可以看到期待、不安、喜悅——" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの……えっと――双鉄、くんっ――。\nそれ、えと……わたし、の――おし、っこ――」
1037 = "「那個……我說——雙鐵君——唔……把我的——尿——」" 

# monologue
# JP: そうして。静かに。とても、静かに。\n言葉が、ひとつ。たったひとつだけつむがれる――
1512 = "然後她就靜靜地，非常小聲地——說出了那個詞。" 
