2094 = "「而且一定還有一條通向這裡的支線」" 

# 【双鉄】
# display as 雙鐵
# JP: 「支線？」
2006 = "「支線？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　ウソ、なんでっ！」
1826 = "「咦！？　不會吧，為什麼！？」" 

# 【れいな】
# display as 玲奈
# JP: 「だってだって、これ、\n発電所のマークじゃないですかぁ」
1878 = "「因為你看，這個是發電廠的標誌呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 2209 = "「！！！」" 

# monologue
# JP: ああ、そうだ。\nあの鉱山には、確かにいくつも、電動らしき設備があった。
2445 = "啊，沒錯。在那座礦山中，有很多台電力設備。" 

# monologue
# JP: そして、市内から術仙炭鉱には、\n送電線が伸びてきてなどいないのだから――
2704 = "而御一夜市內並沒有向術仙煤礦架設電線。所以——" 

# 【ポーレット】
# display as 波萊特
# JP: 「発電所への、支線」
2153 = "「這是通往發電廠的——支線」" 

# 【れいな】
# display as 玲奈
# JP: 「宿舎があるの、ここですよねぇ？」
1921 = "「宿舍是在這個地方吧？」" 

# monologue
# JP: 短い指が差す点に間違いはない。
2665 = "的確是在她所指的地方。" 

# monologue
# JP: 地図上で見れば、発電所と宿舎――\n単純な直線距離で測っても、5km以上は離れている。
2506 = "從地圖上來看，發電廠與宿舍之間——即使按直線距離來算，也有５公里以上的距離。" 

# 【れいな】
# display as 玲奈
# JP: 「こんなとこまで、山道越えて歩けないですよぉ。\nだから、ぜーったい支線があったって思います」
1737 = "「人們是沒辦法翻山越嶺走那麼遠的。所以玲奈覺得，一定有一條支線」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうよね。人員も資材も運ばなくちゃいけないし……\nそれに……考えてみたら鉄道資材がどこにもなかった」
2022 = "「是啊。不管是人員還是材料都需要運送……而且仔細一想……我們完全沒有看到鐵路器材」" 

# monologue
# JP: 解体され、持ち去られたのかと反射で思うが――\nそれをするなら、周辺線路も、工場設備も残さんだろう。
2561 = "我頭一個想到的是被拆卸運走了——但如果是這樣，那也不會將周邊的鐵軌及工廠設備留下吧。" 

# monologue
# JP: なら、どこか――たとえば、その支線沿いに……
2779 = "那麼，或許就在某處——比如說，在這條支線的途中……" 

# 【ポーレット】
# display as 波萊特
# JP: 「行きましょう、双鉄くん」
1973 = "「我們走吧，雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
# 1871 = "「嗯！」" 

# monologue
# JP: 完全に、ポーレットが戻ってきてくれる。\nその目に再び、強い光が宿っている。
2616 = "波萊特已經完全找回了狀態。她的雙眸再次閃爍起了堅定的光芒。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お手柄だな、れいな」
1772 = "「你立了大功啊，玲奈」" 

# monologue
# JP: 頭を撫でれば、\n気持ち良さそうに目を細める。
2544 = "我撫摸著她的腦袋，她很享受地眯起了眼睛。" 

# 【れいな】
# display as 玲奈
# JP: 「えへへへ、れいな。\nお役にたてたならうれしいですよぉ」
1875 = "「嘿嘿嘿嘿。玲奈很高興能幫上忙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「できれば、これからさらにお役に立ってもらいたい」
1895 = "「如果可以，我希望你接下來能提供更多的幫助」" 

# monologue
# JP: 僕の言葉に、ポーレットも強く頷いてくれる。
2716 = "聽我說完，波萊特也重重地點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「術仙廃炭鉱の再調査。\nれいなにも同行をしてもらいたい」
1974 = "「我們重新去調查術仙廢煤礦。這次我希望玲奈也同行」" 
