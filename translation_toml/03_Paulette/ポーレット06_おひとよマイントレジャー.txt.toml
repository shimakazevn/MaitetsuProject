[script]
# lines: 380 
# 【ポーレット】
# display as 波萊特
# JP: 「宝探しですか？」
1931 = "「尋寶？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん、宝探し。\n小さなころ、僕が一番好きだった遊びだ」
1873 = "「嗯，尋寶。我小時候最喜歡的遊戲」" 

# monologue
# JP: 言った瞬間、日々姫がハっと僕を見る。\nその顔に、そうだったかと思い当たる。
2715 = "聽我說完，日日姬驚訝地望著我。看她的表情彷彿是在說“是這樣的嗎”。" 

# monologue
# JP: 小さな頃の――事故より前の想い出を、\n僕は今日まで、話そうとも思い出そうともしていなかった。
2557 = "我至今為止從來沒有提起過事故發生前的事情，也不願去想起。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ふたごだったから。誕生日にも、クリスマスにも。\nプレゼントはいつでも、ふたつだった」
1879 = "「因為我們是雙胞胎，無論是在生日還是聖誕節，禮物一直都是雙份的」" 

# monologue
# JP: ……今までずっと閉じ込めていた、\n路子とすごした子供時代を、こうも静かに話せている。
1454 = "……我如此平靜地講著那段被我封印至今的，與路子度過的童年。" 

# monologue
# JP: それを不思議とは感じない。\n苦しみではなく楽しさを、思い出してるだけだから。
2527 = "我並沒有感到不可思議，因為我所回憶起的不是痛苦，而是滿滿的快樂。" 

# 【双鉄】
# display as 雙鐵
# JP: 「父と母は――ああ、いや」
2063 = "「父親和母親——啊，不對」" 

# monologue
# JP: 凪とふかみ……は大丈夫なような気もするが、\nれいなは、まだ実在を信じているかもしれない。
2411 = "凪和深美可能無所謂……但是玲奈說不定還相信著那位老爺爺的存在。" 

# 【双鉄】
# display as 雙鐵
# JP: 「父や母や、サンタクロースは、\nいつでもプレゼントをどこかに隠した」
2064 = "「父親和母親還有聖誕老人，總會把禮物藏在什麼地方」" 

# monologue
# JP: 家の中だけとは限らなかった。\n庭や、ときにはおとなりやお向かいさんまで巻き込んで。
2346 = "不一定藏在家裡。還有可能是院子裡，甚至是附近鄰居的家裡。" 

# monologue
# JP: ヒントはいつでも難しかったが、答えを探り当てるのは、\nいくつもの鍵を試して回していくようで、わくわくした。
2803 = "雖然每一個線索都很難懂，但是猜答案的過程就好像將鑰匙一把把試過來一樣，讓我興奮不已。" 

# 【双鉄】
# display as 雙鐵
# JP: 「探す事自体が楽しくて。見つけ出すのは嬉しかった。\n手に入れたプレゼントは、かけがえないものだと感じた」
1932 = "「尋找的過程很開心，找到的時候更是喜悅。將禮物抱在懷裡的時候，我覺得自己彷彿得到了無可替代的珍寶」" 

# monologue
# JP: 例え、望みのものと違うプレゼントな時でさえ。
2423 = "即使收到的禮物並不是自己最想要的，也是一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「貰うのではなく、“自分の力で手に入れた”と思えた。\n幼かったから、達成感はひときわ素晴らしいものだった」
1993 = "「我覺得那份禮物不是別人給的，而是“憑自己的力量得到的”。因為當時還很小，所以成就感也特別強烈」" 

# monologue
# JP: ああ、と誰かの小さな呟き。
2594 = "有人發出了輕聲的感嘆。" 

# monologue
# JP: 日々姫もポーレットも、凪もふかみも、\n真闇姉さえもが頷いている。
2584 = "日日姬和波萊特，還有凪、深美，甚至連真闇姐也點起了頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから僕は、廃鉱山の再生を、\nその楽しさとともに出来ないか――と考えている」
2000 = "「所以我在想，能不能在廢礦山的復興過程中，加入這些歡樂的元素」" 

# 【ポーレット】
# display as 波萊特
# JP: 「宝探しの楽しさ、ですか？」
1930 = "「尋寶的樂趣——是嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1870 = "「嗯」" 

# monologue
# JP: きっと、ポーレットにも楽しめて、\n笑顔になってもらえる空間。
2768 = "那一定會是一個讓波萊特也樂在其中、喜笑顏開的空間。" 

# monologue
# JP: それを形にしたいから、\n僕の“一番楽しい”を、そのままぶつける。
2539 = "我希望能夠實現這個目標，所以我將自己認為“最好玩的點子”提了出來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「『黒いダイヤの鉱脈』の探索をしてもらうのだ。\nヒントやアイテムを手掛かりにして」
2118 = "「讓遊客們憑藉線索和道具，去探索“黑鑽石礦脈”」" 

# 【凪】
# display as 凪
# JP: 「おもしろそうばいっ！」
2100 = "「聽起來好有趣咧！」" 

# monologue
# JP: 声だけでは伝えきれぬと言わんばかりに、\n凪が椅子から、勢いもよく立ち上がる。
2492 = "就好像光憑言語無法表達她的心情一般，凪一下子站了起來。" 

# 【凪】
# display as 凪
# JP: 「黒いダイヤ、っていうのがいいばい。\nにーさん、なかなか詩人ばい」
1460 = "「“黑鑽石”這個詞特別好。哥哥還挺詩意的咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、それは僕の言葉ではない」
1723 = "「不，這不是我發明的詞」" 

# 【ハチロク】
# display as 八六
# JP: 「石炭産業全盛のころは、\n誰もが石炭を、黒いダイヤと呼んでいたのです」
1883 = "「在煤礦產業全盛期，人們都習慣將煤礦稱為“黑鑽石”」" 

# 【凪】
# display as 凪
# JP: 「なーんだ。\nにーさんにしては出来すぎだと思うたばい」
1740 = "「什麼嘛。咱就說哥哥的腦瓜子才沒那麼好使咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おいおい」
1863 = "「喂喂」" 

# monologue
# JP: 立って損した、と言わんばかりに、\n凪は椅子へと腰かけ直す。
2493 = "就好像是在說“白站起來了”一般，凪重新坐回椅子上。" 

# 【ふかみ】
# display as 深美
# JP: 「でも、言葉のことだけじゃなく。\nほんと、いいアイディアです。きっと。これ」
1750 = "「但是，也不光是名字好。這個主意，真的是非常棒」" 

# monologue
# JP: 凪のフォロー――というばかりでもなさそうだ。\nふかみの頬も、興奮でわずかに赤くなっている。
2630 = "深美臉頰微紅，似乎也有些激動。看來她這麼說也不光是為了附和凪。" 

# 【ふかみ】
# display as 深美
# JP: 「宝探しの舞台だったら、あの暗いのもじめじめも、\n逆にいい、って思う。です」
1934 = "「對於尋寶的場地來說，那種陰暗潮濕的環境，反而是加分項」" 

# 【真闇】
# display as 真闇
# JP: 「――そこのバランスは難しかとね？」
1458 = "「——難點在於如何調整二者之間的平衡吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。安全性と雰囲気との、だな」
1867 = "「嗯。安全性與氛圍的平衡，對吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「その辺は、鍾乳洞とかが参考になるかも……\n九洲には観光向けの鍾乳洞、わりとありますから」
2151 = "「這方面，或許可以參考鐘乳洞之類的地方……九州有很多供遊客觀光的鐘乳洞」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、それはいいアイディアだな」
1802 = "「原來如此，這真是個好主意啊」" 

# 【凪】
# display as 凪
# JP: 「行ったことあるばい！\nヘルメットにヘッドライトをつけたばい！」
1828 = "「咱去過的咧！戴的安全帽上面裝著頭燈咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「あ、それ、つけてみたいかも」
1860 = "「啊，那個，我也想戴戴看」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無論、装着は義務としよう。\n足元は……貸靴などにすればいいかな」
2068 = "「當然，要規定遊客必須佩戴安全帽。腳上的話……要租售靴子給遊客嗎？」" 

# monologue
# JP: はい、とれいなが手をあげる。
2652 = "玲奈舉手想要發言。" 

# 【れいな】
# display as 玲奈
# JP: 「ええとぉ、お客さん、\nトロッコにのせてあげるのはどうですかぁ？」
2175 = "「那個，讓遊客乘坐礦車來移動怎麼樣？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　それは実にいい。坑内はトロッコ移動にすれば、\n足元不安と、迷子対策を同時にできることになる」
1849 = "「啊！　真是個好主意。只要在坑道內使用礦車移動，就能同時解決磕到碰到以及迷路的問題」" 

# 【ハチロク】
# display as 八六
# JP: 「と、なりますと――トロッコに乗ってしまえば、\n鉱脈は自動で見つかることとなるわけですよね？」
2154 = "「這樣一來——只要坐上礦車，就會自動找到礦脈吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。そうだな。となると、\n謎解きと宝探しは、その前段階に置く必要が出てくる」
2157 = "「這樣啊。確實沒錯。這樣的話，就需要將解謎與尋寶的環節放在前一步才行了」" 

# 【れいな】
# display as 玲奈
# JP: 「炭鉱夫さんが、きっとヒミツにしてるんです、\n最上級の[れきせいたん,2]瀝青炭は、隠し坑道にあるんですよぉ」
2002 = "「採煤工們有一個秘密——最高級的煙煤，在隱藏坑道內」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
1871 = "「嗯！」" 

# monologue
# JP: レキセイタンが何物なのかもわからぬが、\nれいなの発した言葉には、わくわくさせる響きがある。
2802 = "雖然我不知道“煙煤”是什麼，但玲奈的這句話，有著激動人心的魔力。" 

# monologue
# JP: その勢いに乗ってしまえば、\nぱっと絵図面が頭に浮かぶ。
2560 = "我順著這種感覺去思考，腦海中很快浮現出一幅清晰的畫面。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、主坑道を隠し坑道扱いにして封鎖し、\nヒント探しと謎解きは別の場所で――」
1933 = "「對啊，將主坑道作為隱藏坑道封鎖起來，尋找線索和解謎環節在別的地方進行——」" 

# monologue
# JP: 言葉につられ、思いつく。\nいきおい見れば、ポーレットも僕をまじまじ見ている。
2745 = "說完，我忽然想到了什麼。順勢抬頭望去，發現波萊特也正注視著我。" 

# 【双鉄】
# display as 雙鐵＆波萊特
# JP: 「廃宿舎」
1947 = "「廢棄宿舍」" 

# 【凪】
# display as 凪
# JP: 「ほわぁっ！　あぎゃんとこで宝探しとか、\nむっちゃくっちゃに楽しそうばいっ！」
1830 = "「哇——！　要在那種地方尋寶，聽起來超級好玩咧！」" 

# 【ふかみ】
# display as 深美
# JP: 「でも、広すぎるし……あと、壊れてる建物とかも」
1755 = "「但是，範圍太大了……另外，還有一些建築物是處於受損狀態的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2027 = "「是啊」" 

# monologue
# JP: 確かに、あの広大な宿舎群の全てを探索可能としては、\n一日二日で捜索できるものではなくなる。
2666 = "的確，如果將那一大片宿舍區全部納入探索區域，可就不是一兩天能找得完的了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「例えば――最も状態の良い建物の、ワンフロアなり、\n一室だけなりを使うことにするのはどうだろう」
2038 = "「比方說——挑選一棟保存狀態最好的建築物，使用其中的一層或者一間房間怎麼樣？」" 

# 【真闇】
# display as 真闇
# JP: 「ああ、それなら管理の手間も人手も、\n絞れるとねぇ」
1858 = "「啊，這樣就能有效控制管理難度和人手了」" 

# 【ハチロク】
# display as 八六
# JP: 「管理の手間、ですか」
2088 = "「管理難度——嗎」" 

# monologue
# JP: ふむ、とハチロクは呟いて、\n電話の受話器を耳にあてるようなゼスチャーをする。
2399 = "八六彷彿思考著什麼，隨後做出一個打電話的手勢。" 

# 【ハチロク】
# display as 八六
# JP: 「でしたら、トランシーバーなどいかがでしょう？\n雰囲気作りと迷子対策、両方に役立つかもしれません」
2185 = "「那麼，使用對講機怎麼樣？或許對於營造氛圍和防止迷路都有幫助」" 

# 【双鉄】
# display as 雙鐵
# JP: 「トランシーバー。実にいいな。\n今となっては物珍しく、かつ、実用的だ」
1935 = "「對講機嗎。真是個好主意。對現在的年輕人而言是個稀罕物件，同時也很實用」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですよね。あのへん、\n携帯の電波ほとんど通じませんものね」
1856 = "「啊，對呢。那片地區幾乎收不到手機信號」" 

# 【凪】
# display as 凪
# JP: 「トランシーバーなんて、見たこともなかったい」
1936 = "「對講機這種東西，咱從來沒見過咧」" 

# 【ふかみ】
# display as 深美
# JP: 「わたしは、あるよ。[いび,1]伊日川の川下り船で\n船頭さんが使ったから」
1992 = "「我見過喔。因為揖斐川漂流船的掌棹曾經用過」" 

# 【凪】
# display as 凪
# JP: 「うらやましかとー」
1894 = "「好羨慕——」" 

# monologue
# JP: 携帯の電波が通じない――\nそれもまた、探検らしさを醸してくれるに違いない。
2566 = "手機沒有信號——這一點一定也能夠更加烘托出探險的氛圍。" 

# monologue
# JP: 実際、凪やふかみはもう、\nトランシーバーの話一つで、盛り上がってる。
2490 = "就像凪和深美，僅因為一台對講機就已經聊得熱火朝天。" 

# monologue
# JP: （これはいいな、とてもいい）
2834 = "（這真是個好現象啊，非常好）" 

# monologue
# JP: 良い循環が生まれてきている。\n楽しいを言葉で探りあう、そのこと自体が実に楽しい。
2532 = "我們的談話形成了良性循環。一起討論尋找快樂的事情，這件事本身就是一種快樂。" 

# monologue
# JP: の、だが――
2368 = "但是——" 

# 【日々姫】
# display as 日日姬
# JP: 「あっ」
1847 = "「啊」" 

# monologue
# JP: 沈黙が気になり視線を向ければ、\n日々姫はすぐに、弁解するように大きく手を振る。
2549 = "我有些在意一直保持沉默的日日姬，看向了她。結果她就像想要辯解一般連連擺手。" 

# 【日々姫】
# display as 日日姬
# JP: 「にぃに、違かと――と、っと――\nんんっ、違うんですよ、兄さん」
2198 = "「阿哥，不是這樣——呃、呃——嗯……哥哥，不是你想的那樣」" 

# monologue
# JP: こほんと、ひとつ咳払い。
2463 = "她清了清嗓子。" 

# 【日々姫】
# display as 日日姬
# JP: 「考えてただけです。\nその……ちょっと、別のこと」
1978 = "「我只是……在想別的事情」" 

# 【双鉄】
# display as 雙鐵
# JP: 「別のこと？」
1792 = "「別的事情？」" 

# 【日々姫】
# display as 日日姬
# JP: 「あ、別っていっても、無関係ってわけじゃなくって――\nえと、これって……つまり――うーんと」
1854 = "「啊，但也不是跟這個毫無關係的事情——呃，這個嘛……就是說——嗯……」" 

# monologue
# JP: 言葉を、探すような沈黙。\n日々姫は唇を舐めてしめらせ、それからああ、と声を出す。
2585 = "日日姬沉默下來，似乎在尋找合適的詞彙。過了一會，她舔了舔嘴唇，如恍然大悟般地感嘆道：" 

# 【日々姫】
# display as 日日姬
# JP: 「つまりこれ、術仙廃炭鉱一帯をまるごと、\n宝探しテーマパークにするってことですよね」
1765 = "「你們就是想把整個術仙廢煤礦一帶打造成尋寶主題公園對吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「テーマパーク！」
1726 = "「主題公園！」" 

# 【凪】
# display as 凪
