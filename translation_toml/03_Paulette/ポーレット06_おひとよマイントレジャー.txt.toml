[script]
# lines: 380 
# 【ポーレット】
# display as 波萊特
# JP: 「宝探しですか？」
1931 = "「Tìm kho báu sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん、宝探し。\n小さなころ、僕が一番好きだった遊びだ」
1873 = "「Ừ, tìm kho báu.\nĐó là trò chơi mà anh thích nhất hồi còn nhỏ.」"
# monologue
# JP: 言った瞬間、日々姫がハっと僕を見る。\nその顔に、そうだったかと思い当たる。
2715 = "Khoảnh khắc tôi thốt ra, Hibiki giật mình nhìn tôi.\nNhìn khuôn mặt đó, tôi chợt nhận ra."
# monologue
# JP: 小さな頃の――事故より前の想い出を、\n僕は今日まで、話そうとも思い出そうともしていなかった。
2557 = "Những kỷ niệm hồi nhỏ——trước khi xảy ra tai nạn,\ncho đến tận hôm nay, tôi chưa từng muốn kể lại hay nhớ về chúng."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は、ふたごだったから。誕生日にも、クリスマスにも。\nプレゼントはいつでも、ふたつだった」
1879 = "「Vì anh là trẻ sinh đôi. Dù là sinh nhật hay Giáng sinh.\nQuà lúc nào cũng có hai món.」"
# monologue
# JP: ……今までずっと閉じ込めていた、\n路子とすごした子供時代を、こうも静かに話せている。
1454 = "......Thời thơ ấu trải qua cùng Michiko mà tôi đã giấu kín bấy lâu nay,\nkhông ngờ tôi lại có thể bình thản kể lại như thế này."
# monologue
# JP: それを不思議とは感じない。\n苦しみではなく楽しさを、思い出してるだけだから。
2527 = "Tôi không cảm thấy điều đó là kỳ lạ.\nBởi vì tôi chỉ đang nhớ lại niềm vui, chứ không phải nỗi đau."
# 【双鉄】
# display as 雙鐵
# JP: 「父と母は――ああ、いや」
2063 = "「Bố và mẹ——À, không.」"
# monologue
# JP: 凪とふかみ……は大丈夫なような気もするが、\nれいなは、まだ実在を信じているかもしれない。
2411 = "Nagi và Fukami......thì có vẻ không sao, nhưng\nReina có lẽ vẫn còn tin vào sự tồn tại của ông già Noel."
# 【双鉄】
# display as 雙鐵
# JP: 「父や母や、サンタクロースは、\nいつでもプレゼントをどこかに隠した」
2064 = "「Bố, mẹ và ông già Noel,\nlúc nào cũng giấu quà ở đâu đó.」"
# monologue
# JP: 家の中だけとは限らなかった。\n庭や、ときにはおとなりやお向かいさんまで巻き込んで。
2346 = "Không chỉ giới hạn trong nhà.\nMà còn ở ngoài vườn, đôi khi còn kéo cả hàng xóm láng giềng vào cuộc."
# monologue
# JP: ヒントはいつでも難しかったが、答えを探り当てるのは、\nいくつもの鍵を試して回していくようで、わくわくした。
2803 = "Những gợi ý lúc nào cũng khó, nhưng việc tìm ra câu trả lời,\ngiống như đang thử vặn vô số chiếc chìa khóa vậy, rất thú vị."
# 【双鉄】
# display as 雙鐵
# JP: 「探す事自体が楽しくて。見つけ出すのは嬉しかった。\n手に入れたプレゼントは、かけがえないものだと感じた」
1932 = "「Bản thân việc tìm kiếm đã rất vui. Tìm thấy lại càng vui hơn.\nMón quà có được mang lại cảm giác không gì thay thế được.」"
# monologue
# JP: 例え、望みのものと違うプレゼントな時でさえ。
2423 = "Ngay cả khi đó là món quà khác với những gì tôi mong đợi."
# 【双鉄】
# display as 雙鐵
# JP: 「貰うのではなく、“自分の力で手に入れた”と思えた。\n幼かったから、達成感はひときわ素晴らしいものだった」
1993 = "「Cảm giác không phải là được nhận, mà là \"tự mình giành được\".\nVì còn nhỏ, nên cảm giác thành tựu đó vô cùng tuyệt vời.」"
# monologue
# JP: ああ、と誰かの小さな呟き。
2594 = "A, ai đó khẽ thì thầm."
# monologue
# JP: 日々姫もポーレットも、凪もふかみも、\n真闇姉さえもが頷いている。
2584 = "Hibiki, Paulette, Nagi, Fukami,\nthậm chí cả chị Mayami cũng đang gật đầu."
# 【双鉄】
# display as 雙鐵
# JP: 「だから僕は、廃鉱山の再生を、\nその楽しさとともに出来ないか――と考えている」
2000 = "「Vì vậy, anh đang nghĩ xem,\ncó thể tái sinh khu mỏ bỏ hoang cùng với niềm vui đó được không——」"
# 【ポーレット】
# display as 波萊特
# JP: 「宝探しの楽しさ、ですか？」
1930 = "「Niềm vui của việc tìm kho báu sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1870 = "「Ừ.」"
# monologue
# JP: きっと、ポーレットにも楽しめて、\n笑顔になってもらえる空間。
2768 = "Một không gian mà Paulette chắc chắn cũng có thể tận hưởng,\nvà nở nụ cười."
# monologue
# JP: それを形にしたいから、\n僕の“一番楽しい”を、そのままぶつける。
2539 = "Vì muốn biến điều đó thành hiện thực,\nanh sẽ mang \"niềm vui lớn nhất\" của mình vào đó."
# 【双鉄】
# display as 雙鐵
# JP: 「『黒いダイヤの鉱脈』の探索をしてもらうのだ。\nヒントやアイテムを手掛かりにして」
2118 = "「Chúng ta sẽ cho du khách tìm kiếm 『Mạch khoáng sản kim cương đen』.\nDựa vào những gợi ý và vật phẩm.」"
# 【凪】
# display as 凪
# JP: 「おもしろそうばいっ！」
2100 = "「Nghe có vẻ thú vị đó nha!」"
# monologue
# JP: 声だけでは伝えきれぬと言わんばかりに、\n凪が椅子から、勢いもよく立ち上がる。
2492 = "Như thể chỉ dùng lời nói thì không thể truyền đạt hết được,\nNagi đứng phắt dậy khỏi ghế đầy mạnh mẽ."
# 【凪】
# display as 凪
# JP: 「黒いダイヤ、っていうのがいいばい。\nにーさん、なかなか詩人ばい」
1460 = "「Cái từ 'kim cương đen' nghe hay đó nha.\nAnh hai cũng thi sĩ ra phết nè」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、それは僕の言葉ではない」
1723 = "「Không, đó không phải từ do tôi nghĩ ra đâu」"
# 【ハチロク】
# display as 八六
# JP: 「石炭産業全盛のころは、\n誰もが石炭を、黒いダイヤと呼んでいたのです」
1883 = "「Vào thời kỳ hoàng kim của ngành công nghiệp than đá,\nai cũng gọi than đá là kim cương đen ạ」"
# 【凪】
# display as 凪
# JP: 「なーんだ。\nにーさんにしては出来すぎだと思うたばい」
1740 = "「Gì chứ.\nEm đã nghĩ là anh hai thì làm gì nghĩ ra được từ hay thế á」"
# 【双鉄】
# display as 雙鐵
# JP: 「おいおい」
1863 = "「Này này」"
# monologue
# JP: 立って損した、と言わんばかりに、\n凪は椅子へと腰かけ直す。
2493 = "Như thể muốn nói \"Đứng lên uổng công\",\nNagi ngồi phịch xuống ghế."
# 【ふかみ】
# display as 深美
# JP: 「でも、言葉のことだけじゃなく。\nほんと、いいアイディアです。きっと。これ」
1750 = "「Nhưng mà, không chỉ là từ ngữ đâu.\nThật sự là một ý tưởng rất hay. Chắc chắn là vậy. Cái này ấy」"
# monologue
# JP: 凪のフォロー――というばかりでもなさそうだ。\nふかみの頬も、興奮でわずかに赤くなっている。
2630 = "Không chỉ đơn thuần là hùa theo Nagi――\nHai má Fukami cũng hơi ửng đỏ vì phấn khích."
# 【ふかみ】
# display as 深美
# JP: 「宝探しの舞台だったら、あの暗いのもじめじめも、\n逆にいい、って思う。です」
1934 = "「Nếu là bối cảnh tìm kho báu thì, sự tăm tối và ẩm ướt đó,\nngược lại lại rất tuyệt, em nghĩ vậy. ạ」"
# 【真闇】
# display as 真闇
# JP: 「――そこのバランスは難しかとね？」
1458 = "「——Việc cân bằng cái đó khó lắm phải không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。安全性と雰囲気との、だな」
1867 = "「Ừm. Giữa sự an toàn và bầu không khí nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「その辺は、鍾乳洞とかが参考になるかも……\n九洲には観光向けの鍾乳洞、わりとありますから」
2151 = "「Về khoản đó thì có thể tham khảo các hang động đá vôi...\nVì ở Kyushu cũng có khá nhiều hang động đá vôi dành cho khách du lịch」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、それはいいアイディアだな」
1802 = "「Ra vậy, đúng là một ý tưởng hay」"
# 【凪】
# display as 凪
# JP: 「行ったことあるばい！\nヘルメットにヘッドライトをつけたばい！」
1828 = "「Em đi rồi á!\nCó gắn cả đèn pha lên mũ bảo hiểm nữa nè!」"
# 【ふかみ】
# display as 深美
# JP: 「あ、それ、つけてみたいかも」
1860 = "「A, cái đó, có khi em cũng muốn đội thử」"
# 【双鉄】
# display as 雙鐵
# JP: 「無論、装着は義務としよう。\n足元は……貸靴などにすればいいかな」
2068 = "「Đương nhiên, việc trang bị sẽ là bắt buộc.\nCòn giày dép... có nên cho thuê giày không nhỉ」"
# monologue
# JP: はい、とれいなが手をあげる。
2652 = "Dạ, Reina giơ tay lên."
# 【れいな】
# display as 玲奈
# JP: 「ええとぉ、お客さん、\nトロッコにのせてあげるのはどうですかぁ？」
2175 = "「Ưm, cho hành khách,\nngồi xe goòng thì sao ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！　それは実にいい。坑内はトロッコ移動にすれば、\n足元不安と、迷子対策を同時にできることになる」
1849 = "「A! Ý kiến hay đấy. Nếu di chuyển trong hầm bằng xe goòng,\nthì có thể giải quyết được cả vấn đề đi lại khó khăn lẫn chống đi lạc」"
# 【ハチロク】
# display as 八六
# JP: 「と、なりますと――トロッコに乗ってしまえば、\n鉱脈は自動で見つかることとなるわけですよね？」
2154 = "「Nếu vậy thì——chỉ cần ngồi lên xe goòng,\nlà sẽ tự động tìm thấy mạch khoáng sản đúng không ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。そうだな。となると、\n謎解きと宝探しは、その前段階に置く必要が出てくる」
2157 = "「Thì ra là vậy. Đúng nhỉ. Nếu thế,\nthì cần phải đặt phần giải đố và tìm kho báu ở giai đoạn trước đó」"
# 【れいな】
# display as 玲奈
# JP: 「炭鉱夫さんが、きっとヒミツにしてるんです、\n最上級の[れきせいたん,2]瀝青炭は、隠し坑道にあるんですよぉ」
2002 = "「Chắc chắn là các thợ mỏ đang giữ bí mật đó ạ,\nloại than bitum thượng hạng nhất nằm ở trong đường hầm ẩn đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
1871 = "「Ừm!」"
# monologue
# JP: レキセイタンが何物なのかもわからぬが、\nれいなの発した言葉には、わくわくさせる響きがある。
2802 = "Mặc dù không biết than bitum là cái gì,\nnhưng những lời Reina nói lại mang âm hưởng khiến người ta háo hức."
# monologue
# JP: その勢いに乗ってしまえば、\nぱっと絵図面が頭に浮かぶ。
2560 = "Nương theo đà đó,\nmột bản phác thảo nhanh chóng hiện ra trong đầu tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、主坑道を隠し坑道扱いにして封鎖し、\nヒント探しと謎解きは別の場所で――」
1933 = "「Đúng rồi, coi đường hầm chính là đường hầm ẩn rồi phong tỏa lại,\nviệc tìm kiếm gợi ý và giải đố sẽ diễn ra ở một nơi khác――」"
# monologue
# JP: 言葉につられ、思いつく。\nいきおい見れば、ポーレットも僕をまじまじ見ている。
2745 = "Bị cuốn theo lời nói, tôi nảy ra một ý.\nNgước nhìn lên, Paulette cũng đang nhìn chằm chằm vào tôi."
# 【双鉄】
# display as 雙鐵＆波萊特
# JP: 「廃宿舎」
1947 = "「Khu túc xá bỏ hoang」"
# 【凪】
# display as 凪
# JP: 「ほわぁっ！　あぎゃんとこで宝探しとか、\nむっちゃくっちゃに楽しそうばいっ！」
1830 = "「Oa! Tìm kho báu ở chỗ như thế,\nnghe có vẻ siêu cấp vui luôn á!」"
# 【ふかみ】
# display as 深美
# JP: 「でも、広すぎるし……あと、壊れてる建物とかも」
1755 = "「Nhưng mà, rộng quá... với lại, còn có những tòa nhà bị hỏng nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
2027 = "「Đúng vậy」"
# monologue
# JP: 確かに、あの広大な宿舎群の全てを探索可能としては、\n一日二日で捜索できるものではなくなる。
2666 = "Quả thực, nếu cho phép khám phá toàn bộ khu túc xá rộng lớn đó,\nthì không thể nào tìm kiếm xong trong một hai ngày được."
# 【双鉄】
# display as 雙鐵
# JP: 「例えば――最も状態の良い建物の、ワンフロアなり、\n一室だけなりを使うことにするのはどうだろう」
2038 = "「Ví dụ――chúng ta chỉ sử dụng một tầng,\nhoặc một phòng của tòa nhà có tình trạng tốt nhất thì sao」"
# 【真闇】
# display as 真闇
# JP: 「ああ、それなら管理の手間も人手も、\n絞れるとねぇ」
1858 = "「A, nếu vậy thì có thể giảm bớt công sức quản lý\nvà nhân lực nhỉ」"
# 【ハチロク】
# display as 八六
# JP: 「管理の手間、ですか」
2088 = "「Công sức quản lý, sao ạ」"
# monologue
# JP: ふむ、とハチロクは呟いて、\n電話の受話器を耳にあてるようなゼスチャーをする。
2399 = "Hachiroku lẩm bẩm \"Ưm\",\nrồi làm cử chỉ như đang áp ống nghe điện thoại vào tai."
# 【ハチロク】
# display as 八六
# JP: 「でしたら、トランシーバーなどいかがでしょう？\n雰囲気作りと迷子対策、両方に役立つかもしれません」
2185 = "「Nếu vậy, dùng bộ đàm thì sao ạ?\nCó lẽ sẽ giúp ích cho cả việc tạo không khí và chống đi lạc đấy ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「トランシーバー。実にいいな。\n今となっては物珍しく、かつ、実用的だ」
1935 = "「Bộ đàm. Hay thật đấy.\nBây giờ nó là một món đồ hiếm lạ, và cũng rất thực tế nữa」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですよね。あのへん、\n携帯の電波ほとんど通じませんものね」
1856 = "「A, đúng vậy nhỉ. Khu vực đó,\nsóng điện thoại di động hầu như không bắt được mà」"
# 【凪】
# display as 凪
# JP: 「トランシーバーなんて、見たこともなかったい」
1936 = "「Bộ đàm á, em chưa từng thấy bao giờ luôn nè」"
# 【ふかみ】
# display as 深美
# JP: 「わたしは、あるよ。[いび,1]伊日川の川下り船で\n船頭さんが使ったから」
1992 = "「Em thì có rồi đó. Tại trên thuyền xuôi dòng sông Ibi,\nngười lái đò có dùng mà」"
# 【凪】
# display as 凪
# JP: 「うらやましかとー」
1894 = "「Ghen tị ghê áー」"
# monologue
# JP: 携帯の電波が通じない――\nそれもまた、探検らしさを醸してくれるに違いない。
2566 = "Sóng điện thoại di động không bắt được――\nĐiều đó chắc chắn cũng sẽ tạo thêm cảm giác của một cuộc thám hiểm."
# monologue
# JP: 実際、凪やふかみはもう、\nトランシーバーの話一つで、盛り上がってる。
2490 = "Thực tế thì Nagi và Fukami,\nchỉ với câu chuyện về bộ đàm thôi cũng đã rất phấn khích rồi."
# monologue
# JP: （これはいいな、とてもいい）
2834 = "（Thế này tốt thật, rất tốt）"
# monologue
# JP: 良い循環が生まれてきている。\n楽しいを言葉で探りあう、そのこと自体が実に楽しい。
2532 = "Một chu kỳ tốt đang được hình thành.\nCùng nhau thảo luận về những điều thú vị bằng lời nói, bản thân việc đó đã thực sự rất vui rồi."
# monologue
# JP: の、だが――
2368 = "Thế, nhưng――"
# 【日々姫】
# display as 日日姬
# JP: 「あっ」
1847 = "「A」"
# monologue
# JP: 沈黙が気になり視線を向ければ、\n日々姫はすぐに、弁解するように大きく手を振る。
2549 = "Thấy sự im lặng đáng ngờ, tôi liền nhìn sang,\nHibiki lập tức xua tay liên tục như muốn phân trần."
# 【日々姫】
# display as 日日姬
# JP: 「にぃに、違かと――と、っと――\nんんっ、違うんですよ、兄さん」
2198 = "「Anh hai, không phải đâu――ơ, khoan――\nƯm, không phải đâu, anh trai」"
# monologue
# JP: こほんと、ひとつ咳払い。
2463 = "Hắng giọng một cái."
# 【日々姫】
# display as 日日姬
# JP: 「考えてただけです。\nその……ちょっと、別のこと」
1978 = "「Em chỉ đang suy nghĩ thôi.\nChuyện đó... hơi khác một chút」"
# 【双鉄】
# display as 雙鐵
# JP: 「別のこと？」
1792 = "「Chuyện khác?」"
# 【日々姫】
# display as 日日姬
# JP: 「あ、別っていっても、無関係ってわけじゃなくって――\nえと、これって……つまり――うーんと」
1854 = "「A, nói là khác nhưng không phải là không liên quan đâu――\nÀ thì, cái này... tức là――ưm」"
# monologue
# JP: 言葉を、探すような沈黙。\n日々姫は唇を舐めてしめらせ、それからああ、と声を出す。
2585 = "Một sự im lặng như đang tìm kiếm từ ngữ.\nHibiki liếm môi cho ướt, rồi khẽ thốt lên \"A\"."
# 【日々姫】
# display as 日日姬
# JP: 「つまりこれ、術仙廃炭鉱一帯をまるごと、\n宝探しテーマパークにするってことですよね」
1765 = "「Tóm lại là, sẽ biến toàn bộ khu vực mỏ than bỏ hoang Jussen,\nthành một công viên chủ đề tìm kho báu đúng không」"
# 【ポーレット】
# display as 波萊特
# JP: 「テーマパーク！」
1726 = "「Công viên chủ đề!」"
# 【凪】
# display as 凪
# JP: 「よかと！　よかとよ！　テーマパークばいわれると、\nますます行ってみたかなるたい！」
1891 = "「Tuyệt quá! Tuyệt quá đi! Nghe đến công viên chủ đề,\nlại càng muốn đi thử hơn á!」"
# 【双鉄】
# display as 雙鐵
# JP: 「テーマパークか。うん。いいな。\nその呼び方の方がずっといい」
1725 = "「Công viên chủ đề sao. Ừm. Hay đấy.\nCách gọi đó nghe hay hơn nhiều」"
# 【日々姫】
# display as 日日姬
# JP: 「それで、ですね」
2057 = "「Thế rồi, nha」"
# monologue
# JP: ほっとした顔。\n日々姫の言葉はなめらかになる。
2582 = "Khuôn mặt nhẹ nhõm.\nLời nói của Hibiki trở nên trôi chảy hơn."
# 【日々姫】
# display as 日日姬
# JP: 「トレジャーって言葉使ったらどうかなって、\n私、その辺のこと考えてたんですよ」
1977 = "「Nếu dùng từ 'Treasure' thì sao nhỉ,\nem đang nghĩ về chuyện đó đấy」"
# 【凪】
# display as 凪
# JP: 「とれじゃー？」
2212 = "「Tờ-re-sùa?」"
# 【ふかみ】
# display as 深美
# JP: 「宝物、って意味だよ、凪ちゃん」
2017 = "「Có nghĩa là kho báu đó, bé Nagi」"
# 【ポーレット】
# display as 波萊特
# JP: 「いいですね、それ。\nレジャーともかかる感じで」
2160 = "「Hay đấy.\nCảm giác như chơi chữ với từ 'Leisure' vậy」"
# monologue
# JP: トレジャー、と、レジャー。\n単純極まるかけことばだが、意味的にも実にいい。
2836 = "Treasure, và Leisure.\nMột cách chơi chữ cực kỳ đơn giản, nhưng về mặt ý nghĩa cũng rất tuyệt."
# monologue
# JP: だが、「と」の意味を持たせるためには、\nトレジャーの前に置くべき言葉が必要となる。
2369 = "Nhưng mà, để tạo ra ý nghĩa \"với\",\nthì cần phải có một từ đặt trước Treasure."
# 【ハチロク】
# display as 八六
# JP: 「……炭鉱とか鉱山は、トレジャーと合うような形で、\nいいかえられないのでしょうか？」
1468 = "「......Than đá hay mỏ khoáng sản, liệu có thể đổi cách gọi nào đó\ncho hợp với Treasure không ạ?」"
# 【れいな】
# display as 玲奈
# JP: 「なら、コールマインがいいですよぉ。\n炭鉱は、コールマインっても呼ばれますから」
2181 = "「Nếu vậy thì Coal Mine là hợp nhất đó nha~.\nVì mỏ than cũng được gọi là Coal Mine mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「コールマイン。いいな――\n御一夜コールマイントレジャー……では、やや長いか」
2210 = "「Coal Mine. Hay đấy――\nOhimitera Coal Mine Treasure... thì hơi dài nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「なら――\n御一夜……マイントレジャー」
2182 = "「Nếu vậy――\nOhimitera... Mine Treasure」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！　それいい！\n『おひとよマイントレジャー』」
1851 = "「A! Thế được đó!\n『Ohimitera Mine Treasure』」"
# 【真闇】
# display as 真闇
# JP: 「うん。よかね。\n“鉱山で遊ぶ”ゆー感じがよーでとるたい」
1869 = "「Ừm. Được đó.\nNghe đúng kiểu \"vui chơi ở mỏ khoáng sản\" luôn nè」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、施設名称はそれで行こう。\n『おひとよマイントレジャー』で」
2186 = "「Nếu vậy, tên cơ sở cứ quyết định thế đi.\nLà 『Ohimitera Mine Treasure』」"
# 【日々姫】
# display as 日日姬
# JP: 「テーマパークなら、\nイメージキャラとかも必要ですよね」
2008 = "「Nếu là công viên chủ đề,\nthì cũng cần có nhân vật đại diện nữa nhỉ」"
# monologue
# JP: 日々姫がスケッチブックを広げる。
2590 = "Hibiki mở cuốn sổ phác thảo ra."
# monologue
# JP: その勢いが嬉しくて、\nけれども少し意外に思え、つるりと口が滑ってしまう。
2551 = "Tôi rất vui trước sự nhiệt tình đó,\nnhưng cũng cảm thấy hơi bất ngờ, nên đã lỡ buột miệng."
# 【双鉄】
# display as 雙鐵
# JP: 「そこまで協力してくれるのか？」
1774 = "「Em chịu hợp tác đến mức đó sao?」"
# 【日々姫】
# display as 日日姬
# JP: 「しますよ。そんなの、何回も言って……\nて、あー」
2066 = "「Đương nhiên rồi. Chuyện đó, em đã nói bao nhiêu lần...\nƠ, aー」"
# monologue
# JP: 鉛筆の背でぽりぽりと、\n日々姫は自分の髪を掻く。
2587 = "Hibiki dùng đuôi bút chì\ngãi gãi đầu."
# 【日々姫】
# display as 日日姬
# JP: 「私が\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に賛成してたのは、\n御一夜が元気になる方法が他に無いって思ってたから」
1964 = "「Việc em tán thành thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#;,\nlà vì em nghĩ không còn cách nào khác để vực dậy Ohimitera」"
# monologue
# JP: そんな仕草とは裏腹に、\n声からは、ためらいも照れも感じない。
2469 = "Trái ngược với điệu bộ đó,\ntrong giọng nói không hề có sự do dự hay ngượng ngùng nào."
# 【日々姫】
# display as 日日姬
# JP: 「けど、この案ならイケそうって感じてるから。\nだから、その意味でも兄さんに協力するんです」
1751 = "「Nhưng mà, em cảm thấy phương án này có vẻ khả thi.\nVì thế, theo nghĩa đó, em cũng sẽ hợp tác với anh trai」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。それは心強い。\n心強いし、素直に嬉しい」
2156 = "「Vậy sao. Thật vững tâm.\nVừa vững tâm, lại vừa thực sự rất vui」"
# 【日々姫】
# display as 日日姬
# JP: 「っていうかですね」
2112 = "「Mà này」"
# monologue
# JP: 自分で言ってて気がついた。\nそんな感じで、日々姫はその唇に軽く指をあてる。
2563 = "Tự nói ra rồi mới nhận ra.\nVới vẻ mặt như vậy, Hibiki nhẹ nhàng đặt ngón tay lên môi."
# 【日々姫】
# display as 日日姬
# JP: 「この計画――おひとよマイントレジャーのこと。\n稀咲先輩にも、話してみてもいいですか？」
2148 = "「Kế hoạch này――chuyện về Ohimitera Mine Treasure ấy.\nEm thử nói chuyện với chị Kisaki có được không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「宝生稀咲に？」
2127 = "「Với Houshou Kisaki á?」"
# 【凪】
# display as 凪
# JP: 「そんなんむぐっ！？」
2177 = "「Chuyện đó hưm!?」"
# monologue
# JP: 凪が何かを言いかけて、\nふかみの手により口ごと言葉をふさがれる。
2412 = "Nagi định nói gì đó,\nnhưng đã bị tay của Fukami bịt miệng lại."
# 【日々姫】
# display as 日日姬
# JP: 「この方面の私の考え――\nすごく、稀咲先輩に影響されてます。だから」
1998 = "「Suy nghĩ của em về phương diện này――\nBị ảnh hưởng rất nhiều từ chị Kisaki. Nên là」"
# 【双鉄】
# display as 雙鐵
# JP: 「この計画がいけると判断されるのなら――\n宝生稀咲も、\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致に拘らない、と？」
1903 = "「Nếu đánh giá kế hoạch này khả thi――\nHoushou Kisaki cũng sẽ không khăng khăng đòi thu hút nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;#; nữa, đúng không?」"
# 【日々姫】
# display as 日日姬
# JP: 「計画への評価がどうか――まではわからないですけど。\nもしいけるって判断なら、可能性はあると思います」
1962 = "「Đánh giá về kế hoạch thế nào――thì em không rõ.\nNhưng nếu chị ấy thấy khả thi, em nghĩ là có khả năng đó」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1841 = "「Ưm」"
# monologue
# JP: 僕としては、おおいによろしいような気がする。\nが、決断するのは、市長で社長のポーレットだ。
2547 = "Cá nhân tôi thấy điều này rất tốt.\nNhưng người đưa ra quyết định là Paulette, với tư cách là thị trưởng và giám đốc."
# 【双鉄】
# display as 雙鐵
# JP: 「どうだろうか、ポーレット」
2047 = "「Cô thấy sao, Paulette」"
# 【ポーレット】
# display as 波萊特
# JP: 「すごくありがたいと思います。\nできれば、わたしも直接お会いしたいです」
1996 = "「Tôi thấy rất biết ơn.\nNếu được, tôi cũng muốn trực tiếp gặp mặt」"
# monologue
# JP: 少し意外な言葉に思わず、問い返してしまう。
2710 = "Những lời nói có phần bất ngờ khiến tôi buột miệng hỏi lại."
# 【双鉄】
# display as 雙鐵
# JP: 「稀咲とか？」
1818 = "「Gặp Kisaki á?」"
# monologue
# JP: はい、と頷くポーレットの目が、日々姫へと。\n日々姫も少し、戸惑ったような顔をしている。
2625 = "Paulette gật đầu \"Vâng\", ánh mắt hướng về phía Hibiki.\nHibiki cũng lộ vẻ mặt hơi bối rối."
# 【ポーレット】
# display as 波萊特
# JP: 「宝生さんの理解を得られる案にできれば、\n議案として議会を通るものにもなると思います」
1908 = "「Nếu có thể đưa ra một phương án nhận được sự đồng thuận của cô Houshou,\nthì tôi nghĩ nó cũng có thể trở thành một nghị án được thông qua tại hội đồng」"
# 【日々姫】
# display as 日日姬
# JP: 「あ！」
1852 = "「A!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか――そうだな。\n術仙廃炭鉱は、市の所有地なのだから」
2155 = "「Ra vậy――đúng rồi nhỉ.\nVì mỏ than bỏ hoang Jussen là đất thuộc sở hữu của thành phố mà」"
# monologue
# JP: 議会の承認を得られなければ、\n全ては机上の空論だ。
2478 = "Nếu không được hội đồng phê duyệt,\nthì mọi thứ chỉ là lý thuyết suông."
# monologue
# JP: 淡い疑問は、深い納得と入れ替わる。\nポーレットはやはり、僕よりいつでも広くを見ている。
2541 = "Sự hoài nghi mờ nhạt được thay thế bằng sự thấu hiểu sâu sắc.\nQuả nhiên Paulette lúc nào cũng có tầm nhìn rộng hơn tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ということだ。日々姫。\n出来れば、稀咲に頼んでみてはくれないか？」
1942 = "「Là vậy đó. Hibiki.\nNếu được, em có thể nhờ Kisaki thử xem sao không?」"
# monologue
# JP: 問えば、日々姫は深く頷く。\n僕に、ではなくポーレットへと。
2713 = "Khi được hỏi, Hibiki gật đầu thật sâu.\nKhông phải với tôi, mà là với Paulette."
# 【日々姫】
# display as 日日姬
# JP: 「わかりました、これからすぐに電話してみます！」
2014 = "「Em hiểu rồi, em sẽ gọi điện ngay bây giờ!」"
# 【ポーレット】
# display as 波萊特
# JP: 「今日は、\nお忙しいところお時間をありがとうございます」
1741 = "「Cảm ơn cô hôm nay đã dành thời gian\ndù đang bận rộn」"
# monologue
# JP: 隈元銀行、支店長室。
2799 = "Ngân hàng Kumamoto, phòng Giám đốc chi nhánh."
# monologue
# JP: 中には、稀咲が一人だけ。\nいつもと違って、秘書……浦上さんの姿は見えない。
2726 = "Bên trong chỉ có một mình Kisaki.\nKhác với mọi khi, không thấy bóng dáng của thư ký... anh Urakami đâu."
# 【稀咲】
# display as 稀咲
# JP: 「こちらこそ、お運びをありがとうございます。\n一度、じっくりとお話したく思っていました」
1989 = "「Tôi mới là người phải cảm ơn cô vì đã cất công đến đây.\nTôi đã luôn muốn được nói chuyện cặn kẽ với cô một lần」"
# 【ポーレット】
# display as 波萊特
# JP: 「光栄なことです」
2152 = "「Thật vinh hạnh」"
# monologue
# JP: 市長としてのポーレットと、\n支店長としての稀咲の対談。
2362 = "Cuộc đối thoại giữa Paulette với tư cách là thị trưởng,\nvà Kisaki với tư cách là giám đốc chi nhánh."
# monologue
# JP: ならば僕も、市長秘書として、\nわきまえた振る舞いをせねばならんだろう。
2778 = "Nếu vậy thì tôi, với tư cách là thư ký thị trưởng,\ncũng phải cư xử cho đúng mực mới được."
# 【稀咲】
# display as 稀咲
# JP: 「どうぞ、おかけください」
2116 = "「Xin mời ngồi」"
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます」
2117 = "「Cảm ơn cô」"
# monologue
# JP: （っと）
2822 = "（Ơ kìa）"
# monologue
# JP: そう決意した矢先にもはや戸惑っている。\n秘書というのは、どのタイミングで着席すれば――
2419 = "Vừa mới quyết tâm xong thì đã thấy bối rối rồi.\nThư ký thì nên ngồi xuống vào lúc nào đây――"
# 【稀咲】
# display as 稀咲
# JP: 「双鉄？　何をぼーっと突っ立っているんだい？」
2199 = "「Soutetsu? Anh đứng đực ra đó làm gì vậy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1841 = "「唔」" 
# monologue
# JP: うってかわった気さくな言葉。\n稀咲の意図を読みきれない。
2719 = "Những lời nói thân thiện khác hẳn mọi khi.\nTôi không thể đọc được ý đồ của Kisaki."
# monologue
# JP: が、向こうがそういう距離感を示しているのなら、\n畏まるほど、慇懃無礼と取られかねないような気もする。
2376 = "Nhưng, nếu đối phương đã thể hiện khoảng cách như vậy,\nmà tôi còn tỏ ra khép nép thì có khi lại bị coi là khiếm nhã cũng nên."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、着席をしていいものかどうか迷ってな」
2042 = "「Không, tôi chỉ đang phân vân không biết có nên ngồi xuống không thôi」"
# 【稀咲】
# display as 稀咲
# JP: 「いいに決まっている。友人の兄を立たせておくほど、\nボクは礼儀しらずじゃないよ？」
2067 = "「Đương nhiên là được rồi. Tôi đâu có thiếu lễ độ đến mức\nđể anh trai của bạn mình phải đứng chứ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「友人の兄」
2035 = "「Anh trai của bạn」"
# monologue
# JP: これはサイン、もしくはヒントだ。
2764 = "Đây là một tín hiệu, hoặc là một gợi ý."
# 【双鉄】
# display as 雙鐵
# JP: 「日々姫は、なんといって君に面会を求めたのだ？」
2012 = "「Hibiki đã nói gì để xin gặp cô vậy?」"
# 【稀咲】
# display as 稀咲
# JP: 「『兄さんとポーレットさんが、\n　稀咲先輩とお話したがってます』と言っていたよ？」
1889 = "「Em ấy nói là 『Anh trai và chị Paulette\nmuốn nói chuyện với đàn chị Kisaki』 đó?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど」
1801 = "「Ra vậy」"
# monologue
# JP: 理解した。\nなぜこの席に、浦上さんが同席をしていないのかも。
2554 = "Tôi hiểu rồi.\nHiểu cả lý do tại sao anh Urakami không có mặt ở đây."
# 【双鉄】
# display as 雙鐵
# JP: 「では、これは、肩書なしの、\n個人と個人と個人との三者面談なのか」
2184 = "「Vậy ra đây là cuộc gặp gỡ ba bên giữa các cá nhân\nmà không mang theo chức danh nào sao」"
# 【稀咲】
# display as 稀咲
# JP: 「ボクの方はそのつもりだよ？」
1991 = "「Bên tôi thì có ý định như vậy đó?」"
# monologue
# JP: 言って、稀咲は含んだような笑いを見せる。
2746 = "Nói rồi, Kisaki nở một nụ cười đầy ẩn ý."
# 【稀咲】
# display as 稀咲
# JP: 「お互いに、\nその方がいろいろと都合いいんじゃないかと思ってね」
1987 = "「Tôi nghĩ làm vậy\nsẽ thuận tiện hơn cho cả đôi bên về nhiều mặt」"
# 【ポーレット】
# display as 波萊特
# JP: 「ご配慮、ありがとうございます」
1956 = "「Cảm ơn cô đã chu đáo」"
# monologue
# JP: ポーレットの態度は変わらんが、\nそれが素だから仕方ない。
2619 = "Thái độ của Paulette không thay đổi,\nnhưng bản tính cô ấy là vậy nên cũng đành chịu."
# monologue
# JP: 同意の言葉をポーレットからも聞いた以上は、遠慮も不要。椅子にどっかり腰掛け、気持ちも落ち着ける。
2574 = "Đã nghe lời đồng ý từ Paulette thì không cần phải khách sáo nữa. Tôi ngồi phịch xuống ghế, trấn tĩnh lại tinh thần."
# 【双鉄】
# display as 雙鐵
# JP: 「大まかな話は、日々姫から？」
1887 = "「Câu chuyện đại khái, cô đã nghe từ Hibiki rồi chứ?」"
# 【稀咲】
# display as 稀咲
# JP: 「『おひとよマイントレジャー』のことなら。\n面白い案だよね。お話としては」
1980 = "「Nếu là về 『Ohimitera Mine Treasure』 thì rồi.\nĐó là một ý tưởng thú vị. Nếu coi nó như một câu chuyện」"
# 【ポーレット】
# display as 波萊特
# JP: 「お話としては――ですか」
2065 = "「Coi như một câu chuyện――sao」"
# monologue
# JP: 抑えてはいるが、不満気な声。\n稀咲は、気にする素振りもみせない。
2621 = "Giọng nói có vẻ bất mãn dù đã cố kìm nén.\nKisaki không hề tỏ ra bận tâm."
# 【稀咲】
# display as 稀咲
# JP: 「まぁね。現時点では“ただのお話”とボクは感じた。\n現実のものとするためのハードルが高すぎる気がして」
2085 = "「Chà. Hiện tại thì tôi cảm thấy nó 'chỉ là một câu chuyện'.\nBởi vì tôi nghĩ rào cản để biến nó thành hiện thực là quá cao」"
# 【双鉄】
# display as 雙鐵
# JP: 「具体的には？」
1790 = "「Cụ thể là?」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだね、例えば」
1984 = "「Để xem nào, ví dụ như」"
# monologue
# JP: 稀咲が椅子から立ち上がり、\nサーバーから自分の分のコーヒーを淹れる。
2690 = "Kisaki đứng dậy khỏi ghế,\nrót cho mình một tách cà phê từ máy."
# monologue
# JP: 「君たちもよければどうぞ」という声に従い、\nポーレットは二杯を淹れて、片方を僕に渡してくれる。
2711 = "Nghe tiếng \"Hai người cũng cứ tự nhiên nhé\",\nPaulette rót hai tách, rồi đưa một tách cho tôi."
# 【稀咲】
# display as 稀咲
# JP: 「ポジションの問題――なんてどうかな？」
1757 = "「Vấn đề về vị thế――thì sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポジション？」
1761 = "「Vị thế?」"
# monologue
# JP: 僕とポーレットとが隣同士。\n向かいには、稀咲が――
2536 = "Tôi và Paulette ngồi cạnh nhau.\nĐối diện là Kisaki――"
# 【稀咲】
# display as 稀咲
# JP: 「位置関係のポジションじゃない。\n立場、態度のポジションさ」
1713 = "「Không phải vị trí về mặt không gian.\nMà là vị thế về lập trường, thái độ」"
# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
# 1841 = "「唔」" 
# monologue
# JP: こちらの考えを見透かされ、\n向こうの考えがまるで見えない。
2553 = "Bị đối phương nhìn thấu suy nghĩ,\ncòn suy nghĩ của đối phương thì hoàn toàn mù mịt."
# monologue
# JP: ならば、どうする――
2780 = "Nếu vậy, phải làm sao――"
# 【ポーレット】
# display as 波萊特
# JP: 「それって、どういうことでしょう」
2115 = "「Chuyện đó, là có ý gì vậy」"
# monologue
# JP: “聞くまでだ”とおもうより先、\nポーレットが口火を切っている。
2350 = "Trước cả khi tôi kịp nghĩ \"Phải hỏi mới được\",\nPaulette đã lên tiếng trước."
# monologue
# JP: その問いに、稀咲はニヤ、と満足そうな笑みを浮かべる。
2714 = "Nghe câu hỏi đó, Kisaki nhếch mép cười mãn nguyện."
# 【稀咲】
# display as 稀咲
# JP: 「例えば、[ひない,1]雛衣ポーレットさん。君は右田双鉄くんを\n随分と高く評価している。秘書として雇い入れるほど」
2039 = "「Ví dụ như, cô Hinai Paulette. Cô đánh giá rất cao Migita Soutetsu.\nĐến mức thuê cậu ấy làm thư ký」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 2027 = "「是啊」" 
# monologue
# JP: 即答。照れも戸惑いもせず。\nそれが素直に――実に嬉しい。
2361 = "Trả lời ngay lập tức. Không hề ngại ngùng hay bối rối.\nSự chân thành đó――thực sự làm tôi rất vui."
# 【稀咲】
# display as 稀咲
# JP: 「しかし、右田双鉄くんが仮に……そうだな、\nクマ焼酎にハマってアル中になり、能力低下したとする」
1753 = "「Nhưng, giả sử Migita Soutetsu... để xem nào,\nnghiện rượu Kuma Shochu đến mức thành bợm nhậu, năng lực làm việc sa sút」"
# 【ポーレット】
# display as 波萊特
# JP: 「そんなことっ」
2150 = "「Chuyện đó」"
# 【稀咲】
# display as 稀咲
# JP: 「仮に。だよ。\nそれに、無いと断言できる話でもない」
1817 = "「Giả sử thôi.\nHơn nữa, cũng không thể khẳng định là chuyện đó không bao giờ xảy ra」"
# monologue
# JP: 未来のことなど、誰にもわからん。\n稀咲の仮説は、ゆえにポーレットにも反論不能だ。
2748 = "Tương lai ra sao, chẳng ai biết trước được.\nDo đó, giả thuyết của Kisaki, Paulette cũng không thể phản bác."
# 【稀咲】
# display as 稀咲
# JP: 「能力低下が仕事のミスをも呼び起こす。\n周囲からも、苦情が寄せられるようになる」
2096 = "「Năng lực sa sút sẽ kéo theo sai sót trong công việc.\nNhững người xung quanh cũng bắt đầu phàn nàn」"
# monologue
# JP: わずかにだけれどポーレットの頬がぷっと膨らむ。
2623 = "Hai má Paulette hơi phồng lên một chút."
# monologue
# JP: 不満を示してくれてることも、\nやはり素直に、嬉しく感じる。
2500 = "Thấy cô ấy tỏ vẻ bất mãn vì mình,\ntôi thực sự cảm thấy rất vui."
# 【稀咲】
# display as 稀咲
# JP: 「さて、その右田双鉄くんを、\nポーレットさんは免職させるかい？」
2183 = "「Vậy, cô Paulette,\ncô có sa thải Migita Soutetsu đó không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「首になんてしません！　もし、万が一そうなっても、\n双鉄くんなら、必ず立ち直ってくれますから」
1953 = "「Tôi sẽ không sa thải đâu! Nếu lỡ có chuyện đó xảy ra,\nSoutetsu nhất định sẽ tự đứng lên được mà」"
# 【稀咲】
# display as 稀咲
# JP: 「じゃあ、切り替えて別の質問」
2179 = "「Vậy, chuyển sang câu hỏi khác nhé」"
# monologue
# JP: 稀咲はくるり、\n手の中でペンをもてあそぶ。
2692 = "Kisaki xoay tròn,\nnghịch cây bút trong tay."
# 【稀咲】
# display as 稀咲
# JP: 「ボクの部下に、アル中になり周囲を困らせる男が居て。\nボクがその男の責任を問わないとしたら、どうかな？」
1881 = "「Nếu cấp dưới của tôi có một gã bợm nhậu gây phiền phức cho những người xung quanh.\nMà tôi lại không truy cứu trách nhiệm của gã đó, thì sao nào?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――」
1842 = "「A――」"
# monologue
# JP: 言われたことを、理解する。\nポーレットも、おそらくは僕と同様に。
2546 = "Tôi hiểu điều cô ấy vừa nói.\nPaulette có lẽ cũng vậy."
# monologue
# JP: “稀咲と誰か”で例えられれば、\n“責任を問わないことは無責任”だと、思えてしまって。
2345 = "Nếu được ví von bằng \"Kisaki và một ai đó\",\ntôi sẽ nghĩ rằng \"không truy cứu trách nhiệm là vô trách nhiệm\"."
# 【稀咲】
# display as 稀咲
# JP: 「それが、ポジションを取るということ」
2149 = "「Đó chính là việc giữ vững vị thế」"
# monologue
# JP: 稀咲の声は、勝ち誇らない。\nむしろどこか、悲しげなようにさえ聞こえてしまう。
2509 = "Giọng nói của Kisaki không hề tỏ vẻ đắc thắng.\nNgược lại, nghe có vẻ gì đó buồn bã."
# 【稀咲】
# display as 稀咲
# JP: 「人は、自分が取ったポジションに固執するのさ。\n過去の判断を、なんとか正当化しようと頑張ってしまう」
1738 = "「Con người thường cố chấp với vị thế mà mình đã chọn.\nHọ sẽ cố gắng tìm cách biện minh cho những phán đoán trong quá khứ」"
# 【双鉄】
# display as 雙鐵
# JP: 「客観的に見れば、誤った判断だとしても――」
1799 = "「Dù nhìn một cách khách quan, đó là một phán đoán sai lầm đi chăng nữa――」"
# 【稀咲】
# display as 稀咲
# JP: 「そう、過去の判断を正当化するため、\n新しい過ちを重ねてさえもしまうんだ」
2043 = "「Đúng vậy, để biện minh cho những phán đoán trong quá khứ,\nhọ thậm chí còn phạm thêm những sai lầm mới」"
# monologue
# JP: ぎゅうっと、ポーレットの眉根が寄る。
2617 = "Lông mày Paulette nhíu chặt lại."
# 【ポーレット】
# display as 波萊特
# JP: 「……術仙炭鉱にポジションを取った人が――\n御一夜には、たくさんいる」
1464 = "「......Những người đã giữ vị thế đối với mỏ than Jussen――\nỞ Ohimitera có rất nhiều」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
2208 = "「!!」"
# monologue
# JP: 絞りだすような声でようやく、繋がった。
2712 = "Nghe giọng nói như vắt kiệt sức lực đó, cuối cùng tôi cũng xâu chuỗi được vấn đề."
# monologue
# JP: 例え話で、稀咲が何を伝えようとしているのか――\n僕は、まるきりわかってなかった。
2529 = "Thông qua câu chuyện ví von, Kisaki đang cố gắng truyền đạt điều gì――\nTôi hoàn toàn không hiểu được."
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、そうした人たちにして見れば……\n廃炭鉱は、触れられたくない傷そのものなのか」
2033 = "「Ra vậy, đối với những người đó mà nói...\nMỏ than bỏ hoang chính là một vết thương không muốn bị chạm vào sao」"
# monologue
# JP: “過去の判断が誤りではない”それが証明できないとき、\nおそらく人は、過去そのものにフタをする。
2662 = "Khi không thể chứng minh \"phán đoán trong quá khứ không sai\",\ncó lẽ con người ta sẽ che đậy chính quá khứ đó."
# monologue
# JP: 再開発は、そのフタを開け、\n“現状を見ろ”と強いる行為ともなってしまう。
2707 = "Việc tái phát triển sẽ mở nắp che đậy đó ra,\nvà trở thành một hành động ép buộc họ \"hãy nhìn vào thực tại\"."
# 【双鉄】
# display as 雙鐵
# JP: 「確かに、それはデリケートで難しそうな問題――」
2159 = "「Quả thực, đó là một vấn đề nhạy cảm và có vẻ khó khăn――」"
# 【稀咲】
# display as 稀咲
# JP: 「問題は他にもある。\nもっと、ずうっと深刻なものもね」
2164 = "「Vẫn còn những vấn đề khác nữa.\nThậm chí là nghiêm trọng hơn rất nhiều」"
# monologue
# JP: 僕の言葉を、おそらくは意図的に遮って、\n稀咲は試すような目つきになる。
2689 = "Kisaki cắt ngang lời tôi, có lẽ là cố ý,\nvới ánh mắt như đang dò xét."
# 【稀咲】
# display as 稀咲
# JP: 「これは、ポーレットさんに聞きたい。\n双鉄は少し、黙っていてくれないかな」
2146 = "「Chuyện này, tôi muốn hỏi cô Paulette.\nSoutetsu có thể im lặng một chút được không」"
# 【双鉄】
# display as 雙鐵
# JP: 「だ、そうだが？」
1769 = "「Được chứ?」"
# monologue
# JP: むっつり。こくり。\nそんな感じで、ポーレットが頷く。
2618 = "Lặng thinh. Gật đầu.\nVới dáng vẻ đó, Paulette gật đầu."
# monologue
# JP: さきほどの例え話への不機嫌が、\nあるいは未だ、残っているのだろうか？
2806 = "Sự không vui về câu chuyện ví von lúc nãy,\ncó lẽ vẫn còn đọng lại sao?"
# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1462 = "「............」"
# monologue
# JP: が、それがポーレットのお望みならば、\nあえて逆らおうとは思わない。
2378 = "Nhưng, nếu đó là mong muốn của Paulette,\nthì tôi cũng không có ý định làm trái."
# monologue
# JP: 指をバツにし口の前へと持っていけば、\n稀咲は満足そうにうなずき、話し始める。
2668 = "Khi tôi đưa hai ngón tay bắt chéo trước miệng thành hình chữ X,\nKisaki gật đầu hài lòng và bắt đầu nói."
# 【稀咲】
# display as 稀咲
# JP: 「より深刻な問題は、ごく単純な問題さ。\nつまりは、資金」
2147 = "「Vấn đề nghiêm trọng hơn lại là một vấn đề vô cùng đơn giản.\nNói tóm lại là, vốn」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
2207 = "「!」"
# 【稀咲】
# display as 稀咲
# JP: 「そうだねポーレットさん。御一夜鉄道株式会社が\n事業主体となるのには、いくつかの問題がある」
1983 = "「Đúng vậy, cô Paulette. Việc Công ty Cổ phần Đường sắt Ohimitera\ntrở thành chủ thể kinh doanh, có một vài vấn đề」"
# monologue
# JP: ポーレットの瞳が前を向く。\nまっすぐ、まっすぐ、稀咲へと。
2622 = "Ánh mắt Paulette hướng về phía trước.\nNhìn thẳng, thẳng tắp vào Kisaki."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしが市長で、社長でもあることがまず問題ですね。\n市の所有地を、わたしの会社の営利のためには使えない」
2204 = "「Việc tôi vừa là thị trưởng, vừa là giám đốc chính là vấn đề đầu tiên.\nKhông thể sử dụng đất thuộc sở hữu của thành phố vì mục đích lợi nhuận cho công ty của tôi được」"
# 【稀咲】
# display as 稀咲
# JP: 「うん。やってしまえば、公私混同甚だしくなる」
1865 = "「Ừm. Nếu làm vậy, sẽ thành ra công tư lẫn lộn mất」"
# 【ポーレット】
# display as 波萊特
# JP: 「市に賃貸料を払うようなことになれば、\n自前での資金調達が必須となってくるけれど……」
1905 = "「Nếu phải trả tiền thuê cho thành phố,\nthì việc tự huy động vốn là bắt buộc, nhưng mà...」"
# 【稀咲】
# display as 稀咲
# JP: 「難しいだろうねぇ。鉄道債を既に発行しているからね」
1955 = "「Sẽ khó khăn đấy. Vì trái phiếu đường sắt đã được phát hành rồi mà」"
# monologue
# JP: ならばまた鉄道債をと思いかけ、\nすぐさま自分の不明に気付く。
2533 = "Tôi định nói vậy thì phát hành thêm trái phiếu đường sắt,\nnhưng ngay lập tức nhận ra sự thiếu hiểu biết của mình."
# monologue
# JP: （いや、そうだ。鉄道債は――）
2831 = "（Không, đúng rồi. Trái phiếu đường sắt là――）"
# 【ポーレット】
# display as 波萊特
# JP: 「鉄道債は、借金だから」
2193 = "「Trái phiếu đường sắt, là khoản nợ mà」"
# monologue
# JP: ポーレットの声は弱々しい。
2620 = "Giọng Paulette yếu ớt."
# monologue
# JP: 認めたくない事実をいやいや、\n喉から押し出しているようだ。
2495 = "Giống như đang miễn cưỡng nặn ra khỏi cổ họng\nmột sự thật không muốn thừa nhận."
# 【ポーレット】
# display as 波萊特
# JP: 「事業計画に完全な賛同を得られなければ……\n計画の説明自体が、諸刃の剣になりかねない」
1898 = "「Nếu không nhận được sự tán thành hoàn toàn cho kế hoạch kinh doanh...\nBản thân việc giải thích kế hoạch cũng có thể trở thành con dao hai lưỡi」"
# 【稀咲】
# display as 稀咲
# JP: 「だね。取付け騒ぎでも起きれば、\n御一夜鉄道のキャッシュじゃとても回らないよね」
2026 = "「Đúng thế. Nếu xảy ra một cuộc rút tiền ồ ạt,\nthì tiền mặt của Đường sắt Ohimitera sẽ không thể nào xoay vòng nổi」"
# 【双鉄】
# display as 雙鐵
# JP: 「取付け騒ぎ？」
2005 = "「Rút tiền ồ ạt?」"
# monologue
# JP: おっと、思わず話してしまった。
2443 = "Ôi chao, buột miệng nói mất rồi."
# monologue
# JP: が、この質問はセーフなのか、\n稀咲は特にとがめもせずに答えてくれる。
2374 = "Nhưng, câu hỏi này có vẻ an toàn,\nKisaki không hề trách móc mà trả lời luôn."
# 【稀咲】
# display as 稀咲
# JP: 「鉄道債には、\n満期前にも解約できるオプションが設定してあるんだ」
2194 = "「Trái phiếu đường sắt,\ncó thiết lập tùy chọn cho phép hủy hợp đồng trước khi đáo hạn」"
# 【ポーレット】
# display as 波萊特
# JP: 「満期前の解約は、額面の２５％が違約金となります。\nですから普通は解約なんてありえないんです。けど……」
1900 = "「Hủy hợp đồng trước hạn sẽ phải chịu phí phạt 25% mệnh giá.\nVì vậy thông thường không thể nào có chuyện hủy hợp đồng. Nhưng...」"
# monologue
# JP: …………“けど”の続きが聞こえてこない。
1448 = "............Không nghe thấy phần tiếp theo của chữ \"Nhưng\"."
# monologue
# JP: ややあって、\n稀咲の声がその沈黙を埋めていく。
2766 = "Một lúc sau,\ngiọng nói của Kisaki lấp đầy sự im lặng đó."
# 【稀咲】
# display as 稀咲
# JP: 「会社が倒産してしまえば、社債は紙くずだからね。\n不安が高まれば、『そうなるよりは』との判断も出る」
1705 = "「Bởi vì nếu công ty phá sản, trái phiếu doanh nghiệp sẽ thành giấy lộn mà.\nNếu sự bất an tăng cao, sẽ có người đưa ra quyết định 'Thà như vậy còn hơn'」"
# monologue
# JP: ふっ、と。短い息が吐かれる。
2624 = "Phù. Một tiếng thở hắt ra ngắn ngủi."
# monologue
# JP: 稀咲に軽く目礼し、\nポーレットはサバサバとした声を出す。
2464 = "Khẽ gật đầu chào Kisaki,\nPaulette cất giọng điềm tĩnh."
# 【ポーレット】
# display as 波萊特
# JP: 「解約が殺到してしまったら、現金が不足します。\n改修に、もう使っちゃってるわけですから」
1707 = "「Nếu yêu cầu hủy hợp đồng dồn dập, tiền mặt sẽ bị thiếu hụt.\nVì chúng ta đã dùng nó cho việc tu sửa rồi」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。となれば現実に倒産か。\n噂から真が出てしまうわけだ――っ！」
1800 = "「Ra vậy. Nếu thế thì sẽ phá sản thật sao.\nTin đồn sẽ biến thành sự thật mất――!」"
# monologue
# JP: いや、これはそれほどのんきな話ではない。
2357 = "Không, chuyện này không hề đơn giản như vậy."
# monologue
# JP: 術仙炭鉱にかつてポジションを取っていて、\nそして今、\\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致賛成派の議員は確実にいる。
2753 = "Những nghị viên từng giữ vị thế đối với mỏ than Jussen,\nvà hiện tại thuộc phe ủng hộ thu hút \\x%lエアクラ;#00ffc040;Aircra%l;#;, chắc chắn là có."
# monologue
# JP: （もしも、軽々にこれを議案としてしまっていたら？\n誘致賛成派が、意図的に経営不安の噂を流せば？）
2826 = "（Nếu như, chúng ta dễ dàng biến việc này thành nghị án?\nNếu phe ủng hộ thu hút cố ý tung tin đồn về sự bất ổn trong kinh doanh thì sao?）"
# monologue
# JP: そうなってしまっていたら……
2479 = "Nếu chuyện đó xảy ra..."
# monologue
# JP: マイントレジャー計画どころか、\n御一夜鉄道そのものが――
2415 = "Đừng nói là kế hoạch Mine Treasure,\nmà chính bản thân Đường sắt Ohimitera cũng sẽ――"
# 【稀咲】
# display as 稀咲
# JP: 「ね？　現実化には高いハードルが多いだろう？\nおまけに、ハードルが倒れたときの悪影響は致命的」
1771 = "「Thấy chưa? Có rất nhiều rào cản lớn để hiện thực hóa đúng không?\nHơn nữa, hậu quả khi rào cản đổ vỡ sẽ là chí mạng」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぬ――」
1824 = "「Ư――」"
# monologue
# JP: 稀咲の目が、僕を冷たく見据えている。
2688 = "Ánh mắt Kisaki nhìn tôi chằm chằm lạnh lùng."
# monologue
# JP: 『口出しはもうダメだよ』と、\n今度こそ、約束の履行を要求している。
2776 = "Như muốn nói \"Không được xen vào nữa đâu\",\nlần này cô ấy đang yêu cầu tôi thực hiện đúng lời hứa."
# 【稀咲】
# display as 稀咲
# JP: 「わかるよね？　そんなことになったら、\nどれほど多くの人に迷惑をかけてしまうか」
1767 = "「Cô hiểu chứ? Nếu chuyện đó xảy ra,\nsẽ gây rắc rối cho biết bao nhiêu người」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
# 2207 = "「！」" 
# monologue
# JP: なんだ――ポーレットの様子がおかしい。\n顔が一気に青ざめて、体は、震えだしてまでいる。
2522 = "Sao thế này――Paulette trông lạ lắm.\nKhuôn mặt tái nhợt đi ngay lập tức, cơ thể thậm chí còn bắt đầu run rẩy."
# 【稀咲】
# display as 稀咲
# JP: 「この案――それでも進めるのかい？」
1798 = "「Phương án này――dù vậy cô vẫn định tiến hành sao?」"
# monologue
# JP: 当然だ。
2774 = "Đương nhiên rồi."
# monologue
# JP: ――当然なのだが、\nなぜか、ポーレットは即答しない。
1435 = "――Là điều đương nhiên, nhưng\nkhông hiểu sao Paulette lại không trả lời ngay."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……の……そのっ」
2167 = "「Chuyện... đó... ừm」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
2209 = "「!!!」"
# monologue
# JP: 瞬間、繋がる。理解する。
2451 = "Trong khoảnh khắc, mọi thứ được xâu chuỗi. Tôi đã hiểu."
# monologue
# JP: （これか。これなのか――）
2829 = "（Là cái này sao. Chính là cái này sao――）"
# monologue
# JP: 議会で野次られたときのポーレットは、\nおそらく、この状態に陥ってしまうのだろう。
2524 = "Khi bị la ó ở hội đồng, Paulette\ncó lẽ sẽ rơi vào trạng thái này."
# monologue
# JP: そう感じれば、理解が記憶を引きずり出す。
2526 = "Cảm nhận được điều đó, sự thấu hiểu lôi ký ức ra."
# monologue
# JP: （ヒヤリングのときの――\n宮本さんの、あの驚いた顔）
2832 = "（Lúc ở buổi điều trần――\nKhuôn mặt ngạc nhiên đó của cô Miyamoto）"
# monologue
# JP: わかった、僕にもようやっと――
2418 = "Tôi hiểu rồi, cuối cùng thì tôi cũng――"
# monologue
# JP: いや、ちがう。\nむしろおそらく、“僕だから”こそ、わかり得たのだ。
2355 = "Không, không phải.\nMà có lẽ, chính vì \"là tôi\" nên mới có thể hiểu được."
# monologue
# JP: （ポーレットには――\n深い、記憶の傷があるんだ）
2824 = "（Paulette――\nCó một vết thương sâu thẳm trong ký ức）"
# monologue
# JP: それが、今ポーレットを刺激している。
2709 = "Nó đang kích thích Paulette lúc này."
# monologue
# JP: 心の内からじわじわと、\n理性を崩そう、あきらめさせようと攻撃している。
2507 = "Từ từ len lỏi từ trong tâm trí,\ntấn công để phá vỡ lý trí, ép buộc cô ấy phải bỏ cuộc."
# 【ポーレット】
# display as 波萊特
# JP: 「わたし――はっ」
1958 = "「Tôi――」"
# monologue
# JP: だが、ポーレットは折れていない。\n瞳が、必死に僕を見ている。すがっている。
2380 = "Nhưng, Paulette vẫn chưa gục ngã.\nÁnh mắt cô ấy đang nhìn tôi tuyệt vọng. Đang cầu cứu tôi."
# monologue
# JP: ならっ！
2777 = "Nếu vậy thì!"
# monologue
# JP: （ぎゅっ）
2827 = "（Nắm chặt）"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
# 2207 = "「！」" 
# monologue
# JP: 約束通り、口は出さない。\n代わりに手の甲を包んで握る。
2558 = "Đúng như lời hứa, tôi không lên tiếng.\nThay vào đó, tôi bao bọc lấy mu bàn tay cô ấy và nắm chặt."
# monologue
# JP: “僕がここにいる、絶対支える”\n言葉の代わりに、瞳で伝える。　
2660 = "\"Có tôi ở đây, nhất định sẽ hỗ trợ cô\"\nThay cho lời nói, tôi truyền đạt điều đó qua ánh mắt."
# 【ポーレット】
# display as 波萊特
# JP: 「わた――し――この、件。\n持ち帰り、ます。再検討、します」
1960 = "「Tôi――chuyện này.\nSẽ mang về. Và xem xét lại」"
# 【稀咲】
# display as 稀咲
# JP: 「そうか。そうだね。それが一番いいだろうね」
2030 = "「Vậy sao. Đúng thế. Đó là cách tốt nhất nhỉ」"
# monologue
# JP: にっこり――\n営業スマイルとはとても思えぬ、あたたかな笑み。
2471 = "Mỉm cười――\nMột nụ cười ấm áp, không hề giống nụ cười xã giao chút nào."
# monologue
# JP: そして稀咲は、ポーレットへと右手を差し出す。
2640 = "Rồi Kisaki chìa tay phải về phía Paulette."
# 【稀咲】
# display as 稀咲
# JP: 「おかげで、良い話し合いができました。\nありがとうございます」
1885 = "「Nhờ vậy mà chúng ta đã có một cuộc nói chuyện rất tốt.\nCảm ơn cô」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……いえ。こちらこそ」
1845 = "「A... không. Tôi mới là người phải cảm ơn」"
# 【稀咲】
# display as 稀咲
# JP: 「それから。双鉄にもありがとう」
1815 = "「Sau đó thì. Cũng cảm ơn Soutetsu nữa」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕もか？　僕は何もしていないが」
2165 = "「Cả tôi sao? Tôi đâu có làm gì」"
# 【稀咲】
# display as 稀咲
# JP: 「いやいや？　案外そうでもないよ？」
1709 = "「Không đâu? Ngờ đâu lại không phải vậy đó?」"
# monologue
# JP: 言って稀咲は立ち上がる。\nポーレットを見て、僕を見る。
2747 = "Nói rồi Kisaki đứng lên.\nNhìn Paulette, rồi nhìn tôi."
# 【稀咲】
# display as 稀咲
# JP: 「期待をしても悪くなさそうだと教えてもらえた。\nキミに、だけじゃなくて――キミたちにだけどね」
2089 = "「Tôi đã biết được rằng có kỳ vọng một chút cũng không sao.\nKhông chỉ từ cô――mà là từ các người đấy」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁああああーーーーっ」
1834 = "「Hơiiーーーー」"
# monologue
# JP: 長い息。\nそしてその手は、ティーカップへとゆっくり伸びる。
2474 = "Một tiếng thở dài.\nRồi bàn tay ấy từ từ đưa về phía tách trà."
# 【れいな】
# display as 玲奈
# JP: 「わ。めずらしいですぅ。\nポーレットがミルクもお砂糖もいれないなんて」
1831 = "「Oa. Hiếm thấy nha~.\nChị Paulette lại không cho sữa hay đường luôn kìa」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういう気分のときもあるのさ。\n人間だからな」
1781 = "「Cũng có những lúc tâm trạng như vậy mà.\nVì là con người mà」"
# 【れいな】
# display as 玲奈
# JP: 「はわぁ。\nやっぱり\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;とはちがうのですねぇ」
1835 = "「Hawa~.\nQuả nhiên là khác với \\x%lレイルロオド;#00ffc040;Railord%l;#; nhỉ~」"
# monologue
# JP: れいなは、いつものスキットル。
2646 = "Reina cầm bình tông quen thuộc."
# monologue
# JP: その発言から想像するに、中身はいつも、\n同じメーカー、同じ品種の軽油で変化しないのだろう。
2508 = "Tưởng tượng từ câu nói đó, bên trong chắc lúc nào cũng là,\ncùng một hãng, cùng một loại dầu diesel không thay đổi."
# 【ポーレット】
# display as 波萊特
# JP: 「ううん、違わないと思う。人間も\\x%lレイルロオド;#00ffc040;レイルロオド%l;#;も。\n揺れるのと揺れないの――強いのと弱いのがいるだけで」
1718 = "「Không đâu, chị nghĩ là không khác đâu. Cả con người và \\x%lレイルロオド;#00ffc040;Railord%l;#;.\nChỉ là có người dao động và người không dao động――có người mạnh mẽ và người yếu đuối thôi」"
# 【れいな】
# display as 玲奈
# JP: 「そぉなんですかぁ？」
2034 = "「Vậy sao ạ~?」"
# monologue
# JP: れいなは、なぜか僕を見上げる。\nポーレットは何も答えない。
2656 = "Reina không hiểu sao lại ngước nhìn tôi.\nPaulette không trả lời gì."
# monologue
# JP: ……僕の答えを、ポーレットも待っているかのようだ。
1456 = "......Cứ như thể Paulette cũng đang chờ đợi câu trả lời của tôi vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「確かにいる。が。それも決して不変ではない。\n弱いものが強くもなれば、強いものが弱くもなる」
2080 = "「Quả thực là có. Nhưng. Điều đó cũng không phải là bất biến.\nKẻ yếu đuối có thể trở nên mạnh mẽ, và người mạnh mẽ cũng có thể trở nên yếu đuối」"
# 【れいな】
# display as 玲奈
# JP: 「あー」
# 1842 = "「啊——」" 
# monologue
# JP: ちら、とポーレットの顔を見て、\nそれから頷き、れいなが納得した声を出す。
2649 = "Liếc nhìn khuôn mặt Paulette,\nrồi gật đầu, Reina cất giọng như đã hiểu ra."
# 【れいな】
# display as 玲奈
# JP: 「れいなはきっと、まだ弱いから、\n“そういう気分”がわからないのですねぇ」
1704 = "「Chắc là do Reina vẫn còn yếu đuối,\nnên mới không hiểu được \"tâm trạng như vậy\" đó nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「違う、かな。きっと弱さを、まだ知らないだけ。\nけど、そんなの、ずうっと知らない方がいい」
1715 = "「Không phải đâu. Chắc chắn chỉ là em chưa biết thế nào là yếu đuối thôi.\nNhưng mà, những thứ như thế, thà không biết bao giờ còn hơn」"
# 【れいな】
# display as 玲奈
# JP: 「きゃあ」
1833 = "「Kya!」"
# monologue
# JP: 喜びの悲鳴。
2396 = "Tiếng hét vui sướng."
# monologue
# JP: れいなはポーレットに抱きかかえられ、\nそのまますとん、と膝の上へと。
2654 = "Reina được Paulette ôm lấy,\nrồi đặt phịch xuống đùi."
# 【ポーレット】
# display as 波萊特
# JP: 「それで、双鉄くん」
2187 = "「Thế rồi, Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1870 = "「嗯」" 
# monologue
# JP: いつものごとくれいなを膝の上に乗せ、\nポーレットの方もある種の安定を得たのだろうか。
2461 = "Đặt Reina lên đùi như mọi khi,\ncó lẽ Paulette cũng đã có được một loại cảm giác an tâm nào đó chăng."
# monologue
# JP: 声も表情も、かなりほぐれてきているようだ。
2468 = "Cả giọng nói lẫn biểu cảm dường như đã thoải mái hơn rất nhiều."
# 【双鉄】
# display as 雙鐵
# JP: 「課題は、確かに多く複雑ではあるな。\nが――それは、ヒントを貰えたということでもある」
1972 = "「Nhiệm vụ quả thực rất nhiều và phức tạp.\nNhưng――điều đó cũng có nghĩa là chúng ta đã nhận được gợi ý」"
# 【ポーレット】
# display as 波萊特
# JP: 「そう、ですよね」
2015 = "「Đúng, vậy nhỉ」"
# monologue
# JP: ゆっくり、ゆっくり、言葉が連なる。
2457 = "Chậm rãi, từ từ, từng lời nói được thốt ra."
# 【ポーレット】
# display as 波萊特
# JP: 「宝生さん。その気になれば――\nこの計画も、会社だって、潰せたんですから」
1717 = "「Cô Houshou. Nếu cô ấy muốn――\nCả kế hoạch này, lẫn công ty, đều có thể bị nghiền nát」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 2027 = "「是啊」" 
# monologue
# JP: けれど、稀咲はそうしなかった。\nどころか、“期待をしている”と、明言までした。
2381 = "Nhưng, Kisaki đã không làm vậy.\nThậm chí, cô ấy còn nói rõ là \"đang kỳ vọng\"."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、僕たちにはまだ可能性があるということだ。\nならば僕らが考えるべきは、そうするための次の一手だ」
1729 = "「Nghĩa là, chúng ta vẫn còn cơ hội.\nVậy thì điều chúng ta nên nghĩ bây giờ là nước cờ tiếp theo để đạt được điều đó」"
# 【ポーレット】
# display as 波萊特
# JP: 「そう……ですね。うん。\nまだ、実際には何も動いてないですもんね」
2019 = "「Đúng... nhỉ. Ừm.\nThực tế thì chúng ta vẫn chưa bắt tay vào làm gì cả mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1870 = "「嗯」" 
# monologue
# JP: しかし、警告だけは得た。\n軽々に動いてしまえば、即座に付け込まれ潰される。
2372 = "Nhưng, chúng ta đã nhận được lời cảnh báo.\nNếu hành động khinh suất, sẽ lập tức bị lợi dụng và nghiền nát."
# monologue
# JP: これは、そういう案件なのだと。
2765 = "Đây chính là một vụ việc như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「協力者を求めることや、意見募集は、\nひとまず中断するべきかもしれんな」
2070 = "「Có lẽ chúng ta nên tạm dừng việc tìm kiếm người hợp tác\nvà thu thập ý kiến đã」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。\n妙な噂が立っちゃう前に、準備、できるだけ固めないと」
2024 = "「Đúng vậy.\nTrước khi những tin đồn kỳ lạ lan ra, chúng ta phải củng cố sự chuẩn bị càng nhiều càng tốt」"
# 【双鉄】
# display as 雙鐵
# JP: 「不安要因を出来る限りに減らすためには――\nなによりもやはり、資金の見通しを明確にすることか」
2053 = "「Để giảm thiểu tối đa các yếu tố gây bất an――\nQuan trọng nhất vẫn là phải làm rõ triển vọng về vốn nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「そう思います。とにかく……いくら必要になりそうか、\n概算でも出しておかないことには」
1968 = "「Tôi cũng nghĩ vậy. Dù sao thì... cũng phải đưa ra được một con số ước tính,\nxem cần khoảng bao nhiêu tiền」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな、しかし――」
2029 = "「Đúng vậy, nhưng――」"
# monologue
# JP: 概算を出すにしたって、事業計画が必要だ。
2498 = "Dù là ước tính thì cũng cần phải có kế hoạch kinh doanh."
# monologue
# JP: 修復すべき施設の規模は、\n計画がなければ絞り込めない。
2435 = "Quy mô cơ sở vật chất cần tu sửa,\nnếu không có kế hoạch thì không thể thu hẹp lại được."
# 【双鉄】
# display as 雙鐵
# JP: 「まずはミニマムで考えよう。\n今出ている案に必要な施設が、どの程度かを」
1785 = "「Trước mắt cứ nghĩ ở mức tối thiểu đi.\nXem những cơ sở vật chất cần thiết cho phương án hiện tại là ở mức độ nào」"
# 【ポーレット】
# display as 波萊特
# JP: 「それだと……\n廃宿舎の中とかも、再調査しないとですね」
2158 = "「Nếu vậy thì...\nCũng phải điều tra lại cả bên trong khu túc xá bỏ hoang nữa nhỉ」"
# 【れいな】
# display as 玲奈
# JP: 「あああ、そうです、調査ですぅ！」
1844 = "「Aaaa, đúng rồi, là điều tra đó nha~!」"
# monologue
# JP: 突然、れいなの大きな声。\n慣れているのか、ポーレットはまるで動じない。
2651 = "Đột nhiên, giọng Reina vang lên thật lớn.\nChắc do đã quen, Paulette hoàn toàn không hề lay chuyển."
# 【れいな】
# display as 玲奈
# JP: 「鉱山鉄道の調査、結果、どうなったのですかぁ？」
1764 = "「Kết quả điều tra tuyến đường sắt mỏ,\nnhư thế nào rồi ạ~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1842 = "「啊——」" 
# monologue
# JP: マイントレジャーのことに頭が行き過ぎて、\nそこの報告を失念していた。
2632 = "Do đầu óc quá chú tâm vào Mine Treasure,\nnên tôi đã quên bẵng mất việc báo cáo."
# monologue
# JP: 最も、鉱山鉄道そのものについては、\nこう、と報告できるほどの収穫もなかったのだが。
2353 = "Mặc dù, về bản thân tuyến đường sắt mỏ,\ncũng chẳng có thu hoạch gì đáng để báo cáo cả."
# 【ポーレット】
# display as 波萊特
# JP: 「あのね？　れいな」
2099 = "「Này nhé? Reina」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
# 1870 = "「嗯」" 
# monologue
# JP: 汰斗さんの部屋にあった古地図のコピーを広げつつ、\nポーレットがれいなへと説明していく。
2615 = "Vừa mở bản sao tấm bản đồ cổ trong phòng ông Taito ra,\nPaulette vừa giải thích cho Reina."
# monologue
# JP: れいなは何度もうなずいて、\n細かな点に質問をくわえ、確認していく。
2657 = "Reina gật đầu nhiều lần,\nđặt thêm câu hỏi về những điểm chi tiết và xác nhận lại."
# 【れいな】
# display as 玲奈
# JP: 「ここに沈殿池があったんですかぁ。\nなら、まわりの建物は\\x%l選炭場;#00ffc040;選炭場%l;#;ですねぇ、きっと」
1803 = "「Ở đây có bể lắng cặn sao ạ~.\nNếu vậy thì các tòa nhà xung quanh chắc chắn là \\x%l選炭場;#00ffc040;nhà máy tuyển than%l;#; rồi nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「センタンジョウ？」
2163 = "「Nhà máy tuyển than?」"
# 【れいな】
# display as 玲奈
# JP: 「石炭の選別をする場所で、\\x%l選炭場;#00ffc040;選炭場%l;#;ですぅ」
1939 = "「Là nơi phân loại than đá, gọi là \\x%l選炭場;#00ffc040;nhà máy tuyển than%l;#; đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、なるほどな」
1839 = "「Ồ, ra là vậy」"
# monologue
# JP: さすが、もともとは鉱山鉄道の出身だ。
2642 = "Quả không hổ danh là người xuất thân từ đường sắt mỏ."
# monologue
# JP: れいなは僕らの“報告できるほどもない収穫”から、\n少しずつ、意味ある実りを抽出してくれる。
2462 = "Reina từ \"những thu hoạch chẳng đáng để báo cáo\" của chúng tôi,\ntừng chút một, chắt lọc ra những thành quả có ý nghĩa."
# 【れいな】
# display as 玲奈
# JP: 「で、この終点は、炭鉱夫さんたちと、\n掘った石炭を乗せるための駅だったんですよぉ、きっと」
2098 = "「Và điểm cuối này, chắc chắn là nhà ga để chở các thợ mỏ\nvà than đá đã khai thác đó nha~」"
# monologue
# JP: うんうんうんとうなずいて。\n短い指は、ぴっと地図上の一点を指す。
2473 = "Cô bé gật gật gật đầu.\nNgón tay ngắn ngủn chỉ thẳng vào một điểm trên bản đồ."
# 【れいな】
# display as 玲奈
# JP: 「それできっとぉ、\nこっちの方に走る支線もあるですねぇ」
2094 = "「Thế nên chắc chắn là~,\ncũng có tuyến nhánh chạy về phía này nữa nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「支線？」
2006 = "「Tuyến nhánh?」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ！？　ウソ、なんでっ！」
1826 = "「Hả!? Không thể nào, tại sao!」"
# 【れいな】
# display as 玲奈
# JP: 「だってだって、これ、\n発電所のマークじゃないですかぁ」
1878 = "「Bởi vì bởi vì, cái này,\nchẳng phải là ký hiệu của nhà máy điện sao ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！！！」
# 2209 = "「！！！」" 
# monologue
# JP: ああ、そうだ。\nあの鉱山には、確かにいくつも、電動らしき設備があった。
2445 = "A, đúng rồi.\nỞ khu mỏ đó, quả thực có vài thiết bị trông có vẻ chạy bằng điện."
# monologue
# JP: そして、市内から術仙炭鉱には、\n送電線が伸びてきてなどいないのだから――
2704 = "Và từ thành phố đến mỏ than Jussen,\nkhông hề có đường dây điện nào kéo tới cả nên――"
# 【ポーレット】
# display as 波萊特
# JP: 「発電所への、支線」
2153 = "「Tuyến nhánh, dẫn đến nhà máy điện」"
# 【れいな】
# display as 玲奈
# JP: 「宿舎があるの、ここですよねぇ？」
1921 = "「Khu túc xá nằm ở đây, đúng không ạ~?」"
# monologue
# JP: 短い指が差す点に間違いはない。
2665 = "Điểm mà ngón tay ngắn ngủn chỉ vào không sai chút nào."
# monologue
# JP: 地図上で見れば、発電所と宿舎――\n単純な直線距離で測っても、5km以上は離れている。
2506 = "Nhìn trên bản đồ, nhà máy điện và khu túc xá――\nDù chỉ đo bằng khoảng cách đường chim bay, cũng cách nhau hơn 5km."
# 【れいな】
# display as 玲奈
# JP: 「こんなとこまで、山道越えて歩けないですよぉ。\nだから、ぜーったい支線があったって思います」
1737 = "「Xa thế này, không thể lội đường núi đi bộ được đâu ạ~.\nNên em nghĩ, tuyệt đốiiii là có tuyến nhánh đó nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうよね。人員も資材も運ばなくちゃいけないし……\nそれに……考えてみたら鉄道資材がどこにもなかった」
2022 = "「Đúng nhỉ. Phải vận chuyển cả nhân sự lẫn vật tư nữa...\nHơn nữa... nghĩ lại thì chẳng thấy vật tư đường sắt ở đâu cả」"
# monologue
# JP: 解体され、持ち去られたのかと反射で思うが――\nそれをするなら、周辺線路も、工場設備も残さんだろう。
2561 = "Phản xạ đầu tiên là nghĩ rằng chúng đã bị tháo dỡ và mang đi――\nNhưng nếu làm vậy, thì đường ray xung quanh và thiết bị nhà máy cũng sẽ không còn sót lại đâu."
# monologue
# JP: なら、どこか――たとえば、その支線沿いに……
2779 = "Nếu vậy thì, ở đâu đó――ví dụ như, dọc theo tuyến nhánh đó..."
# 【ポーレット】
# display as 波萊特
# JP: 「行きましょう、双鉄くん」
1973 = "「Đi thôi, Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！」
# 1871 = "「嗯！」" 
# monologue
# JP: 完全に、ポーレットが戻ってきてくれる。\nその目に再び、強い光が宿っている。
2616 = "Paulette đã hoàn toàn lấy lại tinh thần.\nTrong ánh mắt đó lại ánh lên một tia sáng mạnh mẽ."
# 【双鉄】
# display as 雙鐵
# JP: 「お手柄だな、れいな」
1772 = "「Lập công lớn rồi đấy, Reina」"
# monologue
# JP: 頭を撫でれば、\n気持ち良さそうに目を細める。
2544 = "Khi tôi xoa đầu,\ncô bé nheo mắt lại trông có vẻ rất thích thú."
# 【れいな】
# display as 玲奈
# JP: 「えへへへ、れいな。\nお役にたてたならうれしいですよぉ」
1875 = "「Ehehehe, Reina.\nRất vui nếu có thể giúp ích được đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「できれば、これからさらにお役に立ってもらいたい」
1895 = "「Nếu được, tôi muốn em sẽ giúp ích nhiều hơn nữa từ bây giờ」"
# monologue
# JP: 僕の言葉に、ポーレットも強く頷いてくれる。
2716 = "Nghe tôi nói, Paulette cũng gật đầu thật mạnh."
# 【双鉄】
# display as 雙鐵
# JP: 「術仙廃炭鉱の再調査。\nれいなにも同行をしてもらいたい」
1974 = "「Điều tra lại mỏ than bỏ hoang Jussen.\nTôi muốn Reina cũng đi cùng」"
