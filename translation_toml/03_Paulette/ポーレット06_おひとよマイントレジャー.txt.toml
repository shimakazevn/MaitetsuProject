2690 = "稀咲站起來走到咖啡壺跟前，給自己倒了一杯咖啡。" 

# monologue
# JP: 「君たちもよければどうぞ」という声に従い、\nポーレットは二杯を淹れて、片方を僕に渡してくれる。
2711 = "聽到她說“你們也請自便”，波萊特也上前倒了兩杯，將一杯遞給了我。" 

# 【稀咲】
# display as 稀咲
# JP: 「ポジションの問題――なんてどうかな？」
1757 = "「位置的問題——這個如何？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポジション？」
1761 = "「位置？」" 

# monologue
# JP: 僕とポーレットとが隣同士。\n向かいには、稀咲が――
2536 = "我和波萊特並排坐著。稀咲坐在對面——" 

# 【稀咲】
# display as 稀咲
# JP: 「位置関係のポジションじゃない。\n立場、態度のポジションさ」
1713 = "「不是指座位的位置，而是立場、態度方面」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
# 1841 = "「唔」" 

# monologue
# JP: こちらの考えを見透かされ、\n向こうの考えがまるで見えない。
2553 = "我的心思完全被看穿了，但反過來卻完全猜不出對面的想法。" 

# monologue
# JP: ならば、どうする――
2780 = "那麼，該怎麼辦——" 

# 【ポーレット】
# display as 波萊特
# JP: 「それって、どういうことでしょう」
2115 = "「請問這是什麼意思」" 

# monologue
# JP: “聞くまでだ”とおもうより先、\nポーレットが口火を切っている。
2350 = "不等我得出“直接問問就行”的結論，波萊特已經先開了口。" 

# monologue
# JP: その問いに、稀咲はニヤ、と満足そうな笑みを浮かべる。
2714 = "聽到這個提問，稀咲露出滿意的微笑。" 

# 【稀咲】
# display as 稀咲
# JP: 「例えば、[ひない,1]雛衣ポーレットさん。君は右田双鉄くんを\n随分と高く評価している。秘書として雇い入れるほど」
2039 = "「比方說，雛衣波萊特小姐。你對右田雙鐵先生的評價非常高，以至於讓你聘請他做秘書對吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 2027 = "「是啊」" 

# monologue
# JP: 即答。照れも戸惑いもせず。\nそれが素直に――実に嬉しい。
2361 = "乾脆的回答，既沒有羞澀也沒有猶豫。這令我感到十分欣喜。" 

# 【稀咲】
# display as 稀咲
# JP: 「しかし、右田双鉄くんが仮に……そうだな、\nクマ焼酎にハマってアル中になり、能力低下したとする」
1753 = "「但是，比方說右田雙鐵先生他……對了，他沉迷於隈燒酒開始酗酒，導致他無法正常完成工作」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そんなことっ」
2150 = "「這怎麼可能——」" 

# 【稀咲】
# display as 稀咲
# JP: 「仮に。だよ。\nそれに、無いと断言できる話でもない」
1817 = "「只是打個比方。而且，你也無法保證它完全不可能發生」" 

# monologue
# JP: 未来のことなど、誰にもわからん。\n稀咲の仮説は、ゆえにポーレットにも反論不能だ。
2748 = "誰都無法預知未來。所以，波萊特無法反駁稀咲的假設。" 

# 【稀咲】
# display as 稀咲
# JP: 「能力低下が仕事のミスをも呼び起こす。\n周囲からも、苦情が寄せられるようになる」
2096 = "「而且他還在工作上出錯。周圍的人也對此很不滿意」" 

# monologue
# JP: わずかにだけれどポーレットの頬がぷっと膨らむ。
2623 = "波萊特稍稍鼓起了臉蛋。" 

# monologue
# JP: 不満を示してくれてることも、\nやはり素直に、嬉しく感じる。
2500 = "就連看到她為我抱不平，也令我感到很高興。" 

# 【稀咲】
# display as 稀咲
# JP: 「さて、その右田双鉄くんを、\nポーレットさんは免職させるかい？」
2183 = "「那麼請問波萊特小姐，你會開除這位右田雙鐵先生嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「首になんてしません！　もし、万が一そうなっても、\n双鉄くんなら、必ず立ち直ってくれますから」
1953 = "「怎麼會開除呢！　就算雙鐵君真的變成了那樣，他也一定會重新振作起來的」" 

# 【稀咲】
# display as 稀咲
# JP: 「じゃあ、切り替えて別の質問」
2179 = "「那我們換一個問題」" 

# monologue
# JP: 稀咲はくるり、\n手の中でペンをもてあそぶ。
2692 = "稀咲轉著手中的筆。" 

# 【稀咲】
# display as 稀咲
# JP: 「ボクの部下に、アル中になり周囲を困らせる男が居て。\nボクがその男の責任を問わないとしたら、どうかな？」
1881 = "「在我手下有一名酗酒的男職員，頻頻給周圍的人添麻煩。而我卻沒有追究他的責任——這樣你會怎麼想？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――」
1842 = "「啊——」" 

# monologue
# JP: 言われたことを、理解する。\nポーレットも、おそらくは僕と同様に。
2546 = "我明白了她的意思。恐怕波萊特也是一樣。" 

# monologue
# JP: “稀咲と誰か”で例えられれば、\n“責任を問わないことは無責任”だと、思えてしまって。
2345 = "一旦將這個假設換成“稀咲與某個人”，我們立刻會覺得“不追究責任是不負責的行為”。" 

# 【稀咲】
# display as 稀咲
# JP: 「それが、ポジションを取るということ」
2149 = "「這就是我說的——選定位置」" 

# monologue
# JP: 稀咲の声は、勝ち誇らない。\nむしろどこか、悲しげなようにさえ聞こえてしまう。
2509 = "從稀咲的話語中，聽不出一絲高傲。反而透著一縷悲涼。" 

# 【稀咲】
# display as 稀咲
# JP: 「人は、自分が取ったポジションに固執するのさ。\n過去の判断を、なんとか正当化しようと頑張ってしまう」
1738 = "「人會執著於自己選定的位置。會為自己做過的判斷尋找正當的理由」" 

# 【双鉄】
# display as 雙鐵
# JP: 「客観的に見れば、誤った判断だとしても――」
1799 = "「即使從客觀上來看，那是一個錯誤的判斷——」" 

# 【稀咲】
# display as 稀咲
# JP: 「そう、過去の判断を正当化するため、\n新しい過ちを重ねてさえもしまうんだ」
2043 = "「沒錯，為了給自己做過的判斷尋找正當理由，甚至還會犯下又一個錯誤」" 

# monologue
# JP: ぎゅうっと、ポーレットの眉根が寄る。
2617 = "波萊特忽然皺起了眉頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……術仙炭鉱にポジションを取った人が――\n御一夜には、たくさんいる」
1464 = "「……在術仙煤礦這件事上——御一夜有許多人選定了自己的位置」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！！」
2208 = "「！！」" 

# monologue
# JP: 絞りだすような声でようやく、繋がった。
2712 = "聽到她近乎於沉痛的聲音，我終於明白過來。" 

# monologue
# JP: 例え話で、稀咲が何を伝えようとしているのか――\n僕は、まるきりわかってなかった。
2529 = "我之前一直沒有明白——稀咲希望透過這個假設告訴我們什麼。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、そうした人たちにして見れば……\n廃炭鉱は、触れられたくない傷そのものなのか」
2033 = "「是這樣啊，在那些人眼中……廢煤礦就是一道不願觸碰的傷疤啊」" 

# monologue
# JP: “過去の判断が誤りではない”それが証明できないとき、\nおそらく人は、過去そのものにフタをする。
2662 = "當人們無法證明“過去的判斷是正確的”，恐怕他們會將這一整段記憶封印起來。" 

# monologue
# JP: 再開発は、そのフタを開け、\n“現状を見ろ”と強いる行為ともなってしまう。
2707 = "而我們二次開發的計劃，也將意味著揭開他們的傷口，迫使他們面對現實。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、それはデリケートで難しそうな問題――」
2159 = "「這的確是個敏感且棘手的問題——」" 

# 【稀咲】
# display as 稀咲
# JP: 「問題は他にもある。\nもっと、ずうっと深刻なものもね」
2164 = "「還有別的問題。遠比這個還要嚴重許多的問題」" 

# monologue
# JP: 僕の言葉を、おそらくは意図的に遮って、\n稀咲は試すような目つきになる。
2689 = "稀咲彷彿故意打斷了我的話，目光中帶著試探的意味。" 

# 【稀咲】
# display as 稀咲
# JP: 「これは、ポーレットさんに聞きたい。\n双鉄は少し、黙っていてくれないかな」
2146 = "「這件事，我想問波萊特小姐。雙鐵你能安靜一會嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だ、そうだが？」
1769 = "「你看行嗎？」" 

# monologue
# JP: むっつり。こくり。\nそんな感じで、ポーレットが頷く。
2618 = "波萊特悶悶不樂地點了點頭。" 

# monologue
# JP: さきほどの例え話への不機嫌が、\nあるいは未だ、残っているのだろうか？
2806 = "難道她還在為剛才的假設而不開心嗎？" 

# 【双鉄】
# display as 雙鐵
# JP: 「…………」
1462 = "「…………」" 

# monologue
# JP: が、それがポーレットのお望みならば、\nあえて逆らおうとは思わない。
2378 = "但是，既然波萊特希望如此，我就沒有理由去反對。" 

# monologue
# JP: 指をバツにし口の前へと持っていけば、\n稀咲は満足そうにうなずき、話し始める。
2668 = "看到我在嘴巴跟前做了一個打叉的手勢，稀咲滿意地點了點頭，開口道。" 

# 【稀咲】
# display as 稀咲
# JP: 「より深刻な問題は、ごく単純な問題さ。\nつまりは、資金」
2147 = "「這個更加嚴重的問題很單純。也就是——資金」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
2207 = "「！」" 

# 【稀咲】
# display as 稀咲
# JP: 「そうだねポーレットさん。御一夜鉄道株式会社が\n事業主体となるのには、いくつかの問題がある」
1983 = "「我想了一下，波萊特小姐。如果御一夜鐵路股份公司想成為一個商業主體，還存在著幾個問題」" 

# monologue
# JP: ポーレットの瞳が前を向く。\nまっすぐ、まっすぐ、稀咲へと。
2622 = "波萊特看向前方。直直地望著稀咲。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしが市長で、社長でもあることがまず問題ですね。\n市の所有地を、わたしの会社の営利のためには使えない」
2204 = "「首先一個問題就是——我既是市長，也是社長。我不能將市政府的所有地用於我公司的營利」" 

# 【稀咲】
# display as 稀咲
# JP: 「うん。やってしまえば、公私混同甚だしくなる」
1865 = "「嗯。如果這麼做了，就是徹底的公私不分了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「市に賃貸料を払うようなことになれば、\n自前での資金調達が必須となってくるけれど……」
1905 = "「如果要向市裡支付租金，我就必須自己籌備資金……」" 

# 【稀咲】
# display as 稀咲
# JP: 「難しいだろうねぇ。鉄道債を既に発行しているからね」
1955 = "「恐怕很難吧。因為鐵路債券已經發行出去了」" 

# monologue
# JP: ならばまた鉄道債をと思いかけ、\nすぐさま自分の不明に気付く。
2533 = "我先是想到額外發行鐵路債券，但很快便發覺了自己的愚蠢。" 

# monologue
# JP: （いや、そうだ。鉄道債は――）
2831 = "（等等，對啊。鐵路債券是——）" 

# 【ポーレット】
# display as 波萊特
# JP: 「鉄道債は、借金だから」
2193 = "「鐵路債券……是借款」" 

# monologue
# JP: ポーレットの声は弱々しい。
2620 = "波萊特的聲音很微弱。" 

# monologue
# JP: 認めたくない事実をいやいや、\n喉から押し出しているようだ。
2495 = "就好像被迫說出了一個不願承認的事實。" 

# 【ポーレット】
# display as 波萊特
# JP: 「事業計画に完全な賛同を得られなければ……\n計画の説明自体が、諸刃の剣になりかねない」
1898 = "「如果商業計劃不能獲得一致贊同……那麼我對這個計劃所做的介紹，也將變成一把雙刃劍」" 

# 【稀咲】
# display as 稀咲
# JP: 「だね。取付け騒ぎでも起きれば、\n御一夜鉄道のキャッシュじゃとても回らないよね」
2026 = "「是啊。如果鬧出擠兌風波，光憑御一夜鐵路的現金是不足以周轉的吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「取付け騒ぎ？」
2005 = "「擠兌風波？」" 

# monologue
# JP: おっと、思わず話してしまった。
2443 = "哎呀，一不小心插話了。" 

# monologue
# JP: が、この質問はセーフなのか、\n稀咲は特にとがめもせずに答えてくれる。
2374 = "但是，我這個提問似乎是被允許的。稀咲並沒有責備我，直接回答道。" 

# 【稀咲】
# display as 稀咲
# JP: 「鉄道債には、\n満期前にも解約できるオプションが設定してあるんだ」
2194 = "「鐵路債券是可以選擇未到期提前解約的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「満期前の解約は、額面の２５％が違約金となります。\nですから普通は解約なんてありえないんです。けど……」
1900 = "「如果在未到期的情況下解約，將收取面額的２５％作為違約金。所以一般是不可能有人解約的。但是……」" 

# monologue
# JP: …………“けど”の続きが聞こえてこない。
1448 = "…………她沒有繼續說下去。" 

# monologue
# JP: ややあって、\n稀咲の声がその沈黙を埋めていく。
2766 = "過了一會，稀咲才出聲打破了沉默。" 

# 【稀咲】
# display as 稀咲
# JP: 「会社が倒産してしまえば、社債は紙くずだからね。\n不安が高まれば、『そうなるよりは』との判断も出る」
1705 = "「一旦公司倒閉，債券就會變成一張廢紙。隨著不安的情緒高漲，自然會有人選擇棄車保帥」" 

# monologue
# JP: ふっ、と。短い息が吐かれる。
2624 = "波萊特輕嘆一聲。" 

# monologue
# JP: 稀咲に軽く目礼し、\nポーレットはサバサバとした声を出す。
2464 = "她用眼神向稀咲致謝，然後爽快地說道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「解約が殺到してしまったら、現金が不足します。\n改修に、もう使っちゃってるわけですから」
1707 = "「一旦解約潮湧來，就會出現現金不足的情況。因為那些現金已經用在修復工程上了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。となれば現実に倒産か。\n噂から真が出てしまうわけだ――っ！」
1800 = "「原來如此。那樣的話就真的要倒閉了啊。流言傳著傳著就成了真——啊！」" 

# monologue
# JP: いや、これはそれほどのんきな話ではない。
2357 = "不，這件事可遠遠沒有那麼簡單。" 

# monologue
# JP: 術仙炭鉱にかつてポジションを取っていて、\nそして今、\x%lエアクラ;#00ffc040;エアクラ%l;#;誘致賛成派の議員は確実にいる。
2753 = "議員之中一定有人在術仙煤礦這件事上選定了位置，並且還是\\x%lエアクラ;#00ffc040;空凝機%l;#;工廠落戶支持派的一員。" 

# monologue
# JP: （もしも、軽々にこれを議案としてしまっていたら？\n誘致賛成派が、意図的に経営不安の噂を流せば？）
2826 = "（如果我們草率地提出了這份議案，而工廠支持派有意散播出經營不穩定的流言的話——）" 

# monologue
# JP: そうなってしまっていたら……
2479 = "如果變成這樣的話……" 

# monologue
# JP: マイントレジャー計画どころか、\n御一夜鉄道そのものが――
2415 = "別說是煤探樂園計劃，就連御一夜鐵路都會——" 

# 【稀咲】
# display as 稀咲
# JP: 「ね？　現実化には高いハードルが多いだろう？\nおまけに、ハードルが倒れたときの悪影響は致命的」
1771 = "「你看？　實現起來有太多難題了吧？而且，如果難題無法解決，所造成的惡劣影響就會是致命的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ぬ――」
1824 = "「呃——」" 

# monologue
# JP: 稀咲の目が、僕を冷たく見据えている。
2688 = "稀咲冷冷地看著我。" 

# monologue
# JP: 『口出しはもうダメだよ』と、\n今度こそ、約束の履行を要求している。
2776 = "那眼神彷彿在說“這次不准再插話了”，要求我履行承諾。" 

# 【稀咲】
# display as 稀咲
# JP: 「わかるよね？　そんなことになったら、\nどれほど多くの人に迷惑をかけてしまうか」
