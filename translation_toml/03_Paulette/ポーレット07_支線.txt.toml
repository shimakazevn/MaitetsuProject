2039 = "「８６２０不是需要\\x%l客車;#00ffc040;客運車廂%l;#;嗎，我正在向\\x%lまいてつ;#00ffc040;掌車人%l;#;們打聽呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1657 = "「嗯」" 

# monologue
# JP: 言われてみれば、そうだった。\n秘書業に追われ、ついうっかりしてしまったが……
2536 = "確實是有這麼一回事。然而我最近忙於處理秘書事物，以至於忘記了這回事……" 

# monologue
# JP: （いや、ポーレットの忙しさは、\n僕の比どころではないはずなのに――）
2651 = "（不，波萊特明明比我更忙才對——）" 

