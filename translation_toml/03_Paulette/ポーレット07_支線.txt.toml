[script]
# lines: 380 
# monologue
# JP: ざくざく、歩く。
2462 = "Sột soạt, bước đi."
# monologue
# JP: 夏草を踏み、完全に[うず]埋もれているかつてのレールに、\nその役割を思い出させる。
2393 = "Đạp lên lớp cỏ mùa hè, chúng tôi gợi nhớ lại vai trò của đoạn đường ray cũ đã bị chôn vùi hoàn toàn này."
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、ハチロクには助けられたな」
1900 = "「Cơ mà, nhờ có Hachiroku cứu nguy nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。ちょっと盲点でした」
1795 = "「Đúng vậy ạ. Có chút điểm mù」"
# monologue
# JP: 『でしたら、引けばいいのです。\\x%l8620;#00ffc040;8620%l;#;で\\x%lキハ07;#00ffc040;キハ07%l;#;を。\n\\x%lキハ07;#00ffc040;キハ07%l;#;を動力車でなく、ただ\\x%l客車;#00ffc040;客車%l;#;として引けばいい』
1240 = "『Nếu vậy thì chỉ cần kéo là được ạ. Dùng \\x%l8620;#00ffc040;8620%l;#; kéo \\x%lキハ07;#00ffc040;KiHa 07%l;#;. Không dùng \\x%lキハ07;#00ffc040;KiHa 07%l;#; như toa xe động lực, mà chỉ kéo nó như một \\x%l客車;#00ffc040;toa hành khách%l;#; bình thường thôi』"
# monologue
# JP: そのハチロクの一言で、今日の定時の往復運行から、\nポーレットとれいなは解放された。
2545 = "Chỉ với một câu nói đó của Hachiroku, Paulette và Reina đã được giải phóng khỏi chuyến chạy khứ hồi định kỳ ngày hôm nay."
# 【ポーレット】
# display as 波萊特
# JP: 「一日フルに使えると、やっぱり余裕が違いますよね」
1917 = "「Được dùng trọn vẹn một ngày, quả nhiên là rảnh rỗi hơn hẳn anh nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。おかげで成果も出せてる」
1791 = "「Ừm. Nhờ vậy mà cũng thu được thành quả」"
# monologue
# JP: 明るい声を交換しあえば、達成感がいや増していく。
2394 = "Trao đổi bằng những giọng nói vui vẻ, cảm giác thành tựu ngày càng tăng lên."
# 【双鉄】
# display as 雙鐵
# JP: 「発電所の状態も思っていたよりずっと良かった。\nあれならあるいは、再稼働さえ可能であるかもしれん」
1892 = "「Tình trạng của nhà máy điện cũng tốt hơn anh nghĩ nhiều. Như thế thì có khi còn có thể tái khởi động lại được ấy chứ」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね――けど」
1783 = "「Đúng vậy ạ—— nhưng mà」"
# monologue
# JP: 僕を見る目が、心配そうにふ、と伏せられる。
2490 = "Đôi mắt nhìn tôi khẽ cụp xuống đầy vẻ lo âu."
# 【ポーレット】
# display as 波萊特
# JP: 「凪ちゃんの件、大丈夫でしょうか？」
1536 = "「Chuyện của bé Nagi, liệu có ổn không anh?」"
# 【双鉄】
# display as 雙鐵
# JP: 「大丈夫だろう」
1722 = "「Chắc là ổn thôi」"
# monologue
# JP: 今日の\\x%l8620;#00ffc040;8620%l;#;の体制は、ハチロク指揮下、\n\\x%l機関士;#00ffc040;機関士%l;#;・日々姫、\\x%l機関助士;#00ffc040;機関助士%l;#;・凪の見習いコンビだ。
2234 = "Thể chế của \\x%l8620;#00ffc040;8620%l;#; hôm nay là dưới sự chỉ huy của Hachiroku, cùng bộ đôi tập sự \\x%l機関士;#00ffc040;lái tàu%l;#; Hibiki và \\x%l機関助士;#00ffc040;phụ lái tàu%l;#; Nagi."
# monologue
# JP: ポーレットの懸念ももっともだから、\n余計な不安を交えぬように、断定口調を意識する。
2626 = "Mối lo ngại của Paulette cũng có lý, nên tôi cố tình dùng giọng điệu quả quyết để không xen lẫn sự bất an thừa thãi."
# 【双鉄】
# display as 雙鐵
# JP: 「体力は十二分だし、\\x%l機関助士;#00ffc040;機関助士%l;#;としての訓練も受けている。\nセンスの良さにいたっては、ハチロク先生のお墨付きだ」
1568 = "「Thể lực thì dư dả, con bé cũng đã được huấn luyện làm \\x%l機関助士;#00ffc040;phụ lái tàu%l;#;. Về độ nhạy bén thì đã được cô giáo Hachiroku bảo chứng rồi」"
# 【ポーレット】
# display as 波萊特
# JP: 「ああいえ、その方面じゃなくて」
1636 = "「À không, không phải phương diện đó ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ？」
1609 = "「Hửm?」"
# monologue
# JP: ザっ、と。ポーレットの足が草を蹴る。
2492 = "Xoạt một cái. Chân Paulette đá vào cỏ."
# monologue
# JP: 意識的にやったわけでもなかろうが、\n足元の悪さのせいで、かなり大きな音が立つ。
2617 = "Chắc em không cố ý làm vậy, nhưng do chỗ đặt chân không tốt nên phát ra tiếng khá lớn."
# 【ポーレット】
# display as 波萊特
# JP: 「約束させられたじゃないですか、双鉄くん。\n凪ちゃんの仕事、ひとつ代わりにやってあげるって」
2020 = "「Anh bị bắt hứa rồi mà, anh Soutetsu. Là sẽ làm thay bé Nagi một việc ấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そのことについても問題あるまい。\n凪は、竹を割ったような性格だしな」
1607 = "「À, về chuyện đó thì chắc cũng không có vấn đề gì đâu. Nagi có tính cách thẳng thắn như chẻ tre mà」"
# monologue
# JP: 一直線で、歪んだところがまるで無い。\n駆け引きだの計算だのも苦手のようだし――
2273 = "Thẳng thắn, không hề có chỗ nào cong vẹo. Con bé có vẻ cũng không giỏi mấy trò tính toán hay mặc cả——"
# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠さんの手伝いか、あるいは川下りの方の手伝いか。\nどちらにしても、謝礼としては妥当となろうさ」
1520 = "「Chắc là giúp đỡ ông Minokasa, hoặc giúp việc chèo thuyền xuôi dòng thôi. Dù là việc gì thì cũng hợp lý để làm quà cảm ơn mà」"
# 【ポーレット】
# display as 波萊特
# JP: 「それならいいんですけど」
1678 = "「Nếu được vậy thì tốt ạ」"
# 【れいな】
# display as 玲奈
# JP: 「ひゃうんっ！？」
1596 = "「Hya un!?」"
# 【ポーレット】
# display as 波萊特＆雙鐵
# JP: 「れいなっ！？」\n「どうした！」
1883 = "「Reina!?」 「Sao thế!」"
# monologue
# JP: 振り向けば、\nれいなは地面にお尻をつけてしゃがみこんでる。
2553 = "Quay lại, tôi thấy Reina đang ngồi bệt xuống đất."
# 【ポーレット】
# display as 波萊特
# JP: 「転んじゃったのね？　大丈夫」
1808 = "「Em bị ngã à? Có sao không」"
# 【れいな】
# display as 玲奈
# JP: 「はい。れいなは平気ですよぉ」
1655 = "「Vâng. Reina không sao đâu ạ~」"
# monologue
# JP: （ああ）
2655 = "（A）"
# monologue
# JP: 木の根が顔を覗かせている。\nあるいはあれに躓いて、バランスを崩したのかもしれん。
2410 = "Rễ cây đang nhô lên. Có lẽ con bé đã vấp phải nó và mất thăng bằng."
# monologue
# JP: 出来る限りに踏み分け踏み分け、\n歩きやすくしているつもりだが――
2624 = "Tôi đã cố gắng hết sức để dẹp đường cho dễ đi rồi, nhưng mà——"
# 【双鉄】
# display as 雙鐵
# JP: 「これは配慮が足りなかったな。\n僕らには小さな障害も、れいなの歩幅では――」
2014 = "「Là do anh thiếu chu đáo rồi. Chướng ngại nhỏ đối với chúng ta, nhưng với sải chân của Reina thì——」"
# 【れいな】
# display as 玲奈
# JP: 「大丈夫ですよぉ？\nれいな、ちょっとうっかりしちゃっただけで」
1859 = "「Không sao đâu ạ~ Chỉ là Reina hơi bất cẩn chút xíu thôi」"
# 【双鉄】
# display as 雙鐵
# JP: 「うっかりしたのは僕らのほうだ」
1963 = "「Bất cẩn là bọn anh mới đúng」"
# monologue
# JP: 会話に夢中になりすぎて、\n僕らのペースで歩いてしまった。
2404 = "Mải mê nói chuyện quá nên bọn tôi cứ đi theo tốc độ của mình."
# monologue
# JP: れいなには、当然それは速すぎるのに。
2551 = "Đương nhiên tốc độ đó là quá nhanh đối với Reina."
# 【ポーレット】
# display as 波萊特
# JP: 「れいな。足を伸ばしてみて」
1886 = "「Reina. Em thử duỗi chân ra xem」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい」
1676 = "「Vâng ạ~」"
# monologue
# JP: おしりを地面につけたまま、\nポーレットの持つ右足を、れいなは伸ばす。
2506 = "Vẫn ngồi trên mặt đất, Reina duỗi chân phải ra cho Paulette giữ."
# monologue
# JP: 預けられた膝を足首を、曲げ伸ばし。\nれいなではなく、ポーレットの手が関節を動かし確かめる。
2481 = "Gập duỗi đầu gối và mắt cá chân. Bàn tay Paulette chứ không phải Reina đang cử động các khớp để kiểm tra."
# monologue
# JP: 良かった。どこも傷んでないようだ。
2327 = "Tốt quá rồi. Có vẻ không bị thương ở đâu cả."
# 【れいな】
# display as 玲奈
# JP: 「れいな、平気っていったですよぉ」
1880 = "「Reina đã bảo là không sao rồi mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、平気ではなかろう」
1975 = "「Không, chắc chắn là có sao rồi」"
# monologue
# JP: 手を貸し、れいなを立たせてやる。\nそしてそのまま――
2390 = "Tôi đưa tay ra, đỡ Reina đứng dậy. Và cứ thế——"
# monologue
# JP: （ひょいっ）
2656 = "（Nhấc bổng）"
# 【れいな】
# display as 玲奈
# JP: 「ひゃああ」
1595 = "「Hyaaa」"
# monologue
# JP: 抱っこをすれば、れいなは悲鳴じみた声を出す。\nその声に、僕もいささか驚かされる。
2406 = "Vừa bế lên, Reina đã thốt ra một tiếng kêu như hét. Tiếng kêu đó cũng làm tôi hơi giật mình."
# 【双鉄】
# display as 雙鐵
# JP: 「どこか痛むのか？」
1844 = "「Có chỗ nào đau à?」"
# 【れいな】
# display as 玲奈
# JP: 「いいええ、あのっ――\nれいな、ちょっとびっくりしちゃっただけですぅ」
1864 = "「Dạ không ạ, à thì—— Reina chỉ hơi giật mình chút xíu thôi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「何故驚く？」
1843 = "「Sao lại giật mình?」"
# 【れいな】
# display as 玲奈
# JP: 「整備[ボディ]体では――だっこ、\nほとんどされることってないですからぁ」
1664 = "「Tại vì trong \\x%l整備体;#00ffc040;thân chính%l;#;—— Reina hiếm khi được bế lắm ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1657 = "「À」"
# monologue
# JP: \\x%lレイルロオド;#00ffc040;レイルロオド%l;#;と言えば抱っこと、\n考えるまでもなく体が動いてしまっていたが。
2320 = "Nhắc đến \\x%lレイルロオド;#00ffc040;Railord%l;#; là nghĩ ngay đến việc bế, nên cơ thể tôi tự động làm vậy mà không kịp suy nghĩ."
# monologue
# JP: 確かに、いつも抱っこするハチロクは\n運転ボディ――人形サイズの方の体だ。
2512 = "Quả thực, Hachiroku mà tôi vẫn luôn bế là cơ thể lái tàu——cơ thể có kích thước bằng con búp bê."
# 【双鉄】
# display as 雙鐵
# JP: 「驚かせてすまなかったな。\nもしもイヤなら」
1516 = "「Xin lỗi vì làm em giật mình. Nếu em không thích thì」"
# 【れいな】
# display as 玲奈
# JP: 「いやじゃないです！　だっこ、楽ちんで嬉しいですぅ」
1860 = "「Không có không thích đâu ạ! Được bế vừa thoải mái lại vừa vui nữa nha~」"
# monologue
# JP: 極めて素直な感想を言い、\nれいなはグ、と首を伸ばす。
2509 = "Nói ra cảm nhận vô cùng chân thật, Reina rướn cổ lên."
# 【れいな】
# display as 玲奈
# JP: 「それに、遠くまで見えますよぉ。\nこれならきっと、すぐに見つけられちゃいますぅ」
1916 = "「Hơn nữa, còn nhìn được xa nữa nha~. Thế này thì chắc chắn sẽ tìm thấy ngay thôi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「頼もしいな。よろしく頼む」
1976 = "「Đáng tin cậy thật đấy. Nhờ em nhé」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
# 1676 = "「好的」" 
# 【ポーレット】
# display as 波萊特
# JP: 「…………いいなぁ」
1271 = "「............Thích thật đấy」"
# monologue
# JP: ぼそりと、呟き。\n顔を向ければ、ポーレットの目は驚くまでの物欲しげさだ。
2482 = "Lời thì thầm khe khẽ. Quay sang nhìn, tôi thấy ánh mắt thèm thuồng đến đáng kinh ngạc của Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、ポーレットも抱っこして欲しいのか？」
1642 = "「A, Paulette cũng muốn được bế à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！？　いえっ、あの……はい、ですけど大丈夫です。\nまだ、全然歩けちゃいますし」
1630 = "「A!? Dạ không, à thì...... vâng, nhưng mà em không sao đâu. Em vẫn còn đi bộ ngon ơ mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
1608 = "「Hừm」"
# monologue
# JP: ふたりを抱っこは不可能だろうが――
2622 = "Dù không thể bế cả hai người cùng lúc——"
# monologue
# JP: れいなを背負うか肩車すれば、\nポーレットを抱っこもできるだろう。
2249 = "Nhưng nếu cõng hoặc kiệu Reina trên vai, thì chắc là tôi vẫn bế được Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、疲れたら言ってくれ。ポーレットには、\n議会も社長業もあるのだからな」
2002 = "「Vậy thì nếu mệt cứ bảo anh nhé. Dù sao Paulette cũng còn công việc ở hội đồng và chức giám đốc nữa mà」"
# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
1658 = "「Vâng ạ!」"
# monologue
# JP: 勢いもよく頷いて、\n次の一歩は、ぽん、と大股で軽やかだ。
2354 = "Em gật đầu mạnh mẽ, rồi nhẹ nhàng sải một bước dài về phía trước."
# monologue
# JP: なるほどまだまだ、体力に余裕があるらしい。
2284 = "Ra là vậy, có vẻ thể lực của em vẫn còn dư dả lắm."
# monologue
# JP: （しかし……）
2654 = "（Nhưng mà......）"
# monologue
# JP: 沈殿池からダム方面を丹念に探し、\n夏草の下、見つけ出すことが出来た支線の痕跡。
2392 = "Chúng tôi cẩn thận tìm kiếm từ hồ lắng về phía đập nước, và phát hiện ra dấu vết của một tuyến nhánh nằm dưới lớp cỏ mùa hè."
# monologue
# JP: たどる途中に見つけた分岐のその先を、\n発電所から戻る途中の、僕らはこうして探っている。
2525 = "Trên đường từ nhà máy điện trở về, chúng tôi đang khám phá đoạn tiếp theo của ngã rẽ mà mình đã tìm thấy trên đường đi."
# monologue
# JP: （足取りに、まるで迷いが無いな。\nれいなをそれだけ、信頼しているということか）
2669 = "（Bước chân của em ấy không hề có chút do dự nào. Điều đó chứng tỏ em ấy vô cùng tin tưởng Reina sao）"
# monologue
# JP: れいなの説では、この先おそらく、\n車輌設備があるということだったが……
2508 = "Theo giả thuyết của Reina, có lẽ ở phía trước sẽ có thiết bị toa xe, nhưng mà......"
# 【れいな】
# display as 玲奈
# JP: 「えへへー、えへへー」
1602 = "「Ehehe~, ehehe~」"
# monologue
# JP: れいなの声。\nいつの間に落ちてた視線を持ち上げる。
2418 = "Giọng của Reina. Tôi ngẩng lên, ánh mắt nãy giờ đã cúi xuống từ lúc nào không hay."
# monologue
# JP: が……\n特段、なにか変わったものが見えるでもない。
2216 = "Nhưng...... Cũng chẳng thấy có gì đặc biệt khác lạ cả."
# 【ポーレット】
# display as 波萊特
# JP: 「どうしたのれいな？　ごきげんね？」
1717 = "「Sao thế Reina? Em có vẻ vui nhỉ?」"
# 【れいな】
# display as 玲奈
# JP: 「あのですね、れいな、思ったんです。\nれいな、赤ちゃんみたいだなぁって」
1997 = "「À thì, Reina vừa mới nghĩ là. Trông Reina giống như em bé vậy đó ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「赤ちゃん？」
1701 = "「Em bé?」"
# 【れいな】
# display as 玲奈
# JP: 「そうです！　それで、そうてつさんがおとうさんで\nポーレットがおかあさんなのですよぉ」
1803 = "「Đúng vậy ạ! Và anh Soutetsu là ba còn chị Paulette là mẹ đó nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ/////！」
1242 = "「! /////」"
# 【双鉄】
# display as 雙鐵
# JP: 「ぬ」
# 1608 = "「唔」" 
# monologue
# JP: 言われてみれば――確かに見知らぬ誰かには、\n夫婦だと思われたっておかしくない。
2546 = "Nghe em ấy nói vậy——quả thực trong mắt người ngoài, họ có nghĩ chúng tôi là vợ chồng thì cũng chẳng có gì lạ."
# monologue
# JP: そう感じれば、頬がいささか熱くなる。
2608 = "Nghĩ vậy, má tôi cũng hơi nóng lên."
# 【ポーレット】
# display as 波萊特
# JP: 「あのっ！」
1998 = "「Anh này!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
2034 = "「!」"
# monologue
# JP: 甘やかではない――まるで、切羽詰まったような声。\nポーレットの目は僕を見ず、真正面を向いている。
2489 = "Không hề có sự ngọt ngào——mà là một giọng nói như thể đang bị dồn vào chân tường. Đôi mắt Paulette không nhìn tôi, mà hướng thẳng về phía trước."
# 【ポーレット】
# display as 波萊特
# JP: 「あのっ――双鉄くんは、どうですか？\nなりたいですか？　お父さん――とか」
1996 = "「Anh này——anh Soutetsu nghĩ sao? Anh có muốn làm ba——không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
1974 = "「Chuyện đó thì——」"
# monologue
# JP: 答えに、詰まる。
2379 = "Tôi cứng họng, không biết trả lời sao."
# monologue
# JP: なりたいものか、どうなのか、\n今まで一度も、考えたことすらなかったことだ。
2447 = "Có muốn hay không, từ trước đến nay tôi chưa từng nghĩ đến chuyện đó dù chỉ một lần."
# 【ポーレット】
# display as 波萊特
# JP: 「相手が誰とかそういうんじゃなく。\nええと、その――、一般論として、どうかなぁって」
1724 = "「Không phải là muốn làm với ai hay gì đâu. À thì, ý em là——, nói chung chung ấy, anh nghĩ sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1608 = "「唔」" 
# monologue
# JP: ぞくりと、寒気に近い何かを背筋に感じる。\n切羽詰まったような、ではない。
2414 = "Một cảm giác ớn lạnh chạy dọc sống lưng. Không chỉ là như bị dồn vào chân tường."
# monologue
# JP: ポーレットの声は明らかに切羽詰まって……\nなにかに、追われているような印象だ。
2452 = "Giọng của Paulette rõ ràng là đang rất tuyệt vọng...... Cảm giác như em ấy đang bị thứ gì đó truy đuổi vậy."
# monologue
# JP: （いや、これは――）
2653 = "（Không, đây là——）"
# monologue
# JP: 同じ、と思う。
2445 = "Tôi nghĩ, nó cũng giống hệt."
# monologue
# JP: 稀咲の問いに答えられずに固まった、\nあのときの、青ざめてさえいたポーレットと。
2484 = "Giống hệt với Paulette lúc không thể trả lời câu hỏi của Kisaki và sững người lại, thậm chí mặt còn tái mét đi."
# 【双鉄】
# display as 雙鐵
# JP: 「僕は今まで――、一度たりとも、\n父になりたいかどうかなど、考えたこともなかった」
1736 = "「Từ trước đến nay——, chưa một lần nào, anh nghĩ đến chuyện mình có muốn làm cha hay không」"
# monologue
# JP: だから、ただただ正直に言う。
2422 = "Vì vậy, tôi chỉ đành nói thật."
# monologue
# JP: この問いは、この答えは、\nおそらくポーレットには大事なことだと思うから。
2319 = "Bởi tôi nghĩ, câu hỏi này, câu trả lời này, có lẽ rất quan trọng đối với Paulette."
# 【双鉄】
# display as 雙鐵
# JP: 「事故を、僕は経験して。自分のふたごを――\n半身を亡くしてしまっているから」
1733 = "「Vì anh đã trải qua vụ tai nạn đó. Và mất đi người em sinh đôi—— mất đi một nửa của mình」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1657 = "「嗯」" 
# monologue
# JP: 静かな相槌。\n動揺も同情も感じない、ただただ、受け入れられる感触。
2347 = "Một tiếng ừm khẽ khàng. Không hề có sự bối rối hay đồng cảm, chỉ đơn thuần là cảm giác được chấp nhận."
# monologue
# JP: ただそれだけで僕は落ち着く、\n気持ちの中の余計な物達が濾過されていく。
2250 = "Chỉ vậy thôi cũng đủ khiến tôi bình tâm lại, những thứ thừa thãi trong lòng dần được thanh lọc."
# 【双鉄】
# display as 雙鐵
# JP: 「だから自分もいつか死ぬと、それまでの生と考えて。\n父となる、子をなすことなど、想像もしていなかった」
1743 = "「Nên anh cứ nghĩ rằng đằng nào mình cũng sẽ chết, và sống chỉ để chờ đến lúc đó. Anh chưa từng tưởng tượng đến việc trở thành một người cha, hay sinh con đẻ cái」"
# monologue
# JP: ただ正直に――そんな思いで整頓されて出来た隙間に、\n埋もれていた気持ちを、見つける。
2499 = "Cứ thành thật——nhờ suy nghĩ đó mà trong khoảng trống vừa được dọn dẹp, tôi tìm thấy những cảm xúc đã bị chôn vùi."
# 【双鉄】
# display as 雙鐵
# JP: 「けれど今は……なってみたいと感じる気持ちもある。\nそれと同時に、とても怖いという気持ちも」
1528 = "「Nhưng bây giờ...... anh cũng có cảm giác muốn thử trở thành một người cha. Và đồng thời, cũng có cảm giác rất sợ hãi nữa」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！！」
2037 = "「!!」"
# monologue
# JP: びくりと、ポーレットの肩が動く。\nその目はいまだ、真正面へと釘付けられたままだけれども。
2488 = "Bờ vai Paulette giật nảy lên. Dù đôi mắt em vẫn dán chặt về phía trước."
# 【ポーレット】
# display as 波萊特
# JP: 「そう……ですよね。\n怖いですよね、そういうの」
1648 = "「Đúng...... vậy nhỉ. Đáng sợ lắm nhỉ, mấy chuyện đó ấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「……」
1265 = "「......」"
# monologue
# JP: その呟きがあまりに意外で、言葉を咄嗟に返せない。
2342 = "Lời thì thầm đó quá đỗi bất ngờ, khiến tôi không thể đáp lại ngay."
# monologue
# JP: （れいなへの接し方など――\nポーレットは、母性の塊としか思えんのに）
2660 = "（Rõ ràng cách em ấy đối xử với Reina—— chỉ có thể coi Paulette là hiện thân của tình mẫu tử mà）"
# monologue
# JP: ならばいったい、何を“怖い”と言っているのか。\n“そういうの”とは何を示すか。
2615 = "Vậy rốt cuộc, em ấy đang nói \"sợ\" cái gì? \"Mấy chuyện đó\" là chỉ điều gì?"
# monologue
# JP: ――今は、さすがに尋ねられない。
1236 = "——Lúc này, quả thực tôi không thể hỏi được."
# monologue
# JP: （質問すれば、きっとポーレットは僕の望みの答えを伺う。\n自分の気持ちを、素直に出せなくなってしまう）
2648 = "（Nếu tôi hỏi, chắc chắn Paulette sẽ dò xét câu trả lời mà tôi mong muốn. Và em ấy sẽ không thể thành thật bộc lộ cảm xúc của mình nữa）"
# 【ポーレット】
# display as 波萊特
# JP: 「…………」
# 1265 = "「……」" 
# monologue
# JP: しかし、ポーレットも何も言わない。\n僕の言葉を、あるいは待っているのかもしれない。
2246 = "Nhưng, Paulette cũng không nói gì thêm. Có lẽ em ấy đang chờ đợi lời nói từ tôi."
# monologue
# JP: ざくざくと、夏草を踏む足音だけが積み重なって――
2295 = "Sột soạt, chỉ có tiếng bước chân đạp lên cỏ mùa hè cứ thế vang lên——"
# 【れいな】
# display as 玲奈
# JP: 「あああ！　あったぁ！　ありましたぁ！」
1619 = "「Aaa! Có rồi! Có rồi ạ!」"
# 【双鉄】
# display as 雙鐵＆波萊特
# JP: 「っ！」\n「あ」
2035 = "「!」 「A」"
# monologue
# JP: 助かった。\nそんな思いの声はおそらく、僕の発したものだけではない。
2528 = "May quá. Có lẽ không chỉ mình tôi thốt ra tiếng lòng đó."
# 【ポーレット】
# display as 波萊特
# JP: 「あああっ！」
1622 = "「Aaa!」"
# monologue
# JP: その声が、一瞬にして温度をあげる。
2341 = "Giọng nói đó, trong chớp mắt đã làm bầu không khí nóng lên."
# monologue
# JP: 歓喜、驚き、達成感。\nすべてが混じって、垂れこめていた重い沈黙を吹き飛ばす。
2552 = "Niềm vui sướng, sự kinh ngạc, cảm giác thành tựu. Tất cả hòa quyện vào nhau, thổi bay sự im lặng nặng nề đang bao trùm."
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%l貨車;#00ffc040;貨車%l;#;！？」
1254 = "「\\x%l貨車;#00ffc040;Toa chở hàng%l;#!?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　やっぱりありましたぁ！\nあの、そうてつさん、おろしてくださいな」
1825 = "「Vâng ạ! Quả nhiên là có nha~! Anh Soutetsu ơi, thả Reina xuống đi ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむっ」
# 1657 = "「嗯」" 
# monologue
# JP: 僕の腕からおりるやいなやで、れいなは\\x%l貨車;#00ffc040;貨車%l;#;へ走り寄る。\n無論、僕とポーレットも。
2397 = "Vừa rời khỏi vòng tay tôi, Reina liền chạy ùa về phía \\x%l貨車;#00ffc040;toa chở hàng%l;#;. Tất nhiên, tôi và Paulette cũng chạy theo."
# 【れいな】
# display as 玲奈
# JP: 「ふわぁ！　すごいですぅ！！」
1598 = "「Oa! Tuyệt quá đi mất!!」"
# 【れいな】
# display as 玲奈
# JP: 「\\x%l緩急車;#00ffc040;[かんきゅうしゃ,2]緩急車%l;#;の[むがい,1]無蓋\\x%l貨車;#00ffc040;貨車%l;#;ですぅ！\n状態、とーーってもいいですよぉ！」
1775 = "「Là \\x%l貨車;#00ffc040;toa chở hàng%l;#; không mái che kiêm \\x%l緩急車;#00ffc040;toa xe trưởng tàu%l;#; đó ạ! Tình trạng cực kỳ, cực kỳ tốt luôn nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そう見えるな」
1659 = "「Ừ, trông có vẻ thế nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「放置期間、相当長いはずですよね……\nなのに、これ――」
1680 = "「Thời gian bị bỏ hoang chắc hẳn phải rất dài rồi...... Vậy mà, cái này——」"
# monologue
# JP: カバーと、油と。
2609 = "Tấm bạt phủ, và dầu mỡ."
# monologue
# JP: その両方を、よほど丁寧に配したのだろう、\n守られていた\\x%l貨車;#00ffc040;貨車%l;#;はサビなく、黒光りしている。
2226 = "Chắc hẳn cả hai thứ đó đã được bôi quét vô cùng cẩn thận, \\x%l貨車;#00ffc040;toa chở hàng%l;#; được bảo vệ không hề có một vết rỉ sét, đen bóng loáng."
# 【ポーレット】
# display as 波萊特
# JP: 「“\\x%lカ15;#00ffc040;カ15%l;#;”“形式カ10”って書いてあります、\nこの会社――鉱山鉄道の、１０型の６番めの\\x%l貨車;#00ffc040;貨車%l;#;」
1514 = "「Có ghi là \"\\x%lカ15;#00ffc040;Ka15%l;#;\" \"Kí hiệu loại Ka10\" này, là \\x%l貨車;#00ffc040;toa chở hàng%l;#; thứ 6 thuộc loại 10 của công ty này——Đường sắt mỏ」"
# 【双鉄】
# display as 雙鐵
# JP: 「会社の、オリジナルの\\x%l貨車;#00ffc040;貨車%l;#;なのか？」
1834 = "「Là \\x%l貨車;#00ffc040;toa chở hàng%l;#; nguyên bản của công ty à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わかりません。わたし、車輌はくわしくないから……\nでもこんなタイプ見たこと無いですし、多分オリジナル」
1523 = "「Em không rõ nữa. Em không rành về toa xe cho lắm...... Nhưng em chưa từng thấy loại này bao giờ, chắc là nguyên bản đó ạ」"
# monologue
# JP: そういいつつ、\nポーレットの目は仔細に\\x%l貨車;#00ffc040;貨車%l;#;を確かめていく。
2610 = "Vừa nói, ánh mắt Paulette vừa xem xét \\x%l貨車;#00ffc040;toa chở hàng%l;#; một cách tỉ mỉ."
# 【ポーレット】
# display as 波萊特
# JP: 「あ……でもこれ、\\x%l架台;#00ffc040;[かだい,1]架台%l;#;じゃない。\\x%l台枠;#00ffc040;台枠%l;#;が剥き出しなんだ。\n\\x%l架台;#00ffc040;架台%l;#;、増設しないとダメですね」
1613 = "「A...... nhưng cái này, không phải \\x%l架台;#00ffc040;bệ đỡ%l;#;. \\x%l台枠;#00ffc040;Khung gầm%l;#; bị lộ ra ngoài kìa. Phải lắp thêm \\x%l架台;#00ffc040;bệ đỡ%l;#; mới được」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、済まん。カダイとは――ああいや、その前にまず、\nカンキュウシャのムガイカシャとは――なんだ？」
1999 = "「À, xin lỗi. Bệ đỡ là——à không, trước đó thì, toa chở hàng không mái che kiêm toa xe trưởng tàu là——cái gì thế?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、ごめんなさい。\\x%l緩急車;#00ffc040;緩急車%l;#;っていうのは、\n\\x%l車掌;#00ffc040;車掌%l;#;さんが乗る、\\x%lブレーキ;#00ffc040;ブレーキ%l;#;がついてる車輌です」
1643 = "「A, em xin lỗi. \\x%l緩急車;#00ffc040;Toa xe trưởng tàu%l;#; là toa xe có gắn \\x%lブレーキ;#00ffc040;phanh%l;#; dành cho \\x%l車掌;#00ffc040;trưởng tàu%l;#; ngồi ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l車掌;#00ffc040;車掌%l;#;が？　\\x%lブレーキ;#00ffc040;ブレーキ%l;#;を操作するのか？」
1256 = "「\\x%l車掌;#00ffc040;Trưởng tàu%l;#; á? Trực tiếp thao tác \\x%lブレーキ;#00ffc040;phanh%l;#; sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。\nええと、\\x%l貨車;#00ffc040;貨車%l;#;って何十両もの\\x%l編成;#00ffc040;編成%l;#;になるじゃないですか」
1814 = "「Vâng. À thì, \\x%l貨車;#00ffc040;toa chở hàng%l;#; thường được \\x%l編成;#00ffc040;ghép đoàn%l;#; thành mấy chục toa đúng không anh」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか、なるほどな」
1836 = "「Ra vậy, hiểu rồi」"
# monologue
# JP: \\x%l8620;#00ffc040;8620%l;#;のキャブに一度座ってみれば即座にわかるが、\n後方視界などは、ほとんど無いも同然だ。
2298 = "Chỉ cần ngồi vào buồng lái của \\x%l8620;#00ffc040;8620%l;#; một lần là hiểu ngay, tầm nhìn phía sau gần như bằng không."
# monologue
# JP: 振り向いてみても見えるのは、\nほぼ\\x%l炭水車;#00ffc040;炭水車%l;#;までというありさまになる。
2367 = "Dù có quay lại nhìn thì cùng lắm cũng chỉ thấy được đến \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#; mà thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l運転士;#00ffc040;運転士%l;#;に見えない後方で異変が発生したときに、\n\\x%l車掌;#00ffc040;車掌%l;#;が\\x%l非常;#00ffc040;非常%l;\\x%lブレーキ;#;#00ffc040;ブレーキ%l;#;をかけられるようになっているのか」
1530 = "「Tức là để \\x%l車掌;#00ffc040;trưởng tàu%l;#; có thể sử dụng \\x%l非常;#00ffc040;phanh khẩn cấp%l;\\x%lブレーキ;#00ffc040;phanh%l;#; khi xảy ra sự cố ở phía sau mà \\x%l運転士;#00ffc040;người lái tàu%l;#; không nhìn thấy được sao」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですです。で、[むがい,1]無蓋\\x%l貨車;#00ffc040;貨車%l;#;っていうのは、\nフタ――天井のついてない\\x%l貨車;#00ffc040;貨車%l;#;ってことです」
1820 = "「Đúng vậy ạ. Và, \\x%l貨車;#00ffc040;toa chở hàng%l;#; không mái che có nghĩa là \\x%l貨車;#00ffc040;toa chở hàng%l;#; không có nắp đậy——tức là không có trần che ấy ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1608 = "「唔」" 
# 【ポーレット】
# display as 波萊特
# JP: 「[かだい,1]架台――コンテナとかを乗せるための台が、\n\\x%l台枠;#00ffc040;台枠%l;#;の上にぽん[づ]付けしてある感じの\\x%l貨車;#00ffc040;貨車%l;#;のことですよ」
1911 = "「Là loại \\x%l貨車;#00ffc040;toa chở hàng%l;#; có \\x%l架台;#00ffc040;bệ đỡ%l;#;——cái bệ dùng để chở container hay thứ gì đó, được gắn trực tiếp lên trên \\x%l台枠;#00ffc040;khung gầm%l;#; đó ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、なるほど。では、四角く周りを囲まれて、\nその中に貨物をいれる\\x%l貨車;#00ffc040;貨車%l;#;は、[ゆうがい,1]有蓋\\x%l貨車;#00ffc040;貨車%l;#;なのだな」
1575 = "「À, ra là vậy. Thế thì loại \\x%l貨車;#00ffc040;toa chở hàng%l;#; được bao kín bốn phía và chứa hàng hóa bên trong là \\x%l貨車;#00ffc040;toa chở hàng%l;#; có mái che nhỉ」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうです。けど、これ――\\x%l台枠;#00ffc040;台枠%l;#;……\n\\x%l台車;#00ffc040;台車%l;#;を受けて車体を載せる、背骨部分が剥き出しで――」
1812 = "「Vâng. Nhưng mà, cái này——\\x%l台枠;#00ffc040;khung gầm%l;#;...... phần xương sống đỡ lấy thân xe và gắn với \\x%l台車;#00ffc040;giá chuyển hướng%l;#; lại bị lộ ra ngoài——」"
# 【双鉄】
# display as 雙鐵
# JP: 「それで、\\x%l架台;#00ffc040;架台%l;#;の増設ということになるのか。\nそうしなければ、貨物が乗せられない」
1747 = "「Vậy nên mới phải lắp thêm \\x%l架台;#00ffc040;bệ đỡ%l;#; à. Nếu không thì chẳng chở được hàng hóa gì」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。けど、\\x%l客車;#00ffc040;客車%l;#;と違って乗り心地とか考える必要が\n無いですから。\\x%l架台;#00ffc040;架台%l;#;増設は比較的簡単にできるはずです」
1838 = "「Vâng. Nhưng mà, khác với \\x%l客車;#00ffc040;toa hành khách%l;#;, mình không cần phải cân nhắc đến sự thoải mái khi đi. Việc lắp thêm \\x%l架台;#00ffc040;bệ đỡ%l;#; chắc sẽ khá đơn giản thôi ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「まぁ、極端な話、\n荷物の重さに耐えてさえくれれば済むわけだしな」
1713 = "「Chà, nói cực đoan một chút thì chỉ cần chịu được sức nặng của hàng hóa là được rồi mà」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。ですから、再生可能かどうかは――」
1789 = "「Đúng vậy ạ. Do đó, việc có thể tái sử dụng được hay không là——」"
# 【れいな】
# display as 玲奈
# JP: 「オッケーっぽいです！　ポーレット！！」
1592 = "「Có vẻ ổn đó ạ! Chị Paulette!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 2034 = "「！」" 
# monologue
# JP: 各部チェックを、黙々とやってくれてたのだろう。
2504 = "Chắc nãy giờ con bé vẫn đang âm thầm kiểm tra các bộ phận."
# monologue
# JP: れいなは服を汚してしまい、\nけれども輝く笑顔で僕らに、大きく手を振る。
2351 = "Quần áo Reina đã lấm lem bùn đất, nhưng con bé vẫn nở nụ cười rạng rỡ vẫy tay mạnh với chúng tôi."
# 【れいな】
# display as 玲奈
# JP: 「この子、\\x%l台車;#00ffc040;台車%l;#;も\\x%l台枠;#00ffc040;台枠%l;#;も、多分ほとんど劣化ないです！」
1979 = "「Đứa bé này, cả \\x%l台車;#00ffc040;giá chuyển hướng%l;#; lẫn \\x%l台枠;#00ffc040;khung gầm%l;#; có lẽ hầu như không bị xuống cấp đâu ạ!」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなの！？」
1841 = "「Thật vậy sao!?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！　キハ[レイナナ,1]07で引いてあげれば、\nきっとすぐにでも、レールの上を走れちゃうですよぉ」
1823 = "「Vâng ạ! Nếu dùng KiHa 07 kéo đi thì chắc chắn sẽ có thể chạy trên đường ray ngay lập tức luôn đó ạ~」"
# monologue
# JP: 言ってれいなは、くるりと僕らに背を向ける。
2591 = "Nói xong, Reina quay lưng lại với chúng tôi."
# 【れいな】
# display as 玲奈
# JP: 「あっちにも\\x%l貨車;#00ffc040;貨車%l;#;あるみたいです。\nれいな、ちょっと見てきますねぇ」
2008 = "「Hình như đằng kia cũng có \\x%l貨車;#00ffc040;toa chở hàng%l;#; đó ạ. Reina qua đó xem một chút nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「気をつけてね！」
1703 = "「Cẩn thận nhé!」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
# 1676 = "「好的」" 
# monologue
# JP: れいなを見送り、\nポーレットは今度は自分で、\\x%l緩急車;#00ffc040;緩急車%l;#;の様子をチェックする。
2519 = "Tiễn Reina đi xong, lần này Paulette tự mình đi kiểm tra tình trạng của \\x%l緩急車;#00ffc040;toa xe trưởng tàu%l;#;."
# monologue
# JP: その口元が、れいなの言葉は正しいのだと示すみたいに、\nじわり、じわりと緩みを増してく。
2338 = "Khóe miệng em ấy từ từ, từ từ giãn ra, như thể chứng minh rằng những lời Reina nói là chính xác."
# 【ポーレット】
# display as 波萊特
# JP: 「夢みたい……\nどう考えても十年以上は放置されてるはずなのに」
1906 = "「Như một giấc mơ vậy...... Dù nghĩ thế nào thì chắc chắn nó đã bị bỏ hoang hơn chục năm rồi mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「――発電所を見た時も思ったのだが」
1668 = "「——Lúc nhìn thấy nhà máy điện anh cũng đã nghĩ thế này」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1657 = "「嗯」" 
# 【双鉄】
# display as 雙鐵
# JP: 「放置、放棄ではなく、\n“一時撤退”のつもりであったのかもしれんな」
1539 = "「Có lẽ không phải là vứt bỏ hay từ bỏ, mà là họ có ý định \"rút lui tạm thời\" thôi」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1610 = "「A」"
# monologue
# JP: ほんのわずかに口を開け、\nゆっくり、ゆっくり、ポーレットが頷く。
2494 = "Hé mở miệng một chút, Paulette chậm rãi, chậm rãi gật đầu."
# 【ポーレット】
# display as 波萊特
# JP: 「もう一度、鉱山を再開できるって信じて」
1547 = "「Họ vẫn tin rằng, một ngày nào đó có thể mở lại khu mỏ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。今考えてみれば、坑道自体も同じかもしれん。\n設備のほとんどは、そのまま残されていたような気が」
1797 = "「Đúng vậy. Giờ nghĩ lại, bản thân hầm mỏ có lẽ cũng thế. Anh có cảm giác hầu hết các thiết bị đều được giữ nguyên như vậy」"
# 【ポーレット】
# display as 波萊特
# JP: 「です、ね。だから、カバーとオイルで保護をして――」
1798 = "「Đúng, nhỉ. Do đó, họ mới dùng bạt phủ và dầu mỡ để bảo vệ——」"
# 【双鉄】
# display as 雙鐵
# JP: 「そう考えれば、\nこの状況を説明しやすいような気がする」
1981 = "「Nghĩ như vậy, có vẻ dễ giải thích cho tình huống này hơn」"
# monologue
# JP: 術仙炭鉱廃駅周辺――
2576 = "Khu vực xung quanh nhà ga bỏ hoang mỏ than Jutsu-sen——"
# monologue
# JP: 鉱山廃止当初にはまだ交通が確保されてた場所では、\n何者かにより廃レールや\\x%l枕木;#00ffc040;枕木%l;#;が持ち去られてしまったが。
2537 = "Tại những nơi giao thông vẫn còn được duy trì vào thời điểm mỏ mới đóng cửa, những đoạn đường ray phế liệu và \\x%l枕木;#00ffc040;tà vẹt%l;#; đã bị kẻ nào đó mang đi mất."
# 【ポーレット】
# display as 波萊特
# JP: 「鉱山関係のひとたちは、復活をあきらめていなかった。\nだから、こうして――バトンを、残してくれていた」
1902 = "「Những người liên quan đến khu mỏ vẫn chưa từ bỏ hy vọng hồi sinh. Chính vì thế, họ mới để lại——chiếc gậy tiếp sức này như vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1657 = "「嗯」" 
# monologue
# JP: レースは、中断させられた。\n廃レールというトラックは、夏草にすでに埋もれた。
2458 = "Cuộc đua đã bị gián đoạn. Đường đua mang tên đường ray phế liệu đã bị cỏ mùa hè chôn vùi."
# monologue
# JP: けれども大事に置かれたバトンは――\nここにこうして、手に取られるのを待っている。
2245 = "Nhưng chiếc gậy tiếp sức được đặt lại một cách cẩn thận—— vẫn đang nằm ở đây, chờ đợi được nhấc lên."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、僕たちがそれを受け継ぐ。\n形は変えても、こいつを再び、生き返らせる」
2005 = "「Nếu vậy, chúng ta sẽ kế thừa nó. Dù có thay đổi hình dạng, chúng ta cũng sẽ khiến nó sống lại một lần nữa」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1658 = "「嗯！」" 
# monologue
# JP: 同じなんだと、不意に感じる。\n終着駅に、路子はいまだ辿りつけない。
2415 = "Chợt nhận ra, chúng đều giống nhau. Michiko vẫn chưa thể đến được ga cuối cùng."
# monologue
# JP: 僕も、ハチロクも、この\\x%l緩急車;#00ffc040;緩急車%l;#;も。\n……それだけでなく。ひょっとしたなら、ポーレットさえ。
2401 = "Cả tôi, Hachiroku, và chiếc \\x%l緩急車;#00ffc040;toa xe trưởng tàu%l;#; này cũng vậy. ......Không chỉ thế. Có khi, ngay cả Paulette cũng vậy."
# monologue
# JP: （汰斗さんが教えてくれた――\n報いるとは、つまり、こういうことなのかもしれない）
2666 = "（Ông Taito đã dạy tôi—— Báo đáp, có lẽ chính là như thế này）"
# monologue
# JP: 見えてくる。\n僕の目指すべき次のゴールが。
2408 = "Đã có thể nhìn thấy. Mục tiêu tiếp theo mà tôi nên hướng tới."
# monologue
# JP: ポーレットとともに走れるのなら、\n今度こそ、きっとそこへとたどり着ける。
2356 = "Nếu có thể sát cánh cùng Paulette, lần này, chắc chắn tôi sẽ đến được nơi đó."
# 【双鉄】
# display as 雙鐵
# JP: 「まず、必要となるのはレールの復活か？」
2031 = "「Trước tiên, việc cần làm là phục hồi lại đường ray à?」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。それはふかみちゃんのおじいさん――\n[せき]堰さん達と相談してみての話になりますね」
1793 = "「Đúng vậy ạ. Chuyện đó phải bàn bạc với ông của bé Fukami—— ông Seki và những người khác xem sao đã」"
# 【双鉄】
# display as 雙鐵
# JP: 「レールを戻せたら、その先は？」
2017 = "「Nếu khôi phục lại được đường ray, sau đó thì sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「キハ[レイナナ,1]07でこの\\x%l緩急車;#00ffc040;緩急車%l;#;や、他の\\x%l貨車;#00ffc040;貨車%l;#;たちも引いてきて、\nまずはこの子に、\\x%l架台;#00ffc040;架台%l;#;をつけることになると思います」
1729 = "「Dùng KiHa 07 kéo chiếc \\x%l緩急車;#00ffc040;toa xe trưởng tàu%l;#; này và các \\x%l貨車;#00ffc040;toa chở hàng%l;#; khác về, đầu tiên em nghĩ sẽ phải lắp \\x%l架台;#00ffc040;bệ đỡ%l;#; cho đứa bé này」"
# 【双鉄】
# display as 雙鐵
# JP: 「\\x%l架台;#00ffc040;架台%l;#;をつけて、石炭を運べるようにするのか」
1932 = "「Lắp \\x%l架台;#00ffc040;bệ đỡ%l;#; vào để có thể chở than à」"
# 【ポーレット】
# display as 波萊特
# JP: 「その方が、体験採掘の雰囲気でると思うんです。\n無蓋\\x%l貨車;#00ffc040;貨車%l;#;に、\\x%l炭水車;#00ffc040;炭水車%l;#;みたいに石炭を山積みにして」
1737 = "「Em nghĩ làm vậy sẽ tạo được không khí của việc trải nghiệm khai thác mỏ. Chất than thành đống trên \\x%l貨車;#00ffc040;toa chở hàng%l;#; không mái che, giống như \\x%l炭水車;#00ffc040;toa tiếp than nước%l;#; vậy」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。そうすれば確かに見た目での達成感が――\nああ、いや、そういう話なら宝箱はどうだ？」
1801 = "「Đúng vậy nhỉ. Làm thế chắc chắn sẽ mang lại cảm giác thành tựu về mặt thị giác—— À, không, nếu nói vậy thì dùng rương kho báu thì sao?」"
# monologue
# JP: きょと、っと青い瞳がまん丸くなる。
2352 = "Đôi mắt xanh biếc ngơ ngác mở to tròn xoe."
# 【ポーレット】
# display as 波萊特
# JP: 「宝箱ですか？」
1693 = "「Rương kho báu ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。おひとよマイントレジャーなのだからな。\n宝箱に石炭を山積みの方が、より雰囲気が出るだろう」
1654 = "「Ừ. Vì là Ohitoyo Mine Treasure mà. Chất đầy than trong rương kho báu thì sẽ có không khí hơn chứ」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　そうですよね、宝箱！\n石炭ぎっちりの宝箱をたくさん乗せて――いいですね！」
1625 = "「A! Đúng vậy nhỉ, rương kho báu! Chở thật nhiều rương kho báu chứa đầy than——tuyệt quá đi!」"
# 【双鉄】
# display as 雙鐵
# JP: 「安全面で問題がなければ、この\\x%l緩急車;#00ffc040;緩急車%l;#;の\\x%l車掌;#00ffc040;車掌%l;#;室に、\n宝箱の番人として、観光客を乗せるのもいいかもしれん」
1938 = "「Nếu không có vấn đề gì về mặt an toàn, có thể cho khách du lịch ngồi trong buồng \\x%l車掌;#00ffc040;trưởng tàu%l;#; của chiếc \\x%l緩急車;#00ffc040;toa xe trưởng tàu%l;#; này với tư cách là người canh giữ rương kho báu cũng hay đấy」"
# 【ポーレット】
# display as 波萊特
# JP: 「掘った石炭と引き換えられる特典にするといいかもです。\nマニア層には、きっとすごく人気出るような気がします」
1756 = "「Có thể lấy đó làm đặc quyền đổi lấy than đã đào được cũng hay ạ. Em có cảm giác nó sẽ cực kỳ nổi tiếng trong giới đam mê đường sắt đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。しかしそうなると――\n\\x%l架台;#00ffc040;架台%l;#;と宝箱とも、いい加減な作りには出来んな」
1651 = "「Ừm. Nhưng nếu vậy thì—— Cả \\x%l架台;#00ffc040;bệ đỡ%l;#; và rương kho báu đều không thể làm qua loa được」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね……\\x%l8620;#00ffc040;8620%l;#;修復のときに知り合った技師さん達に、\n設計面のことは相談しなくちゃならなくなりますね」
1784 = "「Vâng ạ...... Sẽ phải bàn bạc về mặt thiết kế với các kỹ sư quen biết hồi sửa chữa \\x%l8620;#00ffc040;8620%l;#; mới được」"
# 【双鉄】
# display as 雙鐵
# JP: 「設計が出来たとして、作る方は？\n御一夜で出来れば一番良いと思うのだが」
1952 = "「Cho là có thiết kế rồi, vậy còn người làm thì sao? Anh nghĩ tốt nhất là nên làm ở Ohimitera」"
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%l架台;#00ffc040;架台%l;#;の方は、蓑笠さんに相談ですね。\n宝箱は……もともと、御一夜は木工も盛んですし」
1249 = "「Về phần \\x%l架台;#00ffc040;bệ đỡ%l;#; thì phải bàn với ông Minokasa thôi. Còn rương kho báu...... vốn dĩ nghề mộc ở Ohimitera cũng rất thịnh vượng mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。木地師の神社があるくらいだものな」
1634 = "「À, đúng rồi. Đến mức có cả đền thờ dành cho thợ tiện gỗ cơ mà」"
# monologue
# JP: はい、とポーレットは強く頷く。
2485 = "Vâng, Paulette gật đầu mạnh mẽ."
# 【ポーレット】
# display as 波萊特
# JP: 「文化財指定の方も、準備着々と重ねてます。\nその関係で、わたしも確認したんですけど……」
1771 = "「Phía bên công nhận tài sản văn hóa cũng đang chuẩn bị rất suôn sẻ. Liên quan đến chuyện đó, em cũng đã xác nhận rồi......」"
# monologue
# JP: もったいぶるような一拍と、\nちょっと、自信ありげな笑い。
2337 = "Ngừng lại một nhịp như cố tình úp mở, cùng một nụ cười đầy vẻ tự tin."
# monologue
# JP: すごく生き生きして見えて、\nそれだけで胸がドキン、と弾む。
2523 = "Trông em ấy vô cùng tràn đầy sức sống, chỉ vậy thôi cũng đủ làm tim tôi đập rộn ràng."
# 【ポーレット】
# display as 波萊特
# JP: 「今も職人さんはたくさんいらっしゃるみたいです。\nまだ、直接にお会いしたことはないんですけど」
1887 = "「Có vẻ hiện tại vẫn còn rất nhiều thợ thủ công đấy ạ. Dù em chưa trực tiếp gặp mặt họ bao giờ」"
# 【双鉄】
# display as 雙鐵
# JP: 「蓑笠さんなら、きっとその方面にもツテがあろう。\n出来れば、ご紹介を願いたいものだな」
1929 = "「Nếu là ông Minokasa thì chắc chắn sẽ có mối quan hệ trong lĩnh vực đó. Nếu được, anh rất muốn nhờ ông ấy giới thiệu」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうだ！　紹介っていえば！！」
1633 = "「A, đúng rồi! Nhắc đến giới thiệu!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
# 1609 = "「唔？」" 
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%l客車;#00ffc040;客車%l;#;、必要になるじゃないですか、[ハチロク,3]8620の。\nわたし、それ、\\x%lまいてつ;#00ffc040;まいてつ%l;#;仲間に打診してるんです」
2039 = "「Sẽ cần đến \\x%l客車;#00ffc040;toa hành khách%l;#; cho 8620 mà, đúng không anh. Em đang thăm dò ý kiến từ những người bạn \\x%lまいてつ;#00ffc040;chủ tàu%l;#; về việc đó đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1657 = "「嗯」" 
# monologue
# JP: 言われてみれば、そうだった。\n秘書業に追われ、ついうっかりしてしまったが……
2536 = "Nghe em ấy nói vậy, tôi mới nhớ ra. Bận rộn với công việc thư ký nên tôi lỡ quên bẵng mất......"
# monologue
# JP: （いや、ポーレットの忙しさは、\n僕の比どころではないはずなのに――）
2651 = "（Không, Paulette còn bận rộn hơn tôi nhiều lần mới phải chứ——）"
# monologue
# JP: これだけではなく、銀行や鉄道債関係のことでも動いてる。\nなのに細かく目配りし、無言のフォローまで行っている。
2209 = "Không chỉ việc này, em ấy còn đang lo liệu các vấn đề liên quan đến ngân hàng và trái phiếu đường sắt. Vậy mà em ấy vẫn chú ý đến từng chi tiết nhỏ, thậm chí còn âm thầm hỗ trợ từ phía sau."
# monologue
# JP: その能力をいまさらながらに思い知らされ、\nだから、不安も同時に感じる。
2382 = "Giờ tôi mới nhận thức được năng lực đó của em ấy, và cũng chính vì thế, tôi đồng thời cảm thấy bất an."
# monologue
# JP: （やはり、負荷が大きすぎるんだ。\n多分、その影響もあって、あの――）
2658 = "（Quả nhiên là gánh nặng quá lớn. Có lẽ cũng một phần vì thế mà cái vẻ——）"
# monologue
# JP: 不意の硬直。\n自信の全てを失くしたような、うつろな表情。
2330 = "Sự cứng đờ đột ngột. Biểu cảm trống rỗng như thể đã đánh mất toàn bộ sự tự tin."
# monologue
# JP: あれも放置はしておけないと、\n改めて強く意識する。
2383 = "Tôi lại một lần nữa ý thức sâu sắc rằng, không thể cứ để mặc chuyện đó được."
# 【ポーレット】
# display as 波萊特
# JP: 「それで、\n使わなくなった\\x%l客車;#00ffc040;客車%l;#;譲ってもらえそうなんです」
1545 = "「Vì vậy, có vẻ họ sẽ nhượng lại cho mình \\x%l客車;#00ffc040;toa hành khách%l;#; không dùng đến nữa đó ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1837 = "「Vậy sao」"
# monologue
# JP: 今すぐ、何ができるでもない。\nけれど、何かを返したい。
2625 = "Ngay lúc này, tôi chẳng thể làm được gì. Nhưng, tôi muốn đáp lại điều gì đó."
# monologue
# JP: 思いが僕の腕を伸ばして、\nポーレットの髪にそうっと、触れる。
2605 = "Suy nghĩ đó khiến tôi vươn tay ra, nhẹ nhàng chạm vào mái tóc Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「そ、双鉄くん？」
2019 = "「A-anh Soutetsu?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。\n僕は――これより他に褒めようを知らぬ」
1638 = "「À, xin lỗi. Anh——chẳng biết cách khen ngợi nào khác ngoài cách này」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえっ！　いえっ――\nすまなくなんて、全然、無い――から」
1863 = "「Dạ không! Không đâu—— Anh không cần phải xin lỗi, chút nào đâu——ạ」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1804 = "「Vậy à」"
# monologue
# JP: ならばと、髪を撫でていく。\n指を通して、くしけずる。
2435 = "Vậy thì, tôi tiếp tục vuốt tóc em. Luồn những ngón tay qua mái tóc, chải chuốt nó."
# monologue
# JP: むかし路子にしたように、幼い日々姫にしたように。\nけれども全く違う気持ちで――胸を、緊張に高鳴らせつつ。
2362 = "Giống như tôi từng làm với Michiko ngày xưa, giống như tôi từng làm với Hibiki lúc nhỏ. Nhưng với một cảm xúc hoàn toàn khác——trái tim đập rộn lên vì căng thẳng."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、本当にすごいと思う。\n視野の広さも、怠らず手当をすることも」
1872 = "「Anh thấy Paulette thực sự rất tuyệt vời. Cả về tầm nhìn rộng mở, lẫn sự chăm lo không hề chểnh mảng」"
# 【ポーレット】
# display as 波萊特
# JP: 「そんな……わたしなんて全然」
1749 = "「Đâu có...... em chẳng là gì cả」"
# 【双鉄】
# display as 雙鐵
# JP: 「だから、ときおり不安になるのだ。\n無理を、させすぎているのではないかと思ってしまう」
1742 = "「Thế nên, thỉnh thoảng anh lại thấy bất an. Anh cứ nghĩ có phải mình đang ép em làm việc quá sức hay không」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぁ」
1618 = "「A」"
# monologue
# JP: わな、とポーレットの唇が震える。
2486 = "Đôi môi Paulette khẽ run lên."
# monologue
# JP: 僕を見上げて――すがりつく目で僕を見て。\nだから、言葉をそのまま続ける。
2335 = "Ngước lên nhìn tôi——bằng một ánh mắt cầu khẩn. Thế nên, tôi tiếp tục nói."
# 【双鉄】
# display as 雙鐵
# JP: 「苦しいことがあるなら、僕に聞かせて欲しい。\n僕は、ポーレットを支えたい」
1945 = "「Nếu có chuyện gì đau khổ, anh muốn em hãy nói cho anh nghe. Anh muốn được trở thành chỗ dựa cho Paulette」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの……あの……双鉄くん」
1617 = "「Anh...... anh...... anh Soutetsu」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1657 = "「嗯」" 
# monologue
# JP: 青い瞳が大きく揺れる。
2349 = "Đôi mắt xanh biếc lay động dữ dội."
# monologue
# JP: けれどもそれは、まぶたによって隠される。\nそしてわずかに、ポーレットの顔がそらされる。
2217 = "Nhưng nó đã bị hàng mi che khuất. Rồi Paulette khẽ quay mặt đi."
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。けど、わたし、平気です。\nまだ頑張れるし――きっと、必ず、お役にたてます」
1954 = "「Cảm ơn anh. Nhưng mà, em không sao đâu. Em vẫn còn có thể cố gắng được——chắc chắn, nhất định, em sẽ giúp ích được cho anh」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そうか」
1270 = "「......Vậy à」"
# monologue
# JP: ならば、これ以上は踏み込むまい。\nぽん、と軽く頭を撫でて、手を離す。
2440 = "Nếu vậy, tôi sẽ không can thiệp sâu hơn nữa. Tôi vỗ nhẹ lên đầu em một cái, rồi buông tay ra."
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1610 = "「啊——」" 
# monologue
# JP: 少しさみしげな声と視線と。\nけれど、それ以上はポーレットからも踏み込まない。
2343 = "Giọng nói và ánh mắt có chút buồn bã. Nhưng Paulette cũng không nói thêm gì nữa."
# monologue
# JP: 今の僕らの、これが距離だ。\n見えない壁に、僕はまだ触れることさえ出来ない。
2603 = "Đây chính là khoảng cách hiện tại giữa chúng tôi. Tôi thậm chí còn chưa thể chạm đến bức tường vô hình ấy."
# monologue
# JP: （ざくっ）
2667 = "（Sột soạt）"
# 【れいな】
# display as 玲奈
# JP: 「ありましたよぉ！　すぐに使えそうな\\x%l貨車;#00ffc040;貨車%l;#;はもう一輌。\n状態、あんまりよくないのも二輌ありますぅ」
1751 = "「Có rồi ạ~! Có thêm một \\x%l貨車;#00ffc040;toa chở hàng%l;#; có vẻ dùng được ngay. Và hai toa nữa tình trạng không được tốt cho lắm nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そんなにか！」
1849 = "「Nhiều vậy sao!」"
# 【ポーレット】
# display as 波萊特
# JP: 「すごいわ、れいな、良く見つけてくれたわね」
1879 = "「Tuyệt quá Reina, em giỏi lắm mới tìm thấy đấy」"
# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、れいな、がんばりましたぁ」
1603 = "「Ehehe~, Reina đã cố gắng hết sức đó ạ~」"
# monologue
# JP: 撫でて褒めてと近づいてくるれいなを優しく抱き上げる。\nポーレットのその顔にはもう、さきほど覗いた弱さはない。
2493 = "Paulette dịu dàng bế bổng Reina đang tiến lại gần để được xoa đầu khen ngợi. Trên khuôn mặt Paulette đã không còn vẻ yếu đuối vừa lộ ra lúc nãy nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「ね、双鉄くん。\\x%l貨車;#00ffc040;貨車%l;#;、使わないのが出るようなら、\n\\x%l客車;#00ffc040;客車%l;#;との交換材料にもできますよね、きっと」
2021 = "「Này anh Soutetsu. Nếu có \\x%l貨車;#00ffc040;toa chở hàng%l;#; không dùng đến, chắc chắn mình có thể dùng nó làm vật trao đổi lấy \\x%l客車;#00ffc040;toa hành khách%l;#; đấy nhỉ」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、しかし――\nこの\\x%l貨車;#00ffc040;貨車%l;#;群も市に譲渡されたものではないのか？」
1577 = "「Ra vậy, nhưng mà—— đám \\x%l貨車;#00ffc040;toa chở hàng%l;#; này không phải cũng được nhượng lại cho thành phố rồi sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですよね。それは議会で審議してもらって、\n譲渡なり売却なりしてもらわなくちゃになりますね」
1639 = "「A, đúng rồi nhỉ. Cái đó phải đưa ra hội đồng thẩm định, rồi mới quyết định nhượng lại hay bán đi được」"
# 【れいな】
# display as 玲奈
# JP: 「[ハチロク,3]8620にも\\x%l客車;#00ffc040;客車%l;#;がついたら、\n御一夜鉄道、すごくにぎやかになりますねぇ」
1942 = "「Nếu 8620 cũng được gắn \\x%l客車;#00ffc040;toa hành khách%l;#;, thì Đường sắt Ohimitera sẽ nhộn nhịp lắm đây nha~」"
# 【ポーレット】
# display as 波萊特
# JP: 「ねー」
1779 = "「Đúng vậy nhỉ」"
# monologue
# JP: 鼻と鼻とをくっつけるような距離での\nどこかぽかぽかした会話。
2266 = "Cuộc trò chuyện ấm áp ở khoảng cách gần như chạm mũi vào nhau."
# monologue
# JP: ポーレットはまさしく、\n“いつもどおりのポーレット”だ。
2513 = "Paulette quả thực đúng là \"Paulette như mọi khi\"."
# monologue
# JP: （見せないようにしているのか？\nれいなの前では、無理をしてでも）
2662 = "（Là em ấy đang cố giấu đi sao? Trước mặt Reina, dù có phải gắng gượng）"
# monologue
# JP: ならば僕もそれに倣おう。
2618 = "Nếu vậy tôi cũng sẽ làm theo."
# monologue
# JP: ポーレットが弱さを隠すのならば、\n隠した腕で、必ずそれを支えてみせよう。
2439 = "Nếu Paulette muốn giấu đi sự yếu đuối của mình, thì tôi nhất định sẽ dùng đôi tay giấu kín này để nâng đỡ em."
# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、ひとまずは移動だな。\n坑道と廃宿舎も調査して、それで戻って間に合う時間だ」
1914 = "「Dù sao thì, trước mắt cứ di chuyển đã. Điều tra xong hầm mỏ và khu ký túc xá bỏ hoang rồi quay lại là vừa kịp giờ」"
# monologue
# JP: 戻りの\\x%l列車;#00ffc040;列車%l;#;を御一夜にまで運んだあとで、\n\\x%l8620;#00ffc040;8620%l;#;は転車し、術仙洞廃駅で待っててくれる。
2311 = "Sau khi đưa \\x%l列車;#00ffc040;chuyến tàu%l;#; chiều về đến Ohimitera, \\x%l8620;#00ffc040;8620%l;#; sẽ quay đầu và đợi chúng tôi ở ga bỏ hoang Jutsu-sen."
# monologue
# JP: 僕らが早く着いて待つには何の問題も発生しないが、\n待たせてしまえば間違いなく、不安を感じさせるだろう。
2583 = "Nếu chúng tôi đến sớm và đợi thì không có vấn đề gì, nhưng nếu để họ phải đợi thì chắc chắn sẽ khiến họ cảm thấy bất an."
# 【双鉄】
# display as 雙鐵
# JP: 「てきぱき動こう。焦らず、けれども雑にならずに」
1726 = "「Hành động nhanh nhẹn lên nào. Không vội vã, nhưng cũng đừng cẩu thả」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい！」
# 1658 = "「嗯！」" 
# monologue
# JP: てこてことことこ、\n今度はれいなは僕の元へと。
2507 = "Lạch cạch lạch cạch, lần này Reina chạy lon ton về phía tôi."
# monologue
# JP: 移動のために抱き上げて――\nそれから再び念のため、ポーレットへと問いかける。
2497 = "Tôi bế con bé lên để di chuyển—— rồi cẩn thận hỏi lại Paulette một lần nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「抱っこはどうだ？　必要ならば、言ってくれ」
1935 = "「Có cần anh bế không? Nếu cần thì cứ nói nhé」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ははぁ――また、面白かこと考えましたねぇ」
1600 = "「Ha ha—— Lại nghĩ ra trò gì thú vị rồi đây」"
# monologue
# JP: お世辞ではなく、\n蓑笠老人の顔と声とは心底面白がっている。
2602 = "Không phải lời nói khách sáo, khuôn mặt và giọng điệu của ông lão Minokasa cho thấy ông thực sự thấy thú vị."
# monologue
# JP: こういうところは、やはり凪の祖父だと感じる。
2607 = "Những lúc thế này, tôi lại cảm thấy ông quả đúng là ông nội của Nagi."
# 【蓑笠】
# display as 蓑笠
# JP: 「\\x%l架台;#00ffc040;[かだい,1]架台%l;#;やらの方は、図面ばもらえばなんとでも。\n大物は大物で、任せられるもんもおりますからの」
1994 = "「Mấy cái \\x%l架台;#00ffc040;bệ đỡ%l;#; các thứ, chỉ cần có bản vẽ thì kiểu gì cũng xong. Hàng khủng thì có cách của hàng khủng, tôi cũng có người quen để nhờ vả mà」"
# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
2026 = "「Cảm ơn ông rất nhiều ạ」"
# 【蓑笠】
# display as 蓑笠
# JP: 「いやいや、こちらこそ仕事もらえるわけですけんねぇ」
1862 = "「Đâu có đâu có, bên này cũng có thêm việc làm mà lị」"
# monologue
# JP: にこやかな笑いを引き締めて、\n蓑笠老人はポーレットへと向き直る。
2563 = "Thu lại nụ cười rạng rỡ, ông lão Minokasa quay sang Paulette."
# 【蓑笠】
# display as 蓑笠
# JP: 「で。市長さんのおっしゃられるとおり、\n御一夜は、木工、[ちっこう,1]竹工にも古か歴史を持つ町とです」
1856 = "「Vậy đó. Đúng như lời cô Thị trưởng nói, Ohimitera là một thị trấn có lịch sử lâu đời về nghề mộc và nghề thủ công mỹ nghệ tre」"
# monologue
# JP: 今日は、仕事の話だからだろう。\nポーレットのことを、市長さん、と呼んでいる。
2322 = "Chắc vì hôm nay là chuyện công việc. Nên ông ấy gọi Paulette là cô Thị trưởng."
# 【ポーレット】
# display as 波萊特
# JP: 「チッコウ――とは――ああ、チクは[タケ]竹？　竹細工？」
1904 = "「Nghề thủ công mỹ nghệ tre——là sao ạ——à, tre? Là làm đồ mây tre đan ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「そぎゃんとですな。\n御一夜の[たけゆみ,1]竹弓ば、日ノ本中から求められとりますよ」
1781 = "「Đúng vậy đó. Cung tre của Ohimitera được săn lùng khắp cả Hinomoto đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「弓ですか」
1710 = "「Cung ạ?」"
# monologue
# JP: ポーレットをちらと見てみれば、\n知らなかった、と首がふられる。
2412 = "Liếc nhìn Paulette, em ấy cũng lắc đầu biểu thị mình không biết."
# monologue
# JP: おそらくは流通量が少なすぎ、統計資料には載らぬ――\nだが、知る人は確実に知っている、そういう類なのだろう。
2376 = "Có lẽ số lượng lưu thông quá ít nên không được ghi vào tài liệu thống kê—— nhưng những người trong nghề thì chắc chắn biết, đại loại vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「では、その木工や[ちっこう,1]竹工の技術を使い、\nさきほどお話ししたような宝箱をお作りいただくことは」
2010 = "「Vậy, nếu sử dụng kỹ thuật mộc và thủ công mỹ nghệ tre đó, để nhờ họ làm rương kho báu như chúng cháu vừa nói thì sao ạ」"
# 【蓑笠】
# display as 蓑笠
# JP: 「できるできんでいえば、できるでしょうな。\nやるやらんは、職人それぞれの腹で決まりましょうが」
1946 = "「Nếu nói làm được hay không thì chắc chắn là được rồi. Nhưng làm hay không thì phải xem ý mấy ông thợ thế nào đã」"
# 【ポーレット】
# display as 波萊特
# JP: 「やっていただけない可能性――\n高いと、お考えでしょうか？」
1719 = "「Khả năng họ không nhận làm—— ông nghĩ là có cao không ạ?」"
# monologue
# JP: 僕が感じたのと同じふくみを、\nポーレットもまた感じたらしい。
2521 = "Có vẻ Paulette cũng cảm nhận được ẩn ý giống như tôi."
# monologue
# JP: 真正面から問いかけられて、\n蓑笠老人はこくり、ゆっくりとお茶を飲む。
2564 = "Bị hỏi thẳng, ông lão Minokasa gật đầu, chậm rãi nhấp một ngụm trà."
# 【蓑笠】
# display as 蓑笠
# JP: 「宝箱ば、一度作ったら何年も何十年も、\nそこに置かれっぱなしになりますでしょう」
1692 = "「Mấy cái rương kho báu đó, làm xong thì cứ để đó hàng năm, hàng chục năm trời đúng không」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1657 = "「嗯」" 
# monologue
# JP: なるほど、そうか――
2285 = "Ra là vậy, thế à——"
# monologue
# JP: この計画が上手く行き、御一夜が発展の途を進むとして、\nしかし、宝箱は置き去りになる。
2366 = "Cho dù kế hoạch này thành công, Ohimitera tiếp tục phát triển, nhưng những chiếc rương kho báu sẽ bị bỏ lại đó."
# 【ポーレット】
# display as 波萊特
# JP: 「作ってくださる職人さんには……旨味が薄い？」
1697 = "「Đối với những người thợ thủ công làm ra nó...... không có gì hấp dẫn sao ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ゆーよーな気が、私なんぞにゃ」
1732 = "「Lão đây có cảm giác như vậy đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「では――宝箱をもっと小さく。\n観光客に持ち帰ってもらえるものとしてはどうでしょう」
1984 = "「Vậy thì——làm rương kho báu nhỏ lại. Làm thành thứ để khách du lịch có thể mang về thì sao ạ」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　それいい！！」
1628 = "「A! Ý kiến hay đó anh!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「コンテナ代わりの大きな宝箱と、\n持ち帰れる、そのミニチュアの手のひらサイズと」
1570 = "「Một chiếc rương kho báu lớn thay cho container, và một chiếc rương thu nhỏ cỡ lòng bàn tay để mang về」"
# monologue
# JP: ポーレットの笑顔が熱を与えてくれる。\nイメージがどんどんふくらんでいく。
2487 = "Nụ cười của Paulette truyền cho tôi nhiệt huyết. Những ý tưởng cứ thế không ngừng mở rộng."
# 【双鉄】
# display as 雙鐵
# JP: 「持ち帰りを、普段づかいもできるような箱とすれば、\n御一夜の木工・竹工の生きた宣伝にもなるはずです」
1696 = "「Nếu chiếc rương mang về được thiết kế để có thể sử dụng thường ngày, thì nó sẽ trở thành một cách quảng bá sống động cho nghề mộc và thủ công mỹ nghệ tre của Ohimitera」"
# 【ポーレット】
# display as 波萊特
# JP: 「定期、継続のお仕事の依頼になりますし――\n評判次第で、新しい特産品になっていくかもしれません」
1978 = "「Nó sẽ trở thành một công việc định kỳ, lâu dài—— và tùy vào đánh giá, nó có thể trở thành một đặc sản mới cũng nên」"
# 【蓑笠】
# display as 蓑笠
# JP: 「なるほど――面白か案ですなぁ」
1574 = "「Ra vậy——Một ý tưởng thú vị đấy」"
# monologue
# JP: 吟味するようにゆっくりと、\n蓑笠老人は頷いてくれる。
2566 = "Ông lão Minokasa gật gù chậm rãi như đang suy ngẫm."
# 【双鉄】
# display as 雙鐵
# JP: 「お客の負担となりますから、コストは抑える必要が出る。\nが、その中でも、良い質のものを作っていただけるなら」
2024 = "「Vì khách hàng sẽ phải trả tiền, nên cần phải giảm chi phí. Nhưng trong giới hạn đó, nếu họ có thể làm ra những sản phẩm chất lượng tốt」"
# 【蓑笠】
# display as 蓑笠
# JP: 「そここそ、腕のみせどころいうもんでしょう。\nそぎゃん話なら、燃える職人ばいるかとも思いますな」
1977 = "「Đó mới là lúc thể hiện tay nghề chứ. Nếu là chuyện đó thì chắc cũng có những người thợ thủ công hừng hực khí thế đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、\nそうした職人さんへのご紹介を願えませんでしょうか？」
2012 = "「Vậy, ông có thể giới thiệu cho cháu những người thợ thủ công đó được không ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「良かです。良かですが――紹介なら、\n凪に任せた方がまぁまぁ、良か結果になりますでしょう」
1889 = "「Được thôi. Được thì được——nhưng nếu là giới thiệu, thì giao cho con bé Nagi sẽ có kết quả tốt hơn đấy」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのですか？」
1805 = "「Vậy sao ạ?」"
# monologue
# JP: 皺が寄り、苦笑の形に結ばれる。
2567 = "Những nếp nhăn xô lại thành một nụ cười khổ."
# 【蓑笠】
# display as 蓑笠
# JP: 「……職人同士が顔あわせりゃあ、\nややこしかもん、いろいろ生まれますけんねぇ」
1268 = "「......Mấy lão thợ thủ công mà chạm mặt nhau, thì kiểu gì cũng sinh ra đủ thứ rắc rối cho xem」"
# 【ポーレット】
# display as 波萊特
# JP: 「あぁ」
# 1610 = "「啊——」" 
# monologue
# JP: 心あたるところがあるのか、\nポーレットの声にはやけに生々しい実感がある。
2554 = "Chắc hẳn đã từng trải qua chuyện tương tự, giọng nói của Paulette mang một cảm giác chân thực đến lạ thường."
# monologue
# JP: ああ、いや、そうか――それこそ、まさに生々しい、\nプライドや対抗心などが、職人同士だと発生するのか。
2309 = "À, không, ra là vậy——đó mới chính là sự chân thực, những thứ như lòng tự trọng hay sự cạnh tranh sẽ nảy sinh giữa những người thợ thủ công sao."
# 【蓑笠】
# display as 蓑笠
# JP: 「わが孫ながら、凪には裏表いうもんが無かですけんね。\nまずまず、飾らん話ばできるんじゃなかとかと」
1953 = "「Tuy là cháu gái tôi, nhưng con bé Nagi không có tính hai mặt. Nên chắc là có thể nói chuyện một cách thẳng thắn, không màu mè」"
# monologue
# JP: その声に、\nポーレットの顔も嬉しげになる。
2491 = "Nghe thấy vậy, khuôn mặt Paulette cũng rạng rỡ hẳn lên."
# 【ポーレット】
# display as 波萊特
# JP: 「凪ちゃん、やっぱり職人さんたちの間でも、\n人気者だったりするんでしょうか？」
1699 = "「Chẳng lẽ bé Nagi cũng rất được yêu mến giữa các thợ thủ công sao ạ?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「いやいや、どこにでも顔ば出して口も出すんで、\n邪魔にされとるだけですけんねぇ」
1861 = "「Đâu có đâu có, con bé cứ chui rúc khắp nơi rồi tọc mạch đủ thứ, chỉ toàn gây cản trở thôi」"
# monologue
# JP: 口とは裏腹、\n蓑笠老人はもう溶けそうな笑顔になってる。
2623 = "Trái ngược với lời nói, ông lão Minokasa đang nở một nụ cười như tan chảy."
# monologue
# JP: 孫がかわいくて仕方がない、\nそんな気持ちが、顔から声からあふれだしている。
2241 = "Tình yêu thương cháu gái vô bờ bến tràn ngập từ khuôn mặt đến giọng nói của ông."
# 【蓑笠】
# display as 蓑笠
# JP: 「まぁしかし、アレの前で\n無理ばいう職人は、まずおらんでしょう」
1527 = "「Nhưng mà, trước mặt con bé thì chắc chẳng có người thợ thủ công nào nỡ làm khó dễ đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。ご配慮、ありがとうございます」
1579 = "「Ra vậy. Cảm ơn ông đã cân nhắc ạ」"
# monologue
# JP: ならばまず、凪に計画を説明し、賛同をもらった後に、\n職人さんたちに話をもっていくべきだろう。
2619 = "Vậy thì trước tiên, phải giải thích kế hoạch cho Nagi, sau khi nhận được sự đồng ý, mới nên đi nói chuyện với các thợ thủ công."
# monologue
# JP: そうすればおそらく、\n凪の存在は、より大きな側面支援となってくれる。
2606 = "Nếu làm vậy, có lẽ sự hiện diện của Nagi sẽ trở thành một sự hỗ trợ đắc lực từ phía sau."
# 【双鉄】
# display as 雙鐵
# JP: 「それで……その凪なのですが」
1986 = "「Thế...... Nagi đâu rồi ạ」"
# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、そういえば遅かとですなぁ」
1662 = "「À, nhắc mới nhớ, con bé về muộn thật đấy」"
# monologue
# JP: 蓑笠老人の目が、壁の時計へ向けられる。
2565 = "Mắt ông lão Minokasa hướng về phía chiếc đồng hồ treo tường."
# 【蓑笠】
# display as 蓑笠
# JP: 「早瀬さんとこの手伝いば終わって……\n寄り道と買い食いばしても、もう戻っとる時間とですが」
1705 = "「Xong việc phụ giúp nhà Hayase...... dù có la cà ăn quà vặt dọc đường thì cũng phải về đến nhà rồi chứ」"
# 【双鉄】
# display as 雙鐵
# JP: 「電話、ふかみにしてみましょうか？」
1949 = "「Để cháu gọi điện cho Fukami thử xem nhé?」"
# 【蓑笠】
# display as 蓑笠
# JP: 「はい――あ！　ああ、いや、それには及ばんとです」
1674 = "「Vâng——A! À, không, không cần đâu」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっ」
1605 = "「Ồ」"
# monologue
# JP: 僕にも聞こえる。近づいてくる。\n勢いの良い足音が。
2386 = "Tôi cũng nghe thấy. Đang tiến lại gần. Tiếng bước chân đầy khí thế."
# monologue
# JP: というか――これは――走ってる。
2604 = "Nói đúng hơn là——thế này——đang chạy."
# 【凪】
# display as 凪
# JP: 「じいちゃんじいちゃん、大変ばいっ！\nあ、にーさんも来とったと！　丁度よかばいっ！！」
1874 = "「Ông ơi ông ơi, to chuyện rồi nè! A, anh hai cũng đến à! Đúng lúc lắm!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「何事だっ！？」
1716 = "「Có chuyện gì thế!?」"
# monologue
# JP: 全身、汗にまみれている。\n顔が真っ赤で、息が荒い。
2332 = "Toàn thân con bé ướt sũng mồ hôi. Khuôn mặt đỏ bừng, thở hổn hển."
# monologue
# JP: いくら凪でも帰宅のためだけに、\nここまで必死には走るまい。
2364 = "Dù là Nagi đi chăng nữa, chỉ để về nhà thì cũng không đến mức chạy thục mạng thế này."
# 【凪】
# display as 凪
# JP: 「猫、おぼれとったばい！　\nそれで、ふかみちゃん！　助けに川に飛び込んで」
1847 = "「Có con mèo bị đuối nước! Thế là bé Fukami! Nhảy xuống sông cứu nó」"
# 【ポーレット】
# display as 波萊特
# JP: 「ええっ！？」
1604 = "「Hả!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「現場はどこだっ！　警察はっ」
1665 = "「Hiện trường ở đâu! Cảnh sát đâu」"
# 【凪】
# display as 凪
# JP: 「ああ、違うばい！　溺れとらんばい！　\nふかみちゃん、カッパのごたる泳ぎよるけんっ！！」
1621 = "「A, không phải đâu! Không có chết đuối! Bé Fukami bơi giỏi như Kappa luôn á!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……よかった」
1615 = "「A...... may quá」"
# monologue
# JP: ほっと、ポーレットが息を吐く。
2495 = "Paulette thở phào nhẹ nhõm."
# monologue
# JP: が、安心はまだ出来ない。\nそれだけならば、凪とてここまでは走るまい。
2218 = "Nhưng vẫn chưa thể yên tâm được. Nếu chỉ có vậy, Nagi đã không chạy hớt hải đến mức này."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、何が大変なのだ？」
2001 = "「Vậy thì, to chuyện là chuyện gì?」"
# 【凪】
# display as 凪
# JP: 「あ！　そればい！　そのまま川下りば再開して、\n終わったら、ふかみちゃんぶるぶる震え始めたばい」
1624 = "「A! Chuyện đó á! Sau đó tụi em tiếp tục chèo thuyền, xong xuôi thì bé Fukami bắt đầu run lẩy bẩy luôn」"
# 【双鉄】
# display as 雙鐵
# JP: 「風邪をひいたか？」
1721 = "「Bị cảm lạnh rồi à?」"
# 【凪】
# display as 凪
# JP: 「と思うばい。\n測ったら、熱、三十八度六分あったとよ」
1551 = "「Em cũng nghĩ vậy. Đo thử thì thấy sốt 38 độ 6 lận đó」"
# 【ポーレット】
# display as 波萊特
# JP: 「お医者様は？」
1898 = "「Bác sĩ đâu rồi?」"
# 【凪】
# display as 凪
# JP: 「来てくれたばい。みどりおばちゃんの主治医さんだけん、\nそっちは、全然安心ばい。三日もすれば治るばい」
1897 = "「Bác sĩ đến rồi. Là bác sĩ riêng của dì Midori, nên chuyện đó hoàn toàn yên tâm. Tầm ba ngày là khỏi thôi」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ……よかった」
# 1615 = "「啊……太好了」" 
# monologue
# JP: いやいやいやいや、まだ良くない。\nもう一度、同じ問いかけをくりかえす。
2207 = "Không không không không, vẫn chưa xong đâu. Tôi lại lặp lại câu hỏi ban nãy một lần nữa."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、何が大変なのだ？」
# 2001 = "「那到底發生了什麼事？」" 
# 【凪】
# display as 凪
# JP: 「そうだったばい！　予約客ばい！　団体さんばいっ！\nあしたの夕方の四時からばい！」
1840 = "「Đúng rồi! Khách đặt trước á! Là khách đoàn luôn! Từ bốn giờ chiều mai á!」"
# 【ポーレット】
# display as 波萊特
# JP: 「えっ」
1601 = "「Hả」"
# monologue
# JP: ぎくりと、ポーレットの動きが止まる。\nこの時期の、団体の、予約客。
2483 = "Paulette sững sờ, động tác khựng lại. Khách đặt trước, đi theo đoàn, vào thời điểm này."
# monologue
# JP: もしキャンセルなどという事態となれば、\nただでさえ弱り目の観光への大打撃とさえなりかねない。
2580 = "Nếu xảy ra tình trạng hủy bỏ, đây có thể là một đòn giáng mạnh vào ngành du lịch vốn đã suy yếu."
# 【凪】
# display as 凪
# JP: 「でも、にーさんが居て助かったばい。\nさっそく、仕事代わってもらう券、使うばい！」
1529 = "「Nhưng mà, may có anh hai ở đây. Em xài vé nhờ làm thay việc liền luôn nha!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1658 = "「嗯！」" 
# monologue
# JP: それしかない。
2223 = "Chỉ còn cách đó thôi."
# monologue
# JP: というか、時間があまりに少ない。\n今すぐにでも動き出さねば。
2219 = "Nói đúng hơn là thời gian còn lại quá ít. Phải hành động ngay lập tức thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「凪。食事と休憩を取ってくれ。\nもし可能なら、それで疲労を抜き次第」
1559 = "「Nagi. Em đi ăn uống và nghỉ ngơi đi. Nếu được, ngay sau khi xua tan mệt mỏi」"
# 【凪】
# display as 凪
# JP: 「さすがにーさん、良か覚悟ばい」
1519 = "「Quả không hổ danh anh hai, tinh thần tốt lắm」"
# monologue
# JP: 凪は笑って、\nパン、と乾いた音を立て、左右の拳を打ち合わせる。
2275 = "Nagi cười, đấm hai nắm đấm vào nhau tạo ra một tiếng 'bốp' khô khốc."
# 【凪】
# display as 凪
# JP: 「腹ごしらえして、特訓ばいっ！！」
1593 = "「Lót dạ xong là bước vào huấn luyện đặc biệt luôn nha!!」"
