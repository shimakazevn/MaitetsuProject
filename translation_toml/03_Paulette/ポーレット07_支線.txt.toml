2401 = "我和八六，還有這節\\x%l緩急車;#00ffc040;守車%l;#;也是一樣……不光如此，說不定就連波萊特也是。" 

# monologue
# JP: （汰斗さんが教えてくれた――\n報いるとは、つまり、こういうことなのかもしれない）
2666 = "（汰斗老爺說過的報答她——也許就是指的這個）" 

# monologue
# JP: 見えてくる。\n僕の目指すべき次のゴールが。
2408 = "我現在能夠清楚地看到我的下一個目的地。" 

# monologue
# JP: ポーレットとともに走れるのなら、\n今度こそ、きっとそこへとたどり着ける。
2356 = "如果有波萊特在我身邊，這次我一定能夠抵達。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まず、必要となるのはレールの復活か？」
2031 = "「首先要恢復鐵軌嗎？」" 

# 【ポーレット】
# display as 波萊特
