1530 = "「也就是說，要是在\\x%l運転士;#00ffc040;駕駛員%l;#;看不見的後方發生了問題，\\x%l車掌;#00ffc040;列車長%l;#;能夠\\x%l非常;#00ffc040;緊急%l;\\x%lブレーキ;#;#00ffc040;剎車%l;#;對嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですです。で、[むがい,1]無蓋\x%l貨車;#00ffc040;貨車%l;#;っていうのは、\nフタ――天井のついてない\x%l貨車;#00ffc040;貨車%l;#;ってことです」
1820 = "「是的。然後，所謂平車式的\\x%l貨車;#00ffc040;貨運車廂%l;#;呢，就是沒有蓋子——天花板的\\x%l貨車;#00ffc040;貨運車廂%l;#;」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1608 = "「唔」" 

# 【ポーレット】
# display as 波萊特
# JP: 「[かだい,1]架台――コンテナとかを乗せるための台が、\n\x%l台枠;#00ffc040;台枠%l;#;の上にぽん[づ]付けしてある感じの\x%l貨車;#00ffc040;貨車%l;#;のことですよ」
