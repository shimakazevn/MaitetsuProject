2552 = "聲音中交雜著驚喜、驚訝、成就感，立刻吹散了我們之間沉重的沉默。" 

# 【ポーレット】
# display as 波萊特
# JP: 「\x%l貨車;#00ffc040;貨車%l;#;！？」
1254 = "「\\x%l貨車;#00ffc040;貨運車廂%l;#;！？」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい！　やっぱりありましたぁ！\nあの、そうてつさん、おろしてくださいな」
1825 = "「是的！果然在這裡！那個，雙鐵先生，請放玲奈下來」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ」
# 1657 = "「嗯」" 

