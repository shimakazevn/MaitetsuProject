2250 = "僅僅只是這麼做，就讓我冷靜了下來，為我濾去感情中多餘的渣滓。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから自分もいつか死ぬと、それまでの生と考えて。\n父となる、子をなすことなど、想像もしていなかった」
1743 = "「所以我認為自己此刻生存在世，只是為了迎接將來某一天的死亡。生兒女、為人父這樣的事，我從來沒考慮過」" 

# monologue
# JP: ただ正直に――そんな思いで整頓されて出来た隙間に、\n埋もれていた気持ちを、見つける。
2499 = "然後從沉澱之中，發掘出一直以來都被埋藏著的真實的感情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「けれど今は……なってみたいと感じる気持ちもある。\nそれと同時に、とても怖いという気持ちも」
1528 = "「不過現在……我也有點想嘗試的心情。但與此同時又感到很害怕」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！！」
2037 = "「！！」" 

# monologue
# JP: びくりと、ポーレットの肩が動く。\nその目はいまだ、真正面へと釘付けられたままだけれども。
2488 = "波萊特的肩膀抖動了一下。雖然她還在直直地目視著前方。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう……ですよね。\n怖いですよね、そういうの」
1648 = "「嗯……是啊。這的確是一件可怕的事呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……」
1265 = "「……」" 

# monologue
# JP: その呟きがあまりに意外で、言葉を咄嗟に返せない。
2342 = "她的話讓我感到十分意外，一時讓我不知該如何回應。" 

# monologue
# JP: （れいなへの接し方など――\nポーレットは、母性の塊としか思えんのに）
2660 = "（明明平時對待玲奈的時候——波萊特顯得那麼有母性）" 

# monologue
# JP: ならばいったい、何を“怖い”と言っているのか。\n“そういうの”とは何を示すか。
2615 = "那她究竟為什麼會害怕？是什麼讓她感到恐懼？" 

# monologue
# JP: ――今は、さすがに尋ねられない。
1236 = "——這句話實在讓人不敢問出口。" 

# monologue
# JP: （質問すれば、きっとポーレットは僕の望みの答えを伺う。\n自分の気持ちを、素直に出せなくなってしまう）
2648 = "（一旦問出口，波萊特一定會說出我期待的答案，而不是她真正的心情）" 

# 【ポーレット】
# display as 波萊特
# JP: 「…………」
# 1265 = "「……」" 

# monologue
# JP: しかし、ポーレットも何も言わない。\n僕の言葉を、あるいは待っているのかもしれない。
2246 = "但她也沉默了下來。說不定是在等我的回答。" 

# monologue
# JP: ざくざくと、夏草を踏む足音だけが積み重なって――
2295 = "只有踩著夏草的沙沙聲迴盪在我們身邊。" 

# 【れいな】
# display as 玲奈
# JP: 「あああ！　あったぁ！　ありましたぁ！」
1619 = "「啊啊啊！有了！找到了！」" 

# 【双鉄】
# display as 雙鐵＆波萊特
# JP: 「っ！」\n「あ」
2035 = "「！」\\n「啊——」" 

# monologue
# JP: 助かった。\nそんな思いの声はおそらく、僕の発したものだけではない。
2528 = "真是時機正好。而這麼想的應該不止我一個人。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あああっ！」
1622 = "「啊！」" 

# monologue
# JP: その声が、一瞬にして温度をあげる。
2341 = "她的聲音，頓時恢復了活力。" 

# monologue
