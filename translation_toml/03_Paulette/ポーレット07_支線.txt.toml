2605 = "這樣的想法驅使我伸出手去，輕輕觸碰了波萊特的頭髮。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そ、双鉄くん？」
2019 = "「雙、雙鐵君？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、すまん。\n僕は――これより他に褒めようを知らぬ」
1638 = "「啊，抱歉。我——只會用這種方式表達誇讚」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえっ！　いえっ――\nすまなくなんて、全然、無い――から」
1863 = "「沒有！才沒有什麼可抱歉的！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1804 = "「是嗎」" 

# monologue
# JP: ならばと、髪を撫でていく。\n指を通して、くしけずる。
2435 = "既然她並不反感，我便繼續著手上的動作。我用指尖梳理著她的髮絲。" 

# monologue
# JP: むかし路子にしたように、幼い日々姫にしたように。\nけれども全く違う気持ちで――胸を、緊張に高鳴らせつつ。
2362 = "就如我以前對路子、對年幼的日日姬所做的那樣。卻懷揣著與當時截然不同的緊張。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、本当にすごいと思う。\n視野の広さも、怠らず手当をすることも」
1872 = "「波萊特真的很厲害。不僅視野寬廣，工作上還這麼勤奮」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そんな……わたしなんて全然」
1749 = "「才沒有……我還不夠格呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だから、ときおり不安になるのだ。\n無理を、させすぎているのではないかと思ってしまう」
1742 = "「所以我有時候會感覺是不是在勉強你，這讓我非常不安」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ぁ」
1618 = "「啊」" 

# monologue
# JP: わな、とポーレットの唇が震える。
2486 = "波萊特的嘴唇輕輕顫抖著。" 

# monologue
# JP: 僕を見上げて――すがりつく目で僕を見て。\nだから、言葉をそのまま続ける。
2335 = "她抬起頭——用求助的目光看著我。所以我繼續說下去。" 

# 【双鉄】
# display as 雙鐵
# JP: 「苦しいことがあるなら、僕に聞かせて欲しい。\n僕は、ポーレットを支えたい」
1945 = "「要是有什麼痛苦，就告訴我。我想成為波萊特你的依靠」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの……あの……双鉄くん」
1617 = "「啊……那個……雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1657 = "「嗯」" 

# monologue
# JP: 青い瞳が大きく揺れる。
2349 = "她藍色的眼睛開始泛出淚光。" 

# monologue
# JP: けれどもそれは、まぶたによって隠される。\nそしてわずかに、ポーレットの顔がそらされる。
2217 = "不過她馬上垂下眼簾將其隱藏起來。之後，她稍稍轉過頭去。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。けど、わたし、平気です。\nまだ頑張れるし――きっと、必ず、お役にたてます」
1954 = "「謝謝你的心意。但是我沒事。我還能繼續努力——一定會幫上你的忙」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そうか」
1270 = "「……是嗎」" 

# monologue
# JP: ならば、これ以上は踏み込むまい。\nぽん、と軽く頭を撫でて、手を離す。
2440 = "既然波萊特這麼說，我也不會強求。我輕輕摸了摸她的頭，然後鬆開手。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1610 = "「啊——」" 

# monologue
# JP: 少しさみしげな声と視線と。\nけれど、それ以上はポーレットからも踏み込まない。
2343 = "她的語氣和眼神都透著一股落寞。但也沒有多說別的。" 

# monologue
# JP: 今の僕らの、これが距離だ。\n見えない壁に、僕はまだ触れることさえ出来ない。
2603 = "這就是我們現在的距離。面前這一堵看不見的牆壁，還不允許我去觸碰。" 

# monologue
# JP: （ざくっ）
2667 = "（沙沙）" 

# 【れいな】
# display as 玲奈
# JP: 「ありましたよぉ！　すぐに使えそうな\x%l貨車;#00ffc040;貨車%l;#;はもう一輌。\n状態、あんまりよくないのも二輌ありますぅ」
1751 = "「找到\\x%l貨車;#00ffc040;貨運車廂%l;#;了！其中一節馬上能用，另外還有兩節情況不太好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そんなにか！」
1849 = "「有這麼多啊！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「すごいわ、れいな、良く見つけてくれたわね」
1879 = "「玲奈好厲害，竟然能找到這麼多」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ、れいな、がんばりましたぁ」
1603 = "「哎嘿嘿，玲奈可是很努力的！」" 

# monologue
# JP: 撫でて褒めてと近づいてくるれいなを優しく抱き上げる。\nポーレットのその顔にはもう、さきほど覗いた弱さはない。
2493 = "波萊特輕柔地抱起前來邀功的玲奈，她剛才臉上的軟弱已經被一掃而空。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ね、双鉄くん。\x%l貨車;#00ffc040;貨車%l;#;、使わないのが出るようなら、\n\x%l客車;#00ffc040;客車%l;#;との交換材料にもできますよね、きっと」
2021 = "「雙鐵君，要是有多餘的\\x%l貨車;#00ffc040;貨運車廂%l;#;，說不定能拿去跟別人換\\x%l客車;#00ffc040;客運車廂%l;#;呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、しかし――\nこの\x%l貨車;#00ffc040;貨車%l;#;群も市に譲渡されたものではないのか？」
1577 = "「原來如此，但是——這些\\x%l貨車;#00ffc040;貨運車廂%l;#;的所有權歸屬市裡吧？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、そうですよね。それは議会で審議してもらって、\n譲渡なり売却なりしてもらわなくちゃになりますね」
1639 = "「啊，是啊。那就得在議會上提議轉讓或者賣給我們了」" 

# 【れいな】
# display as 玲奈
# JP: 「[ハチロク,3]8620にも\x%l客車;#00ffc040;客車%l;#;がついたら、\n御一夜鉄道、すごくにぎやかになりますねぇ」
1942 = "「要是八六也裝上了\\x%l客車;#00ffc040;客運車廂%l;#;，御一夜鐵路一下子就會變得熱鬧起來啦」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ねー」
1779 = "「是呀」" 

# monologue
# JP: 鼻と鼻とをくっつけるような距離での\nどこかぽかぽかした会話。
2266 = "兩人的額頭貼在一起，親密無間地說著話，場面十分溫馨。" 

# monologue
# JP: ポーレットはまさしく、\n“いつもどおりのポーレット”だ。
2513 = "現在的波萊特又變回了平時的樣子。" 

# monologue
# JP: （見せないようにしているのか？\nれいなの前では、無理をしてでも）
2662 = "（是為了不讓玲奈見到自己軟弱的一面嗎？所以才要逞強）" 

# monologue
# JP: ならば僕もそれに倣おう。
2618 = "那麼我也這樣做吧。" 

# monologue
# JP: ポーレットが弱さを隠すのならば、\n隠した腕で、必ずそれを支えてみせよう。
2439 = "既然波萊特下定決心要隱藏自己的軟弱，那麼我就一定要在背後默默地支持她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、ひとまずは移動だな。\n坑道と廃宿舎も調査して、それで戻って間に合う時間だ」
1914 = "「總之我們先走吧。還要調查坑道和廢棄宿舍，回來就時間差不多到了」" 

# monologue
# JP: 戻りの\x%l列車;#00ffc040;列車%l;#;を御一夜にまで運んだあとで、\n\x%l8620;#00ffc040;8620%l;#;は転車し、術仙洞廃駅で待っててくれる。
2311 = "回程的\\x%l列車;#00ffc040;列車%l;#;會在御一夜放下客人，然後\\x%l8620;#00ffc040;８６２０%l;#;進行轉車，前往術仙煤礦廢車站等我們。" 

# monologue
# JP: 僕らが早く着いて待つには何の問題も発生しないが、\n待たせてしまえば間違いなく、不安を感じさせるだろう。
2583 = "要是我們提前去那裡等八六她們倒還好，但要是讓她們在車站等我們，想必她們會十分不安。" 

# 【双鉄】
# display as 雙鐵
# JP: 「てきぱき動こう。焦らず、けれども雑にならずに」
1726 = "「我們還是動作快些吧，但也不要太急了」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい！」
# 1658 = "「嗯！」" 

# monologue
# JP: てこてことことこ、\n今度はれいなは僕の元へと。
2507 = "玲奈小跑向我。" 

# monologue
# JP: 移動のために抱き上げて――\nそれから再び念のため、ポーレットへと問いかける。
2497 = "為了能夠迅速移動，我抱起玲奈——以防萬一，我便再次問波萊特。" 

# 【双鉄】
# display as 雙鐵
# JP: 「抱っこはどうだ？　必要ならば、言ってくれ」
1935 = "「要我抱你嗎？如果需要的話儘管開口」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ははぁ――また、面白かこと考えましたねぇ」
1600 = "「哈哈——你們又想出了好玩的點子咧」" 

# monologue
# JP: お世辞ではなく、\n蓑笠老人の顔と声とは心底面白がっている。
2602 = "這不是客套話，蓑笠爺爺似乎真的是打從心底裡覺得有趣。" 

# monologue
# JP: こういうところは、やはり凪の祖父だと感じる。
2607 = "這種時候就會覺得，他果然是凪的祖父。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「\x%l架台;#00ffc040;[かだい,1]架台%l;#;やらの方は、図面ばもらえばなんとでも。\n大物は大物で、任せられるもんもおりますからの」
1994 = "「那什麼\\x%l架台;#00ffc040;底座%l;#;只要有圖紙就好辦。就算是大物件兒，我也能找人擺平咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ありがとうございます」
2026 = "「非常感謝您」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「いやいや、こちらこそ仕事もらえるわけですけんねぇ」
1862 = "「沒有的事，我還要謝謝你們給我新生計咧」" 

# monologue
# JP: にこやかな笑いを引き締めて、\n蓑笠老人はポーレットへと向き直る。
2563 = "蓑笠爺爺收起笑容，看向波萊特。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「で。市長さんのおっしゃられるとおり、\n御一夜は、木工、[ちっこう,1]竹工にも古か歴史を持つ町とです」
1856 = "「正如市長所說，御一夜的木工竹工也有悠久的歷史」" 

# monologue
# JP: 今日は、仕事の話だからだろう。\nポーレットのことを、市長さん、と呼んでいる。
2322 = "因為要談工作，所以蓑笠爺爺改口稱波萊特為市長。" 

# 【ポーレット】
# display as 波萊特
# JP: 「チッコウ――とは――ああ、チクは[タケ]竹？　竹細工？」
1904 = "「竹工是——啊，竹子？加工竹子的工藝？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「そぎゃんとですな。\n御一夜の[たけゆみ,1]竹弓ば、日ノ本中から求められとりますよ」
1781 = "「是咧。御一夜的竹弓在整個日本都是很有名的咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「弓ですか」
1710 = "「弓？」" 

# monologue
# JP: ポーレットをちらと見てみれば、\n知らなかった、と首がふられる。
2412 = "我瞄了一眼波萊特，她也疑惑地搖了搖頭。" 

# monologue
# JP: おそらくは流通量が少なすぎ、統計資料には載らぬ――\nだが、知る人は確実に知っている、そういう類なのだろう。
2376 = "恐怕是交易量很少導致統計數據裡沒有記載，但是這方面的專家都知道——這種類型的吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、その木工や[ちっこう,1]竹工の技術を使い、\nさきほどお話ししたような宝箱をお作りいただくことは」
2010 = "「那麼，能不能用這些木工和竹工的技術，製作我們剛才所說的寶箱呢？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「できるできんでいえば、できるでしょうな。\nやるやらんは、職人それぞれの腹で決まりましょうが」
1946 = "「要說能不能做，那是肯定能做。但願不願意就要看工匠們的心情咧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっていただけない可能性――\n高いと、お考えでしょうか？」
1719 = "「您認為會有人不願意做嗎？」" 

# monologue
# JP: 僕が感じたのと同じふくみを、\nポーレットもまた感じたらしい。
2521 = "看來波萊特和我一樣，從他的話中聽出了言外之意。" 

# monologue
# JP: 真正面から問いかけられて、\n蓑笠老人はこくり、ゆっくりとお茶を飲む。
2564 = "蓑笠爺爺沒有直接回答波萊特的問題，而是先喝了一口茶。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「宝箱ば、一度作ったら何年も何十年も、\nそこに置かれっぱなしになりますでしょう」
1692 = "「寶箱這東西，做出來之後會在那裡放上好幾年、幾十年吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1657 = "「嗯」" 

# monologue
# JP: なるほど、そうか――
2285 = "原來是這樣啊——" 

# monologue
# JP: この計画が上手く行き、御一夜が発展の途を進むとして、\nしかし、宝箱は置き去りになる。
2366 = "就算我們的計劃成功，御一夜迎來了繁榮的發展。而寶箱卻會被就此棄置不管。" 

# 【ポーレット】
# display as 波萊特
# JP: 「作ってくださる職人さんには……旨味が薄い？」
1697 = "「對於工匠來說……沒什麼吸引力是嗎？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ゆーよーな気が、私なんぞにゃ」
1732 = "「我是這麼想的咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では――宝箱をもっと小さく。\n観光客に持ち帰ってもらえるものとしてはどうでしょう」
1984 = "「那——就把寶箱做小，讓遊客帶回去怎麼樣」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　それいい！！」
1628 = "「啊！這個主意好！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「コンテナ代わりの大きな宝箱と、\n持ち帰れる、そのミニチュアの手のひらサイズと」
1570 = "「分別做成代替貨櫃的大寶箱，以及能讓遊客帶回去的手掌大小的迷你寶箱」" 

# monologue
# JP: ポーレットの笑顔が熱を与えてくれる。\nイメージがどんどんふくらんでいく。
2487 = "波萊特的笑容給了我動力。我的思路也越來越顯得清晰、完善。" 

# 【双鉄】
# display as 雙鐵
# JP: 「持ち帰りを、普段づかいもできるような箱とすれば、\n御一夜の木工・竹工の生きた宣伝にもなるはずです」
1696 = "「將小寶箱做成平時也能使用的樣式，應該還能宣傳御一夜的木工藝和竹工藝」" 

# 【ポーレット】
# display as 波萊特
# JP: 「定期、継続のお仕事の依頼になりますし――\n評判次第で、新しい特産品になっていくかもしれません」
1978 = "「這樣就能給工匠們定期提供訂單——根據客人的評價，說不定還會變成御一夜新的特產」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「なるほど――面白か案ですなぁ」
1574 = "「原來如此——很有趣的點子咧」" 

# monologue
# JP: 吟味するようにゆっくりと、\n蓑笠老人は頷いてくれる。
2566 = "蓑笠爺爺細細考慮了一下，然後點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「お客の負担となりますから、コストは抑える必要が出る。\nが、その中でも、良い質のものを作っていただけるなら」
2024 = "「需要儘量壓低成本減少遊客的負擔。但還是要儘量做到質量上乘」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「そここそ、腕のみせどころいうもんでしょう。\nそぎゃん話なら、燃える職人ばいるかとも思いますな」
1977 = "「這就要看我們工匠的手藝咧。這樣的條件，應該能激起一些工匠的鬥志咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、\nそうした職人さんへのご紹介を願えませんでしょうか？」
2012 = "「那，您能幫我們介紹合適的工匠嗎？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「良かです。良かですが――紹介なら、\n凪に任せた方がまぁまぁ、良か結果になりますでしょう」
1889 = "「當然好咧——不過，介紹的差事還是交給凪，能夠起到更好的效果吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのですか？」
1805 = "「是嗎？」" 

# monologue
# JP: 皺が寄り、苦笑の形に結ばれる。
2567 = "蓑笠爺爺苦笑道。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「……職人同士が顔あわせりゃあ、\nややこしかもん、いろいろ生まれますけんねぇ」
1268 = "「……我們工匠一碰面，麻煩事可多著咧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あぁ」
# 1610 = "「啊——」" 

# monologue
# JP: 心あたるところがあるのか、\nポーレットの声にはやけに生々しい実感がある。
2554 = "聽波萊特的語氣，她似乎深有同感。" 

# monologue
# JP: ああ、いや、そうか――それこそ、まさに生々しい、\nプライドや対抗心などが、職人同士だと発生するのか。
2309 = "啊，原來是這樣——工匠之間碰面也會燃起對抗精神嗎。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「わが孫ながら、凪には裏表いうもんが無かですけんね。\nまずまず、飾らん話ばできるんじゃなかとかと」
1953 = "「誰叫我孫女是個直脾氣咧。由她出面，想必大家說起話來也更加痛快」" 

# monologue
# JP: その声に、\nポーレットの顔も嬉しげになる。
2491 = "波萊特聽到這話，也喜笑顏開。" 

# 【ポーレット】
# display as 波萊特
# JP: 「凪ちゃん、やっぱり職人さんたちの間でも、\n人気者だったりするんでしょうか？」
1699 = "「小凪在工匠們跟前也是小紅人嗎？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「いやいや、どこにでも顔ば出して口も出すんで、\n邪魔にされとるだけですけんねぇ」
1861 = "「沒有的事，她去哪都要指手畫腳，只會妨礙別人做事咧」" 

# monologue
# JP: 口とは裏腹、\n蓑笠老人はもう溶けそうな笑顔になってる。
2623 = "雖然嘴上這麼說，蓑笠爺爺卻是滿面的笑容。" 

# monologue
# JP: 孫がかわいくて仕方がない、\nそんな気持ちが、顔から声からあふれだしている。
2241 = "他的語氣和表情之中，充滿了對孫女的寵愛。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「まぁしかし、アレの前で\n無理ばいう職人は、まずおらんでしょう」
1527 = "「不過嘛，在她面前沒有哪個工匠會忍心說不吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。ご配慮、ありがとうございます」
1579 = "「原來是這樣啊。多謝您為我們考慮得這麼周到」" 

# monologue
# JP: ならばまず、凪に計画を説明し、賛同をもらった後に、\n職人さんたちに話をもっていくべきだろう。
2619 = "那麼，我們先要跟凪說清楚計劃，徵得同意後帶她去找各位工匠商量。" 

# monologue
# JP: そうすればおそらく、\n凪の存在は、より大きな側面支援となってくれる。
2606 = "這樣，凪一定能為我們提供有力的支援。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それで……その凪なのですが」
1986 = "「那……凪現在在哪呢」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「ああ、そういえば遅かとですなぁ」
1662 = "「嗯，這麼一說她怎麼還沒回來咧」" 

# monologue
# JP: 蓑笠老人の目が、壁の時計へ向けられる。
2565 = "蓑笠爺爺看向牆上掛著的表。" 

# 【蓑笠】
# display as 蓑笠
# JP: 「早瀬さんとこの手伝いば終わって……\n寄り道と買い食いばしても、もう戻っとる時間とですが」
1705 = "「就算在早瀨那邊幫完忙……回來再到處閒逛買點東西吃，也該到了咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「電話、ふかみにしてみましょうか？」
1949 = "「要跟深美打個電話確認嗎？」" 

# 【蓑笠】
# display as 蓑笠
# JP: 「はい――あ！　ああ、いや、それには及ばんとです」
1674 = "「好的——啊！哎呀，說曹操曹操到咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっ」
1605 = "「哦！」" 

# monologue
# JP: 僕にも聞こえる。近づいてくる。\n勢いの良い足音が。
2386 = "我也聽到了一陣氣勢洶湧的腳步聲。" 

# monologue
# JP: というか――これは――走ってる。
2604 = "這是——有人在跑向這裡。" 

# 【凪】
# display as 凪
# JP: 「じいちゃんじいちゃん、大変ばいっ！\nあ、にーさんも来とったと！　丁度よかばいっ！！」
1874 = "「爺爺爺爺不好了！啊，大哥哥也在！正好咧！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「何事だっ！？」
1716 = "「怎麼了！？」" 

# monologue
# JP: 全身、汗にまみれている。\n顔が真っ赤で、息が荒い。
2332 = "她大汗淋漓，臉蛋通紅，呼吸急促。" 

# monologue
# JP: いくら凪でも帰宅のためだけに、\nここまで必死には走るまい。
2364 = "就算凪再怎麼活潑好動，也不會這麼拼著命跑回家。" 

# 【凪】
# display as 凪
# JP: 「猫、おぼれとったばい！　\nそれで、ふかみちゃん！　助けに川に飛び込んで」
1847 = "「有貓掉進河裡咧！然後小深跳進水裡去救它了！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ええっ！？」
1604 = "「哎！？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「現場はどこだっ！　警察はっ」
1665 = "「在哪！報警了嗎」" 

# 【凪】
# display as 凪
# JP: 「ああ、違うばい！　溺れとらんばい！　\nふかみちゃん、カッパのごたる泳ぎよるけんっ！！」
1621 = "「啊啊，不是這個意思！沒有溺水咧！小深在水裡可跟河童一樣靈活咧！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……よかった」
1615 = "「啊……太好了」" 

# monologue
# JP: ほっと、ポーレットが息を吐く。
2495 = "波萊特鬆了一口氣。" 

# monologue
# JP: が、安心はまだ出来ない。\nそれだけならば、凪とてここまでは走るまい。
2218 = "不過還不能放心太早。否則凪也不會這麼急忙趕回來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、何が大変なのだ？」
2001 = "「那到底發生了什麼事？」" 

# 【凪】
# display as 凪
# JP: 「あ！　そればい！　そのまま川下りば再開して、\n終わったら、ふかみちゃんぶるぶる震え始めたばい」
1624 = "「啊！是這樣！然後咱們接著漂流，上岸後小深開始渾身發抖咧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「風邪をひいたか？」
1721 = "「感冒了？」" 

# 【凪】
# display as 凪
# JP: 「と思うばい。\n測ったら、熱、三十八度六分あったとよ」
1551 = "「似乎是咧。量了體溫有３８.６度呢」" 

# 【ポーレット】
# display as 波萊特
# JP: 「お医者様は？」
1898 = "「看醫生了嗎？」" 

# 【凪】
# display as 凪
# JP: 「来てくれたばい。みどりおばちゃんの主治医さんだけん、\nそっちは、全然安心ばい。三日もすれば治るばい」
1897 = "「看咧。是翠阿姨的主治醫生給看的，這個不用擔心。醫生說只要過三天就會好咧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ……よかった」
# 1615 = "「啊……太好了」" 

# monologue
# JP: いやいやいやいや、まだ良くない。\nもう一度、同じ問いかけをくりかえす。
2207 = "不不不，還不能放心吧。我再次追問道。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、何が大変なのだ？」
# 2001 = "「那到底發生了什麼事？」" 

# 【凪】
# display as 凪
# JP: 「そうだったばい！　予約客ばい！　団体さんばいっ！\nあしたの夕方の四時からばい！」
1840 = "「是這樣的咧！明天下午四點有預約的客人要來咧！是旅遊團咧！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えっ」
1601 = "「哎」" 

# monologue
# JP: ぎくりと、ポーレットの動きが止まる。\nこの時期の、団体の、予約客。
2483 = "波萊特大吃一驚。沒想到在這種時候會有旅遊團來預約。" 

# monologue
# JP: もしキャンセルなどという事態となれば、\nただでさえ弱り目の観光への大打撃とさえなりかねない。
2580 = "要是取消掉的話，會給原本就岌岌可危的旅遊評價雪上加霜。" 

# 【凪】
# display as 凪
# JP: 「でも、にーさんが居て助かったばい。\nさっそく、仕事代わってもらう券、使うばい！」
1529 = "「不過還好有大哥哥在。咱現在就要讓大哥哥頂替小深做事！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1658 = "「嗯！」" 

# monologue
# JP: それしかない。
2223 = "也只有這個辦法了。" 

# monologue
# JP: というか、時間があまりに少ない。\n今すぐにでも動き出さねば。
2219 = "不過，時間並不充裕。我們必須馬上行動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「凪。食事と休憩を取ってくれ。\nもし可能なら、それで疲労を抜き次第」
1559 = "「凪。你先去吃飯休息。如果可以，等你休息完立即動身」" 

# 【凪】
# display as 凪
# JP: 「さすがにーさん、良か覚悟ばい」
1519 = "「不愧是大哥哥，這就做好心理準備了」" 

# monologue
# JP: 凪は笑って、\nパン、と乾いた音を立て、左右の拳を打ち合わせる。
2275 = "凪笑著撞拳，發出了啪的聲音。" 

# 【凪】
# display as 凪
# JP: 「腹ごしらえして、特訓ばいっ！！」
1593 = "「吃飽飯就開始特訓咧！！」" 
