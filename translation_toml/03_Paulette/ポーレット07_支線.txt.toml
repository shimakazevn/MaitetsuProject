# monologue
# JP: その能力をいまさらながらに思い知らされ、\nだから、不安も同時に感じる。
2382 = "我不禁再次佩服起了她的能力，但同時也感到不安。" 

# monologue
# JP: （やはり、負荷が大きすぎるんだ。\n多分、その影響もあって、あの――）
2658 = "（她承受的壓力太大了。大概也是因為肩負重任，才導致——）" 

# monologue
# JP: 不意の硬直。\n自信の全てを失くしたような、うつろな表情。
2330 = "她偶爾會僵在原地，露出毫無自信的空虛表情。" 

# monologue
# JP: あれも放置はしておけないと、\n改めて強く意識する。
2383 = "我也再次意識到，不能讓她再那樣繼續下去。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それで、\n使わなくなった\x%l客車;#00ffc040;客車%l;#;譲ってもらえそうなんです」
1545 = "「他們似乎有意將閒置的\\x%l客車;#00ffc040;客運車廂%l;#;轉讓給我們」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
1837 = "「是這樣嗎」" 

# monologue
# JP: 今すぐ、何ができるでもない。\nけれど、何かを返したい。
2625 = "雖然我現在還不能為她做些什麼，可至少我想表達自己的謝意。" 

