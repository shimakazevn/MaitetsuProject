# JP: 「“\x%lカ15;#00ffc040;カ15%l;#;”“形式カ10”って書いてあります、\nこの会社――鉱山鉄道の、１０型の６番めの\x%l貨車;#00ffc040;貨車%l;#;」
1514 = "「上面寫著“\\x%lカ15;#00ffc040;Ｋａ１５%l;#;”“代號Ｋａ１０”，也就是說它是這家公司——礦山鐵路擁有的第六輛Ｋａ１０型\\x%l貨車;#00ffc040;貨運車廂%l;#;」" 

# 【双鉄】
