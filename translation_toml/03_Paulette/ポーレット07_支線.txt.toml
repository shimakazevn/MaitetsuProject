2005 = "「那就由我們來接過接力棒。以另一種形式來復活這節車廂」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1658 = "「嗯！」" 

# monologue
# JP: 同じなんだと、不意に感じる。\n終着駅に、路子はいまだ辿りつけない。
2415 = "我突然覺得，我們和路子是一樣的。路子至今仍未抵達旅途的終點。" 

# monologue
