# 【ポーレット】
# display as 波萊特
# JP: 「あ、ごめんなさい。\x%l緩急車;#00ffc040;緩急車%l;#;っていうのは、\n\x%l車掌;#00ffc040;車掌%l;#;さんが乗る、\x%lブレーキ;#00ffc040;ブレーキ%l;#;がついてる車輌です」
1643 = "「啊，都怪我沒注意到。\\x%l緩急車;#00ffc040;守車%l;#;就是\\x%l車掌;#00ffc040;列車長%l;#;乘坐的裝有\\x%lブレーキ;#00ffc040;剎車%l;#;的車輛」" 

# 【双鉄】
# display as 雙鐵
