1737 = "「我覺得這樣比較有採礦的氣氛嘛。像\\x%l炭水車;#00ffc040;煤水車%l;#;一樣把煤炭堆滿平車式\\x%l貨車;#00ffc040;貨運車廂%l;#;」" 

# 【双鉄】
# display as 雙鐵
