1256 = "「\\x%l車掌;#00ffc040;列車長%l;#;？由他來操作\\x%lブレーキ;#00ffc040;剎車%l;#;嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。\nええと、\x%l貨車;#00ffc040;貨車%l;#;って何十両もの\x%l編成;#00ffc040;編成%l;#;になるじゃないですか」
1814 = "「是的。我想想……\\x%l貨車;#00ffc040;貨運車廂%l;#;不是通常由幾十節車廂\\x%l編成;#00ffc040;編組%l;#;在一起嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか、なるほどな」
1836 = "「是這樣啊」" 

