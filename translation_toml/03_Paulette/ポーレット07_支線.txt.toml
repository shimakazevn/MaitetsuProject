# JP: 「あのっ――双鉄くんは、どうですか？\nなりたいですか？　お父さん――とか」
1996 = "「那個——雙鐵君是怎麼想的？你想當爸爸……嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは――」
1974 = "「這個——」" 

# monologue
# JP: 答えに、詰まる。
2379 = "我不知該如何回答。" 

# monologue
# JP: なりたいものか、どうなのか、\n今まで一度も、考えたことすらなかったことだ。
2447 = "是想，還是不想——我至今為止從來沒想過這個問題。" 

# 【ポーレット】
# display as 波萊特
# JP: 「相手が誰とかそういうんじゃなく。\nええと、その――、一般論として、どうかなぁって」
1724 = "「我不是特指某個對象啦。就是那個——只是概括來講，想還是不想」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1608 = "「唔」" 

# monologue
# JP: ぞくりと、寒気に近い何かを背筋に感じる。\n切羽詰まったような、ではない。
2414 = "我突然感到背後發涼。波萊特的語調何止算是急迫。" 

# monologue
# JP: ポーレットの声は明らかに切羽詰まって……\nなにかに、追われているような印象だ。
2452 = "根本就是非常急迫……在我聽來，就好像在為什麼事而著急一樣。" 

# monologue
# JP: （いや、これは――）
2653 = "（不，這是——）" 

# monologue
# JP: 同じ、と思う。
2445 = "是一樣的。" 

# monologue
# JP: 稀咲の問いに答えられずに固まった、\nあのときの、青ざめてさえいたポーレットと。
2484 = "波萊特現在的狀態，跟她之前無法回答稀咲的問題時一模一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕は今まで――、一度たりとも、\n父になりたいかどうかなど、考えたこともなかった」
1736 = "「我至今為止，還沒考慮過要不要當爸爸這個問題」" 

# monologue
# JP: だから、ただただ正直に言う。
2422 = "所以，我只是老老實實地回答她。" 

# monologue
# JP: この問いは、この答えは、\nおそらくポーレットには大事なことだと思うから。
2319 = "因為我覺得這個問題對波萊特來說很重要。" 

# 【双鉄】
# display as 雙鐵
# JP: 「事故を、僕は経験して。自分のふたごを――\n半身を亡くしてしまっているから」
1733 = "「我曾經在那場事故中，失去了雙胞胎妹妹——也就是自己的另一半」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1657 = "「嗯」" 

# monologue
# JP: 静かな相槌。\n動揺も同情も感じない、ただただ、受け入れられる感触。
2347 = "她簡短地回應道。語氣裡不帶有一絲動搖或同情，只是在接受事實。" 

# monologue
