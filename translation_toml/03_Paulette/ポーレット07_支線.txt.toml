1793 = "「是啊。得先跟小深的爺爺——堰先生他們商量一下才行」" 

# 【双鉄】
# display as 雙鐵
# JP: 「レールを戻せたら、その先は？」
2017 = "「鐵軌恢復之後呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「キハ[レイナナ,1]07でこの\x%l緩急車;#00ffc040;緩急車%l;#;や、他の\x%l貨車;#00ffc040;貨車%l;#;たちも引いてきて、\nまずはこの子に、\x%l架台;#00ffc040;架台%l;#;をつけることになると思います」
1729 = "「我想……先用Ｋｉｈａ０７把這節\\x%l緩急車;#00ffc040;守車%l;#;還有其他的\\x%l貨車;#00ffc040;貨運車廂%l;#;一起拉過來，然後先給它裝上\\x%l架台;#00ffc040;底座%l;#;」" 

# 【双鉄】
