2008 = "「那邊好像也有\\x%l貨車;#00ffc040;貨運車廂%l;#;的樣子。玲奈去那邊看看」" 

# 【ポーレット】
# display as 波萊特
# JP: 「気をつけてね！」
1703 = "「小心點啊！」" 

# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
# 1676 = "「好的」" 

# monologue
# JP: れいなを見送り、\nポーレットは今度は自分で、\x%l緩急車;#00ffc040;緩急車%l;#;の様子をチェックする。
