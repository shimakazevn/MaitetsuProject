# 【れいな】
# display as 玲奈
# JP: 「この子、\x%l台車;#00ffc040;台車%l;#;も\x%l台枠;#00ffc040;台枠%l;#;も、多分ほとんど劣化ないです！」
1979 = "「這節車廂的\\x%l台車;#00ffc040;轉向架%l;#;和\\x%l台枠;#00ffc040;車架%l;#;幾乎都沒有老化！」" 

# 【ポーレット】
# display as 波萊特
