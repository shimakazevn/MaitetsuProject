# 【双鉄】
# display as 雙鐵
# JP: 「うむ。しかしそうなると――\n\x%l架台;#00ffc040;架台%l;#;と宝箱とも、いい加減な作りには出来んな」
1651 = "「嗯。不過這樣一來，\\x%l架台;#00ffc040;底座%l;#;和寶箱的質量就都不能隨便糊弄了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね……\x%l8620;#00ffc040;8620%l;#;修復のときに知り合った技師さん達に、\n設計面のことは相談しなくちゃならなくなりますね」
1784 = "「是啊……設計方面得去找修復\\x%l8620;#00ffc040;８６２０%l;#;的時候認識的技師們商量一下才行」" 

# 【双鉄】
# display as 雙鐵
