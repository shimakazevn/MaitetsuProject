# monologue
# JP: その口元が、れいなの言葉は正しいのだと示すみたいに、\nじわり、じわりと緩みを増してく。
2338 = "她的嘴角就像證實了玲奈所說一樣慢慢上揚。" 

# 【ポーレット】
# display as 波萊特
# JP: 「夢みたい……\nどう考えても十年以上は放置されてるはずなのに」
1906 = "「簡直像在做夢……怎麼都看不出來是廢棄了十年以上的車廂」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――発電所を見た時も思ったのだが」
1668 = "「在找到發電廠的時候，我也有這種感覺」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1657 = "「嗯」" 

# 【双鉄】
# display as 雙鐵
# JP: 「放置、放棄ではなく、\n“一時撤退”のつもりであったのかもしれんな」
1539 = "「人們或許並不是放棄了這裡，而是打算“暫時撤退”吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1610 = "「啊——」" 

# monologue
# JP: ほんのわずかに口を開け、\nゆっくり、ゆっくり、ポーレットが頷く。
2494 = "波萊特驚訝地張開了嘴巴，隨後慢慢點頭同意。" 

# 【ポーレット】
# display as 波萊特
# JP: 「もう一度、鉱山を再開できるって信じて」
1547 = "「他們還堅信著礦山會再度被開發」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。今考えてみれば、坑道自体も同じかもしれん。\n設備のほとんどは、そのまま残されていたような気が」
1797 = "「是啊。現在想想，礦洞裡也是一樣。感覺裡面的設備都被好好原樣保存著」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です、ね。だから、カバーとオイルで保護をして――」
1798 = "「是啊。設備都被遮篷布和防潮油好好保護了起來——」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう考えれば、\nこの状況を説明しやすいような気がする」
1981 = "「這麼想就能說通車輛為什麼會保存得這麼好了」" 

# monologue
# JP: 術仙炭鉱廃駅周辺――
2576 = "術仙煤礦廢車站——" 

# monologue
