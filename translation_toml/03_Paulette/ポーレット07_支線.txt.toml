1249 = "「\\x%l架台;#00ffc040;底座%l;#;就去找蓑笠先生商量一下。寶箱的話……原本御一夜的木工水準就很高」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうか。木地師の神社があるくらいだものな」
1634 = "「啊，對啊。畢竟都有木旋工相關的神社」" 

# monologue
# JP: はい、とポーレットは強く頷く。
2485 = "波萊特用力點了點頭。" 

# 【ポーレット】
# display as 波萊特
