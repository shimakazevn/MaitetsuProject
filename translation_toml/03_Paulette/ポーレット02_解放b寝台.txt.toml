2394 = "Người vuốt ve là tôi cảm thấy dễ chịu đã đành, mà Paulette cũng nheo mắt lại, tỏ vẻ vô cùng say đắm."
# 【双鉄】
# display as 雙鐵
# JP: 「いいものだな。寝台列車は。\n聞いていた話以上だ。実に良い」
2037 = "「Tàu giường nằm thích thật đấy. Tuyệt vời hơn cả những gì anh từng nghe kể. Thực sự rất tuyệt.」"
# 【ポーレット】
# display as 波萊特
