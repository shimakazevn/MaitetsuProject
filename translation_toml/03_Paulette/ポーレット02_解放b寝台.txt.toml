# lines: 432 
# monologue
# JP: 急ぐ。急ぐ。\n駆け込み乗車の愚を犯さぬよう、安全な範囲の大股で。
2416 = "Nhanh lên. Nhanh lên. Để không mắc phải sai lầm lao lên tàu lúc cửa sắp đóng, tôi bước những bước dài trong phạm vi an toàn."
# monologue
# JP: 数分の余裕は残るはずだが、それでもやはり気持ちは焦る。\nこの列車を、仮に乗り逃しでもしたら――
2647 = "Đáng lẽ vẫn còn dư vài phút, nhưng trong lòng tôi vẫn nóng như lửa đốt. Giả sử tôi lỡ mất chuyến tàu này——"
# 【ポーレット】
# display as 波萊特
# JP: 「これならもう大丈夫。まだ二分以上も」
2075 = "「Với cái này thì anh không cần lo nữa. Vẫn còn hơn hai phút nữa cơ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「カメラを出すには早すぎる」
1623 = "「Anh cũng không cần lấy máy ảnh ra sớm thế đâu.」"
# monologue
# JP: 列車を目にし、足を緩めかけたポーレットに、\n先回りして声をかける。
2513 = "Thấy tàu đến, Paulette bước chậm lại, tôi đi nhanh vài bước lên trước mặt và nói với cô ấy."
# 【双鉄】
# display as 雙鐵
# JP: 「記念撮影は到着後にするべきだ。\nまた何かアクシデントがあっては叶わん」
2045 = "「Chụp ảnh kỷ niệm thì đợi đến nơi rồi hẵng hay. Nhỡ lỡ việc thì mất công lắm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ううう～　はぁい」
1782 = "「Ư ư ư, vâng ạ.」"
# monologue
# JP: 渋々とだが、ポーレットは僕に続いてくれる。\nれいなを抱っこした僕と、ひかりを抱っこしたポーレット。
2514 = "Dù có vẻ không tình nguyện, Paulette vẫn đi theo tôi. Tôi bế Reina, còn Paulette bế Hikari."
# monologue
# JP: その順番で、車内へ入り、狭い通路を移動する。
2431 = "Chúng tôi cứ thế lần lượt bước lên xe, đi qua lối đi nhỏ hẹp."
# 【ひかり】
# display as 光
# JP: 「わぁ！！！」
1737 = "「Oa!!!」"
# 【ひかり】
# display as 光
# JP: 「かいほーびーしんだいー！！\nすごーい！　かっこいいのー！！」
2115 = "「Giường nằm mở!!\nTuyệt quá! Ngầu quá đi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おおお」
1817 = "「Ồ.」"
# 【れいな】
# display as 玲奈
# JP: 「ふわぁ、二段ベッドですねぇ」
1740 = "「Oa, là giường tầng này.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふふっ」
1711 = "「Fufufu.」"
# 【ひかり】
# display as 光
# JP: 「ひかり、ベッドねてみたい！　ねてみたい！」
1641 = "「Hikari muốn thử ngủ trên giường! Muốn ngủ thử!」"
# 【ポーレット】
# display as 波萊特
# JP: 「もちろんいいわよ？\nちゃあんとおくつをぬいでから、ね？」
2010 = "「Tất nhiên là được rồi. Nhưng phải cởi giày ra đã, được không?」"
# 【ひかり】
# display as 光
# JP: 「ひかり、ちゃあんとおくつぬぐのっ！」
1642 = "「Hikari sẽ cởi giày cẩn thận!」"
# 【ポーレット】
# display as 波萊特
# JP: 「そ？　じゃ、ひとりでぬげるかなー？」
1943 = "「Thế à? Vậy con có thể tự cởi được không nào?」"
# 【ひかり】
# display as 光
# JP: 「ぬげるのー！」
1643 = "「Được ạ!」"
# monologue
# JP: だっこから下ろされるのももどかしいのか、\nポーレットの腕の中からすり抜けようと身もだえる。
2374 = "Chắc là con bé nóng lòng muốn được thả xuống, nên cứ vặn vẹo trong vòng tay Paulette."
# 【れいな】
# display as 玲奈
# JP: 「れいなもおりますぅ」
1999 = "「Reina cũng xuống đây ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1800 = "「Ừm.」"
# monologue
# JP: れいなは、のんびりお行儀良く。
2536 = "Reina thì ngoan ngoãn chờ tôi đặt xuống."
# monologue
# JP: （がたんっ――）
2677 = "（Xình xịch——）"
# 【双鉄】
# display as 雙鐵
# JP: 「出発か」
1665 = "「Xuất phát rồi.」"
# monologue
# JP: 夜が明るくなりすぎないようになのだろう。\n車窓は通路側、小さなものだ。
2341 = "Chắc là để ban đêm không quá chói sáng. Cửa sổ khá nhỏ và nằm ở phía lối đi."
# monologue
# JP: 流れ始める車窓の景色は、僕を少しだけ感傷的に――
2551 = "Cảnh sắc ngoài cửa sổ bắt đầu trôi lùi lại, khiến tôi cảm thấy có chút bùi ngùi——"
# 【ひかり】
# display as 光
# JP: 「おくつっ、おくつっ、ぬーぎぬーぎ、ぬーぎぬーぎ！」
2034 = "「Cởi giày, cởi giày, cởi giày ra nào, cởi giày ra nào!」"
# monologue
# JP: しかけたところで、ひかりのはしゃいだ声がする。
2408 = "Đúng lúc đó, giọng nói vui sướng của Hikari vang lên."
# 【ポーレット】
# display as 波萊特
# JP: 「ひかり？　他のお客さんがびっくりしちゃうから。\nもう少し、小さな声で――できるかな？」
1658 = "「Hikari? Con sẽ làm những hành khách khác giật mình đấy. Nói nhỏ lại một chút được không con?」"
# 【ひかり】
# display as 光
# JP: 「できるのー。\nおくつっ、おくつっ、ぬーぎぬーぎ、ぬーぎぬーぎ」
1840 = "「Được ạ. Cởi giày, cởi giày, cởi giày ra nào, cởi giày ra nào.」"
# monologue
# JP: 抑えてもなおはしゃいだ声が、\n僕の気持ちまでわくわくさせる。
2385 = "Dù đã cố kìm nén nhưng giọng nói vẫn đầy vẻ thích thú, khiến tâm trạng tôi cũng phấn khích theo."
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。これが寝台客車か――」
1683 = "「Ra là vậy. Đây chính là toa giường nằm sao——」"
# monologue
# JP: ベッドはおそらく、僕にはいささか窮屈だろう。\nだが、それさえも旅の楽しみとなってきそうだ。
2404 = "Với tôi, cái giường này có lẽ hơi chật chội một chút. Nhưng ngay cả điều đó cũng có vẻ sẽ trở thành một niềm vui của chuyến đi."
# monologue
# JP: みっちりとした、あまりにも素晴らしすぎる秘密基地感。\nここを家族で独占できる――うむ？
2402 = "Cảm giác kín đáo, giống như một căn cứ bí mật tuyệt vời. Cả gia đình có thể độc chiếm nơi này—— hửm?」"
# 【双鉄】
# display as 雙鐵
# JP: 「寝台券の方はどうなっているのだ？\n僕とポーレットとれいなの分は当然だろうが――」
2036 = "「Vé giường nằm thế nào rồi em? Vé của anh, em và Reina thì chắc chắn là có rồi, nhưng——」"
# 【ポーレット】
# display as 波萊特
# JP: 「ひかりはわたしといっしょに寝れば、\n寝台券の必要はないんですけど――」
1648 = "「Hikari ngủ cùng em thì không cần mua vé giường nằm đâu, nhưng mà——」"
# 【ひかり】
# display as 光
# JP: 「やだ！　やぁだ！　ひかり、ひとりでねる！！\nひかりのしんだいでねるのぉ！！」
1598 = "「Không chịu! Không chịu đâu! Hikari muốn tự ngủ cơ!! Hikari muốn ngủ trên giường của mình cơ!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「って、絶対にいうって思いましたし……\n家族だけで、寝台四つ独占したいのもありましたから」
1884 = "「Đó, em biết ngay là con bé sẽ nói vậy mà... Với lại em cũng muốn gia đình mình độc chiếm cả bốn giường nữa.」"
# monologue
# JP: 言いつつ、ポーレットがきっぷケースをそそくさ取り出す。\nキハ07sを模したかわいらしいもの。
2524 = "Vừa nói, Paulette vừa vội vàng lấy vé ra từ ví đựng vé. Một chiếc ví nhỏ xinh mô phỏng hình dáng KiHa 07S."
# monologue
# JP: その中には、四枚の乗車券とあわせて――
2587 = "Bên trong có bốn vé lên tàu, cùng với——"
# 【双鉄】
# display as 雙鐵
# JP: 「おお。寝台券も四枚とってくれていたのか。\n素晴らしい判断だ。ありがとう」
1820 = "「Ồ. Em mua cả bốn vé giường nằm luôn à. Quyết định tuyệt vời đấy. Cảm ơn em.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、どういたしまして！　\nだからどこでも、好きなベッドをとっちゃってください」
1724 = "「Fufufu, không có chi! Nên mọi người cứ chọn giường nào mình thích đi nhé.」"
# 【ひかり】
# display as 光
# JP: 「ひかり！　うえ！！　ひかりうえがいいの！！」
1652 = "「Hikari! Ở trên!! Hikari thích ở trên cơ!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
1764 = "「Á!」"
# monologue
# JP: 大興奮だ。\n靴を脱ぐのも忘れて全力ではしごへと――
2393 = "Con bé phấn khích tột độ. Quên cả cởi giày mà lao thẳng đến chiếc thang——"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2028 = "「Khoan đã.」"
# 【ひかり】
# display as 光
# JP: 「きゃあ！」
# 1764 = "「啊！」" 
# monologue
# JP: よじのぼろうとした瞬間に、残念、僕につかまえられる。
2489 = "Đáng tiếc, ngay khoảnh khắc con bé định leo lên thì đã bị tôi tóm lại."
# 【ひかり】
# display as 光
# JP: 「やぁあ～、はなしてぇ～」
1601 = "「Không chịu~, thả con ra~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ひとりではしごはまだ危ない。\nというか、ひとりで上段も危なかろう」
1633 = "「Tự con leo thang vẫn còn nguy hiểm lắm. Mà việc con ngủ một mình ở giường trên cũng nguy hiểm không kém.」"
# 【ひかり】
# display as 光
# JP: 「あぶなくないのー！\nひかり、ひとりでねれるもん！！」
1591 = "「Không nguy hiểm đâu! Hikari tự ngủ một mình được mà!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうはいうが、まだ――ああ、いや」
2049 = "「Tuy con nói vậy, nhưng vẫn—— à, không.」"
# monologue
# JP: 僕まで過保護になってどうする。\nひかりがせっかく、自立心を発揮しようとしているのだ。
2339 = "Đến cả mình cũng bao bọc con quá mức thì làm sao được. Hikari đang khó khăn lắm mới bộc lộ tính tự lập mà."
# 【双鉄】
# display as 雙鐵
# JP: 「れいな、上段に先にあがってもらえるか？」
2002 = "「Reina, em leo lên giường trên trước được không?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。\nもーちょっとだけ、お靴をぬぐの待っててくださぁい」
1785 = "「Vâng ạ.\nĐợi Reina cởi giày một chút xíu nữa nha.」"
# 【ひかり】
# display as 光
# JP: 「あ、そうだったの。\nひかりもおくつぬぐの」
1774 = "「A, đúng rồi nhỉ.\nHikari cũng phải cởi giày.」"
# 【れいな】
# display as 玲奈
# JP: 「それじゃあ、いっしょにぬぎましょうねぇ」
2098 = "「Vậy thì chúng ta cùng cởi nha.」"
# monologue
# JP: れいなは僕からひかりを受け取り、\n下段ベッドに座らせる。
2539 = "Reina đón lấy Hikari từ tay tôi và cho con bé ngồi xuống giường dưới."
# 【ひかり】
# display as 光
# JP: 「んしょ――よいしょっ――んんん――んむぅ」
1814 = "「Hây dô—— hây dô—— ưm—— ưm.」"
# monologue
# JP: 雪の列車の旅になるゆえ、今日のひかりは長靴だ。\n慣れないせいか、なかなかぬぐのに手間取っている。
2624 = "Vì là chuyến đi trên tàu hỏa vùng tuyết nên hôm nay Hikari đi ủng cao su. Chắc do chưa quen nên con bé cởi mãi không ra."
# monologue
# JP: どれ、僕が――
2590 = "Để xem, hay là mình——"
# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「あのね、ひかり」\n「はきくちを大きくひらいて、よいしょっと！」
1628 = "「Này, Hikari.」 「Mở rộng miệng ủng ra, rồi hây dô một cái!」"
# 【ひかり】
# display as 光
# JP: 「あ！\n――ん――よいしょっ！」
1762 = "「A!\n——ưm—— hây dô!」"
# monologue
# JP: （おお――）
2685 = "（Ồ——）"
# monologue
# JP: れいなが、さりげなく示してくれた。\nひかりに対して――同時に、僕とポーレットにも。
2543 = "Reina làm mẫu một cách rất tự nhiên. Cho Hikari—— và đồng thời cho cả tôi và Paulette thấy."
# monologue
# JP: 過保護はだめと、頭では解っているのだが……。\nポーレットを見れば目と目があう。同時に、苦笑。
2561 = "Tuy trong đầu hiểu rõ là không được bao bọc quá mức, nhưng mà... Tôi nhìn Paulette, hai ánh mắt chạm nhau. Cùng lúc nở nụ cười gượng."
# 【双鉄】
# display as 雙鐵
# JP: 「……れいなも、すっかりお姉さんだな」
1237 = "「……Reina cũng ra dáng người chị lắm rồi đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。頼もしいくらい」
1936 = "「Vâng. Thật đáng tin cậy.」"
# 【れいな】
# display as 玲奈
# JP: 「えっへへ～。\nそれじゃあれいな、先に上にあがりますねぇ」
1816 = "「Ehehe~.\nVậy thì Reina lên trên trước nha.」"
# monologue
# JP: れいながはしごを登っていくと、\nひかりもすぐに後を追おうとし、僕に捕まる。
2541 = "Khi Reina leo lên thang, Hikari cũng định bám theo ngay lập tức, nhưng bị tôi tóm lại."
# 【ひかり】
# display as 光
# JP: 「やぁん」
1597 = "「Ứ ừ.」"
# monologue
# JP: このままれいなに渡すのが、一番安全は安全だ。\nが――れいなが手本を示してくれたこともある。
2550 = "Cứ thế này mà bế con bé đưa cho Reina là an toàn nhất. Nhưng—— Reina cũng đã làm mẫu cho con bé xem rồi."
# monologue
# JP: ここは、ひかりに選択させよう。
2639 = "Lúc này, hãy để Hikari tự chọn."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかりが上段ベッドにあがるためには、\nふたつの方法がある」
1656 = "「Để lên được giường trên thì có hai cách.」"
# 【ひかり】
# display as 光
# JP: 「はしご、のぼるのぉ」
1650 = "「Leo thang ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それが、一つ目の方法だ。その方法をとるためには、\n『おとうさん教習』を受けねばならぬ」
2077 = "「Đó là cách thứ nhất. Để dùng cách đó, con phải tham gia 『Khóa huấn luyện của ba』.」"
# 【ひかり】
# display as 光
# JP: 「おとうさんきょうしゅうなのー？」
1988 = "「Khóa huấn luyện của ba ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。安全が第一の使命だからな。そこは省けん。\nが、もう一つの方法であれば、教習不要だ」
1793 = "「Ừ. Vì an toàn là sứ mệnh hàng đầu mà. Không thể bỏ qua bước đó được. Nhưng nếu chọn cách còn lại thì không cần huấn luyện đâu.」"
# 【ひかり】
# display as 光
# JP: 「もーひとつ、なに？」
1698 = "「Cách còn lại là gì thế ạ?」"
# monologue
# JP: ひかりが戸惑った顔になる。\n上段へと登る方法が、はしごの他に思いつかんのだろう。
2311 = "Hikari lộ vẻ mặt bối rối. Chắc con bé không nghĩ ra cách nào khác để lên giường trên ngoài việc leo thang."
# 【双鉄】
# display as 雙鐵
# JP: 「もう一つの方法とは――\n『おとうさんエレベーター』だ」
1697 = "「Cách còn lại là——\n『Thang máy của ba』.」"
# 【ひかり】
# display as 光
# JP: 「おとーさんえれべーた！」
1990 = "「Thang máy của ba!」"
# monologue
# JP: 笑顔が輝く。\nこれなら誘導できそうだ。
2389 = "Nụ cười tỏa nắng rạng rỡ. Thế này thì chắc là dụ dỗ được rồi."
# monologue
# JP: 思った瞬間、上段から、\nれいなも文字通り手を差し伸べてきてくれる。
2487 = "Ngay khoảnh khắc tôi vừa nghĩ thế, từ giường trên, Reina cũng chìa tay xuống theo đúng nghĩa đen."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。\nここが、おとうさんエレベーターの、二階ですよぉ」
1722 = "「Fufufu.\nĐây là tầng hai của thang máy của ba nha.」"
# 【ひかり】
# display as 光
# JP: 「にかーい！」
1611 = "「Tầng hai!」"
# 【ポーレット】
# display as 波萊特
# JP: 「ね、ひかり？　どっちがいい？\nおとうさんエレベーターと、おとうさん教習」
1653 = "「Này, Hikari? Con thích cách nào hơn? Thang máy của ba hay là Khóa huấn luyện của ba?」"
# monologue
# JP: すぐさまポーレットも乗ってくる。\n『はしご』ではなく、あえて『教習』のことばを使い。
2521 = "Paulette cũng lập tức hùa theo. Cô ấy cố tình dùng từ 『Khóa huấn luyện』 thay vì 『Thang』."
# monologue
# JP: ……僕と同じく、ひかりの自主性を大事にしたいが、\nやはりはしごは、まだ早すぎるように思えるのだろう。
1199 = "……Giống như tôi, cô ấy cũng muốn tôn trọng tính tự chủ của Hikari, nhưng có lẽ vẫn thấy leo thang là quá sớm với con bé."
# 【ひかり】
# display as 光
# JP: 「ひかり……ひかり、ねぇ。\nうーんと……うーんとぉ」
1636 = "「Hikari…… Hikari chọn.\nƯm…… ưm.」"
# monologue
# JP: しかし、それでもひかりは悩む。
2292 = "Dù vậy, Hikari vẫn đắn đo suy nghĩ."
# monologue
# JP: はしごを見、僕を見ポーレットを見、れいなを見。\nその目を文字通りにぐるぐるさせて――
2387 = "Nhìn thang, nhìn tôi, nhìn Paulette, rồi lại nhìn Reina. Đôi mắt con bé xoay mòng mòng theo đúng nghĩa đen——"
# 【ひかり】
# display as 光
# JP: 「あ！　あのね、おとうさんエレベータ、くだり！\nそれで、のぼりははしごにするの！」
1768 = "「A! Dạ thưa, lúc đi xuống, con chọn thang máy của ba! Còn lúc đi lên, con chọn leo thang!」"
# 【れいな】
# display as 玲奈
# JP: 「わ！　あたまいいですぅ」
1736 = "「Oa! Thông minh quá nha.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん！？　それって、それって、ありですか！？」
2123 = "「Anh Soutetsu!? Thế, thế cũng được ạ!?」"
# monologue
# JP: 止めて欲しいと、焦った声から伝わってくる。\nまさに母親。まさしく過保護。
2381 = "Giọng điệu cuống quýt của cô ấy như muốn nói \"Anh cản con bé lại đi\". Đúng là một người mẹ. Bao bọc quá mức chính hiệu."
# monologue
# JP: 気持ちはわかる。\n大いにわかる、が――
2384 = "Tôi hiểu cảm giác đó.\nRất hiểu là đằng khác, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「ありだ」
1701 = "「Được.」"
# 【ひかり】
# display as 光
# JP: 「やったぁ！」
1835 = "「Yeah!」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぅう」
1781 = "「Hả.」"
# monologue
# JP: ――上りがあって下りがないエレベーターなどあり得ない。\n父親として、ここは公正にいかねばならない。
1177 = "——Làm gì có cái thang máy nào chỉ đi lên mà không đi xuống. Là một người cha, tôi phải công bằng trong chuyện này."
# monologue
# JP: 公正に、そして同時に、安全に。
2592 = "Công bằng, và đồng thời cũng phải an toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「その分、お父さん教習をしっかりやるぞ？\nついてこられなければ、はしごは無しだ」
2101 = "「Bù lại, con phải tham gia Khóa huấn luyện của ba đàng hoàng đấy nhé? Nếu không theo kịp thì không có leo thang gì đâu.」"
# 【ひかり】
# display as 光
# JP: 「うん。ひかり、しっかりやるのー」
1788 = "「Vâng ạ. Hikari sẽ làm thật đàng hoàng~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ならばひかり。まず手と足を数えよう。\nひかりの手と足は、全部で何本ある？」
2093 = "「Vậy thì Hikari. Trước tiên đếm tay và chân nào. Hikari có tất cả mấy tay và mấy chân?」"
# 【ひかり】
# display as 光
# JP: 「んにゅ？　んと……てが、いち、にぃで、\nあしにいって、さん、よん。――よんほん！！」
1813 = "「Hửm? Ưm…… tay có một, hai, rồi đến chân là ba, bốn. ——Bốn cái!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうだな。四本だ。\nはしごにはまず、この四本全部でしっかりつかまる」
1964 = "「Đúng rồi. Bốn cái. Khi leo thang, đầu tiên con phải bám thật chặt bằng cả bốn cái này.」"
# 【ひかり】
# display as 光
# JP: 「つかまるー」
1901 = "「Bám chặt~」"
# monologue
# JP: ひかりをだっこし、はしごに乗せて捕まらせる。
2440 = "Tôi bế Hikari lên, đặt con bé vào thang và cho con bé bám vào."
# monologue
# JP: 指導するのは三点支持。\n安全移動の基本姿勢だ。
2546 = "Điều tôi đang hướng dẫn là quy tắc ba điểm bám. Tư thế cơ bản để di chuyển an toàn."
# 【双鉄】
# display as 雙鐵
# JP: 「そうしたら、四本のうちの三本は決して動かさない。\n動かすのは、残りの一本だけだ」
2004 = "「Sau đó, ba trong số bốn cái tuyệt đối không được nhúc nhích. Chỉ được cử động cái còn lại thôi.」"
# 【ひかり】
# display as 光
# JP: 「いっぽんだけ。んにゅー……どぉれ？」
1700 = "「Chỉ một cái thôi. Ưm…… cái nào ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「一番動かしやすいのでいいぞ？」
1903 = "「Cái nào con thấy dễ cử động nhất cũng được nhé?」"
# 【ひかり】
# display as 光
# JP: 「ならね、ええとねー――みぎてなのー」
2084 = "「Thế thì, để xem nào—— tay phải ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「では、他の三本は絶対動かさないようにしたまま、\n右手だけを、ひとつ上の横棒にかけ、しっかり握る」
2104 = "「Vậy thì, trong khi giữ nguyên ba cái kia, con đưa tay phải lên nắm lấy thanh ngang phía trên và bám thật chặt.」"
# 【ひかり】
# display as 光
# JP: 「よいしょ――んと。しっかり、ぎゅー！！」
1900 = "「Hây dô—— ưm. Bám thật chặt!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「これでまた四本が動かなくなった。\nそうしたらまた、三本は動かさず、一本だけを動かす」
2005 = "「Thế là cả bốn cái lại không nhúc nhích rồi. Tiếp theo, con lại giữ nguyên ba cái và chỉ cử động một cái thôi.」"
# 【ひかり】
# display as 光
# JP: 「ならなら、こんどはひだりてなの～！」
2100 = "「Thế thì thế thì, lần này là tay trái~!」"
# monologue
# JP: 四点支持。一点を動かし。また四点支持。\n右手、左手、右足。左足。
2357 = "Bốn điểm bám. Cử động một điểm. Lại bốn điểm bám. Tay phải, tay trái, chân phải. Chân trái."
# 【ポーレット】
# display as 波萊特
# JP: 「そうしたら、次は？」
1904 = "「Xong rồi, tiếp theo là gì nào?」"
# 【ひかり】
# display as 光
# JP: 「ええと、ええと――またみぎてなの～！」
1982 = "「Để xem, để xem—— lại là tay phải~!」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん！」
1803 = "「Đúng rồi!」"
# monologue
# JP: ポーレットも喚呼を誘導し、\nゆっくりゆっくり、ひかりははしごを登っていく。
2301 = "Paulette cũng hướng dẫn con bé \\x%l喚呼;#00ffc040;hô xác nhận%l;#;, Hikari chầm chậm, chầm chậm leo lên thang."
# monologue
# JP: （こんなに小さく細い手足で……見事なものだ）
2683 = "（Tay chân nhỏ xíu, gầy gò thế kia mà…… giỏi thật đấy.）"
# monologue
# JP: エレベーターを選ぶと予想をしていたし、\n登り切れずにあきらめるかとも考えていた。
2428 = "Tôi cứ đinh ninh con bé sẽ chọn thang máy, hoặc là leo không nổi rồi bỏ cuộc."
# monologue
# JP: だが、どうだ――
2289 = "Nhưng, xem kìa——"
# 【ひかり】
# display as 光
# JP: 「ぱぁぱ、もうおててのうえ、はしご、なくなったのー」
1991 = "「Ba ơi, phía trên tay con hết thang rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしたら体からベッドにごろんだ。\nれいな、つかまえてやってくれ」
2095 = "「Thế thì con rướn người bò lên giường đi. Reina, đỡ con bé giúp anh với.」"
# 【れいな】
# display as 玲奈
# JP: 「はいですぅ」
1844 = "「Vâng ạ.」"
# 【ひかり】
# display as 光
# JP: 「そしたらそしたらー。べっどにごろーん！！」
2096 = "「Thế thì thế thì. Bò lên giường!!」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、ひかりちゃん、\n上段ベッドへのご乗車ありがとうございまぁす」
1715 = "「Fufufu, bé Hikari, cảm ơn em đã lên chuyến xe giường tầng trên nha.」"
# 【ひかり】
# display as 光
# JP: 「ふわ？　わ！　わ！！　すごおい！！\nのぼれたー！！！」
1750 = "「Hửm? Oa! Oa!! Tuyệt quá!!\nLeo lên được rồi!!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん！　ひかりすごい！\nおかあさん感動しちゃった！」
1802 = "「Ừm! Hikari giỏi quá!\nMẹ cảm động quá đi!」"
# monologue
# JP: ――ああ、本当に見事なものだ。\nいつのまに、これほど立派に成長したのか。
1179 = "——Chao ôi, thật sự rất đáng khen. Con bé đã trưởng thành đến nhường này từ lúc nào vậy."
# 【車掌】
# display as ？？？
# JP: 「失礼いたします」
1898 = "「Xin lỗi đã làm phiền quý khách.」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1761 = "「A.」"
# 【ひかり】
# display as 光
# JP: 「っ！！？」
1779 = "「!?」"
# monologue
# JP: 一瞬にして、れいなの陰にひかりが隠れる。
2553 = "Trong chớp mắt, Hikari đã trốn sau lưng Reina."
# monologue
# JP: 成長した、と心が震えたばかりだったが――
2434 = "Trái tim tôi vừa mới rung động vì sự trưởng thành của con bé, vậy mà——"
# 【車掌】
# display as 列車長
# JP: 「乗車券と寝台券を拝見いたします」
1678 = "「Xin quý khách cho kiểm tra vé lên tàu và vé giường nằm ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、はい。お願いします」
1771 = "「A, vâng. Của chúng tôi đây.」"
# 【ひかり】
# display as 光
# JP: 「わぁ。けんさつきょー」
1731 = "「Oa. Kìm bấm vé~」"
# monologue
# JP: ――れいなの陰に隠れつつ、\nけんさつきょう……恐らくは、“検札鋏”に見入っている。
1174 = "——Vừa nấp sau lưng Reina, con bé vừa dán mắt vào kìm bấm vé…… có lẽ là \\x%l検札鋏;#00ffc040;kìm soát vé%l;#;."
# monologue
# JP: そこまで興味があるのなら、\nもっと近くで見ればと思うが――
2455 = "Nếu hứng thú đến thế, sao không lại gần mà xem cho rõ——"
# 【れいな】
# display as 玲奈
# JP: 「ひかりちゃん、おりますかぁ？」
1871 = "「Bé Hikari, mình xuống dưới nha?」"
# 【ひかり】
# display as 光
# JP: 「やぁあ。こわぃい」
1596 = "「Không chịu. Đáng sợ lắm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「…………」
1211 = "「…………」"
# monologue
# JP: れいなの優しいうながしにさえ、\nひかりはおびえて、ますます深く隠れてしまう。
2410 = "Đến cả lời khuyên nhẹ nhàng của Reina cũng khiến Hikari sợ hãi mà lùi sâu hơn vào chỗ nấp."
# monologue
# JP: ポーレットが申し訳なさそうに会釈をすれば、\n車掌さんは大丈夫ですと言いたげな微苦笑を浮かべ――
2515 = "Paulette cúi đầu chào với vẻ mặt áy náy, người trưởng tàu thì nở nụ cười gượng gạo như muốn nói \"Không sao đâu\"——"
# monologue
# JP: （パチン――パチン――）
2678 = "（Tách—— Tách——）"
# monologue
# JP: 検札鋏で、乗車券、寝台券にそれぞれ小さな穴を開け、\nきっぷを返して一礼し、隣の寝台群へと移動していく。
2321 = "Trưởng tàu dùng \\x%l検札鋏;#00ffc040;kìm soát vé%l;#; bấm một lỗ nhỏ trên vé lên tàu và vé giường nằm, trả lại vé rồi cúi chào, sau đó di chuyển sang khu vực giường nằm bên cạnh."
# monologue
# JP: （ポーっ！）
2679 = "（Tuúúúúúúúúúúú!）"
# monologue
# JP: （ゴーーーーーっ）
2690 = "（Xình xịch xình xịch——）"
# monologue
# JP: 汽笛の直後に、音が変わって、車窓も変わる。\nトンネルだ。
2276 = "Ngay sau tiếng còi tàu, âm thanh thay đổi, khung cảnh ngoài cửa sổ cũng thay đổi. Là đường hầm."
# 【ひかり】
# display as 光
# JP: 「…………」
# 1211 = "「……」" 
# monologue
# JP: ひかりが息を詰めている。\nなんとなく緊張した沈黙が、ぼくらの間に垂れ込める。
2304 = "Hikari nín thở. Một sự im lặng có phần căng thẳng bao trùm lấy chúng tôi."
# 【車掌】
# display as 列車長
# JP: 「失礼いたします。乗車券と寝台券を――」
1897 = "「Xin lỗi đã làm phiền quý khách. Xin quý khách cho kiểm tra vé lên tàu và vé giường nằm——」"
# 【ひかり】
# display as 光
# JP: 「はふぅ……」
1726 = "「Phù……」"
# monologue
# JP: 車掌さんの気配が消えると同時、\nひかりが大きな息を吐く。
2323 = "Ngay khi bóng dáng người trưởng tàu khuất đi, Hikari thở hắt ra một hơi dài."
# monologue
# JP: れいながゆっくり、ひかりの頭を撫ぜてやる。
2544 = "Reina chậm rãi xoa đầu Hikari."
# 【れいな】
# display as 玲奈
# JP: 「車掌さん。いっちゃいましたねぇ。\n制服、かっこよかったですねぇ」
1666 = "「Bác trưởng tàu đi mất rồi nhỉ. Đồng phục của bác ấy ngầu thật đấy nha.」"
# 【ひかり】
# display as 光
# JP: 「みちてつ！」
2119 = "「Michitetsu!」"
# monologue
# JP: 弾んだ一声。\nれいなの陰から飛び出してくる。
2382 = "Một giọng nói đầy phấn khích. Con bé lao ra từ phía sau Reina."
# 【ひかり】
# display as 光
# JP: 「ね？　まま、きっぷかして～\nきょうこんみたい～」
1859 = "「Này, mẹ ơi, cho con mượn vé đi~ Con muốn xem vết cắt~」"
# 【双鉄】
# display as 雙鐵
# JP: 「きょうこん？」
2132 = "「Vết cắt?」"
# 【ポーレット】
# display as 波萊特
# JP: 「[はさみ]鋏の[あと]痕で[きょうこん,1]鋏痕です。\nっていっても、[けんさつきょう,2]検札鋏だし、ただのパンチ穴ですけど」
2107 = "「Dấu cắt của kìm bấm gọi là vết cắt. Nói là \\x%l検札鋏;#00ffc040;kìm soát vé%l;#; vậy thôi chứ thực ra chỉ là bấm một cái lỗ thôi mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほどな。で、『みちてつ』というのは――」
1682 = "「Ra là vậy. Thế còn 『Michitetsu』 là——」"
# 【ひかり】
# display as 光
# JP: 「みちのくゆけむりてつどー！」
2118 = "「Đường sắt Michinoku Yukemuri!」"
# monologue
# JP: 言ってひかりは、ベッドサイドまで飛び出してくる。
2308 = "Nói rồi, Hikari nhào ra mép giường."
# 【双鉄】
# display as 雙鐵
# JP: 「危ない。落ちるぞ」
2079 = "「Nguy hiểm. Ngã bây giờ.」"
# 【ひかり】
# display as 光
# JP: 「おちないのー。ね、ぱぁぱ。\nおとうさんえれべーた！」
1594 = "「Không ngã đâu.\nNày, ba ơi. Thang máy của ba!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　下に行くのか？」
1810 = "「Hửm? Con muốn xuống à?」"
# 【ひかり】
# display as 光
# JP: 「ままのとこいくのー！」
1647 = "「Con muốn sang chỗ mẹ cơ!」"
# 【ポーレット】
# display as 波萊特
# JP: 「はぁい。ポーレット階にいらっしゃい」
1839 = "「Rồi rồi. Mời quý khách đến với tầng Paulette.」"
# 【ひかり】
# display as 光
# JP: 「ポーレットかい！　わぁい」
1974 = "「Tầng Paulette! Oa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「よし。ではポーレット階へご案内だ」
1843 = "「Được rồi. Vậy xin hướng dẫn quý khách đến tầng Paulette.」"
# monologue
# JP: ひかりの脇をつかまえて、ゆっくり下ろす。\nポーレットの手に渡る直前、わざと少しだけ左右に揺する。
2439 = "Tôi xốc nách Hikari, từ từ đặt con bé xuống. Ngay trước khi trao tay cho Paulette, tôi cố tình lắc con bé sang hai bên một chút."
# 【ひかり】
# display as 光
# JP: 「きゃあ！」
1704 = "「Kyaa!」"
# 【ポーレット】
# display as 波萊特
# JP: 「いらっしゃあい」
1959 = "「Chào mừng quý khách.」"
# 【ひかり】
# display as 光
# JP: 「ね、ね。きょうこんみせてー！」
1858 = "「Mẹ ơi, mẹ ơi. Cho con xem vết cắt đi!」"
# 【ポーレット】
# display as 波萊特
# JP: 「はいはい」
1847 = "「Rồi rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それ、れいなも」
1997 = "「Reina cũng xuống đi.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、とーってもうれしいですぅ。\nそれじゃあ、ポーレット階までお願いしますねぇ」
1717 = "「Fufufu, Reina vui lắm nha. Vậy thì, phiền anh đưa Reina xuống tầng Paulette nha.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1800 = "「嗯」" 
# 【ひかり】
# display as 光
# JP: 「れいなおねえちゃん、いらっしゃーい」
2001 = "「Chị Reina, chào mừng chị.」"
# monologue
# JP: 同じ手順で、れいなも下に。\n二階は僕が独り占めだ。
2348 = "Với cùng một thao tác, tôi cũng đưa Reina xuống dưới. Thế là tôi độc chiếm tầng hai rồi."
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、[きょうこん,1]鋏痕、どうですかぁ？」
1721 = "「Fufufu, vết cắt thế nào ạ?」"
# 【ひかり】
# display as 光
# JP: 「あのねぇ、ふつうのまぁるいのなのー。\nけんさつきょうは、これしかないのかなぁ」
1743 = "「Này nhé, nó chỉ là một hình tròn bình thường thôi. Kìm soát vé chỉ có mỗi hình này thôi sao.」"
# 【れいな】
# display as 玲奈
# JP: 「うーん、変える意味があんまりないからかもですねぇ」
1752 = "「Ưm, có lẽ là vì không có lý do gì để thay đổi hình dạng đó nha.」"
# 【ひかり】
# display as 光
# JP: 「どーしてぇ？」
1976 = "「Tại sao vậy ạ?」"
# monologue
# JP: 問われて、れいなが口ごもる。\n恐らくひかりへの伝え方を、考えてくれているのだろう。
2573 = "Bị hỏi, Reina ấp úng. Có lẽ em ấy đang suy nghĩ cách giải thích cho Hikari hiểu."
# 【れいな】
# display as 玲奈
# JP: 「ええと、まず改札鋏の鋏痕を駅ごとに変更するのは、\nどうしてだかわかりますかぁ？」
1754 = "「Để xem nào, trước tiên em có biết tại sao mỗi nhà ga lại thay đổi hình dạng vết cắt của kìm soát vé không nha?」"
# 【ひかり】
# display as 光
# JP: 「わかるう！　キセルをみつけるためー！」
2020 = "「Con biết! Để bắt những người đi lậu vé!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか？　しかし、きっぷには普通、\n発駅の記載をするだろう」
2016 = "「Thế à? Nhưng mà, trên vé thường có ghi ga đi mà.」"
# 【ひかり】
# display as 光
# JP: 「かいすうけんは、どっちからでものれるもーん」
1832 = "「Vé tháng thì lên từ ga nào cũng được mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお！　なるほど。そうか、回数券では、\n鋏痕による乗車駅特定が必要になるか」
1819 = "「Ồ! Ra là vậy. Thì ra là với vé tháng, người ta cần xác định ga lên tàu dựa vào vết cắt à.」"
# 【ひかり】
# display as 光
# JP: 「ぜんぶのきょうこんがおなじだったら、\nいっこつくっておくだけで、ただのりできちゃうのー」
1850 = "「Nếu vết cắt ở đâu cũng giống nhau, chỉ cần làm giả một cái là có thể đi tàu miễn phí rồi.」"
# monologue
# JP: 確かにだ。回数券には、日付の記入がなされない。\nゆえ、最低料金回数券を、発駅で入鋏してもらう――
2560 = "Đúng là vậy. Vé tháng không ghi ngày tháng. Vì thế, chỉ cần mua vé tháng mệnh giá thấp nhất, rồi nhờ bấm vé ở ga đi——"
# monologue
# JP: どの駅でも鋏痕が同一であれば、ただそれだけで、\nどこから乗っても発駅で下車できるきっぷを作れてしまう。
2582 = "Nếu vết cắt ở ga nào cũng giống nhau, thì chỉ cần như thế là có thể tạo ra một tấm vé cho phép lên tàu từ bất kỳ đâu và xuống tàu ở ga đi."
# 【双鉄】
# display as 雙鐵
# JP: 「そのきっぷを使わず保持しておくための悪知恵が必要と\nなるだろうが――やりようはいくらでもありそうだな」
2122 = "「Tuy là cần phải có chút mánh khóe để giữ tấm vé đó mà không sử dụng—— nhưng có vẻ cũng có vô số cách để làm chuyện đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「定期券併用とかだと防ぎようも……。\nだから、昔は検札バンバンやってたそうです」
2038 = "「Nếu dùng chung với vé định kỳ thì không có cách nào chống được đâu... Nên nghe nói ngày xưa người ta kiểm tra vé gắt gao lắm.」"
# 【れいな】
# display as 玲奈
# JP: 「その上、利用者が多い駅では、時間帯や日付によって\n鋏痕かえたりもあったみたいですよー」
2032 = "「Hơn nữa, ở những ga có lượng hành khách lớn, có vẻ như họ còn thay đổi vết cắt tùy theo khung giờ hoặc ngày tháng nữa đó nha.」"
# monologue
# JP: なるほどだ。
2335 = "Ra là vậy."
# monologue
# JP: 今日のものと違う鋏痕で下車されたなら、\nそれだけで、たちどころにキセルを摘発できる。
2397 = "Nếu hành khách xuống tàu với vết cắt khác với vết cắt của ngày hôm đó, thì chỉ cần vậy thôi là có thể lập tức vạch trần hành vi đi lậu vé."
# 【双鉄】
# display as 雙鐵
# JP: 「それで、改札鋏には多種多様な鋏痕が存在するのか」
1890 = "「Vậy nên kìm soát vé mới có nhiều hình dạng vết cắt khác nhau à.」"
# 【ひかり】
# display as 光
# JP: 「なのー！　みちてつのきょうこんもたのしみー！」
1868 = "「Đúng thế! Con cũng mong chờ được xem vết cắt của Michitetsu lắm!」"
# monologue
# JP: ……いやはや、わが娘ながらたいした知識だ。
1196 = "……Chà chà, tuy là con gái mình nhưng kiến thức đáng nể thật đấy."
# monologue
# JP: 鉄道路線がボロボロになったこの状況下、\nキセル自体が、ほとんど死語となっているのに――っと。
2395 = "Trong tình hình các tuyến đường sắt tơi tả thế này, bản thân từ \"đi lậu vé\" cũng gần như trở thành từ ngữ chết rồi—— à đúng rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「そういえば、さっきの話だが」
2051 = "「Nhắc mới nhớ, chuyện lúc nãy ấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「さっきの話？」
2091 = "「Chuyện lúc nãy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。みち鉄――みちのく湯煙鉄道の制服とのことだが、\n僕たちが乗っているのは、ときわ鉄道の――ああ、いや」
1796 = "「Ừm. Đồng phục của Michitetsu—— Đường sắt Michinoku Yukemuri, nhưng mà chuyến tàu chúng ta đang đi là của Đường sắt Tokiwa—— à, không.」"
# monologue
# JP: 言えば、記憶がよみがえる。
2627 = "Vừa nói ra, ký ức lại ùa về."
# monologue
# JP: 大慌てで改札を抜けたあのとき、\n駅員さんは、女性であった気がするが――
2283 = "Lúc hớt hải chạy qua cửa soát vé, tôi nhớ nhân viên nhà ga là nữ thì phải——"
# 【双鉄】
# display as 雙鐵
# JP: 「制服の色が違っていたか？\n駅員さんは濃紺で、今の車掌さんは濃茶だったような」
1673 = "「Màu đồng phục khác nhau à? Nhân viên nhà ga mặc màu xanh đen, còn người trưởng tàu lúc nãy mặc màu nâu đậm thì phải.」"
# 【ひかり】
# display as 光
# JP: 「えきいんさんはときてつのひとー！\nでね、しゃしょうさんがみちてつのひとー！」
2027 = "「Chị nhân viên nhà ga là người của Tokitetsu! Còn bác trưởng tàu là người của Michitetsu!」"
# 【ポーレット】
# display as 波萊特
# JP: 「なんですよ？　双鉄くん」
1875 = "「Đúng vậy đó, anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1744 = "「Ồ.」"
# monologue
# JP: 駅はとき鉄。\n列車はみち鉄――となれば答えは容易にでてくる。
2610 = "Ga là của Tokitetsu. Tàu là của Michitetsu—— nghĩ đến đây thì câu trả lời đã quá rõ ràng."
# 【双鉄】
# display as 雙鐵
# JP: 「つまり、とき鉄の線路を、みち鉄の車両――か、\nみち鉄所属のまいてつさんの車両が走っているのか」
2078 = "「Tức là, tàu của Michitetsu—— hay nói đúng hơn là tàu của Maitetsu thuộc sở hữu của Michitetsu, đang chạy trên tuyến đường sắt của Tokitetsu à.」"
# 【ひかり】
# display as 光＆波萊特
# JP: 「おおあたりー！」\n「大正解です」
1824 = "「Trúng phóc!」\n「Hoàn toàn chính xác.」"
# monologue
# JP: 母子そろっての笑顔の賞賛。\nすぐさま、解説が追いかけてくる。
2491 = "Hai mẹ con cùng cười tươi khen ngợi tôi. Ngay sau đó là lời giải thích."
# 【ひかり】
# display as 光
# JP: 「あのね、みちてつがしんだいれっしゃはしらせてるの！\n『ゆめぐり』！」
1872 = "「Này nhé, Michitetsu đang cho chạy tàu giường nằm đó! 『Yumeguri』!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
1941 = "「Ồ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「C56――ポニーさんの[けんいん,1]牽引で、3輌編成。\n解放Ｂが一両で、一両はＡ寝台。個室ですね」
2007 = "「Do \\x%lC56;#00ffc040;C56%l;#;—— Pony kéo, gồm 3 toa. Một toa là giường nằm mở hạng B, một toa là giường nằm hạng A. Loại phòng riêng ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「もう一両は？」
1675 = "「Còn toa kia?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ごろごろシート。カーペットカーになってます。\nこれは、寝台料金不要の車両になりますね」
1944 = "「Ghế nằm lăn lóc. Là toa trải thảm. Toa này không cần trả phí giường nằm đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう、お得だな」
1942 = "「Ồ, tiện lợi thật.」"
# 【ポーレット】
# display as 波萊特
# JP: 「なんですけど……家族旅行とかには向かないです。\n朝方には、一般の、通勤・通学客も乗り合わせますから」
2120 = "「Tuy nhiên…… nó không hợp với những chuyến du lịch gia đình đâu. Vì vào buổi sáng, những hành khách đi làm, đi học bình thường cũng sẽ lên tàu mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――そういう需要があって生き残った路線なのか」
1745 = "「A—— Tuyến đường này tồn tại được là nhờ có nhu cầu đó sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。海沿いの暴風区間。\nエアクラには不向きな土地なのが幸いしました」
1949 = "「Vâng. Đây là đoạn đường ven biển thường xuyên có gió lớn. Cũng may là vùng đất này không thích hợp cho Aircra hoạt động.」"
# monologue
# JP: エアロ＝クラフテック機関は、パワーに欠ける。\nそれを補うための工夫が、エアクラナビによる安全対策。
2565 = "Động cơ Aero-Craftech thiếu sức mạnh. Để bù đắp cho điều đó, họ đã thiết kế các biện pháp an toàn thông qua hệ thống dẫn đường Aircra."
# monologue
# JP: より正確には、車体の徹底的な軽量化の悪影響を緩和する、\nエアクラナビによる自動運転・自動補正だ。
2479 = "Nói chính xác hơn, đó là hệ thống lái tự động, tự động điều chỉnh của hệ thống dẫn đường Aircra nhằm giảm thiểu tác động tiêu cực của việc giảm trọng lượng thân xe một cách triệt để."
# 【双鉄】
# display as 雙鐵
# JP: 「ナビによる補正がかかってもなお、\n対応できないほどの風が吹くのか？」
2081 = "「Ngay cả khi có sự điều chỉnh của hệ thống dẫn đường, gió vẫn thổi mạnh đến mức không thể đối đối phó được sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「です。帝鉄時代には、蒸気機関車牽引の鋼製客車が、\n横風によって転覆した事故があった程ですから」
1925 = "「Đúng vậy. Thời Đế Thiết, thậm chí từng xảy ra sự cố toa xe thép do \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; kéo bị lật do gió tạt ngang cơ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「鋼製客車がか！？」
2083 = "「Cả toa xe thép cũng bị lật á!?」"
# monologue
# JP: ひっくり返せといわれて、ひっくり返せるものですらない。\nそれが横転。しかも、蒸気機関車という重しがあって。
2630 = "Nó không phải là thứ dễ lật đến mức nói lật là lật được. Vậy mà nó lại lật ngang. Hơn nữa, lại còn có sức nặng của \\x%l蒸気機関車;#00ffc040;đầu máy hơi nước%l;#; đè lên nữa chứ."
# monologue
# JP: どれほどの暴風が吹くものか――\n恐らくは、まともに歩くことも困難となろう。
2625 = "Cơn gió lớn đó mạnh đến mức nào chứ—— Chắc chắn là đi bộ bình thường cũng vô cùng khó khăn."
# 【ポーレット】
# display as 波萊特
# JP: 「そこまでの暴風はめったにないことでしょうけど。\nでも、地域の方々はその事故を忘れなかったみたいで」
1605 = "「Mặc dù những cơn bão lớn như vậy hiếm khi xảy ra. Nhưng có vẻ như người dân địa phương vẫn không thể quên được sự cố đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。安全な交通を確保するための鉄道、か。\nそうした生き残り方は、とても素晴らしいことだな」
1684 = "「Ra là vậy. Đường sắt được giữ lại để đảm bảo giao thông an toàn à. Cách sinh tồn như vậy thật tuyệt vời.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね」
1933 = "「Đúng vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ゆえに、朝方。通勤通学時間帯には、交通の足として、\nカーペットカー？　が、解放されている」
1894 = "「Vì vậy, vào buổi sáng. Trong giờ đi làm đi học, nó đóng vai trò là phương tiện di chuyển, toa trải thảm? Được mở cửa cho hành khách.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですです。\n特急だけど、その区間だけは結構な駅に止まりますよ？」
1965 = "「Đúng vậy đúng vậy. Mặc dù là tàu tốc hành, nhưng riêng đoạn đường đó lại dừng ở khá nhiều ga đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは確かに落ち着かんかな。\nどんな様子か見てみたい気もするが」
2082 = "「Thế thì chắc chắn là không thể nghỉ ngơi yên tĩnh được rồi. Anh cũng tò mò muốn xem thử nó như thế nào.」"
# 【ひかり】
# display as 光
# JP: 「しゃしーん！！」
1983 = "「Chụp ảnh!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「む？」
