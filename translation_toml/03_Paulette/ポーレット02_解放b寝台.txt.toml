# lines: 432 
# monologue
# JP: 急ぐ。急ぐ。\n駆け込み乗車の愚を犯さぬよう、安全な範囲の大股で。
2416 = "快點，快點。為了不跑步搶著在最後一秒上車，我把步幅控制在安全範圍。" 

# monologue
# JP: 数分の余裕は残るはずだが、それでもやはり気持ちは焦る。\nこの列車を、仮に乗り逃しでもしたら――
2647 = "雖然離發車應該還有幾分鐘，但我的心情仍十分焦急。無論如何，我都不能錯過這趟車。" 

# 【ポーレット】
# display as 波萊特
# JP: 「これならもう大丈夫。まだ二分以上も」
2075 = "「這你就不用擔心了。還有兩分多鐘呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「カメラを出すには早すぎる」
1623 = "「你也不用現在就拿相機出來吧」" 

# monologue
# JP: 列車を目にし、足を緩めかけたポーレットに、\n先回りして声をかける。
2513 = "波萊特一看到列車，就放緩了腳步，我快走幾步走到她面前對她說。" 

# 【双鉄】
# display as 雙鐵
# JP: 「記念撮影は到着後にするべきだ。\nまた何かアクシデントがあっては叶わん」
2045 = "「要拍紀念照片還是等到達目的地再說吧。萬一耽誤了就得不償失了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ううう～　はぁい」
1782 = "「嗚嗚嗚，好的」" 

# monologue
# JP: 渋々とだが、ポーレットは僕に続いてくれる。\nれいなを抱っこした僕と、ひかりを抱っこしたポーレット。
2514 = "波萊特不情願地跟在我身後。我抱著玲奈，波萊特則抱著光。" 

# monologue
# JP: その順番で、車内へ入り、狭い通路を移動する。
2431 = "我們一前一後走進車裡，穿過狹窄的過道。" 

# 【ひかり】
# display as 光
# JP: 「わぁ！！！」
1737 = "「哇！！！」" 

# 【ひかり】
# display as 光
# JP: 「かいほーびーしんだいー！！\nすごーい！　かっこいいのー！！」
2115 = "「開放式普通臥鋪！！好厲害！好帥氣！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おおお」
1817 = "「噢」" 

# 【れいな】
# display as 玲奈
# JP: 「ふわぁ、二段ベッドですねぇ」
1740 = "「哇，是上下鋪」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふふっ」
1711 = "「呵呵呵」" 

# 【ひかり】
# display as 光
# JP: 「ひかり、ベッドねてみたい！　ねてみたい！」
1641 = "「光好想在床上睡睡看！想睡睡看！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「もちろんいいわよ？\nちゃあんとおくつをぬいでから、ね？」
2010 = "「當然可以哦，不過要把鞋子脫掉，好不好？」" 

# 【ひかり】
# display as 光
# JP: 「ひかり、ちゃあんとおくつぬぐのっ！」
1642 = "「光會好好脫掉鞋子的！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そ？　じゃ、ひとりでぬげるかなー？」
1943 = "「是嗎？那你可以自己脫鞋嗎？」" 

# 【ひかり】
# display as 光
# JP: 「ぬげるのー！」
1643 = "「光會！」" 

# monologue
# JP: だっこから下ろされるのももどかしいのか、\nポーレットの腕の中からすり抜けようと身もだえる。
2374 = "她在波萊特的懷中扭動著，好像迫不及待地想自己走。" 

# 【れいな】
# display as 玲奈
# JP: 「れいなもおりますぅ」
1999 = "「玲奈也要下去」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1800 = "「嗯」" 

# monologue
# JP: れいなは、のんびりお行儀良く。
2536 = "玲奈則是乖乖地等著我放下她。" 

# monologue
# JP: （がたんっ――）
2677 = "（哐當——）" 

# 【双鉄】
# display as 雙鐵
# JP: 「出発か」
1665 = "「出發了」" 

# monologue
# JP: 夜が明るくなりすぎないようになのだろう。\n車窓は通路側、小さなものだ。
2341 = "可能是為了避免晚上太明亮吧。車窗很小，設置在過道一側。" 

# monologue
# JP: 流れ始める車窓の景色は、僕を少しだけ感傷的に――
2551 = "看到車窗中開始移動的景色，我剛感覺稍稍有些感傷……" 

# 【ひかり】
# display as 光
# JP: 「おくつっ、おくつっ、ぬーぎぬーぎ、ぬーぎぬーぎ！」
2034 = "「脫鞋鞋，脫鞋鞋！」" 

# monologue
# JP: しかけたところで、ひかりのはしゃいだ声がする。
2408 = "就聽到了光快活的聲音。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひかり？　他のお客さんがびっくりしちゃうから。\nもう少し、小さな声で――できるかな？」
1658 = "「光，其他乘客會被嚇到的。聲音再小一點吧，好不好？」" 

# 【ひかり】
# display as 光
# JP: 「できるのー。\nおくつっ、おくつっ、ぬーぎぬーぎ、ぬーぎぬーぎ」
1840 = "「好。脫鞋鞋，脫鞋鞋」" 

# monologue
# JP: 抑えてもなおはしゃいだ声が、\n僕の気持ちまでわくわくさせる。
2385 = "她的聲音即使壓低了還是很快活，我的心情也跟著興奮起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。これが寝台客車か――」
1683 = "「原來，這就是臥鋪客車嗎」" 

# monologue
# JP: ベッドはおそらく、僕にはいささか窮屈だろう。\nだが、それさえも旅の楽しみとなってきそうだ。
2404 = "對我來說，這床恐怕有些狹窄。不過，睡在狹窄的火車臥鋪上也是旅行的樂趣之一。" 

# monologue
# JP: みっちりとした、あまりにも素晴らしすぎる秘密基地感。\nここを家族で独占できる――うむ？
2402 = "封閉的車廂有種相當真實、堪稱完美的秘密基地的感覺。而我們一家人此刻可以獨占這裡……唔？" 

# 【双鉄】
# display as 雙鐵
# JP: 「寝台券の方はどうなっているのだ？\n僕とポーレットとれいなの分は当然だろうが――」
2036 = "「臥鋪票買好了嗎？我和波萊特還有玲奈的票當然是買了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひかりはわたしといっしょに寝れば、\n寝台券の必要はないんですけど――」
1648 = "「光要和我一起睡，所以沒必要買臥鋪票」" 

# 【ひかり】
# display as 光
# JP: 「やだ！　やぁだ！　ひかり、ひとりでねる！！\nひかりのしんだいでねるのぉ！！」
1598 = "「不要！不要！光要自己睡！！光要在自己的鋪位上睡！！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「って、絶対にいうって思いましたし……\n家族だけで、寝台四つ独占したいのもありましたから」
1884 = "「我就知道她絕對會這麼說……而且我也想一家子獨占四張臥鋪」" 

# monologue
# JP: 言いつつ、ポーレットがきっぷケースをそそくさ取り出す。\nキハ07sを模したかわいらしいもの。
2524 = "波萊特邊說邊慌忙從票夾裡取出車票。那票夾是仿照Ｋｉｈａ０７Ｓ的樣子做的，非常可愛。" 

# monologue
# JP: その中には、四枚の乗車券とあわせて――
2587 = "裡面有四張車票，以及……" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお。寝台券も四枚とってくれていたのか。\n素晴らしい判断だ。ありがとう」
1820 = "「噢，原來你買了四張票。真是明智的判斷。謝謝你」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、どういたしまして！　\nだからどこでも、好きなベッドをとっちゃってください」
1724 = "「呵呵，不用謝！所以，你們可以隨便挑自己喜歡的鋪位」" 

# 【ひかり】
# display as 光
# JP: 「ひかり！　うえ！！　ひかりうえがいいの！！」
1652 = "「光要睡上面！！光喜歡睡上面！！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
1764 = "「啊！」" 

# monologue
# JP: 大興奮だ。\n靴を脱ぐのも忘れて全力ではしごへと――
2393 = "她非常興奮。甚至忘了脫鞋，就這樣全力跑向梯子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
2028 = "「等一下」" 

# 【ひかり】
# display as 光
# JP: 「きゃあ！」
# 1764 = "「啊！」" 

# monologue
# JP: よじのぼろうとした瞬間に、残念、僕につかまえられる。
2489 = "正當要爬上去的時候，她被我抓住了。" 

# 【ひかり】
# display as 光
# JP: 「やぁあ～、はなしてぇ～」
1601 = "「不要，放開光」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひとりではしごはまだ危ない。\nというか、ひとりで上段も危なかろう」
1633 = "「你自己一個人爬梯子還很危險。雖然你一個人住上鋪就很危險了」" 

# 【ひかり】
# display as 光
# JP: 「あぶなくないのー！\nひかり、ひとりでねれるもん！！」
1591 = "「不危險！光可以一個人睡！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうはいうが、まだ――ああ、いや」
2049 = "「話是這麼說，但是……啊，不對」" 

# monologue
# JP: 僕まで過保護になってどうする。\nひかりがせっかく、自立心を発揮しようとしているのだ。
2339 = "可不能連我都成了過度保護孩子的家長。難得光想發揚獨立性啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいな、上段に先にあがってもらえるか？」
2002 = "「玲奈，你能先爬到上鋪去嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「はぁい。\nもーちょっとだけ、お靴をぬぐの待っててくださぁい」
1785 = "「嗯。先等一下，玲奈要脫鞋子」" 

# 【ひかり】
# display as 光
# JP: 「あ、そうだったの。\nひかりもおくつぬぐの」
1774 = "「啊，對哦。光也要脫鞋子」" 

# 【れいな】
# display as 玲奈
# JP: 「それじゃあ、いっしょにぬぎましょうねぇ」
2098 = "「那我們就一起脫吧」" 

# monologue
# JP: れいなは僕からひかりを受け取り、\n下段ベッドに座らせる。
2539 = "玲奈從我手上接過光的手，讓她在下鋪坐下。" 

# 【ひかり】
# display as 光
# JP: 「んしょ――よいしょっ――んんん――んむぅ」
1814 = "「嘿咻……嘿咻……唔」" 

# monologue
# JP: 雪の列車の旅になるゆえ、今日のひかりは長靴だ。\n慣れないせいか、なかなかぬぐのに手間取っている。
2624 = "這次是雪國列車之旅，光今天穿著長靴。她可能是穿不慣，脫靴子的時候花了好長時間。" 

# monologue
# JP: どれ、僕が――
2590 = "要不，我就……" 

# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「あのね、ひかり」\n「はきくちを大きくひらいて、よいしょっと！」
1628 = "「你看，光」\\n「把拉鏈拉到最底下，脫！」" 

# 【ひかり】
# display as 光
# JP: 「あ！\n――ん――よいしょっ！」
1762 = "「啊！……嗯……脫！」" 

# monologue
# JP: （おお――）
2685 = "（漂亮）" 

# monologue
# JP: れいなが、さりげなく示してくれた。\nひかりに対して――同時に、僕とポーレットにも。
2543 = "玲奈若無其事地示範給光看。不僅是給光示範，同時也是給我和波萊特示範。" 

# monologue
# JP: 過保護はだめと、頭では解っているのだが……。\nポーレットを見れば目と目があう。同時に、苦笑。
2561 = "確實，雖然我知道太操心不好，卻難以自控……我與波萊特四目相對，一同苦笑起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……れいなも、すっかりお姉さんだな」
1237 = "「……玲奈也已經是個稱職的姐姐了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。頼もしいくらい」
1936 = "「是啊，已經很可靠了」" 

# 【れいな】
# display as 玲奈
# JP: 「えっへへ～。\nそれじゃあれいな、先に上にあがりますねぇ」
1816 = "「嘿嘿，那玲奈就先上去了」" 

# monologue
# JP: れいながはしごを登っていくと、\nひかりもすぐに後を追おうとし、僕に捕まる。
2541 = "玲奈爬上梯子。光也想跟著爬上去，但被我抓住了。" 

# 【ひかり】
# display as 光
# JP: 「やぁん」
1597 = "「不要」" 

# monologue
# JP: このままれいなに渡すのが、一番安全は安全だ。\nが――れいなが手本を示してくれたこともある。
2550 = "直接把光舉起來交給玲奈的確是最安全的方式。但是，既然玲奈都給我們言傳身教了……" 

# monologue
# JP: ここは、ひかりに選択させよう。
2639 = "那這裡就讓光自己選吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひかりが上段ベッドにあがるためには、\nふたつの方法がある」
1656 = "「光，你可以選兩種爬到上鋪的方法」" 

# 【ひかり】
# display as 光
# JP: 「はしご、のぼるのぉ」
1650 = "「光要爬梯子」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それが、一つ目の方法だ。その方法をとるためには、\n『おとうさん教習』を受けねばならぬ」
2077 = "「這是第一種方法。想用這種方法的話，你必須要先聽完“爸爸講座”」" 

# 【ひかり】
# display as 光
# JP: 「おとうさんきょうしゅうなのー？」
1988 = "「爸爸講座？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ。安全が第一の使命だからな。そこは省けん。\nが、もう一つの方法であれば、教習不要だ」
1793 = "「嗯。安全第一是我們鐵路人的使命，所以不能少了這一步。不過，如果你選擇另一種方法的話，就不需要聽講座」" 

# 【ひかり】
# display as 光
# JP: 「もーひとつ、なに？」
1698 = "「另一種方法是什麼？」" 

# monologue
# JP: ひかりが戸惑った顔になる。\n上段へと登る方法が、はしごの他に思いつかんのだろう。
2311 = "光迷茫地看著我。可能她想不出除了爬梯子以外還有其他到達上鋪的方法。" 

# 【双鉄】
# display as 雙鐵
# JP: 「もう一つの方法とは――\n『おとうさんエレベーター』だ」
1697 = "「另一種方法是——“爸爸電梯”」" 

# 【ひかり】
# display as 光
# JP: 「おとーさんえれべーた！」
1990 = "「爸爸電梯！」" 

# monologue
# JP: 笑顔が輝く。\nこれなら誘導できそうだ。
2389 = "她露出了燦爛的笑容。看來，我的引導很順利。" 

# monologue
# JP: 思った瞬間、上段から、\nれいなも文字通り手を差し伸べてきてくれる。
2487 = "正在這個瞬間，玲奈的手從上鋪伸過來。" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。\nここが、おとうさんエレベーターの、二階ですよぉ」
1722 = "「呵呵呵，這裡就是爸爸電梯的二樓哦」" 

# 【ひかり】
# display as 光
# JP: 「にかーい！」
1611 = "「二樓！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ね、ひかり？　どっちがいい？\nおとうさんエレベーターと、おとうさん教習」
1653 = "「光，　你比較喜歡哪種？是爸爸電梯，還是爸爸講座」" 

# monologue
# JP: すぐさまポーレットも乗ってくる。\n『はしご』ではなく、あえて『教習』のことばを使い。
2521 = "波萊特立刻趁勢配合我說道。她刻意不說“梯子”，而是說成“講座”。" 

# monologue
# JP: ……僕と同じく、ひかりの自主性を大事にしたいが、\nやはりはしごは、まだ早すぎるように思えるのだろう。
1199 = "……看來她和我一樣，雖然想重點培養光的獨立性，但還是覺得光年紀太小不適合爬梯子。" 

# 【ひかり】
# display as 光
# JP: 「ひかり……ひかり、ねぇ。\nうーんと……うーんとぉ」
1636 = "「光……光要……唔……唔……」" 

# monologue
# JP: しかし、それでもひかりは悩む。
2292 = "但即便如此，光也陷入了煩惱。" 

# monologue
# JP: はしごを見、僕を見ポーレットを見、れいなを見。\nその目を文字通りにぐるぐるさせて――
2387 = "她看看梯子，看看我，看看波萊特又看看玲奈。她的眼睛開始轉起了圈圈，這可不是比喻。" 

# 【ひかり】
