# 【ひかり】
# display as 光
# JP: 「ひかりね、おまめとこれいらないの。\nぱぱのおにくとこうかんしてあげる？」
1638 = "「光不要吃豆子和這個。爸爸能用你的肉跟光換嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1800 = "「嗯」" 

# monologue
# JP: ちら、とポーレットを見れば、\nポーレットは待ってましたと頷いてくれる。
2454 = "我瞄了一眼波萊特，波萊特點點頭，好像早知道我的答案。" 

# 【ポーレット】
# display as 波萊特
# JP: 「おまめさんは、がんばってたべましょ？\n貝は、ママ大好物だから、お肉と交換してくれる？」
1730 = "「咱們還是加油吃豆子吧？媽媽最喜歡吃貝類了，能用我的肉跟你換嗎？」" 

# 【ひかり】
# display as 光
# JP: 「はぁい」
# 1844 = "「好」" 

# monologue
# JP: どのみちひかりは、一人前を食べきれない。
2334 = "反正光也吃不完一人份。" 

# monologue
# JP: れいながちびちび軽油をやっている傍らで、\nもくもくにこにこ、食べたいものとお豆をつまんで。
2307 = "光笑嘻嘻地吃著自己想吃的菜和豆子，一旁的玲奈也小口小口啜飲著柴油。" 

# 【ひかり】
# display as 光
# JP: 「ぷあー、おなかいっぱいなのー。\nごちそうさまでした」
1727 = "「呼，吃飽了。多謝款待」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もういいのか？」
1876 = "「已經吃好了嗎？」" 

# 【ひかり】
# display as 光
# JP: 「うん。あとはぱぱたべてー」
1789 = "「嗯。剩下的就爸爸吃吧」" 

# monologue
# JP: ……いつもよりも、かなりたくさん食べた様子だ。
1200 = "……看來，她比平時多吃了不少。" 

# monologue
# JP: 念のため、ポーレットへと視線を送れば、\nうれしげな頷きが返される。
2529 = "為防萬一，我將視線投向了波萊特，只見她高興地點了點頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「では、いただこう」
2099 = "「那我就吃了」" 

# 【ひかり】
# display as 光
# JP: 「あ、ぱぱ。ひかり、あーんてしてあげる」
1778 = "「啊，爸爸。光要餵你吃」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう」
# 1941 = "「是嗎」" 

# monologue
# JP: これは嬉しい。
2622 = "這可真讓我高興。" 

# monologue
# JP: ひかりは器用に箸をつかって、\n炊き込みご飯を僕の口元に運んでくれる。
2314 = "光靈巧地拿起筷子，把日式菜飯送到我的嘴邊。" 

# 【ひかり】
# display as 光
# JP: 「はい、ぱぱ。あーん」
1986 = "「爸爸張嘴。啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あーーーーーん。はむっ」
1757 = "「啊——啊嗚」" 

# 【ひかり】
# display as 光
# JP: 「どーお？　おいしいーぃ？」
1883 = "「怎麼樣？好吃嗎？」" 

# monologue
# JP: ……ポーレットもれいなも、にこにこ僕を見守っている。
1198 = "……波萊特和玲奈都微笑著看著我。" 

# monologue
# JP: 自分で作ったわけでもないのに、\nひかりはどこか不安げだ。
2477 = "明明不是她親手做的飯，光的表情卻好像有一絲不安。" 

# 【双鉄】
# display as 雙鐵
# JP: 「（ごくっ――）。うむ――うまい！　最高だ！！！」
2131 = "「（嚥下）嗯，很好吃！太好吃了！！！」" 

# 【ひかり】
# display as 光
# JP: 「きゃあ！」
1734 = "「哇！」" 

# monologue
# JP: ひかりの顔がくしゃくしゃになる。
2297 = "光一下子笑了出來。" 

# 【ひかり】
# display as 光
# JP: 「それじゃああ、こんどはたこさんあげるのー。\nはい、あーーーーん！」
2103 = "「那麼，接下來吃小章魚吧。來，啊～！」" 

# monologue
# JP: （ガタンゴトン、ガタンゴトン）
2675 = "（咣當、咣當）" 

# monologue
# JP: ……僕らの前にも客車があるせいか、\nブラスト音もドラフト音もほぼ聞こえない。
1194 = "……可能因為我們的前方也有客運車廂吧，我們這節車幾乎聽不到汽缸排汽的聲音和鍋爐排汽的聲音。" 

# monologue
# JP: レールの継ぎ目を乗り越えていく音だけが、\n規則正しく、真っ暗な夜に繰り返される。
2336 = "只有車輪不斷滾過鐵軌接縫的聲音有規律地在深夜中重複著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……今日のひかりは、ずいぶんと活発だったな」
1225 = "「……光今天真是很活潑啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですよねー」
# 1933 = "「是啊」" 

# monologue
# JP: カーテンの向こうからポーレットの声。\nそれだけで、明かりがともった気持ちになれる。
2569 = "簾子對面傳來波萊特的聲音。光是聽到她的聲音，我的心情就明快了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひかりは寝たのか？」
1645 = "「光睡著了嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。もうぐっすり。\nだからわたし、双鉄くんとお話したくて」
1950 = "「是的，睡得很香。所以，我想跟你說說話」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大歓迎だ」
1984 = "「熱烈歡迎」" 

# monologue
# JP: カーテンを開ける。
2443 = "我拉開了床簾。" 

# monologue
# JP: 軽く呑みでもしたのだろうか？\n僕の妻は、少し赤らんだ顔をしている。
2649 = "難不成我的妻子喝了點酒？她的臉看起來稍微有些紅。" 

# 【双鉄】
# display as 雙鐵
# JP: 「どうする？　上にあがるか？」
1627 = "「你打算怎麼辦？要去上面嗎？」" 

# monologue
# JP: ポーレットの上にはれいな、僕の上にはひかり――の\n寝台配置だったのが、結局ひかりがグズってしまった。
2538 = "玲奈在波萊特的上鋪，光在我的上鋪。本來我們是這麼分配的，但光已經睡著了。" 

# monologue
# JP: ポーレットのベッドですやすや眠り、\nゆえに今、僕の上段ベッドは無人だ。
2375 = "她在波萊特的鋪位上睡得正香，所以，如今我的上鋪空了出來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「上段に並んで座るのも、とっても素敵ですけど――\nでも！」
1826 = "「在上鋪並排坐著也很棒，但是！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお」
# 1817 = "「噢」" 

# monologue
# JP: もぞもぞと、僕の隣にポーレットが潜り込んでくる。
2520 = "波萊特窸窸窣窣地鑽到我的身邊。" 

# monologue
# JP: ただでさえ窮屈な寝台が、\n僕ら夫婦でみっしりになる。
2480 = "本來臥鋪就很窄，現在更是被我們夫婦兩人擠得滿滿的。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんだぁ」
2030 = "「終於抱住你啦」" 

# monologue
# JP: ぎゅうっと、ポーレットが抱きついてくる。\nああ、そうか――
2522 = "波萊特緊緊地抱住我。哦，我懂了……" 

# 【双鉄】
# display as 雙鐵
# JP: 「良く頑張ったし。頑張っているな」
1614 = "「今天你真的很努力。真的很努力啊」" 

# monologue
# JP: 旅行全体をきっちりしきり、ひかりを見守り、\nれいなと僕を、さりげなくフォローしてくれている。
2378 = "她完美地管理著我們的旅行，不光要看著光，還要若無其事地給我和玲奈做後盾。" 

# monologue
# JP: ひかりが起きている間には、僕に甘えることもできない。\nゆえ、甘やかす。ここぞとばかりに、思い切り。
2313 = "光醒著的時候，她沒辦法跟我撒嬌。所以，我要趁現在讓她撒嬌。一定要讓她盡情撒嬌。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今回の旅行も、ポーレットのおかげで実現できた。\nおかげで、最高に楽しめている」
1833 = "「多虧了波萊特，才有了我們這次旅行。我現在非常開心」" 

# 【ポーレット】
# display as 波萊特
# JP: 「えへへぇ」
1815 = "「嘿嘿」" 

# monologue
# JP: 金の髪の毛を指で梳き、\n僕の手の中、さらさらの金の雨を降らせる。
2448 = "我用手指梳理著她的金髮，感受著柔順的金色細雨從我指縫中流下。" 

# monologue
# JP: 撫でている僕もここちよいが、\nポーレットも目を細め、うっとりとしてくれている。
2394 = "她頭髮的手感很好，波萊特也眯細了眼睛享受著我的撫摸。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいものだな。寝台列車は。\n聞いていた話以上だ。実に良い」
2037 = "「臥鋪車真好啊。百聞不如一見。真是太棒了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あー、ほっとする。\n双鉄くんに、そういう風に思ってもらえて」
1776 = "「啊，我放心了。還好你喜歡臥鋪車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほっと――とは。不安だったのか？」
1907 = "「放心？難道你擔心我不喜歡嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「不安でしたよー。\nわたしもこの列車、『ゆめぐり』は初めてでしたから」
1867 = "「對啊。因為我也是第一次坐這班列車——“夢巡”呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そういえば、[あおもり,1]蒼森だったか。\nポーレットとお父上との冬の旅は」
2052 = "「說起來，波萊特，你和令尊的冬季旅行是去青森吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。大事な――とても大事な、想い出の旅です」
1953 = "「是的，那次旅行的回憶對我來說非常重要」" 

# monologue
# JP: 少し、沈黙。\n想い出を、噛み締めてでもいるかのような。
2379 = "她彷彿在反芻著回憶一般沉默了一會。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……だから、[あおもり,1]蒼森の旅を。\nもう一度、新しい家族で繰り返してもよかったけど」
1236 = "「……所以，我原本是想以現在的新家庭再重溫一次青森之旅」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1800 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だけどやっぱり、初めての列車にしたかったんです。\n双鉄くんとひかりとれいなとの、初めての家族旅行は」
1621 = "「但是，第一次與雙鐵君、光和玲奈——我們全家人一起出去旅行，我還是想選擇一輛沒坐過的列車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。いろいろと考えてくれて、ありがとう」
1939 = "「是嗎。謝謝你為我們考慮了這麼多」" 

# monologue
# JP: なでなでと、ただポーレットを撫で続ける。
2438 = "我就這樣不停地摸著波萊特的頭。" 

# monologue
# JP: ポーレットは照れくさそうに身もだえし、\n至近距離から、じいっと僕の顔を見つめる。
2516 = "波萊特害羞地蜷縮了身子，在極近距離緊緊盯著我的臉。" 

# 【ポーレット】
# display as 波萊特
# JP: 「初めての旅だけど、同じ旅でもあるんです。これ」
2121 = "「雖然這是第一次的旅行，但也可以算是同樣的旅程」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　どういう意味だ」
1809 = "「嗯？　這是什麼意思」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ストーブ客車。パパといっしょに旅したこ。\nあのこ、今はみち鉄さんで元気にがんばってるんです」
1889 = "「我跟爸爸一起乘坐過的那台暖爐客車，現在正在陸鐵努力工作呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「みち鉄で――\nということは、[つってつ,2]津っ鐵から譲渡されたのか」
1829 = "「在陸鐵……也就是說，是被津輕鐵路轉讓過來了嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。巡り合わせ次第では、うちに――\n御一夜鉄道に来てくれる可能性もありました」
1946 = "「是的。原本如果有緣，她也有可能來到我們這裡——來到御一夜鐵路」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……」
2074 = "「這……」" 

# monologue
# JP: ポーレットとお父上とが旅をした、思い出の車両。
2635 = "那是波萊特和她父親出去旅行時所乘坐的火車，充滿了波萊特的童年回憶。" 

# monologue
# JP: どれほど迎えたかったのか――\n想像さえも、恐らく僕には出来ないだろう。
2367 = "她到底有多想接那台車回家呢？我甚至難以想像她的心情。" 

# 【双鉄】
# display as 雙鐵
# JP: 「残念だったな」
2018 = "「真遺憾啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ。マイントレジャーのためには、\n今の、[すんたい,1]駿袋鉄道さんに譲ってもらったこの方が適任です」
1966 = "「沒關係。若是為煤探樂園考慮的話，如今駿遠鐵路轉讓給我們的那台更合適」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば、残念というのは不適切な言葉かもな」
1940 = "「是嗎。那麼，看來我那句遺憾是失言了」" 

# monologue
# JP: 社長なのだと、つくづく思う。\nポーレットは経営者としての最適解を導いたのだと。
2457 = "我越來越覺得她真是一位稱職的社長。身為經營者，波萊特得出了最合適的答案。" 

# monologue
# JP: けれど同時に、\nポーレットは女の子で、僕の大事な妻でもあるのだ。
2293 = "但與此同時，波萊特也是一名女孩子，還是我深愛的妻子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……言い直そう。嬉しいことだな。\n思い出の列車と、また新しいレールの上で、再会できて」
1248 = "「……那容我換個說法吧。能與充滿回憶的列車在新的線路上再次相遇是一件值得高興的事」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
# 1764 = "「啊！」" 

# monologue
# JP: ぎゅうっと、ポーレットが僕の胸元に顔を埋める。
2517 = "波萊特把頭深深地埋進我的懷裡。" 

# monologue
# JP: また撫でる。いいこいいこと。\n何度も何度も、飽きることなく。
2436 = "我又撫摸起了她的腦袋。無論摸多少次也不會覺得厭煩。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……うん。嬉しい。とっても幸せ。\nほんとによかった。あのこがみち鉄さんで活躍できて」
1231 = "「……嗯，我好高興。我現在非常幸福。能看到她還能在陸鐵大顯身手真是太好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なによりのことだな」
1962 = "「沒有比這更好的了」" 

# monologue
# JP: 頷きつつ、ふと思ってしまう。\nストーブ客車は、やはり雪の中でもこそ映えるだろうと。
2461 = "我點點頭，然後忽然想到。暖爐客車是不是在雪中更加顯眼呢？" 

# 【双鉄】
# display as 雙鐵
# JP: 「[せんだい,1]仙岱近郊となると……\nそれほどには雪の降らない印象もあるが」
1604 = "「不過既然她去了仙台近郊……那邊好像並不怎麼下雪」" 

# 【ポーレット】
# display as 波萊特
# JP: 「確かに[せんだい,1]仙岱近郊だと[あおもり,1]蒼森程じゃないとは思います。\nけど、みち鉄さんは、仙岱―[なるこ,1]鳴呼間ですから」
2012 = "「的確，仙台近郊的雪不如青森的雪多。不過，陸鐵運行的是仙台至鳴子段」" 

# 【双鉄】
# display as 雙鐵
# JP: 「[なるこ,1]鳴呼……は、そうか、[やまあい,1]山間の土地か」
2127 = "「鳴子……對了，那裡是山地區域吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。御一夜と似た感じの交通難所で、その上雪深い。\n最初から観光のための手段として、鉄道を残した町です」
1931 = "「是啊。那裡與御一夜差不多，交通不便，而且經常降雪。那裡也是以觀光為目的從一開始就留下鐵路的城市」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
1780 = "「喔？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「冬こそ鉄道。雪の車窓を、みんなで楽しむ暖かさ。\nそれが武器だと――みち鉄さんは、わかってたんです」
1662 = "「冬天最適合乘火車旅行。車上的乘客可以一起在溫暖的車上欣賞窗外的雪景。陸鐵很明白，這就是鐵路的秘密武器」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、そうか。\n故に、この『ゆめぐり』号は、みち鉄さんの列車なのか」
2025 = "「確實，那就難怪這輛“夢巡”號是由陸鐵來開行的了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です。実用のために残されたとき鉄さんのレールを、\n観光のため、みち鉄さんが借りる形で、走らせてます」
1928 = "「是啊。這條常鐵的線路被保存下來，是為了實用，而陸鐵則為了觀光，向常鐵租借這條線路，在上面運行火車」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……そういう風にも、レールは繋がっていくのだな」
1228 = "「……原來線路也可以這樣聯繫起來啊」" 

# monologue
# JP: どんな思惑を乗せた列車も、\n軌間さえ同じであれば、走れる。
2530 = "無論列車上承載著怎樣的心意，只要軌距相同，便是通途。" 

# monologue
# JP: その単純な実例は、\n単純ゆえに、こころづよい。
2623 = "這單純的例子，正因為其單純，才讓人感到可靠。" 

# 【双鉄】
# display as 雙鐵
# JP: 「逆にいえば――[おもわく,1]思惑を持って貰えるのなら、\nレールは必ず、復活できるし、繋げられる」
1694 = "「反過來說，只要人的心意還在，鐵路就一定能夠復甦，一定能聯繫在一起」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。鉄道にもう一度、\n思惑を、夢を持ってもらえるのなら」
1921 = "「是啊。只要鐵路，能再一次寄託人們的心意，人們的夢想」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうしていくためにも、しっかりと体験しよう。\nストーブ列車も、この『ゆめぐり』号も――ああ」
1975 = "「為了實現這一點，我們也必須來好好體驗一下。體驗暖爐客車，還有這輛“夢巡”號……啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「どうかしました？　双鉄くん」
1882 = "「怎麼了，雙鐵君？」" 

# monologue
# JP: きょとん、とした顔。
2391 = "她露出嚇了一跳的表情。" 

# monologue
# JP: 単純にかわいらしいし、\n僕が先に気づけたのかと思えばそこも、かすかに嬉しい。
2636 = "那表情本來就很可愛，再一想是我先想到這個雙關的，就更讓我多了一絲開心。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや、ダブルミーニングかと思ったのだ。\n『湯を巡る』と、『夢を巡る』で、『ゆめぐり』かと」
1961 = "「沒什麼，我在想這個是不是雙關。這個“夢巡”的夢不光是溫泉，更是鐵路人的夢想」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！　そうかも！　っていうか、きっとそう！\nたくさんの人に、鉄道に夢を見て欲しいから、ゆめぐり」
1766 = "「啊！好像是的！一定是的！因為想讓好多人懷抱著對鐵道的夢想，才叫夢巡」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……話をしてみたいものだな。みち鉄の方と」
1240 = "「……真想跟陸鐵的工作人員好好聊聊啊」" 

# monologue
# JP: つくづく思う。
2452 = "我的這種想法越來越強烈。" 

# monologue
# JP: これほど離れた、断絶されたレールの上に、\nけれども確かな同士がいる、と。
2358 = "在分隔如此遙遠的線路上，卻真真切切地存在著我們的同志。" 

# 【双鉄】
# display as 雙鐵
# JP: 「願いは、僕らと同じだし、\nこの列車も、細かな点の配慮が素晴らしかった」
1616 = "「他們的願望與我們是一樣的。而且這輛列車上也有許多貼心的設計，真的很棒」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね！\n写真も撮りまくっちゃいました、し――」
1935 = "「是啊！而且我們還拍了好多照片……」" 

# monologue
# JP: 言って、ポーレットが沈黙してしまう。\n視線が合う。ふたり、同時に苦笑を漏らす。
2603 = "說著，波萊特忽然陷入沉默。我們的視線交會。兩人同時苦笑。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あれほど興味を持っているのに、\nどうして自分の目で見ないのか……もったいないな」
1911 = "「明明她這麼感興趣，為什麼不肯自己親眼去看呢……好浪費」" 

# 【ポーレット】
# display as 波萊特
# JP: 「……車掌さんとなら話せるかな？　って、\n少しだけ期待してたんですけど――」
1234 = "「……我還有點期待呢，說不定她會跟列車長說說話呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無理だったなぁ。……ポーレットも小さいころは、\nあれほどに人見知りだったのか？」
2013 = "「看來不行啊。……波萊特，你小時候有那麼怕生嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いえ、人の顔色を気にするこだったとは思いますけど\n――人見知り……人を怖がったりは、そんなに」
1963 = "「沒有，雖然我小時候很在意別人的臉色，但是沒有那麼怕生……沒有那麼害怕別人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だよなぁ。であればあのとき、\n僕に声をかけてくれてもいなかっただろうし――」
1887 = "「我想也是。要不然那時候，你也不會跟我搭話的」" 

# monologue
# JP: もしもそうなら。\nポーレットが救ってくれてなければ――
2400 = "如果她小時候和光一樣怕生，如果她沒有說出那句拯救我的話……" 

# monologue
# JP: 自分がどんな人生を歩んでいたか、\n想像するだけでも恐ろしい。
2446 = "我甚至想都不敢想，自己現在會過著怎樣的人生。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……出会いは、大事だ。\nその機会を、ひかりにはむざむざ失って欲しくはない」
1222 = "「……人與人的相遇，是很珍貴的。我不希望光輕易地錯過那樣的機會」" 

# 【ポーレット】
# display as 波萊特
# JP: 「鉄道仲間みたいなこ……\n例えば、同年代でできたりすると、嬉しいんですけど」
1852 = "「如果她能認識鐵路同好……要能剛好還是年紀相仿的孩子的話，我會很高興的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、ハチロク、れいなに、ニイロクまでもが\n英才教育をしているからな。同年代では、厳しかろう」
1619 = "「但是，波萊特、八六、玲奈、甚至二六都在一直對她進行鐵路英才教育。年紀相仿的孩子很難成為她的同好吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あー……かも。詳しすぎると、\n悔しがられていじめられちゃったりとかも、怖いし」
1759 = "「啊……好像是的。而且我很擔心她會不會因為太熟悉鐵路知識而被嫉妒、被欺負」" 

# monologue
# JP: ポーレットの声には実感がある。\n趣味の世界は、やはりどこでもそういうものかと思う。
2518 = "波萊特的聲音包含著一種現實感。我也覺得，果然任何興趣領域鑽研深了都是相似的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さりとて、\nひかりの興味のほとんどは鉄道に向いている」
2050 = "「話是這麼說，可光基本上只對鐵路有興趣啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「興味がないことを話す人に合わせるとか……\nひかりには、厳しすぎると思います」
1869 = "「對於光來說，要配合別人談論不感興趣的話題……可能還太難了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だよなぁ。が、いつまでも箱入りにもしておけん。\nやはり健やかに成長してほしい」
1920 = "「是啊。但是，我們也不能一直這樣嬌慣她。還是希望她能沐浴著外面的風雨健康成長」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい……」
1918 = "「是啊……」" 

# monologue
# JP: 人との出会い、関わり方。\n自分自身のことでさえ、コントロール困難な類のことだ。
2328 = "別說讓孩子掌握如何認識別人以及交往的方式了。她本身就算是很難掌控自己的類型。" 

# monologue
# JP: まして、ひかりのこととなると――\nどれほどの努力をしたとて、関われる部分はさらに減る。
2572 = "而且，對於我們和光的關係來說，不管做父母的如何努力，最終與她之間的聯繫也會不可避免地減少。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ともかく、家族以外と話せるようになることからだ。\n旅の間に、様子をみながら少しずつでも慣らしていこう」
1241 = "「……總之，先努力讓她能和家人以外的人交談吧。旅行的時候，我們就觀察她的狀況，讓她慢慢適應吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。わたしも、サポートします……ふぁ」
1795 = "「嗯。我也會幫你的……呼」" 

# monologue
# JP: あくびをしかけて、慌てて飲み込む。\n目元が、少し赤くなってる。
2371 = "她在快打哈欠的時候，慌忙忍住了。那眼角帶了點點紅暈。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふふ。ポーレットもゆめぐりの時間らしいな」
1708 = "「呵呵。波萊特，你也到了該巡夢的時間了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「かも、です。早くから準備とかしてたし――ふあ」
1703 = "「可能是吧。我一大早就開始收拾了……呼」" 

# 【双鉄】
# display as 雙鐵
# JP: 「無理せずに寝ろ。なんなら、ここで」
1669 = "「別熬著了，快睡吧。要不然就在這睡」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うれしいです。けど――ひかり、\n起きたときにわたしがいないと」
1634 = "「你讓我在這睡，我很高興。但是，光起床的時候，身邊必須有我在」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ……確かにな。\nこの列車内で泣かれては、同乗の方々にも迷惑か」
1784 = "「嗯……是啊。如果她在這裡哭起來的話，肯定會打擾到同車乘客」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですから、わたし、行きます――けど」
1892 = "「所以，我回去了——」" 

# monologue
# JP: すりっと、ポーレットの顔が僕の胸板に甘えてくる。\n小さな頭を両手でつかまえ、僕へと向かせる。
2519 = "波萊特的臉又蹭了蹭我的胸口。我伸出雙手抓住她小小的頭，讓她面對著我。" 

# 【双鉄】
# display as 雙鐵
# JP: 「旅の準備もなにもかも、\n頑張ってくれてるお礼――というか、ご褒美だ」
2053 = "「謝謝你準備旅行，還有在各種事情上都這麼努力，所以我想獎勵你」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――――（ちゅっ）」
1760 = "「啊……（啾）」" 

# monologue
# JP: 軽いキス。\nポーレットは幸せそうに、笑ってくれる。
2459 = "我輕輕一吻。波萊特幸福地笑了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんにも、頑張ってくれてるご褒美です！\n（ちゅっ！）」
1624 = "「你也很努力，我也給你獎勵！（啾！）」" 

# 【双鉄】
# display as 雙鐵
# JP: 「――うん。ありがとう」
1797 = "「嗯。謝謝你」" 

# monologue
# JP: くっついたまま、\n鼻先同士、おでこ同士をすりあわせる。
2432 = "我們仍然緊緊相擁，耳鬢廝磨著。" 

# monologue
# JP: 名残惜しいが、ここまでにして体を離す。\nこれ以上に血が熱くなれば、眠れなくなってしまうから。
2646 = "雖然很捨不得，但我倆就此分開了身體。如果再熱血上湧的話，我就睡不著了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、ごちそうさまでした。\nこれで明日も頑張れそう！　おやすみなさい、双鉄くん」
1712 = "「呵呵呵，多謝。這樣我明天也有動力了！晚安，雙鐵君」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、おやすみ、ポーレット」
1807 = "「嗯，晚安，波萊特」" 

# monologue
# JP: （シャーっ）
2684 = "（沙——）" 

# monologue
# JP: カーテンを開けてまた閉めて、\nポーレットは向かいの寝台へと戻っていく。
2570 = "簾子拉開，隨後又合上。波萊特回到了對面的鋪位。" 

# monologue
# JP: （……あれほど軽いキスだったのにな）
2662 = "（……明明那輕吻不過蜻蜓點水一般）" 

# monologue
# JP: 胸が高なり、体が騒いでしまっている。\n瞳を閉じて、レールのつなぎ目の数でも数えてみよう。
2450 = "我的心卻跳個不停，身體也難以平靜下來。我閉上眼睛，試著開始數鐵軌接縫。" 

# monologue
# JP: （目が覚めたとき……どこまでたどり着けているのか）
2688 = "（等我醒來的時候……不知能見到怎樣的景色呢）" 

# monologue
# JP: 雪景色なら、嬉しかろう。\nもしもそうならひかりにとっては、初めての雪だ。
2584 = "若是雪景，我一定會很開心。若真是雪景，那就會是光第一次見到雪。" 

# monologue
# JP: （笑顔になるのか――驚いて固まってしまうかな？）
2681 = "（她是會笑呢，還是會驚訝得動彈不得呢？）" 

# monologue
# JP: どちらにしても、それは最高の瞬間となる。\n絶対、見逃したくは無い。
2531 = "無論如何，那對我來說都會是最棒的瞬間，絕對不容錯過。" 
