2052 = "「Nhắc mới nhớ, chuyến du lịch mùa đông của Paulette và ba em là ở Aomori phải không.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。大事な――とても大事な、想い出の旅です」
1953 = "「Vâng. Đó là chuyến du lịch kỷ niệm quan trọng—— rất quan trọng đối với em.」"
# monologue
# JP: 少し、沈黙。\n想い出を、噛み締めてでもいるかのような。
2379 = "Một thoáng im lặng. Như thể em ấy đang nhấm nháp lại những kỷ niệm."
# 【ポーレット】
# display as 波萊特
# JP: 「……だから、[あおもり,1]蒼森の旅を。\nもう一度、新しい家族で繰り返してもよかったけど」
1236 = "「……Thế nên, chuyến đi Aomori. Lẽ ra em có thể đi lại một lần nữa cùng với gia đình mới của mình.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1800 = "「嗯」" 
# 【ポーレット】
# display as 波萊特
# JP: 「だけどやっぱり、初めての列車にしたかったんです。\n双鉄くんとひかりとれいなとの、初めての家族旅行は」
1621 = "「Nhưng quả nhiên em vẫn muốn chọn một chuyến tàu mà mình chưa từng đi. Chuyến du lịch gia đình đầu tiên của anh Soutetsu, Hikari và Reina.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。いろいろと考えてくれて、ありがとう」
1939 = "「Vậy sao. Cảm ơn em vì đã suy nghĩ rất nhiều.」"
# monologue
# JP: なでなでと、ただポーレットを撫で続ける。
2438 = "Tôi cứ thế tiếp tục vuốt ve Paulette."
# monologue
# JP: ポーレットは照れくさそうに身もだえし、\n至近距離から、じいっと僕の顔を見つめる。
2516 = "Paulette vặn vẹo cơ thể có vẻ ngại ngùng, rồi từ khoảng cách rất gần, em ấy chăm chú nhìn vào mặt tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「初めての旅だけど、同じ旅でもあるんです。これ」
2121 = "「Tuy là chuyến đi đầu tiên, nhưng cũng là chuyến đi quen thuộc. Chuyến đi này ấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？　どういう意味だ」
1809 = "「Hửm? Ý em là sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ストーブ客車。パパといっしょに旅したこ。\nあのこ、今はみち鉄さんで元気にがんばってるんです」
1889 = "「Toa xe sưởi ấm. Cô bé mà em đã cùng ba đi du lịch ấy. Cô bé đó, hiện giờ đang nỗ lực hết mình ở Michitetsu đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「みち鉄で――\nということは、[つってつ,2]津っ鐵から譲渡されたのか」
1829 = "「Ở Michitetsu sao—— Vậy có nghĩa là, cô bé đó được nhượng lại từ Tsuttetsu à.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。巡り合わせ次第では、うちに――\n御一夜鉄道に来てくれる可能性もありました」
1946 = "「Vâng. Tùy thuộc vào duyên số, cô bé đó cũng có khả năng—— Đến với Đường sắt Ohito của chúng ta đấy ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは……」
2074 = "「Chuyện đó……」"
# monologue
# JP: ポーレットとお父上とが旅をした、思い出の車両。
2635 = "Toa xe kỷ niệm mà Paulette đã từng cùng ba đi du lịch."
# monologue
# JP: どれほど迎えたかったのか――\n想像さえも、恐らく僕には出来ないだろう。
2367 = "Em ấy hẳn đã mong muốn đón cô bé đó về đến nhường nào—— Có lẽ tôi thậm chí còn không thể tưởng tượng được."
# 【双鉄】
# display as 雙鐵
# JP: 「残念だったな」
2018 = "「Tiếc thật nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ。マイントレジャーのためには、\n今の、[すんたい,1]駿袋鉄道さんに譲ってもらったこの方が適任です」
1966 = "「Không đâu ạ. Vì lợi ích của Mine Treasure, cô bé được nhượng lại từ Đường sắt Suntetsu hiện tại mới là người phù hợp nhất.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか。ならば、残念というのは不適切な言葉かもな」
1940 = "「Vậy sao. Nếu thế thì, có lẽ dùng từ \"tiếc\" là không thích hợp rồi.」"
# monologue
# JP: 社長なのだと、つくづく思う。\nポーレットは経営者としての最適解を導いたのだと。
2457 = "Tôi thực sự cảm thấy em ấy đúng là một vị giám đốc. Paulette đã đưa ra giải pháp tối ưu nhất với tư cách là một nhà quản lý."
# monologue
# JP: けれど同時に、\nポーレットは女の子で、僕の大事な妻でもあるのだ。
2293 = "Nhưng đồng thời, Paulette cũng là một cô gái, và cũng là người vợ thân yêu của tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「……言い直そう。嬉しいことだな。\n思い出の列車と、また新しいレールの上で、再会できて」
1248 = "「……Để anh nói lại nhé. Thật đáng mừng. Khi em có thể gặp lại chuyến tàu kỷ niệm trên một tuyến đường ray mới.」"
# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
# 1764 = "「啊！」" 
# monologue
# JP: ぎゅうっと、ポーレットが僕の胸元に顔を埋める。
2517 = "Paulette ôm chặt lấy tôi, vùi mặt vào ngực tôi."
# monologue
# JP: また撫でる。いいこいいこと。\n何度も何度も、飽きることなく。
2436 = "Tôi lại tiếp tục vuốt ve em ấy. Ngoan nào ngoan nào. Vuốt ve hết lần này đến lần khác, không hề biết chán."
# 【ポーレット】
# display as 波萊特
# JP: 「……うん。嬉しい。とっても幸せ。\nほんとによかった。あのこがみち鉄さんで活躍できて」
1231 = "「……Vâng. Em vui lắm. Rất hạnh phúc. Thật sự rất tuyệt. Khi cô bé đó có thể hoạt động tích cực ở Michitetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なによりのことだな」
1962 = "「Đó là điều tuyệt vời nhất rồi.」"
# monologue
# JP: 頷きつつ、ふと思ってしまう。\nストーブ客車は、やはり雪の中でもこそ映えるだろうと。
2461 = "Vừa gật đầu, tôi chợt nghĩ ra một điều. Toa xe sưởi ấm, quả nhiên là sẽ rất nổi bật trong khung cảnh tuyết trắng."
# 【双鉄】
# display as 雙鐵
# JP: 「[せんだい,1]仙岱近郊となると……\nそれほどには雪の降らない印象もあるが」
1604 = "「Nếu là vùng ngoại ô Sendai thì…… Anh có ấn tượng là tuyết không rơi nhiều đến thế.」"
# 【ポーレット】
# display as 波萊特
# JP: 「確かに[せんだい,1]仙岱近郊だと[あおもり,1]蒼森程じゃないとは思います。\nけど、みち鉄さんは、仙岱―[なるこ,1]鳴呼間ですから」
2012 = "「Đúng là vùng ngoại ô Sendai thì không nhiều tuyết bằng Aomori. Nhưng tuyến Michitetsu chạy giữa Sendai và Naruko cơ mà.」"
# 【双鉄】
# display as 雙鐵
# JP: 「[なるこ,1]鳴呼……は、そうか、[やまあい,1]山間の土地か」
2127 = "「Naruko…… à, ra vậy, là vùng đồi núi sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。御一夜と似た感じの交通難所で、その上雪深い。\n最初から観光のための手段として、鉄道を残した町です」
1931 = "「Vâng. Là một nơi giao thông khó khăn giống như Ohito, hơn nữa tuyết lại rơi dày. Đây là thị trấn giữ lại đường sắt ngay từ đầu như một phương tiện phục vụ du lịch.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
1780 = "「Ồ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「冬こそ鉄道。雪の車窓を、みんなで楽しむ暖かさ。\nそれが武器だと――みち鉄さんは、わかってたんです」
1662 = "「Mùa đông chính là lúc dành cho đường sắt. Sự ấm áp khi mọi người cùng nhau thưởng thức khung cảnh tuyết trắng ngoài cửa sổ. Michitetsu hiểu rõ đó chính là vũ khí của họ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、そうか。\n故に、この『ゆめぐり』号は、みち鉄さんの列車なのか」
2025 = "「Ra là vậy. Vì thế nên chuyến tàu 『Yumeguri』 này mới là của Michitetsu sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「です。実用のために残されたとき鉄さんのレールを、\n観光のため、みち鉄さんが借りる形で、走らせてます」
1928 = "「Vâng. Họ mượn tuyến đường ray của Tokitetsu, vốn được giữ lại vì mục đích thực dụng, để chạy tàu phục vụ du lịch.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そういう風にも、レールは繋がっていくのだな」
1228 = "「……Đường ray cũng có thể kết nối với nhau theo cách đó nhỉ.」"
# monologue
# JP: どんな思惑を乗せた列車も、\n軌間さえ同じであれば、走れる。
2530 = "Bất kể chuyến tàu mang theo kỳ vọng gì, chỉ cần khổ đường ray giống nhau là có thể chạy được."
# monologue
# JP: その単純な実例は、\n単純ゆえに、こころづよい。
2623 = "Một ví dụ thực tế đơn giản, và chính vì đơn giản nên nó mang lại cảm giác thật vững tâm."
# 【双鉄】
# display as 雙鐵
# JP: 「逆にいえば――[おもわく,1]思惑を持って貰えるのなら、\nレールは必ず、復活できるし、繋げられる」
1694 = "「Nói ngược lại—— nếu có thể nhận được sự kỳ vọng, đường ray nhất định có thể hồi sinh, và có thể kết nối lại với nhau.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。鉄道にもう一度、\n思惑を、夢を持ってもらえるのなら」
1921 = "「Đúng vậy. Nếu đường sắt một lần nữa, có thể mang theo kỳ vọng, mang theo những giấc mơ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうしていくためにも、しっかりと体験しよう。\nストーブ列車も、この『ゆめぐり』号も――ああ」
1975 = "「Để làm được điều đó, chúng ta hãy trải nghiệm thật kỹ nhé. Cả chuyến tàu sưởi ấm, và cả chuyến tàu 『Yumeguri』 này nữa—— a.」"
# 【ポーレット】
# display as 波萊特
# JP: 「どうかしました？　双鉄くん」
1882 = "「Sao thế ạ? Anh Soutetsu.」"
# monologue
# JP: きょとん、とした顔。
2391 = "Khuôn mặt ngơ ngác."
# monologue
# JP: 単純にかわいらしいし、\n僕が先に気づけたのかと思えばそこも、かすかに嬉しい。
2636 = "Trông em ấy thật đáng yêu, và việc tôi là người nhận ra điều đó trước cũng khiến tôi cảm thấy đôi chút vui sướng."
# 【双鉄】
# display as 雙鐵
# JP: 「いや、ダブルミーニングかと思ったのだ。\n『湯を巡る』と、『夢を巡る』で、『ゆめぐり』かと」
1961 = "「Không, anh đang nghĩ đó có phải là chơi chữ không. 『Dạo quanh suối nước nóng (Yu wo meguru)』 và 『Dạo quanh những giấc mơ (Yume wo meguru)』, nên mới là 『Yumeguri』.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！　そうかも！　っていうか、きっとそう！\nたくさんの人に、鉄道に夢を見て欲しいから、ゆめぐり」
1766 = "「A! Có thể lắm! Nói đúng hơn, chắc chắn là vậy rồi! Vì họ muốn mang đến giấc mơ về đường sắt cho thật nhiều người, nên mới là Yumeguri.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……話をしてみたいものだな。みち鉄の方と」
1240 = "「……Anh muốn nói chuyện thử xem sao. Với người của Michitetsu ấy.」"
# monologue
# JP: つくづく思う。
2452 = "Tôi thực sự nghĩ vậy."
# monologue
# JP: これほど離れた、断絶されたレールの上に、\nけれども確かな同士がいる、と。
2358 = "Trên những tuyến đường ray xa xôi và bị chia cắt thế này, vậy mà vẫn có những người đồng chí đích thực."
# 【双鉄】
# display as 雙鐵
# JP: 「願いは、僕らと同じだし、\nこの列車も、細かな点の配慮が素晴らしかった」
1616 = "「Mong muốn của họ cũng giống hệt chúng ta, và chuyến tàu này cũng có sự chăm chút đến từng chi tiết vô cùng tuyệt vời.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね！\n写真も撮りまくっちゃいました、し――」
1935 = "「Đúng vậy!\nEm cũng đã chụp rất nhiều ảnh rồi, và——」"
# monologue
# JP: 言って、ポーレットが沈黙してしまう。\n視線が合う。ふたり、同時に苦笑を漏らす。
2603 = "Nói đến đó, Paulette bỗng im bặt. Ánh mắt chạm nhau. Cả hai cùng lúc nở nụ cười gượng."
# 【双鉄】
# display as 雙鐵
# JP: 「あれほど興味を持っているのに、\nどうして自分の目で見ないのか……もったいないな」
1911 = "「Rõ ràng là con bé có hứng thú đến thế, vậy mà tại sao lại không tự mình tận mắt chứng kiến chứ…… thật đáng tiếc.」"
# 【ポーレット】
# display as 波萊特
# JP: 「……車掌さんとなら話せるかな？　って、\n少しだけ期待してたんですけど――」
1234 = "「……Em đã hơi kỳ vọng rằng, biết đâu con bé có thể nói chuyện được với bác trưởng tàu——」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理だったなぁ。……ポーレットも小さいころは、\nあれほどに人見知りだったのか？」
2013 = "「Đúng là không thể nào. ……Paulette hồi nhỏ, có nhút nhát đến mức đó không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「いえ、人の顔色を気にするこだったとは思いますけど\n――人見知り……人を怖がったりは、そんなに」
1963 = "「Không đâu ạ, mặc dù em nghĩ mình là đứa trẻ hay để ý đến sắc mặt người khác, nhưng nhút nhát…… sợ hãi người khác thì không đến mức đó.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよなぁ。であればあのとき、\n僕に声をかけてくれてもいなかっただろうし――」
1887 = "「Anh cũng nghĩ vậy. Nếu thế thì lúc đó, em đã chẳng bắt chuyện với anh rồi——」"
# monologue
# JP: もしもそうなら。\nポーレットが救ってくれてなければ――
2400 = "Giả sử như vậy.\nNếu Paulette không cứu rỗi tôi——"
# monologue
# JP: 自分がどんな人生を歩んでいたか、\n想像するだけでも恐ろしい。
2446 = "Tôi sẽ bước vào một cuộc đời như thế nào đây, chỉ tưởng tượng thôi cũng thấy đáng sợ rồi."
# 【双鉄】
# display as 雙鐵
# JP: 「……出会いは、大事だ。\nその機会を、ひかりにはむざむざ失って欲しくはない」
1222 = "「……Sự gặp gỡ rất quan trọng. Anh không muốn Hikari đánh mất cơ hội đó một cách vô ích.」"
# 【ポーレット】
# display as 波萊特
# JP: 「鉄道仲間みたいなこ……\n例えば、同年代でできたりすると、嬉しいんですけど」
1852 = "「Một người bạn đường sắt…… Ví dụ như nếu con bé có thể kết bạn cùng trang lứa thì em sẽ vui lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、ハチロク、れいなに、ニイロクまでもが\n英才教育をしているからな。同年代では、厳しかろう」
1619 = "「Paulette, Hachiroku, Reina, và cả Niiroku nữa, mọi người đang giáo dục con bé theo kiểu đào tạo nhân tài mà. Bạn cùng trang lứa thì chắc là khó đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あー……かも。詳しすぎると、\n悔しがられていじめられちゃったりとかも、怖いし」
1759 = "「A…… có lẽ vậy. Nếu biết quá nhiều, em sợ con bé sẽ bị ghen tị rồi bị bắt nạt mất.」"
# monologue
# JP: ポーレットの声には実感がある。\n趣味の世界は、やはりどこでもそういうものかと思う。
2518 = "Giọng Paulette nghe rất chân thực. Tôi nghĩ thế giới sở thích thì ở đâu cũng vậy thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「さりとて、\nひかりの興味のほとんどは鉄道に向いている」
2050 = "「Tuy nhiên, hầu hết sự hứng thú của Hikari đều hướng về đường sắt.」"
# 【ポーレット】
# display as 波萊特
# JP: 「興味がないことを話す人に合わせるとか……\nひかりには、厳しすぎると思います」
1869 = "「Bắt con bé phải hùa theo những người nói về những chuyện mà nó không hứng thú…… Em nghĩ điều đó quá khắc nghiệt với Hikari.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だよなぁ。が、いつまでも箱入りにもしておけん。\nやはり健やかに成長してほしい」
1920 = "「Đúng vậy nhỉ. Nhưng chúng ta cũng không thể cứ giấu con bé trong tủ kính mãi được. Anh vẫn mong con bé lớn lên khỏe mạnh.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい……」
1918 = "「Vâng……」"
# monologue
# JP: 人との出会い、関わり方。\n自分自身のことでさえ、コントロール困難な類のことだ。
2328 = "Cách gặp gỡ, cách giao tiếp với mọi người. Đó là những thứ mà ngay cả bản thân mình cũng khó lòng kiểm soát được."
# monologue
# JP: まして、ひかりのこととなると――\nどれほどの努力をしたとて、関われる部分はさらに減る。
2572 = "Huống hồ đây lại là chuyện của Hikari—— Dù chúng ta có nỗ lực đến đâu, phần mà chúng ta có thể can thiệp vào sẽ ngày càng ít đi."
# 【双鉄】
# display as 雙鐵
# JP: 「……ともかく、家族以外と話せるようになることからだ。\n旅の間に、様子をみながら少しずつでも慣らしていこう」
1241 = "「……Dù sao thì, trước tiên phải để con bé có thể nói chuyện được với người ngoài gia đình đã. Trong chuyến đi này, chúng ta hãy vừa quan sát tình hình vừa tập cho con bé quen dần từng chút một nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですね。わたしも、サポートします……ふぁ」
1795 = "「Vâng. Em cũng sẽ hỗ trợ…… fua.」"
# monologue
# JP: あくびをしかけて、慌てて飲み込む。\n目元が、少し赤くなってる。
2371 = "Em ấy định ngáp, nhưng vội vàng nuốt lại. Khóe mắt hơi ửng đỏ."
# 【双鉄】
# display as 雙鐵
# JP: 「ふふ。ポーレットもゆめぐりの時間らしいな」
1708 = "「Fufu. Có vẻ như Paulette cũng đến giờ Yumeguri rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「かも、です。早くから準備とかしてたし――ふあ」
1703 = "「Có lẽ vậy ạ. Dù sao thì em cũng đã chuẩn bị từ sớm—— fua.」"
# 【双鉄】
# display as 雙鐵
# JP: 「無理せずに寝ろ。なんなら、ここで」
1669 = "「Đừng cố quá, ngủ đi em. Cùng lắm thì ngủ ở đây cũng được.」"
# 【ポーレット】
# display as 波萊特
# JP: 「うれしいです。けど――ひかり、\n起きたときにわたしがいないと」
1634 = "「Em vui lắm. Nhưng mà—— Hikari, lúc con bé tỉnh dậy mà không thấy em thì.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……確かにな。\nこの列車内で泣かれては、同乗の方々にも迷惑か」
1784 = "「A…… Đúng là vậy nhỉ. Nếu con bé khóc lóc ầm ĩ trên chuyến tàu này thì sẽ làm phiền những hành khách khác mất.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ですから、わたし、行きます――けど」
1892 = "「Đính chính lại. Ngon quá!」"
# monologue
# JP: すりっと、ポーレットの顔が僕の胸板に甘えてくる。\n小さな頭を両手でつかまえ、僕へと向かせる。
2519 = "「Không cần thêm câu đính chính đâu con.」"
# 【双鉄】
# display as 雙鐵
# JP: 「旅の準備もなにもかも、\n頑張ってくれてるお礼――というか、ご褒美だ」
2053 = "「Không cần thêm câu đính chính đâu con~」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――――（ちゅっ）」
1760 = "「Fufufu. Bé Hikari thích bắt chước nhỉ.」"
# monologue
# JP: 軽いキス。\nポーレットは幸せそうに、笑ってくれる。
2459 = "「Fufufu, Hikari thích bắt chước mà~」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんにも、頑張ってくれてるご褒美です！\n（ちゅっ！）」
1624 = "（♪~）"
# 【双鉄】
# display as 雙鐵
# JP: 「――うん。ありがとう」
1797 = "Phát thanh trên tàu. Ngay khoảnh khắc âm thanh vang lên, đôi mắt Hikari càng thêm lấp lánh."
# monologue
# JP: くっついたまま、\n鼻先同士、おでこ同士をすりあわせる。
2432 = "「Là khúc dạ khúc Heykens!」"
# monologue
# JP: 名残惜しいが、ここまでにして体を離す。\nこれ以上に血が熱くなれば、眠れなくなってしまうから。
2646 = "「Hửm?」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、ごちそうさまでした。\nこれで明日も頑張れそう！　おやすみなさい、双鉄くん」
1712 = "「Đây là bản nhạc biểu tượng của các chuyến tàu đường dài thời Đế Thiết cũ. Thật vui khi họ lại chăm chút đến mức này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、おやすみ、ポーレット」
1807 = "「Vui quá, hoài niệm quá~」"
# monologue
# JP: （シャーっ）
2684 = "……Một đứa trẻ 4 tuổi, rõ ràng chưa từng có cơ hội trải nghiệm, lại cảm thấy hoài niệm về chuyến tàu đường dài thời Đế Thiết."
# monologue
# JP: カーテンを開けてまた閉めて、\nポーレットは向かいの寝台へと戻っていく。
2570 = "Sự đáng sợ của giáo dục—— hay nói đúng hơn là sự kinh khủng của nó, như được phơi bày rõ mồn một trước mắt tôi."
# monologue
# JP: （……あれほど軽いキスだったのにな）
2662 = "「Chào buổi sáng quý hành khách. Đoàn tàu sắp sửa đến ga Iwaki.」"
# monologue
# JP: 胸が高なり、体が騒いでしまっている。\n瞳を閉じて、レールのつなぎ目の数でも数えてみよう。
2450 = "「Hả? Mới đến Iwaki thôi sao?」"
# monologue
# JP: （目が覚めたとき……どこまでたどり着けているのか）
2688 = "Nghe vậy, tôi hướng mắt ra ngoài cửa sổ. Cảnh vật trôi qua một cách chậm chạp."
# monologue
# JP: 雪景色なら、嬉しかろう。\nもしもそうならひかりにとっては、初めての雪だ。
2584 = "Chẳng lẽ…… tàu đang chạy giảm tốc sao?」"
# monologue
# JP: （笑顔になるのか――驚いて固まってしまうかな？）
2681 = "「Chậm hơn lịch trình dự kiến 130 phút rồi nha.」"
# monologue
# JP: どちらにしても、それは最高の瞬間となる。\n絶対、見逃したくは無い。
2531 = "「Oa oa! Tiền vé tàu tốc hành được miễn phí luôn!」"
