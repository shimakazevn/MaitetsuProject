1225 = "Paulette"

[character_subs]
1515 = "Soutetsu"
1441 = "Paulette"

[script]
# lines: 197 
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
1013 = "「Hửm?」"
# monologue
# JP: 流れが止まる。
1313 = "Dòng chảy dừng lại."
# monologue
# JP: 悲しく歌うようだった、\nそぼふる雨のようだった――音の流れが。
1510 = "Dòng âm thanh―― như một khúc ca buồn, như một cơn mưa phùn――đã dừng lại."
# 【ポーレット】
# display as 波萊特
# JP: 「うん……わかった」
1019 = "「Vâng......con hiểu rồi.」"
# monologue
# JP: 音が、変わる。日ノ本語に。\n僕にわかる音――言葉へと。
1332 = "Âm thanh, thay đổi. Chuyển sang tiếng Hinomoto. Chuyển sang âm thanh――ngôn ngữ mà tôi có thể hiểu được."
# 【ポーレット】
# display as 波萊特
# JP: 「……ママと話せて――聞かせてもらえてうれしかった。\nすぐにじゃないかもしれないけど、また電話すると思う」
847 = "「......Được nói chuyện với mẹ――được nghe mẹ nói con rất vui. Có thể không phải là ngay lập tức, nhưng con nghĩ con sẽ gọi lại.」"
# monologue
# JP: ならば、聞かせてくれている。\nポーレットは僕に、自分の気持ちを。
1512 = "Nếu vậy, cô ấy đang cho tôi nghe. Paulette đang cho tôi nghe tâm tư của cô ấy."
# monologue
# JP: フランク語で交わし合っていた奔流のような会話の果て、\n行き着いた場所が、どこであるかを。
1520 = "Nơi cô ấy đã đi đến, sau cuộc trò chuyện tuôn trào như thác đổ bằng tiếng Frank."
# 【ポーレット】
# display as 波萊特
# JP: 「そう、だね。うん――大丈夫だよ？　それじゃあ、また。\nあ！　あとね、ママ……ううん、おかあさん」
1088 = "「Đúng, vậy nhỉ. Vâng――con không sao đâu. Vậy nhé, hẹn gặp lại. A! Còn nữa, Mama......không, mẹ ơi.」"
# monologue
# JP: 沈黙。長い――あまりに長い。\n端で聞いてる僕がどんどん不安になるほど……っ！？
1337 = "Sự im lặng. Dài――quá dài. Đến mức người nghe ở đầu dây bên này là tôi cũng ngày càng thấy bất an......!?"
# monologue
# JP: （いや――まて、僕）
1525 = "（Không――khoan đã, mình）"
# monologue
# JP: 日ノ本語への切り替え＝僕にも聞かせてくれるため、と\n勝手に思い込んでしまっていたが。
1336 = "Việc chuyển sang tiếng Hinomoto = để cho tôi nghe, tôi đã tự ý cho là như vậy."
# monologue
# JP: よく考えれば、これは単なる立ち聞きなのでは――
1262 = "Nghĩ kỹ lại thì, đây chẳng phải chỉ là nghe lén thôi sao――"
# 【ポーレット】
# display as 波萊特
# JP: 「パパと結婚してくれて――\nわたしのおかあさんになってくれて、ありがとう」
1135 = "「Cảm ơn mẹ――vì đã kết hôn với ba―― và trở thành mẹ của con.」"
# monologue
# JP: （ああ……）
1528 = "（A......）"
# monologue
# JP: 立ち聞きではない。\nポーレットは、やはり伝えてくれていたのだ。
1502 = "Không phải là nghe lén. Quả nhiên Paulette đang muốn truyền đạt cho tôi."
# monologue
# JP: 自らを縛り続けてきた過去の戒めを、\n鮮やかに振りほどく、その一言を。
1478 = "Một câu nói đó, đã rũ bỏ một cách ngoạn mục những lời răn đe của quá khứ vẫn luôn trói buộc bản thân cô ấy."
# 【ポーレット】
# display as 波萊特
# JP: 「…………ふぅ」
827 = "「............Phù.」"
# monologue
# JP: 疲れきっているようにも聞こえ、\n満足しきったようにも聞こえる、長い息。
1341 = "Một tiếng thở dài, nghe như kiệt sức, nhưng cũng nghe như hoàn toàn mãn nguyện."
# monologue
# JP: そうして足音――\nポーレットがこちらへと近づいてくる。
1252 = "Sau đó là tiếng bước chân―― Paulette đang tiến về phía này."
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます。居てくれて」
1134 = "「Cảm ơn anh. Vì đã ở đây.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、何――」
958 = "「Không, có gì đâu――」"
# monologue
# JP: “電話をするから、居て欲しい”
815 = "“Tôi sẽ gọi điện, nên mong anh hãy ở lại đây”"
# monologue
# JP: 宮本さんから受け取った電話番号を伝えた僕に、\nポーレットが頼んだのはただ、それだけだった。
1394 = "Đó là tất cả những gì Paulette yêu cầu, khi tôi đưa cho cô ấy số điện thoại nhận từ cô Miyamoto."
# 【双鉄】
# display as 雙鐵
# JP: 「僕など……本当に居ただけだ」
1072 = "「Tôi thì......thực sự chỉ ở đây thôi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「居てくれるのが、嬉しいんです」
1160 = "「Anh ở đây, là tôi vui rồi.」"
# monologue
# JP: おっとり微笑み、ポーレットは目を、壁の時計へと向ける。\n日付が変わって、二時間以上が経過している。
1450 = "Mỉm cười dịu dàng, Paulette hướng mắt về phía chiếc đồng hồ treo tường. Đã qua ngày mới, và hơn hai tiếng đồng hồ đã trôi qua."
# monologue
# JP: 宮司達はとうに帰った。僕らの結論に従うとただ言い残し。\n奮戦むなしく、れいなも睡魔に打ち負かされた。
1351 = "Đại tư tế và mọi người đã về từ lâu. Chỉ để lại lời nhắn sẽ tuân theo quyết định của chúng tôi. Dù đã cố gắng chống cự, Reina cũng bị cơn buồn ngủ đánh bại."
# 【ポーレット】
# display as 波萊特
# JP: 「長電話にも程がある、って話ですよね」
1044 = "「Gọi điện thoại lâu cũng phải có mức độ thôi, anh nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――むしろ短かったんじゃないか？」
951 = "「Không――tôi lại thấy thế là ngắn đấy chứ?」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？」
1011 = "「Hả?」"
# 【双鉄】
# display as 雙鐵
# JP: 「つのる話を考えればさ。\n何年ぶりかなのだろう？　[おやこ,1]母娘の会話は」
975 = "「Nghĩ đến những chuyện chất chứa trong lòng ấy. Đã bao nhiêu năm rồi nhỉ? Cuộc trò chuyện giữa hai mẹ con.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あー……そうですね」
1016 = "「A......Đúng vậy nhỉ.」"
# monologue
# JP: くったりと、\nポーレットは椅子に体を預けきる。
1444 = "Mệt mỏi, Paulette tựa hẳn người vào ghế."
# 【ポーレット】
# display as 波萊特
# JP: 「……まともな会話は――ほんと、何年ぶりでしょう？\nパパとこじれてからの間は……ママ、完全にパニックで」
836 = "「......Một cuộc trò chuyện đàng hoàng――thật sự là bao nhiêu năm rồi nhỉ? Kể từ lúc mẹ và ba xảy ra xích mích......mẹ hoàn toàn hoảng loạn.」"
# monologue
# JP: 話していいか？　とポーレットは目で問うてくる。\nもちろん、僕に否やは無い。
1447 = "Tôi nói chuyện này được không? Ánh mắt Paulette như muốn hỏi vậy. Tất nhiên, tôi không có lý do gì để từ chối."
# monologue
# JP: 少しだけ待てと緑茶を淹れて、\nじっくりと聞く体勢を整え、腰をかけ直す。
1411 = "Tôi bảo cô ấy đợi một chút rồi đi pha trà xanh, chuẩn bị tư thế sẵn sàng lắng nghe và ngồi xuống."
# 【ポーレット】
# display as 波萊特
# JP: 「ありがとうございます」
1136 = "「Cảm ơn anh.」"
# monologue
# JP: ゆるやかに、ポーレットは緑茶を喉へと落とし、\n長く熱っぽい息を吐く。
1443 = "Paulette chậm rãi uống ngụm trà xanh, rồi thở ra một hơi dài ấm nóng."
# 【ポーレット】
# display as 波萊特
# JP: 「あったかいです。おいしい――\nわたし、喉カラカラだったんですね」
997 = "「Ấm quá. Ngon thật―― Thì ra cổ họng tôi đã khô khốc rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「だろうな」
1069 = "「Chắc là vậy rồi.」"
# monologue
# JP: 意味がわからぬフランク語を聴き続けてただけの僕さえ、\nいつの間にか喉がカラカラだ。
1387 = "Ngay cả tôi, người chỉ nghe thứ tiếng Frank không hiểu ý nghĩa, cũng cảm thấy khát khô cả cổ từ lúc nào không hay."
# monologue
# JP: 喜怒哀楽、声の調子が変わる度、内容を想像してしまい\n――手にはじっとり、ねばつく汗さえ握ってしまった。
1428 = "Mỗi khi âm điệu hỉ nộ ái ố thay đổi, tôi lại tưởng tượng ra nội dung ――đến mức lòng bàn tay ướt đẫm mồ hôi dính dấp."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしの両親、事業をやってたんです。\n個人輸入の代行業で――上手くまわってたみたいです」
1071 = "「Ba mẹ tôi từng kinh doanh. Làm đại lý nhập khẩu cá nhân――có vẻ như công việc làm ăn rất thuận lợi.」"
# monologue
# JP: 社員を雇い事務所を増やし、受注は右肩上がりを続け――\nその好循環を崩したのは、ほんの小さなきっかけだった。
1508 = "Thuê nhân viên, mở thêm văn phòng, đơn đặt hàng liên tục tăng cao―― Điều phá vỡ vòng tuần hoàn tốt đẹp đó, chỉ là một nguyên cớ rất nhỏ."
# 【ポーレット】
# display as 波萊特
# JP: 「\\x%lエアクラ;#00ffc040;エアクラ%l;#;工場誘致の話が御一夜にあるって聞いて――\nそれでパパ、反対運動に協力することにしたんです」
1121 = "「Nghe nói có chuyện mời gọi nhà máy \\x%lエアクラ;#00ffc040;Aircra%l;# đến Ohimitera―― Nên ba tôi quyết định hợp tác với phong trào phản đối.」"
# monologue
# JP: 誘致の声が活発化する前に撤回させる――\nその考えは、しかし上手くは運ばなかった。
1446 = "Phải khiến họ rút lui trước khi tiếng nói ủng hộ mời gọi trở nên sôi nổi―― Tuy nhiên, suy nghĩ đó đã không diễn ra suôn sẻ."
# monologue
# JP: 宝生元忠――隈元銀行が、\n誘致運動の後押しを開始したからだ。
1315 = "Bởi vì Houshou Mototada――Ngân hàng Kumamoto, đã bắt đầu hậu thuẫn cho phong trào mời gọi."
# 【ポーレット】
# display as 波萊特
# JP: 「最初はお仕事の片手間に、って感じの手伝いだったのに、\n日が経つごとに、どっちが片手間かわからなくなって」
992 = "「Ban đầu chỉ là giúp đỡ vào những lúc rảnh rỗi trong công việc, nhưng ngày qua ngày, chẳng biết bên nào mới là lúc rảnh rỗi nữa.」"
# monologue
# JP: 苦い思い出ではないのだろうか？
1504 = "Đó không phải là một kỷ niệm cay đắng sao?"
# monologue
# JP: あきれたようなポーレットの声は、\nむしろ優しい響きを帯びている。
1455 = "Giọng nói như thể cạn lời của Paulette, lại mang một âm hưởng dịu dàng."
# 【ポーレット】
# display as 波萊特
# JP: 「賭け事って、わたししたことが無いんですけど――\nきっと、ああいう感じにハマっちゃうんだと思います」
1076 = "「Tôi chưa bao giờ chơi cờ bạc cả―― nhưng chắc chắn cảm giác lún sâu vào nó cũng giống như vậy.」"
# monologue
# JP: 最初は、本当に気軽に手を出し――\nけれども徐々に、積み重ねたものが膨らんでいく。
1291 = "Ban đầu, thực sự chỉ là nhúng tay vào một cách vô tư―― Nhưng dần dần, những thứ tích tụ lại ngày càng phình to ra."
# monologue
# JP: いつの間にかそれは途方も無い量になり、\n完全に引込みのつかない場所に立っている自分に気付く。
1472 = "Đến lúc nhận ra thì nó đã trở thành một lượng khổng lồ, và bản thân đang đứng ở một nơi hoàn toàn không thể rút lui được nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「市長選にパパが出るって決めて、会社が回らなくなって。\nママ――それで色々、限界に来ちゃったそうなんです」
1120 = "「Ba quyết định tranh cử thị trưởng, công ty không thể hoạt động được nữa. Mẹ――vì nhiều chuyện nên có vẻ như đã đến giới hạn chịu đựng.」"
# monologue
# JP: 二人で分担していた負担が、自分ひとりにのしかかる。\n家事方面も追いつかなくなる。
1293 = "Gánh nặng vốn dĩ chia sẻ cho hai người, nay đổ dồn lên một mình mẹ. Việc nhà cũng không kham nổi nữa."
# monologue
# JP: ポーレットの父はその対策に家政婦を雇い――\n結果的には、それが破綻の引き金となった。
1418 = "Ba của Paulette đã thuê người giúp việc để giải quyết vấn đề đó―― Kết quả là, đó lại trở thành ngòi nổ cho sự đổ vỡ."
# 【ポーレット】
# display as 波萊特
# JP: 「すれ違いばっかりになって、ケンカが日常になって。\nパパとママは――疲れ果てて、離婚を選択したそうです」
984 = "「Chỉ toàn là những bất đồng, cãi vã trở thành chuyện thường ngày. Ba và mẹ――đã kiệt sức, và chọn cách ly hôn.」"
# monologue
# JP: 他人ごとのような伝聞調。\n子供であったポーレットは、当然、当事者なのに――
1449 = "Giọng kể lại như chuyện của người khác. Paulette khi đó còn là một đứa trẻ, tất nhiên cũng là người trong cuộc, vậy mà――"
# monologue
# JP: （ああ、いや、“子供であった”からこそきっと……\n当事者なのに、事態に関与できなかったのか）
1527 = "（A, không, chắc chắn là vì “còn là một đứa trẻ”...... Nên dù là người trong cuộc, cô ấy cũng không thể can thiệp vào sự việc.）"
# monologue
# JP: 事態を解決したいのに、大事な人たちを助けたいのに、\n幼い自分はあまりに無力で、何ひとつさえできなくて――
1422 = "Rõ ràng là muốn giải quyết tình hình, muốn giúp đỡ những người quan trọng, nhưng bản thân khi còn nhỏ lại quá bất lực, chẳng thể làm được gì――"
# monologue
# JP: その苦しみは、僕も知ってる。痛みは未だに無くせない。\nなのに今、ポーレットの声は暗さを感じさせない。
1408 = "Nỗi đau đó, tôi cũng biết. Nỗi đau ấy đến giờ vẫn không thể xóa nhòa. Vậy mà hiện tại, giọng nói của Paulette lại không hề mang cảm giác u ám."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしにも選択を迫られました。でも、選べなかった。\nパパかママかなんて、選べるわけが無いじゃないですか」
1049 = "「Tôi cũng bị ép phải lựa chọn. Nhưng, tôi không thể chọn được. Làm sao có thể chọn giữa ba và mẹ được chứ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
1022 = "「Ừm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「選べないから黙ってました。頑張っていい子にしてたら\nパパとママ、仲良しに戻ってくれるかもって、思って」
1031 = "「Vì không thể chọn nên tôi đã im lặng. Tôi đã nghĩ nếu mình cố gắng làm một đứa trẻ ngoan, thì ba và mẹ có thể sẽ làm hòa lại với nhau.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……うん」
841 = "「......Ừm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そしたら、ママは出て行きました。\nわたしを置いて出て行って――二度と帰ってこなかった」
1115 = "「Thế rồi, mẹ đã bỏ đi. Bỏ lại tôi mà đi――và không bao giờ quay lại nữa.」"
# monologue
# JP: 淡々とした声だからこそ、\nまざまざ、形が見える気がする。
1506 = "Chính vì giọng điệu thản nhiên ấy, mà tôi có cảm giác như nhìn thấy rõ mồn một hình dáng của nó."
# monologue
# JP: これが――ポーレットの傷で。\nだから、あれほどの無理をするようになったのだろう。
1503 = "Đây là――vết thương của Paulette. Vì vậy, cô ấy mới trở nên cố gắng gượng ép bản thân đến mức đó."
# 【ポーレット】
# display as 波萊特
# JP: 「いい子にするのが足りなかったって。\nわたしがもっと頑張れたらって……だから、思って」
1087 = "「Tôi đã nghĩ là do mình làm một đứa trẻ ngoan chưa đủ. Nếu tôi cố gắng hơn nữa thì......」"
# 【双鉄】
# display as 雙鐵
# JP: 「それは違う」
1153 = "「Không phải vậy đâu.」"
# monologue
# JP: 言わずもがなのことであろうと、\n話の邪魔になったとしても――言葉にせずにいられない。
1363 = "Dù đó là điều hiển nhiên, dù có làm gián đoạn câu chuyện đi chăng nữa――tôi vẫn không thể không nói ra."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、何も悪くない」
1112 = "「Paulette, cô không làm gì sai cả.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ママも……そう言ってくれました」
1038 = "「Mẹ cũng......nói với tôi như vậy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
1161 = "「!」"
# monologue
# JP: 美しい――\nただ、それだけしか思えない。
1317 = "Thật đẹp―― Tôi chỉ có thể nghĩ như vậy."
# monologue
# JP: ポーレットの浮かべた笑みは、弱々しくて悲しげで。\nだけれど全てを――受け入れ、そして許してる。
1445 = "Nụ cười nở trên môi Paulette, yếu ớt và đầy vẻ buồn bã. Nhưng nó đang――chấp nhận, và tha thứ cho tất cả."
# 【ポーレット】
# display as 波萊特
# JP: 「ママはただ、別れることになっても恨んでも。\nそれでも……パパを、やっぱり愛していたそうです」
1040 = "「Mẹ nói là, dù có phải chia tay, dù có oán hận. Nhưng......mẹ vẫn luôn yêu ba.」"
# 【双鉄】
# display as 雙鐵
# JP: 「愛して――？」
1054 = "「Yêu――?」"
# 【ポーレット】
# display as 波萊特
# JP: 「愛してたから、一緒には居られなくなっても、\nパパのことを、見捨てるなんて出来なかった」
1105 = "「Vì yêu ba, nên dù không thể ở bên nhau nữa, mẹ cũng không thể nào bỏ mặc ba được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1017 = "「A......」"
# monologue
# JP: ポーレットの父、前市長、雛衣幸三氏。\n有能だと、その評価しか僕は知らぬが――
1395 = "Ba của Paulette, cựu thị trưởng, ông Hinai Kouzou. Tôi chỉ biết đến đánh giá rằng ông ấy là một người tài năng, nhưng――"
# 【ポーレット】
# display as 波萊特
# JP: 「ママは、一人でもがんばれる人。でも、\nパパはきっと、一人じゃダメになっちゃう人だったから」
1039 = "「Mẹ là người dù chỉ có một mình vẫn có thể cố gắng. Nhưng, ba chắc chắn là người không thể sống thiếu mẹ được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……そういう形の、愛もあるのか」
838 = "「......Cũng có thứ tình yêu mang hình hài như vậy sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「みたいですね」
1092 = "「Có vẻ là vậy nhỉ.」"
# monologue
# JP: 頷き。\nとても儚く感じる。
1345 = "Cái gật đầu. Cảm giác thật mong manh."
# 【ポーレット】
# display as 波萊特
# JP: 「けど――それってママは結局、\nわたしより、パパを選んだってことでもあるから」
969 = "「Nhưng――điều đó rốt cuộc cũng có nghĩa là, mẹ đã chọn ba, thay vì chọn tôi.」"
# monologue
# JP: 言って、あはっと芝居がかった声。
1339 = "Nói rồi, cô ấy cất giọng \"aha\" đầy kịch tính."
# monologue
# JP: ポーレットの作る苦笑は、\nあまり上手に、笑えていない。
1271 = "Nụ cười gượng gạo mà Paulette tạo ra, cười không được tự nhiên cho lắm."
# 【ポーレット】
# display as 波萊特
# JP: 「その話を聞いてもやっぱり、ちょっと寂しい気はします。\nでも、捨てられたんじゃなかったんだって、安心もして」
1133 = "「Nghe chuyện đó xong, quả nhiên tôi vẫn cảm thấy hơi buồn. Nhưng, cũng cảm thấy an tâm vì biết mình không bị vứt bỏ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん。ポーレットは、捨てられてなどいない」
1021 = "「Ừm. Paulette, cô không hề bị vứt bỏ.」"
# monologue
# JP: ただ単に……\nポーレットのお母様も、力が足りなかっただけなのだ。
1303 = "Chỉ đơn giản là...... Mẹ của Paulette cũng không đủ sức lực mà thôi."
# monologue
# JP: 二人を同時に救いたくって、自分自身も限界で――\nだから、やむなく……そうすることを、強いられた。
1325 = "Muốn cứu cả hai người cùng lúc, nhưng bản thân lại đạt đến giới hạn―― Nên, bất đắc dĩ......bà ấy bị buộc phải làm như vậy."
# 【双鉄】
# display as 雙鐵
# JP: 「お母様もポーレットが大切で。かけがえないと感じてて。\nだからこそ――お父様から、奪えなかった」
1113 = "「Mẹ cô cũng rất coi trọng Paulette. Cảm thấy cô là người không thể thay thế. Chính vì vậy――bà ấy mới không thể cướp cô khỏi ba cô.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい。わかります――けど」
1095 = "「Vâng. Tôi hiểu――nhưng mà.」"
# monologue
# JP: ぎゅっと、瞳が閉じられる。\n涙は流れず――代わりのように、言葉が[こぼ]零れる。
1343 = "Đôi mắt nhắm nghiền lại. Nước mắt không rơi――thay vào đó, những lời nói tuôn trào."
# 【ポーレット】
# display as 波萊特
# JP: 「……切ないですよね。こういうの。事情を聞いて、\nわかったつもりで、許しても――やっぱり切ない」
845 = "「......Thật đau lòng anh nhỉ. Những chuyện thế này. Dù có nghe rõ ngọn ngành, dù có hiểu, dù có tha thứ――thì quả nhiên vẫn thấy đau lòng.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ……」
1093 = "「Ừm......」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんも――」
1158 = "「Anh Soutetsu cũng――」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？」
# 1013 = "「唔？」" 
# monologue
# JP: まぶたのカーテンが持ち上がる。\n青い瞳が、僕を見ている。
1334 = "Bức màn mí mắt được vén lên. Đôi mắt xanh biếc đang nhìn tôi."
# monologue
# JP: まっすぐ、まっすぐ――見つめてる。
1462 = "Chằm chằm, chằm chằm――nhìn tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんも知ってるんですよね。\nこの切なさを――やるせなさを」
1159 = "「Anh Soutetsu cũng biết đúng không. Sự đau lòng này――sự bất lực này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――うん」
823 = "「――Ừm.」"
# monologue
# JP: 手が、伸びてくる。\nおずおずと、とても弱々しく。
1329 = "Một bàn tay vươn ra. Rụt rè, và vô cùng yếu ớt."
# monologue
# JP: 受け取れば、震えが伝わってくる。\nそれでもやはり、ポーレットのてのひらはあたたかい。
1399 = "Khi đón lấy, tôi cảm nhận được sự run rẩy truyền đến. Dù vậy, lòng bàn tay của Paulette vẫn rất ấm áp."
# 【ポーレット】
# display as 波萊特
# JP: 「あの日――わたし、すごく悲しかったんです」
1151 = "「Ngày hôm đó――tôi, đã rất buồn.」"
# monologue
# JP: あの日が、どの日か。\n確かめる必要さえも感じない。
1403 = "Ngày hôm đó, là ngày nào. Tôi thậm chí không cảm thấy cần phải xác nhận lại."
# 【ポーレット】
# display as 波萊特
# JP: 「パパと二人の暮らしに少しずつ慣れてきて。\nママを、許せなく感じ始めていたころだったんです」
1149 = "「Tôi dần quen với cuộc sống chỉ có hai người với ba. Đó là lúc tôi bắt đầu cảm thấy không thể tha thứ cho mẹ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかる気がする」
1074 = "「Tôi nghĩ là tôi hiểu được.」"
# monologue
# JP: 喪失の衝撃は大きくて、あまりにも大きすぎるから。\nそれに慣れることの他、何一つさえできなくて――
1321 = "Cú sốc của sự mất mát quá lớn, thực sự quá lớn. Ngoài việc làm quen với nó, tôi chẳng thể làm được gì khác――"
# 【双鉄】
# display as 雙鐵
# JP: 「僕の場合も、そうだった。\n憎しみは、慣れたころ突然に、噴き出してきた」
1061 = "「Trường hợp của tôi cũng vậy. Sự oán hận, đột nhiên tuôn trào khi tôi vừa mới quen với nỗi đau.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ぶつけどころが見つからないと……\nだって、納得できないですから」
1032 = "「Nếu không tìm được nơi để trút giận thì...... Bởi vì, tôi không thể chấp nhận được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1022 = "「嗯」" 
# monologue
# JP: “誰が悪いわけではない”\n喪失があまりに大きいと、そんなことはとても思えない。
812 = "“Không ai có lỗi cả” Khi sự mất mát quá lớn, người ta không thể nghĩ như vậy được."
# monologue
# JP: 生じてしまったどうしようも無い空白を――\n人はまず、憎しみで埋め始めるしか、きっとできない。
1261 = "Khoảng trống vô phương cứu vãn đã sinh ra đó―― Con người chắc chắn chỉ có thể bắt đầu lấp đầy nó bằng sự oán hận trước tiên."
# 【ポーレット】
# display as 波萊特
# JP: 「だから、双鉄くんに会って。事故の話を聞いて――」
1083 = "「Vì vậy, khi gặp anh Soutetsu. Nghe chuyện về vụ tai nạn――」"
# 【双鉄】
# display as 雙鐵
# JP: 「それでもポーレットは教えてくれたな。\n“鉄道に憎しみをぶつけることが間違ってる”と」
1132 = "「Dù vậy Paulette vẫn dạy cho tôi mà. “Việc trút sự oán hận lên đường sắt là sai lầm”.」"
# monologue
# JP: 僕は、あの言葉に救われた。
1409 = "Tôi đã được cứu rỗi bởi câu nói đó."
# monologue
# JP: 悪いのは物ではなく、人。\n間違えるのは、いつだって、人と、教えてもらえて。
1424 = "Lỗi không phải ở sự vật, mà là ở con người. Cô ấy đã dạy tôi rằng, người mắc sai lầm, lúc nào cũng là con người."
# 【ポーレット】
# display as 波萊特
# JP: 「それでわたし――双鉄くんに、\nきっと、救ってもらったんです」
1130 = "「Nhờ vậy mà tôi――chắc chắn đã, được anh Soutetsu cứu rỗi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「え？」
1012 = "「Hả?」"
# monologue
# JP: 救われたのは、僕の方だ――\n言うより早く、ポーレットの声が流れ込んでくる。
1507 = "Người được cứu rỗi, là tôi cơ mà―― Chưa kịp nói ra, giọng nói của Paulette đã tuôn trào."
# 【ポーレット】
# display as 波萊特
# JP: 「今考えると、きっと――あのときのわたしって、\n鉄道をかばいたかったわけじゃないんですよ」
1124 = "「Bây giờ nghĩ lại, chắc chắn――tôi lúc đó, không phải là muốn bênh vực đường sắt đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「しかし、確かに――」
971 = "「Nhưng, rõ ràng là――」"
# 【ポーレット】
# display as 波萊特
# JP: 「鉄道をかばったんじゃなく。一緒に責めて欲しかった。\n双鉄くんに――やっぱり、悪いのは[ひと,1]人間なんだって」
1055 = "「Tôi không bênh vực đường sắt. Tôi muốn anh cùng tôi trách móc. Muốn anh Soutetsu thấy rằng――quả nhiên, lỗi là ở con người.」"
# 【双鉄】
# display as 雙鐵
# JP: 「っ！？　いや――僕は――」
1162 = "「!? Không――Tôi thì――」"
# monologue
# JP: まるで、そんなことを思えなかった。\nだって、路子を殺したのは……ある意味やはり、僕だから。
1390 = "Tôi hoàn toàn không nghĩ như vậy. Bởi vì, người giết chết Michiko......theo một nghĩa nào đó, quả nhiên là tôi."
# monologue
# JP: 僕がどこかで、別の判断をしていたのなら、\n路子も父さんも母さんも――きっと、死なずに済んだから。
1275 = "Nếu lúc đó, tôi đưa ra một quyết định khác, thì Michiko, ba, và mẹ――chắc chắn đã không phải chết."
# 【ポーレット】
# display as 波萊特
# JP: 「なのにスって、双鉄くんの顔から暗いのが消えて。\nそれでわたし――ああ、出来るんだって、思ったんです」
1007 = "「Vậy mà cái vẻ u ám trên mặt anh Soutetsu lại tan biến đi. Lúc đó tôi đã nghĩ――a, thì ra là có thể làm được.」"
# 【双鉄】
# display as 雙鐵
# JP: 「出来る、って――何が」
1005 = "「Có thể làm được, là――làm được gì?」"
# 【ポーレット】
# display as 波萊特
# JP: 「人を、許すことがです。\n双鉄くんの傷は、絶対、わたしのより深いのに」
976 = "「Là tha thứ cho con người. Mặc dù vết thương của anh Soutetsu, chắc chắn còn sâu hơn của tôi rất nhiều.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや――僕は、許すも何も……\n憎める立場に無いと……きっと、思っただけだった」
953 = "「Không――Tôi thì, chẳng có tha thứ gì cả...... Chắc chắn, tôi chỉ nghĩ là mình không có tư cách để oán hận thôi.」"
# monologue
# JP: 素直に言えば、\nポーレットは驚いた顔になる。
1479 = "Nghe tôi nói thật, Paulette lộ vẻ ngạc nhiên."
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですか？」
1097 = "「Vậy sao anh?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だって……人間は間違えるから。\n悪意が無くても――人は間違ってしまうから」
1030 = "「Bởi vì......con người ai cũng mắc sai lầm. Dù không có ác ý――thì con người vẫn sẽ mắc sai lầm.」"
# monologue
# JP: 僕自身がその最たるものであるというのに、\n自分を棚にあげるなど……
1402 = "Chính bản thân tôi là minh chứng rõ ràng nhất, làm sao tôi có thể tự cho mình là ngoại lệ được chứ......"
# monologue
# JP: そうできるほど、僕は図々しくなくて――\nあるいは単に、弱かったのだ。
1381 = "Tôi không đủ mặt dày để làm điều đó―― Hay đơn giản chỉ là do tôi quá yếu đuối."
# 【双鉄】
# display as 雙鐵
# JP: 「だから――きっと、それは諦めに近かったと思う。\n憎み続けることを諦めて……結果として、楽になった」
1080 = "「Vì vậy――chắc chắn, điều đó gần giống với sự bỏ cuộc hơn. Từ bỏ việc tiếp tục oán hận......kết quả là, tôi cảm thấy nhẹ nhõm hơn.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうだったんですか」
991 = "「Thì ra là vậy sao.」"
# monologue
# JP: くすっと、ポーレットが笑う。
1442 = "Paulette bật cười khúc khích."
# monologue
# JP: バカな話とあきれたように。\nなのに、花開くように鮮やかに。
1359 = "Như thể cạn lời trước một câu chuyện ngớ ngẩn. Nhưng nụ cười ấy lại rạng rỡ như một bông hoa đang nở."
# 【ポーレット】
# display as 波萊特
# JP: 「ならずっと、わたし、勘違いしてたんですね」
990 = "「Vậy là từ trước đến giờ, tôi đã hiểu lầm rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「勘違いというのなら僕もだな。僕は――\n鉄道愛に満ちるがゆえの助言をもらったと思っていた」
1033 = "「Nếu nói là hiểu lầm thì tôi cũng vậy. Tôi―― đã nghĩ mình nhận được một lời khuyên chan chứa tình yêu đường sắt cơ đấy.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それも……多分、すこしは――結構？\nある程度あったとは思います。けど、やっぱり」
961 = "「Cái đó thì......chắc là, cũng có một chút――khá nhiều? Tôi nghĩ là cũng có ở một mức độ nào đó. Nhưng mà, quả nhiên là」"
# 【双鉄】
# display as 雙鐵
# JP: 「やっぱり？」
1147 = "「Quả nhiên là?」"
# 【ポーレット】
# display as 波萊特
# JP: 「わたしたち、ふたりとも勘違いしてたんですね。\n勘違いした想い出を、ずっと大事に抱えてた」
1065 = "「Cả hai chúng ta, đều đã hiểu lầm rồi nhỉ. Chúng ta đã luôn trân trọng ôm ấp một kỷ niệm hiểu lầm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「確かに……解釈は、勘違いだったかもしれない。\nけれど、抱え続けてきたことは――勘違いじゃない」
1126 = "「Đúng là......cách lý giải, có thể là một sự hiểu lầm. Nhưng, việc chúng ta tiếp tục ôm ấp nó――không phải là hiểu lầm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1018 = "「A.」"
# monologue
# JP: ぽわっと。\nポーレットの手のひらがあたたかくなる。
1448 = "Phừng phực. Lòng bàn tay Paulette trở nên ấm áp."
# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。\nわたしが、救われたことは本当」
1094 = "「Đúng vậy nhỉ. Việc tôi được cứu rỗi là sự thật.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうなんだ。救われたから、勘違いでも、\n本物の大事な想い出となった。ああ――いや」
1042 = "「Đúng vậy. Vì được cứu rỗi, nên dù là hiểu lầm, nó vẫn trở thành một kỷ niệm quan trọng và chân thực. A――không.」"
# monologue
# JP: むしろ……\nそうだ。言うなれば、むしろ――
1242 = "Đúng hơn là...... Phải rồi. Nói cách khác, đúng hơn là――"
# 【双鉄】
# display as 雙鐵
# JP: 「本当は、僕もポーレットも、“そうしたかった”。\nだからきっかけを、自分に都合よく、きっと捉えた」
955 = "「Thực ra, cả tôi và Paulette đều “muốn làm như vậy”. Vì thế, chắc chắn chúng ta đã nắm bắt cơ hội đó theo cách có lợi cho bản thân.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ――そっか」
1015 = "「A――ra là vậy.」"
# monologue
# JP: あっさりした声。\nすっきりした声。
1464 = "Một giọng nói nhẹ nhàng. Một giọng nói sảng khoái."
# monologue
# JP: ああ、やはり――僕らはともに、\nあの日、あの時。ただ気づいたのだ。
1307 = "A, quả nhiên――cả hai chúng ta, vào ngày hôm đó, khoảnh khắc đó. Chỉ là đã nhận ra mà thôi."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしは、本当は最初から、\nママを憎みたくなんてなかった」
1067 = "「Thực ra ngay từ đầu, tôi đã không hề muốn oán hận mẹ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうして僕も――\n憎しみなんて、抱き続けていたくはなかった」
1059 = "「Tôi cũng vậy―― không hề muốn cứ ôm mãi sự oán hận đó.」"
# 【ポーレット】
# display as 波萊特
# JP: 「だから、お互いにお互いを都合良く理解して……\nそうするきっかけにしちゃったんですね」
1078 = "「Vì vậy, cả hai chúng ta đã hiểu nhau theo cách có lợi cho bản thân...... và biến nó thành cái cớ để làm như vậy nhỉ.」"
# monologue
# JP: そうなのかも、そうならいいな、と呟いて。\nポーレットは、力みの抜けきった顔で、微笑む。
817 = "“Có lẽ là vậy, nếu được như vậy thì tốt quá”, lẩm bẩm như vậy, Paulette mỉm cười với khuôn mặt đã trút bỏ được mọi gánh nặng."
# 【ポーレット】
# display as 波萊特
# JP: 「そういうの、きっと、相性ですよね」
1144 = "「Những chuyện như vậy, chắc chắn là do hợp nhau nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ。かもな。\nそれこそが、相性の善し悪しかもしれん」
1023 = "「Ừm. Có lẽ vậy. Đó mới chính là việc hợp nhau hay không.」"
# monologue
# JP: 愛し合う者達を別れに追い込む行き違いも存在するし、\nお互いを救い合い、再会させる行き違いもある。
1248 = "Có những sự hiểu lầm đẩy những người yêu nhau đến bờ vực chia ly, và cũng có những sự hiểu lầm giúp họ cứu rỗi lẫn nhau, để rồi đoàn tụ."
# monologue
# JP: 前者と後者にある隔たりは……運、でないなら、\n相性と呼ぶしかないものだろう。
1346 = "Khoảng cách giữa cái trước và cái sau......nếu không phải là do may mắn, thì có lẽ chỉ có thể gọi là sự hợp nhau mà thôi."
# 【ポーレット】
# display as 波萊特
# JP: 「出会った一番最初から――\nわたしたち、相性がすごく、よかったんですね」
1050 = "「Ngay từ lần đầu tiên gặp gỡ―― chúng ta đã rất, rất hợp nhau rồi nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「！」
# 1161 = "「！」" 
# monologue
# JP: 熱と鼓動が、\nポーレットの手から伝わってくる。
1241 = "Hơi ấm và nhịp đập, truyền đến từ bàn tay của Paulette."
# monologue
# JP: いや、それはもとから、\n僕の発したものかもしれない。
1246 = "Không, đó có lẽ vốn dĩ, là những thứ phát ra từ chính tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「だから、居てくれて嬉しいんです。\nわたしのとなりに、双鉄くんが」
1084 = "「Vì vậy, tôi rất vui vì anh đã ở đây. Ở bên cạnh tôi, anh Soutetsu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
822 = "「――」"
# monologue
# JP: 何か、いいたいように思って、\nけれども言葉を出せはしないし、思いつけない。
1397 = "Tôi cảm thấy như mình muốn nói điều gì đó, nhưng lại không thể thốt nên lời, cũng chẳng thể nghĩ ra từ ngữ nào."
# monologue
# JP: ただ、ポーレットの熱と鼓動と視線とに、\n僕の全てが埋められていく。
1389 = "Chỉ là, toàn bộ con người tôi đang dần bị lấp đầy bởi hơi ấm, nhịp đập và ánh mắt của Paulette."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしのとなりに。\nわたしに恋を教えてくれた――双鉄くんが、居てくれて」
1086 = "「Ở bên cạnh tôi. Người đã dạy tôi biết yêu――anh Soutetsu, đã ở bên cạnh tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……ポーレット」
843 = "「......Paulette.」"
# monologue
# JP: 僕の全てが満たされて、喉から溢れだしていく。\nそれはただ――ひとつの大切な名前となって。
1406 = "Toàn bộ con người tôi được lấp đầy, trào ra khỏi cổ họng. Nó chỉ đơn thuần――hóa thành một cái tên vô cùng quan trọng."
# monologue
# JP: 僕の目の前にいる人の、\n僕と手を、つないでくれている人の。
1361 = "Tên của người đang ở ngay trước mắt tôi, người đang nắm lấy tay tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット」
1111 = "「Paulette.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くん」
1026 = "「Vâng, anh Soutetsu.」"
# monologue
# JP: 憎しみで、自分を埋め尽くさなくて、よかった。
1367 = "Thật may vì tôi đã không để sự oán hận lấp đầy bản thân mình."
# monologue
# JP: 代わりの何かを無理やり求め、\n自分を埋め尽くさなくて、よかった。
1365 = "Thật may vì tôi đã không gượng ép tìm kiếm một thứ gì đó thay thế, để lấp đầy bản thân mình."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も――側にいてくれてうれしい。\nだから、側に居て欲しい」
1058 = "「Tôi cũng vậy――rất vui vì cô đã ở bên tôi. Vì vậy, tôi muốn cô hãy ở bên tôi.」"
# monologue
# JP: なくしたものは、決して再び戻らない。\n出来てしまった空白は、抱え続ける他にない。
1318 = "Những thứ đã mất đi, sẽ không bao giờ quay trở lại. Khoảng trống đã được tạo ra, chỉ còn cách tiếp tục mang theo nó."
# monologue
# JP: それでも、隣に、あたたかな人が居てくれる――\nそれだけで、僕はこんなにも満たされる。
1245 = "Dù vậy, vẫn có một người ấm áp ở bên cạnh tôi―― Chỉ vậy thôi, tôi đã cảm thấy mãn nguyện đến nhường này."
# 【双鉄】
# display as 雙鐵
# JP: 「僕も……恋を教えてもらった」
973 = "「Tôi cũng......được cô dạy cho biết yêu là gì.」"
# monologue
# JP: 資格が無いと思っていた。\n人を愛する、人の手を取る、資格を失くしたと思ってた。
1385 = "Tôi đã nghĩ mình không có tư cách. Tôi đã nghĩ mình đánh mất tư cách để yêu một người, để nắm lấy tay một người."
# monologue
# JP: だけれど、僕は失くしてなかった。\n路子は全てを守ってくれた――僕に、残してくれていた。
1268 = "Nhưng, tôi không hề đánh mất. Michiko đã bảo vệ tất cả――đã để lại cho tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「君が、見えるようにしてくれた。\n僕は、こんなにも君を想って、あたたかになれる」
1090 = "「Chính cô đã giúp tôi nhìn thấy. Tôi có thể nghĩ về cô nhiều đến thế, và trở nên ấm áp đến thế.」"
# monologue
# JP: 繋いでる手が熱くて熱くて、汗で濡れてて融け合うようで。
1286 = "Bàn tay đang đan vào nhau nóng rực, ướt đẫm mồ hôi như thể đang hòa tan vào nhau."
# monologue
# JP: その感触が、息苦しくて生々しくて――\nドキドキしすぎて、心地よくって。
1487 = "Cảm giác đó, ngột ngạt và vô cùng chân thực―― Tim đập quá nhanh, nhưng lại thật dễ chịu."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。\n僕は、君に――恋をしている」
1110 = "「Paulette. Tôi, đã――yêu cô rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、双鉄くん。わたしもです」
1099 = "「Vâng, anh Soutetsu. Tôi cũng vậy.」"
# monologue
# JP: 手が、解かれる。
1327 = "Bàn tay buông ra."
# monologue
# JP: 解かれた手は伸ばされて、\n僕の頬へとあてられる。
1514 = "Đôi bàn tay vừa buông ra ấy vươn tới, áp lên má tôi."
# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、あなたに。\n恋を――」
1063 = "「Tôi cũng, yêu―― anh.」"
# monologue
# JP: そこから先は、言葉にならない。
1323 = "Từ đó trở đi, không còn lời nào được thốt ra nữa."
# monologue
# JP: 僕らは、初めてのキスをする。
1383 = "Chúng tôi, trao nhau nụ hôn đầu tiên."
