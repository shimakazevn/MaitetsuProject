# display as 木芥子工匠
# JP: 「持ちやすいように、飛ばないように。\nで、これを――こう、寝かせて当てるとこうなる」
2146 = "「選一個舒服的能夠固定住的姿勢就行了。把鑿子輕輕搭在木頭上就會這樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お――お――」
1834 = "「哦，哦」" 

# monologue
# JP: 僕の手の上から職人さんが手を添えてくれる。\n力を抜いて、その感覚を覚えようとする。
2492 = "工匠把手放在我的手上。我放鬆力氣，試圖記住這種感覺。" 

# 【こけし職人】
# display as 木芥子工匠
# JP: 「力を入れて立てると、深く削れる」
2079 = "「用力立起鑿子就可以削得深一點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「む――なるほど」
1844 = "「唔，是嗎」" 

# 【こけし職人】
# display as 木芥子工匠
# JP: 「あんまり力を抜くと全然削れなくなるから、\n大胆にいくつもりで」
1673 = "「使的力氣不夠是根本沒辦法削掉木頭的，所以大膽些上也沒關係」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1925 = "「好的」" 

# monologue
# JP: 職人さんが手を離す。
2502 = "工匠鬆開了手。" 

# monologue
# JP: 反射的に、おっかなびっくりになってしまえば――\nなるほど、まったく削れなくなる。
2547 = "我的手反射性地退縮了一下。真的完全削不下來木頭啊。" 

# 【双鉄】
# display as 雙鐵
# JP: 「大胆にいくつもりで――力をこめて」
1911 = "「大膽些，用力」" 

# monologue
# JP: （しゅるるるるるるるっ！）
# 2788 = "（吱吱吱！）" 

# 【こけし職人】
# display as 木芥子工匠
# JP: 「お！　お父さん筋がいいですねぇ。\nいきなりここまで出来る人は、なかなかいない」
1830 = "「哦！您很有天賦嘛。可沒多少人第一次嘗試就能做到這樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「恐縮です」
2145 = "「過獎了」" 

# 【こけし職人】
# display as 木芥子工匠
# JP: 「肩と顎ができたら、一番さきね。頭の部分も同じように\n丸くする。そこまでできたら声だして呼んでくださいね」
1733 = "「剛剛我做好了肩膀和下巴。接下來請您自己把頭的形狀弄成圓形。做好了叫我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1925 = "「好的」" 

# monologue
# JP: 職人さんはそれだけいって、奥へと引っ込んでしまう。\nとたん、ひかりの声がする。
2498 = "工匠說完就回到店裡面去了。他剛一消失，光就衝我叫了起來。" 

# 【ひかり】
# display as 光
# JP: 「ぱぱ、すごいのー、かっこいいのー！」
2051 = "「爸爸好厲害！好帥啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら――なによりだ」
2156 = "「那就太好了」" 

# monologue
# JP: 嬉しいが、振り向くなどはできないし、\n返事をするだけでもかなり、いっぱいいっぱいだ。
2739 = "雖然得到了光的誇獎讓我很開心，但我現在別說回頭了，就連回應她都很吃力。" 

# monologue
# JP: 刃物を、高速回転するろくろに当てている。\n手が滑ったら、事故にさえつながりかねない状況なのだ。
2544 = "我現在正用利器抵著高速旋轉的木工轉盤。手滑一下都可能會引發事故。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひかり？　早くしないと絵の具、かわいちゃうかも」
1719 = "「光，再不快點塗料就要乾了」" 

# 【ひかり】
# display as 光
# JP: 「いっけなーい、そうだったのー」
1630 = "「不好，差點忘了」" 

# monologue
# JP: ポーレットもそれを察して、\nすぐにひかりの目線を僕からずらしてくれる。
2606 = "波萊特恐怕也察覺到了這點，她馬上轉移了光的注意力。" 

# monologue
# JP: ありがたい。\nこれならば、しばらく集中すれば……………………
2481 = "實在是太感謝她了。只要我集中注意力再削一會……" 

# 【双鉄】
# display as 雙鐵
# JP: 「よし！　――すみません！！\nこんなものでどうでしょう！」
1931 = "「好！您好！！我做好了，請看看！」" 

# 【こけし職人】
# display as 木芥子工匠
# JP: 「んー！　上出来上出来」
1884 = "「嗯！不錯不錯」" 

# monologue
# JP: 職人さんは、僕からノミを受け取って、\n軽くあて――ああ、やはり、プロは違う。
2494 = "工匠接過我的鑿子，輕輕把鑿子搭在旋轉的木頭上。不愧是專業人士，手藝就是不一樣。" 

# monologue
# JP: 丸みがそれでグっと増し、ほとんどもう、\n少なくとも僕の目には、売り物のこけしと変わらなくなる。
2435 = "只見我的木芥子頭部馬上變圓了一大截。至少在我看來，這個木芥子已經和市面上賣的沒區別了。" 

# 【こけし職人】
# display as 木芥子工匠
# JP: 「じゃあ、あとはお父さんも絵付けだ」
2171 = "「那接下來您也可以去上色了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1925 = "「好的」" 

# 【こけし職人】
# display as 木芥子工匠
# JP: 「やり方は、おかあさんと娘さんたちに聞いて。\nなにかわからなかったら、声だして呼んでくださいねー」
1722 = "「具體怎麼做就問一下您的夫人和女兒吧。要是有什麼不懂的就叫我一聲」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ、はい」
1857 = "「啊，好的」" 

# 【ひかり】
# display as 光
# JP: 「ぱぱ、いらっしゃいなのー！」
2060 = "「爸爸，歡迎過來！」" 

# monologue
# JP: 職人さんの姿が消えれば、\nひかりの声がぱっと華やぐ。
2490 = "工匠剛剛走回店裡面看不到了，光就馬上吵鬧了起來。" 

# monologue
# JP: 不親切な方なのか――と早合点しかけてしまったが、\nあるいは僕らに、気をつかってくれているのかも知れん。
2740 = "雖然我剛才差一點就覺得這位工匠是不是有點冷淡，但說不定他其實是為光著想才特地不打擾我們。" 

# 【双鉄】
# display as 雙鐵
# JP: 「親子水入らず、だものな」
1621 = "「一家人就是要團團圓圓的嘛」" 

# 【ひかり】
# display as 光
# JP: 「みてみて！　ひかりの、もうすぐできるのー」
2054 = "「爸爸快看，光馬上就做好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おお、れいなこけしか！」
1905 = "「噢，這是玲奈木芥子嗎！」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなも、ひかりちゃんこけしつくりましたよぉ」
2062 = "「玲奈也做了小光木芥子哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「おおお、これもきっちりひかりに見えるな。\nしかし――うん。ふたりとも個性がでている」
1904 = "「噢，這個看起來真的很像光。不過，嗯，這個完全體現出了你們倆的個性」" 

# monologue
# JP: ひかりはポーレットの血が濃いのか、\n4歳児なりに、細かなところを追い込もうとしている。
2392 = "光可能是繼承了波萊特認真的那一面，她雖然才四歲卻很追求細節。" 

# monologue
# JP: かたやれいなは、おおらかだ。\nこまかなところは、大胆に省略して完成させている。
2439 = "可是玲奈的木芥子卻畫得很奔放。她大膽地省略了一些細節。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは……っと」
2034 = "「波萊特的呢……哦」" 

# monologue
# JP: 真剣そのもの。\n一心不乱にひかりこけしを作っている。
2610 = "波萊特簡直就是認真的代名詞了。她正專心致志地做著光的木芥子。" 

# monologue
# JP: これは、邪魔できる雰囲気ではない。\nというか、僕も絵付けをせねば、だ。
2651 = "看她這麼認真我都不忍心打擾她了。而且我也得給自己的木芥子上色才行。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひかり、モデルになってくれるか？」
1714 = "「光，你能當我的模特兒嗎？」" 

# 【ひかり】
# display as 光
# JP: 「ひかり……ままとれいなが、\nひかりのこけし、つくってくれてるの」
1769 = "「可是……有媽媽和玲奈給光做木芥子了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1845 = "「唔？」" 

# 【ひかり】
# display as 光
# JP: 「れいなおねーちゃんのは、ひかりがつくるの。\nだから、ぱぱは、はちろくおねーちゃんの」
1695 = "「光做了玲奈姐姐的木芥子。那爸爸就做八六姐姐的木芥子吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1853 = "「啊！」" 

# monologue
# JP: ハチロクは、精神的には完全に大人だ。\n今回の旅行も、『ご家族水入らずで』と遠慮した。
2406 = "八六的精神年齡已經完全是成年人了，所以這次的旅行被她以不打擾我們家人的名義拒絕了。" 

# monologue
# JP: 無論、ハチロクまで来てしまうと御一夜鉄道の仕事が……\nということもあったが――
2640 = "當然，她來不了的原因之一也是因為還有御一夜鐵路的工作在身……" 

# 【双鉄】
# display as 雙鐵
# JP: 「だよな。ハチロクお姉ちゃんだけ仲間はずれは、\nかわいそうだよな」
1657 = "「也對。要是只有八六姐姐被排除在外，她就太可憐了」" 

# 【ひかり】
# display as 光
# JP: 「うん！！」
1891 = "「嗯！！」" 

# monologue
# JP: 僕らの娘は、優しいこどもに育ってくれてる。
2524 = "我們的女兒真的成長為一個溫柔的孩子了。" 

# monologue
# JP: 今ここにいないハチロクを、\n思いやり、心配してあげてくれるほど。
2463 = "她甚至都學會了為不在這裡的八六著想。" 

# 【双鉄】
# display as 雙鐵
# JP: 「まかせておけ。ハチロクとは長いつきあいだ。\nあれのこけしなら、僕は相当うまくつくれる気がする」
1660 = "「交給我吧。我跟八六認識這麼久了，肯定會做出一個和她一模一樣的木芥子來的」" 

# 【ひかり】
# display as 光
# JP: 「たのしみなのー！」
1688 = "「光也好期待哦！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「黄色があればよかったのだが――」
2108 = "「要是有黃色就好了」" 

# monologue
# JP: しかし、赤黒があるのはぴったりだ。
2363 = "不過幸好還有紅色和黑色。" 

# monologue
# JP: 黄色は……うむ。\nピンクの例にならって、緑の薄ぬりでやってみよう。
2757 = "黃色要怎麼辦呢……嗯。按照粉色的上法，薄薄塗一層綠色試試看好了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……ひかりのピンクは上手に出ているな。\nよければ、薄塗りのこつを教えてくれるか？」
1256 = "「……光的木芥子上的粉色塗得真好。能教教爸爸怎麼塗這麼薄嗎？」" 

# monologue
# JP: 言えば途端に、ひかりの小鼻がふくりとふくれる。\n頬が鮮やかなバラ色になる。
2516 = "我一誇她，她就洋洋得意地翹起鼻子，臉頰上也浮現出紅暈。" 

# 【ひかり】
# display as 光
# JP: 「おしえてあげるのー！　\nひかり、ぱぱのせんせーなの！！」
1693 = "「光來教爸爸！光來當爸爸的老師！！」" 

# monologue
# JP: ああ――そうか。\n気づけば、じわり、僕のこころも潤いを得る。
2673 = "聽到她這麼說，一絲甜甜的感覺在我心中擴散開來。" 

# monologue
# JP: （ひかりが――僕の先生か）
2786 = "（光要當我的老師了）" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　よろしくお願いします。\nひかりせんせい！」
1889 = "「嗯！那就請光老師多指教了！」" 

# 【ひかり】
# display as 光
# JP: 「うふー、ひかりせんせい！！」
1786 = "「呵呵，光老師！！」" 

# monologue
# JP: ひかりはれいなをふりかえり、\nれいなはにっこり微笑み返す。
2402 = "光轉過頭看了一眼玲奈，玲奈馬上對她報以微笑。" 

# 【れいな】
# display as 玲奈
# JP: 「そうてつさん。\nひかり先生に教わっちゃうなら、安心ですよぉ」
2181 = "「雙鐵先生，有光老師教你就放心吧」" 

# 【ひかり】
# display as 光
# JP: 「おしえちゃうのー！　あのね？　まずね？\nふでにはぺったりくっつけて、それでね、かみでね」
1694 = "「光來教爸爸！首先啊，要把筆沾滿顏料，然後在紙上塗一塗」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむふむ。――なるほど、筆先を慣らしつつ、\n紙に塗料を吸い取らせるのか」
1835 = "「哦，明白了，在抹勻筆尖的同時，順便讓紙吸收多餘的顏料」" 

# 【ひかり】
# display as 光
# JP: 「それでね？　そしたらね」
2044 = "「然後啊，然後……」" 

# monologue
# JP: ひかりの指が伸びてくる。\n僕のもってる筆の柄の、先の部分をちょこっとつまむ。
2399 = "光朝我伸出手指，輕輕抓住我的筆桿一端。" 

# 【ひかり】
# display as 光
# JP: 「あのね？　こういうかんじにするのー」
1981 = "「接下來就按照這樣的感覺……」" 

# monologue
# JP: 力を抜く。筆の運びを、ひかりに任せる。\nこんなにちいさなひかりの手が、僕の手の動きを導く。
2542 = "我放鬆握筆的力道，讓光用筆塗色。讓光用她那小小的手引導著我的手。" 

# monologue
# JP: ――なんと、力強いことだろう。\n――なんと嬉しいことだろう。
2647 = "看到光握著我的筆給木芥子上色，我感覺世上沒有比這更讓我開心和踏實的事情了。" 
