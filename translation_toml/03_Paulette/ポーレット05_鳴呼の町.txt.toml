[script]
# lines: 467 
# 【ポーレット】
# display as 波萊特
# JP: 「ごめんなさいっ！！」
1944 = "「Tôi vô cùng xin lỗi!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、僕は全く気にしていない」
1639 = "「Không sao đâu, tôi hoàn toàn không để tâm đâu.」"
# 【ひかり】
# display as 光
# JP: 「ひかりもなのー」
1692 = "「Hikari cũng vậy~」"
# 【れいな】
# display as 玲奈
# JP: 「れいなもですよぉ」
2148 = "「Reina cũng thế đó nha~」"
# monologue
# JP: 本当に、1ミクロンも気にする様子を感じない、\nひかりとれいなの、ごくのほほんとした口調。
2631 = "Giọng điệu vô tư lự của Hikari và Reina,\nthực sự không cho thấy một chút bận tâm nào."
# monologue
# JP: にもかかわらず、ポーレットの顔は硬いまま。\nもう一度深く、頭を下げる。
2442 = "Mặc dù vậy, khuôn mặt Paulette vẫn căng cứng.\nCô ấy lại cúi đầu thật sâu một lần nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「それでもやっぱり、わたし――準備不足すぎです。\nまさか、[なるこきょう,2]鳴呼峡に行く道が冬季封鎖とか」
1951 = "「Nhưng mà, tôi——chuẩn bị quá kém cỏi.\nKhông ngờ đường đến hẻm núi Naruko lại bị phong tỏa vào mùa đông.」"
# monologue
# JP: 接続遅れの影響で、観光予定の時間が減って。\n優先順位をつけ直そうと宿で尋ねてわかった事実。
2413 = "Do ảnh hưởng của việc chậm kết nối, thời gian tham quan bị rút ngắn lại.\nTôi hỏi thăm tại nhà trọ để sắp xếp lại thứ tự ưu tiên thì mới biết được sự thật này."
# monologue
# JP: 母になっても、ポーレットの弱点は変わらない。\n一度予定が崩れれば、そのままずるずる崩れてしまう。
2487 = "Dù đã làm mẹ, điểm yếu của Paulette vẫn không thay đổi.\nMột khi kế hoạch bị phá vỡ, nó sẽ cứ thế sụp đổ theo dây chuyền."
# 【双鉄】
# display as 雙鐵
# JP: 「……確かに、[なるこきょう,2]鳴呼峡は鳴呼一番の名所と聞く。\nいけるものならいってみたくはあったがな」
1269 = "「……Đúng là tôi có nghe nói hẻm núi Naruko là danh lam thắng cảnh số một ở Naruko.\nNếu có thể đi thì tôi cũng muốn đến thử một lần.」"
# 【ポーレット】
# display as 波萊特
# JP: 「それだけじゃなく、こけし博物館も、[かたぬま,1]片沼も冬季封鎖で\nいけないとか――全部回ろうと思ってたのに……ぅぅ」
1627 = "「Không chỉ vậy, cả bảo tàng Kokeshi và Katanuma cũng bị phong tỏa vào mùa đông\nnên không đi được——Tôi đã định đi hết tất cả các nơi mà……ư ư.」"
# monologue
# JP: が、弱点は弱点でかまわない。\nポーレットを補い支えるために、僕がいるのだ。
2364 = "Nhưng, điểm yếu thì cứ là điểm yếu cũng không sao.\nTôi ở đây là để bù đắp và hỗ trợ Paulette mà."
# 【双鉄】
# display as 雙鐵
# JP: 「そうした観光名所を回るためには――\n雪景色のストーブ列車を諦めねばならんわけだろう？」
1775 = "「Để đi tham quan những danh lam thắng cảnh đó——\nchúng ta sẽ phải từ bỏ chuyến tàu sưởi ấm trong khung cảnh tuyết trắng đúng không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ」
1852 = "「A.」"
# monologue
# JP: 当然だ。雪が降る時期には冬期封鎖になるというなら、\n雪景色の中を走るストーブ列車と共には、楽しめない。
2720 = "Đương nhiên rồi. Nếu những nơi đó bị phong tỏa vào mùa tuyết rơi,\nthì sẽ không thể tận hưởng cùng lúc với chuyến tàu sưởi ấm chạy giữa khung cảnh tuyết trắng được."
# 【双鉄】
# display as 雙鐵
# JP: 「鳴呼峡とストーブ列車なら、\n僕は断然、ストーブ列車を選びたい」
1674 = "「Giữa hẻm núi Naruko và tàu sưởi ấm,\ntôi chắc chắn sẽ chọn tàu sưởi ấm.」"
# 【ひかり】
# display as 光
# JP: 「ひかりもなのー！\nすとーぶれっしゃ、たのしかったのー！」
1691 = "「Hikari cũng vậy~!\nTàu sưởi ấm, vui lắm luôn~!」"
# 【れいな】
# display as 玲奈
# JP: 「雪も降ってくれましたですしぃ」
2094 = "「Tuyết cũng đã rơi nữa mà~」"
# monologue
# JP: 今もちらちら、小雪が舞うには舞っている。
2637 = "Bây giờ tuyết vẫn đang lất phất rơi."
# monologue
# JP: 降った端から溶けてしまうような程度だが、\nひかりもれいなも、にこにこ笑顔だ。
2738 = "Dù chỉ là rơi xuống rồi tan ngay lập tức,\nnhưng cả Hikari và Reina đều đang mỉm cười rạng rỡ."
# 【双鉄】
# display as 雙鐵
# JP: 「と、いうことだ。鳴呼峡や、カタヌマとやらや、\nこけし博物館に行きたいのなら、また別の季節に来よう」
1667 = "「Chính là vậy đó. Nếu muốn đi hẻm núi Naruko, Katanuma,\nhay bảo tàng Kokeshi, thì chúng ta hãy đến vào một mùa khác nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「――はい」
1925 = "「——Vâng.」"
# monologue
# JP: 頷いて、顔をあげてくれた。\nならば反省の時間は終わりだ。
2569 = "Cô ấy gật đầu và ngẩng mặt lên.\nVậy thì thời gian kiểm điểm đã kết thúc."
# 【双鉄】
# display as 雙鐵
# JP: 「ストーブ列車で来れた上、冬ならではの鳴呼も楽しめる。\nそう考えて、冬の楽しみを探してみよう」
1994 = "「Không những được đi tàu sưởi ấm, mà còn được tận hưởng một Naruko rất riêng của mùa đông.\nHãy nghĩ như vậy và cùng tìm kiếm niềm vui của mùa đông nào.」"
# 【ポーレット】
# display as 波萊特
# JP: 「はいっ！」
1926 = "「Vâng!」"
# monologue
# JP: ポーレットが笑顔をうかべれば、\nひかりもれいなも笑顔になる。
2649 = "Khi Paulette nở nụ cười,\nHikari và Reina cũng mỉm cười theo."
# 【ひかり】
# display as 光
# JP: 「ふゆのたのしみー！\nゆきだるま！　ゆきがっせん！　かまくま！」
1726 = "「Niềm vui mùa đông~!\nNgười tuyết! Ném tuyết! Gấu tuyết!」"
# 【双鉄】
# display as 雙鐵
# JP: 「かまくまではなく、かまくらだ」
1633 = "「Không phải gấu tuyết, mà là lều tuyết (kamakura).」"
# 【ひかり】
# display as 光
# JP: 「そうだったのー！　かまくらー」
1945 = "「Thì ra là vậy~! Lều tuyết~」"
# 【れいな】
# display as 玲奈
# JP: 「かまくら、れいなもはいってみたいですぅ！\nけど――」
2064 = "「Lều tuyết, Reina cũng muốn thử vào trong đó nha~!\nNhưng mà——」"
# 【ポーレット】
# display as 波萊特
# JP: 「雪……道路端とかにあるにはあるけど――\nどろどろだし、多分、ガチガチに固まってると思うし」
2179 = "「Tuyết…… ở ven đường thì cũng có đấy nhưng——\nbùn lầy nhão nhoét, với lại chắc là đóng băng cứng ngắc rồi.」"
# 【ひかり】
# display as 光
# JP: 「ゆき、ガチガチになるのー！？\nれいなー、れいなー」
2194 = "「Tuyết, sẽ đóng băng cứng ngắc sao~!?\nReina~, Reina~」"
# 【れいな】
# display as 玲奈
# JP: 「れいなも興味ありますよぉ」
2065 = "「Reina cũng tò mò lắm nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ、足を滑らせるといけない」
1858 = "「À, cẩn thận kẻo trượt chân đấy.」"
# monologue
# JP: 手をつなぎあうれいなとひかりの前に回って、\n道路の端の――
2630 = "Tôi vòng ra phía trước Reina và Hikari đang nắm tay nhau,\nđi về phía mép đường——"
# monologue
# JP: 恐らくは除雪したものを積み上げたのだろうカタマリへ、\nそろそろゆっくり近づいていく。
2556 = "Chúng tôi chầm chậm tiến lại gần một khối tuyết lớn,\ncó lẽ là tuyết được dọn dẹp và chất đống lại."
# monologue
# JP: （ざくっ――ざくっ）
2798 = "（Rột——Rột）"
# 【双鉄】
# display as 雙鐵
# JP: 「む――確かに、かなり固いな」
1841 = "「Ưm——Đúng là cứng thật.」"
# 【ひかり】
# display as 光
# JP: 「ほんと！　かたーい！　ふわふわじゃなーい！」
2090 = "「Thật này! Cứng quá! Không mềm xốp chút nào!」"
# 【れいな】
# display as 玲奈
# JP: 「すごいですぅ。\n雪って、地面みたいになるんですねぇ」
1927 = "「Tuyệt quá nha~.\nTuyết cũng có thể trở nên giống như mặt đất nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど、地面か」
1833 = "「Ra vậy, mặt đất sao.」"
# monologue
# JP: （ぐっ）
2808 = "（Gừ）"
# monologue
# JP: 足を強めに押し込んでみても、埋もれない。\n見た途端、ひかりの顔が、パっと輝く。
2546 = "Dù tôi thử ấn mạnh chân xuống, nó cũng không bị lún.\nVừa nhìn thấy thế, khuôn mặt Hikari bỗng sáng rực lên."
# 【ひかり】
# display as 光
# JP: 「ゆきのおやま、ひかり、のぼるのー！」
1706 = "「Núi tuyết, Hikari sẽ leo lên~!」"
# 【れいな】
# display as 玲奈
# JP: 「わ、あぶないですよぉ。ひかりちゃん」
1805 = "「Oa, nguy hiểm lắm đó nha~. Bé Hikari.」"
# 【ひかり】
# display as 光
# JP: 「はなしてー、のぼりたいのー」
1990 = "「Buông em ra~, em muốn leo lên cơ~」"
# monologue
# JP: ひかりが、れいなが、それぞれに、\nすがるような目を僕へと向ける。
2396 = "Cả Hikari và Reina,\nđều hướng ánh mắt cầu khẩn về phía tôi."
# monologue
# JP: 確かに危険かもしれぬ。が――\n挑戦させずに禁止するのは、自立心を損ねる気もする。
2643 = "Đúng là có thể nguy hiểm. Nhưng——\ncấm cản mà không cho thử sức, tôi có cảm giác sẽ làm tổn hại đến tính tự lập của con bé."
# 【双鉄】
# display as 雙鐵
# JP: 「ならば、まずは僕が登って試してみよう」
2167 = "「Nếu vậy thì, trước tiên để tôi leo lên thử xem sao.」"
# 【ひかり】
# display as 光
# JP: 「ぱぱがぁ？」
2048 = "「Papa leo á?」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。僕が登って問題ないなら、\nより軽いひかりも大丈夫ではないかと思える」
1878 = "「Ừm. Nếu tôi leo lên mà không có vấn đề gì,\nthì Hikari nhẹ hơn chắc chắn cũng sẽ không sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん。無理しないで、怪我しないでくださいね？」
2183 = "「Anh Soutetsu. Đừng quá sức nhé, cẩn thận kẻo bị thương đấy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「わかっている。慎重にいくさ」
1997 = "「Tôi biết rồi. Tôi sẽ cẩn thận.」"
# monologue
# JP: これだけ積まれている雪だ。\nそうそう崩れまいとも思うが――
2747 = "Tuyết được chất đống nhiều thế này.\nChắc không dễ gì sụp đổ đâu, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「よっ――」
1899 = "「Dô——」"
# monologue
# JP: （ぐっ――ぐっ――）
2796 = "（Gừ——Gừ——）"
# monologue
# JP: 安全のためには、両手をついて三点支持で移動したいが、\nそれほどキツい傾斜ではない。
2616 = "Để an toàn, tôi muốn dùng cả hai tay và di chuyển bằng ba điểm tựa,\nnhưng độ dốc không đến mức gắt như vậy."
# monologue
# JP: 足下も、かなりしっかりしているし――
2711 = "Chỗ đặt chân cũng khá vững chắc——"
# monologue
# JP: （ぐっ）
2797 = "（Gừ）"
# monologue
# JP: もう一歩。\n慎重に慎重にゆっくり踏み出す。
2722 = "Thêm một bước nữa.\nTôi chầm chậm bước đi một cách vô cùng thận trọng."
# 【ひかり】
# display as 光
# JP: 「やっぱりのぼれるー！　ひかりものぼるー！」
2056 = "「Quả nhiên là leo được mà~! Hikari cũng sẽ leo~!」"
# 【ポーレット】
# display as 波萊特
# JP: 「まだよ？　ひかり。\n雪山閉塞区間、今は、パパ列車が走行中だから」
2147 = "「Vẫn chưa được đâu? Hikari.\nĐoạn đường đóng đường trên núi tuyết, hiện tại tàu papa đang chạy mà.」"
# 【ひかり】
# display as 光
# JP: 「わわ！　ひかりれっしゃも しんにゅーしたら、\nだいじこになっちゃうのぉ」
1801 = "「Oa oa! Nếu tàu Hikari cũng tiến vào,\nthì sẽ xảy ra tai nạn lớn mất thôi~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ははっ」
1818 = "「Haha.」"
# monologue
# JP: なるほど、上手い。
2609 = "Ra vậy, cách nói khéo thật."
# monologue
# JP: その説明なら、僕が閉塞区間を出るまで、\nひかりは決して上ってこよ――っ！！！？
2613 = "Với lời giải thích đó, cho đến khi tôi ra khỏi đoạn đường đóng đường,\nHikari tuyệt đối sẽ không leo lên——!!!?"
# monologue
# JP: （ずぼおっ！）
2806 = "（Rầm!）"
# 【双鉄】
# display as 雙鐵
# JP: 「うおっ！！？」
1817 = "「Uo!!?」"
# 【ポーレット】
# display as ３人
# JP: 「双鉄くん！！？」「ぱぱ！？」\n「そうてつさぁん！？」
2188 = "「Anh Soutetsu!!?\nPapa!?\nAnh Soutetsu!?」"
# 【双鉄】
# display as 雙鐵
# JP: 「待て！　動くな近づくな！！」
2091 = "「Đợi đã! Đừng động đậy, đừng lại gần đây!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ！！」
1854 = "「A!!」"
# monologue
# JP: 状況が上手く把握できない。\nならば最優先すべきは、二次災害の防止。
2558 = "「Đợi đã! Đừng động đậy, đừng lại gần đây!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「僕は大丈夫。\n痛みはない、おそらく、怪我もしていない」
1969 = "「A!!」"
# monologue
# JP: 次いで、言葉に直して現状確認。
2568 = "Tôi chưa nắm rõ được tình hình.\nVậy thì ưu tiên hàng đầu là ngăn ngừa tai nạn thứ cấp."
# monologue
# JP: 言葉が気持ちを落ち着けて、\nせばまっていた視野が広がる。
2699 = "「Tôi không sao.\nKhông thấy đau, có lẽ cũng không bị thương.」"
# 【双鉄】
# display as 雙鐵
# JP: 「……雪の下が空洞になっている部分があったのだな。\nそこを踏み抜き、右足がすっぽり落ちてしまった」
1264 = "Tiếp theo, dùng lời nói để xác nhận tình trạng hiện tại."
# monologue
# JP: 言えば、危険を理解する。
2697 = "Lời nói giúp tôi bình tĩnh lại,\nvà tầm nhìn đang bị thu hẹp dần mở rộng ra."
# monologue
# JP: 雪の下。どれだけの範囲に空洞があるのかわからない。\n広ければ、残ってる左足ごと――全身が下に落ちかねない。
2518 = "「……Có một khoảng trống dưới lớp tuyết nhỉ.\nTôi đã dẫm phải chỗ đó, và chân phải bị lọt thỏm xuống.」"
# monologue
# JP: （１メートルほどの高さの山だ。例え落ちても、\n大けがをするようなことは無かろうが――）
2784 = "Nói ra thì mới hiểu được sự nguy hiểm."
# monologue
# JP: しかし、山の下に地面があるかもわからない。\n深い溝にでもなっていたなら、冗談ではなく命の危機だ。
2375 = "Dưới lớp tuyết. Không biết khoảng trống đó rộng bao nhiêu.\nNếu nó rộng, có thể cả chân trái còn lại——toàn thân tôi sẽ rơi xuống dưới mất."
# monologue
# JP: ……慎重にいきたいところだが、\nこのままとどまっているのも怖い。
1245 = "（Đây là một ngọn núi cao khoảng 1 mét. Cho dù có rơi xuống,\nchắc cũng không đến mức bị thương nặng——）"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、足、抜ける？」
2187 = "Nhưng, cũng không biết dưới ngọn núi này có phải là mặt đất hay không.\nNếu nó là một cái rãnh sâu, thì không phải chuyện đùa đâu, sẽ nguy hiểm đến tính mạng đấy."
# 【双鉄】
# display as 雙鐵
# JP: 「多分、抜けるが――さて、どうやって抜くのがいいか」
1971 = "「Chắc là rút ra được thôi——nhưng mà, rút ra bằng cách nào thì tốt đây.」"
# monologue
# JP: 油断したとしかいいようが無い。
2727 = "Chỉ có thể nói là do tôi đã bất cẩn."
# monologue
# JP: ポーレットとひかりの会話に気をとられ、\n慎重に踏み出すのを忘れてしまった。
2529 = "Bị phân tâm bởi cuộc trò chuyện giữa Paulette và Hikari,\nmà tôi quên mất phải cẩn thận khi bước đi."
# 【双鉄】
# display as 雙鐵
# JP: 「……接地面積を広げたほうが、\n踏み抜きにくくはなるよな」
1261 = "「……Nếu mở rộng diện tích tiếp xúc,\nthì sẽ khó bị lún hơn nhỉ.」"
# monologue
# JP: （べたあっ）
2809 = "（Phịch）"
# 【ひかり】
# display as 光
# JP: 「ぱぱ！？」
2061 = "「Papa!?」"
# 【れいな】
# display as 玲奈
# JP: 「わ、つめたそうですぅ」
1813 = "「Oa, trông lạnh quá đi ạ~」"
# monologue
# JP: 残っている左足側に体をべったり寝そべらせる。
2520 = "Tôi nằm sấp hẳn người về phía chân trái còn lại."
# monologue
# JP: そのまま体全部ごと這っていくように下に向かって――
2622 = "Cứ thế, tôi trườn cả người hướng xuống dưới——"
# monologue
# JP: （ず……ずっ――）
2794 = "（Xoạt……Xoạt——）"
# 【ひかり】
# display as 光
# JP: 「ぱぱー、がんばえー！」
2049 = "「Papa, cố lên~!」"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、慎重に、慎重に――」
2184 = "「Anh Soutetsu, cẩn thận nhé, cẩn thận——」"
# monologue
# JP: （ず――る――ぅっ――――）
2793 = "（Trượt——Rột――――）"
# 【双鉄】
# display as 雙鐵
# JP: 「……うむ、抜けたか」
1258 = "「……Ừm, rút ra được rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「よかったですぅ！」
1913 = "「May quá đi ạ~!」"
# monologue
# JP: となれば一刻でも早く、この雪山を下りたくなるが――\nそう感じるゆえ、焦らない。
2571 = "Thế là tôi muốn xuống khỏi ngọn núi tuyết này càng nhanh càng tốt——\nnhưng chính vì cảm thấy vậy, nên tôi không vội vàng."
# monologue
# JP: 最悪なのは二次災害。\nその物差しを忘れなければ、取り得る行動も絞られる。
2356 = "Tồi tệ nhất là tai nạn thứ cấp.\nChỉ cần không quên điều đó, thì những hành động có thể thực hiện cũng sẽ được thu hẹp lại."
# 【双鉄】
# display as 雙鐵
# JP: 「はいずったまま――べったり全身で接地したまま、\n三点支持で移動して――」
1954 = "「Cứ trườn thế này——giữ toàn thân áp sát mặt đất,\ndi chuyển bằng ba điểm tựa——」"
# monologue
# JP: （ずっ……ずっ――）
2792 = "（Xoạt……Xoạt——）"
# 【ひかり】
# display as 光
# JP: 「わ！　ぱぱ、あめんぼみたーい」
1799 = "「Oa! Papa, trông giống con nhện nước quá~」"
# 【れいな】
# display as 玲奈
# JP: 「わ。ほんとですねぇ。\n手と足が長いから、そういう風に見えますねぇ」
1815 = "「Oa. Đúng thật nhỉ~.\nTay và chân anh ấy dài nên trông giống như vậy đó nha~」"
# monologue
# JP: そうか、いま僕はあめんぼか。\nならば、理にかなった体勢なのだ。
2425 = "Vậy sao, bây giờ tôi là nhện nước à.\nNếu vậy thì đây là một tư thế hợp lý đấy."
# monologue
# JP: アメンボが水没しないのと同様、\nこの姿勢のまま、地道な移動を重ねれば――
2483 = "Giống như nhện nước không bị chìm xuống nước,\nnếu tôi cứ giữ tư thế này và kiên nhẫn di chuyển từng chút một——"
# monologue
# JP: （ずりっ――ずりっ――――ざくっ！）
2791 = "（Xoạt——Xoạt――――Rột!）"
# 【双鉄】
# display as 雙鐵
# JP: 「くはあっ！」
1794 = "「Hà!」"
# monologue
# JP: 地面だ。\nなんという安心感だ！
2409 = "Mặt đất đây rồi.\nThật là một cảm giác an tâm làm sao!"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん、怪我は！？\nどこか打ったりひねったりしてないですか？」
2185 = "「Anh Soutetsu, có bị thương không!?\nCó bị va đập hay trẹo chân ở đâu không?」"
# 【双鉄】
# display as 雙鐵
# JP: 「どうかな――少し待ってくれ。\n……うん！　どこも打っても、ひねってもいない」
1634 = "「Xem nào——Đợi tôi một chút.\n……Ừm! Không bị va đập hay trẹo ở đâu cả.」"
# 【ポーレット】
# display as 波萊特
# JP: 「よかったぁ。もう、気をつけてくださいね？」
1912 = "「May quá đi. Thật tình, anh phải cẩn thận hơn đấy nhé?」"
# 【双鉄】
# display as 雙鐵
# JP: 「だな、完全に油断した。\nとはいえ――」
2001 = "「Đúng vậy, tôi đã hoàn toàn bất cẩn.\nMặc dù vậy——」"
# monologue
# JP: ひかりはと見れば、雪にまみれた僕の姿を、\nいかにも恐る恐ると見ている。
2549 = "Nhìn sang Hikari, con bé đang nhìn bộ dạng dính đầy tuyết của tôi,\nvới vẻ mặt vô cùng sợ hãi."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかり、どうだ？　あの雪山に登ってみたいか？」
1716 = "「Hikari, sao nào? Cháu có muốn thử leo lên ngọn núi tuyết đó nữa không?」"
# 【ひかり】
# display as 光
# JP: 「やぁあ。こわいぃ。\nもっとこわくないのであそぶのー」
1649 = "「Dạ thôi~. Sợ lắm~.\nCháu sẽ chơi trò nào bớt đáng sợ hơn cơ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
2004 = "「Vậy sao.」"
# monologue
# JP: 体を張っての反面教師にはなれたようだ。
2645 = "Có vẻ tôi đã trở thành một tấm gương xấu thực tế rồi."
# monologue
# JP: 実際、すっぽり落ちたのがひかりだったら――\n体全部で、下まで抜けていたかもしれない。
2663 = "Thực tế, nếu người bị lọt thỏm xuống là Hikari——\nthì có lẽ toàn thân con bé đã bị lún sâu xuống tận dưới rồi."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん、寒くないですかぁ？」
2180 = "「Anh Soutetsu, anh có lạnh không ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、今温かい飲み物買ってきます！」
1860 = "「A, để tôi đi mua đồ uống nóng ngay!」"
# 【双鉄】
# display as 雙鐵
# JP: 「いや、どこか店に入ろう。\n少し座って休憩しながら体を温めたい」
1637 = "「Không, chúng ta hãy vào một quán nào đó đi.\nTôi muốn ngồi nghỉ ngơi một chút và làm ấm cơ thể.」"
# 【ポーレット】
# display as 波萊特
# JP: 「その方がいいですね、えっと――」
2173 = "「Như vậy tốt hơn nhỉ, ừm——」"
# monologue
# JP: 幸い、お店は冬期休業していない。
2506 = "May mắn thay, các cửa hàng không đóng cửa vào mùa đông."
# monologue
# JP: 和菓子屋、食堂、蕎麦屋――\nざっと見るだけでもすぐに候補がいくつも出来る。
2450 = "Cửa hàng bánh kẹo truyền thống Nhật Bản, quán ăn, quán mì soba——\nChỉ cần nhìn lướt qua cũng có thể chọn ra vài ứng cử viên."
# 【双鉄】
# display as 雙鐵
# JP: 「やはり、しっかりとした観光立地がされているな。\n旅人になると、選択肢の多さが実にありがたい」
2082 = "「Quả nhiên, vị trí du lịch được thiết lập rất bài bản.\nKhi trở thành khách du lịch, việc có nhiều lựa chọn thực sự rất đáng quý.」"
# 【ポーレット】
# display as 波萊特
# JP: 「参考にしないとですよね。御一夜は素泊まりしちゃうと\n朝食を食べられるお店に困るって声、市長時代から」
2140 = "「Chúng ta phải tham khảo thôi. Từ hồi tôi còn làm thị trưởng,\nđã có ý kiến cho rằng nếu chỉ thuê phòng nghỉ ở Ohimitera thì sẽ rất khó tìm quán ăn sáng.」"
# 【ひかり】
# display as 光
# JP: 「あー、たまごぉ」
1863 = "「A~, trứng kìa~」"
# 【お店の人】
# display as 店員
# JP: 「はい、いらっしゃい」
1962 = "「Vâng, xin kính chào quý khách.」"
# 【ひかり】
# display as 光
# JP: 「ひゃんっ！」
1778 = "「Hyan!」"
# monologue
# JP: お店の中からの一声が響くやいなやで、\nひかりは素早く、れいなの陰へと隠れてしまう。
2358 = "Ngay khi giọng nói từ trong cửa hàng vang lên,\nHikari nhanh chóng trốn sau lưng Reina."
# monologue
# JP: 卵屋さん……食料品店か。\nあいにくと、店内で飲食できる感じでは――おや？
2721 = "Cửa hàng bán trứng……Cửa hàng thực phẩm sao.\nTiếc là, có vẻ không giống nơi có thể ăn uống bên trong——ủa?"
# 【ポーレット】
# display as 波萊特
# JP: 「これ――『温泉卵セット』って書いてありますけど」
2135 = "「Cái này——Có ghi là 『Set trứng luộc suối nước nóng』 này.」"
# monologue
# JP: ポーレットもやはり気になったらしい。\nプラスチックのカップに卵がふたつと、つゆ一袋。
2607 = "Có vẻ Paulette cũng để ý đến nó.\nHai quả trứng và một túi nước chấm trong một chiếc cốc nhựa."
# monologue
# JP: スプーンもつき、まるで立ち食いしてくださいと\nいわんばかりの温泉卵だ。
2684 = "Có kèm cả thìa, trông như thể một món trứng luộc suối nước nóng\ndành cho việc đứng ăn vậy."
# 【ポーレット】
# display as 波萊特
# JP: 「これって、すぐ食べられるんですか？」
2138 = "「Cái này, có thể ăn ngay được không ạ?」"
# 【お店の人】
# display as 店員
# JP: 「すぐにだと、生卵のままになりますが」
2195 = "「Nếu ăn ngay thì nó vẫn là trứng sống đấy ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　でもここに『温泉卵セット』って」
1795 = "「Hả? Nhưng ở đây ghi là 『Set trứng luộc suối nước nóng』 mà.」"
# 【お店の人】
# display as 店員
# JP: 「はい。誰にでも簡単に、\n『温泉卵を作れるセット』になってます」
1943 = "「Vâng. Đây là một set\n『Ai cũng có thể dễ dàng làm trứng luộc suối nước nóng』 ạ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「作る――\n僕たち自身で作れるということですか？」
1676 = "「Làm——\nÝ bác là chúng tôi có thể tự mình làm sao?」"
# 【お店の人】
# display as 店員
# JP: 「はい。15～16分はかかりますが」
2025 = "「Vâng. Sẽ mất khoảng 15 đến 16 phút đấy ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、そのくらいなら全然。どうやって作るんですか？\nわたし、作ってみたいです」
1866 = "「A, tầm đó thì không sao đâu ạ. Làm thế nào vậy ạ?\nCháu muốn làm thử.」"
# monologue
# JP: “ひかりもなのー”と言いたげに、\nれいなの陰から、ひかりの顔がじわじわでてくる。
2674 = "Với vẻ mặt như muốn nói \"Hikari cũng muốn~\" ,\nkhuôn mặt Hikari từ từ nhô ra từ sau lưng Reina."
# 【お店の人】
# display as 店員
# JP: 「この観光地図の、ここです。ここに行ってください」
2161 = "「Trên bản đồ du lịch này, là ở đây. Xin hãy đến chỗ này.」"
# monologue
# JP: お店の方は親切なことに、\nパンフレット形式の観光地図を渡してくれる。
2624 = "Người của cửa hàng rất tốt bụng,\nđã đưa cho chúng tôi một tấm bản đồ du lịch dạng tờ rơi."
# 【お店の人】
# display as 店員
# JP: 「そちらの坂をしばらく上っていったところに、\nおおきな駐車場沿いの足湯がありまして」
2032 = "「Đi lên con dốc đằng kia một đoạn,\nsẽ có một bồn ngâm chân dọc theo bãi đậu xe lớn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「足湯ですか」
2119 = "「Bồn ngâm chân sao.」"
# 【お店の人】
# display as 店員
# JP: 「はい。その足湯のところに、共同の、\n『温泉たまご工房』があるんですよ」
1942 = "「Vâng. Ở chỗ bồn ngâm chân đó, có một\n『Xưởng làm trứng luộc suối nước nóng』 công cộng đấy ạ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「温泉たまご工房！」
2038 = "「Xưởng làm trứng luộc suối nước nóng!」"
# 【れいな】
# display as 玲奈
# JP: 「わぁあ、おもしろそうですぅ」
1816 = "「Oa, có vẻ thú vị quá đi ạ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
1883 = "「Ừm.」"
# monologue
# JP: れいなの陰で、ひかりもこくこく頷いている。\nならば、予定は変更だ。
2387 = "Sau lưng Reina, Hikari cũng đang gật đầu lia lịa.\nNếu vậy thì, thay đổi kế hoạch thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「その、『温泉卵セット』をふたつ。\nいただけますか？」
2097 = "「Cho tôi hai 『Set trứng luộc suối nước nóng』 đó.\nĐược chứ ạ?」"
# 【双鉄】
# display as 雙鐵
# JP: 「なるほど。こういう仕組みか」
1737 = "「Ra vậy. Cơ chế là thế này sao.」"
# 【ひかり】
# display as 光
# JP: 「どういうしくみ？　みたいのー」
2006 = "「Cơ chế gì thế? Cháu muốn xem~」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ。そら」
1880 = "「Ừm. Đây.」"
# monologue
# JP: ひかりを抱き上げ、目線をあげる。
2537 = "Tôi bế Hikari lên, nâng tầm mắt con bé cao lên."
# monologue
# JP: 途端に、ふわぁ、\nひかりは感心した息を吐く。
2385 = "Ngay lập tức, oa,\nHikari thở ra một tiếng đầy ngưỡng mộ."
# 【ひかり】
# display as 光
# JP: 「ひもー、いっぱいー」
2013 = "「Nhiều dây quá~」"
# 【双鉄】
# display as 雙鐵
# JP: 「ひもではなく鎖。鎖が、水切りかごに結びつけられ、\n水切りかごは、温泉の湯の中に沈んでいる」
2136 = "「Không phải dây mà là xích. Xích được buộc vào rổ vớt nước,\nvà rổ vớt nước đang chìm trong nước suối nóng.」"
# 【ひかり】
# display as 光
# JP: 「くさりと、みずきいかごーと、おんせんのゆー」
2177 = "「Xích, và rổ vớt nước, và nước suối nóng~」"
# 【双鉄】
# display as 雙鐵
# JP: 「水切り、な。ポーレット。空いているかごの鎖の端を、\nひかりに持たせてやってくれるか？」
2010 = "「Vớt nước, nhé. Paulette. Cô có thể đưa đầu xích của một chiếc rổ trống\ncho Hikari cầm giúp tôi được không?」"
# 【ポーレット】
# display as 波萊特
# JP: 「はい、ひかり？　これが、うちのかごの鎖ね」
1922 = "「Được rồi, Hikari? Đây là xích rổ của nhà mình nhé.」"
# 【ひかり】
# display as 光
# JP: 「うちのかごのくさりー」
1968 = "「Xích rổ của nhà mình~」"
# 【双鉄】
# display as 雙鐵
# JP: 「それを、ゆっくりひっぱるんだ。\n他のかごをひっくり返さぬように、ゆっくりゆっくり」
1669 = "「Cháu hãy kéo nó từ từ lên.\nĐừng làm lật những chiếc rổ khác, từ từ, từ từ thôi.」"
# 【ひかり】
# display as 光
# JP: 「ゆっくり、ゆっくりー」
1965 = "「Từ từ, từ từ~」"
# 【れいな】
# display as 玲奈
# JP: 「わぁ、ひかりちゃん上手ですぅ」
1803 = "「Oa, bé Hikari giỏi quá đi ạ~」"
# 【ひかり】
# display as 光
# JP: 「えへへー」
1900 = "「Ehehe~」"
# monologue
# JP: かごがあがった。\n卵の5、6個は余裕で入りそうな大きさだ。
2660 = "Chiếc rổ đã được kéo lên.\nKích thước này có vẻ dễ dàng chứa được 5, 6 quả trứng."
# 【ポーレット】
# display as 波萊特
# JP: 「そうしたら、今度はかごに、うちのたまごをいれます」
1982 = "「Sau đó, bây giờ chúng ta sẽ cho trứng của nhà mình vào rổ.」"
# 【ひかり】
# display as 光
# JP: 「ひかりがいれるのー」
1709 = "「Hikari sẽ cho vào cơ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「せっかく2セットあるのだ。卵2個はひかりが、\nもう2個はれいながいれるのがいいだろう」
1762 = "「Đã cất công mua 2 set rồi. 2 quả trứng thì Hikari cho vào,\n2 quả còn lại để Reina cho vào là được rồi.」"
# 【れいな】
# display as 玲奈
# JP: 「わわ、れいなもやっていいんですかぁ」
1808 = "「Oa oa, Reina cũng được làm sao ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「もちろん！　はい、れいなの分」
2081 = "「Tất nhiên rồi! Đây, phần của Reina này.」"
# 【ひかり】
# display as 光
# JP: 「れいなおねーちゃん、お先にどーぞ」
2070 = "「Chị Reina, xin mời chị trước ạ.」"
# 【れいな】
# display as 玲奈
# JP: 「ふわわ、れいな、こんなのはじめてですよぉ。\nわっちゃわないように、そっと、そーっと」
1811 = "「Oa oa, Reina mới làm chuyện này lần đầu tiên đó nha~.\nĐể không làm vỡ, nhẹ nhàng, thật nhẹ nhàng.」"
# monologue
# JP: （ことっ――ことっ）
2790 = "（Cạch——Cạch）"
# monologue
# JP: れいなもすっかりお姉さんだ。
2636 = "Reina cũng ra dáng người chị lắm rồi."
# monologue
# JP: ひかりが失敗しないよう、\nいつだって実にさりげなく、ひかりの手本となってくれる。
2615 = "Để Hikari không mắc lỗi,\nem ấy lúc nào cũng rất tinh tế, trở thành tấm gương cho Hikari."
# 【ひかり】
# display as 光
# JP: 「じょうずう！　ひかりもやるのー！」
2068 = "「Giỏi quá! Hikari cũng làm cơ~!」"
# monologue
# JP: （ことっ――ことっ）
# 2790 = "（咚——咚）" 
# 【双鉄】
# display as 雙鐵
# JP: 「なかなか慎重な手つきだったな。\n見事なものだ」
1704 = "「Thao tác khá là cẩn thận đấy.\nTuyệt lắm.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうしたら、今度は卵の入ったかごを、\n温泉のお湯の中に沈めまーす」
1983 = "「Sau đó, bây giờ chúng ta sẽ thả chiếc rổ có trứng,\nchìm vào trong nước suối nóng nhé~」"
# 【ひかり】
# display as 光
# JP: 「れいなおねーちゃん、いっしょにやろー？」
2073 = "「Chị Reina, cùng làm nhé~?」"
# 【れいな】
# display as 玲奈
# JP: 「うふふ、いっしょにやりましょうねぇ」
1787 = "「Ufufu, cùng làm thôi nào~」"
# monologue
# JP: ひかりとれいな、ふたりの小さな手が鎖を持ち、\nそろり、そろりと卵をかごのなかへと――
2394 = "Hikari và Reina, hai bàn tay nhỏ bé cùng cầm sợi xích,\nchầm chậm, chầm chậm thả trứng vào trong rổ——"
# 【双鉄】
# display as 雙鐵
# JP: 「むっ！？　いかん、ポーレット代わってくれ」
1847 = "「Hửm!? Không được rồi, Paulette đổi chỗ cho tôi đi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「え？　はい！　ひかり、ストップ。\nれいな、鎖そのままもっててね？」
1826 = "「Hả? Vâng! Hikari, dừng lại.\nReina, cứ giữ nguyên sợi xích nhé?」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい」
# 1925 = "「好的」" 
# 【ポーレット】
# display as 波萊特
# JP: 「ひかり、ママのとこおいで？　だっこ交代！」
1717 = "「Hikari, lại chỗ mama nào? Đổi người bế!」"
# 【ひかり】
# display as 光
# JP: 「だっこ、こーたーい！　きゃあ！」
1936 = "「Đổi người bế! Kyaa!」"
# 【ポーレット】
# display as 波萊特
# JP: 「いらっしゃーい！　\nで、はい、鎖」
1977 = "「Lại đây nào!\nRồi, đây, xích.」"
# 【双鉄】
# display as 雙鐵
# JP: 「まだ沈めないでくれ。もうすぐだ」
1681 = "「Đừng vội thả xuống. Sắp đến lúc rồi.」"
# monologue
# JP: 鉄道時計を取り出し、にらめば、\nポーレットはくすりと笑みを零す。
2608 = "Tôi lấy chiếc đồng hồ đường sắt ra và nhìn chằm chằm vào nó,\nPaulette khẽ bật cười."
# 【ポーレット】
# display as 波萊特
# JP: 「ああ、双鉄君ってばきっちり屋さん」
2182 = "「A, anh Soutetsu đúng là người kỹ tính.」"
# 【双鉄】
# display as 雙鐵
# JP: 「16分はいささか長い。\n体感だけでは、誤差が出てしまいかねん」
2204 = "「16 phút thì hơi dài.\nNếu chỉ dựa vào cảm giác, rất có thể sẽ xảy ra sai số.」"
# monologue
# JP: 僕も機関士のはしくれだ。
2527 = "Tôi cũng là một lái tàu mà."
# monologue
# JP: 15分46秒から16分14秒の範囲内には、\n体感だけでも収め切れそうな気はするが――
2485 = "Trong khoảng từ 15 phút 46 giây đến 16 phút 14 giây,\ntôi có cảm giác chỉ cần dựa vào cảm giác cũng có thể nắm bắt được, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「正確にやるにこしたことはない。\nと、いうことで……さん、にぃ、いち！」
1763 = "「Cứ làm thật chính xác là tốt nhất.\nVì vậy……Ba, hai, một!」"
# 【れいな】
# display as 玲奈
# JP: 「いまですねぇ」
2107 = "「Bây giờ nhỉ~」"
# 【ひかり】
# display as 光
# JP: 「やわやわー、やわやわー！」
1966 = "「Nhẹ nhàng thôi~, nhẹ nhàng thôi~!」"
# monologue
# JP: ひかりの声にあわせてゆっくり、\nかごが湯の中につかり始める。
2735 = "Hòa cùng giọng nói của Hikari, một cách chậm rãi,\nchiếc rổ bắt đầu chìm vào trong nước nóng."
# 【双鉄】
# display as 雙鐵
# JP: 「よし！　『とまれー』！」
1929 = "「Được rồi! 『Dừng lại』!」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、しずみきりましたぁ！」
1897 = "「Ufufu, chìm hẳn rồi ạ~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ、では足湯に直行だ！！」
1934 = "「Ừm, vậy thì đi thẳng đến bồn ngâm chân thôi!!」"
# 【ひかり】
# display as 光
# JP: 「きゃあ！！」
1779 = "「Kyaa!!」"
# monologue
# JP: （ちゃぽっ――）
2807 = "（Tũm——）"
# 【ポーレット】
# display as 波萊特
# JP: 「ああ――あったかぁい」
1851 = "「A——Ấm quá đi.」"
# 【ひかり】
# display as 光
# JP: 「あったかーい」
1920 = "「Ấm quá~」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
2000 = "「Thật đấy.」"
# monologue
# JP: ポーレット、れいな、ひかり、僕。\n四人並んでのんびり足を湯につける。
2605 = "Paulette, Reina, Hikari, tôi.\nBốn người xếp thành hàng thong thả ngâm chân trong nước nóng."
# monologue
# JP: 暖まってみて初めて自分が、\nかなり冷えていたことに気づかされる。
2593 = "Chỉ khi ấm lên rồi tôi mới nhận ra rằng,\nmình đã bị lạnh đến nhường nào."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかりは寒くないか？\nポーレットとれいなは？」
1683 = "「Hikari có lạnh không?\nCòn Paulette và Reina thì sao?」"
# 【ひかり】
# display as 光
# JP: 「さむくないのー。あんよ、ぽかぽかー」
1628 = "「Không lạnh đâu~. Chân ấm lắm~」"
# monologue
# JP: （ぱちゃぱちゃ！）
2805 = "（Tõm tũm!）"
# 【ポーレット】
# display as 波萊特
# JP: 「きゃ！　ひかり。\n足をばたばたさせたらめー、でしょ？」
1821 = "「Á! Hikari.\nKhông được đập chân loạn xạ như thế, nhớ chưa?」"
# 【ひかり】
# display as 光
# JP: 「めーなの？」
1647 = "「Không được ạ?」"
# 【れいな】
# display as 玲奈
# JP: 「ですよぉ。足湯っていうのは、\n足のおふろ、っていう意味ですからー」
1646 = "「Đúng vậy đó nha~. Bồn ngâm chân,\ncó nghĩa là bồn tắm dành cho chân mà~」"
# 【ひかり】
# display as 光
# JP: 「めーなの！　おふろでばちゃばちゃ、\nとろるゆのおばーちゃんにおこられるのー！」
2149 = "「Không được! Đập nước bắn tung tóe trong bồn tắm,\nsẽ bị bà ở Tororyu-yu mắng đó~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「だなぁ」
# 2000 = "「是啊」" 
# monologue
# JP: ありがたいなと、つくづく思う。\n僕とポーレットとれいなとだけでは、目も手も足りない。
2554 = "Tôi thực sự cảm thấy biết ơn vô cùng.\nChỉ có tôi, Paulette và Reina thì không đủ mắt đủ tay để trông chừng."
# monologue
# JP: みんなに囲まれ守られ、育つ――\nひかりは、本当に恵まれている子なのだと。
2467 = "Được mọi người bao bọc, che chở và nuôi nấng——\nHikari thực sự là một đứa trẻ may mắn."
# monologue
# JP: （いや――あるいはその反動、なのか？\nひかりの、極度のひとみしりは）
2801 = "（Không——hay đó là phản ứng ngược lại?\nSự nhút nhát tột độ của Hikari.）"
# monologue
# JP: 産まれてこの方、ひかりは御一夜を殆ど離れたことが無い。\nそして御一夜にいれば、身内だけですべてがこと足りる。
2512 = "Từ khi sinh ra đến nay, Hikari hầu như chưa bao giờ rời khỏi Ohimitera.\nVà nếu ở Ohimitera, chỉ cần những người thân thiết là đủ cho mọi thứ."
# monologue
# JP: ゆえ、“知らない人”と触れる必要もきっかけもなく――\n結果“知らない人”を恐れるようになった。
2561 = "Do đó, con bé không có nhu cầu hay cơ hội tiếp xúc với \"người lạ\"——\nKết quả là trở nên sợ hãi \"người lạ\"."
# monologue
# JP: （そう考えれば筋が通るな。……もとより僕らも、\n“知らない人についていくな”と教育してもいるし）
2811 = "（Nghĩ vậy thì cũng hợp lý. ……Vốn dĩ chúng tôi cũng\ngiáo dục con bé là \"không được đi theo người lạ\" mà.）"
# monologue
# JP: 安全な“知らない人”の見分け方など、\n大人の僕らにも難しい。
2455 = "Cách phân biệt \"người lạ\" an toàn,\nngay cả người lớn như chúng tôi cũng thấy khó."
# monologue
# JP: ならば最初から全排除が、安全を第一とするためには正解\n――のような気もするにはするのだが……
2726 = "Nếu vậy thì ngay từ đầu loại trừ tất cả, để đặt an toàn lên hàng đầu mới là đáp án đúng\n——tôi có cảm giác như vậy, nhưng……"
# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？　お疲れですか？」
2186 = "「Anh Soutetsu? Anh mệt sao?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ん？　ああ――」
1894 = "「Hửm? À——」"
# monologue
# JP: 厳しい顔にでもなっていたか。\n疲れは特に感じていないが、否定をすれば気遣われよう。
2559 = "Khuôn mặt tôi trở nên nghiêm nghị rồi sao.\nTôi không thấy mệt gì đặc biệt, nhưng nếu phủ nhận thì cô ấy sẽ lại lo lắng."
# 【双鉄】
# display as 雙鐵
# JP: 「やはり、少し体がびっくりしてしまったのかな」
1777 = "「Quả nhiên, cơ thể tôi có chút bất ngờ chăng.」"
# 【ひかり】
# display as 光
# JP: 「ひかりもびっくり！　ずぼーっ！　って！！」
1687 = "「Hikari cũng bất ngờ! Rầm! Một cái!!」"
# 【れいな】
# display as 玲奈
# JP: 「れいなも、あわわってなりましたぁ」
2077 = "「Reina cũng, oa oa một phen luôn ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ」
1784 = "「Ufufu.」"
# monologue
# JP: ポーレットが何故か微笑む。\nしあわせそうに。
2443 = "Không hiểu sao Paulette lại mỉm cười.\nTrông thật hạnh phúc."
# 【ポーレット】
# display as 波萊特
# JP: 「二重にびっくりしちゃいました。\n双鉄くんも、はしゃぎすぎて失敗したりするんだなって」
1946 = "「Tôi đã bất ngờ gấp đôi đấy.\nThì ra anh Soutetsu cũng có lúc đùa giỡn quá trớn rồi thất bại nhỉ.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はしゃぎすぎ――僕がか？」
1915 = "「Đùa giỡn quá trớn——Tôi sao?」"
# 【ポーレット】
# display as 波萊特
# JP: 「って、見えましたけど？」
1972 = "「Tôi thấy như vậy đấy?」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 2000 = "「是啊」" 
# monologue
# JP: 言われてみれば、そうかもしれぬ。
2675 = "Nghe cô ấy nói vậy, có lẽ là thế thật."
# monologue
# JP: ひかりの危険防止うんぬんということだけではなく――\nあるいは僕も、あの雪山に、ただ単純に登りたかった。
2698 = "Không chỉ vì chuyện phòng ngừa nguy hiểm cho Hikari hay gì đó——\nmà có lẽ, bản thân tôi cũng chỉ đơn thuần là muốn leo lên ngọn núi tuyết đó."
# 【双鉄】
# display as 雙鐵
# JP: 「ふふっ、だとしても、悪くはないな」
1791 = "「Fufu, dù là vậy, cũng không tệ nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「悪くないです。怪我もなかったし」
2007 = "「Không tệ chút nào. Cũng không ai bị thương mà.」"
# monologue
# JP: いって、ポーレットが足先で、\nわずかに足湯の湯を揺らす。
2701 = "Nói rồi, Paulette dùng mũi chân,\nkhẽ làm xao động nước trong bồn ngâm chân."
# 【ポーレット】
# display as 波萊特
# JP: 「足、もみましょうか？\n双鉄くんには、乗り疲れもあると思うし」
2104 = "「Để tôi xoa bóp chân cho anh nhé?\nTôi nghĩ anh Soutetsu cũng mệt mỏi vì đi tàu nhiều rồi.」"
# 【ひかり】
# display as 光
# JP: 「なら、ひかりもむー！」
1707 = "「Nếu vậy, Hikari cũng xoa~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ひかりは、つかれていないのか？」
1685 = "「Hikari, cháu không mệt sao?」"
# 【ひかり】
# display as 光
# JP: 「へいきー！　\nひかり、うまれたときから、のりてつだもーん」
1643 = "「Không sao đâu~!\nHikari, từ lúc sinh ra, đã là người thích đi tàu rồi mà~」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと」
1819 = "「Ôi chà.」"
# monologue
# JP: ひかりが、僕の太ももに手を乗せてくれる。
2401 = "Hikari đặt tay lên đùi tôi."
# monologue
# JP: 実に、ちいさい。この手でマッサージを受けたとて、\n何の効能もなかろうが――
2465 = "Thật sự, rất nhỏ bé. Dù có được đôi bàn tay này xoa bóp,\nchắc cũng chẳng có tác dụng gì đâu, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、頼む」
2158 = "「Vậy thì, nhờ cháu nhé.」"
# 【ひかり】
# display as 光
# JP: 「たのまれたのー！　もみもみ、もみもみ」
2053 = "「Nhận lệnh~! Xoa xoa, xoa xoa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「――っ」
1252 = "「——」"
# monologue
# JP: 効く、とか気持ちいいとかいうレベルではない。\nただ、くすぐったい――いや、こそばゆい。
2682 = "Không phải ở mức độ hiệu quả, hay là cảm thấy dễ chịu.\nChỉ là, nhột——không, là nhồn nhột."
# monologue
# JP: そう、こころごと全部がただただしあわせで――\nこそばゆくなる感覚だ。
2589 = "Đúng vậy, toàn bộ trái tim chỉ ngập tràn hạnh phúc——\nmột cảm giác nhồn nhột."
# 【ひかり】
# display as 光
# JP: 「もみもみ、もみもみ。\nおきゃくさーん、かゆいとこありませんかー、なのー」
1987 = "「Xoa xoa, xoa xoa.\nQuý khách ơi~, có chỗ nào bị ngứa không ạ~, thế đó~」"
# monologue
# JP: それは床屋だ。
2725 = "Đó là tiệm cắt tóc mà."
# monologue
# JP: ひかりもそろそろ、\n美容院にいかせた方が良いのかもなどと、ふと思う。
2551 = "Chợt nghĩ, có lẽ cũng sắp đến lúc\ncho Hikari đi tiệm làm tóc rồi chăng."
# 【双鉄】
# display as 雙鐵
# JP: 「いいえ、いい具合です。\nそのまま、もう少しお願いします」
2024 = "「Không, cảm giác rất tuyệt.\nCứ thế này, phiền cháu thêm một chút nữa nhé.」"
# 【ひかり】
# display as 光
# JP: 「わかりましたなのー。\nもみもみ、もみもみ」
1995 = "「Cháu hiểu rồi ạ~.\nXoa xoa, xoa xoa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「いいなぁ、うらやましい」
2086 = "「Thích thật đấy, ghen tị quá đi.」"
# 【れいな】
# display as 玲奈
# JP: 「それなら、\nポーレットはれいながマッサージしてあげますねぇ」
2174 = "「Nếu vậy thì,\nđể Reina xoa bóp cho chị Paulette nhé~」"
# 【ポーレット】
# display as 波萊特
# JP: 「え！？　あ――\nうん！　うれしい。ありがと」
1829 = "「Hả!? A——\nỪm! Chị vui lắm. Cảm ơn em.」"
# 【れいな】
# display as 玲奈
# JP: 「はぁい。それじゃ、かるく、かるぅくからいきますねぇ。\nもみもみ――このくらいでどうですかぁ？」
1882 = "「Vâng ạ. Vậy thì, em sẽ bắt đầu nhẹ nhàng, thật nhẹ nhàng nhé~.\nXoa xoa——Mức độ này thì sao ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「んー、ちょっと軽すぎ？」
1877 = "「Ưm, hơi nhẹ quá chăng?」"
# 【れいな】
# display as 玲奈
# JP: 「それじゃあ、ちょっと強めますねぇ？\nもみぃー、もみぃー――どうですかぁ？」
2160 = "「Vậy thì, em sẽ tăng lực lên một chút nhé~?\nXoa xoa~, xoa xoa~——Thế nào rồi ạ~?」"
# 【ポーレット】
# display as 波萊特
# JP: 「ん……く、は――\nあっ――もちょっと、上、を」
1874 = "「Ưm……Kuh, ha——\nA——Lên trên, một chút nữa.」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、効いてるみたいですねー」
1872 = "「Ufufu, có vẻ hiệu quả rồi nhỉ~」"
# 【ひかり】
# display as 光
# JP: 「むぅ。なのー」
1839 = "「Muu. Cơ~」"
# monologue
# JP: ひかりが手をとめ、僕を見る。
2388 = "Hikari dừng tay lại, nhìn tôi."
# monologue
# JP: 何を求められているか、僕も父ゆえ直感できるが――\nいかんせん、演技の類いは僕には無理だ。
2714 = "Với tư cách là một người cha, tôi có thể trực giác nhận ra con bé đang mong đợi điều gì——\nnhưng khổ nỗi, tôi lại không giỏi khoản diễn xuất."
# 【ひかり】
# display as 光
# JP: 「ぱぱ、きいてるのー？」
2058 = "「Papa, có hiệu quả không~?」"
# 【双鉄】
# display as 雙鐵
# JP: 「効いている。効いているは効いているが、\nポーレットの方が僕より疲れているのだろう」
2016 = "「Có hiệu quả. Hiệu quả thì có hiệu quả, nhưng\nPaulette chắc mệt hơn tôi nhiều.」"
# 【ひかり】
# display as 光
# JP: 「ひかり、ぱぱも、\n『むふーん』ってさせたいのー！」
1772 = "「Hikari, cũng muốn làm cho papa,\nphải thốt lên 『Muhu-n』 cơ~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そうか……ならば――」
2003 = "「Vậy sao…… Nếu vậy thì——」"
# monologue
# JP: ポケットからペンを取り出し、\nキャップをしたままひかりの右手に握らせる。
2530 = "Tôi lấy một cây bút từ trong túi ra,\nvẫn đậy nắp và đưa cho Hikari cầm bằng tay phải."
# 【双鉄】
# display as 雙鐵
# JP: 「そのペンで、ここ。\n太もものここをぐーっと押してみてくれ」
1665 = "「Dùng cây bút đó, ấn mạnh vào đây.\nThử ấn thật mạnh vào chỗ đùi này xem.」"
# 【ひかり】
# display as 光
# JP: 「ここなのー？　ぐーーーーっ」
2143 = "「Chỗ này ạ~? Gư----!」"
# 【双鉄】
# display as 雙鐵
# JP: 「もっとだ！　体重を全部かけるつもりで」
1724 = "「Mạnh hơn nữa! Dồn toàn bộ trọng lượng cơ thể vào.」"
# 【ひかり】
# display as 光
# JP: 「んー――ぐぐーーーっ！」
1875 = "「Ưm——Gư gư----!」"
# 【双鉄】
# display as 雙鐵
# JP: 「おふっ！」
1842 = "「Oáp!」"
# 【ひかり】
# display as 光
# JP: 「わ！　ぱぱ、『むふーん』ってなったの」
1797 = "「Oa! Papa, thốt lên 『Muhu-n』 rồi kìa.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ひかりすごーい！\nマッサージ師さんにもなれちゃうねー」
1697 = "「Hikari giỏi quá~!\nCó thể trở thành nhân viên xoa bóp được luôn rồi nhỉ~」"
# 【ひかり】
# display as 光
# JP: 「ひかり、きどーしゃうんてんしになるから、\nまっさーじしさんにはならないのー」
1771 = "「Hikari, sẽ trở thành người lái toa xe tự hành,\nnên không làm nhân viên xoa bóp đâu~」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、ですよねー」
1792 = "「Ufufu, đúng vậy nhỉ~」"
# monologue
# JP: なんとまぁ、れいなの笑顔の溶けそうなこと。\nいつもの笑顔の、何十倍もしあわせそうだ――
2634 = "Chà, nụ cười của Reina như muốn tan chảy vậy.\nTrông em ấy hạnh phúc gấp mấy chục lần nụ cười mọi khi——"
# monologue
# JP: っと！
2453 = "Á!"
# 【双鉄】
# display as 雙鐵
# JP: 「いかん、もう時間だな」
1632 = "「Không xong rồi, đến giờ rồi.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、ならわたしが」
1867 = "「A, vậy để tôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いいや、男の方が身支度が早い」
1640 = "「Không, đàn ông chuẩn bị nhanh hơn.」"
# monologue
# JP: 足をあげ、タオルで拭いてズボンを下ろせば、もう動ける。
2536 = "Nhấc chân lên, lau bằng khăn rồi kéo quần xuống là có thể di chuyển được rồi."
# monologue
# JP: 靴はまぁ、この短時間だ。\n裸足につっかけでかまわなかろう。
2434 = "Giày thì chà, thời gian ngắn thế này.\nĐi chân trần xỏ dép chắc cũng không sao."
# 【双鉄】
# display as 雙鐵
# JP: 「ふむ、ぎりぎりだったな」
1893 = "「Ừm, suýt soát nhỉ.」"
# monologue
# JP: 案内板には、\n『とろとろ15分。しっかり16分』と書いてある。
2654 = "Trên bảng hướng dẫn có ghi:\n『Sền sệt 15 phút. Chín kỹ 16 phút』."
# monologue
# JP: 初心者である僕らにはとろとろは厳しかろう。\n狙うは、ジャスト16分だ。
2525 = "Với những người mới làm như chúng tôi thì sền sệt có vẻ khó.\nMục tiêu là đúng 16 phút."
# 【双鉄】
# display as 雙鐵
# JP: 「5、4、3、2――よしっ！」
2206 = "「5, 4, 3, 2——Được rồi!」"
# monologue
# JP: かごをあげ、コンビニ袋に卵を移し、\n急ぎ、足湯へと戻る。
2540 = "Nhấc rổ lên, chuyển trứng sang túi nilon,\nvà nhanh chóng quay lại bồn ngâm chân."
# 【双鉄】
# display as 雙鐵
# JP: 「さて、お待ちかねの温泉卵だ」
1655 = "「Nào, món trứng luộc suối nước nóng mà mọi người mong chờ đây.」"
# 【ポーレット】
# display as 波萊特
# JP: 「わぁい、おんたまー！」
1807 = "「Oa, trứng luộc suối nước nóng~!」"
# 【ひかり】
# display as 光
# JP: 「おんたまー！」
2039 = "「Trứng luộc suối nước nóng~!」"
# 【れいな】
# display as 玲奈
# JP: 「れいな、温泉卵ってはじめてですよぉ」
2075 = "「Reina, mới ăn trứng luộc suối nước nóng lần đầu tiên đó nha~」"
# 【ひかり】
# display as 光
# JP: 「ひかりもー！」
1689 = "「Hikari cũng thế~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「そういえば、御一夜では温泉卵をやらないな」
2112 = "「Nhắc mới nhớ, ở Ohimitera không làm trứng luộc suối nước nóng nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「御一夜だけじゃないですよ？\n九洲は、温泉卵やってる温泉の方がレアです」
1625 = "「Không chỉ riêng Ohimitera đâu ạ?\nỞ Kyushu, suối nước nóng có làm món trứng này hiếm lắm.」"
# 【双鉄】
# display as 雙鐵
# JP: 「言われてみれば、そんな気もするな」
1671 = "「Nghe cô nói vậy, tôi cũng thấy thế.」"
# monologue
# JP: その辺、地域性なのだろうか。\n日ノ本全土の温泉卵分布――少し興味が湧いてくる。
2743 = "Đó có phải là đặc trưng vùng miền không nhỉ.\nSự phân bố trứng luộc suối nước nóng trên toàn cõi Hinomoto——Tôi bắt đầu thấy hứng thú rồi đấy."
# 【ポーレット】
# display as 波萊特
# JP: 「[べっぷ,1]別部とか、[うんぜん,1]雲然とか、あとは[くろかわ,1]黒河？　\nわたしの知ってる範囲だと、そのくらいな気が――」
1906 = "「Như Beppu, Unzen, hay là Kurokawa chăng?\nTrong phạm vi hiểu biết của tôi thì có lẽ chỉ chừng đó——」"
# 【ひかり】
# display as 光
# JP: 「おんたまたべたいのー」
1699 = "「Cháu muốn ăn trứng luộc suối nước nóng cơ~」"
# 【双鉄】
# display as 雙鐵
# JP: 「おっと、そうだった」
1823 = "「Ôi chà, đúng rồi.」"
# monologue
# JP: せっかく16分であげきったのに、\n時間をかけては出来具合が変化するかもしれん。
2742 = "Đã cất công vớt ra đúng 16 phút,\nnếu để lâu có thể độ chín sẽ thay đổi mất."
# 【双鉄】
# display as 雙鐵
# JP: 「それでは、ポーレット先生に温泉卵の食べ方を\nご指導いただこう」
2176 = "「Vậy thì, xin mời cô giáo Paulette hướng dẫn cách ăn\ntrứng luộc suối nước nóng nào.」"
# 【ひかり】
# display as 光
# JP: 「いただくのー！」
1992 = "「Xin được chỉ giáo~!」"
# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、おねがいしまぁす」
1789 = "「Ufufu, xin nhờ cô giáo ạ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「って、簡単ですけどね？　まずは普通にこんこんって\nやって、卵の殻を、上半分だけむきます」
1825 = "「Thật ra thì đơn giản lắm nhé? Đầu tiên cứ gõ cộc cộc bình thường,\nrồi bóc vỏ trứng, chỉ bóc nửa trên thôi.」"
# 【ひかり】
# display as 光
# JP: 「あうー、こんこんむつかしいのー」
1862 = "「Au~, gõ cộc cộc khó quá~」"
# 【ポーレット】
# display as 波萊特
# JP: 「じゃ、最初のとこだけママがやったげるねー」
2155 = "「Vậy, phần đầu để mama làm giúp cho nhé~」"
# 【れいな】
# display as 玲奈
# JP: 「できましたぁ！　殻、くっつかないで取れますねー」
1917 = "「Xong rồi ạ~! Vỏ bóc ra dễ dàng không bị dính luôn nè~」"
# 【ポーレット】
# display as 波萊特
# JP: 「ほんとね。\n双鉄くんがぴったりの時間であげてくれたおかげ」
2088 = "「Đúng vậy nhỉ.\nNhờ anh Soutetsu vớt ra đúng thời gian cả đấy.」"
# 【双鉄】
# display as 雙鐵
# JP: 「いやなに」
2023 = "「Không có gì đâu.」"
# monologue
# JP: ふふっと柔らかく微笑んで、
2611 = "Cô ấy mỉm cười dịu dàng,"
# monologue
# JP: ポーレットは少し赤らんだ指先で、\n真っ白な卵のてっぺんをつぅんとつつく。
2623 = "Với những đầu ngón tay hơi ửng đỏ,\nPaulette chọc nhẹ vào đỉnh quả trứng trắng tinh."
# 【ポーレット】
# display as 波萊特
# JP: 「そしたら、いま殻をむいたとこ――\nむき出しになってるところの白身だけ――（ぱくっ）」
2043 = "「Sau đó, chỗ vỏ vừa bóc——\nchỉ ăn phần lòng trắng lộ ra thôi——(Ngoạm)」"
# 【ひかり】
# display as 光
# JP: 「（ぱくっ）――わ！　きみがでてきた！！」
2202 = "「(Ngoạm)——Oa! Lòng đỏ lộ ra rồi!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「うん！　いい半熟具合！　完璧！！\nそしたら、このタレをちゅーっていれて」
1887 = "「Ừm! Độ lòng đào rất tuyệt! Hoàn hảo!!\nSau đó, rưới nước chấm này vào.」"
# 【ひかり】
# display as 光
# JP: 「おいしそお！！」
2083 = "「Trông ngon quá đi!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「あとはスプーンで。\n……はぁい、ひかり。あーん」
1948 = "「Phần còn lại thì dùng thìa.\n……Nào, Hikari. A~」"
# 【ひかり】
# display as 光
# JP: 「あーーーん――（ぱくっ）\n！！！　あちゅい！　おいしーーーっ！！」
1850 = "「A~~~——(Ngoạm)\n!!! Nóng! Ngon quá~~~!!」"
# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、ですって！　双鉄くん」
1898 = "「Ufufu, con bé bảo vậy đấy! Anh Soutetsu.」"
# 【ひかり】
# display as 光
# JP: 「ぱぱもたべてぱぱもたべて！　\nんと――よいしょ。はい、『あーーん』」
2046 = "「Papa cũng ăn đi papa cũng ăn đi!\nỪm——Yosho. Này, 『A~~~』」"
# monologue
# JP: ――確かに、完璧な半熟具合だ。\nスプーンの上の黄身は震えて、揺れている。
2644 = "——Quả thực, độ lòng đào rất hoàn hảo.\nPhần lòng đỏ trên chiếc thìa đang rung rinh, lay động."
# 【双鉄】
# display as 雙鐵
# JP: 「『あーん』――――（ぱくっ）」
1848 = "「『A~』――――(Ngoạm)」"
# 【ひかり】
# display as 光
# JP: 「ねー、ぱぱ？　おいしいねぇ！」
1918 = "「Đúng không, papa? Ngon lắm nhỉ!」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　うまいっ！！！」
1886 = "「Ừm! Ngon lắm!!!」"
# 【双鉄】
# display as 雙鐵
# JP: 「ここ――だな」
1950 = "「Chỗ này——nhỉ.」"
# 【ポーレット】
# display as 波萊特
# JP: 「あ、よかった。まだやってるみたい」
1856 = "「A, may quá. Có vẻ vẫn còn mở cửa.」"
# 【双鉄】
# display as 雙鐵
# JP: 「とはいえ、\n体験を受けている時間はないかもしれんぞ？」
1653 = "「Tuy nhiên,\ncó thể chúng ta không có thời gian để trải nghiệm đâu đấy?」"
# monologue
# JP: ――たまごを買ったお店で貰った観光地図。
2533 = "——Tấm bản đồ du lịch nhận được ở cửa hàng bán trứng."
# monologue
# JP: 宿に戻る前、あと一軒だけ寄ってみたいと、\nポーレットが僕らをひっぱってきた。
2456 = "Trước khi về nhà trọ, Paulette đã kéo chúng tôi đến đây,\nbảo rằng muốn ghé thêm một nơi nữa."
# 【ポーレット】
# display as 波萊特
# JP: 「とにかく、聞くだけきいてみましょう！\nすみませーん！」
1760 = "「Dù sao thì cứ thử hỏi xem sao đã!\nXin lỗi, có ai ở nhà không ạ~!」"
# 【ひかり】
# display as 光
# JP: 「ひうっ」
1871 = "「Hiu.」"
# monologue
# JP: 見知らぬ誰かの気配を感じているのだろう、\nひかりはもう、がっちりとれいなの陰に隠れている。
2390 = "Có lẽ cảm nhận được sự hiện diện của một người lạ,\nHikari đã trốn chặt sau lưng Reina."
# 【こけし職人】
# display as 木芥子工匠
# JP: 「はい？」
1963 = "「Vâng?」"
# 【ポーレット】
# display as 波萊特
# JP: 「あの、この地図にある『こけしづくり体験』って、\n今からでもできますか？」
2137 = "「À ừm, 『Trải nghiệm làm Kokeshi』 ghi trên bản đồ này,\nbây giờ có thể làm được không ạ?」"
# 【こけし職人】
# display as 木芥子工匠
# JP: 「ああ、どうぞ。できますよぉ」
1837 = "「À, xin mời. Được chứ.」"
# monologue
# JP: いって、こけし職人さんは真っ白なこけしをひとつと、\n木の丸棒一本とを持ってくる。
2700 = "Nói rồi, bác thợ làm Kokeshi mang ra một con búp bê Kokeshi trắng tinh,\nvà một thanh gỗ tròn."
# 【こけし職人】
# display as 木芥子工匠
# JP: 「こっちがね、[なるこ,1]鳴呼こけし。首をひねると」
2144 = "「Cái này là búp bê Kokeshi Naruko. Khi vặn cổ nó thì」"
# monologue
# JP: （きゅっ――きゅうっ！）
2787 = "（Cót——Két!）"
# 【ポーレット】
# display as 波萊特
# JP: 「わ、鳴った！」
1728 = "「Oa, nó kêu kìa!」"
# 【こけし職人】
# display as 木芥子工匠
# JP: 「だから、鳴呼ね。\nこれは素人には作れないから、絵付けだけの体験です」
1975 = "「Bởi vì nó có tiếng kêu (Naruko) mà.\nNgười mới học thì không làm được cái này đâu, nên chỉ có trải nghiệm vẽ trang trí thôi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「と、すると――その丸棒の木の方は？」
2152 = "「Vậy thì——thanh gỗ tròn đó thì sao ạ?」"
# 【こけし職人】
# display as 木芥子工匠
# JP: 「削り出しから体験できるけど、鳴呼こけしにはならない。\n普通の、鳴らないこけしに仕上がりますね」
2012 = "「Có thể trải nghiệm từ công đoạn gọt đẽo, nhưng sẽ không thành Kokeshi Naruko được.\nNó sẽ thành một con búp bê Kokeshi bình thường, không kêu được nhé.」"
# 【ポーレット】
# display as 波萊特
# JP: 「そうなんですね……\nどっちを体験してもいいんですか？」
2142 = "「Ra là vậy……\nChúng cháu có thể trải nghiệm cái nào cũng được ạ?」"
# 【こけし職人】
# display as 木芥子工匠
# JP: 「いいですよー。\nふたりが絵付け、ふたりがろくろからとかでも大丈夫」
2080 = "「Được chứ.\nHai người vẽ trang trí, hai người làm từ bàn xoay cũng không sao.」"
# 【ポーレット】
# display as 波萊特
# JP: 「ひかりは、どっちがいい？」
1711 = "「Hikari, con thích cái nào hơn?」"
# monologue
# JP: しゃがみこみ、ひかりと目線をあわせて尋ねる。
2612 = "Cô ấy ngồi xổm xuống, nhìn ngang tầm mắt Hikari và hỏi."
# monologue
# JP: ひかりはおずおずれいなの陰から顔を出し、\nポーレットの耳元に小声で伝える。
2398 = "Hikari rụt rè ló mặt ra từ sau lưng Reina,\nvà thì thầm vào tai Paulette."
# 【ひかり】
# display as 光
# JP: 「あのね、ひかりね。\nきゅっきゅってなるこがいいのー」
1700 = "「Mẹ ơi, Hikari nhé.\nMuốn làm cái kêu cót két cơ~」"
# 【ポーレット】
# display as 波萊特
# JP: 「じゃ、わたしも鳴呼。れいなは？」
2166 = "「Vậy, mẹ cũng làm Naruko. Còn Reina thì sao?」"
# 【れいな】
# display as 玲奈
# JP: 「れいなも、なるこがいいですぅ。\nろくろの、すごくむつかしそうですからぁ」
2066 = "「Reina cũng thích Naruko ạ~.\nLàm bằng bàn xoay trông có vẻ khó lắm nha~」"
# monologue
# JP: 全員が同じでもつまらない。\nせっかくだし、削り出しからやってみたい。
2688 = "Tất cả mọi người đều làm giống nhau thì chán lắm.\nĐã cất công đến đây rồi, tôi muốn thử làm từ công đoạn gọt đẽo."
# 【双鉄】
# display as 雙鐵
# JP: 「お手数でなければ、\n僕は、形を作るところの方から」
2100 = "「Nếu không phiền,\ntôi muốn làm từ công đoạn tạo hình.」"
# 【こけし職人】
# display as 木芥子工匠
# JP: 「いいですよー。\nじゃあ、お父さんはちょっと待っててね」
1767 = "「Được chứ.\nVậy, người cha hãy đợi một chút nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1925 = "「好的」" 
# 【こけし職人】
# display as 木芥子工匠
# JP: 「じゃ、簡単に絵付けについて説明しますねー」
2170 = "「Vậy, tôi sẽ giải thích ngắn gọn về cách vẽ trang trí nhé~」"
# monologue
# JP: 職人さんは僕を待たせて、\nポーレットたちを席に座らせる。
2499 = "Bác thợ bảo tôi đợi,\nvà cho nhóm Paulette ngồi vào chỗ."
# monologue
# JP: ……なるほど、絵付けは黒、赤、みどりの三色の、\nうるし調の塗料で行うわけか。
1240 = "……Ra vậy, vẽ trang trí sẽ được thực hiện bằng ba màu đen, đỏ, xanh lá cây,\nvới loại sơn có độ bóng như sơn mài sao."
# 【こけし職人】
# display as 木芥子工匠
# JP: 「べったりつけると垂れるから、\n紙でよーく筆を馴らしてから塗るといいですよー」
2029 = "「Nếu quệt nhiều quá thì sơn sẽ bị chảy,\nnên hãy thấm bớt cọ trên giấy rồi mới vẽ nhé~」"
# 【ひかり】
# display as 光
# JP: 「うゅぅ……ひかり、ピンクぬりたいのー」
1870 = "「Uyu……Hikari, muốn tô màu hồng cơ~」"
# 【こけし職人】
# display as 木芥子工匠
# JP: 「ピンクね」
2093 = "「Màu hồng nhỉ.」"
# 【ひかり】
# display as 光
# JP: 「ひうっ！？」
1780 = "「Hiu!?」"
# monologue
# JP: ささやくようなひかりの声を、\nこけし職人さんは捉えてくれる。
2580 = "Giọng nói thì thầm của Hikari,\nđã được bác thợ làm Kokeshi nghe thấy."
# 【こけし職人】
# display as 木芥子工匠
# JP: 「下地が白木だから、こう――\n赤をうすーく均等に塗れば」
2018 = "「Vì nền là gỗ trắng, nên nếu cháu tô thế này——\ntô một lớp màu đỏ thật mỏng và đều tay thì」"
# 【ひかり】
# display as 光
# JP: 「！！？　ピンクなのー」
1869 = "「!!? Là màu hồng kìa~」"
# monologue
# JP: 興味のあまりか感動のあまりか、\nひかりは隠れるのも忘れてる。
2370 = "Có lẽ do quá tò mò hoặc quá cảm động,\nmà Hikari đã quên cả việc phải trốn đi."
# monologue
# JP: これは――実にいい傾向のような気がする。
2531 = "Điều này——tôi có cảm giác là một dấu hiệu rất tốt."
# 【こけし職人】
# display as 木芥子工匠
# JP: 「薄塗りは難しいから、がんばって。\nさて、お父さんお待たせでした」
1652 = "「Tô mỏng khó lắm đấy, nên cháu hãy cố gắng nhé.\nRồi, xin lỗi vì đã để người cha phải đợi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お願いいたします」
2113 = "「Xin nhờ bác ạ.」"
# 【こけし職人】
# display as 木芥子工匠
# JP: 「これが、電動ろくろ。\nで、ここにミズキの丸棒を差し込みます」
2141 = "「Đây là bàn xoay điện.\nVà, chúng ta sẽ cắm thanh gỗ tròn Mizuki vào đây.」"
# monologue
# JP: (ごんんっ！　ごんっ！）
27 = "(Cộc! Cộc!)"
# monologue
# JP: 木槌でしっかり、丸棒がろくろの軸にはめ込まれる。
2497 = "Thanh gỗ tròn được gắn chặt vào trục của bàn xoay bằng búa gỗ."
# 【こけし職人】
# display as 木芥子工匠
# JP: 「で、回す、と」
2045 = "「Và, bật xoay.」"
# monologue
# JP: （ウィィィィィィ）
2799 = "（Uuuuuuu）"
# 【こけし職人】
# display as 木芥子工匠
# JP: 「そしたら、ここが首になるから、ノミを当てて」
2139 = "「Sau đó, chỗ này sẽ là cổ, nên cháu hãy đặt đục vào đây.」"
# monologue
# JP: （しゅるるるるるるっ！）
2788 = "（Xoạt xoạt xoạt!）"
# 【双鉄】
# display as 雙鐵
# JP: 「おおお！」
1901 = "「Ô ồ!」"
# monologue
# JP: 帯のように、白木が削れて舞っていく。
2731 = "Gỗ trắng bị gọt ra bay lả tả như những dải ruy băng."
# monologue
# JP: みるみるうちに肩と顎とか形作られ、\n白木の棒はこけしへと変貌していく。
2458 = "Chẳng mấy chốc, vai và cằm đã được tạo hình,\nthanh gỗ trắng đang dần biến đổi thành búp bê Kokeshi."
# 【こけし職人】
# display as 木芥子工匠
# JP: 「じゃ、お父さんやってみますか」
2163 = "「Vậy, người cha làm thử nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい、ええと――このノミはどのように持てば」
1924 = "「Vâng, à ừm——chiếc đục này nên cầm thế nào ạ?」"
# 【こけし職人】
# display as 木芥子工匠
# JP: 「持ちやすいように、飛ばないように。\nで、これを――こう、寝かせて当てるとこうなる」
2146 = "「Cầm sao cho dễ, và không bị tuột tay bay mất.\nVà, cái này——đây, đặt nằm ngang xuống thì sẽ thế này.」"
# 【双鉄】
# display as 雙鐵
# JP: 「お――お――」
1834 = "「Ô——Ô——」"
# monologue
# JP: 僕の手の上から職人さんが手を添えてくれる。\n力を抜いて、その感覚を覚えようとする。
2492 = "Bác thợ đặt tay lên tay tôi để hướng dẫn.\nTôi thả lỏng tay và cố gắng ghi nhớ cảm giác đó."
# 【こけし職人】
# display as 木芥子工匠
# JP: 「力を入れて立てると、深く削れる」
2079 = "「Nếu dùng sức và dựng đứng đục lên, thì sẽ gọt được sâu hơn.」"
# 【双鉄】
# display as 雙鐵
# JP: 「む――なるほど」
1844 = "「Ưm——Ra vậy.」"
# 【こけし職人】
# display as 木芥子工匠
# JP: 「あんまり力を抜くと全然削れなくなるから、\n大胆にいくつもりで」
1673 = "「Nếu thả lỏng quá thì sẽ không gọt được gì đâu,\nnên cứ mạnh dạn lên.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1925 = "「好的」" 
# monologue
# JP: 職人さんが手を離す。
2502 = "Bác thợ buông tay ra."
# monologue
# JP: 反射的に、おっかなびっくりになってしまえば――\nなるほど、まったく削れなくなる。
2547 = "Theo phản xạ, tôi đâm ra sợ sệt——\nRa vậy, hoàn toàn không gọt được chút nào."
# 【双鉄】
# display as 雙鐵
# JP: 「大胆にいくつもりで――力をこめて」
1911 = "「Phải mạnh dạn lên——dồn sức vào.」"
# monologue
# JP: （しゅるるるるるるるっ！）
# 2788 = "（吱吱吱！）" 
# 【こけし職人】
# display as 木芥子工匠
# JP: 「お！　お父さん筋がいいですねぇ。\nいきなりここまで出来る人は、なかなかいない」
1830 = "「Ồ! Người cha có năng khiếu đấy.\nHiếm có ai ngay từ đầu đã làm được đến mức này đâu.」"
# 【双鉄】
# display as 雙鐵
# JP: 「恐縮です」
2145 = "「Bác quá khen rồi ạ.」"
# 【こけし職人】
# display as 木芥子工匠
# JP: 「肩と顎ができたら、一番さきね。頭の部分も同じように\n丸くする。そこまでできたら声だして呼んでくださいね」
1733 = "「Làm xong vai và cằm rồi thì đến phần chóp nhé. Phần đầu cũng\nlàm tròn tương tự như vậy. Khi nào xong đến đó thì gọi tôi nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1925 = "「好的」" 
# monologue
# JP: 職人さんはそれだけいって、奥へと引っ込んでしまう。\nとたん、ひかりの声がする。
2498 = "Bác thợ chỉ nói vậy rồi lui vào phía trong.\nNgay lập tức, tôi nghe thấy tiếng Hikari."
# 【ひかり】
# display as 光
# JP: 「ぱぱ、すごいのー、かっこいいのー！」
2051 = "「Papa, tuyệt quá~, ngầu quá đi~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「なら――なによりだ」
2156 = "「Nếu vậy thì——còn gì bằng.」"
# monologue
# JP: 嬉しいが、振り向くなどはできないし、\n返事をするだけでもかなり、いっぱいいっぱいだ。
2739 = "Tuy rất vui, nhưng tôi không thể quay lại nhìn,\nvà chỉ riêng việc trả lời thôi cũng đã tốn hết tâm trí rồi."
# monologue
# JP: 刃物を、高速回転するろくろに当てている。\n手が滑ったら、事故にさえつながりかねない状況なのだ。
2544 = "Tôi đang đặt lưỡi dao vào bàn xoay đang quay với tốc độ cao.\nNếu trượt tay, rất có thể sẽ dẫn đến tai nạn."
# 【ポーレット】
# display as 波萊特
# JP: 「ひかり？　早くしないと絵の具、かわいちゃうかも」
1719 = "「Hikari? Nếu không nhanh lên màu nước sẽ khô mất đấy.」"
# 【ひかり】
# display as 光
# JP: 「いっけなーい、そうだったのー」
1630 = "「Nguy quá~, đúng rồi ha~」"
# monologue
# JP: ポーレットもそれを察して、\nすぐにひかりの目線を僕からずらしてくれる。
2606 = "Paulette cũng nhận ra điều đó,\nvà ngay lập tức hướng sự chú ý của Hikari ra khỏi tôi."
# monologue
# JP: ありがたい。\nこれならば、しばらく集中すれば……………………
2481 = "Thật đáng quý.\nNếu vậy, chỉ cần tập trung một lúc thì……………………"
# 【双鉄】
# display as 雙鐵
# JP: 「よし！　――すみません！！\nこんなものでどうでしょう！」
1931 = "「Xong! ——Bác ơi!!\nThế này thì sao ạ!」"
# 【こけし職人】
# display as 木芥子工匠
# JP: 「んー！　上出来上出来」
1884 = "「Ưm! Làm tốt lắm, làm tốt lắm.」"
# monologue
# JP: 職人さんは、僕からノミを受け取って、\n軽くあて――ああ、やはり、プロは違う。
2494 = "Bác thợ nhận lấy chiếc đục từ tay tôi,\nđặt nhẹ vào——A, quả nhiên, dân chuyên nghiệp có khác."
# monologue
# JP: 丸みがそれでグっと増し、ほとんどもう、\n少なくとも僕の目には、売り物のこけしと変わらなくなる。
2435 = "Độ tròn nhờ thế mà tăng lên rõ rệt, gần như,\nít nhất là trong mắt tôi, nó không khác gì những con búp bê Kokeshi đang được bày bán."
# 【こけし職人】
# display as 木芥子工匠
# JP: 「じゃあ、あとはお父さんも絵付けだ」
2171 = "「Vậy, phần còn lại người cha cũng vẽ trang trí nhé.」"
# 【双鉄】
# display as 雙鐵
# JP: 「はい」
# 1925 = "「好的」" 
# 【こけし職人】
# display as 木芥子工匠
# JP: 「やり方は、おかあさんと娘さんたちに聞いて。\nなにかわからなかったら、声だして呼んでくださいねー」
1722 = "「Cách làm thì cứ hỏi người mẹ và các con gái nhé.\nCó gì không hiểu thì cứ gọi tôi~」"
# 【双鉄】
# display as 雙鐵
# JP: 「あ、はい」
1857 = "「A, vâng.」"
# 【ひかり】
# display as 光
# JP: 「ぱぱ、いらっしゃいなのー！」
2060 = "「Papa, lại đây nào~!」"
# monologue
# JP: 職人さんの姿が消えれば、\nひかりの声がぱっと華やぐ。
2490 = "Khi bóng dáng bác thợ khuất đi,\ngiọng nói của Hikari bỗng trở nên rạng rỡ."
# monologue
# JP: 不親切な方なのか――と早合点しかけてしまったが、\nあるいは僕らに、気をつかってくれているのかも知れん。
2740 = "Tôi đã vội vàng nghĩ rằng bác ấy là một người không thân thiện——\nnhưng có lẽ bác ấy đang cố ý tạo không gian riêng cho chúng tôi."
# 【双鉄】
# display as 雙鐵
# JP: 「親子水入らず、だものな」
1621 = "「Vì đây là không gian riêng của gia đình mà.」"
# 【ひかり】
# display as 光
# JP: 「みてみて！　ひかりの、もうすぐできるのー」
2054 = "「Nhìn này nhìn này! Của Hikari sắp xong rồi đó~」"
# 【双鉄】
# display as 雙鐵
# JP: 「おお、れいなこけしか！」
1905 = "「Ồ, là Kokeshi Reina sao!」"
# 【れいな】
# display as 玲奈
# JP: 「れいなも、ひかりちゃんこけしつくりましたよぉ」
2062 = "「Reina cũng làm Kokeshi bé Hikari rồi đó nha~」"
# 【双鉄】
# display as 雙鐵
# JP: 「おおお、これもきっちりひかりに見えるな。\nしかし――うん。ふたりとも個性がでている」
1904 = "「Ô ồ, cái này trông cũng rất giống Hikari nhỉ.\nNhưng mà——Ừm. Cả hai đều thể hiện được cá tính riêng.」"
# monologue
# JP: ひかりはポーレットの血が濃いのか、\n4歳児なりに、細かなところを追い込もうとしている。
2392 = "Có lẽ Hikari thừa hưởng dòng máu của Paulette,\nnên dù mới 4 tuổi, con bé vẫn cố gắng chăm chút cho những chi tiết nhỏ."
# monologue
# JP: かたやれいなは、おおらかだ。\nこまかなところは、大胆に省略して完成させている。
2439 = "Mặt khác, Reina thì lại rất phóng khoáng.\nEm ấy mạnh dạn bỏ qua những chi tiết nhỏ để hoàn thành tác phẩm."
# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは……っと」
2034 = "「Còn Paulette thì……」"
# monologue
# JP: 真剣そのもの。\n一心不乱にひかりこけしを作っている。
2610 = "Vô cùng nghiêm túc.\nCô ấy đang dồn hết tâm trí để làm Kokeshi Hikari."
# monologue
# JP: これは、邪魔できる雰囲気ではない。\nというか、僕も絵付けをせねば、だ。
2651 = "Đây không phải là bầu không khí có thể làm phiền.\nHơn nữa, tôi cũng phải vẽ trang trí thôi."
# 【双鉄】
# display as 雙鐵
# JP: 「ひかり、モデルになってくれるか？」
1714 = "「Hikari, làm người mẫu cho tôi được không?」"
# 【ひかり】
# display as 光
# JP: 「ひかり……ままとれいなが、\nひかりのこけし、つくってくれてるの」
1769 = "「Hikari……mama và Reina,\nđã làm Kokeshi Hikari cho con rồi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ？」
1845 = "「Ừm?」"
# 【ひかり】
# display as 光
# JP: 「れいなおねーちゃんのは、ひかりがつくるの。\nだから、ぱぱは、はちろくおねーちゃんの」
1695 = "「Của chị Reina thì Hikari sẽ làm.\nNên papa hãy làm của chị Hachiroku đi.」"
# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1853 = "「À!」"
# monologue
# JP: ハチロクは、精神的には完全に大人だ。\n今回の旅行も、『ご家族水入らずで』と遠慮した。
2406 = "Về mặt tinh thần, Hachiroku hoàn toàn là một người trưởng thành.\nChuyến du lịch lần này, em ấy cũng đã từ chối với lý do 『Hãy để gia đình có không gian riêng』."
# monologue
# JP: 無論、ハチロクまで来てしまうと御一夜鉄道の仕事が……\nということもあったが――
2640 = "Tất nhiên, nếu Hachiroku cũng đi thì công việc ở Đường sắt Ohimitera sẽ……\ncũng có lý do đó, nhưng——"
# 【双鉄】
# display as 雙鐵
# JP: 「だよな。ハチロクお姉ちゃんだけ仲間はずれは、\nかわいそうだよな」
1657 = "「Đúng vậy nhỉ. Chỉ có mỗi chị Hachiroku bị cho ra rìa,\nthì tội nghiệp lắm nhỉ.」"
# 【ひかり】
# display as 光
# JP: 「うん！！」
1891 = "「Vâng!!」"
# monologue
# JP: 僕らの娘は、優しいこどもに育ってくれてる。
2524 = "Con gái của chúng tôi đang lớn lên thành một đứa trẻ tốt bụng."
# monologue
# JP: 今ここにいないハチロクを、\n思いやり、心配してあげてくれるほど。
2463 = "Đến mức biết quan tâm và lo lắng\ncho Hachiroku, người không có mặt ở đây lúc này."
# 【双鉄】
# display as 雙鐵
# JP: 「まかせておけ。ハチロクとは長いつきあいだ。\nあれのこけしなら、僕は相当うまくつくれる気がする」
1660 = "「Cứ giao cho tôi. Tôi đã quen biết Hachiroku từ lâu rồi.\nNếu là Kokeshi của em ấy, tôi có cảm giác mình sẽ làm khá tốt đấy.」"
# 【ひかり】
# display as 光
# JP: 「たのしみなのー！」
1688 = "「Mong chờ quá đi~!」"
# 【双鉄】
# display as 雙鐵
# JP: 「黄色があればよかったのだが――」
2108 = "「Giá mà có màu vàng thì tốt——」"
# monologue
# JP: しかし、赤黒があるのはぴったりだ。
2363 = "Tuy nhiên, có màu đỏ và đen thì cũng rất hợp."
# monologue
# JP: 黄色は……うむ。\nピンクの例にならって、緑の薄ぬりでやってみよう。
2757 = "Màu vàng thì……ừm.\nHọc theo cách làm màu hồng, tôi sẽ thử tô một lớp màu xanh lá cây thật mỏng xem sao."
# 【双鉄】
# display as 雙鐵
# JP: 「……ひかりのピンクは上手に出ているな。\nよければ、薄塗りのこつを教えてくれるか？」
1256 = "「……Màu hồng của Hikari lên đẹp quá nhỉ.\nNếu được, cháu có thể dạy cho tôi bí quyết tô màu mỏng không?」"
# monologue
# JP: 言えば途端に、ひかりの小鼻がふくりとふくれる。\n頬が鮮やかなバラ色になる。
2516 = "Vừa dứt lời, cánh mũi của Hikari liền phồng lên.\nĐôi má ửng hồng rực rỡ."
# 【ひかり】
# display as 光
# JP: 「おしえてあげるのー！　\nひかり、ぱぱのせんせーなの！！」
1693 = "「Cháu sẽ dạy cho~! \nHikari, là cô giáo của papa đó!!」"
# monologue
# JP: ああ――そうか。\n気づけば、じわり、僕のこころも潤いを得る。
2673 = "A——Ra vậy.\nKhi nhận ra điều đó, trái tim tôi cũng dần được tưới mát."
# monologue
# JP: （ひかりが――僕の先生か）
2786 = "（Hikari——là cô giáo của tôi sao）"
# 【双鉄】
# display as 雙鐵
# JP: 「うむ！　よろしくお願いします。\nひかりせんせい！」
1889 = "「Ừm! Rất mong được chỉ giáo.\nCô giáo Hikari!」"
# 【ひかり】
# display as 光
# JP: 「うふー、ひかりせんせい！！」
1786 = "「Ufu~, cô giáo Hikari!!」"
# monologue
# JP: ひかりはれいなをふりかえり、\nれいなはにっこり微笑み返す。
2402 = "Hikari quay lại nhìn Reina,\nvà Reina mỉm cười đáp lại."
# 【れいな】
# display as 玲奈
# JP: 「そうてつさん。\nひかり先生に教わっちゃうなら、安心ですよぉ」
2181 = "「Anh Soutetsu.\nNếu được cô giáo Hikari dạy cho thì yên tâm rồi đó nha~」"
# 【ひかり】
# display as 光
# JP: 「おしえちゃうのー！　あのね？　まずね？\nふでにはぺったりくっつけて、それでね、かみでね」
1694 = "「Cháu sẽ dạy cho~! Này nhé? Đầu tiên nhé?\nChấm cọ cho thật đẫm, sau đó nhé, dùng giấy nhé」"
# 【双鉄】
# display as 雙鐵
# JP: 「ふむふむ。――なるほど、筆先を慣らしつつ、\n紙に塗料を吸い取らせるのか」
1835 = "「Ừm ừm. ——Ra vậy, vừa làm mềm đầu cọ,\nvừa để giấy thấm bớt sơn sao.」"
# 【ひかり】
# display as 光
# JP: 「それでね？　そしたらね」
2044 = "「Sau đó nhé? Tiếp theo nhé」"
# monologue
# JP: ひかりの指が伸びてくる。\n僕のもってる筆の柄の、先の部分をちょこっとつまむ。
2399 = "Ngón tay của Hikari vươn tới.\nCon bé khẽ nhón lấy phần đầu cán cọ mà tôi đang cầm."
# 【ひかり】
# display as 光
# JP: 「あのね？　こういうかんじにするのー」
1981 = "「Này nhé? Sẽ làm như thế này này~」"
# monologue
# JP: 力を抜く。筆の運びを、ひかりに任せる。\nこんなにちいさなひかりの手が、僕の手の動きを導く。
2542 = "Tôi thả lỏng tay. Để mặc cho Hikari di chuyển cọ.\nBàn tay nhỏ bé của Hikari đang dẫn dắt chuyển động tay của tôi."
# monologue
# JP: ――なんと、力強いことだろう。\n――なんと嬉しいことだろう。
2647 = "——Thật là mạnh mẽ làm sao.\n——Thật là hạnh phúc biết bao."
