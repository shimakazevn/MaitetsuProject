2033 = "「那時候的我一旦投入進什麼事情，就對其他一切都不管不顧的，但我又特別擅長觀察別人的臉色」" 

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ待て待て待て、ポーレット」
1723 = "「好了好了，停一停」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1642 = "「啊」" 

# monologue
# JP: ポーレットにとっては自分を振り返っているだけだろうが、\nひかりと重なるところが確かに多すぎる。
2656 = "雖然波萊特只是在單純地回顧自己的童年，但她身上和光相似的性格特質的確有很多。" 

# monologue
