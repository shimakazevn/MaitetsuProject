2323 = "在我聽來就跟親媽批判親女兒差不多，實在讓我這個親爹有些聽不下去。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ごめんなさい。わたし、夢中になっちゃって」
1761 = "「對不起。我又不管不顧了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それだけ、真剣に考えているということだ。\nひかりも、ポーレットも、目の前にことに対して」
2007 = "「這說明你對她很用心。光和你一樣，都對眼前的事一根筋」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1874 = "「是啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その長所を活かし、ポーレットはバランスを取っている。\nポーレットがさっきいったことを言い換えれば……」
1587 = "「可是你卻能發揮自己的長處，平衡優缺點。把你剛才說的性格特徵換一個表達方式的話……」" 

# monologue
# JP: 考えるほどのこともない。\nそれはそのまま、今のポーレットの長所だから。
2436 = "我根本不需要多想，因為對於現在的波萊特來說，那就是她的優點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「高い集中力を持ちつつ、周囲への気配り目配りもできる。\n専門分野に優れた説明能力を持ち、家族愛に満ちている」
1547 = "「做事的時候既有出色的集中力，又能觀察周圍人的情況。不光擅長向別人解說專業領域的知識，還對家人充滿愛心」" 

# monologue
# JP: いえば途端に、\nポーレットが身もだえしてみせる。
2447 = "我話才說到一半，波萊特就捂住了臉扭捏起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あうぅ……双鉄くん、甘やかし上手だぁ」
1647 = "「啊嗚嗚……你真擅長誇人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこも似てるな。褒められるとすぐ照れ照れになる」
1953 = "「而且光一被人夸就害羞，這點也很像你」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そりゃそうですよ。親子ですもん」
2003 = "「這可是當然的，她可是我親生的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ひかりと僕も似ているわけか？」
2020 = "「那就是說，光也很像我嘍」" 

# 【ポーレット】
# display as 波萊特
# JP: 「似てますねぇ、すっごく」
1581 = "「可像了」" 

# monologue
# JP: くふふと、ポーレットの声に含み笑いが混じる。
2511 = "波萊特忍著笑說。" 

# 【ポーレット】
# display as 波萊特
# JP: 「天然の女殺しなところとか」
1906 = "「比如說，擅長在不經意間迷倒女人」" 

# 【双鉄】
# display as 雙鐵
# JP: 「天然の女殺し？」
1499 = "「不經意間迷倒女人？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です。義姉さん日々姫ちゃん、凪ちゃんふかみちゃん。ハチロクちゃんに稀咲さんまで、ひかりにすっごく甘い」
1769 = "「就是啊。她迷倒了真闇姐、日日姬、小凪、小深、八六還有稀咲小姐，大家都對她沒轍」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだな。みな、ひかりに良くしてくれている。\nしかし……それのどこが僕に似ているのだ？」
2009 = "「這麼一說好像是這樣。大家都對她很好。可是……這又哪裡像我了？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だから、そこですよ！　無自覚で、無意識で。\nあー、っていうか、そこがわたしとの一番の違いかも」
1537 = "「你看，我說的就是這個！你這種人就是完全沒有自覺，完全意識不到。啊，說不定這就是你和我最大的不同」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこ、とは？」
1889 = "「最大的不同？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「他の人がくれる好意についてです。\nその点は双鉄くん――ものすごく無頓着でしたよね？」
1770 = "「就是能不能察覺別人的好意。你以前不是完全意識不到這一點嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。うむ、今は違う――と自分では思っているが、\n昔は確かに、人からの好意に、価値を覚えていなかった」
1858 = "「是吧。雖然我感覺自己現在應該已經改善了，但以前的確沒怎麼意識到別人對我的好意有多大價值」" 

# monologue
# JP: より厳密には、好意にも、悪意にも。\n人から自分がどう思われようと関係なかった。
2317 = "嚴格一點來說，不管是別人對我的好意還是惡意，我都不怎麼在意。我一直認為別人怎麼想和我無關。" 

# monologue
# JP: 要求されたことを、果たす。\nそれだけが他者との関わり、すべてと思い込んでいたから。
2402 = "我一直以為，只要完成別人要求我完成的事情就好，這就是我與他人之間關係的一切。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしは正反対だったんです。自己評価が低かったから、\n自分を大事にしてくれる人に、ものすごく気をつかって」
1527 = "「以前我和你完全相反。因為自卑，我會對周圍看重自己的人特別在意」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あー」
# 1698 = "「噢」" 

# monologue
# JP: なるほど、わかったような気がする。\n僕は絶望、ひかりは周囲の環境と、その根本はまるで違う。
2606 = "聽她這麼一說我似乎懂了。我是對人際關係絕望，而光在這一點上與我全無可比性。" 

# monologue
# JP: が――表出している部分は確かに、非常に似ている。
2252 = "但我們表現出來的表象卻非常相似。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひかりは愛情に無頓着……あって当たり前すぎるのか。\nひかりにとって、愛情は空気と同じようなものか」
1553 = "「光不是對愛遲鈍或者不關心……而是收穫別人的喜愛對她來說太理所當然，就像呼吸空氣一樣自然」" 

# monologue
# JP: 普段からそれに包まれまくっているのなら、\n空気のありがたみも愛情のありがたみも理解できない。
2339 = "她是個被愛包圍著長大的孩子，自然無法理解自身成長的環境，還有他人對自己的愛是多麼地可貴。" 

# monologue
# JP: 無くなり初めてその価値がわかるものだが――\nそんな事態に、もちろんひかりを陥らせたくも無い。
2424 = "我心裡很明白，對她這樣的人來說，第一次失去愛的時候就能明白愛的價值了。當然，我肯定不想讓她遭遇這種情況。" 

# 【ポーレット】
# display as 波萊特
# JP: 「だと思います。小さなころのわたしだったら――\nどんなにいやでも怖くても、我慢して花束届けてました」
1807 = "「我也是這麼想的。今天如果是換做小時候的我——不管心裡多麼害怕我也一定會強忍著去獻花」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ……」
1632 = "「唔……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「いやがって逃げたりして、愛情を失うのが怖いから。\nだけどひかりは愛情をなくすこと、まだ怖くないんです」
1701 = "「因為我最害怕的就是因為拒絕而失去別人的愛。可光卻完全不會害怕這一點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうかもしれん――が。\nそれならば、何故れいなに気をつかったのだろう？」
1597 = "「可能是這樣吧。可就算如此，她又為什麼要補償玲奈？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それは、れいなを元気づけるためですよ。\nれいながしょんぼりしちゃったから、そこを心配して」
2032 = "「那是為了讓玲奈開心。一定是她看到玲奈失落的樣子，很擔心玲奈」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あああ」
1699 = "「噢噢」" 

# monologue
# JP: 即答だ。納得できる。してしまう。\n同時に、ポーレットを尊敬する。
2351 = "她馬上就得出了答案。我心想，的確很有道理。同時心中湧出了對波萊特的尊敬之情。" 

# monologue
# JP: 母はすごいと、ひたすら思う。\nそこまで僕は、ひかりのこころを読み取れない。
2445 = "我覺得母親真是太厲害了。就連我也無法如此深刻地理解光的心思。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それって、ひかり自身の保身のために――\n”愛情を失わないため”に、してることじゃないんです」
1817 = "「我想，這肯定不是光為了讓自己“不失去別人的愛”而做出的舉動」" 

# 【双鉄】
# display as 雙鐵
# JP: 「決して悪いことではないだろう。\nむしろ、とても良いことのように思うが――」
1998 = "「這並不是什麼壞事吧。甚至可以說是好事」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひかりが、双鉄くんと同じくらいいい意味で鈍感なら、\n一生それで、いけちゃうのかもしれません」
1545 = "「假如光和你一樣擁有這種有利的遲鈍的話，那她一輩子這樣也沒問題」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
# 1633 = "「唔」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、あのこわたしと似ているところもあるから……\nもしもバランスがとれなくなったら――」
1530 = "「但是，她身上也有很多地方像我……要是不小心在人生之路上失去了平衡怎麼辦」" 

# monologue
# JP: あるものが当然だと思い込んでいる愛情が、\nどこかの時点で、失われてしまう。
2583 = "等小孩子長大，總有一天會發現愛不是理所當然的。" 

# monologue
# JP: 僕ならば――少なくともポーレットと出会う前の僕なら、\nおそらく受け入れ。あるいは諦めるものであろうが――
2258 = "假如是我——至少是在與波萊特相遇之前的我，就會接受這個事實並乾脆放棄。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに……怖いな」
1946 = "「的確……我也很害怕這個」" 

# monologue
# JP: 今のひかりが――そんな想像はしたくもないが――\nもしも僕らを、あるいはれいなを失ったのなら。
2655 = "雖然我不願去想像，但假如現在的光失去了我們或者玲奈……" 

# monologue
# JP: 無条件で自分を愛してくれると信じている人たちに、\n万一うとまれ……邪険に扱われたのならば。
2621 = "萬一她被那些她堅信會無條件愛著自己的人們所疏遠，嫌她礙事……" 

# 【双鉄】
# display as 雙鐵
# JP: 「幼いこころに、どれほど深い傷がつくのか――\n僕には、想像することもできん」
1830 = "「我無法想像這會對她幼小的心靈造成多麼嚴重的傷害」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だから、なんとかしておきたいとは思うんです。\n今のあのこは、あんまりに無邪気で無防備だから」
1839 = "「所以，我想趁這種事情還沒發生之前為她做點什麼。現在的她實在是過於天真無邪了」" 

# monologue
# JP: 確かにだ。産まれたときから今までずっと、\n十重二十重の愛情と目配りに保護されて――
2464 = "是啊，她出生到現在，一直都活在周圍大人十層、二十層的守護和關愛中。" 

# monologue
# JP: ひかりはおそらく、身を守ることを。――いや、\n本当の意味での“他者との関わり”をまるで知らない。
2549 = "現在的她還不知道要怎麼從惡意中守護自己——不，她甚至連人與人之間關係的本質都不明白。" 

# 【ポーレット】
# display as 波萊特
# JP: 「少しずつでも、そういうこと、教えておきたい。\n人は、いつまでもこどものままじゃいられないから」
1814 = "「我想要慢慢讓她學會這些。畢竟人是不能一輩子都當小孩子的呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1874 = "「是啊」" 

# monologue
# JP: 僕はおそらく、異常なまでに長い時間を、\nこどものままに過ごした者だ。
2427 = "我恐怕就是那種度過了漫長得離譜的兒童心理階段才長大了的人。" 

# monologue
# JP: それが健全とは思えないし……ひかりには、\nもっと普通に――平凡に幸せになってもらいたい。　
2403 = "我不覺得這樣算得上是健康成長……而且，我也更想要光成長為一個普通人，收穫平凡的幸福。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ポーレットはどうだったのだ？」
2035 = "「那波萊特，你又是怎樣長大的？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「どうって、何がです？」
1519 = "「什麼怎樣長大？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今のポーレットは大人だし、僕と初めて会ったときにも、\nポーレットは、充分すぎるほど大人だった気がするから」
1941 = "「現在的你很成熟，但其實第一次見面的時候，我就覺得你已經很成熟了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ああ」
1667 = "「喔～」" 

# monologue
# JP: それだけで、ポーレットはわかってくれる。\n黙って、なにかを考え込んで――
2450 = "我這麼一說，波萊特就懂了。她沉默著思考了一會。" 

# 【ポーレット】
# display as 波萊特
# JP: 「やっぱり、旅だと思います」
1832 = "「我覺得讓我長大的契機，應該就是那趟旅途吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「旅」
1851 = "「旅途」" 

# 【ポーレット】
# display as 波萊特
# JP: 「パパとの旅。はじめての、寝台列車の、冬の旅。\nあれでわたしは――わたしになったんだと思います」
1881 = "「是我和爸爸一起踏上的那場冬季臥鋪車之旅。我想，一定就是那趟旅途讓我成為了現在的我」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
1631 = "「哦？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うまくいえないんですけど……自分の中に、\n『これだけは絶対壊れない』もの、見つけた感じで」
1831 = "「我無法清晰表達當時的感受……反正就類似於那種找到了自己心中“絕對無法動搖”的事物吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「自分の核か」
1883 = "「是指“自我”的核心嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「核、なんですかね？　わからないですけど。\nでも、あの旅で、わたしは変わった。少し、変われた」
1594 = "「可能是吧？我不是很清楚。但經過了那趟旅途，我的確改變了，被那趟旅途所改變了」" 

# monologue
# JP: 自分の言葉をかみしめるように。\nしばし、ポーレットは唇を結ぶ。
2521 = "波萊特說完沉默了一會，就像在回味自己的話一般。" 

# 【ポーレット】
# display as 波萊特
# JP: 「誰かにあわせて、無理に自分を変えなくていい――\n変えようとしても変えられない自分が居るって気づけた」
1825 = "「我明白了，不用總是隨著別人的意圖勉強改變自己，因為我發現我內心有一個無論怎樣都不會改變的自己」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのだな」
1885 = "「是這樣的嗎」" 

# monologue
# JP: ポーレットの過去に、僕が寄り添うことはできない。\n思い出す隣にいるのが、精一杯だ。
2437 = "我無法體會波萊特的過去，頂多只能在她回憶的時候陪在她身邊。" 

# monologue
# JP: が。ひかりの未来については、違う。\n僕らはそれを、よりよく導いてやらねばならない。
2300 = "可是今後我要陪光共同成長，我必須成為一個能引導她走向正路的父親。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、旅をしてみるか」
2024 = "「那我們要不要也試試去旅行？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1648 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。今の僕らなら、これからならば出来るのだ。\n今までの仕事の大半が、まさに今日終わったのだから」
1678 = "「嗯。我覺得現在的我們可以做到。畢竟我們肩上的工作在今天已經結束了一大半」" 

# monologue
# JP: こっくりと、ポーレットが深く頷く。
2513 = "波萊特用力點著頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「です、よね。できちゃうんだ、旅。\n今のわたしたちなら――御一夜鉄道の体制なら」
1865 = "「是啊。我們可以出去旅行了。而且御一夜鐵路現在的體制也允許我們這麼做」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1760 = "「對」" 

# monologue
# JP: 今は日々姫は正機関士だし、\n凪にいたっては正機関士兼正運転士だ。
2548 = "現在日日姬是正司機，凪是正司機兼正駕駛員。" 

# monologue
# JP: ニイロクはキハ07sを制御できるし、赤井宮司も居る。\n機関助士たちだって増員されてる。
2236 = "二六可以控制Ｋｉｈａ０７Ｓ，赤井宮司也在。擔任司爐的人也多了不少。" 

# 【双鉄】
# display as 雙鐵
# JP: 「旅こそは、外の世界と触れることだし――\nひかりも単純に喜ぶだろう。鉄道旅行をするのなら」
1559 = "「出門旅行可以接觸外面的世界。不過，光肯定會更單純地享受鐵路旅行本身」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。鉄道の……。まだ三月だし、うん。\n雪の旅、経験させてあげられますね」
1875 = "「是啊，鐵路旅行……而且現在還是三月。嗯，可以讓她來一場觀雪之旅」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その方向で、旅程を組んでくれるか？」
1541 = "「你能按照這個要求做一個旅程計劃嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「頼まれなくても、絶対組みます！\nわたし達の、初めての、家族での鉄道旅行なんですから」
1829 = "「我求之不得！畢竟這可是我們第一次的家庭鐵路旅行呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ、おい」
1651 = "「啊，喂」" 

# monologue
# JP: ポーレットがベッドから起き出してしまう。\n明日にしろといいかけて、けれど言葉をすぐに飲み込む。
2522 = "波萊特馬上下了床。我剛想說從明天開始再想，可是看到她那副模樣，讓我不由得把這話咽了回去。" 

# monologue
# JP: とても綺麗な、母の顔だ。\n邪魔をするなど、野暮の極みというものだろう。
2344 = "她現在的表情十分美麗，那毫無疑問是身為人母的表情。假如我給現在的她潑冷水那才是不解風情。" 

# 【ポーレット】
# display as 波萊特
# JP: 「最高の旅。\nわたし、絶対に組んで見せます」
1803 = "「我一定會安排一場最棒的旅程」" 
