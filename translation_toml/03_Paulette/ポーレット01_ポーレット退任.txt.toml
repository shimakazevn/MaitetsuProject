2438 = "我甚至都能感覺到，她此刻只想趕緊回家，讓波萊特好好寵愛她。" 

# 【れいな】
# display as 玲奈
# JP: 「お待たせしましたぁ」
1512 = "「久等啦」" 

# monologue
