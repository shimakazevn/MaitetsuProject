1505 = "「不要，光不行的」" 

# 【れいな】
# display as 玲奈
# JP: 「じゃあ、れいながだっこしてあげますから。\nひかりちゃんは、じっとしてるだけでどうですかぁ？」
2038 = "「那玲奈就把你抱起來，小光乖乖讓玲奈抱著好不好？」" 

# 【ひかり】
# display as 光
# JP: 「やぁん！」
1504 = "「不要！」" 

# 【れいな】
# display as 玲奈
# JP: 「えっ！？」
1628 = "「哎？！」" 

# 【職員Ａ】
# display as 職員Ａ
# JP: 「あっ」
# 1642 = "「啊」" 

