[script]
# lines: 440 
# 【ポーレット】
# display as 波萊特
# JP: 「――いい風」
1730 = "「——Gió mát quá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1874 = "「Ừ.」"

# monologue
# JP: 晴れの日だ。\nふたつの意味で、文字通り。
2249 = "Một ngày nắng đẹp.\nĐúng nghĩa đen theo cả hai nghĩa."

# monologue
# JP: ポーレットの表情も快晴だ。\n金の髪より、まぶしく明るく輝いている。
2518 = "Biểu cảm của Paulette cũng trong xanh như\nbầu trời.\nTỏa sáng rực rỡ và chói lọi hơn cả mái tóc\nvàng của cô ấy."

# 【ポーレット】
# display as 波萊特
# JP: 「あ、稀咲さん」
1624 = "「A, chị Kisaki.」"

# 【双鉄】
# display as 雙鐵
# JP: 「新市長、ですよ？　市長」
1774 = "「Là Tân Thị trưởng đấy nhé? Thị trưởng.」"

# monologue
# JP: ポーレットの任期が満了し、\n僕の私設秘書としての役割も、書類上はもう終了している。
2517 = "Nhiệm kỳ của Paulette đã kết thúc,\nvà trên giấy tờ, vai trò thư ký riêng của\ntôi cũng đã chấm dứt."

# monologue
# JP: が、この退庁式が終わるまで、\nやはり、秘書として振る舞いたい。
2304 = "Nhưng cho đến khi buổi lễ bãi nhiệm này\nkết thúc,\ntôi vẫn muốn cư xử như một người thư ký."

# 【ポーレット】
# display as 波萊特
# JP: 「それならわたしは前市長ですよ？\n右田秘書」
1602 = "「Vậy thì em là cựu Thị trưởng đấy nhé?\nThư ký Migita.」"

# monologue
# JP: ポーレットもそれをわかってくれる。\n普段よりよほど市長然として応えてくれる。
2507 = "Paulette cũng hiểu điều đó.\nCô ấy đáp lại tôi với vẻ ra dáng Thị\ntrưởng hơn hẳn bình thường."

# monologue
# JP: 小さな声で、ごくささやかな幸せをやりとりする間にも、\n稀咲はすたすた近づいてくる。
2380 = "Trong lúc chúng tôi trao đổi những lời thì\nthầm hạnh phúc nhỏ bé,\nKisaki đã rảo bước đến gần."

# 【稀咲】
# display as 稀咲
# JP: 「二期八年。\n長い間ご苦労さまでした、雛衣ポーレット前市長」
2051 = "「Hai nhiệm kỳ, tám năm.\nCô đã vất vả trong một thời gian dài rồi,\ncựu Thị trưởng Hinai Paulette.」"

# monologue
# JP: 堂々と、凜然と。\n頼もしい――そんな言葉が頭に浮かぶ。
2565 = "Đường hoàng và uy nghiêm.\nĐáng tin cậy——đó là từ hiện lên trong đầu\ntôi."

# 【ポーレット】
# display as 波萊特
# JP: 「ご就任おめでとうございます。[ほうしょう,1]宝生稀咲新市長」
1795 = "「Chúc mừng chị đã nhậm chức. Tân Thị\ntrưởng Houshou Kisaki.」"

# monologue
# JP: ポーレットも見事に応対してみせる。\n柔らかな笑顔の交換。カメラフラッシュの花が咲く。
2516 = "Paulette cũng đáp lại một cách xuất sắc.\nHai người trao nhau nụ cười dịu dàng. Ánh\nđèn flash máy ảnh nhấp nháy liên tục."

# monologue
# JP: 報道陣は――ざっと三十人以上。大賑わいだ。\nこれもまたポーレットの業績への評価だと、嬉しく感じる。
2416 = "Đội ngũ báo chí——sơ sơ cũng hơn ba mươi\nngười. Thật náo nhiệt.\nTôi cảm thấy vui mừng vì đây cũng là một\nsự công nhận đối với những thành tựu của\nPaulette."

# 【ポーレット】
# display as 波萊特
# JP: 「宝生新市長にお任せできること、心強く感じています。\n[おひとよ,2]御一夜市の未来を、どうぞよろしくお願いします」
1813 = "「Em cảm thấy rất yên tâm khi có thể giao\nphó cho Tân Thị trưởng Houshou.\nTương lai của thành phố Ohimitera, xin nhờ\ncả vào chị.」"

# 【稀咲】
# display as 稀咲
# JP: 「もちろん、全力でお引き受けします。\nその上で今後とも――どうぞその手を、御一夜のために」
1977 = "「Tất nhiên, tôi sẽ dốc toàn lực để đảm\nđương.\nNhưng đồng thời, từ nay về sau——mong cô\nhãy tiếp tục góp sức vì Ohimitera.」"

# monologue
# JP: 稀咲がスっと右手を差し出す。\nポーレットも笑顔でそれを受け取る。固い握手。
2637 = "Kisaki dứt khoát chìa tay phải ra.\nPaulette cũng mỉm cười đón lấy. Một cái\nbắt tay thật chặt."

# monologue
# JP: 再び、無数のフラッシュの光。\n実にうまい。二人とも。これは完璧な絵作りだ。
2305 = "Lại một lần nữa, vô số ánh đèn flash chớp\nsáng.\nThật sự rất khéo. Cả hai người. Đây quả là\nmột khung hình hoàn hảo."

# 【稀咲】
# display as 稀咲
# JP: 「御一夜市の復興はマイントレジャー。\nそして、御一夜鉄道様あってのことですから」
1789 = "「Sự phục hưng của thành phố Ohimitera là\nnhờ Mine Treasure.\nVà nhờ có Đường sắt Ohito.」"

# 【ポーレット】
# display as 波萊特
# JP: 「過分なお褒めに恐縮しますが、光栄です。\n御一夜の更なる発展のためにも、努力を重ねて参ります」
2012 = "「Thật vinh hạnh khi được chị khen ngợi quá\nlời.\nĐể Ohimitera ngày càng phát triển hơn nữa,\nchúng tôi sẽ tiếp tục nỗ lực không ngừng.」"

# 【稀咲】
# display as 稀咲
# JP: 「そういっていただけると、安心です。\nこれからも、ともに御一夜市のために」
1543 = "「Nghe cô nói vậy, tôi thấy rất an tâm.\nTừ nay về sau, hãy cùng nhau cố gắng vì\nthành phố Ohimitera nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。\n御一夜の――わたしたちの町と、くらしのために」
1727 = "「Vâng ạ.\nVì Ohimitera——vì thị trấn và cuộc sống của\nchúng ta.」"

# monologue
# JP: もう一度小さく微笑みあって――
2455 = "Hai người lại mỉm cười với nhau một lần\nnữa——"

# monologue
# JP: それが合図であったかのように、\nふたりは結んでいた手を離す。
2649 = "Nụ cười đó như một ám hiệu,\nhai người buông tay nhau ra."

# 【ポーレット】
# display as 波萊特
# JP: 「それじゃあ。失礼しますね？\nお仕事の邪魔になりたくありませんし」
2029 = "「Vậy thì. Tôi xin phép đi trước nhé?\nTôi không muốn làm phiền công việc của mọi\nngười.」"

# 【稀咲】
# display as 稀咲
# JP: 「お気持ち、承りました。ですが――\n始業時間までは、職員達に付き合ってあげてください」
1706 = "「Tôi xin ghi nhận tấm lòng của cô. Nhưng\nmà——\nTừ giờ cho đến lúc bắt đầu giờ làm việc,\nxin hãy nán lại cùng các nhân viên nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ――」
1641 = "「A——」"

# monologue
# JP: 稀咲の声が合図となってか、\n整列した職員たちのあちこちに、花束が顔を覗かせる。
2605 = "Lời nói của Kisaki như một tín hiệu,\ntừ khắp nơi trong hàng ngũ nhân viên,\nnhững bó hoa bắt đầu xuất hiện."

# 【稀咲】
# display as 稀咲
# JP: 「それじゃ、また」
2027 = "「Vậy, hẹn gặp lại.」"

# monologue
# JP: 軽く手を振り、稀咲はあっさり庁舎へ向かう。
2575 = "Vẫy tay nhẹ một cái, Kisaki dứt khoát đi\nvề phía tòa thị chính."

# 【記者Ａ】
# display as 記者Ａ
# JP: 「ああ、少しだけよろしいですか。新市長」
1846 = "「A, Tân Thị trưởng, cho tôi xin một ít\nphút được không ạ?」"

# monologue
# JP: なじみの記者――市川さんが稀咲のことを追い始めると、\nそれに続く者、帰社するらしい者と記者たちも散り始める。
2414 = "Nhà báo quen thuộc——anh Ichikawa bắt đầu\nđuổi theo Kisaki,\nnhững phóng viên khác cũng bắt đầu tản ra,\nngười thì đi theo, người thì có vẻ quay về\ntòa soạn."

# 【宮本】
# display as 宮本
# JP: 「お疲れ様でした。雛衣前市長」
2050 = "「Cô đã vất vả rồi. Cựu Thị trưởng Hinai.」"

# 【ポーレット】
# display as 波萊特
# JP: 「宮本さん」
1754 = "「Cô Miyamoto.」"

# monologue
# JP: 職員たちが、なんとなくタイミングを見計らうその間に、\nポーレットの前に歩み出てきたのは、宮本さん――
2321 = "Trong lúc các nhân viên khác vẫn đang do\ndự tìm thời điểm thích hợp,\nngười bước lên trước mặt Paulette là cô\nMiyamoto——"

# monologue
# JP: ポーレットの父、雛衣幸三前々市長の時代から、\n御一夜市制を実務で支えた、総務部長だ。
2342 = "Trưởng phòng Tổng vụ, người đã gánh vác\ncác công việc thực tế của thành phố\nOhimitera\ntừ thời cha của Paulette, cựu Thị trưởng\ntiền nhiệm Hinai Kouzou."

# 【ポーレット】
# display as 波萊特
# JP: 「宮本さんに、『前市長』っていわれちゃうと、\nなんだか、父のことを呼ばれてるみたいな気がして」
1755 = "「Nghe cô Miyamoto gọi là 『Cựu Thị trưởng』,\ncháu lại có cảm giác như cô đang gọi ba\ncháu vậy.」"

# 【宮本】
# display as 宮本
# JP: 「そうですか？　それでは、ポーレット前市長」
1879 = "「Vậy sao? Thế thì, Cựu Thị trưởng\nPaulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「『ポーレットちゃん』でもいいですか？　昔みたいに」
1578 = "「Cô gọi cháu là 『Bé Paulette』 như ngày xưa\nđược không ạ?」"

# 【宮本】
# display as 宮本
# JP: 「ああ――」
1697 = "「A——」"

# monologue
# JP: 宮本さんが、あたたかな息を吐き、目を閉じる。\nまぶたの裏に、何を思い浮かべているのだろう？
2373 = "Cô Miyamoto khẽ thở ra một hơi ấm áp và\nnhắm mắt lại.\nKhông biết sau đôi mi ấy, cô đang hồi\ntưởng lại điều gì?"

# 【宮本】
# display as 宮本
# JP: 「そうね。私ももう、一市民に戻ったわけだし」
1514 = "「Cũng phải nhỉ. Cô giờ cũng đã trở lại làm\nmột người dân bình thường rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1642 = "「A.」"

# monologue
# JP: そうか、宮本さんもご退職なさるのか。
2376 = "Ra vậy, cô Miyamoto cũng nghỉ hưu sao."

# monologue
# JP: ポーレットは把握していたのだろう。\n驚きもせず、静かに右手を差し伸べる。
2509 = "Chắc hẳn Paulette đã biết trước điều này.\nCô ấy không hề tỏ ra ngạc nhiên, chỉ lặng\nlẽ chìa tay phải ra."

# 【ポーレット】
# display as 波萊特
# JP: 「定年退職までの長きにわたり。御一夜市を支え続けて\nくださって、本当にありがとうございました」
1796 = "「Cảm ơn cô rất nhiều vì đã luôn cống hiến\ncho thành phố Ohimitera\ntrong suốt một thời gian dài cho đến lúc\nnghỉ hưu.」"

# 【宮本】
# display as 宮本
# JP: 「自分では天職だと思ってたから。\n長く務めることができて、幸運だったし、光栄でした」
1834 = "「Bản thân cô luôn coi đây là thiên hướng\ncủa mình.\nĐược cống hiến lâu dài như vậy, cô thấy\nrất may mắn và vinh dự.」"

# monologue
# JP: 宮本さんが右手を受け取る。\n握手の上に、そうっと左手を重ねて添える。
2372 = "Cô Miyamoto nắm lấy tay phải của Paulette.\nRồi nhẹ nhàng đặt bàn tay trái lên trên\ncái bắt tay ấy."

# 【宮本】
# display as 宮本
# JP: 「ポーレットちゃんこそ有り難う。与えられた役割を、\n二期八年務めきって、素晴らしい実績を重ねてくれて」
1921 = "「Cô mới là người phải cảm ơn cháu, bé\nPaulette. Cảm ơn cháu đã hoàn thành xuất\nsắc\nvai trò được giao trong suốt hai nhiệm kỳ\ntám năm, và đạt được những thành tựu tuyệt\nvời.」"

# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
1648 = "「!」"

# monologue
# JP: “天職”と。“与えられた役割”と。\n宮本さんが言外に伝えようとしていることはよく解る。
2386 = "\"Thiên hướng\" và \"vai trò được giao\".\nTôi hiểu rất rõ hàm ý sâu xa trong lời nói\ncủa cô Miyamoto."

# monologue
# JP: 亡父を継いで、やりたくも向いてもいなかった市長職を、\nポーレットが見事にこなしきったと、褒めているのだ。
2341 = "Cô ấy đang khen ngợi Paulette, người đã kế\nnhiệm người cha quá cố,\nhoàn thành xuất sắc chức vụ Thị trưởng mà\nbản thân vốn không hề mong muốn hay phù\nhợp."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしにも天職でしたよ？　八年間限定で、双鉄く――\n右田秘書と、職員の皆さんに支えて貰えれば。ですけど」
1762 = "「Với cháu, đây cũng là thiên hướng đấy ạ?\nDù chỉ giới hạn trong tám năm,\nvà phải nhờ có sự hỗ trợ của anh\nSoutetsu——Thư ký Migita, cùng toàn thể các\nnhân viên.」"

# 【宮本】
# display as 宮本
# JP: 「あははっ」
1645 = "「Ahaha.」"

# monologue
# JP: 自信に満ちた切り返し。\n宮本さんはそれを受け止め、実に晴れやかな笑いを零す。
2636 = "Lời đáp trả đầy tự tin.\nCô Miyamoto đón nhận nó và nở một nụ cười\nrạng rỡ."

# 【宮本】
# display as 宮本
# JP: 「成長したのね、ポーレットちゃん。\n今度、ゆっくり呑んでみましょう？」
1920 = "「Cháu đã trưởng thành rồi nhỉ, bé\nPaulette.\nHôm nào rảnh, cô cháu mình cùng đi uống\nmột ly nhé?」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい、よろこんで」
1729 = "「Vâng, cháu rất sẵn lòng ạ.」"

# 【宮本】
# display as 宮本
# JP: 「っと、おばちゃんが独占しちゃったら、気の毒ね」
1623 = "「Ấy chết, bà cô này mà độc chiếm cháu mãi\nthì tội cho những người khác quá.」"

# monologue
# JP: 宮本さんが脇へと譲れば、\n花束をかかえた――ああ、
2371 = "Cô Miyamoto vừa lùi sang một bên,\nmột người ôm bó hoa tiến lên——à,"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「市長！」
1773 = "「Thị trưởng!」"

# monologue
# JP: 彼か。\n思った瞬間、ポーレットも笑顔をほころばす。
2288 = "Là cậu ấy sao.\nNgay khi tôi vừa nghĩ vậy, Paulette cũng\nnở nụ cười tươi rói."

# 【ポーレット】
# display as 波萊特
# JP: 「前市長ですってば、高崎主任。\nあのときはありがとうございました」
2058 = "「Là cựu Thị trưởng rồi mà, Chủ nhiệm\nTakasaki.\nCảm ơn anh vì những chuyện hồi đó nhé.」"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「こちらこそです！\nあのときの弁当、本当にうまかったです！」
2000 = "「Tôi mới là người phải cảm ơn cô!\nHộp cơm bento lúc đó, thật sự rất ngon!」"

# monologue
# JP: マイントレジャー計画の立ち上がる前、\n真っ先に手をあげてくれた高崎くん。
2662 = "Trước khi kế hoạch Mine Treasure được khởi\nxướng,\ncậu Takasaki là người đầu tiên giơ tay ủng\nhộ."

# monologue
# JP: 若手だった彼も、ボランティアの中心的存在として\n頭角を現し、今では立派な主任級だ。
2554 = "Chàng trai trẻ tuổi ngày nào giờ đã bộc lộ\ntài năng,\ntrở thành nhân vật nòng cốt của nhóm tình\nnguyện viên, và hiện tại đã là một Chủ\nnhiệm chững chạc."

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「前市長。御一夜を笑顔の町に戻してくださり――\n本当にありがとうございました！」
1567 = "「Cựu Thị trưởng. Cảm ơn cô vì đã mang nụ\ncười\ntrở lại với Ohimitera——thực sự cảm ơn cô\nrất nhiều!」"

# 【ポーレット】
# display as 波萊特
# JP: 「みんなの力です。\n市職員だけでなく、御一夜市のみんなの」
2008 = "「Đó là sức mạnh của tất cả mọi người.\nKhông chỉ của các nhân viên thành phố, mà\nlà của toàn thể người dân Ohimitera.」"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「しちょ……前市長」
1772 = "「Thị trưở... Cựu Thị trưởng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「だからもちろん、わたしたちの力も入ってますけど！」
1944 = "「Nên tất nhiên, trong đó cũng có sức mạnh\ncủa chúng ta nữa!」"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「あはっ！」
1617 = "「Aha!」"

# monologue
# JP: しめっぽくなるのを嫌ってだろう。\nおどけて見せたポーレットに、高崎くんも笑顔を返す。
2559 = "Có lẽ cô ấy không thích không khí trở nên\nu sầu.\nThấy Paulette nói đùa, cậu Takasaki cũng\ncười đáp lại."

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「条例とはいえ、ご退任。残念という他にありません。\nまた一緒にお仕事させていただけることを、願ってます」
2047 = "「Dù là do quy định, nhưng việc cô từ\nnhiệm, tôi thấy rất tiếc.\nHy vọng sau này chúng ta lại có cơ hội làm\nviệc cùng nhau.」"

# 【ポーレット】
# display as 波萊特
# JP: 「観光課に移ってくれれば、すぐにでも――\nっていうか、あれ？」
1575 = "「Nếu anh chuyển sang phòng Du lịch thì\nngay lập tức——\nMà khoan, ủa?」"

# monologue
# JP: 受け取った花束を抱えたまま、\nポーレットが大きくあたりを見回す。
2508 = "Ôm những bó hoa vừa nhận được trên tay,\nPaulette đảo mắt nhìn quanh một vòng lớn."

# 【ポーレット】
# display as 波萊特
# JP: 「観光課といえば、[たかさきさん,1]奥様は？」
1972 = "「Nhắc đến phòng Du lịch, phu nhân của anh\nđâu rồi?」"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「あ、それは――」
1660 = "「A, chuyện đó thì——」"

# 【職員Ａ】
# display as 職員Ａ
# JP: 「ほら、ね？　せっかくなんだし」
1535 = "「Đấy, thấy chưa? Dịp hiếm có thế này mà.」"

# 【れいな】
# display as 玲奈
# JP: 「れいなもいっしょですからぁ、ね？」
1895 = "「Có Reina đi cùng mà, nha~?」"

# 【ひかり】
# display as ？？？
# JP: 「やぁぁ」
1501 = "「Không chịuuuu」"

# monologue
# JP: 聞き慣れた声。\nかなりグズって、泣きそうな声。
2577 = "Một giọng nói quen thuộc.\nGiọng nói nũng nịu, như sắp khóc đến nơi."

# 【ポーレット】
# display as 波萊特
# JP: 「ひかり！？」
1556 = "「Hikari!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。だめだ」
1919 = "「Paulette. Không được.」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんっ！？」
2049 = "「Anh Soutetsu!?」"

# monologue
# JP: 声では決して止められないとわかった上で捕まえた手を、\nけれどポーレットは、振りほどこうと身もだえる。
2441 = "Biết rằng chỉ dùng lời nói sẽ không cản\nđược cô ấy, nên tôi đã nắm lấy tay\nPaulette,\nnhưng cô ấy vẫn cố giãy giụa để vùng ra."

# 【ポーレット】
# display as 波萊特
# JP: 「止めないで。ひかりがっ」
1844 = "「Đừng cản em. Hikari đang...」"

# 【双鉄】
# display as 雙鐵
# JP: 「退庁式だぞ。主役が席を離れてどうする」
2001 = "「Đang là lễ bãi nhiệm đấy. Nhân vật chính\nrời đi thì còn ra thể thống gì nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「でも、わたしがいってあげなきゃ」
1593 = "「Nhưng em phải đến chỗ con bé...」"

# 【双鉄】
# display as 雙鐵
# JP: 「いつもそばにいてやれるとは限らん。\nあえて離れて見守ることも、愛情だろう」
1539 = "「Không phải lúc nào cô cũng ở bên cạnh con\nbé được đâu.\nĐôi khi, đứng từ xa quan sát cũng là một\ncách thể hiện tình yêu thương mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「だとしても、まだ赤ちゃんのうちくらいは」
1591 = "「Dù vậy, ít nhất cũng phải đợi đến khi con\nbé hết tuổi sơ sinh đã chứ...」"

# 【双鉄】
# display as 雙鐵
# JP: 「もう四つだ。赤ちゃんとはいえまい。\n再来年には少等部だぞ」
1718 = "「Đã bốn tuổi rồi. Không còn là trẻ sơ sinh\nnữa đâu.\nNăm sau nữa là lên Tiểu học rồi đấy.」"

# 【ポーレット】
# display as 波萊特
# JP: 「っ――」
# 1641 = "「啊……」" 

# monologue
# JP: ようやく納得してくれたのか、\n納得せずとも、場の性質ゆえ耐えたのか――
2330 = "Không biết là cô ấy đã bị thuyết phục,\nhay là dù không phục nhưng vì tính chất\nbuổi lễ nên đành phải nhẫn nhịn——"

# monologue
# JP: ともかくもポーレットは踵を下ろし、\n僕もつかんでいた手を離す。
2587 = "Nói chung, Paulette đã lùi lại,\nvà tôi cũng buông tay cô ấy ra."

# 【双鉄】
# display as 雙鐵
# JP: 「れいながついてる。高崎さんもだ。任せよう」
1893 = "「Có Reina ở đó. Cả vợ anh Takasaki nữa. Cứ\ngiao cho họ đi.」"

# monologue
# JP: ボランティアを通じ、高崎君の奥さんとなった高崎さんも、三歳の子の母親だ。
2664 = "Vợ anh Takasaki, người nên duyên vợ chồng\nvới anh thông qua hoạt động tình nguyện,\ncũng là một người mẹ có con ba tuổi."

# monologue
# JP: 子供の扱いは上手だし、ひかりも比較的なついている。
2334 = "Chị ấy rất giỏi dỗ trẻ con, và Hikari cũng\nkhá quấn quýt với chị ấy."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットがいつでも助けては、\nがんばれない子になってしまうぞ」
1966 = "「Nếu lúc nào Paulette cũng giúp đỡ,\ncon bé sẽ trở thành một đứa trẻ không biết\ncố gắng đâu.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そう……ね」
1973 = "「Đúng…… nhỉ.」"

# monologue
# JP: ぐっと、唇がかみしめられる。\n両手も堅く握られている。
2520 = "Cô ấy cắn chặt môi.\nHai tay cũng nắm chặt lại."

# 【ポーレット】
# display as 波萊特
# JP: 「――お願い、れいな。高崎さん」
1196 = "「——Trăm sự nhờ em, Reina. Cả chị Takasaki\nnữa.」"

# monologue
# JP: ポーレットの願いを知ってか知らずか、\nれいなの声が、ふんわりのんびり聞こえてくる。
2232 = "Chẳng biết có hiểu được mong mỏi của\nPaulette hay không,\nmà giọng Reina vẫn vang lên đều đều, thong\nthả."

# 【れいな】
# display as 玲奈
# JP: 「ポーレットの――おかあさんの晴れの日ですよぉ。\nひかりちゃんがお花あげたら、喜んでもらえますよぉ」
2002 = "「Hôm nay là ngày trọng đại của\nPaulette——của mẹ em đó nha~.\nNếu bé Hikari tặng hoa, mẹ sẽ vui lắm đó\nnha~.」"

# 【ひかり】
# display as 光
# JP: 「やぁ、むりいぃ」
1505 = "「Không chịuuuu, con không làm được đâucuu」"

# 【れいな】
# display as 玲奈
# JP: 「じゃあ、れいながだっこしてあげますから。\nひかりちゃんは、じっとしてるだけでどうですかぁ？」
2038 = "「Vậy thì, Reina sẽ bế em lên nha~.\nBé Hikari chỉ cần ngồi yên thôi, chịu\nkhông nha~?」"

# 【ひかり】
# display as 光
# JP: 「やぁん！」
1504 = "「Không chịuuuu!」"

# 【れいな】
# display as 玲奈
# JP: 「えっ！？」
1628 = "「Ơ!?」"

# 【職員Ａ】
# display as 職員Ａ
# JP: 「あっ」
# 1642 = "「啊」" 

# monologue
# JP: 普段であれば決して離さぬれいなのズボンを手放してまで、\nひかりは物陰――高崎さんの後ろにかくれる。
2389 = "Hikari thậm chí còn buông tay khỏi ống\nquần Reina, thứ mà bình thường con bé\nquyết không buông,\nđể trốn vào trong góc khuất——sau lưng vợ\nanh Takasaki."

# 【ひかり】
# display as 光
# JP: 「いく、の――やぁ、なのっ」
1496 = "「Đi ra đó——không chịu, đâuuu」"

# 【れいな】
# display as 玲奈
# JP: 「あぅ」
1633 = "「Aư」"

# monologue
# JP: れいなの顔が、あのれいなの顔が固くなる。\nこれは――確かにショックだろう。
2478 = "Khuôn mặt của Reina, khuôn mặt của một\nReina luôn tươi cười ấy, bỗng cứng đờ.\nViệc này——chắc chắn là một cú sốc lớn đối\nvới em ấy."

# 【ポーレット】
# display as 波萊特
# JP: 「ひかりっ」
1551 = "「Hikari!」"

# monologue
# JP: 限界だ。ポーレットもひかりもれいなも。\n職員たちも、不安げにざわめきはじめてしまっている。
2229 = "Đến giới hạn rồi. Cả Paulette, Hikari và\nReina.\nCác nhân viên cũng bắt đầu xì xào bàn tán\nvới vẻ bất an."

# 【双鉄】
# display as 雙鐵
# JP: 「高崎さん！　すみません。ひかりをお願いします。\nれいなは、こちらを」
2060 = "「Chị Takasaki! Xin lỗi. Trăm sự nhờ chị\nchăm sóc Hikari nhé.\nReina, lại đây nào.」"

# 【職員Ａ】
# display as 職員Ａ
# JP: 「あ、はい！　ね、ひかりちゃん？　なら、\nおばちゃんといっしょに見てましょう？」
1654 = "「A, vâng! Nè, bé Hikari? Vậy thì,\ncháu cùng cô đứng đây xem nhé?」"

# 【ひかり】
# display as 光
# JP: 「あうぅ」
1616 = "「Aưư」"

# 【れいな】
# display as 玲奈
# JP: 「それじゃあ、れいなが、ひかりちゃんの代わりに、\nおかあさんにお花、届けてきますねぇ」
2036 = "「Vậy thì, Reina sẽ thay mặt bé Hikari,\nmang hoa tặng cho mẹ nha~.」"

# 【ひかり】
# display as 光
# JP: 「うぅぅ」
1671 = "「Ưưư」"

# monologue
# JP: 高崎さんのスカートに隠れ、\nひかりはこくこくうなずくばかり。
2280 = "Trốn sau váy vợ anh Takasaki,\nHikari chỉ biết gật đầu lia lịa."

# monologue
# JP: 早く帰って、ポーレットに甘やかしてもらいたい。\n気持ちが、僕にまで伝わるようだ。
2438 = "Muốn nhanh chóng về nhà, để được Paulette\ncưng chiều.\nCảm giác ấy, dường như truyền đến tận chỗ\ntôi."

# 【れいな】
# display as 玲奈
# JP: 「お待たせしましたぁ」
1512 = "「Để mọi người đợi lâu rồi nha~」"

# monologue
# JP: ぽてぽて、れいながやってくる。\nいつもと全く変わらぬ笑顔で、とても大きな花束を抱き。
2539 = "Reina lạch bạch chạy tới.\nVới nụ cười không hề thay đổi so với mọi\nngày, em ấy ôm một bó hoa rất lớn."

# 【ポーレット】
# display as 波萊特
# JP: 「れいな」
1930 = "「Reina.」"

# 【れいな】
# display as 玲奈
# JP: 「これ、御一夜鉄道と商店会の町のみんなからと、\nそれからだれより、ひかりちゃんからですよぉ」
2004 = "「Đây là hoa từ mọi người ở Đường sắt Ohito\nvà Hiệp hội Thương gia trong thị trấn,\nvà hơn ai hết, là từ bé Hikari đó nha~.」"

# 【ひかり】
# display as 光
# JP: 「はにゃあ」
1960 = "「Hanyaa」"

# monologue
# JP: 照れくさそうな、嬉しげな声。\nれいなの言葉を、ひかりなりに誇ってくれているのだろう。
2276 = "Giọng nói có vẻ ngại ngùng nhưng vui\nsướng.\nCó lẽ Hikari cũng đang cảm thấy tự hào\ntheo cách riêng của mình khi nghe Reina\nnói vậy."

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう、れいな。ありがとう、みなさん。\nありがと、ひかり」
1978 = "「Cảm ơn em, Reina. Cảm ơn mọi người.\nCảm ơn con, Hikari.」"

# 【ひかり】
# display as 光
# JP: 「うふふぅ」
1695 = "「Ufufu~」"

# monologue
# JP: ひかりが照れて、高崎さんの後ろにまた隠れてしまう。\nしかし……それでも、やはり嬉しい。
2267 = "Hikari xấu hổ, lại trốn ra sau lưng vợ anh\nTakasaki.\nNhưng…… dù vậy, tôi vẫn thấy rất vui."

# monologue
# JP: これ程大勢の人の中、泣きも逃げもせずこちらを見ている。\nほんのわずかであるけれど、ひかりは確かに成長している。
2627 = "Giữa đám đông như thế này mà con bé không\nkhóc cũng không chạy trốn, vẫn nhìn về\nphía chúng tôi.\nDù chỉ một chút thôi, nhưng Hikari thực sự\nđang trưởng thành."

# 【ポーレット】
# display as 波萊特
# JP: 「本当に嬉しい――ありがとうございます」
1812 = "「Tôi thực sự rất vui——Cảm ơn mọi người.」"

# monologue
# JP: 花束を受け取り、ポーレットが深々と頭を下げる。\n僕も、あわせて。
2395 = "Nhận lấy những bó hoa, Paulette cúi đầu\nthật sâu.\nTôi cũng cúi đầu theo."

# monologue
# JP: パチパチと、あたたかな拍手に包まれる。
2412 = "Tiếng vỗ tay nồng nhiệt vang lên bao quanh\nchúng tôi."

# monologue
# JP: （り～んご～ん）
2669 = "（Bíiing boooong）"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「ああ――予鈴だ」
1661 = "「A——Chuông báo giờ rồi.」"

# monologue
# JP: 名残惜しげな高崎くんを、\nポーレットは、明るい声で送り出す。
2561 = "Thấy cậu Takasaki có vẻ lưu luyến,\nPaulette tiễn cậu ấy bằng một giọng nói\nvui vẻ."

# 【ポーレット】
# display as 波萊特
# JP: 「それじゃあみなさん、今日もお仕事、\nがんばりましょう――がんばってくださいね！」
2040 = "「Vậy thì mọi người, hôm nay chúng ta cũng\ncùng nhau cố gắng\nlàm việc nhé——Mọi người cố gắng lên nhé!」"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「はい。じゃあいってきます！　前市長」
1887 = "「Vâng. Vậy chúng tôi đi đây! Cựu Thị\ntrưởng.」"

# 【職員Ａ】
# display as 職員Ａ
# JP: 「これからもよろしくお願いします」
1523 = "「Từ nay về sau cũng mong được cô giúp đỡ.」"

# monologue
# JP: 握手、握手、握手、握手。\n左手に抱えた花束がズリ落ちそうに――っと。
2504 = "Bắt tay, bắt tay, bắt tay, bắt tay.\nNhững bó hoa ôm trên tay trái cô ấy sắp\ntuột xuống——ái chà."

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット、僕が持とう」
1923 = "「Paulette, để tôi cầm cho.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん。お願いします」
1681 = "「Vâng. Nhờ anh nhé.」"

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「右田さんも。本当にありがとうございました」
1599 = "「Cả anh Migita nữa. Thực sự cảm ơn anh rất\nnhiều.」"

# 【職員Ａ】
# display as 職員Ａ
# JP: 「あっという間でした。\nまた、市役所にも顔を出してくださいね」
1888 = "「Thời gian trôi qua nhanh thật đấy.\nHai người nhớ thỉnh thoảng ghé qua Tòa thị\nchính nhé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕ともか」
1999 = "「Cả tôi nữa sao.」"

# monologue
# JP: 受け取ったばかりの花束達を、\nしっかりと抱え直して、握手する。
2429 = "Tôi ôm chặt lại những bó hoa vừa nhận,\nvà bắt tay với họ."

# 【宮本】
# display as 宮本
# JP: 「これからも、ポーレットちゃんを支えてあげてね？」
1976 = "「Từ nay về sau, cậu cũng hãy tiếp tục hỗ\ntrợ bé Paulette nhé?」"

# 【双鉄】
# display as 雙鐵
# JP: 「無論です。全力で支えますし、\n全力で支えてもらいたく思っています」
2005 = "「Tất nhiên rồi ạ. Cháu sẽ dốc toàn lực hỗ\ntrợ cô ấy,\nvà cũng mong được cô ấy dốc toàn lực hỗ\ntrợ lại.」"

# 【宮本】
# display as 宮本
# JP: 「そ。なら安心」
1878 = "「Vậy sao. Thế thì cô yên tâm rồi.」"

# monologue
# JP: 悪くない。\nいくばくかのさみしさを含めても、なお。
2347 = "Không tệ chút nào.\nDù có chút gì đó cô đơn đi chăng nữa."

# monologue
# JP: ――やがて喧噪の波が引く。\n静寂が、僕らをそっと取り囲む。
1177 = "——Chẳng mấy chốc, sự náo nhiệt lắng xuống.\nSự tĩnh lặng nhẹ nhàng bao quanh chúng\ntôi."

# 【ポーレット】
# display as 波萊特
# JP: 「……いっちゃいました、ね。\nみんな、庁舎に」
1205 = "「……Mọi người đi hết rồi, nhỉ.\nVào Tòa thị chính hết rồi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。あそこはもう、僕らの仕事場ではない」
1872 = "「Ừ. Chỗ đó không còn là nơi làm việc của\nchúng ta nữa rồi.」"

# 【ひかり】
# display as 光
# JP: 「まぁま！」
1740 = "「Mẹ ơi!」"

# 【ポーレット】
# display as 波萊特
# JP: 「ひかり！！」
1555 = "「Hikari!!」"

# monologue
# JP: 賑わいが完全に消えたとたんに、\nひかりが甘えて抱きついてくる。
2220 = "Ngay khi sự náo nhiệt hoàn toàn tan biến,\nHikari liền chạy tới ôm chầm lấy mẹ làm\nnũng."

# monologue
# JP: 胸に思い切り埋もれた頭に、\nポーレットは何度も頬ずりをする。
2515 = "Paulette liên tục cọ má vào cái đầu nhỏ\nđang vùi sâu vào ngực mình."

# 【ポーレット】
# display as 波萊特
# JP: 「いいこね。よく頑張ったわね。\n最後までちゃんと見ててくれて、ありがとう」
1956 = "「Ngoan lắm. Con đã cố gắng rất nhiều.\nCảm ơn con đã ngoan ngoãn theo dõi mẹ đến\ntận lúc cuối nhé.」"

# 【ひかり】
# display as 光
# JP: 「おうち。かえるのぉ」
1964 = "「Nhà. Về nhà đi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん、そうね、帰りましょう」
1687 = "「Ừ, đúng rồi, chúng ta về nhà thôi.」"

# monologue
# JP: ポーレットがひかりを抱き上げる。\n抱き上げ優しく、また頬ずりする。
2512 = "Paulette bế Hikari lên.\nBế lên thật dịu dàng, rồi lại cọ má vào\ncon bé."

# 【ポーレット】
# display as 波萊特
# JP: 「帰りましょう。わたしたちの、おうちに」
1810 = "「Chúng ta về thôi. Về ngôi nhà của chúng\nta.」"

# 【ひかり】
# display as 光
# JP: 「まぁまぁ」
1737 = "「Mẹ ơi, mẹ ơi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「なぁに、ひかり？」
1791 = "「Gì vậy, Hikari?」"

# monologue
# JP: 甘やかし、甘やかされている。\n双方の欲望が完全に合致して、もはや一つになっている。
2222 = "Chiều chuộng và được chiều chuộng.\nMong muốn của cả hai hoàn toàn khớp nhau,\ngiờ đã hòa làm một."

# monologue
# JP: 母と娘は、そういうものだ。\nわかっていても、一抹の疎外感を抱いてしまう。
2434 = "Mẹ và con gái là như vậy đấy.\nDù biết rõ, nhưng tôi vẫn không khỏi cảm\nthấy có chút xa cách."

# 【れいな】
# display as 玲奈
# JP: 「はぅぅ」
1610 = "「Phù...」"

# 【双鉄】
# display as 雙鐵
# JP: 「む」
# 1633 = "「唔」" 

# monologue
# JP: とても小さく、れいなのため息。\nというか、だ。
2442 = "Một tiếng thở dài rất khẽ của Reina.\nHay nói đúng hơn là."

# monologue
# JP: れいながいつも笑顔ゆえ、\n今まで気にもしてこなかったが――
2545 = "Vì Reina lúc nào cũng tươi cười,\nnên từ trước đến nay tôi không hề để ý,\nnhưng——"

# 【ひかり】
# display as 光
# JP: 「あのね、まぁま。かっこよかったのー」
1954 = "「Mẹ biết không. Mẹ ngầu lắm đó.」"

# 【ポーレット】
# display as 波萊特
# JP: 「本当に？　ありがとう。\nひかりが見ててくれたからがんばれたんだよー」
1947 = "「Thật sao? Cảm ơn con.\nNhờ có Hikari theo dõi nên mẹ mới cố gắng\nđược đấy.」"

# 【ひかり】
# display as 光
# JP: 「がんばったの？　まぁま。\nなにがんばったの？」
1704 = "「Mẹ đã cố gắng sao? Mẹ ơi.\nMẹ cố gắng chuyện gì vậy?」"

# 【ポーレット】
# display as 波萊特
# JP: 「たくさんの人の前でお話しするの、ね？\nママ、本当は、いまでもちょびっと、おっかないの」
1705 = "「Là việc nói chuyện trước rất nhiều người\nđó, con biết không?\nThật ra, đến tận bây giờ mẹ vẫn còn hơi sợ\nmột chút.」"

# 【ひかり】
# display as 光
# JP: 「おっかないのー？　ひかりといっしょ？」
1756 = "「Mẹ sợ sao? Giống Hikari à?」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん。一緒」
1682 = "「Ừ. Giống con.」"

# monologue
# JP: ひかりが産まれてくるまでは、\nこうした景色は、ポーレットとれいなとのものだった。
2557 = "「Cho đến khi Hikari ra đời,\nnhững cảnh tượng thế này vẫn luôn là của\nPaulette và Reina.」"

# monologue
# JP: 無論、れいなはひかりにとてもなつかれている。\nれいなおねーちゃんは、いつでも優しくにこにこしてる。
2555 = "「Tất nhiên, Reina rất được Hikari quý mến.\nChị Reina lúc nào cũng hiền lành và cười\ntủm tỉm.」"

# 【ポーレット】
# display as 波萊特
# JP: 「だけどね？　今日は、パパとママのため、\nみんなが開いてくれた式典……あつまりだったから」
1589 = "「Nhưng mà nhé? Hôm nay là buổi lễ... buổi\ntụ họp\nmọi người tổ chức vì ba và mẹ mà.」"

# 【ひかり】
# display as 光
# JP: 「うん」
1683 = "「Vâng ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「だから、がんばればみんなが喜んでくれるから。\nママ、それもあってちゃんとがんばったんだよ？」
1837 = "「Thế nên, chỉ cần cố gắng thì mọi người sẽ\nrất vui.\nMẹ cũng vì vậy mà đã cố gắng hết sức đó\nnha?」"

# 【ひかり】
# display as 光
# JP: 「ままえらあい！\nひかり、いいこいいこしてあげるのー」
1739 = "「Mẹ giỏi quá!\nHikari sẽ xoa đầu khen mẹ nha.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、ありがと」
1690 = "「Fufu, cảm ơn con.」"

# monologue
# JP: ポーレットとて、変わらずれいなを大事にし、\nむしろ前より頼りにしている部分も多い、が……
2506 = "Paulette vẫn luôn trân trọng Reina như\ntrước,\nthậm chí còn dựa dẫm vào cô bé nhiều hơn,\nnhưng..."

# monologue
# JP: （僕でさえ、疎外感やさみしさを覚えるのだ。\nあまえっこのれいなには――なおのことだろう）
2672 = "（Đến cả tôi còn cảm thấy xa cách và cô\nđơn.\nVới một cô bé thích làm nũng như Reina\nthì——càng khỏi phải nói.）"

# monologue
# JP: その上、今日はおそらく初めて、\nひかりがれいなの手を逃げ出して――
2285 = "Hơn nữa, hôm nay có lẽ là lần đầu tiên,\nHikari chạy thoát khỏi tay Reina——"

# 【れいな】
# display as 玲奈
# JP: 「はぅぅ」
1670 = "「Hauu...」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1648 = "「啊！」" 

# monologue
# JP: 思ったときには手が動き、れいなの頭をなでている。
2586 = "Lúc nhận ra thì tay tôi đã tự động đưa ra,\nxoa đầu Reina."

# 【れいな】
# display as 玲奈
# JP: 「ぇぅ……あのっ――そうてつ、さん？」
1620 = "「Euu... dạ——Anh Soutetsu?」"

# 【双鉄】
# display as 雙鐵
# JP: 「れいなも、とてもいいこだったな。\n花束も祝辞も、うれしかった。ありがとう」
1932 = "「Reina cũng đã rất ngoan mà.\nBó hoa và lời chúc của em, anh rất vui.\nCảm ơn em.」"

# 【れいな】
# display as 玲奈
# JP: 「ふあっ！？　あのっ、れいな、べつにっ――\n！！？――ぴゃっ！！？」
1666 = "「Fua!? Dạ, Reina, đâu có——\n!!?——Pya!!?」"

# 【双鉄】
# display as 雙鐵
# JP: 「れいなっ！？」
1939 = "「Reina!?」"

# monologue
# JP: （どさっ）
2670 = "（Phịch）"

# 【れいな】
# display as 玲奈
# JP: 「うっ――あううう～、ごめんなさぁい。\nれいな、ころんじゃいましたぁ」
1668 = "「Ư——Auuu~, Reina xin lỗi ạ.\nReina bị vấp ngã mất rồi ạ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「れいなっ！？」
# 1939 = "「玲奈？！」" 

# 【ひかり】
# display as 光
# JP: 「れいなおねーちゃん、だいじょうぶぅ？」
1935 = "「Chị Reina, có sao không ạ?」"

# 【れいな】
# display as 玲奈
# JP: 「だいじょうぶ……うん！\nれいな、少しも、故障も破損もありませんよぉ」
1911 = "「Không sao đâu... ừm!\nReina không hề bị hỏng hóc hay tổn hại gì\nđâu nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なら良かったが――\nすまん、驚かせてしまったな」
2019 = "「Vậy thì tốt rồi——\nXin lỗi, anh làm em giật mình nhỉ.」"

# 【れいな】
# display as 玲奈
# JP: 「いいええ、れいな、ちょっとぼーっとしてて」
1910 = "「Dạ không đâu ạ, do Reina hơi lơ đãng chút\nthôi ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いや――僕の判断が悪かった」
1511 = "「Không——Là do phản xạ của anh quá chậm.」"

# monologue
# JP: 花束をとっさに投げ捨てていれば、\nれいなの転倒を阻止できた。
2256 = "Giá như lúc nãy tôi vứt ngay bó hoa đi,\nthì đã có thể đỡ được Reina khỏi ngã."

# monologue
# JP: というか、それ以前――\nもっと以前に、気づいておくべきことだった。
2253 = "Hay nói đúng hơn, trước đó——\nLẽ ra tôi phải nhận ra từ sớm hơn."

# monologue
# JP: （講習会で、\n他人ごとだと聞き流してしまっていたが……）
2676 = "（Trong buổi hội thảo,\ntôi đã nghe qua loa vì nghĩ đó là chuyện\nnhà người ta...）"

# monologue
# JP: 『下の子ができたときの、上の子へのケア』\nそれは、うちにも必要なこころがまえだったのだ。
2289 = "『Cách chăm sóc đứa lớn khi có thêm đứa\nnhỏ』\nĐó là kiến thức mà nhà chúng tôi cũng cần\nphải chuẩn bị tâm lý."

# monologue
# JP: れいながいいこすぎたから、\n僕らがれいなに甘えてしまって、注意すべきを見落とした。
2319 = "Vì Reina quá đỗi ngoan ngoãn,\nnên chúng tôi đã ỷ lại vào em ấy mà bỏ qua\nnhững điều cần lưu ý."

# 【双鉄】
# display as 雙鐵
# JP: 「……れいな。花束をもってくれるか？」
1207 = "「...Reina. Em cầm giúp anh bó hoa được\nkhông?」"

# 【れいな】
# display as 玲奈
# JP: 「え？　あ、はぁい。わかりましたぁ。\nれいな、花束もってますねぇ」
1627 = "「Dạ? A, vâng ạ. Reina hiểu rồi ạ.\nReina sẽ cầm hoa cho anh nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「なら。そら！」
1842 = "「Thế thì. Đỡ này!」"

# 【れいな】
# display as 玲奈
# JP: 「ひゃあああ！？」
1604 = "「Kyaaaa!?」"

# monologue
# JP: ああ、いかん。また驚かせてしまったか。\nどうにも今日は、体が気持ちに先走る。
2316 = "A, không ổn rồi. Lại làm em ấy giật mình\nnữa sao.\nHôm nay cơ thể tôi cứ luôn hành động trước\ncả suy nghĩ."

# 【双鉄】
# display as 雙鐵
# JP: 「すまん、れいな、またやってしまったな」
1841 = "「Xin lỗi, Reina, anh lại làm thế nữa rồi.」"

# 【ひかり】
# display as 光
# JP: 「おっきなこえー！\nれいなおねーちゃん、パパのだっこ、やぁなのー？」
1934 = "「To tiếng quá!\nChị Reina ghét ba bế ạ?」"

# 【れいな】
# display as 玲奈
# JP: 「やじゃないですよぉ！\nだっこ、らくちんでうれしいですぅ」
1938 = "「Reina không ghét đâu nha!\nĐược bế rất thoải mái, Reina vui lắm ạ.」"

# 【ひかり】
# display as 光
# JP: 「だよねー、だっこらくちーん」
1859 = "「Đúng không nè, được bế thoải mái lắm\nluôn.」"

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ」
1694 = "「Ehehe.」"

# monologue
# JP: ひかりとれいなが笑い合う。\nだっこされているものどおし、ほとんど同じ目線の高さで。
2268 = "Hikari và Reina nhìn nhau cười.\nCả hai đều đang được bế nên tầm mắt gần\nnhư ngang bằng nhau."

# monologue
# JP: と、いうか――\nこれは――
2582 = "Nói sao nhỉ——\nCảnh tượng này——"

# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「あのときとおんなじですね」\n「あのときとおんなじですねぇ」
1613 = "「Giống hệt lúc đó nhỉ.」\n「Giống hệt lúc đó nhỉ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1648 = "「啊！」" 

# monologue
# JP: ポーレットとれいな。\nふたりも、思い出してくれていたのか。
2558 = "Paulette và Reina.\nHai người họ cũng nhớ lại chuyện đó sao."

# monologue
# JP: 重なる声が、嬉しさが、記憶をさらに鮮やかにする。
2333 = "Giọng nói hòa làm một, niềm vui sướng\nkhiến ký ức càng thêm sống động."

# 【ひかり】
# display as 光
# JP: 「あのとき？　あのときっていつなのー？」
2017 = "「Lúc đó? Lúc đó là lúc nào thế ạ?」"

# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ。れいなが、いちばぁんさいしょに、\n炭鉱を見に行ったときのことですよぉ」
2016 = "「Là thế này nha. Đó là lúc Reina,\nlần đầu tiên đi xem mỏ than đó ạ.」"

# 【ひかり】
# display as 光
# JP: 「たんこう！？　たんこうって、まいんとれじゃあ！？」
1927 = "「Mỏ than!? Mỏ than là Mine Treasure sao!?」"

# 【れいな】
# display as 玲奈
# JP: 「そおですよぉ。そのときはまだ、\nマイントレジャーじゃなかったですけどぉ」
1871 = "「Đúng vậy đó ạ. Lúc đó thì,\nnó vẫn chưa được gọi là Mine Treasure đâu\nạ.」"

# 【ひかり】
# display as 光
# JP: 「ふみゅう？　まいんとれじゃあなのに、\nまいんとれじゃあじゃなかったの？？」
1640 = "「Fumyuu? Là Mine Treasure,\nnhưng lại không phải là Mine Treasure\nsao??」"

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。それはですねぇ」
1693 = "「Ufufu. Chuyện đó là vì nha...」"

# 【ひかり】
# display as 光
# JP: 「うんうん」
1684 = "「Vâng vâng.」"

# monologue
# JP: ――一歩ごと、一言ごとに、広がっていく。
1174 = "——Mỗi một bước đi, mỗi một lời nói, cảm\nxúc lại càng lan tỏa."

# monologue
# JP: 今という時間にまつわる幸福感も、\n記憶の中の、あの日の記憶にまつわる光景も。
2227 = "Cả cảm giác hạnh phúc gắn liền với thời\nđiểm hiện tại,\nlẫn khung cảnh thuộc về ký ức của ngày hôm\nđó."

# 【双鉄】
# display as 雙鐵
# JP: 「あの時の質問」
1943 = "「Câu hỏi lúc đó.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あの時の質問」
# 1943 = "「當時那個問題」" 

# monologue
# JP: また重なり合う。\nそれを偶然とは感じない。
2423 = "Lại trùng khớp với nhau.\nTôi không nghĩ đó là sự tình cờ."

# monologue
# JP: おんなじことを、同じタイミングで思い出す――\nそうした時間を、僕たちが、大事に重ねてきただけだ。
2411 = "Cùng nhớ về một chuyện, vào cùng một thời\nđiểm——\nĐó là minh chứng cho việc chúng tôi đã\nluôn trân trọng từng khoảnh khắc bên nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「あのときの質問の答えだが……\n今もやはり、はっきりとしたものにはならない」
1942 = "「Về câu trả lời cho câu hỏi lúc đó...\nĐến bây giờ, anh vẫn không thể đưa ra một\nđáp án rõ ràng.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1683 = "「嗯」" 

# monologue
# JP: だから、余計な言葉も必要無い\n僕が、『お父さんになりたいか』――
2451 = "Thế nên, chẳng cần thêm lời thừa thãi nào\nnữa.\nChuyện tôi có 『muốn làm một người cha hay\nkhông』——"

# monologue
# JP: 二人がともに思い出している問いかけへの、\n今の答えを返せばいい。
2460 = "Chỉ cần đưa ra câu trả lời hiện tại\ncho câu hỏi mà cả hai cùng đang nhớ đến là\nđược."

# 【双鉄】
# display as 雙鐵
# JP: 「実際、父親になったいまでも。\n怖いことはたくさんだし、わからないことも無数にある」
1558 = "「Thực tế thì, ngay cả bây giờ khi đã làm\ncha.\nAnh vẫn thấy có rất nhiều điều đáng sợ, và\nvô số điều anh chưa hiểu rõ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。毎日がとってもしあわせすぎて……\nだから、その分怖くなっちゃう」
1867 = "「Đúng vậy nhỉ. Mỗi ngày đều quá đỗi hạnh\nphúc...\nThế nên, nỗi sợ hãi cũng lớn dần theo.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1683 = "「嗯」" 

# monologue
# JP: 守りたいし、何をしたって守り抜く。その覚悟はある。
2432 = "Tôi muốn bảo vệ, và sẽ làm mọi thứ để bảo\nvệ gia đình này. Tôi đã có giác ngộ đó."

# monologue
# JP: だが、意思が、願いが、どれほど強くあろうとも――\nそれでも届かぬ手があると、僕らはともに、知っている。
2251 = "Nhưng, cho dù ý chí, mong muốn có mạnh mẽ\nđến đâu——\nChúng tôi đều biết rằng, vẫn có những thứ\nnằm ngoài tầm với."

# 【双鉄】
# display as 雙鐵
# JP: 「だからといって後悔もないし、時間を戻したくもない。\n問いに対して、ずれた答えになってしまうが――」
1582 = "「Dù vậy, anh không hề hối hận, cũng không\nmuốn quay ngược thời gian.\nTuy câu trả lời có hơi lạc đề so với câu\nhỏi——」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん」
# 1683 = "「嗯」" 

# monologue
# JP: 僕らの手の中、\nひかりとれいなは仲良くきゃいきゃい話し続ける。
2271 = "Trong vòng tay của chúng tôi,\nHikari và Reina vẫn vui vẻ ríu rít trò\nchuyện."

# monologue
# JP: グランビー鉱車がどうこうと、\nひどく懐かしい単語が聞こえる。
2443 = "Tôi loáng thoáng nghe thấy những từ ngữ\nhoài niệm,\nnhư \\x%lグランビー鉱車;#00ffc040;toa chở quặng Granby%l;#; thế này thế nọ."

# 【双鉄】
# display as 雙鐵
# JP: 「――父親になって、幸せだ。これ以上を望めぬくらいに。\nそれだけは、間違いなく答えられるよ」
1194 = "「——Trở thành một người cha, anh thấy rất\nhạnh phúc. Hạnh phúc đến mức không còn\nmong ước gì hơn.\nĐó là điều duy nhất anh có thể khẳng định\nchắc chắn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、です。双鉄くん」
1805 = "「Em cũng vậy. Anh Soutetsu.」"

# monologue
# JP: 甘えた声。\n僕へとぺったり、寄ってくる声。
2514 = "Giọng nói nũng nịu.\nCô ấy nhích lại gần, dựa sát vào tôi."

# monologue
# JP: ひかりを、れいなをそれぞれ抱っこしていなければ、\n僕らはきっと、手をつないでる。
2354 = "Nếu không phải mỗi người đang bế Hikari và\nReina,\nchắc chắn chúng tôi đã nắm tay nhau rồi."

# 【ポーレット】
# display as 波萊特
# JP: 「怖いことも、わからないことも難しいこともたくさんで、\nときどきわーって、声を出して投げちゃいたくなるけど」
2045 = "「Dù có rất nhiều điều đáng sợ, những điều\nkhông hiểu và những điều khó khăn,\nđôi khi khiến em chỉ muốn hét lên một\ntiếng 'Oa' rồi bỏ mặc tất cả.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1683 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それでも、とっても幸せです。\nおかあさんになれて――わたし、ほんとによかった」
1585 = "「Nhưng em vẫn thấy vô cùng hạnh phúc.\nTrở thành một người mẹ——em thực sự thấy\nrất tuyệt.」"

# 【ひかり】
# display as 光
# JP: 「ふみゅう？」
1669 = "「Fumyuu?」"

# monologue
# JP: 無意識にだろう。\nポーレットの優しい頬ずりに、ひかりが驚いた声を出す。
2642 = "Chắc là trong vô thức.\nPaulette dịu dàng cọ má, khiến Hikari ngạc\nnhiên kêu lên."

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん。\nわたしをおかあさんにしてくれて――ありがとう」
2048 = "「Anh Soutetsu.\nCảm ơn anh——vì đã cho em được làm mẹ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「僕の方こそだ、ポーレット。\n僕をおとうさんにしてくれて、ありがとう」
1820 = "「Anh mới là người phải cảm ơn, Paulette.\nCảm ơn em vì đã cho anh được làm cha.」"

# 【ひかり】
# display as 光
# JP: 「ふみゅう。ママもパパも、ちがうのー」
1637 = "「Fumyuu. Mẹ với ba nói sai rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ちがう？　あれ？　ママ、なにか間違った？」
1498 = "「Sai rồi? Ủa? Mẹ nói sai chỗ nào sao?」"

# 【ひかり】
# display as 光
# JP: 「うん。あのね、ママがママになったの、\nひかりのおかげって、ママ、いつもゆってるのー」
1675 = "「Vâng. Mẹ xem nè, mẹ vẫn luôn nói,\nnhờ có Hikari mà mẹ mới được làm mẹ mà.」"

# monologue
# JP: ひかりの発する、\nまっすぐな目を、まっすぐな言葉を――
2604 = "Ánh mắt thẳng thắn, lời nói ngây thơ\nphát ra từ Hikari——"

# 【ポーレット】
# display as 波萊特
# JP: 「あはっ！　本当ねっ」
1618 = "「Aha! Đúng thế thật.」"

# 【ひかり】
# display as 光
# JP: 「むきゅっ！」
1638 = "「Mukyu!」"

# monologue
# JP: ――はじける笑顔で受け止めて、\nポーレットはひかりをぎゅっと抱きしめる。
2519 = "——Paulette nở nụ cười rạng rỡ đón nhận\nđiều đó,\nrồi ôm chặt lấy Hikari."

# 【ポーレット】
# display as 波萊特
# JP: 「ひかりのおかげで、ママはママになれた！」
2042 = "「Nhờ có Hikari, mẹ mới được làm mẹ!」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。ひかりのおかげで、パパはパパになれた」
1863 = "「Đúng thế. Nhờ có Hikari, ba mới được làm\nba.」"

# 【ひかり】
# display as 光
# JP: 「うふふふう！」
1634 = "「Ufufufuu!」"

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ。ひかりちゃん、すごいですねぇ！」
1696 = "「Ehehe. Bé Hikari, giỏi quá nha!」"

# 【ひかり】
# display as 光
# JP: 「うゅう～っ」
1635 = "「Uyuu~」"

# monologue
# JP: 褒められて、嬉しくて。\nひかりは隠れるようにして、ポーレットの顔に顔を埋める。
2278 = "Được khen nên vui sướng.\nHikari vùi mặt vào mặt Paulette như để\ngiấu đi sự ngượng ngùng."

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうかだ。れいなもすごいぞ」
1507 = "「Nói sao nhỉ. Reina cũng giỏi lắm đó.」"

# 【れいな】
# display as 玲奈
# JP: 「ほえっ！？　れいな、なぁんにもしてないですよぉ」
1630 = "「Hoe!? Reina, có làm gì đâu ạ.」"

# 【双鉄】
# display as 雙鐵
# JP: 「いいや。してくれたさ。\n今思えば、とても大きな――大きな仕事を」
1508 = "「Không đâu. Em đã làm rồi đấy.\nGiờ nghĩ lại, đó là một công việc rất\nlớn——rất lớn.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あー、うん」
1657 = "「A, ừm.」"

# 【れいな】
# display as 玲奈
# JP: 「えええ？」
1625 = "「Êee?」"

# monologue
# JP: れいなに自覚は無いようだが、\nポーレットとは通じあえてる。
2540 = "Có vẻ Reina không tự nhận ra,\nnhưng Paulette thì hiểu ý tôi."

# monologue
# JP: れいなの零した、とても素直な一言が、\n僕らの今へとレールをつなぐ、大きなポイントだったのだ。
2382 = "Một lời nói rất đỗi ngây ngô thốt ra từ\nReina,\nchính là bước ngoặt lớn nối liền đường ray\nđưa chúng tôi đến hiện tại."

# 【双鉄】
# display as 雙鐵
# JP: 「あの時、れいなの、いったとおりになった。\n僕がお父さんで」
1940 = "「Lúc đó, mọi chuyện đã diễn ra đúng như\nReina nói.\nAnh trở thành một người cha.」"

# 【ポーレット】
# display as 波萊特
# JP: 「わたしがお母さんで」
1819 = "「Còn em trở thành một người mẹ.」"

# 【れいな】
# display as 玲奈
# JP: 「ああっ！」
# 1648 = "「啊！」" 

# monologue
# JP: にこにこにこーっと、れいなが崩れる。
2543 = "Reina cười tươi rạng rỡ, khuôn mặt dãn ra."

# monologue
# JP: 笑顔でとろけてしまっている目で、\n僕を、ポーレットをじゅんじゅん見つめる。
2346 = "Với đôi mắt long lanh hòa tan trong nụ\ncười,\nem ấy nhìn tôi, rồi nhìn sang Paulette."

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。そうですねぇ。\nれいな、未来をあてちゃいましたねぇ」
1688 = "「Ufufu. Đúng vậy nhỉ.\nReina, đã đoán trúng tương lai rồi nha.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1874 = "「是啊」" 

# monologue
# JP: その上、ひかりを、さずかった。\n僕らは、ひとつの家族になれた。
2591 = "Hơn thế nữa, chúng tôi còn được ban cho\nHikari.\nChúng tôi đã trở thành một gia đình."

# 【双鉄】
# display as 雙鐵
# JP: 「っと――」
1621 = "「Ấy——」"

# monologue
# JP: そうして、知った。\n家族になるとは、家族を増やすことでもあると。
2406 = "Và rồi, tôi nhận ra.\nTrở thành một gia đình, cũng có nghĩa là\nlàm cho gia đình ngày một đông vui hơn."

# 【ひかり】
# display as 光
# JP: 「ついたー！　きょうは、おえかきのひ！」
1562 = "「Đến nơi rồi! Hôm nay là ngày vẽ tranh!」"

# monologue
# JP: ひかりが大きく体を動かす。
2273 = "Hikari ngọ nguậy mạnh trong vòng tay."

# monologue
# JP: ポーレットがひかりを地面に下ろすと、\n駆けだしたそうなそぶりを見せる。
2505 = "Paulette vừa đặt Hikari xuống đất,\ncon bé đã tỏ vẻ muốn chạy tót đi ngay."

# 【双鉄】
# display as 雙鐵
# JP: 「だな。日々姫にたっぷり教わってこい」
1861 = "「Đúng rồi. Vào học vẽ với cô Hibiki cho\nthật ngoan nhé.」"

# 【ひかり】
# display as 光
# JP: 「うん！」
1685 = "「Vâng!」"

# 【ポーレット】
# display as 波萊特
# JP: 「ママ、お仕事おわったらすぐかえってくるから。\nいいこにしててね？」
1738 = "「Mẹ xong việc sẽ về đón con ngay.\nCon ở nhà ngoan nhé?」"

# 【ひかり】
# display as 光
# JP: 「うん。ひかり、いっつもいいこなのー」
1673 = "「Vâng. Hikari lúc nào cũng ngoan mà.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そうね」
1515 = "「Đúng vậy nhỉ.」"

# monologue
# JP: ひかりはポーレットの手を引いて、\nガラス戸を開け中にはいって――
2281 = "Hikari kéo tay Paulette,\nmở cửa kính bước vào trong——"

# 【ひかり】
# display as 光
# JP: 「ひびきおねーちゃーん」
1852 = "「Chị Hibiki ơi.」"

# monologue
# JP: ――と思ったらすぐにガラス戸を閉めてしまう。
1176 = "——Nhưng con bé lại đóng sập cửa kính lại\nngay lập tức."

# monologue
# JP: 階段をとととと駆け上がる音。\n日々姫と笑いあう声も聞こえる。
2456 = "Tiếng bước chân lạch cạch chạy lên cầu\nthang.\nTôi còn nghe thấy tiếng cười đùa của con\nbé với Hibiki."

# 【ポーレット】
# display as 波萊特
# JP: 「もう少し、おわかれにグズってくれてもいいのに～」
1717 = "「Ít ra lúc chia tay con bé cũng nên khóc\nlóc một chút chứ~」"

# 【双鉄】
# display as 雙鐵
# JP: 「グズらない場所の方が少ない。\nどこでもグズられては、心が保たなかろう」
1780 = "「Ít có nơi nào mà con bé không nhõng nhẽo\nlắm.\nĐi đâu cũng bị nhõng nhẽo thì sao chịu nổi\nchứ.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それはそうなんですけど～」
2046 = "「Anh nói thì đúng là vậy nhưng mà~」"

# monologue
# JP: ――日々姫、真闇姉、ハチロク、凪、ふかみ、稀咲。\nひかりが喜んで預かられるのは、このあたりだけだ。
2609 = "——Hibiki, chị Mayami, Hachiroku, Nagi,\nFukami, Kisaki.\nHikari chỉ vui vẻ chịu ở lại khi được\nnhững người này trông nom."

# monologue
# JP: であるというのに、ポーレットはいちいち焼き餅を焼く。\nそこは理屈では割り切れぬ、母親の業というものだろう。
2302 = "Dù biết vậy, Paulette vẫn cứ hay ghen tị\ntừng chút một.\nĐó có lẽ là bản năng của người mẹ, không\nthể giải thích bằng lý lẽ được."

# 【双鉄】
# display as 雙鐵
# JP: 「さて、いくか」
1725 = "「Thôi, đi nào.」"

# 【れいな】
# display as 玲奈
# JP: 「あ、れいな、もう自分であるきますよぉ」
1658 = "「A, Reina, có thể tự đi được rồi ạ.」"

# monologue
# JP: ぽわんとした声。\nポーレットもうふふと笑いをもらす。
2547 = "Giọng nói mềm mại, êm ái.\nPaulette cũng khẽ bật cười ufufu."

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1722 = "「Vậy sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「それなら、行きましょ？」
2025 = "「Thế thì, chúng ta đi thôi?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1683 = "「嗯」" 

# monologue
# JP: 三人に戻り、歩き出す。\n乗務をこなして、ひかりを迎えにいくために。
2422 = "Chúng tôi trở lại làm ba người và bước đi.\nHoàn thành nhiệm vụ để còn về đón Hikari."

# 【ポーレット】
# display as 波萊特
# JP: 「はふぅ……」
1609 = "「Hafuu...」"

# 【双鉄】
# display as 雙鐵
# JP: 「お疲れだ。ポーレット」
1922 = "「Vất vả cho em rồi. Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんこそ、お疲れ様です」
1534 = "「Anh Soutetsu mới vất vả đó ạ.」"

# monologue
# JP: ベッドの中、ポーレットが肌を寄せてくる。
2624 = "Trên giường, Paulette áp sát cơ thể vào\ntôi."

# monologue
# JP: どこか甘いポーレットの匂いと、\nごくごく素朴な、せっけんの匂い。
2350 = "Mùi hương ngọt ngào quen thuộc của\nPaulette,\nhòa quyện cùng mùi xà phòng giản dị, mộc\nmạc."

# 【双鉄】
# display as 雙鐵
# JP: 「ひかりはどうだった？」
1554 = "「Hikari sao rồi?」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ、今日はれいなといっしょに入りたがって」
1652 = "「A, hôm nay con bé đòi tắm chung với\nReina.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。いや、うむ？」
1877 = "「Vậy sao. Khoan, hửm?」"

# monologue
# JP: 普通の石鹸は、ひかりにはまだ刺激が強すぎるかも――\nということでの、オール国産素材のベビーソープ。
2413 = "Sợ xà phòng bình thường có thể quá mạnh\nvới Hikari——\nnên chúng tôi dùng sữa tắm trẻ em 100%\nnguyên liệu quốc nội."

# monologue
# JP: ひかりがいっしょでないときでも、\nポーレットがそれを使ったというのが、少し意外だ。
2477 = "Ngay cả khi không tắm cùng Hikari,\nPaulette vẫn dùng nó, điều này làm tôi hơi\nngạc nhiên."

# 【双鉄】
# display as 雙鐵
# JP: 「もったいないといってなかったか？」
1531 = "「Em từng bảo dùng thế lãng phí lắm mà?」"

# 【ポーレット】
# display as 波萊特
# JP: 「え？　なにがです」
1664 = "「Hả? Cái gì cơ ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「ベビーソープだ。確か、一本三千円くらいすると」
1741 = "「Sữa tắm trẻ em ấy. Anh nhớ không lầm thì\nmột chai khoảng 3.000 yên.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ああああ！　うっかりしてた！　もったいない！！」
1649 = "「Aaaa! Em lỡ quên mất! Phí quá đi!!」"

# monologue
# JP: 聞くやいなやで、ポーレットは頭を抱えてしまう。\nうっかりしたのは気の毒だったが――
2523 = "Vừa nghe xong, Paulette đã ôm đầu tiếc\nnuối.\nTuy lỡ quên thì cũng tội nghiệp thật,\nnhưng——"

# 【双鉄】
# display as 雙鐵
# JP: 「大きな声は。\nひかりとれいなを起こしてしまうぞ」
1503 = "「Đừng lớn tiếng thế.\nSẽ đánh thức Hikari và Reina mất.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ」
1646 = "「Hau.」"

# monologue
# JP: ポーレットがあわてて口を押さえる。
2336 = "Paulette vội vàng lấy tay bịt miệng."

# monologue
# JP: ……隣の部屋に、特に変わった気配はない。\nひかりもれいなも、ぐっすり眠っているようだ。
1189 = "……Phòng bên cạnh không có động tĩnh gì đặc\nbiệt.\nCó vẻ Hikari và Reina đều đang ngủ say."

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そうか。今日はれいなと寝たがるだけでなく、\nお風呂もれいなだったのか」
2006 = "「Nhưng mà, vậy à. Hôm nay con bé không chỉ\nmuốn ngủ cùng Reina,\nmà còn đòi tắm chung với Reina nữa sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「うん。きっと――\nひかりなりに、バランスをとってるんだと思います」
1677 = "「Vâng. Chắc chắn là——\nHikari đang cố gắng tạo sự cân bằng theo\ncách của con bé.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1874 = "「是啊」" 

# monologue
# JP: れいなの手から抜け出して、\n高崎さんの陰に隠れてしまった。
2247 = "Hikari giật tay khỏi Reina,\nvà nấp sau lưng bà Takasaki."

# monologue
# JP: あの場面、\nはたから見ていた僕にも衝撃的ではあったが……
2384 = "Cảnh tượng đó,\ndù chỉ đứng nhìn từ bên ngoài nhưng cũng\nkhiến tôi khá sốc..."

# 【双鉄】
# display as 雙鐵
# JP: 「――気にするか。まだ四歳だというのに」
1715 = "「——Con bé để tâm đến chuyện đó sao. Dù mới\nbốn tuổi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「朝は、双鉄くんいってましたよ？\n『もうよっつ』って」
1579 = "「Sáng nay anh Soutetsu mới nói mà?\n『Đã bốn tuổi rồi』.」"

# 【双鉄】
# display as 雙鐵
# JP: 「確かにいったが――\nしかし、そこまで細かな、心の機微のような問題を」
1827 = "「Đúng là anh có nói——\nNhưng, những vấn đề tinh tế, phức tạp\ntrong tâm hồn như vậy...」"

# 【ポーレット】
# display as 波萊特
# JP: 「感じますよ、ひかりは。\nあのこ、小さなころのわたしにそっくりだから」
1720 = "「Hikari cảm nhận được đó.\nBởi vì con bé giống hệt em hồi nhỏ mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「小さなころの？」
1765 = "「Giống em hồi nhỏ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「です。人見知りで、内弁慶で。だけど好奇心旺盛で。\n興味の範囲が狭くって、そのことだけにはおしゃべりで」
1870 = "「Vâng. Sợ người lạ, chỉ bắt nạt người nhà.\nNhưng lại rất tò mò.\nPhạm vi sở thích thì hẹp, nhưng chỉ cần\nnói về chủ đề đó là nói không ngừng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1698 = "「À——」"

# 【ポーレット】
# display as 波萊特
# JP: 「夢中になるとまわりのことが見えなくなって、\nそのくせ、人の顔色にはすごく敏感で」
2033 = "「Một khi đã say mê là không còn để ý xung\nquanh,\nnhưng lại cực kỳ nhạy cảm với sắc mặt của\nngười khác.」"

# 【双鉄】
# display as 雙鐵
# JP: 「まぁ待て待て待て、ポーレット」
1723 = "「Thôi, từ từ đã, Paulette.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ」
# 1642 = "「啊」" 

# monologue
# JP: ポーレットにとっては自分を振り返っているだけだろうが、\nひかりと重なるところが確かに多すぎる。
2656 = "Với Paulette thì có lẽ chỉ là đang nhìn\nlại bản thân mình,\nnhưng quả thực có quá nhiều điểm tương\nđồng với Hikari."

# monologue
# JP: 実の母が、実の娘を批評しているようにも聞こえ、\n実の父としては、いささか聞いていて苦しい。
2323 = "Nghe như một người mẹ ruột đang phê bình\nchính con gái ruột của mình vậy,\nlà một người cha ruột, tôi nghe mà thấy\nhơi xót xa."

# 【ポーレット】
# display as 波萊特
# JP: 「ごめんなさい。わたし、夢中になっちゃって」
1761 = "「Em xin lỗi. Em mải nói quá.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それだけ、真剣に考えているということだ。\nひかりも、ポーレットも、目の前にことに対して」
2007 = "「Điều đó cho thấy em đang suy nghĩ rất\nnghiêm túc.\nCả Hikari và Paulette đều rất tập trung\nvào những việc trước mắt.」"

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1874 = "「是啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「その長所を活かし、ポーレットはバランスを取っている。\nポーレットがさっきいったことを言い換えれば……」
1587 = "「Paulette đã phát huy điểm mạnh đó để tạo\nsự cân bằng.\nNếu nói lại những gì Paulette vừa nói theo\nmột cách khác...」"

# monologue
# JP: 考えるほどのこともない。\nそれはそのまま、今のポーレットの長所だから。
2436 = "Chẳng cần phải nghĩ ngợi nhiều.\nĐó chính là những ưu điểm của Paulette\nhiện tại."

# 【双鉄】
# display as 雙鐵
# JP: 「高い集中力を持ちつつ、周囲への気配り目配りもできる。\n専門分野に優れた説明能力を持ち、家族愛に満ちている」
1547 = "「Vừa có khả năng tập trung cao độ, vừa\nbiết quan sát và chu đáo với xung quanh.\nCó khả năng giải thích xuất sắc trong lĩnh\nvực chuyên môn, và tràn đầy tình yêu\nthương gia đình.」"

# monologue
# JP: いえば途端に、\nポーレットが身もだえしてみせる。
2447 = "Tôi vừa dứt lời,\nPaulette liền quằn quại ngượng ngùng."

# 【ポーレット】
# display as 波萊特
# JP: 「あうぅ……双鉄くん、甘やかし上手だぁ」
1647 = "「Auu... Anh Soutetsu giỏi nịnh quá đi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そこも似てるな。褒められるとすぐ照れ照れになる」
1953 = "「Điểm này cũng giống nhau đấy. Được khen\nlà lại ngượng ngùng ngay.」"

# 【ポーレット】
# display as 波萊特
# JP: 「そりゃそうですよ。親子ですもん」
2003 = "「Đương nhiên rồi ạ. Mẹ con mà lị.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ひかりと僕も似ているわけか？」
2020 = "「Vậy, Hikari và anh cũng giống nhau sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「似てますねぇ、すっごく」
1581 = "「Giống lắm luôn á.」"

# monologue
# JP: くふふと、ポーレットの声に含み笑いが混じる。
2511 = "Paulette khẽ cười khúc khích."

# 【ポーレット】
# display as 波萊特
# JP: 「天然の女殺しなところとか」
1906 = "「Như cái tính sát gái bẩm sinh chẳng hạn.」"

# 【双鉄】
# display as 雙鐵
# JP: 「天然の女殺し？」
1499 = "「Sát gái bẩm sinh?」"

# 【ポーレット】
# display as 波萊特
# JP: 「です。義姉さん日々姫ちゃん、凪ちゃんふかみちゃん。ハチロクちゃんに稀咲さんまで、ひかりにすっごく甘い」
1769 = "「Đúng vậy. Chị Mayami, Hibiki, Nagi,\nFukami. Đến cả Hachiroku và Kisaki cũng\nđều cưng chiều Hikari hết mực.」"

# 【双鉄】
# display as 雙鐵
# JP: 「それはそうだな。みな、ひかりに良くしてくれている。\nしかし……それのどこが僕に似ているのだ？」
2009 = "「Đúng là vậy thật. Mọi người đều đối xử\nrất tốt với Hikari.\nNhưng... điểm đó giống anh ở chỗ nào chứ?」"

# 【ポーレット】
# display as 波萊特
# JP: 「だから、そこですよ！　無自覚で、無意識で。\nあー、っていうか、そこがわたしとの一番の違いかも」
1537 = "「Đấy, chính là chỗ đó đó! Vô tình, không\ntự nhận thức được.\nA, hay nói đúng hơn, đó có lẽ là điểm khác\nbiệt lớn nhất với em.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そこ、とは？」
1889 = "「Chỗ đó, là sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「他の人がくれる好意についてです。\nその点は双鉄くん――ものすごく無頓着でしたよね？」
1770 = "「Về thiện ý mà người khác dành cho mình\nấy.\nĐiểm này thì anh Soutetsu——cực kỳ thờ ơ\nđúng không?」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな。うむ、今は違う――と自分では思っているが、\n昔は確かに、人からの好意に、価値を覚えていなかった」
1858 = "「Đúng vậy. Ừm, bây giờ thì khác rồi——anh\ntự thấy thế,\nnhưng ngày xưa quả thật anh không biết\ntrân trọng thiện ý của người khác.」"

# monologue
# JP: より厳密には、好意にも、悪意にも。\n人から自分がどう思われようと関係なかった。
2317 = "Nói chính xác hơn là, cả thiện ý lẫn ác ý.\nNgười khác nghĩ gì về mình, tôi đều không\nquan tâm."

# monologue
# JP: 要求されたことを、果たす。\nそれだけが他者との関わり、すべてと思い込んでいたから。
2402 = "Hoàn thành những gì được yêu cầu.\nTôi từng đinh ninh đó là tất cả sự kết nối\nvới người khác."

# 【ポーレット】
# display as 波萊特
# JP: 「わたしは正反対だったんです。自己評価が低かったから、\n自分を大事にしてくれる人に、ものすごく気をつかって」
1527 = "「Em thì hoàn toàn ngược lại. Vì luôn tự ti\nvề bản thân,\nnên em vô cùng để ý đến những người trân\ntrọng mình.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あー」
# 1698 = "「噢」" 

# monologue
# JP: なるほど、わかったような気がする。\n僕は絶望、ひかりは周囲の環境と、その根本はまるで違う。
2606 = "Ra là vậy, tôi nghĩ mình đã hiểu.\nTôi là do tuyệt vọng, còn Hikari là do môi\ntrường xung quanh, căn nguyên hoàn toàn\nkhác nhau."

# monologue
# JP: が――表出している部分は確かに、非常に似ている。
2252 = "Nhưng——biểu hiện ra bên ngoài thì quả thực\nrất giống nhau."

# 【双鉄】
# display as 雙鐵
# JP: 「ひかりは愛情に無頓着……あって当たり前すぎるのか。\nひかりにとって、愛情は空気と同じようなものか」
1553 = "「Hikari thờ ơ với tình yêu thương... vì\ncoi đó là điều hiển nhiên sao.\nĐối với Hikari, tình yêu thương cũng giống\nnhư không khí vậy.」"

# monologue
# JP: 普段からそれに包まれまくっているのなら、\n空気のありがたみも愛情のありがたみも理解できない。
2339 = "Nếu lúc nào cũng được bao bọc trong đó,\nthì sẽ không thể hiểu được sự quý giá của\nkhông khí cũng như tình yêu thương."

# monologue
# JP: 無くなり初めてその価値がわかるものだが――\nそんな事態に、もちろんひかりを陥らせたくも無い。
2424 = "Chỉ khi mất đi mới hiểu được giá trị của\nnó——\nNhưng tất nhiên, tôi không muốn Hikari\nphải rơi vào hoàn cảnh đó."

# 【ポーレット】
# display as 波萊特
# JP: 「だと思います。小さなころのわたしだったら――\nどんなにいやでも怖くても、我慢して花束届けてました」
1807 = "「Em cũng nghĩ vậy. Nếu là em hồi nhỏ——\ndù có ghét hay sợ đến mấy, em cũng sẽ cố\nnhịn để tặng bó hoa.」"

# 【双鉄】
# display as 雙鐵
# JP: 「うむ……」
1632 = "「Ừm...」"

# 【ポーレット】
# display as 波萊特
# JP: 「いやがって逃げたりして、愛情を失うのが怖いから。\nだけどひかりは愛情をなくすこと、まだ怖くないんです」
1701 = "「Vì em sợ nếu tỏ ra ghét bỏ hay bỏ chạy,\nem sẽ mất đi tình yêu thương.\nNhưng Hikari thì vẫn chưa biết sợ việc mất\nđi tình yêu thương.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうかもしれん――が。\nそれならば、何故れいなに気をつかったのだろう？」
1597 = "「Có thể là vậy——Nhưng.\nNếu thế, tại sao con bé lại để ý đến\nReina?」"

# 【ポーレット】
# display as 波萊特
# JP: 「それは、れいなを元気づけるためですよ。\nれいながしょんぼりしちゃったから、そこを心配して」
2032 = "「Đó là để an ủi Reina đấy.\nThấy Reina ỉu xìu, con bé đã rất lo lắng.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あああ」
1699 = "「À...」"

# monologue
# JP: 即答だ。納得できる。してしまう。\n同時に、ポーレットを尊敬する。
2351 = "Cô ấy trả lời ngay lập tức. Rất thuyết\nphục. Thuyết phục hoàn toàn.\nĐồng thời, tôi cũng cảm thấy nể phục\nPaulette."

# monologue
# JP: 母はすごいと、ひたすら思う。\nそこまで僕は、ひかりのこころを読み取れない。
2445 = "Tôi chỉ biết thầm nghĩ, làm mẹ thật tuyệt\nvời.\nTôi không thể nào thấu hiểu tâm tư của\nHikari đến mức đó."

# 【ポーレット】
# display as 波萊特
# JP: 「それって、ひかり自身の保身のために――\n”愛情を失わないため”に、してることじゃないんです」
1817 = "「Hành động đó không phải vì Hikari muốn\nbảo vệ bản thân——\nkhông phải là 'để không đánh mất tình yêu\nthương' đâu.」"

# 【双鉄】
# display as 雙鐵
# JP: 「決して悪いことではないだろう。\nむしろ、とても良いことのように思うが――」
1998 = "「Đó chắc chắn không phải là chuyện xấu.\nNgược lại, anh thấy đó là một điều rất\ntốt——」"

# 【ポーレット】
# display as 波萊特
# JP: 「ひかりが、双鉄くんと同じくらいいい意味で鈍感なら、\n一生それで、いけちゃうのかもしれません」
1545 = "「Nếu Hikari cũng vô tư theo hướng tích cực\nnhư anh Soutetsu,\nthì có lẽ con bé sẽ sống vô lo vô nghĩ như\nvậy suốt đời.」"

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ」
# 1633 = "「唔」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、あのこわたしと似ているところもあるから……\nもしもバランスがとれなくなったら――」
1530 = "「Nhưng con bé cũng có những nét giống\nem...\nNhỡ đâu con bé mất đi sự cân bằng thì\nsao——」"

# monologue
# JP: あるものが当然だと思い込んでいる愛情が、\nどこかの時点で、失われてしまう。
2583 = "Tình yêu thương mà con bé luôn coi là hiển\nnhiên,\nđến một lúc nào đó, có thể sẽ mất đi."

# monologue
# JP: 僕ならば――少なくともポーレットと出会う前の僕なら、\nおそらく受け入れ。あるいは諦めるものであろうが――
2258 = "Nếu là tôi——ít nhất là tôi trước khi gặp\nPaulette,\ncó lẽ sẽ chấp nhận, hoặc là bỏ cuộc——"

# 【双鉄】
# display as 雙鐵
# JP: 「確かに……怖いな」
1946 = "「Đúng là... đáng sợ thật.」"

# monologue
# JP: 今のひかりが――そんな想像はしたくもないが――\nもしも僕らを、あるいはれいなを失ったのなら。
2655 = "Hikari bây giờ——dù tôi không hề muốn tưởng\ntượng——\nNếu như con bé mất đi chúng tôi, hay là\nReina."

# monologue
# JP: 無条件で自分を愛してくれると信じている人たちに、\n万一うとまれ……邪険に扱われたのならば。
2621 = "Nếu những người mà con bé tin tưởng sẽ vô\nđiều kiện yêu thương mình,\nlại xa lánh... hay đối xử tệ bạc với con\nbé."

# 【双鉄】
# display as 雙鐵
# JP: 「幼いこころに、どれほど深い傷がつくのか――\n僕には、想像することもできん」
1830 = "「Tâm hồn non nớt ấy sẽ bị tổn thương sâu\nsắc đến nhường nào——\nAnh không dám tưởng tượng nữa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「だから、なんとかしておきたいとは思うんです。\n今のあのこは、あんまりに無邪気で無防備だから」
1839 = "「Vì vậy, em muốn làm gì đó.\nHikari bây giờ quá ngây thơ và không biết\ntự bảo vệ mình.」"

# monologue
# JP: 確かにだ。産まれたときから今までずっと、\n十重二十重の愛情と目配りに保護されて――
2464 = "Đúng vậy. Từ lúc sinh ra cho đến nay,\ncon bé luôn được bảo bọc trong tình yêu\nthương và sự quan tâm vô bờ bến——"

# monologue
# JP: ひかりはおそらく、身を守ることを。――いや、\n本当の意味での“他者との関わり”をまるで知らない。
2549 = "Có lẽ Hikari hoàn toàn không biết cách tự\nbảo vệ mình.——Không,\ncon bé hoàn toàn không hiểu ý nghĩa thực\nsự của việc 'kết nối với người khác'."

# 【ポーレット】
# display as 波萊特
# JP: 「少しずつでも、そういうこと、教えておきたい。\n人は、いつまでもこどものままじゃいられないから」
1814 = "「Em muốn dạy con bé những điều đó, dù chỉ\ntừng chút một.\nBởi vì con người ta không thể mãi mãi là\ntrẻ con được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「だな」
# 1874 = "「是啊」" 

# monologue
# JP: 僕はおそらく、異常なまでに長い時間を、\nこどものままに過ごした者だ。
2427 = "Tôi có lẽ là một kẻ đã dành một khoảng\nthời gian dài bất thường\nđể sống như một đứa trẻ."

# monologue
# JP: それが健全とは思えないし……ひかりには、\nもっと普通に――平凡に幸せになってもらいたい。　
2403 = "Tôi không nghĩ điều đó là lành mạnh... Tôi\nmuốn Hikari\nđược hạnh phúc một cách bình thường——và\ngiản dị hơn."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、ポーレットはどうだったのだ？」
2035 = "「Vậy, còn Paulette thì sao?」"

# 【ポーレット】
# display as 波萊特
# JP: 「どうって、何がです？」
1519 = "「Sao là sao ạ?」"

# 【双鉄】
# display as 雙鐵
# JP: 「今のポーレットは大人だし、僕と初めて会ったときにも、\nポーレットは、充分すぎるほど大人だった気がするから」
1941 = "「Paulette bây giờ đã là người lớn, và ngay\ncả lần đầu tiên chúng ta gặp nhau,\nanh cảm thấy Paulette cũng đã trưởng thành\nquá mức cần thiết rồi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ああ」
1667 = "「À.」"

# monologue
# JP: それだけで、ポーレットはわかってくれる。\n黙って、なにかを考え込んで――
2450 = "Chỉ cần nói vậy, Paulette đã hiểu.\nCô ấy im lặng, trầm ngâm suy nghĩ điều gì\nđó——"

# 【ポーレット】
# display as 波萊特
# JP: 「やっぱり、旅だと思います」
1832 = "「Em nghĩ là, nhờ những chuyến đi.」"

# 【双鉄】
# display as 雙鐵
# JP: 「旅」
1851 = "「Những chuyến đi.」"

# 【ポーレット】
# display as 波萊特
# JP: 「パパとの旅。はじめての、寝台列車の、冬の旅。\nあれでわたしは――わたしになったんだと思います」
1881 = "「Chuyến đi cùng ba. Chuyến đi mùa đông đầu\ntiên trên tàu giường nằm.\nEm nghĩ chính chuyến đi đó đã tạo nên——em\ncủa ngày hôm nay.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ほう？」
1631 = "「Hô?」"

# 【ポーレット】
# display as 波萊特
# JP: 「うまくいえないんですけど……自分の中に、\n『これだけは絶対壊れない』もの、見つけた感じで」
1831 = "「Em không biết diễn tả sao nữa... Cảm giác\nnhư em đã tìm thấy,\nmột thứ 『tuyệt đối không thể bị phá vỡ』\nbên trong mình.」"

# 【双鉄】
# display as 雙鐵
# JP: 「自分の核か」
1883 = "「Cốt lõi của bản thân sao.」"

# 【ポーレット】
# display as 波萊特
# JP: 「核、なんですかね？　わからないですけど。\nでも、あの旅で、わたしは変わった。少し、変われた」
1594 = "「Cốt lõi ạ? Em cũng không rõ nữa.\nNhưng, qua chuyến đi đó, em đã thay đổi.\nĐã thay đổi được một chút.」"

# monologue
# JP: 自分の言葉をかみしめるように。\nしばし、ポーレットは唇を結ぶ。
2521 = "Như để nhấm nháp từng lời nói của chính\nmình.\nPaulette mím môi lại một lúc."

# 【ポーレット】
# display as 波萊特
# JP: 「誰かにあわせて、無理に自分を変えなくていい――\n変えようとしても変えられない自分が居るって気づけた」
1825 = "「Không cần phải ép buộc bản thân thay đổi\nvì ai đó——\nEm nhận ra rằng, có một bản ngã dù muốn\ncũng không thể thay đổi được.」"

# 【双鉄】
# display as 雙鐵
# JP: 「そうだったのだな」
1885 = "「Ra là vậy.」"

# monologue
# JP: ポーレットの過去に、僕が寄り添うことはできない。\n思い出す隣にいるのが、精一杯だ。
2437 = "Tôi không thể nào san sẻ quá khứ của\nPaulette.\nChỉ có thể ở bên cạnh khi cô ấy nhớ về nó,\nđó là tất cả những gì tôi có thể làm."

# monologue
# JP: が。ひかりの未来については、違う。\n僕らはそれを、よりよく導いてやらねばならない。
2300 = "Nhưng. Tương lai của Hikari thì khác.\nChúng tôi phải dẫn dắt con bé đi đúng\nhướng."

# 【双鉄】
# display as 雙鐵
# JP: 「ならば、旅をしてみるか」
2024 = "「Vậy thì, thử đi du lịch xem sao nhé.」"

# 【ポーレット】
# display as 波萊特
# JP: 「あ！」
# 1648 = "「啊！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。今の僕らなら、これからならば出来るのだ。\n今までの仕事の大半が、まさに今日終わったのだから」
1678 = "「Ừ. Chúng ta của hiện tại, từ bây giờ đã\ncó thể làm được rồi.\nBởi vì phần lớn công việc từ trước đến\nnay, vừa mới kết thúc vào ngày hôm nay\nmà.」"

# monologue
# JP: こっくりと、ポーレットが深く頷く。
2513 = "Paulette gật đầu thật sâu."

# 【ポーレット】
# display as 波萊特
# JP: 「です、よね。できちゃうんだ、旅。\n今のわたしたちなら――御一夜鉄道の体制なら」
1865 = "「Đúng, nhỉ. Chúng ta có thể đi du lịch\nrồi.\nChúng ta của hiện tại——với hệ thống của\nĐường sắt Ohito hiện tại.」"

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1760 = "「Đúng vậy.」"

# monologue
# JP: 今は日々姫は正機関士だし、\n凪にいたっては正機関士兼正運転士だ。
2548 = "Bây giờ Hibiki đã là Lái tàu chính thức,\ncòn Nagi thì vừa là Lái tàu vừa là Nhân\nviên cơ vụ chính thức."

# monologue
# JP: ニイロクはキハ07sを制御できるし、赤井宮司も居る。\n機関助士たちだって増員されてる。
2236 = "Niiroku có thể điều khiển KiHa 07S, lại có\ncả thầy tế Akai.\nĐội ngũ phụ lái cũng đã được tăng cường."

# 【双鉄】
# display as 雙鐵
# JP: 「旅こそは、外の世界と触れることだし――\nひかりも単純に喜ぶだろう。鉄道旅行をするのなら」
1559 = "「Du lịch chính là cách để tiếp xúc với thế\ngiới bên ngoài——\nHikari chắc chắn cũng sẽ rất vui. Nếu được\nđi du lịch bằng tàu hỏa.」"

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。鉄道の……。まだ三月だし、うん。\n雪の旅、経験させてあげられますね」
1875 = "「Đúng vậy nhỉ. Tàu hỏa... Bây giờ mới là\ntháng Ba, ừm.\nCó thể cho con bé trải nghiệm một chuyến\ndu lịch ngắm tuyết.」"

# 【双鉄】
# display as 雙鐵
# JP: 「その方向で、旅程を組んでくれるか？」
1541 = "「Em có thể lên lịch trình theo hướng đó\nđược không?」"

# 【ポーレット】
# display as 波萊特
# JP: 「頼まれなくても、絶対組みます！\nわたし達の、初めての、家族での鉄道旅行なんですから」
1829 = "「Anh không nhờ em cũng nhất định sẽ làm!\nVì đây là chuyến du lịch bằng tàu hỏa đầu\ntiên của gia đình chúng ta mà.」"

# 【双鉄】
# display as 雙鐵
# JP: 「あ、おい」
1651 = "「A, này.」"

# monologue
# JP: ポーレットがベッドから起き出してしまう。\n明日にしろといいかけて、けれど言葉をすぐに飲み込む。
2522 = "Paulette bật dậy khỏi giường.\nTôi định bảo để mai hãy làm, nhưng lại\nnuốt vội lời định nói vào trong."

# monologue
# JP: とても綺麗な、母の顔だ。\n邪魔をするなど、野暮の極みというものだろう。
2344 = "Một khuôn mặt người mẹ vô cùng rạng rỡ.\nNếu tôi xen vào thì quả là vô duyên hết\nsức."

# 【ポーレット】
# display as 波萊特
# JP: 「最高の旅。\nわたし、絶対に組んで見せます」
1803 = "「Một chuyến đi tuyệt vời nhất.\nEm nhất định sẽ lên kế hoạch cho anh xem.」"
