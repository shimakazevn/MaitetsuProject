2004 = "「這是御一夜鐵路和商店協會的各位送來的。當然，最重要的是，還有小光送給你的花」" 

# 【ひかり】
# display as 光
# JP: 「はにゃあ」
1960 = "「花花」" 

# monologue
# JP: 照れくさそうな、嬉しげな声。\nれいなの言葉を、ひかりなりに誇ってくれているのだろう。
2276 = "光的聲音既有幾分羞澀又有幾分高興，看來她聽到玲奈這麼說，也感到了驕傲。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ありがとう、れいな。ありがとう、みなさん。\nありがと、ひかり」
1978 = "「謝謝你，玲奈。謝謝大家。謝謝光」" 

# 【ひかり】
# display as 光
