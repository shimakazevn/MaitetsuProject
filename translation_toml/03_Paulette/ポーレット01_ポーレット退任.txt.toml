# monologue
# JP: 無論、れいなはひかりにとてもなつかれている。\nれいなおねーちゃんは、いつでも優しくにこにこしてる。
2555 = "當然光也很親玲奈。作為她的姐姐，玲奈也一直對她很溫柔。" 

# 【ポーレット】
# display as 波萊特
# JP: 「だけどね？　今日は、パパとママのため、\nみんなが開いてくれた式典……あつまりだったから」
1589 = "「可是，今天是大家為了爸爸媽媽舉行慶典，在這裡歡聚一堂的」" 

# 【ひかり】
# display as 光
# JP: 「うん」
1683 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だから、がんばればみんなが喜んでくれるから。\nママ、それもあってちゃんとがんばったんだよ？」
1837 = "「所以，只要媽媽努力，大家都會高興的。所以媽媽才要堅持下來啊」" 

# 【ひかり】
# display as 光
# JP: 「ままえらあい！\nひかり、いいこいいこしてあげるのー」
1739 = "「媽媽好偉大！光要誇誇媽媽」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふ、ありがと」
1690 = "「嘻嘻，謝謝你」" 

# monologue
# JP: ポーレットとて、変わらずれいなを大事にし、\nむしろ前より頼りにしている部分も多い、が……
2506 = "波萊特也一直都很疼愛玲奈，甚至比以前還要更依賴玲奈了，可是……" 

# monologue
# JP: （僕でさえ、疎外感やさみしさを覚えるのだ。\nあまえっこのれいなには――なおのことだろう）
2672 = "（就連我都感到疏離和寂寞了，那麼喜歡找波萊特撒嬌的玲奈，肯定更難受吧）" 

# monologue
# JP: その上、今日はおそらく初めて、\nひかりがれいなの手を逃げ出して――
2285 = "再加上今天還是光第一次不聽玲奈的話，不願意去拉玲奈的手。" 

# 【れいな】
# display as 玲奈
# JP: 「はぅぅ」
1670 = "「嗚嗚」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1648 = "「啊！」" 

# monologue
# JP: 思ったときには手が動き、れいなの頭をなでている。
2586 = "等我回過神來，我已經用手摸著玲奈的頭了。" 

# 【れいな】
# display as 玲奈
# JP: 「ぇぅ……あのっ――そうてつ、さん？」
1620 = "「哎……雙鐵先生？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなも、とてもいいこだったな。\n花束も祝辞も、うれしかった。ありがとう」
1932 = "「玲奈也表現得很好。謝謝你的花束和祝詞」" 

# 【れいな】
# display as 玲奈
# JP: 「ふあっ！？　あのっ、れいな、べつにっ――\n！！？――ぴゃっ！！？」
1666 = "「啊？！那、那個，玲奈才沒有那麼厲害——呀？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいなっ！？」
1939 = "「玲奈？！」" 

# monologue
# JP: （どさっ）
2670 = "（啪嗒）" 

# 【れいな】
# display as 玲奈
# JP: 「うっ――あううう～、ごめんなさぁい。\nれいな、ころんじゃいましたぁ」
1668 = "「嗚——啊嗚，對不起，玲奈摔倒了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「れいなっ！？」
# 1939 = "「玲奈？！」" 

# 【ひかり】
# display as 光
# JP: 「れいなおねーちゃん、だいじょうぶぅ？」
1935 = "「玲奈姐姐，沒事吧？」" 

# 【れいな】
# display as 玲奈
# JP: 「だいじょうぶ……うん！\nれいな、少しも、故障も破損もありませんよぉ」
1911 = "「沒事……嗯！玲奈完全沒有發生故障和損傷」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら良かったが――\nすまん、驚かせてしまったな」
2019 = "「那就好。抱歉，嚇到你了」" 

# 【れいな】
# display as 玲奈
# JP: 「いいええ、れいな、ちょっとぼーっとしてて」
1910 = "「沒、沒有，都是玲奈在發呆」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや――僕の判断が悪かった」
1511 = "「不，都怪我反應慢了」" 

# monologue
# JP: 花束をとっさに投げ捨てていれば、\nれいなの転倒を阻止できた。
2256 = "假如我剛才馬上把抱在手裡的花束扔了，就能扶住玲奈避免她摔倒了。" 

# monologue
# JP: というか、それ以前――\nもっと以前に、気づいておくべきことだった。
2253 = "倒不如說，應該在那之前——在很久以前我就應該注意到的。" 

# monologue
# JP: （講習会で、\n他人ごとだと聞き流してしまっていたが……）
2676 = "（雖然在聽講座的時候，我以為自己家不會這樣，就當耳邊風了……）" 

# monologue
# JP: 『下の子ができたときの、上の子へのケア』\nそれは、うちにも必要なこころがまえだったのだ。
2289 = "原來這是我家也需要掌握的知識。在有了年紀小的孩子的時候，如何平衡大孩子和小孩子之間的關係。" 

# monologue
# JP: れいながいいこすぎたから、\n僕らがれいなに甘えてしまって、注意すべきを見落とした。
2319 = "因為玲奈十分老實聽話，所以我們完全沒有注意到這點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……れいな。花束をもってくれるか？」
1207 = "「……玲奈，能幫我拿著花束嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「え？　あ、はぁい。わかりましたぁ。\nれいな、花束もってますねぇ」
1627 = "「哎？啊，好的，當然可以。玲奈來拿」" 

# 【双鉄】
# display as 雙鐵
# JP: 「なら。そら！」
1842 = "「接招！」" 

# 【れいな】
# display as 玲奈
# JP: 「ひゃあああ！？」
1604 = "「呀？！」" 

# monologue
# JP: ああ、いかん。また驚かせてしまったか。\nどうにも今日は、体が気持ちに先走る。
2316 = "哎呀，不行，又嚇到她了。看來今天我的身體總是喜歡比我的腦子先行動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん、れいな、またやってしまったな」
1841 = "「抱歉，玲奈，我又嚇到你了」" 

# 【ひかり】
# display as 光
# JP: 「おっきなこえー！\nれいなおねーちゃん、パパのだっこ、やぁなのー？」
1934 = "「玲奈姐姐好大聲！你討厭被爸爸抱嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「やじゃないですよぉ！\nだっこ、らくちんでうれしいですぅ」
1938 = "「玲奈才不會討厭！被抱著很舒服，玲奈很高興」" 

# 【ひかり】
# display as 光
# JP: 「だよねー、だっこらくちーん」
1859 = "「是呀，被抱好舒服」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ」
1694 = "「嘿嘿」" 

# monologue
# JP: ひかりとれいなが笑い合う。\nだっこされているものどおし、ほとんど同じ目線の高さで。
2268 = "光和玲奈相視而笑，她們倆都被大人抱著，視線正好在同一高度。" 

# monologue
# JP: と、いうか――\nこれは――
2582 = "等一下，這個場景……" 

# 【ポーレット】
# display as 波萊特＆玲奈
# JP: 「あのときとおんなじですね」\n「あのときとおんなじですねぇ」
1613 = "「和那時候一樣」\\n「和那時候一樣呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「っ！」
# 1648 = "「啊！」" 

# monologue
# JP: ポーレットとれいな。\nふたりも、思い出してくれていたのか。
2558 = "看來波萊特和玲奈也想起了那時候的事情。" 

# monologue
# JP: 重なる声が、嬉しさが、記憶をさらに鮮やかにする。
2333 = "她倆高興的聲音重疊在一起，讓我的記憶更加鮮明。" 

# 【ひかり】
# display as 光
# JP: 「あのとき？　あのときっていつなのー？」
2017 = "「那個時候？是什麼時候？」" 

# 【れいな】
# display as 玲奈
# JP: 「あのですねぇ。れいなが、いちばぁんさいしょに、\n炭鉱を見に行ったときのことですよぉ」
2016 = "「那個時候，就是玲奈第一次去看煤礦的時候」" 

# 【ひかり】
# display as 光
# JP: 「たんこう！？　たんこうって、まいんとれじゃあ！？」
1927 = "「煤礦？！煤探樂園？！」" 

# 【れいな】
# display as 玲奈
# JP: 「そおですよぉ。そのときはまだ、\nマイントレジャーじゃなかったですけどぉ」
1871 = "「是啊。那時候還只是個普通的煤礦，不叫煤探樂園」" 

# 【ひかり】
# display as 光
# JP: 「ふみゅう？　まいんとれじゃあなのに、\nまいんとれじゃあじゃなかったの？？」
1640 = "「唔？是煤探樂園，又不叫煤探樂園？？」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。それはですねぇ」
1693 = "「嘻嘻，這是因為啊……」" 

# 【ひかり】
# display as 光
# JP: 「うんうん」
1684 = "「嗯嗯」" 

# monologue
# JP: ――一歩ごと、一言ごとに、広がっていく。
1174 = "——她們每說一句，想起那時候的每一刻，都讓我心中的感動多加一分。" 

# monologue
# JP: 今という時間にまつわる幸福感も、\n記憶の中の、あの日の記憶にまつわる光景も。
2227 = "不僅是因為現在包圍我的這份幸福，還是因為記憶中那段日子的感動。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あの時の質問」
1943 = "「當時那個問題」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの時の質問」
# 1943 = "「當時那個問題」" 

# monologue
# JP: また重なり合う。\nそれを偶然とは感じない。
2423 = "我和波萊特又異口同聲了，這肯定不是偶然。" 

# monologue
# JP: おんなじことを、同じタイミングで思い出す――\nそうした時間を、僕たちが、大事に重ねてきただけだ。
2411 = "我們倆在同一個時間想起了同一件事，這也說明我們倆都很珍重一起經歷過的這段時間。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あのときの質問の答えだが……\n今もやはり、はっきりとしたものにはならない」
1942 = "「當時你問我的那個問題……就算到現在，我還是無法給出一個明確的答案」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい」
# 1683 = "「嗯」" 

# monologue
# JP: だから、余計な言葉も必要無い\n僕が、『お父さんになりたいか』――
2451 = "所以，我也不需要說什麼多餘的話了。關於“我想不想成為父親”的問題——" 

# monologue
# JP: 二人がともに思い出している問いかけへの、\n今の答えを返せばいい。
2460 = "既然兩個人都想起了當時的那個問題，那我就在現在回答吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「実際、父親になったいまでも。\n怖いことはたくさんだし、わからないことも無数にある」
1558 = "「其實，就算現在已經成為父親了，我還是有很多不懂的、很多害怕的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですよね。毎日がとってもしあわせすぎて……\nだから、その分怖くなっちゃう」
1867 = "「是啊。每天都過得過於幸福了……甚至會害怕失去這種幸福」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1683 = "「嗯」" 

# monologue
# JP: 守りたいし、何をしたって守り抜く。その覚悟はある。
2432 = "我早就有心理準備，不論如何都要守護我的家人。" 

# monologue
# JP: だが、意思が、願いが、どれほど強くあろうとも――\nそれでも届かぬ手があると、僕らはともに、知っている。
2251 = "但同時我也明白，有時候不管意志和願望有多強，也是無法改變現實的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だからといって後悔もないし、時間を戻したくもない。\n問いに対して、ずれた答えになってしまうが――」
1582 = "「可我已經是父親了，既不想後悔也不想回到過去。雖然這個答案可能牛頭不對馬嘴」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん」
# 1683 = "「嗯」" 

# monologue
# JP: 僕らの手の中、\nひかりとれいなは仲良くきゃいきゃい話し続ける。
2271 = "光和玲奈還在我們懷裡高興地聊著。" 

# monologue
# JP: グランビー鉱車がどうこうと、\nひどく懐かしい単語が聞こえる。
2443 = "我聽到了諸如\\x%lグランビー鉱車;#00ffc040;側卸式礦車%l;#;等的讓人十分懷念的單詞。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――父親になって、幸せだ。これ以上を望めぬくらいに。\nそれだけは、間違いなく答えられるよ」
1194 = "「——但是我成為了父親，真的十分幸福，稱之為無上幸福亦不為過。這點我十分肯定」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも、です。双鉄くん」
1805 = "「我也一樣，雙鐵君」" 

# monologue
# JP: 甘えた声。\n僕へとぺったり、寄ってくる声。
2514 = "波萊特用撒嬌的聲音朝我如此說道，對我的愛意充盈其中。" 

# monologue
# JP: ひかりを、れいなをそれぞれ抱っこしていなければ、\n僕らはきっと、手をつないでる。
2354 = "如果不是要抱著光和玲奈，我們肯定已經牽起了手。" 

# 【ポーレット】
# display as 波萊特
# JP: 「怖いことも、わからないことも難しいこともたくさんで、\nときどきわーって、声を出して投げちゃいたくなるけど」
2045 = "「雖然做父母有時候會經歷害怕、恐懼和無數困難，讓人三不五時就想大喊一聲拋下一切」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1683 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それでも、とっても幸せです。\nおかあさんになれて――わたし、ほんとによかった」
1585 = "「可我還是十分幸福。能成為母親真是太好了」" 

# 【ひかり】
# display as 光
# JP: 「ふみゅう？」
1669 = "「嗚啊？」" 

# monologue
# JP: 無意識にだろう。\nポーレットの優しい頬ずりに、ひかりが驚いた声を出す。
2642 = "說完，波萊特下意識地用臉頰蹭了蹭光，光發出了驚訝的聲音。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん。\nわたしをおかあさんにしてくれて――ありがとう」
2048 = "「雙鐵君，謝謝你讓我能成為一個母親」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕の方こそだ、ポーレット。\n僕をおとうさんにしてくれて、ありがとう」
1820 = "「我才要謝你讓我成為一個父親」" 

# 【ひかり】
# display as 光
# JP: 「ふみゅう。ママもパパも、ちがうのー」
1637 = "「唔啊。媽媽爸爸，不對」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ちがう？　あれ？　ママ、なにか間違った？」
1498 = "「不對？媽媽搞錯什麼了嗎？」" 

# 【ひかり】
# display as 光
# JP: 「うん。あのね、ママがママになったの、\nひかりのおかげって、ママ、いつもゆってるのー」
1675 = "「嗯。媽媽平時不是一直說，有了光才能當媽媽」" 

# monologue
# JP: ひかりの発する、\nまっすぐな目を、まっすぐな言葉を――
2604 = "聽到光率真的話語，看到她那率直的眼神……" 

# 【ポーレット】
# display as 波萊特
# JP: 「あはっ！　本当ねっ」
1618 = "「哈哈！是啊」" 

# 【ひかり】
# display as 光
# JP: 「むきゅっ！」
1638 = "「唔啊！」" 

# monologue
# JP: ――はじける笑顔で受け止めて、\nポーレットはひかりをぎゅっと抱きしめる。
2519 = "波萊特笑出了聲。她又抱緊了光。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひかりのおかげで、ママはママになれた！」
2042 = "「都是多虧了你，我才成為了媽媽！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。ひかりのおかげで、パパはパパになれた」
1863 = "「是啊。多虧了光出生，我才成為了爸爸」" 

# 【ひかり】
# display as 光
# JP: 「うふふふう！」
1634 = "「唔呵呵！」" 

# 【れいな】
# display as 玲奈
# JP: 「えへへぇ。ひかりちゃん、すごいですねぇ！」
1696 = "「嘿嘿，小光可真了不起！」" 

# 【ひかり】
# display as 光
# JP: 「うゅう～っ」
1635 = "「唔哦～」" 

# monologue
# JP: 褒められて、嬉しくて。\nひかりは隠れるようにして、ポーレットの顔に顔を埋める。
2278 = "光被我們這麼一通誇獎，又高興又害羞，臉貼著波萊特，一副想要藏起來的樣子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「と、いうかだ。れいなもすごいぞ」
1507 = "「不過，玲奈也很了不起哦」" 

# 【れいな】
# display as 玲奈
# JP: 「ほえっ！？　れいな、なぁんにもしてないですよぉ」
1630 = "「哎？！玲奈什麼都沒做啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いいや。してくれたさ。\n今思えば、とても大きな――大きな仕事を」
1508 = "「不，回想起來，你做了一件天大的工作」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あー、うん」
1657 = "「啊，對啊」" 

# 【れいな】
# display as 玲奈
# JP: 「えええ？」
1625 = "「哎？」" 

# monologue
# JP: れいなに自覚は無いようだが、\nポーレットとは通じあえてる。
2540 = "玲奈似乎沒有察覺到，但波萊特明白了我的意思。" 

# monologue
# JP: れいなの零した、とても素直な一言が、\n僕らの今へとレールをつなぐ、大きなポイントだったのだ。
2382 = "就是當時玲奈隨口一句真誠的感想，成了讓我走上如今人生軌道的重大轉折點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「あの時、れいなの、いったとおりになった。\n僕がお父さんで」
1940 = "「現在正如玲奈當時所說的一樣，我成了父親」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしがお母さんで」
1819 = "「我成了母親」" 

# 【れいな】
# display as 玲奈
# JP: 「ああっ！」
# 1648 = "「啊！」" 

# monologue
# JP: にこにこにこーっと、れいなが崩れる。
2543 = "玲奈先是一驚，然後笑了起來。" 

# monologue
# JP: 笑顔でとろけてしまっている目で、\n僕を、ポーレットをじゅんじゅん見つめる。
2346 = "她用笑出了淚花的眼睛輪流看著我和波萊特。" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ。そうですねぇ。\nれいな、未来をあてちゃいましたねぇ」
1688 = "「嘻嘻，是啊。玲奈猜中了未來呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1874 = "「是啊」" 

# monologue
# JP: その上、ひかりを、さずかった。\n僕らは、ひとつの家族になれた。
2591 = "而且我們還有了光，成為了真真正正的一家人。" 

# 【双鉄】
# display as 雙鐵
# JP: 「っと――」
1621 = "「哎呀」" 

# monologue
# JP: そうして、知った。\n家族になるとは、家族を増やすことでもあると。
2406 = "我也明白了，成為一家人也意味著會迎來新的家人。" 

# 【ひかり】
# display as 光
# JP: 「ついたー！　きょうは、おえかきのひ！」
1562 = "「到了！今天是畫畫的日子！」" 

# monologue
# JP: ひかりが大きく体を動かす。
2273 = "光在波萊特的懷裡揮動著四肢。" 

# monologue
# JP: ポーレットがひかりを地面に下ろすと、\n駆けだしたそうなそぶりを見せる。
2505 = "波萊特一把她放下來，她就一副想要趕緊衝過去的樣子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「だな。日々姫にたっぷり教わってこい」
1861 = "「是啊。去跟日日姬好好學吧」" 

# 【ひかり】
# display as 光
# JP: 「うん！」
1685 = "「嗯！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ママ、お仕事おわったらすぐかえってくるから。\nいいこにしててね？」
1738 = "「媽媽一下班就會來接你的。記得要做個乖孩子哦」" 

# 【ひかり】
# display as 光
# JP: 「うん。ひかり、いっつもいいこなのー」
1673 = "「嗯。光一直都是個乖孩子」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうね」
1515 = "「也是」" 

# monologue
# JP: ひかりはポーレットの手を引いて、\nガラス戸を開け中にはいって――
2281 = "光鬆開波萊特的手，打開玻璃門走了進去。" 

# 【ひかり】
# display as 光
# JP: 「ひびきおねーちゃーん」
1852 = "「日日姬姐姐」" 

# monologue
# JP: ――と思ったらすぐにガラス戸を閉めてしまう。
1176 = "——然後她馬上就把門關上了。" 

# monologue
# JP: 階段をとととと駆け上がる音。\n日々姫と笑いあう声も聞こえる。
2456 = "接著，我們聽見了她咚咚咚上樓梯的聲音，也聽到了她和日日姬說笑的聲音。" 

# 【ポーレット】
# display as 波萊特
# JP: 「もう少し、おわかれにグズってくれてもいいのに～」
1717 = "「她就不能在分開的時候不樂意一下嘛～」" 

# 【双鉄】
# display as 雙鐵
# JP: 「グズらない場所の方が少ない。\nどこでもグズられては、心が保たなかろう」
1780 = "「平時遇到這種情況她不是總哭嘛。要是她不管什麼時候和大人分開都要哭，我們也受不了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それはそうなんですけど～」
2046 = "「雖然話是這麼說……」" 

# monologue
# JP: ――日々姫、真闇姉、ハチロク、凪、ふかみ、稀咲。\nひかりが喜んで預かられるのは、このあたりだけだ。
2609 = "能讓光高高興興待著的地方也就只有日日姬、真闇姐、八六、凪、深美、稀咲她們幾個人那裡了。" 

# monologue
# JP: であるというのに、ポーレットはいちいち焼き餅を焼く。\nそこは理屈では割り切れぬ、母親の業というものだろう。
2302 = "可是波萊特每到這種時候卻還是會吃醋。雖然我也理解，這是母親的本能。" 

# 【双鉄】
# display as 雙鐵
# JP: 「さて、いくか」
1725 = "「好了，我們走吧」" 

# 【れいな】
# display as 玲奈
# JP: 「あ、れいな、もう自分であるきますよぉ」
1658 = "「啊，放下玲奈吧，玲奈可以自己走了」" 

# monologue
# JP: ぽわんとした声。\nポーレットもうふふと笑いをもらす。
2547 = "玲奈的聲音還是一如既往軟軟的，引得波萊特也笑了。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか」
1722 = "「好」" 

# 【ポーレット】
# display as 波萊特
# JP: 「それなら、行きましょ？」
2025 = "「那我們走吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1683 = "「嗯」" 

# monologue
# JP: 三人に戻り、歩き出す。\n乗務をこなして、ひかりを迎えにいくために。
2422 = "我和波萊特、玲奈一起邁開腳步，又回到了平日三個人一起執行乘務的日子。等做完工作，我們才能回來接光。" 

# 【ポーレット】
# display as 波萊特
# JP: 「はふぅ……」
1609 = "「呼……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「お疲れだ。ポーレット」
1922 = "「波萊特，辛苦你了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんこそ、お疲れ様です」
1534 = "「你才是。今天辛苦了」" 

# monologue
# JP: ベッドの中、ポーレットが肌を寄せてくる。
2624 = "被子裡的波萊特朝我貼了過來。" 

# monologue
# JP: どこか甘いポーレットの匂いと、\nごくごく素朴な、せっけんの匂い。
2350 = "她身上不僅有我熟悉的那股甜甜的味道，還有一股特別純樸的沐浴露香味。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひかりはどうだった？」
1554 = "「光呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、今日はれいなといっしょに入りたがって」
1652 = "「啊，她說今天想和玲奈一起洗」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。いや、うむ？」
1877 = "「是嗎。等一下？」" 

# monologue
# JP: 普通の石鹸は、ひかりにはまだ刺激が強すぎるかも――\nということでの、オール国産素材のベビーソープ。
2413 = "我們覺得普通的肥皂對小孩子刺激性可能會太強，所以給光用的是原材料１００％國產的嬰兒沐浴露。" 

# monologue
# JP: ひかりがいっしょでないときでも、\nポーレットがそれを使ったというのが、少し意外だ。
2477 = "沒想到波萊特不和光一起洗澡的時候也會用這個。" 

# 【双鉄】
# display as 雙鐵
# JP: 「もったいないといってなかったか？」
1531 = "「你不是說過給自己用很浪費嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「え？　なにがです」
1664 = "「啊？什麼很浪費」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ベビーソープだ。確か、一本三千円くらいすると」
1741 = "「嬰兒沐浴露啊。我記得一瓶要３０００日元左右」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ああああ！　うっかりしてた！　もったいない！！」
1649 = "「啊！我不小心用了！好浪費！！」" 

# monologue
# JP: 聞くやいなやで、ポーレットは頭を抱えてしまう。\nうっかりしたのは気の毒だったが――
2523 = "波萊特馬上反應過來，她抱住了自己的腦袋懊惱著。雖然我也很可憐她不小心用錯了沐浴露……" 

# 【双鉄】
# display as 雙鐵
# JP: 「大きな声は。\nひかりとれいなを起こしてしまうぞ」
1503 = "「不要大聲。不然會吵醒光和玲奈的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はうっ」
1646 = "「啊嗚」" 

# monologue
# JP: ポーレットがあわてて口を押さえる。
2336 = "她慌忙捂住自己的嘴。" 

# monologue
# JP: ……隣の部屋に、特に変わった気配はない。\nひかりもれいなも、ぐっすり眠っているようだ。
1189 = "……我沒有感覺到旁邊屋子裡有什麼動靜。看來光和玲奈都睡得很熟。" 

# 【双鉄】
# display as 雙鐵
# JP: 「しかし、そうか。今日はれいなと寝たがるだけでなく、\nお風呂もれいなだったのか」
2006 = "「這樣啊。原來她今天不光要和玲奈睡，還和玲奈一起洗了澡啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん。きっと――\nひかりなりに、バランスをとってるんだと思います」
1677 = "「嗯。我想，她一定是以小孩子特有的方式補償玲奈，保持公平」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
# 1874 = "「是啊」" 

# monologue
# JP: れいなの手から抜け出して、\n高崎さんの陰に隠れてしまった。
2247 = "今天光從玲奈那裡掙脫，藏到了高崎太太身後。" 

# monologue
# JP: あの場面、\nはたから見ていた僕にも衝撃的ではあったが……
2384 = "就算我當時只是在旁邊圍觀，也覺得很驚訝……" 

# 【双鉄】
# display as 雙鐵
# JP: 「――気にするか。まだ四歳だというのに」
1715 = "「她也會在意這個？她才４歲啊」" 

# 【ポーレット】
# display as 波萊特
# JP: 「朝は、双鉄くんいってましたよ？\n『もうよっつ』って」
1579 = "「可你上午不是也說過，她已經４歲了，不能太寵著嗎」" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かにいったが――\nしかし、そこまで細かな、心の機微のような問題を」
1827 = "「我是這麼說過……可是，這麼小的孩子能明白這麼細微敏感的感情問題嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「感じますよ、ひかりは。\nあのこ、小さなころのわたしにそっくりだから」
1720 = "「她肯定能感覺到的。因為，她和小時候的我簡直一模一樣」" 

# 【双鉄】
# display as 雙鐵
# JP: 「小さなころの？」
1765 = "「小時候的你？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です。人見知りで、内弁慶で。だけど好奇心旺盛で。\n興味の範囲が狭くって、そのことだけにはおしゃべりで」
1870 = "「是啊。那時候我又怕生又窩裡橫，還好奇心旺盛。興趣非常狹隘，只有聊到感興趣的東西才會滔滔不絕」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――」
1698 = "「噢」" 

# 【ポーレット】
# display as 波萊特
