[script]
# lines: 440 
# 【ポーレット】
# display as 波萊特
# JP: 「――いい風」
1730 = "「好舒服的風」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
1874 = "「是啊」" 

# monologue
# JP: 晴れの日だ。\nふたつの意味で、文字通り。
2249 = "今天是個大晴天，同時也是一個對我們來說意義重大的日子。" 

# monologue
# JP: ポーレットの表情も快晴だ。\n金の髪より、まぶしく明るく輝いている。
2518 = "波萊特的表情也是無比開朗，那表情比她的金髮更加燦爛奪目。" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ、稀咲さん」
1624 = "「哎呀，稀咲小姐」" 

# 【双鉄】
# display as 雙鐵
# JP: 「新市長、ですよ？　市長」
1774 = "「市長，我們應該叫她新市長了」" 

# monologue
# JP: ポーレットの任期が満了し、\n僕の私設秘書としての役割も、書類上はもう終了している。
2517 = "波萊特的市長任期已經結束，按文件規定，作為她的私人秘書，我的任期也已經結束了。" 

# monologue
# JP: が、この退庁式が終わるまで、\nやはり、秘書として振る舞いたい。
2304 = "可是，在這場卸任典禮結束之前，我還是想貫徹秘書的職責。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それならわたしは前市長ですよ？\n右田秘書」
1602 = "「右田秘書，這樣的話你也要叫我前市長哦」" 

# monologue
# JP: ポーレットもそれをわかってくれる。\n普段よりよほど市長然として応えてくれる。
2507 = "波萊特也很清楚我的想法。她故意拿出了比平時更裝模作樣的市長口氣。" 

# monologue
# JP: 小さな声で、ごくささやかな幸せをやりとりする間にも、\n稀咲はすたすた近づいてくる。
2380 = "就在我們倆竊竊私語打情罵俏的時候，稀咲大步流星朝我們走來。" 

# 【稀咲】
# display as 稀咲
# JP: 「二期八年。\n長い間ご苦労さまでした、雛衣ポーレット前市長」
2051 = "「雛衣波萊特前市長，市長任期兩屆共八年，這些年辛苦你了」" 

# monologue
# JP: 堂々と、凜然と。\n頼もしい――そんな言葉が頭に浮かぶ。
2565 = "看著她鄭重而嚴肅地說出這些話，我覺得她一定會是個可靠的新市長。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ご就任おめでとうございます。[ほうしょう,1]宝生稀咲新市長」
1795 = "「恭喜你上任。寶生稀咲新市長」" 

# monologue
# JP: ポーレットも見事に応対してみせる。\n柔らかな笑顔の交換。カメラフラッシュの花が咲く。
2516 = "波萊特的回應也十分得體。她們倆臉上都綻放出了柔和的笑容，引得下面拍照閃光燈頻頻閃爍。" 

# monologue
# JP: 報道陣は――ざっと三十人以上。大賑わいだ。\nこれもまたポーレットの業績への評価だと、嬉しく感じる。
2416 = "我匆匆瞥了一眼，典禮現場的記者約有三十人以上，這可真是熱鬧。一想到這也是對波萊特的政績的肯定，我就十分高興。" 

# 【ポーレット】
# display as 波萊特
# JP: 「宝生新市長にお任せできること、心強く感じています。\n[おひとよ,2]御一夜市の未来を、どうぞよろしくお願いします」
1813 = "「我從心底相信，寶生新市長是值得託付這個城市未來的人。御一夜市的未來就交給你了」" 

# 【稀咲】
# display as 稀咲
# JP: 「もちろん、全力でお引き受けします。\nその上で今後とも――どうぞその手を、御一夜のために」
1977 = "「謝謝你的囑託，我定當全力以赴。希望波萊特小姐今後也能為御一夜的發展盡一份力」" 

# monologue
# JP: 稀咲がスっと右手を差し出す。\nポーレットも笑顔でそれを受け取る。固い握手。
2637 = "見稀咲唰地伸出右手，波萊特立即笑著緊緊地握了上去。" 

# monologue
# JP: 再び、無数のフラッシュの光。\n実にうまい。二人とも。これは完璧な絵作りだ。
2305 = "台下又閃起了無數閃光燈的光芒。她們倆太棒了，記者們一定能拍出完美的市長卸任報導照片。" 

# 【稀咲】
# display as 稀咲
# JP: 「御一夜市の復興はマイントレジャー。\nそして、御一夜鉄道様あってのことですから」
1789 = "「御一夜市的復興都是多虧了煤探樂園，還有御一夜鐵路」" 

# 【ポーレット】
# display as 波萊特
# JP: 「過分なお褒めに恐縮しますが、光栄です。\n御一夜の更なる発展のためにも、努力を重ねて参ります」
2012 = "「過獎了，我深感惶恐，但這是我的光榮。為了御一夜的進一步發展，我們還不能停下努力的腳步」" 

# 【稀咲】
# display as 稀咲
# JP: 「そういっていただけると、安心です。\nこれからも、ともに御一夜市のために」
1543 = "「你這麼說我就放心了。為了御一夜市今後的發展，讓我們繼續攜手並進吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうですね。\n御一夜の――わたしたちの町と、くらしのために」
1727 = "「好的。這都是為了御一夜——為了我們的生活，我們的城市」" 

# monologue
# JP: もう一度小さく微笑みあって――
2455 = "接著，她又輕輕笑了笑。" 

# monologue
# JP: それが合図であったかのように、\nふたりは結んでいた手を離す。
2649 = "這笑容彷彿是一個暗示一樣，兩人心領神會地鬆開了握著的手。" 

# 【ポーレット】
# display as 波萊特
# JP: 「それじゃあ。失礼しますね？\nお仕事の邪魔になりたくありませんし」
2029 = "「那我就先走了。留在這裡怕是會打擾你工作」" 

# 【稀咲】
# display as 稀咲
# JP: 「お気持ち、承りました。ですが――\n始業時間までは、職員達に付き合ってあげてください」
1706 = "「多謝關心。不過離上班還有一點時間，還請你再陪陪這裡的職員吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あ――」
1641 = "「啊……」" 

# monologue
# JP: 稀咲の声が合図となってか、\n整列した職員たちのあちこちに、花束が顔を覗かせる。
2605 = "聽到稀咲這麼說，排成一列的職員們有不少人紛紛舉起手中的花束。" 

# 【稀咲】
# display as 稀咲
# JP: 「それじゃ、また」
2027 = "「那我先告辭了」" 

# monologue
# JP: 軽く手を振り、稀咲はあっさり庁舎へ向かう。
2575 = "稀咲揮了揮手，然後便徑直朝政府大樓走去了。" 

# 【記者Ａ】
# display as 記者Ａ
# JP: 「ああ、少しだけよろしいですか。新市長」
1846 = "「新市長，請問您接下來有時間接受採訪嗎」" 

# monologue
# JP: なじみの記者――市川さんが稀咲のことを追い始めると、\nそれに続く者、帰社するらしい者と記者たちも散り始める。
2414 = "我們認識的那位市川記者追到稀咲身後，其餘的記者便都散開了，有人跟了上去，也有人準備回去。" 

# 【宮本】
# display as 宮本
# JP: 「お疲れ様でした。雛衣前市長」
2050 = "「雛衣前市長，辛苦你了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「宮本さん」
1754 = "「宮本女士」" 

# monologue
# JP: 職員たちが、なんとなくタイミングを見計らうその間に、\nポーレットの前に歩み出てきたのは、宮本さん――
2321 = "在其餘職員們還在猶豫著該不該上前的時候，第一個帶頭來到波萊特面前的是宮本女士。" 

# monologue
# JP: ポーレットの父、雛衣幸三前々市長の時代から、\n御一夜市制を実務で支えた、総務部長だ。
2342 = "她是從波萊特的父親——上上屆市長雛衣幸三在任時，就負責御一夜市實際業務的總務部部長。" 

# 【ポーレット】
# display as 波萊特
# JP: 「宮本さんに、『前市長』っていわれちゃうと、\nなんだか、父のことを呼ばれてるみたいな気がして」
1755 = "「宮本女士，您這一聲“前市長”，我總以為是在說我父親」" 

# 【宮本】
# display as 宮本
# JP: 「そうですか？　それでは、ポーレット前市長」
1879 = "「是嗎？那我以後就叫你“波萊特前市長”吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「『ポーレットちゃん』でもいいですか？　昔みたいに」
1578 = "「可以像以前一樣叫我“波萊特”嗎？」" 

# 【宮本】
# display as 宮本
# JP: 「ああ――」
1697 = "「噢……」" 

# monologue
# JP: 宮本さんが、あたたかな息を吐き、目を閉じる。\nまぶたの裏に、何を思い浮かべているのだろう？
2373 = "宮本女士輕輕嘆了一口氣，閉上眼睛。不知她的眼簾中此刻映出的是怎樣的回憶。" 

# 【宮本】
# display as 宮本
# JP: 「そうね。私ももう、一市民に戻ったわけだし」
1514 = "「也對。我現在已經是一介平凡的市民了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「あ」
1642 = "「啊」" 

# monologue
# JP: そうか、宮本さんもご退職なさるのか。
2376 = "對啊，宮本女士已經退休了。" 

# monologue
# JP: ポーレットは把握していたのだろう。\n驚きもせず、静かに右手を差し伸べる。
2509 = "波萊特則絲毫沒露出驚訝的樣子，只是靜靜伸出右手。她應該早就知道了吧。" 

# 【ポーレット】
# display as 波萊特
# JP: 「定年退職までの長きにわたり。御一夜市を支え続けて\nくださって、本当にありがとうございました」
1796 = "「您長年為御一夜市奉獻，直到退休，真的十分感謝」" 

# 【宮本】
# display as 宮本
# JP: 「自分では天職だと思ってたから。\n長く務めることができて、幸運だったし、光栄でした」
1834 = "「我認為這是自己的天職。能夠擔任這個職位這麼久時間，既是我的幸運，也是我的光榮」" 

# monologue
# JP: 宮本さんが右手を受け取る。\n握手の上に、そうっと左手を重ねて添える。
2372 = "宮本女士握住了波萊特的右手，然後輕輕把左手也放了上去。" 

# 【宮本】
# display as 宮本
# JP: 「ポーレットちゃんこそ有り難う。与えられた役割を、\n二期八年務めきって、素晴らしい実績を重ねてくれて」
1921 = "「波萊特，我才要感謝你。你在兩屆八年的市長任期裡表現很完美，留下了很多值得讚賞的成績」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ！」
1648 = "「啊！」" 

# monologue
# JP: “天職”と。“与えられた役割”と。\n宮本さんが言外に伝えようとしていることはよく解る。
2386 = "就算是我，也明白宮本女士特地強調的“天職”和“落到肩上的擔子”之間的區別。" 

# monologue
# JP: 亡父を継いで、やりたくも向いてもいなかった市長職を、\nポーレットが見事にこなしきったと、褒めているのだ。
2341 = "她是在誇獎波萊特繼承了這份她並不想繼承、也不擅長的市長職位，並完美地履行了自己的責任。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしにも天職でしたよ？　八年間限定で、双鉄く――\n右田秘書と、職員の皆さんに支えて貰えれば。ですけど」
1762 = "「對我來說，這份職業也是天職哦。雖然在這八年之間，有雙鐵——右田秘書和各位職員幫助我，我才有了今天的成績」" 

# 【宮本】
# display as 宮本
# JP: 「あははっ」
1645 = "「啊哈哈」" 

# monologue
# JP: 自信に満ちた切り返し。\n宮本さんはそれを受け止め、実に晴れやかな笑いを零す。
2636 = "見波萊特自信滿滿地如此回答，宮本女士似乎也接受了這個答案，露出了燦爛的笑容。" 

# 【宮本】
# display as 宮本
# JP: 「成長したのね、ポーレットちゃん。\n今度、ゆっくり呑んでみましょう？」
1920 = "「波萊特，你成長了。下次要不要和我一起去喝一杯？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい、よろこんで」
1729 = "「好的，我很樂意」" 

# 【宮本】
# display as 宮本
# JP: 「っと、おばちゃんが独占しちゃったら、気の毒ね」
1623 = "「哎呀，我這老太婆獨占你太久了，後面還有人呢」" 

# monologue
# JP: 宮本さんが脇へと譲れば、\n花束をかかえた――ああ、
2371 = "宮本女士一讓到旁邊，就有一個人抱著花束走了過來——啊。" 

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「市長！」
1773 = "「市長！」" 

# monologue
# JP: 彼か。\n思った瞬間、ポーレットも笑顔をほころばす。
2288 = "原來是他。當我察覺到這一點的時候，波萊特臉上已經綻放出了一個燦爛的微笑。" 

# 【ポーレット】
# display as 波萊特
# JP: 「前市長ですってば、高崎主任。\nあのときはありがとうございました」
2058 = "「高崎主任，都說了我已經是前市長了。那時候真是多謝你了」" 

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「こちらこそです！\nあのときの弁当、本当にうまかったです！」
2000 = "「這句話應該我來說才對！那時候的便當真是太好吃了！」" 

# monologue
# JP: マイントレジャー計画の立ち上がる前、\n真っ先に手をあげてくれた高崎くん。
2662 = "高崎是我們啟動煤探樂園計劃之前，第一個舉手贊成我們的人。" 

# monologue
# JP: 若手だった彼も、ボランティアの中心的存在として\n頭角を現し、今では立派な主任級だ。
2554 = "當時年紀輕輕的他就已經是志願者活動的領頭人，而現在已經是能獨當一面的主任級幹部了。" 

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「前市長。御一夜を笑顔の町に戻してくださり――\n本当にありがとうございました！」
1567 = "「前市長，謝謝你讓御一夜又變回了那個充滿笑容的城市！」" 

# 【ポーレット】
# display as 波萊特
# JP: 「みんなの力です。\n市職員だけでなく、御一夜市のみんなの」
2008 = "「這都是大家的功勞。不光是靠市政府職員，還要多虧了市民的努力」" 

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「しちょ……前市長」
1772 = "「市長……前市長」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だからもちろん、わたしたちの力も入ってますけど！」
1944 = "「當然，其中也有我們的一份功勞！」" 

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「あはっ！」
1617 = "「哈哈！」" 

# monologue
# JP: しめっぽくなるのを嫌ってだろう。\nおどけて見せたポーレットに、高崎くんも笑顔を返す。
2559 = "看來高崎也不喜歡把卸任的場面搞得哭哭啼啼的，他聽到波萊特打趣的說法，也笑了起來。" 

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「条例とはいえ、ご退任。残念という他にありません。\nまた一緒にお仕事させていただけることを、願ってます」
2047 = "「雖然說是任期限制，可我還是很遺憾前市長要離開。希望以後還能有機會和你一起工作」" 

# 【ポーレット】
# display as 波萊特
# JP: 「観光課に移ってくれれば、すぐにでも――\nっていうか、あれ？」
1575 = "「只要你轉去旅遊科馬上就能和我……咦，等一下？」" 

# monologue
# JP: 受け取った花束を抱えたまま、\nポーレットが大きくあたりを見回す。
2508 = "波萊特兩隻手抱著收到的花束，誇張地左顧右盼起來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「観光課といえば、[たかさきさん,1]奥様は？」
1972 = "「說到旅遊科，你的夫人呢？」" 

# 【職員Ｂ】
# display as 職員Ｂ
# JP: 「あ、それは――」
1660 = "「啊，這個啊……」" 

# 【職員Ａ】
# display as 職員Ａ
# JP: 「ほら、ね？　せっかくなんだし」
1535 = "「你看我就說吧？難得今天是個重要日子」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなもいっしょですからぁ、ね？」
1895 = "「有玲奈陪著你呢，不要鬧了好嗎？」" 

# 【ひかり】
# display as ？？？
# JP: 「やぁぁ」
1501 = "「不要啊」" 

# monologue
# JP: 聞き慣れた声。\nかなりグズって、泣きそうな声。
2577 = "突然傳來了一聲我很熟悉的嗚咽聲，像是嬰兒快哭出來的聲音。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひかり！？」
1556 = "「光？！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレット。だめだ」
1919 = "「波萊特，不行」" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんっ！？」
2049 = "「雙鐵君？！」" 

# monologue
# JP: 声では決して止められないとわかった上で捕まえた手を、\nけれどポーレットは、振りほどこうと身もだえる。
2441 = "我知道用喊的她不會停，只得抓住她的一隻手臂，但她卻扭動著身體試圖甩開我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「止めないで。ひかりがっ」
1844 = "「放開我，光她……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「退庁式だぞ。主役が席を離れてどうする」
2001 = "「這可是卸任典禮，主角怎麼能中途離開呢」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、わたしがいってあげなきゃ」
1593 = "「可是，我得陪在她身邊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「いつもそばにいてやれるとは限らん。\nあえて離れて見守ることも、愛情だろう」
1539 = "「你總不能陪她一輩子啊。有時候放手也是一種愛」" 

# 【ポーレット】
# display as 波萊特
# JP: 「だとしても、まだ赤ちゃんのうちくらいは」
1591 = "「可是，對嬰幼兒不用這麼嚴格吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「もう四つだ。赤ちゃんとはいえまい。\n再来年には少等部だぞ」
1718 = "「她已經四歲了，算不上是嬰幼兒了。後年就要上小學了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「っ――」
# 1641 = "「啊……」" 

# monologue
# JP: ようやく納得してくれたのか、\n納得せずとも、場の性質ゆえ耐えたのか――
2330 = "她似乎終於被我說服了。或許她就算不服，礙於場面也不得不忍耐。" 

# monologue
# JP: ともかくもポーレットは踵を下ろし、\n僕もつかんでいた手を離す。
2587 = "總之，見波萊特退了幾步，我也鬆開了抓著她手臂的手。" 

# 【双鉄】
# display as 雙鐵
# JP: 「れいながついてる。高崎さんもだ。任せよう」
1893 = "「有玲奈和高崎太太陪著她呢。就交給她們吧」" 

# monologue
# JP: ボランティアを通じ、高崎君の奥さんとなった高崎さんも、三歳の子の母親だ。
2664 = "高崎通過志願者活動結識的妻子如今也成為了三歲孩子的母親。" 

# monologue
# JP: 子供の扱いは上手だし、ひかりも比較的なついている。
2334 = "她很擅長哄小孩，光也比較親她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットがいつでも助けては、\nがんばれない子になってしまうぞ」
1966 = "「要是你老是去幫她，她會長成過分依賴大人的孩子」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう……ね」
1973 = "「說的……也對」" 

# monologue
# JP: ぐっと、唇がかみしめられる。\n両手も堅く握られている。
2520 = "波萊特緊緊咬住嘴唇，握緊雙拳。" 

# 【ポーレット】
# display as 波萊特
# JP: 「――お願い、れいな。高崎さん」
1196 = "「——玲奈，高崎太太，就拜託你們了」" 

# monologue
# JP: ポーレットの願いを知ってか知らずか、\nれいなの声が、ふんわりのんびり聞こえてくる。
2232 = "也不知她們有沒有察覺到波萊特的願望，我隱約中聽到了玲奈那軟軟的、不緊不慢的說話聲。" 

# 【れいな】
# display as 玲奈
