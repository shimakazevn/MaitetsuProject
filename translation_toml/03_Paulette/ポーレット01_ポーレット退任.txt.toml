2229 = "不行，波萊特、光、玲奈都要忍不住了。周圍的職員們也開始紛紛議論了起來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「高崎さん！　すみません。ひかりをお願いします。\nれいなは、こちらを」
2060 = "「高崎太太，不好意思，光就交給你照顧了。玲奈，你到這邊來」" 

# 【職員Ａ】
# display as 職員Ａ
# JP: 「あ、はい！　ね、ひかりちゃん？　なら、\nおばちゃんといっしょに見てましょう？」
1654 = "「啊，好的！來吧，光，和阿姨一起在一邊看起來好不好？」" 

# 【ひかり】
# display as 光
# JP: 「あうぅ」
1616 = "「哇嗚」" 

# 【れいな】
# display as 玲奈
# JP: 「それじゃあ、れいなが、ひかりちゃんの代わりに、\nおかあさんにお花、届けてきますねぇ」
2036 = "「那玲奈就代替小光去給你媽媽送花了」" 

# 【ひかり】
# display as 光
# JP: 「うぅぅ」
1671 = "「嗚嗚嗚」" 

# monologue
# JP: 高崎さんのスカートに隠れ、\nひかりはこくこくうなずくばかり。
2280 = "光躲在高崎太太的裙子後面，沒有回答，只是不停地點著頭。" 

# monologue
