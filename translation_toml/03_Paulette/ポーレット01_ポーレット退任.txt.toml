2389 = "平時光絕對不會鬆開拽著玲奈褲子的手，可此刻她卻鬆開手，躲在了高崎太太的身後。" 

# 【ひかり】
# display as 光
# JP: 「いく、の――やぁ、なのっ」
1496 = "「不、不去。光不想去」" 

# 【れいな】
# display as 玲奈
# JP: 「あぅ」
1633 = "「唔」" 

# monologue
# JP: れいなの顔が、あのれいなの顔が固くなる。\nこれは――確かにショックだろう。
2478 = "沒想到玲奈也會有表情僵硬的時候，看來被光拒絕，的確讓她受到了很大打擊。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひかりっ」
1551 = "「光」" 

# monologue
