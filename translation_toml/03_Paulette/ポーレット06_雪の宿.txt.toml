2695 = "沒辦法的。我差點脫口說出這句話，但還是把後半句話咽了下去。" 

# monologue
# JP: 例えばベテランの仲居であれば、どんな流れであろうとも、\n客のこけしを勝手に鳴かせたりはせんだろう。
2568 = "如果是專業的服務員小姐，不管發生了什麼事，都不應該擅自弄響客人的木芥子吧。" 

# 【仲居】
# display as 服務員
# JP: 「お客様のこけしを、私、\n自分の物みたいに扱ってしまって」
1988 = "「我擅自動了客人的木芥子，非常抱歉」" 

# monologue
# JP: とはいえ、どこが悪い点だったのか、\nすでに自覚もしているようだ。
2785 = "話是這麼說，不過看來她已經察覺到自己的失誤了。" 

# monologue
# JP: ならば重ねて責めるより、\nひかりのために何をすべきかを考えるべきだ。
2822 = "那麼，與其繼續責備她，我還不如仔細想想什麼做法對光來說是最好的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ともかく、食事を――ああ、いや」
2161 = "「總之，我們先吃飯……啊，不行」" 

# monologue
# JP: 泣いたばかりですぐ食事では、ひかりも喉を通るまい。\n気持ちを落ち着け直すには――
2467 = "光才剛哭過就讓她吃飯，再好的美食怕也難以下咽吧。還是得先安撫好她。" 

# 【双鉄】
# display as 雙鐵
# JP: 「冷めてしまってもかまいません。\n食事を一時間……いや、二時間後にしてもらえますか？」
2230 = "「飯菜放涼了也沒關係。能把就餐時間推遲到一小時……不，兩小時之後嗎？」" 

# 【仲居】
# display as 服務員
# JP: 「承りました。\n[いたちょう,1]板長にお願いして、きちんとしたお食事をご提供します」
2032 = "「明白了。我會拜託廚師長，讓他們提供正常的飯菜的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「助かります。\nそれと――もし家族風呂が空いているなら」
1890 = "「多謝。還有，如果這裡的家庭浴池還空著……」" 

# 【仲居】
# display as 服務員
# JP: 「今の時間は空いてたはずです。\nすぐ、フロントに確認してまいります」
2128 = "「現在這個時間應該是空著的。我立刻去前台確認」" 

# 【双鉄】
# display as 雙鐵
# JP: 「助かります。そのようにお願いします」
1891 = "「多謝。那就拜託了」" 

# 【仲居】
# display as 服務員
# JP: 「あの！」
2184 = "「請留步！」" 

# monologue
# JP: 部屋に戻ろうとした僕を、\n切羽詰まった声が背後から呼び止める。
2644 = "我正扭頭想回房時，服務員小姐焦急地從身後叫住了我。" 

# 【仲居】
# display as 服務員
# JP: 「あのっ――私、お嬢様にお詫びを」
2169 = "「若可以的話……我想跟小妹妹道歉」" 

# 【双鉄】
# display as 雙鐵
# JP: 「今は控えてください。\n人見知りをする子なので、お気持ちだけで」
2127 = "「現在就先不用了。那孩子比較怕生，好意我們心領了」" 

# 【仲居】
# display as 服務員
# JP: 「あ――」
1827 = "「啊……」" 

# monologue
# JP: 一瞬、くうっと息を呑み。
2548 = "她一時驚得啞口無言。" 

# monologue
# JP: それから深々――\n仲居さんは、膝におでこがくっつくほどに頭を下げる。
2746 = "然後她深深地低下頭，頭簡直都快碰到膝蓋了。" 

# 【仲居】
# display as 服務員
# JP: 「かしこまりました。\nお詫びは、それでは――ひとまずは形で示します」
1990 = "「我明白了。那麼，就請讓我用行動表達歉意吧」" 

# monologue
# JP: そう言って、思い切ったように顔をあげ。\n早足で、仲居さんは廊下の向こうに消えていく。
2563 = "她說罷，下定決心似的抬起頭，快步向走廊的另一端走去，身影隨後消失在走廊的盡頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「若いのに、しっかりしている」
1910 = "「她明明這麼年輕，卻很乾練」" 

# monologue
# JP: にもかかわらずの失敗は、\n間が悪かった、としかいいようがない。
2786 = "話雖如此，她還是闖禍了。只能說是運氣不好吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「いや今は、分析よりも行動だ」
1699 = "「不，有空在這分析，不如趕快行動」" 

# monologue
# JP: 何があっても冷静に対応できるよう、\n深呼吸をして――静かに部屋の中へと戻る。
2624 = "我先做了一次深呼吸，讓自己能冷靜應對任何狀況，然後悄悄回到房間裡。" 

# 【ひかり】
# display as 光
# JP: 「ん……ふっ――ぐずっ――ずっ――」
1850 = "「嗯……嗚——嗚——嗚——」" 

# monologue
# JP: ……ひかりは、いまだ泣いている。\nが、先程までの猛烈なものではなくなっている。
1303 = "……光還在哭。但已經哭得沒有剛才那麼厲害了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そっか。\n一番におしゃべりしたかったのね」
2061 = "「是這樣啊。原來你才是最想跟她說話的人」" 

# 【ひかり】
# display as 光
# JP: 「ひかりっ――ひかりにっ、はっ――れいなっこけしっ\nおしゃべりっ――おしゃべりっ、してくれない、のにっ」
1941 = "「對光……對光……玲奈木芥子明明都不……不說話的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ！」
1834 = "「啊！」" 

# monologue
# JP: そうだったのか。工房からの帰り道、\nずっとこけしを抱いて頭を撫でていたのは――
2501 = "原來是這樣。剛才回來這一路上，光一直抱著木芥子，摸著她的頭，是因為……" 

# monologue
# JP: （あれは首をひねって鳴かせようと、\nれいなこけしと、おしゃべりしようとしていたのか）
2856 = "（她想擰響木芥子的脖子，跟玲奈木芥子說話啊）" 

# monologue
# JP: 幼女の力で、手袋つき。\nあまりに悪い条件に、なかなかそれが果たせぬままに――
2577 = "小女孩本來力氣就小，還戴著手套。諸多不利條件湊在一起，所以光怎麼擰都沒能擰動……" 

# 【ひかり】
# display as 光
# JP: 「なのに、おねーちゃんが、おねーちゃんが、\nひかりっ、ひかりよりさきにぃ」
1730 = "「但是，大姐姐、大姐姐，卻比光、比光還先」" 

# 【れいな】
# display as 玲奈
# JP: 「ちがいますよぉ、ひかりちゃん」
1690 = "「不對哦，小光」" 

# monologue
# JP: しっかりと握りしめているこけしごと、\nひかりをれいなは、ふんわりと抱く。
2752 = "玲奈輕輕抱住了光，連她手中緊握的木芥子一起。" 

# monologue
# JP: ぽんぽんぽんと、軽く、かるぅく、\nその後ろ頭をたたいて撫でる。
2565 = "她輕輕地拍著光的後腦勺。" 

# 【ひかり】
# display as 光
# JP: 「ちがうっ――なに、がっ」
1691 = "「不對？是說什麼不對」" 

# 【れいな】
# display as 玲奈
# JP: 「れいなこけしも、ひかりちゃんとおしゃべりしたくて、\nだから、おねえさんの力を借りたんですよぉ」
2124 = "「玲奈木芥子是因為想跟小光說話，才借助了大姐姐的力量哦」" 

# 【ひかり】
# display as 光
# JP: 「ふえっ？」
1816 = "「哎？」" 

# monologue
# JP: ああ、上手い。
2534 = "啊，她安慰得真棒。" 

# monologue
# JP: れいなの見事な説明に、\nすぐさまポーレットも言葉を重ねる。
2760 = "聽到玲奈精彩的解釋，波萊特立刻趁勢說道。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうね。一刻も早くひかりとおしゃべりしたくて。\nだからリュックを抜け出して、お姉さんに力を借りたの」
2039 = "「是啊。她是想儘快跟光說話，所以才從背包裡跑出來，借助了大姐姐的力量」" 

# 【ひかり】
# display as 光
# JP: 「……っく――ひくっ――そう、なの？」
1361 = "「……嗚……嗯……是這樣嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「そうですよぉ。れいなこけしは、\n『ひかりちゃん、心配しないでー』っていってましたぁ」
1942 = "「對啊。玲奈木芥子是在說，“小光，不要擔心我”呢」" 

# 【ひかり】
# display as 光
# JP: 「……ふっ……く」
1359 = "「……呼……嗚」" 

# monologue
# JP: ひかりの声が、かなり落ち着く。\nれいなはそっと、抱きしめている手をほどく。
2481 = "光的聲音平靜多了。玲奈見狀便輕輕鬆開抱著她的手。" 

# 【ひかり】
# display as 光
# JP: 「そぉ、なの？　ぱぱぁ」
2066 = "「是這樣嗎？爸爸」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、そうだ」
1871 = "「嗯，是啊」" 

# monologue
# JP: ひかりが、僕を頼ってくれた。\nそう思うだけで、こころが定まる。
2469 = "光把我當成了值得依靠的對象。只要想到這一點，我的心就平靜了下來。" 

# monologue
# JP: 演技も嘘も得意ではない。\nゆえに――“本当”を、ただ話そうと。
2609 = "我不擅長表演和說謊。所以，我只是說出“事實”。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その証拠に――手を貸してごらん？」
1995 = "「我給你看證據。來，把手給我一下」" 

# 【ひかり】
# display as 光
# JP: 「んー」
# 1866 = "「嗯」" 

# monologue
# JP: こけしを挟んでもったまま、\nひかりは短い両手を伸ばす。
2490 = "光雙手握著木芥子向我伸出了短短的雙臂。" 

# monologue
# JP: その手のひらをすっぽりと、\n僕の両手で、まるごとくるんで暖める。
2646 = "我用雙手覆了上去，把她的雙手握在掌心溫暖著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「今ならもう、\nれいなこけしは、ひかりとお話できる」
2129 = "「現在，玲奈木芥子已經可以跟光說話了哦」" 

# 【ひかり】
# display as 光
# JP: 「できるのー？」
1787 = "「可以了嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは僕じゃなく、\nれいなこけしに直接聞いてみるといい」
1772 = "「別問我，還是直接去問玲奈木芥子吧」" 

# 【ひかり】
# display as 光
# JP: 「うぅ……う」
1844 = "「嗚嗚……嗚」" 

# monologue
# JP: 包み込んでいた手を緩めれば、\nひかりはおずおず、れいなこけしの首に触れる。
2663 = "我輕輕鬆開光的手，她隨後小心翼翼地碰了碰玲奈木芥子的脖子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「それではダメだ。\nもっとしっかり、力をこめてにぎってやるんだ」
2208 = "「這可不行。你要更用力地握緊它」" 

# monologue
# JP: （きゅっ）
2858 = "（握）" 

# monologue
# JP: もう一度、ひかりの手の甲に手のひらを重ねる。\nひかりの手ごと、れいなこけしの首をにぎる。
2668 = "我重新把手搭在光的手背上，把著她的手，握住玲奈木芥子的脖子。" 

# 【ひかり】
# display as 光
# JP: 「こんなにつよく、なの？」
2177 = "「要這麼用力嗎？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。話を聞くとは、\n聞かせてもらうとは――そういうことだ」
1861 = "「嗯。所謂聽別人說話，讓別人聽自己說話，就是這麼一回事」" 

# 【ひかり】
# display as 光
# JP: 「どういうことぉ？」
1961 = "「怎麼一回事？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『君の話を聞きたい』と、相手に伝わるように伝える。\nそう出来なければ、大事な話はしてもらえない」
2175 = "「要用自己的表達讓對方聽明白，“我想聽你說話”。要是做不到這一點的話，對方就不會對自己說重要的話」" 

# 【ひかり】
# display as 光
# JP: 「……あいてに、つたわるように、つたえる」
1375 = "「……用自己的表達，讓對方聽明白」" 

# monologue
# JP: 涙をいっぱいにためた目で。\nひかりは僕を見――れいなこけしをじっと見る。
2473 = "光淚眼汪汪地看了我一眼，又淚眼汪汪地緊盯著玲奈木芥子。" 

# 【ひかり】
# display as 光
# JP: 「――うん」
1321 = "「——嗯」" 

# monologue
# JP: ひかりの指先に力がこもる。\nこれなら、僕の手は必要なかろう。
2480 = "光的指尖開始用力。看來，她已經不需要我的一臂之力了。" 

# monologue
# JP: そうっと、ひかりから手を引けば――
2662 = "我輕輕鬆開光的手。" 

# monologue
# JP: （キュイっ！）
# 2850 = "（吱呀！）" 

# 【ひかり】
# display as 光
# JP: 「おしゃべりしたのー！！」
1914 = "「她說話了——！！」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。よかったな」
1874 = "「嗯，真是太好了。」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ね？　今なんていってたの？\nママにもおしえて」
1879 = "「嗯？你們剛才說什麼啦？跟媽媽也說說吧」" 

# 【ひかり】
# display as 光
# JP: 「うん、あのねー！」
1870 = "「嗯，其實呢……」" 

# monologue
# JP: ひかりが笑う。\nあどけなく。
2463 = "光天真無邪地笑了。" 

# 【ひかり】
# display as 光
# JP: 「『おしゃべりできてうれしーよー』って、\nいってたのー！！」
1908 = "「她對光說，“能跟你說話我很高興”！！」" 

# monologue
# JP: （ちゃぽん）
2859 = "（當）" 

# 【ポーレット】
# display as 波萊特
# JP: 「ああ……生き返るぅ」
1831 = "「啊……我活過來了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「湯船につかると――\n確かに、何かが戻ってくるように感じるな」
2100 = "「泡在浴池裡，的確是有種什麼東西回來了的感覺」" 

# 【ひかり】
# display as 光
# JP: 「なにがもどってくるの、なのー？」
2075 = "「有什麼東西回來了？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「それは……」
2206 = "「這個嘛……」" 

# monologue
# JP: 言葉を止めて考える。\nが――あまりにも直接的な答えだけしか思いつけない。
2654 = "我話說到一半便陷入了思考。但是，我實在想不出直接的回答。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……一番端的なところをいえば、体温などだ」
1377 = "「……簡而言之，就是體溫吧」" 

# 【ひかり】
# display as 光
# JP: 「たんてきー？」
2159 = "「簡而言之？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「端的とは、『簡単にいうと』、ということだな」
2158 = "「簡而言之，就是“用簡單的方法來說”的意思」" 

# 【ひかり】
# display as 光
# JP: 「ならかんたんにいえばいいのにー」
2216 = "「那你直接用簡單的方法來說不就好了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむっ！？\nああ……確かに、もっともだ」
1825 = "「唔？！嗯……是啊，你說得對」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あははっ」
1833 = "「啊哈哈」" 

# monologue
# JP: ポーレットは明るくわらって、\nひかりの頭をやわらかに撫でる。
2731 = "波萊特開心地笑著，溫柔地摸著光的頭。" 

# 【ポーレット】
# display as 波萊特
# JP: 「簡単なようで、本当は難しいことなの。\n『相手に伝わるように伝える』、って」
1330 = "「“用自己的表達讓對方聽明白”這件事，說起來簡單，但其實很難的」" 

# 【れいな】
# display as 玲奈
# JP: 「あ――」
# 1827 = "「啊……」" 

# monologue
# JP: れいなが、ちらりと僕を見る。\n確かにそれは、さきほど僕が発した言葉だ。
2751 = "玲奈瞄了我一眼。的確，這是我剛才的原話。" 

# monologue
# JP: 自分の言葉も守れないでは、親として……\n頭までぶくぶくと、湯につかりたい心持ちになる。
2796 = "身為父母，卻無法做到言出必行……我覺得很丟臉，好想整個人藏進溫泉裡。" 

# 【ひかり】
# display as 光
# JP: 「むつかしーのー？」
2209 = "「這很難嗎——？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うん。難しい。ママにも、いつだって難しいし、\nパパだって、さっきにみたいに失敗しちゃうこともある」
1860 = "「嗯。很難的。媽媽也老是覺得這很難。就算是爸爸，也會像剛才一樣失誤」" 

# 【ひかり】
# display as 光
# JP: 「うん」
# 1866 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ママもパパも、多分、そこはまだ練習中」
1930 = "「媽媽和爸爸，可能也還在練習這件事呢」" 

# monologue
