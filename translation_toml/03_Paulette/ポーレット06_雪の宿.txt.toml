# monologue
# JP: わからないから楽しいというのは、\nつまりは、知識欲、知的好奇心の類い――なら。
2692 = "正因為不能理解，才很有趣……這是指求知慾、對知識的好奇心吧。那麼……" 

# 【双鉄】
# display as 雙鐵
