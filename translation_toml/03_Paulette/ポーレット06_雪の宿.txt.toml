2173 = "「要是“不能理解對方”這件事很可怕，那不就不想跟對方說話了嗎？」" 

# 【れいな】
# display as 玲奈
# JP: 「そうかもですけど、ひかりちゃん」
2005 = "「或許是這樣的，但是小光啊」" 

# monologue
