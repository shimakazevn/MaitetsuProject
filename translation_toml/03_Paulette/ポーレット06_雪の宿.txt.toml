1720 = "「但是像這種時候，玲奈會感到新奇，這份新奇戰勝了恐懼。不過，光感受到的恐懼卻戰勝了新奇」" 

# 【ひかり】
# display as 光
# JP: 「うん」
# 1866 = "「嗯」" 

