# JP: 「だけどな。ひかり。\n本当に大事なことなら、どんなに怖くても伝えられる」
1723 = "「但是啊，光。當一個人要表達真正重要的事情時，任憑怎樣的恐懼都無法阻擋」" 

# 【ひかり】
# display as 光
# JP: 「！」
# 1834 = "「啊！」" 

# monologue
# JP: まっすぐに、青い瞳が僕を見つめる。
2820 = "那雙藍色的眼瞳直率地看著我。" 

# monologue
# JP: あの夏、あの日、あの線路沿いで。\nポーレットが僕を、まっすぐまっすぐ、見てくれたように。
2582 = "就像那個夏天，在那條鐵路旁邊的那一天，波萊特直率地看著我一樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットが――ママが、それを僕に教えてくれた。\n教わったから、僕もそうできるようになった」
2104 = "「波萊特——你媽媽教會了我這一點。因為她教會了我這一點，所以我做到了這件事」" 

# monologue
# JP: だから、単純な恩返しだ。\n今度は僕が教えよう。
2672 = "所以，這只是單純的報恩。這次，就由我來教給光吧。" 

# 【双鉄】
# display as 雙鐵
# JP: 「伝えられないのは。逃げて隠れてしまうのは。\nきっと、それが『本当に伝えたいことではない』からだ」
1919 = "「如果你無法跟對方說出心意，如果你只想逃避的話，那一定是因為你還沒有找到真正想要告訴對方的事」" 

# 【ひかり】
# display as 光
# JP: 「ほんとうに――つたえたいこと？」
2142 = "「真正……想要告訴對方的事？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。それを伝えないでいたなら、\nひかりがひかりで無くなってしまう――そういうことだ」
1858 = "「嗯。就是那種——如果不告訴對方那件事，你就會變得不再是你了的事」" 

# monologue
# JP: 行った途端に、ひかりの眉根がきゅっと寄る。
2655 = "我說到一半，光的眉頭就緊緊皺了起來。" 

# 【ひかり】
# display as 光
# JP: 「ひかりが、ひかりじゃなくなっちゃうのー？」
1758 = "「光，會變得不再是光？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むつかしかったか、では、こう言い換えよう。\n言わないままにしまっていると――ひかりの胸に」
1904 = "「太不好懂了嗎，那我換個說法。如果一直不把那些話說出來，你的胸口裡就會……」" 

# monologue
# JP: 心臓の上、そっと手のひらを乗せてみる。\nとくん、とくんと鼓動している。
2661 = "我輕輕地用掌心按住光的心臟部位。那裡，心臟噗通、噗通地跳著。" 

# 【双鉄】
# display as 雙鐵
# JP: 「――ひかりの胸に、もやもやしたものが突き刺さる。\n突き刺さるまえとおんなじようには、笑えなくなる」
1744 = "「你的胸口裡就會有刺扎著你，讓你心神不寧。被刺扎著，你就無法像平時一樣笑出來了」" 

# 【ひかり】
# display as 光
# JP: 「あ」
# 1832 = "「啊」" 

# monologue
# JP: 幼いなりに、思い当たることがあるのだろう。\nひかりはこくこく、何度も頷く。
2827 = "雖然她年紀尚小，但也想到了曾經類似的感受吧。她拚命點了好幾次頭。" 

# 【双鉄】
# display as 雙鐵
# JP: 「本当に伝えたいこととは、そういうことだ。\n伝えずいれば、きっとずうっと、さみしいことだ」
2144 = "「真正想說的事，就是指那樣的事。如果不能說出口的話，就會一直沒辦法擺脫寂寞的感覺吧」" 

# 【ひかり】
# display as 光
# JP: 「あのね、ひかりもね、ときどきあるの。\nこわくてもおしゃべりしたい、つたえたいっておもうの」
1768 = "「其實，光偶爾也會有這種感覺。有些事就算很害怕，也想說出來，想告訴對方」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1866 = "「嗯」" 

# 【ひかり】
# display as 光
# JP: 「だけどね、こわいのがどんどんおっきくなっちゃうの。\nそしたらひかり、はなしたいのが、みえなくなるのー」
1732 = "「但是，害怕會變得越來越大。這樣一來，光就看不清楚自己想說的事了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1866 = "「嗯」" 

# monologue
# JP: ひかりの言葉に頷くが――\n理解できるが、困ってしまう。
2763 = "聽她這麼說，我點了點頭。雖然我聽得懂她在說什麼，但卻感覺更麻煩了。" 

# monologue
# JP: （自己防衛か、正当化か……\n恐らくそうした心理の働きなのであろうが――）
2863 = "（這到底是自我保護呢，還是給自己找藉口呢……總之，應該就是這方面的心理問題吧）" 

# monologue
# JP: ……今の僕の理屈ではひかりの悩みを解いてやれない。
1310 = "……我現在講的道理無法消除光的煩惱。" 

# monologue
# JP: 『本当に伝えたいことは伝えられる』と繰り返すなら、\n気休めにさえならないばかりか、ひかりの願いを否定する。
2611 = "我不能再不停告訴她“真正想說的事是可以跟對方說出口的”了。不僅沒用，還會否定她的願望。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ママも、同じ。\nずっとずうっと、そうだった」
1929 = "「媽媽也是。以前一直都是這樣」" 

# 【ひかり】
# display as 光
# JP: 「まま」
1928 = "「媽媽」" 

# monologue
# JP: つまってしまった僕の言葉を、\nポーレットが静かに掬ってくれる。
2606 = "我一時語塞，波萊特見狀不動聲色地接了我的話。" 

# 【ポーレット】
# display as 波萊特
# JP: 「大事なことって思えば思うほど、伝えられなかった。\nわたしの声を、話を、聞いてもらえないって、感じて」
1956 = "「心裡越覺得重要的事，就越無法告訴別人。媽媽總覺得，別人不會認真傾聽自己的聲音，自己的話語」" 

# 【ひかり】
# display as 光
# JP: 「……まぁま？」
1364 = "「……媽媽？」" 

# monologue
# JP: ご両親のことを、ポーレットは思い出しているのだろう。
2512 = "可能波萊特想到了她的父母吧。" 

# monologue
# JP: 普段にはないさみしい響きに、\nひかりが、おどろいたような瞬きをする。
2556 = "她的語氣與平時大不相同，顯得有點落寞。光驚訝地眨了眨眼。" 

# 【ポーレット】
# display as 波萊特
# JP: 「伝えられないで、しまい込んで。\nしまい込んだら、伝えることがもっともっと怖くなって」
2110 = "「無法告訴對方，就只能憋在心裡。但是一憋在心裡，就更害怕說出這件事了」" 

# 【ひかり】
# display as 光
# JP: 「……うん」
# 1362 = "「……嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そうするうちに、怖さで、寂しさで一杯になって。\nそんなときにね？　ママは、男の子と出会ったの」
2210 = "「這樣一來，恐懼和寂寞就把心填的滿滿的。而就在那時，媽媽遇到了一個男孩子」" 

# 【ひかり】
# display as 光
# JP: 「どんなこー？」
2034 = "「是什麼樣的男孩子？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ」
1798 = "「呵呵呵」" 

# monologue
# JP: ポーレットが微笑む。僕を見る。\n急に、顔面が熱くなる。
2719 = "波萊特微笑著看向我。我的臉一下子紅了。" 

# monologue
# JP: というか、これは――
2656 = "我說，她這是要……" 

# monologue
# JP: （ざばあっ）
# 2854 = "（嘩啦）" 

# 【双鉄】
# display as 雙鐵
# JP: 「すまん、茹だった。僕は先にあがっている」
2017 = "「抱歉，我泡暈了，就先出去了」" 

# 【れいな】
# display as 玲奈
# JP: 「うふふぅ、れいなもあがりますねぇ」
1801 = "「呵呵呵，玲奈也先出去了哦」" 

# monologue
# JP: ……聞いているのも気恥ずかしいし、\nそれより前に、ふたりっきりで話して欲しいとも思う。
1305 = "……在這裡聽著，我會很不好意思，而且，我也很想讓她們單獨談談。" 

# monologue
# JP: 母と娘と、ふたりっきりで。\nひかりが産まれる、きっかけとなったあの日のことを。
2788 = "讓她們母女兩個人聊吧。聊聊成為日後光誕生契機的那一天。" 

# 【ひかり】
# display as 光
# JP: 「（……すぅ、すぅ、すぅ、すぅ）」
2236 = "「（……呼、呼、呼、呼）」" 

# 【れいな】
# display as 玲奈
# JP: 「（すや～――すやぁあ～）」
2238 = "「（呼……呼）」" 

# monologue
# JP: ……寝息が聞こえる。
1312 = "……熟睡的聲音傳入耳中。" 

# monologue
# JP: ひかりの方が小刻みで規則的、\nれいなの方はゆっくり、いささか不規則だ。
2477 = "光的呼吸聲淺而均勻，而玲奈的呼吸則慢慢的，多少有些起伏。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……こんなところにも、性格が出るものかな」
1371 = "「……是不是這種地方也能表現性格啊」" 

# monologue
# JP: いつもと違う布団の中だが、\nいつもと同じ、川の字プラス1の格好だ。
2829 = "雖然睡著的被子與平時不同，但我們四個人躺著的姿勢與平時一樣，都是川字形多一豎。" 

# monologue
# JP: 寝入ってしまえば、ひかりもれいなも、\nほとんど起き出すことはない。
2412 = "一旦睡著，光和玲奈都不太容易驚醒。" 

# 【ポーレット】
# display as 波萊特
# JP: 「……どんな性格ですか？」
1352 = "「……什麼性格？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「聞いたままだ」
2195 = "「跟她們的鼾聲一樣」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ。ですかねー」
1800 = "「呵呵呵，會嗎」" 

# monologue
# JP: ポーレットの声の調子は明るい。\n僕も、なんとなくほっとする。
2725 = "波萊特的音調很開朗。我也不由得鬆了一口氣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひかりが、わかってくれたのか？」
1693 = "「不知道光聽懂了沒有？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わかったって、何をです？」
2165 = "「聽懂了什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕らが、伝えようとしたことをだ」
2166 = "「聽懂我們想告訴她的事」" 

# 【ポーレット】
# display as 波萊特
# JP: 「さーて、どうですかねー」
2207 = "「這個嘛，誰知道呢」" 

# monologue
# JP: もぞりと、布団の中で手が動く。\n僕も、応える。
2774 = "被子中的手緩緩動了動。我也輕輕地回應了她。" 

# monologue
# JP: いつもそうしているように、布団の中で、\n僕ら夫婦は、むすめふたりごし、手をつなぐ。
2580 = "就像平時那樣，我們夫婦倆隔著兩個女兒牽起手來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くんが伝えようとしてたことって、\nなんです？」
1740 = "「你想告訴光的事情是什麼？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「『焦らずともいい』ということが第一だな」
2233 = "「首先，應該是“不用著急也沒關係”吧」" 

# monologue
# JP: 行商のおばあさんから教わったこと。\nぼくらが、ともに納得したこと。
2811 = "這是行商老奶奶教給我的。也是我們兩人都認同了的。" 

# 【双鉄】
# display as 雙鐵
# JP: 「その上で、『本当に大事なことなら、\n伝えたいからがんばれる』と伝えたかった。が」
2112 = "「然後，我想告訴她“真正重要的事，自己會很想告訴對方，所以一定能為此而努力直至成功”。但是」" 

# monologue
# JP: ……どうにも、うまくいかなかった。
1318 = "……雖然我很想教會她這一點，但卻並不順利。" 

# monologue
# JP: 僕が見つけたつもりの答えは、\nひかりの問いには、あまりに無骨にすぎたようだ。
2638 = "我找到的答案太過簡單粗暴，不足以回答光的問題。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……本当にむつかしいものだな。\n伝えたいことを伝える、というだけのことが」
1365 = "「……把自己想說出來的事明明白白地告訴對方，實在是太難了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね」
2043 = "「是啊」" 

# monologue
# JP: ポーレットの声は柔らかだ。
2723 = "波萊特的聲音十分柔和。" 

# 【ポーレット】
# display as 波萊特
# JP: 「仲居さんも、そうでしたものね」
2079 = "「服務員小姐也沒能讓光明白她的意思」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。ひかりが、こけしを落としてしまったことを、\n慰めようとしてくれたのだものな」
1863 = "「嗯。明明是光弄掉了木芥子，她只是想安慰光而已」" 

# 【ポーレット】
# display as 波萊特
# JP: 「『平気だよ』『何でも無いよ』って、こけしに\nしゃべらせてくれて――それが、裏目に出ちゃった」
2007 = "「所以她讓木芥子說“沒事的”，“我很好”，但這卻起了反作用」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……仲居さんが意地悪をした、と――\nひかりが、誤解しなければいいのだが」
1355 = "「……光誤解了，還以為服務員小姐在欺負她。如果她沒誤解就好了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「そこは、大丈夫ですよ。\nれいなのフォローもありましたし」
2094 = "「沒關係的。玲奈適時安慰了她」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1866 = "「嗯」" 

# monologue
# JP: ふうっと、ポーレットが疲れたような、\n困ったような息を吐く。
1293 = "“唉”，波萊特嘆了一口氣，好像是疲憊，又好像是懷抱著煩惱。" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひかり、そこをわかってて。自分が泣いちゃったことで、\n仲居さんを困らせたのも――理解してるみたいです」
1755 = "「光好像已經明白了。她哭出來反而讓服務員小姐擔心了。她應該已經理解了這一點」" 

# 【双鉄】
# display as 雙鐵
# JP: 「むぅ。それを気に病まぬとよいのだが」
1823 = "「唔。希望她不要過分介意這件事」" 

# 【ポーレット】
# display as 波萊特
# JP: 「明日になったら忘れてくれてるといいんですけど――\nどうでしょうね？　こどもって……」
1921 = "「如果明天睡醒之後，她能忘了這件事就好了。但是，真有這麼簡單嗎？小孩子就是這樣……」" 

# 【双鉄】
# display as 雙鐵
# JP: 「大事なことを忘れたり、妙なことだけ覚えていたり。\n……それは僕達大人も同じなのかもしれんが」
2077 = "「有時候會忘記重要的事，有時候卻淨是記住一些奇奇怪怪的事。……不過，可能我們大人也差不多吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね」
# 2043 = "「是啊」" 

# monologue
# JP: ふっ、と。\nポーレットの今度の息は、微笑に近い。
2730 = "波萊特輕聲嘆氣，不過這次的嘆息中滲出了一絲笑意。" 

# 【ポーレット】
# display as 波萊特
# JP: 「こころの中のことなんて、大人にだって、\n上手に扱うの、難しいことですものね」
1947 = "「就算是大人，也很難對付人心的複雜之處啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ」
# 1866 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、伝わりますよ。必ず、ひかりに。\nわたしたちが、これほど伝えたいって思ってること」
1728 = "「但是，光一定會知道的。知道我們那些非常非常想要告訴她的事」" 

# monologue
# JP: 励ましや気休めの調子ではない。\nポーレットはそう、こころの底から信じている。
2807 = "這不是空虛的鼓勵，也不是給我打氣。波萊特是打從心底相信著這句話的。" 

# monologue
# JP: 僕の言葉も、\nだから、どこまでだって素直になれる。
2550 = "她也相信著我的話。所以，她才能這麼率直。" 

# 【双鉄】
# display as 雙鐵
# JP: 「そう願っている。\n願わずとも、いつか自然と、叶うことかもしれんが」
2205 = "「這也正是我的願望。不過，或許這事並不為我的願望所左右，總有一天自會實現吧」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、そのいつかを、少しでも早めてあげたいですよね。\nだって、こんなに素敵なんだから」
1736 = "「但是，我希望那一天能早日到來。因為，與他人的交流是如此美好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1866 = "「嗯」" 

# monologue
# JP: 話し合うこと。\n言葉を単に、交わすこと。
2793 = "跟別人說話。單純的話語交流。" 

# monologue
# JP: 思いを、考えを混じらせること。\n会話して、一人の時間をふたりの時間にしてしまうこと。
2602 = "思想和思想的碰撞。兩個人的交談，讓一人獨占的時間變作由兩人分享。" 

# 【ポーレット】
# display as 波萊特
# JP: 「怖いことも、いやな思いをすることもあったりするけど。\nそれでも、人とかかわることは、とっても素敵」
2227 = "「雖然可能會碰到害怕的事情，可能會產生不愉快的回憶。但這仍難掩與別人交流時的美好」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ポーレットは、ひかりに伝えられたか？」
1738 = "「你告訴了光這一點嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「伝わったのかな？\nそこのところを話せてたのかも、わかりません。けど」
2183 = "「誰知道她有沒有聽懂呢？我甚至不確定自己有沒有跟她說過這個話題。但是」" 

# monologue
# JP: くすっと、幸せそうな音が布団の上を転がる。
2718 = "波萊特幸福地笑了。" 

# 【ポーレット】
# display as 波萊特
# JP: 「夢中になって、聞いてくれてはいましたよ？\n途中から、パパとママのむかしのことって気づいて」
1718 = "「但她聽得很著迷哦。我說到一半的時候，她就發現這是爸爸和媽媽過去的經歷」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうか。それはなんとも、嬉しいことだな」
1320 = "「 是嗎。這真的讓我很開心」" 

# 【ポーレット】
# display as 波萊特
# JP: 「どっちかっていうと、わたし達に子供時代があった――\nっていうことに興奮している感じでしたけど」
1686 = "「不如說，她意識到我們也有過曾經是孩子的時候……這件事讓她感到興奮吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ。\n……そういうものかもしれんなぁ」
1847 = "「嗯……可能是吧」" 

# monologue
# JP: 両親のことを、思い出してみる。\n理屈では当然、父と母にも子供時代はあったのだろうが。
2653 = "我試著回憶自己的父母。按道理說，父母當然也曾經是孩子。" 

# 【双鉄】
# display as 雙鐵
# JP: 「確かに、父と母は大人だな。\n最初からずっと、大人な生き物なような気がする」
2135 = "「的確，父母對我們來說就是大人啊。總覺得他們好像從出生開始就是大人似的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、そうじゃないって。\n多分、産まれて初めて実感できたんじゃないかなー」
1726 = "「但是，並不是這樣的。可能她是從出生開始，第一次察覺到這件事吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「実感したようで――どうだった？」
1911 = "「她是察覺到了這件事嗎？你覺得呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「感じることはいろいろあったみたいでしたよ？\n真っ赤になるまで考えてましたから」
1998 = "「我覺得，她好像產生了好多感想哦。她很拚命地想了半天，想得整張臉都紅了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「元気をすっかり取り戻していたしな」
2163 = "「而且，看她的樣子，已經完全恢復精神了啊」" 

# monologue
# JP: 旅館側が気をつかったのか、風呂上がり、\n食事を運んできてくれたのは、ベテランの仲居さんだった。
2507 = "可能是旅館方面為了照顧我們吧，我們泡好澡之後，給我們送飯的是年紀比較大的服務員。" 

# monologue
# JP: ひかりはやはり隠れていたが、それ以上気にした風もなく、\n宿泊費には不似合いなほど豪華な食事を楽しんでいた。
2489 = "光還是躲了起來，但是她好像也沒有繼續在意之前的事，而是享受了與住宿費比起來顯得過分豪華的餐點。" 

# 【双鉄】
# display as 雙鐵
# JP: 「……明日は、早い出発だったか」
1368 = "「……明天會很早出發嗎」" 

# 【ポーレット】
# display as 波萊特
# JP: 「はい。せっかくここまで来たんですし、\n帰りのストーブ列車に乗るまでにも、やっぱり」
2053 = "「是的。我們難得來一趟，回程要想再坐一次暖爐列車的話，就得」" 

# 【双鉄】
# display as 雙鐵
# JP: 「始発にのって、[やまがた,1]山縣方面に向かって、折り返して――\nそれで、ちょうどの感じなんだよな」
1754 = "「先坐開往山形方向的首班車，再折返。時間應該是剛剛好的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですです。エアクラとか、他の交通手段を使った\nエスケープルートも考えてありますから」
2045 = "「是啊是啊。其實我也考慮過利用空凝機等其他交通手段的備用方案」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うむ」
# 1866 = "「嗯」" 

# monologue
# JP: となると鍵を置くだけのチェックアウトになるかもしれん。\nあの若い仲居さんとは、恐らくはもう二度と会わない。
2814 = "這麼一說，可能我們退房時只能不打招呼，直接把鑰匙留下就走了。或許我們也不會再見到那位年輕的服務員小姐了。" 

# monologue
# JP: ……フォローをきちんとしてくれたことに、\nお礼のひとことも伝えたかったが。
1301 = "……但是，她幫我們好好地善後了，關於這一點，我還是想向她道謝。" 

# 【ポーレット】
# display as 波萊特
# JP: 「双鉄くん？」
2229 = "「雙鐵君？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ、いや」
1872 = "「嗯，沒事」" 

# monologue
# JP: ポーレットもまた、特に気にしているふうもない。\n蒸し返すような形になるのも、よろしくなかろう。
2757 = "看來波萊特也沒有特別介意這一點。若是我反覆提起的話，反倒不太合適。" 

# 【双鉄】
# display as 雙鐵
# JP: 「ひかりに、風呂で。具体的には――\n僕らの昔の、どんな話をしてやったんだ？」
2226 = "「關於我們過去的事，你和光在泡澡的時候，具體都講了些什麼呢？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ただ、あの日のことを、丁寧にです。\n双鉄君の事故のこととかは、話しませんでしたけど」
1981 = "「我只是把那天的事從頭到尾講給光聽了。不過，沒有提到你遭遇過的那起事故」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1866 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「あの日のわたしが、さみしかったこと。\n双鉄くんが、とってもさみしそうに見えたこと――」
2003 = "「我講了，那天的我很寂寞。而且，那天的雙鐵君，看起來也十分寂寞——」" 

# monologue
# JP: きゅっと、ポーレットの指の力が強くなる。\n僕も応えて、指の力を強くする。
2720 = "波萊特握緊了手。我也在指尖加了些許力道回應她。" 

# 【ポーレット】
# display as 波萊特
# JP: 「『この男の子と話したいな』って、すごく思って。\nそうしたら話しかけちゃってた――みたいな感じです」
1985 = "「我強烈地覺得，“我好想和這個男孩子說話”。然後，我就上去跟他交談了。就說了這些」" 

# 【双鉄】
# display as 雙鐵
# JP: 「日ノ本語も、おぼつかなかったころなのに、な」
2030 = "「明明當時，你連日語都說得不是很好」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですね。いま考えるとすごい勇気です。\n……ひょっとしたら、一目惚れだったのかも」
2042 = "「是啊。現在想起來，真是很有勇氣。……說不定那時候我就對你一見鍾情了」" 

# 【双鉄】
# display as 雙鐵
# JP: 「一目惚れ」
1678 = "「一見鍾情」" 

# monologue
# JP: いきなり出てきた言葉に少し、驚かされる。
2761 = "聽到這個突然冒出來的詞，我吃了一驚。" 

# 【双鉄】
# display as 雙鐵
# JP: 「僕もだが、ポーレットもいっそう子供だったろう。\n一目惚れだなんだというには――」
2132 = "「當時你我都還是小孩子吧。要說一見鍾情的話……」" 

# 【ポーレット】
# display as 波萊特
# JP: 「女の子には、ふつうにあると思いますよ？\nどんなに小さくても、恋とか、一目惚れとか」
1999 = "「我覺得，這對女孩子來說是很常見的哦。不論年紀有多小，都會陷入戀愛，都會一見鍾情的」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そうなのか」
2064 = "「是這樣嗎」" 

# monologue
# JP: 断言されれば、急にぞわぞわとしたものを感じる。
2762 = "聽她如此斬釘截鐵，我突然感到心裡一陣慌亂。" 

# monologue
# JP: ひかりにも、そんな瞬間がくるかと思えば、\nなんとも不安だし落ち着かない。
2410 = "一想到光也會迎來那個瞬間，我就感到非常不安，平靜不下來。" 

# 【ポーレット】
# display as 波萊特
# JP: 「恋がなにかをわかるのは、きっとずうっと先ですけど。\nわからないなりに、惚れますよ」
1695 = "「不過，一定在很久很久之後，我們女孩子才會明白什麼是戀情。但小時候雖然懵懂，卻無礙對人一見鍾情」" 

# 【双鉄】
# display as 雙鐵
# JP: 「惚れると、どうなる？」
1679 = "「一見鍾情之後，會怎麼樣？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしの場合は――勇気、出たんだと思います。\nもちろん、全然違うのかもしれませんけど」
1955 = "「從我個人的情況來看，會變得更有勇氣。當然，可能別人的情況跟我完全不同」" 

# 【双鉄】
# display as 雙鐵
# JP: 「……『悪いのは[ひと,1]人間なんだって、\n一緒に責めて欲しかった』」
1331 = "「……“我想讓你認為，錯的一直都是人類，希望你跟我一起責備人類”」" 

# 【ポーレット】
# display as 波萊特
# JP: 「わ、覚えてましたか」
1809 = "「哇，原來你還記得」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん。驚いたからな。\nすれ違いから、僕らは絆を結べたのだと、知って」
1854 = "「嗯。因為你著實讓我吃了一驚。你讓我知道了，我們之間的紐帶是從誤會中產生的」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ですねぇ」
# 2043 = "「是啊」" 

# monologue
# JP: ふたり、結ばれたあの日のように――\nポーレットの指が、僕に甘えて少しうごめく。
2722 = "波萊特的手指輕輕撫摸著我的手，就像我們二人真正在一起的那天一樣。" 

# 【ポーレット】
# display as 波萊特
# JP: 「わたしも。きっと双鉄くんも。あの線路沿いで。\n話したくって、伝えたくって、一生懸命でしたよね？」
1983 = "「我和你一定都是一樣的。當年我們在那條鐵路旁邊，都拚命地表達著自己想要告訴對方的事吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「だったと思うし、そうがんばった。\nけれどお互い、自分にとって都合がいいよう誤解した」
2048 = "「是啊，我們都很努力。但是，我們都產生了誤解，都往對自己有利的方向想了」" 

# 【ポーレット】
# display as 波萊特
# JP: 「誤解したから。理想を相手に押しつけたから。\nだから、ずうっと、忘れずにいたのかもしれませんよ？」
2182 = "「說不定，正是因為我們產生了誤解，因為我們把理想擅自寄託在對方身上，所以才會一直深深地記著對方也說不定哦」" 

# 【双鉄】
# display as 雙鐵
# JP: 「かもしれんな。\n誤解が僕らを、僕らふたりにしたのかもしれん」
1788 = "「可能是吧。可能有了誤解，我們兩個才會在一起」" 

# monologue
# JP: うふふっ、と、幸せそうな笑いがこぼれる。
2533 = "呵呵呵——她的笑聲中蘊含著難掩的幸福。" 

# 【ポーレット】
# display as 波萊特
# JP: 「そう考えると、難しいし、面白いですよね、\nコミュニケーションって」
2211 = "「這麼一想，交流真是一件困難又有趣的事呀」" 

# 【双鉄】
# display as 雙鐵
# JP: 「うん」
# 1866 = "「嗯」" 

# monologue
# JP: ポーレットの手が温かで、なんだかんだで疲れ切ってて、\nじわじわ眠くなってる。
2721 = "波萊特的手很溫暖，白天發生那許許多多的事也讓我很疲勞，陣陣睡意開始向我襲來。" 

# 【双鉄】
# display as 雙鐵
# JP: 「怖くて、面白くて、難しい。\nけれど、一番大事なことは、ひとつだと思う」
1954 = "「很可怕、很有趣、很困難。但是，我認為，最重要的事只有一件」" 

# 【ポーレット】
# display as 波萊特
# JP: 「です、ね」
# 2043 = "「是啊」" 

# 【双鉄】
# display as 雙鐵
# JP: 「人とふれあうことは、素敵だ。痛みや誤解に怯えて、\n言葉をしまいこんでしまうことは、とてももったいない」
2167 = "「與他人的接觸是美好的。如果害怕痛苦和誤解，把話憋在心裡不說出來，那簡直是暴殄天物」" 

# 【ポーレット】
# display as 波萊特
# JP: 「ひかりなりのやり方……伝え方――。\nうまく、見つけてくれるといいんですけど」
1948 = "「希望光能順利找到她自己的表達方法吧」" 

# 【双鉄】
# display as 雙鐵
# JP: 「そこは、教えなかったのか？」
1742 = "「你沒有教她這一點嗎？」" 

# 【ポーレット】
# display as 波萊特
# JP: 「教えるもなにも、\n方法、わたしもよくわかってませんもん」
2023 = "「教什麼呀。我自己都還沒弄清楚方法呢」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ふむ」
# 1866 = "「嗯」" 

# 【ポーレット】
# display as 波萊特
# JP: 「でも、ひとつだけは」
1734 = "「但是，我只告訴了她一點」" 

# monologue
# JP: 暗闇の中、視線を感じる。\nポーレットが、僕を見つめてくれている。
2651 = "我能感到黑暗中的視線。波萊特正緊緊地盯著我。" 

# 【ポーレット】
# display as 波萊特
# JP: 「『本当に大事ななにかを伝えたいなら、\n相手のことをちゃあんと見る』って」
1328 = "「“在想要跟對方講真正重要的事時，一定要好好看著對方”」" 

# 【双鉄】
# display as 雙鐵
# JP: 「ああ――いい教えだな」
1876 = "「嗯，這話很讓人受用」" 

# 【ポーレット】
# display as 波萊特
# JP: 「うふふっ」
# 1798 = "「呵呵呵」" 

# monologue
# JP: ふっと、見られている感じが消える。\n僕も、自然と目を閉じている。
2597 = "忽地，視線在身上的感覺消失了。我也自然地合上了雙眼。" 

# monologue
# JP: 安心できた。満ち足りている。今はこれ以上考えたくない。\nこの暖かさに、ただひたすらにつつまれていたい。
2640 = "我放心了，我的心此刻被裝得滿滿的。同時，我也不想再考慮更多了，只想沉浸在這份暖意裡。" 

# 【ポーレット】
# display as 波萊特
# JP: 「おやすみなさい、双鉄くん」
2071 = "「晚安，雙鐵君」" 

# monologue
# JP: ポーレットの声が、まろやかだ。\n眠りに半ば、彼女もおちつつあるのだろう。
2724 = "波萊特的聲音聽在耳中飄渺空靈。我早已睡意朦朧，想必她也是同樣。" 

# 【双鉄】
# display as 雙鐵
# JP: 「おやすみ、僕のポーレット」
2070 = "「晚安，我的波萊特」" 
