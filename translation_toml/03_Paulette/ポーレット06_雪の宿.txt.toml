# 【ポーレット】
# display as 波萊特
# JP: 「三本、ですよね？」
1683 = "「三根，是吧？」" 

# 【双鉄】
# display as 雙鐵
# JP: 「素晴らしいな」
2137 = "「真厲害」" 

# monologue
# JP: （ざばあっ）
# 2854 = "（嘩啦）" 

# monologue
# JP: 手の形を崩さぬままに持ち上げる。
2619 = "我保持著姿勢舉起手指。" 

# 【ひかり】
# display as 光
